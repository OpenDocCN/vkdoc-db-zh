- fmt: '# 关于关系数据库的历史


    简要了解关系数据库的历史有助于我们认识这项技术的重要性，并理解甲骨文公司的决策。Oracle数据库是一个庞大的产品，其中不可避免地会存在一些错误。其中一些错误是无关紧要的历史趣闻，而另一些则是我们需要避免的巨大陷阱。


    关系数据库建立在关系代数和关系模型之上，后者由E. F. Codd于1970年首次通俗地阐述。关系模型建立在集合论的基础上，这是一种处理对象集合的数学方法。关系模型将在下一节更详细地讨论。


    IBM于1968年开始研究关系技术和产品，但多年后才发布商业产品。这是第一个历史教训：最好者是足够好者的敌人。甲骨文公司的联合创始人拉里·埃里森听说了IBM的项目，实现了它，并于1979年发布了第一个商业化的SQL数据库。他在数据库世界中拥有巨大的影响力，并且至今仍参与许多数据库决策。


    甲骨文公司当然利用了其先发优势。长期以来，Oracle数据库一直是最受欢迎的数据库产品。虽然当前有从Oracle和SQL迁移的趋势，但我们不应忽视它们有多么受欢迎。在几乎所有的数据库受欢迎度指标上，该数据库得分都很高。


    Oracle的“年龄”解释了许多其出人意料的行为。以下列表包含了那些最可能让Oracle新开发者感到困惑的特性：


    1.  `(+)`： Oracle最初使用像`(+)`这样的语法，而不是`LEFT JOIN`这样的关键字。这种过时的语法是糟糕的编码实践，并在第6章和第7章有更详细的讨论。


    2.  `Date`： Oracle的日期类型也包含时间，或许应该被称为`DATETIME`。在引入ANSI日期字面量之前，日期格式化一直很笨拙，这在第15章中有所讨论。


    3.  空字符串： Oracle将空字符串视为null，而不是大多数程序员期望的一个独立值。（然而，我认为Oracle在这里不一定错了。我们没有零长度的日期或零长度的数字；为什么我们应该有零长度的字符串？）


    4.  30字节名称限制： SQL和PL/SQL语言具有类英语的语法，但如果我们使用常规单词作为名称，很快就会碰到30字节的限制。而好的变量名对于提高程序可读性至关重要。幸运的是，这个问题在12.2版本中得到了修复，允许128字节。


    5.  `SQL*Plus`怪癖： `SQL*Plus`对于某些任务来说是一个很好的工具，但在许多方面确实显得老旧。


    为Oracle辩护的话，这些错误是在任何标准存在之前犯的。另一方面，Oracle也并不总是努力遵守标准。例如，Oracle过去声称其“部分”符合标准，因为它允许长名称。虽然30字节是一个更大数字的“部分”，但这并不真正符合标准的精神。


    比原谅Oracle的错误更重要的是，理解甲骨文公司如何应对行业趋势。有时感觉他们的技术采用了一种“开火并运动”的策略。他们添加了如此多的功能，以至于没有人可能跟得上他们。然而，添加大量功能现在可能适得其反。为每个任务构建小工具的Unix哲学似乎正在占据上风。


    以下列表显示了Oracle所经历的最大的架构和概念性变革，以及它们引入的版本。这些不一定是最重要的功能，而是那些试图重新定义数据库是什么的功能：


    *   `Multiversion concurrency control (MVCC)`： 4

    *   `PL/SQL`： 6

    *   `Object-relational, Java`： 8

    *   `OLAP, XML (Extensible Markup Language), RAC`： 9

    *   `JSON, sharding, in-memory, containers (multitenant)`： 12

    *   `Property graph, autonomous database, documents`： 18

    *   `Cloud integration`： 19

    *   `MLE (multilingual engine)`： 21


    添加新功能很少会损害销售，但其中一些新功能可以说让Oracle走向了错误的方向。例如，数据库中的对象关系和Java存在显著问题。这些缺点在第10章和第15章中讨论。


    Oracle总会添加新功能以跟上竞争对手，即使该功能没有意义。并非甲骨文公司所做的一切都是“未来”。Oracle是一个庞大的产品，有时会同时向多个相互矛盾的方向发展。我们需要记住不要盲目追随，也不要为了闪亮的新事物而抛弃经过验证的技术。


    另一方面，Oracle几乎支持所有功能是件好事。它是数据库解决方案的瑞士军刀。我们不需要为每一个新技术趋势都使用一个新的数据库。


    技术变革的速度正在加快，没有人能预测未来。鉴于过去，可以安全地说Oracle将会添加或发明新的重要功能。我们并不总是想立即开始使用新功能，但我们至少应该花时间阅读手册中“新特性”章节的内容。


    # 关系模型及其重要性


    关系模型在计算机科学和编程领域产生了巨大的影响。有许多论文、书籍和课程与关系数据库系统的理论相关。我们不需要对关系模型有透彻的理解就能成为一名成功的SQL开发者，但我们至少应该有一个入门级的理解。


    ## 历史


    关系模型是Oracle数据库的理论基础。它首次由E. F. Codd在1970年的论文《大型共享数据库的关系数据模型》中描述。我推荐阅读这篇论文；它出人意料地易懂且至今仍有价值。本节的大部分内容都基于那篇原始论文，尽管E.
    F. Codd和其他人在其他著作中对关系模型进行了扩展。


    ## 术语


    理解关系模型至少可以帮助我们理解别人。几乎没有好的理由使用理论术语`relation`、`tuple`和`attribute`，而不是更常见的`table`、`row`和`column`。即使是E.
    F. Codd的论文也在多处使用了那些常见词汇。但既然有些人坚持使用那些花哨的术语，我们不妨也学习一下。


