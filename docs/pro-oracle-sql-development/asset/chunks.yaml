    columns, there are at least `N!` permutations^([⁶](#fn6)) of how to store them.


    Despite Codd’s insistence on normalization in his paper, Codd also knew that redundant
    data was inevitable. Inconsistency of redundant data is hard to prevent because
    inconsistency is a state, not a specific action. E. F. Codd predicted the use
    of a metadata system to identify redundancies, and those redundancies could be
    prevented either in real time or as a batch job. As far as I know, an automated
    system to prevent redundancies does not exist. Perhaps some future version of
    Oracle will have an `ASSERT` functionality to fill this gap in our relational
    model implementation. For now, it is up to us to be aware of inconsistency problems
    and use a disciplined approach to mitigate them. Simply stated, if we create a
    wrong column, it’s *our* problem.


    ## Relational Model and Why It Doesn’t Matter


    There is no perfect model for the world. Abstractions are built to simplify things,
    but inevitably those abstractions don’t fit, or they cover up an important detail
    that must be dealt with. Fanatically adhering to the relational model will cause
    problems.


    Don’t be fooled by books and products that offer a false choice; we don’t have
    to choose between implementing a pure relational solution and completely abandoning
    the relational model. Current relational databases, and the SQL language, don’t
    have to be perfect to be useful. We must avoid the temptation to search for pure
    and true solutions and embrace practical compromises.


    The following sections discuss parts of the relational model that don’t always
    work in practice. The good news is that there’s always a workaround.


    ### The NULL Problem Isn’t a Problem


    One of the biggest theoretical complaints about relational databases is the way
    they use NULL. Three-valued logic with nulls is weird and takes time to get used
    to. Table [1-2](#471418_2_En_1_Chapter.xhtml#Tab2) is a truth table that explains
    how NULL works.


    Table 1-2


    NULL Three-Valued Logic


    | A | B | = | != |

    | --- | --- | --- | --- |

    | 1 | 1 | True | False |

    | 1 | 0 | False | True |

    | 1 | NULL | Unknown | Unknown |

    | NULL | NULL | Unknown | Unknown |


    NULLs are weird, but so is our data. There are many times when we don’t know something.
    It might be tempting to replace NULL with a list of reasons we don’t know something.
    But there are many times when we don’t even know *why* we don’t know something.
    And those lists of reasons can grow quickly and become ridiculous.


    NULLs *could* be eliminated by creating a separate table for every nullable column.
    But creating such a large collection of tables quickly becomes a huge mess.


    For example, some people don’t have a first name or a middle name or a last name.
    Instead of using nullable columns to store an employee’s name, we could create
    separate tables `EMPLOYEE_FIRST_NAME`, `EMPLOYEE_MIDDLE_NAME`, and `EMPLOYEE_LAST_NAME`.
    Each table only has two values, an `EMPLOYEE_ID` and a `NAME`. If an employee
    is missing a middle name, there will be no row in `EMPLOYEE_MIDDLE_NAME` for their
    `EMPLOYEE_ID`. Congratulations! We just created a schema without any NULLs. But
    now we need to join four tables just to find a person’s name. And if other columns
    become nullable in the future, we have to make significant changes to the schema,
    instead of just altering a single column. Names can be complicated, and it may
    sometimes make sense to store them in multiple tables, but don’t do it out of
    a fear of NULL.


    It feels unnatural the way `NULL = NULL` returns unknown, which in most contexts
    translates to `FALSE`. And it’s annoying when we write a `NOT IN` expression that
    compares against a NULL and doesn’t return any results. But those problems don’t
    mean our databases contain a ticking time bomb, like some horrible Y2K bug waiting
    to ruin everything. Unknown data creates challenges, but we need to be comfortable
    with uncertainty.'
  trans: '## 关系模型


    ### 简洁性


    关系模型的核心就在于**简洁**。它并非比其他系统更强大，只是更易用。（所以请放心，本节不会涉及任何证明或公式。）


    简洁性是通过*规范化*和*主键*来消除*冗余*和*非简单域*而实现的。在实践中，这些概念转化为两条简单的规则：不要存储值列表，不要重复列。在前述的 `SUPPLY`
    表中，添加如 `DELIVERY_DATES` 或 `SUPPLIER_NAME` 这样的列将是一个巨大的错误，即使这些列起初看起来可能很方便。`DELIVERY_DATES`
    可能是一个以逗号分隔的值列表，它易于读取，但难以进行筛选或连接。`SUPPLIER_NAME` 紧挨着供应商编号看起来可能不错，但它将是 `SUPPLIER`
    表中已有值的重复。这些重复的列会导致*更新异常*，即相关列对值的认定无法保持一致。


    关系模型的规则可以总结为：让模式（Schema）智能，但让表保持简单。重要的是表之间的*关系*。这些关系通过约束和连接来建立，但如果数据不简单，这些约束和连接就无法正常工作。


    ### 集合与表


    从简单关系或仅仅简单集合的角度来思考数据库，是编写出色 Oracle SQL 的关键之一。我们使用关系模型来检索集合，将它们连接成新集合，再将这些集合连接起来，等等。就像用户界面设计一样，两个简单的选择优于一个困难的选择。在脑海中构建关于数据库集合和表的良好模型需要时间，所以如果你现在还没完全理解，也不必感到困扰。本书中会多次讨论这个主题。


    表如此普遍，以至于我们很容易将其视为理所当然。我们不仅在数据库中使用它们，还在电子表格、HTML 以及许多其他地方使用它们。我们不应因为一个数据结构乍看之下过于简单而回避使用它。当我们遇到难以将数据放入一个表的问题时，答案不是创建一个更复杂的表，而是创建更多的表。


    ### 实现关系模型的问题


    科德（Codd）的论文预见到了实现关系模型的困难。事实证明，他的担忧是有充分依据的。


    抽象存储机制赋予了数据库系统许多职责。数据库必须创建和维护物理数据结构，并选择访问这些数据结构的算法。如果尼克劳斯·沃思（Niklaus Wirth）的著作《*算法
    + 数据结构 = 程序*》的书名是正确的，那么数据库要做的工作就很多了。这些额外的工作是个问题，但 Oracle 为我们承担了繁重的部分。例如，虽然我们需要选择对哪些列进行索引，但我们通常不需要确切知道
    Oracle 将如何物理创建和维护这些数据结构。索引维护算法是 Oracle 公司程序员需要解决的问题，也是我们为其软件付费的原因。


    不幸的是，Oracle 无法将所有事情自动化。Oracle 提供了多种存储选项，如索引、缓存、内存列存储等。它还提供了通过表和列统计信息等方式收集关于这些关系的元数据的方法。在性能和存储之间存在许多复杂的权衡，我们必须帮助决定何时值得进行这种权衡。当处理
    `N` 列时，至少有 `N!` 种排列组合^(⁶) 来决定如何存储它们。


    尽管科德在其论文中坚持规范化，但他也明白冗余数据是不可避免的。防止冗余数据的不一致很难，因为不一致是一种状态，而不是一个特定动作。E. F.科德预测了使用元数据系统来识别冗余，并且这些冗余可以通过实时或批处理作业来预防。据我知，目前尚不存在自动防止冗余的系统。也许未来某个版本的
    Oracle 会有 `ASSERT` 功能来填补我们关系模型实现中的这一空白。就目前而言，需要我们自己意识到不一致问题，并采用有纪律的方法来减轻其影响。简单地说，如果我们创建了一个错误的列，那就是*我们*的问题。


    ### 关系模型及其为何无关紧要


    世界没有完美的模型。抽象是为了简化事物而构建的，但这些抽象不可避免地会不适用，或者掩盖了必须处理的重要细节。狂热地坚持关系模型会导致问题。


    不要被那些提供虚假选择的书籍和产品所愚弄；我们不必在实现纯粹的关系解决方案和完全放弃关系模型之间做选择。当前的关系数据库和 SQL 语言不必完美也能发挥作用。我们必须避免寻找纯粹而真实的解决方案的诱惑，而要拥抱务实的妥协。


    接下来的几节将讨论关系模型中在实践中并不总是有效的部分。好消息是，总有变通办法。


    ### NULL 问题不是问题


    对关系数据库最大的理论抱怨之一是它们使用 `NULL` 的方式。带有空值的三值逻辑很奇怪，需要时间来适应。表 1-2 是一个解释 `NULL` 如何工作的真值表。


    表 1-2


    `NULL` 三值逻辑


    | A | B | = | != |

    | --- | --- | --- | --- |

    | 1 | 1 | 真 | 假 |

    | 1 | 0 | 假 | 真 |

    | 1 | `NULL` | 未知 | 未知 |

    | `NULL` | `NULL` | 未知 | 未知 |


    `NULL` 很奇怪，但我们的数据也是如此。很多时候我们并不知道某些事情。可能会想用我们不知道某事的原因列表来替代 `NULL`。但有很多时候我们甚至不知道*为什么*我们不知道。而且这些原因列表会迅速增长并变得荒谬。


    通过为每个可为空的列创建一个单独的表，*可以* 消除 `NULL`。但创建如此大量的表很快会变得一团糟。


    例如，有些人没有名字、中间名或姓氏。我们可以创建单独的表 `EMPLOYEE_FIRST_NAME`、`EMPLOYEE_MIDDLE_NAME` 和 `EMPLOYEE_LAST_NAME`
    来存储员工姓名，而不是使用可为空的列。每个表只有两个值：`EMPLOYEE_ID` 和 `NAME`。如果某个员工没有中间名，那么在 `EMPLOYEE_MIDDLE_NAME`
    表中就不会有对应其 `EMPLOYEE_ID` 的行。恭喜！我们刚刚创建了一个没有任何 `NULL` 的模式。但现在我们需要连接四个表才能找到一个人的姓名。如果将来其他列也变成可为空的，我们就必须对模式进行重大更改，而不是仅仅修改单个列。姓名可能很复杂，有时将其存储在多个表中可能是合理的，但不要出于对
    `NULL` 的恐惧而这样做。


    `NULL = NULL` 返回未知，在大多数上下文中这等同于 `FALSE`，这种感觉很不自然。当我们编写一个与 `NULL` 进行比较的 `NOT IN`
    表达式却不返回任何结果时，也很烦人。但这些问题并不意味着我们的数据库包含一个定时炸弹，就像某些可怕的 Y2K 漏洞一样等待着毁灭一切。未知数据带来了挑战，但我们需要适应不确定性。'
- fmt: '### Column Order Is Important


    The physical order of columns and rows does not matter in the relational model.
    Physical data independence is a big improvement over systems where the order did
    matter. Data independence is not merely a historical problem; it still happens
    if we mistakenly add complex, formatted data in a single value.


    E. F. Codd’s paper does not imply that the `logical` column order is unimportant.
    The examples in his paper have a meaningful order that helps the reader understand
    the relationships between the columns. Grouping similar columns, and listing them
    in the same order across different tables, makes his examples easier to read.
    A meaningful column order can also make our schemas easier to read.


    Our systems might have a user guide, a fancy entity-relationship (ER) diagram,
    and other forms of documentation. But the primary interface to our schema is a
    simple `SELECT` statement. Other SQL developers view and understand our tables
    based on the output from `SELECT * FROM SOME_TABLE`, not from an out-of-date PDF
    file.


    We shouldn’t just throw new columns on the end of tables. We should take the time
    to shift the columns around, if it makes sense. Changing column order is a simple
    operation that only requires setting columns temporarily to `INVISIBLE` and then
    setting them back to `VISIBLE`. Those few minutes are only spent once; a bad table
    design will annoy us for years.


    ### Denormalization


    Ideally our relational databases are fully normalized, contain no non-atomic values,
    and contain no redundant values. It is reasonable to have a firm “no non-atomic
    values” rule and forbid anyone from ever storing comma-separated lists. However,
    it’s not always realistic to insist on preventing redundant values. Not every
    system should be in third normal form.


    There are times when performance requires writing the data multiple times, in
    order to improve read time. This may mean adding a second version of a column
    somewhere and synchronizing them with triggers or possibly creating a materialized
    view, like taking a point-in-time snapshot of pre-joined tables. This is a complex
    trade-off between storage, speed, and consistency.


    There are many systems where this trade-off must be made, and those trade-offs
    do not break the relational model. E. F. Codd’s paper discussed the problems with
    denormalization, but his paper also acknowledged that denormalization is going
    to happen anyway.


    ### All Rows Are Distinct


    The relational model is built on sets, and a set cannot have duplicate elements.
    This implies that all rows, and all query results, should be unique.


    It could be helpful to have a system that enforced the uniqueness of all `SQL`
    query results. It almost never makes sense to have truly duplicate values – there
    should always be a unique way to identify a value. We’ve all been guilty of throwing
    an extra `DISTINCT` operator at a query, just in case.


    But it is not practical to always enforce that rule. There are only so many ways
    to detect duplicate values, and each way requires either a large amount of storage,
    extra processing time, or both. Sorting and hashing large data sets is so painful
    that it’s better to live with the possibility of duplicates than to always check
    the results.


    ## `SQL` Programming Language


    A relational `model` is not enough; we also need a specialized programming language
    to interact with the data. There have been many attempts to create such a language,
    and `SQL` is the winner.


    ### History and Terminology


    In 1970, E. F. Codd’s paper discussed the need for a data language – a `relational
    algebra` formed by combining `relational operators` – and preferably a simple
    language that can deal with simple relations.


    Like with the relational model, knowing the official names of these relational
    operations can at least help us understand what other people are talking about.
    `Projection` is choosing only certain columns. `Join`, of course, is combining
    relations together. `Restriction` or `selection` limits the tuples of a relation,
    by applying `predicates`. (That means results are filtered by functions that return
    true or false.) A `Cartesian product` (`CROSS JOIN`) results in a set that includes
    all possible combinations of elements from two sets. `Set union` (`UNION ALL`)
    combines all elements of a set, and `set difference` (`MINUS`) returns the difference
    between sets.


    In the 1960s, IBM created the Structured English Query Language, `SEQUEL`. But
    don’t use history to prove a point about how to properly pronounce “`SQL`.” Just
    accept the fact that it’s commonly pronounced “S-Q-L” with databases like PostgreSQL
    and MySQL. And it’s commonly pronounced “SEQUEL” with databases like SQL Server
    and Oracle.


    `SQL` is somewhat similar to `COBOL` in that they both have English-like syntaxes
    and were both initially designed for business users. When `PL/SQL` was added,
    it continued the trend of an English-like syntax, for example, by using `BEGIN`
    and `END` instead of curly brackets. Another natural language–like feature of
    Oracle is that lists start with 1, not 0\. If we find ourselves creating a program
    that looks like a screen in “The Matrix”, we have strayed far from the intended
    path.


    `SQL` frequently appears near the top of programming language popularity lists.^([⁷](#fn7))
    And those sites likely still underestimate the language’s real popularity, since
    many nonprogrammers use `SQL` but aren’t responding to developer surveys. `PL/SQL`
    isn’t a top-tier language, but it’s surprisingly close.^([⁸](#fn8))'
