- fmt: '# PL/SQL高级特性与职业发展


    ## 条件编译


    条件编译允许我们根据环境来选择PL/SQL程序的源代码。条件编译比常规代码更动态，但不如动态SQL灵活；我们可以在几个静态代码块中进行选择，但不能在运行时任意修改源代码。当PL/SQL程序被编译时，条件编译可以读取会话设置和常量来决定使用哪部分源代码。当我们想使用最新、最好的SQL和PL/SQL功能，但仅在那些功能可用时，这个特性非常有用。


    下面的例子展示了如何为不同版本的数据库使用不同的源代码。预处理器控制令牌（以美元符号开头的关键字）使用包`DBMS_DB_VERSION`中的常量来决定编译哪段代码。只要那段代码不被选中，源代码甚至可以是完全无意义的：


    ```

    --条件编译示例。

    begin

    $if dbms_db_version.ver_le_9 $then

    This line is invalid but the block still works.

    $elsif dbms_db_version.ver_le_12 $then

    dbms_output.put_line(''Version 12 or lower'');

    $elsif dbms_db_version.ver_le_18 $then

    dbms_output.put_line(''Version 18'');

    $elsif dbms_db_version.ver_le_19 $then

    dbms_output.put_line(''Version 19'');

    $elsif dbms_db_version.ver_le_21 $then

    dbms_output.put_line(''Version 21'');

    $else

    dbms_output.put_line(''Future version'');

    $end

    end;

    /

    ```


    前面的代码比看起来更巧妙。版本检查必须按照精确的顺序进行，否则代码将无法工作。例如，常量`DBMS_DB_VERSION.VER_LE_18`在Oracle
    12.2中不存在。如果`IF`条件的书写顺序不同，这段代码在12.2版本上就会失败。


    ## 其他PL/SQL特性


    我们需要知道已经存在哪些包，这样才不会重复造轮子。第8章已经提到了几个重要的PL/SQL包，值得再快速列举一次：`DBMS_METADATA`、`DBMS_METADATA_DIFF`、`DBMS_OUTPUT`、`DBMS_RANDOM`、`DBMS_SCHEDULER`、`DBMS_SQL`、`DBMS_SQLTUNE`、`DBMS_STATS`和`DBMS_UTILITY`。


    其他有用的预构建包包括：`UTL_MAIL`（用于发送电子邮件）、`DBMS_DATAPUMP`（用于导出和导入数据）、`DBMS_LOB`（用于处理大对象）、`DBMS_LOCK`（有一个有用的`SLEEP`函数）以及`UTL_FILE`（用于对操作系统进行读写操作）。在卷帙浩繁的*PL/SQL
    Packages and Types Reference*中有一个很长的包列表。没有人有时间通读整本手册，但仅仅浏览一下目录也是有帮助的。


    PL/SQL的世界远不止本章所涵盖的内容。与其他数据库系统不同，Oracle的这个过程化语言扩展是一门成熟的编程语言。PL/SQL有足够的能力去做任何事情。但是SQL仍然应该是我们数据库程序的主角。我们应该把大部分巧妙的技巧留给SQL，并使用PL/SQL将SQL粘合在一起。


    ## 开始教学与创造


    你现在拥有成为Oracle SQL大师所需的一切。一个良好的开发过程可以让你快速构建解决方案并尝试新的想法。高级和神秘的功能赋予你解决任何问题的技术能力。优雅的编程风格让你能够构建优美且易于管理的代码。理解Oracle性能让你能够构建闪电般快速的解决方案。


    如果你还没有开始，那么现在是时候与他人分享你的技能了。要真正掌握Oracle SQL，我们需要教导他人并创建开源项目。


    ### 教导他人


    掌握一项技能的最好方法就是把它教给别人。我们不必在成为专家后才开始教学。总有人技能不如我们，我们可以帮助他们。也总有人技能比我们强，我们可以向他们学习。我们希望参与一个任何技能水平的人都能做出贡献的环境。


    教学可以从你的工作开始。教学可能只是意味着在会议上更积极地发言、自愿做简短的演示，或者培训其他开发者。如果你因为觉得自己不够好而紧张，或者患有冒名顶替综合症，那可能恰恰是一个好迹象，说明你正在走出舒适区并学习成长。不要让那种紧张感阻止你。


    最终，我们需要超越工作，开始与公众分享我们的知识。为了持续我们的职业成长，我们需要加入一个开发者可以协作、提供快速有意义的反馈并建立声誉的社区。这些社区可以是论坛、像Stack
    Overflow这样的问答网站、用户组，或者众多的开发者社交网络之一。


    掌握一项技能需要*有意识*的练习。仅仅在工作上做最低限度的事情不足以让我们成为专家。我们需要有勇气展示自己，但同时也要谦逊地从错误中学习。


    ### 创建开源项目


    软件开发者最伟大的成就之一就是创建一个成功的、公开可用的程序。大多数Oracle SQL开发者只开发由单一客户使用的内部应用程序，但我们的职业生涯不必如此受限。有很多机会可以让我们使用Oracle
    SQL和PL/SQL来创建公共程序。


    构建好的软件很难，因为我们倾向于思考通用软件。简单的想法已经被占据；世界不需要另一个手机手电筒应用。好的想法又太难；我们没有时间或技能去构建一个更好的社交网络。但不要放弃！


    我们需要处在一个幸运的情境中，有机会去构建一些独特但可行的东西。除非我们是某个领域的专家，否则这些幸运的情境不会发生。如果你已经读到这里，那么你正在成为Oracle
    SQL专家的道路上。我们的初次尝试会失败，但我们会从这些失败中学到很多。不要气馁——没有人能在第一次尝试时就构建出成功的程序。


    构建公共程序的最佳方式是使其开源。有许多现有的社区和工具支持开源开发。项目管理的许多技术细节可以轻松地由开源托管站点处理，例如GitHub、GitLab、Bitbucket、SourceForge等等。将我们的代码开源可以邀请他人参与，并帮助我们构建更好的软件。


    当你开始构建公共程序时，要警惕“知识的诅咒”。有无数的仓库拥有很棒的程序，却因为没有元数据而完全无法访问。每个项目至少必须有一个Readme文件；一个快速的描述、一个简单的例子、简单的安装说明和许可证信息，如果我们希望人们使用我们的项目，这些都是绝对必要的。如果我们打算投入大量时间来构建某个东西，我们至少应该花几个小时让项目看起来像样并易于安装。


    当大多数人谈论开源时，他们真正的意思是“便宜”。真正的开源不是为了省钱；它关乎自由、协作和正和互动，让每个人都能赢。我们的个人项目可以是开源的，我们也许还能说服我们的组织开放一些内部程序。至少，当我们在网上发布代码片段时，我们应该确保代码被正确授权以供他人使用。


    Oracle SQL还没有一个庞大的开源生态系统。凭借合适的开发环境、高级功能、优美的风格和性能调优技能，我们可以创建许多工具，填补许多知识空白。而高级编程技能肯定有助于推动我们的职业生涯。


    对于高级Oracle开发者来说，机会是无穷的。放下这本书，去写一个程序吧。


