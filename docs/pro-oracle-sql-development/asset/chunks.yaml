- fmt: 'In the first example, when we use a statement-level hint, both the `INSERT`
    and the `SELECT` operations are run in parallel. We can tell because there’s a
    “PX” operation above the (poorly named) `LOAD AS SELECT` operation. And the `LOAD
    AS SELECT` operation also means the first example is using a fast direct-path
    load, whereas the second example uses a slow `LOAD TABLE CONVENTIONAL`.


    Notice that parallel plans contain a column named “IN-OUT.” Ideally, we want to
    use parallel servers for both the producers and the consumers of the rows. The
    value `P->S` means that the parallel results are compressed into a single server
    and the next steps are run serially. We want to see `P->S` as late as possible,
    which means we want to see it near the top of the execution plan. In the second,
    slow example, the `P->S` happens in the middle.


    These examples demonstrate the difficulty of properly hinting statements and how
    carefully we need to read the execution plans. We should use hints when we’re
    telling Oracle something that it can’t figure out for itself; the statement-level
    parallel hint tells Oracle that this query is important enough to us that we’re
    willing to use multiple threads to speed it up. We should not use hints to tell
    Oracle exactly how to do its job; the object-level parallel hint tells Oracle
    exactly which table to parallelize. But that simple rule for deciding how to use
    hints doesn’t always work. The degree of parallelism, the `8` in the hint, is
    arguably a mistake. If the number was excluded, Oracle would automatically determine
    the degree of parallelism. In my experience, those automatic degrees of parallelism
    are not stable enough, and I prefer to hard-code a number like 8 to represent
    a “medium amount of resources.” Clearly, that number may not work for you. Finding
    the right number, or relying on the automated number, is something we have to
    find through trial and error.


    ## Partition


    The partition operation names are self-explanatory and match the partition types.
    For example, it’s obvious what `PARTITION HASH`, `PARTITION LIST`, `PARTITION
    RANGE`, and `PARTITION REFERENCE` are for.


    The relevant options aren’t too complicated, but they are important and worth
    briefly discussing:


    1.  `ALL`: Retrieves all partitions from a table. This option means that partitioning
    isn’t helping at all. We may need to check our conditions and ensure that we’re
    filtering by the partitioned columns.


    2.  `SINGLE`: Retrieves data from only a single partition, which means partition
    pruning is probably working optimally.


    3.  `ITERATOR`: Retrieves data from a range of partitions, which means partition
    pruning is working, but not necessarily optimally.


    Similar to parallel operations, partitioning is complex and has a few special
    columns in execution plans. The columns “Pstart” and “Pstop” list the partition
    numbers being used. Those numbers tell us how well the table is being pruned to
    a smaller size. Sometimes the value will be `KEY`, which means the partition number
    depends on a variable or a lookup from another table.


    Partition operations can also be stacked if the table is subpartitioned. Both
    operations are named `PARTITION`, but the child operation is really for the subpartitions.
    The following example demonstrates what a simple partition execution plan looks
    like. (The example uses an unusual system table because that table is already
    subpartitioned and simply reading the table does not require a partitioning option
    license.)


    ```

    --Partition execution plan example.

    explain plan for select * from sys.wri$_optstat_synopsis$;

    select * from table(dbms_xplan.display);

    ------------------------------- ... -----------------

    | Id  | Operation             | ... | Pstart| Pstop |

    ------------------------------- ... -----------------

    |   0 | SELECT STATEMENT      | ... |       |       |

    |   1 |  PARTITION LIST SINGLE| ... |     1 |     1 |

    |   2 |   PARTITION HASH ALL  | ... |     1 |    32 |

    |   3 |    TABLE ACCESS FULL  | ... |     1 |    32 |

    ------------------------------- ... -----------------

    ```


    In the preceding output, we can see two `PARTITION` operations, one for partitioning
    and one for subpartitioning. On my system the table has one partition and 32 subpartitions.
    All partitions are read since the query does not filter the table, so the Pstart
    and PStop values match the number of partitions and subpartitions.


    ## Filter


    `FILTER` is an important and misunderstood operation. Unfortunately, the word
    “filter” has two different meanings in execution plans. Most frequently a “filter”
    is a condition applied to limit the results and is listed in the “Predicate Information”
    section of an execution plan. But a `FILTER` operation is quite different. A `FILTER`
    operation also applies a condition, but the result of that condition dynamically
    changes the execution plan.


    A good example of a `FILTER` operation happens when a query is based on a form
    with many inputs. If a user enters a value for an input, the query should only
    return rows that match that value. If a user leaves a value empty for an input,
    the query should return all rows. Matching one value is a good candidate for an
    index, and matching all values is a good candidate for a full table scan. With
    the `FILTER` operation, the execution plan can have both paths and choose the
    right one at run time.


    Notice how the following execution plan is really two separate plans put together.
    The fastest plan will be chosen at run time:


    ```

    --Filter example.

    explain plan for

    select *

    from launch

    where launch_id = nvl(:p_launch_id, launch_id);

    select * from table(dbms_xplan.display(format => ''basic''));


    | Id  | Operation                      | Name            |

    |   0 | SELECT STATEMENT               |                 |

    |   1 |  VIEW                          | VW_ORE_D33A4850 |

    |   2 |   UNION-ALL                    |                 |

    |   3 |    FILTER                      |                 |

    |   4 |     TABLE ACCESS BY INDEX ROWID| LAUNCH          |

    |   5 |      INDEX UNIQUE SCAN         | LAUNCH_PK       |

    |   6 |    FILTER                      |                 |

    |   7 |     TABLE ACCESS FULL          | LAUNCH          |

    ```


    The preceding trick does not happen with all semantically equivalent versions
    of the query. For example, the `FILTER` operation disappears if we replace `WHERE
    LAUNCH_ID = NVL(:P_LAUNCH_ID, LAUNCH_ID)` with `WHERE LAUNCH_ID = :P_LAUNCH_ID
    OR :P_LAUNCH_ID IS NULL`. Searching for one or all values is a scenario where
    we need to use cryptic code to ensure the best execution.'
