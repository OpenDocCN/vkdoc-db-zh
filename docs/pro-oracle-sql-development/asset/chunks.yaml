    ```


    In the preceding example, the analytic clause `OVER` `(PARTITION BY LV_FAMILY_CODE
    ORDER BY LAUNCH_DATE)` was specified twice. The duplication wasn’t a big deal
    with this query, but real-life queries may have a more complicated analytic clause
    that may repeat many times. Since version 21c, we can avoid repeating ourselves
    by replacing each analytic clause with a simpler `OVER MY_WINDOW` and then defining
    that window after the `WHERE` clause like this: `WINDOW MY_WINDOW AS (PARTITION
    BY LV_FAMILY_CODE ORDER BY LAUNCH_DATE)`.


    Analytic functions can solve many advanced problems, and there’s not enough space
    to list them all here. One interesting example is finding consecutive or non-consecutive
    patterns, sometimes called islands and gaps, using a technique named tabibitosan.
    The core of the technique is simple – convert each row to a number and then subtract
    the `ROW_NUMBER` from that number to generate a group ID. Fully demonstrating
    that technique would take several pages. If you’re interested, there’s an example
    in the repository that shows ranges of consecutive launches per launch family.


    This section only touched on some of the uses of analytic functions. As always,
    I recommend you look at the manual if you need to learn more about this topic.
    We should use analytic functions whenever we’re trying to calculate something
    where one row depends on other rows. However, even analytic functions are not
    powerful enough to help us with recursive relationships – when a row depends on
    a row, which depends on a row, etc. For those more difficult cases, see the later
    section in this chapter about recursive queries, or see the “`MODEL`” section
    in Chapter [19](#471418_2_En_19_Chapter.xhtml).


    ## Regular Expressions


    Regular expressions are powerful pattern-matching text strings that can be used
    to filter, validate, and change text data. Oracle SQL provides several ways to
    apply regular expressions to our queries.


    All programmers should be familiar with regular expressions. For readers who are
    new to regular expressions, the beginning of this section provides a brief introduction.
    For readers who are experienced with regular expressions, this section ends with
    important warnings about overusing regular expressions.


    ### Regular Expression Syntax


    Oracle SQL allows regular expressions through the condition `REGEXP_LIKE` and
    the functions `REGEXP_COUNT`, `REGEXP_INSTR`, `REGEXP_REPLACE`, and `REGEXP_SUBSTR`.
    These features are similar to the features without the `REGEXP_` prefix. For example,
    just like the normal `REPLACE`, `REGEXP_REPLACE` allows us to specify the position
    and the occurrence of the text to replace. The main difference between the two
    feature sets is that the `REGEXP_` features expand the pattern searching from
    “_” and “%” to more powerful regular expressions.


    The following list explains the most common regular expression options:


    *   **.** – Matches any one character.


    *   ***** – Matches zero or more occurrences.


    *   **+** – Matches one or more occurrences.


    *   **?** – Matches zero or one occurrence.


    *   **|** – An “or” operator.


    *   **^** – Matches the beginning of a string.


    *   **$** – Matches the end of a string.


    *   **[]** – Creates a list of values to match. Can use hyphens to make a range,
    such as “a-z” or “0-9”. Can use carats to mean “do not match this.”


    *   **()** – Creates a group of matched values.


    *   **\** – Do not interpret the next letter as a command, for example, if we
    want to match a period instead of using a period to mean “anything.” If used with
    a number, it becomes a reference to a group.


    Oracle also includes many Perl regular expression extensions, to match digits
    (\d), non-digits (\D), word characters (\w), non-word characters (\W), whitespaces
    (\s), non-whitespaces (\S), and many more.'
  trans: '

    ### 分析函数示例


    以下示例演示了 `RANK` 分析函数，以及 ORDER BY 子句和 PARTITION BY 子句的使用。让我们找出最受欢迎的运载火箭系列。但将小型探空火箭与巨大的轨道火箭进行比较并不公平，因此我们希望确定总体上最受欢迎的以及按发射类别细分最受欢迎的火箭系列。要找出总体最受欢迎的，就不要按任何字段进行分区。要找出按类别细分最受欢迎的，就按类别字段进行分区。在这两种情况下，我们都需要将结果按降序排列——发射次数最多的排在前面：


    ```sql

    --最受欢迎的运载火箭系列。

    select

    launch_category category

    ,lv_family_code family

    ,count

    ,rank() over (order by count desc) rank_total

    ,rank() over (partition by launch_category

    order by count desc) rank_per_category

    from

    (

    --按类别和系列统计发射次数。

    select launch_category, lv_family_code, count(*) count

    from launch

    join launch_vehicle

    on launch.lv_id = launch_vehicle.lv_id

    group by launch_category, lv_family_code

    order by count(*) desc

    )

    order by count desc, launch_category desc;

    CATEGORY          FAMILY      COUNT RANK_TOTAL RANK_PER_CAT

    ----------------- ----------- ----- ---------- ------------

    suborbital rocket Rocketsonde 21369          1            1

    suborbital rocket M-100        7749          2            2

    suborbital rocket Nike         2948          3            3

    suborbital rocket Loki         2495          4            4

    orbital           R-7          1789          5            1

    suborbital rocket Arcas        1716          6            5

    ...

    ```


    请仔细关注前面结果中的数字。分析查询很复杂，即使是像计数和排名这样简单的事情也很复杂，因为数据似乎向多个方向移动。绝大多数受欢迎的运载火箭是“亚轨道火箭”类别中的探空火箭。探空火箭相对较小，通常携带少量科学实验的有效载荷。仔细查看总排名和按类别细分的排名。注意数字的排序大多是一致的，直到
    `R-7` 火箭出现。`R-7` 火箭可能在总体排名中位列第五，但在轨道发射中它位居第一。发射小型实验与发射卫星和载人飞船是不同的，因此根据我们计算的方式，这款火箭可能配得上第一的位置。


    `RANK`、`DENSE_RANK` 和 `ROW_NUMBER` 是相似的函数。我们在这里快要接近语法细节了，但这些函数非常常见，了解它们之间的确切区别是值得的。`RANK`
    使用所谓的“奥林匹克排名法”；如果两行并列第一，下一行就是第三名。`DENSE_RANK` 则相反；如果两行并列第一，下一行是第二名。`ROW_NUMBER`
    则不允许并列；如果我们没有在 ORDER BY 子句中完全指定排序规则，该函数将随机选择一个胜出者。当我们必须限制返回的行数，但又不太关心具体排名时，`ROW_NUMBER`
    很有用。例如，一个屏幕可能最多只能显示 20 行，而不管是否有并列情况。


    `LAG` 和 `LEAD` 函数对于查看前一个和后一个值非常有用。以下示例使用 `LAG` 来查找某一系列火箭深空发射之间的天数间隔。该查询还包括了按火箭系列统计的累计发射次数：


    ```sql

    --使用分析函数按系列统计的深空发射。

    select

    to_char(launch_date, ''YYYY-MM-DD'') launch_date,

    flight_id2 spacecraft,

    lv_family_code family,

    trunc(launch_date) - lag(trunc(launch_date)) over

    (partition by lv_family_code

    order by launch_date) days_between,

    count(*) over

    (partition by lv_family_code

    order by launch_date) running_total

    from launch

    join launch_vehicle

    on launch.lv_id = launch_vehicle.lv_id

    where launch_category = ''deep space''

    order by launch.launch_date;

    LAUNCH_DATE  SPACECRAFT  FAMILY   DAYS_BETWEEN  RUNNING_TOTAL

    -----------  ----------  -------  ------------  -------------

    1959-01-02   Luna-1      R-7                                1

    1959-03-03   Pioneer 4   Jupiter                            1

    1959-09-12   Luna-2      R-7               253              2

    ...

    ```


    在前面的示例中，分析子句 `OVER (PARTITION BY LV_FAMILY_CODE ORDER BY LAUNCH_DATE)` 被指定了两次。在这个查询中，重复并不是大问题，但实际的查询可能具有更复杂且可能重复多次的分析子句。从
    21c 版本开始，我们可以通过用更简单的 `OVER MY_WINDOW` 替换每个分析子句来避免重复，然后在 WHERE 子句之后像这样定义该窗口：`WINDOW
    MY_WINDOW AS (PARTITION BY LV_FAMILY_CODE ORDER BY LAUNCH_DATE)`。


    分析函数可以解决许多高级问题，此处没有足够的空间一一列举。一个有趣的例子是查找连续或不连续的模式（有时称为“岛屿和间隙”），使用一种名为 `tabibitosan`
    的技术。该技术的核心很简单——将每一行转换为一个数字，然后用该数字减去 `ROW_NUMBER` 来生成一个分组 ID。完整演示该技术需要几页篇幅。如果您感兴趣，代码库中有一个示例，展示了按发射系列统计的连续发射范围。


    本节仅触及了分析函数的部分用途。一如既往，如果您需要了解有关此主题的更多信息，我建议您查阅手册。当我们试图计算某些行依赖于其他行的内容时，我们应该使用分析函数。然而，即使是分析函数也不足以帮助我们处理递归关系——当一行依赖于另一行，而另一行又依赖于另一行，等等。对于这些更困难的情况，请参阅本章后面关于递归查询的部分，或者参阅第
    19 章中的“`MODEL`”部分。


    ## 正则表达式


    正则表达式是强大的模式匹配文本字符串，可用于过滤、验证和更改文本数据。Oracle SQL 提供了多种将正则表达式应用于查询的方法。


    所有程序员都应该熟悉正则表达式。对于不熟悉正则表达式的读者，本节开头提供了一个简要介绍。对于有正则表达式经验的读者，本节最后提供了关于过度使用正则表达式的重要警告。


    ### 正则表达式语法


    Oracle SQL 通过条件 `REGEXP_LIKE` 以及函数 `REGEXP_COUNT`、`REGEXP_INSTR`、`REGEXP_REPLACE`
    和 `REGEXP_SUBSTR` 支持正则表达式。这些特性与不带 `REGEXP_` 前缀的类似特性相似。例如，就像普通的 `REPLACE` 一样，`REGEXP_REPLACE`
    允许我们指定要替换文本的位置和出现次数。两组特性之间的主要区别在于，`REGEXP_` 特性将模式搜索从“_”和“%”扩展到了更强大的正则表达式。


    以下列表解释了最常见的正则表达式选项：


    *   **.** – 匹配任何单个字符。

    *   ***** – 匹配零次或多次出现。

    *   **+** – 匹配一次或多次出现。

    *   **?** – 匹配零次或一次出现。

    *   **|** – “或”运算符。

    *   **^** – 匹配字符串的开头。

    *   **$** – 匹配字符串的结尾。

    *   **[]** – 创建要匹配的值列表。可以使用连字符来表示一个范围，例如 "a-z" 或 "0-9"。可以使用脱字符（^）来表示“不匹配此内容”。

    *   **()** – 创建一个匹配值的组。

    *   **\** – 不将后面的字母解释为命令，例如，如果我们想匹配句点（.）而不是使用句点来表示“任何字符”。如果与数字一起使用，它将成为对组的引用。


    Oracle 还包含许多 Perl 正则表达式扩展，用于匹配数字（`\d`）、非数字（`\D`）、单词字符（`\w`）、非单词字符（`\W`）、空白字符（`\s`）、非空白字符（`\S`）以及许多其他内容。

