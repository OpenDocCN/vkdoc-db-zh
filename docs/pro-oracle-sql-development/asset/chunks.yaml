    The output only includes the active hash join, not the inactive nested loop join.
    The “Note” section warns us that we’re looking at an adaptive plan and that there
    is more information under the surface. As discussed in Chapter [17](#471418_2_En_17_Chapter.xhtml),
    if we want to view the inactive operations, we can use this SQL statement:


    ```

    --View all inactive rows of an adaptive plan.

    select * from table(dbms_xplan.display(format => ''+adaptive''));

    ```


    `EXPLAIN PLAN` and `DBMS_XPLAN` have many benefits over graphical representations
    of explain plans:


    1.  *Simple,* *standard* *format*: `DBMS_XPLAN` works in any environment and produces
    output that every Oracle professional is familiar with. Anyone with access to
    Oracle can reproduce the issue, and anyone can discuss the issue with the same
    standard names. We cannot assume other developers have access to our favorite
    IDE.


    2.  *Easy**-**to-process* *output*: The output is easy to save, share, and search.
    We can store the output in a table, copy the text into Notepad, etc. It''s also
    much easier to compare the output using a diff program, such as WinMerge. Large
    queries may produce hundreds of lines in the explain plan, and using a diff utility
    can make tuning much easier. For programming, text is better than pictures.


    3.  *Includes* *important* *sections*: For some bizarre reason, IDEs never display
    the “Note” section. That section includes essential information. Without the “Note”
    section, we have to guess if there''s something weird going on.


    4.  *More* *accurate*: As we saw earlier, IDEs generate slightly wrong results.
    Another common problem is that some IDEs use a separate session to generate graphical
    explain plans. Session settings like `ALTER SESSION ENABLE PARALLEL DML` are not
    always applied in graphical explain plans.


    5.  *More* *Powerful*: `DBMS_XPLAN` can be scripted and has powerful features
    described in the next sections.


    For a quick check, it''s easier to hit F10, F5, CTRL+E, or whatever the shortcut
    is in our IDE. For serious plan analysis that will be shared with others, always
    use `EXPLAIN PLAN` and `DBMS_XPLAN`. The basic commands are worth memorizing.
    It’s hard to remember all the details, but we can always look up `EXPLAIN PLAN`
    in the *SQL Language Reference* and look up `DBMS_XPLAN` in the *PL/SQL Packages
    and Types Reference*.


    ### DBMS_XPLAN Functions


    The function `DBMS_XPLAN.DISPLAY` only works for explain plans that were gathered
    through the `EXPLAIN PLAN` command. Those explain plans are still estimates, although
    in practice the estimates are accurate unless there are bind variables or adaptive
    plans.


    The function `DBMS_XPLAN.DISPLAY_CURSOR` displays the *actual* execution plan
    of a SQL statement that already ran. In order to identify the SQL statement, this
    function must be passed a `SQL_ID` parameter. `DISPLAY_CURSOR` is especially useful
    because it displays actual numbers, not just estimates. The importance of actual
    numbers will be discussed later in this chapter. Explain plans are convenient,
    especially for quick demonstrations, but if you need to be absolutely certain
    about the plan, you may want to stick to only using execution plans.


    The function `DBMS_XPLAN.DISPLAY_AWR` can display all of the different execution
    plans used by a SQL statement. The history goes back as far as the AWR retention
    period, which defaults to 8 days. This feature is useful for diagnosing problems
    where a query used to run fast but is now running slow.'
  trans: '### 查找历史慢速 SQL


    查找过去运行缓慢的 SQL 可能比查找当前正在变慢的 SQL 更具挑战。我们需要能够快速搜索多个数据源——`V$SQL`、`V$ACTIVE_SESSION_HISTORY`、`DBA_HIST_ACTIVE_SESS_HISTORY`
    和 `DBA_HIST_SQLTEXT`。并且需要查找 SQL 文本、时间、用户名以及许多其他列的组合条件。一个好的 IDE 和高级 SQL 技能将派上用场。


    我们还需要记住，数据最终会从每个数据源中老化清除。粗略估计，`V$SQL` 会保留一个小时（如果共享池被手动刷新则更短），`V$ACTIVE_SESSION_HISTORY`
    会保留一天，而 `DBA_HIST_*` 会保留 8 天。


    ## SQL 调优：查找执行计划


    在找到慢速 SQL 语句后，我们很容易忍不住立即去查找执行计划。但不要忽视理解 SQL 本身的重要性。最佳的性能调优是将 SQL 重写得更简单、找到批量运行查询的方法，或是使用高级特性。如果无法修改
    SQL 来避免问题，那么我们需要深入研究执行计划。但首先，请记住：解释计划（explain plans）是估算的计划，而执行计划（execution plans）才是实际的计划。这两个术语很容易混淆，甚至文档和
    Oracle 程序偶尔也会弄错它们。


    ### 图形化执行计划的弊端


    不要使用 IDE 的图形界面来查看执行计划和解释计划。尽管这些图形报告看起来漂亮，并且可以一键轻松生成，但图形化计划总是错误的或具有误导性。


    让我们从一个仅连接 `SATELLITE` 和 `LAUNCH` 表的简单例子开始：


    ```sql

    --所有卫星及其发射信息。

    select *

    from satellite

    left join launch

    on satellite.launch_id = launch.launch_id;

    ```


    在 Oracle SQL Developer 中，我们只需按 F10 即可生成解释计划。图 18-4 显示了由 SQL Developer 生成的解释计划。


    ![](img/471418_2_En_18_Fig4_HTML.png)


    表格片段有 5 列：操作（operation）、对象名称（object name）、选项（options）、基数（cardinality）和成本（costs）。该行中的
    select 语句包含两部分：哈希连接（hash join）和 `Other XML`。


    图 18-4：Oracle SQL Developer 解释计划显示


    上述输出存在几个问题。此查询生成了一个自适应计划（adaptive plan）；有时计划会使用哈希连接，有时则会使用嵌套循环连接。然而，上述解释计划并未明确指出哪些操作是活动的，哪些是非活动的。此外，“Other
    XML”部分令人困惑——该部分包含很少需要的高级信息。同时，该 XML 部分是不完整的，并未包含解释计划使用的所有提示（hints）。


    我并非想针对 SQL Developer——对于数据库开发来说，它是一个很棒的程序。我使用过的每一个 SQL IDE 在可视化执行计划方面都存在类似的问题。对于执行计划和查询计划，我们应力求
    100% 的准确性。在进行性能调优时，哪怕最细微的错误也可能掩盖问题所在。


    ### 文本方式最佳


    `EXPLAIN PLAN` 命令和 `DBMS_XPLAN` 包是显示解释计划的最佳方式。例如，以下代码为 `SATELLITE` 和 `LAUNCH`
    之间的简单连接生成解释计划：


    ```sql

    --所有卫星及其发射信息。

    explain plan for

    select *

    from satellite

    left join launch

    on satellite.launch_id = launch.launch_id;

    select * from table(dbms_xplan.display);

    ```


    图 18-5 显示了输出。（这是另一个由于媒介限制，我未能遵循自己建议的情况。通常，最好复制并粘贴解释计划的原始文本，但 89 个字符的宽度可能无法适应印刷页面的宽度。）


    ![](img/471418_2_En_18_Fig5_HTML.png)


    该计划输出图像有一个哈希值 2829467527，一个包含 8 列 4 行的表格，以及带有注释的预测信息。


    图 18-5：来自 `DBMS_XPLAN` 的简单解释计划输出


    上述解释计划显示比图形化可视化更为准确。输出仅包含活动的哈希连接，而非活动的嵌套循环连接则没有出现。“Note”部分警告我们，我们正在查看的是一个自适应计划，并且表面之下还有更多信息。如第
    17 章所讨论，如果我们想查看非活动操作，可以使用以下 SQL 语句：


    ```sql

    --查看自适应计划的所有非活动行。

    select * from table(dbms_xplan.display(format => ''+adaptive''));

    ```


    `EXPLAIN PLAN` 和 `DBMS_XPLAN` 相对于解释计划的图形化表示有许多优势：


    1.  **简洁、标准的格式**：`DBMS_XPLAN` 适用于任何环境，并生成每个 Oracle 专业人员都熟悉的输出。任何有权访问 Oracle 的人都可以重现该问题，并且任何人都可以使用相同的标准名称讨论该问题。我们不能假定其他开发人员可以访问我们喜欢的
    IDE。

    2.  **易于处理的输出**：输出易于保存、共享和搜索。我们可以将输出存储在表中、将文本复制到记事本等。使用像 WinMerge 这样的 diff 程序来比较输出也要容易得多。大型查询可能在解释计划中产生数百行，使用
    diff 工具可以使调优变得更容易。对于编程而言，文本比图片更好。

    3.  **包含重要部分**：由于某种奇怪的原因，IDE 从不显示“Note”部分。该部分包含至关重要的信息。没有“Note”部分，我们就不得不猜测是否有异常情况发生。

    4.  **更准确**：正如我们之前看到的，IDE 生成的结果略有偏差。另一个常见问题是，有些 IDE 使用单独的会话来生成图形化解释计划。像 `ALTER
    SESSION ENABLE PARALLEL DML` 这样的会话设置并不总是应用于图形化解释计划。

    5.  **更强大**：`DBMS_XPLAN` 可以编写成脚本，并具有将在下一节中描述的强大功能。


    对于快速检查，按 F10、F5、CTRL+E 或我们 IDE 中的任何快捷键会更容易。对于将要与他人共享的严肃的执行计划分析，请始终使用 `EXPLAIN
    PLAN` 和 `DBMS_XPLAN`。基本的命令值得记忆。记住所有细节很难，但我们总可以在 *SQL Language Reference* 中查找 `EXPLAIN
    PLAN`，并在 *PL/SQL Packages and Types Reference* 中查找 `DBMS_XPLAN`。


    ### DBMS_XPLAN 函数


    函数 `DBMS_XPLAN.DISPLAY` 仅适用于通过 `EXPLAIN PLAN` 命令收集的解释计划。那些解释计划仍然是估算值，尽管在实践中，除非存在绑定变量或自适应计划，否则估算通常是准确的。


    函数 `DBMS_XPLAN.DISPLAY_CURSOR` 显示已运行 SQL 语句的*实际*执行计划。为了标识 SQL 语句，必须向此函数传递一个 `SQL_ID`
    参数。`DISPLAY_CURSOR` 特别有用，因为它显示的是实际数字，而不仅仅是估算值。实际数字的重要性将在本章后面讨论。解释计划很方便，特别是用于快速演示，但如果你需要绝对确定执行计划，你可能希望坚持只使用执行计划。


    函数 `DBMS_XPLAN.DISPLAY_AWR` 可以显示一条 SQL 语句使用过的所有不同执行计划。历史记录可以追溯到 AWR 保留期，默认情况下为
    8 天。此功能对于诊断查询曾经运行快速但现在运行缓慢的问题非常有用。'
- fmt: '## DBMS_XPLAN FORMAT Parameter


    `DISPLAY*`函数最重要的参数是`FORMAT`。`FORMAT`参数接受一个以空格分隔的选项列表。其中最常见的选项有`BASIC`（仅显示ID、操作和名称）、`TYPICAL`（显示默认列）以及`ADAPTIVE`（显示非活动操作）。


    除了这些选项，`FORMAT`还接受一些用作执行计划修饰符的关键字。例如，我们可能想显示`BASIC`格式但同时包含`ROWS`。另一方面，我们也可以显示`TYPICAL`格式但排除`ROWS`。以下SQL语句展示了一些选项组合：


    ```

    --FORMAT options.

    select * from table(dbms_xplan.display(format => ''basic +rows''));

    select * from table(dbms_xplan.display(format => ''typical -rows''));

    ```


    手册中列出了其他几种格式化选项，以及一些有用的隐藏选项。`ADVANCED`或`+OUTLINE`都会生成包含“Outline Data”部分的输出。这个新部分显示了一组完整描述该计划的提示：


    ```

    --Display Outline Data.

    select * from table(dbms_xplan.display(format => ''advanced''));

    ```


    输出充满了晦涩难懂的、未文档化的提示。以下结果仅显示执行计划的“Outline Data”部分。不要花太多时间研究输出；我们不需要理解所有这些提示：


    ```

    ...

    Outline Data


    /*+

    BEGIN_OUTLINE_DATA

    USE_HASH(@"SEL$2BFA4EE4" "LAUNCH"@"SEL$1")

    LEADING(@"SEL$2BFA4EE4" "SATELLITE"@"SEL$1" "LAUNCH"@"SEL$1")

    FULL(@"SEL$2BFA4EE4" "LAUNCH"@"SEL$1")

    FULL(@"SEL$2BFA4EE4" "SATELLITE"@"SEL$1")

    OUTLINE(@"SEL$1")

    OUTLINE(@"SEL$2")

    ANSI_REARCH(@"SEL$1")

    OUTLINE(@"SEL$8812AA4E")

    ANSI_REARCH(@"SEL$2")

    OUTLINE(@"SEL$948754D7")

    MERGE(@"SEL$8812AA4E" >"SEL$948754D7")

    OUTLINE_LEAF(@"SEL$2BFA4EE4")

    ALL_ROWS

    DB_VERSION(''12.2.0.1'')

    OPTIMIZER_FEATURES_ENABLE(''12.2.0.1'')

    IGNORE_OPTIM_EMBEDDED_HINTS

    END_OUTLINE_DATA

    */

    ...

    ```


    这些提示对于解决高级调优问题非常宝贵。如果一个查询在两个系统上运行方式不同，“Outline Data”可能有助于解释差异。如果我们迫切地想强制计划在两个系统上以相同方式工作，可以将该提示块粘贴到查询中。`ADVANCED`选项还会创建一个额外的“Query
    Block Name/Object Alias”部分，这对于在自定义提示中引用特定对象很有帮助。


    使用大纲是一种粗暴的调优方式，并不能解决根本原因。但我们并不总是有时间去寻找执行计划差异的根本原因，我们只需要立即解决问题。


    ## “Note” Section


    在进行更深入的执行计划分析之前，我们应该检查“Note”部分。以下是最常见和最需要注意的提示：


    1.  `Dynamic statistics used: dynamic sampling (level=2)`：级别2意味着缺少对象统计信息。

    2.  `This is an adaptive plan`：存在多个版本的计划，而我们现在只看到一个。

    3.  `Statistics/cardinality feedback used for this statement`：此计划已自我纠正。原始计划是不同的。

    4.  `SQL profile/plan baseline/patch "X" used for this statement`：此计划受到影响或被强制以某种方式行为。

    5.  `Direct load disabled because X`：直接路径写入可能被父级引用完整性约束、触发器和其他限制所阻止。

    6.  `PDML disabled in current session`：并行DML未工作，通常是因为我们忘记运行`ALTER SESSION ENABLE
    PARALLEL DML`。

    7.  `Degree of parallelism is X because of Y`：请求的DOP以及使用该DOP的原因。DOP对于大型查询是至关重要的信息，稍后将更详细地讨论。


    与“Note”类似，“Predicate Information”部分也很重要。我们的谓词可能被秘密转换为不允许索引访问的形式。例如，如果我们在谓词中看到函数`NLSSORT`，但我们在查询中并未显式使用该函数，那就意味着会话或数据库参数强制进行语言排序。


    ## Other Ways to Get Execution Plans


    可以在SQL*Plus中使用`AUTOTRACE`功能快速生成执行计划。命令`SET AUTOTRACE ON`将自动显示结果、实际的执行计划以及来自执行的实际统计信息。如果我们想忽略查询的结果，可以使用命令`SET
    AUTOTRACE TRACEONLY`。


    执行计划信息也可以在数据字典视图`V$SQL_PLAN`中获取。从这些视图构建执行计划很困难，但这些视图对于查找特定的执行计划特征很有用。例如，我们可以使用`V$SQL_PLAN`来找出哪些语句使用了哪些索引。


    ## SQL Tuning: Find Actual Times and Cardinalities for Operations


    许多开发者犯了一个巨大的错误，即没有深入研究到执行计划之外。一条SQL语句是算法和数据结构的集合——每条语句实际上是一个完整的程序。说“这个程序很慢”是没有意义的；我们需要知道程序的*哪个部分*很慢。我们需要深入下去，关注实际的操作统计信息。


    操作是SQL调优的原子单位。测量操作的实际执行时间可以告诉我们哪些算法和数据结构是最慢的。测量实际的基数可以告诉我们Oracle为什么选择该操作。如果我们必须猜测哪些操作最慢，将会浪费大量时间。尽可能使用实际数据。'
  raw: '### DBMS_XPLAN FORMAT Parameter


    The most important parameter for the `DISPLAY*` functions is `FORMAT`. The `FORMAT`
    parameter accepts a space-separated list of options. The most common of these
    options are `BASIC` (only display the ID, operation, and name), `TYPICAL` (display
    the default columns), and `ADAPTIVE` (display inactive operations).


    In addition to those options, `FORMAT` also accepts keywords that act as modifiers
    to execution plans. For example, we may want to display the `BASIC` format but
    also include `ROWS`. On the other hand, we can display the `TYPICAL` format with
    everything except the `ROWS`. The following SQL statements show some combinations
    of the options:


    ```

    --FORMAT options.

    select * from table(dbms_xplan.display(format => ''basic +rows''));

    select * from table(dbms_xplan.display(format => ''typical -rows''));

    ```


    There are several other formatting options listed in the manual, as well as several
    useful hidden options. Either `ADVANCED` or `+OUTLINE` will generate output that
    includes an “Outline Data” section. That new section displays a set of hints that
    fully describe the plan:


    ```

    --Display Outline Data.

    select * from table(dbms_xplan.display(format => ''advanced''));

    ```


    The output is full of cryptic, undocumented hints. The following results only
    show the “Outline Data” section of the execution plan. Don’t spend too much time
    studying the output; we don’t need to understand all of these hints:


    ```

    ...

    Outline Data


    /*+

    BEGIN_OUTLINE_DATA

    USE_HASH(@"SEL$2BFA4EE4" "LAUNCH"@"SEL$1")

    LEADING(@"SEL$2BFA4EE4" "SATELLITE"@"SEL$1" "LAUNCH"@"SEL$1")

    FULL(@"SEL$2BFA4EE4" "LAUNCH"@"SEL$1")

    FULL(@"SEL$2BFA4EE4" "SATELLITE"@"SEL$1")

    OUTLINE(@"SEL$1")

    OUTLINE(@"SEL$2")

    ANSI_REARCH(@"SEL$1")

    OUTLINE(@"SEL$8812AA4E")

    ANSI_REARCH(@"SEL$2")

    OUTLINE(@"SEL$948754D7")

    MERGE(@"SEL$8812AA4E" >"SEL$948754D7")

    OUTLINE_LEAF(@"SEL$2BFA4EE4")

    ALL_ROWS

    DB_VERSION(''12.2.0.1'')

    OPTIMIZER_FEATURES_ENABLE(''12.2.0.1'')

    IGNORE_OPTIM_EMBEDDED_HINTS

    END_OUTLINE_DATA

    */

    ...

    ```


    These hints can be invaluable for solving advanced tuning problems. If a query
    runs differently on two systems, the “Outline Data” may help explain the difference.
    And if we’re desperate to force the plan to work the same on both systems, we
    can paste that block of hints into a query. The `ADVANCED` option also creates
    an extra section for “Query Block Name/Object Alias,” which is helpful for referencing
    specific objects in custom hints.


    Using the outline is a blunt way of tuning and doesn’t solve the root cause. But
    we don’t always have time to find the underlying cause of execution plan differences,
    and we just need to fix things right away.


    ### “Note” Section


    Before we go any further with execution plan analysis, we should check the “Note”
    section. The following are the most common and troublesome notes:


    1.  *Dynamic statistics used: dynamic sampling (level=2)***:** Level 2 implies
    object statistics are missing.


    2.  *This is an adaptive plan***:** There are multiple versions of the plan, and
    we’re only looking at one right now.


    3.  *Statistics/cardinality feedback used for this statement***:** This plan has
    corrected itself. The original plan was different.


    4.  *SQL profile/plan baseline/patch “X” used for this statement***:** This plan
    was influenced or forced to behave a certain way.


    5.  *Direct load disabled because X***:** Direct-path writes can be prevented
    by parent referential integrity constraints, triggers, and other limitations.


    6.  *PDML disabled in current session***:** Parallel DML is not working, usually
    because we forgot to run `ALTER SESSION ENABLE PARALLEL DML`.


    7.  *Degree of parallelism is X because of Y*: The requested DOP and the reason
    that DOP was used. The DOP is vital information for large queries and will be
    discussed in more detail later.


    Similar to “Note,” the “Predicate Information” section can also be important.
    Our predicates may be secretly converted to a form that doesn’t allow index access.
    For example, if we see the function `NLSSORT` in the predicates, but we didn’t
    explicitly use that function in our query, that means a session or database parameter
    is forcing a linguistic sort.


    ### Other Ways to Get Execution Plans


    Execution plans can be quickly generated in SQL*Plus using the `AUTOTRACE` feature.
    The command `SET AUTOTRACE ON` will automatically display the results, actual
    execution plan, and actual statistics from the execution. If we want to ignore
    the results of the query, we can use the command `SET AUTOTRACE TRACEONLY`.


    Execution plan information is also available in the data dictionary in the view
    `V$SQL_PLAN`. Building execution plans from the views is difficult, but those
    views can be useful for looking for specific execution plan features. For example,
    we can use `V$SQL_PLAN` to find out which indexes are used by which statements.


    ## SQL Tuning: Find Actual Times and Cardinalities for Operations


    Many developers make a huge mistake by not drilling down further than the execution
    plan. A SQL statement is a collection of algorithms and data structures – each
    statement is effectively a whole program. It’s meaningless to say, “This program
    is slow”; we need to know which *part* of the program is slow. We need to drill
    down and focus on actual operation statistics.


    Operations are the atomic unit of SQL tuning.^([^(43)](#fn43)) Measuring the actual
    execution time of operations tells us which algorithms and data structures are
    the slowest. Measuring the actual cardinalities tells us why Oracle picked the
    operation. If we have to guess which operations are slowest, we will waste a lot
    of time. Always use actual numbers when possible.'
  trans: '

    ## DBMS_XPLAN FORMAT 参数


    `DISPLAY*` 函数最重要的参数是 `FORMAT`。`FORMAT` 参数接受一个以空格分隔的选项列表。其中最常见的选项有 `BASIC`（仅显示
    ID、操作和名称）、`TYPICAL`（显示默认列）以及 `ADAPTIVE`（显示非活动操作）。


    除了这些选项，`FORMAT` 还接受一些用作执行计划修饰符的关键字。例如，我们可能想显示 `BASIC` 格式但同时包含 `ROWS`。另一方面，我们也可以显示
    `TYPICAL` 格式但排除 `ROWS`。以下 SQL 语句展示了一些选项组合：


    ```

    --FORMAT options.

    select * from table(dbms_xplan.display(format => ''basic +rows''));

    select * from table(dbms_xplan.display(format => ''typical -rows''));

    ```


    手册中列出了其他几种格式化选项，以及一些有用的隐藏选项。`ADVANCED` 或 `+OUTLINE` 都会生成包含“Outline Data”部分的输出。这个新部分显示了一组完整描述该计划的提示：


    ```

    --Display Outline Data.

    select * from table(dbms_xplan.display(format => ''advanced''));

    ```


    输出充满了晦涩难懂的、未文档化的提示。以下结果仅显示执行计划的“Outline Data”部分。不要花太多时间研究输出；我们不需要理解所有这些提示：


    ```

    ...

    Outline Data


    /*+

    BEGIN_OUTLINE_DATA

    USE_HASH(@"SEL$2BFA4EE4" "LAUNCH"@"SEL$1")

    LEADING(@"SEL$2BFA4EE4" "SATELLITE"@"SEL$1" "LAUNCH"@"SEL$1")

    FULL(@"SEL$2BFA4EE4" "LAUNCH"@"SEL$1")

    FULL(@"SEL$2BFA4EE4" "SATELLITE"@"SEL$1")

    OUTLINE(@"SEL$1")

    OUTLINE(@"SEL$2")

    ANSI_REARCH(@"SEL$1")

    OUTLINE(@"SEL$8812AA4E")

    ANSI_REARCH(@"SEL$2")

    OUTLINE(@"SEL$948754D7")

    MERGE(@"SEL$8812AA4E" >"SEL$948754D7")

    OUTLINE_LEAF(@"SEL$2BFA4EE4")

    ALL_ROWS

    DB_VERSION(''12.2.0.1'')

    OPTIMIZER_FEATURES_ENABLE(''12.2.0.1'')

    IGNORE_OPTIM_EMBEDDED_HINTS

    END_OUTLINE_DATA

    */

    ...

    ```


    这些提示对于解决高级调优问题非常宝贵。如果一个查询在两个系统上运行方式不同，“Outline Data” 可能有助于解释差异。如果我们迫切地想强制计划在两个系统上以相同方式工作，可以将该提示块粘贴到查询中。`ADVANCED`
    选项还会创建一个额外的“Query Block Name/Object Alias”部分，这对于在自定义提示中引用特定对象很有帮助。


    使用大纲是一种粗暴的调优方式，并不能解决根本原因。但我们并不总是有时间去寻找执行计划差异的根本原因，我们只需要立即解决问题。


    ## “Note” 部分


    在进行更深入的执行计划分析之前，我们应该检查“Note”部分。以下是最常见和最需要注意的提示：


    1.  `Dynamic statistics used: dynamic sampling (level=2)`：级别 2 意味着缺少对象统计信息。

    2.  `This is an adaptive plan`：存在多个版本的计划，而我们现在只看到一个。

    3.  `Statistics/cardinality feedback used for this statement`：此计划已自我纠正。原始计划是不同的。

    4.  `SQL profile/plan baseline/patch "X" used for this statement`：此计划受到影响或被强制以某种方式行为。

    5.  `Direct load disabled because X`：直接路径写入可能被父级引用完整性约束、触发器和其他限制所阻止。

    6.  `PDML disabled in current session`：并行 DML 未工作，通常是因为我们忘记运行 `ALTER SESSION ENABLE
    PARALLEL DML`。

    7.  `Degree of parallelism is X because of Y`：请求的 DOP 以及使用该 DOP 的原因。DOP 对于大型查询是至关重要的信息，稍后将更详细地讨论。


    与“Note”类似，“Predicate Information”部分也很重要。我们的谓词可能被秘密转换为不允许索引访问的形式。例如，如果我们在谓词中看到函数
    `NLSSORT`，但我们在查询中并未显式使用该函数，那就意味着会话或数据库参数强制进行语言排序。


    ## 其他获取执行计划的方式


    可以在 SQL*Plus 中使用 `AUTOTRACE` 功能快速生成执行计划。命令 `SET AUTOTRACE ON` 将自动显示结果、实际的执行计划以及来自执行的实际统计信息。如果我们想忽略查询的结果，可以使用命令
    `SET AUTOTRACE TRACEONLY`。


    执行计划信息也可以在数据字典视图 `V$SQL_PLAN` 中获取。从这些视图构建执行计划很困难，但这些视图对于查找特定的执行计划特征很有用。例如，我们可以使用
    `V$SQL_PLAN` 来找出哪些语句使用了哪些索引。


    ## SQL 调优：寻找操作的实际执行时间和基数


    许多开发者犯了一个巨大的错误，即没有深入研究到执行计划之外。一条 SQL 语句是算法和数据结构的集合——每条语句实际上是一个完整的程序。说“这个程序很慢”是没有意义的；我们需要知道程序的
    *哪个部分* 很慢。我们需要深入下去，关注实际的操作统计信息。


    操作是 SQL 调优的原子单位。测量操作的实际执行时间可以告诉我们哪些算法和数据结构是最慢的。测量实际的基数可以告诉我们 Oracle 为什么选择该操作。如果我们必须猜测哪些操作最慢，将会浪费大量时间。尽可能使用实际数据。

    '
- fmt: '### GATHER_PLAN_STATISTICS


    Let’s create a slow SQL statement to practice tuning. We’ll start with an imaginary
    ETL process that creates a copy of the `LAUNCH` table. But the process makes a
    huge mistake; the process gathers statistics *before* the data is loaded into
    the table, not *after* the data is loaded. Oracle can easily handle *missing*
    statistics but has a harder time dealing with *bad* statistics:


    ```sql

    --Create LAUNCH2 table and gather stats at the wrong time.

    create table launch2 as select * from launch where 1=2;

    begin

    dbms_stats.gather_table_stats

    (

    ownname => sys_context(''userenv'', ''current_schema''),

    tabname => ''launch2''

    );

    end;

    /

    insert into launch2 select * from launch;

    commit;

    ```


    Before we continue, we need to more thoroughly set ourselves up for failure. This
    example is more complicated than previous examples because we have to avoid the
    many mechanisms that automatically fix performance problems. If we only make one
    simple mistake, Oracle will find a way to compensate for it. Newer versions, especially
    with the autonomous features, are hard to trick. Depending on your version, edition,
    and configuration, you may need to temporarily disable more than just the result
    cache:


    ```sql

    --Temporarily disable features that may ruin the example.

    alter session set result_cache_mode = manual;

    ```


    #### 使用 GATHER_PLAN_STATISTICS 获取实际执行计划


    With bad statistics, the `LAUNCH2` table is more likely to cause performance problems.
    Let’s say we find a slow statement and want to tune it. To get the actual execution
    plan numbers, instead of just guesses, we must run the slow query with the hint
    `GATHER_PLAN_STATISTICS`, like this:


    ```sql

    --Distinct dates a satellite was launched.

    select /*+ gather_plan_statistics */ count(distinct launch_date)

    from launch2 join satellite using (launch_id);

    ```


    The next step is to find the `SQL_ID` with a query like this:


    ```sql

    --Find the SQL_ID.

    select * from gv$sql where sql_fulltext like ''%select%launch2%'';

    ```


    We must take the preceding `SQL_ID` and use it in the following call to `DBMS_XPLAN.DISPLAY_CURSOR`.
    To view the extra data generated by the `GATHER_PLAN_STATISTICS` hint, we need
    to use the value `IOSTATS LAST` in the `FORMAT` parameter:


    ```sql

    --First execution has NESTED LOOPS, bad cardinalities, bad performance.

    select * from table(dbms_xplan.display_cursor(

    sql_id => ''82nk6712jkfg2'',

    format => ''iostats last''));

    ```


    That was a lot of work simply to find an execution plan, but the extra effort
    is about to pay off. The output is displayed in Figure 18-6. Notice the execution
    plan includes the new columns “A-Rows” and “A-Time” – the actual values.


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig6_HTML.png)

    *Figure 18-6: Slow execution plan with actual numbers*


    #### 分析执行计划以定位问题


    The next tuning step is to find precisely *what* is slow, by finding the operation
    with the largest “A-time.” In the preceding output, we can see that the slowest
    operation is the `NESTED LOOPS SEMI` that took 0.28 seconds. If we want to improve
    performance, we must focus on that operation.


    This execution plan is small, and there’s only one thing to tune. For larger SQL
    statements, with larger execution plans, the actual time is the only way to find
    the real problem.


    Next, we want to know *why* the join operation is slow. Comparing the actual number
    of rows with the estimated number of rows is the best way to understand the optimizer’s
    mistakes. The cardinality estimate doesn’t need to be perfect, but it needs to
    be in the ballpark for the optimizer to make a good decision.


    When comparing cardinalities, we’re not looking for the biggest mistake – we’re
    looking for the *first meaningful* mistake. Cardinality estimation errors propagate
    through the execution plan, so many of the errors are merely a consequence of
    the root error. Execution plans are run inside out, so we want to start with the
    most indented line. Lines 5 and 6 are the most indented.


    Line 6 estimated 43113 rows, but the actual number of rows is 5295. That estimate
    is good enough. Less than a 10x difference usually doesn’t matter.


    Line 5 estimated 1 row, but the actual number of rows is 70535. A difference that
    huge is worth our attention. Line 5 is a full table scan of the `LAUNCH2` table.
    There is no asterisk on line 5, implying there are no predicates applied to that
    operation. Without a predicate, it’s weird for the estimate to be so wrong – unless
    the statistics are bad. The solution is easy – regather statistics and run again:


    ```sql

    --Re-gather stats and re-run the query.

    begin

    dbms_stats.gather_table_stats

    (

    ownname => sys_context(''userenv'', ''current_schema''),

    tabname => ''launch2'',

    no_invalidate => false

    );

    end;

    /

    --Distinct dates a satellite was launched.

    select /*+ gather_plan_statistics */ count(distinct launch_date)

    from launch2 join satellite using (launch_id);

    --Second execution has HASH JOIN, good cardinalities, good performance.

    select * from table(dbms_xplan.display_cursor(

    sql_id          => ''82nk6712jkfg2'',

    cursor_child_no => null, --Improved plan may be a child cursor.

    format          => ''iostats last''));

    ```


    The preceding code generates the execution plan displayed in Figure 18-7. The
    join changed from a `NESTED LOOPS` to a `HASH JOIN`, which is more appropriate
    for joining a large percentage of data. The actual cardinalities almost perfectly
    match the estimated cardinalities, which strongly implies that Oracle created
    the best possible plan for the given statement and objects. The actual times also
    decreased.


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig7_HTML.png)

    *Figure 18-7: Fast execution plan with actual numbers*


    All the signs indicate that Oracle produced a perfect execution plan. We have
    to be careful comparing small numbers like 0.28 seconds to 0.02 seconds. Such
    a small difference could be explained by caching or system activity. To be completely
    certain of our results, we could run the preceding tests multiple times, possibly
    in a PL/SQL loop.


    This test case may feel too artificial; there is a lot of setup just to demonstrate
    a bad cardinality estimate. That’s because Oracle has become incredibly good at
    fixing and preventing performance problems. On modern versions of Oracle, real-world
    performance problems are likely caused by a combination of several weird factors.
    SQL tuning is less common than it used to be, but when we need to do it, it’s
    more complicated.'
