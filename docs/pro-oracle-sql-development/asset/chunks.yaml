    批处理大小增加对运行时间的影响


    对于左侧的理论图表，总运行时间是“实际工作”的虚线加上开销的实线。增加批处理大小会迅速减少开销，但开销的减少量是有限的。无论我们如何增加批处理大小，总工作量永远不会降至零。我们的处理过程从来不是纯粹的开销——总会存在一定量的实际工作。


    前面图中的线条从接近无穷大开始，并迅速趋于平缓。随着我们增加批处理大小，开销迅速消失。批处理大小为 2 时消除了 50% 的开销，为 10 时消除了 90%，为
    100 时消除了 99%。设置为 100 已经优化了 99%。从理论上讲，批处理大小为 100 和十亿之间的差异不可能超过 1%。


    用于生成现实世界结果的脚本可以在 GitHub 仓库中找到。这里没有足够的空间列出所有代码，但这些代码值得简要讨论。这些脚本创建了两种具有极高开销的场景：插入每一行值都是序列的数据，以及批量收集少量数据但不对结果做任何处理。测试用例几乎完全充满了无用的开销。如果存在任何测试用例能通过将批处理大小从
    100 增加到 1000 而显示出 *有意义的* 改进，那么这就是了。


    表 16-1 详细描述了三种批处理场景。这三行是三个完全不相关的任务，但可以用相同的时间复杂度完美解释。


    **表 16-1**


    性能取决于减少开销的不同任务


    | 任务 | 实际工作 | 开销 | 可配置参数 |

    | --- | --- | --- | --- |

    | 批量收集 | 选择数据 | SQL 与 PL/SQL 上下文切换 | `LIMIT` |

    | 使用序列插入 | 插入数据 | 生成序列号 | `CACHE SIZE` |

    | 应用程序获取行 | 选择数据 | 网络延迟 | 获取大小 |


    我们可以从这个理论中得出许多实际结果。游标 `FOR` 循环使用的默认 `BULK COLLECT` 大小 100 已经足够好；几乎从来没有显著好处去使用一个高得离谱的自定义限制。默认的序列缓存大小
    20 已经足够好；在极端情况下，稍微增加缓存大小可能是值得的，^(³³) 但也不应大幅增加。不同应用程序的应用程序预取大小不同；我们应该将其设置为接近 100。这些规则适用于任何减少开销的优化。


    如果我们处于极端情况或深入钻研结果，我们总能发现使用更大批处理大小带来的微小差异。但如果我们发现自己处于需要设置巨大批处理大小才能显著改善的情况，那我们其实已经失败了；我们需要将算法带到数据身边，而不是将数据带到算法身边。


    在实践中，将算法带到数据身边意味着我们应该将至少部分逻辑放在 SQL 中，而不是将数十亿行数据加载到过程语言中进行微不足道的处理。如果我们愚蠢地将表中的所有行加载到
    PL/SQL 中，只是为了用 `V_COUNT := V_COUNT+1` 来计数，那么增加批处理大小会有所帮助。但更好的解决方案是在 SQL 语句中使用
    `SELECT COUNT(*)`。如果我们将十亿行数据加载到 PL/SQL 中并对这些行执行实际工作，那么通过更大的批处理大小节省的几秒钟将是无关紧要的。总有例外情况，例如如果我们必须通过数据库链接访问大量数据并面临可怕的网络延迟，但我们不应该让这些例外情况来决定我们的标准。


    在空间和运行时间之间存在权衡，但具有调和级数时间复杂度时，我们会很快用空间换取 *零* 运行时间。开发人员浪费了大量精力在争论和调整前图中右侧的大数值上，但几乎所有的收益都发生在图中左侧的快速变化区域。当我们拥有
    `1/N` 时间复杂度时，收益递减点会非常快地达到。我们应该花时间寻找批处理命令和减少开销的机会，而不是担心精确的批处理大小。


    ## O(1)：哈希与其他操作


    常数时间访问是理想的，但通常不现实。能够以常数时间工作的操作大多是简单的，例如使用像 `ROWNUM = 1` 这样的谓词。常数时间函数很简单，只是一条水平线，不值得在图表中展示。最重要的可以以常数时间运行的
    Oracle 操作是哈希。哈希是数据库的核心操作，值得详细讨论。'
- fmt: '# How Hashing Works


    ## How Hashing Works


    Hashing assigns a set of items into a set of hash buckets. Hash functions can
    assign items into a huge number of cryptographically random buckets, such as `SELECT
    STANDARD_HASH(''some_string'', ''SHA256'') FROM DUAL`. Or hash functions can assign
    values into a small number of predefined buckets, such as `SELECT ORA_HASH(''some_string'',
    4) FROM DUAL`. Hash functions can be designed with many different properties,
    and their design has important implications for how they are used. Figure [16-4](#471418_2_En_16_Chapter.xhtml#Fig4)
    includes simple ways of describing hash functions.


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig4_HTML.png)


    The illustrations of the columns of keys, hash functions, and hashes for a minimal
    perfect hash, a perfect hash, and a typical hash.


    Figure 16-4


    Description of different hash functions. Images were created by Jorge Stolfi and
    are in the public domain


    There is a huge range of performance that depends on exactly how the hash works.
    With perfect hashing, access requires only a single read, and the operation is
    `O(1)`. With a broken hashing algorithm, where every value is mapped to the same
    hash, we just end up with a regular heap table stuck inside a hash bucket. In
    that worst case, we have to read the entire table to find a single value, which
    is `O(N)`.


    When hashing, we need to be aware of space–time trade-offs. In practice we cannot
    achieve a minimal, perfect hash. Oracle’s hash partitioning is minimal (there
    are no empty buckets), but far from perfect (there are many collisions); hash
    partitions don’t provide instant access for one row, but they don’t waste much
    space. Hash clusters can be perfect (no collisions) but are far from minimal (many
    empty buckets); hash clusters provide instant access for one row, but they waste
    a lot of space. Hash joins are somewhere in the middle. Those three types of hashing
    serve different purposes and are described in detail in the next sections.


    ## Hash Partitioning


    Hash partitioning splits a table of `N` rows into `P` partitions, based on the
    `ORA_HASH` of one or more columns. Hash partitioning will certainly not be a perfect
    hash, since each hash bucket is a segment meant to fit many rows. The number of
    hash partitions should be minimal, since we don’t want to waste disk space by
    having extra segments.


    The time to insert a row into a hash-partitioned table is still `O(1)` – the `ORA_HASH`
    function can quickly determine which partition the row goes in. But the time to
    retrieve a row will be `O(N/P)`, or the number of rows divided by the number of
    partitions. That can be an important improvement for large data warehouse operations
    that read a large number of rows. But for reading a single row, that improvement
    is not nearly as good as what we can achieve with an `O(LOG(N))` B-tree index
    access. (The time complexity of B-tree indexes is described in a later section.)
    Don’t try to replace indexes with partitions – they solve different problems.


    We could theoretically build a hash-partitioned table with an amazing `O(1)` read
    access by using a ridiculously large number of hashes. While that hash might be
    “perfect” in the sense that every row maps to a single segment, a ridiculous number
    of segments would waste a huge amount of space and would also cause problems with
    the data dictionary.


    When building hash-partitioned tables, we must use the right columns for the partition
    key. If we use columns with a low cardinality or don’t set the number of partitions
    to a power of two, the data will not be evenly distributed among the partitions.
    If all of the rows are stored in the same bucket (the same hash partition), then
    partitioning won’t help us at all.


    Hash partitioning is frequently overused in practice. To avoid abusing that feature,
    we need to understand the hashing trade-offs and choose a good partition key.


    ## Hash Clusters


    Hash clusters are designed to return a small number of rows, unlike hash partitions
    that are designed to return a large number of rows. An undocumented hash function
    tells Oracle exactly where to store and find each row – there’s no need to walk
    an index tree and follow multiple pointers. In theory, hash clusters are even
    better than B-tree indexes for retrieving a small number of rows. In practice,
    hash clusters are rarely used.


    The first problem with hash clusters is that we cannot add one to an existing
    table; we have to organize the table from the beginning to use a hash cluster.
    To get `O(1)` read time on hash clusters, we need to create a near-perfect hash.
    But we have to worry about that space–time trade-off. There is no practical way
    to get perfect hashes without also creating a huge number of unused hash buckets.
    We can have a hash cluster with good performance or a hash cluster that uses a
    minimal amount of space; we can’t have both.


    When we create a hash cluster, we can specify the number of buckets with the `HASHKEYS`
    clause. In my experience, getting `O(1)` read time requires so many hash buckets
    that the table size will triple.


    Unfortunately, even after all that effort to get `O(1)` access time, hash clusters
    still end up being slower than indexes. I can’t explain why hash clusters are
    slower; this is a place where our theory breaks down in real-world applications.


    Oracle measures the number of reads performed by a SQL statement using a statistic
    called “consistent gets.” It’s possible to create test cases where hash lookups
    require only one consistent get, while index lookups on the same table require
    four consistent gets.^(^(34)) But the index is still faster. For these operations,
    the `O(LOG(N))` of an index is less than the `O(1)` of a hash cluster.


    When comparing small numbers, such as 1 vs. 4, the constants become more important
    than the Big O analysis. Hash clusters are rarely used, and Oracle surely invests
    more time optimizing indexes than clusters. Perhaps those optimizations compensate
    for the small difference between the run-time complexities.


    Algorithm analysis helps us drill down to the problem, but in this case the real
    performance difference is hidden by constants in closed source software. Perhaps
    this is an opportunity for a custom index type. Other databases have hash indexes
    that don’t require reorganizing the entire table. Maybe someday Oracle will add
    that feature and make hash access work better. For now, we should ignore hash
    clusters.'
