    # SQL 宏


    普通的 PL/SQL 函数在每次 SQL 语句调用时都会执行。例如，如果我们有一个特定的日期格式化需求，并且不想多次重复该逻辑，我们可以将该逻辑封装在一个名为
    `TO_ISO8601` 的函数中。如果我们的应用程序持续使用该格式，我们的数据库中可能会充斥着对该函数的调用，例如 `SELECT TO_ISO8601(START_DATE),
    TO_ISO8601(STOP_DATE) FROM SITE`。我们可以使用一些技巧来减少调用函数的开销，但最终我们可能仍会在 SQL 和 PL/SQL
    之间切换上下文上花费比实际工作更多的时间。我们必须做出权衡；重复 `TO_CHAR` 逻辑作为 SQL 表达式可以提高性能，但使用函数可以减少开发者产生错误的几率。


    SQL 宏为我们提供了两全其美的方案，并消除了这种权衡的需要。宏是在编译时被替换为 SQL 表达式或 SQL 查询的 PL/SQL 函数。宏不返回*值*；它们返回将构成我们最终
    SQL 语句一部分的*字符串*。


    以下的标量宏可以帮助优化我们的查询，但这个函数中有一些奇怪的特性。请注意，函数参数 `P_DATE` 并未在函数中直接使用；它既没有连接到返回字符串，也没有作为绑定变量传递到字符串中。但是当
    Oracle 在编译时评估宏时，`P_DATE` 会被替换为相关的列名或表达式，并创建一个有效的 SQL 语句：


    ```

    --将日期转换为特定类型的 ISO8601 格式字符串。

    create or replace function to_iso8601(p_date date)

    return varchar2 sql_macro(scalar) is

    begin

    return

    q''!

    to_char(p_date, ''YYYY-MM-DD"T"HH24:MI:SS"Z"'')

    !'';

    end;

    /

    ```


    SQL 宏是一种 PL/SQL 技巧，帮助我们避免使用过多的 PL/SQL。但我们应该谨慎，不要过度使用此功能。SQL 宏在 21c 中引入，并向后移植到
    19c，但对于具体哪些功能在 19c 的哪个版本中可用存在一些模糊性。我们通常应该坚持使用静态代码而非动态代码，尽管宏是否算作“动态”尚有争议。宏不会遭受与常规动态
    SQL 相同的问题，例如对 SQL 注入的担忧。另一方面，由于宏只返回字符串，在函数被使用之前我们无法判断是否存在错误。并且对于如何调整这些语句可能会有一些困惑；最终的
    SQL 文本会出现在 10053 跟踪文件中，但不会出现在 `GV$SQL.SQL_FULLTEXT` 中。我们只应在确认存在性能问题时才使用标量宏。


    表宏返回一个将被计算为返回数据行的表函数的字符串。使用表宏，我们终于可以创建参数化视图了。


    与标量宏一样，我们应该谨慎避免过度使用表宏。尽管开发者长期以来一直在要求参数化视图，但参数化视图相对于普通视图并不总是有明显的优势。以下示例创建了一个简单的视图和一个简单的表宏：


    ```

    --比较普通视图与表宏参数化视图。

    create or replace view launch_view as select * from launch;

    create or replace function launch_macro(p_launch_category varchar2) return varchar2
    sql_macro is

    begin

    return

    q''[

    select *

    from launch

    where launch_category = p_launch_category

    ]'';

    end;

    /

    select * from launch_view where launch_category = ''orbital'';

    select * from launch_macro(p_launch_category => ''orbital'');

    ```


    从表宏中选择并不比从视图中选择更容易。如果条件复杂并且宏能向用户隐藏这种复杂性，表宏可能会有优势。但我们可以通过在普通视图中投影一个复杂的表达式，然后在简单条件中使用它来实现相同的效果。此外，表宏相对于普通视图也没有性能优势。Oracle
    在某些方面已经像处理宏一样处理普通视图；优化器会转换 SQL，就好像外部查询和视图文本被硬编码成一个大型语句一样。


    表宏的真正优势在于我们通过传入表名或列名作为参数来创建多态视图时。以下代码是另一种动态计算表行数的方法。但再次强调，宏代码并不像我们习惯的那样动态。表名参数
    `P_TABLE` 在返回的字符串中按原样使用，我们不必担心连接、绑定变量或 SQL 注入。而且当我们调用函数时，我们传入的不是表示表名的字符串；我们是直接将表名作为标识符传入：


    ```

    --用于计算表中行数的 SQL 宏。

    create or replace function get_row_count

    (

    p_table dbms_tf.table_t

    ) return varchar2 sql_macro(table) is

    begin

    return

    q''!

    select count(*) row_count

    from p_table

    !;

    end;

    /

    select * from get_row_count(launch);

    ROW_COUNT


    ```


    前面的解决方案只是比简单地硬编码查询 `SELECT COUNT(*) FROM LAUNCH` 稍微动态一些。但这并非坏事——拥有从硬编码到完全动态的一系列解决方案是件好事。而这些小例子并未完全探索
    SQL 宏的强大功能。就像多态表函数一样，表宏可以使用包 `DBMS_TF` 循环遍历列并构建极其动态的查询。SQL 宏提供了另一种解决复杂挑战的方法，例如比较通用行集、动态透视，或者任何我们需要在数据库中处理“任何事物”的时候。


    ## 总结


    借助合适的高级包和功能，我们可以解决 Oracle 中的任何问题。动态 SQL 不仅为数据库程序创造了新的机会，而且在适当位置使用一点高级代码可以极大地简化我们的程序，让我们专注于
    Oracle 的最佳特性——SQL。本章的大部分功能都依赖于 PL/SQL，是时候停止仅间接地使用 PL/SQL 了。下一章将直接聚焦于 PL/SQL，并展示如何将我们的数据库代码提升到最高水平。


    脚注 1   2   3   4


    # 21. 使用 PL/SQL 提升你的技能


    如果你使用 Oracle SQL 足够长的时间，最终你会想要学习 PL/SQL。SQL 是 Oracle 开发的主要语言，但我们需要 PL/SQL 来打包我们的工作，并调用控制和扩展数据库功能的
    API。如果我们决定学习 PL/SQL，第一步是创建一个安全的“游乐场”。这里没有足够的空间提供一个完整的 PL/SQL 教程，但我们至少可以讨论最有可能帮助我们增强
    SQL 的那些功能。要成为一名真正的 Oracle 大师，你需要 PL/SQL 来帮助你教导他人并创建程序。

    '
- fmt: '## Is PL/SQL Worth Mastering?


    Before you spend even more time learning about Oracle, it’s worth briefly considering
    if PL/SQL is worth investing in. SQL is often good enough, there are technology
    trends moving away from products like Oracle SQL and PL/SQL, and there are arguments
    against specialization.


    No matter where you go from here with Oracle database development, the focus remains
    on SQL. PL/SQL is a great language precisely because it integrates so well with
    SQL. PL/SQL is considered more advanced than SQL, but advanced does not always
    mean better. PL/SQL code is rarely faster or simpler than SQL code, so we must
    resist the urge to use obscure PL/SQL features instead of ordinary SQL features.
    For example, parallel pipelined functions are a neat way to parallelize PL/SQL
    code. That feature is better than single-threaded PL/SQL, but the best option
    is usually a single parallel SQL statement.


    Learning the proprietary PL/SQL language means we are betting a part of our career
    on the fortunes of Oracle Corporation and the market for relational databases.
    Oracle Corporation is one of the largest software companies, SQL is one of the
    most popular programming languages, Oracle has the largest market share of any
    relational database, and PL/SQL is the best procedural language extension for
    SQL. On the other hand, Oracle Corporation’s revenue is stagnant, their cloud
    business is struggling, technologies like NoSQL are growing at the expense of
    relational databases, and open source technologies and languages are growing at
    the expense of proprietary code.


    We also need to consider the argument about being a technology generalist instead
    of a specialist. We don’t want to be a jack of all trades, master of none. On
    the other hand, developers with a broad background and a resume that looks like
    alphabet soup are what recruiters look for.


    There are great reasons to learn more about PL/SQL, but at some point, our time
    might be better spent learning a completely different language.


    ## Create a PL/SQL Playground


    We need a safe playground to learn new skills, but building a sandbox can be challenging
    in conservative Oracle development environments. Many developers don’t have private
    databases, private schemas, or even the privileges to create objects. But even
    in the worst-case environment, we can still learn PL/SQL.


    Obviously, we could always create a private database on our home PC or in the
    cloud, or we could use websites like [`https://dbfiddle.uk/`](https://dbfiddle.uk/)
    and [`https://livesql.oracle.com/`](https://livesql.oracle.com/). But the easiest
    way to learn a skill is to use it at work or at least with work data, and we can’t
    put our company’s data in our private database. Luckily, there are tricks that
    let us write PL/SQL on any database with no additional privileges.


    Anonymous blocks are the best way to get started with PL/SQL in a highly limited
    environment. We can run anonymous blocks that don’t change anything without anyone
    ever knowing. This book has used many simple anonymous blocks, but anonymous blocks
    don’t have to be simple. We can use anonymous blocks to imitate large packages,
    stored procedures, and functions. The following example shows an anonymous block
    with an embedded function, and the function has an embedded procedure:


    ```sql

    --PL/SQL block with nested procedure and function.

    declare

    v_declare_variables_first number;

    function some_function return number is

    procedure some_procedure is

    begin

    null;

    end some_procedure;

    begin

    some_procedure;

    return 1;

    end some_function;

    begin

    v_declare_variables_first := some_function;

    dbms_output.put_line(''Output: ''||v_declare_variables_first);

    end;

    /

    Output: 1

    ```


    We can embed functions and procedures as deep as necessary to imitate large packages.
    To practice using PL/SQL objects in SQL code, we can use PL/SQL common table expressions.
    As long as we have access to an Oracle database, there’s always a way to experiment
    with PL/SQL.


    ## PL/SQL Integration Features


    This chapter is not a full PL/SQL tutorial. Much of the basic syntax, like variable
    assignment, `IF` statements, and looping, can be learned through osmosis. And
    much of the syntax works the same in both SQL and PL/SQL; most operators, expressions,
    conditions, and functions work the same way in both languages.


    PL/SQL has many of the same benefits as SQL. PL/SQL is a high-level language meant
    for processing data and is highly portable. A PL/SQL program written for HP-UX
    on Itanium works just fine on Windows on Intel x86-64.


    To fully understand the PL/SQL language, I recommend reading the *PL/SQL Language
    Reference*. The manual is the most accurate source even if it isn’t always the
    easiest to read. This chapter only focuses on the PL/SQL features that promote
    integration between SQL and PL/SQL.


    ### Tips for Packaging Code


    The first and most obvious tip for packaging our code is to use `PACKAGE`s to
    encapsulate related code. We don’t want to pollute a schema with all our procedures
    and functions. A simple rule to help with organizing code is to think of packages
    as nouns and their procedures and functions as verbs.


    By default, procedures, functions, and variables should only be defined in the
    package body, which makes them private. Procedures, functions, and variables defined
    in the package specification are public. We always want to minimize the number
    of entry points and public interfaces to our programs. Every part of our program
    that we expose to the world is another thing we have to support and maintain.


    When we build programs for other developers, we must think carefully about the
    program’s dependencies. Other developers may not have Enterprise Edition, the
    latest version, elevated privileges, the ability to dedicate an entire schema
    to a project, optional components like Java, licensed options like partitioning,
    etc.'
