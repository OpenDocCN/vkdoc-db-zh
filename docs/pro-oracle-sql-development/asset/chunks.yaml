  raw: '## Book Structure


    This book is divided into five parts. There is a progression between the sections
    and chapters, but they are not tightly coupled, and you should be able to skip
    between chapters without much difficulty.


    *Part I: Learn How to Learn (Chapters* [*1*](#471418_2_En_1_Chapter.xhtml)*–*[*5*](#471418_2_En_5_Chapter.xhtml)*)*:
    The first part helps you create the foundation for advanced Oracle SQL development.
    However, these are not merely introductory topics. This part contains controversial
    opinions, and if you already have a foundation, this book may suggest that you
    tear it down and start over.


    *Part II: Write Powerful SQL with Sets and Advanced Features (Chapters* [*6*](#471418_2_En_6_Chapter.xhtml)*–*[*10*](#471418_2_En_10_Chapter.xhtml)*)*:
    This part provides a clear mental model for thinking about queries. Then it introduces
    you to the advanced features, schema objects, concepts, and architectural information
    you need to start writing advanced SQL statements.


    *Part III: Write Elegant SQL with Patterns and Styles (Chapters* [*11*](#471418_2_En_11_Chapter.xhtml)*–*[*15*](#471418_2_En_15_Chapter.xhtml)*)*:
    This part teaches you the art of building beautiful SQL statements. You can’t
    simply take the advanced features and throw them together. Instead, you must develop
    a style for constructing readable queries while avoiding common anti-patterns.


    *Part IV: Improve SQL Performance (Chapters* [*16*](#471418_2_En_16_Chapter.xhtml)*–*[*18*](#471418_2_En_18_Chapter.xhtml)*)*:
    This part helps you build a deeper understanding of performance with practical
    algorithm analysis, and it explains many tuning concepts and performance tricks.


    *Part V: Solve Anything with Oracle SQL (Chapters* [*19*](#471418_2_En_19_Chapter.xhtml)*–*[*21*](#471418_2_En_21_Chapter.xhtml)*)*:
    The last chapters show you how to take your skills to the final level. This part
    introduces some of the most advanced SQL features and briefly discusses PL/SQL.


    This book is meant to introduce new ideas, features, styles, theories, and ways
    of thinking. It may challenge you to think differently about your styles and processes,
    but it is *not* meant to frustrate you with syntax trivia. Don’t try to memorize
    all the syntax – it’s only important that you remember the concepts.


    ## Example Schema


    The examples in this book use a data set generated from the JSR Launch Vehicle
    Database. The data set, and the simple installation instructions, can be found
    at [`https://github.com/apress/pro-oracle-sql-dev-2e`](https://github.com/apress/pro-oracle-sql-dev-2e).
    If you want to run the examples, but don’t have a convenient database to run them,
    Chapter [2](#471418_2_En_2_Chapter.xhtml) provides advice for creating a development
    environment.


    The schema is simple, small, real, and hopefully interesting. Instead of a meaningless
    list of imaginary `EMPLOYEES`, this example schema contains data for all 70,000
    orbital and suborbital launches attempted up until 2017\. If you’re interested
    in space flight, you can use the data to answer real questions.


    The following are the main tables, listed roughly in order of importance and their
    relationships. The columns and relationships are simple and are not explained
    here in detail. There’s no need to study a large entity-relationship (ER) diagram
    – just spend a few seconds to become familiar with the table names:


