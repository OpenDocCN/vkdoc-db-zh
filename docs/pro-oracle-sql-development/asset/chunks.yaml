    # 20. 更常使用高级动态 SQL


    SQL 是 Oracle 最强大的优势。动态 SQL 很重要，因为它给了我们更多使用 SQL 的机会。第 [14](#471418_2_En_14_Chapter.xhtml)
    章介绍了基础特性：使用动态 SQL 进行 DDL 操作、处理未知对象和简化权限；`EXECUTE IMMEDIATE` 和绑定变量语法；使用多行字符串、替代引用语法和模板简化动态代码；以及生成代码而非创建通用代码的好处。


    现在是时候讨论高级动态 SQL 了。这些特性让我们能够将 Oracle 推向极限，并在过度通用的混乱和史诗级解决方案之间走钢丝。编程已经足够难了；编程程序生成器更是极其困难。


    这里讨论的主题应该在仔细考虑后才使用。通常有更简单、更常规的方法来解决我们的问题。但记住这些解决方案是值得的，因为一些最棘手的编程问题只有通过高级动态 SQL
    才能解决。


    ## 解析


    解析 SQL 难得离谱，甚至在第 [15](#471418_2_En_15_Chapter.xhtml) 章中被列为反模式。Oracle 的 SQL 语法非常庞大，无法用简单的字符串函数或正则表达式准确解析。在可能的情况下，我们应该寻找约束代码的方法；如果我们能强制代码以某种方式呈现，那么简单的字符串函数可能就足够了。


    随着输入代码变得越来越通用，我们必须更有创造性地提出解决方案。解析是那种我们不想直接跳到最强大程序的问题，因为最强大的程序学习曲线很陡。如果我们幸运的话，我们的
    problem 可能已经被解决并存储在数据字典的某个地方。相当多的代码检查问题可以通过 `V$SQL`、`V$SQL_PLAN`、`DBA_DEPENDENCIES`、`DBMS_XPLAN.DISPLAY`
    和其他数据字典视图与工具来解决。对于更复杂的问题，我们应该看看像 `PL/Scope`、`PLSQL_LEXER` 和 ANTLR 这样的工具。


    ### PL/Scope


    `PL/Scope` 是一个用于检查 PL/SQL 程序中使用的标识符和 SQL 语句的工具。`PL/Scope` 提供的信息可以帮助进行简单的代码分析和依赖关系检查。`PL/Scope`
    提供的信息量并不大，但该程序易于访问且准确。


    例如，我们可以通过设置会话变量并重新编译来分析一个小程序：


    ```

    --Generate identifier information.

    alter session set plscope_settings=''identifiers:all'';

    create or replace procedure temp_procedure is

    v_count number;

    begin

    select count(*)

    into v_count

    from launch;

    end;

    /

    ```


    `PL/Scope` 数据存储在数据字典中，可以通过类似这样的查询读取：


    ```

    --Identifiers in the procedure.

    select

    lpad('' '', (level-1)*3, '' '') || name name,

    type, usage, line, col

    from

    (

    select *

    from user_identifiers

    where object_name = ''TEMP_PROCEDURE''

    ) identifiers

    start with usage_context_id = 0

    connect by prior usage_id = usage_context_id

    order siblings by line, col;

    NAME                TYPE              USAGE         LINE   COL

    -----------------   ---------------   -----------   ----   ---

    TEMP_PROCEDURE      PROCEDURE         DECLARATION      1    11

    TEMP_PROCEDURE   PROCEDURE         DEFINITION       1    11

    V_COUNT       VARIABLE          DECLARATION      2     4

    NUMBER     NUMBER DATATYPE   REFERENCE        2    12

    ```


    我们还可以获取有关程序调用的 SQL 语句的信息。这些信息可以简化调优，因为否则很难找到程序调用的所有语句的 `SQL_ID`：


    ```

    --Statements in the procedure.

    select text, type, line, col, sql_id

    from user_statements;

    TEXT                         TYPE    LINE  COL  SQL_ID

    ---------------------------  ------  ----  ---  -------------

    SELECT COUNT(*) FROM LAUNCH  SELECT     4    4  046cuu31c149u

    ```


    `PL/Scope` 提供了高级信息，但它并不能真正解析我们的程序。在实践中，我很少发现 `PL/Scope` 的用途。即使是像识别依赖关系这样的任务，`PL/Scope`
    通常也不够用，因为它只查找`static`依赖关系。


    ### PLSQL_LEXER


    语言问题需要将程序分解成小块。最小的块可能是字节和字符，但它们太底层而无法使用。解析的原子单位是`token`。`token` 是一系列字符，其分类方式对编译器有用。词法分析是将程序分解为
    `token` 的过程。


    即使是 SQL 或 PL/SQL 的词法分析对于小型字符串函数或正则表达式来说也太难了。像注释和替代引用机制这样的特性使得从程序中间提取 `token` 变得困难。我构建了开源包
    `PLSQL_LEXER`^([^(48)](#fn48)) 来将 SQL 和 PL/SQL 分解为 `token`。一旦我们有了 `token`，我们就可以开始理解代码、更改
    `token` 并将 `token` 重新组装成程序的新版本。以下是从 SQL 语句创建 `token` 的简单示例：


    ```

    --Tokenize a simple SQL statement.

    select type, to_char(value) value, line_number, column_number

    from plsql_lexer.lex(''select*from dual'');

    TYPE         VALUE    LINE_NUMBER   COLUMN_NUMBER

    ----------   ------   -----------   -------------

    word         select             1               1

    *            *                  1               7

    word         from               1               8

    whitespace                      1              12

    word         dual               1              13

    EOF                             1              17

    ```


    前面的输出非常底层，而这正是我们动态分析和修改程序所需要的。有了 `token`，我们可以做诸如对语句进行分类（因为动态 SQL 必须以不同方式处理`SELECT`和`CREATE`）、移除语句终止符（因为动态
    SQL 不能以分号结尾）或执行一些简单的 linting（检查常见错误，如将提示注释放在错误位置）等事情。使用 `token` 是痛苦的，但对解决具有挑战性的语言问题是必要的。'
  raw: '### Converged Database and Connections


    Oracle’s converged database model brings virtually every IT concept either inside
    the database or closely connected to the database. Every workload, programming
    paradigm, and data model can be built inside Oracle. But even when our data is
    stored in another system, Oracle provides tools to access it.


    Connectivity is one of Oracle’s greatest strengths compared with other databases.
    The power and simplicity of database links can be extended to many non-Oracle
    database systems through ODBC or the heterogeneous services option. Accessing
    external files can be easily done through PL/SQL APIs, BFILEs, or external tables.
    Newer versions even make it easy for Oracle to connect to object stores through
    data pump and external tables. Big data connectors allow Oracle to access NoSQL
    sources, like the Hadoop Distributed File System, and also allow those sources
    to process Oracle data.


    ## Summary


    Whenever someone asks, “Can I do this in an Oracle database?”, the answer is always
    “yes.” We don’t always *want* to solve everything in Oracle, but the option always
    exists. Oracle is much more than a simple bit bucket. If our organization has
    already invested a lot of time and money into Oracle, we shouldn’t ignore the
    arcane features discussed in this chapter.


    Footnotes [1](#471418_2_En_19_Chapter.xhtml#Fn1_source)


    # 20. Use SQL More Often with Advanced Dynamic SQL


    SQL is Oracle’s greatest strength. Dynamic SQL is important because it gives us
    more opportunities to use SQL. Chapter [14](#471418_2_En_14_Chapter.xhtml) introduced
    the basic features: using dynamic SQL for DDL, unknown objects, and simplifying
    privileges; `EXECUTE IMMEDIATE` and bind variable syntax; simplifying dynamic
    code with multiline strings, alternative quoting syntax, and templating; and the
    benefit of generating code instead of creating generic code.


    Now it’s time to discuss advanced dynamic SQL. These features let us push Oracle
    to its limits and let us walk the fine line between overly generic madness and
    epic solutions. Programming is hard enough; programming program generators is
    incredibly difficult.


    The topics discussed here should only be used after careful consideration. There’s
    usually a simpler, more boring way to solve our problems. But it’s worth remembering
    these solutions because some of the toughest programming problems cannot be solved
    without advanced dynamic SQL.


    ## Parsing


    Parsing SQL is ridiculously hard and is even listed as an anti-pattern in Chapter
    [15](#471418_2_En_15_Chapter.xhtml). Oracle’s SQL syntax is huge and cannot be
    accurately parsed with a mere string function or regular expression. When possible,
    we should look for ways to constrain our code; if we can force code to look a
    certain way, then a simple string function may be sufficient.


    As our input code becomes more generic, we must become more creative in our solutions.
    Parsing is one of those problems where we do not want to jump straight to the
    most powerful programs, because the most powerful programs have huge learning
    curves. If we’re lucky, our problem has already been solved and is stored somewhere
    in the data dictionary. A fair number of code inspection problems can be solved
    with `V$SQL`, `V$SQL_PLAN`, `DBA_DEPENDENCIES`, `DBMS_XPLAN.DISPLAY`, and other
    data dictionary views and tools. For more complex problems, we should look at
    tools like PL/Scope, `PLSQL_LEXER`, and ANTLR.


    ### PL/Scope


    PL/Scope is a tool for inspecting the identifiers and SQL statements used in PL/SQL
    programs. The information PL/Scope provides can help with simple code analysis
    and dependencies. PL/Scope doesn’t provide a huge amount of information, but the
    program is easily accessible and accurate.


    For example, we can analyze a small program by setting a session variable and
    recompiling:


    ```

    --Generate identifier information.

    alter session set plscope_settings=''identifiers:all'';

    create or replace procedure temp_procedure is

    v_count number;

    begin

    select count(*)

    into v_count

    from launch;

    end;

    /

    ```


    The PL/Scope data is stored in the data dictionary and can be read with a query
    like this:


    ```

    --Identifiers in the procedure.

    select

    lpad('' '', (level-1)*3, '' '') || name name,

    type, usage, line, col

    from

    (

    select *

    from user_identifiers

    where object_name = ''TEMP_PROCEDURE''

    ) identifiers

    start with usage_context_id = 0

    connect by prior usage_id = usage_context_id

    order siblings by line, col;

    NAME                TYPE              USAGE         LINE   COL

    -----------------   ---------------   -----------   ----   ---

    TEMP_PROCEDURE      PROCEDURE         DECLARATION      1    11

    TEMP_PROCEDURE   PROCEDURE         DEFINITION       1    11

    V_COUNT       VARIABLE          DECLARATION      2     4

    NUMBER     NUMBER DATATYPE   REFERENCE        2    12

    ```


    We can also get information about the SQL statements called by the program. This
    information can simplify tuning because it’s otherwise difficult to find the `SQL_ID`
    of all statements called by a program:


    ```

    --Statements in the procedure.

    select text, type, line, col, sql_id

    from user_statements;

    TEXT                         TYPE    LINE  COL  SQL_ID

    ---------------------------  ------  ----  ---  -------------

    SELECT COUNT(*) FROM LAUNCH  SELECT     4    4  046cuu31c149u

    ```


    PL/Scope provides high-level information, but it cannot truly parse our programs.
    In practice, I’ve rarely found a use for PL/Scope. Even for a task like identifying
    dependencies, PL/Scope is often insufficient because the program only finds *static*
    dependencies.


    ### PLSQL_LEXER


    Language problems require breaking a program into small pieces. The smallest pieces
    would be bytes and characters, but those are too low level to be useful. The atomic
    units of parsing are tokens. A token is a sequence of characters categorized in
    a way to be useful to a compiler. Lexical analysis is the process of breaking
    a program into tokens.


    Even a lexical analysis of SQL or PL/SQL is too difficult for small string functions
    or regular expressions. Features like comments and the alternative quoting mechanism
    make it difficult to pull a token out of the middle of a program. I built the
    open source package `PLSQL_LEXER`^([^(48)](#fn48)) to break SQL and PL/SQL into
    tokens. Once we have the tokens, we can begin to understand the code, change the
    tokens, and reassemble the tokens into a new version of the program. The following
    is a simple example of creating tokens from a SQL statement:


    ```

    --Tokenize a simple SQL statement.

    select type, to_char(value) value, line_number, column_number

    from plsql_lexer.lex(''select*from dual'');

    TYPE         VALUE    LINE_NUMBER   COLUMN_NUMBER

    ----------   ------   -----------   -------------

    word         select             1               1

    *            *                  1               7

    word         from               1               8

    whitespace                      1              12

    word         dual               1              13

    EOF                             1              17

    ```


    The preceding output is very low level, which is exactly what we need in order
    to dynamically analyze and modify programs. With tokens we can do things like
    classify a statement (because dynamic SQL must treat a `SELECT` different than
    a `CREATE`), remove statement terminators (because dynamic SQL cannot have a semicolon
    at the end), or perform some simple linting (check for common errors like putting
    a hint comment in the wrong location). Working with tokens is painful but necessary
    to solve challenging language problems.'
  trans: '### 融合数据库与连接性


    Oracle 的融合数据库模型将几乎所有的 IT 概念都纳入数据库内部或与之紧密连接。每一种工作负载、编程范式和数据模型都可以在 Oracle 内部构建。但即使我们的数据存储在另一个系统中，Oracle
    也提供了访问工具。


    与其他数据库相比，连接性是 Oracle 最强大的优势之一。数据库链接的强大功能和简洁性可以通过 ODBC 或异构服务选项扩展到许多非 Oracle 数据库系统。通过
    PL/SQL API、BFILE 或外部表，可以轻松访问外部文件。更新版本甚至使 Oracle 能够通过数据泵和外部表轻松连接到对象存储。大数据连接器允许
    Oracle 访问 NoSQL 源（如 Hadoop 分布式文件系统），并允许这些源处理 Oracle 数据。


    ## 总结


    每当有人问，“我能在 Oracle 数据库里做这个吗？”，答案总是“可以”。我们并不总是*想要*在 Oracle 中解决所有问题，但这个选项始终存在。Oracle
    远不止是一个简单的数据存储桶。如果我们的组织已经在 Oracle 上投入了大量时间和资金，我们就不应该忽略本章讨论的这些强大特性。


