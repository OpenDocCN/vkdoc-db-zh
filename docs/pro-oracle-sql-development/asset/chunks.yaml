    If you’re still not convinced of the importance of good names, a few humbling
    code reviews can be convincing. The best cure for the curse of knowledge is to
    watch someone else look at our code and wonder out loud, “What does this mean?”


    ## Whitespace


    Whitespace is one of the limited number of tools available to help us write better
    code. Without as many formatting options as writing a document or email, we must
    rely on whitespace to separate items and shift the reader’s gaze to what’s important.


    Consider the way we use whitespace when writing. Whether we’re writing in a programming
    language or in a natural language, there is a hierarchy of elements. For example,
    this book starts with characters, which aggregate into words, sentences, paragraphs,
    pages, chapters, parts, and finally the entire book. Each one of these elements
    has an increasingly large amount of whitespace to separate them. We all intuitively
    know that rule and follow it. But it’s worth explicitly stating that rule, because
    we sometimes forget to apply it to our programs.


    In PL/SQL, the hierarchy is character, word, statement, and nested block. In SQL,
    the hierarchy is character, word, expression or condition, clause, and nested
    query. Most programmers and code formatters make a mistake at the top of the SQL
    hierarchy. Every query, including every correlated subquery and inline view, is
    important and deserves extra space. As discussed in Chapter [6](#471418_2_En_6_Chapter.xhtml),
    inline views are the key to writing good SQL. Inline views deserve lots of space,
    like in the following code:


    ```

    --Give inline views lots of space.

    select * from

    (

    --Good comment here.

    select * from dual

    ) good_name;

    --Don''t cram everything together.

    select * from (select * from dual);

    ```


    The parentheses in the preceding example are like a `BEGIN` and `END` in PL/SQL.
    Parentheses deserve their own line when they are used to separate inline views.
    And, of course, everything inside the parentheses must be indented an additional
    level. The indenting is critical to understanding the nested structure of our
    code. Giving lots of space to inline views also makes them easier to highlight
    and run, which we will do often for debugging.


    Even if our inline views are small, they are still a high-level SQL concept and
    deserve extra whitespace. Unless the inline views are trivial, we should clearly
    separate them from other parts of the query. Both queries in the preceding example
    might look fine, at first. But this tiny example is misleading, because the second,
    more compressed format does not scale well. For comparison, we would almost never
    put a procedure all on one line, like in the following example:


    ```

    --Typical way to format a procedure.

    create or replace procedure proc1 is

    begin

    null;

    end;

    /

    --Weird way to format a procedure.

    create or replace procedure proc1 is begin null; end;

    /

    ```


    Whitespace is not just important within a query; whitespace is also important
    between queries, like in our SQL worksheets. The examples in this book and in
    the GitHub repository follow this whitespace advice. Each chapter has its own
    file; each heading is separated by three blank lines and a comment; each group
    of commands in an example is separated by two blank lines; each command is separated
    by one blank line. Worksheets are an important part of SQL development, and we
    must all develop a style to help us quickly navigate worksheets.


    The exact number of lines and spaces doesn’t matter. What’s important is that
    we have a consistent and easy-to-use system and that we use increasingly larger
    amounts of whitespace for larger units of work. Even though our IDE provides a
    navigation pane, we still need to make our worksheets, programs, and queries readable.


    ## Make Bugs Obvious


    We can’t make bug-free programs. But we can write our programs in a way to make
    bugs easier to find and fix. Code is inevitably cryptic, but we should try to
    make it as transparent as possible. Our goal is to make our code as clear and
    simple as the truth, even if the truth is embarrassing. This section includes
    generic programming advice and how to apply that advice in a SQL or PL/SQL context.


    ### Fail Fast


    Failing fast is the most important technology concept in recent history. It is
    laughable that we ever believed we could build something right on the first try.
    We need to tolerate and even encourage failures, to more rapidly create something
    that works.


    The most important parts of failing fast are software engineering ideas like automated
    testing, agile, building a minimum viable product, transparency, etc. Some of
    these ideas are discussed in earlier chapters, but most of those large topics
    are not in the scope of this book. The idea of failing fast, and being honest
    about our mistakes and limitations, can percolate down to many of our small day-to-day
    programming decisions. The next sections discuss specific ways to fail fast in
    SQL and PL/SQL.'
