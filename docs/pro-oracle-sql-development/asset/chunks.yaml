- fmt: '### Table Functions


    Table functions return collections that can be used as a row source in SQL statements.
    A common example of table functions is when we view explain plans with `SELECT
    * FROM TABLE(DBMS_XPLAN.DISPLAY)`. With custom table functions, we can use both
    declarative and procedural code to build table data. There are three kinds of
    table functions: regular table functions, pipelined table functions, and parallel
    pipelined table functions.


    Regular table functions return an entire collection all at once. Before we move
    to more advanced pipelined functions or Oracle data cartridge, we should first
    consider using a simple table function. The process of passing in a collection,
    processing the collection, and returning a new collection is powerful enough for
    many tasks.


    For example, let’s say we want to create a custom distinct function in PL/SQL.
    The following code first creates a nested table to hold a collection of numbers.
    Then the code creates a function that accepts a collection of numbers, runs the
    `SET` function to get distinct values from the collection, and returns the new
    collection:


    ```

    --Simple nested table and table function that uses it.

    create or replace type number_nt is table of number;

    create or replace function get_distinct(p_numbers number_nt)

    return number_nt is

    begin

    return set(p_numbers);

    end;

    /

    ```


    We can use the preceding function to find all distinct launch apogees (the furthest
    distance an object travels from Earth). The first step is to bundle the values
    into a specific kind of collection, which is done with the `CAST` and `COLLECT`
    functions. Then the collection is passed to the new function, which processes
    the data and returns another collection. Finally, the `TABLE` operator turns that
    new collection back into relational results:


    ```

    --Distinct launch apogees from a custom PL/SQL function.

    select *

    from table(get_distinct

    ((

    select cast(collect(apogee) as number_nt)

    from launch

    )))

    order by 1;

    COLUMN_VALUE


    ...

    ```


    The preceding function is a poor version of `SELECT DISTINCT APOGEE FROM LAUNCH`.
    The point of the code is to lay the groundwork for more useful functions that
    need to take advantage of procedural code.


    ### Pipelined Functions


    Pipelined functions are a special kind of table function. Pipelined functions
    return collections, but they return collections one row a time. Row-by-row processing
    is usually a bad thing, but in this case there are advantages. By returning rows
    immediately we can chain the functions and have multiple steps of a process working
    concurrently.


    The following is a simple pipelined function that returns three numbers. Notice
    how the function definition includes the keyword `PIPELINED`. These functions
    do not `RETURN` values; instead, the function must call `PIPE ROW` for each row
    returned. Although the function returns a collection, we only pipe one element
    at a time:


    ```

    --Simple pipelined function.

    create or replace function simple_pipe

    return sys.odcinumberlist pipelined is

    begin

    for i in 1 .. 3 loop

    pipe row(i);

    end loop;

    end;

    /

    select * from table(simple_pipe);

    COLUMN_VALUE

    ```


    ### Parallel Pipelined Functions


    Making pipelined functions run in parallel requires a few changes. Parallel pipelined
    functions must be passed a cursor, must have a `PARALLEL_ENABLE` clause that partitions
    the cursor, and must be called with a parallel hint. Setting up parallel pipelined
    functions can be a challenge but can significantly improve the performance of
    procedural code.


    The following code accepts any input cursor, but for the code to work properly,
    the input cursor must select all the columns from the `LAUNCH` table. As the cursor
    is iterated, each row is stored in a record and then piped out. This function
    isn’t doing anything particularly useful – it’s just demonstrating the concepts:


    ```

    --Parallel pipelined function.

    create or replace function parallel_pipe(p_cursor sys_refcursor)

    return sys.odcinumberlist pipelined

    parallel_enable(partition p_cursor by any) is

    v_launch launch%rowtype;

    begin

    loop

    fetch p_cursor into v_launch;

    exit when p_cursor%notfound;

    pipe row(v_launch.launch_id);

    end loop;

    end;

    /

    ```


    The following code shows how to call the new function. The query passes a SQL
    statement to the function with the `CURSOR` keyword. To enable parallelism, we
    need to use a parallel hint. This example is not exactly a subquery, since Oracle
    is passing a pointer to a SQL statement instead of passing sets of data:


    ```

    --Call parallel pipelined function.

    select *

    from table(parallel_pipe(cursor(

    select /*+ parallel(2) */ * from launch

    )));

    COLUMN_VALUE


    ...

    ```


    Pipelined functions are powerful tools, but in practice they are overused. An
    advanced SQL statement is usually better than an advanced pipelined function,
    and a parallel SQL statement will usually outperform a parallel pipelined function.


    ### Autonomous Transactions for DML and DDL


    `SELECT` statements are meant for reading data and should not change the state
    of the database. But in practice, there are important exceptions to that rule.
    There are times when we desperately need to run DML or DDL from a function called
    by a `SELECT` statement.


    If a function includes a change and we call that function from SQL, we will get
    an error like “ORA-14552: cannot perform a DDL, commit or rollback inside a query
    or DML.” The way around that limitation is with a pragma – an instruction for
    the PL/SQL compiler.


    The following code demonstrates how to use `PRAGMA AUTONOMOUS_TRANSACTION` to
    create and call a function that includes a DDL statement:


    ```

    --Function that changes the database.

    create or replace function test_function

    return number authid current_user is

    pragma autonomous_transaction;

    begin

    execute immediate ''create table new_table(a number)'';

    return 1;

    end;

    /

    --Call the function to create the table.

    select /*+ no_result_cache */ test_function from dual;

    TEST_FUNCTION

    ```


    The preceding function is usually a bad idea, since SQL does not guarantee the
    order of execution or even the number of times each piece will be executed. In
    theory, the function could be executed zero, one, or many times. (For example,
    depending on how result cache is configured, Oracle may call the function twice
    the first time the SQL statement is parsed. That’s why the hint `/*+ NO_RESULT_CACHE
    */` is used.) In practice, if we test the code carefully and do not change the
    way the function is called, these functions can be made mostly reliable.'
