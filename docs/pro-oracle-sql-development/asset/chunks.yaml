  trans: "### SQL 的替代方案\n\n世界充满了各种查询语言。有用于处理 XML 的 XQuery，用于查询图数据库的 Cypher，用于通过互联网查询数据的\
    \ REST API，等等。但当涉及到查询关系型数据时，SQL 无疑是最佳选择。\n\n对于查询关系型数据，SQL 的替代方案只具有学术或历史意义。像 QUEL、Rel\
    \ 和 Datalog 这样的语言可能很有趣，但并不实用。技术并非总是人气竞赛，但 SQL 是如此主导，以至于不使用它来进行关系查询是荒谬的。即使有另一种语言更好，它也不会有大量为其编写的程序或大量熟悉它的人。\n\
    \nSQL 对未来来说是一个安全的选择吗？预测不会出现更好的技术是愚蠢的，但预测在不久的将来不会有显著更好的技术取代它是合理的。\n\n有些语言会变老并逐渐消失，但有些语言是永恒的。C\
    \ 和 Lisp 比 SQL 更古老，但它们不会很快消失。Fred Brooks 在 30 多年前撰写关于技术的文章时，就警告我们不要期望软件开发有任何“银弹”。也就是说，不要期望单一项新技术能带来数量级的改进。SQL\
    \ 是一种不断发展的高级语言，很可能这种语言已经是我们所能获得的用于查询关系型数据的最佳工具了。\n\n有些人寄希望于可视化编程语言有朝一日能使数据库查询变得更容易。不幸的是，这不太可能发生，原因有几个。\n\
    \n可视化查询构建器和 SQL 本身一样古老，始于 1970 年代的示例查询（QBE）。这个想法已被多次实现，但很少用于非平凡的查询。用图片编程看起来很酷，但人们很容易忘记文本有多么强大。文本可以轻松共享、修改和进行版本控制。在编程中，一幅图不值千言万语：它只值\
    \ 50 个。\n\n> 可视化编程的问题在于，屏幕上同时显示的视觉原语不能超过 50 个。\n> \n> —L. Peter Deutsch\n\n视觉原语的确切数量尚有争议，但可视化编程语言的信息密度无疑低于文本。\n\
    \n当我在美国国家仪器公司实习时，我有幸在创建了 LabVIEW 的公司工作，这可以说是最好的可视化编程语言。该语言使用起来很有趣，非常适合测试和测量任务。但即使是这家公司的员工也会欣然承认，可视化编程并非万能药。\n\
    \n作为可视化编程的一个例子，图 1-1 展示了一个针对“引言”中简要解释的空间模式的简单查询。\n\n![](img/471418_2_En_1_Fig1_HTML.jpg)\n\
    \n该代码片段包含卫星和发射任务选项，以及一个包含四列七行的表格。\n\n图 1-1\nLibreOffice Base 中的可视化查询\n\n前面的查询查找了在\
    \ 1957 年 10 月 4 日发射的所有卫星。乍一看，图像看起来不错。但可视化查询只在简单示例中看起来美观。可视化查询构建器无法扩展，表之间的连接线很快就会看起来像一团乱麻。以下是使用\
    \ Oracle SQL 的相同查询：\n\n```sql\nselect\n    satellite.norad_id,\n    satellite.launch_id,\n\
    \    launch.launch_date\nfrom satellite\njoin launch\n    on satellite.launch_id\
    \ = launch.launch_id\nwhere trunc(launch.launch_date) = date '1957-10-04'\norder\
    \ by satellite.norad_id;\n```\n\n尽管文本优于图像，但第 2 章将解释为什么我们仍然需要使用集成开发环境（IDE）进行编程。\n\
    \n### SQL 是编程语言吗？\n\n是的。\n\n一些程序员不认为 SQL 是一种“真正的”编程语言，这种错误会导致自我实现的预言。如果 SQL 没有被当作真正的编程语言对待，代码会看起来很糟糕，开发人员会回避\
    \ SQL，这使他们认为它不是真正的编程语言。\n\n没有理论或实际的理由认为 SQL 不是一种“真正的”编程语言。准确定义什么是编程语言及其能做什么，在理论上很重要。但这些测试通常只应用于\
    \ Oracle SQL 的一个稻草人版本。\n\nSQL 不是图灵完备的，这意味着它在理论上不能解决图灵机能解决的所有问题。图灵机是一个可以永远运行的简单抽象机器。SQL\
    \ 没有无限循环，因此无法永远运行，所以从技术上讲它不是图灵完备的。但从来没有人抱怨他们的查询没有花上永远的时间来运行，所以这是一个无意义的理论争论。\n\n\
    而且 Oracle SQL 有许多扩展可以使 SQL 像过程式语言一样工作。借助递归公用表表达式（在第 7 章讨论）和 model 子句（第 19 章），Oracle\
    \ SQL 可以运行命令式代码。多年来，Oracle SQL 和 PL/SQL 一直在缓慢融合，而 PL/SQL 是一种传统的命令式编程语言。\n\n我们使用\
    \ Oracle SQL 能完成的事情，在理论或实践上都没有限制。\n\n## 不同的数据库类型\n\n本书重点介绍 Oracle SQL。对某些人来说，这个重点可能过于狭窄；他们可能使用不同的关系数据库或非关系数据库。对另一些人来说，这个重点可能过于宽泛；他们可能只在特定情境下使用\
    \ Oracle 数据库。本节简要概述了整个数据库领域，并深入探讨了特定的 Oracle 数据库环境。"
- fmt: '### Alternative Database Models


    There are many database products, and it would be foolish to try to quickly compare
    them. An Oracle software installation is larger than most operating systems. We
    should be skeptical of shallow comparisons between databases, since it’s difficult
    to accurately summarize so much functionality.


    But it is helpful to have at least a cursory understanding of the other types
    of databases available. Databases are difficult to precisely categorize and are
    often labeled with buzzwords like NoSQL, big data, NewSQL, etc. The following
    list contains common database selling points, but these items are not necessarily
    mutually exclusive architectures:


    1.  **Key-value**: Uses associative arrays or hashes

    2.  **Object**: Uses objects, as in object-oriented programming

    3.  **Graph**: Uses graphs, like nodes and the edges between them (this is perhaps
    the successor to the network model)

    4.  **Document**: Uses semi-structured files, like JSON or XML

    5.  **Hierarchical**: Uses tree-like structures, like a file system or XML document

    6.  **Online analytical processing (OLAP)**: Uses multidimensional data

    7.  **In-memory**: Stores everything in memory for high performance

    8.  **Embedded**: Small database that can be bundled within another program

    9.  **Streaming**: Reads and writes streams of data in real time

    10. **Column oriented**: Stores data in columns instead of rows

    11. **Distributed/sharded**: Stores data in multiple locations

    12. **Blockchain**: Decentralized, cryptographically secured list of records


    There are interesting technologies in the preceding list, but new technologies
    and products also attract a lot of myths and hype. Relational databases have been
    working well for decades. Given the “no silver bullet” rule, we should be skeptical
    of claims of huge advances in programming technologies.


    I’m not saying don’t investigate or use those products. But if we’ve already paid
    for Oracle, we should think carefully about moving to a different system. Oracle
    is much more than a relational database; Oracle is a converged database (previously
    called a multi-model database) and supports almost every item on the preceding
    list. Whenever a vendor claims that “Oracle cannot do X,” they are wrong (unless
    they add the qualification “for less than a mountain of money”).


    Our databases won’t grow to the size of Facebook’s databases. Our programs may
    be mission critical, but they don’t need to be as reliable as the software monitoring
    nuclear reactors. Software used at the extreme edges of technology may not necessarily
    be appropriate for the average system. A single, smart database is good enough
    for most business applications. Be careful not to over-engineer solutions.


    There are times to consider an alternative, specialized database solution. But
    Oracle is almost certainly capable of handling any database workload.


    ### Different Oracle Databases (OLTP vs. DW)


    Oracle databases are traditionally divided into two categories: online transaction
    processing (OLTP) and data warehousing (DW). Those two environments have different
    goals and require different techniques.


    OLTP systems manage transactions as part of a live application. Those systems
    generally run a large number of fast queries, have precise application logic,
    have a normalized schema, and require all the ACID properties. ACID stands for
    **atomicity** (statements in a transaction either all succeed or all fail), **consistency**
    (data integrity is never lost), **isolation** (concurrent sessions don’t corrupt
    each other), and **durability** (data is never lost).


    Data warehouses allow for querying and analysis of large amounts of data, often
    from multiple sources. Those systems generally run a small number of complex queries;
    have lots of imprecise extract–transform–load (ETL) code; have a denormalized
    schema; and don’t need to be ACID compliant.


    Oracle defaults to OLTP behavior, which is a reasonable default since it is the
    style that best protects our data. It’s up to us to tell Oracle what data we don’t
    care about and when we’re willing to sacrifice ACID properties for better performance.


    That reasonable default has led some people to mistakenly think that Oracle isn’t
    designed for data warehousing. A quick glance at Oracle’s documentation, or the
    following features, makes it obvious that Oracle has invested a lot of effort
    into data warehousing. Data warehousing is not simply bolted on to the database
    – it’s been baked into the database for decades. There are many Oracle features
    geared toward data warehousing: partitioning, parallelism, direct-path writes,
    materialized views, large temp/undo/redo, bitmap indexes, dimensions/hierarchies/attributes,
    materialized zone maps, attribute clustering, etc.


    There’s a large cultural difference between OLTP and data warehouses. OLTP databases
    are run by application developers, lovingly crafted, well maintained, and fanatic
    about never losing data. Data warehouses are run by database programmers, have
    lots of ugly and repetitive code, accumulate lots of junk data, don’t care about
    losing data (it can be reloaded), and are constantly worried about performance.
    When we move from one database style to another, we need to adjust our attitude
    accordingly.


    This section only scratches the surface of the differences. There are many books
    dedicated to data warehousing, such as Oracle’s 732-page *Data Warehousing Guide*.
    However, a lot of the features in that guide are just cool query techniques and
    can apply to any Oracle database. In practice, a lot of systems have some combination
    of both OLTP and data warehousing.


    ## Key Concepts


    **ANSI join syntax** and **inline views** are the keys to writing great SQL statements.
    The ANSI join syntax uses the `JOIN` keyword, instead of a comma-separated list
    of tables. Inline views are nested subqueries in the `FROM` clause.


    That’s the most important lesson in this book, but it may be a difficult lesson
    to learn. SQL developers who spent years using the old comma-separated list syntax
    will have a hard time changing. Unlearning language patterns takes time, which
    is why the ideas are briefly introduced here. ANSI joins and inline views are
    used throughout this book and are fully discussed in Chapters [6](#471418_2_En_6_Chapter.xhtml)
    and [7](#471418_2_En_7_Chapter.xhtml).


    But before that detailed discussion is possible, it’s critical that we have a
