    #### 重要工具：错误代码查询


    My Oracle Support 最重要的功能之一是“ORA-600/ORA-7445/ORA-700 错误查询工具”。在 My Oracle Support
    网站上，搜索 “ORA600 tool” 即可找到那个特殊页面。在该页面上，我们可以输入晦涩的 ORA-600 或 ORA-7445 错误的第一个参数，该工具通常会将我们带到相关的文章。大多数
    ORA-600 错误代码无法在搜索引擎上找到。


    #### 文档质量与服务请求


    My Oracle Support 上的文档通常包含问题描述、可能相关的错误列表、补丁和解决方法。虽然这些文档通常是准确的，但版本号往往过于乐观。如果网站上说“在版本
    X 中修复”，但问题在版本 X+1 中再次发生，请不要感到惊讶。


    创建服务请求是出了名的困难，我还没有找到什么神奇的技巧来获得好的帮助。遵循第 3 章中关于创建最小化、可验证且完整的示例的建议偶尔会有所帮助。但有时，无论我们的测试案例多么优秀，Oracle
    支持都会要求我们上传大量无关信息，直到我们放弃。我的建议是，除非绝对必要，否则不要费心创建服务请求。'
- fmt: '## People to See


    The people we work with are the best resource for our Oracle SQL questions. Coworkers
    who originally architected the system will know the context for our questions
    and can help us avoid XY problems. More importantly, phone calls and face-to-face
    conversations are better than communicating through emails, instant messages,
    and posts. No matter how much we invest in digital collaboration tools, two people
    in a room with a white board is still the best way to communicate.


    But first we need to know who to contact about database questions. Before we start
    bugging our coworkers, it might help to understand a few things about `DBA`s and
    developers and what they can help us with.


    Not all developers can help us with SQL, even if they frequently work with a database.
    Application developers may use an object-relational mapping tool like `Hibernate`
    to handle database access. Business intelligence developers, data analysts, and
    `ETL` programmers may use a proprietary language or a graphical query builder.
    There are many ways to use `Oracle`, so don’t be surprised if you meet people
    who program for `Oracle` databases but don’t know SQL.


    Database administrators are usually the top `Oracle` experts wherever `Oracle`
    is used. Unlike other software companies, `Oracle Corporation` focuses on administrators
    more than developers. Also, developers tend to spend a huge portion of their time
    on business logic, whereas administrators may spend almost all their time on purely
    technical problems. For technical problems, an administrator with 5 years of experience
    may be equivalent to a developer with 10 years of experience. Yet there are many
    rockstar `DBA`s with no SQL skills.


    Many organizations only have operations `DBA`s, who work on problems like backup,
    recovery, installation, account maintenance, and resolving alerts. Those topics
    are complicated but may not require much SQL knowledge. All the development, architecture,
    data analysis, and tuning may be done by the developers.


    But don’t give up on asking `DBA`s for help just because a few of them don’t know
    SQL. `Oracle` is a huge system, and there are many ways to divide database work.
    Many organizations may have application `DBA`s or `DevOps` engineers. Those administrators
    may write code and understand our applications, and they may be the SQL gurus
    we’re looking for.


    Aside from help with our queries, we have lots of other questions. The most important
    thing is to create direct lines of communication. Your company may have people
    with job titles like “requirements analyst” or “project manager.” But we can’t
    always depend on those people. We should always be willing to directly contact
    a client, tester, developer, administrator, vendor, or even some random person
    on the Internet. There may be a few times when someone will get upset that you
    went around them, but we can’t let anyone stop us from getting the information
    we need. It’s easier to ask forgiveness than to ask permission.


    ## Summary


    We must be willing to invest our time to find good resources, both online and
    in person. Now that we’ve discussed how to learn, the next chapter will focus
    on what to learn – the entire stack of technologies used to write SQL.


    # 5. Master the Entire Stack


    Oracle SQL development requires more than just knowledge about Oracle SQL. While
    this book focuses on the Oracle SQL part, this chapter looks at the entire technology
    stack we use to write SQL. This is not a generic technology how-to book, so we
    will look at our technology stack through the eyes of a SQL developer. We need
    to invest in all our tools and processes, from low-level hardware to high-level
    project management.


    Right now, you may only use Oracle SQL for a small part of your job. As your SQL
    skills grow and you find yourself doing more work in the database, it pays to
    invest more in the tools that support your SQL code. Even if you’re not going
    to be a full-time SQL or PL/SQL developer, much of the advice in this chapter
    applies to any programming environment.


    ## Not Just Faster


    Our jobs are full of hierarchies, levels, abstractions, and technology stacks.
    For example, there are the seven layers of the `OSI model` for networking systems.
    Another example of a technology stack is the `LAMP` stack, consisting of `Linux`,
    `Apache`, `MySQL`, and `PHP`. Even when writing an email, we start with letters
    and build our way up to words, phrases, sentences, paragraphs, and finally the
    entire message.


    SQL is a high-level programming language, but it’s worth revisiting the lower
    levels of our technology stack. If you’re reading this book, you already know
    how to use those technologies. But it’s important that we’re not merely scraping
    by on foundational skills.


    We want to learn the fundamental technologies well enough that we don’t have to
    think about them. When we write a SQL statement, we want to think of one and only
    one thing: that SQL statement. We need to master other technologies to free ourselves
    from them. For example, we don’t need to learn everything about our operating
    system, but we need to know enough so that the operating system doesn’t slow us
    down. We need to make an investment: master these technologies now, so we don’t
    have to continually think about them for the rest of our career.


    There are many ways to define a technology stack for SQL development. This chapter
    is organized according to the following list, which starts with the lowest level
    and ends with the highest level:


    1.  `Computer science and math`: The relational model was discussed in Chapter
    [1]. Other computer science and math topics will appear throughout the book.

    2.  `Hardware`: Although choosing the right hardware is obviously important, this
    topic is too broad and is not covered by a specific section of this chapter.

    3.  `Basic input/output system`: The importance of touch typing is discussed in
    the second section of this chapter.

    4.  `Operating system and supporting programs`: Operating system commands and
    helpful programs are discussed in the third section.

    5.  `SQL and PL/SQL`: This entire book covers SQL, and the “Introduction” discussed
    why we should learn it. The fourth section discusses why we may want to master
    SQL and learn related technologies like `PL/SQL`.

    6.  `SQL*Plus`: The fifth section discusses the importance of using just the right
    amount of `SQL*Plus`.

    7.  `Integrated development environment (IDE)`: The sixth section discusses the
    tools we use for developing and querying `Oracle`.

    8.  `Worksheets, notebooks, snippets, scripts, and Gists`: The last section discusses
    how to organize our queries.

    9.  `Project management and architecture`: There’s no specific section on these
    topics, but this book occasionally discusses related issues.'
