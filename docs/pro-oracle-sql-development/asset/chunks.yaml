  trans: '

    ## 学习 PL/SQL 是否值得？


    在你投入更多时间学习 Oracle 之前，有必要先简要思考一下 PL/SQL 是否值得投入。通常 SQL 已足够应对需求，技术趋势正逐渐远离像 Oracle
    SQL 和 PL/SQL 这样的产品，并且存在反对专业化的理由。


    无论你今后在 Oracle 数据库开发中走向何方，重点始终是 SQL。PL/SQL 之所以是一门出色的语言，恰恰在于它与 SQL 的集成非常出色。PL/SQL
    被认为比 SQL 更高级，但“高级”并不总是意味着“更好”。PL/SQL 代码很少比 SQL 代码更快或更简洁，因此我们必须抵制使用晦涩的 PL/SQL 特性而非普通
    SQL 特性的冲动。例如，并行管道函数是一种将 PL/SQL 代码并行化的巧妙方法。该特性优于单线程的 PL/SQL，但最佳选择通常是一条并行的 SQL 语句。


    学习专有的 PL/SQL 语言意味着我们将职业生涯的一部分押注在甲骨文公司（Oracle Corporation）的命运和关系数据库市场的兴衰上。甲骨文公司是最大的软件公司之一，SQL
    是最流行的编程语言之一，甲骨文在关系数据库市场中拥有最大的市场份额，并且 PL/SQL 是 SQL 的最佳过程化语言扩展。另一方面，甲骨文公司的收入停滞不前，其云业务举步维艰，像
    NoSQL 这样的技术正在以牺牲关系数据库为代价而增长，开源技术和语言也在以牺牲专有代码为代价而增长。


    我们还需要考虑关于成为技术通才（generalist）还是专才（specialist）的争论。我们不想成为“样样通，样样松”的人（jack of all trades,
    master of none）。另一方面，拥有广泛背景、简历看起来像“字母汤”（alphabet soup）的开发者正是招聘人员所寻找的。


    学习更多关于 PL/SQL 的知识有充分的理由，但在某些时候，我们的时间或许花在学习一门完全不同的语言上会更有价值。


    ## 创建 PL/SQL 练习场


    我们需要一个安全的“游乐场”（playground）来学习新技能，但在保守的 Oracle 开发环境中，构建沙盒（sandbox）可能具有挑战性。许多开发者没有私有的数据库、私有的模式（schema），甚至没有创建对象的权限。但即使在最糟糕的环境中，我们仍然可以学习
    PL/SQL。


    显然，我们总可以在家用个人电脑或云端创建一个私有数据库，或者可以使用像 [`https://dbfiddle.uk/`](https://dbfiddle.uk/)
    和 [`https://livesql.oracle.com/`](https://livesql.oracle.com/) 这样的网站。但学习技能最简单的方法是在工作中使用它，或者至少使用工作中的数据，而我们不能将公司的数据放入私有数据库。幸运的是，有些技巧可以让我们在没有任何额外权限的情况下，在任何数据库上编写
    PL/SQL。


    在权限高度受限的环境中，匿名块（Anonymous blocks）是开始学习 PL/SQL 的最佳方式。我们可以运行不会改变任何数据的匿名块，而无需任何人知晓。本书已经使用了许多简单的匿名块，但匿名块不一定非得简单。我们可以使用匿名块来模仿大型包（packages）、存储过程和函数。以下示例展示了一个包含嵌套函数的匿名块，该函数又包含一个嵌套的过程：


    ```sql

    --包含嵌套过程和函数的 PL/SQL 块。

    declare

    v_declare_variables_first number;

    function some_function return number is

    procedure some_procedure is

    begin

    null;

    end some_procedure;

    begin

    some_procedure;

    return 1;

    end some_function;

    begin

    v_declare_variables_first := some_function;

    dbms_output.put_line(''Output: ''||v_declare_variables_first);

    end;

    /

    Output: 1

    ```


    我们可以根据需要将函数和过程嵌套任意深度，以模仿大型包。为了练习在 SQL 代码中使用 PL/SQL 对象，我们可以使用 PL/SQL 公共表表达式（common
    table expressions）。只要我们能访问 Oracle 数据库，就总有办法进行 PL/SQL 实验。


    ## PL/SQL 集成特性


    本章并非完整的 PL/SQL 教程。许多基础语法，如变量赋值、`IF`语句和循环，可以通过耳濡目染（osmosis）学会。并且许多语法在 SQL 和 PL/SQL
    中是相同的；大多数操作符、表达式、条件判断和函数在两种语言中的工作方式相同。


    PL/SQL 拥有与 SQL 相同的许多优点。PL/SQL 是一种用于处理数据的高级语言，并且具有高度的可移植性。一个为基于 Itanium 的 HP-UX
    系统编写的 PL/SQL 程序，在基于 Intel x86-64 的 Windows 系统上也能运行无误。


    要完全理解 PL/SQL 语言，我推荐阅读 *《PL/SQL 语言参考手册》（PL/SQL Language Reference）*。该手册是最准确的资料来源，尽管它不一定总是最容易阅读的。本章仅关注于促进
    SQL 与 PL/SQL 集成的 PL/SQL 特性。


    ### 代码打包技巧


    打包代码的第一个也是最显而易见的技巧是使用 `PACKAGE` 来封装相关代码。我们不想用所有的过程和函数来“污染”一个模式（schema）。一个有助于组织代码的简单规则是将包视为名词，而将它们的过程和函数视为动词。


    默认情况下，过程、函数和变量应该只在包主体（package body）中定义，这使得它们成为私有的（private）。在包规范（package specification）中定义的过程、函数和变量是公有的（public）。我们始终希望尽量减少程序的入口点和公共接口的数量。我们向外界公开的每一个程序部分，都是我们必须支持和维护的另一项内容。


    当我们为其他开发者构建程序时，必须仔细考虑程序的依赖项。其他开发者可能没有企业版（Enterprise Edition）、最新版本、提升的权限、能够将整个模式专用于某个项目的能力、Java
    等可选组件、分区（partitioning）等许可选项，等等。

    '
- fmt: '### Session Data


    There are several ways to store and share data within a session using PL/SQL.
    But before we turn to PL/SQL solutions, we should first evaluate if a heap table,
    global temporary table, or private temporary table can be used instead. If tables
    don’t work, we can use the `session state` to persist information for the duration
    of a session. Session state is built with global variables defined in package
    specifications and bodies. The values of those global package variables are retained
    in between calls to the package.


    Global variables defined in a package specification are public. Global public
    variables are easier to access, but they are considered a bad programming practice
    because we can’t control how they are used. If we need to maintain global variables
    in our packages, we should almost always define them in the package body to make
    them private and then create getters and setters for them. SQL cannot directly
    access package global variables; we’ll have to create setters and getters anyway,
    so we might as well use private variables as much as possible. The following code
    shows these rules in action:


    ```

    --Create a package with global public and private variables.

    create or replace package test_package is

    g_public_global number;

    procedure set_private(a number);

    function get_private return number;

    end;

    /

    --Create a package body that sets and gets private variables.

    create or replace package body test_package is

    g_private_global number;

    procedure set_private(a number) is

    begin

    g_private_global := a;

    end;

    function get_private return number is

    begin

    return g_private_global;

    end;

    end;

    /

    --Public variables can be get or set directly in PL/SQL.

    begin

    test_package.g_public_global := 1;

    end;

    /

    --Private variables cannot be set directly. This code raises

    --"PLS-00302: component ''G_PRIVATE_GLOBAL'' must be declared"

    begin

    test_package.g_private_global := 1;

    end;

    /

    --Public variables still cannot be read directly in SQL.

    --This code raises "ORA-06553: PLS-221: ''G_PUBLIC_GLOBAL'' is

    -- not a procedure or is undefined"

    select test_package.g_public_global from dual;

    --Setters and getters with private variables are preferred.

    begin

    test_package.set_private(1);

    end;

    /

    --This function can be used in SQL.

    select test_package.get_private from dual;

    GET_PRIVATE


    ```


    Global variables create a package state that persists until the session ends.
    The error “ORA-04068: existing state of packages has been discarded” may be frustrating,
    but the error is usually our own fault. If we create global variables, and the
    package is recompiled, Oracle can’t possibly know what to do with the existing
    package state. The best way around that error is to avoid using global variables
    unless we truly need them.


    Sometimes it’s helpful to store data in a `context` and read it with the `SYS_CONTEXT`
    function. Context data has been used several times throughout this book, such
    as `SYS_CONTEXT(''USERENV'', ''CURRENT_SCHEMA'')`. Many of our session settings
    are available through the default `USERENV` context, but we can also create our
    own contexts. Custom contexts can be useful for passing data to parallel statements
    since parallel sessions do not inherit package state.


    As we create session data, we must remember that our resources are not infinite.
    Session data will consume PGA memory, so we should avoid loading large tables
    into PL/SQL variables. Sessions also consume PGA for sorting and hashing, as well
    as temporary tablespace for sorting and hashing, and may require lots of undo
    data for large and long-running statements. If we use connection pooling and the
    sessions accumulate large amounts of private data, the application may need to
    call the procedures `DBMS_SESSION.RESET_PACKAGE`, `DBMS_SESSION.FREE_UNUSED_USER_MEMORY`,
    and `DBMS_SESSION.CLEAR_ALL_CONTEXT(''CONTEXT_NAME'')`. A basic understanding
    of Oracle architecture is helpful for managing session resources.


    ### Transactions I: COMMIT, ROLLBACK, and SAVEPOINT


    Atomicity is one of the greatest strengths of a relational database – changes
    are either completely committed or not committed at all. Oracle provides the mechanisms
    to enable atomicity, but it is our responsibility to use transaction control statements
    to precisely define logical transactions. Our PL/SQL code may include many DML
    statements, and we need to use `COMMIT`, `ROLLBACK`, and `SAVEPOINT` to ensure
    that our changes make sense.


    Oracle automatically begins a transaction for the first DML statement in a session,
    but Oracle does not automatically commit or roll back that transaction. However,
    there are notable exceptions to that rule; your client or IDE may be set to auto-commit,
    and DDL commands like `TRUNCATE` and `CREATE` are automatically committed.


    Most of our commits should be manually requested, and we should only issue a `COMMIT`
    when a logical unit of work is done. That advice may sound obvious to some, but
    it may sound dubious to those who are familiar with other database architectures
    where locks and transactions are expensive things to be avoided. In Oracle, we
    do not want to blindly commit after every change. Over-committing causes performance
    problems and may cause a weird half-changed state if there is an application error.


    There is a subtle difference between a `ROLLBACK` command and a rollback caused
    by an error. The `ROLLBACK` command will undo all uncommitted changes in the *transaction*.
    An implicit rollback, caused by an exception, will only undo the *statement*.
    Implicit rollbacks act like a rollback to a `SAVEPOINT` created at the beginning
    of the PL/SQL block.


    To demonstrate transaction control, we need to start by creating a simple table
    for our examples:


    ```

    --Create a simple table for transaction tests.

    create table transaction_test(a number);

    ```


    Exceptions do not automatically roll back the entire transaction. If we run the
    following commands, the initial `INSERT` works, the `UPDATE` fails, but the table
    still contains the row created by the initial `INSERT`:


    ```

    --Insert one row:

    insert into transaction_test values(1);

    --Fails with: ORA-01722: invalid number

    update transaction_test set a = ''B'';

    --The table still contains the original inserted value:

    select * from transaction_test;

    A


    ```


    The preceding example behaves differently if it’s wrapped in PL/SQL, because a
    PL/SQL block is considered a single statement. The `INSERT` still succeeds, and
    the `UPDATE` still fails, but that failure causes the rollback of everything,
    and we are left with no data in the table:


    ```

    --Reset the scratch table.

    truncate table transaction_test;

    --Combine good INSERT and bad UPDATE in a PL/SQL block.

    --Raises: "ORA-01722: invalid number"

    begin

    insert into transaction_test values(1);

    update transaction_test set a = ''B'';

    end;

    /

    --The table is empty:

    select * from transaction_test;

    A

    -

    ```


    This rollback behavior means that we usually do not need to create extra `EXCEPTION`
    blocks only to include a `ROLLBACK` command. A PL/SQL exception is already going
    to roll back the whole block. If we include an explicit `ROLLBACK` command, it
    will roll back the entire transaction, including things that happened before the
    PL/SQL block.


    If we already have an `EXCEPTION` block for some other purpose, we still probably
    don’t need to include a `ROLLBACK` as long as we also include a `RAISE`. As long
    as the exception is propagated, the statement will roll back.


    If we remember how implicit statement rollback works, we can avoid unnecessary
    exception handling, like in the following example:


    ```

    --Unnecessary exception handling.

    begin

    insert into transaction_test values(1);

    update transaction_test set a = ''B'';

    exception when others then

    rollback;

    raise;

    end;

    /

    ```'
