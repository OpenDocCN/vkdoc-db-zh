  trans: '

    ## 1/((1-P)+P/N)：阿姆达尔定律


    对于数据仓库中的最优并行处理，我们必须考虑所有操作。仅仅关注最大的任务是不够的。如果我们的数据库有 `N` 个核心，并且我们希望大型任务的运行速度提升 `N`
    倍，那么我们需要并行化所有操作。


    阿姆达尔定律是前一段内容的数学表达。阿姆达尔定律并非最坏情况下的运行时复杂度，但这个函数对于理解性能至关重要，值得在此讨论。该定律可以用图 16-7 中的等式表示。


    ![](img/471418_2_En_16_Fig7_HTML.png)


    总加速比等于 1 除以括号内的 1 减去并行部分加上并行部分除以并行加速比。


    图 16-7


    阿姆达尔定律等式


    我们无需记住这个等式，列出它只是为了完整性。但我们需要记住阿姆达尔定律的教训，这可以从图 16-8 中的图表学习到。


    ![](img/471418_2_En_16_Fig8_HTML.png)


    一条表示加速比随并行度增加的曲线图，展示了并行部分占比分别为 50%、75%、90%和 95%的情况。


    图 16-8


    阿姆达尔定律图示。基于 Daniels220 的“Amdahl’s Law”，采用 CC BY-SA 许可协议


    请注意，上图使用了对数 X 轴，而 Y 轴上的数字相对较小。这张图的含义令人沮丧；即使最微小的串行部分也会破灭我们让程序运行 `N` 倍快的梦想。


    例如，假设我们有一个大型数据加载任务，并且已经将 95%的流程并行化了。我们的机器有 128 个核心，并且（奇迹般地）并行部分运行速度提升了 128 倍。然而，整个流程的运行速度仅提升了
    17.4 倍。如果我们愚蠢地靠堆硬件来解决问题，将核心数从 128 增加到 256，流程的运行速度也只会提升 18.6 倍。这些都是令人失望的递减回报。


    如果我们的时间花在将并行部分从 95%增加到 96%，效果会好得多，这将使性能从提升 17.4 倍增加到提升 21 倍。这些令人惊讶的性能提升就是为什么我们需要投入大量精力去精确查找流程的时间消耗点。我们都喜欢凭直觉进行调优，但我们的直觉无法区分
    95%和 96%。达到这种精度需要先进的工具和对流程活动的深入分析。


    对于数据仓库操作，我们不能只担心运行时间最长的任务。仅仅并行化 `INSERT` 或 `CREATE TABLE` 语句是不够的。为了获得最大加速比，我们需要在所有其他数据加载操作上投入大量努力。我们需要关注诸如重建索引、重新启用约束、收集统计信息等操作。幸运的是，Oracle
    提供了并行运行所有这些操作的方法。前面的章节包含了并行重建索引和重新启用约束的示例，第 18 章展示了如何轻松地并行收集统计信息。


    为了充分优化大型数据仓库操作，使用 Oracle Enterprise Manager 或`DBMS_SQLTUNE.REPORT_SQL_MONITOR`等工具创建系统活动图会很有帮助。如第
    12 章所讨论的，优化数据仓库操作需要关注哪怕是最微小的系统空闲时间。


    ## O(N)：全表扫描及其他操作


    `O(N)` 是一种简单的线性性能增长。我们在很多地方都能发现这种运行时复杂度：全表扫描、快速全索引扫描（读取所有索引叶节点而非遍历树）、SQL 解析、基本压缩、写入或更改数据等。这里没什么特别的，但当我们开始比较更多函数时，下一部分就会变得有趣。


    大多数 Oracle 操作属于`O(N)`类别。在实践中，我们大部分的调优时间都花在期望获得线性改进上。例如，直接路径写入可以通过减少 REDO 和 UNDO
    数据量来提高性能。这只是一个线性改进，但却是一个显著的改进。


    ### O(N\*LOG(N))：全表扫描 vs. 索引访问、排序、连接、全局 vs. 本地索引、收集统计信息


    `O(N*LOG(N))` 是现实排序算法的最坏情况运行时间。这种运行时复杂度出现在许多意想不到的地方，例如约束验证。前面的章节主要讨论了用于查找单个值的数据结构和算法，现在是时候开始迭代这些算法以查找多个值了。对于查找单个值，`O(LOG(N))`的索引访问显然比`O(N)`的全表扫描更快，但当我们查找不止一行时会发生什么？


    图 16-9 比较了本节讨论的函数：`N²`、`N*LOG(N)`的变体以及`N`。


    ![](img/471418_2_En_16_Fig9_HTML.png)


    一张表示步骤数与输入大小关系的图表，展示了 N 的平方、N 乘以 log N、0.75 N 乘以 log N、0.5 N 乘以 log N 以及 0.25
    N 乘以 log N。


    图 16-9


    比较 `N²`、`N*LOG(N)` 和 `N`


    前面的线条和曲线可用于理解全表扫描与索引访问、排序、连接、全局与本地索引、收集统计信息以及许多其他操作。

    '
- fmt: '### Full Table Scan vs. Index Access


    Indexes are awesome for looking up a single row in a table – it’s hard to beat
    `O(LOG(N))` read time. But other than primary key or unique key indexes, most
    index access will retrieve more than one row. To retrieve multiple rows, Oracle
    must repeat `LOG(N)` multiple times.


    If an index scan is used to look up every row in the table, Oracle has to walk
    the tree `N` times, which leads to a `N*LOG(N)` run time. That run time is clearly
    much worse than just reading the entire table one row at a time. The performance
    difference is obvious if you look at Figure [16-9](#471418_2_En_16_Chapter.xhtml#Fig9)
    and compare the slower, solid line of `N*LOG(N)` against the faster, dotted line
    of `N`. There are many times when a full table scan is faster than index access.


    The performance difference is more complicated when Oracle reads a percentage
    of rows other than 1% or 100%. Notice the dashed lines in Figure [16-9](#471418_2_En_16_Chapter.xhtml#Fig9);
    they represent repeating the `LOG(N)` access for 25%, 50%, or 75% of the rows
    in the table. As the size of the table grows, each curve will eventually overtake
    the linear line for `N`. We cannot simply say that one algorithm is faster than
    another. The fastest algorithm depends on the size of the table and the percentage
    of rows accessed. An index might be a good idea today for reading 25% of a table,
    but a bad idea tomorrow if the table has grown.


    There are other factors that can significantly change the balance. Oracle can
    use multi-block reads for full table scans, as opposed to single-block reads for
    index access. Using multi-block reads, Oracle can read several blocks from a table
    in the same time it takes to read one block from an index. And if the index clustering
    factor is high (if the index is not ordered by the value being searched for),
    an index lookup on a small number of rows may end up reading all of the blocks
    of the table anyway.


    The theory tells us the *shape* of the lines, but only practice can tell us the
    actual values. I can’t give you an exact number for your system, table, and workload.
    But there *is* a number – a point where a full table scan becomes cheaper than
    an index. Finding that number is not trivial, and it should not surprise us that
    Oracle doesn’t always make the right decision.


    When Oracle fails to make the right choice, we shouldn’t throw out the entire
    decision-making process by using an index hint. Instead, we should look for ways
    to provide more accurate information, to help Oracle make better choices. Helping
    Oracle is usually done by gathering optimizer statistics.


    ### Sorting


    `O(N*LOG(N))` is the worst-case run time for popular sorting. We always hope our
    processes will scale linearly, but that is often not the case. In practice, we
    have to deal with algorithms that get slower faster than we anticipate. Sorting
    is a central part of any database and affects `ORDER BY`, analytic functions,
    joining, grouping, finding distinct values, set operations, etc. We need to learn
    how to deal with these slow algorithms and avoid them when possible.


    For planning, we need to be aware of how performance will change over time. If
    sorting one million rows takes 1 second today, we cannot assume that sorting two
    million rows will take 2 seconds tomorrow.


    We also need to be aware of how the space requirements for sorting will change
    with the input size. Luckily, the amount of space required grows linearly. If
    the number of rows doubles, the amount of PGA memory or temporary tablespace required
    to sort will also double.


    There are times when the sorting is already done for us. A B-tree index has already
    been sorted – the work was done during the original `INSERT` or `UPDATE`. Adding
    a row to a table is `O(1)` – the process only requires adding a row to the end
    of a dumb heap. Adding a row to an index is `O(LOG(N))` – the process needs to
    walk the tree to find where to add or update the value.


    Oracle can use an index full scan to read from the index, in order, without having
    to do any sorting. The work has already been done; Oracle just needs to read the
    index from left to right or right to left.


    Oracle can also use a min/max read to quickly find the minimum or maximum value.
    The minimum or maximum value in a B-tree will be either all the way on the left
    or all the way on the right. Once again, the data is already sorted, so finding
    the top or bottom result is a trivial `O(LOG(N))` operation.


    Oddly, there’s a missing feature where Oracle can’t find *both* the min and max
    using a simple min/max read.^([^(35)](#fn35)) But the following code shows a simple
    workaround to this problem: break the problem into two separate queries, and then
    combine the results. Writing an extra subquery is annoying, but it’s a small price
    to pay for a huge improvement in run-time complexity – `O(2*LOG(N))` is much better
    than `O(N)`. When we understand the algorithms and data structures used by Oracle,
    we know what to expect and when to look for a faster workaround:


    ```

    --Create a table and query for min and max values.

    create table min_max(a number primary key);

    --Full table scan or index fast full scan - O(N).

    select min(a), max(a) from min_max;

    --Two min/max index accesses - O(2*LOG(N)).

    select

    (select min(a) from min_max) min,

    (select max(a) from min_max) max

    from dual;

    ```


    The set operations `INTERSECT`, `MINUS/EXCEPT`, and `UNION` require sorting. We
    should use `UNION ALL` when possible because it is the only set operation that
    does not need to sort the results.


    Sorting and joining seem to go together, but in practice they are a bad combination.
    The next section discusses why we don’t want to use sorting for joins.'
