- fmt: '## Input and Output


    As much as we might like to do all our work inside one database, there are times
    when we need to move data between systems. For transferring data, there are many
    powerful extract–transform–load (ETL) tools, like Informatica, and extract–load–transform
    (ELT) tools, like Oracle Data Integrator. Before we build complex workflows with
    those programs, we should consider the pros and cons of using Oracle’s built-in
    tools to transfer data between databases, file systems, and object stores.


    Oracle’s built-in utilities are the simplest, fastest, and most robust programs
    for copying data between two Oracle databases. It is foolish to use a third-party
    program built for generic data when both source and destination are an Oracle
    database. Exporting tables to simple `INSERT` statements or CSV files is much
    harder than most people realize. Unless we’re willing to spend a huge amount of
    time dealing with issues like character sets, large and rare data types, batching,
    and referential integrity, we should stick to Oracle’s binary data transfer tools:


    ### 1. Import/export data pump (`impdp`, `expdp`, `DBMS_DATAPUMP`)


    The only transfer process that supports all data types and features. Data pump
    is fast, has both command line programs and a PL/SQL API, and can be used for
    creating and reading external tables. The only downside is that data pump only
    works on the server, so we need operating system access.^([^(20)](#fn20)) But
    since version 21c, these utilities can also directly access Oracle Cloud Infrastructure
    (OCI) object stores; copying files to and from OCI is generally easier than directly
    loading files onto a server.


    ### 2. Original import/export (`imp`, `exp`)


    An older, less capable version of data pump that runs directly on the client.
    Only use those deprecated programs when we need to access an ancient version of
    Oracle or don’t have server access.


    ### 3. Database links


    Great for small and fast querying. Links don’t support all data types and are
    slow for moving large amounts of data (although database link limitations do not
    apply when links are used with programs like `DBMS_DATAPUMP` or pluggable database
    cloning).


    ### 4. SQL*Plus COPY


    Deprecated program that is only useful for small, simple transfers, where the
    source and destination can’t directly communicate.


    ### 5. Transportable tablespaces


    The fastest way to transfer data, but it copies an entire tablespace and has restrictions.


    When we’re transferring data between Oracle and a non-Oracle system, that data
    will often be transferred through text files. Even though Oracle has many ways
    to read and generate text files, dealing with text files is still a challenge.
    Text file input and output in Oracle is not as convenient as it is in most databases,
    which means we need to be aware of many alternatives. The best solution depends
    on the context. The following list shows different ways of moving text in and
    out of Oracle:


    ### 1. `UTL_FILE`


    This package gives us complete control over how every byte is read and written.
    The downside is that we have to code the file format ourselves and the file must
    be on the server. Conforming to even a simple file format like CSV is harder than
    most developers appreciate. When possible, we should look for pre-built packages
    on top of `UTL_FILE`.^([^(21)](#fn21))


    ### 2. SQL*Loader


    Fast tool that comes with Oracle by default, can work on the client or the server,
    and has many configuration options for things like delimiters and fixed width
    formats. The configuration files and syntax are complicated. SQL*Loader is only
    useful for reading files.


    ### 3. External tables


    A table whose data comes from a flat file, a data pump file, or cloud object storage
    (configured via `DBMS_CLOUD`). External tables are the fastest way to access files,
    but are read-only and require server access. Since 18c, inline external tables
    allow queries to read from external files without creating objects. Querying a
    file can be as simple as:


    ```

    SELECT * FROM EXTERNAL ( (VALUE1 VARCHAR2(100)) DEFAULT DIRECTORY DATA_PUMP_DIR
    LOCATION (''test.csv'') ).

    ```


    ### 4. `DBMS_XSLPROCESSOR`


    Convenient functions `READ2CLOB` and `CLOB2FILE` for CLOB I/O. Since 19c, these
    functions are better used from the package `DBMS_LOB`.


    ### 5. SQL*Plus scripts


    Reading from SQL*Plus scripts to load data is convenient, if we’re able to get
    files in that format. Writing from SQL*Plus scripts can be deceivingly difficult,
    even for simple file formats like CSV. Be careful of SQL*Plus export scripts that
    poorly implement CSV instead of using a command like `SET MARKUP CSV ON`.


    ### 6. Oracle SQL Developer, SQL CL, or other third-party tools


    Most IDEs have options for exporting table data to different formats, such as
    CSV or `INSERT` statements. These tools also have options for either importing
    data from files or helping configure SQL*Loader.'
