  trans: '### 何为内联视图？


    “内联视图”、“子查询”和“关联子查询”这几个术语经常被混用，但理解它们之间的区别非常重要。子查询是指查询内部的任意查询。关联子查询位于 `SELECT`
    或 `WHERE` 子句中，并引用了外部查询的列值。内联视图则是位于 `FROM` 子句中的子查询：


    ```

    --以下两者都是子查询：

    --关联子查询：

    select (select * from dual a where a.dummy = b.dummy) from dual b;

    --内联视图：

    select * from (select * from dual);

    ```


    内联视图很有用，因为它们彼此独立。在上面的例子中，我们可以单独运行内联视图中的子查询。在 IDE 中，运行独立的部分就像高亮选中并点击按钮一样简单。而关联子查询则无法独立运行，它要求一次性理解整个查询。


    每个内联视图本质上就是一个集合，其行为类似于普通的表或视图。类似于函数式编程，内联视图传入一样东西（集合），总是返回相同的结果（另一个集合），并且不依赖于其他任何东西。^(^(¹³)^)


    内联视图可以无限嵌套，但我们需要谨慎把握平衡。我们不希望查询嵌套过深，因为每一层内联视图都需要更多的代码。我们也不希望查询过于扁平，因为那样就必须一次性连接所有表。这取决于我们如何定义一个可用的“块”，而我们的定义可能会随着时间改变。当我们初次使用一个数据模型时，可能一次只连接几个表，但随着对数据的熟悉，连接的表数量会增加。当我们的“块”大小增加时，我们必须记住，我们是在为其他人编写查询，而不仅仅是为自己。


    ### 内联视图使代码更庞大但也更简单


    内联视图存在一个悖论。简化应该让代码更少，但添加内联视图却会使整体代码量变大。例如，查询十张表最简短的方式是将它们一次性全部连接起来。如果我们将列表分成两组，我们仍然需要连接所有表，现在还需要连接这两个组。这种拆分和连接导致了更多的代码，但这仍然是个好主意。


    在下面的伪代码中，第一个查询初看起来可能比第二个更简单：


    ```

    --#1: 一次性连接所有表：

    select ...

    from table1,table2,table3,table4,table5,table6,table7,table8,table9,table10

    where ...;

    --#2: 使用内联视图：

    select *

    from

    (

    select ...

    from table1,table2,table3,table4,table5

    where ...

    ),

    (

    select ...

    from table6,table7,table8,table9,table10

    where ...

    )

    where ...;

    ```


    内联视图版本需要更多字符，那么我们如何能有根据地说第二个版本更简单呢？首先，想想连接那十张表的可能方式。当一次性连接时，在 `WHERE` 子句中可视化及排序这些表的方式有
    `10! = 3,628,800` 种。在内联视图版本中，在 `WHERE` 子句中可视化及排序这些表的方式有 `(5! + 5!) * 2 = 480`
    种。


    上面的数学计算过于精确。我并非声称第二个版本比第一个版本简单整整 7560 倍。关键在于，我们的代码复杂度并非线性增长。向一个十表连接中添加一张表，比向一个五表连接中添加一张表要糟糕得多。这与我们的短期记忆或
    7±2 法则有关。由于我们必须记住这些表以及如何连接它们，我们应该将这个法则减半，采用 3±1 法则。


    ### 一个大型示例中的简单内联视图


    让我们看看第一个实际示例——查找每年最受欢迎的火箭燃料——中的内联视图。这个查询包含三个部分：发射、运载火箭引擎和引擎燃料。首先，我们想找出相关的发射：


    ```

    (

    --轨道及深空发射。

    select *

    from launch

    where launch_category in (''orbital'', ''deep space'')

    ) launches

    ```


    接下来，我们想找出每次发射所使用的引擎。运载火箭（通常是火箭）可以有多级。每一级可以使用不同的引擎：


    ```

    (

    --运载火箭引擎

    select launch_vehicle_stage.lv_id, stage.engine_id

    from launch_vehicle_stage

    left join stage

    on launch_vehicle_stage.stage_name = stage.stage_name

    ) lv_engines

    ```


    最后，我们想找出每个引擎使用的燃料：


    ```

    (

    --引擎燃料

    select engine.engine_id, propellant_name fuel

    from engine

    left join engine_propellant

    on engine.engine_id = engine_propellant.engine_id

    left join propellant

    on engine_propellant.propellant_id = propellant.propellant_id

    where oxidizer_or_fuel = ''fuel''

    ) engine_fuels

    ```


    上述内联视图构成了我们查询的主体，分为三个独立的小块。可以说其中一些内联视图过于简单了。例如，第一个内联视图甚至没有连接表，它只是进行了过滤。但我们应该宁可谨慎。判断一个内联视图是否过于复杂是很困难的。查询编写者，就像所有作者一样，都受到“知识诅咒”的困扰；我们无意识地假定其他人知道我们所知道的一切。由于我们刚刚开始使用这个数据集，我们希望从小处着手。我们知道的越少，“块”就应该越小。


    我们可以使用集合来构建优雅的嵌套结构。但将如此多的工作放在一个 SQL 语句中可能会导致问题。第 12 章讨论了构建大型嵌套查询所引发的样式和性能问题。既然我们已经有了这些小片段，下一节将讨论如何使用
    ANSI 连接语法将它们组合起来。


    ### ANSI 连接


    如果说集合和内联视图块是食材，那么 ANSI 连接就是创建可读 SQL 语句的食谱。使用 `JOIN` 关键字会让我们的查询显得有点冗长，但可读性比字符数量更重要。


    ANSI 连接语法迫使我们一步一步地编写 SQL 语句。我们的查询从一个单一的集合开始，将该集合与其他东西组合以创建一个新的集合，然后重复这个过程直到完成。这些集合可以是表、视图、内联视图、物化视图、表集合表达式、分区、远程对象、使用闪回技术获取的某个时间点的表快照、表示为外部表的
    CSV 文件，以及天知道的其他东西。关系模型的美妙之处在于，集合的来源并不重要。只要集合能返回行和列，它们都可以被同样对待。


    ANSI 连接过程的简单性是关键。当十几个表被快速堆砌在一起时，我们很容易感到困惑。但当我们一次只添加一样东西时，就很难“迷失”在集合中。


    将查询拆分为多个内联视图块并用 `JOIN` 关键字组合它们会使用更多字符。但可读性至关重要。语法辩论中提到的其他一切都无关紧要。如果我们无法读懂自己的 SQL
    语句，那么关于标准符合性、罕见的优化器错误、罕见的语法特性、传统、笛卡尔积以及字符计数的争论都是毫无意义的。'
- fmt: '## Example


    Let’s finally put together our first complex SQL statement. The following query
    shows the most common rocket fuels used per year. The query starts by creating
    three simple inline view chunks: `launches`, `launch vehicle engines`, and `engine
    fuels`. Next, the query combines these three inline views, counts the number of
    uses of fuel per year, ranks the counts, and then selects the top three.


    Building queries with nested inline views will look inside out at first. Unlike
    imperative programming, our query does not flow from top to bottom; the code starts
    in the middle and moves to the outside. In the following example, each inline
    view is numbered to help us navigate the code^([^(14)](#fn14)):


    ```sql

    --Top 3 fuels used per year using ANSI join syntax.

    --

    --#6: Select only the top N.

    select launch_year, fuel, launch_count

    from

    (

    --#5: Rank the fuel counts.

    select launch_year, launch_count, fuel,

    row_number() over

    (partition by launch_year order by launch_count desc) rownumber

    from

    (

    --#4: Count of fuel used per year.

    select

    to_char(launches.launch_date, ''YYYY'') launch_year,

    count(*) launch_count,

    engine_fuels.fuel

    from

    (

    --#1: Orbital and deep space launches.

    select *

    from launch

    where launch_category in (''orbital'', ''deep space'')

    ) launches

    left join

    (

    --#2: Launch Vehicle Engines

    select launch_vehicle_stage.lv_id, stage.engine_id

    from launch_vehicle_stage

    left join stage

    on launch_vehicle_stage.stage_name = stage.stage_name

    ) lv_engines

    on launches.lv_id = lv_engines.lv_id

    left join

    (

    --#3: Engine Fuels

    select engine.engine_id, propellant_name fuel

    from engine

    left join engine_propellant

    on engine.engine_id = engine_propellant.engine_id

    left join propellant

    on engine_propellant.propellant_id = propellant.propellant_id

    where oxidizer_or_fuel = ''fuel''

    ) engine_fuels

    on lv_engines.engine_id = engine_fuels.engine_id

    group by to_char(launches.launch_date, ''YYYY''), engine_fuels.fuel

    order by launch_year, launch_count desc, fuel

    )

    )

    where rownumber <= 3

    order by launch_year, launch_count desc;

    ```


    The preceding code and all other code samples are available on [`https://github.com/apress/pro-oracle-sql-dev-2e`](https://github.com/apress/pro-oracle-sql-dev-2e).
    This book assumes you are using Oracle 12.2 or greater. Examples and syntax that
    require version 18c or greater will be individually noted.


    This book doesn’t often have large chunks of code, and it’s OK if you’re not running
    the examples while reading this book. But this one time I recommend you at least
    load that large query into an IDE and play around with it. Notice how we can easily
    highlight different sections and debug the query. Each numbered section can be
    run independently, and we can easily watch the result set grow until the query
    is complete.


    The first five rows from the query are shown as follows. Old science fiction fans
    may be disappointed – the most popular rocket fuels haven’t changed much in the
    past 60 years. Other than the first few years, the top results are usually UDMH
    (unsymmetrical dimethylhydrazine) and different versions of kerosene. However,
    in the past 20 years, fuels like liquid hydrogen have started to become more popular.
    (This data is clearly not perfect, and some of the values should probably be grouped
    together. But those small errors don’t mean our query is invalid.)


    ```

    LAUNCH_YEAR  FUEL           LAUNCH_COUNT

    -----------  -------------  ------------

    1957         Kero T-1                  4

    1957         Kero                      1

    1957         Solid                     1

    1958         Solid                    39

    1958         JPL 136                  21

    ...

    ```


    ## Summary


    Joins are the most important operation in a database. We’ve got to get the joins
    right if we’re ever going to be successful in a database. The traditional way
    of building queries, with the throw-all-the-tables-in-a-list style, causes many
    problems. Our queries will be much better if we can think in sets, break the query
    into chunks with inline views, and then combine the inline views with the ANSI
    join syntax.


    Footnotes [1](#471418_2_En_6_Chapter.xhtml#Fn1_source)   [2](#471418_2_En_6_Chapter.xhtml#Fn2_source)   [3](#471418_2_En_6_Chapter.xhtml#Fn3_source)   [4](#471418_2_En_6_Chapter.xhtml#Fn4_source)


    ## 7. Query the Database with Advanced SELECT Features


    `SELECT` is the most important SQL statement type. Even when we’re changing data,
    most of the logic will go in the `SELECT` and `WHERE` clauses of the statement.
    Before we can insert, update, or delete a set, we must be able to choose a set.


    This chapter introduces intermediate and advanced Oracle SQL `SELECT` features.
    Each topic could fill a whole chapter or maybe even a whole book. Instead of showing
    all the options and quizzing you on the syntax, this chapter focuses on breadth
    over depth and only tries to show you what is possible. The first step to advanced
    programming and tuning is to simply remember what features are available. When
    we recognize that our SQL can be improved by one of these advanced features, we
    can then look up the syntax in the *SQL Language Reference*.


    The following topics are listed roughly in the order of importance. `SELECT` statements
    almost always have expressions and conditions in the `SELECT` and `WHERE` clauses.
    Most statements will join and sort data. Some statements may combine queries with
    set operators. Tougher problems require advanced grouping, analytic functions,
    regular expressions, row limiting, and pivoting and unpivoting. Rarer problems
    require features like alternative table references, common table expressions,
    and recursive queries. If we have non-relational data, we may need to process
    XML and JSON. Finally, we must occasionally consider National Language Support
    (NLS) issues.


    ### Operators, Functions, Expressions, and Conditions


    Oracle has a huge number of operators, functions, expressions, and conditions.
    We need to understand the precise definition of these four terms, to be able to
    identify situations where we’re missing something, the precedence rules, and how
    to simplify our syntax.


    #### Semantics


    Operators and functions both take inputs and return a value. The difference between
    the two is that operators have a special syntax. For example, we can concatenate
    values with an operator like `''A''||''B''`, or we can concatenate values with
    a function call like `CONCAT(''A'',''A'').`^([^(15)](#fn15)) An expression is
    a combination of literals, functions, and operators that returns a value. Conditions
    are combinations of expressions and operators that return a Boolean value. To
    put it simply, operators are symbols that return a value, functions are passed-in
    arguments and return a value, expressions combine things and return a value, and
    conditions combine things and return a Boolean value.


    The preceding definitions for operators, functions, expressions, and conditions
    are confusing and may seem pedantic, but the difference between them is important.
    In some contexts, not all those four things can be used. For example, a `WHERE`
    clause can have a stand-alone condition, but cannot have a stand-alone expression.
    This statement with a condition is valid: `SELECT * FROM DUAL WHERE 1=1`. This
    statement with an expression is not valid: `SELECT * FROM DUAL WHERE 1+1`.'
  raw: '## Example


    Let’s finally put together our first complex SQL statement. The following query
    shows the most common rocket fuels used per year. The query starts by creating
    three simple inline view chunks: launches, launch vehicle engines, and engine
    fuels. Next, the query combines these three inline views, counts the number of
    uses of fuel per year, ranks the counts, and then selects the top three.


    Building queries with nested inline views will look inside out at first. Unlike
    imperative programming, our query does not flow from top to bottom; the code starts
    in the middle and moves to the outside. In the following example, each inline
    view is numbered to help us navigate the code^([^(14)](#fn14)):


    ```

    --Top 3 fuels used per year using ANSI join syntax.

    --

    --#6: Select only the top N.

    select launch_year, fuel, launch_count

    from

    (

    --#5: Rank the fuel counts.

    select launch_year, launch_count, fuel,

    row_number() over

    (partition by launch_year order by launch_count desc) rownumber

    from

    (

    --#4: Count of fuel used per year.

    select

    to_char(launches.launch_date, ''YYYY'') launch_year,

    count(*) launch_count,

    engine_fuels.fuel

    from

    (

    --#1: Orbital and deep space launches.

    select *

    from launch

    where launch_category in (''orbital'', ''deep space'')

    ) launches

    left join

    (

    --#2: Launch Vehicle Engines

    select launch_vehicle_stage.lv_id, stage.engine_id

    from launch_vehicle_stage

    left join stage

    on launch_vehicle_stage.stage_name = stage.stage_name

    ) lv_engines

    on launches.lv_id = lv_engines.lv_id

    left join

    (

    --#3: Engine Fuels

    select engine.engine_id, propellant_name fuel

    from engine

    left join engine_propellant

    on engine.engine_id = engine_propellant.engine_id

    left join propellant

    on engine_propellant.propellant_id = propellant.propellant_id

    where oxidizer_or_fuel = ''fuel''

    ) engine_fuels

    on lv_engines.engine_id = engine_fuels.engine_id

    group by to_char(launches.launch_date, ''YYYY''), engine_fuels.fuel

    order by launch_year, launch_count desc, fuel

    )

    )

    where rownumber <= 3

    order by launch_year, launch_count desc;

    ```


    The preceding code and all other code samples are available on [`https://github.com/apress/pro-oracle-sql-dev-2e`](https://github.com/apress/pro-oracle-sql-dev-2e).
    This book assumes you are using Oracle 12.2 or greater. Examples and syntax that
    require version 18c or greater will be individually noted.


    This book doesn’t often have large chunks of code, and it’s OK if you’re not running
    the examples while reading this book. But this one time I recommend you at least
    load that large query into an IDE and play around with it. Notice how we can easily
    highlight different sections and debug the query. Each numbered section can be
    run independently, and we can easily watch the result set grow until the query
    is complete.


    The first five rows from the query are shown as follows. Old science fiction fans
    may be disappointed – the most popular rocket fuels haven’t changed much in the
    past 60 years. Other than the first few years, the top results are usually UDMH
    (unsymmetrical dimethylhydrazine) and different versions of kerosene. However,
    in the past 20 years, fuels like liquid hydrogen have started to become more popular.
    (This data is clearly not perfect, and some of the values should probably be grouped
    together. But those small errors don’t mean our query is invalid.)


    ```

    LAUNCH_YEAR  FUEL           LAUNCH_COUNT

    -----------  -------------  ------------

    1957         Kero T-1                  4

    1957         Kero                      1

    1957         Solid                     1

    1958         Solid                    39

    1958         JPL 136                  21

    ...

    ```


    ## Summary


    Joins are the most important operation in a database. We’ve got to get the joins
    right if we’re ever going to be successful in a database. The traditional way
    of building queries, with the throw-all-the-tables-in-a-list style, causes many
    problems. Our queries will be much better if we can think in sets, break the query
    into chunks with inline views, and then combine the inline views with the ANSI
    join syntax.


    Footnotes [1](#471418_2_En_6_Chapter.xhtml#Fn1_source)   [2](#471418_2_En_6_Chapter.xhtml#Fn2_source)
      [3](#471418_2_En_6_Chapter.xhtml#Fn3_source)   [4](#471418_2_En_6_Chapter.xhtml#Fn4_source)


    # 7. Query the Database with Advanced SELECT Features


    `SELECT` is the most important SQL statement type. Even when we’re changing data,
    most of the logic will go in the `SELECT` and `WHERE` clauses of the statement.
    Before we can insert, update, or delete a set, we must be able to choose a set.


    This chapter introduces intermediate and advanced Oracle SQL `SELECT` features.
    Each topic could fill a whole chapter or maybe even a whole book. Instead of showing
    all the options and quizzing you on the syntax, this chapter focuses on breadth
    over depth and only tries to show you what is possible. The first step to advanced
    programming and tuning is to simply remember what features are available. When
    we recognize that our SQL can be improved by one of these advanced features, we
    can then look up the syntax in the *SQL Language Reference*.


    The following topics are listed roughly in the order of importance. `SELECT` statements
    almost always have expressions and conditions in the `SELECT` and `WHERE` clauses.
    Most statements will join and sort data. Some statements may combine queries with
    set operators. Tougher problems require advanced grouping, analytic functions,
    regular expressions, row limiting, and pivoting and unpivoting. Rarer problems
    require features like alternative table references, common table expressions,
    and recursive queries. If we have non-relational data, we may need to process
    XML and JSON. Finally, we must occasionally consider National Language Support
    (NLS) issues.


    ## Operators, Functions, Expressions, and Conditions


    Oracle has a huge number of operators, functions, expressions, and conditions.
    We need to understand the precise definition of these four terms, to be able to
    identify situations where we’re missing something, the precedence rules, and how
    to simplify our syntax.


    ### Semantics


    Operators and functions both take inputs and return a value. The difference between
    the two is that operators have a special syntax. For example, we can concatenate
    values with an operator like `''A''||''B''`, or we can concatenate values with
    a function call like `CONCAT(''A'',''A'').`^([^(15)](#fn15)) An expression is
    a combination of literals, functions, and operators that returns a value. Conditions
    are combinations of expressions and operators that return a Boolean value. To
    put it simply, operators are symbols that return a value, functions are passed-in
    arguments and return a value, expressions combine things and return a value, and
    conditions combine things and return a Boolean value.


    The preceding definitions for operators, functions, expressions, and conditions
    are confusing and may seem pedantic, but the difference between them is important.
    In some contexts, not all those four things can be used. For example, a `WHERE`
    clause can have a stand-alone condition, but cannot have a stand-alone expression.
    This statement with a condition is valid: `SELECT * FROM DUAL WHERE 1=1`. This
    statement with an expression is not valid: `SELECT * FROM DUAL WHERE 1+1`.'
