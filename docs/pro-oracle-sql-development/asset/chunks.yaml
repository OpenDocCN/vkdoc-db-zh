  trans: '## 输入与输出


    尽管我们或许希望所有工作都在单一数据库内完成，但有时仍需在系统之间迁移数据。对于数据传输，有许多强大的**抽取-转换-加载（ETL）** 工具（如 Informatica）和**抽取-加载-转换（ELT）**
    工具（如 Oracle Data Integrator）。在构建这些程序的复杂工作流之前，我们应权衡使用 Oracle 内置工具在数据库、文件系统和对象存储之间传输数据的利弊。


    对于两个 Oracle 数据库之间的数据复制，Oracle 的内置实用程序是最简单、最快速且最稳健的程序。当源和目标均为 Oracle 数据库时，使用为通用数据设计的第三方程序实属不智。将表导出为简单的`INSERT`语句或
    CSV 文件，其难度远超多数人的认知。除非我们愿意耗费大量时间处理字符集、大型稀有数据类型、批处理及参照完整性等问题，否则应坚持使用 Oracle 的二进制数据传输工具：


    ### 1. 导入/导出数据泵（`impdp`、`expdp`、`DBMS_DATAPUMP`）


    这是唯一支持所有数据类型和功能的传输流程。数据泵速度快，同时提供命令行程序和 PL/SQL API，还可用于创建和读取外部表。唯一的缺点是数据泵仅在服务器端运行，因此我们需要操作系统访问权限。^(²⁰)
    但自 21c 版本起，这些实用程序也能直接访问 Oracle 云基础设施（OCI）对象存储；与将文件直接加载到服务器相比，向 OCI 复制文件通常更为便捷。


    ### 2. 传统导入/导出（`imp`、`exp`）


    这是数据泵的一个较旧、功能较少的版本，直接在客户端运行。仅当需要访问古老的 Oracle 版本或无法访问服务器时，才使用这些已废弃的程序。


    ### 3. 数据库链接


    适用于小型快速查询。链接不支持所有数据类型，且在传输大量数据时速度较慢（尽管当链接与`DBMS_DATAPUMP`或可插拔数据库克隆等程序一起使用时，其限制并不适用）。


    ### 4. SQL*Plus COPY


    已废弃的程序，仅适用于小型、简单的传输场景，且要求源和目的地无法直接通信。


    ### 5. 可传输表空间


    传输数据最快的方式，但它会复制整个表空间且存在限制。


    当在 Oracle 与非 Oracle 系统之间传输数据时，数据通常通过文本文件进行传输。尽管 Oracle 提供了多种读取和生成文本文件的方法，但处理文本文件仍是一项挑战。Oracle
    中的文本文件输入输出不如大多数数据库方便，这意味着我们需要了解多种替代方案。最佳解决方案取决于具体情境。以下列出了将文本传入和传出 Oracle 的不同方式：


    ### 1. `UTL_FILE`


    该程序包让我们能够完全控制每个字节的读写方式。缺点在于我们必须自行编码文件格式，且文件必须位于服务器上。即使遵循像 CSV 这样简单的文件格式，其难度也超出大多数开发者的预期。在可能的情况下，我们应寻找基于`UTL_FILE`构建的预封装程序包。^(²¹)


    ### 2. SQL*Loader


    Oracle 默认附带的快速工具，可在客户端或服务器上工作，并提供了许多配置选项（如分隔符和固定宽度格式）。其配置文件和语法较为复杂。SQL*Loader
    仅对读取文件有用。


    ### 3. 外部表


    其数据来源于平面文件、数据泵文件或云对象存储（通过`DBMS_CLOUD`配置）。外部表是访问文件最快的方式，但它们是只读的且需要服务器访问权限。自 18c
    起，内联外部表允许查询直接从外部文件读取，而无需创建对象。查询文件可以简单如：


    ```

    SELECT * FROM EXTERNAL ( (VALUE1 VARCHAR2(100)) DEFAULT DIRECTORY DATA_PUMP_DIR
    LOCATION (''test.csv'') ).

    ```


    ### 4. `DBMS_XSLPROCESSOR`


    提供了便捷的`READ2CLOB`和`CLOB2FILE`函数用于 CLOB 输入输出。自 19c 起，这些函数最好通过`DBMS_LOB`程序包使用。


    ### 5. SQL*Plus 脚本


    如果能获取相应格式的文件，从 SQL*Plus 脚本读取数据以进行加载是方便的。而通过 SQL*Plus 脚本写入文件，即使对于像 CSV 这样的简单文件格式，也可能看似简单实则易错。需警惕那些糟糕地实现了
    CSV 导出功能，而未使用如`SET MARKUP CSV ON`命令的 SQL*Plus 导出脚本。


    ### 6. Oracle SQL Developer、SQL CL 或其他第三方工具


    大多数集成开发环境（IDE）都提供了将表数据导出为不同格式（如 CSV 或`INSERT`语句）的选项。这些工具也支持从文件导入数据或协助配置 SQL*Loader。'
- fmt: "## Useful PL/SQL Packages\n\nAdvanced SQL development inevitably requires\
    \ PL/SQL. PL/SQL is Oracle’s procedural extension for SQL, is available wherever\
    \ Oracle SQL is available, and integrates seamlessly and optimally with SQL. If\
    \ we’re building a program that primarily runs SQL statements, then PL/SQL should\
    \ be our first choice to glue those statements together. While PL/SQL has many\
    \ important uses, this section only discusses the most popular PL/SQL packages\
    \ that help us write better SQL.\n\nFirst, we need to discuss how to run PL/SQL\
    \ packages, without going into a full PL/SQL tutorial. Most packages contain functions\
    \ that we can simply call from a SQL statement. For other PL/SQL functionality,\
    \ we can either create procedural objects or use anonymous blocks. Procedural\
    \ objects are things like packages, procedures, functions, types, etc. But we\
    \ may not have the privileges to create and run PL/SQL objects, and we may not\
    \ want to deal with managing more schema objects. Anonymous blocks are perfect\
    \ for ad hoc tasks.\n\nAnonymous blocks are groups of statements that are run\
    \ together. The block isn’t stored anywhere, doesn’t require an extra compilation\
    \ step, and doesn’t require extra privileges. Blocks contain an optional `DECLARE`\
    \ section to create variables, a body with `BEGIN` and one or more statements,\
    \ and an `END`. We can nest blocks; create functions, procedures, and other objects\
    \ inside the blocks; etc. We could build our entire program in one anonymous block,\
    \ but that would be a bad idea.\n\nLet’s start with the simplest anonymous block.\
    \ Not all the syntax is optional; there has to be at least one statement, so this\
    \ is the smallest PL/SQL block we can write:\n\n```sql\n--The most boring anonymous\
    \ block.\nbegin\nnull;\nend;\n/\n```\n\nLet’s make a more useful anonymous block\
    \ by outputting data:\n\n```sql\n--Anonymous block that does something.\ndeclare\n\
    \  v_number number := 1;\nbegin\n  dbms_output.put_line('Output: ' || to_char(v_number\
    \ + 1));\nend;\n/\n--Output: 2\n```\n\nIf you don’t see the preceding results,\
    \ you may need to configure your IDE to display DBMS output. Some IDEs, like PL/SQL\
    \ Developer, automatically detect and display DBMS output. Some IDEs, like Oracle\
    \ SQL Developer, require us to manually enable DBMS output before we run the example.\
    \ In SQL*Plus, we would run this command to enable the output: `SET SERVEROUTPUT\
    \ ON`.\n\nSQL*Plus has an `EXEC` command to run PL/SQL statements. The `EXEC`\
    \ command takes the input statement and wraps it inside a `BEGIN` and an `END`.\
    \ We should almost always use a regular PL/SQL block instead of the `EXEC` command.\
    \ A PL/SQL block works in every IDE, but `EXEC` only works in some IDEs. As described\
    \ in Chapter [5](#471418_2_En_5_Chapter.xhtml), we should avoid doing PL/SQL development\
    \ in SQL*Plus. (But there are always exceptions.)\n\n```sql\nSQL> set serveroutput\
    \ on\nSQL> exec dbms_output.put_line('test');\n--test\n--PL/SQL procedure successfully\
    \ completed.\n```\n\nWe’ve already seen `DBMS_OUTPUT` a few times in this book.\
    \ The package has multiple functions for sending strings to the output buffer.\
    \ That output may be displayed on the screen, captured by `DBMS_OUTPUT.GET_LINES`,\
    \ displayed as the output for our scheduler jobs, etc.\n\n`DBMS_RANDOM` generates\
    \ pseudorandom text and numbers. This package is useful for generating or selecting\
    \ random test data:\n\n```sql\n--Not-so-randomly generate a number, since the\
    \ seed is static.\nbegin\n  dbms_random.seed(1234);\n  dbms_output.put_line(dbms_random.value);\n\
    end;\n/\n--.42789904690591504247349673921052414639\n```\n\n`DBMS_STATS` is a vital\
    \ package for performance tuning. Optimizer statistics are essential for good\
    \ performance, and there are an enormous number of options for gathering statistics.\
    \ Luckily, 99% of the time, the default settings are perfect, and the package\
    \ is easy to use. (You may need to adjust the first parameter in the following\
    \ examples, depending on the schema used to install the data set.)\n\n```sql\n\
    --Gather stats for a table.\nbegin\n  dbms_stats.gather_table_stats('SPACE', 'LAUNCH');\n\
    end;\n/\n--Gather stats for a schema.\nbegin\n  dbms_stats.gather_schema_stats('SPACE');\n\
    end;\n/\n```\n\n`DBMS_SCHEDULER` lets us create and manage jobs. `DBMS_SCHEDULER`\
    \ is another vital package and has many powerful and complex scheduling features.\
    \ We can create a set of jobs to manage complicated systems, build our own parallelism,\
    \ or just kick off something and have the code run in the background. The following\
    \ code creates and runs the simplest possible job and then checks the job’s status:\n\
    \n```sql\n--Create and run a job that does nothing.\nbegin\n  dbms_scheduler.create_job(\n\
    \    job_name   => 'test_job',\n    job_type   => 'plsql_block',\n    job_action\
    \ => 'begin null; end;',\n    enabled    => true\n  );\nend;\n/\n--Job details.\n\
    --(The first two rows may be empty because one-time jobs\n-- automatically drop\
    \ themselves when they finish.)\nselect * from dba_scheduler_jobs where job_name\
    \ = 'TEST_JOB';\nselect * from dba_scheduler_running_jobs where job_name = 'TEST_JOB';\n\
    select * from dba_scheduler_job_run_details where job_name = 'TEST_JOB';\n```\n\
    \n`DBMS_METADATA` and `DBMS_METADATA_DIFF` were briefly described in Chapter [2](#471418_2_En_2_Chapter.xhtml)\
    \ but are worth repeating. Those packages have lots of options for retrieving,\
    \ formatting, and comparing code. Hopefully we have all our code in version control\
    \ and don’t need to rely on those packages too often.\n\n## Summary\n\nThis chapter\
    \ shows there’s much more to changing data than a simple `INSERT`, `UPDATE`, or\
    \ `DELETE`. These three commands have interesting options and pitfalls, and there’s\
    \ also the powerful `MERGE` statement. DML statements can use updatable views,\
    \ but we should avoid that feature. Hints can significantly change our DML behavior,\
    \ but we must use them with caution. DML can log errors and return data from affected\
    \ rows. There are many other commands that are not DML but can help us change\
    \ our data: `TRUNCATE` to quickly remove table data, `COMMIT` and `ROLLBACK` to\
    \ end transactions, and `ALTER SYSTEM` and `ALTER SESSION` to control the environment.\
    \ Oracle has many ways to get data into and out of the system, and it’s worth\
    \ learning each tool’s pros and cons. Finally, this chapter introduced useful\
    \ PL/SQL packages and how to use them in anonymous blocks.\n\nWe’ve seen how to\
    \ read and write data with advanced SQL. The next chapter discusses how to create\
    \ the objects to hold that data.\n\nFootnotes [1](#471418_2_En_8_Chapter.xhtml#Fn1_source)\
    \   [2](#471418_2_En_8_Chapter.xhtml#Fn2_source)   [3](#471418_2_En_8_Chapter.xhtml#Fn3_source)\
    \   [4](#471418_2_En_8_Chapter.xhtml#Fn4_source)\n\n# 9. Improve the Database\
    \ with Advanced Schema Objects\n\nSo far, this book has used pre-built objects,\
    \ but now it’s time to start making our own. This book assumes you are familiar\
    \ with basic Data Definition Language commands like `CREATE TABLE`. This chapter\
    \ describes advanced features of Oracle schema objects and the advanced DDL commands\
    \ to create and maintain them.\n\nThis chapter does not create an exhaustive list\
    \ of features and expect you to memorize the syntax. Instead, the goal is to introduce\
    \ a wide variety of interesting features. Exposure to these new features and commands\
    \ will give you ideas for your current and future projects. When the time comes\
    \ to implement these new features, look them up in the *SQL Language Reference*\
    \ for more details.\n\nThere’s a chance that running the commands in this chapter\
    \ will break things in our schemas. But none of these commands will break things\
    \ in *other* schemas. If we followed the advice in Part I about setting up efficient\
    \ database development processes, breaking things in our own schema shouldn’t\
    \ be an issue. In fact, if we’re not breaking things, we’re not trying hard enough."
  raw: '## Useful PL/SQL Packages


    Advanced SQL development inevitably requires PL/SQL. PL/SQL is Oracle’s procedural
    extension for SQL, is available wherever Oracle SQL is available, and integrates
    seamlessly and optimally with SQL. If we’re building a program that primarily
    runs SQL statements, then PL/SQL should be our first choice to glue those statements
    together. While PL/SQL has many important uses, this section only discusses the
    most popular PL/SQL packages that help us write better SQL.


    First, we need to discuss how to run PL/SQL packages, without going into a full
    PL/SQL tutorial. Most packages contain functions that we can simply call from
    a SQL statement. For other PL/SQL functionality, we can either create procedural
    objects or use anonymous blocks. Procedural objects are things like packages,
    procedures, functions, types, etc. But we may not have the privileges to create
    and run PL/SQL objects, and we may not want to deal with managing more schema
    objects. Anonymous blocks are perfect for ad hoc tasks.


    Anonymous blocks are groups of statements that are run together. The block isn’t
    stored anywhere, doesn’t require an extra compilation step, and doesn’t require
    extra privileges. Blocks contain an optional `DECLARE` section to create variables,
    a body with `BEGIN` and one or more statements, and an `END`. We can nest blocks;
    create functions, procedures, and other objects inside the blocks; etc. We could
    build our entire program in one anonymous block, but that would be a bad idea.


    Let’s start with the simplest anonymous block. Not all the syntax is optional;
    there has to be at least one statement, so this is the smallest PL/SQL block we
    can write:


    ```

    --The most boring anonymous block.

    begin

    null;

    end;

    /

    ```


    Let’s make a more useful anonymous block by outputting data:


    ```

    --Anonymous block that does something.

    declare

    v_number number := 1;

    begin

    dbms_output.put_line(''Output: '' || to_char(v_number + 1));

    end;

    /

    Output: 2

    ```


    If you don’t see the preceding results, you may need to configure your IDE to
    display DBMS output. Some IDEs, like PL/SQL Developer, automatically detect and
    display DBMS output. Some IDEs, like Oracle SQL Developer, require us to manually
    enable DBMS output before we run the example. In SQL*Plus, we would run this command
    to enable the output: `SET SERVEROUTPUT ON`.


    SQL*Plus has an `EXEC` command to run PL/SQL statements. The `EXEC` command takes
    the input statement and wraps it inside a `BEGIN` and an `END`. We should almost
    always use a regular PL/SQL block instead of the `EXEC` command. A PL/SQL block
    works in every IDE, but `EXEC` only works in some IDEs. As described in Chapter
    [5](#471418_2_En_5_Chapter.xhtml), we should avoid doing PL/SQL development in
    SQL*Plus. (But there are always exceptions.)


    ```

    SQL> set serveroutput on

    SQL> exec dbms_output.put_line(''test'');

    test

    PL/SQL procedure successfully completed.

    ```


    We’ve already seen `DBMS_OUTPUT` a few times in this book. The package has multiple
    functions for sending strings to the output buffer. That output may be displayed
    on the screen, captured by `DBMS_OUTPUT.GET_LINES`, displayed as the output for
    our scheduler jobs, etc.


    `DBMS_RANDOM` generates pseudorandom text and numbers. This package is useful
    for generating or selecting random test data:


    ```

    --Not-so-randomly generate a number, since the seed is static.

    begin

    dbms_random.seed(1234);

    dbms_output.put_line(dbms_random.value);

    end;

    /

    .42789904690591504247349673921052414639

    ```


    `DBMS_STATS` is a vital package for performance tuning. Optimizer statistics are
    essential for good performance, and there are an enormous number of options for
    gathering statistics. Luckily, 99% of the time, the default settings are perfect,
    and the package is easy to use. (You may need to adjust the first parameter in
    the following examples, depending on the schema used to install the data set.)


    ```

    --Gather stats for a table.

    begin

    dbms_stats.gather_table_stats(''SPACE'', ''LAUNCH'');

    end;

    /

    --Gather stats for a schema.

    begin

    dbms_stats.gather_schema_stats(''SPACE'');

    end;

    /

    ```


    `DBMS_SCHEDULER` lets us create and manage jobs. `DBMS_SCHEDULER` is another vital
    package and has many powerful and complex scheduling features. We can create a
    set of jobs to manage complicated systems, build our own parallelism, or just
    kick off something and have the code run in the background. The following code
    creates and runs the simplest possible job and then checks the job’s status:


    ```

    --Create and run a job that does nothing.

    begin

    dbms_scheduler.create_job(

    job_name   => ''test_job'',

    job_type   => ''plsql_block'',

    job_action => ''begin null; end;'',

    enabled    => true

    );

    end;

    /

    --Job details.

    --(The first two rows may be empty because one-time jobs

    -- automatically drop themselves when they finish.)

    select * from dba_scheduler_jobs where job_name = ''TEST_JOB'';

    select * from dba_scheduler_running_jobs where job_name = ''TEST_JOB'';

    select * from dba_scheduler_job_run_details where job_name = ''TEST_JOB'';

    ```


    `DBMS_METADATA` and `DBMS_METADATA_DIFF` were briefly described in Chapter [2](#471418_2_En_2_Chapter.xhtml)
    but are worth repeating. Those packages have lots of options for retrieving, formatting,
    and comparing code. Hopefully we have all our code in version control and don’t
    need to rely on those packages too often.


    ## Summary


    This chapter shows there’s much more to changing data than a simple `INSERT`,
    `UPDATE`, or `DELETE`. These three commands have interesting options and pitfalls,
    and there’s also the powerful `MERGE` statement. DML statements can use updatable
    views, but we should avoid that feature. Hints can significantly change our DML
    behavior, but we must use them with caution. DML can log errors and return data
    from affected rows. There are many other commands that are not DML but can help
    us change our data: `TRUNCATE` to quickly remove table data, `COMMIT` and `ROLLBACK`
    to end transactions, and `ALTER SYSTEM` and `ALTER SESSION` to control the environment.
    Oracle has many ways to get data into and out of the system, and it’s worth learning
    each tool’s pros and cons. Finally, this chapter introduced useful PL/SQL packages
    and how to use them in anonymous blocks.


    We’ve seen how to read and write data with advanced SQL. The next chapter discusses
    how to create the objects to hold that data.


    Footnotes [1](#471418_2_En_8_Chapter.xhtml#Fn1_source)   [2](#471418_2_En_8_Chapter.xhtml#Fn2_source)
      [3](#471418_2_En_8_Chapter.xhtml#Fn3_source)   [4](#471418_2_En_8_Chapter.xhtml#Fn4_source)


    # 9. Improve the Database with Advanced Schema Objects


    So far, this book has used pre-built objects, but now it’s time to start making
    our own. This book assumes you are familiar with basic Data Definition Language
    commands like `CREATE TABLE`. This chapter describes advanced features of Oracle
    schema objects and the advanced DDL commands to create and maintain them.


    This chapter does not create an exhaustive list of features and expect you to
    memorize the syntax. Instead, the goal is to introduce a wide variety of interesting
    features. Exposure to these new features and commands will give you ideas for
    your current and future projects. When the time comes to implement these new features,
    look them up in the *SQL Language Reference* for more details.


    There’s a chance that running the commands in this chapter will break things in
    our schemas. But none of these commands will break things in *other* schemas.
    If we followed the advice in Part I about setting up efficient database development
    processes, breaking things in our own schema shouldn’t be an issue. In fact, if
    we’re not breaking things, we’re not trying hard enough.'
  trans: "\n## 实用的 PL/SQL 包\n\n高级 SQL 开发不可避免地需要使用 PL/SQL。PL/SQL 是 Oracle 为 SQL 提供的过程扩展，凡是有\
    \ Oracle SQL 的地方就有 PL/SQL，并且能与 SQL 无缝、最优地集成。如果我们主要构建一个运行 SQL 语句的程序，那么 PL/SQL 应该是粘合这些语句的首选。虽然\
    \ PL/SQL 有许多重要的用途，但本节仅讨论那些能帮助我们编写更好 SQL 的最受欢迎的 PL/SQL 包。\n\n首先，我们需要讨论如何运行 PL/SQL\
    \ 包，而不深入讲解完整的 PL/SQL 教程。大多数包包含我们可以直接从 SQL 语句中调用的函数。对于其他的 PL/SQL 功能，我们可以创建过程化对象或使用匿名块。过程化对象是指包、过程、函数、类型等。但我们可能没有创建和运行\
    \ PL/SQL 对象的权限，或者可能不想管理更多的模式对象。匿名块非常适合用于临时任务。\n\n匿名块是分组在一起运行的一组语句。该块不存储在任何地方，不需要额外的编译步骤，也不需要额外的权限。块包含一个可选的\
    \ `DECLARE` 部分来创建变量，一个包含 `BEGIN` 和一个或多个语句的主体，以及一个 `END`。我们可以嵌套块；在块内部创建函数、过程和其他对象；等等。我们可以把整个程序构建在一个匿名块里，但这并不是个好主意。\n\
    \n让我们从最简单的匿名块开始。并非所有语法都是可选的；必须至少有一条语句，因此这是我们能编写的最小 PL/SQL 块：\n\n```sql\n--最无聊的匿名块。\n\
    begin\nnull;\nend;\n/\n```\n\n让我们通过输出数据来构建一个更有用的匿名块：\n\n```sql\n--能做点实事的匿名块。\n\
    declare\n  v_number number := 1;\nbegin\n  dbms_output.put_line('Output: ' ||\
    \ to_char(v_number + 1));\nend;\n/\n--Output: 2\n```\n\n如果您没有看到前面的结果，您可能需要配置您的\
    \ IDE 以显示 DBMS 输出。一些 IDE，如 PL/SQL Developer，会自动检测并显示 DBMS 输出。而其他一些 IDE，如 Oracle\
    \ SQL Developer，则需要我们在运行示例前手动启用 DBMS 输出。在 SQL*Plus 中，我们会运行以下命令来启用输出：`SET SERVEROUTPUT\
    \ ON`。\n\nSQL*Plus 有一个 `EXEC` 命令来运行 PL/SQL 语句。`EXEC` 命令获取输入语句，并用 `BEGIN` 和 `END`\
    \ 将其包裹起来。我们几乎总是应该使用常规的 PL/SQL 块，而不是 `EXEC` 命令。PL/SQL 块在所有 IDE 中都有效，但 `EXEC` 命令只在部分\
    \ IDE 中有效。正如第 5 章所述，我们应该避免在 SQL*Plus 中进行 PL/SQL 开发。（但总有例外。）\n\n```sql\nSQL> set\
    \ serveroutput on\nSQL> exec dbms_output.put_line('test');\n--test\n--PL/SQL procedure\
    \ successfully completed.\n```\n\n我们在本书中已经多次看到 `DBMS_OUTPUT`。该包有多个函数用于将字符串发送到输出缓冲区。该输出可能会显示在屏幕上，被\
    \ `DBMS_OUTPUT.GET_LINES` 捕获，显示为我们调度作业的输出，等等。\n\n`DBMS_RANDOM` 生成伪随机文本和数字。此包对于生成或选择随机测试数据非常有用：\n\
    \n```sql\n--并非完全随机地生成一个数字，因为种子是静态的。\nbegin\n  dbms_random.seed(1234);\n  dbms_output.put_line(dbms_random.value);\n\
    end;\n/\n--.42789904690591504247349673921052414639\n```\n\n`DBMS_STATS` 是一个对性能调优至关重要的包。优化器统计信息对于良好性能至关重要，并且有大量用于收集统计信息的选项。幸运的是，99%\
    \ 的情况下，默认设置是完美的，并且该包易于使用。（您可能需要根据安装数据集所用的模式，调整以下示例中的第一个参数。）\n\n```sql\n--收集表的统计信息。\n\
    begin\n  dbms_stats.gather_table_stats('SPACE', 'LAUNCH');\nend;\n/\n--收集模式的统计信息。\n\
    begin\n  dbms_stats.gather_schema_stats('SPACE');\nend;\n/\n```\n\n`DBMS_SCHEDULER`\
    \ 让我们能够创建和管理作业。`DBMS_SCHEDULER` 是另一个至关重要的包，拥有许多强大而复杂的调度功能。我们可以创建一组作业来管理复杂的系统，构建自己的并行处理机制，或者只是启动某个任务并让代码在后台运行。以下代码创建并运行一个最简单的作业，然后检查作业的状态：\n\
    \n```sql\n--创建并运行一个什么都不做的作业。\nbegin\n  dbms_scheduler.create_job(\n    job_name\
    \   => 'test_job',\n    job_type   => 'plsql_block',\n    job_action => 'begin\
    \ null; end;',\n    enabled    => true\n  );\nend;\n/\n--作业详情。\n--（前两行可能因一次性作业完成后会自动删除自身而为空。）\n\
    select * from dba_scheduler_jobs where job_name = 'TEST_JOB';\nselect * from dba_scheduler_running_jobs\
    \ where job_name = 'TEST_JOB';\nselect * from dba_scheduler_job_run_details where\
    \ job_name = 'TEST_JOB';\n```\n\n`DBMS_METADATA` 和 `DBMS_METADATA_DIFF` 在第 2 章中简要提到过，但值得重复说明。这些包提供了大量用于检索、格式化和比较代码的选项。希望我们将所有代码都纳入了版本控制，这样就不太需要经常依赖这些包了。\n\
    \n## 总结\n\n本章展示了数据变更远不止是简单的 `INSERT`、`UPDATE` 或 `DELETE`。这三个命令有其有趣的选项和陷阱，此外还有强大的\
    \ `MERGE` 语句。DML 语句可以使用可更新视图，但我们应该避免使用这个特性。提示可以显著改变我们的 DML 行为，但我们必须谨慎使用它们。DML\
    \ 可以记录错误并从受影响的行返回数据。还有许多其他命令本身不是 DML，但能帮助我们改变数据：`TRUNCATE` 用于快速删除表数据，`COMMIT`\
    \ 和 `ROLLBACK` 用于结束事务，`ALTER SYSTEM` 和 `ALTER SESSION` 用于控制环境。Oracle 有很多方法让数据进出于系统，值得了解每种工具的优缺点。最后，本章介绍了有用的\
    \ PL/SQL 包以及如何在匿名块中使用它们。\n\n我们已经了解了如何使用高级 SQL 读写数据。下一章将讨论如何创建用于保存这些数据的对象。\n\n\
    脚注 1   2   3   4\n\n# 9. 使用高级模式对象改进数据库\n\n到目前为止，本书一直使用预先构建的对象，但现在是时候开始制作我们自己的对象了。本书假定您熟悉基本的数据定义语言命令，如\
    \ `CREATE TABLE`。本章描述 Oracle 模式对象的高级特性以及用于创建和维护它们的高级 DDL 命令。\n\n本章的目的不是罗列一份详尽的特性列表并期望您记住语法。相反，其目标是介绍各种各样有趣的功能。接触这些新特性和命令将为您当前和未来的项目带来灵感。当需要实现这些新特性时，请查阅\
    \ *SQL 语言参考手册* 以获取更多细节。\n\n运行本章中的命令有可能会破坏我们模式中的某些东西。但这些命令都不会破坏*其他*模式中的东西。如果我们遵循第一部分中关于建立高效数据库开发流程的建议，破坏自己模式中的东西应该不成问题。事实上，如果我们没有破坏任何东西，那说明我们还不够努力。\n"
- fmt: '## ALTER


    `ALTER` 命令让我们能够更改数据库以适应不断变化的需求。本节不讨论具体的 `ALTER` 命令，例如向表中添加列或重新编译对象的确切语法。本节也不包括用于“会话控制”和“系统控制”的
    `ALTER SESSION` 和 `ALTER SYSTEM` 命令。相反，本节只讨论两种 `ALTER` 反模式：使用 `ALTER` 修改代码和不使用
    `ALTER` 修改持久对象。


    Oracle 有 51 种不同的 `ALTER` 命令。害怕从头开始重建模式的开发人员可能会过度解读这些 `ALTER` 命令的强大功能。许多开发人员都问过这样一个问题：我们如何使用
    `ALTER` 向包中添加一个新函数？


    对于前述问题的浅显答案是，我们不能 `ALTER` 过程式代码对象。^([^(22)](#fn22)) `ALTER PACKAGE` 命令仅用于重新编译；该命令并不赋予我们逐个添加函数的能力。


    对于前述问题的更深层次答案是，如果我们甚至在问这样的问题，那说明我们的开发过程出了问题。创建对象很难，但永恒地维护和部署一组更改则更难。正如第 [2](#471418_2_En_2_Chapter.xhtml)
    章所述，我们应该为所有过程式对象（如包、函数和过程）构建一个安装脚本。我们应该为每次部署运行相同的脚本。


    在某些环境中，每次都重新编译所有内容可能效果不佳，但在 Oracle 中它效果很好。只有一种创建代码对象的方式使我们的脚本保持简单和有序。而且如果我们使用的是受版本控制的文件，当我们向包中添加函数时，无论如何我们都会将该函数保存在包的整体中。创建一个单独的
    `ALTER PACKAGE ... ADD FUNCTION` 命令会更麻烦，即使这样的命令是可能的。


    另一方面，当我们害怕更改*持久*对象（如表）时，我们的开发过程就会受到影响。`ALTER TABLE` 命令让我们可以更改表的几乎所有方面。与简单地更改数据相比，我们确实必须更加小心地更改表；因为
    DDL 自动提交，如果出了严重问题，可能会丢失数据。但如果我们有一个完全自动化的开发和测试过程，我们就不应该害怕 DDL。


    害怕更改表是实体-属性-值（EAV）模式的主要原因。EAV 是指我们的表只有几个简单的列，如 `NAME` 和 `VALUE`。EAV 在第 [15](#471418_2_En_15_Chapter.xhtml)
    章作为反模式讨论，但它本身并非邪恶。真正的问题发生在组织如此害怕修改表，以至于将所有内容都存储在 EAV 中，这使得他们的系统难以使用。


    我的简单规则是：始终从头开始重新创建代码，并始终尝试更改持久对象。


    ## Tables


    表是关系数据库中的核心对象，因此 Oracle 有多种不同类型的表、表属性、更改和删除表的方式以及列类型和属性，这并不奇怪。一些重要的表特性，如约束和分区，将在后面章节讨论。


    ### Table Types


    所有表在 SQL 语句中看起来都一样。但在底层，Oracle 可以用多种不同的方式实现表：堆表、全局临时表、私有临时表、分片表、对象关系表、外部表、索引组织表、不可变表和区块链表。


    **Heap tables** 是默认的表类型。“堆”一词意味着表是一堆无组织的东西。以下 `CREATE TABLE` 和数据字典查询显示了即使是最简单的表也包含大量选项。结果太大无法在此显示，因此您需要运行以下查询来查看结果：


    ```

    --创建一个简单表并查看其元数据。

    create table simple_table2(a number, b varchar2(100), c date);

    select dbms_metadata.get_ddl(

    object_type => ''TABLE'',

    name        => ''SIMPLE_TABLE2'',

    schema      => sys_context(''userenv'', ''current_schema'')

    ) from dual;

    select *

    from all_tables

    where table_name = ''SIMPLE_TABLE2''

    and owner = sys_context(''userenv'', ''current_schema'');

    select *

    from all_tab_columns

    where table_name = ''SIMPLE_TABLE2''

    and owner = sys_context(''userenv'', ''current_schema'');

    ```


    **Global temporary tables** 存储只有当前会话才能看到的临时值。数据可以保留到下次提交（使用 `ON COMMIT DELETE
    ROWS` 选项）或直到会话结束（使用 `ON COMMIT PRESERVE ROWS` 选项）。以下示例创建了一个全局临时表，并显示了值在提交后如何消失：


    ```

    --全局临时表，数据保留到下次提交。

    create global temporary table temp_table(a number)

    on commit delete rows;

    --插入数据，它只出现在你的会话中。

    insert into temp_table values(1);

    select count(*) from temp_table;

    COUNT(*)

    --但一旦你提交，数据就消失了。

    commit;

    select count(*) from temp_table;

    COUNT(*)

    ```


    全局临时表往往在几个方面被误用。首先，Oracle 的全局临时表是*全局*的；其*定义*可被其他会话查看，但*数据*则不能。表的定义是永久的，表不需要不断地删除和重建。其次，Oracle
    的全局临时表不是内存结构。写入全局临时表就像写入堆表一样，会写入磁盘。全局临时表对于保存程序的临时结果很有用，但并不适用于频繁的即时创建。与 SQL Server
    不同，Oracle 的全局临时表主要不是为了提高性能。它们在某些情况下可能会提高性能，但我们不应盲目添加全局临时表并期望性能提升。


    全局临时表的最大问题是当它们被用作内联视图的糟糕替代品时。复杂查询最好使用多个内联视图构建，这样可以简化程序并让 Oracle 决定何时读写数据。全局临时表仅在结果需要在多个查询中多次读取，或者在一个查询中完成所有操作不可行时才有用。第
    [12](#471418_2_En_12_Chapter.xhtml) 章讨论了如何创建大型 SQL 语句，实际上很少有查询需要用全局临时表来拆分。


    **Private temporary tables** 在 18c 中引入。它们与全局临时表类似，但存储在 PGA 的内存中，且定义和数据都对会话私有。与全局临时表类似，私有临时表并非改善
    SQL 的万能药。以下示例创建了一个私有临时表，之后可以像使用任何其他表一样使用它，但仅在同一会话中。请注意，私有临时表必须有一个特定的前缀，默认为 `ORA$PTT`：


    ```

    --创建一个私有临时表。

    create private temporary table ora$ptt_private_table(a number)

    on commit drop definition;

    ```'
  raw: '## ALTER


    The `ALTER` commands let us change our database to match our ever-changing requirements.
    This section does not discuss specific `ALTER` commands, such as the precise syntax
    to add columns to tables or to recompile objects. And this section does not include
    the `ALTER SESSION` and `ALTER SYSTEM` commands, which are for “session control”
    and “system control.” Instead, this section only discusses two `ALTER` anti-patterns:
    using `ALTER` to modify code and not using `ALTER` to modify persistent objects.


    Oracle has 51 different `ALTER` commands. Developers who are scared of rebuilding
    schemas from scratch may read too much into the power of those `ALTER` commands.
    Many developers have asked a variant of this question: How can we use `ALTER`
    to add a new function to a package?


    The shallow answer to the preceding question is that we cannot `ALTER` procedural
    code objects.^([^(22)](#fn22)) The `ALTER PACKAGE` command is only for recompiling;
    the command does not give us the ability to add one function at a time.


    The deeper answer to the preceding question is that something is wrong with our
    development process if we’re even asking such a question in the first place. Creating
    objects is hard, but eternally maintaining and deploying a set of changes is even
    harder. As described in Chapter [2](#471418_2_En_2_Chapter.xhtml), we should build
    an installation script for all procedural objects, like packages, functions, and
    procedures. We should run that same script for every deployment.


    Recompiling everything, every time, may not work well in some environments, but
    it works great in Oracle. Having only one way to create code objects keeps our
    scripts simple and organized. And if we’re working with version-controlled files,
    when we add a function to the package, we save the function inside the whole package
    anyway. It would be more work to create a separate `ALTER PACKAGE ... ADD FUNCTION`
    command, if such a thing were even possible.


    On the other hand, our development process suffers when we’re scared of altering
    *persistent* objects, such as tables. The `ALTER TABLE` command lets us change
    almost anything about a table. We do have to be more careful about altering tables
    than simply changing data; since DDL auto-commits, it is possible to lose data
    if something goes horribly wrong. But if we have a fully automated development
    and testing process, we shouldn’t fear DDL.


    Fear of altering tables is the primary cause of the entity–attribute–value (EAV)
    pattern. EAV is when our tables have only a few simple columns, such as `NAME`
    and `VALUE`. EAV is discussed as an anti-pattern in Chapter [15](#471418_2_En_15_Chapter.xhtml),
    but it is not inherently evil. The real problem occurs when organizations are
    so scared of altering tables that they will store everything in an EAV, making
    their systems painful to use.


    My simple rule is this: always recreate code from scratch and always try to alter
    persistent objects.


    ## Tables


    Tables are the central objects in a relational database, so it’s not surprising
    that Oracle has many different types of tables, table properties, ways of altering
    and dropping tables, and column types and properties. Some important table features,
    such as constraints and partitioning, are discussed in a later section.


    ### Table Types


    All tables look the same in a SQL statement. But under the covers, Oracle can
    implement tables in many different ways: heap, global temporary, private temporary,
    sharded, object-relational, external, index-organized, immutable, and blockchain.


    **Heap tables** are the default table type. The word “heap” means the table is
    an unorganized pile of stuff. The following `CREATE TABLE` and data dictionary
    queries show how even the simplest table contains a huge number of options. The
    results are too large to show here, so you’ll have to run the following queries
    to explore the results:


    ```

    --Create a simple table and see its metadata.

    create table simple_table2(a number, b varchar2(100), c date);

    select dbms_metadata.get_ddl(

    object_type => ''TABLE'',

    name        => ''SIMPLE_TABLE2'',

    schema      => sys_context(''userenv'', ''current_schema'')

    ) from dual;

    select *

    from all_tables

    where table_name = ''SIMPLE_TABLE2''

    and owner = sys_context(''userenv'', ''current_schema'');

    select *

    from all_tab_columns

    where table_name = ''SIMPLE_TABLE2''

    and owner = sys_context(''userenv'', ''current_schema'');

    ```


    **Global temporary tables** store temporary values that only the current session
    can see. The data can be preserved either until the next commit, with the option
    `ON COMMIT DELETE ROWS`, or until the end of the session, with the option `ON
    COMMIT PRESERVE ROWS`. The following example creates a global temporary table
    and shows how the value disappears after a commit:


    ```

    --Global temporary table that holds data until next commit.

    create global temporary table temp_table(a number)

    on commit delete rows;

    --Insert data and it shows up ONLY in your session.

    insert into temp_table values(1);

    select count(*) from temp_table;

    COUNT(*)


    --But once you commit, the data is gone.

    commit;

    select count(*) from temp_table;

    COUNT(*)


    ```


    Global temporary tables tend to be misused in several ways. First, Oracle’s global
    temporary tables are *global*; the *definition* is viewable by other sessions,
    but the *data* is not. The table definition is permanent, and the table doesn’t
    need to be constantly dropped and recreated. Second, Oracle’s global temporary
    tables are not memory structures. Writing to global temporary tables writes to
    disk, just like a heap table. Global temporary tables are useful for holding temporary
    results of programs, but global temporary tables are not meant for frequent ad
    hoc creation. Unlike SQL Server, Oracle’s global temporary tables are not primarily
    intended to boost performance. They may improve performance in some cases, but
    we should not blindly add global temporary tables and expect an improvement.


    The biggest problem with global temporary tables is when they are used as a poor
    replacement for inline views. Complex queries are best built with multiple inline
    views, which simplify the program and let Oracle decide when to read and write
    data. Global temporary tables are only useful when the results will be read multiple
    times in different queries or when doing everything in one query is infeasible.
    Chapter [12](#471418_2_En_12_Chapter.xhtml) discusses how to create large SQL
    statements, and in practice there are few queries that need to be broken up with
    global temporary tables.


    **Private temporary tables** were introduced in 18c. They are similar to global
    temporary tables, except they are stored in memory in the PGA, and both the definition
    and the data are private to the session. Similar to global temporary tables, private
    temporary tables are not a panacea for improving SQL. The following example creates
    a private temporary table, which can then be used like any other table, but only
    in the same session. Note that private temporary tables must have a specific prefix,
    which is `ORA$PTT` by default:


    ```

    --Create a private temporary table.

    create private temporary table ora$ptt_private_table(a number)

    on commit drop definition;

    ```'
