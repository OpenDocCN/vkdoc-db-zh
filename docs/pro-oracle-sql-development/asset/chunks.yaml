  trans: '

    ### 如何构建自动化测试


    如果您尚未开始使用自动化单元测试，那么入门其实非常简单。市面上有各种不同的测试框架可供选择，甚至自己编写一个简单的测试程序也完全可以。不必被众多选择弄得不知所措——无论选择哪个程序，都比什么都不做要好。


    `JUnit` 是最流行的单元测试框架，尽管它是为 `Java` 设计的。该程序属于 `xUnit` 家族，几乎每种编程语言都有类似的程序。单元测试在 `Oracle`
    中不如在 `Java` 中那么普遍，但仍然有几种选择。目前最流行的选项是 `utPLSQL`。


    安装和使用 `utPLSQL` 非常简单：下载一个免费开源程序，解压缩，然后运行一个 `SQL*Plus` 脚本即可。详细步骤可以在该程序的代码仓库 [`https://github.com/utPLSQL/utPLSQL`](https://github.com/utPLSQL/utPLSQL)
    中找到。


    本章仅涵盖该程序的一小部分内容。重点并非重现一个 `utPLSQL` 教程，而是向您展示入门有多么简单。不要被所有选项吓倒。即使我们只使用其 5% 的功能，该程序也足以重塑我们的整个开发流程。


    `utPLSQL` 要求我们在代码中添加“注解”。注解通过包规范中格式化的注释来配置单元测试。测试通过“期望”来执行，即一条将实际值与预期值进行比较的语句。测试通过调用一个预构建的包来执行，其输出可以多种格式查看。


    例如，假设我们想要测试太空数据库中的数据。开始时，我们可能想检查两张主要表 `LAUNCH` 和 `SATELLITE` 中的数据行数。首先，我们创建一个包规范来存放注解。这些注解定义了一个名为“Space”的单一测试套件，以及两个测试：


    ```

    create or replace package space_test as

    -- %suite(Space)

    -- %test(Check number of rows in launch)

    procedure test_launch_count;

    -- %test(Check number of rows in satellite)

    procedure test_satellite_count;

    end;

    /

    ```


    接下来，我们需要实现规范并调用期望。下面的包主体展示了两个过程。每个过程都计算行数，将计数保存到一个变量中，然后将该变量与硬编码的预期数字进行比较。实际上有
    70,535 次发射和 43,113 颗卫星。但为了使结果更有趣，让我们为卫星数量设置一个错误的预期值：


    ```

    create or replace package body space_test as

    procedure test_launch_count is

    v_count number;

    begin

    select count(*) into v_count from space.launch;

    ut.expect(v_count).to_(equal(70535));

    end;

    procedure test_satellite_count is

    v_count number;

    begin

    select count(*) into v_count from space.satellite;

    ut.expect(v_count).to_(equal(9999));

    end;

    end;

    /

    ```


    以下是运行单元测试的几种方法之一：


    ```

    begin

    ut3.ut.run();

    end;

    /

    ```


    以下是运行的 `DBMS_OUTPUT`。输出包含程序名称和两个测试的结果。其中一个测试成功，没有显示任何信息。但有一个期望失败了，输出解释了失败的原因：


    ```

    Space

    Check number of rows in launch [.004 sec]

    Check number of rows in satellite [.005 sec] (FAILED - 1)

    Failures:

    1) test_satellite_count

    Actual: 43113 (number) was expected to equal: 9999 (number)

    at "JHELLER.SPACE_TEST.TEST_SATELLITE_COUNT", line 13 ut.expect(v_count).to_(equal(9999));

    Finished in .013 seconds

    2 tests, 1 failed, 0 errored, 0 disabled, 0 warning(s)

    ```


    就是这样。在不到一小时内，用仅仅几行代码，就构建了一个功能完备的自动化测试套件。自动化测试就是可以如此简单。


    还有许多其他功能可供使用。我们可以生成更漂亮的报告，检查代码覆盖率以确保所有代码行都被测试过，在持续集成系统中使用自动化测试等等。但这些功能并非总是必要，所以不要因为它们而不敢使用单元测试。


    既然我们已经开始编写单元测试，接下来该何去何从？首先，像对待普通代码一样对待这些测试包。测试包可能会变得混乱，充满重复的样板代码，并且为每个测试包含复杂的设置。如果单元测试代码量大于其余代码，也不要惊讶。为了帮助管理单元测试，请将代码拆分成逻辑上的包和文件，并赋予它们良好的名称和注释。


    标准的手动测试建议同样适用于自动化单元测试。尽量测试每一行代码，理想情况下是每一条路径。当存在循环时，为边界条件创建测试——差一错误通常发生在循环的开始或结束处，而不是中间。有时一个测试应该专注于一件小事，这样当测试失败时，我们就确切知道要修复什么。其他时候，一个测试应该涵盖很多内容，以确保我们尽可能多地发现问题。无论采用何种风格，我们必须让失败显而易见；单一失败就应该中断构建并停止所有后续流程。


    ## 用最小、完整且可验证的示例构建知识


    构建非正式的测试用例很困难但很重要。创建一个最小、完整且可验证的测试用例需要时间和纪律。我们必须确保测试用例易于与他人分享，并且要警惕 XY 问题。


    ### 为什么要花这么多时间构建可复现的测试用例？


    开发者需要帮助，需要提出很多问题。尽管我们在幼儿园听过相反的说法，但确实存在很多糟糕的问题。提出编程问题的最佳方式是附带一个可复现的测试用例。


    构建测试用例的第一个好处是，我们很可能会自己解决问题。重新陈述问题并想象向别人解释它，将有助于我们从不同的角度看问题。


    奥卡姆剃刀原理指出，最简单的答案通常就是正确的。对于 `Oracle` `SQL` 问题，最简单的答案通常是以下之一：我们忘了提交、我们打错了字，或者我们实际得到的报错信息并非我们声称的那样。当人们用这些简单的答案回应我们的问题时，这令人沮丧却又很常见，所以不如提前回应他们的疑虑。在人们愿意投入时间解决我们的复杂问题之前，我们必须证明我们遇到的并非简单问题。


    一个好的测试用例也是向自己证明某事并帮助我们避免偏见的绝佳方式。当我们全力以赴想让某件事正常工作或运行得更快时，可能只会看到我们想看到的东西。构建具有可复现、清晰、客观结果的测试，使得自我欺骗变得更加困难。


    可复现的测试用例对于应对潜在的对抗性情况也是必要的。许多人有动机不相信我们，他们会想，“*我们*的软件是完美的——那种故障或行为是不可能的。”这些回应可能会让我们生气，但我们不应该往心里去。无益的回应通常源于有偏见的人，他们下意识地知道，如果我们的投诉毫无根据，他们就可以早点下班回家。或者他们的管理层只关心开启和关闭的工单数量；让工单消失和解决真正问题一样算作业绩。有时我们需要玩一些愚蠢的游戏才能获得我们付费的支持。


    支持工程师让工单消失的最简单方法就是索要更多信息。如果他们要求足够的信息，最终我们会放弃并让他们关闭工单。创建一个好的测试用例将避免许多此类游戏。


    “最小、完整且可验证的示例”这个短语源于 Stack Overflow，并随着时间的推移而发展，旨在帮助人们提出有用的问题。您可以在 [`https://stackoverflow.com/help/mcve`](https://stackoverflow.com/help/mcve)
    阅读完整描述。以下部分在 `Oracle` 环境下解释了该短语的不同组成部分。

    '
- fmt: '### Minimal


    Omit needless code.


    I’m tempted to only use that one sentence for the entire section. Unfortunately,
    simplifying isn’t simple, and we need to work hard to make things look easy.


    Programming is hard, and bugs can multiply quickly. The more code in the test
    case, the more chances there are to introduce irrelevant problems, and the more
    chances there are for people to focus on the wrong thing and nitpick unrelated
    mistakes. Large code takes more time to understand, and fewer people will be willing
    to look at it. If we have a purely technical issue, exclude as much business logic
    as possible. We must shine a focused light on the smallest possible amount of
    code. (But we must measure the code by the number of lines and variables, not
    by the number of characters; don’t use single-letter variable names just to make
    the file size smaller and don’t forget to add helpful comments.)


    The same rules apply to schema objects and data. Do not create two columns when
    one column will do. Do not insert two rows of data when one row will do.


    The tricky part is that our problem may happen in a large context. A problem might
    happen in a query with dozens of tables, reading billions of rows. It can take
    hours to remove as much code and data as possible but still reproduce the bug.
    Cutting a large query in half, checking if it fails, and repeating can take a
    long time. Eventually we will be left with a problem that fits inside a small
    SQL worksheet.


    Minimizing code is time consuming and tedious. But the process lets us pinpoint
    the precise problem, is easier than arguing about the code and data, and avoids
    uploading massive files that nobody wants to read.


    ### Complete


    We must create a test case that is runnable and self-contained. Then we must write
    the code on a fresh database, to ensure that there are no unexpected dependencies
    missing from the test case. People won’t install other products to help us with
    a problem, so make sure everything is in one place.


    The following is an example of a complete test case. The code creates the objects,
    adds the data, gathers optimizer statistics, and runs the problem query:


    ```sql

    --Create the table.

    create table simple_table(simple_column number);

    --Add sample data.

    insert into simple_table select 1 from dual;

    --Gather statistics if it''s a performance problem.

    begin

    dbms_stats.gather_table_stats(user, ''simple_table'');

    end;

    /

    --This is the query that fails or is slow.

    select *

    from simple_table;

    ```


    The preceding code is the ideal, but our entire schema is the reality. We need
    to meet somewhere in the middle. Sometimes it helps to start with the preceding
    code and add real code until something breaks. Other times it helps to start with
    the real schema and subtract until the code works.


    Along with code, we should also provide the full version number and edition. The
    version and edition are relevant to finding specific bugs, and they also limit
    what kind of troubleshooting and workarounds are available. The platform rarely
    matters, but it doesn’t hurt to include it anyway. For example: The preceding
    code works on Oracle 19.3.0.0.0, Enterprise Edition, and 64-bit Windows 10.


    It’s also important to gather system parameters. There are literally hundreds
    of parameters, and it’s hard to know which of them matter. We can narrow down
    the search by only looking for non-default parameters, with this query:


    ```sql

    select name, value

    from v$parameter

    where isdefault = ''FALSE''

    order by name;

    ```


    But even the preceding query is not always good enough. For example, on certain
    processors, the default value for `CPU_COUNT` is wrong and can cause performance
    problems. And many parameters can be changed at the session level, either as part
    of a logon script or through a trigger. Unfortunately, there is no way to get
    a list of all non-default session parameters.


    It’s impossible to make a test case truly complete – if you wish to make a test
    case from scratch, you must first invent the universe. But with a little effort,
    we can get enough information 99% of the time. At the very least, our reproducible
    test case shows others that we’re serious, which makes it more likely for other
    developers to try the sample code and investigate the problem.


    ### Verifiable


    Nobody can verify code that “doesn’t work.” We need objective measures for our
    code, such as a complete error message or detailed performance expectations.


    We all hate error messages and wish they would go away. But we must resist the
    urge to quickly dismiss and ignore error messages. By default, an Oracle error
    will generate the object name, an error number, an error message, and the line
    numbers. If the error propagated through multiple levels, all levels of the error
    message will be included. By default, Oracle includes all the information we need
    to solve most problems. But the error message only helps if we write down the
    *entire* message. Developers go to great lengths to raise useful exception messages.
    Don’t throw out their work by ignoring the messages and saying, “There was an
    error.”


    `SQL*Plus` is not good at interactive querying and programming. The greatest strength
    of `SQL*Plus` is its simple, universal, text-only interface to Oracle. If we can
    do something in `SQL*Plus`, anybody can copy the text, run the code, and verify
    the results for themselves.


    Programs like Oracle SQL Developer are much nicer for most database work, but
    they are not as helpful for creating test cases. If we send a screenshot, other
    developers can’t extract the code as easily. If we send just the text we used
    in SQL Developer, other developers may be missing information about how we ran
    the code – there are different window types with different behaviors. And the
    output and error messages are not always easy to copy in SQL Developer.


    `SQL*Plus` looks ugly, but at least it’s an ugly we can all agree on. With a few
    simple tricks, we can create a `SQL*Plus` environment that shows exactly what
    we ran, where we ran it, and how long it took:


    ```sql

    SQL> set sqlprompt "_user''@''_connect_identifier> "

    JHELLER@orcl9> set timing on

    JHELLER@orcl9> select count(*) from dba_objects;

    COUNT(*)


    Elapsed: 00:00:00.21

    JHELLER@orcl9>

    ```


    Changing the SQL prompt makes it obvious what user ran the code and what database
    it was run on. People are rarely rude enough to directly ask, “Are you sure you’re
    on the right database?” But in their head, they’re thinking it, so we might as
    well put their mind at ease. On the other hand, sometimes the database name is
    sensitive, and we need to hide it. With text output, it’s simple to find and replace
    the name, whereas screenshots often include unintended details, perhaps even from
    other programs.


    The `SET TIMING ON` command shows the wall-clock run time of each statement. And
    the statements themselves are easily copied and pasted. With a tiny amount of
    effort, we can eliminate much of the uncertainties of a test case.


    For performance tuning it is critical to include the precise timing expectations.
    An OLTP system processing one row might expect a result in less than a second.
    A data warehouse processing a billion rows might expect a result in less than
    a week. We must provide more information than “it’s slow.” It helps to explain
    how much time our code takes, how much time we think it should take, and why.
    It helps to list our performance assumptions, because sometimes our expectations
    are unrealistic. Perhaps the process that we think should take less than a second
    couldn’t possibly take less than a second with our current data structures, algorithms,
    and hardware.'
