  raw: '### Oracle IDE Comparison


    We can’t always choose our IDE. Our company may have already purchased one, or
    our projects may require a specific tool. If we’re lucky, we’ll have a say in
    which program we use. And if we’re doing hobby programming at home, then we’ll
    definitely need to decide for ourselves. Use Table [5-1](#471418_2_En_5_Chapter.xhtml#Tab1)
    to help decide which program to use.


    Table 5-1


    Simple Comparison Between the Most Popular Oracle IDEs


    |   | Oracle SQL Developer | PL/SQL Developer | Toad |

    | --- | --- | --- | --- |

    | **Cost** | Free | Cheap | Expensive |

    | **Features** | Better | Good | Best |

    | **Quality** | Good | Best | Better |


    It’s impossible to say that one IDE is always better than another. The best tool
    depends on personal preference, where the tool will be used, the budget, etc.


    Oracle SQL Developer is free and is installed by default with all Oracle clients.
    If Oracle SQL Developer is missing, it’s trivial to install it – just download
    and run a file, no admin privileges required. Because of cost and ease of installation,
    Oracle SQL Developer is the most common choice. There will be times when Oracle
    SQL Developer is the only choice, so it’s worth becoming at least familiar with
    it. But it’s the stereotypical slow Java program, and many of the features don’t
    feel polished.


    Quest’s Toad has the most features and is part of a large ecosystem of tools sold
    by Quest. If we have a large and complex work environment, full of data analysts,
    testers, DBAs, and developers, then we should look at Toad. The biggest downside
    is the massive cost.


    Allround Automations’s PL/SQL Developer is my personal favorite. It’s cheap, fast,
    and high-quality. PL/SQL Developer doesn’t have as many features as the other
    programs, but what it does, it does better. PL/SQL Developer is not free like
    Oracle SQL Developer, but an unlimited site license is cheaper than a single Toad
    license.


    Comparing IDEs is difficult and involves a lot of personal preferences. Many people
    will strongly disagree with my analysis. As long as we all have an IDE and know
    how to use it, we’ll be fine.


    ## Worksheets, Notebooks, Snippets, Scripts, and Gists


    Our whirlwind tour of the Oracle SQL development stack has gone from low-level
    theories to high-level IDEs. Most developers would stop at this point. But there’s
    one final, important piece that most SQL developers forget – we need to organize
    our SQL statements. We need to store the files in a convenient, backed-up, unforgettable
    location. And we need to write our ad hoc SQL statements in worksheets and notebooks,
    not old-fashioned scripts.


    ### Get Organized


    Most of our SQL will eventually be stored in a program. Organizing SQL inside
    programs is important, but internal code structure is not what we’re discussing
    here. This section is about the ad hoc SQL statements and worksheets that we use
    to support our day-to-day work. As we learn more about SQL, we will build a large
    library of helpful statements and worksheets. Our library will come in handy thousands
    of times, and we may be able to carry that knowledge with us for many years.


    The first step toward building a library of statements is to create a memorable
    location to store this information. Sadly, very few SQL developers do this critical
    step, and it’s painful to watch them struggle to remember where they put a statement
    they built yesterday. The details of our filing system are not important, but
    we *must* use something.


    For me, building a SQL library is as simple as three separate folders – one folder
    for worksheets (ad hoc SQL statements that I may need in the future), one folder
    for version-controlled repositories, and another folder for temporary files that
    I’ll only need in the near future. In Windows 10, we can easily add folders to
    the “Quick access” list, and those folders will always appear in every open or
    save dialog. Figure [5-3](#471418_2_En_5_Chapter.xhtml#Fig3) shows an example
    of a simple structure.


    ![](images/471418_2_En_5_Chapter/471418_2_En_5_Fig3_HTML.jpg)


    The snippet of the Windows Explorer Quick access list with drop-down arrow, which
    includes folders for desktop, downloads, Google Drive, worksheets, git, and temp.


    Figure 5-3


    Example of a Windows Explorer Quick access list'
