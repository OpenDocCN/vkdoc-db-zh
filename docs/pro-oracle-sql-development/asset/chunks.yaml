  raw: '### Alternative Database Models


    There are many database products, and it would be foolish to try to quickly compare
    them. An Oracle software installation is larger than most operating systems. We
    should be skeptical of shallow comparisons between databases, since it’s difficult
    to accurately summarize so much functionality.


    But it is helpful to have at least a cursory understanding of the other *types*
    of databases available. Databases are difficult to precisely categorize and are
    often labeled with buzzwords like NoSQL, big data, NewSQL, etc. The following
    list contains common database selling points, but these items are not necessarily
    mutually exclusive architectures:


    1.  *Key**-**value*: Uses associative arrays or hashes


    2.  *Object*: Uses objects, as in object-oriented programming


    3.  *Graph*: Uses graphs, like nodes and the edges between them (this is perhaps
    the successor to the network model)


    4.  *Document*: Uses semi-structured files, like JSON or XML


    5.  *Hierarchical*: Uses tree-like structures, like a file system or XML document


    6.  *Online analytical processing (OLAP)*: Uses multidimensional data


    7.  *In-memory*: Stores everything in memory for high performance


    8.  *Embedded*: Small database that can be bundled within another program


    9.  *Streaming*: Reads and writes streams of data in real time


    10.  *Column oriented*: Stores data in columns instead of rows


    11.  *Distributed/**s**harded*: Stores data in multiple locations


    12.  *Blockchain*: Decentralized, cryptographically secured list of records


    There are interesting technologies in the preceding list, but new technologies
    and products also attract a lot of myths and hype. Relational databases have been
    working well for decades. Given the “no silver bullet” rule, we should be skeptical
    of claims of huge advances in programming technologies.


    I’m not saying don’t investigate or use those products. But if we’ve already paid
    for Oracle, we should think carefully about moving to a different system. Oracle
    is much more than a relational database; Oracle is a converged database (previously
    called a multi-model database) and supports almost every item on the preceding
    list. Whenever a vendor claims that “Oracle cannot do X,” they are wrong (unless
    they add the qualification “for less than a mountain of money”).


    Our databases won’t grow to the size of Facebook’s databases. Our programs may
    be mission critical, but they don’t need to be as reliable as the software monitoring
    nuclear reactors. Software used at the extreme edges of technology may not necessarily
    be appropriate for the average system. A single, smart database is good enough
    for most business applications. Be careful not to over-engineer solutions.


    There are times to consider an alternative, specialized database solution. But
    Oracle is almost certainly capable of handling any database workload.


    ### Different Oracle Databases (OLTP vs. DW)


    Oracle databases are traditionally divided into two categories: online transaction
    processing (OLTP) and data warehousing (DW). Those two environments have different
    goals and require different techniques.


    OLTP systems manage transactions as part of a live application. Those systems
    generally run a large number of fast queries, have precise application logic,
    have a normalized schema, and require all the ACID properties. ACID stands for
    a*tomicity* (statements in a transaction either all succeed or all fail), c*onsistency*
    (data integrity is never lost), i*solation* (concurrent sessions don’t corrupt
    each other), and d*urability* (data is never lost).


    Data warehouses allow for querying and analysis of large amounts of data, often
    from multiple sources. Those systems generally run a small number of complex queries;
    have lots of imprecise extract–transform–load (ETL) code; have a denormalized
    schema; and don’t need to be ACID compliant.


    Oracle defaults to OLTP behavior, which is a reasonable default since it is the
    style that best protects our data. It’s up to us to tell Oracle what data we don’t
    care about and when we’re willing to sacrifice ACID properties for better performance.


    That reasonable default has led some people to mistakenly think that Oracle isn’t
    designed for data warehousing. A quick glance at Oracle’s documentation, or the
    following features, makes it obvious that Oracle has invested a lot of effort
    into data warehousing. Data warehousing is not simply bolted on to the database
    – it’s been baked into the database for decades. There are many Oracle features
    geared toward data warehousing: partitioning, parallelism, direct-path writes,
    materialized views, large temp/undo/redo, bitmap indexes, dimensions/hierarchies/attributes,
    materialized zone maps, attribute clustering, etc.


    There’s a large cultural difference between OLTP and data warehouses. OLTP databases
    are run by application developers, lovingly crafted, well maintained, and fanatic
    about never losing data. Data warehouses are run by database programmers, have
    lots of ugly and repetitive code, accumulate lots of junk data, don’t care about
    losing data (it can be reloaded), and are constantly worried about performance.
    When we move from one database style to another, we need to adjust our attitude
    accordingly.


    This section only scratches the surface of the differences. There are many books
    dedicated to data warehousing, such as Oracle’s 732-page *Data Warehousing Guide*.
    However, a lot of the features in that guide are just cool query techniques and
    can apply to any Oracle database. In practice, a lot of systems have some combination
    of both OLTP and data warehousing.


    ## Key Concepts


    *ANSI join syntax* and *inline views* are the keys to writing great SQL statements.
    The ANSI join syntax uses the `JOIN` keyword, instead of a comma-separated list
    of tables. Inline views are nested subqueries in the `FROM` clause.


    That’s the most important lesson in this book, but it may be a difficult lesson
    to learn. SQL developers who spent years using the old comma-separated list syntax
    will have a hard time changing. Unlearning language patterns takes time, which
    is why the ideas are briefly introduced here. ANSI joins and inline views are
    used throughout this book and are fully discussed in Chapters [6](#471418_2_En_6_Chapter.xhtml)
    and [7](#471418_2_En_7_Chapter.xhtml).


    But before that detailed discussion is possible, it’s critical that we have a
    firm grasp of two key SQL concepts – nulls and joins. Oracle SQL is a vast language.
    It has thousands of keywords and thousands of public objects, such as packages,
    procedures, functions, views, etc. No matter how many of those features we memorize,
    we will not truly understand Oracle SQL until we understand nulls and joins.


    This is the only part of the book that you must completely understand. Do not
    continue until these ideas click in your mind.'
  trans: '

    ### 替代性数据库模型


    市面上有众多数据库产品，试图对其进行快速比较是不明智的。一次 Oracle 软件的安装包就比大多数操作系统还要庞大。我们应对数据库间的浅层比较保持怀疑，因为要准确概括如此多的功能实属困难。


    但至少对现有的其他数据库类型有一个粗略的了解是有益的。数据库很难精确分类，常被贴上 NoSQL、大数据、NewSQL 等流行标签。以下列表包含常见的数据库卖点，但这些项目并非必然互斥的架构：


    1.  **键值型**：使用关联数组或哈希表

    2.  **对象型**：使用对象，类似于面向对象编程

    3.  **图类型**：使用图结构，如节点及节点间的边（这可能是网络模型的后续者）

    4.  **文档型**：使用半结构化文件，如 JSON 或 XML

    5.  **层次型**：使用树状结构，如文件系统或 XML 文档

    6.  **在线分析处理 (OLAP)**：使用多维数据

    7.  **内存型**：将所有数据存储在内存中以获得高性能

    8.  **嵌入式**：可集成到另一程序中的小型数据库

    9.  **流式**：实时读写数据流

    10. **列式**：按列而非按行存储数据

    11. **分布式/分片**：在多个位置存储数据

    12. **区块链**：去中心化、经加密安全的记录列表


    前述列表中包含有趣的技术，但新技术和新产品也往往伴随着大量的神话和炒作。关系型数据库已经良好运行了数十年。鉴于“没有银弹”法则，我们应对编程技术取得巨大飞跃的说法持怀疑态度。


    我并非建议不去研究或使用那些产品。但如果我们已经为 Oracle 付费，就应该仔细考虑是否要迁移到不同的系统。Oracle 远不止是一个关系型数据库；它是一个融合型数据库（以前称为多模型数据库），几乎支持前述列表中的所有项目。每当有厂商声称“Oracle
    做不了 X”时，他们都是错的（除非他们加上“除非花费巨资”这一限定条件）。


    我们的数据库不会增长到 Facebook 那样的规模。我们的程序可能是关键任务型的，但它们不需要像监控核反应堆的软件那样可靠。处于技术极端边缘使用的软件不一定适合普通系统。对于大多数商业应用而言，一个单一、智能的数据库就足够了。小心不要过度设计解决方案。


    确实有时需要考虑替代的、专用的数据库解决方案。但 Oracle 几乎肯定能够处理任何数据库工作负载。


    ### 不同的 Oracle 数据库（OLTP 与 DW）


    Oracle 数据库传统上分为两类：在线事务处理 (OLTP) 和数据仓库 (DW)。这两种环境有不同的目标，需要不同的技术。


    OLTP 系统管理作为实时应用程序一部分的事务。这些系统通常运行大量快速查询，具有精确的应用逻辑、规范化的模式，并且需要满足所有 **ACID** 属性。ACID
    代表**原子性**（事务中的语句要么全部成功，要么全部失败）、**一致性**（数据完整性永不丢失）、**隔离性**（并发会话不会相互破坏）和**持久性**（数据永不丢失）。


    数据仓库允许查询和分析大量数据，通常来自多个来源。这些系统通常运行少量复杂查询；拥有大量不精确的提取-转换-加载 (ETL) 代码；采用反规范化的模式；并且不需要符合
    ACID。


    Oracle 默认为 OLTP 行为，这是一个合理的默认值，因为它是能最好地保护我们数据的方式。是否以及何时为了更好的性能而牺牲 ACID 属性，这取决于我们告知
    Oracle 哪些数据我们不关心。


    这种合理的默认设置导致一些人错误地认为 Oracle 并非为数据仓库而设计。快速浏览一下 Oracle 的文档，或以下功能，就会明显看出 Oracle 在数据仓库方面投入了大量精力。数据仓库并非简单地附加到数据库上——它已经深度集成在数据库中数十年了。有许多
    Oracle 功能面向数据仓库：分区、并行、直接路径写入、物化视图、大型临时/撤销/重做日志、位图索引、维度/层次/属性、物化区域映射、属性集群等。


    OLTP 和数据仓库之间存在巨大的文化差异。OLTP 数据库由应用程序开发人员管理，精心打造，维护良好，并且极度重视永不丢失数据。数据仓库由数据库程序员管理，包含大量丑陋且重复的代码，积累了大量垃圾数据，不关心丢失数据（可以重新加载），并且总是担心性能。当从一种数据库类型迁移到另一种时，我们需要相应地调整态度。


    本节仅触及了差异的皮毛。有许多书籍专门论述数据仓库，例如 Oracle 长达 732 页的《数据仓库指南》。然而，该指南中的许多功能只是很酷的查询技术，可以应用于任何
    Oracle 数据库。实际上，许多系统兼具 OLTP 和数据仓库的某些特点。


    ## 关键概念


    **ANSI 连接语法** 和 **内联视图** 是编写优秀 SQL 语句的关键。ANSI 连接语法使用 `JOIN` 关键字，而不是逗号分隔的表列表。内联视图是
    `FROM` 子句中的嵌套子查询。


    这是本书最重要的一课，但也可能是一堂难学的课。花了多年使用旧式逗号分隔列表语法的 SQL 开发人员将很难改变。忘却语言模式需要时间，这就是为什么在此简要介绍这些概念的原因。ANSI
    连接和内联视图贯穿全书使用，并在第 6 章和第 7 章中详细讨论。


    但在进行详细讨论之前，牢固掌握两个关键 SQL 概念——空值和连接——至关重要。Oracle SQL 是一门庞大的语言。它有数千个关键字和数千个公共对象，如包、过程、函数、视图等。无论我们记住了多少这些特性，直到理解了空值和连接，我们才算真正理解
    Oracle SQL。


    这是本书中你必须完全理解的唯一部分。在理解这些概念之前，请不要继续阅读。

    '
- fmt: '### NULL


    Nulls are weird. The three-valued logic takes a while to get used to. Even defining
    null is tricky. When I see a null, I think “the absence of a value,” even though
    that description isn’t 100% theoretically accurate. The important thing is that
    you have a quick mental definition that works for you.


    SQL null is different than null in other languages. Null does not default to 0
    or an empty string or a specific date. Sometimes we don’t really know what a null
    means, and sometimes we don’t even know why it’s there. That’s OK. We shouldn’t
    expect to understand all of our data perfectly.


    Null is not equal to null. Null is also not `not equal` to null. That’s counterintuitive
    at first, but it will make sense after a while.


    For example, let’s say we want to compare launch apogees. The apogee is the furthest
    distance from Earth and is a good way to quickly categorize rocket launches. A
    launch over 80 kilometers is often considered to be in “space.”


    First, let’s find all launches without a known apogee and then find all launches
    with a known apogee:


    ```

    SQL> select count(*) from launch where apogee = null;

    COUNT(*)


    SQL> select count(*) from launch where apogee <> null;

    COUNT(*)


    ```


    Neither query worked because the comparisons `= NULL` and `<> NULL` will never
    return any results. Comparing directly with null will always return unknown, which
    then gets translated to false.


    The correct way to query for the presence or absence of null is with the expressions
    `IS NULL` and `IS NOT NULL`:


    ```

    SQL> select count(*) from launch where apogee is null;

    COUNT(*)


    SQL> select count(*) from launch where apogee is not null;

    COUNT(*)


    ```


    There’s one more way that null expressions frequently confuse people: never use
    a `NOT IN` expression if the subquery can return null.


    For example, let’s find all launches where the launch had no satellite. A lot
    of rocket launches don’t have a payload – they’re just testing the rockets themselves:


    ```

    SQL> select count(*)

    2  from launch

    3  where launch.launch_id not in

    4  (

    5     select satellite.launch_id

    6     from satellite

    7  );

    COUNT(*)


    ```


    The preceding query returns an obviously wrong number because there is a single
    satellite with a null `LAUNCH_ID`. That sounds impossible at first – how can there
    be a satellite that wasn’t launched into orbit? Turns out there’s a satellite
    for “unknown Oko debris.” (Oko were the Soviet Union’s missile defense satellites.)
    It’s not that the satellite wasn’t launched into space; we just don’t know which
    launch it was a part of.


    A total of 99.998% of all satellites have a known launch. But it only takes a
    single null to ruin all the results. For each `LAUNCH.LAUNCH_ID`, Oracle compares
    it to a list that includes a null, and it can’t be certain whether the values
    match or not, so it returns no rows.


    Be careful when you assume a column is always set, especially if the column does
    not have a `NOT NULL` constraint. The next section will show a better way to get
    the results, using a join.


    ### JOIN


    Joins are the central operation of the Oracle database. Without joins, a database
    is just a glorified text file. Everything done in a database should be designed
    around joining data. We must be completely comfortable with the most popular join
    types. We must be able to read and write joins without even thinking about them.


    This section provides visualizations, descriptions, and sample code to help us
    understand and visualize joins. We don’t all need to visualize joins in the same
    way. As long as we all have a convenient mental model of a join, that’s good enough.


    #### Join Visualizations


    The basic join types are shown in Figure 1-2, using two different types of visualizations
    – a join diagram and a Venn diagram. Most people think about joins as Venn diagrams,
    but some people are more comfortable thinking about them as join diagrams.^(⁹)


    ![](images/471418_2_En_1_Chapter/471418_2_En_1_Fig2_HTML.png)


    The SQL join visualizations include join diagrams and Venn diagrams, for launch
    and satellite. Inner, left, right, and full join with Venn diagram, while cross
    join with a question mark.


    Figure 1-2


    Visualizing joins with join diagrams and Venn diagrams


    Only the basic join types are visualized in Figure 1-2. The other join types,
    many of which defy simple visualization, are discussed in Chapter 7. For now,
    it is enough to have a solid understanding of the main join types.


    Note that each diagram uses shading in a different way. In the join diagrams on
    the left, shading is used to represent different values. In the Venn diagrams
    on the right, shading is used to represent overlapping values.


    In case the shapes and colors of Figure 1-2 don’t make sense, Figure 1-3 shows
    a slightly different version for the inner join. This version lists the values.
    Imagine we’re joining by the column `LAUNCH_ID`, which is in both tables. And
    imagine that the table `LAUNCH` only has the values 1 and 2 and the table `SATELLITE`
    only has the values 2 and 3.


    ![](images/471418_2_En_1_Chapter/471418_2_En_1_Fig3_HTML.png)


    The use of numeral boxes and a Venn diagram of launch and satellite with number
    2 is widespread.


    Figure 1-3


    Visualizing joins with join diagrams and Venn diagrams, drilling down into INNER
    JOIN and showing values


    Spend some time looking at Figures 1-2 and 1-3 until the diagrams make sense.
    If my diagrams don’t work for you, search the Internet for “join diagram” until
    you find something that makes sense.


    #### Inner Join


    The most common type of join is an inner join. This first set of sample queries
    returns all launches and satellites where they share the same `LAUNCH_ID`. This
    does not return all launches, because many launches don’t have a payload. And
    it does not return all satellites, because of satellite debris with an unknown
    launch. Some rows from the `LAUNCH` table will be returned multiple times, because
    a single launch may have multiple satellites.


    There are three common ways to perform inner joins. First is using the explicit
    keywords `INNER JOIN`:


    ```

    select *

    from launch

    inner join satellite

    on launch.launch_id = satellite.launch_id;

    ```


    Inner join is the default, so the keyword `INNER` is not necessary:


    ```

    select *

    from launch

    join satellite

    on launch.launch_id = satellite.launch_id;

    ```


    The preceding queries use what is called the “ANSI join syntax,” after the join
    syntax introduced by the ANSI SQL standard. Alternatively, the query can be built
    with what is sometimes called the “Cartesian product” approach. These types of
    joins existed before the SQL standard was created. Tables are listed in a comma-separated
    list, and the joins are done in the `WHERE` clause. This approach is strongly
    discouraged, as discussed in Chapter 7:


    ```

    select *

    from launch, satellite

    where launch.launch_id = satellite.launch_id;

    ```'
