- fmt: '### Measure Database Performance


    ## Time model


    统计信息是衡量数据库性能的好方法。应用程序的简单挂钟运行时间并不总是衡量性能的公平方式。最好测量“DB时间”，即数据库处理请求所花费的时间。


    如果一个应用程序运行了一分钟，但“DB时间”只有1秒钟，那么问题就不在 Oracle。性能调优最困难的部分之一就是让人信服数据库*并非*问题所在。我们可以使用“DB时间”指标来证明我们的观点。该指标显示在许多地方，例如
    AWR 报告、`V$SQL` 等。“DB时间”可以分解为多个子类，我们可以在 `V$SYS_TIME_MODEL` 或 `V$SESS_TIME_MODEL`
    等视图中看到。


    ## Wait events


    帮助我们对影响数据库和 SQL 语句的瓶颈进行分类。我们的程序需要消耗稀缺资源，并且经常必须等待这些资源变得可用。通过计算等待事件并将其分类到等待类中，我们可以诊断一些系统和语句问题。


    共有14个等待类，它们的名称不言自明：Administrative、Application、Cluster、Commit、Concurrency、Configuration、CPU、Idle、Network、Other、Queueing、Scheduler、System
    I/O 和 User I/O。（等待类“CPU”并不是一个真正的等待类。由于某种奇怪的原因，Oracle 并没有给这个最受欢迎的等待事件命名。）


    像 User I/O 和 CPU 这样的等待类通常被认为是“良性”等待；我们的进程不可避免地至少会使用一些 I/O 和 CPU 资源。但其他等待类中大量的等待通常是麻烦的征兆。


    我们可以通过等待类查看等待事件的摘要，并快速识别问题。像 Oracle Enterprise Manager 这样的程序使用等待事件来创建活动图，如图 [18-3](#471418_2_En_18_Chapter.xhtml#Fig3)
    所示。通过查看下图，我们可以很快看出存在大量 Concurrency（左侧红色区域），接着是大量 CPU（右侧绿色区域）。根据此图表，明智的做法是初步忽略
    CPU 部分（可能代表实际工作），而专注于 Concurrency 部分（可能代表大量工作被类似未提交事务的东西所阻碍）。


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig3_HTML.jpg)


    该图显示了在5分钟时间间隔内三个不同时刻的活跃 CPU 核心会话数。起始时间为下午4:44。


    **图 18-3**


    Oracle Enterprise Manager 的（修改版）顶级活动报告示例


    `EVENT` 列存储在许多表和视图中，例如 `V$SESSION` 和 `V$ACTIVE_SESSION_HISTORY`。`EVENT` 列很有用，但我们必须记住，NULL
    确实表示“CPU”。以下是查看近期会话活动的等待事件和等待类的示例：


    ```sql

    --Recent wait events.

    select

    nvl(event, ''CPU'') event,

    nvl(wait_class, ''CPU'') wait_class,

    v$active_session_history.*

    from v$active_session_history

    order by sample_time desc;

    ```


    实际上有数千个等待事件，其中大部分在《Database Reference》的“Oracle Wait Events”章节中都有记录。当我们查看关于等待事件的报告时，我们将学会哪些等待是预期的，哪些意味着麻烦。我们必须始终关注最常见的等待。总会有一些发生次数很少的奇怪等待事件。我们不想浪费时间调查那些很少发生的等待。


    ## Statistics


    包含活动会话和整个系统的*累积*数字。像 `V$SESSTAT` 和 `V$SYSSTAT` 这样的视图对于查找哪些会话或数据库使用了异常大量的资源非常有用。


    例如，生成过多的重做数据可能是个问题。Oracle 不会跟踪每个 SQL 语句的重做使用情况，但以下查询显示了生成最多重做的会话。通过会话标识符 `SID`，我们可以开始追踪重做的来源：


    ```sql

    --Sessions that generated the most redo.

    select round(value/1024/1024) redo_mb, sid, name

    from v$sesstat

    join v$statname

    on v$sesstat.statistic# = v$statname.statistic#

    where v$statname.display_name = ''redo size''

    order by value desc;

    REDO_MB   SID   NAME

    -------   ---   ---------

    360       268   redo size

    2         383   redo size

    1         386   redo size

    ...

    ```


    ## Metrics


    包含统计信息随时间变化的*比率*。最流行的指标是前面讨论的“buffer cache hit ratio”，它告诉我们数据从内存而不是从磁盘读取的百分比。


    虽然统计信息提供总计数，但了解不同时间点的比率更有用。例如，如果一个数据库系统生成了 1 PB 的 I/O，这并不一定能说明太多问题，这个数字的重要性取决于实例已经运行了多长时间。但如果我们查看指标“I/O
    megabytes per second”，如下面的查询所示，这些数字是系统性能更有意义的度量：


    ```sql

    --Current I/O usage in megabytes per second.

    select begin_time, end_time, round(value) mb_per_second

    from gv$sysmetric

    where metric_name = ''I/O Megabytes per Second'';

    BEGIN_TIME            END_TIME              MB_PER_SECOND

    -------------------   -------------------   -------------

    2022-08-14 20:45:13   2022-08-14 20:46:13              263

    ```


    ## Sampling


    是 Oracle 中衡量性能最有用的方法。我们可能*认为*自己想知道每次 SQL 执行的每一个细节，但实际上，如此多的信息会让人难以承受。在实践中，每秒钟拍一张快照，然后基于这些样本进行调优，就已经足够好了。采样用于
    Automatic Workload Repository 和 Active Session History，这将在接下来的章节中描述。


    我们可以通过采样解决 99.9% 的性能问题。在现代版本的 Oracle 中，捕获数据库的所有活动（例如使用追踪）几乎是从来不需要的。我们不需要构建自己的采样系统，也不需要决定采样频率或采样内容。Oracle
    的采样系统始终在运行，针对每个用户和每条语句，并且数据通过视图可以轻松访问。即使我们想禁用 Oracle 的采样也做不到，而追踪则必须手动启用，可能消耗大量资源，并且需要外部的、非关系型工具来理解。再次强调，容易访问的良好数据胜过难以访问的完美数据。'
  raw: '### Measure Database Performance


    **Time model** statistics are a good way to measure database performance. The
    simple wall-clock run time of an application is not always a fair way of measuring
    performance. It is better to measure the “DB time,” the amount of time the database
    spends processing a request.


    If an application takes a minute, but the “DB time” is only 1 second, the problem
    is not with Oracle. One of the toughest parts of performance tuning is convincing
    people when the database is *not* the problem. We can use the “DB time” metric
    to prove our case. That metric is displayed in many places, like in AWR reports,
    `V$SQL`, etc. “DB time” can be broken down into subcategories, which we can see
    in views like `V$SYS_TIME_MODEL` or `V$SESS_TIME_MODEL`.


    **Wait events** help us classify the bottlenecks that affect our database and
    SQL statements. Our programs need to consume scarce resources and often must wait
    for them to become available. By counting the wait events and categorizing them
    into wait classes, we can diagnose some system and statement problems.


    There are 14 wait classes, and their names are self-explanatory: Administrative,
    Application, Cluster, Commit, Concurrency, Configuration, CPU, Idle, Network,
    Other, Queueing, Scheduler, System I/O, and User I/O. (The wait class “CPU” is
    not a real wait class. For some strange reason, Oracle does not give a name to
    the most popular wait event.)


    Wait classes like User I/O and CPU are generally considered “good” waits; it’s
    inevitable that our processes will use at least some I/O and CPU resources. But
    a large number of waits in other wait classes are often a sign of trouble.


    We can look at a summary of the wait events by wait class and quickly identify
    problems. Programs like Oracle Enterprise Manager use the wait events to create
    activity graphs, like in Figure [18-3](#471418_2_En_18_Chapter.xhtml#Fig3). By
    looking at the following graph, we can quickly tell there was a lot of Concurrency
    (the red area on the left), followed by a lot of CPU (the green area on the right).
    Based on this chart, we would be wise to initially ignore the CPU section (which
    likely represents real work) and focus on the Concurrency section (which may represent
    a large amount of work held up by something like an uncommitted transaction).


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig3_HTML.jpg)


    The graph for the number of active C P U core sessions at three different timings
    over an interval of 5 minutes. begins at 4:44 PM.


    Figure 18-3


    Example of a (modified) top activity report from Oracle Enterprise Manager


    The `EVENT` column is stored in many tables and views, such as `V$SESSION` and
    `V$ACTIVE_SESSION_HISTORY`. The `EVENT` column is useful, but we have to remember
    that NULL really means “CPU.” The following is an example of viewing wait events
    and wait classes for recent session activity:


    ```

    --Recent wait events.

    select

    nvl(event, ''CPU'') event,

    nvl(wait_class, ''CPU'') wait_class,

    v$active_session_history.*

    from v$active_session_history

    order by sample_time desc;

    ```


    There are literally thousands of wait events, and most of them are documented
    in the “Oracle Wait Events” chapter of the *Database Reference*. As we look at
    reports on wait events, we will learn which waits are expected and which ones
    imply trouble. We must always focus on the most popular waits. There will always
    be some weird waits with a small number of occurrences. We don’t want to waste
    our time investigating waits that rarely happen.


    **Statistics** contain *cumulative* numbers for active sessions and the entire
    system. Views like `V$SESSTAT` and `V$SYSSTAT` are useful for finding which sessions
    or databases are using an unusual amount of resources.


    For example, generating too much redo data can be a problem. Oracle doesn’t track
    redo usage per SQL statement, but the following query shows the sessions that
    generated the most redo. With the session identifier, the `SID`, we can begin
    tracking down the source of the redo:


    ```

    --Sessions that generated the most redo.

    select round(value/1024/1024) redo_mb, sid, name

    from v$sesstat

    join v$statname

    on v$sesstat.statistic# = v$statname.statistic#

    where v$statname.display_name = ''redo size''

    order by value desc;

    REDO_MB   SID   NAME

    -------   ---   ---------

    360       268   redo size

    2         383   redo size

    1         386   redo size

    ...

    ```


    **Metrics** contain *ratios* of statistics per time. The most popular metric is
    the previously discussed “buffer cache hit ratio,” which tells us what percentage
    of our data is read from memory instead of disk.


    While statistics give us grand totals, it’s more useful to know the ratios at
    different points in time. For example, if a database system has generated 1 petabyte
    of I/O that doesn’t necessarily tell us much, the importance of that number depends
    on how long the instance has been running. But if we look at the metric “I/O megabytes
    per second,” like in the following query, the numbers are a more meaningful measurement
    of system performance:


    ```

    --Current I/O usage in megabytes per second.

    select begin_time, end_time, round(value) mb_per_second

    from gv$sysmetric

    where metric_name = ''I/O Megabytes per Second'';

    BEGIN_TIME            END_TIME              MB_PER_SECOND

    -------------------   -------------------   -------------

    2022-08-14 20:45:13   2022-08-14 20:46:13              263

    ```


    **Sampling** is the most useful way to measure performance in Oracle. We may *think*
    we want to know every detail about every SQL execution, but in reality, that much
    information would be overwhelming. In practice, it’s good enough to take a picture
    of what is happening every second and then do our tuning based on those samples.
    Sampling is used in Automatic Workload Repository and Active Session History,
    which are described in the next sections.


    We can solve 99.9% of our performance problem with sampling. Capturing all of
    the activity of a database, like with tracing, is almost never necessary in modern
    versions of Oracle. We don’t have to build our own sampling system or make any
    decisions about how often to sample or what to sample. Oracle’s sampling systems
    are always running, for every user and every statement, and the data is easily
    accessible through views. We couldn’t disable Oracle’s sampling even if we wanted
    to, whereas tracing must be manually enabled, can use significant resources, and
    requires external, non-relational tools to understand. Once again, easily accessible
    good data is better than poorly accessible perfect data.'
  trans: '### 衡量数据库性能


    ## 时间模型


    统计信息是衡量数据库性能的好方法。应用程序简单的挂钟运行时间并不总是衡量性能的公平方式。最好测量“DB 时间”，即数据库处理请求所花费的时间。


    如果一个应用程序运行了一分钟，但“DB 时间”只有 1 秒钟，那么问题就不在 Oracle。性能调优最困难的部分之一就是让人信服数据库*并非*问题所在。我们可以使用“DB
    时间”指标来证明我们的观点。该指标显示在许多地方，例如 AWR 报告、`V$SQL` 等。“DB 时间”可以分解为多个子类，我们可以在 `V$SYS_TIME_MODEL`
    或 `V$SESS_TIME_MODEL` 等视图中看到。


    ## 等待事件


    等待事件帮助我们对影响数据库和 SQL 语句的瓶颈进行分类。我们的程序需要消耗稀缺资源，并且经常必须等待这些资源变得可用。通过计算等待事件并将其分类到等待类中，我们可以诊断一些系统和语句问题。


    共有 14 个等待类，它们的名称不言自明：Administrative、Application、Cluster、Commit、Concurrency、Configuration、CPU、Idle、Network、Other、Queueing、Scheduler、System
    I/O 和 User I/O。（等待类“CPU”并不是一个真正的等待类。由于某种奇怪的原因，Oracle 并没有给这个最受欢迎的等待事件命名。）


    像 User I/O 和 CPU 这样的等待类通常被认为是“良性”等待；我们的进程不可避免地至少会使用一些 I/O 和 CPU 资源。但其他等待类中大量的等待通常是麻烦的征兆。


    我们可以通过等待类查看等待事件的摘要，并快速识别问题。像 Oracle Enterprise Manager 这样的程序使用等待事件来创建活动图，如图 18-3
    所示。通过查看下图，我们可以很快看出存在大量 Concurrency（左侧红色区域），接着是大量 CPU（右侧绿色区域）。根据此图表，明智的做法是初步忽略
    CPU 部分（可能代表实际工作），而专注于 Concurrency 部分（可能代表大量工作被类似未提交事务的东西所阻碍）。


    ![](img/471418_2_En_18_Fig3_HTML.jpg)


    该图显示了在 5 分钟时间间隔内三个不同时刻的活跃 CPU 核心会话数。起始时间为下午 4:44。


    **图 18-3**


    Oracle Enterprise Manager 的（修改版）顶级活动报告示例


    `EVENT` 列存储在许多表和视图中，例如 `V$SESSION` 和 `V$ACTIVE_SESSION_HISTORY`。`EVENT` 列很有用，但我们必须记住，NULL
    确实表示“CPU”。以下是查看近期会话活动的等待事件和等待类的示例：


    ```sql

    --近期的等待事件

    select

    nvl(event, ''CPU'') event,

    nvl(wait_class, ''CPU'') wait_class,

    v$active_session_history.*

    from v$active_session_history

    order by sample_time desc;

    ```


    实际上有数千个等待事件，其中大部分在《Database Reference》的“Oracle Wait Events”章节中都有记录。当我们查看关于等待事件的报告时，我们将学会哪些等待是预期的，哪些意味着麻烦。我们必须始终关注最常见的等待。总会有一些发生次数很少的奇怪等待事件。我们不想浪费时间调查那些很少发生的等待。


    ## 统计信息


    统计信息包含活动会话和整个系统的*累积*数字。像 `V$SESSTAT` 和 `V$SYSSTAT` 这样的视图对于查找哪些会话或数据库使用了异常大量的资源非常有用。


    例如，生成过多的重做数据可能是个问题。Oracle 不会跟踪每个 SQL 语句的重做使用情况，但以下查询显示了生成最多重做的会话。通过会话标识符 `SID`，我们可以开始追踪重做的来源：


    ```sql

    --生成最多重做的会话

    select round(value/1024/1024) redo_mb, sid, name

    from v$sesstat

    join v$statname

    on v$sesstat.statistic# = v$statname.statistic#

    where v$statname.display_name = ''redo size''

    order by value desc;

    REDO_MB   SID   NAME

    -------   ---   ---------

    360       268   redo size

    2         383   redo size

    1         386   redo size

    ...

    ```


    ## 指标


    指标包含统计信息随时间变化的*比率*。最流行的指标是前面讨论的“buffer cache hit ratio”，它告诉我们数据从内存而不是从磁盘读取的百分比。


    虽然统计信息提供总计数，但了解不同时间点的比率更有用。例如，如果一个数据库系统生成了 1 PB 的 I/O，这并不一定能说明太多问题，这个数字的重要性取决于实例已经运行了多长时间。但如果我们查看指标“I/O
    megabytes per second”，如下面的查询所示，这些数字是系统性能更有意义的度量：


    ```sql

    --当前每秒 I/O 使用量（兆字节）

    select begin_time, end_time, round(value) mb_per_second

    from gv$sysmetric

    where metric_name = ''I/O Megabytes per Second'';

    BEGIN_TIME            END_TIME              MB_PER_SECOND

    -------------------   -------------------   -------------

    2022-08-14 20:45:13   2022-08-14 20:46:13              263

    ```


    ## 采样


    采样是 Oracle 中衡量性能最有用的方法。我们可能*认为*自己想知道每次 SQL 执行的每一个细节，但实际上，如此多的信息会让人难以承受。在实践中，每秒钟拍一张快照，然后基于这些样本进行调优，就已经足够好了。采样用于
    Automatic Workload Repository 和 Active Session History，这将在接下来的章节中描述。


    我们可以通过采样解决 99.9% 的性能问题。在现代版本的 Oracle 中，捕获数据库的所有活动（例如使用追踪）几乎是从来不需要的。我们不需要构建自己的采样系统，也不需要决定采样频率或采样内容。Oracle
    的采样系统始终在运行，针对每个用户和每条语句，并且数据通过视图可以轻松访问。即使我们想禁用 Oracle 的采样也做不到，而追踪则必须手动启用，可能消耗大量资源，并且需要外部的、非关系型工具来理解。再次强调，容易访问的良好数据胜过难以访问的完美数据。'
- fmt: "## Automatic Workload Repository (AWR)\n\nAutomatic Workload Repository and\
    \ Active Session History are perhaps the most powerful database tuning features.\
    \ These programs are always gathering important information; we only have to query\
    \ a table or call a package to generate a report. (But beware of licensing issues.\
    \ Even though Oracle makes everything available by default, that does not mean\
    \ we are licensed to use it.)\n\nTo demonstrate how these tools work, let’s do\
    \ something stupidly slow and see if Oracle can tell us how to fix our code. First,\
    \ let’s run the following PL/SQL block. This block queries the table `SATELLITE`\
    \ a large number of times, using a non-indexed column. This code doesn’t do anything\
    \ yet – it’s only generating activity to show up on our reports later:\n\n```sql\n\
    --Repeatedly count a large table using a non-indexed column.\n--Takes about 10\
    \ minutes to run.\ndeclare\n  v_count number;\nbegin\n  dbms_workload_repository.create_snapshot;\n\
    \  for i in 1 .. 200000 loop\n    select count(*)\n    into v_count\n    from\
    \ satellite\n    where orbit_class = 'Polar';\n  end loop;\n  dbms_workload_repository.create_snapshot;\n\
    end;\n/\n```\n\nAutomatic Workload Repository collects a huge amount of information\
    \ and divides that information into snapshots. By default, a snapshot contains\
    \ 1 hour of data, and that data is retained for 8 days. AWR can be configured\
    \ to take more or less snapshots and retain the data for more or less time, but\
    \ those changes can require more space. The snapshots let us generate reports\
    \ for ranges of time, create baselines of performance, and compare time periods.\
    \ There are many ways to customize AWR collection. For example, the preceding\
    \ PL/SQL block called the function `DBMS_WORKLOAD_REPOSITORY.CREATE_SNAPSHOT`\
    \ so we don’t have to wait an hour for our slow query to show up on reports.\n\
    \nAlthough most DBAs still use operating system files and scripts for generating\
    \ AWR reports, the easiest way to generate AWR reports is with SQL. First, we\
    \ need to find the relevant snapshot range, like this:\n\n```sql\n--Find snapshots,\
    \ for generating AWR reports.\nselect dbid, snap_id, begin_interval_time, end_interval_time\n\
    from dba_hist_snapshot\norder by begin_interval_time desc;\n```\n\nIf we pick\
    \ the `DBID` and the latest two `SNAP_ID` values from the preceding query, we\
    \ can plug them into the following function to generate an AWR report:\n\n```sql\n\
    --Generate AWR report.\nselect *\nfrom table(dbms_workload_repository.awr_report_html(\n\
    \  l_dbid     => 985569476,\n  l_inst_num => 1,\n  l_bid      => 6709,\n  l_eid\
    \      => 6710\n));\n```\n\nThe preceding table function returns many rows, each\
    \ of which is a line in an HTML report. If we copy all of the lines, paste them\
    \ into a text file, save the file as an .html file, and open the file with a browser,\
    \ we’ll find a wealth of information. We can also query AWR data directly using\
    \ the many `DBA_HIST_*` views.\n\nAWR reports can be huge and overwhelming, so\
    \ I’m not even going to bother including screenshots. Open the AWR report generated\
    \ earlier, and scroll down to the “Main Report,” which contains a menu of the\
    \ different sections. If we click “SQL Statistics” and then click “SQL ordered\
    \ by Elapsed Time,” we should see our SQL statement that counted the rows from\
    \ the `SATELLITE` table. An HTML table shows how many times the statement ran,\
    \ how long it took, etc.\n\n## Active Session History (ASH)\n\nAn active session\
    \ is a database session that is waiting for a resource such as CPU, memory, disk\
    \ I/O, a locked row, etc. Practical database performance tuning only cares about\
    \ these active, waiting sessions. If a session is intentionally sleeping or waiting\
    \ for a client command, then the performance problem is not inside our database.\
    \ Every second, Oracle creates one row for every session that is actively waiting\
    \ on something. This data is called the Active Session History (ASH).\n\nASH is\
    \ related to AWR, but there are crucial differences. ASH data is sampled every\
    \ 1 second, whereas AWR data is sampled every 10 seconds. ASH data only lasts\
    \ about 1 day, whereas AWR data lasts 8 days by default. Both ASH and AWR can\
    \ be viewed through reports, but it’s more common to only access ASH through queries.\
    \ ASH data is mainly queried through `V$ACTIVE_SESSION_HISTORY`, while AWR data\
    \ is mainly queried through `DBA_HIST_ACTIVE_SESS_HISTORY`.\n\nThe 112 columns\
    \ in `V$ACTIVE_SESSION_HISTORY` tell us a lot about what recently happened in\
    \ our database. If you haven’t used that view before, you should spend a minute\
    \ browsing through the rows and columns. That dynamic performance view is stored\
    \ entirely in memory structures, and it is always fast to query, whereas the AWR\
    \ tables may contain a huge amount of historical data that can slow down our queries.\
    \ Since performance tuning is best done in a breadth-first manner, the query performance\
    \ advantage of ASH over AWR is important.\n\nOne of the best ways to understand\
    \ ASH is to calculate the number of active sessions by counting the number of\
    \ rows per `SAMPLE_TIME`. This number of active sessions is a great way to measure\
    \ database activity. A database that averages only a few samples per timestamp\
    \ isn’t very busy. A database with a hundred samples per timestamp may be too\
    \ busy.\n\nThe relational interface to sampling data is a great tuning opportunity.\
    \ Canned reports are nice and can fill many needs, but eventually we’ll grow our\
    \ own style of performance tuning and build our own queries and reports. For example,\
    \ I feel like AWR reports don’t have enough details per SQL statement and that\
    \ sharing and comparing HTML is difficult. In just a single query, I was able\
    \ to combine AWR and ASH into a text-only chart, showing data just the way I liked\
    \ it.^([^(41)](#fn41))\n\nToo many developers ignore ASH data because “it’s only\
    \ a sample.” But sampling is all we need. If a problem occurs for less than a\
    \ second and is never caught in a sample, then it’s not a problem worth worrying\
    \ about."
  raw: '### Automatic Workload Repository (AWR)


    Automatic Workload Repository and Active Session History are perhaps the most
    powerful database tuning features. These programs are always gathering important
    information; we only have to query a table or call a package to generate a report.
    (But beware of licensing issues. Even though Oracle makes everything available
    by default, that does not mean we are licensed to use it.)


    To demonstrate how these tools work, let’s do something stupidly slow and see
    if Oracle can tell us how to fix our code. First, let’s run the following PL/SQL
    block. This block queries the table `SATELLITE` a large number of times, using
    a non-indexed column. This code doesn’t do anything yet – it’s only generating
    activity to show up on our reports later:


    ```

    --Repeatedly count a large table using a non-indexed column.

    --Takes about 10 minutes to run.

    declare

    v_count number;

    begin

    dbms_workload_repository.create_snapshot;

    for i in 1 .. 200000 loop

    select count(*)

    into v_count

    from satellite

    where orbit_class = ''Polar'';

    end loop;

    dbms_workload_repository.create_snapshot;

    end;

    /

    ```


    Automatic Workload Repository collects a huge amount of information and divides
    that information into snapshots. By default, a snapshot contains 1 hour of data,
    and that data is retained for 8 days. AWR can be configured to take more or less
    snapshots and retain the data for more or less time, but those changes can require
    more space. The snapshots let us generate reports for ranges of time, create baselines
    of performance, and compare time periods. There are many ways to customize AWR
    collection. For example, the preceding PL/SQL block called the function `DBMS_WORKLOAD_REPOSITORY.CREATE_SNAPSHOT`
    so we don’t have to wait an hour for our slow query to show up on reports.


    Although most DBAs still use operating system files and scripts for generating
    AWR reports, the easiest way to generate AWR reports is with SQL. First, we need
    to find the relevant snapshot range, like this:


    ```

    --Find snapshots, for generating AWR reports.

    select dbid, snap_id, begin_interval_time, end_interval_time

    from dba_hist_snapshot

    order by begin_interval_time desc;

    ```


    If we pick the `DBID` and the latest two `SNAP_ID` values from the preceding query,
    we can plug them into the following function to generate an AWR report:


    ```

    --Generate AWR report.

    select *

    from table(dbms_workload_repository.awr_report_html(

    l_dbid     => 985569476,

    l_inst_num => 1,

    l_bid      => 6709,

    l_eid      => 6710

    ));

    ```


    The preceding table function returns many rows, each of which is a line in an
    HTML report. If we copy all of the lines, paste them into a text file, save the
    file as an .html file, and open the file with a browser, we’ll find a wealth of
    information. We can also query AWR data directly using the many `DBA_HIST_*` views.


    AWR reports can be huge and overwhelming, so I’m not even going to bother including
    screenshots. Open the AWR report generated earlier, and scroll down to the “Main
    Report,” which contains a menu of the different sections. If we click “SQL Statistics”
    and then click “SQL ordered by Elapsed Time,” we should see our SQL statement
    that counted the rows from the `SATELLITE` table. An HTML table shows how many
    times the statement ran, how long it took, etc.


    ### Active Session History (ASH)


    An active session is a database session that is waiting for a resource such as
    CPU, memory, disk I/O, a locked row, etc. Practical database performance tuning
    only cares about these active, waiting sessions. If a session is intentionally
    sleeping or waiting for a client command, then the performance problem is not
    inside our database. Every second, Oracle creates one row for every session that
    is actively waiting on something. This data is called the Active Session History
    (ASH).


    ASH is related to AWR, but there are crucial differences. ASH data is sampled
    every 1 second, whereas AWR data is sampled every 10 seconds. ASH data only lasts
    about 1 day, whereas AWR data lasts 8 days by default. Both ASH and AWR can be
    viewed through reports, but it’s more common to only access ASH through queries.
    ASH data is mainly queried through `V$ACTIVE_SESSION_HISTORY`, while AWR data
    is mainly queried through `DBA_HIST_ACTIVE_SESS_HISTORY`.


    The 112 columns in `V$ACTIVE_SESSION_HISTORY` tell us a lot about what recently
    happened in our database. If you haven’t used that view before, you should spend
    a minute browsing through the rows and columns. That dynamic performance view
    is stored entirely in memory structures, and it is always fast to query, whereas
    the AWR tables may contain a huge amount of historical data that can slow down
    our queries. Since performance tuning is best done in a breadth-first manner,
    the query performance advantage of ASH over AWR is important.


    One of the best ways to understand ASH is to calculate the number of active sessions
    by counting the number of rows per `SAMPLE_TIME`. This number of active sessions
    is a great way to measure database activity. A database that averages only a few
    samples per timestamp isn’t very busy. A database with a hundred samples per timestamp
    may be too busy.


    The relational interface to sampling data is a great tuning opportunity. Canned
    reports are nice and can fill many needs, but eventually we’ll grow our own style
    of performance tuning and build our own queries and reports. For example, I feel
    like AWR reports don’t have enough details per SQL statement and that sharing
    and comparing HTML is difficult. In just a single query, I was able to combine
    AWR and ASH into a text-only chart, showing data just the way I liked it.^([^(41)](#fn41))


    Too many developers ignore ASH data because “it’s only a sample.” But sampling
    is all we need. If a problem occurs for less than a second and is never caught
    in a sample, then it’s not a problem worth worrying about.'
  trans: "\n## 自动工作负载存储库 (AWR)\n\n自动工作负载存储库和活动会话历史可能是最强大的数据库调优功能。这些程序持续收集重要信息；我们只需查询一张表或调用一个包即可生成报告。（但请注意许可问题。尽管\
    \ Oracle 默认开启了所有功能，但这并不意味着我们已获得使用它们的许可。）\n\n为了演示这些工具如何工作，让我们做一些极其缓慢的操作，看看 Oracle\
    \ 能否告诉我们如何修复代码。首先，运行以下 PL/SQL 代码块。该代码块使用一个未加索引的列，对 `SATELLITE` 表进行了大量查询。这段代码目前什么也不做——只是为了在稍后的报告中生成活动记录：\n\
    \n```sql\n--使用非索引列反复对一个大表进行计数。\n--运行大约需要 10 分钟。\ndeclare\n  v_count number;\n\
    begin\n  dbms_workload_repository.create_snapshot;\n  for i in 1 .. 200000 loop\n\
    \    select count(*)\n    into v_count\n    from satellite\n    where orbit_class\
    \ = 'Polar';\n  end loop;\n  dbms_workload_repository.create_snapshot;\nend;\n\
    /\n```\n\n自动工作负载存储库收集大量信息，并将这些信息划分为快照。默认情况下，一个快照包含 1 小时的数据，这些数据会保留 8 天。可以配置 AWR\
    \ 以更频繁或更少地摄取快照，并延长或缩短数据保留时间，但这些更改可能需要更多空间。快照使我们能够生成时间段报告、创建性能基线并比较时间段。有许多方法可以自定义\
    \ AWR 的收集。例如，前面的 PL/SQL 块调用了函数 `DBMS_WORKLOAD_REPOSITORY.CREATE_SNAPSHOT`，因此我们不必等待一小时才能在报告中看到我们的慢查询。\n\
    \n尽管大多数 DBA 仍然使用操作系统文件和脚本来生成 AWR 报告，但最简单的方法是通过 SQL 来生成。首先，我们需要找到相关的快照范围，如下所示：\n\
    \n```sql\n--查找快照，用于生成 AWR 报告。\nselect dbid, snap_id, begin_interval_time, end_interval_time\n\
    from dba_hist_snapshot\norder by begin_interval_time desc;\n```\n\n如果我们从上一个查询中选取\
    \ `DBID` 和最新的两个 `SNAP_ID` 值，就可以将它们填入以下函数来生成 AWR 报告：\n\n```sql\n--生成 AWR 报告。\n\
    select *\nfrom table(dbms_workload_repository.awr_report_html(\n  l_dbid     =>\
    \ 985569476,\n  l_inst_num => 1,\n  l_bid      => 6709,\n  l_eid      => 6710\n\
    ));\n```\n\n前面的表函数返回多行数据，每一行对应 HTML 报告中的一行。如果我们复制所有行，将它们粘贴到文本文件中，将文件保存为 .html\
    \ 文件，然后用浏览器打开该文件，就会发现丰富的信息。我们也可以直接使用众多的 `DBA_HIST_*` 视图查询 AWR 数据。\n\nAWR 报告可能非常庞大且令人望而生畏，因此我甚至不打算费心附上截图。打开前面生成的\
    \ AWR 报告，向下滚动到“Main Report”，其中包含不同部分的菜单。如果我们点击“SQL Statistics”，然后点击“SQL ordered\
    \ by Elapsed Time”，应该会看到我们从 `SATELLITE` 表中计数的 SQL 语句。一个 HTML 表格显示了该语句运行的次数、花费的时间等信息。\n\
    \n## 活动会话历史 (ASH)\n\n活动会话是指正在等待某种资源（如 CPU、内存、磁盘 I/O、锁定的行等）的数据库会话。实际的数据库性能调优只关心这些活跃的、正在等待的会话。如果一个会话是故意休眠或在等待客户端命令，那么性能问题就不在我们的数据库内部。Oracle\
    \ 每秒为每个正在主动等待某物的会话创建一行数据。这些数据被称为活动会话历史 (ASH)。\n\nASH 与 AWR 相关，但存在关键区别。ASH 数据每\
    \ 1 秒采样一次，而 AWR 数据每 10 秒采样一次。ASH 数据仅保留约 1 天，而 AWR 数据默认保留 8 天。ASH 和 AWR 都可以通过报告查看，但更常见的做法是仅通过查询访问\
    \ ASH。ASH 数据主要通过 `V$ACTIVE_SESSION_HISTORY` 视图查询，而 AWR 数据主要通过 `DBA_HIST_ACTIVE_SESS_HISTORY`\
    \ 视图查询。\n\n`V$ACTIVE_SESSION_HISTORY` 中的 112 个列为我们提供了关于数据库近期发生的大量信息。如果你以前没有使用过这个视图，应该花点时间浏览一下它的行和列。该动态性能视图完全存储在内存结构中，查询速度始终很快，而\
    \ AWR 表可能包含大量历史数据，可能会减慢我们的查询速度。由于性能调优最好以广度优先的方式进行，因此 ASH 相比 AWR 的查询性能优势很重要。\n\n\
    理解 ASH 的最佳方法之一是按每个 `SAMPLE_TIME` 计算行数来统计活动会话的数量。这个活动会话数量是衡量数据库活动的一个好方法。平均每个时间戳只有少量样本的数据库并不繁忙。每个时间戳有上百个样本的数据库可能就过于繁忙了。\n\
    \n采样数据的关系型接口提供了一个绝佳的调优机会。预制的报告很好，能满足许多需求，但最终我们会形成自己的性能调优风格，并构建自己的查询和报告。例如，我觉得\
    \ AWR 报告对每条 SQL 语句的细节描述不够，而且共享和比较 HTML 很困难。仅仅通过一个查询，我就能将 AWR 和 ASH 结合成一个纯文本图表，按照我喜欢的方式展示数据。^(⁴¹)\n\
    \n太多开发人员忽略了 ASH 数据，因为“它只是个样本”。但采样正是我们所需要的。如果一个问题持续时间不到一秒，并且从未在采样中被捕获，那么它就不是一个值得担心的问题。\n"
- fmt: '### Automatic Database Diagnostic Monitor (ADDM)


    Automatic Database Diagnostic Monitor analyzes AWR data and helps find database
    performance problems. After ADDM finds a problem, ADDM often suggests using one
    of the automatic advisors to find a specific fix. These processes can be set up
    to automatically find and fix performance problems.


    In practice ADDM and the advisors are not helpful. They are only good at finding
    simple problems that we can find and fix ourselves. But automated tuning systems
    should improve in future versions of the database or in a future autonomous database
    environment.


    There are many ways to use ADDM. The following example creates an ADDM report
    for the same snapshot we looked at before:


    ```

    --Generate ADDM task.

    Declare

    v_task_name varchar2(100) := ''Test Task'';

    begin

    dbms_addm.analyze_db

    (

    task_name      => v_task_name,

    begin_snapshot => 6709,

    end_snapshot   => 6710

    );

    end;

    /

    ```


    We can view the report with another call to `DBMS_ADDM`. The report may generate
    a huge number of recommendations, but somewhere in the report, there should be
    a mention of our query against the `SATELLITE` table. (But I can’t guarantee there
    will be any recommendations on your system. The long-running PL/SQL block was
    set to run for about 10 minutes because that’s usually long enough to trigger
    a recommendation, but the recommendation thresholds are not documented.)


    ```

    --View ADDM report.

    select dbms_addm.get_report(task_name => ''Test Task'') from dual;

    ...

    Recommendation 1: SQL Tuning

    Estimated benefit is .39 active sessions, 96.77% of total activity.


    Action

    Run SQL Tuning Advisor on the SELECT statement with SQL_ID

    "5115f2tc6809t".

    Related Object

    SQL statement with SQL_ID 5115f2tc6809t.

    SELECT COUNT(*) FROM SATELLITE WHERE ORBIT_CLASS = ''Polar''

    Rationale

    ...

    ```


    ADDM still hasn’t actually `tuned` anything yet, but the preceding report has
    produced helpful information. Pay attention to the report rationales and do not
    just blindly implement every recommendation. Notice that the preceding output
    includes the number of active sessions. That number tells us how much database
    activity we might save by improving this query. If the active sessions benefit
    is too low, then it’s not worth investigating further.


    The preceding ADDM output also includes the SQL statement, along with the `SQL_ID`.
    The recommended action is to run that SQL statement through the SQL Tuning Advisor,
    and we’ll need the `SQL_ID` to do that.


    ### Advisors


    Oracle has many ways to offer us advice. There is the SQL Tuning Advisor, SQL
    Access Advisor, Optimizer Statistics Advisor, and views `V$SGA_TARGET_ADVICE`
    and `V$PGA_TARGET_ADVICE`. The SQL Tuning Advisor can examine SQL statement executions
    and provide ideas for how to make them run faster.


    For example, we can use the `SQL_ID` we previously found in our AWR and ADDM reports.
    First, we have to create a tuning task, execute that tuning task, and save the
    task name for later:


    ```

    --Create and execute SQL Tuning Advisor task

    declare

    v_task varchar2(64);

    begin

    v_task := dbms_sqltune.create_tuning_task(

    sql_id => ''5115f2tc6809t'');

    dbms_sqltune.execute_tuning_task(task_name => v_task);

    dbms_output.put_line(''Task name: ''||v_task);

    end;

    /

    Task name: TASK_18972

    ```


    We can view the report by taking the preceding task name and plugging it into
    the following SQL statement:


    ```

    --View tuning task report.

    select dbms_sqltune.report_tuning_task(''TASK_18972'') from dual;

    ...

    1- Index Finding (see explain plans section below)


    The execution plan of this statement can be improved by creating one or more

    indices.

    Recommendation (estimated benefit: 96.64%)


    - Consider running the Access Advisor to improve the physical schema design

    or creating the recommended index.

    create index SPACE.IDX$$_4A1C0001 on SPACE.SATELLITE("ORBIT_CLASS");

    Rationale


    ...

    ```


    The advice in the preceding report looks correct; creating an index on the `ORBIT_CLASS`
    column would almost certainly help with the query that we just ran thousands of
    times. The full report also includes metadata, rationales behind the recommendations,
    and before-and-after execution plans if the recommendation is accepted. The SQL
    Tuning Advisor can recommend other kinds of changes, such as a SQL profile that
    can help nudge the execution plan in the right direction. SQL profiles will be
    discussed later.'
