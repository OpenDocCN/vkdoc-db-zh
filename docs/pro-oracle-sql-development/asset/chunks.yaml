    atmospheric rocket: 2600

    ballistic missile test: 78

    deep space: 184

    ...

    ```


    **Varrays**, variable-size arrays, are similar to nested tables. The differences
    between varrays and nested tables only matter if we’re storing collections in
    the database or if we’re deleting items from the collections. To avoid breaking
    the relational model, we shouldn’t store collections in a table anyway. And we
    should also avoid deleting items from collections; it’s best to avoid loading
    unwanted elements in the first place, by using better filtering in our SQL statements
    that load data.


    There’s much more to the collection syntax than described in this section. There
    are many PL/SQL functions for reading, inserting (`EXTEND`), deleting (`DELETE`),
    updating (assignment), combining (`MULTISET UNION`/`INTERSECT`/`EXCEPT`), and
    loading collections into SQL (`FORALL` and `TABLE`). If we stick with a SQL-first
    approach and simple nested tables, we can usually avoid those features. If you
    need to do a lot of collection processing, you might want to read the “PL/SQL
    Collections and Records” chapter of the *PL/SQL Language Reference*.


    ### Functions


    We can extend the functionality of our database with user-defined functions. A
    PL/SQL function can accept arguments, execute procedural code, and return a value
    that can be easily used in SQL. We can use functions to organize our code and
    avoid repeating ourselves.


    Procedures are similar to functions, except a procedure does not return a value.
    Procedures can use `OUT` parameters to allow returning multiple values, but those
    procedures cannot be directly called by SQL. (Functions can also have `OUT` parameters,
    but there’s rarely a reason to return data in multiple ways.) There’s not a huge
    difference between functions and procedures, so only functions are discussed here.
    (Be careful if you look online for a list of differences between functions and
    procedures. There are a lot of myths surrounding the differences, probably because
    there’s a more significant difference in other databases.)


    As an example of a function, let’s say we want to calculate the orbital period
    of the satellites – the time it takes for each satellite to orbit Earth. The `SATELLITE`
    table already has an `ORBIT_PERIOD` column, so let’s see if we can duplicate it
    using the apogee (furthest distance from Earth) and perigee (closest distance
    to Earth). The math behind Kepler’s third law of planetary motion isn’t super-complicated,
    but we wouldn’t want to have to repeat it in our SQL statements multiple times:


    ```

    --Calculate orbital period in minutes, based on apogee

    --and perigee in kilometers.  (Only works for Earth orbits.)

    create or replace function get_orbit_period

    (

    p_apogee number,

    p_perigee number

    ) return number is

    c_earth_radius constant number := 6378;

    v_radius_apogee number := p_apogee + c_earth_radius;

    v_radius_perigee number := p_perigee + c_earth_radius;

    v_semi_major_axis number :=

    (v_radius_apogee+v_radius_perigee)/2;

    v_standard_grav_param constant number := 398600.4;

    v_orbital_period number := 2*3.14159*sqrt(

    power(v_semi_major_axis,3)/v_standard_grav_param)/60;

    --pragma udf;

    begin

    return v_orbital_period;

    end;

    /

    ```


    Calling a custom function is as simple as calling a built-in function. The following
    code compares the pre-calculated value with our custom function:


    ```

    --Orbital periods for satellites.

    Select

    norad_id,

    orbit_period,

    round(get_orbit_period(apogee,perigee),2) my_orbit_period

    from satellite

    where orbit_period is not null

    order by norad_id;

    NORAD_ID   ORBIT_PERIOD   MY_ORBIT_PERIOD

    --------   ------------   ---------------

    000001            96.18             96.19

    000002            96.18             96.19

    000003           103.73            103.73

    ...

    ```


    Most of the values are a close match. There will be differences because of rounding,
    satellites orbiting another planet, and probably many other complexities I’m overlooking.
    The point of the `GET_ORBIT_PERIOD` function is that it encapsulates a lot of
    logic that we wouldn’t want to see repeated in SQL statements.


    The biggest problem with user-defined functions is the performance penalty. Oracle
    SQL and PL/SQL are separate languages, and there’s a small price to pay for context
    switching between them. Also, if we use the function as a condition, the optimizer
    will have to take a wild guess at how selective the condition is. And the function
    itself may also be expensive.


    If we have many user-defined functions, we should carefully track the number of
    times our functions are called, using tools like `V$SQL`, execution plans, and
    the hierarchical profiler. Luckily, there are several things we can do to potentially
    improve function performance.


    Simply adding `PRAGMA UDF` cuts the run time in half. That pragma tells the compiler
    to optimize the function for running in a SQL context. We may also want to define
    the function with `PARALLEL_ENABLE` (to allow the SQL statement to run in parallel),
    `DETERMINISTIC` (a promise to the compiler that the function always returns the
    same results for the same inputs, thereby enabling some additional optimizations
    and features), and `RESULT_CACHE` (to enable caching the function results, which
    is useful if the function is frequently called with the same parameters). There
    are also different compiler optimization settings that might be helpful. Or, as
    described in Chapter [20](#471418_2_En_20_Chapter.xhtml), we could rebuild the
    function as a SQL macro.


    In addition to performance problems, functions may also introduce consistency
    issues. A SQL statement is consistent, but a recursive SQL statement inside a
    user-defined function will read new data every time it’s executed.'
