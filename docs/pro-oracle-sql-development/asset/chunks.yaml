    by J. Finkelstein is licensed under CC BY-SA 3.0.


    ## Row Limiting


    Sometimes we only want to retrieve a subset of the results from our SQL statements.
    When applications only display N rows at a time, our queries should only return
    N rows. Oracle’s row limiting clause lets us specify exactly what subset of rows
    to return. Although the row limiting clause was introduced in 12c, there’s still
    a lot of code that uses the old `ROWNUM` technique, so we need to understand it.
    And sometimes we need to limit rows with analytic functions, using `ROW_NUMBER`.'
  trans: '### 正则表达式示例


    让我们尝试按名称和版本对运载火箭进行排序。但名称有些令人困惑——有时包含数字，有时包含罗马数字。为了正确排序名称，我们需要转换罗马数字。这个过程对于排序来说工作量很大，因此我们只介绍前几个步骤。首先，让我们看看流行的加拿大探空火箭“Black
    Brant”，并查找看起来像罗马数字的名称：


    ```sql

    --包含罗马数字的运载火箭名称。

    select lv_name

    from launch_vehicle

    where regexp_like(lv_name, ''\W[IVX]+'')

    and lv_name like ''Black Brant%''

    order by lv_name;

    LV_NAME


    Black Brant I

    Black Brant II

    Black Brant IIB

    Black Brant III

    ...

    ```


    上面查询中的关键要素是那个看似神秘的正则表达式 `''\W[IVX]+''`。该表达式用于查找所有运载火箭名称中包含一个非单词字符后跟一个或多个“I”、“V”或“X”的行。


    下一步是将罗马数字转换为数字。为了简化处理，我们将取巧一点，直接硬编码几个罗马数字转换。下面查询的重要之处在于使用 `REGEXP_REPLACE` 的方式，它将名称分解成不同的部分。名称被分解后，我们可以修改罗马数字部分，然后重新组合各部分：


    ```sql

    --转换罗马数字并将各部分重新组合成名称。

    select

    part_1||part_2||

    --这种硬编码显然不是最佳做法。

    case part_3

    when ''I'' then ''01''

    when ''II'' then ''02''

    when ''III'' then ''03''

    end||

    part_4 new_lv_name

    from

    (

    --包含罗马数字的运载火箭，已分解为各部分。

    select

    regexp_replace(lv_name, ''(.*)(\W)([IVX]+)(.*)'', ''\1'') part_1,

    regexp_replace(lv_name, ''(.*)(\W)([IVX]+)(.*)'', ''\2'') part_2,

    regexp_replace(lv_name, ''(.*)(\W)([IVX]+)(.*)'', ''\3'') part_3,

    regexp_replace(lv_name, ''(.*)(\W)([IVX]+)(.*)'', ''\4'') part_4

    from launch_vehicle

    where regexp_like(lv_name, ''\W[IVX]+'')

    and lv_name like ''Black Brant%''

    order by lv_name

    );

    NEW_LV_NAME


    Black Brant 01

    Black Brant 02

    Black Brant 02B

    Black Brant 03

    ...

    ```


    上面 `WHERE` 子句中的正则表达式仍然很简单，只是查找模式。但 `REGEXP_REPLACE` 中的正则表达式必须找到四种不同的模式——开头的任意内容、一个非单词字符、罗马数字以及结尾的任意内容。括号创建了四个分组，反斜杠加数字引用这些分组。每个
    `REGEXP_REPLACE` 用四个部分中的一个来替换整个字符串。


    正则表达式可以解决许多问题，并且有几种模式值得学习。最流行的例子是如何使用正则表达式将分隔符字符串拆分成不同的部分。为了按分隔符拆分，我们首先使用 `CONNECT
    BY` 行技巧来生成额外的行。对于每一行，我们匹配一个包含除分隔符外任意字符的字符组，使用像 `''[^,]''` 这样的表达式。最后，在 `REGEXP_SUBSTR`
    函数中，我们选择匹配的第 `LEVEL` 次出现。下面的查询虽然小，但用了很多特性：


    ```sql

    --将逗号分隔的字符串拆分成其元素。

    select regexp_substr(csv, ''[^,]'', 1, level) element

    from

    (

    select ''a,b,c'' csv

    from dual

    )

    connect by level <= regexp_count(csv, '','') + 1;

    ELEMENT


    a

    b

    c

    ```


    ### 正则表达式的局限性


    正则表达式晦涩的语法可能让我们感觉自己像编码超级英雄，但它非常容易搞得一团糟。使用正则表达式时，我们必须格外注意代码的可读性。我们必须抵制创建一个“超级表达式”的冲动，而应该将代码分解成小块。


    本章中的示例是*不该*怎么做的好例子。这些示例演示了正则表达式的概念，但我们离实际查找和替换罗马数字的目标还很远。如果我们查看所有不同的火箭名称，会注意到我们的简单规则有大量例外情况。转换这些罗马数字是那种“90-10”的任务；我们轻松构建了解决
    90%问题的方案，但解决剩下的 10%将耗费我们 90%的时间。


    这些“90-10”任务在解析文本时经常发生，我们必须了解自己的局限性。即使对于看似简单的字符串拆分任务，也有很多情况会破坏我们简单的正则表达式——例如空列表。拆分字符串的真正解决方案是首先不要在数据库中存储带分隔符的字符串。


    即使是看似简单的查找数字任务，也可能出乎意料地困难。重现第 4 章讨论的数值字面量语法图，需要一个极其复杂的正则表达式。互联网上充满了考虑不周全的答案，比如忘了开头的负号。至于验证电子邮件地址——官方的验证正则表达式超过
    6000 个字符长。


    最后，有许多任务用一个正则表达式根本不可能解决。图 7-2 展示了形式语言的层级结构。尽管正则表达式是强大的工具，但它们定义的正则语言处于该层级的底部。许多语言，如
    HTML、XML 和几乎所有编程语言，都是上下文无关或更高级别的语言。仅靠正则表达式无法完全解析 HTML、XML 和编程语言。正则表达式可以轻松地在复杂语言中找到许多模式，但找到简单模式可能会给我们一种错误的信心。我们必须小心，不要尝试将正则表达式用于需要完整语言解析器的任务。我们不想把时间投资在一个
    99%准确但永远无法达到 100%准确的正则表达式上。


    ![](img/471418_2_En_7_Fig2_HTML.png)


    该图像是一个包含正则、上下文无关、上下文敏感和递归可枚举语言的循环层级结构。


    图 7-2


    “乔姆斯基层级中所包含语言集合的图形表示”由 J. Finkelstein 创作，采用 CC BY-SA 3.0 许可。


    ### 行限制


    有时我们只想从 SQL 语句中检索结果的一个子集。当应用程序一次只显示 N 行时，我们的查询也应该只返回 N 行。Oracle 的行限制子句允许我们精确指定要返回哪个行子集。尽管行限制子句是在
    12c 中引入的，但仍有大量代码使用旧的 `ROWNUM` 技术，因此我们需要理解它。有时我们还需要使用分析函数 `ROW_NUMBER` 来限制行数。'
- fmt: '### Row Limiting Clause


    The row limiting clause lets us easily specify how many results to return from
    a query. We can choose either a number of rows or a percentage of rows. The number
    can be exact or can also return ties for the Nth number. We can also specify an
    offset, which can help with pagination. However, the row limiting clause cannot
    instantly retrieve rows from the middle of a result set and may lead to performance
    problems. For faster pagination it might be better to keep a cursor open and iterate
    through the results.


    The rows returned by the row limiting clause will respect the `order by` clause,
    if there is one. Without the `order by` clause, the syntax will return the first
    N rows it finds. (Those rows will be neither deterministic nor truly random. Remember
    – we can never assume anything about the order of results unless we specify the
    `order by` clause.)


    For example, let’s find the first three satellites, based on their launch date:


    ```

    --First 3 satellites.

    select

    to_char(launch_date, ''YYYY-MM-DD'') launch_date,

    official_name

    from satellite

    join launch

    on satellite.launch_id = launch.launch_id

    order by launch_date, official_name

    fetch first 3 rows only;

    LAUNCH_DATE  OFFICIAL_NAME

    -----------  -------------

    1957-10-04   1-y ISZ

    1957-10-04   8K71A M1-10

    1957-11-03   2-y ISZ

    ```


    The official names are cryptic, but you know those satellites. If you’re old enough,
    you may have literally seen those satellites in the sky. The first two rows are
    Sputnik 1 and its rocket, and the third row is Sputnik 2.


    ### ROWNUM


    In 11g and lower, the syntax for row limiting was a bit trickier. Even if we’re
    only using version 12c and above, we should still be familiar with the old techniques,
    because we will inevitably inherit old code.


    The traditional way to get the top N rows is with the `ROWNUM` pseudo-column and
    an inline view. `ROWNUM` returns a number that represents the order the row was
    returned from the query, starting with 1\. There’s a common mistake that everyone
    makes with `ROWNUM`; the `ROWNUM` pseudo-column cannot be filtered in the same
    subquery as the `ORDER BY`. `ROWNUM` is generated *before* the order by clause.
    If we filter by `ROWNUM` in the same subquery as the order by clause, the query
    will return a few random rows and then order those random rows. The following
    query is the only correct way to use `ROWNUM` filtering:


    ```

    --First 3 satellites.

    select launch_date, official_name, rownum

    from

    (

    select

    to_char(launch_date, ''YYYY-MM-DD'') launch_date,

    official_name

    from satellite

    join launch

    on satellite.launch_id = launch.launch_id

    order by launch_date, official_name

    )

    where rownum <= 3;

    LAUNCH_DATE  OFFICIAL_NAME  ROWNUM

    -----------  -------------  ------

    1957-10-04   1-y ISZ             1

    1957-10-04   8K71A M1-10         2

    1957-11-03   2-y ISZ             3

    ```


    ### Analytic Function Row Limiting


    More complex row limiting requires the `ROW_NUMBER` analytic function. The partition
    by clause in `ROW_NUMBER` allows us to get the top N rows for multiple groups.
    The following example returns the first two satellites of each year:


    ```

    --First 2 satellites of each year.

    select launch_date, official_name

    from

    (

    select

    to_char(launch_date, ''YYYY-MM-DD'') launch_date,

    official_name,

    row_number() over

    (

    partition by trunc(launch_date, ''year'')

    order by launch_date

    ) first_n_per_year

    from satellite

    join launch

    on satellite.launch_id = launch.launch_id

    order by launch_date, official_name

    )

    where first_n_per_year <= 2

    order by launch_date, official_name;

    LAUNCH_DATE  OFFICIAL_NAME

    -----------  -------------

    1957-10-04   1-y ISZ

    1957-10-04   8K71A M1-10

    1958-02-01   Explorer 1

    1958-03-17   Vanguard I

    ...

    ```


    There’s rarely a significant performance difference between `FETCH`, `ROWNUM`,
    and analytic functions, so we should use whichever approach feels more natural.
    If we do encounter performance problems, keep in mind that `FETCH` is internally
    implemented as an analytic function, so we shouldn’t bother rewriting between
    those two styles. Although the `ROWNUM` technique is older, in this case older
    may be better, since Oracle has some optimizations that only work with `ROWNUM`.


    ## Pivoting and Unpivoting


    Pivoting moves data from rows to columns, and unpivoting moves the columns back
    to rows. These features are useful when we want to summarize data for a report
    or want to load summarized report data into a table. There’s a simple aggregation
    and `UNION ALL` trick to pivot and unpivot data. Oracle also provides a `PIVOT`
    and an `UNPIVOT` syntax that can help simplify code. We should know both the old
    and new techniques, since they are both still useful.


    Pivoting combines rows of data into a single row with more columns. Our relational
    tables are often skinny, with just a few columns that list a type, a value, and
    a status. But our reports are often wide, with one type per row and a column with
    the values for each status. Figure 7-3 is a visual representation of the way pivoting
    and unpivoting change the shapes of the results.


    ![](images/471418_2_En_7_Chapter/471418_2_En_7_Fig3_HTML.png)


    Figure 7-3: Visual representation of pivot and unpivot


    ### Old Pivot Syntax


    Let’s start with a simple grouping example – the counts of launch statuses per
    year. The query returns skinny rows, with a different status for each row:


    ```

    --Launch success and failure per year.

    select

    to_char(launch_date, ''YYYY'') launch_year,

    launch_status,

    count(*) status_count

    from launch

    where launch_category in (''orbital'', ''deep space'')

    group by to_char(launch_date, ''YYYY''), launch_status

    order by launch_year, launch_status desc;

    LAUNCH_YEAR  LAUNCH_STATUS  STATUS_COUNT

    -----------  -------------  ------------

    1957               success             2

    1957               failure             1

    1958               success             8

    ...

    ```


    The preceding results are in a good format for further processing. But if we want
    to display the results, we can fit more information in a single row. The following
    query pivots the results, using the old-fashioned aggregation technique:


    ```

    --Pivoted launch successes and failures per year.

    select

    to_char(launch_date, ''YYYY'') launch_year,

    sum(case when launch_status = ''success'' then 1 else 0 end) success,

    sum(case when launch_status = ''failure'' then 1 else 0 end) failure

    from launch

    where launch_category in (''orbital'', ''deep space'')

    group by to_char(launch_date, ''YYYY'')

    order by launch_year;

    LAUNCH_YEAR  SUCCESS  FAILURE

    -----------  -------  -------

    1957               2        1

    1958               8       20

    1959              13       10

    ...

    ```


    The preceding results show more information per row because the status value was
    pivoted into multiple columns. The pivoted columns make it much easier to compare
    data across years. If we look at all the data, we discover that 1958 was by far
    the worst year for launches, both in the number of failures and the percentage
    of failures. The large number of failures was not just because rocket technology
    was new. There was a push to cut corners and launch as soon as possible. That
    push was fueled by the cold war and the Sputnik crisis.'
