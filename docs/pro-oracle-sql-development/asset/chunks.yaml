- fmt: '### How to Know When We’re Missing Something


    We’ll never memorize all the operators, functions, expressions, and conditions,
    no matter how many times we read the `SQL Language Reference`. We can only learn
    enough to develop a sense for when we’re missing something and when we ought to
    check the manual for a way to simplify our code. Oracle provides enough operators,
    functions, expressions, and conditions for the most common tasks. If we find ourselves
    doing a lot of type conversions, then we’re not using the right features. These
    syntax-soup problems most commonly happen with date manipulations.


    For example, let’s say we want to find information about the first artificial
    Earth satellite, Sputnik. We may remember the launch took place on October 4,
    1957\. But nobody remembers the exact time, so we should only check the date.
    The following query might work but has dangerous and unnecessary type conversions:


    ```

    select *

    from launch

    where to_char(to_date(launch_date), ''YYYY-Mon-DD'') = ''1957-Oct-04'';

    ```


    There is a simpler, safer, and faster way to accomplish the preceding query. The
    `TRUNC` function can remove the time portion of a date without any conversion.
    With enough practice and SQL knowledge, we will intuitively know that the preceding
    query can be transformed into something like the following query:


    ```

    select *

    from launch

    where trunc(launch_date) = date ''1957-10-04'';

    ```


    Alternatively, if there is an index on the `LAUNCH_DATE` column, the query might
    be significantly faster with a `BETWEEN` condition instead of a `TRUNC` function.
    There are trade-offs between simplicity and performance, and we should start with
    the simplest version first.


    ### Precedence Rules


    There are a few non-trivial rules for the order of precedence of operators and
    conditions. For operators, the most important rule is to follow the traditional
    math precedence rules: multiplication and division first and then addition and
    subtraction. For conditions, the most important precedence rule is `AND` comes
    before `OR`.


    More important than any precedence rule is the user interface rule: don’t make
    me think. Don’t create complex expressions that require readers to perfectly understand
    the precedence rules. Use parentheses and spacing to make the logic simple. For
    example, even this simple statement can be quite confusing:


    ```

    select * from dual where 1=1 or 1=0 and 1=2;

    ```


    It’s safer to add parentheses whenever we mix `AND`s with `OR`s. For example,
    rewrite the preceding SQL to this:


    ```

    select * from dual where 1=1 or (1=0 and 1=2);

    ```


    ### Simplify


    Inline views are not only for simplifying joins. When we have an extremely long
    expression, with many chained functions, it may make sense to split up the expression
    with multiple inline views. There’s no universal rule that tells us how many functions
    we can chain. The decision to chain or split depends on the query and what makes
    sense to us.


    For example, doing everything in one step in the following query may be too difficult
    to understand:


    ```

    select a(b(c(d(e(f(g(h(some_column))))))))

    from some_table;

    ```


    Sometimes it makes sense to break expressions into multiple steps, like with the
    following query. Using multiple inline views can make it easier to debug the query
    and quickly check the values as they move between inline views. On the other hand,
    we don’t need an inline view for every additional operator, function, expression,
    or condition. Whichever style we use, we don’t need to worry about performance,
    since Oracle can easily combine expressions:


    ```

    select a(b(c(d(result1)))) result2

    from

    (

    select e(f(g(h(some_column)))) result1

    from some_table

    );

    ```


    Combining conditions is deceivingly difficult. Logic that sounds reasonable in
    the natural language requirements does not always translate into a readable query.
    Some discrete math tricks can help us deal with complex queries. For example,
    with De Morgan’s law, we can rewrite `NOT(A OR B)` to `NOT(A) AND NOT(B)`, or
    we can rewrite `NOT(A AND B)` to `NOT(A) OR NOT(B)`. Even if rewriting a statement
    doesn’t make it clearer, the process of rewriting will help us understand the
    statement and requirements better.


    For especially tricky expressions and conditions, it may help to build a large
    truth table. These truth tables aren’t needed to demonstrate basic logical properties
    – we already know that `TRUE AND TRUE = TRUE`. These tables are convenient ways
    to show all combinations of the different inputs. When I get confused by the wording
    of a requirement, I’ll put the different pieces into something like Table 7-1.


    Table 7-1


    Example of a (Not Mathematically Precise) Multi-valued Truth Table


    | `Foo` | `Bar` | `Baz` | … | `Result` |

    | --- | --- | --- | --- | --- |

    | `True` | `True` | `True` | … | A |

    | `True` | `True` | `False` | … | B |

    | `True` | `False` | `True` | … | A |

    | `True` | `False` | `False` | … | C |

    | … | … | … | … | … |


    ### CASE and DECODE


    `CASE` expressions are perfect for adding conditional logic to SQL. `CASE` and
    `DECODE` are the `IF` statements of SQL, and they both use short-circuit evaluation.
    `CASE` is usually preferred over `DECODE` because it is more readable, it is available
    in both SQL and PL/SQL, and it does not have any unexpected behavior with nulls.


    The following example uses both `CASE` and `DECODE` to solve the fizz buzz programming
    question. Fizz buzz is a children’s game and a common entry-level programming
    interview question: count from 1 to 100; if the number is divisible by 3, say
    “fizz”; if the number is divisible by 5, say “buzz”; and if the number is divisible
    by both 3 and 5, say “fizz buzz.”


    The following code shows that `CASE` uses more characters than `DECODE`, but is
    also more readable. `CASE` is more powerful because it allows any kind of condition,
    not just an equality condition. Both approaches use short-circuit evaluation,
    which means they stop processing as soon as one match is found:


    ```

    --Fizz buzz.

    select

    rownum line_number,

    case

    when mod(rownum, 15) = 0 then ''fizz buzz''

    when mod(rownum,  3) = 0 then ''fizz''

    when mod(rownum,  5) = 0 then ''buzz''

    else to_char(rownum)

    end case_result,

    decode(mod(rownum, 15), 0, ''fizz buzz'',

    decode(mod(rownum, 3), 0, ''fizz'',

    decode(mod(rownum, 5), 0, ''buzz'', rownum)

    )

    ) decode_result

    from dual

    connect by level <= 100;

    LINE_NUMBER  CASE_RESULT  DECODE_RESULT

    -----------  -----------  -------------

    1  1            1

    2  2            2

    3  fizz         fizz

    4  4            4

    5  buzz         buzz

    6  fizz         fizz

    7  7            7

    ...

    ```


    The preceding example uses the more powerful searched case expression. There is
    also a simple case expression – a shorter syntax for comparing against a long
    list of values. The following example shows another way to write the fizz buzz
    program by hard-coding the values. This query is clearly not the best way to write
    this program, but this query demonstrates there are different `CASE` and `DECODE`
    syntaxes that can simplify queries with many hard-coded values:


    ```

    --Hard-coded fizz buzz.

    select

    rownum line_number,

    case rownum

    when 1 then ''1''

    when 2 then ''2''

    when 3 then ''fizz''

    else ''etc.''

    end case_result,

    decode(rownum, 1, ''1'', 2, ''2'', 3, ''fizz'', ''etc.'') decode_result

    from dual

    connect by level <= 100;

    ```


    `DECODE` is one of the few places where `NULL = NULL` is true. The following query
    returns “A” instead of “B”. This behavior is one of those exceptions we just have
    to memorize:


    ```

    select decode(null, null, ''A'', ''B'') null_decode from dual;

    ```'
