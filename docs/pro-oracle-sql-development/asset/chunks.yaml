  trans: "### 如何频繁部署？\n\n创建并维护数据库部署脚本并非魔法，甚至不需要二十一世纪的技术。文本文件和 `SQL*Plus` 几乎总是足够好用。但最重要的要素是**纪律**。\n\
    \n市面上有许多号称能自动化数据库部署的产品。但在这个领域，我们应该忽略自动化工具，利用 Oracle 已经提供的简单程序，自己动手构建。许多自动化部署程序要么是数据库无关的，要么假定了一种共享服务器模型。\n\
    \n数据库无关本身并无过错。显然，许多框架和程序因为能够处理大量数据库而受益。但是管理和部署模式对象需要深入了解数据库。大多数部署自动化工具重数量胜过质量。这些工具不完全理解\
    \ Oracle SQL，强迫我们使用更简单的“标准 SQL”，这使得我们难以利用 Oracle 的独特优势。如果我们为 Oracle 付费了，就应该使用它的全部功能。\n\
    \n许多数据库部署工具假定了过时的共享数据库模型。不要被愚弄；如果每个人都共享同一个开发服务器，就不可能实现敏捷。仅仅改进我们的共享数据库部署是不够的，我们不应该安于现状。克隆、数据泵、导入/导出、闪回数据库、可传输表空间和复制等技术显然很有用。但这些技术不应该成为我们部署流程的核心。\n\
    \n这就把我们引向了 `SQL*Plus`。这个程序在很多方面都显得过时，对于编程和临时查询等任务来说是个糟糕的选择，正如第 5 章所讨论的。但 `SQL*Plus`\
    \ 是 Oracle 脚本的**通用语言**。它不是一个完整的 shell 语言，不是一个集成开发环境，对于临时查询也不太擅长。但 `SQL*Plus` 恰好处于这些任务之间的甜蜜点。它免费、易于配置、已安装，并且与平台无关。（Oracle\
    \ 有一个名为 `SQLcl` 的新命令行工具，但如第 5 章所讨论的，我还不推荐使用它。）\n\n### SQL*Plus 安装脚本\n\n以下是数据库安装脚本的高级纲要：\n\
    \n1.  注释：目的、示例、先决条件等。\n2.  `SQL*Plus` 设置和启动消息。\n3.  检查先决条件。\n4.  删除旧的模式。\n5. \
    \ 为每个模式调用安装脚本：\n    1.  启动消息。\n    2.  创建用户。\n    3.  按对象类型调用一个或多个文件。\n    4.\
    \  结束消息。\n6.  向角色授予权限。\n7.  验证模式并打印结束消息。\n\n不要试图把所有东西都放在一个文件里。像对待任何程序一样对待安装文件，创建大量小的、可重用的部分。顶级安装脚本应该相对较小，主要是注释和对其他脚本的调用，例如\
    \ `@schema1/packages/install_package_specs.sql`。\n\n有许多棘手的细节需要时间才能弄对。脚本必须随着我们的程序一起成长。创建安装脚本不是一项可以留到项目最后才做的任务。\n\
    \n你不需要阅读整本 *SQL*Plus User's Guide and Reference*，但至少应该浏览一下目录中的命令。我不会在这里重复整本用户指南，但以下段落描述了重要的部分。\n\
    \n#### 注释\n\n脚本开头的注释常常被忽视。添加关于程序及其使用方式的详细信息非常重要。例如，看看 GitHub 上许多 `readme.md` 文件。最成功的项目几乎总是有有意义的文档来帮助人们快速上手。\n\
    \n#### SQL*Plus 设置和消息\n\n我们可以使用许多 `SQL*Plus` 设置来精确控制命令的运行和显示方式。安装脚本应显示足够的细节以帮助我们排查错误，但也不应过多，以免难以找到真正的问题。常见的设置有\
    \ `SET DEFINE ON|OFF`（启用或禁用将 & 符号视为替换变量）、`SET VERIFY ON|OFF`（显示替换变量的更改）、`SET FEEDBACK\
    \ ON|OFF`（显示诸如“x rows created”的消息）、`SET SERVEROUTPUT ON|OFF`（显示 `DBMS_OUTPUT`）、`PROMPT\
    \ TEXT`（显示消息）以及 `DEFINE VARIABLE = &1`（设置变量，可能通过使用 `&NUMBER` 设置为输入参数的值）。\n\n两个重要但未充分利用的\
    \ `SQL*Plus` 设置是 `WHENEVER SQLERROR EXIT FAILURE` 和 `WHENEVER OSERROR EXIT FAILURE`。不要把安装错误掩盖起来。一旦任何地方出错，立即停止整个安装通常比几天后试图修复一个半损坏的安装更安全。当我们犯错时，至少应该让它显而易见。\n\
    \n前面的脚本纲要包含了许多消息。这些消息可以由 `PROMPT`、`DBMS_OUTPUT.PUT_LINE` 或 `SELECT` 语句生成。要确切知道脚本在何处失败可能很困难，因此这些消息对故障排除很重要。使用\
    \ `SET ERRORLOGGING ON` 来捕获错误也可能有帮助。\n\n#### 检查先决条件\n\n我们可能需要将程序限制在特定平台或版本，检查表空间是否充足等。每当程序因配置问题而出错时，我们应该在先决条件部分添加对该问题的检查。如果\
    \ `SQL*Plus` 设置为出错时退出，我们就可以在发现缺失的先决条件时立即停止安装，例如使用像 `RAISE_APPLICATION_ERROR(-20000,\
    \ 'Prerequisite X failed...')` 这样的 PL/SQL 语句。\n\n#### 删除旧的模式\n\n一开始看起来可能很可怕，但经常删除模式很重要。为了安全起见，我们可能希望将删除命令放在一个文件名吓人的单独脚本中，以确保它永远不会在错误的环境上运行。在开发过程中，我们的模式会被不必要的垃圾弄得杂乱无章。有时我们可能向模式添加了一个对象，却忘记将该对象添加到脚本中。最好尽早清理模式并捕获缺失的对象。删除并重新创建模式将迫使我们变得更有纪律，并构建更干净的代码。\n\
    \n#### 对象类型的脚本\n\n每个模式的安装脚本是实际工作发生的地方。为每个对象类型设置单独的安装脚本非常重要。有些对象，比如表，可以分组放在一个文件中。其他对象，比如包、过程和函数，应该每个都有单独的文件。这些单独的文件允许我们的代码编辑器在开发过程中轻松地读写文件。按对象类型拆分安装脚本也使我们能够避免大多数依赖关系问题。例如，`install_schema1_tables.sql`\
    \ 应该在 `install_schema1_package_specs.sql` 之前运行。分离脚本还允许它们在不同的上下文中被调用。例如，包、过程和函数将同时被安装脚本和补丁脚本调用。\n\
    \n#### 向角色授权\n\n从项目一开始就构建一个向角色授权的脚本，即使我们认为不需要它。角色是我们总会忘记的事情之一，尤其是在我们删除并重新创建对象时。构建一个总是向适当角色授予所有权限的单一脚本，并在每次安装和每次补丁期间调用它，以防万一。很可能每个项目最终都需要为重要的模式设置一个只读或读写角色。"
- fmt: '#### Validate the Schemas


    Always finish with a small script to validate the schemas. Even if `WHENEVER SQLERROR
    EXIT FAILURE` is set, there are still subtle ways for errors to go unnoticed.
    The validation script should at least check for invalid objects and raise an exception
    if anything is found. Objects may become invalid during the installation, but
    a call to `DBMS_UTILITY.COMPILE_SCHEMA` usually fixes everything at the end. For
    systems with complex dependencies, you may need tricks such as adding a few `ALTER
    ... COMPILE` statements. The script may also check other status tables, or possibly
    the table `SPERRORLOG`, if SQL*Plus error logging was enabled.


    ### SQL*Plus Patch Scripts


    Our program may work great on our private databases, but eventually the code has
    to move to higher environments. It’s convenient to drop and recreate our schemas,
    but we obviously cannot do that in production. We need scripts to upgrade the
    schema to include our changes.


    Every developer should be involved with creating deployments and should be responsible
    for integrating their changes into the installation and patch scripts. Designing
    patch scripts requires some difficult decisions, but it’s important to not take
    any shortcuts.


    The installation scripts already take care of things like SQL*Plus settings, checking
    for errors, and installing code objects. If we separated the installation scripts
    by object type, half of the work would be already done. Installing code objects,
    such as packages, procedures, and functions, can be done the same way whether
    we’re installing or patching. Our patch template can simply call those pre-built
    code scripts. It’s easier to recompile everything, every time, instead of trying
    to find specific code changes.


    The tricky part is handling changes to persistent objects, such as tables. Once
    again, it is better to do this step by hand than to buy a tool and try to automate
    the process. The reason for manually building change scripts is discussed in the
    next section. For now, there is still one more decision left – how are those table
    changes backported into the installation scripts? Do we constantly update the
    installation scripts, or do we simply run the original installation scripts and
    then call the patch scripts at the end?


    Creating patch scripts is one of the few areas where it is beneficial to repeat
    ourselves and duplicate our code. Our installation scripts are not just used to
    recreate the system; they are also our best documentation for understanding how
    our databases were created. Those installation scripts are often more useful than
    looking at a live database, because the scripts may contain switches that install
    different versions of objects depending on things like the database version or
    edition.


    Patch scripts full of `ALTER` commands are ugly and difficult to follow. To see
    how a table was built, we shouldn’t have to find the original `CREATE TABLE` statement,
    then look through the patch scripts, and then put together a history of `ALTER
    TABLE` statements. We should take the extra time to make our scripts more readable
    for future developers; when we create the patch script, we should also add those
    changes to the installation script. It’s annoying, and there’s a chance of making
    a mistake when the code is duplicated, but in this case the duplication is worth
    the risk.


    ## Control Schemas with Version-Controlled Text Files


    Never use a database for version control. This book is about promoting practical
    solutions with Oracle SQL. Although it’s fun to push Oracle to its limits and
    write esoteric queries to solve weird problems, there are some things that should
    not be done in a database. Version control should be done with manually created
    text files.


    ### Single Source of Truth


    Understanding why we need version-controlled text files begins with a difficult
    question: Where is the ideal version of our schema? There are many possible answers,
    such as on a production database, on our private database, in our head, on a floppy
    disk in a drawer somewhere, etc. This is not merely a theoretical question; every
    program needs a single source of truth, a single place to find and maintain the
    real version of the program. (Ironically, the phrase “single source of truth”
    may have originated with databases, for database normalization. But now the phrase
    applies better to version control, which shouldn’t be done in a database.)


    The single source of truth must be convenient and accessible by everyone. It must
    allow us to store, manipulate, compare, fork, and track the history of everything.
    While databases are good at most of those tasks, databases don’t offer quite enough
    flexibility and don’t help at all with tracking changes. This problem was solved
    a long time ago, and the solution is text files stored in version control software.
    The specific version control program doesn’t matter. Whether we use Git, Subversion,
    or something else, any of those choices are significantly better than using a
    database. The ability to branch, merge, and resolve conflicts is a lot better
    than simply writing over someone else’s work. And modern version control programs
    form the basis of incredibly useful platforms, such as GitHub.


    Unfortunately, a lot of Oracle shops only use version control software as a glorified
    backup. Version control isn’t just a place to store an “official copy” or to store
    something before it’s promoted to another environment. Version control is where
    our programs need to *live*. If we could wave a magic wand and make all of our
    development databases disappear, it should only set us back a few hours. Recovery
    should be easy – get the latest version-controlled files and run the installation
    script.


    ### Load Objects from the Repository and File System


    The first step in development should be to clone a repository or pull the latest
    files onto your file system. When we want to modify an object, we should load
    that object from the *file system*, not the database. Modern IDEs, like Oracle
    SQL Developer, Toad, or PL/SQL Developer, make it trivial to work from the file
    system. In fact, working from the file system is even easier than working directly
    from the database objects, because we can carefully arrange the files and folders.


    For example, when building the data set and examples for this book, everything
    is stored on my hard drive and eventually committed to the GitHub repository.
    Figure 2-1 shows what this looks like when I’m working in PL/SQL Developer. The
    menu has the same file structure as the GitHub repository, and the tabs are color-coded
    to quickly identify which files have not been saved to the file system and which
    objects have not been compiled since the last change.


    ![](images/471418_2_En_2_Chapter/471418_2_En_2_Fig1_HTML.jpg)


    The snippet of an open file section tab. It is opened as a folder of space, code,
    examples, and chapter 3 is highlighted.


    **Figure 2-1**

    Viewing the database objects through a version-controlled file system


    Most IDEs also have version control interfaces that let us directly work with
    the repository, but it’s often easier to use the file system and the default version
    control client. If you’re not comfortable with the command line interface, there
    are many open source programs that visually integrate version control with the
    file system, such as TortoiseGit and Windows File Explorer.'
