    ## 书籍结构


    本书分为五个部分。各章节之间存在递进关系，但耦合度不高，你应该能够轻松地在不同章节间跳转阅读。


    **第一部分：学会如何学习（第 1-5 章）**：第一部分帮助你为高级的 Oracle SQL 开发奠定基础。然而，这些不仅仅是入门主题。本部分包含一些具有争议性的观点，如果你已经有一定基础，本书可能会建议你打破现有认知，重新开始。


    **第二部分：使用集合与高级特性编写强大的 SQL（第 6-10 章）**：这一部分为思考查询提供了一个清晰的思维模型。然后，它将向你介绍编写高级 SQL
    语句所需的高级特性、模式对象、概念和架构信息。


    **第三部分：使用模式与风格编写优雅的 SQL（第 11-15 章）**：这一部分教你构建优美 SQL 语句的艺术。你不能简单地将高级特性堆砌在一起，而是必须培养一种既能构建可读性强的查询，又能避免常见反模式（anti-patterns）的风格。


    **第四部分：提升 SQL 性能（第 16-18 章）**：这一部分通过实用的算法分析帮助你更深入地理解性能，并解释了许多调优概念和性能技巧。


    **第五部分：用 Oracle SQL 解决任何问题（第 19-21 章）**：最后几章将向你展示如何将技能提升至最终水平。这一部分介绍了一些最高级的 SQL
    特性，并简要讨论了 PL/SQL。


    本书旨在引入新的思想、特性、风格、理论和思维方式。它可能挑战你以不同的方式思考自己的风格和流程，但其目的*不是*用语法琐事来困扰你。不要试图记住所有语法——重要的是记住这些概念。


    ## 示例模式


    本书中的示例使用了从 JSR Launch Vehicle Database 生成的数据集。该数据集以及简单的安装说明可以在 [`https://github.com/apress/pro-oracle-sql-dev-2e`](https://github.com/apress/pro-oracle-sql-dev-2e)
    找到。如果你想运行示例，但没有一个方便的数据库，第 2 章提供了创建开发环境的建议。


    该模式简单、小巧、真实，并且希望是有趣的。这个示例模式包含了截至 2017 年所有 70,000 次尝试进行的轨道和亚轨道发射的数据，而不是一个无意义的虚构
    `EMPLOYEES` 列表。如果你对太空飞行感兴趣，你可以使用这些数据回答真实的问题。


    以下是主要的表格，大致按重要性和它们之间的关系列出。这些列和关系很简单，这里不详细解释。无需研究大型的实体关系（ER）图——只需花几秒钟熟悉一下表名：


    ```

    LAUNCH

    LAUNCH_PAYLOAD_ORG

    LAUNCH_AGENCY

    SATELLITE

    SATELLITE_ORG

    ORGANIZATION

    ORGANIZATION_ORG_TYPE

    SITE

    SITE_ORG

    PLATFORM

    LAUNCH_VEHICLE

    LAUNCH_VEHICLE_MANUFACTURER

    LAUNCH_VEHICLE_FAMILY

    STAGE

    STAGE_MANUFACTURER

    LAUNCH_VEHICLE_STAGE

    ENGINE

    ENGINE_MANUFACTURER

    ENGINE_PROPELLANT

    PROPELLANT

    ```


    模式中最重要的表是 `LAUNCH` 和 `SATELLITE`。图 1 展示了这两个表的列以及它们之间简单的关系。任何不明显的列在示例中使用前都会被解释。


    ![](img/471418_2_En_BookFrontmatter_Fig1_HTML.jpg)


    图 1 展示了两个表。标题分别是 `Space.launch` 和 `Space.satellite`。每个表都有一个类别列和类型。`Satellite_FK`
    连接着两个表。


    **图 1：两个最重要表的图示**


    ## 运行示例


    这些示例应该适用于任何当前支持的 Oracle 平台、版本和版本号。本书保守地假设你运行的版本是 12.2，并且会在某个特性是 18c、19c 或 21c
    的新特性时进行说明。实际上，数据库版本并不像招聘人员让你相信的那样重要，本书中的大部分信息适用于任何版本的 Oracle。


    虽然示例和结果通常以文本形式展示，但我强烈建议你使用图形化的 IDE 来运行示例和查看结果。IDE 对于创建、阅读和调试大型、高级的 SQL 语句至关重要。


    为了避免重复模式名称，示例假设你已将空间数据集安装在你个人的模式中。如果你将数据集安装在一个单独的模式中，在运行示例之前，请在你的会话中运行如下命令：


    ```

    alter session set current_schema=space;

    ```


    就像数据集一样，你可以在 [`https://github.com/apress/pro-oracle-sql-dev-2e`](https://github.com/apress/pro-oracle-sql-dev-2e)
    找到本书中使用的所有代码示例。如果你发现任何错误，可以克隆该仓库并创建一个 GitHub issue。


    不要被数据集和示例吓倒。本书是关于 SQL 开发流程、高级特性、编程风格和性能概念的。运行示例很有帮助，但对于阅读本书和理解材料来说并非必要。


