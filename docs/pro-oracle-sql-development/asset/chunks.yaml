- fmt: '# Degree of Parallelism


    如果我们的SQL无法更智能地工作，我们可以通过并行使其更努力地工作。在数据仓库操作中，找到请求和分配的并行度至关重要。围绕并行存在许多误解，因此我们需要仔细衡量结果并使用实际数字而非猜测。


    我们必须记住阿姆达尔定律以及并行化*每个*可能操作的重要性。如果执行计划中有一个PX操作，那么它就应该有许多PX操作。我们可以通过使用语句级提示而不是对象级提示来实现完全并行。


    唯一不希望使用并行的情况是关联子查询。我们不希望并行化一个运行次数很多的操作——并行的开销会大于收益。避免此问题的最佳方法是将子查询重写为内联视图。


    选择最优的DOP是困难的。较高的DOP对单个语句更好，但可能对其他进程不公平。


    每个Oracle并行服务器都是一个轻量级进程，Oracle能够处理大量的进程。开销随着每个并行服务器的增加而增加，但不像我们想象的那么多。高DOP肯定会有收益递减，并可能使系统的其余部分资源枯竭。但是，如果我们只执行一个足够长时间运行的语句，并且系统配置得当，那么更高的数字几乎总是更好。图18-10显示了DOP与单个语句性能之间的关系。


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig10_HTML.png)


    一个显示语句速度与并行度关系的图表。它表示并行实际如何工作的递增曲线，以及我们如何认为并行工作的递减曲线。


    **图 18-10**


    我们如何认为并行工作 vs. 它实际如何工作


    默认DOP基于参数`CPU_COUNT`乘以参数`PARALLEL_THREADS_PER_CPU`。因此，重要的是`CPU_COUNT`要设置为物理处理器的数量，而不是“逻辑处理器”的某种市场定义。


    不幸的是，很多时候并未使用默认DOP。有超过40个因素^([^(45)](#fn45))会影响并行度：提示、会话设置、对象设置、操作间并行（对于排序和分组等操作，这会将并行服务器的数量加倍）等。开发人员和管理员常常过于担心失控的并行。在降低关键参数（如`PARALLEL_MAX_SERVERS`）之前，我们应该确切理解语句为何获得其DOP。我们还应该衡量大DOP下的性能，而不是简单地假设大DOP是坏的。


    我们应该始终查看执行计划以获取关于DOP的信息。但请记住，执行计划只知道*请求的*并行服务器数量。实时SQL监控报告和`V$PX_PROCESS`可以告诉我们*实际的*并行服务器数量。即使我们的SQL语句被分配了正确数量的并行服务器，我们仍然需要检查该SQL语句是否在有意义地*使用*这些服务器。活动报告包含一个图表，向我们显示每个操作真正使用了多少并行进程。我们需要确保我们的语句始终请求、分配和使用适当数量的并行服务器。


    并行执行是复杂的。如果我们正在处理数据仓库，我们应该仔细阅读《VLDB和分区指南》中整章87页的“使用并行执行”。


    # What to Look for in Execution Plans


    以下是调查执行计划的快速检查清单。这些总结是一个很好的起点，尽管它们过度简化了我们将遇到的现实世界问题：


    1.  *Note*，*predicate*：这些部分中的奇怪内容可能是执行计划中其他所有问题的原因。

    2.  *慢操作*：只花时间调优那些本身缓慢或导致缓慢操作的操作。

    3.  *糟糕的基数*：找到第一个基数估计显著错误的操作。

    4.  *错误的连接操作*：避免对连接大比例行的嵌套循环索引访问。避免对连接小比例行的全表扫描哈希连接。

    5.  *错误的访问操作*：避免对返回大比例行的索引范围扫描。避免对返回小比例行的全表扫描。

    6.  *奇怪的等待*：在异常等待上花费的大量时间应该被调查。大多数等待应该是针对CPU或I/O。其他等待可能是配置问题的迹象。

    7.  *大量执行*：操作是否快速但重复了大量次数？这可能发生在需要解嵌套的子查询中，或许可以通过重写SQL使用连接来解决。

    8.  *糟糕的连接顺序*：对于哈希连接，最小的行源应列在前面。列在前面的行源用于创建哈希表，理想情况下该表应能放入内存。

    9.  直接路径或常规写入：确保`LOAD AS SELECT`或`LOAD TABLE CONVENTIONAL`按预期使用。

    10. *分区*：确保分区修剪按预期使用。

    11. *数字不匹配*：如果“活动(%)”列的总和不是100%，那么剩余时间被递归查询占用。检查缓慢的数据字典查询或查询中使用的缓慢函数。其他列（如“成本”）中的数字总和无关紧要。

    12. *临时表空间*：异常大量的临时表空间速度慢，可能导致资源问题，并且是其他问题的不良迹象。Oracle可能以错误顺序连接表，不正确地合并视图，或在错误时间执行`DISTINCT`操作。

    13. *并行度*：检查请求的、分配的和使用的DOP。


    SQL调优是困难的，我们必须始终用实际时间和基数武装自己，而不仅仅是猜测。


    # SQL Tuning: Changing Execution Plans


    在我们终于理解SQL查询的问题之后，有一长串修复执行计划的技术。每种技术都可以填满一整章，但这里只有空间进行简要总结和一个简单示例。'
  raw: '### Degree of Parallelism


    If our SQL can’t work smarter, we can make it work harder with parallelism. Finding
    the requested and allocated degree of parallelism is vital in data warehouse operations.
    There are many myths surrounding parallelism, so we need to carefully measure
    our results and use actual numbers instead of guesses.


    We must remember Amdahl’s law and the importance of parallelizing *every* possible
    operation. If the execution plan has one PX operation, then it should have many
    PX operations. We can achieve full parallelism by using statement-level hints
    instead of object-level hints.


    The only time we don’t want to use parallelism is with correlated subqueries.
    We do not want to parallelize an operation that runs a large number of times –
    the overhead of parallelism would be greater than the benefit. The best way to
    avoid that problem is to rewrite subqueries into inline views.


    Choosing the optimal DOP is difficult. A higher DOP is better for the individual
    statement but may be unfair for other processes.


    Each Oracle parallel server is a lightweight process, and Oracle is capable of
    handling a huge number of processes. The amount of overhead increases with each
    parallel server but not as much as we might think. A high DOP definitely has diminishing
    returns and can starve the rest of the system. But if we are only executing one
    sufficiently long-running statement and the system is properly configured, then
    a higher number is almost always better. Figure [18-10](#471418_2_En_18_Chapter.xhtml#Fig10)
    shows the relationship between DOP and the performance of a single statement.


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig10_HTML.png)


    A graph for the relationship between speed of statement versus degree of parallelism
    for one statement. It represents an increasing curve for how parallelism really
    works and a decreasing curve for how we think parallelism works.


    Figure 18-10


    How we think parallelism works vs. how it really works


    The default DOP is based on the parameter `CPU_COUNT` multiplied by the parameter
    `PARALLEL_THREADS_PER_CPU`. For this reason, it’s important that the `CPU_COUNT`
    is set to the physical number of processors and not some marketing definition
    of a “logical processor.”


    Unfortunately, there are many times when the default DOP is not used. There are
    over 40 factors^([^(45)](#fn45)) that affect the degree of parallelism: hints,
    session settings, object settings, interoperation parallelism (which doubles the
    number of parallel servers for things like sorting and grouping), etc. Developers
    and administrators often worry too much about runaway parallelism. Before we decrease
    a critical parameter, such as `PARALLEL_MAX_SERVERS`, we should understand exactly
    why statements are getting their DOP. We should also measure the performance at
    large DOPs instead of simply assuming a large DOP is bad.


    We should always look at the execution plans for information about the DOP. But
    keep in mind that the execution plan only knows the *requested* number of parallel
    servers. The real-time SQL monitor report, and `V$PX_PROCESS`, can tell us the
    *actual* number of parallel servers. Even when our SQL statement is allocated
    the correct number of parallel servers, we still need to check that the SQL statement
    is meaningfully *using* those servers. Active reports include a chart that shows
    us how many parallel processes are truly used for each operation. We need to make
    sure our statements request, allocate, and use the proper number of parallel servers
    at all times.


    Parallel execution is complicated. If we’re working on a data warehouse, we should
    carefully read the entire 87-page “Using Parallel Execution” chapter in the *VLDB
    and Partitioning Guide*.


    ### What to Look for in Execution Plans


    Here is a quick checklist for how to investigate execution plans. These summaries
    are a good starting point even though they oversimplify the real-world problems
    we will encounter:


    1.  *Note,* *predicate*: Something weird in these sections may be responsible
    for everything else in the execution plan.


    2.  *Slow operations*: Only invest time tuning operations that are either slow
    or cause a slow operation.


    3.  *Bad cardinality*: Find the first operation that has a significantly wrong
    cardinality estimate.


    4.  *Wrong join operations*: Avoid nested loop index access for joining a large
    percentage of rows. Avoid full table scan hash joins for joining a small percentage
    of rows.


    5.  *Wrong access operations*: Avoid index range scans for returning a large percentage
    of rows. Avoid full table scans for returning a small percentage of rows.


    6.  *Weird waits*: A significant amount of time spent on unusual waits should
    be investigated. Most of the waits should be for CPU or I/O. Other waits might
    be a sign of a configuration problem.


    7.  *Large number of executions*: Are the operations fast but repeated a large
    number of times? This can happen with a subquery that needs to be unnested, perhaps
    by rewriting the SQL to use a join.


    8.  *Bad join order*: For hash joins, the smallest row source should be listed
    first. The row source listed first is the one used to create the hash table, which
    ideally fits in memory.


    9.  Direct-path or conventional writes: Ensure that either `LOAD AS SELECT` or
    `LOAD TABLE CONVENTIONAL` is used as expected.


    10.  *Partitioning*: Ensure that partition pruning is being used as expected.


    11.  *Numbers that don’t add up*: If the “Activity (%)” column doesn’t add up
    to 100%, then the remaining time is being spent by a recursive query. Check for
    slow data dictionary queries or for slow functions used in the query. It doesn’t
    matter if the numbers in the other columns, like “Cost”, add up.


    12.  *Temporary tablespace*: An unusually large amount of temporary tablespace
    is slow, may cause resource problems, and is a bad sign of other issues. Oracle
    may be joining the tables in the wrong order, merging views incorrectly, or performing
    `DISTINCT` operations at the wrong time.


    13.  *Parallelism*: Check the requested, allocated, and used DOP.


    SQL tuning is difficult, and we must always arm ourselves with actual times and
    cardinalities, not just guesses.


    ## SQL Tuning: Changing Execution Plans


    After we finally understand the problem with our SQL query, there is a long list
    of techniques for fixing the execution plan. Each technique could fill an entire
    chapter, but there’s only room here for brief summaries and one small example.'
  trans: '# 并行度


    如果我们的 SQL 无法更智能地工作，我们可以通过并行使其更努力地工作。在数据仓库操作中，找到请求和分配的并行度至关重要。围绕并行存在许多误解，因此我们需要仔细衡量结果并使用实际数字而非猜测。


    我们必须记住阿姆达尔定律以及并行化*每个*可能操作的重要性。如果执行计划中有一个 PX 操作，那么它就应该有许多 PX 操作。我们可以通过使用语句级提示而不是对象级提示来实现完全并行。


    唯一不希望使用并行的情况是关联子查询。我们不希望并行化一个运行次数很多的操作——并行的开销会大于收益。避免此问题的最佳方法是将子查询重写为内联视图。


    选择最优的 DOP 是困难的。较高的 DOP 对单个语句更好，但可能对其他进程不公平。


    每个 Oracle 并行服务器都是一个轻量级进程，Oracle 能够处理大量的进程。开销随着每个并行服务器的增加而增加，但不像我们想象的那么多。高 DOP
    肯定会有收益递减，并可能使系统的其余部分资源枯竭。但是，如果我们只执行一个足够长时间运行的语句，并且系统配置得当，那么更高的数字几乎总是更好。图 18-10
    显示了 DOP 与单个语句性能之间的关系。


    ![](img/471418_2_En_18_Fig10_HTML.png)


