    # Part IVImprove SQL Performance


    # 16. Understand SQL Performance with Algorithm Analysis


    Solving Oracle SQL performance issues is the pinnacle of SQL development. Performance
    tuning requires a combination of all the skills previously discussed in this book.
    We need to understand the development process (to know why problems happened and
    weren’t caught sooner), advanced features (to find alternative ways to implement
    code), and programming styles (in order to understand the code and rewrite it
    into something better).


    Programming is one of the few fields with order-of-magnitude difference in skill
    level between professionals. We’ve all had to deal with coworkers who are only
    one-tenth as productive as us, and we’ve all been humbled by developers whose
    code is ten times better than ours. With performance tuning these numbers get
    even higher, and the rewards are greater. It’s exhilarating when we make a small
    tweak and something runs a million times faster.


    But “a million times faster” is only the beginning of this story. All SQL tuning
    guides discuss run *times*, but none of them consider the run-time *complexity*.
    Database performance tuning requires more than an encyclopedic knowledge of obscure
    features and arcane settings. Performance tuning calls for a different mindset.


    Algorithm analysis is the most underused approach to understanding Oracle performance
    problems. This chapter tells the story of Oracle performance through the lens
    of simple algorithm analysis. The sections are not listed in a traditional order,
    such as ordered by performance concepts and tuning tools. Instead, the sections
    are ordered by time complexity, from fastest to slowest.


    Admittedly, algorithm analysis is not the most useful performance tuning technique.
    But algorithm analysis should not be relegated to the halls of academia – it should
    be a part of everyone’s SQL tuning toolkit. We may solve more problems with techniques
    like sampling and cardinality estimates, but we’ll never truly understand performance
    without understanding the algorithms.


    Algorithm analysis can help us with both proactive and reactive tuning. For proactive
    tuning, we need to be aware of the advantages available if we create different
    data structures. For reactive tuning, we need to be able to measure the algorithms
    chosen by the optimizer and ensure Oracle made the right choices.


    The two chapters after this one provide a more traditional approach to performance
    tuning; those chapters describe the different concepts and solutions used in Oracle
    SQL tuning. This chapter explains why the stakes are so high for the decisions
    Oracle must make. This material should be useful to SQL developers of any skill
    level.'
  trans: '

    ## 避免将规划与过早优化混为一谈


    开发者们对 Donald Knuth 的那句“过早优化是万恶之源”引用得有点太多了。这句话背后有很多语境，而将其用作借口，直到项目快结束时才考虑性能，是一种错误的做法。我们当然要避免在每一个查询、每一行
    `PL/SQL` 代码被证明存在问题之前，就过度纠结于它们的性能。但是，随着我们在数据库开发方面经验越来越丰富，我们就能准确地预测瓶颈所在。每一个大型项目都应该花时间思考数据增长和反规范化的机会。


    规划数据增长不仅仅是简单地估算未来需要多少空间。预测性能是复杂的，我们不能简单地假设性能会随着数据量线性增长。正如下一章将描述的，存在很多性能增长非常缓慢的情况，例如使用索引访问；但也存在性能呈指数级增长的情况，例如锁竞争或糟糕的表连接。并非所有问题都能通过添加一个索引来解决，因此明智的做法是定期用接近真实的数据量和用户活动来测试我们的系统。


    务实的数据库开发者不应该太害怕反规范化数据。即使是关系模型和规范化规则的创造者也承认，有时我们需要重复数据。而且，有时我们需要快速地将不良数据塞进一个简单的表中，以后再清理。重复的数据可能使我们免于在一个复杂的数据模型中连接大量的表。移除触发器、关系完整性约束和持久性要求，可以实现直接路径写入，这比常规写入快一个数量级。当我们拥有海量数据时，我们需要为性能做好规划。


    ## 其他章节讨论的反模式


    其他章节讨论了许多反模式，其中一些最糟糕的实践值得再次提及。我们应该避免：在列中存储值列表、使用老旧的连接语法、编写依赖于执行顺序的 `SQL`、试图处理所有异常而不是使用传播机制、需要加引号标识符的区分大小写的对象名称、使用高级
    `PL/SQL` 特性代替 `SQL`、让所有对象都可公开访问，以及在单实例数据库能良好工作时对系统进行过度设计。


    ## 总结


    记住，每条规则都有例外。除了“将数据存储为错误的数据类型”之外，本章讨论的反模式并非总是邪恶的。我们不想到处告诉别人他们的代码很烂，但我们需要留意那些应该避免的不良编码实践。


    脚注 1 2


    # 第四部分 提升 SQL 性能


    ## 16. 通过算法分析理解 SQL 性能


    解决 Oracle `SQL` 性能问题是 `SQL` 开发的巅峰。性能调优需要综合运用本书前面讨论的所有技能。我们需要理解开发过程（以了解问题为何发生以及为何未被及早发现）、高级特性（以找到实现代码的替代方案）以及编程风格（以便理解代码并将其重写得更好）。


    编程是少数几个专业人士与外行水平差距能达到数量级的领域之一。我们都不得不应对生产力只有我们十分之一的同事，也肯定曾被代码水平比我们高十倍的开发者折服。在性能调优方面，这些数字差距会更大，回报也更丰厚。当我们做一个小调整，程序运行速度提高了百万倍时，那种感觉令人振奋。


    但“快百万倍”只是这个故事的开始。所有 `SQL` 调优指南都讨论运行时间，但没有一本考虑运行时复杂度。数据库性能调优不仅仅需要百科全书般关于晦涩特性和神秘设置的知识。它需要一种不同的心态。


    算法分析是理解 Oracle 性能问题时最未被充分利用的方法。本章通过简单算法分析的视角，讲述 Oracle 性能的故事。各小节并非按传统顺序排列，例如按性能概念或调优工具排序。相反，各小节是按时间复杂度排序的，从最快到最慢。


    诚然，算法分析并非最有用的性能调优技术。但它不应被束之高阁，局限于学术殿堂——它应该成为每个人 `SQL` 调优工具箱的一部分。我们可能通过采样和基数估计等技术解决更多问题，但如果不理解算法，我们就永远无法真正理解性能。


    算法分析可以帮助我们进行主动调优和被动调优。对于主动调优，我们需要意识到如果我们创建不同的数据结构，能获得哪些优势。对于被动调优，我们需要能够衡量优化器选择的算法，并确保
    Oracle 做出了正确的选择。


    接下来的两章提供了一种更传统的性能调优方法；它们描述了 Oracle `SQL` 调优中使用的不同概念和解决方案。本章解释了 Oracle 必须做出的决策为何如此关键。这些内容对任何技能水平的
    `SQL` 开发者都应有所裨益。

    '
- fmt: '## Algorithm Analysis Introduction


    With a few simple mathematical functions, we can gain a deeper understanding of
    the decisions and trade-offs involved in execution plan creation. Performance
    results are often given as simple numbers or ratios, such as “X runs in 5 seconds,
    and Y runs in 10 seconds.” The wall-clock time is important, but it’s more powerful
    to understand and explain our results with mathematical functions.


    Algorithm analysis, also known as asymptotic analysis, finds a function that defines
    the boundary of the performance of something. This technique can apply to memory,
    storage, and other resources, but for our purposes we only need to consider the
    number of steps in an algorithm. The number of steps is correlated with run time
    and is an oversimplification of the overall resource utilization of a database
    system. This chapter ignores measuring different kinds of resource utilization
    and considers all database “work” to be equal.


    A full explanation of algorithm analysis would require many precisely defined
    mathematical terms. Don’t worry – we don’t need a college course in computer science
    to use this approach. A simplified version of algorithm analysis is easily applied
    to many Oracle operations.


    Let’s start with a simple, naïve way to search a database table. If we want to
    find a single value in a table, the simplest search technique would be to check
    every row. Let’s say the table has `N` rows. If we’re lucky, we’ll find the value
    after reading only `1` row. If we’re unlucky, we have to read `N` rows. On average,
    we will have to read `N/2` rows. As the number of table rows grows, the average
    number of reads grows linearly.


    Our naïve algorithm for searching a table has a best-case, an average-case, and
    a worst-case run time. If we plot the input size and the number of reads, we’ll
    see that the worst-case performance is bounded by the function `N`. In practice,
    we only care about the upper bound. Worst-case run time can be labeled with the
    traditional Big O notation as `O(N)`. Although real-world solutions are full of
    constants and exceptions, we can ignore all those details and still meaningfully
    compare algorithms.


    Figure [16-1](#471418_2_En_16_Chapter.xhtml#Fig1) visualizes the worst case as
    a solid line, an asymptote that the real values can never exceed. Our not-so-smart
    search algorithm uses the dashed line, and it takes more or less steps^([^(32)](#fn32))
    depending on exactly where the value is placed in the table. Our real-world results
    look like the messy dashed line, but to understand performance, we can use the
    simpler solid line.


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig1_HTML.png)


    A scatterplot of steps from 0 to 20 versus the input size from 0 to 20\. The inclined
    line marked as N at the top is also visible.


    Figure 16-1: Number of steps vs. input size for linear search algorithm, including
    an asymptote


    The functions by themselves are meaningless; it’s the comparison between the functions
    that matters. We want Oracle to choose the functions that have the lowest number
    of steps on the Y axis, even as the data increases along the X axis.


    If Oracle only had to compare straight lines that begin at the graph’s origin,
    then the task would be trivial. The task becomes difficult when each algorithm’s
    performance is represented by a different curve and the curves intersect at different
    points along the X axis. Stated as an abstract math problem, to know which curve
    has the lowest Y value, Oracle must determine the X value. Stated as a practical
    database problem, to know which algorithm is fastest, Oracle must accurately estimate
    the number of rows. Bad execution plans occur when Oracle doesn’t have the right
    information to accurately estimate which operation is cheaper.


    Figure [16-2](#471418_2_En_16_Chapter.xhtml#Fig2) shows the most important functions
    discussed in this chapter. `O(1)`, `O(∞)`, and Amdahl’s law didn’t fit together
    on the graph, but they are also discussed later. Luckily, the most important Oracle
    operations fall into a small number of categories. We don’t need to look at the
    source code or write proofs, since most database operations are easy to classify.
    Spend a few moments looking at the lines and curves in Figure [16-2](#471418_2_En_16_Chapter.xhtml#Fig2).


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig2_HTML.png)


    The graph of number of steps versus input sizes for `N factorial`, `N square`,
    `N start log N`, `log N`, and `1 by N`.


    Figure 16-2: Functions that represent important Oracle operations


    The next sections discuss each function, where we find them, and why they matter.
    Comparing the preceding shapes helps explain many Oracle performance problems.'
  raw: '## Algorithm Analysis Introduction


    With a few simple mathematical functions, we can gain a deeper understanding of
    the decisions and trade-offs involved in execution plan creation. Performance
    results are often given as simple numbers or ratios, such as “X runs in 5 seconds,
    and Y runs in 10 seconds.” The wall-clock time is important, but it’s more powerful
    to understand and explain our results with mathematical functions.


    Algorithm analysis, also known as asymptotic analysis, finds a function that defines
    the boundary of the performance of something. This technique can apply to memory,
    storage, and other resources, but for our purposes we only need to consider the
    number of steps in an algorithm. The number of steps is correlated with run time
    and is an oversimplification of the overall resource utilization of a database
    system. This chapter ignores measuring different kinds of resource utilization
    and considers all database “work” to be equal.


    A full explanation of algorithm analysis would require many precisely defined
    mathematical terms. Don’t worry – we don’t need a college course in computer science
    to use this approach. A simplified version of algorithm analysis is easily applied
    to many Oracle operations.


    Let’s start with a simple, naïve way to search a database table. If we want to
    find a single value in a table, the simplest search technique would be to check
    every row. Let’s say the table has `N` rows. If we’re lucky, we’ll find the value
    after reading only `1` row. If we’re unlucky, we have to read `N` rows. On average,
    we will have to read `N/2` rows. As the number of table rows grows, the average
    number of reads grows linearly.


    Our naïve algorithm for searching a table has a best-case, an average-case, and
    a worst-case run time. If we plot the input size and the number of reads, we’ll
    see that the worst-case performance is *bounded* by the function `N`. In practice,
    we only care about the upper bound. Worst-case run time can be labeled with the
    traditional Big O notation as `O(N)`. Although real-world solutions are full of
    constants and exceptions, we can ignore all those details and still meaningfully
    compare algorithms.


    Figure [16-1](#471418_2_En_16_Chapter.xhtml#Fig1) visualizes the worst case as
    a solid line, an asymptote that the real values can never exceed. Our not-so-smart
    search algorithm uses the dashed line, and it takes more or less steps^([^(32)](#fn32))
    depending on exactly where the value is placed in the table. Our real-world results
    look like the messy dashed line, but to understand performance, we can use the
    simpler solid line.


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig1_HTML.png)


    A scatterplot of steps from 0 to 20 versus the input size from 0 to 20\. The inclined
    line marked as N at the top is also visible.


    Figure 16-1


    Number of steps vs. input size for linear search algorithm, including an asymptote


    The functions by themselves are meaningless; it’s the comparison between the functions
    that matters. We want Oracle to choose the functions that have the lowest number
    of steps on the Y axis, even as the data increases along the X axis.


    If Oracle only had to compare straight lines that begin at the graph’s origin,
    then the task would be trivial. The task becomes difficult when each algorithm’s
    performance is represented by a different curve and the curves intersect at different
    points along the X axis. Stated as an abstract math problem, to know which curve
    has the lowest Y value, Oracle must determine the X value. Stated as a practical
    database problem, to know which algorithm is fastest, Oracle must accurately estimate
    the number of rows. Bad execution plans occur when Oracle doesn’t have the right
    information to accurately estimate which operation is cheaper.


    Figure [16-2](#471418_2_En_16_Chapter.xhtml#Fig2) shows the most important functions
    discussed in this chapter. `O(1)`, `O(`∞`)`, and Amdahl’s law didn’t fit together
    on the graph, but they are also discussed later. Luckily, the most important Oracle
    operations fall into a small number of categories. We don’t need to look at the
    source code or write proofs, since most database operations are easy to classify.
    Spend a few moments looking at the lines and curves in Figure [16-2](#471418_2_En_16_Chapter.xhtml#Fig2).


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig2_HTML.png)


    The graph of number of steps versus input sizes for N factorial, N square, N start
    log N, log N, and 1 by N.


    Figure 16-2


    Functions that represent important Oracle operations


    The next sections discuss each function, where we find them, and why they matter.
    Comparing the preceding shapes helps explain many Oracle performance problems.'
  trans: '

    ## 算法分析简介


    通过几个简单的数学函数，我们可以更深入地理解执行计划创建过程中涉及的决策和权衡。性能结果通常以简单的数字或比率给出，例如“X 运行需要 5 秒，Y 运行需要
    10 秒”。实际耗时固然重要，但使用数学函数来理解和解释我们的结果则更具威力。


    算法分析，也称为渐近分析，旨在找到一个定义某事物性能边界的函数。这种技术可以应用于内存、存储和其他资源，但就我们的目的而言，我们只需要考虑算法中的步骤数。步骤数与运行时间相关，并且是对数据库系统整体资源利用情况的过度简化。本章忽略测量不同种类的资源利用，并认为所有数据库“工作”都是等价的。


    对算法分析的完整解释将需要许多精确定义的数学术语。别担心——我们不需要大学计算机课程就能使用这种方法。算法分析的一个简化版本可以轻松应用于许多 Oracle
    操作。


    让我们从一种简单、朴素的方法开始搜索数据库表。如果我们想在表中查找一个值，最简单的搜索技术是检查每一行。假设表有 `N` 行。如果运气好，我们只需要读取 `1`
    行就能找到该值。如果运气不好，我们就必须读取 `N` 行。平均而言，我们将需要读取 `N/2` 行。随着表中行数的增长，平均读取次数呈线性增长。


    我们这个用于搜索表的朴素算法具有最佳情况、平均情况和最坏情况的运行时间。如果我们绘制输入大小和读取次数的关系图，我们会看到最坏情况的性能被函数 `N` 所界定。实际上，我们只关心上界。最坏情况下的运行时间可以用传统的大
    O 表示法标记为 `O(N)`。尽管现实世界的解决方案充满了常数和异常，我们可以忽略所有这些细节，仍然能够有意义地比较算法。


    图 16-1 将最坏情况可视化为一条实线，这是一条真实值永远无法超过的渐近线。我们那个不太聪明的搜索算法使用虚线，它根据值在表中的确切位置而或多或少地需要一些步骤^(³²)。我们现实世界的结果看起来像那条凌乱的虚线，但为了理解性能，我们可以使用更简单的实线。


    ![](img/471418_2_En_16_Fig1_HTML.png)


    一个散点图，展示了从 0 到 20 的步骤数与从 0 到 20 的输入大小之间的关系。图中顶部标有 N 的斜线也清晰可见。


    图 16-1：线性搜索算法的步骤数与输入大小关系图，包含一条渐近线


    函数本身是没有意义的；重要的是函数之间的比较。我们希望 Oracle 选择那些在 Y 轴上步骤数最少的函数，即使数据沿着 X 轴不断增加。


    如果 Oracle 只需要比较那些从图表原点开始的直线，那么任务将变得微不足道。当每个算法的性能由不同的曲线表示，并且这些曲线在 X 轴的不同点相交时，任务就变得困难了。抽象地表述为一个数学问题：要知道哪条曲线的
    Y 值最低，Oracle 必须确定 X 值。实际地表述为一个数据库问题：要知道哪种算法最快，Oracle 必须准确估计行数。当 Oracle 没有正确的信息来准确估计哪个操作成本更低时，就会产生糟糕的执行计划。


    图 16-2 展示了本章讨论的最重要的函数。`O(1)`、`O(∞)` 和阿姆达尔定律不太适合放在这张图上，但它们也会在后面讨论。幸运的是，最重要的 Oracle
    操作只属于少数几个类别。我们不需要查看源代码或编写证明，因为大多数数据库操作都很容易分类。花点时间看看图 16-2 中的线条和曲线。


    ![](img/471418_2_En_16_Fig2_HTML.png)


    展示了 `N!`、`N²`、`N log N`、`log N` 和 `1/N` 的步骤数与输入大小的关系图。


    图 16-2：代表重要 Oracle 操作的函数


    接下来的几节将讨论每个函数、我们在哪里找到它们以及它们为什么重要。比较前面的形状有助于解释许多 Oracle 性能问题。

    '
- fmt: '## O(1/N)：通过批处理减少开销


    调和级数 `1/N` 完美地描述了许多 Oracle 操作的开销。这个函数描述了序列缓存、`BULK COLLECT` 限制、预取、数组大小、`UNION
    ALL` 中的子查询数量、带有批量选项（如 `DBMS_OUTPUT` 和 `DBMS_SCHEDULER`）的 PL/SQL 包，以及许多其他具有可配置批处理大小的操作。选择正确的批处理大小对性能至关重要。例如，如果需要为每一行执行一次
    SQL 到 PL/SQL 的上下文切换，或者必须为每一行等待一次网络往返，性能可能会非常差。


    为了减少逐行处理的浪费性开销，我们必须将多行的开销合并处理。但是，我们应该合并多少行呢？这是一个涉及许多权衡的难题。完全不合并任何行的处理速度会慢得离谱，而合并所有行则会导致内存或解析问题。批处理是获得良好性能的关键之一，因此我们需要清晰地思考应该批处理多少数据。


    只需选择 100，然后停止担心它。通过理解图 [16-3](#471418_2_En_16_Chapter.xhtml#Fig3) 中的图表，我们可以自信地选择像
    100 这样的值。首先要注意的是，理论结果与现实世界的结果几乎完全匹配。


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig3_HTML.png)


    图中展示了理论与实践，包括“实际工作+开销”与批处理大小的关系图，以及运行时间与序列缓存/`BULK COLLECT` 限制大小的关系图。


    **图 16-3**


    批处理大小增加对运行时间的影响


    对于左侧的理论图表，总运行时间是“实际工作”的虚线加上开销的实线。增加批处理大小会迅速减少开销，但开销的减少量是有限的。无论我们如何增加批处理大小，总工作量永远不会降至零。我们的处理过程从来不是纯粹的开销——总会存在一定量的实际工作。


    前面图中的线条从接近无穷大开始，并迅速趋于平缓。随着我们增加批处理大小，开销迅速消失。批处理大小为 2 时消除了 50% 的开销，为 10 时消除了 90%，为
    100 时消除了 99%。设置为 100 已经优化了 99%。从理论上讲，批处理大小为 100 和十亿之间的差异不可能超过 1%。


    用于生成现实世界结果的脚本可以在 GitHub 仓库中找到。这里没有足够的空间列出所有代码，但这些代码值得简要讨论。这些脚本创建了两种具有极高开销的场景：插入每一行值都是序列的数据，以及批量收集少量数据但不对结果做任何处理。测试用例几乎完全充满了无用的开销。如果存在任何测试用例能通过将批处理大小从
    100 增加到 1000 而显示出 *有意义的* 改进，那么这就是了。


    表 [16-1](#471418_2_En_16_Chapter.xhtml#Tab1) 详细描述了三种批处理场景。这三行是三个完全不相关的任务，但可以用相同的时间复杂度完美解释。


    **表 16-1**


    性能取决于减少开销的不同任务


    | 任务 | 实际工作 | 开销 | 可配置参数 |

    | --- | --- | --- | --- |

    | 批量收集 | 选择数据 | SQL 与 PL/SQL 上下文切换 | `LIMIT` |

    | 使用序列插入 | 插入数据 | 生成序列号 | `CACHE SIZE` |

    | 应用程序获取行 | 选择数据 | 网络延迟 | 获取大小 |


    我们可以从这个理论中得出许多实际结果。游标 `FOR` 循环使用的默认 `BULK COLLECT` 大小 100 已经足够好；几乎从来没有显著好处去使用一个高得离谱的自定义限制。默认的序列缓存大小
    20 已经足够好；在极端情况下，稍微增加缓存大小可能是值得的，^([^(33)](#fn33)) 但也不应大幅增加。不同应用程序的应用程序预取大小不同；我们应该将其设置为接近
    100。这些规则适用于任何减少开销的优化。


    如果我们处于极端情况或深入钻研结果，我们总能发现使用更大批处理大小带来的微小差异。但如果我们发现自己处于需要设置巨大批处理大小才能显著改善的情况，那我们其实已经失败了；我们需要将算法带到数据身边，而不是将数据带到算法身边。


    在实践中，将算法带到数据身边意味着我们应该将至少部分逻辑放在 SQL 中，而不是将数十亿行数据加载到过程语言中进行微不足道的处理。如果我们愚蠢地将表中的所有行加载到
    PL/SQL 中，只是为了用 `V_COUNT := V_COUNT+1` 来计数，那么增加批处理大小会有所帮助。但更好的解决方案是在 SQL 语句中使用
    `SELECT COUNT(*)`。如果我们将十亿行数据加载到 PL/SQL 中并对这些行执行实际工作，那么通过更大的批处理大小节省的几秒钟将是无关紧要的。总有例外情况，例如如果我们必须通过数据库链接访问大量数据并面临可怕的网络延迟，但我们不应该让这些例外情况来决定我们的标准。


    在空间和运行时间之间存在权衡，但具有调和级数时间复杂度时，我们会很快用空间换取 *零* 运行时间。开发人员浪费了大量精力在争论和调整前图中右侧的大数值上，但几乎所有的收益都发生在图中左侧的快速变化区域。当我们拥有
    `1/N` 时间复杂度时，收益递减点会非常快地达到。我们应该花时间寻找批处理命令和减少开销的机会，而不是担心精确的批处理大小。


    ## O(1)：哈希与其他操作


    常数时间访问是理想的，但通常不现实。能够以常数时间工作的操作大多是简单的，例如使用像 `ROWNUM = 1` 这样的谓词。常数时间函数很简单，只是一条水平线，不值得在图表中展示。最重要的可以以常数时间运行的
    Oracle 操作是哈希。哈希是数据库的核心操作，值得详细讨论。'
  raw: '## O(1/N): Batching to Reduce Overhead


    The harmonic progression `1/N` perfectly describes the overhead of many Oracle
    operations. This function describes sequence caching, bulk collect limit, prefetch,
    arraysize, the number of subqueries in a `UNION ALL`, PL/SQL packages with bulk
    options like `DBMS_OUTPUT` and `DBMS_SCHEDULER`, and many other operations with
    a configurable batch size. Choosing the right batch size is vital to performance.
    For example, performance may be disastrous if there is a SQL-to-PL/SQL context
    switch for every row or if we have to wait for a network round trip for every
    row.


    To reduce wasteful row-by-row overhead, we must combine the overhead for multiple
    rows. But how many rows do we combine? This is a difficult question with many
    trade-offs. Not combining *anything* is ridiculously slow, but combining *everything*
    will cause memory or parsing problems. Batching is one of the keys to good performance,
    so we need to think clearly about how much to batch.


    Just pick 100 and stop worrying about it. We can be confident in choosing a value
    like 100 by understanding the following charts in Figure [16-3](#471418_2_En_16_Chapter.xhtml#Fig3).
    The first thing to notice is that the theoretical results almost perfectly match
    the real-world results.


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig3_HTML.png)


    For theory and practice, two graphs of real work plus overhead versus batch size
    and run time versus sequence cache slashed bulk collect limit size are demonstrated.


    Figure 16-3


    The effect of increased batch size on run time


    For the theoretical chart on the left, the total run time is the dotted line of
    the “real work” plus the solid line of the overhead. Increasing the batch size
    rapidly reduces the overhead, but there is only so much overhead to reduce. No
    matter how much we increase the batch size, the total amount of work will never
    get to zero. Our processes are never purely overhead – there should always be
    a significant amount of real work to do.


    The lines in the preceding graphs start near infinity and quickly plateau. As
    we increase the batch size, the overhead rapidly disappears. A batch size of 2
    removes 50% of the overhead, a batch size of 10 removes 90%, and a batch size
    100 removes 99%. A setting of 100 is already 99% optimized. The difference between
    a batch size of 100 and a batch size of one billion cannot theoretically be more
    than 1%.


    The scripts I used to produce the real-world results can be found in the GitHub
    repository. There’s not enough space to list all the code here, but the code is
    worth briefly discussing. The scripts created two scenarios with a ridiculous
    amount of overhead: inserting rows where every value is a sequence and bulk collecting
    a small amount of data and doing nothing with the results. The test cases are
    almost completely full of useless overhead. If any test case was going to show
    a *meaningful* improvement by increasing batch size from 100 to 1000, this was
    it.


    Table [16-1](#471418_2_En_16_Chapter.xhtml#Tab1) describes three batching scenarios
    in detail. These rows are three completely unrelated tasks that can be perfectly
    explained with the same time complexity.


    Table 16-1


    Different Tasks Where Performance Depends on Reducing Overhead


    | Task | Real Work | Overhead | Configurable Parameter |

    | --- | --- | --- | --- |

    | Bulk collect | Selecting data | SQL-and-PL/SQL context switch | LIMIT |

    | INSERT using sequence | Inserting data | Generating sequence numbers | CACHE
    SIZE |

    | Application fetching rows | Selecting data | Network lag | Fetch size |


    There are many practical results we can derive from this theory. The default bulk
    collect size of 100 used by cursor `FOR` loops is good enough; there’s almost
    never any significant benefit to using a ridiculously high custom limit. The default
    sequence caching size of 20 is good enough; in extreme cases it might be worth
    increasing the cache size slightly,^([^(33)](#fn33)) but not by a huge amount.
    Application prefetch is different for each application; we should aim for something
    close to 100\. These rules apply to any overhead-reducing optimization.


    If we have an extreme case or drill way down into the results, we can always find
    a miniscule difference with a larger batch size. But if we find ourselves in a
    situation where setting a huge batch size significantly helps, then we’ve already
    lost; we need to bring our algorithms to our data, not our data to our algorithms.


    In practice, bringing algorithms to our data means we should put at least some
    of our logic in SQL, instead of loading billions of rows into a procedural language
    for a trivial amount of processing. If we foolishly load all the rows from a table
    into PL/SQL just to count them with `V_COUNT := V_COUNT+1`, then increasing the
    batch size will help. But the better solution would be to use SELECT `COUNT(*)`
    in a SQL statement. If we load a billion rows into PL/SQL and perform real work
    with those rows, the few seconds we save from a larger batch size will be irrelevant.
    There are always exceptions, like if we have to access lots of data over a database
    link with horrendous network lag, but we should not let those exceptions dictate
    our standards.


    There are trade-offs between space and run time, but with a harmonic progression
    time complexity, we will quickly trade space for *no* run time. Developers waste
    a lot of effort debating and tweaking large numbers on the right side of the preceding
    graphs, but almost all the bang for our buck happens quickly on the left side
    of the graph. When we have a `1/N` time complexity, the point of diminishing returns
    is reached very quickly. We should spend our time looking for opportunities to
    batch commands and reduce overhead, not worrying about the precise batch size.


    ## O(1): Hashing and Other Operations


    Constant-time access is ideal but often unrealistic. The operations that can work
    in constant time are mostly trivial, such as using a predicate like `ROWNUM =
    1`. The constant-time function is simple, just a horizontal line, and is not worth
    showing on a graph. The most important Oracle operation that can run in constant
    time is hashing. Hashing is a core database operation and is worth discussing
    in detail.'
  trans: '## O(1/N)：通过批处理减少开销


    调和级数 `1/N` 完美地描述了许多 Oracle 操作的开销。这个函数描述了序列缓存、`BULK COLLECT` 限制、预取、数组大小、`UNION
