  trans: '

    ## 摘要


    许多性能问题都归属于少数几种运行时复杂性类型。了解哪些函数代表了我们的问题，可以帮助我们理解 Oracle 为何会以某种特定方式表现，以及如何找到解决方案。实用的算法分析只是将我们的问题与预定义的问题类别进行匹配。我们可能不常用这种方法，但若没有它，我们将永远无法真正理解数据库性能。


    我们的大多数性能问题都与实现细节以及那些我们一直方便地忽略的烦人常量有关。下一章将介绍一份更传统的 Oracle 性能概念列表。


    脚注 1   2   3   4   5   6


    # 17. 理解 SQL 调优理论


    算法分析是理解 Oracle 性能基础的有用指南。现在，我们必须转向更传统的数据库性能技术和理论。首先，我们需要从最终用户的角度讨论性能问题。然后，我们将讨论几种流行的性能调优方法。但条条大路最终都通向
    SQL 调优。为了进行有效的 SQL 调优，我们需要理解执行计划的重要性、执行计划可用的操作、基数、优化器统计信息、转换以及动态优化特性。


    ## 管理用户预期


    在深入技术主题之前，我们需要处理性能调优中人的因素。我们通常不是为自己调优；我们是为客户或最终用户调优系统。在调查问题、解释资源、提出想法和实施变更时，我们需要仔细考虑最终用户的视角。


    首先，我们需要对性能问题有一个清晰、客观的定义。最终用户可能没有太多故障排除的经验，因此我们需要帮助引导对话。与其简单地问“出什么问题了？”，我们应该询问具体细节。我们需要知道问题是持续性的还是间歇性的，它何时发生，运行需要多长时间，它是否一直这么慢，运行本应需要多长时间，我们是否确定问题出在数据库而不是应用程序等等。我们必须记住“知识的诅咒”，并且必须格外努力地用简单的语言传达调优信息。在发现阶段多花一分钟，可以为我们节省数小时不必要地调优错误目标的时间。


    当我们发现并理解问题后，我们必须考虑可能为性能不佳提供背景信息的可用资源。许多性能问题是可以修复的 Bug，但许多其他性能问题是由资源限制造成的。我们需要了解我们的数据库和服务器资源，并与最终用户诚实地讨论它们。我曾通过解释“我们的旧服务器比你的笔记本电脑还慢，所以这已经是处理数据的最快速度了”或“你在读取
    X GB 的数据。我们的硬盘每秒只能读取 Y MB。这个任务至少需要 Z 秒钟”来安抚许多愤怒的用户。如果用户认为等待是合理的，他们会更愿意等待。


    根据变更的范围，我们可能需要向最终用户或客户提交成本/效益分析以获得批准。成本可能是购买硬件的资金，也可能是我们的时间。在这一步，诚实、谦逊和测试都很重要；花钱买硬件却解决不了任何问题，或者截止日期被推迟，这种情况并不少见。最好少做承诺，多做交付。


    当我们实施变更时，我们必须确保仔细测量变更前后的性能。最终用户会想知道他们的投资到底得到了什么回报。


    像大多数开发任务一样，我们大部分的性能调优时间将花在讨论和协调工作上，而不是工作本身。但本书侧重于 SQL 开发，所以让我们直接进入查找和修复性能问题的技术工作。


    ## 性能调优的思维方式


    本章可能会让你失望。我知道你想要什么，但不可能构建一个单一、全面的性能调优检查清单。每当我们遇到性能问题时，我们都希望能扫描一个检查清单、翻阅一本书的章节或参考一个标准操作程序。本书中有大量的清单，但性能调优过于复杂，无法用简单的分步说明来描述。


    性能调优很难，我们需要以不同于其他问题的方式来对待它。我们不能像调试那样对待性能调优。我们需要多种多样的方法来防止自己在有动机的故障排除上浪费时间。


    ### 性能调优不是调试


    我们必须将性能问题与代码问题区别对待。将相同的问题解决过程应用于调优和调试是很有诱惑力的；发现问题，深入挖掘根本原因，然后修复或规避底层问题。对于调试，我们需要使用*深度优先*的方法；对于性能调优，我们需要使用*广度优先*的方法。试图对性能调优使用深度优先方法的开发人员和管理员会浪费大量时间。


    对于调试，我们只需要找到第一个问题然后深入挖掘。程序必须 100% 正确运行，即使是单个不正确的字节也值得调查。即使我们没有修复正确的问题，我们仍然完成了一些有用的工作。


    对于性能调优，我们需要找到第一个*显著*的问题，然后深入挖掘。“显著”这个词是主观的，可以指减慢网页速度、消耗大量资源从而拖慢整个系统、推高服务器成本等问题。但即使我们无法完全就什么是显著的性能问题达成一致，我们仍然可以采用一种通常能引导我们解决问题的思维方式。也许思考什么*不是*显著的性能问题更有用；一个问题不会仅仅因为我们不喜欢它或者我们知道如何修复它就变得显著。性能问题的候选者总是无数的。问题可能出在应用程序、数据库、操作系统、网络、硬件、存储区域网络等方面。很容易被无关紧要的线索分散注意力。如果我们不迅速排除虚假的相关性，我们将浪费大量时间。


    性能调优的艺术在于使用多种方法快速收集和过滤大量数据。我们必须忽略那 90% 运行良好的部分，忽略那 9% 虽然慢但必然慢的部分，找到那 1% 既慢又可以修复的部分。如果我们使用一个简单的检查清单，里面包含诸如“避免全表扫描”这样过度简化的规则，我们将花太多时间去修复错误的问题。


    ### 有动机的故障排除


    我们必须时刻警惕那些会让我们浪费数天时间修复无关问题的偏见。我们都有一种走捷径的冲动，专注于修复我们熟悉的问题。遵循熟悉的路径是修复 Bug 的一个好策略——任何清理都是有益的。对代码持有乌托邦式的看法是有益的。


    但性能调优必须牢牢立足于现实。残酷的真相是，没有人会完全理解所有的等待事件或所有的执行计划操作。我们只有时间去修复那些缓慢的部分。


    对于个人学习，调查任何看起来不对劲的地方是有帮助的。但当存在关键性能问题时，我们必须只关注最重要的部分。

    '
- fmt: '### Different Approaches


    There are many ways to investigate our programs for performance problems. The
    following list includes the common approaches to performance tuning. Each approach
    works better in different contexts, and we must be willing to quickly change approaches
    if one isn’t working. As we gain experience, we develop our own tuning style and
    develop a feeling for when something is wrong. Also, technologies change over
    time, so we must be willing to change our approach:

    1.  *Application/operating system/hardware*: We don’t always have to solve the
    most direct problem. Improving one layer in our system may be enough to make the
    problem go away in another. For example, if we can’t fix the execution plan of
    a statement, we could make up for a slow operation by increasing the hardware
    I/O performance. Or we could shift the problem to a different layer by moving
    application logic into a query or vice versa. But we can’t always compensate for
    bad performance in one layer with a fix in another, and these solutions can be
    wasteful and expensive. Non-SQL approaches are not discussed in this chapter.

    2.  *Cardinality*: Examining the number of rows returned by each operation of
    a SQL statement is a useful way of gauging the accuracy of execution plans. This
    approach is discussed in a later section.

    3.  *Tracing/profiling/sampling*: Virtually every activity performed in Oracle
    is instrumented. Oracle can capture almost every detail of almost every SQL statement
    with tracing. Oracle can capture the time spent on every line of PL/SQL code with
    profiling. In practice, tracing has been mostly replaced by Oracle’s sampling
    frameworks, such as `AWR` (Automatic Workload Repository), `ASH` (Active Session
    History), and `SQL monitoring`. Tracing provides a ginormous amount of data but
    inconveniently. Sampling provides a huge amount of data and makes the data easily
    accessible. Profiling and sampling are discussed in the next chapter.

    4.  *Algorithm analysis*: Comparing the run-time complexity of different choices
    helps us understand the trade-offs and decisions made by Oracle. This approach
    was discussed in the previous chapter.

    5.  *Phone a friend*: Sometimes we need to admit defeat and seek help from others.
    This approach can be as simple as asking a search engine or our coworkers. Or
    we can create a service request and ask Oracle to tune for us. (But in my experience,
    Oracle Support is not helpful for performance tuning, unless we are certain we
    have hit a bug. Most support engineers don’t seem interested in tuning and will
    inundate us with requests for off-topic trace files until we go away.) Or we can
    rely on Oracle’s automated advisors to recommend and implement performance fixes.
    (But in my experience, Oracle’s advisors are rarely helpful. Hopefully, the advisors
    will improve in future versions.) This approach is not discussed further in this
    chapter.

    6.  *Avoid the problem*: The fastest way to run something is to not run it at
    all. When we understand our code, and the code’s context, we often discover a
    simpler implementation. This approach depends on using a good development process,
    understanding Oracle’s advanced features, and using proper SQL programming styles
    to make the code’s meaning more intelligible. The topics discussed in Parts I,
    II, and III of this book can fix the majority of our performance problems. Performance
    tuning cannot be studied in isolation. If you skipped to Part IV of this book,
    you missed the most important tuning tips. Advice like “use inline views and `ANSI
    SQL` join syntax” is indirectly related to performance, but more important than
    anything discussed in this chapter.


    We all have different preferences, and one approach isn’t necessarily better than
    another. We can often use expertise in one technique to compensate for a lack
    of knowledge in another. For example, this book uses my preferred technique of
    focusing on individual SQL statements instead of looking at overall resource utilization;
    if we take care of the queries, the databases will take care of themselves. Admittedly,
    that approach does not always work, so it’s worth reading different sources and
    learning different tuning styles.


    ### Why Not Database Tuning?


    Database tuning, performance planning, system architecture, and configuration
    are important topics, with many books written about them. You might wonder why
    this book focuses on SQL tuning instead of database tuning. It’s not just because
    this book is about SQL; it’s because SQL is the central component of the database.
    Tuning SQL will also alleviate stress on the database, operating system, hardware,
    network, `SAN`, etc.


    The converse is less likely to be true; it’s easier for SQL improvements to make
    up for bad hardware than it is for hardware improvements to make up for bad SQL.
    Hardware improvements tend to be linear, while SQL improvements are frequently
    exponential or better. Oracle provides so many SQL tuning opportunities that we
    can almost always find a way to make the SQL run faster.


    Plenty of systems can limp by with ancient hardware if the SQL runs well. But
    if our execution plans are full of bad Cartesian products, then there is no hope.
    Unless we have access to a quantum computer, there is no way to buy ourselves
    out of a terrible algorithm.


    ## Declarative Programming (Why Execution Plans Are Important)


    In traditional imperative programming, we tell the compiler exactly how to operate,
    and we are responsible for creating efficient algorithms and data structures to
    enable good performance. In declarative programming, we tell the compiler what
    we want, and the compiler tries to find the optimal algorithms and data structures.


    ### Declarative Quirks


    SQL is our declarative language in Oracle. We ask Oracle to modify or retrieve
    data, and Oracle has to decide how to join the tables, apply the filters, etc.
    There are many interesting consequences of this declarative environment.


    For example, Oracle `SQL` provides consistency and tries to make many things happen
    at the exact same moment. The following `SQL` statement has two references to
    `SYSDATE`, and both of them will always return the same value:


    ```sql

    --In declarative SQL, these SYSDATEs generate the same value.

    select sysdate date1, sysdate date2 from dual;

    ```


    When we write `SYSDATE` in `SQL` statements, we’re asking Oracle to find the current
    date. When we write `SYSDATE` in `PL/SQL`, we’re asking Oracle to assign the current
    date to a variable. This `PL/SQL` snippet has a small chance of passing two different
    values: `SOME_PROC(SYSDATE, SYSDATE)`. Weird things can happen when we switch
    between the declarative and imperative worlds.


    Oracle may run parts of our code more or less often than we anticipate. A function
    in the `SELECT` list may be called more than once per row – there may be an extra
    execution to set up result caching. A function or trigger that is part of a `DML`
    statement may be called more than once – Oracle may restart part of a statement
    to ensure consistency. And many times, Oracle can decide something is unnecessary
    and not run it at all, like the expression in the following `EXISTS` clause:


    ```sql

    --The expression is ignored and no divide-by-zero error is raised.

    select * from dual where exists (select 1/0 from dual);

    ```


    In Chapter `15` we saw the dangers of assuming an Oracle `SQL` statement will
    run in the same order we wrote it. If our data types are wrong, like in a bad
    `EAV` data model, and the predicates are run out of order, we can get run-time
    errors. But the main reason this declarative-vs.-imperative discussion matters
    is to understand Oracle’s execution plans.'
