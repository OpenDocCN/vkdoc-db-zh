    */`。并行 DML 隐式请求了直接路径模式，但我们仍应分别列出这两个提示。如果语句被降级为串行执行（也许因为所有并行会话都在使用中），那么仅靠 `PARALLEL`
    提示将不会启用直接路径模式。降级的语句已经够糟糕了；我们不想同时失去直接路径模式。（另一方面，有时我们只想并行化语句的 `SELECT` 部分，而不是 DML
    部分。）


    并行 DML 默认是禁用的。在一个大型数据仓库中，这个默认设置可能让人感到烦恼，但这种烦恼保护我们免受两件重要事情的影响：直接路径模式带来的不可恢复性，以及小语句并行化的昂贵开销。并行处理有时会自动发生，但我们绝不希望直接路径模式自动发生。要请求并行
    DML，我们必须使用提示 `/*+ ENABLE_PARALLEL_DML */`，或者在任何 DML 之前在我们的会话中运行以下语句：


    ```sql

    alter session enable parallel dml;

    ```


    ### 错误日志记录


    DML 错误日志记录让我们可以忽略错误并继续处理。错误以及导致这些错误的数据会被保存在一个错误日志表中。当我们不想让几个坏值停止整个处理过程时，错误日志记录非常有用。


    例如，让我们尝试将新行加载到 `LAUNCH` 表中，但使用一个过大的值。默认情况下，我们的查询会产生错误并停止处理：


    ```sql

    SQL> --Insert into LAUNCH and generate error.

    SQL> insert into launch(launch_id, launch_tag)

    2  values (-1, ''A value too large for this column'');

    values (-1, ''A value too large for this column'')

    *

    ERROR at line 2:

    ORA-12899: value too large for column "SPACE"."LAUNCH"."LAUNCH_TAG" (actual:33,
    maximum: 15)

    ```


    在我们能够使用错误日志记录之前，必须先生成一个错误日志表。Oracle 提供了一个 PL/SQL 包来创建具有正确格式的表：


    ```sql

    --Create error logging table.

    begin

    dbms_errlog.create_error_log(dml_table_name => ''LAUNCH'');

    end;

    /

    ```


    默认错误日志名称是表名前加上 “ERR$_”，因此前面的语句创建了一个名为 `ERR$_LAUNCH` 的表。错误日志子句适用于 `INSERT`、`UPDATE`、`DELETE`
    和 `MERGE`。要使用错误日志表，我们必须在语句中添加错误日志子句。我们希望至少包含错误日志子句的两个不同部分——使用哪个表以及拒绝限制。


    默认拒绝限制是 0，这意味着语句将记录错误但立即停止处理。一个更常见的值是 `UNLIMITED`。以下示例展示了与之前相同的坏 `INSERT` 语句，但这次语句完成了并记录了错误：


    ```sql

    SQL> --Insert into LAUNCH and log errors.

    SQL> insert into launch(launch_id, launch_tag)

    2  values (-1, ''A value too large for this column'')

    3  log errors into err$_launch

    4  reject limit unlimited;

    0 rows created.

    ```


    前面的 `INSERT` 没有引发错误，但 SQL*Plus 反馈消息显示 “0 rows created.”。该语句在 `ERR$_LAUNCH` 表中创建了一行，即使会话回滚，该行也仍然存在。


    `ERR$_LAUNCH` 表包含多个带有元数据的 `ORA_ERR_*` 列，以及失败行的所有 `LAUNCH` 表列。错误日志表中有很多数据，以下查询只返回最有用的列：


    ```sql

    --Error logging table.

    select ora_err_number$, ora_err_mesg$, launch_tag

    from err$_launch;

    ORA_ERR_NUMBER$   ORA_ERR_MESG$                     LAUNCH_TAG

    ---------------   -------------------------------   ----------

    12899   "ORA-12899: value too large..."   A value...

    ```


    前面的结果非常适合调试，因为它们还显示了我们尝试使用的值。默认的 SQL 异常不包含导致错误的实际值。


    当我们有一个作业必须完成而不顾错误时，错误日志记录是一个有用的功能。另一方面，我们不想过度使用错误日志记录来掩盖所有错误。大多数问题最好在发生时处理，而不是以后。'
- fmt: '## Returning


    `returning`子句让我们可以保存由DML语句更改的行中的列。我们并不总是知道我们更改或创建的值，例如使用序列时。我们可能希望保存这些值以供后续处理。


    `returning`子句在PL/SQL上下文中效果最好，而PL/SQL超出了本书的范围。但在讨论高级SQL时，需要用到少量的PL/SQL。下面的匿名块向`LAUNCH`表插入一行，返回新的`LAUNCH_ID`，然后显示新值：


    ```

    --Insert a new row and display the new ID for the row.

    declare

    v_launch_id number;

    begin

    insert into launch(launch_id, launch_category)

    values(-1234, ''deep space'')

    returning launch_id into v_launch_id;

    dbms_output.put_line(''New Launch ID: ''||v_launch_id);

    rollback;

    end;

    /

    ```


    前面语句的DBMS输出应该是“New Launch ID: -1234。”更实际的例子会使用类似`SEQUENCE_NAME.NEXTVAL`的东西，而不是硬编码的数字。


    `returning`子句适用于`INSERT`、`UPDATE`和`DELETE`，但不适用于`MERGE`。`returning`子句可以将多个列返回到多个变量中，也可以将多个值集合返回到集合变量中。集合变量的示例仅在代码库中展示，因为该示例需要复杂的PL/SQL。


    ## TRUNCATE


    `TRUNCATE`命令是删除表中所有行的最快方法。该命令官方上是数据定义语言（DDL），而不是数据操作语言（DML）。实际上，`TRUNCATE`的使用更像DML而非DDL。与删除表中所有行相比，`TRUNCATE`有许多优点，但也有显著的缺点。理解这些权衡需要了解Oracle架构，这将在第[10]章中有更详细的描述。


    删除表中的所有行是一项昂贵的操作。当删除一行时，Oracle必须首先将信息存储在REDO日志中（一个预写日志，以防数据库崩溃并需要恢复），然后存储在UNDO表空间中（以防命令被回滚并且所有更改都需要撤销），然后才实际更改行。删除行比插入行慢得多，而`TRUNCATE`命令几乎可以瞬间运行。截断表不是逐行更改，而是简单地移除段，即表的整个存储区域。`TRUNCATE`命令可以在不到一秒内完成，无论表的大小如何。


    截断而不是删除的另一个优点是，截断表会立即释放存储空间。该空间随后可用于其他对象。`DELETE`移除行，但这些行使用的空间将仅对同一表可用。


    `TRUNCATE`的主要问题是它会自动提交，即使命令失败也是如此，并且无法撤销。`TRUNCATE`无法回滚，我们也不能对表使用闪回命令来查看旧数据。`TRUNCATE`还需要对表的排他锁，因此如果其他人正在修改表，我们就不能`TRUNCATE`它（尽管如果我们试图`TRUNCATE`一个别人正在修改的表，那说明已经出了严重的问题）。


    下面的测试用例演示了`TRUNCATE`的一些属性。这些测试用例也是研究Oracle存储属性的好例子。这些是所有SQL开发人员都必须学会创建的测试类型。这些测试用例帮助我们证明Oracle的工作原理，而不是仅仅猜测。


    首先，我们需要创建一个表，加载数据并进行测量：


    ```

    --Create a table and insert rows.

    create table truncate_test(a varchar2(4000));

    insert into truncate_test

    select lpad(''A'', 4000, ''A'') from dual

    connect by level <= 10000;

    --Segment size and object IDs.

    select megabytes, object_id, data_object_id

    from

    (

    select bytes/1024/1024 megabytes

    from dba_segments

    where segment_name = ''TRUNCATE_TEST''

    ) segments

    cross join

    (

    select object_id, data_object_id

    from dba_objects

    where object_name = ''TRUNCATE_TEST''

    ) objects;

    MEGABYTES  OBJECT_ID  DATA_OBJECT_ID

    ---------  ---------  --------------

    80     196832          196832

    ```


    结果显示该表使用了80兆字节的空间，并且具有相同的`OBJECT_ID`和`DATA_OBJECT_ID`。在你的系统上大小可能不同，因为Oracle的段空间分配和压缩默认值因你的设置和版本而异。你的`OBJECT_ID`和`DATA_OBJECT_ID`值将与我的不同，但请注意你的两个值是相同的。


    让我们`TRUNCATE`该表，然后再次检查段和对象。注意下面的`TRUNCATE`命令被注释掉了。你必须移除注释或高亮并运行该命令。这个例子故意设计得不方便——`TRUNCATE`命令是危险的，我们希望确保没有人意外运行它。不可避免地，有人会加载我们的工作表或笔记本，并像运行脚本一样运行所有命令。这个示例表不重要，但我们想养成注释掉潜在危险命令的习惯：


    ```

    --Truncate the table.

    --truncate table truncate_test;

    --(Re-run the above segments and objects query)

    MEGABYTES  OBJECT_ID  DATA_OBJECT_ID

    ---------  ---------  --------------

    0.0625     196832          196833

    ```


    前面的结果显示段空间已减少到几乎为零。`OBJECT_ID`保持不变，但`DATA_OBJECT_ID`略有变化。新的`DATA_OBJECT_ID`是Oracle表示表可能看起来一样，但数据已经以一种不寻常的方式完全改变。段的突然变化会影响其他操作，并在我们使用表时导致奇怪的错误，如果它正在被截断。


    你可能听说过Oracle的口头禅“读者不阻塞写者，写者不阻塞读者”。这句话指的是Oracle数据库的一致性模型。如果我们开始从一个表读取，其他人可以同时更改该表。用户都不会被阻塞，并且两个用户都能获得自其语句开始时起一致的数据视图。


    这些关于读者和写者的规则不适用于`TRUNCATE`。`TRUNCATE`不写入表；`TRUNCATE`会销毁并重建表。如果当表被截断时其他人正在读取该表，他们的读取操作可能会失败。当客户端向Oracle请求接下来的N行时，Oracle将无法找到任何行。这些行显然不在表中，甚至可能不在UNDO表空间中，因此Oracle不知道数据去了哪里。`DATA_OBJECT_ID`已经改变，客户端试图读取一个旧的表，`SELECT`语句将生成错误“ORA-08103:
    object no longer exists.”。这个错误信息是一个不好的预兆，暗示有人在错误的时间销毁了我们的表。'
  raw: '## Returning


    The returning clause lets us save columns from rows changed by DML statements.
    We don’t always know the values that we changed or created, such as when we use
    a sequence. We may want to save those values for later processing.


    The returning clause works best in a PL/SQL context, and PL/SQL is out of the
    scope of this book. But a little PL/SQL is necessary when discussing advanced
    SQL. The following anonymous block inserts a row into the `LAUNCH` table, returns
    the new `LAUNCH_ID`, and then displays the new value:


    ```

    --Insert a new row and display the new ID for the row.

    declare

    v_launch_id number;

    begin

    insert into launch(launch_id, launch_category)

    values(-1234, ''deep space'')

    returning launch_id into v_launch_id;

    dbms_output.put_line(''New Launch ID: ''||v_launch_id);

    rollback;

    end;

    /

    ```


    The DBMS output from the preceding statement should be “New Launch ID: -1234.”
    A more realistic example would use something like `SEQUENCE_NAME.NEXTVAL` instead
    of a hard-coded number.


    The returning clause works with `INSERT`, `UPDATE`, and `DELETE`, but does not
    work with `MERGE`. The returning clause can return multiple columns into multiple
    variables and can also return multiple sets of values into collection variables.
    The collection variable example is only shown in the repository, since the example
    requires complex PL/SQL.


    ## TRUNCATE


    The `TRUNCATE` command is the fastest way to remove all the rows from a table.
    The command is officially Data Definition Language (DDL), instead of Data Manipulation
    Language (DML). In practice, `TRUNCATE` is used more like DML than DDL. `TRUNCATE`
    has many advantages compared with deleting all the rows from a table, but `TRUNCATE`
    also has significant disadvantages. Understanding the trade-offs requires understanding
    Oracle architecture, which is described in more detail in Chapter [10](#471418_2_En_10_Chapter.xhtml).


    Deleting all the rows from a table is an expensive operation. When deleting a
    row, Oracle must first store the information in the REDO log (a write-ahead log,
    in case the database crashes and needs to be recovered) and then in the UNDO tablespace
    (in case the command is rolled back and all the changes need to be undone), and
    then the actual rows are changed. Deleting rows is much slower than inserting
    rows, whereas the `TRUNCATE` command runs almost instantly. Instead of changing
    individual rows, truncating the table simply removes the segment, which is the
    entire storage area for the table. A `TRUNCATE` command can finish in less than
    a second, regardless of the table size.


    Another advantage of truncating instead of deleting is that truncating the table
    also releases the storage immediately. That space can then be used for other objects.
    A `DELETE` removes the rows, but the space used by those rows will only be available
    for the same table.


    The main problem with `TRUNCATE` is that it automatically commits, even if the
    command fails, and there’s no undoing it. A `TRUNCATE` cannot be rolled back,
    and we cannot use a flashback command on the table to view old data. `TRUNCATE`
    also requires an exclusive lock on a table, so we can’t `TRUNCATE` a table if
    anyone else is modifying it (although if we’re trying to `TRUNCATE` a table that
    someone else is modifying, something has gone horribly wrong).


    The following test cases demonstrate a few properties of `TRUNCATE`. The test
    cases are also good examples of how to investigate Oracle’s storage properties.
    These are the kind of tests all SQL developers must learn to create. These test
    cases help us prove how Oracle works, instead of merely guessing.


    First, we need to create a table, load it, and measure it:


    ```

    --Create a table and insert rows.

    create table truncate_test(a varchar2(4000));

    insert into truncate_test

    select lpad(''A'', 4000, ''A'') from dual

    connect by level <= 10000;

    --Segment size and object IDs.

    select megabytes, object_id, data_object_id

    from

    (

    select bytes/1024/1024 megabytes

    from dba_segments

    where segment_name = ''TRUNCATE_TEST''

    ) segments

    cross join

    (

    select object_id, data_object_id

    from dba_objects

    where object_name = ''TRUNCATE_TEST''

    ) objects;

    MEGABYTES  OBJECT_ID  DATA_OBJECT_ID

    ---------  ---------  --------------

    80     196832          196832

    ```


    The results show the table uses 80 megabytes of space and has the same `OBJECT_ID`
    and `DATA_OBJECT_ID`. The size may be different on your system, because Oracle’s
    segment space allocation and compression defaults vary depending on your settings
    and version. Your values for `OBJECT_ID` and `DATA_OBJECT_ID` will be different
    than mine, but notice that your two values are identical.


    Let’s `TRUNCATE` the table and check the segments and objects again. Notice that
    the following `TRUNCATE` command is commented out. You’ll have to either remove
    the comment or highlight and run the command. This example is intentionally inconvenient
    – the `TRUNCATE` command is dangerous, and we want to ensure that nobody runs
    it by accident. Inevitably, someone will load our worksheets or notebooks and
    run all the commands like it’s a script. This example table isn’t important, but
    we want to get into the habit of commenting out potentially dangerous commands:


    ```

    --Truncate the table.

    --truncate table truncate_test;

    --(Re-run the above segments and objects query)

    MEGABYTES  OBJECT_ID  DATA_OBJECT_ID

    ---------  ---------  --------------

    0.0625     196832          196833

    ```


    The preceding results show the segment space has decreased to almost zero. The
    `OBJECT_ID` stayed the same, but the `DATA_OBJECT_ID` has slightly changed. The
    new `DATA_OBJECT_ID` is Oracle’s ways of saying the table may look the same, but
    the data has completely changed in an unusual way. The sudden change to our segment
    can affect other operations and cause strange errors if we’re using the table
    while it’s being truncated.


    You may have heard the Oracle mantra “readers don’t block writers, and writers
    don’t block readers.” That phrase refers to the consistency model of the Oracle
    database. If we start reading from a table, someone else can change the table
    at the same time. None of the users get blocked, and both users get a consistent
    view of the table as of the time their statements began.


    Those rules about readers and writers don’t apply to `TRUNCATE`. `TRUNCATE` doesn’t
    write to the table; `TRUNCATE` destroys and recreates the table. If someone else
    was reading from a table while the table was truncated, their read operation may
    fail. When the client asks Oracle for the next N rows, Oracle won’t be able to
    find any rows. The rows obviously aren’t in the table, but the rows won’t even
    be in the UNDO tablespace either, so Oracle doesn’t know where the data went.
    The `DATA_OBJECT_ID` has changed, the client is trying to read from an old table,
    and the `SELECT` statement will generate the error “ORA-08103: object no longer
    exists.” That error message is a bad omen, implying someone is destroying our
    tables at the wrong time.'
