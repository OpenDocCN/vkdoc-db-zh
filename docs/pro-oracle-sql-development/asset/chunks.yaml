- fmt: '## Constraints


    Constraints restrict values to enforce relationships and data rules in our relational
    databases. I assume you are familiar with the basic constraint types: primary
    key (columns that are non-null and unique), unique (columns with no duplicates),
    foreign key (columns that share values with a parent table), and check (a condition
    that must always be true). But there are other types of constraints and advanced
    ways of using constraints.


    ### Constraint Performance Impact


    Constraints are necessary for data integrity, but they can significantly harm
    performance. Direct-path writes are not possible on a child table with a foreign
    key. (But at least foreign keys don’t stop direct-path writes on the parent table,
    and the limitation does not apply to reference partitioned tables.) To enable
    direct-path writes, constraints can be disabled and re-enabled, but that process
    can be slow. Every constraint requires time to validate, and primary key and unique
    constraints must spend time maintaining indexes. (But most constraint enforcement
    time either is trivial, like for check constraints, or has workarounds, such as
    the way direct-path writes will perform index maintenance in bulk instead of row
    by row.)


    Constraints can also significantly *improve* performance. For example, `NOT NULL`
    check constraints can enable the optimizer to use an index. The following statements
    perform a distinct count on two indexed columns, `SATELLITE.SATELLITE_ID` and
    `SATELLITE.LAUNCH_ID`. The query on `SATELLITE.SATELLITE_ID` can use an index
    – the column is `NOT NULL,` and therefore the index contains all values. The query
    on `SATELLITE.LAUNCH_ID` cannot use an index – the column is nullable, and therefore
    the index may not contain all the values. If possible, setting columns to `NOT
    NULL` can enable new index access paths. (But in our data set, that `NOT NULL`
    constraint is not possible – there is one satellite without a known launch.)


    ```sql

    --This statement on a NOT NULL column can use an index.

    select count(distinct satellite_id) from satellite;

    --This statement on a nullable column cannot use an index.

    select count(distinct launch_id) from satellite;

    ```


    Performance issues shouldn’t prevent us from using constraints. Data integrity
    is more important than performance. And the performance benefits of constraints
    may outweigh the performance costs. And when we encounter performance problems
    caused by constraints, there is always a workaround.


    ### Altering Constraints


    Constraints can be added, dropped, enabled, and disabled. To preserve our configuration,
    it’s better to enable and disable constraints than to drop and re-add them. Constraints
    belong to tables, and most constraint commands happen through `ALTER TABLE`. To
    demonstrate some constraint properties, let’s make an empty copy of the `ORGANIZATION`
    table. The following code creates an initially empty table, adds a unique constraint,
    disables the constraint, and loads the data:


    ```sql

    --Create separate table for organization data.

    create table organization_temp nologging as

    select * from organization

    where 1=2;

    --Create a unique constraint.

    alter table organization_temp

    add constraint organization_temp_uq

    unique(org_name, org_start_date, org_location);

    --Disable the constraint.

    alter table organization_temp

    disable constraint organization_temp_uq;

    --Load data.

    insert into organization_temp

    select * from organization;

    ```


    ### Constraint Exceptions


    The preceding code runs, but it contains a mistake. Our unique constraint is not
    unique enough. There are a few organizations that share the same name, start date,
    and location. The constraint is disabled, and as soon as we try to enable the
    constraint, we’ll get an error.


    Constraint errors don’t tell us the data that caused the error. That lack of details
    isn’t a problem with our small tables, since we can easily find the duplicates.
    But with complicated constraints, or huge amounts of data, those errors can be
    difficult to track down. We can use the *exceptions clause* to find the values
    that caused constraint errors, similar to the way DML error logging can find the
    values that caused DML errors.


    Setting up constraint exceptions is more complicated than setting up DML error
    logging. There’s no convenient `DBMS_ERRLOG` package to create exception tables.
    Instead, we need to call a script stored in the server installation directory.
    If our `ORACLE_HOME` environment variable is set correctly, we can run the script
    like this:


    ```

    SQL> @?\rdbms\admin\utlexpt1

    Table created.

    ```


    Make sure you run the preceding script as the owner of the data set or set the
    `CURRENT_USER` before running the script. If the preceding code doesn’t work,
    then we can find the small script online and recreate the table manually. Once
    we have the table, we can use the following syntax to save any exceptions:


    ```sql

    --Try to enable a constraint that isn''t valid.

    alter table organization_temp

    enable constraint organization_temp_uq

    exceptions into exceptions;

    ```


    The preceding code still throws the error: “ORA-02299: cannot validate (SPACE.ORGANIZATION_TEMP_UQ)
    – duplicate keys found.” But now it’s easy to find the culprits, with the following
    SQL:


    ```sql

    --Rows that blocked the constraint.

    select *

    from organization_temp

    where rowid in (select row_id from exceptions);

    ```'
