    );

    ```


    Booleans are easy to compare in PL/SQL. As the following conversion code demonstrates,
    we don’t need to check for `= TRUE` or `= FALSE`. Instead, we can directly use
    the variable in the condition `CASE WHEN V_BOOLEAN`. But we have to change the
    Boolean into a string before we can insert the value into a table:


    ```

    --Convert PL/SQL Boolean to SQL Boolean.

    declare

    v_boolean boolean := true;

    v_string varchar2(3);

    begin

    v_string := case when v_boolean then ''Yes'' else ''No'' end;

    insert into boolean_test values(v_string);

    rollback;

    end;

    /

    ```


    **VARCHAR2** types have a different maximum size in SQL and PL/SQL. The default
    maximum size in SQL is 4000 bytes, and the maximum size in PL/SQL is 32,767 bytes.
    Oracle 12.2 can be modified to allow 32,767 bytes in SQL, but only if the parameter
    `MAX_STRING_SIZE` is changed. Modifying that parameter is a surprisingly difficult
    process with significant performance implications, since large strings are internally
    stored as CLOBs instead of VARCHAR2\. I doubt many organizations have changed
    `MAX_STRING_SIZE`, so to be safe we should assume the SQL limit is still 4,000
    bytes.


    PL/SQL has extra data types such as `PLS_INTEGER` and `BINARY_INTEGER`. A lot
    of built-in functions return `PLS_INTEGER`, and that data type has some performance
    benefits compared with `NUMBER`. But we shouldn’t go out of our way to convert
    `NUMBER` to `PLS_INTEGER`, unless we’re coding small loops or doing scientific
    programming.'
  trans: '

    ### 事务 IV：隔离性与一致性


    Oracle 提供了多种机制，让我们的 PL/SQL 应用程序表现得好像它是数据库的唯一用户。这种隔离性对于避免事务完整性问题至关重要，例如脏读（读取另一个事务中未提交的数据）以及不可重复读或幻读（在事务中运行两次相同的查询却得到不同的结果）。Oracle
    提供了两种不同的隔离级别来防止这些问题。


    默认的隔离级别称为 `读已提交`。读已提交模式可以防止脏读，并确保每条 `语句` 都是一致的。语句级一致性意味着单个 SQL 语句总是读取并处理截至特定时间点的数据。即使另一个会话在我们查询某张表时删除了该表的所有行，我们的会话也不会察觉到。


    例如，以下 SQL 语句从 `LAUNCH` 表中读取了两次。无论其他会话正在执行何种读写操作，以下查询对于每个 `COUNT(*)` 的结果总是相同的。这种语句级一致性是由每次数据变更所生成的撤销数据来保证的：


    ```

    -- These subqueries will always return the same number.

    select

    (select count(*) from transaction_test) count1,

    (select count(*) from transaction_test) count2

    from dual;

    ```


    当我们在 PL/SQL 中使用多个查询时，保持一致性就变得更为困难。如果一致性仅适用于单个 SQL 语句内部，那么下面的 PL/SQL 块在两个不同时间运行相同的查询时，可能会返回不同的数字：


    ```

    -- These queries may return different numbers.

    declare

    v_count1 number;

    v_count2 number;

    begin

    select count(*) into v_count1 from transaction_test;

    dbms_output.put_line(v_count1);

    dbms_lock.sleep(5);

    select count(*) into v_count2 from transaction_test;

    dbms_output.put_line(v_count2);

    end;

    /

    ```


    如果我们使用 `可序列化` 事务，那么会话中的所有操作都表现得如同在事务开始时就已运行一样。如果我们更改会话的隔离级别，前面的例子在同一个事务内将总是返回相同的数字。这些
    PL/SQL 块唯一的区别在于 `SET TRANSACTION` 命令，但该命令带来了巨大的不同：


    ```

    -- These queries will always return the same number.

    declare

    v_count1 number;

    v_count2 number;

    begin

    set transaction isolation level serializable;

    select count(*) into v_count1 from transaction_test;

    dbms_output.put_line(v_count1);

    dbms_lock.sleep(5);

    select count(*) into v_count2 from transaction_test;

    dbms_output.put_line(v_count2);

    end;

    /

    ```


    启用可序列化事务并不能神奇地解决我们所有的问题。它确保了事务级的读取一致性，但无法修复写入数据时可能出现的问题。如果另一个会话在可序列化事务执行期间更改了数据，并且该可序列化事务试图更改相同的行，就会引发异常
    `ORA-08177: 无法序列化此事务的访问`。我们可能需要使用 `SELECT ... FOR UPDATE` 命令抢先锁定我们要处理的行。


    ### 简单变量


    在 SQL 和 PL/SQL 之间传递数据很容易，因为它们的类型系统非常兼容。当在 SQL 和 PL/SQL 之间传递数字、日期和字符串时，我们很少需要担心格式、精度、字符集和大小限制等问题。不幸的是，类型系统并非完美匹配，因此我们需要注意如何规避一些问题。


    `%TYPE` 属性可以帮助我们在 SQL 和 PL/SQL 之间安全地传递数据。我们无需硬编码数据类型，而是可以设置一个变量始终与某列的数据类型匹配。以下代码使用了
    `%TYPE`，避免了需要精确指定 `LAUNCH_CATEGORY` 列数据大小的问题。如果未来某个版本的数据集增大了该列的大小，PL/SQL 变量的大小也会随之增加。同步数据类型可以避免诸如
    `ORA-06502: PL/SQL: 数字或值错误: 字符串缓冲区太小` 之类的错误：


    ```

    -- Demonstrate %TYPE.

    declare

    v_launch_category launch.launch_category%type;

    begin

    select launch_category

    into v_launch_category

    from launch

    where rownum = 1;

    end;

    /

    ```


    `布尔型` 在 PL/SQL 中得到完全支持。其语法以及关键字 `TRUE` 和 `FALSE` 让我们能够轻松地存储、比较和修改布尔变量。不幸的是，SQL
    不支持布尔数据类型，因此我们需要使用变通方法来传递或存储布尔数据。


    SQL 语句无法调用接收或返回布尔值的 PL/SQL 函数。我们不能使用类似 `WHERE IS_THIS_TRUE` 的代码，而必须将函数和查询设计成类似
    `WHERE IS_THIS_TRUE = ''Yes''` 的形式。对于存储布尔数据，没有普遍认同的标准，因此我们必须决定是使用 “Yes/No”、“YES/NO”、“Y/N”、“1/0”、“True/False”、“sí/no”
    等。我们必须通过检查约束来强制执行我们的选择，因为总有人会尝试插入意外的值：


    ```

    -- A table designed for Boolean data.

    create table boolean_test

    (

    is_true varchar2(3) not null,

    constraint boolean_test_ck

    check(is_true in (''Yes'', ''No''))

    );

    ```


    布尔值在 PL/SQL 中很容易比较。正如下面的转换代码所示，我们不需要检查 `= TRUE` 或 `= FALSE`。相反，我们可以直接在条件 `CASE
    WHEN V_BOOLEAN` 中使用该变量。但在将值插入表之前，我们必须先将布尔值转换为字符串：


    ```

    -- Convert PL/SQL Boolean to SQL Boolean.

    declare

    v_boolean boolean := true;

    v_string varchar2(3);

    begin

    v_string := case when v_boolean then ''Yes'' else ''No'' end;

    insert into boolean_test values(v_string);

    rollback;

    end;

    /

    ```


    `VARCHAR2` 类型在 SQL 和 PL/SQL 中的最大长度不同。SQL 中的默认最大长度是 4000 字节，而在 PL/SQL 中是 32,767
    字节。Oracle 12.2 可以修改以允许 SQL 中使用 32,767 字节，但前提是必须更改 `MAX_STRING_SIZE` 参数。修改该参数是一个极其困难的过程，并且会对性能产生重大影响，因为大的字符串在内部是作为
    CLOB 而不是 `VARCHAR2` 存储的。我怀疑很多组织会更改 `MAX_STRING_SIZE`，因此为稳妥起见，我们应该假设 SQL 的限制仍然是
    4,000 字节。


    PL/SQL 拥有一些额外的数据类型，例如 `PLS_INTEGER` 和 `BINARY_INTEGER`。许多内置函数返回 `PLS_INTEGER`，并且与
    `NUMBER` 相比，该数据类型具有一些性能优势。但是，除非我们是在编写小型循环或进行科学计算，否则不应该特意将 `NUMBER` 转换为 `PLS_INTEGER`。

