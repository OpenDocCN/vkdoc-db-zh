    runs `N` time, so the run-time complexity is a horribly slow `O(N^2)`. Recall
    from Figure [16-9](#471418_2_En_16_Chapter.xhtml#Fig9) that the line for `N^2`
    looks almost completely vertical. This join algorithm should only be used when
    the tables are trivially small, the optimizer statistics are bad, or important
    indexes are missing.


    A **nested loop with index access (N*LOG(N))** is often a faster choice for joins.
    Instead of searching an entire table for each row, we can search an index. Reducing
    `O(N^2)` to `O(N*LOG(N))` is a huge improvement.


    But to get the most out of this algorithm, it helps to be more specific with our
    variables. Instead of using `N` to mean the number of rows in either table, let’s
    say the first table that we read every row has `A` rows and the second table that
    we read using an index has `B` rows. If we think about `O(A*LOG(B))`, the number
