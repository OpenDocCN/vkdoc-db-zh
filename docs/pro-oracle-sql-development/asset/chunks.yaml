  trans: '

    #### 验证模式


    务必在最后运行一个小脚本来验证模式。即使设置了 `WHENEVER SQLERROR EXIT FAILURE`，仍然可能有一些细微的错误未被发现。验证脚本至少应检查无效对象，如果发现任何问题就抛出异常。对象在安装过程中可能会失效，但通常在最后调用
    `DBMS_UTILITY.COMPILE_SCHEMA` 就能解决所有问题。对于依赖关系复杂的系统，你可能需要一些技巧，例如添加几条 `ALTER ...
    COMPILE` 语句。该脚本还可以检查其他状态表，或者如果启用了 SQL*Plus 错误日志记录，也可能检查 `SPERRORLOG` 表。


    ### SQL*Plus 补丁脚本


    我们的程序在私有数据库上可能运行良好，但最终代码必须迁移到更高的环境。删除并重建我们的模式很方便，但我们显然不能在生产环境中这样做。我们需要脚本来升级模式以包含我们的更改。


    每个开发人员都应该参与创建部署，并应负责将其更改集成到安装和补丁脚本中。设计补丁脚本需要一些艰难的决策，但重要的是不要采取任何捷径。


    安装脚本已经处理了诸如 SQL*Plus 设置、错误检查和安装代码对象等事项。如果我们按对象类型分离安装脚本，那么一半的工作就已经完成了。无论是安装还是打补丁，安装代码对象（如包、过程和函数）都可以用相同的方式完成。我们的补丁模板可以直接调用那些预构建的代码脚本。重新编译所有内容每次都要更容易，而不是试图找出特定的代码更改。


    棘手的部分是处理持久对象（如表）的更改。再次强调，手动执行此步骤比购买工具并尝试自动化流程更好。手动构建更改脚本的原因将在下一节讨论。目前，还有一个决策需要决定——这些表更改如何回移植到安装脚本中？我们是不断更新安装脚本，还是简单地运行原始安装脚本，然后在最后调用补丁脚本？


    创建补丁脚本是少数几个重复自己和复制代码有益的领域之一。我们的安装脚本不仅用于重建系统；它们也是我们理解数据库如何创建的最佳文档。这些安装脚本通常比查看实时数据库更有用，因为脚本可能包含根据数据库版本或版本等因素安装不同对象版本的开关。


    充满了 `ALTER` 命令的补丁脚本既丑陋又难以跟踪。要了解表是如何构建的，我们不应该需要找到原始的 `CREATE TABLE` 语句，然后翻阅补丁脚本，最后拼凑出一个
    `ALTER TABLE` 语句的历史记录。我们应该额外花时间使我们的脚本对未来的开发人员更具可读性；当我们创建补丁脚本时，我们也应该将这些更改添加到安装脚本中。这很烦人，并且当代码被复制时有可能出错，但在这种情况下，重复是值得冒这个风险的。


    ## 用版本控制的文本文件控制模式


    切勿使用数据库进行版本控制。本书旨在推广使用 Oracle SQL 的实用解决方案。虽然将 Oracle 推向极限并编写深奥的查询来解决奇怪的问题很有趣，但有些事情不应该在数据库中完成。版本控制应该通过手动创建的文本文件来完成。


    ### 唯一可信来源


    理解为什么需要版本控制的文本文件始于一个难题：我们模式的理想版本在哪里？有很多可能的答案，例如在生产数据库上、在我们的私有数据库上、在我们的脑海中、在某个抽屉的软盘上等等。这不仅仅是一个理论问题；每个程序都需要一个唯一可信来源，一个查找和维护程序真实版本的唯一位置。（讽刺的是，“唯一可信来源”这个短语可能起源于数据库，用于数据库规范化。但现在这个短语更适用于版本控制，而版本控制不应该在数据库中进行。）


    唯一可信来源必须方便且每个人都能访问。它必须允许我们存储、操作、比较、分支和跟踪所有内容的历史。虽然数据库擅长执行大多数这些任务，但数据库提供的灵活性不够，并且在跟踪更改方面完全没有帮助。这个问题很久以前就解决了，解决方案是存储在版本控制软件中的文本文件。具体的版本控制程序并不重要。无论我们使用
    Git、Subversion 还是其他工具，这些选择中的任何一个都明显优于使用数据库。分支、合并和解决冲突的能力远比简单地覆盖他人的工作好得多。而现代的版本控制程序构成了极其有用的平台（如
    GitHub）的基础。


    不幸的是，许多 Oracle 开发团队只将版本控制软件用作一种华丽的备份。版本控制不仅仅是一个存储“官方副本”或在某物被提升到其他环境之前存储它的地方。版本控制是我们的程序需要*生存*的地方。如果我们能挥动魔杖让所有的开发数据库消失，它应该只会让我们落后几个小时。恢复应该很容易——获取最新版本控制的文件并运行安装脚本。


    ### 从仓库和文件系统加载对象


    开发的第一步应该是克隆一个仓库或将最新文件拉取到你的文件系统上。当我们想要修改一个对象时，我们应该从*文件系统*加载该对象，而不是从数据库。现代 IDE，如
    Oracle SQL Developer、Toad 或 PL/SQL Developer，使得从文件系统工作变得非常简单。事实上，从文件系统工作甚至比直接从数据库对象工作更容易，因为我们可以仔细安排文件和文件夹。


    例如，在为本书构建数据集和示例时，所有内容都存储在我的硬盘上，并最终提交到 GitHub 仓库。图 2-1 显示了我在 PL/SQL Developer 中工作时的样子。菜单具有与
    GitHub 仓库相同的文件结构，并且选项卡通过颜色编码来快速识别哪些文件尚未保存到文件系统，以及哪些对象自上次更改后尚未编译。


    ![](img/471418_2_En_2_Fig1_HTML.jpg)


    打开的文件部分选项卡的片段。它作为一个包含空间、代码、示例和第三章的文件夹打开，第三章被高亮显示。


    **图 2-1**

    通过版本控制的文件系统查看数据库对象


    大多数 IDE 还具有版本控制界面，让我们可以直接与仓库交互，但通常使用文件系统和默认的版本控制客户端更容易。如果你不习惯命令行界面，有许多开源程序可以直观地将版本控制与文件系统集成，例如
    TortoiseGit 和 Windows 文件资源管理器。

