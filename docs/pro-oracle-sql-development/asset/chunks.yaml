  trans: '

    ### 新的 PIVOT 语法


    以下查询返回与前一个查询相同的结果，但使用了新的 `PIVOT` 语法。`pivot` 子句指定了聚合函数、要转换的列列表以及要包含的值：


    ```sql

    -- 按年份分列显示发射成功与失败次数。

    select *

    from

    (

    -- 轨道与深空发射。

    select to_char(launch_date, ''YYYY'') launch_year, launch_status

    from launch

    where launch_category in (''orbital'', ''deep space'')

    ) launches

    pivot

    (

    count(*)

    for launch_status in

    (

    ''success'' as success,

    ''failure'' as failure

    )

    )

    order by launch_year;

    ```


    对于这个小例子，新语法比旧式语法更复杂、更冗长。我一直觉得 `PIVOT` 语法有点奇怪，每次使用时都得查阅一下。只有当我们有大量列需要转换时，这种语法才显示出优势。即便如此，仍然需要大量手动输入——我们仍需列出每个状态、创建别名，并可能需要处理空值。在大多数情况下，我们不妨坚持使用旧的
    `SUM(CASE` 语法。


    ### UNPIVOT


    逆透视将多列转换为多行。作为我们可能需要逆透视的一个例子，让我们看看 `LAUNCH` 表中的 `FLIGHT_ID1` 和 `FLIGHT_ID2` 列。任何时候，如果我们有多个名称相同但末尾带数字的列，就应该引起警惕。这些列是否应该存储在单独的表中，以允许无限数量的飞行标识符？如果一次火箭发射有第三个飞行标识符怎么办？与其添加新列，创建一个单独的表来存储飞行标识符可能更有意义。（在这个例子中，飞行标识符没有增加太多价值，不值得这么麻烦，但为了示例，我们假装需要这样做。）首先，让我们看看初始的、宽表数据：


    ```sql

    -- 每次发射对应多个 FLIGHT_ID 列。

    select launch_id, flight_id1, flight_id2

    from launch

    where launch_category in (''orbital'', ''deep space'')

    order by launch_id;

    ```

    ```

    LAUNCH_ID  FLIGHT_ID1  FLIGHT_ID2

    ---------  ----------  ----------

    4305       M1-PS       PS-1

    4306       M1-2PS      PS-2

    4476       TV-3        Vanguard TV3

    ...

    ```


    将列转换为瘦长行（skinny rows）的旧方法是为每个列使用一个 `UNION ALL`，如下所示：


    ```sql

    -- 使用 UNION ALL 逆透视数据。

    select launch_id, 1 flight_id, flight_id1 flight_name

    from launch

    where launch_category in (''orbital'', ''deep space'')

    and flight_id1 is not null

    union all

    select launch_id, 2 flight_id, flight_id2 flight_name

    from launch

    where launch_category in (''orbital'', ''deep space'')

    and flight_id2 is not null

    order by launch_id, flight_id;

    ```

    ```

    LAUNCH_ID  FLIGHT_ID  FLIGHT_NAME

    ---------  ---------  -----------

    4305          1  M1-PS

    4305          2  PS-1

    4306          1  M1-2PS

    4306          2  PS-2

    4476          1  TV-3

    4476          2  Vanguard TV3

    ...

    ```


    以下查询使用 `UNPIVOT` 语法返回相同的结果：


    ```sql

    -- 使用 UNPIVOT 语法逆透视数据。

    select *

    from

    (

    select launch_id, flight_id1, flight_id2

    from launch

    where launch_category in (''orbital'', ''deep space'')

    ) launches

    unpivot

    (

    flight_name for

    flight_id in (flight_id1 as 1, flight_id2 as 2)

    )

    order by launch_id;

    ```


    前面的 `UNPIVOT` 查询比原始版本小得多，甚至运行速度也更快，而 `PIVOT` 语法相比原始版本几乎没有任何改进，通常也不更快。`PIVOT` 语法和性能上的不足令人遗憾，因为在实践中，我们转换数据的可能性远大于逆透视数据。


    最常见的 Oracle SQL 问题之一是：我们如何动态地透视数据，而不必指定所有要显示的列？简单的答案是，没有动态透视选项。更详尽的答案是 Oracle
    确实允许动态透视，但前提是要求输出为 XML 格式，而这又更难处理。一个更彻底的答案是，我们*可以*动态透视，如果我们创建高级动态 SQL 解决方案，例如第
    20 章讨论的 Method4。


    但关于如何动态透视这个问题的真实、却令人不满意的答案是，我们并不想动态透视我们的查询。过度通用和动态的解决方案是代价巨大而收益甚微的麻烦事。在某个时刻，我们必须了解我们的列，否则就无法对数据进行任何有意义的处理。


    ### 闪回


    闪回查询让我们能够查询数据过去的样子。当我们遇到逻辑表损坏时，闪回可以实实在在地挽救工作。拥有一个数据的“时间机器”可以帮助我们快速回退错误的更改。想象一下，如果有人在
    9 分钟前删除了 `LAUNCH` 表中的行。我们可以通过时间回溯，使用以下查询找到 10 分钟前的表状态：


    ```sql

    -- 10 分钟前的 LAUNCH 表。

    select *

    from launch as of timestamp systimestamp - interval ''10'' minute;

    ```


    每当有人做了错误的更改时，尝试用闪回查询找到这个更改。但不要等待——时间在流逝。闪回查询使用 Oracle 的撤销数据，而这些数据会随着时间老化消失。也许有神奇的方法可以解决我们的生产数据问题，但这个方法将会过期。很难预测撤销数据可用的时间有多长，因为保留期取决于实例参数和系统活动。


    闪回有一个 `VERSIONS BETWEEN` 语法和多个伪列，可以帮助我们准确找出进行了什么更改以及何时进行的。我们可以将闪回与 `MINUS` 等集合操作符结合使用来查找缺失的数据。


    除了查询数据，闪回还可以用于恢复表和整个数据库。这些功能共享“闪回”之名，但使用不同的存储机制——回收站和闪回日志。如果你需要频繁进行时间旅行，请咨询你的
    DBA。


    ### 抽样


    查询一小部分数据样本有助于测试，尤其是在处理大表时。`sample` 子句让我们指定要检索的表数据的估计百分比。默认情况下，抽样是随机的，大多数时候会返回略有不同的结果。如果我们想要一个确定性的样本，可以指定一个
    `seed` 数。以下查询返回 `LAUNCH` 表中大约 1% 的行：


    ```sql

    -- 每次返回不同行数的抽样查询。

    select count(*) from launch sample (1);

    -- 每次返回相同行数的抽样查询。

    select count(*) from launch sample (1) seed (1234);

    ```


    `sample` 子句返回的结果并非统计上随机的。而且如果样本量足够小，查询有可能返回零行。如果我们需要精确的随机性，需要避免使用 `SAMPLE`，改用
    `ORDER BY DBMS_RANDOM.VALUE`。不幸的是，`DBMS_RANDOM` 方法慢得离谱。


    ### 分区扩展子句


    分区扩展子句让我们可以从特定的分区或子分区集合中选择数据。（分区在第 9 章有简要描述。）可以通过分区名称或分区键值来引用分区。例如，以下查询从一个分区表中读取数据。（由于我们不一定都有分区功能的许可证，该示例使用现有的系统表，而不是创建我们自己的分区表。）


    ```sql

    -- 引用分区名称。

    select *

    from sys.wrh$_sqlstat partition (wrh$_sqlstat_mxdb_mxsn);

    -- 引用分区键值。

    select *

    from sys.wrh$_sqlstat partition for (1,1);

    ```


    通常，分区扩展子句并非必需，因为分区对最终用户应该是不可见的。我们应该能够查询一个表，请求一个值，并让 Oracle 自动确定分区。实际上，Oracle 的分区修剪并不总能在编译时确定分区。例如，如果我们执行锁定分区的操作，如直接路径写入，Oracle
    可能不得不锁定整个表，除非我们使用分区扩展子句。

    '
- fmt: '## Common Table Expressions


    Common table expressions allow us to replace repetitive SQL logic with a single
    subquery, function, or procedure. Common table expressions are defined at the
    top of the SQL statement and can be referenced many times below. In Oracle, this
    feature is also called subquery factoring and the grammatically awkward “`WITH`
    clause.” Common table expressions can help us simplify our queries, improve performance,
    solve tricky recursive problems, and follow one of the cardinal rules of programming:
    don’t repeat yourself. But we also need to be careful to not overuse this feature.


    ### Example


    Let’s combine several advanced features to answer a frequently asked question:
    What changed? By combining flashback queries (to get old data), set operators
    (to find differences and combine results), and common table expressions (to avoid
    repeating ourselves), we can find the precise changes made to a table.


    Before we create the large query, let’s run some code to set up a test. Run the
    following statements to make two pseudorandom changes to the table `ENGINE_PROPELLANT`.
    This code removes one row and switches one value from “fuel” to “oxidizer” or
    vice versa:


    ```

    --Delete and update a row from a not-so-important table.

    delete from engine_propellant where rownum <= 1;

    update engine_propellant

    set oxidizer_or_fuel =

    case when oxidizer_or_fuel = ''fuel'' then ''oxidizer'' else ''fuel'' end

    where rownum <= 1;

    ```


    For the next 5 minutes, the following query will show all the changes made by
    the preceding statements. This query is a bit complicated for an example, but
    this pattern of finding differences through set operators and common table expressions
    is worth learning. I build a query similar to the following at least once a month:


    ```

    --Changes made to ENGINE_PROPELLANT in past 5 minutes.

    with old as

    (

    --Table as of 5 minutes ago.

    select *

    from engine_propellant

    as of timestamp systimestamp - interval ''5'' minute

    ),

    new as

    (

    --Table right now.

    select *

    from engine_propellant

    )

    --Both row differences put together.

    select *

    from

    (

    --Rows in old table that aren''t in new.

    select ''old'' old_or_new, old.* from old

    minus

    select ''old'' old_or_new, new.* from new

    )

    union all

    (

    --Rows in new table that aren''t in old.

    select ''new'' old_or_new, new.* from new

    minus

    select ''new'' old_or_new, old.* from old

    )

    order by 2, 3, 1 desc;

    OLD_OR_NEW  ENGINE_ID  PROPELLANT_ID  OXIDIZER_OR_FUEL

    ----------  ---------  -------------  ----------------

    old                 2            100  fuel

    new                 2            100  oxidizer

    old                62              1  fuel

    --Don''t forget to rollback the changes:

    rollback;

    ```


    The results show the row that was changed – it has a value for both “old” and
    “new,” and the `OXIDIZER_OR_FUEL` column changed. The results also show the row
    that was deleted – the last row that is listed in “old” but not in “new.” The
    common table expressions are like macros for our SQL statement, and they help
    us avoid having to repeat the “as of 5 minutes ago” logic. We could have used
    a view instead, but then we would have had to create and maintain separate objects
    just for one query.


    ### PL/SQL Common Table Expressions


    Functions and procedures in the `WITH` clause allow us to add imperative code
    to our queries. This feature can help minimize the objects in our schema, and
    it can help if our database user does not have the privileges to create objects.


    Let’s use a PL/SQL declaration to solve another common business problem: finding
    numeric values in text fields. As discussed in Chapter [4](#471418_2_En_4_Chapter.xhtml),
    determining if a string is a number is more complicated than most programmers
    appreciate. Using a regular expression is a bad idea because we’ll forget to check
    for things like negative signs, decimals, etc. The following code looks for numeric
    values in `FLIGHT_ID1`:


    ```

    --Launches with a numeric FLIGHT_ID1.

    with function is_number(p_string in varchar2) return varchar2 is

    v_number number;

    begin

    v_number := to_number(p_string);

    return ''Y'';

    exception

    when value_error then return ''N'';

    end;

    select

    to_char(launch_date, ''YYYY-MM-DD'') launch_date,

    flight_id1

    from launch

    where flight_id1 is not null

    and is_number(flight_id1) = ''Y''

    order by 1,2;

    /

    LAUNCH_DATE  FLIGHT_ID1

    -----------  ----------

    1942-06-13   2

    1942-08-16   3

    1942-10-03   4

    ...

    ```


    (There’s actually a simpler way to write the preceding query, by using a type-safe
    conversion mode available in many built-in functions: `TO_NUMBER(FLIGHT_ID1 DEFAULT
    NULL ON CONVERSION ERROR) IS NOT NULL`. In a real query, a useful PL/SQL declaration
    would be more complicated.)


    The PL/SQL `WITH` syntax is a bit strange, and many IDEs have problems parsing
    it. Even SQL*Plus treats the preceding statement a bit differently than normal
    `SELECT` statements, which is why there’s a slash at the end of the preceding
    code.


    ### Performance and Overuse


    Common table expressions can help improve performance in some cases. If the common
    table expression is referenced two or more times, Oracle may materialize the results
    by storing them in a temporary table. Materializing can reduce the number of times
    the tables are read. Oracle automatically decides whether it’s worth transforming
    intermediate results into a temporary table, but we can force the decision with
    the hint `/*+MATERIALIZE*/`. Also, the PL/SQL `WITH` clause is tightly integrated
    with SQL and can run faster than regular functions and procedures.


    But many SQL developers overuse common table expressions. The performance benefits
    of materializing results only directly help if the common table expression is
    called more than once. (However, materializing results forces Oracle to perform
    operations in a certain order, which may limit the ways the query can be transformed.
    It’s possible that rewriting a query to use common table expressions will indirectly
    improve performance, but we shouldn’t blindly rewrite queries and hope to get
    lucky.) And while it’s nice to avoid the overhead of calling PL/SQL functions,
    we don’t want to repeat ourselves and copy and paste business logic from a package
    into individual SQL statements. And if we need to reduce the overhead of PL/SQL
    functions, we can use `PRAGMA UDF` to get the same performance improvement. Also,
    if we’re worrying too much about PL/SQL function overhead, it probably means we’re
    not using enough SQL.


    As discussed in Chapter [6](#471418_2_En_6_Chapter.xhtml), the top-down data flow
    of common table expressions is a bad thing. Common table expressions that are
    only used once increase the context of our SQL statements and make our statements
    harder to debug and understand.


    Common table expressions are a great feature that can save a lot of code and improve
    performance, if used correctly. Additionally, common table expressions can refer
    to themselves. Recursive common table expressions are a powerful feature and are
    described in the next section.'
