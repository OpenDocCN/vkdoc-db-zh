    inserting 1

    updating from 1 to 2

    deleting 2

    ```


    If we need to audit a large number of tables, it may be worth creating a package
    to automate the building of audit triggers. As discussed in previous chapters
    about dynamic SQL, we can use the data dictionary and helpful programming styles
    to easily generate trigger code.


    Another use of simple DML triggers is to verify multi-table constraints. The problem
    with validating multi-table constraints through triggers is the performance; even
    if we only change one row, we may need to query the entire table. We should at
    least use an `AFTER STATEMENT` trigger, so we don’t have to verify the conditions
    for every row. This approach can accomplish the same thing as the materialized
    view multi-table constraints discussed in Chapter [9](#471418_2_En_9_Chapter.xhtml).


    **Instead-of DML triggers** can be used to change the way we interact with views.
    If our views are simple, they may be inherently updatable, and we can natively
    run DML against them. But non-trivial views are not updatable, and it may not
    be clear to Oracle how a change to a view should be reflected as a change to a
    table. With an instead-of DML trigger, we can define the rules for how to handle
    changes to views. Some applications use tables only as low-level physical storage
    and only allow users to interact with views that create a high-level abstraction
    of the system.


    **Compound DML** **triggers** can combine different timing points into a single
    trigger. Combining timing points lets us initialize variables in the `BEFORE STATEMENT`
    section, gather data in a `FOR EACH ROW` section, and then process the results
    in bulk in the `AFTER STATEMENT` section. Combining the trigger operations can
    significantly improve performance and can be helpful if we’re auditing tables
    that often undergo large changes.


    Compound triggers can also help us avoid the dreaded mutating table error, ORA-04091\.
    Mutating table errors happen when our trigger tries to modify the rows of the
    same table that fired the trigger. Row-level triggers firing triggers would lead
    to nondeterministic behavior that would depend on the order the rows were processed.
    One way to avoid that problem is to gather the relevant data in a `FOR EACH ROW`
    section and make the changes in an `AFTER STATEMENT` section, since the `AFTER
    STATEMENT` section does not cause mutating table errors.


    **System** **triggers** can fire for DDL statements per schema or per system,
    or they can fire for database events. For example, we can create a system trigger
    to prevent specific commands from running against specific objects. We must be
    extremely careful when we create system triggers, or we can prevent Oracle from
    working. If possible, we should use schema triggers instead of database triggers,
    since schema triggers affect the smallest possible number of users.


    A popular use of system triggers is to create a logon trigger that sets session
    values, for formatting or optimization. But remember that our server code should
    never depend on the client format settings. If a procedure only runs with a specific
    `NLS_DATE_FORMAT`, that procedure is broken and needs to be fixed.


    Many developers use logon triggers to set the `NLS_DATE_FORMAT` to avoid implicit
    conversion bugs. I prefer the exact opposite: I like to set an intentionally silly
    `NLS_DATE_FORMAT`. Setting a weird value, and then running the unit tests, will
    ensure the program does not use any implicit date conversions. Notice that the
    following trigger is only set for my schema, not the whole system. And I’ve also
    hard-coded my schema name to ensure this trigger is not accidentally applied in
    the wrong environment:


    ```

    --Create logon trigger that sets a custom NLS_DATE_FORMAT.

    create or replace trigger jheller.custom_nls_date_format_trg

    after logon on jheller.schema

    begin

    execute immediate

    q''[alter session set nls_date_format = ''J'']'';

    end;

    /

    --Logout and logon again and run this to see the new format.

    select to_char(sysdate) julian_day from dual;

    JULIAN_DAY


    ```


    Oracle does not have **on-commit** **triggers****,** but we can imitate them with
    PL/SQL packages like `DBMS_ALERT` and `DBMS_JOB`. The package `DBMS_SCHEDULER`
    is almost always the best way to create jobs, but `DBMS_JOB` has one advantage:
    `DBMS_JOB` only submits the job when the transaction is committed. The following
    PL/SQL block shows how to make something happen after the transaction is committed:


    ```

    --Imitation on-commit trigger.

    declare

    v_job number;

    begin

    --Create a job, but it won''t take effect yet.

    dbms_job.submit

    (

    job  => v_job,

    what => ''insert into transaction_test values(1);''

    );

    --A rollback would ignore the job.

    --rollback;

    --Only a commit will truly create the job.

    commit;

    end;

    /

    ```


    Jobs run asynchronously and may not execute immediately. We may need to wait a
    while before we see the results of the preceding PL/SQL block.'
