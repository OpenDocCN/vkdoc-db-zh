- fmt: '# 物理属性子句与归档特性


    `physical attributes clause` 允许我们控制与表存储相关的大约十几个参数。这些参数包括 `PCTFREE`、`PCTUSED`、`INITRANS`
    以及 `STORAGE` 子句中的参数。除非我们知道一些 Oracle 不知道的信息，否则不要动这些参数。许多参数甚至不再使用。即使参数被使用，其默认值几乎总是足够的。


    我们应该设置的唯一物理属性是 `PCTFREE`，它控制 Oracle 为更改留出多少空白空间。我们希望 Oracle 尽可能紧密地打包数据以节省空间。另一方面，如果数据打包得太密，添加一个字节就需要移动大量数据。Oracle
    的默认值是 10%。如果我们知道表永远不会被更新，可以通过将 `PCTFREE` 更改为 0 来节省 10% 的空间。如果我们的表更新频繁，并且我们看到由于行迁移和行链接（在第
    10 章中讨论）导致的性能问题，增加 `PCTFREE` 可能会有所帮助。


    `Flashback archiving` 和 `row archival` 允许 Oracle 表归档数据。闪回归档的设置和维护很复杂，但它允许我们无限期地对表执行闪回查询。行归档启用和使用更简单，但它只允许我们归档或取消归档行。当为表启用行归档时，每行都有一个隐藏列。该隐藏列会使数据在查询中消失，除非我们特别要求归档数据。


    # 修改与删除表


    除了创建具有正确属性的正确类型的表之外，我们还需要知道如何修改这些属性和删除表。`ALTER TABLE` 语法非常庞大，我们可以更改表中的几乎所有内容。`ALTER
    TABLE` 语句是非事务性的，并且可能需要大量停机时间。在线表重定义允许我们在没有显著停机时间的情况下更改表，但这是一个复杂的主题，不在本书讨论范围内。


    删除表很简单，但显然很危险。像 `DROP TABLE TABLE_NAME` 这样的语句会将表放入回收站。回收站默认启用，但在我们假设它已启用之前，应检查
    `V$PARAMETER` 中的 `RECYCLBIN` 参数。


    在表从回收站中清除之前，它仍然使用相同的磁盘空间。我们可以通过在命令末尾添加关键字 `PURGE` 来跳过回收站并立即回收该空间。每次删除表时，我们都需要停下来问自己——我们需要收回空间吗，以及我们是否
    100% 确定永远不再需要该表？


    `DROP TABLE` 命令还有一个 `CASCADE CONSTRAINTS` 选项。该选项会删除引用即将删除的表的所有引用约束。为了安全起见，我们应该避免使用
    `CASCADE CONSTRAINTS` 选项。要 100% 确信我们可以删除特定表已经足够困难了。要 100% 确信该表以及数据库中可能引用它的所有其他表则是另一回事。手动禁用约束，使用常规删除命令，以及如果我们忘记禁用关系时生成异常，这样更安全。


    # 列类型与属性


    与表类似，列也有多种类型和许多属性。我们不需要回顾基本类型，如 VARCHAR2 和 NUMBER。但高级类型有不同的存储选项，并且列可以用几个重要属性来定义。


    `XML` 数据可以以三种不同的方式存储在表中。使用 `XMLType` 时，我们可以选择二进制、结构化（对象关系）或非结构化（CLOB）。二进制 XML
    存储是默认设置，适用于我们事先不知道每个文件确切结构的以文档为中心的存储。结构化（对象关系）存储适用于以数据为中心的存储，我们确切知道 XML 模式并希望优化和索引数据。非结构化（CLOB）存储已过时，但该选项适用于以原始格式逐字节存储
    XML 数据。除非我们有重要的 XML 工作负载可能受益于这三种选项之间复杂的性能权衡，并且我们愿意阅读 *XML DB Developer''s Guide*，否则应使用默认存储选项。


    `JSON` 数据也有多个存储选项，并且这些选项也存在复杂的性能权衡。在 21c 之前，JSON 数据存储为 VARCHAR2 或 CLOB，具体取决于最大文件大小，并且添加
    `IS JSON` 约束很重要。自 21c 起，我们可能应该使用本机 JSON 数据类型。


    **大型对象** (LOB) 也有不同的存储选项。主要区别在于旧的 BasicFiles 和新的 SecureFiles 之间。SecureFiles 向后兼容，性能优于
    BasicFiles，并提供独特功能，例如压缩、重复数据删除和加密。（但这些额外功能需要额外的许可证。）LOB 可以具有其他存储属性，例如与表不同的表空间。一如既往，除非我们有特殊情况，否则应使用默认设置。当我们升级时，应考虑从旧的默认值更改为新的默认值。例如，自
    12.1 起，SecureFiles 一直是默认设置，因此如果我们继承了一个旧数据库，我们可能希望将 LOB 从 BasicFiles 转换为 SecureFiles。


    **列定义**具有几个高级功能。列可以有 *default value*，这对于存储审计数据（如当前用户和日期）等任务很有用。*Virtual columns*
    不存储任何数据，而是返回表达式。虚拟列可以帮助我们避免反规范化——我们可以将数据以其自然格式和显示格式存储，而无需担心同步问题。列定义可以具有 *inline
    constraints*，其语法比 out-of-line 约束更简单。但通常最好创建 out-of-line 约束，因为 inline 约束具有系统生成的名称，这些名称在每个数据库上都会不同。这种名称差异可能导致模式比较的麻烦。*Invisible
    columns* 可以使用，但不会在 `SELECT *` 中显示。以下代码演示了所有这些不寻常的列属性：


    ```sql

    --Default, virtual, inline check, and invisible.

    create table weird_columns

    (

    a number default 1,

    b number as (a+1),

    c number check (c >= 0),

    d number invisible

    );

    insert into weird_columns(c,d) values (3,4);

    select * from weird_columns;

    A  B  C

    -  -  -

    1  2  3

    ```


    **列默认值**对于设置主键值特别有用。在旧版本的 Oracle 中，我们需要在每次 `INSERT` 时手动调用序列、创建调用序列的触发器或使用像 `SYS_GUID`
    这样的函数作为默认值。现代版本允许使用标识列和将序列作为默认值。标识列和序列默认值都比以前的解决方案更简单、更快。创建标识列会自动创建一个序列并将该序列连接到表和列。不幸的是，使用标识列我们会丢失一些重要细节，例如序列名称。我更喜欢手动创建一个序列，然后将列默认值设置为
    `SEQUENCE_NAME.NEXTVAL`。手动创建序列是一个额外的手动步骤，但它避免了系统生成的序列名称，这些名称在不同环境之间永远不会匹配。以下是使用标识列和序列默认值的示例：


    ```sql

    --Identity column and sequence default.

    create sequence test_sequence;

    create table identity_table

    (

    a number generated as identity,

    b number default test_sequence.nextval,

    c number

    );

    insert into identity_table(c) values(1);

    select * from identity_table;

    A  B  C

    -  -  -

    1  1  1

    ```'
  raw: 'The **physical attributes clause** lets us control about a dozen different
    parameters related to table storage. These parameters include `PCTFREE`, `PCTUSED`,
    `INITRANS`, and the parameters in the `STORAGE` clause. Don’t touch those parameters
    unless we know something that Oracle doesn’t. Many of those parameters aren’t
    even used anymore. And if the parameters are used, the defaults are almost always
    good enough.


    The only physical attribute we should set is `PCTFREE`, which controls how much
    space Oracle leaves empty for changes. We want Oracle to pack our data as densely
    as possible to save space. On the other hand, if the data is packed too densely,
    adding a single byte requires moving a lot of data around. Oracle’s default value
    is 10%. If we know that our table will never be updated, we can save 10% of the
    space by changing `PCTFREE` to 0\. If our table is updated frequently and we see
    performance issues from row migration and row chaining (discussed in Chapter [10](#471418_2_En_10_Chapter.xhtml)),
    increasing `PCTFREE` might help.


    **Flashback archiving** and **row archival** let Oracle tables archive data. Flashback
    archiving is tricky to set up and maintain, but it lets us perform flashback queries
    on a table indefinitely. Row archival is simpler to enable and use, but it only
    allows us to archive or unarchive rows. When row archival is enabled for a table,
    each row has a hidden column. That hidden column makes data disappear from queries
    unless we specifically ask for archived data.


    ### ALTER and DROP Table


    In addition to creating the right types of tables with the right properties, we
    also need to know how to alter those properties and drop tables. The `ALTER TABLE`
    syntax is massive, and we can change just about anything in our tables. `ALTER
    TABLE` statements are non-transactional and can require a lot of downtime. Online
    table redefinition allows us to change tables without significant downtime, but
    that’s a complicated topic not covered in this book.


    Dropping tables is simple but obviously dangerous. Statements like `DROP TABLE
    TABLE_NAME` will put the table in the recycle bin. The recycle bin is enabled
    by default, but we should check the `RECYCLBIN` parameter in `V$PARAMETER` before
    we assume it’s enabled.


    Until the table is purged from the recycle bin, the table still uses the same
    amount of disk space. We can skip the recycle bin and reclaim that space immediately
    by adding the keyword `PURGE` to the end of the command. Every time we drop a
    table, we need to stop and ask ourselves – do we need the space back, and are
    we 100% sure we will never need the table again?


    The `DROP TABLE` command also has a `CASCADE CONSTRAINTS` option. That option
    drops any referential constraints that refer to the soon-to-be-dropped table.
    To be safe, we should avoid the `CASCADE CONSTRAINTS` option. It’s hard enough
    to be 100% confident that we can drop a specific table. It’s another thing to
    be 100% confident about a table *and* all other tables in the database that might
    refer to it. It’s safer to manually disable constraints, use a regular drop command,
    and generate exceptions if we forgot to disable a relationship.


    ### Column Types and Properties


    Just like tables, columns come in many types and have many properties. We don’t
    need to review the basic types, like VARCHAR2 and NUMBER. But the advanced types
    have different storage options, and columns can be defined with several important
    properties.


    **XML** data can be stored in tables in three different ways. When using the `XMLType`,
    we can choose binary, structured (object-relational), or unstructured (CLOB).
    Binary XML storage is the default and is good for document-centric storage where
    we don’t know the exact structure of each file ahead of time. Structured (object-relational)
    storage is good for data-centric storage, where we know the precise XML schema
    and we want to optimize and index the data. Unstructured (CLOB) storage is obsolete,
    but that option is good for storing our XML data byte for byte in the original
    format. We should use the default storage options unless we have a significant
    XML workload that may benefit from the complicated performance trade-offs between
    the three options and if we are willing to read the *XML DB Developer’s Guide*.


    **JSON** data also has multiple storage options, and these options also have complicated
    performance trade-offs. Until 21c, JSON data was stored as either VARCHAR2 or
    CLOB, depending on the maximum file size, and it was important to add an `IS JSON`
    constraint. Since 21c, we should probably use the native JSON data type.


    **Large objects** (LOBs) also have different storage options. The main difference
    is between the old BasicFiles and the new SecureFiles. SecureFiles is backward
    compatible, performs better than BasicFiles, and offers unique features, such
    as compression, deduplication, and encryption. (But those extra features require
    additional licenses.) LOBs can have other storage properties, such as a tablespace
    different than the table. As always, we should use the default settings unless
    we have a special case. When we upgrade, we should consider changing from old
    defaults to new defaults. For example, SecureFiles has been the default since
    12.1, so if we inherited an old database, we may want to convert our LOBs from
    BasicFiles to SecureFiles.


    **Column definitions** have several advanced features. Columns can have a *default
    value*, which is useful for tasks like storing auditing data, such as the current
    user and data. *Virtual columns* do not store any data but instead return an expression.
    Virtual columns can help us avoid denormalization – we can store data both in
    its natural format and in a display format, without worrying about synchronization
    problems. Column definitions can have *inline constraints*, with a syntax that
    is simpler than out-of-line constraints. But it’s generally better to create out-of-line
    constraints because inline constraints have system-generated names that will be
    different on every database. That name difference can cause schema comparison
    headaches. *Invisible columns* can be used but won’t show up in a `SELECT *`.
    The following code demonstrates all of these unusual column properties:


    ```

    --Default, virtual, inline check, and invisible.

    create table weird_columns

    (

    a number default 1,

    b number as (a+1),

    c number check (c >= 0),

    d number invisible

    );

    insert into weird_columns(c,d) values (3,4);

    select * from weird_columns;

    A  B  C

    -  -  -

    1  2  3

    ```


    **Column defaults** are especially helpful for setting primary key values. In
    old versions of Oracle, we needed to either manually call a sequence with each
    `INSERT`, create a trigger that calls a sequence, or use a function like `SYS_GUID`
    as a default. Modern versions allow identity columns and using a sequence as the
    default. Both identity columns and sequence defaults are simpler and faster than
    previous solutions. Creating an identity column automatically creates a sequence
    and connects that sequence to the table and column. Unfortunately, with identity
    columns we lose some important details, such as the sequence name. I prefer to
    manually create a sequence and then set the column default to `SEQUENCE_NAME.NEXTVAL`.
    Creating the sequence manually is an extra manual step, but it avoids system-generated
    sequence names that will never match between environments. The following are examples
    of using an identity column and sequence default:


    ```

    --Identity column and sequence default.

    create sequence test_sequence;

    create table identity_table

    (

    a number generated as identity,

    b number default test_sequence.nextval,

    c number

    );

    insert into identity_table(c) values(1);

    select * from identity_table;

    A  B  C

    -  -  -

    1  1  1

    ```'
