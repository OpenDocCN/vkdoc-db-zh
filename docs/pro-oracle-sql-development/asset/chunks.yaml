  trans: '

    ### 排序性能、资源与隐式排序


    排序对性能的影响是复杂的。有两个主要主题需要考虑——排序的算法复杂度，以及排序何时需要访问磁盘而非内存。章节 16 包含了一个关于算法复杂度的速成课程。现在，我们可以先接受一个事实：对
    `N` 行数据进行排序所需的操作次数大约为 `N*LOG(N)`。排序操作变慢的速度可能比我们想象的要快。如果对 1000 行进行排序需要 `1000*LOG(1000)
    = 1000*3 = 3000` 次操作，那么对 2000 行进行排序则需要 `2000*LOG(2000) = 2000*3.3 = 6600` 次操作。输入数据量翻倍，但所需的工作量却增加了一倍多。


    理想情况下，排序应在程序全局区（PGA）内存缓冲区中完成。PGA 内存在服务器进程之间分配，主要由实例参数 `PGA_AGGREGATE_TARGET` 控制。排序是
    CPU 密集型操作，也需要空间来存储临时结果集。如果这些临时结果无法容纳在 PGA 中，结果就会被写入磁盘上的临时表空间。磁盘访问比内存访问慢几个数量级。在最坏的情况下，向输入数据中添加一行，就可能导致排序运行速度慢得离谱。


    另一方面，有时排序会比我们预期的更快、更节省资源。例如，Oracle 可能能够转换查询以避免冗余或不必要的排序，并且 Oracle 可能能够从索引中读取已预排序的数据。


    这些复杂的性能问题导致许多开发者寻找其他排序方法，但 `ORDER BY` 子句是保证结果有序的 `唯一` 方法。试图通过变通方法将有序结果作为副产品返回是徒劳无功的。在某些版本的
    Oracle 中，在某些情况下，有一些技巧可以在不实际要求排序的情况下对结果进行排序。例如，旧版本的 Oracle 会自动对 `GROUP BY` 的结果进行排序。多年后，当
    Oracle 引入了新的并行特性和分组算法，这些算法不再隐式排序时，许多程序就出错了。我们绝不能依赖未公开的特性来对数据进行排序。


    如果我们处理的不仅仅是 ASCII 数据，还需要考虑 Oracle 的国家语言支持。NLS 设置也会影响比较操作，这将在本章后面讨论。目前，需要记住的最重要的
    NLS 属性是：Oracle 排序默认情况下是区分大小写的。


    ## 集合操作符


    集合操作符使用 `UNION`、`UNION ALL`、`INTERSECT` 和 `MINUS` 来组合查询结果。连接（join）与集合操作符的区别在于，集合操作符依赖于集合中的
    *所有* 值，而不仅仅是连接条件中使用的值。由于集合操作符依赖于所有值，因此两个集合必须具有相同数量和类型的列。与连接类似，我们可以通过图 7-1 中的维恩图来可视化集合操作符。


    ![](img/471418_2_En_7_Fig1_HTML.png)


    图 7-1：SQL 集合操作符的维恩图


    ### UNION 和 UNION ALL


    最常见的集合操作符是 `UNION` 和 `UNION ALL`。当我们想要合并数据集时，即使这些集合之间没有关系，也会使用这些集合操作符。`UNION`
    创建一个不包含重复项的结果集，而 `UNION ALL` 则允许包含重复项。去除重复项可能对性能产生巨大影响，因此我们默认应使用 `UNION ALL`。


    `UNION ALL` 最常见的用途是生成数据。在 Oracle 中，我们必须始终从 *某个对象* 中进行选择，因此有一个名为 `DUAL` 的特殊伪表。`DUAL`^(¹⁶)
    表只有一行，因此如果我们想创建多行，就必须使用 `UNION ALL` 组合语句，如下所示：


    ```

    select ''1'' a from dual union all

    select ''2'' a from dual union all

    select ''3'' a from dual union all

    ...

    ```


    ### INTERSECT 和 MINUS


    `INTERSECT` 返回两个查询中所有值都完全相同的行。`MINUS` 返回存在于第一个查询但不存在于第二个查询中的行。`INTERSECT` 和 `MINUS`
    对于比较数据很有帮助。例如，以之前的 fizz buzz 为例，比较 `CASE` 和 `DECODE` 技术。像这样的查询可以帮助我们证明两个版本返回的数据完全相同：


    ```

    --比较 CASE 和 DECODE 的 fizz buzz 结果。

    select

    rownum line_number,

    case

    when mod(rownum, 15) = 0 then ''fizz buzz''

    when mod(rownum,  3) = 0 then ''fizz''

    when mod(rownum,  5) = 0 then ''buzz''

    else to_char(rownum)

    end case_result

    from dual connect by level <= 100

    minus

    select

    rownum line_number,

    decode(mod(rownum, 15), 0, ''fizz buzz'',

    decode(mod(rownum, 3), 0, ''fizz'',

    decode(mod(rownum, 5), 0, ''buzz'', rownum)

    )

    ) decode_result

    from dual connect by level <= 100;

    ```


    由于前面示例中的两个子查询是相等的，因此完整查询不返回任何行。如果我们将 `MINUS` 替换为 `INTERSECT`，我们可以通过计数返回的 100 行来证明子查询是相同的。


    ### 集合操作符的复杂性


    集合操作符的比较并不总是那么简单。在上面的例子中，我们不能简单地说，“minus 查询返回 0 行；因此，集合是相等的”或者“intersect 返回 100
    行；因此，集合是相等的。”


    如果前面例子中的第一个子查询使用 `LEVEL <= 99` 而不是 `LEVEL <= 100` 会怎样？完整查询仍然会返回 0 行，但这两个集合并不完全相等。或者如果第一个子查询使用
    `LEVEL <= 101` 而我们使用 `INTERSECT` 会怎样？完整查询将返回 100 行，尽管这两个集合并不相等。在使用 `MINUS` 或 `INTERSECT`
    进行比较之前，我们需要仔细计算每个子查询的行数，同时还要注意重复项。


    类似于 `DECODE` 的规则，集合操作符将两个 null 视为相同的值。集合操作符是 Oracle 打破其自身规则的另一个地方。但至少这次打破的规则是合理的。在实践中，比较集合时，我们总是希望
    null 能够匹配。例如，以下查询只返回一行，这正是我们想要的结果：


    ```

    select null from dual

    union

    select null from dual;

    ```


    集合操作符无法在不寻常的数据类型上工作，例如 `CLOB`、`LONG`、`XMLType`、用户定义类型等。这些类型会产生诸如“ORA-00932: inconsistent
    datatypes: expected - got CLOB.”之类的错误消息。大对象理论上可能包含千兆字节的数据，这些数据无法轻松比较或排序。对大型数据类型的限制同样适用于连接和排序。


    Oracle 21c 引入了新的集合操作符特性。`INTERSECT` 和 `MINUS` 现在支持 `ALL` 选项，因此您可以执行这些操作而不获得唯一结果。为了匹配
    SQL 标准，添加了关键字 `EXCEPT`，但其工作方式与 `MINUS` 完全相同。

    '
- fmt: '## Advanced Grouping


    Oracle SQL has many options to help us group our data and aggregate results. This
    book assumes you are familiar with basic grouping concepts, so let’s start with
    a simple example and then add on to it. Let’s count the number of orbital and
    deep space launches per launch vehicle family and launch vehicle name:


    ```

    --Count of launches per family and name.

    select lv_family_code, lv_name, count(*)

    from launch

    join launch_vehicle

    on launch.lv_id = launch_vehicle.lv_id

    where launch.launch_category in (''orbital'', ''deep space'')

    group by lv_family_code, lv_name

    order by 1,2,3;

    LV_FAMILY_CODE  LV_NAME    COUNT(*)

    --------------  ---------  --------

    ASLV            ASLV              4

    ASLV            SLV-3             4

    Angara          Angara A5         1

    ...

    ```


    The results are ordered and start with the Augmented Satellite Launch Vehicle
    (`ASLV`, an Indian rocket from the 1980s) and `Angara` (a new Russian rocket).
    This simple type of grouping is enough for most queries. Occasionally we may need
    to limit the results with the `HAVING` clause. For example, if we only want to
    see the launch counts for the most popular rockets, we could add this line of
    code between the `WHERE` and the `ORDER BY` clauses: `HAVING COUNT(*) >= 10`.
    Note that the `HAVING` conditions cannot reference the aliases in the `SELECT`
    clause, so we may need to duplicate our logic.


    ### ROLLUP, GROUP*, CUBE


    More complicated reports require multiple levels of groupings. Let’s expand on
    the previous example. In addition to counting launches per family and name, we
    also want the counts only per family, as well as a grand total. The `ROLLUP` syntax
    lets us perform multiple groupings in the same query. `ROLLUP` starts at the most
    detailed level, the rightmost column in the list, and keeps adding subtotals for
    each column to the left:


    ```

    --Launch count per family and name, per family, and grand total.

    select

    lv_family_code,

    lv_name,

    count(*),

    grouping(lv_family_code) is_family_grp,

    grouping(lv_name) is_name_grp

    from launch

    join launch_vehicle

    on launch.lv_id = launch_vehicle.lv_id

    where launch_category in (''orbital'', ''deep space'')

    group by rollup(lv_family_code, lv_name)

    order by 1,2,3;

    LV_FAMILY_CODE  LV_NAME  COUNT(*)  IS_FAMILY_GRP  IS_NAME_GRP

    --------------  -------  --------  -------------  -----------

    ASLV            ASLV            4              0            0

    ASLV            SLV-3           4              0            0

    ASLV                            8              0            1

    Angara          Angara A5       1              0            0

    ...

    5667              1            1

    ```


    The preceding results show multiple levels of grouping, including the grand total
    at the bottom. The nulls indicate which columns are aggregated in each row. For
    example, the third row has a null for `LV_NAME`, because that row shows totals
    for all values of the `ASLV` family.


    It’s not always easy to tell which rows are subtotals. Oracle provides multiple
    ways to distinguish the row’s grouping level. The group level of each row can
    be precisely determined with the function `GROUP_ID`, `GROUPING`, or `GROUPING_ID`.
    `GROUPING` is the easiest to use – that function returns a `1` or `0` to indicate
    whether or not the row is a group of a specific set of columns. That function
    is used in the preceding results to generate the columns `IS_FAMILY_GRP` and `IS_NAME_GRP`.
    Columns that tell us the grouping level can be used for things like filtering
    out unwanted rows or changing the display to emphasize grand totals. `GROUP_ID`
    and `GROUPING_ID` are more powerful but are also more difficult to use. These
    two functions return an encoded number to distinguish between row types.


    In addition to `ROLLUP`, Oracle also provides `CUBE` and `GROUPING SETS` to define
    even more types of groupings. `CUBE` groups all combinations of columns, and `GROUPING
    SETS` lets us specify multiple sets to group together. These grouping functions
    can quickly get crazy, so I’m not going to show any more huge examples. If we
    find ourselves creating multiple summary queries and concatenating them with `UNION
    ALL`, we should look for an advanced grouping function to simplify our code.


    After the data is grouped, the values inside each group need to be combined with
    the proper aggregate functions. Most aggregation is satisfied by combinations
    of `MIN`, `MAX`, `AVG`, `SUM`, and `COUNT`. There are many more aggregate functions
    for different types of statistical operations. And all of the aggregate functions
    can use expressions, such as a `CASE` expression, making them even more powerful.


    Every column returned by an aggregate query must either be in the `GROUP BY` clause,
    have an aggregate function, or be a literal. That rule occasionally leads to queries
    with logically redundant grouping. For example, let’s say we want to add the launch
    vehicle classification, `LAUNCH_VEHICLE.LV_CLASS`, to the preceding query. That
    column will always return the same value for each group, but Oracle doesn’t know
    that. We need to either add the column to the `GROUP BY` clause or add a meaningless
    aggregate function like `MAX` in front of the column. Since Oracle 21c, if we
    want to avoid the overhead of extra grouping and make the code clearer, we can
    use the expression `ANY_VALUE(LV_CLASS)`. But we must fully understand our data,
    or that expression could return unexpected values.


    ### LISTAGG


    `LISTAGG` aggregates strings, and that function was shamefully absent from Oracle
    for decades. In the past, every Oracle developer had to create their own custom
    solution for string aggregation. There is a lot of old code and old forum posts
    that discuss different strategies for aggregating strings: `CONNECT BY`, `MODEL`,
    Oracle data cartridge, `COLLECT`, undocumented functions like `WM_CONCAT`, etc.
    None of that code is needed anymore. If we need to generate a comma-separated
    list of strings, we should always use `LISTAGG`.


    For example, this query displays the name of all rockets in the `Ariane` rocket
    family and lists the names in alphabetical order:


    ```

    select

    lv_family_code,

    listagg(lv_name, '','') within group (order by lv_name) lv_names

    from launch_vehicle

    where lower(lv_family_code) like ''ariane%''

    group by lv_family_code

    order by lv_family_code;

    LV_FAMILY_CODE  LV_NAMES

    --------------  --------

    Ariane          Ariane 1,Ariane 2,Ariane 3,Ariane 40,...

    Ariane5         Ariane 5ECA,Ariane 5ES,Ariane 5ES/ATV,...

    ```


    Creating lists of strings is a common task, and there can be many tricky requirements.
    If the string could be larger than the 4,000-byte limit, we might need to add
    the `ON OVERFLOW TRUNCATE` option. (If we really need to aggregate more than 4,000
    bytes, we can look online for advanced solutions using `XMLAGG` or `ODCI`.) If
    we want to return unique values and we are on version 19c or higher, we can add
    the `DISTINCT` keyword. But if we have more complicated requirements or are stuck
    on an older version of the database, we can always use multiple inline views to
    preprocess the data before aggregation.'
