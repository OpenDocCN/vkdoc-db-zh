    Redo represents the new data, and undo represents the old data. There are many
    times when our SQL statements need to reference the old data. Even when we issue
    a `DELETE` command, Oracle cannot simply remove all the data. The most obvious
    problem is – what happens if we roll back the statement or transaction? When Oracle
    is halfway through deleting a table, Oracle must be able to put everything back
    to the way it was.


    Before data is changed, an old version of the data is saved in the undo tablespace.
    While redo is stored on the file system, undo is stored inside the database. But
    to make matters worse, undo also generates redo. The undo–redo combination may
    be necessary if the database crashes during a rollback.


    All this transaction logging data sounds ridiculous at first. Aside from the change
    itself, Oracle saves multiple copies of the new data and multiple copies of the
    old data. All those extra copies are why direct-path writes can be so important.
    Our processes don’t always have enough time and resources to make so many extra
    copies.


    At least undo tends to be less expensive than redo. We can measure undo similar
    to the way we measured redo. The following query on `V$MYSTAT` is almost exactly
    the same as before – simply change “redo size” to “undo change vector size”:


    ```

    --Cumulative undo generated by this session, in megabytes.

    select to_char(round(value/1024/1024, 1), ''999,990.0'') mb

    from v$mystat

    join v$statname

    on v$mystat.statistic# = v$statname.statistic#

    where v$statname.name = ''undo change vector size'';

    ```


    Similar to calculating redo, we can use the output from the preceding query as
    a baseline for measuring undo generation. Then we can determine the undo generated
    by any statement by re-running the preceding query. If we re-run the previous
    test cases, but this time measure undo, we’ll find that the undo generated is
    less than the redo generated:


    ```

    --Create an empty table.  +0.0 megabytes.

    create table launch_undo as

    select * from launch where 1=0;

    --Insert data.  +0.3 megabytes.

    insert into launch_undo select * from launch;

    commit;

    --Delete data.  +13.9 megabytes.

    delete from launch_undo;

    --Rollback the delete.  +0.0 megabytes.

    rollback;

    --Direct-path insert.  +0.0 megabytes.

    alter table launch_undo nologging;

    insert /*+ append */ into launch_undo select * from launch;

    commit;

    --Truncate new table.  +0.1 megabytes.

    --truncate table launch_undo;

    ```


    Like with redo, creating the preceding empty table generates almost no undo data.
    Inserting data is where the undo looks better than redo; neither conventional
    nor directpath `INSERT` statements generate significant undo data. Deleting does
    create a lot of undo data, about twice as much data as the size of the table,
    but that undo is still less than the redo size. Rollback *uses* the undo data
    but doesn’t generate any undo data.


    Another good thing about undo is that it ages out. There’s no such thing as undo
    archive logs that need to be saved or backed up. The undo tablespace will eventually
    clean itself out, based on the size of the tablespace, the parameter `UNDO_RETENTION`,
    and system activity. But we may still need to allocate a lot of space for the
    undo tablespace, depending on how big and slow our transactions are. If we get
    errors about not being able to find undo segments, either from DML or flashback,
    we may need to either increase the undo tablespace size or increase `UNDO_RETENTION`.
    If our undo problem is related to LOBs, which store their undo data differently,
    we may need to change individual column retention settings.


    ### Undo for Multiversion Consistency


    Aside from the obvious use of undo for rollbacks, undo is also used to maintain
    multiversion consistency. Undo is Oracle’s mechanism to achieve the consistency
    and isolation in ACID (as opposed to databases that use the simpler mechanism
    of locking entire objects, which causes horrible concurrency problems).


    Oracle uses a System Change Number (SCN) to identify the version of each row.
    The SCN increases with every commit and can be queried through the pseudo-column
    `ORA_ROWSCN`, as shown in the following example:


    ```

    --System Change Number (SCN) example.

    select norad_id, ora_rowscn

    from satellite

    order by norad_id

    fetch first 3 rows only;

    NORAD_ID  ORA_ROWSCN

    --------  ----------

    000001      39300415

    000002      39300415

    000003      39300415

    ```


    If we made a change to those rows, and committed the change, the `ORA_ROWSCN`
    would increase. If we rewrote the query using flashback, for example, if we added
    the expression `AS OF TIMESTAMP SYSTIMESTAMP - INTERVAL ''1'' MINUTE` after the
    table name, we would see the old values and the old SCN. When we query a table,
    we may be reading from other data structures; some table data may be in the table,
    and some table data may be in the undo tablespace.


    We need to be careful about using the SCN for our own purposes, such as optimistic
    locking. Despite the name, `ORA_ROWSCN` does not necessarily return the SCN for
    each row. By default, Oracle records one SCN per block, and updating one row may
    change the `ORA_ROWSCN` for other rows. If we want to track an SCN for each row,
    we can create the table with `ROWDEPENDENCIES` enabled, which uses an extra 6
    bytes in each row to store the SCN.


    But even with `ROWDEPENDENCIES` enabled, the `ORA_ROWSCN` pseudo-column is not
    100% accurate and can appear to randomly change. Oracle’s internal use of the
    SCN is accurate, but the external presentation of the SCN is imprecise. Before
    we use `ORA_ROWSCN` to implement a locking mechanism, we should carefully read
    all the caveats described in the *SQL Language Reference*.


    Undo and SCN enable multiversion consistency because every row effectively has
    a timestamp. While we were running the preceding query against the `SATELLITE`
    table, imagine if another user changed the table and committed their transaction.
    Even if the table is changed in the middle of our query, the query results will
    not include those changes. Every query returns a *consistent* set of data – the
    data that existed as of the time the query began. Imagine if another user changed
    the `SATELLITE` table *before* we started our query, but the transaction is not
    committed. Our query results are *isolated* from that session, and we don’t see
    uncommitted data from other transactions.


    Every time Oracle reads from a table, it must compare each row’s SCN with the
    SCN at the beginning of the query. If the row SCN is higher than the query SCN,
    that means someone else recently changed the data, and Oracle must look in the
    undo tablespace for an old copy of the data.


    Oracle queries are always consistent and isolated. Although redo can be disabled,
    there is no way to disable undo to get a “dirty read” in Oracle. Reading undo
    data is so fast we rarely notice it happening anyway. And since the undo data
    is not stored with the table data, we don’t have to worry about our tables running
    out of space or about periodically cleaning up that undo information.^([^(28)](#fn28))
    But there is a price to pay for Oracle’s undo architecture.


    Long-running SQL statements may fail with the error “ORA-01555: snapshot too old.”
    That error means the table has changed since we started reading it and the old
    versions of the table data could not be found in the undo tablespace. We can avoid
    those errors either by making the query run faster, increasing the timeout for
    undo data with the `UNDO_RETENTION` parameter, or increasing the space available
    to the undo tablespace. The `UNDO_RETENTION` parameter is not a guarantee; Oracle
    will only keep undo data for that long *if* there is space available.


    While redo and archive logs need to be sized for to the *largest* possible DML,
    undo needs to be sized for the *longest* possible `SELECT`.'
  trans: '

    ### 用于回滚的撤销


    重做代表新数据，而撤销代表旧数据。很多时候，我们的 SQL 语句需要引用旧数据。即使我们发出 `DELETE` 命令，Oracle 也不能简单地删除所有数据。最明显的问题是——如果我们回滚该语句或事务，会发生什么？当
    Oracle 删除表进行到一半时，它必须能够将所有内容恢复原状。


    在数据被更改前，其旧版本会被保存在撤销表空间中。虽然重做日志存储在文件系统上，但撤销数据存储在数据库内部。但更糟糕的是，撤销操作本身也会生成重做日志。如果数据库在回滚过程中崩溃，撤销与重做的组合可能是必需的。


    所有这些事务日志数据起初听起来很荒谬。除了更改本身，Oracle 还会保存新数据的多个副本和旧数据的多个副本。所有这些额外的副本正是直接路径写入如此重要的原因。我们的进程并非总是有足够的时间和资源来制作这么多额外的副本。


    至少，撤销通常比重做开销小。我们可以用类似衡量重做日志的方式来衡量撤销。以下对 `V$MYSTAT` 的查询与之前几乎完全相同——只需将 "redo size"
    改为 "undo change vector size"：


    ```sql

    --此会话累积生成的撤销数据量，单位为 MB。

    select to_char(round(value/1024/1024, 1), ''999,990.0'') mb

    from v$mystat

    join v$statname

    on v$mystat.statistic# = v$statname.statistic#

    where v$statname.name = ''undo change vector size'';

    ```


    与计算重做日志类似，我们可以将上述查询的输出作为衡量撤销生成量的基准。然后，通过重新运行上述查询，我们可以确定任何语句生成的撤销量。如果我们重新运行之前的测试用例，但这次测量撤销量，会发现生成的撤销量少于生成的重做量：


    ```sql

    --创建空表。+0.0 MB。

    create table launch_undo as

    select * from launch where 1=0;

    --插入数据。+0.3 MB。

    insert into launch_undo select * from launch;

    commit;

    --删除数据。+13.9 MB。

    delete from launch_undo;

    --回滚删除。+0.0 MB。

    rollback;

    --直接路径插入。+0.0 MB。

    alter table launch_undo nologging;

    insert /*+ append */ into launch_undo select * from launch;

    commit;

    --截断新表。+0.1 MB。

    --truncate table launch_undo;

    ```


    与重做日志一样，创建前面的空表几乎不生成撤销数据。插入数据时，撤销看起来比重做表现更好；无论是常规还是直接路径 `INSERT` 语句都不会生成显著的撤销数据。删除操作确实会生成大量撤销数据，大约是表大小的两倍，但该撤销量仍然小于重做日志的大小。回滚*使用*撤销数据，但不生成任何新的撤销数据。


    撤销的另一个优点是它会自动过期。不存在需要保存或备份的撤销归档日志。撤销表空间最终会根据其大小、`UNDO_RETENTION` 参数和系统活动情况自动清理自身。但是，根据我们事务的大小和速度，我们可能仍需要为撤销表空间分配大量空间。如果我们收到无法找到撤销段的错误（无论是来自
    DML 还是闪回操作），可能需要增大撤销表空间的大小或增加 `UNDO_RETENTION` 值。如果我们的撤销问题与 LOB 相关（LOB 以不同方式存储其撤销数据），我们可能需要更改个别列的保留设置。


    ### 用于多版本一致性的撤销


    除了用于回滚这一明显用途外，撤销还用于维护多版本一致性。撤销是 Oracle 实现 ACID 特性中的一致性和隔离性的机制（与那些使用更简单机制——锁定整个对象——的数据库相反，后者会导致严重的并发问题）。


    Oracle 使用系统变更号来标识每一行的版本。SCN 随每次提交而递增，并可通过伪列 `ORA_ROWSCN` 查询，如下例所示：


    ```sql

    --系统变更号示例。

    select norad_id, ora_rowscn

    from satellite

    order by norad_id

    fetch first 3 rows only;

    NORAD_ID  ORA_ROWSCN

    --------  ----------

    000001      39300415

    000002      39300415

    000003      39300415

    ```


    如果我们更改了这些行并提交了更改，`ORA_ROWSCN` 将会增加。如果我们使用闪回重写查询，例如在表名后添加表达式 `AS OF TIMESTAMP SYSTIMESTAMP
    - INTERVAL ''1'' MINUTE`，我们将看到旧值和旧的 SCN。当我们查询一个表时，我们可能从其他数据结构中读取；部分表数据可能在表中，部分表数据可能在撤销表空间中。


    我们需要谨慎地将 SCN 用于我们自己的目的，例如乐观锁。尽管名称如此，`ORA_ROWSCN` 并不必然返回每行的 SCN。默认情况下，Oracle 每个数据块记录一个
    SCN，更新一行可能会更改其他行的 `ORA_ROWSCN`。如果我们想跟踪每行的 SCN，可以在创建表时启用 `ROWDEPENDENCIES`，这会在每行中使用额外的
    6 个字节来存储 SCN。


    但即使启用了 `ROWDEPENDENCIES`，`ORA_ROWSCN` 伪列也不是 100% 准确，并且可能看似随机变化。Oracle 内部对 SCN
    的使用是准确的，但对外呈现的 SCN 是不精确的。在我们使用 `ORA_ROWSCN` 实现锁定机制之前，应仔细阅读《*SQL 语言参考手册*》中描述的所有注意事项。


    撤销和 SCN 之所以能实现多版本一致性，是因为每一行都有效地有一个时间戳。当我们在对 `SATELLITE` 表运行上述查询时，想象一下如果有另一个用户更改了该表并提交了他们的事务。即使表在我们的查询过程中发生了更改，查询结果也不会包含那些更改。每个查询都返回一组*一致*的数据——即查询开始时存在的数据。想象一下，如果另一个用户在我们的查询开始*之前*更改了
    `SATELLITE` 表，但该事务尚未提交。我们的查询结果将与该会话*隔离*，我们不会看到来自其他事务的未提交数据。


    每次 Oracle 从表中读取时，都必须比较每行的 SCN 与查询开始时的 SCN。如果行的 SCN 高于查询的 SCN，则意味着最近有人更改了数据，Oracle
    必须在撤销表空间中查找该数据的旧副本。


    Oracle 的查询总是一致的且隔离的。虽然可以禁用重做日志，但在 Oracle 中无法禁用撤销来获得“脏读”。读取撤销数据非常快，我们很少注意到它在发生。并且由于撤销数据不与表数据存储在一起，我们不必担心表空间耗尽或需要定期清理这些撤销信息^(²⁸)。但是，Oracle
    的撤销架构是有代价的。


    长时间运行的 SQL 语句可能会因错误 “ORA-01555: snapshot too old” 而失败。该错误意味着自我们开始读取表以来，表已经发生了更改，并且无法在撤销表空间中找到表数据的旧版本。我们可以通过加快查询速度、使用
    `UNDO_RETENTION` 参数增加撤销数据的超时时间，或增加撤销表空间的可用空间来避免这些错误。`UNDO_RETENTION` 参数并不能保证；Oracle
    仅在有空间可用的情况下，才会将撤销数据保留那么长时间。


    虽然重做日志和归档日志需要为*最大*可能的 DML 操作确定大小，但撤销需要为*最长*可能的 `SELECT` 查询确定大小。

    '
- fmt: '## Temporary Tablespace


    临时表空间用于存储排序、哈希和大对象处理的中间结果。我们需要分配足够的空间来支持 SQL 语句，但又不希望过度分配永远不会使用的空间。


    Oracle 首先会尝试在内存中处理所有数据，但用于排序和哈希的内存量取决于 `PGA_AGGREGATE_TARGET` 参数，并由 `PGA_AGGREGATE_LIMIT`
    参数设置硬限制。中间结果的内存在多个会话之间共享，当操作无法在内存中容纳时，它们会通过临时表空间写入磁盘。


    对数据进行排序或哈希所需的空间量大致等于该数据的大小。如果我们必须在单个查询中处理大量数据（这在数仓中很常见），这些数据不可能全部装入内存。临时表空间的最小大小应等于将要同时被哈希或排序的最大对象的大小。


    预测有多少数据需要同时被哈希或排序可能很困难。我们可能需要通过试错来找到一个合适的值。试错是配置系统的一种痛苦方式，但 Oracle 提供了一些功能来帮助我们完成这项任务。


    首先，我们可以查看数据字典以检查当前和历史值。我们可以查看 `DBA_SEGMENTS.BYTES` 来了解将被排序和哈希的大对象。我们可以检查 `DBA_HIST_ACTIVE_SESS_HISTORY.TEMP_SPACE_ALLOCATED`
    列，了解先前 SQL 语句使用的临时表空间。我们还可以检查视图 `V$TEMPSEG_USAGE` 来了解当前使用情况。


    当我们开始运行大型工作负载时，可以启用可恢复会话。当空间用尽时，可恢复会话将被挂起，而不是立即抛出错误。当会话挂起时，我们可以快速增加空间，然后会话将自动继续处理。可恢复会话通过
    `RESUMABLE_TIMEOUT` 参数启用。我们可以使用数据字典视图 `DBA_RESUMABLE` 来监视挂起的会话。数据库管理员可以使用 Oracle
    Enterprise Manager 等程序设置警报，以便在会话挂起时接收电子邮件或短信。


    如果所有临时表空间都已满，则无法进行任何哈希或排序，这实际上会使数据库瘫痪。为避免此问题，我们可以创建多个临时表空间并将它们分配给不同的用户或应用程序。使用多个临时表空间，单个失控的查询就不会导致数据库上的所有服务中断。另一方面，我们划分临时表空间越细，闲置的存储空间就越多。


    很多时候，即使系统临时表空间已用完，我们也不希望添加更多空间。如果我们创建了一个无意的笛卡尔积，SQL 语句可能需要几乎无限的空间。如果我们在收到空间警报时盲目增加临时表空间，最终可能会浪费大量空间来支持一个永远无法完成的语句。实际上，我们的许多临时表空间都过大并浪费了大量空间。如果我们空间告急并感到绝望，可能需要考虑缩减临时表空间。


    再次强调，这本关于 SQL 开发的书正在讨论数据库管理。我们不需要成为空间管理专家，但我们需要能够帮助管理员提前规划，以保持我们的应用程序正常运行。并且我们需要知道如何应对紧急情况——管理员并不总是知道一个查询是故意很大还是仅仅是一个错误。


    ## Memory


    Oracle 的内存架构复杂且难以配置。虽然 DBA 主要负责内存配置，但开发人员至少需要对 Oracle 的内存架构有基本的了解，以便我们能够熟悉内存的权衡，并为我们的系统选择正确的策略。


    首要的内存相关决策之一是服务器架构。Oracle 默认使用专用服务器架构，其中每个连接都有一个单独的进程或线程及其自己的内存。Oracle 也提供共享服务器架构，其中一个操作系统进程或线程处理多个连接。专用服务器模式减少了进程和线程开销，而共享服务器模式减少了内存使用，两者之间需要权衡。一如既往，除非有充分的理由，否则我们应该坚持使用默认设置。例如，如果我们应用程序有数千个活动连接或因为未使用应用池而不断重新连接，我们应该考虑切换到共享服务器模式。（或者，有一个称为数据库驻留连接池的功能，允许
    Oracle 创建内部连接池。）


    Oracle 内存分为两大类：系统全局区（`SGA`）和程序全局区（`PGA`）。Oracle 只会使用我们为其配置的内存。我见过很多服务器拥有数百千兆字节的内存，但安装的数据库只配置为使用几千兆字节。即使系统配置不是我们的工作，我们可能偶尔也会检查像
    `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 这样的参数，以确保我们充分使用了资源。如果我们想快速评估增加内存是否会有帮助，我们应该查看视图
    `V$PGA_TARGET_ADVICE` 和 `V$SGA_TARGET_ADVICE`。


    `SGA` 包含在连接之间共享的内存组件。`SGA` 最大的部分是缓冲区缓存，它缓存表和索引块。


    `PGA` 包含每个会话私有的内存组件。`PGA` 主要包含用于排序、哈希和会话变量的空间。


    对于 OLTP 系统，其中包含许多不断从相同表和索引读取的小查询，`SGA` 最为重要，因为这些小对象可能都适合内存。对于数据仓库系统，其中包含对大量无法装入内存的数据进行排序的大查询，`PGA`
    最为重要。


    正确设置内存参数很棘手，但我们不应过分担心内存。我们都听说过内存访问比硬盘访问快 100,000 倍，但这个比率并不总是适用。首先，这个巨大的数字是针对随机访问的，但磁盘驱动器在顺序吞吐量方面更有竞争力。此外，我们不能在内存中完成`一切`。数据必须频繁写入磁盘，否则我们会失去持久性。借助
    Oracle 的异步 I/O，大部分写入可以批处理并在后台运行。当我们遇到性能问题时，不应盲目增加内存。'
  raw: '## Temporary Tablespace


    A temporary tablespace is used for storing intermediate results for sorting, hashing,
    and large object processing. We need to allocate enough space to support our SQL
    statements, but we don’t want to over-allocate space that will never be used.


    Oracle first tries to process everything in memory, but the amount of memory allowed
    for sorting and hashing depends on the parameter `PGA_AGGREGATE_TARGET`, with
    a hard limit set by the parameter `PGA_AGGREGATE_LIMIT`. The memory for intermediate
    results is shared among many sessions, and when operations cannot fit in memory,
    they are written to disk through the temporary tablespace.


    The amount of space required to sort or hash data is roughly equal to the size
    of that data. If we have to process large amounts of data in a single query, as
    is common in a data warehouse, there’s no way all that data will fit in memory.
    The minimum size of our temporary tablespace should be equal to the size of the
    largest objects that will be hashed or sorted at the same time.


    It can be difficult to predict how much data needs to be hashed or sorted at the
    same time. We might have to find a good value through trial and error. Trial and
    error is a painful way to configure a system, but Oracle provides features that
    can help us with this task.


    First, we can look at the data dictionary to check current and historical values.
    We can look at `DBA_SEGMENTS.BYTES` for large objects that will be sorted and
    hashed. We can check the column `DBA_HIST_ACTIVE_SESS_HISTORY.TEMP_SPACE_ALLOCATED`
    for the temporary tablespace used in previous SQL statements. And we can check
    the view `V$TEMPSEG_USAGE` for current usage.


    When we start running our large workloads, we can enable resumable sessions. A
    resumable session will become suspended when it runs out of space, instead of
    immediately throwing an error. When the session is suspended, we can quickly add
    space, and then the session will automatically continue processing. Resumable
    sessions are enabled with the parameter `RESUMABLE_TIMEOUT`. We can monitor for
    suspended sessions with the data dictionary view `DBA_RESUMABLE`. Database administrators
    can set up alerts, with a program like Oracle Enterprise Manager, to get an email
    or text when a session is suspended.


    If all the temporary tablespace is full, nothing can be hashed or sorted, which
    effectively breaks the database. To avoid that problem, we could create multiple
    temporary tablespaces and assign them to different users or applications. With
    multiple temporary tablespaces, a single runaway query won’t take down everything
    on the database. On the other hand, the more we divide the temporary tablespace,
    the more storage we will have sitting idle.


    There are many times when we do *not* want to add more space, even if the system
    has run out of temporary tablespace. If we create an unintentional cross join,
    the SQL statement may need a virtually infinite amount of space. If we blindly
    increase the temporary tablespace whenever we get space alerts, we may end up
    wasting a lot of space to support a statement that will never finish anyway. In
    practice, many of our temporary tablespaces are oversized and waste a lot of space.
    If we’re running out of space and getting desperate, we may want to look at shrinking
    our temporary tablespaces.


    Once again, this book about SQL development is discussing database administration.
    We don’t need to be experts in space administration, but we need to be able to
    help administrators plan ahead, to keep our applications working. And we need
    to know how to respond to emergencies – administrators will not always know if
    a query is intentionally large or just a mistake.


    ## Memory


    Oracle’s memory architecture is complex and difficult to configure. Although DBAs
    are primarily responsible for memory configuration, developers need at least a
    basic understanding of Oracle’s memory architecture, so we can become familiar
    with the memory trade-offs and choose the correct strategies for our systems.


    One of the first memory-related decisions is the server architecture. Oracle defaults
    to a dedicated server architecture, where each connection has a separate process
    or thread with its own memory. Oracle also offers a shared server architecture,
    where a single operating system process or thread handles multiple connections.
    There’s a trade-off between the reduced process and thread overhead of dedicated
    server mode and the reduced memory of the shared server mode. As always, we should
    stick with the default settings unless we have a good reason to change. For example,
    if our application has thousands of active connections or constantly reconnects
    because it doesn’t use an application pool, we should consider changing to shared
    server mode. (Alternatively, there is a feature called Database Resident Connection
    Pooling that allows Oracle to create an internal connection pool.)


    Oracle memory is divided into two main categories: System Global Area (SGA) and
    Program Global Area (PGA). Oracle will only use the memory we configure it to
    use. I’ve seen plenty of servers with hundreds of gigabytes of memory, yet the
    installed databases were only configured to use a few gigabytes. Even if system
    configuration is not our job, we may want to occasionally check parameters like
    `SGA_TARGET` and `PGA_AGGREGATE_TARGET` and ensure we are sufficiently using our
    resources. If we want a quick estimate about whether adding memory will help,
    we should look at the views `V$PGA_TARGET_ADVICE` and `V$SGA_TARGET_ADVICE`.


    The SGA contains memory components that are shared between connections. The largest
    part of the SGA is the buffer cache, which caches table and index blocks.


    The PGA contains memory components that are private to each session. The PGA mostly
    contains space for sorting, hashing, and session variables.


    For an OLTP system, with many small queries that constantly read from the same
    tables and indexes, the SGA is most important because those small objects may
    all fit in memory. For a data warehouse system, with large queries that sort huge
    amounts of data that won’t fit in memory anyway, the PGA is most important.


    Getting the memory settings correct is tricky, but we shouldn’t worry *too* much
    about memory. We’ve all heard that memory access is 100,000 times faster than
    hard drive access, but that ratio is not always applicable. First of all, that
    large number is for random access, but disk drives are much more competitive for
    sequential throughput. Also, we can’t do *everything* in memory anyway. Data must
    be frequently written to disk, or we lose durability. And with Oracle’s asynchronous
    I/O, much of that writing can be batched and run in the background. We should
    not blindly add memory when we run into performance problems.'
  trans: '## 临时表空间


    临时表空间用于存储排序、哈希和大对象处理的中间结果。我们需要分配足够的空间来支持 SQL 语句，但又不希望过度分配永远不会使用的空间。


    Oracle 首先会尝试在内存中处理所有数据，但用于排序和哈希的内存量取决于 `PGA_AGGREGATE_TARGET` 参数，并由 `PGA_AGGREGATE_LIMIT`
    参数设置硬限制。中间结果的内存在多个会话之间共享，当操作无法在内存中容纳时，它们会通过临时表空间写入磁盘。


    对数据进行排序或哈希所需的空间量大致等于该数据的大小。如果我们必须在单个查询中处理大量数据（这在数仓中很常见），这些数据不可能全部装入内存。临时表空间的最小大小应等于将要同时被哈希或排序的最大对象的大小。


    预测有多少数据需要同时被哈希或排序可能很困难。我们可能需要通过试错来找到一个合适的值。试错是配置系统的一种痛苦方式，但 Oracle 提供了一些功能来帮助我们完成这项任务。


    首先，我们可以查看数据字典以检查当前和历史值。我们可以查看 `DBA_SEGMENTS.BYTES` 来了解将被排序和哈希的大对象。我们可以检查 `DBA_HIST_ACTIVE_SESS_HISTORY.TEMP_SPACE_ALLOCATED`
    列，了解先前 SQL 语句使用的临时表空间。我们还可以检查视图 `V$TEMPSEG_USAGE` 来了解当前使用情况。


    当我们开始运行大型工作负载时，可以启用可恢复会话。当空间用尽时，可恢复会话将被挂起，而不是立即抛出错误。当会话挂起时，我们可以快速增加空间，然后会话将自动继续处理。可恢复会话通过
    `RESUMABLE_TIMEOUT` 参数启用。我们可以使用数据字典视图 `DBA_RESUMABLE` 来监视挂起的会话。数据库管理员可以使用 Oracle
    Enterprise Manager 等程序设置警报，以便在会话挂起时接收电子邮件或短信。


    如果所有临时表空间都已满，则无法进行任何哈希或排序，这实际上会使数据库瘫痪。为避免此问题，我们可以创建多个临时表空间并将它们分配给不同的用户或应用程序。使用多个临时表空间，单个失控的查询就不会导致数据库上的所有服务中断。另一方面，我们划分临时表空间越细，闲置的存储空间就越多。


    很多时候，即使系统临时表空间已用完，我们也不希望添加更多空间。如果我们创建了一个无意的笛卡尔积，SQL 语句可能需要几乎无限的空间。如果我们在收到空间警报时盲目增加临时表空间，最终可能会浪费大量空间来支持一个永远无法完成的语句。实际上，我们的许多临时表空间都过大并浪费了大量空间。如果我们空间告急并感到绝望，可能需要考虑缩减临时表空间。


    再次强调，这本关于 SQL 开发的书正在讨论数据库管理。我们不需要成为空间管理专家，但我们需要能够帮助管理员提前规划，以保持我们的应用程序正常运行。并且我们需要知道如何应对紧急情况——管理员并不总是知道一个查询是故意很大还是仅仅是一个错误。


    ## 内存


    Oracle 的内存架构复杂且难以配置。虽然 DBA 主要负责内存配置，但开发人员至少需要对 Oracle 的内存架构有基本的了解，以便我们能够熟悉内存的权衡，并为我们的系统选择正确的策略。


    首要的内存相关决策之一是服务器架构。Oracle 默认使用专用服务器架构，其中每个连接都有一个单独的进程或线程及其自己的内存。Oracle 也提供共享服务器架构，其中一个操作系统进程或线程处理多个连接。专用服务器模式减少了进程和线程开销，而共享服务器模式减少了内存使用，两者之间需要权衡。一如既往，除非有充分的理由，否则我们应该坚持使用默认设置。例如，如果我们应用程序有数千个活动连接或因为未使用应用池而不断重新连接，我们应该考虑切换到共享服务器模式。（或者，有一个称为数据库驻留连接池的功能，允许
    Oracle 创建内部连接池。）


    Oracle 内存分为两大类：系统全局区（`SGA`）和程序全局区（`PGA`）。Oracle 只会使用我们为其配置的内存。我见过很多服务器拥有数百千兆字节的内存，但安装的数据库只配置为使用几千兆字节。即使系统配置不是我们的工作，我们可能偶尔也会检查像
    `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 这样的参数，以确保我们充分使用了资源。如果我们想快速评估增加内存是否会有帮助，我们应该查看视图
    `V$PGA_TARGET_ADVICE` 和 `V$SGA_TARGET_ADVICE`。


    `SGA` 包含在连接之间共享的内存组件。`SGA` 最大的部分是缓冲区缓存，它缓存表和索引块。


    `PGA` 包含每个会话私有的内存组件。`PGA` 主要包含用于排序、哈希和会话变量的空间。


    对于 OLTP 系统，其中包含许多不断从相同表和索引读取的小查询，`SGA` 最为重要，因为这些小对象可能都适合内存。对于数据仓库系统，其中包含对大量无法装入内存的数据进行排序的大查询，`PGA`
    最为重要。


    正确设置内存参数很棘手，但我们不应过分担心内存。我们都听说过内存访问比硬盘访问快 100,000 倍，但这个比率并不总是适用。首先，这个巨大的数字是针对随机访问的，但磁盘驱动器在顺序吞吐量方面更有竞争力。此外，我们不能在内存中完成`一切`。数据必须频繁写入磁盘，否则我们会失去持久性。借助
    Oracle 的异步 I/O，大部分写入可以批处理并在后台运行。当我们遇到性能问题时，不应盲目增加内存。'
- fmt: "## Caches\n\nOracle has many ways to use high-speed memory structures to cache\
    \ data and results. Before we buy a separate, expensive caching solution, we should\
    \ make sure we’re taking advantage of the Oracle features we’re already paying\
    \ for. The previous section described the high-level memory system. This section\
    \ describes more granular caching options. The following is a list of the different\
    \ types of caches in Oracle:\n\n1.  `Buffer cache (SGA)`: The largest and most\
    \ important cache. It stores blocks of tables, indexes, and other objects. The\
    \ buffer cache does not store the actual results of queries, which are frequently\
    \ different and become invalidated. By storing blocks, the SGA caches data that\
    \ can be used many times by many different queries. Data is aged out based on\
    \ a least recently used algorithm. We can calculate the effectiveness of our cache\
    \ with the buffer cache hit ratio, which tells us what percentage of blocks are\
    \ read from memory instead of disk. (But do not obsess over this ratio, because\
    \ there are some operations that can never be done in memory.)\n\n    ```\n  \
    \  --Buffer cache hit ratio.\n    select 1 - (physical_reads / (consistent_gets\
    \ + db_block_gets)) ratio\n    from (select name, value from v$sysstat)\n    pivot\n\
    \    (\n    sum(value)\n    for (name) in\n    (\n    'physical reads cache' physical_reads,\n\
    \    'consistent gets from cache' consistent_gets,\n    'db block gets from cache'\
    \ db_block_gets\n    )\n    );\n    RATIO\n    -----------------\n    0.982515222127574\n\
    \    ```\n\n2.  `Shared pool (SGA)`: Multiple caches that contain parsed SQL queries,\
    \ stored procedures, data dictionary, etc. This cache is important, but unlike\
    \ the buffer cache, we rarely need to adjust it. The most common task for the\
    \ shared pool is to flush it with the command `ALTER SYSTEM FLUSH SHARED_POOL`,\
    \ to force Oracle to regenerate execution plans.\n\n3.  `Session memory (PGA)`:\
    \ Contains session and program data, such as package variables. With package variables,\
    \ especially collections, we can build our own caches if necessary.\n\n4.  `Client\
    \ result cache`: Caches statement results instead of only the data blocks. A cached\
    \ statement is much faster than processing cached blocks. On the other hand, caching\
    \ statements only helps if the exact same statement is executed multiple times\
    \ and if none of the underlying objects have been modified. This feature requires\
    \ configuring the server, client, and statement or table.\n\n5.  `In-memory option\
    \ (SGA)`: An extra-cost option to cache data in a special columnar format. This\
    \ option can significantly improve performance of some types of analytic queries,\
    \ but it requires extra memory and configuration. Since 19c, this option is free\
    \ for the first 16 GB.\n\n6.  `SQL result cache (SGA)`: Caches the results of\
    \ a specific SQL query. This cache must be manually enabled with a `/*+ RESULT_CACHE\
    \ */` hint.\n\n7.  `PL/SQL function result cache (SGA)`: Caches the results of\
    \ a function. This cache also must be manually enabled, by adding the keyword\
    \ `RESULT_CACHE` to function definitions.\n\n8.  `Scalar subquery caching (PGA)`:\
    \ Scalar subqueries may be automatically cached, dramatically improving query\
    \ performance. For example, `SELECT (SELECT COUNT(*) FROM LARGE_TABLE) FROM ANOTHER_LARGE_TABLE`\
    \ is a poorly written query, but it may run much faster than we’d expect.\n\n\
    Whenever we find Oracle repeating the same, slow task, we should look for a cache\
    \ to reduce the run time.\n\n## Multitenant\n\nOracle’s multitenant architecture\
    \ lets us have multiple pluggable databases inside a single container database.\
    \ Multitenant is another database administration subject that at first appears\
    \ to be irrelevant to developers. But understanding this architecture can help\
    \ us take advantage of powerful features or at least avoid common pitfalls.\n\n\
    The multitenant architecture can efficiently handle many database instances on\
    \ a single machine. With the traditional architecture on a shared database server,\
    \ each database instance requires a large amount of administration time and hardware\
    \ resources, which is why DBAs are hesitant to create many instances for developers.\
    \ The multitenant option changes that equation by making it easy to perform tasks\
    \ such as creating, dropping, cloning, or relocating a database. Multitenant may\
    \ give us an opportunity to use shared servers but still provision multiple instances\
    \ per developer.\n\nUnfortunately, unless we buy the multitenant option, we are\
    \ limited to three pluggable databases per container. That’s enough databases\
    \ to play around with new features, but not enough to radically alter our development\
    \ process. Licensing may be the main reason most organizations do not yet even\
    \ install the multitenant architecture. But since the multitenant architecture\
    \ is mandatory starting with 21c, we will eventually need to learn it.\n\nFor\
    \ developers, the biggest problems with multitenant systems happen at the very\
    \ beginning, when we try to connect to the database. Developers should almost\
    \ always connect to a pluggable database (PDB), not a container database (CDB).\
    \ Unfortunately, it’s easy to mistakenly connect to a CDB, since most Oracle documentation\
    \ is written for DBAs who *do* need to connect to a CDB. And if we’re using the\
    \ multitenant architecture, the default database name “ORCL” now refers to the\
    \ CDB instead of a PDB.\n\nDevelopers should have connection strings that connect\
    \ directly to the PDB. We do not want to connect to the CDB and then run a command\
    \ like `ALTER SESSION SET CONTAINER = ORCLPDB`. Constantly juggling two databases,\
    \ when we only care about one of them, causes confusion and errors.\n\nIf we accidentally\
    \ run a user creation script on the CDB instead of a PDB, we may get the error\
    \ “ORA-65096: invalid common user or role name in oracle.” That error message\
    \ is potentially misleading because Oracle does allow us to create common users\
    \ – a user that exists on all PDBs. But that is a rare feature, and it has some\
    \ weird requirements like prefixing the username with `C##`. Many developers foolishly\
    \ avoid that error by setting the undocumented parameter `_ORACLE_SCRIPT`. That\
    \ workaround allows the script to run, but it creates the user the wrong way and\
    \ will cause weird problems later. The real solution is to install the application\
    \ in a PDB instead of the CDB.\n\nIf we’re installing a personal database or if\
    \ we’re installing a shared database without buying the multitenant option, we\
    \ may want to choose the traditional architecture over the multitenant architecture."
