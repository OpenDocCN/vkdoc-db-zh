- fmt: '## Sequences


    Sequences generate unique numbers, typically for surrogate primary keys. Sequences
    are another object that’s simple to create but has a few unexpected behaviors.


    A common request for sequences is to generate a sequence without gaps. Gapless
    sequences are not possible, so don’t bother trying. Sequences are built for scalability,
    whereas creating a gapless sequence of numbers would require serializing transactions.
    If the user Alice increments a sequence as part of a transaction and then Bob
    increments the same sequence for another transaction, what happens if Alice executes
    a rollback? There are two ways to handle that situation: either Alice’s sequence
    number is given up and creates a gap, or Bob’s transaction cannot start until
    Alice is done. Oracle has chosen the first option, enabling sequences to scale
    for large multiuser environments. If we really need a gapless sequence (and chances
    are good we don’t – we just think removing gaps would look nicer), we’ll need
    to create our own custom serialization process that ensures only one user gets
    a number at a time.


    We should avoid dropping and recreating sequences, other than in our initial build
    scripts. For basic sequence maintenance, we should use `ALTER SEQUENCE` commands
    when possible. Recreating sequences is not trivial, mostly because sequences may
    be granted to roles and users.


    The most common sequence maintenance is resetting the sequence to a new value.
    Applications or ad hoc SQL statements may forget to use the sequence to insert
    a value, which means the sequence may eventually generate the same value and cause
    unique constraint violations. The simplest way to reset a sequence, since version
    12.1, is this command:


    ```

    --Create and alter a sequence.

    create sequence some_sequence;

    alter sequence some_sequence restart start with 1;

    ```


    Resetting sequences in 11g is more painful: change the sequence interval to a
    large value, call the sequence, and then change the interval back to 1. Or perhaps
    we can simply call `SOME_SEQUENCE.NEXTVAL` repeatedly.


    Calling the sequence many times is much slower than altering the sequence but
    has the advantage of avoiding any DDL commands. This approach can be useful in
    a production environment when we might need to fill out lots of paperwork to run
    a “change,” but simply selecting from a sequence does not count as a change.


    Sequences don’t have to start with 1 and increment by 1; sequences have several
    other options. Sequences can `START WITH` any number, and they can `INCREMENT
    BY` any number, even a negative number to make the sequence decrease. Sequences
    can `CYCLE` back to the `MINVALUE` after the `MAXVALUE` is reached.


    The sequence default values are usually good enough. The most common option that
    SQL developers change is the `CACHE` value, which determines how many sequences
    are pre-generated and stored in memory until they are used. The default value
    of 20 is usually fine. Similar to bulk collect, prefetch, and other batch size
    options, there is little benefit to setting large values. Batch sizes are discussed
    in more detail in Chapter 16.


    For extreme concurrent insert performance, we may need to use the scalable sequence
    feature introduced in 18c. Sequences typically increment linearly and are typically
    used for primary key generation. Since indexes are stored in order, new values
    will tend to be written to the same block on disk. Accessing the same blocks is
    sometimes a good thing, because it means the data will be cached in memory. But
    frequently writing to the same block causes contention, especially in a clustered
    environment where multiple processes across multiple servers need to coordinate
    changes. We need a sequence to create a unique value, but sometimes we don''t
    want all the new values to be stored in the same block.


    The traditional solution to primary key index contention is to create the index
    with the keyword `REVERSE` to store the values in reverse order. While index values
    like 123 and 124 will likely be stored together, reversed values like 321 and
    421 will likely be stored separately. Reverse key indexes solve contention problems,
    but writing every value to an almost random location causes other performance
    issues. In practice, reverse key indexes rarely solve a performance problem.


    Scalable sequences solve the contention problem a better way, by prefixing the
    instance and session id to the sequence number. Each session will tend to write
    index values to the same blocks, minimizing the number of blocks that are accessed.
    And since a session cannot have contention with itself, and each session has a
    significantly different value, there is no inter-session contention either. The
    only downside is the ridiculously large sequence value, which isn''t really much
    of a problem, but the values look suspicious at first:


    ```

    --Create a scalable sequence and show the first value.

    create sequence scalable_sequence_test scale;

    select to_char(scalable_sequence_test.nextval) nextval from dual;

    ```


    ## Synonyms


    Synonyms are useful for creating aliases for schema objects. A layer of synonyms
    can hide ugly environmental differences that we don’t want users or developers
    to worry about.


    For example, the data set in this book can be installed on any schema. The data
    set installation instructions include steps for creating a user named `SPACE`.
    Imagine we’re building an application on top of our data set, but the name `SPACE`
    is already taken on one database. The schema name will be different across environments.
    Our application could hide that difference with a synonym:


    ```

    --Create synonym example.

    create synonym launch for space.launch;

    ```


    Another use for synonyms is to minimize downtime during large data loads. We can
    have two tables, or two materialized views, with a synonym pointing to one of
    them. When new data arrives, we load the data into the unused table. When the
    loading is complete, we `CREATE OR REPLACE SYNONYM` to switch the synonym to point
    to the new data. That approach is not as robust as online table redefinition,
    but it’s simpler.


    Similar to views, we should minimize our layers of indirection and avoid creating
    synonyms that refer to synonyms. We should also avoid creating `PUBLIC` synonyms.
    Public synonyms don’t grant access to all users, but public synonyms do pollute
    the namespace.


    ## Materialized Views


    A materialized view stores the results of a query. Materialized views are mainly
    intended to improve the performance of data warehouses but can also enforce multi-table
    constraints. This section only briefly discusses materialized view topics; for
    more detailed information, there are several hundred pages about materialized
    views in the *Data Warehousing Guide*.


    Materialized views share all the properties of tables, along with a query and
    directions for how to rebuild the materialized view. Materialized views can have
    indexes and can be built off of other materialized views. Refreshing materialized
    views can be done on demand, as part of a schedule, or automatically after a relevant
    statement or commit. The refresh can either be `COMPLETE`, where the entire table
    is rebuilt, or `FAST`, where only the necessary parts of the table are rebuilt.
    The package `DBMS_MVIEW` can help with refreshing a set of materialized views.
    The `DBMS_MVIEW.REFRESH` procedure has many options for refreshing, such as degree
    of parallelism, atomic (refresh all materialized views in one transaction), out
    of place (build a separate table and then swap out the old data), etc.


    Materialized views are complex and should only be used after we have exhausted
    all other query tuning options. Materialized views can solve difficult performance
    problems, but at the cost of extra complexity, extra space, and extra time spent
    refreshing.'
