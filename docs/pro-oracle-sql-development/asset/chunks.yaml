- fmt: "## ANTLR\n\nANTLR是一个开源的解析器生成器，可以理解和修改几乎任何编程语言。ANTLR自带了预构建的PL/SQL词法分析器和解析器，可用于将SQL和PL/SQL分解为解析树。这些解析树类似于语言参考中的铁路图。\n\
    \n经过大量的下载、配置和编译后，我们可以使用如下命令生成解析树：\n\n```bash\nC:\\ >grun PlSql sql_script -gui\n\
    BEGIN\nNULL;\nEND;\n/\n^Z\n```\n\n前面的代码将打开一个图形用户界面，其中显示的解析树如图20-1所示。\n\n![](images/471418_2_En_20_Chapter/471418_2_En_20_Fig1_HTML.jpg)\n\
    \nSQL脚本被划分为三个子部分。单元语句进一步链接到匿名块，并且它有四个进一步的划分。这个链以`NULL`结束。\n\n**图20-1**\n*一个简单PL/SQL程序的ANTLR解析树*\n\
    \nANTLR是用于Oracle SQL和PL/SQL最强大的解析工具。但这个程序存在许多问题；代码是Java编写的，可能无法在我们的数据库中运行，PL/SQL语法不完整，而且生成解析树只是真正工作的开始。\n\
    \n## DBMS_SQL\n\n`DBMS_SQL`是运行动态SQL的原始方法。`DBMS_SQL`远不如`EXECUTE IMMEDIATE`方便，速度也不够快，但它有几个优点。只有`DBMS_SQL`可以跨数据库链接执行SQL、解析^([^(49)](#fn49))\
    \ SQL并检索列元数据，以及返回或绑定未知数量的项。\n\n例如，以下代码解析SQL语句，查找列类型和名称，运行语句并检索结果：\n\n```sql\n\
    --Example of dynamically retrieving data and metadata.\ndeclare\n  v_cursor integer;\n\
    \  v_result integer;\n  v_value  varchar2(4000);\n  v_count  number;\n  v_cols\
    \   dbms_sql.desc_tab4;\nbegin\n  --Parse the SQL and get some metadata.\n  v_cursor\
    \ := dbms_sql.open_cursor;\n  dbms_sql.parse(v_cursor, 'select * from dual',\n\
    \                 dbms_sql.native);\n  dbms_sql.describe_columns3(v_cursor, v_count,\
    \ v_cols);\n  dbms_sql.define_column(v_cursor, 1, v_value, 4000);\n  --Execute\
    \ and get data.\n  v_result := dbms_sql.execute_and_fetch(v_cursor);\n  dbms_sql.column_value(v_cursor,\
    \ 1, v_value);\n  --Close cursor.\n  dbms_sql.close_cursor(v_cursor);\n  --Display\
    \ metadata and data.\n  dbms_output.put_line('Type: '||\n    case v_cols(1).col_type\n\
    \      when dbms_types.typecode_varchar then 'VARCHAR'\n      --Add more types\
    \ here (this is painful)...\n    end\n  );\n  dbms_output.put_line('Name: '||v_cols(1).col_name);\n\
    \  dbms_output.put_line('Value: '||v_value);\nend;\n/\nType: VARCHAR\nName: DUMMY\n\
    Value: X\n```\n\n前面的语法很棘手，我们为`DBMS_SQL`编写代码时可能需要查阅手册。这个包还有一些意外行为。`PARSE`函数会自动运行DDL命令，因此即使是描述语句我们也需要小心。尽管存在这些问题，`DBMS_SQL`仍然是一个用于以编程方式检查、构建和运行SQL语句的强大工具。\n\
    \n## DBMS_XMLGEN\n\n`DBMS_XMLGEN.GETXML`是一个有用的函数，它将查询结果转换为XML类型。以下是该函数的简单示例：\n\
    \n```sql\n--Convert query to XML.\nselect dbms_xmlgen.getxml('select * from dual')\
    \ result\nfrom dual;\n\nX\n```\n\n`GETXML`可能原本只是为了将关系数据转换为XML，以便在另一个系统中进行存储或处理。但请注意，查询是作为字符串传递的，这意味着查询在编译时不会被检查。这个小小的设计选择让我们可以用这个函数做一些非常有趣的事情。\n\
    \n借助`GETXML`，我们可以基于另一个查询动态生成和运行查询。通过仔细的代码生成和XML解析，我们可以查询可能不存在的表，从未知的表集合中返回值等。最重要的是，我们可以在SQL中完全动态地运行SQL，而无需创建任何PL/SQL对象。\n\
    \n例如，以下查询统计`SPACE`模式中所有名称类似`LAUNCH*`的表：\n\n```sql\n--Number of rows in all LAUNCH*\
    \ tables in SPACE schema.\n--\n--Convert XML to columns.\nselect\n  table_name,\n\
    \  to_number(extractvalue(xml, '/ROWSET/ROW/COUNT')) count\nfrom\n(\n  --Get results\
    \ as XML.\n  select table_name,\n         xmltype(dbms_xmlgen.getxml(\n      \
    \     'select count(*) count from '||table_name\n         )) xml\n  from all_tables\n\
    \  where owner = sys_context('userenv', 'current_schema')\n    and table_name\
    \ like 'LAUNCH%'\n)\norder by table_name;\nTABLE_NAME           COUNT\n------------------\
    \   -----\nLAUNCH               70535\nLAUNCH_AGENCY        71884\nLAUNCH_PAYLOAD_ORG\
    \   21214\n...\n```\n\n使用XML很棘手，因为我们必须解析结果，而且仍然需要事先了解输出列的某些信息。不幸的是，查询字符串可以被构造但不能使用绑定变量。而且Oracle的XML处理也不如其关系引擎健壮。SQL查询可以轻松处理数百万行，但在处理XML时我们需要更加小心，否则处理中等规模的数据集时就会遇到性能问题。\n\
    \n## PL/SQL公共表表达式\n\n我们也可以在SQL中使用PL/SQL公共表表达式来运行动态SQL。我们可以在SQL语句中定义一个函数，并在该函数中调用`EXECUTE\
    \ IMMEDIATE`。我们需要使用PL/SQL，但不必创建和管理任何永久的PL/SQL对象。\n\n例如，以下查询返回与上一个查询相同的结果：\n\n\
    ```sql\n--Number of rows in all LAUNCH* tables in the current schema.\nwith function\
    \ get_rows(p_table varchar2) return varchar2 is\n  v_number number;\nbegin\n \
    \ execute immediate 'select count(*) from '||\n    dbms_assert.sql_object_name(p_table)\
    \   into v_number;\n  return v_number;\nend;\nselect table_name, get_rows(table_name)\
    \ count\nfrom all_tables\nwhere owner = sys_context('userenv', 'current_schema')\n\
    \  and table_name like 'LAUNCH%'\norder by table_name;\n/\n```\n\n前面的查询比`DBMS_XMLGEN.GETXML`技术更健壮，但PL/SQL公共表表达式并非在所有上下文中都有效。这两种技术仍然要求了解结果集的结构。"
  raw: '### ANTLR


    ANTLR is an open source parser generator that can understand and modify almost
    any programming language. ANTLR comes with a pre-built PL/SQL lexer and parser
    that can be used to break SQL and PL/SQL into parse trees. These parse trees are
    similar to the railroad diagrams in the language references.


    After a lot of downloading, configuring, and compiling, we can generate parse
    trees with a command like this:


    ```

    C:\ >grun PlSql sql_script -gui

    BEGIN

    NULL;

    END;

    /

    ^Z

    ```


    The preceding code will open a GUI with the parse tree shown in Figure [20-1](#471418_2_En_20_Chapter.xhtml#Fig1).


    ![](images/471418_2_En_20_Chapter/471418_2_En_20_Fig1_HTML.jpg)


    S q l script is divided into three subparts. The unit statement is further linked
    to the anonymous block and it has four further divisions. And this chain ends
    with Null.


    Figure 20-1


    *ANTLR* *parse tree for a simple PL/SQL program*


    ANTLR is the most powerful parsing tool for Oracle SQL and PL/SQL. But there are
    many issues with the program; the code is in Java, which may not work in our database,
    the PL/SQL grammar is not complete, and generating the parse tree is only the
    beginning of the real work.


    ## DBMS_SQL


    `DBMS_SQL` is the original way to run dynamic SQL. `DBMS_SQL` is much less convenient
    than `EXECUTE IMMEDIATE` and not as fast, but it has several advantages. Only
    `DBMS_SQL` can execute SQL over a database link, parse^([^(49)](#fn49)) the SQL
    and retrieve column metadata, and return or bind an unknown number of items.


    For example, the following code parses a SQL statement, finds the column type
    and name, runs the statement, and retrieves the results:


    ```

    --Example of dynamically retrieving data and metadata.

    declare

    v_cursor integer;

    v_result integer;

    v_value  varchar2(4000);

    v_count  number;

    v_cols   dbms_sql.desc_tab4;

    begin

    --Parse the SQL and get some metadata.

    v_cursor := dbms_sql.open_cursor;

    dbms_sql.parse(v_cursor, ''select * from dual'',

    dbms_sql.native);

    dbms_sql.describe_columns3(v_cursor, v_count, v_cols);

    dbms_sql.define_column(v_cursor, 1, v_value, 4000);

    --Execute and get data.

    v_result := dbms_sql.execute_and_fetch(v_cursor);

    dbms_sql.column_value(v_cursor, 1, v_value);

    --Close cursor.

    dbms_sql.close_cursor(v_cursor);

    --Display metadata and data.

    dbms_output.put_line(''Type: ''||

    case v_cols(1).col_type

    when dbms_types.typecode_varchar then ''VARCHAR''

    --Add more types here (this is painful)...

    end

    );

    dbms_output.put_line(''Name: ''||v_cols(1).col_name);

    dbms_output.put_line(''Value: ''||v_value);

    end;

    /

    Type: VARCHAR

    Name: DUMMY

    Value: X

    ```


    The preceding syntax is tricky, and we’ll probably need to look at the manual
    whenever we write code for `DBMS_SQL`. The package also has some unexpected behavior.
    The `PARSE` function automatically runs DDL commands, so we need to be careful
    even describing statements. Despite these problems, `DBMS_SQL` is still a great
    tool to programmatically inspect, build, and run SQL statements.


    ## DBMS_XMLGEN


    `DBMS_XMLGEN.GETXML` is a useful function that converts the results of a query
    into an XML type. The following is a simple example of the function:


    ```

    --Convert query to XML.

    select dbms_xmlgen.getxml(''select * from dual'') result

    from dual;


    X


    ```


    `GETXML` was probably only intended to convert relational data into XML for storage
    or processing in another system. But notice how the query is passed as a string,
    which means the query is not checked at compile time. That minor design choice
    lets us do some surprisingly interesting things with this function.


    With `GETXML`, we can dynamically generate and run the query based on another
    query. With careful code generation and XML parsing, we can query tables that
    may not exist, return values from an unknown set of tables, etc. Most importantly,
    we can run dynamic SQL entirely in SQL. There is no need to create any PL/SQL
    objects.


    For example, the following query counts all tables in the `SPACE` schema that
    have a name like `LAUNCH*`:


    ```

    --Number of rows in all LAUNCH* tables in SPACE schema.

    --

    --Convert XML to columns.

    select

    table_name,

    to_number(extractvalue(xml, ''/ROWSET/ROW/COUNT'')) count

    from

    (

    --Get results as XML.

    select table_name,

    xmltype(dbms_xmlgen.getxml(

    ''select count(*) count from ''||table_name

    )) xml

    from all_tables

    where owner = sys_context(''userenv'', ''current_schema'')

    and table_name like ''LAUNCH%''

    )

    order by table_name;

    TABLE_NAME           COUNT

    ------------------   -----

    LAUNCH               70535

    LAUNCH_AGENCY        71884

    LAUNCH_PAYLOAD_ORG   21214

    ...

    ```


    Using XML is tricky because we have to parse the results, and we still need to
    know something about the output columns ahead of time. Unfortunately, the query
    string can be constructed but cannot use a bind variable. And Oracle’s XML processing
    also isn’t as robust as its relational engine. SQL queries can easily handle millions
    of rows, but when processing XML we need to be more careful, or we will run into
    performance problems with medium-sized data sets.


    ## PL/SQL Common Table Expressions


    We can also run dynamic SQL inside SQL using PL/SQL common table expressions.
    We can define a function in a SQL statement and call `EXECUTE IMMEDIATE` in that
    function. We need to use PL/SQL, but we don’t have to create and manage any permanent
    PL/SQL objects.


    For example, the following query returns the same results as the last query:


    ```

    --Number of rows in all LAUNCH* tables in the current schema.

    with function get_rows(p_table varchar2) return varchar2 is

    v_number number;

    begin

    execute immediate ''select count(*) from ''||

    dbms_assert.sql_object_name(p_table)   into v_number;

    return v_number;

    end;

    select table_name, get_rows(table_name) count

    from all_tables

    where owner = sys_context(''userenv'', ''current_schema'')

    and table_name like ''LAUNCH%''

    order by table_name;

    /

    ```


    The preceding query is more robust than the `DBMS_XMLGEN.GETXML` technique, but
    PL/SQL common table expressions do not work in every context. And both techniques
    still require knowledge about the shape of the result set.'
