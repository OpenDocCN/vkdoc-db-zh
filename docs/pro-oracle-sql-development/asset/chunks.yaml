    是活动的，而 `HASH JOIN` 被停用了。2050 年还没有任何行数据，因此 `NESTED LOOPS` 操作是理想的：


    ```

    -----------------------------------------...-

    |   Id  | Operation                     |...|

    -----------------------------------------...-

    |     0 | SELECT STATEMENT              |...|

    |- *  1 |  HASH JOIN                    |...|

    |     2 |   NESTED LOOPS                |...|

    |     3 |    NESTED LOOPS               |...|

    |-    4 |     STATISTICS COLLECTOR      |...|

    |  *  5 |      TABLE ACCESS FULL        |...|

