  trans: '

    ### 自动数据库诊断监视器（ADDM）


    自动数据库诊断监视器（ADDM）通过分析 AWR 数据帮助发现数据库性能问题。在发现一个问题后，ADDM 通常会建议使用其中一种自动指导工具来找到具体的解决方案。这些流程可以被设置为自动发现并修复性能问题。


    实际上，ADDM 和这些指导工具并不总是那么有用。它们只擅长发现那些我们自己也能找到和解决的简单问题。不过，在未来版本的数据库或未来自治数据库环境中，自动调优系统应当会有所改进。


    使用 ADDM 有多种方式。以下示例为我们之前查看的相同快照创建了一份 ADDM 报告：


    ```

    --生成 ADDM 任务。

    Declare

    v_task_name varchar2(100) := ''Test Task'';

    begin

    dbms_addm.analyze_db

    (

    task_name      => v_task_name,

    begin_snapshot => 6709,

    end_snapshot   => 6710

    );

    end;

    /

    ```


    我们可以通过再次调用 `DBMS_ADDM` 来查看报告。报告可能会生成大量的建议，但在报告的某个地方，应该会提到我们针对 `SATELLITE` 表的查询。（但我不能保证在你的系统上会有什么建议。那个长时间运行的
    PL/SQL 块被设置为运行大约 10 分钟，因为这通常足以触发一条建议，但建议的阈值并未公开文档化。）


    ```

    --查看 ADDM 报告。

    select dbms_addm.get_report(task_name => ''Test Task'') from dual;

    ...

    建议 1: SQL 优化

    估计的收益是每秒 0.39 个活动会话，占总活动的 96.77%。


    操作

    针对 SQL_ID 为 "5115f2tc6809t" 的 SELECT 语句运行 SQL 优化指导。

    相关对象

    SQL ID 为 5115f2tc6809t 的 SQL 语句。

    SELECT COUNT(*) FROM SATELLITE WHERE ORBIT_CLASS = ''Polar''

    依据

    ...

    ```


    ADDM 实际上还没有 `优化` 任何东西，但前面的报告已经提供了有用的信息。请注意报告中的依据，不要盲目实施每一条建议。注意前面的输出包含了活动会话数。这个数字告诉我们通过优化这个查询可能节省多少数据库活动。如果活动会话的收益太低，那就不值得进一步调查。


    前面的 ADDM 输出还包括了 SQL 语句和 `SQL_ID`。建议的操作是通过 SQL 优化指导运行该 SQL 语句，而我们需要这个 `SQL_ID`
    来执行此操作。


    ### 指导工具


    Oracle 提供了多种方式向我们提供建议。包括 SQL 优化指导、SQL 访问指导、优化器统计信息指导，以及视图 `V$SGA_TARGET_ADVICE`
    和 `V$PGA_TARGET_ADVICE`。SQL 优化指导可以检查 SQL 语句的执行情况，并提供如何使其运行更快的思路。


    例如，我们可以使用之前在 AWR 和 ADDM 报告中找到的 `SQL_ID`。首先，我们必须创建一个调优任务，执行该调优任务，并保存任务名称以备后用：


    ```

    --创建并执行 SQL 优化指导任务

    declare

    v_task varchar2(64);

    begin

    v_task := dbms_sqltune.create_tuning_task(

    sql_id => ''5115f2tc6809t'');

    dbms_sqltune.execute_tuning_task(task_name => v_task);

    dbms_output.put_line(''Task name: ''||v_task);

    end;

    /

    Task name: TASK_18972

    ```


    我们可以通过获取前面的任务名称并将其插入以下 SQL 语句来查看报告：


    ```

    --查看调优任务报告。

    select dbms_sqltune.report_tuning_task(''TASK_18972'') from dual;

    ...

    1- 索引发现（参见下面的执行计划部分）


    此语句的执行计划可以通过创建一个或多个索引来得到改进。

    建议（估计收益：96.64%）


    - 考虑运行访问指导以改进物理模式设计，或创建推荐的索引。

    create index SPACE.IDX$$_4A1C0001 on SPACE.SATELLITE("ORBIT_CLASS");

    依据


    ...

    ```


    前面报告中的建议看起来是正确的；在 `ORBIT_CLASS` 列上创建索引几乎肯定会对我们刚刚运行了数千次的查询有帮助。完整报告还包括元数据、建议背后的依据，以及如果接受该建议的前后执行计划。SQL
    优化指导可以推荐其他类型的更改，例如可以帮助将执行计划推向正确方向的 SQL 配置文件。SQL 配置文件将在后面讨论。

    '
- fmt: '# Automatic Indexing


    ## Overview


    Oracle is constantly creating automated processes to simplify development and
    administration. Automatic indexing was introduced in 19c as one of the key new
    features in Oracle’s autonomous database offerings. Optimizing indexes requires
    a significant amount of skill and effort, and tools like the Access Advisor and
    the SQL Tuning Advisor have already been offering index help. This section shows
    how automatic indexing can put all the automation pieces together to remove most
    index tasks from developers.


    Even if we don’t plan to use automatic indexing, we should learn about this feature
    because it represents the future of Oracle technology. On the other hand, at present,
    the technology has some significant issues and is probably not ready for use in
    most production systems. This powerful feature can significantly impact performance,
    so before using it in production, we should read all the documentation and test
    it thoroughly.


    ## Implementation Steps


    The first step in implementing automatic indexing is to check the current configuration
    by querying the data dictionary view `DBA_AUTO_INDEX_CONFIG`. The parameter `AUTO_INDEX_MODE`
    can be set to `OFF`, `REPORT ONLY`, or `IMPLEMENT`. We can begin using this feature
    by calling the `DBMS_AUTO_INDEX` package to modify the configuration. (This feature
    is currently only available on Exadata and autonomous databases, so the first
    command may fail with the error “ORA-40216: feature not supported.”) By enabling
    report mode, Oracle will create the indexes but will set them to invisible, so
    they are not used:


    ```

    --Enable REPORT ONLY (invisible indexes).

    begin

    dbms_auto_index.configure(''AUTO_INDEX_MODE'',''REPORT ONLY'');

    end;

    /

    ```


    Next, we need to set which schemas we want to automatically index. The following
    PL/SQL block adds one schema at a time. If you change the schema name, the code
    will not drop other schemas; it will only add the new schema name to the list:


    ```

    --Allow automatic indexes for the SPACE schema.

    begin

    dbms_auto_index.configure(''AUTO_INDEX_SCHEMA'', ''SPACE'', true);

    end;

    /

    ```


    To test the feature, let’s create a large table and then run a query on that table
    that could obviously benefit from an index:


    ```

    --Create large table, gather stats, run query that needs an index.

    create table satellite2 as select * from satellite;

    begin

    for i in 1 .. 100 loop

    insert into satellite2 select * from satellite;

    end loop;

    end;

    /

    begin

    dbms_stats.gather_table_stats(null, ''satellite2'');

    end;

    /

    select * from satellite2 where satellite_id = 1;

    ```


    Finally, we have to wait about 30 minutes for the auto-task to run. We should
    see a new index appear in the activity report generated with this command:


    ```

    --Generate report for the last index created.

    select dbms_auto_index.report_last_activity from dual;

    ```


    The report can get quite large and may contain sections that include report dates,
    summary of indexes created and dropped, details about indexes created and dropped,
    and verification details that include before-and-after execution plans and statistics.
    For example, the following is a small section of the report for the slow SQL statement
    we ran:


    ```

    ...

    INDEX DETAILS


    1\. The following indexes were created:


    | Owner | Table      | Index                | Key          | Type   | Properties
    |


    | SPACE | SATELLITE2 | SYS_AI_adscrw50ccvut | SATELLITE_ID | B-TREE | NONE       |


    ...

    ```


    There’s a lot more of information available in other places. Instead of generating
    reports for the last activity, we can use the same package to generate reports
    for different date ranges. There are several `DBA_AUTO_INDEX_*` views that tell
    us what SQL statements were executed, how the indexes and related execution plans
    were verified, and summary data. We can also track automated indexes in the data
    dictionary columns `DBA_INDEXES.AUTO` and `DBA_INDEXES.VISIBILITY`. If we’re not
    happy with our automated indexes, we can drop them with the package `DBMS_AUTO_INDEX`.


    ## Issues and Limitations


    While the preceding example is seemingly straightforward, there are many unexpected
    complications that can happen with automatic indexing. First, the preceding example
    is not reliably reproducible, and I’m not sure why. Perhaps sometimes the query
    is caught by some sampling algorithm, and other times it isn’t. On the other hand,
    the statement from the previous section, `SELECT COUNT(*) FROM SATELLITE WHERE
    ORBIT_CLASS = ''Polar''`, was run for 10 minutes, can obviously benefit from an
    index, and is even flagged by the SQL Tuning Advisor as needing an index, yet
    the automatic indexer never recommends an index for it. It’s difficult to tell
    what criteria are used, but they obviously aren’t sufficient to solve all our
    missing indexes.


    Also, the `REPORT ONLY` mode name is misleading, as it actually creates indexes
    instead of just reporting on what the task would do if enabled. Setting the indexes
    to invisible seems like a poor compromise, as invisible indexes can still have
    real consequences. In my experience, the problem with creating too many indexes
    isn’t that the indexes will be used incorrectly by the optimizer. The main problem
    with creating too many indexes is that they consume too much space and require
    extra work when modifying data. Invisible indexes won’t be used by our queries,
    but they still require extra storage space and extra work for index maintenance.


    This feature probably isn’t ready for production use yet. There are several gotchas
    in the implementation, the API is a bit rough, the reports aren’t always useful
    or consistent, the feature is only available in a small number of environments,
    etc.


    ## Conclusion


    The whole implementation feels rushed – and considering the way Oracle handled
    its recent versions, it probably was. But we should still pay attention to automatic
    indexing and see how it improves in future versions. Autonomous processes like
    creating indexes, materialized views, zone maps, and more will eventually change
    the way we work. In the future, the average developer may not need to worry about
    indexes at all (except for some necessary indexes like for foreign keys). Automatic
    indexing may take care of 75% of our performance needs, and only a single developer
    or administrator can handle all the exceptions. I wouldn’t create an index in
    production if I thought it only had a 75% chance of working. But perhaps the lesson
    here is that we must lower our expectations of automated systems and accept that
    systems don’t need to work 99% of the time to be useful.'
