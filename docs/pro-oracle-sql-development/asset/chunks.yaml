    ## 避免使用带引号的标识符


    我们应该避免使用带双引号的区分大小写的名称。Oracle 标识符通常只允许字母数字字符、下划线、美元符号和井号。使用带引号的标识符来绕过这些限制可能让人感觉很自由，但在
    SQL 中引用这些带引号的标识符却是一件麻烦事。区分大小写的名称会破坏我们的许多数据字典查询和 DDL 生成程序。有些数据库对象，比如数据库链接，甚至不支持区分大小写的名称。而且，当每个名称都被双引号包围时，我们的
    SQL 看起来会很丑陋。


    理论上，带引号的标识符可以为我们节省一个步骤。当我们为特定目的编写 SQL 时，例如单个报表，我们可以使用带引号的标识符来为列赋予我们希望在报表上看到的精确名称。


    实际上，那些我们“只用一次”、用于单个报表的查询，最终会被用于其他用途。区分大小写的列名就像病毒一样会感染我们所有的代码。我们应该避免使用区分大小写的名称，例如下面的
    SQL 语句：


    ```

    --避免使用区分大小写的列名。

    select *

    from

    (

    select 1 "Good luck using this name!"

    from dual

    )

    where "Good luck using this name!" = 1;

    ```


    ## 名称长度与变更


    尽管所有现代版本的 Oracle 都允许名称使用 128 个字符，但我们需要意识到，之前的版本限制为 30 个字符。如果我们的程序是为旧版本编写的，很可能有些列或变量被设置为
    `VARCHAR2(30)`，而这些应该升级为 `VARCHAR2(128)`。


    程序会随着时间而改变，重要的是我们要重构代码并保持名称的更新。大多数 IDE 都有简单的重构选项，我们可以右键单击变量名并在多处一次性更改它们。如果我们建立了完全自动化的构建和测试过程，如第
    2 章和第 3 章所述，我们就不应该害怕更改名称。更改模式对象名称很简单，如下面的代码所示：


    ```

    --更改表名和列名。

    create table bad_table_name(bad_column_name number);

    alter table bad_table_name

    rename column bad_column_name to good_column_name;

    rename bad_table_name to good_table_name;

    ```


    如果你仍然不相信好名称的重要性，几次令人汗颜的代码审查可能会让你信服。克服知识诅咒的最好方法，就是看着别人看着我们的代码，然后大声疑惑：“这是什么意思？”


    ## 空白符


    空白符是我们用来编写更好代码的有限工具之一。由于没有编写文档或电子邮件那样多的格式化选项，我们必须依赖空白符来分隔项目，并将读者的视线引导到重要的地方。


    考虑一下我们在写作时使用空白符的方式。无论我们是用编程语言还是自然语言写作，都存在一个元素的层次结构。例如，本书从字符开始，字符组成单词，单词组成句子，句子组成段落，段落组成页面，页面组成章节，章节组成部分，最后组成整本书。这些元素中的每一个都有越来越多的空白符来分隔它们。我们都凭直觉知道这条规则并遵循它。但值得明确地说明这条规则，因为我们有时会忘记将其应用到我们的程序中。


    在 PL/SQL 中，层次结构是字符、单词、语句和嵌套块。在 SQL 中，层次结构是字符、单词、表达式或条件、子句和嵌套查询。大多数程序员和代码格式化工具在
    SQL 层次结构的顶部会犯一个错误。每个查询，包括每个相关子查询和内联视图，都很重要，值得额外的空间。如第 6 章所讨论的，内联视图是编写优秀 SQL 的关键。内联视图值得大量的空间，如下面的代码所示：


    ```

    --给内联视图留出大量空间。

    select * from

    (

    --这里有个好注释。

    select * from dual

    ) good_name;

    --不要把所有东西都挤在一起。

    select * from (select * from dual);

    ```


    前面示例中的括号就像 PL/SQL 中的 `BEGIN` 和 `END`。当括号用于分隔内联视图时，它们应该独占一行。当然，括号内的所有内容都必须额外缩进一级。缩进对于理解代码的嵌套结构至关重要。给内联视图留出大量空间也使它们更容易被高亮显示和执行，这是我们调试时经常要做的事情。


    即使我们的内联视图很小，它们仍然是高级的 SQL 概念，值得额外的空白。除非内联视图是微不足道的，否则我们应该将它们与查询的其他部分清晰地分开。前面示例中的两个查询乍一看可能都很好。但这个小例子具有误导性，因为第二个更紧凑的格式扩展性不好。作为对比，我们几乎从不会把一个过程全部放在一行，如下面的例子所示：


    ```

    --格式化过程的典型方式。

    create or replace procedure proc1 is

    begin

    null;

    end;

    /

    --奇怪的格式化过程的方式。

    create or replace procedure proc1 is begin null; end;

    /

    ```


    空白不仅在查询内部很重要；查询之间的空白也很重要，比如在我们的 SQL 工作表中。本书和 GitHub 仓库中的示例遵循了此空白建议。每个章节有自己的文件；每个标题由三个空行和一个注释分隔；示例中的每组命令由两个空行分隔；每个命令由一个空行分隔。工作表是
    SQL 开发的重要组成部分，我们都必须养成一种风格来帮助我们快速浏览工作表。


    具体的行数和空格数并不重要。重要的是我们要有一个一致且易于使用的系统，并且我们为更大的工作单位使用越来越大的空白量。即使我们的 IDE 提供了导航窗格，我们仍然需要使我们的工作表、程序和查询可读。


    ## 让 Bug 显而易见


    我们无法编写出没有 bug 的程序。但我们可以用一种让 bug 更容易被发现和修复的方式来编写程序。代码不可避免地是隐晦的，但我们应该努力让它尽可能透明。我们的目标是让我们的代码像真相一样清晰明了，即使真相令人尴尬。本节包括通用的编程建议，以及如何在
    SQL 或 PL/SQL 上下文中应用这些建议。


    ### 快速失败


    快速失败是近代史上最重要的技术概念。我们曾经相信自己可以第一次就构建正确的东西，这听起来很可笑。我们需要容忍甚至鼓励失败，以便更快地创造出有效的东西。


    快速失败最重要的部分是软件工程思想，如自动化测试、敏捷、构建最小可行产品、透明度等。其中一些思想在前面的章节中有所讨论，但这些大的主题大多不在本书的范围内。快速失败的思想，以及诚实地面对我们的错误和局限，可以渗透到我们许多日常的小型编程决策中。接下来的章节讨论了在
    SQL 和 PL/SQL 中快速失败的具体方法。

    '
- fmt: '### Avoid Pokémon Exception Handling


    Low-level failures in SQL or PL/SQL are exceptions. Exception handling is more
    of a PL/SQL topic than a SQL topic. Unfortunately, we need to discuss exception
    handling because it is frequently done wrong. When our exception handling is broken,
    we don’t even know what SQL statement to debug. Most SQL developers, including
    myself, will waste weeks of their lives trying to find the `real` line number
    and error message.


    The best way to handle exceptions in Oracle is to do nothing. By default, many
    useful things happen when an exception occurs. The exception stops the current
    block, propagates up through all the calling blocks, and crashes the entire program.
    The final exception generates all the error codes and messages, along with all
    the relevant line numbers and object names.


    The default exception handling behavior provides enough information to troubleshoot
    almost all of our problems. Our unnatural fear of failure leads to bad practices
    that make failures harder to find and harder to diagnose.


    For example, many PL/SQL programs catch and log all exceptions instead of crashing
    the program. It’s great if our programs can catch and handle an exception. It’s
    great if our programs can continue after an error. But we shouldn’t create an
    unrealistic expectation that `all` programs can work through `all` exceptions.


    Most SQL developers know that we should not catch and ignore all errors, like
    in the following code:


    ```sql

    --Example of bad exception handling that ignores all errors.

    begin

    --Do something here...

    null;

    exception

    when others then null;

    end;

    /

    ```


    But many SQL programmers don’t realize that the following code is almost as bad.
    The following code logs the error and continues processing:


    ```sql

    --Example of potentially bad exception handling.

    begin

    --Do something here...

    null;

    exception

    when others then

    log_error;

    end;

    /

    ```


    The preceding code should have at least re-raised the error. Or the code should
    not have caught `OTHERS` in the first place.


    In practice, error logs are rarely checked. When something bad happens to our
    program, sometimes we need to admit defeat and crash the program. Crashing is
    better than sweeping errors under the rug. It’s better to find the error immediately,
    when the problem is fresh in our minds, than to investigate it later.


    Custom logging functions almost always fail to log the entire call stack and all
    the line numbers. If we build an error logging function, we must always use both
    `DBMS_UTILITY.FORMAT_ERROR_STACK` and `DBMS_UTILITY.FORMAT_ERROR_BACKTRACE`. If
    we need more precise control over the error stack or call stack data, we can use
    the package `UTL_CALL_STACK`.


    Printing only the last error, and only the last line number, may not show the
    underlying problem. Sadly, most custom error logging only shows the location of
    the exception handler, not the original error. If we build a custom error logging
    function, the function must include at least as much information as when we do
    nothing at all. A logging utility that only stores `SQLERRM` is a huge mistake.


    Unless our programs are specifically handling an error or logging extra information
    that only exists in one program scope, we only need to catch exceptions at the
    program entry points. We shouldn’t add an exception handler to every procedure
    or every PL/SQL block. We should take advantage of exception propagation.


    Exceptions are not like Pokémon – we don’t want to catch them all.


    ### Use Bad Names and Weird Values


    We often write bad code even though we know it’s bad. We know we shouldn’t hard-code
    that value or call that dangerous function or depend on that unproven assumption.
    But we write bad code anyway because we don’t have the time to make our programs
    perfect. When we have to compromise quality, we instinctively want to hide what
    we’re doing. We need to fight that instinct and do the exact opposite: make our
    bad decisions obvious to anyone reading our code.


    If we don’t know what we’re doing, we should say so in the comments. If we’re
    falsely confident, programmers who know better than us might hesitate to change
    our code. By making our ignorance clear, we’re inviting others to help us.


    If we think our column or function is dangerous, put that uncertainty in the name.
    We don’t want to drag other programmers down with our mistakes.


    If we have to hard-code a non-real value, use a weird value that will stick out.
    For example, with dates, choose an unrealistic date that obviously has no meaning.
    The following example is painfully close to real code I’ve used several times:


    ```sql

    --This works but I don''t know why!

    select date ''9999-12-31'' dangerous_last_date

    from dual;

    ```


    New programmers might feel nervous about admitting mistakes, but admitting mistakes
    is much better than the alternative. Experts don’t fear bad programmers – experts
    fear bad programmers who don’t know they’re bad programmers. We’re all bad programmers
    in some contexts, so we all understand time constraints and being confused by
    a program. Let’s be honest with each other.'
