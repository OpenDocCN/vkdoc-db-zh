  raw: '## History of Relational Databases


    A brief history of relational databases helps us appreciate the importance of
    this technology and helps us understand Oracle Corporation’s decisions. The Oracle
    database is a huge product that inevitably contains mistakes. Some of those mistakes
    are unimportant historical curiosities, but others are huge pitfalls we need to
    avoid.


    Relational databases are built on relational algebra and the relational model,
    which was first popularly described by E. F. Codd in 1970.^([¹](#fn1)) The relational
    model is built on set theory, a mathematical way of dealing with collections of
    objects. The relational model is discussed in more detail in the next section.


    IBM started working on relational technology and products in 1968 but did not
    release a commercial product for many years. Here’s the first history lesson:
    best is the enemy of good enough. Larry Ellison, the co-founder of Oracle Corporation,
    heard about IBM’s project, implemented it, and released the first commercially
    available SQL database in 1979.^([²](#fn2)) He has a huge presence in the database
    world and is still involved with many database decisions to this day.


    Oracle Corporation has certainly used its first-mover advantage. The Oracle database
    has been the most popular database product for a long time. There are current
    trends to move away from Oracle and SQL, but we shouldn’t overlook how incredibly
    popular they are. The database scores high on almost any database popularity metric.^([³](#fn3))


    Oracle’s age explains many of its unexpected behaviors. The following list contains
    the features that are most likely to confuse database developers who are new to
    Oracle:


    1.  *(+)*: Oracle originally used syntax like `(+)` instead of keywords like `LEFT
    JOIN`. That old-fashioned syntax is bad coding practice and is discussed in more
    detail in Chapters [6](#471418_2_En_6_Chapter.xhtml) and [7](#471418_2_En_7_Chapter.xhtml).


    2.  *Date*: An Oracle date also contains the time and probably should have been
    called a `DATETIME`. Date formatting was awkward before the introduction of ANSI
    date literals, as discussed in Chapter [15](#471418_2_En_15_Chapter.xhtml).


    3.  *Empty string*: Oracle treats an empty string as null, instead of a distinct
    value as most programmers expect. (However, I would argue that Oracle is not necessarily
    wrong here. We don’t have zero-length dates or zero-length numbers; why should
    we have zero-length strings?)


    4.  *30-byte name limit*: The SQL and PL/SQL languages have an English-like syntax,
    but we’ll quickly hit the 30-byte limit if we use regular words for names. And
    good variable names are crucial to make our programs more readable. Luckily this
    problem is fixed in version 12.2, which allows 128 bytes.


    5.  *SQL*Plus quirks*: SQL*Plus is a great tool for some tasks, but it’s really
    showing its age in many ways.


    In Oracle’s defense, those mistakes were made before any standards existed. On
    the other hand, Oracle doesn’t always make a good effort to comply with standards.
    For example, Oracle used to claim “partial” compliance for allowing long names.
    While 30 bytes is “part” of a bigger number, that doesn’t really meet the spirit
    of the standard.^([⁴](#fn4))


    More important than excusing Oracle’s mistakes, it helps to see how Oracle Corporation
    responds to industry trends. Sometimes it feels like they have a “fire and motion”
    strategy for their technologies. They add so many features that nobody can possibly
    keep up with them.^([⁵](#fn5)) However, adding a huge number of features may be
    backfiring now. The Unix philosophy of building small tools for each task seems
    to be taking over.


    The following list shows the largest architectural and conceptual changes made
    to Oracle, along with the version they were introduced. These are not necessarily
    the most important features, but the features that tried to redefine what a database
    is:


    *   *Multiversion concurrency control (MVCC)*: 4


    *   *PL/SQL*: 6


    *   *Object-relational, Java*: 8


    *   *OLAP, XML (Extensible Markup Language), RAC*: 9


    *   *JSON, sharding, in-memory, containers (multitenant)*: 12


    *   *Property graph, autonomous database, documents*: 18


    *   *Cloud integration*: 19


    *   *MLE (multilingual engine)*: 21


    Adding new features rarely hurts sales, but some of those new features arguably
    move Oracle in the wrong direction. For example, object-relational and Java in
    the database have significant problems. Those shortcomings are discussed in Chapters
    [10](#471418_2_En_10_Chapter.xhtml) and [15](#471418_2_En_15_Chapter.xhtml).


    Oracle will always add a new feature to catch up with competitors, even if that
    feature doesn’t make sense. Not everything Oracle Corporation does is the “future.”
    Oracle is a huge product that sometimes moves in multiple, contradictory directions
    at the same time. We need to remember to not drink the Kool-Aid and not throw
    out proven technology for shiny new things.


    On the other hand, it’s good that Oracle supports almost everything. It’s a Swiss
    Army knife for database solutions. We don’t need a new database for each new technology
    trend.


    The pace of technological change is accelerating, and nobody can predict the future.
    Given the past, it’s safe to say that Oracle will add or invent new and important
    features. We don’t always want to start using new features immediately, but we
    should at least take the time to read about them in the “New Features” chapter
    of the manual.


    ## Relational Model and Why It Matters


    The relational model has been immensely influential in computer science and programming.
    There are many papers, books, and classes related to the theory of relational
    database systems. We can be successful SQL developers without a thorough understanding
    of the relational model, but we should at least have an introductory understanding.


    ### History


    The relational model is the theoretical foundation for the Oracle database. It
    was first described by E. F. Codd’s 1970 paper, “A Relational Model of Data for
    Large Shared Data Banks.” I recommend you read that paper; it’s surprisingly accessible
    and still relevant. Most of this section is based on that original paper, although
    E. F. Codd and others have expanded on the relational model in other works.


    ### Terminology


    Understanding the relational model can at least help us understand other people.
    There’s rarely a good reason to use the theoretical words *relation*, *tuple*,
    and *attribute*, instead of the more common words *table*, *row*, and *column*.
    Even E. F. Codd’s paper uses those common words in several places. But since some
    people insist on using the fancy words, we might as well learn them.


    Table [1-1](#471418_2_En_1_Chapter.xhtml#Tab1) is copied straight from Codd’s
    original paper. There’s a *relation* (table) named `SUPPLY`. It has three *tuples*
    (arrays or rows) and four *simple domains* (attributes, fields, or columns), meaning
    it has a *degree* of four. The *primary key* uniquely identifies each row and
    is the combination of `SUPPLIER`, `PART`, and `PROJECT`, each of which is also
    a *foreign key* to another relation. Foreign keys ensure that lookup values actually
    exist in the tables they refer to.


    Table 1-1


    supply


    | supplier | part | project | quantity |

    | --- | --- | --- | --- |

    | 1 | 2 | 5 | 17 |

    | 1 | 3 | 5 | 23 |

    | 2 | 3 | 7 | 9 |'
  trans: '# 关于关系数据库的历史


    简要了解关系数据库的历史有助于我们认识这项技术的重要性，并理解甲骨文公司的决策。Oracle 数据库是一个庞大的产品，其中不可避免地会存在一些错误。其中一些错误是无关紧要的历史趣闻，而另一些则是我们需要避免的巨大陷阱。


    关系数据库建立在关系代数和关系模型之上，后者由**E. F. Codd**于 1970 年首次通俗地阐述。关系模型建立在集合论的基础上，这是一种处理对象集合的数学方法。关系模型将在下一节更详细地讨论。


    IBM 于 1968 年开始研究关系技术和产品，但多年后才发布商业产品。这是第一个历史教训：最好者是足够好者的敌人。甲骨文公司的联合创始人拉里·埃里森听说了
    IBM 的项目，实现了它，并于 1979 年发布了第一个商业化的 SQL 数据库。他在数据库世界中拥有巨大的影响力，并且至今仍参与许多数据库决策。


    甲骨文公司当然利用了其先发优势。长期以来，Oracle 数据库一直是最受欢迎的数据库产品。虽然当前有从 Oracle 和 SQL 迁移的趋势，但我们不应忽视它们有多么受欢迎。在几乎所有的数据库受欢迎度指标上，该数据库得分都很高。


    Oracle 的“年龄”解释了许多其出人意料的行为。以下列表包含了那些最可能让 Oracle 新开发者感到困惑的特性：


    1.  `(+)`： Oracle 最初使用像`(+)`这样的语法，而不是`LEFT JOIN`这样的关键字。这种过时的语法是糟糕的编码实践，并在第 6 章和第
    7 章有更详细的讨论。


    2.  `Date`： Oracle 的日期类型也包含时间，或许应该被称为`DATETIME`。在引入 ANSI 日期字面量之前，日期格式化一直很笨拙，这在第
    15 章中有所讨论。


    3.  空字符串： Oracle 将空字符串视为 null，而不是大多数程序员期望的一个独立值。（然而，我认为 Oracle 在这里不一定错了。我们没有零长度的日期或零长度的数字；为什么我们应该有零长度的字符串？）


    4.  30 字节名称限制： SQL 和 PL/SQL 语言具有类英语的语法，但如果我们使用常规单词作为名称，很快就会碰到 30 字节的限制。而好的变量名对于提高程序可读性至关重要。幸运的是，这个问题在
    12.2 版本中得到了修复，允许 128 字节。


    5.  `SQL*Plus`怪癖： `SQL*Plus`对于某些任务来说是一个很好的工具，但在许多方面确实显得老旧。


    为 Oracle 辩护的话，这些错误是在任何标准存在之前犯的。另一方面，Oracle 也并不总是努力遵守标准。例如，Oracle 过去声称其“部分”符合标准，因为它允许长名称。虽然
    30 字节是一个更大数字的“部分”，但这并不真正符合标准的精神。


    比原谅 Oracle 的错误更重要的是，理解甲骨文公司如何应对行业趋势。有时感觉他们的技术采用了一种“开火并运动”的策略。他们添加了如此多的功能，以至于没有人可能跟得上他们。然而，添加大量功能现在可能适得其反。为每个任务构建小工具的
    Unix 哲学似乎正在占据上风。


    以下列表显示了 Oracle 所经历的最大的架构和概念性变革，以及它们引入的版本。这些不一定是最重要的功能，而是那些试图重新定义数据库是什么的功能：


    *   `Multiversion concurrency control (MVCC)`： 4

    *   `PL/SQL`： 6

    *   `Object-relational, Java`： 8

    *   `OLAP, XML (Extensible Markup Language), RAC`： 9

    *   `JSON, sharding, in-memory, containers (multitenant)`： 12

    *   `Property graph, autonomous database, documents`： 18

    *   `Cloud integration`： 19

    *   `MLE (multilingual engine)`： 21


    添加新功能很少会损害销售，但其中一些新功能可以说让 Oracle 走向了错误的方向。例如，数据库中的对象关系和 Java 存在显著问题。这些缺点在第 10
    章和第 15 章中讨论。


    Oracle 总会添加新功能以跟上竞争对手，即使该功能没有意义。并非甲骨文公司所做的一切都是“未来”。Oracle 是一个庞大的产品，有时会同时向多个相互矛盾的方向发展。我们需要记住不要盲目追随，也不要为了闪亮的新事物而抛弃经过验证的技术。


    另一方面，Oracle 几乎支持所有功能是件好事。它是数据库解决方案的瑞士军刀。我们不需要为每一个新技术趋势都使用一个新的数据库。


    技术变革的速度正在加快，没有人能预测未来。鉴于过去，可以安全地说 Oracle 将会添加或发明新的重要功能。我们并不总是想立即开始使用新功能，但我们至少应该花时间阅读手册中“新特性”章节的内容。


    # 关系模型及其重要性


    关系模型在计算机科学和编程领域产生了巨大的影响。有许多论文、书籍和课程与关系数据库系统的理论相关。我们不需要对关系模型有透彻的理解就能成为一名成功的 SQL
    开发者，但我们至少应该有一个入门级的理解。


    ## 历史


    关系模型是 Oracle 数据库的理论基础。它首次由**E. F. Codd**在 1970 年的论文《大型共享数据库的关系数据模型》中描述。我推荐阅读这篇论文；它出人意料地易懂且至今仍有价值。本节的大部分内容都基于那篇原始论文，尽管**E.
    F. Codd**和其他人在其他著作中对关系模型进行了扩展。


    ## 术语


    理解关系模型至少可以帮助我们理解别人。几乎没有好的理由使用理论术语`relation`、`tuple`和`attribute`，而不是更常见的`table`、`row`和`column`。即使是**E.
    F. Codd**的论文也在多处使用了那些常见词汇。但既然有些人坚持使用那些花哨的术语，我们不妨也学习一下。


    表 1-1 直接复制自 Codd 的原始论文。有一个名为`SUPPLY`的`relation`（表）。它有三个`tuple`（数组或行）和四个`simple
    domains`（属性、字段或列），意味着它的`degree`是四。`Primary key`唯一标识每一行，是`SUPPLIER`、`PART`和`PROJECT`的组合，其中每一个也是指向另一个关系的`foreign
    key`。外键确保查找值在它们引用的表中实际存在。


    表 1-1


    supply


    | 供应商 | 零件 | 项目 | 数量 |

    | --- | --- | --- | --- |

    | 1 | 2 | 5 | 17 |

    | 1 | 3 | 5 | 23 |

    | 2 | 3 | 7 | 9 |'
- fmt: '## Relational Model


    ### Simplicity


    The relational model is all about simplicity. It’s not more powerful than other
    systems, just easier to use. (So don’t worry. There won’t be any proofs or formulas
    in this section.)


    Simplicity is achieved by removing *redundancy* and *nonsimple domains* through
    *normalization* with *primary keys*. In practice those concepts translate into
    two simple rules: do not store lists of values and do not repeat a column. In
    the preceding `SUPPLY` table, it would be a huge mistake to add columns like `DELIVERY_DATES`
    or `SUPPLIER_NAME`, even though those columns may seem convenient at first. `DELIVERY_DATES`,
    possibly a comma-separated list of values, would be easy to read but difficult
    to filter or join. `SUPPLIER_NAME` might look good right next to the supplier
    number, but it would be a duplicate of the value already in the `SUPPLIER` table.
    Those duplicate columns would lead to *update anomalies*, where the columns won’t
    agree on the values.


    The rules of the relational model can be summarized as follows: make the schema
    smart but keep the tables dumb. It’s the *relationships* between the tables that
    matter. Those relationships take place through constraints and joins, but those
    constraints and joins can’t work if the data is not simple.


    ### Sets and Tables


    Thinking about the database in terms of simple relationships, or just as simple
    sets, is one of the keys to writing great Oracle SQL. We use the relational model
    to retrieve sets, join them into new sets, join those sets together, etc. Like
    with user interface design, two simple choices are better than one difficult choice.
    Forming a good mental model of database sets and tables is going to take a while,
    so don’t feel bad if you don’t get it yet. This topic is discussed a lot throughout
    the book.


    It’s easy to take tables for granted because they’re so common now. We use them
    not just in databases but in spreadsheets, HTML, and many other places. We shouldn’t
    avoid important data structures just because they appear too simple at first glance.
    When we run into a problem putting data into a table, the answer is to create
    more tables, not create a more complicated table.


    ### Problems Implementing a Relational Model


    Codd’s paper predicted difficulties implementing the relational model. His fears
    have proved to be well founded.


    Abstracting the storage mechanisms gives the database system a lot of responsibilities.
    The database must create and maintain the physical data structures and choose
    the algorithms to access those data structures. If the title of Niklaus Wirth’s
    book *Algorithms + Data Structures = Programs* is true, then databases have a
    lot of work to do. This extra work is a problem, but Oracle does the heaving lifting
    for us. For example, although we need to choose which columns to index, we don’t
    normally need to know exactly how Oracle will physically create and maintain those
    data structures. Index maintenance algorithms are a problem for Oracle Corporation
    programmers and the reason we pay them for their software.


    Unfortunately, Oracle cannot automate everything. Oracle provides many storage
    options like indexes, caches, in-memory column stores, etc. And it provides ways
    to gather metadata about those relationships through things like table and column
    statistics. There are many complicated trade-offs between performance and storage,
    and we must help decide when a trade-off is worthwhile. When dealing with `N`
    columns, there are at least `N!` permutations^([⁶](#fn6)) of how to store them.


    Despite Codd’s insistence on normalization in his paper, Codd also knew that redundant
    data was inevitable. Inconsistency of redundant data is hard to prevent because
    inconsistency is a state, not a specific action. E. F. Codd predicted the use
    of a metadata system to identify redundancies, and those redundancies could be
    prevented either in real time or as a batch job. As far as I know, an automated
    system to prevent redundancies does not exist. Perhaps some future version of
    Oracle will have an `ASSERT` functionality to fill this gap in our relational
    model implementation. For now, it is up to us to be aware of inconsistency problems
    and use a disciplined approach to mitigate them. Simply stated, if we create a
    wrong column, it’s *our* problem.


    ### Relational Model and Why It Doesn’t Matter


    There is no perfect model for the world. Abstractions are built to simplify things,
    but inevitably those abstractions don’t fit, or they cover up an important detail
    that must be dealt with. Fanatically adhering to the relational model will cause
    problems.


    Don’t be fooled by books and products that offer a false choice; we don’t have
    to choose between implementing a pure relational solution and completely abandoning
    the relational model. Current relational databases, and the SQL language, don’t
    have to be perfect to be useful. We must avoid the temptation to search for pure
    and true solutions and embrace practical compromises.


    The following sections discuss parts of the relational model that don’t always
    work in practice. The good news is that there’s always a workaround.


    ### The NULL Problem Isn’t a Problem


    One of the biggest theoretical complaints about relational databases is the way
    they use `NULL`. Three-valued logic with nulls is weird and takes time to get
    used to. Table [1-2](#471418_2_En_1_Chapter.xhtml#Tab2) is a truth table that
    explains how `NULL` works.


    Table 1-2


    `NULL` Three-Valued Logic


    | A | B | = | != |

    | --- | --- | --- | --- |

    | 1 | 1 | True | False |

    | 1 | 0 | False | True |

    | 1 | `NULL` | Unknown | Unknown |

    | `NULL` | `NULL` | Unknown | Unknown |


    `NULL`s are weird, but so is our data. There are many times when we don’t know
    something. It might be tempting to replace `NULL` with a list of reasons we don’t
    know something. But there are many times when we don’t even know *why* we don’t
    know something. And those lists of reasons can grow quickly and become ridiculous.


    `NULL`s *could* be eliminated by creating a separate table for every nullable
    column. But creating such a large collection of tables quickly becomes a huge
    mess.


    For example, some people don’t have a first name or a middle name or a last name.
    Instead of using nullable columns to store an employee’s name, we could create
    separate tables `EMPLOYEE_FIRST_NAME`, `EMPLOYEE_MIDDLE_NAME`, and `EMPLOYEE_LAST_NAME`.
    Each table only has two values, an `EMPLOYEE_ID` and a `NAME`. If an employee
    is missing a middle name, there will be no row in `EMPLOYEE_MIDDLE_NAME` for their
    `EMPLOYEE_ID`. Congratulations! We just created a schema without any `NULL`s.
    But now we need to join four tables just to find a person’s name. And if other
    columns become nullable in the future, we have to make significant changes to
    the schema, instead of just altering a single column. Names can be complicated,
    and it may sometimes make sense to store them in multiple tables, but don’t do
    it out of a fear of `NULL`.


    It feels unnatural the way `NULL = NULL` returns unknown, which in most contexts
    translates to `FALSE`. And it’s annoying when we write a `NOT IN` expression that
    compares against a `NULL` and doesn’t return any results. But those problems don’t
    mean our databases contain a ticking time bomb, like some horrible Y2K bug waiting
    to ruin everything. Unknown data creates challenges, but we need to be comfortable
    with uncertainty.'
