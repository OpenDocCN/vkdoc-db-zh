  trans: '

    ## PL/SQL 对象


    有许多有趣的 PL/SQL 对象，但遗憾的是，这些对象超出了本书的范围。如果你继续深入学习 Oracle SQL，你将不可避免地开始使用 PL/SQL，因此我将在这里快速列出这些对象。你可以从使用匿名块和
    PL/SQL 公用表表达式开始接触 PL/SQL。最终，你会想要开始创建这些 PL/SQL 模式对象：


    1.  `函数`：执行 PL/SQL 语句并返回一个值。用于小型查询或数据转换。


    2.  `过程`：执行 PL/SQL 语句但不返回值。用于执行小型变更。


    3.  `包规范和包体`：封装函数、过程和变量。用于创建程序。


    4.  `触发器`：在事件（如表变更或系统事件）发生时触发的 PL/SQL 语句。用于处理变更的副作用，例如为新行添加主键。


    5.  `类型规范和类型体`：封装函数、过程和变量。与包类似，但旨在用于存储数据。用于 PL/SQL 程序中的自定义集合或对象关系表。


    PL/SQL 既被过度使用，又未被充分利用。对于来自更传统编程背景、希望进行过程化编程的程序员来说，该语言被过度使用了。当一条 SQL 语句就能完成同样的工作时，就不应使用
    PL/SQL 程序。对于那些认为数据库只应存储数据而不应处理数据的程序员来说，该语言又未被充分利用。虽然我不会说 Oracle 是最好的数据库，但我可以很肯定地说，Oracle
    PL/SQL 是最好的数据库过程化语言。只需一点点 PL/SQL 就能开启很多可能性。PL/SQL 语言功能强大，几乎可以解决任何问题。


    ## 其他模式对象


    本节简要列出了其他不太重要的模式对象。即便如此，这份列表也并不完整；尽管这些对象可能与 SQL 开发无关，但仍存在许多其他模式对象类型：


    1.  `簇`：将多个表物理地存储在一起。例如，`LAUNCH`和`SATELLITE`表经常连接在一起。如果将这些表预先连接并存储在簇中，可能有助于提高性能。簇在理论上听起来不错，但在实践中并未使用。


    2.  `注释`：为表、列和视图提供文档。这可能很有用，因为许多集成开发环境（IDE）会读取注释并在我们查询数据时显示它们。


    3.  `物化区域映射`：存储关于“区域”内最小值和最大值的信息。与分区修剪类似，区域映射可用于快速从全表扫描中排除大块数据。与分区不同，区域映射只是元数据，不需要重新设计表。


    4.  `OLAP 对象`：Oracle 拥有完整的联机分析处理（OLAP）选件。OLAP 技术近来已逐渐式微，Oracle 已开始将更多 OLAP 功能创建为常规数据库对象。这包括分析视图、属性维度、维度和层次结构。


    ## 全局对象


    全局对象不归特定的 Oracle 用户所有。全局对象很容易被遗忘，因为它们并非直接由我们的应用程序拥有。我们的应用程序可能依赖于这些对象，但在我们导出模式或元数据时，这些对象通常不会出现。我们需要记住这些例外情况，否则我们的应用程序可能只能得到部分安装：


    1.  `上下文`：为每个会话包含全局数据的自定义命名空间。可以通过自定义包设置，并可通过`SYS_CONTEXT`函数引用。例如，默认的`USERENV`包含许多有用的值，例如`SYS_CONTEXT(''USERENV'',
    ''HOST'')`。


    2.  `目录`：名称与文件系统目录之间的映射。像`UTL_FILE`这样的 Oracle 包不直接引用文件系统目录，只引用 Oracle 目录对象。这种间接性很有用，因为文件系统目录经常因环境和平台而异。


    3.  `配置文件`：为用户设置限制。Oracle 建议改用资源管理器，因为它功能更强大。但在实践中，资源管理器过于复杂，我们依赖于配置文件。


    4.  `还原点`：与时间戳或系统变更号（SCN）关联的名称。对闪回操作很有用。


    5.  `角色`：一组可授予其他用户和角色的对象权限和系统权限。将权限一次授予正确的角色，远比将权限授予多个用户简单得多。


    ## GRANT 和 REVOKE


    `GRANT`和`REVOKE`命令控制数据库访问。有三件事必须加以控制：对象权限（对表、视图等的访问权限）、系统权限（用于登录的`CREATE SESSION`、像`SELECT
    ANY TABLE`这样的强大权限等）和角色权限（自定义应用程序角色、像`DBA`这样预先存在的强大角色等）。


    权限只能授予给现有对象。这个限制听起来合理，但它意味着没有办法授予用户 Alice 对用户 Bob 拥有的所有对象的永久访问权限。我们可以通过使用`ALL
    PRIVILEGES`选项来简化授权脚本，但我们仍然需要为 Bob 模式中的每个相关对象运行`GRANT`命令。而且，如果在 Bob 的模式中创建了新对象，在我们运行另一个`GRANT`语句之前，Alice
    将无法访问它。


    另一个困难的权限场景是当权限被传递时：当 X 被授予 Y，而 Y 又被授予 Z。创建授权链是困难的。当我们把一个对象授予一个用户时，除非该用户拥有`WITH
    ADMIN`选项，否则该用户不能将该对象授予他人。当我们把一个对象授予一个用户时，除非该用户拥有`WITH GRANT`选项，否则该用户不能基于该对象创建视图，然后再将该视图授予他人。


    跟踪权限并非易事。有三种权限和三组数据字典视图，例如`DBA_TAB_PRIVS`、`DBA_SYS_PRIVS`和`DBA_ROLE_PRIVS`。由于角色可以被授予角色，如果我们想彻底列出所有角色权限，我们需要一个递归查询。如果我们想确切知道我们拥有哪些角色的访问权限，我们必须使用类似这样的查询：


    ```sql

    --直接或间接授予当前用户的角色。

    select *

    from dba_role_privs

    connect by prior granted_role = grantee

    start with grantee = user

    order by 1,2,3;

    ```


    在查找对象和系统权限时，查询会变得更复杂。我们必须将前面的查询作为另一个查询的一部分来使用。以下示例查找授予当前用户的所有系统权限：


    ```sql

    --直接或间接授予当前用户的系统权限。

    select *

    from dba_sys_privs

    where grantee = user

    or grantee in

    (

    select granted_role

    from dba_role_privs

    connect by prior granted_role = grantee

    start with grantee = user

    )

    order by 1,2,3;

    ```


    查找对象权限需要一个与前面非常相似的查询，但用`DBA_TAB_PRIVS`替换`DBA_SYS_PRIVS`。该视图名称具有误导性——该视图包含所有对象的权限，而不仅仅是表的权限。


    ## 总结


    我们对高级功能的快速浏览已完成。我们知道如何构建集合，如何读取和写入数据，以及如何创建模式对象和全局对象。我们不需要记住 SQL 语法，但我们需要记住我们有哪些不同的选项可用。当我们开始组合高级功能并试图从
    Oracle 获得最佳性能时，我们需要掀开帷幕，看看 Oracle 是如何工作的。下一章将通过介绍 Oracle 的架构来完成我们对高级功能的讨论。


