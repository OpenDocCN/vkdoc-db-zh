  trans: '

    ## 通过批处理进行应用调优


    批处理命令是提升以数据库为中心的应用程序性能最简单的方法。将命令组合在一起通常是一项简单的改动，无需触及任何业务逻辑。批处理命令在两方面有益——它减少了开销，并为优化器提供了更多机会。


    数据库调用可能存在大量的开销。最明显的开销是网络往返时间。并且，当多个命令和数据一起处理时，有许多可用的硬件和软件优化：改进的缓存和内存访问、SIMD、更少的上下文切换、更少的解析等。


    如第 16 章所述，我们可以很快看到由减少开销的 1/N 谐波级数带来的巨大回报。我们可以保持应用程序的改动简单，因为我们不需要聚合所有东西就能获得巨大的性能提升。将命令以
    100 个为一组进行组合，就达到了 99%的优化。


    批处理命令为优化器提供了更多机会去做一些巧妙的事情。编写一个大的 SQL 语句，而不是多个小的 SQL 语句，让 Oracle 可以应用更多的转换和操作。另一方面，批处理也给了优化器更多犯错的机会，但不冒风险，就没有回报。当那些错误发生时，我们不必放弃批处理，而是可以运用我们的
    SQL 调优技巧。


    批处理命令的最大机会在于安装脚本、OLTP 应用程序和数据仓库。


    ### 安装和补丁脚本


    提升安装和补丁脚本的性能比许多开发人员意识到的更重要。调优这些脚本只有少数`直接`益处，因为它们不被最终用户看到，并且很少在生产系统上运行。但`间接`益处是巨大的，因为更快的安装和打补丁使开发人员能够更快地进行实验和测试。


    一个需要 1 分钟的安装脚本和一个需要 10 分钟的安装脚本之间的差异远不止 9 分钟。当重新安装只需要一分钟时，我们就没有借口不去测试我们脑海中浮现的任何疯狂想法。但这个建议仅适用于采用私有数据库开发模型的开发人员。


    例如，下面的代码展示了一个典型的安装脚本。该脚本使用九个命令来创建和填充一个表。大多数自动脚本生成程序生成的代码都类似这样：


    ```

    --典型、缓慢且冗长的安装脚本。

    create table install_test1(a number);

    alter table install_test1 modify a not null;

    alter table install_test1

    add constraint install_test1_pk primary key(a);

    insert into install_test1(a) values(1);

    commit;

    insert into install_test1(a) values(2);

    commit;

    insert into install_test1(a) values(3);

    commit;

    ```


    我们可以将整个脚本缩减为一个命令：


    ```

    --更快、更紧凑的安装脚本。

    create table install_test2

    (

    a not null,

    constraint install_test2_pk primary key(a)

    ) as

    select 1 a from dual union all

    select 2 a from dual union all

    select 3 a from dual;

    ```


    约束与表一起内联创建，初始值通过一个`CTAS`（`create table as SELECT`）创建。像上述批处理这样的简单改动，可以轻松地让安装脚本运行速度提升一个数量级。


    默认情况下，`SQL*Plus`读取一个命令，将其发送到服务器，服务器解析并执行该命令，服务器回复一条反馈消息，然后`SQL*Plus`显示该反馈消息。实际执行命令通常并不是`SQL*Plus`脚本最慢的部分。避免发送命令和接收状态的开销可以带来巨大的性能提升。


    我们还可以使用许多其他技巧来简化安装脚本。例如，除了使用大量的`UNION ALL`命令，这里有一些使用分层查询和预定义集合的技巧：


    ```

    --生成数字和其他值的替代方法。

    select level a from dual connect by level <= 3;

    select column_value a from table(sys.odcinumberlist(1,2,3));

    select column_value a from table(sys.odcivarchar2list(''A'',''B'',''C''));

    ```


    我们可以更进一步，使用`CREATE SCHEMA`语法进行批处理，它允许我们在单个命令中创建多个对象。在实践中，这个命令有点过头——当我们的整个脚本只是一个命令时，调试错误会变得困难。而且请记住，我们只需要批处理*大部分*命令就能获得巨大的性能收益。


    匿名块也可以帮助我们提升自动生成脚本的性能。许多数据库工具不理解批处理的重要性，反而创建了冗长的独立命令列表。重写自动生成的脚本来使用像`UNION ALL`这样的技巧可能是不切实际的。但是，通过将命令列表转换为一个匿名块，我们仍然可以实现大部分的性能收益。只需在脚本开头添加`BEGIN`，在结尾添加`END;`即可。


    匿名块作为单个`PL/SQL`命令发送到数据库。服务器仍然需要花费额外的时间来解析和执行多个命令。但至少网络流量和`SQL*Plus`的开销被消除了。


    ### OLTP 应用程序


    OLTP 应用程序本质上是逐个处理的系统。但仍然有大量的批处理命令的机会，既可以通过与应用程序协作，也可以通过与 SQL 协作。


    过去在应用程序开发人员和数据库开发人员之间有一场争论——谁来实现“业务逻辑”？应用程序开发人员赢了，我们数据库开发人员需要接受失败。试图说服应用程序开发人员不要使用像
    Hibernate 这样的对象关系映射工具是没有意义的（尽管考虑像 jOOQ 这样以 SQL 为中心的框架可能是值得的）。相反，我们需要与现有工具协作，并愿意在可能时提供高级
    SQL。


    ORM 工具可能并不总是生成理想的 SQL 语句，但这并不意味着我们对 SQL 生成完全没有控制权。在我们担忧逐行处理之前，我们需要确保应用程序没有犯更大的错误；应用程序不应频繁地重新连接数据库，并且应用程序应该每个逻辑变更只使用一个命令。应用程序当然不应该一次只变更一个*列*。我们不希望我们的应用程序`INSERT`一个空行，然后运行单独的命令来逐个`UPDATE`每个列。


    很少有系统是纯粹的 OLTP；通常在某些地方会有一些批处理过程。这些过程是应用高级 SQL 或至少利用应用程序批处理功能的良好候选者。像`JDBC 批处理执行`这样的选项可以带来巨大的性能提升。


    我们不必纯粹选择对象关系映射或纯粹的 SQL。ORM 框架仍然可以运行本地查询和调用自定义的`PL/SQL`函数。至少我们可以为应用程序创建视图。我们不应该将自己局限于纯粹与数据库无关的功能——否则，我们为什么当初要为
    Oracle 付费呢？

    '
- fmt: '## Data Warehouses


    对于数据仓库而言，使用一条大型 SQL 语句而非多条小型 SQL 语句尤为重要。但我们必须注意可能的资源消耗问题。


    单条大型 SQL 语句比多条小型语句更快且消耗更少的 `cumulative` 资源。然而，单条大型 SQL 语句可能在某个特定 `point in time`
    消耗更多资源。语句在完成前会一直占用 undo 和临时表空间。理想情况下，我们应该调整 undo 和临时表空间的大小以适应大型查询。如果无法做到，我们就不得不使用多条小型语句。


    例如，从表中删除多行的最快方法通常是单条 `DELETE` 语句。但大型 `DELETE` 语句是出了名的资源消耗大户，足够大的语句可能会因为 undo 表空间不足而失败。拆分大型
    `DELETE` 的一个简单选项是多次重复该语句，但使用诸如 `ROWNUM <= 1000000` 这样的条件。每次仅删除一百万行可以显著减少所需的最大
    undo 表空间。但重复 `DELETE` 语句会慢得多，因为 Oracle 必须每次重新读取整个段。很难找到一个完美的行数来平衡性能提升和降低即时资源消耗。


    大型 `DELETE` 语句最快的替代方案是 `DROP` 或 `TRUNCATE` 命令。显然，我们不能总是删除表的所有内容。但如果表是分区的，我们或许可以只删除一个分区。例如，如果我们必须从大表中删除旧行以移除它们，我们可以将表设置为按日期进行间隔分区，然后简单地删除最旧的分区。


    另一个替代大型 `DELETE` 的快速方法是重新创建整个表，但不包含要删除的行。如果我们使用 `NOLOGGING` 选项创建表，并使用 `APPEND`
    提示插入数据，就可以避免生成昂贵的 redo 和 undo 数据。这个替代过程的问题在于重建表并非易事。表重建脚本常常忘记处理所有依赖项，如注释和权限。


    当我们的处理过程需要多条 `INSERT`、`UPDATE` 和 `DELETE` 语句时，调整大型 DML 语句变得更加棘手。我们可能需要快速执行大型更改，同时仍能一致地访问表的旧版本。很难同时获得高性能、灵活性、较低的资源使用率和一致性。但
    Oracle 的技术，如物化视图和分区交换，可以提供帮助。或者，我们可以简单地使用一个指向原始表的同义词，在新表上工作，完成后切换同义词。


    批处理也可以通过 `DBMS_PARALLEL_EXECUTE`、并行管道函数和 `DBMS_SCHEDULER` 来实现。这些高级选项很有用，但不要过度使用。例如，并行管道函数是并行化过程代码的一个绝佳选择。但这个高级特性仍然无法像单条并行
    SQL 语句那样快速执行。


    我们并不总是需要牺牲性能、可用性或一致性。在数据仓库中，唯一需要牺牲的是构建高级解决方案所需的额外时间。


    ## Database Tuning


    数据库调优是一个很大的主题，将 396 页的《Database Performance Tuning Guide》浓缩成几页是对该主题的不公。本书侧重于 SQL
    调优，而数据库调优通常是 DBA 而非开发人员的任务。但我们不能完全忽视数据库调优；这两个主题之间有很大的重叠，因为数据库性能主要是 SQL 性能的总和。对于开发人员来说，最重要的数据库调优主题是性能度量、Automatic
    Workload Repository、^([^(40)](#fn40)) Active Session History、Automatic Database
    Diagnostic Monitor (ADDM) 以及各种 advisor。'
  raw: '### Data Warehouses


    For data warehouses it’s especially important to use one large SQL statement instead
    of multiple small SQL statements. But we have to be mindful of possible resource
    consumption problems.


    A single, large SQL statement is faster and consumes less *cumulative* resources
    than multiple, small statements. However, a single, large SQL statement may consume
    more resources at a specific *point in time*. Statements hold on to undo and temporary
    tablespace until they complete. Ideally, we should size our undo and temporary
    tablespace to accommodate our large queries. If that’s not possible, we’re forced
    to use multiple, small statements.


    For example, the fastest way to delete many rows from a table is usually with
    a single `DELETE` statement. But large `DELETE` statements are notorious resource
    hogs, and a large enough statement could potentially fail because there’s not
    enough undo tablespace available. One easy option for breaking up large `DELETE`s
    is to repeat the statement multiple times, but with a condition like `ROWNUM <=
    1000000`. Removing only one million rows at a time may significantly reduce the
    maximum undo tablespace required. But repeating `DELETE` statements will be much
    slower, because Oracle has to re-read the whole segment each time. It can be difficult
    to find the right number of rows that perfectly balances improved performance
    with reduced point-in-time resource consumption.


    The fastest alternative to a large `DELETE` statement is a `DROP` or `TRUNCATE`
    command. Obviously, we can’t always remove all the contents of a table. But if
    the table is partitioned, we may be able to drop only a single partition. For
    example, if we have to delete from large tables to remove old rows, we could set
    up the table as interval partitioned by date and simply drop the oldest partitions.


    Another fast alternative to large `DELETE`s is to recreate the entire table, minus
    the rows we want to delete. If we create the table with the `NOLOGGING` option
    and insert data with the `APPEND` hint, we can avoid generating costly redo and
    undo data. The problem with that alternative process is that it’s not trivial
    to recreate tables. Table recreation scripts often forget to handle all the dependencies,
    like comments and grants.


    Tuning large DML gets even trickier when our process requires multiple `INSERT`,
    `UPDATE`, and `DELETE` statements. We may need to perform large changes quickly
    but still enable consistent access to the old version of the table. It’s hard
    to get high performance, flexibility, lower resource usage, and consistency all
    at the same time. But Oracle technologies like materialized views and partition
    exchanging can help. Or we could simply use a synonym that points to the original
    table, work on a new table, and then switch the synonym when we’re done.


    Batching can also be implemented with `DBMS_PARALLEL_EXECUTE`, parallel pipelined
    functions, and `DBMS_SCHEDULER`. Those advanced options are useful, but don’t
    get carried away with them. For example, parallel pipelined functions are a great
    option for parallelizing procedural code. But that advanced feature still isn’t
    going to perform as fast as a single, parallel SQL statement.


    We don’t always need to sacrifice performance, availability, or consistency. In
    a data warehouse, the only thing we need to sacrifice is the extra time to build
    advanced solutions.


    ## Database Tuning


    Database tuning is a large topic, and condensing the 396-page *Database Performance
    Tuning Guide* into a few pages doesn’t do the topic justice. This book focuses
    on SQL tuning, and database tuning is usually a task for a DBA instead of a developer.
    But we can’t completely ignore database turning; there is considerable overlap
    between the two topics because database performance is mostly the sum of SQL performance.
    For developers, the most important database tuning topics are measuring performance,
    Automatic Workload Repository,^([^(40)](#fn40)) Active Session History, Automatic
    Database Diagnostic Monitor (ADDM), and advisors.'
