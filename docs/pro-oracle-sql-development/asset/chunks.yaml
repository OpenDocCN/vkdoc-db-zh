  trans: '

    ### 自适应游标共享与自适应统计信息


    执行计划可能会在运行时根据绑定变量、先前运行记录以及从其他查询收集的信息而发生变化。通过`FILTER`操作，我们已经初步体验了 Oracle 动态执行计划的能力。Oracle
    的近期版本引入了许多新的动态优化功能。


    `自适应游标共享`允许一条 SQL 语句根据绑定变量拥有多个执行计划。回顾之前的示例查询：`SELECT * FROM LAUNCH WHERE SITE_ID
    = 1895`。该查询并不完全符合实际场景；实践中我们几乎肯定会使用绑定变量，而不是硬编码字面量。


    在无法直接访问字面量的情况下，基数的估算可能会变得显著困难。如果将`1895`替换为`:SITE_ID`，Oracle 如何知道该谓词是否具有高选择性（从而适合使用索引），还是选择性低（从而更适合全表扫描）？


    解决方案在于：Oracle 可以窥探绑定变量值来创建首个执行计划。如果相关列数据存在数据倾斜并已建立直方图，优化器会记录下来以便下次检查绑定变量。在下次运行时，如果绑定变量值呈现不同的倾斜分布，Oracle
    将创建另一个执行计划。


    `自适应统计信息`可以通过在运行时收集统计信息来改变计划。这些功能大多默认禁用，参数`OPTIMIZER_ADAPTIVE_STATISTICS`默认值为`false`。在数据仓库环境中，如果值得花费额外时间构建执行计划，启用这些功能可能是有价值的。


    `动态统计信息`（亦称动态采样）可用于弥补缺失或不足的优化器统计信息。在 SQL 语句运行前，如果统计信息缺失，动态采样会基于少量数据块收集统计信息。


    动态采样非常重要，且通过参数`OPTIMIZER_DYNAMIC_SAMPLING`进行调优可能较为棘手。但我们几乎肯定希望启用此功能，以便在表完全缺失统计信息时至少能收集动态统计数据。得益于动态采样，缺失统计信息要优于错误的统计信息。Oracle
    可以补偿缺失的统计信息，但错误的统计信息会被采信。执行计划注释部分中出现的动态采样通常意味着我们忘记了收集统计信息。执行计划中出现“dynamic statistics
    used: dynamic sampling (level=2)”这一短语是一个重要的危险信号。


    `自动重优化`（在 11g 中称为基数反馈）有助于改进同一语句的后续执行。对于缺失统计信息或足够复杂的语句，Oracle 会记录不同操作的实际基数。如果实际基数与估算基数存在显著差异，优化器可能会在第二次执行时构建不同的执行计划。


    `SQL 计划指令`存储关于谓词的统计信息。这些信息可在多个查询间共享。优化器能够对简单的等值和范围谓词做出良好的基数估算，但我们不应期望优化器在首次运行时就能预测复杂表达式的结果。借助
    SQL 计划指令，优化器可以从错误中学习。


    ### 自适应查询计划


    自适应查询计划允许 SQL 语句拥有多个执行计划。查询可以根据运行时的实际基数数据选择最佳计划。当 Oracle 在连接操作前添加`STATISTICS COLLECTOR`操作时，该操作会记录实际基数并据此选择最佳计划。此功能极其强大，但也使执行计划更难以解读。


    让我们通过`LAUNCH`与`SATELLITE`表之间的简单连接来创建自适应查询计划示例。以下两个查询对表进行连接，但仅针对特定的发射年份。1970 年有许多发射记录，而
    2050 年则没有任何记录（因为数据集仅到 2017 年）。我们希望第一个查询（针对热门年份）使用哈希连接来处理大量结果，而第二个查询（针对冷门年份）应使用嵌套循环连接来处理少量结果。但谓词的书写方式使
    Oracle 难以准确估算基数：


    ```

    --在热门年份与冷门年份的发射记录查询。

    select * from launch join satellite using (launch_id)

    where to_char(launch.launch_date, ''YYYY'') = ''1970'';

    select * from launch join satellite using (launch_id)

    where to_char(launch.launch_date, ''YYYY'') = ''2050'';

    ```


    我们可以通过多种方式为优化器提供更多信息：可以将谓词重写为更简单的日期范围、创建表达式统计信息、在表达式上创建基于函数的索引等。在旧版 Oracle 中，如果查询引发问题，我们需要考虑这些方法。但在现代版本中，Oracle
    可以动态修正执行计划。


    对于这个更复杂的示例，`EXPLAIN PLAN`命令已不够用。我们不需要查看显示 Oracle 预期执行内容的解释计划——我们需要查看显示 Oracle
    实际运行情况的执行计划。


    对于更复杂的 SQL 调优，我们通常需要先找到语句的`SQL_ID`。一旦获得`SQL_ID`，就可以将其输入多种不同程序。


    但找到`SQL_ID`并非总是易事。可能会出现许多误报，特别是因为查询`V$SQL`时会返回对`V$SQL`本身的查询。返回自身源代码的程序称为“自生成程序”。在大多数编程语言中编写自生成程序是一项有趣的挑战，而在
    Oracle SQL 中，创建自生成程序却异常容易，因此我们需要调整查询以避免这种情况。


    以下 SQL 语句可用于查找 1970 年或 2050 年查询的实际执行计划。（为节省空间，我注释掉了其中一个相关谓词，而不是两次显示查询。）


    ```

    --查找 1970 年或 2050 年查询的实际执行计划。

    select * from table(dbms_xplan.display_cursor(

    sql_id =>

    (

    select distinct sql_id from v$sql

    where sql_fulltext like ''%= ''''1970''''%''

    --where sql_fulltext like ''%= ''''2050''''%''

    and sql_fulltext not like ''%quine%''

    ),

    format => ''adaptive'')

    );

    ```


    请注意，前述查询通过使用`DBMS_XPLAN.DISPLAY_CURSOR`而非`DBMS_XPLAN.DISPLAY`获取了实际计划，而非仅仅是估算计划。这个新函数需要`SQL_ID`，该
    ID 通过针对`V$SQL`的子查询获得。为避免自生成程序，子查询需要包含谓词`SQL_FULLTEXT NOT LIKE ''%QUINE%''`。最后，要获取自适应查询计划详情，必须使用参数`FORMAT
    => ''ADAPTIVE''`。面对这些高级动态功能，查找执行计划可能变得棘手。


    如果我们遇到错误“ORA-01427: single-row subquery returns more than one row”，这意味着有多个查询匹配该文本。如果发生此错误，我们需要添加额外的谓词。或者可以分步执行`SELECT
    * FROM V$SQL`来查找`SQL_ID`。

    '
- fmt: '以下是对给定文本的排版结果：


    The following is the execution plan for the 1970 query. Adaptive plans include
    all possible operations and use a hyphen to mark the inactive operations. Notice
    how the following plan has a `NESTED LOOPS` operation. But those operations are
    inactive, and instead a `HASH JOIN` is used, which is more appropriate for joins
    that involve a large number of rows:


    ```

    -----------------------------------------...-

    |   Id  | Operation                     |...|

    -----------------------------------------...-

    |     0 | SELECT STATEMENT              |...|

    |  *  1 |  HASH JOIN                    |...|

    |-    2 |   NESTED LOOPS                |...|

    |-    3 |    NESTED LOOPS               |...|

    |-    4 |     STATISTICS COLLECTOR      |...|

    |  *  5 |      TABLE ACCESS FULL        |...|

    |- *  6 |     INDEX RANGE SCAN          |...|

    |-    7 |    TABLE ACCESS BY INDEX ROWID|...|

    |     8 |   TABLE ACCESS FULL           |...|

    -----------------------------------------...-

    ...

    Note


    - this is an adaptive plan (rows marked ''-'' are inactive)

    ```


    If we change the `DBMS_XPLAN` query to look for 2050 instead of 1970, we get the
    following execution plan. Now the operations are reversed – `NESTED LOOPS` is
    active, and `HASH JOIN` is deactivated. There are no rows yet for the year 2050,
    so a `NESTED LOOPS` operation is ideal:


    ```

    -----------------------------------------...-

    |   Id  | Operation                     |...|

    -----------------------------------------...-

    |     0 | SELECT STATEMENT              |...|

    |- *  1 |  HASH JOIN                    |...|

    |     2 |   NESTED LOOPS                |...|

    |     3 |    NESTED LOOPS               |...|

    |-    4 |     STATISTICS COLLECTOR      |...|

    |  *  5 |      TABLE ACCESS FULL        |...|

    |  *  6 |     INDEX RANGE SCAN          |...|

    |     7 |    TABLE ACCESS BY INDEX ROWID|...|

    |-    8 |   TABLE ACCESS FULL           |...|

    -----------------------------------------...-

    ...

    Note


    - this is an adaptive plan (rows marked ''-'' are inactive)

    ```


    We need to understand dynamic optimizations because we need to know when we’re
    not looking at the real execution plan. And if we don’t see dynamic execution
    plans, we’re potentially missing out on great optimizations. A lack of dynamic
    execution plans implies there are incorrectly set parameters, perhaps for `OPTIMIZER_FEATURES_ENABLE`,
    `COMPATIBLE`, or `CURSOR_SHARING`.


    These dynamic options are silently running in the background and improving a huge
    number of statements without any intervention. But sometimes, providing additional
    and more accurate information can lead to a *worse* execution plan. These performance
    degradations are often the only time when developers and administrators directly
    see these optimizations happening.


    Unfortunately, it is all too common for developers and administrators to disable
    features for everyone just because they encountered one minor problem with a feature.
    We must resist the urge to change something at the *system* level when we could
    fix the same problem at the *query* level. Dynamic optimizations don’t have to
    be perfect to be useful. Do not disable dynamic optimizations unless you are sure
    they are causing more than one problem.


    ## Summary


    This chapter is only a brief summary of many complicated topics. Even the 878-page
    *SQL Tuning Guide* and the 396-page *Database Performance Tuning Guide* do not
    cover everything we need to know. My goal is merely to introduce you to multiple
    ways of thinking about SQL performance concepts. Execution plans, operations,
    cardinality, transformations, and dynamic optimizations build a great foundation
    for becoming a SQL tuning expert.


    Inevitably, we will abuse many of the concepts in this chapter and either solve
    the wrong problem or try to solve the right problem the wrong way. We’re going
    to make epic mistakes and waste a lot of time. We need to appreciate the complexity
    of performance tuning and have the humility to admit when we’re mistaken. For
    every SQL tuning problem, there is an answer that is clear, simple, and wrong.


    We must embrace multiple ways of thinking about performance tuning and adapt a
    breadth-first approach to problem solving. As developers, we dream of having that
    one perfect idea for a new program, instead of having ten good ideas for mediocre
    programs. We need to reverse that attitude for performance tuning and learn how
    to quickly try the ten good ideas.


    Footnotes [1](#471418_2_En_17_Chapter.xhtml#Fn1_source)   [2](#471418_2_En_17_Chapter.xhtml#Fn2_source)


    # 18. Improve SQL Performance


    It’s time to use our theories and start building practical SQL tuning solutions.
    This chapter starts with high-level applications and then drills down through
    databases and SQL statements, until we get to operations.


    Before we start looking for opportunities to improve performance, we all need
    to agree to do something: stop guessing. We should *never* have to guess what
    program is slow, what database is slow, what statement is slow, or what operation
    is slow. No matter what part of our technology stack we are investigating, there
    are multiple tools that can easily and precisely tell us what is slow. If we ever
    find ourselves guessing what is slow, we’re making a mistake.


    Performance tuning must be guided by numbers, not guesses. Without objective measures
    we will become afflicted with Compulsive Tuning Disorder. We must focus on the
    part of the system that is slow, and we must strenuously resist the temptation
    to tune things that won’t help. It’s great to refactor and to challenge ourselves
    to learn more. But when we’re confronted by an urgent performance problem, we
    need to focus on the numbers instead of only fixing things that feel slow or are
    easy to fix.


    We earn the right to guess after years of skepticism, measuring, and testing.
    It takes a while to build a good intuition that we can use for quick breadth-first
    searches of performance fixes. But experts still need the humility to know that
    their guesses could be wrong.


