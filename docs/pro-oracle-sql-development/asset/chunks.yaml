  trans: '

    ## 行模式匹配


    行模式匹配是在数据中寻找模式的一种强大方法。`REGEXP` 函数支持在单个值内搜索正则表达式。分析函数可用于查找简单的行模式，例如连续或非连续的值。而 `MATCH_RECOGNIZE`
    子句则让我们能够使用正则表达式来查找行间的复杂模式。


    例如，我们可以利用行模式匹配来帮助我们发现每年发射次数中的模式。虽然分析函数可以找出发射次数下降或上升的年份，但对于寻找更具体的模式来说，分析函数就不够用了。以下代码使用行模式匹配来找出发射次数连续两年或更久下降的年份：


    ```

    --发射次数连续两年或更久下降的年份。

    select *

    from

    (

    --每年发射次数统计。

    select

    to_char(launch_date, ''YYYY'') the_year,

    count(*) launch_count

    from launch

    group by to_char(launch_date, ''YYYY'')

    order by the_year

    )

    match_recognize

    (

    order by the_year

    measures

    first(down.the_year) as decline_start,

    last(down.the_year) as decline_end

    one row per match

    after match skip to last down

    --下降持续两年或更久。

    pattern (down down+)

    define

    down as down.launch_count < prev(down.launch_count)

    )

    order by decline_start;

    DECLINE_START   DECLINE_END

    -------------   -----------

    ...

    1977          1978

    1980          1986

    1988          1996

    ...

    ```


    `MATCH_RECOGNIZE` 的语法比较冗长，因此我让前面的大部分代码来自我说明。查询中最有趣的部分是我们定义正则表达式的地方：`PATTERN (DOWN
    DOWN+)`。一旦初始查询构建完成，尝试不同的模式就很容易了。我们可以轻松地找出发射次数连续增长的年份序列，或者发射次数来回波动的年份序列等。


    ## ANY 类型


    如果我们事先不知道数据的样子，就需要有处理“任意”数据的能力。Oracle 提供了三种对象类型，可以帮助我们传递和处理完全通用的数据。`ANYDATA` 包含一个任意类型的单一值，`ANYTYPE`
    包含有关数据的类型信息，而 `ANYDATASET` 则包含任意类型数据的集合。


    例如，以下函数接受一个 `ANYDATA` 并返回其内部存储值的文本版本。这个函数并不是很有用，因为即使创建一个简单的 `ANYDATA` 示例也需要很多奇怪的代码：


    ```

    --使用 ANYDATA 处理“任意”数据的函数。

    create or replace function process_anything(p_anything anydata)

    return varchar2

    is

    v_typecode pls_integer;

    v_anytype anytype;

    v_result pls_integer;

    v_number number;

    v_varchar2 varchar2(4000);

    begin

    --获取 ANYTYPE。

    v_typecode := p_anything.getType(v_anytype);

    --检查类型并进行相应处理。

    if v_typecode = dbms_types.typecode_number then

    v_result := p_anything.GetNumber(v_number);

    return(''Number: ''||v_number);

    elsif v_typecode = dbms_types.typecode_varchar2 then

    v_result := p_anything.GetVarchar2(v_varchar2);

    return(''Varchar2: ''||v_varchar2);

    else

    return(''Unexpected type: ''||v_typecode);

    end if;

    end;

    /

    ```


    以下查询显示我们可以在运行时选择数据类型：


    ```

    --从 SQL 中调用 PROCESS_ANYTHING。

    select

    process_anything(anydata.ConvertNumber(1)) result1,

    process_anything(anydata.ConvertVarchar2(''A'')) result2,

    process_anything(anydata.ConvertClob(''B'')) result3

    from dual;

    RESULT1     RESULT2       RESULT3

    ---------   -----------   --------------------

    Number: 1   Varchar2: A   Unexpected type: 112

    ```


    在实践中，SQL 或 PL/SQL 中大多数高度通用的编程都是错误的。要对数据做任何有意义的事情，我们都必须对数据的样子有所了解。`ANY` 类型虽然简洁，但存在一些奇怪的错误和性能问题。在我们投入过多精力使用
    `ANY` 类型的解决方案之前，应该确保程序可以扩展。几乎所有的数据库处理都应该用简单的字符串、数字和日期来完成。与其创建一个能接受任何数据的智能函数，不如为每种类型动态生成一个简单的函数。


    ## APEX


    Application Express (`APEX`) 是一个免费的基于 Web 的开发环境，用于创建网站。`APEX` 与 Oracle 数据库无缝集成，使得为数据创建前端界面几乎变得轻而易举。


    要重现本节中的示例，我们需要在数据库上安装 `APEX` 或者在 `https://apex.oracle.com` 创建一个免费账户。安装或创建账户后，我们需要创建一个工作区，它是应用程序的集合。然后，我们需要创建一个应用程序，它是页面的集合。


    在应用程序内部，有两个主要实用工具——SQL Workshop 和 App Builder。在 SQL Workshop 中，我们可以快速创建、编辑和运行
    SQL 查询以及 SQL*Plus 脚本。


    如果您在本地数据库上安装了 `APEX`，那么 `APEX` 已经可以访问太空数据集。如果您使用的是 Oracle 的网站，则需要加载一些示例数据；有关少量示例数据，请参阅
    GitHub 仓库中本章的工作表。在 Oracle 的网站上，您需要创建一个脚本，复制并粘贴仓库中的命令，然后运行该脚本。


    数据加载完成后，我们进入 `APEX` 最重要的部分——App Builder。创建应用程序只需几次简单的点击，接下来就是创建页面了。为了展示创建页面有多么简单，以下是完整的步骤：点击“创建页面”，点击“交互式报告”，在页面名称中输入“Launch”，点击两次“下一步”，从下拉列表中选择
    `LAUNCH` 表，然后点击“创建”。要查看页面，请点击“运行页面”按钮并输入用户名和密码，然后我们应该能看到类似图 19-2 的内容。


    ![](img/471418_2_En_19_Fig2_HTML.png)


    太空菜单片段，包含主页和发射部分。可以看到搜索选项、操作按钮以及发射 ID、发射标签、发射类别和发射状态等表列。


    图 19-2


    `APEX` 发射报告


    这个简单的例子仅仅触及了 `APEX` 功能的皮毛。我们可以使用 `APEX` 来构建复杂的交互式表单、报告、图表、REST 服务、自定义身份验证，或者任何在现代网站上可能看到的功能。简单的页面可以通过几次点击构建。中等复杂度的页面可以使用我们的
    SQL 技能来定义数据。高级页面则可以使用自定义 SQL、PL/SQL、CSS 和 JavaScript。


    如果我们想快速为 Oracle 数据库创建一个前端界面，`APEX` 是一个绝佳的选择。即使我们不想构建网站，安装 `APEX` 也能让我们使用几个实用的
    PL/SQL 包。例如，强大的 `APEX_DATA_PARSER` 非常适合声明式地读取几种常见的文件类型。

