- fmt: '### Other


    Many operations are straightforward and don’t tell us any actionable information.
    For example, the `SEQUENCE` operation is self-explanatory. But that doesn’t mean
    we can ignore those operations; if a `SEQUENCE` operation is slow, then we should
    examine the sequence settings, like the cache size.


    Some operations are repeated multiple times, making it difficult to monitor the
    progress of SQL statements. For example, a `NESTED LOOPS` join may call child
    operations a large number of times. Repetition can also happen with operations
    like `CONNECT BY` and `RECURSIVE WITH PUMP`. The progress estimates provided by
    `V$SESSION_LONGOPS` are meaningless if we don’t know how many times an operation
    will repeat.


    `REMOTE` operations also deserve special attention. Joining data on the same database
    is hard enough; pulling information across database links is powerful but potentially
    slow.


    Operations may help explain how our query was transformed into a different query
    before execution. The `VIEW` operation is just a logical grouping of operations
    and may be an inline view or a schema object view. The operation `VIEW PUSHED
    PREDICATE` is telling us that one of the predicates in the main query was pushed
    into one of the subqueries. Predicate pushing is usually a good thing, but we
    want to know when our query is being rewritten in case we need to stop that transformation.


    A single operation can represent a call to another programming language, which
    could represent an almost infinite amount of work. `XMLTABLE EVALUATION`, `XPATH
    EVALUATION`, `JSONTABLE EVALUATION`, and `MODEL` represent languages embedded
    in SQL. The most common non-SQL operation is `COLLECTION ITERATOR`, which represents
    rows being generated by a PL/SQL table function. We should be skeptical of execution
    plans that involve non-SQL languages. The optimizer does a great job of estimating
    times and building execution plans for declarative code. But the optimizer is
    almost completely blind to how procedural code will work, and it has to make wild
    guesses.


    `TEMP TABLE TRANSFORMATION` occurs when a common table expression is turned into
    a temporary table. If the common table expression is called more than once, it
    may be cheaper for Oracle to store the results in a temporary table than to rerun
    the query.


    ## Cardinality and Optimizer Statistics (Building Execution Plans I)


    Cardinality and optimizer statistics are the keys to understanding how Oracle
    decides which operations to use in an execution plan. Cardinality refers to the
    number of items, like the number of rows or the number of distinct values. Optimizer
    statistics are what Oracle uses to estimate the cardinality.


    The tough part of building execution plans is deciding when one set of algorithms
    and data structures outperform another. As Chapter [16](#471418_2_En_16_Chapter.xhtml)
    visually demonstrated, the fastest algorithm often depended on the “input size”
    of the X axis. In Oracle, that input size is the cardinality. The only way to
    know which operations are the fastest is to accurately estimate the cardinality.


    This section tries to convince you to focus on the cardinality of execution plans
    and the importance of good optimizer statistics. The next chapter discusses how
    to gather those statistics to fix bad cardinality estimates.


    ### Cardinality Is Important


    The word `cardinality` has two slightly different meanings in Oracle. Cardinality
    means the number of rows returned. Cardinality can also mean the number of *distinct*
    rows returned. A high-cardinality column like a primary key has many distinct
    values, and a low-cardinality column like a status code has few distinct values.


    The following are two simple examples showing the cardinality of two drastically
    different plans. First, let’s find all the launches that took place at the White
    Sands Missile Range, an important military testing area in New Mexico. (For brevity,
    the examples use a hard-coded `SITE_ID`.) White Sands is a popular launch site
    with 6590 launches. As we can see from the “Rows” column in the following explain
    plan, the optimizer estimates that White Sands has 6924 launches. (The estimated
    cardinality may be different on your machine.) The estimate is not perfect, but
    it’s good enough for Oracle to understand that this query returns a large percentage
    of rows from the `LAUNCH` table. Therefore, Oracle builds an execution plan with
    a full table scan:


    ```

    --Full table scan example.

    explain plan for select * from launch where site_id = 1895;

    select * from table(dbms_xplan.display(format => ''basic +rows''));


    |Id|Operation         |Name  |Rows |


    | 0|SELECT STATEMENT  |      | 6924|

    | 1| TABLE ACCESS FULL|LAUNCH| 6924|


    ```


    Let’s change the query to count the launches from a remote pad on Johnston Island.
    This site was used for Operation Fishbowl, which can be summarized as “let’s blow
    up a thermonuclear weapon in space and see what happens.” Unsurprisingly, the
    military only used that launch site once. Oracle estimates the condition will
    return 14 rows, which is a small enough percentage to warrant an index range scan:


    ```

    --Index range scan example.

    explain plan for select * from launch where site_id = 780;

    select * from table(dbms_xplan.display(format => ''basic +rows''));


    |Id|Operation                           |Name       |Rows |


    | 0|SELECT STATEMENT                    |           |   14|

    | 1| TABLE ACCESS BY INDEX ROWID BATCHED|LAUNCH     |   14|

    | 2|  INDEX RANGE SCAN                  |LAUNCH_IDX2|   14|


    ```


    Without any intervention, Oracle correctly knows when to use a full table scan
    and when to use an index range scan. Most of the time, everything works out fine,
    but we can’t take this magic for granted. We need to understand exactly what’s
    going on so we can fix things when the system breaks. As you can imagine, real
    execution plans can get much more complicated than this.


    Oracle needs to understand the cardinality (distinctness) of the columns and expressions
    to estimate the final cardinality of each operation (the number of rows returned).
    Estimating a single equality condition is tricky enough, but our SQL statements
    also have ranges, compound expressions, etc.


    Luckily, when we focus on cardinality, there are a bunch of things we don’t need
    to worry about. We don’t need to worry about the time it takes to execute functions
    or expressions. If we were doing scientific programming, we might look for small
    loops and try to find tiny performance differences between functions like `SUBSTR`
    vs. `REGEXP_SUBSTR`. In database programming, the time to process data in the
    CPU is almost always irrelevant compared with the time it takes to read the data.
    We need to worry about the algorithms used to read and process our data, not the
    speed of small function calls. (However, there are exceptions; if we call a custom
    PL/SQL function a billion times, then we need to worry about context switching
    and the performance of the function.)


    Comparing estimated cardinalities with actual cardinalities is the best way to
    know if a plan is good. (The simple techniques for finding the actual cardinalities
    are discussed in the next chapter.) If all the relevant objects are available,
    such as indexes, and the estimates are accurate, there’s a good chance the plan
    is optimal. Part of SQL tuning is finding out when and why the cardinality estimate
    is wrong. Another part of SQL tuning is thinking about better operations and how
    to make them available. Creating better paths for the optimizer requires understanding
    the available operations and understanding all the Oracle features and data structures
    that enable them. For example, if our query has a slow nested loop operation,
    we may need to rewrite a condition into an equality condition to enable a hash
    join operation.'
