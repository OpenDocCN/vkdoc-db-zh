  trans: '

    ### 切勿使用错误的类型


    当一个 EAV 表仅使用一个*单一*列来存储所有值时，就会出现这种反模式。*关系型*数据库为数不多的绝对规则之一是，我们绝不能将数据存储为错误的类型。唯一的例外是使用暂存表在数据被清理并移至真实表之前临时保存数据。即使我们拥有像
    XML 或 JSON 这样的非结构化数据，我们仍然可以将其存储为`XMLType`或使用`IS JSON`检查约束。我们绝不能创建如下所示的 EAV 表：


    ```

    --切勿创建这样的表：

    create table bad_eav

    (

    id     number primary key,

    name   varchar2(4000),

    value  varchar2(4000)

    );

    insert into bad_eav values (1, ''Name''         , ''Eliver'');

    insert into bad_eav values (2, ''High Score''   , 11);

    insert into bad_eav values (3, ''Date of Birth'', ''2011-04-28'');

    ```


    将所有值存储为`VARCHAR2(4000)`是我们在数据库中可能犯的最严重的错误之一。由于数据库不再能确保类型安全，我们必须实现自己的逻辑来确保数字和日期格式正确。（如
    7 章所讨论的，验证数字和日期格式并非易事，尤其是当我们考虑到国际化和本地化时。）每次我们使用类型不正确的值时，都必须记得使用正确的转换函数。数字和日期值将比其原生值占用更多空间。优化器将完全无法对这些值进行推理，并且很难构建出好的执行计划。


    将所有值存储为字符串的系统被戏称为“字符串类型”（这是基于“强类型”一词的双关语）。这个问题可能出现在很多地方；列、参数、变量和表达式都可能被错误地当作字符串处理。这个问题很棘手，因为隐式转换在*大多数*情况下都能工作。在测试中很容易忽略这些问题，导致缺陷突然出现在生产环境中。


    ### Oracle SQL 中的隐蔽转换错误


    字符串类型数据在 Oracle SQL 中尤其糟糕，因为它会产生隐蔽的、非确定性的错误。例如，看看下面的代码。我通常不喜欢考读者，但在这种情况下，我希望你尝试找出其中的错误：


    ```

    --一个针对字符串类型 EAV 的简单查询，很可能会失败。

    select *

    from bad_eav

    where name = ''Date of Birth''

    and value = date ''2011-04-28'';

    ```


    前面的查询很可能会失败，并显示错误信息“ORA-01861: 字面值与格式字符串不匹配”。根据《*SQL 语言参考手册*》中的隐式数据类型转换规则，Oracle
    会尝试将字符串列`VALUE`转换为日期，以匹配日期字面量。（不必费心去记忆隐式数据类型转换规则——最好的解决方案是首先避免使用隐式数据类型转换。）但是，只有在我们的服务器或客户端日期格式设置为与填充表时使用的格式类似时，将`VALUE`从字符串转换为日期的操作才能成功。


    对于前面的错误，一个常见但糟糕的解决方案是更改客户端或服务器上的日期格式。运行`ALTER SESSION SET NLS_DATE_FORMAT = ''YYYY-MM-DD''`将使
    Oracle 能够正确地将某些字符串转换为日期。但现在，我们却要永远与客户端设置作斗争。我们无法合理地期望每个工具和每个用户都始终以特定的方式设置日期格式参数。


    另一个常见但糟糕的解决方案是对`VALUE`列进行简单的显式日期转换：


    ```

    --一种隐秘的、错误的查询坏 EAV 表的方式。

    select *

    from bad_eav

    where name = ''Date of Birth''

    and to_date(value, ''YYYY-MM-DD'') = date ''2011-04-28'';

    ```


    前面查询的一个明显问题是，表中的“出生日期”值必须始终格式正确。一个格式错误的日期字符串可能会破坏许多查询。由于这是一个通用列，很难通过约束来防止不良值。而且，由于该列可能有多种用途，可能还有许多其他写入该列的代码需要我们进行验证。


    如果 EAV 表中的数据格式完美，前面的查询*可能*会工作。但该查询仍然*不能保证*工作，因为 Oracle 可能会不按顺序执行最后两个谓词。`TO_DATE`函数只能成功处理“出生日期”；如果它对“姓名”或“最高分”运行，将会失败。即使表中的数据是完美的，根据执行顺序的不同，查询也会失败。


    编写此查询的最佳方式是使用新的 12.2 转换错误语法。下面查询中的语法稍微复杂一些，但它是查询该表最安全的方式。不幸的是，即使这个新语法在少数特定情况下也无效，^(³¹)但至少当语法失败时，它会一致地失败：


    ```

    --新的类型安全方式来查询字符串类型的 EAV。

    select *

    from bad_eav

    where name = ''Date of Birth''

    and to_date(value default null on conversion error, ''YYYY-MM-DD'') = date ''2011-04-28'';

    ```


    如果我们受限于使用 12.2 之前的版本，解决方案会变得更加棘手。没有改进的转换语法，我们必须强制指定特定的查询执行顺序，这很困难。仅仅重新排序查询是无效的，而提示（hints）也很难正确设置。查询坏
    EAV 表的少数安全方法之一是使用第 12 章讨论的`ROWNUM`技巧：


    ```

    --旧的类型安全方式来查询字符串类型的 EAV。

    select *

    from

    (

    select *

    from bad_eav

    where name = ''Date of Birth''

    and rownum >= 1

    )

    where to_date(value, ''YYYY-MM-DD'') = date ''2011-04-28'';

    ```


    用单一的`VALUE`列替换`STRING_VALUE`、`NUMBER_VALUE`和`DATE_VALUE`这三列，我们得到了什么？什么也没有。实际上，我们很少遇到数据如此通用，以至于我们甚至懒得去了解其类型的情况。即使我们只打算在屏幕上显示数据，我们仍然需要知道类型，以便能够正确地对显示的值进行对齐和格式化。如果我们有非结构化文档，我们可以创建另一个名为`XML_VALUE`的
    EAV 列，并将该列设为`XMLType`。


    类型不正确的数据是一种可怕的状况，我们绝不应该陷入其中。使用错误的数据类型可能会注定我们以及所有未来的 SQL 开发人员不得不编写奇怪的查询并处理棘手的随机错误。我们必须每次都使用正确的数据类型，这样我们就不必担心这些问题。


    我曾多次目睹字符串类型数据的长期负面影响。一些系统会随机生成类型错误，没有人能可靠地重现，于是每个人都学会了忍受它。在其他系统上，我们不得不为任何触及 EAV
    的查询添加保护层。另一方面，有些系统可以侥幸避免问题；也许他们的数据只以一种特定的方式被访问，或者他们只是运气好。但我们不应该设计需要运气的系统，所以请多花一分钟创建几个额外的列。

    '
- fmt: "## Avoid Soft Coding\n\nAll developers understand the importance of avoiding\
    \ hard-coding. We’re always looking for ways to create abstractions that hide\
    \ our code from implementation details. We want to be able to change our program’s\
    \ behavior without changing a lot of code and without recompiling. In SQL, we\
    \ can improve the safety and performance of our queries by using bind variables\
    \ instead of hard-coding literals. But any best practice can be taken too far;\
    \ an unhealthy aversion to changing code can lead to the soft coding anti-pattern.\n\
    \nWe all want to make our programs smart and flexible. As we discussed in Chapter\
    \ [14](#471418_2_En_14_Chapter.xhtml), our code can be *too* smart. It’s better\
    \ to automatically generate simple code with dynamic SQL than to create a super-complex\
    \ block of code with esoteric PL/SQL. As we saw in the previous section, our tables\
    \ can be *too* flexible. The most flexible database schema is a single EAV table,\
    \ but that would be a nightmare to query. Building the mother of all EAV tables\
    \ would eliminate the need to ever run a DDL command, but that solution would\
    \ create a database in a database.\n\nWe don’t want to build an infinitely generic,\
    \ infinitely configurable program. Any sufficiently advanced configuration is\
    \ indistinguishable from a programming language. If we try too hard to avoid programming,\
    \ we’re only going to invent a new programming language…poorly. This anti-pattern\
    \ is sometimes called the inner-platform effect.\n\nThings like variable lookups,\
    \ table-driven configuration, and parameterizing programs are great ideas. But\
    \ we must not take those ideas to extremes. We don’t want to reinvent SQL and\
    \ PL/SQL with configuration files or tables.\n\nI wish I could tell you that this\
    \ section is merely theoretical. But unfortunately, I have wasted much of my life\
    \ trying to tame different soft-coded rule engines. And I have spent a lot of\
    \ time unintentionally recreating PL/SQL…poorly.\n\nThere are times when we need\
    \ to build configurable engines. But we must have an excellent reason for doing\
    \ so, we must carefully limit the scope, and we should build them with dynamic\
    \ SQL instead of obscure PL/SQL features.\n\n## Avoid Object-Relational Tables\n\
    \nOracle is a converged database that supports multiple programming paradigms.\
    \ We have to be careful when mixing paradigms because not all combinations are\
    \ useful. Storing data in a relational model and accessing that data with procedural\
    \ code work fine. And mixing procedural code with object-oriented programming\
    \ works fine. But storing object-oriented data in relational tables is a bad idea.\n\
    \nObject types are useful for processing and passing data into PL/SQL. Ideally,\
    \ we want to do all our processing in SQL, but that’s not always realistic. To\
    \ help integrate SQL with PL/SQL, we can create an object type to hold a record\
    \ of data. If we want to store or process multiple records at once, we can create\
    \ a nested table type of that object type. The following code shows a simple example\
    \ of creating object types:\n\n```sql\n--Object type to hold a record of satellite\
    \ data.\ncreate or replace type satellite_type is object\n(\n  satellite_id number,\n\
    \  norad_id     varchar2(28)\n  --Add more columns here.\n);\n--Nested table to\
    \ hold multiple records.\ncreate or replace type satellite_nt is table of satellite_type;\n\
    ```\n\nOur problems begin when we use `SATELLITE_TYPE` or `SATELLITE_NT` for storing\
    \ data in tables. Saving object types in tables is marketed as a simple extension\
    \ of the relational model. But storing object types is more like a betrayal of\
    \ the relational model. Object types can be almost infinitely complex, which means\
    \ our columns no longer have atomic values.\n\nAs soon as we start creating object-relational\
    \ tables, the complexity of our data model increases significantly. We can no\
    \ longer rely on the huge number of tools that support the traditional data types.\
    \ And we can no longer rely on an army of existing developers who know SQL.\n\n\
    To follow the spirit of the relational model, we should keep our columns and tables\
    \ dumb and make our schemas smart. With object-relational tables, a single column\
    \ can be confusing. Trivial things like inserting data or joining tables become\
    \ ridiculously complex. If we can’t easily join our data, there’s no point in\
    \ using a relational database.\n\nThere are other practical concerns with object-relational\
    \ technology. If we mix code and data too tightly, it becomes painful to change\
    \ either one of them. You don’t want to learn object-relational programming the\
    \ hard way; if we change the wrong `code`, we can permanently destroy our `data`.\
    \ Object databases were a fad in the 1990s, and Oracle rode that wave, but the\
    \ technology hasn’t been significantly upgraded for a long time.\n\nObject types\
    \ are fine for PL/SQL collections, but we should keep them out of our tables.\n\
    \n## Avoid Java in the Database\n\nThe primary languages of Oracle databases are\
    \ SQL and PL/SQL. Despite what the official sources claim, Java in the database\
    \ is a distant third place and should be avoided when possible.\n\nThis section\
    \ is not a rant about the Java programming language. Java is a popular, powerful\
    \ language and is frequently used with databases. Regardless of how great Java\
    \ is, there are several reasons to avoid putting Java stored procedures `inside`\
    \ an Oracle database.\n\n### Java Is Not Always Available\n\nThe biggest problem\
    \ with using Java inside Oracle is that Java is not always available. Oracle owns\
    \ Java and has been advertising Java in the database for decades, but in practice\
    \ we cannot dependably rely on Java being installed.\n\nJava is not available\
    \ for the Express Edition. I’m not a fan of Express Edition, but a lot of people\
    \ use it, so this lack of support is a showstopper for many products.\n\nJava\
    \ is an optional component in all other database editions. Java is installed by\
    \ default, but the component is frequently deselected or removed by DBAs. The\
    \ Java component is often removed because it can cause problems during patching\
    \ and upgrades. And unfortunately, the Java components are not trivial to reinstall\
    \ and may require planning and downtime. And recent versions of Oracle have made\
    \ this even worse – Java patching isn’t even included in normal database patching\
    \ anymore. Some cloud service providers, such as Amazon RDS, didn’t allow the\
    \ Java option until recently and still place limitations on how it’s used.\n\n\
    ### Java Does Not Fit Perfectly\n\nIt may seem unfair to fault a product for not\
    \ integrating perfectly. But when SQL and PL/SQL integrate so seamlessly, it’s\
    \ hard not to get annoyed when dealing with Java stored procedures.\n\nThe types\
    \ don’t perfectly match. There’s nothing wrong with Java types, but whenever we\
    \ pass data back and forth, we have to worry about string sizes, character sets,\
    \ precision, etc.\n\nJava object names are case sensitive and long, which is especially\
    \ annoying in versions before 12.2 that only supported names up to 30 bytes long.\
    \ The object names may look different in the data dictionary, and many DBA scripts\
    \ fail to properly handle Java objects. This problem can be fixed by translating\
    \ the names with `DBMS_JAVA.LONGNAME`, but constantly translating names is a pain."
  raw: '## Avoid Soft Coding


    All developers understand the importance of avoiding hard-coding. We’re always
    looking for ways to create abstractions that hide our code from implementation
    details. We want to be able to change our program’s behavior without changing
    a lot of code and without recompiling. In SQL, we can improve the safety and performance
    of our queries by using bind variables instead of hard-coding literals. But any
    best practice can be taken too far; an unhealthy aversion to changing code can
    lead to the soft coding anti-pattern.


    We all want to make our programs smart and flexible. As we discussed in Chapter
    [14](#471418_2_En_14_Chapter.xhtml), our code can be *too* smart. It’s better
    to automatically generate simple code with dynamic SQL than to create a super-complex
    block of code with esoteric PL/SQL. As we saw in the previous section, our tables
    can be *too* flexible. The most flexible database schema is a single EAV table,
    but that would be a nightmare to query. Building the mother of all EAV tables
    would eliminate the need to ever run a DDL command, but that solution would create
    a database in a database.


    We don’t want to build an infinitely generic, infinitely configurable program.
    Any sufficiently advanced configuration is indistinguishable from a programming
    language. If we try too hard to avoid programming, we’re only going to invent
    a new programming language…poorly. This anti-pattern is sometimes called the inner-platform
    effect.


    Things like variable lookups, table-driven configuration, and parameterizing programs
    are great ideas. But we must not take those ideas to extremes. We don’t want to
    reinvent SQL and PL/SQL with configuration files or tables.


    I wish I could tell you that this section is merely theoretical. But unfortunately,
    I have wasted much of my life trying to tame different soft-coded rule engines.
    And I have spent a lot of time unintentionally recreating PL/SQL…poorly.


    There are times when we need to build configurable engines. But we must have an
    excellent reason for doing so, we must carefully limit the scope, and we should
    build them with dynamic SQL instead of obscure PL/SQL features.


    ## Avoid Object-Relational Tables


    Oracle is a converged database that supports multiple programming paradigms. We
    have to be careful when mixing paradigms because not all combinations are useful.
    Storing data in a relational model and accessing that data with procedural code
    work fine. And mixing procedural code with object-oriented programming works fine.
    But storing object-oriented data in relational tables is a bad idea.


    Object types are useful for processing and passing data into PL/SQL. Ideally,
    we want to do all our processing in SQL, but that’s not always realistic. To help
    integrate SQL with PL/SQL, we can create an object type to hold a record of data.
    If we want to store or process multiple records at once, we can create a nested
    table type of that object type. The following code shows a simple example of creating
    object types:


    ```

    --Object type to hold a record of satellite data.

    create or replace type satellite_type is object

    (

    satellite_id number,

    norad_id     varchar2(28)

    ---Add more columns here.

    );

    --Nested table to hold multiple records.

    create or replace type satellite_nt is table of satellite_type;

    ```


    Our problems begin when we use `SATELLITE_TYPE` or `SATELLITE_NT` for storing
    data in tables. Saving object types in tables is marketed as a simple extension
    of the relational model. But storing object types is more like a betrayal of the
    relational model. Object types can be almost infinitely complex, which means our
    columns no longer have atomic values.


    As soon as we start creating object-relational tables, the complexity of our data
    model increases significantly. We can no longer rely on the huge number of tools
    that support the traditional data types. And we can no longer rely on an army
    of existing developers who know SQL.


    To follow the spirit of the relational model, we should keep our columns and tables
    dumb and make our schemas smart. With object-relational tables, a single column
    can be confusing. Trivial things like inserting data or joining tables become
    ridiculously complex. If we can’t easily join our data, there’s no point in using
    a relational database.


    There are other practical concerns with object-relational technology. If we mix
    code and data too tightly, it becomes painful to change either one of them. You
    don’t want to learn object-relational programming the hard way; if we change the
    wrong *code*, we can permanently destroy our *data*. Object databases were a fad
    in the 1990s, and Oracle rode that wave, but the technology hasn’t been significantly
    upgraded for a long time.


    Object types are fine for PL/SQL collections, but we should keep them out of our
    tables.


    ## Avoid Java in the Database


    The primary languages of Oracle databases are SQL and PL/SQL. Despite what the
    official sources claim, Java in the database is a distant third place and should
    be avoided when possible.


    This section is not a rant about the Java programming language. Java is a popular,
    powerful language and is frequently used with databases. Regardless of how great
    Java is, there are several reasons to avoid putting Java stored procedures *inside*
    an Oracle database.


    ### Java Is Not Always Available


    The biggest problem with using Java inside Oracle is that Java is not always available.
    Oracle owns Java and has been advertising Java in the database for decades, but
    in practice we cannot dependably rely on Java being installed.


    Java is not available for the Express Edition. I’m not a fan of Express Edition,
    but a lot of people use it, so this lack of support is a showstopper for many
    products.


    Java is an optional component in all other database editions. Java is installed
    by default, but the component is frequently deselected or removed by DBAs. The
    Java component is often removed because it can cause problems during patching
    and upgrades. And unfortunately, the Java components are not trivial to reinstall
    and may require planning and downtime. And recent versions of Oracle have made
    this even worse – Java patching isn’t even included in normal database patching
    anymore. Some cloud service providers, such as Amazon RDS, didn’t allow the Java
    option until recently and still place limitations on how it’s used.


    ### Java Does Not Fit Perfectly


    It may seem unfair to fault a product for not integrating perfectly. But when
    SQL and PL/SQL integrate so seamlessly, it’s hard not to get annoyed when dealing
    with Java stored procedures.


    The types don’t perfectly match. There’s nothing wrong with Java types, but whenever
    we pass data back and forth, we have to worry about string sizes, character sets,
    precision, etc.


    Java object names are case sensitive and long, which is especially annoying in
    versions before 12.2 that only supported names up to 30 bytes long. The object
    names may look different in the data dictionary, and many DBA scripts fail to
    properly handle Java objects. This problem can be fixed by translating the names
    with `DBMS_JAVA.LONGNAME`, but constantly translating names is a pain.'
  trans: "## 避免软编码\n\n所有开发者都明白避免硬编码的重要性。我们总是在寻找方法，通过创建抽象来将代码与实现细节隔离开。我们希望能够改变程序的行为，而无需改动大量代码，也无需重新编译。在\
    \ SQL 中，我们可以通过使用绑定变量而不是硬编码字面量来提高查询的安全性和性能。但任何最佳实践都可能被过度应用；对修改代码的不健康排斥可能导致软编码这种反模式。\n\
    \n我们都想让自己的程序智能且灵活。正如我们在第 14 章讨论的，我们的代码可能*过于*智能。使用动态 SQL 自动生成简单代码，比用晦涩的 PL/SQL\
    \ 创建一个超级复杂的代码块要好。正如我们在上一节看到的，我们的表可能*过于*灵活。最灵活的数据库模式是单个 EAV 表，但那将是一场查询的噩梦。构建一个终极的\
    \ EAV 表将消除运行 DDL 命令的需要，但这种解决方案会创造出一个数据库中的数据库。\n\n我们不想构建一个无限通用、无限可配置的程序。任何足够高级的配置都与编程语言无异。如果我们过分努力地避免编程，结果只会糟糕地发明一种新的编程语言……这种反模式有时被称为“内平台效应”。\n\
    \n像变量查找、表驱动配置和程序参数化这样的想法都是很好的。但我们绝不能把这些想法推向极端。我们不希望通过配置文件或表来重新发明 SQL 和 PL/SQL。\n\
    \n我希望我能告诉你，这一节仅仅是理论上的。但不幸的是，我一生中大部分时间都在试图驯服各种软编码的规则引擎上浪费掉了。而且我也花了很多时间，在无意中糟糕地重新创造了\
    \ PL/SQL……\n\n有时我们确实需要构建可配置的引擎。但我们必须有充分的理由这样做，必须仔细限制其范围，并且我们应该使用动态 SQL 而不是晦涩的\
    \ PL/SQL 特性来构建它们。\n\n## 避免对象关系表\n\nOracle 是一个融合数据库，支持多种编程范式。在混合范式时必须小心，因为并非所有组合都是有用的。以关系模型存储数据并使用过程式代码访问该数据运行良好。混合过程式代码与面向对象编程也运行良好。但将面向对象数据存储在关系表中是个坏主意。\n\
    \n对象类型对于处理和将数据传递到 PL/SQL 中很有用。理想情况下，我们希望在 SQL 中完成所有处理，但这并不总是现实的。为了帮助将 SQL 与 PL/SQL\
    \ 集成，我们可以创建一个对象类型来保存一条数据记录。如果我们想一次性存储或处理多条记录，可以创建一个该对象类型的嵌套表类型。以下代码展示了一个创建对象类型的简单示例：\n\
    \n```sql\n--用于保存卫星数据记录的对象类型。\ncreate or replace type satellite_type is object\n\
    (\n  satellite_id number,\n  norad_id     varchar2(28)\n  --在此处添加更多列。\n);\n--用于保存多条记录的嵌套表。\n\
    create or replace type satellite_nt is table of satellite_type;\n```\n\n当我们使用\
    \ `SATELLITE_TYPE` 或 `SATELLITE_NT` 在表中存储数据时，问题就开始了。将对象类型保存在表中被宣传为关系模型的简单扩展。但存储对象类型更像是对关系模型的背叛。对象类型几乎可以无限复杂，这意味着我们的列不再具有原子值。\n\
    \n一旦我们开始创建对象关系表，数据模型的复杂性就会显著增加。我们不能再依赖大量支持传统数据类型的工具。我们也无法再依赖一大批懂 SQL 的现有开发人员。\n\
    \n为了遵循关系模型的精神，我们应该保持我们的列和表简单，而让我们的模式变得智能。对于对象关系表，单个列可能会令人困惑。像插入数据或连接表这样简单的事情会变得异常复杂。如果我们不能轻松地连接我们的数据，那么使用关系数据库就没有意义。\n\
    \n对象关系技术还有其他实际问题。如果我们把代码和数据混合得太紧密，修改其中任何一个都会变得痛苦。你不想以艰难的方式学习对象关系编程；如果我们修改了错误的`代码`，我们可能会永久性地破坏我们的`数据`。对象数据库在\
    \ 20 世纪 90 年代曾风靡一时，Oracle 也赶上了那波浪潮，但这项技术已经很长时间没有重大升级了。\n\n对象类型对于 PL/SQL 集合来说没问题，但我们应该将它们排除在我们的表之外。\n\
    \n## 避免在数据库中使用 Java\n\nOracle 数据库的主要语言是 SQL 和 PL/SQL。尽管官方资料声称如此，Java 在数据库中处于遥远的第三位，应尽可能避免使用。\n\
    \n本节并非对 Java 编程语言的抨击。Java 是一种流行、强大的语言，并经常与数据库一起使用。无论 Java 有多棒，都有几个理由避免将 Java 存储过程`放入`\
    \ Oracle 数据库内部。\n\n### Java 并非总是可用\n\n在 Oracle 内部使用 Java 的最大问题是 Java 并非总是可用。Oracle\
    \ 拥有 Java，并已宣传数据库中的 Java 数十年，但在实践中，我们无法可靠地依赖 Java 已安装。\n\nJava 不适用于快速版（Express\
    \ Edition）。我不是快速版的粉丝，但很多人使用它，因此这种不支持对许多产品来说是致命的障碍。\n\n在所有其他数据库版本中，Java 是一个可选组件。Java\
    \ 默认安装，但该组件经常被 DBA 取消选择或移除。Java 组件经常被移除，因为它可能在修补和升级过程中引起问题。不幸的是，Java 组件并非轻易就能重新安装，可能需要规划和停机时间。最近的\
    \ Oracle 版本使情况变得更糟——Java 修补甚至不再包含在常规数据库修补中。一些云服务提供商，例如 Amazon RDS，直到最近才允许使用 Java\
    \ 选项，并且仍然对其使用方式施加限制。\n\n### Java 并非完美契合\n\n指责一个产品没有完美集成可能显得不公平。但当 SQL 和 PL/SQL\
    \ 无缝集成时，处理 Java 存储过程时很难不感到恼火。\n\n类型并不完全匹配。Java 类型本身没有问题，但每当我们来回传递数据时，都必须担心字符串大小、字符集、精度等问题。\n\
    \nJava 对象名称区分大小写且很长，这在 12.2 之前的版本中尤其令人烦恼，那些版本只支持最长 30 字节的名称。对象名称在数据字典中可能看起来不同，并且许多\
    \ DBA 脚本无法正确处理 Java 对象。这个问题可以通过使用 `DBMS_JAVA.LONGNAME` 转换名称来解决，但不断转换名称是件麻烦事。"
- fmt: "### SQL and PL/SQL Are Almost Always Better Choices\n\nJava has more powerful\
    \ language features than PL/SQL, but those features are irrelevant to the type\
    \ of processing that happens inside a database. A good Oracle database program\
    \ will do almost all of the heavy lifting in SQL. Procedural languages are mostly\
    \ used to glue together SQL statements. PL/SQL’s improved integration with SQL\
    \ more than makes up for PL/SQL being a less powerful language than Java.\n\n\
    It’s a shame that Oracle and Java don’t get along better. It would be great to\
    \ be able to reliably take advantage of existing Java libraries. Perhaps the new\
    \ multilingual engine (`MLE`) will work better someday, but that experimental\
    \ feature currently only supports JavaScript in the `21c` innovation release.\
    \ For the foreseeable future, unless we need functionality that only Java can\
    \ provide, are absolutely sure that all our databases have the Java component\
    \ installed, and are willing to put up with integration issues, we should avoid\
    \ Java in the database.\n\n## Avoid `TO_DATE`\n\n`TO_DATE` is a code smell. A\
    \ code smell isn’t always a bug, but it’s a sign that there may be a deeper problem\
    \ or anti-pattern lurking in our system. There are certainly times when we need\
    \ to use `TO_DATE`, but an excessive number of `TO_DATE` calls imply our system\
    \ is using the wrong types.\n\nOracle date creation and processing are surprisingly\
    \ confusing. Based on the thousands of questions I’ve seen on Stack Overflow,\
    \ date processing is one of the largest sources of bugs for SQL developers. This\
    \ chapter isn’t the place for an entire date tutorial, but luckily, we don’t need\
    \ one. As long as we avoid using the function `TO_DATE`, we are on the right path\
    \ to processing and creating dates.\n\n### Avoid String-to-Date Conversion\n\n\
    Unless we are loading data from an external source, we should never have to convert\
    \ strings to dates. Data processing is simpler and faster when values are processed\
    \ in their native type. Oracle has many functions for handling dates, and we almost\
    \ never need to convert back and forth between dates and strings.\n\nOne of the\
    \ most common date processing mistakes is to use `TO_DATE` to remove the time.\
    \ For example, the pseudo-column `SYSDATE` includes the current date and time.\
    \ To remove the time, and only get the date, a common mistake is to write code\
    \ like this:\n\n```sql\n--(Incorrectly) remove the time from a date.\nselect to_date(sysdate)\
    \ the_date from dual;\nTHE_DATE\n30-NOV-18\n```\n\nThe preceding code is dangerous\
    \ and may not always work, because it depends on implicit data conversion. `TO_DATE`\
    \ expects a string input, not a `DATE`. So `SYSDATE` is converted to a string\
    \ and then back into a `DATE`. The conversion only indirectly removes the time\
    \ because most clients and servers have an `NLS_DATE_FORMAT` that excludes the\
    \ time.\n\nThe system parameter `NLS_DATE_FORMAT` is frequently overridden by\
    \ a session-level parameter. That parameter is intended to be used for how dates\
    \ are *displayed*, not for how dates are *processed*. If our server-side code\
    \ depends on an Oracle client setting, we’re in trouble.\n\nWe can’t control a\
    \ client’s `NLS_DATE_FORMAT` setting. What if the user wants to view the time\
    \ in the output? If a user runs the following command or their IDE runs a command\
    \ like this by default, the preceding code will no longer work:\n\n```sql\n--Change\
    \ default date format display.\nalter session set nls_date_format = 'DD-MON-RR\
    \ HH24:MI:SS';\n```\n\nWe do not need to use string processing to remove the time\
    \ from a date. Oracle has a built-in function for this operation – `TRUNC`. The\
    \ following code reliably removes the time portion of a date, regardless of client\
    \ settings:\n\n```sql\n--(Correctly) remove the time from a date.\nselect trunc(sysdate)\
    \ the_date from dual;\n```\n\nThis section only includes one example of bad date\
    \ processing, but there are many other common bugs. If we ever find ourselves\
    \ converting dates to strings and then back to dates, we’re probably doing something\
    \ wrong. There is likely an Oracle function that can do the work more quickly,\
    \ safely, and easily, in the same data type.\n\nIf we’re having date problems,\
    \ we might want to read the “Datetime Functions” section in the *SQL Language\
    \ Reference*. There are 28 built-in functions that can handle most of our date\
    \ processing needs.\n\n### Use `DATE`, `TIMESTAMP`, and `INTERVAL` Literals\n\n\
    Datetime creation is best done with `DATE` and `TIMESTAMP` literals. The `TO_DATE`\
    \ function is not a good way to create dates. It’s difficult to change our date\
    \ format habits, but there are so many advantages to using date literals that\
    \ it’s worth the effort to change.\n\nThe following code compares date creation\
    \ using literals vs. using the `TO_DATE` function:\n\n```sql\n--DATE literal versus\
    \ TO_DATE.\nselect\n  date '2000-01-01' date_literal,\n  to_date('01-JAN-00',\
    \ 'DD-MON-RR') date_from_string\nfrom dual;\n```\n\nThe date literal always uses\
    \ the ISO-8601 date format: `YYYY-MM-DD`. Date literals never have any ambiguity\
    \ about days vs. months, the century, the calendar, or the language. They also\
    \ have the advantage of being easily sorted when we view them as strings. (We\
    \ don’t normally want to convert our dates to strings, but the format is also\
    \ useful outside of database programming, such as when we need to save a date\
    \ in a file name.)\n\nIn practice, `TO_DATE` almost always has ambiguity, even\
    \ if we use an explicit format. Those of us old enough to remember the Y2K bug\
    \ already know that a two-digit year is just begging for trouble. But there’s\
    \ a lot more wrong with the way `TO_DATE` was used in the preceding code.\n\n\
    For example, “JAN” is not a valid month abbreviation in every language. And not\
    \ every locale uses the same calendar. If you’re reading this book, the chances\
    \ are good that you program in English and use the Gregorian calendar. And many\
    \ Oracle programs don’t need to worry about localization and internationalization.\
    \ But why limit our programs? Are we sure nobody will ever run our queries and\
    \ programs with a non-English client setting?\n\nDate literals also occasionally\
    \ help the optimizer build better execution plans. Date literals are completely\
    \ unambiguous, and the optimizer can be sure that two different users will always\
    \ execute the same statement in the same `NLS` context. An ambiguous `TO_DATE`\
    \ means that the optimizer may need to parse the same text differently, depending\
    \ on client settings. It’s a rare problem, but why risk it?\n\nThe preceding discussion\
    \ also applies equally to `TIMESTAMP` literals vs. `TO_TIMESTAMP`. In fact, `TIMESTAMP`\
    \ literals have even more advantages because of standardized time zone formatting.\
    \ If we want precise dates and timestamps, we should avoid `TO_DATE` and `TO_TIMESTAMP`\
    \ and use date and timestamp literals instead.\n\nWe should also use `INTERVAL`\
    \ literals for date arithmetic and storing date ranges. Default date math is done\
    \ in days – the current date plus one is equal to tomorrow. In old versions of\
    \ Oracle, more advanced date math required converting days to other units, which\
    \ is error prone. Modern versions of Oracle simplify the date arithmetic and let\
    \ us specify a literal value for a `YEAR`, `MONTH`, `DAY`, `HOUR`, `MINUTE`, or\
    \ `SECOND`. For example, the following code compares using date math against an\
    \ `INTERVAL` literal:\n\n```sql\n--Date arithmetic using math or INTERVAL.\nselect\n\
    \  sysdate - 1/(24*60*60)        one_second_ago,\n  sysdate - interval '1' second\
    \ one_second_ago\nfrom dual;\n```"
  raw: '### SQL and PL/SQL Are Almost Always Better Choices


    Java has more powerful language features than PL/SQL, but those features are irrelevant
    to the type of processing that happens inside a database. A good Oracle database
    program will do almost all of the heavy lifting in SQL. Procedural languages are
    mostly used to glue together SQL statements. PL/SQL’s improved integration with
    SQL more than makes up for PL/SQL being a less powerful language than Java.


    It’s a shame that Oracle and Java don’t get along better. It would be great to
    be able to reliably take advantage of existing Java libraries. Perhaps the new
    multilingual engine (MLE) will work better someday, but that experimental feature
    currently only supports JavaScript in the 21c innovation release. For the foreseeable
    future, unless we need functionality that only Java can provide, are absolutely
    sure that all our databases have the Java component installed, and are willing
    to put up with integration issues, we should avoid Java in the database.


    ## Avoid TO_DATE


    `TO_DATE` is a code smell. A code smell isn’t always a bug, but it’s a sign that
    there may be a deeper problem or anti-pattern lurking in our system. There are
    certainly times when we need to use `TO_DATE`, but an excessive number of `TO_DATE`
    calls imply our system is using the wrong types.


    Oracle date creation and processing are surprisingly confusing. Based on the thousands
    of questions I’ve seen on Stack Overflow, date processing is one of the largest
    sources of bugs for SQL developers. This chapter isn’t the place for an entire
    date tutorial, but luckily, we don’t need one. As long as we avoid using the function
    `TO_DATE`, we are on the right path to processing and creating dates.


    ### Avoid String-to-Date Conversion


    Unless we are loading data from an external source, we should never have to convert
    strings to dates. Data processing is simpler and faster when values are processed
    in their native type. Oracle has many functions for handling dates, and we almost
    never need to convert back and forth between dates and strings.


    One of the most common date processing mistakes is to use `TO_DATE` to remove
    the time. For example, the pseudo-column `SYSDATE` includes the current date and
    time. To remove the time, and only get the date, a common mistake is to write
    code like this:


    ```

    --(Incorrectly) remove the time from a date.

    select to_date(sysdate) the_date from dual;

    THE_DATE


    30-NOV-18

    ```


    The preceding code is dangerous and may not always work, because it depends on
    implicit data conversion. `TO_DATE` expects a string input, not a `DATE`. So `SYSDATE`
    is converted to a string and then back into a `DATE`. The conversion only indirectly
    removes the time because most clients and servers have an `NLS_DATE_FORMAT` that
    excludes the time.


    The system parameter `NLS_DATE_FORMAT` is frequently overridden by a session-level
    parameter. That parameter is intended to be used for how dates are *displayed*,
    not for how dates are *processed*. If our server-side code depends on an Oracle
    client setting, we’re in trouble.


    We can’t control a client’s `NLS_DATE_FORMAT` setting. What if the user wants
    to view the time in the output? If a user runs the following command or their
    IDE runs a command like this by default, the preceding code will no longer work:


    ```

    --Change default date format display.

    alter session set nls_date_format = ''DD-MON-RR HH24:MI:SS'';

    ```


    We do not need to use string processing to remove the time from a date. Oracle
    has a built-in function for this operation – `TRUNC`. The following code reliably
    removes the time portion of a date, regardless of client settings:


    ```

    --(Correctly) remove the time from a date.

    select trunc(sysdate) the_date from dual;

    ```


    This section only includes one example of bad date processing, but there are many
    other common bugs. If we ever find ourselves converting dates to strings and then
    back to dates, we’re probably doing something wrong. There is likely an Oracle
    function that can do the work more quickly, safely, and easily, in the same data
    type.


    If we’re having date problems, we might want to read the “Datetime Functions”
    section in the *SQL Language Reference*. There are 28 built-in functions that
    can handle most of our date processing needs.


    ### Use DATE, TIMESTAMP, and INTERVAL Literals


    Datetime creation is best done with `DATE` and `TIMESTAMP` literals. The `TO_DATE`
    function is not a good way to create dates. It’s difficult to change our date
    format habits, but there are so many advantages to using date literals that it’s
    worth the effort to change.


    The following code compares date creation using literals vs. using the `TO_DATE`
    function:


    ```

    --DATE literal versus TO_DATE.

    select

    date ''2000-01-01'' date_literal,

    to_date(''01-JAN-00'', ''DD-MON-RR'') date_from_string

    from dual;

    ```


    The date literal always uses the ISO-8601 date format: YYYY-MM-DD. Date literals
    never have any ambiguity about days vs. months, the century, the calendar, or
    the language. They also have the advantage of being easily sorted when we view
    them as strings. (We don’t normally want to convert our dates to strings, but
    the format is also useful outside of database programming, such as when we need
    to save a date in a file name.)


    In practice, `TO_DATE` almost always has ambiguity, even if we use an explicit
    format. Those of us old enough to remember the Y2K bug already know that a two-digit
    year is just begging for trouble. But there’s a lot more wrong with the way `TO_DATE`
    was used in the preceding code.


    For example, “JAN” is not a valid month abbreviation in every language. And not
    every locale uses the same calendar. If you’re reading this book, the chances
    are good that you program in English and use the Gregorian calendar. And many
    Oracle programs don’t need to worry about localization and internationalization.
    But why limit our programs? Are we sure nobody will ever run our queries and programs
    with a non-English client setting?


    Date literals also occasionally help the optimizer build better execution plans.
    Date literals are completely unambiguous, and the optimizer can be sure that two
    different users will always execute the same statement in the same NLS context.
    An ambiguous `TO_DATE` means that the optimizer may need to parse the same text
    differently, depending on client settings. It’s a rare problem, but why risk it?


    The preceding discussion also applies equally to `TIMESTAMP` literals vs. `TO_TIMESTAMP`.
    In fact, `TIMESTAMP` literals have even more advantages because of standardized
    time zone formatting. If we want precise dates and timestamps, we should avoid
    `TO_DATE` and `TO_TIMESTAMP` and use date and timestamp literals instead.


    We should also use `INTERVAL` literals for date arithmetic and storing date ranges.
    Default date math is done in days – the current date plus one is equal to tomorrow.
    In old versions of Oracle, more advanced date math required converting days to
    other units, which is error prone. Modern versions of Oracle simplify the date
    arithmetic and let us specify a literal value for a `YEAR`, `MONTH`, `DAY`, `HOUR`,
    `MINUTE`, or `SECOND`. For example, the following code compares using date math
    against an `INTERVAL` literal:


    ```

    --Date arithmetic using math or INTERVAL.

    select

    sysdate - 1/(24*60*60)        one_second_ago,

    sysdate - interval ''1'' second one_second_ago

    from dual;

    ```'
  trans: "### SQL 与 PL/SQL 几乎总是更佳选择\n\nJava 拥有比 PL/SQL 更强大的语言特性，但这些特性对于数据库内部发生的处理类型而言无关紧要。一个优秀的\
    \ Oracle 数据库程序几乎会将所有繁重工作交由 SQL 完成。过程式语言主要用于将 SQL 语句粘合在一起。PL/SQL 与 SQL 更好的集成性，足以弥补其作为一门语言在能力上弱于\
    \ Java 的不足。\n\n遗憾的是 Oracle 与 Java 并未能更好地协作。若能可靠地利用现有的 Java 库将会非常棒。或许新的多语言引擎 (`MLE`)\
    \ 将来能有所改善，但这个实验性功能目前仅在 `21c` 创新版中支持 JavaScript。在可预见的未来，除非我们需要只有 Java 能提供的功能，并且完全确定我们所有的数据库都已安装\
    \ Java 组件，同时愿意忍受集成问题，否则我们应该避免在数据库中使用 Java。\n\n## 避免使用 `TO_DATE`\n\n`TO_DATE` 是一种代码异味。代码异味并不总是意味着错误，但它表明我们的系统中可能存在更深层次的问题或反模式。当然，有些时候我们确实需要使用\
    \ `TO_DATE`，但过多的 `TO_DATE` 调用意味着我们的系统使用了错误的数据类型。\n\nOracle 的日期创建和处理过程出人意料地令人困惑。根据我在\
    \ Stack Overflow 上看到的成千上万个问题，日期处理是 SQL 开发人员最大的 Bug 来源之一。本章并非完整的日期教程，但幸运的是，我们并不需要一个。只要避免使用\
    \ `TO_DATE` 函数，我们就走在了正确处理和创建日期的道路上。\n\n### 避免字符串到日期的转换\n\n除非是从外部源加载数据，否则我们永远不应该需要将字符串转换为日期。当值以其原生类型处理时，数据处理会更简单、更快速。Oracle\
    \ 有许多用于处理日期的函数，我们几乎永远不需要在日期和字符串之间来回转换。\n\n最常见的日期处理错误之一是使用 `TO_DATE` 来去除时间部分。例如，伪列\
    \ `SYSDATE` 包含当前的日期和时间。为了去除时间，只获取日期，一个常见的错误是编写如下代码：\n\n```sql\n--（错误地）从日期中去除时间部分。\n\
    select to_date(sysdate) the_date from dual;\nTHE_DATE\n30-NOV-18\n```\n\n前面的代码是危险的，并且可能并不总是有效，因为它依赖于隐式数据转换。`TO_DATE`\
    \ 期望的是字符串输入，而非 `DATE` 类型。因此，`SYSDATE` 被转换为字符串，然后再转换回 `DATE`。这种转换之所以能去除时间部分，只是间接地依赖于大多数客户端和服务器的\
    \ `NLS_DATE_FORMAT` 设置中不包含时间。\n\n系统参数 `NLS_DATE_FORMAT` 经常会被会话级参数覆盖。该参数本意是用于日期的*显示*方式，而非日期的*处理*方式。如果我们服务器端的代码依赖于\
    \ Oracle 客户端设置，那我们就有麻烦了。\n\n我们无法控制客户端的 `NLS_DATE_FORMAT` 设置。如果用户希望在输出中查看时间怎么办？如果用户运行以下命令，或者他们的\
    \ IDE 默认运行了类似的命令，那么前面的代码将不再有效：\n\n```sql\n--更改默认的日期格式显示。\nalter session set nls_date_format\
    \ = 'DD-MON-RR HH24:MI:SS';\n```\n\n我们不需要使用字符串处理来从日期中去除时间部分。Oracle 有一个用于此操作的内置函数——`TRUNC`。以下代码能够可靠地去除日期的时间部分，不受客户端设置的影响：\n\
    \n```sql\n--（正确地）从日期中去除时间部分。\nselect trunc(sysdate) the_date from dual;\n```\n\
    \n本节仅包含一个不良日期处理的例子，但还有其他许多常见的错误。如果我们发现自己将日期转换为字符串然后再转换回日期，那么我们很可能做错了什么。很可能有一个\
    \ Oracle 函数能以相同的数据类型更快速、安全、轻松地完成这项工作。\n\n如果我们遇到日期问题，可能需要阅读《SQL 语言参考手册》中的“日期时间函数”部分。有\
    \ 28 个内置函数可以满足我们大部分的日期处理需求。\n\n### 使用 `DATE`、`TIMESTAMP` 和 `INTERVAL` 字面量\n\n\
    创建日期时间最好使用 `DATE` 和 `TIMESTAMP` 字面量。`TO_DATE` 函数并不是创建日期的好方法。改变日期格式的习惯很难，但使用日期字面量有如此多的优势，值得我们努力去改变。\n\
    \n以下代码比较了使用字面量创建日期与使用 `TO_DATE` 函数创建日期：\n\n```sql\n--DATE 字面量与 TO_DATE 对比。\nselect\n\
    \  date '2000-01-01' date_literal,\n  to_date('01-JAN-00', 'DD-MON-RR') date_from_string\n\
    from dual;\n```\n\n日期字面量始终使用 ISO-8601 日期格式：`YYYY-MM-DD`。日期字面量在日与月、世纪、日历或语言方面绝不会产生任何歧义。它们还有一个优点是，当我们将它们视为字符串时易于排序。（我们通常不希望将日期转换为字符串，但这种格式在数据库编程之外也很有用，例如需要在文件名中保存日期时。）\n\
    \n实际上，`TO_DATE` 几乎总是存在歧义，即使我们使用了显式格式。那些年纪足够大、记得千年虫（Y2K）问题的人都知道，两位数的年份简直是在自找麻烦。但前面代码中使用\
    \ `TO_DATE` 的方式还有更多问题。\n\n例如，“JAN” 并不是每种语言中都有效的月份缩写。而且并非所有地区都使用相同的日历。如果你正在阅读这本书，那么你很可能使用英语编程并使用格里高利历。许多\
    \ Oracle 程序不需要担心本地化和国际化问题。但为什么要限制我们的程序呢？我们能确保没有人会使用非英语客户端设置来运行我们的查询和程序吗？\n\n日期字面量偶尔还有助于优化器构建更好的执行计划。日期字面量完全明确无歧义，优化器可以确信两个不同的用户在相同的\
    \ `NLS` 上下文中执行相同的语句。而一个有歧义的 `TO_DATE` 则意味着优化器可能需要根据客户端设置以不同方式解析相同的文本。这是一个罕见的问题，但为什么要冒这个险呢？\n\
    \n前面的讨论同样适用于 `TIMESTAMP` 字面量与 `TO_TIMESTAMP` 的对比。事实上，`TIMESTAMP` 字面量甚至具有更多优势，因为其时区格式是标准化的。如果我们想要精确的日期和时间戳，我们应该避免使用\
    \ `TO_DATE` 和 `TO_TIMESTAMP`，而应使用日期和时间戳字面量。\n\n我们还应该使用 `INTERVAL` 字面量进行日期运算和存储日期范围。默认的日期运算是以天为单位进行的——当前日期加一等于明天。在旧版本的\
    \ Oracle 中，更高级的日期运算需要将天转换为其他单位，这很容易出错。现代版本的 Oracle 简化了日期运算，允许我们为 `YEAR`、`MONTH`、`DAY`、`HOUR`、`MINUTE`\
    \ 或 `SECOND` 指定字面量值。例如，以下代码比较了使用数学运算与使用 `INTERVAL` 字面量进行日期运算：\n\n```sql\n--使用数学运算或\
    \ INTERVAL 进行日期计算。\nselect\n  sysdate - 1/(24*60*60)        one_second_ago,\n\
    \  sysdate - interval '1' second one_second_ago\nfrom dual;\n```"
- fmt: '## Avoid CURSOR


    `CURSOR` is also a code smell. Like `TO_DATE`, there are certainly times when
    we need to use `CURSOR`, but we should be skeptical of code that frequently uses
    that keyword.


    There’s nothing wrong with cursor processing; the problems happen when we write
    code with the `CURSOR` keyword. Similar to `TO_DATE`, it’s perfectly fine to use
    `CURSOR` when we’re passing information from a database to an external application.


    The main problem with the `CURSOR` keyword is that it’s used for explicit cursor
    processing, instead of the simpler and faster cursor `FOR` loop processing. This
    anti-pattern is another PL/SQL topic in a SQL book. But it’s worth briefly discussing
    cursor processing because it so frequently affects how we write SQL. We want a
    PL/SQL style that makes it easy to use SQL statements.


    For example, let’s say we want to print all the launch dates in order. The following
    PL/SQL block uses explicit cursor processing, with the `CURSOR`, `OPEN`, `FETCH`,
    and `CLOSE` commands. This syntax is outdated and should almost never be used:


    ```

    --Explicit cursor processing: complex and slow.

    declare

    cursor launches is

    select * from launch order by launch_date;

    v_launch launch%rowtype;

    begin

    open launches;

    loop

    fetch launches into v_launch;

    exit when launches%notfound;

    dbms_output.put_line(v_launch.launch_date);

    end loop;

    close launches;

    end;

    /

    ```


    Compare the preceding code with the following much simpler cursor `FOR` loop processing:


    ```

    --Cursor FOR loop processing: simple and fast.

    begin

    for launches in

    (

    select * from launch order by launch_date

    ) loop

    dbms_output.put_line(launches.launch_date);

    end loop;

    end;

    /

    ```


    The second code example is much simpler, and it even runs faster. The explicit
    cursor processing example only retrieves one row at a time and spends a lot of
    time context switching between SQL and PL/SQL. The cursor `FOR` loop example automatically
    grabs 100 rows at a time and almost completely eliminates context switching.


    Almost all of the things the `CURSOR` keyword are used for are unnecessary, or
    they can be replaced by a simpler cursor `FOR` loop or a larger SQL statement.


    Explicit cursor processing allows us to manually bulk collect and limit the results.
    But the simpler cursor `FOR` loop automatically collects 100 rows at a time. As
    Chapter 16 discusses, collecting 100 rows at a time is almost always good enough.


    Explicit cursor processing is often used with `FORALL` statements. But instead,
    we can almost always do both the reading and the writing with a single SQL statement.


    Multiple cursors are often defined at the beginning of a procedure and then run
    in a loop inside each other. Instead, we should combine the two `SELECT` statements
    and run a single SQL statement.


    Cursors are sometimes used for pipelined functions, an advanced PL/SQL feature.
    But even pipelined functions are often just a poor way of writing a large SQL
    statement.


    There are certainly good uses for the `CURSOR` keyword, such as dynamic ref cursors,
    and I’m not advocating that we ban `CURSOR` from our code. But every time we see
    `CURSOR,` we should ask ourselves if we’re missing an opportunity to replace slow,
    complex, procedural code with faster, simpler, declarative SQL.


    ## Avoid Custom SQL Parsing


    Sometimes when we’re confronted with a difficult SQL language problem, we think,
    “I know. I’ll parse the SQL.” Now we have two problems.


    There are times when it would be helpful to parse an Oracle SQL or PL/SQL statement.
    We may want to find problems in our code, convert between syntaxes, find references
    to specific objects, etc. Unfortunately, parsing SQL is so hard that many language
    problems can rarely be solved in practice. When we run into a complex SQL problem
    and think we need a parser, we’ve probably hit a dead end. Unless our code only
    uses a small, well-defined subset of the SQL language, we should find another
    solution.


    The SQL language syntax is orders of magnitude more complex than most other programming
    languages. This complexity doesn’t mean that SQL is more powerful than Java or
    C. The complexity is because SQL adds many features through syntax, instead of
    through libraries or packages. That extra syntax helps our code look nice, but
    the extra syntax makes Oracle SQL ridiculously hard to parse.


    Most programming languages only have a few dozen keywords, but Oracle has over
