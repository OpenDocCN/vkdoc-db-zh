    Most performance problems start with a slow application. Application tuning is
    a huge topic and is outside the scope of this book. Even PL/SQL applications are
    not the main topic of this book, but they are worth briefly discussing. We at
    least need to know enough about PL/SQL to help us find our slow SQL statements.'
