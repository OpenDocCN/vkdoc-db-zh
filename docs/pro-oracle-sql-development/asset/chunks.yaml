- fmt: '## Partitioning


    Partitioning divides tables and indexes into smaller pieces to improve performance
    and manageability. Partitioned tables look like regular tables to our SQL statements.
    Behind the scenes, Oracle can adjust our statements to only access the relevant
    partitions, instead of reading the entire table. Partitioning is fully described
    in the 425-page *VLDB and Partitioning Guide*. This section gives a brief overview
    of partitioning and is more focused on understanding why partitioning works than
    listing the hundreds of partitioning features.


    ### Partitioning Concepts


    Although partitioning is described in the “Very Large Database” manual, partitioning
    can help databases of any size. Partitioning is about the *percentage* of the
    data we’re accessing, not just the *size* of the data. Partitioning and indexing
    solve two different kinds of performance problems; indexes work best for retrieving
    a small percentage of rows, and partitions work best for retrieving a large percentage
    of rows.


    Let’s use an example to understand the fundamental mechanism of partitioning.
    Most of the examples in this book filter the `LAUNCH` table by the column `LAUNCH_CATEGORY`.
    We rarely want to query across all launches, since there’s a huge difference between
    sounding rockets that perform weather experiments and orbital launches that put
    a satellite into orbit.


    Our goal is to optimize this SQL statement: `SELECT * FROM LAUNCH WHERE LAUNCH_CATEGORY
    = ''orbital''`. That SQL statement retrieves a relatively large percentage of
    rows. As discussed in the last section, there are several reasons indexes cannot
    help us retrieve a large percentage of rows. We want the efficiency of multi-block
    reads from a full table scan, but we don’t want to read the entire table. To understand
    partitioning, let’s first achieve our goal the hard way by using an old technique
    called “partitioned views.” We can get multi-block read efficiency and exclude
    most of the rows by creating multiple tables and putting them together in a view.


    First, we create a table for each launch category. There are only ten launch categories,
    so creating the tables doesn’t take too long. (Only the first part of this large
    example is listed here. See the repository for the full example code.)


    ```

    --Create a table for each LAUNCH_CATEGORY.

    create table launch_orbital as

    select * from launch where launch_category = ''orbital'';

    create table launch_military_missile as

    select * from launch where launch_category = ''military missile'';

    ...

    ```


    Next, create a view named `LAUNCH_ALL` that stitches together those tiny tables:


    ```

    --Create a view that combines per-category tables together.

    create or replace view launch_all as

    select * from launch_orbital

    where launch_category = ''orbital''

    union all

    select * from launch_military_missile

    where launch_category = ''military missile''

    ...

    ```


    When we query from the preceding view, the results are the same as querying directly
    against the original `LAUNCH` table, but the view query provides optimal performance.
    Oracle can read the view definition, can understand that only one of the ten tables
    can satisfy the predicate `LAUNCH_CATEGORY = ''orbital''`, and will only read
    from that table. At first this solution looks like the best of all worlds; we
    query the view like it’s a huge table, but the view acts like a small table:


    ```

    --These return the same results but LAUNCH_ALL is faster.

    select * from launch where launch_category = ''orbital'';

    select * from launch_all where launch_category = ''orbital'';

    ```


    We just built a bargain-basement partitioning scheme. Our specific example worked
    fine, but the solution is horribly broken. We can’t update `LAUNCH_ALL`, since
    we’ll run into problems with updatable views. Creating the tables and views was
    a chore and required repeating the predicates. If we wanted to create indexes,
    we’d have to create an index for each table.


    Real partitioning automates the previous steps and creates a table that works
    optimally and flawlessly. Oracle creates a segment for each partition, which behaves
    just like a table. Oracle perfectly understands the mapping between those segments
    and the table, and all table operations work automatically on the partitioned
    table.


    The following code shows how to create a real partitioned `LAUNCH` table. (Alternatively,
    we could have used `ALTER TABLE` to add partitioning to an existing table.) There’s
    some new syntax, but this code is much simpler than explicitly creating extra
    tables, views, and indexes:


    ```

    --Create and query a partitioned launch table.

    create table launch_partition

    partition by list(launch_category)

    (

    partition p_sub values(''suborbital rocket''),

    partition p_mil values(''military missile''),

    partition p_orb values(''orbital''),

    partition p_atm values(''atmospheric rocket''),

    partition p_pln values(''suborbital spaceplane''),

    partition p_tst values(''test rocket''),

    partition p_dep values(''deep space''),

    partition p_bal values(''ballistic missile test''),

    partition p_snd values(''sounding rocket''),

    partition p_lun values(''lunar return'')

    ) as

    select * from launch;

    select *

    from launch_partition

    where launch_category = ''orbital'';

    ```


    Why didn’t we simply create the preceding partitioned table and skip the poorly
    built version with multiple tables and views? It’s important to understand that
    partitioning is not magic. Too many SQL developers always partition large tables
    and assume partitioning will help performance. Partitioning is just an automatic
    system to break large tables into small tables. If we can’t think of a way that
    querying multiple smaller tables could improve our SQL statements, then partitioning
    won’t help.


    In addition to improving the performance of our SQL statements, partitioning can
    also make our data more manageable. For example, it''s easy to create a data retention
    system with a scheduler job that reads partition metadata from the data dictionary
    and truncates or drops old partitions. And since 19c, we can create a hybrid partitioned
    table where some of the partitions are based on external files or other external
    data sources.'
