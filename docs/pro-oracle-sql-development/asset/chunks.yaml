  trans: '

    ### 降低入门门槛


    我们必须不断寻找方法来降低人们使用我们系统的门槛——不仅仅是我们构建的程序，还包括所有相关的知识。大型“企业”公司想要收割我们的数据、进行精细控制并预先收费。这种策略可能适用于向高管销售产品的大公司，但对于我们的项目来说并非良策。将文档放在
    Wiki 上，允许*任何人*修改*任何内容*。使用版本控制系统，让软件分支像点击“fork”按钮一样简单。人们可能会对我们喜爱的页面进行烦人的编辑，或者以错误的方式使用我们的软件；这正是我们为鼓励参与所必须付出的代价。


    ## 总结


    花时间思考我们的开发流程是值得的。不要盲目跟随别人的做法——他们可能也不知道自己在做什么。许多 Oracle 开发人员、DBA、测试人员和数据分析师遵循某个特定流程，仅仅是因为“历来如此”。Oracle
    诞生于二十世纪，但这并不意味着我们必须像二十世纪那样编程。我们可以找到一种方法，让我们的资源看起来是无限的。我们可以让我们的程序易于安装、修改和分享。我们还可以创造一种促进学习、实验和团队合作的文化。现在我们的开发环境已经搭建好，可以进入下一章，讨论如何测试我们构建的东西。


    # 3. 通过测试增强信心与知识


    测试不仅仅是简单地证明程序正确。我们必须不断挑战自我以让自己变得更好。同样，我们也必须挑战我们的程序和想法。测试是我们将科学引入技艺的方式，用关于世界如何运作的真实知识取代猜测和迷思。构建好的测试可能需要大量的时间和精力，而
    Oracle 数据库为构建可复现的测试用例带来了独特的挑战。幸运的是，Oracle 提供了许多工具来帮助我们测试，例如 SQL、PL/SQL、数据字典、动态性能视图等等。


    ## 通过自动化测试建立信心


    自动化测试需要大量投入，但几乎总是值得付出这些额外努力的。在我们决定采用自动化测试之后，必须决定如何处理数据以及如何构建自动化测试框架。


    ### 更快地修复错误


    编程是困难的，充满了模糊的需求、意外的副作用和退化问题。完全的自动化测试显然会提高我们程序的质量。自动化测试令人惊讶之处在于，它最重要的好处是微妙的，并且与质量只有间接的关系。


    减少修复错误的时间是第一个明显、直接的好处。测试是痛苦的，我们中很少有人喜欢做这件事。我们总是找借口逃避它，而且有大量的认知偏见帮助我们忽略测试。手动测试比自动化测试更容易——如果只做一次的话。我们自欺欺人地认为，“这部分我们只需要测试一次；等代码能运行后，我们就不会再改它了，所以没有机会再出错。”或者也许测试是别人的工作，我们认为自己不必担心。


    当我们对自身超人编程能力的假设不可避免地被证明是错误时，需要付出巨大的代价。在刚制造错误后立即自己修复，会容易几个数量级。上下文在脑海中还很新鲜，也没有沟通成本。不需要与测试人员讨论错误，不需要在跟踪系统中记录缺陷，也不需要多次向管理层解释问题。构建一个自动化测试系统符合我们自身的利益，即使存在独立的测试团队。


    ### 获得信心并避免偏见


    自动化测试让我们对程序充满信心。它不仅能切实帮助我们晚上睡得更好，还让我们能够自由地进行更多更改。


    关于小改动引发意外副作用的可怕故事比比皆是。为了避免这些噩梦，许多程序员只做尽可能小的改动。但为了节省昂贵的手动测试时间，程序员需要将改动打包在一起。采用手动测试时，每次发布都是一种妥协。要么我们因节省昂贵的测试而承担错误的风险，要么我们的代码因为避免改动而无法随时间改进。


    自动化测试彻底改变了我们发布软件的方式。当运行整个测试套件变得毫不费力时，我们就不必太担心进行改动。每次发布的成本降低了，我们可以更频繁地发布。在拥有自动化测试之前，甚至不要去想“敏捷”这个词。


    有了自动化测试，我们可以随心所欲地更改任何内容、在任何时间、出于任何原因。只要测试通过并完全覆盖了所有东西，就放手去做吧。那个私有函数没有被任何地方调用了？删掉它。希望那个变量有个更好的名字？重命名它。就是有一个包，你单纯不喜欢它的风格？改掉它。持续、小量的重构会随时间产生复利效应，并偿还我们的技术债务。


    自动化测试也帮助我们避免偏见。拥有一个结构化、标准化的评估程序体系，让我们更难对自己撒谎。当截止日期迫近、我们工作到深夜时，很容易就会眯起眼睛说结果看起来“足够好了”。总是有可能在结果上撒谎，但当我们面对一个巨大的“失败”消息和整个系统停止运行时，就很难忽视我们代码的低劣质量。


    ### 测试驱动开发


    通过测试驱动开发，我们可以将测试从软件开发生命周期中的“二等公民”提升到一个突出位置。在测试驱动开发中，自动化测试是在我们开始添加功能或修复错误之前创建的。测试用例可以成为需求的主要形式。当测试通过时，需求就得到了满足，我们的工作也就完成了。


    测试驱动开发也帮助我们避免偏见。测试就是标准，最好在我们开始做事之前就定义好目标。开始一个令人兴奋的新项目却不能立即开始编码，这可能会令人恼火。但请记住，到项目结束时我们会感到疲惫。如果把测试留到最后，我们直到对项目感到厌倦、只想让它结束时，才会定义成功的标准。


    然而，自动化测试并非总是合适的。有时我们只是需要实验，不知道代码会带我们走向何方。有时任务是一次性的，或者不那么重要。有时，比如对于大批量数据加载，数据过于“脏”且定义不清。如果我们对项目还不够了解，就不想创建一个虚假的标准。自动化测试应该是一个实用的工具，而不是一个狂热的理想。

    '
- fmt: '### Create Useful Test Data


    The biggest difference between application programming unit tests and database
    programming unit tests is the focus on data. Don’t simply import as much data
    as possible. Instead, focus on creating the right amount of relevant data.


    Even for a relational database designed to handle petabytes of data, less is more.
    It is tempting to import a huge amount of data for testing. Creating good sample
    data is hard, and there’s often pre-generated data in other environments or maybe
    even live data. Do not give in to that temptation.


    Using production data in development is asking for trouble. Production data may
    be immediately convenient, but it could turn into a disaster later. Organizations
    will eventually update their data security rules. It’s not unusual for an organization
    to allow production data in lower environments one day and then forbid it the
    next. Getting rid of that data, or deidentifying it, can be painful.


    Production data isn’t that useful anyway. Production data may only represent what
    users have generated so far, not necessarily the limits of what users can ever
    generate. Don’t induce requirements only from production data.


    When creating sample data, every byte should mean something. One of the biggest
    problems with loading production data is that it’s overwhelming. For test data,
    quality is much more important than quantity. No human being can understand a
    gigabyte of data, so we shouldn’t load that much data into our system. Our systems
    are complex enough. Let’s not confuse ourselves further by loading unnecessary
    data. It’s better to take the time to create only the data necessary.


    Generating data is only as difficult as the business logic. Don’t bother looking
    for a program to help generate fake data. There is no commercial program that
    understands our custom systems. Once we understand the business rules and exactly
    what data we need to generate, there are a few simple Oracle SQL patterns that
    make the job easy.


    The simplest way to generate fake data is with the `LEVEL` trick:


    ```sql

    --Generate three rows.

    select level a from dual connect by level <= 3;

    A

    ```


    To load specific data, `SELECT` from `DUAL` and combine statements with the `UNION
    ALL` set operator:


    ```sql

    --Generate specific data.

    select 1 a, 2 b from dual union all

    select 0 a, 0 b from dual;

    A   B

    -   -

    1   2

    0   0

    ```


    ### Create Large Test Data


    While accuracy and ease of use are the most important characteristics of test
    data, occasionally we need to use large data sets for performance testing. Large,
    complex systems will ideally have at least two data sets: a small data set for
    automatic unit tests and a large data set for rarer performance testing. We need
    to ensure our programs can scale up before they are moved to production.


    Combining and tweaking the tricks learned in the previous section is almost good
    enough for generating large amounts of test data. The `LEVEL` trick has memory
    limitations we need to work around. After about one million rows, the level trick
    generates an error:


    ```sql

    --Raises: ORA-30009: Not enough memory for CONNECT BY operation

    select count(*) from

    (

    select level from dual connect by level <= 999999999

    );

    ```


    When the preceding error happens, we simply have to break the load into multiple
    steps. Create the table, load the initial data with `LEVEL`, and then insert the
    table into itself repeatedly to double the table size. Creating data can get tricky
    when there are unique or foreign keys. But normally when we’re loading a large
    amount of data, it’s for performance testing, and the data doesn’t have much meaning:


    ```sql

    --Generate large amounts of data.

    create table test1(a number);

    insert into test1 select level from dual connect by level <= 100000;

    insert into test1 select * from test1;

    insert into test1 select * from test1;

    insert into test1 select * from test1;

    ...

    ```


    For extremely large data loads, a few more tricks can help, such as creating tables
    with the `NOLOGGING` option and using `INSERT /*+ APPEND */` to enable faster
    direct-path writes. There are risks with loading large data, and direct-path inserts
    are discussed in later chapters. Loading relevant data is more of a business logic
    challenge than a technical challenge. The preceding simple tricks are good enough
    to get us started.


    We may want to use a hybrid approach, where we use carefully crafted data for
    frequent unit testing and we use a copy of production for less frequent user acceptance
    and performance testing. While frequently running unit tests increases our confidence
    in our changes, there are still a few risky changes where we want the additional
    peace of mind of running them in a near-production environment. For some performance
    tests, since query execution plans depend largely on the table and column statistics,
    it helps to have an environment that perfectly matches the data distribution of
    production. The inconvenience of using production data isn’t so bad if we only
    need to periodically clone production to one database. But we certainly don’t
    want to use production clones as the only source of our test data.


    ### Remove Test Data


    Part of creating test data is removing that data when we’re done. Test data can
    pollute our environment and cause problems if we’re not careful. Automated unit
    testing frameworks often have a `TearDown` procedure to handle cleaning up after
    testing is done. Cleaning up from tests is not always trivial; inserting data
    in one table may lead to results scattered throughout the schema.


    Instead of trying to remove the test data piece by piece, it may be easier to
    reset the whole schema. With private database development, this is as easy as
    dropping and recreating the schema. On a shared database, where we don’t have
    scripts to rebuild the environment, there are still technologies that can help
    us test faster. We can recreate the environment using flashback, virtual machines,
    multitenant, etc.'
