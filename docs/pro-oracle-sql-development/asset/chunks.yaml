  trans: '

    ## 概要


    动态 SQL 是一项强大的特性，可用于执行 DDL、简化权限管理、构建仅在运行时知晓的代码以及构建大型规则引擎。其基本特性虽然简单，但要充分发挥动态 SQL
    的效用，我们需要采用一种融合了多行字符串、替代引号机制和模板的编程风格。代码写得好，才能运行得好。我们需要考虑性能和安全性，并尽可能使用绑定变量。在许多情况下，生成“笨拙”的代码比编写“聪明”的通用代码更可取。借助动态
    SQL，我们能够充分利用 Oracle 最强大的优势——SQL。


    ## 15. 避免反模式


    到目前为止，本书主要关注的是我们*应该*做什么。但讨论我们*不应该*做什么也很有帮助。本章将列举一些常见的反模式——即我们应该避免的编程概念和风格。


    反模式并不仅仅是那些我们可以立即修复的、微不足道的编译错误。反模式是微妙的错误，它们今天或许能节省时间，但明天却可能让我们付出更多代价。我们需要主动避开某些捷径，以免积累过多的技术债务。


    本章所列的所有项目都是我在职业生涯中多次目睹的真实错误，其中大多数我自己也曾深陷其中。这些并非仅仅是初学者才会犯的、专家可以跳过的错误；它们是那些即使对于尚未见识过其深远后果的专家程序员来说也颇具诱惑的选择。


    这些反模式大致按其对项目可能造成的灾难性程度排序。排在最前面的是几乎可以让项目夭折的架构性失误。列表末尾则是相对次要的错误，可能只会导致单个查询无法正常工作。本章只关注
    Oracle SQL 反模式。显然，还有许多通用的编程和业务反模式，我们不想通过艰难的方式去学习。


    ### 避免第二系统综合症和从头重写


    在我们抄起家伙开始抨击所有人的代码之前，需要先听取一些告诫。如果我们对现有代码过于消极和悲观，只关注问题，这种消极情绪可能会引发其他问题。只盯着软件的错误会导致第二系统综合症以及愚蠢地从头重写。


    第二系统综合症是指我们倾向于对系统的第二个版本期望过高。我们对自己说：“第一个版本运行得还行，但它太简单且充满了架构错误。在构建第二个系统时，我们就能实现我们的乌托邦愿景，添加所有第一次没来得及实现的、超棒的新功能。”


    敏捷开发可以解决一些与第二系统综合症相关的问题。希望我们不会花费太多时间去设计那些后来才发现并不重要的功能。看待旧代码时很容易发现问题，因为编写代码比阅读代码容易。在软件开发中，消极态度很容易产生，我们需要与之抗争。我们需要问问自己，旧系统存在局限性是否另有原因。也许是旧的开发团队痛苦地发现那数百个新功能毫无价值。或者原始团队已经尝试过但未能实现那些没有意义的功能。


    过度悲观的思维会让我们愚蠢地选择从头重写。那庞大陈旧的代码不一定就丑陋不堪、充满垃圾。那些旧代码可能久经考验，包含了处理罕见、意外问题的大量修复。很可能我们并不比最初编写代码的人更聪明。当我们编写自己的版本时，也会犯很多错误。


    本章列出的反模式是可能困扰我们代码的问题。但这些反模式都不是宣判代码死刑、使其完全不可用的编程“死罪”。我们可以通过重构解决许多问题，而不必全盘抛弃。很多问题我们也可以容忍。


    我们总有一种偏见，认为别人的代码是垃圾，而自己的代码很棒。挑别人的代码毛病并谈论它有多糟糕是件有趣的事。反模式无疑能教会我们很多关于编程的知识，帮助我们避免错误。但我们应该保持积极的态度，尤其是在与他人分享意见时。与其说“你的代码很烂，因为
    X”，不如说“我们的代码可以通过 Y 来改进”。


    ### 避免强类型化实体-属性-值模型


    实体-属性-值模型为在关系表中存储数据提供了极大的灵活性，但我们绝不能使用错误的数据类型。EAV 是数据库设计中一个有争议的话题，存在多种优缺点。尽管在使用
    EAV 时放宽某些数据库规范是合理的，但我们绝不能放弃类型安全。


    #### EAV 的优缺点


    EAV 是一种表结构，其中每个值都存储在单独的行中，而不是使用多个列来存储每行的多个值。架构师和应用程序员往往倾向于使用 EAV，而数据库管理员和数据库开发者则倾向于避免它。


    仅仅使用 EAV 本身并非反模式。构建 EAV 模型有多种方式，下表展示了一种简单且安全的方式（尽管真正的 EAV 表应包含约束、注释等）：


    ```sql

    -- 简单且安全的 EAV。

    create table good_eav

    (

    id            number primary key,

    name          varchar2(4000),

    string_value  varchar2(4000),

    number_value  number,

    date_value    date

    );

    insert into good_eav(id, name, string_value)

    values (1, ''姓名'', ''Eliver'');

    insert into good_eav(id, name, number_value)

    values (2, ''最高分'', 11);

    insert into good_eav(id, name, date_value)

    values (3, ''出生日期'', date ''2011-04-28'');

    ```


    使用上述表结构，我们无需为了添加新类型的数据而增加列。我们可以在任何时候，仅使用`INSERT`语句添加任何类型的值。与存储相同数据的常规表相比，EAV 表更窄、更紧凑。


    表 15-1 总结了使用 EAV 模型与使用多列模型的不同权衡。


    ### 表 15-1

    EAV 表与非 EAV 表对比


    |   | EAV | 非 EAV |

    | --- | --- | --- |

    | **灵活性** | 允许任何值，无需 DDL | 添加新列需要 DDL |

    | **性能** | 难以索引，对优化器不透明 | 易于索引，对优化器透明 |

    | **外观** | 在 ER 图中看起来更美观 | 在 IDE 中看起来更美观 |

    | **类型安全** | 无约束，需要危险的转换 | 允许约束，无危险转换 |

    | **大小** | 对于稀疏表更小 | 对于密集表更小 |

    | **查询** | 困难——需要更多表、条件和转换 | 简单——直接引用列 |


    根据上下文，上述列表中的不同项目会有不同的权重。例如，如果表只打算存储十几行数据，那么性能差异就无关紧要。


    只要我们是真诚地权衡和考虑利弊，选择 EAV 模型并没有错。反模式出现在 EAV 模型被错误实现的时候。

    '
- fmt: '### Never Use the Wrong Type


    This anti-pattern happens when an EAV table uses only a *single* column to store
    all values. One of the few absolute rules of *relational* databases is that we
    must never store data as the wrong type. The only exception is using staging tables
    to temporarily hold data before it is cleaned up and moved to the real tables.
    Even if we have unstructured data like XML or JSON, we can still store it as an
    `XMLType` or with the `IS JSON` check constraint. We must never create an EAV
    table like this:


    ```

    --Never create a table like this:

    create table bad_eav

    (

    id     number primary key,

    name   varchar2(4000),

    value  varchar2(4000)

    );

    insert into bad_eav values (1, ''Name''         , ''Eliver'');

    insert into bad_eav values (2, ''High Score''   , 11);

    insert into bad_eav values (3, ''Date of Birth'', ''2011-04-28'');

    ```


    Storing all values as a `VARCHAR2(4000)` is one of the worst mistakes we can make
    in a database. Since the database can no longer ensure type safety, we have to
    implement our own logic to ensure that numbers and dates are properly formatted.
    (As discussed in Chapter [7](#471418_2_En_7_Chapter.xhtml), verifying number and
    date formats is not a trivial task, especially when we consider internationalization
    and localization.) Every time we use an incorrectly typed value, we need to remember
    to use the right conversion functions. The numeric and date values will use more
    space than their native values. The optimizer will be completely unable to reason
    about the values and will have a hard time building good execution plans.


    Systems that store all their values as strings are jokingly referred to as “stringly
    typed” (a pun based on the phrase “strongly typed”). This problem can occur in
    many places; columns, parameters, variables, and expressions can be incorrectly
    processed as strings. This problem is tricky because the implicit conversion will
    work *most* of the time. It’s easy to miss these problems during testing and have
    bugs suddenly appear in production.


    ### Subtle Conversion Bugs in Oracle SQL


    Stringly typed data is especially bad in Oracle SQL because it creates subtle,
    nondeterministic bugs. For example, look at the following code. I normally dislike
    quizzing readers, but in this case, I want you to try to spot the bug:


    ```

    --Simple query against stringly-typed EAV that will likely fail.

    select *

    from bad_eav

    where name = ''Date of Birth''

    and value = date ''2011-04-28'';

    ```


    The preceding query will likely fail with the error message “ORA-01861: literal
    does not match format string.” Per the implicit data type conversion rules in
    the *SQL Language Reference*, Oracle will try to convert the string column `VALUE`
    into a date to match the date literal. (Don’t bother trying to memorize the implicit
    data type conversion rules – the best solution is to never use implicit data type
    conversion in the first place.) But that conversion of `VALUE` from a string into
    a date only works if our server or client date format is set to something similar
    to the format we used when we populated the table.


    A common, but terrible, solution to the preceding error is to change the date
    format on the client or the server. Running `ALTER SESSION SET NLS_DATE_FORMAT
    = ''YYYY-MM-DD''` will enable Oracle to correctly convert some of the strings
    into dates. But now we are forever fighting battles with client settings. We cannot
    reasonably expect every tool and every user to always set the date format parameter
    a specific way.


    Another common, but terrible, solution is to use a simple, explicit conversion
    of the `VALUE` column into a date:


    ```

    --Insidiously wrong way to query a bad EAV table.

    select *

    from bad_eav

    where name = ''Date of Birth''

    and to_date(value, ''YYYY-MM-DD'') = date ''2011-04-28'';

    ```


    The obvious problem with the preceding query is that the “Date of Birth” values
    in the table must always be formatted correctly. A single incorrectly formatted
    date string can ruin many queries. Since this is a generic column, it’s hard to
    prevent bad values with a constraint. And since this column may serve many purposes,
    there may be many other pieces of code that write to it that we need to validate.


    If we have perfectly formatted data in the EAV table, the preceding query will
    *probably* work. But the query is still not *guaranteed* to work because Oracle
    may execute the last two predicates out of order. The `TO_DATE` function can only
    successfully work for “Date of Birth”; it is going to fail if it runs against
    “Name” or “High Score.” Even if the data in the table is perfect, depending on
    the order of execution, the query will fail.


    The best way to write this query is using the new 12.2 conversion error syntax.
    The syntax in the following query is a bit more complicated, but it is the safest
    way to query the table. Unfortunately, even this new syntax does not work in a
    few specific cases,^([^(31)](#fn31)) but at least when the syntax fails, it will
    fail consistently:


    ```

    --New type-safe way to query a stringly-typed EAV.

    select *

    from bad_eav

    where name = ''Date of Birth''

    and to_date(value default null on conversion error, ''YYYY-MM-DD'') = date ''2011-04-28'';

    ```


    If we’re stuck using a version before 12.2, the solution gets even trickier. Without
    the improved conversion syntax, we must force a specific query execution order,
    which is difficult. Merely reordering the query does not work, and hints are difficult
    to set up correctly. One of the only safe ways to query the bad EAV table is to
    use the `ROWNUM` trick discussed in Chapter [12](#471418_2_En_12_Chapter.xhtml):


    ```

    --Old type-safe way to query a stringly-typed EAV.

    select *

    from

    (

    select *

    from bad_eav

    where name = ''Date of Birth''

    and rownum >= 1

    )

    where to_date(value, ''YYYY-MM-DD'') = date ''2011-04-28'';

    ```


    What did we gain by replacing the three columns `STRING_VALUE`, `NUMBER_VALUE`,
    and `DATE_VALUE` with the single column `VALUE`? Nothing. In practice, we rarely
    have data so generic that we can’t even be bothered to learn its type. Even if
    we’re only going to display data on a screen, we still need to know the type so
    we can properly justify and format the displayed values. If we have unstructured
    documents, we can create another EAV column named `XML_VALUE` and make the column
    an `XMLType`.


    Incorrectly typed data is a horrible situation that we should never be in. Using
    the wrong data types may doom us and all future SQL developers to writing weird
    queries and dealing with tricky random bugs. We must use the right data type every
    time, so we don’t have to worry about these problems.


    I’ve seen the negative long-term effects of stringly typed data several times.
    Some systems randomly generated type errors that nobody could reliably reproduce,
    and everyone just learned to live with it. On other systems we had to add protective
    layers to any query that touched the EAV. On the other hand, some systems can
    get away with it; perhaps their data is only accessed in one specific way, or
    they just got lucky. But we shouldn’t design our systems to require luck, so spend
    the extra minute to create a few extra columns.'
