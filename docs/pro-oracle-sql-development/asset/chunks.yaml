    from launch

    where launch_id = nvl(:p_launch_id, launch_id);

    select * from table(dbms_xplan.display(format => ''basic''));


    | Id  | Operation                      | Name            |


    |   0 | SELECT STATEMENT               |                 |

    |   1 |  VIEW                          | VW_ORE_D33A4850 |

    |   2 |   UNION-ALL                    |                 |

    |   3 |    FILTER                      |                 |

    |   4 |     TABLE ACCESS BY INDEX ROWID| LAUNCH          |

    |   5 |      INDEX UNIQUE SCAN         | LAUNCH_PK       |

    |   6 |    FILTER                      |                 |

    |   7 |     TABLE ACCESS FULL          | LAUNCH          |


    ```


    The preceding trick does not happen with all semantically equivalent versions
    of the query. For example, the `FILTER` operation disappears if we replace `WHERE
    LAUNCH_ID = NVL(:P_LAUNCH_ID, LAUNCH_ID)` with `WHERE LAUNCH_ID = :P_LAUNCH_ID
    OR :P_LAUNCH_ID IS NULL`. Searching for one or all values is a scenario where
    we need to use cryptic code to ensure the best execution.'
