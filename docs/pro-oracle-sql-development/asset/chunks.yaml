  trans: '## O(N²)：交叉连接、嵌套循环及其他操作


    `O(N²)` 算法已进入极其缓慢的领域。除非有特殊条件，例如输入规模接近零，否则我们应不惜一切代价避免这些运行时间。这种运行时间复杂度源于交叉连接、嵌套的
    `FOR` 循环、涉及全表扫描的嵌套循环连接以及其他一些操作。快速回顾一下它们的糟糕性能，图 16-11 展示了 `N!` 和 `N²`。


    ![](img/471418_2_En_16_Fig11_HTML.png)


    步数与输入规模关系图展示了 N 的阶乘和 N 的平方两条递增线。图 16-11 比较 N! 与 N²


    交叉连接并非总是糟糕的。有时，将一个表中的每一行与另一个表中的每一行进行无脑组合是必要的。如果行数接近于零，交叉连接也可能很快。但是，由于表连接错误或基数估计不佳而发生的交叉连接对性能来说是灾难性的。意外的交叉连接非常糟糕，以至于它们可以有效地拖垮整个数据库；Oracle
    可能需要无限量的临时表空间来构建结果集，从而剥夺了其他进程用于排序或哈希的空间。


    `FOR` 循环内部再套 `FOR` 循环是过程式代码中产生 `O(N²)` 运行时间的最常见方式。如果我们再添加*一个* `FOR` 循环，运行时间复杂度就变成
    `O(N³)`，然后是 `O(N⁴)`，依此类推。嵌套的 `FOR` 循环在 PL/SQL 中很容易发生，并且在使用显式游标时也太过常见。避免这种可怕的性能是我们应始终尝试用单个
    SQL 语句替换嵌套游标的重要原因。


    大多数开发人员编写过程式代码时使用嵌套的 `FOR` 循环，因为循环是思考连接的最简单方式。但 Oracle 无法改变命令式程序使用的算法——Oracle
    被困在完全按照我们的要求执行。转向声明式代码的优势在于，我们不必过多担心这些算法。当我们使用 SQL 时，我们让 Oracle 决定使用哪种连接算法。


    即使在切换到声明式 SQL 后，优化器仍有可能选择一个 `O(N²)` 算法。正如我们在本章前面的图 16-10 中所见，使用两个全表扫描的嵌套循环连接是一种糟糕的表连接方式。但这种最坏情况只应在我们缺少统计信息、缺少索引或连接条件奇怪时发生。


    `O(N²)` 会出现在其他意想不到的地方。在极端情况下，SQL 解析时间呈指数增长。例如，如果我们使用 `UNION ALL` 组合数千个子查询，解析时间会变得异常糟糕。（测量解析时间的代码太长，无法在此处包含，但可以在代码仓库中找到。）编写大型
    SQL 语句是件好事，但编写庞然大物般的 SQL 语句则不然。


    `MODEL` 子句将过程式逻辑引入 SQL 语句。`MODEL` 是一个巧妙的技巧，在第 19 章中有简要解释。该子句使我们能够将数据转换为电子表格，并对行和列应用
    `FOR` 循环。但就像使用 PL/SQL 一样，我们很容易发现自己陷入了 `O(N²)` 的性能困境。


    高的运行时间复杂度并非总是可以避免或必然是坏事。但是，当我们看到交叉连接或嵌套操作时，我们应该仔细思考。


    ## O(N!)：连接顺序


    `O(N!)` 是 Oracle 算法所能达到的最差复杂度，但幸运的是，它也很罕见。如第 6 章所讨论，表必须按特定顺序连接，并且对一组表进行排序的方式有很多种。在构建执行计划时，优化器必须解决表的排序问题；在尝试理解查询时，我们的大脑也必须解决这个问题。


    优化器能够处理大量表而不会出现严重问题。但是，当我们把系统推向极限时，总会遇到意想不到的问题。例如，如果我们嵌套超过一打公共表表达式，解析时间似乎会像 `O(N!)`
    一样增长。（代码演示见 GitHub 代码仓库。）在实践中，这个问题只会因为罕见的错误或因为我们做了不应该做的事情而发生。


    我们的大脑只能在短期记忆中保持一个小型有序列表。如果我们使用巨大的逗号分隔列表来构建 SQL 语句，我们将永远无法理解它们。构建小型内联视图并使用 ANSI
    连接语法将它们组合起来，将极大地简化我们的 SQL。没有精确的 SQL 复杂度方程，但我们可以这样理解复杂度比较：`(1/2N)! + (1/2N)!` ≪
    `N!`


    为了性能，我们希望将事物批处理在一起以减少开销。但为了使代码可读，我们希望将所有内容拆分成可管理的部分。这正是 SQL 的擅长之处；我们可以在逻辑上将查询划分为内联视图使其可理解，然后优化器可以高效地将代码重新组合起来。


    ## O(∞)：优化器


    Oracle 优化器构建 SQL 执行计划。构建最优执行计划是不可能的，因此我们可以说这个任务是 `O(∞)`。这个运行时间复杂度乍听之下不对；Oracle
    显然至少构建了*一些*最优执行计划。但将优化器视为在执行一项不可能的任务是有帮助的。


    构建最佳执行计划意味着优化器必须比较算法和数据结构，并确定哪一个运行最快。但从字面上确定一个通用程序是否会*完成*都是不可能的，更不用说运行多长时间了。确定程序是否会完成被称为停机问题。在计算机发明之前，艾伦·图灵就证明了计算机不可能解决停机问题。幸运的是，这是一个在理论上不可能在所有情况下解决的问题，但在几乎所有情况下实际解决它是可行的。


    给这个问题再添一层复杂性的是，Oracle 必须以极快的速度生成执行计划。给优化器起个更好的名字应该是“满意器”。满意化是在解决问题的同时考虑解决问题所需时间的一种优化问题解决方式。


    理解优化器工作的难度很重要。当 Oracle 偶尔生成糟糕的执行计划时，我们不应感到惊讶。优化器并不像我们想象的那么差——它只是在尝试解决一个无法解决的问题。当优化器遇到困难时，我们不应该放弃它；我们应该尝试与它合作。


    当生成了一个糟糕的执行计划时，我们的第一反应不应该是“我如何才能绕过这个坏计划？”。我们的第一反应应该是“我如何才能提供更好的信息，以便 Oracle 能做出更好的决策？”。这些信息几乎总是以优化器统计信息的形式存在，这将在第
    17 和 18 章中描述。


    我们需要抵制快速使用提示和更改系统参数的冲动。将优化器视为一个复杂的预测系统。我们绝不应该仅仅因为某个系统参数（如 `OPTIMIZER_INDEX_COST_ADJ`）对某一个查询有帮助就去更改它。这就像因为气象学家曾经错报了
    10 度，就给每个天气预报都加上 10 度一样。'
- fmt: '## Summary


    Many performance problems fall into a small number of run-time complexities. Knowing
    which functions represent our problems can help us understand why Oracle is behaving
    a certain way and how to find a solution. Practical algorithm analysis is simply
    matching our problems with predefined classes of problems. We may not use this
    approach often, but without it we''ll never be able to truly understand database
    performance.


    Most of our performance problems are related to implementation details and those
    pesky constants we''ve been conveniently ignoring. The next chapter looks at a
    more traditional list of Oracle performance concepts.


    Footnotes [1](#471418_2_En_16_Chapter.xhtml#Fn1_source)   [2](#471418_2_En_16_Chapter.xhtml#Fn2_source)   [3](#471418_2_En_16_Chapter.xhtml#Fn3_source)   [4](#471418_2_En_16_Chapter.xhtml#Fn4_source)   [5](#471418_2_En_16_Chapter.xhtml#Fn5_source)   [6](#471418_2_En_16_Chapter.xhtml#Fn6_source)


    # 17. Understand SQL Tuning Theories


    Algorithm analysis is a useful guide for understanding the foundations of Oracle
    performance. Now we must turn to the more traditional techniques and theories
    of database performance. First, we need to discuss performance issues from the
    end user''s perspective. Then we will discuss several popular approaches to performance
    tuning. But all roads eventually lead to SQL tuning. For effective SQL tuning,
    we need to understand the importance of execution plans, the operations available
    to execution plans, cardinality, optimizer statistics, transformations, and dynamic
    optimization features.


    ## Managing User Expectations


    Before we jump into technical topics, we need to address the human aspect of performance
    tuning. We''re usually not tuning for ourselves; we''re tuning systems for clients
    or end users. We need to carefully think about the end user''s perspective when
    we investigate problems, explain resources, present our ideas, and implement the
    changes.


    First, we need to get a clear, objective definition of the performance problem.
    The end users may not have much experience troubleshooting, so it''s up to us
    to help guide the conversation. Instead of simply asking, "What''s wrong?" we
    should ask for specific details. We need to know if the problem is consistent
    or intermittent, when does it happen, how long does it take to run, has it always
    been this slow, how long should it take to run, are we sure the problem is in
    the database and not an application, etc. We must remember the curse of knowledge,
    and we must try extra hard to convey tuning information in simple language. An
    extra minute spent in the discovery phase can save us hours of needlessly tuning
    the wrong thing.


    When we find and understand the problem, we have to consider the available resources
    that may provide context for poor performance. Many performance problems are bugs
    that can be fixed, but many other performance problems are caused by resource
    limitations. We need to understand our database and server resources and honestly
    discuss them with end users. I''ve soothed many angry users by explaining, "Our
    old servers are slower than your laptop, so this is as fast as we can process
    the data" or "You''re reading X gigabytes of data. Our hard drives can only read
    Y megabytes per second. This job is always going to take at least Z seconds."
    Users are more willing to wait if they think the wait is reasonable.


    Depending on the scope of the change, we may need to present a cost/benefit analysis
    to the end user or client for approval. The cost may be money to buy hardware,
    or the cost may be our time. Honesty, humility, and testing are important at this
    step; it''s not uncommon to throw hardware at a problem and not fix anything,
    or for deadlines to slip. It''s better to under-promise and over-deliver.


    When we implement the change, we must be sure to carefully measure performance
    before and after. The end users will want to know precisely what they got for
    their investment.


    Like with most development tasks, most of our performance tuning time will be
    spent discussing and coordinating the work instead of the work itself. But this
    book is focused on SQL development, so let''s jump into the technical work of
    finding and fixing performance problems.


    ## Performance Tuning State of Mind


    This chapter is going to disappoint you. I know what you want, but it''s not possible
    to build a single, comprehensive performance tuning checklist. Whenever we encounter
    a performance problem, we wish we could scan through a checklist or flip through
    the chapters of a book or refer to a standard operating procedure. There are plenty
    of lists in this book, but performance tuning is too complex to be described in
    simple step-by-step instructions.


    Performance tuning is hard, and we need to approach it differently than other
    problems. We can''t treat performance tuning like debugging. We need a wide variety
    of approaches to guard ourselves against wasting our time with motivated troubleshooting.


    ### Performance Tuning Is Not Debugging


    We have to treat performance problems different than code problems. It''s tempting
    to apply the same problem-solving process to both tuning and debugging; find a
    problem, drill down to the root cause, and then fix or work around the underlying
    problem. We need to use a *depth-first* approach for debugging and a *breadth-first*
    approach for performance tuning. Developers and administrators who try a depth-first
    approach for performance tuning will waste a lot of time.


    For debugging, we only need to find the first problem and then drill down. The
    program must work 100% correctly, and even a single incorrect byte is worth investigating.
    Even if we don''t fix the right problem, we still accomplish something useful.


    For performance tuning, we need to find the first *significant* problem and then
    drill down. The word "significant" is subjective and can mean a problem that slows
    down a web page, consumes so many resources that it slows down the entire system,
    drives up server costs, etc. But even though we can''t all completely agree on
    what a significant performance problem even is, we can still adopt a mindset that
    will usually lead us to us solve important problems. Perhaps it is more useful
    to think of what a significant performance problem is not; a problem is not significant
    merely because we don''t like it or it''s something we know how to fix. There
    are always countless candidates for performance problems. The problem could be
    something in the application, database, operating system, network, hardware, SAN,
    etc. It''s easy to get distracted by red herrings. If we don''t quickly eliminate
    spurious correlations, we''re going to waste a lot of time.


    The art of performance tuning is to use multiple approaches to quickly gather
    and filter a lot of data. We must ignore the 90% that runs fine, ignore the 9%
    that is slow but necessarily slow, and find the 1% that is slow and fixable. If
    we use a simple checklist, with overly simplistic rules like "avoid full table
    scans," we''ll spend too much time fixing the wrong problems.


    ### Motivated Troubleshooting


    We must constantly be on guard for biases that will make us waste days fixing
    irrelevant problems. We all have the urge to take the easy path and focus on fixing
    the problems we are familiar with. Following familiar paths is a good strategy
    for bug fixing – any cleanup is a good thing. Having a utopian view of the code
    is beneficial.


    But performance tuning must stay firmly grounded in reality. The ugly truth is
    that nobody will ever fully understand all the wait events or all the execution
    plan operations. We only have time to fix the slow ones.


    For personal education it''s helpful to investigate anything that doesn''t look
    right. But when there''s a critical performance problem, we must focus on only
    the most important part.'
