    from all_tables

    where table_name = ''SIMPLE_TABLE2''

    and owner = sys_context(''userenv'', ''current_schema'');

    select *

    from all_tab_columns

    where table_name = ''SIMPLE_TABLE2''

    and owner = sys_context(''userenv'', ''current_schema'');

    ```


    **Global temporary tables（全局临时表）** 存储只有当前会话才能看到的临时值。数据可以保留到下次提交（使用 `ON COMMIT
    DELETE ROWS` 选项）或直到会话结束（使用 `ON COMMIT PRESERVE ROWS` 选项）。以下示例创建了一个全局临时表，并显示了值在提交后如何消失：


    ```

    --全局临时表，数据保留到下次提交。

    create global temporary table temp_table(a number)

    on commit delete rows;

    --插入数据，它只出现在你的会话中。

    insert into temp_table values(1);

    select count(*) from temp_table;

    COUNT(*)

    --但一旦你提交，数据就消失了。

    commit;

    select count(*) from temp_table;

    COUNT(*)

    ```


    全局临时表往往在几个方面被误用。首先，Oracle 的全局临时表是*全局*的；其*定义*可被其他会话查看，但*数据*则不能。表的定义是永久的，表不需要不断地删除和重建。其次，Oracle
    的全局临时表不是内存结构。写入全局临时表就像写入堆表一样，会写入磁盘。全局临时表对于保存程序的临时结果很有用，但并不适用于频繁的即时创建。与 SQL Server
    不同，Oracle 的全局临时表主要不是为了提高性能。它们在某些情况下可能会提高性能，但我们不应盲目添加全局临时表并期望性能提升。


    全局临时表的最大问题是当它们被用作内联视图的糟糕替代品时。复杂查询最好使用多个内联视图构建，这样可以简化程序并让 Oracle 决定何时读写数据。全局临时表仅在结果需要在多个查询中多次读取，或者在一个查询中完成所有操作不可行时才有用。第
    12 章讨论了如何创建大型 SQL 语句，实际上很少有查询需要用全局临时表来拆分。


    **Private temporary tables（私有临时表）** 在 18c 中引入。它们与全局临时表类似，但存储在 PGA 的内存中，且定义和数据都对会话私有。与全局临时表类似，私有临时表并非改善
    SQL 的万能药。以下示例创建了一个私有临时表，之后可以像使用任何其他表一样使用它，但仅在同一会话中。请注意，私有临时表必须有一个特定的前缀，默认为 `ORA$PTT`：


    ```

    --创建一个私有临时表。

    create private temporary table ora$ptt_private_table(a number)

    on commit drop definition;

    ```

    '
- fmt: 'The worst part about private temporary tables is the confusion over the name.
    Prior to 18c there was only one kind of temporary table. References to “temporary
    tables” are almost certainly referring to “global temporary tables.”


    ## Sharded tables

    are tables where the rows are distributed among multiple shared-nothing databases.
    The administration and use of this feature is too complex for an example in this
    book. In my experience, a single database is the best way to solve most of our
    problems. When we try to replicate and shard, we often end up creating more problems
    than we’re solving. The technologies needed to build Facebook or Google do not
    necessarily apply to our simpler, internal applications.


    ## Object-relational tables

    let us create tables based on user-defined types. Storing complex objects in a
    column doesn’t extend the relational model – it breaks the relational model. The
    disadvantages of breaking the relational model, such as ruining SQL, almost certainly
    outweigh the advantages, such as simplifying a few specific use cases. There are
    exceptions, such as JSON and XML, but those exceptions were carefully designed.
    Object-relational anti-patterns will be discussed in more detail in Chapter [15](#471418_2_En_15_Chapter.xhtml).


    ## External tables

    are tables whose data comes from flat files or data pump files managed by the
    operating system. To create an external table, we specify the Oracle directory
    (which maps to an operating system directory), a file name, and a list of columns
    similar to a SQL*Loader format. Then we can read from a text file just like a
    regular table.


    External tables are the fastest way to load flat files into Oracle tables, and
    they are also convenient for reading archived data without fully restoring all
    the data. In practice, our text files are never as clean as relational data, so
    I recommend keeping the external tables as generic as possible. Instead of doing
    conversion and processing through SQL*Loader column definitions, create external
    tables with `VARCHAR2(4000)` columns. Then we can do the conversion and processing
    in a separate PL/SQL step. Keeping the external tables simple allows us to at
    least query the raw data if there are problems. Exception handling in PL/SQL is
    more useful than exception handling with external table definitions.


    External tables also let us run an executable preprocessor before loading data.
    That preprocessor is intended for things like unzipping a file before loading
    it. But there are several creative uses for shell scripts that generate table
    data. For example, we can create a preprocessor script with a simple `DIR` command
    to list all the files in a directory.([23](#fn23))


    ## Index-organized tables

    (IOTs) are stored inside an index. Normally, an index is an optional data structure,
    used for performance and constraint enforcement. An index-organized table combines
    the table data with the primary key index. If one index is always used to access
    the table data anyway, we might as well put more table data inside that index,
    instead of requiring a separate table lookup. Index-organized tables can also
    reduce the amount of space, since the indexed data is not duplicated. The following
    code is a simple example of creating an index-organized table:


    ```sql

    --Create index-organized table.

    create table iot_table

    (

    a number,

    b number,

    constraint iot_table_pk primary key(a)

    )

    organization index;

    ```


    ## Immutable and blockchain tables

    , available since 19c, allow us to limit or verify the operations on our tables.
    Immutable tables allow only reads and inserts (with some exceptions), which can
    help us ensure our tables haven’t been modified. Blockchain tables also prevent
    updates and deletes, but they use cryptographic hashes to further ensure our data
    hasn’t been tampered with. The following example shows an immutable table in action:


    ```sql

    --Create immutable table.

    SQL> create immutable table immutable_test(a number)

    2  no drop until 16 days idle

    3  no delete until 16 days after insert;

    Table created.

    SQL> insert into immutable_test values(1);

    1 row created.

    SQL> update immutable_test set a = -1;

    update immutable_test set a = -1;

    *

    ERROR at line 1:

    ORA-05715: operation not allowed on the blockchain or immutable table

    ```


    We should be cautious before using immutable or blockchain tables. Aside from
    the inconvenience of not allowing updates and deletes, performance penalties,
    technical restrictions, and the bugs that affect those new table types, there’s
    a good chance of those data structures being misused. Blockchains are notoriously
    overused because they are oversold as a technical solution to a sociological problem.
    The cost of development and administration can skyrocket if we insist on not trusting
    any of our developers and DBAs.'
