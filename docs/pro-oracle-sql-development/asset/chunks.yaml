    ### 分组与排序


    分组和查找唯一值可以通过 `HASH` 或 `SORT` 操作完成。这些操作可以带有 `GROUP BY` 或 `UNIQUE` 选项。哈希通常比排序更快，但在极少数情况下，我们可能需要通过类似
    `/*+ NO_USE_HASH_AGGREGATION */` 的提示来强制优化器的决策。


    `SORT` 操作也可用于 `ORDER BY`、`CREATE INDEX`、`JOIN`（在执行 `MERGE JOIN` 之前对结果排序）和 `AGGREGATE`（当存在聚合函数但没有任何分组时使用）等选项。


    除了实际上并不排序数据的 `AGGREGATE` 选项外，我们应尽量避免这些缓慢的 `SORT` 操作。然而，如果排序包含了 `STOPKEY` 选项，它也可能很快。`STOPKEY`
    意味着处理在前 N 行之后停止，这可能是因为 `ROWNUM` 或 `FETCH` 的缘故。


    与排序和哈希类似，还有 `WINDOW` 操作，它用于分析函数。分析函数功能强大且速度快，通常比编写自连接更好的选择。但要警惕嵌套的 `WINDOW` 操作。如果多个分析函数使用了不同的
    `PARTITION BY` 或 `ORDER BY` 子句，每个函数都会对应一个 `WINDOW SORT` 操作。所有这些排序可能会变得代价高昂。


    ### 集合操作符


    我们可以使用四种集合操作符来组合查询：`INTERSECT`、`MINUS`、`UNION` 和 `UNION ALL`。（21c 版本添加了 `EXCEPT`
    作为 `MINUS` 的同义词，并为 `MINUS` 和 `INTERSECT` 添加了 `ALL` 选项。）我们可能期望每个命令对应一个单独的操作，但这四个命令只映射到三种执行计划操作：`INTERSECTION`、`MINUS`
    和 `UNION-ALL`。`UNION` 操作符会被转换为一个 `UNION ALL` 操作加上一个 `SORT UNIQUE` 子操作。这个额外的排序操作就是为什么如果我们知道值已经是唯一的，就应该始终使用
    `UNION ALL`。


    Oracle 可能会将查询转换为使用集合操作。有时，与其在整个表上只使用一种访问方式，不如使用不同的技术多次访问表并结合结果。通过表扩展，Oracle 可以以不同的方式查询不同的分区。通过
    OR 扩展，Oracle 可以以不同的方式查询不同的条件——通常使用不同的索引。对于这两种类型的转换，新计划可能看起来比原始计划大一倍，而这两部分将通过 `CONCATENATION`
    或 `UNION ALL` 操作组合在一起。


    ### 优化器统计信息


    优化器统计信息对性能至关重要，以至于 Oracle 有多个专门收集它们的操作：


    1.  `STATISTICS COLLECTOR`：在执行计划中间收集优化器统计信息，用于自适应查询计划。如果实际基数与预期基数不同，自适应查询计划可以动态地改变自身。例如，一个自适应查询计划可能默认使用嵌套循环来处理它认为涉及少量行的连接，但如果行数意外地大，它将切换到哈希连接。


    2.  `APPROXIMATE NDV`：在单次扫描中近似计算唯一值的数量，无需排序或哈希。


    3.  `OPTIMIZER STATISTICS GATHERING`：在创建表时收集优化器统计信息。如果收集统计信息只需要一次扫描，并且我们正在加载大量数据，不妨同时收集统计信息。


    收集优化器统计信息可能很慢，因此我们需要留意上述操作。如果统计信息已经收集，我们就不需要在以后重复努力。或者如果表不需要统计信息，我们可以使用提示来抑制这些操作。


    ### 并行


    并行是显著提高慢速 SQL 语句性能的绝佳机会。优化并行很棘手，需要仔细关注语法和执行计划。以下是主要的并行操作：


    1.  `PX BLOCK`：并行读取数据块。


    2.  `PX SEND`：将数据块向上发送到执行计划中的下一步。选项决定了块的发送方式，这是一个重要的决定。对于小结果集，`BROADCAST` 选项可能效果很好——它将所有行发送到所有并行服务器。对于大结果集，`HASH`
    选项可能效果很好——它将行分配给并行服务器。这里还有其他一些未讨论的选项。


    3.  `PX RECEIVE`：从 `PX RECEIVE` 接收行。


    4.  `PX COORDINATOR`：最终的并行操作，负责协调和控制子并行操作。


    下面的例子展示了语法可以有多挑剔，以及即使细微的执行计划差异也可能非常重要。首先，我们来看一个每个步骤都并行运行的语句：


    ```sql

    --完全并行的 SQL 语句。

    alter session enable parallel dml;

    explain plan for

    insert into engine

    select /*+ parallel(8) */ * from engine;

    select * from table(dbms_xplan.display);

    ------------------------------------------- ... -------------------

    |Id|Operation                             | ... |IN-OUT|PQ Distrib|

    ------------------------------------------- ... -------------------

    | 0|INSERT STATEMENT                      | ... |      |          |

    | 1| PX COORDINATOR                       | ... |      |          |

    | 2|  PX SEND QC (RANDOM)                 | ... | P->S |QC (RAND) |

    | 3|   INDEX MAINTENANCE                  | ... | PCWP |          |

    | 4|    PX RECEIVE                        | ... | PCWP |          |

    | 5|     PX SEND RANGE                    | ... | P->P |RANGE     |

    | 6|      LOAD AS SELECT (HYBRID TSM/HWMB)| ... | PCWP |          |

    | 7|       OPTIMIZER STATISTICS GATHERING | ... | PCWP |          |

    | 8|        PX BLOCK ITERATOR             | ... | PCWC |          |

    | 9|         TABLE ACCESS FULL            | ... | PCWP |          |

    ------------------------------------------- ... -------------------

    Note


    - 由于提示，并行度为 8

    ```


    下面的代码有一个小改动。代码没有使用提示 `PARALLEL(8)`，而是使用了提示 `PARALLEL(ENGINE, 8)`。花一分钟时间比较一下前面例子和下面例子之间的执行计划：


    ```sql

    --部分并行的 SQL 语句。

    alter session enable parallel dml;

    explain plan for

    insert into engine

    select /*+ parallel(engine, 8) */ * from engine;

    select * from table(dbms_xplan.display);

    ----------------------------- ... -------------------

    |Id|Operation               | ... |IN-OUT|PQ Distrib|

    ----------------------------- ... -------------------

    | 0|INSERT STATEMENT        | ... |      |          |

    | 1| LOAD TABLE CONVENTIONAL| ... |      |          |

    | 2|  PX COORDINATOR        | ... |      |          |

    | 3|   PX SEND QC (RANDOM)  | ... | P->S |QC (RAND) |

    | 4|    PX BLOCK ITERATOR   | ... | PCWC |          |

    | 5|     TABLE ACCESS FULL  | ... | PCWP |          |

    ----------------------------- ... -------------------

    Note


    - 由于表属性，并行度为 8

    - 由于对象未使用并行子句装饰，PDML 被禁用

    - 由于未给出 append 提示且未并行执行，直接路径加载被禁用

    ```


    计划差异是由提示类型引起的。并行有语句级提示和对象级提示。我们几乎总是希望使用语句级提示。如果我们要并行运行一个操作，不妨并行运行所有操作。（然而，有一些重要的例外情况。例如，我们不希望并行运行微小的、相关的子查询。）提示
    `PARALLEL(8)` 告诉 Oracle 并行运行所有操作。提示 `PARALLEL(ENGINE, 8)` 告诉 Oracle 只并行化从 `ENGINE`
    表的*读取*操作。

