- fmt: 'We should not change the preceding parameters unless we think we are smarter
    than the engineers at Oracle. There will be plenty of times when we are smarter
    than Oracle engineers, like when we know something specific about our environment.
    For example, only we know how many sessions our database is intended to handle.
    If we have a database that must allow a thousand connections, then it’s necessary
    to increase `SESSIONS` and `PROCESSES`, even though the change will slightly increase
    the memory requirements.


    On the other hand, we don’t know how much faster or slower our indexes are than
    Oracle’s expected performance; changing `OPTIMIZER_INDEX_COST_ADJ` is almost certainly
    a bad idea. There are times when changing that parameter will improve a specific
    query’s performance, by changing an execution plan from a full table scan to an
    index scan. But we shouldn’t alter the entire system to fix a problem for just
    one statement. The solution should be proportional to the size of the problem,
    and Oracle allows us to set that parameter per session or per query. The reason
    I included this parameter on the preceding list is not because we need to customize
    it, but because we frequently need to change it back to the default after someone
    else mistakenly modifies it.


    ### Relational Tools for Inspecting Databases


    There are many other tools scattered throughout the database that let us investigate
    the database.


    `VSIZE` is a useful function that tells us the size of a value in bytes. That
    may sound like a trivial feature at first, but a surprisingly large number of
    architectural decisions hinge on the size of data types. There is a silly but
    persistent myth that Oracle always allocates as much space as possible. A few
    calls to `VSIZE` will dispel that myth. `VSIZE` also demonstrates that small numbers
    may take up more space than we might expect:


    ```

    --Byte size of values:

    select

    vsize(0) zero_size,

    vsize(1) one_size,

    vsize(10) ten_size,

    vsize(date ''2000-01-01'') date_size,

    vsize(cast(''a'' as varchar2(4000))) string_size

    from dual;

    ZERO_SIZE  ONE_SIZE  TEN_SIZE  DATE_SIZE  STRING_SIZE

    ---------  --------  --------  ---------  -----------

    1         2         2          7            1

    ```


    `DUMP` displays the internal contents of a value. This function can be useful
    when dealing with non-ASCII characters. For example, imagine a table that contains
    links. When we query the table, everything looks fine:


    ```

    select * from random_links;

    URL


    google.com

    ```


    Hold on a minute – let’s dig deeper. That string looks like “google.com”, but
    is the value in the database really “google.com”? Look at this output and see
    if you can spot the problem:


    ```

    select dump(url,16) from random_links;

    DUMP(URL,16)


    Typ=1 Len=11: 67,6f,c3,b6,67,6c,65,2e,63,6f,6d

    ```


    The first thing you might notice is `Len=11`. The length is 11 bytes, but “google.com”
    only has ten characters. If you look carefully at the hexadecimal values, you’ll
    notice that the second “o” is not really “o”, it’s “ö”. It’s an “o” with a dieresis,
    or two dots on top.


    This trick is called visual spoofing. It’s intentionally hard to see, and without
    a function like `DUMP`, we may have never spotted the problem. If you’re curious,
    the malicious string was created like this:


    ```

    insert into random_links values(''go''||unistr(''\00f6'')||''gle.com'');

    ```


    In theory we can recreate any object using the data dictionary. For example, all
    the features related to a table can be found in data dictionary views such as
    `ALL_TABLES`, `ALL_TAB_COLUMNS`, `ALL_CONSTRAINTS`, etc. In practice it is difficult
    to reconstruct the full DDL for objects, especially for the obscure features.
    The function `DBMS_METADATA.GET_DDL` can make our lives much easier and has many
    options for adjusting the formatting. For example, the following is to find the
    statement behind the table `LAUNCH`:


    ```

    select dbms_metadata.get_ddl(

    object_type => ''TABLE'',

    name        => ''LAUNCH'',

    schema      => ''SPACE'') ddl

    from dual;

    DDL


    CREATE TABLE "SPACE"."LAUNCH"

    (    "LAUNCH_ID" NUMBER,

    "LAUNCH_TAG" VARCHAR2(15 CHAR),

    "LAUNCH_DATE" DATE,

    ...

    ```


    But if we find ourselves playing schema detective, we’ve already lost. As discussed
    in Chapter [2](#471418_2_En_2_Chapter.xhtml), the best way to find schema scripts
    is to look in version-controlled text files. The full output for the preceding
    query, while technically correct, has some formatting issues and includes a huge
    amount of worthless information, whereas our installation scripts are all signal
    and no noise. There should be no need to put up with meaningless bytes.


    The `SYS_CONTEXT` function can retrieve data about the current session’s contexts.
    We can create custom contexts, but the most common context is the default `USERENV`.
    It’s a convenient way to find out information about the current session, without
    having to look through multiple tables. For example, the following is to get the
    name of the host machine that we used to connect to the database:


    ```

    select sys_context(''userenv'', ''host'') from dual;

    ```


    For code analysis, PL/Scope can be useful for tasks that require understanding
    the code. PL/Scope can find specific dependencies, unused variables, etc. And
    the package `DBMS_DEBUG` can help us step through our code line by line as it
    executes. Those are interesting tools, but they are generally only helpful when
    combined with an IDE.


    ### Non-relational Tools for Inspecting Databases


    Oracle includes many non-relational tools to also help inspect the database. (Performance
    tuning tools are a large topic and are covered in Part IV.) A program can work
    with a database and maybe even run inside a database program, but not necessarily
    be relational. This distinction is important because non-relational tools cannot
    be used in as many contexts as relational tools.


    For example, the `DESC` command in SQL*Plus is a neat way to quickly get information
    about a table:


    ```

    SQL> desc space.launch

    Name                  Null?    Type

    --------------------- -------- -----------------

    LAUNCH_ID             NOT NULL NUMBER

    LAUNCH_TAG                     VARCHAR2(15 CHAR)

    LAUNCH_DATE                    DATE

    ...

    ```


    While the `DESC` command is useful, we may want to avoid becoming too dependent
    on it, because it’s only available in SQL*Plus. Even though SQL*Plus is available
    to almost all developers, most developers use a graphical IDE. Using a query against
    the data dictionary, or a call to `DBMS_METADATA.GET_DDL`, may take a bit more
    work, but it’s worth it to ensure that we build purely relational solutions.


    The traditional export and export data pump programs, `EXP` and `EXPDP`, can also
    be used to find useful data and metadata. The undocumented `ORADEBUG` command
    can output individual blocks and help us see exactly how data is stored on disk.
    Oracle tracing can help us understand the optimizer’s decisions and see exactly
    what is running in the background to support our queries. And there’s a whole
    world of tools that are generally only useful to database administrators: listener
    control, server control, etc.


    Oracle is closed source, but if we are familiar with all these metadata tools,
    we can figure out exactly what is going on. It’s helpful to know a wide variety
    of database tools, because different people have different styles and preferences
    for investigating database problems. For example, I typically work in PL/SQL Developer
    and use Ctrl+right-click to describe a table. But when I’m working with DBAs who
    prefer SQL*Plus, I’ll show them the table metadata by using the `DESC` command.'
