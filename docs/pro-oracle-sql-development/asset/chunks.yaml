    *

    *  _______        _       +----------------+

    * |__   __|      | |      |doesn''t have to be+-----+

    *    | | _____  _| |_     +----------------+       |

    *    | |/ _ \ \/ / __|                  |

    *    | |  __/>  <| |_     +------+              |

    *    |_|\___/_/\_\\__|    |boring+<----------------+

    *                         +------+

    *

    ***********************************************************/

    ```


    SQL is a real programming language and deserves useful comments. Always remember
    that the audience for our code is not the computer – the audience is other humans.


    ## Choose Good Names


    It’s important to choose good names for our databases, schemas, schema objects,
    functions, procedures, variables, aliases, inline views, and all other programming
    objects. Choosing good names isn’t just about creating aesthetically pleasing
    code. We need to create logical, memorable chunks, to help make the most of people’s
    short-term memory. When we’re writing source code, we’re at a significant disadvantage
    compared with normal writing. Choosing names is one of the few things we have
    control over, so we should spend extra effort picking the right names.


    ### Name Styles


    As we gain experience, we build our own personal set of styles and naming rules.
    The specific rules don’t matter that much, as long as we are trying to achieve
    consistency, simplicity, and flexibility. One common rule is to use nouns for
    things like packages and tables and to use verbs for procedures and functions.
    Another example is to use singular nouns for table names, instead of plural. Avoid
    single-letter variable names like “A” and “B.” On the other hand, “i” and “j”
    are common names for loop variables. Avoid abbreviations, unless the abbreviations
    are standard in our domain. Avoid names that are listed in `V$RESERVED_WORDS`;
    those names may not work in all contexts, may not work in future versions, and
    may confuse syntax highlighters and other programming tools. Whatever we do, we
    should spend more than the bare-minimum amount of time to give everything a proper
    name.


    On the other hand, we don’t want to discuss every name in a team meeting, create
    a spreadsheet of approved table names, or have a formal process to verify all
    new column names. Those three examples are not straw men – I’ve literally had
    to endure each of those scenarios. Aside from being a bureaucratic nightmare,
    creating too much process leads to worse table and column names. In a previous
    job, we didn’t always have time to go through the process for approving new column
    names, so we would settle on the least-worst existing name. We should strive for
    good names, but we must be pragmatic about it.


    It can help to include values in our names. For example, if we use an analytic
    function to find the first occurrence of something per year, we can name the column
    `FIRST_WHEN_1`. When we want to limit the results to the first occurrence, the
    predicate becomes obvious: `FIRST_WHEN_1 = 1`. We can do the same thing with small
    lists of values, to make it clear what values can be included in the expression.
    Our names can become tiny contracts that guarantee we’re using the values correctly.'
  raw: '### Comment Mechanics


    There are two kinds of comments in SQL and PL/SQL. Single-line comments start
    with `--`. Multiline comments start with `/*` and end with `*/`. SQL*Plus also
    allows single-line comments that start with either `REM` or `REMARK`. But we should
    ignore features exclusive to SQL*Plus when there are alternatives that work with
    all SQL clients. There is also the `COMMENT` object that we can attach to tables
    and columns. Those `COMMENT` objects can be useful, especially when IDEs automatically
    read the comments and display them in the result grid.


    Comments are also used as hints, if the comments start with either `--+` or `/*+`.
    Optimizer hints are always suspicious, so when we create a hint, we should also
    include a text comment. Hints are read left to right and do not throw syntax errors,
    so if we include our text *after* the real comment, everything will work fine:


    ```

    --Hint and comment example.

    select /*+ cardinality(launch, 9999999) - I know this is a bad idea but...

    ```


    Some people say that comments are an apology. Even if that statement is true,
    when we’re programming, we have a lot to apologize for. For example, the hint
    in the preceding code is generally considered a “bad” hint. We’re lying to the
    optimizer, telling the optimizer to pretend the table is much larger than its
    true size. There are better approaches to tuning SQL statements, but we may have
    constraints preventing us from using the best approach. In case those constraints
    change in the future, it helps to explain why we’re doing something bad now. It’s
    better to have a developer find bugs or faulty assumptions through our comments
    than to have someone else discover the problem in production.


    There are a few limitations on Oracle comments we need to watch out for. Comments
    cannot occur after a statement terminator. For example, the following code does
    not work correctly in SQL*Plus or other contexts:


    ```

    SQL> --Don''t use a comment after a line terminator.

    SQL> select * from dual; --This doesn''t work.


    ```


    Multiline comments should contain a space after the opening `/*,` or there may
    be problems on some SQL*Plus clients. The following SQL*Plus session looks confusing,
    because SQL*Plus gets easily confused. SQL*Plus doesn’t have a full parser, and
    it may incorrectly interpret a multiline comment without a space as a forward
    slash requesting another execution of the `SELECT` statement. We can avoid the
    following problem by using `/* a */` instead of `/*a*/`. (The following problem
    does not happen on the latest version of SQL*Plus. But the rule about adding a
    space after the first slash-asterisk is still in the manual.)


    ```

    SQL> --Example of bad comment.

    SQL> select 1 from dual;


    SQL> /*a*/


    ```


    Multiline comments are useful for when we’re debugging or testing and want to
    quickly remove a lot of code. But for permanent code, it helps to stick with single-line
    comments, since multiline comments cannot be embedded inside each other. Once
    we start using multiline comments in permanent code, we cannot quickly comment
    out large blocks of code.


    ### Comment ASCII Art


    We can make the most out of our text-only comments with ASCII art. We don’t want
    our comments to look like goofy forum signatures, but there are times when we
    can benefit by using something fancier than plain text. If there are critical
    variables we don’t want developers to mindlessly modify, an extra-large “STOP”
    or “DANGER” can help. We don’t have to hand-draw our own ASCII text; there are
    many ASCII text generators online.


    To explain complex processes, it helps to create small flowcharts. There are also
    several ASCII diagram tools readily available online.


    We should focus the vast majority of our effort on writing plain text. But we
    must recognize that programmers are going to skim through the program and not
    heed our dire warnings. We can catch their eye with ASCII art like the following
    comment:


    ```

    /***********************************************************

    *

    *  _______        _       +----------------+

    * |__   __|      | |      |doesn''t have to be+-----+

    *    | | _____  _| |_     +----------------+       |

    *    | |/ _ \ \/ / __|                  |

    *    | |  __/>  <| |_     +------+              |

    *    |_|\___/_/\_\\__|    |boring+<----------------+

    *                         +------+

    *

    ***********************************************************/

    ```


    SQL is a real programming language and deserves useful comments. Always remember
    that the audience for our code is not the computer – the audience is other humans.


    ## Choose Good Names


    It’s important to choose good names for our databases, schemas, schema objects,
    functions, procedures, variables, aliases, inline views, and all other programming
    objects. Choosing good names isn’t just about creating aesthetically pleasing
    code. We need to create logical, memorable chunks, to help make the most of people’s
    short-term memory. When we’re writing source code, we’re at a significant disadvantage
    compared with normal writing. Choosing names is one of the few things we have
    control over, so we should spend extra effort picking the right names.


    ### Name Styles


    As we gain experience, we build our own personal set of styles and naming rules.
    The specific rules don’t matter that much, as long as we are trying to achieve
    consistency, simplicity, and flexibility. One common rule is to use nouns for
    things like packages and tables and to use verbs for procedures and functions.
    Another example is to use singular nouns for table names, instead of plural. Avoid
    single-letter variable names like “A” and “B.” On the other hand, “i” and “j”
    are common names for loop variables. Avoid abbreviations, unless the abbreviations
    are standard in our domain. Avoid names that are listed in `V$RESERVED_WORDS`;
    those names may not work in all contexts, may not work in future versions, and
    may confuse syntax highlighters and other programming tools. Whatever we do, we
    should spend more than the bare-minimum amount of time to give everything a proper
    name.


    On the other hand, we don’t want to discuss every name in a team meeting, create
    a spreadsheet of approved table names, or have a formal process to verify all
    new column names. Those three examples are not straw men – I’ve literally had
    to endure each of those scenarios. Aside from being a bureaucratic nightmare,
    creating too much process leads to *worse* table and column names. In a previous
    job, we didn’t always have time to go through the process for approving new column
    names, so we would settle on the least-worst existing name. We should strive for
    good names, but we must be pragmatic about it.


    It can help to include values in our names. For example, if we use an analytic
    function to find the first occurrence of something per year, we can name the column
