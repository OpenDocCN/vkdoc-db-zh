    key`唯一标识每一行，是`SUPPLIER`、`PART`和`PROJECT`的组合，其中每一个也是指向另一个关系的`foreign key`。外键确保查找值在它们引用的表中实际存在。


    表 1-1


    supply


    | supplier | part | project | quantity |

    | --- | --- | --- | --- |

    | 1 | 2 | 5 | 17 |

    | 1 | 3 | 5 | 23 |

