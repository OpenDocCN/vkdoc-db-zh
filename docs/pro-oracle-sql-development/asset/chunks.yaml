    We should even be cautious of using Oracle Enterprise Manager. OEM is a powerful,
    useful program, and it has many pages to walk us through performance issues. Unfortunately,
    OEM is not nearly as reliable as the Oracle database itself. If we grow dependent
    on OEM, we will eventually have problems when OEM is unavailable or has its own
    performance problems. We should use the SQL and PL/SQL interfaces for database
    tuning whenever they are available.


    ## SQL Tuning: Find Slow SQL


    The first and most underappreciated step of SQL tuning is finding slow SQL statements.
    This task is harder than it sounds, especially since our databases run an enormous
    number of SQL statements. We need to create an organized system for performance
    troubleshooting, precisely define what “slow” means, and be able to find SQL that
    is slow right now or was slow in the past.


    ### Get Organized


    Every Oracle developer must have an organized collection of worksheets for troubleshooting
    Oracle performance problems. There are many options for how to organize those
    files – a directory on our desktop, a GitHub repository, etc. But the files must
    be somewhere we can easily remember and quickly find – convenience is more important
    than perfection.


    When we run into a problem, we should be able to pull up our trusty worksheet
    in just a few seconds. As an example, I included my own worksheet in the book’s
    GitHub repository, in the file “Performance.sql”. I don’t expect you to use my
    file; we all have different preferences and tuning styles. But you should have
    something comparable, and it should be easily accessible and allow you to incrementally
    improve your troubleshooting process. These files will grow into mind maps for
    how we think about Oracle problems, so there’s no one-size-fits-all solution.


    ### Slow Is Based on DB Time


    This chapter focuses on things that are slow, but who defines what slow means?
    To the end users, only the wall-clock run time matters, but focusing only on the
    run time can cause problems. We are really looking for things that are wasteful
    – things that use more resources than necessary. We need a metric that is more
    meaningful than wall-clock run time but something simpler than a complete description
    of the system’s resource utilization.


    We don''t want to improve the speed of one query at the expense of other processes.
    For example, replacing a 10-second index access with a 9-second parallel full
    table scan would improve the run time, but it would be a ridiculous waste of resources.
    And we don''t want to improve the speed if it doesn''t matter; if a procedure
    calls `DBMS_LOCK.SLEEP`, that procedure is intentionally slow, doesn''t use any
    significant resources, and doesn''t need tuning.


    Luckily the “DB time” statistic accurately reflects the resource utilization of
    the database, SQL statements, and operations. The DB time is simply the time spent
    doing meaningful work in the database. The primary metrics in this chapter, `ELAPSED_TIME`,
    number of active sessions, and “% Activity,” are all strongly correlated with
    the DB time. For example, if a parallel query is busy for 10 seconds and uses
    two parallel servers, the `ELAPSED_TIME` will be 20 seconds. If a procedure runs
    for a minute because of `DBMS_LOCK.SLEEP(60)`, the `ELAPSED_TIME` will be 0 seconds.


    ### Find Currently Running Slow SQL


    Everything we need to know about our SQL can be found inside the database, using
    SQL. Other than a good IDE, we don’t want to rely on expensive, closed source
    programs to find slow SQL statements.


    The dynamic performance view `V$SQL` is the key to finding currently running SQL
    statements. When I see a live performance problem, this is the first query I run:


    ```

    --All SQL statements that are currently running.

    select

    elapsed_time/1000000 seconds,

    executions,

    users_executing,

    parsing_schema_name,

    sql_fulltext,

    sql_id,

    v$sql.*

    from v$sql

    where users_executing > 0

    order by elapsed_time desc;

    ```


    The preceding query tells us exactly what statements are running on the database
    right now. Interpreting the columns and expressions is tricky, so the most important
    columns are briefly described as follows:


    1.  SECONDS/ELAPSED_TIME: Cumulative database time spent on all executions of
    the statement.^([^(42)](#fn42)) There are always multiple statements running;
    we need this column so we can focus on the slow ones.


    2.  EXECUTIONS: Number of times the statement was executed. Tuning a statement
    that runs once per hour is different than tuning a statement that runs a thousand
    times per hour.


    3.  USERS_EXECUTING: Number of sessions that are running the SQL statement right
    now. For parallel queries, this number includes each parallel session.


    4.  PARSING_SCHEMA_NAME: Schema or user that is running the SQL.


    5.  SQL_FULLTEXT: The exact text of the SQL.


    6.  SQL_ID: A unique identifier based on a hash of the SQL text. This ID is used
    in almost all tuning tools and is one of the first things we need to find when
    tuning. Since `SQL_ID` is a hash, it is sensitive to space and capitalization.
    We need to be careful to precisely copy our SQL statements to get the same `SQL_ID`.


    7.  V$SQL.*: Every one of these 104 columns is potentially important. The large
    number of columns is one of the reasons we can’t realistically tune using the
    command line. When there is a performance problem, we have to explore lots of
    data.


    Don’t expect to uncover all the mysteries of `V$SQL`. We may never understand
    all of the columns, values, or why there are so many seemingly duplicate rows.
    But don’t let the complexity deter you; `V$SQL` is incredibly useful even if we
    don’t fully comprehend it.


    Oracle’s definition of what is “running” may not match ours. A SQL statement will
    show up in `V$SQL` with one or more `USERS_EXECUTING` if the cursor is still open.
    Showing up in `V$SQL` doesn’t mean that Oracle is necessarily doing anything with
    that statement. It’s quite common for programs to run a query, retrieve the first
    N rows, and then let the query sit there for a while. Oracle doesn’t track time
    spent by the application downloading or processing the rows. A row may appear
    to be active in `V$SQL` for a long time but have a tiny `ELAPSED_TIME`. From a
    database perspective, we only care about queries with a large `ELAPSED_TIME`.'
  trans: '### 其他工具


    性能调优需要许多工具，而不仅仅是前面列出的那些，尤其是因为数据库问题和操作系统问题之间并不总是有清晰的界限。对于数据库管理员来说，掌握服务器操作系统的知识以及能够诊断常见操作系统问题的命令尤为重要。


    但是，我们应该对购买昂贵的闭源程序来帮助我们调优数据库持怀疑态度。除非我们能先试用它们，或者得到我们信任的开发人员的推荐，否则我们不应该把钱花在额外的调优程序上。大多数性能调优程序不过是围绕
    Oracle 免费提供的工具所做的昂贵而光鲜的包装而已。


    将时间和金钱投资于一个小型、专有的调优程序是有风险的。即使这个程序现在很有帮助，将来我们能够使用它的可能性也很低。Oracle 用户往往只会购买少量昂贵的产品。如果你是一名
    Oracle 开发人员，并换工作到其他地方开发 Oracle，那么你唯一能保证带走的技能就是 SQL 和 PL/SQL。


    我们甚至对使用 Oracle 企业管理器（OEM）也应该保持谨慎。OEM 是一个强大、有用的程序，它有许多页面可以引导我们解决性能问题。不幸的是，OEM 远不如
    Oracle 数据库本身可靠。如果我们变得依赖 OEM，那么当 OEM 不可用或自身出现性能问题时，我们最终会遇到麻烦。只要可能，我们应该使用 SQL 和
    PL/SQL 接口来进行数据库调优。


    ## SQL 调优：寻找慢速 SQL


    SQL 调优的第一个也是最不被重视的步骤是找到慢速的 SQL 语句。这项任务比听起来更难，尤其是因为我们的数据库运行着海量的 SQL 语句。我们需要创建一个有组织的系统来进行性能故障排查，精确定义“慢”的含义，并且能够找到当前运行缓慢或过去曾运行缓慢的
    SQL。


    ### 有条理地组织


    每个 Oracle 开发人员都必须有一套有组织的、用于排查 Oracle 性能问题的工作表。组织这些文件的方式有很多种——比如放在桌面的一个目录里，一个 GitHub
    仓库等等。但这些文件必须放在我们容易记住并能快速找到的地方——便利性比完美更重要。


    当我们遇到问题时，应该能在几秒钟内调出我们可靠的工作表。例如，我在本书的 GitHub 仓库中，文件 “Performance.sql” 里附上了我自己的工作表。我并不指望你使用我的文件；我们都有不同的偏好和调优风格。但你应该有类似的东西，它应该易于访问，并能让你逐步改进故障排查过程。这些文件将发展成我们思考
    Oracle 问题的思维导图，因此不存在一刀切的解决方案。


    ### “慢”是基于数据库时间（DB Time）


    本章重点关注慢的事物，但由谁来定义“慢”意味着什么？对于最终用户来说，只有墙钟运行时间才重要，但只关注运行时间可能会导致问题。我们实际上是在寻找浪费的东西——那些使用了超出必要资源的事物。我们需要一个比墙钟运行时间更有意义，但又比完整的系统资源利用率描述更简单的指标。


    我们不想以牺牲其他进程为代价来提高某一个查询的速度。例如，用 9 秒钟的并行全表扫描替换 10 秒钟的索引访问可能会改善运行时间，但这将是资源的巨大浪费。而且，如果速度无关紧要，我们也不想提高它；如果一个过程调用了
    `DBMS_LOCK.SLEEP`，那么这个过程是故意缓慢的，不会使用任何重要资源，也不需要调优。


    幸运的是，“数据库时间”（DB time）统计信息准确地反映了数据库、SQL 语句和操作的资源利用率。数据库时间就是在数据库中进行有意义工作所花费的时间。本章的主要指标，`ELAPSED_TIME`、活动会话数和“%
    Activity”（活动百分比），都与数据库时间密切相关。例如，如果一个并行查询繁忙地运行了 10 秒钟并使用了两个并行服务器，那么 `ELAPSED_TIME`
    将为 20 秒。如果一个过程因为 `DBMS_LOCK.SLEEP(60)` 而运行了一分钟，那么 `ELAPSED_TIME` 将为 0 秒。


    ### 查找当前正在运行的慢速 SQL


    我们需要了解的关于我们的 SQL 的所有信息都可以在数据库内部使用 SQL 找到。除了一个好的 IDE，我们不想依赖昂贵的闭源程序来查找慢速 SQL 语句。


    动态性能视图 `V$SQL` 是查找当前正在运行的 SQL 语句的关键。当我看到一个实时性能问题时，这是我运行的第一个查询：


    ```sql

    --所有当前正在运行的 SQL 语句。

    select

    elapsed_time/1000000 seconds,

    executions,

    users_executing,

    parsing_schema_name,

    sql_fulltext,

    sql_id,

    v$sql.*

    from v$sql

    where users_executing > 0

    order by elapsed_time desc;

    ```


    上面的查询准确地告诉我们当前在数据库上运行的是哪些语句。解释列和表达式很棘手，因此最重要的列简要描述如下：


    1.  `SECONDS`/`ELAPSED_TIME`：该语句所有执行累计花费的数据库时间。^(参见脚注 42) 总是有多个语句在运行；我们需要这个列以便关注那些慢的。


    2.  `EXECUTIONS`：语句被执行的次数。调优一个每小时运行一次的语句与调优一个每小时运行一千次的语句是不同的。


    3.  `USERS_EXECUTING`：当前正在运行此 SQL 语句的会话数。对于并行查询，此数字包括每个并行会话。


    4.  `PARSING_SCHEMA_NAME`：运行该 SQL 的模式或用户。


    5.  `SQL_FULLTEXT`：SQL 的确切文本。


    6.  `SQL_ID`：基于 SQL 文本哈希计算的唯一标识符。此 ID 几乎用于所有调优工具，是我们调优时需要首先寻找的东西之一。由于 `SQL_ID`
    是一个哈希值，它对空格和大小写敏感。我们需要小心精确地复制我们的 SQL 语句以获得相同的 `SQL_ID`。


    7.  `V$SQL.*`：这 104 个列中的每一个都可能是重要的。大量的列是我们无法实际使用命令行进行调优的原因之一。当出现性能问题时，我们必须探索大量数据。


    不要期望能揭开 `V$SQL` 的所有奥秘。我们可能永远无法理解所有的列、值，或者为什么有这么多看似重复的行。但不要让这种复杂性吓退你；即使我们没有完全理解它，`V$SQL`
    也是极其有用的。


    Oracle 对“正在运行”的定义可能与我们理解的不同。如果游标仍然打开，一个 SQL 语句就会出现在 `V$SQL` 中，并有一个或多个 `USERS_EXECUTING`。出现在
    `V$SQL` 中并不意味着 Oracle 一定在对该语句做任何事情。程序运行一个查询，检索前 N 行，然后让查询在那里停留一段时间，这种情况相当常见。Oracle
    不跟踪应用程序下载或处理行所花费的时间。一行可能在 `V$SQL` 中显示为活动状态很长时间，但 `ELAPSED_TIME` 却很小。从数据库的角度来看，我们只关心那些
    `ELAPSED_TIME` 很大的查询。'
- fmt: '### Find Historically Slow SQL


    Finding SQL that was slow in the past can be more challenging than finding SQL
    that is slow right now. We need to be able to quickly search through many sources
    – `V$SQL`, `V$ACTIVE_SESSION_HISTORY`, `DBA_HIST_ACTIVE_SESS_HISTORY`, and `DBA_HIST_SQLTEXT`.
    And we need to look for combinations of SQL text, time, username, and many other
    columns. A good IDE and advanced SQL skills will come in handy.


    We also need to remember that data will eventually age out of each of those sources.
    As a rough estimate, `V$SQL` will last an hour (or less if the shared pool is
    manually flushed), `V$ACTIVE_SESSION_HISTORY` will last a day, and `DBA_HIST_*`
    will last 8 days.


    ## SQL Tuning: Find Plans


    After we find the slow SQL statement, we’re tempted to jump right into finding
    the plan. But don’t overlook the importance of understanding the SQL. The best
    performance tuning is rewriting SQL into something simpler, finding a way to batch
    multiple runs of the query, or using an advanced feature. If there’s no way to
    change the SQL to avoid the problem, then we need to dive into the plan. But first,
    remember that explain plans are the estimated plans and execution plans are the
    actual plans. It’s easy to confuse the two terms, and even the documentation and
    Oracle programs get them mixed up occasionally.


    ### Graphical Plans Considered Harmful


    Do not use your IDE’s graphical interface for viewing execution and explain plans.
    While those graphical reports may look pretty and may be easily generated at the
    press of a button, graphical plans are always wrong or misleading.


    Let’s start with a simple example that merely joins `SATELLITE` and `LAUNCH`:


    ```sql

    --All satellites and their launch.

    select *

    from satellite

    left join launch

    on satellite.launch_id = launch.launch_id;

    ```


    In Oracle SQL Developer, we can generate an explain plan by simply pressing F10.
    Figure 18-4 shows the explain plan generated by SQL Developer.


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig4_HTML.png)


    The snippet of the table has 5 columns: operation, object name, options, cardinality,
    and costs. The select statement in the row has two parts: hash join and `Other
    XML`.


    Figure 18-4: Oracle SQL Developer explain plan display


    There are several things wrong with the preceding output. This query generates
    an adaptive plan; sometimes the plan will use a hash join, and sometimes the plan
    will use a nested loop join. Yet the preceding explain plan doesn’t make it clear
    which operations are active and which operations are inactive. Also, the “Other
    XML” section is confusing – that section contains advanced information that is
    rarely needed. At the same time, that XML section is incomplete and does not include
    all of the hints used by the explain plan.


    I’m not trying to pick on SQL Developer – it’s a great program for database development.
    Every SQL IDE I’ve ever used has suffered from similar problems with visualizing
    plans. For execution and query plans, we should strive for 100% accuracy. When
    we’re working on performance tuning, even the slightest mistake can obscure the
    problem.


    ### Text Is Best


    The `EXPLAIN PLAN` command and the `DBMS_XPLAN` package are the best way to display
    explain plans. For example, the following code generates the explain plan for
    the simple join between `SATELLITE` and `LAUNCH`:


    ```sql

    --All satellites and their launch.

    explain plan for

    select *

    from satellite

    left join launch

    on satellite.launch_id = launch.launch_id;

    select * from table(dbms_xplan.display);

    ```


    Figure 18-5 shows the output. (This is another case where I am not following my
    own advice due to limitations of the medium. Normally, it would be better to copy
    and paste the raw text of an explain plan, but the 89 characters probably would
    not fit the width of a printed page.)


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig5_HTML.png)


    The image of the plan output has a hash value of 2829467527, a table of 8 columns
    and 4 rows, and predictive information with a note.


    Figure 18-5: Simple explain plan output from `DBMS_XPLAN`


    The preceding explain plan display is more accurate than graphical visualizations.
    The output only includes the active hash join, not the inactive nested loop join.
    The “Note” section warns us that we’re looking at an adaptive plan and that there
    is more information under the surface. As discussed in Chapter 17, if we want
    to view the inactive operations, we can use this SQL statement:


    ```sql

    --View all inactive rows of an adaptive plan.

    select * from table(dbms_xplan.display(format => ''+adaptive''));

    ```


    `EXPLAIN PLAN` and `DBMS_XPLAN` have many benefits over graphical representations
    of explain plans:


    1.  **Simple, standard format**: `DBMS_XPLAN` works in any environment and produces
    output that every Oracle professional is familiar with. Anyone with access to
    Oracle can reproduce the issue, and anyone can discuss the issue with the same
    standard names. We cannot assume other developers have access to our favorite
    IDE.

    2.  **Easy-to-process output**: The output is easy to save, share, and search.
    We can store the output in a table, copy the text into Notepad, etc. It''s also
    much easier to compare the output using a diff program, such as WinMerge. Large
    queries may produce hundreds of lines in the explain plan, and using a diff utility
    can make tuning much easier. For programming, text is better than pictures.

    3.  **Includes important sections**: For some bizarre reason, IDEs never display
    the “Note” section. That section includes essential information. Without the “Note”
    section, we have to guess if there''s something weird going on.

    4.  **More accurate**: As we saw earlier, IDEs generate slightly wrong results.
    Another common problem is that some IDEs use a separate session to generate graphical
    explain plans. Session settings like `ALTER SESSION ENABLE PARALLEL DML` are not
    always applied in graphical explain plans.

    5.  **More Powerful**: `DBMS_XPLAN` can be scripted and has powerful features
    described in the next sections.


    For a quick check, it''s easier to hit F10, F5, CTRL+E, or whatever the shortcut
    is in our IDE. For serious plan analysis that will be shared with others, always
    use `EXPLAIN PLAN` and `DBMS_XPLAN`. The basic commands are worth memorizing.
    It’s hard to remember all the details, but we can always look up `EXPLAIN PLAN`
    in the *SQL Language Reference* and look up `DBMS_XPLAN` in the *PL/SQL Packages
    and Types Reference*.


    ### DBMS_XPLAN Functions


    The function `DBMS_XPLAN.DISPLAY` only works for explain plans that were gathered
    through the `EXPLAIN PLAN` command. Those explain plans are still estimates, although
    in practice the estimates are accurate unless there are bind variables or adaptive
    plans.


    The function `DBMS_XPLAN.DISPLAY_CURSOR` displays the *actual* execution plan
    of a SQL statement that already ran. In order to identify the SQL statement, this
    function must be passed a `SQL_ID` parameter. `DISPLAY_CURSOR` is especially useful
    because it displays actual numbers, not just estimates. The importance of actual
    numbers will be discussed later in this chapter. Explain plans are convenient,
    especially for quick demonstrations, but if you need to be absolutely certain
    about the plan, you may want to stick to only using execution plans.


    The function `DBMS_XPLAN.DISPLAY_AWR` can display all of the different execution
    plans used by a SQL statement. The history goes back as far as the AWR retention
    period, which defaults to 8 days. This feature is useful for diagnosing problems
    where a query used to run fast but is now running slow.'
