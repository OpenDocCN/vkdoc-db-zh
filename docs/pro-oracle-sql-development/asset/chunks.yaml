  trans: '### 集合


    以集合的方式思考有助于我们理解和可视化 SQL 语句。大多数 SQL 指南都强调基于集合的处理，以帮助我们编写更快的 SQL。确实，性能上的收益是巨大的，本书的第三部分和第四部分对此进行了多次讨论。但本章的重点在于，基于集合的思维同样能帮助我们编写`可读性强`的
    SQL。


    数学上的集合就是对象的集合——一个无定形的集合。我们可以用文本来描述一个集合，比如`A = {1, 2, 3, 4}`。将集合可视化也同样有益，例如图 6-2
    所示。


    ![](img/471418_2_En_6_Fig2_HTML.png)


    一个圆形代表了多边形，它由八种不同颜色、不同形状组成。包括矩形、正方形、两个三角形、两个六边形、五边形和星形。


    图 6-2


    “一个集合的例子”，作者 Stephan Kulla，采用 CC0 许可授权


    集合可以包含其他集合。嵌套集合是表示任何类型信息的强大方式。可视化集合的方法有很多，例如第一章的韦恩图，或图 6-3 中的示意图。思考集合的确切方式并不重要，重要的是我们心中有一个牢固的集合心理模型。


    ![](img/471418_2_En_6_Fig3_HTML.jpg)


    一个圆形代表了多边形，它由八种不同颜色的不同形状组成。正多边形（正方形、三角形和五边形）被一个虚线闭合图形圈出。


    图 6-3


    “正多边形集合，其中高亮显示了正多边形子集。集合论系列的一部分”，作者 Stephan Kulla，采用 CC0 许可授权


    但是，我们的关系型集合与数学集合之间的类比并不完美。数学集合要求元素互异。但正如第一章所讨论的，总是要求我们的关系型数据互异是不切实际的。数学集合可以包含任意类型、任意形状的子集。但正如第一章所讨论的，我们需要将数据作为带有简单列的简单行来存储和投影。当我们用连接组合多个集合时，结果应该总是简单的表格数据。我们应该避免在单个列中存储集合，因为这类数据难以过滤和连接。


    ### 分块


    分块是将小块信息组合成一个新的、有意义的实体的过程。分块是我们在有限的短期记忆容量下，将复杂概念保持在脑海中的方法。


    关于我们能在短期记忆中保持多少个项目，尚无明确的共识，尽管`7 ± 2`似乎是一个普遍接受的答案。¹² 我们一直在使用分块，例如使用助记符来记住彩虹的颜色（`Roy
    G. Biv`），或者通过将电话号码分解成小块来尝试记住它。我们也可以使用分块来改进我们的 SQL 语句。


    是时候引入第一个也是唯一一个复杂的例子了，使用太空数据集。让我们来找出每年最流行的火箭燃料，并寻找趋势。随着技术的变革，火箭是否在趋向使用特定类型的燃料？要使用旧的连接语法来回答这个问题，`FROM`子句如下：


    ```

    from launch, launch_vehicle_stage, stage, engine, engine_propellant, propellant

    ```


    这六个表、它们的列以及它们之间的关系，一次性处理起来太多了。相反，我们可以将这个查询看作三个不同集合的集合：发射记录、发射载具引擎以及引擎燃料。每个集合都是一个小型的、易于理解的查询。而将这些集合组合在一起是很容易的。


    由于 SQL 语句比典型的集合具有更强的连接性，我们应该将`7 ± 2`的经验法则调整为`3 ± 1`。图 6-4 展示了这三个集合之间连接的韦恩图。连接韦恩图通常展示的是表，但在关系模型中，表和结果集没有区别。内连接、左外连接以及所有其他操作在表和集合上的工作方式是相同的。


    ![](img/471418_2_En_6_Fig4_HTML.png)


    一个展示发射记录、发射载具引擎和引擎之间关系的韦恩图。


    图 6-4


    三个关系型集合之间连接的韦恩图


    嵌套集合是简化我们 SQL 的关键。在一些编程语言中，深层嵌套结构是个问题。但在 SQL 中，深层嵌套结构让我们可以简化代码。我们语句的每一层都包含少量易于理解的分块。分块之间的接口始终是相同且枯燥的关系型数据。如果一个分块出现问题，我们可以深入查看下一层的分块，并重复此过程，直到整个查询正确无误。


    ### 函数式编程


    函数式编程可以减少依赖和上下文。在函数式编程中，确定性的数学函数对于相同的输入返回相同的值，并且不依赖于程序状态。（这种函数不同于`PL/SQL`函数，后者有时可能对相同的输入返回不同的结果。）函数式程序是声明性的，这意味着我们告诉程序我们想要什么，而不是如何去做。


    移除程序状态消除了导致许多错误的意外副作用。但完全移除程序状态是困难的——我们的程序最终必须改变某些东西。这种局限性或许可以解释为什么函数式编程从未真正流行起来。最广泛使用的函数式编程语言是
    R、Lisp 和 Haskell。这些语言虽然流行，但很少进入编程语言排行榜的前十名。但函数式编程的`理念`已经渗透到其他语言中。


    SQL 并非设计为函数式编程语言，但我们的程序可以轻松地实现函数式编程思想。与传入参数和返回值不同，SQL 语句处理的是关系型数据：关系型集合作为输入，一个关系集合作为输出。这种简单性起初可能让人觉得受限，但这种限制却使我们免于担心上下文。如果我们使用简单的输入和输出，我们就能轻松理解一小块
    SQL。


    SQL 数据应该仅通过嵌套集合传递。遵循这一规则，我们只需要考虑来自一个方向的数据。这减少了依赖和上下文。我们希望尽量减少通过全局变量、绑定变量、关联子查询和其他副作用传递数据。在我们的
    SQL 语句的最底层，集合来源于关系表。要将结果传递给更高层的 SQL 语句，我们必须使用内联视图。


    ### 内联视图


    内联视图是创建和组装小型 SQL 分块的完美方式。内联视图通过结合集合、分块和函数式编程风格，帮助我们简化代码。'
- fmt: '### What Is an Inline View?


    The terms “inline view,” “subquery,” and “correlated subquery” are often used
    interchangeably, but it’s important to understand the difference between them.
    A subquery is any query inside a query. A correlated subquery is found in the
    `SELECT` or `WHERE` clause and references a column value from the outer query.
    An inline view is a subquery in the `FROM` clause:


    ```

    --Both of these are subqueries:

    --Correlated subquery:

    select (select * from dual a where a.dummy = b.dummy) from dual b;

    --Inline view:

    select * from (select * from dual);

    ```


    Inline views are useful because they are independent from each other. In the preceding
    example, we can run the subquery in the inline view all by itself. In an IDE,
    running separate pieces is as easy as highlighting and clicking a button. Running
    separate pieces is not possible with a correlated subquery, which requires understanding
    the entire query at once.


    Each inline view is simply a set and behaves like a normal table or view. Similar
    to functional programming, inline views pass in one thing (sets) and always return
    the same result (another set) and depend on nothing else.^(^([^(13)](#fn13))^)


    Inline views can be infinitely nested, but we need to strike a careful balance.
    We don’t want a query that’s too deep, because each level of inline views requires
    more code. We don’t want a query that’s too shallow, because then we have to join
    all the tables at once. It’s up to us to decide what a useable chunk is, and our
    definition may change over time. When we first use a data model, we may only join
    a few tables at once, but the number of tables will grow as we become familiar
    with the data. When our chunk size increases, we must remember we’re writing queries
    for other people, not ourselves.


    ### Inline Views Make Code Larger but Simpler


    There’s a paradox with inline views. Simplifying should make our code smaller,
    but adding inline views makes the overall code larger. For example, the shortest
    way to query ten tables is to join them together all at once. If we split the
    list into two groups, we still need to join all the tables, and now we also need
    to join those two groups. That splitting and joining causes more code, but it
    is still a good idea.


    In the following pseudo-code, the first query may initially look simpler than
    the second query:


    ```

    --#1: Join everything at once:

    select ...

    from table1,table2,table3,table4,table5,table6,table7,table8,table9,table10

    where ...;

    --#2: Use inline views:

    select *

    from

    (

    select ...

    from table1,table2,table3,table4,table5

    where ...

    ),

    (

    select ...

    from table6,table7,table8,table9,table10

    where ...

    )

    where ...;

    ```


    The inline view version requires more characters, so how can we measurably say
    that the second version is simpler? First, think of the possible ways to join
    those ten tables. When joined all at once, there are `10! = 3,628,800` possible
    ways to visualize and order those tables in the `WHERE` clause. In the inline
    view version, there are `(5! + 5!) * 2 = 480` ways to visualize and order those
    tables in the `WHERE` clause.


    The preceding math is overly precise. I’m not claiming the second version is literally
    7,560 times simpler than the first version. The point is that our code complexity
    doesn’t grow linearly. Adding one table to a ten-table join is worse than adding
    one table to a five-table join. The problem is related to our short-term memory,
    or the rule of 7 ± 2. Since we have to remember the tables and how to join them,
    we should cut the rule in half and use 3 ± 1.


    ### Simple Inline Views for a Large Example


    Let’s look at the inline views for our first real example – finding the most popular
    rocket fuels per year. There are three pieces in this query: launches, launch
    vehicle engines, and engine fuels. First, we want to find the relevant launches:


    ```

    (

    --Orbital and deep space launches.

    select *

    from launch

    where launch_category in (''orbital'', ''deep space'')

    ) launches

    ```


    Next, we want to find the engines used for each launch vehicle. Launch vehicles,
    typically rockets, can have multiple stages. Each stage can use a different engine:


    ```

    (

    --Launch Vehicle Engines

    select launch_vehicle_stage.lv_id, stage.engine_id

    from launch_vehicle_stage

    left join stage

    on launch_vehicle_stage.stage_name = stage.stage_name

    ) lv_engines

    ```


    Finally, we want to find the fuels used in each engine:


    ```

    (

    --Engine Fuels

    select engine.engine_id, propellant_name fuel

    from engine

    left join engine_propellant

    on engine.engine_id = engine_propellant.engine_id

    left join propellant

    on engine_propellant.propellant_id = propellant.propellant_id

    where oxidizer_or_fuel = ''fuel''

    ) engine_fuels

    ```


    The preceding inline views are the bulk of our query, in three small, independent
    pieces. Arguably some of those inline views are too simple. For example, the first
    inline view doesn’t even join a table; it only filters. But we should err on the
    side of caution. It’s tough to gauge when an inline view is too complex. Query
    writers, like all writers, suffer from the curse of knowledge; we unconsciously
    assume other people know everything we know. Since we’re just starting with this
    data set, we want to start small. The less we know, the smaller the chunks should
    be.


    We can craft elegant, nested structures using sets. But putting so much work into
    a single SQL statement can cause issues. Chapter 12 discusses the style and performance
    issues caused by building large, nested queries. Now that we have the small pieces,
    the next section discusses how to put them together with the ANSI join syntax.


    ### ANSI Joins


    If sets and inline view chunks are the ingredients, then ANSI joins are the recipe
    for creating readable SQL statements. Using the `JOIN` keyword makes our queries
    a bit wordier, but readability is more important than the number of characters.


    The ANSI join syntax forces us to write our SQL statements one step at a time.
    Our queries start with a single set, we combine that set with something else to
    create a new set, and we repeat the process until done. Those sets could be tables,
    views, inline views, materialized views, table collection expressions, partitions,
    remote objects, a point-in-time snapshot of a table using flashback, a CSV file
    represented as an external table, and who knows what else. The beauty of the relational
    model is that the origin of the sets doesn’t matter. As long as sets return rows
    and columns, they can all be treated the same way.


    The simplicity of the ANSI join process is the key. We can easily get confused
    when a dozen tables are thrown together quickly. But it’s difficult to lose track
    of the set when we’re only adding one thing at a time.


    Breaking a query into multiple inline view chunks and combining them with `JOIN`
    keywords uses more characters. But readability is paramount. Everything else mentioned
    in the syntax debates is irrelevant. The debates about standards compliance, rare
    optimizer bugs, rare syntax features, tradition, Cartesian products, and character
    count are meaningless if we can’t read our SQL statements.'
  raw: '### What Is an Inline View?


    The terms “inline view,” “subquery,” and “correlated subquery” are often used
    interchangeably, but it’s important to understand the difference between them.
    A subquery is any query inside a query. A correlated subquery is found in the
    `SELECT` or `WHERE` clause and references a column value from the outer query.
    An inline view is a subquery in the `FROM` clause:


    ```

    --Both of these are subqueries:

    --Correlated subquery:

    select (select * from dual a where a.dummy = b.dummy) from dual b;

    --Inline view:

    select * from (select * from dual);

    ```


    Inline views are useful because they are independent from each other. In the preceding
    example, we can run the subquery in the inline view all by itself. In an IDE,
    running separate pieces is as easy as highlighting and clicking a button. Running
    separate pieces is not possible with a correlated subquery, which requires understanding
    the entire query at once.


    Each inline view is simply a set and behaves like a normal table or view. Similar
    to functional programming, inline views pass in one thing (sets) and always return
    the same result (another set) and depend on nothing else.^([^(13)](#fn13))


    Inline views can be infinitely nested, but we need to strike a careful balance.
    We don’t want a query that’s too deep, because each level of inline views requires
    more code. We don’t want a query that’s too shallow, because then we have to join
    all the tables at once. It’s up to us to decide what a useable chunk is, and our
    definition may change over time. When we first use a data model, we may only join
    a few tables at once, but the number of tables will grow as we become familiar
    with the data. When our chunk size increases, we must remember we’re writing queries
    for other people, not ourselves.


    ### Inline Views Make Code Larger but Simpler


    There’s a paradox with inline views. Simplifying should make our code smaller,
    but adding inline views makes the overall code larger. For example, the shortest
    way to query ten tables is to join them together all at once. If we split the
    list into two groups, we still need to join all the tables, and now we also need
    to join those two groups. That splitting and joining causes more code, but it
    is still a good idea.


    In the following pseudo-code, the first query may initially look simpler than
    the second query:


    ```

    --#1: Join everything at once:

    select ...

    from table1,table2,table3,table4,table5,table6,table7,table8,table9,table10

    where ...;

    --#2: Use inline views:

    select *

    from

    (

    select ...

    from table1,table2,table3,table4,table5

    where ...

    ),

    (

    select ...

    from table6,table7,table8,table9,table10

    where ...

    )

    where ...;

    ```


    The inline view version requires more characters, so how can we measurably say
    that the second version is simpler? First, think of the possible ways to join
    those ten tables. When joined all at once, there are `10! = 3,628,800` possible
    ways to visualize and order those tables in the `WHERE` clause. In the inline
    view version, there are `(5! + 5!) * 2 = 480` ways to visualize and order those
    tables in the `WHERE` clause.


    The preceding math is overly precise. I’m not claiming the second version is literally
    7,560 times simpler than the first version. The point is that our code complexity
    doesn’t grow linearly. Adding one table to a ten-table join is worse than adding
    one table to a five-table join. The problem is related to our short-term memory,
    or the rule of 7 ± 2\. Since we have to remember the tables and how to join them,
    we should cut the rule in half and use 3 ± 1.


    ### Simple Inline Views for a Large Example


    Let’s look at the inline views for our first real example – finding the most popular
    rocket fuels per year. There are three pieces in this query: launches, launch
    vehicle engines, and engine fuels. First, we want to find the relevant launches:


    ```

    (

    --Orbital and deep space launches.

    select *

    from launch

    where launch_category in (''orbital'', ''deep space'')

    ) launches

    ```


    Next, we want to find the engines used for each launch vehicle. Launch vehicles,
    typically rockets, can have multiple stages. Each stage can use a different engine:


    ```

    (

    --Launch Vehicle Engines

    select launch_vehicle_stage.lv_id, stage.engine_id

    from launch_vehicle_stage

    left join stage

    on launch_vehicle_stage.stage_name = stage.stage_name

    ) lv_engines

    ```


    Finally, we want to find the fuels used in each engine:


    ```

    (

    --Engine Fuels

    select engine.engine_id, propellant_name fuel

    from engine

    left join engine_propellant

    on engine.engine_id = engine_propellant.engine_id

    left join propellant

    on engine_propellant.propellant_id = propellant.propellant_id

    where oxidizer_or_fuel = ''fuel''

    ) engine_fuels

    ```


    The preceding inline views are the bulk of our query, in three small, independent
    pieces. Arguably some of those inline views are too simple. For example, the first
    inline view doesn’t even join a table; it only filters. But we should err on the
