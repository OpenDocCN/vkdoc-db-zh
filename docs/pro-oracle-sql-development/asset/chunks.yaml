  trans: '### GATHER_PLAN_STATISTICS


    让我们创建一个慢速 SQL 语句来练习调优。我们将从一个虚构的 ETL 过程开始，该过程创建了 `LAUNCH` 表的副本。但这个过程犯了一个巨大的错误；它*在*数据加载到表中*之前*收集统计信息，而不是*之后*。Oracle
    可以轻松处理*缺失的*统计信息，但处理*错误的*统计信息则更为困难：


    ```sql

    --创建 LAUNCH2 表并在错误的时间点收集统计信息。

    create table launch2 as select * from launch where 1=2;

    begin

    dbms_stats.gather_table_stats

    (

    ownname => sys_context(''userenv'', ''current_schema''),

    tabname => ''launch2''

    );

    end;

    /

    insert into launch2 select * from launch;

    commit;

    ```


    在我们继续之前，我们需要更彻底地为失败做好准备。这个例子比之前的例子更复杂，因为我们必须避开许多自动修复性能问题的机制。如果我们只犯一个简单的错误，Oracle
    会找到补偿的方法。较新的版本，尤其是具有自治功能的版本，很难被欺骗。根据你的版本、版本类型和配置，你可能需要临时禁用的不仅仅是结果缓存：


    ```sql

    --临时禁用可能破坏示例的功能。

    alter session set result_cache_mode = manual;

    ```


    #### 使用 GATHER_PLAN_STATISTICS 获取实际执行计划


    在统计信息错误的情况下，`LAUNCH2` 表更有可能导致性能问题。假设我们发现了一条慢速语句并想对其进行调优。要获取实际的执行计划数值，而不是仅仅是猜测，我们必须使用提示
    `GATHER_PLAN_STATISTICS` 来运行慢速查询，如下所示：


    ```sql

    --卫星发射的不同日期。

    select /*+ gather_plan_statistics */ count(distinct launch_date)

    from launch2 join satellite using (launch_id);

    ```


    下一步是像下面这样找到 `SQL_ID`：


    ```sql

    --查找 SQL_ID。

    select * from gv$sql where sql_fulltext like ''%select%launch2%'';

    ```


    我们必须使用前面的 `SQL_ID`，并在下面对 `DBMS_XPLAN.DISPLAY_CURSOR` 的调用中使用它。要查看由 `GATHER_PLAN_STATISTICS`
    提示生成的额外数据，我们需要在 `FORMAT` 参数中使用值 `IOSTATS LAST`：


    ```sql

    --第一次执行使用了 NESTED LOOPS，错误的基数，性能不佳。

    select * from table(dbms_xplan.display_cursor(

    sql_id => ''82nk6712jkfg2'',

    format => ''iostats last''));

    ```


    仅仅为了找到一个执行计划就做了这么多工作，但额外的努力即将得到回报。输出显示在图 18-6 中。请注意，执行计划包含了新列 "A-Rows" 和 "A-Time"——实际的值。


    ![](img/471418_2_En_18_Fig6_HTML.png)

    *图 18-6: 包含实际数值的慢速执行计划*


    #### 分析执行计划以定位问题


    下一个调优步骤是通过找到 "A-time" 最大的操作来精确定位*什么*是慢的。在上面的输出中，我们可以看到最慢的操作是耗时 0.28 秒的 `NESTED
    LOOPS SEMI`。如果我们想提高性能，就必须专注于那个操作。


    这个执行计划很小，只有一个地方需要调优。对于更大的 SQL 语句和更大的执行计划，实际时间是找到真正问题的唯一方法。


    接下来，我们想知道连接操作*为什么*慢。比较实际行数和估计行数是理解优化器错误的最佳方式。基数估计不需要完美，但需要大致正确，优化器才能做出好的决策。


    在比较基数时，我们不是在寻找最大的错误——而是在寻找*第一个有意义的*错误。基数估计错误会在执行计划中传播，因此许多错误仅仅是根本错误的后果。执行计划是自内向外运行的，所以我们希望从最缩进的那一行开始。第
    5 行和第 6 行是最缩进的。


    第 6 行估计有 43113 行，但实际行数是 5295。这个估计已经足够好了。通常小于 10 倍的差异并不重要。


    第 5 行估计有 1 行，但实际行数是 70535。如此巨大的差异值得我们关注。第 5 行是对 `LAUNCH2` 表的全表扫描。第 5 行没有星号，意味着该操作没有应用任何谓词。没有谓词，估计却如此错误，这很奇怪——除非统计信息是错误的。解决方案很简单——重新收集统计信息并再次运行：


    ```sql

    --重新收集统计信息并重新运行查询。

    begin

    dbms_stats.gather_table_stats

    (

    ownname => sys_context(''userenv'', ''current_schema''),

    tabname => ''launch2'',

    no_invalidate => false

    );

    end;

    /

    --卫星发射的不同日期。

    select /*+ gather_plan_statistics */ count(distinct launch_date)

    from launch2 join satellite using (launch_id);

    --第二次执行使用了 HASH JOIN，基数正确，性能良好。

    select * from table(dbms_xplan.display_cursor(

    sql_id          => ''82nk6712jkfg2'',

    cursor_child_no => null, --改进后的计划可能是一个子游标。

    format          => ''iostats last''));

    ```


    前面的代码生成了图 18-7 所示的执行计划。连接从 `NESTED LOOPS` 变为 `HASH JOIN`，这对于连接大部分数据来说更合适。实际基数几乎完美匹配估计基数，这强烈表明
    Oracle 为给定的语句和对象创建了最佳可能的计划。实际时间也减少了。


    ![](img/471418_2_En_18_Fig7_HTML.png)

    *图 18-7: 包含实际数值的快速执行计划*


    所有迹象都表明 Oracle 生成了一个完美的执行计划。我们必须小心比较像 0.28 秒和 0.02 秒这样的小数字。如此小的差异可以通过缓存或系统活动来解释。为了完全确定我们的结果，我们可以多次运行前面的测试，可能在
    PL/SQL 循环中运行。


    这个测试案例可能感觉太刻意了；仅仅为了演示一个错误的基数估计就做了大量设置。这是因为 Oracle 在修复和预防性能问题方面已经变得异常出色。在现代版本的
    Oracle 中，现实世界的性能问题很可能是由几个奇怪因素的组合引起的。SQL 调优不像过去那样常见，但当我们需要做时，它变得更加复杂。'
- fmt: '# SQL监控报告


    ## 实时SQL监控报告（文本格式）


    实时SQL监控报告是调优长时间运行的SQL语句的最佳方式。这些报告提供了实际的行数、实际的时间消耗、等待事件以及其他重要信息。这些报告也不需要重新运行语句，这对于DML或长时间运行的查询来说并不总是可行的。


    SQL监控框架是另一种衡量SQL性能的方式。AWR存储数天的高级指标，ASH存储数小时的样本，而SQL监控存储数分钟的详细信息。SQL监控报告需要在语句运行期间或其完成后不久生成。^(参考脚注[44](#fn44))
    与AWR和ASH类似，我们也可以通过数据字典视图如`V$SQL_PLAN_MONITOR`和`V$SQL_MONITOR`访问SQL监控数据。


    SQL监控仅适用于运行时间超过5秒或包含`MONITOR`提示的语句。我们之前的例子运行时间不够长，无法生成SQL监控数据。相反，让我们在一个独立的会话中运行一个非常糟糕的SQL语句：


    ```

    --荒谬的糟糕的连接查询。（在单独的会话中运行。）

    select count(*) from launch,launch;

    ```


    当上面的语句正在运行时，我们需要找到`SQL_ID`并调用`DBMS_SQLTUNE`来生成报告：


    ```

    --查找SQL_ID，在上一个语句运行时执行。

    select *

    from gv$sql where sql_fulltext like ''%launch,launch%''

    and users_executing > 0;

    --生成报告。

    select dbms_sqltune.report_sql_monitor(''7v2qjmgrj995d'') from dual;

    ```


    函数`REPORT_SQL_MONITOR`可以生成多种格式的报告，默认文本格式如图[18-8](#471418_2_En_18_Chapter.xhtml#Fig8)所示。其中包含大量重要信息，你可能需要花点时间看看输出。


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig8_HTML.png)


    SQL监控报告的图像。它展示了SQL文本、全局信息、全局状态和SQL计划监控详情。


    图 18-8


    文本格式的实时SQL监控报告


    前面的输出包含大量关于SQL语句的元数据，并且输出会根据查询类型而调整。例如，如果存在绑定变量，报告将显示绑定值。这些元数据很有帮助，因为这些报告值得保存并在日后进行比较。没有这些元数据，我们可能会忘记报告是何时由谁运行的。


    报告中最重要的部分是操作表格。其格式类似于`DISPLAY_CURSOR`并包含实际值。我们可以使用“Rows (Actual)”获取真实基数，使用“Activity
    (%)”来找出最慢的操作。


    “Activity Detail (# samples)”列提供了每个操作的每个等待事件的计数。括号中的数字表示查询等待该类资源的秒数。在前面的例子中，所有等待都是针对“Cpu”。在更实际的例子中，会有多种等待类型。与操作类似，我们只应该关注数量可观的等待。经常会出现一个听起来奇怪的等待事件，但如果该等待只发生了一次，那么就不值得担心。最常见的等待应该是针对CPU和I/O，例如“Cpu”、“db
    file sequential read”和“db file scattered read”。我们可以在《Database Reference》手册的“Oracle
    Wait Events”附录中查找不寻常的事件。


    监控报告还可能包含一个“Progress”列，给出操作的完成百分比。这个数字对于预测语句完成时间可能有用，但我们必须小心正确解释进度。许多操作会迭代，因此一个操作可能多次达到“99%”完成。“Execs”列告诉我们操作已经执行了多少次。


    不幸的是，SQL监控报告不包括“Note”或“Predicate Information”。有时我们可能需要使用`DBMS_SQLTUNE`和`DBMS_XPLAN`生成执行计划，并将两个结果结合起来以获得所有相关信息。


    ## 实时SQL监控报告（活动格式）


    除了默认的文本格式，SQL监控报告还可以生成为XML、HTML或活动格式。活动报告不仅仅是更漂亮的交互式HTML格式；它还包含对高级调优有用的额外信息。


    活动报告包含调优并行SQL的有用信息，例如在整个查询生命周期中分配和使用了多少并行服务器。活动报告也有助于调优PL/SQL过程，因为报告包含所有相关SQL语句的详细信息。活动报告并不像应该的那样流行，可能是因为HTML文件曾经依赖Adobe
    Flash，而许多开发者放弃了尝试运行它们。


    生成活动报告从这样一个SQL语句开始：


    ```

    --生成活动报告。

    select dbms_sqltune.report_sql_monitor(''242q2tafkqamm'',

    type => ''active'')

    from dual;

    ```


    前面语句产生的CLOB结果必须保存为HTML文件，并在具有互联网连接的浏览器中打开。活动报告其中一页的示例如图[18-9](#471418_2_En_18_Chapter.xhtml#Fig9)所示。报告中塞满了交互式信息，所以截图并不能充分体现其特点。


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig9_HTML.png)


    两个概览和详细选项的片段。概览有三个部分：常规、时间和等待统计以及I/O统计；而详细信息有四个图形部分。


    图 18-9


    活动格式的实时SQL监控报告


    尽管活动报告是最强大的SQL调优工具之一，但文本格式仍然是一个好的默认选择有几个原因。文本格式仍然更容易生成、共享和比较。但当我们需要更高级的调优功能或者只是想给管理层展示一张更漂亮的图片时，活动报告是一个不错的选择。'
  raw: '### Real-Time SQL Monitor Reports (Text)


    Real-time SQL monitor reports are the best way to tune long-running SQL statements.
    These reports provide the actual number of rows, the actual amount of time, the
    wait events, and other important information. These reports also don’t require
    rerunning the statement, which isn’t always feasible for DML or long-running queries.


    The SQL monitoring framework is yet another way to measure SQL performance. AWR
    stores high-level metrics for days, ASH stores samples for hours, and SQL monitoring
    stores granular details for minutes. SQL monitoring reports need to be generated
    either while the statements are running or shortly after they finish.^([^(44)](#fn44))
    Similar to AWR and ASH, we can also access SQL monitoring data in the data dictionary,
    through views like `V$SQL_PLAN_MONITOR` and `V$SQL_MONITOR`.


    SQL monitoring only works on statements that take longer than 5 seconds or have
    the `MONITOR` hint. Our previous example didn’t run long enough to produce SQL
    monitoring data. Instead, let’s run a really stupid SQL statement in a separate
    session:


    ```

    --Ridiculously bad cross join.  (Run in a separate session.)

    select count(*) from launch,launch;

    ```


    While the preceding statement is running, we want to find the `SQL_ID` and call
    `DBMS_SQLTUNE` to generate the report:


    ```

    --Find the SQL_ID, while the previous statement is running.

    select *

    from gv$sql where sql_fulltext like ''%launch,launch%''

    and users_executing > 0;

    --Generate report.

    select dbms_sqltune.report_sql_monitor(''7v2qjmgrj995d'') from dual;

    ```


    The function `REPORT_SQL_MONITOR` can produce reports in multiple formats, and
    the default text format is shown in Figure [18-8](#471418_2_En_18_Chapter.xhtml#Fig8).
    There’s a lot of important information, so you may want to spend a minute looking
    at the output.


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig8_HTML.png)


    The image of S Q L monitoring report. It demonstrates S Q L text, global information,
    global status, and S Q L plan monitoring details.


    Figure 18-8


    Real-time SQL monitor report with text format


    The preceding output contains a lot of metadata about the SQL statement, and the
    output adjusts depending on the type of query. For example, if there were bind
    variables, the report would have displayed the bind values. The metadata is helpful
    because these reports are worth saving and comparing days later. Without the metadata,
    we might forget when the report was run and who ran it.


    The most important part of the report is the table of operations. The format is
    similar to `DISPLAY_CURSOR` and contains the actual values. We can use “Rows (Actual)”
    to get the real cardinality and “Activity (%)” to find the slowest operations.


    The column “Activity Detail (# samples)” provides a count of each wait event for
    each operation. The number in parentheses represents the number of seconds the
    query was waiting for that kind of resource. In the preceding example, all the
    waits are for “Cpu.” In more realistic examples, there will be many kinds of waits.
    Like with operations, we should only worry about waits that have a substantial
    number. There will often be a strange-sounding wait event, but if the wait only
    happened one time, then it’s not worth worrying about. The most common waits should
    be for CPU and I/O, such as “Cpu,” “db file sequential read,” and “db file scattered
    read.” We can look up unusual events in the “Oracle Wait Events” appendix of the
    *Database Reference* manual.


    The monitor report may also contain a “Progress” column that gives a percentage
    completion for the operation. That number can be useful for predicting the completion
    of a statement, but we must be careful to interpret the progress correctly. Many
    operations will iterate, so an operation may be “99%” complete many times. The
    column “Execs” tells us how many times an operation has executed.


    Unfortunately, the SQL monitor reports do not include “Note” or “Predicate Information.”
    Sometimes we may need to generate the execution plan with both `DBMS_SQLTUNE`
    and `DBMS_XPLAN` and combine the two results to get all the relevant information.


    ### Real-Time SQL Monitor Reports (Active)


    In addition to the default text format, SQL monitor reports can also be generated
    as XML, HTML, or active. The active report is not just a prettier interactive
    HTML format; it also contains extra information that is useful for advanced tuning.


    Active reports contain helpful information for tuning parallel SQL, such as how
    many parallel servers were allocated and used throughout the life of a query.
    Active reports are also helpful for tuning PL/SQL processes, since the report
    contains detailed information about all the dependent SQL statements. Active reports
    aren’t as popular as they should be, probably because the HTML file used to depend
    on Adobe Flash and many developers gave up on trying to run them.


    Generating an active report starts with a SQL statement like this:


    ```

    --Generate Active report.

    select dbms_sqltune.report_sql_monitor(''242q2tafkqamm'',

    type => ''active'')

    from dual;

    ```


    The CLOB results from the preceding statement must be saved as an HTML file and
    opened with a browser with Internet connectivity. An example of one of the pages
    of the active report is displayed in Figure [18-9](#471418_2_En_18_Chapter.xhtml#Fig9).
    The report is crammed full of interactive information, so the screenshot doesn’t
    do it justice.


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig9_HTML.png)


    Two snippets of overview and detailed options. Overview has three sections of
    general, time and wait statistics, and I O statistics, while details have four
    graphical sections.


    Figure 18-9


    Real-time SQL monitor report with active format


    Although active reports are one of the most powerful SQL tuning tools, there are
    a few reasons text is still a good default. The text format is still much easier
    to generate, share, and compare. But when we need more advanced tuning features
    or just a prettier picture to show to management, the active report is a good
    option.'
