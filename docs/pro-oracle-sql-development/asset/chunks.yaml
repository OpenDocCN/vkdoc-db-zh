    in one file. It doesn’t matter much if the worksheet is not perfectly formatted.


    For example, Figure [5-5](#471418_2_En_5_Chapter.xhtml#Fig5) shows a simplified
    view of my performance worksheet in action. The file is stored in my worksheets
    folder and is easily opened by an IDE. This is the file I use when there is a
    performance problem on a live system. The file contains steps to find slow queries,
    investigate them, and hopefully fix the underlying issue. Don’t look too closely
    at the details, since the actual steps aren’t important. We all have a different
    process for performance tuning. What’s important is that we must have *some* sort
    of process. And our worksheets must be easy to find, run, and incrementally modify.


    ![](images/471418_2_En_5_Chapter/471418_2_En_5_Fig5_HTML.png)


    The snippet of a S Q L worksheet includes currently running S Q L and monitor
    statements. The table at the bottom has seven columns and three rows.


    Figure 5-5


    Example of a SQL performance worksheet


    The preceding worksheet is not a script, and we don’t want to run all the commands
    every time. (Make sure your IDE is configured to only run one statement at a time
    when you press F8, F9, Ctrl+Enter, or whatever the shortcut is.) Worksheets are
    a pseudo automated set of steps to help troubleshoot complex problems. Depending
    on the output of the first step, we may need to run the second step, or maybe
    we can skip to the third step. It’s not a fully automated program; it’s more like
    a mind map for performance problems.


    Storing worksheets in a public repository like GitHub is a popular option. GitHub
    Gists may be a good choice, since they are geared toward storing a single file.
    Oracle’s livesql.oracle.com has a good notebook-like interface. Unfortunately,
    LiveSQL only runs against a sample cloud database and cannot connect to our real
    databases.


    Saving worksheets online is not always possible. Many companies won’t let employees
    release code online without going through a long approval process. Releasing open
    source software is great, but our ad hoc worksheets aren’t very reusable by other
    people anyway. In this case, flexibility is more important than openness. Storing
    worksheets locally is good enough.


    Caution


    Do not continue until you have created a convenient place to store your SQL worksheets.


    Most IDEs allow us to save and run snippets. It’s convenient to be able to right-click
    and instantly get a SQL statement. Snippets can be useful for tiny tasks, but
    they are still no replacement for powerful worksheets.


    ## Summary


    Before we dive into advanced Oracle SQL features, we need to build and learn a
    technology stack that will fully support us. These supporting technologies aren’t
    always very exciting, but it’s important to master the low-level stuff so we can
    focus on what matters. If we decide to invest more in learning SQL, then it is
    also worthwhile to invest in things like typing skills, operating systems and
    programs, SQL*Plus, IDEs, and SQL worksheets.


    # Part IIWrite Powerful SQL with Sets and Advanced Features


    # 6. Build Sets with Inline Views and ANSI Join Syntax


    We’re almost ready to dive into advanced SQL features. In Part I we built a solid
    foundation for SQL programming, but before we start using advanced features, we
    need to discuss how to construct our SQL statements.


    The best way to write SQL statements is to create nested sets using inline views
    and the ANSI join syntax. First, we need to discuss common SQL problems – spaghetti
    code caused by the old join syntax and too much context. Sets, chunking, and functional
    programming can help us create simpler queries. We will combine those three concepts
    and implement them with inline views. Inline views will be the small, independent
    building blocks for our SQL statements. The ANSI join syntax will help us take
    those inline views and construct large, but understandable, queries. Finally,
    we’ll put those ideas together to build a large example and learn something from
    our space data set.


    ## Spaghetti Code from Nonstandard Syntax


    The old join syntax throws all the tables in a comma-separated list and joins
    the tables together later. That programming process leads to code that is hard
    to read, hard to debug, prone to accidental cross joins, and nonstandard. The
    old join syntax is still valid, and occasionally useful, but should be used sparingly.


    As a quick refresher, the following code shows the old join syntax and the newer
    ANSI join syntax. (The examples use `*` for brevity, but most of our production
    queries should explicitly name the columns we need to use.)


    ```

    --Old join syntax we should avoid.

    select *

    from launch, satellite

    where launch.launch_id = satellite.launch_id(+);

    --ANSI join syntax we should embrace.

    select *

    from launch

    left join satellite

    on launch.launch_id = satellite.launch_id;

    ```'
