    ### 避免宝可梦式异常处理


    SQL 或 PL/SQL 中的低级故障属于异常。异常处理更像是 PL/SQL 的主题，而非 SQL 的主题。不幸的是，我们需要讨论异常处理，因为它经常被错误地实施。当我们的异常处理机制失效时，我们甚至不知道该调试哪一行
    SQL 语句。包括我在内的大多数 SQL 开发人员，都会浪费数周时间试图找到`真正的`行号和错误信息。


    在 Oracle 中处理异常的最佳方式是什么都不做。默认情况下，当异常发生时，许多有用的事情会自动发生：异常会停止当前代码块，向上传播经过所有调用块，并导致整个程序崩溃。最终的异常会生成所有的错误代码和消息，以及所有相关的行号和对象名称。


    默认的异常处理行为提供了足够的信息，几乎可以排查我们所有的问题。我们对失败的反常恐惧导致了不良实践，这些实践使得故障更难发现和诊断。


    例如，许多 PL/SQL 程序捕获并记录所有异常，而不是让程序崩溃。如果我们的程序能捕获并处理一个异常，这很好。如果我们的程序能在出错后继续运行，这很好。但我们不应制造一种不切实际的期望，即`所有`程序都能处理`所有`异常。


    大多数 SQL 开发人员知道，我们不应该像下面的代码那样捕获并忽略所有错误：


    ```sql

    -- 忽略所有错误的糟糕异常处理示例。

    begin

    -- 在这里做些事情...

    null;

    exception

    when others then null;

    end;

    /

    ```


    但许多 SQL 程序员没有意识到，下面的代码几乎同样糟糕。这段代码记录错误并继续处理：


    ```sql

    -- 可能很糟糕的异常处理示例。

    begin

    -- 在这里做些事情...

    null;

    exception

    when others then

    log_error;

    end;

    /

    ```


    前面的代码至少应该重新引发错误。或者，代码一开始就不应该捕获`OTHERS`。


    实际上，错误日志很少被检查。当我们的程序遇到严重问题时，有时我们需要承认失败并让程序崩溃。让程序崩溃总比把错误扫到地毯下要好。在问题还记忆犹新时立即发现错误，比以后再调查要好。


    自定义的日志记录函数几乎总是无法记录完整的调用堆栈和所有行号。如果我们构建一个错误日志记录函数，我们必须始终同时使用 `DBMS_UTILITY.FORMAT_ERROR_STACK`
    和 `DBMS_UTILITY.FORMAT_ERROR_BACKTRACE`。如果我们需要对错误堆栈或调用堆栈数据进行更精确的控制，可以使用 `UTL_CALL_STACK`
    包。


    只打印最后一个错误和最后一个行号，可能无法揭示根本问题。可悲的是，大多数自定义错误日志只显示异常处理程序的位置，而不是原始错误。如果我们构建一个自定义错误日志记录函数，该函数必须至少包含与我们什么都不做时一样多的信息。一个只存储
    `SQLERRM` 的日志工具是一个巨大的错误。


    除非我们的程序专门处理错误或记录仅存在于某个程序作用域的额外信息，否则我们只需要在程序入口点捕获异常。我们不应该给每个过程或每个 PL/SQL 块都添加异常处理程序。我们应该利用异常传播机制。


    异常不像宝可梦——我们不想全部捕获它们。


    ### 使用糟糕的命名和奇怪的数值


    即使知道是糟糕的代码，我们也常常会写。我们知道不应该硬编码那个值，或者调用那个危险的函数，或者依赖那个未经证实的假设。但我们还是写了糟糕的代码，因为我们没有时间让程序变得完美。当我们不得不牺牲质量时，我们本能地想要隐藏我们在做的事情。我们需要对抗这种本能，做完全相反的事情：让我们的糟糕决策对任何阅读代码的人都显而易见。


    如果我们不知道自己在做什么，应该在注释中说明。如果我们表现出虚假的自信，那些比我们懂得多的程序员可能会犹豫是否更改我们的代码。通过明确我们的无知，我们是在邀请他人帮助我们。


    如果我们认为我们的列或函数是危险的，就把这种不确定性放到名字里。我们不想用我们的错误把其他程序员也拖下水。


    如果我们不得不硬编码一个非真实的值，就使用一个会显得突兀的奇怪数值。例如，对于日期，选择一个明显没有意义、不切实际的日期。下面的例子与我几次使用过的真实代码惊人地相似：


    ```sql

    -- 这能用但我不知道为啥！

    select date ''9999-12-31'' dangerous_last_date

    from dual;

    ```


    新程序员可能会对接承认错误感到紧张，但承认错误比另一种选择要好得多。专家不害怕糟糕的程序员——专家害怕的是不知道自己糟糕的程序员。在某些情境下，我们都是糟糕的程序员，所以我们都能理解时间限制和被程序搞糊涂的情况。让我们坦诚相待吧。

    '
- fmt: "### Use Fragile SQL\n\nThere is a difference between writing robust programs\
    \ that can handle unexpected problems and writing careless programs that suppress\
    \ errors and encourage bad input. We have been trained to avoid errors and exceptions\
    \ in our SQL statements at all costs. As discussed in a previous section, the\
    \ simplest away to avoid that trap is to avoid code like `EXCEPTION WHEN OTHERS\
    \ THEN NULL`. In addition, there are several helpful SQL constructs that shouldn’t\
    \ be used to suppress useful errors.\n\nCorrelated subqueries that return more\
    \ than one row generate the error “ORA-01427: single-row subquery returns more\
    \ than one row.” We may be conditioned to always use `IN` instead of `=` to avoid\
    \ that error. But if our data is only supposed to return one row, we want to know\
    \ when that assumption is wrong. For example, the `DUAL` table should only contain\
    \ one row. If that table contains multiple rows, we want to see an error immediately.\
    \ For example, in the following code, the `IN` operator is not protecting us;\
    \ instead, it’s ignoring potentially serious problems:\n\n```\n-- \"=\" is better\
    \ than \"in\" if there should only be one value.\nselect * from dual where 'X'\
    \ in (select dummy from dual);\nselect * from dual where 'X' = (select dummy from\
    \ dual);\n```\n\nQueries in PL/SQL code that return no rows generate the error\
    \ “ORA-01403: no data found.” Queries that return more than one row generate the\
    \ error “ORA-01422: exact fetch returns more than requested number of rows.” We\
    \ can avoid those errors by using an aggregation that always returns one, and\
    \ only one, row. But like with the preceding subquery problem, we don’t always\
    \ want to hide our errors. If the `DUAL` table contains no rows, then we want\
    \ to generate a no data found exception, not hide it. The following PL/SQL block\
    \ shows that sometimes the simplest, most fragile code is best. If someone messes\
    \ with the `DUAL` table, which was possible in older versions, there’s no point\
    \ in trying to protect ourselves from the problem. Our system is going to break,\
    \ so we might as well find out in the most straightforward way possible:\n\n```\n\
    --Don't hide NO_DATA_FOUND errors.\ndeclare\n  v_dummy varchar2(1);\nbegin\n \
    \ --This generates \"ORA-01403: no data found\".\n  select dummy into v_dummy\
    \ from dual where 1=0;\n  --We might be tempted to avoid errors with aggregation.\n\
    \  select max(dummy) into v_dummy from dual where 1=0;\n  --But we want an error\
    \ if this code fails.\n  select dummy into v_dummy from dual;\nend;\n/\n```\n\n\
    Outer joins are clearly necessary for our SQL statements. But we should not use\
    \ an outer join by default to avoid returning empty sets. If our program depends\
    \ on both tables having data, then we don’t want to hide it. The error generated\
    \ by an empty set may be more useful than returning a set with missing values.\n\
    \nWhen our SQL queries make a mistake, errors are better than wrong results. Exceptions\
    \ are obvious and can be traced. Subtle, wrong results can linger for a long time\
    \ and cause unexpected problems that are hard to trace back to the source.\n\n\
    ## The Path to Writing Good SQL\n\nWriting good code, or writing anything well,\
    \ takes a lot of work. While I certainly hope this book helps you become a good\
    \ SQL writer, this book is not enough. Parts I and II gave you the processes and\
    \ knowledge needed to write powerful SQL, and this chapter introduces SQL writing\
    \ styles and tips. Ultimately, the only way to be good at writing something is\
    \ to frequently practice. Just doing our daily work isn’t enough to master a skill.\
    \ To become good at writing SQL, we must `deliberately` practice it.\n\nWe need\
    \ to find ways to get slightly out of our comfort zone and exercise our SQL writing\
    \ skills. There are many ways to practice with SQL. We can answer questions on\
    \ Stack Overflow, help people on forums, email useful tricks to our coworkers,\
    \ present at a team meeting, attend local user groups or peer reviews, etc.\n\n\
    Contributing to work and open source projects is important, but those contributions\
    \ won’t significantly improve our SQL `writing` skills. The trick is to find something\
    \ with a short feedback loop, so we can quickly learn what we’re doing wrong.\
    \ We want to be comfortable enough with the medium to participate, but not entirely\
    \ comfortable with our posts. The best way to learn something is to teach it to\
    \ others, even though teaching can be intimidating.\n\n## Summary\n\nCreating\
    \ elegant SQL statements requires more than rote knowledge of SQL syntax. We need\
    \ to think about our true audience – other human beings. Writing `good` SQL requires\
    \ efficient processes and technical knowledge. Writing `great` SQL requires extra\
    \ effort to tell a story in a limited format. This chapter introduced many tips\
    \ and styles for telling our stories in SQL. We should use comments to explain\
    \ ourselves, use carefully selected names, use whitespace to emphasize important\
    \ code, and make our code honest to make our bugs obvious.\n\nIt’s fine if you\
    \ disagree with many of my specific suggestions; there are many opinions, and\
    \ there’s no one-size-fits-all style guide. We just need to ensure that our programming\
    \ style is not driven by a simple desire to make our code compile. Our programming\
    \ style must be driven by a desire to be understood by others.\n\n# 12. Write\
    \ Large SQL Statements\n\nWe must write large SQL statements to take full advantage\
    \ of the power of Oracle SQL. Large procedures are an anti-pattern in procedural\
    \ programming languages; we need to understand why SQL is different. Large SQL\
    \ statements create several risks and opportunities; we must be aware of the consequences\
    \ of parsing, optimizer transformations, resource consumption, context switches,\
    \ and parallelism. Finally, we need to learn how to read and debug large SQL statements.\n\
    \n## Imperative Programming Size Limits Do Not Apply\n\nNot all of the rules we\
    \ learned from imperative programming apply to declarative SQL. One of the first\
    \ things we learned from traditional programming is to keep each statement, procedure,\
    \ and function as small as possible.\n\nKeeping each line and procedure small\
    \ is great advice and should be followed for our PL/SQL code. It’s best to build\
    \ a procedure that only does one small thing. Keeping procedures small minimizes\
    \ unexpected side effects, makes code easier to understand, simplifies debugging,\
    \ etc. Likewise, each line of code should also be small, although there’s no precise,\
    \ objective definition for what is too big.\n\nA SQL statement is arguably a single\
    \ line of code. Consider the large example built in Chapter [6](#471418_2_En_6_Chapter.xhtml)\
    \ that shows the top rocket fuels used per year. That single line of code is over\
    \ 1,500 characters long. In a procedural context, that much code in one statement\
    \ would be a monstrosity. But in Oracle, that single statement is the best way\
    \ to get the information. A procedural version of that example would require more\
    \ code, more context, and more supporting objects.\n\nThe rules about procedure\
    \ length apply to SQL, but not to the entire SQL `statement`. In Oracle SQL, the\
    \ declarative equivalent of a procedure is an inline view. It doesn’t matter if\
    \ our SQL statements are a hundred lines long, but it does matter if our inline\
    \ views are a hundred lines long."
  raw: '### Use Fragile SQL


    There is a difference between writing robust programs that can handle unexpected
    problems and writing careless programs that suppress errors and encourage bad
    input. We have been trained to avoid errors and exceptions in our SQL statements
    at all costs. As discussed in a previous section, the simplest away to avoid that
    trap is to avoid code like `EXCEPTION WHEN OTHERS THEN NULL`. In addition, there
    are several helpful SQL constructs that shouldn’t be used to suppress useful errors.


    Correlated subqueries that return more than one row generate the error “ORA-01427:
    single-row subquery returns more than one row.” We may be conditioned to always
    use `IN` instead of `=` to avoid that error. But if our data is only supposed
    to return one row, we want to know when that assumption is wrong. For example,
    the `DUAL` table should only contain one row. If that table contains multiple
    rows, we want to see an error immediately. For example, in the following code,
    the `IN` operator is not protecting us; instead, it’s ignoring potentially serious
    problems:


    ```

    -- "=" is better than "in" if there should only be one value.

    select * from dual where ''X'' in (select dummy from dual);

    select * from dual where ''X'' = (select dummy from dual);

    ```


    Queries in PL/SQL code that return no rows generate the error “ORA-01403: no data
    found.” Queries that return more than one row generate the error “ORA-01422: exact
    fetch returns more than requested number of rows.” We can avoid those errors by
    using an aggregation that always returns one, and only one, row. But like with
    the preceding subquery problem, we don’t always want to hide our errors. If the
    `DUAL` table contains no rows, then we want to generate a no data found exception,
    not hide it. The following PL/SQL block shows that sometimes the simplest, most
    fragile code is best. If someone messes with the `DUAL` table, which was possible
    in older versions, there’s no point in trying to protect ourselves from the problem.
    Our system is going to break, so we might as well find out in the most straightforward
    way possible:


    ```

    --Don''t hide NO_DATA_FOUND errors.

    declare

    v_dummy varchar2(1);

    begin

    --This generates "ORA-01403: no data found".

    select dummy into v_dummy from dual where 1=0;

    --We might be tempted to avoid errors with aggregation.

    select max(dummy) into v_dummy from dual where 1=0;

    --But we want an error if this code fails.

    select dummy into v_dummy from dual;

    end;

    /

    ```


    Outer joins are clearly necessary for our SQL statements. But we should not use
    an outer join by default to avoid returning empty sets. If our program depends
    on both tables having data, then we don’t want to hide it. The error generated
    by an empty set may be more useful than returning a set with missing values.


    When our SQL queries make a mistake, errors are better than wrong results. Exceptions
    are obvious and can be traced. Subtle, wrong results can linger for a long time
    and cause unexpected problems that are hard to trace back to the source.


    ## The Path to Writing Good SQL


    Writing good code, or writing anything well, takes a lot of work. While I certainly
    hope this book helps you become a good SQL writer, this book is not enough. Parts
    I and II gave you the processes and knowledge needed to write powerful SQL, and
    this chapter introduces SQL writing styles and tips. Ultimately, the only way
    to be good at writing something is to frequently practice. Just doing our daily
    work isn’t enough to master a skill. To become good at writing SQL, we must *deliberately*
    practice it.


    We need to find ways to get slightly out of our comfort zone and exercise our
    SQL writing skills. There are many ways to practice with SQL. We can answer questions
    on Stack Overflow, help people on forums, email useful tricks to our coworkers,
    present at a team meeting, attend local user groups or peer reviews, etc.


    Contributing to work and open source projects is important, but those contributions
    won’t significantly improve our SQL *writing* skills. The trick is to find something
    with a short feedback loop, so we can quickly learn what we’re doing wrong. We
    want to be comfortable enough with the medium to participate, but not entirely
    comfortable with our posts. The best way to learn something is to teach it to
    others, even though teaching can be intimidating.


    ## Summary


    Creating elegant SQL statements requires more than rote knowledge of SQL syntax.
    We need to think about our true audience – other human beings. Writing *good*
    SQL requires efficient processes and technical knowledge. Writing *great* SQL
    requires extra effort to tell a story in a limited format. This chapter introduced
    many tips and styles for telling our stories in SQL. We should use comments to
    explain ourselves, use carefully selected names, use whitespace to emphasize important
    code, and make our code honest to make our bugs obvious.


    It’s fine if you disagree with many of my specific suggestions; there are many
    opinions, and there’s no one-size-fits-all style guide. We just need to ensure
    that our programming style is not driven by a simple desire to make our code compile.
    Our programming style must be driven by a desire to be understood by others.


    # 12. Write Large SQL Statements


    We must write large SQL statements to take full advantage of the power of Oracle
    SQL. Large procedures are an anti-pattern in procedural programming languages;
    we need to understand why SQL is different. Large SQL statements create several
    risks and opportunities; we must be aware of the consequences of parsing, optimizer
    transformations, resource consumption, context switches, and parallelism. Finally,
    we need to learn how to read and debug large SQL statements.


    ## Imperative Programming Size Limits Do Not Apply


    Not all of the rules we learned from imperative programming apply to declarative
    SQL. One of the first things we learned from traditional programming is to keep
    each statement, procedure, and function as small as possible.


    Keeping each line and procedure small is great advice and should be followed for
    our PL/SQL code. It’s best to build a procedure that only does one small thing.
    Keeping procedures small minimizes unexpected side effects, makes code easier
    to understand, simplifies debugging, etc. Likewise, each line of code should also
    be small, although there’s no precise, objective definition for what is too big.


    A SQL statement is arguably a single line of code. Consider the large example
    built in Chapter [6](#471418_2_En_6_Chapter.xhtml) that shows the top rocket fuels
    used per year. That single line of code is over 1,500 characters long. In a procedural
    context, that much code in one statement would be a monstrosity. But in Oracle,
    that single statement is the best way to get the information. A procedural version
    of that example would require more code, more context, and more supporting objects.


    The rules about procedure length apply to SQL, but not to the entire SQL *statement*.
    In Oracle SQL, the declarative equivalent of a procedure is an inline view. It
    doesn’t matter if our SQL statements are a hundred lines long, but it does matter
    if our inline views are a hundred lines long.'
  trans: "### 使用脆弱的 SQL\n\n编写能够处理意外问题的健壮程序，与编写压制错误、鼓励错误输入的粗心程序，二者之间存在区别。我们一直被训练要不惜一切代价避免在\
    \ SQL 语句中出现错误和异常。正如前面章节所讨论的，避免陷入那个陷阱的最简单方法就是避免使用类似 `EXCEPTION WHEN OTHERS THEN\
    \ NULL` 的代码。此外，还有一些有用的 SQL 结构，不应被用来压制有用的错误。\n\n返回多行的关联子查询会生成错误 \"ORA-01427: single-row\
    \ subquery returns more than one row.\"。我们可能已经习惯于总是使用 `IN` 而不是 `=` 来避免该错误。但如果我们的数据本应只返回一行，那么当假设错误时，我们希望知道。例如，`DUAL`\
    \ 表应该只包含一行。如果该表包含多行，我们希望立即看到错误。例如，在以下代码中，`IN` 操作符并没有保护我们；相反，它在忽略潜在的严重问题：\n\n```\n\
    -- 如果只应该有一个值，那么“=”比“in”更好。\nselect * from dual where 'X' in (select dummy from\
    \ dual);\nselect * from dual where 'X' = (select dummy from dual);\n```\n\nPL/SQL\
    \ 代码中不返回任何行的查询会生成错误 \"ORA-01403: no data found.\"。返回多行的查询会生成错误 \"ORA-01422: exact\
    \ fetch returns more than requested number of rows.\"。我们可以使用聚合函数来避免这些错误，因为它总是只返回一行。但就像前面的子查询问题一样，我们并不总是想隐藏错误。如果\
    \ `DUAL` 表不包含任何行，那么我们希望生成一个“未找到数据”异常，而不是隐藏它。以下 PL/SQL 块表明，有时最简单、最“脆弱”的代码才是最好的。如果有人弄乱了\
    \ `DUAL` 表（这在旧版本中是可能的），试图保护我们自己免受该问题是没有意义的。我们的系统将会崩溃，因此我们不如以最直接的方式尽早发现：\n\n```\n\
    --不要隐藏 NO_DATA_FOUND 错误。\ndeclare\n  v_dummy varchar2(1);\nbegin\n  --这会生成 \"\
    ORA-01403: no data found\"。\n  select dummy into v_dummy from dual where 1=0;\n\
    \  --我们可能会想用聚合函数来避免错误。\n  select max(dummy) into v_dummy from dual where 1=0;\n\
    \  --但我们希望如果这段代码失败就得到一个错误。\n  select dummy into v_dummy from dual;\nend;\n/\n\
    ```\n\n外连接对于我们的 SQL 语句来说显然是必要的。但我们不应该默认使用外连接来避免返回空集。如果我们的程序依赖于两张表都有数据，那么我们不想隐藏这一点。空集生成的错误可能比返回带有缺失值的集合更有用。\n\
    \n当我们的 SQL 查询出错时，错误比错误的结果更好。异常是显而易见的，并且可以被追踪。细微的错误结果可能潜伏很长时间，并导致难以追溯到根源的意外问题。\n\
    \n## 编写优秀 SQL 的途径\n\n编写好的代码，或者说做好任何事情，都需要大量工作。虽然我当然希望这本书能帮助你成为一名优秀的 SQL 编写者，但这本书本身是不够的。第一和第二部分为你提供了编写强大\
    \ SQL 所需的流程和知识，本章介绍了 SQL 编写风格和技巧。最终，擅长写作的唯一方法就是频繁练习。仅做日常工作不足以掌握一项技能。要擅长编写 SQL，我们必须`刻意地`练习它。\n\
    \n我们需要找到方法，稍微走出舒适区，锻炼我们的 SQL 编写技能。有很多方法可以练习 SQL。我们可以在 Stack Overflow 上回答问题，在论坛上帮助他人，通过电子邮件与同事分享有用的技巧，在团队会议上做演示，参加本地用户组或同行评审等。\n\
    \n为工作和开源项目做贡献很重要，但这些贡献不会显著提高我们的 SQL`写作`技巧。诀窍是找到反馈周期短的事情，这样我们可以快速了解自己做错了什么。我们希望对参与其中感到足够自在，但对自己的帖子又不完全自在。学习某事的最佳方法是将其教给他人，尽管教学可能令人生畏。\n\
    \n## 总结\n\n创建优雅的 SQL 语句需要的不仅仅是死记硬背 SQL 语法。我们需要考虑我们真正的受众——其他人类。编写`好的`SQL 需要高效的流程和技术知识。编写`伟大的`SQL\
    \ 则需要在有限的格式中讲述故事而付出额外的努力。本章介绍了许多在 SQL 中讲述故事的技巧和风格。我们应该使用注释来解释自己，使用精心挑选的名字，使用空格来强调重要代码，并使我们的代码诚实，让我们的错误显而易见。\n\
    \n如果你不同意我的许多具体建议，那也没关系；存在很多观点，也没有一种放之四海而皆准的风格指南。我们只需要确保我们的编程风格不是由让代码编译的简单愿望所驱动。我们的编程风格必须由渴望被他人理解所驱动。\n\
    \n# 第 12 章：编写大型 SQL 语句\n\n我们必须编写大型 SQL 语句，以充分利用 Oracle SQL 的强大功能。在过程式编程语言中，大型过程是一种反模式；我们需要理解\
    \ SQL 为何不同。大型 SQL 语句带来了一些风险和机会；我们必须意识到解析、优化器转换、资源消耗、上下文切换和并行化的后果。最后，我们需要学习如何阅读和调试大型\
    \ SQL 语句。\n\n## 命令式编程的规模限制不适用\n\n我们从命令式编程中学到的规则并非都适用于声明式的 SQL。从传统编程中学到的首要原则之一就是尽量保持每条语句、每个过程和函数小巧。\n\
    \n保持每行代码和每个过程小巧是很好的建议，应该在我们的 PL/SQL 代码中遵循。最好构建一个只做一件小事的过程。保持过程小巧可以最大限度地减少意外的副作用，使代码更易于理解，简化调试等。同样，每行代码也应该尽量短小，尽管对于“过大”并没有精确、客观的定义。\n\
    \n一条 SQL 语句可以说就是一行代码。考虑在第[6]章中构建的展示历年顶级火箭燃料的大型例子。那一行代码超过了 1500 个字符。在过程式编程环境中，一条语句中包含这么多代码将是一个庞然大物。但在\
    \ Oracle 中，那条单独的语句是获取信息的最佳方式。那个例子的过程式版本将需要更多的代码、更多的上下文和更多的支持对象。\n\n关于过程长度的规则也适用于\
    \ SQL，但不适用于整个 SQL`语句`。在 Oracle SQL 中，与过程等效的声明式结构是内联视图。我们的 SQL 语句长达一百行并不重要，但我们的内联视图长达一百行就很重要了。"
- fmt: '## 一个大的 SQL 语句对比多个小的 SQL 语句


    要展示一个大的 SQL 语句对比多个小语句的优势，理想情况下，我们会重用第 6 章中的那个大型示例。遗憾的是，那个例子会占用太多篇幅，所以我们将重用第 7
    章中的一个较小示例。以下是一个用于查找前三颗卫星（基于发射日期）的 SQL 语句：


    ```sql

    --SQL version of first 3 satellites.

    select

    to_char(launch_date, ''YYYY-MM-DD'') launch_date,

    official_name

    from satellite

    join launch

    on satellite.launch_id = launch.launch_id

    order by launch_date, official_name

    fetch first 3 rows only;

    LAUNCH_DATE  OFFICIAL_NAME

    -----------  -------------

    1957-10-04   1-y ISZ

    1957-10-04   8K71A M1-10

    1957-11-03   2-y ISZ

    ```


    上面的 SQL 语句在命令式语言 PL/SQL 中被重新实现如下：


    ```sql

    --Imperative version of first 3 satellites.

    declare

    v_count number := 0;

    begin

    for launches in

    (

    select *

    from launch

    order by launch_date

    ) loop

    for satellites in

    (

    select *

    from satellite

    where satellite.launch_id = launches.launch_id

    order by official_name

    ) loop

    v_count := v_count + 1;

    if v_count  3 then

    return;

    end if;

    end loop;

    end loop;

    end;

    /

    ```


    前面两个例子最明显的区别是 SQL 版本要小得多。这个比较并不是在批评 PL/SQL。PL/SQL 是一门很棒的语言，并且几乎与 SQL 完美集成。*任何*命令式解决方案都会比等价的声明式
    SQL 语句大得多。


    命令式版本的代码需要我们做更多的工作。我们需要定义变量并自己维护计数器。我们需要创建自己的循环并迭代结果集。我们需要使用更高作用域中的值将两条 SQL 语句连接在一起。我们需要考虑先迭代哪个表，`LAUNCH`
    还是 `SATELLITE` —— 顺序很重要，因为我们只取前三条记录。调试 PL/SQL 代码需要单步执行代码并一次查看一个变量值，而不是一次性查看整个数据集。


    像任何小型示例一样，我们需要自问：从这个示例中学到的经验是否适用于大型、真实的 SQL？在这种情况下，答案是响亮的“是”。如果我们觉得前面的 PL/SQL
    代码块很糟糕，那么对于第 6 章的大型示例来说，情况会更糟。在 PL/SQL 中粘合 SQL 语句并非火箭科学，但它比通过连接或内联视图传递数据要复杂得多。有多种方法可以将大型查询拆分成过程式片段，但每种方法要么需要更多代码，要么需要更多辅助对象，比如临时表。


    然而，如果我们不使用内联视图和 ANSI 连接，SQL 的可读性优势就会消失。如果我们毫无章法地将所有表堆砌在一起，结果会比命令式替代方案更令人困惑。


    对于许多 SQL 开发人员来说，前面的 PL/SQL 版本已经看起来很糟糕了。用 PL/SQL 实现一个简单的连接并不难发现。但我们的 SQL 知识和经验越丰富，就越能频繁地识别出可以被声明式代码取代的过程式代码。每个有经验的
    SQL 开发人员都能讲述一些故事，关于他们如何用一打 SQL 代码替换掉上百行过程式代码。当然，这个经验绝不仅仅适用于 PL/SQL。PL/SQL 是运行
    SQL 语句的理想语言。在其他过程式语言中，一条 SQL 语句的等价实现甚至比前面的例子还要复杂。


    ## 大型 SQL 语句的性能风险


    大型 Oracle SQL 语句是简化代码和提高性能的好方法，但它们也会带来性能风险。当我们开始使用高级功能时，会遇到问题，但我们应该解决问题，而不是放弃。我们需要留意解析、优化器转换和资源消耗方面的问题。


    ### 大型 SQL 解析问题


    编写或生成大型 SQL 语句的首要问题是解析时间。每条 SQL 语句都是一个经过多步解析的程序——检查语法、检查权限、优化等。Oracle 实际上是为每条语句编译一个新程序，而传统上编译很慢。幸运的是，Oracle
    的 SQL 解析比传统编译快得多。但在 SQL 解析方面仍然存在一些极端情况。


    SQL 语句的大小没有理论限制。Oracle 数据库服务器可以轻松处理 SQL 语句中数兆字节的数据，尽管我们的客户端和程序可能会抱怨。查询的物理大小不是问题，除非在极端情况下，我们使用
    SQL 来存储大量数据。


    SQL 是一种方便的数据存储格式。我们可以通过从 `DUAL` 中选择常量并用 `UNION ALL` 组合行来存储数据。与 CSV 或 JSON 文件相比，SQL
    语句稍大一些，也可能稍慢一些。但 SQL 有一个巨大优势，就是不需要任何导入工具或转换，并且可以轻松地插入到许多上下文中。


    当由 `UNION ALL` 或 `INSERT ALL` 连接的行数接近几百行时，问题就开始出现了。旧版本的 Oracle 存在一个错误：连接 499 行可以正常工作，但连接
    500 行会耗费数小时。现代版本的解析时间已大大改善，但我们仍应避免在单条语句中连接超过 100 行。第四部分描述了如何每次组合 100 行就足够了。大型
    SQL 很有用，但巨大的 SQL 会导致解析时间过长。


    在 PL/SQL 对象中存储过多的兆字节数据可能导致编译错误，如“Error: PLS-00123: program too large (Diana nodes)”。这些错误可以通过使用多个对象来避免。但在某个时刻，当导入的数据变得足够大时，我们需要考虑其他格式。


    公用表表达式在嵌套深度超过几十层时也会出现解析问题。但这是一个极不可能发生的场景。我不想让大家在这里学到错误的经验。批量操作是个好主意；我们只是在使用极端尺寸时需要稍微谨慎一些。'
  raw: '## One Large SQL Statement vs. Multiple Small SQL Statements


    To demonstrate the advantages of one large SQL statement over multiple small statements,
    ideally, we would reuse the large example from Chapter [6](#471418_2_En_6_Chapter.xhtml).
    Unfortunately, that example would take up too much space, so we’ll reuse a smaller
    example from Chapter [7](#471418_2_En_7_Chapter.xhtml). The following is a SQL
    statement to find the first three satellites, based on their launch date:


    ```

    --SQL version of first 3 satellites.

    select

    to_char(launch_date, ''YYYY-MM-DD'') launch_date,

    official_name

    from satellite

    join launch

    on satellite.launch_id = launch.launch_id

    order by launch_date, official_name

    fetch first 3 rows only;

    LAUNCH_DATE  OFFICIAL_NAME

    -----------  -------------

    1957-10-04   1-y ISZ

    1957-10-04   8K71A M1-10

    1957-11-03   2-y ISZ

    ```


    That SQL statement is recreated in the following in an imperative language, using
    PL/SQL:


    ```

    --Imperative version of first 3 satellites.

    declare

    v_count number := 0;

    begin

    for launches in

    (

    select *

    from launch

    order by launch_date

    ) loop

    for satellites in

    (

    select *

    from satellite

    where satellite.launch_id = launches.launch_id

    order by official_name

    ) loop

    v_count := v_count + 1;

    if v_count  3 then

    return;

    end if;

    end loop;

    end loop;

    end;

    /

    ```


    The most obvious difference between the preceding two examples is the SQL version
    is much smaller. This comparison is not criticizing PL/SQL. PL/SQL is a great
    language, and PL/SQL almost perfectly integrates with SQL. *Any* imperative solution
    is going to be much larger than the equivalent declarative SQL statement.


    The imperative version of the code requires us to do much more work. We need to
    define a variable and increment our own counter. We need to create our own loops
    and iterate the results. We need to tie the two SQL statements together, using
    a value from a higher scope. We need to think about which table is iterated first,
    `LAUNCH` or `SATELLITE` – the order is important because we’re only getting the
    top three. Debugging the PL/SQL code requires stepping through the code and viewing
    variables one value at a time, instead of viewing entire sets of data at once.


    As with any small example, we need to ask ourselves if the lessons we learn from
    this example will apply to large, realistic SQL. In this case, the answer is a
    resounding yes. If we think the preceding PL/SQL block is bad, it would be even
    worse for the large Chapter [6](#471418_2_En_6_Chapter.xhtml) example. Gluing
    SQL statements together in PL/SQL isn’t rocket science, but it’s much more complicated
    than passing data through joins or inline views. There are multiple ways to split
    large queries into procedural pieces, but each way either requires more code or
    more helper objects, like temporary tables.


    However, the readability advantages of SQL disappear if we do not use inline views
    and ANSI joins. If we throw all the tables together, with no discipline, the result
    will be more confusing than the imperative alternative.


    For many SQL developers, the preceding PL/SQL version already looks bad. It’s
    not too hard to spot a simple join done in PL/SQL. But the more advanced our SQL
    knowledge and experience, the more frequently we’ll be able to identify procedural
    code that can be replaced with declarative code. Every experienced SQL developer
    can tell you stories about times they replaced a hundred lines of procedural code
    with a dozen lines of SQL. And this lesson certainly does not only apply to PL/SQL.
    PL/SQL is the ideal language for running SQL statements. In other procedural languages,
    the equivalent of a SQL statement is even more complicated than the preceding
    example.


    ## Performance Risks of Large SQL Statements


    Large Oracle SQL statements are a great way to simplify our code and increase
    performance, but they also introduce performance risks. When we start using advanced
    features, we’re going to run into problems, but we should solve those problems
    instead of giving up. We need to keep an eye out for problems with parsing, optimizer
    transformations, and resource consumption.


    ### Large SQL Parsing Problems


    The first problem with writing or generating large SQL statements is parse time.
    Every SQL statement is a program that goes through many parsing steps – checking
    syntax, checking privileges, optimizing, etc. Oracle effectively compiles a new
    program for each statement, and compiling is traditionally slow. Luckily, Oracle’s
    SQL parsing is much faster than traditional compilation. But there are still some
    edge cases with SQL parsing.


    There is no theoretical limit to the size of a SQL statement. The Oracle database
    server can easily handle megabytes of data in a SQL statement, although our clients
    and programs may complain. The physical size of a query is not a problem, except
    in extreme cases when we’re using SQL to store lots of data.


    SQL is a convenient format for storing data. We can store data by selecting constants
    from `DUAL` and combining rows with `UNION ALL`. Compared with a CSV or JSON file,
    a SQL statement is a bit larger and maybe a bit slower. But SQL has the huge advantage
    of not needing any import tools or conversions, and the SQL can easily be plugged
    into many contexts.


    Problems start to happen when the number of rows concatenated by `UNION ALL` or
    `INSERT ALL` approaches several hundred. Old versions of Oracle had a bug where
    concatenating 499 rows worked fine but concatenating 500 would take hours. The
    parse time is much better in modern versions, but we should still avoid concatenating
    more than 100 rows in a single statement. Part IV describes how combining 100
    rows at a time is good enough. Large SQL is useful, but ginormous SQL causes slow
    parse times.


    Storing too many megabytes of data in a PL/SQL object can cause compilation errors
    like “Error: PLS-00123: program too large (Diana nodes).” Those errors can be
    avoided by using multiple objects. But at some point, when our imported data becomes
    large enough, we need to look at other formats.


    Common table expressions also have parse problems when they are nested more than
    a few dozen levels deep. But that is an extremely unlikely scenario. I don’t want
    you to learn the wrong lesson here. Batching operations is a great idea; we just
    need to be a little cautious when using extreme sizes.'
