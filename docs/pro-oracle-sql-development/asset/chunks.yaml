    Histograms were helpful in our previous `LAUNCH` example because most `SITE_ID`s
    only have a few rows, but a few `SITE_ID`s have many rows.


    4.  *Index*: Number of B-tree levels, rows, distinct values, and clustering factor
    (which can be used to tell us how efficient an index is).


    5.  *Partition*: Table, column, histogram, and index statistics are also generated
    for each partition.


    6.  *Extended statistics*: Selectivity of expressions or combinations of columns.


    7.  *Temporary tables***:** Similar to regular tables, but stats can be generated
    for global temporary, private, or materialized common table expressions. Global
    temporary table statistics can be per session or global. Getting these statistics
    right can be tough since the data changes so frequently.


    8.  *System*: I/O and CPU performance. This information can help produce more
    meaningful time estimates. And knowing the difference between single-block read
