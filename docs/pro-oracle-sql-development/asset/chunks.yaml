    # 2. Create an Efficient Database Development Process


    Most Oracle database development environments are set up like a fragile china
    shop. There’s an intricate structure that must be maintained at all costs, and
    the smallest change can break things and stop everyone from working. Nobody knows
    exactly how the database got to be the way it is, and everybody is worried they
    won’t know how to fix it when it breaks. Typical Oracle database development processes
    are woefully behind industry norms. This chapter shows a better way to work. There
    are simple processes that can help us create, scale, experiment, and learn without
    interrupting anyone else.


    This chapter does not discuss the entire software development life cycle or agile
    vs. waterfall. Without building the right foundational processes, it’s meaningless
    to even talk about adapting agile or some other high-level process. This chapter
    focuses on low-level database concepts: creating databases, creating database
    objects, and then managing those objects.'
