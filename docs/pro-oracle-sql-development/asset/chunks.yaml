    column alias. We can’t simply search for keywords to parse our code. Some keywords
    also serve multiple purposes, such as “$”, which has four different meanings.
    And in Oracle, multiple languages can work together. Fully parsing SQL also requires
    parsing PL/SQL, hints, and Java. There is also a lot of legacy syntax that’s still
    supported but not even listed in the current version of the manual. Even breaking
    SQL into lexical units, like numbers and whitespace, is difficult.


