    ## 日志记录


    为我们的 PL/SQL 程序进行插桩（instrumentation）非常重要。市面上有许多免费且功能强大的日志记录工具，但不要让它们的复杂性阻碍你进行日志记录。即使是创建我们自己简单的日志记录，也远比什么都不做要好。


    这种插桩不需要很花哨。日志记录可以非常简单，比如在重要进程启动或停止时，将消息和时间戳写入表中。或者我们可以使用 `DBMS_APPLICATION_INFO`
    来帮助 Oracle 跟踪数据库中的数据，或者使用 `UTL_FILE` 将数据写入文件系统。使用 `DBMS_OUTPUT` 时要小心；它对小规模调试有用，但在大型系统上可能会很慢并导致溢出错误。


    例如，我们可以使用 `DBMS_APPLICATION_INFO` 来跟踪本章中各个示例的资源消耗。我们可以在每节的开头运行以下 PL/SQL 块，来设置会话的模块名和操作名：


    ```

    -- 设置会话的 MODULE 和 ACTION。

    begin

    dbms_application_info.set_module

    (

    module_name => ''第 18 章'',

    action_name => ''日志记录''

    );

    end;

    /

    ```


    在本章结束时，我们可以通过查询视图和表（如 `V$ACTIVE_SESSION_HISTORY` 和 `DBA_HIST_ACTIVE_SESS_HISTORY`）中的
    `ACTION` 和 `MODULE` 列来比较不同部分的情况。（这两个对象将在本章后面更详细地讨论。）以下是如何比较活动情况的示例：


    ```

    -- 本章中哪些部分消耗了最多的资源。

    select action, count(*) session_count

    from v$active_session_history

    where module = ''第 18 章''

    group by action

    order by session_count desc;

    ```


    许多数据库程序会自动设置该会话元数据。而且 Oracle 的默认日志记录已经捕获了其他元数据，例如用户名和机器名。在大多数情况下，即使没有那些额外的会话信息，我们也能找到性能问题，但我们应该在遇到问题*之前*就考虑添加额外的日志记录信息。


    这些日志信息对于发现历史趋势很有帮助。Oracle 拥有丰富的性能信息，但默认信息并非针对我们的应用程序组织，也不会长期存储。为我们的代码进行插桩不需要太多精力，并且应该成为每个项目的一部分。


    ## 性能分析：DBMS_PROFILER


    Oracle 不会跟踪每一行代码每次执行的时间。如此大量的插桩会迅速消耗所有可用存储空间。但如果我们配置好 `DBMS_PROFILER`，我们就可以临时收集
    PL/SQL 程序中每一行代码的总耗时和调用次数。性能分析提供的数据比日志记录更好，但不能完全取代日志记录；性能分析有显著的开销，不应默认启用。


    如果我们使用像 PL/SQL Developer 或 Toad 这样的 IDE，性能分析就像在启动 PL/SQL 程序前点击几个按钮一样简单。其他 IDE
    需要更多的设置；我们必须从安装目录 `RDBMS/ADMIN` 运行 `PROFTAB.SQL`，调用 `DBMS_PROFILER` 函数来启动和停止性能分析，然后查询表
    `PLSQL_PROFILER_DATA`、`PLSQL_PROFILER_RUNS` 和 `PLSQL_PROFILER_UNITS`。Oracle 没有完全自动化这个设置过程很烦人，但如果我们正在调优
    PL/SQL 程序，那么这个设置绝对是值得的。


    为了演示性能分析，让我们创建一个简单而缓慢的过程：


    ```

    -- 创建一个执行许多 COUNT 操作的测试过程。

    create or replace procedure test_procedure is

    v_count number;

    begin

    for i in 1 .. 10000 loop

    select count(*) into v_count from launch order by 1;

    end loop;

    for i in 1 .. 10000 loop

    select count(*) into v_count from engine order by 1;

    end loop;

    end;

    /

    ```


    现在我们需要启用性能分析并运行该过程。在合适的 IDE 中，启用意味着点击一个按钮来启用性能分析，然后运行这个 PL/SQL 块：


    ```

    -- 运行该过程进行性能分析。（大约需要 15 秒。）

    begin

    test_procedure;

    end;

    /

    ```


    每个 IDE 或查询工具的显示方式都不同。图 18-1 显示了 PL/SQL Developer 中的性能分析器报告。结果按运行时间降序排序，因此最重要的行位于顶部。甚至还有一个迷你条形图（spark
    bar chart）来快速向我们显示哪些行耗时最多。


    ![](img/471418_2_En_18_Fig1_HTML.png)


    图 18-1

    DBMS_PROFILER 报告


    前面的性能分析器报告准确地告诉了我们应该关注过程的哪个部分。不需要猜测我们认为程序的哪个部分慢。第 5 行的运行时间远远大于所有其他行运行时间的总和。这份报告清楚地表明，如果我们花时间优化第
    5 行以外的任何地方，那将是疯狂的。


    ## 性能分析：DBMS_HPROF


    像分层性能分析器（hierarchical profiler）和跟踪（tracing）这样的工具可以提供比 `DBMS_PROFILER` 更多的数据。我倾向于避免使用这些高级工具，因为它们更难使用和获取。我宁愿要易于访问的好数据，而不是难以访问的伟大数据。但只要我们使用的工具能告诉我们实际运行时间，而不是仅仅猜测，我们就已经领先了。分层性能分析器正逐渐变得更强大、更易于使用，也许有一天它会完全取代
    `DBMS_PROFILER`。


    分层性能分析器的主要问题是它需要提升的权限和服务器访问权限来进行设置和使用。设置脚本随每个版本而变化，以下说明和代码可能仅适用于 18c 及更高版本：


    首先，我们必须授予对该包的访问权限：


    ```

    -- 授予对 DBMS_HPROF 的访问权限。必须以 SYS 身份运行。

    grant execute on sys.dbms_hprof to &your_user;

    ```


    以下代码创建一个表来保存性能分析器报告，启用性能分析器，并运行和分析 `TEST_PROCEDURE`：


    ```

    -- 创建表来保存结果。

    create table hprof_report(the_date date, report clob);

    -- 生成报告。

    declare

    v_report clob;

    v_trace_id number;

    begin

    -- 创建性能分析器表，开始性能分析。

    dbms_hprof.create_tables(force_it => true);

    v_trace_id := dbms_hprof.start_profiling;

    -- 运行要进行性能分析的代码。

    test_procedure;

    -- 停止性能分析，创建并存储报告。

    dbms_hprof.stop_profiling;

    dbms_hprof.analyze(v_trace_id , v_report);

    insert into hprof_report values(sysdate, v_report);

    commit;

    end;

    /

    -- 查看报告。

    select * from hprof_report;

    ```


    该报告包含大量很好的信息，但太宽了，无法在本页完整显示。图 18-2 仅包含了 HTML 报告中众多数据表之一的一部分。如果我们阅读整个报告，它将验证我们已经从
    `DBMS_PROFILER` 中了解到的情况——过程中只有一行值得调优。未显示的报告部分还提供了相关的 `SQL_ID`，如果我们想要调优那个慢的 SQL
    语句，这是必需的。


    ![](img/471418_2_En_18_Fig2_HTML.png)


    图 18-2

    部分分层性能分析器报告

