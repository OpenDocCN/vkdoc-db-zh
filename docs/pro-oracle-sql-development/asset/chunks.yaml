  raw: '## Avoid CURSOR


    `CURSOR` is also a code smell. Like `TO_DATE`, there are certainly times when
    we need to use `CURSOR`, but we should be skeptical of code that frequently uses
    that keyword.


    There’s nothing wrong with cursor *processing*; the problems happen when we write
    code with the `CURSOR` keyword. Similar to `TO_DATE`, it’s perfectly fine to use
    `CURSOR` when we’re passing information from a database to an external application.


    The main problem with the `CURSOR` keyword is that it’s used for explicit cursor
    processing, instead of the simpler and faster cursor `FOR` loop processing. This
    anti-pattern is another PL/SQL topic in a SQL book. But it’s worth briefly discussing
    cursor processing because it so frequently affects how we write SQL. We want a
    PL/SQL style that makes it easy to use SQL statements.


    For example, let’s say we want to print all the launch dates in order. The following
    PL/SQL block uses explicit cursor processing, with the `CURSOR`, `OPEN`, `FETCH`,
    and `CLOSE` commands. This syntax is outdated and should almost never be used:


    ```

    --Explicit cursor processing: complex and slow.

    declare

    cursor launches is

    select * from launch order by launch_date;

    v_launch launch%rowtype;

    begin

    open launches;

    loop

    fetch launches into v_launch;

    exit when launches%notfound;

    dbms_output.put_line(v_launch.launch_date);

    end loop;

    close launches;

    end;

    /

    ```


    Compare the preceding code with the following much simpler cursor `FOR` loop processing:


    ```

    --Cursor FOR loop processing: simple and fast.

    begin

    for launches in

    (

    select * from launch order by launch_date

    ) loop

    dbms_output.put_line(launches.launch_date);

    end loop;

    end;

    /

    ```


    The second code example is much simpler, and it even runs faster. The explicit
    cursor processing example only retrieves one row at a time and spends a lot of
    time context switching between SQL and PL/SQL. The cursor `FOR` loop example automatically
    grabs 100 rows at a time and almost completely eliminates context switching.


    Almost all of the things the `CURSOR` keyword are used for are unnecessary, or
    they can be replaced by a simpler cursor `FOR` loop or a larger SQL statement.


    Explicit cursor processing allows us to manually bulk collect and limit the results.
    But the simpler cursor `FOR` loop automatically collects 100 rows at a time. As
    Chapter [16](#471418_2_En_16_Chapter.xhtml) discusses, collecting 100 rows at
    a time is almost always good enough.


    Explicit cursor processing is often used with `FORALL` statements. But instead,
    we can almost always do both the reading and the writing with a single SQL statement.


    Multiple cursors are often defined at the beginning of a procedure and then run
    in a loop inside each other. Instead, we should combine the two `SELECT` statements
    and run a single SQL statement.


    Cursors are sometimes used for pipelined functions, an advanced PL/SQL feature.
    But even pipelined functions are often just a poor way of writing a large SQL
    statement.


    There are certainly good uses for the `CURSOR` keyword, such as dynamic ref cursors,
    and I’m not advocating that we ban `CURSOR` from our code. But every time we see
    `CURSOR,` we should ask ourselves if we’re missing an opportunity to replace slow,
    complex, procedural code with faster, simpler, declarative SQL.


    ## Avoid Custom SQL Parsing


    Sometimes when we’re confronted with a difficult SQL language problem, we think,
    “I know. I’ll parse the SQL.” Now we have two problems.


    There are times when it would be helpful to parse an Oracle SQL or PL/SQL statement.
    We may want to find problems in our code, convert between syntaxes, find references
    to specific objects, etc. Unfortunately, parsing SQL is so hard that many language
    problems can rarely be solved in practice. When we run into a complex SQL problem
    and think we need a parser, we’ve probably hit a dead end. Unless our code only
    uses a small, well-defined subset of the SQL language, we should find another
    solution.


    The SQL language syntax is orders of magnitude more complex than most other programming
    languages. This complexity doesn’t mean that SQL is more powerful than Java or
    C. The complexity is because SQL adds many features through syntax, instead of
    through libraries or packages. That extra syntax helps our code look nice, but
    the extra syntax makes Oracle SQL ridiculously hard to parse.


    Most programming languages only have a few dozen keywords, but Oracle has over
    2500 keywords, and many of the keywords are unreserved. For example, `BEGIN` is
    used to mark the beginning of PL/SQL blocks. But `BEGIN` can also be used as a
    column alias. We can’t simply search for keywords to parse our code. Some keywords
    also serve multiple purposes, such as “$”, which has four different meanings.
    And in Oracle, multiple languages can work together. Fully parsing SQL also requires
    parsing PL/SQL, hints, and Java. There is also a lot of legacy syntax that’s still
    supported but not even listed in the current version of the manual. Even breaking
    SQL into lexical units, like numbers and whitespace, is difficult.


    There are lots of difficult programming problems. Why is parsing worthy of a special
    mention? The problem with parsing is that there is not a linear relationship between
    accuracy and difficulty. There are many parsing problems that can be solved with
    90% accuracy in a few hours. But 99% accuracy may take days, and 100% accuracy
    may take months. As discussed in Chapter [7](#471418_2_En_7_Chapter.xhtml), a
    regular expression is theoretically incapable of parsing a language like SQL.
    Even if we use powerful parsing tools, like ANTLR or YACC, the problem is still
    almost impossible to get right.


    For example, consider a common and deceivingly simple language problem – determining
    if a SQL statement is a `SELECT`. If we create a website that accepts code, like
    [`https://dbfiddle.uk`](https://dbfiddle.uk), we need to classify each statement
    to know how to run it. I’ve seen many solutions to this problem, but very few
    of them can correctly classify all of the following `SELECT` statements:


    ```

    --Valid SELECT statements.

    SeLeCt * from dual;

    /*asdf*/   select * from dual;

    ((((select * from dual))));

    with test1 as (select * from dual) select * from test1;

    ```


    If we try to parse SQL, we can very easily program ourselves into a corner and
    waste a huge amount of time. Unless we can identify a special case, like if we
    can ensure our parsed code always has a specific format, we should avoid creating
    SQL parsers.'
  trans: '

    ## 避免使用 `CURSOR`


    `CURSOR`（游标）同样是一种代码异味。和 `TO_DATE` 函数类似，虽然确实有些时候我们需要使用 `CURSOR`，但对于频繁使用该关键字的代码，我们应持怀疑态度。


    游标处理本身并无问题；问题在于我们使用 `CURSOR` 关键字来编写代码。与 `TO_DATE` 类似，当我们把信息从数据库传递到外部应用时，使用 `CURSOR`
    是完全可以的。


    `CURSOR` 关键字的主要问题在于，它用于显式游标处理，而不是更简单、更快速的游标 `FOR` 循环处理。这个反模式是 SQL 书籍中又一个关于 PL/SQL
    的话题。但简要讨论一下游标处理是值得的，因为它频繁地影响我们编写 SQL 的方式。我们希望采用一种 PL/SQL 风格，使得使用 SQL 语句变得容易。


    例如，假设我们想按顺序打印所有的发射日期。下面的 PL/SQL 块使用了显式游标处理，包含了 `CURSOR`、`OPEN`、`FETCH` 和 `CLOSE`
    命令。这种语法已经过时，几乎永远不应该再使用：


    ```

    --显式游标处理：复杂且慢。

    declare

    cursor launches is

    select * from launch order by launch_date;

    v_launch launch%rowtype;

    begin

    open launches;

    loop

    fetch launches into v_launch;

    exit when launches%notfound;

    dbms_output.put_line(v_launch.launch_date);

    end loop;

    close launches;

    end;

    /

    ```


    将前面的代码与下面这个简单得多的游标 `FOR` 循环处理进行比较：


    ```

    --游标 FOR 循环处理：简单且快。

    begin

    for launches in

    (

    select * from launch order by launch_date

    ) loop

    dbms_output.put_line(launches.launch_date);

    end loop;

    end;

    /

    ```


    第二个代码示例要简单得多，而且运行速度甚至更快。显式游标处理示例一次只检索一行，并在 SQL 和 PL/SQL 之间进行大量的上下文切换。而游标 `FOR`
    循环示例则自动一次抓取 100 行，几乎完全消除了上下文切换。


    `CURSOR` 关键字所用于的绝大多数目的都是不必要的，或者可以被更简单的游标 `FOR` 循环或更庞大的 SQL 语句所替代。


    显式游标处理允许我们手动批量收集并限制结果。但更简单的游标 `FOR` 循环会自动一次收集 100 行。正如第 16 章所讨论的，一次收集 100 行几乎总是足够好的。


    显式游标处理常与 `FORALL` 语句一起使用。但相反，我们几乎总是可以用一条 SQL 语句同时完成读和写。


    多个游标常常在过程的开头定义，然后在循环内互相嵌套运行。相反，我们应该合并这两个 `SELECT` 语句，执行一条 SQL 语句。


    游标有时用于管道函数，这是一个高级的 PL/SQL 功能。但即使是管道函数，通常也只是编写大型 SQL 语句的一种糟糕方式。


    `CURSOR` 关键字当然也有其合理的用途，比如动态 ref 游标，我并非主张在我们的代码中禁止使用 `CURSOR`。但是，每次我们看到 `CURSOR`，都应该问问自己，是否错失了一个用更快、更简单的声明式
    SQL 来替代缓慢、复杂的过程式代码的机会。


    ## 避免自定义 SQL 解析


    有时，当我们面对一个困难的 SQL 语言问题时，我们会想：“我知道了，我要解析这个 SQL。”现在我们有两个问题了。


    在某些情况下，解析 Oracle SQL 或 PL/SQL 语句会有所帮助。我们可能想在代码中查找问题、在不同语法间转换、查找对特定对象的引用等。不幸的是，解析
    SQL 如此困难，以至于许多语言问题在实践中很少能得到解决。当我们遇到一个复杂的 SQL 问题，并认为需要一个解析器时，我们可能已经走进了死胡同。除非我们的代码只使用
    SQL 语言中一个小型且定义良好的子集，否则我们应该寻找其他解决方案。


    SQL 语言的语法比大多数其他编程语言复杂几个数量级。这种复杂性并不意味着 SQL 比 Java 或 C 更强大。复杂性的根源在于 SQL 通过语法（而不是通过库或包）添加了许多功能。这些额外的语法让我们的代码看起来不错，但也使得
    Oracle SQL 的解析变得极其困难。


    大多数编程语言只有几十个关键字，但 Oracle 有超过 2500 个关键字，而且许多是非保留的。例如，`BEGIN` 用于标记 PL/SQL 块的开始。但
    `BEGIN` 也可以用作列别名。我们不能简单地搜索关键字来解析代码。一些关键字还具有多种用途，比如 “$”，它有四种不同的含义。而且在 Oracle 中，多种语言可以协同工作。完整解析
    SQL 还需要解析 PL/SQL、提示（hints）和 Java。此外，还有很多遗留语法仍然被支持，甚至没有在当前版本的手册中列出。即使将 SQL 分解为词法单元（如数字和空白）也很困难。


    有很多困难的编程问题。为什么解析值得一提呢？解析的问题在于，准确性与难度之间不存在线性关系。有许多解析问题可以在几小时内达到 90% 的准确性。但达到 99%
    的准确性可能需要数天，而 100% 的准确性可能需要数月。正如第 7 章所讨论的，正则表达式在理论上无法解析像 SQL 这样的语言。即使我们使用强大的解析工具，如
    ANTLR 或 YACC，这个问题也几乎不可能解决得完美无缺。


    例如，考虑一个常见且看似简单的语言问题——判断一个 SQL 语句是否是 `SELECT` 语句。如果我们创建一个接受代码的网站，比如 [`https://dbfiddle.uk`](https://dbfiddle.uk)，我们需要对每个语句进行分类以了解如何运行它。我见过许多解决这个问题的方案，但极少有方案能够正确分类以下所有
    `SELECT` 语句：


    ```

    --有效的 SELECT 语句。

    SeLeCt * from dual;

    /*asdf*/   select * from dual;

    ((((select * from dual))));

    with test1 as (select * from dual) select * from test1;

    ```


    如果我们尝试解析 SQL，我们很容易会把自己逼入编程的死角，并浪费大量时间。除非我们能识别出特殊情况，例如可以确保我们解析的代码始终具有特定的格式，否则我们应该避免创建
    SQL 解析器。

    '
- fmt: '## Avoid Automating Everything


    Automation is great, but not every automated process or technology is worth using.
    For every painful, manual task, there is a long line of vendors willing to sell
    us software, whether that software makes sense or not. We need to remember that
    many information technology projects fail, and we need to avoid the sunk-cost
    fallacy. Sometimes we need to avoid small features that sound useful, but don’t
    work in practice.


    The following list includes examples of automation features that don’t quite work
    in Oracle:


    1.  *Automatic memory management:* This feature was never officially recommended,
    and in 12.2 it is effectively disabled. This feature failure doesn’t make sense
    to me – it seems like it shouldn’t be that hard to dynamically size PGA and SGA.


    2.  *Recycle bin space pressure:* Dropped tables are supposed to be automatically
    cleaned up when the system needs the space. But the algorithms to reclaim the
    space are poorly documented, and in practice tables don’t always purge themselves
    when we need space. For now, every time we drop a table, we still have to worry
    about adding the `PURGE` clause.


    3.  *Tuning advisors:* The optimizer works great, Oracle’s performance monitoring
    tools work great, but the programs that suggest performance changes are rarely
    helpful. The advisors might work fine for simple problems, like adding an obvious
    index. But in my experience, the advisors are rarely helpful for complex problems.
    But as Oracle invests in their autonomous database, many of those automated performance
    processes ought to improve with each version. It’s worth re-evaluating the advisors
    when we upgrade.


    4.  *Version control:* As discussed in Chapter [2](#471418_2_En_2_Chapter.xhtml),
    we cannot fully automate version control. We can’t just willy-nilly change whatever
    we want in a development database and expect tools to magically copy it into production
    for us. Programming is still best done using version-controlled text files and
    manually checking the conflicts.


    Remember that standardization is a prerequisite for automation. If we have a perfectly
    standard environment, some of the preceding items might work fine. If we have
    a completely-out-of-control environment, we may have a hard time even automating
    tasks like patching.


    Some things are just best done the old-fashioned way. But some things change over
    time. Hopefully most of the items in the preceding list will work perfectly in
    future versions of Oracle or in an autonomous Oracle database cloud environment.


    ## Avoid Cargo Cult Syntax


    Too much copy-and-paste programming can lead to cargo cult programming. Cargo
    cult programming is when we ritualistically include things in our code, even though
    we have no reason to believe those things will bring about the desired result,
    for example, changing `COUNT(*)` to `COUNT(1)`, changing `<>` to `!=`, the (incorrect)
    `NOLOGGING` hint, or any minor syntax change that is supposed to improve performance
    for no discernable reason.


    We’re all guilty of copying and pasting code we don’t understand. This book even
    occasionally advocates the use of weird syntax, such as using `ROWNUM` to control
    optimizer transformations. But we need to occasionally question what we’re copying
    and pasting. If these miraculous syntax changes are real, we should be able to
    measure them. If we can’t build a reproducible test case to demonstrate something,
    then we shouldn’t promote it.


    ## Avoid Undocumented Features


    Our code should not rely on undocumented or unsupported functionality. Oracle
    has interesting features just sitting around, gathering dust, but we must resist
    the urge to use something that we may regret later. Those undocumented features
    may be part of an optional component that will go away, or they may be an experimental
    feature that doesn’t work as expected.


    The most famous example of an undocumented feature is the `WM_CONCAT` function.
    `WM_CONCAT` was a string concatenation function, used internally as part of Workspace
    Manager. Before Oracle 11.2, there was no standard string concatenation function,
    and developers had to create their own. Many developers noticed that `WM_CONCAT`
    already existed and started using that function. Unfortunately, `WM_CONCAT` was
    dropped in version 12.1, breaking many queries and programs during upgrades.


    Many features are unofficially available in versions before they are documented.
    Maybe those features were experimental and too buggy or weren’t thoroughly tested
    yet. Either way, it is foolish to use undocumented features. There are arguably
    some exceptions to that rule; if we find a useful feature, and if we can easily
    test that the feature works, and if it’s only going to be used in temporary ad
    hoc scripts, then it might be fine to use that undocumented feature.


    We should also avoid undocumented parameters – the parameters that start with
    an underscore. Theoretically, we’re only supposed to set undocumented parameters
    if an Oracle support engineer tells us to. But in practice, we can read the My
    Oracle Support notes and usually figure out when an undocumented parameter is
    necessary. And it’s not like an Oracle support engineer is going to stop helping
    us as soon as they discover any hidden parameters. In practice, all databases
    have a few hidden parameters set.


    ## Avoid Deprecated Features


    We should avoid deprecated features. When Oracle discourages the use of certain
    features, we should heed their warning and switch to newer and better options.
    We should periodically check the “Database Upgrade Guide” for chapters full of
    newly deprecated and desupported features. Oracle usually keeps deprecated features
    around for a long time, but those features won’t be improved. The old versions
    will likely be buggier, less convenient, and slower than the new versions.


    For example, we can still use the old `EXP` and `IMP` utilities, but they’re not
    nearly as good as the new `EXPDP` and `IMPDP` utilities. Or we could still use
    many XML functions that were deprecated a long time ago, but they may run significantly
    slower than new XML functions.


    Do not confuse deprecated with desupported. Deprecated features still work fine
    and *might* be desupported in the next version. We should be cautious when using
    deprecated features, because we don’t want to tie our code to something that is
    going to break in the future. But we should also be skeptical of deprecation,
    because sometimes Oracle deprecates the cheap features to encourage us to buy
    the expensive features.


    ## Avoid Simplistic Explanations for Generic Errors


    Oracle has generic error messages that represent a large number of more specific
    errors. Using search engines to look up generic error messages doesn’t help, because
    each answer only covers one of the many possible root causes. We need to drill
    down to find the precise error message and all the relevant arguments and settings.
    There are several classes of these generic error messages: dead processes, deadlocks,
    and the top of the error stack.'
