  trans: '

    ### 手动创建与保存变更


    无论我们采用何种方式来操作受版本控制的文件，都应手动提交并验证这些文件。当我们推送变更或合并分支时，如果其他人也修改了相同的文件，我们可能再次遇到版本控制冲突。我们的工作是通过版本控制系统集成的，而非共享数据库。依赖版本控制虽然给我们的工作流程增加了一个步骤，但这个额外的付出是值得的，因为它支持并行开发。


    市面上有些产品试图分析我们的数据库并猜测变更，但我们应避免使用这些产品。自动化在**应用**变更方面表现卓越。但当涉及**构建**变更时，这些变更应该被精心手工打造。我们不能依赖一个程序来告诉我们如何编程——那是我们的职责。


    创建自动化的变更集极其困难。即使是 Oracle 的解决方案 `DBMS_METADATA_DIFF`，也做得不够好。该包可以提供一个不错的起点，但它不可避免地会产生大量冗余的垃圾代码。这些程序不理解我们的代码风格，也不关心结果是否美观。它们不明白对象在受版本控制的文本文件中也必须具备可读性。当然，这些程序通常也不是免费的。例如，`DBMS_METADATA_DIFF`
    需要 OEM 变更管理选项的许可证。


    最重要的是，这些自动化程序不知道我们不关心什么。它们会产生大量垃圾信息，淹没有用的特性，并且使得有意义的文件比较变得不可能。


    例如，以下代码创建了一个简单的表，然后要求 Oracle 为其生成数据定义语言（DDL）：


    ```

    create table test1 as select 1 a from dual;

    select dbms_metadata.get_ddl(''TABLE'', ''TEST1'') from dual;

    ```


    我们可能期望 Oracle 的输出与原始命令非常相似。然而，我们却得到了下面这串可怕的输出：


    ```

    CREATE TABLE "JHELLER"."TEST1"

    (    "A" NUMBER

    ) SEGMENT CREATION IMMEDIATE

    PCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS 255

    NOCOMPRESS LOGGING

    STORAGE(INITIAL 65536 NEXT 1048576 MINEXTENTS 1 MAXEXTENTS 2147483645

    PCTINCREASE 0 FREELISTS 1 FREELIST GROUPS 1

    BUFFER_POOL DEFAULT FLASH_CACHE DEFAULT CELL_FLASH_CACHE DEFAULT)

    TABLESPACE "USERS"

    ```


    前面的输出在技术上是正确的。但它遗漏了太多关键信息，又添加了太多无价值的内容。像 `DBMS_METADATA` 这样的程序提供了一个有用的起点，但输出需要大量清理。它的格式丑陋，包含不必要的双引号，还有许多本应始终基于默认值的设置。模式（schema）应在脚本的其他地方参数化并控制，例如使用
    `ALTER SESSION SET CURRENT_SCHEMA = SCHEMA_NAME` 这样的命令。表空间、段和存储选项等设置几乎总是应该使用默认值。


    当脚本看起来像前面这种自动化输出时，人们就不会去更新它们，尤其是初级开发人员——他们会因为害怕触碰那一团糟的代码而不敢动手。根本无法分辨那个 `CREATE
    TABLE` 命令中哪部分重要，哪部分不重要。


    有时我们确实想要编辑那些非常规选项。例如，如果我们有一个大型的只读表，通过指定 `PCTFREE 0` 可以节省 10% 的存储空间。但如果我们在前面的脚本中手动将数字
    10 改为 0，会有人注意到吗？


    版本控制是几乎所有开发环境中不可或缺的一部分，Oracle SQL 开发也不例外。我们的数据库模式必须真正存在于受版本控制的文本文件中。我们应该使用版本控制软件来管理差异，并创建一个社交化的编码平台。我们应该使用集成开发环境（IDE）来处理这些文件，但任何自动生成的对象都必须经过手工打磨。


    ## 赋能每个人


    使模式易于安装以及通过版本控制改进协作，是一个更大目标的一部分——即赋能团队中的每个人。任何人都不应需要请求许可、填写表格或等待他人，才能开始开发并试验我们的程序。本章提供了关于如何实现
    Oracle 模式民主化的具体想法，但实现相同目标的方式还有很多。仅凭技术无法打破严格的社会等级制度，也无法使我们的组织和项目更容易参与。


    本章仅仅触及了建立高效开发流程所需内容的皮毛。本书并非关于通用的软件开发生命周期方法论，但值得讨论几个倾向于在 Oracle 环境中滋生的社**会学问题**。Oracle
    的工作场所可以通过修复开发人员和管理员之间的权力失衡、提高透明度以及降低准入门槛而受益。


    ### 权力失衡


    数据库开发人员和数据库管理员之间常常存在权力失衡。Oracle 主要用于大型企业和政府机构，DBA 会从这些官僚机构中沾染一些坏习惯。对于 Oracle 数据库环境，通常存在一些不容协商的要求——数据库必须始终安全、必须始终可用、并且绝不能丢失数据。DBA
    可能会因为允许其中一项要求出现纰漏而被解雇，因此有时 DBA 必须坚持立场，告诉开发人员他们无法得到想要的东西。


    但管理员们应明智地记住，如果没有人能使用他们的数据库，那么这些数据库就毫无价值。DBA 可能保护了组织，但为组织创造价值的人们同样重要。


    **开发人员**：不要害怕要求 DBA 解释他们的决定。请记住，DBA 了解 Oracle 的架构和管理命令，但他们通常不懂 SQL 或 PL/SQL。DBA
    有不同的类型，了解你正在与哪种类型交谈很重要。例如，运维 DBA 可能不理解你的应用程序，甚至不知道你在使用哪个数据库。但应用 DBA 应该知道这些信息。


    **DBA**：当开发人员搞砸东西时，尤其是在较低的（开发/测试）环境中，不要生气。如果开发人员从不搞砸东西，例如，他们从不产生 `ORA-600` 错误，那说明他们还不够努力。开发人员必须比
    DBA 更多地从错误中学习，所以不要让他们的处境变得更糟。无论何时你对开发人员的请求说“不”，都要加上为什么不能这么做的解释。试着想出一个变通方案，尤其是对于权限问题。通过角色、对象权限、系统权限、代理用户和定义者权限程序，几乎总能找到变通方法。例如，如果开发人员要求拥有在生产环境终止会话的能力，你可能无法给他们
    `ALTER SYSTEM` 权限。但你可以创建一个 `SYS` 程序，该程序仅终止属于他们用户的会话，然后将该程序的执行权限授予该开发人员。


    ### 透明度


    透明度需要愿意犯错并感到尴尬。这是 Oracle 文化落后于软件行业其他领域的另一个方面。Oracle 公司历来行事隐秘，例如将其缺陷跟踪器隐藏在付费墙后、禁止基准测试以及反对开源。不要效仿他们的做法。让人们审视我们的系统。与所有人分享我们的代码仓库、项目计划、缺陷跟踪器和其他文档。有些人会利用我们的错误来攻击我们，有些人会发现令人尴尬的缺陷。但缺陷发现得越早，就越容易修复。根据林纳斯定律，“足够多的眼球，所有缺陷都浅显”。如果我们缩短反馈循环，就能快速失败并尽快修正错误。

    '
- fmt: '### Lower Barriers to Entry


    We must constantly look for ways to lower the barrier to entry for our systems
    – not just the programs we build but for all the surrounding knowledge. Large
    “enterprise” companies want to harvest our data, granularly control everything,
    and charge money up front. That strategy might work for large corporations selling
    to C-level executives, but it’s not a good idea for our projects. Put the documentation
    on a Wiki and let *anyone* modify *anything*. Use a version control system that
    makes forking software as easy as clicking the “fork” button. People may make
    annoying edits to our favorite page or use our software in the wrong way; that’s
    simply the price we pay for encouraging participation.


    ## Summary


    It’s worth spending time thinking about our development processes. Don’t simply
    follow what everyone else does – they may not know what they’re doing either.
    Many Oracle developers, DBAs, testers, and data analysts are only following a
    specific process because that’s the way it’s always been done. Oracle was invented
    in the twentieth century, but that doesn’t mean we have to code like it’s the
    twentieth century. We can find a way to make our resources appear infinite. We
    can make our programs trivial to install, modify, and share. And we can create
    a culture that fosters learning, experimentation, and teamwork. Now that our development
    environment is set up, we can move to the next chapter and discuss how to test
    what we build.


    # 3. Increase Confidence and Knowledge with Testing


    Testing is more than simply demonstrating a program is correct. We must constantly
    challenge ourselves to make ourselves better. Likewise, we must also challenge
    our programs and our ideas. Testing is how we bring science into our craft and
    replace guesses and myths with real knowledge about how the world works. Building
    good tests can take a lot of time and effort, and Oracle databases present unique
    challenges for building reproducible test cases. Luckily, Oracle provides many
    tools to help us test, such as SQL, PL/SQL, the data dictionary, dynamic performance
    views, and much more.


    ## Build Confidence with Automated Tests


    Automated testing requires a significant investment but is almost always worth
    the extra effort. After we decide to use automated testing, we must decide how
    to handle data and how to build the automated testing framework.


    ### Fix Bugs Faster


    Programming is hard and is full of ambiguous requirements, unexpected side effects,
    and regressions. Fully automated testing will obviously improve the quality of
    our programs. The surprising thing about automated testing is that the most important
    benefits are subtle and only indirectly related to quality.


    Less time fixing bugs is the first obvious, direct benefit. Testing is painful,
    and few of us enjoy doing it. We’re always looking for excuses to avoid it, and
    there are plenty of cognitive biases that help us ignore testing. Manual testing
    is easier than automated testing – if it’s only done once. We lie to ourselves
    and think, “We’ll only need to test this part once; after the code is working,
    we’ll never change it, so there’s no chance of it breaking again.” Or maybe testing
    is someone else’s job, and we think we don’t have to worry about it.


    When our assumptions about our superhuman programming ability are inevitably proven
    wrong, there is a large price to pay. Fixing bugs is orders of magnitude easier
    when we do it ourselves right after creating the bugs. The context is still fresh
    in our minds, and there’s no communication overhead. There’s no need to discuss
    errors with testers or log bugs in a tracking system or explain problems to management
    several times. Building an automated test system is in our own selfish interest,
    even if there is a separate testing team.


    ### Gain Confidence and Avoid Biases


    Automated testing gives us confidence in our programs. Not only can automated
    testing help us literally sleep better at night but it also frees us to make more
    changes.


    There are many horror stories about the unintended side effects of small programming
    changes. To avoid those nightmares, many programmers make only the smallest change
    possible. But to save time on expensive manual testing, programmers need to bundle
    changes together. With manual testing, every release is a compromise. Either we
    risk bugs by skimping on expensive testing, or our code doesn’t improve over time
    because we avoid changes.


    Automated testing completely changes how we release software. When running the
    full test suite is effortless, we don’t have to worry as much about making changes.
    The cost of each release decreases, and we can release more often. Don’t even
    think about saying the word “agile” until you have automated testing.


    With automated testing we can change whatever we want, whenever we want, for any
    reason we want. As long as the tests pass and fully cover everything, go for it.
    Nothing calls that private function anymore? Remove it. Wish that variable had
    a better name? Rename it. There’s this one package, and you just don’t like the
    cut of its jib? Change it. Constant, small amounts of refactoring will compound
    over time and pay off our technical debt.


    Automated testing also helps us avoid biases. Having a structured and standardized
    system for evaluating our programs makes lying to ourselves harder. When the deadline
    is looming and we’re working late at night, it’s awfully tempting to squint our
    eyes and say the results look good enough. It’s always possible to lie about the
    results, but it’s harder to ignore the poor quality of our code when we’re staring
    at a large “FAIL” message and the entire system stops working.


    ### Test-Driven Development


    Instead of being treated as a second-class citizen in the software development
    life cycle, we can promote testing to a prominent role through test-driven development.
    In test-driven development, the automated tests are created before we start adding
    features or fixing bugs. The test cases can become the primary form of the requirements.
    When the tests pass, the requirements are met, and our job is done.


    Test-driven development also helps us avoid our biases. The tests are the standards,
    and it’s best to define our goals before we start doing something. It can be irritating
    to start on an exciting new project and not be able to start coding immediately.
    But keep in mind that we’re going to get fatigued by the end of the project. If
    we save the testing for the end, we won’t define the criteria for success until
    we’re tired of the project and just want it to be over.


    However, automated testing is not always appropriate. Sometimes we just need to
    experiment, and we don’t know where our code will take us. Sometimes the task
    is a one-off or just isn’t that important. Sometimes, like for large data loads,
    the data is too dirty and ill-defined. If we don’t understand the project well
    enough yet, we don’t want to create a fake standard. Automated testing should
    be a practical tool, not a fanatic ideal.'
  raw: '### Lower Barriers to Entry


    We must constantly look for ways to lower the barrier to entry for our systems
    – not just the programs we build but for all the surrounding knowledge. Large
    “enterprise” companies want to harvest our data, granularly control everything,
    and charge money up front. That strategy might work for large corporations selling
    to C-level executives, but it’s not a good idea for our projects. Put the documentation
    on a Wiki and let *anyone* modify *anything*. Use a version control system that
    makes forking software as easy as clicking the “fork” button. People may make
    annoying edits to our favorite page or use our software in the wrong way; that’s
    simply the price we pay for encouraging participation.


