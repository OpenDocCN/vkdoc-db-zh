- fmt: '### Expanding Views


    In theory, views are a wonderful tool for improving our code. “Don’t repeat yourself”
    is perhaps the most important programming rule, and views can help us follow that
    rule. In practice, views often become a mess. Too many SQL developers don’t follow
    common programming advice, like using meaningful names, indenting, adding comments,
    etc. We must treat SQL, and especially views, as miniature programs.


    One of the most annoying problems with views is when they become deeply nested.
    Nesting *inline* views is great, because each step is simple and we can easily
    see and debug the entire statement. Nesting regular views is often different,
    especially when the views are large and poorly built.


    Oracle provides tools like `DBMS_UTILITY.EXPAND_SQL_TEXT` to help us expand our
    views and view all of the code at once. The following code demonstrates creating
    a nested view and expanding the view to show all the code at once:


    ```

    --Create nested views and expand them.

    create or replace view view1 as select 1 a, 2 b from dual;

    create or replace view view2 as select a from view1;

    declare

    v_output clob;

    begin

    dbms_utility.expand_sql_text(''select * from view2'', v_output);

    dbms_output.put_line(v_output);

    end;

    /

    ```


    Unfortunately, the output from the preceding anonymous block looks horrible. The
    following results are technically correct but almost unreadable:


    ```

    SELECT "A1"."A" "A" FROM  (SELECT "A2"."A" "A" FROM  (SELECT 1 "A",2 "B" FROM
    "SYS"."DUAL" "A3") "A2") "A1"

    ```


    The preceding mess is why some organizations have guidelines to not nest views
    more than one level deep. Another potential issue with nesting views is performance.
    Oracle has many ways to rewrite and transform our SQL. When we reference a huge
    view, but only use a small part of it, Oracle may be able to avoid running the
    unnecessary parts – but not always. It’s difficult to tell exactly when Oracle
    can throw out the unnecessary parts of views. If we’re constantly using large
    views, only for one small piece, we’re going to run into performance problems.


    Don’t let the preceding problems prevent you from using views. With the right
    features, styles, and discipline, we can build impressive systems with views.
    For example, if we combine views and `INSTEAD OF` triggers, we can create an abstraction
    layer that can be simpler than our tables and isolated from data model changes.


    ## Users


    Oracle users serve two purposes – they are a schema^([^(26)](#fn26)) that contains
    objects, and they are an account that can log on to the database. Many SQL developers
    are given an account by a more privileged user and never consider user management.
    But to create an efficient database development process, we need to be comfortable
    with creating, altering, and dropping user accounts. The advice in this section
    is for developers creating application accounts, not for DBAs creating user accounts.


    Creating users can be simple – all we need is a username and a password. But we
    should put more thought into user management, or we will regret it later. Every
    organization struggles with passwords, and Oracle has multiple mechanisms to ease
    our password pains. Instead of sharing application passwords with developers,
    we can grant proxy access that lets a user connect to another account with their
    personal password. For example, `ALTER USER APP_USER GRANT CONNECT THROUGH YOUR_USER`
    would let you log in to the application account with the username `YOUR_USER[APP_USER]`
    and your personal password. The odd syntax is a small price to pay for not having
    to share and change application passwords. And since 18c, we can use LDAP authentication
    for our Oracle user. Or if nobody ever needs to log in as the application user,
    since 18c, we can create the application account with the option `NO AUTHENTICATION`
    and not have to worry about password management at all.


    Our application user passwords need to be long and complicated. There are many
    password verification functions out there, so we might as well generate a password
    that will satisfy them all. Always combine multiple lowercase and uppercase characters,
    numbers, and a few special characters. And use the full 30 bytes. Oracle’s password
    hashing algorithms are often insecure, and having a longer password will at least
    make the hashes harder to crack.


    Applications should also have a non-default profile. Profiles are used to limit
    user connections, require periodic password changes, etc. Even if we don’t care
    about the security implications and just want infinite connections and unlimited
    password lifetimes, we still need to worry about the profiles. Most databases
    use a default profile that limits the concurrent sessions and expires the password.
    If we don’t choose the right profile, our application may break when the activity
    increases or when the password expires. Since 21c, profiles allow us to create
    a gradual password rollover time. If our environment has a large number of applications
    and connections, being able to temporarily use the old and new passwords at the
    same time can greatly simplify password changes.


    Ideally, the only time we ever need to worry about tablespaces is when we create
    a user. Applications should have their own tablespace or at least not share the
    default `USERS` tablespace with other accounts. The `USERS` tablespace tends to
    fill up from ad hoc SQL statements, and we don’t want a full `USERS` tablespace
    to break our application. In addition to setting a default tablespace, application
    schemas also need quota for that tablespace, usually through `QUOTA UNLIMITED
    ON TABLESPACE_NAME`.


    The following command is an example of how we may want to create an application
    or application user account:


    ```

    --Create an application user account.

    create user application_user

    identified by "ridiculouslyLongPW52733042#$%^"

    --Schema account option:

    --  account lock

    --18c schema account option:

    --  no authentication

    profile application_profile

    default tablespace my_application_tablespace

    quota unlimited on my_application_tablespace;

    ```


    We’re getting close to database administration, which is not the topic of this
    book. But SQL developers should be involved with creating, altering, and dropping
    application accounts.


    We should be careful, but not scared, of dropping accounts – at least in our sandbox
    environments. Other than production, we don’t often perform maintenance on application
    accounts, which means those non-production accounts get full of junk and should
    be frequently dropped and recreated. The process was described in Chapter [2](#471418_2_En_2_Chapter.xhtml)
    and begins with the following command. Even though this is a nonworking sample
    command, I have intentionally commented it out. Dangerous commands need an extra
