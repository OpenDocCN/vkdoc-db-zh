    The most important tables in the schema are `LAUNCH` and `SATELLITE`. Figure [1](#471418_2_En_BookFrontmatter_OnlinePDF.xhtml#Fig1)
    shows the columns and the simple relationship between these two tables. Any nonobvious
    columns will be explained before they are used in examples.


    ![](images/471418_2_En_BookFrontmatter_Fig1_HTML.jpg)


    2 tables are illustrated. The titles are Space dot launch, Space dot satellite.
    Each has a category of column and type. Satellite underscore F K connects two
