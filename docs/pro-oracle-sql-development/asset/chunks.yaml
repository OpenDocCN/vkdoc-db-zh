    # Part ILearn How to Learn


    # 1. Understand Relational Databases


    Understanding the history and theory behind relational databases helps us achieve
    a deeper understanding of Oracle SQL. This information helps us avoid repeating
    old mistakes, and it gives us the confidence needed to occasionally ignore the
    theory and build practical solutions. This book assumes you are already familiar
    with relational databases and SQL, so the information provided here is not merely
    *introductory;* it is *foundational*.'
