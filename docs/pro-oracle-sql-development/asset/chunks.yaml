- fmt: '# SQL Style Guide Cheat Sheet


    Follow these style tips to write clear, powerful SQL statements. This simple list
    summarizes the programming style recommendations made throughout this book. There
    are exceptions to every rule, but we should still know what the rules are and
    why the rules exist:


    1.  Use inline views: Build large SQL statements out of small, independent pieces
    with simple relational interfaces.


    2.  Use ANSI join syntax: Build SQL statements in an orderly fashion by adding
    and joining one table at a time.


    3.  Adhere to the relational model: Use dumb columns and dumb tables to create
    smart schemas. Never store lists of values in a column and never use the wrong
    data type.


    4.  Choose good names: Avoid unnecessary abbreviations and aliases. Complexity
    is measured in words, not characters.


    5.  Use comments and whitespace: Important constructs like inline views deserve
    extra comments, lines, and indenting.


    6.  Use left alignment, tabs, and lowercase: Learn to quickly write code that
    emphasizes the boundaries between important elements like inline views, not the
    trivial boundaries between keywords.


    7.  Create large SQL statements: One large query is often better than two small
    queries.


    8.  Use dynamic SQL: Use SQL more often and keep the code readable by combining
    dynamic SQL with multiline strings, alternative quoting syntax, templating, and
    bind variables.


    9.  Maintain a single source of truth: The golden copy of our code should exist
    in a version-controlled text file, not a database.


    10. Build MCVE test cases: Build minimal, complete, verifiable examples to test
    ourselves and share our knowledge.


    11. Use SQL worksheets: Create an organized collection of worksheets that contain
    powerful SQL statements. Use a format that leverages IDE features.


    12. Learn and use advanced features: SQL is much more than `SELECT * FROM EMPLOYEES`.
    Learn advanced `SELECT`, `DML`, and `DDL` features to make our SQL statements
    more powerful, simpler, and faster.


    # Computer Science Topics


    You don’t need a computer science degree to apply the practical advice in this
    book and become a better SQL developer. For database developers it can be useful
    to branch out in different directions and learn about other languages, system
    architecture, project management, etc. But a deeper understanding of database
    processing can also help your career and create interesting opportunities. Use
    the following list to explore the theoretical foundations of many of the topics
    in this book:


    1.  Relational model and relational algebra: Normalization and denormalization
    (OLTP and data warehouse), set theory (thinking about SQL), and ACID (Oracle architecture)


    2.  Programming language paradigms: Declarative (SQL, XQuery), imperative (PL/SQL,
    `MODEL`), functional (SQL), object-oriented (object-relational PL/SQL), visual
    (query builders), literate, aspect-oriented (triggers), and metaprogramming (dynamic
    SQL, data dictionary, conditional compilation)


    3.  Algorithms: Searching (index traversal vs. full table scan), sorting (join,
    grouping, and order by clause), hashing (join, grouping, cluster, and partitioning),
    number of distinct values approximation (quickly calculate and aggregate NDV statistics),
    and joining (hash, sort-merge, nested loops)


    4.  Runtime analysis: Algorithm analysis worst cases – `1/N` (batching), `1` (ideal
    hash partitions/clusters/joins), `LOG(N)` (B-tree index access), `1/((1-P)+P/N)`
    (Amdahl’s law), `N` (full table scan, bad hashing), `N*LOG(N)` (sorting, joining,
    iterating index access, gathering statistics), `N^2` (cross join, nested loops),
    `N!` (join order), and `∞` (satisficing the halting problem for the optimizer)


    5.  Data structures: B-tree (index), bitmap (index), hash table (joining, grouping,
    distinct, cluster), bloom filter (hash join), array (nested table, varray), record
    (PL/SQL record, type objects, collections), object (type objects), key value and
    graph (NoSQL databases), immutable and blockchain (tables)


    6.  Automata theory: Formal languages (is SQL a programming language, elementary
    cellular automata, regular expression limitations), lexing and parsing (advanced
    dynamic SQL language problems), Backus–Naur form (syntax diagrams), and compiler
    construction (optimizer transformations, hints, pragmas)


    7.  Discrete math: Boolean logic (conditions), De Morgan’s law (compound conditions),
    combinatorics (join order), and Venn diagrams (joins)


    8.  Information theory: Randomness (`SAMPLE`, `DBMS_RANDOM`), compression (table
    and index compression), and cryptography (Oracle’s weak password hashes)


    9.  Data science: Machine learning, data mining, unstructured data


    10. Operating system theory: Processes (parallelism), resource allocation (deadlocks,
    MVCC row-level locking), and I/O (memory and caching)'
