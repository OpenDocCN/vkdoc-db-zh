- fmt: "### How to Deploy Often?\n\nCreating and maintaining database deployment scripts\
    \ is not magic. It does not even require twenty-first-century technologies. Text\
    \ files and `SQL*Plus` are almost always good enough. But the most important ingredient\
    \ is discipline.\n\nThere are many products that claim to automate database deployments.\
    \ But this is one of those areas where we should ignore automated tools and build\
    \ it ourselves, using the simple programs that Oracle already provides. Many automated\
    \ deployment programs are either database agnostic or assume a shared server model.\n\
    \nThere’s nothing inherently wrong with being database agnostic. Clearly, many\
    \ frameworks and programs benefit from working with a large number of databases.\
    \ But managing and deploying schema objects requires an intimate knowledge of\
    \ a database. Most deployment automation tools focus on quantity over quality.\
    \ Those tools don’t fully understand Oracle SQL and force us into using a simpler\
    \ “standard SQL,” which makes it difficult to take advantage of Oracle’s unique\
    \ capabilities. If we paid for Oracle, we should get to use all of its features.\n\
    \nMany database deployment tools assume the obsolete shared database model. Do\
    \ not be fooled; there is no way to be agile if everybody shares the same development\
    \ server. Slightly improving our shared database deployments is not good enough,\
    \ and we should not settle for less. Technologies like cloning, data pump, export/import,\
    \ flashback database, transportable tablespaces, and replication are clearly useful.\
    \ But those technologies should not be at the heart of our deployment process.\n\
    \nThis leaves us with `SQL*Plus`. That program is showing its age in many ways,\
    \ and it is a bad choice for tasks like programming and ad hoc querying, as discussed\
    \ in Chapter [5](#471418_2_En_5_Chapter.xhtml). But `SQL*Plus` is the lingua franca\
    \ of Oracle scripts. It’s not a full shell language, it’s not an integrated development\
    \ environment, and it’s not particularly good at ad hoc querying. But `SQL*Plus`\
    \ hits a sweet spot between those tasks. It’s free, easy to configure, already\
    \ installed, and platform independent. (Oracle has a new command line tool named\
    \ `SQLcl`, but as discussed in Chapter [5](#471418_2_En_5_Chapter.xhtml), I don’t\
    \ recommend using it yet.)\n\n### SQL*Plus Installation Scripts\n\nThe following\
    \ is a high-level outline of database installation scripts:\n\n1.  Comments: purpose,\
    \ example, prerequisites, etc.\n2.  `SQL*Plus` settings and start message.\n3.\
    \  Check prerequisites.\n4.  Drop old schemas.\n5.  Call install script for each\
    \ schema:\n    1.  Start message.\n    2.  Create user.\n    3.  Call one or more\
    \ files per object type.\n    4.  End message.\n6.  Grant to roles.\n7.  Validate\
    \ the schemas and print end message.\n\nDon’t try to do everything in one file.\
    \ Treat the installation file like we would any program, and create lots of small,\
    \ reusable parts. The top-level install script should be relatively small and\
    \ should be mostly comments and calls to other scripts, such as `@schema1/packages/install_package_specs.sql`.\n\
    \nThere are a lot of tricky details that will take time to get right. The scripts\
    \ must grow along with our program. Creating installation scripts is not a task\
    \ we can leave until the end of the project.\n\nYou don’t need to read the entire\
    \ *SQL*Plus User’s Guide and Reference*, but you should at least scan through\
    \ the commands in the table of contents. I won’t try to repeat the whole user\
    \ guide here, but the following paragraphs describe the important parts.\n\n####\
    \ Comments\n\nComments at the beginning of the script are often overlooked. It’s\
    \ important to add details about the program and how to use it. As an example,\
    \ look at many of the `readme.md` files on GitHub. The most successful projects\
    \ almost always have meaningful documentation to help people quickly get started.\n\
    \n#### SQL*Plus Settings and Messages\n\nThere are lots of `SQL*Plus` settings\
    \ we can use to precisely control how the commands are run and displayed. The\
    \ installation script should show enough details to help us troubleshoot mistakes,\
    \ but not so many details that it’s difficult to find the real problem. Common\
    \ settings are `SET DEFINE ON|OFF` (enable or disable considering ampersands to\
    \ be substitution variables), `SET VERIFY ON|OFF` (show the substitution variable\
    \ changes), `SET FEEDBACK ON|OFF` (show messages like “x rows created”), `SET\
    \ SERVEROUTPUT ON|OFF` (show `DBMS_OUTPUT`), `PROMPT TEXT` (display a message),\
    \ and `DEFINE VARIABLE = &1` (set variables, possibly to the value of input parameters\
    \ by using `&NUMBER`).\n\nTwo important and underused `SQL*Plus` settings are\
    \ `WHENEVER SQLERROR EXIT FAILURE` and `WHENEVER OSERROR EXIT FAILURE`. Do not\
    \ sweep installation errors under the rug. It’s often safer to immediately stop\
    \ the entire installation as soon as anything goes wrong instead of trying to\
    \ troubleshoot a half-broken installation days later. When we make a mistake,\
    \ we should at least try to make it obvious.\n\nThe preceding script outline contains\
    \ lots of messages. The messages can be generated from `PROMPT`, `DBMS_OUTPUT.PUT_LINE`,\
    \ or a `SELECT` statement. It can be difficult to tell exactly where a script\
    \ fails, so those messages are important for troubleshooting. It may also help\
    \ to use `SET ERRORLOGGING ON` to catch errors.\n\n#### Check Prerequisites\n\n\
    We may need to limit the program to specific platforms or editions, check for\
    \ sufficient tablespace, etc. Whenever the program hits an error because of a\
    \ configuration problem, we should add a check for that problem in the prerequisites\
    \ section. If `SQL*Plus` is set to exit on errors, we can stop the installation\
    \ as soon as a missing prerequisite is found, with a PL/SQL statement like `RAISE_APPLICATION_ERROR(-20000,\
    \ 'Prerequisite X failed...')`.\n\n#### Drop Old Schemas\n\nIt may look scary\
    \ at first, but it’s important to frequently drop the schemas. To be safe, we\
    \ may want to put the drop commands in a separate script with a scary file name,\
    \ to ensure it’s never run on the wrong environment. During development, our schemas\
    \ get cluttered with unnecessary junk. And sometimes we may add an object to our\
    \ schema but forget to add the object to the scripts. It’s better to clean up\
    \ the schemas and catch missing objects as soon as possible. Dropping and recreating\
    \ schemas will force us to become disciplined and build cleaner code.\n\n####\
    \ Scripts for Object Types\n\nEach schema’s install script is where the real work\
    \ happens. It’s important to have separate install scripts for each object type.\
    \ Some objects, like tables, can be grouped together in a single file. Other objects,\
    \ like packages, procedures, and functions, should have a separate file for each.\
    \ Those separate files allow our code editors to easily read and write to the\
    \ file during development. Splitting the install script by object types also allows\
    \ us to avoid most dependency issues. For example, `install_schema1_tables.sql`\
    \ should run before `install_schema1_package_specs.sql`. Separating the scripts\
    \ also allows them to be called in different contexts. For example, the packages,\
    \ procedures, and functions will be called by both the installation and the patch\
    \ scripts.\n\n#### Grant to Roles\n\nBuild a script to grant to roles from the\
    \ beginning of the project, even if we don’t think we’ll need it. Roles are one\
    \ of those things we always forget, especially when we drop and recreate an object.\
    \ Build a single script that always grants everything to the appropriate roles\
    \ and call the script during every installation and every patch, just in case.\
    \ There’s a good chance that every project will eventually need a read or read–write\
    \ role for important schemas."
