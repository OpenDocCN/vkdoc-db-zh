  trans: '

    ### 连接操作


    希望你还记得第 1 章中的维恩图和连接图，它们解释了连接操作在逻辑上是如何工作的。遗憾的是，理解连接操作在物理层面上如何工作则更为复杂。图 16-10 直观展示了主要的连接算法及其运行时复杂度。该图将连接操作可视化为两个无序列表之间的行匹配过程。每种连接算法在图后也有单独段落描述。你可能需要来回翻阅几次才能完全理解这些算法。


    ![](img/471418_2_En_16_Fig10_HTML.png)


    展示了全表扫描嵌套循环、索引访问嵌套循环、全表扫描排序合并以及哈希连接算法的图示及其时间复杂度。


    图 16-10


    连接算法与时间复杂度可视化


    全表扫描嵌套循环 (`N²`) 在概念上很简单。从第一张表开始，将其每一行与第二张表的每一行进行比较。我们可以将此算法视为两个嵌套的 `FOR` 循环。每个循环运行
    `N` 次，因此运行时复杂度是非常慢的 `O(N²)`。回顾图 16-9，`N²` 的线条看起来几乎是完全垂直的。这种连接算法只应在表非常小、优化器统计信息不佳或缺少重要索引时使用。


    索引访问嵌套循环 (`N*LOG(N)`) 通常是更快的连接选择。对于每一行，我们不是搜索整个表，而是搜索索引。将复杂度从 `O(N²)` 降低到 `O(N*LOG(N))`
    是一个巨大的改进。


    但要充分利用此算法，更精确地定义变量会有所帮助。我们不用 `N` 来表示任一表的行数，假设我们读取每一行的第一张表有 `A` 行，我们通过索引读取的第二张表有
    `B` 行。如果我们思考 `O(A*LOG(B))`，步骤数主要取决于 `A` 而不是 `B`。较小的表应放在前面，较大的表应放在后面。例如，如果一张表有一百行，另一张表有一百万行，`100
    * LOG(1,000,000) = 600` 远小于 `1,000,000 * LOG(100) = 2,000,000`。Oracle 选择正确的算法还不够——它还必须知道如何在算法中使用这些表。


    如果两张表都很大，这种连接算法效率不高。当其中一张表的行数较少，且另一张表有索引访问时，嵌套循环效果最佳。


    全表扫描排序合并连接 (`2*N*LOG(N)+N`) 的操作方式是先对两张表进行排序（开销较大），然后匹配已排序的行（开销较小）。在实践中，我们不常看到排序合并连接——对于小规模连接，带索引访问的嵌套循环是更好的选择；对于大规模连接，哈希连接是更好的选择。但是，如果没有相关索引（排除了嵌套循环），并且没有相等条件（排除了哈希连接），那么排序合并就是剩下的最佳选择。而且，如果其中一张表已经通过索引预排序，那么一半的排序工作已经完成。


    哈希连接 (`2*N`) 分为两个阶段。读取较小的表并构建哈希表（理想情况下在内存中）。然后扫描较大的表，并在哈希表中为较大表的每一行进行探测。在完美的哈希情况下，写入和读取哈希表只需一步，运行时仅为
    `O(2*N)`。但在实践中会发生冲突，多行可能存储在同一个哈希桶中，因此执行哈希连接的时间并非线性增长；哈希连接的时间复杂度介于 `O(2*N)` 和 `O(N*LOG(N))`
    之间。^(³⁶)


    哈希连接具有良好的运行时复杂度，但这并不意味着我们总是想使用它们。即使我们只打算匹配少数行，哈希连接也会读取两张表的所有行。哈希连接需要大量内存或临时表空间——大约等于较小输入表的大小。内存中的慢算法可能比磁盘上的快算法更好。而且哈希连接并不总是可用，因为它们只适用于相等条件。


    前面提到的连接算法有许多变体。交叉连接，也称为笛卡尔积，类似于全表扫描嵌套循环。并行化和分区总会使算法复杂化。哈希连接可以使用布隆过滤器来排除值，而无需完全比较所有值。连接是数据库中最重要的操作，这里的篇幅不足以描述连接表的所有特性。


    连接性能完全取决于 Oracle 正确估计表的大小。表大小决定了使用哪些算法以及表在算法中如何使用。例如，如果其中一张表返回零行，那么哈希和排序就是糟糕的想法——当中间数据结构不会被使用时，就不需要所有这些准备工作。而对于两张都有大量匹配行的巨大表来说，嵌套循环是一个糟糕的主意。当
    Oracle 误以为小表很大或大表很小时，就会产生糟糕的执行计划。这种错误如何发生以及如何修复，将在第 17 章和第 18 章中讨论。


    ### 全局索引与本地索引


    分区对于表和索引的优缺点是不同的。对表进行分区通常是一个不错的选择，因为有很多潜在的性能提升，而成本很少。索引可以是全局的（一个索引对应整张表），也可以是本地的（每个分区一个索引）。与表分区相比，索引分区的收益较小，而成本更大。


    从单个表分区读取（而不是全表扫描）可以显著降低运行时复杂度，从 `O(N)` 降至 `O(N/P)`，其中 `P` 是分区数量。但从本地索引读取（而不是全局索引），运行时复杂度仅从
    `O(LOG(N))` 变为 `O(LOG(N/P))`。这种索引访问的改进几乎察觉不到。


    读取整个分区表（无分区剪枝）的成本仍然是正常的 `O(N)`。但在没有分区剪枝的情况下，从本地索引读取比从全局索引读取要昂贵得多。读取一个大型索引是 `O(LOG(N))`。读取多个小型索引是
    `O(P*LOG(N/P))`，这是一个显著的增加。遍历一棵大树比遍历多棵小树快得多。我们需要仔细考虑何时进行分区，并且不应期望表和索引分区以相同的方式工作。

    '
- fmt: '### Gathering Optimizer Statistics


    Gathering optimizer statistics is an essential task for achieving good SQL performance.
    Statistics are used to estimate cardinality, the number of rows returned by an
    operation. Cardinality is synonymous with “input size,” the X axis on most of
    the graphs in this chapter. Cardinality is vital information for making execution
    plan decisions, such as knowing when to use a nested loop or a hash join.


    ### The Challenge of Cardinality Estimation


    To get good execution plans, we need to gather statistics periodically and after
    any significant data changes. But gathering statistics itself can be slow. Understanding
    the different algorithms and data structures for gathering statistics can help
    us avoid performance problems.


    Finding the cardinality isn’t just about counting the number of rows in each table.
    Oracle also needs to measure the distinctness of columns and specific column values.
    For example, an equality condition on a primary key column will never return more
    than one row, so it is a good candidate for index access. But an equality condition
    on a repetitive status column is more complicated; some statuses may be rare and
    benefit from index access; other statuses may be common and work best with a full
    table scan. Optimizer statistics gathering needs to generate information that
    can be used to estimate the cardinality for many complicated scenarios.


    ### Approximate Counting with Hashing


    Counting distinct items is similar to sorting, which is a slow operation. To make
    things even worse, Oracle needs statistics for all the columns in a table, which
    may require multiple passes. A naïve algorithm to count distinct values would
    first sort those values; it’s easy to measure distinctness if the values are in
    order. But that naïve approach would take `O(N*LOG(N))` time. A better algorithm
    would use hashing, and that’s exactly what recent versions of Oracle can do with
    the `HASH GROUP BY` and `HASH UNIQUE` operations. As with joining, the time to
    hash is somewhere between `O(N)` and `O(N*LOG(N))`.


    Luckily, when gathering optimizer statistics, we can trade accuracy for time.
    The default Oracle statistics gathering algorithm performs an *approximate* count
    with a single pass of the table. The single-pass algorithm runs in `O(N)` time
    and generates numbers that are accurate but not perfect.


    Developers rightfully worry about imperfect values. A single wrong bit can break
    everything. But in this case an approximate value is good enough. The optimizer
    doesn’t need to know the *exact* value. Oracle only needs to know if the algorithm
    needs to be optimized for “large” or “small” queries.


    The following example shows how close the approximation is, using the function
    `APPROX_COUNT_DISTINCT`, which uses the same algorithm as statistics gathering:


    ```sql

    --Compare APPROX_COUNT_DISTINCT with a regular COUNT.

    select

    approx_count_distinct(launch_date) approx_distinct,

    count(distinct launch_date)        exact_distinct

    from launch;

    APPROX_DISTINCT  EXACT_DISTINCT

    ---------------  --------------

    61745           60401

    ```


    ### The Pitfall of Sampling


    The fast approximation algorithm^([^(37)](#fn37)) only works if we read the entire
    table. If we try to sample a small part of the table, the approximation algorithm
    no longer applies, and Oracle has to use a different approach. We may think we’re
    clever setting a small estimate percentage, such as `DBMS_STATS.GATHER_TABLE_STATS(...,
    ESTIMATE_PERCENT => 50)`. But in this case, a slow algorithm reading 50% of the
    table is slower and less accurate than the fast algorithm reading 100% of the
    table. We should rarely, if ever, change the `ESTIMATE_PERCENT` parameter.


    ### Incremental Statistics for Partitions


    These distinct counting tricks can also apply to partition statistics, using a
    feature called incremental statistics. Normally, partitioned tables require reading
    the table data twice to gather statistics: one pass for each partition and another
    pass for the entire table. The double read may seem excessive at first, but consider
    that we cannot simply add distinct counts together.


    But incremental statistics uses an approximation algorithm that does enable adding
    distinct counts. Incremental statistics creates small data structures called synopses,
    which contain information about the distinctness within a partition. After gathering
    statistics for each partition, the global statistics can be inferred by merging
    those small synopses. This algorithm improves statistics gathering from `O(2*N)`
    to `O(N)`. That decrease may not sound impressive, but remember that partitioned
    tables are often huge. Saving an extra full table scan on our largest tables can
    be a big deal.


    ### Conclusion: Statistics Are Foundational


    This algorithm analysis is starting to get recursively ridiculous. We’re discussing
    algorithms that help Oracle determine which algorithms to use. And the problem
    goes deeper – in rare cases, statistics gathering is slow because the optimizer
    chooses a bad plan for the statistics gathering query. For those rare cases, we
    may need to prime the pump; we can use `DBMS_STATS.SET_TABLE_STATS` to create
    initial, fake statistics, to help us gather the real statistics.


    Many organizations consider statistics gathering a boring maintenance task that
    is best handled by the DBAs. But that metadata is at the heart of Oracle performance,
    and it should be understood by anyone who is responsible for our database program’s
    performance.'
