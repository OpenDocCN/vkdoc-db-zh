    # SQL 调优


    提示远不止前面列表中的那些。几乎所有提示都有一个`NO_*`版本，其效果相反。甚至还有未公开的提示，它们足够有用，值得考虑使用。`CARDINALITY`和`OPT_ESTIMATE`可以硬编码或调整内联视图或操作的行数估算，对于优化器不易估算的对象（如
    PL/SQL 表函数）特别有用。这些提示是自动 SQL 调优顾问创建的 SQL 配置文件在内部使用的。


    `MATERIALIZE`提示强制 Oracle 将公共表表达式的结果存储在临时表中，而不是重新运行子查询。Oracle 会自动决定是否具体化公共表表达式，但有时
    Oracle 会做出错误的选择。当其他方法都无效时，这些未公开的提示可能很有用。


    正确使用提示需要练习和耐心。如果提示语法无效或无法使用，Oracle 不会抛出错误。相反，Oracle 会简单地忽略该提示及其后的所有提示。在 19c 中，我们可以在`DBMS_XPLAN`包中使用`FORMAT=>''+HINT_REPORT''`来帮助理解使用了哪些提示。下一节将展示一个在创建
    SQL 配置文件时使用提示的快速示例。


    ## SQL 配置文件示例


    本节演示一个最糟糕的 SQL 调优案例；我们需要应用提示来修复执行计划，但我们无权更改查询。SQL 计划基线、大纲和 SQL 调优顾问可以保留、演进和修复一些问题，但很难让这些工具完全按照我们的意愿行事。通过手动创建
    SQL 配置文件，我们可以精确注入所需的提示。


    例如，想象我们有一个应用程序，它错误地决定在启用并行的情况下运行所有查询。过度的并行查询正在严重影响性能，需要立即禁用。我们无法轻易更改应用程序，但需要立即更改执行计划。以下是不良查询和执行计划的示例：


    ```

    --不应并行运行的查询。

    explain plan for select /*+parallel(2)*/ * from satellite;

    select * from table(dbms_xplan.display(format => ''basic +note''));

    Plan hash value: 3822448874


    | Id  | Operation            | Name      |


    |   0 | SELECT STATEMENT     |           |

    |   1 |  PX COORDINATOR      |           |

    |   2 |   PX SEND QC (RANDOM)| :TQ10000  |

    |   3 |    PX BLOCK ITERATOR |           |

    |   4 |     TABLE ACCESS FULL| SATELLITE |


    Note


    - Degree of Parallelism is 2 because of hint

    ```


    以下代码创建一个 SQL 配置文件，在查询中插入一个`NO_PARALLEL`提示。SQL 配置文件通常由 SQL 调优顾问创建。不幸的是，SQL 调优顾问并不总是确切知道我们想要做什么。自己按照我们想要的方式精确创建配置文件很有帮助：


    ```

    --创建 SQL 配置文件以在单个查询中停止并行。

    begin

    dbms_sqltune.import_sql_profile

    (

    sql_text    => ''select /*+parallel(2)*/ * from satellite'',

    name        => ''STOP_PARALLELISM'',

    force_match => true,

    profile     => sqlprof_attr(''no_parallel'')

    );

    end;

    /

    ```


    运行前面的 PL/SQL 块后，如果我们重新运行相同的`EXPLAIN PLAN`和`DBMS_XPLAN`命令，我们将看到新的执行计划如下：


    ```

    Plan hash value: 2552139662


    | Id  | Operation         | Name      |


    |   0 | SELECT STATEMENT  |           |

    |   1 |  TABLE ACCESS FULL| SATELLITE |


    Note


    - Degree of Parallelism is 1 because of hint

    - SQL profile "STOP_PARALLELISM" used for this statement

    ```


    新的配置文件出现在“Note”部分，执行计划不再使用并行。此技术可应用于任何提示组合。SQL 配置文件很棒，但不是解决性能问题的理想方式。我们必须记住将配置文件部署到所有数据库。而且如果查询有任何变化，即使是一个额外的空格，配置文件也将不再匹配该查询。


    ## SQL 调优：收集优化器统计信息


    在任何更改了大部分数据的进程之后，应手动收集优化器统计信息。对于增量数据更改，优化器统计信息应由默认的自动任务自动收集。


    请花一分钟重读上一段；大多数性能问题都是由于没有遵循这个简单的建议造成的。太多的开发人员忽略收集统计信息——也许因为他们认为“收集统计信息是 DBA 的工作”。太多的
    DBA 搞砸了自动统计信息收集，也许因为他们 10 年前遇到了一个错误，并认为他们仍然可以创建一个比 Oracle 更好的作业。


    ### 手动统计信息


    没有良好的统计信息，优化器无法正常运行。如果一个表在加载或更改后将参与查询，我们必须立即收集统计信息。大型表更改后应调用`DBMS_STATS.GATHER_TABLE_STATS`。


    什么是“大型”表更改没有完美的定义。对于优化器来说，百分比比绝对数字更重要。向只有 1 行的表添加 100 行比向已经有 10 亿行的表添加 10 亿行更重要。对于全局临时表，几乎任何更改都可能被认为是大型更改，因为这些表一开始是空的。


    应使用`DBMS_STATS`包来收集统计信息——不要使用已半弃用的`ANALYZE`命令。`DBMS_STATS`中最重要的函数是`GATHER_TABLE_STATS`和`GATHER_SCHEMA_STATS`。这些函数有大量参数，熟悉其中大部分是值得的。以下列表包括必需和最重要的参数：


    1.  `ownname`/`tabname`：方案所有者和表名。

    2.  `estimate_percent`：要采样的数据量。我们几乎总是希望保持此参数不变。默认收集 100%，但使用快速、近似不同值数量的算法。对于不需要精确统计信息的超大表，使用像`0.01`这样的微小值可能很有帮助。

    3.  `degree`：并行度。此参数可以显著提高收集大型对象统计信息的性能。统计信息收集的某些部分（例如直方图）不会因并行而改善。对于极端的统计信息收集性能，我们可能需要研究并发性。

    4.  `Cascade`：是否也收集相关索引的统计信息？默认为`TRUE`。^(⁴⁶)

    5.  `no_invalidate`：默认情况下，统计信息不一定应用于所有现有执行计划。使许多计划失效可能会导致性能问题，因此失效是随着时间的推移逐渐完成的。默认值为`TRUE`，但在实践中，大多数依赖的执行计划会立即失效。但是，如果我们想确保我们的统计信息立即生效，我们可能希望将此参数设置为`FALSE`。

    6.  `method_opt`：确定要收集哪些直方图。默认情况下，直方图是为数据分布不均匀的列创建的，并且这些列也必须在查询的相关条件中使用过。


    有几种情况统计信息是作为其他操作的副作用收集的，我们不需要重复收集。加载表数据时可以自动收集统计信息，因此如果我们的执行计划中有`OPTIMIZER STATISTICS
    GATHERING`操作，那么我们可能不需要手动重新收集统计信息。创建或重建索引会自动收集索引统计信息，因此使用`CASCADE=>FALSE`参数我们可能可以节省大量时间。

    '
- fmt: '## Part VSolve Anything with Oracle SQL


    ## 19. Solve Challenging Problems with Arcane SQL Features


    It’s time to discuss the most advanced Oracle features, the features that solve
    problems most developers think are impossible to solve in a database.


    We need to be cautious before using these obscure technologies. Just because we
    *can* use a feature does not mean we *should* use it. Half of the features in
    this chapter I’ve only used for code golf to solve a ridiculous challenge. The
    other half I’ve used in real-world systems, where a rare SQL feature saved the
    day. Before we briefly describe Oracle’s most arcane features, we need to honestly
    evaluate the costs and benefits of building so much logic in our databases.


    ### Automatic Statistics


    By default, Oracle creates scheduler jobs to automatically gather statistics.
    These scheduler jobs are created by AutoTasks, which can be monitored from the
    data dictionary view `DBA_AUTOTASK_*`. By default, the AutoTask runs every night
    and gathers statistics on all tables that were changed by more than 10%.


    There are many times when performance problems magically disappear because of
    automatic statistics collection. On the other hand, there are also rare times
    when performance problems magically appear – sometimes gathering better statistics
    leads to a worse execution plan. Even when performance problems disappear, it
    is useful to understand why. We can track the statistics collection history through
    columns like `DBA_TABLES.LAST_ANALYZED` and the data dictionary view `DBA_OPTSTAT_OPERATIONS`.


    The statistics job should be working preventively and gathering statistics before
    problems happen. But we cannot rely on that job to solve all of our problems.
    We still need to manually gather statistics. Performance cannot always wait for
    the nightly stats job.


    If we encounter problems with the default AutoTask, we can set preferences to
    help the job work better. For example, if a large table is taking too long, we
    can set the table preference to gather statistics in parallel:


    ```sql

    --Gather optimizer statistics in parallel.

    begin

    dbms_stats.set_table_prefs(user, ''TEST1'', ''DEGREE'', 8);

    end;

    /

    ```


    We can set preferences for all of the `GATHER_TABLE_STATS` parameters. There are
    other available preferences, such as `INCREMENTAL` (a special algorithm for partitioned
    tables) and `STALE_PERCENTAGE` (the percentage of rows that must be modified to
    trigger gathering, which defaults to 10%). If we’re having problems automatically
    gathering statistics, we should first work with the preferences before we create
    our own manual job.


    Finally, if our table change patterns are just too weird for automatic statistics
    gathering, we can use `DBMS_STATS.LOCK_TABLE_STATS` to stop statistics gathering
    for individual tables. When the time is right, we can manually gather statistics
    by using the `FORCE => TRUE` option.


    ### Other Statistics


    There are many weird types of statistics, to match our weird data. The `ASSOCIATE
    STATISTICS` command lets us associate custom selectivity and costs with schema
    objects like functions. `DBMS_STATS` contains self-explanatory functions that
    let us `GATHER_FIXED_OBJECTS_STATS` and `GATHER_DICTIONARY_STATS`, which can improve
    the performance of data dictionary queries. We can even create fake statistics
    using `DBMS_STATS.SET_*` functions.


    `Dynamic sampling` is automatically used when statistics are missing or for parallel
    statements that run long enough to justify spending more time gathering statistics.
    The optimizer has a hard enough time figuring out declarative cardinalities; it
    doesn’t even try to estimate the cardinality of table functions or object types.
    For procedural code, the optimizer always guesses 8168 rows. We can use dynamic
    sampling to generate better estimates, as shown in the following code:


    ```sql

    --Dynamic sampling to estimate object types.

    explain plan for

    select /*+dynamic_sampling(2) */ column_value

    from table(sys.odcinumberlist(1,2,3));

    select * from table(dbms_xplan.display(format => ''basic +rows +note''));

    Plan hash value: 1748000095


    | Id  | Operation                             | Name | Rows  |


    |   0 | SELECT STATEMENT                      |      |     3 |

    |   1 |  COLLECTION ITERATOR CONSTRUCTOR FETCH|      |     3 |


    Note


    - dynamic statistics used: dynamic sampling (level=2)

    ```


    The preceding results show a perfect cardinality estimate due to dynamic sampling.
    When dynamic sampling doesn’t work, either because it’s too slow or because the
    estimate is bad, we may need to hard-code an estimate with the undocumented `CARDINALITY`
    hint.


    `Extended statistics` let the optimizer capture information about expressions
    or relationships between columns. For example, in the table `ENGINE_PROPELLANT`
    there is a strong correlation between the columns `PROPELLANT_ID` and `OXIDIZER_OR_FUEL`.
    Propellants are almost always used exclusively as either an oxidizer or a fuel.


    If we query the table with two conditions, `PROPELLANT_ID = 1` and `OXIDIZER_OR_FUEL
    = ''fuel''`, the optimizer incorrectly thinks that both conditions reduce the
    number of rows. That faulty assumption will incorrectly shrink the cardinality
    estimates. We can tell the optimizer about this relationship and get more accurate
    cardinality estimates, by using the following code to create extended statistics:


    ```sql

    --Extended statistics on ENGINE_PROPELLANT.

    select dbms_stats.create_extended_stats(

    ownname => sys_context(''userenv'', ''current_schema''),

    tabname => ''ENGINE_PROPELLANT'',

    extension => ''(PROPELLANT_ID,OXIDIZER_OR_FUEL)'')

    from dual;

    ```


    ### Summary


    Investigating performance problems and fixing them with cryptic hints is fun.
    But the most important performance tips are not found in SQL tuning guides. Performance
    is about having a good development and testing process that allows quick experiments,
    knowledge of advanced features and objects, and a style that makes SQL easier
    to understand and debug.


    When we tune SQL statements, we must remember to use actual numbers to find the
    slow statements, slow operations, and bad cardinalities. We need a breadth-first
    approach and the ability to use multiple tools to find the most relevant information
    quickly. Combining our knowledge of algorithmic complexity, cardinality, operations,
    transformations, and dynamic optimizations, we should have an idea of what a better
    execution plan could look like. There are many ways to fix execution plans, and
    we should strive to use the cleanest approach. Ideally, we can improve the optimizer
    statistics and solve the root causes of our problems.'
