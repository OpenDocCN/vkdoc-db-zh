  trans: '

    ## NOVALIDATE 与并行约束


    我们的示例模式中存在一些重复数据，但对于有 80 年历史的数据来说，这是可以理解的。我们无法总是修复不良数据，但至少可以防止更多不良数据产生。`NOVALIDATE`选项使约束可以忽略现有异常，并防止未来异常。


    `NOVALIDATE`选项在与唯一约束一起使用时有点棘手，因为唯一约束还必须与索引协同工作。要创建一个不那么唯一的唯一约束，我们必须首先创建一个非唯一索引。以下代码创建了一个非唯一索引，启用约束，忽略现有不良数据，并使用特定索引来维护该约束：


    ```sql

    --Create a non-unique index for the constraint.

    create index organization_temp_idx1

    on organization_temp(org_name, org_start_date, org_location)

    compress 2;

    --Enable NOVALIDATE the constraint, with a non-unique index.

    alter table organization_temp

    enable novalidate constraint organization_temp_uq

    using index organization_temp_idx1;

    ```


    `USING`子句以及禁用和验证约束也有助于提高性能。数据仓库通常通过移除约束和索引来提升数据加载性能。但在数据加载完成后，需要重新添加这些约束和索引。`USING`子句允许我们按照自己的方式创建索引，或许可以采用一些提升性能的选项，如压缩、并行和`NOLOGGING`。要并行地重新启用约束，我们必须先使用`DISABLE`创建它们，然后将`VALIDATE`作为一个单独的步骤执行。


    演示并行约束重新启用很困难，需要大量的设置工作。为了节省空间，创建大型`ORGANIZATION`表的准备工作仅在代码仓库中展示。假设我们已经创建了一个大表并加载了数据，现在我们想并行地重新添加约束。以下四个步骤展示了如何并行地重新启用约束：


    ```sql

    --Set the table to run in parallel.

    alter table organization_parallel parallel;

    --Create constraint but have it initially disabled.

    alter table organization_parallel

    add constraint organization_parallel_fk foreign key (parent_org_code)

    references organization_parallel(org_code) disable;

    --Validate constraint, which runs in parallel.

    alter table organization_parallel

    modify constraint organization_parallel_fk validate;

    --Change the table back to NOPARALLEL when done.

    alter table organization_parallel noparallel;

    ```


    并行运行约束可能看起来不常见，但这些步骤很重要，并且阐明了一个更重要的原则。根据阿姆达尔定律（Amdahl’s law，第 16 章讨论），如果我们打算并行化一个过程，我们需要并行化*所有*步骤。有许多数据仓库流程并行化并优化了显而易见的数据加载步骤，却将大部分时间花在串行地重建索引和重建约束上。Oracle
    提供所有这些奇特的约束特性是有原因的。不必费心去记忆约束语法——只需记住，对于约束性能问题，总有变通办法。


    ## 其他约束


    可以使用`WITH READ ONLY`约束创建视图，以防止它们作为可更新视图的一部分被更改。视图还有`WITH CHECK OPTION`约束，它允许可更新视图仅修改特定值。视图约束并不防止不良数据；它们只防止通过视图创建不良数据。正如第
    8 章所讨论的，可更新视图很复杂，应谨慎使用。


    Oracle 约束仅限于在单个表内强制执行规则，或在两个表之间用于引用完整性约束。我们应尽可能使用约束而不是触发器，但约束无法比较多个表。希望未来版本的 Oracle
    会包含一个`ASSERT`命令，允许我们在单个语句中定义复杂的业务规则。目前，在后面的“物化视图”部分讨论了一个变通方法。


    本书侧重于实际解决方案，但本节使用了大量奇怪的代码来演示晦涩的功能。其他不寻常的约束特性已在前面的章节中讨论过，例如级联删除和可延迟约束。约束是少数值得深入讨论的领域之一。约束至关重要，我们需要尽可能保持数据的清洁。再次强调，如果你记不住所有语法也不必担心。重要的一点是，总有办法执行我们需要的数据规则。而且总有办法高效地执行这些规则。


    ## 索引


    索引是反映表数据的数据结构，但其组织方式旨在提高性能。Oracle 提供了多得离谱的索引选项，本节仅对它们进行简要讨论。在讨论这些选项之前，重要的是要对什么是索引以及索引如何工作有一个很好的理解。我们需要对索引有良好的理论理解，才能知道如何使用它们以及何时它们不起作用。许多数据库充斥着无用的索引，因为开发者认为索引会神奇地解决性能问题。许多数据库也因其索引缺少那一个微小的、能让索引变得有用的特性而饱受困扰。

    '
- fmt: '### Index Concepts


    To understand indexes, we must first think about searching for data. Let’s start
    with a simple children’s guessing game, where we have to find a number between
    1 and 8. The simplest way to search for the number is to start with 1, then guess
    2, then guess 3, etc. On average, using that linear search algorithm, it will
    take four guesses to find the number.


    Luckily, we all know a better way to play the guessing game – guess a number in
    the middle, ask if the number is lower or higher, and repeat. This binary search
    algorithm eliminates as many numbers as possible each time and narrows down the
    results quickly. We can visualize this binary search strategy with Figure [9-1](#471418_2_En_9_Chapter.xhtml#Fig1).
    The diagram is shaped like a tree, and at each branch of the tree, we must make
    a simple decision: go left if our guess is too high and go right if our guess
    is too low.


    ![images/471418_2_En_9_Chapter/471418_2_En_9_Fig1_HTML.png](images/471418_2_En_9_Chapter/471418_2_En_9_Fig1_HTML.png)


    The image of numbers from 1 to 8 in a line. The number 5 is encircled and linked
    to the numbers 5, 6, and 4 by a chain.

    Figure 9-1 A binary search to find the number 5


    Using the binary search algorithm, on average we can find the number in three
    guesses. So far, our binary search algorithm is only slightly better than our
    linear search algorithm: three guesses instead of four. The difference in the
    algorithms becomes more noticeable when we increase the size. If we double the
    number range to 16, the average number of linear search guesses also doubles,
    to eight. But the average number of binary search guesses only increases from
    three to four.


    Let’s scale up the example to our data set. Let’s say we want to find a launch,
    with the following query:


    ```sql

    select * from launch where launch_id = :n;

    ```


    The data is stored in a heap table, in no particular order. If we search through
    the table of 70,535 launches with a linear search, it will require an average
    of 35,268 comparisons. A binary search could find the row in at most 17 comparisons,
    since `2^17 = 131,072`, which is greater than 70,535. The principles of a children’s
    guessing game scale up nicely to help us quickly find real data.


    It is helpful to use a more mathematical explanation for what’s going on with
    our searching. When we count in binary, the powers-of-two exponentiation grows
    quickly. We probably understand binary growth intuitively; for example, we know
    that 32 bits allows for about four billion numbers: `2^32 = 4,294,967,296`. Binary
    searching works in reverse, and logarithms are the opposite of exponents. Therefore,
    we can say that a binary search of `N` rows requires approximately `LOG2(N)` comparisons.
    Compare that with a linear search on `N` rows, which requires approximately `N/2`
    comparisons. Those mathematical expressions will be useful for understanding indexes
    in just a minute.


    An index is a data structure that is similar to the binary tree displayed in Figure
    [9-1](#471418_2_En_9_Chapter.xhtml#Fig1). Of course, the actual index structure
    is more complicated than our example. Oracle’s default index uses a B-tree index;
    there’s a root branch block at the top, branch blocks in the middle, and leaf
    blocks at the bottom. Each block contains hundreds of values instead of just one.
    The leaf blocks don’t just contain the column value; they also contain a `ROWID`
    that references the table row, as well as pointers to the next and last leaf blocks
    in order. (The pointers are why Figure [9-1](#471418_2_En_9_Chapter.xhtml#Fig1)
    seems to have an extra row at the bottom – there is a lookup from the leaf block
    to a table block.) In practice, it’s extremely rare to have an index more than
    four levels deep. (We can count the height of an index using `DBA_INDEXES.BLEVEL+1`.)
    Also, real indexes have empty space for new values and may be unbalanced.


    We can learn a lot about indexes by combining the tree data structure in Figure
    [9-1](#471418_2_En_9_Chapter.xhtml#Fig1) with our simple algorithm for traversing
    the tree. The most important lesson is why index access is not always faster than
    a full table scan. For finding a single value, the number of comparisons is `LOG2(N)`
    for an index vs. `N/2` for a full table scan. For finding one value, the index
    is clearly the winner.


    But what if we’re looking for a value that exists in almost every row? Searching
    an index for every row means we need to walk the tree `N` times. Now the number
    of comparisons is `N*LOG2(N)` for the index vs. `N` for the full table scan. For
    finding all values, the full table scan is clearly the winner.


    Index access comparisons get even more complicated when we consider block access
    time. Storage systems can read a large amount of data more efficiently than they
    can read multiple small amounts of data. In the time it takes the system to read
    two index blocks, one at a time, the system may be able to read 64 blocks from
    a full table scan. A dumb multi-block read may be better than a smart single-block
    read.


    The clustering factor may also work against indexes. For example, let’s say we
    only need to scan 1% of an index. One percent sounds like a small number of searches,
    but that number is not the whole story. After we read the index blocks, we also
    need to access the table blocks. If the rows we need are randomly distributed,
    we may still need to read 100% of the table, one block at a time. `DBA_INDEXES.CLUSTERING_FACTOR`
    is a measure of how much the data is disordered. A good, low clustering factor
    means the values in one index block all refer to the same table block. A bad,
    high clustering factor means the rows in an index block are scattered all over
    the place.


    Indexes are perfect for accessing a small amount of data from a table. Indexes
    may be a bad choice for accessing a large amount of data from a table. It’s hard
    to know where the tipping point is and when an index isn’t worth it anymore. We
    need to consider how an index works, multi-block reads, and the clustering factor.'
