    1.  *SQL Language Reference* (2,271 pages): This is the most relevant book for
    SQL developers. Even though it’s incredibly large, it’s worth reading the entire
    thing eventually. I almost always have a browser tab open to this manual and will
    use the table of contents instead of a search engine.


    2.  *Database Concepts* (622 pages): This book explains how the database works.
    While the book is written for administrators, we should reference it whenever
    we’re curious about the inner workings of Oracle. For example, if we want to know
    “What exactly is REDO?” or “What do blocks look like?”, this book is a good place
    to start.


    3.  *PL/SQL Language Reference* (865 pages): It’s worth reading this entire book
    if you do PL/SQL programming. Even if you only write SQL statements, it’s useful
    to scan through this book, since SQL and PL/SQL are gradually merging into a single
    language. And there’s a decent chance that if you’re a SQL programmer today, you
    will become a PL/SQL programmer in the future.


    4.  *PL/SQL Packages* *and* *Types Reference* (4,894 pages): Nobody needs to read
    this entire, massive book. There are many archaic packages nobody will ever use.
    But there are also a few unexpected gems that will help you someday. And this
    book can be a good way to learn practical applications of Oracle features that
    are implemented through a PL/SQL API. It’s worth at least reading the description
    of every package.


    5.  *Database Reference* (2,664 pages): When we need information about a parameter,
    data dictionary view, or dynamic performance view, this is the place to look.


    6.  *SQL*Plus® User’s Guide and Reference* (392 pages): Even if you’re not doing
    much with SQL*Plus, you might want to at least look through the command reference
    list. There is a separate book for SQLcl, but the common, popular features are
    best described in the SQL*Plus documentation.


    7.  *Database New Features Guide* (50 pages): Scan through this guide to see what
    features you’re not taking advantage of or to justify upgrading.


    8.  *SQL Tuning Guide* (878 pages): Read this entire book if you do a lot of performance
    tuning. If you only have time for one chapter, read “Optimizer Statistics Concepts,”
    because optimizer statistics are the key to many performance issues.


    9.  *Data Warehousing Guide* (732 pages): This book is not just for data warehouses.
    Features like materialized views and the advanced querying techniques can be used
    in many contexts.


    10.  *VLDB and Partitioning Guide* (425 pages): Read this book if you plan to
    use partitioning or parallelism. This book is not just for “very large” databases
    – it can also help with medium-sized databases.


    11.  *Database Performance Tuning Guide* (396 pages): This book is for tuning
    the entire database, as opposed to tuning individual SQL statements. In practice,
    tuning the SQL statements will also fix most database performance issues, so this
    book is less important than the *SQL Tuning Guide*.


    The preceding list of books contains 14,189 pages of dense technical documentation.
    Reading it all would be ridiculous, but it’s important to at least be familiar
    with the first four books in the list. The answers to most of our programming
    questions about SQL syntax, concepts, and functions are in the documentation.


    We should also occasionally scan through the list of books. There may be a specific
    book we’ll need to read, depending on the technologies we’re using. For example,
    if we’re storing and processing a lot of JSON or XML data, there are several guides
    just for those data types.'
  trans: '

    ### 阅读手册


    Oracle 官方文档几乎总是我们获取 Oracle 数据库信息的最佳来源。这份文档非常详尽，有时甚至会让人望而生畏。令人沮丧的是，仅仅是为了了解 Oracle，就存在一条学习曲线。但一旦我们理解了如何浏览文档和阅读语法图，官方文档就将成为我们的主要信息源。


    Oracle 文档库从这个链接开始：`https://docs.oracle.com/en/database/oracle/oracle-database/index.html`。从这里，我们可以访问所有手册，甚至可以下载整套
    679MB 的书架。


    不幸的是，等到本书出版时，这个链接很可能已经失效了。Oracle 文档最大的问题就是链接经常变动。


    我们希望引用最新版本，但最新版本也是最有可能发生变动、导致链接失效的版本。对于像电子邮件这样的临时性信息，引用最新版本是可以的。对于像博客或 Stack Overflow
    帖子这样的长期信息，最好使用最近的长期版本。截至 2022 年，Oracle 19c 文档通常是最佳选择。虽然 21c 版本的文档也可用，但该版本是一个“创新发布版”，不提供长期支持，不会像长期版本那样流行，并且链接很可能再次发生变化。本书不会经常直接链接到手册，因为我们可以通过搜索书名和版本号轻松找到相关书籍。例如，我们可以搜索“Oracle
    SQL Language Reference 21c”。


    对于 Oracle 开发人员来说，以下是最有用的书籍，按重要性排序：


    1.  `SQL Language Reference` (2,271 页)：这是对 SQL 开发人员最相关的书籍。尽管它极其庞大，但最终通读全书是值得的。我几乎总是开着一个浏览器标签页显示这本手册，并且会使用目录而不是搜索引擎。


    2.  `Database Concepts` (622 页)：这本书解释了数据库的工作原理。虽然本书是为管理员编写的，但无论何时我们对 Oracle 的内部运作感到好奇，都应该参考它。例如，如果我们想知道“REDO
    到底是什么？”或“块是什么样子的？”，这本书就是一个很好的起点。


    3.  `PL/SQL Language Reference` (865 页)：如果你从事 PL/SQL 编程，通读整本书是值得的。即使你只编写 SQL 语句，浏览这本书也很有用，因为
    SQL 和 PL/SQL 正逐渐融合为一种语言。而且，如果你今天是一名 SQL 程序员，将来很可能成为一名 PL/SQL 程序员。


    4.  `PL/SQL Packages and Types Reference` (4,894 页)：没有人需要读完这本庞大的书。里面有许多没人会用的陈旧包。但也有一些意想不到的宝藏，将来某天会帮到你。这本书也是学习通过
    PL/SQL API 实现的 Oracle 功能实际应用的好方法。至少值得阅读每个包的描述。


    5.  `Database Reference` (2,664 页)：当我们需要关于某个参数、数据字典视图或动态性能视图的信息时，这就是查阅的地方。


    6.  `SQL*Plus® User’s Guide and Reference` (392 页)：即使你不怎么使用 `SQL*Plus`，你可能也想至少浏览一下命令参考列表。有一本单独的书是关于
    `SQLcl` 的，但那些常用、流行的功能在 `SQL*Plus` 文档中描述得最好。


    7.  `Database New Features Guide` (50 页)：浏览本指南，看看你尚未利用哪些功能，或者为升级寻找理由。


    8.  `SQL Tuning Guide` (878 页)：如果你经常进行性能调优，请通读本书。如果你只有一章的时间，请阅读“**优化程序统计信息概念**”，因为优化程序统计信息是许多性能问题的关键。


    9.  `Data Warehousing Guide` (732 页)：这本书不仅仅适用于数据仓库。像物化视图和高级查询技术这样的功能可以在许多场景中使用。


    10. `VLDB and Partitioning Guide` (425 页)：如果你打算使用分区或并行处理，请阅读本书。这本书不仅仅适用于“超大型”数据库——它也能帮助处理中等规模的数据库。


    11. `Database Performance Tuning Guide` (396 页)：这本书是针对整个数据库的调优，而不是针对单个 SQL 语句的调优。实际上，调优
    SQL 语句也能解决大多数数据库性能问题，因此这本书不如 `SQL Tuning Guide` 重要。


    前面列出的书籍包含了 14,189 页密集的技术文档。通读所有内容是荒谬的，但至少熟悉列表中的前四本书是重要的。我们大多数关于 SQL 语法、概念和函数的编程问题的答案都在文档中。


    我们还应该偶尔浏览一下这个书单。根据我们使用的技术，可能会有一本特定的书需要阅读。例如，如果我们存储和处理大量 JSON 或 XML 数据，就有好几本专门针对这些数据类型的指南。

    '
- fmt: '### The Manual Is Not Perfect


    #### 文档的局限性与价值


    官方文档并非完美无缺，但它是最准确、最详尽的可用资源。其中的语法图特别有帮助。这些图起初可能让人望而生畏，但一旦熟悉了它们，它们就是理解语法选项的完美方式。


    例如，数字文字格式有很多选项。用文字来解释这些选项很困难，但幸运的是，*SQL Language Reference* 使用了图 [4-1](#471418_2_En_4_Chapter.xhtml#Fig1)
    中所示的图示。


    ![](images/471418_2_En_4_Chapter/471418_2_En_4_Fig1_HTML.jpg)


    两个网络具有从左向右用箭头标记的流程。它包含数字框、小数点框、正负号、平行的大写和小写字母 f 和 d。


    图 4-1


    数字文字的语法。来自 SQL Language Reference，版权归 Oracle Corporation 所有


    上图包含了大多数开发者未曾意识到的惊人数量的特性。例如，以下都是有效的 Oracle 文字：


    ```sql

    select

    -.5,

    1.0e+10,

    5e-2,

    2f,

    3.5D

    from dual;

    ```


    这些图是 SQL 语言语法的绝佳可视化表示。此外，在手册中每张图片下方，都有一个指向文本描述的链接。那些文本描述对于理解 Oracle SQL 也很有用。这些描述类似于巴科斯范式（Backus–Naur
    form），这是一种形式化定义编程语言的方法。如果有必要，我们甚至可以将这些语法描述作为起点，重新创建完整的语言规范。详尽的语言描述有助于完成某些编程任务，例如构建解析器。


    以下是数字语法的描述。与图表相比，该描述对人类来说不那么容易阅读，但对程序来说更易读：


    ```text

    [ + | - ]

    { digit [ digit ]... [ . ] [ digit [ digit ]... ]

    | . digit [ digit ]...

    }

    [ [ e | E ] [ + | - ] digit [ digit ]... ] [ f | F | d | D ]

    ```


    #### 文档的不足之处


    但即使是手册也不完美。Oracle 手册并非我们必须全部遵从的圣典。例如，再看一下数字文字的语法图。注意“E”和“e”对于科学记数法似乎是可选的。根据该图，`1-1`
    与 `1e-1` 相同，但这在实践中显然不正确。


    #### 文档详尽性的利与弊


    Oracle 文档的详尽性有时可能适得其反。当我们只需要使用某个特性完成一个简单任务时，手册中的细节可能令人不知所措。例如，我经常忘记究竟如何创建调度程序作业。*PL/SQL
    Packages and Types Reference* 的 `DBMS_SCHEDULER` 章节包含了有关作业调度的每一个可能的细节。但我不可能每次想做简单的事情时，都去阅读
    131 页的文档。对于实用的、而非百科全书式的操作指南，我通常更喜欢 Tim Hall 的网站 `oracle-base.com`。随着你对 Oracle
    越来越熟悉，你会建立起自己信任的网站列表，而不是随意点击搜索结果的顶部链接。


    ### My Oracle Support


    #### 资源介绍与访问方式


    My Oracle Support，以前称为 Metalink，是每个 Oracle 开发人员都应该能够访问的优秀资源。该网站是 [`https://support.oracle.com`](https://support.oracle.com)。该网站位于付费墙之后，但我们不应该让这个障碍阻止我们。


    My Oracle Support 包含公共搜索引擎上无法获得的信息，特别是关于补丁和错误的信息。该网站上的帐户必须与有效的支持标识符相关联。如果我们询问办公室里的人，可以找到知道我们组织支持标识符的人，我们可以使用该标识符请求访问权限。或者，我们可以花几百美元购买
    Oracle Personal Edition；作为支持合同的一部分，我们将获得自己的支持标识符以及创建服务请求的能力。


    #### 重要工具：错误代码查询


    My Oracle Support 最重要的功能之一是“ORA-600/ORA-7445/ORA-700 错误查询工具”。在 My Oracle Support
    网站上，搜索 “ORA600 tool” 即可找到那个特殊页面。在该页面上，我们可以输入晦涩的 ORA-600 或 ORA-7445 错误的第一个参数，该工具通常会将我们带到相关的文章。大多数
    ORA-600 错误代码无法在搜索引擎上找到。


    #### 文档质量与服务请求


    My Oracle Support 上的文档通常包含问题描述、可能相关的错误列表、补丁和解决方法。虽然这些文档通常是准确的，但版本号往往过于乐观。如果网站上说“在版本
    X 中修复”，但问题在版本 X+1 中再次发生，请不要感到惊讶。


    创建服务请求是出了名的困难，我还没有找到什么神奇的技巧来获得好的帮助。遵循第 [3](#471418_2_En_3_Chapter.xhtml) 章中关于创建最小化、可验证且完整的示例的建议偶尔会有所帮助。但有时，无论我们的测试案例多么优秀，Oracle
    支持都会要求我们上传大量无关信息，直到我们放弃。我的建议是，除非绝对必要，否则不要费心创建服务请求。'
  raw: '### The Manual Is Not Perfect


    The official documentation is not perfect, but it’s the most accurate and thorough
    source available. The syntax diagrams are particularly helpful. The diagrams can
    be intimidating at first, but once we get used to them, they are the perfect way
    to understand the syntax options.


    For example, the numeric literal format has a lot of options. It’s hard to explain
    those options with words, but luckily the *SQL Language Reference* uses the picture
    shown in Figure [4-1](#471418_2_En_4_Chapter.xhtml#Fig1).


    ![](images/471418_2_En_4_Chapter/471418_2_En_4_Fig1_HTML.jpg)


    Two networks have the flow marked with arrows from left to right. It has digit
    boxes, point box, positive and negative charges, capital and small letters f and
    d in parallel.


    Figure 4-1


    The syntax for numeric literals. From the SQL Language Reference, copyright by
    Oracle Corporation


    The preceding diagram contains a surprising number of features that most developers
    aren’t aware of. For example, the following are all valid Oracle literals:


    ```

    select

    -.5,

    1.0e+10,

    5e-2,

    2f,

    3.5D

    from dual;

    ```


    The diagrams are a great visual representation of the SQL language syntax. In
    addition, underneath each image in the manual, there is a link to a text description.
    Those text descriptions are also useful for understanding Oracle SQL. The descriptions
    are similar to Backus–Naur form, which is a way to formally define a programming
    language. If necessary, we could even use the syntax descriptions as a starting
    point for recreating a full language specification. A thorough language description
    can help for certain programming tasks, such as building a parser.


    The following is the description for the number syntax. Compared with the diagram,
    the description is not as easy for humans to read. But it is easier for programs
    to read:


    ```

    [ + | - ]

    { digit [ digit ]... [ . ] [ digit [ digit ]... ]

    | . digit [ digit ]...

    }

    [ [ e | E ] [ + | - ] digit [ digit ]... ] [ f | F | d | D ]

    ```


    But even the manual is not perfect. The Oracle manual is not a holy text that
    we must all obey. For example, take another look at the syntax diagram for numeric
    literals. Notice how the “E” and “e” appear to be optional for scientific notation.
    According to the diagram, `1-1` is the same as `1e-1`, but that’s obviously not
    true in practice.


    The thoroughness of Oracle’s documentation can be counterproductive. When we only
    need to use a feature for one simple task, the details in the manual can be overwhelming.
    For example, I often forget exactly how to create scheduler jobs. The “`DBMS_SCHEDULER`”
    chapter of the *PL/SQL Packages and Types Reference* contains every possible detail
    about job scheduling. But I’m not going to read 131 pages of documentation every
    time I want to do something simple. For how-to guides that are practical instead
    of encyclopedic, I usually prefer Tim Hall’s website oracle-base.com. As you become
    more familiar with Oracle, you’ll build your own list of trustworthy websites,
    instead of randomly clicking the top search result.


    ### My Oracle Support


    My Oracle Support, previously known as Metalink, is an excellent resource that
    every Oracle developer should have access to. The website is [`https://support.oracle.com`](https://support.oracle.com).
    The site is behind a paywall, but we shouldn’t let that barrier stop us.


    My Oracle Support is full of information that is not available on public search
    engines, especially information about patches and bugs. Accounts on that website
    must be associated with a valid support identifier. If we ask around the office,
    we can find someone who knows our organization’s support identifier, and we can
    use that identifier to request access. Alternatively, we can buy Oracle Personal
    Edition for a few hundred bucks; as part of the support contract, we will get
    our own support identifier and the ability to create service requests.


    One of the most important features of My Oracle Support is the “ORA-600/ORA-7445/ORA-700
    Error Look-up Tool.” On the My Oracle Support website, search for “ORA600 tool”
    to find that special page. On that page we can enter the first argument of a cryptic
    ORA-600 or ORA-7445 error, and the tool will usually take us to a relevant article.
    Most ORA-600 error codes cannot be found on search engines.


    Documents on My Oracle Support frequently include descriptions of the problem,
    lists of possibly related bugs, patches, and workarounds. While those documents
    are usually accurate, the version numbers tend to be optimistic. Don’t be surprised
    if the website says, “Fixed in version X,” but the problem happens again in version
    X+1.


    Creating service requests is notoriously challenging, and I have not yet found
    some magic trick to get good help. Following the advice in Chapter [3](#471418_2_En_3_Chapter.xhtml)
    about creating a minimal, verifiable, and complete example can occasionally help.
    But sometimes, no matter how good our test case, Oracle Support will ask us to
    upload tons of irrelevant information until we give up. My advice is that you
    don’t bother creating a service request unless you absolutely need one.'
