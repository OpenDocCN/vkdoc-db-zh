  trans: '


    ### 不同的方法


    排查程序性能问题的方法有很多种。以下列表列举了性能调优的常用方法。每种方法在不同场景下各有优劣，如果一种方法不奏效，我们必须愿意快速切换。随着经验积累，我们会形成自己的调优风格，并培养出对问题的直觉。此外，技术随时间演变，因此我们也必须愿意调整自己的方法：

    1.  *应用程序/操作系统/硬件*：我们并非总得解决最直接的问题。改进系统中的一层可能就足以让另一层的问题消失。例如，如果我们无法修复某条语句的执行计划，或许可以通过提升硬件
    I/O 性能来弥补操作缓慢的问题。或者，我们可以通过将应用逻辑移入查询，或反之，将问题转移到不同层。但我们不能总指望用一层的修复来弥补另一层的性能不佳，而且这些解决方案可能既浪费又昂贵。本章不讨论非
    SQL 的方法。

    2.  *基数*：检查 SQL 语句中每个操作返回的行数，是衡量执行计划准确性的一种有效方法。此方法将在后续章节讨论。

    3.  *跟踪/性能剖析/采样*：Oracle 中执行的几乎所有活动实际上都被监控了。Oracle 可以通过跟踪捕获几乎每条 SQL 语句的几乎所有细节。Oracle
    可以通过性能剖析捕获每行 PL/SQL 代码所花费的时间。实践中，跟踪大多已被 Oracle 的采样框架取代，例如 `AWR`（自动工作量仓库）、`ASH`（活动会话历史）和
    `SQL 监控`。跟踪提供了海量数据，但使用不便。采样则提供了大量数据且易于访问。性能剖析和采样将在下一章讨论。

    4.  *算法分析*：比较不同选择的运行时复杂度，有助于我们理解 Oracle 做出的权衡与决策。此方法已在前一章讨论。

    5.  *求助他人*：有时我们需要承认遇到困难并向他人寻求帮助。这种方法可以像询问搜索引擎或同事一样简单。或者，我们可以创建服务请求，让 Oracle 帮我们调优。（但根据我的经验，除非我们确信遇到了错误，否则
    Oracle 支持在性能调优方面帮助不大。大多数支持工程师似乎对调优不感兴趣，会不断要求我们提供无关的跟踪文件，直到我们放弃。）或者，我们可以依赖 Oracle
    的自动顾问来推荐并实施性能修复。（但根据我的经验，Oracle 的顾问很少有帮助。希望未来的版本中这些顾问能有所改进。）本章不再进一步讨论此方法。

    6.  *避开问题*：运行某样东西最快的方法就是完全不运行它。当我们理解了自己的代码及其上下文时，常常会发现更简单的实现方式。这种方法依赖于使用良好的开发流程、理解
    Oracle 的高级功能以及采用恰当的 SQL 编程风格，以使代码含义更清晰易懂。本书第一、二和三部分讨论的主题可以解决我们的大多数性能问题。性能调优不能孤立地研究。如果你直接跳到了本书的第四部分，那么你错过了最重要的调优建议。像“使用内联视图和
    `ANSI SQL` 连接语法”这样的建议虽然与性能间接相关，但比本章讨论的任何内容都更重要。


    我们都有不同的偏好，一种方法不一定比另一种更好。我们常常可以运用某一项技术的专长来弥补另一项知识的不足。例如，本书采用了我偏好的技术：专注于单个 SQL 语句，而非着眼于整体资源利用率；如果我们照顾好了查询，数据库自然就会照顾好自己。诚然，这种方法并非总是有效，因此阅读不同来源、学习不同的调优风格是值得的。


    ### 为什么不谈数据库调优？


    数据库调优、性能规划、系统架构和配置都是重要话题，相关书籍汗牛充栋。你可能想知道为什么本书聚焦于 SQL 调优而非数据库调优。这不仅因为本书是关于 SQL
    的，更因为 SQL 是数据库的核心组件。调优 SQL 也将缓解数据库、操作系统、硬件、网络、`SAN` 等的压力。


    反过来的情况则可能性较小：用 SQL 的改进来弥补糟糕的硬件，比用硬件改进来弥补糟糕的 SQL 要容易。硬件改进往往是线性的，而 SQL 改进通常是指数级甚至更优的。Oracle
    提供了如此多的 SQL 调优机会，我们几乎总能找到让 SQL 运行更快的方法。


    许多系统如果 SQL 写得好，即使硬件老旧也能勉强运行。但如果我们的执行计划充满了糟糕的笛卡尔乘积，那就毫无希望了。除非我们能用上量子计算机，否则无法靠购买硬件来摆脱一个糟糕的算法。


    ## 声明式编程（为何执行计划很重要）


    在传统的命令式编程中，我们精确地告诉编译器如何操作，我们负责创建高效的算法和数据结构以实现良好性能。在声明式编程中，我们告诉编译器我们想要什么，然后由编译器尝试寻找最优的算法和数据结构。


    ### 声明式编程的怪癖


    SQL 是我们在 Oracle 中使用的声明式语言。我们请求 Oracle 修改或检索数据，而 Oracle 必须决定如何连接表、应用过滤器等。这种声明式环境带来了许多有趣的结果。


    例如，Oracle `SQL` 提供一致性，并试图让许多事情在同一时刻发生。以下 `SQL` 语句两次引用了 `SYSDATE`，它们总是返回相同的值：


    ```sql

    --在声明式 SQL 中，这些 SYSDATE 生成相同的值。

    select sysdate date1, sysdate date2 from dual;

    ```


    当我们在 `SQL` 语句中写 `SYSDATE` 时，我们是请求 Oracle 获取当前日期。当我们在 `PL/SQL` 中写 `SYSDATE` 时，我们是请求
    Oracle 将当前日期赋给一个变量。这个 `PL/SQL` 片段有较小的几率传入两个不同的值：`SOME_PROC(SYSDATE, SYSDATE)`。当我们在声明式和命令式世界之间切换时，可能会发生奇怪的事情。


    Oracle 运行我们代码某部分的次数可能比我们预期的多或少。`SELECT` 列表中的一个函数可能对每行被调用多次——可能有一次额外的执行是为了设置结果缓存。作为
    `DML` 语句一部分的函数或触发器可能被调用多次——Oracle 可能会重新启动语句的一部分以确保一致性。而且很多时候，Oracle 可能认为某些操作是不必要的，干脆不执行它，就像下面
    `EXISTS` 子句中的表达式：


    ```sql

    --表达式被忽略，不会引发除零错误。

    select * from dual where exists (select 1/0 from dual);

    ```


    在第 `15` 章，我们看到了假设 Oracle `SQL` 语句会按照我们编写的顺序运行的危险。如果我们的数据类型错误，例如在一个糟糕的 `EAV` 数据模型中，并且谓词执行顺序错误，我们可能会遇到运行时错误。但理解
    Oracle 的执行计划才是这个声明式与命令式讨论的主要意义所在。


    '
- fmt: '### Execution Plans


    Execution plans are the key to SQL tuning. An execution plan shows the precise
    order of operations used to execute a SQL statement, along with useful information
    that tells us how Oracle made its decisions. These operations and details tell
    us the algorithms and data structures used to run our queries. The Oracle optimizer
    generates execution plans based on the SQL statement, the objects related to the
    SQL statement, statistical information about our database environment, and much
    more.


    Execution plans are often confused with query plans or explain plans. The important
    difference is that an execution plan is the actual plan that was used by Oracle,
    while the explain plans are just the predicted plans that might be used by Oracle.
    The word “actual” is used a lot in the next two chapters because that’s the term
    Oracle uses to describe real numbers vs. estimates. For example, we’ll see later
    that “A-rows,” or “actual rows,” may be a wildly different number than “E-rows,”
    or “estimated rows.” It is crucial that we are always aware of whether we’re looking
    at actual plans and numbers or estimated plans and numbers, or we will waste an
    inordinate amount of time tuning things that aren’t worth tuning.


    SQL tuning is all about finding, understanding, and fixing execution plans. The
    many ways to find and fix plans are discussed in more detail in Chapter [18](#471418_2_En_18_Chapter.xhtml).
    To summarize, the best way to find and understand plans is as plain text and with
    the actual numbers instead of just estimates. And the best way to fix execution
    plans is indirectly, by providing more information so the Oracle optimizer can
    make better decisions.


    For example, the simplest way to generate an estimated explain plan is to start
    with the `EXPLAIN PLAN` command like this:


    ```

    --Generate explain plan.

    explain plan for

    select * from launch where launch_id = 1;

    ```


    The following command and results show the explain plan^([^(38)](#fn38)) for the
    preceding statement:


    ```

    --Display explain plan.

    select *

    from table(dbms_xplan.display(format => ''basic +rows +cost''));

    Plan hash value: 4075417019


    |Id|Operation                   |Name     |Rows |Cost (%CPU)|


    | 0|SELECT STATEMENT            |         |    1|    2   (0)|

    | 1| TABLE ACCESS BY INDEX ROWID|LAUNCH   |    1|    2   (0)|

    | 2|  INDEX UNIQUE SCAN         |LAUNCH_PK|    1|    1   (0)|


    ```


    You don’t have to understand everything in the preceding output yet. For now,
    it’s enough to understand how important execution plans are to understanding Oracle
    performance.


    ## Operations (What Execution Plan Decisions Are Available)


    Execution plans are the key to SQL tuning, and operations are the key to understanding
    execution plans. Many developers fail at SQL tuning because they focus on the
    wrong thing. It’s not good enough to know how long SQL statements run or how long
    SQL statements wait on a specific event. It’s more helpful to measure things per
    *operation* than per *statement*. You could argue that this chapter’s title is
    wrong – this chapter is more about “operation tuning” than “SQL tuning.”


    ### Operation Details


    Each line in an execution plan has one operation, which maps to one algorithm.
    The Name column in the execution plan tells us the data structure used by that
    algorithm.


    The precise algorithm depends on a combination of an operation name and an operation
    option. As of 19c, there are 149 operations and 259 operation options. Usually,
    a single operation only has a few valid options. For example, `HASH JOIN` is an
    operation, and `OUTER` is an operation option. For convenience these names are
    combined into `HASH JOIN OUTER` in most execution plan formats.


    The operations are indented to convey parent–child relationships. This indentation
    is tricky and takes a while to get used to, but it is vital information. Indentation
    tells us which algorithms are executed first and how the rows are passed between
    operations. Changing even a single space in the operation line can radically alter
    the meaning of an execution plan.


    ### Execution Plans and Recursive SQL


    Most operations consume rows, do something with those rows, and then produce new
    rows. For example, a hash join consumes rows from two different child sources,
    combines them, and then produces a joined set of data for a parent operation.
    That intermediate result set might then be joined with something else.


    The nested structure of an execution plan mirrors the way we should build SQL
    statements with small, nested, inline views. Just like building logical SQL statements,
    understanding an execution plan is about understanding small sets of operations,
    combining them into a new set, and repeating.


    But execution plans aren’t always that simple. There may be a significant amount
    of work not shown in the execution plan. Sometimes we have to tune a *recursive*
    SQL statement – a SQL statement that is automatically generated to support our
    SQL statement. Recursive SQL (not to be confused with recursive queries that use
    `CONNECT BY`) can be generated in many ways: custom PL/SQL functions with embedded
    SQL, triggers with SQL, metadata queries needed to parse the query or build the
    execution plan, remote objects handled by a remote database, etc. (But a view
    is not a recursive SQL statement. The query in a view will be added to our SQL
    statement as if we copied and pasted the text.)


    If we’re using advanced tuning tools like `DBMS_SQLTUNE.REPORT_SQL_MONITOR`, we
    can tell there’s slow recursive SQL if the “Activity (%)” values do not add up
    to 100%. Finding the slow recursive queries can be done by looking at views like
    `V$SQL` and is explained in the next chapter. Luckily, those recursive queries
    tend to stick out and are easy to catch when we know what to look for.


    ### Why Operations Matter


    To understand execution plans, we need to know what operations and operation options
    are available. As discussed in the previous chapter, different algorithms are
    optimal in different contexts. We need to know what the algorithms are and when
    they should be used.


    This section lists the most common operations and operation options and when they
    should be used. There are many guidelines, but we don’t always have precise instructions.
    For example, hash joins work well for a large amount of data, and nested loops
    work well for a small amount of data. But the precise definition of “large” and
    “small” depends on many factors.


    The science of SQL tuning is getting precise measurements and finding which operations
    are using the most time and which operations would work better. But we don’t always
    have time for science; the art of SQL tuning is much faster. Eventually you will
    be able to look at an execution plan and just know that an operation doesn’t belong.
    You’ve already been introduced to many of the operations listed in this chapter
    and been given advice for when they are useful. But there’s a lot of information,
    and it will take a while to build an intuition for bad execution plans.


    The operation names and options in this chapter were generated based on my experience,
    and the most popular combinations in the 350 databases I have access to. But this
    list is not comprehensive, and you will likely see different operations depending
    on what features you use.


    The following SQL statements can help you see what operations are used and available
    on your systems:


    ```

    --Recently used combinations of operations and options.

    select operation, options, count(*)

    from v$sql_plan

    group by operation, options

    order by operation, options;

    --All available Operation names and options.  (Run as SYS.)

    select * from sys.x$xplton;

    select * from sys.x$xpltoo;

    ```'
  raw: '### Execution Plans


    Execution plans are the key to SQL tuning. An execution plan shows the precise
    order of operations used to execute a SQL statement, along with useful information
    that tells us how Oracle made its decisions. These operations and details tell
    us the algorithms and data structures used to run our queries. The Oracle optimizer
    generates execution plans based on the SQL statement, the objects related to the
    SQL statement, statistical information about our database environment, and much
    more.


    Execution plans are often confused with query plans or explain plans. The important
    difference is that an execution plan is the actual plan that was used by Oracle,
    while the explain plans are just the predicted plans that might be used by Oracle.
    The word “actual” is used a lot in the next two chapters because that’s the term
    Oracle uses to describe real numbers vs. estimates. For example, we’ll see later
    that “A-rows,” or “actual rows,” may be a wildly different number than “E-rows,”
    or “estimated rows.” It is crucial that we are always aware of whether we’re looking
    at actual plans and numbers or estimated plans and numbers, or we will waste an
    inordinate amount of time tuning things that aren’t worth tuning.


    SQL tuning is all about finding, understanding, and fixing execution plans. The
    many ways to find and fix plans are discussed in more detail in Chapter [18](#471418_2_En_18_Chapter.xhtml).
    To summarize, the best way to find and understand plans is as plain text and with
    the actual numbers instead of just estimates. And the best way to fix execution
    plans is indirectly, by providing more information so the Oracle optimizer can
    make better decisions.


    For example, the simplest way to generate an estimated explain plan is to start
    with the `EXPLAIN PLAN` command like this:


    ```

    --Generate explain plan.

    explain plan for

    select * from launch where launch_id = 1;

    ```


    The following command and results show the explain plan^([^(38)](#fn38)) for the
    preceding statement:


    ```

    --Display explain plan.

    select *

    from table(dbms_xplan.display(format => ''basic +rows +cost''));

    Plan hash value: 4075417019


    |Id|Operation                   |Name     |Rows |Cost (%CPU)|


    | 0|SELECT STATEMENT            |         |    1|    2   (0)|

    | 1| TABLE ACCESS BY INDEX ROWID|LAUNCH   |    1|    2   (0)|

    | 2|  INDEX UNIQUE SCAN         |LAUNCH_PK|    1|    1   (0)|


    ```


    You don’t have to understand everything in the preceding output yet. For now,
    it’s enough to understand how important execution plans are to understanding Oracle
    performance.


    ## Operations (What Execution Plan Decisions Are Available)


    Execution plans are the key to SQL tuning, and operations are the key to understanding
    execution plans. Many developers fail at SQL tuning because they focus on the
    wrong thing. It’s not good enough to know how long SQL statements run or how long
    SQL statements wait on a specific event. It’s more helpful to measure things per
    *operation* than per *statement*. You could argue that this chapter’s title is
    wrong – this chapter is more about “operation tuning” than “SQL tuning.”


    ### Operation Details


    Each line in an execution plan has one operation, which maps to one algorithm.
    The Name column in the execution plan tells us the data structure used by that
    algorithm.


    The precise algorithm depends on a combination of an operation name and an operation
    option. As of 19c, there are 149 operations and 259 operation options. Usually,
    a single operation only has a few valid options. For example, `HASH JOIN` is an
    operation, and `OUTER` is an operation option. For convenience these names are
    combined into `HASH JOIN OUTER` in most execution plan formats.


    The operations are indented to convey parent–child relationships. This indentation
    is tricky and takes a while to get used to, but it is vital information. Indentation
    tells us which algorithms are executed first and how the rows are passed between
    operations. Changing even a single space in the operation line can radically alter
    the meaning of an execution plan.


    ### Execution Plans and Recursive SQL


    Most operations consume rows, do something with those rows, and then produce new
    rows. For example, a hash join consumes rows from two different child sources,
    combines them, and then produces a joined set of data for a parent operation.
    That intermediate result set might then be joined with something else.


    The nested structure of an execution plan mirrors the way we should build SQL
    statements with small, nested, inline views. Just like building logical SQL statements,
    understanding an execution plan is about understanding small sets of operations,
    combining them into a new set, and repeating.


    But execution plans aren’t always that simple. There may be a significant amount
    of work not shown in the execution plan. Sometimes we have to tune a *recursive*
    SQL statement – a SQL statement that is automatically generated to support our
    SQL statement. Recursive SQL (not to be confused with recursive queries that use
    `CONNECT BY`) can be generated in many ways: custom PL/SQL functions with embedded
    SQL, triggers with SQL, metadata queries needed to parse the query or build the
    execution plan, remote objects handled by a remote database, etc. (But a view
    is not a recursive SQL statement. The query in a view will be added to our SQL
    statement as if we copied and pasted the text.)


    If we’re using advanced tuning tools like `DBMS_SQLTUNE.REPORT_SQL_MONITOR`, we
    can tell there’s slow recursive SQL if the “Activity (%)” values do not add up
    to 100%. Finding the slow recursive queries can be done by looking at views like
    `V$SQL` and is explained in the next chapter. Luckily, those recursive queries
    tend to stick out and are easy to catch when we know what to look for.


    ### Why Operations Matter


    To understand execution plans, we need to know what operations and operation options
    are available. As discussed in the previous chapter, different algorithms are
    optimal in different contexts. We need to know what the algorithms are and when
    they should be used.


    This section lists the most common operations and operation options and when they
    should be used. There are many guidelines, but we don’t always have precise instructions.
    For example, hash joins work well for a large amount of data, and nested loops
    work well for a small amount of data. But the precise definition of “large” and
    “small” depends on many factors.


    The science of SQL tuning is getting precise measurements and finding which operations
    are using the most time and which operations would work better. But we don’t always
    have time for science; the art of SQL tuning is much faster. Eventually you will
    be able to look at an execution plan and just know that an operation doesn’t belong.
    You’ve already been introduced to many of the operations listed in this chapter
    and been given advice for when they are useful. But there’s a lot of information,
    and it will take a while to build an intuition for bad execution plans.


    The operation names and options in this chapter were generated based on my experience,
    and the most popular combinations in the 350 databases I have access to. But this
    list is not comprehensive, and you will likely see different operations depending
    on what features you use.


    The following SQL statements can help you see what operations are used and available
    on your systems:


    ```

    --Recently used combinations of operations and options.

    select operation, options, count(*)

    from v$sql_plan

    group by operation, options

    order by operation, options;

    --All available Operation names and options.  (Run as SYS.)

