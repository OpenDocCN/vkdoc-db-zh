    `FOR` 循环。


    获得这些酷炫特性所需付出的代价是复杂的语法。每次我使用 `MODEL`，都不得不重新阅读《数据仓库指南》中“*SQL 建模*”章节的部分内容。


    这个特性最好用一个非现实的例子来演示。让我们用 SQL 构建一个细胞自动机。细胞自动机是一个由细胞组成的网格，每个细胞都有开或关的状态。在初始状态之后，所有细胞都根据一组简单的规则重新创建。新状态基于一个细胞邻居的状态。如果你玩过康威的“生命游戏”，那你以前就见过细胞自动机了。细胞自动机有趣的地方在于，极其简单的规则如何能产生复杂的行为。


    为了尽可能简单，我们将使用一个初等细胞自动机，它被表示为一个一维数组。数组中的细胞每一代都会根据左边细胞、自身和右边细胞的状态发生变化。


    图 19-1 展示了我们将在 SQL 中构建的细胞自动机。


    ![](img/471418_2_En_19_Fig1_HTML.png)


    规则 18 和 110 的两个三角形初等细胞自动机图像。


    图 19-1


    由 `MODEL` 子句创建的初等细胞自动机


    在 SQL 中创建图 19-1 中的细胞自动机是一个四步过程。第一步是创建一个二维数据数组。第二步是 `MODEL` 发挥魔力的地方，我们遍历这个二维数组，并根据状态和规则填充值。第三步是一个简单的聚合操作，将每个数组转换为一个字符串。最后，我们需要将结果复制粘贴到文本编辑器中，并缩小视图以查看结果：


    ```

    --使用 MODEL 的细胞自动机。开为 "#"，关为 " "。

    --#3：聚合状态以生成图片。

    select listagg(state, '''') within group (order by cell) line

    from

    (

    --#2：使用 MODEL 应用细胞自动机规则。

    select generation, cell, state from

    (

    --#1：初始的、基本为空的数组。

    select generation, cell,

    --在中心用 "#" 播种第一代。

    case

    when generation=0 and cell=120 then ''#''

    else '' ''

    end state

    from

    (select level-1 generation from dual connect by level <= 100),

    (select level-1 cell from dual connect by level <= 201)

    )

    model

    dimension by (generation, cell)

    measures (state)

    rules

    iterate(100)

    (

    state[iteration_number+1, any] =

    case

    state[cv()-1, cv()-1] || --左邻居

    state[cv()-1, cv()  ] || --自身

    state[cv()-1, cv()+1]    --右邻居

    --when ''###'' then ''#''

    when ''## '' then ''#''

    when ''# #'' then ''#''

    --when ''#  '' then ''#''

    when ''  ##'' then ''#''

    when ''  # '' then ''#''

    when '' #'' then ''#''

    --when ''   '' then ''#''

    else ''''

    end

    )

    )

    group by generation

    order by generation;

    ```


    第一步，创建一个空的数组，足够简单。这一步创建了一个数据表，每个值都有一个唯一的 `GENERATION` 和 `CELL` 坐标。第一步可以通过两次使用
    `CONNECT BY LEVEL` 技巧然后交叉连接结果来完成。你可能想要高亮并运行第一个内联视图，以理解这个复杂查询是如何开始的。


    第二步是关键步骤，在这里使用了 `MODEL` 子句。我们使用 `DIMENSION BY (GENERATION, CELL)` 创建一个二维数组。然后我们使用
    `MEASURES (STATE)` 定义一个度量，即要计算的状态。在 `RULES` 子句中，我们读取和写入状态。


    我们希望改变除第 0 代（具有初始状态）之外的所有细胞的状态：`STATE[GENERATION >= 1, ANY] =`。规则的左侧使用方括号进行数组访问，包含限制维度的条件，并使用了
    `ANY` 关键字。右侧引用了数组三次——分别对应左父细胞、中间父细胞和右父细胞。例如，引用左父细胞的状态是 `STATE[CV()-1, CV()-1]`。`CV()`
    函数获取当前值，然后我们减去一来获取父代以及左边的细胞。状态使用井号表示“开”，空格表示“关”，并且为了启用一组特定的规则，八条规则被注释掉了。


    细胞自动机看起来很酷，但并不常用。`MODEL` 子句更实际的例子会复制电子表格逻辑，例如解决库存计算或创建贷款摊销计划。我只在几次实际查询中使用过 `MODEL`
    子句，用于解决像传递闭包这样的图问题。Oracle SQL 绝对不是查询图的最佳语言。然而，由于我的数据已经存在于数据库中，使用 `MODEL` 比在系统中添加另一个工具要容易得多。


    如果我们曾想过“这个编程问题不可能用纯 SQL 解决”，我们应该尝试一下 `MODEL` 子句。'
- fmt: '## Row Pattern Matching


    Row pattern matching is a powerful way to find patterns in our data. The `REGEXP`
    functions enable searching for regular expressions within a single value. Analytic
    functions can be used to find simple row patterns, like consecutive or non-consecutive
    values. The `MATCH_RECOGNIZE` clause lets us use regular expressions to find complex
    patterns between rows.


    For example, we can use row pattern matching to help us find patterns in the number
    of launches per year. While analytic functions can find years that decrease or
    increase, analytic functions are not good enough for finding more specific patterns.
    The following code uses row pattern matching to find where the number of launches
    decreased for two or more years:


    ```

    --Years where launches decreased two years in a row or more.

    select *

    from

    (

    --Count of launches per year.

    select

    to_char(launch_date, ''YYYY'') the_year,

    count(*) launch_count

    from launch

    group by to_char(launch_date, ''YYYY'')

    order by the_year

    )

    match_recognize

    (

    order by the_year

    measures

    first(down.the_year) as decline_start,

    last(down.the_year) as decline_end

    one row per match

    after match skip to last down

    --Declined for two or more years.

    pattern (down down+)

    define

    down as down.launch_count < prev(down.launch_count)

    )

    order by decline_start;

    DECLINE_START   DECLINE_END

    -------------   -----------

    ...

    1977          1978

    1980          1986

    1988          1996

    ...

    ```


    The `MATCH_RECOGNIZE` syntax is verbose, so I’ll let most of the preceding code
    speak for itself. The most interesting part of the query is where we define the
    regular expression: `PATTERN (DOWN DOWN+)`. Once we’ve got the initial query built,
    it’s easy to play around with different patterns. We could easily find series
    of years where the number of launches increased, where the number of launches
    seesawed back and forth, etc.


    ## Any Types


    If we don’t know what our data looks like ahead of time, we need the ability to
    process “anything.” Oracle provides three object types that can help us pass and
    process completely generic data. `ANYDATA` contains a single value of any type,
    `ANYTYPE` contains type information about the data, and `ANYDATASET` contains
    a collection of any types of data.


    For example, the following function accepts an `ANYDATA` and returns a text version
    of the value stored inside the `ANYDATA`. This function isn’t very useful because
    even creating a trivial example of `ANYDATA` requires a lot of weird code:


    ```

    --Function that uses ANYDATA to process "anything".

    create or replace function process_anything(p_anything anydata)

    return varchar2

    is

    v_typecode pls_integer;

    v_anytype anytype;

    v_result pls_integer;

    v_number number;

    v_varchar2 varchar2(4000);

    begin

    --Get ANYTYPE.

    v_typecode := p_anything.getType(v_anytype);

    --Inspect type and process accordingly.

    if v_typecode = dbms_types.typecode_number then

    v_result := p_anything.GetNumber(v_number);

    return(''Number: ''||v_number);

    elsif v_typecode = dbms_types.typecode_varchar2 then

    v_result := p_anything.GetVarchar2(v_varchar2);

    return(''Varchar2: ''||v_varchar2);

    else

    return(''Unexpected type: ''||v_typecode);

    end if;

    end;

    /

    ```


    The following query shows that we can choose the data types at run time:


    ```

    --Call PROCESS_ANYTHING from SQL.

    select

    process_anything(anydata.ConvertNumber(1)) result1,

    process_anything(anydata.ConvertVarchar2(''A'')) result2,

    process_anything(anydata.ConvertClob(''B'')) result3

    from dual;

    RESULT1     RESULT2       RESULT3

    ---------   -----------   --------------------

    Number: 1   Varchar2: A   Unexpected type: 112

    ```


    In practice, most highly generic programming in SQL or PL/SQL is a mistake. To
    do anything interesting with data, we have to have an idea of what that data looks
    like. The `ANY` types are neat, but they have some strange bugs and performance
    problems. Before we invest too much effort in a solution using an `ANY` type,
    we should ensure that the program can scale. Almost all of our database processing
    should be done in boring strings, numbers, and dates. Instead of one smart function
    that accepts anything, it is usually better to dynamically generate a dumb function
    for each type.


    ## APEX


    Application Express (`APEX`) is a free web-based development environment for creating
    websites. `APEX` integrates seamlessly with an Oracle database and makes creating
    front ends for our data almost trivial.


    To recreate the examples in this section, we need to install `APEX` on our database
    or create a free account at `https://apex.oracle.com`. After we install or create
    an account, we need to create a workspace, which is a collection of applications.
    Then we need to create an application, which is a collection of pages.


    When inside the application, there are two main utilities – SQL Workshop and App
    Builder. In SQL Workshop we can quickly create, edit, and run SQL queries and
    SQL*Plus scripts.


    If you installed `APEX` on your local database, then `APEX` already has access
    to the space data set. If you are using Oracle’s website, then you need to load
    some sample data; see this chapter’s worksheet in the GitHub repository for a
    tiny amount of sample data. On Oracle’s website, you will need to create a script,
    copy and paste the commands from the repository, and then run the script.


    After the data is loaded, we get to the most important part of `APEX` – the App
    Builder. After creating an application, which is done with a few simple clicks,
    it’s time to create a page. To show how simple creating a page is, here are the
    entire steps: click “Create Page,” click “Interactive Report,” enter “Launch”
    for the Page Name, click “Next” twice, choose the `LAUNCH` table from the drop-down
    list, and click “Create.” To see the page, click the Run Page button and enter
    a username and password, and then we should see something like Figure 19-2.


    ![](images/471418_2_En_19_Chapter/471418_2_En_19_Fig2_HTML.png)


    The snippet of the Space menu, with home and launch section. The search option,
    action button, table columns for launch id, launch tag, launch category, and launch
    status are visible.


    Figure 19-2


    `APEX` launch report


    This simple example only scratches the surface of `APEX`’s features. We can use
    `APEX` to build complex interactive forms, reports, charts, REST services, custom
    authentication, or anything else we might find on a modern website. Simple pages
    can be built with a few clicks. Intermediate-level pages can be built using our
    SQL skills to define the data. Advanced pages can use custom SQL, PL/SQL, CSS,
    and JavaScript.


    `APEX` is a great choice if we want to quickly create a front end for an Oracle
    database. Even if we don’t want to build a website, installing `APEX` gives us
    access to several useful PL/SQL packages. For example, the powerful `APEX_DATA_PARSER`
    is great for declaratively reading several common file types.'
