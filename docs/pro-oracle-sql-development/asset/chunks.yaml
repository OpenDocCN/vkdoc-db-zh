- fmt: '## ALTER SYSTEM


    `ALTER SYSTEM`命令不是DML命令，但对于SQL开发有时是必需的。正如第[2](#471418_2_En_2_Chapter.xhtml)章所述，我们应该在能够完全控制一切的环境中完成大部分工作。即使我们拥有完全控制权，也不希望频繁运行`ALTER
    SYSTEM`命令。但有一些特定的命令SQL开发者可能会觉得方便。并且有简单的方法可以授予对这些命令的访问权限，而无需授予提升的权限。


    ### 清理内存结构

    对于性能测试，清理数据库内存结构可能有所帮助。有时我们希望强制Oracle使用新的执行计划，可以使用此命令：`ALTER SYSTEM FLUSH SHARED_POOL`。有时我们希望清理缓存，以测试系统冷运行状态，可以使用此命令：`ALTER
    SYSTEM FLUSH BUFFER_CACHE`。有时我们需要终止失控的会话，可以使用类似这样的命令：`ALTER SYSTEM KILL SESSION
    ''...'' IMMEDIATE`。


    ### 使用PL/SQL授予精准权限

    前一段中的命令需要强大的`ALTER SYSTEM`权限。即使我们在主要开发环境中拥有该权限，在更高阶的环境中我们可能没有。但我们总是可以使用PL/SQL来授予高度精准的权限。我们可以创建一个定义者权限过程，只允许执行我们所需的特定命令。没有专门针对`ALTER
    SYSTEM FLUSH SHARED_POOL`的系统权限，但以下语句将允许用户或角色*仅*运行那个特定命令：


    ```sql

    --Let users run a few specific ALTER SYSTEM commands.

    create procedure sys.flush_shared_pool is

    begin

    execute immediate ''alter system flush shared_pool'';

    end;

    /

    grant execute on sys.flush_shared_pool to DEVELOPER_USERNAME;

    ```


    上述代码中有几件事可能会引起数据库管理员的担忧。Oracle手册说不要在系统模式中存储对象，并且要小心刷新共享池。但这些担忧不应阻止我们创建此过程。我们不想在系统模式中存储*数据*（因为`SYSTEM`表空间是特殊的，不适用于大量数据），并且出于安全考虑，我们也不想将*所有*代码存储在`SYS`中。但有时我们*必须*在`SYS`中创建对象，比如密码验证函数。在`SYS`中创建一个精准定位的过程可以帮助我们限制权限并自动化常见任务。而且在实践中，刷新缓存很少会产生巨大影响。


    这里的重要启示是，即使是`ALTER SYSTEM`命令也应该对所有人可用。我们只需要小心行事，这取决于我们所处的环境以及我们正在授予的特定命令。


    对于共享开发数据库且无法授予SQL开发者运行`ALTER SYSTEM`命令能力的组织来说，最终会导致参数混乱。参数只在绝对必要时才会更改，但多年来，这些自定义值会超出其有用性。最终，没有人知道为什么我们设置了所有那些神秘的值，也没有人被授权去测试更改这些参数。我们必须小心更改参数，但让每个人都参与我们的数据库配置是很重要的。


    ## ALTER SESSION


    `ALTER SESSION`命令也不是DML语句，但它支持我们的DML语句。


    ### 会话级参数设置

    如第[3](#471418_2_En_3_Chapter.xhtml)章所讨论的，`V$PARAMETER`中列出了数百个实例参数，并在*Database
    Reference*中有解释。其中大多数参数也可以在会话级别设置。如果可能，我们应该在会话级别而不是实例级别设置参数。如果我们的应用程序中存在需要配置更改的异常行为，该更改应仅适用于*我们的*应用程序。我们不想修改碰巧运行在同一数据库上的其他程序。


    例如，假设有人设置了参数`OPTIMIZER_INDEX_COST_ADJ`。这个参数是多年前更改的，没人知道为什么，但现在每个人都害怕去碰它。对该参数使用非默认值几乎肯定是个坏主意，但一旦参数设置好，我们如何证明它没有必要呢？我们可以从一次只更改一个会话的参数开始，并与其他用户一起慢慢测试更改：


    ```sql

    --Change OPTIMIZER_INDEX_COST_ADJ at the session level.

    alter session set optimizer_index_cost_adj = 100;

    ```


    如果我们只想更改一个用户的参数，可以将`ALTER SESSION`语句放入登录触发器中。最终，我们可以将系统参数改回其默认值，并按照设计使用优化器。


    ### 其他会话参数示例

    其他常见的会话参数是国家语言支持参数。但即使在会话级别，NLS参数也被过度使用了。在会话级别设置像`NLS_DATE_FORMAT`这样的参数就像使用全局变量。我们的代码首先不应该做那么多格式转换，尽管对于某些任务这是不可避免的。


    *   设置`CURRENT_SCHEMA`在我们要不断查询另一个模式而不想重复输入模式名称时很有帮助。

    *   设置`ENABLE|DISABLE PARALLEL DML|DDL|QUERY`有助于设置并行度。

    *   设置`RESUMABLE`可以让我们会话在数据库空间不足时选择等待或立即失败。有时我们希望等待DBA增加空间，有时我们希望立即抛出错误。

    *   几个`PLSQL_*`参数可以帮助我们控制程序编译。


    以下是前面提到的`ALTER SESSION`命令的四个快速示例：


    ```sql

    --Use the SPACE schema by default.

    alter session set current_schema=space;

    --Allow parallel DML.

    alter session enable parallel dml;

    --Wait for adding space.

    alter session enable resumable;

    --Enable debugging in newly compiled programs.

    alter session set plsql_optimize_level = 1;

    ```'
  raw: '## ALTER SYSTEM


    The `ALTER SYSTEM` command is not a DML command, but there are times when it’s
    necessary for SQL development. As described in Chapter [2](#471418_2_En_2_Chapter.xhtml),
    we should do most of our work in an environment where we have full control over
    everything. Even when we have full control, we don’t want to run `ALTER SYSTEM`
    commands frequently. But there are a few specific commands that SQL developers
    may find handy. And there are easy ways to grant access to those commands without
    granting elevated privileges.


    For performance testing it may help to clear database memory structures. Sometimes
    we want to force Oracle to generate a new execution plan, using this command:
    `ALTER SYSTEM FLUSH SHARED_POOL`. Sometimes we want to clear the cache, to test
    the system running cold, using this command: `ALTER SYSTEM FLUSH BUFFER_CACHE`.
    Sometimes we need to kill runaway sessions, using a command like this: `ALTER
    SYSTEM KILL SESSION ''...'' IMMEDIATE`.


    The commands in the previous paragraph require the powerful privilege `ALTER SYSTEM`.
    Even if we have that privilege in our primary development environments, it’s likely
    we don’t have that privilege in higher environments. But we can always use PL/SQL
    to grant a highly targeted privilege. We can create a definer’s rights procedure
    that allows only the specific commands we need. There is no system privilege specific
    to `ALTER SYSTEM FLUSH SHARED_POOL`, but the following statements will allow a
    user or role to run *only* that specific command:


    ```

    --Let users run a few specific ALTER SYSTEM commands.

    create procedure sys.flush_shared_pool is

    begin

    execute immediate ''alter system flush shared_pool'';

    end;

    /

    grant execute on sys.flush_shared_pool to DEVELOPER_USERNAME;

    ```


    There are a few things about the preceding code that may concern a database administrator.
    The Oracle manual says to not store objects in system schemas and to be careful
    about flushing the shared pool. But those concerns shouldn’t prevent us from creating
    this procedure. We don’t want to store *data* in the system schema (because the
    SYSTEM tablespace is special and not meant for large amounts of data), and we
    don’t want to store *all* our code in SYS, because of security concerns. But there
    are times when we *have* to create objects in SYS anyway, like password verification
    functions. Creating a precisely targeted procedure in SYS can help us limit our
    privileges and automate common tasks. And in practice, flushing the caches rarely
    has a huge impact.


    The important lesson here is that even `ALTER SYSTEM` commands should be available
    for everyone. We just have to be careful, depending on which environment we’re
    in and which specific commands we’re granting.


    Organizations with shared development databases that can’t give SQL developers
    the ability to run `ALTER SYSTEM` commands end up with a parameter mess. Parameters
    only get changed when absolutely necessary, but over the years those custom values
    outlive their usefulness. Eventually nobody knows why we set all those cryptic
    values, and nobody is empowered to test changing the parameters. We have to be
    careful about changing parameters, but it’s important to have everyone invested
    in our database configuration.


    ## ALTER SESSION


    The `ALTER SESSION` command is also not a DML statement, but it supports our DML
    statements.


    As discussed in Chapter [3](#471418_2_En_3_Chapter.xhtml), there are hundreds
    of instance parameters listed in `V$PARAMETER` and explained in the *Database
    Reference*. Most of those parameters can also be set at the session level. When
    possible, we should set parameters at the session level instead of the instance
    level. If there’s unusual behavior in our application that requires a configuration
    change, that change should only apply to *our* application. We don’t want to modify
    other programs that also happen to be running on the same database.


    For example, let’s say someone set the parameter `OPTIMIZER_INDEX_COST_ADJ`. The
    parameter was changed years ago, nobody knows why, but everyone is scared to touch
    the parameter now. Using a non-default value for that parameter is almost certainly
    a bad idea, but once the parameter is set, how do we prove it’s not necessary?
    We can start by changing the parameter just for one session at a time and slowly
    testing the change with other users:


    ```

    --Change OPTIMIZER_INDEX_COST_ADJ at the session level.

    alter session set optimizer_index_cost_adj = 100;

    ```


    If we only want to change a parameter for one user, we can put an `ALTER SESSION`
    statement in a logon trigger. Eventually, we can change the system parameters
    back to their default values and use the optimizer the way it was designed.


    Other common session parameters are National Language Support parameters. But
    NLS parameters are overused, even at the session level. Setting parameters like
    `NLS_DATE_FORMAT` at the session level is like using a global variable. Our code
    shouldn’t do that much format conversion in the first place, although for some
    tasks it’s unavoidable.


    Setting `CURRENT_SCHEMA` is helpful when we are constantly querying another schema
    and don’t want to repeatedly type the schema name. Setting `ENABLE|DISABLE PARALLEL
    DML|DDL|QUERY` helps set parallelism. Setting `RESUMABLE` can make our session
    either wait or immediately fail if the database runs out of space. Sometimes we
    want to wait for the DBA to add space, and sometimes we want to throw an error
    immediately. Several `PLSQL_*` parameters can help us control program compilation.


    The following are four quick examples of the previously mentioned `ALTER SESSION`
    commands:


    ```

    --Use the SPACE schema by default.

    alter session set current_schema=space;

    --Allow parallel DML.

    alter session enable parallel dml;

    --Wait for adding space.

    alter session enable resumable;

    --Enable debugging in newly compiled programs.

    alter session set plsql_optimize_level = 1;

    ```'
