- fmt: '### Regular Expression Examples


    Let’s try to order the launch vehicles by their name and their version. But the
    names are confusing – sometimes they contain numbers, and other times they contain
    Roman numerals. To properly sort the names, we need to convert Roman numerals.
    That process is a lot of work for a sort order, so we’ll only include with the
    first few steps. First, let’s look at the popular Canadian sounding rocket Black
    Brant and find names that look like Roman numerals:


    ```sql

    --Launch vehicle names with Roman numerals.

    select lv_name

    from launch_vehicle

    where regexp_like(lv_name, ''\W[IVX]+'')

    and lv_name like ''Black Brant%''

    order by lv_name;

    LV_NAME


    Black Brant I

    Black Brant II

    Black Brant IIB

    Black Brant III

    ...

    ```


    The key ingredient in the preceding query is the cryptic regular expression `''\W[IVX]+''`.
    That expression finds any rows where the vehicle name contains a nonword character
    followed by one or more of either “I,” “V,” or “X.”


    The next step is to convert the Roman numerals to numbers. To simplify things,
    we’re going to cheat and just hard-code a few Roman numeral conversions. The important
    part of the following query is the way `REGEXP_REPLACE` is used to break the name
    into different pieces. After the name is broken apart, we can modify the Roman
    numeral portion and then put the pieces back together:


    ```sql

    --Convert Roman numerals and re-assemble pieces into a name.

    select

    part_1||part_2||

    --This hard-coding is clearly not the best way to do it.

    case part_3

    when ''I'' then ''01''

    when ''II'' then ''02''

    when ''III'' then ''03''

    end||

    part_4 new_lv_name

    from

    (

    --Launch vehicles with Roman numerals, broken into parts.

    select

    regexp_replace(lv_name, ''(.*)(\W)([IVX]+)(.*)'', ''\1'') part_1,

    regexp_replace(lv_name, ''(.*)(\W)([IVX]+)(.*)'', ''\2'') part_2,

    regexp_replace(lv_name, ''(.*)(\W)([IVX]+)(.*)'', ''\3'') part_3,

    regexp_replace(lv_name, ''(.*)(\W)([IVX]+)(.*)'', ''\4'') part_4

    from launch_vehicle

    where regexp_like(lv_name, ''\W[IVX]+'')

    and lv_name like ''Black Brant%''

    order by lv_name

    );

    NEW_LV_NAME


    Black Brant 01

    Black Brant 02

    Black Brant 02B

    Black Brant 03

    ...

    ```


    The regular expression in the preceding `WHERE` clause is still simple and just
    finds the pattern. But the regular expression in the `REGEXP_REPLACE` has to find
    four different patterns – anything at the beginning, a non-word character, the
    Roman numeral, and anything at the end. The parentheses create four groups, and
    the backslash and number reference those groups. Each `REGEXP_REPLACE` replaces
    the entire string with just one of the four parts.


    Regular expressions can solve many problems, and there are several patterns worth
    learning. The most popular example is how to use regular expressions to split
    a delimited string into different parts. To split by a delimiter, we first use
    the `CONNECT BY` row trick to generate extra rows. For each row, we match a group
    of characters that contain anything *other* than the delimiter, with an expression
    like `''[^,]''`. Finally, in the `REGEXP_SUBSTR` function, we choose the `LEVEL`
    occurrence of the match. The following query is small but uses a lot of features:


    ```sql

    --Split a comma-separated string into its elements.

    select regexp_substr(csv, ''[^,]'', 1, level) element

    from

    (

    select ''a,b,c'' csv

    from dual

    )

    connect by level <= regexp_count(csv, '','') + 1;

    ELEMENT


    a

    b

    c

    ```


    ### Regular Expression Limitations


    The cryptic syntax of regular expressions may make us feel like coding superheroes,
    but it’s very easy to make a mess. When using regular expressions, we must take
    extra care to make our code readable. We must resist the urge to create one uber-expression,
    and instead we must break our code into small pieces.


    The examples in this chapter are good examples of what *not* to do. The examples
    demonstrate the concepts of regular expressions, but we’re not close to our goal
    of actually finding and replacing Roman numerals. If we look at all the different
    launch names, we’ll notice that there are a huge number of exceptions to our simplistic
    rule. Converting these Roman numerals is one of those “90–10” tasks; we easily
    built a solution for 90% of the problem, but solving the remaining 10% will take
    90% of our time.


    These 90–10 tasks happen a lot when parsing text, and we have to know our limitations.
    Even for the seemingly simple task of splitting strings, there are many cases
    that might break our simple regular expressions – such as empty lists. The real
    solution to splitting strings is to not store delimited strings in the database
    in the first place.


    Even tasks as seemingly simple as finding numbers can be unexpectedly difficult.
    Recreating the numeric literal syntax diagram discussed in Chapter [4](#471418_2_En_4_Chapter.xhtml)
    requires a surprisingly nasty regular expression. The Internet is full of half-baked
    answers that forget things like an initial negative sign. And forget about validating
    email addresses – the official regular expression to validate email addresses
    is over 6,000 characters long.


    Finally, there are many tasks that are literally impossible to solve with one
    regular expression. Figure [7-2](#471418_2_En_7_Chapter.xhtml#Fig2) shows a hierarchy
    of formal languages. Even though regular expressions are powerful tools, the regular
    languages they define are at the bottom of the hierarchy. Many languages, such
    as HTML, XML, and almost all programming languages, are context-free or higher.
    Regular expressions alone cannot fully parse HTML, XML, and programming languages.
    Regular expressions can easily find many patterns in complex languages, but finding
    simple patterns can give us a false sense of confidence. We must be careful not
    to try to use a regular expression for a task that requires a full language parser.
    We don’t want to invest time in a regular expression that is 99% accurate but
    will never be 100% accurate.


    ![](images/471418_2_En_7_Chapter/471418_2_En_7_Fig2_HTML.png)


    The image consists of a circular hierarchy that is regular, context-free, context-sensitive,
    and recursively enumerable.


    Figure 7-2


    “A graphical representation of the sets of languages included in the Chomsky hierarchy”
    by J. Finkelstein is licensed under CC BY-SA 3.0.


    ## Row Limiting


    Sometimes we only want to retrieve a subset of the results from our SQL statements.
    When applications only display N rows at a time, our queries should only return
    N rows. Oracle’s row limiting clause lets us specify exactly what subset of rows
    to return. Although the row limiting clause was introduced in 12c, there’s still
    a lot of code that uses the old `ROWNUM` technique, so we need to understand it.
    And sometimes we need to limit rows with analytic functions, using `ROW_NUMBER`.'
