    ```

    --Truncate the table.

    --truncate table truncate_test;

    --(Re-run the above segments and objects query)

    MEGABYTES  OBJECT_ID  DATA_OBJECT_ID

    ---------  ---------  --------------

    0.0625     196832          196833

    ```


    前面的结果显示段空间已减少到几乎为零。`OBJECT_ID`保持不变，但`DATA_OBJECT_ID`略有变化。新的`DATA_OBJECT_ID`是 Oracle
    表示表可能看起来一样，但数据已经以一种不寻常的方式完全改变。段的突然变化会影响其他操作，并在我们使用表时导致奇怪的错误，如果它正在被截断。


    你可能听说过 Oracle 的口头禅“读者不阻塞写者，写者不阻塞读者”。这句话指的是 Oracle 数据库的一致性模型。如果我们开始从一个表读取，其他人可以同时更改该表。用户都不会被阻塞，并且两个用户都能获得自其语句开始时起一致的数据视图。


    这些关于读者和写者的规则不适用于`TRUNCATE`。`TRUNCATE`不写入表；`TRUNCATE`会销毁并重建表。如果当表被截断时其他人正在读取该表，他们的读取操作可能会失败。当客户端向
    Oracle 请求接下来的 N 行时，Oracle 将无法找到任何行。这些行显然不在表中，甚至可能不在 UNDO 表空间中，因此 Oracle 不知道数据去了哪里。`DATA_OBJECT_ID`已经改变，客户端试图读取一个旧的表，`SELECT`语句将生成错误“ORA-08103:
    object no longer exists.”。这个错误信息是一个不好的预兆，暗示有人在错误的时间销毁了我们的表。

    '
- fmt: '## COMMIT, ROLLBACK, and SAVEPOINT


    `COMMIT`、`ROLLBACK` 和 `SAVEPOINT` 是事务控制命令，对于控制 DML 语句至关重要。本书假设您已经熟悉 `COMMIT`（使更改永久生效）、`ROLLBACK`（撤销更改）和
    `SAVEPOINT`（创建可以后续回滚到的位置）的基础知识。对于高级 SQL 开发，我们需要了解更多关于事务的知识：什么会触发事务控制语句，执行事务控制语句时会发生什么，以及何时使用事务控制语句。


    ### 事务的基本概念

    事务是逻辑上的、原子性的工作单元。由我们来决定一个事务应该包含什么。当用户点击一个按钮时，哪些更改应该要么完全发生，要么完全不发生？许多开发者对事务的理解是反过来的——他们试图弄清楚数据库能支持什么，然后据此来调整事务的大小。相反，我们应该先确定我们最大的事务是什么，然后据此来调整我们的数据库。如果我们的事务遇到资源问题，并且没有明显的错误或缺失的优化，那么我们应该调整或重新配置我们的数据库。


    ### 事务的开始与结束

    Oracle 事务是自动开始的。我们不需要担心启动事务，但我们需要担心结束事务。大多数事务应该使用 `COMMIT` 或 `ROLLBACK` 显式结束。如果我们运行任何
    DDL 语句，事务会自动提交。因为 DDL 语句在执行前会发出一个 `COMMIT`，所以即使 DDL 语句失败，事务也会被提交。与某些其他数据库不同，Oracle
    DDL 语句不能是事务的一部分，也无法被回滚。


    退出会话也会自动结束事务。正常退出通常会发出一个 `COMMIT`，而非正常退出通常会发出一个 `ROLLBACK`。但这种行为可能是可配置的。在假设我们的事务将如何结束之前，我们应该检查我们的
    IDE 和客户端。或者更好的是，我们应该通过运行 `COMMIT` 或 `ROLLBACK` 来始终明确指定事务的结束方式。


    ### COMMIT的行为与注意事项

    当执行 `COMMIT` 时，不会立即发生太多事情。一个简单的数据库更改需要完成大量工作以满足 ACID 属性（原子性、一致性、隔离性和持久性）。Oracle
    设计为在 `COMMIT` 之前尽可能少做这些工作。`COMMIT` 命令几乎总是立即执行，但这种快速执行并不意味着 `COMMIT` 是免费的。很多工作是异步完成的。创建大量微小事务会产生更多开销，并使
    Oracle 更难优化后台工作。我们应该避免将大的更改拆分成多个语句和事务。


    ### ROLLBACK的行为与性能

    当执行 `ROLLBACK` 时，可能需要大量工作。除非操作是插入或直接路径写入，否则运行 `ROLLBACK` 命令所需的时间大约与运行该语句所需的时间相当。当语句失败或会话被终止时，`ROLLBACK`
    会自动运行。当语句失败时，只有该语句会被回滚。当会话被终止时，整个事务会被回滚。


    我们需要理解 `ROLLBACK` 的性能，以帮助我们决定何时终止一个长时间运行的语句。当一个语句运行时间过长时，有时该语句已接近完成，我们不妨让它继续运行。其他时候，该语句不会很快完成，我们必须终止会话，让事务
    `ROLLBACK`，然后以不同的方式运行原始语句。这个决定取决于语句完成所需的时间与 `ROLLBACK` 所需时间的对比。


    ### ROLLBACK进度的估算

    估算语句运行时间是困难或不可能的，如第16章所述。幸运的是，我们可以轻松估算 `ROLLBACK` 时间——它应该大约与原始 DML 操作所需时间相当。回滚大的
    SQL 语句有点吓人，跟踪进度会很有帮助。测量 `ROLLBACK` 进度的最简单方法是使用 `V$TRANSACTION.USED_UREC`。`USED_UREC`
    列是已使用的 UNDO 记录数。该值取决于更改的表行数和索引数。例如，让我们做一个小的更改并测量活动：


    ```

    --Insert temporary data to measure transactions.

    insert into launch(launch_id, launch_tag) values (-999, ''test'');

    select used_urec from v$transaction;

    USED_UREC

    ```


    单个 `INSERT` 语句生成了三个 UNDO 记录。这个数字有点难以理解。它代表了一行更改和两个索引更改。表 `LAUNCH` 有五个索引，但只有两个索引被使用，因为
    NULL 值不存储在索引中。现在让我们 `ROLLBACK` 这个更改并观察数字减少：


    ```

    --Now get rid of the data.

    rollback;

    select used_urec from v$transaction;

    USED_UREC

    ```


    `ROLLBACK` 之后，事务条目消失，行也消失了。对于长时间运行的语句，我们应该等待一分钟，重新运行对 `V$TRANSACTION` 的查询，并找出差值。这个差值给出了每分钟的
    UNDO 行数，我们可以用它来估算 `ROLLBACK` 何时完成。整个 `ROLLBACK` 估算过程在 OLTP 环境中可能并不重要，因为所有更改都很小。在数据仓库环境中，当我们不得不向管理层解释为什么一个关键作业必须再等一天时，这种估算可以避免很多恐慌。


    ### COMMIT的选项与风险

    我们都理解，在我们运行 `COMMIT` 之前，其他会话看不到我们的更改。但是忘记 `COMMIT` 仍然是一种常见的错误，即使是最优秀的人也会犯。无论何时我们构建测试用例或报告错误，都必须明确表明代码已被提交。最终会有人问这个问题，所以我们不如提前回答。


    `COMMIT` 有一些具有风险权衡的选项。`NOWAIT` 选项意味着更改不必在 `COMMIT` 返回之前完全写入磁盘。`BATCH` 选项会将多个 `COMMIT`
    命令分组并一次性写入。这两个选项都提高了性能，但代价是持久性。正常的 `COMMIT` 直到所有恢复所需的内容都写入永久存储后才返回控制。如果我们要求不同的
    `COMMIT` 选项，我们可能会丢失数据。既然 `COMMIT` 本身已经很快，如果我们考虑使用这两个选项，我们应该退一步问问自己为什么需要如此频繁地提交。'
  raw: '## COMMIT, ROLLBACK, and SAVEPOINT


    `COMMIT`, `ROLLBACK`, and `SAVEPOINT` are transaction control commands and are
    important for controlling our DML statements. This book assumes you are familiar
    with the basics of `COMMIT` (making the changes permanent), `ROLLBACK` (undoing
    the changes), and `SAVEPOINT` (creating places we can later roll back to). For
    advanced SQL development, we need to know more about transactions, what causes
    transaction control statements, what happens when transaction control statements
    are executed, and when to use transaction control statements.


    Transactions are logical, atomic pieces of work. It’s up to us to decide what
    a transaction should be. When a user clicks a button, what changes should either
    completely happen or not happen at all? Many developers get transactions backward
    – they try to find out what the database can support and then size their transactions
    accordingly. Instead, we should find our maximum transaction and then size our
    database accordingly. If our transactions run into resource problems and don’t
    have any obvious bugs or missing optimizations, we should resize or reconfigure
    our database.


    Oracle transactions start automatically. We don’t need to worry about starting
    transactions, but we do need to worry about ending transactions. Most transactions
    should be ended explicitly with either a `COMMIT` or a `ROLLBACK`. Transactions
    are automatically committed if we run any DDL statement. Since DDL statements
    issue a `COMMIT` before they execute, the transaction will be committed even if
    a DDL statement fails. Unlike some other databases, Oracle DDL statements cannot
    be part of a transaction and cannot be rolled back.


    Exiting a session also automatically ends a transaction. A normal exit typically
    issues a `COMMIT`, and an abnormal exit typically issues a `ROLLBACK`. But that
    behavior may be configurable. We should check our IDE and clients before we make
    assumptions about how our transactions will end. Or better yet, we should always
    specify exactly how our transactions end, by running either `COMMIT` or `ROLLBACK`.


    When a `COMMIT` is executed, not much happens right away. A simple database change
    requires a lot of work to meet the ACID properties – atomic, consistent, isolated,
    and durable. Oracle is designed to do as little of that work as possible before
    the `COMMIT`. The `COMMIT` command almost always executes immediately, but that
    speedy execution doesn’t mean `COMMIT` is free. A lot of work happens asynchronously.
    Creating lots of tiny transactions creates more overhead and makes it harder for
    Oracle to optimize the background work. We should avoid splitting large changes
    into multiple statements and transactions.


    When a `ROLLBACK` is executed, a lot of work may be required. Unless the operation
    was an insert or direct-path write, the time to run the `ROLLBACK` command will
    be about as long as the time to run the statement. `ROLLBACK` automatically runs
    when a statement fails or the session is killed. When a statement fails, only
    that statement is rolled back. When a session is killed, the entire transaction
    is rolled back.


    We need to understand `ROLLBACK` performance to help us decide when to kill a
    long-running statement. When a statement has been running for too long, sometimes
    the statement is so close to finishing that we might as well let it continue.
    Other times, that statement will not finish soon enough, and we must kill the
    session, let the transaction `ROLLBACK`, and run the original statements in a
    different way. The decision hinges on how long the statement will take to complete
    vs. how long the `ROLLBACK` will take.


    Estimating statement run time is difficult or impossible, as described in Chapter
    [16](#471418_2_En_16_Chapter.xhtml). Luckily, we can easily estimate the `ROLLBACK`
    time – it should take about as long as the original DML. Rolling back large SQL
    statements is a bit scary, and it helps to track the progress. The simplest way
    to measure `ROLLBACK` progress is with `V$TRANSACTION.USED_UREC`. The column `USED_UREC`
    is the number of used UNDO records. That value depends on the number of table
    rows changed and the number of indexes. For example, let’s make a small change
    and measure the activity:


    ```

    --Insert temporary data to measure transactions.

    insert into launch(launch_id, launch_tag) values (-999, ''test'');

    select used_urec from v$transaction;

    USED_UREC


    ```


    The single `INSERT` statement generated three UNDO records. The number is a bit
    tricky to understand. The number represents one row change and two index changes.
    The table `LAUNCH` has five indexes, but only two of the indexes are used, because
    nulls are not stored in indexes. Now let’s `ROLLBACK` the change and watch the
    numbers decrease:


    ```

    --Now get rid of the data.

    rollback;

    select used_urec from v$transaction;

    USED_UREC


    ```


    After the `ROLLBACK`, the transaction entry is gone, and the row disappears. For
    long-running statements, we should wait a minute, rerun the query against `V$TRANSACTION`,
    and find the difference. That difference gives us UNDO rows per minute, which
    we can use to estimate when the `ROLLBACK` will complete. This whole `ROLLBACK`
    estimate process may not be important in an OLTP environment, where all changes
    are small. In a data warehouse environment, where we have to explain to management
    why a critical job must wait another day, this estimate can prevent a lot of panic.


    We all understand that our changes can’t be seen by other sessions until we run
    a `COMMIT`. But forgetting a `COMMIT` is still a common bug that happens to the
    best of us. Whenever we’re building a test case or reporting a bug, we must make
    it obvious that the code was committed. Someone will eventually ask the question,
    so we might as well answer it ahead of time.


    `COMMIT` has a few options with risky trade-offs. The option `NOWAIT` means that
    the change doesn’t have to be fully written to disk before the `COMMIT` returns.
    The option `BATCH` will group several `COMMIT` commands together and write them
    all at once. Both options improve performance, but at the cost of durability.
    A normal `COMMIT` doesn’t return control until everything necessary for recovery
    is written to permanent storage. If we ask for different `COMMIT` options, we
    could potentially lose our data. Since `COMMIT` is so fast anyway, if we’re looking
    at those two options, we should step back and ask ourselves why we’re committing
    so frequently.'
