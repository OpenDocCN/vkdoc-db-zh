- fmt: '# 11. Stop Coding and Start Writing


    Part I explained the importance of SQL and built a solid foundation for SQL development.
    Part II discussed sets and advanced features needed to build powerful SQL statements.
    We now have the motivation, efficient processes, and advanced knowledge, but that
    is not enough. Part III discusses the styles and patterns needed to write elegant
    SQL.


    Why should we care about writing elegant SQL? It’s true there are many times when
    our code quality doesn’t matter. Despite what we were promised about the reusability
    of software, in practice most of our code is only used once and then forgotten.
    For most development, great is the enemy of good enough.


    But the world is full of mediocre software. Developers should strive to occasionally
    rise above our boring day-to-day code and write something amazing.


    This book discusses “writing” SQL, not merely “programming” SQL or “coding” SQL.
    The word “write” is important because it helps us focus on the true audience of
    our code. Our audience is not the end users; the end users are the audience of
    our programs and don’t care about the source code. Our audience is not the compiler;
    the compiler must verify and build our code, but the compiler doesn’t care if
    our code makes sense. Our true audience is other developers.


    The scarcest resource in the software life cycle is the attention of developers.
    Our programming mantra should be “don’t make me think.” That statement is the
    title of a popular book about website usability. While we can’t make our source
    code as simple as a website, we still want to maximize the usability of our code
    for other developers.


    We must spend extra time up front to make our code easier for developers later.
    Making our code readable encourages other people to use our code and will even
    help our future selves. Instead of programming cryptic statements, we should write
    easy-to-follow stories. But making something look easy is hard.


    Part III is a style guide and the most opinionated part of the book. I hope you
    strongly disagree with some of my suggestions. Disagreement means you are paying
    attention and you care about your code quality. If we disagree, we can still learn,
    as long as we can justify our beliefs. Having any carefully considered style guide
    is better than having none. Oracle SQL has a lot of historical baggage, but we
    shouldn’t rely on the excuse “that’s the way we’ve always done it.” If we don’t
    know both sides of an argument, then we don’t know either side.


    ## The Hypocrisy of Examples


    This book promotes one set of styles yet occasionally deviates from them. It’s
    difficult to not be hypocritical when writing about programming styles, because
    writing and programming are not exactly the same thing. It’s great to have a preferred
    coding style, but we also need to be flexible and adapt to our context. We should
    cultivate an idealistic style, but we should also have a pragmatic willingness
    to occasionally abandon our ideals.


    Writing *about* programming is a bit different than writing actual programs. For
    example, tabs work great in an IDE but not in a book. Writing everything in uppercase
    looks silly, but uppercase creates a helpful contrast when embedding code in a
    paragraph. A long line of code may look fine in an IDE, but the code won’t look
    good in a blog post. It’s often helpful to include the table name in front of
    the column name, but extra table names can take up too much space on a forum post.
    We must be willing to occasionally ignore our own rules.


    The problem with most SQL programming styles is that they only look good for small
    examples. But we don’t need help writing code that is less than one line long.
    We need help writing SQL statements that span more than a page. The large query
    in Chapter [6](#471418_2_En_6_Chapter.xhtml), which shows the top rocket fuels
    used per year, is an example of when we need to start applying helpful styles.
    The styles advocated in this book are meant to help with large SQL statements,
    not trivial examples.


    It’s good to program with a sense of idealism and beauty, but we should try to
    keep the dogmatism out of it. After a while we should all evolve a sense of when
    code “just looks right.” Eventually we’ll know that when our code looks right,
    it will run right. But sometimes we need to ignore our feelings and stop insisting
    one style is always best. For example, if we’re modifying existing code, we should
    imitate the existing style. It’s better to be successful than to be right.


    ## Comments


    We will never program in a natural language. Human languages are too complicated
    and ambiguous to be accurately parsed and executed. Even laudable attempts to
    fuse programming and natural languages, such as Donald Knuth’s literate programming,
    have failed. Our programs are inevitably cryptic and complex. If we want to lower
    the barrier of entry to our programs and enable more people to participate, we
    shouldn’t make people think any more than necessary. We must use comments to make
    our programs readable.


    ### Comment Styles


    It’s debatable exactly where to place comments and how much to use them. I recommend
    using enough comments so that someone can read our programs using only the comments.
    For `PL/SQL`, we should add comments at the top-level objects, at the definition
    of any function or procedure, in front of any large collection of statements,
    and whenever we’re doing something unusual. For `SQL`, we should add a comment
    at the top of every statement, the top of every `inline view`, and whenever we’re
    doing something unusual. We don’t want to restate everything in the comments,
    but we want to create signposts to help others quickly navigate our code.


    Some people say, “If it was hard to write, it should be hard to read.” I prefer
    the aphorism “If you can’t explain it to a six-year-old, you don’t understand
    it yourself.” We shouldn’t literally write for a six-year-old, but we do need
    to spend extra effort to distill the truths of our program and present those simple
    truths to readers who have not seen our code before.


    It’s difficult to know exactly who our audience is when we add comments. Are we
    targeting specific coworkers who already know our business logic, developers familiar
    with the programming language, our future selves, or someone else? There’s no
    easy answer, so we should spend at least a small amount of time writing and revising
    our comments. On the first pass, we may want to overshare to avoid the curse of
    knowledge – the cognitive bias where we assume everyone knows what we know. On
    the second pass, we can revise our comments to keep them clear and simple.


    Ideally, we can use our comments as our documentation. Developers rarely want
    to read large, out-of-date PDF files. Text files, simple `HTML`, and `markdown`
    files are sufficient for documenting noncommercial programs. The advantage of
    those simple formats is they can be automatically generated. There are several
    open source programs, such as `pldoc` and `plsql-md-doc`, that can turn specially
    formatted comments into documentation. Or it may be good enough to have a `Readme.md`
    file that merely directs the reader to look at package specifications for details.


    It’s difficult to say exactly what the content of our comments should be – it’s
    too subjective. But one mistake we should avoid is we should not use comments
    to record a history of all changes. Version control comments belong in the version
    control system. Seeing a list of names, dates, and changes at the top of a file
    is a red flag. That metadata makes us wonder if the program was built with a version
    control system, which is the same as wondering if the program was built competently.'
