- fmt: '## Application Tuning Through Batching


    Batching commands is the simplest way to improve the performance of database-centric
    applications. Putting commands together is usually an easy change that doesn’t
    touch any of the business logic. Batching commands helps in two ways – it reduces
    overhead, and it provides more opportunities for the optimizer.


    There can be a significant amount of overhead for database calls. The most obvious
    overhead is network round-trip time. And there are many hardware and software
    optimizations available when multiple commands and data are processed together:
    improved cache and memory access, SIMD, fewer context switches, less parsing,
    etc.


    As discussed in Chapter [16](#471418_2_En_16_Chapter.xhtml), we can quickly see
    huge returns from the 1/N harmonic progression of reduced overhead. We can keep
    our application changes simple because we don’t need to aggregate everything to
    get huge performance improvements. Combining commands in groups of 100 is 99%
    optimized.


    Batching commands gives the optimizer more opportunities to do something clever.
    Writing one large SQL statement, instead of multiple small SQL statements, lets
    Oracle apply a larger number of transformations and operations. On the other hand,
    batching also gives the optimizer more opportunities to make a mistake, but no
    risk, no reward. When those mistakes happen, instead of giving up on batching,
    we can apply our SQL tuning skills.


    The biggest opportunities to batch commands are installation scripts, OLTP applications,
    and data warehouses.


    ### Installation and Patch Scripts


    Improving the performance of installation and patch scripts is more important
    than many developers realize. There are only a few `direct` benefits from tuning
    those scripts, since they are not seen by end users and they are rarely run on
    production systems. But the `indirect` benefits are huge, since faster installation
    and patching enable developers to more quickly experiment and test.


    The difference between an installation script that takes 1 minute and an installation
    script that takes 10 minutes is much more than 9 minutes. When reinstalling only
    takes a minute, we have no excuse not to test whatever crazy idea pops into our
    heads. But this advice only applies to developers who are using a private database
    development model.


    For example, the following code shows a typical installation script. The script
    uses nine commands to create and populate a table. Most automatic script generation
    programs create code that looks like this:


    ```

    --Typical slow and wordy install script.

    create table install_test1(a number);

    alter table install_test1 modify a not null;

    alter table install_test1

    add constraint install_test1_pk primary key(a);

    insert into install_test1(a) values(1);

    commit;

    insert into install_test1(a) values(2);

    commit;

    insert into install_test1(a) values(3);

    commit;

    ```


    We can shrink that entire script into a single command:


    ```

    --Faster and more compact install script.

    create table install_test2

    (

    a not null,

    constraint install_test2_pk primary key(a)

    ) as

    select 1 a from dual union all

    select 2 a from dual union all

    select 3 a from dual;

    ```


    The constraints are built inline along with the table, and the initial values
    are created with a `CTAS` (`create table as SELECT`). Simple changes like the
    preceding batching can easily make installation scripts run an order of magnitude
    faster.


    By default, `SQL*Plus` reads one command and sends the command to the server,
    the server parses and executes the command, the server replies with a feedback
    message, and `SQL*Plus` displays the feedback message. Actually executing the
    commands usually isn’t the slowest part of `SQL*Plus` scripts. Avoiding the overhead
    of sending commands and receiving statuses can be a huge performance boost.


    There are many other tricks we can use to simplify installation scripts. For example,
    instead of using a huge number of `UNION ALL` commands, here are some tricks with
    hierarchical queries and predefined collections:


    ```

    --Alternate ways to generate numbers and other values.

    select level a from dual connect by level <= 3;

    select column_value a from table(sys.odcinumberlist(1,2,3));

    select column_value a from table(sys.odcivarchar2list(''A'',''B'',''C''));

    ```


    We could take batching a step further and use the `CREATE SCHEMA` syntax, which
    allows us to create multiple objects in a single command. In practice, that command
    goes a bit too far – debugging errors becomes difficult when our entire script
    is just a single command. And remember that we only need to batch *most* of our
    commands to get huge performance benefits.


    Anonymous blocks can also help us improve the performance of automatically generated
    scripts. Many database utilities don’t understand the importance of batching,
    and instead they create long lists of separate commands. It may be impractical
    to rewrite automatically generated scripts to use tricks like `UNION ALL`. But
    we can still realize most of the performance benefits by turning the list of commands
    into an anonymous block. Simply add `BEGIN` at the front of the script and `END;`
    at the end.


    Anonymous blocks are sent to the database as a single `PL/SQL` command. The server
    still needs to spend extra time parsing and executing multiple commands. But at
    least the network traffic and `SQL*Plus` overhead are eliminated.


    ### OLTP Applications


    OLTP applications are by nature one-at-a-time systems. But there are still plenty
    of opportunities to batch commands, both by working with the applications and
    by working with SQL.


    There used to be a battle between application developers and database developers
    – who would get to implement the “business logic”? The application developers
    won, and we database developers need to accept defeat. There’s no point trying
    to talk application developers out of using object-relational mapping tools like
    Hibernate (although it might be worth considering SQL-centric frameworks like
    jOOQ). Instead, we need to work with the existing tools and be willing to provide
    advanced SQL when possible.


    ORM tools may not always generate ideal SQL statements, but that doesn’t mean
    we don’t have any control over the SQL generation. Before we worry about row-by-row
    processing, we need to ensure the application is not making even bigger mistakes;
    applications should not frequently reconnect to the database, and applications
    should only use one command per logical change. Applications should certainly
    not make changes one *column* at a time. We do not want our application to `INSERT`
    an empty row and then run separate commands to `UPDATE` each column one at a time.


    Few systems are purely OLTP; there are usually some batch processes somewhere.
    Those processes are good candidates for advanced SQL or at least taking advantage
    of the applications’ batch processing features. Options like `JDBC batch execution`
    can create huge performance improvements.


    We don’t have to choose purely object-relational mapping or purely SQL. ORM frameworks
    can still run native queries and call custom `PL/SQL` functions. At the very least
    we can create views for the application. We shouldn’t limit ourselves purely to
    database-agnostic features – otherwise, why did we pay for Oracle?'
