  trans: '### 基数差异


    理解基数差异何时重要是关键。在前面的例子中，两个估算虽然都不准确，但仍然足够好。


    将基数估算视为只返回两种可能值会很有用：大或小。要检查 Oracle 是否选择了正确的值，`百分比`差异比`绝对`差异更重要。在第一个例子中，基数估算的绝对差异为
    334 行（估算 6924 行 – 实际 6590 行）。但 334 行相对于 6590 行来说不算太糟。在第二个例子中，基数估算的绝对差异为 13 行（估算
    14 行 – 实际 1 行）。


    第二个例子的误差在数量级上，但优化器仍然做出了良好的决策。我们需要调整对优化器估算的期望。对于结果“错误”到何种程度才重要，并没有精确的定义。但根据经验法则，在估算误差超过一个数量级之前，不必过于担心。


    回想第 16 章中的图表，它比较了不同的算法时间复杂度，如 `O(N)` 与 `O(M*LOG(N))`。在极端情况下，图表之间差异很大，但在中间也有一个很大的区域，性能大致相同。数据库算法并不高度敏感——基数的微小差异通常不会引起巨大问题。


    但不要认为这种大范围的可接受值意味着基数估算很容易。基数错误是乘法性的，而非加法性的。如果一个估算偏差 10 倍，另一个估算也偏差 10 倍，它们组合起来可能偏差
    100 倍。幸运的是，要解决这个问题，我们可能只需要修正其中一个错误的估算。只要估算在大致正确的范围内，Oracle 就能做出良好的决策。


    ### 成本无关紧要


    优化器的正式名称是基于成本的优化器。Oracle 为每个操作生成一个内部数值，即成本。我在本书中展示的大多数执行计划中移除了成本，因为成本通常对调优毫无价值。


    成本对 Oracle 内部肯定是有帮助的。我们也可以使用成本来快速比较执行计划将消耗的资源。但成本只是一个`估算`。而且成本在执行计划中并不总是有意义的累加。查看执行计划的成本并武断地说“哦，那个数字太大了”对我们来说毫无意义。


    更有意义的方法是通过 SQL 语句的运行时间来衡量它们。时间估算列比成本更有用，尽管时间估算常常极不准确。下一章将展示如何测量`实际`时间，而不仅仅是估算时间。有了实际时间，我们就能知道哪些语句和操作真正最耗时，而不必猜测。


    ### 优化器统计信息


    优化器统计信息是生成良好基数估算的关键。理论上，由于停机问题，不可能总是准确预测运行时间。实际上，借助正确的统计信息，优化器几乎总是能生成有用的预测。以下列表包含了所有不同类型的优化器统计信息，大致按重要性排序：


    1.  `表`：行数以及表以字节和块为单位的大小。基数仍然是最重要的指标，但表的字节数大小对于估算读取数据的时间很有用，尤其是在数据仓库中。

    2.  `列`：不同值的数量、空值、最高值和最低值，以及列使用信息。列使用信息很重要，因为优化器不会在从未在查询中有意义地使用过的列上收集直方图。

    3.  `直方图`：关于每列最常用值的详细信息。直方图在我们之前的 `LAUNCH` 示例中很有帮助，因为大多数 `SITE_ID` 只有几行，但少数 `SITE_ID`
    有很多行。

    4.  `索引`：B 树层级、行数、不同值的数量以及聚簇因子（可用于判断索引的效率）。

    5.  `分区`：也会为每个分区生成表、列、直方图和索引统计信息。

    6.  `扩展统计信息`：表达式或列组合的选择率。

    7.  `临时表`：与常规表类似，但可以为全局临时表、私有表或实体化公共表表达式生成统计信息。全局临时表统计信息可以是会话级或全局级的。获取这些统计信息可能很棘手，因为数据变化非常频繁。

    8.  `系统`：I/O 和 CPU 性能。此信息有助于生成更有意义的时间估算。了解单块读取时间和多块读取时间之间的差异，可以更准确地估算索引范围扫描和全表扫描之间的差异。理论上有用，但实践中很少使用。

    9.  `SQL 计划指令`：自动记录表达式和连接的基数错误统计信息，并在下次调整估算。默认禁用。

    10. `SQL 概要文件`：包含用于修改特定 SQL 语句估算的信息。SQL 概要文件包含可以改进估算或强制计划更改的提示。

    11. `用户定义`：过程代码可以使用 `ASSOCIATE STATISTICS` 或 Oracle 数据插件接口拥有自定义统计信息。

    12. `内联视图`：通过 `CARDINALITY` 等提示，我们可以为内联视图创建虚假的估算。


    正如我们所料，几乎所有上述信息都可以在数据字典中找到。优化器统计信息通常与主要元数据表一起存储，例如 `DBA_TABLES`、`DBA_TAB_COLUMNS`、`DBA_INDEXES`
    等。'
- fmt: "### Optimizer Statistics Example\n\n理解基数估计的精确来源可能比较困难。我们通常不需要知道执行计划是如何生成的精确细节。但如果我们确实需要这些细节，为了帮助理解优化器，本节包含一个生成和读取优化器跟踪（10053）的简单示例。\n\
    \n之前，我们检查了这个查询的执行计划：`SELECT * FROM LAUNCH WHERE SITE_ID = 1895`。优化器估计该查询将返回 6924\
    \ 行。但这个数字 6924 是从哪里来的呢？我们可以跟踪执行计划的生成过程，从而发现这个估计值是如何得出的。\n\n以下命令生成一个优化器跟踪文件，然后查找该文件的位置。查找跟踪文件可能比较棘手，因为跟踪文件是不断生成的，我们需要访问服务器文件系统：\n\
    \n```\n--Generate an optimizer trace file:\nalter session set events='10053 trace\
    \ name context forever, level 1';\nselect /* force hard parse */ * from launch\
    \ where site_id = 1895;\nalter session set events '10053 trace name context off';\n\
    --Find the latest .trc file in this directory:\nselect value from v$diag_info\
    \ where name = 'Diag Trace';\n```\n\n该跟踪文件很大，可能需要一分钟才能生成，并且充满了晦涩的数字和缩写。在那个大文件中，我们只对包含`SITE_ID`列信息的部分感兴趣。跟踪文件中的数字在你的机器上可能不同，但计算过程应该是一样的。以下是我数据库中跟踪文件的相关部分：\n\
    \n```\n...\nColumn (#12): SITE_ID(NUMBER)\nAvgLen: 4 NDV: 1579 Nulls: 0 Density:\
    \ 0.000195 Min: 0.000000 Max: 2.000000\nHistogram: Hybrid  #Bkts: 254  UncompBkts:\
    \ 5552  EndPtVals: 254  ActualVal: yes\nEstimated selectivity: 0.098163 , endpoint\
    \ value predicate, col: #12\nTable: LAUNCH  Alias: LAUNCH\nCard: Original: 70535.000000\
    \  Rounded: 6924  Computed: 6923.914805Non Adjusted: 6923.914805\n...\n```\n\n\
    为了得出最终的估计值 6924，Oracle 必须确定谓词`SITE_ID = 1895`的选择性，然后必须将该选择性乘以表中估计的行数。选择性是一个介于\
    \ 0 和 1 之间的数字，表示谓词从表中返回一行的概率。选择性计算有时可能很简单。例如，如果某个列上的等式谓词通常从十行的表中返回五行，则选择性为 0.5。但在我们这个更现实的例子中，Oracle\
    \ 不是使用简单的平均值，而是使用直方图来计算流行值的选择性。直方图是在收集优化器统计信息时生成的。普通的列统计信息包含整个列的平均选择性信息，而直方图则计算值范围和流行值的选择性。\n\
    \n以下数据字典查询显示`SPACE.LAUNCH.SITE_ID`有一个混合直方图。该直方图是基于 5552 行的样本构建的——这与我们在跟踪文件中看到的数字相同：\n\
    \n```\n--Column statistics for SPACE.LAUNCH.SITE_ID.\nselect histogram, sample_size\n\
    from dba_tab_columns\nwhere owner = 'SPACE'\nand table_name = 'LAUNCH'\nand column_name\
    \ = 'SITE_ID';\nHistogram   SAMPLE_SIZE\n---------   -----------\nHYBRID     \
    \        5552\n```\n\n直方图最多可以有 254 个桶。每个桶包含一个值范围的信息，以及最流行值的端点计数。`SITE_ID` 1895\
    \ 是一个流行值，是计数为 545 的端点：\n\n```\n--Histogram bucket for 1895.\nselect endpoint_repeat_count\n\
    from dba_histograms\nwhere owner = 'SPACE'\nand table_name = 'LAUNCH'\nand column_name\
    \ = 'SITE_ID'\nand endpoint_value = 1895;\nENDPOINT_REPEAT_COUNT\n---------------------\n\
    \                  545\n```\n\n遗憾的是，数字 545 不在跟踪文件中。我们只能去数据字典里查找它。当我们将跟踪文件中的数字与数据字典中的数字结合起来时，我们终于能看到\
    \ Oracle 是如何得出 6924 行的估计值的：\n\n```\nSelectivity = Number of Sampled Values / Number\
    \ of Sampled Rows\n0.098163 = 545 / 5552\nEstimated Cardinality = Total Rows *\
    \ Selectivity\n6924 = 70535 * 0.098163\n```\n\n扮演优化器侦探是痛苦的；如果你在前面的跟踪文件和查询中迷失了，没有必要回头深入研究它们。这个练习的重点是表明生成估计值需要许多优化器统计信息。如果需要，我们可以使用跟踪和数据字典来完全调试估计值是如何生成的。在下一章中，我们将学习如何更改这些值以获得更好的执行计划。\n\
    \n## Transformations and Dynamic Optimizations (Building Execution Plans II)\n\
    \n在构建执行计划时，Oracle 不仅限于我们编写的精确查询，也不仅限于某个时间点可用的信息。Oracle 可以通过转换来重写我们的查询。而且 Oracle\
    \ 可以通过动态优化使我们的 SQL 运行得越来越快。"
  raw: '### Optimizer Statistics Example


    Understanding exactly where the cardinality estimates come from can be difficult.
    We rarely need to know the precise details about how an execution plan was generated.
    But in case we ever need those details, and to help demystify the optimizer, this
    section includes a simple example of generating and reading an optimizer trace
    (10053).


    Previously, we examined the execution plan of this query: `SELECT * FROM LAUNCH
    WHERE SITE_ID = 1895`. The optimizer estimated the query would return 6924 rows.
    But where did the number 6924 come from? We can trace the execution plan generation
    and discover exactly how that estimate was derived.


    The following commands generate an optimizer trace file and then find the location
    of that file. Finding trace files may be tricky, because trace files are constantly
    generated, and we need to access the server file system:


    ```

    --Generate an optimizer trace file:

    alter session set events=''10053 trace name context forever, level 1'';

    select /* force hard parse */ * from launch where site_id = 1895;

    alter session set events ''10053 trace name context off'';

    --Find the latest .trc file in this directory:

    select value from v$diag_info where name = ''Diag Trace'';

    ```


    The trace file is huge, may take a minute to generate, and is full of cryptic
    numbers and abbreviations. In that large file, we are only interested in the section
    with information about the `SITE_ID` column. The numbers in the trace may be different
    on your machine, but the math should work out the same way. The following is the
    relevant section of the trace file from my database:


    ```

    ...

    Column (#12): SITE_ID(NUMBER)

    AvgLen: 4 NDV: 1579 Nulls: 0 Density: 0.000195 Min: 0.000000 Max: 2.000000

    Histogram: Hybrid  #Bkts: 254  UncompBkts: 5552  EndPtVals: 254  ActualVal: yes

    Estimated selectivity: 0.098163 , endpoint value predicate, col: #12

    Table: LAUNCH  Alias: LAUNCH

    Card: Original: 70535.000000  Rounded: 6924  Computed: 6923.914805Non Adjusted:
    6923.914805

    ...

    ```


    To create the final estimate of 6924, Oracle must determine how selective the
    predicate `SITE_ID = 1895` is, and it must then multiply that selectivity by the
    estimated number of rows in the table. Selectivity is a number between 0 and 1
    that represents the probability of a predicate returning a row from a table. Selectivity
    calculations can sometimes be simple. For example, if an equality predicate on
    a column usually returns five rows from a table with ten rows, the selectivity
    is 0.5. But in our more realistic example, instead of using simple averages, Oracle
    uses histograms to calculate the selectivity of popular values. Histograms are
    generated when optimizer statistics are gathered. While normal column statistics
    include information about the average selectivity of the whole column, histograms
    calculate the selectivity for both ranges of values and for popular values.


    The following data dictionary query shows that `SPACE.LAUNCH.SITE_ID` has a hybrid
    histogram. The histogram was built on a 5552-row sample – the same number we saw
    in the trace file:


    ```

    --Column statistics for SPACE.LAUNCH.SITE_ID.

    select histogram, sample_size

    from dba_tab_columns

    where owner = ''SPACE''

    and table_name = ''LAUNCH''

    and column_name = ''SITE_ID'';

    Histogram   SAMPLE_SIZE

    ---------   -----------

    HYBRID             5552

    ```


    Histograms can have up to 254 buckets. Each bucket includes information about
    a range of values, as well as an endpoint count for the most popular values. `SITE_ID`
    1895 is a popular value and is the endpoint with a count of 545:


    ```

    --Histogram bucket for 1895.

    select endpoint_repeat_count

    from dba_histograms

    where owner = ''SPACE''

    and table_name = ''LAUNCH''

    and column_name = ''SITE_ID''

    and endpoint_value = 1895;

    ENDPOINT_REPEAT_COUNT


    ```


    Unfortunately, the number 545 is not in the trace file. We just have to know to
    look it up in the data dictionary. When we combine the trace file numbers with
    the data dictionary numbers, we can finally see how Oracle came up with the estimate
    of 6924 rows:


    ```

    Selectivity = Number of Sampled Values / Number of Sampled Rows

    0.098163 = 545 / 5552

    Estimated Cardinality = Total Rows * Selectivity

    6924 = 70535 * 0.098163

    ```


    Playing optimizer detective is painful; if you got lost in the preceding trace
    files and queries, there’s no need to go back and study them further. The point
    of this exercise is to show that generating estimates requires many optimizer
    statistics. If we need to, we can use tracing and the data dictionary to completely
    debug how estimates are generated. In the next chapter, we’ll learn how to change
    those values to get better execution plans.


    ## Transformations and Dynamic Optimizations (Building Execution Plans II)


    When building execution plans, Oracle is not limited to precisely the query we
    wrote and is not limited to only the information available at one point in time.
    Oracle can rewrite our queries with transformations. And Oracle can make our SQL
    run progressively faster with dynamic optimizations.'
  trans: "\n### 优化器统计信息示例\n\n理解基数估计的具体来源可能比较困难。通常，我们不需要知道执行计划是如何生成的确切细节。但如果我们确实需要这些细节以帮助理解优化器，本节包含一个生成和读取优化器跟踪（10053）的简单示例。\n\
    \n之前，我们检查了这个查询的执行计划：`SELECT * FROM LAUNCH WHERE SITE_ID = 1895`。优化器估计该查询将返回 6924\
    \ 行。但这个数字 6924 是从哪里来的呢？我们可以跟踪执行计划的生成过程，从而发现这个估计值是如何得出的。\n\n以下命令生成一个优化器跟踪文件，然后查找该文件的位置。查找跟踪文件可能比较棘手，因为跟踪文件是不断生成的，我们需要访问服务器文件系统：\n\
    \n```\n--生成一个优化器跟踪文件：\nalter session set events='10053 trace name context forever,\
    \ level 1';\nselect /* force hard parse */ * from launch where site_id = 1895;\n\
    alter session set events '10053 trace name context off';\n--在此目录中查找最新的.trc 文件：\n\
    select value from v$diag_info where name = 'Diag Trace';\n```\n\n该跟踪文件很大，可能需要一分钟才能生成，并且充满了晦涩的数字和缩写。在那个大文件中，我们只对包含`SITE_ID`列信息的部分感兴趣。跟踪文件中的数字在你的机器上可能不同，但计算过程应该是一样的。以下是我数据库中跟踪文件的相关部分：\n\
    \n```\n...\nColumn (#12): SITE_ID(NUMBER)\nAvgLen: 4 NDV: 1579 Nulls: 0 Density:\
    \ 0.000195 Min: 0.000000 Max: 2.000000\nHistogram: Hybrid  #Bkts: 254  UncompBkts:\
    \ 5552  EndPtVals: 254  ActualVal: yes\nEstimated selectivity: 0.098163 , endpoint\
    \ value predicate, col: #12\nTable: LAUNCH  Alias: LAUNCH\nCard: Original: 70535.000000\
    \  Rounded: 6924  Computed: 6923.914805Non Adjusted: 6923.914805\n...\n```\n\n\
    为了得出最终的估计值 6924，Oracle 必须确定谓词`SITE_ID = 1895`的选择性，然后必须将该选择性乘以表中估计的行数。选择性是一个介于\
    \ 0 和 1 之间的数字，表示谓词从表中返回一行的概率。选择性计算有时可能很简单。例如，如果某个列上的等值谓词通常从十行的表中返回五行，则选择性为 0.5。但在我们这个更现实的例子中，Oracle\
    \ 不是使用简单的平均值，而是使用直方图来计算流行值的选择性。直方图是在收集优化器统计信息时生成的。普通的列统计信息包含整个列的平均选择性信息，而直方图则计算值范围和流行值的选择性。\n\
    \n以下数据字典查询显示`SPACE.LAUNCH.SITE_ID`有一个混合直方图。该直方图是基于 5552 行的样本构建的——这与我们在跟踪文件中看到的数字相同：\n\
    \n```\n--SPACE.LAUNCH.SITE_ID 的列统计信息。\nselect histogram, sample_size\nfrom dba_tab_columns\n\
    where owner = 'SPACE'\nand table_name = 'LAUNCH'\nand column_name = 'SITE_ID';\n\
    Histogram   SAMPLE_SIZE\n---------   -----------\nHYBRID             5552\n```\n\
    \n直方图最多可以有 254 个桶。每个桶包含一个值范围的信息，以及最流行值的端点计数。`SITE_ID` 1895 是一个流行值，是计数为 545 的端点：\n\
    \n```\n--1895 对应的直方图桶。\nselect endpoint_repeat_count\nfrom dba_histograms\nwhere\
    \ owner = 'SPACE'\nand table_name = 'LAUNCH'\nand column_name = 'SITE_ID'\nand\
    \ endpoint_value = 1895;\nENDPOINT_REPEAT_COUNT\n---------------------\n     \
    \             545\n```\n\n遗憾的是，数字 545 不在跟踪文件中。我们只能去数据字典里查找它。当我们将跟踪文件中的数字与数据字典中的数字结合起来时，我们终于能看到\
    \ Oracle 是如何得出 6924 行的估计值的：\n\n```\n选择性 = 采样值的数量 / 采样的行数\n0.098163 = 545 / 5552\n\
    估计基数 = 总行数 * 选择性\n6924 = 70535 * 0.098163\n```\n\n扮演优化器侦探是痛苦的；如果你在前面的跟踪文件和查询中迷失了，没有必要回头深入研究它们。这个练习的重点是表明生成估计值需要许多优化器统计信息。如果需要，我们可以使用跟踪和数据字典来完全调试估计值是如何生成的。在下一章中，我们将学习如何更改这些值以获得更好的执行计划。\n\
    \n## 转换与动态优化（构建执行计划 II）\n\n在构建执行计划时，Oracle 不仅限于我们编写的精确查询，也不仅限于某个时间点可用的信息。Oracle\
    \ 可以通过转换来重写我们的查询。而且 Oracle 可以通过动态优化使我们的 SQL 运行得越来越快。\n"
- fmt: "# Transformations\n\nOracle does not have to run the pieces of a SQL statement\
    \ in the exact order they are written. Oracle can transform the query into many\
    \ different, but logically equivalent, versions, to build the optimal execution\
    \ plan.\n\nFor the most part, these transformations are cool magic tricks that\
    \ happen behind the scenes. But it’s important to know what Oracle is capable\
    \ of; if we thought SQL statements really were executed exactly as is, then we\
    \ would be rightfully worried about using multiple inline views in large SQL statements.\
    \ And we need to know when Oracle is making a bad transformation so we can prevent\
    \ it. And we need to know when Oracle is not performing a transformation so we\
    \ can compensate for it with weird or repetitive code.\n\nTransformations only\
    \ occur within a single SQL statement. However, there are features where one SQL\
    \ statement may indirectly affect another: SQL plan directives, statistics gathering,\
    \ and block caching can cause one query to indirectly change the run time of another\
    \ query.\n\n## Common Unnamed Transformations\n\nThe most common transformations\
    \ don’t have a specific name. Oracle frequently changes the order of items in\
    \ a SQL statement. Predicates and joins are trivially reordered. The join syntax\
    \ is converted from `ANSI` syntax to the traditional syntax and sometimes the\
    \ other way around. `DISTINCT` operations can occasionally be moved sooner or\
    \ later in an execution plan. But there are also many important transformations\
    \ with specific names.\n\n## Specific Named Transformations\n\n### Predicate Pushing\n\
    \n**Predicate pushing** is when predicates in the outer query are pushed into\
    \ the inner query. This important transformation can explain why performance significantly\
    \ changes when two queries are put together. The following code is a trivial example\
    \ of predicate pushing:\n\n```sql\n--Trivial example of predicate pushing.\nselect\
    \ * from (select * from launch) where launch_id = 1;\n```\n\nOracle does not retrieve\
    \ all the rows from the `LAUNCH` table in the inline view and *then* filter the\
    \ rows with the predicate. Instead, Oracle rewrites the SQL statement and directly\
    \ applies the predicate to the table. By transforming the statement, Oracle can\
    \ then use an index unique scan to quickly retrieve a small number of rows.\n\n\
    ### View Merging\n\n**View merging** allows the optimizer to move tables in and\
    \ out of inline views. Oracle may not need to join two large tables together if\
    \ their results are going to be joined to a smaller table later. For example,\
    \ in the following code, Oracle does not need to directly join the relatively\
    \ large tables `SATELLITE` and `LAUNCH`. Instead, Oracle can first join the smaller\
    \ tables `SITE` and `LAUNCH`. That first join generates a tiny number of rows,\
    \ and then those small, intermediate results can be efficiently joined to the\
    \ larger `SATELLITE` table:\n\n```sql\n--Simple view merging example.\nselect\
    \ *\nfrom\n(\n  select *\n  from satellite\n  join launch using (launch_id)\n\
    ) launch_satellites\njoin site\non launch_satellites.site_id = site.site_id\n\
    where site.site_id = 200;\n```\n\n### Subquery Unnesting\n\n**Subquery unnesting**\
    \ happens when Oracle rewrites a correlated subquery as a join. If the main query\
    \ returns a small number of rows, and the subquery is fast, it makes sense to\
    \ run the subquery for each row. But if the main query returns a large number\
    \ of rows, or the subquery is slow, it makes sense to use a regular join operation.\
    \ In the following example, there are many rows in `LAUNCH` and `SATELLITE`, and\
    \ Oracle will almost certainly convert the query into a regular join:\n\n```sql\n\
    --Simple unnesting example.  (Launches with a satelite.)\nselect *\nfrom launch\n\
    where launch_id in (select launch_id from satellite);\n```\n\n### OR Expansion\n\
    \n**OR expansion** can happen to SQL statements with multiple `OR` conditions.\
    \ The statement can be broken into multiple pieces and then stitched together\
    \ with `UNION ALL`.\n\n## Seeing and Compensating for Transformations\n\nThere\
    \ are many other available transformations. If we want to see the final version\
    \ of our SQL statement, we can look in a `10053` trace, like the trace file that\
    \ was generated a few pages earlier. If we open that trace file and search for\
    \ “final query after transformations,” we will find the final version of our query.\
    \ Unfortunately, the transformed versions of our queries are painful to read.\
    \ Luckily, we don’t really care about the final version of our code; we only care\
    \ about the way it runs. The execution plan tells us how the transformed SQL statement\
    \ is executed, which is what really matters.\n\nTransformations are an interesting\
    \ topic, but we don’t need to fully understand transformations to use them. Being\
    \ aware of transformations helps because sometimes we need to make our own transformations.\
    \ Sometimes rewriting a query to use a different but equivalent syntax will bring\
    \ unexpected performance boosts. If predicate pushing doesn’t occur, then we may\
    \ need to repeat predicates. If subquery unnesting doesn’t occur, then we may\
    \ need to manually convert subqueries into joins."
  raw: '### Transformations


    Oracle does not have to run the pieces of a SQL statement in the exact order they
    are written. Oracle can transform the query into many different, but logically
    equivalent, versions, to build the optimal execution plan.


    For the most part, these transformations are cool magic tricks that happen behind
    the scenes. But it’s important to know what Oracle is capable of; if we thought
    SQL statements really were executed exactly as is, then we would be rightfully
    worried about using multiple inline views in large SQL statements. And we need
    to know when Oracle is making a bad transformation so we can prevent it. And we
    need to know when Oracle is not performing a transformation so we can compensate
    for it with weird or repetitive code.


    Transformations only occur within a single SQL statement. However, there are features
    where one SQL statement may indirectly affect another: SQL plan directives, statistics
    gathering, and block caching can cause one query to indirectly change the run
    time of another query.


    The most common transformations don’t have a specific name. Oracle frequently
    changes the order of items in a SQL statement. Predicates and joins are trivially
    reordered. The join syntax is converted from ANSI syntax to the traditional syntax
    and sometimes the other way around. `DISTINCT` operations can occasionally be
    moved sooner or later in an execution plan. But there are also many important
    transformations with specific names.


    **Predicate pushing** is when predicates in the outer query are pushed into the
    inner query. This important transformation can explain why performance significantly
    changes when two queries are put together. The following code is a trivial example
    of predicate pushing:


    ```

    --Trivial example of predicate pushing.

    select * from (select * from launch) where launch_id = 1;

    ```


    Oracle does not retrieve all the rows from the `LAUNCH` table in the inline view
    and *then* filter the rows with the predicate. Instead, Oracle rewrites the SQL
    statement and directly applies the predicate to the table. By transforming the
    statement, Oracle can then use an index unique scan to quickly retrieve a small
    number of rows.


    **View merging** allows the optimizer to move tables in and out of inline views.
    Oracle may not need to join two large tables together if their results are going
    to be joined to a smaller table later. For example, in the following code, Oracle
    does not need to directly join the relatively large tables `SATELLITE` and `LAUNCH`.
    Instead, Oracle can first join the smaller tables `SITE` and `LAUNCH`. That first
    join generates a tiny number of rows, and then those small, intermediate results
    can be efficiently joined to the larger `SATELLITE` table:


    ```

    --Simple view merging example.

    select *

    from

    (

    select *

    from satellite

    join launch using (launch_id)

    ) launch_satellites

    join site

    on launch_satellites.site_id = site.site_id

    where site.site_id = 200;

    ```


    **Subquery unnesting** happens when Oracle rewrites a correlated subquery as a
    join. If the main query returns a small number of rows, and the subquery is fast,
    it makes sense to run the subquery for each row. But if the main query returns
    a large number of rows, or the subquery is slow, it makes sense to use a regular
    join operation. In the following example, there are many rows in `LAUNCH` and
    `SATELLITE`, and Oracle will almost certainly convert the query into a regular
    join:


    ```

    --Simple unnesting example.  (Launches with a satelite.)

    select *

    from launch

    where launch_id in (select launch_id from satellite);

    ```


    **OR expansion** can happen to SQL statements with multiple `OR` conditions. The
    statement can be broken into multiple pieces and then stitched together with `UNION
    ALL`.


    There are many other available transformations. If we want to see the final version
    of our SQL statement, we can look in a 10053 trace, like the trace file that was
    generated a few pages earlier. If we open that trace file and search for “final
    query after transformations,” we will find the final version of our query. Unfortunately,
    the transformed versions of our queries are painful to read. Luckily, we don’t
    really care about the final version of our code; we only care about the way it
    runs. The execution plan tells us how the transformed SQL statement is executed,
    which is what really matters.


    Transformations are an interesting topic, but we don’t need to fully understand
    transformations to use them. Being aware of transformations helps because sometimes
    we need to make our own transformations. Sometimes rewriting a query to use a
    different but equivalent syntax will bring unexpected performance boosts. If predicate
    pushing doesn’t occur, then we may need to repeat predicates. If subquery unnesting
    doesn’t occur, then we may need to manually convert subqueries into joins.'
  trans: "\n# 转换\n\nOracle 不必严格按照 SQL 语句的书写顺序来执行其各个部分。Oracle 可以将查询转换为许多不同但逻辑上等价的版本，以构建最优的执行计划。\n\
    \n在大多数情况下，这些转换是在幕后发生的巧妙魔术。但是，了解 Oracle 能做什么是很重要的；如果我们认为 SQL 语句真的是严格按照原样执行的，那么我们就有理由担心在大型\
    \ SQL 语句中使用多个内联视图。并且我们需要知道 Oracle 何时进行了不好的转换，以便能够阻止它。我们还需要知道 Oracle 何时没有进行转换，以便我们能用古怪或重复的代码来进行补偿。\n\
    \n转换只发生在单个 SQL 语句内部。然而，有些特性可能导致一个 SQL 语句间接影响另一个：SQL 计划指令、统计信息收集和块缓存都可能使一个查询间接改变另一个查询的运行时长。\n\
    \n## 常见的未命名转换\n\n最常见的转换没有特定的名称。Oracle 经常改变 SQL 语句中各项的顺序。谓词和连接可以轻易地重新排序。连接语法会从\
    \ `ANSI` 语法转换为传统语法，有时反之亦然。`DISTINCT` 操作偶尔会在执行计划中提前或延后执行。但也有许多具有特定名称的重要转换。\n\n\
    ## 特定的命名转换\n\n### 谓词下推\n\n**谓词下推**是指将外层查询中的谓词推入内层查询。这一重要转换可以解释为什么将两个查询组合在一起时性能会发生显著变化。以下代码是谓词下推的一个简单示例：\n\
    \n```sql\n--谓词下推的简单示例。\nselect * from (select * from launch) where launch_id =\
    \ 1;\n```\n\nOracle 不会从内联视图中检索 `LAUNCH` 表的所有行，*然后*再用谓词过滤行。相反，Oracle 会重写 SQL 语句，并直接将谓词应用于表。通过转换语句，Oracle\
    \ 便可以使用索引唯一性扫描来快速检索少量行。\n\n### 视图合并\n\n**视图合并**允许优化器将表移入或移出内联视图。如果两个大表的结果稍后要与一个小表连接，Oracle\
    \ 可能不需要直接连接这两个大表。例如，在以下代码中，Oracle 不需要直接连接相对较大的表 `SATELLITE` 和 `LAUNCH`。相反，Oracle\
    \ 可以首先连接较小的表 `SITE` 和 `LAUNCH`。第一次连接生成了极少量的行，然后这些小的中间结果可以有效地与较大的 `SATELLITE` 表连接：\n\
    \n```sql\n--简单的视图合并示例。\nselect *\nfrom\n(\n  select *\n  from satellite\n  join\
    \ launch using (launch_id)\n) launch_satellites\njoin site\non launch_satellites.site_id\
    \ = site.site_id\nwhere site.site_id = 200;\n```\n\n### 子查询反嵌套\n\n当 Oracle 将相关子查询重写为连接时，就发生了**子查询反嵌套**。如果主查询返回少量行，且子查询很快，那么对每一行都运行子查询是有意义的。但是，如果主查询返回大量行，或者子查询很慢，那么使用常规连接操作就有意义了。在下面的例子中，`LAUNCH`\
    \ 和 `SATELLITE` 表中有很多行，Oracle 几乎肯定会将查询转换为常规连接：\n\n```sql\n--简单的反嵌套示例。（带有卫星的发射。）\n\
    select *\nfrom launch\nwhere launch_id in (select launch_id from satellite);\n\
    ```\n\n### OR 扩展\n\n**OR 扩展**可能发生在包含多个 `OR` 条件的 SQL 语句上。该语句可以被拆分成多个部分，然后用 `UNION\
    \ ALL` 拼接起来。\n\n## 查看和补偿转换\n\n还有许多其他可用的转换。如果我们想查看 SQL 语句的最终版本，可以查看 `10053` 跟踪文件，比如前几页生成的那个跟踪文件。如果我们打开那个跟踪文件并搜索\
    \ “final query after transformations”，我们会找到查询的最终版本。不幸的是，转换后的查询版本读起来很痛苦。幸运的是，我们其实并不关心代码的最终版本；我们只关心它的运行方式。执行计划告诉了我们转换后的\
    \ SQL 语句是如何执行的，这才是真正重要的。\n\n转换是一个有趣的话题，但我们不需要完全理解转换就能利用它们。意识到转换是有帮助的，因为有时我们需要进行自己的转换。有时重写查询以使用不同但等效的语法会带来意想不到的性能提升。如果谓词下推没有发生，那么我们可能需要重复谓词。如果子查询反嵌套没有发生，那么我们可能需要手动将子查询转换为连接。\n"
- fmt: '### Adaptive Cursor Sharing and Adaptive Statistics


    Execution plans can change at run time depending on bind variables, previous runs,
    and information gathered from other queries. We got a taste of Oracle’s dynamic
    execution plan abilities with the `FILTER` operation. Recent versions of Oracle
    have introduced many new dynamic optimizations.


    `Adaptive cursor sharing` lets a SQL statement have multiple execution plans depending
    on bind variables. Consider the previous example query: `SELECT * FROM LAUNCH
    WHERE SITE_ID = 1895`. That query is not entirely realistic; in practice, we would
    almost certainly use a bind variable instead of hard-coding a literal.


    Without access to literals, estimating cardinalities could become significantly
    harder. If we replaced `1895` with `:SITE_ID`, how would Oracle know if the predicate
    is selective and best served with an index or if the predicate is not selective
    and best served with a full table scan?


    The solution is that Oracle can peek at the bind variable value to create the
    first execution plan. If the relevant column data is skewed and has a histogram,
    the optimizer makes a note to check the bind variable next time. During the next
    run, if the bind variable value skews in a different way, Oracle creates a different
    execution plan.


    `Adaptive statistics` can change plans by gathering statistics during run time.
    These features are mostly disabled with the parameter `OPTIMIZER_ADAPTIVE_STATISTICS`
    defaulting to `false`. In a data warehouse environment, where it’s worth spending
    extra time building execution plans, it might be worth enabling these features.


    `Dynamic statistics`, also known as dynamic sampling, can make up for missing
    or inadequate optimizer statistics. Before a SQL statement is run, if statistics
    are missing, dynamic sampling gathers statistics based on a small number of blocks.


    Dynamic sampling is important and can be tricky to tune through the parameter
    `OPTIMIZER_DYNAMIC_SAMPLING`. But we almost certainly want this feature enabled,
    so we can at least gather dynamic statistics when a table is completely missing
    statistics. Because of dynamic sampling, missing statistics are better than bad
    statistics. Oracle can compensate for missing statistics, but bad statistics will
    be believed. Dynamic sampling in the Note section of an execution plan is often
    a sign that we forgot to gather stats. This phrase in an execution plan is a big
    red flag: “dynamic statistics used: dynamic sampling (level=2).”


    `Automatic reoptimization`, known in 11g as cardinality feedback, can help improve
    subsequent executions of the same statement. For statements that are missing statistics
    or are sufficiently complex, Oracle records the actual cardinality for different
    operations. If the actual and estimated cardinalities are sufficiently different,
    the optimizer may build a different execution plan the second time.


    `SQL plan directives` store statistical information about predicates. This information
    can be shared among many queries. The optimizer is able to make good cardinality
    estimates for simple equality and range predicates, but we shouldn’t expect the
    optimizer to be able to predict complex expressions the first time they run. With
    SQL plan directives, the optimizer can learn from its mistakes.


    ### Adaptive Query Plans


    Adaptive query plans let SQL statements have multiple execution plans. Queries
    can choose the best plan at run time, based on live cardinality numbers. When
    Oracle adds a `STATISTICS COLLECTOR` operation before a join, that operation records
    the actual cardinality and chooses the best plan accordingly. This feature is
    incredibly powerful but also makes execution plans harder to read.


    Let’s create an example of adaptive query plans using a simple join between `LAUNCH`
    and `SATELLITE`. The following two queries join the tables, but only for a specific
    launch year. There were many launches in 1970, but none in 2050, since the data
    set only goes to the year 2017. We want the first query, on a popular year, to
    use a hash join to deal with the large number of results. And the second query,
    on an unpopular year, should use a nested loop join to deal with the small number
    of results. But the way the predicates are written makes it hard for Oracle to
    accurately estimate the cardinality:


    ```

    --Launches in a popular and unpopular year.

    select * from launch join satellite using (launch_id)

    where to_char(launch.launch_date, ''YYYY'') = ''1970'';

    select * from launch join satellite using (launch_id)

    where to_char(launch.launch_date, ''YYYY'') = ''2050'';

    ```


    There are several ways we could provide more information to the optimizer. We
    could rewrite the predicate into a simpler date range, create an expression statistic,
    create a function-based index on the expression, etc. In older versions of Oracle,
    we would need to consider those approaches if the query was causing problems.
    But in modern versions, Oracle can fix the execution plan on the fly.


    For this more complex example, the `EXPLAIN PLAN` command isn’t good enough. We
    don’t want to look at an explain plan that shows what Oracle thinks it will run
    – we need to view an execution plan that shows what Oracle actually ran.


    For more complex SQL tuning, we typically need to start by finding the `SQL_ID`
    of the statement. Once we have the `SQL_ID`, we can plug it into many different
    programs.


    But the `SQL_ID` is not always trivial to find. There may be many false positives,
    especially since queries on `V$SQL` will return the query on `V$SQL`. Programs
    that return their own source code are called quines. Writing quines is an interesting
    challenge in most programming languages. In Oracle SQL, creating quines is annoyingly
    easy to do, and we need to adjust our queries to avoid them.


    The following SQL statement can be used to find the actual execution plan, for
    either 1970 or 2050. (To save space I commented out one of the relevant predicates,
    instead of displaying the query twice.)


    ```

    --Find actual execution plan of either 1970 or 2050 query.

    select * from table(dbms_xplan.display_cursor(

    sql_id =>

    (

    select distinct sql_id from v$sql

    where sql_fulltext like ''%= ''''1970''''%''

    --where sql_fulltext like ''%= ''''2050''''%''

    and sql_fulltext not like ''%quine%''

    ),

    format => ''adaptive'')

    );

    ```


    Notice that the preceding query gets the actual plan, not just the estimated plan,
    by using `DBMS_XPLAN.DISPLAY_CURSOR` instead of `DBMS_XPLAN.DISPLAY`. That new
    function requires the `SQL_ID`, which is found with the subquery against `V$SQL`.
    To avoid quines, the subquery needs the predicate `SQL_FULLTEXT NOT LIKE ''%QUINE%''`.
    Finally, to get the adaptive query plan details, we must use the argument `FORMAT
    => ''ADAPTIVE''`. With these advanced, dynamic features, finding the execution
    plans can be tricky.


    If we get the error “ORA-01427: single-row subquery returns more than one row,”
    that means we have multiple queries that match the text. If that error happens,
    we’ll need to add additional predicates. Or we could `SELECT * FROM V$SQL` in
    a separate step to find the `SQL_ID`.'
