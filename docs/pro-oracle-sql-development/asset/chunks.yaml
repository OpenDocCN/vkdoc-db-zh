  trans: '

    ## 非标准但仍有用


    旧的连接语法是在 SQL-92 标准完全确立之前创建的。在早期，每个数据库都必须创建自己的连接样式。所有关系型数据库都可以使用表列表样式进行内连接，但表示外连接的方式有很多种。在
    Oracle 中，外连接是通过在可选连接的一侧添加 `(+)` 操作符来标记的。


    对于大多数 ANSI 连接语法的倡导者来说，遵循标准是其最大的优点。确实，带有 `(+)` 操作符的查询在其他数据库上无法运行。但缺乏标准化和可移植性实际上并不那么重要。在实践中，如果我们正在利用有用的
    Oracle 特性，我们的查询无论如何都将不可移植。选择 ANSI 连接语法主要是一种风格选择（尽管在极少数情况下旧语法根本不起作用，例如全外连接）。


    然而，有时必须使用旧的连接语法。我们仍然需要熟悉 `(+)` 操作符，并能够在这两种语法之间进行转换。存在一些罕见的性能问题和语法错误，可以通过切换到旧语法来解决。而且位图连接索引和快速刷新物化视图要求使用旧语法。但这些例外情况不应主导我们的风格。


    ## 过多的上下文


    错误的 SQL 特性在我们的 SQL 语句中创造了过多的上下文和依赖关系。我们希望用小的、独立的代码块来构建我们的 SQL，并尽可能简单地连接这些块。我们应该避免使用增加上下文的功能，例如关联子查询和公用表表达式。


    ### 减少上下文的重要性


    上下文至关重要。我们不能孤立地理解代码。我们需要看到全局和所有元数据。当我们知道代码是谁写的、为什么写，以及我们正在查看的代码块前后的代码时，代码就更容易理解。上下文让我们对所阅读的内容有更深入的理解。


    但编程上下文是不同的。在编程中，上下文指的是我们程序的背景状态。这些信息可能有帮助，但当意外的副作用改变后台事物时，它更可能引起问题。代码不是具有多种有效解释的文学作品。我们的代码应该极其直白，尽可能少地包含背景信息。在编程时，上下文更有可能捉弄我们，而不是帮助我们。


    当程序中的 SQL 语句出现问题时，我们希望将该语句复制到我们的 IDE 中并独立运行它。然后我们会想要运行查询的小部分来查找错误。但上下文会碍事。SQL
    语句可能依赖于我们会话中未提交的数据、基于局部和全局变量的绑定变量、对象、用于外部表的操作系统文件等。


    良好的编程实践，如避免全局变量，可以减少上下文。查询至少有一些上下文是不可避免的，但我们仍然可以将其最小化。我们特别希望最小化查询内部的上下文。查询内的依赖关系必须保持在最低限度。在实践中，减少上下文意味着避免关联子查询和公用表表达式。


    ### 避免关联子查询


    关联子查询是在 `SELECT` 和 `WHERE` 子句中找到的、引用查询另一部分的子查询。关联子查询并非总是邪恶的，但如果我们一贯过度使用它们作为连接的替代品，它们会毁掉我们的查询。例如，让我们重写查找每次发射所用发动机数量的查询。不直接连接到
    `STAGE` 表，而是创建一个关联子查询：


    ```

    select launch.launch_tag, launch_vehicle_stage.stage_name,

    (

    select stage.engine_count

    from stage

    where stage.stage_name = launch_vehicle_stage.stage_name

    ) engine_count

    from launch

    join launch_vehicle_stage

    on launch.lv_id = launch_vehicle_stage.lv_id

    order by 1,2;

    ```


    前面示例中的关联子查询增加了语句的复杂性。乍一看，子查询似乎将 `STAGE` 与查询的其余部分隔离开来。但由于两个 `STAGE_NAME` 列之间的关联，关联子查询并没有创建一个独立的代码块。信息现在在两个方向上传递，我们无法简单地高亮显示并运行子查询来理解它。新查询仍然有效地连接了表，但连接是间接执行的，并且需要稍多一些代码。


    这个示例受关联子查询的影响并不严重，因为这个示例足够简单，可以记在脑子里。但在更大的查询中，关联子查询使得无法以小块的方式理解查询。前面的示例在 `SELECT`
    子句中使用了关联子查询，但在 `WHERE` 子句中的问题同样严重。


    ### 避免公用表表达式


    公用表表达式是一个有用的功能，但它们经常被过度使用，并不必要地增加了查询的上下文。公用表表达式也称为 `WITH` 子句或子查询因子化。例如，以下查询返回近期的深空任务：


    ```

    with launches as

    (

    select *

    from launch

    where launch_category = ''deep space''

    and launch_date >= date ''2000-01-01''

    )

    select *

    from launches

    join satellite

    on launches.launch_id = satellite.launch_id;

    ```


    在上面的查询中使用公用表表达式有一些小优势。公用表表达式从上到下流动，这是更传统的程序流方向。公用表表达式分离了 `LAUNCH` 谓词，使仅测试这两个谓词更容易。但公用表表达式并没有真正创建两个独立的部分。我们仍然不能高亮显示查询的下半部分并在
    IDE 中运行它。整个查询仍然紧密相连，必须作为一个整体来理解。公用表表达式增加了上下文的数量。


    有很多时候关联子查询和公用表表达式是有用的。有时关联子查询看起来就是有道理的，并且它们可能通过标量子查询缓存等特性提高性能。如果被多次引用，公用表表达式可以减少代码量，并可能通过物化结果来提高性能。但如果我们想要创建小的、模块化的代码，我们需要使用不同的技术。


    ## 集合、分块和函数式编程来救援


    关于传统 SQL 语法的问题就谈这么多——让我们来谈谈解决方案。我们如何编写功能强大的 SQL 语句同时保持其可读性？首先，我们需要将 SQL 语句视为嵌套的集合，而不是我们在图
    6-1 中看到的混乱的链接表。分块可以帮助我们管理这些集合。而应用函数式编程思想可以帮助我们简化代码。

    '
- fmt: '### Sets


    Thinking in sets helps us understand and visualize our SQL statements. Most SQL
    guides emphasize set-based processing to help us write faster SQL. Indeed, the
    performance benefits are enormous and are discussed multiple throughout Parts
    III and IV of this book. But this chapter focuses on how set-based thinking can
    also help us write `readable` SQL.


    A mathematical set is simply a collection of objects – an amorphous blob of stuff.
    We can describe a set as text, like `A = {1, 2, 3, 4}`. It’s also helpful to visualize
    sets, like in Figure 6-2.


    ![](images/471418_2_En_6_Chapter/471418_2_En_6_Fig2_HTML.png)


    A circle represents polygons, that consist of eight different shapes with different
    colors. Rectangle, square, two triangles, two hexagons, pentagon, and star.


    Figure 6-2


    “An example of a set” by Stephan Kulla is licensed under CC0


    Sets can contain other sets. Nesting sets is a powerful way of representing any
    kind of information. There are many ways to visualize sets, such as the Venn diagrams
    from Chapter 1 or the following diagram in Figure 6-3. The exact way of thinking
    about sets is unimportant. It only matters that we have a solid mental model of
    sets.


    ![](images/471418_2_En_6_Chapter/471418_2_En_6_Fig3_HTML.jpg)


    A circle represents polygons, which consist of eight different shapes with different
    colors. Regular polygons are squares, triangles, and pentagons by a dotted closed
    figure.


    Figure 6-3


    “Set of polygons, with a highlighted subset of regular polygons. Part of a set
    theory series” by Stephan Kulla is licensed under CC0


    But the analogy between our relational sets and mathematical sets is not perfect.
    Mathematical sets are supposed to be distinct. But as discussed in Chapter 1,
    it’s impractical to always require our relational data to be distinct. Mathematical
    sets can contain subsets of any type and in any shape. But as discussed in Chapter
    1, we need to store and project our data as simple rows with simple columns. When
    we combine multiple sets with joins, the results should always be simple tabular
    data. We should avoid storing sets within a single column, because that data is
    difficult to filter and join.


    ### Chunking


    Chunking is the process of taking small pieces of information and combining them
    into a new and meaningful entity. Chunking is a way for us to hold complex ideas
    in our head despite our limited amount of short-term memory.


    There’s no clear consensus on how many items we can hold in short-term memory,
    although `7 ± 2` seems to be a popular answer.^(12) We use chunking all the time,
    such as when we use a mnemonic device to remember the colors of the rainbow (`Roy
    G. Biv`) or when we try to remember a phone number by breaking it into small and
    memorable pieces. We can also use chunking to improve our SQL statements.


    It’s time to introduce the first and only complex example, using the space data
    set. Let’s find out which rocket fuels are the most popular for each year and
    look for trends. As technology changes, are rockets moving toward using a specific
    kind of fuel? To answer that question with the old join syntax, here’s the `FROM`
    clause:


    ```

    from launch, launch_vehicle_stage, stage, engine, engine_propellant, propellant

    ```


    Those six tables, their columns, and their relationships are too much to handle
    at one time. Instead, we can think of the query as a set of three different sets:
    the launches, launch vehicle engines, and engine fuels. Each one of those sets
    is a small, easily understandable query. And putting the sets together is easy.


    Since SQL statements have more connectivity than a typical set, we should adjust
    the rule of thumb from `7 ± 2` to `3 ± 1`. Figure 6-4 shows a Venn diagram of
    the joins between those three sets. Join Venn diagrams typically show tables,
    but in the relational model, there’s no difference between a table and a result
    set. Inner joins, left outer joins, and all other operations work the same way
    on tables and sets.


    ![](images/471418_2_En_6_Chapter/471418_2_En_6_Fig4_HTML.png)


    A Venn diagram for the relationships between launches, launch vehicle engines,
    and engines.


    Figure 6-4


    Venn diagram of joins between three relational sets


    Nesting sets is the key to simplifying our SQL. In some programming languages,
    a deeply nested structure is a problem. But in SQL, a deeply nested structure
    lets us simplify our code. Each level of our statements will have a small number
    of easily understandable chunks. The interface between chunks is always the same
    – boring old relational data. If one chunk is causing a problem, we can drill
    down and look at the next level of chunks and repeat until the entire query is
    correct.


    ### Functional Programming


    Functional programming can reduce dependencies and context. In functional programming,
    deterministic mathematical functions return the same values for the same inputs
    and do not depend on the program state. (This kind of function is different than
    `PL/SQL` functions, which may sometimes return different results for the same
    inputs.) Functional programs are declarative, which means we tell the program
    what we want but not how to do it.


    Removing program state removes unexpected side effects that cause many bugs. But
    it’s hard to completely remove program state – our programs must change things
    eventually. That limitation might explain why functional programming has never
    really taken off. The most widely used functional programming languages are R,
    Lisp, and Haskell. Those languages are popular but are rarely in a top ten list
    of programming languages. But the `idea` of functional programming has seeped
    into other languages.


    SQL was not designed to be a functional programming language, but our programs
    can easily implement functional programming ideas. Instead of passing in parameters
    and returning values, SQL statements deal with relational data: relational sets
    are the input, and a relational set is the output. That simplicity may feel limiting
    at first, but that limitation frees us from worrying about context. If we use
    simple inputs and outputs, we can easily understand a small chunk of SQL.


    SQL data should be passed through nested sets and only nested sets. By sticking
    to that rule, we only have to think about the data coming from one direction.
    That rule reduces the dependencies and the context. We want to minimize passing
    data through global variables, bind variables, correlated subqueries, and other
    side effects. At the lowest level of our SQL statements, sets come from relational
    tables. To pass results to the higher levels of our SQL statements, we must use
    inline views.


    ### Inline Views


    Inline views are the perfect way to create and assemble small chunks of SQL. Inline
    views help us simplify code by combining sets, chunks, and a functional programming
    style.'
