  trans: '

    # 10. 使用 Oracle 架构优化数据库


    SQL 和关系模型是建立在我们缓慢的物理机器之上的逻辑构造。甚至连 E.F. Codd 的原始论文也警告说，实现关系模型会遇到物理限制。我们使用的高级功能越多，对数据库施加的压力越大，Oracle
    的抽象层就越可能失效。Oracle 投入了大量努力使我们的 SQL 代码具备原子性、一致性、隔离性和持久性。但没有系统能隐藏所有的实现细节，我们需要理解 Oracle
    内部机制才能让系统高效运行。


    本章重点介绍 SQL 开发所需了解的实用架构信息。数据库管理员需要学习更多关于 Oracle 架构的知识，应该通读 622 页的《数据库概念》手册。开发人员可以通过略读该手册或参考本章信息来满足需求。


    ## 存储结构


    SQL 开发人员需要了解数据的存储方式。即使我们不负责管理数据库和存储，Oracle 的存储架构也会影响 SQL 语句的性能和锁定机制。我们可能还需要理解空间分配方式，以便知道需要请求多少空间以及如何避免浪费空间。


    存储结构按从小到大的顺序排列为：列值、行片断、块、区段、段、数据文件、表空间以及 ASM 或文件系统。该列表中除数据文件外，所有项目都是仅存在于数据库内部的逻辑存储结构，而数据文件是存在于操作系统上的物理存储结构。Oracle
    还有其他物理存储结构，如控制文件和参数文件，但这些结构对 DBA 比对开发人员更重要。我们列出的存储结构并非完美的层级结构，但已足够实用。该结构如图 10-1
    所示。


    ![](img/471418_2_En_10_Fig1_HTML.png)


    存储结构层级包括列、行片断、块、区段、段、数据文件、表空间以及 ASM 或文件系统。


    图 10-1

    存储结构层级


    ### 列值


    本书中我们已经多次遇到列值。我们已经了解如何使用`DUMP`函数查看数据的内部表示。最简单的数据类型——NUMBER、VARCHAR2 和 DATE——易于理解，无需进一步解释。这些数据类型应构成我们绝大多数列。


    大型对象的存储可能会变得相当复杂，例如 BLOB、CLOB 和 BFILE。`BFILE`是指向存储在文件系统上的二进制文件的指针，由操作系统管理。`BLOB`和`CLOB`可以内联存储，小于
    4000 字节的值可以与其他数据一起存储。大于 4000 字节的`BLOB`和`CLOB`必须外联存储，与表中的其他数据分开。


    每个`BLOB`和`CLOB`列都有一个单独的段来存储大型外联数据。在某些情况下，绝大部分表数据存储在 LOB 段中而非表段中。LOB 段可能使计算存储空间变得棘手。对于包含大型
    LOB 的表，我们不能仅在`DBA_SEGMENTS`中查找表名——还必须使用`DBA_LOBS`来查找 LOB 段。LOB 还具有许多存储属性，如表空间、压缩、加密、去重、日志记录、保留等。如果我们在
    LOB 中存储大量数据，需要仔细考虑每个 LOB 列的设置。


    外联 LOB 仍在表段中存储少量数据。每个 LOB 值都有一个指向 LOB 的定位符。系统会自动为每个 LOB 创建索引以帮助快速查找 LOB 数据。这些
    LOB 索引被赋予系统名称，如`SYS_IL0000268678C00010$$`，我们不应直接修改这些索引。


    非原子类型，如`XMLType`和对象类型，则更为复杂。但即使是这些复杂类型，在底层仍然存储在常规的列和行中。`DBA_NESTED_TABLES`和`DBA_TAB_COLS`^(²⁷)等数据字典表显示，这些花哨类型的存储方式与常规类型相同。无论我们做什么，数据都是以列和行的形式存储的，因此我们不应期望通过使用高级类型来获得神奇的性能提升。


    ### 行片断


    正如我们对关系数据库的期望，所有值都存储在列中，而列存储在行中。这些行可能被拆分成多个行片断并分散在多个块中（接下来将讨论）。Oracle 中的所有内容都必须适合一个块中，该块通常为
    8KB。这种大小限制意味着大行必须被拆分成多个片断，称为行链接。如果我们更新一行，而该行突然变得太大无法容纳于块中，整行可能会迁移到另一个块。在极少数情况下，行链接和行迁移可能导致性能问题。链接和迁移行需要为行片断或新位置创建额外的指针，这可能导致额外的读取操作。


    每行都可以通过`ROWID`伪列来标识，这类似于每行的物理地址。`ROWID`是查找行的最快方式——甚至比主键还快。但`ROWID`可能会改变，例如，如果我们压缩或重建表时。我们不应永久存储`ROWID`值并期望它日后仍能有效。


    列数据在行中的存储方式可能对我们的表设计有重要影响。对于每一行，Oracle 存储列数。对于每个列，Oracle 存储一个字节大小，然后是数据。（还有其他行元数据，但在此不重要。）


    例如，假设`LAUNCH`表中有三行，其中只有`LAUNCH_ID`列有值。该表有 14 列，因此这三行中的几乎所有值都是 NULL。再假设我们选择将`LAUNCH_ID`放在*最后*一列。每行以列数
    14 开始。然后是 13 个零，表示占 0 字节的空列。接着是一个 1，表示最后一列的大小，该列仅占 1 字节。最后是`LAUNCH_ID`值本身，它们是简单的整数。前三行可能如下所示：


    ```

    14|000000000000011

    14|000000000000012

    14|000000000000013

    ```


    Oracle 使用一个简单的技巧来节省尾随 NULL 的空间。如果我们将`LAUNCH_ID`放在表的*开头*，而所有其他值都是 NULL，那么列数将仅设为
    1。对于第一列，大小设为 1 字节，然后包含数据。对于其余列，不需要任何内容。Oracle 推断，如果 14 列中只有 1 列被包含，其余列必定为 NULL：


    ```

    1|11

    1|12

    1|13

    ```


    这种尾随 NULL 的技巧可以为宽而稀疏的表节省大量空间。但只有可空列放在表的末尾时，该技巧才能节省空间。我们通常不需要了解这类信息。但如果我们打算构建一些极端的东西，比如一个有上千列的表，利用
    Oracle 的物理架构可能会带来很大的不同。

    '
- fmt: '### Blocks and Row-Level Locking


    All columns and rows must fit inside blocks. A block is the atomic unit of Oracle
    read operations. Although we may only care about a single row, data is always
    read at least one block at a time. The default size of blocks is 8 kilobytes,
    so even if we only want 1 byte of data, Oracle will always read at least 8 kilobytes.
    (The operating system and storage device may read and write larger chunks as well.)
    Blocks can impact the performance and behavior of our database in several ways.


    Basic table compression is done per block. Each block contains metadata about
    common values, and the block can save space by not repeating those common values.
    If the same value is repeated, but not within 8 kilobytes of the previous value,
    the value won’t be compressed. But if the table is ordered by a column, repetitive
    values show up next to each other, and the compression ratio improves. We can
    make our compressed tables significantly smaller if our `INSERT` statement also
    has an `ORDER BY`.


    The block size is configurable, but we shouldn’t change it. There are many myths
    surrounding block sizes. I’ve never seen a reproducible test case demonstrating
    performance improvements from block size changes. But I have seen plenty of systems
    with a confusing mix of block sizes and incorrectly set parameters. Changing the
    block size won’t help with large reads anyway; Oracle will adjust the `DB_FILE_MULTIBLOCK_READ_COUNT`
    parameter to never exceed the operating system maximum. Unless you’re willing
    to spend a huge amount of time researching and testing, don’t use a custom block
    size.


    The `PCTFREE` parameter controls how much free space is left in new blocks and
    defaults to 10%. It’s important to have a little bit of free space, to prevent
    row migration. If the blocks were completely full, adding a single byte would
    require moving the entire row. If the table is read-only, and rows will never
    move, then changing `PCTFREE` to 0 can save space.


    Retrieving data in blocks explains why indexes don’t perform as well as we would
    like. Our SQL statements may only select 1% of all rows, but if we’re unlucky,
    that 1% is spread across 100% of the table blocks. Oracle may have to read a large
    percentage of the table to read a small percentage of the rows. This problem is
    represented by the clustering factor. Similar to compression, we can improve things
    by inserting data into the table in a specific order. But if we have multiple
    indexes, we may only be able to improve the clustering factor for a small number
    of them.


    Oracle’s row-level locking is implemented inside blocks. Whenever a transaction
    changes a row, that row is locked until the transaction is committed or rolled
    back. Only one transaction can modify the same row at the same time. Locks are
    not stored in a separate table – locking information is stored with the data blocks.
    Each block has an Interested Transaction List (ITL) that records which transaction
    is modifying which row, as well as a pointer to the relevant undo data.


    This row-level locking architecture means there’s no easy way to find out which
    rows are locked. Since lock information is stored inside each table, Oracle would
    have to read the entire table to know which row is locked and who locked it. And
    Oracle only stores the transaction that locked a row, not the specific statements.
    When we encounter a locking problem, we should ask *who* is blocking our statement,
    not *what* is blocking our statement. The following query is a simple way to find
    out who is blocking sessions:


    ```sql

    --Who is blocking a session.

    select final_blocking_session, gv$session.*

    from gv$session

    where final_blocking_session is not null

    order by gv$session.final_blocking_session;

    ```


    Once we have found the blocking session, it’s simple to figure out who owns that
    session, what they are doing, and how they locked the row. There are lots of complex
    locking scenarios, hidden parameters, lock modes, and other details. But most
    of the time, when our row is locked, it means somebody else was updating the row
    and forgot to commit their transaction.


    ### Extents


    An extent is a collection of blocks that belong to the same segment. Oracle may
    modify data one block at a time, but Oracle allocates new space one extent at
    a time. There are two algorithms for deciding how many blocks to allocate per
    extent; we can let Oracle decide with `AUTO`, or we choose a static size ourselves
    with `UNIFORM`.


    We should use the default, `AUTO`, and not worry about this setting unless we
    have an extreme case. For example, if we have thousands of tiny objects or partitions,
    we might want to save space by creating a small uniform size (although if we have
    that many objects, we have other problems and may need to rethink our design).
    There’s not much to worry about for extents, as long as we don’t mess with extent
    settings when we create tables and tablespaces.


    ### Segments


    A segment is a collection of extents. A segment is the entire storage structure
    for one logical object, although the definition of “object” can be a bit tricky.
    These objects are most commonly tables and indexes but can also include clusters,
    materialized views, LOBs, partitions and subpartitions, etc. Segments are usually
    the best storage structure for answering questions about object size, but the
    calculations can be tricky, especially when dropped objects are involved.


    It’s important to understand that a segment only applies to one logical object
    at a time. Space allocated to one table segment cannot be used by another table.
    For example, if we fill up a segment with a large table and then delete all the
    rows in that table, the space in that segment cannot be used by anything else.
    Unused space is why the `TRUNCATE` command is so important. Every segment has
    a high-water mark, to mark the largest amount of space used by that segment. The
    high-water mark is easy to increase but needs a DDL command to shrink. The empty
    space in a segment is not truly free space until we reset the high-water mark
    with a command like `TRUNCATE`.


    It is impossible to perfectly measure the size of our data. The difficulty of
    that task seems absurd at first. Data is just 0s and 1s. Shouldn’t it be trivial
    to count them? The problem is that there are so many ways to define “data.” It’s
    easy to include the table data by using `DBA_SEGMENTS.BYTES`. But since LOBs aren’t
    stored in the table, we should at least use `DBA_LOBS` to find related LOB segments.
    If we also want to count indexes, we should use `DBA_INDEXES` to find related
    index segments. But the default answers will include empty space in the blocks
    and the segments and will measure the compressed size. With all these variables,
    whatever number we come up with will never match the size of a text file of our
    data. It’s usually best to admit the answers won’t be perfect and just use the
    sum of all relevant segment sizes.


    When we want to measure or remove space, we also need to consider the recycle
    bin. Dropped objects disappear from our applications, but if the `PURGE` option
    wasn’t used, those objects may not disappear entirely. Instead, the segments related
    to the objects may have been prefixed with `BIN$` to mark them as being in the
    recycle bin. Oracle automatically removes the oldest objects from the recycle
    bin based on “space pressure.” Space pressure occurs when the system is running
    out of space. But it’s not clear what the criteria are; the old version of the
    manual was ambiguous, and the new version of the manual doesn’t discuss space
    pressure at all. To be safe, we should purge objects when possible. Data objects
    can be dropped permanently with the `PURGE` option, or we can use a command such
    as `PURGE USER_RECYCLEBIN` or `PURGE DBA_RECYCLEBIN`.


    Other non-permanent segment types include redo, undo, and temporary tablespaces.
    Those segment types are discussed elsewhere in this chapter.'
