- fmt: '### Large SQL Increases Optimizer Risks


    A common SQL performance problem is having two queries that run fast independently
    but run slowly when combined. Our initial experience might lead us to believe
    that combining large inline views causes performance problems. Our first impression
    is wrong, and we need to understand why these problems happen, how to fix the
    root causes, and how to work around the problems.


    The `optimizer` is discussed in more detail in Part IV. For now, all we need to
    know is that Oracle does not have to execute our queries in the order we write
    them. When we write SQL, we’re not asking Oracle to “run these commands”; we’re
    asking Oracle to “get data where these conditions are true.” The optimizer can
    transform our code into a different but logically equivalent version. The SQL
    statement actually run by Oracle may look significantly different than the one
    we wrote. We need to provide helpful information to the optimizer through accurate
    statistics, and we need to tune the optimizer’s SQL, not our SQL.


    For example, when we join two inline views, Oracle does not necessarily execute
    each inline view separately and then join them together. Oracle can rewrite the
    inline views into a single query, move conditions from one inline view into the
    other, etc.


    Those transformations are the reason putting inline views together may lead to
    better or worse performance. Combining queries gives Oracle more opportunities
    to optimize and improve performance. But combining queries also creates more opportunities
    to make a mistake and decrease performance.


    For example, the following code is almost certainly not executed in the order
    it appears. The predicate at the end of the SQL statement will be pushed into
    the inline view. Pushing that predicate allows Oracle to use an index, which can
    quickly look up the single row that matches the `LAUNCH_ID`. There’s no need for
    Oracle to read the whole table first and `then` filter the results. These transformations
    are an important feature that Oracle frequently uses to significantly improve
    performance:


    ```sql

    --An inline view that should be transformed.

    select *

    from

    (

    select *

    from launch

    )

    where launch_id = 1;

    ```


    Optimizer transformations can go horribly wrong and cause performance problems.
    Instead of simply turning off transformations, it’s best to understand *why* Oracle
    made a bad transformation. Finding the root cause of a bad transformation is difficult,
    but the root cause will reveal problems that affect other code. Part IV discusses
    transformations and performance tuning in more detail.


    In practice, we can’t get to the bottom of every performance issue. We may not
    have time to look at execution plans, optimizer settings, statistics, etc. Or
    we may have a monstrous execution plan, with hundreds of operations, and we don’t
    even know where to begin. In rare cases, a SQL statement is simply too complex
    for the optimizer to correctly estimate. Luckily, there’s a simple code trick
    to disable transformations and force the optimizer to view one SQL statement as
    two separate statements.


    When we know that two queries run fast independently, but slowly when run together,
    we can disable all transformations between them. The best way to disable transformations,
    and force Oracle to execute things in a specific order, is to use `ROWNUM`. The
    following example has a `ROWNUM` in the inline view, which prevents the `LAUNCH_ID`
    predicate from being pushed inside:


    ```sql

    --An inline view that cannot be transformed.

    select *

    from

    (

    select *

    from launch

    --Prevent query transformations.

    where rownum >= 1

    )

    where launch_id = 1;

    ```


    `ROWNUM` is a pseudo-column that is meant to be generated at the end of query
    execution, to add a simple incrementing number to each row. Since `ROWNUM` is
    meant to be used for the display order, Oracle will never transform an inline
    view that uses `ROWNUM`. This simple trick ensures our inline views will run as
    if they were executed separately.


    This `ROWNUM` trick is stupid, but it’s the least-worst option to a difficult
    problem. No other fix works reliably. There are combinations of hints that can
    do the same thing, but those hints are difficult to get right, and it’s easy to
    lose hints when queries are changed. I don’t like using cryptic code that doesn’t
    solve the root problem and looks logically redundant. But in practice this is
    an important trick worth remembering. As our SQL writing skills improve, we’re
    less likely to make mistakes that cause performance problems. As our database
    version increases, optimizer bugs get fixed, and new features solve more performance
    problems. On the other hand, those new skills and features will help us write
    larger queries, and we’ll still need to use this `ROWNUM` trick to handle exceptional
    cases. This trick is also used to fix type conversion bugs, as described in Chapter
    [15](#471418_2_En_15_Chapter.xhtml).


    ### Large SQL Resource Consumption Problems


    Batch processing with one large SQL statement is faster and more efficient than
    using multiple small SQL statements. While a large SQL statement uses less `cumulative`
    resources, that statement consumes more resources at a specific point in time.
    This consumption can cause issues with CPU, I/O, locks, redo, temporary tablespaces,
    and, most importantly, undo.


    Most changes need to be written to the undo tablespace. The larger the DML statement,
    the larger the amount of undo needed at one time. Multiple small changes will
    generate more undo overall, but that undo can be flushed in between commits. In
    addition, a longer-running query also needs to access more undo data. If a query
    has been running for an hour, the query may need to access undo data from an hour
    ago.


    It’s better to size our systems to support large DML, but allocating enough resources
    is not always feasible. There are times when we need to break statements into
    pieces, but that should not be our default behavior.


    ## Performance Benefits of Large SQL Statements


    Large SQL statements are more risky than small SQL statements when it comes to
    performance. But no risk, no reward. There are enormous potential performance
    benefits of using large SQL statements. Each of the risks and problems discussed
    in the previous section must be measured against the improvements and opportunities
    discussed in this section. If we follow the style suggestions in this chapter,
    we can increase performance through improved clarity, optimizer opportunities,
    reduced I/O, fewer context switches, and improved parallelism.


    ### Large SQL Improves Clarity


    The key to SQL tuning is to understand the meaning of a SQL statement. Understanding
    the SQL lets us rewrite the statement more efficiently and apply advanced features.
    We should always start from understanding the query; don’t jump right to execution
    plans, indexing, cryptic hints, etc. “Understand your business logic” is boring
    advice, but that doesn’t make it wrong.


    Large SQL statements, when built with the proper features and styles, will be
    easier to understand than the equivalent imperative programs. Writing good code
    invites others to participate, creating a virtuous circle. Improving performance
    is a wonderful side effect of writing clean code.'
  raw: '### Large SQL Increases Optimizer Risks


    A common SQL performance problem is having two queries that run fast independently
    but run slowly when combined. Our initial experience might lead us to believe
    that combining large inline views causes performance problems. Our first impression
    is wrong, and we need to understand why these problems happen, how to fix the
    root causes, and how to work around the problems.


    The Oracle optimizer is discussed in more detail in Part IV. For now, all we need
    to know is that Oracle does not have to execute our queries in the order we write
    them. When we write SQL, we’re not asking Oracle to “run these commands”; we’re
    asking Oracle to “get data where these conditions are true.” The optimizer can
    transform our code into a different but logically equivalent version. The SQL
    statement actually run by Oracle may look significantly different than the one
    we wrote. We need to provide helpful information to the optimizer through accurate
    statistics, and we need to tune the optimizer’s SQL, not our SQL.


    For example, when we join two inline views, Oracle does not necessarily execute
    each inline view separately and then join them together. Oracle can rewrite the
    inline views into a single query, move conditions from one inline view into the
    other, etc.


    Those transformations are the reason putting inline views together may lead to
    better or worse performance. Combining queries gives Oracle more opportunities
    to optimize and improve performance. But combining queries also creates more opportunities
    to make a mistake and decrease performance.


    For example, the following code is almost certainly not executed in the order
    it appears. The predicate at the end of the SQL statement will be pushed into
    the inline view. Pushing that predicate allows Oracle to use an index, which can
    quickly look up the single row that matches the `LAUNCH_ID`. There’s no need for
    Oracle to read the whole table first and *then* filter the results. These transformations
    are an important feature that Oracle frequently uses to significantly improve
    performance:


    ```

    --An inline view that should be transformed.

    select *

    from

    (

    select *

    from launch

    )

    where launch_id = 1;

    ```


    Optimizer transformations can go horribly wrong and cause performance problems.
    Instead of simply turning off transformations, it’s best to understand *why* Oracle
    made a bad transformation. Finding the root cause of a bad transformation is difficult,
    but the root cause will reveal problems that affect other code. Part IV discusses
    transformations and performance tuning in more detail.


    In practice, we can’t get to the bottom of every performance issue. We may not
    have time to look at execution plans, optimizer settings, statistics, etc. Or
    we may have a monstrous execution plan, with hundreds of operations, and we don’t
    even know where to begin. In rare cases, a SQL statement is simply too complex
    for the optimizer to correctly estimate. Luckily, there’s a simple code trick
    to disable transformations and force the optimizer to view one SQL statement as
    two separate statements.


    When we know that two queries run fast independently, but slowly when run together,
    we can disable all transformations between them. The best way to disable transformations,
    and force Oracle to execute things in a specific order, is to use `ROWNUM`. The
    following example has a `ROWNUM` in the inline view, which prevents the `LAUNCH_ID`
    predicate from being pushed inside:


    ```

    --An inline view that cannot be transformed.

    select *

    from

    (

    select *

    from launch

    --Prevent query transformations.

    where rownum >= 1

    )

    where launch_id = 1;

    ```


    `ROWNUM` is a pseudo-column that is meant to be generated at the end of query
    execution, to add a simple incrementing number to each row. Since `ROWNUM` is
    meant to be used for the display order, Oracle will never transform an inline
    view that uses `ROWNUM`. This simple trick ensures our inline views will run as
    if they were executed separately.


    This `ROWNUM` trick is stupid, but it’s the least-worst option to a difficult
    problem. No other fix works reliably. There are combinations of hints that can
    do the same thing, but those hints are difficult to get right, and it’s easy to
    lose hints when queries are changed. I don’t like using cryptic code that doesn’t
    solve the root problem and looks logically redundant. But in practice this is
    an important trick worth remembering. As our SQL writing skills improve, we’re
    less likely to make mistakes that cause performance problems. As our database
    version increases, optimizer bugs get fixed, and new features solve more performance
    problems. On the other hand, those new skills and features will help us write
    larger queries, and we’ll still need to use this `ROWNUM` trick to handle exceptional
    cases. This trick is also used to fix type conversion bugs, as described in Chapter
    [15](#471418_2_En_15_Chapter.xhtml).


    ### Large SQL Resource Consumption Problems


    Batch processing with one large SQL statement is faster and more efficient than
    using multiple small SQL statements. While a large SQL statement uses less *cumulative*
    resources, that statement consumes more resources at a specific point in time.
    This consumption can cause issues with CPU, I/O, locks, redo, temporary tablespaces,
    and, most importantly, undo.


    Most changes need to be written to the undo tablespace. The larger the DML statement,
    the larger the amount of undo needed at one time. Multiple small changes will
    generate more undo overall, but that undo can be flushed in between commits. In
    addition, a longer-running query also needs to access more undo data. If a query
    has been running for an hour, the query may need to access undo data from an hour
    ago.


    It’s better to size our systems to support large DML, but allocating enough resources
    is not always feasible. There are times when we need to break statements into
    pieces, but that should not be our default behavior.


    ## Performance Benefits of Large SQL Statements


    Large SQL statements are more risky than small SQL statements when it comes to
    performance. But no risk, no reward. There are enormous potential performance
    benefits of using large SQL statements. Each of the risks and problems discussed
    in the previous section must be measured against the improvements and opportunities
    discussed in this section. If we follow the style suggestions in this chapter,
    we can increase performance through improved clarity, optimizer opportunities,
    reduced I/O, fewer context switches, and improved parallelism.


    ### Large SQL Improves Clarity


    The key to SQL tuning is to understand the meaning of a SQL statement. Understanding
    the SQL lets us rewrite the statement more efficiently and apply advanced features.
    We should always start from understanding the query; don’t jump right to execution
    plans, indexing, cryptic hints, etc. “Understand your business logic” is boring
    advice, but that doesn’t make it wrong.


    Large SQL statements, when built with the proper features and styles, will be
    easier to understand than the equivalent imperative programs. Writing good code
    invites others to participate, creating a virtuous circle. Improving performance
    is a wonderful side effect of writing clean code.'
  trans: '### 大型 SQL 会增加优化器风险


    一个常见的 SQL 性能问题是，两个独立运行时速度很快的查询，组合在一起后运行缓慢。我们最初的经验可能会让我们认为，组合大型内联视图会导致性能问题。我们的第一印象是错误的，我们需要理解这些问题为何会发生，如何修复根本原因，以及如何规避这些问题。


    `优化器`将在第四部分详细讨论。目前，我们需要知道的是，Oracle 不必按照我们编写的顺序执行查询。当我们编写 SQL 时，我们并非在要求 Oracle
    “运行这些命令”；而是在要求 Oracle “获取满足这些条件为真的数据”。优化器可以将我们的代码转换为一个不同但在逻辑上等效的版本。Oracle 实际运行的
    SQL 语句可能与我们编写的看起来大不相同。我们需要通过准确的统计信息为优化器提供有用的信息，并且我们需要调优的是优化器的 SQL，而不是我们编写的 SQL。


    例如，当我们连接两个内联视图时，Oracle 不一定分别执行每个内联视图，然后再将它们连接起来。Oracle 可以将内联视图重写为单个查询，将条件从一个内联视图移到另一个，等等。


    这些转换正是将内联视图组合在一起可能导致性能变好或变坏的原因。组合查询为 Oracle 提供了更多优化和提升性能的机会。但组合查询也带来了更多犯错和降低性能的机会。


    例如，以下代码几乎肯定不会按其出现的顺序执行。SQL 语句末尾的谓词将被推入内联视图。推送该谓词允许 Oracle 使用索引，从而可以快速查找匹配 `LAUNCH_ID`
    的单行。Oracle 无需先读取整个表，`然后`过滤结果。这些转换是 Oracle 经常用来显著提升性能的一个重要特性：


    ```sql

    --一个应该被转换的内联视图。

    select *

    from

    (

    select *

    from launch

    )

    where launch_id = 1;

    ```


    优化器的转换可能出错并导致严重的性能问题。与其简单地关闭转换，不如理解*为什么* Oracle 做了一个糟糕的转换。找到糟糕转换的根本原因很困难，但这个根本原因会揭示影响其他代码的问题。第四部分将更详细地讨论转换和性能调优。


    在实践中，我们无法深入探究每一个性能问题。我们可能没有时间查看执行计划、优化器设置、统计信息等。或者我们可能面对一个庞大的执行计划，包含数百个操作，甚至不知从何开始。在极少数情况下，一条
    SQL 语句对于优化器来说过于复杂，无法正确估算。幸运的是，有一个简单的代码技巧可以禁用转换，并强制优化器将一条 SQL 语句视为两条独立的语句。


    当我们知道两个查询独立运行很快，但组合在一起运行很慢时，我们可以禁用它们之间的所有转换。禁用转换并强制 Oracle 按特定顺序执行的最佳方法是使用 `ROWNUM`。以下示例在内联视图中有一个
    `ROWNUM`，这阻止了 `LAUNCH_ID` 谓词被推入内部：


    ```sql

    --一个无法被转换的内联视图。

    select *

    from

    (

    select *

    from launch

    --防止查询转换。

    where rownum >= 1

    )

    where launch_id = 1;

    ```


    `ROWNUM` 是一个伪列，旨在查询执行结束时生成，为每一行添加一个简单的递增数字。由于 `ROWNUM` 旨在用于显示顺序，Oracle 绝不会转换使用
    `ROWNUM` 的内联视图。这个简单的技巧确保我们的内联视图能够像单独执行一样运行。


    这个 `ROWNUM` 技巧很笨拙，但它是应对难题的最不坏选择。没有其他修复方法能可靠地工作。有几种提示组合可以做到同样的事情，但这些提示很难写对，而且在查询更改时很容易丢失。我不喜欢使用那些不解决根本问题、逻辑上看起来冗余的晦涩代码。但在实践中，这是一个值得记住的重要技巧。随着我们
    SQL 编写技能的提高，我们不太可能犯导致性能问题的错误。随着数据库版本的升级，优化器的错误会被修复，新功能会解决更多的性能问题。另一方面，这些新技能和新功能将帮助我们编写更大的查询，我们仍然需要使用这个
    `ROWNUM` 技巧来处理特殊情况。这个技巧也用于修复类型转换错误，如第 15 章所述。


    ### 大型 SQL 资源消耗问题


    使用一条大型 SQL 语句进行批处理比使用多条小型 SQL 语句更快、更高效。虽然大型 SQL 语句使用的`累积`资源较少，但该语句在特定时间点消耗的资源更多。这种消耗可能导致
    CPU、I/O、锁、重做日志、临时表空间的问题，最重要的是，会导致撤销表空间的问题。


    大多数更改需要写入撤销表空间。DML 语句越大，一次所需的撤销量就越大。多个小更改总体上会产生更多的撤销，但这些撤销可以在提交之间被刷新。此外，运行时间较长的查询也需要访问更多的撤销数据。如果一个查询已经运行了一个小时，它可能需要访问一小时前的撤销数据。


    最好调整我们的系统以支持大型 DML，但分配足够的资源并不总是可行的。有时我们需要将语句拆分成片段，但这不应该是我们的默认行为。


    ## 大型 SQL 语句的性能优势


    在性能方面，大型 SQL 语句比小型 SQL 语句风险更大。但没有风险就没有回报。使用大型 SQL 语句有巨大的潜在性能优势。前一节讨论的每一个风险和问题，都必须与本节讨论的改进和机会进行权衡。如果我们遵循本章的风格建议，我们可以通过提高清晰度、增加优化器机会、减少
    I/O、减少上下文切换以及提高并行度来提升性能。


    ### 大型 SQL 提高清晰度


    SQL 调优的关键是理解 SQL 语句的含义。理解 SQL 让我们能够更高效地重写语句并应用高级功能。我们应该始终从理解查询开始；不要直接跳到执行计划、索引、晦涩的提示等。“理解你的业务逻辑”是一个无聊的建议，但这并不意味着它是错误的。


    当使用适当的特性和风格构建时，大型 SQL 语句将比等效的命令式程序更容易理解。编写优秀的代码会吸引他人参与，形成一个良性循环。提高性能是编写干净代码的一个美妙副作用。'
- fmt: '## Oracle优化：编写大型SQL语句的优势


    ### 大型SQL为优化器提供更多机会


    我们给予Oracle的代码和信息越多，优化器就有更多机会做出巧妙的处理。优化器构建SQL执行计划，并且一次只处理一个SQL语句。编写大型SQL语句为优化器提供了更多可操作的空间。


    如前所述，优化器可以将谓词推入内联视图，并可能在那些行与其他表连接之前就将它们过滤掉。除了下推谓词，Oracle还可以将连接上拉，并可以执行并非明确要求的连接。这种转换称为视图合并。


    例如，考虑以下伪查询。伪代码包含两个内联视图，然后将这些视图连接在一起：


    ```

    --使用内联视图的伪查询。

    select *

    from

    (

    ... a join b ...

    ) view1

    join

    (

    ... c join d ...

    ) view2

    on view1.something = view2.something;

    ```


    优化器可以将这些视图合并为一个类似这样的语句：


    ```

    --由视图合并产生的伪查询。

    select *

    from a

    join b ...

    join c ...

    join d ...

    ```


    Oracle不一定要按照表显示的顺序来连接它们。Oracle可以利用传递性连接；如果`A`连接到`B`并且`B`连接到`C`，那么Oracle可以直接将`A`连接到`C`。也许表`A`和`B`很大且没有过滤条件——将它们连接在一起非常耗时。而表`C`可能很小，并且经过过滤后只返回一行——与该表连接就很快。通过视图重合并、重新排序连接以及许多其他优化器转换，我们可以节省大量工作。


    ### 大型SQL减少输入/输出


    大型SQL语句可以帮助我们显著减少生成的I/O量。包含中间步骤的过程必须保存临时数据，通常保存在全局临时表中。这些临时表需要将数据写入磁盘，然后再从磁盘读取数据，而单个SQL语句可能能够将所有内容保留在内存中，无需写入任何内容到磁盘。


    当一个SQL语句无法在内存中处理所有内容时，Oracle可以自动使用临时表空间。例如，在排序或散列数据时，Oracle需要与被排序或散列的数据大致相同的空间。但是使用临时表和临时表空间有一个重要区别。写入表（即使是全局临时表）也会产生重做和撤销。而由于排序和散列写入临时表空间则不会产生任何重做或撤销。


    ### 大型SQL减少上下文切换


    从过程语言切换到SQL的每一次转换都会产生额外开销。使用大型SQL语句，我们只需支付一次这个代价。如果我们使用过程语言重复调用一个SQL语句，每次调用SQL都会支付代价。同样，如果我们的SQL语句调用自定义PL/SQL函数，每次函数调用也会支付代价。


    调用多个SQL语句可能产生巨大的开销，特别是当该调用涉及网络往返时。发送和接收消息以及解析SQL所需的时间可能比实际执行SQL还要长。用基于集合的解决方案替换逐行解决方案可以将性能提高几个数量级。


    从SQL调用PL/SQL产生的开销虽然不大，但它会快速累积。尽管SQL和PL/SQL紧密集成，我们仍然希望避免它们之间过多的上下文切换。当我们在PL/SQL中创建用户定义函数时，每次调用这些函数都需要花费少量时间在语言之间切换。而且由于优化器无法准确估算运行过程代码所需的时间，执行计划有可能会不必要地大量调用该函数。


    在前面和后续章节中展示了许多技巧，可以帮助减少PL/SQL开销：PL/SQL优化级别、编译器指令`PRAGMA UDF`、使用`ROWNUM`确保函数调用次数更少、函数缓存、SQL宏、创建自定义统计信息为函数提供成本估算等等。这些技巧很重要且通常是必要的，但它们应该始终作为我们无法将所有内容写在一个SQL语句中时的备选方案。'
  raw: '### Large SQL Increases Optimizer Opportunities


    The more code and information we give to Oracle, the more opportunities the optimizer
    has to do something clever. The optimizer builds SQL execution plans and only
    works on one SQL statement at a time. Building large SQL statements gives the
    optimizer more to work with.


    As previously discussed, the optimizer can push predicates into inline views and
    potentially filter out rows before those rows are joined to something else. Instead
    of pushing predicates down, Oracle can also pull joins up and can execute joins
    that weren’t explicitly asked for. That transformation is called view merging.


    For example, consider the following pseudo-query. The pseudo-code has two inline
    views and then joins the views together:


    ```

    --Pseudo-query using inline views.

    select *

    from

    (

    ... a join b ...

    ) view1

    join

    (

    ... c join d ...

    ) view2

    on view1.something = view2.something;

    ```


    The optimizer can merge these views into a statement like this:


    ```

    --Pseudo-query caused by view merging.

    select *

    from a

    join b ...

    join c ...

    join d ...

    ```


    Oracle doesn’t have to join tables in the same order they are displayed. Oracle
    can take advantage of transitive joins; if `A` joins to `B` and `B` joins to `C`,
    then Oracle can join `A` to `C` instead. Perhaps tables `A` and `B` are large
    and unfiltered – joining them together takes forever. And maybe table `C` is small
    and is filtered to only return one row – joining with that table is fast. We can
    save a lot of work by rearranging joins through view merging, reordering the joins,
    and many other optimizer transformations.


    ### Large SQL Reduces Input/Output


    Large SQL statements can help us dramatically decrease the amount of I/O generated.
    Processes with intermediate steps have to save temporary data, often in a global
    temporary table. Those temporary tables require writing data to disk and then
    later reading the data from disk, whereas a single SQL statement may be able to
    keep everything in memory and not need to write anything to disk.


    When a SQL statement can’t process everything in memory, Oracle can automatically
    use temporary tablespaces. For example, when sorting or hashing data, Oracle needs
    about as much space as the data being sorted or hashed. But there’s an important
    difference between using temporary tables and temporary tablespaces. Writing to
    tables, even global temporary tables, also generates redo and undo. Writing to
    temporary tablespaces because of sorting and hashing does not generate any redo
    or undo.


    ### Large SQL Reduces Context Switches


    Every change from a procedural language to SQL incurs extra overhead. With a large
    SQL statement, we only pay that price once. If we use a procedural language to
    repetitively call a SQL statement, we pay a price for each SQL call. Likewise,
    if our SQL statement calls a custom PL/SQL function, we pay a price for each function
    call.


    There can be a huge amount of overhead for calling multiple SQL statements, especially
    if that call involves a network round trip. Sending and receiving messages and
    parsing the SQL may take longer than actually executing the SQL. Replacing row-by-row
    solutions with set-based solutions can improve performance by orders of magnitude.


    The overhead generated by calling PL/SQL from SQL is not huge, but it can quickly
    add up. Even though SQL and PL/SQL are closely integrated, we still want to avoid
    too many context switches between them. When we create user-defined functions
    in PL/SQL, every call to those functions takes a small amount of time to change
    between languages. And since the optimizer cannot accurately estimate the time
    to run procedural code, there is a chance the execution plan will call the function
    an unnecessarily large number of times.


    There are many tricks demonstrated in the preceding and following chapters that
    can help reduce PL/SQL overhead: PL/SQL optimization levels, the compiler instruction
    `PRAGMA UDF`, using `ROWNUM` to ensure that functions are called less often, function
    caching, SQL macros, creating custom statistics to provide cost estimates for
    the function, etc. Those tricks are important and often necessary, but they should
    always be the backup plan for when we can’t write everything in a single SQL statement.'
  trans: '

    ## Oracle 优化：编写大型 SQL 语句的优势


    ### 大型 SQL 为优化器提供更多机会


    我们给予 Oracle 的代码和信息越多，优化器就有更多机会做出巧妙的处理。优化器构建 SQL 执行计划，并且一次只处理一个 SQL 语句。编写大型 SQL
    语句为优化器提供了更多可操作的空间。


    如前所述，优化器可以将谓词推入内联视图，并可能在那些行与其他表连接之前就将它们过滤掉。除了下推谓词，Oracle 还可以将连接上拉，并可以执行并非明确要求的连接。这种转换称为视图合并。


    例如，考虑以下伪查询。伪代码包含两个内联视图，然后将这些视图连接在一起：


    ```

    --使用内联视图的伪查询。

    select *

    from

    (

    ... a join b ...

    ) view1

    join

    (

    ... c join d ...

    ) view2

    on view1.something = view2.something;

    ```


    优化器可以将这些视图合并为一个类似这样的语句：


    ```

    --由视图合并产生的伪查询。

    select *

    from a

    join b ...

    join c ...

    join d ...

    ```


    Oracle 不一定要按照表显示的顺序来连接它们。Oracle 可以利用传递性连接；如果`A`连接到`B`并且`B`连接到`C`，那么 Oracle 可以直接将`A`连接到`C`。也许表`A`和`B`很大且没有过滤条件——将它们连接在一起非常耗时。而表`C`可能很小，并且经过过滤后只返回一行——与该表连接就很快。通过视图重合并、重新排序连接以及许多其他优化器转换，我们可以节省大量工作。


    ### 大型 SQL 减少输入/输出


    大型 SQL 语句可以帮助我们显著减少生成的 I/O 量。包含中间步骤的过程必须保存临时数据，通常保存在全局临时表中。这些临时表需要将数据写入磁盘，然后再从磁盘读取数据，而单个
    SQL 语句可能能够将所有内容保留在内存中，无需写入任何内容到磁盘。


    当一个 SQL 语句无法在内存中处理所有内容时，Oracle 可以自动使用临时表空间。例如，在排序或散列数据时，Oracle 需要与被排序或散列的数据大致相同的空间。但是使用临时表和临时表空间有一个重要区别。写入表（即使是全局临时表）也会产生重做和撤销。而由于排序和散列写入临时表空间则不会产生任何重做或撤销。


    ### 大型 SQL 减少上下文切换


    从过程语言切换到 SQL 的每一次转换都会产生额外开销。使用大型 SQL 语句，我们只需支付一次这个代价。如果我们使用过程语言重复调用一个 SQL 语句，每次调用
    SQL 都会支付代价。同样，如果我们的 SQL 语句调用自定义 PL/SQL 函数，每次函数调用也会支付代价。


    调用多个 SQL 语句可能产生巨大的开销，特别是当该调用涉及网络往返时。发送和接收消息以及解析 SQL 所需的时间可能比实际执行 SQL 还要长。用基于集合的解决方案替换逐行解决方案可以将性能提高几个数量级。


    从 SQL 调用 PL/SQL 产生的开销虽然不大，但它会快速累积。尽管 SQL 和 PL/SQL 紧密集成，我们仍然希望避免它们之间过多的上下文切换。当我们在
    PL/SQL 中创建用户定义函数时，每次调用这些函数都需要花费少量时间在语言之间切换。而且由于优化器无法准确估算运行过程代码所需的时间，执行计划有可能会不必要地大量调用该函数。


    在前面和后续章节中展示了许多技巧，可以帮助减少 PL/SQL 开销：PL/SQL 优化级别、编译器指令`PRAGMA UDF`、使用`ROWNUM`确保函数调用次数更少、函数缓存、SQL
    宏、创建自定义统计信息为函数提供成本估算等等。这些技巧很重要且通常是必要的，但它们应该始终作为我们无法将所有内容写在一个 SQL 语句中时的备选方案。

    '
- fmt: '### Large SQL Improves Parallelism


    大SQL语句是使用并行处理最高效的方式。如果我们有足够的资源，通过并行处理可以将程序性能提升数个数量级。在传统编程中，并行解决方案的构建可能极其困难。而使用SQL，并行编程可以简单到只需添加提示
    `/*+ PARALLEL */`。我们不必告诉Oracle如何构建并发程序；Oracle会为我们完成所有困难的工作。


    Oracle还能通过单指令多数据（SIMD）处理来利用并行性。现代CPU不仅拥有多个核心和线程，每条线程还能同时处理多个值。Oracle可以在大多数现代处理器上为内存操作使用SIMD。在少数处理器上，Oracle拥有“硅中SQL”特性，可以在硬件中执行部分SQL功能。虽然这些特性的确切工作原理尚不明确，但我们一次处理的数据越多，Oracle利用处理器并行性的可能性就越大。


    在并行处理中，大总是更好。一条语句处理海量数据，优于多条语句处理大量数据。因为单条语句只需支付一次进程启动和关闭的开销，并且只需处理一组分区粒度的偏斜问题。


    每当Oracle使用并行处理时，它必须创建大量进程、分配内存，并最终释放这些资源。Oracle将数据划分为分区粒度，并将粒度分配给并行进程。如果粒度大小不均衡，并且每个并行进程只被分配少量粒度，这种偏斜会显著影响性能。如果某个并行服务器的工作量大于其他服务器，那么所有进程都必须等待该线程。即使少量的串行开销也会抹去并行处理的大部分优势，这将在第16章进一步讨论。


    例如，让我们统计一个大型分区表的行数。许多程序员犹豫是否一次性读取整张表，而倾向于一次处理一个分区。图12-1是SQL监控活动报告，展示了并行读取每个分区所产生的活动。（请参阅GitHub仓库获取在您的系统上生成类似示例的代码。）不必担心图像细节；只需观察其形状。


    ![](images/471418_2_En_12_Chapter/471418_2_En_12_Fig1_HTML.png)


    CPU核心活动的图示。垂直的平行色带对应十二个sql id和其他活动。


    图 12-1

    并行处理大型表，一次一个分区


    请注意上图中顶部的锯齿状边缘。该过程中每条SQL语句都请求了16度的并行度。然而，很多时候活跃的SQL会话数少于16。代码运行了10分钟，如果报告能放大更多，我们会看到许多波峰和波谷。


    将图12-1与图12-2对比，后者显示了用一条语句统计整个表时的SQL监控活动报告。这张图更“无聊”，但在此情况下，无聊是好事。Oracle正在专注地做好一件事——平均活跃会话数几乎总是16。几乎没有任何时间浪费在进程的扩缩容上。当我们把整个工作交给一条语句，并让Oracle决定如何分配工作时，进程运行得更快。


    ![](images/471418_2_En_12_Chapter/471418_2_En_12_Fig2_HTML.png)


    CPU核心活动的片段。sql id和CPU活动显示为平行的灰色带，时间不同。红线标记在10的水平。


    图 12-2

    用一条语句并行处理大型表


    ## 阅读和调试大型SQL语句


    大型SQL语句的规模和结构最初可能具有挑战性。但是，通过良好的风格、一个IDE和实践，我们可以快速将任何代码解析为可读的块。


    ### 由内向外


    习惯Oracle SQL从最深层的内联视图开始执行的方式需要时间和努力。这种由内向外的流程与每个程序员习惯的传统自上而下的流程不同。


    例如，让我们再次查看第6章大型示例背后的代码。但这次我们将专注于查询的*形状*，而不是代码本身。该查询找到了每年使用的前三名火箭燃料。查询被分解为六个步骤，使用了内联视图、连接、条件、分组、排序和分析函数。如果我们剥离代码，只看注释，这些注释就讲述了查询的故事：


    ```

    --Top 3 fuels used per year.

    --

    --#6: Select only the top N.

    --#5: Rank the fuel counts.

    --#4: Count of fuel used per year.

    --#1: Orbital and deep space launches.

    --#2: Launch Vehicle Engines

    --#3: Engine Fuels

    ```


    我在示例中有点取巧，为每个内联视图添加了编号注释。除非代码特别复杂，我通常不会加数字。在本例中，这些数字对于教授如何可视化内联视图的流程很有用。


    没有那些数字时，缩进是理解代码结构的关键。我们不是使用Python，不是*必须*缩进，但不缩进会让人抓狂。


    最终，我们将能够轻松阅读这些嵌套结构。一开始很难，但我们需要拥抱这些递归结构的力量。我们无法现实地编写只使用一个子查询并自上而下流动的SQL代码；如果我们一次性连接所有表，最终会得到一团乱麻般的代码。我们也无法使用公用表表达式（CTE）来强制自上而下的结构。CTE对于避免重复很有用，但除此之外，它们通过增加上下文和使调试更困难，而使我们的语句变得更复杂。


    无论如何，我们需要学习这种由内向外的结构，以便理解执行计划。例如，图12-3是第6章示例代码的执行计划。就像内联视图一样，我们从最深的缩进层级开始，然后在该层级内自上而下阅读。然后我们向外移动一层并重复。


    ![](images/471418_2_En_12_Chapter/471418_2_En_12_Fig3_HTML.jpg)


    执行计划表格有3列和17行。它代表了Id、Operation和Name。


    图 12-3

    执行计划示例


    您不需要理解前面执行计划中的所有操作；只需观察执行计划的形状，并注意它与本节开头注释大纲的形状是多么相似。当我们阅读嵌套的内联视图时，我们理解SQL语句的方式类似于优化器的方式。'
  raw: '### Large SQL Improves Parallelism


    Large SQL statements are the most efficient way to use parallelism. If we have
    enough resources, we can improve program performance by orders of magnitude with
    parallel processing. In traditional programming, building parallel solutions can
    be ridiculously difficult. With SQL, parallel programming can be as easy as adding
    the hint `/*+ PARALLEL */`. We don’t have to tell Oracle how to build concurrent
    programs; Oracle will do all the hard work for us.


    Oracle can also take advantage of parallelism through single instruction multiple
    data (SIMD) processing. Modern CPUs don’t just have many cores and many threads.
    Each thread can process multiple values at the same time. Oracle can use SIMD
    for in-memory operations on most modern processors. On a few processors, Oracle
    has SQL-in-silicon features that can execute parts of SQL in hardware. It’s not
    clear exactly how those features work, but chances are the more data we process
    at once, the more likely Oracle can use processor parallelism.


    With parallel processing, bigger is always better. One statement processing a
    ginormous amount of data is better than multiple statements processing large amounts
    of data. A single statement only has to pay for process startup and shutdown once
    and only has to worry about one set of partition granule skewing.


    Every time Oracle uses parallel processing, it must create a lot of processes,
    allocate memory, and then eventually deallocate those resources. Oracle divides
    the data into partition granules and feeds the granules to the parallel processes.
    If the granule sizes are skewed and if each parallel process is only given a small
    number of granules, that skew can significantly impact performance. If one parallel
    server has more work than the others, then all the processes have to wait on one
    thread. Even a small amount of serial overhead can erase much of the benefits
    of parallelism and is discussed further in Chapter [16](#471418_2_En_16_Chapter.xhtml).


    For example, let’s count the number of rows in a large, partitioned table. Many
    programmers hesitate to read the entire table at once and prefer to process the
    table one partition at a time. Figure [12-1](#471418_2_En_12_Chapter.xhtml#Fig1)
    is the SQL Monitor Active Report, which shows the activity generated by reading
    each partition in parallel. (See the GitHub repository for the code to generate
    a similar example on your system.) Don’t worry about the details of the image;
    just look at the shape.


    ![](images/471418_2_En_12_Chapter/471418_2_En_12_Fig1_HTML.png)


    An illustration for the activity of C P U cores. It has vertically parallel color
    bands for twelve s q l id and others.


    Figure 12-1


    Processing a large table in parallel, one partition at a time


    Notice the jagged edges at the top of the preceding image. Each SQL statement
    in the process asked for a degree of parallelism of 16\. Yet there are many times
    when the number of active SQL sessions is less than 16\. The code ran for 10 minutes,
    and if the report could zoom in further, we would see many peaks and valleys.


    Contrast Figure [12-1](#471418_2_En_12_Chapter.xhtml#Fig1) with Figure [12-2](#471418_2_En_12_Chapter.xhtml#Fig2),
    which shows the SQL Monitor Active Report for counting the entire table with one
    statement. This image is more boring, but in this case boring is good. Oracle
    is doing one thing and doing it well – the average number of active sessions is
    almost always 16. There’s almost no time wasted scaling up and down the processes.
    The process runs faster when we give Oracle the entire job in one statement and
    let Oracle decide how to divide the work.


    ![](images/471418_2_En_12_Chapter/471418_2_En_12_Fig2_HTML.png)


    The snippet of activity for C P U cores. It has parallel gray color band for s
    q l id and CPU, with different timings. The red line is marked at a level of 10.


    Figure 12-2


    Processing a large table in parallel in one statement


    ## Reading and Debugging Large SQL Statements


    The size and structure of SQL statements can be challenging initially. But with
    a good style, an IDE, and practice, we can quickly dissect any code into readable
    chunks.


    ### Inside Out


    It takes time and effort to get used to the way Oracle SQL executes starting from
    the deepest inline view. This inside-out flow is different than the traditional
    top-to-bottom flow every programmer is used to.


    For example, let’s take another look at the code behind the large example in Chapter
    [6](#471418_2_En_6_Chapter.xhtml). But this time we’re going to focus on the *shape*
    of the query, not the code. That query found the top three rocket fuels used per
    year. The query was broken into six steps and used inline views, joins, conditions,
    grouping, ordering, and analytic functions. If we strip away the code and look
    only at the comments, these comments tell the story of the query:


    ```

    --Top 3 fuels used per year.

    --

    --#6: Select only the top N.

    --#5: Rank the fuel counts.

    --#4: Count of fuel used per year.

    --#1: Orbital and deep space launches.

    --#2: Launch Vehicle Engines

    --#3: Engine Fuels

    ```


    I kind of cheated in the example, by adding numbered comments to each inline view.
    Unless the code is particularly complicated, I don’t typically add numbers. In
    this case the numbers are useful for teaching how to visualize the flow of inline
    views.


    Without those numbers, indenting is the key to understanding the structure of
    the code. We’re not using Python, we don’t *have* to indent, but it would be crazy
    not to.


    Eventually we will be able to easily read those nested structures. It’s hard at
    first, but we need to embrace the power of these recursive structures. We can’t
    realistically write SQL code that only uses one subquery and flows top to bottom;
    we will end up with a mess of spaghetti code if we join all the tables at once.
    Nor can we use common table expressions to enforce a top-down structure. Common
    table expressions are useful to prevent repetition, but otherwise they make our
    statements more complicated by increasing the context and making debugging harder.


    We need to learn this inside-out structure anyway, in order to understand execution
    plans. For example, Figure [12-3](#471418_2_En_12_Chapter.xhtml#Fig3) is the execution
    plan for the Chapter [6](#471418_2_En_6_Chapter.xhtml) example code. Just like
    with inline views, we start with the most indented level and then read top to
    bottom within that level. Then we move out a level and repeat.


    ![](images/471418_2_En_12_Chapter/471418_2_En_12_Fig3_HTML.jpg)


    A table for execution plan has 3 columns and 17 rows. It represents the Id, operation,
    and name.


    Figure 12-3


    Execution plan example


    You don’t need to understand all the operations in the preceding execution plan;
    just look at the shape of the execution plan and note how it’s similar to the
    shape of the comment outline at the beginning of this section. When we read nested
    inline views, we’re trying to understand the SQL statement similar to the way
    the optimizer does.'
