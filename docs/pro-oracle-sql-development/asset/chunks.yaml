  trans: '

    ### 会话数据


    在 PL/SQL 中，有几种方法可以在会话内存储和共享数据。但在转向 PL/SQL 解决方案之前，我们应首先评估是否可以使用堆表、全局临时表或私有临时表来代替。如果表不适用，我们可以使用
    `会话状态` 来在会话持续期间持久化信息。会话状态是通过在包规范和包体中定义的全局变量构建的。这些全局包变量的值在对包的调用之间被保留。


    在包规范中定义的全局变量是公共的。全局公共变量更容易访问，但被认为是糟糕的编程实践，因为我们无法控制它们的使用方式。如果我们需要在包中维护全局变量，我们几乎总是应该在包体中定义它们使其成为私有的，然后为它们创建获取器和设置器。SQL
    无法直接访问包全局变量；我们无论如何都必须创建设置器和获取器，因此我们不妨尽可能多地使用私有变量。以下代码展示了这些规则的实际应用：


    ```

    --创建一个包含全局公共和私有变量的包。

    create or replace package test_package is

    g_public_global number;

    procedure set_private(a number);

    function get_private return number;

    end;

    /

    --创建一个设置和获取私有变量的包体。

    create or replace package body test_package is

    g_private_global number;

    procedure set_private(a number) is

    begin

    g_private_global := a;

    end;

    function get_private return number is

    begin

    return g_private_global;

    end;

    end;

    /

    --公共变量可以在 PL/SQL 中直接获取或设置。

    begin

    test_package.g_public_global := 1;

    end;

    /

    --私有变量不能直接设置。此代码会引发

    --"PLS-00302: component ''G_PRIVATE_GLOBAL'' must be declared"

    begin

    test_package.g_private_global := 1;

    end;

    /

    --公共变量仍然不能在 SQL 中直接读取。

    --此代码会引发 "ORA-06553: PLS-221: ''G_PUBLIC_GLOBAL'' is

    -- not a procedure or is undefined"

    select test_package.g_public_global from dual;

    --带有私有变量的获取器和设置器是首选。

    begin

    test_package.set_private(1);

    end;

    /

    --此函数可在 SQL 中使用。

    select test_package.get_private from dual;

    GET_PRIVATE


    ```


    全局变量创建了一个包状态，该状态会一直持续到会话结束。错误 “ORA-04068: existing state of packages has been
    discarded” 可能令人沮丧，但这个错误通常是我们自己的责任造成的。如果我们创建了全局变量，而包被重新编译，Oracle 无法知道如何处理现有的包状态。避免此错误的最佳方法是避免使用全局变量，除非我们确实需要它们。


    有时将数据存储在 `上下文` 中并使用 `SYS_CONTEXT` 函数读取是有帮助的。本书中多次使用了上下文数据，例如 `SYS_CONTEXT(''USERENV'',
    ''CURRENT_SCHEMA'')`。我们的许多会话设置可以通过默认的 `USERENV` 上下文获得，但我们也可以创建自己的上下文。自定义上下文对于向并行语句传递数据很有用，因为并行会话不继承包状态。


    在创建会话数据时，我们必须记住资源并非无限。会话数据将消耗 PGA 内存，因此我们应避免将大表加载到 PL/SQL 变量中。会话也会消耗 PGA 进行排序和哈希操作，消耗临时表空间进行排序和哈希操作，并且对于大型且长时间运行的语句，可能需要大量的撤销数据。如果我们使用连接池，并且会话积累了大量的私有数据，应用程序可能需要调用过程
    `DBMS_SESSION.RESET_PACKAGE`、`DBMS_SESSION.FREE_UNUSED_USER_MEMORY` 和 `DBMS_SESSION.CLEAR_ALL_CONTEXT(''CONTEXT_NAME'')`。对
    Oracle 架构的基本理解有助于管理会话资源。


    ### 事务 I：COMMIT、ROLLBACK 和 SAVEPOINT


    原子性是关系数据库最强大的优势之一——更改要么完全提交，要么完全不提交。Oracle 提供了实现原子性的机制，但使用事务控制语句来精确定义逻辑事务是我们的责任。我们的
    PL/SQL 代码可能包含许多 DML 语句，我们需要使用 `COMMIT`、`ROLLBACK` 和 `SAVEPOINT` 来确保我们的更改有意义。


    Oracle 会为会话中的第一个 DML 语句自动开始一个事务，但 Oracle 不会自动提交或回滚该事务。然而，这条规则有显著的例外；您的客户端或 IDE
    可能设置为自动提交，而像 `TRUNCATE` 和 `CREATE` 这样的 DDL 命令会自动提交。


    我们的大多数提交都应该是手动请求的，并且我们应该只在逻辑工作单元完成时发出 `COMMIT`。这个建议对某些人来说可能显而易见，但对于那些熟悉其他数据库架构（其中锁和事务是昂贵且需要避免的事物）的人来说，可能听起来值得怀疑。在
    Oracle 中，我们不想盲目地在每次更改后都提交。过度提交会导致性能问题，并且如果出现应用程序错误，可能会导致奇怪的半更改状态。


    `ROLLBACK` 命令与由错误引起的回滚之间有一个细微的区别。`ROLLBACK` 命令将撤销 *事务* 中所有未提交的更改。由异常引起的隐式回滚只会撤销
    *该语句*。隐式回滚就像回滚到在 PL/SQL 块开始时创建的 `SAVEPOINT` 一样。


    为了演示事务控制，我们需要从创建一个简单的表用于示例开始：


    ```

    --为事务测试创建一个简单的表。

    create table transaction_test(a number);

    ```


    异常不会自动回滚整个事务。如果我们运行以下命令，初始的 `INSERT` 成功，`UPDATE` 失败，但表仍然包含由初始 `INSERT` 创建的行：


    ```

    --插入一行：

    insert into transaction_test values(1);

    --失败并显示： ORA-01722: invalid number

    update transaction_test set a = ''B'';

    --表仍然包含原始插入的值：

    select * from transaction_test;

    A


    ```


    如果上述示例被包装在 PL/SQL 中，其行为会有所不同，因为 PL/SQL 块被视为单个语句。`INSERT` 仍然成功，`UPDATE` 仍然失败，但这个失败会导致所有内容的回滚，表中将没有数据：


    ```

    --重置临时表。

    truncate table transaction_test;

    --将正确的 INSERT 和错误的 UPDATE 组合在一个 PL/SQL 块中。

    --引发： "ORA-01722: invalid number"

    begin

    insert into transaction_test values(1);

    update transaction_test set a = ''B'';

    end;

    /

    --表为空：

    select * from transaction_test;

    A

    -

    ```


    这种回滚行为意味着我们通常不需要仅仅为了包含 `ROLLBACK` 命令而创建额外的 `EXCEPTION` 块。PL/SQL 异常已经会回滚整个块。如果我们包含一个显式的
    `ROLLBACK` 命令，它将回滚整个事务，包括 PL/SQL 块之前发生的事情。


    如果我们已经因为其他目的有了一个 `EXCEPTION` 块，只要我们也包含了一个 `RAISE`，我们可能仍然不需要包含 `ROLLBACK`。只要异常被传播，该语句就会被回滚。


    如果我们记住隐式语句回滚是如何工作的，我们就可以避免不必要的异常处理，如下例所示：


    ```

    --不必要的异常处理。

    begin

    insert into transaction_test values(1);

    update transaction_test set a = ''B'';

    exception when others then

    rollback;

    raise;

    end;

    /

    ```

    '
- fmt: "# 异常处理、事务与锁机制\n\n之前讨论的不必要的异常处理做得太多，但如果我们的异常处理做得太少，同样会陷入麻烦。例如，想象一下如果前面的异常代码是\
    \ `EXCEPTION WHEN OTHERS THEN NULL`。`INSERT` 仍然有效，`UPDATE` 仍然失败，但代码块忽略了异常；语句看起来成功完成，尽管它有一半失败了，我们最终可能得到部分提交的更改。事务控制是另一个例子，其中不进行异常处理通常是最佳选择。\n\
    \n虽然依赖 PL/SQL 代码块的隐式回滚是安全的，但我们不能总是依赖 SQL 客户端的隐式回滚。SQL*Plus 和大多数 SQL 客户端一样，默认在成功退出时执行\
    \ `COMMIT`，在会话异常终止时执行 `ROLLBACK`。但这种默认行为在 SQL*Plus 和其他客户端中是可配置的。最安全的做法总是在工作结束时包含一个\
    \ `COMMIT` 或 `ROLLBACK`。\n\n### 事务 II：隐式游标属性\n\n隐式游标属性对于管理事务通常很有用。在 DML 语句执行后，我们可能想知道有多少行被更改。这个行数对于日志记录或确定语句是否成功很有用。我们可以使用\
    \ `SQL%ROWCOUNT` 来查找受影响的行数，但我们必须在 `COMMIT` 或 `ROLLBACK` 之前引用隐式游标属性。下面的例子展示了如何正确和错误地使用\
    \ `SQL%ROWCOUNT`：\n\n```\n--正确：SQL%ROWCOUNT 在 ROLLBACK 之前。\nbegin\n  insert into\
    \ transaction_test values(1);\n  dbms_output.put_line('Rows inserted: '||sql%rowcount);\n\
    \  rollback;\nend;\n/\nRows inserted: 1\n\n--错误：SQL%ROWCOUNT 在 ROLLBACK 之后。\n\
    begin\n  insert into transaction_test values(1);\n  rollback;\n  dbms_output.put_line('Rows\
    \ inserted: '||sql%rowcount);\nend;\n/\nRows inserted: 0\n```\n\n### 事务 III：行级锁\n\
    \n在多用户环境中运行 PL/SQL 中的 SQL 语句变得更加复杂。幸运的是，Oracle 对多版本一致性模型的健壮实现避免了在许多其他数据库中看到的锁定问题。由于\
    \ Oracle 实现锁的方式，我们不必担心锁升级或读写器相互阻塞。但每个一致性和锁系统都有一些我们需要警惕的微妙细节。\n\n演示 Oracle 行级锁机制的一个好方法是使用一个奇怪且不切实际的例子。下面的代码演示了会话*最初*因为行锁而等待，但会话会*持续*等待直到阻塞事务完成。使用\
    \ `SAVEPOINT` 和 `ROLLBACK`，事务可以在不完成的情况下释放锁，从而为另一个会话“窃取”锁创造了机会：\n\n```\n--会话 #1：这些命令正常运行。\n\
    insert into transaction_test values(0);\ncommit;\nsavepoint savepoint1;\nupdate\
    \ transaction_test set a = 1;\n\n--会话 #2：此命令挂起，等待被锁定的行。\nupdate transaction_test\
    \ set a = 2;\n\n--会话 #1：回滚到之前的保存点。\n--注意，会话 #2 仍在等待。\nrollback to savepoint1;\n\
    \n--会话 #3：此命令窃取锁并完成。\n--注意，会话 #2 仍在等待，等待的行已不再被锁定。\nupdate transaction_test set\
    \ a = 3;\ncommit;\n```\n\n这种奇怪的锁窃取行为是 Oracle 存储锁数据方式的结果。Oracle 没有一个单独的表来存储所有的行锁。如果存在这样的表，我们可以用它来防止锁窃取场景，并用它来回答诸如“现在哪些行被锁定了？”这样的问题。但在实践中，锁窃取不是一个问题，如果被锁定的行没有阻塞任何操作，我们很少需要确切地知道它们是哪些行。这两个小缺点是为了避免维护一个需要大量额外开销的锁表而付出的合理代价。\n\
    \n锁不是存储在一个单独的表中，而是存储在包含被锁定行的数据块中，位于感兴趣事务列表中。ITL 是一个微小的数据结构，列出了哪个事务正在锁定哪一行。在前面的例子中，当会话\
    \ #2 尝试锁定一行时，它发现会话 #1 已经持有了锁。通过回滚到保存点，会话 #1 放弃了该锁，但会话 #2 没有被通知。不能指望会话 #2 检查每一行——那将需要不断地重新读取表。相反，会话\
    \ #2 等待会话 #1 完成，而这永远不会发生。回滚到保存点会放弃锁但不会结束事务。这为会话 #3 插队并窃取锁创造了机会。\n\n我们可能会争辩说，如果我们能够像这样“窃取”锁，那么\
    \ Oracle 并没有真正实现行级锁定。在实践中，这种情况极不可能发生。这个例子不是一个警告；它只是为了通过演示其怪癖之一来教授行级锁定的工作原理。"
  raw: 'The preceding, unnecessary exception handling does too much, but we can also
    get in trouble if our exception handling does too little. For example, imagine
    if the preceding exception code was `EXCEPTION WHEN OTHERS THEN NULL`. The `INSERT`
    still works, and the `UPDATE` still fails, but the block ignores the exception;
    the statement appears to complete successfully even though half of it failed,
    and we may end up with half-committed changes. Transaction control is another
    example of where doing no exception handling is often the best choice.


    While it’s safe to rely on implicit rollbacks of PL/SQL blocks, we cannot always
    rely on implicit rollbacks for our SQL client. SQL*Plus, like most SQL clients,
    defaults to `COMMIT` on a successful exit and `ROLLBACK` if the session was abnormally
    terminated. But that default behavior is configurable in SQL*Plus and other clients.
    It’s always safest to include a `COMMIT` or `ROLLBACK` at the end of our work.


    ### Transactions II: Implicit Cursor Attributes


    Implicit cursor attributes are often useful for managing transactions. After a
    DML statement executes, we may want to know how many rows were changed. The number
    of rows can be useful for logging or for determining if the statement was successful.
    We can use `SQL%ROWCOUNT` to find the number of rows affected, but we must reference
    implicit cursor attributes before a `COMMIT` or `ROLLBACK`. The following example
    shows how to correctly and incorrectly use `SQL%ROWCOUNT`:


    ```

    --Correct: SQL%ROWCOUNT is before ROLLBACK.

    begin

    insert into transaction_test values(1);

    dbms_output.put_line(''Rows inserted: ''||sql%rowcount);

    rollback;

    end;

    /

    Rows inserted: 1

    --Incorrect: SQL%ROWCOUNT is after ROLLBACK.

    begin

    insert into transaction_test values(1);

    rollback;

    dbms_output.put_line(''Rows inserted: ''||sql%rowcount);

    end;

    /

    Rows inserted: 0

    ```


    ### Transactions III: Row-Level Locking


    Running SQL statements in PL/SQL becomes more complicated in a multiuser environment.
    Luckily, Oracle’s robust implementation of a multiversion consistency model avoids
    the locking problems seen in many other databases. Due to the way Oracle implements
    locking, we don’t have to worry about lock escalation or readers and writers blocking
    each other. But every consistency and locking system has subtle details we need
    to watch out for.


    A good way to demonstrate Oracle’s row-level locking mechanism is with a weird,
    unrealistic example. The following code demonstrates that sessions *initially*
    wait because of a row lock, but the sessions *continue* to wait until the blocking
    transaction completes. With `SAVEPOINT` and `ROLLBACK`, a transaction can release
    a lock without completing, thus creating an opportunity for another session to
    “steal” a lock:


    ```

    --Session #1: These commands all run normally.

    insert into transaction_test values(0);

    commit;

    savepoint savepoint1;

    update transaction_test set a = 1;

    --Session #2: This command hangs, waiting for the locked row.

    update transaction_test set a = 2;

    --Session #1: Rollback to the previous savepoint.

    --Notice that session #2 is still waiting.

    rollback to savepoint1;

    --Session #3: This command steals the lock and completes.

    --Notice that session #2 is still waiting, on a row that is

    -- no longer locked.

    update transaction_test set a = 3;

    commit;

    ```


    This odd lock-stealing behavior is a consequence of the way Oracle stores lock
    data. Oracle does not have a separate table that stores all the row locks. If
    such a table existed, we could use it to prevent the lock-stealing scenario, and
    we could use it to answer questions like “What rows are locked right now?” But
    in practice, lock-stealing is not a problem, and we rarely need to know precisely
    what rows are locked if they are not blocking anything. Those two minor disadvantages
    are a good price to pay for not having a lock table that would require a tremendous
    amount of extra overhead.


    Instead of using a separate table, locks are stored inside the data block that
    contains the locked rows, in the Interested Transaction List. The ITL is a tiny
    data structure that lists which transaction is locking which row. In the preceding
    example, when session #2 tried to lock a row, it saw that session #1 already had
    the lock. By rolling back to the save point, session #1 gave up that lock, but
    session #2 is not notified. Session #2 can’t be expected to check the individual
    rows – that would require constantly rereading the tables. Instead, session #2
    waits for session #1 to finish, which never happens. Rolling back to a save point
    gives up a lock but doesn’t end the transaction. This creates an opportunity for
    session #3 to cut in line and steal the lock.


    We could argue that Oracle doesn’t really implement row-level locking if we are
    able to “steal” a lock like this. In practice this situation is very unlikely
    to ever occur. This example is not a warning; it’s only meant to teach how row-level
    locking works by demonstrating one of its quirks.'
