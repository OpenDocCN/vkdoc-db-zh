    Figure 1


    Diagram of the two most important tables


    ## Running Examples


    The examples should work with any currently supported platform, edition, and version
    of Oracle. This book conservatively assumes you are running on version 12.2, and
    it mentions whenever a feature is new to 18c, 19c, or 21c. In practice, the database
    version isn’t as important as recruiters would make you believe, and most of the
    information in this book applies to any version of Oracle.


    While the examples and results are usually shown as text, I strongly recommend
    you use a graphical IDE to run the examples and view the results. An IDE is essential
    for creating, reading, and debugging large, advanced SQL statements.


    To avoid repeating the schema name, the examples assume you installed the space
    data set in your personal schema. If you install the data set on a separate schema,
    run a command like this in your session before you run the examples:


    ```

    alter session set current_schema=space;

    ```


    Just like the data set, you can find all the code examples used in this book at
    [`https://github.com/apress/pro-oracle-sql-dev-2e`](https://github.com/apress/pro-oracle-sql-dev-2e).
    You can clone that repository and create a GitHub issue if you find any mistakes.


    Don’t let the data set and examples scare you. This book is about SQL development
    processes, advanced features, programming styles, and performance concepts. Running
    the examples is helpful but is not necessary for reading this book and understanding
    the material.


