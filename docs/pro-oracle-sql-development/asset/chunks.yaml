- fmt: "### Cursors\n\nCursors are pointers to SQL statements. There are many ways\
    \ to create and use cursors, and the technology has changed significantly over\
    \ the years. We need to be aware of all the options so that we can use the right\
    \ option in the right context. And we want to avoid using the old, inefficient\
    \ options when possible.\n\nA `ref cursor` is a common way to pass data to an\
    \ application. Ref cursors are pointers that are opened in PL/SQL code, but the\
    \ query does not run and return results until the application begins fetching\
    \ rows. Ref cursors are great for passing data to applications, but they are not\
    \ convenient for processing data inside a database. The following code shows how\
    \ easy it is to create a function that returns a ref cursor, and it demonstrates\
    \ both a static and a dynamic ref cursor. But there is no example here of consuming\
    \ ref cursors because that code is different for every application and IDE:\n\n\
    ```sql\n--Simple example of a ref cursor.\ncreate or replace function ref_cursor_test\n\
    return sys_refcursor is\n  v_cursor sys_refcursor;\nbegin\n  --Static ref cursor\
    \ based on a query.\n  open v_cursor for select * from launch;\n  --Dynamic ref\
    \ cursor based on a string.\n  --(A more realistic example would include bind\
    \ variables.)\n  open v_cursor for 'select * from launch';\n  return v_cursor;\n\
    end;\n/\n```\n\nAn `explicit cursor` is one of the oldest techniques for looping\
    \ through rows in PL/SQL. But as described in Chapter 15, we should avoid the\
    \ `CURSOR`/`OPEN`/`FETCH`/`CLOSE` syntax whenever possible. That syntax is almost\
    \ always uglier, more error prone, and slower than cursor `FOR` loops or a single\
    \ SQL statement. Explicit cursor processing can be sped up with features like\
    \ `FORALL` and `LIMIT`, but we’re still usually better off using different cursor\
    \ techniques. One of the few times we’re forced to use explicit cursors is when\
    \ we’re using a dynamic query that returns multiple rows (although 21c has a new\
    \ syntax that lets cursor `FOR` loops work with dynamic SQL).\n\nThe vast majority\
    \ of cursor processing in a database should be done with one of the remaining\
    \ three options: `SELECT INTO`, cursor `FOR` loops, and `SELECT BULK COLLECT INTO`.\
    \ Table 21-1 describes when we want to use these three techniques.\n\nTable 21-1\n\
    When to Use Different Cursor Types\n\n| | One Row | Many Rows |\n| :--- | :---\
    \ | :--- |\n| **Static SQL** | `SELECT INTO` | Cursor `FOR` loop |\n| **Dynamic\
    \ SQL** | `SELECT INTO` | `SELECT BULK COLLECT INTO` |\n\n`SELECT INTO` is best\
    \ for static or dynamic queries that return one row. This syntax has already been\
    \ used a few times in this book because it’s the fastest and easiest way to get\
    \ simple values. The following is a simple example of the static and dynamic SQL\
    \ syntax:\n\n```sql\n--Static and dynamic SELECT INTO for one row.\ndeclare\n\
    \  v_count number;\nbegin\n  select count(*) into v_count from launch;\n  execute\
    \ immediate 'select count(*) from launch' into v_count;\nend;\n/\n```\n\nProblems\
    \ happen when a `SELECT INTO` returns zero rows or more than one row. Queries\
    \ that return zero rows will raise the exception “ORA-01403: no data found.” Queries\
    \ that return more than one row will raise the exception “ORA-01422: exact fetch\
    \ returns more than requested number of rows.” But those exceptions are easy to\
    \ handle. The tricky part of `SELECT INTO` is when something goes wrong but an\
    \ exception is not raised.\n\nIn PL/SQL, every `SELECT` must have an `INTO`. It\
    \ makes no sense to run a query and do nothing with the results. In the preceding\
    \ example, if we remove the `INTO v_count` from the static query, the PL/SQL block\
    \ understandably raises the exception “PLS-00428: an INTO clause is expected in\
    \ this SELECT statement.” But if we remove the `INTO v_count` from the dynamic\
    \ query, the query is partially run, and the PL/SQL block does not raise an exception.\n\
    \nThe most confusing example of missing exceptions is when the no-data-found exception\
    \ is raised in a SQL context. For example, look at the following function. This\
    \ function combines a `SELECT INTO` with `WHERE 1=0`, which is a recipe for no-data-found\
    \ exceptions. Yet when the function is run in a SQL statement, the function returns\
    \ NULL instead of raising an exception:\n\n```sql\n--This function fails yet does\
    \ not raise an exception in SQL.\ncreate or replace function test_function return\
    \ number is\n  v_dummy varchar2(1);\nbegin\n  select dummy into v_dummy from dual\
    \ where 1=0;\n  return 999;\nend;\n/\nselect test_function from dual;\n```\n\n\
    SQL is built to work with things that return nothing. In this context, “nothing”\
    \ doesn’t mean NULL; it means no results at all. For example, an inline view with\
    \ a condition like `WHERE 1=0` won’t return any data, but the statement still\
    \ runs. We expect SQL to work when no data is found, but we expect PL/SQL to fail\
    \ when no data is found. It’s easy to forget that when we combine PL/SQL and SQL,\
    \ the no-data-found exceptions are ignored.\n\nIf we want to see those no-data-found\
    \ exceptions in SQL, we must catch and reraise them as a different exception.\
    \ Normally, catching and reraising is a bad idea because it’s easy to lose details\
    \ of the call stack. In this case, we have no choice. The following function shows\
    \ how to catch a no-data-found exception and raise a different kind of exception\
    \ that won’t be ignored by SQL:\n\n```sql\n--This function re-raises NO_DATA_FOUND\
    \ exceptions.\ncreate or replace function test_function2 return number is\n  v_dummy\
    \ varchar2(1);\nbegin\n  select dummy into v_dummy from dual where 1=0;\n  return\
    \ 999;\nexception\n  when no_data_found then\n    raise_application_error(-20000,\
    \ 'No data found detected.');\nend;\n/\n--Raises: \"ORA-20000: No data found detected.\"\
    .\nselect test_function2 from dual;\n```\n\nWe don’t need to include exception\
    \ handling with every `SELECT INTO`. We only need to reraise exceptions for `SELECT\
    \ INTO`s that will be called from SQL and have a chance of raising no-data-found\
    \ exceptions.\n\n`Cursor FOR loops` are best for static queries that return multiple\
    \ rows. With cursor `FOR` loops, we don’t need to explicitly open and close the\
    \ cursor or define variables or worry about batching or limiting the results.\
    \ Oracle takes care of all the details for us.\n\nWe’ve already seen code similar\
    \ to the following example. This code is worth repeating because too many developers\
    \ waste too many lines of code dealing with explicit cursors. All we need to do\
    \ is loop through the results:\n\n```sql\n--Simple cursor FOR loop example.\n\
    begin\n  for launches in\n  (\n    --Put huge query here:\n    select * from launch\
    \ where rownum <= 5\n  ) loop\n    --Do something with result set here:\n    dbms_output.put_line(launches.launch_tag);\n\
    \  end loop;\nend;\n/\n```\n\n`BULK COLLECT INTO` is best for dynamic queries\
    \ that return multiple rows. To use this feature, we first need to understand\
    \ the basics of records and collections, which are discussed in the next sections."
  raw: '### Cursors


    Cursors are pointers to SQL statements. There are many ways to create and use
    cursors, and the technology has changed significantly over the years. We need
    to be aware of all the options so that we can use the right option in the right
    context. And we want to avoid using the old, inefficient options when possible.


    A **ref cursor** is a common way to pass data to an application. Ref cursors are
    pointers that are opened in PL/SQL code, but the query does not run and return
    results until the application begins fetching rows. Ref cursors are great for
    passing data to applications, but they are not convenient for processing data
    inside a database. The following code shows how easy it is to create a function
    that returns a ref cursor, and it demonstrates both a static and a dynamic ref
    cursor. But there is no example here of consuming ref cursors because that code
    is different for every application and IDE:


    ```

    --Simple example of a ref cursor.

    create or replace function ref_cursor_test

    return sys_refcursor is

    v_cursor sys_refcursor;

    begin

    --Static ref cursor based on a query.

    open v_cursor for select * from launch;

    --Dynamic ref cursor based on a string.

    --(A more realistic example would include bind variables.)

    open v_cursor for ''select * from launch'';

    return v_cursor;

    end;

    /

    ```


    An **explicit cursor** is one of the oldest techniques for looping through rows
    in PL/SQL. But as described in Chapter [15](#471418_2_En_15_Chapter.xhtml), we
    should avoid the `CURSOR`/`OPEN`/`FETCH`/`CLOSE` syntax whenever possible. That
    syntax is almost always uglier, more error prone, and slower than cursor `FOR`
    loops or a single SQL statement. Explicit cursor processing can be sped up with
    features like `FORALL` and `LIMIT`, but we’re still usually better off using different
    cursor techniques. One of the few times we’re forced to use explicit cursors is
    when we’re using a dynamic query that returns multiple rows (although 21c has
    a new syntax that lets cursor `FOR` loops work with dynamic SQL).


    The vast majority of cursor processing in a database should be done with one of
    the remaining three options: `SELECT INTO`, cursor `FOR` loops, and `SELECT BULK
    COLLECT INTO`. Table [21-1](#471418_2_En_21_Chapter.xhtml#Tab1) describes when
    we want to use these three techniques.


    Table 21-1


    When to Use Different Cursor Types


    |   | One Row | Many Rows |

    | --- | --- | --- |

    | **Static SQL** | `SELECT INTO` | Cursor `FOR` loop |

    | **Dynamic SQL** | `SELECT INTO` | `SELECT BULK COLLECT INTO` |


    **SELECT INTO** is best for static or dynamic queries that return one row. This
    syntax has already been used a few times in this book because it’s the fastest
    and easiest way to get simple values. The following is a simple example of the
    static and dynamic SQL syntax:


    ```

    --Static and dynamic SELECT INTO for one row.

    declare

    v_count number;

    begin

    select count(*) into v_count from launch;

    execute immediate ''select count(*) from launch'' into v_count;

    end;

    /

    ```


    Problems happen when a `SELECT INTO` returns zero rows or more than one row. Queries
    that return zero rows will raise the exception “ORA-01403: no data found.” Queries
    that return more than one row will raise the exception “ORA-01422: exact fetch
    returns more than requested number of rows.” But those exceptions are easy to
    handle. The tricky part of `SELECT INTO` is when something goes wrong but an exception
    is not raised.


    In PL/SQL, every `SELECT` must have an `INTO`. It makes no sense to run a query
    and do nothing with the results. In the preceding example, if we remove the `INTO
    V_COUNT` from the *static* query, the PL/SQL block understandably raises the exception
    “PLS-00428: an INTO clause is expected in this SELECT statement.” But if we remove
    the `INTO V_COUNT` from the *dynamic* query, the query is partially run, and the
    PL/SQL block does not raise an exception.


    The most confusing example of missing exceptions is when the no-data-found exception
    is raised in a SQL context. For example, look at the following function. This
    function combines a `SELECT INTO` with `WHERE 1=0`, which is a recipe for no-data-found
    exceptions. Yet when the function is run in a SQL statement, the function returns
    NULL instead of raising an exception:


    ```

    --This function fails yet does not raise an exception in SQL.

    create or replace function test_function return number is

    v_dummy varchar2(1);

    begin

    select dummy into v_dummy from dual where 1=0;

    return 999;

    end;

    /

    select test_function from dual;

    TEST_FUNCTION


    ```


    SQL is built to work with things that return nothing. In this context, “nothing”
    doesn’t mean NULL; it means no results at all. For example, an inline view with
    a condition like `WHERE 1=0` won’t return any data, but the statement still runs.
    We expect SQL to work when no data is found, but we expect PL/SQL to fail when
    no data is found. It’s easy to forget that when we combine PL/SQL and SQL, the
    no-data-found exceptions are ignored.


    If we want to see those no-data-found exceptions in SQL, we must catch and reraise
    them as a different exception. Normally, catching and reraising is a bad idea
    because it’s easy to lose details of the call stack. In this case, we have no
    choice. The following function shows how to catch a no-data-found exception and
    raise a different kind of exception that won’t be ignored by SQL:


    ```

    --This function re-raises NO_DATA_FOUND exceptions.

    create or replace function test_function2 return number is

    v_dummy varchar2(1);

    begin

    select dummy into v_dummy from dual where 1=0;

    return 999;

    exception when no_data_found then

    raise_application_error(-20000, ''No data found detected.'');

    end;

    /

    --Raises: "ORA-20000: No data found detected.".

    select test_function2 from dual;

    ```


    We don’t need to include exception handling with every `SELECT INTO`. We only
    need to reraise exceptions for `SELECT INTO`s that will be called from SQL and
    have a chance of raising no-data-found exceptions.


    **Cursor FOR loops** are best for static queries that return multiple rows. With
    cursor `FOR` loops, we don’t need to explicitly open and close the cursor or define
    variables or worry about batching or limiting the results. Oracle takes care of
    all the details for us.


    We’ve already seen code similar to the following example. This code is worth repeating
    because too many developers waste too many lines of code dealing with explicit
    cursors. All we need to do is loop through the results:


    ```

    --Simple cursor FOR loop example.

    begin

    for launches in

    (

    --Put huge query here:

    select * from launch where rownum <= 5

    ) loop

    --Do something with result set here:

    dbms_output.put_line(launches.launch_tag);

    end loop;

    end;

    /

    ```


    **BULK COLLECT INTO** is best for dynamic queries that return multiple rows. To
    use this feature, we first need to understand the basics of records and collections,
    which are discussed in the next sections.'
  trans: "\n### 游标\n\n游标是指向 SQL 语句的指针。创建和使用游标的方式有很多种，而且这项技术多年来发生了显著变化。我们需要了解所有选项，以便能在合适的上下文中使用正确的选项。并且我们要尽可能避免使用陈旧、低效的选项。\n\
    \n`引用游标`是将数据传递给应用程序的一种常见方式。引用游标是在 PL/SQL 代码中打开的指针，但查询直到应用程序开始获取行时才会运行并返回结果。引用游标非常适合向应用程序传递数据，但在数据库内部处理数据时并不方便。以下代码展示了创建返回引用游标的函数是多么简单，并演示了静态和动态引用游标。但这里没有展示如何使用引用游标的示例，因为每个应用程序和\
    \ IDE 的代码都不同：\n\n```sql\n--一个简单的引用游标示例。\ncreate or replace function ref_cursor_test\n\
    return sys_refcursor is\n  v_cursor sys_refcursor;\nbegin\n  --基于查询的静态引用游标。\n\
    \  open v_cursor for select * from launch;\n  --基于字符串的动态引用游标。\n  --（更实际的示例会包含绑定变量。）\n\
    \  open v_cursor for 'select * from launch';\n  return v_cursor;\nend;\n/\n```\n\
    \n`显式游标`是在 PL/SQL 中循环处理行数据的最古老技术之一。但如第 15 章所述，我们应尽可能避免使用 `CURSOR`/`OPEN`/`FETCH`/`CLOSE`\
    \ 语法。这种语法几乎总是比游标 `FOR` 循环或单条 SQL 语句更丑陋、更容易出错且更慢。显式游标处理可以通过 `FORALL` 和 `LIMIT`\
    \ 等特性来加速，但我们通常仍然最好使用不同的游标技术。我们被迫使用显式游标的少数情况之一是使用返回多行的动态查询时（尽管 21c 有新的语法允许游标 `FOR`\
    \ 循环与动态 SQL 一起使用）。\n\n数据库中的绝大多数游标处理应该使用剩余的三个选项之一来完成：`SELECT INTO`、游标 `FOR` 循环和\
    \ `SELECT BULK COLLECT INTO`。表 21-1 描述了何时使用这三种技术。\n\n表 21-1\n何时使用不同的游标类型\n\n|\
    \                | 单行       | 多行           |\n| :------------- | :--------- |\
    \ :------------- |\n| **静态 SQL**   | `SELECT INTO` | 游标 `FOR` 循环 |\n| **动态 SQL**\
    \   | `SELECT INTO` | `SELECT BULK COLLECT INTO` |\n\n`SELECT INTO` 最适合返回单行的静态或动态查询。这种语法在本书中已经使用了几次，因为它是获取简单值最快、最简单的方法。以下是静态和动态\
    \ SQL 语法的简单示例：\n\n```sql\n--用于单行数据的静态和动态 SELECT INTO。\ndeclare\n  v_count number;\n\
    begin\n  select count(*) into v_count from launch;\n  execute immediate 'select\
    \ count(*) from launch' into v_count;\nend;\n/\n```\n\n当 `SELECT INTO` 返回零行或多于一行时，问题就会出现。返回零行的查询将引发异常\
    \ “ORA-01403: 未找到数据”。返回多于一行的查询将引发异常 “ORA-01422: 精确提取返回的行数超出请求的行数”。但这些异常很容易处理。`SELECT\
    \ INTO` 的棘手之处在于，当出现问题但没有引发异常时。\n\n在 PL/SQL 中，每个 `SELECT` 语句都必须有 `INTO` 子句。运行查询却不处理结果是没有意义的。在前面的例子中，如果从静态查询中移除\
    \ `INTO v_count`，PL/SQL 块会引发异常 “PLS-00428: 此 SELECT 语句中需要 INTO 子句”。但是，如果我们从动态查询中移除\
    \ `INTO v_count`，查询会部分执行，并且 PL/SQL 块不会引发异常。\n\n缺失异常的最令人困惑的例子是当未找到数据异常在 SQL 上下文中被引发时。例如，看下面的函数。这个函数将\
    \ `SELECT INTO` 与 `WHERE 1=0` 结合起来，这是引发未找到数据异常的配方。然而，当在 SQL 语句中运行该函数时，函数返回 NULL\
    \ 而不是引发异常：\n\n```sql\n--此函数在 SQL 中失败但不引发异常。\ncreate or replace function test_function\
    \ return number is\n  v_dummy varchar2(1);\nbegin\n  select dummy into v_dummy\
    \ from dual where 1=0;\n  return 999;\nend;\n/\nselect test_function from dual;\n\
    ```\n\nSQL 的设计是为了与不返回任何内容的东西一起工作。在这种情况下，“没有任何内容” 并不意味着 NULL；它意味着根本没有结果。例如，带有 `WHERE\
    \ 1=0` 这样条件的内联视图不会返回任何数据，但语句仍然会运行。我们期望 SQL 在未找到数据时能正常工作，但我们期望 PL/SQL 在未找到数据时失败。当我们把\
    \ PL/SQL 和 SQL 结合起来时，很容易忘记未找到数据的异常会被忽略。\n\n如果我们想在 SQL 中看到这些未找到数据的异常，我们必须捕获它们并将其作为不同的异常重新引发。通常，捕获并重新引发是个坏主意，因为很容易丢失调用堆栈的细节。在这种情况下，我们别无选择。以下函数展示了如何捕获未找到数据的异常并引发一种不会被\
    \ SQL 忽视的不同类型的异常：\n\n```sql\n--此函数重新引发 NO_DATA_FOUND 异常。\ncreate or replace function\
    \ test_function2 return number is\n  v_dummy varchar2(1);\nbegin\n  select dummy\
    \ into v_dummy from dual where 1=0;\n  return 999;\nexception\n  when no_data_found\
    \ then\n    raise_application_error(-20000, '检测到未找到数据。');\nend;\n/\n--引发: \"ORA-20000:\
    \ 检测到未找到数据。\"。\nselect test_function2 from dual;\n```\n\n我们不需要为每个 `SELECT INTO`\
    \ 都包含异常处理。我们只需要为那些将从 SQL 调用并有可能引发未找到数据异常的 `SELECT INTO` 重新引发异常。\n\n`游标 FOR 循环`最适合返回多行的静态查询。使用游标\
    \ `FOR` 循环，我们不需要显式地打开和关闭游标，或者定义变量，或者担心批处理或限制结果。Oracle 为我们处理了所有细节。\n\n我们已经见过类似于以下示例的代码。这个代码值得重复，因为太多开发人员浪费了太多代码来处理显式游标。我们所需要做的就是循环遍历结果：\n\
    \n```sql\n--简单的游标 FOR 循环示例。\nbegin\n  for launches in\n  (\n    --将大型查询放在这里：\n\
    \    select * from launch where rownum <= 5\n  ) loop\n    --在这里对结果集进行操作：\n  \
    \  dbms_output.put_line(launches.launch_tag);\n  end loop;\nend;\n/\n```\n\n`BULK\
    \ COLLECT INTO` 最适合返回多行的动态查询。要使用此功能，我们首先需要了解记录和集合的基础知识，这些将在接下来的章节中讨论。\n"
- fmt: '### Records


    到目前为止，我们的 PL/SQL 变量都是简单的标量类型。但随着我们在 PL/SQL 中进行更多的处理，PL/SQL 数据结构的复杂性必须增加。SQL 数据的复杂性从单个列值增长到一行，再增长到行表。PL/SQL
    数据的复杂性从单个标量变量增长到记录，再增长到集合。图 [21-1](#471418_2_En_21_Chapter.xhtml#Fig1) 展示了关系模型、SQL
    和 PL/SQL 术语之间的关系。^([^(52)](#fn52))


    ![](images/471418_2_En_21_Chapter/471418_2_En_21_Fig1_HTML.png)


    该表有五列和四行。第二列和第三行被着色，分别标记为属性或列或标量变量，以及元组、行、记录。


    图 21-1


    用于相似概念的关系模型、SQL 和 PL/SQL 术语。基于 Chris Martin 创建的图像，属于公共领域。


    记录可以通过三种不同的方式创建，每种技术都有不同的优点。使用`%ROWTYPE`是复制表数据结构的最简单、最准确的方法。定义`RECORD`类型让我们能完全控制类型定义。用户定义的类型在
    SQL 中而不是 PL/SQL 中定义；它们在技术上不是记录，但行为类似。


    以下代码展示了定义和填充记录的三种不同方式。填充记录通常是重复性的，因此该示例使用了空间数据集中最简单的表`PROPELLANT`。请注意记录如何使用点表示法访问各个字段：


    ```

    --构建用户定义类型，其类似于PL/SQL记录。

    create or replace type propellant_type is object

    (

    propellant_id   number,

    propellant_name varchar2(4000)

    );

    --%ROWTYPE, IS RECORD, 和用户定义类型的示例。

    declare

    --定义变量和类型。

    v_propellant1 propellant%rowtype;

    type propellant_rec is record

    (

    propellant_id   number,

    propellant_name varchar2(4000)

    );

    v_propellant2 propellant_rec;

    v_propellant3 propellant_type := propellant_type(null, null);

    begin

    --填充数据对所有三个选项来说可以是一样的：

    v_propellant1.propellant_id := 1;

    v_propellant1.propellant_name := ''test1'';

    v_propellant2.propellant_id := 2;

    v_propellant2.propellant_name := ''test2'';

    v_propellant3.propellant_id := 3;

    v_propellant3.propellant_name := ''test3'';

    --自18c起，记录可以使用限定表达式：

    v_propellant2 := propellant_rec(2, ''test2'');

    --用户定义类型也可以使用构造函数：

    v_propellant3 := propellant_type(3, ''test3'');

    end;

    /

    ```


    记录有助于将相关数据保持在一起，并且将单个记录作为参数传递比传递多个标量参数更容易。记录最大的好处在于它们用于构建集合时，集合是数据“表”的 PL/SQL
    等价物。


    ### Collections


    集合是记录或标量变量的集合。集合可以创建多维数据，但不要让“多维”这个词吓到你。实际上，集合主要用于创建看起来像表的二维数据，尽管我们也可以嵌套数据结构并创建更复杂的形状。集合有三种类型：嵌套表、关联数组和
    varrays。


    **嵌套表**是集成 SQL 和 PL/SQL 最有用的集合类型。嵌套表是无序的记录堆，类似于表是无序的行堆。


    嵌套表可以很容易地用静态和动态 SQL 填充，使用`BULK COLLECT INTO`语法。以下代码使用`%ROWTYPE`定义一个嵌套表类型，然后创建该类型的变量。嵌套表变量与所有集合一样，具有`COUNT`属性，可用于循环遍历结果。每条记录都可以用数字索引访问，使用括号。相关字段可以使用点表示法访问：


    ```

    --使用%ROWTYPE定义、填充和迭代嵌套表。

    declare

    type launch_nt is table of launch%rowtype;

    v_launches launch_nt;

    begin

    --静态示例：

    select *

    bulk collect into v_launches

    from launch;

    --动态示例：

    execute immediate ''select * from launch''

    bulk collect into v_launches;

    --迭代嵌套表：

    for i in 1 .. v_launches.count loop

    dbms_output.put_line(v_launches(i).launch_id);

    --仅打印一个值。

    exit;

    end loop;

    end;

    /

    ```


    每当我们使用`BULK COLLECT INTO`时，都应该考虑集合的最大可能大小。集合使用 PGA 内存，每个会话只能分配一定数量的内存。如果有必要，我们可以使用循环和`LIMIT`子句每次只检索
    N 行。在实践中，`LIMIT`子句被过度使用了。前面的例子将整个`LAUNCH`表放入内存，这听起来很糟糕，但直到我们意识到该表只使用了 4 兆字节的空间。如果同时有数百个会话运行该代码，我们可能会遇到麻烦，否则我们不需要担心将几兆字节加载到内存中。


    如果我们有简单的数据，比如数字或字符串列表，我们甚至可能不需要创建自己的集合数据类型。Oracle 已经有许多预构建的用户定义类型，对于集合处理很有用。两个流行的例子是`SYS.ODCIVARCHAR2LIST`和`SYS.ODCINUMBERLIST`。这些类型是`VARRAY(32767)
    OF VARCHAR2(4000)/NUMBER`。这些不是最容易记住的名字，而且最大元素数量并不总是足够大。另一方面，这些类型对所有模式都是公开可用的，并且使用安全，因为它们在手册中列出，不会在下一个版本中突然消失。


    **关联数组**是键值对，在其他语言中称为哈希映射或字典。这种集合类型在 PL/SQL 中很有用，但在处理 SQL 数据时不如嵌套表方便。


    关联数组可以由`PLS_INTEGER`或`VARCHAR2`索引，但由数字索引的关联数组与嵌套表没有太大区别。关联数组通常由字符串索引，这很方便，因为它让我们可以使用几乎所有内容作为键。不幸的是，Oracle
    只能直接将 SQL 加载到由数字而不是字符串索引的关联数组中，并且这些数字不能大于`2147483647`。


    要构建由字符串索引的关联数组，我们必须循环遍历行并自己构建集合。关联数组的一个优点是我们可以通过简单地引用它们来创建元素，不需要`EXTEND`函数。另一个优点是结果在加载到集合中时会自动排序。关联数组的一个缺点是循环遍历键有点麻烦，如下面的代码所示：'
  raw: '### Records


    So far, our PL/SQL variables have been simple, scalar types. But as we do more
    processing in PL/SQL, the complexity of our PL/SQL data structures must grow.
    SQL data grows in complexity from a single column value to a row and to a table
    of rows. PL/SQL data grows in complexity from a single scalar variable to a record
    and to a collection. Figure [21-1](#471418_2_En_21_Chapter.xhtml#Fig1) shows the
    relationship between the terminology for the relational model, SQL, and PL/SQL.^([^(52)](#fn52))


    ![](images/471418_2_En_21_Chapter/471418_2_En_21_Fig1_HTML.png)


    The table has five columns and four rows. The second column and third row are
    colored, marked as attribute or column or scalar variable and tuple, row, record
    respectively.


    Figure 21-1


    Relational, SQL, and PL/SQL terminology for similar concepts. Based on an image
    created by Chris Martin and is in the public domain


    Records can be created in three different ways, and each technique has different
    advantages. Using `%ROWTYPE` is the simplest and most accurate way to copy a table’s
    data structure. Defining a `RECORD` type gives us complete control over the type
    definition. User-defined types are defined in SQL instead of PL/SQL; they aren’t
    technically records, but they act in a similar way.


    The following code shows the three different ways to define and populate records.
    Populating records is often repetitive, so the example uses the simplest table
    in the space data set, `PROPELLANT`. Notice how records use the dot notation to
    access the individual fields:


    ```

    --Build user defined type, which is similar to PL/SQL record.

    create or replace type propellant_type is object

    (

    propellant_id   number,

    propellant_name varchar2(4000)

    );

    --Example of %ROWTYPE, IS RECORD, and user defined type.

    declare

    --Define variables and types.

    v_propellant1 propellant%rowtype;

    type propellant_rec is record

    (

    propellant_id   number,

    propellant_name varchar2(4000)

    );

    v_propellant2 propellant_rec;

    v_propellant3 propellant_type := propellant_type(null, null);

    begin

    --Populating data can work the same for all three options:

    v_propellant1.propellant_id := 1;

    v_propellant1.propellant_name := ''test1'';

    v_propellant2.propellant_id := 2;

    v_propellant2.propellant_name := ''test2'';

    v_propellant3.propellant_id := 3;

    v_propellant3.propellant_name := ''test3'';

    --Since 18c, records can use qualified expressions:

    v_propellant2 := propellant_rec(2, ''test2'');

    --User-defined types can also use constructors:

    v_propellant3 := propellant_type(3, ''test3'');

    end;

    /

    ```


    Records help keep related data together, and it’s easier to pass a single record
    as a parameter instead of passing multiple scalar parameters. The biggest benefit
    of records is when they are used to build collections, which are the PL/SQL equivalent
    of “tables” of data.


    ### Collections


    Collections are sets of records or scalar variables. Collections can create multidimensional
    data, but don’t let the word “multidimensional” scare you. In practice, collections
    are mostly used to create two-dimensional data that looks like a table, although
    we can nest data structures and create more complex shapes if we want. There are
    three types of collections: nested tables, associative arrays, and varrays.


    **Nested tables** are the most useful collection type for integrating SQL and
    PL/SQL. A nested table is an unordered heap of records, similar to the way a table
    is an unordered heap of rows.


    Nested tables can be easily populated with static and dynamic SQL, using the `BULK
    COLLECT INTO` syntax. The following code uses `%ROWTYPE` to define a nested table
    type and then creates a variable of that type. The nested table variable, like
    all collections, has a `COUNT` property that can be used to loop through the results.
    Each record can be accessed with a numeric index, using parentheses. And the relevant
    field can be accessed using the dot notation:


    ```

    --Define, populate, and iterate nested tables using %ROWTYPE.

    declare

    type launch_nt is table of launch%rowtype;

    v_launches launch_nt;

    begin

    --Static example:

    select *

    bulk collect into v_launches

    from launch;

    --Dynamic example:

    execute immediate ''select * from launch''

    bulk collect into v_launches;

    --Iterating the nested table:

    for i in 1 .. v_launches.count loop

    dbms_output.put_line(v_launches(i).launch_id);

    --Only print one value.

    exit;

    end loop;

    end;

    /

    ```


    Whenever we use `BULK COLLECT INTO`, we should think about the maximum possible
    size of the collection. Collections use PGA memory, and each session can only
    be allocated a certain amount. If necessary, we could use a loop and a `LIMIT`
    clause to only retrieve N rows at a time. In practice, the `LIMIT` clause is overused.
    The preceding example puts the entire `LAUNCH` table into memory, which sounds
    bad until we realize that the table only uses 4 megabytes of space. We might get
    into trouble if we have hundreds of sessions running the code at the same time,
    but otherwise we don’t need to worry about loading a few megabytes into memory.


    If we have simple data, like a list of numbers or strings, we may not even have
    to create our own collection data types. Oracle already has many pre-built user-defined
    types that are useful for collection processing. Two popular examples are `SYS.ODCIVARCHAR2LIST`
    and `SYS.ODCINUMBERLIST`. Those types are `VARRAY(32767) OF VARCHAR2(4000)/NUMBER`.
    Those aren’t the easiest names to remember, and the maximum number of elements
    isn’t always large enough. On the plus side, those types are publicly available
    to all schemas and are safe to use because they are listed in the manual and won’t
    suddenly disappear in the next version.


    **Associative arrays** are key–value pairs, known as hash maps or dictionaries
    in other languages. This collection type is useful in PL/SQL but is not as convenient
    as nested tables for working with SQL data.


    Associative arrays can be indexed by either PLS_INTEGER or VARCHAR2, but an associative
    array indexed by a number isn’t very different than a nested table. Associative
    arrays are usually indexed by a string, which is convenient because it lets us
    use almost anything as the key. Unfortunately, Oracle can only directly load SQL
    into associative arrays indexed by numbers, not strings, and those numbers cannot
    be larger than 2147483647.


    To build an associative array indexed by a string, we must loop through the rows
    and build the collection ourselves. One advantage of associative arrays is that
    we can create elements simply by referencing them, and there’s no need for an
    `EXTEND` function. Another advantage is that results are automatically sorted
    as they are loaded into the collection. A disadvantage of associative arrays is
    that it’s a bit awkward to loop through the keys, as shown in the following code:'
