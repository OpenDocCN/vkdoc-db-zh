  trans: '# 哈希的工作原理


    ## 哈希的工作原理


    哈希将一组项目分配到一组哈希桶中。哈希函数可以将项目分配到大量密码学随机的桶中，例如 `SELECT STANDARD_HASH(''some_string'',
    ''SHA256'') FROM DUAL`。或者，哈希函数可以将值分配到少量预定义的桶中，例如 `SELECT ORA_HASH(''some_string'',
    4) FROM DUAL`。哈希函数可以设计成具有多种不同的特性，其设计对它们的使用方式有重要影响。图 16-4 包含描述哈希函数的简单方法。


    ![](img/471418_2_En_16_Fig4_HTML.png)


    图示展示了列键、哈希函数以及用于最小完美哈希、完美哈希和典型哈希的哈希值。


    图 16-4


    对不同哈希函数的描述。图片由 Jorge Stolfi 创建，属于公共领域。


    哈希性能的差异范围巨大，这取决于哈希的具体工作方式。使用完美哈希时，访问只需要一次读取，操作时间是 `O(1)`。而对于一个失效的哈希算法，当所有值都被映射到同一个哈希值时，我们最终得到的只是一个卡在哈希桶里的普通堆表。在这种最坏的情况下，我们必须读取整张表才能找到一个值，时间复杂度是
    `O(N)`。


    在使用哈希时，我们需要意识到时空权衡。实际上我们无法实现最小完美哈希。Oracle 的哈希分区是最小的（没有空桶），但远非完美（存在很多冲突）；哈希分区无法提供对单行的即时访问，但它们不会浪费太多空间。哈希集群可以是完美的（没有冲突），但远非最小（存在许多空桶）；哈希集群提供对单行的即时访问，但会浪费大量空间。哈希连接则介于两者之间。这三种哈希类型服务于不同的目的，将在后续章节中详细描述。


    ## 哈希分区


    哈希分区根据一个或多个列的 `ORA_HASH` 值，将包含 `N` 行的表拆分为 `P` 个分区。哈希分区肯定不是完美哈希，因为每个哈希桶是一个旨在容纳多行的段。哈希分区的数量应该是最少的，因为我们不希望因创建额外的段而浪费磁盘空间。


    向哈希分区表中插入一行的时间仍然是 `O(1)`——`ORA_HASH` 函数可以快速确定该行属于哪个分区。但是检索一行的时间将是 `O(N/P)`，即行数除以分区数。对于读取大量行的大型数据仓库操作，这可能是一个重要的改进。但对于读取单行而言，这种改进远不如使用
    `O(LOG(N))` 的 B 树索引访问所能达到的效果。（B 树索引的时间复杂度将在后面的章节中描述。）不要试图用分区取代索引——它们解决的是不同的问题。


    理论上，我们可以通过使用数量极其庞大的哈希值来构建一个具有惊人 `O(1)` 读取访问速度的哈希分区表。虽然这种哈希从“每一行都映射到单个段”的意义上来说可能是“完美”的，但数量荒谬的段会浪费大量空间，并且还会导致数据字典出现问题。


    在构建哈希分区表时，我们必须为分区键使用正确的列。如果我们使用低基数的列，或者没有将分区数量设置为 2 的幂，数据将无法在分区之间均匀分布。如果所有行都存储在同一个桶（同一个哈希分区）中，那么分区将对我们毫无帮助。


    在实践中，哈希分区经常被滥用。为了避免滥用这一特性，我们需要理解哈希的权衡，并选择一个好的分区键。


    ## 哈希集群


    哈希集群旨在返回少量行，这与设计用于返回大量行的哈希分区不同。一个未公开文档记载的哈希函数确切地告诉 Oracle 存储和查找每一行的位置——无需遍历索引树和跟随多个指针。理论上，对于检索少量行，哈希集群甚至比
    B 树索引更好。但在实践中，哈希集群很少使用。


    哈希集群的第一个问题是我们无法将其添加到现有表中；我们必须从一开始就组织表以使用哈希集群。为了在哈希集群上获得 `O(1)` 的读取时间，我们需要创建一个近乎完美的哈希。但我们必须担心时空权衡问题。没有实际方法可以在不创建大量未使用哈希桶的情况下获得完美哈希。我们可以拥有一个性能良好的哈希集群，或者一个占用最少空间的哈希集群；我们无法两者兼得。


    当我们创建哈希集群时，可以使用 `HASHKEYS` 子句指定桶的数量。根据我的经验，要获得 `O(1)` 的读取时间需要非常多的哈希桶，以至于表的大小会增加两倍。


    不幸的是，即使付出了所有努力以获得 `O(1)` 的访问时间，哈希集群最终仍然比索引慢。我无法解释为什么哈希集群更慢；这是一个理论在现实世界应用中失效的地方。


    Oracle 使用称为“一致性读取”的统计信息来衡量 SQL 语句执行的读取次数。可以创建测试用例，其中哈希查找只需要一次一致性读取，而同一表上的索引查找需要四次一致性读取。^(³⁴)
    但索引仍然更快。对于这些操作，索引的 `O(LOG(N))` 小于哈希集群的 `O(1)`。


    在比较小数字时，例如 1 对 4，常数变得比大 O 分析更重要。哈希集群很少使用，Oracle 肯定投入了更多时间来优化索引而不是集群。也许这些优化弥补了运行时复杂性之间的微小差异。


    算法分析帮助我们深入探究问题，但在这种情况下，真正的性能差异被闭源软件中的常数所掩盖。也许这是一个自定义索引类型的机会。其他数据库拥有哈希索引，不需要重组整个表。也许有一天
    Oracle 会添加该功能并使哈希访问工作得更好。就目前而言，我们应该忽略哈希集群。'
- fmt: '### Hash Joins


    Hashing is a great way to join two tables when there’s a large percentage of rows
    that match between them. A hash join starts by creating a temporary hash table
    based on the join column values from the first table. Next, Oracle uses the join
    column values from the second table and probes the hash table to see if there
    is a match.


    The precise performance of hash joins is discussed later, but the main point to
    understand is that the first step of creating a temporary hash table requires
    a significant amount of time and space. That extra work can be a good investment
    because each probe in the second step can theoretically run in `O(1)` time. But
    like with hash partitioning and hash clusters, the hash table is certainly not
    minimal and perfect. There will be some wasted space, and the probe run time ends
    up being something worse than `O(1)`. However, unlike hash clusters, the probe
    run time is significantly better than the `O(LOG(N))` we would get from a single
    index lookup. Determining when that up-front investment of building a hash table
    is worth the cost is one of the most important decisions the optimizer makes.


    It’s important for us to understand that hash joins can only be used for equality
    conditions. The way input values are mapped to fixed-length hash values preserves
    some equality properties, but hashing does not preserve any other relationships
    between the inputs. For example, A may be smaller than B, but that relationship
    is not necessarily true of their hash values.


    Hash joins are so useful that it is often worth going out of our way to enable
    them. We can enable hash joins by rewriting simple non-equality conditions into
    weird equality conditions. For example, `COLUMN1 = COLUMN2 OR (COLUMN1 IS NULL
    AND COLUMN2 IS NULL)` is a logical way of telling Oracle, “Either these columns
    are equal or both of them are NULL.” We may be able to significantly improve the
    performance of joining two large tables by rewriting the condition to `NVL(COLUMN1,
    ''fake value'') = NVL(COLUMN2, ''fake value'')`. Writing cryptic expressions is
    not ideal and may cause problems from bad cardinality estimates, but it’s often
    worth the trouble if it enables faster join operations.


    ### Other


    Constant-time operations show up frequently in Oracle, like in any system. For
    example, inserting a row into a table, creating objects, and altering objects
    often take the same amount of time regardless of the input size.


    On the other hand, all those operations also have nonconstant time versions. Inserting
    a row into a table takes a non-trivial amount of time if there are indexes that
    need to be maintained. Creating objects like indexes can take a huge amount of
    time to sort the data. Even altering tables may or may not take constant time,
    depending on the `ALTER` command. Adding a constraint usually requires validation
    against the data, which depends on the number of rows; but adding a default value
    can be done purely in metadata and can finish almost instantly.


    We can’t categorize operations based purely on their command type. To estimate
    the run time of any command, we always need to think about the algorithms, data
    structures, and size of the data.


    ### O(LOG(N)): Index Access


    `O(LOG(N))` is the worst-case run time for index access. Index reads are another
    core database operation. Indexes were described in detail in Chapter [9](#471418_2_En_9_Chapter.xhtml),
    but a brief summary of this important concept is included in the following paragraph.


    When we search a binary tree, each step can eliminate half the rows of the index.
    Doubling the number of rows grows exponentially; conversely, halving the number
    of rows shrinks logarithmically. Index access on a simple binary tree is `O(LOG2(N))`.
    Oracle B-tree indexes store much more than one value per branch, so they have
    a worst-case access time of `O(LOG(N))`. Figure [16-5](#471418_2_En_16_Chapter.xhtml#Fig5)
    shows an example of a binary tree search.


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig5_HTML.png)


    An illustration of the binary algorithm with numeral nodes 1, 3, 8, 10, 14, 13,
    7, 6, and 4. The node with number 4, is highlighted in green.


    Figure 16-5


    Binary search algorithm. Image was created by Chris Martin and is in the public
    domain


    We know how indexes work, and we know that indexes are great for performance,
    but comparing the algorithms helps us understand precisely how awesome indexes
    can be. Figure [16-6](#471418_2_En_16_Chapter.xhtml#Fig6) compares the fast `O(LOG(N))`
    of an index read with the slow `O(N)` of a full table scan. This visualization
    is a powerful way of thinking about index performance.


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig6_HTML.png)


    The graph of the number of steps versus the input size represented as N and log
    N.


    Figure 16-6


    Compare `O(LOG(N))` index read vs. `O(N)` full table scan


    Most performance tests only compare results at a single point along a range of
    input sizes. Thinking about the lines and curves in the preceding visualizations
    helps us understand how our system’s performance will change as the data grows.
    The amount of work required to read one row from an index rarely increases, no
    matter how large the table grows. In practice, our B-tree indexes will rarely
    even grow to a height of five levels, which means any indexed value is just a
    few reads away. Contrast that gradual run-time growth with the steeper growth
    of a full table scan, where every new row adds new work.


    So far, we’ve mostly discussed small operations – one hash lookup, one index lookup,
    or one full table scan. The performance comparisons will soon become trickier
    as we start iterating the operations.'
  raw: '### Hash Joins


    Hashing is a great way to join two tables when there’s a large percentage of rows
    that match between them. A hash join starts by creating a temporary hash table
    based on the join column values from the first table. Next, Oracle uses the join
    column values from the second table and probes the hash table to see if there
    is a match.


    The precise performance of hash joins is discussed later, but the main point to
    understand is that the first step of creating a temporary hash table requires
    a significant amount of time and space. That extra work can be a good investment
    because each probe in the second step can theoretically run in `O(1)` time. But
    like with hash partitioning and hash clusters, the hash table is certainly not
    minimal and perfect. There will be some wasted space, and the probe run time ends
    up being something worse than `O(1)`. However, unlike hash clusters, the probe
    run time is significantly better than the `O(LOG(N))` we would get from a single
    index lookup. Determining when that up-front investment of building a hash table
    is worth the cost is one of the most important decisions the optimizer makes.


    It’s important for us to understand that hash joins can only be used for equality
    conditions. The way input values are mapped to fixed-length hash values preserves
    some equality properties, but hashing does not preserve any other relationships
