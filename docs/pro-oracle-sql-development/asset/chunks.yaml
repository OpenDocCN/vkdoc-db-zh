    # 2. Create an Efficient Database Development Process


    大多数 Oracle 数据库开发环境的设置就像一个易碎的瓷器店。有一个必须不惜一切代价维持的复杂结构，最微小的变化都可能破坏东西并阻止每个人工作。没有人确切知道数据库是如何变成现在这个样子的，而且每个人都担心当它崩溃时不知道如何修复它。典型的
    Oracle 数据库开发流程远远落后于行业规范。本章展示了一种更好的工作方式。有一些简单的流程可以帮助我们创建、扩展、实验和学习，而不会打断其他人。


    本章不讨论整个软件开发生命周期或敏捷与瀑布模型。如果不建立正确的基础流程，谈论采用敏捷或其他高层流程是毫无意义的。本章专注于低级别的数据库概念：创建数据库、创建数据库对象，然后管理这些对象。'
  raw: '#### Left and Right Outer Joins


    The next most common types of joins are left outer joins and right outer joins.
    These joins allow us to retrieve all the rows from one table along with any rows
    from another table that match the condition. Left and right outer joins are the
    same operation, only mirrored. In practice, most people only use the left outer
    join. The table that drives the joins is listed first and then left-joined to
    optional tables.


    For example, here’s how to retrieve all rocket launches, with their relevant satellites,
    if any:


    ```

    select *

    from launch

    left outer join satellite

    on launch.launch_id = satellite.launch_id;

    ```


    Since a left join is always an outer join, the keyword `OUTER` is not necessary:


    ```

    select *

    from launch

    left join satellite

    on launch.launch_id = satellite.launch_id;

    ```


    Alternatively, the query can be built with the Oracle `(+)` operator. The `(+)`
    operator means “this is the optional part of the condition.” This old-fashioned
    syntax is strongly discouraged. But we must be familiar with it because people
    still use it and, in a few rare cases, Oracle requires it. This syntax will be
    discussed more in Chapter [7](#471418_2_En_7_Chapter.xhtml):


    ```

    select *

    from launch, satellite

    where launch.launch_id = satellite.launch_id(+);

    ```


    Changing the query from a left outer join to a right outer join is trivial. Simply
    change the keyword `LEFT` to `RIGHT`, or place the `(+)` on the other side of
    the condition. Changing from left to right will make the queries return all satellites,
    even if they do not have a matching `LAUNCH_ID`. This will include the “unknown
    debris” satellite. Right join queries are simple variations on the preceding left
    joins and are not shown.


    (If it annoys you that the data set contains debris, you’re not alone. In the
    worst case, this is the beginning of what’s called the Kessler syndrome. If irresponsible
    satellite operators don’t properly dispose of their satellites or if they blow
    them up with antisatellite missiles, the debris may cascade and increase the chance
    of more collisions. Eventually some orbits may become unusable.)


    #### Full Outer Join


    Full outer joins return all rows from both tables. For example, the following
    three queries return all launches, even those without satellites, and all satellites,
    even those without launches. Similar to the other join types, the outer keyword
    is optional and is not included in the second query. Note that the third query
    is invalid – the old-fashioned `(+)` syntax does not work here. We must use the
    modern ANSI join syntax to get a full outer join:


    ```

    --Full outer join with optional "outer" keyword.

    select *

    from launch

    full outer join satellite

    on launch.launch_id = satellite.launch_id;

    --Without optional "outer" keyword.

    select *

    from launch

    full join satellite

    on launch.launch_id = satellite.launch_id;

    --This does not work. It raises the exception:

    --ORA-01468: a predicate may reference only one outer-joined table

    select *

    from launch, satellite

    where launch.launch_id(+) = satellite.launch_id(+);

    ```


    #### Cross Join


    Cross joins, also called Cartesian products, return every possible combination
    of the two tables. This join type is rare and is generally only useful as part
    of a complicated query where we need to generate extra rows.


    Most cross joins happen by accident when we either forget to join the tables or
    don’t understand our data and under-join the tables. There’s no reason to use
    a cross join with our launch and satellite data, so the following cross join queries
    will run for a long time and return three billion pointless rows.


    ```

    --ANSI join syntax:

    select *

    from launch

    cross join satellite;

    --Old-fashioned syntax:

    select *

    from launch, satellite;

    ```


    Caution


    Stop and reread this section if any of this doesn’t make sense. You will never
    reach your full potential with Oracle SQL until you are comfortable with joins.


    ## Summary


    After this brief introduction to the relational model, the history of Oracle and
    SQL, and a review of two key concepts, we’re ready to create our development environment.
    While many of the details of the relational model don’t matter, there are a few
    rules we should always remember while we’re developing – avoid storing lists of
    values in a column and avoid duplicating data. SQL is the primary language for
    relational data, and everything we create in a database should be easy to use
    in SQL. There are many kinds of databases and even different ways of using an
    Oracle database; not all the features and styles we discuss will suit your environment.
    A firm understanding of NULL and joins is crucial before moving on to creating
    development processes.


