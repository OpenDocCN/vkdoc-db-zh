    function. It is much safer than the previous code. But even this version has problems;
    “Oct” is not always the correct abbreviation for “October.” But using an explicit
    date format in our programs is still much safer than an implicit date format.
    Chapter [15](#471418_2_En_15_Chapter.xhtml) explains how to make this code completely
    safe with date literals:


    ```

    --Somewhat safe date format conversion.

    select *

    from launch

    where to_char(launch_date, ''DD-Mon-YYYY'') = ''04-Oct-1957'';

    ```


    ## Summary


    This chapter briefly introduced many advanced `SELECT` features. Each topic could
    easily fill an entire chapter, and some of them could fill an entire book. Don’t
    expect to remember the syntax details. It’s more important we remember the features
    and patterns and when to use them. SQL is easy to learn but hard to master.


    This is the longest and most code-intensive chapter. Selecting data is the most
    important part of database operations. But ultimately, we need to create and change
    data. The next chapter discusses advanced features for modifying our data.


    Footnotes [1](#471418_2_En_7_Chapter.xhtml#Fn1_source)   [2](#471418_2_En_7_Chapter.xhtml#Fn2_source)
      [3](#471418_2_En_7_Chapter.xhtml#Fn3_source)


    # 8. Modify Data with Advanced DML


    Now that we learned how to write advanced SQL statements to retrieve data, it
    is time to learn how to write advanced SQL statements to change data. Oracle Data
    Manipulation Language (DML) lets us insert, update, and delete data.^([^(18)](#fn18))


    Oracle provides four main statements for changing data: `INSERT`, `UPDATE`, `DELETE`,
    and `MERGE`. Each of these statements has advanced options specific to that command.
    There are also advanced features relevant to all DML statements: updatable views,
    hints, error logging, and the returning clause. Some additional commands are not
    technically DML statements but are used to help us change data: `TRUNCATE`, `COMMIT`,
    `ROLLBACK`, `SAVEPOINT`, `ALTER SYSTEM`, `ALTER SESSION`, and others. Using and
    modifying data not stored in Oracle is challenging, and Oracle has many different
    options for file input and output. Finally, although PL/SQL is mostly outside
    the scope of this book, there are PL/SQL packages we need to use to manage our
    data.


    This chapter, like all chapters, assumes you are already familiar with basic SQL
    concepts. Each section is going to jump right into an advanced feature. To save
    space, the examples directly modify tables in the data set. Remember to roll back
    the changes when you’re done with each example.


    ## INSERT


    The `INSERT ALL` syntax was intended to add data to multiple tables in one statement.
    The feature supports conditional logic, where we read from a large source table
    and use `WHEN-THEN-ELSE` logic to decide which rows go to which destination table.
    But in practice the syntax is most commonly used to generate data and insert multiple
    rows into the same table.


    For example, let’s say we want to load new fuels into the `PROPELLANT` table.
    There are several ways to generate data, and previous chapters already demonstrated
    the `UNION ALL` trick. The following code demonstrates the `INSERT ALL` trick:


    ```

    --Generate new PROPELLANT rows.

    insert all

    into propellant values (-1, ''antimatter'')

    into propellant values (-2, ''dilithium crystals'')

    select * from dual;

    ```


    Note how the preceding `INSERT ALL` does not use sequences but instead hard-codes
    the primary keys. Hard-coding is necessary, because `INSERT ALL` only increments
    the sequence once per statement, not once per row.


    There’s a debatable style choice with the `INSERT ALL` statement – the preceding
    code doesn’t list all the column names. Normally, an `INSERT` should explicitly
    list the column names, to make it clear what values are being set. And listing
    the column names ensures the values go in the right place, even in the unlikely
    situation where the column order changes. On the other hand, we don’t want to
    repeat ourselves and list the column names multiple times.


    The `INSERT ALL` trick is neat, but the `UNION ALL` trick is better for generating
    data. The `INSERT ALL` statement is slower to parse than `UNION ALL`, especially
    for large statements with hundreds of rows.


    If our applications are generating lots of data, an `INSERT ALL` is much better
    than multiple `INSERT` statements. But an `INSERT ALL` is not as good as using
    the application’s batching API. Don’t get carried away with `INSERT ALL`. It’s
    a neat trick, but it’s not meant for generating enormous amounts of data.'
  trans: '### 显示格式


    NLS（国家语言支持）功能对于数据的显示同样重要。有十几个参数用于控制日期、时间戳、货币、错误消息和数字的格式。其中最常用但也最常被误用的是 `NLS_DATE_FORMAT`。与几乎所有参数一样，`NLS_DATE_FORMAT`
    的应用方式也存在一个**层次结构**。该参数可以按数据库、按会话或按函数调用进行设置。我们绝不应假设数据库级别的 `NLS_DATE_FORMAT` 具有某个特定值。许多工具和程序会自动更改会话设置，从而覆盖数据库设置。


    `NLS_DATE_FORMAT` 及类似参数仅用于**临时**显示格式化。切勿依赖隐式日期格式进行数据处理。以下代码查找 1957 年 10 月 4 日发射的第一颗卫星，它是危险的。根据我们
    IDE 的设置，该代码可能会因错误 “ORA-01858: a non-numeric character was found where a numeric
    was expected” 而失败：


    ```

    -- 危险的 NLS_DATE_FORMAT 假设。

    select *

    from launch

    where trunc(launch_date) = ''04-Oct-1957'';

    ```


    以下代码使用了 `TO_CHAR` 函数进行显式的日期格式转换。它比前一段代码安全得多。但即使这个版本也有问题；“Oct” 并不总是 “October” 的正确缩写。然而，在程序中使用显式日期格式仍然比使用隐式格式安全得多。第
    15 章将解释如何使用日期字面值使此代码完全安全：


    ```

    -- 稍微安全的日期格式转换。

    select *

    from launch

    where to_char(launch_date, ''DD-Mon-YYYY'') = ''04-Oct-1957'';

    ```


    ## 本章小结


    本章简要介绍了许多高级 `SELECT` 功能。每个主题都足以轻松填满一整章，有些甚至足以写成一整本书。不要期望能记住语法细节。更重要的是，我们要记住这些功能、模式以及何时使用它们。SQL
    易学难精。


    这是本书篇幅最长、代码最密集的一章。查询数据是数据库操作中最重要的部分。但最终，我们需要创建和更改数据。下一章将讨论用于修改数据的高级功能。


    脚注 1   2   3


    # 8. 使用高级 DML 修改数据


    既然我们已经学会了如何编写高级 SQL 语句来检索数据，现在该学习如何编写高级 SQL 语句来更改数据了。Oracle 的数据操作语言 (`DML`) 允许我们插入、更新和删除数据。^(¹⁸)


    Oracle 提供了四种主要的数据更改语句：`INSERT`、`UPDATE`、`DELETE` 和 `MERGE`。每个语句都有其特定的高级选项。还有一些对所有
    `DML` 语句都相关的高级功能：可更新视图、提示、错误日志记录和 returning 子句。一些附加命令虽然严格来说不是 `DML` 语句，但用于帮助我们更改数据：`TRUNCATE`、`COMMIT`、`ROLLBACK`、`SAVEPOINT`、`ALTER
    SYSTEM`、`ALTER SESSION` 等。使用和修改未存储在 Oracle 中的数据具有挑战性，Oracle 为此提供了许多不同的文件输入输出选项。最后，尽管
    `PL/SQL` 大多超出了本书的范围，但我们确实需要使用一些 `PL/SQL` 包来管理数据。


    本章与所有章节一样，假设你已经熟悉基本的 SQL 概念。每一节将直接介绍一个高级功能。为了节省篇幅，示例将直接修改数据集中的表。请记得在完成每个示例后回滚更改。


    ## INSERT


    `INSERT ALL` 语法旨在通过一条语句向多个表添加数据。该功能支持条件逻辑，即我们从一个大型源表中读取，并使用 `WHEN-THEN-ELSE` 逻辑来决定哪些行进入哪个目标表。但在实践中，该语法最常用于生成数据并向同一表中插入多行。


    例如，假设我们想将新燃料加载到 `PROPELLANT` 表中。有几种生成数据的方法，前面的章节已经演示了 `UNION ALL` 技巧。以下代码演示了 `INSERT
    ALL` 技巧：


    ```

    -- 生成新的 PROPELLANT 行。

    insert all

    into propellant values (-1, ''antimatter'')

    into propellant values (-2, ''dilithium crystals'')

    select * from dual;

    ```


    请注意，前面的 `INSERT ALL` 没有使用序列，而是硬编码了主键。硬编码是必要的，因为 `INSERT ALL` 每条语句只递增一次序列，而不是每行递增一次。


    关于 `INSERT ALL` 语句，有一个有争议的风格选择——前面的代码没有列出所有列名。通常，`INSERT` 语句应明确列出列名，以明确设置了哪些值。列出列名也能确保值被放入正确的位置，即使列顺序发生变化（尽管这种可能性不大）。另一方面，我们也不想重复自己并多次列出列名。


    `INSERT ALL` 技巧很巧妙，但 `UNION ALL` 技巧更适合生成数据。`INSERT ALL` 语句的解析速度比 `UNION ALL` 慢，尤其对于包含数百行的大型语句而言。


    如果我们的应用程序要生成大量数据，`INSERT ALL` 远胜于多条 `INSERT` 语句。但 `INSERT ALL` 不如使用应用程序的批处理 API。不要沉迷于
    `INSERT ALL`。它是个巧妙的技巧，但并非为生成海量数据而设计。'
- fmt: '## UPDATE


    `UPDATE`语句没有很多专属的激动人心的特性。`UPDATE`的大多数高级特性和副作用也适用于其他DML命令，将在后续章节讨论。但有一些`UPDATE`的主题值得探讨。


    `UPDATE`总是执行相同的工作量，无论值是否改变。将列更新为自身与更新为新值一样耗费资源。例如，下面的语句不改变任何内容，但该语句仍然生成REDO、UNDO和行锁。（REDO和UNDO在第[10](#471418_2_En_10_Chapter.xhtml)章讨论。）


    ```

    --Updating a value to itself still uses a lot of resources.

    update launch set launch_date = launch_date;

    ```


    避免使用引用同一张表两次的`UPDATE`语句。我们可以重写这些`UPDATE`语句，使其更快、更简单。例如，假设我们的数据集中有一个错误，并用一个`UPDATE`语句来修复这个错误。（记住要回滚本章中的更改。）发射和卫星有许多名称和标识符，它们之间有很多重叠。例如，一项先驱者任务的`LAUNCH.FLIGHT_ID2`设置为“Pioneer
    5”，但`SATELLITE.OFFICIAL_NAME`设置为“Pioneer V”。仅为了这个例子，假设数据是错误的，我们需要修复深空任务的卫星数据。我们的第一反应可能是编写以下`UPDATE`语句：


    ```

    --Update SATELLITE.OFFICIAL_NAME to LAUNCH.FLIGHT_ID2.

    update satellite

    set satellite.official_name =

    (

    select launch.flight_id2

    from launch

    where launch.launch_id = satellite.launch_id

    )

    where satellite.launch_id in

    (

    select launch.launch_id

    from launch

    where launch.launch_category = ''deep space''

    );

    ```


    前面的`UPDATE`语句有问题。SQL语句的第一部分包含一个关联子查询，这增加了上下文，并使SQL更难调试。第二个子查询以不同的方式再次从`LAUNCH`表读取。


    有两种方法可以重写前面的`UPDATE`语句。我们可以将`UPDATE`改为使用可更新视图，或者将`UPDATE`改为`MERGE`语句。`MERGE`语句是更好的选择，这两个选项都将在后面的章节中讨论。


    ## DELETE


    与`UPDATE`类似，`DELETE`语句也没有许多独特的高级特性。但`DELETE`语句在关系、锁和空间方面存在问题。删除时需要小心，不仅仅是因为丢失错误数据的明显问题。


    当我们从表中删除时，需要考虑该表及其所有关系。如果存在父-子关系，我们不能简单地从父表中删除。尝试删除被子行引用的父行通常会引发异常，如下所示：


    ```

    SQL> delete from launch;

    delete from launch

    *

    ERROR at line 1:

    ORA-02292: integrity constraint (SPACE.LAUNCH_AGENCY_LAUNCH_FK) violated -

    child record found

    ```


    删除父-子数据有四种方法：按特定顺序删除、可延迟约束、级联删除和触发器。


    按特定顺序删除父-子数据通常是最简单和最好的方法。通常很容易知道哪张表先来。如果我们幸运，错误消息中的约束名会给我们很好的线索。在前面的例子中，约束是`LAUNCH_AGENCY_LAUNCH_FK`，它引用`LAUNCH_AGENCY`表。在Oracle
    12.2版本之前，当Oracle名称限制为30字节时，我们并不总能给约束起明显的名字，因为没有足够的空间列出两张表。如果被迫使用隐晦的名字，我们可以在`DBA_CONSTRAINTS`中查找约束。


    为深层嵌套的表结构找到正确的删除顺序可能很烦人。但这种烦恼可能是一个防止错误删除的缓冲。如果我们有一张巨大的表树，我们真的想让人轻易地从所有表中同时删除吗？如果是，最安全的解决方案是找到正确的顺序，并将`DELETE`语句放在一个存储过程中。要生成该存储过程的代码，我们可以使用数据字典视图`ALL_CONSTRAINTS`编写一个递归查询。使用存储过程具有确保每个人以相同顺序删除数据的优势，从而防止死锁。


    可延迟约束允许我们暂时违反关系数据库的规则。使用延迟约束，我们可以按任何顺序删除数据，只要在下一次`COMMIT`之前一切都是正确的。但我们不应该盲目地一直使用延迟约束，因为延迟约束可能导致性能问题。延迟约束使用常规索引，而不是唯一索引。延迟约束导致元数据规则暂时放宽。这些放宽的元数据规则不能再被Oracle优化器用来选择更好的执行计划。


    级联删除允许系统在父行更改时自动删除子行。如前所述，我们可能并不总是希望让删除大量数据变得容易。就个人而言，我总是尽量避免危险的副作用，尤其是在删除数据时。对副作用的恐惧也是我们应该尽量避免使用触发器来解决`DELETE`问题的原因。


    当我们的`DELETE`语句在父表上成功时，我们需要小心避免锁定问题。每次删除父行时，Oracle都会检查子表中对该值的引用。如果子表中的外键列没有索引，这些查找会很慢——慢到Oracle将锁定整个子表，而不是仅锁定被删除的行。这种锁定升级就是为什么我们想在所有外键列上创建索引。另一方面，存在许多我们实际上永远不会删除父行的关系，这些索引就不需要了。而且锁定升级并不像一开始听起来那么糟糕。表锁是坏的，但外键表锁仅持续语句的持续时间，而不是事务的持续时间。


    当我们删除数据时，这些数据不会从文件系统中清除。`DELETE`语句生成大量REDO和UNDO，但实际的数据文件最初变化不大。数据文件中被删除的行只是被标记为可用于新行，并将逐渐被新数据覆盖。


    保留已删除行的空间通常是件好事。当从表中删除数据时，很有可能稍后会插入新数据。如果我们只是要再次请求更多空间，我们就不想释放空间。另一方面，有时我们删除数据后，永远不会将更多数据放回表中。在这些情况下，我们想重置高水位线，并用`TRUNCATE`语句回收我们的空间。`TRUNCATE`在技术上不是DML，但将在后面的章节中更详细地描述。


    删除行可能非常昂贵，以至于我们可能想要设计系统以避免使用`DELETE`进行大型数据清除。数据库通常包含具有大量历史数据的表，这些数据在一定时间后不再需要。如果我们已经许可了分区选项，我们可以基于表示每行年龄的日期列对这些表进行分区，然后定期截断或删除旧分区。创建维护作业来清理旧分区比简单的删除更复杂，但该作业将消耗很少的资源并瞬间运行。'
  raw: '## UPDATE


    There are not a lot of exciting features specific to `UPDATE` statements. Most
    of the advanced features and side effects of `UPDATE` also apply to other DML
    commands and will be discussed in later sections. But there are a few `UPDATE`
    topics worth discussing.


    `UPDATE` always performs the same amount of work regardless of whether the values
    change. Updating a column to itself is just as expensive as updating the column
    to a new value. For example, the following statement doesn’t change anything,
    but the statement still generates REDO, UNDO, and row locks. (REDO and UNDO are
    discussed in Chapter [10](#471418_2_En_10_Chapter.xhtml).)


    ```

    --Updating a value to itself still uses a lot of resources.

    update launch set launch_date = launch_date;

    ```


    Avoid `UPDATE` statements that reference the same table twice. We can rewrite
    those `UPDATE` statements to make them faster and simpler. For example, let’s
    pretend there is a mistake in our data set and fix the mistake with an `UPDATE`
    statement. (Remember to always roll back the changes in this chapter.) Launches
    and satellites have many names and identifiers, and there’s a lot of overlap between
    them. For example, one of the Pioneer missions has a `LAUNCH.FLIGHT_ID2` set to
    “Pioneer 5,” but the `SATELLITE.OFFICIAL_NAME` is set to “Pioneer V.” Just for
    the sake of this example, let’s pretend the data is wrong and we need to fix the
    satellite data for deep space missions. Our first instinct might be to write the
    following `UPDATE` statement:


    ```

    --Update SATELLITE.OFFICIAL_NAME to LAUNCH.FLIGHT_ID2.

    update satellite

    set satellite.official_name =

    (

    select launch.flight_id2

    from launch

    where launch.launch_id = satellite.launch_id

    )

    where satellite.launch_id in

    (

    select launch.launch_id

    from launch

    where launch.launch_category = ''deep space''

    );

    ```


    The preceding `UPDATE` statement has issues. The first part of the SQL statement
    includes a correlated subquery, which increases the context and makes the SQL
    harder to debug. The second subquery reads from the `LAUNCH` table again, but
    in a different way.


    There are two ways to rewrite the preceding `UPDATE` statement. We can change
    the `UPDATE` to use an updatable view, or we can change the `UPDATE` into a `MERGE`
    statement. The `MERGE` statement is the better choice, and both options are discussed
    in later sections.


    ## DELETE


    Similar to `UPDATE`, `DELETE` statements also don’t have many unique advanced
    features. But `DELETE` statements have issues with relationships, locking, and
    space. We need to be careful when deleting, and not just because of the obvious
    problem of losing the wrong data.


    When we delete from a table, we need to think about that table and all of its
    relationships. If there’s a parent–child relationship, we can’t simply delete
    from the parent table. Trying to delete a parent row that is referenced by a child
    row will usually raise an exception like this:


    ```

    SQL> delete from launch;

    delete from launch

    *

    ERROR at line 1:

    ORA-02292: integrity constraint (SPACE.LAUNCH_AGENCY_LAUNCH_FK) violated -

    child record found

    ```


    There are four ways to delete parent–child data: deleting in a specific order,
    deferrable constraints, cascading deletes, and triggers.


    Deleting parent–child data in a specific order is usually the simplest and best
    way. It’s normally easy to know which table comes first. If we’re lucky, the constraint
    name in the error message gives us a good clue where to look. In the preceding
    example, the constraint is `LAUNCH_AGENCY_LAUNCH_FK`, which refers to the `LAUNCH_AGENCY`
    table. Prior to Oracle version 12.2, when Oracle names were limited to 30 bytes,
    we couldn’t always give our constraints obvious names, since there wasn’t always
    enough space to list both tables. If we’re stuck with cryptic names, we can look
    up the constraint in `DBA_CONSTRAINTS`.


    Finding the correct deletion order for a deeply nested table structure can be
    annoying. But that annoyance is a speed bump that may prevent bad deletions. If
    we have a giant tree of tables, do we really want to make it easy for someone
    to delete from all of the tables at once? If so, the safest solution is to find
    the correct order and put the `DELETE` statements in a stored procedure. To generate
    the code for that stored procedure, we can write a recursive query using the data
    dictionary view `ALL_CONSTRAINTS`. Using a stored procedure has the advantage
    of ensuring everyone deletes data in the same order, thus preventing deadlocks.


    Deferrable constraints let us temporarily violate the rules of our relational
    database. With deferred constraints we can delete data in any order, as long as
    everything is correct before the next `COMMIT`. But we shouldn’t blindly use deferred
    constraints all the time, since deferred constraints can cause performance issues.
    Deferred constraints use regular indexes, never unique indexes. Deferred constraints
    cause a temporary relaxing of metadata rules. Those relaxed metadata rules can
    no longer be used by the Oracle optimizer to pick better execution plans.


    Cascading deletes let the system automatically delete child rows when the parent
    row is changed. As previously discussed, we may not always want to make it easy
    to delete large amounts of data. Personally, I always try to avoid dangerous side
    effects, especially when deleting data. A fear of side effects is also why we
    should try to avoid using triggers to solve our `DELETE` problems.


    When our `DELETE` statements are successful on parent tables, we need to be careful
    to avoid locking problems. Every time a parent row is deleted, Oracle checks child
    tables for references to that value. If the foreign key columns in the child table
    do not have indexes, those lookups will be slow – so slow that Oracle will lock
    the entire child table instead of just locking the deleted rows. That escalated
    locking is why we want to create indexes on all foreign key columns. On the other
    hand, there are many relationships where we will never realistically delete parent
    rows, and those indexes aren’t needed. And the lock escalation isn’t quite as
    bad as it might sound at first. Table locks are bad, but a foreign key table lock
    only lasts for the duration of the statement, not the duration of the transaction.


    When we delete data, that data isn’t scrubbed from the file system. `DELETE` statements
    generate a lot of REDO and UNDO, but the actual data files don’t initially change
    much. The deleted rows in the data files are just marked as being available for
    new rows and will get gradually overwritten with new data.


    Keeping the space from deleted rows is usually a good thing. When we delete data
    from a table, there’s a good chance new data will be inserted later. We don’t
    want to release the space if we’re just going to request more space again. On
    the other hand, there are times when we delete data and we’re never going to put
    more data back in the table. In those cases, we want to reset the high-water mark
    and reclaim our space with a `TRUNCATE` statement. `TRUNCATE` is not technically
    DML, but it will be described in more detail in a later section.


    Removing rows can be so expensive that we may want to architect our systems to
    avoid using `DELETE` for large data purges. Databases frequently contain tables
    with large amounts of historical data that are no longer needed after a certain
    amount of time. If we have licensed the partitioning option, we can partition
    those tables based on a date column that represents the age of each row and then
    periodically truncate or drop old partitions. Creating a maintenance job to clean
    up old partitions is more complex than a simple delete, but the job will consume
    few resources and will run instantly.'
  trans: '

    ## 更新（UPDATE）


    `UPDATE`语句并没有很多专属的激动人心的特性。`UPDATE`的大多数高级特性和副作用也适用于其他 DML 命令，将在后续章节讨论。但有一些`UPDATE`的主题值得探讨。


    `UPDATE`总是执行相同的工作量，无论值是否改变。将列更新为自身与更新为新值一样耗费资源。例如，下面的语句不改变任何内容，但该语句仍然生成 REDO、UNDO
    和行锁。（REDO 和 UNDO 在第 10 章讨论。）


    ```

    --Updating a value to itself still uses a lot of resources.

    update launch set launch_date = launch_date;

    ```


    避免使用引用同一张表两次的`UPDATE`语句。我们可以重写这些`UPDATE`语句，使其更快、更简单。例如，假设我们的数据集中有一个错误，并用一个`UPDATE`语句来修复这个错误。（记住要回滚本章中的更改。）发射和卫星有许多名称和标识符，它们之间有很多重叠。例如，一项先驱者任务的`LAUNCH.FLIGHT_ID2`设置为“Pioneer
    5”，但`SATELLITE.OFFICIAL_NAME`设置为“Pioneer V”。仅为了这个例子，假设数据是错误的，我们需要修复深空任务的卫星数据。我们的第一反应可能是编写以下`UPDATE`语句：


    ```

    --Update SATELLITE.OFFICIAL_NAME to LAUNCH.FLIGHT_ID2.

    update satellite

    set satellite.official_name =

    (

    select launch.flight_id2

    from launch

    where launch.launch_id = satellite.launch_id

    )

    where satellite.launch_id in

    (

    select launch.launch_id

    from launch

    where launch.launch_category = ''deep space''

    );

    ```


    前面的`UPDATE`语句有问题。SQL 语句的第一部分包含一个关联子查询，这增加了上下文，并使 SQL 更难调试。第二个子查询以不同的方式再次从`LAUNCH`表读取。


    有两种方法可以重写前面的`UPDATE`语句。我们可以将`UPDATE`改为使用可更新视图，或者将`UPDATE`改为`MERGE`语句。`MERGE`语句是更好的选择，这两个选项都将在后面的章节中讨论。


    ## 删除（DELETE）


    与`UPDATE`类似，`DELETE`语句也没有许多独特的高级特性。但`DELETE`语句在关系、锁和空间方面存在问题。删除时需要小心，不仅仅是因为丢失错误数据的明显问题。


    当我们从表中删除时，需要考虑该表及其所有关系。如果存在父-子关系，我们不能简单地从父表中删除。尝试删除被子行引用的父行通常会引发异常，如下所示：


    ```

    SQL> delete from launch;

    delete from launch

    *

    ERROR at line 1:

    ORA-02292: integrity constraint (SPACE.LAUNCH_AGENCY_LAUNCH_FK) violated -

    child record found

    ```


    删除父-子数据有四种方法：按特定顺序删除、可延迟约束、级联删除和触发器。


    按特定顺序删除父-子数据通常是最简单和最好的方法。通常很容易知道哪张表先来。如果我们幸运，错误消息中的约束名会给我们很好的线索。在前面的例子中，约束是`LAUNCH_AGENCY_LAUNCH_FK`，它引用`LAUNCH_AGENCY`表。在
    Oracle 12.2 版本之前，当 Oracle 名称限制为 30 字节时，我们并不总能给约束起明显的名字，因为没有足够的空间列出两张表。如果被迫使用隐晦的名字，我们可以在`DBA_CONSTRAINTS`中查找约束。


    为深层嵌套的表结构找到正确的删除顺序可能很烦人。但这种烦恼可能是一个防止错误删除的缓冲。如果我们有一张巨大的表树，我们真的想让人轻易地从所有表中同时删除吗？如果是，最安全的解决方案是找到正确的顺序，并将`DELETE`语句放在一个存储过程中。要生成该存储过程的代码，我们可以使用数据字典视图`ALL_CONSTRAINTS`编写一个递归查询。使用存储过程具有确保每个人以相同顺序删除数据的优势，从而防止死锁。


    可延迟约束允许我们暂时违反关系数据库的规则。使用延迟约束，我们可以按任何顺序删除数据，只要在下一次`COMMIT`之前一切都是正确的。但我们不应该盲目地一直使用延迟约束，因为延迟约束可能导致性能问题。延迟约束使用常规索引，而不是唯一索引。延迟约束导致元数据规则暂时放宽。这些放宽的元数据规则不能再被
    Oracle 优化器用来选择更好的执行计划。


    级联删除允许系统在父行更改时自动删除子行。如前所述，我们可能并不总是希望让删除大量数据变得容易。就个人而言，我总是尽量避免危险的副作用，尤其是在删除数据时。对副作用的恐惧也是我们应该尽量避免使用触发器来解决`DELETE`问题的原因。


    当我们的`DELETE`语句在父表上成功时，我们需要小心避免锁定问题。每次删除父行时，Oracle 都会检查子表中对该值的引用。如果子表中的外键列没有索引，这些查找会很慢——慢到
    Oracle 将锁定整个子表，而不是仅锁定被删除的行。这种锁定升级就是为什么我们想在所有外键列上创建索引。另一方面，存在许多我们实际上永远不会删除父行的关系，这些索引就不需要了。而且锁定升级并不像一开始听起来那么糟糕。表锁是坏的，但外键表锁仅持续语句的持续时间，而不是事务的持续时间。


    当我们删除数据时，这些数据不会从文件系统中清除。`DELETE`语句生成大量 REDO 和 UNDO，但实际的数据文件最初变化不大。数据文件中被删除的行只是被标记为可用于新行，并将逐渐被新数据覆盖。


    保留已删除行的空间通常是件好事。当从表中删除数据时，很有可能稍后会插入新数据。如果我们只是要再次请求更多空间，我们就不想释放空间。另一方面，有时我们删除数据后，永远不会将更多数据放回表中。在这些情况下，我们想重置高水位线，并用`TRUNCATE`语句回收我们的空间。`TRUNCATE`在技术上不是
    DML，但将在后面的章节中更详细地描述。


    删除行可能非常昂贵，以至于我们可能想要设计系统以避免使用`DELETE`进行大型数据清除。数据库通常包含具有大量历史数据的表，这些数据在一定时间后不再需要。如果我们已经许可了分区选项，我们可以基于表示每行年龄的日期列对这些表进行分区，然后定期截断或删除旧分区。创建维护作业来清理旧分区比简单的删除更复杂，但该作业将消耗很少的资源并瞬间运行。

    '
- fmt: '## MERGE


    `MERGE`命令让我们能够更新或插入行，具体取决于这些行是否已经存在。其他数据库将此命令称为`UPSERT`，偶尔Oracle也会使用该名称。例如，在`V$SQLCOMMAND`中，该命令被称为"UPSERT"。除了能够合并插入和更新操作外，`MERGE`命令也是一种执行复杂更新的更简单、更快捷的方式。


    `MERGE`的语法起初可能看起来令人困惑。但一些额外的关键词比编写多个`INSERT`和`UPDATE`语句并检查值是否存在要好。例如，以下代码使用太空电梯数据修改了`PLATFORM`表。`MERGE`语句在行不存在时添加该行，如果行已存在则更新该行。


    太空电梯将让我们通过攀爬一根巨大的缆绳前往太空。缆绳的一端会固定在地球上，另一端会连接到太空中的一个配重块。太空电梯在科幻小说中很常见，但它们并非完全是科幻小说，因为日本已经发射了微小的实验性太空电梯：


    ```sql

    --将太空电梯合并到PLATFORM中。

    merge into platform

    using

    (

    --新行：

    select

    ''ELEVATOR1'' platform_code,

    ''Shizuoka Space Elevator'' platform_name

    from dual

    ) elevator

    on (platform.platform_code = elevator.platform_code)

    when not matched then

    insert(platform_code, platform_name)

    values(elevator.platform_code, elevator.platform_name)

    when matched then update set

    platform_name = elevator.platform_name;

    ```


    前面代码中一个微小的语法烦恼是`ON`条件周围的圆括号。连接（Join）通常不需要括号，但`MERGE`语句在这里确实需要括号。


    如果我们在SQL*Plus中运行前面的代码，会看到类似"1 row merged."的反馈消息。不幸的是，无法判断该行是被更新还是被插入，这可能会使日志记录或基于`MERGE`行为进行决策变得复杂。


    前面的`MERGE`语句既有更新部分也有插入部分，但我们并不总是需要同时包含两者。让我们使用`MERGE`来重写上一节中的`UPDATE`语句。以下语句执行相同的操作——将`SATELLITE.OFFICIAL_NAME`更新为深空发射任务的`LAUNCHES.FLIGHT_ID2`：


    ```sql

    --将SATELLITE.OFFICIAL_NAME更新为LAUNCH.FLIGHT_ID2。

    merge into satellite

    using

    (

    select launch_id, flight_id2

    from launch

    where launch_category = ''deep space''

    ) launches

    on (satellite.launch_id = launches.launch_id)

    when matched then update set

    satellite.official_name = launches.flight_id2;

    ```


    前面使用`MERGE`的重写比之前的`UPDATE`语句更简单、更快。新语句只引用了`LAUNCH`表一次。并且`LAUNCH`表是在内联视图中使用的，这使得调试输入行更加容易。此外，`MERGE`语句比`UPDATE`语句支持更多的连接方法。例如，`MERGE`语句可以使用哈希连接，但`UPDATE`语句不能。


    `MERGE`不仅用于更新插入（upserts）。对于任何引用同一表多次或更改大量行的复杂`UPDATE`语句，我们都应考虑使用`MERGE`。


    ## Updatable Views


    可更新视图让我们可以从查询中插入、更新和删除行，而无需直接操作表。可更新视图可以存储在视图对象中，也可以是一个子查询。可更新视图可以包含多个表的连接，但一次只能修改一个表。可更新视图还有其他一些重要限制。


    例如，让我们创建另一个版本的SQL语句，将`SATELLITE.OFFICIAL_NAME`设置为`LAUNCH.FLIGHT_ID2`：


    ```sql

    --将SATELLITE.OFFICIAL_NAME更新为LAUNCH.FLIGHT_ID2。

    update

    (

    select satellite.official_name, launch.flight_id2

    from satellite

    join launch

    on satellite.launch_id = launch.launch_id

    where launch_category = ''deep space''

    )

    set official_name = flight_id2;

    ```


    在这三种实现此更改的版本中，前面的可更新视图版本是最小的。尽管此功能在此示例中运行良好，但通常应避免使用可更新视图。


    可更新视图的主要问题之一是对其可包含的查询有大量限制。查询或视图不能包含`DISTINCT`、`GROUP BY`、某些表达式等。使用这些功能的查询可能会引发"ORA01732:
    data manipulation operation not legal on this view"异常。幸运的是，我们不必检查或试验每个视图来了解我们可以修改什么。数据字典视图`DBA_UPDATABLE_COLUMNS`告诉我们每个视图列可以执行哪些操作。


    可更新视图查询必须明确地将被修改表的每一行返回不超过一次。查询必须是"键保留的"，这意味着Oracle必须能够使用主键或唯一约束来确保每行只被修改一次。否则，查询将引发"ORA-01779:
    cannot modify a column which maps to a non key-preserved table"异常。


    `UPDATE`语句在编译时检查可能的歧义，如果该语句在理论上可能是歧义的，则引发异常。即使可更新视图在运行时*会*工作，它们也可能在编译时失败。


    `MERGE`语句在运行时检查可能的歧义，并引发"ORA-30926: unable to get a stable set of rows in the
    source tables"异常。`MERGE`语句功能更强大，但也允许一些*不应该*工作的语句运行。


    演示键保留表很棘手，需要很多篇幅。^([^(19)](#fn19))最好完全避免使用可更新视图。但如果我们被困在一个只提供视图而无法直接访问表的系统中，可更新视图是我们唯一的选择。如果我们必须使用视图，但该视图不能满足所有键保留要求，我们可以使用`INSTEAD
    OF`触发器。'
  raw: '## MERGE


    The `MERGE` command lets us update or insert rows, depending on whether the rows
    already exist. Other databases name this command `UPSERT`, and occasionally Oracle
    will also use that name. For example, the command is named “UPSERT” in `V$SQLCOMMAND`.
    In addition to letting us combine inserts and updates, the `MERGE` command is
    also a simpler and faster way to perform complex updates.


    The `MERGE` syntax may look confusing at first. But a few extra keywords are better
    than writing multiple `INSERT` and `UPDATE` statements and checking for the existence
    of a value. For example, the following code modifies the `PLATFORM` table with
    space elevator data. The `MERGE` statement adds the row if it doesn’t exist or
    updates the row if it does exist.


    A space elevator would let us travel to space by climbing a large cable. One end
    of the cable would be attached to Earth, and the other end would be attached to
    a counterweight in space. Space elevators are common in science fiction books,
    but space elevators aren’t entirely science fiction as Japan has launched tiny,
    experimental space elevators:


    ```

    --Merge space elevator into PLATFORM.

    merge into platform

    using

    (

    --New row:

    select

    ''ELEVATOR1'' platform_code,

    ''Shizuoka Space Elevator'' platform_name

    from dual

    ) elevator

    on (platform.platform_code = elevator.platform_code)

    when not matched then

    insert(platform_code, platform_name)

    values(elevator.platform_code, elevator.platform_name)

    when matched then update set

    platform_name = elevator.platform_name;

    ```


    One minor syntax annoyance in the preceding code is the parentheses around the
    `ON` condition. Joins don’t normally require parentheses, but the `MERGE` statement
    does require parentheses here.


    If we ran the preceding code in SQL*Plus, we would see a feedback message like
    “1 row merged.” Unfortunately, there is no way of telling whether that row was
    updated or inserted, which can complicate logging or making decisions based on
    the behavior of a `MERGE`.


    The preceding `MERGE` statement has both an update and an insert section, but
    we don’t always need to include both. Let’s use `MERGE` to rewrite the `UPDATE`
    statement from the previous section. The following statement does the same thing
    – updates `SATELLITE.OFFICIAL_NAME` to `LAUNCHES.FLIGHT_ID2`, for deep space launches:


    ```

    --Update SATELLITE.OFFICIAL_NAME to LAUNCH.FLIGHT_ID2.

    merge into satellite

    using

    (

    select launch_id, flight_id2

    from launch

    where launch_category = ''deep space''

    ) launches

    on (satellite.launch_id = launches.launch_id)

    when matched then update set

    satellite.official_name = launches.flight_id2;

    ```


    The preceding rewrite using `MERGE` is simpler and faster than the previous `UPDATE`
    statement. The new statement only references the `LAUNCH` table once. And the
    `LAUNCH` table is used in an inline view, making it easier to debug the input
    rows. Additionally, `MERGE` statements support more join methods than `UPDATES`.
    For example, a `MERGE` statement can use a hash join, but an `UPDATE` statement
    cannot.


    `MERGE` isn’t just for upserts. We should consider using `MERGE` for any complex
    `UPDATE` statement that either references the same table multiple times or changes
    a large number of rows.


    ## Updatable Views


    Updatable views let us insert, update, and delete rows from a query, instead of
    working directly on a table. The updatable view can be stored in a view object,
    or it can be a subquery. The updatable view can contain joins with multiple tables,
    but only one table can be modified at a time. There are several other important
    restrictions on updatable views.


    For example, let’s create yet another version of our SQL statement to set `SATELLITE.OFFICIAL_NAME`
    to `LAUNCH.FLIGHT_ID2`:


    ```

    --Update SATELLITE.OFFICIAL_NAME to LAUNCH.FLIGHT_ID2.

    update

    (

    select satellite.official_name, launch.flight_id2

    from satellite

    join launch

    on satellite.launch_id = launch.launch_id

    where launch_category = ''deep space''

    )

    set official_name = flight_id2;

    ```


    Of the three versions of this change, the preceding updatable view version is
    the smallest. Despite the feature working well in this example, updatable views
    should usually be avoided.


    One of the main problems with updatable views is the large number of restrictions
    on the queries they can contain. The query or view must not contain `DISTINCT`,
    `GROUP BY`, certain expressions, etc. Queries using those features may raise the
    exception “ORA01732: data manipulation operation not legal on this view.” Luckily,
    we don’t have to examine or experiment with each view to find out what we can
    modify. The data dictionary view `DBA_UPDATABLE_COLUMNS` tells us what operations
    are possible for each view column.


    The updatable view query must unambiguously return each row of the modified table
    no more than one time. The query must be “key-preserved,” which means Oracle must
    be able to use a primary key or unique constraint to ensure that each row is only
    modified once. Otherwise, the query will raise the exception “ORA-01779: cannot
    modify a column which maps to a non key-preserved table.”


    The `UPDATE` statement checks for possible ambiguities at compile time and raises
    exceptions if the statement could theoretically be ambiguous. Updatable views
    can fail at compile time even when they *would* work at run time.


    The `MERGE` statement checks for possible ambiguities at run time and raises the
    exception “ORA-30926: unable to get a stable set of rows in the source tables.”
    The `MERGE` statement is more powerful but also lets a few statements run that
    *shouldn’t* work.


    Demonstrating key-preserved tables is tricky and would require a lot of pages.^([^(19)](#fn19))
    It’s best to avoid updatable views completely. But if we’re stuck on a system
    that only gives us views, and no direct access to tables, updatable views are
    our only option. If we must use a view, but the view can’t meet all the key-preserved
    requirements, we can use `INSTEAD OF` triggers.'
