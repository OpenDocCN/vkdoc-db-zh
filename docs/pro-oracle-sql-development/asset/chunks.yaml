    a single SQL statement can cause issues. Chapter [12](#471418_2_En_12_Chapter.xhtml)
    discusses the style and performance issues caused by building large, nested queries.
    Now that we have the small pieces, the next section discusses how to put them
    together with the ANSI join syntax.


    ## ANSI Joins


    If sets and inline view chunks are the ingredients, then ANSI joins are the recipe
    for creating readable SQL statements. Using the `JOIN` keyword makes our queries
