  trans: '

    我们不应更改前述参数，除非我们自认比 Oracle 的工程师更聪明。当然，我们确实有很多时候比 Oracle 工程师更了解情况，例如当我们对自身环境有特定认知时。比如，只有我们知道数据库需要处理多少会话。如果我们有一个必须支持一千个连接的数据库，那么就有必要增加
    `SESSIONS` 和 `PROCESSES` 参数，尽管这样做会略微增加内存需求。


    另一方面，我们并不知道我们的索引性能比 Oracle 预期性能快多少或慢多少；修改 `OPTIMIZER_INDEX_COST_ADJ` 几乎肯定是个坏主意。虽然有时修改这个参数确实能通过将执行计划从全表扫描改为索引扫描来提升特定查询的性能。但我们不应该为了修复一条语句的问题而调整整个系统。解决方案的规模应该与问题的规模相匹配，而
    Oracle 允许我们按会话或按查询设置该参数。我之所以将这个参数列在前面，不是因为我们有定制它的需要，而是因为当其他人错误地修改它后，我们经常需要将其改回默认值。


    ### 用于检查数据库的关系型工具


    数据库中还散布着许多其他工具，可用于调查数据库。


    `VSIZE` 是一个有用的函数，它返回值所占的字节数。乍一听这似乎是个微不足道的特性，但令人惊讶的是，许多架构决策都取决于数据类型的大小。有一个愚蠢但持续存在的迷思，认为
    Oracle 总是分配尽可能多的空间。只需调用几次 `VSIZE` 就能驱散这个迷思。`VSIZE` 还表明，小数字所占的空间可能比我们预期的要多：


    ```

    --值的字节大小：

    select

    vsize(0) zero_size,

    vsize(1) one_size,

    vsize(10) ten_size,

    vsize(date ''2000-01-01'') date_size,

    vsize(cast(''a'' as varchar2(4000))) string_size

    from dual;

    ZERO_SIZE  ONE_SIZE  TEN_SIZE  DATE_SIZE  STRING_SIZE

    ---------  --------  --------  ---------  -----------

    1         2         2          7            1

    ```


    `DUMP` 函数显示值的内部内容。在处理非 ASCII 字符时，这个函数非常有用。例如，想象一个包含链接的表。当我们查询该表时，一切看起来都正常：


    ```

    select * from random_links;

    URL


    google.com

    ```


    等一下——让我们深入探究一下。那个字符串看起来像“google.com”，但数据库里的值真的是“google.com”吗？看看下面的输出，你能否发现问题所在：


    ```

    select dump(url,16) from random_links;

    DUMP(URL,16)


    Typ=1 Len=11: 67,6f,c3,b6,67,6c,65,2e,63,6f,6d

    ```


    你可能首先注意到的是 `Len=11`。长度是 11 字节，但“google.com”只有十个字符。如果你仔细观察十六进制值，会发现第二个“o”并不是真正的“o”，而是“ö”。这是一个带分音符（即上方有两个点）的“o”。


    这种技巧被称为视觉欺骗。它是故意难以察觉的，如果没有像 `DUMP` 这样的函数，我们可能永远发现不了问题。如果你好奇，这个恶意字符串是这样创建的：


    ```

    insert into random_links values(''go''||unistr(''\00f6'')||''gle.com'');

    ```


    理论上，我们可以使用数据字典重建任何对象。例如，与表相关的所有特性都可以在数据字典视图中找到，如 `ALL_TABLES`、`ALL_TAB_COLUMNS`、`ALL_CONSTRAINTS`
    等。但实际上，要重建对象的完整 DDL（数据定义语言）是困难的，尤其是对于那些晦涩的特性。函数 `DBMS_METADATA.GET_DDL` 可以让我们的工作轻松很多，并且它有很多用于调整格式的选项。例如，以下代码用于查找表
    `LAUNCH` 背后的语句：


    ```

    select dbms_metadata.get_ddl(

    object_type => ''TABLE'',

    name        => ''LAUNCH'',

    schema      => ''SPACE'') ddl

    from dual;

    DDL


    CREATE TABLE "SPACE"."LAUNCH"

    (    "LAUNCH_ID" NUMBER,

    "LAUNCH_TAG" VARCHAR2(15 CHAR),

    "LAUNCH_DATE" DATE,

    ...

    ```


    但如果我们发现自己扮演起模式侦探的角色，那我们就已经输了。正如第 2 章所讨论的，找到模式脚本的最佳方式是查看受版本控制的纯文本文件。前面查询的完整输出，虽然在技术上是正确的，但存在一些格式问题，并包含大量无价值的信息，而我们的安装脚本则全是有效信息，没有噪音。我们本不应忍受这些无意义的字节。


    `SYS_CONTEXT` 函数可以检索有关当前会话上下文的数据。我们可以创建自定义上下文，但最常见的上下文是默认的 `USERENV`。这是一种无需查看多个表就能获取当前会话相关信息的便捷方式。例如，以下代码用于获取我们用于连接数据库的主机名：


    ```

    select sys_context(''userenv'', ''host'') from dual;

    ```


    对于代码分析，PL/Scope 在需要理解代码的任务中非常有用。PL/Scope 可以查找特定的依赖关系、未使用的变量等。而 `DBMS_DEBUG` 包可以帮助我们在代码执行时逐行单步调试。这些是有趣的工具，但通常只有在与
    IDE（集成开发环境）结合使用时才有帮助。


    ### 用于检查数据库的非关系型工具


    Oracle 还包含许多非关系型工具来帮助检查数据库。（性能调优是一个大主题，将在第四部分介绍。）一个程序可以与数据库协作，甚至可能在数据库程序内部运行，但它不一定是关系型的。这种区分很重要，因为非关系型工具不能像关系型工具那样适用于多种场景。


    例如，SQL*Plus 中的 `DESC` 命令是一种快速获取表信息的便捷方式：


    ```

    SQL> desc space.launch

    Name                  Null?    Type

    --------------------- -------- -----------------

    LAUNCH_ID             NOT NULL NUMBER

    LAUNCH_TAG                     VARCHAR2(15 CHAR)

    LAUNCH_DATE                    DATE

    ...

    ```


    虽然 `DESC` 命令很有用，但我们可能要避免过度依赖它，因为它仅在 SQL*Plus 中可用。尽管几乎所有开发者都能使用 SQL*Plus，但大多数开发者使用的是图形化的
    IDE。使用数据字典查询，或调用 `DBMS_METADATA.GET_DDL`，可能需要多做一些工作，但为了确保我们构建纯粹的关系型解决方案，这是值得的。


    传统的导出和数据泵导出程序，即 `EXP` 和 `EXPDP`，也可以用来查找有用的数据和元数据。未文档化的 `ORADEBUG` 命令可以输出单个数据块，帮助我们精确查看数据在磁盘上的存储方式。Oracle
    跟踪可以帮助我们理解优化器的决策，并确切看到后台为支持我们的查询正在运行什么。还有一整套工具通常只对数据库管理员有用：监听器控制、服务器控制等等。


    Oracle 是闭源的，但如果我们熟悉所有这些元数据工具，我们就能弄清楚到底发生了什么。了解各种各样的数据库工具是有益的，因为不同的人有不同的风格和偏好来调查数据库问题。例如，我通常在
    PL/SQL Developer 中工作，使用 Ctrl+右键单击来描述表。但当我与更喜欢 SQL*Plus 的 DBA 合作时，我会使用 `DESC` 命令向他们展示表元数据。

    '
- fmt: '## Summary


    When we start programming, we should be skeptical of our programs and ideas. Eventually
    we must become confident of our programs and knowledge, but that confidence should
    be the product of automated unit testing and concise test cases. Luckily, Oracle
    provides a wealth of views and tools to help us build that confidence. But there’s
    only so much we can do by ourselves, and eventually we’ll need help from other
    people. The next chapter will help us find reliable sources for Oracle knowledge.


    Footnotes [1](#471418_2_En_3_Chapter.xhtml#Fn1_source)


    # 4. Find Reliable Sources


    Oracle SQL programming has an epistemic problem. Epistemology is the study of
    knowledge, or simply asking ourselves what do we know and how do we know it. We
    don’t need to take a philosophy class before we start programming, but we do need
    to carefully consider our sources. The Oracle programming culture places too much
    weight on unreliable epistemologies, such as tradition and scripture, and not
    enough weight on science and reason. If we listen to the wrong sources, we will
    learn the wrong lessons.


    Why is finding reliable sources a problem with Oracle more than other technologies?
    Oracle is geared toward business users, not academics or traditional programmers.
    Computer science students rarely learn about Oracle and don’t focus their obsessive
    curiosity on SQL or PL/SQL. Students, technology thought leaders, and hobby programmers
    tend to ignore business-oriented programming languages. Oracle is often used for
    boring “enterprise” software that slowly and painfully evolves and avoids experiments
    and refactoring. And it certainly doesn’t help that Oracle is closed source and
    that Oracle Corporation has a history of being hostile toward open source.


    A disproportionate number of people only use Oracle to help earn a paycheck and
    don’t spend time deciphering and testing the internals of their database. Not
    everyone needs to be a hobby programmer, but there needs to be a minimum number
    of curious people to create the right cultural norms.


    There’s a knowledge gap, and that gap has been filled by an annoying amount of
    tradition, appeals to authority, clickbait, and myths. We can’t reasonably test
    everything; the development processes and testing techniques described in Chapters
    [2](#471418_2_En_2_Chapter.xhtml) and [3](#471418_2_En_3_Chapter.xhtml) require
    a lot of time and effort, and real-life performance problems contain too many
    uncontrollable variables. We’ll never accomplish anything if we always challenge
    *every* assumption. But our thought leaders should be the kind of people who are
    always willing to support their ideas with reproducible test cases.


    We need to avoid experts who make wild claims about things they saw happen once
    but cannot demonstrate again. We need to be cautious of websites that make extraordinary
    claims about Oracle but don’t provide a way to challenge those claims.


    We learned in the previous chapters how to create scientific experiments in our
    databases. When we don’t have time for experiments, we at least need to follow
    the *right* authority and the *right* traditions. This chapter provides tips for
    how to find good resources online and how to find good resources locally. With
    enough time and practice, someday you will become one of those good resources
    for your community.


    ## Places to Go


    Finding relevant, accurate information about Oracle is not as simple as googling
    it. The top results frequently have problems, especially if those results are
    forums or static websites. The best resources are sites like Stack Overflow, the
    official documentation, and My Oracle Support.


    ### The Problems with Forums


    Forums are not optimal for narrow technical questions. They focus on the person
    asking the question, instead of the much larger number of people who will read
    the answers years later. That misguided focus creates constant arguments and long
    meandering conversations that draw attention away from the simple solutions that
    we care about. Forums focus on a single point in time, but technology changes,
    and a good answer today may be a bad answer tomorrow. Forums that lock posts,
    or complain when people reply to old posts, prevent users from curating information.


    Sites like Stack Overflow have mostly replaced forums. The key to Stack Overflow
    is that it doesn’t focus on a conversation between two people. The site focuses
    on a question and an answer, and it ignores personalities and meta discussions.
    Stack Overflow is a combination of a Wiki, a blog, a forum, and an aggregation
    site like Reddit. Those technologies make the site difficult for new users to
    ask questions, but they make the questions and answers smaller, more up to date,
    and more readable. The real audience for a tech website is the readers, not the
    people asking and answering questions. We should spend our time on websites that
    have the best information, not necessarily the sites that are friendliest to new
    users.


    On the other hand, few problems have a simple, objective answer. Large questions
    with subjective answers are a better fit for the conversational tone of forums.
    We can’t always simply copy and paste code from Stack Overflow, and participating
    in question-and-answer sites can feel unfair and dehumanizing. We should occasionally
    take the time to read in-depth discussions of difficult technical topics.


    ### The Problems with Static Websites


    We should be skeptical of static websites that don’t allow any reader feedback.
    I don’t expect every blogger to engage in debates and answer every question, but
    every technical resource should have a way to add comments. We at least need the
    ability to warn each other with comments such as “This feature is deprecated in
    version X.”


    Oracle is an old program, and many of the first websites about Oracle are correspondingly
    old. Since those websites were built first, they have the most links and are at
    the top of search results, regardless of their quality.


    We also need to watch out for websites that post unusual information to get traffic.
    It’s not as bad as regular clickbait; I have not yet seen an article titled “You
    won’t believe these 8 shocking tips for indexing your database!” But some of the
    most popular Oracle-related websites post wild and unsubstantiated performance
    claims.


    There are plenty of times when changing one irrelevant detail makes our program
    run faster. Seemingly magical performance gains happen frequently because of issues
    described in Chapter [3](#471418_2_En_3_Chapter.xhtml), such as caching and execution
    plan changes. For example, `COUNT(1)` is not faster than `COUNT(*)`, but as a
    side effect of rewriting a query, it may initially seem faster.


    When someone posts irrational performance tips, we need the ability to point out
    the likely root cause and to demand a fully reproducible test case. But if there’s
    no way to challenge that information, the mistakes may never get corrected.


    It’s also important that technical websites include metadata such as publication
    date and the Oracle version. A lot of technical advice expires with each new version.
    For example, many PL/SQL websites still discuss cursor processing with the `OPEN/FETCH/CLOSE`
    syntax. But that feature has been almost entirely superseded by cursor `FOR` loops.


    Do not blindly trust nonofficial sources that don’t allow comments. Those sources
    are still useful, but we need to remain skeptical about them.'
