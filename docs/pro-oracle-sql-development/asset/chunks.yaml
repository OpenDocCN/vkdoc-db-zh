  trans: '

    ### 数据文件


    数据文件是所有数据的实际存储结构，正如其名——它们就是操作系统中的文件。数据文件并非段的真正父级，因此本章使用的层次模型并不完美。一个大型表段可以跨越多个数据文件。但在实践中，数据文件往往比段大得多。


    不幸的是，添加数据文件是 SQL 开发人员需要了解的一项任务。添加数据文件属于数据库管理任务，但它经常被错误执行并引发问题。以下是一个添加数据文件的简单示例：


    ```

    --Add data file.

    alter tablespace my_tablespace add datafile ''C:\APP\...\FILE_X.DBF''

    size 100m

    autoextend on

    next 100m

    maxsize unlimited;

    ```


    上例的第一行是纯粹的数据库管理操作。查找表空间名称、目录（或 ASM 磁盘组）和文件名取决于我们的系统配置。最后四行对开发人员至关重要，值得简要讨论。创建初始较大的数据文件并无性能优势，因此从小一点的`SIZE
    100M`开始可以节省空间，尤其是在有大量数据文件的大型环境中。我们几乎总是希望随着数据增长而增大数据文件大小，因此`AUTOEXTEND ON`是一个简便的选择。我们希望数据文件以合理的速度增长，`NEXT
    100M`是一个合适的大小。如果将`NEXT`子句设为`1`，会导致严重的性能问题，因为系统将不得不为每 8KB 的数据扩展数据文件。另一方面，我们也不希望`NEXT`子句设置得太高而浪费空间。而且我们不妨尽可能利用空间，所以将`MAXSIZE
    UNLIMITED`设为一个好的默认值也是合理的。


    另一个重要决策是添加多少个数据文件。作为开发人员，我们有责任提供数据大小的初步估计。但我们也需要认识到我们的估计可能是错误的。如果可能，我们应该尝试建立数据文件增长的规则。一个好的规则是始终将数据文件数量翻倍。如果我们遵循前面的设置，添加额外的数据文件几乎是零成本的。将数据文件数量翻倍不会有任何坏处，而且它提供了很大的缓冲空间。


    关于数据文件的讨论可能感觉与 SQL 开发人员的工作无关。但提前思考空间增长是值得的。空间耗尽是 Oracle 停机的最常见原因。没有什么比分配了 TB 级空间，却因为一个数据文件未被设置为自动扩展而导致应用程序失败，或者因为
    DBA 一次只添加一个数据文件而不是将其数量翻倍而反复导致应用程序失败更令人沮丧的了。


    还有其他方法可以确保我们不会耗尽空间。例如，我们可以使用单个大文件表空间（bigfile）代替多个小文件表空间（smallfile）。再次强调，作为 SQL
    开发人员，我们可能并不特别关心这些细节。无论我们的 DBA 选择哪种方法，我们都需要确保有一个系统来避免频繁空间耗尽。


    数据文件也有高水位标记，我们可能需要偶尔对数据文件进行碎片整理。在高水位标记之上进行碎片整理很容易，但在高水位标记之下进行碎片整理可能会很痛苦。如果我们清理了很多对象，但大型数据文件仍然浪费空间，我们需要与
    DBA 沟通。但如果 DBA 告诉我们无法轻松回收空间，请不要感到惊讶。


    ### 表空间


    表空间是段的逻辑集合，并包含一个或多个数据文件。表空间用于将存储分组，通常针对一个应用程序或特定类型的数据。


    每个具有永久数据的对象都可以分配到不同的表空间。但我们不希望为每个表都操心其表空间。管理存储最简单的方法是为每个用户创建一个表空间，并让该模式中的每个对象使用默认表空间。表空间越少，管理数据库越容易。我们拥有的表空间越多，其中一个表空间空间耗尽并导致问题的可能性就越大。另一方面，我们也不希望只使用*一个*表空间；一个失控的应用程序可能会填满该表空间并导致整个数据库崩溃。


    许多实用程序和功能可以按表空间工作，例如数据泵导入导出、备份和可传输表空间。可传输表空间允许我们在服务器之间复制和粘贴数据文件，以快速移动数据。如果我们有一组需要频繁复制的大型表，将这些表隔离到一个表空间中可能有所帮助。


    Oracle 带有默认表空间：`SYSTEM`、`SYSAUX`、`USERS`、`UNDOTBS1`和`TEMP`。`SYSTEM`和`SYSAUX`表空间用于存放系统生成的对象，我们应该避免在这些表空间中存储任何内容。当一个表空间已满时，写入该表空间的应用程序将会中断；如果`SYSTEM`或`SYSAUX`已满，整个数据库就会中断。`USERS`表空间对临时用户很有帮助，但不应与应用程序共享。我们不希望一个用户的临时表耗尽所有空间并导致我们的应用程序崩溃。`UNDOTBS1`不出意外地存储撤销数据，如本章前面所述。`TEMP`表空间将在本章后面讨论。


    ### 自动存储管理


    自动存储管理（ASM）是 Oracle 的一个工具，用于在数据库内部管理文件系统，而不是使用操作系统。SQL 和管理命令可以引用单个磁盘组名称，而不是使用操作系统目录和文件。Oracle
    可以负责条带化、镜像、文件位置等事务。ASM 有助于提高性能和可靠性，并可以实现诸如实时应用集群（RAC）之类的技术。ASM 主要影响管理员，但也可能以细微的方式影响
    SQL 开发。


    ASM 占用空间巨大——它需要另一个数据库安装和实例。如果我们正在设置个人沙箱环境，创建一个单独的 ASM 数据库是不值得的。


    尽管 ASM 是一个独立的数据库，但我们很少需要直接连接到它。我们的常规数据库会自动连接到 ASM 实例。如果我们想编写查询来查找可用空间，而不是查看数据文件和操作系统，我们需要查看数据字典视图，例如`V$ASM_DISKGROUP`。


    查询 ASM 数据字典时，我们必须小心避免重复。每个数据库会返回连接到该 ASM 实例的*所有*数据库的 ASM 信息。如果我们想查询并聚合来自所有 ASM
    实例的数据，我们需要只针对每个 ASM 实例从一个数据库进行查询。根据 ASM 的设置方式，这些查询可能很棘手。但通常每个主机有一个 ASM 数据库，或者每个集群有一个
    ASM 数据库。

    '
- fmt: '# Wasted Space


    There are many layers of storage structures, and each layer has wasted space.
    Some layers have extra space for updates or growth; other layers may maintain
    space unless they are resized. In addition, administrators have to pre-allocate
    extra space for future growth and emergencies. Most organizations try to keep
    their space usage below a certain threshold, such as 80%. And a lot of space may
    be used for supplementary data structures such as indexes and materialized views.
    And we need space for the database binaries, operating system files, trace files,
    data pump files, flat files, redo, archive logs, undo, temporary tablespaces,
    etc.


    One way to avoid wasting so much space is to change from a simple storage threshold
    rule to a storage forecast. Instead of adding space when `ASM` is 80% full, we
    should only add space when an algorithm predicts we will run out in the near future.
    As `SQL` developers, it’s tempting to ignore space problems and let the administrators
    handle them. But `SQL` developers are well suited to create programs that track
    space and predict future growth. (But this entire discussion may not apply to
    cloud environments where getting extra space is simple.)


    Before we calculate our environment’s ratio of allocated space to actual data,
    we should prepare to be disappointed. At my current job, we have a 5-to-1 ratio;
    it takes 5 terabytes of `SAN` space to store 1 terabyte of data. That high ratio
    seems ridiculous at first. But when we examine each storage layer individually,
    the extra space seems unavoidable. Wasting a huge amount of space is just something
    we have to live with.


    These eternal space problems mean we need to have an honest conversation with
    our `DBAs` about storage management. We need to talk about the overhead and make
    sure we’re not `both` multiplying the storage requirements by a fudge factor.
    We need to be prepared to be disappointed and understand that storing `X` bytes
    of data requires much more than `X` bytes of storage.


    ## Redo


    `Oracle` is designed to never lose our data, and redo is a central part of that
    design. Redo is a description of the changes being made to the database. When
    we run a `DML` statement, `Oracle` doesn’t synchronously modify the data files;
    writing directly to data files would cause contention and performance issues.
    Instead, `Oracle` uses a process that is faster but is more complex and uses more
    resources. Most modern databases do something similar, but with a different name,
    such as write-ahead logging or transaction logging.


    ### Redo in Theory


    When data is changed, `Oracle` quickly writes the redo data into a redo log buffer,
    a memory structure. Before a commit can finish, that redo log buffer must be flushed
    to disk, into the online redo logs. The online redo logs are multiplexed files
    – losing one copy will not lose our data. Once the data is safely written to multiple
    locations, `Oracle` can finish the changes asynchronously. Background processes
    will copy the temporary online redo log into a permanent archive log. Background
    processes will also read the change data and eventually update the permanent data
    files.


    The redo process feels like a lot of extra steps at first. But redo allows `Oracle`
    to batch the changes and write them together, instead of updating data files one
    tiny change at a time. And redo lets much of the work happen asynchronously while
    allowing `Oracle` to maintain durability. If we pull the plug on the database
    server, nothing will get lost. When the database restarts, `Oracle` can read from
    both the permanent data files and the redo log files to reconstruct the state
    of the database.


    ### Redo in Practice


    The redo architecture affects our `SQL` performance in several ways. `DML` is
    more expensive than we might anticipate. When we make a change to a table, that
    change must be written multiple times. Let’s recreate the `LAUNCH` table, change
    the new copy, and measure the amount of redo data generated. The following query
    uses the view `V$MYSTAT` to measure redo generation:


    ```

    --Cumulative redo generated by this session, in megabytes.

    select to_char(round(value/1024/1024, 1), ''999,990.0'') mb

    from v$mystat

    join v$statname

    on v$mystat.statistic# = v$statname.statistic#

    where v$statname.name = ''redo size'';

    ```


    To measure redo, we must re-run the preceding query after each statement. But
    to save space, the following examples do not reprint the statement each time.
    The following code shows different commands and how much redo is generated by
    each one. The redo sizes printed in the comments may not precisely match the values
    generated on your database because of version differences, configuration differences,
    and rounding:


    ```

    --Create an empty table.  +0.0 megabytes.

    create table launch_redo as

    select * from launch where 1=0;

    --Insert data.  +7.0 megabytes.

    insert into launch_redo select * from launch;

    commit;

    --Delete data.  +24.6 megabytes.

    delete from launch_redo;

    --Rollback the delete.  +21.5 megabytes.

    rollback;

    ```


    According to `DBA_SEGMENTS`, the `LAUNCH` table only uses 7 megabytes of space.
    Notice how the preceding `DELETE` statement generates almost three times as much
    redo data than the actual size of the data. Even the rollback is expensive.


    If we want to avoid generating redo, we need to use different `SQL` commands.
    The following code shows that a direct-path `INSERT` and a `TRUNCATE` statement
    both generate very little redo. Unfortunately, there is no way to stop redo from
    being generated by `DELETE` and `UPDATE` statements:


    ```

    --Direct-path insert.  +0.0 megabytes.

    alter table launch_redo nologging;

    insert /*+ append */ into launch_redo select * from launch;

    commit;

    --Truncate new table.  +0.0 megabytes.

    --truncate table launch_redo;

    ```


    Notice how we’re measuring redo in bytes, not rows. When we’re thinking about
    `SQL` logic, the number of rows is more important. When we’re thinking about the
    physical performance and impact of our `SQL`, the number of bytes and blocks is
    more important.


    Redo generation can happen in unexpected places. `DDL` commands like `TRUNCATE`
    don’t generate redo for the data, but they do generate a tiny amount of redo for
    changes to the data dictionary. There’s a small chance you will see “+0.1” instead
    of “+0.0” for some of the `DDL` examples. Also, redo is also generated by global
    temporary tables, unless the parameter `TEMP_UNDO_ENABLED` is set to `TRUE`.


    The problem with redo generation can be even worse than simply waiting for all
    those bytes to get written to disk. If our system is in `ARCHIVELOG` mode, then
    those online redo logs get saved again as archive logs. Those archive logs may
    consume a lot of space before they are backed up and deleted. Developers don’t
    usually care about backups, but if we’re changing a massive amount of data, we
    may want to check with a `DBA` first.


    Redo is useful for more than just recovery. `LogMiner` can use redo data to read
    the changes and find the source of logical corruption. `Data Guard` uses redo
    data for maintaining logical and physical standby databases. `GoldenGate` uses
    redo for replication and synchronization with other databases.


    ## Undo and Multiversion Read Consistency


    Undo data is used for rollback, flashback, and multiversion read consistency.
    Undo is similar to redo – both represent changed data, and both can cause performance
    problems. But undo causes different kinds of problems and at different times.'
  raw: '### Wasted Space


    There are many layers of storage structures, and each layer has wasted space.
    Some layers have extra space for updates or growth; other layers may maintain
    space unless they are resized. In addition, administrators have to pre-allocate
    extra space for future growth and emergencies. Most organizations try to keep
    their space usage below a certain threshold, such as 80%. And a lot of space may
    be used for supplementary data structures such as indexes and materialized views.
    And we need space for the database binaries, operating system files, trace files,
    data pump files, flat files, redo, archive logs, undo, temporary tablespaces,
    etc.


    One way to avoid wasting so much space is to change from a simple storage threshold
    rule to a storage forecast. Instead of adding space when ASM is 80% full, we should
    only add space when an algorithm predicts we will run out in the near future.
    As SQL developers, it’s tempting to ignore space problems and let the administrators
    handle them. But SQL developers are well suited to create programs that track
    space and predict future growth. (But this entire discussion may not apply to
    cloud environments where getting extra space is simple.)


    Before we calculate our environment’s ratio of allocated space to actual data,
    we should prepare to be disappointed. At my current job, we have a 5-to-1 ratio;
    it takes 5 terabytes of SAN space to store 1 terabyte of data. That high ratio
    seems ridiculous at first. But when we examine each storage layer individually,
    the extra space seems unavoidable. Wasting a huge amount of space is just something
    we have to live with.


    These eternal space problems mean we need to have an honest conversation with
    our DBAs about storage management. We need to talk about the overhead and make
    sure we’re not *both* multiplying the storage requirements by a fudge factor.
    We need to be prepared to be disappointed and understand that storing X bytes
    of data requires much more than X bytes of storage.


    ## Redo


    Oracle is designed to never lose our data, and redo is a central part of that
    design. Redo is a description of the changes being made to the database. When
    we run a DML statement, Oracle doesn’t synchronously modify the data files; writing
    directly to data files would cause contention and performance issues. Instead,
    Oracle uses a process that is faster but is more complex and uses more resources.
    Most modern databases do something similar, but with a different name, such as
    write-ahead logging or transaction logging.


    ### Redo in Theory


    When data is changed, Oracle quickly writes the redo data into a redo log buffer,
    a memory structure. Before a commit can finish, that redo log buffer must be flushed
    to disk, into the online redo logs. The online redo logs are multiplexed files
    – losing one copy will not lose our data. Once the data is safely written to multiple
    locations, Oracle can finish the changes asynchronously. Background processes
    will copy the temporary online redo log into a permanent archive log. Background
    processes will also read the change data and eventually update the permanent data
    files.


    The redo process feels like a lot of extra steps at first. But redo allows Oracle
    to batch the changes and write them together, instead of updating data files one
    tiny change at a time. And redo lets much of the work happen asynchronously while
    allowing Oracle to maintain durability. If we pull the plug on the database server,
    nothing will get lost. When the database restarts, Oracle can read from both the
    permanent data files and the redo log files to reconstruct the state of the database.


    ### Redo in Practice


    The redo architecture affects our SQL performance in several ways. DML is more
    expensive than we might anticipate. When we make a change to a table, that change
    must be written multiple times. Let’s recreate the `LAUNCH` table, change the
    new copy, and measure the amount of redo data generated. The following query uses
    the view `V$MYSTAT` to measure redo generation:


    ```

    --Cumulative redo generated by this session, in megabytes.

    select to_char(round(value/1024/1024, 1), ''999,990.0'') mb

    from v$mystat

    join v$statname

    on v$mystat.statistic# = v$statname.statistic#

    where v$statname.name = ''redo size'';

    ```


    To measure redo, we must re-run the preceding query after each statement. But
    to save space, the following examples do not reprint the statement each time.
    The following code shows different commands and how much redo is generated by
    each one. The redo sizes printed in the comments may not precisely match the values
    generated on your database because of version differences, configuration differences,
    and rounding:


    ```

    --Create an empty table.  +0.0 megabytes.

    create table launch_redo as

    select * from launch where 1=0;

    --Insert data.  +7.0 megabytes.

    insert into launch_redo select * from launch;

    commit;

    --Delete data.  +24.6 megabytes.

    delete from launch_redo;

    --Rollback the delete.  +21.5 megabytes.

    rollback;

    ```


    According to `DBA_SEGMENTS`, the `LAUNCH` table only uses 7 megabytes of space.
    Notice how the preceding `DELETE` statement generates almost three times as much
    redo data than the actual size of the data. Even the rollback is expensive.


    If we want to avoid generating redo, we need to use different SQL commands. The
    following code shows that a direct-path `INSERT` and a `TRUNCATE` statement both
    generate very little redo. Unfortunately, there is no way to stop redo from being
    generated by `DELETE` and `UPDATE` statements:


    ```

    --Direct-path insert.  +0.0 megabytes.

    alter table launch_redo nologging;

    insert /*+ append */ into launch_redo select * from launch;

    commit;

    --Truncate new table.  +0.0 megabytes.

    --truncate table launch_redo;

    ```


    Notice how we’re measuring redo in bytes, not rows. When we’re thinking about
    SQL logic, the number of rows is more important. When we’re thinking about the
    physical performance and impact of our SQL, the number of bytes and blocks is
    more important.


    Redo generation can happen in unexpected places. DDL commands like `TRUNCATE`
    don’t generate redo for the data, but they do generate a tiny amount of redo for
    changes to the data dictionary. There’s a small chance you will see “+0.1” instead
    of “+0.0” for some of the DDL examples. Also, redo is also generated by global
    temporary tables, unless the parameter `TEMP_UNDO_ENABLED` is set to TRUE.


    The problem with redo generation can be even worse than simply waiting for all
    those bytes to get written to disk. If our system is in `ARCHIVELOG` mode, then
    those online redo logs get saved again as archive logs. Those archive logs may
    consume a lot of space before they are backed up and deleted. Developers don’t
    usually care about backups, but if we’re changing a massive amount of data, we
    may want to check with a DBA first.


    Redo is useful for more than just recovery. LogMiner can use redo data to read
    the changes and find the source of logical corruption. Data Guard uses redo data
    for maintaining logical and physical standby databases. GoldenGate uses redo for
    replication and synchronization with other databases.


    ## Undo and Multiversion Read Consistency


    Undo data is used for rollback, flashback, and multiversion read consistency.
    Undo is similar to redo – both represent changed data, and both can cause performance
    problems. But undo causes different kinds of problems and at different times.'
  trans: '# 浪费的空间


    存储结构存在多个层次，每个层次都有浪费的空间。有些层次留有额外空间用于更新或增长；其他层次则可能保留空间，除非进行调整大小。此外，管理员必须为未来的增长和紧急情况预先分配额外空间。大多数组织都试图将其空间使用率保持在某个阈值以下，例如
    80%。而大量空间可能被用于补充数据结构，如索引和物化视图。我们还需要空间用于数据库二进制文件、操作系统文件、跟踪文件、数据泵文件、平面文件、重做日志、归档日志、撤销、临时表空间等。


    避免浪费如此多空间的一种方法是从简单的存储阈值规则转变为存储预测。我们不应在`ASM`达到 80%满时才添加空间，而应仅在算法预测我们将在不久的将来耗尽空间时才进行添加。作为`SQL`开发者，我们很容易忽略空间问题并让管理员处理它们。但`SQL`开发者非常适合创建跟踪空间并预测未来增长的程序。（不过，整个讨论可能不适用于云环境，在云环境中获取额外空间很简单。）


    在我们计算环境中已分配空间与实际数据的比例之前，应该做好失望的准备。在我当前的工作中，我们的比例是 5 比 1；存储 1 太字节的数据需要 5 太字节的`SAN`空间。这个高比例乍看之下似乎很荒谬。但当我们逐个检查每个存储层时，额外的空间似乎不可避免。浪费大量空间只是我们必须接受的现实。


    这些长期存在的空间问题意味着我们需要与我们的`DBA`就存储管理进行一次坦诚的对话。我们需要讨论开销，并确保我们`双方`都没有通过一个模糊系数来成倍增加存储需求。我们需要做好失望的准备，并理解存储`X`字节的数据需要远多于`X`字节的存储空间。


    ## 重做日志


    `Oracle`的设计目标是永不丢失我们的数据，而重做日志是这一设计的核心部分。重做日志是对数据库所做更改的描述。当我们运行`DML`语句时，`Oracle`不会同步修改数据文件；直接写入数据文件会导致争用和性能问题。相反，`Oracle`使用一个更快但更复杂且消耗更多资源的过程。大多数现代数据库都有类似的功能，但名称不同，例如预写式日志或事务日志。


    ### 理论上的重做日志


    当数据被更改时，`Oracle`会快速将重做数据写入重做日志缓冲区（一种内存结构）。在提交（commit）完成之前，该重做日志缓冲区必须刷新到磁盘，写入联机重做日志文件中。联机重做日志文件是多路复用的文件——丢失一个副本不会导致数据丢失。一旦数据被安全地写入多个位置，`Oracle`就可以异步完成更改。后台进程会将临时的联机重做日志复制到永久的归档日志中。后台进程还会读取更改数据并最终更新永久数据文件。


    重做过程起初看起来像是很多额外的步骤。但重做日志允许`Oracle`将更改批量写入，而不是一次更新一个微小的数据文件更改。而且重做日志让大部分工作可以异步进行，同时允许`Oracle`保持持久性。如果我们拔掉数据库服务器的电源，什么都不会丢失。当数据库重启时，`Oracle`可以从永久数据文件和重做日志文件中读取，以重建数据库的状态。


    ### 实践中的重做日志


    重做日志架构从几个方面影响我们的`SQL`性能。`DML`操作可能比我们预期的更昂贵。当我们对表进行更改时，该更改必须被写入多次。让我们重新创建`LAUNCH`表，更改新副本，并测量生成的重做数据量。以下查询使用视图`V$MYSTAT`来测量重做生成量：


    ```

    --此会话累计生成的重做日志，单位为兆字节。

    select to_char(round(value/1024/1024, 1), ''999,990.0'') mb

    from v$mystat

    join v$statname

    on v$mystat.statistic# = v$statname.statistic#

    where v$statname.name = ''redo size'';

    ```


    为了测量重做日志，我们必须在每条语句之后重新运行前面的查询。但为了节省空间，以下示例没有每次都重复打印语句。以下代码显示了不同的命令以及每个命令生成的重做量。注释中打印的重做大小可能与您的数据库上生成的值不完全匹配，这是由于版本差异、配置差异和四舍五入造成的：


    ```

    --创建一个空表。+0.0 兆字节。

    create table launch_redo as

    select * from launch where 1=0;

    --插入数据。+7.0 兆字节。

    insert into launch_redo select * from launch;

    commit;

    --删除数据。+24.6 兆字节。

    delete from launch_redo;

    --回滚删除操作。+21.5 兆字节。

    rollback;

    ```


    根据`DBA_SEGMENTS`，`LAUNCH`表仅使用了 7 兆字节的空间。请注意，前面的`DELETE`语句生成的重做数据几乎是数据实际大小的三倍。即使是回滚操作也很昂贵。


    如果我们想避免生成重做日志，需要使用不同的`SQL`命令。以下代码显示，直接路径插入（direct-path `INSERT`）和`TRUNCATE`语句生成的重做日志都非常少。不幸的是，没有办法阻止`DELETE`和`UPDATE`语句生成重做日志：


    ```

    --直接路径插入。+0.0 兆字节。

    alter table launch_redo nologging;

    insert /*+ append */ into launch_redo select * from launch;

    commit;

    --截断新表。+0.0 兆字节。

    --truncate table launch_redo;

    ```


    请注意，我们是以字节而不是行数来测量重做日志的。当我们在考虑`SQL`逻辑时，行数更重要。当我们在考虑`SQL`的物理性能和影响时，字节数和数据块数更重要。


    重做日志生成可能发生在意想不到的地方。像`TRUNCATE`这样的`DDL`命令不会为数据生成重做日志，但它们会为数据字典的更改生成少量重做日志。对于某些`DDL`示例，您可能会看到“+0.1”而不是“+0.0”，这种可能性很小。此外，全局临时表也会生成重做日志，除非参数`TEMP_UNDO_ENABLED`设置为`TRUE`。


    重做日志生成的问题可能比仅仅等待所有这些字节写入磁盘更糟糕。如果我们的系统处于`ARCHIVELOG`（归档日志）模式，那么这些联机重做日志会再次保存为归档日志。这些归档日志在备份和删除之前可能会占用大量空间。开发者通常不关心备份，但如果我们要更改大量数据，可能需要先与`DBA`确认一下。


    重做日志的用途不仅仅是恢复。`LogMiner`可以使用重做数据来读取更改并找到逻辑损坏的来源。`Data Guard`使用重做数据来维护逻辑和物理备用数据库。`GoldenGate`使用重做日志进行复制以及与其他数据库的同步。


    ## 撤销与多版本读一致性


    撤销数据用于回滚、闪回和多版本读一致性。撤销类似于重做日志——两者都代表已更改的数据，并且都可能导致性能问题。但撤销在不同时间引起不同类型的问题。'
- fmt: '### Undo for Rollback


    Redo represents the new data, and undo represents the old data. There are many
    times when our SQL statements need to reference the old data. Even when we issue
    a `DELETE` command, Oracle cannot simply remove all the data. The most obvious
    problem is – what happens if we roll back the statement or transaction? When Oracle
    is halfway through deleting a table, Oracle must be able to put everything back
    to the way it was.


    Before data is changed, an old version of the data is saved in the undo tablespace.
    While redo is stored on the file system, undo is stored inside the database. But
    to make matters worse, undo also generates redo. The undo–redo combination may
    be necessary if the database crashes during a rollback.


    All this transaction logging data sounds ridiculous at first. Aside from the change
    itself, Oracle saves multiple copies of the new data and multiple copies of the
    old data. All those extra copies are why direct-path writes can be so important.
    Our processes don’t always have enough time and resources to make so many extra
    copies.


    At least undo tends to be less expensive than redo. We can measure undo similar
    to the way we measured redo. The following query on `V$MYSTAT` is almost exactly
    the same as before – simply change “redo size” to “undo change vector size”:


    ```sql

    --Cumulative undo generated by this session, in megabytes.

    select to_char(round(value/1024/1024, 1), ''999,990.0'') mb

    from v$mystat

    join v$statname

    on v$mystat.statistic# = v$statname.statistic#

    where v$statname.name = ''undo change vector size'';

    ```


    Similar to calculating redo, we can use the output from the preceding query as
    a baseline for measuring undo generation. Then we can determine the undo generated
    by any statement by re-running the preceding query. If we re-run the previous
    test cases, but this time measure undo, we’ll find that the undo generated is
    less than the redo generated:


    ```sql

    --Create an empty table.  +0.0 megabytes.

    create table launch_undo as

    select * from launch where 1=0;

    --Insert data.  +0.3 megabytes.

    insert into launch_undo select * from launch;

    commit;

    --Delete data.  +13.9 megabytes.

    delete from launch_undo;

    --Rollback the delete.  +0.0 megabytes.

    rollback;

    --Direct-path insert.  +0.0 megabytes.

    alter table launch_undo nologging;

    insert /*+ append */ into launch_undo select * from launch;

    commit;

    --Truncate new table.  +0.1 megabytes.

    --truncate table launch_undo;

    ```


    Like with redo, creating the preceding empty table generates almost no undo data.
    Inserting data is where the undo looks better than redo; neither conventional
    nor directpath `INSERT` statements generate significant undo data. Deleting does
    create a lot of undo data, about twice as much data as the size of the table,
    but that undo is still less than the redo size. Rollback *uses* the undo data
    but doesn’t generate any undo data.


    Another good thing about undo is that it ages out. There’s no such thing as undo
    archive logs that need to be saved or backed up. The undo tablespace will eventually
    clean itself out, based on the size of the tablespace, the parameter `UNDO_RETENTION`,
    and system activity. But we may still need to allocate a lot of space for the
    undo tablespace, depending on how big and slow our transactions are. If we get
    errors about not being able to find undo segments, either from DML or flashback,
    we may need to either increase the undo tablespace size or increase `UNDO_RETENTION`.
    If our undo problem is related to LOBs, which store their undo data differently,
    we may need to change individual column retention settings.


    ### Undo for Multiversion Consistency


    Aside from the obvious use of undo for rollbacks, undo is also used to maintain
    multiversion consistency. Undo is Oracle’s mechanism to achieve the consistency
    and isolation in ACID (as opposed to databases that use the simpler mechanism
    of locking entire objects, which causes horrible concurrency problems).


    Oracle uses a System Change Number (SCN) to identify the version of each row.
    The SCN increases with every commit and can be queried through the pseudo-column
    `ORA_ROWSCN`, as shown in the following example:


    ```sql

    --System Change Number (SCN) example.

    select norad_id, ora_rowscn

    from satellite

    order by norad_id

    fetch first 3 rows only;

    NORAD_ID  ORA_ROWSCN

    --------  ----------

    000001      39300415

    000002      39300415

    000003      39300415

    ```


    If we made a change to those rows, and committed the change, the `ORA_ROWSCN`
    would increase. If we rewrote the query using flashback, for example, if we added
    the expression `AS OF TIMESTAMP SYSTIMESTAMP - INTERVAL ''1'' MINUTE` after the
    table name, we would see the old values and the old SCN. When we query a table,
    we may be reading from other data structures; some table data may be in the table,
    and some table data may be in the undo tablespace.


    We need to be careful about using the SCN for our own purposes, such as optimistic
    locking. Despite the name, `ORA_ROWSCN` does not necessarily return the SCN for
    each row. By default, Oracle records one SCN per block, and updating one row may
    change the `ORA_ROWSCN` for other rows. If we want to track an SCN for each row,
    we can create the table with `ROWDEPENDENCIES` enabled, which uses an extra 6
    bytes in each row to store the SCN.


    But even with `ROWDEPENDENCIES` enabled, the `ORA_ROWSCN` pseudo-column is not
    100% accurate and can appear to randomly change. Oracle’s internal use of the
    SCN is accurate, but the external presentation of the SCN is imprecise. Before
    we use `ORA_ROWSCN` to implement a locking mechanism, we should carefully read
    all the caveats described in the *SQL Language Reference*.


    Undo and SCN enable multiversion consistency because every row effectively has
    a timestamp. While we were running the preceding query against the `SATELLITE`
    table, imagine if another user changed the table and committed their transaction.
    Even if the table is changed in the middle of our query, the query results will
    not include those changes. Every query returns a *consistent* set of data – the
    data that existed as of the time the query began. Imagine if another user changed
    the `SATELLITE` table *before* we started our query, but the transaction is not
    committed. Our query results are *isolated* from that session, and we don’t see
    uncommitted data from other transactions.


    Every time Oracle reads from a table, it must compare each row’s SCN with the
    SCN at the beginning of the query. If the row SCN is higher than the query SCN,
    that means someone else recently changed the data, and Oracle must look in the
    undo tablespace for an old copy of the data.


    Oracle queries are always consistent and isolated. Although redo can be disabled,
    there is no way to disable undo to get a “dirty read” in Oracle. Reading undo
    data is so fast we rarely notice it happening anyway. And since the undo data
    is not stored with the table data, we don’t have to worry about our tables running
    out of space or about periodically cleaning up that undo information^([^(28)](#fn28)).
    But there is a price to pay for Oracle’s undo architecture.


    Long-running SQL statements may fail with the error “ORA-01555: snapshot too old.”
    That error means the table has changed since we started reading it and the old
    versions of the table data could not be found in the undo tablespace. We can avoid
    those errors either by making the query run faster, increasing the timeout for
    undo data with the `UNDO_RETENTION` parameter, or increasing the space available
    to the undo tablespace. The `UNDO_RETENTION` parameter is not a guarantee; Oracle
    will only keep undo data for that long *if* there is space available.


    While redo and archive logs need to be sized for to the *largest* possible DML,
    undo needs to be sized for the *longest* possible `SELECT`.'
