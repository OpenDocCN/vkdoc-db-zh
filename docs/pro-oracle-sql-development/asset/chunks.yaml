  trans: '## 使用制表符实现左对齐


    制表符与空格之争是技术领域的古老圣战，但作为高级 SQL 开发者，值得重新审视这些论点。对于构建大型 SQL 语句而言，使用左对齐的制表符而非右对齐的空格，能帮助我们更快编程并聚焦于
    SQL 语句的关键部分。


    在大多数编程语言中，制表符与空格的争论毫无意义——IDE 可以自动缩并轻松转换二者。遗憾的是，SQL 开发者并不总能享受这种自动格式化。如下一节所述，SQL
    自动格式化并非总是可行方案。而且 SQL 常被用于管理任务，此时我们往往无法使用 IDE。当使用动态 SQL（代码以字符串形式存储）时，我们只能手动调整代码格式。


    我们需要在没有`花哨 IDE`或`自动格式化工具`辅助的情况下，相对快速地编写 SQL。我们应该无需花费大量时间逐个添加空格，就能产出美观的代码。虽然某些特殊场合需要
    SQL 格外精美，值得花时间精确调整每个空格位置，但对大多数代码而言，“完美是足够好的敌人”。


    编程并非竞赛，但在创建 SQL 时使用制表符能帮助我们更快编码、更清晰地思考代码结构。通过制表符，我们可以快速让代码达到“足够好”的状态——实现缩进和左对齐，而无需尝试用右对齐空格使代码看起来完美。


    讨论空白字符与对齐时，小型示例具有误导性。对于像下面这样的简单 SQL 语句，右对齐关键字看起来与左对齐同样美观。右对齐甚至能在关键字后形成优美的空白河流：


    ```

    --左对齐

    select *

    from dual

    where 1 = 1;

    --用空格右对齐

    SELECT *

    FROM dual

    WHERE 1 = 1;

    ```


    但前述右对齐样式无法扩展。当我们对比更真实的 SQL 语句时（例如第 6 章的大型示例），传统 SQL 样式的右对齐会迅速崩溃。传统右对齐样式在查询仅有一个层级时表现良好。但一旦开始嵌套内联视图，我们就需要快速识别当前所处层级。使用左对齐制表符，我们可以更轻松地浏览内联视图。


    对于大型查询，我们不需要视觉辅助来识别`SELECT`和`FROM`等关键字。我们需要的是识别内联视图的视觉辅助。图 13-1 展示了第 6 章的示例代码，并对比了左对齐制表符与传统右对齐空格的效果。无需细读代码——只需快速扫描图像感受查询的整体形态。为强调查询结构，图
    13-1 仅显示每行的第一个单词。


    ![](img/471418_2_En_13_Fig1_HTML.png)


    图 13-1

    左对齐制表符与右对齐空格对比


    在上图中，左对齐制表符版本比右对齐空格版本的结构更简洁准确。左对齐制表符版本为每个内联视图括号独占一行，并对齐这些括号的缩进。这种样式称为“`奥尔曼风格`”，它使内联视图更易阅读、编写和调试。


    此外，若仔细观察右对齐空格样式，会发现其缩进存在错误。内联视图#1、#2 和#3 本应处于同一缩进层级，但右对齐空格版本错误地让#1 看起来像是#2 和#3
    的父级。所有流行的 SQL 代码格式化工具都犯了同样的严重错误。缩进本应用于表达代码中的父子关系，仅仅作为首行代码并不意味着它是下一行代码的父级。


    左对齐制表符样式还极大简化了内联视图的复制粘贴操作。高亮和复制内联视图变得简单，因为它们不与无关代码共享行。粘贴和格式化内联视图同样轻松——我们只需高亮后按`Tab`或`Shift+Tab`进行缩进/反缩进。相比之下，使用传统右对齐空格添加内联视图时，我们要么修改多个独立空格，要么需要重新格式化整个语句。我们的编码风格应当支持在几秒内复制代码片段。


    制表符的主要缺点是尺寸未定义。当编写电子邮件、帖子或书籍时，为保险起见，可能需要在完成时将制表符转换为空格。


    我们追求的是能帮助聚焦现实 SQL 语句重点的样式，而非固守传统习惯。左对齐制表符让我们更轻松地阅读和编写内联视图。'
- fmt: '## Avoid Code Formatters


    We should not become dependent on automatic code formatters, beautifiers, or pretty
    printers. While I appreciate the soulless efficiency of automation, we still need
    to maintain the ability to artisanally craft code. Automatic code formatters work
    well for most programming languages, but none of them consistently work well for
    Oracle SQL.


    Code formatters have a hard time with Oracle SQL because the language is so complicated.
    Whereas most programming languages add features in libraries, SQL tends to add
    features as new syntax. That huge syntax makes automatically formatting code difficult.


    A code formatter that works 99% of the time is not good enough. SQL code formatters
    are most likely to fail when our SQL statements become large and use advanced
    features – which is exactly when the code formatting is most important.


    We don’t always have an IDE available. If we’re doing administration work on a
    server or helping a coworker, we may not have our favorite IDE. And when we’re
    creating SQL in a string, for dynamic SQL, no code formatter will help us. Code
    formatters either won’t recognize the string as SQL, or the string will be invalid
    SQL until run time, when we have all the variables. Even our generated dynamic
    SQL should look good, as discussed in Chapter 14.


    SQL code formatters also focus on small, simple code. As demonstrated in the previous
    section, SQL code formatters focus on the obvious keywords, instead of properly
    spacing and aligning the important inline views.


    There are times when we care about precise spacing, but only *we* can decide on
    how to set that spacing. Large SQL statements frequently have to repeat long lists
    of columns. We may have many columns we don’t care about, along with one important
    column we want to highlight. Putting that important column or expression on a
    line by itself can help emphasize what’s important to the reader.


    For example, we may have to project 26 columns, but only one column is modified
    in an expression. We don’t want to waste 26 blank lines for each column. But we
    also don’t want to squish all the columns on one line and miss the important part.
    The following code uses a separate line for the important expression but crams
    everything else together in a simple list. If we want to use space to emphasize
    important things, we have to set the space manually:


    ```

    --Use space to highlight what''s important.

    select

    a,b,c,d,e,f,g,h,i,j,k,l,m,

    n+1 n,

    o,p,q,r,s,t,u,v,w,x,y,z

    from some_table;

    ```


    We should disable IDE options that automatically format code on compilation. Even
    if we have coding standards, someone may have a good reason for breaking the standard.
    Luckily, some IDEs let us disable automatic code formatting for specific code
    blocks.


    SQL developers are going to be stuck in many situations where we need to hand-build
    our code. We must be able to write code quickly, without relying on a specific
    code formatter.


    ## Lowercase


    SQL should be written mostly in lowercase, like all modern programming languages.
    Lowercase code looks better and is easier to read.


    Uppercase keywords are associated with older programming languages, such as assembly,
    Fortran, and COBOL. SQL is an old language, which has some advantages, but there
    are negative connotations with our code looking ancient. Decades ago, there were
    good technical reasons to use uppercase, but those reasons no longer apply.


    The cultural convention today is to use lowercase for programming. And lowercase,
    or mixed case, is obviously the typical choice for normal writing. (There is a
    consensus that it is easier to read lowercase writing than uppercase writing.
    But it’s debatable why lowercase is easier to read, and I’m not sure if the research
    applies to monospaced fonts used in programming languages.)


    But there are certainly still times when uppercase is helpful. When embedding
    small SQL statements inside other languages, it helps to use uppercase to contrast
    the SQL with the other language. Uppercase is also useful when writing emails
    or posts. And uppercase can be useful for helping parts of our PL/SQL programs
    stick out, like for global constants.


    Most of our time looking at code is in an IDE, where the syntax highlighting is
    more important than using case for identifying keywords. There aren’t huge advantages
    to using lowercase, but if it looks better, is more readable, and is easier to
    type, we might as well abandon uppercase.


    ## Summary


    This concludes the most controversial opinions in this book, and I will now get
    off my soapbox. Style tips and tricks have been included in many different parts
    of this book and are quickly summarized in “Appendix A: SQL Style Guide Cheat
    Sheet.”


    Writing SQL, and especially writing large SQL, can benefit from nontraditional
    programming styles. We can reduce the complexity of our code by avoiding unnecessary
    aliases and uncommon abbreviations. Our programming style should help our code
    emphasize what’s important, which is usually the relationship between inline views.
    Using left-aligned tabs can help us read and write nested inline views. Automatic
    code formatters will eventually let us down, so we might as well get used to manually
    styling our code. Using lowercase can help our code look modern and be more readable.


    I hope you are willing to reconsider at least some of the traditional “best practices”
    used for writing SQL. No matter which style we prefer, it’s helpful to understand
    the reasons we prefer that style. In practice, we can’t always write code the
    way we want, and we have to be willing to compromise. But it’s helpful to have
    an idealistic style and to strive to write beautiful SQL statements.


    Footnotes [1](#471418_2_En_13_Chapter.xhtml#Fn1_source)


    # 14. Use SQL More Often with Basic Dynamic SQL


    Dynamic SQL is a powerful tool that helps us get the most out of Oracle SQL. With
    dynamic SQL we can build our code at run time. Writing code in code is challenging
    but offers many opportunities.


    First, we need to understand when we must use dynamic SQL, when we want to use
    dynamic SQL, and when we do not want to use dynamic SQL. The basic features of
    dynamic SQL are simple, but we have to be careful to preserve performance and
    security. Generating source code is tricky, and we need to use specific programming
    styles to make dynamic code manageable. When we’re comfortable with dynamic SQL,
    we can apply it to several complex scenarios and significantly improve the clarity
    and performance of our programs.


    This chapter only briefly introduces dynamic SQL. More advanced and more powerful
    dynamic SQL solutions are described in Chapters 20 and 21.


    ## When to Use Dynamic SQL


    Dynamic SQL is commonly used in four different contexts: to run DDL commands,
    when the objects or properties or structure is not known until run time, to simplify
    privileges, and to build rule engines. It’s also important to not use dynamic
    SQL when there are better alternatives.'
  raw: '## Avoid Code Formatters


    We should not become dependent on automatic code formatters, beautifiers, or pretty
    printers. While I appreciate the soulless efficiency of automation, we still need
    to maintain the ability to artisanally craft code. Automatic code formatters work
    well for most programming languages, but none of them consistently work well for
    Oracle SQL.


    Code formatters have a hard time with Oracle SQL because the language is so complicated.
    Whereas most programming languages add features in libraries, SQL tends to add
    features as new syntax. That huge syntax makes automatically formatting code difficult.


    A code formatter that works 99% of the time is not good enough. SQL code formatters
    are most likely to fail when our SQL statements become large and use advanced
    features – which is exactly when the code formatting is most important.


    We don’t always have an IDE available. If we’re doing administration work on a
    server or helping a coworker, we may not have our favorite IDE. And when we’re
    creating SQL in a string, for dynamic SQL, no code formatter will help us. Code
    formatters either won’t recognize the string as SQL, or the string will be invalid
    SQL until run time, when we have all the variables. Even our generated dynamic
    SQL should look good, as discussed in Chapter [14](#471418_2_En_14_Chapter.xhtml).


    SQL code formatters also focus on small, simple code. As demonstrated in the previous
    section, SQL code formatters focus on the obvious keywords, instead of properly
    spacing and aligning the important inline views.


    There are times when we care about precise spacing, but only *we* can decide on
    how to set that spacing. Large SQL statements frequently have to repeat long lists
    of columns. We may have many columns we don’t care about, along with one important
    column we want to highlight. Putting that important column or expression on a
    line by itself can help emphasize what’s important to the reader.


    For example, we may have to project 26 columns, but only one column is modified
    in an expression. We don’t want to waste 26 blank lines for each column. But we
    also don’t want to squish all the columns on one line and miss the important part.
    The following code uses a separate line for the important expression but crams
    everything else together in a simple list. If we want to use space to emphasize
    important things, we have to set the space manually:


    ```

    --Use space to highlight what''s important.

    select

    a,b,c,d,e,f,g,h,i,j,k,l,m,

    n+1 n,

    o,p,q,r,s,t,u,v,w,x,y,z

    from some_table;

    ```


    We should disable IDE options that automatically format code on compilation. Even
    if we have coding standards, someone may have a good reason for breaking the standard.
    Luckily, some IDEs let us disable automatic code formatting for specific code
    blocks.


    SQL developers are going to be stuck in many situations where we need to hand-build
    our code. We must be able to write code quickly, without relying on a specific
    code formatter.


    ## Lowercase


    SQL should be written mostly in lowercase, like all modern programming languages.
    Lowercase code looks better and is easier to read.


    Uppercase keywords are associated with older programming languages, such as assembly,
    Fortran, and COBOL. SQL is an old language, which has some advantages, but there
    are negative connotations with our code looking ancient. Decades ago, there were
    good technical reasons to use uppercase, but those reasons no longer apply.


    The cultural convention today is to use lowercase for programming. And lowercase,
    or mixed case, is obviously the typical choice for normal writing. (There is a
    consensus that it is easier to read lowercase writing than uppercase writing.
    But it’s debatable why lowercase is easier to read, and I’m not sure if the research
    applies to monospaced fonts used in programming languages.)


    But there are certainly still times when uppercase is helpful. When embedding
    small SQL statements inside other languages, it helps to use uppercase to contrast
    the SQL with the other language. Uppercase is also useful when writing emails
    or posts. And uppercase can be useful for helping parts of our PL/SQL programs
    stick out, like for global constants.


    Most of our time looking at code is in an IDE, where the syntax highlighting is
    more important than using case for identifying keywords. There aren’t huge advantages
    to using lowercase, but if it looks better, is more readable, and is easier to
    type, we might as well abandon uppercase.


    ## Summary


    This concludes the most controversial opinions in this book, and I will now get
    off my soapbox. Style tips and tricks have been included in many different parts
    of this book and are quickly summarized in “Appendix A: SQL Style Guide Cheat
    Sheet.”


    Writing SQL, and especially writing large SQL, can benefit from nontraditional
    programming styles. We can reduce the complexity of our code by avoiding unnecessary
    aliases and uncommon abbreviations. Our programming style should help our code
    emphasize what’s important, which is usually the relationship between inline views.
    Using left-aligned tabs can help us read and write nested inline views. Automatic
    code formatters will eventually let us down, so we might as well get used to manually
    styling our code. Using lowercase can help our code look modern and be more readable.


    I hope you are willing to reconsider at least some of the traditional “best practices”
    used for writing SQL. No matter which style we prefer, it’s helpful to understand
    the reasons we prefer that style. In practice, we can’t always write code the
    way we want, and we have to be willing to compromise. But it’s helpful to have
    an idealistic style and to strive to write beautiful SQL statements.


