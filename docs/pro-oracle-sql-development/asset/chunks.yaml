  trans: '

    ## 集成开发环境


    ### 何时不应使用 SQL*Plus


    SQL*Plus 已不再足以应付我们日常的开发工作。市面上有许多成熟的集成开发环境（IDE）可以显著提升我们的生产力。对于编程语言而言，文本通常比图片更合适，但借助图形化
    IDE，我们可以同时打开多个代码和元数据窗口，获得更好的代码可视化效果，并快速访问数百个强大的选项。


    对于编写查询，我们需要能够快速执行并查看查询不同部分的结果。SQL*Plus 使得运行内联视图或子查询变得困难——我们无法简单地高亮代码并按下运行快捷键。而且
    SQL*Plus 的命令行格式化功能使得几乎不可能有意义地查看复杂或即席查询的结果。如果我们事先知道列名，只选择所需的列并设置好格式选项，在 SQL*Plus
    中查看少量列是可以的。但这是一种极其有限的数据库使用方式。我们应该能够毫不费力地查看表中`所有`的数据。


    认为我们能记住数据库中所有值的样子，并且每次查询表时都能选择相关列，这种想法是荒谬的。当我们使用 SQL*Plus 进行即席查询时，我们把自己限制在了少数几件记得很清楚的事情上。如果把自己局限在已知的事物中，我们将永远无法进步。


    例如，在进行性能故障排查时，通常需要查看视图 `V$SQL`。我们很少能提前知道问题所在；我们只是在寻找异常之处，因此需要查看所有内容。当我们在 SQL*Plus
    中运行以下查询时，输出结果是一团毫无价值的混乱。我甚至不打算展示输出结果——我的良心不允许我为了打印一堆乱码而浪费纸张：


    ```

    SQL> select * from v$sql;

    ```


    当我们在图形用户界面（如 Oracle SQL Developer）中运行上述查询时，结果则有用得多。图 5-2 中的结果虽然算不上漂亮，但我们可以前后滚动，更容易地探索和理解数据。


    ![](img/471418_2_En_5_Fig2_HTML.png)


    该片段表示查询结果的表格，在 0.081 秒内获取 50 行后，该表有五列和四行数据。


    图 5-2：在 Oracle SQL Developer 中进行的一个简单数据字典查询


    我们生活在信息时代，需要能够显示大量信息的工具。许多数据库专业人士之所以未能发挥其全部潜力，是因为他们拒绝使用现代工具。那些守旧的开发人员还会拖慢我们其他人的速度，因为我们不得不为了支持每行
    72 个字符而弱化我们的程序。


    使用 IDE 是我们需要说服同事改变习惯的少数几个领域之一。我们不想引发关于 Oracle SQL Developer 与 Toad 的无谓口水战。但当我们看到有人困在二十世纪，只在命令行上完成所有操作时，值得尝试温和地说服他们升级工具。


    命令行程序 SQLcl 旨在取代 SQL*Plus，但那一天可能还需要数年时间。该程序有一些有趣的新功能，但也存在错误和 Java 安装问题，并且不像 SQL*Plus
    那样普遍可用。我们应该坚持使用 SQL*Plus，以使我们的代码更易于访问。


    ### 学习一个 IDE


    学习 IDE 的最佳方法是观看专家使用它。当我们观看别人使用他们的 IDE 时，会有一些我们能跟上的时刻，然后他们会突然跳跃到我们前面。当我们跟不上时，请让那位开发人员解释他们的“魔法”。大多数开发者都乐于与他人分享他们的
    IDE 秘诀，但前提是我们得问。IDE 中有很多个人偏好，开发者在向别人解释他们最喜欢的程序时会感到紧张，因为他们想避免分歧。我们应该向那些专家表明，我们愿意学习所有能学到的技巧和诀窍，即使这偶尔会让我们陷入关于制表符（tab）与空格（space）的争论。


    关于我们的 IDE，最重要的一点是：总有办法更改任何我们想要更改的地方。不喜欢默认的字体和颜色？改掉它。觉得完成重复性任务很繁琐？创建一个键盘快捷键或宏来自动化它。希望标签页以不同顺序排列？重新排序。不喜欢它的风格？上网找个插件来改变它。我们永远不应该对
    IDE 中的任何功能将就。


    本书与 IDE 无关，不会深入探讨如何学习每个 IDE。但我们应该学会在我们的 IDE 中至少完成以下事情：运行光标处的 SQL（学会无需高亮任何内容即可运行命令的快捷键）、在不同的模式（Schema）中查看数据库对象、打开和更改文件系统对象、创建新的数据库对象、在编辑器中查看对象背后的
    DDL（通常通过点击文本）、更改语法和格式规则（例如将制表符改为空格）、更改 NLS 属性（例如日期格式）、调试（如何快速设置断点、单步进入、单步跳出等）、运行已保存的脚本或代码片段、代码导航（例如右键点击包内的对象以跳转到不同部分）、重构变量名等等。如果其中任何功能对你来说是新的，请花些时间在你的
    IDE 中学习它们。通过学习如何快速执行这些任务，我们可以运行更多的 SQL 语句，缩短反馈循环，并更快地改进我们的代码。


    如果你从未浏览过你 IDE 的选项，请立即停下，花上 10 分钟。打开属性或设置菜单，在不同的窗口中右键单击，浏览弹出的菜单。浏览菜单比阅读手册更快，我保证你至少会发现一个你想更改的有用设置。


    ### 何时不使用 IDE 功能


    我们不想使用 IDE 的所有功能。有些开发者将 IDE 当作拐杖来生成代码，只能通过点击向导来编程。仅仅因为这些向导存在，并不意味着我们必须使用它们。对于高级开发者而言，IDE
    就像是打了激素的文本编辑器。例如，我们不想使用 IDE 中的“新建表”向导来创建表。我们仍然可以用文本来创建表，而我们的 IDE 会通过语法高亮、自动补全等功能来帮助我们。


    IDE 通常包含一些看起来有用或漂亮但可能危险的功能。如前所述，我们应该避免使用 IDE 中模仿 SQL*Plus 的部分。我们也应该避免使用那些允许单个程序实例同时连接到多个数据库的功能。一个窗口应该只用于一个连接，并且连接别名应显著显示在窗口顶部。使用多个标签页、每个标签页连接到不同数据库的开发者，不可避免地会在错误的数据库上执行命令。我们必须配置我们的
    IDE，使其总是能一目了然地显示我们连接的是哪个数据库。

