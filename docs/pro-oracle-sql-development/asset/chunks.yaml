    the table data twice to gather statistics: one pass for each partition and another
    pass for the entire table. The double read may seem excessive at first, but consider
    that we cannot simply add distinct counts together.


    But incremental statistics uses an approximation algorithm that does enable adding
    distinct counts. Incremental statistics creates small data structures called synopses,
    which contain information about the distinctness within a partition. After gathering
    statistics for each partition, the global statistics can be inferred by merging
    those small synopses. This algorithm improves statistics gathering from `O(2*N)`
    to `O(N)`. That decrease may not sound impressive, but remember that partitioned
    tables are often huge. Saving an extra full table scan on our largest tables can
    be a big deal.


    This algorithm analysis is starting to get recursively ridiculous. We’re discussing
    algorithms that help Oracle determine which algorithms to use. And the problem
    goes deeper – in rare cases, statistics gathering is slow because the optimizer
    chooses a bad plan for the statistics gathering query. For those rare cases, we
    may need to prime the pump; we can use `DBMS_STATS.SET_TABLE_STATS` to create
    initial, fake statistics, to help us gather the real statistics.


    Many organizations consider statistics gathering a boring maintenance task that
    is best handled by the DBAs. But that metadata is at the heart of Oracle performance,
    and it should be understood by anyone who is responsible for our database program’s
    performance.'
  trans: '

    ### 收集优化器统计信息


    收集优化器统计信息是实现良好 SQL 性能的**至关重要**的任务。统计信息用于估算**基数**，即一个操作返回的行数。基数与大多数章节图表中 X 轴所表示的“输入大小”是同义词。基数是做出执行计划决策的关键信息，例如判断何时使用嵌套循环或哈希连接。


    ### 基数估算的挑战


    为了获得良好的执行计划，我们需要定期并在任何重大数据变更后收集统计信息。但收集统计信息本身可能很慢。了解收集统计信息的不同算法和数据结构可以帮助我们避免性能问题。


    寻找基数并不仅仅是计算每个表中的行数。Oracle 还需要衡量列和特定列值的唯一性。例如，对主键列的相等条件永远不会返回多行，因此它是索引访问的良好候选。但对一个重复的状态列施加相等条件则更为复杂；某些状态可能很罕见，适合索引访问；而其他状态可能很常见，全表扫描效果最佳。优化器统计信息收集需要生成可用于估算多种复杂场景基数的信息。


    ### 使用哈希进行近似计数


    计算不同项类似于排序，这是一项缓慢的操作。更糟糕的是，Oracle 需要表中所有列的统计信息，这可能需要多次遍历。计算不同值的朴素算法会首先对这些值进行排序；如果值是有序的，衡量唯一性很容易。但这种朴素方法将花费
    `O(N*LOG(N))` 的时间。更好的算法会使用哈希，这正是较新版本的 Oracle 可以通过 `HASH GROUP BY` 和 `HASH UNIQUE`
    操作实现的。与连接类似，哈希操作的时间介于 `O(N)` 和 `O(N*LOG(N))` 之间。


    幸运的是，在收集优化器统计信息时，我们可以用准确性换取时间。默认的 Oracle 统计信息收集算法通过单次遍历表来执行*近似*计数。单遍算法在 `O(N)`
    时间内运行，生成的数字是准确但不完美的。


    开发者理所当然地担心不完美的值。一个错误的位就可能破坏一切。但在这种情况下，近似值已经足够好。优化器不需要知道*精确*值。Oracle 只需要知道算法是否需要针对“大”或“小”的查询进行优化。


    以下示例展示了近似的接近程度，使用了函数 `APPROX_COUNT_DISTINCT`，该函数采用了与统计信息收集相同的算法：


    ```sql

    -- 将 APPROX_COUNT_DISTINCT 与常规 COUNT 进行比较。

    select

    approx_count_distinct(launch_date) approx_distinct,

    count(distinct launch_date)        exact_distinct

    from launch;

    APPROX_DISTINCT  EXACT_DISTINCT

    ---------------  --------------

    61745           60401

    ```


    ### 采样的陷阱


    快速近似算法^(³⁷) 仅在我们读取整个表时才有效。如果我们尝试对表的一小部分进行采样，近似算法就不再适用，Oracle 必须使用不同的方法。我们可能认为设置一个较小的估计百分比（例如
    `DBMS_STATS.GATHER_TABLE_STATS(..., ESTIMATE_PERCENT => 50)`）是聪明的做法。但在这种情况下，读取
    50% 表的慢算法比读取 100% 表的快速算法更慢且更不准确。我们应该**很少，甚至从不**更改 `ESTIMATE_PERCENT` 参数。


    ### 分区的增量统计信息


    这些唯一计数技巧也可以应用于分区统计信息，这使用了一项称为**增量统计信息**的功能。通常，分区表需要读取表数据两次才能收集统计信息：每个分区一次，整个表又一次。这种双重读取乍看之下可能显得过度，但请考虑我们不能简单地将不同计数相加。


    但增量统计信息使用了一种近似算法，使得不同计数的相加成为可能。增量统计信息创建称为**概要**的小型数据结构，其中包含分区内的唯一性信息。在为每个分区收集统计信息后，可以通过合并这些小型概要来推断全局统计信息。该算法将统计信息收集的复杂度从
    `O(2*N)` 改进为 `O(N)`。这种减少听起来可能并不令人印象深刻，但请记住，分区表通常非常庞大。为我们最大的表节省一次额外的全表扫描可能是一件大事。


    ### 结论：统计信息是基础


    这种算法分析开始变得递归性地荒谬。我们正在讨论帮助 Oracle 决定使用哪些算法的算法。而且问题更深入——在极少数情况下，统计信息收集之所以慢，是因为优化器为统计信息收集查询选择了一个糟糕的计划。对于这些罕见情况，我们可能需要“引导启动”；我们可以使用
    `DBMS_STATS.SET_TABLE_STATS` 来创建初始的、虚假的统计信息，以帮助我们收集真实的统计信息。


    许多组织认为收集统计信息是一项无聊的维护任务，最好由 DBA 处理。但这些元数据是 Oracle 性能的核心，任何对我们数据库程序性能负责的人都应该理解它。

    '
- fmt: '## O(N^2): Cross Joins, Nested Loops, Other Operations


    `O(N^2)` algorithms are getting into the ridiculously slow territory. Unless we
    have special conditions, such as an input size close to 0, we should avoid these
    run times at all costs. This run-time complexity happens from cross joins, nested
    `FOR` loops, nested loop joins with full table scans, and some other operations.
    As a quick reminder of their poor performance, Figure [16-11](#471418_2_En_16_Chapter.xhtml#Fig11)
    shows `N!` and `N^2`.


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig11_HTML.png)


    The graph of number of steps versus input size represents increasing lines of
    N factorial and N to the power of 2. Figure 16-11 Compare N! with N^2


    Cross joins are not always bad. Sometimes it is necessary to mindlessly combine
    every row in one table with every row in another table. And cross joins can be
    fast if the number of rows is close to zero. But cross joins that happen because
    of incorrectly joined tables, or because of poor cardinality estimates, are horrible
    for performance. Accidental cross joins are so bad that they can effectively bring
    down an entire database; Oracle may need an unlimited amount of temporary tablespace
    to build the result set, depriving other processes of space for sorting or hashing.


    `FOR` loops inside `FOR` loops are the most common way to generate `O(N^2)` run
    times in procedural code. If we add *another* `FOR` loop, the run-time complexity
    becomes `O(N^3)`, then `O(N^4)`, etc. Nested `FOR` loops can easily happen in
    PL/SQL, and they are all too common when using explicit cursors. Avoiding that
    horrible performance is an important reason we should always try to replace nested
    cursors with a single SQL statement.


    Most developers write procedural code as nested `FOR` loops because loops are
    the easiest way to think about joins. But Oracle cannot change the algorithms
    used by imperative programs – Oracle is stuck doing exactly what we ask for. The
    advantage of switching to declarative code is that we don’t have to worry about
    these algorithms as much. When we use SQL, we let Oracle decide which join algorithms
    to use.


    It is possible that after switching to declarative SQL the optimizer will still
    choose an `O(N^2)` algorithm. As we saw in Figure [16-10](#471418_2_En_16_Chapter.xhtml#Fig10)
    earlier in the chapter, a nested loop join with two full table scans is a terrible
    way to join tables. But that worst case should only happen if we have missing
    statistics, missing indexes, or weird join conditions.


    `O(N^2)` shows up in other unexpected places. In extreme cases, SQL parse time
    grows exponentially. For example, the parse time becomes ridiculously bad if we
    combine thousands of subqueries with `UNION ALL`. (The code measuring parse time
    is too large to include here, but it can be found in the repository.) Writing
    large SQL statements is a good thing, but writing Brobdingnagian SQL statements
    is not.


    The `MODEL` clause brings procedural logic to SQL statements. `MODEL` is a neat
    trick and is explained briefly in Chapter [19](#471418_2_En_19_Chapter.xhtml).
    That clause gives us the ability to turn our data into a spreadsheet and apply
    `FOR` loops to our rows and columns. But just like with PL/SQL, we can easily
    find ourselves in `O(N^2)` performance territory.


    A high run-time complexity isn’t always avoidable or necessarily bad. But we should
    think carefully when we see cross joins or nested operations.


    ## O(N!): Join Order


    `O(N!)` is as bad as Oracle’s algorithms get, but luckily, it’s also rare. As
    discussed in Chapter [6](#471418_2_En_6_Chapter.xhtml), tables have to be joined
    in a specific order, and there are many ways to order a set of tables. The problem
    of ordering tables must be solved by the optimizer when building execution plans
    and in our minds when trying to understand queries.


    The optimizer is capable of handling a huge number of tables without serious problems.
    But there are always unexpected problems when we push the system to the limits.
    For example, if we nest over a dozen common table expressions, the parse time
    appears to grow like `O(N!)`. (See the GitHub repository for a code demonstration.)
    In practice, this problem will only happen because of a rare bug or because we’re
    doing something we shouldn’t.


    Our minds can only hold a small, ordered list in short-term memory. If we build
    our SQL statements with giant comma-separated lists, we’ll never be able to understand
    them. Building small inline views and combining them with the ANSI join syntax
    will vastly simplify our SQL. There’s no precise equation for SQL complexity,
    but we can think of the complexity comparison like this: `(1/2N)! + (1/2N)!` ≪
    `N!`


    For performance we want to batch things together, to reduce overhead. But to make
    our code readable, we want to split everything up into manageable pieces. That
    is precisely what SQL excels at; we can logically divide our queries into inline
    views to make them understandable, and then the optimizer can efficiently put
    the code back together.


    ## O(∞): The Optimizer


    The Oracle optimizer builds SQL execution plans. Building optimal execution plans
    is impossible, so we could say this task is `O(∞)`. That run-time complexity sounds
    wrong at first; Oracle obviously builds at least *some* optimal execution plans.
    But it’s helpful to think of the optimizer as doing an impossible task.


    Building the best execution plan means the optimizer must compare algorithms and
    data structures and determine which one runs fastest. But it is literally impossible
    to determine if a generic program will even *finish*, much less how long it will
    run. Determining if a program will finish is called the halting problem. Before
    computers were even invented, Alan Turing proved that it is impossible for computers
    to solve the halting problem. Luckily, this is a problem that’s theoretically
    impossible to solve in all cases, but it is practically feasible to solve in almost
    all cases.


    To add another wrinkle to the problem, Oracle has to generate the execution plan
    incredibly fast. A better name for the optimizer would be the satisficer. Satisficing
    is solving an optimization problem while also taking into account the time necessary
    to solve the problem.


    It’s important we understand how difficult the optimizer’s job is. We shouldn’t
    be surprised when Oracle occasionally generates a bad execution plan. The optimizer
    isn’t as bad as we think – it’s merely trying to solve an unsolvable problem.
    When the optimizer is having trouble, we shouldn’t abandon it; we should try to
    work with it.


    When a bad execution plan is generated, our first instinct shouldn’t be, “How
    can I work around this bad plan?” Our first instinct should be, “How can I provide
    better information so Oracle can make better decisions?” That information is almost
    always in the form of optimizer statistics, which are described in Chapters [17](#471418_2_En_17_Chapter.xhtml)
    and [18](#471418_2_En_18_Chapter.xhtml).


    We need to resist the urge to quickly use hints and change system parameters.
    Think of the optimizer as a complex forecasting system. We should never change
    a system parameter such as `OPTIMIZER_INDEX_COST_ADJ` just because it helps with
    one query. That would be like adding 10 degrees to every weather forecast because
    the meteorologist was once wrong by 10 degrees.'
