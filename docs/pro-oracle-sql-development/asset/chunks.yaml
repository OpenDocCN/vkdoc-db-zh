- fmt: "## Changing Execution Plans\n\nThere are many ways to change the execution\
    \ plans of SQL statements. The following list is ordered by which solutions are\
    \ the cleanest. This subjective ranking is based on a combination of proportionality,\
    \ obviousness, and simplicity.\n\nFixes should be proportional to the problem;\
    \ rewriting a query only affects one query, whereas changing a system parameter\
    \ affects many queries. Fixes should be obvious; rewriting a query makes the changes\
    \ obvious, whereas using `DBMS_ADVANCED_REWRITE` will fool most developers. Fixes\
    \ should be easy; adding a hint directly to the query is easier than adding a\
    \ hint through a SQL profile.\n\nIn the real world, we have many constraints placed\
    \ on our tuning. Frequently we have to fix the execution plan without directly\
    \ changing the query. Sometimes we have to skip the easy steps and go to advanced\
    \ steps that secretly swap out a bad execution plan for a good one.\n\n1.  *Change\
    \ how the query is called*: Ensure the application is not creating a new connection\
    \ for each query. Use bind variables instead of creating a large number of hard-coded\
    \ queries. Use batching instead of reading and writing one row at a time.\n2.\
    \  *Rewrite the query*: Apply advanced features and programming styles. If our\
    \ query is too large to tune in one piece, we can split it into non-transformable\
    \ pieces with the `ROWNUM` trick.\n3.  *Gather statistics*: Described in more\
    \ detail at the end of the chapter.\n4.  *Create or alter objects*: Consider adding\
    \ indexes, constraints, materialized views, compression, partitions, parallelism,\
    \ etc.\n5.  *Add hints to the query*: See the next section for details about hints.\n\
    6.  *SQL profiles*: Add hints to a query without directly changing the SQL text.\
    \ This feature is also described later in the chapter.\n7.  *SQL plan baselines*:\
    \ Replace one plan with another plan. This feature is a large, complex system\
    \ that can be used to control and evolve execution plan acceptance. This feature\
    \ is useful for preserving performance during large system changes but is too\
    \ cumbersome for most SQL tuning.\n8.  *Stored outlines*: An earlier, simpler,\
    \ and deprecated version of SQL plan baselines.\n9.  `DBMS_STATS.SET_X_STATS`:\
    \ Manually modifying table, column, and index stats can significantly change plans\
    \ by making objects artificially look more or less expensive.\n10. *Session control*:\
    \ Change parameters at the session level. For example, if an upgrade from 12c\
    \ to 19c causes problems for one process, and we don’t have time to fix each query\
    \ individually, we can run this command at the beginning of the session:\n   \
    \ ```\n    ALTER SESSION SET OPTIMIZER_FEATURES_ENABLE='12.2.0.1'\n    ```\n11.\
    \ *System control*: Change parameters for the entire system. For example, on a\
    \ data warehouse, we may want to spend more parsing time to generate good execution\
    \ plans; we can enable SQL plan directives by running\n    ```\n    ALTER SYSTEM\
    \ SET OPTIMIZER_ADAPTIVE_STATISTICS=TRUE\n    ```\n    Or if we see lots of odd\
    \ wait events, we may need to reconfigure the system. Try not to lie to Oracle,\
    \ and do not change a system parameter to only fix a single instance of a problem.\n\
    12. `DBMS_ADVANCED_REWRITE`: Change a query into another query. This package is\
    \ a neat trick but is kind of evil because we can secretly change the meaning\
    \ of a query.\n13. *Virtual private database*: Change a query into another query\
    \ by adding predicates. This feature is not intended for performance, but we can\
    \ abuse it to change execution plans.\n14. *SQL translation framework*: Change\
    \ a query into another query before it even gets parsed.\n15. *SQL Patch* (`DBMS_SQLDIAG.CREATE_SQL_PATCH`):\
    \ A semi-documented way to add hints to queries.\n\n## Hints\n\nHints are directives\
    \ the optimizer must follow if possible. The name “hint” is misleading. Despite\
    \ what many people believe, the optimizer does not randomly ignore hints. It only\
    \ seems that way because the hint syntax is complicated. There are many reasons\
    \ a hint can be invalid and cannot be followed.\n\nThere are hundreds of hints,\
    \ and many of them are documented in the “Comments” chapter of the *SQL Language\
    \ Reference*. There’s a hint for every execution plan feature. We can generate\
    \ a full list of hints for an execution plan by passing the parameter `FORMAT=>'+OUTLINE'`\
    \ to `DBMS_XPLAN`. Most hints are cryptic and difficult to use. Luckily, we normally\
    \ only need to add a small number of hints.\n\nIt's useful to think of there being\
    \ two different categories of hints: good hints that provide useful information\
    \ to the optimizer and bad hints that tell the optimizer how to do its job.\n\n\
    Good hints tell the optimizer something it couldn’t know, like a trade-off that\
    \ we’re willing to accept. For example, only a developer could choose the `APPEND`\
    \ hint, because only a developer knows if we’re willing to gain performance at\
    \ the risk of unrecoverable data.\n\nBad hints circumvent the normal optimizer\
    \ logic and require developers to play the role of the optimizer. We don’t always\
    \ have time to fix the root cause, and sometimes we need to quickly tell the optimizer\
    \ how to do its job. Overusing bad hints can make our SQL difficult to understand\
    \ and may cause us to miss useful features in future versions. But sometimes a\
    \ small number of bad hints is necessary for quickly solving a critical problem.\n\
    \nThe following is a list of popular, good hints:\n\n1.  `APPEND`/`APPEND_VALUES`:\
    \ Use direct-path writes; improves speed but data is initially unrecoverable.\n\
    2.  `DRIVING_SITE`: Execute a query on a remote site; when using tables over database\
    \ links, we may want to execute the join on a remote database instead of passing\
    \ the rows and then joining them.\n3.  `DYNAMIC_SAMPLING`: Read blocks from the\
    \ row sources to provide additional optimizer information.\n4.  `ENABLE_PARALLEL_DML`:\
    \ Enable parallel DML for just one query, instead of running `ALTER SESSION ENABLE\
    \ PARALLEL DML`.\n5.  `FIRST_ROWS`: Optimize the query to quickly return the first\
    \ rows, instead of optimizing to quickly return the entire set.\n6.  `PARALLEL`:\
    \ Use multiple threads to take advantage of more CPU and I/O resources. Try to\
    \ use statement-level hints instead of object-level hints.\n7.  `QB_NAME`: Create\
    \ a name for a query block; useful for referencing the query block in other hints.\n\
    \nThe following is a list of popular, bad hints:\n\n1.  `FULL`: Use a full table\
    \ scan.\n2.  `INDEX*`: Use a specific index or type of index access.\n3.  `LEADING`/`ORDERED`:\
    \ Join tables in a specific order.\n4.  `MERGE`: Merge views and rewrite the two\
    \ queries into one.\n5.  `OPTIMIZER_FEATURES_ENABLE`: Use an older version of\
    \ the optimizer to disable newer features that cause problems.\n6.  `OPT_PARAM`:\
    \ Change specific parameter values for a query; for example, if a DBA foolishly\
    \ changed `OPTIMIZER_INDEX_COST_ADJ` on the system, we can at least fix it for\
    \ the query.\n7.  `PQ*`: How to process parallel data.\n8.  `UNNEST`: Convert\
    \ a subquery into a join.\n9.  `USE_HASH`/`USE_MERGE`/`USE_NL`: Force a hash join,\
    \ a sort-merge join, or a nested loop join."
  raw: '### Changing Execution Plans


    There are many ways to change the execution plans of SQL statements. The following
    list is ordered by which solutions are the cleanest. This subjective ranking is
    based on a combination of proportionality, obviousness, and simplicity.


    Fixes should be proportional to the problem; rewriting a query only affects one
    query, whereas changing a system parameter affects many queries. Fixes should
    be obvious; rewriting a query makes the changes obvious, whereas using `DBMS_ADVANCED_REWRITE`
    will fool most developers. Fixes should be easy; adding a hint directly to the
    query is easier than adding a hint through a SQL profile.


    In the real world, we have many constraints placed on our tuning. Frequently we
    have to fix the execution plan without directly changing the query. Sometimes
    we have to skip the easy steps and go to advanced steps that secretly swap out
    a bad execution plan for a good one.


    1.  *Change how the query is called*: Ensure the application is not creating a
    new connection for each query. Use bind variables instead of creating a large
    number of hard-coded queries. Use batching instead of reading and writing one
    row at a time.


    2.  *Rewrite the query*: Apply advanced features and programming styles. If our
    query is too large to tune in one piece, we can split it into non-transformable
    pieces with the `ROWNUM` trick.


    3.  *Gather statistics*: Described in more detail at the end of the chapter.


    4.  *Create or alter objects*: Consider adding indexes, constraints, materialized
    views, compression, partitions, parallelism, etc.


    5.  *Add hints to the query*: See the next section for details about hints.


    6.  *SQL profiles*: Add hints to a query without directly changing the SQL text.
    This feature is also described later in the chapter.


    7.  *SQL plan baselines*: Replace one plan with another plan. This feature is
    a large, complex system that can be used to control and evolve execution plan
    acceptance. This feature is useful for preserving performance during large system
    changes but is too cumbersome for most SQL tuning.


    8.  *Stored outlines*: An earlier, simpler, and deprecated version of SQL plan
    baselines.


    9.  **DBMS_STATS.SET_X_STATS:** Manually modifying table, column, and index stats
    can significantly change plans by making objects artificially look more or less
    expensive.


    10.  *Session control*: Change parameters at the session level. For example, if
    an upgrade from 12c to 19c causes problems for one process, and we don’t have
    time to fix each query individually, we can run this command at the beginning
    of the session: `ALTER SESSION SET OPTIMIZER_FEATURES_ENABLE=''12.2.0.1''`.


    11.  *System control*: Change parameters for the entire system. For example, on
    a data warehouse, we may want to spend more parsing time to generate good execution
    plans; we can enable SQL plan directives by running `ALTER SYSTEM SET OPTIMIZER_ADAPTIVE_STATISTICS=TRUE`.
    Or if we see lots of odd wait events, we may need to reconfigure the system. Try
    not to lie to Oracle, and do not change a system parameter to only fix a single
    instance of a problem.


    12.  **DBMS_ADVANCED_REWRITE:** Change a query into another query. This package
    is a neat trick but is kind of evil because we can secretly change the meaning
    of a query.


    13.  *Virtual private database*: Change a query into another query by adding predicates.
    This feature is not intended for performance, but we can abuse it to change execution
    plans.


    14.  *SQL translation framework*: Change a query into another query before it
    even gets parsed.


    15.  *SQL Patch* (DBMS_SQLDIAG.CREATE_SQL_PATCH): A semi-documented way to add
    hints to queries.


    ### Hints


    Hints are directives the optimizer must follow if possible. The name “hint” is
    misleading. Despite what many people believe, the optimizer does not randomly
    ignore hints. It only seems that way because the hint syntax is complicated. There
    are many reasons a hint can be invalid and cannot be followed.


    There are hundreds of hints, and many of them are documented in the “Comments”
    chapter of the *SQL Language Reference*. There’s a hint for every execution plan
    feature. We can generate a full list of hints for an execution plan by passing
    the parameter `FORMAT=>''+OUTLINE''` to `DBMS_XPLAN`. Most hints are cryptic and
    difficult to use. Luckily, we normally only need to add a small number of hints.


    It''s useful to think of there being two different categories of hints: good hints
    that provide useful information to the optimizer and bad hints that tell the optimizer
    how to do its job.


    Good hints tell the optimizer something it couldn’t know, like a trade-off that
    we’re willing to accept. For example, only a developer could choose the `APPEND`
    hint, because only a developer knows if we’re willing to gain performance at the
    risk of unrecoverable data.


    Bad hints circumvent the normal optimizer logic and require developers to play
    the role of the optimizer. We don’t always have time to fix the root cause, and
    sometimes we need to quickly tell the optimizer how to do its job. Overusing bad
    hints can make our SQL difficult to understand and may cause us to miss useful
    features in future versions. But sometimes a small number of bad hints is necessary
    for quickly solving a critical problem.


    The following is a list of popular, good hints:


    1.  APPEND/APPEND_VALUES: Use direct-path writes; improves speed but data is initially
    unrecoverable.


    2.  DRIVING_SITE: Execute a query on a remote site; when using tables over database
    links, we may want to execute the join on a remote database instead of passing
    the rows and then joining them.


    3.  DYNAMIC_SAMPLING: Read blocks from the row sources to provide additional optimizer
    information.


    4.  ENABLE_PARALLEL_DML: Enable parallel DML for just one query, instead of running
    `ALTER SESSION ENABLE PARALLEL DML`.


    5.  FIRST_ROWS: Optimize the query to quickly return the first rows, instead of
    optimizing to quickly return the entire set.


    6.  PARALLEL: Use multiple threads to take advantage of more CPU and I/O resources.
    Try to use statement-level hints instead of object-level hints.


    7.  QB_NAME: Create a name for a query block; useful for referencing the query
    block in other hints.


    The following is a list of popular, bad hints:


    1.  FULL: Use a full table scan.


    2.  INDEX*: Use a specific index or type of index access.


    3.  LEADING/ORDERED: Join tables in a specific order.


    4.  MERGE: Merge views and rewrite the two queries into one.


    5.  OPTIMIZER_FEATURES_ENABLE: Use an older version of the optimizer to disable
    newer features that cause problems.


    6.  OPT_PARAM: Change specific parameter values for a query; for example, if a
    DBA foolishly changed `OPTIMIZER_INDEX_COST_ADJ` on the system, we can at least
    fix it for the query.


    7.  PQ*: How to process parallel data.


    8.  UNNEST: Convert a subquery into a join.


    9.  USE_HASH/USE_MERGE/USE_NL: Force a hash join, a sort-merge join, or a nested
    loop join.'
  trans: "\n## 更改执行计划\n\n更改 SQL 语句执行计划的方法有很多。以下列表按解决方案的“干净”程度排序。这个主观排序基于比例性、明显性和简单性的综合考量。\n\
    \n修复措施应与问题规模相匹配；重写查询只影响单个查询，而更改系统参数则会影响多个查询。修复应当显而易见；重写查询使变更一目了然，而使用 `DBMS_ADVANCED_REWRITE`\
    \ 则会迷惑大多数开发者。修复应当简便；直接向查询添加提示比通过 SQL 配置文件添加提示更容易。\n\n在实际工作中，性能调优面临诸多限制。我们常常需要在不直接更改查询的情况下修复执行计划。有时我们不得不跳过简单步骤，直接采用高级方法，暗中将糟糕的执行计划替换为优良的计划。\n\
    \n1.  *更改查询的调用方式*：确保应用程序不会为每个查询创建新连接。使用绑定变量，而不是创建大量硬编码的查询。使用批处理，而不是逐行读写。\n2. \
    \ *重写查询*：运用高级功能和编程风格。如果查询过于庞大无法整体调优，可以使用 `ROWNUM` 技巧将其拆分为不可转换的部分。\n3.  *收集统计信息*：本章末尾将有更详细的描述。\n\
    4.  *创建或修改对象*：考虑添加索引、约束、物化视图、压缩、分区、并行处理等。\n5.  *向查询添加提示*：有关提示的详细信息，请参见下一节。\n6.\
    \  *SQL 配置文件*：在不直接更改 SQL 文本的情况下向查询添加提示。本章后续也将介绍此功能。\n7.  *SQL 计划基线*：用一个计划替换另一个计划。这是一个庞大而复杂的系统，可用于控制和演进执行计划的接受标准。此功能对于在大型系统变更中保持性能非常有用，但对于大多数\
    \ SQL 调优来说过于繁琐。\n8.  *存储概要*：SQL 计划基线的一个早期、更简单且已废弃的版本。\n9.  `DBMS_STATS.SET_X_STATS`：手动修改表、列和索引的统计信息，通过人为地使对象看起来开销更大或更小，可以显著改变执行计划。\n\
    10. *会话控制*：在会话级别更改参数。例如，如果从 12c 升级到 19c 导致某个进程出现问题，并且我们没有时间逐个修复查询，我们可以在会话开始时运行此命令：\n\
    \    ```\n    ALTER SESSION SET OPTIMIZER_FEATURES_ENABLE='12.2.0.1'\n    ```\n\
    11. *系统控制*：为整个系统更改参数。例如，在数据仓库上，我们可能希望花费更多解析时间来生成良好的执行计划；可以通过运行以下命令启用 SQL 计划指令：\n\
    \    ```\n    ALTER SYSTEM SET OPTIMIZER_ADAPTIVE_STATISTICS=TRUE\n    ```\n \
    \   或者，如果我们看到大量奇怪的等待事件，可能需要重新配置系统。尽量不要对 Oracle“说谎”，不要为了仅修复单个问题实例而更改系统参数。\n12.\
    \ `DBMS_ADVANCED_REWRITE`：将一个查询转换为另一个查询。这个包是个巧妙的技巧，但有点“邪恶”，因为我们可以暗中更改查询的含义。\n\
    13. *虚拟专用数据库*：通过添加谓词将查询转换为另一个查询。此功能并非专为性能设计，但我们可以滥用它来改变执行计划。\n14. *SQL 翻译框架*：在查询甚至被解析之前，就将其转换为另一个查询。\n\
    15. *SQL 补丁* (`DBMS_SQLDIAG.CREATE_SQL_PATCH`)：一种半文档化的方式，用于向查询添加提示。\n\n## 提示\n\
    \n提示是优化器在可能情况下必须遵循的指令。“提示”这个名字具有误导性。尽管许多人认为如此，但优化器并非随意忽略提示。之所以看起来像那样，是因为提示语法很复杂。提示无效且无法被遵循的原因有很多。\n\
    \n有数百个提示，其中许多在《*SQL 语言参考*》的“注释”章节中有文档说明。每个执行计划功能都有一个提示。我们可以通过向 `DBMS_XPLAN` 传递参数\
    \ `FORMAT=>'+OUTLINE'` 来生成执行计划的完整提示列表。大多数提示晦涩难用。幸运的是，我们通常只需要添加少量提示。\n\n将提示分为两个不同的类别很有用：向优化器提供有用信息的“好提示”，以及告诉优化器如何执行其工作的“坏提示”。\n\
    \n好提示告诉优化器一些它无法知晓的信息，比如我们愿意接受的权衡。例如，只有开发者才能选择 `APPEND` 提示，因为只有开发者知道我们是否愿意为获得性能而承担数据暂时不可恢复的风险。\n\
    \n坏提示绕过了正常的优化器逻辑，要求开发者扮演优化者的角色。我们并不总是有时间去修复根本原因，有时需要快速告诉优化器如何完成其工作。过度使用坏提示会使我们的\
    \ SQL 难以理解，并可能导致我们错过未来版本中的有用功能。但有时，少量坏提示对于快速解决关键问题是必要的。\n\n以下是一些流行的、好的提示列表：\n\n\
    1.  `APPEND`/`APPEND_VALUES`：使用直接路径写入；提高速度但数据最初不可恢复。\n2.  `DRIVING_SITE`：在远程站点执行查询；当使用数据库链接上的表时，我们可能希望在远程数据库上执行连接，而不是传递行数据后再连接。\n\
    3.  `DYNAMIC_SAMPLING`：从行源读取数据块以提供额外的优化器信息。\n4.  `ENABLE_PARALLEL_DML`：仅为单个查询启用并行\
    \ DML，而不是运行 `ALTER SESSION ENABLE PARALLEL DML`。\n5.  `FIRST_ROWS`：优化查询以快速返回前几行，而不是优化为快速返回整个结果集。\n\
    6.  `PARALLEL`：使用多个线程以利用更多的 CPU 和 I/O 资源。尽量使用语句级提示而非对象级提示。\n7.  `QB_NAME`：为查询块创建一个名称；便于在其他提示中引用该查询块。\n\
    \n以下是一些流行的、坏的提示列表：\n\n1.  `FULL`：使用全表扫描。\n2.  `INDEX*`：使用特定的索引或索引访问类型。\n3.  `LEADING`/`ORDERED`：按特定顺序连接表。\n\
    4.  `MERGE`：合并视图并将两个查询重写为一个。\n5.  `OPTIMIZER_FEATURES_ENABLE`：使用旧版本的优化器以禁用导致问题的较新功能。\n\
    6.  `OPT_PARAM`：为查询更改特定参数值；例如，如果 DBA 愚蠢地在系统上更改了 `OPTIMIZER_INDEX_COST_ADJ`，我们至少可以为该查询修复它。\n\
    7.  `PQ*`：如何处理并行数据。\n8.  `UNNEST`：将子查询转换为连接。\n9.  `USE_HASH`/`USE_MERGE`/`USE_NL`：强制使用哈希连接、排序合并连接或嵌套循环连接。\n"
- fmt: '# SQL Tuning


    There are many more hints than what is in the preceding list. And almost every
    hint has a `NO_*` version that has the opposite effect. There are even undocumented
    hints that are helpful enough to consider using. `CARDINALITY` and `OPT_ESTIMATE`
    can hard-code or adjust the row estimate for an inline view or operation, and
    they can be especially useful for objects the optimizer cannot easily estimate,
    like PL/SQL table functions. Those hints are used internally by SQL profiles created
    by the automatic SQL Tuning Advisor.


    The `MATERIALIZE` hint forces Oracle to store the results of a common table expression
    in a temporary table, instead of rerunning the subquery. Oracle automatically
    decides whether to materialize a common table expression or not, but sometimes
    Oracle makes the wrong choice. Those undocumented hints can be useful when nothing
    else works.


    Using hints correctly takes practice and patience. Oracle does not throw an error
    if the hint syntax is invalid or impossible to use. Instead, Oracle will simply
    ignore that hint and all the hints that come after it. In 19c we can use `FORMAT=>''+HINT_REPORT''`
    in the `DBMS_XPLAN` package to help understand what hints were used. The next
    section shows a quick example of using a hint when creating a SQL profile.


    ## SQL Profile Example


    This section demonstrates a worst-case SQL tuning example; we need to apply hints
    to fix an execution plan, but we do not have access to change the query. SQL plan
    baselines, outlines, and the SQL Tuning Advisor can preserve, evolve, and fix
    some problems, but it’s hard to get those tools to do exactly what we want. By
    manually creating SQL profiles, we can precisely inject the hints we need.


    For example, imagine we have an application that mistakenly decides to run all
    queries with parallelism enabled. The excessive parallel queries are trashing
    performance and need to be disabled immediately. We can’t easily change the application,
    but we need to change the execution plans right now. The following is an example
    of the bad query and execution plan:


    ```

    --Query that shouldn''t run in parallel.

    explain plan for select /*+parallel(2)*/ * from satellite;

    select * from table(dbms_xplan.display(format => ''basic +note''));

    Plan hash value: 3822448874


    | Id  | Operation            | Name      |


    |   0 | SELECT STATEMENT     |           |

    |   1 |  PX COORDINATOR      |           |

    |   2 |   PX SEND QC (RANDOM)| :TQ10000  |

    |   3 |    PX BLOCK ITERATOR |           |

    |   4 |     TABLE ACCESS FULL| SATELLITE |


    Note


    - Degree of Parallelism is 2 because of hint

    ```


    The following code creates a SQL profile that inserts a `NO_PARALLEL` hint into
    the query. SQL profiles are normally created by the SQL Tuning Advisor. Unfortunately,
    the SQL Tuning Advisor doesn’t always know exactly what we want to do. It’s helpful
    to create the profiles ourselves, precisely the way we want:


    ```

    --Create SQL Profile to stop parallelism in one query.

    begin

    dbms_sqltune.import_sql_profile

    (

    sql_text    => ''select /*+parallel(2)*/ * from satellite'',

    name        => ''STOP_PARALLELISM'',

    force_match => true,

    profile     => sqlprof_attr(''no_parallel'')

    );

    end;

    /

    ```


    After running the preceding PL/SQL block, if we rerun the same `EXPLAIN PLAN`
    and `DBMS_XPLAN` commands, we’ll see the new execution plan as follows:


    ```

    Plan hash value: 2552139662


    | Id  | Operation         | Name      |


    |   0 | SELECT STATEMENT  |           |

    |   1 |  TABLE ACCESS FULL| SATELLITE |


    Note


    - Degree of Parallelism is 1 because of hint

    - SQL profile "STOP_PARALLELISM" used for this statement

    ```


    The new profile appears in the “Note” section, and the execution plan does not
    use parallelism anymore. This technique can be applied to use any combination
    of hints. SQL profiles are great but are not the ideal way to solve performance
    problems. We have to remember to deploy the profile to all databases. And if the
    query changes at all, even an extra space, the profile will no longer match the
    query.


    ## SQL Tuning: Gathering Optimizer Statistics


    Optimizer statistics should be manually gathered after any process that changes
    a large percentage of data. Optimizer statistics should be automatically gathered
    by the default auto-task for incremental data changes.


    Take a minute to reread the previous paragraph; the majority of performance problems
    are caused by not following that simple advice. Too many developers ignore gathering
    statistics – perhaps because they think “gathering stats is a DBA’s job.” Too
    many DBAs mess up automatic statistics gathering, perhaps because they encountered
    a bug 10 years ago and think they can still create a better job than Oracle.


    ### Manual Statistics


    Without good statistics the optimizer cannot function properly. If a table is
    going to be involved in queries after that table is loaded or changed, we must
    immediately gather statistics. Large table changes should be followed by a call
    to `DBMS_STATS.GATHER_TABLE_STATS`.


    There’s no perfect definition for what constitutes a “large” table change. For
    the optimizer, the percentage is more important than the absolute number. Adding
    100 rows to a table with only 1 row is more significant than adding a billion
    rows to a table that already has a billion rows. For global temporary tables,
    almost any change could be considered large, since the tables are empty to begin
    with.


    The package `DBMS_STATS` should be used to gather statistics – do not use the
    semi-deprecated `ANALYZE` command. The most important functions in `DBMS_STATS`
    are `GATHER_TABLE_STATS` and `GATHER_SCHEMA_STATS`. Those functions have a large
    number of parameters, and it’s worth becoming familiar with most of them. The
    following list includes the required and most important parameters:


    1.  `ownname`/`tabname`: The schema owner and table name.

    2.  `estimate_percent`: The amount of data to sample. We almost always want to
    leave this parameter alone. The default gathers 100% but uses a fast, approximate-number-of-distinct-values
    algorithm. For extra-large tables that don’t need precise statistics, it may be
    helpful to use a tiny value like `0.01`.

    3.  `degree`: The degree of parallelism. This parameter can significantly improve
    the performance of gathering statistics on large objects. Some parts of statistics
    gathering, such as histograms, are not improved by parallelism. For extreme statistics
    gathering performance, we may need to look into concurrency instead.

    4.  `Cascade`: Are statistics also gathered on related indexes? Defaults to `TRUE`.^([^(46)](#fn46))

    5.  `no_invalidate`: By default, the statistics will not necessarily be applied
    to all existing execution plans. Invalidating many plans could cause performance
    problems, so the invalidations are done gradually over time. The default is `TRUE`,
    but in practice most dependent execution plans are immediately invalidated. However,
    if we want to be sure that our statistics immediately take effect, we may want
    to set this parameter to `FALSE`.

    6.  `method_opt`: Determines which histograms to gather. By default, histograms
    are created for columns with skewed data, and only if those columns have also
    been used in a relevant condition in a query.


    There are several times when statistics are gathered as a side effect of other
    operations, and we don’t need to repeat the gathering. Statistics can be automatically
    gathered when loading table data, so if our execution plans have the operation
    `OPTIMIZER STATISTICS GATHERING`, then we probably do not need to regather statistics
    manually. Creating or rebuilding indexes automatically gathers index statistics,
    so we may be able to save a lot of time with the parameter `CASCADE=>FALSE`.'
