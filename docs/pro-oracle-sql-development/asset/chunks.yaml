  trans: '

    ## Oracle Text


    Oracle Text 让我们能够在 Oracle 数据库中构建强大的搜索引擎功能。对于大多数文本搜索来说，标准和自定义的 PL/SQL 函数已经足够好用。如果我们需要一个能够*理解*语言的工具，Oracle
    Text 就非常有用。Oracle Text 的特性包括模糊匹配（匹配同一单词的不同拼写）、停用词（不值得索引的次要词汇）、大小写处理、同义词库、多语言支持等等。


    ### 索引类型


    Oracle Text 通过在我们的数据上创建特殊索引来工作。共有三种不同的索引类型，每种都有不同的用途、语法和属性。


    -   `CONTEXT` 索引用于索引大型文档，并使用 `CONTAINS` 操作符。

    -   `CTXCAT` 索引用于索引文本片段与其他列的组合，并使用 `CATSEARCH` 操作符。

    -   `CTXRULE` 索引用于文档分类，并使用 `MATCHRULE` 操作符。


    ### 使用示例


    例如，让我们在 `LAUNCH` 表中搜索 GPS 发射任务。`MISSION` 列包含非结构化文本，并且有几十次发射任务包含字符串 GPS。以下代码是查找
    GPS 的典型方法：


    ```

    --使用 LIKE 操作符查找 GPS 发射任务。

    select count(*) total

    from launch

    where lower(mission) like ''%gps%'';

    TOTAL


    ```


    前面的查询将始终使用全表扫描。即使在表达式 `LOWER(MISSION)` 上创建基于函数的索引也没有帮助。B-tree 索引按值的首字符对数据进行排序。B-tree
    索引可以帮助我们找到 `''gps%''`，但无法帮助我们找到 `''%gps''`。


    文本索引处理单词，并且可以模拟前导通配符搜索。以下代码在 `LAUNCH.MISSION` 上创建了一个 `CONTEXT` 索引：


    ```

    --在 MISSION 列上创建 CONTEXT 索引。

    --(文本索引需要模式所有者的 CREATE TABLE 权限。)

    grant create table to space;

    create index launch_mission_text

    on launch(mission) indextype is ctxsys.context;

    ```


    使用 Oracle Text 索引需要改变谓词。我们需要用 `CONTAINS` 代替 `LIKE`。`CONTAINS` 返回一个分数用于相关性排名。如果我们只是查找单词是否存在，可以用
    `> 0` 来过滤。


    以下查询使用 `CONTAINS` 操作符，并返回与 `LIKE` 操作符相同数量的行。执行计划显示使用了 `DOMAIN INDEX` 操作，用到了 `CONTEXT`
    索引：


    ```

    --使用 CONTAINS 操作符查找 GPS 发射任务。

    explain plan for

    select count(*) total

    from launch

    where contains(mission, ''gps'', 1) > 0;

    select * from table(dbms_xplan.display(format => ''basic''));

    Plan hash value: 4034124262


    | Id  | Operation        | Name                |


    |   0 | SELECT STATEMENT |                     |

    |   1 |  SORT AGGREGATE  |                     |

    |   2 |   DOMAIN INDEX   | LAUNCH_MISSION_TEXT |


    ```


    ### 索引同步


    `CONTEXT` 索引的一个缺点是，它们在每次事务后不会自动更新。我们必须手动同步索引，如下所示：


    ```

    --在对 LAUNCH 表进行 DML 操作后同步索引。

    begin

    ctx_ddl.sync_index(idx_name =>

    sys_context(''userenv'', ''current_schema'')||

    ''.launch_mission_text'');

    end;

    /

    ```


    前面的例子只展示了 Oracle Text 一个简单的用法。长达 293 页的《Text Application Developer’s Guide》中描述了许多隐藏的宝藏。例如，Oracle
    Text 很早就提供了用于分类的机器学习算法，远在该特性成为流行词之前。


    ## 多语言引擎


    尽管 SQL 和 PL/SQL 功能强大，足以解决任何问题，但显然有时其他编程语言会很有帮助。Oracle 21c 引入了多语言引擎 (MLE)，它将 JavaScript
    与 SQL 和 PL/SQL 集成在一起。


    数据库中的 Java 本应为 Oracle 带来多语言编程，但由于第 15 章解释的一些技术和社原因，它失败了。希望 MLE 能避免其中一些陷阱，到目前为止，这项技术看起来很有前景。但
    MLE 目前仅在创新版本 21c 上可用，并且只支持 JavaScript，因此现在判断它将产生何种影响还为时过早。


    ### 基本用法


    调用 JavaScript 最简单的方法是使用 `console.log` 并在 DBMS 输出中查看结果：


    ```

    --简单的多语言引擎示例。

    begin

    dbms_mle.eval

    (

    context_handle => dbms_mle.create_context(),

    language_id    => ''JAVASCRIPT'',

    source         => ''console.log("Hello World!");''

    );

    end;

    /

    Hello World!

    ```


    前面这个简单的例子只展示了将 PL/SQL 与 JavaScript 集成的一种方式。`DBMS_MLE` 包还允许我们在 PL/SQL 和 JavaScript
    之间来回传递变量。并且，MLE SQL 驱动程序允许服务器端 JavaScript 运行并处理 SQL 查询。使用 PL/SQL 来运行 JavaScript
    再运行 SQL，而不是直接用 PL/SQL 运行 SQL，可能看起来有些愚蠢。但是，服务器端 JavaScript 允许使用 APEX 的 Web 开发人员避免使用
    PL/SQL，而坚持使用他们最熟悉的语言。


    ### 高精度计算示例


    作为 MLE 如何帮助数据库开发者的一个例子，过去有几次我需要使用具有任意精度的数字。Oracle 的 `NUMBER` 数据类型对于通常存储在数据库中的物理值（如员工数量或实际方程式的结果）来说精度绰绰有余。但在
    PL/SQL 中，没有简单的方法来进行密码学所需的任意精度数学运算；`NUMBER` 精度不够，而且据我所知，没有开源的 PL/SQL 库。


    以下代码展示了 Oracle 数字最终如何失去精度。大约 41 位数字后，数字开始四舍五入，我们看到的是零，而不是预期的值：


    ```

    --Oracle 精度开始失效的示例。

    select

    to_char(1234567890123456789012345678901234567890123, ''TM'') value

    from dual;

    VALUE


    ```


    虽然 JavaScript 通常不以数学技能著称，但我们可以使用几种方法通过 MLE 快速启用更高精度。有几种开源的任意精度数学库可用于 JavaScript，但截至
    21c 版本，加载 JavaScript 库的过程很复杂。或者，我们可以通过在数字末尾加上字母 `n` 来使用 JavaScript 的 BigInt 类型，这样所有的数字都能被保留：


    ```

    --使用 BigInt 获得更好的精度。

    begin

    dbms_mle.eval

    (

    context_handle => dbms_mle.create_context(),

    language_id    => ''JAVASCRIPT'',

    source         => ''console.log(

    1234567890123456789012345678901234567890123n

    .toString());''

    );

    end;

    /


    ```


    我们不可避免地会遇到集成问题，因为 SQL 和 PL/SQL 必须将结果存储为字符串。但另一种选择是构建我们自己的数学库，这绝非易事。SQL 和 PL/SQL
    将始终是我们进行 Oracle 数据处理的主要语言，但很高兴在某些极端情况下有 JavaScript 作为另一个选择。而且 MLE 很可能在未来的版本中得到改进。基于之前的测试版，下一个版本的
    MLE 很可能支持 Python 作为另一种语言，并且可能包含改进的库加载和管理机制。

    '
- fmt: '## Spatial


    使用 Oracle Spatial，我们可以在 Oracle 中构建地理信息系统。Spatial 可以存储、索引和查询几何信息。对于几何形状而言，连接（joining）等操作的含义完全不同。历史上，Spatial
    选项是一个昂贵的附加组件，很少有组织购买。既然现在这个选项是免费的，那么考虑使用 Oracle Spatial 来执行诸如查找地理坐标之间距离之类的简单操作是值得的。


    空间函数是通用且强大的，因此它们通常隐藏在一个更简单的接口之后，为我们省去了许多硬编码的值。存在许多坐标系，但在实践中大多数组织只需要一个简单的函数来返回两点之间的英里数，如下列函数所示：


    ```

    --创建用于获取两个地理坐标之间英里数的函数。

    create or replace function get_miles_between

    (

    p_latitude1  number,

    p_longitude1 number,

    p_latitude2  number,

    p_longitude2 number

    ) return number is

    begin

    return sdo_geom.sdo_distance

    (

    sdo_geometry(2001,4326,null,sdo_elem_info_array(1, 1, 1),

    sdo_ordinate_array(p_latitude1,p_longitude1)),

    sdo_geometry(2001,4326,null,sdo_elem_info_array(1, 1, 1),

    sdo_ordinate_array(p_latitude2,p_longitude2))

    ,1

    ,''unit=mile''

    );

    end get_miles_between;

    /

    ```


    有了这个函数，我们现在可以轻松计算发射场之间的距离，比如著名的瓦勒普斯飞行设施和白沙导弹靶场：


    ```

    --瓦勒普斯和白沙之间的英里数。

    select round(get_miles_between(

    wallops.latitude,     wallops.longitude,

    white_sands.latitude, white_sands.longitude)) miles

    from (select * from site where site_id = 1821) wallops

    cross join (select * from site where site_id = 1895) white_sands;

    MILES


    ```


    这个简单、硬编码的例子仅仅触及了 Oracle Spatial 所能做之事的皮毛。一个更现实的例子可能涉及在发射场周围创建地理围栏，然后检测船只或飞机何时过于接近。一个朴素的、`O(N^2)`解决方案是计算所有点与所有车辆之间的距离。而使用
    Oracle Spatial，我们可以构建一个多维 R 树索引来更快地找到任何过于接近的车辆。


    ## Other Features


    本节简要讨论一些不太流行但能显著扩展数据库能力的选项和功能。尽管这些选项不常见，但它们并非微不足道。其中大多数功能在 Oracle 文档库中都有一本或多本书籍专门介绍。一些开发人员可能会将职业生涯的大部分时间用于使用其中某一项选项。


    ### Machine Learning


    Oracle 拥有机器学习功能已有很长时间。过去的版本被称为数据挖掘或高级分析，它们需要昂贵的许可证，很少有组织为此付费。幸运的是，该选项现在是免费的，并且有许多工具、算法和
    API 可用于机器学习。


    机器学习在 SQL、PL/SQL、R 和 Python 中有多种可用的 API。这些接口让我们可以在关系型或非关系型表上创建和训练模型。甚至还有一个 SQL
    Developer 插件来帮助我们快速创建数据挖掘解决方案。


    机器学习框架当然有更受欢迎的选择。Oracle 的优势在于投产时间。如果数据已经在数据库中，那么将算法移到数据上比将数据移到算法上更快。


    ### OLAP


    联机分析处理（OLAP）是一种不同的数据查询方式。OLAP 使用多维模型，过去是数据仓库和业务智能应用程序的热门选择。有许多独立的 OLAP 产品，但 Oracle
    的 OLAP 是一个可许可的选项，嵌入在数据库中。该选项允许创建维度、立方体和其他 OLAP 结构。该产品还附带一个独立的 Analytic Workspace
    Manager 图形用户界面。


    OLAP 不像以前那样常见，核心 Oracle 数据库正在逐步添加类似 OLAP 的功能。例如，最近的版本向数据库添加了 `ANALYTIC VIEW`、`ATTRIBUTE
    DIMENSION`、`DIMENSION` 和 `HIERARCHY`，而无需 OLAP 许可证。


    ### Property Graph


    属性图是一种用于分析图（由顶点和它们之间的边组成的数据）的工具。使用属性图，我们可以使用属性图查询语言（PGQL）查询现有的 Oracle 表。PGQL 是一种类似
    SQL 的语言，但不幸的是，PGQL 没有嵌入到 Oracle SQL 中。即使是评估属性图也需要多个外部工具。希望未来的 Oracle 版本能更好地将 PGQL
    与数据库集成。


    ### Virtual Private Database


    虚拟专用数据库通过细粒度的访问控制来增强常规数据库安全性。通过 VPD，我们可以透明地将谓词插入到相关的 SQL 语句中以强制执行访问规则。


    设置 VPD 需要多个对象协同工作。一个登录触发器初始化一个上下文，该上下文将标识用户及其访问权限。一个包包含一个函数，该函数使用上下文返回正确的谓词。必须设置一个策略来将函数绑定到特定表。


    例如，VPD 可以限制每个用户只能看到 `LAUNCH` 表中与其分配站点相关的行。任何针对 `LAUNCH` 表的查询都将自动包含该谓词。例如，用户可能运行查询
    `SELECT * FROM LAUNCH`，但 Oracle 会在后台实际运行 `SELECT * FROM LAUNCH WHERE SITE_ID =
    1`。


    VPD 是一个巧妙的特性，可以解决独特的安全问题。但在使用 VPD 之前我们应该谨慎。通过触发器和秘密谓词来更改安全策略可能会令人困惑。即使是管理员也会受到影响，他们可能看不到预期的结果。而且执行计划不会显示添加的谓词。如果我们构建一个
    VPD 系统，我们必须彻底记录该系统并与所有用户和管理员共享该文档。


    ### Database In-Memory


    内存中数据库可以通过以列式格式存储数据来显著提高查询性能。列式格式允许卓越的压缩、SIMD 处理、内存中存储索引、连接组、优化的向量聚合等。如果我们必须基于少量列处理大量数据，内存中列存储会很有用。


    列式格式并非总是更好，Oracle 仍然会以行、块、磁盘和传统的内存结构存储数据。内存中可许可选项需要为列式存储分配额外的内存。自 19c 起，我们可以在没有许可证的情况下使用最多
    16 GB 的内存。


    ### Advanced Compression


    Advanced Compression 可许可选项提供了更好的压缩功能。基本表压缩按块工作，并且仅适用于直接路径写入。高级表压缩可以更好地压缩数据，并且可以与常规
    DML 语句一起工作。Advanced Compression 还支持 CLOB 压缩和去重、改进的索引压缩以及数据泵导出压缩。压缩功能不仅仅是为了节省空间；节省空间也可以提高性能，因为
    Oracle 需要从磁盘读取的数据更少。'
  raw: '## Spatial


    With Oracle Spatial, we can build geographic information systems in Oracle. Spatial
    can store, index, and query geometric information. Operations like joining take
    on a completely different meaning with geometric shapes. Historically, the Spatial
    option was an expensive add-on that very few organizations purchased. Now that
    the option is free, it’s worth considering using Oracle Spatial for simple operations
    like finding the distance between geographic coordinates.


    The spatial functions are generic and powerful, so they are commonly hidden behind
    a simpler interface that spares us from the many hard-coded values. There are
    many coordinate systems, but in practice most organizations only need a simple
    function to return the miles between two points, like the following function provides:


    ```

    --Create function to get miles between two geographic coordinates.

    create or replace function get_miles_between

    (

    p_latitude1  number,

    p_longitude1 number,

    p_latitude2  number,

    p_longitude2 number

    ) return number is

    begin

    return sdo_geom.sdo_distance

    (

    sdo_geometry(2001,4326,null,sdo_elem_info_array(1, 1, 1),

    sdo_ordinate_array(p_latitude1,p_longitude1)),

    sdo_geometry(2001,4326,null,sdo_elem_info_array(1, 1, 1),

    sdo_ordinate_array(p_latitude2,p_longitude2))

    ,1

    ,''unit=mile''

    );

    end get_miles_between;

    /

    ```


    With that function, we can now easily calculate the distance between launch sites,
    like the popular Wallops Flight Facility and the White Sands Missile Range:


    ```

    --Miles between Wallops and White Sands.

    select round(get_miles_between(

    wallops.latitude,     wallops.longitude,

    white_sands.latitude, white_sands.longitude)) miles

    from (select * from site where site_id = 1821) wallops

    cross join (select * from site where site_id = 1895) white_sands;

    MILES


    ```


    That simple, hard-coded example only scratches the surface of what Oracle Spatial
    can do. A more realistic example could involve creating geofences around launch
    sites and then detecting when a ship or airplane gets too close. A naïve, `O(N^2)`
    solution would be to calculate the distance between all points and all vehicles.
    With Oracle Spatial, we could build a multidimensional R-tree index to more quickly
    find any vehicle that gets too close.


    ## Other Features


    This section briefly discusses some of the less popular options and features that
    can significantly extend the capabilities of our database. Although these options
    are uncommon, they are not small. Most of these features are the subject of one
    or more books in the Oracle documentation library. Some developers may spend a
    large part of their career working with one of these options.


    ### Machine Learning


    Oracle has had machine learning features for a long time. Past versions were called
    data mining or advanced analytics, and they required an expensive license that
    very few organizations paid for. Luckily, the option is now free, and there are
    many tools, algorithms, and APIs available for machine learning.


    Machine learning has many APIs available in SQL, PL/SQL, R, and Python. Those
    interfaces let us create and train models on relational or non-relational tables.
    There’s even a SQL Developer plug-in to help us quickly create data mining solutions.


    There are certainly more popular choices for machine learning frameworks. Oracle’s
    advantage is the time to production. If the data is already in a database, it’s
    faster to move the algorithms to the data than it is to move the data to the algorithms.


    ### OLAP


    Online analytical processing is a different way of querying data. OLAP uses a
    multidimensional model and used to be a popular choice for data warehouses and
    business intelligence applications. There are many stand-alone OLAP products,
    but Oracle’s OLAP is a licensable option embedded in the database. The option
    allows creating dimensions, cubes, and other OLAP structures. The product also
    comes with a separate Analytic Workspace Manager GUI.


    OLAP is not as common as it used to be, and the core Oracle database is gradually
    adding OLAP-like features. For example, recent versions have added `ANALYTIC VIEW`,
    `ATTRIBUTE DIMENSION`, `DIMENSION`, and `HIERARCHY` to the database, without the
    need for an OLAP license.


    ### Property Graph


    Property graph is a tool for analyzing graphs – data that consists of vertexes
    and the edges between them. With property graph we can query existing Oracle tables
    using the property graph query language (PGQL). PGQL is a SQL-like language, but
    unfortunately PGQL is not embedded in Oracle SQL. Even evaluating property graph
    would require multiple external tools. Hopefully a future version of Oracle will
    better integrate PGQL with the database.


    ### Virtual Private Database


    Virtual private database augments normal database security with fine-grained access
    controls. Through VPD we can transparently insert predicates into relevant SQL
    statements to enforce access rules.


    Setting up VPD requires several objects to work together. A logon trigger initializes
    a context, and that context will identify the users and their access. A package
    contains a function, and that function uses the context to return the right predicate.
    A policy must be set up to tie the functions to specific tables.


    For example, VPD could restrict each user to only see rows in the `LAUNCH` table
    that are related to their assigned site. Any query against the `LAUNCH` table
    will automatically include that predicate. For example, a user might run the query
    `SELECT * FROM LAUNCH`, but Oracle would secretly run `SELECT * FROM LAUNCH WHERE
    SITE_ID = 1`.


    VPD is a neat feature that solves unique security problems. But we should be careful
    before using VPD. Changing security through triggers and secret predicates can
    be confusing. Even administrators are affected, and they may not see the results
    they expect. And the execution plan will not show the added predicates. If we
    build a VPD system, we must thoroughly document the system and share that documentation
    with all users and administrators.


    ### Database In-Memory


    Database in-memory can significantly improve query performance by storing data
    in a columnar format. The columnar format allows superior compression, SIMD processing,
    in-memory storage indexes, join groups, optimized vector aggregation, etc. The
    in-memory column store can be useful if we have to process a large amount of data
    based on a small number of columns.


    A columnar format is not always better, and Oracle will still store data in rows,
    blocks, disks, and the traditional memory structures. The in-memory licensable
    option requires allocating additional memory for columnar storage. Since 19c,
    we can use up to 16 GB for in-memory without a license.


    ### Advanced Compression


    The advanced compression licensable option enables better compression features.
    Basic table compression works per block and only works for direct-path writes.
    Advanced table compression can compress data better and can work with regular
    DML statements. Advanced compression also enables CLOB compression and deduplication,
    improved index compression, and export data pump compression. Compression features
    aren’t just about saving space; saving space can also improve performance because
    Oracle has less data to read from disk.'
