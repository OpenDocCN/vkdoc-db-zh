- fmt: '### Create and Save Changes Manually


    Whichever approach we use to interact with version-controlled files, we should
    manually commit and verify the files. When we push our changes or merge our branch,
    we might once again find version control conflicts if other people have changed
    the same files. Our work is integrated through the version control system, not
    a shared database. Relying on version control adds a step to our workflow, but
    the extra step is worth the cost because it enables parallel development.


    There are products that attempt to look at our database and guess the changes,
    but we should avoid those products. Automation is great for *applying* changes.
    But when it comes to building the changes, they should be lovingly handcrafted.
    We can’t trust a program to tell us how to program – that’s our job.


    Creating automatic change sets is extremely difficult. Even Oracle’s solution,
    `DBMS_METADATA_DIFF`, doesn’t do the job well enough. That package can create
    a good starting point, but it will inevitably produce a lot of ugly junk code.
    Those programs don’t understand our style and don’t care if the results look good.
    Those programs don’t understand that objects must also look good in the version-controlled
    text files. And of course those programs are usually not free. For example, `DBMS_METADATA_DIFF`
    requires a license for the OEM Change Management option.


    Most importantly, those automated programs don’t know what we don’t care about.
    Those programs produce a lot of junk that drowns out useful features, and they
    make it impossible to meaningfully compare files.


    For example, the following code creates a simple table and then asks Oracle to
    generate the Data Definition Language (DDL) for it:


    ```

    create table test1 as select 1 a from dual;

    select dbms_metadata.get_ddl(''TABLE'', ''TEST1'') from dual;

    ```


    We might expect Oracle’s output to be pretty similar to the original command.
    Instead, we get the following horrendous output:


    ```

    CREATE TABLE "JHELLER"."TEST1"

    (    "A" NUMBER

    ) SEGMENT CREATION IMMEDIATE

    PCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS 255

    NOCOMPRESS LOGGING

    STORAGE(INITIAL 65536 NEXT 1048576 MINEXTENTS 1 MAXEXTENTS 2147483645

    PCTINCREASE 0 FREELISTS 1 FREELIST GROUPS 1

    BUFFER_POOL DEFAULT FLASH_CACHE DEFAULT CELL_FLASH_CACHE DEFAULT)

    TABLESPACE "USERS"

    ```


    The preceding output is technically correct. But the output misses so much and
    adds so much that is worthless. Programs like `DBMS_METADATA` provide a useful
    starting point, but the output needs a lot of cleanup. The spacing is ugly, there
    are unnecessary double quotes, and there are many settings that should always
    be based on the default. The schema should be parameterized and controlled elsewhere
    in the script, with a command like `ALTER SESSION SET CURRENT_SCHEMA = SCHEMA_NAME`.
    Things like the tablespace, segment, and storage options should almost always
    use the default options.


    When scripts look like the preceding automated output, people will not update
    them, especially a junior developer – they will be too scared to touch any of
    that mess. It’s impossible to tell what part of that `CREATE TABLE` command is
    important and what isn’t.


    There are times when we want to edit one of those unusual options. For example,
    if we have a large, read-only table, we can save 10% of the storage space by specifying
    `PCTFREE 0`. But if we manually change the number ten to the number zero in the
    preceding script, would anyone ever notice?


    Version control is an integral part of virtually all development environments,
    and Oracle SQL development should be no exception. Our database schemas must truly
    live in version-controlled text files. We should use version control software
    to manage differences and to create a social coding platform. We should use our
    IDE to work with those files, but we must handcraft any objects that are automatically
    generated.


    ## Empower Everyone


    Making schemas easy to install and improving collaboration with version control
    are part of a larger goal – empowering everyone on our team. No one should have
    to ask permission, fill out forms, or wait on other people to start developing
    and experimenting with our programs. This chapter gives specific ideas for how
    to democratize an Oracle schema, but there are many other ways to accomplish the
    same goal. Technology alone cannot break down strict social hierarchies and make
    our organizations and projects more accessible.


    This chapter barely scratches the surface of everything needed to set up efficient
    development processes. This book is not about generic software development life
    cycle methodologies, but it is worth discussing a few sociological problems that
    tend to infect Oracle environments. Oracle shops can benefit from fixing the power
    imbalance between developers and administrators, increasing transparency, and
    lowering the barriers to entry.


    ### Power Imbalance


    There’s often a power imbalance between database developers and database administrators.
    Oracle is mostly used in large businesses and government agencies, and DBAs pick
    up bad habits from those bureaucracies. There are often nonnegotiable requirements
    for Oracle database environments – the databases must always be secure, must always
    be available, and must never lose data. DBAs can be fired for allowing one of
    those requirements to slip, so there are times when a DBA must put their foot
    down and tell a developer they can’t have what they want.


    But administrators would be wise to remember that their databases are worthless
    if no one can use them. DBAs may protect the organization, but the people creating
    value for the organization are just as important.


    Developers: Don’t be afraid to ask the DBAs to explain their decisions. Keep in
    mind that DBAs understand Oracle’s architecture and administrative commands, but
    they often don’t know SQL or PL/SQL. There are different kinds of DBAs, and it’s
    important to know which kind you’re talking to. For example, an operations DBA
    won’t understand your application or even know what database you’re working on.
    But an applications DBA should know that information.


    DBAs: Don’t get mad when developers break things, especially in the lower environments.
    If developers don’t break things, for example, if they never generate `ORA-600`
    errors, then they’re not trying hard enough. Developers have to learn through
    mistakes more than DBAs, so don’t make things worse for them. And whenever you
    say “No” to a developer request, always add an explanation for why you can’t do
    something. Try to think of a workaround, especially for privilege issues. Between
    roles, object privileges, system privileges, proxy users, and definer’s rights
    procedures, there’s almost always a workaround. For example, if a developer asks
    for the ability to kill sessions on production, you probably can’t give them the
    `ALTER SYSTEM` privilege. But you can create a `SYS` procedure that kills sessions
    only for their user and then grant execute on that procedure to the developer.


    ### Transparency


    Transparency requires a willingness to make mistakes and be embarrassed. This
    is another area where the Oracle culture lags behind the rest of the software
    industry. Oracle Corporation has a history of secrecy, like hiding their bug tracker
    behind a paywall, forbidding benchmarks, and opposing open source. Don’t follow
    their example. Let people look into our systems. Share our code repository, project
    plans, bug tracker, and other documentation with everyone. Some people will use
    our mistakes against us, and some people will find embarrassing bugs. But bugs
    are easier to fix the sooner they’re found. According to Linus’s Law, “given enough
    eyeballs, all bugs are shallow.” If we shorten our feedback loops, we can fail
    fast and fix our mistakes as soon as possible.'
