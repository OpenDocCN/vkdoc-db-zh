- fmt: '## 1/((1-P)+P/N): Amdahl’s Law


    For optimal parallel processing in a data warehouse, we have to worry about all
    operations. It is not enough to only focus on the biggest tasks. If our database
    has `N` cores and we want to run large jobs `N` times faster, we need to parallelize
    everything.


    Amdahl’s law is the mathematical version of the preceding paragraph. Amdahl’s
    law is not a worst-case run-time complexity, but the function is important for
    understanding performance and is worth discussing here. The law can be expressed
    as the following equation in Figure [16-7](#471418_2_En_16_Chapter.xhtml#Fig7).


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig7_HTML.png)


    Total speedup equals 1 whole divided by 1 minus parallel portion in bracket plus
    parallel portion by parallel speedup.


    Figure 16-7


    Amdahl’s law as an equation


    We don’t need to remember the equation, and it’s only listed for completeness.
    But we do need to remember the lesson of Amdahl’s law, which can be learned from
    the graph in Figure [16-8](#471418_2_En_16_Chapter.xhtml#Fig8).


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig8_HTML.png)


    An increasing graph of speedup versus degree of parallelism represents a parallel
    portion in percentages of 50, 75, 90, and 95.


    Figure 16-8


    Amdahl’s law as a graph. Based on “Amdahl’s Law” by Daniels220, licensed under
    CC BY-SA


    Notice that the preceding graph uses a logarithmic X axis and the numbers on the
    Y axis are comparatively small. The implications of this graph are depressing;
    even the tiniest amount of serialization will dash our dreams of running `N` times
    faster.


    For example, let’s say we’ve got a large data load and we’ve parallelized 95%
    of the process. Our machine has 128 cores, and (miraculously) the parallel portion
    runs 128 times faster. Yet the overall process is only 17.4 times faster. If we
    foolishly throw hardware at the problem and increase the cores from 128 to 256,
    the process will only run 18.6 times faster. These are disappointing diminishing
    returns.


    Our time would be much better spent increasing the parallel portion from 95% to
    96%, which would increase the performance from 17.4 times faster to 21 times faster.
    These surprising performance gains are why we need to spend so much effort finding
    exactly where our processes spend their time. We all like to tune with our gut
    feelings, but our intuition can’t tell the difference between 95% and 96%. That
    level of precision requires advanced tools and a deep analysis of the process
    activity.


    For data warehouse operations, we cannot only worry about the longest-running
    tasks. It’s not enough to parallelize only the `INSERT` or `CREATE TABLE` statement.
    To get the maximum speedup, we need to put a lot of effort into all the other
    data loading operations. We need to pay attention to operations like rebuilding
    indexes, re-enabling constraints, gathering statistics, etc. Luckily, Oracle provides
    ways to run all of those operations in parallel. Previous chapters included examples
    of rebuilding indexes and re-enabling constraints in parallel, and Chapter [18](#471418_2_En_18_Chapter.xhtml)
    shows how to easily gather statistics in parallel.


    To fully optimize large data warehouse operations, it can help to create a graph
    of the system activity, with tools like Oracle Enterprise Manager or `DBMS_SQLTUNE.REPORT_SQL_MONITOR`.
    As discussed in Chapter [12](#471418_2_En_12_Chapter.xhtml), optimizing data warehouse
    operations requires worrying about even the tiniest amount of system inactivity.


    ## O(N): Full Table Scans, Other Operations


    `O(N)` is a simple, linear performance growth. We find this run-time complexity
    all over the place: full table scans, fast full index scans (reading all the index
    leaves instead of traversing the tree), SQL parsing, basic compression, writing
    or changing data, etc. There’s not much to see here, but things get interesting
    in the next section when we start comparing more functions.


    Most Oracle operations fall into the `O(N)` category. In practice, we spend most
    of our tuning time hoping for linear improvements. For example, direct-path writes
    can improve performance by reducing the amount of REDO and UNDO data. That’s only
    a linear improvement, but it’s a significant one.


    ### O(N\*LOG(N)): Full Table Scan vs. Index Access, Sorting, Joining, Global vs.
    Local Index, Gathering Statistics


    `O(N*LOG(N))` is the worst-case run time for realistic sorting algorithms. This
    run-time complexity shows up in many unexpected places, like constraint validation.
    Previous sections discussed data structures and algorithms that mostly focused
    on finding a single value, and now it’s time to start iterating those algorithms
    to find multiple values. For finding a single value, an `O(LOG(N))` index access
    is obviously faster than an `O(N)` full table scan, but what happens when we’re
    looking up more than a single row?


    Figure [16-9](#471418_2_En_16_Chapter.xhtml#Fig9) compares the functions discussed
    in this section: `N^2`, variations of `N*LOG(N)`, and `N`.


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig9_HTML.png)


    A graph for the number of steps versus input size represents N power 2, N times
    log N, 0.75 N times log N, 0.5 N times log N, and 0.25 N times log N.


    Figure 16-9


    Comparing `N^2`, `N*LOG(N)`, and `N`


    The preceding lines and curves can be used to understand full table scans vs.
    index access, sorting, joining, global vs. local indexes, gathering statistics,
    and many other operations.'
