  trans: "## 缓存\n\nOracle 提供了多种方式来利用高速内存结构缓存数据和结果。在购买单独的、昂贵的缓存解决方案之前，我们应确保已经充分利用了我们已付费的\
    \ Oracle 功能。前一节描述了高层内存系统。本节将介绍更细粒度的缓存选项。以下是 Oracle 中不同类型的缓存列表：\n\n1.  `缓冲区缓存 (SGA)`：最大且最重要的缓存。它存储表、索引和其他对象的数据块。缓冲区缓存不存储查询的实际结果，因为这些结果通常各不相同且会失效。通过存储数据块，SGA\
    \ 缓存的数据可以被许多不同的查询多次使用。数据基于最近最少使用算法被淘汰出缓存。我们可以使用缓冲区缓存命中率来计算缓存的有效性，该命中率告诉我们有多大比例的块是从内存而不是磁盘读取的。（但不要过分纠结于这个比率，因为有些操作永远无法在内存中完成。）\n\
    \n    ```\n    --Buffer cache hit ratio.\n    select 1 - (physical_reads / (consistent_gets\
    \ + db_block_gets)) ratio\n    from (select name, value from v$sysstat)\n    pivot\n\
    \    (\n    sum(value)\n    for (name) in\n    (\n    'physical reads cache' physical_reads,\n\
    \    'consistent gets from cache' consistent_gets,\n    'db block gets from cache'\
    \ db_block_gets\n    )\n    );\n    RATIO\n    -----------------\n    0.982515222127574\n\
    \    ```\n\n2.  `共享池 (SGA)`：包含已解析的 SQL 查询、存储过程、数据字典等的多个缓存。这个缓存很重要，但与缓冲区缓存不同，我们很少需要调整它。对共享池最常见的操作是用命令\
    \ `ALTER SYSTEM FLUSH SHARED_POOL` 来清空它，以强制 Oracle 重新生成执行计划。\n\n3.  `会话内存 (PGA)`：包含会话和程序数据，例如包变量。对于包变量，尤其是集合，我们可以在必要时构建自己的缓存。\n\
    \n4.  `客户端结果缓存`：缓存语句结果，而不仅仅是数据块。缓存的语句比处理缓存的块要快得多。另一方面，只有当完全相同的语句被多次执行，并且底层对象均未被修改时，缓存语句才有帮助。此功能需要配置服务器、客户端以及语句或表。\n\
    \n5.  `内存中选项 (SGA)`：一个需要额外付费的选项，用于以特殊的列式格式缓存数据。此选项可以显著提高某些类型分析查询的性能，但它需要额外的内存和配置。从\
    \ 19c 版本开始，此选项的前 16 GB 是免费的。\n\n6.  `SQL 结果缓存 (SGA)`：缓存特定 SQL 查询的结果。此缓存必须通过 `/*+\
    \ RESULT_CACHE */` 提示手动启用。\n\n7.  `PL/SQL 函数结果缓存 (SGA)`：缓存函数的结果。此缓存也必须手动启用，方法是在函数定义中添加关键字\
    \ `RESULT_CACHE`。\n\n8.  `标量子查询缓存 (PGA)`：标量子查询可能会被自动缓存，从而显著提高查询性能。例如，`SELECT (SELECT\
    \ COUNT(*) FROM LARGE_TABLE) FROM ANOTHER_LARGE_TABLE` 是一个编写不佳的查询，但它可能运行得比我们预期的快得多。\n\
    \n每当我们发现 Oracle 重复执行相同的、缓慢的任务时，都应该寻找一个缓存来减少运行时间。\n\n## 多租户\n\nOracle 的多租户架构允许我们在单个容器数据库中拥有多个可插拔数据库。多租户是另一个数据库管理主题，乍一看似乎与开发人员无关。但理解这个架构可以帮助我们利用强大的功能，或者至少避免常见的陷阱。\n\
    \n多租户架构可以高效地处理单台机器上的多个数据库实例。在共享数据库服务器上的传统架构中，每个数据库实例都需要大量的管理时间和硬件资源，这就是 DBA 不愿为开发人员创建许多实例的原因。多租户选项通过使得执行诸如创建、删除、克隆或重定位数据库等任务变得容易，从而改变了这一状况。多租户可能为我们提供使用共享服务器但仍为每位开发人员提供多个实例的机会。\n\
    \n不幸的是，除非我们购买多租户选项，否则每个容器中可插拔数据库的数量限制为三个。这个数量足以让我们试用新功能，但不足以从根本上改变我们的开发流程。许可授权可能是大多数组织甚至尚未安装多租户架构的主要原因。但是，由于从\
    \ 21c 版本开始，多租户架构是强制性的，我们最终还是需要学习它。\n\n对于开发人员来说，多租户系统最大的问题出现在最开始，当我们尝试连接到数据库时。开发人员几乎总是应该连接到可插拔数据库，而不是容器数据库。不幸的是，很容易错误地连接到\
    \ CDB，因为大多数 Oracle 文档是为需要连接到 CDB 的 DBA 编写的。而如果我们使用多租户架构，默认的数据库名称“ORCL”现在指的是 CDB\
    \ 而不是 PDB。\n\n开发人员应该拥有直接连接到 PDB 的连接字符串。我们不希望先连接到 CDB，然后再运行像 `ALTER SESSION SET\
    \ CONTAINER = ORCLPDB` 这样的命令。当我们只关心其中一个数据库时，却需要在两个数据库之间不断切换，这会导致混淆和错误。\n\n如果我们不小心在\
    \ CDB 而不是 PDB 上运行了用户创建脚本，可能会遇到错误“ORA-65096: invalid common user or role name in\
    \ oracle。”这个错误信息可能有误导性，因为 Oracle 确实允许我们创建公共用户——即存在于所有 PDB 上的用户。但这是一个罕见的功能，并且有一些奇怪的要求，比如在用户名前加上\
    \ `C##`。许多开发人员通过设置未文档化的参数 `_ORACLE_SCRIPT` 来愚蠢地避免该错误。这种变通方法允许脚本运行，但它以错误的方式创建了用户，以后会导致奇怪的问题。真正的解决方案是在\
    \ PDB 而不是 CDB 中安装应用程序。\n\n如果我们正在安装个人数据库，或者在没有购买多租户选项的情况下安装共享数据库，我们可能希望选择传统架构而非多租户架构。"
- fmt: '## Database Types


    There are many different types of Oracle databases. The vast majority of features
    discussed in this book apply to any type of Oracle database. And this book is
    not an administration guide that explains how to install and manage Oracle. But
    SQL developers occasionally need to be aware of their underlying database type.
    The following are different ways to categorize Oracle databases and how they impact
    SQL developers. These items aren’t simply different features. These are large
    architectural changes that may affect the way we use our databases:


    1.  **Edition**: A choice between Enterprise Edition, Standard Edition 2, Express
    Edition, and Personal Edition. The features, and price, are wildly different between
    the editions. Virtually every source of Oracle information assumes you are using
    Enterprise Edition, so if you’re using a different edition, you should investigate
    what features you’re missing. (Some cloud platforms, like Amazon RDS, add so many
    restrictions that they practically create their own custom edition.)

    2.  **Version**: For SQL development, we only care about the first two numbers.
    For example, developers don’t need to worry much about the feature differences
    between 12.2.0.1 and 12.2.0.2 (although DBAs have to worry about such differences,
    since the latter version is a terminal release and is supported much longer).
    But developers do need to worry about the feature differences between versions
    like 12.1 and 12.2. And developers certainly need to worry about the first number,
    and they need to know the difference between long-term releases and innovation
    releases. For example, 19c is a long-term release, which means it will be thoroughly
    tested and supported. If you’re not on version 19c yet, it’s a safe bet that you
    will be some day. On the other hand, 21c is an innovation release, which means
    it is only supported for a short amount of time. Innovation releases are good
    for testing bleeding-edge features, but the chance of your organization using
    an innovation release in production is very small.

    3.  **Platform**: Oracle has excellent cross-platform support. It is extremely
    rare to have to worry about the operating system when writing SQL.

    4.  **Real Application Clusters (RAC)**: RAC is a shared-everything solution,
    where every node contains the same information. The shared-everything architecture
    makes it easier for developers, because we don’t care which node we connect to.
    But we still need to know if we are using a RAC system. At the very least, RAC
    affects the way we connect to the database. For example, we may want to use a
    service name for load balancing and high availability, but we want to directly
    connect to a specific node when debugging. (Debugging creates a background session,
    and debugging won’t work unless both sessions connect to the same node.) We also
    need to know if we’re on RAC so we can appropriately query the data dictionary.
    For example, we need to use `GV$` instead of `V$` on RAC. RAC also significantly
    affects parallelism, and we may need to adjust our parallel strategies accordingly.

    5.  **Autonomous**: Oracle is increasingly adding automated processes to their
    cloud and on-premise software. Most of the features are meant for DBAs: automated
    scaling, backup, patching, and temporary and undo tablespace shrink. But there
    are also automated processes that can affect developers: automated indexing, SQL
    plan management, materialized views, and zone maps. Some of the autonomous database
    settings, such as the parameter `OPTIMIZER_IGNORE_HINTS` being set `TRUE` by default,
    can cause unexpected performance problems.

    6.  **Engineered systems**: By controlling the entire hardware and software stack,
    Oracle’s engineered systems are able to offer unique features and optimizations.
    For example, Exadata machines have execution plan operations not available on
    other systems.

    7.  **Packs and options**: Although Oracle does not physically block us from using
    all database features, there are advanced features that require buying an extra
    license. We should ask around and see if our databases are licensed to use common
    management packs and options such as advanced compression, data masking, database
    in-memory, diagnostics, multitenant, partitioning, and tuning.

    8.  **ASM**: ASM is useful for management but doesn’t affect our code much. As
    previously described in this chapter, there are only a few SQL command differences
    that depend on our ASM choice.

    9.  **Sharding**: Oracle sharding breaks away from the shared-everything architecture
    of RAC. Now our systems can store different data on different databases. Unlike
    with RAC, sharding may have a huge impact on our SQL code.


    Not all of the items in the preceding list must match between all of our environments.
    It doesn’t matter if our sandbox database matches production for the platform,
    RAC, autonomous, or ASM. The vast majority of our database code will stay the
    same regardless of those four items. The minor differences between the choices
    for those four items can be abstracted relatively easily. And many of the differences
    simply don’t matter. For example, we may want 99.999% uptime for our production
    databases, but it doesn’t matter if our personal sandbox uptime is much worse.


    But it is important to use the same edition, version, and sharding options. These
    three choices may fundamentally alter our code. For example, some organizations
    use Enterprise Edition in production and Express Edition for development. Mixing
    those editions is a huge mistake. SQL developers will never be able to take full
    advantage of Enterprise Edition features if those features are not easily available
    for testing.


    When it’s time to choose our options for new systems, we don’t want to overengineer
    it, and we don’t want to let Oracle Corporation upsell us. Oracle’s core database
    technology is great, but a lot of their extra options are only good on the surface.
    When we choose technology stacks, we must remember that the money we spend on
    extra licenses may compete with our salaries. I’ve been in situations where the
    original architects always selected the high-priced options and inevitably our
    business or customers got sick of the exorbitant costs and decided to migrate
    away from all Oracle products. Don’t set yourself up for a similar failure.


    ## Summary


    This chapter contains advice about times when SQL developers need to step up and
    perform administrative work, even if that work is not in our job descriptions.
    There is always overlap between developers and administrators, especially with
    the DevOps movement. Instead of thinking of ourselves as just a developer, we
    need to care about the end results, regardless of whose job it is.


    Understanding Oracle’s architecture can help us improve our programs, work better
    with other teams, and future-proof our code. Hopefully we can use our knowledge
    of Oracle’s architecture to identify and prevent bottlenecks before they happen.


