  trans: '

    ### 全表扫描与索引访问


    索引在查找表中单行数据时非常出色——其 `O(LOG(N))` 的读取时间几乎无出其右。但除了主键或唯一键索引外，大多数索引访问都会检索多行数据。为了检索多行，Oracle
    必须多次重复 `LOG(N)` 操作。


    如果使用索引扫描来查找表中的每一行，Oracle 就必须遍历树 `N` 次，从而导致 `N*LOG(N)` 的运行时间。这个运行时间显然比逐行读取整个表要差得多。如果你查看图
    16-9，比较 `N*LOG(N)` 较慢的实线与 `N` 较快的虚线，性能差异就显而易见了。很多时候，全表扫描比索引访问更快。


    当 Oracle 读取的行比例不是 1% 或 100% 时，性能差异就更复杂了。注意图 16-9 中的虚线；它们表示对表中 25%、50% 或 75% 的行重复进行
    `LOG(N)` 访问。随着表的大小增长，每条曲线最终都会超过 `N` 的线性直线。我们不能简单地说一种算法比另一种更快。最快的算法取决于表的大小和访问的行比例。今天对于读取
    25% 的表来说，索引可能是个好主意，但如果明天表增长了，可能就不是了。


    还有其他因素可以显著改变这种平衡。Oracle 可以对全表扫描使用多块读取，而对索引访问则使用单块读取。使用多块读取，Oracle 可以在读取索引中一个块的相同时间内，从表中读取多个块。而且，如果索引聚簇因子很高（即索引不是按搜索值排序的），那么对少量行的索引查找最终可能还是需要读取表的所有块。


    理论告诉我们线条的*形状*，但只有实践才能告诉我们实际的值。我无法为你的系统、表和工作负载给出一个确切的数字。但*确实*存在这样一个数字——一个全表扫描变得比索引访问更便宜（在性能上）的点。找到这个数字并非易事，而且
    Oracle 并不总是做出正确决定，这也并不令人惊讶。


    当 Oracle 未能做出正确选择时，我们不应该通过使用索引提示来完全抛弃整个决策过程。相反，我们应该寻找提供更准确信息的方法，以帮助 Oracle 做出更好的选择。帮助
    Oracle 通常是通过收集优化器统计信息来完成的。


    ### 排序


    `O(N*LOG(N))` 是流行排序算法在最坏情况下的运行时间。我们总是希望我们的过程是线性扩展的，但这通常并非如此。在实践中，我们必须处理那些比我们预期恶化得更快的算法。排序是任何数据库的核心部分，影响到
    `ORDER BY`、分析函数、连接、分组、查找唯一值、集合操作等。我们需要学习如何处理这些慢算法，并在可能时避免它们。


    对于规划，我们需要意识到性能将如何随时间变化。如果今天排序一百万行需要 1 秒，我们不能假设明天排序两百万行就需要 2 秒。


    我们还需要意识到排序的空间需求将如何随输入大小而变化。幸运的是，所需空间量是线性增长的。如果行数翻倍，排序所需的 PGA 内存或临时表空间量也会翻倍。


    有些时候，排序工作已经为我们完成了。B 树索引已经被排序——工作是在原始的 `INSERT` 或 `UPDATE` 期间完成的。向表中添加一行是 `O(1)`——该过程只需要在无序堆（dumb
    heap）的末尾添加一行。向索引中添加一行是 `O(LOG(N))`——该过程需要遍历树以找到添加或更新值的位置。


    Oracle 可以使用索引全扫描来按顺序读取索引，而无需进行任何排序。工作已经完成；Oracle 只需要从左到右或从右到左读取索引。


    Oracle 也可以使用最小/最大值读取来快速找到最小值或最大值。B 树中的最小值或最大值要么在最左边，要么在最右边。数据已经排序，所以找到顶部或底部的结果是一个简单的
    `O(LOG(N))` 操作。


    奇怪的是，Oracle 缺少一个功能，无法通过简单的最小/最大值读取同时找到*最小值和*最大值^(³⁵)。但下面的代码展示了这个问题的一个简单解决方法：将问题分成两个独立的查询，然后合并结果。多写一个子查询有点烦人，但这是为运行时复杂度带来巨大改进所付出的很小代价——`O(2*LOG(N))`
    远比 `O(N)` 要好。当我们理解了 Oracle 使用的算法和数据结构时，我们就知道该期待什么以及何时该寻找更快的变通方法：


    ```

    --创建一个表并查询最小值和最大值。

    create table min_max(a number primary key);

    --全表扫描或索引快速全扫描 - O(N)。

    select min(a), max(a) from min_max;

    --两次最小/最大值索引访问 - O(2*LOG(N))。

    select

    (select min(a) from min_max) min,

    (select max(a) from min_max) max

    from dual;

    ```


    集合操作 `INTERSECT`、`MINUS/EXCEPT` 和 `UNION` 需要排序。我们应该尽可能使用 `UNION ALL`，因为它是唯一一个不需要对结果进行排序的集合操作。


    排序和连接似乎总是一起出现，但在实践中它们是一个糟糕的组合。下一节将讨论为什么我们不希望在连接时使用排序。

    '
- fmt: '### Joining


    Hopefully you remember the Venn diagrams and join diagrams from Chapter [1](#471418_2_En_1_Chapter.xhtml),
    which explained how joins logically work. Unfortunately, understanding how joins
    physically work is more complicated. Figure [16-10](#471418_2_En_16_Chapter.xhtml#Fig10)
    visualizes the main join algorithms and their run-time complexity. The diagram
    visualizes joins as the process of matching rows between two unordered lists.
    Each join algorithm is also described in a separate paragraph after the diagram.
    You may need to flip back and forth a few times to understand the algorithms.


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig10_HTML.png)


    The illustrations of join algorithms and time complexity for nested loops of full
    table scans and index access, sort merge of full table scans, hash.


    Figure 16-10


    Visualization of join algorithms and time complexity


    A nested loop with full table scans (`N^2`) is conceptually simple. Start with
    the first table and compare each row in that table with every row in the second
    table. We can think of this algorithm as two nested `FOR` loops. Each of the loops
    runs `N` time, so the run-time complexity is a horribly slow `O(N^2)`. Recall
    from Figure [16-9](#471418_2_En_16_Chapter.xhtml#Fig9) that the line for `N^2`
    looks almost completely vertical. This join algorithm should only be used when
    the tables are trivially small, the optimizer statistics are bad, or important
    indexes are missing.


    A nested loop with index access (`N*LOG(N)`) is often a faster choice for joins.
    Instead of searching an entire table for each row, we can search an index. Reducing
    `O(N^2)` to `O(N*LOG(N))` is a huge improvement.


    But to get the most out of this algorithm, it helps to be more specific with our
    variables. Instead of using `N` to mean the number of rows in either table, let’s
    say the first table that we read every row has `A` rows and the second table that
    we read using an index has `B` rows. If we think about `O(A*LOG(B))`, the number
    of steps mostly depends on `A` instead of `B`. The smaller table should be first,
    and the larger table should be second. For example, if one table has a hundred
    rows and another table has a million rows, `100 * LOG(1,000,000) = 600` is much
    smaller than `1,000,000 * LOG(100) = 2,000,000`. It’s not enough that Oracle chooses
    the right algorithm – it must also know how to use the tables in the algorithm.


    If both tables are large, this join algorithm is not efficient. Nested loops work
    best when the number of rows is small for one of the tables and there is an index
    access for the other table.


    A sort-merge join with full table scans (`2*N*LOG(N)+N`) operates by first sorting
    both tables, which is expensive, and then matching the sorted rows, which is cheap.
    In practice we don’t see sort-merge joins very often – nested loops with index
    access are a better choice for small joins, and hash join is a better choice for
    large joins. But if there are no relevant indexes (ruling out nested loops) and
    there is no equality condition (ruling out a hash join), then sort-merge is the
    best remaining option. And if one of the tables is already presorted by an index,
    then half of the sorting work is already done.


    A hash join (`2*N`) has two phases. The smaller table is read and built into a
    hash table, ideally in memory. Then the larger table is scanned, and the hash
    table is probed for each row in the larger table. With a perfect hash, writing
    and reading from a hash table only takes one step, and the run time is only `O(2*N)`.
    But in practice there will be collisions, and multiple rows will be stored in
    the same hash bucket, so the time to perform hash joins does not grow linearly;
    hash joins are somewhere between `O(2*N)` and `O(N*LOG(N))`.^([^(36)](#fn36))


    Hash joins have a great run-time complexity, but that doesn’t mean we always want
    to use them. Hash joins read all of the rows of both tables, even if we are only
    going to match a few rows. Hash joins require a lot of memory or temporary tablespace
    – roughly equal to the size of the smaller input table. A slow algorithm in memory
    might be better than a fast algorithm on disk. And hash joins are not always available,
    because they only work with equality conditions.


    There are many variations of the preceding join algorithms. Cross joins, also
    known as Cartesian products, are similar to nested loops with full table scans.
    Parallelism and partitioning can always complicate the algorithms. Hash joins
    can use bloom filters to eliminate values without fully comparing all of them.
    Joining is the most important operation in the database, and there’s not enough
    space here to describe all of the features for joining tables.


    Join performance is all about Oracle correctly estimating the size of tables.
    The table size determines which algorithms are used and how the tables are used
    in the algorithms. For example, hashing and sorting are bad ideas if one of the
    tables returns no rows – there’s no need for all that prep work when the intermediate
    data structures won’t be used. And a nested loop is a horrible idea for two huge
    tables that have a lot of matching rows. Bad execution plans happen when Oracle
    thinks a small table is large or a large table is small. How that mistake happens,
    and how to fix it, is discussed in Chapters [17](#471418_2_En_17_Chapter.xhtml)
    and [18](#471418_2_En_18_Chapter.xhtml).


    ### Global vs. Local Index


    The advantages and disadvantages of partitioning are different for tables and
    indexes. Partitioning a table is often a good choice, since there are many potential
    performance improvements and few costs. Indexes can be either global, one index
    for the whole table, or local, one index per partition. Compared with table partitioning,
    index partitioning benefits are smaller, and the costs are greater.


    Reading from a single table partition, instead of a full table scan, significantly
    decreases the run-time complexity from `O(N)` to `O(N/P)`, where `P` is the number
    of partitions. But reading from a local index, instead of a global index, only
    changes the run-time complexity from `O(LOG(N))` to `O(LOG(N/P))`. That index
    access improvement is barely noticeable.


    The cost of reading an entire partitioned table, without partition pruning, is
    still a normal `O(N)`. But reading from a local index without partition pruning
    is much more expensive than a global index read. Reading from one large index
    is `O(LOG(N))`. Reading from many small indexes is `O(P*LOG(N/P))`, a significant
    increase. Walking one big tree is much faster than walking many small trees. We
    need to think carefully when we partition, and we should not expect table and
    index partitioning to work the same way.'
  raw: '### Joining


    Hopefully you remember the Venn diagrams and join diagrams from Chapter [1](#471418_2_En_1_Chapter.xhtml),
    which explained how joins logically work. Unfortunately, understanding how joins
    physically work is more complicated. Figure [16-10](#471418_2_En_16_Chapter.xhtml#Fig10)
    visualizes the main join algorithms and their run-time complexity. The diagram
    visualizes joins as the process of matching rows between two unordered lists.
    Each join algorithm is also described in a separate paragraph after the diagram.
    You may need to flip back and forth a few times to understand the algorithms.


    ![](images/471418_2_En_16_Chapter/471418_2_En_16_Fig10_HTML.png)


    The illustrations of join algorithms and time complexity for nested loops of full
    table scans and index access, sort merge of full table scans, hash.


    Figure 16-10


    Visualization of join algorithms and time complexity


    A **nested loop with full table scans (N^2)** is conceptually simple. Start with
    the first table and compare each row in that table with every row in the second
