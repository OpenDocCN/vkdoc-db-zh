  trans: '

    ### 注释机制


    在 SQL 和 PL/SQL 中有两类注释。单行注释以 `--` 开头。多行注释以 `/*` 开头，以 `*/` 结尾。SQL*Plus 也允许以 `REM`
    或 `REMARK` 开头的单行注释。但是，当存在适用于所有 SQL 客户端的替代方案时，我们应忽略 SQL*Plus 特有的功能。还有 `COMMENT`
    对象，我们可以将其附加到表和列上。这些 `COMMENT` 对象可能很有用，特别是当集成开发环境（IDE）自动读取注释并将其显示在结果网格中时。


    注释也被用作提示，如果注释以 `--+` 或 `/*+` 开头。优化器提示总是可疑的，因此当我们创建提示时，也应包含文本注释。提示是从左到右读取的，并且不会抛出语法错误，因此如果我们将文本注释放在真正提示的*后面*，一切都会正常工作：


    ```

    --提示和注释示例。

    select /*+ cardinality(launch, 9999999) - 我知道这是个坏主意但是...

    ```


    有些人说注释是一种道歉。即使这种说法是真的，当我们在编程时，我们有很多需要道歉的地方。例如，前面代码中的提示通常被认为是一个“坏”提示。我们在欺骗优化器，告诉优化器假装该表比其实际大小大得多。有更好的方法来调整
    SQL 语句，但我们可能受到限制而无法使用最佳方法。万一这些限制将来发生变化，解释我们现在为何要做“坏事”会有所帮助。让开发人员通过我们的注释发现错误或错误的假设，总比让别人在生产环境中发现问题要好。


    关于 Oracle 注释，有一些限制我们需要警惕。注释不能出现在语句终止符之后。例如，以下代码在 SQL*Plus 或其他上下文中无法正常工作：


    ```

    SQL> --不要在行终止符后使用注释。

    SQL> select * from dual; --这行不通。

    ```


    多行注释应在开头的 `/*` 后包含一个空格，否则在某些 SQL*Plus 客户端上可能会出现问题。以下的 SQL*Plus 会话看起来令人困惑，因为 SQL*Plus
    很容易混淆。SQL*Plus 没有完整的解析器，它可能会错误地解释没有空格的多行注释，将其视为请求再次执行 `SELECT` 语句的前斜杠。我们可以通过使用
    `/* a */` 而不是 `/*a*/` 来避免以下问题。（以下问题在最新版本的 SQL*Plus 中不会发生。但关于在第一个斜杠星号后添加空格的规则仍在手册中。）


    ```

    SQL> --坏注释示例。

    SQL> select 1 from dual;


    SQL> /*a*/

    ```


    多行注释在我们调试或测试并希望快速移除大量代码时非常有用。但对于永久性代码，坚持使用单行注释更有帮助，因为多行注释不能相互嵌套。一旦我们在永久性代码中开始使用多行注释，我们就无法快速注释掉大块代码。


    ### 注释 ASCII 艺术


    我们可以用 ASCII 艺术充分利用我们的纯文本注释。我们不希望我们的注释看起来像古怪的论坛签名，但有些时候使用比纯文本更花哨的东西会带来好处。如果有些关键变量我们不希望开发者随意修改，一个超大的“STOP”或“DANGER”会有所帮助。我们不必手绘自己的
    ASCII 文本；网上有很多 ASCII 文本生成器。


    要解释复杂的流程，创建小型流程图会很有帮助。网上也有几种现成的 ASCII 图表工具。


    我们应该将绝大部分精力集中在编写纯文本上。但我们必须认识到，程序员会快速浏览程序而不会留意我们严厉的警告。我们可以用像下面这样的 ASCII 艺术注释来吸引他们的眼球：


    ```

    /***********************************************************

    *

    *  _______        _       +----------------+

    * |__   __|      | |      |不一定是+-----+

    *    | | _____  _| |_     +----------------+       |

    *    | |/ _ \ \/ / __|                  |

    *    | |  __/>  <| |_     +------+              |

    *    |_|\___/_/\_\\__|    |无聊的+<----------------+

    *                         +------+

    *

    ***********************************************************/

    ```


    SQL 是一门真正的编程语言，值得拥有有用的注释。永远记住，我们代码的受众不是计算机——受众是其他人。


    ## 选择好名称


    为我们的数据库、模式、模式对象、函数、过程、变量、别名、内联视图以及所有其他编程对象选择好名称非常重要。选择好名称不仅仅是为了创建美观的代码。我们需要创建逻辑清晰、易于记忆的模块，以帮助充分利用人们的短期记忆。当我们编写源代码时，与普通写作相比，我们处于明显的劣势。选择名称是我们为数不多能够控制的事情之一，因此我们应该花费额外的精力来挑选正确的名称。


    ### 命名风格


    随着经验的积累，我们会建立自己个人的风格和命名规则集。具体的规则并不那么重要，只要我们努力实现一致性、简单性和灵活性即可。一条常见的规则是为包和表等事物使用名词，为过程和函数使用动词。另一个例子是表名使用单数名词，而不是复数。避免使用像“A”和“B”这样的单字母变量名。另一方面，“i”和“j”是循环变量的常见名称。避免使用缩写，除非缩写在我们的领域中是标准的。避免使用列在
    `V$RESERVED_WORDS` 中的名称；这些名称可能并非在所有上下文中都有效，未来版本中可能无效，并且可能会混淆语法高亮器和其他编程工具。无论我们做什么，都应该花费超过最低限度的时间来为所有事物赋予恰当的名称。


    另一方面，我们不希望在团队会议中讨论每个名称，创建一个已批准表名的电子表格，或建立一个正式的流程来验证所有新列名。这三个例子并非 straw man（稻草人谬误）——我确实曾经不得不忍受这三种情况。除了是官僚主义的噩梦外，创建过多的流程会导致更糟的表和列名。在之前的一份工作中，我们并不总是有时间走完批准新列名的流程，因此我们会妥协于最不坏的现有名称。我们应该努力追求好名称，但必须务实。


    在名称中包含值会有所帮助。例如，如果我们使用分析函数来查找某物每年的首次出现，我们可以将列命名为 `FIRST_WHEN_1`。当我们想将结果限制为首次出现时，谓词就变得显而易见：`FIRST_WHEN_1
    = 1`。我们可以对小的值列表做同样的事情，以明确哪些值可以包含在表达式中。我们的名称可以变成微小的契约，保证我们正确使用了这些值。

    '
- fmt: '## Avoid Quoted Identifiers


    We should avoid case-sensitive names with double quotes. Oracle identifiers normally
    only allow alphanumeric characters, underscores, dollar signs, and pound signs.
    It might feel liberating to get around those limitations using quoted identifiers,
    but it is a pain to reference those quoted identifiers in SQL. Case-sensitive
    names break many of our data dictionary queries and DDL generation programs. Some
    database objects, like database links, don’t even support case-sensitive names.
    And our SQL looks ugly when every name is surrounded by double quotes.


    In theory, quoted identifiers can save us a step. When we’re writing SQL for a
    specific purpose, such as a single report, we can use quoted identifiers to give
    columns the precise name we want to see on the report.


    In practice, those queries we use “just once,” for a single report, will eventually
    be used for something else. Case-sensitive column names are like a virus that
    will infect all our code. We should avoid case-sensitive names, such as in the
    following SQL statement:


    ```

    --Avoid case sensitive column names.

    select *

    from

    (

    select 1 "Good luck using this name!"

    from dual

    )

    where "Good luck using this name!" = 1;

    ```


    ## Name Length and Changes


    Although all modern versions of Oracle allow names to use 128 characters, we need
    to be aware that previous versions were limited to 30 characters. If our programs
    were written for an older version, there’s a good chance there are columns or
    variables set to `VARCHAR2(30)` that should be upgraded to `VARCHAR2(128)`.


    Programs change over time, and it’s important that we refactor our code and keep
    the names up to date. Most IDEs have a simple refactor option, where we can right-click
    variable names and change them in many places at once. If we set up a fully automated
    build and test process, as described in Chapters 2 and 3, we shouldn’t be scared
    of changing names. Changing schema object names is simple, as shown in the following
    code:


    ```

    --Change table and column names.

    create table bad_table_name(bad_column_name number);

    alter table bad_table_name

    rename column bad_column_name to good_column_name;

    rename bad_table_name to good_table_name;

    ```


    If you’re still not convinced of the importance of good names, a few humbling
    code reviews can be convincing. The best cure for the curse of knowledge is to
    watch someone else look at our code and wonder out loud, “What does this mean?”


    ## Whitespace


    Whitespace is one of the limited number of tools available to help us write better
    code. Without as many formatting options as writing a document or email, we must
    rely on whitespace to separate items and shift the reader’s gaze to what’s important.


    Consider the way we use whitespace when writing. Whether we’re writing in a programming
    language or in a natural language, there is a hierarchy of elements. For example,
    this book starts with characters, which aggregate into words, sentences, paragraphs,
    pages, chapters, parts, and finally the entire book. Each one of these elements
    has an increasingly large amount of whitespace to separate them. We all intuitively
    know that rule and follow it. But it’s worth explicitly stating that rule, because
    we sometimes forget to apply it to our programs.


    In PL/SQL, the hierarchy is character, word, statement, and nested block. In SQL,
    the hierarchy is character, word, expression or condition, clause, and nested
    query. Most programmers and code formatters make a mistake at the top of the SQL
    hierarchy. Every query, including every correlated subquery and inline view, is
    important and deserves extra space. As discussed in Chapter 6, inline views are
    the key to writing good SQL. Inline views deserve lots of space, like in the following
    code:


    ```

    --Give inline views lots of space.

    select * from

    (

    --Good comment here.

    select * from dual

    ) good_name;

    --Don''t cram everything together.

    select * from (select * from dual);

    ```


    The parentheses in the preceding example are like a `BEGIN` and `END` in PL/SQL.
    Parentheses deserve their own line when they are used to separate inline views.
    And, of course, everything inside the parentheses must be indented an additional
    level. The indenting is critical to understanding the nested structure of our
    code. Giving lots of space to inline views also makes them easier to highlight
    and run, which we will do often for debugging.


    Even if our inline views are small, they are still a high-level SQL concept and
    deserve extra whitespace. Unless the inline views are trivial, we should clearly
    separate them from other parts of the query. Both queries in the preceding example
    might look fine, at first. But this tiny example is misleading, because the second,
    more compressed format does not scale well. For comparison, we would almost never
    put a procedure all on one line, like in the following example:


    ```

    --Typical way to format a procedure.

    create or replace procedure proc1 is

    begin

    null;

    end;

    /

    --Weird way to format a procedure.

    create or replace procedure proc1 is begin null; end;

    /

    ```


    Whitespace is not just important within a query; whitespace is also important
    between queries, like in our SQL worksheets. The examples in this book and in
    the GitHub repository follow this whitespace advice. Each chapter has its own
    file; each heading is separated by three blank lines and a comment; each group
    of commands in an example is separated by two blank lines; each command is separated
    by one blank line. Worksheets are an important part of SQL development, and we
    must all develop a style to help us quickly navigate worksheets.


    The exact number of lines and spaces doesn’t matter. What’s important is that
    we have a consistent and easy-to-use system and that we use increasingly larger
    amounts of whitespace for larger units of work. Even though our IDE provides a
    navigation pane, we still need to make our worksheets, programs, and queries readable.


    ## Make Bugs Obvious


    We can’t make bug-free programs. But we can write our programs in a way to make
    bugs easier to find and fix. Code is inevitably cryptic, but we should try to
    make it as transparent as possible. Our goal is to make our code as clear and
    simple as the truth, even if the truth is embarrassing. This section includes
    generic programming advice and how to apply that advice in a SQL or PL/SQL context.


    ### Fail Fast


    Failing fast is the most important technology concept in recent history. It is
    laughable that we ever believed we could build something right on the first try.
    We need to tolerate and even encourage failures, to more rapidly create something
    that works.


    The most important parts of failing fast are software engineering ideas like automated
    testing, agile, building a minimum viable product, transparency, etc. Some of
    these ideas are discussed in earlier chapters, but most of those large topics
    are not in the scope of this book. The idea of failing fast, and being honest
    about our mistakes and limitations, can percolate down to many of our small day-to-day
    programming decisions. The next sections discuss specific ways to fail fast in
    SQL and PL/SQL.'
