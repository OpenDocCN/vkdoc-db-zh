    421 will likely be stored separately. Reverse key indexes solve contention problems,
    but writing every value to an almost random location causes other performance
    issues. In practice, reverse key indexes rarely solve a performance problem.


    Scalable sequences solve the contention problem a better way, by prefixing the
    instance and session id to the sequence number. Each session will tend to write
    index values to the same blocks, minimizing the number of blocks that are accessed.
    And since a session cannot have contention with itself, and each session has a
    significantly different value, there is no inter-session contention either. The
    only downside is the ridiculously large sequence value, which isn''t really much
    of a problem, but the values look suspicious at first:


    ```

    --Create a scalable sequence and show the first value.

    create sequence scalable_sequence_test scale;

    select to_char(scalable_sequence_test.nextval) nextval from dual;

    NEXTVAL


    ```


    ## Synonyms


    Synonyms are useful for creating aliases for schema objects. A layer of synonyms
    can hide ugly environmental differences that we don’t want users or developers
    to worry about.


    For example, the data set in this book can be installed on any schema. The data
    set installation instructions include steps for creating a user named SPACE. Imagine
    we’re building an application on top of our data set, but the name SPACE is already
    taken on one database. The schema name will be different across environments.
    Our application could hide that difference with a synonym:


    ```

    --Create synonym example.

    create synonym launch for space.launch;

    ```


    Another use for synonyms is to minimize downtime during large data loads. We can
    have two tables, or two materialized views, with a synonym pointing to one of
    them. When new data arrives, we load the data into the unused table. When the
    loading is complete, we `CREATE OR REPLACE SYNONYM` to switch the synonym to point
    to the new data. That approach is not as robust as online table redefinition,
    but it’s simpler.


    Similar to views, we should minimize our layers of indirection and avoid creating
    synonyms that refer to synonyms. We should also avoid creating `PUBLIC` synonyms.
    Public synonyms don’t grant access to all users, but public synonyms do pollute
    the namespace.


    ## Materialized Views


    A materialized view stores the results of a query. Materialized views are mainly
    intended to improve the performance of data warehouses but can also enforce multi-table
    constraints. This section only briefly discusses materialized view topics; for
    more detailed information, there are several hundred pages about materialized
    views in the *Data Warehousing Guide*.


    Materialized views share all the properties of tables, along with a query and
    directions for how to rebuild the materialized view. Materialized views can have
    indexes and can be built off of other materialized views. Refreshing materialized
    views can be done on demand, as part of a schedule, or automatically after a relevant
    statement or commit. The refresh can either be `COMPLETE`, where the entire table
    is rebuilt, or `FAST`, where only the necessary parts of the table are rebuilt.
    The package `DBMS_MVIEW` can help with refreshing a set of materialized views.
    The `DBMS_MVIEW.REFRESH` procedure has many options for refreshing, such as degree
    of parallelism, atomic (refresh all materialized views in one transaction), out
    of place (build a separate table and then swap out the old data), etc.


    Materialized views are complex and should only be used after we have exhausted
    all other query tuning options. Materialized views can solve difficult performance
    problems, but at the cost of extra complexity, extra space, and extra time spent
    refreshing.'
  trans: '## 序列


    序列用于生成唯一数字，通常作为代理主键。序列是另一种创建简单但具有一些意外行为的对象。


    序列的一个常见需求是生成无间隙的序列。无间隙序列是不可能的，因此无需尝试。序列是为可扩展性而构建的，而创建一个无间隙的数字序列将需要序列化事务。如果用户 Alice
    作为事务的一部分递增了一个序列，然后 Bob 为另一个事务递增了同一个序列，如果 Alice 执行回滚会发生什么？有两种处理方式：要么放弃 Alice 的序列号并产生间隙，要么
    Bob 的事务必须等到 Alice 完成后才能开始。Oracle 选择了第一种方案，使得序列能够适应大型多用户环境。如果我们确实需要一个无间隙序列（很可能我们并不需要——我们只是认为消除间隙看起来更美观），我们将需要创建自己的自定义序列化过程，确保一次只有一个用户获得一个数字。


    我们应避免删除和重新创建序列，除了在初始构建脚本中。对于基本的序列维护，我们应尽可能使用 `ALTER SEQUENCE` 命令。重新创建序列并非易事，主要是因为序列可能已授予角色和用户。


    最常见的序列维护是将序列重置为一个新值。应用程序或即席 SQL 语句可能忘记使用序列来插入值，这意味着序列最终可能生成相同的值并导致唯一约束冲突。自 12.1
    版本起，重置序列最简单的方法是使用此命令：


    ```

    --创建并修改序列。

    create sequence some_sequence;

    alter sequence some_sequence restart start with 1;

    ```


    在 11g 中重置序列更麻烦：将序列增量改为一个很大的值，调用该序列，然后将增量改回 1。或者我们可以简单地重复调用 `SOME_SEQUENCE.NEXTVAL`。


    多次调用序列比修改序列慢得多，但优点是避免了任何 DDL 命令。在生产环境中，当我们可能需要填写大量文书工作才能执行“变更”时，这种方法可能很有用，而简单地从序列中选择并不算作变更。


    序列不一定从 1 开始并以 1 递增；序列还有其他几个选项。序列可以 `START WITH` 任何数字，也可以 `INCREMENT BY` 任何数字，甚至可以是负数以使序列递减。序列可以在达到
    `MAXVALUE` 后 `CYCLE` 回到 `MINVALUE`。


    序列的默认值通常足够好。SQL 开发人员最常更改的选项是 `CACHE` 值，它决定了预生成并存储在内存中等待使用的序列号数量。默认值 20 通常没问题。类似于批量收集、预取和其他批处理大小选项，设置大值几乎没有好处。批处理大小在第
    16 章有更详细的讨论。


    对于极端的并发插入性能，我们可能需要使用 18c 引入的可扩展序列功能。序列通常线性递增，并通常用于主键生成。由于索引是按顺序存储的，新值往往会写入磁盘上的同一个块。访问相同的块有时是件好事，因为这意味着数据将被缓存在内存中。但频繁写入同一个块会导致争用，特别是在集群环境中，多个服务器上的多个进程需要协调变更。我们需要序列来创建唯一值，但有时我们不希望所有新值都存储在同一个块中。


    主键索引争用的传统解决方案是使用 `REVERSE` 关键字创建索引，以反向顺序存储值。虽然像 123 和 124 这样的索引值很可能存储在一起，但像 321
    和 421 这样的反向值很可能分开存储。反向键索引解决了争用问题，但将每个值写入几乎随机的位置会导致其他性能问题。在实践中，反向键索引很少能解决性能问题。


    可扩展序列以更好的方式解决了争用问题，方法是在序列号前添加实例和会话 ID。每个会话倾向于将索引值写入相同的块，从而最小化访问的块数。并且由于一个会话不会与自身发生争用，并且每个会话的值都有显著差异，因此也不会发生会话间争用。唯一的缺点是序列值大得离谱，但这实际上不是什么大问题，只是这些值乍一看很可疑：


    ```

    --创建一个可扩展序列并显示第一个值。

    create sequence scalable_sequence_test scale;

    select to_char(scalable_sequence_test.nextval) nextval from dual;

    ```


    ## 同义词


    同义词对于为模式对象创建别名非常有用。一层同义词可以隐藏我们不想让用户或开发人员担心的、不美观的环境差异。


    例如，本书中的数据集可以安装在任何模式上。数据集安装说明包括创建名为 `SPACE` 的用户的步骤。想象一下，我们正在基于我们的数据集构建一个应用程序，但名称
    `SPACE` 在某个数据库上已被占用。模式名称在不同环境中会有所不同。我们的应用程序可以使用同义词来隐藏这种差异：


    ```

    --创建同义词示例。

    create synonym launch for space.launch;

    ```


    同义词的另一个用途是在大型数据加载期间最小化停机时间。我们可以有两个表或两个物化视图，使用一个同义词指向其中之一。当新数据到达时，我们将数据加载到未使用的表中。加载完成后，我们
    `CREATE OR REPLACE SYNONYM` 将同义词切换到指向新数据。这种方法不如在线表重定义那样健壮，但更简单。


    与视图类似，我们应最小化间接层，并避免创建引用同义词的同义词。我们还应避免创建 `PUBLIC` 同义词。公共同义词不会授予所有用户访问权限，但公共同义词确实会污染命名空间。


    ## 物化视图


    物化视图存储查询的结果。物化视图主要用于提高数据仓库的性能，但也可以强制执行多表约束。本节仅简要讨论物化视图主题；如需更详细信息，《数据仓库指南》中有数百页关于物化视图的内容。


    物化视图具有表的所有属性，外加一个查询以及如何重建物化视图的说明。物化视图可以有索引，并且可以构建在其他物化视图之上。物化视图的刷新可以按需进行、作为计划的一部分，或在相关语句或提交后自动进行。刷新可以是
    `COMPLETE`（重建整个表），也可以是 `FAST`（仅重建表的必要部分）。包 `DBMS_MVIEW` 可以帮助刷新一组物化视图。`DBMS_MVIEW.REFRESH`
    过程有许多刷新选项，例如并行度、原子性（在一个事务中刷新所有物化视图）、异地（构建一个单独的表然后换出旧数据）等。


    物化视图很复杂，只有在我们用尽所有其他查询调优选项后才应使用。物化视图可以解决困难的性能问题，但代价是额外的复杂性、额外的空间和额外的刷新时间。'
- fmt: '### Materialized Views for Multi-table Constraints


    Outside of a data warehouse, materialized views can be useful for enforcing multi-table
    constraints. For example, let’s try to enforce a rule across the `SATELLITE` and
    `LAUNCH` tables. Both tables have an important date column; launches have `LAUNCH_DATE`,
    and satellites have `ORBIT_EPOCH_DATE`. Those dates are related but not always
    the same. Satellite orbits will change over time, such as when orbits decay due
    to atmospheric drag. The column `ORBIT_EPOCH_DATE` is the date when the orbital
    information was last obtained.


    `ORBIT_EPOCH_DATE` is often later than the launch date, since the orbit changes
    after the launch. But it doesn’t make sense for the orbit epoch date to be before
    the launch date. If Oracle had assertions, perhaps this statement could keep our
    data correct:


    ```sql

    --LAUNCH.LAUNCH_DATE must be before SATELLITE.EPOCH_DATE.

    --(Use "-1" because there are small deviations in times.)

    create assertion launch_before_epoch_date as check

    (

    select *

    from satellite

    join launch

    on satellite.launch_id = launch.launch_id

    where launch.launch_date - 1 < orbit_epoch_date

    );

    ```


    Unfortunately, the preceding feature does not exist yet. Most SQL developers would
    recreate that rule using triggers, which requires procedural code that is difficult
    to make both correct and fast. We can solve the problem declaratively using materialized
    views.


    First, we must create materialized view logs on the relevant tables. Every time
    the table is changed, that change is also automatically written to the materialized
    view log. With that change information, our materialized view can quickly determine
    which rows to examine, so Oracle only has to compare changed rows, not the entire
    table:


    ```sql

    --Create materialized view logs on base tables.

    create materialized view log on satellite with rowid;

    create materialized view log on launch with rowid;

    ```


    Next, we create a `FAST ON COMMIT` materialized view that will list the rows we
    don’t want to see. The following code flips the date comparison and has a few
    other odd changes. The view includes the `ROWID` from both tables and uses the
    old-fashioned join syntax instead of the ANSI join syntax. Fast refresh materialized
    views have many strange restrictions and can be difficult to create:


    ```sql

    --Materialized view for the condition we don''t want to happen.

    create materialized view satellite_bad_epoch_mv

    refresh fast on commit as

    select satellite.orbit_epoch_date, launch.launch_date,

    satellite.rowid satellite_rowid,

    launch.rowid launch_rowid

    from satellite, launch

    where satellite.launch_id = launch.launch_id

    and orbit_epoch_date < launch.launch_date - 1;

    ```


    (If you are using tables from another schema, you will need to grant `CREATE TABLE`
    directly to that schema, or else the preceding statement will fail with “ORA-01031:
    insufficient privileges.” Even though your user may have the ability to create
    a table, when you create a materialized view, the materialized view owner needs
    to create another table in the background.)


    The preceding materialized view contains all the bad rows. Because of the materialized
    view logs, the materialized view won’t have to re-read the entire `LAUNCH` and
    `SATELLITE` tables to validate changes.


    The last piece of the puzzle is to add a constraint. This materialized view shouldn’t
    have any rows, so we create a constraint that will fail if anything exists. But
    since there are a few preexisting bad rows, we will create the constraint with
    the `NOVALIDATE` option to ignore those rows:


    ```sql

    --Add constraint that prevents new rows.

    alter table satellite_bad_epoch_mv add constraint

    satellite_bad_epoch_mv_no_row check (launch_rowid is null)

    enable novalidate;

    ```


    Finally, let’s try to make a bad update. Let’s set an orbit epoch date to a value
    much earlier than the launch date. The following `UPDATE` will run, but the `COMMIT`
    statement initiates a series of events that end with the error “ORA-02290: check
    constraint (SPACE.SATELLITE_BAD_EPOCH_MV_NO_ROW) violated.” The `COMMIT` causes
    the materialized view to try to refresh. The materialized view reads the changed
    rows from the materialized view log and then tries to build the results for our
    query that should not return any rows. When the query does return rows, the materialized
    view violates the constraint, causing an error:


    ```sql

    --Set a bad value.

    update satellite

    set orbit_epoch_date = orbit_epoch_date - 100

    where norad_id = ''000001'';

    commit;

    ```


    Materialized view assertions are useful for enforcing complex data rules, but
    there are several disadvantages. Each imitation assertion requires several new
    objects. The logic behind the materialized view is backward – we have to write
    a query for what we don’t want. That query must adhere to several odd and poorly
    documented syntax rules. And DML on the base tables will have a performance penalty,
    because all changes also need to be written to the materialized view logs. This
    was a lot of painful code to create a simple constraint, but the effort is worth
    it to maintain the integrity of our data.


    ## Database Links


    Database links are the easiest way to access data on another database. With a
    few extra keywords, and a few tricks, we can build large, powerful inter-database
    systems.


    Creating a database link is simple and only requires basic connection information.
    If we don’t have access to multiple databases, we can still test database links
    by creating a database link that refers to itself. After we create a database
    link, remote objects are as easy to access as adding the “`@`” symbol. Oracle
    automatically figures out the privileges, data types, etc.:


    ```sql

    --Create a database link to the same database, for testing.

    create database link myself

    connect to my_user_name

    identified by "my_password"

    using ''(description=(address=(protocol=tcp)(host=localhost)

    (port=1521))(connect_data=(server=dedicated)(sid=orcl)))'';

    select * from dual@myself;

    DUMMY

    X

    ```


    (The preceding commands will not work if we have the `CURRENT_SCHEMA` set to a
    different schema, since database links can only be directly created in our own
    schema. And, of course, we''ll need to enter the correct details for our connection
    string.)


    Database links have some odd behaviors, but there is almost always a workaround
    to our problems. Database links are not great for importing or exporting huge
    amounts of data. If we want to move gigabytes of data, we should look into tools
    like data pump. The “`@`” syntax also does not natively support DDL statements.
    The workaround for running DDL is to call `DBMS_UTILITY.EXEC_DDL_STATEMENT` over
    a database link. And database links always generate a transaction, even if the
    statement doesn’t include DML.


    Too many organizations have rules prohibiting database links for security reasons.
    There’s nothing wrong with database links, although there are certainly problems
    with `PUBLIC` database links. We need to be very careful granting anything to
    public. But we shouldn’t let a non-default option stop us from using the most
    convenient solution. Organizations that outright ban all database links would
    be wise to heed AviD’s Rule of Usability: security at the expense of usability
    comes at the expense of security. If we block the easy, secure way, people will
    find an easy, insecure way. The worst security violations I’ve ever seen happened
    because an organization didn’t allow database links.


    With the right code and workarounds, database links can be used to help us query
    and control a large environment from a single database.'
