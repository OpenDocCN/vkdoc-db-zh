    `MERGE`不仅用于更新插入（upserts）。对于任何引用同一表多次或更改大量行的复杂`UPDATE`语句，我们都应考虑使用`MERGE`。


    ## 可更新视图


    可更新视图让我们可以从查询中插入、更新和删除行，而无需直接操作表。可更新视图可以存储在视图对象中，也可以是一个子查询。可更新视图可以包含多个表的连接，但一次只能修改一个表。可更新视图还有其他一些重要限制。


    例如，让我们创建另一个版本的 SQL 语句，将`SATELLITE.OFFICIAL_NAME`设置为`LAUNCH.FLIGHT_ID2`：


    ```sql

    --将 SATELLITE.OFFICIAL_NAME 更新为 LAUNCH.FLIGHT_ID2。

    update

    (

    select satellite.official_name, launch.flight_id2

    from satellite

    join launch

    on satellite.launch_id = launch.launch_id

    where launch_category = ''deep space''

    )

    set official_name = flight_id2;

    ```


    在这三种实现此更改的版本中，前面的可更新视图版本是最小的。尽管此功能在此示例中运行良好，但通常应避免使用可更新视图。


    可更新视图的主要问题之一是对其可包含的查询有大量限制。查询或视图不能包含`DISTINCT`、`GROUP BY`、某些表达式等。使用这些功能的查询可能会引发"ORA01732:
    data manipulation operation not legal on this view"异常。幸运的是，我们不必检查或试验每个视图来了解我们可以修改什么。数据字典视图`DBA_UPDATABLE_COLUMNS`告诉我们每个视图列可以执行哪些操作。


    可更新视图查询必须明确地将被修改表的每一行返回不超过一次。查询必须是"键保留的"，这意味着 Oracle 必须能够使用主键或唯一约束来确保每行只被修改一次。否则，查询将引发"ORA-01779:
    cannot modify a column which maps to a non key-preserved table"异常。


    `UPDATE`语句在编译时检查可能的歧义，如果该语句在理论上可能是歧义的，则引发异常。即使可更新视图在运行时*会*工作，它们也可能在编译时失败。


    `MERGE`语句在运行时检查可能的歧义，并引发"ORA-30926: unable to get a stable set of rows in the
    source tables"异常。`MERGE`语句功能更强大，但也允许一些*不应该*工作的语句运行。


    演示键保留表很棘手，需要很多篇幅。^(¹⁹)最好完全避免使用可更新视图。但如果我们被困在一个只提供视图而无法直接访问表的系统中，可更新视图是我们唯一的选择。如果我们必须使用视图，但该视图不能满足所有键保留要求，我们可以使用`INSTEAD
    OF`触发器。'
- fmt: '## DML Hints


    ### 提示概述


    提示是告诉 Oracle 如何处理 SQL 语句的指令。提示主要用于性能优化，并将在第 [18](#471418_2_En_18_Chapter.xhtml)
    章更深入地讨论。本节仅关注 DML 语句的提示。DML 提示的影响可能远不止于语句的执行计划。


    关于提示的第一个难点在于理解它们并非真正的“建议”。提示不仅仅是数据库可以随意选择忽略的建议。只要可能，提示*将会*被遵循。当我们的提示未被遵循时，说明出现了问题，但要弄清楚提示为何不起作用可能很困难。


    提示的格式类似于注释，但带有一个加号。提示可以是像 `--+ APPEND` 这样的单行注释，也可以是像 `/*+ APPEND */` 这样的多行注释。提示必须紧跟在语句的第一个关键字之后放置。例如，`INSERT
    /*+ APPEND */` 是正确的，但 `INSERT INTO /*+ APPEND */` 是错误的。错误的提示会静默失败，而不是引发错误。


    提示经常被滥用。一些 SQL 开发人员会在他们的语句中随意添加提示，试图强制实现完美的执行计划并智胜优化器。用于 DML 的提示通常被认为是“好”提示，因为它们告诉了优化器一些它自己无法弄清楚的信息。然而，其中一些“好”提示会影响可恢复性，如果被误用可能会相当危险。最重要的
    DML 提示是 `IGNORE_ROW_ON_DUPKEY_INDEX`、`APPEND` 和 `PARALLEL`。


    ### 特定提示说明


    提示 `IGNORE_ROW_ON_DUPKEY_INDEX` 在我们插入数据并希望忽略重复项时非常有用。这是一个语义提示——它会改变 SQL 语句的逻辑行为。例如，如果我们尝试向表中加载重复数据，语句将产生如下错误：


    ```sql

    SQL> insert into propellant values(-1, ''Ammonia'');

    insert into propellant values(-1, ''Ammonia'')

    *

    ERROR at line 1:

    ORA-00001: unique constraint (SPACE.PROPELLANT_UQ) violated

    ```


    对于上述错误的典型解决方法是在插入前检查行是否存在。但检查行需要额外的代码和运行时间。相反，我们可以添加提示 `IGNORE_ROW_ON_DUPKEY_INDEX`，然后语句将简单地忽略重复行：


    ```sql

    SQL> insert /*+ignore_row_on_dupkey_index(propellant,propellant_uq)*/

    2  into propellant values(-1, ''Ammonia'');

    0 rows created.

    ```


    `APPEND` 提示启用了直接路径 `INSERT`。直接路径插入是一个重要主题，将在第 [10](#471418_2_En_10_Chapter.xhtml)
    章及本书其他地方讨论。简而言之：直接路径 `INSERT` 的优点是直接写入数据文件，速度更快；缺点是它们会独占锁定对象且不可恢复。这种权衡正是 DML 提示的特别之处——这是优化器自身无法做出的决定。不存在无痛的提示如
    `/*+ FAST=TRUE */`。在使用潜在危险的 DML 提示之前，我们必须仔细思考。我们只应在能够接受额外锁定和可能丢失数据的情况下使用 `APPEND`
    提示。


    `PARALLEL` 提示较为复杂，其性能影响将在第 [18](#471418_2_En_18_Chapter.xhtml) 章讨论。`PARALLEL`
    提示对 DML 也有影响。语句的查询部分可以并行运行，而我们不太需要担心其后果。但并行运行语句的 `INSERT`、`UPDATE` 或 `DELETE`
    部分会使用直接路径模式，于是我们又回到了先前讨论的权衡问题。


    如果我们既想要直接路径写入又想要并行 DML，那么我们应该同时使用 `APPEND` 和 `PARALLEL` 提示，像这样：`/*+ APPEND PARALLEL(...
    */`。并行 DML 隐式请求了直接路径模式，但我们仍应分别列出这两个提示。如果语句被降级为串行执行（也许因为所有并行会话都在使用中），那么仅靠 `PARALLEL`
    提示将不会启用直接路径模式。降级的语句已经够糟糕了；我们不想同时失去直接路径模式。（另一方面，有时我们只想并行化语句的 `SELECT` 部分，而不是 DML
    部分。）


    并行 DML 默认是禁用的。在一个大型数据仓库中，这个默认设置可能让人感到烦恼，但这种烦恼保护我们免受两件重要事情的影响：直接路径模式带来的不可恢复性，以及小语句并行化的昂贵开销。并行处理有时会自动发生，但我们绝不希望直接路径模式自动发生。要请求并行
    DML，我们必须使用提示 `/*+ ENABLE_PARALLEL_DML */`，或者在任何 DML 之前在我们的会话中运行以下语句：


    ```sql

    alter session enable parallel dml;

    ```


    ### 错误日志记录


    DML 错误日志记录让我们可以忽略错误并继续处理。错误以及导致这些错误的数据会被保存在一个错误日志表中。当我们不想让几个坏值停止整个处理过程时，错误日志记录非常有用。


    例如，让我们尝试将新行加载到 `LAUNCH` 表中，但使用一个过大的值。默认情况下，我们的查询会产生错误并停止处理：


    ```sql

    SQL> --Insert into LAUNCH and generate error.

    SQL> insert into launch(launch_id, launch_tag)

    2  values (-1, ''A value too large for this column'');

    values (-1, ''A value too large for this column'')

    *

    ERROR at line 2:

    ORA-12899: value too large for column "SPACE"."LAUNCH"."LAUNCH_TAG" (actual:33,
    maximum: 15)

    ```


    在我们能够使用错误日志记录之前，必须先生成一个错误日志表。Oracle 提供了一个 PL/SQL 包来创建具有正确格式的表：


    ```sql

    --Create error logging table.

    begin

    dbms_errlog.create_error_log(dml_table_name => ''LAUNCH'');

    end;

    /

    ```


    默认错误日志名称是表名前加上 “ERR$_”，因此前面的语句创建了一个名为 `ERR$_LAUNCH` 的表。错误日志子句适用于 `INSERT`、`UPDATE`、`DELETE`
    和 `MERGE`。要使用错误日志表，我们必须在语句中添加错误日志子句。我们希望至少包含错误日志子句的两个不同部分——使用哪个表以及拒绝限制。


    默认拒绝限制是 0，这意味着语句将记录错误但立即停止处理。一个更常见的值是 `UNLIMITED`。以下示例展示了与之前相同的坏 `INSERT` 语句，但这次语句完成了并记录了错误：


    ```sql

    SQL> --Insert into LAUNCH and log errors.

    SQL> insert into launch(launch_id, launch_tag)

    2  values (-1, ''A value too large for this column'')

    3  log errors into err$_launch

    4  reject limit unlimited;

    0 rows created.

    ```


    前面的 `INSERT` 没有引发错误，但 SQL*Plus 反馈消息显示 “0 rows created.”。该语句在 `ERR$_LAUNCH` 表中创建了一行，即使会话回滚，该行也仍然存在。


    `ERR$_LAUNCH` 表包含多个带有元数据的 `ORA_ERR_*` 列，以及失败行的所有 `LAUNCH` 表列。错误日志表中有很多数据，以下查询只返回最有用的列：


    ```sql

    --Error logging table.

    select ora_err_number$, ora_err_mesg$, launch_tag

    from err$_launch;

    ORA_ERR_NUMBER$   ORA_ERR_MESG$                     LAUNCH_TAG

    ---------------   -------------------------------   ----------

    12899   "ORA-12899: value too large..."   A value...

    ```


    前面的结果非常适合调试，因为它们还显示了我们尝试使用的值。默认的 SQL 异常不包含导致错误的实际值。


    当我们有一个作业必须完成而不顾错误时，错误日志记录是一个有用的功能。另一方面，我们不想过度使用错误日志记录来掩盖所有错误。大多数问题最好在发生时处理，而不是以后。'
  raw: '## DML Hints


    Hints are instructions that tell Oracle how to process a SQL statement. Hints
    are mostly used for performance and will be more thoroughly discussed in Chapter
    [18](#471418_2_En_18_Chapter.xhtml). This section only focuses on hints for DML
    statements. DML hints can affect more than just the execution plan of statements.


    The first difficulty with hints is to understand that they’re not really “hints.”
    Hints are not merely recommendations that the database can randomly choose to
    ignore. Hints *will* be followed, if possible. When our hint is not followed,
    something has gone wrong, but it can be difficult to figure out why the hint didn’t
    work.


    Hints are formatted as comments with a plus sign. Hints can be single-line comments
    like `--+ APPEND` or multiline comments like `/*+ APPEND */`. Hints must be placed
    directly after the first keyword in the statement. For example, `INSERT /*+ APPEND
    */` is correct, but `INSERT INTO /*+ APPEND */` is incorrect. Incorrect hints
    silently fail instead of raising errors.


    Hints are frequently abused. Some SQL developers will litter their statements
    with hints, trying to force the perfect execution plan and outsmart the optimizer.
    Hints used for DML are generally considered “good” hints because they are telling
    the optimizer something it can’t figure out for itself. However, some of these
    “good” hints can affect recoverability and can be quite dangerous if they are
    misused. The most important DML hints are `IGNORE_ROW_ON_DUPKEY_INDEX`, `APPEND`,
    and `PARALLEL`.


    The hint `IGNORE_ROW_ON_DUPKEY_INDEX` is useful when we’re inserting data and
    want to ignore duplicates. This hint is a semantic hint – the hint changes the
    logical behavior of the SQL statement. For example, if we try to load duplicate
    data into a table, the statement will generate an error like this:


    ```

    SQL> insert into propellant values(-1, ''Ammonia'');

    insert into propellant values(-1, ''Ammonia'')

    *

    ERROR at line 1:

    ORA-00001: unique constraint (SPACE.PROPELLANT_UQ) violated

    ```


    The typical workaround to the preceding error is to check for the existence of
    a row before inserting it. But checking for rows requires extra code and extra
    run time. Instead, we can add the hint `IGNORE_ROW_ON_DUPKEY_INDEX``,` and then
    the statement will simply ignore the duplicate rows:


    ```

    SQL> insert /*+ignore_row_on_dupkey_index(propellant,propellant_uq)*/

    2  into propellant values(-1, ''Ammonia'');

    0 rows created.

    ```


    The `APPEND` hint enables a direct-path `INSERT`. Direct-path inserts are an important
    topic and are discussed in Chapter [10](#471418_2_En_10_Chapter.xhtml) and elsewhere
    in this book. Here’s the short version: direct-path `INSERT`s are good because
    they write directly to data files and are faster; direct-path `INSERT`s are bad
    because they exclusively lock objects and are not recoverable. That trade-off
    is what makes DML hints special – this is a decision the optimizer cannot make
    by itself. There’s no painless hint for `/*+ FAST=TRUE */`. We must think carefully
    before we use potentially dangerous DML hints. We should only use the `APPEND`
    hint if we’re OK with extra locking and potentially losing data.


    The `PARALLEL` hint is tricky and has performance implications that are discussed
    in Chapter [18](#471418_2_En_18_Chapter.xhtml). The `PARALLEL` hint also has consequences
    for DML. The query part of a statement can run in parallel without us worrying
    too much about the consequences. But running the `INSERT`, `UPDATE`, or `DELETE`
    part of the statement in parallel uses direct-path mode, and we’re back to the
    previously discussed trade-offs.


    If we want both direct-path writes and parallel DML, then we should use both the
    `APPEND` and `PARALLEL` hints, like this: `/*+ APPEND PARALLEL(... */`. Parallel
    DML implicitly requests direct-path mode, but we should still list both hints
    separately. If the statement gets downgraded to serial, perhaps because all the
    parallel sessions are being used, then the `PARALLEL` hint alone will not enable
    direct-path mode. Downgraded statements are bad enough; we don’t also want to
    lose direct-path mode. (On the other hand, there are times when we only want to
    parallelize the `SELECT` part of a statement, not the DML part.)


    Parallel DML is disabled by default. That default may feel annoying in a large
    data warehouse, but that annoyance protects us from two important things: the
    lack of recoverability from direct-path mode and the expensive overhead of parallelism
    for small statements. Parallel processing sometimes happens automatically, but
    we never want direct-path mode to happen automatically. To request parallel DML,
    we must either use the hint `/*+ ENABLE_PARALLEL_DML */` or run this statement
    in our session before any DML:


    ```

    alter session enable parallel dml;

    ```


    ## Error Logging


    DML error logging lets us ignore errors and continue processing. The errors, along
    with the data causing those errors, are saved in an error logging table. Error
    logging is useful when we don’t want a few bad values to stop the entire process.


    For example, let’s try to load new rows into the `LAUNCH` table, but use a value
    that is too large. By default, our query generates an error and stops processing:


    ```

    SQL> --Insert into LAUNCH and generate error.

    SQL> insert into launch(launch_id, launch_tag)

    2  values (-1, ''A value too large for this column'');

    values (-1, ''A value too large for this column'')

    *

    ERROR at line 2:

    ORA-12899: value too large for column "SPACE"."LAUNCH"."LAUNCH_TAG" (actual:33,
    maximum: 15)

    ```


    Before we can use error logging, we must generate an error logging table. Oracle
    provides a PL/SQL package to create a table with the right format:


    ```

    --Create error logging table.

    begin

    dbms_errlog.create_error_log(dml_table_name => ''LAUNCH'');

    end;

    /

    ```


    The default error log name is the table name prefixed with “ERR$_”, so the preceding
    statement creates a table named `ERR$_LAUNCH`. The error logging clause works
    with `INSERT`, `UPDATE`, `DELETE`, and `MERGE`. To use the error logging table,
    we must add the error logging clause to our statements. We want to include at
    least two different sections of the error logging clause – which table to use
    and the reject limit.


    The default reject limit is 0, which means the statement will log the error but
    immediately stop processing. A more common value is `UNLIMITED`. The following
    example shows the same bad `INSERT` statement as before, but this time the statement
    completes and logs the error:


    ```

    SQL> --Insert into LAUNCH and log errors.

    SQL> insert into launch(launch_id, launch_tag)

    2  values (-1, ''A value too large for this column'')

    3  log errors into err$_launch

    4  reject limit unlimited;

    0 rows created.

    ```


    The preceding `INSERT` didn’t raise an error, but the SQL*Plus feedback message
    shows “0 rows created.” That statement created a row in the `ERR$_LAUNCH` table,
    and that row will still be there even if the session is rolled back.


    The `ERR$_LAUNCH` table contains several `ORA_ERR_*` columns with metadata, as
    well as all the `LAUNCH` table columns for the failed row. There is a lot of data
    in that error logging table, and the following query only returns the most useful
    columns:


    ```

    --Error logging table.

    select ora_err_number$, ora_err_mesg$, launch_tag

    from err$_launch;

    ORA_ERR_NUMBER$   ORA_ERR_MESG$                     LAUNCH_TAG

    ---------------   -------------------------------   ----------

    12899   "ORA-12899: value too large..."   A value...

    ```


    The preceding results are perfect for debugging because they also show the values
    we tried to use. Default SQL exceptions don’t include the actual values that caused
    the errors.


    Error logging is a useful feature when we have a job that absolutely must finish,
    regardless of errors. On the other hand, we don’t want to overuse error logging
    to sweep all our bugs under the rug. Most problems are best handled the moment
    they happen, not later.'
