- fmt: '# 10. Optimize the Database with Oracle Architecture


    SQL and the relational model are logical constructs built on top of our slow,
    physical machines. Even E. F. Codd’s original paper warned that implementing the
    relational model would run into physical limitations. The more advanced features
    we use and the more stress we put on the database, the more likely it is for Oracle’s
    abstractions to fail. Oracle has put a lot of effort into making our SQL code
    atomic, consistent, isolated, and durable. But no system can hide all of its implementation
    details, and we need to understand Oracle internals in order to make things work
    efficiently.


    This chapter is focused on practical architectural information that we need to
    know for SQL development. Database administrators will need to learn much more
    about Oracle’s architecture and should read all 622 pages of the *Database Concepts*
    manual. Developers can get by with just skimming that manual or with the information
    in this chapter.


    ## Storage Structures


    SQL developers need to be aware of how data is stored. Even if we’re not responsible
    for administering our databases and storage, Oracle’s storage architecture affects
    the performance and locking of our SQL statements. And we may need to understand
    how space is allocated, so we know how much space to request and how to not waste
    that space.


    The storage structures, ordered from smallest to largest, are column values, row
    pieces, blocks, extents, segments, data files, tablespaces, and ASM or file systems.
    All of the items in that list are logical storage structures that only exist inside
    the database, except for data files that are physical storage structures that
    exist on the operating system. Oracle has other physical storage structures, such
    as control files and parameter files, but those structures are more important
    to DBAs than developers. Our list of storage structures is not a perfect hierarchy,
    but it’s good enough to be helpful. The list is shown in Figure [10-1](#471418_2_En_10_Chapter.xhtml#Fig1).


    ![](images/471418_2_En_10_Chapter/471418_2_En_10_Fig1_HTML.png)


    The storage structure hierarchy consists of column, row piece, block, extent,
    segment, data file, tablespace, and A S M or file system.


    Figure 10-1

    Storage structure hierarchy


    ### Column Values


    We’ve already encountered column values many times in this book. And we’ve seen
    how we can use the `DUMP` function to view the internal representation of data.
    The simplest data types, NUMBER, VARCHAR2, and DATE, are easy to understand and
    need no further explanation. These data types should make up the vast majority
    of our columns.


    The storage of large objects (LOBs), such as BLOB, CLOB, and BFILE, can get quite
    complicated. `BFILE`s are pointers to binary files stored on the file system and
    are managed by the operating system. `BLOB`s and `CLOB`s can be stored inline,
    where a value less than 4000 bytes can be stored along with other data. `BLOB`s
    and `CLOB`s larger than 4000 bytes must be stored out of line, separate from the
    rest of the table data.


    Each `BLOB` and each `CLOB` column has a separate segment to store large out-of-line
    data. In some cases, the vast majority of table data is stored in a LOB segment
    instead of the table segment. LOB segments can make calculating storage sizes
    tricky. For tables with large LOBs, we cannot simply look for the table name in
    `DBA_SEGMENTS` – we also have to find the LOB segment using `DBA_LOBS`. LOBs also
    have many storage properties, such as tablespace, compression, encryption, deduplication,
    logging, retention, etc. If we’re storing a huge amount of data in LOBs, we need
    to think carefully about the settings for each LOB column.


    Out-of-line LOBs still store a small amount of data in the table segment. Each
    LOB value has a locator that points to the LOB. An index is automatically created
    for each LOB to help quickly look up LOB data. Those LOB indexes are given system
    names like `SYS_IL0000268678C00010$$`, and we should not directly modify those
    indexes.


    Non-atomic types, such as `XMLType` and object types, are more complicated. But
    even these complicated types are still stored in regular columns and rows behind
    the scenes. Data dictionary tables like `DBA_NESTED_TABLES` and `DBA_TAB_COLS`^([^(27)](#fn27))
    show that the fancy types are stored the same way as the regular types. No matter
    what we do, our data is stored as columns and rows, so we shouldn’t expect magical
    performance improvements by using advanced types.


    ### Row Pieces


    As we would expect from a relational database, all values are stored in columns,
    and the columns are stored in rows. These rows may be broken into multiple row
    pieces and scattered across multiple blocks (which are discussed next). Everything
    in Oracle must fit inside a block, which is usually 8 kilobytes. That size limitation
    means that large rows must be broken into multiple pieces, called row chaining.
    If we update a row and the row suddenly grows too large for the block, the entire
    row may migrate to another block. In rare cases, row chaining and row migration
    can lead to performance problems. Chaining and migrating rows require creating
    extra pointers to the row pieces or new location, which can lead to extra reads.


    Every row can be identified by a `ROWID` pseudo-column, which is like a physical
    address for each row. The `ROWID` is the fastest way to look up a row – even faster
    than a primary key. But the `ROWID` can change, for example, if we compress or
    rebuild a table. We should not permanently store a `ROWID` value and expect the
    value to work later.


    The way column data is stored within a row can have important implications for
    our table design. For each row, Oracle stores the number of columns. For each
    column, Oracle stores a byte size and then the data. (There is other row metadata,
    but that’s not important here.)


    For example, let’s imagine three rows in the `LAUNCH` table, where `LAUNCH_ID`
    is the only column with a value. That table has 14 columns, so almost all of the
    values in those three rows are NULL. Let’s also imagine that we chose to put the
    `LAUNCH_ID` as the *last* column. Each row starts with the number of columns,
    14. Then there are 13 zeroes, for the null columns that have 0 bytes. Then there
    is a 1, the size of the last column, which only takes 1 byte. Finally, there are
    the `LAUNCH_ID` values themselves, which are simple integers. The first three
    rows may look like this:


    ```

    14|000000000000011

    14|000000000000012

    14|000000000000013

    ```


    Oracle uses a simple trick to save space with trailing NULLs. If we have the `LAUNCH_ID`
    at the *beginning* of the table, and every other value is NULL, the number of
    columns will be set to only 1. For the first column, the size is set to 1 byte,
    and then the data is included. For the rest of the columns, nothing is needed.
    Oracle infers that if only 1 out of the 14 columns is included, the rest must
    be NULL:


    ```

    1|11

    1|12

    1|13

    ```


    That trailing-NULL trick can save a significant amount of space for wide, sparse
    tables. But the trick only saves space if the nullable columns are put at the
    end of the table. We don’t normally need to know this kind of information. But
    if we’re going to build something extreme, like a table with a thousand columns,
    working with Oracle’s physical architecture can make a big difference.'
