- fmt: '## NOVALIDATE and Parallel Constraints


    There are a few duplicates in our sample schema, but that’s understandable for
    80-year-old data. We can’t always fix bad data, but we can at least prevent more
    bad data from happening. The `NOVALIDATE` option lets the constraint ignore existing
    exceptions and prevent future exceptions.


    The `NOVALIDATE` option is a bit tricky to use with unique constraints because
    unique constraints must also work with indexes. To create a not-so-unique unique
    constraint, we must first create a non-unique index. The following code creates
    a non-unique index, enables the constraint, ignores existing bad data, and uses
    a specific index to maintain the constraint:


    ```sql

    --Create a non-unique index for the constraint.

    create index organization_temp_idx1

    on organization_temp(org_name, org_start_date, org_location)

    compress 2;

    --Enable NOVALIDATE the constraint, with a non-unique index.

    alter table organization_temp

    enable novalidate constraint organization_temp_uq

    using index organization_temp_idx1;

    ```


    The `USING` clause and disabling and validating constraints are also helpful for
    performance. Data warehouses often improve the performance of loading data by
    removing constraints and indexes. But those constraints and indexes need to be
    re-added when the data load is complete. The `USING` clause lets us create our
    index however we want, perhaps with performance-enhancing options such as compression,
    parallelism, and `NOLOGGING`. To re-enable constraints in parallel, we must first
    create them with `DISABLE` and then `VALIDATE` them as a separate step.


    Demonstrating parallel constraint re-enabling is difficult and requires a lot
    of setup work. To conserve space, the prep work for creating a large version of
    the `ORGANIZATION` table is only shown in the repository. Let’s assume that we
    have created a large table and loaded data, and now we want to re-add the constraints
    in parallel. The following four steps show how to re-enable constraints in parallel:


    ```sql

    --Set the table to run in parallel.

    alter table organization_parallel parallel;

    --Create constraint but have it initially disabled.

    alter table organization_parallel

    add constraint organization_parallel_fk foreign key (parent_org_code)

    references organization_parallel(org_code) disable;

    --Validate constraint, which runs in parallel.

    alter table organization_parallel

    modify constraint organization_parallel_fk validate;

    --Change the table back to NOPARALLEL when done.

    alter table organization_parallel noparallel;

    ```


    Running constraints in parallel may seem like an unusual case, but these steps
    are important and also demonstrate a larger principle. Because of Amdahl’s law
    (discussed in Chapter 16), if we’re going to parallelize a process, we need to
    parallelize *all* of the steps. There are many data warehouse processes that parallelize
    and optimize the obvious data loading steps, only to spend the majority of time
    recreating indexes and rebuilding constraints serially. Oracle has all these weird
    constraint features for a reason. Don’t bother trying to memorize the constraint
    syntax – just remember that there is always a workaround to constraint performance
    problems.


    ## Other Constraints


    Views can be created using a `WITH READ ONLY` constraint, preventing them from
    being changed as part of an updatable view. Views also have the `WITH CHECK OPTION`
    constraint, which allows updatable views to only modify specific values. View
    constraints don’t prevent bad data; they only prevent bad data from being created
    through views. As discussed in Chapter 8, updatable views are difficult and should
    be used with caution.


    Oracle constraints are limited to enforcing rules within a single table or between
    two tables for referential integrity constraints. We should use constraints instead
    of triggers when possible, but constraints can’t compare multiple tables. Hopefully,
    a future version of Oracle will include an `ASSERT` command that lets us define
    complex business rules in a single statement. For now, there is a workaround discussed
    later in the “Materialized Views” section.


    This book focuses on practical solutions, yet this section used a lot of weird
    code to demonstrate obscure features. And other unusual constraint features were
    discussed in previous chapters, such as cascading deletes and deferrable constraints.
    Constraints are one of the few areas worth discussing in depth. Constraints are
    critical, and we need to keep our data as clean as possible. Once again, don’t
    worry if you can’t remember all the syntax. The important point to remember is
    that there’s always a way to enforce the data rules we need. And there’s always
    a way to enforce those rules efficiently.


    ## Indexes


    Indexes are data structures that mirror table data but are organized in a way
    to improve performance. Oracle has a ridiculous number of index options, and they
    are only briefly discussed in this section. Before we discuss the options, it’s
    important to have a good understanding of what indexes are and how indexes work.
    We need a good theoretical understanding of indexes to know how to use them and
    when they won’t work. Many databases are littered with useless indexes because
    a developer thought an index would magically solve a performance problem. And
    many databases suffer because their indexes are missing that one, small feature
    that would make the indexes useful.'
