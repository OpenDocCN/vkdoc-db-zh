    The ANSI join syntax forces us to write our SQL statements one step at a time.
    Our queries start with a single set, we combine that set with something else to
    create a new set, and we repeat the process until done. Those sets could be tables,
    views, inline views, materialized views, table collection expressions, partitions,
    remote objects, a point-in-time snapshot of a table using flashback, a CSV file
    represented as an external table, and who knows what else. The beauty of the relational
    model is that the origin of the sets doesn’t matter. As long as sets return rows
    and columns, they can all be treated the same way.


