  trans: '


    ### 极简


    省略不必要的代码。


    我甚至想用这一句话就写完这一整节。可惜，简化并非易事，我们需要付出努力才能让事情看起来简单。


    编程是困难的，而缺陷可能迅速增多。测试案例中的代码越多，引入无关问题的机会就越大，人们关注错误重点、吹毛求疵于无关错误的机会也越大。大段的代码需要更多时间去理解，愿意查看它的人也就越少。如果我们面对的是一个纯技术问题，就应尽可能排除业务逻辑。我们必须将聚光灯聚焦在尽可能少的代码上。（但我们必须按代码行数和变量数来衡量代码，而非字符数；不要为了减小文件大小而使用单字母变量名，也不要忘记添加有用的注释。）


    同样的规则也适用于模式对象和数据。一列够用，就不要创建两列。一行够用，就不要插入两行数据。


    棘手之处在于，我们的问题可能发生在很大的上下文环境中。一个问题可能发生在涉及几十张表、读取数十亿行数据的查询中。要移除尽可能多的代码和数据，并仍能重现缺陷，可能需要花费数小时。将大查询对半切割、检查是否失败并重复此过程，可能会耗费很长时间。最终，我们会得到一个能放进小型
    SQL 工作表的问题。


    最小化代码是耗时且乏味的。但这个过程让我们能精确定位确切的问题，比争论代码和数据更容易，并且避免了上传没人想看的大文件。


    ### 完整


    我们必须创建一个可运行且自包含的测试案例。然后，我们必须在一个全新的数据库上编写代码，以确保测试案例没有缺失任何意外的依赖项。别人不会为了帮我们解决问题而去安装其他产品，所以确保一切都在一个地方。


    以下是一个完整测试案例的示例。该代码创建对象、添加数据、收集优化器统计信息，并运行问题查询：


    ```sql

    --创建表。

    create table simple_table(simple_column number);

    --添加示例数据。

    insert into simple_table select 1 from dual;

    --如果是性能问题，则收集统计信息。

    begin

    dbms_stats.gather_table_stats(user, ''simple_table'');

    end;

    /

    --这是失败或运行缓慢的查询。

    select *

    from simple_table;

    ```


    前面的代码是理想情况，但我们整个模式是现实。我们需要在中间找到平衡点。有时，从前面的代码开始，添加真实代码直到出现问题会有所帮助。其他时候，从真实模式开始，逐步删减直到代码能正常工作会更有帮助。


    除了代码，我们还应提供完整的版本号和版本。版本和版本对于发现特定缺陷很重要，它们也限制了可用的故障排除和解决方法。平台通常无关紧要，但包含它也无妨。例如：前面的代码在
    Oracle 19.3.0.0.0 企业版和 64 位 Windows 10 上有效。


    收集系统参数也很重要。参数有数百个之多，很难知道哪些是重要的。我们可以仅查找非默认参数来缩小搜索范围，使用以下查询：


    ```sql

    select name, value

    from v$parameter

    where isdefault = ''FALSE''

    order by name;

    ```


    但即使前面的查询也不总是足够好。例如，在某些处理器上，`CPU_COUNT` 的默认值是错误的，并可能导致性能问题。而且许多参数可以在会话级别更改，无论是作为登录脚本的一部分，还是通过触发器。遗憾的是，无法获取所有非默认会话参数的列表。


    要让一个测试案例真正完整是不可能的——如果你想从头创建一个测试案例，你必须先发明宇宙。但稍加努力，我们就能在 99% 的情况下获得足够的信息。至少，我们可复现的测试案例向他人表明了我们是认真的，这使得其他开发人员更有可能尝试示例代码并调查问题。


    ### 可验证


    没人能验证一个“不工作”的代码。我们需要为我们的代码提供客观的度量标准，例如完整的错误消息或详细的性能预期。


    我们都讨厌错误消息，希望它们消失。但我们必须抵制快速 dismiss（置之不理）和忽略错误消息的冲动。默认情况下，Oracle 错误会生成对象名称、错误号、错误消息和行号。如果错误通过多个层级传播，所有层级的错误消息都将包含在内。默认情况下，Oracle
    包含了解决大多数问题所需的所有信息。但只有当我们记下*完整*的错误消息时，它才有帮助。开发人员会不遗余力地抛出有用的异常消息。不要忽视这些消息并说“出了个错误”，从而浪费了他们的工作。


    `SQL*Plus` 不擅长交互式查询和编程。`SQL*Plus` 的最大优势在于它简单、通用、纯文本的 Oracle 接口。如果我们在 `SQL*Plus`
    中能完成某件事，那么任何人都可以复制文本、运行代码并自行验证结果。


    像 Oracle SQL Developer 这样的程序对于大多数数据库工作来说好用得多，但对于创建测试案例来说却没那么有用。如果我们发送截图，其他开发人员就不容易提取代码。如果我们只发送在
    SQL Developer 中使用的文本，其他开发人员可能会缺失我们如何运行代码的信息——存在具有不同行为的不同窗口类型。而且，在 SQL Developer
    中，输出和错误消息并不总是易于复制。


    `SQL*Plus` 看起来很丑，但至少是我们都认可的那种丑。通过一些简单的技巧，我们可以创建一个 `SQL*Plus` 环境，清晰地展示我们运行了什么、在哪里运行的以及运行了多长时间：


    ```sql

    SQL> set sqlprompt "_user''@''_connect_identifier> "

    JHELLER@orcl9> set timing on

    JHELLER@orcl9> select count(*) from dba_objects;

    COUNT(*)


    Elapsed: 00:00:00.21

    JHELLER@orcl9>

    ```


    更改 SQL 提示符可以清楚地显示是哪个用户运行了代码以及在哪个数据库上运行。人们很少会粗鲁到直接问：“你确定你在正确的数据库上吗？”但在他们心里，他们确实在想这个问题，所以我们不妨让他们安心。另一方面，有时数据库名称是敏感的，我们需要隐藏它。对于文本输出，查找和替换名称很简单，而截图往往会包含无意的细节，甚至可能来自其他程序。


    `SET TIMING ON` 命令显示了每条语句的实际运行时间。而且语句本身很容易复制和粘贴。只需付出很少的努力，我们就可以消除测试案例的许多不确定性。


    对于性能调优来说，包含精确的时间预期至关重要。一个处理单行数据的 OLTP 系统可能期望结果在不到一秒内返回。一个处理十亿行数据的数据仓库可能期望结果在不到一周内返回。我们必须提供比“它很慢”更多的信息。解释我们的代码花了多少时间、我们认为它应该花多少时间以及为什么，会很有帮助。列出我们的性能假设也有帮助，因为有时我们的预期是不切实际的。也许我们认为应该不到一秒就完成的过程，在我们当前的数据结构、算法和硬件下，根本不可能在不到一秒内完成。


    '
- fmt: '## Sharing Tests


    Creating reproducible test cases is beneficial for our own education, but most
    of the time we need to share those test cases with others. If we want to add to
    the world’s knowledge, we need to release all the details of our tests, so that
    others can prove us wrong. Without a fully reproducible test case, we’re not doing
    science.


    Organizations like to keep all their test cases to themselves, but there’s rarely
    a need to hide that information, especially in an agile environment, where the
    customer should be given access to view all the tests. If we’re lucky, the customer
    will find a problem or missing assumption early in the development process.


    To optimize sharing, use text as much as possible. It’s easier to create a test
    case with an IDE, but it’s worth recreating the final version in `SQL*Plus` to
    ensure everything can be copied and pasted. If we must use a screenshot, we should
    take the time to rearrange the windows to make them as small as possible and edit
    the picture to only include relevant details.


    Ideally, the audience for our test case has a private Oracle database with full
    access to create an unlimited number of objects. If our audience does not have
    that environment, there are a growing number of “fiddle” websites for building
    and sharing code snippets. One popular database website is [`https://dbfiddle.uk`](https://dbfiddle.uk).
    That site lets anyone create a schema, query the schema, and share the schema
    with others as a simple URL. Oracle has a similar site at [`https://livesql.oracle.com`](https://livesql.oracle.com).
    Oracle’s website has more features than other sites, but it requires an account
    to run the snippets.


    ## Avoiding the XY Problem


    Before sending the final version of the test case, we need to take a step back
    and try to avoid the XY problem. Programming tends to lead us down a deep garden
    path. We want to do X, and we think Y is the solution. When Y doesn’t work, we
    ask a question about Y, when our real problem is with X.


    A common example of the XY problem is when people ask, “How do I split a comma-separated
    list into different rows?” It’s an important question, and there are times when
    it’s necessary. But splitting strings implies that someone is not following the
    most basic rules of the relational model. The developer asking the question and
    the person who will someday replace them are in for a lot of trouble trying to
    use a broken data model. The correct answer is “don’t do that.” It’s not the answer
    people want to hear, but it is the answer they need to hear.


    We fall into this XY trap because programming occasionally requires focusing on
    minor details, and we don’t see the big picture. The way out of the trap is to
    occasionally stop and ask ourselves “Why?” a few times.


    When we find ourselves asking for help to do something weird, it’s important to
    explain why we need to do it the weird way. We’re more likely to get sympathy
    and help if we explain that we’re not stupid; it’s the business rule or technical
    limitation that is stupid. If we’re lucky, someone will interrupt us and say,
    “Your premise is wrong – that limitation doesn’t apply to version A anymore, and
    you can use feature B instead.”


    ## Oracle Performance Testing


    Building reproducible test cases for Oracle performance problems is especially
    challenging. Oracle performance test cases tend to be full of heisenbugs – errors
    or behaviors that disappear when someone else looks at them. Since Oracle SQL
    is a declarative language, Oracle has a lot of leeway on how to execute things,
    including the ability to change its mind. Part IV covers advanced performance
    tuning concepts, such as using sampling and profiling to drill down into our PL/SQL
    programs to find the slow SQL and then using hints and monitoring to drill down
    into our SQL to find the slow operations. Before we get to those details, the
    first step in performance testing is learning how to accurately measure the overall
    performance of a single statement.


    The wall-clock run time is the central unit of measurement for performance tests.
    If something runs faster, it is using less resources and is better for both the
    users and the system. Don’t worry too much about measuring CPU, I/O, locks, mutexes,
    etc.


    But there are important exceptions to the rule of only measuring run time. For
    example, we don’t want to create a parallel solution that decreases run time by
    a few seconds but increases CPU utilization from 1% to 99%. Run time doesn’t always
    correlate to resource consumption. Some Oracle developers find it helpful to proactively
    monitor resource consumption with programs such as `RUNSTATS`.


    The most frustrating part of performance tests is when the run time is not consistent.
    Oracle databases warm up and tune themselves over time, so it’s quite common for
    the second or third execution of a query to be significantly faster than the first
    execution.


    Caching is the largest factor in performance test inconsistency. When we run the
    query the first time, Oracle reads the table and index blocks from disk and stores
    the blocks in memory. The second time we run the query, the database can read
    the blocks with much faster memory access. Depending on our environment, we may
    want to test the system either “hot” or “cold.” On a data warehouse, where our
    large tables likely won’t be cached, testing a cold system is better. On an OLTP
    system, where popular tables should be in memory, testing a hot system is better.
    We can clear Oracle’s memory with the command `ALTER SYSTEM FLUSH BUFFER_CACHE`.
    But that command won’t clear the operating system cache, and we may not want to
    run it on a shared database where other users could be affected.


    Intermittent system activity can also spoil our thorough test cases. This is more
    of a problem on a shared database, but even our laptops may suddenly start running
    an antivirus scan and slow down. Instead of measuring system activity, which is
    difficult, we can run the tests multiple times and alternate between the competing
    approaches. Alternating between the different options will make it more obvious
    if the system suddenly gets faster or slower. We may also want to throw out the
    minimum and the maximum run times.


    Execution plans will also change over time. If we wait long enough, the system
    will likely automatically gather missing statistics. The Oracle optimizer is also
    able to learn from its mistakes and may use statistics feedback, adaptive cursor
    sharing, and SQL plan directives during the second or third run. (Those features
    are briefly discussed in Part IV.) Carefully check the `Note` section of the execution
    plan to see if there are any weird tricks being applied. To create a blank slate
    for testing, it is sometimes necessary to run `ALTER SYSTEM FLUSH SHARED_POOL`
    and to regather statistics. But as with flushing the buffer cache, we need to
    be careful running those commands if we’re running on a shared database.


    ## Oracle Detective Kit


    The first of E. F. Codd’s rules for relational databases is that a database must
    be able to manage itself entirely through a relational interface. In Oracle databases
    there is a wealth of information available about the database, and that information
    can be accessed through the database. When our tests inevitably need to look under
    the hood of our programs and schemas, we can use the data dictionary, dynamic
    performance views, Oracle packages and functions, and other Oracle tools.'
