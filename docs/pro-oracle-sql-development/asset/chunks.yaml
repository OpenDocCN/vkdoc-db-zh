    # Introduction


    This book will inspire you to write more powerful database queries, and it will
    set you on the path to becoming an Oracle SQL expert. This book is not a copy
    of the SQL Language Reference, will not quiz you about syntax trivia, and will
    not prepare you for an exam. But it will challenge the way you think about writing
    Oracle SQL. And I hope you have fun reading it.


    ## Why Learn More About Oracle SQL?


    Any database can *store* data, but Oracle is designed to help us *process* data.
    Many applications only treat the database as a glorified text file, and there
    are many opportunities to use SQL to improve our programs.


    Oracle SQL is a great programming language, and it has many advantages compared
    with other languages and SQL implementations:


    1. **Declarative**: Declarative languages let us tell the computer what we want,
    without having to specify how to do it. Declarative languages are different than
    traditional imperative languages and can be difficult at first. For example, whenever
    we find ourselves wanting to use a loop in SQL, that’s a clue we’re thinking in
    the wrong programming paradigm. SQL lets the compiler handle the implementation
    details, which leads to simpler and faster code.

    2. **Popular**: Oracle is one of the most popular databases, and SQL is one of
    the most popular programming languages.

    3. **Portable**: SQL and PL/SQL are entirely platform independent. Other than
    a rare bug, we never need to worry about which operating system is running our
    SQL.

    4. **Clear and concise**: The basic syntax is simple and readable, and the relational
    model is built on a few simple ideas. If this description doesn’t match your reality,
    Part III will explain how to make your code look better.

    5. **Interpreted**: Statements run immediately, without a separate compilation
    step. Integrated development environments (IDEs) can take advantage of interpreted
    languages and let us instantly run programs, debug our code, and get results.

    6. **Powerful**: Oracle SQL has enough features to solve almost any problem. For
    those rare exceptions, where we need to control precisely how our database code
    runs, we have well-integrated imperative options, such as PL/SQL, hints, and the
    `MODEL` clause.

    7. **Fast**: Oracle SQL is powerful enough to let us bring our algorithms to our
    data, instead of bringing our data to our algorithms. Ignore those shallow benchmarks
    that compare running `SELECT * FROM EMPLOYEE` a thousand times. Real-world performance
    depends on an optimizer choosing the right data structures and algorithms and
    a language that enables solving more problems with set-based processing, not the
    speed of repeatedly running trivial commands.


    Despite all those advantages, Oracle SQL is scandalously underused. There are
    huge opportunities to improve our systems by using SQL more often.


    ## Target Audience


    This book is for anyone who already knows Oracle SQL and is ready to take their
    skills to the next level. For those of you who are already skilled at Oracle SQL,
    this book will give you a different way to think about the language.


    There are many groups of people who frequently use Oracle databases. Their reasons
    for using the database may differ, but they can all benefit from improving their
    SQL knowledge.


    1. **Database developers**: If you’re already frequently using an Oracle database,
    then you have the most to gain from this book. Even if you already know many of
    the advanced features, you will still benefit from the discussions about setting
    up the environment, SQL programming styles, and SQL performance tuning.

    2. **Application/front-end/full-stack developers**: Many applications only use
    simple queries, like `SELECT * FROM EMPLOYEE`, or have a framework that automatically
    takes care of database access. This book won’t try to convince you to put all
    your business logic inside the database. But it will help you find great opportunities
    to simplify your code and improve performance, by using new SQL programming styles
    and advanced features.

    3. **Data analysts and testers**: Oracle SQL is the perfect language for analyzing,
    testing, and comparing data. Much of the advice in this book will help with those
    tasks.

    4. **Data scientists**: You probably won’t use Oracle SQL for data mining and
    machine learning (although Oracle does have tools for those tasks). But if your
    data is stored in an Oracle database, Oracle’s advanced features can at least
    help you efficiently extract, preprocess, and format data.

    5. **Database administrators**: SQL is the lifeblood of an Oracle database. If
    you administer Oracle, you’ll need to work with SQL statements and help others
    improve them. And there are many times when an advanced SQL statement can help
    you perform administrative tasks better.'
