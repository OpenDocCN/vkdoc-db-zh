    ### 左外连接与右外连接


    接下来最常见的连接类型是左外连接和右外连接。这些连接使我们能够从一个表中检索所有行，以及另一个表中满足条件的任何匹配行。左外连接和右外连接是相同的操作，只是方向相反。在实践中，大多数人只使用左外连接。驱动连接的表列在最前面，然后左连接到可选的表。


    例如，以下是如何检索所有火箭发射及其相关卫星（如果有）的方法：


    ```sql

    select *

    from launch

    left outer join satellite

    on launch.launch_id = satellite.launch_id;

    ```


    由于左连接始终是外连接，因此关键字 `OUTER` 并非必需：


    ```sql

    select *

    from launch

    left join satellite

    on launch.launch_id = satellite.launch_id;

    ```


    或者，查询可以使用 Oracle 的 `(+)` 操作符来构建。`(+)` 操作符的意思是“这是条件中的可选部分”。这种老旧的语法强烈不推荐使用。但我们必须熟悉它，因为人们仍在使用它，并且在少数罕见情况下，Oracle
    要求使用它。这种语法将在第[7]章中更详细地讨论：


    ```sql

    select *

    from launch, satellite

    where launch.launch_id = satellite.launch_id(+);

    ```


    将查询从左外连接更改为右外连接很简单。只需将关键字 `LEFT` 改为 `RIGHT`，或者将 `(+)` 放在条件的另一边。从左连接更改为右连接将使查询返回所有卫星，即使它们没有匹配的
    `LAUNCH_ID`。这将包括“未知碎片”卫星。右连接查询是前述左连接的简单变体，因此不再展示。


    （如果你对数据集中包含碎片感到烦恼，你并不孤单。在最坏的情况下，这可能是所谓的凯斯勒综合症的开始。如果不负责任的卫星运营商没有妥善处理他们的卫星，或者他们用反卫星导弹将其炸毁，碎片可能会级联增加，从而增加更多碰撞的机会。最终，某些轨道可能变得无法使用。）


    ### 全外连接


    全外连接返回两个表中的所有行。例如，以下三个查询返回所有发射记录（包括没有卫星的）和所有卫星（包括没有发射记录的）。与其他连接类型类似，`outer` 关键字是可选的，在第二个查询中未包含。请注意，第三个查询是无效的——老旧的
    `(+)` 语法在这里不适用。我们必须使用现代的 ANSI 连接语法来实现全外连接：


    ```sql

    --包含可选 "outer" 关键字的全外连接。

    select *

    from launch

    full outer join satellite

    on launch.launch_id = satellite.launch_id;

    --省略可选的 "outer" 关键字。

    select *

    from launch

    full join satellite

    on launch.launch_id = satellite.launch_id;

    --此写法无效。它会引发异常：

    --ORA-01468: a predicate may reference only one outer-joined table

    select *

    from launch, satellite

    where launch.launch_id(+) = satellite.launch_id(+);

    ```


    ### 交叉连接


    交叉连接，也称为笛卡尔积，返回两个表的所有可能组合。这种连接类型很少见，通常仅在需要生成额外行的复杂查询中使用。


    大多数交叉连接是偶然发生的，要么是因为我们忘记连接表，要么是因为不理解数据而连接不足。没有理由在我们的发射和卫星数据上使用交叉连接，因此以下交叉连接查询将运行很长时间并返回三十亿行无意义的数据。


    ```sql

    --ANSI 连接语法：

    select *

    from launch

    cross join satellite;

    --旧式语法：

    select *

    from launch, satellite;

    ```


    > **警告**

    >

    > 如果对以上内容有任何不理解，请停下来重新阅读本节。直到你熟练使用连接之前，你将永远无法在 Oracle SQL 中发挥全部潜力。


    ### 总结


    在简要介绍了关系模型、Oracle 和 SQL 的历史，并回顾了两个关键概念之后，我们已准备好创建我们的开发环境。虽然关系模型的许多细节并不重要，但在开发过程中，我们应始终牢记几条规则——避免在列中存储值列表，并避免数据重复。SQL
    是关系数据的主要语言，我们在数据库中创建的一切都应易于在 SQL 中使用。数据库种类繁多，甚至使用 Oracle 数据库的方式也各有不同；我们讨论的功能和风格并非都适合你的环境。在继续创建开发流程之前，深刻理解
    `NULL` 和连接至关重要。


    脚注 1 2 3 4 5 6 7 8 9


    # 2. 创建高效的数据库开发流程


    大多数 Oracle 数据库开发环境的设置就像一个易碎的瓷器店。有一个必须不惜一切代价维持的复杂结构，最微小的变化都可能破坏东西并阻止每个人工作。没有人确切知道数据库是如何变成现在这个样子的，而且每个人都担心当它崩溃时不知道如何修复它。典型的
    Oracle 数据库开发流程远远落后于行业规范。本章展示了一种更好的工作方式。有一些简单的流程可以帮助我们创建、扩展、实验和学习，而不会打断其他人。


    本章不讨论整个软件开发生命周期或敏捷与瀑布模型。如果不建立正确的基础流程，谈论采用敏捷或其他高层流程是毫无意义的。本章专注于低级别的数据库概念：创建数据库、创建数据库对象，然后管理这些对象。

    '
- fmt: '## Shared Database vs. Private Database


    There are two main approaches to Oracle database development. The most common
    approach is to create a shared database server for development. Multiple developers
    work on the same database at the same time and possibly even in the same schema.
    The less common approach is to create a private database for each developer. I
    strongly advocate private database development for most projects.


    This chapter does not discuss the shared database approach in detail. Shared database
    development is the default choice for most Oracle projects, and setting up those
    environments is a topic for database administrators (DBAs).


    There are times when shared database development may be a good choice. For example,
    if we have a small development team or a relatively static application or a process
    that has been in place for a long time, shared database development may be good
    enough. And there are technologies we can use to improve shared database development.
    But no technology can erase the sociological difference between the two models.
    Shared database development is ultimately controlled and limited by administrators,
    and private database development is ultimately controlled by developers.


    Believe it or not – and I know that most of you do not – private database development
    works wonderfully. For SQL developers who have worked on shared systems for decades,
    it’s hard to imagine simply getting rid of all that infrastructure and administration.
    A new development style is something we have to see to believe. My goal is just
    expose you to new ideas and convince you to keep an open mind.


    It can be scary at first to rethink the way we deal with environmental differences,
    security, testing, sample data, licensing, performance, and deployments. Most
    of those concerns will be addressed later in this chapter, and you can rest assured
    that many successful organizations and projects have solved these issues before.


    We still probably need to keep some shared servers around, for different kinds
    of testing. But I’ve worked on many projects where over 90% of the database development
    and testing was done on Oracle databases installed on laptops.


    There are many things to consider when we make the important decision on how to
    set up our development process. We have to make several trade-offs. The rest of
    this chapter only discusses the private database development model, because I
    believe the trade-offs can be summarized as follows: it’s better to have full
    control over an imperfect copy of production than to have almost no control over
    a perfect copy of production.


    ## Create an Infinite Number of Databases


    The first step in building an Oracle database solution is to create a system where
    everyone has an unlimited number of databases and unlimited privileges on those
    databases.


    ### Advantages of Private Databases


    Few Oracle shops use private databases, but it is not a radical idea. Java programmers
    don’t share a compiler and don’t worry that someone else is compiling a package
    at the same time. C programmers aren’t limited to building only one executable
    at a time and don’t worry about overwriting someone else’s work. JavaScript programmers
    don’t have to ask someone’s permission to use a function that is a default part
    of the language. Application developers almost always have access to the near-infinite
    capabilities of their programming languages. Why shouldn’t Oracle developers have
    the same power?


    There are many advantages to developing on private databases instead of a single,
    shared server:


    1. `Create, learn, and experiment`: Innovation does not ask permission; it is
    spontaneous, fleeting, and disruptive. On a shared server, we can’t modify certain
    objects, or we need to ask someone’s permission, or we need to warn the rest of
    the team. But we don’t want to be embarrassed by our potentially stupid ideas.
    And we can’t have good ideas unless we’re allowed to have stupid ideas first.
    To thrive, developers need freedom and privacy. Even the slightest barrier to
    entry can prevent innovation and squash that first spark of an idea. This is especially
    true for new developers who don’t yet have the confidence to try new things.


    2. `Work in parallel`: With an unlimited number of databases, we can have an unlimited
    number of versions. Even for internal projects with only one customer, it’s important
    to support multiple versions. We should never limit ourselves to only being able
    to develop a small number of versions at the same time.


    3. `Standard configuration`: If it’s not automated, it’s not standardized. Shared
    servers with artisanal configuration will inevitably drift, due to the different
    people using and changing them.


    4. `Data`: Free yourself from large data sets. Developing against large production
    data sets is used as a crutch to make up for a lack of meaningful test data. Artificially
    created test data is smaller, more secure, and more useful than production data.
    There are certainly times when we need to test against large data sets, but most
    of our development is faster with smaller test data and smaller feedback loops.
    This topic is discussed in more detail in Chapter [3](#471418_2_En_3_Chapter.xhtml).


    5. `Security`: If it’s not automated, it’s not secure. Manual audits and scans
    are a hassle. Audits are so difficult that we subconsciously make excuses for
    issues and spend a long time between audits. Security parameters, patches, and
    hardening programs must be automated to maintain security. Private instances can
    be thoroughly locked down, making them more secure than shared environments. For
    example, in the `listener.ora` file, set `HOST = LOCALHOST`, and no external users
    can connect to the database. If nothing is shared and there is no sensitive data,
    there are fewer privilege concerns. If we all have DBA access on our private databases,
    we have a place to test security features, such as granting roles and creating
    users. However, elevated access on private databases isn’t an excuse to ignore
    security. Elevated access gives developers the responsibility to practice security
    early and often. This will create more initial work for developers, as they must
    be aware of what elevated privileges are not available in higher environments.
    But that extra work is a long-term investment. We cannot solely rely on administrators
    to harden things later.'
