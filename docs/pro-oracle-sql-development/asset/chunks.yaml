  trans: '

    ### 块与行级锁定


    所有列和行都必须容纳在**块**中。块是 Oracle 读取操作的原子单位。尽管我们可能只关心单行数据，但数据总是至少以块为单位进行读取。块的默认大小为 8
    千字节，因此，即使我们只想获取 1 字节的数据，Oracle 也总是至少读取 8 千字节。（操作系统和存储设备也可能读写更大的数据块。）块会从多个方面影响我们数据库的性能和行为。


    基本表压缩是按块完成的。每个块都包含有关常见值的元数据，通过不重复存储这些常见值，块可以节省空间。如果同一个值重复出现，但距离前一个值超过 8 千字节，则该值不会被压缩。但如果表按某一列排序，重复值会彼此相邻出现，压缩率就会提高。如果我们的
    `INSERT` 语句还包含 `ORDER BY` 子句，就能显著减小压缩表的大小。


    块大小是可配置的，但我们不应更改它。关于块大小存在很多误解。我从未见过可复现的测试用例能证明更改块大小可以提升性能。但我见过许多系统存在令人困惑的混合块大小以及错误设置的参数。无论如何，更改块大小无助于大容量读取；Oracle
    会调整 `DB_FILE_MULTIBLOCK_READ_COUNT` 参数，使其不超过操作系统最大值。除非你愿意花费大量时间进行研究和测试，否则请不要使用自定义块大小。


    `PCTFREE` 参数控制新块中保留多少可用空间，默认为 10%。保留少量可用空间非常重要，可以防止行迁移。如果块被完全填满，增加哪怕一个字节都将需要移动整行。如果表是只读的，并且行永远不会移动，那么将
    `PCTFREE` 更改为 0 可以节省空间。


    按块检索数据解释了为什么索引的性能不如我们期望的那样好。我们的 SQL 语句可能只选择了所有行的 1%，但如果不巧，这 1% 的数据分散在 100% 的表块中。Oracle
    可能不得不读取表的大部分内容来获取一小部分行。这个问题由**聚簇因子**来体现。与压缩类似，我们可以通过按特定顺序向表中插入数据来改善这种情况。但如果我们有多个索引，可能只能改善其中少数几个的聚簇因子。


    Oracle 的行级锁定是在块内部实现的。每当事务更改一行时，该行就会被锁定，直到事务提交或回滚。同一时间只有一个事务可以修改同一行。锁并非存储在单独的表中——锁定信息与数据块存储在一起。每个块都有一个**Interested
    Transaction List (ITL)**，记录哪个事务正在修改哪一行，以及指向相关撤消（undo）数据的指针。


    这种行级锁定架构意味着没有简单的方法来找出哪些行被锁定了。由于锁信息存储在每个表内部，Oracle 必须读取整个表才能知道哪一行被锁以及被谁锁定。而且 Oracle
    只存储锁定行的事务，而不是具体的语句。当我们遇到锁问题时，应该问是*谁*阻塞了我们的语句，而不是*什么*阻塞了我们的语句。以下查询是一种找出谁在阻塞会话的简单方法：


    ```sql

    --Who is blocking a session.

    select final_blocking_session, gv$session.*

    from gv$session

    where final_blocking_session is not null

    order by gv$session.final_blocking_session;

    ```


    一旦我们找到了阻塞会话，就很容易弄清楚谁拥有该会话、他们在做什么以及他们是如何锁定该行的。存在许多复杂的锁定场景、隐藏参数、锁定模式和其他细节。但大多数情况下，当我们的行被锁定时，意味着其他人正在更新该行并忘记提交他们的事务。


    ### 区


    **区**是属于同一个段的一组块。Oracle 可能一次修改一个块的数据，但 Oracle 分配新空间是一次分配一个区。有两种算法用于决定每个区分配多少个块；我们可以让
    Oracle 通过 `AUTO` 来决定，或者我们自己用 `UNIFORM` 选择一个静态大小。


    我们应该使用默认值 `AUTO`，除非我们有极端情况，否则无需担心此设置。例如，如果我们有成千上万个微小对象或分区，可能希望通过创建一个较小的统一大小来节省空间（尽管如果我们有那么多对象，我们可能还有其他问题，需要重新思考我们的设计）。只要我们在创建表和表空间时不胡乱调整区设置，区就没什么好担心的。


    ### 段


    **段**是一组区的集合。段是一个逻辑对象的整个存储结构，尽管“对象”的定义可能有点复杂。这些对象最常见的是表和索引，但也可以包括簇、物化视图、LOB、分区和子分区等。段通常是回答有关对象大小问题的最佳存储结构，但计算可能很棘手，尤其是在涉及已删除对象时。


    重要的是要理解，一个段一次只适用于一个逻辑对象。分配给一个表段的空间不能被另一个表使用。例如，如果我们用一个大表填满一个段，然后删除该表中的所有行，则该段中的空间不能被任何其他对象使用。未使用的空间就是为什么
    `TRUNCATE` 命令如此重要。每个段都有一个**高水位标记**，用于标记该段已使用的最大空间量。高水位标记很容易升高，但需要 DDL 命令来缩小。段中的空闲空间在通过像
    `TRUNCATE` 这样的命令重置高水位标记之前，并不是真正的空闲空间。


    要完美地度量我们的数据大小是不可能的。这项任务的难度起初看起来很荒谬。数据只是 0 和 1。计算它们不应该是轻而易举的事吗？问题在于定义“数据”的方式有很多种。使用
    `DBA_SEGMENTS.BYTES` 很容易包含表数据。但由于 LOB 不存储在表中，我们至少应该使用 `DBA_LOBS` 来查找相关的 LOB 段。如果我们还想计算索引，应该使用
    `DBA_INDEXES` 来查找相关的索引段。但默认答案会包含块和段中的空闲空间，并且会度量压缩后的大小。考虑到所有这些变量，我们得出的任何数字都永远不会与我们的数据文本文件的大小相匹配。通常最好承认答案不会完美，就直接使用所有相关段大小的总和。


    当我们想要度量或移除空间时，还需要考虑**回收站**。已删除的对象从我们的应用程序中消失了，但如果未使用 `PURGE` 选项，这些对象可能不会完全消失。相反，与对象相关的段可能被加上了
    `BIN$` 前缀，以标记它们处于回收站中。Oracle 会根据“空间压力”自动从回收站中移除最旧的对象。空间压力发生在系统空间不足时。但标准并不明确；旧版手册语焉不详，新版手册则完全未讨论空间压力。为安全起见，我们应该尽可能清除对象。可以使用
    `PURGE` 选项永久删除数据对象，或者可以使用诸如 `PURGE USER_RECYCLEBIN` 或 `PURGE DBA_RECYCLEBIN` 的命令。


    其他非永久段类型包括重做（redo）、撤消（undo）和临时表空间。这些段类型将在本章其他地方讨论。

    '
- fmt: '### Data Files


    Data files are the physical storage structure for all data and are exactly what
    they sound like – files on the operating system. Data files are not truly parents
    of segments, so the hierarchical model used in this chapter is not perfect. A
    large table segment can span multiple data files. But in practice, data files
    tend to be much larger than segments.


    Unfortunately, adding data files is something that SQL developers need to be aware
    of. Adding data files is a database administration task, but it is frequently
    done wrong and causes problems. The following is a simple example of adding a
    data file:


    ```

    --Add data file.

    alter tablespace my_tablespace add datafile ''C:\APP\...\FILE_X.DBF''

    size 100m

    autoextend on

    next 100m

    maxsize unlimited;

    ```


    The first line of the preceding example is pure database administration. Finding
    the tablespace name, the directory (or the ASM disk group), and the file name
    depends on our system configuration. It’s the last four lines that are important
    to developers and worth a brief discussion. There is no performance advantage
    to creating initially large data files, so starting with a small `SIZE 100M` can
    save space, especially in large environments with many data files. We almost always
    want to increase the size of the data files as our data grows, so `AUTOEXTEND
    ON` is an easy choice. We want our data files to grow at a reasonable pace, and
    `NEXT 100M` is a good size. If we set the next clause to `1`, that will cause
    horrible performance problems since the system will have to extend the data file
    for every 8 KB of data. On the other hand, we don’t want to set the next clause
    too high and waste space. And we might as well use as much space as possible,
    so setting `MAXSIZE UNLIMITED` is also a good default.


    Another important decision is how many data files to add. As developers, we are
    responsible for providing an initial estimate of the data size. But we also need
    to recognize that our estimate will be wrong. If possible, we should try to set
    up rules for how to grow the data files. A good rule is to always double the number
    of data files. If we follow the preceding settings, adding extra data files is
    almost free. Doubling the number of data files doesn’t hurt anything, and it provides
    lots of breathing room.


    This data file discussion may feel irrelevant to the job of a SQL developer. But
    it’s worth thinking about space growth ahead of time. Running out of space is
    the most common reason for Oracle outages. Nothing is more frustrating than having
    terabytes of space allocated, yet watching an application fail because one data
    file wasn’t set to grow or watching the application repeatedly fail because a
    DBA adds one data file at a time, instead of doubling the number of data files.


    There are other ways to ensure we don’t run out of space. For example, we can
    use a single bigfile data file instead of multiple smallfiles. Once again, as
    SQL developers we may not particularly care about those details. Whatever approach
    our DBAs choose, we need to ensure that there is a system in place to not frequently
    run out of space.


    Data files also have a high-water mark, and we may need to occasionally defragment
    our data files. Defragging above the high-water mark is easy, but it can be painful
    to defrag below the high-water mark. If we clean up a lot of objects, but are
    still wasting space on large data files, we need to talk to our DBAs. But don’t
    be surprised if our DBAs tell us we can’t easily reclaim the space.


    ### Tablespaces


    Tablespaces are logical collections of segments and have one or more data files.
    Tablespaces are used to group together storage, typically for an application or
    specific type of data.


    Every object with permanent data can be assigned to a different tablespace. But
    we don’t want to have to worry about the tablespace for every table. The simplest
    way to manage storage is to create one tablespace per user and let every object
    in that schema use the default tablespace. Managing the database is easier with
    fewer tablespaces. The more tablespaces we have, the more likely one of our tablespaces
    will run out of space and break things. On the other hand, we don’t want to use
    only *one* tablespace; a runaway application could fill up the tablespace and
    break the entire database.


    Many utilities and features can work per tablespace, such as data pump import
    and export, backup, and transportable tablespaces. Transportable tablespaces let
    us copy and paste data files between servers, to quickly move data. If we have
    a set of large tables that we want to frequently copy, it may help to isolate
    those tables in a tablespace.


    Oracle comes with the default tablespaces `SYSTEM`, `SYSAUX`, `USERS`, `UNDOTBS1`,
    and `TEMP`. The `SYSTEM` and `SYSAUX` tablespaces are for system-generated objects,
    and we should avoid storing anything in these tablespaces. When a tablespace is
    full, the application that writes to that tablespace is going to break; if `SYSTEM`
    or `SYSAUX` is full, the entire database breaks. The `USERS` tablespace is helpful
    for ad hoc users but shouldn’t be shared with applications. We don’t want a user’s
    ad hoc table to consume all the space and break our application. `UNDOTBS1` unsurprisingly
    holds undo data, as described earlier in this chapter. The `TEMP` tablespace will
    be discussed later in this chapter.


    ### Automatic Storage Management


    Automatic Storage Management (ASM) is an Oracle tool to manage file systems inside
    a database, instead of using the operating system. SQL and administrative commands
    can reference a single disk group name instead of using operating system directories
    and files. Oracle can take care of things like striping, mirroring, file locations,
    etc. ASM can help with performance and reliability and can enable technologies
    like Real Application Clusters (RAC). ASM mostly affects administrators, but it
    may also impact SQL development in minor ways.


    ASM has a huge footprint – it requires another database installation and instance.
    If we’re setting up a personal sandbox, creating a separate ASM database is not
    worth the trouble.


    Although ASM is a separate database, we rarely need to directly connect to it.
    Our regular databases automatically connect to the ASM instance. If we want to
    write queries to find the space available, instead of looking at data files and
    the operating system, we need to look at data dictionary views such as `V$ASM_DISKGROUP`.


    We have to be careful to avoid duplicates when querying the ASM data dictionary.
    Each database returns the ASM information for *all* the databases connected to
    that ASM instance. If we want to query and aggregate data from all of our ASM
    instances, we need to only query from one database per ASM instance. Depending
    on how ASM is set up, those queries can be tricky. But usually there is one ASM
    database per host or one ASM database per cluster.'
