  trans: "## 高级分组\n\nOracle SQL 提供了许多选项来帮助我们对数据进行分组并聚合结果。本书假定您已熟悉基本的分组概念，因此让我们从一个简单示例开始，然后逐步扩展。让我们按发射工具系列和发射工具名称统计轨道发射和深空发射的次数：\n\
    \n```\n-- 统计每个系列和名称的发射次数。\nselect lv_family_code, lv_name, count(*)\nfrom launch\n\
    join launch_vehicle\non launch.lv_id = launch_vehicle.lv_id\nwhere launch.launch_category\
    \ in ('orbital', 'deep space')\ngroup by lv_family_code, lv_name\norder by 1,2,3;\n\
    LV_FAMILY_CODE  LV_NAME    COUNT(*)\n--------------  ---------  --------\nASLV\
    \            ASLV              4\nASLV            SLV-3             4\nAngara\
    \          Angara A5         1\n...\n```\n\n结果已排序，首先是增强型卫星运载火箭（`ASLV`，一种来自 1980\
    \ 年代的印度火箭）和 `Angara`（一种新型俄罗斯火箭）。这种简单类型的分组对于大多数查询来说已经足够。有时我们可能需要使用 `HAVING` 子句来限制结果。例如，如果我们只想查看最受欢迎火箭的发射次数，可以在\
    \ `WHERE` 和 `ORDER BY` 子句之间添加这行代码：`HAVING COUNT(*) >= 10`。请注意，`HAVING` 条件不能引用\
    \ `SELECT` 子句中的别名，因此我们可能需要复制我们的逻辑。\n\n### ROLLUP, GROUPING SETS, CUBE\n\n更复杂的报告需要多级分组。让我们扩展前面的示例。除了按系列和名称统计发射次数外，我们还想仅按系列统计次数，以及获得一个总计。`ROLLUP`\
    \ 语法让我们可以在同一个查询中执行多次分组。`ROLLUP` 从最详细的级别（列表中最右边的列）开始，并不断为左侧的每一列添加小计：\n\n```\n--\
    \ 按系列和名称、仅按系列以及总计统计发射次数。\nselect\nlv_family_code,\nlv_name,\ncount(*),\ngrouping(lv_family_code)\
    \ is_family_grp,\ngrouping(lv_name) is_name_grp\nfrom launch\njoin launch_vehicle\n\
    on launch.lv_id = launch_vehicle.lv_id\nwhere launch_category in ('orbital', 'deep\
    \ space')\ngroup by rollup(lv_family_code, lv_name)\norder by 1,2,3;\nLV_FAMILY_CODE\
    \  LV_NAME  COUNT(*)  IS_FAMILY_GRP  IS_NAME_GRP\n--------------  -------  --------\
    \  -------------  -----------\nASLV            ASLV            4             \
    \ 0            0\nASLV            SLV-3           4              0           \
    \ 0\nASLV                            8              0            1\nAngara   \
    \       Angara A5       1              0            0\n...\n                 \
    \             5667             1            1\n```\n\n前面的结果显示了多级分组，包括底部的总计。空值指示了每行中哪些列被聚合。例如，第三行的\
    \ `LV_NAME` 为空，因为该行显示了整个 `ASLV` 系列所有值的总计。\n\n要分辨哪些行是小计并不总是容易的。Oracle 提供了多种方法来区分行的分组级别。可以使用函数\
    \ `GROUP_ID`、`GROUPING` 或 `GROUPING_ID` 精确确定每行的组级别。`GROUPING` 是最容易使用的——该函数返回 `1`\
    \ 或 `0`，以指示该行是否是特定列集的组。该函数在前面的结果中用于生成 `IS_FAMILY_GRP` 和 `IS_NAME_GRP` 列。可用于告诉我们分组级别的列，可用于过滤掉不需要的行或更改显示以强调总计。`GROUP_ID`\
    \ 和 `GROUPING_ID` 功能更强大，但也更难使用。这两个函数返回一个编码数字来区分行类型。\n\n除了 `ROLLUP`，Oracle 还提供\
    \ `CUBE` 和 `GROUPING SETS` 来定义更多类型的分组。`CUBE` 对所有列组合进行分组，而 `GROUPING SETS` 让我们指定多个集合进行分组。这些分组函数可能很快变得复杂，因此我不打算再展示更多庞大的示例。如果我们发现自己正在创建多个汇总查询并使用\
    \ `UNION ALL` 将它们连接起来，我们应该寻找一个高级分组函数来简化我们的代码。\n\n数据分组后，每组内的值需要使用适当的聚合函数进行组合。大多数聚合可以通过\
    \ `MIN`、`MAX`、`AVG`、`SUM` 和 `COUNT` 的组合来满足。对于不同类型的操作，还有更多聚合函数可用。并且所有聚合函数都可以使用表达式，例如\
    \ `CASE` 表达式，使其功能更加强大。\n\n聚合查询返回的每列都必须在 `GROUP BY` 子句中，或者具有聚合函数，或者是一个字面量。这条规则有时会导致查询中出现逻辑上冗余的分组。例如，假设我们想将发射工具分类\
    \ `LAUNCH_VEHICLE.LV_CLASS` 添加到前面的查询中。该列对于每个组将始终返回相同的值，但 Oracle 并不知道这一点。我们需要将该列添加到\
    \ `GROUP BY` 子句中，或者在列前添加一个无意义的聚合函数，如 `MAX`。从 Oracle 21c 开始，如果我们想避免额外分组的开销并使代码更清晰，我们可以使用表达式\
    \ `ANY_VALUE(LV_CLASS)`。但我们必须充分了解我们的数据，否则该表达式可能会返回意外的值。\n\n### LISTAGG\n\n`LISTAGG`\
    \ 用于聚合字符串，这个函数过去几十年来在 Oracle 中一直令人遗憾地缺席。过去，每个 Oracle 开发人员都必须为自己创建自定义的字符串聚合解决方案。有很多旧代码和旧论坛帖子讨论了聚合字符串的不同策略：`CONNECT\
    \ BY`、`MODEL`、Oracle 数据插件、`COLLECT`、未公开的函数如 `WM_CONCAT` 等等。所有这些代码都不再需要了。如果我们需要生成一个逗号分隔的字符串列表，我们应该始终使用\
    \ `LISTAGG`。\n\n例如，此查询显示 `Ariane` 火箭系列中所有火箭的名称，并按字母顺序列出名称：\n\n```\nselect\nlv_family_code,\n\
    listagg(lv_name, ',') within group (order by lv_name) lv_names\nfrom launch_vehicle\n\
    where lower(lv_family_code) like 'ariane%'\ngroup by lv_family_code\norder by\
    \ lv_family_code;\nLV_FAMILY_CODE  LV_NAMES\n--------------  --------\nAriane\
    \          Ariane 1,Ariane 2,Ariane 3,Ariane 40,...\nAriane5         Ariane 5ECA,Ariane\
    \ 5ES,Ariane 5ES/ATV,...\n```\n\n创建字符串列表是一项常见任务，并且可能有许多棘手的要求。如果字符串可能超过 4000 字节的限制，我们可能需要添加\
    \ `ON OVERFLOW TRUNCATE` 选项。（如果我们确实需要聚合超过 4000 字节，可以在网上查找使用 `XMLAGG` 或 `ODCI`\
    \ 的高级解决方案。）如果我们想返回唯一值并且使用的是 19c 或更高版本，我们可以添加 `DISTINCT` 关键字。但如果我们有更复杂的要求或被困在旧版本的数据库上，我们总是可以使用多个内联视图在聚合之前预处理数据。"
- fmt: '### Advanced Aggregate Functions


    `COLLECT` 函数在我们需要聚合“任何内容”时非常有用。`COLLECT` 函数与 `CAST` 函数协同工作，将一组值转换为单个嵌套表。然后，该嵌套表可以传递给自定义的
    PL/SQL 函数进行进一步处理。`COLLECT` 为我们提供了对聚合的完全控制权。`COLLECT` 和自定义 PL/SQL 函数在第 [21] 章中简要讨论。


    聚合函数也有 `FIRST` 和 `LAST` 模式。当我们想找到最小值或最大值，但希望基于另一列来定义这个最小值或最大值时，这些模式非常有用。例如，让我们比较发射远地点——即距离地球的最远距离。对于每个运载火箭家族，我们想找到第一次发射的远地点。我们将
    `APOGEE` 列传递给 `MIN` 函数，但我们希望基于 `LAUNCH_DATE` 来计算最小值：


    ```sql

    --For each family find the first, min, and max apogee.

    select

    lv_family_code,

    min(launch.apogee) keep

    (dense_rank first order by launch_date) first_apogee,

    min(launch.apogee) min_apogee,

    max(launch.apogee) max_apogee

    from launch

    join launch_vehicle

    on launch.lv_id = launch_vehicle.lv_id

    where launch.apogee is not null

    group by lv_family_code

    order by lv_family_code;

    LV_FAMILY_CODE  FIRST_APOGEE  MIN_APOGEE  MAX_APOGEE

    --------------  ------------  ----------  ----------

    10KS2500                  10          10          10

    48N6                      40          40          40

    A-350                     10           0         300

    ...

    ```


    结果显示，第一次远地点通常与最小值相同。这个结果是有道理的——在测试运载火箭时，最好从小规模发射开始。但对于反弹道导弹 A-350，第一次发射比最小发射距离更远。这种差异是因为一些后续发射失败，远地点为
    0。


    ## Analytic Functions


    分析函数，也称为窗口函数，可以显著增强 SQL 语句的能力。到目前为止，我们看到的运算符、函数、表达式和条件都在两个层面上操作——针对每一行或针对组中的所有行。分析函数让我们能够结合这两个层面。使用分析函数，我们可以为每一行计算一个值，但该值是基于一个数据窗口的。像累计总和和移动平均值这样的计算最适合用分析函数来完成。分析函数的语法可能相当复杂，我们偶尔需要查阅手册中的语法图，但最常见的用法类似于
    `ANALYTIC_FUNCTION(ARGUMENTS) OVER (PARTITION_CLAUSE ORDER_BY_CLAUSE WINDOWING_CLAUSE)`。


    ### Analytic Function Syntax


    有许多分析函数可供选择，包括几乎所有前面讨论过的聚合函数。`AVG`、`COUNT`、`LISTAGG`、`MIN`、`MAX` 和 `SUM` 既可以作为聚合函数，也可以作为分析函数使用。最流行的分析函数是
    `DENSE_RANK`、`RANK`、`LAG`、`LEAD` 和 `ROW_NUMBER`。这些函数将在本节后面的示例中展示。


    分析函数的参数可以是任何有效的表达式，并且可以涉及列、运算符等。`CASE` 表达式是聚合和分析函数的常见参数。例如，我们可以创建一个条件求和表达式，如 `SUM(CASE
    WHEN X = ''Y'' THEN 1 ELSE 0 END)`。但是，某些分析函数，如 `ROW_NUMBER`，不接受任何参数，函数名后有一对空括号。


    `PARTITION` 子句定义了分析函数的组或窗口。该子句是一个列或表达式的列表，类似于我们可能在 `GROUP BY` 子句中使用的列或表达式列表。如果我们想使用*所有*行（例如，为每行显示总计），只需将
    `PARTITION` 子句留空即可。


    `ORDER BY` 子句定义了行的处理顺序。例如，在累计总和中，值必须按特定顺序累加。该子句也是一个逗号分隔的列或表达式列表。与 `PARTITION`
    子句类似，我们有时可以将 `ORDER BY` 子句留空，表示顺序无关紧要。


    `WINDOWING` 子句不太常见。该子句允许我们指定一组更精确的行，也称为窗口。在 `PARTITION BY` 子句指定了一个组之后，`WINDOW`
    子句可以进一步缩小范围。例如，一个常见的 `WINDOWING` 子句是 `ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT
    ROW`。这个子句比较复杂，这里不做充分解释。如果你在编写查询时希望指定当前行之前或之后的 X 行，请查阅手册中的完整语法。'
  raw: '### Advanced Aggregate Functions


    The `COLLECT` function is useful when we need to aggregate “anything.” The `COLLECT`
    function works together with the `CAST` function to take a bunch of values and
    convert those values into a single nested table. That nested table can then be
    passed to a custom PL/SQL function for further processing. `COLLECT` gives us
    complete control over aggregation. `COLLECT` and custom PL/SQL functions are briefly
    discussed in Chapter [21](#471418_2_En_21_Chapter.xhtml).


    Aggregate functions also have a `FIRST` and a `LAST` mode. Those modes are useful
    when we want to find the minimum or maximum value, but we want to define the minimum
    or maximum based on a different column. For example, let’s compare launch apogees
    – the furthest distance from Earth. For each launch vehicle family, let’s find
    the first launch apogee. We pass the column `APOGEE` to the `MIN` function, but
    we want to calculate the minimum based on `LAUNCH_DATE`:


    ```

    --For each family find the first, min, and max apogee.

    select

    lv_family_code,

    min(launch.apogee) keep

    (dense_rank first order by launch_date) first_apogee,

    min(launch.apogee) min_apogee,

    max(launch.apogee) max_apogee

    from launch

    join launch_vehicle

    on launch.lv_id = launch_vehicle.lv_id

    where launch.apogee is not null

    group by lv_family_code

    order by lv_family_code;

    LV_FAMILY_CODE  FIRST_APOGEE  MIN_APOGEE  MAX_APOGEE

    --------------  ------------  ----------  ----------

    10KS2500                  10          10          10

    48N6                      40          40          40

    A-350                     10           0         300

    ...

    ```


    The results show us that the first apogee is usually the same as the minimum.
    That result makes sense – when testing a launch vehicle, it’s best to start with
    small launches. But for the anti-ballistic missile A-350, the first launch went
    further than the minimum launch. That difference is because some of the later
    launches failed and had an apogee of 0.


    ## Analytic Functions


    Analytic functions, also known as window functions, can significantly improve
    the power of our SQL statements. So far, we have seen operators, functions, expressions,
    and conditions operate on two levels – for every row or for all the rows in a
    group. Analytic functions let us combine those two levels. With analytic functions
    we can calculate a value per row, but that value is based on a window of data.
    Calculations like running totals and moving averages are best done with analytic
    functions. Analytic function syntax can be quite complicated, and we need to occasionally
    use the syntax diagrams in the manual, but the most common usage looks like `ANALYTIC_FUNCTION(ARGUMENTS)
    OVER (PARTITION_CLAUSE ORDER_BY_CLAUSE WINDOWING_CLAUSE)`.


    ### Analytic Function Syntax


    There are many analytic functions to choose from, including almost all of the
    aggregate functions previously discussed. `AVG`, `COUNT`, `LISTAGG`, `MIN`, `MAX`,
    and `SUM` can operate as either aggregate or analytic functions. The most popular
    analytic functions are `DENSE_RANK`, `RANK`, `LAG`, `LEAD`, and `ROW_NUMBER`.
    Those functions are shown in examples later in this section.


    The arguments to analytic functions can be any valid expression and can involve
    columns, operators, etc. `CASE` expressions are a common argument for aggregate
    and analytic functions. For example, we can create a conditional sum with an expression
    like `SUM(CASE WHEN X = ''Y'' THEN 1 ELSE 0 END)`. But some analytic functions,
    such as `ROW_NUMBER`, don’t take any arguments and have empty parentheses after
    the function name.


    The partition clause defines the group, or window, for the analytic function.
    The partition clause is a list of columns or expressions, similar to the list
    of columns or expressions we might use in a group by clause. If we want to use
    *all* the rows, for example, to show a grand total per row, simply leave the partition
    clause empty.


    The order by clause defines the order the rows are processed. For example, in
    a running total the values must be totaled in a specific order. That clause is
    also a list of comma-separated columns or expressions. Similar to the partition
    clause, we can sometimes leave the order by clause blank to mean the order doesn’t
    matter.


    The windowing clause is less common. That clause lets us specify a more precise
    group of rows, also called a window. After the partition by clause specifies a
    group, the window clause can narrow it down. For example, a common window clause
    is `ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`. This clause is tricky and
    isn’t fully explained here. If you’re ever writing a query and wish you could
    specify X rows before or after, look up the full syntax in the manual.'
