  trans: '

    ## 共享测试


    创建可复现的测试用例对我们自身的学习有益，但大多数时候我们需要与他人共享这些测试用例。如果我们想要为世界知识添砖加瓦，就需要发布测试的所有细节，以便他人能够证明我们是错误的。如果没有一个完全可复现的测试用例，我们所做的就称不上是科学。


    组织喜欢将所有测试用例据为己有，但很少有必要隐藏这些信息，尤其是在敏捷环境中——客户应该被赋予查看所有测试的权限。如果幸运的话，客户会在开发过程早期就发现问题或缺失的假设。


    为了优化共享，请尽可能使用文本。在 IDE 中创建测试用例更容易，但值得在`SQL*Plus`中重建最终版本，以确保一切都可以被复制和粘贴。如果我们必须使用截图，应该花时间重新排列窗口使其尽可能小，并编辑图片以仅包含相关细节。


    理想情况下，我们测试用例的受众拥有一个私有的 Oracle 数据库，具有完全权限以创建无限数量的对象。如果我们的受众没有这样的环境，现在有越来越多用于构建和共享代码片段的“fiddle”网站。一个流行的数据库网站是[`https://dbfiddle.uk`](https://dbfiddle.uk)。该网站允许任何人创建一个模式，查询该模式，并通过一个简单的
    URL 与他人共享该模式。Oracle 也有一个类似的网站：[`https://livesql.oracle.com`](https://livesql.oracle.com)。Oracle
    的网站功能比其他网站更多，但运行代码片段需要一个账户。


    ## 避免 XY 问题


    在发送测试用例的最终版本之前，我们需要退一步，尝试避免 XY 问题。编程往往会引导我们走上一条幽深的小径。我们想要做 X，并且认为 Y 是解决方案。当 Y
    不奏效时，我们会针对 Y 提问，而我们真正的问题其实在于 X。


    XY 问题的一个常见例子是，人们会问：“如何将逗号分隔的列表拆分成不同的行？”这是一个重要的问题，有时确实有必要这样做。但拆分字符串意味着有人没有遵循关系模型最基本的规则。提问的开发者以及将来某天取代他们的人，试图使用一个破损的数据模型时，将会遇到很多麻烦。正确的答案是“别那么做”。这不是人们想听到的答案，但却是他们需要听到的答案。


    我们陷入这个 XY 陷阱，是因为编程偶尔需要关注微小的细节，而我们看不到全局。摆脱陷阱的方法是偶尔停下来，多问自己几次“为什么？”


    当我们发现自己为做某件怪事而寻求帮助时，解释为什么我们需要用这种怪异的方式去做，这很重要。如果我们解释清楚我们并非愚蠢；是业务规则或技术限制愚蠢，那么我们更有可能获得同情和帮助。如果幸运的话，有人会打断我们并说：“你的前提错了——那个限制不再适用于版本
    A 了，你可以改用功能 B。”


    ## Oracle 性能测试


    为 Oracle 性能问题构建可复现的测试用例尤其具有挑战性。Oracle 性能测试用例往往充满了海森堡 bug（heisenbugs）——即当别人观察时就会消失的错误或行为。由于
    Oracle SQL 是一种声明式语言，Oracle 在如何执行操作方面有很大的回旋余地，包括改变主意的能力。第四部分涵盖了高级性能调优概念，例如使用采样和剖析来深入研究我们的
    PL/SQL 程序以找到慢速 SQL，然后使用提示和监控来深入研究我们的 SQL 以找到慢速操作。在深入这些细节之前，性能测试的第一步是学习如何准确测量单条语句的整体性能。


    实际运行时间是性能测试的核心度量单位。如果某样东西运行得更快，说明它使用的资源更少，对用户和系统都更好。不必太担心测量 CPU、I/O、锁、互斥量等。


    但是，只测量运行时间这条规则也有重要的例外。例如，我们不希望创建一个并行解决方案，它虽然将运行时间减少了幾秒，却将 CPU 利用率从 1%提高到了 99%。运行时间并不总是与资源消耗相关。一些
    Oracle 开发人员发现，主动使用像`RUNSTATS`这样的程序来监控资源消耗很有帮助。


    性能测试中最令人沮丧的部分是运行时间不一致。Oracle 数据库会随着时间的推移而预热并自我调优，因此查询第二次或第三次执行比第一次执行显著快的情况相当常见。


    缓存是导致性能测试不一致的最大因素。当我们第一次运行查询时，Oracle 从磁盘读取表和索引块，并将这些块存储在内存中。第二次运行查询时，数据库可以通过快得多的内存访问来读取这些块。根据我们的环境，我们可能希望在“热”或“冷”状态下测试系统。在数据仓库上，我们的大表不太可能被缓存，因此测试冷系统更好。在
    OLTP 系统上，常用的表应该在内存中，因此测试热系统更好。我们可以使用命令`ALTER SYSTEM FLUSH BUFFER_CACHE`来清除 Oracle
    的内存。但是，该命令不会清除操作系统缓存，而且我们可能不想在共享数据库上运行它，以免影响其他用户。


    间歇性的系统活动也可能破坏我们周全的测试用例。这在共享数据库上问题更严重，但即使是我们的笔记本电脑也可能突然开始运行防病毒扫描而变慢。与其测量困难的系统活动，我们可以多次运行测试，并在竞争方案之间交替进行。在不同选项之间交替会使系统突然变快或变慢的情况更加明显。我们可能还想去掉最小和最大的运行时间。


    执行计划也会随时间变化。如果我们等待足够长的时间，系统很可能会自动收集缺失的统计信息。Oracle 优化器也能够从错误中学习，并可能在第二次或第三次运行时使用统计信息反馈、自适应游标共享和
    SQL 计划指令。（这些功能在第四部分有简要讨论。）仔细检查执行计划的`Note`部分，看看是否应用了任何奇怪的技巧。为了给测试创建一个干净的起点，有时需要运行`ALTER
    SYSTEM FLUSH SHARED_POOL`并重新收集统计信息。但与清除缓冲区缓存一样，如果在共享数据库上运行，我们需要小心执行这些命令。


    ## Oracle 侦探工具包


    E. F. Codd 的关系数据库第一规则是，数据库必须能够完全通过关系接口进行自我管理。在 Oracle 数据库中，有大量关于数据库的信息可用，并且这些信息可以通过数据库本身访问。当我们的测试不可避免地需要深入了解我们的程序和模式内部时，我们可以使用数据字典、动态性能视图、Oracle
    包和函数以及其他 Oracle 工具。

    '
- fmt: '## Data Dictionary Views


    There are roughly 1000 data dictionary views that provide metadata about virtually
    everything inside the Oracle database. There are four different prefixes for data
    dictionary views: `USER_`, `ALL_`, `DBA_`, and `CDB_`. The `USER_` views provide
    information for the current user, the `ALL_` views provide information for all
    users that we have access to, the `DBA_` views provide information for all users,
    and the `CDB_` views provide information for all users for all containers.


    The data dictionary has great backward compatibility. This means we can write
    a script for version X and safely expect the script to work in version X+1. The
    column names almost never change, except for columns added at the end of the views.
    The downside to this backward compatibility is the data dictionary contains some
    deprecated features. The `LONG` columns in the dictionary are difficult to work
    with. There is still no easy way to use SQL functions against `LONG` values, so
    searching those columns takes a few extra steps.


    For example, finding all columns that default to zero should be this easy:

    ```sql

    SQL> select table_name, column_name, data_default

    2  from dba_tab_columns

    3  where to_char(data_default) = ''0''

    4  order by 1,2,3;

    where to_char(data_default) = ''0''

    *

    ERROR at line 3:

    ORA-00932: inconsistent datatypes: expected CHAR got LONG

    ```

    Unfortunately, we need to add an extra step to make the preceding query work.
    First, we must convert and save the data, and then we can filter the results:

    ```sql

    create table convert_tab_columns as

    select table_name, column_name, to_lob(data_default) data_default

    from dba_tab_columns

    where data_default is not null;

    select table_name, column_name, to_char(data_default) data_default

    from convert_tab_columns

    where to_char(data_default) = ''0''

    and rownum = 1

    order by 1,2,3;

    TABLE_NAME             COLUMN_NAME   DATA_DEFAULT

    --------------------   -----------   ------------

    CDB_LOCAL_ADMINAUTH$   LCOUNT        0

    ```

    Another problem with the data dictionary is that some column names don’t make
    sense anymore. In an ancient version of Oracle, privileges were only granted on
    tables, and the view name `DBA_TAB_PRIVS` made sense. Unfortunately, that view
    now contains privileges for all object types.


    There are also some ancient, deprecated data dictionary views that should be avoided.
    Those views are available for backward compatibility, but do not contain nearly
    as much data as the views that replaced them. Avoid `CAT`, `COL`, `COLS`, `TAB`,
    and `TABS`. Note that Oracle does not contain an `INFORMATION_SCHEMA` like many
    other databases.


    Minor problems aside, the data dictionary has a wealth of information. We don’t
    need to memorize the 1000 views or put a poster on our office wall. But we may
    want to search for and bookmark the *Database Reference* for our Oracle version.
    The following is a list of the most important data dictionary views, some of which
    are self-explanatory:


    1.  `*_ADVISOR_*`: Status and results of automatic advisors, which may become
    increasingly important with the new autonomous database features.

    2.  `*_AUDIT_TRAIL`: The audit data depends on the configuration but typically
    includes useful information about logon history.

    3.  `*_AUTOTASK`: Special system jobs to gather stats, auto-tune, etc.

    4.  `*_CONSTRAINTS`: Unique, check, primary, foreign.

    5.  `DUAL`: A table with only one row – useful for when we want to create data.

    6.  `*_ERRORS`: Errors in our code causing invalid objects.

    7.  `*_HIST_*`: Views used for the automatic workload repository, for performance
    tuning (but requires a diagnostics pack license).

    8.  `*_INDEXES`, `DBA_IND_COLUMNS`.

    9.  `*_JOBS/SCHEDULER`: Scheduled jobs.

    10. `*_OBJECTS`: All schema objects – useful for finding things.

    11. `*_RESUMABLE`: Sessions waiting for resources.

    12. `*_ROLE_PRIVS/SYS_PRIVS/TAB_PRIVS`: Role, system, and object privileges.

    13. `*_SOURCE`: Source code for all code objects, except views.

    14. `*_SYNONYMS`.

    15. `*_TABLES`, `TAB_COLUMNS`.

    16. `*_USERS`.

    17. `*_VIEWS`: Includes the source of view (not included in `*_SOURCE`).


    ## Dynamic Performance Views


    Over 850 dynamic performance views contain information about the current state
    of an Oracle database. These views are more about Oracle than about our data,
    so they tend to be more cryptic, but just as useful, as the data dictionary. There
    are two types of dynamic performance views: `V$` and `GV$`. The only difference
    is that `V$` views contain data about the current instance we are connected to
    and `GV$` contains data about all instances. If we’re not connected to a Real
    Application Clusters database, then the two types of views will be almost identical.


    Like the data dictionary, the dynamic performance views also have good backward
    compatibility. The full list can be found in the *Database Reference*. The following
    is a list of the most common views, with an explanation for the ones that are
    not self-explanatory:


    1.  `V$ASM*`: Automatic Storage Management data

    2.  `V$DATABASE`: Database information from the control file

    3.  `V$INSTANCE`: Current state of the database

    4.  `V$PARAMETER`: Initialization parameters

    5.  `V$PGASTAT`, `V$PGA*`: Program Global Area (PGA) data (session memory, like
    for sorting and hashing)

    6.  `V$PROCESS`: Active processes, can be tied to an operating system process

    7.  `V$PX*`: Parallel processes

    8.  `V$SESSION`: Current sessions and where they connect from

    9.  `V$SESSMETRIC`, `V$SESSTAT`: Session metrics and statistics, useful for measuring
    resource consumption and performance tuning

    10. `V$SGASTAT`, `V$SGA*`: System Global Area (SGA) data (system memory, for things
    like caching data and execution plans)

    11. `V$SQL*`: Data about SQL statements and their execution plans

    12. `V$SYSMETRIC*`, `V$SYSSTAT`: System metrics and statistics, useful for measuring
    total resource consumption

    13. `V$VERSION`: The precise version of the database in column `BANNER_FULL`


    The dynamic performance view `V$PARAMETER` is especially important, and each row
    in that view can be critical. There are over 400 rows, and each row is thoroughly
    documented in the *Database Reference*. It’s hard to say which parameters are
    most critical; even a single wrong parameter can break the database in weird ways.
    While administrators need to understand most of the parameters, the following
    parameters are most likely to be of interest to SQL developers:


    1.  `compatible`: The compatibility version of the data files may limit the available
    features. Once we change this parameter, there is no going back.

    2.  `cpu_count`: Should be the number of processors, but on some platforms, it’s
    incorrectly set to the number of supported threads; this number is important for
    parallel processing.

    3.  `cursor_sharing`: If our application cannot use bind variables, changing from
    the default `EXACT` to `FORCE` can alleviate some performance issues. (Bind variables
    are discussed in Chapter 14.)

    4.  `ddl_lock_timeout`: Allows DDL statements to wait instead of immediately failing
    if the object is locked.

    5.  `memory_target/pga_aggregate_target/sga_target`: Oracle memory settings are
    ridiculously complicated; read the manual a few times for each of these settings
    before you touch them.

    6.  `nls*`: National Language Support (NLS) parameters control how data is stored,
    compared, sorted, and formatted – whether by binary values or according to specific
    language rules. Do not rely solely on the database formatting settings – they
    are frequently overridden by session settings.

    7.  `optimizer_index_caching/optimizer_index_cost_adj/db_file_multiblock_read_count`:
    Frequently abused parameters – do not set these unless you are looking for trouble.

    8.  `parallel*`: Control parallel processing; think carefully and read the parallel
    processing guide before changing these parameters.

    9.  `processes`, `sessions`: Limit the number of Oracle operating system processes
    and connections. These numbers frequently need to be increased.'
