  trans: "### 针对多表约束的物化视图\n\n在数据仓库之外，物化视图对于强制实施多表约束也很有用。例如，让我们尝试在 `SATELLITE` 和 `LAUNCH`\
    \ 表之间强制实施一条规则。这两张表都有一个重要的日期列；发射表有 `LAUNCH_DATE`，卫星表有 `ORBIT_EPOCH_DATE`。这些日期是相关的，但并不总是相同。卫星轨道会随时间改变，例如当轨道因大气阻力而衰减时。`ORBIT_EPOCH_DATE`\
    \ 列是轨道信息最后一次获取的日期。\n\n`ORBIT_EPOCH_DATE` 通常晚于发射日期，因为轨道在发射后会发生变化。但是，轨道历元日期早于发射日期是没有意义的。如果\
    \ Oracle 支持断言（assertions），或许下面的语句可以保持我们的数据正确：\n\n```sql\n--LAUNCH.LAUNCH_DATE\
    \ 必须早于 SATELLITE.EPOCH_DATE。\n--（使用 \"-1\" 是因为时间上存在微小偏差。）\ncreate assertion launch_before_epoch_date\
    \ as check\n(\nselect *\nfrom satellite\njoin launch\non satellite.launch_id =\
    \ launch.launch_id\nwhere launch.launch_date - 1 < orbit_epoch_date\n);\n```\n\
    \n遗憾的是，上述功能尚不存在。大多数 SQL 开发人员会使用触发器来重新实现这条规则，而这需要编写过程式代码，很难同时保证正确性和快速性。我们可以使用物化视图以声明式的方式解决这个问题。\n\
    \n首先，我们必须在相关表上创建物化视图日志。每当表发生更改时，该更改也会自动写入物化视图日志。有了这些更改信息，我们的物化视图可以快速确定需要检查哪些行，因此\
    \ Oracle 只需比较已更改的行，而无需比较整张表：\n\n```sql\n--在基础表上创建物化视图日志。\ncreate materialized\
    \ view log on satellite with rowid;\ncreate materialized view log on launch with\
    \ rowid;\n```\n\n接下来，我们创建一个 `FAST ON COMMIT` 的物化视图，它将列出我们不希望看到的行。下面的代码反转了日期比较，并有一些其他奇怪的改动。该视图包含了来自两张表的\
    \ `ROWID`，并使用了老式的连接语法而非 ANSI 连接语法。快速刷新物化视图有许多奇怪的限制，可能很难创建：\n\n```sql\n--用于我们不希望发生的情况的物化视图。\n\
    create materialized view satellite_bad_epoch_mv\nrefresh fast on commit as\nselect\
    \ satellite.orbit_epoch_date, launch.launch_date,\n       satellite.rowid satellite_rowid,\n\
    \       launch.rowid launch_rowid\nfrom satellite, launch\nwhere satellite.launch_id\
    \ = launch.launch_id\n  and orbit_epoch_date < launch.launch_date - 1;\n```\n\n\
    （如果你使用的是来自其他模式（schema）的表，你需要直接向该模式授予 `CREATE TABLE` 权限，否则前面的语句将因 “ORA-01031: insufficient\
    \ privileges” 而失败。即使你的用户可能有能力创建表，但当你创建物化视图时，物化视图的所有者需要在后台创建另一个表。）\n\n前面的物化视图包含了所有不好的行。由于有了物化视图日志，物化视图无需重新读取整个\
    \ `LAUNCH` 和 `SATELLITE` 表来验证变更。\n\n最后一块拼图是添加一个约束。这个物化视图不应该包含任何行，所以我们创建一个约束，如果存在任何行，该约束就会失败。但由于已经存在一些不好的行，我们将使用\
    \ `NOVALIDATE` 选项创建约束以忽略这些行：\n\n```sql\n--添加防止新行的约束。\nalter table satellite_bad_epoch_mv\
    \ add constraint\n    satellite_bad_epoch_mv_no_row check (launch_rowid is null)\n\
    \    enable novalidate;\n```\n\n最后，让我们尝试进行一次错误的更新。让我们将一个轨道历元日期设置为远早于发射日期的值。下面的\
    \ `UPDATE` 语句会运行，但 `COMMIT` 语句会引发一系列事件，最终导致错误 “ORA-02290: check constraint (SPACE.SATELLITE_BAD_EPOCH_MV_NO_ROW)\
    \ violated.”。`COMMIT` 导致物化视图尝试刷新。物化视图从物化视图日志中读取已更改的行，然后尝试为我们的查询（该查询本不应返回任何行）构建结果。当查询确实返回行时，物化视图就违反了约束，从而导致错误：\n\
    \n```sql\n--设置一个错误值。\nupdate satellite\nset orbit_epoch_date = orbit_epoch_date\
    \ - 100\nwhere norad_id = '000001';\ncommit;\n```\n\n物化视图断言对于强制实施复杂的数据规则很有用，但也存在几个缺点。每个模拟断言都需要几个新对象。物化视图背后的逻辑是反向的——我们必须为我们不想要的内容编写查询。该查询必须遵守几个奇怪且文档记录不全的语法规则。并且，对基础表的\
    \ DML 操作会有性能损失，因为所有变更也需要写入物化视图日志。为了创建一个简单的约束，这需要大量痛苦的代码，但为了维护数据的完整性，这种努力是值得的。\n\
    \n## 数据库链接\n\n数据库链接是访问另一个数据库上数据的最简单方式。通过几个额外的关键字和一些技巧，我们可以构建强大、跨数据库的大型系统。\n\n\
    创建数据库链接很简单，只需要基本的连接信息。如果我们无法访问多个数据库，我们仍然可以通过创建指向自身的数据库链接来测试数据库链接功能。创建数据库链接后，访问远程对象就像添加\
    \ “`@`” 符号一样简单。Oracle 会自动处理权限、数据类型等：\n\n```sql\n--创建指向同一数据库的数据库链接，用于测试。\ncreate\
    \ database link myself\nconnect to my_user_name\nidentified by \"my_password\"\
    \nusing '(description=(address=(protocol=tcp)(host=localhost)\n(port=1521))(connect_data=(server=dedicated)(sid=orcl)))';\n\
    select * from dual@myself;\nDUMMY\nX\n```\n\n（如果我们设置了 `CURRENT_SCHEMA` 指向不同的模式，前面的命令将无法工作，因为数据库链接只能直接在我们自己的模式中创建。当然，我们还需要输入正确的连接字符串详细信息。）\n\
    \n数据库链接有一些奇怪的行为，但几乎总是有办法解决我们的问题。数据库链接不太适合导入或导出海量数据。如果我们想移动千兆字节的数据，我们应该研究像数据泵（data\
    \ pump）这样的工具。“`@`” 语法本身也不支持 DDL 语句。运行 DDL 的解决方法是通过数据库链接调用 `DBMS_UTILITY.EXEC_DDL_STATEMENT`。而且，即使语句不包含\
    \ DML，数据库链接也总会产生一个事务。\n\n出于安全原因，有太多组织规定禁止使用数据库链接。数据库链接本身没有问题，尽管 `PUBLIC` 数据库链接肯定会有问题。我们需要非常谨慎地向\
    \ public 授予任何权限。但我们不应该让一个非默认选项阻止我们使用最方便的解决方案。那些明令禁止所有数据库链接的组织，明智的做法是牢记 Avi 的可用性法则：以牺牲可用性为代价的安全性，最终也会损害安全性。如果我们阻止了简单、安全的方法，人们就会找到简单、不安全的方法。我所见过最严重的安全违规事件，就是因为组织不允许使用数据库链接而发生的。\n\
    \n通过正确的代码和解决方法，数据库链接可以帮助我们从一个数据库查询和控制大型环境。"
- fmt: '## PL/SQL Objects


    There are many interesting PL/SQL objects, but unfortunately those objects are
    out of the scope of this book. If you continue to learn more about Oracle SQL,
    you will inevitably start to use PL/SQL, so I will quickly list the objects here.
    You can start using PL/SQL with anonymous blocks and PL/SQL common table expressions.
    Eventually you’ll want to start creating these PL/SQL schema objects:


    1.  `Function`: Runs PL/SQL statements and returns a value. Used for small lookups
    or data transformations.


    2.  `Procedure`: Runs PL/SQL statements but does not return a value. Used for
    small changes.


    3.  `Package specification and body`: Encapsulates functions, procedures, and
    variables. Used for creating programs.


    4.  `Trigger`: PL/SQL statements that are fired when an event happens, such as
    table changes or system events. Used for side effects of changes, such as adding
    a primary key to a new row.


    5.  `Type specification and type body`: Encapsulates functions, procedures, and
    variables. Similar to packages but meant to be used to hold data. Used for custom
    collections in PL/SQL programs or for object-relational tables.


    PL/SQL is both overused and underused. The language is overused by programmers
    who come from a more traditional programming background and want to program procedurally.
    A PL/SQL program should not be used when a SQL statement can do the same thing.
    The language is underused by programmers who think databases should only store
    data, not process data. While I won’t say Oracle is the best database, I’m comfortable
    saying Oracle PL/SQL is the best database procedural language. Just a little bit
    of PL/SQL can open up a lot of opportunities. The PL/SQL language is powerful
    enough to solve almost any problem.


    ## Other Schema Objects


    This section briefly lists other, less important schema objects. Even this section
    is not a complete list; there are still many more schema object types, although
    those objects are likely not relevant to SQL development:


    1.  `Cluster`: Physically stores multiple tables together. For example, the `LAUNCH`
    and `SATELLITE` tables are frequently joined together. It might help performance
    if the tables were pre-joined and stored in a cluster. Clusters sound good in
    theory but are not used in practice.


    2.  `Comment`: Documents tables, columns, and views. Can be useful since many
    IDEs read the comments and display them when we query the data.


    3.  `Materialized zone map`: Stores information about the min and max values within
    a “zone.” Similar to partition pruning, a zone map can be used to quickly eliminate
    large chunks of data from full table scans. Unlike partitioning, zone maps are
    only metadata and do not require redesigning tables.


    4.  `OLAP objects`: Oracle has a full online analytical processing option. OLAP
    technology has faded recently, and Oracle has started to create more of the OLAP
    functionality as regular database objects. This includes analytic views, attribute
    dimensions, dimensions, and hierarchies.


    ## Global Objects


    Global objects are not owned by a specific Oracle user. Global objects are easy
    to forget because they are not directly owned by our applications. Our applications
    may depend on these objects, but these objects will often not show up when we
    export schemas or metadata. We need to remember these exceptions, or our applications
    may only get partially installed:


    1.  `Context`: Custom namespace that contains global data for each session. Can
    be set by a custom package and can be referenced by the `SYS_CONTEXT` function.
    For example, the default `USERENV` has many helpful values, such as `SYS_CONTEXT(''USERENV'',
    ''HOST'')`.


    2.  `Directory`: Mapping between a name and a file system directory. Oracle packages
    like `UTL_FILE` don’t directly reference file system directories, only the Oracle
    directory object. This level of indirection is useful because the file system
    directories frequently change across environments and platforms.


    3.  `Profile`: Sets limits for users. Oracle recommends using the Resource Manager
    instead, since it’s more powerful. But in practice the Resource Manager is overly
    complicated, and we rely on profiles.


    4.  `Restore point`: A name associated with a timestamp or System Change Number
    (SCN). Useful for flashback operations.


    5.  `Role`: A set of object and system privileges that can be granted to other
    users and roles. It''s much simpler to grant a privilege once to the right role
    instead of granting a privilege to multiple users.


    ## GRANT and REVOKE


    The `GRANT` and `REVOKE` commands control database access. There are three things
    that must be controlled: object privileges (access to tables, views, etc.), system
    privileges (`CREATE SESSION` to log on, powerful privileges like `SELECT ANY TABLE`,
    etc.), and role privileges (custom application roles, powerful preexisting roles
    like `DBA`, etc.).


    Privileges can only be granted on existing objects. That restriction sounds reasonable,
    but it means that there is no way to give the user Alice eternal access to all
    objects owned by the user Bob. We can simplify grant script by using the `ALL
    PRIVILEGES` option, but we still need to run the `GRANT` for every relevant object
    in Bob’s schema. And if a new object is created in Bob’s schema, Alice will not
    have access until we run another `GRANT` statement.


    Another difficult privilege scenario is when grants get transitive: when X is
    granted to Y and Y is granted to Z. Creating chains of grants is difficult. When
    we grant an object to a user, that user cannot grant the object to someone else,
    unless they have the `WITH ADMIN` option. When we grant an object to a user, that
    user cannot create a view on top of that object and then grant that view to others,
    unless they have the `WITH GRANT` option.


    Tracking privileges is not trivial. There are three kinds of privileges and three
    sets of data dictionary views, such as `DBA_TAB_PRIVS`, `DBA_SYS_PRIVS`, and `DBA_ROLE_PRIVS`.
    Since roles can be granted to roles, if we want to thoroughly list all the role
    privileges, we need a recursive query. If we want to truly know which roles we
    have access to, we must use a query like this:


    ```sql

    --Roles granted directly or indirectly to the current user.

    select *

    from dba_role_privs

    connect by prior granted_role = grantee

    start with grantee = user

    order by 1,2,3;

    ```


    The queries get more complicated when looking for object and system privileges.
    We must take the preceding query and use it as part of another query. The following
    example finds all the system privileges granted to the current user:


    ```sql

    --System privileges granted directly or indirectly to current user.

    select *

    from dba_sys_privs

    where grantee = user

    or grantee in

    (

    select granted_role

    from dba_role_privs

    connect by prior granted_role = grantee

    start with grantee = user

    )

    order by 1,2,3;

    ```


    Finding object privileges requires a query very similar to the preceding query,
    but replace `DBA_SYS_PRIVS` with `DBA_TAB_PRIVS`. That view name is misleading
    – that view contains privileges for all objects, not just for tables.


    ## Summary


    Our whirlwind tour of advanced features is complete. We know how to build sets,
    how to read and write data, and how to create schema and global objects. We don’t
    need to memorize the SQL syntax, but we do need to remember what our different
    options are. When we start combining advanced features and try to get the best
    performance out of Oracle, we need to look behind the curtain and see how Oracle
    works. The next chapter completes our discussion of advanced features by introducing
    Oracle’s architecture.


    Footnotes [1](#471418_2_En_9_Chapter.xhtml#Fn1_source)   [2](#471418_2_En_9_Chapter.xhtml#Fn2_source)
      [3](#471418_2_En_9_Chapter.xhtml#Fn3_source)   [4](#471418_2_En_9_Chapter.xhtml#Fn4_source)
      [5](#471418_2_En_9_Chapter.xhtml#Fn5_source)'
