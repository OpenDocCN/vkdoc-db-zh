  trans: '# 在数据库中存储 JSON


    前文示例中的 JSON 文件可通过 `JSON_OBJECT` 函数生成：


    ```sql

    --简单 JSON 示例。

    select json_object(''string'' value ''a'', ''array'' value json_array(1,2))

    from dual;

    ```


    在 Oracle 21c 引入 JSON 数据类型之前，存储 JSON 数据比存储 XML 要稍微复杂一些。在更早的版本中，JSON 被存储在字符串数据类型中，例如
    `VARCHAR2` 或 `CLOB`。这些列通过约束被标记为 JSON 文件，例如 `CONSTRAINT SOME_TABLE_CK CHECK (SOME_COLUMN
    IS JSON)`。在本章接下来的示例中，让我们创建一个简单的表来保存发射数据：


    ```sql

    --创建一个表来保存 JSON 发射数据。

    create table launch_json

    (

    launch_id number,

    --19c 及以下版本 - 使用 VARCHAR2 或 CLOB 数据类型，以及一个约束：

    json clob,

    constraint launch_json_ck check (json is json),

    --21c 及以上版本 - 使用 JSON 数据类型：

    --json json,

    constraint launch_json_pk primary key(launch_id)

    );

    ```


    与存储 XML 类似，我们必须使用正确的数据类型和约束来强制数据完整性，这一点至关重要。一个无效的 JSON 文件就可能破坏许多查询。而使用正确的数据类型和约束使我们能够在
    JSON 文件上构建索引。


    # 创建 JSON 数据


    虽然没有与 `DBMS_XMLGEN.GETXML` 等效的 JSON 函数，但我们可以结合使用 `JSON_OBJECT`（将值转换为对象）、`JSON_ARRAY`（将列表转换为值数组）和
    `JSON_ARRAYAGG`（将多个 JSON 对象组合成一个对象）等函数来创建 JSON 文件。


    在 19c 版本之前，构建 JSON 的语法很不方便，需要显式列出每个值。以下语句将 `LAUNCH` 表的数据转换为 `LAUNCH_JSON`，但为了简洁，该语句只包含了少数几列：


    ```sql

    --使用部分 LAUNCH 数据填充 LAUNCH_JSON。

    insert into launch_json

    select

    launch_id,

    json_object

    (

    ''launch_date'' value to_char(launch_date, ''YYYY-MM-DD''),

    ''flight_ids'' value json_array(flight_id1, flight_id2)

    ) json

    from launch

    where launch_category in (''orbital'', ''deep space'');

    commit;

    ```


    前面的 JSON 表与上一节创建的 XML 表有些不同。XML 表将所有内容存储在一个 XML 文件中，而 `LAUNCH_JSON` 每行有一个 JSON
    字符串。我们本可以反过来，每行存储一个 XML 文件，并将所有内容放在一个 JSON 字符串中。两种技术都是有效的，使用哪一种取决于数据以及数据的访问方式。


    从 19c 开始，改进后的 `JSON_OBJECT` 语法通过允许使用通配符或简单的列列表，大大简化了将一行转换为 JSON 文件的过程。例如，以下查询将每个
    `SATELLITE` 行转换为一个 JSON 文件：


    ```sql

    --将每个 SATELLITE 行转换为一个 JSON 文件。

    select json_object(*) satellite_json

    from satellite

    order by satellite_id;

    SATELLITE_JSON


    {"SATELLITE_ID":1,"NORAD_ID":"000001","COSPAR":"57 Alpha 1",...}

    {"SATELLITE_ID":2,"NORAD_ID":"000002","COSPAR":"57 Alpha 2",...}

    {"SATELLITE_ID":3,"NORAD_ID":"000003","COSPAR":"57 Beta 1",...}

    ```


    从 19c 开始，将整个表转换为单个 JSON 文件也变得更加容易。以下示例通过结合使用 `JSON_OBJECT` 和 `JSON_ARRAYAGG`，为卫星数据创建一个
    JSON 文件。JSON 函数通常将数据作为 `VARCHAR2` 返回，因此我们可能需要指定 `RETURNING CLOB` 以确保数据不会超出字节限制。此示例仅包含前三行——并非因为
    Oracle SQL 无法处理更多行，而是因为您的 IDE 可能无法显示如此大的文档：


    ```sql

    --将多个 SATELLITE 行转换为单个 JSON 文件。

    select json_arrayagg(json_object(*) returning clob) satellite_json

    from satellite

    where satellite_id <= 3;

    SATELLITE_JSON


    [{"SATELLITE_ID":1,"NORAD_ID":"000001","COSPAR":"57 Alpha 1",...}]

    ```


    # 查询 JSON


    使用以下查询，可以将我们插入 `LAUNCH_JSON` 的 JSON 数据作为简单字符串查看：


    ```sql

    --查看 LAUNCH_JSON 中的 JSON 数据。

    select to_char(json) launch_data

    from launch_json

    order by launch_id;

    LAUNCH_DATA


    {"launch_date":"1957-10-04","flight_ids":["M1-PS","PS-1"]}

    {"launch_date":"1957-11-03","flight_ids":["M1-2PS","PS-2"]}

    {"launch_date":"1957-12-06","flight_ids":["TV-3","Vanguard TV3"]}

    ...

    ```


    在 21c 版本上，前面的查询将返回错误 "ORA-00932: 不一致的数据类型: 期望 NUMBER 得到 JSON"，因为 `TO_CHAR` 函数不接受
    JSON 数据类型。相反，我们需要使用 `JSON_SERIALIZE` 函数。虽然 `JSON_SERIALIZE` 比 `TO_CHAR` 功能更多，但这个错误表明，JSON
    数据类型并非可以完全替代将 JSON 存储为 `VARCHAR2` 或 `CLOB`。


    前面的查询向我们展示了 JSON 的工作原理，但结果在 SQL 中并不实用。在 SQL 中使用 JSON 的最大优势在于，通过一些语法扩展，可以轻松访问其列。与
    XML 类似，要访问数据，我们必须使用表别名。然后添加一个点号，后跟对象名称。对于数组，我们可以使用方括号和数字，从 0 开始：


    ```sql

    --在表 LAUNCH_JSON 上进行简单的 JSON 查询。

    select

    launch_id,

    substr(launch_json.json.launch_date, 1, 10) launch_date,

    launch_json.json.flight_ids[0] flight_id1,

    launch_json.json.flight_ids[1] flight_id2,

    launch_json.json.flight_ids[2] flight_id3

    from launch_json launch_json

    order by launch_date;

    LAUNCH_ID  LAUNCH_DATE  FLIGHT_ID1  FLIGHT_ID2    FLIGHT_ID3

    ---------  -----------  ----------  ------------  ----------

    4305       1957-10-04   M1-PS       PS-1

    4306       1957-11-03   M1-2PS      PS-2

    4476       1957-12-06   TV-3        Vanguard TV3

    ...

    ```


    前面的查询从 JSON 生成关系数据。与 XML 类似，在映射到 SQL 时存在一些怪癖。例如，前面的查询引用了第三个 `FLIGHT_ID`，尽管我们不可能有第三个飞行
    ID。这个错误展示了半结构化数据的一个陷阱——我们的查询可能出错，但不会产生编译错误。


    本节仅涵盖了处理 JSON 的最简单方法。Oracle 提供了许多其他处理 JSON 的函数，包括 `JSON_DATAGUIDE` 和 `DBMS_JSON`（一种用于
    JSON 的数据字典）、`JSON_MERGEPATCH` 和 `JSON_TRANSFORM`（更新 JSON 文档）、`JSON_QUERY`（检索文档片段）、`JSON_SCALAR`
    和 `JSON_VALUE`（将值作为 JSON 标量或 SQL 标量检索），以及 `JSON_TABLE`（创建 JSON 的关系视图，类似于 `XMLTABLE`）。


    对于那些仍在使用低于 12.1 版本 Oracle 的用户，处理 JSON 最流行的选择是开源项目 PL/JSON。即使对于较新版本的 Oracle，如果我们需要高级
    JSON 功能，也可能值得研究一下该程序，尽管 PL/JSON 比原生功能更耗费资源。


    我们不应过度使用 XML 和 JSON。理论上，我们可以将整个数据库存储在单个 XML 或 JSON 值中，但那样我们为什么还要使用数据库呢？半结构化数据的额外动态能力很有诱惑力，但必须存在某种模型。要查询文件，它们必须具有某种可靠的结构，否则文件就毫无用处。尽管
    Oracle 可以让 XML 和 JSON 看起来像表，但这种映射并不完美。查询 XML 和 JSON 并不像查询关系数据那样方便。尽管 Oracle 内置了许多功能，但将
    XML 和 JSON 加载到数据库中的最佳方式可能是将文件转换为行和列。


    # 国家语言支持


    国际化和本地化是复杂的。Oracle 的国家语言支持架构使我们能够存储、处理和显示任何语言和区域设置的信息。即使我们只存储简单的英文文本，仍然需要注意字符集、长度语义、NLS
    比较和排序以及显示格式。这些主题适用于所有程序员，无论我们多么希望它们不存在。'
- fmt: '### Character Sets


    Oracle has great character set support but also has horrible character set defaults.
    If possible, our databases should always use `UTF8`, instead of old character
    sets like `US7ASCII`, `WE8ISO8859P1`, `WE8MSWIN1252`, etc. Oracle has officially
    recommended `UTF8` for a long time but inexplicably didn’t default to `UTF8` until
    version 12.2.


    A lot has been written about character set differences, but the trade-off boils
    down this: `UTF8` supports every character but may be slightly larger. Unless
    we have specific, objective reasons to not use `UTF8`, it would be foolish to
    pick something else. I’ve seen many problems caused by using old character sets,
    and I’ve seen many weird bugs caused by databases that were later converted to
    `UTF8`. We need to choose the correct character set from the start of our project.
    The examples in this section won’t work correctly if our database does not use
    `UTF8`.


    There are Unicode data types `NVARCHAR2`, `NCLOB`, `NCHAR`, and `N''''` text literals.
    These types exist in case we are using an old character set but need to support
    a few columns of Unicode data. These data types use `UTF16` or `UCS2` – these
    are slightly different from, but compatible with, `UTF8`. Ideally, we should never
    need to use the “N” data types.


    When dealing with character set issues, the Oracle functions `DUMP` and `UNISTR`
    come in handy. `DUMP` displays the internal representation of data, as discussed
    in Chapter [3](#471418_2_En_3_Chapter.xhtml). `UNISTR` lets us create Unicode
    characters even if our database client doesn’t support Unicode. Most IDEs support
    `UTF8`, but don’t forget that our installation scripts might be run by a misconfigured
    SQL*Plus client.


    If we’re worried our source code files may get corrupted, the safest way to store
    non-ASCII data is with the `UNISTR` function. For example, the column `LAUNCH.ORG_UTF8_NAME`
    contains many non-ASCII characters. Loading the `UTF8` data would be safer if
    the strings were defined like this:


    ```sql

    --Store unicode characters in a text file of any encoding.

    select unistr(''A\00e9ro-Club de France'') org_utf8_name

    from dual;

    ```


    ORG_UTF8_NAME

    -------------

    Aéro-Club de France


    Notice the “é” in the preceding output. In practice, the `UNISTR` syntax is too
    cumbersome to use frequently. The function is only helpful when we have text that
    is almost entirely ASCII with just a few exceptions.


    ### Length Semantics


    How we count the length of strings has important consequences. Oracle defaults
    to byte length semantics, where string size is measured by the number of bytes.
    Sometimes we need to change to character length semantics, where string size is
    counted by the number of characters. When we use varying-width character sets,
    like `UTF8`, we need to remember that X bytes does not always equal X characters.


    The following code demonstrates the importance of character length semantics.
    If we create a table with a column of the type `VARCHAR2(1)`, that column can
    only store 1 byte of data. When we try to insert one multi-byte character, the
    example raises the exception “ORA-12899: value too large for column “SCHEMA”.
    “BYTE_SEMANTICS_TEST”. “A” (actual: 2, maximum: 1)”. That error happens because
    the character being inserted is the non-ASCII “é” that doesn’t fit in 1 byte in
    `UTF8`. (But if we’re using an extended-ASCII character set, the following code
    might work because the character may fit in 1 byte.)


    ```sql

    --Byte length semantics causes an error.

    create table byte_semantics_test(a varchar2(1));

    insert into byte_semantics_test values(''é'');

    ```


    If we add the keyword `CHAR` after the number in the data type definition, Oracle
    uses character length semantics instead. Now the column will fit one character,
    regardless of how many bytes that character uses:


    ```sql

    --Character length semantics works correctly.

    create table character_semantics_test(a varchar2(1 char));

    insert into character_semantics_test values(''é'');

    ```


    Even if we think our database only contains ASCII characters, chances are good
    our database will eventually contain word processing markup characters. For example,
    the Microsoft smart quote might look like a regular quote but may use 2 bytes
    instead of 1.


    ### NLS Comparing and Sorting


    Text comparisons and sorting are done by binary values by default. Binary sorting
    means that two strings are only considered equal if they have the same internal
    representation. And characters are ordered based on their numeric values in the
    character set. Binary sorting is why uppercase characters show up before lowercase
    characters; “A” is number 65 in ASCII, and “a” is number 97 in ASCII. (The first
    127 ASCII characters work the same way in `UTF8`.)


    The parameters `NLS_COMP` and `NLS_SORT` enable us to change the comparison and
    sorting behavior to be more linguistically meaningful. We can compare and sort
    values regardless of case or accents or according to the rules of a specific language.
    (But beware of huge performance penalties for using non-binary sorting and comparisons.
    Indexes built on binary comparisons cannot be used for linguistic comparisons
    and vice versa.)


    For example, let’s find the French aviation club founded by Jules Verne in 1898.
    The “Aéro-Club de France” is in the space data set because that organization was
    involved with launching Sputnik 41. Let’s find the organization without having
    to type the accented character:


    ```sql

    --Use accent-independent linguistic comparison and sorting.

    alter session set nls_comp=linguistic;

    alter session set nls_sort=binary_ai;

    select org_utf8_name

    from organization

    where org_utf8_name like ''Aero-Club de France%'';

    ```


    ORG_UTF8_NAME

    -------------

    Aéro-Club de France


    The `NLS_COMP` and `NLS_SORT` parameters can be set per system, session, schema,
    table, column, or statement. As with all parameters, we only want to set them
    at the smallest possible level. For example, don’t change the NLS settings for
    the entire system if you only need them for a specific statement.


    NLS capabilities are also available through the `NLS_*` functions. When we don’t
    want to change parameters, we can call an NLS function precisely when needed.
    For example, most of the space data set works fine with binary sorting and comparisons.
    But if we’re using the internationalized names for sorting, by default the order
    may not make sense. We might expect “Aéro-Club de France” to show up next to other
    organizations with names like “Aero.” But by default, that string shows up somewhere
    else:


    ```sql

    --Regular sort.

    --(Reset session sort to the default.)

    alter session set nls_sort=binary;

    select org_utf8_name

    from organization

    order by org_utf8_name;

    ```


    ORG_UTF8_NAME

    -------------

    ...

    Aeritalia Sistemi Spaziali (Torino)

    AeroAstro, Inc

    ...


    The `NLSSORT` function with `BINARY_AI` sorting displays “Aéro-Club de France”
    in the right place:


    ```sql

    --Accent independent sort.

    select org_utf8_name

    from organization

    order by nlssort(org_utf8_name, ''nls_sort=binary_ai'');

    ```


    ORG_UTF8_NAME

    -------------

    ...

    Aeritalia Sistemi Spaziali (Torino)

    Aéro-Club de France

    AeroAstro, Inc

    ...'
  raw: '### Character Sets


    Oracle has great character set support but also has horrible character set defaults.
    If possible, our databases should always use UTF8, instead of old character sets
    like US7ASCII, WE8ISO8859P1, WE8MSWIN1252, etc. Oracle has officially recommended
    UTF8 for a long time but inexplicably didn’t default to UTF8 until version 12.2.


    A lot has been written about character set differences, but the trade-off boils
    down to this: UTF8 supports every character but may be slightly larger. Unless
    we have specific, objective reasons to not use UTF8, it would be foolish to pick
    something else. I’ve seen many problems caused by using old character sets, and
    I’ve seen many weird bugs caused by databases that were later converted to UTF8\.
    We need to choose the correct character set from the start of our project. The
    examples in this section won’t work correctly if our database does not use UTF8.


    There are Unicode data types `NVARCHAR2`, `NCLOB`, `NCHAR`, and `N''''` text literals.
    These types exist in case we are using an old character set but need to support
    a few columns of Unicode data. These data types use UTF16 or UCS2 – these are
    slightly different from, but compatible with, UTF8. Ideally, we should never need
    to use the “N” data types.


    When dealing with character set issues, the Oracle functions `DUMP` and `UNISTR`
    come in handy. `DUMP` displays the internal representation of data, as discussed
    in Chapter [3](#471418_2_En_3_Chapter.xhtml). `UNISTR` lets us create Unicode
    characters even if our database client doesn’t support Unicode. Most IDEs support
    UTF8, but don’t forget that our installation scripts might be run by a misconfigured
    SQL*Plus client.


    If we’re worried our source code files may get corrupted, the safest way to store
    nonASCII data is with the `UNISTR` function. For example, the column `LAUNCH.ORG_UTF8_NAME`
    contains many non-ASCII characters. Loading the UTF8 data would be safer if the
    strings were defined like this:


    ```

    --Store unicode characters in a text file of any encoding.

    select unistr(''A\00e9ro-Club de France'') org_utf8_name

    from dual;

    ORG_UTF8_NAME


    Aéro-Club de France

    ```


    Notice the “é” in the preceding output. In practice, the `UNISTR` syntax is too
    cumbersome to use frequently. The function is only helpful when we have text that
    is almost entirely ASCII with just a few exceptions.


    ### Length Semantics


    How we count the length of strings has important consequences. Oracle defaults
    to byte length semantics, where string size is measured by the number of bytes.
    Sometimes we need to change to character length semantics, where string size is
    counted by the number of characters. When we use varying-width character sets,
    like UTF8, we need to remember that X bytes does not always equal X characters.


    The following code demonstrates the importance of character length semantics.
    If we create a table with a column of the type `VARCHAR2(1)`, that column can
    only store 1 byte of data. When we try to insert one multi-byte character, the
    example raises the exception “ORA-12899: value too large for column “SCHEMA”.
    “BYTE_SEMANTICS_TEST”. “A” (actual: 2, maximum: 1)”. That error happens because
    the character being inserted is the non-ASCII “é” that doesn’t fit in 1 byte in
    UTF8\. (But if we’re using an extended-ASCII character set, the following code
    might work because the character may fit in 1 byte.)


    ```

    --Byte length semantics causes an error.

    create table byte_semantics_test(a varchar2(1));

    insert into byte_semantics_test values(''é'');

    ```


    If we add the keyword `CHAR` after the number in the data type definition, Oracle
    uses character length semantics instead. Now the column will fit one character,
    regardless of how many bytes that character uses:


    ```

    --Character length semantics works correctly.

    create table character_semantics_test(a varchar2(1 char));

    insert into character_semantics_test values(''é'');

    ```


    Even if we think our database only contains ASCII characters, chances are good
    our database will eventually contain word processing markup characters. For example,
    the Microsoft smart quote might look like a regular quote but may use 2 bytes
    instead of 1.


    ### NLS Comparing and Sorting


    Text comparisons and sorting are done by binary values by default. Binary sorting
    means that two strings are only considered equal if they have the same internal
    representation. And characters are ordered based on their numeric values in the
    character set. Binary sorting is why uppercase characters show up before lowercase
    characters; “A” is number 65 in ASCII, and “a” is number 97 in ASCII. (The first
    127 ASCII characters work the same way in UTF8.)


    The parameters `NLS_COMP` and `NLS_SORT` enable us to change the comparison and
    sorting behavior to be more linguistically meaningful. We can compare and sort
    values regardless of case or accents or according to the rules of a specific language.
    (But beware of huge performance penalties for using non-binary sorting and comparisons.
    Indexes built on binary comparisons cannot be used for linguistic comparisons
    and vice versa.)


    For example, let’s find the French aviation club founded by Jules Verne in 1898\.
    The “Aéro-Club de France” is in the space data set because that organization was
    involved with launching Sputnik 41\. Let’s find the organization without having
    to type the accented character:


    ```

    --Use accent-independent linguistic comparison and sorting.

    alter session set nls_comp=linguistic;

    alter session set nls_sort=binary_ai;

    select org_utf8_name

    from organization

    where org_utf8_name like ''Aero-Club de France%'';

    ORG_UTF8_NAME


    Aéro-Club de France

    ```


    The `NLS_COMP` and `NLS_SORT` parameters can be set per system, session, schema,
    table, column, or statement. As with all parameters, we only want to set them
    at the smallest possible level. For example, don’t change the NLS settings for
    the entire system if you only need them for a specific statement.


    NLS capabilities are also available through the `NLS_*` functions. When we don’t
    want to change parameters, we can call an NLS function precisely when needed.
    For example, most of the space data set works fine with binary sorting and comparisons.
    But if we’re using the internationalized names for sorting, by default the order
    may not make sense. We might expect “Aéro-Club de France” to show up next to other
    organizations with names like “Aero.” But by default, that string shows up somewhere
    else:


    ```

    --Regular sort.

    --(Reset session sort to the default.)

    alter session set nls_sort=binary;

    select org_utf8_name

    from organization

    order by org_utf8_name;

    ORG_UTF8_NAME


    ...

    Aeritalia Sistemi Spaziali (Torino)

    AeroAstro, Inc

    ...

    ```


    The `NLSSORT` function with `BINARY_AI` sorting displays “Aéro-Club de France”
    in the right place:


    ```

    --Accent independent sort.

    select org_utf8_name

    from organization

    order by nlssort(org_utf8_name, ''nls_sort=binary_ai'');

    ORG_UTF8_NAME


    ...

    Aeritalia Sistemi Spaziali (Torino)

    Aéro-Club de France

    AeroAstro, Inc

    ...

    ```'
  trans: '

    ### 字符集


    Oracle 拥有强大的字符集支持，但其默认字符集设置也颇为糟糕。如果可能，我们的数据库应始终使用 `UTF8`，而非像 `US7ASCII`、`WE8ISO8859P1`、`WE8MSWIN1252`
    这样的旧字符集。Oracle 官方早已推荐使用 `UTF8`，但令人费解的是，直到 12.2 版本它才成为默认设置。


    关于字符集差异的讨论很多，但权衡的核心在于：`UTF8` 支持所有字符，但可能稍占空间。除非我们有具体、客观的理由不使用 `UTF8`，否则选择其他字符集是不明智的。我见过许多因使用旧字符集引发的问题，也见过许多数据库后来转换到
    `UTF8` 时产生的奇怪错误。我们需要从项目一开始就选择正确的字符集。如果我们的数据库未使用 `UTF8`，本节中的示例将无法正确工作。


    Oracle 提供了 Unicode 数据类型 `NVARCHAR2`、`NCLOB`、`NCHAR` 和 `N''''` 文本字面量。这些类型的存在是为了应对这种情况：我们正在使用旧字符集，但需要支持少数几列为
    Unicode 数据。这些数据类型使用 `UTF16` 或 `UCS2`——它们与 `UTF8` 略有不同，但兼容。理想情况下，我们永远不需要使用带“N”的数据类型。


    在处理字符集问题时，Oracle 函数 `DUMP` 和 `UNISTR` 非常有用。`DUMP` 显示数据的内部表示，如第 3 章所述。`UNISTR`
    让我们能够创建 Unicode 字符，即使我们的数据库客户端不支持 Unicode。大多数 IDE 支持 `UTF8`，但别忘了我们的安装脚本可能由配置不当的
    SQL*Plus 客户端执行。


    如果我们担心源代码文件可能损坏，存储非 ASCII 数据最安全的方式是使用 `UNISTR` 函数。例如，`LAUNCH.ORG_UTF8_NAME` 列包含许多非
    ASCII 字符。如果字符串像这样定义，加载 `UTF8` 数据会更安全：


    ```sql

    --使用任何编码的文本文件存储 Unicode 字符。

    select unistr(''A\00e9ro-Club de France'') org_utf8_name

    from dual;

    ```


    ORG_UTF8_NAME

    -------------

    Aéro-Club de France


    请注意上面输出中的“é”。实际上，`UNISTR` 语法过于繁琐，不便频繁使用。该函数仅在文本几乎全是 ASCII 字符，只有少数例外时才有帮助。


    ### 长度语义


    我们如何计算字符串长度会产生重要影响。Oracle 默认使用字节长度语义，即字符串大小以字节数衡量。有时我们需要切换到字符长度语义，即字符串大小以字符数计算。当我们使用变宽字符集（如
    `UTF8`）时，需要记住 X 字节并不总是等于 X 个字符。


    以下代码演示了字符长度语义的重要性。如果我们创建一个包含类型为 `VARCHAR2(1)` 的列的表，该列只能存储 1 字节的数据。当我们尝试插入一个多字节字符时，示例会引发异常“ORA-12899:
    值对于列 "SCHEMA". "BYTE_SEMANTICS_TEST". "A" 来说太大（实际值: 2, 最大值: 1）”。发生此错误是因为被插入的字符是非
    ASCII 的“é”，在 `UTF8` 中无法容纳于 1 字节内。（但如果我们使用的是扩展 ASCII 字符集，以下代码可能会成功，因为该字符可能适合 1
    字节。）


    ```sql

    --字节长度语义导致错误。

    create table byte_semantics_test(a varchar2(1));

    insert into byte_semantics_test values(''é'');

    ```


    如果我们在数据类型定义中的数字后添加关键字 `CHAR`，Oracle 将使用字符长度语义。现在该列将容纳一个字符，无论该字符使用多少字节：


    ```sql

    --字符长度语义工作正常。

    create table character_semantics_test(a varchar2(1 char));

    insert into character_semantics_test values(''é'');

    ```


    即使我们认为我们的数据库只包含 ASCII 字符，也很可能最终会包含文字处理标记字符。例如，Microsoft 的智能引号看起来像普通引号，但可能使用 2
    字节而非 1 字节。


    ### NLS 比较与排序


    文本比较和排序默认按二进制值进行。二进制排序意味着两个字符串只有在内部表示相同时才被视为相等。字符根据其在字符集中的数值排序。二进制排序是为什么大写字母出现在小写字母之前的原因；“A”在
    ASCII 中是数字 65，“a”在 ASCII 中是数字 97。（前 127 个 ASCII 字符在 `UTF8` 中的处理方式相同。）


    参数 `NLS_COMP` 和 `NLS_SORT` 使我们能够将比较和排序行为更改为更具语言学意义的方式。我们可以忽略大小写或重音进行比较和排序，或者根据特定语言的规则进行排序。（但要注意使用非二进制排序和比较会带来巨大的性能损失。基于二进制比较构建的索引不能用于语言学比较，反之亦然。）


    例如，让我们查找儒勒·凡尔纳于 1898 年创立的法国航空俱乐部。“Aéro-Club de France”属于太空数据集，因为该组织参与了发射 Sputnik
    41。让我们在不输入带重音字符的情况下查找该组织：


    ```sql

    --使用不依赖重音的语言学比较和排序。

    alter session set nls_comp=linguistic;

    alter session set nls_sort=binary_ai;

    select org_utf8_name

    from organization

    where org_utf8_name like ''Aero-Club de France%'';

    ```


    ORG_UTF8_NAME

    -------------

    Aéro-Club de France


    `NLS_COMP` 和 `NLS_SORT` 参数可以按系统、会话、方案、表、列或语句进行设置。与所有参数一样，我们只希望在尽可能小的范围内设置它们。例如，如果你只需要针对特定语句修改
    NLS 设置，就不要更改整个系统的 NLS 设置。


    NLS 功能也可通过 `NLS_*` 函数使用。当我们不想更改参数时，可以在需要时精确调用 NLS 函数。例如，大多数太空数据集在使用二进制排序和比较时工作良好。但如果我们使用国际化名称进行排序，默认顺序可能没有意义。我们可能期望“Aéro-Club
    de France”出现在名称类似于“Aero”的其他组织旁边。但默认情况下，该字符串出现在其他地方：


    ```sql

    --常规排序。

    --（将会话排序重置为默认值。）

    alter session set nls_sort=binary;

    select org_utf8_name

    from organization

    order by org_utf8_name;

    ```


    ORG_UTF8_NAME

    -------------

    ...

    Aeritalia Sistemi Spaziali (Torino)

    AeroAstro, Inc

    ...


    使用 `BINARY_AI` 排序的 `NLSSORT` 函数将“Aéro-Club de France”显示在正确的位置：


    ```sql

    --不依赖重音的排序。

    select org_utf8_name

    from organization

    order by nlssort(org_utf8_name, ''nls_sort=binary_ai'');

    ```


    ORG_UTF8_NAME

    -------------

    ...

    Aeritalia Sistemi Spaziali (Torino)

    Aéro-Club de France

    AeroAstro, Inc

    ...

    '
- fmt: '### Display Formats


    NLS functionality is also important for displaying data. There are a dozen parameters
    that control the format of dates, timestamps, money, error messages, and numbers.
    The most popular and abused parameter is `NLS_DATE_FORMAT`. Like with almost all
    parameters, there is a hierarchy of ways that `NLS_DATE_FORMAT` can be applied.
    That parameter can be set per database, per session, or per function call. We
    should never assume a specific value of `NLS_DATE_FORMAT` at the database level.
    Many tools and programs automatically change the session settings and override
    the database settings.


    `NLS_DATE_FORMAT` and similar parameters are only for ad hoc display formatting.
    Never rely on an implicit date format for processing. The following code, looking
    for the first satellite launch on October 4, 1957, is dangerous. Depending on
    our IDE’s settings, the code may fail with the error “ORA-01858: a non-numeric
    character was found where a numeric was expected”:


    ```

    --Dangerous NLS_DATE_FORMAT assumption.

    select *

    from launch

    where trunc(launch_date) = ''04-Oct-1957'';

    ```


    The following code uses an explicit date format conversion with the `TO_CHAR`
    function. It is much safer than the previous code. But even this version has problems;
    “Oct” is not always the correct abbreviation for “October.” But using an explicit
    date format in our programs is still much safer than an implicit date format.
    Chapter [15](#471418_2_En_15_Chapter.xhtml) explains how to make this code completely
    safe with date literals:


    ```

    --Somewhat safe date format conversion.

    select *

    from launch

    where to_char(launch_date, ''DD-Mon-YYYY'') = ''04-Oct-1957'';

    ```


    ## Summary


    This chapter briefly introduced many advanced `SELECT` features. Each topic could
    easily fill an entire chapter, and some of them could fill an entire book. Don’t
    expect to remember the syntax details. It’s more important we remember the features
    and patterns and when to use them. SQL is easy to learn but hard to master.


    This is the longest and most code-intensive chapter. Selecting data is the most
    important part of database operations. But ultimately, we need to create and change
    data. The next chapter discusses advanced features for modifying our data.


    Footnotes [1](#471418_2_En_7_Chapter.xhtml#Fn1_source)   [2](#471418_2_En_7_Chapter.xhtml#Fn2_source)   [3](#471418_2_En_7_Chapter.xhtml#Fn3_source)


    # 8. Modify Data with Advanced DML


    Now that we learned how to write advanced SQL statements to retrieve data, it
    is time to learn how to write advanced SQL statements to change data. Oracle Data
    Manipulation Language (`DML`) lets us insert, update, and delete data.^([^(18)](#fn18))


    Oracle provides four main statements for changing data: `INSERT`, `UPDATE`, `DELETE`,
    and `MERGE`. Each of these statements has advanced options specific to that command.
    There are also advanced features relevant to all `DML` statements: updatable views,
    hints, error logging, and the returning clause. Some additional commands are not
    technically `DML` statements but are used to help us change data: `TRUNCATE`,
    `COMMIT`, `ROLLBACK`, `SAVEPOINT`, `ALTER SYSTEM`, `ALTER SESSION`, and others.
    Using and modifying data not stored in Oracle is challenging, and Oracle has many
    different options for file input and output. Finally, although `PL/SQL` is mostly
    outside the scope of this book, there are `PL/SQL` packages we need to use to
    manage our data.


    This chapter, like all chapters, assumes you are already familiar with basic SQL
    concepts. Each section is going to jump right into an advanced feature. To save
    space, the examples directly modify tables in the data set. Remember to roll back
    the changes when you’re done with each example.


    ## INSERT


    The `INSERT ALL` syntax was intended to add data to multiple tables in one statement.
    The feature supports conditional logic, where we read from a large source table
    and use `WHEN-THEN-ELSE` logic to decide which rows go to which destination table.
    But in practice the syntax is most commonly used to generate data and insert multiple
    rows into the same table.


    For example, let’s say we want to load new fuels into the `PROPELLANT` table.
    There are several ways to generate data, and previous chapters already demonstrated
    the `UNION ALL` trick. The following code demonstrates the `INSERT ALL` trick:


    ```

    --Generate new PROPELLANT rows.

    insert all

    into propellant values (-1, ''antimatter'')

    into propellant values (-2, ''dilithium crystals'')

    select * from dual;

    ```


    Note how the preceding `INSERT ALL` does not use sequences but instead hard-codes
    the primary keys. Hard-coding is necessary, because `INSERT ALL` only increments
    the sequence once per statement, not once per row.


    There’s a debatable style choice with the `INSERT ALL` statement – the preceding
    code doesn’t list all the column names. Normally, an `INSERT` should explicitly
    list the column names, to make it clear what values are being set. And listing
    the column names ensures the values go in the right place, even in the unlikely
    situation where the column order changes. On the other hand, we don’t want to
    repeat ourselves and list the column names multiple times.


    The `INSERT ALL` trick is neat, but the `UNION ALL` trick is better for generating
    data. The `INSERT ALL` statement is slower to parse than `UNION ALL`, especially
    for large statements with hundreds of rows.


    If our applications are generating lots of data, an `INSERT ALL` is much better
    than multiple `INSERT` statements. But an `INSERT ALL` is not as good as using
    the application’s batching API. Don’t get carried away with `INSERT ALL`. It’s
    a neat trick, but it’s not meant for generating enormous amounts of data.'
