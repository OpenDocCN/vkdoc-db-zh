  trans: '## 分区


    分区将表和索引划分为更小的片段，以提高性能和可管理性。分区表在我们的 SQL 语句看来与常规表无异。在底层，Oracle 可以调整我们的语句，使其仅访问相关分区，而不是读取整个表。分区技术在长达
    425 页的《*VLDB 与分区指南*》中有完整描述。本节简要概述分区，更侧重于理解分区为何有效，而非罗列其数百项特性。


    ### 分区概念


    尽管分区在“超大型数据库”手册中描述，但它对任何规模的数据库都可能有益。分区关乎我们访问数据的*百分比*，而不仅仅是数据的*大小*。分区和索引解决的是两种不同的性能问题；索引在检索少量行时效果最佳，而分区在检索大量行时效果最佳。


    让我们用一个例子来理解分区的基本机制。本书中的大多数示例都通过 `LAUNCH_CATEGORY` 列来筛选 `LAUNCH` 表。我们很少需要查询所有发射记录，因为进行天气实验的探空火箭与将卫星送入轨道的轨道发射之间存在巨大差异。


    我们的目标是优化这条 SQL 语句：`SELECT * FROM LAUNCH WHERE LAUNCH_CATEGORY = ''orbital''`。该
    SQL 语句检索了相对较大比例的行。正如上一节所讨论的，索引无法帮助我们检索大量行的原因有多个。我们希望拥有全表扫描带来的多块读取效率，但又不希望读取整个表。为了理解分区，让我们首先通过一种称为“分区视图”的旧技术来艰难地实现我们的目标。我们可以通过创建多个表并将它们组合到一个视图中，来获得多块读取效率并排除大部分行。


    首先，我们为每个发射类别创建一个表。只有十个发射类别，因此创建这些表不会花费太长时间。（此处仅列出这个大示例的第一部分。完整示例代码请参见代码库。）


    ```

    --为每个 LAUNCH_CATEGORY 创建一个表。

    create table launch_orbital as

    select * from launch where launch_category = ''orbital'';

    create table launch_military_missile as

    select * from launch where launch_category = ''military missile'';

    ...

    ```


    接下来，创建一个名为 `LAUNCH_ALL` 的视图，将这些小表拼接在一起：


    ```

    --创建一个将按类别划分的表组合在一起的视图。

    create or replace view launch_all as

    select * from launch_orbital

    where launch_category = ''orbital''

    union all

    select * from launch_military_missile

    where launch_category = ''military missile''

    ...

    ```


    当我们从前面的视图查询时，结果与直接查询原始 `LAUNCH` 表相同，但视图查询提供了最佳性能。Oracle 可以读取视图定义，理解十个表中只有一个能满足谓词
    `LAUNCH_CATEGORY = ''orbital''`，并且将只从该表读取。起初这个方案看起来两全其美；我们像查询大表一样查询视图，但视图却像一个小表一样运作：


    ```

    --这些查询返回相同的结果，但 LAUNCH_ALL 更快。

    select * from launch where launch_category = ''orbital'';

    select * from launch_all where launch_category = ''orbital'';

    ```


    我们刚刚构建了一个简陋的分区方案。我们的特定示例运行良好，但该解决方案存在严重缺陷。我们无法更新 `LAUNCH_ALL`，因为会遇到可更新视图的问题。创建表和视图很繁琐，并且需要重复谓词。如果我们想创建索引，则必须为每个表创建一个索引。


    真正的分区自动执行上述步骤，并创建一个能以最佳方式无瑕疵工作的表。Oracle 为每个分区创建一个段，其行为就像一个表。Oracle 完美理解这些段与表之间的映射关系，并且所有表操作在分区表上都能自动进行。


    以下代码展示了如何创建一个真正的分区 `LAUNCH` 表。（或者，我们可以使用 `ALTER TABLE` 将分区添加到现有表。）这里有一些新语法，但这段代码比显式创建额外的表、视图和索引要简单得多：


    ```

    --创建并查询一个分区的 launch 表。

    create table launch_partition

    partition by list(launch_category)

    (

    partition p_sub values(''suborbital rocket''),

    partition p_mil values(''military missile''),

    partition p_orb values(''orbital''),

    partition p_atm values(''atmospheric rocket''),

    partition p_pln values(''suborbital spaceplane''),

    partition p_tst values(''test rocket''),

    partition p_dep values(''deep space''),

    partition p_bal values(''ballistic missile test''),

    partition p_snd values(''sounding rocket''),

    partition p_lun values(''lunar return'')

    ) as

    select * from launch;

    select *

    from launch_partition

    where launch_category = ''orbital'';

    ```


    为什么我们不直接创建前面的分区表，而跳过那个由多个表和视图构建的糟糕版本呢？理解分区并非魔法很重要。太多 SQL 开发人员总是对大表进行分区，并认为分区会提升性能。分区只是一个将大表分解为小表的自动系统。如果我们想不出一种让查询多个更小的表能改善我们
    SQL 语句的方法，那么分区将无济于事。


    除了提高 SQL 语句的性能外，分区还可以使我们的数据更易于管理。例如，通过一个调度作业，读取数据字典中的分区元数据并截断或删除旧分区，可以轻松创建数据保留系统。而且从
    19c 开始，我们可以创建混合分区表，其中一些分区基于外部文件或其他外部数据源。'
- fmt: '# 分区特性


    分区拥有大量特性。Oracle提供了多种将表划分为分区、使用分区以及索引分区的方法。


    我们最重要的分区决策是如何将表划分为分区。我们需要确定SQL语句最常引用的“数据块”。以下列表包含了最常见的分区选项：


    -   *List*：每个分区映射到一个值列表，并可以包含一个`DEFAULT`值来覆盖其他所有情况。适用于低基数的离散值，例如状态或类别列。

    -   *Range*：每个分区包含一个值范围。每个分区被定义为小于特定字面量，或使用`MAXVALUE`来覆盖其他所有情况。适用于连续值，例如数值和日期值。

    -   *Hash*：每个分区包含基于某个值的哈希值计算得出的随机行。适用于我们希望将数据分组但不太关心具体分组方式的情况。通常，仅当多个表以相同方式分区并计划使用分区-wise连接时才有用。^([^(25)](#fn25))
    分区数应为2的幂，否则分区大小会出现偏差。

    -   *Interval*：与范围分区相同，只是不需要完全指定范围。只需定义一个初始值和一个间隔，Oracle将自动创建必要的分区。适用于会不断增长的连续值。

    -   *Reference*：使用列表、范围、哈希或间隔分区，但让子表自动遵循父表的分区方案。分区列不会重复，因此这在节省父-子表空间方面很有用。

    -   *Composite*：列表、范围、哈希和间隔的组合，形成分区和子分区。


    选择分区类型后，我们必须选择分区的数量。分区数量涉及权衡，并取决于我们将如何访问表。大量小分区使我们能更快地仅访问所需数据。但数量越大，开销就越大，管理起来也越困难。Oracle在管理分区的元数据和统计信息等方面做得很好；但如果我们最终有百万个分区，数据字典将会陷入停滞。我们可能倾向于选择较少的分区。例如，即使我们的查询每天只检索数据，每周的间隔分区可能就足够了。


    分区和表一样，具有许多属性。分区从其表继承属性，但为不同分区自定义属性可能是有意义的。通过分区，我们可以在单个表中实现分层存储。例如，对于按日期范围分区的表，新分区可以存储在使用快速存储的表空间中，而较旧的分区可以被压缩并存储在使用较慢、更便宜存储的表空间中。


    并行是分区中最容易被误解的特性。并行和分区往往一起使用，因为两者都有助于处理大数据。但我们并不需要为了利用其中一个而使用另一个。表面上，并行和分区听起来很相似——它们都将大表分解成更小的部分。但并行SQL在非分区表上的工作效果与在分区表上一样好。并行不一定非得使用分区块；并行可以轻松地将表本身划分为称为粒度的片段。


    交换分区在数据仓库中用于帮助加载数据。我们可以花时间将数据加载到临时暂存表中。完成加载并验证数据后，可以将整个暂存表与生产分区交换。交换操作只是一个元数据更改，运行速度比插入数据快得多。


    执行分区维护有多种语法选项。以下代码展示了一个示例，演示如何使用分区扩展子句从分区表中删除数据，以及使用`ALTER TABLE`命令截断同一个分区：


    ```

    --Partition administration examples.

    delete from launch_partition partition (p_orb);

    alter table launch_partition truncate partition p_orb;

    ```


    分区表可以有索引。混合使用分区和索引让我们两全其美——我们可以使用分区来高效地检索大部分数据，也可以使用索引来高效地检索小部分数据。


    分区表上的索引可以是全局的，也可以是本地的。虽然分区表的表数据在物理上被分离到多个分区中，但索引数据不需要遵循相同的模式。全局索引是一个覆盖所有分区的单一、大型树结构。本地索引包含多个较小的树，其中每个树覆盖一个分区。全局索引最适合搜索分布在多个分区中的少量值。本地索引最适合检索都在同一分区内的少量值。


    # 视图


    视图是存储的SQL语句。我们可以引用视图，而不是多次重复相同的SQL语句。视图只存储逻辑，不存储数据。物化视图包含实际数据，将在本章后面讨论。视图没有太多高级特性，前面的章节和部分已经讨论了可更新视图和视图约束。但是，创建和扩展视图存在一些重要问题。


    ## 创建视图


    创建视图很简单。两个视图创建选项是`OR REPLACE`和`FORCE`。这些选项的工作方式没什么神秘的；`OR REPLACE`意味着视图将覆盖现有视图，`FORCE`意味着即使视图中的某些内容不存在，视图也会被创建。以下代码演示了这两个选项：


    ```

    --View with "OR REPLACE" and "FORCE".

    create or replace force view bad_view as

    select * from does_not_exist;

    --The view exists but is broken and throws this error:

    --ORA-04063: view "SPACE.BAD_VIEW" has errors

    select * from bad_view;

    ```


    关于这两个选项的有趣之处在于，它们*不是*视图的属性——它们只是关于如何创建视图的指令。当我们通过`DBMS_METADATA.GET_DDL`或在IDE中点击按钮来查看视图源代码时，这些程序不一定会返回我们最初用于创建视图的选项。这些程序只返回它们认为我们下次可能想要使用的选项。


    我们的原始DDL与元数据工具返回的DDL之间的这种差异，是为什么我们应该将代码存储在版本控制的文本文件中，而不是依赖数据库重建对象的另一个例子。也许我们不想在视图已存在时替换它——可能视图创建是一个不可重复过程的一部分。也许我们不想强制创建视图——我们可能希望脚本在检测到错误时立即失败。数据字典无法完美地重现我们的过程，只能做出猜测。我们的构建脚本应力求100%的可重复性，因此我们必须注意这些微小的差异。'
  raw: '### Partitioning Features


    Partitioning has a huge number of features. Oracle provides many ways to divide
    tables into partitions, use partitions, and index partitions.


    The most important partitioning decision we have to make is how to divide our
    table into partitions. We need to determine the “chunks” of data that our SQL
    statements will most often reference. The following list includes the most common
    partition options:


    1.  *List*: Each partition maps to a list of values and can include a `DEFAULT`
    value to cover everything else. Useful for low-cardinality discrete values, such
    as a status or category column.


    2.  *Range*: Each partition contains a range of values. Each partition is defined
    as values less than a specific literal, or the `MAXVALUE` to cover everything
    else. Useful for continuous values, such as numeric and date values.


    3.  *Hash*: Each partition contains a random row, based on the hash of a value.
    Useful for data that we want to split into groups but we don’t care about the
    precise grouping. Typically, only useful if multiple tables are partitioned the
    same way and we plan to use partition-wise joins.^([^(25)](#fn25)) The partition
    number should be a power of 2, or the partition sizes will be skewed.


    4.  *Interval*: Same as range partitioning, except the ranges do not need to be
    fully specified. Only an initial value and an interval must be defined, and Oracle
    will automatically create the necessary partitions. Useful for continuous values
    that will grow.


    5.  *Reference*: Uses list, range, hash, or interval partitioning, but lets the
    child table automatically follow the partitioning scheme of the parent table.
    The partitioned columns are not repeated, so this is useful for saving space in
    parent–child tables.


    6.  *Composite*: Combinations of list, range, hash, and interval, into partitions
    and subpartitions.


    After we choose the partition type, we must choose the number of partitions. The
    number of partitions involves trade-offs and depends on how we are going to access
    the table. A large number of small partitions let us more quickly access only
    the data we need. But the larger the number, the larger the overhead and the more
    difficult it is to manage. Oracle does a good job of managing things like metadata
    and statistics for partitions; but if we end up with a million partitions, the
    data dictionary is going to grind to a halt. We might want to err on the side
    of fewer partitions. For example, even if our queries retrieve data one day at
    a time, weekly interval partitioning might be good enough.


    Partitions, like tables, have many properties. Partitions inherit their properties
    from their table, but it may make sense to customize properties for different
    partitions. With partitioning, we can implement tiered storage within a single
    table. For example, for a table range partitioned by a date, new partitions can
    be stored in tablespaces that use fast storage, while older partitions can be
    compressed and stored in tablespaces that use slower, cheaper storage.


    Parallelism is the most misunderstood partitioning feature. Parallelism and partitioning
    tend to go together, since both of them help with large data. But we do not need
    to use one to take advantage of the other. On the surface, parallelism and partitioning
    sound similar – they both break large tables into smaller pieces. But parallel
    SQL works just as well on non-partitioned tables as on partitioned tables. Parallelism
    doesn’t have to use the partition chunks; parallelism can just as easily divide
    up the table by itself into pieces called granules.


    Partition exchange is used in data warehouses to help load data. We can take our
    time loading data into a temporary staging table. When we’re done with the load
    and we’ve verified the data, we can swap that whole staging table with the production
    partition. The exchange operation is only a metadata change and runs much faster
    than inserting the data.


    There are multiple syntax options for performing partition maintenance. The following
    code shows an example of deleting from a partitioned table using the partition
    extension clause and truncating the same partition using an `ALTER TABLE` command:


    ```

    --Partition administration examples.

    delete from launch_partition partition (p_orb);

    alter table launch_partition truncate partition p_orb;

    ```


    Partitioned tables can have indexes. Mixing partitioning and indexing gives us
    the best of both worlds – we can use the partitions to efficiently retrieve a
    large percentage of data, and we can use the indexes to efficiently retrieve a
    small percentage of data.


    Indexes on partitioned tables can be either global or local. While the table data
    for a partitioned table is physically separated into multiple partitions, the
    index data does not need to follow the same pattern. A global index is a single,
    large tree that covers all the partitions. A local index contains multiple, smaller
    trees where each tree covers a single partition. A global index works best for
    searching for a small number of values that are spread across multiple partitions.
    A local index works best for retrieving a small number of values that are all
    within the same partition.


    ## Views


    Views are stored SQL statements. We can reference views instead of repeating the
    same SQL statements multiple times. Views only store the logic, not the data.
    Materialized views include actual data and are discussed later in this chapter.
    There aren’t many advanced features for views, and previous chapters and sections
    have already discussed updatable views and view constraints. But there are important
    issues with creating and expanding views.


    ### Creating Views


    Creating views is simple. Two of the view creation options are `OR REPLACE` and
    `FORCE`. There’s not much mystery to how those options work; `OR REPLACE` means
    the view will overwrite an existing view, and `FORCE` means that the view will
    be created even if something in the view doesn’t exist. The following code demonstrates
    these two options:


    ```

    --View with "OR REPLACE" and "FORCE".

    create or replace force view bad_view as

    select * from does_not_exist;

    --The view exists but is broken and throws this error:

    --ORA-04063: view "SPACE.BAD_VIEW" has errors

    select * from bad_view;

    ```


    The interesting thing about these two options is that they are *not* properties
    of the view – they are simply instructions for how to create a view. When we look
    at view source code through `DBMS_METADATA.GET_DDL` or by clicking a button in
    our IDE, the programs do not necessarily return the options we used to initially
    create the view. The programs only return the options they think we might want
    to use next time.


    This difference between our original DDL and the DDL returned by metadata tools
    is another example of why we should store our code in version-controlled text
    files, instead of relying on the database to recreate our objects. Maybe we don’t
    want to replace the view if the view already exists – perhaps the view creation
    was part of a non-repeatable process. Maybe we don’t want to force the creation
    of the view – perhaps we want our script to fail as soon as an error is detected.
    The data dictionary cannot perfectly recreate our processes and has to make guesses.
    We should aim for 100% reproducibility in our build scripts, so we have to watch
    out for these tiny differences.'
