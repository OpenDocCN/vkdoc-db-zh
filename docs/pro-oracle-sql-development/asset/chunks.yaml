    ## JSON


    Similar to XML, the converged Oracle database can generate, read, and process
    JSON data. Oracle’s JSON support has grown significantly in recent years. If we’re
    working with a lot of JSON data, we need to pay close attention to the precise
    version of our database and use the newest features listed in the *SQL Language
