    is a join based on the equality operator, `=`. A non-equijoin uses something else,
    such as `<>` or `BETWEEN`. The distinction matters because there can be serious
    performance issues when using non-equijoins. Only equijoins can be used for hash
    join operations. Hash joins are discussed in more detail in Chapter [16](#471418_2_En_16_Chapter.xhtml).
    For now, it’s only important to understand that hash joins are often the fastest
    join method. If there are performance problems, it may help to rewrite a non-equijoin
    into an equijoin, to allow a hash join. But it’s not always possible to rewrite
    a query to use an equality predicate.


    ### Semi-join or Anti-join


    Semi-joins and anti-joins are join types where Oracle may not need to process
    all rows to get the results. For semi-joins, Oracle can stop joining as soon as
    it finds one row that matches. For anti-joins, Oracle can stop joining as soon
    as it finds one row that doesn’t match. These join types often happen when the
    query uses a correlated subquery along with an `IN`, `NOT IN`, `EXISTS`, or `NOT
    EXISTS`.


    As an example of a semi-join, let’s say we want to count all the satellites that
    have an associated launch. A similar query was created in Chapter [1](#471418_2_En_1_Chapter.xhtml)
    to discuss nulls, but now we’re going to slightly rewrite the query to emphasize
    the semi-join:


    ```

    --Satellites with a launch.

    select count(*)

    from satellite

    where exists

    (

    select 1/0

    from launch

    where launch.launch_id = satellite.launch_id

    );

    ```


    The result is 43,112 satellites, which is just one smaller than the total number
    of satellites. Let’s use an anti-join to find the satellite without a launch.
    The following query returns one row, for “Unknown Oko debris”:


    ```

    --Satellites without a launch.

    select official_name

    from satellite

    where not exists

    (

    select 1/0

    from launch

    where launch.launch_id = satellite.launch_id

    );

    ```


    You may have noticed something seemingly impossible in the preceding examples
    – both of the preceding queries divide by zero. `EXISTS` conditions don’t use
    the results of the subquery, since the conditions only care about whether there
    are rows or not. The subquery must have an expression to fulfill the syntax rules,
    but that expression is ignored and not even executed. To emphasize the unimportance
    of the value, I used `1/0`. As a rule, whenever I do something weird, like create
    a value that doesn’t matter, I like to make the code look obviously weird. If
    the query had just used a normal value like “1” or “A”, future readers might wonder
    what those values mean. The expression `1/0` will hopefully make it clear to others
    how irrelevant the value is.


    Semi-joins and anti-joins are notable because they often cause performance problems.
    The way semi- and anti-joins are coded looks like we’re asking Oracle to do work
    for each row, almost like we’re trying to break out of the declarative programming
    model and tell Oracle how to do its job. Luckily, Oracle is usually smart enough
    to know when these queries are best rewritten to use normal joins. But sometimes
    we can improve performance and readability by rewriting queries to not have correlated
    subqueries.'
  trans: '## 连接


    连接（Join）有多种分类方式，且这些分类之间存在大量重叠。相关术语可能听起来令人困惑，某些选项可能显得深奥难懂。请记住，连接是数据库最重要的操作，一个先进的数据库理应提供众多连接选项。（衡量连接功能也是快速评估替代数据库的一种方式。如果一个数据库不认真对待连接，那它只是一个数据存储程序，而非数据处理程序。）本章仅讨论连接的语法和功能；实现连接所使用的算法在第
    16 章中讨论：


    1.  内连接、左外连接、右外连接、全外连接、交叉连接（笛卡尔积）、分区外连接、LATERAL 连接、交叉应用或外部应用

    2.  旧式语法或 ANSI 连接语法

    3.  等值连接或非等值连接

    4.  半连接、反连接或两者都不是

    5.  自连接或非自连接

    6.  自然连接或非自然连接

    7.  ON 子句或 USING 子句


    上述列表中的一些项目，已在前面章节的示例中讨论和演示过。我们无需再进一步讨论内连接、左连接、右连接、全连接、交叉连接，以及旧式语法与 ANSI 连接语法的区别。由于连接如此重要，本节的剩余部分将讨论前述列表中剩下的每一项。


    ### 分区外连接


    分区外连接对于数据增密非常有用。当我们需要计算某事件在每个组内发生的次数，并希望将结果显示在一个时间段上时，就会用到增密。我们希望看到每个项目、每个时间段的计数，即使计数为零。使用常规的左外连接很难创建多个空行——左外连接可能包含所有时间段，但不会是每个项目的每个时间段。分区外连接就像是一种多重连接——它为每个项目连接时间段。


    如果没有示例，分区外连接会很难理解。举一个具体例子，假设我们想统计 2017 年每个运载火箭系列每月的发射次数。如果某个月没有发射，我们仍然希望看到一行，但计数为零：


    ```sql

    --2017 年按运载火箭系列和月份统计的发射次数。

    select

    launches.lv_family_code,

    months.launch_month,

    nvl(launch_count, 0) launch_count

    from

    (

    --2017 年的每个月。

    select ''2017-''||lpad(level, 2, 0) launch_month

    from dual

    connect by level <= 12

    ) months

    left join

    (

    --2017 年轨道和深空发射。

    select

    to_char(launch_date, ''YYYY-MM'') launch_month,

    lv_family_code,

    count(*) launch_count

    from launch

    join launch_vehicle

    on launch.lv_id = launch_vehicle.lv_id

    where launch_category in (''orbital'', ''deep space'')

    and launch_date between

    date ''2017-01-01'' and timestamp ''2017-12-31 23:59:50''

    group by to_char(launch_date, ''YYYY-MM''), lv_family_code

    ) launches

    partition by (launches.lv_family_code)

    on months.launch_month = launches.launch_month

    order by 1,2,3;

    LV_FAMILY_CODE  LAUNCH_MONTH  LAUNCH_COUNT

    --------------  ------------  ------------

    Ariane5         2017-01                  0

    Ariane5         2017-02                  1

    Ariane5         2017-03                  0

    ...

    Atlas5          2017-01                  1

    Atlas5          2017-02                  0

    Atlas5          2017-03                  1

    ...

    ```


    乍一看，上述结果似乎并不特别。但如果没有分区外连接，生成那些计数为零的行会非常麻烦。没有其他简单的方法可以基于分组重复连接表。


    ### LATERAL、CROSS APPLY 和 OUTER APPLY


    LATERAL 连接、交叉应用和外部应用连接不值得推荐，应尽量避免使用。这些功能大多是为了帮助迁移 SQL Server 查询而添加到 Oracle 中的。这三种连接类型允许内联视图访问其外部的值，这破坏了使用内联视图的初衷。它们增加了查询的上下文范围，阻碍了构建小型、独立的集合。LATERAL、交叉应用和外部应用连接就像是读取了它们不该读取的东西，例如读取另一个类中的私有变量。


    ### 等值连接或非等值连接


    等值连接与非等值连接乍看之下似乎是个无意义的区分。等值连接是基于等于运算符 `=` 的连接。非等值连接则使用其他运算符，例如 `<>` 或 `BETWEEN`。这个区分很重要，因为使用非等值连接时可能会出现严重的性能问题。只有等值连接才能用于哈希连接操作。哈希连接在第
    16 章中有更详细的讨论。现在，只需理解哈希连接通常是最快的连接方法即可。如果存在性能问题，将非等值连接改写为等值连接以启用哈希连接可能会有所帮助。但并非总是能将查询改写为使用等值谓词。


    ### 半连接或反连接


    半连接和反连接是两种连接类型，Oracle 在获取结果时可能无需处理所有行。对于半连接，一旦找到一个匹配行，Oracle 就可以停止连接。对于反连接，一旦找到一个不匹配的行，Oracle
    就可以停止连接。当查询使用关联子查询配合 `IN`、`NOT IN`、`EXISTS` 或 `NOT EXISTS` 时，经常会触发这两种连接类型。


    作为半连接的示例，假设我们要统计所有有关联发射记录的卫星数量。第 1 章中曾创建了一个类似的查询来讨论空值，但现在我们将稍微改写该查询以强调半连接：


    ```sql

    --有发射记录的卫星。

    select count(*)

    from satellite

    where exists

    (

    select 1/0

    from launch

    where launch.launch_id = satellite.launch_id

    );

    ```


    结果是 43,112 颗卫星，仅比卫星总数少 1。让我们用反连接来查找没有发射记录的卫星。以下查询返回一行，对应“Unknown Oko debris”：


    ```sql

    --没有发射记录的卫星。

    select official_name

    from satellite

    where not exists

    (

    select 1/0

    from launch

    where launch.launch_id = satellite.launch_id

    );

    ```


    你可能注意到上述示例中似乎不可能的事情——两个查询都除以零。`EXISTS` 条件不使用子查询的结果，因为该条件只关心是否存在行。子查询必须有一个表达式以符合语法规则，但这个表达式会被忽略甚至不执行。为了强调该值的无关紧要，我使用了
    `1/0`。通常，每当我做奇怪的事情时，比如创建一个无关的值，我喜欢让代码看起来明显奇怪。如果查询只是使用像“1”或“A”这样的正常值，后来的读者可能会疑惑这些值的含义。表达式
    `1/0` 希望能让其他人明白该值是多么无关紧要。


    半连接和反连接值得注意，因为它们常常导致性能问题。半连接和反连接的编码方式看起来像是我们要求 Oracle 为每一行做工作，几乎像是试图跳出声明式编程模型，告诉
    Oracle 如何完成工作。幸运的是，Oracle 通常足够智能，知道何时这些查询最好被改写为使用普通连接。但有时，通过重写查询以消除关联子查询，我们可以提升性能和可读性。'
- fmt: '### Self-Joins


    Self-joins are when a table is joined to itself. At a first glance there’s nothing
    special about self-joins – they work the same way as any other join. The following
    example shows a simple self-join of the `ORGANIZATION` table, to find each organization’s
    parent organization. When joining the table to itself, the table is listed twice
    in the `FROM` clause, and at least one of the tables must have an alias:


    ```

    --Organizations and parent organizations.

    select

    organization.org_name,

    parent_organization.org_name parent_org_name

    from organization

    left join organization parent_organization

    on organization.parent_org_code = parent_organization.org_code

    order by organization.org_name desc;

    ORG_NAME               PARENT_ORG_NAME

    ---------------------  ---------------------

    iSpace

    exactEarth Ltd.        Com Dev International

    de Havilland Aircraft

    ...

    ```


    The results may look a little odd at first because of case-sensitive sorting.
    By default, Oracle sorts are case sensitive, and when sorting descending, the
    lowercase letters come first. You may get different results on your database,
    depending on NLS parameters, as described later in this chapter.


    Self-joins are worth a separate category because they can be so complicated. The
    preceding example was simple because we only looked for one parent. But that parent
    might also have a parent, which also has a parent, etc. Finding all of the ancestors,
    or finding the root ancestor, requires a recursive query. Recursive queries are
    extra tricky and are dealt with in a later section.


    ### Natural Joins and USING Considered Harmful


    Natural joins should never be used. Natural joins automatically determine the
    join conditions based on the column names. Wherever the column names match, the
    tables will be joined based on equality conditions of those columns. Natural joins
    can be inner, left, right, or full outer. Natural joins are meant to save a trivial
    amount of typing, but they can lead to surprising results.


    It’s rare to remember all of the column names of our tables, so we might end up
    joining more than we expect. Or we may break existing queries when we add new
    columns.


    The following query is an example of a natural join between the `LAUNCH` table
    and the `SATELLITE` table. We’ve joined these tables before, and both tables have
    a column named `LAUNCH_ID` that links them together. We might expect there to
    be 43,112 rows returned. Instead, the following query only returns 19 rows:


    ```

    --Natural join between LAUNCH and SATELLITE.

    select *

    from launch

    natural join satellite;

    ```


    The two tables in the preceding query have an additional column with the same
    name – `APOGEE`. The apogee is the furthest distance from Earth, and it makes
    no sense to join on those two columns. Most launches do not have apogee data.
    And when a launch does have an apogee, it rarely matches the satellite apogee.
    Although a rocket might launch a satellite into orbit, most satellites have their
    own fuel and can maneuver into a different orbit.


    We should also avoid the `USING` syntax, at least in our production queries. That
    syntax also saves us a trivial amount of typing by simply listing the columns,
    instead of listing the entire conditions. For example, to join `LAUNCH` and `SATELLITE`,
    we can save some typing like this:


    ```

    --USING syntax:

    select *

    from launch

    join satellite using (launch_id);

    ```


    The `USING` syntax is at least safer than a natural join. We have to manually
    list the columns, so we won’t accidentally join unexpected columns. But a few
    weird things happen with the `USING` syntax. We can no longer use the `*` syntax
    with a specific table, and we can no longer reference the joined column with the
    table name. Both of the following examples raise an exception:


    ```

    --ORA-25154: column part of USING clause cannot have qualifier

    select launch.*

    from launch

    join satellite using (launch_id);

    select launch.launch_id

    from launch

    join satellite using (launch_id);

    ```


    There are workarounds to the preceding problems, but the workarounds are annoying.
    Those workarounds can be especially annoying when we’re debugging large SQL statements
    and want to temporarily see all the results from a specific table. Instead of
    just adding `TABLE.*`, we may have to significantly rewrite our `SELECT` expressions.


    Joins are the most important SQL feature, and we need to thoroughly understand
    them. Joins are one of the few areas where we should memorize the syntax. If we
    want to be fluent in SQL, we need to be able to join tables effortlessly.


    ## Sorting


    The `ORDER BY` clause has several features and some potentially surprising behavior.
    We also need to consider the effects of sorting to help us decide when to sort.


    ### Sorting Syntax


    We can sort by multiple columns, expressions, or positions. Sorting can be in
    either ascending or descending order and can specify exactly how to handle nulls.
    For an example of sorting, let’s find the satellites most recently launched into
    orbit:


    ```

    --Most recently launched satellites.

    select

    to_char(launch.launch_date, ''YYYY-MM-DD'') launch_date,

    official_name

    from satellite

    left join launch

    on satellite.launch_id = launch.launch_id

    order by launch_date desc nulls last, 2;

    LAUNCH_DATE  OFFICIAL_NAME

    -----------  -------------

    2017-08-31   deb IRNSS-R1H

    2017-08-31   deb IRNSS-R1H

    2017-08-31   IRNSS-R1H

    ...

    ```


    There’s a lot going on in the preceding `ORDER BY` clause. The clause looks ambiguous
    – `LAUNCH_DATE` is both a date column and an expression that returns a text value.
    Which one is being used? The expression takes precedence, and in this case, we
    are sorting by the text value. (If we wanted to sort by the date column value,
    we would need to prefix the name with the table name, like `LAUNCH.LAUNCH_DATE`.)
    Luckily, the text value uses the ISO-8601 date format, so the text version sorts
    the same way as a date value. If the date format was `"DD-Mon-YYYY"`, the “latest”
    rows would be from October 31. The `NULLS LAST` puts satellites without a launch
    date at the end of the results. (Some of the satellites are junk, and we don’t
    know when they were launched.) Finally, the number `2` means to sort by the second
    column, which is helpful to break any ties.


    We should always fully sort results that are displayed. SQL query results often
    *appear* to be sorted but are not. People may make a bad assumption based on the
    appearance of the first few rows and may come to the wrong conclusion. To avoid
    misrepresenting the data, it’s best to fully sort the rows, starting from the
    leftmost column. On the other hand, if the results are not displayed, but are
    only used for internal processing, we do *not* want to sort the results. Sorting,
    especially for huge amounts of data, can take a huge amount of time.'
