- fmt: '## Logging


    It’s important to instrument our PL/SQL programs. There are many free and powerful
    logging utilities, but don’t let their complexity deter you from logging. Even
    creating our own simple logging is still much better than doing nothing.


    This instrumentation doesn’t need to be fancy. Logging can be as simple as writing
    messages and timestamps to a table whenever important processes start or stop.
    Or we could use `DBMS_APPLICATION_INFO` to help Oracle track data in the database
    or use `UTL_FILE` to write data to a file system. Be careful using `DBMS_OUTPUT`;
    it’s useful for small debugging, but it can be slow and cause overflow errors
    on larger systems.


    For example, we could use `DBMS_APPLICATION_INFO` to track the resource consumption
    of the examples in this chapter. We could run the following PL/SQL block at the
    beginning of each section, to set the session’s module name and action name:


    ```

    --Set the session''s MODULE and ACTION.

    begin

    dbms_application_info.set_module

    (

    module_name => ''Chapter 18'',

    action_name => ''Logging''

    );

    end;

    /

    ```


    At the end of the chapter, we could compare the different sections by querying
    the `ACTION` and `MODULE` columns in views and tables like `V$ACTIVE_SESSION_HISTORY`
    and `DBA_HIST_ACTIVE_SESS_HISTORY`. (Those two objects are discussed more thoroughly
    later in this chapter.) The following is an example of how to compare activity:


    ```

    --Which sections in this chapter used the most resources.

    select action, count(*) session_count

    from v$active_session_history

    where module = ''Chapter 18''

    group by action

    order by session_count desc;

    ```


    Many database programs automatically set that session metadata. And Oracle’s default
    logging already captures other metadata such as the username and the machine name.
    In most cases we can find performance problems without that extra session information,
    but we should think about adding extra logging information *before* we run into
    problems.


    This logging information is helpful for finding historical trends. Oracle has
    a wealth of performance information, but the default information is not organized
    for our applications and is not stored for long. Instrumenting our code doesn’t
    take much effort and should be a part of every project.


    ## Profiling: DBMS_PROFILER


    Oracle does not track the time for every execution of every line of code. That
    much instrumentation would quickly consume all available storage. But if we set
    up `DBMS_PROFILER`, we can temporarily gather the total amount of time and number
    of calls to every line in our PL/SQL program. Profiling provides better data than
    logging but cannot entirely replace logging; profiling has significant overhead
    and should not be enabled by default.


    If we’re using an IDE like PL/SQL Developer or Toad, profiling is as simple as
    clicking a few buttons before starting the PL/SQL program. Other IDEs require
    a bit more setup; we have to run `PROFTAB.SQL` from the installation directory
    `RDBMS/ADMIN`, call `DBMS_PROFILER` functions to start and stop profiling, and
    then query the tables `PLSQL_PROFILER_DATA`, `PLSQL_PROFILER_RUNS`, and `PLSQL_PROFILER_UNITS`.
    It is annoying that Oracle doesn’t fully automate that setup process, but if we
    are tuning PL/SQL programs, then the setup is absolutely worth the effort.


    To demonstrate profiling, let’s create a simple and slow procedure:


    ```

    --Create a test procedure that runs many COUNT operations.

    create or replace procedure test_procedure is

    v_count number;

    begin

    for i in 1 .. 10000 loop

    select count(*) into v_count from launch order by 1;

    end loop;

    for i in 1 .. 10000 loop

    select count(*) into v_count from engine order by 1;

    end loop;

    end;

    /

    ```


    Now we need to enable profiling and run the procedure. With the right IDE, enabling
    means clicking a button to enable profiling and then running this PL/SQL block:


    ```

    --Run the procedure for profiling.  (Takes about 15 seconds.)

    begin

    test_procedure;

    end;

    /

    ```


    Every IDE or query has a different display. Figure [18-1](#471418_2_En_18_Chapter.xhtml#Fig1)
    shows the profiler report in PL/SQL Developer. The results are sorted by descending
    run time, so the most important lines are at the top. There’s even a spark bar
    chart to quickly show us which lines use the most time.


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig1_HTML.png)


    Figure 18-1

    DBMS_PROFILER report


    The preceding profiler report tells us exactly which part of the procedure to
    focus on. There’s no need to guess about what part of the program we think is
    slow. The run time of line 5 is much greater than all the other lines put together.
    This report makes it clear that we would be crazy to spend time optimizing anything
    other than line 5.


    ## Profiling: DBMS_HPROF


    Tools like the hierarchical profiler and tracing can provide more data than `DBMS_PROFILER`.
    I tend to avoid these advanced tools because they are harder to use and access.
    I’d rather have easily accessible good data than poorly accessible great data.
    But as long as we are using tools that tell us the actual run time, instead of
    just guessing, we’re well ahead of the curve. The hierarchical profiler is gradually
    becoming more powerful and easier to use, and it may completely replace `DBMS_PROFILER`
    someday.


    The main problem with the hierarchical profiler is that it requires elevated privileges
    and server access to set up and use. The setup scripts change with every version,
    and the following instructions and code will probably only work on 18c and later:


    First, we must grant access to the package:


    ```

    --Grant access to DBMS_HPROF.  Must be run as SYS.

    grant execute on sys.dbms_hprof to &your_user;

    ```


    The following code creates a table to hold the profiler report, enables the profiler,
    and runs and analyzes `TEST_PROCEDURE`:


    ```

    --Create table to hold the results.

    create table hprof_report(the_date date, report clob);

    --Generate report.

    declare

    v_report clob;

    v_trace_id number;

    begin

    --Create profiler tables, start profiling.

    dbms_hprof.create_tables(force_it => true);

    v_trace_id := dbms_hprof.start_profiling;

    --Run the code to profile.

    test_procedure;

    --Stop profiling, create and store the report.

    dbms_hprof.stop_profiling;

    dbms_hprof.analyze(v_trace_id , v_report);

    insert into hprof_report values(sysdate, v_report);

    commit;

    end;

    /

    --View the report.

    select * from hprof_report;

    ```


    The report contains a lot of great information but is much too wide to fit on
    this page. Figure [18-2](#471418_2_En_18_Chapter.xhtml#Fig2) contains only a portion
    of one of the many tables of data in the HTML report. If we read the entire report,
    it would verify what we already learned from `DBMS_PROFILER` – only one line in
    the procedure is worth tuning. The part of the report not shown also provides
    the relevant `SQL_ID`, which is needed if we want to tune the slow SQL statement.


    ![](images/471418_2_En_18_Chapter/471418_2_En_18_Fig2_HTML.png)


    Figure 18-2

    Partial hierarchical profiler report'
