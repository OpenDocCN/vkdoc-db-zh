  trans: '## 总结


    当我们开始编程时，应对自己的程序和想法保持怀疑态度。最终，我们必须对自己的程序和知识建立信心，但这种信心应源于自动化单元测试和简洁的测试用例。幸运的是，Oracle
    提供了丰富的视图和工具来帮助我们建立这种信心。但靠我们自己能做的终究有限，最终我们会需要他人的帮助。下一章将帮助我们找到可靠的 Oracle 知识来源。


    脚注 1


    # 4. 寻找可靠的来源


    Oracle SQL 编程存在一个认识论问题。认识论是研究知识的学问，简单来说就是问自己我们知道了什么以及我们如何知道。在开始编程之前，我们不必去上哲学课，但我们确实需要仔细考虑我们的信息来源。Oracle
    编程文化过分依赖不可靠的认识论，例如传统和经典，而对科学和理性的重视不足。如果我们听信了错误的来源，就会学到错误的教训。


    为什么寻找可靠来源在 Oracle 上比在其他技术上更成问题？Oracle 主要面向业务用户，而非学者或传统程序员。计算机科学专业的学生很少学习 Oracle，也不会将他们执着的好奇心集中在
    SQL 或 PL/SQL 上。学生、技术思想领袖和业余程序员往往忽视面向业务的编程语言。Oracle 常被用于开发那些缓慢、痛苦地演进且避免实验和重构的、乏味的“企业”软件。而且，Oracle
    是闭源的，且 Oracle 公司历来对开源持敌对态度，这无疑也无济于事。


    有相当大比例的人使用 Oracle 只是为了谋生，并没有花时间去钻研和测试其数据库的内部机制。并非每个人都需要成为业余程序员，但需要有一定数量的、有好奇心的人来创造正确的文化规范。


    存在一个知识鸿沟，而这个鸿沟已被大量烦人的传统、诉诸权威、标题党内容和神话所填充。我们无法合理地测试所有东西；第 2 章和第 3 章描述的开发流程和测试技术需要大量的时间和精力，而且现实生活中的性能问题包含太多不可控的变量。如果我们总是挑战*每一个*假设，我们将一事无成。但我们的思想领袖应该是那种总是愿意用可复现的测试用例来支持自己观点的人。


    我们需要避开那些信口开河、声称某些事情他们见过一次发生但无法再次演示的“专家”。我们需要谨慎对待那些对 Oracle 做出非凡断言却不提供质疑途径的网站。


    我们在前几章学习了如何在数据库中创建科学实验。当我们没有时间做实验时，我们至少需要遵循*正确的*权威和*正确的*传统。本章提供了一些关于如何在线找到优质资源以及如何在本地找到优质资源的技巧。通过足够的时间和实践，终有一天你也会成为你所在社区中的一个优质资源。


    ## 去哪里找


    寻找与 Oracle 相关的、准确的信息，不像用谷歌搜索那么简单。排名靠前的结果常常有问题，尤其是当这些结果是论坛或静态网站时。最好的资源是像 Stack
    Overflow、官方文档和 My Oracle Support 这样的站点。


    ### 论坛的问题


    论坛并非解决狭窄技术问题的最佳选择。它们关注提问者本人，而非未来数年将阅读答案的更多读者。这种错误的关注点导致了无休止的争论和冗长、漫无边际的对话，分散了我们对所关心的简单解决方案的注意力。论坛聚焦于某个时间点，但技术在变化，今天的好答案明天可能就过时了。那些锁定帖子或抱怨别人回复旧帖子的论坛，阻碍了用户整理信息。


    像 Stack Overflow 这样的网站在很大程度上取代了论坛。Stack Overflow 的关键在于它不关注两人之间的对话。该网站聚焦于问题和答案，忽略个性和元讨论。Stack
    Overflow 是维基、博客、论坛和 Reddit 这类聚合网站的结合体。这些技术使新用户难以提问，但它们使问题和答案更简洁、更及时、更具可读性。技术网站真正的受众是读者，而不是提问和回答问题的人。我们应该把时间花在拥有最佳信息的网站上，而不一定是对新用户最友好的网站。


    另一方面，很少有问题有简单、客观的答案。带有主观答案的大型问题更适合论坛的对话式氛围。我们不能总是简单地从 Stack Overflow 上复制粘贴代码，而且参与问答网站可能会让人感觉不公平且缺乏人情味。我们应该偶尔花时间阅读对困难技术主题的深入讨论。


    ### 静态网站的问题


    我们应该对不允许任何读者反馈的静态网站保持怀疑。我不指望每个博主都参与辩论并回答每个问题，但每个技术资源都应该提供一种添加评论的方式。我们至少需要有能力通过评论相互提醒，例如“此功能在
    X 版本中已弃用”。


    Oracle 是一个老牌程序，许多最早的 Oracle 相关网站也因此年代久远。由于这些网站建立得早，它们拥有最多的链接，无论其质量如何，都排在搜索结果的前列。


    我们还需要警惕那些为了获取流量而发布不寻常信息的网站。这不像普通的标题党那么糟糕；我还没见过题为“你不会相信这 8 个令人震惊的数据库索引技巧！”的文章，但一些最受欢迎的
    Oracle 相关网站发布着疯狂且未经证实的性能断言。


    很多时候，改变一个无关紧要的细节就能让我们的程序运行得更快。看似神奇的性能提升经常发生，原因如第 3 章所述，例如缓存和执行计划的变化。例如，`COUNT(1)`并不比`COUNT(*)`快，但作为重写查询的副作用，它最初可能看起来更快。


    当有人发布不合理的性能技巧时，我们需要有能力指出可能的根本原因，并要求一个完全可复现的测试用例。但如果无法质疑该信息，错误可能永远得不到纠正。


    同样重要的是，技术网站应包含元数据，如发布日期和 Oracle 版本。许多技术建议会随着每个新版本的发布而过时。例如，许多 PL/SQL 网站仍在讨论使用`OPEN/FETCH/CLOSE`语法进行游标处理。但该功能几乎已完全被游标`FOR`循环所取代。


    不要盲目相信那些不允许评论的非官方来源。这些来源仍然有用，但我们需要对它们保持怀疑态度。'
- fmt: '### Read the Manual


    The official Oracle documentation is almost always our best source of information
    about the Oracle database. The documentation is so thorough that it can be intimidating
    at times. It’s frustrating that there is a learning curve to even learn about
    Oracle. But after we understand how to navigate the documentation and read the
    syntax diagrams, the official documentation will be our primary source.


    The Oracle documentation library starts at this link: `https://docs.oracle.com/en/database/oracle/oracle-database/index.html`.
    From there, we can access all the manuals and even download the entire 679-megabyte
    bookshelf.


    Unfortunately, by the time this book is published, that link will probably be
    broken. The biggest problem with the Oracle documentation is that the links frequently
    change.


    We want to reference the latest version, but the latest version is the one most
    likely to change and have broken links. For temporary messages like emails, it’s
    fine to reference the latest version. For long-term messages, like a blog or Stack
    Overflow post, it’s best to use the most recent long-term release. As of 2022,
    the Oracle 19c documentation is usually the best choice. While there is documentation
    available for 21c, that version is an “innovation release” that is not supported
    for long, won’t be as popular as a long-term release, and is likely to have the
    links change again. This book won’t often link to the manual, because we can easily
    find the relevant book by searching for the book title and the version. For example,
    we can search for “Oracle SQL Language Reference 21c.”


    For Oracle developers, these are the most useful books, listed in order of importance:


    1.  `SQL Language Reference` (2,271 pages): This is the most relevant book for
    SQL developers. Even though it’s incredibly large, it’s worth reading the entire
    thing eventually. I almost always have a browser tab open to this manual and will
    use the table of contents instead of a search engine.


    2.  `Database Concepts` (622 pages): This book explains how the database works.
    While the book is written for administrators, we should reference it whenever
    we’re curious about the inner workings of Oracle. For example, if we want to know
    “What exactly is REDO?” or “What do blocks look like?”, this book is a good place
    to start.


    3.  `PL/SQL Language Reference` (865 pages): It’s worth reading this entire book
    if you do PL/SQL programming. Even if you only write SQL statements, it’s useful
    to scan through this book, since SQL and PL/SQL are gradually merging into a single
    language. And there’s a decent chance that if you’re a SQL programmer today, you
    will become a PL/SQL programmer in the future.


    4.  `PL/SQL Packages and Types Reference` (4,894 pages): Nobody needs to read
    this entire, massive book. There are many archaic packages nobody will ever use.
    But there are also a few unexpected gems that will help you someday. And this
    book can be a good way to learn practical applications of Oracle features that
    are implemented through a PL/SQL API. It’s worth at least reading the description
    of every package.


    5.  `Database Reference` (2,664 pages): When we need information about a parameter,
    data dictionary view, or dynamic performance view, this is the place to look.


    6.  `SQL*Plus® User’s Guide and Reference` (392 pages): Even if you’re not doing
    much with `SQL*Plus`, you might want to at least look through the command reference
    list. There is a separate book for `SQLcl`, but the common, popular features are
    best described in the `SQL*Plus` documentation.


    7.  `Database New Features Guide` (50 pages): Scan through this guide to see what
    features you’re not taking advantage of or to justify upgrading.


    8.  `SQL Tuning Guide` (878 pages): Read this entire book if you do a lot of performance
    tuning. If you only have time for one chapter, read “Optimizer Statistics Concepts,”
    because optimizer statistics are the key to many performance issues.


    9.  `Data Warehousing Guide` (732 pages): This book is not just for data warehouses.
    Features like materialized views and the advanced querying techniques can be used
    in many contexts.


    10. `VLDB and Partitioning Guide` (425 pages): Read this book if you plan to use
    partitioning or parallelism. This book is not just for “very large” databases
    – it can also help with medium-sized databases.


    11. `Database Performance Tuning Guide` (396 pages): This book is for tuning the
    entire database, as opposed to tuning individual SQL statements. In practice,
    tuning the SQL statements will also fix most database performance issues, so this
    book is less important than the `SQL Tuning Guide`.


    The preceding list of books contains 14,189 pages of dense technical documentation.
    Reading it all would be ridiculous, but it’s important to at least be familiar
    with the first four books in the list. The answers to most of our programming
    questions about SQL syntax, concepts, and functions are in the documentation.


    We should also occasionally scan through the list of books. There may be a specific
    book we’ll need to read, depending on the technologies we’re using. For example,
    if we’re storing and processing a lot of JSON or XML data, there are several guides
    just for those data types.'
