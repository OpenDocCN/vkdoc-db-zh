- fmt: '## Joins


    There are many ways to classify joins, and there is much overlap between those
    classifications. The terminology may sound confusing, and some of the options
    may seem esoteric. Keep in mind that joining is the most important database operation,
    and we should expect an advanced database to have many join options. (Measuring
    join features is also a quick way to evaluate alternative databases. If a database
    doesn’t take joins seriously, it’s only a program for storing data, not processing
    data.) This chapter only discusses the join syntax and functionality; the algorithms
    used to implement joins are discussed in Chapter [16](#471418_2_En_16_Chapter.xhtml):


    1.  Inner, left outer, right outer, full outer, cross (Cartesian product), partitioned
    outer, lateral, cross apply, or outer apply

    2.  Old syntax or ANSI join syntax

    3.  Equijoin or non-equijoin

    4.  Semi-join, anti-join, or neither

    5.  Self-join or not a self-join

    6.  Natural join or not a natural join

    7.  ON clause or USING clause


    Some of the preceding items were already discussed and demonstrated in examples
    throughout the previous chapters. We don’t need to further discuss inner, left,
    right, full, cross, or old syntax vs. ANSI join syntax. Since joins are so important,
    the rest of this section will discuss every remaining item on the preceding list.


    ### Partitioned Outer Joins


    Partitioned outer joins are useful for data densification. Densification happens
    when we are counting the number of times something happens per group and we want
    to show the results against a time period. We want to see the counts, per item,
    per time period, even if the counts are zero. Creating multiple empty rows is
    hard to do with a regular left join – the left join might include all the time
    periods, but not all time periods ``per`` item. A partitioned outer join is like
    a multi-join – it joins the time periods for each item.


    Partitioned outer joins are tricky to understand without an example. For a concrete
    example, let’s say we want to count the number of rocket launches, per launch
    vehicle family, per month, for 2017. If there were no launches for a month, we
    still want to see a row, but with a count of zero:


    ```sql

    --Launches per launch vehicle family, per month of 2017.

    select

    launches.lv_family_code,

    months.launch_month,

    nvl(launch_count, 0) launch_count

    from

    (

    --Every month in 2017.

    select ''2017-''||lpad(level, 2, 0) launch_month

    from dual

    connect by level <= 12

    ) months

    left join

    (

    --2017 orbital and deep space launches.

    select

    to_char(launch_date, ''YYYY-MM'') launch_month,

    lv_family_code,

    count(*) launch_count

    from launch

    join launch_vehicle

    on launch.lv_id = launch_vehicle.lv_id

    where launch_category in (''orbital'', ''deep space'')

    and launch_date between

    date ''2017-01-01'' and timestamp ''2017-12-31 23:59:50''

    group by to_char(launch_date, ''YYYY-MM''), lv_family_code

    ) launches

    partition by (launches.lv_family_code)

    on months.launch_month = launches.launch_month

    order by 1,2,3;

    LV_FAMILY_CODE  LAUNCH_MONTH  LAUNCH_COUNT

    --------------  ------------  ------------

    Ariane5         2017-01                  0

    Ariane5         2017-02                  1

    Ariane5         2017-03                  0

    ...

    Atlas5          2017-01                  1

    Atlas5          2017-02                  0

    Atlas5          2017-03                  1

    ...

    ```


    The preceding results don’t look that special at first. But those rows with zeroes
    would have been a real pain to generate without a partitioned outer join. There’s
    no other easy way to repeatedly join tables based on a group.


    ### Lateral, Cross Apply, and Outer Apply


    Lateral, cross apply, and outer apply joins are evil and should be avoided. Those
    features were mostly added to Oracle to help migrate SQL Server queries. Those
    three join types allow inline views to access values outside of them, which destroys
    the reason for using inline views in the first place. Those three join types increase
    the context of our queries and prevent building small, independent sets. Lateral,
    cross apply, and outer apply joins are reading something they’re not supposed
    to, like reading private variables from another class.


    ### Equijoin or Non-equijoin


    Equijoin vs. non-equijoin seems like a meaningless distinction at first. An equijoin
    is a join based on the equality operator, `=`. A non-equijoin uses something else,
    such as `<>` or `BETWEEN`. The distinction matters because there can be serious
    performance issues when using non-equijoins. Only equijoins can be used for hash
    join operations. Hash joins are discussed in more detail in Chapter [16](#471418_2_En_16_Chapter.xhtml).
    For now, it’s only important to understand that hash joins are often the fastest
    join method. If there are performance problems, it may help to rewrite a non-equijoin
    into an equijoin, to allow a hash join. But it’s not always possible to rewrite
    a query to use an equality predicate.


    ### Semi-join or Anti-join


    Semi-joins and anti-joins are join types where Oracle may not need to process
    all rows to get the results. For semi-joins, Oracle can stop joining as soon as
    it finds one row that matches. For anti-joins, Oracle can stop joining as soon
    as it finds one row that doesn’t match. These join types often happen when the
    query uses a correlated subquery along with an `IN`, `NOT IN`, `EXISTS`, or `NOT
    EXISTS`.


    As an example of a semi-join, let’s say we want to count all the satellites that
    have an associated launch. A similar query was created in Chapter [1](#471418_2_En_1_Chapter.xhtml)
    to discuss nulls, but now we’re going to slightly rewrite the query to emphasize
    the semi-join:


    ```sql

    --Satellites with a launch.

    select count(*)

    from satellite

    where exists

    (

    select 1/0

    from launch

    where launch.launch_id = satellite.launch_id

    );

    ```


    The result is 43,112 satellites, which is just one smaller than the total number
    of satellites. Let’s use an anti-join to find the satellite without a launch.
    The following query returns one row, for “Unknown Oko debris”:


    ```sql

    --Satellites without a launch.

    select official_name

    from satellite

    where not exists

    (

    select 1/0

    from launch

    where launch.launch_id = satellite.launch_id

    );

    ```


    You may have noticed something seemingly impossible in the preceding examples
    – both of the preceding queries divide by zero. `EXISTS` conditions don’t use
    the results of the subquery, since the conditions only care about whether there
    are rows or not. The subquery must have an expression to fulfill the syntax rules,
    but that expression is ignored and not even executed. To emphasize the unimportance
    of the value, I used `1/0`. As a rule, whenever I do something weird, like create
    a value that doesn’t matter, I like to make the code look obviously weird. If
    the query had just used a normal value like “1” or “A”, future readers might wonder
    what those values mean. The expression `1/0` will hopefully make it clear to others
    how irrelevant the value is.


    Semi-joins and anti-joins are notable because they often cause performance problems.
    The way semi- and anti-joins are coded looks like we’re asking Oracle to do work
    for each row, almost like we’re trying to break out of the declarative programming
    model and tell Oracle how to do its job. Luckily, Oracle is usually smart enough
    to know when these queries are best rewritten to use normal joins. But sometimes
    we can improve performance and readability by rewriting queries to not have correlated
    subqueries.'
