    LAUNCH_AGENCY

    SATELLITE

    SATELLITE_ORG

    ORGANIZATION

    ORGANIZATION_ORG_TYPE

    SITE

    SITE_ORG

    PLATFORM

    LAUNCH_VEHICLE

    LAUNCH_VEHICLE_MANUFACTURER

    LAUNCH_VEHICLE_FAMILY

    STAGE

    STAGE_MANUFACTURER

    LAUNCH_VEHICLE_STAGE

    ENGINE

    ENGINE_MANUFACTURER

    ENGINE_PROPELLANT

