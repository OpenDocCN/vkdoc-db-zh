    ## ALTER SYSTEM（系统级更改）


    `ALTER SYSTEM`命令不属于 DML 命令，但对于 SQL 开发者而言有时是必需的。正如第 2 章所述，我们应在能完全掌控的环境中完成大部分工作。即便拥有完全控制权，我们也不希望频繁运行`ALTER
    SYSTEM`命令。不过，有一些特定的命令 SQL 开发者可能会觉得十分方便。并且有简单的方法可以授予对这些命令的访问权限，而无需授予提升的权限。


    ### 清理内存结构

    对于性能测试，清理数据库内存结构可能有所帮助。有时我们希望强制 Oracle 使用新的执行计划，可以使用此命令：`ALTER SYSTEM FLUSH SHARED_POOL`。有时我们希望清理缓存，以测试系统冷启动状态，可以使用此命令：`ALTER
    SYSTEM FLUSH BUFFER_CACHE`。有时我们需要终止失控的会话，可以使用类似这样的命令：`ALTER SYSTEM KILL SESSION
