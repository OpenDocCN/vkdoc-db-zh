    [9-1](#471418_2_En_9_Chapter.xhtml#Fig1). Of course, the actual index structure
    is more complicated than our example. Oracle’s default index uses a B-tree index;
    there’s a root branch block at the top, branch blocks in the middle, and leaf
    blocks at the bottom. Each block contains hundreds of values instead of just one.
    The leaf blocks don’t just contain the column value; they also contain a `ROWID`
    that references the table row, as well as pointers to the next and last leaf blocks
    in order. (The pointers are why Figure [9-1](#471418_2_En_9_Chapter.xhtml#Fig1)
    seems to have an extra row at the bottom – there is a lookup from the leaf block
    to a table block.) In practice, it’s extremely rare to have an index more than
    four levels deep. (We can count the height of an index using `DBA_INDEXES.BLEVEL+1`.)
    Also, real indexes have empty space for new values and may be unbalanced.


    We can learn a lot about indexes by combining the tree data structure in Figure
    [9-1](#471418_2_En_9_Chapter.xhtml#Fig1) with our simple algorithm for traversing
    the tree. The most important lesson is why index access is not always faster than
    a full table scan. For finding a single value, the number of comparisons is `LOG2(N)`
    for an index vs. `N/2` for a full table scan. For finding one value, the index
    is clearly the winner.


    But what if we’re looking for a value that exists in almost every row? Searching
    an index for every row means we need to walk the tree `N` times. Now the number
    of comparisons is `N*LOG2(N)` for the index vs. `N` for the full table scan. For
    finding all values, the full table scan is clearly the winner.


    Index access comparisons get even more complicated when we consider block access
    time. Storage systems can read a large amount of data more efficiently than they
    can read multiple small amounts of data. In the time it takes the system to read
    two index blocks, one at a time, the system may be able to read 64 blocks from
    a full table scan. A dumb multi-block read may be better than a smart single-block
    read.


    The clustering factor may also work against indexes. For example, let’s say we
    only need to scan 1% of an index. One percent sounds like a small number of searches,
    but that number is not the whole story. After we read the index blocks, we also
    need to access the table blocks. If the rows we need are randomly distributed,
    we may still need to read 100% of the table, one block at a time. `DBA_INDEXES.CLUSTERING_FACTOR`
    is a measure of how much the data is disordered. A good, low clustering factor
    means the values in one index block all refer to the same table block. A bad,
    high clustering factor means the rows in an index block are scattered all over
    the place.


    Indexes are perfect for accessing a small amount of data from a table. Indexes
    may be a bad choice for accessing a large amount of data from a table. It’s hard
    to know where the tipping point is and when an index isn’t worth it anymore. We
    need to consider how an index works, multi-block reads, and the clustering factor.'
  trans: '

    ### 索引概念


    要理解索引，我们必须首先思考如何搜索数据。让我们从一个简单的儿童猜数字游戏开始，游戏中我们需要找出 1 到 8 之间的一个数字。搜索这个数字最简单的方法是从
    1 开始，然后猜 2，接着猜 3，依此类推。平均而言，使用这种线性搜索算法，需要四次猜测才能找到这个数字。


    幸运的是，我们都知道一个更好的猜数字游戏玩法——猜一个中间数，询问这个数字是偏低还是偏高，然后重复。这种二分搜索算法每次都能尽可能多地排除数字，并快速缩小结果范围。我们可以通过图
    9-1 来可视化这种二分搜索策略。该图表形状像一棵树，在树的每个分支处，我们都必须做一个简单的决定：如果猜测的数字太高就向左走，如果猜测的数字太低就向右走。


    ![images/471418_2_En_9_Chapter/471418_2_En_9_Fig1_HTML.png](img/471418_2_En_9_Fig1_HTML.png)


    *从 1 到 8 的数字排成一行的图像。数字 5 被圈起，并通过一条链与数字 5、6 和 4 相连。*

    **图 9-1** 通过二分搜索寻找数字 5


    使用二分搜索算法，平均而言我们可以在三次猜测中找到这个数字。到目前为止，我们的二分搜索算法仅比线性搜索算法略好：三次猜测而不是四次。当我们增加范围时，算法的差异变得更加明显。如果我们将数字范围扩大一倍到
    16，线性搜索的平均猜测次数也翻倍到八次。但二分搜索的平均猜测次数仅从三次增加到四次。


    让我们将这个例子扩展到我们的数据集。假设我们想查找一次发射记录，使用以下查询：


    ```sql

    select * from launch where launch_id = :n;

    ```


    数据以堆表形式存储，没有特定顺序。如果我们在包含 70,535 条发射记录的表中进行线性搜索，平均需要 35,268 次比较。而二分搜索最多只需要 17 次比较就能找到该行，因为
    `2¹⁷ = 131,072`，大于 70,535。儿童猜数字游戏的原理可以很好地扩展，帮助我们快速找到真实数据。


    使用更数学化的解释来理解搜索过程是很有帮助的。当我们用二进制计数时，2 的幂次方增长很快。我们可能凭直觉就理解二进制增长；例如，我们知道 32 位允许大约
    40 亿个数字：`2³² = 4,294,967,296`。二分搜索反向工作，而对数是指数的逆运算。因此，我们可以说，对 `N` 行进行二分搜索大约需要 `LOG2(N)`
    次比较。相比之下，对 `N` 行进行线性搜索大约需要 `N/2` 次比较。这些数学表达式对于理解索引非常有用。


    索引是一种类似于图 9-1 中所示二叉树的数据结构。当然，实际的索引结构比我们的例子更复杂。Oracle 的默认索引使用 B 树索引；顶部有一个根分支块，中间有分支块，底部有叶块。每个块包含数百个值，而不仅仅是一个。叶块不仅包含列值；它们还包含一个引用表行的
    `ROWID`，以及指向下一块和上一块叶块的有序指针。（正是因为有这些指针，图 9-1 底部似乎多出了一行——从叶块到表块的查找。）在实践中，索引深度超过四级的极为罕见。（我们可以使用
    `DBA_INDEXES.BLEVEL+1` 来计算索引的高度。）此外，真实的索引会为新值留出空闲空间，并且可能是不平衡的。


    通过将图 9-1 中的树数据结构与我们简单的树遍历算法相结合，我们可以了解很多关于索引的知识。最重要的教训是为什么索引访问并不总是比全表扫描快。对于查找单个值，索引的比较次数是
    `LOG2(N)`，而全表扫描是 `N/2`。对于查找一个值，索引显然是赢家。


    但是，如果我们寻找的值几乎存在于每一行中呢？为每一行搜索索引意味着我们需要遍历树 `N` 次。现在，索引的比较次数是 `N*LOG2(N)`，而全表扫描是
    `N`。对于查找所有值，全表扫描显然是赢家。


    当我们考虑块访问时间时，索引访问的比较变得更加复杂。存储系统读取大量数据比读取多个小批量数据更高效。在系统逐个读取两个索引块所需的时间内，它可能已经能够通过全表扫描读取
    64 个块。一个简单的多块读取可能比一个智能的单块读取更好。


    聚簇因子也可能对索引不利。例如，假设我们只需要扫描 1%的索引。1%听起来搜索量很小，但这并不是全部情况。在读取索引块之后，我们还需要访问表块。如果我们需要的行是随机分布的，我们可能仍然需要读取
    100%的表，一次一个块。`DBA_INDEXES.CLUSTERING_FACTOR` 是衡量数据无序程度的指标。一个良好的、低聚簇因子意味着一个索引块中的所有值都指向同一个表块。一个糟糕的、高聚簇因子意味着一个索引块中的行分散得到处都是。


    索引非常适合从表中访问少量数据。对于从表中访问大量数据，索引可能是一个糟糕的选择。很难知道转折点在哪里，以及索引何时不再值得。我们需要考虑索引的工作原理、多块读取和聚簇因子。

    '
- fmt: '### Index Features


    Indexes are an indispensable part of database performance. It’s a great feeling
    when a statement as simple as `CREATE INDEX SOME_INDEX ON SOME_TABLE(SOME_COLUMN)`
    makes our queries run a million times faster. But performance tuning is not always
    that easy. Simple indexes aren’t always enough, so we need to be aware of the
    many different ways to use, create, and alter indexes.


    First, we need to understand how Oracle can use an index. The tree traversal we
    saw in Figure [9-1](#471418_2_En_9_Chapter.xhtml#Fig1) is the most common algorithm,
    but there are several others:


    1.  `Index unique and index range scan`: The traditional way to read an index,
    by traversing the tree from top to bottom. Ideal when we only need a small percentage
    of rows from a table.

    2.  `Index fast full`: Reads the entire index with multi-block reads. Ideal when
    we need a large percentage of rows and all of the columns we need are in the index.
    The index can be used as a skinny version of the table.

    3.  `Index full`: Reads the entire index, in order. Slower than an index fast
    full, because single-block reads are used instead of multi-block reads. The advantage
    is that the data is returned in order, which can avoid sorting.

    4.  `Index skip scan`: Uses a multicolumn index even though the leading index
    columns aren’t referenced. This access method is slow, especially if the leading
    columns have a high cardinality, but it’s better than nothing.

    5.  `Index joins`: Reads data from multiple indexes and joins the indexes instead
    of the tables.


    `Bitmap indexes` are useful for low-cardinality data – columns with a small number
    of distinct values. A bitmap is a list of ones and zeroes that map whether each
    row has a specific value. For example, in our data set, `LAUNCH.LAUNCH_CATEGORY`
    is a good candidate for a bitmap index. The following code creates a bitmap index,
    along with a simple visualization of what that bitmap index might look like:


    ```

    --Create bitmap index on low-cardinality columns.

    create bitmap index launch_category_idx

    on launch(launch_category);

    military missile  : 111000000...

    atmospheric rocket: 000111000...

    suborbital rocket : 000000111...

    ...

    ```


    Each bitmap stores 70,535 ones or zeroes, where each bit corresponds to a row.
    This format is why bitmap indexes only work well for low-cardinality columns.
    Although 70,535 bits is not a lot of data, that size must be repeated for each
    unique value. On the other hand, Oracle can compress the bitmap indexes, so the
    actual storage may be much smaller. `LAUNCH.LAUNCH_CATEGORY` only has ten distinct
    values, so even in the worst case of using 70,535 bits for each value, not a lot
    of space is used.


    The bitmap format makes it easy to perform comparison operations. If we also created
    a bitmap index on `LAUNCH.LAUNCH_STATUS`, we could quickly run queries that filtered
    on both the category and the status. Oracle could combine the two bitmaps with
    a `BITMAP AND` operation. Comparing lists of ones and zeroes is something any
    computer can do efficiently.


    Bitmap indexes have concurrency issues and should not be used on tables that are
    frequently changed. While we may think of the bitmap format as a list of ones
    and zeroes, Oracle’s bitmap compression may significantly shrink that format.
    Oracle may compress a range of values and store the equivalent of a note that
    says, “Rows 1 to 10,000 are all 0.” If we update the table and change a value
    in the middle of that range, Oracle has to recompress the bitmap index. That recompression
    means changing a single value may lock many of rows. Frequently updating a table
    with bitmap indexes will lead to long waits and deadlock errors.


    `Index compression` can save a lot of space and improve performance. Index compression
    is similar to basic table compression – they both use a simple pattern substitution.
    But index compression is better than table compression in several ways. Index
    compression works regardless of the types of table changes and does not require
    direct-path inserts. And index compression has virtually no CPU overhead. Indexes
    are stored with the leading columns first, so compression only works if the leading
    columns are repetitive.


    Oracle indexes can include `multiple columns`. If we know certain columns will
    always be queried together, it may make sense to put them in the same index. Or
    we can have a separate index for each column. Or we can have both – one multicolumn
    index and many individual indexes. But we don’t want to go crazy creating indexes.
    Each index uses space and requires extra time to maintain when the table is changed.


    `Function-based indexes` are built on expressions. Function-based indexes are
    useful when we query a column by a modified version of the value. For example,
    when looking for launches, most of the time we only care about the date, not the
    time. If we add a normal index on the `LAUNCH.LAUNCH_DATE`, we could use a `BETWEEN`
    query to get an index range scan. But we would also have to define two dates and
    specify the seconds, which is annoying. It’s easier to query the table using the
    `TRUNC` function and only compare dates. But the `TRUNC` function does not work
    with a normal index. The following code creates and uses a function-based index
    on the launch date:


    ```

    --Create function based index.

    create index launch_date_idx

    on launch(trunc(launch_date));

    select *

    from launch

    where trunc(launch_date) = date ''1957-10-04'';

    ```


    ### Rebuilding Indexes


    Indexes can be turned on or off, similar to constraints. But instead of `ENABLE`
    and `DISABLE`, indexes are `USABLE` or `UNUSABLE`. Making indexes unusable is
    as simple as `ALTER INDEX LAUNCH_DATE_IDX UNUSABLE`, and making indexes usable
    is as simple as `ALTER INDEX LAUNCH_DATE_IDX REBUILD`. In addition to enabling
    and disabling indexes, we can keep an index enabled but make it invisible. An
    invisible index is still maintained but is ignored by the optimizer. We can change
    the visibility of indexes to test the performance impact of index changes.


    Unless we’re rebuilding the entire schema, modifying an index is simpler than
    dropping and recreating an index. Our indexes may have lots of properties set,
    and we don’t want to lose those properties during an index rebuild.


    Indexes have many of the same configuration options as tables. Indexes can be
    set to parallel, but like with tables, we should avoid setting a default degree
    of parallelism. Indexes can have separate tablespaces, but like with tables, we
    should avoid creating many tablespaces. (And please ignore the myth that indexes
    and tables need separate tablespaces, unless you are an expert in your storage
    system and are prepared to thoroughly test performance.) Indexes can also be set
    to `NOLOGGING`, but unlike tables the repercussions of using `NOLOGGING` are not
    as bad; if an index is unrecoverable, we can simply recreate the index from the
    table data. Similar to tables, indexes can also be partitioned, which is described
    in a later section.


    Oracle index rebuilding is a contentious topic. There are clearly times when we
    must rebuild an index, like if the index was made unusable during a maintenance
    operation or if we want to change index properties. But we should not rebuild
    indexes frequently for performance reasons or as part of a periodic “maintenance”
    procedure. Other than a few rare exceptions, Oracle indexes are self-balancing
    and don’t need to be rebuilt.


    When we do need to rebuild indexes, there are several options to make the process
    faster and nondisruptive. The `ONLINE` option will let the index still be used
    in queries while a new version of the index is built. We can combine the `ONLINE`
    option with other options to rebuild the index quickly and then change the properties
    back to their original values:


    ```

    --Rebuild online, quickly, and then reset properties.

    alter index launch_date_idx rebuild online nologging parallel;

    alter index launch_date_idx logging noparallel;

    ```'
