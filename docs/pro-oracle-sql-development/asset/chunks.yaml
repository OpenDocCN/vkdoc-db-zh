- fmt: '### Transactions IV: Isolation and Consistency


    Oracle provides mechanisms to allow our PL/SQL applications to act like they are
    the only database user. This isolation is necessary to avoid transaction integrity
    problems such as dirty reads (reading uncommitted data from another transaction)
    and non-repeatable or phantom reads (running the same query twice in a transaction
    and getting different results). Oracle provides two different isolation levels
    to prevent those problems.


    The default isolation level is called `read committed`. Read committed mode prevents
    dirty reads and ensures that every `statement` is consistent. Statement-level
    consistency means that a single SQL statement will always read and process data
    as of a specific point in time. Even if another session deletes all the rows of
    a table while we are querying that table, our session won’t notice.


    For example, the following SQL statement reads from the `LAUNCH` table twice.
    The following query will always return the same results for each `COUNT(*)`, regardless
    of what read or write operations other sessions are executing. This statement-level
    consistency is provided by the undo data that is generated by every change:


    ```

    --These subqueries will always return the same number.

    select

    (select count(*) from transaction_test) count1,

    (select count(*) from transaction_test) count2

    from dual;

    ```


    Consistency gets more difficult when we use multiple queries in PL/SQL. If consistency
    only applies within a SQL statement, the following PL/SQL block may return different
    numbers for the same query run at two different times:


    ```

    --These queries may return different numbers.

    declare

    v_count1 number;

    v_count2 number;

    begin

    select count(*) into v_count1 from transaction_test;

    dbms_output.put_line(v_count1);

    dbms_lock.sleep(5);

    select count(*) into v_count2 from transaction_test;

    dbms_output.put_line(v_count2);

    end;

    /

    ```


    If we use a `serializable` transaction, then everything in our session happens
    as if it was run at the beginning of the transaction. If we change the session’s
    isolation level, the previous example will always return the same numbers within
    the same transaction. The only difference between these PL/SQL blocks is the `SET
    TRANSACTION` command, but that command makes a big difference:


    ```

    --These queries will always return the same number.

    declare

    v_count1 number;

    v_count2 number;

    begin

    set transaction isolation level serializable;

    select count(*) into v_count1 from transaction_test;

    dbms_output.put_line(v_count1);

    dbms_lock.sleep(5);

    select count(*) into v_count2 from transaction_test;

    dbms_output.put_line(v_count2);

    end;

    /

    ```


    Enabling a serializable transaction doesn’t magically solve all our problems.
    It ensures transaction-level read consistency, but it can’t fix problems with
    writing data. If another session changes data in the middle of a serializable
    transaction, and the serializable transaction tries to change the same rows, it
    will raise the exception `ORA-08177: can''t serialize access for this transaction.`
    We may need to preemptively lock the rows we’re processing with a `SELECT ...
    FOR UPDATE` command.


    ### Simple Variables


    Moving data between SQL and PL/SQL is easy because their type systems are so compatible.
    We rarely need to worry about issues like formatting, precision, character sets,
    and size limitations when we move numbers, dates, and strings between SQL and
    PL/SQL. Unfortunately, the type systems do not perfectly match, so we need to
    be aware of how to work around some issues.


    The `%TYPE` attribute can help us safely transfer data between SQL and PL/SQL.
    Instead of hard-coding a data type, we can set a variable to always match a column’s
    data type. The following code uses `%TYPE` and avoids the need to specify exactly
    how large the data from `LAUNCH_CATEGORY` can be. If a future version of the space
    data set increases the column size, the PL/SQL variable size will also increase.
    Synchronizing the data types can avoid errors like `ORA-06502: PL/SQL: numeric
    or value error: character string buffer too small`:


    ```

    --Demonstrate %TYPE.

    declare

    v_launch_category launch.launch_category%type;

    begin

    select launch_category

    into v_launch_category

    from launch

    where rownum = 1;

    end;

    /

    ```


    `Booleans` are fully supported in PL/SQL. The syntax and the keywords `TRUE` and
    `FALSE` let us effortlessly store, compare, and modify Boolean variables. Unfortunately,
    SQL does not support Boolean data types, so we need to use workarounds to pass
    or store Boolean data.


    SQL statements cannot call PL/SQL functions that receive or return Booleans. Instead
    of code that looks like `WHERE IS_THIS_TRUE`, we must design our functions and
    queries to look like `WHERE IS_THIS_TRUE = ''Yes''`. For storing Boolean data,
    there is no universally agreed-upon standard, so we have to decide if we want
    to use “Yes/No,” “YES/NO,” “Y/N,” “1/0,” “True/False,” “sí/no,” etc. We must enforce
    our choice with a check constraint because inevitably someone will try to insert
    an unexpected value:


    ```

    --A table designed for Boolean data.

    create table boolean_test

    (

    is_true varchar2(3) not null,

    constraint boolean_test_ck

    check(is_true in (''Yes'', ''No''))

    );

    ```


    Booleans are easy to compare in PL/SQL. As the following conversion code demonstrates,
    we don’t need to check for `= TRUE` or `= FALSE`. Instead, we can directly use
    the variable in the condition `CASE WHEN V_BOOLEAN`. But we have to change the
    Boolean into a string before we can insert the value into a table:


    ```

    --Convert PL/SQL Boolean to SQL Boolean.

    declare

    v_boolean boolean := true;

    v_string varchar2(3);

    begin

    v_string := case when v_boolean then ''Yes'' else ''No'' end;

    insert into boolean_test values(v_string);

    rollback;

    end;

    /

    ```


    `VARCHAR2` types have a different maximum size in SQL and PL/SQL. The default
    maximum size in SQL is 4000 bytes, and the maximum size in PL/SQL is 32,767 bytes.
    Oracle 12.2 can be modified to allow 32,767 bytes in SQL, but only if the parameter
    `MAX_STRING_SIZE` is changed. Modifying that parameter is a surprisingly difficult
    process with significant performance implications, since large strings are internally
    stored as CLOBs instead of `VARCHAR2`. I doubt many organizations have changed
    `MAX_STRING_SIZE`, so to be safe we should assume the SQL limit is still 4,000
    bytes.


    PL/SQL has extra data types such as `PLS_INTEGER` and `BINARY_INTEGER`. A lot
    of built-in functions return `PLS_INTEGER`, and that data type has some performance
    benefits compared with `NUMBER`. But we shouldn’t go out of our way to convert
    `NUMBER` to `PLS_INTEGER`, unless we’re coding small loops or doing scientific
    programming.'
