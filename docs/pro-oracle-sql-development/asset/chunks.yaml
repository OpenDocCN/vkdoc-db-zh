- fmt: '# SQL Macros


    Normal PL/SQL functions execute every time a SQL statement calls them. For example,
    if we have a specific date formatting requirement and we don’t want to repeat
    that logic multiple times, we can encapsulate that logic inside a function named
    `TO_ISO8601`. If our application consistently uses that format, our database may
    be littered with calls to that function, like `SELECT TO_ISO8601(START_DATE),
    TO_ISO8601(STOP_DATE) FROM SITE`. There are tricks we can use to reduce the overhead
    of calling the function, but we may still end up spending more time context switching
    between SQL and PL/SQL than doing real work. We have to make a trade-off; repeating
    the `TO_CHAR` logic as SQL expressions improves performance, but using the function
    reduces the chance of a developer creating a bug.


    SQL macros give us the best of both worlds and eliminate the need for that trade-off.
    Macros are PL/SQL functions that are replaced at compile time with a SQL expression
    or SQL query. Macros don’t return *values*; they return *strings* that will form
    part of our final SQL statement.


    The following scalar macro can help optimize our queries, but there are a few
    odd features in this function. Notice how the function parameter `P_DATE` is not
    used directly in the function; it is neither concatenated to the return string
    nor passed into the string as a bind variable. But when Oracle evaluates the macro
    at compile time, `P_DATE` is replaced with the relevant column name or expression,
    and a valid SQL statement is created:


    ```

    --Convert a date into a specific kind of ISO8601 formatted string.

    create or replace function to_iso8601(p_date date)

    return varchar2 sql_macro(scalar) is

    begin

    return

    q''!

    to_char(p_date, ''YYYY-MM-DD"T"HH24:MI:SS"Z"'')

    !'';

    end;

    /

    ```


    SQL macros are a PL/SQL trick that helps us avoid using too much PL/SQL. But we
    should be cautious not to overuse this feature. SQL macros were introduced in
    21c and back ported to 19c, but there is some ambiguity over exactly which features
    are available in which version of 19c. We should usually stick with static code
    instead of dynamic code, although it’s debatable if a macro counts as “dynamic.”
    Macros don’t suffer from the same problems as regular dynamic SQL, such as the
    concern for SQL injection. On the other hand, since macros only return strings,
    we can’t tell if there is an error until the function is used. And there may be
    some confusion over how to tune these statements; the final SQL text shows up
    in a 10053 trace file but not in `GV$SQL.SQL_FULLTEXT`. We should only use scalar
    macros when we have a confirmed performance problem.


    A table macro returns a string that will be evaluated as a table function that
    returns rows of data. With table macros, we can finally create parameterized views.


    Like with scalar macros, we should be cautious of overusing table macros. Although
    developers have been asking for parameterized views for a long time, there’s still
    not always a clear advantage of parameterized views over regular views. The following
    example creates a simple view and a simple table macro:


    ```

    --Compare a regular view with a table macro parameterized view.

    create or replace view launch_view as select * from launch;

    create or replace function launch_macro(p_launch_category varchar2) return varchar2
    sql_macro is

    begin

    return

    q''[

    select *

    from launch

    where launch_category = p_launch_category

    ]'';

    end;

    /

    select * from launch_view where launch_category = ''orbital'';

    select * from launch_macro(p_launch_category => ''orbital'');

    ```


    Selecting from the table macro isn’t any easier than selecting from the view.
    There might be an advantage to a table macro if the condition is complex and the
    macro hides that complexity from the user. But we can accomplish the same thing
    in a regular view by projecting a complex expression and then using it in a simple
    condition. Also, there’s no performance advantage of table macros over regular
    views. Oracle already treats regular views like a macro in some ways; the optimizer
    transforms SQL as if the outer query and the view text are hard-coded together
    into one large statement.


    The real advantage of table macros is when we create polymorphic views by passing
    in table or column names as arguments. The following code is yet another way to
    dynamically count the number of rows for a table. But once again, the macro code
    is not quite as dynamic as we’re used to. The table name parameter, `P_TABLE`,
    is simply used as is in the returned string, and we don’t have to worry about
    concatenation, bind variables, or SQL injection. And when we call the function,
    we’re not passing in a string that represents the table name; we’re passing in
    the table name directly as an identifier:


    ```

    --SQL Macro for counting the number of rows in a table.

    create or replace function get_row_count

    (

    p_table dbms_tf.table_t

    ) return varchar2 sql_macro(table) is

    begin

    return

    q''!

    select count(*) row_count

    from p_table

    !;

    end;

    /

    select * from get_row_count(launch);

    ROW_COUNT


    ```


    The preceding solution is only slightly more dynamic than simply hard-coding the
    query `SELECT COUNT(*) FROM LAUNCH`. But that’s not a bad thing – it’s good to
    have a range of solutions from hard-coded to fully dynamic. And these small examples
    don’t fully explore the power of SQL macros. Just like polymorphic table functions,
    table macros can use the package `DBMS_TF` to loop through columns and build ridiculously
    dynamic queries. SQL macros provide yet another way to solve complex challenges
    like comparing generic row sets, dynamic pivoting, or any time we need to process
    “anything” in the database.


    ## Summary


    With the right advanced packages and features, we can solve any problem in Oracle.
    Dynamic SQL not only creates new opportunities for database programs, but a little
    advanced code in the right place can vastly simplify our programs by letting us
    focus on Oracle’s best feature – SQL. Most of the features in this chapter rely
    on PL/SQL, and it’s time to stop using PL/SQL only indirectly. The next chapter
    directly focuses on PL/SQL and shows how to take our database code to the highest
    level.


    Footnotes [1](#471418_2_En_20_Chapter.xhtml#Fn1_source)   [2](#471418_2_En_20_Chapter.xhtml#Fn2_source)   [3](#471418_2_En_20_Chapter.xhtml#Fn3_source)   [4](#471418_2_En_20_Chapter.xhtml#Fn4_source)


    # 21. Level Up Your Skills with PL/SQL


    If you use Oracle SQL long enough, you will eventually want to learn PL/SQL. SQL
    is the primary language for Oracle development, but we need PL/SQL to package
    our work and to call APIs that control and extend database functionality. If we
    decide to learn PL/SQL, the first step is to create a safe playground. There’s
    not enough room here for a full PL/SQL tutorial, but we can at least discuss the
    features most likely to help us enhance our SQL. To become a true Oracle master,
    you’ll need PL/SQL to help you teach others and create programs.'
