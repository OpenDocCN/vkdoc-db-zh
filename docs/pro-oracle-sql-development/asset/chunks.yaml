  trans: '

    ## 递归查询


    当数据以未知次数引用自身时，我们必须使用递归查询或层级查询。如果数据只单次引用自身，例如，如果我们想查找父记录，我们可以用自连接编写该查询。或者，如果我们的行只需要访问其前一行，我们可以用分析函数
    `LAG` 来编写查询。但当我们要找父记录的父记录，或前一行的前一行，或者想生成类似树形结构的东西时，我们就需要 Oracle 的递归查询语法。


    Oracle 提供了两种处理层级数据的方法：原始的 `CONNECT BY` 语法和较新的递归公用表表达式语法（也称为递归子查询因子化）。较新的语法通常是首选，但在这种情况下，较新的语法并不总是更好。两种语法各有优势。`CONNECT
    BY` 语法是原始语法，不那么冗长，对于处理传统的层级数据更为方便。递归公用表表达式语法基于一个标准，比 `CONNECT BY` 冗长，处理传统层级数据不那么方便，但功能更强大，更适合高级查询。每种语法似乎都更适合解决某些特定问题。如果一种风格（无论是语法还是性能上）给我们带来麻烦，我们应该尝试另一种风格。


    ### CONNECT BY 语法


    在原始语法中，我们从一个集合开始，然后使用 `CONNECT BY` 条件来定义集合如何与自身连接。`CONNECT BY` 子句中的条件可以使用特殊的 `PRIOR`
    运算符，这让我们能够引用集合中前一行的值。可选的 `START WITH` 条件让我们能够选择初始行。选择初始行很重要，因为它可以防止重复。如果我们从一个扁平表构建结果树，我们只希望从根节点开始构建树。如果我们既从根节点开始，又从其他层级开始构建树，最终会得到许多子树。


    `CONNECT BY` 语法还提供了有用的伪列，如 `LEVEL`。`LEVEL` 是一个数字，告诉我们每一行处于树的哪个层级。`CONNECT_BY_ROOT`
    返回根行的值。`SYS_CONNECT_BY_PATH` 遍历树并创建所有值的字符串聚合。`ORDER SIBLINGS BY` 子句保留了结果的树形结构。


    例如，让我们看一下 `ORGANIZATION` 表。该表在数据集中经常使用；其中包含用于发射、卫星、火箭级、发动机等的组织。每个组织都有一个父组织，父组织又可以有自己的父组织，依此类推。如果我们想按组织统计发射次数或卫星数量，按顶级组织进行统计可能有所帮助。首先，我们需要使用以下查询生成组织层级结构：


    ```sql

    --使用 CONNECT BY 的组织层级结构。

    select

    lpad(''  '', 2*(level-1)) || org_code org_code,

    parent_org_code parent,

    org_name

    from organization

    connect by prior org_code = parent_org_code

    start with parent_org_code is null

    order siblings by organization.org_code;

    ORG_CODE   PARENT  ORG_NAME

    ---------  ------  --------

    ...

    USAF               United States Air Force

    ...

    HAFB     USAF    Holloman Air Force Base

    ...

    HADC   HAFB    Holloman Air Development Center

    HAM  HADC    Holloman Aeromedical Lab, Holloman ...

    ...

    ```


    前面的部分结果显示其中一棵树。毫不奇怪，美国空军 (USAF) 下有许多组织。结果被格式化为树形结构，使用了 `LPAD` 技巧，它根据 `LEVEL` 的值乘以空格数。查询从顶层的根组织开始——即那些
    `PARENT_ORG_CODE IS NULL` 的组织。`ORDER BY` 子句中的 `SIBLINGS` 确保树形顺序得以保留。`CONNECT BY`
    条件是查询中最困难的部分，需要仔细思考。想象一下，我们从 USAF 行开始，试图找到第二行。为了判断每一行是否在树中，我们需要比较当前的 `PARENT_ORG_CODE`
    和 `PRIOR ORG_CODE`（前一行的 `ORG_CODE`）。


    如果这些递归查询现在还不明白，请不要灰心。递归查询是出了名的复杂；可能需要尝试几次才能感觉自然。


    ### 递归公用表表达式


    让我们用递归公用表表达式重现之前的结果。在这种语法中，我们在 `WITH` 子句中定义一个表，但这次我们还需要预先定义列名。在公用表表达式内部，有两个子查询。第一个子查询生成初始行作为启动。第二个子查询通过将表与公用表表达式本身连接来生成父行或子行。最后，查询公用表表达式以获取结果：


    ```sql

    --来自递归 CTE 的组织层级结构。

    with orgs(org_code, org_name, parent_org_code, n, hierarchy) as

    (

    --从父行开始：

    select org_code, org_name, parent_org_code, 1, org_code

    from organization

    where parent_org_code is null

    union all

    --通过连接到父行来添加子行：

    select

    organization.org_code,

    organization.org_name,

    organization.parent_org_code,

    n+1,

    hierarchy || ''-'' || organization.org_code

    from orgs parent_orgs

    join organization

    on parent_orgs.org_code = organization.parent_org_code

    )

    select

    lpad(''  '', 2*(n-1)) || org_code org_code,

    parent_org_code parent,

    org_name

    from orgs

    order by hierarchy;

    ```


    前面的查询返回与 `CONNECT BY` 版本相同的结果，但使用了更多代码来完成相同的事情。没有方便的 `LEVEL` 或 `SIBLINGS` 语法，所以我们必须自己创建它们。为了重现
    `LEVEL`，“n” 列从 1 开始，并在每次连接后加 1。为了按兄弟节点排序，我们需要创建一个表示整个树的字符串，然后按该字符串排序。“hierarchy”
    列通过以组织代码开头并在每个层级附加新的组织代码来表示一棵树。


    对于简单示例，`CONNECT BY` 语法是最佳选择。对于复杂示例，当我们需要对语句递归方式进行更细粒度的控制时，公用表表达式语法是最佳选择。


    无论我们使用哪种语法，递归查询都可能变得极其复杂。理解递归查询需要在脑海中构建一个复杂的树模型。在创建递归查询时，我们必须注意保持内联视图尽可能小，并对所有内容进行详尽的文档说明。


    ## XML


    Oracle 是一个融合数据库，支持的远不止关系数据。本书是关于 SQL 开发的，并侧重于关系数据，但有很多时候关系模型需要与以 XML 格式存储的半结构化数据相融合。有关于这个主题的完整手册，例如
    *XML DB 开发人员指南*。本节仅介绍基础知识，但请记住，Oracle 旨在处理更为复杂的场景。

    '
- fmt: '### XMLType


    Extensible Markup Language documents can be created, stored, and processed in
    Oracle. XML is semi-structured, not unstructured. We never want to allow invalid
    XML, so we don''t want to just throw XML into a string field. XML data should
    be stored as an `XMLType`, which will automatically validate the structure. Converting
    text into an `XMLType` is trivial; just pass the text into the default constructor
    like this:


    ```sql

    --Convert text to XML.

    select xmltype('''') from dual;

    ```


    The output of the preceding statement depends on our IDE. Not every program understands
    `XMLType`. Programs may display the result as a generic message or as a text string
    or perhaps in an XML editor. The text itself may look different. The results could
    be "`<a></a>`", "`<a/>`", or some other equivalent. Just like relational data
    has display properties that don''t matter (such as row order), XML also has display
    properties that don''t matter (such as tag style and insignificant whitespace).


    Converting from an `XMLType` back to text is a little trickier. When using object
    types like `XMLType`, there must be an alias, a column name, and parentheses for
    function calls (even if there are no parameters). In the following code, ideally
    we would only need to use the expression `XML_COLUMN.GETCLOBVAL`. But the real
    code is a bit more complicated:


    ```sql

    --Convert to XMLType and convert back to CLOB.

    select table_reference.xml_column.getClobVal()

    from

    (

    select xmltype('''') xml_column

    from dual

    ) table_reference;

    ```


    Just as we never want even a single byte of corrupt relational data, we never
    want a single corrupt XML. Always store XML as `XMLType` to prevent invalid data.
    Corruption in even one of our XML files may prevent us from processing *any* of
    our files. The following code shows an example of what happens when we try to
    load bad XML into `XMLType`:


    ```sql

    select xmltype(''</a'') from dual;

    ERROR:

    ORA-31011: XML parsing failed

    ORA-19202: Error occurred in XML processing

    LPX-00007: unexpected end-of-file encountered

    ORA-06512: at "SYS.XMLTYPE", line 310

    ORA-06512: at line 1

    ```


    Storing XML in `XMLType` columns also gives us more storage options. Oracle can
    store the XML internally in different, optimized formats. And we can also create
    XML indexes on properly typed XML data.


    ### DBMS_XMLGEN and Creating XML


    There are many ways to create XML, and the simplest technique is the function
    `DMBS_XMLGEN.GETXML`. That function accepts any SQL statement and returns the
    results as a single XML file. The results are a `CLOB`, but it''s easy to convert
    that `CLOB` into an `XMLType` if necessary. Chapter [20](#471418_2_En_20_Chapter.xhtml)
    shows a few advanced tricks we can do with `DBMS_XMLGEN`. For our current example,
    let''s convert some of our launch data into an XML file:


    ```sql

    --Create XML file for launch data.

    select dbms_xmlgen.getxml(''

    select launch_id, launch_date, launch_category

    from launch

    where launch_tag = ''''1957 ALP''''

    '')

    from dual;


    04-OCT-57

    orbital

    ```


    Oracle automatically adds an XML prologue (the version information at the top),
    creates a "ROWSET" element for all the results, creates a "ROW" element for each
    row, and creates one element for each column value. There may be issues with the
    type conversions. For example, the preceding `LAUNCH_DATE` format is terrible
    because my session was set to use a two-digit year format. It would be better
    to do the conversion ourselves in the SQL statement, like with an expression such
    as `TO_CHAR(LAUNCH_DATE, ''YYYY-MM-DD'') LAUNCH_DATE`.


    Oracle SQL has many other ways to create more precise XML statements. We can control
    the element names, attributes, and other features, using SQL functions such as
    `XMLELEMENT`, `XMLATTRIBUTES`, `XMLAGG`, and `XMLFOREST`. XML data can be modified
    with SQL functions like `INSERTXML*`, `UPDATEXML`, and `DELETEXML`.


    Oracle also has multiple ways to read and process XML data. There are SQL functions
    like `XMLQUERY` and `EXTRACTVALUE`, PL/SQL packages like `DBMS_XML*`, and interfaces
    for other programming languages. Oracle''s XML features change frequently, so
    we should reference the most recent versions of the manuals to ensure we''re using
    the latest features and avoiding deprecated features.


    ### XMLTABLE


    The function `XMLTABLE` is the most convenient and powerful way to access XML
    stored in the database. `XMLTABLE` accepts at least three parameters: an XQuery
    string to find the relevant elements, the column that contains the XML, and a
    path for each column we want to project.


    Mapping SQL and XML has a few quirks. SQL keywords are case insensitive, whereas
    XML is case sensitive. Many minor XML mistakes won''t throw errors but will instead
    return null or no rows. But when everything is done correctly, we can quickly
    turn an XML file into relational data in a single statement.


    For our example, we must first create XML data, which is easy in Oracle SQL. The
    following code converts the entire `LAUNCH` table into `LAUNCH_XML`:


    ```sql

    --Create a single XML file for launch data.

    create table launch_xml as

    select xmltype(dbms_xmlgen.getxml(''select * from launch'')) xml

    from dual;

    ```


    The following is an `XMLTABLE` query that reads from `LAUNCH_XML`. This query
    counts the number of launches per launch category:


    ```sql

    --Count launches per category using LAUNCH_XML table.

    select launch_category, count(*)

    from launch_xml

    cross join xmltable(

    ''/ROWSET/ROW''

    passing launch_xml.xml

    columns

    launch_id number path ''LAUNCH_ID'',

    launch_category varchar2(31) path ''LAUNCH_CATEGORY''

    )

    group by launch_category

    order by count(*) desc;

    LAUNCH_CATEGORY    COUNT(*)

    -----------------  --------

    suborbital rocket     48880

    military missile      12641

    orbital                5483

    ...

    ```


    The preceding results are normal relational data that can be read from like any
    other table or inline view. The results show why many of our sample queries filter
    by the launch category. Most of the launches in the space data set are for weather
    experiments and military tests. But the most interesting launches are the ones
    that go into space and try to stay there.


    ### XML Programming Languages


    Oracle XML features include several powerful languages. The `XMLISVALID` function
    can validate an `XMLType` against an XML schema. The `XMLTRANSFORM` function can
    apply XSLT (eXtensible Stylesheet Language Transformations) to XML. Those transformations
    can be used to convert XML into HTML, PDF, or other formats. The XQuery processing
    in `XMLTABLE` allows FLWOR expressions (`for`, `let`, `where`, `order by`, `return`).
    For example, we can use XQuery to create a simple row generator:


    ```sql

    --XQuery FLWOR row generator.

    select *

    from xmltable

    (

    ''for $i in xs:integer($i) to xs:integer($j) return $i''

    passing 1 as "i", 3 as "j"

    columns val number path ''.''

    );

    VAL

    ```


    I''m going to stop listing XML features before this chapter looks like alphabet
    soup. There''s a huge range of SQL functionality that can help us generate, read,
    and process XML data. There are tools that can handle XML better than Oracle,
    but using the database''s built-in functionality can reduce our program''s dependencies
    and can improve performance by reducing the overhead of transferring large XML
    data.


    ## JSON


    Similar to XML, the converged Oracle database can generate, read, and process
    JSON data. Oracle''s JSON support has grown significantly in recent years. If
    we''re working with a lot of JSON data, we need to pay close attention to the
    precise version of our database and use the newest features listed in the *SQL
    Language Reference* and the *JSON Developer''s Guide*.


    JSON stands for JavaScript Object Notation. JSON is a file format built on top
    of two simple ideas: a collection of objects, each with a name and value, and
    arrays. For example, this is a valid JSON document that contains one string named
    "string" and an ordered array of two numbers named "array": `{"string":"a", "array":[1,2]}`.'
