  raw: '### Conditional Compilation


    Conditional compilation lets us choose the source code of our PL/SQL programs
    depending on the environment. Conditional compilation is more dynamic than regular
    code but not as dynamic as dynamic SQL; we can choose among several static blocks
    of code, but we cannot arbitrarily modify source code at run time. When PL/SQL
    programs are compiled, conditional compilation can read session settings and constants
    to determine which source code to use. This feature is helpful when we want to
    use the latest and greatest SQL and PL/SQL features but only when those features
    are available.


    The following example shows how we can use different source code for different
    versions of the database. The preprocessor control tokens (the keywords that start
    with dollar signs) use the constants in the package `DBMS_DB_VERSION` to determine
    what code is compiled. The source code can be complete gibberish as long as that
    code is not chosen:


    ```

    --Conditional compilation example.

    begin

    $if dbms_db_version.ver_le_9 $then

    This line is invalid but the block still works.

    $elsif dbms_db_version.ver_le_12 $then

    dbms_output.put_line(''Version 12 or lower'');

    $elsif dbms_db_version.ver_le_18 $then

    dbms_output.put_line(''Version 18'');

    $elsif dbms_db_version.ver_le_19 $then

    dbms_output.put_line(''Version 19'');

    $elsif dbms_db_version.ver_le_21 $then

    dbms_output.put_line(''Version 21'');

    $else

    dbms_output.put_line(''Future version'');

    $end

    end;

    /

    ```


    The preceding code is even trickier than it looks. The version checking must be
    done in a precise order, or the code will not work. For example, the constant
    `DBMS_DB_VERSION.VER_LE_18` does not exist in Oracle 12.2\. The code would fail
    on 12.2 if the `IF` condition was written in a different order.


    ### Other PL/SQL Features


    We need to know what packages already exist, so we don’t reinvent the wheel. Chapter
    [8](#471418_2_En_8_Chapter.xhtml) already mentioned several important PL/SQL packages,
    and it’s worth quickly listing them again: `DBMS_METADATA`, `DBMS_METADATA_DIFF`,
    `DBMS_OUTPUT`, `DBMS_RANDOM`, `DBMS_SCHEDULER`, `DBMS_SQL`, `DBMS_SQLTUNE`, `DBMS_STATS`,
    and `DBMS_UTILITY`.


    Other useful pre-built packages are `UTL_MAIL` (for sending email), `DBMS_DATAPUMP`
    (for exporting and importing data), `DBMS_LOB` (for large object processing),
    `DBMS_LOCK` (has a useful `SLEEP` function), and `UTL_FILE` (for reading and writing
    to the operating system). There’s a large list of packages in the voluminous *PL/SQL
    Packages and Types Reference*. Nobody has the time to read the entire manual,
    but just skimming through the table of contents is helpful.


    There’s so much more to PL/SQL than what this chapter covers. Unlike other database
    systems, Oracle’s procedural language extension is a full-blown programming language.
    There is enough power in PL/SQL to do anything. But SQL should still be the star
    of our database programs. We should save most of our clever tricks for SQL and
    use PL/SQL to glue the SQL together.


    ## Start Teaching and Creating


    You now have everything you need to become an Oracle SQL guru. A good development
    process lets you quickly build solutions and experiment with new ideas. Advanced
    and arcane features give you the technical ability to solve any problem. Elegant
    programming styles let you build beautiful and manageable code. Understanding
    Oracle performance lets you build solutions that are lightning fast.


    It’s time to start sharing your skills with others if you’re not already. To truly
    master Oracle SQL, we need to teach others and create open source projects.


    ### Teach Others


    The best way to master a skill is to teach it to someone else. We don’t have to
    be an expert before we start teaching. There are always people less skilled than
    us whom we can help. And there are always people more skilled than us whom we
    can learn from. We want to participate in environments where people of any skill
    level can contribute.


    Teaching can start at your job. Teaching might just mean speaking up more at meetings,
    volunteering to give small presentations, or training other developers. If you
    feel nervous that you’re not good enough or suffer from imposter syndrome, that
    might just be a good sign that you’re getting out of your comfort zone and learning.
    Don’t let that nervousness stop you.


    Eventually we’ll need to move beyond our job and start sharing our knowledge with
    the public. To continue our professional growth, we need to join a community where
    developers can collaborate, provide quick and meaningful feedback, and build a
    reputation. These communities can be forums, Q&A sites like Stack Overflow, user
    groups, or one of the many social networks for developers.


    Mastering a skill requires *intentional* practice. Just doing the bare minimum
    at work isn’t enough to make us experts. We need the confidence to put ourselves
    out there, but we also need the humility to learn from our mistakes.


    ### Create Open Source Projects


    One of the greatest achievements for a software developer is to create a successful,
    publicly available program. Most Oracle SQL developers only work on internal applications
    used by a single customer, but our careers don’t have to be so limited. There
    are many opportunities for us to create public programs using Oracle SQL and PL/SQL.


    Building good software is tough because we tend to think about generic software.
    The simple ideas are taken; the world doesn’t need another flashlight app for
    our phone. The good ideas are too tough; we don’t have the time or skills to build
    a better social network. But don’t give up!


    We need to be in a lucky situation where we have the opportunity to build something
    unique but feasible. Those lucky situations won’t happen unless we are an expert
    in something, and if you’ve read this far, you are on the path to becoming an
    expert in Oracle SQL. Our first attempts will fail, but we’ll learn a lot from
    those failures. Don’t get discouraged – nobody builds successful programs on the
    first try.


    The best way to build public programs is to make them open source. There are many
    existing communities and tools that support open source development. Many of the
    technical details of project management are easily handled by open source hosting
    sites, such as GitHub, GitLab, Bitbucket, SourceForge, and many more. Open sourcing
    our code invites others to participate and helps us build better software.


    When you begin building public programs, watch out for the curse of knowledge.
    There are countless repositories with great programs that are completely inaccessible
    because there is no metadata. Every project must at least have a Readme file;
    a quick description, a simple example, simple installation instructions, and license
    information are absolutely necessary if we want people to use our projects. If
    we’re going to invest a huge amount of time building something, we should at least
    spend a few hours making the project presentable and easy to install.


    When most people talk about open source, what they really mean is “cheap.” Real
    open source isn’t about saving money; it’s about freedom, collaboration, and positive
    sum interactions where everybody wins. Our side projects can be open source, and
    we may be able to convince our organizations to open some of our internal programs.
    At the very least, when we post snippets of code online, we should ensure the
    code is properly licensed for others to use.


    Oracle SQL doesn’t yet have a huge open source ecosystem. With the right development
    environment, advanced features, beautiful styles, and performance tuning skills,
    there are many tools we can create and many knowledge gaps we can fill. And advanced
    programming skills will certainly help advance our careers.


    There are endless opportunities for advanced Oracle developers. Put down this
    book and go write a program.


