  trans: '

    ### 表函数


    表函数返回的集合可在 SQL 语句中用作行源。表函数的一个常见例子是，当我们使用`SELECT * FROM TABLE(DBMS_XPLAN.DISPLAY)`查看执行计划时。通过自定义表函数，我们可以结合使用声明式和过程式代码来构建表数据。表函数有三种：常规表函数、管道表函数和并行管道表函数。


    常规表函数会一次性返回整个集合。在转向更高级的管道函数或 Oracle 数据插件之前，我们应该首先考虑使用简单的表函数。传入一个集合、处理该集合并返回一个新集合的过程，对于许多任务来说已经足够强大。


    例如，假设我们想在 PL/SQL 中创建一个自定义的 `DISTINCT` 函数。以下代码首先创建一个嵌套表来保存数字集合。然后，该代码创建一个函数，该函数接受一个数字集合，运行`SET`函数以获取集合中的不重复值，并返回新集合：


    ```

    --简单的嵌套表及使用它的表函数。

    create or replace type number_nt is table of number;

    create or replace function get_distinct(p_numbers number_nt)

    return number_nt is

    begin

    return set(p_numbers);

    end;

    /

    ```


    我们可以使用前面的函数来查找所有不重复的发射远地点（物体离地球最远的距离）。第一步是将这些值打包到特定类型的集合中，这是通过`CAST`和`COLLECT`函数完成的。然后将该集合传递给新函数，该函数处理数据并返回另一个集合。最后，`TABLE`运算符将该新集合转换回关系结果：


    ```

    --来自自定义 PL/SQL 函数的不重复发射远地点。

    select *

    from table(get_distinct

    ((

    select cast(collect(apogee) as number_nt)

    from launch

    )))

    order by 1;

    COLUMN_VALUE


    ...

    ```


    上述函数是`SELECT DISTINCT APOGEE FROM LAUNCH`的一个较差版本。这段代码的意义在于为需要利用过程式代码的、更有用的函数奠定基础。


    ### 管道函数


    管道函数是一种特殊的表函数。管道函数返回集合，但它们一次返回一行。逐行处理通常不是好事，但在这种情况下有其优势。通过立即返回行，我们可以链接函数，并使一个流程的多个步骤并发工作。


    以下是一个返回三个数字的简单管道函数。请注意函数定义中包含了关键字`PIPELINED`。这些函数不`RETURN`值；相反，函数必须为返回的每一行调用`PIPE
    ROW`。尽管函数返回一个集合，但我们一次只管道传输一个元素：


    ```

    --简单的管道函数。

    create or replace function simple_pipe

    return sys.odcinumberlist pipelined is

    begin

    for i in 1 .. 3 loop

    pipe row(i);

    end loop;

    end;

    /

    select * from table(simple_pipe);

    COLUMN_VALUE

    ```


    ### 并行管道函数


    使管道函数并行运行需要做一些更改。并行管道函数必须传入一个游标，必须有一个对游标进行分区的`PARALLEL_ENABLE`子句，并且必须使用并行提示调用。设置并行管道函数可能具有挑战性，但可以显著提高过程式代码的性能。


    以下代码接受任何输入游标，但要使代码正常工作，输入游标必须从`LAUNCH`表中选择所有列。在遍历游标时，每一行都存储在一个记录中，然后被管道输出。这个函数没有做任何特别有用的事情——它只是演示概念：


    ```

    --并行管道函数。

    create or replace function parallel_pipe(p_cursor sys_refcursor)

    return sys.odcinumberlist pipelined

    parallel_enable(partition p_cursor by any) is

    v_launch launch%rowtype;

    begin

    loop

    fetch p_cursor into v_launch;

    exit when p_cursor%notfound;

    pipe row(v_launch.launch_id);

    end loop;

    end;

    /

    ```


    以下代码展示了如何调用这个新函数。该查询使用`CURSOR`关键字将一条 SQL 语句传递给函数。要启用并行性，我们需要使用并行提示。这个示例不完全是子查询，因为
    Oracle 传递的是指向 SQL 语句的指针，而不是传递数据集：


    ```

    --调用并行管道函数。

    select *

    from table(parallel_pipe(cursor(

    select /*+ parallel(2) */ * from launch

    )));

    COLUMN_VALUE


    ...

    ```


    管道函数是强大的工具，但在实践中被过度使用。一条高级 SQL 语句通常优于高级管道函数，而一条并行 SQL 语句通常会优于并行管道函数。


    ### 用于 DML 和 DDL 的自主事务


    `SELECT`语句应用于读取数据，不应改变数据库状态。但在实践中，这条规则存在重要的例外情况。有时我们迫切需要从由`SELECT`语句调用的函数中运行 DML
    或 DDL。


    如果一个函数包含更改操作，并且我们从 SQL 中调用该函数，我们会遇到类似“ORA-14552: cannot perform a DDL, commit
    or rollback inside a query or DML”的错误。克服此限制的方法是使用编译指令——这是给 PL/SQL 编译器的指令。


    以下代码演示了如何使用`PRAGMA AUTONOMOUS_TRANSACTION`来创建和调用一个包含 DDL 语句的函数：


    ```

    --会更改数据库的函数。

    create or replace function test_function

    return number authid current_user is

    pragma autonomous_transaction;

    begin

    execute immediate ''create table new_table(a number)'';

    return 1;

    end;

    /

    --调用函数以创建表。

    select /*+ no_result_cache */ test_function from dual;

    TEST_FUNCTION

    ```


    上述函数通常不是一个好主意，因为 SQL 不保证执行顺序，甚至不保证每个部分的执行次数。理论上，该函数可能被执行零次、一次或多次。（例如，根据结果缓存的配置方式，Oracle
    可能在第一次解析 SQL 语句时调用该函数两次。这就是使用提示`/*+ NO_RESULT_CACHE */`的原因。）实际上，如果我们仔细测试代码并且不更改调用函数的方式，这些函数可以做到基本可靠。

    '
- fmt: '# Autonomous Transactions for Logging


    A more common use of autonomous transactions is for maintaining logs. Most of
    our programs should be instrumented to store metadata that can be useful for debugging
    and performance tuning. This metadata is gathered while our programs are doing
    their normal work, but it must be gathered in a slightly different way. Our applications
    typically roll back when there is an exception, but we do not want to roll back
    the log entries. Autonomous transactions operate independently from their parent
    transaction, which lets us keep the log changes while we roll back the other changes.


    For example, let’s create a simple logging table and a simple program to create
    log entries. Notice how the procedure is created with `PRAGMA AUTONOMOUS_TRANSACTION`:


    ```

    --Create simple table to hold application messages.

    create table application_log

    (

    message  varchar2(4000),

    the_date date

    );

    --Autonomous logging procedure.

    create or replace procedure log_it

    (

    p_message varchar2,

    p_the_date date

    ) is

    pragma autonomous_transaction;

    begin

    insert into application_log

    values(p_message, p_the_date);

    commit;

    end;

    /

    ```


    Next, in a PL/SQL block, we’ll write to the table, create a log entry, and roll
    back the transaction:


    ```

    --Reset the scratch table.

    truncate table transaction_test;

    --Autonomous transaction works despite rollback.

    begin

    insert into transaction_test values(1);

    log_it(''Inserting...'', sysdate);

    rollback;

    end;

    /

    ```


    The `LOG_IT` procedure has a `COMMIT`, but that `COMMIT` does not affect the parent
    transaction. If we look at the two tables, we can see that the original `INSERT`
    to the test table was rolled back, but the `INSERT` to the logging table remains:


    ```

    --The main transaction was rolled back.

    select count(*) from transaction_test;

    COUNT(*)


    --But the logging table has the original log message.

    select count(*) from application_log;

    COUNT(*)


    ```


    Autonomous transactions let us keep our log entries even if the main program crashes
    or rolls back. This is important because we’re most likely to need our logs when
    there is an error or a rollback.


    # Definer’s Rights vs. Invoker’s Rights


    When we build PL/SQL objects, we have to make an important choice about privileges:
    do the objects run with the privileges of the schema owner or the privileges of
    the current user? These options are called definer’s rights and invoker’s rights.
    In the object definition, we can specify either `AUTHID DEFINER` or `AUTHID CURRENT_USER`.
    The `AUTHID` property is an annoying detail, but it’s something we always have
    to consider. The choice impacts the security and the simplicity of our PL/SQL
    code.


    The default option is definer’s rights. Sometimes the schema owner, the definer,
    has more privileges, and we want to lend those privileges to another user. Sometimes
    the current user, the invoker, has more privileges, or we may want to run the
    SQL against the invoker’s schema.


    You may have noticed that the last version of `TEST_FUNCTION`, the version that
    creates a new table, was built using `AUTHID CURRENT_USER`. But I can’t be 100%
    certain that the setting is correct for you. The right setting depends on exactly
    how your user is authorized to create tables. Privileges granted through roles
    are *not* used in definer’s rights procedures.


    If your account has access to the `CREATE TABLE` privilege through a role like
    DBA, then `AUTHID CURRENT_USER` is necessary to enable the role. If your account
    was directly granted the `CREATE TABLE` privilege, then either setting will work.
    Most accounts are granted access through roles, which is why I chose `AUTHID CURRENT_USER`
    in the function.


    Regardless of which option is used, PL/SQL objects are *compiled* without using
    any roles. For a procedure to compile successfully, all schema objects used in
    the procedure must either be owned by the same schema, directly granted to the
    schema owner, or used in dynamic SQL. (However, anonymous blocks are run with
    the invoker’s roles, which is why code often works as an anonymous block but not
    as a stored procedure.)


    The `AUTHID` option is extremely confusing, but we cannot ignore it. Oracle privileges
    are complex, and it will take a while before this option makes sense.


    # Triggers


    Triggers contain PL/SQL code that is executed when specific things happen and
    specific conditions are met. Common uses of triggers are logging and auditing,
    enforcing multi-table constraints, enabling DML on views, and changing session
    settings during logon.


    Triggers are powerful, but they should not be our first choice for solving problems.
    We should not use triggers when a simpler declarative constraint or column default
    can solve the problem instead. Also, triggers are side effects of other changes
    and can easily surprise developers and administrators who aren’t expecting those
    side effects. Triggers that work row by row can decrease performance, especially
    when they can prevent direct-path writes. Some organizations have a no-triggers
    policy; I wouldn’t go that far, but I would recommend we be careful when we create
    triggers.


    The trigger syntax is complicated, and there’s not enough space to cover everything
    here. The main parts of triggers are the event clauses (that specify what types
    of statements fire the triggers), timing points (that specify precisely when triggers
    fire), `WHEN` conditions (that optionally constrain when triggers fire), and PL/SQL
    body, which can often reference the `OLD` and the `NEW` values. There are four
    types of triggers: simple, instead-of, compound, and system.


    ## Event clauses


    `Event clauses` can be a combination of the DML events `DELETE`, `INSERT`, and
    `UPDATE`. For system triggers the events can be almost any DDL event, such as
    `CREATE` or `TRUNCATE`. System triggers can also include database or schema events,
    like `AFTER STARTUP` or `AFTER LOGON`.


    ## Timing points


    `Timing points` define precisely when the trigger fires. The self-explanatory
    options are `BEFORE STATEMENT`, `BEFORE EACH ROW`, `AFTER STATEMENT`, `AFTER EACH
    ROW`, and `INSTEAD OF EACH ROW`. Whether a trigger is `BEFORE` or `AFTER`, and
    whether it’s for a `STATEMENT` or for `EACH ROW`, determines what information
    the trigger body can read or change. For example, an `AFTER STATEMENT` trigger
    can view the final version of the table, which is helpful for enforcing business
    rules. But an `AFTER STATEMENT` trigger is not fired for each row and cannot access
    individual `OLD` and `NEW` values.


    ## WHEN (condition)


    The `WHEN (condition)` allows triggers to easily include or exclude rows from
    processing. Any valid SQL condition can be used to filter the results, and the
    condition can reference the `OLD` and `NEW` values.


    ## Simple DML triggers


    `Simple DML triggers` can respond to changes made through `INSERT`, `UPDATE`,
    `DELETE`, or `MERGE` statements. For example, a trigger could set columns such
    as `CHANGED_BY` or `CHANGED_DATE` or could save a copy of the old values before
    deletion.


    In many regulated environments, data can never be fully deleted. In theory we
    could use backups and tools like LogMiner to get the table history, but in practice
    it is much more convenient to have audit tables. Oracle’s built-in auditing is
    only for security and does not help us audit data changes. We will not find old
    copies of our data in `DBA_AUDIT_TRAIL`. If we want to keep historical records,
    we must build the tables and triggers ourselves. There are several ways to create
    audit tables.


    One popular choice for creating audit tables is to have a single audit table,
    with one row for each changed column. This solution is similar to an EAV table;
    the table is easy to build and easy to write into, but is slow, wastes space for
    dense changes, and is hard to query. If our data is small and we don’t plan on
    querying the audit trail much, a single table might work fine.'
  raw: '### Autonomous Transactions for Logging


    A more common use of autonomous transactions is for maintaining logs. Most of
    our programs should be instrumented to store metadata that can be useful for debugging
    and performance tuning. This metadata is gathered while our programs are doing
    their normal work, but it must be gathered in a slightly different way. Our applications
    typically roll back when there is an exception, but we do not want to roll back
    the log entries. Autonomous transactions operate independently from their parent
    transaction, which lets us keep the log changes while we roll back the other changes.


    For example, let’s create a simple logging table and a simple program to create
    log entries. Notice how the procedure is created with `PRAGMA AUTONOMOUS_TRANSACTION`:


    ```

    --Create simple table to hold application messages.

    create table application_log

    (

    message  varchar2(4000),

    the_date date

    );

    --Autonomous logging procedure.

    create or replace procedure log_it

    (

    p_message varchar2,

    p_the_date date

    ) is

    pragma autonomous_transaction;

    begin

    insert into application_log

    values(p_message, p_the_date);

    commit;

    end;

    /

    ```


    Next, in a PL/SQL block, we’ll write to the table, create a log entry, and roll
    back the transaction:


    ```

    --Reset the scratch table.

    truncate table transaction_test;

    --Autonomous transaction works despite rollback.

    begin

    insert into transaction_test values(1);

    log_it(''Inserting...'', sysdate);

    rollback;

    end;

    /

    ```


    The `LOG_IT` procedure has a `COMMIT`, but that `COMMIT` does not affect the parent
    transaction. If we look at the two tables, we can see that the original `INSERT`
    to the test table was rolled back, but the `INSERT` to the logging table remains:


    ```

    --The main transaction was rolled back.

    select count(*) from transaction_test;

    COUNT(*)


    --But the logging table has the original log message.

    select count(*) from application_log;

    COUNT(*)


    ```


    Autonomous transactions let us keep our log entries even if the main program crashes
    or rolls back. This is important because we’re most likely to need our logs when
    there is an error or a rollback.


    ### Definer’s Rights vs. Invoker’s Rights


    When we build PL/SQL objects, we have to make an important choice about privileges:
    do the objects run with the privileges of the schema owner or the privileges of
    the current user? These options are called definer’s rights and invoker’s rights.
    In the object definition, we can specify either `AUTHID DEFINER` or `AUTHID CURRENT_USER`.
    The `AUTHID` property is an annoying detail, but it’s something we always have
    to consider. The choice impacts the security and the simplicity of our PL/SQL
    code.


    The default option is definer’s rights. Sometimes the schema owner, the definer,
    has more privileges, and we want to lend those privileges to another user. Sometimes
    the current user, the invoker, has more privileges, or we may want to run the
    SQL against the invoker’s schema.


    You may have noticed that the last version of `TEST_FUNCTION`, the version that
    creates a new table, was built using `AUTHID CURRENT_USER`. But I can’t be 100%
    certain that the setting is correct for you. The right setting depends on exactly
    how your user is authorized to create tables. Privileges granted through roles
    are *not* used in definer’s rights procedures.


    If your account has access to the `CREATE TABLE` privilege through a role like
    DBA, then `AUTHID CURRENT_USER` is necessary to enable the role. If your account
    was directly granted the `CREATE TABLE` privilege, then either setting will work.
    Most accounts are granted access through roles, which is why I chose `AUTHID CURRENT_USER`
    in the function.


    Regardless of which option is used, PL/SQL objects are *compiled* without using
    any roles. For a procedure to compile successfully, all schema objects used in
    the procedure must either be owned by the same schema, directly granted to the
    schema owner, or used in dynamic SQL. (However, anonymous blocks are run with
    the invoker’s roles, which is why code often works as an anonymous block but not
    as a stored procedure.)


    The `AUTHID` option is extremely confusing, but we cannot ignore it. Oracle privileges
    are complex, and it will take a while before this option makes sense.


    ### Triggers


    Triggers contain PL/SQL code that is executed when specific things happen and
    specific conditions are met. Common uses of triggers are logging and auditing,
    enforcing multi-table constraints, enabling DML on views, and changing session
    settings during logon.


    Triggers are powerful, but they should not be our first choice for solving problems.
    We should not use triggers when a simpler declarative constraint or column default
    can solve the problem instead. Also, triggers are side effects of other changes
    and can easily surprise developers and administrators who aren’t expecting those
    side effects. Triggers that work row by row can decrease performance, especially
    when they can prevent direct-path writes. Some organizations have a no-triggers
    policy; I wouldn’t go that far, but I would recommend we be careful when we create
    triggers.


    The trigger syntax is complicated, and there’s not enough space to cover everything
    here. The main parts of triggers are the event clauses (that specify what types
    of statements fire the triggers), timing points (that specify precisely when triggers
    fire), `WHEN` conditions (that optionally constrain when triggers fire), and PL/SQL
    body, which can often reference the `OLD` and the `NEW` values. There are four
    types of triggers: simple, instead-of, compound, and system.


    **Event clauses** can be a combination of the DML events `DELETE`, `INSERT`, and
    `UPDATE`. For system triggers the events can be almost any DDL event, such as
    `CREATE` or `TRUNCATE`. System triggers can also include database or schema events,
    like `AFTER STARTUP` or `AFTER LOGON`.


    **Timing points** define precisely when the trigger fires. The self-explanatory
    options are `BEFORE STATEMENT`, `BEFORE EACH ROW`, `AFTER STATEMENT`, `AFTER EACH
    ROW`, and `INSTEAD OF EACH ROW`. Whether a trigger is `BEFORE` or `AFTER`, and
    whether it’s for a `STATEMENT` or for `EACH ROW`, determines what information
    the trigger body can read or change. For example, an `AFTER STATEMENT` trigger
    can view the final version of the table, which is helpful for enforcing business
    rules. But an `AFTER STATEMENT` trigger is not fired for each row and cannot access
    individual `OLD` and `NEW` values.


    The **WHEN (condition)** allows triggers to easily include or exclude rows from
    processing. Any valid SQL condition can be used to filter the results, and the
    condition can reference the `OLD` and `NEW` values.


    **Simple DML** **triggers** can respond to changes made through `INSERT`, `UPDATE`,
    `DELETE`, or `MERGE` statements. For example, a trigger could set columns such
    as `CHANGED_BY` or `CHANGED_DATE` or could save a copy of the old values before
    deletion.


    In many regulated environments, data can never be fully deleted. In theory we
    could use backups and tools like LogMiner to get the table history, but in practice
    it is much more convenient to have audit tables. Oracle’s built-in auditing is
    only for security and does not help us audit data changes. We will not find old
    copies of our data in `DBA_AUDIT_TRAIL`. If we want to keep historical records,
    we must build the tables and triggers ourselves. There are several ways to create
    audit tables.


    One popular choice for creating audit tables is to have a single audit table,
    with one row for each changed column. This solution is similar to an EAV table;
    the table is easy to build and easy to write into, but is slow, wastes space for
    dense changes, and is hard to query. If our data is small and we don’t plan on
    querying the audit trail much, a single table might work fine.'
  trans: '

    # 用于日志记录的自治事务


    自治事务一个更常见的用途是维护日志。我们的大多数程序都应具备相应机制来存储元数据，这些数据对于调试和性能调优很有用。这些元数据是在程序执行正常工作时收集的，但必须以一种略有不同的方式来收集。当发生异常时，我们的应用程序通常会回滚，但我们不希望日志条目也随之回滚。自治事务独立于其父事务运行，这使我们能够在回滚其他更改的同时，保留日志的更改。


    例如，让我们创建一个简单的日志表和一个用于创建日志条目的简单程序。注意该过程是使用 `PRAGMA AUTONOMOUS_TRANSACTION` 创建的：


    ```

    --创建用于保存应用程序消息的简单表。

    create table application_log

    (

    message  varchar2(4000),

    the_date date

    );

    --自治日志记录过程。

    create or replace procedure log_it

    (

    p_message varchar2,

    p_the_date date

    ) is

    pragma autonomous_transaction;

    begin

    insert into application_log

    values(p_message, p_the_date);

    commit;

    end;

    /

    ```


    接下来，在一个 PL/SQL 块中，我们将写入该表，创建一个日志条目，然后回滚事务：


    ```

    --重置临时表。

    truncate table transaction_test;

    --自治事务在回滚后仍然有效。

    begin

    insert into transaction_test values(1);

    log_it(''Inserting...'', sysdate);

    rollback;

    end;

    /

    ```


    `LOG_IT` 过程有一个 `COMMIT`，但这个 `COMMIT` 不会影响父事务。如果我们查看这两个表，可以看到对测试表的原始 `INSERT` 操作被回滚了，但对日志表的
    `INSERT` 操作保留了下来：


    ```

    --主事务已被回滚。

    select count(*) from transaction_test;

    COUNT(*)


    --但日志表保留了原始的日志消息。

    select count(*) from application_log;

    COUNT(*)


    ```


    即使主程序崩溃或回滚，自治事务也能让我们保留日志条目。这很重要，因为最需要日志的时候，往往就是出现错误或发生回滚时。


    # 定义者权限与调用者权限


    当我们构建 PL/SQL 对象时，必须就权限问题做出一个重要选择：对象是使用模式所有者的权限运行，还是使用当前用户的权限运行？这两种选项分别称为定义者权限和调用者权限。在对象定义中，我们可以指定
    `AUTHID DEFINER` 或 `AUTHID CURRENT_USER`。`AUTHID` 属性是一个令人烦恼的细节，但它总是我们必须考虑的事情。这个选择会影响
    PL/SQL 代码的安全性和简洁性。


    默认选项是定义者权限。有时模式所有者（定义者）拥有更多权限，我们希望将这些权限“借给”另一个用户。有时当前用户（调用者）拥有更多权限，或者我们可能希望针对调用者的模式运行
    SQL。


    你可能已经注意到，最后一个版本的 `TEST_FUNCTION`，即创建新表的那个版本，是使用 `AUTHID CURRENT_USER` 构建的。但我无法
    100% 确定该设置对您来说是正确的。正确的设置取决于您的用户被授权创建表的具体方式。通过角色授予的权限在定义者权限过程中**不**被使用。


    如果您的账户通过像 DBA 这样的角色获得了 `CREATE TABLE` 权限，那么 `AUTHID CURRENT_USER` 是启用该角色所必需的。如果您的账户是直接被授予
    `CREATE TABLE` 权限，那么两种设置都可以工作。大多数账户都是通过角色获得访问权限的，这就是我在函数中选择 `AUTHID CURRENT_USER`
    的原因。


    无论使用哪个选项，PL/SQL 对象在*编译*时都不使用任何角色。为了使过程成功编译，过程中使用的所有模式对象必须满足以下条件之一：由同一模式拥有、直接授予模式所有者、或在动态
    SQL 中使用。（但是，匿名块是使用调用者的角色运行的，这就是为什么代码在作为匿名块时通常能工作，而作为存储过程时却不行。）


    `AUTHID` 选项极其令人困惑，但我们不能忽视它。Oracle 权限很复杂，要理解这个选项还需要一些时间。


    # 触发器


    触发器包含 PL/SQL 代码，当特定事情发生且满足特定条件时执行。触发器的常见用途包括日志记录和审计、强制执行多表约束、支持对视图执行 DML 操作，以及在登录时更改会话设置。


    触发器功能强大，但不应作为我们解决问题的首选。当更简单的声明式约束或列默认值可以解决问题时，我们就不应使用触发器。此外，触发器是其他更改的副作用，很容易让没有预料到这些副作用的开发者和管理员感到意外。逐行工作的触发器会降低性能，特别是当它们可能阻止直接路径写入时。有些组织有禁止使用触发器的政策；我虽不至于走到那一步，但建议我们在创建触发器时务必谨慎。


    触发器的语法很复杂，这里没有足够的篇幅涵盖所有内容。触发器的主要部分包括：事件子句（指定哪些类型的语句会触发触发器）、时点（精确指定触发器何时触发）、`WHEN`
    条件（可选地约束触发器何时触发），以及 PL/SQL 主体，主体中通常可以引用 `OLD` 和 `NEW` 值。触发器有四种类型：简单触发器、Instead-Of
    触发器、复合触发器和系统触发器。


    ## 事件子句


    `事件子句`可以是 DML 事件 `DELETE`、`INSERT` 和 `UPDATE` 的组合。对于系统触发器，事件可以是几乎任何 DDL 事件，例如
    `CREATE` 或 `TRUNCATE`。系统触发器还可以包括数据库或模式事件，如 `AFTER STARTUP` 或 `AFTER LOGON`。


    ## 时点


    `时点`精确地定义了触发器何时触发。一目了然的选项有 `BEFORE STATEMENT`、`BEFORE EACH ROW`、`AFTER STATEMENT`、`AFTER
    EACH ROW` 和 `INSTEAD OF EACH ROW`。触发器是 `BEFORE` 还是 `AFTER`，以及它是针对 `STATEMENT`
    还是针对 `EACH ROW`，决定了触发器主体可以读取或更改哪些信息。例如，`AFTER STATEMENT` 触发器可以查看表的最终版本，这对于强制执行业务规则很有用。但
    `AFTER STATEMENT` 触发器不是为每一行触发的，因此无法访问各个 `OLD` 和 `NEW` 值。


    ## WHEN（条件）


    `WHEN (条件)` 允许触发器轻松地包含或排除要处理的行。任何有效的 SQL 条件都可以用来筛选结果，并且该条件可以引用 `OLD` 和 `NEW` 值。


    ## 简单 DML 触发器


    `简单 DML 触发器`可以响应通过 `INSERT`、`UPDATE`、`DELETE` 或 `MERGE` 语句进行的更改。例如，触发器可以设置诸如 `CHANGED_BY`
    或 `CHANGED_DATE` 之类的列，或者在删除前保存旧值的副本。


    在许多受监管的环境中，数据永远不能被完全删除。理论上，我们可以使用备份和 LogMiner 等工具来获取表的历史记录，但在实践中，拥有审计表要方便得多。Oracle
    内置的审计仅用于安全性，无法帮助我们审计数据变更。在 `DBA_AUDIT_TRAIL` 中找不到我们数据的旧副本。如果想保留历史记录，我们必须自己构建表和触发器。创建审计表有几种方法。


    创建审计表的一个流行选择是使用单一的审计表，每个更改的列对应一行。这种解决方案类似于 EAV 表；该表易于构建和写入，但速度慢，对于密集的更改会浪费空间，并且难以查询。如果我们的数据量小，并且不打算太多地查询审计跟踪，那么单表方案可能就足够了。

    '
- fmt: '# Audit Triggers and Other DML Triggers


    If we have a large amount of data or if we plan to regularly query old data, we
    should build an audit table for every regular table. This solution is faster and
    easier to use, but it’s more complex because we need to create and maintain an
    extra set of tables. And storing each row twice is inefficient, especially for
    sparse changes where we may store an entire new row when only one column changed.
    But in a highly regulated environment where we need to quickly prove exactly what
    happened, when it happened, and who did it, those tables are a lifesaver.


    ## Row-Level AFTER Trigger


    The following code creates a row-level `AFTER` trigger that captures every DML
    change made to the table `TRANSATION_TEST`. Notice how the `CASE` statement in
    the trigger body can determine exactly what kind of DML is happening with the
    conditional predicates `INSERTING`, `UPDATING`, and `DELETING`. We need that information
    to know whether to use the `OLD` or the `NEW` value or both. A real trigger would
    store the changes in an audit table, but this sample trigger is only printing
    the statement so we can see how triggers work:


    ```sql

    --Create a trigger to track every row change.

    create or replace trigger transaction_test_trg

    after insert or update of a or delete on transaction_test

    for each row

    begin

    case

    when inserting then

    dbms_output.put_line(''inserting ''||:new.a);

    when updating(''a'') then

    dbms_output.put_line(''updating from ''||

    :old.a||'' to ''||:new.a);

    when deleting then

    dbms_output.put_line(''deleting ''||:old.a);

    end case;

    end;

    /

    ```


    The following PL/SQL block shows what happens when we `INSERT`, `UPDATE`, and
    `DELETE`. (The results assume the table is empty at the beginning of the example.)


    ```sql

    --Test the trigger.

    begin

    insert into transaction_test values(1);

    update transaction_test set a = 2;

    delete from transaction_test;

    end;

    /

    inserting 1

    updating from 1 to 2

    deleting 2

    ```


    If we need to audit a large number of tables, it may be worth creating a package
    to automate the building of audit triggers. As discussed in previous chapters
    about dynamic SQL, we can use the data dictionary and helpful programming styles
    to easily generate trigger code.


    ## AFTER STATEMENT Trigger for Multi-Table Constraints


    Another use of simple DML triggers is to verify multi-table constraints. The problem
    with validating multi-table constraints through triggers is the performance; even
    if we only change one row, we may need to query the entire table. We should at
    least use an `AFTER STATEMENT` trigger, so we don’t have to verify the conditions
    for every row. This approach can accomplish the same thing as the materialized
    view multi-table constraints discussed in Chapter 9.


    ## Instead-of DML Triggers


    `Instead-of` DML triggers can be used to change the way we interact with views.
    If our views are simple, they may be inherently updatable, and we can natively
    run DML against them. But non-trivial views are not updatable, and it may not
    be clear to Oracle how a change to a view should be reflected as a change to a
    table. With an `instead-of` DML trigger, we can define the rules for how to handle
    changes to views. Some applications use tables only as low-level physical storage
    and only allow users to interact with views that create a high-level abstraction
    of the system.


    ## Compound DML Triggers


    `Compound` DML triggers can combine different timing points into a single trigger.
    Combining timing points lets us initialize variables in the `BEFORE STATEMENT`
    section, gather data in a `FOR EACH ROW` section, and then process the results
    in bulk in the `AFTER STATEMENT` section. Combining the trigger operations can
    significantly improve performance and can be helpful if we’re auditing tables
    that often undergo large changes.


    Compound triggers can also help us avoid the dreaded mutating table error, `ORA-04091`.
    Mutating table errors happen when our trigger tries to modify the rows of the
    same table that fired the trigger. Row-level triggers firing triggers would lead
    to nondeterministic behavior that would depend on the order the rows were processed.
    One way to avoid that problem is to gather the relevant data in a `FOR EACH ROW`
    section and make the changes in an `AFTER STATEMENT` section, since the `AFTER
    STATEMENT` section does not cause mutating table errors.


    ## System Triggers


    `System` triggers can fire for DDL statements per schema or per system, or they
    can fire for database events. For example, we can create a system trigger to prevent
    specific commands from running against specific objects. We must be extremely
    careful when we create system triggers, or we can prevent Oracle from working.
    If possible, we should use schema triggers instead of database triggers, since
    schema triggers affect the smallest possible number of users.


    A popular use of system triggers is to create a logon trigger that sets session
    values, for formatting or optimization. But remember that our server code should
    never depend on the client format settings. If a procedure only runs with a specific
    `NLS_DATE_FORMAT`, that procedure is broken and needs to be fixed.


    Many developers use logon triggers to set the `NLS_DATE_FORMAT` to avoid implicit
    conversion bugs. I prefer the exact opposite: I like to set an intentionally silly
    `NLS_DATE_FORMAT`. Setting a weird value, and then running the unit tests, will
    ensure the program does not use any implicit date conversions. Notice that the
    following trigger is only set for my schema, not the whole system. And I’ve also
    hard-coded my schema name to ensure this trigger is not accidentally applied in
    the wrong environment:


    ```sql

    --Create logon trigger that sets a custom NLS_DATE_FORMAT.

    create or replace trigger jheller.custom_nls_date_format_trg

    after logon on jheller.schema

    begin

    execute immediate

    q''[alter session set nls_date_format = ''J'']'';

    end;

    /

    --Logout and logon again and run this to see the new format.

    select to_char(sysdate) julian_day from dual;

    JULIAN_DAY

    ```


    ## Imitating On-Commit Triggers


    Oracle does not have `on-commit` triggers, but we can imitate them with PL/SQL
    packages like `DBMS_ALERT` and `DBMS_JOB`. The package `DBMS_SCHEDULER` is almost
    always the best way to create jobs, but `DBMS_JOB` has one advantage: `DBMS_JOB`
    only submits the job when the transaction is committed. The following PL/SQL block
    shows how to make something happen after the transaction is committed:


    ```sql

    --Imitation on-commit trigger.

    declare

    v_job number;

    begin

    --Create a job, but it won''t take effect yet.

    dbms_job.submit

    (

    job  => v_job,

    what => ''insert into transaction_test values(1);''

    );

    --A rollback would ignore the job.

    --rollback;

    --Only a commit will truly create the job.

    commit;

    end;

    /

    ```


    Jobs run asynchronously and may not execute immediately. We may need to wait a
    while before we see the results of the preceding PL/SQL block.'
