- fmt: '## Oracle Text


    Oracle Text lets us build powerful search engine functionality in an Oracle database.
    Standard and custom PL/SQL functions are good enough for most text searching.
    Oracle Text is useful if we need a tool that *understands* language. Oracle Text
    features include fuzzy matching (matching different spellings of the same words),
    stopwords (minor words not worth indexing), case, thesauruses, different languages,
    and more.


    ### 索引类型


    Oracle Text works by creating special indexes on our data. There are three different
    index types, and each has a different purpose and syntax and different properties.


    - `CONTEXT` is for indexing large documents and uses the `CONTAINS` operator.

    - `CTXCAT` is for indexing text fragments combined with other columns and uses
    the `CATSEARCH` operator.

    - `CTXRULE` is used for document classification and uses the `MATCHRULE` operator.


    ### 使用示例


    For example, let’s search for GPS launches in the `LAUNCH` table. The `MISSION`
    column contains unstructured text, and dozens of the launches contain the string
    GPS. The following code is typical approach to look for GPS:


    ```

    --GPS launches using LIKE operator.

    select count(*) total

    from launch

    where lower(mission) like ''%gps%'';

    TOTAL


    ```


    The preceding query will always use a full table scan. Even a function-based index
    on the expression `LOWER(MISSION)` will not help. B-tree indexes sort data by
    the leading characters in the value. A B-tree index can help us find `''gps%''`,
    but a B-tree index cannot help us find `''%gps ''`.


    Text indexes work with words and can imitate a leading wildcard search. The following
    code creates a `CONTEXT` index on `LAUNCH.MISSION`:


    ```

    --Create CONTEXT index on MISSION.

    --(Text indexes need CREATE TABLE privileges on schema owner.)

    grant create table to space;

    create index launch_mission_text

    on launch(mission) indextype is ctxsys.context;

    ```


    Using Oracle Text indexes requires changing the predicates. Instead of using `LIKE`
    we need to use `CONTAINS`. `CONTAINS` returns a score for ranking relevancy. If
    we’re just looking for the existence of a word, we can filter with `> 0`.


    The following query uses the `CONTAINS` operator and returns the same number of
    rows as the `LIKE` operator. The execution plan shows the `CONTEXT` index being
    used by a `DOMAIN INDEX` operation:


    ```

    --GPS launches using CONTAINS operator.

    explain plan for

    select count(*) total

    from launch

    where contains(mission, ''gps'', 1) > 0;

    select * from table(dbms_xplan.display(format => ''basic''));

    Plan hash value: 4034124262


    | Id  | Operation        | Name                |


    |   0 | SELECT STATEMENT |                     |

    |   1 |  SORT AGGREGATE  |                     |

    |   2 |   DOMAIN INDEX   | LAUNCH_MISSION_TEXT |


    ```


    ### 索引同步


    One of the downsides to `CONTEXT` indexes is that they are not automatically updated
    after each transaction. We must manually synchronize the index like this:


    ```

    --Synchronize index after DML on the LAUNCH table.

    begin

    ctx_ddl.sync_index(idx_name =>

    sys_context(''userenv'', ''current_schema'')||

    ''.launch_mission_text'');

    end;

    /

    ```


    The preceding example only shows one simplistic use of Oracle Text. There are
    many hidden gems described in the 293-page *Text Application Developer’s Guide*.
    For example, Oracle Text has offered machine learning algorithms for classification
    long before the feature became a buzzword.


    ## Multilingual Engine


    Although SQL and PL/SQL are powerful enough to solve any problem, there are clearly
    times when other programming languages are helpful. Oracle 21c introduced the
    multilingual engine (MLE), which integrates JavaScript with SQL and PL/SQL.


    Java in the database was supposed to bring polyglot programming to Oracle, but
    it failed for several technical and sociological reasons explained in Chapter
    [15](#471418_2_En_15_Chapter.xhtml). Hopefully MLE can avoid some of those traps,
    and so far, the technology looks promising. But MLE currently only works on 21c,
    an innovation release, and only supports JavaScript, so it’s too soon to tell
    what impact it will have.


    ### 基本用法


    The simplest way to call JavaScript is to use `console.log` and view the results
    in the DBMS output:


    ```

    --Simple multilingual engine example.

    begin

    dbms_mle.eval

    (

    context_handle => dbms_mle.create_context(),

    language_id    => ''JAVASCRIPT'',

    source         => ''console.log("Hello World!");''

    );

    end;

    /

    Hello World!

    ```


    The preceding trivial example only shows one way to integrate PL/SQL and JavaScript.
    The `DBMS_MLE` package also lets us pass variables back and forth between PL/SQL
    and JavaScript. And an MLE SQL driver allows the server-side JavaScript to run
    and process SQL queries. It might seem foolish to use PL/SQL to run JavaScript
    to run SQL, when it’s easier to cut out the middleman and just use PL/SQL to run
    the SQL. But server-side JavaScript allows web developers using APEX to avoid
    PL/SQL and stick to the language they know best.


    ### 高精度计算示例


    As an example of how MLE could help a database developer, there have been a few
    times in the past when I’ve needed to use numbers with an arbitrary precision.
    Oracle’s `NUMBER` data type has more than enough precision for the physical values
    we typically store in a database, like the number of employees or the results
    of practical equations. But there’s no easy way in PL/SQL to perform the kind
    of arbitrary precision math necessary for cryptography; `NUMBER` doesn’t have
    enough precision, and there is no open source PL/SQL library as far as I know.


    The following code shows how Oracle numbers eventually lose their precision. After
    about 41 digits, the numbers start to round, and we see zeroes instead of the
    expected values:


    ```

    --Example of where Oracle''s precision starts to fail.

    select

    to_char(1234567890123456789012345678901234567890123, ''TM'') value

    from dual;

    VALUE


    ```


    While JavaScript is not commonly touted for its math skills, there are several
    ways we can use MLE to quickly enable higher precision. There are several open
    source arbitrary precision math libraries available for JavaScript, but as of
    version 21c, the process of loading JavaScript libraries is complicated. Alternatively,
    we can use the JavaScript BigInt type by placing the letter `n` at the end of
    the number, and then all of the digits are preserved:


    ```

    --Use BigInt for better precision.

    begin

    dbms_mle.eval

    (

    context_handle => dbms_mle.create_context(),

    language_id    => ''JAVASCRIPT'',

    source         => ''console.log(

    1234567890123456789012345678901234567890123n

    .toString());''

    );

    end;

    /


    ```


    We will inevitably run into integration issues because SQL and PL/SQL have to
    store the result as a string. But the alternative is to build our own math library,
    which is no easy task. SQL and PL/SQL will always be our main languages for Oracle
    data processing, but it’s great to have JavaScript as another option for some
    extreme cases. And MLE will likely improve in future versions. Based on the previous
    betas, the next version of MLE is likely to support Python as another language,
    and it is likely to include improved mechanisms for loading and managing libraries.'
