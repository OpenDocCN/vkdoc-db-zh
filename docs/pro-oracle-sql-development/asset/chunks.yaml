- fmt: '## Hard-to-Read Old Syntax


    The first problem with the old join syntax is that it separates the tables from
    their join conditions. The tables are thrown together in a comma-separated list
    and then tied together later. Separating tables from join conditions makes it
    harder to tell how the tables are connected. In theory, we can construct the list
    of tables in a meaningful order and then follow that same order when we write
    the join conditions. In practice, that orderly development process never happens,
    and we end up with a disorganized query that’s hard to read.


    When writing, we want to describe items in the order they are introduced. We should
    follow the same rule with our tables. We should list and join tables in the same
    order. The table order doesn’t matter to the compiler – the compiler can rearrange
    tables however it wants. (In ancient versions of Oracle, or in extremely rare
    cases, the order of tables can affect performance. But those exceptional cases
    should not dictate the way we write our code today.) Although the compiler doesn’t
    care about the order, *people* are the true audience. The old join syntax fails
    us because it promotes a bad style.


    There are `N!` ways to order any set of items. That means there is an impossibly
    large number of different ways to join a large list of tables. When we see a comma-separated
    list of tables, we have no idea what to expect for the rest of the query.


    Throwing a bunch of tables onto a screen and then drawing lines between them is
    a poor way to think about joining tables. Our minds have a hard time processing
    everything at once. The old syntax misleads us into creating SQL statements like
    the nightmarish Figure [6-1](#471418_2_En_6_Chapter.xhtml#Fig1). The Oracle programming
    world is full of ugly SQL statements, and they drag down the whole ecosystem.
    Those ugly SQL statements are why so many programmers hate Oracle SQL and why
    I’m spending so much time trying to convince you to change your SQL syntax.


    ![](images/471418_2_En_6_Chapter/471418_2_En_6_Fig1_HTML.png)


    Figure 6-1: The wrong way to think about SQL joins


    ## Hard-to-Debug Old Syntax


    Debugging is difficult, and it’s especially difficult with the old join syntax.
    When we debug large SQL statements, we want to test one small piece at a time.
    If we don’t write our queries properly, there won’t be an easy way to isolate
    and run small pieces.


    This debugging problem doesn’t show up in most SQL tutorials and books. Good examples
    omit needless code and are small. Most SQL examples only need one or two tables.
    When there are only two tables, the join syntax doesn’t matter. Many SQL developers
    learn techniques and styles that work fine with small examples but do not scale
    to large queries.


    When our queries grow to three tables or more, the problems become apparent. After
    you’ve read this book, you should be willing to create SQL statements with much
    more than three tables.


    For example, let’s say we want to find the number of engines used per rocket launch.
    Rockets can have multiple stages, and each stage can have a different number of
    engines. To find this information, we need to join `LAUNCH`, `LAUNCH_VEHICLE_STAGE`,
    and `STAGE`. There’s an intentional mistake in the following join, next to the
    exclamation mark. The query joins the stage *number*, when it should use the stage
    *name*:


    ```

    select launch.launch_tag, stage.stage_name, stage.engine_count

    from launch, launch_vehicle_stage, stage

    where launch.lv_id = launch_vehicle_stage.lv_id

    and launch_vehicle_stage.stage_no /*!*/ = stage.stage_name

    order by 1,2,3;

    ```


    The preceding error is a simple mistake and easy to fix. If we’re having problems
    between `LAUNCH_VEHICLE_STAGE` and `STAGE`, we want to debug the statement without
    `LAUNCH` in the query. But to pull `LAUNCH` out of the preceding query, we have
    to rewrite most of it. There are only three lines, so rewriting is not a big deal
    in this example. But in the real world, when there are dozens of tables, troubleshooting
    a query like this is painful. (A more realistically sized query will be shown
    at the end of this chapter. For now, I want to keep things simple.)


    When we’re building programs, we need instant feedback so we can correct our mistakes
    as soon as possible. When we throw together a bunch of tables and join them later,
    we’re delaying the time until we find our mistakes. Then we may not notice the
    problem until there are dozens of tables and it’s harder to guess where the problem
    is. To make debugging easier, we need to use a more modular and iterative process.


    ## Accidental Cross Joins in Old Syntax


    The old-fashioned join syntax frequently leads to unintended cross joins, also
    known as Cartesian products. These cross joins cause wrong results and horrible
    performance. Cross joins might run fine in development but fail horribly in production,
    when the data is larger.


    Cross joins multiply the number of result rows by the number of rows in the unjoined
    table. A bad cross join can effectively stop the entire database from working.
    When Oracle generates a large number of rows, those rows must be stored on disk
    in a temporary tablespace. If that temporary tablespace is shared with another
    application, that application won’t have any space left to sort or hash data.
    Then the application queries will either immediately raise an exception or go
    into a suspended state and wait for more space. When DBAs see suspended session
    errors, they often immediately add more space. But adding a 32-gigabyte file won’t
    help when Oracle is trying to write an exabyte of junk data. Those extra temp
    files are why many databases end up with uselessly large temporary tablespaces.


    The old join syntax makes unintentional cross joins much more likely to happen.
    When we write a large list of tables, it’s easy to forget about one of them later.
    The query syntax is still valid, and the compiler won’t complain. It’s hard to
    catch these mistakes, especially with large queries. In the following example,
    if the relevant code wasn’t bold, would we have noticed that the `ENGINE` table
    is not joined to anything?


    ```

    select launch.launch_tag, stage.stage_name, stage.engine_count

    from launch, launch_vehicle_stage, stage, engine

    where launch.lv_id = launch_vehicle_stage.lv_id

    and launch_vehicle_stage.stage_no /*!*/ = stage.stage_name

    order by 1,2,3;

    ```


    There’s no way to ban cross joins, since the syntax is sometimes necessary. And
    we can’t catch all bad cross joins with testing, because cross joins can happen
    on production with ad hoc queries. Converting to the ANSI join syntax will almost
    completely eliminate accidental cross joins.^([^(11)](#fn11))


    In addition to under-joining data with accidental cross join, the old join syntax
    also makes it easier to over-join data. For example, if we left-join table `A`
    to table `B,` then we also want to left-join table `B` to table `C`. A common
    mistake is to use a left join between `A` and `B` and an inner join between `B`
    and `C`. That mistake effectively turns the outer join into an inner join. With
    the `(+)` operator, and disorganized join conditions, that mistake is easy to
    make in the old join syntax.'
