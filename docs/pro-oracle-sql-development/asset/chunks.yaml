  trans: '### 列的顺序至关重要


    在关系模型中，列和行的物理顺序并不重要。物理数据独立性相比那些顺序至关重要的系统是一个巨大的改进。数据独立性不仅是一个历史性问题；如果我们错误地将复杂、格式化的数据存储在一个单一值中，这个问题仍然会出现。


    E. F. Codd 的论文并不意味着 `逻辑` 列顺序不重要。他论文中的示例具有有意义的顺序，有助于读者理解列之间的关系。将相似的列分组，并在不同的表中以相同的顺序列出，这使他的示例更易于阅读。有意义的列顺序也能让我们的模式更易理解。


    我们的系统可能有用户指南、精美的实体关系图（ER 图）和其他形式的文档。但我们模式的主要接口是简单的 `SELECT` 语句。其他 SQL 开发人员是通过
    `SELECT * FROM SOME_TABLE` 的输出来查看和理解我们的表，而不是通过过时的 PDF 文件。


    我们不应该只是把新列扔到表的末尾。如果合理的话，我们应该花时间重新排列列的位置。更改列顺序是一个简单的操作，只需要将列临时设置为 `INVISIBLE`，然后再设置回
    `VISIBLE`。那几分钟只花一次；糟糕的表设计会困扰我们好几年。


    ### 反规范化


    理想情况下，我们的关系数据库是完全规范化的，不包含非原子值，也不包含冗余值。坚持一个严格的“不允许非原子值”的规则是合理的，并禁止任何人存储逗号分隔的列表。然而，坚持防止冗余值并不总是现实的。并非每个系统都应该处于第三范式。


    有时，为了提高读取性能，需要多次写入数据。这可能意味着在某个地方添加列的第二个版本，并通过触发器同步它们，或者可能创建一个物化视图，例如获取预连接表的某个时间点的快照。这是在存储、速度和一致性之间复杂的权衡。


    在许多系统中，必须做出这种权衡，而这些权衡并不会破坏关系模型。E. F. Codd 的论文讨论了反规范化的问题，但他的论文也承认无论如何反规范化都会发生。


    ### 所有行都是唯一的


    关系模型建立在集合之上，而集合不能有重复的元素。这意味着所有行，以及所有查询结果，都应该是唯一的。


    有一个强制所有 `SQL` 查询结果唯一性的系统可能是有帮助的。拥有真正重复的值几乎没有意义——应该总是有一种唯一的方式来标识一个值。我们都曾因为担心而给查询加上额外的
    `DISTINCT` 操作符。


    但强制执行这条规则并不实际。检测重复值的方法有限，每种方法要么需要大量存储空间，要么需要额外的处理时间，或者两者兼需。对大型数据集进行排序和哈希处理非常痛苦，以至于我们宁愿接受存在重复的可能性，也不愿总是检查结果。


    ## `SQL` 编程语言


    仅有一个关系 `模型` 是不够的；我们还需要一种专门的编程语言来与数据交互。人们曾多次尝试创建这样的语言，而 `SQL` 是最终的赢家。


    ### 历史与术语


    1970 年，E. F. Codd 的论文讨论了对数据语言的需求——一种由组合 `关系运算符` 形成的 `关系代数`——最好是一种能处理简单关系的简单语言。


    与关系模型一样，了解这些关系运算的官方名称至少可以帮助我们理解别人在谈论什么。`投影` 是只选择某些列。`连接`，当然是将关系组合在一起。`限制` 或 `选择`
    通过应用 `谓词` 来限制关系的元组。（这意味着结果由返回真或假的函数过滤。）一个 `笛卡尔积` （`CROSS JOIN`）产生的结果集包含来自两个集合的所有可能的元素组合。`集合并集`
    （`UNION ALL`）合并一个集合的所有元素，而 `集合差集` （`MINUS`）返回集合之间的差集。


    在 20 世纪 60 年代，IBM 创建了结构化英语查询语言，即 `SEQUEL`。但不要用历史来争论如何正确发音 "`SQL`"。只需接受一个事实：在像
    PostgreSQL 和 MySQL 这样的数据库中，它通常被发音为 "S-Q-L"；而在像 SQL Server 和 Oracle 这样的数据库中，它通常被发音为
    "SEQUEL"。


    `SQL` 与 `COBOL` 有些相似，因为它们都有类似英语的语法，并且最初都是为业务用户设计的。当 `PL/SQL` 被添加进来时，它延续了类似英语语法的趋势，例如，使用
    `BEGIN` 和 `END` 而不是花括号。Oracle 另一个类似自然语言的特性是列表从 1 开始，而不是 0。如果我们发现自己创建了一个看起来像《黑客帝国》屏幕上的程序，那我们就已经严重偏离了初衷。


    `SQL` 经常出现在编程语言流行度排行榜的顶端附近。^(⁷) 而这些网站可能仍然低估了该语言的真实受欢迎程度，因为许多非程序员使用 `SQL` 但不参与开发者调查。`PL/SQL`
    不是一线语言，但它出人意料地接近一线。^(⁸)'
- fmt: "### SQL Alternatives\n\nThe world is full of query languages. There’s XQuery\
    \ for dealing with XML, Cypher for querying graph databases, REST APIs for querying\
    \ data over the Internet, and many more. But when it comes to querying relational\
    \ data, SQL is by far the best choice.\n\nFor querying relational data, the SQL\
    \ alternatives are only of academic or historical interest. Languages like QUEL,\
    \ Rel, and Datalog may be interesting, but not practical. Technology is not always\
    \ a popularity contest, but SQL is so dominant that it would be ridiculous to\
    \ not use it for relational queries. Even if another language was better, it wouldn’t\
    \ have the huge number of programs built to use it or the huge number of people\
    \ familiar with it.\n\nIs SQL a safe bet for the future? It’s foolish to predict\
    \ that a better technology won’t be invented, but it’s reasonable to predict that\
    \ a significantly better technology will not replace it in the near future.\n\n\
    Some languages grow old and fade away, but some languages are timeless. C and\
    \ Lisp are older than SQL, but they’re not going away anytime soon. Writing about\
    \ technology over 30 years ago, Fred Brooks warned us to not expect any “silver\
    \ bullets” for software development. That is, don’t expect a single new technology\
    \ to provide order-of-magnitude improvements. SQL is a high-level language that’s\
    \ always evolving, and it’s possible the language is as good as we’ll ever get\
    \ for querying relational data.\n\nSome people hold out hope that a visual programming\
    \ language will someday make database queries easier. Unfortunately, that is not\
    \ likely to happen, for several reasons.\n\nVisual query builders are as old as\
    \ SQL itself, starting with Query by Example (QBE) in the 1970s. The idea has\
    \ been implemented many times, but it’s rarely used for non-trivial queries. Programming\
    \ in pictures looks cool, but it’s easy to forget how great text is. Text can\
    \ be easily shared, modified, and version controlled. In programming, a picture\
    \ is not worth a thousand words: it’s only worth 50.\n\n> The problem with visual\
    \ programming is that you can’t have more than 50 visual primitives on the screen\
    \ at the same time.\n> \n> —L. Peter Deutsch\n\nThe exact number of visual primitives\
    \ is debatable, but the information density of visual programming languages is\
    \ definitely lower than text.\n\nWhen I interned at National Instruments, I was\
    \ able to work at the company that created LabVIEW, which is arguably the best\
    \ visual programming language. The language is fun to use and well suited to test\
    \ and measurement tasks. But even the employees of that company would readily\
    \ admit that visual programming is not a panacea.\n\nAs an example of visual programming,\
    \ Figure 1-1 shows a simple query against the space schema that was briefly explained\
    \ in the “Introduction.”\n\n![](images/471418_2_En_1_Chapter/471418_2_En_1_Fig1_HTML.jpg)\n\
    \nThe snippet includes satellite and launch task options, and a table with four\
    \ columns and seven rows.\n\nFigure 1-1\nA visual query in LibreOffice Base\n\n\
    The preceding query finds all satellites that were launched on October 4, 1957.\
    \ At a first glance, the image looks fine. But visual queries only look nice for\
    \ simple examples. Visual query builders do not scale, and the connection lines\
    \ between tables will quickly look like spaghetti. The following is the same query\
    \ using Oracle SQL:\n\n```sql\nselect\n    satellite.norad_id,\n    satellite.launch_id,\n\
    \    launch.launch_date\nfrom satellite\njoin launch\n    on satellite.launch_id\
    \ = launch.launch_id\nwhere trunc(launch.launch_date) = date '1957-10-04'\norder\
    \ by satellite.norad_id;\n```\n\nAlthough text is superior to images, Chapter\
    \ 2 will explain why we still need to program with an integrated development environment\
    \ (IDE).\n\n### Is SQL a Programming Language?\n\nYes.\n\nSome programmers don’t\
    \ consider SQL to be a “real” programming language, and that mistake leads to\
    \ a self-fulfilling prophecy. If SQL isn’t treated like a real programming language,\
    \ the code will look terrible, and developers will avoid SQL, which makes them\
    \ think it’s not a real programming language.\n\nThere’s no theoretical or practical\
    \ reason to think that SQL is not a “real” programming language. Defining exactly\
    \ what a programming language is, and what it can do, is theoretically important.\
    \ But too often those tests are only applied to a strawman version of Oracle SQL.\n\
    \nSQL is not Turing complete, which means it cannot theoretically solve every\
    \ problem that is solvable by a Turing machine. A Turing machine is a simple abstract\
    \ machine that can run forever. SQL doesn’t have an infinite loop and therefore\
    \ cannot run forever, so technically it’s not Turing complete. But nobody has\
    \ ever complained that their query didn’t take forever to run, so it’s a pointless\
    \ theoretical argument.\n\nAnd Oracle SQL has many extensions that can make SQL\
    \ act like a procedural language. With recursive common table expressions (discussed\
    \ in Chapter 7) and the model clause (Chapter 19), Oracle SQL can run imperative\
    \ code. Oracle SQL and PL/SQL have been slowly merging for many years, and PL/SQL\
    \ is a traditional, imperative programming language.\n\nThere is no theoretical\
    \ or practical limit to what we can accomplish with Oracle SQL.\n\n## Different\
    \ Database Types\n\nThis book is focused on Oracle SQL. For some people, that\
    \ focus is too narrow; they may use a different relational database or a non-relational\
    \ database. For some people, that focus is too wide; they may only use an Oracle\
    \ database in a specific context. This section gives a brief overview of the entire\
    \ database landscape and drills down into specific Oracle database environments."
