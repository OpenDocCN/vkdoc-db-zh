  trans: '

    ### 其他


    许多操作是直白的，并未给我们提供任何可执行的信息。例如，`SEQUENCE` 操作是不言自明的。但这并不意味着我们可以忽略这些操作；如果某个 `SEQUENCE`
    操作很慢，那么我们就应该检查序列设置，比如缓存大小。


    有些操作会重复执行多次，使得监控 SQL 语句的进度变得困难。例如，`NESTED LOOPS` 连接可能会多次调用子操作。重复也可能发生在像 `CONNECT
    BY` 和 `RECURSIVE WITH PUMP` 这样的操作上。如果我们不知道一个操作会重复多少次，那么 `V$SESSION_LONGOPS` 提供的进度估算就毫无意义。


    `REMOTE` 操作也值得特别关注。在同一个数据库上连接数据已经够难了；通过数据库链拉取信息功能强大但可能很慢。


    操作可以帮助解释我们的查询在执行前是如何被转换成不同查询的。`VIEW` 操作只是操作的逻辑分组，可能是一个内联视图或一个模式对象视图。`VIEW PUSHED
    PREDICATE` 操作告诉我们，主查询中的一个谓词被推送到了其中一个子查询中。谓词下推通常是好事，但我们希望知道查询何时被重写，以防我们需要停止这种转换。


    单个操作可以代表调用另一种编程语言，这可能代表几乎无限的工作量。`XMLTABLE EVALUATION`、`XPATH EVALUATION`、`JSONTABLE
    EVALUATION` 和 `MODEL` 代表嵌入在 SQL 中的语言。最常见的非 SQL 操作是 `COLLECTION ITERATOR`，它表示由
    PL/SQL 表函数生成的行。我们应该对涉及非 SQL 语言的执行计划持怀疑态度。优化器在为声明性代码估算时间和构建执行计划方面做得很好。但优化器几乎完全无法了解过程式代码将如何工作，它只能进行大胆的猜测。


    `TEMP TABLE TRANSFORMATION` 发生在通用表表达式被转换为临时表时。如果该通用表表达式被调用多次，那么对于 Oracle 来说，将结果存储在临时表中可能比重跑查询更划算。


    ## 基数与优化器统计信息（构建执行计划 I）


    基数与优化器统计信息是理解 Oracle 如何决定在执行计划中使用哪些操作的关键。基数指的是项目的数量，例如行数或不同值的数量。优化器统计信息是 Oracle
    用来估算基数的依据。


    构建执行计划最困难的部分是决定何时一组算法和数据结构会优于另一组。正如第 16 章直观展示的，最快的算法往往取决于 X 轴的“输入大小”。在 Oracle
    中，这个输入大小就是基数。要知道哪些操作最快，唯一的方法就是准确估算基数。


    本节旨在说服您关注执行计划的基数以及良好优化器统计信息的重要性。下一章将讨论如何收集这些统计信息以修复错误的基数估算。


    ### 基数至关重要


    `cardinality` 这个词在 Oracle 中有两个略有不同的含义。基数可以指返回的行数。基数也可以指返回的*不同*行数。像主键这样的高基数列有许多不同的值，而像状态码这样的低基数列只有很少的不同值。


    以下是两个简单示例，展示了两种截然不同计划的基数。首先，让我们找出在白沙导弹靶场进行的所有发射，这是新墨西哥州一个重要的军事测试区域。（为简洁起见，示例使用了硬编码的
    `SITE_ID`。）白沙是一个受欢迎的发射场，有 6590 次发射。从以下执行计划中的 “Rows” 列可以看出，优化器估算白沙有 6924 次发射。（估算的基数在你的机器上可能不同。）这个估算并不完美，但足以让
    Oracle 理解该查询返回了 `LAUNCH` 表中很大比例的行。因此，Oracle 构建了一个包含全表扫描的执行计划：


    ```

    --全表扫描示例。

    explain plan for select * from launch where site_id = 1895;

    select * from table(dbms_xplan.display(format => ''basic +rows''));


    |Id|Operation         |Name  |Rows |


    | 0|SELECT STATEMENT  |      | 6924|

    | 1| TABLE ACCESS FULL|LAUNCH| 6924|


    ```


    让我们改变查询，统计约翰斯顿岛一个偏远发射台的发射次数。该地点曾用于“鱼缸行动”，可以概括为“让我们在太空中引爆一颗热核武器，看看会发生什么”。不出所料，军方只使用过那个发射场一次。Oracle
    估算该条件将返回 14 行，这个比例足够小，足以使用索引范围扫描：


    ```

    --索引范围扫描示例。

    explain plan for select * from launch where site_id = 780;

    select * from table(dbms_xplan.display(format => ''basic +rows''));


    |Id|Operation                           |Name       |Rows |


    | 0|SELECT STATEMENT                    |           |   14|

    | 1| TABLE ACCESS BY INDEX ROWID BATCHED|LAUNCH     |   14|

    | 2|  INDEX RANGE SCAN                  |LAUNCH_IDX2|   14|


    ```


    在没有任何干预的情况下，Oracle 能正确知道何时使用全表扫描，何时使用索引范围扫描。大多数情况下，一切都很顺利，但我们不能把这种魔力视为理所当然。我们需要确切了解正在发生的事情，以便在系统崩溃时进行修复。正如您能想象的，真实的执行计划可能比这复杂得多。


    Oracle 需要理解列和表达式的基数（唯一性）来估算每个操作的最终基数（返回的行数）。估算单个等值条件已经够棘手了，但我们的 SQL 语句还有范围、复合表达式等等。


    幸运的是，当我们关注基数时，有很多事情我们不需要担心。我们不需要担心执行函数或表达式所需的时间。如果我们正在进行科学编程，我们可能会寻找小的循环，并尝试找出像
    `SUBSTR` 和 `REGEXP_SUBSTR` 这样的函数之间的微小性能差异。在数据库编程中，与读取数据所需的时间相比，CPU 中处理数据的时间几乎总是无关紧要的。我们需要担心用于读取和处理数据的算法，而不是小函数调用的速度。（但是，也有例外；如果我们调用一个自定义的
    PL/SQL 函数十亿次，那么我们就需要担心上下文切换和函数的性能。）


    比较估算基数与实际基数是判断一个计划好坏的最佳方法。（查找实际基数的简单技巧将在下一章讨论。）如果所有相关对象（如索引）都可用，并且估算准确，那么这个计划很有可能是最优的。SQL
    调优的一部分工作是找出基数估算错误的时间和原因。另一部分工作是思考更好的操作以及如何使它们可用。为优化器创建更好的路径需要理解可用的操作，并理解所有使这些操作成为可能的
    Oracle 特性和数据结构。例如，如果我们的查询有一个缓慢的嵌套循环操作，我们可能需要将一个条件重写为等值条件，以启用哈希连接操作。

    '
- fmt: '### Cardinality Differences


    It’s important to understand when cardinality differences matter. In the preceding
    examples, both estimates were wrong but were still good enough.


    It can be useful to think of cardinality estimates as only returning two possible
    values: big or small. To check if Oracle chose the right value, the `percent`
    difference is more important than the `absolute` difference. In the first example,
    the cardinality estimate was wrong by an absolute difference of 334 rows (6924
    estimate – 6590 actual). But 334 out of 6590 isn’t so bad. In the second example,
    the cardinality estimate was wrong by an absolute difference of 13 rows (14 estimate
    – 1 actual).


    The second example was off by an order of magnitude, but the optimizer still made
    a good decision. We need to adjust our expectations for the optimizer estimates.
    There’s no precise definition of how “wrong” the result can be before it matters.
    But as a rule of thumb, don’t worry about the estimates until they’re off by more
    than an order of magnitude.


    Think about the graphs in Chapter 16, which compared different algorithm run-time
    complexities like `O(N)` vs. `O(M*LOG(N))`. There is a large difference between
    the graphs at the extremes, but there’s also a large area in the middle where
    the performance is about the same. Database algorithms are not highly sensitive
    – a small difference in cardinality won’t generally cause huge problems.


    But don’t think this large range of acceptable values means cardinality estimates
    are easy. Cardinality mistakes are multiplicative, not additive. If one estimate
    is off by 10x and another estimate is also off by 10x, they can combine to off
    by 100x. Luckily, to fix this problem, we may only need to fix one of the bad
    estimates. Oracle can make good decisions as long as the estimates are in the
    right ballpark.


    ### Cost Doesn’t Matter


    The optimizer is officially called the cost-based optimizer. Oracle generates
    an internal number, a cost, for each operation. I removed the cost from most of
    the execution plans displayed in this book because the cost is usually worthless
    for tuning.


    The cost is certainly helpful internally to Oracle. And we can use the cost to
    quickly compare the resource consumption an execution plan will use. But the cost
    is just an `estimate`. And the cost doesn’t always meaningfully add up in execution
    plans. It’s pointless for us to look at an execution plan’s cost and arbitrarily
    say, “Oh, that number is too much.”


    It’s more meaningful to measure SQL statements by the time they take to run. The
    time estimate column is more useful than the cost, even though the time estimate
    is often wildly inaccurate. The next chapter shows how to measure `actual` time,
    instead of merely estimating time. With the actual time, we can tell which statements
    and operations are truly the most expensive, and we won’t have to guess.


    ### Optimizer Statistics


    Optimizer statistics are the key to generating good cardinality estimates. In
    theory, due to the halting problem, it is impossible to always accurately predict
    run times. In practice, with the right statistics, the optimizer can almost always
    generate useful predictions. The following list includes all the different types
    of optimizer statistics, roughly ordered by importance:


    1.  `Table`: Number of rows and the size of the table in bytes and blocks. Cardinality
    is still the most important metric, but the size of the table in bytes is useful
    for estimating the time to read the data, especially in a data warehouse.

    2.  `Column`: Number of distinct values, nulls, high and low values, and column
    usage information. Column usage is important because the optimizer won’t gather
    histograms on a column that’s never meaningfully used in a query.

    3.  `Histogram`: Detailed information about the most popular values of each column.
    Histograms were helpful in our previous `LAUNCH` example because most `SITE_ID`s
    only have a few rows, but a few `SITE_ID`s have many rows.

    4.  `Index`: Number of B-tree levels, rows, distinct values, and clustering factor
    (which can be used to tell us how efficient an index is).

    5.  `Partition`: Table, column, histogram, and index statistics are also generated
    for each partition.

    6.  `Extended statistics`: Selectivity of expressions or combinations of columns.

    7.  `Temporary tables`: Similar to regular tables, but stats can be generated
    for global temporary, private, or materialized common table expressions. Global
    temporary table statistics can be per session or global. Getting these statistics
    right can be tough since the data changes so frequently.

    8.  `System`: I/O and CPU performance. This information can help produce more
    meaningful time estimates. And knowing the difference between single-block read
    time and multi-block read time can help more accurately estimate differences between
    index range scans and full table scans. Useful information in theory, but rarely
    used in practice.

    9.  `SQL plan directive`: Automatically record statistics about cardinality mistakes
    for expressions and joins and adjust estimates the next time. Disabled by default.

    10. `SQL profile`: Contains information to modify estimates for a specific SQL
    statement. SQL profiles contain hints that can improve estimates or force plan
    changes.

    11. `User defined`: Procedural code can have custom statistics information using
    `ASSOCIATE STATISTICS` or Oracle data cartridge interface.

    12. `Inline view`: Through hints like `CARDINALITY`, we can create fake estimates
    for inline views.


    As we should expect, almost all of the preceding information can be found in the
    data dictionary. Optimizer statistics are usually stored along with the main metadata
    tables, such as `DBA_TABLES`, `DBA_TAB_COLUMNS`, `DBA_INDEXES`, etc.'
