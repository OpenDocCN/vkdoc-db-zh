    SQL when there are better alternatives.'
  trans: '

    ## 避免依赖代码格式化工具


    我们不应依赖自动化的代码格式化工具、美化器或漂亮打印工具。虽然我欣赏自动化那种毫无灵魂的效率，但我们仍需保持手工打造代码的能力。自动代码格式化工具对大多数编程语言都表现良好，但对
    Oracle SQL 却始终难以稳定胜任。


    代码格式化工具处理 Oracle SQL 时遇到困难，是因为这门语言过于复杂。大多数编程语言通过库来增加功能，而 SQL 则倾向于通过新增语法来增加功能。庞大的语法体系使得自动格式化代码变得困难。


    一个能解决 99%情况的代码格式化工具是不够的。当我们的 SQL 语句变得庞大并使用高级特性时——而这恰恰是最需要代码格式化的时刻——SQL 代码格式化工具最有可能失败。


    我们并非总能使用集成开发环境。如果我们在服务器上进行管理工作或帮助同事，可能就无法使用我们喜爱的 IDE。而当我们为了动态 SQL 在字符串中构建 SQL
    时，没有任何代码格式化工具能帮助我们。代码格式化工具要么无法识别字符串中的 SQL，要么该字符串在运行时（当我们拥有了所有变量时）之前都是无效的 SQL。正如第
    14 章所讨论的，即使是生成的动态 SQL 也应该看起来美观。


    SQL 代码格式化工具还侧重于小型、简单的代码。如前一节所示，SQL 代码格式化工具专注于显而易见的关键字，而非正确地为重要的内联视图添加间距和对齐。


    有时我们确实关心精确的间距，但只有*我们自己*才能决定如何设置这些间距。大型 SQL 语句经常需要重复冗长的列列表。我们可能有很多不关心的列，同时有一个重要的列想要突出显示。将那个重要的列或表达式单独放在一行，有助于向读者强调其重要性。


    例如，我们可能需要投影 26 列，但只有一列在表达式中被修改。我们不想为每一列浪费 26 个空行，但也不希望把所有列挤在一行而错过了重要部分。以下代码为重要的表达式使用单独一行，而将其他所有内容压缩在一个简单的列表中。如果我们想利用空间来强调重要内容，就必须手动设置间距：


    ```

    --用空格来突出重点。

    select

    a,b,c,d,e,f,g,h,i,j,k,l,m,

    n+1 n,

    o,p,q,r,s,t,u,v,w,x,y,z

    from some_table;

    ```


    我们应该禁用 IDE 中在编译时自动格式化代码的选项。即使我们有编码标准，也可能有人出于充分的理由而打破该标准。幸运的是，一些 IDE 允许我们为特定的代码块禁用自动代码格式化。


    SQL 开发者将面临许多需要手工构建代码的情况。我们必须能够快速编写代码，而不依赖于特定的代码格式化工具。


    ## 小写字母


    SQL 应该像所有现代编程语言一样，主要用小写字母编写。小写代码看起来更好，也更易阅读。


    大写关键字与较老的编程语言相关联，例如汇编语言、Fortran 和 COBOL。SQL 是一门古老的语言，这有其优势，但让我们的代码显得过时也有负面含义。几十年前，使用大写有很好的技术原因，但这些原因如今已不再成立。


    当今的文化惯例是使用小写进行编程。而且小写，或混合大小写，显然是正常写作的典型选择。（有一种共识认为小写文字比大写文字更容易阅读。但为何小写更易读是有争议的，我不确定这些研究是否适用于编程语言中使用的等宽字体。）


    但大写字母当然仍有其用武之地。当将小型 SQL 语句嵌入其他语言时，使用大写有助于将 SQL 与其他语言区分开来。大写在撰写电子邮件或帖子时也很有用。大写还可以帮助突出我们
    PL/SQL 程序中的某些部分，例如全局常量。


    我们查看代码的大部分时间是在 IDE 中，这时语法高亮比使用大小写来识别关键字更重要。使用小写并没有巨大的优势，但如果它看起来更好、更易读、更容易输入，我们不妨放弃大写。


    ## 总结


    本书中最具争议的观点到此结束，我现在要从讲台上下来了。本书许多不同部分都包含了风格提示和技巧，并在“附录 A：SQL 风格指南速查表”中进行了快速总结。


    编写 SQL，特别是编写大型 SQL，可以从非传统的编程风格中受益。我们可以通过避免不必要的别名和不常见的缩写来降低代码的复杂性。我们的编程风格应帮助代码强调重点，这通常是内联视图之间的关系。使用左对齐的制表符可以帮助我们阅读和编写嵌套的内联视图。自动代码格式化工具最终会让我们失望，因此我们不如习惯于手动调整代码的风格。使用小写字母可以让我们的代码看起来更现代，也更易读。


    我希望您愿意至少重新考虑一些编写 SQL 时使用的传统“最佳实践”。无论我们偏爱哪种风格，理解我们偏爱该风格的原因都是有帮助的。在实践中，我们并非总能按自己想要的方式编写代码，我们必须愿意妥协。但拥有一个理想化的风格并努力编写优美的
    SQL 语句是有益的。


    脚注 1


    # 14. 更多地结合基础动态 SQL 使用 SQL


    动态 SQL 是一个强大的工具，帮助我们充分利用 Oracle SQL。通过动态 SQL，我们可以在运行时构建代码。在代码中编写代码具有挑战性，但也提供了许多机会。


    首先，我们需要理解何时*必须*使用动态 SQL，何时*想要*使用动态 SQL，以及何时*不想*使用动态 SQL。动态 SQL 的基本功能很简单，但我们必须小心以保持性能和安全。生成源代码是棘手的，我们需要使用特定的编程风格使动态代码易于管理。当我们熟练掌握动态
    SQL 后，可以将其应用于几种复杂场景，并显著提高程序的清晰度和性能。


    本章仅简要介绍动态 SQL。更高级、更强大的动态 SQL 解决方案将在第 20 章和第 21 章中描述。


    ## 何时使用动态 SQL


    动态 SQL 通常用于四种不同的场景：运行 DDL 命令、当对象或属性或结构直到运行时才知晓时、简化权限以及构建规则引擎。同样重要的是，当存在更好的替代方案时，不要使用动态
    SQL。

    '
- fmt: '### Run DDL


    The most common use of dynamic SQL is to run DDL commands, because PL/SQL does
    not natively support static DDL. The following example shows how DDL must be executed
    as a string and not hard-coded into PL/SQL:


    ```sql

    --Working PL/SQL block that compresses table with dynamic SQL.

    begin

    execute immediate ''alter table launch move compress online'';

    end;

    /

    --Broken PL/SQL block that compresses table using static SQL.

    --This block raises a PL/SQL compilation error.

    begin

    alter table launch move compress online;

    end;

    /

    ```


    Initially, it feels wrong that PL/SQL doesn’t natively support static DDL, especially
    since PL/SQL and SQL are so tightly integrated. In practice, that limitation isn’t
    a big deal, since executing dynamic SQL only requires a few extra keywords. We
    probably wouldn’t want to use static DDL in our PL/SQL anyway, since most DDL
    commands are destructive and require recompiling dependent PL/SQL code. If a procedure
    directly references an object and then alters that object, the procedure will
    have to recompile itself. Oracle is fine with constantly parsing SQL statements,
    but recompiling procedural code while that code is running is a bad idea.


    There are several dynamic SQL traps we must avoid. Although we must always use
    dynamic SQL for DDL, we should rarely use dynamic SQL for DML. We don’t want to
    use dynamic code when static code works just fine. Also, just because we can manage
    objects at run time does not mean we *should* manage objects at run time. In other
    databases it might be common to frequently drop and recreate tables to hold intermediate
    values, but that is not a best practice in Oracle. In Oracle, we should hold intermediate
    values either in inline views, PL/SQL collections, or global temporary tables
    that are only created once.


    ### Unknown Until Run Time


    The second most common use of dynamic SQL is when we don’t know the objects, properties,
    or structure of the SQL statement until run time. Dynamic SQL works with any string,
    so there’s no limit to how much we can change the statement. We can swap table
    names, add conditions, change columns, or completely rebuild the entire statement.


    #### Counting Rows Dynamically


    For example, let’s create a function to count the number of rows in any table.
    The table name is passed into the function and then concatenated into the SQL
    statement string. The query is executed, the result is stored in a variable, and
    then the variable is returned:


    ```sql

    --Use dynamic SQL to count the number of rows in a table.

    create or replace function get_count(p_table_name varchar2)

    return number authid current_user is

    v_count number;

    begin

    execute immediate

    ''select count(*) from ''||

    dbms_assert.sql_object_name(p_table_name)

    into v_count;

    return v_count;

    end;

    /

    select get_count(''LAUNCH'') row_count from dual;

    ROW_COUNT

    ```


    Notice how the preceding code calls the function `DBMS_ASSERT.SQL_OBJECT_NAME()`.
    This function ensures that the parameter is a simple string that matches an object
    name. If we try to call the function with a dangerous string like `get_count(''LAUNCH;
    DROP TABLE STUDENTS;'')`, the `DBMS_ASSERT` package raises the exception “ORA-44002:
    invalid object name.” The `DBMS_ASSERT` package contains several functions that
    can help us avoid SQL injection. We must always be careful to not let unauthorized
    users run arbitrary code.


    #### Dynamic WHERE Clauses


    Another popular use for dynamic SQL is when we don’t know the structure of the
    `WHERE` clause until run time. That scenario can happen when we’re building SQL
    statements based on values entered on forms. A static query using every element
    from a form may get littered with compound conditions like `COLUMN1 = P_VALUE1
    OR P_VALUE1 IS NULL`. The resulting query would be huge and more likely to have
    performance issues. That final query might be simpler and faster if it’s dynamically
    generated to only include relevant conditions.


    Even when we know the dependent objects at compile time, we may still want to
    avoid creating static dependencies. For example, database links create complicated
    dependencies, and changing underlying objects on one database can lead to errors
    like “ORA-04062: timestamp of function "OWNER.OBJECT" has been changed” in another
    database. Running code dynamically can help avoid weird compilation issues with
    remote databases.


    ### Simplify Privileges


    One of the lesser-known advantages of dynamic SQL is simplifying privileges. When
    compiling PL/SQL objects, the owner of the PL/SQL object must have direct access
    to all of the statically referenced objects, at compile time. Unfortunately, that
    access cannot be granted through a role. The privileges must be granted directly
    to the owner of the PL/SQL object.


    For example, imagine if we changed the preceding function and hard-coded a static
    reference to `DBA_TABLES`. Even if our user has the `DBA` role, the function will
    fail to compile with the error “ORA-00942: table or view does not exist.” That
    error occurs because the access was only granted through a *role* and not directly
    to the *user*.


    Our first instinct might be to solve the problem by granting direct access to
    the `DBA_TABLES` view. A direct grant would work, but we might regret it later
    when our privileges are a mess and auditors are asking why we have so many individual
    grants.


    A better workaround is to use dynamic SQL, which is the way the preceding function
    already works. The clause `AUTHID CURRENT_USER` tells Oracle that when the function
    runs, the function can use the roles of the user invoking the function. As long
    as we have a role that grants us access to the DBA views, we can call the function
    like this:


    ```sql

    --Use dynamic SQL to access DBA views.

    select get_count(''DBA_TABLES'') row_count from dual;

    ROW_COUNT

    ```


    This discussion is veering off into complicated PL/SQL topics like definer’s rights
    vs. invoker’s rights. The important part to remember is that even though dynamic
    SQL may require a few more keywords, dynamic SQL can simplify our privilege requirements.
    In most organizations it’s easier to add a few lines of code than to get elevated
    privileges.


    ### Rule Engines


    Dynamic SQL can be used to build powerful rule engines. Rule engines can be helpful
    for tasks like scoring claims based on a large set of criteria. Many medical and
    insurance systems have hundreds of rules, many of which contain simple and repetitive
    logic, such as `IF A AND B THEN 0`, `IF B OR C THEN 1`, etc.


    SQL is a high-level language, with an English-like syntax. If we carefully set
    up the columns and expressions, our SQL statements can look surprisingly close
    to our requirements. Instead of hard-coding each rule as a query, we can store
    the rules in a table and then dynamically generate the SQL statements to implement
    the rules. Ideally, the rules in that table can be validated or created by a business
    analyst, without any programming knowledge.


    In practice, rule engines are difficult to get right. It’s not always easy to
    store dynamic code in a relational database. Source code, like any language, is
    inherently hierarchical. Oracle is certainly capable of storing and manipulating
    hierarchical data, but SQL is not the ideal language for solving difficult hierarchical
    problems. And while databases are certainly capable of containing simple text
    strings, versioning our code is still best done with version control software.


    Whether or not we want to build a rule engine is a difficult decision. If we do
    decide to build a rule engine in Oracle, then we should definitely use dynamic
    SQL as the cornerstone of our engine. Building a rule engine can quickly devolve
    into the quagmire of creating a custom programming language, so we want to stay
    as close to SQL and PL/SQL as possible.'
