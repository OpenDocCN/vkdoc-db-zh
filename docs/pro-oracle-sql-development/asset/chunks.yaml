- fmt: '## Nonstandard but Still Useful


    The old join syntax was created before joins were fully standardized in SQL-92.
    In the early days, every database had to create its own join style. All relational
    databases can use the list-of-tables style for inner joins, but there are many
    ways to represent outer joins. In Oracle, the outer join is marked by adding the
    `(+)` operator to the side of the join that is optional.


    To most advocates of the ANSI join syntax, following the standard is the biggest
    argument in its favor. And it’s true that queries with the `(+)` operator will
    not work on other databases. But the lack of standardization and portability is
    not really that important. In practice, if we’re taking advantage of useful Oracle
    features, our queries will not be portable anyway. Choosing the ANSI join syntax
    is mostly a style choice (although there are rare cases where the old syntax simply
    does not work, such as full outer joins).


    However, there are times when the old join syntax is required. We still need to
    be familiar with the `(+)` operator and be able to translate between the two syntaxes.
    There are rare performance problems and syntax bugs that can be solved by switching
    to the old syntax. And bitmap join indexes and fast refresh materialized views
    require the old syntax. But those exceptions shouldn’t dictate our style.


    ## Too Much Context


    The wrong SQL features create too much context and too many dependencies within
    our SQL statements. We want to create our SQL from small, independent blocks of
    code and connect those blocks as simply as possible. We should avoid features
    that increase the context, like correlated subqueries and common table expressions.


    ### The Importance of Reducing Context


    Context is king. We cannot understand code in isolation. We need to see the big
    picture and all the metadata. Code is more easily understood when we know who
    wrote the code, why they wrote the code, and the code before and after the block
    of code we’re looking at. Context gives us a deeper understanding of whatever
    we’re reading.


    But programming context is different. In programming, context refers to the background
    state of our programs. That information can be helpful, but it’s more likely to
    cause problems when unexpected side effects change things in the background. Code
    is not literature with multiple valid interpretations. Our code should be brutally
    plain with as little background information as possible. When programming, the
    context is more likely to play tricks on us than to help us.


    When we have a problem with a SQL statement in a program, we want to copy that
    statement into our IDE and run it independently. Then we’ll want to run small
    pieces of the query to look for the bug. But context gets in the way. The SQL
    statement might depend on our session’s uncommitted data, bind variables based
    on local and global variables, objects, operating system files for external tables,
    etc.


    Good programming practices, such as avoiding global variables, can reduce the
    context. It’s inevitable that queries have at least some context, but we can still
    minimize it. We especially want to minimize the context within our queries. Intra-query
    dependencies must be kept to a minimum. In practice, reducing context means avoiding
    correlated subqueries and common table expressions.


    ### Avoid Correlated Subqueries


    Correlated subqueries are subqueries found in the `SELECT` and `WHERE` clauses
    that reference another part of the query. Correlated subqueries are not always
    evil, but they will ruin our queries if we consistently overuse use them as a
    replacement for joins. For example, let’s rewrite the query for finding the number
    of engines used per launch. Instead of joining to the `STAGE` table directly,
    let’s create a correlated subquery:


    ```

    select launch.launch_tag, launch_vehicle_stage.stage_name,

    (

    select stage.engine_count

    from stage

    where stage.stage_name = launch_vehicle_stage.stage_name

    ) engine_count

    from launch

    join launch_vehicle_stage

    on launch.lv_id = launch_vehicle_stage.lv_id

    order by 1,2;

    ```


    The correlated subquery in the preceding example increases the complexity of the
    statement. At first glance, the subquery appears to isolate `STAGE` from the rest
    of the query. But the correlated subquery doesn’t create an independent block
    of code because of the link between the two `STAGE_NAME` columns. Information
    is now passing in two directions, and we can’t simply highlight and run the subquery
    to understand it. The new query still effectively joins the tables, but the join
    is performed indirectly and requires slightly more code.


    This example doesn’t suffer greatly from the correlated subquery, because this
    example is simple enough to keep in our head. But in a larger query, correlated
    subqueries make it impossible to understand the query in small pieces. The preceding
    example used a correlated subquery in the `SELECT` clause, but the problem is
    just as bad in the `WHERE` clause.


    ### Avoid Common Table Expressions


    Common table expressions are a useful feature, but they are frequently overused
    and needlessly increase the context of a query. Common table expressions are also
    known as the `WITH` clause or subquery factoring. For example, the following query
    returns recent deep space missions:


    ```

    with launches as

    (

    select *

    from launch

    where launch_category = ''deep space''

    and launch_date >= date ''2000-01-01''

    )

    select *

    from launches

    join satellite

    on launches.launch_id = satellite.launch_id;

    ```


    There are small advantages to using a common table expression in the preceding
    query. Common table expressions flow from top to bottom, which is the more traditional
    direction of program flow. The common table expression separates the `LAUNCH`
    predicates and makes it easier to test just those two predicates. But the common
    table expression doesn’t truly create two separate pieces. We still cannot highlight
    the bottom half of the query and run it in our IDE. The entire query is still
    all tied together and must be understood as a single piece. The common table expression
    increased the amount of context.


    There are many times when correlated subqueries and common table expressions are
    useful. Sometimes correlated subqueries just seem to make sense, and they may
    improve performance with features like scalar subquery caching. If referenced
    more than once, a common table expression can reduce the amount of code and possibly
    improve performance by materializing the results. But if we want to create small,
    modular code, we need to use different techniques.


    ## Sets, Chunking, and Functional Programming to the Rescue


    Enough about the problems with traditional SQL syntax – let’s talk about the solutions.
    How do we write powerful SQL statements but make them readable? First, we need
    to think about SQL statements as nested sets, instead of the mess of linked tables
    we saw in Figure [6-1](#471418_2_En_6_Chapter.xhtml#Fig1). Chunking can help us
    manage those sets. And applying functional programming ideas can help us simplify
    our code.'
