- fmt: '### How to Build Automated Tests


    If you’re not already using automated unit tests, it’s easy to get started. There
    are many different frameworks available, and even writing your own simple testing
    program is fine. Don’t get overwhelmed by the choices – whatever program we choose,
    it’s better than doing nothing.


    `JUnit` is the most popular unit testing framework, although it is meant for `Java`.
    That program is a member of the `xUnit` family, and there are similar programs
    for almost every programming language. Unit testing isn’t as common in `Oracle`
    as it is in `Java`, but there are still several choices. The most popular option
    is currently `utPLSQL`.


    Installing and using `utPLSQL` is simple: download a free and open source program,
    unzip it, and run a single `SQL*Plus` script. The detailed steps can be found
    in the program repository at [`https://github.com/utPLSQL/utPLSQL`](https://github.com/utPLSQL/utPLSQL).


    This chapter only covers a small part of that program. The point is not to recreate
    a `utPLSQL` tutorial but to show you how simple it is to get started. Don’t be
    intimidated by all the options. The program can still reshape our entire development
    process even if we only use 5% of the features.


    `utPLSQL` requires us to add “annotations” to our code. Annotations configure
    the unit tests through formatted comments in package specifications. The test
    is performed by an “expectation,” a statement that compares the actual value with
    the expected value. Tests are executed by calling a pre-built package, and the
    output can be viewed in multiple formats.


    For example, let’s say we want to test the data in the space database. To start
    we might want to check the number of rows in the two main tables, `LAUNCH` and
    `SATELLITE`. First, we create a package specification to hold the annotations.
    The annotations define a single test suite, named “Space,” and two tests:


    ```

    create or replace package space_test as

    -- %suite(Space)

    -- %test(Check number of rows in launch)

    procedure test_launch_count;

    -- %test(Check number of rows in satellite)

    procedure test_satellite_count;

    end;

    /

    ```


    Next, we need to implement the specification and call the expectations. The following
    package body shows the two procedures. Each procedure counts the number of rows,
    saves the count into a variable, and compares that variable with the hard-coded
    expected number. There are 70,535 launches and 43,113 satellites. But to make
    the results interesting, let’s expect the wrong number for the satellite count:


    ```

    create or replace package body space_test as

    procedure test_launch_count is

    v_count number;

    begin

    select count(*) into v_count from space.launch;

    ut.expect(v_count).to_(equal(70535));

    end;

    procedure test_satellite_count is

    v_count number;

    begin

    select count(*) into v_count from space.satellite;

    ut.expect(v_count).to_(equal(9999));

    end;

    end;

    /

    ```


    Here’s one of several ways to run the unit tests:


    ```

    begin

    ut3.ut.run();

    end;

    /

    ```


    The following is the `DBMS_OUTPUT` of the run. The output contains the program
    name and the results of the two tests. One of the tests was successful and doesn’t
    show anything. But one of the expectations failed, and the output explains why
    it failed:


    ```

    Space

    Check number of rows in launch [.004 sec]

    Check number of rows in satellite [.005 sec] (FAILED - 1)

    Failures:

    1) test_satellite_count

    Actual: 43113 (number) was expected to equal: 9999 (number)

    at "JHELLER.SPACE_TEST.TEST_SATELLITE_COUNT", line 13 ut.expect(v_count).to_(equal(9999));

    Finished in .013 seconds

    2 tests, 1 failed, 0 errored, 0 disabled, 0 warning(s)

    ```


    That’s it. A fully functioning, automated test suite in less than an hour, in
    only a few lines of code. Automated testing can be that simple.


    There are many more features available. We can generate fancier reports, check
    the code coverage to ensure that all lines of code are tested, use automated testing
    in a continuous integration system, etc. But those features are not always necessary,
    so don’t let them intimidate you into not using unit testing.


    Now that we’ve started writing unit tests, where do we go from here? First, treat
    those test packages like regular code. Test packages can get ugly and full of
    repetitive boilerplate code and include complicated setups for each test. Don’t
    be surprised if the unit test code is larger than the rest of the code. To help
    manage unit tests, split the code into logical packages and files and give them
    good names and comments.


    The standard manual testing advice applies just as well to automated unit tests.
    Try to test every line of code and ideally every path. When there is a loop, create
    a test for the boundary conditions – off-by-one problems will happen at the beginning
    or end of the loop, not in the middle. Sometimes a test should focus on one small
    thing, so that when the test fails, we know exactly what to fix. Other times a
    test should cover lots of things, to ensure we catch as much as possible. Whatever
    our style, we must make failures obvious; a single failure should break the build
    and stop everything.


    ## Build Knowledge with Minimal, Complete, and Verifiable Examples


    Building informal test cases is difficult but important. Creating a test case
    that is minimal, complete, and verifiable requires time and discipline. We must
    ensure our test cases are easily shared with others, and we must watch out for
    the XY problem.


    ### Why Spend So Much Time Building Reproducible Test Cases?


    Developers need help and need to ask a lot of questions. Despite what we heard
    in kindergarten, there are lots of bad questions. The best way to ask a question
    about programming is to include a reproducible test case.


    The first advantage to building a test case is that we are likely to solve the
    problem ourselves. Restating the problem and imagining explaining it to someone
    else will help us see the problem from a different perspective.


    Occam’s razor says that the simplest answer is usually the right one. For `Oracle`
    `SQL` problems, the simplest answer is one of these: we forgot to commit, we made
    a typo, or we’re not really getting the error message we claim we got. It’s frustrating
    and common for people to respond to our questions with one of those simple answers,
    so we might as well answer their concerns ahead of time. Before people will invest
    their time solving our complex problem, we must demonstrate that we don’t have
    a simple problem.


    A good test case is also a great way to prove something to ourselves and help
    us avoid biases. When we’re heavily invested in making something work or making
    it fast, we may only see what we want to see. Building tests with reproducible,
    clear, and objective results makes it harder to deceive ourselves.


    Reproducible test cases are also necessary for dealing with potentially adversarial
    situations. Many people have an incentive to not believe us, and they think, “*Our*
    software is perfect – that failure or behavior isn’t possible.” Those responses
    can make us angry, but we shouldn’t take it personally. Unhelpful responses are
    often the result of biased people who subconsciously know they can go home early
    if our complaints are groundless. Or perhaps their management only cares about
    the number of tickets opened and closed; making a ticket go away counts just as
    much as solving a real problem. Sometimes we need to play stupid games to get
    the support we paid for.


    The easiest way for a support engineer to make a ticket go away is to ask for
    more information. If they ask for enough information, eventually we will give
    up and let them close the ticket. Creating a good test case will avoid many of
    those games.


    The phrase “minimal, complete, and verifiable examples” comes from Stack Overflow
    and has developed over time to help people post useful questions. You can read
    the full description at [`https://stackoverflow.com/help/mcve`](https://stackoverflow.com/help/mcve).
    The following sections explain the different components of that phrase in an `Oracle`
    context.'
