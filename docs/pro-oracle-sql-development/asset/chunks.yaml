    Visualizing joins with join diagrams and Venn diagrams, drilling down into INNER
    JOIN and showing values


    Spend some time looking at Figures [1-2](#471418_2_En_1_Chapter.xhtml#Fig2) and
    [1-3](#471418_2_En_1_Chapter.xhtml#Fig3) until the diagrams make sense. If my
    diagrams don’t work for you, search the Internet for “join diagram” until you
    find something that makes sense.


    #### Inner Join


    The most common type of join is an inner join. This first set of sample queries
    returns all launches and satellites where they share the same `LAUNCH_ID`. This
    does not return all launches, because many launches don’t have a payload. And
    it does not return all satellites, because of satellite debris with an unknown
    launch. Some rows from the `LAUNCH` table will be returned multiple times, because
    a single launch may have multiple satellites.


    There are three common ways to perform inner joins. First is using the explicit
    keywords `INNER JOIN`:


    ```

    select *

    from launch

    inner join satellite

    on launch.launch_id = satellite.launch_id;

    ```


    Inner join is the default, so the keyword `INNER` is not necessary:


    ```

    select *

    from launch

    join satellite

    on launch.launch_id = satellite.launch_id;

    ```


    The preceding queries use what is called the “ANSI join syntax,” after the join
    syntax introduced by the ANSI SQL standard. Alternatively, the query can be built
    with what is sometimes called the “Cartesian product” approach. These types of
    joins existed before the SQL standard was created. Tables are listed in a comma-separated
    list, and the joins are done in the `WHERE` clause. This approach is strongly
    discouraged, as discussed in Chapter [7](#471418_2_En_7_Chapter.xhtml):


    ```

    select *

    from launch, satellite

    where launch.launch_id = satellite.launch_id;

    ```'
  trans: '

    ### NULL


    NULL 很怪异。三值逻辑需要花点时间才能适应。甚至定义 NULL 都很棘手。当我看到 NULL 时，我会想到“值的缺失”，尽管这个描述在理论上并非 100%准确。重要的是你要有一个对自己管用的、快速的心理定义。


    SQL 中的 NULL 不同于其他语言中的 NULL。NULL 默认不等于 0、空字符串或特定日期。有时我们并不真正知道 NULL 的含义，有时我们甚至不知道它为何存在。这没关系。我们不应该期望完美地理解所有数据。


    NULL 不等于 NULL。NULL 也不`不等于`NULL。这起初有违直觉，但过段时间就会明白。


    例如，假设我们想比较发射远地点。远地点是离地球最远的距离，是快速分类火箭发射的好方法。发射高度超过 80 公里通常被认为是进入了“太空”。


    首先，让我们找出所有远地点未知的发射，然后再找出所有远地点已知的发射：


    ```

    SQL> select count(*) from launch where apogee = null;

    COUNT(*)


    SQL> select count(*) from launch where apogee <> null;

    COUNT(*)


    ```


    两个查询都不起作用，因为`= NULL`和`<> NULL`的比较永远不会返回任何结果。直接与 NULL 比较总是返回未知，然后被转换为假。


    查询 NULL 存在与否的正确方式是使用`IS NULL`和`IS NOT NULL`表达式：


    ```

    SQL> select count(*) from launch where apogee is null;

    COUNT(*)


    SQL> select count(*) from launch where apogee is not null;

    COUNT(*)


    ```


    还有一种 NULL 表达式经常让人困惑的方式：如果子查询可能返回 NULL，就永远不要使用`NOT IN`表达式。


    例如，让我们找出所有没有搭载卫星的发射。很多火箭发射没有有效载荷——它们只是在测试火箭本身：


    ```

    SQL> select count(*)

    2  from launch

    3  where launch.launch_id not in

    4  (

    5     select satellite.launch_id

    6     from satellite

    7  );

    COUNT(*)


    ```


    前面的查询返回了一个明显错误的数字，因为存在一个`LAUNCH_ID`为 NULL 的卫星。这乍听起来不可能——怎么可能有卫星没有被发射入轨呢？结果发现有一个关于“未知的
    Oko 碎片”的卫星。（Oko 是苏联的导弹防御卫星。）并不是说该卫星没有被发射到太空；我们只是不知道它是哪次发射的一部分。


    总共 99.998%的卫星都有已知的发射记录。但仅仅一个 NULL 就足以毁掉所有结果。对于每个`LAUNCH.LAUNCH_ID`，Oracle 都会将其与一个包含
    NULL 的列表进行比较，它无法确定值是否匹配，因此不返回任何行。


    当你假设某一列总是有设置值时要小心，特别是当该列没有`NOT NULL`约束时。下一节将展示一种使用连接来获取结果的更好方法。


    ### JOIN


    连接是 Oracle 数据库的核心操作。没有连接，数据库只是一个高级文本文件。在数据库中完成的所有操作都应围绕连接数据来设计。我们必须完全掌握最常用的连接类型。我们必须能够不假思索地阅读和编写连接。


    本节提供可视化图示、描述和示例代码，以帮助我们理解和想象连接。我们不需要都以相同的方式想象连接。只要我们都有一个方便的心智模型来理解连接，那就足够了。


    #### 连接可视化


    基本的连接类型如图 1-2 所示，使用了两种不同的可视化方式——连接图和维恩图。大多数人将连接想象为维恩图，但有些人更习惯于将其视为连接图。^(⁹)


    ![](img/471418_2_En_1_Fig2_HTML.png)


    SQL 连接可视化包括用于发射和卫星的连接图与维恩图。内连接、左连接、右连接和全外连接使用维恩图，而交叉连接则使用问号。


    图 1-2


    使用连接图和维恩图可视化连接


    图 1-2 中仅可视化了基本连接类型。其他连接类型（其中许多难以简单可视化）将在第 7 章讨论。目前，对主要连接类型有扎实的理解就足够了。


    请注意，每个图对阴影的使用方式不同。在左侧的连接图中，阴影用于表示不同的值。在右侧的维恩图中，阴影用于表示重叠的值。


    万一图 1-2 中的形状和颜色不易理解，图 1-3 展示了内连接的一个略有不同的版本。此版本列出了值。想象一下我们正在按`LAUNCH_ID`列进行连接，该列存在于两个表中。再想象`LAUNCH`表只有值
    1 和 2，而`SATELLITE`表只有值 2 和 3。


    ![](img/471418_2_En_1_Fig3_HTML.png)


    使用数字方块和发射与卫星（数字为 2）的维恩图很普遍。


    图 1-3


    使用连接图和维恩图可视化连接，深入探讨内连接并显示值


    花些时间看看图 1-2 和图 1-3，直到理解这些图示。如果我的图示对你不管用，请在互联网上搜索“连接图”，直到找到让你明白的内容。


    #### 内连接


    最常见的连接类型是内连接。第一组示例查询返回所有共享相同`LAUNCH_ID`的发射和卫星。这不会返回所有发射，因为许多发射没有有效载荷。也不会返回所有卫星，因为有些卫星碎片发射来源未知。`LAUNCH`表中的一些行会被返回多次，因为单次发射可能搭载多颗卫星。


    执行内连接有三种常见方式。第一种是使用显式关键字`INNER JOIN`：


    ```

    select *

    from launch

    inner join satellite

    on launch.launch_id = satellite.launch_id;

    ```


    内连接是默认类型，因此关键字`INNER`不是必需的：


    ```

    select *

    from launch

    join satellite

    on launch.launch_id = satellite.launch_id;

    ```


    前面的查询使用了所谓的“ANSI 连接语法”，源自 ANSI SQL 标准引入的连接语法。或者，也可以使用有时称为“笛卡尔积”的方法来构建查询。这类连接在
    SQL 标准创建之前就已存在。表列在一个逗号分隔的列表中，连接在`WHERE`子句中完成。这种方法强烈不推荐，如第 7 章所述：


    ```

    select *

    from launch, satellite

    where launch.launch_id = satellite.launch_id;

    ```

