  trans: "\n## 第一部分 VSolve Anything with Oracle SQL\n\n## 第 19 章 使用晦涩的 SQL 特性解决难题\n\
    \n现在是时候讨论 Oracle 最前沿的特性了，这些特性能够解决大多数开发者认为在数据库中不可能解决的问题。\n\n在使用这些晦涩的技术之前，我们需要谨慎。仅仅因为我们*能*使用某个特性，并不意味着我们*应该*使用它。本章中一半的特性我只用于\"\
    代码高尔夫\"来解决一些荒谬的挑战，另一半则在实际系统中使用过，在那里某个罕见的 SQL 特性发挥了关键作用。在简要描述 Oracle 最晦涩的特性之前，我们需要诚实地评估在数据库中构建如此多逻辑的成本与收益。\n\
    \n### 自动统计信息收集\n\n默认情况下，Oracle 会创建调度作业来自动收集统计信息。这些调度作业由 AutoTasks 创建，可以通过数据字典视图`DBA_AUTOTASK_*`进行监控。默认情况下，AutoTask\
    \ 每晚运行，并对所有变化超过 10%的表收集统计信息。\n\n很多时候，性能问题会因为自动统计信息收集而神奇地消失。另一方面，也有极少数时候性能问题会神奇地出现——有时收集更好的统计信息反而会导致更差的执行计划。即使性能问题消失了，理解其原因也很有用。我们可以通过`DBA_TABLES.LAST_ANALYZED`等列和数据字典视图`DBA_OPTSTAT_OPERATIONS`来跟踪统计信息收集历史。\n\
    \n统计信息作业应该起到预防性作用，在问题发生前收集统计信息。但我们不能依赖这个作业来解决所有问题。我们仍然需要手动收集统计信息。性能不能总是等待每晚的统计作业。\n\
    \n如果我们遇到默认 AutoTask 的问题，可以设置首选项来帮助作业更好地工作。例如，如果一个大表耗时太长，我们可以设置表首选项以并行方式收集统计信息：\n\
    \n```sql\n-- 并行收集优化器统计信息。\nbegin\ndbms_stats.set_table_prefs(user, 'TEST1', 'DEGREE',\
    \ 8);\nend;\n/\n```\n\n我们可以为所有`GATHER_TABLE_STATS`参数设置首选项。还有其他可用的首选项，例如`INCREMENTAL`（用于分区表的特殊算法）和`STALE_PERCENTAGE`（触发表统计信息收集所需修改的行百分比，默认为\
    \ 10%）。如果我们在自动收集统计信息方面遇到问题，应该首先调整首选项，然后再创建自己的手动作业。\n\n最后，如果我们的表变化模式对于自动统计信息收集来说太奇怪了，我们可以使用`DBMS_STATS.LOCK_TABLE_STATS`来停止对个别表的统计信息收集。当时机成熟时，我们可以使用`FORCE\
    \ => TRUE`选项手动收集统计信息。\n\n### 其他统计信息\n\n存在许多奇怪的统计信息类型，以匹配我们奇怪的数据。`ASSOCIATE STATISTICS`命令让我们可以将自定义的选择性和成本与函数等模式对象关联起来。`DBMS_STATS`包含一些不言自明的函数，例如`GATHER_FIXED_OBJECTS_STATS`和`GATHER_DICTIONARY_STATS`，它们可以提高数据字典查询的性能。我们甚至可以使用`DBMS_STATS.SET_*`函数创建虚假的统计信息。\n\
    \n`动态采样`会在统计信息缺失时，或对于运行时间长到足以证明花费更多时间收集统计信息的并行语句时自动使用。优化器推断声明式基数的难度已经够大了；它甚至不会尝试估计表函数或对象类型的基数。对于过程式代码，优化器总是猜测\
    \ 8168 行。我们可以使用动态采样来生成更好的估计，如下面的代码所示：\n\n```sql\n-- 使用动态采样估计对象类型。\nexplain plan\
    \ for\nselect /*+dynamic_sampling(2) */ column_value\nfrom table(sys.odcinumberlist(1,2,3));\n\
    select * from table(dbms_xplan.display(format => 'basic +rows +note'));\nPlan\
    \ hash value: 1748000095\n\n| Id  | Operation                             | Name\
    \ | Rows  |\n\n|   0 | SELECT STATEMENT                      |      |     3 |\n\
    |   1 |  COLLECTION ITERATOR CONSTRUCTOR FETCH|      |     3 |\n\nNote\n-----\n\
    \   - dynamic statistics used: dynamic sampling (level=2)\n```\n\n前面的结果显示，由于动态采样，基数估计非常完美。当动态采样不起作用时，无论是因为它太慢还是估计结果很差，我们可能需要使用未文档化的`CARDINALITY`提示来硬编码一个估计值。\n\
    \n`扩展统计信息`让优化器能够捕获有关表达式或列之间关系的信息。例如，在表`ENGINE_PROPELLANT`中，列`PROPELLANT_ID`和`OXIDIZER_OR_FUEL`之间存在很强的相关性。推进剂几乎总是被专门用作氧化剂或燃料。\n\
    \n如果我们使用两个条件`PROPELLANT_ID = 1`和`OXIDIZER_OR_FUEL = 'fuel'`来查询该表，优化器会错误地认为这两个条件都会减少行数。这个错误的假设会不正确地缩小基数估计值。我们可以使用以下代码创建扩展统计信息来告知优化器这种关系，从而获得更准确的基数估计值：\n\
    \n```sql\n-- 在 ENGINE_PROPELLANT 上创建扩展统计信息。\nselect dbms_stats.create_extended_stats(\n\
    ownname => sys_context('userenv', 'current_schema'),\ntabname => 'ENGINE_PROPELLANT',\n\
    extension => '(PROPELLANT_ID,OXIDIZER_OR_FUEL)')\nfrom dual;\n```\n\n### 总结\n\n\
    调查性能问题并使用神秘的提示来修复它们很有趣。但最重要的性能技巧并不在 SQL 调优指南中。性能关乎于拥有一个良好的开发和测试流程，它允许快速实验、了解高级特性和对象，以及一种使\
    \ SQL 更易于理解和调试的风格。\n\n当我们调优 SQL 语句时，必须记住要使用实际数字来找到执行缓慢的语句、缓慢的操作和不良的基数估计。我们需要一种广度优先的方法，以及使用多种工具快速找到最相关信息的能力。结合我们对算法复杂性、基数、操作、转换和动态优化的了解，我们应该对更好的执行计划可能是什么样子有所概念。修复执行计划的方法有很多，我们应该努力使用最简洁的方法。理想情况下，我们可以改进优化器统计信息并解决问题的根源。\n"
- fmt: '## Oracle vs. the Unix Philosophy


    软件工程中一个由来已久的问题是：我们是构建一个大型系统，还是构建多个协同工作的小型系统？我们越是使用这些晦涩的 Oracle 特性，就越是在选择一个整体式解决方案，而非模块化解决方案。


    我们要避免过度使用单一工具而陷入“锤子反模式”的陷阱；当我们只有一把锤子时，所有东西看起来都像钉子。技术行业一直在从昂贵服务器上的大型专有系统，转向商用硬件上的小型开源程序。Unix
    哲学强调使用许多小工具并将它们串联起来。


    另一方面，我们也不希望解决方案有太多的组成部分。这个问题的一个常见例子是系统管理脚本，它结合了 shell 脚本、`cron`、`SQL`、`SQL*Plus`
    以及许多操作系统命令。所有这些组成部分单独看都没问题。但当它们组合在一起时，这些技术需要大量不同的技能，并且很可能在集成时出现问题。很多时候，用一个定时的
    `PL/SQL` 过程替代多种技术的组合会更简单。我们需要考虑这两种方法。


    我并非试图说服你用 Oracle 做所有事情。Oracle 对于电子表格处理、模式匹配、多态、Web 应用程序前端、搜索引擎、多语言编程、地理信息系统或数据挖掘来说，并不是最佳工具。但我想让你相信，有些时候你应该考虑使用
    Oracle 来完成所有这些任务。如果我们已经构建了一个 Oracle 解决方案，那么能够利用我们现有的基础设施、知识和关系型接口将是一个巨大的优势。


    ## MODEL


    `MODEL` 子句使得在 SQL 语句中能够包含过程逻辑。`MODEL` 让我们能够像处理多维数组或电子表格一样处理数据。我们可以对数据进行分区，定义维度和度量，并应用规则和
    `FOR` 循环。


    获得这些酷炫特性所需付出的代价是复杂的语法。每次我使用 `MODEL`，都不得不重新阅读《数据仓库指南》中“*SQL for Modeling*”章节的部分内容。


    这个特性最好用一个非现实的例子来演示。让我们用 SQL 构建一个细胞自动机。细胞自动机是一个由细胞组成的网格，每个细胞都有开或关的状态。在初始状态之后，所有细胞都根据一组简单的规则重新创建。新状态基于一个细胞邻居的状态。如果你玩过康威的“生命游戏”，那你以前就见过细胞自动机了。细胞自动机有趣的地方在于，极其简单的规则如何能产生复杂的行为。


    为了尽可能简单，我们将使用一个初等细胞自动机，它被表示为一个一维数组。数组中的细胞每一代都会根据左边细胞、自身和右边细胞的状态发生变化。


    图 [19-1](#471418_2_En_19_Chapter.xhtml#Fig1) 展示了我们将在 SQL 中构建的细胞自动机。


    ![](images/471418_2_En_19_Chapter/471418_2_En_19_Fig1_HTML.png)


    规则 18 和 110 的两个三角形初等细胞自动机图像。


    图 19-1


    由 `MODEL` 子句创建的初等细胞自动机


    在 SQL 中创建图 [19-1](#4714_2_En_19_Chapter.xhtml#Fig1) 中的细胞自动机是一个四步过程。第一步是创建一个二维数据数组。第二步是
    `MODEL` 发挥魔力的地方，我们遍历这个二维数组，并根据状态和规则填充值。第三步是一个简单的聚合操作，将每个数组转换为一个字符串。最后，我们需要将结果复制粘贴到文本编辑器中，并缩小视图以查看结果：


    ```

    --使用 MODEL 的细胞自动机。开为 "#"，关为 " "。

    --#3：聚合状态以生成图片。

    select listagg(state, '''') within group (order by cell) line

    from

    (

    --#2：使用 MODEL 应用细胞自动机规则。

    select generation, cell, state from

    (

    --#1：初始的、基本为空的数组。

    select generation, cell,

    --在中心用 "#" 播种第一代。

    case

    when generation=0 and cell=120 then ''#''

    else '' ''

    end state

    from

    (select level-1 generation from dual connect by level = 1, any] =

    case

    state[cv()-1, cv()-1] || --左邻居

    state[cv()-1, cv()  ] || --自身

    state[cv()-1, cv()+1]    --右邻居

    --when ''###'' then ''#''

    when ''##  '' then ''#''

    when ''#  #'' then ''#''

    --when ''#  '' then ''#''

    when ''  ##'' then ''#''

    when ''  #  '' then ''#''

    when ''  #'' then ''#''

    --when ''   '' then ''#''

    else ''''

    end

    )

    )

    group by generation

    order by generation;

    ```


    第一步，创建一个空的数组，足够简单。这一步创建了一个数据表，每个值都有一个唯一的 `GENERATION` 和 `CELL` 坐标。第一步可以通过两次使用
    `CONNECT BY LEVEL` 技巧然后交叉连接结果来完成。你可能想要高亮并运行第一个内联视图，以理解这个复杂查询是如何开始的。


    第二步是关键步骤，在这里使用了 `MODEL` 子句。我们使用 `DIMENSION BY (GENERATION, CELL)` 创建一个二维数组。然后我们使用
    `MEASURES (STATE)` 定义一个度量，即要计算的状态。在 `RULES` 子句中，我们读取和写入状态。


    我们希望改变除第 0 代（具有初始状态）之外的所有细胞的状态：`STATE[GENERATION >= 1, ANY] =`。规则的左侧使用方括号进行数组访问，包含限制维度的条件，并使用了
    `ANY` 关键字。右侧引用了数组三次——分别对应左父细胞、中间父细胞和右父细胞。例如，引用左父细胞的状态是 `STATE[CV()-1, CV()-1]`。`CV()`
    函数获取当前值，然后我们减去一来获取父代以及左边的细胞。状态使用井号表示“开”，空格表示“关”，并且为了启用一组特定的规则，八条规则被注释掉了。


    细胞自动机看起来很酷，但并不常用。`MODEL` 子句更实际的例子会复制电子表格逻辑，例如解决库存计算或创建贷款摊销计划。我只在几次实际查询中使用过 `MODEL`
    子句，用于解决像传递闭包这样的图问题。Oracle SQL 绝对不是查询图的最佳语言。然而，由于我的数据已经存在于数据库中，使用 `MODEL` 比在系统中添加另一个工具要容易得多。


    如果我们曾想过“这个编程问题不可能用纯 SQL 解决”，我们应该尝试一下 `MODEL` 子句。'
  raw: '## Oracle vs. the Unix Philosophy


    One of the age-old questions in software engineering is: Do we build one large
    system or multiple small systems that work together? The more we use these esoteric
    Oracle features, the more we’re choosing a monolithic solution over of a modular
    solution.


    We want to avoid overusing a single tool and falling victim to the golden hammer
    anti-pattern; when all we have is a hammer, everything looks like a nail. The
    technology industry is constantly moving from large proprietary systems on expensive
    servers to small open source programs on commodity hardware. The Unix philosophy
    emphasizes using many small tools and chaining them together.


    On the other hand, we don’t want solutions with too many pieces. A common example
    of this problem is system administration scripts that combine shell scripts, cron,
    SQL, SQL*Plus, and many operating system commands. All of those pieces are fine
    individually. But when combined, those technologies require a lot of different
    skills, and there will likely be problems integrating them. Many times, it’s simpler
    to replace a combination of technologies with a single, scheduled PL/SQL procedure.
    We need to consider both approaches.


    I’m not trying to convince you to use Oracle for everything. Oracle is not the
    best tool for spreadsheet processing, pattern matching, polymorphism, web application
    front ends, search engines, polyglot programming, geographic information systems,
    or data mining. But I would like to convince you that there are times when you
    should consider using Oracle for all of those tasks. If we’ve already built an
    Oracle solution, there’s a huge advantage to being able to leverage our existing
    infrastructure, knowledge, and relational interfaces.


    ## MODEL


    The `MODEL` clause enables procedural logic inside a SQL statement. `MODEL` lets
    us process data like a multidimensional array or a spreadsheet. We can partition
    our data, define dimensions and measures, and apply rules and `FOR` loops.


    The price we pay for these cool features is a complex syntax. Every time I use
    `MODEL`, I have to reread parts of the “*SQL for Modeling”* chapter of the *Data
    Warehousing Guide*.


    This feature is best demonstrated with an unrealistic example. Let’s build a cellular
    automaton in SQL. A cellular automaton is a grid of cells where each cell has
    a state of on or off. After an initial state, all cells are recreated depending
    on a set of simple rules. The new state is based on the state of a cell’s neighbors.
    You’ve seen cellular automata before if you’ve ever played Conway’s Game of Life.
    The interesting thing about cellular automata is how complex behavior emerges
    from incredibly simple rules.


    To keep things as simple as possible, we’ll use an elementary cellular automaton,
    which is represented as a one-dimensional array. The cells in the array change
    each generation based on the state of the cell to the left, itself, and the cell
    to the right.


    Figure [19-1](#471418_2_En_19_Chapter.xhtml#Fig1) shows the cellular automata
    we’re going to build in SQL.


    ![](images/471418_2_En_19_Chapter/471418_2_En_19_Fig1_HTML.png)


    Two triangular shaped images of elementary cellular automata for rules 18 and
    110.


    Figure 19-1


    Elementary cellular automata created by the MODEL clause


    Creating the cellular automata in Figure [19-1](#471418_2_En_19_Chapter.xhtml#Fig1)
    is a four-step process. The first step is to create a two-dimensional array of
    data. The second step is where the `MODEL` magic happens and where we step through
    the two-dimensional array and populate values based on the state and the rules.
    The third step is a simple aggregation to turn each array into a string. Finally,
    we need to copy and paste the results into a text editor and zoom out to see the
    results:


    ```

    --Cellular automata with MODEL.  On is "#", off is " ".

    --#3: Aggregate states to make a picture.

    select listagg(state, '''') within group (order by cell) line

    from

    (

    --#2: Apply cellular automata rules with MODEL.

    select generation, cell, state from

    (

    --#1: Initial, mostly empty array.

    select generation, cell,

    --Seed first generation with "#" in the center.

    case

    when generation=0 and cell=120 then ''#''

    else '' ''

    end state

    from

    (select level-1 generation from dual connect by level = 1, any] =

    case

    state[cv()-1, cv()-1] || --left

    state[cv()-1, cv()  ] || --middle

    state[cv()-1, cv()+1]    --right

    --when ''###'' then ''#''

    when ''##  '' then ''#''

    when ''#  #'' then ''#''

    --when ''#  '' then ''#''

    when ''  ##'' then ''#''

    when ''  #  '' then ''#''

    when ''  #'' then ''#''

    --when ''   '' then ''#''

    else ''''

    end

    )

    )

    group by generation

    order by generation;

    ```


    The first step, creating an empty array, is simple enough. That step creates a
    table of data with a unique `GENERATION` and `CELL` coordinate for each value.
    The first step can be accomplished by using the `CONNECT BY LEVEL` trick twice
    and then cross joining the results. You may want to highlight and run the first
    inline view to understand how this complex query begins.


    The second step is the important one, where the `MODEL` clause is used. We create
    a two-dimensional array with `DIMENSION BY (GENERATION, CELL)`. Then we define
    a measure, the state that will be calculated, with `MEASURES (STATE)`. In the
    `RULES` clause, we read and write the states.


    We want to change the state for all cells, except for generation 0, which has
    the initial state: `STATE[GENERATION >= 1, ANY] =`. The left-hand side of the
    rule uses square brackets for array access, contains conditions to limit the dimensions,
    and uses the `ANY` keyword. The right-hand side references the array three times
    – for the left parent, the middle parent, and the right parent. For example, to
    reference the state of the left parent is `STATE[CV()-1, CV()-1]`. The `CV()`
    function gets the current value, and then we subtract one to get the parent generation
    and to get the cell to the left. The state uses a hash character for ON and a
    space for OFF, and the eight rules are commented out to enable a specific set
    of rules.


    Cellular automata look cool but are not often practical. More practical examples
    of the `MODEL` clause would duplicate spreadsheet logic, such as solving inventory
    calculations or creating loan amortization schedules. I’ve only used the `MODEL`
    clause a few times for real-world queries, for solving graph problems like transitive
    closures. Oracle SQL is definitely not the best language for querying a graph.
    However, since my data was already in a database, using `MODEL` was much easier
    than adding another tool to the system.


    If we ever think “this programming problem can’t possibly be solved in pure SQL,”
    we should try the `MODEL` clause.'
  trans: '## Oracle 对比 Unix 哲学


