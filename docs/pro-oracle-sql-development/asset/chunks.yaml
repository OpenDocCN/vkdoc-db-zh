  trans: '## 公共表表达式


    公共表表达式使我们能够用单个子查询、函数或过程来替代重复的 SQL 逻辑。公共表表达式在 SQL 语句顶部定义，并可在下方被多次引用。在 Oracle 中，此功能也被称为子查询因式分解和语法上略显拗口的“`WITH`子句”。公共表表达式可以帮助我们简化查询、提高性能、解决棘手的递归问题，并遵循编程的基本规则之一：不要重复自己。但我们也需要注意不要过度使用此功能。


    ### 示例


    让我们结合几个高级功能来回答一个常见问题：什么发生了变化？通过结合闪回查询（用于获取旧数据）、集合运算符（用于查找差异并合并结果）和公共表表达式（以避免重复自己），我们可以找到对表所做的精确更改。


    在构建大型查询之前，我们先运行一些代码来设置测试。运行以下语句对`ENGINE_PROPELLANT`表进行两次伪随机更改。此代码删除一行并将一个值从“燃料”切换为“氧化剂”，或反之亦然：


    ```

    --从一张不太重要的表中删除和更新一行。

    delete from engine_propellant where rownum <= 1;

    update engine_propellant

    set oxidizer_or_fuel =

    case when oxidizer_or_fuel = ''fuel'' then ''oxidizer'' else ''fuel'' end

    where rownum <= 1;

    ```


    在接下来的 5 分钟内，以下查询将显示由前述语句所做的所有更改。这个查询作为示例有点复杂，但这种通过集合运算符和公共表表达式查找差异的模式值得学习。我每个月至少会构建一次类似于下面的查询：


    ```

    --过去 5 分钟内对 ENGINE_PROPELLANT 所做的更改。

    with old as

    (

    --5 分钟前的表。

    select *

    from engine_propellant

    as of timestamp systimestamp - interval ''5'' minute

    ),

    new as

    (

    --当前的表。

    select *

    from engine_propellant

    )

    --将两个行差异合并在一起。

    select *

    from

    (

    --旧表中有而新表中没有的行。

    select ''old'' old_or_new, old.* from old

    minus

    select ''old'' old_or_new, new.* from new

    )

    union all

    (

    --新表中有而旧表中没有的行。

    select ''new'' old_or_new, new.* from new

    minus

    select ''new'' old_or_new, old.* from old

    )

    order by 2, 3, 1 desc;

    OLD_OR_NEW  ENGINE_ID  PROPELLANT_ID  OXIDIZER_OR_FUEL

    ----------  ---------  -------------  ----------------

    old                 2            100  fuel

    new                 2            100  oxidizer

    old                62              1  fuel

    --别忘了回滚更改：

    rollback;

    ```


    结果显示了被更改的行——它同时有“旧”和“新”的值，并且`OXIDIZER_OR_FUEL`列发生了变化。结果显示被删除的行——最后一行列在“旧”中但不在“新”中。公共表表达式就像我们
    SQL 语句的宏，它们帮助我们避免重复“5 分钟前”的逻辑。我们本可以使用视图，但那样的话，我们就必须仅为一个查询创建和维护单独的对象。


    ### PL/SQL 公共表表达式


    `WITH`子句中的函数和过程允许我们向查询中添加命令式代码。此功能可以帮助最小化模式中的对象数量，并且如果我们的数据库用户没有创建对象的权限，它也会很有帮助。


    让我们使用一个 PL/SQL 声明来解决另一个常见的业务问题：查找文本字段中的数值。如第 4 章所讨论的，确定一个字符串是否是数字比大多数程序员意识到的要复杂得多。使用正则表达式是个坏主意，因为我们会忘记检查负号、小数等情况。以下代码在`FLIGHT_ID1`中查找数值：


    ```

    --启动时带有数字 FLIGHT_ID1。

    with function is_number(p_string in varchar2) return varchar2 is

    v_number number;

    begin

    v_number := to_number(p_string);

    return ''Y'';

    exception

    when value_error then return ''N'';

    end;

    select

    to_char(launch_date, ''YYYY-MM-DD'') launch_date,

    flight_id1

    from launch

    where flight_id1 is not null

    and is_number(flight_id1) = ''Y''

    order by 1,2;

    /

    LAUNCH_DATE  FLIGHT_ID1

    -----------  ----------

    1942-06-13   2

    1942-08-16   3

    1942-10-03   4

    ...

    ```


    （实际上，编写前面的查询有更简单的方法，即使用许多内置函数中提供的类型安全转换模式：`TO_NUMBER(FLIGHT_ID1 DEFAULT NULL ON
    CONVERSION ERROR) IS NOT NULL`。在实际查询中，有用的 PL/SQL 声明会更复杂一些。）


    PL/SQL 的`WITH`语法有点奇怪，许多 IDE 在解析它时都有问题。即使是 SQL*Plus 处理前面的语句也与常规的`SELECT`语句略有不同，这就是为什么前面代码末尾有一个斜杠。


    ### 性能与过度使用


    公共表表达式在某些情况下有助于提高性能。如果公共表表达式被引用两次或更多次，Oracle 可能会通过将其结果存储在临时表中来物化结果。物化可以减少读取表的次数。Oracle
    会自动决定是否值得将中间结果转换为临时表，但我们可以用提示`/*+MATERIALIZE*/`来强制决策。此外，PL/SQL 的`WITH`子句与 SQL
    紧密集成，可以比常规函数和过程运行得更快。


    但许多 SQL 开发人员过度使用公共表表达式。物化结果的性能优势只有在公共表表达式被多次调用时才会直接显现。（然而，物化结果会迫使 Oracle 以某种顺序执行操作，这可能会限制查询转换的方式。重写查询以使用公共表表达式可能会间接提高性能，但我们不应盲目重写查询并期望走运。）而且，虽然避免调用
    PL/SQL 函数的开销是好事，但我们不希望重复自己，并将业务逻辑从包复制粘贴到单个 SQL 语句中。如果我们需要减少 PL/SQL 函数的开销，我们可以使用`PRAGMA
    UDF`来获得相同的性能改进。此外，如果我们过分担心 PL/SQL 函数的开销，这可能意味着我们没有充分利用 SQL。


    如第 6 章所讨论的，公共表表达式的自上而下的数据流是一件坏事。只使用一次的公共表表达式增加了我们 SQL 语句的上下文，并使我们的语句更难以调试和理解。


    公共表表达式是一个很棒的功能，如果使用得当，可以节省大量代码并提高性能。此外，公共表表达式可以引用自身。递归公共表表达式是一个强大的功能，将在下一节中描述。'
- fmt: '## Recursive Queries


    When data references itself an unknown number of times, we must use recursive
    or hierarchical queries. If data only references itself a single time, for example,
    if we want to find the parent record, we can write that query with a self-join.
    Or if our row only needs to access the one row before it, we can write that query
    with the analytic function `LAG`. But when we want the parent''s parent or the
    previous row''s previous row or we want to generate something that looks like
    a tree, we need Oracle''s recursive query syntax.


    Oracle provides two ways to process hierarchical data: the original `CONNECT BY`
    syntax and the newer recursive common table expression syntax (also known as recursive
    subquery factoring). Newer syntax is usually the best option, but in this case
    the newer syntax is not always better. Both syntaxes have their advantages. The
    `CONNECT BY` syntax is the original syntax, is less wordy, and is more convenient
    for handling traditional hierarchical data. The recursive common table expression
    syntax is based on a standard, wordier than `CONNECT BY`, not as convenient for
    processing traditional hierarchical data, but more powerful and better suited
    to advanced queries. Each syntax seems to be a better fit for certain problems.
    If one style gives us trouble, with either the syntax or performance, we should
    try the other style.


    ### CONNECT BY Syntax


    In the original syntax, we start with a set and then use `CONNECT BY` conditions
    to define how the set joins to itself. Conditions in the `CONNECT BY` clause can
    use the special `PRIOR` operator, which lets us reference the value from the previous
    row of the set. Optional `START WITH` conditions let us pick the initial rows.
    Picking the initial rows is important because it prevent duplicates. If we''re
    building trees of results from a flat table, we only want to start building trees
    from the root. If we build trees starting from the root, and starting from every
    other level, we''ll end up with many subtrees.


    The `CONNECT BY` syntax also provides useful pseudo-columns such as `LEVEL`. `LEVEL`
    is a number that tells us what level of the tree each row is on. `CONNECT_BY_ROOT`
    returns the value from the root row. `SYS_CONNECT_BY_PATH` walks the tree and
    creates a string aggregation of all the values. The `ORDER SIBLINGS BY` clause
    preserves the tree structure of the results.


    For example, let''s look at the `ORGANIZATION` table. That table is used frequently
    in the data set; there are organizations for the launch, satellite, stage, engine,
    and more. Each organization has a parent organization, which can have a parent
    organization, etc. If we wanted to count launches or satellites per organization,
    it might help to count by the top-level organization. First, we need to generate
    a hierarchy of organizations with this query:


    ```sql

    --Organization hierarchy with CONNECT BY.

    select

    lpad(''  '', 2*(level-1)) || org_code org_code,

    parent_org_code parent,

    org_name

    from organization

    connect by prior org_code = parent_org_code

    start with parent_org_code is null

    order siblings by organization.org_code;

    ORG_CODE   PARENT  ORG_NAME

    ---------  ------  --------

    ...

    USAF               United States Air Force

    ...

    HAFB     USAF    Holloman Air Force Base

    ...

    HADC   HAFB    Holloman Air Development Center

    HAM  HADC    Holloman Aeromedical Lab, Holloman ...

    ...

    ```


    The preceding partial results show one of the many trees. Unsurprisingly, there
    are many organizations under the United States Air Force (USAF). The results are
    formatted like a tree, with the `LPAD` trick that multiplies the spaces by the
    `LEVEL`. The query starts with the root organizations at the top – the ones where
    `PARENT_ORG_CODE IS NULL`. The `SIBLINGS` in the order by clause ensures that
    the tree order is preserved. The `CONNECT BY` condition is the most difficult
    part of the query and requires some thought. Imagine we started with the USAF
    row and are trying to find the second row. To decide if each row is in the tree,
    we need to compare the current `PARENT_ORG_CODE` to the `PRIOR ORG_CODE`.


    Don''t feel bad if these recursive queries don''t make sense yet. Recursive queries
    are notoriously complicated; it might take a few times before the recursion feels
    natural.


    ### Recursive Common Table Expressions


    Let''s recreate the previous results with a recursive common table expression.
    In this syntax we define a table in the `WITH` clause, but this time we also need
    to predefine the column names. Inside the common table expression, there are two
    subqueries. The first subquery primes the pump by generating the initial rows.
    The second subquery generates parent or child rows by joining a table to the common
    table expression itself. Finally, the common table expression is queried to get
    the results:


    ```sql

    --Organization hierarchy from recursive CTE.

    with orgs(org_code, org_name, parent_org_code, n, hierarchy) as

    (

    --Start with parent rows:

    select org_code, org_name, parent_org_code, 1, org_code

    from organization

    where parent_org_code is null

    union all

    --Add child rows by joining to parent rows:

    select

    organization.org_code,

    organization.org_name,

    organization.parent_org_code,

    n+1,

    hierarchy || ''-'' || organization.org_code

    from orgs parent_orgs

    join organization

    on parent_orgs.org_code = organization.parent_org_code

    )

    select

    lpad(''  '', 2*(n-1)) || org_code org_code,

    parent_org_code parent,

    org_name

    from orgs

    order by hierarchy;

    ```


    The preceding query returns the same results as the `CONNECT BY` version but uses
    more code to do the same thing. There''s no convenient `LEVEL` or `SIBLINGS` syntax,
    so we have to create those ourselves. To recreate `LEVEL`, the "n" column starts
    with 1 and adds 1 after each join. And to order by siblings, we need to create
    a string to represent the whole tree and then order by that tree. The "hierarchy"
    column represents a tree by starting with the org code and appending a new org
    code at each level.


    For simple examples, the `CONNECT BY` syntax is best. For complex examples, where
    we need more fine-grained control over how the statement recurses, the common
    table expression syntax is best.


    No matter which syntax we use, recursive queries can get painfully difficult.
    Making sense of recursive queries requires creating an intricate mental model
    of a tree. When creating recursive queries, we must be careful to keep our inline
    views small and to thoroughly document everything.


    ## XML


    Oracle is a converged database that supports much more than just relational data.
    This book is about SQL development and focuses on relational data, but there are
    many times when the relational model needs to merge with semi-structured data
    stored as XML. There are whole manuals written about the subject, such as the
    *XML DB Developer''s Guide*. This section only shows the basics, but keep in mind
    that Oracle is designed to handle vastly more complicated scenarios.'
