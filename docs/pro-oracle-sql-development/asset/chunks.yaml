- fmt: '### New Pivot Syntax


    The following query returns the same results as the preceding query but uses the
    new `PIVOT` syntax. The `pivot` clause is given the aggregate function, the list
    of columns to pivot, and the values to include:


    ```sql

    --Pivoted launch success and failure per year.

    select *

    from

    (

    --Orbital and deep space launches.

    select to_char(launch_date, ''YYYY'') launch_year, launch_status

    from launch

    where launch_category in (''orbital'', ''deep space'')

    ) launches

    pivot

    (

    count(*)

    for launch_status in

    (

    ''success'' as success,

    ''failure'' as failure

    )

    )

    order by launch_year;

    ```


    For this small example, the new syntax is more complex and larger than the old-fashioned
    syntax. I always find the `PIVOT` syntax a bit weird, and I have to look it up
    every time I use it. The syntax doesn’t help until we have a large number of columns
    to pivot. Even then, there is still a lot of manual typing – we still need to
    list each status, create an alias, and possibly deal with nulls. In most cases
    we might as well stick with the old `SUM(CASE` syntax.


    ### UNPIVOT


    Unpivoting turns multiple columns into multiple rows. As an example of why we
    might want to unpivot, let’s look at the `LAUNCH` columns `FLIGHT_ID1` and `FLIGHT_ID2`.
    Any time we have multiple columns with the same names, but a number at the end,
    we should be suspicious. Should those columns be stored in a separate table, to
    allow an unlimited number of flight identifiers? What happens if a rocket launch
    has a third flight identifier? Instead of having to add new columns, it might
    make sense to create a separate table to store flight identifiers. (In this case,
    the flight identifiers don’t add much value, and it’s not worth the trouble, but
    let’s pretend for the sake of the example.) First, let’s look at the initial,
    wide data:


    ```sql

    --Multiple FLIGHT_ID columns per launch.

    select launch_id, flight_id1, flight_id2

    from launch

    where launch_category in (''orbital'', ''deep space'')

    order by launch_id;

    ```

    ```

    LAUNCH_ID  FLIGHT_ID1  FLIGHT_ID2

    ---------  ----------  ----------

    4305       M1-PS       PS-1

    4306       M1-2PS      PS-2

    4476       TV-3        Vanguard TV3

    ...

    ```


    The old-fashioned way to convert the columns into skinny rows uses a `UNION ALL`
    for each column, shown as follows:


    ```sql

    --Unpivot data using UNION ALL.

    select launch_id, 1 flight_id, flight_id1 flight_name

    from launch

    where launch_category in (''orbital'', ''deep space'')

    and flight_id1 is not null

    union all

    select launch_id, 2 flight_id, flight_id2 flight_name

    from launch

    where launch_category in (''orbital'', ''deep space'')

    and flight_id2 is not null

    order by launch_id, flight_id;

    ```

    ```

    LAUNCH_ID  FLIGHT_ID  FLIGHT_NAME

    ---------  ---------  -----------

    4305          1  M1-PS

    4305          2  PS-1

    4306          1  M1-2PS

    4306          2  PS-2

    4476          1  TV-3

    4476          2  Vanguard TV3

    ...

    ```


    The following query uses the `UNPIVOT` syntax to return the same results:


    ```sql

    --Unpivot data with UNPIVOT syntax.

    select *

    from

    (

    select launch_id, flight_id1, flight_id2

    from launch

    where launch_category in (''orbital'', ''deep space'')

    ) launches

    unpivot

    (

    flight_name for

    flight_id in (flight_id1 as 1, flight_id2 as 2)

    )

    order by launch_id;

    ```


    The preceding `UNPIVOT` query is much smaller than the original version and even
    runs faster, whereas the `PIVOT` syntax is hardly any better than the original
    version and usually isn’t any faster. The poor syntax and performance of `PIVOT`
    are unfortunate, because in practice we’re much more likely to pivot data than
    to unpivot data.


    One of the most common Oracle SQL questions is: How can we dynamically pivot data,
    where we don’t have to specify all the columns to display? The simple answer is
    there is no dynamic pivot option. A more thorough answer is Oracle does allow
    dynamic pivoting, but only if we ask for the output to be in XML, which is then
    harder to consume. An even more thorough answer is we *can* dynamically pivot
    if we create advanced dynamic SQL solutions, such as Method4 discussed in Chapter
    [20](#471418_2_En_20_Chapter.xhtml).


    But the real, unsatisfying answer to the question about how to dynamically pivot
    is we don’t want to dynamically pivot our queries. Overly generic and dynamic
    solutions are a huge pain for little gain. At some point we have to know our columns,
    or we can’t do any meaningful work with our data.


    ### Flashback


    A flashback query lets us query data the way it used to look. Flashback can be
    a literal job saver when we have logical table corruption. Having a time machine
    for our tables can help us quickly back out incorrect changes. Imagine if someone
    had deleted rows from the `LAUNCH` table 9 minutes ago. We can look back in time
    and find the table as of 10 minutes ago with this query:


    ```sql

    --LAUNCH table as it looked 10 minutes ago.

    select *

    from launch as of timestamp systimestamp - interval ''10'' minute;

    ```


    Whenever someone makes a bad change, try to find the change with a flashback query.
    But don’t wait – the clock is ticking. Flashback queries use Oracle undo data,
    and that data ages out. There may be a magic fix to our production data issue,
    but that fix is going to expire. It’s difficult to predict how long the undo data
    will be available, since the retention period depends on instance parameters and
    system activity.


    Flashback has a `VERSIONS BETWEEN` syntax and multiple pseudo-columns that can
    help us find exactly what change was made and when. We can combine flashback with
    set operators like `MINUS` to find missing data.


    In addition to querying data, flashback can also be used to restore tables and
    entire databases. Those features share the name “flashback” but work with different
    storage mechanisms – the recycle bin and flashback logs. Speak to your DBA if
    you need to do frequent time traveling.


    ### Sample


    Querying a small sample of data can help with testing, especially with large tables.
    The `sample` clause lets us specify an estimated percentage of table data to retrieve.
    By default, the sampling is random and will return a slightly different result
    most times. If we want a deterministic sample, we can specify a `seed` number.
    The following queries return approximately 1% of the rows from the `LAUNCH` table:


    ```sql

    --Sample query that returns a different number each time.

    select count(*) from launch sample (1);

    --Sample query that returns the same number each time.

    select count(*) from launch sample (1) seed (1234);

    ```


    The `sample` clause does not return results that are statistically random. And
    if the sample size is small enough, there is a chance the query will return zero
    rows. If we need to be precise with our randomness, we need to avoid `SAMPLE`
    and use `ORDER BY DBMS_RANDOM.VALUE` instead. Unfortunately, the `DBMS_RANDOM`
    approach is ridiculously slow.


    ### Partition Extension Clause


    The partition extension clause lets us choose data from a specific set of partitions
    or subpartitions. (Partitioning is briefly described in Chapter [9](#471418_2_En_9_Chapter.xhtml).)
    The partitions can be referenced either by partition name or by the partition
    key value. For example, the following queries read from a partitioned table. (Since
    we don’t all have a license for partitioning, the example uses an existing system
    table instead of creating our own partitioned table.)


    ```sql

    --Reference partition name.

    select *

    from sys.wrh$_sqlstat partition (wrh$_sqlstat_mxdb_mxsn);

    --Reference partition key values.

    select *

    from sys.wrh$_sqlstat partition for (1,1);

    ```


    Normally the partition extension clause is not necessary, since partitioning is
    meant to be invisible to the end user. We should be able to query a table, ask
    for a value, and let Oracle automatically determine the partitions. In practice,
    Oracle partition pruning can’t always figure out the partitions at compile time.
    For example, if we’re doing operations that lock partitions, like direct-path
    writes, Oracle may have to lock the entire table, unless we use the partition
    extension clause.'
