    # 审计触发器与其他 DML 触发器


    如果我们有大量数据，或者计划定期查询旧数据，就应该为每个常规表建立一个审计表。这种方案速度更快、更易使用，但更为复杂，因为我们需要创建和维护额外的一组表。而且将每行数据存储两次效率低下，特别是对于稀疏变更的情况——可能仅一列发生变化，我们却要存储整行新数据。但在高度受监管的环境中，我们需要快速证明究竟发生了什么、何时发生以及由谁操作，这些表就成了**救星**。


    ## 行级 AFTER 触发器


    以下代码创建了一个行级 `AFTER` 触发器，用于捕获对表 `TRANSATION_TEST` 所做的每一次 DML 变更。请注意触发器主体中的 `CASE`
    语句如何通过条件谓词 `INSERTING`、`UPDATING` 和 `DELETING` 精确判断正在进行哪种 DML 操作。我们需要这些信息来决定使用
    `OLD` 值、`NEW` 值还是两者。真正的触发器会将变更存储到审计表中，但此示例触发器仅打印语句，以便我们了解触发器的工作原理：


    ```sql

    --创建一个触发器来跟踪每一行的变化。

    create or replace trigger transaction_test_trg

    after insert or update of a or delete on transaction_test

    for each row

    begin

    case

    when inserting then

    dbms_output.put_line(''inserting ''||:new.a);

    when updating(''a'') then

    dbms_output.put_line(''updating from ''||

    :old.a||'' to ''||:new.a);

    when deleting then

    dbms_output.put_line(''deleting ''||:old.a);

    end case;

    end;

    /

    ```


    以下 PL/SQL 块展示了执行 `INSERT`、`UPDATE` 和 `DELETE` 时发生的情况。（结果假设示例开始时表为空。）


    ```sql

    --测试触发器。

    begin

    insert into transaction_test values(1);

    update transaction_test set a = 2;

    delete from transaction_test;

    end;

    /

    inserting 1

    updating from 1 to 2

    deleting 2

    ```


    如果我们需要审计大量表，可能值得创建一个包来自动生成审计触发器。正如前面关于动态 SQL 的章节所讨论的，我们可以利用数据字典和有益的编程风格轻松生成触发器代码。


    ## 用于多表约束的 AFTER STATEMENT 触发器


    简单 DML 触发器的另一个用途是验证多表约束。通过触发器验证多表约束的问题在于性能；即使我们只更改一行，也可能需要查询整张表。我们至少应该使用 `AFTER
    STATEMENT` 触发器，这样就不必为每一行验证条件。这种方法可以实现与第 9 章讨论的物化视图多表约束相同的效果。


    ## Instead-of DML 触发器


    `Instead-of` DML 触发器可用于改变我们与视图交互的方式。如果我们的视图很简单，它们可能天生就是可更新的，我们可以直接对它们执行 DML。但复杂的视图是不可更新的，Oracle
    可能不清楚如何将对视图的更改反映为对表的更改。通过 `instead-of` DML 触发器，我们可以定义如何处理视图更改的规则。有些应用程序仅将表用作低层物理存储，只允许用户与创建系统高层抽象的视图进行交互。


    ## 复合 DML 触发器


    `复合` DML 触发器可以将不同的时序点组合到单个触发器中。组合时序点让我们可以在 `BEFORE STATEMENT` 部分初始化变量，在 `FOR EACH
    ROW` 部分收集数据，然后在 `AFTER STATEMENT` 部分批量处理结果。组合触发器操作可以显著提高性能，并且在我们审计经常发生大量更改的表时很有帮助。


    复合触发器还可以帮助我们避免令人畏惧的**变异表错误** `ORA-04091`。当我们的触发器试图修改触发该触发器的同一张表的行时，就会发生变异表错误。行级触发器触发触发器会导致非确定性行为，该行为将取决于行被处理的顺序。避免该问题的一种方法是在
    `FOR EACH ROW` 部分收集相关数据，并在 `AFTER STATEMENT` 部分进行更改，因为 `AFTER STATEMENT` 部分不会导致变异表错误。


    ## 系统触发器


    `系统` 触发器可以为每个模式或整个系统的 DDL 语句触发，也可以为数据库事件触发。例如，我们可以创建一个系统触发器来防止针对特定对象运行特定命令。创建系统触发器时必须格外小心，否则可能会导致
    Oracle 无法工作。如果可能，我们应该使用模式触发器而不是数据库触发器，因为模式触发器影响的用户数量最少。


    系统触发器的一个常见用途是创建登录触发器来设置会话值，用于格式化或优化。但请记住，我们的服务器代码绝不应依赖客户端格式设置。如果一个存储过程只能在特定的 `NLS_DATE_FORMAT`
    下运行，则该过程是有缺陷的，需要修复。


    许多开发人员使用登录触发器来设置 `NLS_DATE_FORMAT` 以避免隐式转换错误。我倾向于相反的做法：我喜欢故意设置一个古怪的 `NLS_DATE_FORMAT`。设置一个奇怪的值，然后运行单元测试，将确保程序不使用任何隐式日期转换。请注意，以下触发器仅针对我的模式设置，而不是整个系统。我还硬编码了我的模式名称，以确保此触发器不会意外应用于错误的环境：


    ```sql

    --创建设置自定义 NLS_DATE_FORMAT 的登录触发器。

    create or replace trigger jheller.custom_nls_date_format_trg

    after logon on jheller.schema

    begin

    execute immediate

    q''[alter session set nls_date_format = ''J'']'';

    end;

    /

    --注销并重新登录后运行此命令以查看新格式。

    select to_char(sysdate) julian_day from dual;

    JULIAN_DAY

    ```


    ## 模拟 On-Commit 触发器


    Oracle 没有 `on-commit` 触发器，但我们可以使用 `DBMS_ALERT` 和 `DBMS_JOB` 等 PL/SQL 包来模拟。`DBMS_SCHEDULER`
    包几乎总是创建作业的最佳方式，但 `DBMS_JOB` 有一个优点：`DBMS_JOB` 仅在事务提交时才提交作业。以下 PL/SQL 块展示了如何在事务提交后让某事发生：


    ```sql

    --模拟 on-commit 触发器。

    declare

    v_job number;

    begin

    --创建一个作业，但还不会生效。

    dbms_job.submit

    (

    job  => v_job,

    what => ''insert into transaction_test values(1);''

    );

    --回滚将忽略该作业。

    --rollback;

    --只有提交才会真正创建该作业。

    commit;

    end;

    /

    ```


    作业异步运行，可能不会立即执行。我们可能需要等待一会儿才能看到上述 PL/SQL 块的结果。

