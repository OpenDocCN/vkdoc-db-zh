    against thousands of years of language evolution.'
  trans: '### PL/SQL 变量名


    在 PL/SQL 中，前缀和后缀往往比在 SQL 中更有用。PL/SQL 变量不像 SQL 名称那样具有丰富的上下文历史，它们通常只作用于一小段代码。在这些小的代码块中，变量通常只服务于一个特定的、小范围的目的，不像表名或列名那样包含丰富的上下文信息。前缀和后缀可以创建一些**微型契约**，使变量的预期用途一目了然。对于大型
    PL/SQL 系统，制定命名规范以帮助区分常量与非常量变量、全局与局部变量、输入或输出参数等，是很常见的做法。


    当变量包含与列相同的信息时，前缀和后缀在 PL/SQL 中尤其有用。虽然很想给这样的 PL/SQL 变量起一个与列完全相同的名字，但名称重复会导致歧义。


    例如，如果一个 PL/SQL 函数有一个名为 `LAUNCH_ID` 的参数，该函数内部的 SQL 语句可能会包含一个有歧义的表达式，如 `WHERE LAUNCH.LAUNCH_ID
    = LAUNCH_ID`。第二个 `LAUNCH_ID` 是来自表的值还是来自参数的值？为了避免这种情况，我会用 `P_`（代表“parameter”）作为参数的前缀，用
    `V_`（代表“variable”）作为局部变量的前缀。使用这样的命名方案后，有歧义的表达式就会被改为无歧义的表达式，例如 `WHERE LAUNCH.LAUNCH_ID
    = P_LAUNCH_ID`。


    ### 引用表和列


    在引用表和列时，我们有几种选择。我们应该在表名前面加上模式名吗？我们应该在列名前面加上表名或别名吗？下面的例子展示了一个简单查询的几种不同选项。正确的风格取决于上下文：


    ```sql

    -- 四种运行相同查询的方式。

    select launch_date from launch;

    select launch.launch_date from launch;

    select launch.launch_date from space.launch;

    select space.launch.launch_date from space.launch;

    ```


    本书中的示例不引用模式名。太空数据集默认安装在 `SPACE` 模式下，但在每个查询中都添加该模式名并没有太大价值。当示例引用 `SATELLITE` 而不是
    `SPACE.SATELLITE` 时，基本没有混淆的风险。


    这里存在可靠性与可读性之间的权衡。**可能**我们的模式中已经有一个名为 `SATELLITE` 的表，我们可能会将那个表与 `SPACE.SATELLITE`
    混淆。或者将来也可能添加一个同名的表。但这个微小的风险似乎不值得我们在示例中增加数百个额外的词。


    如果我们经常查询另一个模式中的表，可以创建同义词来隐藏模式名。或者我们可以用以下命令更改我们的默认模式：


    ```sql

    -- 默认为 SPACE 模式。

    alter session set current_schema=space;

    ```


    本书中的示例仅在表名不明显时才将表名放在列名前面。了解列的来源固然好，但在很多情况下，来源表是显而易见的。


    例如，在使用太空数据集一段时间后，很明显 `LAUNCH_DATE` 来自 `LAUNCH` 表。但“显而易见”是主观的。为**每个**列都加上表名前缀会更加一致，可能在我们不熟悉代码时有所帮助，但所有这些前缀会使
    SQL 语句变得杂乱。**不为任何**列加前缀会使代码更简短，对于非常熟悉数据模型的人来说可能看起来更好，但可能会让其他开发者感到困惑。我们需要找到恰当的平衡，并根据上下文调整我们的风格。


    ## 避免使用缩写


    我们应该避免使用不常见的缩写，而应使用词语的完整形式。缩写使用的字符更少，但产生的词数相同。代码的复杂度用词数来衡量比用字符数更好，而且并非所有词都是等价的。


    不常见的缩写比完整的词更难输入也更难阅读。“不常见”的定义是主观的，取决于上下文。如果我们项目中的每个程序员都能立即认出一个缩写，那么我们应该使用它。但我们不应该在每个
    SQL 语句中都发明新的缩写。


    举一个简单的例子，想象一下如果我们的数据集对所有东西都使用缩写：


    ```sql

    -- 使用缩写。（此代码无法工作。）

    select * from lnch;

    -- 不使用缩写。

    select * from launch;

    ```


    前面两条语句中的第一条更简短，但可读性更差。缩写 `LNCH` 只需要读者进行极少量的思考——但为什么还要让他们多想呢？阅读完整的词无需思考，能让读者将所有注意力集中在更重要的事情上。


    当然，有些时候缩写是有用或必要的。但是，从所有变量名中去除元音的黑客倾向并无益处。不使用元音写词，从技术上讲，我们甚至不再使用字母表；只使用辅音的书写系统被称为辅音音素文字。辅音音素文字在某些语言中可以运作良好，但在英语或
    SQL 中则不行。如果我们坚持什么都缩写，那就是在与数千年的语言进化背道而驰。'
- fmt: '## Use Tabs for Left Alignment


    Tabs vs. spaces is an old technology holy war, but it’s worth re-evaluating the
    arguments through the lens of an advanced SQL developer. For building large SQL
    statements, using left-aligned tabs instead of right-aligned spaces helps us program
    faster and focus on the important parts of our SQL statements.


    In most programming languages, the tabs vs. spaces argument is pointless – IDEs
    can auto-indent and effortlessly convert between the two. Unfortunately, that
    kind of auto-formatting is not always available to SQL developers. As described
    in the next section, automatic SQL formatting is not always a good idea. And SQL
    is often used in administrative tasks, where we frequently don’t have access to
    IDEs. And when we’re using dynamic SQL, where the code is stored as a string,
    we’re stuck manually styling our code anyway.


    We need to be able to write SQL relatively quickly, without the aid of a `fancy
    IDE` or `auto-formatter`. We should be able to make good-looking code without
    spending a lot of time adding individual spaces. There are times when our SQL
    needs to be extra beautiful, and then it’s worth spending the time getting every
    space exactly right. But for most of our code, best is the enemy of good enough.


    Programming is not a race, but using tabs when creating SQL will help us code
    faster and think more clearly about our code. With tabs we can quickly get the
    code good enough – indented and left-aligned – vs. trying to make the code look
    perfect with right-aligned spaces.


    Small examples are deceiving when discussing whitespace and alignment. When we
    have a trivial SQL statement, like the following code, right-aligning the keywords
    looks just as nice as left-aligning. The right alignment can even produce a nice
    river of whitespace after the keywords:


    ```

    --Left-aligned.

    select *

    from dual

    where 1 = 1;

    --Right-aligned with spaces.

    SELECT *

    FROM dual

    WHERE 1 = 1;

    ```


    But the preceding right-aligned style is not scalable. When we compare a more
    realistic SQL statement, like the large example from Chapter 6, the right alignment
    of the traditional SQL style quickly breaks down. The traditional right-aligned
    style works fine when there is only one level to our query. But as soon as we
    start nesting inline views, we need the alignment to quickly tell us what level
    we’re looking at. With left-aligned tabs, we can more easily navigate inline views.


    For large queries we don’t need visual help to identify keywords like `SELECT`
    and `FROM`. We need visual help to identify the inline views. Figure 13-1 shows
    the example code from Chapter 6 and compares left-aligned tabs with the traditional
    right-aligned spaces. Don’t try to read the code – just quickly scan the image
    to get a feeling for the shape of the query. To emphasize the shape of the queries,
    Figure 13-1 only shows the first word of each line.


    ![](images/471418_2_En_13_Chapter/471418_2_En_13_Fig1_HTML.png)


    Figure 13-1

    Left-aligned tabs vs. right-aligned spaces


    In the preceding image, the left-aligned tabs version has a simpler and more accurate
    shape than the right-aligned spaces version. The left-aligned tabs version uses
    an entire line for each inline view parenthesis and equally indents those parentheses.
    That style is called the “`Allman style`,” and it makes the inline views easier
    to read, write, and debug.


    In addition, if we look closely at the right-aligned spaces style, we can see
    that the indenting is wrong. Inline views #1, #2, and #3 should all be indented
    at the same level. But the right-aligned spaces version incorrectly makes #1 look
    like the parent of #2 and #3. Every popular SQL code formatter makes the same
    huge mistake. Indenting is meant to convey the parent–child relationships in our
    code. Simply being the first line of code does not make it a parent to the next
    line of code.


    The left-aligned tabs style also makes it much easier to copy and paste inline
    views. Highlighting and copying inline views is easy because they don’t share
    a line with unrelated code. Pasting and formatting the inline view is easy because
    all we have to do is highlight and press either `Tab` or `Shift+Tab`, to indent
    or unindent. Compare that with adding inline views using traditional right-aligned
    spaces; we have to either change many individual spaces or reformat the entire
    statement. Our coding style should enable us to copy snippets of code in a few
    seconds.


    The main drawback with tabs is that the exact size is undefined. When we’re writing
    an email, a post, or a book, to be safe we might want to convert the tabs to spaces
    when we’re done.


    We want a style that helps us focus on what’s important in realistic SQL statements,
    not a style that adheres to what people traditionally used. Left-aligning with
    tabs helps us read and write inline views more easily.'
