  trans: '

    ## 共享数据库与私有数据库


    Oracle 数据库开发主要有两种方法。最常见的方法是创建一个用于开发的共享数据库服务器。多个开发人员同时在同一个数据库、甚至可能在同一个模式中工作。不太常见的方法是为每个开发人员创建一个私有数据库。对于大多数项目，我强烈提倡采用私有数据库开发方式。


    本章不会详细讨论共享数据库方法。共享数据库开发是大多数 Oracle 项目的默认选择，而这些环境的搭建是数据库管理员（DBA）的职责。


    在某些情况下，共享数据库开发可能是一个不错的选择。例如，如果我们开发团队规模较小，或者应用相对稳定，或者流程已运行很长时间，共享数据库开发可能就足够了。而且，我们可以使用一些技术来改进共享数据库开发。但没有任何技术能够消除这两种模式在社会学层面的差异。共享数据库开发最终由管理员控制和限制，而私有数据库开发最终由开发者控制。


    信不信由你——我知道你们大多数人都不信——私有数据库开发的效果出奇地好。对于在共享系统上工作了几十年的 SQL 开发人员来说，很难想象完全抛弃所有的基础设施和管理。一种新的开发方式，我们往往需要亲眼所见才会相信。我的目标只是向你们介绍新的理念，并说服你们保持开放的心态。


    重新思考我们处理环境差异、安全性、测试、示例数据、许可、性能和部署的方式，起初可能会令人望而生畏。本章稍后将讨论其中大部分的担忧，你们可以放心，许多成功的组织和项目之前已经解决了这些问题。


    我们可能仍然需要保留一些共享服务器，用于不同类型的测试。但我参与过许多项目，其中超过 90%的数据库开发和测试都是在笔记本电脑上安装的 Oracle 数据库中完成的。


    在决定如何建立我们的开发流程这一重要决策时，有许多因素需要考虑。我们必须做出若干权衡。本章的其余部分只讨论私有数据库开发模式，因为我相信其权衡可以总结如下：**拥有对生产环境不完美副本的完全控制权，远胜于对生产环境完美副本几乎毫无控制权**。


    ## 创建无限数量的数据库


    构建 Oracle 数据库解决方案的第一步，是创建一个让每个人都能拥有无限数量数据库，并对这些数据库拥有无限权限的系统。


    ### 私有数据库的优势


    很少有 Oracle 机构使用私有数据库，但这并非激进的想法。Java 程序员不共享编译器，也不担心别人同时在编译包。C 程序员不受限于一次只能构建一个可执行文件，也不担心覆盖别人的工作。JavaScript
    程序员无需请求许可即可使用语言默认包含的函数。应用程序开发人员几乎总能访问其编程语言近乎无限的能力。为什么 Oracle 开发人员不应该拥有同样的力量呢？


    在私有数据库而非单一共享服务器上进行开发，有许多优势：


    1.  `创建、学习和实验`：创新无需请求许可；它是自发的、稍纵即逝的、且具有颠覆性的。在共享服务器上，我们不能修改某些对象，或者需要征得他人同意，或者需要提醒团队其他成员。但我们不希望自己潜在愚蠢的想法令人尴尬。除非我们被允许先有愚蠢的想法，否则我们无法产生好的想法。为了蓬勃发展，开发者需要自由和隐私。即使是最轻微的进入障碍，也可能阻碍创新，扼杀想法的初现火花。对于尚无信心尝试新事物的**新开发者**来说，尤其如此。


    2.  `并行工作`：拥有无限数量的数据库，我们就可以拥有无限多个版本。即使是只有一个内部客户的项目，支持多个版本也很重要。我们绝不应将自己限制为只能同时开发少数几个版本。


    3.  `标准配置`：如果未经自动化，就不是标准化。采用手工配置的共享服务器，由于不同人员的使用和更改，不可避免地会出现漂移。


    4.  `数据`：从庞大.dataset 中解放自己。针对大型生产数据集进行开发，常被用作拐杖，以弥补有意义的测试数据的不足。人工创建的测试数据比生产数据更小、更安全、也更有用。当然，有时我们需要用大数据集进行测试，但我们的大部分开发工作在更小的测试数据和更短的反馈循环下会更快完成。这个话题在第[3]章中有更详细的讨论。


    5.  `安全性`：如果未经自动化，就不是安全的。手动审计和扫描是件麻烦事。审计如此困难，以至于我们下意识地为问题找借口，并且两次审计之间间隔很长。安全参数、补丁和加固程序必须实现自动化以维持安全性。私有实例可以被彻底锁定，使其比共享环境更安全。例如，在`listener.ora`文件中，设置`HOST
    = LOCALHOST`，外部用户就无法连接数据库。如果不共享任何东西且没有敏感数据，权限问题就会减少。如果我们在自己的私有数据库上都拥有 DBA 权限，我们就有了一个测试安全特性的地方，例如授予角色和创建用户。然而，在私有数据库上拥有提升的权限，并非忽视安全的借口。提升的权限赋予了开发人员尽早并经常实践安全性的责任。这将为开发人员带来更多的初始工作，因为他们必须意识到在高级环境中哪些提升的权限是不可用的。但这项额外的工作是一项长期投资。我们不能仅仅依赖管理员日后去加固一切。

    '
- fmt: '## 6. `Performance`


    Personal computers (`PCs`) often outperform development servers. Shared servers
    are often old and optimized for reliability and durability instead of performance.
    I’ve seen plenty of times when an insanely expensive server was much slower than
    a surprisingly cheap laptop. Don’t blindly accept management’s sunk cost fallacy
    reasoning that the servers must be fast because we paid a lot of money for them;
    compare the CPU performance with the `SPEC CPU` benchmarks, and roughly compare
    I/O with a few simple full table scans. Even if the shared server is much faster
    than our laptops, we obviously have to share that server with others. For performance
    testing in a lower environment, consistency is just as important as mirroring
    the production environment. It’s easier to isolate tests on a private system.


    ## 7. `Licensing`


    Oracle licenses are complex and expensive, but only for shared servers. Many of
    Oracle’s developer tools are free, and virtually every product can be freely downloaded
    from [`https://download.oracle.com`](https://download.oracle.com). Spend a few
    minutes to read the `OTN License Agreement`. Without paying any money, we can
    use Oracle databases for “developing, testing, prototyping, and demonstrating”
    our applications. If that license doesn’t work, then we can buy `Personal Edition`
    for only a few hundred bucks. `Personal Edition` has almost all the same features
    as `Enterprise Edition` and even comes with `Oracle Support`. The biggest difference
    is that `Personal Edition` is only for one user on one personal computer. `Personal
    Edition` doesn’t include options like `Real Application Clusters (RAC)`, but we
    don’t need `RAC` for most of our development anyway. Oracle licensing can be a
    real nightmare, and we need to be careful, but sometimes we can simply go to their
    website and buy the software we need. But we still need to be aware of what options
    we have licensed, because an option that is free on our laptop may still cost
    a lot of money in production.


    ## 8. `Initial setup is easier`


    Setting up a large number of private databases is easier than setting up a small
    number of servers. This happens because creating a large number of databases forces
    us to standardize and automate. And private databases make the process more democratic;
    everyone is involved, has the same privileges, and can work together to incrementally
    improve the processes.


    Moving from shared databases to private databases gives us a huge boost in productivity.
    Distributed development even makes us happier – without artificially scarce resources,
    there will be no yelling or finger-pointing when someone blocks a resource. There’s
    no need for a developer tragedy of the commons; everyone can have a near-infinite
    supply of Oracle databases.


    There are a few cases where shared databases are required for development. Typically,
    the reasons are historical; once a project is headed down the shared database
    or private database path, it’s hard to change course. And some complex software
    and resources cannot be easily redeployed. But don’t use deficiencies in tools
    as an excuse to do things the old-fashioned way. It’s perfectly reasonable to
    say, “If we can’t automate this tool, the tool is not worth using anymore.” The
    information technology industry is always moving toward more automation. Infrastructure
    is not like an untouchable mainframe – infrastructure should be code that can
    be easily changed.


    ### Create Private Databases: Local Installation


    Once we decide to create private databases, how exactly is it done? There are
    many ways to give every developer multiple, private database instances. The trendy
    way to do this is with some combination of the cloud, virtual machines (`VMs`),
    and containers. But private databases do not require any fancy new technology.
    The simplest way to achieve our goal is to install Oracle on our personal computers
    (`PCs`). The choice isn’t between accessible cloud computing and an unapproachable
    mainframe; the PC revolution is still alive.


    The actual software installation is easy – download and install `Enterprise` or
    `Personal Edition` on our laptop or desktop. We should use a version of Oracle
    as powerful as the version used in production. That means we should probably avoid
    `Oracle Express Edition`, which has hardware restrictions, is unsupported, and
    is missing important features.


    Installing a local instance of Oracle is simple and only requires a few steps.
    Administering an Oracle database can be difficult, but it’s much easier when we
    don’t have to worry about reliability and durability. Database administrators
    stay up at night worrying about backups and the many layers of software needed
    to keep shared servers running smoothly. Administration is much easier for our
    private development databases; we can ignore backups, and if we can’t fix the
    database after a few minutes, we can simply reinstall it.


    It might be difficult to create a private database that perfectly matches the
    production environment. For example, we don’t want to install `Real Application
    Clusters (RAC)` or `Automatic Storage Management (ASM)` on our laptops. And our
    laptops likely won’t even have the same operating system as production. Luckily,
    for 99.9% of Oracle development, those underlying technologies don’t matter. `RAC`,
    `ASM`, the operating system, and many other components are invisible to users.
    Oracle is a highly portable system and has abstracted much of the underlying architecture.
    Our private databases won’t be quite as stable without `RAC`, but the difference
    between 99.9% uptime and 99.99% uptime doesn’t matter for development.


    Even if our development must stay a shared database, there are still benefits
    to giving everyone a private database. It’s always helpful to have a sandbox to
    play around in and not worry about breaking anything. A lot of testing and learning
    can be done on a private database, even if the database is empty.


    The next section covers other options that are more advanced but require more
    work up front. We don’t need to implement one of those technologies to be agile;
    a personal computer with “plain old on-premise software” is often all we need.'
  raw: '6.  *Performance*: Personal computers (PCs) often outperform development servers.
    Shared servers are often old and optimized for reliability and durability instead
    of performance. I’ve seen plenty of times when an insanely expensive server was
    much slower than a surprisingly cheap laptop. Don’t blindly accept management’s
    sunk cost fallacy reasoning that the servers must be fast because we paid a lot
    of money for them; compare the CPU performance with the SPEC CPU benchmarks, and
    roughly compare I/O with a few simple full table scans. Even if the shared server
    is much faster than our laptops, we obviously have to share that server with others.
    For performance testing in a lower environment, consistency is just as important
    as mirroring the production environment. It’s easier to isolate tests on a private
    system.


    7.  *Licensing*: Oracle licenses are complex and expensive, but only for shared
    servers. Many of Oracle’s developer tools are free, and virtually every product
    can be freely downloaded from [`https://download.oracle.com`](https://download.oracle.com).
    Spend a few minutes to read the OTN License Agreement. Without paying any money,
    we can use Oracle databases for “developing, testing, prototyping, and demonstrating”
    our applications. If that license doesn’t work, then we can buy Personal Edition
    for only a few hundred bucks. Personal Edition has almost all the same features
    as Enterprise Edition and even comes with Oracle Support. The biggest difference
    is that Personal Edition is only for one user on one personal computer. Personal
    Edition doesn’t include options like Real Application Clusters (RAC), but we don’t
    need RAC for most of our development anyway. Oracle licensing can be a real nightmare,
    and we need to be careful, but sometimes we can simply go to their website and
    buy the software we need. But we still need to be aware of what options we have
    licensed, because an option that is free on our laptop may still cost a lot of
    money in production.


    8.  *Initial setup is easier*: Setting up a large number of private databases
    is easier than setting up a small number of servers. This happens because creating
    a large number of databases forces us to standardize and automate. And private
    databases make the process more democratic; everyone is involved, has the same
    privileges, and can work together to incrementally improve the processes.


    Moving from shared databases to private databases gives us a huge boost in productivity.
    Distributed development even makes us happier – without artificially scarce resources,
    there will be no yelling or finger-pointing when someone blocks a resource. There’s
    no need for a developer tragedy of the commons; everyone can have a near-infinite
    supply of Oracle databases.


    There are a few cases where shared databases are required for development. Typically,
    the reasons are historical; once a project is headed down the shared database
    or private database path, it’s hard to change course. And some complex software
    and resources cannot be easily redeployed. But don’t use deficiencies in tools
    as an excuse to do things the old-fashioned way. It’s perfectly reasonable to
    say, “If we can’t automate this tool, the tool is not worth using anymore.” The
    information technology industry is always moving toward more automation. Infrastructure
    is not like an untouchable mainframe – infrastructure should be code that can
    be easily changed.


    ### Create Private Databases: Local Installation


    Once we decide to create private databases, how exactly is it done? There are
    many ways to give every developer multiple, private database instances. The trendy
    way to do this is with some combination of the cloud, virtual machines (VMs),
    and containers. But private databases do not require any fancy new technology.
    The simplest way to achieve our goal is to install Oracle on our personal computers
    (PCs). The choice isn’t between accessible cloud computing and an unapproachable
    mainframe; the PC revolution is still alive.


    The actual software installation is easy – download and install Enterprise or
    Personal Edition on our laptop or desktop. We should use a version of Oracle as
    powerful as the version used in production. That means we should probably avoid
    Oracle Express Edition, which has hardware restrictions, is unsupported, and is
    missing important features.


    Installing a local instance of Oracle is simple and only requires a few steps.
    Administering an Oracle database can be difficult, but it’s much easier when we
    don’t have to worry about reliability and durability. Database administrators
    stay up at night worrying about backups and the many layers of software needed
    to keep shared servers running smoothly. Administration is much easier for our
    private development databases; we can ignore backups, and if we can’t fix the
    database after a few minutes, we can simply reinstall it.


    It might be difficult to create a private database that perfectly matches the
    production environment. For example, we don’t want to install Real Application
    Clusters (RAC) or Automatic Storage Management (ASM) on our laptops. And our laptops
    likely won’t even have the same operating system as production. Luckily, for 99.9%
    of Oracle development, those underlying technologies don’t matter. RAC, ASM, the
    operating system, and many other components are invisible to users. Oracle is
    a highly portable system and has abstracted much of the underlying architecture.
    Our private databases won’t be quite as stable without RAC, but the difference
    between 99.9% uptime and 99.99% uptime doesn’t matter for development.


    Even if our development must stay a shared database, there are still benefits
    to giving everyone a private database. It’s always helpful to have a sandbox to
    play around in and not worry about breaking anything. A lot of testing and learning
    can be done on a private database, even if the database is empty.


    The next section covers other options that are more advanced but require more
    work up front. We don’t need to implement one of those technologies to be agile;
    a personal computer with “plain old on-premise software” is often all we need.'
  trans: '

    ## 6. `性能`


    个人电脑（`PC`）的性能常常超过开发服务器。共享服务器通常比较陈旧，其优化方向是可靠性与持久性，而非性能。我多次看到，一台极其昂贵的服务器，其速度却远逊于一台价格惊人的便宜笔记本电脑。不要盲目接受管理层那种沉没成本谬误的推理——认为服务器因为我们花了很多钱买它，所以一定很快。我们应该用
    `SPEC CPU` 基准测试来比较 CPU 性能，并用几次简单的全表扫描来大致比较 I/O 性能。即使共享服务器比我们的笔记本电脑快得多，我们也显然需要与他人共享那台服务器。对于较低环境（lower
    environment）中的性能测试，一致性与镜像生产环境同样重要。在私有系统上隔离测试会更容易。


    ## 7. `许可`


    Oracle 的许可协议复杂且昂贵，但这仅限于共享服务器。Oracle 的许多开发者工具是免费的，实际上，几乎每个产品都可以从 [`https://download.oracle.com`](https://download.oracle.com)
    免费下载。花几分钟时间阅读 `OTN 许可协议`。无需支付任何费用，我们就可以将 Oracle 数据库用于“开发、测试、原型设计和演示”我们的应用程序。如果那个许可不适用，那么我们可以只花几百美元购买
    `个人版`。`个人版` 拥有与 `企业版` 几乎相同的所有功能，甚至附带 `Oracle 支持`。最大的区别是，`个人版` 只能供一台个人电脑上的一个用户使用。`个人版`
    不包含像 `真正应用集群 (RAC)` 这样的选项，但大多数情况下，我们的开发也不需要 `RAC`。Oracle 许可真可能是个噩梦，我们需要小心，但有时我们只需访问他们的网站购买所需的软件即可。不过，我们仍然需要清楚我们已许可了哪些选项，因为在我们笔记本电脑上免费的一个选项，在生产环境中可能仍要花费很多钱。


    ## 8. `初始设置更简单`


    设置大量的私有数据库比设置少量的服务器更容易。这是因为创建大量数据库迫使我们进行标准化和自动化。而且私有数据库使过程更加民主化；每个人都参与其中，拥有相同的权限，并且可以协作逐步改进流程。


    从共享数据库转向私有数据库能极大地提升我们的生产力。分布式开发甚至让我们更快乐——没有了人为稀缺的资源，当有人阻塞一个资源时，就不会有叫喊或指责。开发者公地悲剧不复存在；每个人都可以拥有近乎无限的
    Oracle 数据库供应。


    在少数情况下，开发确实需要共享数据库。通常，原因是历史性的；一旦一个项目走上了共享数据库或私有数据库的道路，就很难改变方向。而且有些复杂的软件和资源无法轻松地重新部署。但不要以工具的缺陷为借口，坚持用老方法做事。完全有理由说：“如果我们无法将这个工具自动化，那这个工具就不值得再用了。”信息技术行业始终朝着更多自动化的方向发展。基础设施不应像不可触碰的大型机——基础设施应该是可以轻松更改的代码。


    ### 创建私有数据库：本地安装


    一旦我们决定创建私有数据库，具体该怎么做呢？有很多方法可以为每位开发者提供多个私有数据库实例。时髦的做法是结合使用云、虚拟机（`VMs`）和容器。但私有数据库并不需要任何花哨的新技术。实现我们目标的最简单方法是在我们的个人电脑（`PCs`）上安装
    Oracle。选择并非只能在易用的云计算和难以企及的大型机之间进行；个人电脑革命依然生机勃勃。


    实际的软件安装很简单——在我们的笔记本电脑或台式机上下载并安装 `企业版` 或 `个人版`。我们应该使用一个与生产环境所用版本同样强大的 Oracle 版本。这意味着我们或许应该避免使用
    `Oracle 快捷版`，因为它有硬件限制、不受支持，并且缺少重要功能。


    安装本地 Oracle 实例很简单，只需几个步骤。管理 Oracle 数据库可能很困难，但当我们不必担心可靠性和持久性时，就容易多了。数据库管理员会彻夜难眠，担心备份以及维持共享服务器平稳运行所需的许多层软件。对于我们的私有开发数据库，管理起来就容易得多；我们可以忽略备份，如果几分钟内无法修复数据库，直接重新安装即可。


    创建一个与生产环境完美匹配的私有数据库可能很困难。例如，我们不想在笔记本电脑上安装 `真正应用集群 (RAC)` 或 `自动存储管理 (ASM)`。而且我们的笔记本电脑操作系统也可能与生产环境不同。幸运的是，对于
    99.9% 的 Oracle 开发来说，那些底层技术并不重要。`RAC`、`ASM`、操作系统和许多其他组件对用户是不可见的。Oracle 是一个高度可移植的系统，并且已经抽象化了许多底层架构。没有
    `RAC`，我们的私有数据库不会那么稳定，但 99.9% 的正常运行时间与 99.99% 的正常运行时间之间的差异，对于开发来说无关紧要。


    即使我们的开发必须保持为共享数据库，为每个人提供一个私有数据库仍然有好处。拥有一个可以随意尝试而不用担心破坏任何东西的沙箱总是有益的。许多测试和学习可以在私有数据库上完成，即使数据库是空的。


    下一节将介绍其他选项，这些选项更高级，但前期需要更多工作。我们不需要实现那些技术之一也能做到敏捷；一台装有“朴素老式本地软件”的个人电脑通常就是我们所需要的全部。

    '
- fmt: '### Create Private Databases: Other Options


    There are many ways to create a database, and it’s worth at least briefly mentioning
    the different options. In practice, you may end up with some combination of different
    approaches, such as the cloud, virtual machines, containers, the multitenant option,
    or just multiple schemas. As long as one of these more complicated solutions provides
    an infinite number of databases, they can all help us achieve our goal of creating
    an efficient development process.


    *Cloud platforms* have risen in popularity in recent years. There are obvious
    advantages to farming out the low-level tasks so we can stay focused on the high-level
    tasks. Moving to the cloud can easily have big advantages to your organization,
    by freeing you from worrying about managing things like electricity, operating
    systems, patching, etc. But keep in mind that, as a SQL developer, the cloud will
    not help you much if you’re still suck sharing a small number of databases.


    There are many books written about cloud computing platforms, and this isn’t the
    place to compare them. Oracle was late to the cloud, but their offerings have
    finally started to get interesting since their 19c autonomous database. While
    I can’t recommend a specific cloud for your business, I do recommend Oracle’s
    Always Free tier if you just need a small database for learning, testing, or running
    the examples in this book. Although Oracle’s cloud isn’t nearly as popular as
    other’s, you will appreciate the enormous difference between “Always Free” and
    “Trial” if you’ve ever received a scary billing email.


    *Virtual machines* are great for rapidly creating entire environments. For example,
    Oracle’s Developer Day VM contains almost everything you need to start database
    programming immediately. Using the free VirtualBox program, you can quickly load
    the VM image and have an entire system with Oracle Linux, an Oracle database,
    Oracle SQL Developer, and more. You can easily customize the image, save it, and
    share it with your team to ensure that everyone is using an identical configuration.
    If we use virtual machines everywhere, we can rapidly clone production, use that
    image for development, and avoid almost all platform differences.


    Having a gold image of your configuration on a virtual machine is useful especially
    for tasks that require rollbacks, such as tests that are part of a continuous
    integration and delivery (CI/CD) system. In theory, our deployment changes have
    a rollback section, but history tells us that our rollbacks are going to fail,
    and the system will gradually drift from what it should be. Constantly restarting
    from an image helps prevent that configuration drift.


    *Containers* can alleviate the inevitable resource problems caused by using virtual
    machines. Each VM instance has an entire copy of an operating system, which will
    waste a lot of space and memory. Container programs like Docker will enable multiple
    images to share some of those operating system resources while keeping the applications
    isolated. The only downside to containers is that they require packaging the application
    binaries, and historically Oracle has not always played well with Docker. This
    might be because Oracle prefers you to use their own type of container solution,
    the multitenant option.


    The *multitenant* option uses Oracle as the container engine. For each database
    instance, a single *container database (CDB)* holds much of the base configuration
    and data dictionary. The application schemas live in lightweight *pluggable databases
    (PDBs)*, each of which looks just like a regular old database. The (considerable)
    downsides are that extra configuration is required, the database must have been
    installed with the multitenant architecture, and you must have a multitenant license
    for more than three PDBs. The payoff is that once multitenant is working, creating
    a clone of an existing database may literally be as easy as `CREATE PLUGGABLE
    DATABASE orclpdb2 FROM orclpdb1`.


    As a last resort, we can at least install our programs on multiple schemas and
    give everyone a separate schema. This approach has its own challenges, such as
    dealing with multiple schemas that all reference each other (synonyms may help),
    shared global resources like directories, etc.


    I’ve worked at businesses with shared databases, and I’ve worked at businesses
    with private databases. It’s always been a night-and-day difference. Organizations
    with shared databases have more missed deadlines, uglier code, and a developer
    class system that breeds finger-pointing and fear. Organizations with an unlimited
    number of databases have better products, cleaner code, and an egalitarian environment
    that makes people happy and helps them reach their full potential.


    There are many choices for installing the database software, but that’s still
    the easy part of creating a good development environment. The hard part is recreating
    custom schemas.


    ## Rapidly Drop and Recreate Schemas


    Deploying database changes is easy – if we deploy frequently. There are many fancy
    ways to create and run database scripts, but good old-fashioned text files and
    `SQL*Plus` are the best tools.


    ### Why Deploy Often?


    Database deployments are full of errors, uncertainty, and performance problems.
    Databases are more difficult to deploy than traditional applications, because
    databases have more persistent data. But we can’t blame our deployment problems
    solely on databases being difficult. Deployment problems will happen to any process
    that is rarely used.


    Practice makes perfect. If deployments are run by many people, many times a day,
    they will become easy and painless. But easy deployments are only possible if
    everyone works on private databases, as discussed in the previous section. As
    soon as we are done with our work, we should drop and recreate the schemas to
    test the build scripts. (Or, more frequently nowadays, that process is done automatically
    as part of a commit.) Dropping and recreating schemas, even for complicated database
    programs, can be done in less than a minute. Constantly recreating schemas lets
    us find failures immediately. Mistakes can be fixed instantly, since the code
    is still fresh in our minds.


    Everyone on the team should be involved with creating build scripts. Deployments
    are a natural part of any database change, so building deployments should not
    be farmed out to a separate team. In some organizations the senior developers
    look down upon mere deployments and assign that drudge work to the junior developers.
    But we should take pride in our work, so we should take pride in the way it is
    packaged and delivered and see it through to the end. Once an efficient system
    is put in place, creating and testing deployment scripts will be easy anyway.


    It helps to create a culture that strongly discourages breaking the build. Breaking
    the build is the ultimate sign of disrespect in the programming world; other people
    can’t do their job because one person was too lazy to run a simple test. We don’t
    need to publicly shame people, but we do need to make it clear that creating roadblocks
    for other people is not acceptable. This can be a hard lesson for people accustomed
    to shared database development. Those developers come from a world where breaking
    code is inevitable, and they may not understand that breaking the build is no
    longer acceptable. (Alternatively, we can avoid this whole situation by configuring
    our repository to automatically check builds before a commit.)'
