- fmt: '### Navigating Inline Views


    With nested views, proper indenting, and putting parentheses on lines by themselves
    (sometimes called the Allman style), it’s easy to navigate the code and highlight
    only the inline views we want to run. Without changing any code, we can quickly
    debug most of a large SQL statement.


    `Figure 12-4` shows how we could highlight and run the first three inline views.
    Don’t even try to read the code; the text is too small and doesn’t matter anyway.
    Just focus on the *shape* of the highlighted selections. Also, notice how we can
    see the result set after each execution, at the bottom of the IDE window.


    ![](images/471418_2_En_12_Chapter/471418_2_En_12_Fig4_HTML.png)


    Three snippets, with a table at the bottom of each represent the highlight and
    run of the first three inline views. Launch, launch vehicle stage, and engine.


    `Figure 12-4`


    Debugging the example from Chapter `6` by running the first three inline views


    This debugging is easier and more powerful than traditional imperative debugging.
    We don’t need to compile the code for debug, we don’t need another interface to
    step through the code, and we can inspect entire *sets* of data at each level,
    not merely a few scalar values. It would be trivial to find any problem with the
    first three inline views.


    After we’ve run the innermost inline views, we can start combining the inline
    views and generating higher-level result sets. `Figure 12-5` shows how we’re now
    selecting *groups* of inline views and moving up the hierarchy. Once again, don’t
    try to read the code; just look at the shape of the highlighted sections. At each
    additional level, we can see our data get combined and transformed. With any modern
    IDE, it’s trivial to see huge amounts of data at one time, making debugging much
    simpler.


    ![](images/471418_2_En_12_Chapter/471418_2_En_12_Fig5_HTML.png)


    Three snippets, with a table at the bottom of each illustrate the selection of
    groups of inline views and moving up the hierarchy.


    `Figure 12-5`


    Debugging the example from Chapter `6` by running the last three inline views


    `Figure 12-4` and `Figure 12-5` simply run a pre-built query. We can easily modify
    and rerun any level of the query and see how that change affects the results.
    For example, we might want to run the query with a finer granularity, to only
    focus on one problem row. To narrow our debugging scope, we might add a condition
    like `LAUNCH_ID = 1` to the first inline view.


    Since each highlighted block is independent, we can replace inline views with
    any relational source. We can tweak the inline view code to add more or less rows,
    completely rewrite the query, or replace it with a view. We could even procedurally
    generate the source data with a `PL/SQL` table function that returns a collection.
    (That advanced technique is described in Chapter `21`.)


    We can easily view columns that are not projected by changing one of the inline
    views to start with a `SELECT *`. Using a `SELECT *` at the top level of a query
    is a bad idea – we don’t want to return more data than we need. But using a `SELECT
    *` in one of the nested inline views can make debugging easier.


    ## Summary


    The best advice for a new programmer is the less you know, the less you should
    do. Start small instead of trying to build everything at once and ending up with
    a bewildering number of errors. This advice is a tiny version of failing fast.
    Nested inline views help us start small. The most colossal query starts with a
    simple `SELECT * FROM SOME_TABLE`.


    Unfortunately, with SQL, too many developers start small and end small. But you
    now have the ability, environment, knowledge, and style to start writing progressively
    larger SQL statements. Start programming out of your comfort zone. Try building
    things in SQL that might seem too complicated or maybe even a bad idea.


    You will certainly run into problems when trying to build large SQL statements.
    Large SQL statements create performance risks and require a new way of reading
    and debugging. But if you don’t give up, you will certainly solve most of those
    problems and create SQL statements that are faster and easier to use.


    # 13. Write Beautiful SQL Statements


    The most important thing about programming styles is to have one. This subjective
    and opinionated chapter shows how traditional SQL styles can prevent us from realizing
    Oracle SQL’s true potential.


    Beauty is in the eye of the beholder, but we should base our sense of beauty on
    sound principles. Too many developers spend all their time heads-down coding and
    don’t stop to ask important meta-questions. We should occasionally look at our
    code and ask ourselves, “*Why* does this code look good?”


    Let’s start with a concrete example. The following query counts the orbital and
    deep space launches per launch agency. There may be more than one organization
    responsible for a launch, so we need to use the bridge table `LAUNCH_AGENCY` to
    join `LAUNCH` and `ORGANIZATION`. This first query is my preferred style and is
    the same style used throughout this book:


    ```

    --My preferred SQL programming style.

    --Organizations with the most orbital and deep space launches.

    select organization.org_name, count(*) launch_count

    from launch

    join launch_agency

    on launch.launch_id = launch_agency.launch_id

    join organization

    on launch_agency.agency_org_code = organization.org_code

    where launch.launch_category in (''deep space'', ''orbital'')

    group by organization.org_name

    order by launch_count desc, org_name;

    ORG_NAME                                        LAUNCH_COUNT

    ---------------------------------------------   ------------

    Strategic Rocket Forces                                 1543

    Upravleniye Nachalnika Kosmicheskikh Sredstv             905

    National Aeronautics and Space Administration            470

    ...

    ```


    The following query returns the same results as the preceding query but is written
    in a more traditional SQL programming style:


    ```

    --Traditional SQL programming style.

    --Organizations with the most orbital and deep space launches.

    SELECT o.org_name, COUNT(*) launch_count

    FROM launch l, launch_agency la, organization o

    WHERE l.launch_id = la.launch_id

    AND la.agency_org_code = o.org_code

    AND l.launch_category IN (''deep space'', ''orbital'')

    GROUP BY o.org_name

    ORDER BY launch_count DESC, o.org_name;

    ```


    The rest of this chapter compares and contrasts the styles used in the preceding
    two examples. Regardless of our opinions about the styles, there is one style
    choice that we can all agree on: use SQL as much as possible. If we rewrote the
    preceding queries using imperative, row-by-row logic, the code would be slower
    and more complex.


    We’re not just trying to make our SQL look visually pleasing. The true purpose
    of a programming style is to reduce the complexity and improve the readability
    of our code. After we internalize the goals of simplicity and readability, our
    opinions of what constitutes beautiful SQL should reflect an objective goal of
    better code.'
