  raw: '## Typing


    Typing is the most underrated skill in programming. Typing isn’t exactly the most
    exciting part of our jobs, but we can benefit from mastering it.


    The precise typing speed doesn’t matter. One hundred twenty words per minute is
    not really twice as fast as 60 words per minute, because we don’t often type at
    full speed. But 60 words per minute is more than twice as fast as 30 words per
    minute, because at that speed we’re touch typing instead of looking at the keyboard.
    We must be able to type as fast as we can think. Then we can concentrate on what
    matters and not constantly lose our train of thought. If we can type properly,
    we won’t be tempted to take shortcuts, like using one-letter variable names or
    avoiding comments. If we spend most of our workday on a keyboard, then we really
    ought to master it.


    Learning how to properly type isn’t difficult anyway. If we already have some
    typing skills, it’s trivial to find typing tutorials online to help us improve.
    We don’t need to learn the optimized Dvorak keyboard layout (although that layout
    may help people with repetitive strain injuries.) And we don’t need to enter typing
    competitions. Just a few minutes a day and we can quickly fill in any gaps in
    a fundamental skill.


    Learning relevant keyboard shortcuts also helps us work faster and spend more
    time thinking about things that matter. At the operating system level, we should
    be able to cut, copy, paste, switch between windows, open menus, switch tabs,
    and move between words, lines, and pages, without looking at our keyboard. And
    it’s worth learning or configuring keyboard shortcuts for popular programs, like
    our IDE.


    With a highly optimized environment, we can write and run simple queries in seconds
    instead of minutes. That time difference doesn’t just make us work faster; it
    makes us work differently. Like the way we subconsciously avoid websites that
    take too long to load, we also avoid writing queries if the process is slow. Speed
    matters when we’re in a data analysis mode, and we need dozens or hundreds of
    queries to thoroughly investigate an issue.


    If you want to challenge yourself to learn the keyboard better, hide the mouse
    for a day. For most programming tasks, using the mouse only slows us down. Browsing
    the Web will be painful, but working without a mouse will make us better at most
    of our programs.


    ## Operating Systems and Supporting Programs


    Advanced SQL development requires knowledge of many other programs. We have to
    run our SQL on different systems and in different contexts. We need programs to
    help us interpret, manage, and share the results. This section lists many programs
    and skills we should be familiar with.


    ### Operating Systems


    When developing SQL, we may have two operating systems to deal with – the client
    that creates the SQL and the server that runs the SQL. Even if there’s a GUI for
    every operating system task, it’s worth understanding the command line. The command
    line is more powerful and faster, after the learning curve. If you’re not familiar
    with your server or client operating systems, try to learn one new command a day.
    We don’t necessarily need to write shell scripts, but we can at least benefit
    from being able to navigate the file system and move things around.


    ### Text Editors


    Text editors are important, even if we do most of our work in an IDE. SQL development
    involves lots of data, and much of that data starts as text. Every programmer
    needs to use a text editor more powerful than Notepad. There are plenty of free
    options for all platforms, like Notepad++, Notepad2, vi, etc. If we have corporate
    IT policies preventing us from installing programs, we can download an executable-only
    version. Most graphical text editors are easy to figure out – we just have to
    spend a few minutes exploring toolbars and menus. Unix editors, like vi, can be
    more challenging. Luckily there are online video game tutorials that teach vi,
    such as [`https://vim-adventures.com`](https://vim-adventures.com).


    Any decent text editor supports regular expressions. Regular expressions are invaluable
    to data processing, and we should use them often. For example, a common SQL problem
    is converting lists of values into SQL data. Instead of manually modifying the
    data, regular expressions can make the data conversion much faster.


    Imagine a large text file with comma-separated data. We want to turn the following
    file of data into a table of data:


    ```

    a,1

    b,2

    c,3

    ```


    Our goal is to convert the preceding text into the following SQL statement:


    ```

    select ''a'',1 from dual union all

    select ''b'',2 from dual union all

    select ''c'',3 from dual;

    ```


    With regular expressions we can convert the data in only four small steps. Open
    the editor’s find and replace dialog, usually with Ctrl+F. Enable regular expression
    mode, usually by clicking a check box. Then make four replacements:


    1.  Replace “`^`” with “`select ''`”.


    2.  Replace “`,`” with “`'',`”.


    3.  Replace “`$`” with “ `from dual union all`”.


    4.  Manually remove the last “ `union all`”.


    Regular expressions are cryptic and confusing at first. But they are powerful
    tools for finding and changing data. They can also be used in Oracle SQL through
    the `REGEXP_` functions. Chapter [7](#471418_2_En_7_Chapter.xhtml) briefly discusses
    those functions and the regular expression syntax.


    ### Comparison Tools


    Comparison is a core part of SQL development. If we stick to the relational model,
    most of our comparisons can be done with SQL joins and predicates. But inevitably
    we must compare semi-structured data, like text files or source code. We need
    a way to quickly compare large amounts of text and drill down to the precise byte
    differences. There are many free and open source programs to compare data, such
    as WinMerge. Most version control clients can also compare files.


    For example, text comparison programs can help with comparing long `CREATE TABLE`
    statements. Let’s use the simple example from Chapter [2](#471418_2_En_2_Chapter.xhtml),
    where we saw how weird the output from `DBMS_METADATA.GET_DDL` can be. The following
    commands are identical, except that the table `TEST2` is created with the option
    `PCTFREE 0`. The difference is easy to spot when we’re creating the tables:


    ```

    create table test1 as select 1 a from dual;

    create table test2 pctfree 0 as select 1 a from dual;

    select dbms_metadata.get_ddl(''TABLE'', ''TEST1'') from dual;

    select dbms_metadata.get_ddl(''TABLE'', ''TEST2'') from dual;

    ```


    But when we compare the output, there’s so much worthless information it’s hard
    to find any meaningful differences. (As discussed in Chapter [2](#471418_2_En_2_Chapter.xhtml),
    this abundance of metadata is why we want to save the handmade SQL statements,
    not the system-generated ones.) The differences between the two tables become
    obvious in a comparison tool, and we can tell exactly which characters are different
    in Figure [5-1](#471418_2_En_5_Chapter.xhtml#Fig1).


    ![](images/471418_2_En_5_Chapter/471418_2_En_5_Fig1_HTML.jpg)


    The snippet represents directions to create a table for Jheller for tests 1 and
    2\. The pctfree for test 1 is 10 and 0 for test 2.


    Figure 5-1


    Using WinMerge to compare `DBMS_METADATA.GET_DDL` output for two similar tables'
  trans: '## 输入


    输入是编程中最被低估的技能。输入本身并不是我们工作中特别令人兴奋的部分，但通过掌握它，我们可以受益良多。


    确切的输入速度并不重要。每分钟一百二十个词并不真的比每分钟六十个词快一倍，因为我们并不总是以最快速度打字。但每分钟六十个词比每分钟三十个词快一倍以上，因为在这个速度下，我们是在盲打，而不是盯着键盘看。我们必须能够打得和想得一样快。这样我们才能专注于重要的事情，而不会不断中断思路。如果我们能正确地打字，就不会倾向于走捷径，比如使用单字母变量名或避免注释。如果我们大部分工作时间都花在键盘上，那么我们真的应该掌握它。


    学习如何正确打字其实并不难。如果我们已经有一些打字技能，在网上找到打字教程来帮助我们提高是轻而易举的事。我们不需要学习优化的德沃夏克键盘布局（尽管这种布局可能有助于患有重复性劳损的人）。我们也不需要参加打字比赛。每天只需几分钟，我们就能快速填补这项基本技能的空白。


    学习相关的键盘快捷键也有助于我们更快地工作，并花更多时间思考重要的事情。在操作系统层面，我们应该能够无需看键盘就能剪切、复制、粘贴、切换窗口、打开菜单、切换标签页，以及在单词、行和页面之间移动。而且，为流行的程序（比如我们的
    IDE）学习或配置键盘快捷键是值得的。


    在一个高度优化的环境中，我们可以在几秒钟内（而不是几分钟）编写并运行简单的查询。这种时间差异不仅让我们工作得更快；它让我们以不同的方式工作。就像我们下意识地避免访问加载时间过长的网站一样，如果编写查询的过程很慢，我们也会避免编写查询。当我们处于数据分析模式时，速度至关重要，我们需要几十个或几百个查询来彻底调查一个问题。


    如果你想挑战自己更好地掌握键盘，可以把鼠标藏起来一天。对于大多数编程任务，使用鼠标只会让我们变慢。浏览网页会很痛苦，但不用鼠标工作会让我们在大多数程序中做得更好。


    ## 操作系统与支持程序


    高级 SQL 开发需要了解许多其他程序。我们必须在不同的系统和上下文中运行 SQL。我们需要程序来帮助我们解释、管理和分享结果。本节列出了许多我们应该熟悉的程序和技能。


    ### 操作系统


    开发 SQL 时，我们可能需要处理两个操作系统——创建 SQL 的客户端和运行 SQL 的服务器。即使每个操作系统任务都有 GUI，了解命令行也是值得的。在度过学习曲线之后，命令行更强大、更快。如果你不熟悉你的服务器或客户端操作系统，试着每天学习一个新命令。我们不一定要编写
    shell 脚本，但至少能够浏览文件系统和移动文件就能让我们受益。


    ### 文本编辑器


    文本编辑器很重要，即使我们的大部分工作是在 IDE 中完成的。SQL 开发涉及大量数据，而这些数据很多最初都是文本。每个程序员都需要使用一个比记事本功能更强大的文本编辑器。所有平台都有很多免费选项，比如
    Notepad++、Notepad2、vi 等。如果我们公司的 IT 政策不允许安装程序，可以下载仅可执行文件版本。大多数图形化文本编辑器都很容易上手——我们只需要花几分钟探索工具栏和菜单即可。Unix
    编辑器，比如 vi，可能更具挑战性。幸运的是，有在线视频游戏教程教授 vi，比如 [`https://vim-adventures.com`](https://vim-adventures.com)。


    任何像样的文本编辑器都支持正则表达式。正则表达式对于数据处理非常宝贵，我们应该经常使用它们。例如，一个常见的 SQL 问题是将值列表转换为 SQL 数据。与其手动修改数据，正则表达式可以使数据转换快得多。


    想象一个包含逗号分隔数据的大型文本文件。我们希望将以下数据文件转换为一个数据表：


    ```

    a,1

    b,2

    c,3

    ```


    我们的目标是将前面的文本转换为以下 SQL 语句：


    ```

    select ''a'',1 from dual union all

    select ''b'',2 from dual union all

    select ''c'',3 from dual;

    ```


    使用正则表达式，我们只需四个小步骤就可以转换数据。打开编辑器的查找和替换对话框，通常用 Ctrl+F。启用正则表达式模式，通常通过点击复选框。然后进行四次替换：


    1.  将 `^` 替换为 `select ''`。

    2.  将 `,` 替换为 `'',`。

    3.  将 `$` 替换为 ` from dual union all`。

    4.  手动删除最后一个 ` union all`。


    正则表达式起初看起来神秘而令人困惑。但它们是查找和更改数据的强大工具。它们也可以通过 `REGEXP_` 函数在 Oracle SQL 中使用。第 7 章简要讨论了这些函数和正则表达式语法。


    ### 比较工具


    比较是 SQL 开发的核心部分。如果我们坚持关系模型，我们的大部分比较都可以通过 SQL 连接和谓词来完成。但不可避免地，我们必须比较半结构化数据，比如文本文件或源代码。我们需要一种方法来快速比较大量文本，并深入到精确的字节差异。有许多免费和开源的程序可以比较数据，比如
    WinMerge。大多数版本控制客户端也可以比较文件。


    例如，文本比较程序可以帮助比较长的 `CREATE TABLE` 语句。让我们使用第 2 章中的简单例子，在那里我们看到 `DBMS_METADATA.GET_DDL`
    的输出会有多奇怪。以下命令是相同的，只是表 `TEST2` 是用选项 `PCTFREE 0` 创建的。在创建表时，差异很容易发现：


    ```

    create table test1 as select 1 a from dual;

    create table test2 pctfree 0 as select 1 a from dual;

    select dbms_metadata.get_ddl(''TABLE'', ''TEST1'') from dual;

    select dbms_metadata.get_ddl(''TABLE'', ''TEST2'') from dual;

    ```


    但是当我们比较输出时，有太多无用的信息，很难找到任何有意义的差异。（如第 2 章所述，元数据如此丰富，这就是为什么我们想要保存手工编写的 SQL 语句，而不是系统生成的。）在比较工具中，两个表之间的差异变得显而易见，我们可以确切地看到哪些字符不同，如图
    5-1 所示。


    ![](img/471418_2_En_5_Fig1_HTML.jpg)


    该片段代表为 Jheller 的测试 1 和测试 2 创建表的指令。测试 1 的 pctfree 为 10，测试 2 为 0。


    图 5-1


    使用 WinMerge 比较两个类似表的 `DBMS_METADATA.GET_DDL` 输出'
- fmt: '### Reporting Tools and Excel


    IDEs are great at retrieving results from SQL queries, but those initial results
    don’t always look pretty. Spreadsheets and reporting tools can help us present
    the results in a better format. Reporting software and business intelligence are
    large topics and outside the scope of this book. But for many purposes, Microsoft
    Excel is good enough to enhance our results.


    Most IDEs let us export data to Excel with just a few clicks. In Excel, we should
    learn how to do simple operations like sort, filter, remove duplicates, create
    a header row, create simple formulas like `=SUM(A1:A100)`, and create simple charts.
    We can learn the basics of any spreadsheet program in just a few hours. The presentation
    of our data matters more than we think. Before sharing data with nontechnical
    people, we should at least put the results in Excel.


    We need many more programs for our daily work, like browsers, email clients, terminal
    emulators, version control, etc. There’s no need to discuss those programs here,
    since there’s nothing SQL-specific about them. But the theme of this chapter applies
    to those programs as well: invest time to learn about our tools.


    ## SQL and PL/SQL


    If you’re reading this book, you’re already dedicated to learning SQL. But it’s
    worth briefly discussing why it is beneficial to spend so much time to `master`
    a single language. We need to justify this investment to ourselves, our coworkers,
    and our employers.


    Developers frequently claim that it’s easy to learn a new programming language.
    But learning a programming language is only easy in three cases: the rare genius
    who can learn anything quickly, a language without much depth, or a developer
    who doesn’t mind writing average code.


    People undervalue expertise. Sometimes we forget how painful it is to master a
    skill. Think about all the words in this sentence – when and where did we learn
    them? We can’t remember, but our parents and teachers can tell us stories about
    our years of struggle to master a language. Sometimes we don’t value expertise
    because of the Dunning–Kruger effect; we overestimate our skills because we don’t
    even know enough to accurately judge our knowledge.


    Becoming an expert can take a long time. Ten years is a common estimate, but it’s
    impossible to find an exact number. It takes a long time to get good enough at
    something to be able to do it without thinking about it. It takes a long time,
    and intentional practice, to know by intuition when our code isn’t right. Those
    10 years of experience can’t be 1 year of experience repeated ten times. We need
    to work hard, continually improve, and put ourselves in situations where we are
    not the smartest person in the room.


    SQL’s English-like syntax makes the language easy for beginners to store, update,
    and retrieve data. But it’s Oracle SQL’s extra features that let us optimally
    process and manage that data. The entire Oracle database ecosystem includes not
    only SQL but the procedural extension PL/SQL, pseudo-scripting languages like
    `SQL*Plus`, hundreds of packages and utilities, converged database features like
    support for XML and JSON, and even low-code website building tools like APEX.


    The extra keywords, functionality, and concepts are why we must spend more time
    to master Oracle SQL than a traditional programming language. The extra work,
    and extra knowledge, can justify our time and money spent on things like training
    and going to conferences.


    Is it worth the time and money to become an expert? In many cases, the answer
    is no. Most of our projects don’t significantly benefit from being great instead
    of merely good. Career-wise, the jack-of-all-trades developers usually do better
    than the specialists, especially with the industry shift toward DevOps. For me,
    it’s a personal choice to be an expert in one language instead of being OK in
    two languages. I’m sick of all the mediocre software in the world. If we want
    to create amazing programs, we must spend the time to become experts.


    ## SQL\*Plus


    `SQL*Plus` is a great tool but only in specific contexts. `SQL*Plus` is the simplest
    way to use the database. That simplicity is an advantage for scripting, demos,
    troubleshooting, and when we can’t use a graphical tool. But `SQL*Plus` will stunt
    our growth as developers if we use it for development, debugging, and ad hoc querying.


    ### When We Should Use SQL\*Plus


    `SQL*Plus` is great for scripting installations, as described in Chapter [2](#471418_2_En_2_Chapter.xhtml).
    And it’s great for building reproducible test cases, as described in Chapter [3](#471418_2_En_3_Chapter.xhtml).
    The simple, text-only format leaves nothing hidden and makes the program helpful
    for troubleshooting. There are times when we don’t have a desktop environment
    available, and `SQL*Plus` is our only choice. For some administrative tasks, we
    only have a terminal available. Even when we have a remote desktop, sometimes
    the connections are too slow to use graphical programs, and we’re stuck with the
    command line. We’re going to have to use `SQL*Plus` sometimes, so we might as
    well get used to it.


    When we use `SQL*Plus`, we must use the real thing. Many IDEs have a built-in
    `SQL*Plus` clone that we should avoid. Those clones are always missing important
    features, and sometimes they’re missing important bugs. The main benefit of `SQL*Plus`
    is the portability and compatibility across different platforms and versions.
    If something works in your `SQL*Plus`, but fails in mine, one of us isn’t using
    the real thing. I’ve seen many deployments fail because a developer used a `SQL*Plus`
    clone that didn’t have the 2,499-character-per-line limit. The code worked on
    their machine, but it failed on production when a real `SQL*Plus` was used. Those
    limits are annoying, but we need to be aware of limits as early in the development
    cycle as possible.'
