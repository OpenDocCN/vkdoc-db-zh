  trans: '

    ### 执行计划


    执行计划是 SQL 调优的关键。执行计划展示了执行 SQL 语句所用操作的精确顺序，以及告诉我们 Oracle 如何做出决策的有用信息。这些操作和细节揭示了用于运行我们查询的算法和数据结构。Oracle
    优化器根据 SQL 语句、与 SQL 语句相关的对象、关于我们数据库环境的统计信息等来生成执行计划。


    执行计划常与查询计划或解释计划混淆。重要的区别在于，执行计划是 Oracle 实际使用的计划，而解释计划仅仅是 Oracle 可能使用的预测性计划。“实际”一词在接下来的两章中会频繁使用，因为这是
    Oracle 用来描述实际数值与估计值的术语。例如，我们稍后会看到，“A-rows”或“实际行数”可能与“E-rows”或“估计行数”**大相径庭**。我们必须时刻清楚自己是在查看实际计划和数值，还是估计计划和数值，否则将**浪费**大量时间在不值得调优的事情上。


    SQL 调优的核心就是发现、理解并修复执行计划。第 18 章将更详细地讨论发现和修复计划的多种方法。总结而言，发现和理解计划的最佳方式是以纯文本形式结合实际数值（而非仅仅是估计值）。而修复执行计划的最佳方式是间接的，即提供更多信息以便
    Oracle 优化器做出更好的决策。


    例如，生成估计解释计划的最简单方法是使用`EXPLAIN PLAN`命令，如下所示：


    ```

    --生成解释计划。

    explain plan for

    select * from launch where launch_id = 1;

    ```


    以下命令和结果显示了上述语句的解释计划^(³⁸)：


    ```

    --显示解释计划。

    select *

    from table(dbms_xplan.display(format => ''basic +rows +cost''));

    Plan hash value: 4075417019


    | Id | Operation                   | Name     | Rows | Cost (%CPU) |

    |----|-----------------------------|----------|------|-------------|

    |  0 | SELECT STATEMENT            |          |    1 |    2   (0)  |

    |  1 |  TABLE ACCESS BY INDEX ROWID| LAUNCH   |    1 |    2   (0)  |

    |  2 |   INDEX UNIQUE SCAN         | LAUNCH_PK|    1 |    1   (0)  |


    ```


    目前，您不必完全理解上述输出的所有内容。现在，只需理解执行计划对于理解 Oracle 性能的重要性就足够了。


    ## 操作（可用的执行计划决策有哪些）


    执行计划是 SQL 调优的关键，而操作是理解执行计划的关键。许多开发人员 SQL 调优失败是因为他们关注了错误的东西。仅仅知道 SQL 语句运行了多久或者
    SQL 语句在特定事件上等待了多久是不够的。按*操作*来衡量事物比按*语句*衡量更有帮助。您甚至可以说本章的标题是错误的——本章更多是关于“操作调优”而非“SQL
    调优”。


    ### 操作详情


    执行计划中的每一行对应一个操作，该操作映射到一种算法。执行计划中的“名称”列告诉我们该算法所使用的数据结构。


    精确的算法取决于操作名称和操作选项的组合。截至 19c，共有 149 种操作和 259 种操作选项。通常，单个操作只有几个有效选项。例如，`HASH JOIN`是一个操作，`OUTER`是一个操作选项。为方便起见，在大多数执行计划格式中，这些名称会组合成`HASH
    JOIN OUTER`。


    操作通过缩进来表示父子关系。这种缩进方式有些棘手，需要时间适应，但它至关重要。缩进告诉我们哪些算法先执行，以及行如何在操作之间传递。即使只改变操作行中的一个空格，也可能彻底改变执行计划的含义。


    ### 执行计划与递归 SQL


    大多数操作会消耗行，对这些行进行处理，然后产生新行。例如，哈希连接消耗来自两个不同子源的数据行，将它们合并，然后为父操作产生一个连接后的数据集。该中间结果集可能随后再与其他内容连接。


    执行计划的嵌套结构反映了我们应该用小型、嵌套的内联视图来构建 SQL 语句的方式。就像构建逻辑 SQL 语句一样，理解执行计划就是理解小的操作集，将它们组合成一个新的集合，并重复这一过程。


    但执行计划并不总是那么简单。执行计划中可能没有显示大量实际工作。有时，我们需要调优一个*递归*SQL 语句——这是为支持我们的 SQL 语句而自动生成的 SQL
    语句。递归 SQL（不要与使用`CONNECT BY`的递归查询混淆）可以通过多种方式生成：嵌入 SQL 的自定义 PL/SQL 函数、包含 SQL 的触发器、解析查询或构建执行计划所需的元数据查询、由远程数据库处理的远程对象等。（但视图不是递归
    SQL 语句。视图中的查询会被添加到我们的 SQL 语句中，就像我们复制粘贴了文本一样。）


    如果我们使用像`DBMS_SQLTUNE.REPORT_SQL_MONITOR`这样的高级调优工具，当“活动百分比”值的总和不为 100%时，我们就能判断存在缓慢的递归
    SQL。可以通过查看`V$SQL`等视图来找到缓慢的递归查询，这将在下一章中解释。幸运的是，当我们知道要查找什么时，这些递归查询往往很显眼，容易捕捉。


    ### 操作为何重要


    要理解执行计划，我们需要知道有哪些操作和操作选项可用。正如前一章所讨论的，不同的算法在不同的场景下是最优的。我们需要知道算法是什么以及何时应该使用它们。


    本节列出了最常见的操作和操作选项及其适用场景。有许多指导原则，但我们并不总有精确的指令。例如，哈希连接适用于大量数据，而嵌套循环适用于少量数据。但“大”和“小”的精确定义取决于许多因素。


    SQL 调优的科学在于获取精确的测量值，并找出哪些操作耗时最多，以及哪些操作可能更有效。但我们并不总有时间进行科学分析；SQL 调优的艺术则要快得多。最终，您将能够看着一个执行计划，就能直觉地判断某个操作不合适。您已经在本章中接触了许多列出的操作，并获得了关于它们何时有用的建议。但信息量很大，需要一段时间才能建立起对不良执行计划的直觉。


    本章中的操作名称和选项是基于我的经验以及我能访问的 350 个数据库中最流行的组合生成的。但此列表并非详尽无遗，您可能会根据所使用的功能看到不同的操作。


    以下 SQL 语句可帮助您查看系统中已使用和可用的操作：


    ```

    --最近使用的操作和选项组合。

    select operation, options, count(*)

    from v$sql_plan

    group by operation, options

    order by operation, options;

    --所有可用的操作名称和选项。（需以 SYS 身份运行。）

    select * from sys.x$xplton;

    select * from sys.x$xpltoo;

    ```

    '
- fmt: '### First Operations


    执行计划中的第一个操作只是命令名称的副本，没有太多意义。但第一个操作是一个有用的占位符，用于汇总整个计划的信息。例如，第一个操作的成本就是整个语句的总成本。^([^(39)](#fn39))


    以下是最常见的顶级操作，无需进一步解释：`CREATE INDEX STATEMENT`、`CREATE TABLE STATEMENT`、`INSERT
    STATEMENT`、`DELETE STATEMENT`、`MERGE STATEMENT`、`MULTI-TABLE INSERT`、`SELECT STATEMENT`
    和 `UPDATE STATEMENT`。


    从前述列表中，只有 `INSERT` 操作值得关注。`INSERT` 语句有一个子操作，用于指示该 `INSERT` 是使用了直接路径写入还是常规写入。`LOAD
    TABLE CONVENTIONAL` 表示使用了常规的 `INSERT`，这种方式可恢复但速度较慢。`LOAD AS SELECT` 表示使用了直接路径写入，这种方式不可恢复但速度快。


    ### Joining


    连接操作有很多种：


    1.  **HASH JOIN**：为较小的行源构建哈希表，然后为较大的行源的每一行探测该哈希表。适用于返回大量行的连接操作。需要等值条件。

    2.  **MERGE JOIN**：对两个行源进行排序，然后连接它们。适用于返回大量结果但不使用等值条件的连接操作。

    3.  **NESTED LOOPS**：对于一个行源中的每一行，在另一个行源中搜索匹配项。适用于返回少量结果的连接操作。输入行源中的一个或两个应该来自索引访问。

    4.  **JOIN FILTER**：一种可以在连接前快速消除行的布隆过滤器。只允许作为哈希连接的子操作。（我们无法对此操作做太多控制。）


    选项特别重要，它们能显著改变连接操作的行为。请记住，并非所有选项都对所有操作有效：


    1.  **ANTI**：反连接返回在一个行源中存在但在另一个行源中不存在的值所对应的行。与 `NOT IN` 和 `NOT EXISTS` 条件一起使用。此操作在找到匹配项后立即停止，因此比普通的全表扫描更快。

    2.  **SEMI**：半连接返回在一个行源中的值至少与另一个行源中的一个值匹配的行。与 `IN` 和 `EXISTS` 条件一起使用。此操作在找到匹配项后立即停止，因此比普通的全表扫描更快。

    3.  **BUFFERED**：写入到临时表空间的中间结果。行可以同时在执行计划的多个级别间流动，但这些同步点需要在进行下一步操作前检索所有行。

    4.  **OUTER/FULL OUTER/RIGHT OUTER**：执行外连接而不是内连接。外连接并不直接比内连接慢。但我们不应默认使用外连接，因为外连接提供的优化机会少于内连接。

    5.  **CARTESIAN**：将一个源中的每一行与另一个源中的每一行组合。也称为交叉连接，此选项仅对 `MERGE JOIN` 有效。此选项在执行计划中是一个危险信号。除非行数极少，否则此选项可能导致极差的性能。


    ### Table Access


    表是 Oracle 中最重要的数据结构。最重要的表访问操作如下：


    1.  **TABLE ACCESS**：不言自明。

    2.  **MAT_VIEW ACCESS**：物化视图将查询结果存储为表。底层数据结构与表相同，只是名称不同。

    3.  **FAST DUAL**：`DUAL` 是一个用于生成数据的特殊表。在现代版本的 Oracle 中，从 `DUAL` 读取永远不需要从磁盘读取。

    4.  **FIXED TABLE**：类似于从 `DUAL` 读取，Oracle 的动态性能视图由内存结构填充。从 `V$` 视图读取不需要磁盘访问。

    5.  **EXTERNAL TABLE ACCESS**：从操作系统文件动态读取以创建表。


    以下是表访问操作的选项：


    1.  **FULL**：全表扫描是从表中读取大量数据的最快方式，因为它们可以利用多块读取。

    2.  **BY [LOCAL|GLOBAL] INDEX ROWID [BATCHED]**：基于存储在索引中的 `ROWID`，快速访问行的物理位置。索引可能存储用于过滤的数据，但不一定包含表行所需的所有数据。每个索引条目都包含一个
    `ROWID`，可用于快速访问表数据。`LOCAL` 和 `GLOBAL` 关键字与分区表相关。`BATCHED` 选项是一个较新的功能，Oracle 会尝试对
    `ROWID` 进行批处理，从而无需多次访问同一个表块。

    3.  **BY USER ROWID**：基于存储在表或字面量中的 `ROWID`，快速访问行的物理位置。此操作可能是访问数据最快的方式，因此通过 `ROWID`
    存储和检索数据会很有帮助。另一方面，当数据更改时，行可能会移动位置，因此在存储 `ROWID` 时要小心。

    4.  **SAMPLE**：从表中返回随机样本数据。

    5.  **CLUSTER**：聚簇表可以将两个表预连接存储在一起。（实际上，此选项现在已经很少使用，除了少数字典表。）


    ### Index Access


    最常见的索引操作如下：


    1.  **INDEX**：B 树索引是提升性能的关键数据结构。索引通常用于快速从表中检索少量数据。

    2.  **BITMAP INDEX/AND/OR/MINUS/CONVERSION**：位图适用于低基数列，例如状态列。通过组合位图索引可以快速执行多个
    `AND` 和 `OR` 操作。B 树索引可以转换为位图以进行快速比较。

    3.  **DOMAIN INDEX**：自定义索引类型。除非我们使用 Oracle Text 等高级选项，否则这些操作很少见。

    4.  **FIXED TABLE (FIXED INDEX)**：动态性能视图也可以有仅驻留在内存中的索引。


    这些索引选项大多只适用于 B 树索引：


    1.  **RANGE SCAN**：最常见的索引访问类型。此选项高效地遍历 B 树，可以快速返回一小部分行。

    2.  **UNIQUE SCAN**：类似于范围扫描，但在找到一行后停止。

    3.  **FAST FULL SCAN**：像读取表的瘦版本一样读取索引，并且可以使用快速的多块读取。如果我们需要检索大量行且所有相关列都在同一个索引中，这是一个不错的选择。

    4.  **FULL SCAN**：按顺序从索引中读取数据。按特定顺序读取数据需要较慢的单块读取，但提供预排序的结果。

    5.  **SCAN (MIN/MAX)**：类似于范围扫描，但只需要遍历 B 树的第一条或最后一条路径即可获取最小值或最大值。（此选项有一个名为 `FIRST
    ROW` 的子操作。）

    6.  **SKIP SCAN**：当多列索引的引导列无法使用时发生。此选项效率低下，表明我们可能需要创建另一个索引。'
  raw: '### First Operations


    The first operation in an execution plan is just a copy of the command name and
    doesn’t have much meaning. But the first operation is a useful placeholder for
    information that sums up the entire plan. For example, the cost for the first
    operation is the total cost for the entire statement.^([^(39)](#fn39))


    These are the most common top-level operations, which need no further explanation:
    `CREATE INDEX STATEMENT`, `CREATE TABLE STATEMENT`, `INSERT STATEMENT`, `DELETE
    STATEMENT`, `MERGE STATEMENT`, `MULTI-TABLE INSERT`, `SELECT STATEMENT`, and `UPDATE
    STATEMENT`.


    From the preceding list, only the `INSERT` operations are interesting. `INSERT`
    statements have a child operation that indicates whether the `INSERT` used direct-path
    writes or conventional writes. `LOAD TABLE CONVENTIONAL` indicates that a normal
    `INSERT` was used, which will be recoverable but slow. `LOAD AS SELECT` indicates
    that a direct-path write was used, which is non-recoverable but fast.


    ### Joining


    There are many join operations:


    1.  HASH JOIN: Builds a hash table of the smaller row source and then probes that
    hash table for each row of the larger row source. Best operation for joins that
    return a large percentage of rows. Requires an equality condition.


    2.  MERGE JOIN: Sorts both row sources and then joins them. Best operation for
    joins that return a large percentage of results but do not use an equality condition.


    3.  NESTED LOOPS: For each row in one row source, search for a match in the other
    row source. Best operation for joins that return a small percentage of results.
    One or both of the input row sources should come from an index access.


    4.  JOIN FILTER: A bloom filter that can be used to quickly eliminate rows before
    joining. Only allowed as a child operation of a hash join. (There’s not much we
    can do to control this operation.)


    The options are especially important, and they can significantly change the behavior
    of join operations. Remember that not all options are valid for all operations:


    1.  ANTI: Anti-joins return rows where a value in one row source does not exist
    in another row source. Used with `NOT IN` and `NOT EXISTS` conditions. This operation
    stops as soon as a match is found, so it is faster than a normal full table scan.


    2.  SEMI: Semi-joins return rows where a value in one row source matches at least
    one value from another row source. Used with `IN` and `EXISTS` conditions. This
    operation stops as soon as a match is found, so it is faster than a normal full
    table scan.


    3.  BUFFERED: Intermediate results that are written to temporary tablespace. Rows
    can flow between many levels of an execution plan at the same time, but these
    synchronization points require retrieving all rows before moving to the next operation.


    4.  OUTER/FULL OUTER/RIGHT OUTER: Performs an outer join instead of an inner join.
    An outer join isn’t directly slower than an inner join. But we should not use
    outer joins by default, since outer joins provide less optimization opportunities
    than inner joins.


    5.  CARTESIAN: Combines every row from one source with every row from another
    source. Also known as cross joins, this option is only valid for `MERGE JOIN`.
    This option is a red flag in execution plans. Unless we have an extremely small
    number of rows, this option may lead to horrible performance.


    ### Table Access


    Tables are the most important data structure in Oracle. The most important table
    access operations are as follows:


    1.  TABLE ACCESS: Self-explanatory.


    2.  MAT_VIEW ACCESS: Materialized views store the results of a query as a table.
    The underlying data structure is identical to a table; it just has a different
    name.


    3.  FAST DUAL: `DUAL` is a special table used for generating data. Reading from
    `DUAL` in modern versions of Oracle never requires reading from disk.


    4.  FIXED TABLE: Similar to reading from `DUAL`, Oracle’s dynamic performance
    views are populated by memory structures. Reading from `V$` views does not require
    disk access.


    5.  EXTERNAL TABLE ACCESS: Reads from operating system files to create a table
    on the fly.


    The following are the options for table access operations:


    1.  FULL: Full table scans are the fastest way to read a large percentage of data
    from a table, as they can take advantage of multi-block reads.


    2.  BY [LOCAL|GLOBAL] INDEX ROWID [BATCHED]: Quickly accesses a row’s physical
    location, based on a `ROWID` stored in an index. Indexes may store data used for
    filtering, but not necessarily all the data needed from the table row. Each index
    entry contains a `ROWID` that can be used to quickly access the table data. The
    `LOCAL` and `GLOBAL` keywords are relevant for partitioned tables. The `BATCHED`
    option is a newer feature where Oracle will try to batch the `ROWID`s so it won’t
    have to access the same table block more than once.


    3.  BY USER ROWID: Quickly accesses a row’s physical location, based on a `ROWID`
    stored in a table or a literal. This operation is perhaps the fastest way to access
    data, so storing and retrieving data by `ROWID` can be helpful. On the other hand,
    rows can move locations when data changes, so be careful when storing a `ROWID`.


    4.  SAMPLE: Returns a random sample of data from a table.


    5.  CLUSTER: Clustered tables can store two tables pre-joined together. (In practice
    this option is rarely used anymore, other than a few dictionary tables.)


    ### Index Access


    The most common index operations are as follows:


    1.  INDEX: B-tree indexes are a vital data structure for performance. Indexes
    are generally used for quickly retrieving a small percentage of data from a table.


    2.  BITMAP INDEX/AND/OR/MINUS/CONVERSION: Bitmaps are ideal for low-cardinality
    columns, like statuses. Multiple `AND` and `OR` operations can be quickly performed
    by combining bitmap indexes. B-tree indexes can be converted into bitmaps for
    quick comparisons.


    3.  DOMAIN INDEX: Custom index types. These operations are rare unless we’re using
    advanced options like Oracle Text.


    4.  FIXED TABLE (FIXED INDEX): Dynamic performance views can also have indexes
    that only reside in memory.


    Most of these index options only apply to B-tree indexes:


    1.  RANGE SCAN: The most common type of index access. This option efficiently
    traverses the B-tree and can quickly return a small percentage of rows.


    2.  UNIQUE SCAN: Similar to range scan but stops after it finds one row.


    3.  FAST FULL SCAN: Reads the index like a skinny version of the table and can
    use fast multi-block reads. Good option if we need to retrieve a large percentage
    of rows and all of the relevant columns are in the same index.


    4.  FULL SCAN: Reads data from the index in order. Reading data in a specific
    order requires slower single-block reads but provides presorted results.


    5.  SCAN (MIN/MAX): Similar to a range scan, but only needs to traverse the first
    or last path of a B-tree to get the minimum or maximum value. (This option has
    a child operation named `FIRST ROW`.)


    6.  SKIP SCAN: Occurs when the leading column of a multicolumn index cannot be
    used. This option is inefficient and is a sign that we may want to create another
    index.'
  trans: '### 首次操作


    执行计划中的第一个操作只是命令名称的副本，本身意义不大。但第一个操作是一个有用的占位符，用于汇总整个计划的信息。例如，第一个操作的成本就是整个语句的总成本。^(³⁹)


    以下是最常见的顶级操作，无需进一步解释：`CREATE INDEX STATEMENT`、`CREATE TABLE STATEMENT`、`INSERT
    STATEMENT`、`DELETE STATEMENT`、`MERGE STATEMENT`、`MULTI-TABLE INSERT`、`SELECT STATEMENT`
    和 `UPDATE STATEMENT`。


    在前面的列表中，只有 `INSERT` 操作值得关注。`INSERT` 语句有一个子操作，用于指示该 `INSERT` 是使用了直接路径写入还是常规写入。`LOAD
    TABLE CONVENTIONAL` 表示使用了常规的 `INSERT`，这种方式可恢复但速度较慢。`LOAD AS SELECT` 表示使用了直接路径写入，这种方式不可恢复但速度快。


    ### 连接操作


    连接操作有很多种：


    1.  **哈希连接**：为较小的行源构建哈希表，然后为较大的行源的每一行探测该哈希表。适用于返回大量行的连接操作。需要等值条件。

    2.  **归并连接**：对两个行源进行排序，然后连接它们。适用于返回大量结果但不使用等值条件的连接操作。

    3.  **嵌套循环**：对于一个行源中的每一行，在另一个行源中搜索匹配项。适用于返回少量结果的连接操作。输入行源中的一个或两个应该来自索引访问。

    4.  **连接过滤器**：一种可以在连接前快速消除行的布隆过滤器。只允许作为哈希连接的子操作。（我们无法对此操作做太多控制。）


    选项特别重要，它们能显著改变连接操作的行为。请记住，并非所有选项都对所有操作有效：


    1.  **反连接**：反连接返回在一个行源中存在但在另一个行源中不存在的值所对应的行。与 `NOT IN` 和 `NOT EXISTS` 条件一起使用。此操作在找到匹配项后立即停止，因此比普通的全表扫描更快。

    2.  **半连接**：半连接返回在一个行源中的值至少与另一个行源中的一个值匹配的行。与 `IN` 和 `EXISTS` 条件一起使用。此操作在找到匹配项后立即停止，因此比普通的全表扫描更快。

    3.  **缓冲**：写入到临时表空间的中间结果。行可以同时在执行计划的多个级别间流动，但这些同步点需要在进行下一步操作前检索所有行。

    4.  **外连接/全外连接/右外连接**：执行外连接而不是内连接。外连接并不直接比内连接慢。但我们不应默认使用外连接，因为外连接提供的优化机会少于内连接。

    5.  **笛卡尔积**：将一个源中的每一行与另一个源中的每一行组合。也称为交叉连接，此选项仅对 `MERGE JOIN` 有效。此选项在执行计划中是一个危险信号。除非行数极少，否则此选项可能导致极差的性能。


    ### 表访问


    表是 Oracle 中最重要的数据结构。最重要的表访问操作如下：


    1.  **表访问**：不言自明。

    2.  **物化视图访问**：物化视图将查询结果存储为表。底层数据结构与表相同，只是名称不同。

    3.  **快速 DUAL 访问**：`DUAL` 是一个用于生成数据的特殊表。在现代版本的 Oracle 中，从 `DUAL` 读取永远不需要从磁盘读取。

    4.  **固定表访问**：类似于从 `DUAL` 读取，Oracle 的动态性能视图由内存结构填充。从 `V$` 视图读取不需要磁盘访问。

    5.  **外部表访问**：从操作系统文件动态读取以创建表。


    以下是表访问操作的选项：


    1.  **全表扫描**：全表扫描是从表中读取大量数据的最快方式，因为它们可以利用多块读取。

    2.  **通过[本地|全局]索引 ROWID [批处理]**：基于存储在索引中的 `ROWID`，快速访问行的物理位置。索引可能存储用于过滤的数据，但不一定包含表行所需的所有数据。每个索引条目都包含一个
    `ROWID`，可用于快速访问表数据。`本地` 和 `全局` 关键字与分区表相关。`批处理` 选项是一个较新的功能，Oracle 会尝试对 `ROWID`
    进行批处理，从而无需多次访问同一个表块。

    3.  **通过用户 ROWID**：基于存储在表或字面量中的 `ROWID`，快速访问行的物理位置。此操作可能是访问数据最快的方式，因此通过 `ROWID`
    存储和检索数据会很有帮助。另一方面，当数据更改时，行可能会移动位置，因此在存储 `ROWID` 时要小心。

    4.  **抽样**：从表中返回随机样本数据。

    5.  **聚簇访问**：聚簇表可以将两个表预连接存储在一起。（实际上，此选项现在已经很少使用，除了少数字典表。）


    ### 索引访问


    最常见的索引操作如下：


    1.  **索引**：B 树索引是提升性能的关键数据结构。索引通常用于快速从表中检索少量数据。

    2.  **位图索引/与/或/减/转换**：位图适用于低基数列，例如状态列。通过组合位图索引可以快速执行多个 `AND` 和 `OR` 操作。B 树索引可以转换为位图以进行快速比较。

    3.  **域索引**：自定义索引类型。除非我们使用 Oracle Text 等高级选项，否则这些操作很少见。

    4.  **固定表访问**：动态性能视图也可以有仅驻留在内存中的索引。


    这些索引选项大多只适用于 B 树索引：


    1.  **范围扫描**：最常见的索引访问类型。此选项高效地遍历 B 树，可以快速返回一小部分行。

    2.  **唯一扫描**：类似于范围扫描，但在找到一行后停止。

    3.  **快速全扫描**：像读取表的瘦版本一样读取索引，并且可以使用快速的多块读取。如果我们需要检索大量行且所有相关列都在同一个索引中，这是一个不错的选择。

    4.  **全扫描**：按顺序从索引中读取数据。按特定顺序读取数据需要较慢的单块读取，但提供预排序的结果。

    5.  **扫描**：类似于范围扫描，但只需要遍历 B 树的第一条或最后一条路径即可获取最小值或最大值。（此选项有一个名为 `FIRST ROW` 的子操作。）

    6.  **跳过扫描**：当多列索引的引导列无法使用时发生。此选项效率低下，表明我们可能需要创建另一个索引。'
- fmt: '### Grouping and Sorting


    Grouping and finding distinct values can be done with either the `HASH` or `SORT`
    operation. Those operations can have an option of either `GROUP BY` or `UNIQUE`.
    Hashing is usually faster than sorting, but in rare cases we may need to force
    the optimizer’s decision with a hint like `/*+ NO_USE_HASH_AGGREGATION */`.


    The `SORT` operation can also be used for options like `ORDER BY`, `CREATE INDEX`,
    `JOIN` (to order the results before a `MERGE JOIN`), and `AGGREGATE` (which is
    used when there’s an aggregate function without any grouping).


    Other than the `AGGREGATE` option, which doesn’t actually sort the data, we should
    try to avoid these slow `SORT` operations. However, sorting can be fast if it
    includes the option `STOPKEY`. `STOPKEY` means the processing stops after the
    first N rows, perhaps because of a `ROWNUM` or `FETCH`.


    Similar to sorting and hashing, there is also a `WINDOW` operation, which is used
    for analytic functions. Analytic functions are powerful and fast and are usually
    a better option than writing self-joins. But watch out for nested `WINDOW` operations.
    If multiple analytic functions use different `PARTITION BY` or `ORDER BY` clauses,
    there will be a `WINDOW SORT` operation for each one. All that sorting can get
    expensive.


    ### Set Operators


    There are four set operators we can use to combine queries: `INTERSECT`, `MINUS`,
    `UNION`, and `UNION ALL`. (21c added `EXCEPT` as a synonym for `MINUS` and added
    an `ALL` option for `MINUS` and `INTERSECT`.) We might expect each command to
    have a separate operation, but those four commands only map to three execution
    plan operations: `INTERSECTION`, `MINUS`, and `UNION-ALL`. The `UNION` operator
    is converted to a `UNION ALL` operation, plus a `SORT UNIQUE` child operation.
    That extra sorting operation is why we should always use a `UNION ALL` if we know
    the values are already distinct.


    Oracle may convert queries to use set operations. Instead of only using one type
    of access on the whole table, sometimes it is better to access a table multiple
    times with different techniques and combine the results. With table expansion,
    Oracle can query different partitions in different ways. With OR expansions, Oracle
    can query different conditions in different ways – usually with different indexes.
    For both types of transformations, the new plan may look twice as large as the
    original, and the two halves will be put together with a `CONCATENATION` or `UNION
    ALL` operation.


    ### Optimizer Statistics


    Optimizer statistics are so vital to performance that Oracle has several operations
    dedicated to gathering them:


    1.  `STATISTICS COLLECTOR`: Gathers optimizer statistics in the middle of an execution
    plan, for adaptive query plans. An adaptive query plan can dynamically change
    itself if the actual cardinalities are different than the expected cardinalities.
    For example, an adaptive query plan may default to use nested loops for what it
    thinks is a join involving a small number of rows, but it will switch to a hash
    join if the number of rows is unexpectedly large.


    2.  `APPROXIMATE NDV`: Gathers an approximate distinct count in a single pass,
    without sorting or hashing.


    3.  `OPTIMIZER STATISTICS GATHERING`: Gathers optimizer statistics while the table
    is being created. If gathering statistics only requires a single pass and we’re
    loading a large amount of data, we might as well gather the stats at the same
    time.


    Gathering optimizer statistics can be slow, so we want to be aware of the preceding
    operations. If statistics are already gathered, we don’t need to duplicate the
    effort later. Or if the table doesn’t need statistics, we can suppress those operations
    with hints.


    ### Parallel


    Parallelism is a great opportunity to significantly improve the performance of
    slow SQL statements. Optimizing parallelism is tricky and requires careful attention
    to the syntax and execution plan. The following are the main parallel operations:


    1.  `PX BLOCK`: Reads blocks of data in parallel.


    2.  `PX SEND`: Sends the blocks up the execution plan to the next step. The option
    determines how the blocks are sent, which is an important decision. For small
    results, a `BROADCAST` option may work well – it sends all rows to all parallel
    servers. For large results, a `HASH` option may work well – it divides the rows
    among the parallel servers. There are several other options not discussed here.


    3.  `PX RECEIVE`: Receives rows from a `PX SEND`.


    4.  `PX COORDINATOR`: The final parallel operation that coordinates and controls
    the child parallel operations.


    The following example demonstrates how picky the syntax can be and how even subtle
    execution plan differences can be significant. First, let’s look at a statement
    where every step is run in parallel:


    ```sql

    --Fully parallel SQL statement.

    alter session enable parallel dml;

    explain plan for

    insert into engine

    select /*+ parallel(8) */ * from engine;

    select * from table(dbms_xplan.display);

    ------------------------------------------- ... -------------------

    |Id|Operation                             | ... |IN-OUT|PQ Distrib|

    ------------------------------------------- ... -------------------

    | 0|INSERT STATEMENT                      | ... |      |          |

    | 1| PX COORDINATOR                       | ... |      |          |

    | 2|  PX SEND QC (RANDOM)                 | ... | P->S |QC (RAND) |

    | 3|   INDEX MAINTENANCE                  | ... | PCWP |          |

    | 4|    PX RECEIVE                        | ... | PCWP |          |

    | 5|     PX SEND RANGE                    | ... | P->P |RANGE     |

    | 6|      LOAD AS SELECT (HYBRID TSM/HWMB)| ... | PCWP |          |

    | 7|       OPTIMIZER STATISTICS GATHERING | ... | PCWP |          |

    | 8|        PX BLOCK ITERATOR             | ... | PCWC |          |

    | 9|         TABLE ACCESS FULL            | ... | PCWP |          |

    ------------------------------------------- ... -------------------

    Note


    - Degree of Parallelism is 8 because of hint

    ```


    The following code has a small change. Instead of using the hint `PARALLEL(8)`,
    the code uses the hint `PARALLEL(ENGINE, 8)`. Spend a minute to compare the execution
    plans between the previous example and the following example:


    ```sql

    --Partially parallel SQL statement.

    alter session enable parallel dml;

    explain plan for

    insert into engine

    select /*+ parallel(engine, 8) */ * from engine;

    select * from table(dbms_xplan.display);

    ----------------------------- ... -------------------

    |Id|Operation               | ... |IN-OUT|PQ Distrib|

    ----------------------------- ... -------------------

    | 0|INSERT STATEMENT        | ... |      |          |

    | 1| LOAD TABLE CONVENTIONAL| ... |      |          |

    | 2|  PX COORDINATOR        | ... |      |          |

    | 3|   PX SEND QC (RANDOM)  | ... | P->S |QC (RAND) |

    | 4|    PX BLOCK ITERATOR   | ... | PCWC |          |

    | 5|     TABLE ACCESS FULL  | ... | PCWP |          |

    ----------------------------- ... -------------------

    Note


    - Degree of Parallelism is 8 because of table property

    - PDML disabled because object is not decorated with parallel clause

    - Direct Load disabled because no append hint given and not executing in parallel

    ```


    The plan differences are caused by the hint type. Parallelism has statement-level
    and object-level hints. We almost always want to use statement-level hints. If
    we’re going to run one operation in parallel, we might as well run all operations
    in parallel. (However, there are some important exceptions. For example, we wouldn’t
    want to run tiny, correlated subqueries in parallel.) The hint `PARALLEL(8)` tells
    Oracle to run everything in parallel. The hint `PARALLEL(ENGINE, 8)` tells Oracle
    to only parallelize the *read* from the `ENGINE` table.'
  raw: '### Grouping and Sorting


    Grouping and finding distinct values can be done with either the `HASH` or `SORT`
    operation. Those operations can have an option of either `GROUP BY` or `UNIQUE`.
    Hashing is usually faster than sorting, but in rare cases we may need to force
    the optimizer’s decision with a hint like `/*+ NO_USE_HASH_AGGREGATION */`.


    The `SORT` operation can also be used for options like `ORDER BY`, `CREATE INDEX`,
    `JOIN` (to order the results before a `MERGE JOIN`), and `AGGREGATE` (which is
    used when there’s an aggregate function without any grouping).


    Other than the `AGGREGATE` option, which doesn’t actually sort the data, we should
    try to avoid these slow `SORT` operations. However, sorting can be fast if it
    includes the option `STOPKEY`. `STOPKEY` means the processing stops after the
    first N rows, perhaps because of a `ROWNUM` or `FETCH`.


    Similar to sorting and hashing, there is also a `WINDOW` operation, which is used
    for analytic functions. Analytic functions are powerful and fast and are usually
    a better option than writing self-joins. But watch out for nested `WINDOW` operations.
    If multiple analytic functions use different `PARTITION BY` or `ORDER BY` clauses,
    there will be a `WINDOW SORT` operation for each one. All that sorting can get
    expensive.


    ### Set Operators


    There are four set operators we can use to combine queries: `INTERSECT`, `MINUS`,
    `UNION`, and `UNION ALL`. (21c added `EXCEPT` as a synonym for `MINUS` and added
    an `ALL` option for `MINUS` and `INTERSECT`.) We might expect each command to
    have a separate operation, but those four commands only map to three execution
    plan operations: `INTERSECTION`, `MINUS`, and `UNION-ALL`. The `UNION` operator
    is converted to a `UNION ALL` operation, plus a `SORT UNIQUE` child operation.
    That extra sorting operation is why we should always use a `UNION ALL` if we know
    the values are already distinct.


    Oracle may convert queries to use set operations. Instead of only using one type
    of access on the whole table, sometimes it is better to access a table multiple
    times with different techniques and combine the results. With table expansion,
    Oracle can query different partitions in different ways. With OR expansions, Oracle
    can query different conditions in different ways – usually with different indexes.
    For both types of transformations, the new plan may look twice as large as the
    original, and the two halves will be put together with a `CONCATENATION` or `UNION
    ALL` operation.


    ### Optimizer Statistics


    Optimizer statistics are so vital to performance that Oracle has several operations
    dedicated to gathering them:


    1.  STATISTICS COLLECTOR: Gathers optimizer statistics in the middle of an execution
    plan, for adaptive query plans. An adaptive query plan can dynamically change
    itself if the actual cardinalities are different than the expected cardinalities.
    For example, an adaptive query plan may default to use nested loops for what it
    thinks is a join involving a small number of rows, but it will switch to a hash
    join if the number of rows is unexpectedly large.


    2.  APPROXIMATE NDV: Gathers an approximate distinct count in a single pass, without
    sorting or hashing.


    3.  OPTIMIZER STATISTICS GATHERING: Gathers optimizer statistics while the table
    is being created. If gathering statistics only requires a single pass and we’re
    loading a large amount of data, we might as well gather the stats at the same
    time.


    Gathering optimizer statistics can be slow, so we want to be aware of the preceding
    operations. If statistics are already gathered, we don’t need to duplicate the
    effort later. Or if the table doesn’t need statistics, we can suppress those operations
    with hints.


    ### Parallel


    Parallelism is a great opportunity to significantly improve the performance of
    slow SQL statements. Optimizing parallelism is tricky and requires careful attention
    to the syntax and execution plan. The following are the main parallel operations:


    1.  PX BLOCK: Reads blocks of data in parallel.


    2.  PX SEND: Sends the blocks up the execution plan to the next step. The option
    determines how the blocks are sent, which is an important decision. For small
    results, a `BROADCAST` option may work well – it sends all rows to all parallel
    servers. For large results, a `HASH` option may work well – it divides the rows
    among the parallel servers. There are several other options not discussed here.


    3.  PX RECEIVE: Receives rows from a `PX SEND`.


    4.  PX COORDINATOR: The final parallel operation that coordinates and controls
    the child parallel operations.


    The following example demonstrates how picky the syntax can be and how even subtle
    execution plan differences can be significant. First, let’s look at a statement
    where every step is run in parallel:


    ```

    --Fully parallel SQL statement.

    alter session enable parallel dml;

    explain plan for

    insert into engine

    select /*+ parallel(8) */ * from engine;

    select * from table(dbms_xplan.display);

    ------------------------------------------- ... -------------------

    |Id|Operation                             | ... |IN-OUT|PQ Distrib|

    ------------------------------------------- ... -------------------

    | 0|INSERT STATEMENT                      | ... |      |          |

    | 1| PX COORDINATOR                       | ... |      |          |

    | 2|  PX SEND QC (RANDOM)                 | ... | P->S |QC (RAND) |

    | 3|   INDEX MAINTENANCE                  | ... | PCWP |          |

    | 4|    PX RECEIVE                        | ... | PCWP |          |

    | 5|     PX SEND RANGE                    | ... | P->P |RANGE     |

    | 6|      LOAD AS SELECT (HYBRID TSM/HWMB)| ... | PCWP |          |

    | 7|       OPTIMIZER STATISTICS GATHERING | ... | PCWP |          |

    | 8|        PX BLOCK ITERATOR             | ... | PCWC |          |

    | 9|         TABLE ACCESS FULL            | ... | PCWP |          |

    ------------------------------------------- ... -------------------

    Note


    - Degree of Parallelism is 8 because of hint

    ```


    The following code has a small change. Instead of using the hint `PARALLEL(8)`,
    the code uses the hint `PARALLEL(ENGINE, 8)`. Spend a minute to compare the execution
    plans between the previous example and the following example:


    ```

    --Partially parallel SQL statement.

    alter session enable parallel dml;

    explain plan for

    insert into engine

    select /*+ parallel(engine, 8) */ * from engine;

    select * from table(dbms_xplan.display);

    ----------------------------- ... -------------------

    |Id|Operation               | ... |IN-OUT|PQ Distrib|

    ----------------------------- ... -------------------

    | 0|INSERT STATEMENT        | ... |      |          |

    | 1| LOAD TABLE CONVENTIONAL| ... |      |          |

    | 2|  PX COORDINATOR        | ... |      |          |

    | 3|   PX SEND QC (RANDOM)  | ... | P->S |QC (RAND) |

    | 4|    PX BLOCK ITERATOR   | ... | PCWC |          |

    | 5|     TABLE ACCESS FULL  | ... | PCWP |          |

    ----------------------------- ... -------------------

    Note


    - Degree of Parallelism is 8 because of table property

    - PDML disabled because object is not decorated with parallel clause

    - Direct Load disabled because no append hint given and not executing in parallel

    ```


    The plan differences are caused by the hint type. Parallelism has statement-level
    and object-level hints. We almost always want to use statement-level hints. If
    we’re going to run one operation in parallel, we might as well run all operations
    in parallel. (However, there are some important exceptions. For example, we wouldn’t
    want to run tiny, correlated subqueries in parallel.) The hint `PARALLEL(8)` tells
    Oracle to run everything in parallel. The hint `PARALLEL(ENGINE, 8)` tells Oracle
    to only parallelize the *read* from the `ENGINE` table.'
