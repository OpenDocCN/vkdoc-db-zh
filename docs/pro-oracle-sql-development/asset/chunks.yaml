    We should avoid deprecated features. When Oracle discourages the use of certain
    features, we should heed their warning and switch to newer and better options.
    We should periodically check the “Database Upgrade Guide” for chapters full of
    newly deprecated and desupported features. Oracle usually keeps deprecated features
    around for a long time, but those features won’t be improved. The old versions
    will likely be buggier, less convenient, and slower than the new versions.


    For example, we can still use the old `EXP` and `IMP` utilities, but they’re not
    nearly as good as the new `EXPDP` and `IMPDP` utilities. Or we could still use
    many XML functions that were deprecated a long time ago, but they may run significantly
    slower than new XML functions.


    Do not confuse deprecated with desupported. Deprecated features still work fine
    and *might* be desupported in the next version. We should be cautious when using
    deprecated features, because we don’t want to tie our code to something that is
    going to break in the future. But we should also be skeptical of deprecation,
    because sometimes Oracle deprecates the cheap features to encourage us to buy
    the expensive features.


    ## Avoid Simplistic Explanations for Generic Errors


    Oracle has generic error messages that represent a large number of more specific
    errors. Using search engines to look up generic error messages doesn’t help, because
    each answer only covers one of the many possible root causes. We need to drill
    down to find the precise error message and all the relevant arguments and settings.
    There are several classes of these generic error messages: dead processes, deadlocks,
    and the top of the error stack.'
  trans: '## 避免自动化一切


    自动化固然很棒，但并非每一个自动化流程或技术都值得使用。对于每一个令人头疼的手动任务，都有一长串供应商愿意向我们推销软件，无论该软件是否合理。我们需要记住，许多信息技术项目都会失败，我们需要避免沉没成本谬误。有时，我们需要避开那些听起来有用但在实践中行不通的小功能。


    以下列表包含了在 Oracle 中不太奏效的自动化功能示例：


    1.  *自动内存管理：* 此功能从未被官方推荐，并且在 12.2 版本中它实际上已被禁用。这种功能失败对我来说没有道理——动态调整 PGA 和 SGA 的大小似乎不应该那么难。


    2.  *回收站空间压力：* 当系统需要空间时，删除的表理应被自动清理。但回收空间的算法文档记录很差，而且在实践中，当我们需要空间时，表并不总是能自行清除。目前，每次我们删除一个表时，仍然需要担心是否要添加
    `PURGE` 子句。


    3.  *调优顾问：* 优化器效果很好，Oracle 的性能监控工具也很好用，但那些建议性能更改的程序却很少有帮助。顾问可能对于简单问题，比如添加一个显而易见的索引，效果尚可。但根据我的经验，顾问对于复杂问题很少有帮助。不过，随着
    Oracle 投资其自治数据库，许多这些自动化性能流程应该会随着每个版本而改进。在升级时，值得重新评估这些顾问。


    4.  *版本控制：* 如第 2 章所述，我们无法完全自动化版本控制。我们不能随心所欲地在开发数据库中更改任何内容，并期望工具能神奇地将其复制到生产环境中。编程仍然最好使用版本控制的文本文件来完成，并手动检查冲突。


    请记住，标准化是自动化的先决条件。如果我们有一个完美的标准环境，前面提到的一些项目可能运作良好。如果我们有一个完全失控的环境，我们可能连自动化打补丁这样的任务都很难完成。


    有些事情最好用传统方式完成。但有些事情会随着时间而改变。希望前面列表中的大多数项目在未来版本的 Oracle 中或在自治的 Oracle 数据库云环境中能够完美运行。


    ## 避免 Cargo Cult 编程语法


    过多的复制粘贴编程会导致 Cargo cult 编程。Cargo cult 编程是指我们在代码中仪式性地包含某些东西，尽管我们没有理由相信这些东西会带来预期的结果，例如，将
    `COUNT(*)` 改为 `COUNT(1)`，将 `<>` 改为 `!=`，使用（不正确的）`NOLOGGING` 提示，或任何没有明显理由却被认为可以提高性能的微小语法更改。


    我们都曾犯过复制粘贴我们不理解的代码的错误。本书甚至偶尔会提倡使用一些奇怪的语法，例如使用 `ROWNUM` 来控制优化器转换。但我们需要偶尔质疑我们正在复制粘贴的内容。如果这些神奇的语法更改是真实的，我们应该能够测量它们。如果我们无法构建一个可复现的测试案例来证明某事，那么我们就不应该推广它。


    ## 避免使用未文档化的功能


    我们的代码不应依赖未文档化或不受支持的功能。Oracle 有许多有趣的功能闲置在那里，积满灰尘，但我们必须抵制使用那些日后可能让我们后悔的东西的冲动。那些未文档化的功能可能是某个可选组件的组成部分，而该组件将会被移除，或者它们可能是一个无法按预期工作的实验性功能。


    未文档化功能最著名的例子是 `WM_CONCAT` 函数。`WM_CONCAT` 是一个字符串连接函数，在内部作为工作区管理器的一部分使用。在 Oracle
    11.2 之前，没有标准的字符串连接函数，开发人员不得不自己创建。许多开发人员注意到 `WM_CONCAT` 已经存在，并开始使用该函数。不幸的是，`WM_CONCAT`
    在 12.1 版本中被移除，导致许多查询和程序在升级时中断。


    许多功能在正式文档化之前的版本中非官方地可用。也许那些功能是实验性的，bug 太多，或者尚未经过彻底测试。无论哪种情况，使用未文档化的功能都是愚蠢的。这个规则可能有一些例外；如果我们发现一个有用的功能，并且我们可以轻松测试该功能是否有效，并且它只会在临时的即兴脚本中使用，那么使用那个未文档化的功能可能是可以的。


    我们还应该避免使用未文档化的参数——那些以下划线开头的参数。理论上，我们只应在 Oracle 支持工程师告知时才设置未文档化的参数。但在实践中，我们可以阅读
    My Oracle Support 笔记，并通常能弄清楚何时需要未文档化的参数。而且，这并不像 Oracle 支持工程师一旦发现任何隐藏参数就会停止帮助我们。在实践中，所有数据库都设置了一些隐藏参数。


    ## 避免使用已弃用的功能


    我们应该避免使用已弃用的功能。当 Oracle 不鼓励使用某些功能时，我们应该听从他们的警告，转向更新更好的选项。我们应该定期检查“Database Upgrade
    Guide”，查看充满新近弃用和取消支持功能的章节。Oracle 通常会让弃用功能保留很长时间，但这些功能不会得到改进。旧版本很可能比新版本 Bug 更多、便利性更差、速度更慢。


    例如，我们仍然可以使用旧的 `EXP` 和 `IMP` 实用程序，但它们远不如新的 `EXPDP` 和 `IMPDP` 实用程序好。或者我们仍然可以使用许多很久以前就被弃用的
    XML 函数，但它们可能比新的 XML 函数运行速度慢得多。


    不要混淆弃用（deprecated）和取消支持（desupported）。弃用功能仍然可以正常工作，并且*可能*在下一个版本中被取消支持。在使用弃用功能时我们应该谨慎，因为我们不想让我们的代码依赖于将来会中断的东西。但我们也应该对弃用保持怀疑态度，因为有时
    Oracle 弃用便宜的功能是为了鼓励我们购买昂贵的功能。


    ## 避免对通用错误进行简单化解释


    Oracle 有一些通用错误消息，它们代表了大量更具体的错误。使用搜索引擎查找通用错误消息没有帮助，因为每个答案只涵盖众多可能的根本原因之一。我们需要深入挖掘以找到精确的错误消息以及所有相关的参数和设置。这类通用错误消息有几类：死进程、死锁以及错误堆栈的顶部。'
- fmt: '### Dead Processes


    Oracle bugs can cause server processes to die. Processes can die so abruptly that
    they can’t even generate and return the full error message to the client. Oracle
    reports a generic error message to the client and only stores the detailed error
    information in the alert log or trace files.


    When we see one of the following error messages, there’s no point in googling
    only the error message itself:


    1.  `ORA-00600`: internal error code

    2.  `ORA-07445`: exception encountered

    3.  `ORA-03113`: end-of-file on communication channel

    4.  No more data to read from socket


    Finding the real error can be a complex process: open the alert log file on the
    database server (use `V$DIAG_INFO` if you don’t know the file location), find
    the relevant occurrence of the error based on the error codes and the timestamps
    in the alert log, find the first argument of the error, go to the My Oracle Support
    website at [https://support.oracle.com](https://support.oracle.com), search for
    the “ORA-600/ORA-7445/ORA-700 Error Look-up Tool,” enter the first argument, and
    search through the relevant documents to find the possible causes. (If that tool
    does not find any relevant bugs, we need to either create a service request or
    find some way to work around the problem.) Occasionally these errors can be found
    on search engines if we search for both the error number and the first argument.
    But if we search for just the first error number, without the argument, we’ll
    waste a lot of time.


    ### Deadlocks


    When we see the error message “`ORA-00060`: deadlock detected while waiting for
    resource,” the first thing we need to do is find the relevant trace file. The
    alert log will contain an entry for deadlock errors and will point to a trace
    file that contains all the information necessary for debugging.


    A deadlock is an application problem. Deadlocks are not Oracle bugs, and they
    are not just a “really bad lock.” Deadlocks are resource consumption problems
    that can only be fixed by rolling back one of the two relevant sessions.


    Deadlocks happen when two different sessions try to lock the same rows but in
    a different order. The length and number of locks don’t matter; it’s all about
    the order of the locking.


    For example, the following code creates a deadlock that will roll back one of
    the statements. The tricky thing about creating deadlocks is we need to alternate
    between two sessions and precisely control the order the rows are changed:


    ```

    --Deadlock example.  One session will fail with ORA-00060.

    --Session #1:

    update launch set site_id = site_id where launch_id = 1;

    --Session #2:

    update launch set site_id = site_id where launch_id = 2;

    update launch set site_id = site_id where launch_id = 1;

    --Session #1:

    update launch set site_id = site_id where launch_id = 2;

    ```


    The preceding simple example only updates one row at a time. In the real world,
    the problems are more complex. When we update multiple rows, we can’t easily control
    the order the rows are locked. Different statements can lock rows in a different
    order. Even the same statement can lock rows in a different order, if the execution
    plan changes. For example, a full table scan may lock rows in a different order
    than index access. Deadlocks can occur on indirectly locked objects, such as bitmap
    indexes that aren’t supposed to be created on transactional tables.


    Diagnosing real-life deadlocks can be tricky. Don’t even try to solve deadlocks
    until you understand the theory of deadlocks and have the specific details from
    the trace file. The trace file tells us exactly what objects and statements are
    involved in the deadlock, so we don’t need to guess what caused the problem.


    ### Top of the Error Stack


    The error on the top of the error stack is not always important. Buried errors
    happen with error messages like “`ORA-12801`: error signaled in parallel query
    server `PXYZ`.” That initial error message only tells us that a parallel query
    server died, but it doesn’t tell us why the parallel query server died. Like with
    deadlocks, these errors are not Oracle bugs. If we look in the full error stack
    or check the alert log, we will find a much more useful error message hidden inside.


    We must always read the entire error message stack, especially for custom exceptions.
    In a custom exception handler, the last line number may only point to the last
    `RAISE` command, not the original line that caused the error. As discussed in
    Chapter [11](#471418_2_En_11_Chapter.xhtml), there is a tendency among PL/SQL
    developers to capture and hide every error message, instead of letting exceptions
    naturally propagate. We may need to dig around for the error message.


    For example, the following code uses a `BAD_EAV` query with a few modifications:
    the query is run in parallel and inside a PL/SQL block. (This exact problem may
    be difficult to reproduce, because there are several reasons our systems may not
    run queries in parallel.) The exception handler may look helpful because it’s
    catching and printing the error code. But this exception handler is doing more
    harm than good:


    ```

    --Incorrectly catch and print error code:

    declare

    v_count number;

    begin

    select /*+ parallel(8) */ count(*)

    into v_count

    from bad_eav

    where value = date ''2011-04-28'';

    exception when others then

    dbms_output.put_line(''Error: ''||sqlcode);

    end;

    /

    Error: -12801

    ```


    The preceding PL/SQL block only printed the last error code. The error code `-12801`
    tells us that a parallel query server died, but it does not tell us the underlying
    cause. If we comment out the exception handler and rerun the block, it will raise
    a more meaningful exception, like this:


    ```

    ORA-12801: error signaled in parallel query server P001

    ORA-01861: literal does not match format string

    ```


    ## Avoid Unnecessarily Small Parameters


    There are many complicated trade-offs when setting Oracle parameters. For example,
    every administrator has a story about cranking the memory settings for one database
    but not seeing any performance improvement. Those administrators also have stories
    about databases crashing because there wasn’t enough available memory. DBAs tend
    to think about most parameters in terms of conservative compromises, and they
    are hesitant to set parameters to a value that seems unreasonably high.


    But there are parameters where a conservative approach is harmful. Parameters
    that prevent users from logging on are a hard limit, and hitting those limits
    can be as bad as a database crash. For many of these parameters, setting the limit
    high doesn’t cost anything, unless the resources are actually used.


    For the parameters `SESSIONS`, `PROCESSES`, `MAX_PARALLEL_SESSIONS`, and the profile
    limit `SESSIONS_PER_USER`, it is best to use a trust-but-verify approach. We should
    set these parameters high, even higher than we think we need, and then periodically
    monitor resource consumption. A moderately high value in those parameters is better
    than running out of sessions late at night and breaking an application. For example,
    I’ve seen literally dozens of errors on databases when `PROCESSES` was set too
    low, and I’ve only ever seen one problem caused by setting it too high.


    An administrator is likely responsible for setting and maintaining these parameters.
    But as developers it is in our own best interest to have good values for parameters
    and avoid creating an artificial scarcity that can effectively break our programs.'
