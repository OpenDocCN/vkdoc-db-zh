  trans: '### 已终止进程


    Oracle 错误可能导致服务器进程终止。进程的终止可能非常突然，以至于无法生成完整的错误消息并返回给客户端。Oracle 会向客户端报告一个通用错误消息，并将详细的错误信息仅存储在警报日志或跟踪文件中。


    当我们看到以下任一错误消息时，仅仅搜索错误消息本身是没有意义的：


    1.  `ORA-00600`：内部错误代码

    2.  `ORA-07445`：遇到异常

    3.  `ORA-03113`：通信通道上遇到文件结束

    4.  套接字上无更多数据可读


    找到真正的错误原因可能是一个复杂的过程：在数据库服务器上打开警报日志文件（如果不知道文件位置，可以使用 `V$DIAG_INFO`），根据警报日志中的错误代码和时间戳找到相关的错误发生记录，找到该错误的第一个参数，前往
    My Oracle Support 网站 [`support.oracle.com`](https://support.oracle.com)，搜索“ORA-600/ORA-7445/ORA-700
    错误查找工具”，输入第一个参数，并搜索相关文档以找出可能的原因。（如果该工具未找到任何相关错误，我们需要创建服务请求或寻找某种方法来规避问题。）有时，如果同时搜索错误编号和第一个参数，可以在搜索引擎上找到这些错误。但如果我们只搜索第一个错误编号，而不包含参数，将会浪费大量时间。


    ### 死锁


    当我们看到错误消息“`ORA-00060`：等待资源时检测到死锁”时，我们需要做的第一件事是找到相关的跟踪文件。警报日志将包含死锁错误的条目，并指向一个跟踪文件，该文件包含调试所需的所有信息。


    死锁是一个应用程序问题。死锁不是 Oracle 错误，也不仅仅是一个“非常糟糕的锁”。死锁是资源消耗问题，只能通过回滚两个相关会话中的一个来解决。


    当两个不同的会话试图以不同的顺序锁定相同的行时，就会发生死锁。锁的持续时间和数量并不重要；关键在于锁定的顺序。


    例如，以下代码将创建一个会导致其中一个语句回滚的死锁。创建死锁的棘手之处在于，我们需要在两个会话之间交替执行，并精确控制行被更改的顺序：


    ```

    --死锁示例。一个会话将因 ORA-00060 而失败。

    --会话 #1:

    update launch set site_id = site_id where launch_id = 1;

    --会话 #2:

    update launch set site_id = site_id where launch_id = 2;

    update launch set site_id = site_id where launch_id = 1;

    --会话 #1:

    update launch set site_id = site_id where launch_id = 2;

    ```


    前面的简单示例一次只更新一行。在现实世界中，问题更加复杂。当我们更新多行时，无法轻易控制行被锁定的顺序。不同的语句可能以不同的顺序锁定行。即使是相同的语句，如果执行计划发生变化，也可能以不同的顺序锁定行。例如，全表扫描可能以不同于索引访问的顺序锁定行。死锁可能发生在间接锁定的对象上，例如不应该在事务表上创建的位图索引。


    诊断现实生活中的死锁可能很棘手。在理解死锁理论并从跟踪文件中获取具体细节之前，甚至不要尝试解决死锁。跟踪文件会确切地告诉我们涉及死锁的对象和语句，因此我们无需猜测是什么导致了问题。


    ### 错误堆栈顶部


    位于错误堆栈顶部的错误并不总是重要的。被掩盖的错误会伴随着诸如“`ORA-12801`：并行查询服务器 `PXYZ` 中发出错误信号”之类的消息出现。这个初始错误消息只告诉我们并行查询服务器死亡了，但没有告诉我们它为什么死亡。与死锁类似，这些错误也不是
    Oracle 错误。如果我们查看完整的错误堆栈或检查警报日志，将会在内部找到一个更有用的错误消息。


    我们必须始终阅读整个错误消息堆栈，特别是对于自定义异常。在自定义异常处理程序中，最后一行的行号可能仅指向最后的 `RAISE` 命令，而不是导致错误的原始行。如第
    11 章所讨论的，PL/SQL 开发人员倾向于捕获并隐藏每个错误消息，而不是让异常自然传播。我们可能需要仔细查找错误消息。


    例如，以下代码对 `BAD_EAV` 查询做了一些修改：该查询在并行模式下运行，并且位于一个 PL/SQL 块内部。（这个确切的问题可能难以重现，因为有多个原因导致我们的系统可能无法并行运行查询。）该异常处理程序看起来很有帮助，因为它捕获并打印了错误代码。但这个异常处理程序弊大于利：


    ```

    --错误地捕获并打印错误代码：

    declare

    v_count number;

    begin

    select /*+ parallel(8) */ count(*)

    into v_count

    from bad_eav

    where value = date ''2011-04-28'';

    exception when others then

    dbms_output.put_line(''Error: ''||sqlcode);

    end;

    /

    Error: -12801

    ```


    前面的 PL/SQL 块只打印了最后一个错误代码。错误代码 `-12801` 告诉我们一个并行查询服务器死亡了，但没有告诉我们根本原因。如果我们注释掉异常处理程序并重新运行该块，它将引发一个更有意义的异常，如下所示：


    ```

    ORA-12801: 并行查询服务器 P001 中发出错误信号

    ORA-01861: 字面值与格式字符串不匹配

    ```


    ### 避免设置过小的参数


    设置 Oracle 参数时存在许多复杂的权衡。例如，每位管理员都有为某个数据库调高内存设置却看不到任何性能提升的故事。他们也有数据库因可用内存不足而崩溃的故事。DBA
    倾向于以保守的折中考量来处理大多数参数，并且对于设置一个看起来高得离谱的值犹豫不决。


    但有些参数，采用保守方法是有害的。阻止用户登录的参数是一个硬性限制，触及这些限制可能和数据库崩溃一样糟糕。对于许多此类参数，除非资源被实际使用，否则设置较高的限制并不会产生任何成本。


    对于参数 `SESSIONS`、`PROCESSES`、`MAX_PARALLEL_SESSIONS` 以及配置文件限制 `SESSIONS_PER_USER`，最好采用“信任但需验证”的方法。我们应该将这些参数设置得很高，甚至高于我们认为需要的值，然后定期监控资源消耗。将这些参数设置为一个适中的高值，比在深夜耗尽会话并导致应用程序崩溃要好。例如，我见过当
    `PROCESSES` 设置过低时数据库上出现数十个错误，而我只见过一次因设置过高导致的问题。


    管理员可能负责设置和维护这些参数。但作为开发人员，为了我们自身的最佳利益，确保参数具有良好的值，并避免制造可能实际上破坏我们程序的人为稀缺性，是至关重要的。'
- fmt: '## Avoid Conflating Planning with Premature Optimization


    Developers worry too much about Donald’s Knuth’s quote “premature optimization
    is the root of all evil.” There’s a lot of context behind that quote, and it is
    a mistake to use that quote as an excuse to ignore performance until the end of
    a project. We certainly want to avoid obsessing over the performance of every
    query and every line of `PL/SQL` code before they are proven to be a problem.
    But as we gain experience with database development, we can accurately predict
    bottlenecks. Every large project should spend time thinking about data growth
    and opportunities for denormalization.


    Planning for data growth is more than simply estimating the amount of space needed
    in the future. Forecasting performance is complicated, and we cannot simply assume
    that performance will grow linearly with the data. As described in the next chapter,
    there are many situations where performance grows very slowly, like with index
    access, but there are also times when performance grows exponentially, like with
    locks or bad table joins. Not every problem can be fixed by adding an index, so
    we would be wise to periodically test our system with a realistic amount of data
    and user activity.


    Practical database developers shouldn’t be too scared of denormalized data. Even
    the creators of the relational model and normalization rules recognized that sometimes
    we need to repeat data. And sometimes we need to quickly cram bad data into a
    simple table and clean it up later. Repetitive data may save us from joining a
    large number of tables in a complex data model. Removing triggers, relational
    integrity, and durability requirements can enable direct path writes that are
    an order of magnitude faster than conventional writes. When we have an enormous
    amount of data, we need to plan for performance.


    ## Anti-patterns Discussed in Other Chapters


    There are plenty of anti-patterns discussed in other chapters, and some of those
    worst practices are worth mentioning twice. We should avoid storing lists of values
    in columns, using the old-fashioned join syntax, writing `SQL` that depends on
    the order of execution, trying to handle all exceptions instead of using propagation,
    case-sensitive object names that require quoted identifiers, using advanced `PL/SQL`
    features instead of `SQL`, making everything publicly accessible, and overengineering
    systems when a single instance database works fine.


    ## Summary


    Remember that there are exceptions to every rule. Other than “storing data as
    the wrong data type,” the anti-patterns discussed in this chapter are not always
    evil. We don’t want to go around telling everybody that their code sucks, but
    we need to be on the lookout for bad coding practices that should be avoided.


    Footnotes [1](#471418_2_En_15_Chapter.xhtml#Fn1_source) [2](#471418_2_En_15_Chapter.xhtml#Fn2_source)


    # Part IV Improve SQL Performance


    ## 16. Understand SQL Performance with Algorithm Analysis


    Solving Oracle `SQL` performance issues is the pinnacle of `SQL` development.
    Performance tuning requires a combination of all the skills previously discussed
    in this book. We need to understand the development process (to know why problems
    happened and weren’t caught sooner), advanced features (to find alternative ways
    to implement code), and programming styles (in order to understand the code and
    rewrite it into something better).


    Programming is one of the few fields with order-of-magnitude difference in skill
    level between professionals. We’ve all had to deal with coworkers who are only
    one-tenth as productive as us, and we’ve all been humbled by developers whose
    code is ten times better than ours. With performance tuning these numbers get
    even higher, and the rewards are greater. It’s exhilarating when we make a small
    tweak and something runs a million times faster.


    But “a million times faster” is only the beginning of this story. All `SQL` tuning
    guides discuss run times, but none of them consider the run-time complexity. Database
    performance tuning requires more than an encyclopedic knowledge of obscure features
    and arcane settings. Performance tuning calls for a different mindset.


    Algorithm analysis is the most underused approach to understanding Oracle performance
    problems. This chapter tells the story of Oracle performance through the lens
    of simple algorithm analysis. The sections are not listed in a traditional order,
    such as ordered by performance concepts and tuning tools. Instead, the sections
    are ordered by time complexity, from fastest to slowest.


    Admittedly, algorithm analysis is not the most useful performance tuning technique.
    But algorithm analysis should not be relegated to the halls of academia – it should
    be a part of everyone’s `SQL` tuning toolkit. We may solve more problems with
    techniques like sampling and cardinality estimates, but we’ll never truly understand
    performance without understanding the algorithms.


    Algorithm analysis can help us with both proactive and reactive tuning. For proactive
    tuning, we need to be aware of the advantages available if we create different
    data structures. For reactive tuning, we need to be able to measure the algorithms
    chosen by the optimizer and ensure Oracle made the right choices.


    The two chapters after this one provide a more traditional approach to performance
    tuning; those chapters describe the different concepts and solutions used in Oracle
    `SQL` tuning. This chapter explains why the stakes are so high for the decisions
    Oracle must make. This material should be useful to `SQL` developers of any skill
    level.'
