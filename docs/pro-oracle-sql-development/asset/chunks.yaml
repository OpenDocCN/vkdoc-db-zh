  trans: '### XMLType


    Oracle 支持创建、存储和处理可扩展标记语言（XML）文档。XML 是半结构化的，并非非结构化。我们绝不允许无效的 XML，因此我们不应直接将 XML
    数据放入字符串字段。XML 数据应存储为 `XMLType` 类型，这将自动验证其结构。将文本转换为 `XMLType` 是非常简单的；只需像这样将文本传递给默认构造函数：


    ```sql

    --将文本转换为 XML。

    select xmltype('''') from dual;

    ```


    上述语句的输出取决于我们的集成开发环境（IDE）。并非所有程序都能理解 `XMLType`。程序可能会将结果显示为通用消息、文本字符串，或者在 XML 编辑器中显示。文本本身看起来可能不同。结果可能是
    "`<a></a>`"、"`<a/>`" 或其他等效形式。就像关系数据具有无关紧要的显示属性（如行顺序）一样，XML 也具有无关紧要的显示属性（如标签样式和无意义的空白）。


    将 `XMLType` 转换回文本则稍微复杂一些。当使用像 `XMLType` 这样的对象类型时，必须有别名、列名，以及函数调用的括号（即使没有参数）。在以下代码中，理想情况下我们只需要使用表达式
    `XML_COLUMN.GETCLOBVAL`。但实际代码要更复杂一些：


    ```sql

    --转换为 XMLType 再转换回 CLOB。

    select table_reference.xml_column.getClobVal()

    from

    (

    select xmltype('''') xml_column

    from dual

    ) table_reference;

    ``


    正如我们绝不允许哪怕一个字节的关系数据损坏一样，我们也绝不允许任何一个 XML 出错。始终将 XML 存储为 `XMLType` 以防止无效数据。即使一个
    XML 文件损坏，也可能导致我们无法处理*任何*文件。以下代码展示了当我们尝试将错误的 XML 加载到 `XMLType` 时会发生的情况：


    ```sql

    select xmltype(''</a'') from dual;

    ERROR:

    ORA-31011: XML parsing failed

    ORA-19202: Error occurred in XML processing

    LPX-00007: unexpected end-of-file encountered

    ORA-06512: at "SYS.XMLTYPE", line 310

    ORA-06512: at line 1

    ```


    将 XML 存储在 `XMLType` 列中还为我们提供了更多的存储选项。Oracle 可以在内部以不同的优化格式存储 XML。而且我们还可以在类型正确的
    XML 数据上创建 XML 索引。


    ### DBMS_XMLGEN 与创建 XML


    创建 XML 有很多种方法，最简单的技术是使用函数 `DMBS_XMLGEN.GETXML`。该函数接受任何 SQL 语句，并将结果作为单个 XML 文件返回。结果是一个
    `CLOB` 类型，但如果有需要，很容易将其转换为 `XMLType`。第 20 章展示了我们使用 `DBMS_XMLGEN` 可以做的一些高级技巧。对于当前示例，让我们将一些发射数据转换为
    XML 文件：


    ```sql

    --为发射数据创建 XML 文件。

    select dbms_xmlgen.getxml(''

    select launch_id, launch_date, launch_category

    from launch

    where launch_tag = ''''1957 ALP''''

    '')

    from dual;


    04-OCT-57

    orbital

    ```


    Oracle 会自动添加一个 XML 序言（顶部的版本信息），为所有结果创建一个 "ROWSET" 元素，为每一行创建一个 "ROW" 元素，并为每个列值创建一个元素。类型转换可能会出现问题。例如，上面的
    `LAUNCH_DATE` 格式很糟糕，因为我的会话被设置为使用两位数年份格式。最好在 SQL 语句中自己进行转换，例如使用 `TO_CHAR(LAUNCH_DATE,
    ''YYYY-MM-DD'') LAUNCH_DATE` 这样的表达式。


    Oracle SQL 还有许多其他方法可以创建更精确的 XML 语句。我们可以使用 `XMLELEMENT`、`XMLATTRIBUTES`、`XMLAGG`
    和 `XMLFOREST` 等 SQL 函数来控制元素名称、属性和其他特性。XML 数据可以通过 `INSERTXML*`、`UPDATEXML` 和 `DELETEXML`
    等 SQL 函数进行修改。


    Oracle 也有多种方式可以读取和处理 XML 数据。包括 `XMLQUERY` 和 `EXTRACTVALUE` 等 SQL 函数，`DBMS_XML*`
    等 PL/SQL 包，以及其他编程语言的接口。Oracle 的 XML 功能变化频繁，因此我们应该参考最新版本的手册，以确保我们使用的是最新功能并避免使用已弃用的功能。


    ### XMLTABLE


    函数 `XMLTABLE` 是访问数据库中存储的 XML 最方便、最强大的方法。`XMLTABLE` 至少接受三个参数：一个用于查找相关元素的 XQuery
    字符串、包含 XML 的列，以及我们想要投影的每个列的路径。


    映射 SQL 和 XML 有一些怪癖。SQL 关键字不区分大小写，而 XML 是区分大小写的。许多小的 XML 错误不会抛出错误，而是返回空值或无结果行。但当一切操作正确时，我们可以在单个语句中快速将
    XML 文件转换为关系数据。


    对于我们的示例，我们必须首先创建 XML 数据，这在 Oracle SQL 中很简单。以下代码将整个 `LAUNCH` 表转换为 `LAUNCH_XML`：


    ```sql

    --为发射数据创建单个 XML 文件。

    create table launch_xml as

    select xmltype(dbms_xmlgen.getxml(''select * from launch'')) xml

    from dual;

    ```


    以下是一个从 `LAUNCH_XML` 读取的 `XMLTABLE` 查询。此查询计算每个发射类别的发射次数：


    ```sql

    --使用 LAUNCH_XML 表按类别统计发射次数。

    select launch_category, count(*)

    from launch_xml

    cross join xmltable(

    ''/ROWSET/ROW''

    passing launch_xml.xml

    columns

    launch_id number path ''LAUNCH_ID'',

    launch_category varchar2(31) path ''LAUNCH_CATEGORY''

    )

    group by launch_category

    order by count(*) desc;

    LAUNCH_CATEGORY    COUNT(*)

    -----------------  --------

    suborbital rocket     48880

    military missile      12641

    orbital                5483

    ...

    ```


    前面的结果是普通的关系数据，可以像读取任何其他表或内联视图一样读取。结果说明了为什么我们的许多示例查询按发射类别进行过滤。太空数据集中的大多数发射都是用于天气实验和军事测试。但最有趣的发射是那些进入太空并试图留在那里的。


    ### XML 编程语言


    Oracle XML 功能包含几种强大的语言。`XMLISVALID` 函数可以根据 XML 模式验证 `XMLType`。`XMLTRANSFORM` 函数可以对
    XML 应用 XSLT（可扩展样式表语言转换）。这些转换可用于将 XML 转换为 HTML、PDF 或其他格式。`XMLTABLE` 中的 XQuery 处理允许使用
    FLWOR 表达式（`for`、`let`、`where`、`order by`、`return`）。例如，我们可以使用 XQuery 创建一个简单的行生成器：


    ```sql

    --XQuery FLWOR 行生成器。

    select *

    from xmltable

    (

    ''for $i in xs:integer($i) to xs:integer($j) return $i''

    passing 1 as "i", 3 as "j"

    columns val number path ''.''

    );

    VAL

    ```


    我将在本章看起来像“字母汤”之前停止列举 XML 功能。有大量的 SQL 功能可以帮助我们生成、读取和处理 XML 数据。有些工具在处理 XML 方面可能比
    Oracle 更好，但使用数据库的内置功能可以减少我们程序的依赖性，并且可以通过减少传输大型 XML 数据的开销来提高性能。


    ## JSON


    与 XML 类似，融合的 Oracle 数据库可以生成、读取和处理 JSON 数据。Oracle 的 JSON 支持在近年来显著增长。如果我们处理大量 JSON
    数据，我们需要密切关注数据库的确切版本，并使用 *SQL 语言参考* 和 *JSON 开发者指南* 中列出的最新功能。


    JSON 代表 JavaScript 对象表示法。JSON 是一种建立在两个简单概念之上的文件格式：一个是对象的集合，每个对象都有一个名称和值；另一个是数组。例如，这是一个有效的
    JSON 文档，包含一个名为 "string" 的字符串和一个名为 "array" 的包含两个数字的有序数组：`{"string":"a", "array":[1,2]}`。'
- fmt: '# Store JSON in the Database


    The preceding example JSON file can be generated with the `JSON_OBJECT` function:


    ```sql

    --Simple JSON example.

    select json_object(''string'' value ''a'', ''array'' value json_array(1,2))

    from dual;

    ```


    Until 21c introduced the JSON data type, storing JSON data was slightly more complicated
    than storing XML. In older versions, JSON was stored in a string data type such
    as `VARCHAR2` or `CLOB`. Columns were marked as being JSON files with a constraint,
    such as `CONSTRAINT SOME_TABLE_CK CHECK (SOME_COLUMN IS JSON)`. For the next examples
    in this chapter, let’s create a simple table to hold launches:


    ```sql

    --Create a table to hold JSON launch data.

    create table launch_json

    (

    launch_id number,

    --19c and below - Use VARCHAR2 or CLOB datatype, and a constraint:

    json clob,

    constraint launch_json_ck check (json is json),

    --21c and above - Use JSON datatype:

    --json json,

    constraint launch_json_pk primary key(launch_id)

    );

    ```


    Like with storing XML, it is critical that we use the correct data types and constraints
    to enforce data integrity. A single invalid JSON file can break many queries.
    And using the correct data types and constraints allows us to build indexes on
    JSON files.


    # Create JSON Data


    There is not a JSON equivalent of `DBMS_XMLGEN.GETXML`, but we can create JSON
    files with a combination of functions like `JSON_OBJECT` (to convert values into
    an object), `JSON_ARRAY` (to convert a list into an array of values), and `JSON_ARRAYAGG`
    (to combine a bunch of JSON objects into one object).


    Before 19c, the syntax for building JSON was inconvenient and required explicitly
    listing each value. The following statement converts `LAUNCH` into `LAUNCH_JSON`,
    but for brevity the statement only includes a few columns:


    ```sql

    --Populate LAUNCH_JSON with some of the LAUNCH data.

    insert into launch_json

    select

    launch_id,

    json_object

    (

    ''launch_date'' value to_char(launch_date, ''YYYY-MM-DD''),

    ''flight_ids'' value json_array(flight_id1, flight_id2)

    ) json

    from launch

    where launch_category in (''orbital'', ''deep space'');

    commit;

    ```


    The preceding JSON table is a bit different than the XML table created in the
    previous section. While the XML table stored everything in a single XML file,
    `LAUNCH_JSON` has one JSON string per row. We could have reversed it and stored
    one XML file per line and put everything in a single JSON string. Both techniques
    are valid, and which one we use depends on the data and how the data is accessed.


    Since 19c, the improved `JSON_OBJECT` syntax greatly simplifies converting a row
    into a JSON file by allowing a wildcard or a simple list of columns. For example,
    the following query transforms each `SATELLITE` row into a JSON file:


    ```sql

    --Convert each SATELLITE row into a JSON file.

    select json_object(*) satellite_json

    from satellite

    order by satellite_id;

    SATELLITE_JSON


    {"SATELLITE_ID":1,"NORAD_ID":"000001","COSPAR":"57 Alpha 1",...}

    {"SATELLITE_ID":2,"NORAD_ID":"000002","COSPAR":"57 Alpha 2",...}

    {"SATELLITE_ID":3,"NORAD_ID":"000003","COSPAR":"57 Beta 1",...}

    ```


    Since 19c, converting an entire table into a single JSON file is also easier.
    The following example creates a JSON file for satellite data by combining `JSON_OBJECT`
    and `JSON_ARRAYAGG`. JSON functions often return data as a `VARCHAR2`, so we may
    need to specify `RETURNING CLOB` to ensure the data will not exceed the byte limit.
    This example only includes the first three rows – not because Oracle SQL can’t
    handle more rows, but because your IDE may not be able to handle displaying such
    a large document:


    ```sql

    --Convert multiple SATELLITE rows into a single JSON file.

    select json_arrayagg(json_object(*) returning clob) satellite_json

    from satellite

    where satellite_id <= 3;

    SATELLITE_JSON


    [{"SATELLITE_ID":1,"NORAD_ID":"000001","COSPAR":"57 Alpha 1",...}]

    ```


    # Query JSON


    The JSON data we inserted into `LAUNCH_JSON` can be viewed as simple strings with
    the following query:


    ```sql

    --View JSON data in LAUNCH_JSON.

    select to_char(json) launch_data

    from launch_json

    order by launch_id;

    LAUNCH_DATA


    {"launch_date":"1957-10-04","flight_ids":["M1-PS","PS-1"]}

    {"launch_date":"1957-11-03","flight_ids":["M1-2PS","PS-2"]}

    {"launch_date":"1957-12-06","flight_ids":["TV-3","Vanguard TV3"]}

    ...

    ```


    On 21c, the preceding query will return the error "ORA-00932: inconsistent datatypes:
    expected NUMBER got JSON," because the `TO_CHAR` function does not accept a JSON
    data type. Instead, we need to use the `JSON_SERIALIZE` function. Although `JSON_SERIALIZE`
    has more functionality than `TO_CHAR`, the error demonstrates that the JSON data
    type is not a drop-in replacement for storing JSON as a `VARCHAR2` or a `CLOB`.


    The preceding query shows us how JSON works, but the results aren’t useful in
    SQL. The great part about JSON in SQL is that the columns are easily accessible
    with a few syntax extensions. Like with XML, to access the data, we must use a
    table alias. Then we add a dot, followed by the object name. For arrays, we can
    use square brackets and numbers, starting with 0:


    ```sql

    --Simple JSON query on table LAUNCH_JSON.

    select

    launch_id,

    substr(launch_json.json.launch_date, 1, 10) launch_date,

    launch_json.json.flight_ids[0] flight_id1,

    launch_json.json.flight_ids[1] flight_id2,

    launch_json.json.flight_ids[2] flight_id3

    from launch_json launch_json

    order by launch_date;

    LAUNCH_ID  LAUNCH_DATE  FLIGHT_ID1  FLIGHT_ID2    FLIGHT_ID3

    ---------  -----------  ----------  ------------  ----------

    4305       1957-10-04   M1-PS       PS-1

    4306       1957-11-03   M1-2PS      PS-2

    4476       1957-12-06   TV-3        Vanguard TV3

    ...

    ```


    The preceding query generates relational data from JSON. Like with XML, there
    are a few quirks when mapping to SQL. For example, the preceding query references
    a third `FLIGHT_ID`, even though we cannot possibly have a third flight ID. That
    mistake demonstrates one of the pitfalls of semi-structured data – our queries
    can be wrong but will not generate a compilation error.


    This section only covers the simplest ways to handle JSON. Oracle provides many
    other functions to process JSON, including `JSON_DATAGUIDE` and `DBMS_JSON` (a
    sort of data dictionary for JSON), `JSON_MERGEPATCH` and `JSON_TRANSFORM` (update
    a JSON document), `JSON_QUERY` (retrieve fragments of a document), `JSON_SCALAR`
    and `JSON_VALUE` (retrieve a value as a JSON scalar or a SQL scalar), and `JSON_TABLE`
    (creating a relational view of JSON, similar to `XMLTABLE`).


    For those of us stuck with versions of Oracle lower than 12.1, the most popular
    choice for working with JSON is the open source project PL/JSON. Even for the
    newer versions of Oracle, if we need advanced JSON functionality, it might be
    worth looking into that program, although PL/JSON is more resource intensive than
    the native features.


    We don’t want to overuse XML and JSON. Theoretically we could store our entire
    database in a single XML or JSON value, but then why are we using a database?
    The extra dynamic abilities of semi-structured data are tempting, but there must
    be a model somewhere. To query files, they must have some type of dependable structure,
    or else the files are useless. Even though Oracle can make XML and JSON look like
    a table, the mapping isn’t perfect. Querying XML and JSON is not nearly as convenient
    as querying relational data. Despite all the features built into Oracle, the best
    way to load XML and JSON into the database is probably to convert the files to
    rows and columns.


    # National Language Support


    Internationalization and localization are complicated. Oracle’s National Language
    Support architecture lets us store, process, and display information for any language
    and locale. Even if we’re only storing simple English text, we still need to be
    aware of character sets, length semantics, NLS comparing and sorting, and display
    formats. These topics apply to all programmers, no matter how much we try to wish
    them away.'
  raw: '### Store JSON in the Database


    The preceding example JSON file can be generated with the `JSON_OBJECT` function:


    ```

    --Simple JSON example.

    select json_object(''string'' value ''a'', ''array'' value json_array(1,2))

    from dual;

    ```


    Until 21c introduced the JSON data type, storing JSON data was slightly more complicated
    than storing XML. In older versions, JSON was stored in a string data type such
    as VARCHAR2 or CLOB. Columns were marked as being JSON files with a constraint,
    such as `CONSTRAINT SOME_TABLE_CK CHECK (SOME_COLUMN IS JSON)`. For the next examples
    in this chapter, let’s create a simple table to hold launches:


    ```

    --Create a table to hold JSON launch data.

    create table launch_json

    (

    launch_id number,

    --19c and below - Use VARCHAR2 or CLOB datatype, and a constraint:

    json clob,

    constraint launch_json_ck check (json is json),

    --21c and above - Use JSON datatype:

    --json json,

    constraint launch_json_pk primary key(launch_id)

    );

    ```


    Like with storing XML, it is critical that we use the correct data types and constraints
    to enforce data integrity. A single invalid JSON file can break many queries.
    And using the correct data types and constraints allows us to build indexes on
    JSON files.


    ### Create JSON Data


    There is not a JSON equivalent of `DBMS_XMLGEN.GETXML`, but we can create JSON
    files with a combination of functions like `JSON_OBJECT` (to convert values into
    an object), `JSON_ARRAY` (to convert a list into an array of values), and `JSON_ARRAYAGG`
    (to combine a bunch of JSON objects into one object).


    Before 19c, the syntax for building JSON was inconvenient and required explicitly
    listing each value. The following statement converts `LAUNCH` into `LAUNCH_JSON`,
    but for brevity the statement only includes a few columns:


    ```

    --Populate LAUNCH_JSON with some of the LAUNCH data.

    insert into launch_json

    select

    launch_id,

    json_object

    (

    ''launch_date'' value to_char(launch_date, ''YYYY-MM-DD''),

    ''flight_ids'' value json_array(flight_id1, flight_id2)

    ) json

    from launch

    where launch_category in (''orbital'', ''deep space'');

    commit;

    ```


    The preceding JSON table is a bit different than the XML table created in the
    previous section. While the XML table stored everything in a single XML file,
    `LAUNCH_JSON` has one JSON string per row. We could have reversed it and stored
    one XML file per line and put everything in a single JSON string. Both techniques
    are valid, and which one we use depends on the data and how the data is accessed.


    Since 19c, the improved `JSON_OBJECT` syntax greatly simplifies converting a row
    into a JSON file by allowing a wildcard or a simple list of columns. For example,
    the following query transforms each `SATELLITE` row into a JSON file:


    ```

    --Convert each SATELLITE row into a JSON file.

    select json_object(*) satellite_json

    from satellite

    order by satellite_id;

    SATELLITE_JSON


    {"SATELLITE_ID":1,"NORAD_ID":"000001","COSPAR":"57 Alpha 1",...}

    {"SATELLITE_ID":2,"NORAD_ID":"000002","COSPAR":"57 Alpha 2",...}

    {"SATELLITE_ID":3,"NORAD_ID":"000003","COSPAR":"57 Beta 1",...}

    ```


    Since 19c, converting an entire table into a single JSON file is also easier.
    The following example creates a JSON file for satellite data by combining `JSON_OBJECT`
    and `JSON_ARRAYAGG`. JSON functions often return data as a VARCHAR2, so we may
    need to specify `RETURNING CLOB` to ensure the data will not exceed the byte limit.
    This example only includes the first three rows – not because Oracle SQL can’t
    handle more rows, but because your IDE may not be able to handle displaying such
    a large document:


    ```

    --Convert multiple SATELLITE rows into a single JSON file.

    select json_arrayagg(json_object(*) returning clob) satellite_json

    from satellite

    where satellite_id <= 3;

    SATELLITE_JSON


    [{"SATELLITE_ID":1,"NORAD_ID":"000001","COSPAR":"57 Alpha 1",...}]

    ```


    ### Query JSON


    The JSON data we inserted into `LAUNCH_JSON` can be viewed as simple strings with
    the following query:


    ```

    --View JSON data in LAUNCH_JSON.

    select to_char(json) launch_data

    from launch_json

    order by launch_id;

    LAUNCH_DATA


    {"launch_date":"1957-10-04","flight_ids":["M1-PS","PS-1"]}

    {"launch_date":"1957-11-03","flight_ids":["M1-2PS","PS-2"]}

    {"launch_date":"1957-12-06","flight_ids":["TV-3","Vanguard TV3"]}

    ...

    ```


    On 21c, the preceding query will return the error "ORA-00932: inconsistent datatypes:
    expected NUMBER got JSON," because the `TO_CHAR` function does not accept a JSON
    data type. Instead, we need to use the `JSON_SERIALIZE` function. Although `JSON_SERIALIZE`
    has more functionality than `TO_CHAR`, the error demonstrates that the JSON data
    type is not a drop-in replacement for storing JSON as a VARCHAR2 or a CLOB.


    The preceding query shows us how JSON works, but the results aren’t useful in
    SQL. The great part about JSON in SQL is that the columns are easily accessible
    with a few syntax extensions. Like with XML, to access the data, we must use a
    table alias. Then we add a dot, followed by the object name. For arrays, we can
    use square brackets and numbers, starting with 0:


    ```

    --Simple JSON query on table LAUNCH_JSON.

    select

    launch_id,

    substr(launch_json.json.launch_date, 1, 10) launch_date,

    launch_json.json.flight_ids[0] flight_id1,

    launch_json.json.flight_ids[1] flight_id2,

    launch_json.json.flight_ids[2] flight_id3

    from launch_json launch_json

    order by launch_date;

    LAUNCH_ID  LAUNCH_DATE  FLIGHT_ID1  FLIGHT_ID2    FLIGHT_ID3

    ---------  -----------  ----------  ------------  ----------

    4305       1957-10-04   M1-PS       PS-1

    4306       1957-11-03   M1-2PS      PS-2

    4476       1957-12-06   TV-3        Vanguard TV3

    ...

    ```


    The preceding query generates relational data from JSON. Like with XML, there
    are a few quirks when mapping to SQL. For example, the preceding query references
    a third `FLIGHT_ID`, even though we cannot possibly have a third flight ID. That
    mistake demonstrates one of the pitfalls of semi-structured data – our queries
    can be wrong but will not generate a compilation error.


    This section only covers the simplest ways to handle JSON. Oracle provides many
    other functions to process JSON, including `JSON_DATAGUIDE` and `DBMS_JSON` (a
    sort of data dictionary for JSON), `JSON_MERGEPATCH` and `JSON_TRANSFORM` (update
    a JSON document), `JSON_QUERY` (retrieve fragments of a document), `JSON_SCALAR`
    and `JSON_VALUE` (retrieve a value as a JSON scalar or a SQL scalar), and `JSON_TABLE`
    (creating a relational view of JSON, similar to `XMLTABLE`).


    For those of us stuck with versions of Oracle lower than 12.1, the most popular
    choice for working with JSON is the open source project PL/JSON. Even for the
    newer versions of Oracle, if we need advanced JSON functionality, it might be
    worth looking into that program, although PL/JSON is more resource intensive than
    the native features.


    We don’t want to overuse XML and JSON. Theoretically we could store our entire
    database in a single XML or JSON value, but then why are we using a database?
    The extra dynamic abilities of semi-structured data are tempting, but there must
    be a model somewhere. To query files, they must have some type of dependable structure,
    or else the files are useless. Even though Oracle can make XML and JSON look like
    a table, the mapping isn’t perfect. Querying XML and JSON is not nearly as convenient
    as querying relational data. Despite all the features built into Oracle, the best
    way to load XML and JSON into the database is probably to convert the files to
    rows and columns.


    ## National Language Support


    Internationalization and localization are complicated. Oracle’s National Language
    Support architecture lets us store, process, and display information for any language
    and locale. Even if we’re only storing simple English text, we still need to be
    aware of character sets, length semantics, NLS comparing and sorting, and display
