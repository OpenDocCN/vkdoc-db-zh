    such as tablespace settings, foreign keys, triggers, etc.


    **Basic table compression** can save a huge amount of space and improve performance.
    Oracle has many compression options, but only basic table compression is free.
    Luckily, the free option is usually good enough. Basic table compression is easy
    to implement and has virtually no downsides. The problem with basic table compression
    is that it’s hard to effectively use.


    A table can be compressed but have uncompressed data in it. Only direct-path writes,
    or reorganizing the table, will compress table data (unless we buy the advanced
    compression option, which can compress data all the time). To know when to use
    compression, we need to understand how compression works. It also helps to understand
    how data is stored in Oracle, in blocks, as described in Chapter [10](#471418_2_En_10_Chapter.xhtml).


    Oracle compression uses a simple pattern substitution. Each block of data, 8 kilobytes
    by default, has a symbol table with common values. When those common values are
    found in the data, the symbol is used instead of repeating the data. The following
    text shows a logical representation of how basic table compression works:


    ```

    --Launch data as uncompressed comma-separated-values.

    LAUNCH_ID,LAUNCH_CATEGORY,LAUNCH_STATUS

    4305,orbital,success

    4306,orbital,success

    4476,orbital,failure

    ...

    --Launch data with simple pattern substitution compression.

    LAUNCH_ID,LAUNCH_CATEGORY,LAUNCH_STATUS

    LAUNCH_CATEGORY:£=orbital

    LAUNCH_STATUS:€=success,¢=failure

    4305,£,€

    4306,£,€

    4476,£,¢

    ...

    ```


    The preceding compression example is not the literal data format. A real block
    is much more complex and uses short numbers instead of long names for metadata.
    But the preceding text is enough to understand when compression may help. The
    column values must be identical for compression to save space. The column values
    must also repeat within the same column, not across columns. And the repeated
    values must appear within the same block, which means within about 8 kilobytes
    of each other. Only each block is compressed, not the entire table. Block compression
    means the overall compression ratio may significantly improve if we order the
    data in the table before we compress it.


    The space saved by compression completely depends on our data. I’ve seen many
    tables not shrink at all, and I’ve seen tables shrink up to 33% of their original
    size. The following code shows how to create tables with basic table compression
    enabled and how to compress tables if we can’t use direct-path inserts:


    ```

    --Create a compressed table.

    create table compressed_table(a number) compress;

    --Compression will only happen for direct-path inserts.

    --Periodically MOVE table if we can''t use direct-path inserts.

    alter table compressed_table move compress;

    ```


    The **parallel** clause lets us set a degree of parallelism for tables and other
    objects. Parallelism is a powerful mechanism to significantly improve performance,
    but parallelism may come at the expense of other processes. Parallelism is best
    defined at the query level, unless we are absolutely sure that a table should
    always run in parallel.


    The parallel clause can be set to `NOPARALLEL` (the default), `PARALLEL X` (where
    `X` is an integer indicating the degree of parallelism), or simply `PARALLEL`
    (which uses the system-determined degree of parallelism – the number of CPUs multiplied
    by the parameter `PARALLEL_THREADS_PER_CPU`). The following code shows an example
    of creating a table with a default degree of parallelism:


    ```

    --Create table with parallelism enabled by default.

    create table parallel_table(a number) parallel;

    ```


    **Deferred segment creation** lets us create a table without allocating any space.
    In older versions of Oracle, whenever we created a table or partition, Oracle
    would automatically allocate a segment to hold the data. Those empty segments
    typically use a few megabytes of space, although if we use manual segment space
    management, we can define our own sizes. In extreme cases, like if we pre-build
    thousands of tables or create a table with thousands of partitions, those empty
    segments can waste a considerable amount of space. With deferred segment creation,
    that space is not added until it is needed.


    Deferred segment creation is enabled by default and doesn’t have any performance
    implications – so why are we even talking about it? A few weird things can happen
    when deferred segment creation is used. We can create a table and see that table
    immediately in `DBA_TABLES`, but we won’t see the segment in data dictionary views
    like `DBA_SEGMENTS`. Missing segments can be a problem for programs and scripts
    that assume the segments always exist. Deferred segment creation is why the deprecated
    EXP program may miss some of our tables.


    Deferred segment creation can be disabled when we create a table. Or we can force
    Oracle to allocate space, regardless of the data in the table. The following code
    shows both options:


    ```

    --Create a table without deferred segment creation.

    create table deferred_segment_table(a number)

    segment creation immediate;

    --Force Oracle to create a segment.

    alter table deferred_segment_table allocate extent;

    ```'
  trans: '

    ### 表属性


    在定义表类型之后，我们可以通过众多可用的表属性来控制更多行为。最重要的属性包括日志记录、压缩、并行、延迟段创建、物理属性和闪回归档。表空间设置很重要，但本章后续在讨论用户时会涉及；理想情况下，表只需要一个从用户那里继承的表空间。


    **日志记录**子句允许我们将表设置为 `LOGGING` 或 `NOLOGGING`。这个功能很容易启用，但日志记录子句的效果很复杂，取决于许多因素。日志记录子句帮助
    Oracle 决定何时使用直接路径写入。直接路径写入速度更快，但由于不生成重做日志，因此无法恢复。（重做数据在第 10 章中描述。）我们必须告诉 Oracle
    何时可以接受这种权衡。默认情况下，Oracle 会尽最大努力不丢失数据。


    日志记录子句的难点在于，有太多方式可以告诉 Oracle 是否可以丢失数据。我们可以在数据库级别（数据库是 `ARCHIVELOG` 模式还是 `NOARCHIVELOG`
    模式）、对象级别（表是设置为 `LOGGING` 还是 `NOLOGGING`）以及语句级别（语句是否请求了 `APPEND` 或 `NOAPPEND`）告知
    Oracle。当 Oracle 收到相互冲突的指示时，它会选择不冒丢失数据风险的选项。表 9-1 展示了混合日志设置时的情况。^(²⁴)


    表 9-1


    Oracle 何时会生成重做日志


    | 表模式 | 插入模式 | 日志模式 | 结果 |

    | --- | --- | --- | --- |

    | `LOGGING` | `APPEND` | `ARCHIVELOG` | 生成重做日志 |

    | `NOLOGGING` | `APPEND` | `ARCHIVELOG` | 不生成重做日志 |

    | `LOGGING` | `NOAPPEND` | `ARCHIVELOG` | 生成重做日志 |

    | `NOLOGGING` | `NOAPPEND` | `ARCHIVELOG` | 生成重做日志 |

    | `LOGGING` | `APPEND` | `NOARCHIVELOG` | 不生成重做日志 |

    | `NOLOGGING` | `APPEND` | `NOARCHIVELOG` | 不生成重做日志 |

    | `LOGGING` | `NOAPPEND` | `NOARCHIVELOG` | 生成重做日志 |

    | `NOLOGGING` | `NOAPPEND` | `NOARCHIVELOG` | 生成重做日志 |


    即使上表也没有穷尽所有生成重做日志的情况。还有其他因素会阻止直接路径插入并导致生成重做日志，例如表空间设置、外键、触发器等。


    ### 基本表压缩


    **基本表压缩**可以节省大量空间并提高性能。Oracle 有许多压缩选项，但只有基本表压缩是免费的。幸运的是，免费选项通常足够好用。基本表压缩易于实现，几乎没有缺点。基本表压缩的问题在于很难有效使用。


    一个表可以被压缩，但其中可能包含未压缩的数据。只有直接路径写入或重组表才会压缩表数据（除非我们购买高级压缩选项，该选项可以随时压缩数据）。要了解何时使用压缩，我们需要理解压缩的工作原理。了解数据在
    Oracle 中如何以块的形式存储也很有帮助，这在第 10 章中有描述。


    Oracle 压缩使用简单的模式替换。每个数据块（默认为 8 千字节）都有一个包含常见值的符号表。当在数据中找到这些常见值时，会使用符号代替重复的数据。以下文本展示了基本表压缩工作原理的逻辑表示：


    ```

    --未压缩的逗号分隔值形式的发射数据。

    LAUNCH_ID,LAUNCH_CATEGORY,LAUNCH_STATUS

    4305,orbital,success

    4306,orbital,success

    4476,orbital,failure

    ...

    --采用简单模式替换压缩的发射数据。

    LAUNCH_ID,LAUNCH_CATEGORY,LAUNCH_STATUS

    LAUNCH_CATEGORY:£=orbital

    LAUNCH_STATUS:€=success,¢=failure

    4305,£,€

    4306,£,€

    4476,£,¢

    ...

    ```


    前面的压缩示例并非字面数据格式。真实的块要复杂得多，并且对元数据使用短数字而不是长名称。但以上文本足以理解压缩何时可能有帮助。列值必须相同，压缩才能节省空间。列值还必须在同一列内重复，而不是跨列重复。而且重复的值必须出现在同一个块内，这意味着彼此相距大约
    8 千字节以内。只有每个块被压缩，而不是整个表。块压缩意味着，如果我们在压缩之前对表中的数据进行排序，整体压缩率可能会显著提高。


    压缩节省的空间完全取决于我们的数据。我见过许多表根本没有缩小，也见过表缩小到其原始大小的 33%。以下代码展示了如何创建启用基本表压缩的表，以及在无法使用直接路径插入时如何压缩表：


    ```

    --创建一个压缩表。

    create table compressed_table(a number) compress;

    --压缩只会针对直接路径插入发生。

    --如果不能使用直接路径插入，则定期 MOVE 表。

    alter table compressed_table move compress;

    ```


    ### 并行


    **并行**子句允许我们为表和其他对象设置并行度。并行是显著提高性能的强大机制，但并行可能以牺牲其他进程为代价。并行最好在查询级别定义，除非我们绝对确定某个表应始终并行运行。


    并行子句可以设置为 `NOPARALLEL`（默认值）、`PARALLEL X`（其中 `X` 是表示并行度的整数），或简单地设置为 `PARALLEL`（使用系统确定的并行度——CPU
    数量乘以参数 `PARALLEL_THREADS_PER_CPU`）。以下代码展示了创建具有默认并行度的表示例：


    ```

    --创建默认启用并行的表。

    create table parallel_table(a number) parallel;

    ```


    ### 延迟段创建


    **延迟段创建**允许我们创建表而不分配任何空间。在旧版本的 Oracle 中，每当我们创建表或分区时，Oracle 都会自动分配一个段来保存数据。这些空段通常占用几兆字节的空间，尽管如果我们使用手动段空间管理，可以定义自己的大小。在极端情况下，例如如果我们预先构建数千个表或创建具有数千个分区的表，这些空段可能会浪费大量空间。使用延迟段创建，空间在需要之前不会被添加。


    延迟段创建默认启用，并且没有任何性能影响——那么我们为什么要讨论它呢？使用延迟段创建时，可能会发生一些奇怪的事情。我们可以创建一个表，并立即在 `DBA_TABLES`
    中看到该表，但我们不会在 `DBA_SEGMENTS` 等数据字典视图中看到该段。缺失的段对于假设段始终存在的程序和脚本来说可能是个问题。延迟段创建是已弃用的
    EXP 程序可能会遗漏我们某些表的原因。


    创建表时可以禁用延迟段创建。或者，我们可以强制 Oracle 分配空间，无论表中是否有数据。以下代码展示了两种选项：


    ```

    --创建一个没有延迟段创建的表。

    create table deferred_segment_table(a number)

    segment creation immediate;

    --强制 Oracle 创建一个段。

    alter table deferred_segment_table allocate extent;

    ```

