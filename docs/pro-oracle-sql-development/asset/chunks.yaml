    of columns. It’s rare for a SQL or PL/SQL program to need a solution as generic
    as method 4.


    Before we create those generic solutions, a word of caution is in order. While
    it’s fun to build generic programs, it’s quite unusual in a database to have no
    idea what the results will be. In order to do anything useful with data, we generally
    at least need to know the shape of the data. In practice, the vast majority of
    SQL programs with a method 4 solution are better served by hard-coding the columns.


    Oracle data cartridge provides interfaces that let us extend the database and
    build method 4 solutions in SQL. Data cartridges can be used to build custom indexes
    (such as Oracle Text), custom analytic functions, custom statistics, and functions
    with dynamic return types.


    Building a data cartridge is challenging and requires using the `ANY` types to
    fully describe all inputs and outputs. Luckily, there are pre-built open source
    solutions, such as my unoriginally named Method4 program.^([^(50)](#fn50)) For
    example, with that program we can recreate the count-all-the-`LAUNCH`-tables query
    with the following SQL statement:


    ```

    --Method4 dynamic SQL in SQL.

    select * from table(method4.dynamic_query(

    q''[

    select replace(

    q''!

    select ''#TABLE_NAME#'' table_name, count(*) count

    from #TABLE_NAME#

    !'', ''#TABLE_NAME#'', table_name) sql_statement

    from all_tables

    where owner = sys_context(''userenv'', ''current_schema'')

    and table_name like ''LAUNCH%''

    ]''

    ))

    order by table_name;

    ```


    The preceding example returns the same results as the previous two queries. But
    this new version has an important difference – the first line of the query uses
    `*` instead of a hard-coded list of columns. Method4 dynamically generates columns
    each time the query runs. This allows us to solve some rare but difficult problems,
    such as dynamic pivoting or generating and running queries based on configuration
    data stored in tables.


    Writing a query inside a query, inside a query, leads to weird-looking strings.
    The data cartridge code is complex, slow, and buggier than average PL/SQL code.
    Those penalties are the price we pay to reach the pinnacle of query flexibility.


    ## Polymorphic Table Functions


    Polymorphic table functions are a new feature in 18c, and they also have a dynamically
    generated return type. Polymorphic table functions are sort of like a high-level
    data cartridge solution; they are much easier to implement, but the shape of the
    query results is typically constrained by table and column names.


    The following example creates a polymorphic table function that doesn’t do anything
    particularly useful. The function merely returns everything from the input table.
    Creating a fully functional sample would take too much space. Even generating
    this mostly worthless function is complicated enough:


    ```

    --Create polymorphic table function package.

    create or replace package ptf as

    function describe(p_table in out dbms_tf.table_t)

    return dbms_tf.describe_t;

    function do_nothing(tab in table)

    return table pipelined

    row polymorphic using ptf;

    end;

    /

    create or replace package body ptf as

    function describe(p_table in out dbms_tf.table_t)

    return dbms_tf.describe_t as

    begin

    return null;

    end;

    end;

    /

    ```


    With the preceding package in place, we can call the `DO_NOTHING` function against
    any table, and the function will return the entire output of that table:


    ```

    --Call polymorphic table function.

    select * from ptf.do_nothing(dual);

    DUMMY


    X

    ```


    While the preceding output may look unimpressive, returning a generic relational
    result with only a few lines of code is amazing compared with the hundreds of
    lines of code it takes to accomplish the same thing with Oracle data cartridge.
    But we still need to do something useful with the data, and it’s hard to demonstrate
    that without a few hundred lines of code, so we’ll need to use our imagination
    here.


    A simple but more realistic use of polymorphic table functions is to return every
    column from a table *except* for certain columns. For quick data analysis on many
    tables with many columns, where most of the columns are auditing columns we want
    to ignore, it can help to quickly run queries like this: `SELECT * FROM EVERYTHING_BUT(EMPLOYEE,
    COLUMNS(CREATE_DATE, CREATE_USER, ...));` That function would look similar to
    the preceding function, except we would have to loop through the columns and set
    the property `PASS_THROUGH` to `FALSE` for the relevant columns.^([^(51)](#fn51))


    We can create generic conversion functions to turn any table, or any SQL statement,
    into JSON, CSV, XML, or any other format. Or we could do the opposite and create
    generic conversion functions that turn those file formats into relational data.
    (However, in practice, it is probably wiser to use pre-built packages like `APEX_DATA_PARSER`
    to handle file conversions. That package may return hundreds of extra columns,
    but dealing with extra columns is easier than trying to reimplement conversion
    routines.) We can almost create our own SQL syntax. We could dynamically change
    columns and column names, create our own definition of how `*` works, dynamically
    pivot, and lots of weird things I can’t even imagine.'
  trans: '

    ## 方法 4 动态 SQL


    动态 SQL 语句可以根据其通用性进行排序。按照 Oracle 的命名法，方法 1 用于非查询语句，方法 2 用于带有绑定变量的非查询语句，方法 3 用于返回已知数量项目的查询，而方法
    4 用于返回未知数量项目的查询。到目前为止，在本书中，即使使用了动态 SQL，程序仍然知道预期的输出是什么。当我们甚至不知道语句会返回什么时，SQL 就变得困难得多。


    应用程序经常使用方法 4 的技术。例如，我们的集成开发环境可以运行任何查询并在运行时确定其列。许多应用程序还可以使用动态生成的 ref cursor，它不一定有已知的列集。SQL
    或 PL/SQL 程序需要像方法 4 这样通用的解决方案的情况很少见。


    在我们创建这些通用解决方案之前，需要提醒一句。虽然构建通用程序很有趣，但在数据库中完全不知道结果会是什么是相当不寻常的。为了对数据做任何有用的事情，我们通常至少需要知道数据的形态。在实践中，绝大多数采用方法
    4 解决方案的 SQL 程序，通过硬编码列名通常能获得更好的服务。


    Oracle 数据插件提供了接口，让我们能够扩展数据库并在 SQL 中构建方法 4 的解决方案。数据插件可用于构建自定义索引（如 Oracle Text）、自定义分析函数、自定义统计信息以及具有动态返回类型的函数。


    构建数据插件具有挑战性，需要使用 `ANY` 类型来完整描述所有输入和输出。幸运的是，有一些预先构建的开源解决方案，例如我那没有创意地命名为 `Method4`
    的程序^(⁵⁰)。例如，使用该程序，我们可以用以下 SQL 语句重新创建统计所有以`LAUNCH`开头的表的查询：


    ```sql

    --SQL 中的 Method4 动态 SQL。

    select * from table(method4.dynamic_query(

    q''[

    select replace(

    q''!

    select ''#TABLE_NAME#'' table_name, count(*) count

    from #TABLE_NAME#

    !'', ''#TABLE_NAME#'', table_name) sql_statement

    from all_tables

    where owner = sys_context(''userenv'', ''current_schema'')

    and table_name like ''LAUNCH%''

    ]''

    ))

    order by table_name;

    ```


    前面的示例返回的结果与前两个查询相同。但这个新版本有一个重要的区别——查询的第一行使用了 `*` 而不是硬编码的列列表。`Method4` 每次运行查询时都会动态生成列。这使我们能够解决一些罕见但困难的问题，比如动态数据透视，或者基于存储在表中的配置数据生成并运行查询。


    在一个查询中再写一个查询，查询里再套查询，会导致看起来很奇怪的字符串。数据插件代码复杂、缓慢，并且比普通的 PL/SQL 代码更容易出错。这些代价是我们为了达到查询灵活性的顶峰所必须付出的。


    ## 多项式表函数


    多项式表函数是 Oracle 18c 引入的一项新特性，它们也具有动态生成的返回类型。多项式表函数有点像高级的数据插件解决方案；它们实现起来要容易得多，但查询结果的形态通常受到表名和列名的约束。


    下面的示例创建了一个多项式表函数，它没有做任何特别有用的事情。该函数仅仅返回输入表中的所有内容。创建一个功能完备的示例会占用太多篇幅。即使生成这个几乎无用的函数也足够复杂了：


    ```sql

    --创建多项式表函数包。

    create or replace package ptf as

    function describe(p_table in out dbms_tf.table_t)

    return dbms_tf.describe_t;

    function do_nothing(tab in table)

    return table pipelined

    row polymorphic using ptf;

    end;

    /

    create or replace package body ptf as

    function describe(p_table in out dbms_tf.table_t)

    return dbms_tf.describe_t as

    begin

    return null;

    end;

    end;

    /

    ```


    有了前面的包，我们就可以对任何表调用 `DO_NOTHING` 函数，该函数将返回该表的全部输出：


    ```sql

    --调用多项式表函数。

    select * from ptf.do_nothing(dual);

    DUMMY

    ------

    X

    ```


    虽然前面的输出可能看起来不起眼，但用几行代码就能返回一个通用的关系型结果，与使用 Oracle 数据插件需要数百行代码才能完成同样的事情相比，这已经非常惊人了。但我们仍然需要对这些数据做一些有用的事情，而且不用几百行代码很难演示这一点，所以我们在这里需要发挥一下想象力。


    多项式表函数的一个简单但更现实的用法是，返回表中的所有列，*除了*某些特定列。对于包含许多列的表进行快速数据分析时，如果大部分列是我们希望忽略的审计列，能够快速运行像这样的查询会很有帮助：`SELECT
    * FROM EVERYTHING_BUT(EMPLOYEE, COLUMNS(CREATE_DATE, CREATE_USER, ...))`。该函数将与前面的函数类似，只不过我们需要遍历列，并将相关列的
    `PASS_THROUGH` 属性设置为 `FALSE`^(⁵¹)。


    我们可以创建通用的转换函数，将任何表或任何 SQL 语句转换为 JSON、CSV、XML 或任何其他格式。或者反过来，创建通用的转换函数，将这些文件格式转换为关系型数据。（然而，在实践中，使用预先构建的包如
    `APEX_DATA_PARSER` 来处理文件转换可能更为明智。该包可能会返回数百个额外列，但处理额外列比试图重新实现转换例程更容易。）我们几乎可以创建自己的
    SQL 语法。我们可以动态更改列和列名，定义我们自己的 `*` 工作方式，进行动态数据透视，以及许多我甚至无法想象的奇特操作。

