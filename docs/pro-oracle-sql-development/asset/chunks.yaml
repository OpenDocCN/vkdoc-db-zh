- fmt: '## Summary


    Dynamic SQL is a great feature and can be used for running DDL, simplifying privileges,
    building code that is only known at run time, and constructing large rule engines.
    The basic features are simple, but to get the most out of dynamic SQL, we need
    a programming style that incorporates multiline strings, the alternative quoting
    mechanism, and templates. If our code looks good, it will run good. We need to
    consider performance and security and use bind variables when possible. There
    are many cases where generating dumb code is better than writing smart generic
    code. With dynamic SQL we can leverage Oracle’s greatest strength – SQL.


    ## 15. Avoid Anti-patterns


    So far, this book has focused on what we *should* do. But it is also helpful to
    discuss what we should *not* do. This chapter lists common anti-patterns – programming
    concepts and styles that we should avoid.


    Anti-patterns are not merely trivial compiler errors that we can immediately fix.
    Anti-patterns are subtle mistakes that might save us time today but will cost
    us more time tomorrow. We need to proactively avoid certain shortcuts, so we don’t
    accumulate too much technical debt.


    All the items in this chapter are real mistakes I’ve seen happen many times in
    my career, and most of them I’ve fallen for myself. These are not simply beginner
    mistakes that experts can skip over; these are choices that appear alluring even
    to expert programmers who have not yet seen the far-reaching consequences of these
    choices.


    The anti-patterns are ordered roughly by how disastrous they can be for our projects.
    Listed first are architectural blunders that can very nearly doom a project. At
    the end of the list are relatively minor mistakes that may only doom a single
    query. This chapter only focuses on Oracle SQL anti-patterns. There are obviously
    many generic programming and business anti-patterns that we don’t want to learn
    the hard way.


    ### Avoid the Second System Syndrome and Rewriting from Scratch


    Before we grab our pitchforks and torches and start trashing everyone else’s code,
    we need to hear a few words of caution. If we’re too negative and pessimistic
    about existing code and we only focus on the problems, our negativity can lead
    to other problems. Focusing only on software mistakes can lead to the second system
    syndrome and foolishly rewriting from scratch.


    The second system syndrome is our tendency to go overboard with expectations for
    the second version of a system. We say to ourselves, “The first version worked
    fine, but it was too simple and full of architectural mistakes. When we create
    the second system, we can realize our utopian vision and add all these awesome
    new features we didn’t get around to the first time.”


    Agile development can fix some of the problems related to the second system syndrome.
    Hopefully we won’t spend too much time architecting features only later to discover
    that those features aren’t important. It’s easy to look at old code and see problems
    with it, because it’s easier to write code than it is to read code. It’s easy
    to be negative in software development, and we need to fight our biases. We need
    to ask ourselves if maybe the old system was limited for a reason. Maybe the old
    development team painfully discovered that those hundreds of new features are
    worthless. Or maybe the original team already tried and failed to implement features
    that don’t make sense.


    Overly pessimistic thinking can lead us to foolishly rewrite from scratch.^([^(30)](#fn30))
    That old, large code isn’t necessarily ugly and full of junk. That old code might
    be battle-hardened and full of fixes that handle rare, unexpected problems. Chances
    are good we’re not smarter than the people who wrote the original code. We’ll
    make plenty of mistakes when we write our own version.


    The anti-patterns listed in this chapter are problems that can plague our code.
    But none of these anti-patterns are programming death sentences, making our code
    completely unusable. We can refactor our way out of many problems without throwing
    everything out. And a lot of problems we can live with.


    We’re biased to think everyone else’s code is trash and our code is great. It’s
    fun to poke holes in other people’s code and talk about how bad it is. Anti-patterns
    can definitely teach us a lot about programming and help us avoid mistakes. But
    we should keep a positive attitude, especially when sharing our opinions with
    someone else. Instead of saying, “Your code sucks because of X,” we should say,
    “Our code could be better because of Y.”


    ### Avoid the Stringly Typed Entity–Attribute–Value Model


    Entity–attribute–value (EAV) models allow extreme flexibility for storing data
    in relational tables, but we must not use the wrong data types. EAV is a contentious
    topic in database design, with several pros and cons. Although it is reasonable
    to relax some of our database norms when using an EAV, we must never abandon type
    safety.


    #### EAV Pros and Cons


    EAV is a table structure where each value is stored in a separate row, instead
    of using multiple columns to store multiple values per row. EAV tends to be preferred
    by architects and application programmers, while database administrators and database
    developers tend to avoid EAV.


    Simply using an EAV is not an anti-pattern. There are several ways to build an
    EAV model, and the following table is a simple and safe way (although a real EAV
    table should include constraints, comments, etc.):


    ```sql

    --Simple and safe EAV.

    create table good_eav

    (

    id            number primary key,

    name          varchar2(4000),

    string_value  varchar2(4000),

    number_value  number,

    date_value    date

    );

    insert into good_eav(id, name, string_value)

    values (1, ''Name'', ''Eliver'');

    insert into good_eav(id, name, number_value)

    values (2, ''High Score'', 11);

    insert into good_eav(id, name, date_value)

    values (3, ''Date of Birth'', date ''2011-04-28'');

    ```


    With the preceding table, we don’t have to add columns to add new types of data.
    We can add any kind of value at any time, using only an `INSERT` statement. The
    EAV table is skinnier and denser than a regular table that holds the same data.


    Table [15-1](#471418_2_En_15_Chapter.xhtml#Tab1) summarizes the different trade-offs
    of using an EAV model vs. using multiple columns.


    ### Table 15-1

    Comparison of EAV and Non-EAV Tables


    |   | EAV | Non-EAV |

    | --- | --- | --- |

    | **Flexibility** | Allows any value without DDL | Requires DDL for new columns
    |

    | **Performance** | Difficult to index, opaque to optimizer | Easy to index, transparent
    to optimizer |

    | **Appearance** | Looks nicer in an ER diagram | Looks nicer in an IDE |

    | **Type safety** | No constraints, requires dangerous conversions | Allows constraints,
    no dangerous conversions |

    | **Size** | Smaller for sparse tables | Smaller for dense tables |

    | **Querying** | Difficult – requires more tables, conditions, and conversions
    | Simple – just reference the column |


    Depending on the context, different items in the preceding list will carry more
    or less weight. For example, if the table is only going to hold a dozen rows,
    then the performance difference doesn’t matter.


    As long as we’re honestly considering and weighing the pros and cons, there’s
    nothing wrong with choosing an EAV model. The anti-pattern occurs when EAV models
    are implemented incorrectly.'
