    remote databases.


    ### Simplify Privileges


    One of the lesser-known advantages of dynamic SQL is simplifying privileges. When
    compiling PL/SQL objects, the owner of the PL/SQL object must have direct access
    to all of the statically referenced objects, at compile time. Unfortunately, that
    access cannot be granted through a role. The privileges must be granted directly
    to the owner of the PL/SQL object.


    For example, imagine if we changed the preceding function and hard-coded a static
    reference to `DBA_TABLES`. Even if our user has the `DBA` role, the function will
    fail to compile with the error “ORA-00942: table or view does not exist.” That
    error occurs because the access was only granted through a *role* and not directly
    to the *user*.


    Our first instinct might be to solve the problem by granting direct access to
    the `DBA_TABLES` view. A direct grant would work, but we might regret it later
    when our privileges are a mess and auditors are asking why we have so many individual
    grants.


    A better workaround is to use dynamic SQL, which is the way the preceding function
    already works. The clause `AUTHID CURRENT_USER` tells Oracle that when the function
    runs, the function can use the roles of the user invoking the function. As long
    as we have a role that grants us access to the DBA views, we can call the function
    like this:


    ```

    --Use dynamic SQL to access DBA views.

    select get_count(''DBA_TABLES'') row_count from dual;

    ROW_COUNT


    ```


    This discussion is veering off into complicated PL/SQL topics like definer’s rights
    vs. invoker’s rights. The important part to remember is that even though dynamic
    SQL may require a few more keywords, dynamic SQL can simplify our privilege requirements.
    In most organizations it’s easier to add a few lines of code than to get elevated
    privileges.


    ### Rule Engines


    Dynamic SQL can be used to build powerful rule engines. Rule engines can be helpful
    for tasks like scoring claims based on a large set of criteria. Many medical and
    insurance systems have hundreds of rules, many of which contain simple and repetitive
    logic, such as `IF A AND B THEN 0`, `IF B OR C THEN 1`, etc.


    SQL is a high-level language, with an English-like syntax. If we carefully set
    up the columns and expressions, our SQL statements can look surprisingly close
    to our requirements. Instead of hard-coding each rule as a query, we can store
    the rules in a table and then dynamically generate the SQL statements to implement
    the rules. Ideally, the rules in that table can be validated or created by a business
    analyst, without any programming knowledge.


    In practice, rule engines are difficult to get right. It’s not always easy to
    store dynamic code in a relational database. Source code, like any language, is
    inherently hierarchical. Oracle is certainly capable of storing and manipulating
    hierarchical data, but SQL is not the ideal language for solving difficult hierarchical
    problems. And while databases are certainly capable of containing simple text
    strings, versioning our code is still best done with version control software.


    Whether or not we want to build a rule engine is a difficult decision. If we do
    decide to build a rule engine in Oracle, then we should definitely use dynamic
    SQL as the cornerstone of our engine. Building a rule engine can quickly devolve
    into the quagmire of creating a custom programming language, so we want to stay
    as close to SQL and PL/SQL as possible.'
  trans: '

    ### 运行动态数据定义语言


    动态 SQL 最常见的用途是运行 DDL 命令，因为 PL/SQL 本身不支持静态 DDL。以下示例展示了如何将 DDL 作为字符串执行，而不是硬编码到 PL/SQL
    中：


    ```sql

    -- 有效的 PL/SQL 块，使用动态 SQL 压缩表。

    begin

    execute immediate ''alter table launch move compress online'';

    end;

    /

    -- 无效的 PL/SQL 块，试图使用静态 SQL 压缩表。

    -- 此块将引发 PL/SQL 编译错误。

    begin

    alter table launch move compress online;

    end;

    /

    ```


    最初，PL/SQL 不支持静态 DDL 感觉不太对，尤其是 PL/SQL 和 SQL 集成得如此紧密。但在实践中，这个限制并不重要，因为执行动态 SQL 只需要几个额外的关键字。我们可能也不希望在
    PL/SQL 中使用静态 DDL，因为大多数 DDL 命令是破坏性的，并且需要重新编译相关的 PL/SQL 代码。如果一个过程直接引用一个对象然后修改该对象，该过程将不得不重新编译自身。Oracle
    可以不断解析 SQL 语句，但在代码运行时重新编译过程性代码是个坏主意。


    有几个动态 SQL 陷阱我们必须避免。虽然 DDL 必须始终使用动态 SQL，但 DML 应该很少使用动态 SQL。当静态代码工作良好时，我们不想使用动态代码。此外，仅仅因为我们能在运行时管理对象，并不意味着我们*应该*在运行时管理对象。在其他数据库中，频繁删除和重建表来保存中间值可能很常见，但这在
    Oracle 中并非最佳实践。在 Oracle 中，我们应该将中间值保存在内联视图、PL/SQL 集合或只创建一次的全局临时表中。


    ### 运行时才确定


    动态 SQL 的第二大常见用途是，直到运行时我们才知道 SQL 语句的对象、属性或结构。动态 SQL 适用于任何字符串，因此我们可以改变语句的程度没有限制。我们可以交换表名、添加条件、更改列，或完全重建整个语句。


    #### 动态统计行数


    例如，让我们创建一个函数来统计任何表中的行数。表名被传递给函数，然后连接到 SQL 语句字符串中。执行查询，结果存储在一个变量中，然后返回该变量：


    ```sql

    -- 使用动态 SQL 统计表中的行数。

    create or replace function get_count(p_table_name varchar2)

    return number authid current_user is

    v_count number;

    begin

    execute immediate

    ''select count(*) from ''||

    dbms_assert.sql_object_name(p_table_name)

    into v_count;

    return v_count;

    end;

    /

    select get_count(''LAUNCH'') row_count from dual;

    ROW_COUNT

    ```


    请注意前面的代码如何调用函数`DBMS_ASSERT.SQL_OBJECT_NAME()`。此函数确保参数是一个与对象名称匹配的简单字符串。如果我们尝试使用危险的字符串调用函数，如`get_count(''LAUNCH;
    DROP TABLE STUDENTS;'')`，`DBMS_ASSERT`包将引发异常“ORA-44002: invalid object name”。`DBMS_ASSERT`包包含几个可以帮助我们避免
    SQL 注入的函数。我们必须始终小心，不让未经授权的用户运行任意代码。


    #### 动态 WHERE 子句


    动态 SQL 的另一个流行用途是，直到运行时我们才知道`WHERE`子句的结构。当我们基于表单输入的值构建 SQL 语句时，可能会发生这种情况。使用表单中每个元素的静态查询可能会充斥着复合条件，如`COLUMN1
    = P_VALUE1 OR P_VALUE1 IS NULL`。最终的查询会变得庞大，并且更可能出现性能问题。如果动态生成最终查询以仅包含相关条件，可能会更简单、更快捷。


    即使我们在编译时知道依赖的对象，我们可能仍然希望避免创建静态依赖。例如，数据库链接会创建复杂的依赖关系，在一个数据库上更改基础对象可能导致另一个数据库中出现诸如“ORA-04062:
    timestamp of function "OWNER.OBJECT" has been changed”的错误。动态运行代码可以帮助避免与远程数据库相关的奇怪编译问题。


    ### 简化权限


    动态 SQL 一个不太为人知的优点是简化权限。在编译 PL/SQL 对象时，PL/SQL 对象的所有者必须在编译时直接访问所有静态引用的对象。不幸的是，这种访问权限不能通过角色授予。权限必须直接授予
    PL/SQL 对象的所有者。


    例如，想象一下如果我们更改前面的函数，并硬编码一个对`DBA_TABLES`的静态引用。即使我们的用户拥有`DBA`角色，该函数也会编译失败，错误为“ORA-00942:
    table or view does not exist”。发生此错误是因为访问权限仅通过*角色*授予，而不是直接授予*用户*。


    我们的第一反应可能是通过授予对`DBA_TABLES`视图的直接访问权限来解决这个问题。直接授权可以奏效，但当我们的权限变得一团糟，审计员询问为什么我们有这么多单独的授权时，我们可能会后悔。


    更好的解决方法是使用动态 SQL，这也是前面函数已经使用的方式。子句`AUTHID CURRENT_USER`告诉 Oracle，当函数运行时，该函数可以使用调用该函数的用户的角色。只要我们有一个角色授予我们访问
    DBA 视图的权限，我们就可以这样调用函数：


    ```sql

    -- 使用动态 SQL 访问 DBA 视图。

    select get_count(''DBA_TABLES'') row_count from dual;

    ROW_COUNT

    ```


    这段讨论已经偏离到复杂的 PL/SQL 主题，如定义者权限与调用者权限。需要记住的重要一点是，尽管动态 SQL 可能需要几个额外的关键字，但它可以简化我们的权限要求。在大多数组织中，添加几行代码比获得提升的权限更容易。


    ### 规则引擎


    动态 SQL 可用于构建强大的规则引擎。规则引擎对于基于大量标准对索赔进行评分等任务很有帮助。许多医疗和保险系统都有数百条规则，其中许多包含简单重复的逻辑，例如`IF
    A AND B THEN 0`, `IF B OR C THEN 1`等。


    SQL 是一种高级语言，具有类似英语的语法。如果我们仔细设置列和表达式，我们的 SQL 语句可以看起来惊人地接近我们的需求。与其将每条规则硬编码为查询，不如将规则存储在表中，然后动态生成
    SQL 语句来实现这些规则。理想情况下，表中的规则可以由业务分析师验证或创建，无需任何编程知识。


    在实践中，规则引擎很难做好。将动态代码存储在关系数据库中并不总是容易的。源代码和任何语言一样，本质上是分层的。Oracle 当然能够存储和操作分层数据，但
    SQL 并不是解决困难分层问题的理想语言。虽然数据库当然能够包含简单的文本字符串，但代码版本控制最好还是使用版本控制软件。


    是否要构建规则引擎是一个艰难的决定。如果我们确实决定在 Oracle 中构建规则引擎，那么我们绝对应该使用动态 SQL 作为我们引擎的基石。构建规则引擎可能很快就会陷入创建自定义编程语言的泥潭，所以我们希望尽可能靠近
    SQL 和 PL/SQL。

    '
- fmt: "# When Not to Use Dynamic SQL\n\nDynamic SQL is intended for when we don’t\
    \ know the *structure* of the query until run time. Dynamic SQL should not be\
    \ used simply because we don’t know the *values* until run time. If only the values\
    \ are changing at run time, then bind variables are a better solution.\n\nIt’s\
    \ a common misconception that dynamic SQL is inevitably slower, less secure, or\
    \ messier than regular SQL. It’s true that dynamic programming presents challenges,\
    \ but it also provides amazing opportunities. An unhealthy fear of dynamic SQL\
    \ can lead to huge anti-patterns and cause us to miss great opportunities to use\
    \ SQL to solve problems. Later in this chapter, we’ll see how to tame dynamic\
    \ SQL with the right programming style.\n\n## Basic Features\n\nThere are many\
    \ dynamic SQL options, but most of our programs only need a few basic features.\
    \ We have to decide which version of dynamic SQL to use and understand the syntax\
    \ and how to pass information in and out of the SQL statement.\n\nOracle has two\
    \ different kinds of dynamic SQL. In ancient versions of Oracle, dynamic SQL could\
    \ only be executed through the complex PL/SQL package `DBMS_SQL`. Modern versions\
    \ of Oracle allow native dynamic SQL, which uses the simpler `EXECUTE IMMEDIATE`\
    \ and `OPEN/FOR` syntax. Native dynamic SQL is almost always the best choice.\
    \ Native dynamic SQL is faster and much simpler to use than `DBMS_SQL`. There\
    \ are some rare challenges that require `DBMS_SQL`, which are discussed in Chapter\
    \ [20](#471418_2_En_20_Chapter.xhtml).\n\nAs we’ve seen in the previous examples,\
    \ `EXECUTE IMMEDIATE` is easy to use – simply pass the statement as a string.\
    \ But we must remember to remove the terminator. For dynamic SQL, the statement\
    \ should not end with a semicolon. For dynamic PL/SQL, the PL/SQL block should\
    \ not end with a forward slash.\n\nJust like static SQL, the results of a dynamic\
    \ SQL statement can be assigned to variables using `INTO`. The following code\
    \ shows a simple native dynamic SQL example:\n\n```\n--Simple INTO example.\n\
    declare\n  v_dummy varchar2(1);\nbegin\n  execute immediate 'select dummy from\
    \ dual'\n    into v_dummy;\n  dbms_output.put_line('Dummy: '||v_dummy);\nend;\n\
    /\nDummy: X\n```\n\nThe `INTO` clause can also include a comma-separated list\
    \ of variables, if there are multiple columns returned. If the SQL statement is\
    \ not a `SELECT` statement, simply leave out the `INTO` clause. Multiple rows\
    \ of data can be captured with either a `BULK COLLECT` and collection variables\
    \ or a dynamic SQL cursor. But those advanced PL/SQL features are not discussed\
    \ here. The important point to remember is that there’s always a way to run any\
    \ statement dynamically.\n\n## Bind Variables for Performance and Security\n\n\
    Even though dynamic SQL executes concatenated strings, we should still take advantage\
    \ of bind variables. Bind variables can significantly improve the performance\
    \ and security of our dynamic SQL.\n\nBind variables are placeholders for real\
    \ values in SQL statements. Bind variables let Oracle reuse the same SQL statement\
    \ for different values, saving a lot of compile time.\n\nAlthough bind variables\
    \ and dynamic SQL seem like opposites, they can still be used together. For example,\
    \ the following code uses string concatenation to choose the table name, but it\
    \ uses a bind variable to choose the value:\n\n```\n--Count either LAUNCH or SATELLITE\
    \ rows for a LAUNCH_ID.\ndeclare\n  --(Pretend these are parameters):\n  p_launch_or_satellite\
    \ varchar2(100) := 'LAUNCH';\n  p_launch_id number := 4305;\n  v_count number;\n\
    begin\n  execute immediate\n    '\n    select count(*)\n    from '||\n    dbms_assert.sql_object_name(p_launch_or_satellite)||'\n\
    \    where launch_id = :launch_id\n    '\n    into v_count\n    using p_launch_id;\n\
    \  dbms_output.put_line('Row count: '||v_count);\nend;\n/\nRow count: 1\n```\n\
    \nIn the preceding code, using the bind variable significantly reduces the number\
    \ of SQL statements that need to be parsed. There may be multiple parsed statements\
    \ to handle the dynamic table name, but there won’t be a new statement for every\
    \ `LAUNCH_ID`. Bind variables don’t have to eliminate parsing; they only have\
    \ to reduce parsing.\n\nBind variables work slightly differently for SQL and PL/SQL.\
    \ In dynamic SQL, bind variables are set once per occurrence, regardless of the\
    \ bind variable name. In dynamic PL/SQL, bind variables are set once per unique\
    \ bind variable name. In the following example, both the SQL and PL/SQL code reference\
    \ the bind variable `A` twice. The dynamic SQL code requires two input values,\
    \ while the dynamic PL/SQL requires only one input value:\n\n```\n--SQL requires\
    \ variables for each bind variable.\n--PL/SQL requires variables for each unique\
    \ bind variable.\ndeclare\n  v_count number;\nbegin\n  execute immediate\n   \
    \ 'select count(*) from dual where 1=:A and 1=:A'\n    into v_count using 1,1;\n\
    \  execute immediate\n    '\n    declare\n      v_test1 number; v_test2 number;\n\
    \    begin\n      v_test1 := :A;  v_test2 := :A;\n    end;\n    ' using 1;\nend;\n\
    /\n```\n\nMore important than performance, bind variables can save us from huge\
    \ security problems. If we allow untrusted users to enter arbitrary values, those\
    \ users can change the meaning of our SQL statements. For example, imagine a program\
    \ with a partial line of code like this: `EXECUTE IMMEDIATE 'SELECT * FROM LAUNCH\
    \ WHERE LAUNCH_ID = '||V_VALUE`. We expect the variable to be a number, but what\
    \ happens if the variable is a string like this: `'1 or 1=1'`? We can use `DBMS_ASSERT`\
    \ to check values, but even that package is not as safe as bind variables.\n\n\
    Breaking out of a concatenated string value is called SQL injection, which is\
    \ one of the worst security holes. We must *never* allow untrusted user input\
    \ to run in dynamic SQL. There are many sneaky ways to escape out of a variable.\
    \ Even numbers and dates are not safe, because it may be possible to alter the\
    \ session and use weird strings for numeric and date formats.\n\nDynamic SQL is\
    \ an awesome, powerful feature. But every time we use it, we must consider the\
    \ performance and security implications. And just because we use dynamic SQL doesn’t\
    \ mean we shouldn’t also use bind variables.\n\n## How to Simplify String Concatenation\n\
    \nDynamic SQL can get ugly. It’s hard enough to build code with code. On top of\
    \ that, we have to deal with strings inside strings. To get the most out of dynamic\
    \ SQL, we need to be able to write decent-looking code. There are three simple\
    \ tricks we can combine to make our dynamic SQL infinitely more readable: multiline\
    \ strings, the alternative quoting mechanism, and templates.\n\n### Multiline\
    \ Strings\n\nOracle supports multiline strings, and they are trivial to use. There\
    \ are still programming languages that don’t support multiline strings, and many\
    \ developers are stuck in the bad habit of concatenating every line.\n\nThe previous\
    \ code example used this multiline string:\n\n```\n'\ndeclare\n  v_test1 number;\
    \ v_test2 number;\nbegin\n  v_test1 := :A;  v_test2 := :A;\nend;\n'\n```\n\nWithout\
    \ multiline strings, we would be left with this mess:\n\n```\n'declare'      \
    \                     ||chr(10)||\n'   v_test1 number; v_test2 number;'||chr(10)||\n\
    'begin'                             ||chr(10)||\n'   v_test1 := :A;  v_test2 :=\
    \ :A;' ||chr(10)||\n'end;'\n```\n\nThere is almost never a reason to avoid multiline\
    \ strings, even though there are potential ambiguities with line endings. Does\
    \ the code use ASCII character 10 (new line), 13 (line feed), or a combination\
    \ of the two? In practice, the line ending doesn’t matter. The readability of\
    \ our code is more important than irrelevant ambiguities, so we should use multiline\
    \ strings as much as possible."
  raw: '### When Not to Use Dynamic SQL


    Dynamic SQL is intended for when we don’t know the *structure* of the query until
    run time. Dynamic SQL should not be used simply because we don’t know the *values*
    until run time. If only the values are changing at run time, then bind variables
    are a better solution.


    It’s a common misconception that dynamic SQL is inevitably slower, less secure,
    or messier than regular SQL. It’s true that dynamic programming presents challenges,
    but it also provides amazing opportunities. An unhealthy fear of dynamic SQL can
    lead to huge anti-patterns and cause us to miss great opportunities to use SQL
    to solve problems. Later in this chapter, we’ll see how to tame dynamic SQL with
    the right programming style.


    ## Basic Features


    There are many dynamic SQL options, but most of our programs only need a few basic
    features. We have to decide which version of dynamic SQL to use and understand
    the syntax and how to pass information in and out of the SQL statement.


    Oracle has two different kinds of dynamic SQL. In ancient versions of Oracle,
    dynamic SQL could only be executed through the complex PL/SQL package `DBMS_SQL`.
    Modern versions of Oracle allow native dynamic SQL, which uses the simpler `EXECUTE
    IMMEDIATE` and `OPEN/FOR` syntax. Native dynamic SQL is almost always the best
    choice. Native dynamic SQL is faster and much simpler to use than `DBMS_SQL`.
    There are some rare challenges that require `DBMS_SQL`, which are discussed in
    Chapter [20](#471418_2_En_20_Chapter.xhtml).


    As we’ve seen in the previous examples, `EXECUTE IMMEDIATE` is easy to use – simply
    pass the statement as a string. But we must remember to remove the terminator.
    For dynamic SQL, the statement should not end with a semicolon. For dynamic PL/SQL,
    the PL/SQL block should not end with a forward slash.


    Just like static SQL, the results of a dynamic SQL statement can be assigned to
    variables using `INTO`. The following code shows a simple native dynamic SQL example:


    ```

    --Simple INTO example.

    declare

    v_dummy varchar2(1);

    begin

    execute immediate ''select dummy from dual''

    into v_dummy;

    dbms_output.put_line(''Dummy: ''||v_dummy);

    end;

    /

    Dummy: X

    ```


    The `INTO` clause can also include a comma-separated list of variables, if there
    are multiple columns returned. If the SQL statement is not a `SELECT` statement,
    simply leave out the `INTO` clause. Multiple rows of data can be captured with
    either a `BULK COLLECT` and collection variables or a dynamic SQL cursor. But
    those advanced PL/SQL features are not discussed here. The important point to
    remember is that there’s always a way to run any statement dynamically.


    ## Bind Variables for Performance and Security


    Even though dynamic SQL executes concatenated strings, we should still take advantage
    of bind variables. Bind variables can significantly improve the performance and
    security of our dynamic SQL.


    Bind variables are placeholders for real values in SQL statements. Bind variables
    let Oracle reuse the same SQL statement for different values, saving a lot of
    compile time.


    Although bind variables and dynamic SQL seem like opposites, they can still be
    used together. For example, the following code uses string concatenation to choose
    the table name, but it uses a bind variable to choose the value:


    ```

    --Count either LAUNCH or SATELLITE rows for a LAUNCH_ID.

    declare

    --(Pretend these are parameters):

    p_launch_or_satellite varchar2(100) := ''LAUNCH'';

    p_launch_id number := 4305;

    v_count number;

    begin

    execute immediate

    ''

    select count(*)

    from ''||

    dbms_assert.sql_object_name(p_launch_or_satellite)||''

    where launch_id = :launch_id

    ''

    into v_count

    using p_launch_id;

    dbms_output.put_line(''Row count: ''||v_count);

    end;

    /

    Row count: 1

    ```


    In the preceding code, using the bind variable significantly reduces the number
    of SQL statements that need to be parsed. There may be multiple parsed statements
    to handle the dynamic table name, but there won’t be a new statement for every
    `LAUNCH_ID`. Bind variables don’t have to eliminate parsing; they only have to
    reduce parsing.


    Bind variables work slightly differently for SQL and PL/SQL. In dynamic SQL, bind
    variables are set once per occurrence, regardless of the bind variable name. In
    dynamic PL/SQL, bind variables are set once per unique bind variable name. In
    the following example, both the SQL and PL/SQL code reference the bind variable
    `A` twice. The dynamic SQL code requires two input values, while the dynamic PL/SQL
    requires only one input value:


    ```

    --SQL requires variables for each bind variable.

    --PL/SQL requires variables for each unique bind variable.

    declare

    v_count number;

    begin

    execute immediate

    ''select count(*) from dual where 1=:A and 1=:A''

    into v_count using 1,1;

    execute immediate

    ''

    declare

    v_test1 number; v_test2 number;

    begin

    v_test1 := :A;  v_test2 := :A;

    end;

    '' using 1;

    end;

    /

    ```


    More important than performance, bind variables can save us from huge security
    problems. If we allow untrusted users to enter arbitrary values, those users can
    change the meaning of our SQL statements. For example, imagine a program with
    a partial line of code like this: `EXECUTE IMMEDIATE ''SELECT * FROM LAUNCH WHERE
    LAUNCH_ID = ''||V_VALUE`. We expect the variable to be a number, but what happens
    if the variable is a string like this: `''1 or 1=1''`? We can use `DBMS_ASSERT`
    to check values, but even that package is not as safe as bind variables.


    Breaking out of a concatenated string value is called SQL injection, which is
    one of the worst security holes. We must *never* allow untrusted user input to
    run in dynamic SQL. There are many sneaky ways to escape out of a variable. Even
    numbers and dates are not safe, because it may be possible to alter the session
    and use weird strings for numeric and date formats.


    Dynamic SQL is an awesome, powerful feature. But every time we use it, we must
    consider the performance and security implications. And just because we use dynamic
    SQL doesn’t mean we shouldn’t also use bind variables.


    ## How to Simplify String Concatenation


    Dynamic SQL can get ugly. It’s hard enough to build code with code. On top of
    that, we have to deal with strings inside strings. To get the most out of dynamic
    SQL, we need to be able to write decent-looking code. There are three simple tricks
    we can combine to make our dynamic SQL infinitely more readable: multiline strings,
    the alternative quoting mechanism, and templates.


    ### Multiline Strings


    Oracle supports multiline strings, and they are trivial to use. There are still
    programming languages that don’t support multiline strings, and many developers
    are stuck in the bad habit of concatenating every line.


    The previous code example used this multiline string:


    ```

    ''

    declare

    v_test1 number; v_test2 number;

    begin

    v_test1 := :A;  v_test2 := :A;

    end;

    ''

    ```


    Without multiline strings, we would be left with this mess:


    ```

    ''declare''                           ||chr(10)||

    ''   v_test1 number; v_test2 number;''||chr(10)||

    ''begin''                             ||chr(10)||

    ''   v_test1 := :A;  v_test2 := :A;'' ||chr(10)||

    ''end;''

    ```


    There is almost never a reason to avoid multiline strings, even though there are
    potential ambiguities with line endings. Does the code use ASCII character 10
    (new line), 13 (line feed), or a combination of the two? In practice, the line
    ending doesn’t matter. The readability of our code is more important than irrelevant
    ambiguities, so we should use multiline strings as much as possible.'
  trans: "# 何时不应使用动态 SQL\n\n动态 SQL 适用于在运行时才知道查询*结构*的情况。不应仅仅因为在运行时才知道*值*而使用动态 SQL。如果只有值在运行时变化，那么绑定变量是更好的解决方案。\n\
    \n一个常见的误解是，动态 SQL 必然比常规 SQL 更慢、更不安全或更混乱。确实，动态编程带来了挑战，但它也提供了绝佳的机会。对动态 SQL 的病态恐惧可能导致巨大的反模式，并使我们错失使用\
    \ SQL 解决问题的良机。本章稍后将探讨如何通过正确的编程风格来驯服动态 SQL。\n\n## 基本特性\n\n动态 SQL 有很多选项，但我们的大多数程序只需要几个基本特性。我们必须决定使用哪个版本的动态\
    \ SQL，并理解其语法以及如何向 SQL 语句传入和传出信息。\n\nOracle 有两种不同的动态 SQL。在古老的 Oracle 版本中，动态 SQL\
    \ 只能通过复杂的 PL/SQL 包 `DBMS_SQL` 来执行。现代版本的 Oracle 允许使用原生动态 SQL，它采用了更简单的 `EXECUTE\
    \ IMMEDIATE` 和 `OPEN/FOR` 语法。原生动态 SQL 几乎总是最佳选择。原生动态 SQL 比 `DBMS_SQL` 更快且使用起来简单得多。有一些罕见的挑战需要\
    \ `DBMS_SQL`，这些将在第 20 章讨论。\n\n正如我们在前面的示例中看到的，`EXECUTE IMMEDIATE` 易于使用——只需将语句作为字符串传递即可。但我们必须记住移除终止符。对于动态\
    \ SQL，语句不应以分号结尾。对于动态 PL/SQL，PL/SQL 块不应以正斜杠结尾。\n\n与静态 SQL 一样，动态 SQL 语句的结果可以使用 `INTO`\
    \ 赋值给变量。以下代码展示了一个简单的原生动态 SQL 示例：\n\n```\n--简单的 INTO 示例。\ndeclare\n  v_dummy varchar2(1);\n\
    begin\n  execute immediate 'select dummy from dual'\n    into v_dummy;\n  dbms_output.put_line('Dummy:\
    \ '||v_dummy);\nend;\n/\nDummy: X\n```\n\n如果返回多列，`INTO` 子句也可以包含一个逗号分隔的变量列表。如果\
    \ SQL 语句不是 `SELECT` 语句，只需省略 `INTO` 子句。可以使用 `BULK COLLECT` 和集合变量或动态 SQL 游标来捕获多行数据。但那些高级的\
    \ PL/SQL 特性此处不作讨论。需要记住的重要一点是，总有办法动态地执行任何语句。\n\n## 为性能和安全使用绑定变量\n\n尽管动态 SQL 执行的是拼接字符串，我们仍应利用绑定变量。绑定变量可以显著提升动态\
    \ SQL 的性能和安全性。\n\n绑定变量是 SQL 语句中真实值的占位符。绑定变量让 Oracle 能够为不同的值重用相同的 SQL 语句，从而节省大量编译时间。\n\
    \n虽然绑定变量和动态 SQL 看起来是相反的，但它们仍可以一起使用。例如，以下代码使用字符串拼接来选择表名，但使用绑定变量来选择值：\n\n```\n--根据\
    \ LAUNCH_ID 统计 LAUNCH 或 SATELLITE 表的行数。\ndeclare\n  --（假设这些是参数）：\n  p_launch_or_satellite\
    \ varchar2(100) := 'LAUNCH';\n  p_launch_id number := 4305;\n  v_count number;\n\
    begin\n  execute immediate\n    '\n    select count(*)\n    from '||\n    dbms_assert.sql_object_name(p_launch_or_satellite)||'\n\
    \    where launch_id = :launch_id\n    '\n    into v_count\n    using p_launch_id;\n\
    \  dbms_output.put_line('Row count: '||v_count);\nend;\n/\nRow count: 1\n```\n\
    \n在前面的代码中，使用绑定变量显著减少了需要解析的 SQL 语句数量。可能需要多个已解析的语句来处理动态表名，但不会为每个 `LAUNCH_ID` 产生一个新语句。绑定变量不必消除解析；它们只需要减少解析。\n\
    \n绑定变量在 SQL 和 PL/SQL 中的工作方式略有不同。在动态 SQL 中，绑定变量按每次出现进行设置，无论绑定变量名称如何。在动态 PL/SQL\
    \ 中，绑定变量按每个唯一的绑定变量名称设置一次。在下面的示例中，SQL 和 PL/SQL 代码都引用了绑定变量 `A` 两次。动态 SQL 代码需要两个输入值，而动态\
    \ PL/SQL 只需要一个输入值：\n\n```\n--SQL 需要为每个绑定变量提供变量。\n--PL/SQL 只需为每个唯一的绑定变量提供变量。\n\
    declare\n  v_count number;\nbegin\n  execute immediate\n    'select count(*) from\
    \ dual where 1=:A and 1=:A'\n    into v_count using 1,1;\n  execute immediate\n\
    \    '\n    declare\n      v_test1 number; v_test2 number;\n    begin\n      v_test1\
    \ := :A;  v_test2 := :A;\n    end;\n    ' using 1;\nend;\n/\n```\n\n比性能更重要的是，绑定变量可以让我们避免巨大的安全问题。如果我们允许不受信任的用户输入任意值，这些用户可能会改变我们\
    \ SQL 语句的含义。例如，想象一个程序有这样一段代码：`EXECUTE IMMEDIATE 'SELECT * FROM LAUNCH WHERE LAUNCH_ID\
    \ = '||V_VALUE`。我们期望变量是一个数字，但如果变量是像 `'1 or 1=1'` 这样的字符串会发生什么？我们可以使用 `DBMS_ASSERT`\
    \ 来检查值，但即使那个包也不如绑定变量安全。\n\n从拼接的字符串值中“跳出”被称为 SQL 注入，这是最严重的安全漏洞之一。我们*绝不*允许不受信任的用户输入在动态\
    \ SQL 中运行。有很多狡猾的方法可以“逃出”变量。即使是数字和日期也不安全，因为可能通过更改会话并使用怪异的字符串作为数字和日期格式。\n\n动态 SQL\
    \ 是一个强大而绝妙的特性。但每次使用它时，我们都必须考虑其性能和安全影响。并且，我们使用了动态 SQL 并不意味着就不应再使用绑定变量。\n\n## 如何简化字符串拼接\n\
    \n动态 SQL 可能会变得很丑陋。用代码构建代码已经够难了。除此之外，我们还必须处理字符串内部的字符串。为了充分利用动态 SQL，我们需要能够编写看起来体面的代码。有三种简单的技巧可以结合起来，使我们的动态\
    \ SQL 可读性无限提升：多行字符串、替代引号机制和模板。\n\n### 多行字符串\n\nOracle 支持多行字符串，而且它们非常易于使用。现在仍然有不支持多行字符串的编程语言，许多开发者仍陷于拼接每一行的坏习惯中。\n\
    \n前面的代码示例使用了这个多行字符串：\n\n```\n'\ndeclare\n  v_test1 number; v_test2 number;\nbegin\n\
    \  v_test1 := :A;  v_test2 := :A;\nend;\n'\n```\n\n如果没有多行字符串，我们就会留下这样的混乱：\n\n\
    ```\n'declare'                           ||chr(10)||\n'   v_test1 number; v_test2\
    \ number;'||chr(10)||\n'begin'                             ||chr(10)||\n'   v_test1\
    \ := :A;  v_test2 := :A;' ||chr(10)||\n'end;'\n```\n\n几乎没有任何理由要避免使用多行字符串，尽管行尾可能存在潜在的歧义。代码使用的是\
    \ ASCII 字符 10（换行符）、13（回车符）还是两者的组合？在实践中，行尾并不重要。代码的可读性比无关紧要的歧义更重要，因此我们应该尽可能多地使用多行字符串。"
- fmt: '# Alternative Quoting Mechanism


    Embedding single quotation marks in strings is painful if we only use escape characters.
    The alternative quoting mechanism can help us write much cleaner code.


    The most common way to embed single quotation marks is to escape them, by using
    two single quotation marks next to each other. Escaping can lead to visually confusing
    code, as seen in the following:


    ```sql

    --Single quotation mark examples.

    select

    ''A''    no_quote,

    ''A''''B'' quote_in_middle,

    ''''''A''  quote_at_beginning,

    ''''''''   only_a_quote

    from dual;

    NO_QUOTE   QUOTE_IN_MIDDLE   QUOTE_AT_BEGINNING   ONLY_A_QUOTE

    --------   ---------------   ------------------   ------------

    A          A''B               ''A                   ''

    ```


    The preceding code is only the beginning of concatenation hell. When we plug SQL
    statements into strings or nest SQL inside PL/SQL inside strings, our code quickly
    becomes repulsive. My personal, shameful record is 12 consecutive quotation marks.


    The alternative quoting mechanism helps us avoid concatenation problems. We can
    define our own delimiters and not have to worry about escape characters. With
    this improved syntax, we can more easily copy and paste SQL statements into code.


    To use the alternative quoting mechanism, begin the string with the letter `Q`,
    then a single quote, and then the opening delimiter. If the opening delimiter
    is one of `[`, `(`, `<`, or `{`, then the closing delimiter is the matching `]`,
    `)`, `>`, or `}`. For other delimiters, the opening and closing characters are
    the same.


    The following example uses the alternative quoting mechanism and returns the same
    results as the escape character version. This example demonstrates how the syntax
    works, but at first this feature looks like a huge step in the wrong direction:


    ```sql

    --Alternative quoting mechanism examples.

    select

    q''[A]''   no_quote,

    q''[A''''B]'' quote_in_middle,

    q''(''''A'')''  quote_at_beginning,

    q''!''''''!''   only_a_quote

    from dual;

    ```


    This is another case where we can learn the wrong lesson from trivial examples.
    If there is only one single quotation mark, then escaping is much simpler. But
    when we’re copying and pasting code as strings, the alternative quoting mechanism
    makes a world of difference. The following example is a more realistic comparison
    of escaping vs. the alternative quoting mechanism:


    ```sql

    --Escape character.

    begin

    execute immediate

    ''

    select ''''A'''' a from dual

    '';

    end;

    /

    ```


    ```sql

    --Custom delimiter.

    begin

    execute immediate

    q''[

    select ''A'' a from dual

    ]'';

    end;

    /

    ```


    With the alternative quoting mechanism, it is trivial to copy and paste entire
    blocks of code. If we want to debug the code in an IDE, we can simply highlight
    and run the innermost block. When we use escaping, we have to manually change
    the SQL before we can test the SQL independently.


    This section may sound like syntactic sugar, but the alternative quoting mechanism
    is more like syntactic steroids. Without the ability to write clear code, we would
    avoid dynamic SQL, which means we would also avoid SQL.


    # Templating


    String concatenation is still ugly, even with multiline strings and the alternative
    quoting mechanism. We can improve our code readability by replacing concatenation
    with a simple templating system. There are template libraries, but in practice
    all we need is simple variable names and the `REPLACE` function.


    For example, imagine we are constructing a dynamic SQL statement with unknown
    columns, tables, and conditions. The typical approach may end up looking something
    like this:


    ```sql

    ''select ''''''||v_column_1||'''''', ''||v_column_2||''

    from ''||v_table||''

    where status = ''''OPEN''''

    ''||v_optional_condition_1

    ```


    Dynamic SQL will never look quite as good as static SQL, but the preceding code
    is almost unreadable. And that code is still only a trivial example. Imagine concatenating
    an advanced SQL statement.


    Instead of concatenating results, the following code replaces variables with the
    real values:


    ```sql

    replace(replace(replace(replace(

    q''[

    select ''$V_COLUMN_1'', $V_COLUMN_2

    from $V_TABLE

    where status = ''OPEN''

    $V_OPTIONAL_CONDITION_1

    ]'',

    ''$V_COLUMN_1''            , v_column_1),

    ''$V_COLUMN_2''            , v_column_2),

    ''$V_TABLE''               , v_table),

    ''$V_OPTIONAL_CONDITION_1'', v_optional_condition_1)

    ```


    The overall code is larger because we need to add four `REPLACE` functions. But
    the SQL statement is much more readable. The variable replacing is unimportant
    boilerplate code – the SQL statement is what’s important. Making our PL/SQL uglier
    to make our SQL prettier is a good trade-off. This templating approach is also
    vital if we want to store templates in a repository and use them to create a rule
    engine.


    Dynamic SQL looks much better when we combine multiline strings, the alternative
    quoting mechanism, and a simple template system. Dynamic code can quickly grow
    out of control, so we need to spend a little extra time to keep our code clean.
    That effort will be well worth it if we get to use SQL more often. Dynamic SQL
    is not perfect, but it’s better than the alternatives.


    # Code Generation, Not Generic Code


    Dynamic SQL is typically used for generating code or temporary objects at run
    time. But we can also use dynamic SQL to create permanent code. Instead of building
    one complex object to handle multiple scenarios, we can dynamically build multiple
    simple objects instead.


    Dynamic code generation is considered evil in most programming languages. For
    example, the `EVAL` function in JavaScript is frequently abused. Most programming
    languages use features like reflection, generics, or polymorphism to create dynamic
    programs. But the best practices are different in Oracle.


    The reason for the difference in programming styles is that Oracle is more structured
    than other environments, and Oracle is better prepared for frequent compiling.
    Oracle is a relational database and has taken to heart the idea of making everything
    available through relational interfaces. The data dictionary and dynamic performance
    views offer a wealth of information that lets us easily reason about our environment,
    objects, and code. Compiling is slow in other languages, but Oracle is able to
    quickly parse a large number of statements.


    Many of the advanced features in other programming languages don’t work well in
    Oracle. Common alternatives to dynamic SQL are object-relational features and
    the `ANYDATA` type. Those alternative technologies are useful in some limited
    contexts, but they are not nearly as powerful as SQL.


    For example, let’s say we need to create auditing triggers for our tables. Whenever
    a value is changed, we want to store the old value in a history table, along with
    metadata. The code is going to look relatively simple and repetitive; there will
    be lots of triggers, and the triggers will insert data only if the new values
    are different than the old values.


    Instead of copying and pasting code, we might be tempted to build triggers and
    a smart procedure that can handle “any” data change. But we’ll quickly find that
    converting “anything,” and using generic data types, is painful in SQL and PL/SQL.


    Instead of building one smart procedure, it’s better to generate lots of dumb
    triggers. With the data dictionary, we can easily figure out the column names
    and types and can automatically generate the boilerplate code.


    If we use a code generator approach, we need to spend extra effort to make both
    the code generator and the generated code look good. The compiler doesn’t care
    if triggers look nice, but eventually other programmers will see the code. We
    should also add a warning comment, such as “Do not modify; this code was automatically
    generated by <package name>.”


    There are many systems where we have to choose between a smart generic solution
    and an automatically generated simple solution. In Oracle, if we know how to tame
    dynamic SQL, generated code is usually the best solution.'
