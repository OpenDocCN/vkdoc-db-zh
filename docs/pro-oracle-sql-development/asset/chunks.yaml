  trans: '### 浏览内联视图


    通过嵌套视图、正确的缩进以及将括号单独成行（有时称为艾尔曼风格），我们可以轻松地浏览代码，并高亮显示我们只想运行的内联视图。无需更改任何代码，我们就能快速调试大部分大型
    SQL 语句。


    `图 12-4` 展示了我们如何高亮并运行前三个内联视图。甚至不需要尝试去阅读代码；文字太小，无论如何也不重要。只需专注于高亮选中部分的*形状*。同时，请注意在每次执行后，我们如何在
    IDE 窗口底部看到结果集。


    ![](img/471418_2_En_12_Fig4_HTML.png)


    三个代码片段，每个底部有一个表格，代表了对前三个内联视图的高亮和运行。启动、运载火箭阶段、发动机。


    `图 12-4`


    通过运行前三个内联视图来调试第 `6` 章中的示例


    这种调试方式比传统的命令式调试更简单、更强大。我们不需要为了调试而编译代码，不需要另一个界面来单步执行代码，并且我们可以在每个层级检查整个*数据集*，而不仅仅是几个标量值。找出前三个内联视图中的任何问题都将是轻而易举的。


    运行了最内层的内联视图后，我们可以开始组合内联视图并生成更高级别的结果集。`图 12-5` 展示了我们现在如何选择内联视图的*组*，并沿着层次结构向上移动。再次强调，不要尝试阅读代码；只需查看高亮部分的形状。在每一个额外的层级，我们都能看到数据被组合和转换。使用任何现代
    IDE，一次查看海量数据都是轻而易举的事，这使得调试简单得多。


    ![](img/471418_2_En_12_Fig5_HTML.png)


    三个代码片段，每个底部有一个表格，说明了内联视图组的选择和层次结构的向上移动。


    `图 12-5`


    通过运行最后三个内联视图来调试第 `6` 章中的示例


    `图 12-4` 和 `图 12-5` 只是运行了一个预先构建好的查询。我们可以轻松地修改并重新运行查询的任何层级，并观察这种变化如何影响结果。例如，我们可能想以更细的粒度运行查询，只专注于一个问题行。为了缩小调试范围，我们可能会在第一个内联视图中添加一个条件，如
    `LAUNCH_ID = 1`。


    由于每个高亮块都是独立的，我们可以用任何关系型数据源替换内联视图。我们可以调整内联视图代码以添加更多或更少的行，完全重写查询，或者用视图替换它。我们甚至可以通过返回集合的
    `PL/SQL` 表函数来程序化地生成源数据。（该高级技术在第 `21` 章中描述。）


    通过将一个内联视图改为以 `SELECT *` 开头，我们可以轻松查看未被投影的列。在查询的顶层使用 `SELECT *` 是个坏主意——我们不想返回超出需要的数据。但在某个嵌套的内联视图中使用
    `SELECT *` 可以让调试更容易。


    ## 总结


    给新程序员的最佳建议是：你知道的越少，你应该做的就越少。从小处着手，而不是试图一次性构建所有东西，最终导致令人困惑的大量错误。这个建议是“快速失败”的一个微小版本。嵌套的内联视图帮助我们从小处着手。最庞大的查询也是从一个简单的
    `SELECT * FROM SOME_TABLE` 开始的。


    不幸的是，对于 SQL，太多的开发者始于小，终于小。但你现在拥有了能力、环境、知识和风格，可以开始编写越来越大的 SQL 语句。开始在你舒适区之外编程。尝试用
    SQL 构建那些看起来可能太复杂，甚至是个坏主意的东西。


    在尝试构建大型 SQL 语句时，你肯定会遇到问题。大型 SQL 语句会带来性能风险，并需要一种新的阅读和调试方式。但如果你不放弃，你肯定能解决其中的大部分问题，并创建出更快、更易于使用的
    SQL 语句。


    # 13. 编写优美的 SQL 语句


    关于编程风格，最重要的是拥有风格。这个主观且充满观点的章节展示了传统的 SQL 风格如何可能阻碍我们实现 Oracle SQL 的真正潜力。


    美在观者眼中，但我们的美感应该基于合理的原则。太多开发者将所有时间都埋头编码，而没有停下来问一些重要的元问题。我们应该偶尔审视我们的代码，问自己：“*为什么*这段代码看起来不错？”


    让我们从一个具体的例子开始。以下查询统计每个发射机构的轨道和深空发射次数。一次发射可能涉及多个负责机构，因此我们需要使用桥接表 `LAUNCH_AGENCY`
    来连接 `LAUNCH` 和 `ORGANIZATION`。这个查询是我偏好的风格，也是本书通篇使用的风格：


    ```

    -- 我偏好的 SQL 编程风格。

    -- 拥有最多轨道和深空发射次数的机构。

    select organization.org_name, count(*) launch_count

    from launch

    join launch_agency

    on launch.launch_id = launch_agency.launch_id

    join organization

    on launch_agency.agency_org_code = organization.org_code

    where launch.launch_category in (''deep space'', ''orbital'')

    group by organization.org_name

    order by launch_count desc, org_name;

    ORG_NAME                                        LAUNCH_COUNT

    ---------------------------------------------   ------------

    Strategic Rocket Forces                                 1543

    Upravleniye Nachalnika Kosmicheskikh Sredstv             905

    National Aeronautics and Space Administration            470

    ...

    ```


    以下查询返回与前一个查询相同的结果，但使用更传统的 SQL 编程风格编写：


    ```

    -- 传统的 SQL 编程风格。

    -- 拥有最多轨道和深空发射次数的机构。

    SELECT o.org_name, COUNT(*) launch_count

    FROM launch l, launch_agency la, organization o

    WHERE l.launch_id = la.launch_id

    AND la.agency_org_code = o.org_code

    AND l.launch_category IN (''deep space'', ''orbital'')

    GROUP BY o.org_name

    ORDER BY launch_count DESC, o.org_name;

    ```


    本章的其余部分将比较和对比前面两个示例中使用的风格。无论我们对这些风格的看法如何，有一个风格选择是我们都能认同的：尽可能多地使用 SQL。如果我们将前面的查询用命令式的、逐行的逻辑重写，代码会更慢、更复杂。


    我们不仅仅是为了让 SQL 看起来视觉上愉悦。编程风格的真正目的是降低代码的复杂度并提高其可读性。当我们内化了简洁性和可读性这些目标之后，我们对什么是优美
    SQL 的看法，就应该反映一个追求更优代码的客观目标。'
- fmt: '## How to Measure Code Complexity


    Our programming styles should reduce the complexity of our programs, which then
    improves readability. But how do we measure code complexity? Programming is hard
    enough, and trying to formally classify and measure our programs is even harder.


    We don’t have a perfect way to measure code, but that doesn’t mean we can’t reason
    about our code. On one end of the spectrum of code metrics, we have complicated
    metrics like `cyclomatic complexity`, which counts the number of paths in a program.
    Those advanced metrics are meant for imperative programming languages and don’t
    help with SQL. On the other end of the spectrum, we have simple metrics like comparing
    the number of characters of a program.


    In practice, most SQL developers compare program complexity by counting the number
    of characters – which is a mistake. Characters are the atomic unit of code to
    the `compiler`, but we’re only interested in the atomic unit of code to a `human`.
    If we’re worried about human comprehension, the number of `words` is much more
    meaningful than the number of characters.


    It’s worth briefly discussing the importance of words, even though we all intuitively
    understand this idea. We think in words – it’s easier to remember a word than
    a collection of random characters. We read in words – we don’t sound out the characters,
    except for unfamiliar words. We type in words – touch typists memorize whole words
    and don’t think about individual characters. A good programming style should minimize
    the number of words and ignore the number of characters.


    Focusing only on the word count leads naturally to the next two rules – avoid
    unnecessary aliases and avoid abbreviations.


    ## Avoid Unnecessary Aliases


    We should not create an alias without a good reason. Aliases are sometimes required,
    but most aliases are optional. There is a trade-off when aliasing columns, expressions,
    inline views, or table references; aliases let us create more meaningful names,
    but aliases also create more variables.


    There are clearly many times when it helps to rename things. We certainly want
    to use aliases for expressions. We could reference the expression with double
    quotes, but quoted identifiers are painful to use. When we return two different
    columns that share the same name, we obviously want to change at least one of
    the names to something different. When we self-join a table, we need to give at
    least one instance of the table a different name. For example, we may use the
    same name but with a suffix like `_PARENT` or `_CHILD`. XML, JSON, and object-relational
    types may require an alias to access the values inside the object. And inline
    views deserve a good alias, especially when inline views are joined together like
    tables.


    But we must not create aliases simply to save a few characters. The advantages
    of single-letter aliases are trivial, and it doesn’t matter if we save a few bytes
    or a few seconds of typing. The disadvantages far outweigh the advantages. Adding
    unnecessary aliases adds more variables and consumes the most precious resource
    – the short-term memory of a developer. As described in the previous section,
    it’s the number of `words` in our SQL statements that matters, not the number
    of characters.


    For example, we should never use the trivial alias in the following example:


    ```

    --Without alias.

    select launch.launch_date from launch;

    --With alias.

    select l.launch_date from launch l;

    ```


    If we were really creating a program with the space data set, we would be intimately
    familiar with the `LAUNCH` table. After the hundredth time, typing the word `LAUNCH`
    becomes automatic and is just as fast as typing the letter `l`. In the preceding
    simple example, the alias isn’t that bad. But that alias is only tolerable because
    the example is trivial. Imagine if there were many other tables in a SQL statement,
    spaced dozens of lines apart; our short-term memory would be full of useless,
    one-letter variables, and we would have to spend a nonzero amount of thought to
    remember what the alias `l` stands for.


    Unnecessary aliasing reduces the number of characters but increases the number
    of words and variables. We quickly grow accustomed to our most common table and
    column names. We should take advantage of that familiarity and reuse the same
    names when possible. Never create a new variable without a good reason.


    ## Prefixes and Suffixes


    Naming things is hard, and even referring to things by their proper name can be
    hard. Should we add prefixes and suffixes to our object and variable names? And
    when we reference objects, should we prefix the schema or table name? There are
    no strict rules in this section, only a discussion of the relevant trade-offs
    and advice to be flexible.


    ### SQL Object and Column Names


    When we create SQL objects and columns, we should avoid adding simple data type
    information to the name. For example, avoid adding `TBL_` in front of table names
    or `_NUM` at the end of column names. Adding simple type information to names
    is called Hungarian notation and is generally considered a bad idea in most programming
    languages.^([^(29)](#fn29))


    The object types and column data types are easy to look up, and we don’t need
    constant reminders. SQL is a high-level language with English-like syntax; a lot
    of meaning can be embedded into a simple SQL statement, and adding a few trivial
    prefixes and suffixes can distract from the real meaning of our queries. Compared
    with the number of variables in procedural languages, we will have much fewer
    SQL object and column names to remember, so it’s worth the time to make the names
    easily readable.


    When it comes to SQL object and column names, the type information is a very tiny
    part of the story anyway. Our persistent data cannot be adequately explained by
    a simple prefix or suffix. To get the full story, we need to look at the relationships,
    check constraints, table and column comments, and data itself. Over time, we’ll
    become familiar with the names and know what they really mean.


    On the other hand, I occasionally break my own rule and add `_VW` to the end of
    views. There are many times when a view and a table are almost identical, but
    those two objects can’t share the same name.


    There’s another, more interesting exception to the rule to avoid adding type information
    to variable names. The original idea behind Hungarian notation was to add *useful*
    type information to a variable, which would make mistakes in our code more obvious.
    Prefixing each column name with the table name can help make our joins and expressions
    easier to understand. If the preceding example used this style, where every column
    in `LAUNCH` was prefixed by `LAUNCH_` and every column in `LAUNCH_AGENCY` was
    prefixed by `LAUNCH_AGENCY_`, the join between those two tables would be `ON LAUNCH_ID
    = LAUNCH_AGENCY_LAUNCH_ID`.


    Using consistent, unique prefixes makes it blindingly obvious where the columns
    from each join and expression come from. The downside to this approach is that
    the names get ridiculous pretty fast. In this case I would break another of my
    rules and allow abbreviations; if we are forced to consistently use a unique abbreviation
    for each table, those abbreviations will quickly have real meaning to the developers.
    Personally, I don’t think this naming system would be helpful for a schema as
    simple as the space data set. But I’ve seen the system work well in a schema with
    hundreds of tables. There are no objective answers here – only trade-offs.'
  raw: '## How to Measure Code Complexity


    Our programming styles should reduce the complexity of our programs, which then
    improves readability. But how do we measure code complexity? Programming is hard
    enough, and trying to formally classify and measure our programs is even harder.


    We don’t have a perfect way to measure code, but that doesn’t mean we can’t reason
    about our code. On one end of the spectrum of code metrics, we have complicated
    metrics like cyclomatic complexity, which counts the number of paths in a program.
    Those advanced metrics are meant for imperative programming languages and don’t
    help with SQL. On the other end of the spectrum, we have simple metrics like comparing
    the number of characters of a program.


    In practice, most SQL developers compare program complexity by counting the number
    of characters – which is a mistake. Characters are the atomic unit of code to
    the *compiler*, but we’re only interested in the atomic unit of code to a *human*.
    If we’re worried about human comprehension, the number of *words* is much more
    meaningful than the number of characters.


    It’s worth briefly discussing the importance of words, even though we all intuitively
    understand this idea. We think in words – it’s easier to remember a word than
    a collection of random characters. We read in words – we don’t sound out the characters,
    except for unfamiliar words. We type in words – touch typists memorize whole words
    and don’t think about individual characters. A good programming style should minimize
    the number of words and ignore the number of characters.


    Focusing only on the word count leads naturally to the next two rules – avoid
    unnecessary aliases and avoid abbreviations.


    ## Avoid Unnecessary Aliases


    We should not create an alias without a good reason. Aliases are sometimes required,
    but most aliases are optional. There is a trade-off when aliasing columns, expressions,
    inline views, or table references; aliases let us create more meaningful names,
    but aliases also create more variables.


    There are clearly many times when it helps to rename things. We certainly want
    to use aliases for expressions. We could reference the expression with double
    quotes, but quoted identifiers are painful to use. When we return two different
    columns that share the same name, we obviously want to change at least one of
    the names to something different. When we self-join a table, we need to give at
    least one instance of the table a different name. For example, we may use the
    same name but with a suffix like `_PARENT` or `_CHILD`. XML, JSON, and object-relational
    types may require an alias to access the values inside the object. And inline
    views deserve a good alias, especially when inline views are joined together like
    tables.


    But we must not create aliases simply to save a few characters. The advantages
    of single-letter aliases are trivial, and it doesn’t matter if we save a few bytes
    or a few seconds of typing. The disadvantages far outweigh the advantages. Adding
    unnecessary aliases adds more variables and consumes the most precious resource
    – the short-term memory of a developer. As described in the previous section,
    it’s the number of *words* in our SQL statements that matters, not the number
    of characters.


    For example, we should never use the trivial alias in the following example:


    ```

    --Without alias.

    select launch.launch_date from launch;

    --With alias.

    select l.launch_date from launch l;

    ```


    If we were really creating a program with the space data set, we would be intimately
    familiar with the `LAUNCH` table. After the hundredth time, typing the word `LAUNCH`
    becomes automatic and is just as fast as typing the letter `L`. In the preceding
    simple example, the alias isn’t that bad. But that alias is only tolerable because
    the example is trivial. Imagine if there were many other tables in a SQL statement,
    spaced dozens of lines apart; our short-term memory would be full of useless,
    one-letter variables, and we would have to spend a nonzero amount of thought to
    remember what the alias `L` stands for.


    Unnecessary aliasing reduces the number of characters but increases the number
    of words and variables. We quickly grow accustomed to our most common table and
    column names. We should take advantage of that familiarity and reuse the same
    names when possible. Never create a new variable without a good reason.


    ## Prefixes and Suffixes


    Naming things is hard, and even referring to things by their proper name can be
    hard. Should we add prefixes and suffixes to our object and variable names? And
    when we reference objects, should we prefix the schema or table name? There are
    no strict rules in this section, only a discussion of the relevant trade-offs
    and advice to be flexible.


    ### SQL Object and Column Names


    When we create SQL objects and columns, we should avoid adding simple data type
    information to the name. For example, avoid adding `TBL_` in front of table names
    or _`NUM at the end of column names.` Adding simple type information to names
    is called Hungarian notation and is generally considered a bad idea in most programming
    languages.^([^(29)](#fn29))


    The object types and column data types are easy to look up, and we don’t need
    constant reminders. SQL is a high-level language with English-like syntax; a lot
    of meaning can be embedded into a simple SQL statement, and adding a few trivial
    prefixes and suffixes can distract from the real meaning of our queries. Compared
    with the number of variables in procedural languages, we will have much fewer
    SQL object and column names to remember, so it’s worth the time to make the names
    easily readable.


    When it comes to SQL object and column names, the type information is a very tiny
    part of the story anyway. Our persistent data cannot be adequately explained by
    a simple prefix or suffix. To get the full story, we need to look at the relationships,
    check constraints, table and column comments, and data itself. Over time, we’ll
    become familiar with the names and know what they really mean.


    On the other hand, I occasionally break my own rule and add `_VW` to the end of
    views. There are many times when a view and a table are almost identical, but
    those two objects can’t share the same name.


    There’s another, more interesting exception to the rule to avoid adding type information
    to variable names. The original idea behind Hungarian notation was to add *useful*
    type information to a variable, which would make mistakes in our code more obvious.
    Prefixing each column name with the table name can help make our joins and expressions
    easier to understand. If the preceding example used this style, where every column
    in `LAUNCH` was prefixed by `LAUNCH_` and every column in `LAUNCH_AGENCY` was
    prefixed by `LAUNCH_AGENCY_`, the join between those two tables would be `ON LAUNCH_ID
    = LAUNCH_AGENCY_LAUNCH_ID`.


    Using consistent, unique prefixes makes it blindingly obvious where the columns
    from each join and expression come from. The downside to this approach is that
    the names get ridiculous pretty fast. In this case I would break another of my
    rules and allow abbreviations; if we are forced to consistently use a unique abbreviation
    for each table, those abbreviations will quickly have real meaning to the developers.
    Personally, I don’t think this naming system would be helpful for a schema as
    simple as the space data set. But I’ve seen the system work well in a schema with
    hundreds of tables. There are no objective answers here – only trade-offs.'
  trans: '## 如何衡量代码复杂度


    我们的编程风格应该降低程序的复杂度，从而提高可读性。但我们如何衡量代码的复杂度呢？编程本身已经足够困难了，而尝试对我们程序进行正式的分类和度量则更为艰难。


    我们没有完美的方法来衡量代码，但这并不意味着我们不能对自己的代码进行推理。在代码度量谱系的一端，我们有像`圈复杂度`这样复杂的度量标准，它计算程序中的路径数量。这些高级度量标准是针对命令式编程语言设计的，对
    SQL 帮助不大。在谱系的另一端，我们有一些简单的度量方法，比如比较程序的字符数量。


    在实践中，大多数 SQL 开发人员通过计算字符数来比较程序的复杂度——这是一个错误。字符对`编译器`而言是代码的原子单位，但我们只关心对`人类`而言代码的原子单位。如果我们担心的是人类的理解，那么`单词`的数量比字符的数量要有意义得多。


    值得简要讨论一下单词的重要性，尽管我们都凭直觉理解这个想法。我们用单词思考——记住一个单词比记住一串随机字符要容易。我们按单词阅读——除非是遇到生词，我们不会去读出每个字符。我们按单词打字——盲打打字员记忆的是整个单词，而不是单个字符。一个好的编程风格应该最小化单词的数量，而忽略字符的数量。


    仅仅关注单词数量自然引出了接下来的两条规则——避免不必要的别名以及避免缩写。


    ## 避免不必要的别名


    除非有充分的理由，我们不应创建别名。有时别名是必需的，但大多数别名是可选的。为列、表达式、内联视图或表引用创建别名是一种权衡；别名可以让我们创建更有意义的名称，但别名也创造了更多的变量。


    显然，很多时候重命名事物是有帮助的。我们当然希望为表达式使用别名。我们可以用双引号引用该表达式，但带引号的标识符使用起来很麻烦。当我们返回两个同名的不同列时，我们显然希望至少将其中一个的名称改为不同的名称。当我们进行自连接时，我们需要至少给表的一个实例起一个不同的名字。例如，我们可能使用相同的名称但添加
    `_PARENT` 或 `_CHILD` 这样的后缀。XML、JSON 和对象关系类型可能需要一个别名来访问对象内部的值。而内联视图值得一个好别名，尤其是当内联视图像表一样被连接在一起时。


    但我们绝不能仅仅为了节省几个字符而创建别名。单字母别名的优势微不足道，节省几个字节或几秒钟的打字时间无关紧要。缺点远大于优点。添加不必要的别名会增加更多的变量，并消耗最宝贵的资源——开发人员的短期记忆。如前一节所述，重要的是我们
    SQL 语句中的`单词`数量，而不是字符数量。


    例如，我们绝不应该在以下示例中使用这种无意义的别名：


    ```

    --无别名。

    select launch.launch_date from launch;

    --有别名。

    select l.launch_date from launch l;

    ```


    如果我们真的在用空间数据集创建程序，我们会非常熟悉 `LAUNCH` 表。在打了上百遍之后，输入 `LAUNCH` 这个词会变成下意识的动作，和输入字母 `l`
    一样快。在上面这个简单例子中，别名还不算太糟。但这种别名之所以可以容忍，仅仅因为例子很简单。想象一下，如果一个 SQL 语句中有很多其他表，分散在几十行之外；我们的短期记忆会被无用的单字母变量塞满，我们将不得不花费不小的精力去记住别名
    `l` 代表什么。


    不必要的别名减少了字符数，但增加了单词数和变量数。我们会很快习惯最常用的表名和列名。我们应该利用这种熟悉感，并在可能时重复使用相同的名称。没有充分的理由，绝不创建新的变量。


    ## 前缀和后缀


    命名是件难事，甚至用正确的名称来指代事物也可能很困难。我们应该为我们的对象和变量名称添加前缀和后缀吗？当我们引用对象时，我们应该加上模式名或表名作为前缀吗？本节没有严格的规则，只讨论相关的权衡并建议保持灵活。


    ### SQL 对象和列名


    当我们创建 SQL 对象和列时，应避免在名称中添加简单的数据类型信息。例如，避免在表名前添加 `TBL_`，或在列名后添加 `_NUM`。在名称中添加简单类型信息被称为匈牙利命名法，在大多数编程语言中通常被认为是个坏主意。^(²⁹)


    对象类型和列数据类型很容易查找，我们不需要持续的提醒。SQL 是一种具有类英语语法的高级语言；许多含义可以嵌入到简单的 SQL 语句中，而添加一些琐碎的前缀和后缀会分散我们对查询真正含义的注意力。与过程语言中的变量数量相比，我们需要记忆的
    SQL 对象和列名要少得多，所以值得花时间让这些名称易于阅读。


    对于 SQL 对象和列名，类型信息无论如何只是故事中非常微小的一部分。我们持久化的数据无法通过简单的前缀或后缀来充分解释。要了解完整情况，我们需要查看关系、检查约束、表和列的注释以及数据本身。久而久之，我们会熟悉这些名称，并了解它们的真实含义。


    另一方面，我偶尔也会打破自己的规则，在视图名称末尾添加 `_VW`。很多时候，一个视图和一个表几乎完全相同，但这两个对象不能共享相同的名称。


    对于避免向变量名称添加类型信息这条规则，还有另一个更有趣的例外。匈牙利命名法的初衷是向变量添加*有用的*类型信息，这会使代码中的错误更加明显。在每个列名前加上表名前缀，有助于使我们的连接和表达式更容易理解。如果前面的例子采用这种风格，即
    `LAUNCH` 中的每一列都加上 `LAUNCH_` 前缀，`LAUNCH_AGENCY` 中的每一列都加上 `LAUNCH_AGENCY_` 前缀，那么这两个表之间的连接条件将是
    `ON LAUNCH_ID = LAUNCH_AGENCY_LAUNCH_ID`。


    使用一致且唯一的前缀，可以非常清楚地显示每个连接和表达式中的列来自哪个表。这种方法缺点在于，名称会很快变得荒谬可笑。在这种情况下，我会打破我的另一条规则，允许使用缩写；如果我们被迫为每个表一致地使用一个唯一的缩写，这些缩写对开发人员来说很快就会获得真正的意义。就个人而言，我认为对于像空间数据集这样简单的模式，这种命名系统没有帮助。但我见过这种系统在一个有数百个表的模式中运行良好。这里没有客观答案——只有权衡取舍。'
- fmt: '### PL/SQL Variable Names


    Prefixes and suffixes tend to be more useful in PL/SQL than SQL. PL/SQL variables
    don’t have as much history as SQL names, and they usually only apply to a small
    block of code. Within those small blocks of code, the variables will only serve
    a small purpose and won’t have as much context as a table or column name. Prefixes
    and suffixes can create miniature contracts, to make it obvious how the variables
    should be used. For large PL/SQL systems, it’s not uncommon to have a naming standard
    to help differentiate between things like constant and nonconstant variables,
    global and local variables, input or output parameters, etc.


    Prefixes and suffixes are especially useful in PL/SQL when we have a variable
    that contains the same information as a column. It’s tempting to give that PL/SQL
    variable the exact same name as the column, but duplicate names lead to ambiguity.


    For example, if a PL/SQL function had a parameter named `LAUNCH_ID`, a SQL statement
    inside that function might contain an ambiguous expression, such as `WHERE LAUNCH.LAUNCH_ID
    = LAUNCH_ID`. Is the second `LAUNCH_ID` the value from the table or the value
    from the parameter? To avoid those situations, I prefix parameters with `P_`,
    for “parameter,” and I prefix local variables with `V_`, for “variable.” With
    a naming scheme like that, ambiguous expressions would be changed to a nonambiguous
    expression like `WHERE LAUNCH.LAUNCH_ID = P_LAUNCH_ID`.


    ### Referencing Tables and Columns


    We have several choices for how to reference tables and columns. Should we add
    the schema name in front of the table? Should we add the table name or alias in
    front of the column? The following example shows some of the different options
    for a simple query. The correct style depends on the context:


    ```sql

    --Four ways to run the same query.

    select launch_date from launch;

    select launch.launch_date from launch;

    select launch.launch_date from space.launch;

    select space.launch.launch_date from space.launch;

    ```


    The examples in this book do not reference the schema name. The space data set
    is installed in the schema `SPACE` by default, but there’s not much value in adding
    that schema name to every query. There’s little chance of confusion when the examples
    reference `SATELLITE` instead of `SPACE.SATELLITE`.


    There’s a trade-off between reliability and readability. It’s `possible` that
    we already have a table in our schema named `SATELLITE`, and we could confuse
    that table with `SPACE.SATELLITE`. Or a table with the same name could be added
    in the future. But that small risk doesn’t seem worth the cost of adding hundreds
    of additional words to our examples.


    If we’re constantly querying tables from another schema, we can create synonyms
    to hide the schema name. Or we can change our default schema with this command:


    ```sql

    --Default to the SPACE schema.

    alter session set current_schema=space;

    ```


    The examples in this book only put the table name in front of the column name
    when the table name is not obvious. It’s good to know where the columns come from,
    but many times the source table is unmistakable.


    For example, after using the space data set for a non-trivial amount of time,
    it is obvious that `LAUNCH_DATE` comes from the `LAUNCH` table. But “obviousness”
    is subjective. Prefixing `every` column with the table name is more consistent
    and may help us when we’re unfamiliar with the code, but all that prefixing clutters
    the SQL. Prefixing `none` of the columns will make the code smaller and may look
    better to someone intimately familiar with the data model, but it could be confusing
    to other developers. We need to find the right balance and adjust our style depending
    on the context.


    ## Avoid Abbreviations


    We should avoid uncommon abbreviations and use the unabridged form of words instead.
    Abbreviations use less characters but generate the same number of words. Code
    complexity is better measured by the number of words than the number of characters,
    and not all words are equal.


    Uncommon abbreviations are harder to type and harder to read than full words.
    The definition of “uncommon” is subjective and depends on the context. If every
    programmer on our project instantly recognizes an abbreviation, then we should
    use it. But we shouldn’t invent new abbreviations in every SQL statement.


    As a quick example, imagine if our data set used abbreviations for everything:


    ```sql

    --Abbreviated.  (This code does not work.)

    select * from lnch;

    --Not abbreviated.

    select * from launch;

    ```


    The first of the preceding two statements is smaller but is less readable. The
    abbreviation `LNCH` only requires a tiny amount of thought – but why make readers
    think any more than they have to? Reading the full word requires no thought and
    lets the readers focus all their attention on more important things.


    There are certainly times when abbreviations are useful or necessary. But the
    hacker tendency to remove vowels from all variable names is not helpful. Writing
    without vowels technically means we’re not even using an alphabet anymore; writing
    systems that only use consonants are called abjads. Abjads work fine in some languages
    but not in English or SQL. If we insist on abbreviating everything, we’re fighting
    against thousands of years of language evolution.'
