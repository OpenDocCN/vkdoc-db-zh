- fmt: '### Sorting Performance, Resources, and Implicit Sorting


    The performance impact of sorting is complicated. There are two main topics to
    consider – the algorithmic complexity of sorting and when sorting requires disk
    access instead of memory access. Chapter [16](#471418_2_En_16_Chapter.xhtml) contains
    a quick crash course in algorithmic complexity. For now, let’s just accept that
    the number of operations required to sort `N` rows is roughly `N*LOG(N)`. Sort
    operations get slower faster than we may think. If sorting 1000 rows requires
    `1000*LOG(1000) = 1000*3 = 3000` operations, then sorting 2000 rows requires `2000*LOG(2000)
    = 2000*3.3 = 6600` operations. The input doubled, but the amount of work more
    than doubled.


    Sorting is ideally done in the Program Global Area (PGA) memory buffer. PGA memory
    is split among server processes and is mostly controlled by the instance parameter
    `PGA_AGGREGATE_TARGET`. Sorting is CPU intensive and also requires space to store
    temporary result sets. If those temporary results can’t fit in the PGA, the results
    get written to disk in the temporary tablespace. Disk access is orders of magnitude
    slower than memory access. In the worst case, adding a single row to the input
    can make the sorting run ridiculously slower.


    On the other hand, there are times when sorting is much faster and less resource
    intensive than we expect. For example, Oracle may be able to transform queries
    to avoid redundant or unnecessary sorting, and Oracle may be able to read presorted
    data from an index.


    These complicated performance issues cause many developers to look for alternative
    ways to sort, but the `ORDER BY` clause is the `only` way to guarantee ordered
    results. Looking for workarounds to return ordered results as a by-product is
    a fool’s errand. In some versions of Oracle, in some cases, there are tricks that
    sort the results without actually asking to sort them. For example, older versions
    of Oracle automatically sorted results in `GROUP BY`. Years later, many programs
    broke when Oracle introduced new parallel features and grouping algorithms that
    don’t implicitly sort. We must never rely on undocumented features to sort data.


    If we have more than just ASCII data, we also need to consider Oracle’s National
    Language Support. NLS settings also affect comparisons and are discussed later
    in this chapter. For now, the most important NLS property to remember is that
    Oracle sorts are case sensitive by default.


    ## Set Operators


    Set operators combine query results with `UNION`, `UNION ALL`, `INTERSECT`, and
    `MINUS`. The difference between joins and set operators is that set operators
    depend on *all* of the values in the sets, not just the values used in join conditions.
    Since set operators depend on all of the values, both sets must have the same
    number and types of columns. Like joins, we can visualize set operators through
    the Venn diagrams in Figure [7-1](#471418_2_En_7_Chapter.xhtml#Fig1).


    ![](images/471418_2_En_7_Chapter/471418_2_En_7_Fig1_HTML.png)


    Figure 7-1: Venn diagram of SQL set operators


    ### UNION and UNION ALL


    The most common set operators are `UNION` and `UNION ALL`. These set operators
    are used when we want to combine sets of data, even if there are no relationships
    between the sets. `UNION` creates a distinct set, whereas `UNION ALL` allows for
    duplicates. Removing duplicates can have a huge performance impact, so we should
    use `UNION ALL` by default.


    The most common use of `UNION ALL` is to generate data. In Oracle we must always
    select from *something*, so there is a special pseudo table named `DUAL`. The
    `DUAL`^([^(16)](#fn16)) table only has one row, so if we want to create multiple
    rows, we must combine statements with `UNION ALL` like this:


    ```

    select ''1'' a from dual union all

    select ''2'' a from dual union all

    select ''3'' a from dual union all

    ...

    ```


    ### INTERSECT and MINUS


    `INTERSECT` returns rows where every value is identical between both queries.
    `MINUS` returns rows in the first query that are not in the second query. `INTERSECT`
    and `MINUS` are helpful for comparing data. For example, let’s take the preceding
    fizz buzz example and compare the `CASE` and `DECODE` techniques. A query like
    this can help us prove that both versions return the exact same data:


    ```

    --Compare CASE and DECODE fizz buzz.

    select

    rownum line_number,

    case

    when mod(rownum, 15) = 0 then ''fizz buzz''

    when mod(rownum,  3) = 0 then ''fizz''

    when mod(rownum,  5) = 0 then ''buzz''

    else to_char(rownum)

    end case_result

    from dual connect by level <= 100

    minus

    select

    rownum line_number,

    decode(mod(rownum, 15), 0, ''fizz buzz'',

    decode(mod(rownum, 3), 0, ''fizz'',

    decode(mod(rownum, 5), 0, ''buzz'', rownum)

    )

    ) decode_result

    from dual connect by level <= 100;

    ```


    Since the two subqueries in the preceding example are equal, the full query returns
    no rows. If we replace the `MINUS` with an `INTERSECT`, we could demonstrate the
    subqueries are identical by counting that all 100 rows are returned.


    ### Set Operator Complications


    Set operator comparisons are not always trivial. With the preceding example, we
    cannot simply say, “The minus query returns 0 rows; therefore, the sets are equal”
    or “The intersect returns 100 rows; therefore, the sets are equal.”


    What if the first subquery in the preceding example had `LEVEL <= 99` instead
    of `LEVEL <= 100`? The full query would still return 0 rows, but the sets aren’t
    completely equal. Or what if the first subquery had `LEVEL <= 101` and we used
    `INTERSECT`? The full query would return 100 rows, even though the sets are not
    equal. We need to carefully count the rows of each subquery before comparing with
    `MINUS` or `INTERSECT`, and we also need to watch out for duplicates.


    Similar to the rules of `DECODE`, set operators treat two nulls as identical values.
    Set operators are another place where Oracle breaks its own rules. But at least
    this time the broken rule makes sense. In practice, when comparing sets, we always
    want nulls to match. For example, the following query returns just one row, which
    is what we want:


    ```

    select null from dual

    union

    select null from dual;

    ```


    Set operators cannot work on unusual data types, such as `CLOB`, `LONG`, `XMLType`,
    user-defined types, etc. Those types will generate an error message like “ORA-00932:
    inconsistent datatypes: expected - got CLOB.” Large objects could theoretically
    contain gigabytes of data, which cannot be easily compared or ordered. The same
    limitations on large data types also apply to joining and sorting.


    Oracle 21c introduced new set operator features. `INTERSECT` and `MINUS` now have
    an `ALL` option, so you can perform those operations without getting unique results.
    To match the SQL standard, the keyword `EXCEPT` was added, but it works exactly
    the same way as `MINUS`.'
