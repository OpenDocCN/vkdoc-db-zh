    available, and SQL*Plus is our only choice. For some administrative tasks, we
    only have a terminal available. Even when we have a remote desktop, sometimes
    the connections are too slow to use graphical programs, and we’re stuck with the
    command line. We’re going to have to use SQL*Plus sometimes, so we might as well
    get used to it.


    When we use SQL*Plus, we must use the real thing. Many IDEs have a built-in SQL*Plus
    clone that we should avoid. Those clones are always missing important features,
    and sometimes they’re missing important bugs. The main benefit of SQL*Plus is
    the portability and compatibility across different platforms and versions. If
    something works in your SQL*Plus, but fails in mine, one of us isn’t using the
    real thing. I’ve seen many deployments fail because a developer used a SQL*Plus
    clone that didn’t have the 2,499-character-per-line limit. The code worked on
    their machine, but it failed on production when a real SQL*Plus was used. Those
    limits are annoying, but we need to be aware of limits as early in the development
    cycle as possible.'
  trans: '### 报表工具与 Excel


    IDE 擅长从 SQL 查询中检索结果，但这些初始结果并非总是赏心悦目。电子表格和报表工具可以帮助我们以更好的格式呈现结果。报表软件和商业智能是一个很大的话题，超出了本书的范围。但对于许多目的来说，Microsoft
    Excel 足以增强我们的结果展示。


    大多数 IDE 只需点击几下就能将数据导出到 Excel。在 Excel 中，我们应该学习如何进行一些简单的操作，如排序、筛选、去重、创建标题行、创建像 `=SUM(A1:A100)`
    这样的简单公式，以及创建简单的图表。我们可以在短短几小时内学会任何电子表格程序的基础知识。数据的呈现比我们想象的更重要。在与非技术人员分享数据之前，我们至少应该将结果放入
    Excel 中。


    我们的日常工作还需要许多其他程序，如浏览器、电子邮件客户端、终端模拟器、版本控制等。这里没有必要讨论这些程序，因为它们与 SQL 没有特定关系。但本章的主题同样适用于这些程序：投入时间了解我们的工具。


    ## SQL 与 PL/SQL


    如果你正在阅读这本书，说明你已经致力于学习 SQL。但简要讨论一下为什么花费大量时间 `精通` 一门语言是有益的，这是值得的。我们需要向自己、同事和雇主证明这项投入是合理的。


    开发人员经常声称学习一门新的编程语言很容易。但学习一门编程语言只有在三种情况下才容易：罕见的天才可以快速学习任何东西，一门没有太多深度的语言，或者一个不介意写出普通代码的开发者。


    人们低估了专业技能的价值。有时我们忘记了掌握一项技能是多么痛苦。想想这句话中的所有单词——我们是在何时何地学会它们的？我们记不清了，但我们的父母和老师可以讲述我们多年努力掌握语言的故事。有时我们不重视专业技能是因为邓宁-克鲁格效应；我们高估了自己的技能，因为我们甚至没有足够的知识来准确判断自己的认知水平。


    成为专家可能需要很长时间。十年是一个常见的估计，但不可能找到一个确切的数字。要达到足够好的水平，能够不假思索地完成某件事，需要很长时间。要凭直觉知道我们的代码何时不正确，也需要很长时间和有意识的练习。那
    10 年的经验不能是 1 年的经验重复十次。我们需要努力工作，不断进步，并将自己置于不是房间里最聪明的人的环境中。


    SQL 类似英语的语法使这门语言对初学者来说易于存储、更新和检索数据。但正是 Oracle SQL 的额外功能让我们能够以最佳方式处理和管理这些数据。整个
    Oracle 数据库生态系统不仅包括 SQL，还包括过程扩展 PL/SQL、像 `SQL*Plus` 这样的伪脚本语言、数百个软件包和实用程序、支持 XML
    和 JSON 等融合数据库特性，甚至像 APEX 这样的低代码网站构建工具。


    额外的关键字、功能和概念就是为什么我们必须花费更多时间来掌握 Oracle SQL，而不是一门传统的编程语言。额外的工作和额外的知识，可以证明我们在培训和参加会议等事情上花费的时间和金钱是合理的。


    成为专家值得花费时间和金钱吗？在许多情况下，答案是否定的。我们的大多数项目并不会因为变得优秀而比仅仅良好获得显著的收益。从职业角度来看，通才开发者通常比专才做得更好，尤其是在行业转向
    DevOps 的背景下。对我来说，成为一门语言的专家而不是两门语言还过得去，这是个人的选择。我厌倦了世界上所有平庸的软件。如果我们想创造出色的程序，就必须花时间成为专家。


    ## SQL\*Plus


    `SQL*Plus` 是一个很棒的工具，但仅限于特定的场景。`SQL*Plus` 是使用数据库最简单的方式。这种简单性对于脚本编写、演示、故障排除以及在无法使用图形工具时是一个优势。但是，如果我们将其用于开发、调试和即席查询，`SQL*Plus`
    将阻碍我们作为开发者的成长。


    ### 何时应使用 SQL\*Plus


    `SQL*Plus` 非常适合编写安装脚本，如第 2 章所述。它也非常适合构建可复现的测试用例，如第 3 章所述。简单、纯文本的格式让一切无所隐藏，使该程序对故障排除很有帮助。有时我们没有可用的桌面环境，而
    `SQL*Plus` 是我们唯一的选择。对于一些管理任务，我们只有终端可用。即使我们有远程桌面，有时连接速度太慢而无法使用图形程序，我们只能使用命令行。我们有时不得不使用
    `SQL*Plus`，所以不妨习惯它。


    当我们使用 `SQL*Plus` 时，必须使用真正的 `SQL*Plus`。许多 IDE 都有内置的 `SQL*Plus` 克隆版本，我们应该避免使用。这些克隆版本总是缺少重要功能，有时甚至缺少重要的
    bug。`SQL*Plus` 的主要好处在于其在不同平台和版本之间的可移植性和兼容性。如果某些东西在你的 `SQL*Plus` 中有效，但在我的版本中失败，那么我们中有人没有使用真正的
    `SQL*Plus`。我见过许多部署失败，因为开发人员使用了一个没有每行 2,499 字符限制的 `SQL*Plus` 克隆版本。代码在他们的机器上可以运行，但在生产环境使用真正的
    `SQL*Plus` 时就失败了。这些限制很烦人，但我们需要在开发周期中尽早意识到这些限制。'
- fmt: '## Integrated Development Environment


    ### When We Should Not Use SQL*Plus


    SQL*Plus is no longer adequate for our day-to-day development work. There are
    many mature IDEs that can significantly improve our productivity. Text is better
    than pictures for programming languages, but with a graphical IDE, we can have
    multiple windows of code and metadata, improved visualization of code, and quick
    access to hundreds of powerful options.


    For writing queries, we need to be able to quickly run and view the results of
    different parts of a query. SQL*Plus makes it hard to run inline views or subqueries
    – we can’t simply highlight code and press the run shortcut. And the command line
    formatting of SQL*Plus makes it almost impossible to meaningfully view the results
    of complex or ad hoc queries. If we already know the columns and only select the
    columns we want and set formatting options ahead of time, we can view a small
    set of columns fine in SQL*Plus. But that’s an extremely limited way of using
    a database. We should be able to effortlessly view `all` the data in our tables.


    It’s ridiculous to believe we can remember what all the values in our databases
    look like and be able to select the relevant columns each time we query a table.
    When we use SQL*Plus for ad hoc queries, we’re limiting ourselves to only the
    few things we remember well. We’ll never improve if we limit ourselves to what
    we already know.


    For example, during performance troubleshooting, it’s common to look at the view
    `V$SQL`. We rarely know what the problem is ahead of time; we’re just looking
    for something weird, so we need to look at everything. When we run the following
    query in SQL*Plus, the output is a worthless mess. I’m not even going to show
    the output – my conscience won’t let me kill a tree to print gibberish:


    ```

    SQL> select * from v$sql;

    ```


    When we run the preceding query in a graphical user interface, like Oracle SQL
    Developer, the results are infinitely more usable. The results in Figure [5-2](#471418_2_En_5_Chapter.xhtml#Fig2)
    are not exactly pretty, but we can scroll back and forth and more easily explore
    and understand the data.


    ![](images/471418_2_En_5_Chapter/471418_2_En_5_Fig2_HTML.png)


    The snippet represents a table for the query result, which has five columns and
    four rows after fetching 50 rows in 0.081 seconds.


    Figure 5-2: A simple data dictionary query in Oracle SQL Developer


    We live in an information age, and we need tools that can display large amounts
    of information. Many database professionals never reach their full potential because
    they refuse to use modern tools. Those old-fashioned developers also slow down
    the rest of us when we have to dumb down our programs to support 72 characters
    per line.


    Using an IDE is one of the few areas where we need to convince our coworkers to
    change their habits. We don’t want to start pointless flame wars about Oracle
    SQL Developer vs. Toad. But when we see someone stuck in the twentieth century,
    doing everything on the command line, it’s worth trying to gently convince them
    to upgrade their tools.


    The command line program SQLcl is designed to replace SQL*Plus, but that day is
    probably years away. That program has some interesting new features, but it also
    has bugs and Java installation issues, and it is not as ubiquitously available
    as SQL*Plus. We should stick with SQL*Plus to make our code more accessible.


    ### Learn an IDE


    The best way to learn an IDE is to watch an expert use it. When we watch someone
    use their IDE, there will be moments when we’re following along and then suddenly
    they’ll leap ahead of us. When we lose track, ask the other developer to explain
    their magic trick. Most developers are happy to share their IDE secrets with someone
    else, but only if we ask. There are many personal preferences in IDEs, and developers
    are nervous about explaining their favorite program to others, because they want
    to avoid disagreements. We should signal to those experts that we’re willing to
    learn all the tips and tricks we can, even if it does get us into the occasional
    argument about tabs vs. spaces.


    The most important thing to know about our IDEs is that there is always a way
    to change anything we want. Don’t like the default fonts and colors? Change them.
    Find it tedious to accomplish a repetitive task? Create a keyboard shortcut or
    a macro to automate it. Wish the tabs were ordered differently? Reorder them.
    Don’t like the cut of its jib? Look online and find a plug-in to alter the jib.
    We should never have to settle for anything with our IDE.


    This book is IDE agnostic and will not go into details about how to learn each
    IDE. But we should learn how to do at least the following things in our IDE: run
    the SQL at the cursor (learn the shortcut for running commands without having
    to highlight anything), view database objects in different schemas, open and change
    file system objects, create new database objects, view the DDL behind an object
    in the editor (usually by clicking the text), change syntax and formatting rules
    (such as changing tabs to spaces), change the NLS properties (such as the date
    format), debugging (how to quickly set breakpoints, step in, step out, etc.),
    run saved scripts or snippets, code navigation (such as right-clicking objects
    inside a package to go to different sections), refactor variable names, and much
    more. If any of those features are new to you, spend some time in your IDE to
    learn them. By learning how to run those tasks quickly, we can run more SQL statements,
    shorten our feedback loop, and improve our code faster.


    If you’ve never looked through your IDE’s options before, stop right now and spend
    10 minutes. Open the properties or settings menu, right-click in different windows,
    and look through the pop-up menus. Looking through the menus is faster than reading
    the manual, and I guarantee you’ll find at least one useful setting you’ll want
    to change.


    ### When Not to Use an IDE Feature


    We don’t want to use all the features of our IDE. Some developers use an IDE as
    a crutch to create code and can only program with point-and-click wizards. Just
    because those wizards exist doesn’t mean we have to use them. For advanced developers,
    the IDE is like a text editor on steroids. For example, we don’t want to use a
    “New Table” wizard in our IDE to create a table. We can still create tables with
    text, and our IDE will help us with things like syntax highlighting, auto complete,
    and much more.


    IDEs often contain features that may look useful or pretty but can be dangerous.
    As previously discussed, we should avoid our IDE’s imitation version of SQL*Plus.
    We should also avoid features that let a single instance of the program connect
    to multiple databases at the same time. One window should only be used for one
    connection, with the connection alias prominently displayed at the top of the
    window. Developers who use multiple tabs, each connected to a different database,
    inevitably run commands on the wrong database. We must configure our IDEs so that
    it is always blindingly obvious which database we are connected to.'
