    After creating each table in the example shown previously, I’m setting zone


    configurations to mark a table as being either +encrypted (needs encrypting) or


    +unencrypted (does not need encrypting). These constraints coincide with the attributes
    we used when defining the stores earlier.


    If you open the CockroachDB admin console and navigate to the data source URLs
    again, you’ll see that each of the nodes has an encrypted store and an unencrypted
    store, as is shown in Figure [6-2](#index_split_002.html#p149).


    ![](index-149_1.jpg)


    Chapter 6 Data privaCy


    ***Figure 6-2.** The Node 1 data stores*


    **CHAPTER 7**


    **Deployment Topologies**


    In this chapter, we’ll explore some common cluster deployment topologies. Each
    will make sense in different circumstances, depending on your environment, latency,
    and survivability requirements.


    I’ll create an example cluster for many of the topologies listed in this chapter
    to show you how it’s done. To balance clarity with succinctness, I will manually
    create CockroachDB nodes for all of the examples in this chapter. Depending on
    your infrastructure and preferred deployment and orchestration technologies, you
    may prefer to deploy with Kubernetes or use Cockroach Cloud. Note also that in
    this chapter, I aim to show just the relationships between nodes. I won’t be deploying
    geographically separate nodes.


    I’ll reuse some generated certificates and keys for all clusters to reduce repetition.


    I’ll create these with the following commands:


    $ mkdir certs


    $ mkdir keys


    $ cockroach cert create-ca \


    --certs-dir=certs \


    --ca-key=keys/ca.key


    $ cockroach cert create-node \


    --certs-dir=certs \


    --ca-key=keys/ca.key \


    localhost


    $ cockroach cert create-client \


    root \


    --certs-dir=certs \


    --ca-key=keys/ca.key


    © Rob Reid 2022


    R. Reid, *Practical CockroachDB*[, https://doi.org/10.1007/978-1-4842-8224-3_7](https://doi.org/10.1007/978-1-4842-8224-3_7#DOI)


    ChApTEr 7 DEploymENT TopologiEs


    **Single-Region Topologies**


    We’ll start with the single-region topologies. These are recommended for small-scale
    clusters that serve users from a single location. For example, these topologies
    will work for you if you’re a UK business with only UK customers. Let’s explore
    them.


    **Development**


    You’ll likely want to keep costs to a minimum during the course of development.
    For this reason, Cockroach Labs acknowledges that a single-node cluster works
    well for this scenario, if you are prepared to prioritize cost-savings and simplicity
    over resiliency. The Development Topology defines exactly this: a CockroachDB
    cluster with a single node.


    I would give a single-node cluster the following characteristics:


    **Read latency**


    ★★★★★


    The gateway node is also the leaseholder node for all data,


    meaning no internode hops required.


    **Write latency**


    ★★★★★


    No replication latencies incurred.


    **Resiliency**


    ★


    A single-node cluster offers no protection against machine or


    network failures.


    **Ease of setup** ★★★★★


    Can be installed onto a machine on the local network or an E2C


    server, etc.


    A development cluster like this will exhibit different performance characteristics
    to a distributed cluster. Care should be taken to thoroughly test an accurate
    representation of your production cluster before real users start interacting
    with your application.


    **Basic Production**


    Once your application has users who depend on an available database, a single-node
    cluster is no longer a viable topology. The Basic Production topology defines
    a CockroachDB cluster with nodes in multiple availability zones (AZs) in a single
    region.


    The number of nodes you choose to deploy is up to you, but in order to survive
    an outage of a single AZ, you’ll need at least three nodes with a replication
    factor of three.


    In order to survive an outage of two AZs, you’ll need at least five nodes with
    a replication factor of five.


    ![](index-152_1.png)


    ChApTEr 7 DEploymENT TopologiEs


    The architecture of a Basic Production topology will typically resemble Figur[e
    7-1.](#index_split_002.html#p152)


    ***Figure 7-1.** Architecture of a cluster using the Basic Production topology*
    Let’s look at some of the benefits and drawbacks of a cluster using this topology:
    **Read latency**


    ★★★★★ The gateway node is in the same region as the leaseholder nodes.


    **Write latency** ★★★★★ All replication occurs within the same region, so consensus
    is achieved quickly.


    **Resiliency**


    ★★★


    Can survive single/multiple AZ outages depending on your


    architecture, node count, and replication strategy.


    **Ease of setup** ★★★★


    All nodes exist within a single region, so they can be easily


    orchestrated with Kubernetes with little effort.


    Now, let’s create a cluster to simulate the Basic Production topology. Let’s create
    a five-node cluster that can handle an outage of two AZs:


    $ cockroach start \


    --certs-dir=certs \


    --store=node1 \


    --listen-addr=localhost:26257 \


    --http-addr=localhost:8080 \


    --locality=region=us-east1,zone=a \


    -- join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,


    localhost:262561


    $ cockroach start \


    --certs-dir=certs \


    --store=node2 \


    --listen-addr=localhost:26258 \


    ChApTEr 7 DEploymENT TopologiEs


    --http-addr=localhost:8081 \


    --locality=region=us-east1,zone=b \


    -- join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,


    localhost:262561


    $ cockroach start \


    --certs-dir=certs \


    --store=node3 \


    --listen-addr=localhost:26259 \


    --http-addr=localhost:8082 \


    --locality=region=us-east1,zone=c \


    -- join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,


    localhost:262561


    $ cockroach start \


    --certs-dir=certs \


    --store=node4 \


    --listen-addr=localhost:26260 \


    --http-addr=localhost:8083 \


    --locality=region=us-east1,zone=d \


    -- join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,


    localhost:262561


    $ cockroach start \


    --certs-dir=certs \


    --store=node5 \


    --listen-addr=localhost:26261 \


    --http-addr=localhost:8084 \


    --locality=region=us-east1,zone=e \


    -- join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,


    localhost:262561


    $ cockroach init --certs-dir=certs --host=localhost:26257


    Next, we’ll connect to the cluster and run some commands to ensure CockroachDB


    replicates our data across the five nodes.


    ChApTEr 7 DEploymENT TopologiEs


    $ cockroach sql --certs-dir=certs


    ALTER RANGE default CONFIGURE ZONE USING num_replicas = 5;


    CREATE TABLE example();


    SELECT lease_holder_locality, replicas


    FROM [SHOW RANGES FROM TABLE example];


    lease_holder_locality | replicas


    *-------------------------+--------------*


    region=us-east1,zone=e | {1,2,3,4,5}


    The increase in replicas from three to five can take a minute or two to take effect,
    but once it has, you’ll notice that CockroachDB uses all five of the nodes as
    replicas for data in the example table. If we lose two of the five nodes, the
    remaining three will still manage to achieve quorum.


    **Multiregion Topologies**


    Multiregion topologies are good for applications requiring a higher degree of
    failure tolerance. I’d recommend these topologies for clusters that need to span
    larger geographic areas, with customers in multiple locations. I’d also recommend
    these topologies if your survival goals include the outage of an entire cloud
    region, regardless of where your customers are situated. For example, if you’re
    an EU-based business with customers in Europe and Asia, these topologies will
    work well. Let’s explore them.


    **Regional Tables**


    The Regional Tables topology is a good choice for scenarios where you need to
    pin data to specific regions. In this configuration, you’ll ensure that data for
    users in a given region is always close to them, making for fast local region
    reads and writes.'
  trans: "\n# 第六章 数据隐私\n\n`ALTER TABLE product CONFIGURE ZONE USING CONSTRAINTS =\
    \ '[+unencrypted]';`\n\n在前面示例中创建每个表后，我设置区域配置，将表标记为`+encrypted`（需要加密）或`+unencrypted`（不需要加密）。这些约束条件与我们之前定义存储时使用的属性一致。\n\
    \n如果打开 CockroachDB 管理控制台并再次导航到数据源 URL，你会看到每个节点都有一个加密存储和一个未加密存储，如图 6-2 所示。\n\n\
    ![](img/index-149_1.jpg)\n\n**图 6-2.** 节点 1 的数据存储\n\n# 第七章 部署拓扑\n\n在本章中，我们将探讨一些常见的集群部署拓扑。每种拓扑适用于不同的情况，具体取决于你的环境、延迟和生存能力要求。\n\
    \n我将为本章列出的许多拓扑创建一个示例集群，向你展示如何操作。为了在清晰性和简洁性之间取得平衡，我将手动为本章所有示例创建 CockroachDB 节点。根据你的基础设施以及偏好的部署和编排技术，你可能更倾向于使用\
    \ Kubernetes 部署或使用 Cockroach Cloud。另请注意，在本章中，我旨在仅展示节点之间的关系。我不会部署地理上分散的节点。\n\n\
    我将为所有集群复用一些生成的证书和密钥，以减少重复。我将使用以下命令创建这些证书和密钥：\n\n```bash\nmkdir certs\nmkdir keys\n\
    cockroach cert create-ca \\\n    --certs-dir=certs \\\n    --ca-key=keys/ca.key\n\
    cockroach cert create-node \\\n    --certs-dir=certs \\\n    --ca-key=keys/ca.key\
    \ \\\n    localhost\ncockroach cert create-client \\\n    root \\\n    --certs-dir=certs\
    \ \\\n    --ca-key=keys/ca.key\n```\n\n© Rob Reid 2022\nR. Reid, *Practical CockroachDB*,\
    \ [`doi.org/10.1007/978-1-4842-8224-3_7`](https://doi.org/10.1007/978-1-4842-8224-3_7)\n\
    \n## 单区域拓扑\n\n我们从单区域拓扑开始。这些拓扑推荐用于为单个位置的用户提供服务的小型集群。例如，如果你是一家仅拥有英国客户的英国企业，这些拓扑将很适用。让我们来探索它们。\n\
    \n### 开发拓扑\n\n在开发过程中，你可能希望将成本降至最低。因此，Cockroach Labs 认可单节点集群在这种场景下表现良好，如果你愿意优先考虑成本节约和简单性而非弹性。开发拓扑正是定义了这一点：一个包含单个节点的\
    \ CockroachDB 集群。\n\n我认为单节点集群具有以下特点：\n\n**读取延迟** ★★★★★\n网关节点也是所有数据的租约持有者节点，意味着无需节点间跳转。\n\
    \n**写入延迟** ★★★★★\n不会产生复制延迟。\n\n**弹性** ★\n单节点集群无法防范机器或网络故障。\n\n**设置简便性** ★★★★★\n\
    可以安装到本地网络上的机器或 E2C 服务器等。\n\n像这样的开发集群将表现出与分布式集群不同的性能特征。在真实用户开始与你的应用程序交互之前，应仔细测试一个与你的生产集群准确相似的环境。\n\
    \n### 基础生产拓扑\n\n一旦你的应用程序有了依赖于可用数据库的用户，单节点集群就不再是一个可行的拓扑。基础生产拓扑定义了一个在单个区域内的多个可用区部署节点的\
    \ CockroachDB 集群。\n\n你选择部署的节点数量取决于你自己，但为了在单个可用区发生故障时幸存下来，你至少需要三个节点，复制因子为三。为了在两个可用区发生故障时幸存下来，你至少需要五个节点，复制因子为五。\n\
    \n![](img/index-152_1.png)\n\n基础生产拓扑的架构通常类似于图 7-1。\n\n**图 7-1.** 使用基础生产拓扑的集群架构\n\
    \n让我们看看使用此拓扑的集群的一些优点和缺点：\n\n**读取延迟** ★★★★★\n网关节点与租约持有者节点位于同一区域。\n\n**写入延迟** ★★★★★\n\
    所有复制都发生在同一区域内，因此能快速达成共识。\n\n**弹性** ★★★\n根据你的架构、节点数量和复制策略，可以承受单个/多个可用区的故障。\n\n\
    **设置简便性** ★★★★\n所有节点都存在于单个区域内，因此可以轻松地用 Kubernetes 进行编排，几乎不费力。\n\n现在，让我们创建一个集群来模拟基础生产拓扑。让我们创建一个可以处理两个可用区故障的五节点集群：\n\
    \n```bash\ncockroach start \\\n    --certs-dir=certs \\\n    --store=node1 \\\n\
    \    --listen-addr=localhost:26257 \\\n    --http-addr=localhost:8080 \\\n   \
    \ --locality=region=us-east1,zone=a \\\n    --join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,localhost:26261\n\
    \ncockroach start \\\n    --certs-dir=certs \\\n    --store=node2 \\\n    --listen-addr=localhost:26258\
    \ \\\n    --http-addr=localhost:8081 \\\n    --locality=region=us-east1,zone=b\
    \ \\\n    --join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,localhost:26261\n\
    \ncockroach start \\\n    --certs-dir=certs \\\n    --store=node3 \\\n    --listen-addr=localhost:26259\
    \ \\\n    --http-addr=localhost:8082 \\\n    --locality=region=us-east1,zone=c\
    \ \\\n    --join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,localhost:26261\n\
    \ncockroach start \\\n    --certs-dir=certs \\\n    --store=node4 \\\n    --listen-addr=localhost:26260\
    \ \\\n    --http-addr=localhost:8083 \\\n    --locality=region=us-east1,zone=d\
    \ \\\n    --join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,localhost:26261\n\
    \ncockroach start \\\n    --certs-dir=certs \\\n    --store=node5 \\\n    --listen-addr=localhost:26261\
    \ \\\n    --http-addr=localhost:8084 \\\n    --locality=region=us-east1,zone=e\
    \ \\\n    --join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,localhost:26261\n\
    \ncockroach init --certs-dir=certs --host=localhost:26257\n```\n\n接下来，我们将连接到集群并运行一些命令，以确保\
    \ CockroachDB 在五个节点之间复制我们的数据。\n\n```sql\ncockroach sql --certs-dir=certs\nALTER\
    \ RANGE default CONFIGURE ZONE USING num_replicas = 5;\nCREATE TABLE example();\n\
    SELECT lease_holder_locality, replicas FROM [SHOW RANGES FROM TABLE example];\n\
    ```\n\n```\n  lease_holder_locality | replicas\n------------------------+-----------\n\
    \  region=us-east1,zone=e | {1,2,3,4,5}\n```\n\n副本数量从三个增加到五个可能需要一两分钟才能生效，但一旦生效，你会注意到\
    \ CockroachDB 使用所有五个节点作为 `example` 表数据的副本。如果我们丢失了五个节点中的两个，剩下的三个节点仍然能够达成法定人数。\n\
    \n## 多区域拓扑\n\n多区域拓扑适用于需要更高容错能力的应用程序。我推荐这些拓扑用于需要跨越更大地理区域、客户分布在多个地点的集群。如果你的生存能力目标包括整个云区域发生故障，无论你的客户位于何处，我也推荐这些拓扑。例如，如果你是一家总部位于欧盟的企业，客户分布在欧洲和亚洲，这些拓扑将非常适用。让我们来探索它们。\n\
    \n### 区域表拓扑\n\n区域表拓扑是需要将数据固定到特定区域的场景的不错选择。在此配置中，你将确保特定区域用户的数据始终靠近他们，从而实现快速的本地区域读取和写入。\n"
- fmt: "As multiregion clusters span not just AZs but whole regions, the number of\
    \ nodes will typically be higher. For a cluster capable of surviving not just\
    \ AZ but also region failures, the node count will jump from a minimum of between\
    \ three and five nodes to between nine and fifteen. Figure 7-2 shows a multiregion\
    \ cluster capable of surviving regional outages but not AZ outages. In an AZ outage,\
    \ customers closest to the now unavailable `region` will route to another region,\
    \ increasing latency.\n\n![](index-155_1.png)\n\n## Chapter 7 Deployment Topologies\n\
    \n**Figure 7-2.** Architecture of a cluster using the Regional Tables topology\n\
    \nLet’s look at some of the benefits and drawbacks of a cluster using this topology:\n\
    \n- **Read latency**: If data is pinned to a single region, reads from that region\
    \ will be quick. If data is not pinned and comes from multiple regions, you’ll\
    \ incur interregion latency.\n- **Write latency**: If data is pinned to a single\
    \ region, writes to that region will be quick. If data is replicated across regions\
    \ (for higher resiliency), you’ll incur interregion replication latency.\n- **Resiliency**:\
    \ If you replicate data across regions, you’ll achieve resilience against regional\
    \ failures. If you pin data to regions and have nodes in different AZs within\
    \ that region, you’ll achieve resilience against AZ failure.\n- **Ease of setup**:\
    \ Setting up a multiregion cluster is not without its pains. If you’re orchestrating\
    \ your cluster in Kubernetes, you’ll need a cluster for each region, and their\
    \ networks will need to be peered.\n\n## Chapter 7 Deployment Topologies\n\nNow\
    \ let’s create a cluster to simulate the Regional Tables topology. In this example,\
    \ we’ll create a nine-node cluster that’s capable of surviving regional outages.\
    \ We’ll reuse the start commands from the “Multiregion Clusters” section in Chapter\
    \ 2 to save repetition.\n\nNext, we’ll set up our database and regions (note that\
    \ an Enterprise license is required for geo-partitioning):\n\n```sql\nCREATE DATABASE\
    \ topologies_demo;\n\nUSE topologies_demo;\n\nALTER DATABASE \"topologies_demo\"\
    \ PRIMARY REGION \"us-east1\";\nALTER DATABASE \"topologies_demo\" ADD REGION\
    \ \"us-central1\";\nALTER DATABASE \"topologies_demo\" ADD REGION \"us-west1\"\
    ;\n\nALTER DATABASE \"topologies_demo\" SURVIVE REGION FAILURE;\n```\n\nWith the\
    \ cluster up and running, let’s create two tables: one that’s completely regional\
    \ (i.e., all data remains in one region) and another whose rows will be pinned\
    \ to different regions. First, we’ll create the regional table and insert a single\
    \ row into it:\n\n```sql\nCREATE TABLE example_regional_table(\n    id UUID PRIMARY\
    \ KEY DEFAULT gen_random_uuid()\n);\n\nALTER TABLE example_regional_table SET\
    \ LOCALITY REGIONAL BY TABLE IN \"us-central1\";\n\nINSERT INTO example_regional_table\
    \ DEFAULT VALUES;\n```\n\nNext, we’ll create the table that’s regional by row\
    \ and insert three rows into it, one for each region:\n\n```sql\nCREATE TABLE\
    \ example_regional_rows (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
    \    city TEXT NOT NULL,\n    crdb_region crdb_internal_region NOT NULL AS (\n\
    \        CASE\n            WHEN city IN ('Charleston', 'Columbia', 'North Charleston')\
    \ THEN 'us-east1'\n            WHEN city IN ('Des Moines', 'Cedar Rapids', 'Davenport')\
    \ THEN 'us-central1'\n            WHEN city IN ('Portland', 'Eugene', 'Salem')\
    \ THEN 'us-west1'\n            ELSE 'us-central1'\n        END\n    ) STORED\n\
    );\n\nALTER TABLE example_regional_rows SET LOCALITY REGIONAL BY ROW;\n\nINSERT\
    \ into example_regional_rows (city)\nVALUES\n    ('Charleston'),\n    ('Des Moines'),\n\
    \    ('Portland');\n```\n\nGive CockroachDB a minute or so to allow replication\
    \ to finish and inspect the ranges. The following statements are formatted to\
    \ make them easier to read:\n\n```sql\nSELECT lease_holder_locality, replicas,\
    \ replica_localities\nFROM [SHOW RANGES FROM TABLE example_regional_table];\n\
    ```\n\n```\nregion=us-central1,zone=us-central1b\n{1,2,4,6,8}\n{\n  \"region=us-east1,zone=us-east1a\"\
    ,\n  \"region=us-east1,zone=us-east1b\",\n  \"region=us-central1,zone=us-central1c\"\
    ,\n  \"region=us-central1,zone=us-central1b\",\n  \"region=us-west1,zone=us-west1b\"\
    \n}\n```"
