    ### Table Encryption


    CockroachDB also allows you to encrypt specific tables rather than encrypting
    an entire cluster. For example, suppose your database has some huge tables that
    don’t contain sensitive information. In that case, this might be a good option
    for you, as you won’t pay the performance penalty of decrypting encrypted data.


    Creating a cluster that supports table encryption is similar to creating an encrypted
    cluster. However, there are two small changes you need to make to the startup
    commands:


    • `--store` – This argument now provides a set of key/value pairs rather than
    a simple string, which tells CockroachDB where to store your encrypted and unencrypted
    data. In the following example, I’m telling CockroachDB to encrypt the “node1/encrypted”
    directory and not encrypt the “node1/unencrypted” directory.


    • `--enterprise-encryption` – This argument needs to be updated to point at just
    the encrypted data directory.


    The following commands create three nodes with partial encryption enabled. I will
    continue securing my cluster for consistency:


    ```

    $ cockroach start \

    --certs-dir=certs \

    --store=path=node1/encrypted,attrs=encrypted \

    --store=path=node1/unencrypted,attrs=unencrypted \

    --listen-addr=localhost:26257 \

    --http-addr=localhost:8080 \

    --join=localhost:26257,localhost:26258,localhost:26259 \

    --enterprise-encryption=path=node1/encrypted,key=keys/enc.key,old-key=plain

    ```


    ```

    $ cockroach start \

    --certs-dir=certs \

    --store=path=node2/encrypted,attrs=encrypted \

    --store=path=node2/unencrypted,attrs=unencrypted \

    --listen-addr=localhost:26258 \

    --http-addr=localhost:8081 \

    --join=localhost:26257,localhost:26258,localhost:26259 \

    --enterprise-encryption=path=node2/encrypted,key=keys/enc.key,old-key=plain

    ```


    ```

    $ cockroach start \

    --certs-dir=certs \

    --store=path=node3/encrypted,attrs=encrypted \

    --store=path=node3/unencrypted,attrs=unencrypted \

    --listen-addr=localhost:26259 \

    --http-addr=localhost:8082 \

    --join=localhost:26257,localhost:26258,localhost:26259 \

    --enterprise-encryption=path=node3/encrypted,key=keys/enc.key,old-key=plain

    ```


    Now, initialize the cluster with the following command:


    ```

    $ cockroach init --certs-dir=certs --host=localhost:26257

    ```


    ## Chapter 6 Data privaCy


    With the cluster initialized, we can now connect to it using the root user client
    certificate we created previously:


    ```

    $ cockroach sql --certs-dir=certs

    ```


    It’s time to create some encrypted and unencrypted tables. We do this by first
    identifying the tables we need to and don’t need to encrypt. In the following
    example, I’m creating a customer table containing Personally Identifiable Information
    (PII), which should be encrypted, and a product table containing no PII, which
    does not need to be encrypted.


    Let’s create the customer and product tables now:


    ```

    CREATE TABLE customer (

    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),

    first_name string NOT NULL,

    last_name string NOT NULL

    );


    ALTER TABLE customer CONFIGURE ZONE USING CONSTRAINTS = ''[+encrypted]'';


    CREATE TABLE product (

    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),

    name string NOT NULL

    );

    ```'
