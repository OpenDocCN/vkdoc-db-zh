  trans: "# 第 8 章：测试\n\n## 启动 API 服务器\n\n剩下的所有工作就是启动 API 服务器进行监听。下面的代码将：\n- 在端口 `3000`\
    \ 上启动 Kemal Web 服务器\n\n```\nKemal.run\n```\n\n代码就绪后，我们可以使用以下命令启动服务器：\n\n```\n\
    $ crystal run src/api.cr\n[development] Kemal is ready to lead at http://0.0.0.0:3000\n\
    ```\n\n## 测试应用程序\n\n让我们编写一些 `curl` 命令来测试 API（并在此过程中测试数据库）。在这一测试阶段，我们不仅需要断言数据库在接收到预期数据时行为符合预期，还需要断言它在接收到*非预期*数据时行为也符合预期。这些通常被称为边界测试。\n\
    \n在本节中，我们将遍历每个用例，以断言数据库能够支持它们。让我们从创建一个客户开始：\n\n```\n$ curl -X POST 'localhost:3000/customers'\
    \ \\\n    -H 'Content-Type: application/json' \\\n    -d '{\n  \"full_name\":\
    \ \"Malala Yousafzai\",\n  \"email\": \"malala.yousafzai@example.com\"\n}'\n{\"\
    id\":\"7d640140-5581-41cf-a9db-0bccaf90f2de\",\"join_date\":\"2022-01-20T18:26:18Z\"\
    }\n```\n\n这涵盖了快乐路径：一个合理长度的姓名和电子邮件地址。我们的数据库支持 Unicode 字符吗？让我们一探究竟：\n\n```\n$ curl\
    \ -X POST 'localhost:3000/customers' \\\n    -H 'Content-Type: application/json'\
    \ \\\n    -d '{\n  \"full_name\": \"Наде́жда Андре́евна Толоко́нникова\",\n  \"\
    email\": \"nadya.tolokno@example.com\"\n}'\n{\"id\":\"85f05ac3-931f-4417-a6ae-1403468a2c10\"\
    ,\"join_date\":\"2022-01-20T18:26:34Z\"}\n```\n\n看起来支持！那长名字呢？数据库会拒绝超过我们定义的 `255`\
    \ 个字符长度的 `full_name` 吗？\n\n```\n$ curl -X POST 'localhost:3000/customers' \\\n\
    \    -H 'Content-Type: application/json' \\\n    -d '{\n  \"full_name\": \"aaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeaaaa\
    \ aaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeaaaaaaaaaabbbbbbbbbbcc ccccccccddddddddddeeeeeeeeeeaaaaaaaaaabbbbbbbbbbccccccccccdddddddddd\
    \ eeeeeeeeaaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeefffffg\",\n  \"email\"\
    : \"full_name@example.com\"\n}'\n...ERROR OMITTED\n```\n\n服务器没有任何错误处理，但日志确认我们尝试存储一个\
    \ `full_name` 长度为 `256` 个字符的客户失败了：\n\n```\nException: value too long for type\
    \ STRING(255) (PQ::PQError)\n```\n\n那么边界情况，一个 `255` 个字符长的 `full_name` 呢？\n\n```\n\
    $ curl -X POST 'localhost:3000/customers' \\\n    -H 'Content-Type: application/json'\
    \ \\\n    -d '{\n  \"full_name\": \"aaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeaaaa\
    \ aaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeaaaaaaaaaabbbbbbbbbbcc ccccccccddddddddddeeeeeeeeeeaaaaaaaaaabbbbbbbbbbccccccccccdddddddddd\
    \ eeeeeeeeaaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeefffff\",\n  \"email\"\
    : \"full_name@example.com\"\n}'\n{\"id\":\"d93bedb4-3e59-4bd5-b018-b6d89d688904\"\
    ,\"join_date\":\"2022-01-20T18:26:53Z\"}\n```\n\n暂时忽略电子邮件地址，我们的创建客户用例看起来不错，似乎我们的数据库正在满足这个用例的基本要求。现在让我们继续处理获取客户的用例。\n\
    \n首先，我们将发出一个请求来获取一个现有客户：\n\n```\n$ curl -X GET 'localhost:3000/customers/85f05ac3-931f-4417-a6ae-1403468a2c10'\n\
    {\"id\":\"85f05ac3-931f-4417-a6ae-1403468a2c10\",\"full_name\":\"Наде́жда Андре́евна\
    \ Толоко́нникова\",\"email\":\"nadya.tolokno@example.com\",\"join_date\":\"2022-01-20T18:26:34Z\"\
    }\n```\n\n这返回了我们最初为该用户插入的数据。显然，关于谁被允许请求特定用户没有任何安全检查，但从数据库的角度来看，这是我们的快乐路径测试满足了。不快乐的路径呢？让我们尝试在\
    \ URL 路径中省略客户 ID、通过不存在的 ID 搜索客户，以及使用格式错误的 UUID 搜索客户。对于这些测试，我将响应限制为仅头部，因为没有适当的错误处理，我们将收到\
    \ HTML 页面响应。\n\n```\ncurl -I -X GET localhost:3000/customers/\nHTTP/1.1 404 Not\
    \ Found\nConnection: keep-alive\nX-Powered-By: Kemal\nContent-Type: text/html\n\
    Transfer-Encoding: chunked\n```\n\n在对路径中没有 ID 的请求的响应中，我们收到一个 `404`，因为路径期望的是 `/customers/{CUSTOMER_ID}`。此测试尚未触及数据库，这是预期的。\n\
    \n```\ncurl -I -X GET localhost:3000/customers/df24592d-62dd-4876-b54a-405be8614aaf\n\
    HTTP/1.1 500 Internal Server Error\nConnection: keep-alive\nX-Powered-By: Kemal\n\
    Content-Type: text/html\nTransfer-Encoding: chunked\n```\n\n在对不存在的 ID 的请求的响应中，我们收到一个\
    \ `500`，原因是数据库调用周围的异常处理不足。检查服务器日志，我们可以看到该请求没有产生结果。再次，一个预期的结果：\n\n```\nException:\
    \ no results (DB::NoResultsError)\n```\n\n```\ncurl -I -X GET localhost:3000/customers/a\n\
    HTTP/1.1 500 Internal Server Error\nConnection: keep-alive\nX-Powered-By: Kemal\n\
    Content-Type: text/html\nTransfer-Encoding: chunked\n```\n\n在对格式错误的客户 ID 的请求的响应中，我们收到一个\
    \ `500`。再次，这是由于数据库调用周围的错误处理不足。再次检查服务器日志揭示了我们收到响应的根本原因。此请求也到达了数据库，但在查询准备期间返回了错误。再次，一个预期的结果：\n\
    \n```\nException: error in argument for $1: could not parse string \"a\" as uuid\
    \ (PQ::PQError)\n```\n\n接下来是产品的创建。这个场景提供了对多语句事务的第一次测试。在这个事务中，我们插入一个产品，然后使用先前插入的产品\
    \ ID 插入一些价格。让我们发出一个请求：\n\n```\n$ curl -X POST 'localhost:3000/products' \\\n \
    \   -d '{\n  \"name\": \"Where Have You Bean All My Life?\",\n  \"sku\": \"L2JM9XAO\"\
    ,\n  \"prices\": [\n    { \"amount\": 6.00, \"start_date\": \"2022-01-01T09:00:00Z\"\
    , \"end_date\": \"2022-01-01T10:00:00Z\" },\n    { \"amount\": 12.00, \"start_date\"\
    : \"2022-01-01T09:00:00Z\" }\n  ]\n}'\n{\"id\":\"d77bfea2-f0df-4da9-aeef-7c8d9c362e38\"\
    }\n```\n\n我们为我们刚刚插入的产品提供了两个价格：全价 `12.00` 和半价 `6.00`。半价优惠设置在一小时后过期，因此在测试时，我预计每个请求的此产品价格为\
    \ `12.00`。\n\n我们还想断言，如果有多个活动价格，我们总是返回最便宜的那个：\n\n```\n$ curl -X POST 'localhost:3000/products'\
    \ \\\n    -d '{\n  \"name\": \"Has Bean\",\n  \"sku\": \"1OLEMX05\",\n  \"prices\"\
    : [\n    { \"amount\": 6.00, \"start_date\": \"2022-01-02T09:00:00Z\", \"end_date\"\
    : \"2022-01-02T10:00:00Z\" },\n    { \"amount\": 10.00, \"start_date\": \"2022-01-01T09:00:00Z\"\
    \ },\n    { \"amount\": 12.00, \"start_date\": \"2022-01-01T09:00:00Z\" }\n  ]\n\
    }'\n{\"id\":\"386e841e-4da8-4688-82a4-71d6fbb369fa\"}\n```\n\n与其针对此端点运行一套探索性测试，让我们直接跳到获取产品及其价格：\n\
    \n```\n$ curl -X GET 'localhost:3000/products'\n[\n  {\"id\":\"386e841e-4da8-4688-82a4-71d6fbb369fa\"\
    ,\"name\":\"Has Bean\",\"sku\":\"1OLEMX05\",\"prices\":[{\"id\":\"cc71e211-abc6-42d5-8f59-d357042334b0\"\
    ,\"amount\":10.0}]},\n  {\"id\":\"d77bfea2-f0df-4da9-aeef-7c8d9c362e38\",\"name\"\
    :\"Where Have You Bean All My Life?\",\"sku\":\"L2JM9XAO\",\"prices\":[{\"id\"\
    :\"cbdc9d9c-a987-4655-b3f8-6b9b2ec9c50e\",\"amount\":12.0}]}\n]\n```"
- fmt: "# Chapter 8 testing\n\n## Testing with Application Code\n\nUp to now, we’ve\
    \ tested our API as a black box itself. What if we want to test just the database\
    \ as the black box from within our application’s own test suite? Let’s see how\
    \ CockroachDB can be included in your local test environment with Docker Compose.\n\
    \nFor this example, we’re going to need a few files:\n\n- `docker-compose.yml`\
    \ – Holds the Docker services that will run as part of our combined application\
    \ and database test suite. Namely, a service for our application code and a service\
    \ for CockroachDB.\n- `Dockerfile` – A file that will package our application\
    \ test binary into a Docker image.\n- `main_test.go` – Our application test code.\
    \ For this example, I’m using Go.\n\nLet’s begin! We’ll start by preparing a directory\
    \ to house our tests with a few commands:\n\n```\nmkdir db_tests\ncd db_tests\n\
    go mod init dbtests\n```\n\nNext, we’ll pull in the database dependency that will\
    \ enable database interaction:\n\n```\ngo get -u github.com/jackc/pgx\n```\n\n\
    Next, we’ll create the Go code that will connect to the database and run some\
    \ unit tests. As this file lives in isolation of any other Go code, there are\
    \ no dependencies to other self-managed Go modules. In this code, we will\n\n\
    - Read a flag from the command line, indicating whether database tests should\
    \ be included or not (defaults to false)\n- If database tests are flagged to run:\n\
    \  - Read a connection string from the environment.\n  - Attempt to connect to\
    \ the database in a simple back-off loop while the database is launching.\n  -\
    \ Close the database connection once all tests have completed.\n  - Run unit tests\
    \ and capture a status code indicating whether the tests passed or failed.\n \
    \ - Exit the application with the status code received from the test run.\n- Note\
    \ that the `TestADatabaseInteraction` function will only execute if the database\
    \ flag has been provided.\n\n```go\npackage main\n\nimport (\n    \"context\"\n\
    \    \"flag\"\n    \"log\"\n    \"os\"\n    \"testing\"\n    \"time\"\n\n    \"\
    github.com/jackc/pgx/v4/pgxpool\"\n)\n\nvar (\n    dbTests *bool\n    db     \
    \ *pgxpool.Pool\n)\n\nfunc TestMain(m *testing.M) {\n    dbTests = flag.Bool(\"\
    db\", false, \"run database tests\")\n    flag.Parse()\n\n    if *dbTests {\n\
    \        connStr, ok := os.LookupEnv(\"CONN_STR\")\n        if !ok {\n       \
    \     log.Fatal(\"connection string env var not found\")\n        }\n\n      \
    \  if err := waitForDB(connStr); err != nil {\n            log.Fatalf(\"error\
    \ waiting for database: %v\", err)\n        }\n    }\n\n    code := m.Run()\n\n\
    \    if *dbTests {\n        db.Close()\n    }\n\n    os.Exit(code)\n}\n\nfunc\
    \ waitForDB(connStr string) error {\n    var err error\n    for i := 1; i <= 10;\
    \ i++ {\n        db, err = pgxpool.Connect(context.Background(), connStr)\n  \
    \      if err != nil {\n            log.Printf(\"error connecting to database:\
    \ %v\", err)\n        }\n    }\n}\n```\n\nIn the response body (which I’ve formatted\
    \ slightly for readability), we can see that our two products have been returned\
    \ and that neither the expired sale price nor the more expensive active price\
    \ appears.\n\nNext, let’s place an order and check the database behavior with\
    \ our next multistatement transaction call. In this scenario, we’ll create an\
    \ order and then use its ID to insert rows into the `product_order` table:\n\n\
    ```\ncurl -X POST 'localhost:3000/orders' \\\n-d '{\n  \"customer_id\": \"85f05ac3-931f-4417-a6ae-1403468a2c10\"\
    ,\n  \"delivery_instructions\": \"Please leave package behind the green bin.\"\
    ,\n  \"products\": {\n    \"386e841e-4da8-4688-82a4-71d6fbb369fa\": \"cc71e211-abc6-42d5-8f59-d357042334b0\"\
    ,\n    \"d77bfea2-f0df-4da9-aeef-7c8d9c362e38\": \"cbdc9d9c-a987-4655-b3f8-6b9b2ec9c50e\"\
    \n  }\n}'\n{\"id\":\"3ad9469a-50ec-4773-bc50-1c92209078de\",\"reference\":\"NIAXGBQP\"\
    }\n```\n\nLet’s check that the order was inserted successfully by making a request\
    \ the endpoint that returns a customer’s orders:\n\n```\ncurl -X GET localhost:3000/customers/85f05ac3-931f-4417-a6ae-1403468a2c10/orders\n\
    [{\"id\":\"93bff9af-5794-47a5-94e5-18e8a9832c41\",\"reference\":\"GDCQONIR\",\"\
    customer_id\":\"85f05ac3-931f-4417-a6ae-1403468a2c10\",\"date\":\"2022-01-20T18:32:45Z\"\
    ,\"delivery_instructions\":\"Please leave package behind the green bin.\",\"products\"\
    :{\"Has Bean\":10.0,\"Where Have You Bean All My Life?\":12.0}}]\n```\n\nIn the\
    \ response body, we can see that all of the order fields are included, along with\
    \ the correct products and prices."
