    \ 数组\n\n我们将该函数命名为 `updateMultiPassSelect`：\n\n```go\nfunc updateMultiPassSelect(db\
    \ *pgxpool.Pool, lastID string, selectLimit int) ([]string, error) {\n\tconst\
    \ selectStmtFmt = `SELECT sensor_id FROM sensor_reading\n\t\tAS OF SYSTEM TIME\
    \ '-5s'\n\t\tWHERE date_trunc('decade', timestamp) =\n\t\t'1990-01-01'\n\t\t%s\n\
    \t\tORDER BY sensor_id\n\t\tLIMIT $1`\n\targs := []interface{}{}\n\tselectStmt\
    \ := selectStmtFmt\n\tif lastID != \"\" {\n\t\tselectStmt = fmt.Sprintf(selectStmtFmt,\
    \ \"AND sensor_id > $2\")\n\t\targs = append(args, selectLimit, lastID)\n\t} else\
    \ {\n\t\t// 这通常被称为“游标分页”。\n\t\t// [www.cockroachlabs.com/docs/stable/as-of-system-time.html](http://www.cockroachlabs.com/docs/stable/as-of-system-time.html)\n\
    \t\tselectStmt = fmt.Sprintf(selectStmtFmt, \"\")\n\t\targs = append(args, selectLimit)\n\
    \t}\n\n\t// 批量获取 ID。\n\trows, err := db.Query(context.Background(), selectStmt,\
    \ args...)\n\tif err != nil {\n\t\treturn nil, fmt.Errorf(\"fetching rows: %w\"\
    , err)\n\t}\n\n\t// 将 ID 读入一个集合。\n\tids := []string{}\n\tvar id string\n\tfor\
