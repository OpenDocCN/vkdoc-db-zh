    **Functions**


    CockroachDB provides built-in functions to make certain operations easier, and
    there are functions for working with most of the data types introduced in this
    chapter.


    Built[-in functions5](#index_split_000.html#p69) either provide functionality
    for working with data types or expose core system functionality such as working
    with stream ingestion and getting system information.


    I will demonstrate the use of a small selection of built-in functions, but for
    brevity, I will leave the exploration of the remaining functions as an exercise
    to the reader. The following code example shows some of the more commonly used
    functions, and the comment preceding each provides a brief explanation.


    *-- Return the largest element in a variadic collection of items.*


    SELECT greatest(ARRAY[1, 2, 3], ARRAY[1, 2, 4], ARRAY[1, 2, 2]);


    *--> {1,2,4}*


    5 [www.cockroachlabs.com/docs/stable/functions-and-operators.html#built-in-functions](http://www.cockroachlabs.com/docs/stable/functions-and-operators.html#built-in-functions)


    Chapter 3 ConCepts


    *-- Return the smallest element in a variadic collection of items.*


    SELECT least(ARRAY[1, 2, 3], ARRAY[1, 2, 4], ARRAY[1, 2, 2]);


    *--> {1,2,2}*


