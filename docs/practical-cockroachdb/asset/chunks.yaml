- fmt: "# Chapter 5 Interacting with CockroachDB\n\nIn this example, I’ll use Redpanda,\
    \ a streaming platform that’s wire-compatible with Kafka (in the same way that\
    \ CockroachDB is wire-compatible with Postgres). Let’s start an instance of Redpanda,\
    \ create a topic, and consume from it:\n\n```bash\ndocker run \\\n--rm -it \\\n\
    --name redpanda \\\n-p 9092:9092 \\\n-p 9644:9644 \\\ndocker.vectorized.io/vectorized/redpanda:latest\
    \ \\\nredpanda start \\\n--overprovisioned \\\n--smp 1 \\\n--memory 1G \\\n--reserve-memory\
    \ 0M \\\n--node-id 0 \\\n--check=false\n```\n\n```bash\ndocker exec -it \\\nredpanda\
    \ rpk topic create cdc_example \\\n--brokers=localhost:9092\n```\n\n```bash\n\
    docker exec -it \\\nredpanda rpk topic consume cdc_example \\\n--brokers=localhost:9092\n\
    ```\n\nMoving back to Cockroach, let’s create a simple insecure demo cluster with\
    \ an example table to stream data from:\n\n```bash\ncockroach demo --no-example-database\
    \ --insecure\n```\n\n```sql\nCREATE TABLE example (\n    id UUID PRIMARY KEY DEFAULT\
    \ gen_random_uuid(),\n    value STRING(10) NOT NULL\n);\n```\n\nWith the table\
    \ in place, let’s create a Kafka Changefeed to start publishing changes:\n\n```sql\n\
    SET CLUSTER SETTING kv.rangefeed.enabled = true;\n\nCREATE CHANGEFEED FOR TABLE\
    \ example\nINTO 'kafka://localhost:9092?topic_name=cdc_example'\nWITH updated;\n\
    ```\n\nNote that in order to create a Changefeed for multiple tables, simply provide\
    \ a comma-separated string containing the tables you’d like to monitor as follows:\n\
    \n```sql\nCREATE CHANGEFEED FOR TABLE table_one, table_two, table_three\nINTO\
    \ 'kafka://localhost:9092?topic_name=cdc_example'\nWITH updated;\n```\n\nThe only\
    \ thing required to get data into Kafka now is to use your tables as normal. All\
    \ changes to the data in our example table will be automatically published to\
    \ Kafka. Let’s `INSERT`, `UPDATE`, and `DELETE` some data now and see what CockroachDB\
    \ publishes to the `cdc_example` topic:\n\n```sql\nINSERT INTO example (value)\
    \ VALUES ('a');\n\nUPDATE example\nSET value = 'b'\nWHERE id = '4c0ebb98-7f34-436e-9f6b-7ea1888327d9';\n\
    \nDELETE FROM example\nWHERE id = '4c0ebb98-7f34-436e-9f6b-7ea1888327d9';\n```\n\
    \nYou’ll start to see the events received from CockroachDB via the Redpanda consumer\
    \ at this point. The first message received represents the change introduced by\
    \ the `INSERT` statement, the second message was published after the `UPDATE`\
    \ statement, and the last message shows the row being deleted as a result of the\
    \ `DELETE` statement:\n\n```json\n{\n    \"topic\": \"cdc_example\",\n    \"key\"\
    : \"[\\\"4c0ebb98-7f34-436e-9f6b-7ea1888327d9\\\"]\",\n    \"value\": \"{\\\"\
    after\\\": {\\\"id\\\": \\\"4c0ebb98-7f34-436e-9f6b-7ea1888327d9\\\", \\\"value\\\
    \": \\\"a\\\"}, \\\"updated\\\": \\\"1637755793947605000.0000000000\\\"}\",\n\
    \    \"timestamp\": 1637755794706,\n    \"partition\": 0,\n    \"offset\": 44\n\
    }\n\n{\n    \"topic\": \"cdc_example\",\n    \"key\": \"[\\\"4c0ebb98-7f34-436e-9f6b-7ea1888327d9\\\
    \"]\",\n    \"value\": \"{\\\"after\\\": {\\\"id\\\": \\\"4c0ebb98-7f34-436e-9f6b-7ea1888327d9\\\
    \", \\\"value\\\": \\\"b\\\"}, \\\"updated\\\": \\\"1637755826616641000.0000000000\\\
    \"}\",\n    \"timestamp\": 1637755826791,\n    \"partition\": 0,\n    \"offset\"\
    : 45\n}\n\n{\n    \"topic\": \"cdc_example\",\n    \"key\": \"[\\\"4c0ebb98-7f34-436e-9f6b-7ea1888327d9\\\
    \"]\",\n    \"value\": \"{\\\"after\\\": null, \\\"updated\\\": \\\"1637756011024955000.0000000000\\\
    \"}\",\n    \"timestamp\": 1637756011195,\n    \"partition\": 0,\n    \"offset\"\
    : 46\n}\n```\n\nTo stop a Changefeed, you need to locate and delete the job that’s\
    \ running it. Let’s find the job and cancel it now:\n\n```sql\nroot@127.0.0.1:26257/defaultdb>\
    \ SELECT job_id, job_type, description FROM [SHOW JOBS];\n```\n\n```\n  job_id\
    \             | job_type | description\n---------------------+----------+--------------------------------------\n\
    \  713311406086291457 | CHANGEFEED | CREATE CHANGEFEED FOR TABLE example INTO\
    \ 'kafka://localhost:9092?topic_name=cdc_example' WITH updated\n```\n\n```sql\n\
    root@127.0.0.1:26257/defaultdb> CANCEL JOB 713311406086291457;\n```\n\n## Webhook\
    \ Sink\n\nLet’s redirect our CDC events to a web server now. Owing to the potentially\
    \ sensitive nature of the data in your tables, CockroachDB will only send data\
    \ to HTTPS-enabled servers. Like the previous export/import example, I’ll reuse\
    \ `replit.com` to create and run a free HTTPS server. Let’s create and run a simple\
    \ HTTPS server:\n\n```go\npackage main\n\nimport (\n    \"io/ioutil\"\n    \"\
    log\"\n    \"net/http\"\n)\n\nfunc main() {\n```"
