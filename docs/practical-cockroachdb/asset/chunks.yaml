    **INET**


    The INET data type stores valid IPv4 and IPv6 addresses and CIDRs (Classless Inter-Domain
    Routing) and is created as follows:


    CREATE TABLE person (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    ip


    INET NOT NULL


    );


    Inserting some values into this table will reveal that CockroachDB understands
    the IP addresses being inserted and removes any redundant masks:


    INSERT


    INTO person (ip)


    VALUES


    (''10.0.1.0/24''),


    (''10.0.1.1/32''),


    (''229a:d983:f190:75ef:5f06:a5a8:f5c2:8500/128''),


    (''229a:d983:f190:75ef:5f06:a5a8:f5c2:853f/100'');


    Chapter 3 ConCepts


    SELECT * FROM person;


    id | ip


    ---------------------------------------+----------------------------------


    29121f2e-e977-474b-9fb5-818399ed7b9f | 10.0.1.0/24


    5cce3936-9f27-4e00-b0dc-9866e621270f | 10.0.1.1


    9b53053d-ce6e-416a-9b63-9d0bc9bc9870 | 229a:d983:f190:75ef:5f06:a5a8:


