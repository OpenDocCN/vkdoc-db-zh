    {"id":"d93bedb4-3e59-4bd5-b018-b6d89d688904","join_


    date":"2022-01-20T18:26:53Z"}


    Ignoring email addresses for now, our create customer use case is looking good,
    and it seems that our database is satisfying the basics of this use case. Let’s
    move onto the get customer use case now.


    First, we’ll make a request to fetch an existing customer:


    $ curl -X GET ''localhost:3000/customers/85f05ac3-931f-4417-


    a6ae-1403468a2c10''


    {"id":"85f05ac3-931f-4417-a6ae-1403468a2c10","full_name":"Наде́жда


    Андре́евна Толоко́нникова","email":"nadya.tolokno@example.com","join_


    date":"2022-01-20T18:26:34Z"}


    This returns the data we originally inserted for this user. There are obviously
    no security checks around who are allowed to make requests for specific users,
    but from the perspective of the database, this is our happy path test satisfied.
    How about unhappy paths? Let’s try omitting the customer ID in the URL path, searching
    for a customer by a nonexistent ID, and searching for a customer with a malformatted
    UUID. For these tests, I’ll limit the response to just the headers, as without
    proper error handling, we’ll receive an HTML page response.


    curl -I -X GET localhost:3000/customers/


    HTTP/1.1 404 Not Found


    Connection: keep-alive


    X-Powered-By: Kemal


    Content-Type: text/html


    Transfer-Encoding: chunked


    In the response to a request without an ID in the path, we receive a 404 because
    the path is expecting /customers/{CUSTOMER_ID}. This test has not reached the
    database, which is expected.


    curl -I -X GET localhost:3000/customers/df24592d-62dd-4876-


    b54a-405be8614aaf


    HTTP/1.1 500 Internal Server Error


    Chapter 8 testing


    Connection: keep-alive


    X-Powered-By: Kemal


    Content-Type: text/html


    Transfer-Encoding: chunked


    In the response to a request for a nonexistent ID, we receive a 500 because of
    insufficient exception handling around the database call. Inspecting the server
    logs, we can see that the request yielded no results. Again, an expected result:


    Exception: no results (DB::NoResultsError)


    curl -I -X GET localhost:3000/customers/a


    HTTP/1.1 500 Internal Server Error


    Connection: keep-alive


    X-Powered-By: Kemal


    Content-Type: text/html


    Transfer-Encoding: chunked


    In the response to a request with a malformatted customer ID, we receive a 500.


    Again, this is due to insufficient error handling around the database call. Inspecting
    the server logs again reveals the underlying cause of the response we received.
    This request also made it to the database but returned an error during query preparation.
    An expected result once more:


    Exception: error in argument for $1: could not parse string "a" as uuid (PQ::PQError)


    Onto the creation of products. This scenario provides our first test of a


    multistatement transaction. In this transaction, we insert a product and then
    insert some prices using the previously inserted product ID. Let’s make a request:


    $ curl -X POST ''localhost:3000/products'' \


    -d ''{


    "name": "Where Have You Bean All My Life?",


    "sku": "L2JM9XAO",


    "prices": [


    { "amount": 6.00, "start_date": "2022-01-01T09:00:00Z", "end_date":


    "2022-01-01T10:00:00Z" },


    Chapter 8 testing


    { "amount": 12.00, "start_date": "2022-01-01T09:00:00Z" }


    ]


    }''


    {"id":"d77bfea2-f0df-4da9-aeef-7c8d9c362e38"}


    We’ve given two prices to the product we’ve just inserted: a full price of 12.00
    and a half price of 6.00\. The half price offer is set to expire one hour after
    it becomes available, so at the time of testing, I would expect the price for
    this product to be 12.00 for every request.


    We also want to assert that if there are multiple active prices, we always returned
    the cheapest:


    $ curl -X POST ''localhost:3000/products'' \


    -d ''{


    "name": "Has Bean",


    "sku": "1OLEMX05",


    "prices": [


    { "amount": 6.00, "start_date": "2022-01-02T09:00:00Z", "end_date":


    "2022-01-02T10:00:00Z" },


    { "amount": 10.00, "start_date": "2022-01-01T09:00:00Z" },


    { "amount": 12.00, "start_date": "2022-01-01T09:00:00Z" }


    ]


    }''


    {"id":"386e841e-4da8-4688-82a4-71d6fbb369fa"}


    Rather than run a suite of explorative tests against this endpoint, let’s skip
    ahead to fetching the product and its prices:


    $ curl -X GET ''localhost:3000/products''


    [


    {"id":"386e841e-4da8-4688-82a4-71d6fbb369fa","name":"Has Bean","sku":


    "1OLEMX05","prices":[{"id":"cc71e211-abc6-42d5-8f59-d357042334b0",


    "amount":10.0}]},


    {"id":"d77bfea2-f0df-4da9-aeef-7c8d9c362e38","name":"Where Have You Bean All My
    Life?","sku":"L2JM9XAO","prices":[{"id":"cbdc9d9c-a987-4655-b3f8-6b9


    b2ec9c50e","amount":12.0}]}


    ]


