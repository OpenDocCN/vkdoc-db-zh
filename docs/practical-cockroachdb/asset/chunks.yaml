    **Summary**


    In this chapter, we’ve covered a lot of ground. Let’s recap on the things we’ve
    learned:


    • **Licensing options** – There are several licensing options available for CockroachDB.
    CockroachDB Enterprise provides features like geo-partitioning that are not available
    in CockroachDB Core, so you must


    choose the right license for your requirements.


    • **Local installation** – We’ve installed CockroachDB locally with the


    cockroach binary, the Docker image, and Kubernetes. Each provides


    benefits depending on your stage of development. We’ve also looked


    into multinode and multiregion clusters, scenarios that will become


    important as your CockroachDB infrastructure matures.


    • **CockroachDB as a Service** – We’ve created a simple Free Tier


    CockroachDB cluster using CockroachDB Serverless, which gives us


    a 5GB database to experiment with CockroachDB.


    ![](index-45_1.png)


    **CHAPTER 3**


    **Concepts**


    It’s time to dive deeper into CockroachDB! This chapter explores some of CockroachDB’s
    building blocks, including data types, indexes, and geo-partitioning.


    First, let’s explore the top-level objects that make up CockroachDB.


    **Database Objects**


    As Figure [3-1](#index_split_000.html#p45) shows, objects in CockroachDB are arranged
    hierarchically.


    ***Figure 3-1.** CockroachDB object hierarchy*


    © Rob Reid 2022


    R. Reid, *Practical CockroachDB*[, https://doi.org/10.1007/978-1-4842-8224-3_3](https://doi.org/10.1007/978-1-4842-8224-3_3#DOI)


    Chapter 3 ConCepts


    At the top level of the CockroachDB object hierarchy, there are databases. Databases
    contain schemas that, in turn, contain schema objects like tables and views.


    Every CockroachDB cluster will contain the following three databases when it starts:


    • **defaultdb** – The defaultdb database that clients will connect to if they
    don’t provide a database name in their connection configuration. This


    database is empty and does not provide any contextual information


    to the schema objects contained within it. For that reason, it’s best to


    avoid using this database and prefer to create and reference named


    databases explicitly. If you don’t need this database, you can delete it.


    • **postgres** – The postgres database exists to provide compatibility with Postgres
    clients. If you don’t need this database, you can delete it.


    • **system** – The system database provides core information to the


    CockroachDB cluster, including information relating to jobs, ranges,


    replication, geo-locations, users, and more.


    In every database, there are schemas. Schemas are CockroachDB’s second-level object.
    They allow you to separate objects like tables and views into logical areas. Say,
    for example, you have two business areas, each needing their own tables; having
    a schema per business area not only keeps those tables logically separated but
    also resolves naming collisions. Having two tables named “employee,” for example,
    would not be possible within the same schema. With two schemas, this is not an
    issue.


    The following default schemas (or “System Catalogs”) exist for all new databases:
    root@:26257/blah> show schemas;


    schema_name | owner


    ---------------------+--------


    crdb_internal | NULL


    information_schema | NULL


    pg_catalog | NULL


    pg_extension | NULL


    public | admin


    • **crdb_internal** – The crdb_internal schema contains information


    relating to the internal objects used by a database. This includes


    things like metrics, jobs, alerts, leases, and audit entries for CREATE


    operations.


    Chapter 3 ConCepts


    • **information_schema** – The information_schema schema contains


    information on user-defined objects such as columns, indexes,


    tables, and views.


    • **pg_catalog** – The pg_catalog schema provides compatibility with


    Postgres clients that are expecting a schema with this name to exist.


    It contains information relating to databases and the objects they


    contain.


    • **pg_extension** – The pg_extension schema provides extension


    information. By default, this includes information from the Spatial


    Features extension, which provides spatial data types.


    • **public** – In the same way that the defaultdb database is used if no database
    name is provided, the public schema is the default schema


    that is used if no user-defined schema is provided. All user-defined


    objects go into this schema unless the user provides another.


    Underneath schemas are CockroachDB’s third and final-level objects. These include
    indexes, sequences, tables, views, and temporary objects (objects like temporary
    tables that are not persisted).


    **Data Types**


    CockroachDB boasts all of the data types you’ll need to build a rich database.
    In this section, I’ll show you how and where to use these data types.


    **UUID**


    The UUID data type stores a 128-bit UUID value. Values stored in this column can
    be any UUID vers[ion1](#index_split_000.html#p47) but will all be formatted using
    RFC 4122 standards. Let’s create a table with a UUID column to learn more about
    it.


    First, let’s create a contrived table that includes a UUID column:


    CREATE TABLE person (id UUID);


    1 [https://en.wikipedia.org/wiki/Universally_unique_identifier](https://en.wikipedia.org/wiki/Universally_unique_identifier)


    Chapter 3 ConCepts


    Next, we’ll insert some data into it; note that UUIDs are valid with or without
    curly braces, as Uniform Resource Names (URNs), or as 16-byte strings:


    INSERT INTO person (id) VALUES (''a33c928b-a138-4419-9f1f-8d8a137235d3'');


    INSERT INTO person (id) VALUES (''{1800ebff-bf6d-52c0-842f-d8db25e15ced}'');


    INSERT INTO person (id) VALUES (''urn:uuid:f2c6408a-3c3f-4071-9bcf-1a669d


    40c07f'');


    INSERT INTO person (id) VALUES (b''1oqpb0zna$*k4al~'');


    Selecting the UUIDs out of the table reveals their stored representation, even
    though we inserted them differently:


    SELECT * FROM person;


    id


    a33c928b-a138-4419-9f1f-8d8a137235d3


    1800ebff-bf6d-52c0-842f-d8db25e15ced


    f2c6408a-3c3f-4071-9bcf-1a669d40c07f


    316f7170-6230-7a6e-6124-2a6b34616c7e


    UUID columns are a great choice when you need unique IDs for tables. Rather than
    providing the UUIDs ourselves, let’s ask CockroachDB to generate them for us on-insert:
    CREATE TABLE "person" (


    "id" UUID DEFAULT gen_random_uuid() PRIMARY KEY


    );


    CockroachDB will only generate a default value if you don’t provide one, so it’s
    still possible to provide values yourself.


    **ARRAY**


    The ARRAY data type stores a flat (or one-dimensional) collection of another data
    type.


    It’s indexable using inverted indexes designed to work with tokenizable data,
    such as the values of an array or the key-value pairs in a JSON object. Let’s
    create a table with an ARRAY column to learn more about it.


    Chapter 3 ConCepts


    First, we’ll create a table with an ARRAY column. Arrays are created in the TYPE[]


    syntax or the TYPE ARRAY syntax as follows:


    *-- Create with TYPE[] syntax:*


    CREATE TABLE person (


    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    pets STRING[]


    );


    *-- Create with TYPE ARRAY syntax:*


    CREATE TABLE person (


    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    pets STRING ARRAY


    );


    Next, we’ll insert some data:


    INSERT


    INTO person (pets)


    VALUES (ARRAY[''Max'', ''Duke'']),


    (ARRAY[''Snowball'']),


    (ARRAY[''Gidgit'']),


    (ARRAY[''Chloe'']);


    Selecting the values back out of the table reveals their representation in


    CockroachDB:


    SELECT * FROM person;


    id | pets


    ---------------------------------------+-------------


    59220317-cc79-4689-b05f-c21886a7986d | {Max,Duke}


    5b4455a2-37e7-49de-bd6f-cdd070e8c133 | {Snowball}


    659dce69-03b8-4872-b6af-400e95bf43d9 | {Gidgit}


    f4ef9111-f118-4f66-b950-921d8c1c3291 | {Chloe}


    There are many operations you can perform against ARRAY columns. We’ll cover just
    the most common.


    Chapter 3 ConCepts


    To return rows that contain a particular value in an ARRAY column, we can use
    the


    “contains” operator. The following returns the ID of any person with a pet called
    Max: SELECT id FROM person WHERE pets @> ARRAY[''Max''];


    id


    59220317-cc79-4689-b05f-c21886a7986d


    To return rows whose ARRAY column is within a given array, we can use the “is
    contained by” operator. The following returns the ID of any person whose complete
    list of pets is contained within a given array:


    SELECT id FROM person WHERE pets <@ ARRAY[''Max'', ''Duke'', ''Snowball''];


    id


    59220317-cc79-4689-b05f-c21886a7986d


    5b4455a2-37e7-49de-bd6f-cdd070e8c133


    If you know the name of one of a person’s pets but not all of them, you can use
    the overlap operator to find the ID of any person who has a pet contained within
    a given array:


    SELECT id FROM person WHERE pets && ARRAY[''Max'', ''Snowball''];


    id


    59220317-cc79-4689-b05f-c21886a7986d


    5b4455a2-37e7-49de-bd6f-cdd070e8c133


    Add an element to an array (note that for inserts, you can either use array_append
    or the append operator ||):


    UPDATE person


    SET pets = array_append(pets, ''Duke'')


    WHERE id = ''59220317-cc79-4689-b05f-c21886a7986d'';


    Remove an element from an array:


    UPDATE person


    SET pets = array_remove(pets, ''Duke'')


    WHERE id = ''59220317-cc79-4689-b05f-c21886a7986d'';


    Chapter 3 ConCepts


    To get the most out of an ARRAY column, you’ll need to use an inverted index,
    as without it, CockroachDB will have to perform a full table scan, as highlighted
    in the following: EXPLAIN SELECT id FROM person WHERE pets @> ARRAY[''Max''];


    info


    distribution: full


    vectorized: true


    • filter


    │ estimated row count: 0


    │ filter: pets @> ARRAY[''Max'']


    │


    └── • scan


    estimated row count: 4 (100% of the table; stats collected 16


    minutes ago)


    table: person@primary


    spans: FULL SCAN


    You configure an inverted index on an ARRAY column in a new table as follows:
    CREATE TABLE person (


    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    pets STRING[],


    INVERTED INDEX (pets)


    );


    You configure an inverted index on an ARRAY column in an existing table as follows:
    CREATE INVERTED INDEX [OPTIONAL_NAME] ON person (pets);


    **BIT**


    The BIT data type stores a bit array. BIT columns can store varying numbers of
    bits and can either contain an exact or a variable number of bits:


    CREATE TABLE bits (


    exactly_1 BIT,


    exactly_64 BIT(64),


    Chapter 3 ConCepts


    any_size VARBIT,


    up_to_64 VARBIT(64)


    );


    Values can be inserted into BIT columns as follows (note that the preceding B
    for each of the values denotes a binary string):


    INSERT


    INTO bits (exactly_1, exactly_64, any_size, up_to_64)


    VALUES (


    B''1'',


    B''101010101010101010101010101010101010101010101010101


    0101010101010'',


    B''10101'',


    B''10101010101''


    );


    **BOOL**


    The BOOL or BOOLEAN data type stores a true or false value and is created as follows:
    CREATE TABLE person (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    wants_marketing_emails


    BOOL NOT NULL


    );


    Values are provided to BOOL columns with Boolean literals or via type casting
    from integers:


    INSERT


    INTO person (wants_marketing_emails)


    VALUES


    (1::BOOL), *-- True (any non-zero number)*


    (true), *-- Literal true*


    (12345::BOOL), *-- True (any non-zero number)*


    (0::BOOL), *-- False (zero value)*


    (false); *-- Literal false*


    Chapter 3 ConCepts


    **BYTES**


    The BYTES, BYTEA, or BLOB data type stores the byte array equivalent of TEXT strings
    and can be created as follows:


    CREATE TABLE person (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    password


    BYTES NOT NULL


    );


    You can insert BYTES values in several ways. TEXT strings will automatically cast
    to BYTES, and CockroachDB supports various encoding methods for fine-grained control
    of insert values:


    INSERT


    INTO person (password)


    VALUES


    (''password''), *-- String value*


    (b''password''), *-- Byte array literal*


    (x''70617373776f7264''), *-- Hex literal*


    (b''\x70\x61\x73\x73\x77\x6f\x72\x64''); *-- Hex characters*


    Every resulting row from the preceding insert will have an identical password
    column value.


    **DATE**


    The DATE data type stores a day, month, and year value and is created as follows:
    CREATE TABLE person (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    date_of_birth


    DATE NOT NULL


    );


    Chapter 3 ConCepts


    Provide values to DATE columns as string literals, interpreted literals, timestamps
    (which truncate to day precision), or numbers representing the number of *days*
    since the epoch:


    INSERT


    INTO person (date_of_birth)


    VALUES


    (''1941-09-09''), *-- String literal*


    (DATE ''1941-09-09''), *-- Interpreted literal*


    (''1941-09-09T01:02:03.456Z''), *-- Timestamp (will be truncated)*


    (CAST(-10341 AS DATE)); *-- Number of days since the epoch*


    Every resulting row from the preceding insert will have an identical date_of_birth
    column value.


    **ENUM**


    The ENUM data type provides an enumeration that is validated upon insert and is
    created as follows:


    CREATE TYPE planet AS ENUM (


    ''mercury'',


    ''venus'',


    ''earth'',


    ''mars'',


    ''jupiter'',


    ''saturn'',


    ''uranus'',


    ''neptune''


    );


    CREATE TABLE person (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    favourite_planet


    planet NOT NULL


    );


    Chapter 3 ConCepts


    As with many of CockroachDB’s data types, ENUM columns are castable from string
    literals, interpreted literals, or strings with direct casts:


    INSERT


    INTO person (favourite_planet)


    VALUES


    (''neptune''), *-- String literal*


    (planet ''earth''), *-- Interpreted literal*


    (CAST(''saturn'' AS planet)); *-- Cast*


    **DECIMAL**


    The DECIMAL, DEC, or NUMERIC data type stores exact, fixed-poin[t2](#index_split_000.html#p55)
    numbers of variable size and is created either with or without a precision.


    Let’s start by creating a DECIMAL column without specifying a precision and scale:
    CREATE TABLE person (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    bitcoin_balance


    DECIMAL NOT NULL


    );


    Inserting some values into this table will reveal that only the digits required
    to represent the number are used:


    INSERT


    INTO person (bitcoin_balance)


    VALUES


    (0.000030),


    (0.80),


    (147.50);


    2 Meaning the number of digits after the decimal point is fixed.


    Chapter 3 ConCepts


    SELECT * FROM person;


    id | bitcoin_balance


    *---------------------------------------+------------------*


    2880768d-802f-4096-933d-68be971b3a73 | 147.50


