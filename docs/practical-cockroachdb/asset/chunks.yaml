    The status subcommand provides more than just top-level information; use the following
    commands to expose additional node information:


    • Display range information:


    $ cockroach node status --ranges --insecure


    • Display disk information:


    $ cockroach node status --stats --insecure


    • Display information relating to node state (including whether a node


    is training or has been decommissioned):


    $ cockroach node status --decommission --insecure


    • Display the combined information from the preceding commands:


    $ cockroach node status --all --insecure


    For each of the preceding commands, you can also display status information for
    individual nodes by passing a node ID as follows:


    $ cockroach node status 1 --decommission --insecure


    ![](index-89_1.jpg)


    Chapter 4 Managing CoCkroaChDB froM the CoMManD Line


    In the event that we need to take a node out of a cluster to perform maintenance,
    the drain subcommand will prevent new clients from connecting to the node and
    rebalance its range leases to other nodes in the cluster:


    $ cockroach node drain --url "postgresql://localhost:26259?sslmode=disable"


    The same can be achieved with the --host argument:


    $ cockroach node drain --host localhost:26259 --insecure


    node is draining... remaining: 4


    node is draining... remaining: 0 (complete)


    ok


    Figur[e 4-2 sho](#index_split_001.html#p89)ws that the node we drained is now
    showing as “dead” in the admin console, indicating that it is not a functioning
    node in the cluster anymore:


    ***Figure 4-2.** The Cluster Overview showing a drained node*


    Once drained, a node is safe to decommission. This can be achieved with the


    decommission subcommand as follows; note that the command is followed by the ID
    of the node you wish to decommission:


    $ cockroach node decommission 5 --insecure


    The output of this command will show the replicas being reduced until there are
    no replicas remaining on the node. The node is then removed from the cluster and
    will no longer appear in the admin console.


    Figur[e 4-3 sho](#index_split_001.html#p90)ws how the state of the decommissioned
    node transitions to


    “DECOMMISSIONING” during the process of being decommissioned.


    ![](index-90_1.jpg)


    Chapter 4 Managing CoCkroaChDB froM the CoMManD Line


    ***Figure 4-3.** The Cluster Overview showing a decommissioning node*


    The recommission subcommand can be used to recommission a node that is in


    the process of being decommissioned (indicated by the state of node n5 captured
    in Figur[e 4-3). If y](#index_split_001.html#p90)ou allow a node to be fully decommissioned,
    it will have to be restarted, as it will no longer have permission to rejoin the
    cluster:


    $ cockroach node recommission 5 --insecure


    ERROR: can only recommission a decommissioning node; n5 found to be


    decommissioned


    Failed running "node recommission"


    If we had terminated the decommissioning process partway through, we could issue
    the following command to recommission it:


    $ cockroach node recommission 5 --insecure


    In the event that a node is fully decommissioned, you can start the node again
    by first deleting its old storage directory and reissuing the start command as
    follows: $ rm -rf node4


    $ cockroach start \


    --insecure \


    --store=node4 \


    --listen-addr=localhost:26260 \


    --http-addr=localhost:8083 \


    --join=localhost:26257,localhost:26258,localhost:26259


