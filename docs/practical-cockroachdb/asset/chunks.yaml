- fmt: "Let’s start by decommissioning `node1`, `node2`, and `node3`. This process\
    \ will ensure that all ranges are replicated away from these nodes and then remove\
    \ them from the cluster. Note that I’m connected to `node6` but I could have connected\
    \ to any node in the cluster to perform this operation:\n\n```bash\n$ cockroach\
    \ node decommission 1 --insecure --url postgres://localhost:26262\n```\n\n```bash\n\
    $ cockroach node decommission 2 --insecure --url postgres://localhost:26262\n\
    ```\n\n```bash\n$ cockroach node decommission 3 --insecure --url postgres://localhost:26262\n\
    ```\n\n## Chapter 9 Production\n\nOnce the nodes are decommissioned, check that\
    \ the replication status in the dashboard still looks like Figure [9-1](#index_split_002.html#p240)\
    \ and then shut the nodes down.\n\nYou’ve just moved your cluster from AWS’s Frankfurt\
    \ region to GCP’s St. Ghislain region!\n\n### Backing Up and Restoring Data\n\n\
    Being a multiactive database, CockroachDB does not require the conventional DR\
    \ (Disaster Recovery) architecture of many traditional relational databases. Unfortunately,\
    \ a multiactive database will not protect you against bad actors or simply bad\
    \ mistakes; a `TRUNCATE` statement may wreak as much havoc on a CockroachDB as\
    \ any other relational database.\n\nThat’s where backups come to the rescue. With\
    \ CockroachDB, you can back up your clusters in any of the following ways:\n\n\
    *   **Full backups** – Full backups contain all of the data in your cluster (without\
    \ replication). Say, for example, you replicate 1GB of data across five nodes;\
    \ your backup will contain 1GB of data, not 5GB. Full backups are available for\
    \ all clusters.\n*   **Incremental backups** – Incremental backups capture the\
    \ changes since the last backup was made. You’ll always need at least one full\
    \ backup but can take as many incremental backups as you like. Incremental backups\
    \ are available for Enterprise clusters.\n*   **Encrypted backups** – Encrypted\
    \ backups add an additional level of security to your database backups. Note that\
    \ you can achieve secure backups without manual encryption by simply backing up\
    \ into an encrypted S3 bucket (or similar). Encrypted backups are available for\
    \ Enterprise clusters.\n*   **Backups with revision history** – Backups with revision\
    \ history not only back up the latest data in the database but also any revision\
    \ history yet to be garbage collected (you’ll have 25 hours' worth of revision\
    \ history by default). From these backups, you can restore either the latest data\
    \ or data from a previous point in time. These are available for Enterprise clusters.\n\
    *   **Locality-aware backups** – Locality-aware backups allow specific database\
    \ localities (e.g., just `eu-central-1`) to be backed up and are available for\
    \ Enterprise clusters.\n\nLet’s run through each of the backup methods to see\
    \ how they work for different use cases. I’ll run each of the following examples\
    \ in a demo cluster (which enables Enterprise features). To enable Enterprise\
    \ features in a regular cluster, configure the following settings:\n\n```bash\n\
    $ cockroach sql --insecure --host=<YOUR_HOST>\n```\n\n```sql\n$ SET CLUSTER SETTING\
    \ cluster.organization = 'your_organisation';\n$ SET CLUSTER SETTING enterprise.license\
    \ = 'your_license_key';\n```\n\nBefore we create any backups, I’ll create a small\
    \ database and table to prove that our backup and restore operations are successful.\
    \ For this, I’ll create a `new` `sensor_reading` table that will work nicely for\
    \ all of the backup methods:\n\n```sql\nCREATE TABLE sensor_reading (\n    sensor_id\
    \ UUID PRIMARY KEY,\n    country STRING NOT NULL,\n    reading DECIMAL NOT NULL,\n\
    \    timestamp TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n\nINSERT INTO sensor_reading\
    \ (sensor_id, country, reading, timestamp)\nSELECT\n    gen_random_uuid(),\n \
    \   'DE',\n    CAST(random() AS DECIMAL),\n    '2022-02-18' - CAST(s * 10000 AS\
    \ INTERVAL)\nFROM generate_series(1, 1000) AS s;\n```\n\nJust one more step before\
    \ we’re ready to backup. Unlike the `IMPORT` statement, which can use an HTTP\
    \ endpoint, backups and restorations need to use cloud provider blob storage (e.g.,\
    \ S3, Google Cloud Storage, and Azure Storage). Let’s create a few S3 buckets\
    \ for our backup examples:\n\n```bash\n$ aws s3api create-bucket \\\n    --bucket\
    \ practical-cockroachdb-backups \\\n    --region eu-west-2 \\\n    --create-bucket-configuration\
    \ LocationConstraint=eu-west-2\n{\n    \"Location\": \"http://practical-cockroachdb-backups.s3.amazonaws.com/\"\
    \n}\n```\n\n```bash\n$ aws s3api create-bucket \\\n    --bucket practical-cockroachdb-backups-us-west\
    \ \\\n    --region us-west-1 \\\n    --create-bucket-configuration LocationConstraint=us-west-1\n\
    {\n    \"Location\": \"http://practical-cockroachdb-backups-us-west.s3.amazonaws.com/\"\
    \n}\n```\n\n```bash\n$ aws s3api create-bucket \\\n    --bucket practical-cockroachdb-backups-us-east\
    \ \\\n    --region us-east-1\n{\n    \"Location\": \"/practical-cockroachdb-backups-us-east\"\
    \n}\n```\n\n### Full Backups\n\nWith the database, table, and bucket in place,\
    \ we’re ready to begin! Let’s start by running a full backup and restore of the\
    \ data:\n\n```sql\nBACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\
    \ AS OF SYSTEM TIME '-10s';\n```\n\n```\n  job_id           |  status   | fraction_completed\
    \ | rows | index_entries | bytes\n-------------------+-----------+--------------------+------+---------------+--------\n\
    \  742270852339073025 | succeeded |         1          | 1032 |       20     \
    \ | 57311\n```\n\nNote that in our backup request, we tell CockroachDB to back\
    \ up the database as it was ten seconds ago. This means that it’s not trying to\
    \ back up live data while it’s being served to clients. This is a performance\
    \ recommendation from Cockroach Labs, and ten seconds is the `minimum` recommended\
    \ period; depending on your garbage collection window (the default is 25 hours),\
    \ you may want to set this to be further in the past.\n\nLet’s check that S3 has\
    \ our backup:\n\n```bash\n$ aws s3api list-objects-v2 \\\n    --bucket practical-cockroachdb-backups\n\
    {\n    \"Contents\": [\n        {\n            \"Key\": \"2022/03/06-190437.13/BACKUP-CHECKPOINT-742270852339073025-CHECKSUM\"\
    ,\n            \"LastModified\": \"2022-03-06T19:04:48+00:00\",\n            \"\
    ETag\": \"\\\"79f98a6fd4b39f02b7727c91707b71cd\\\"\",\n            \"Size\": 4,\n\
    \            \"StorageClass\": \"STANDARD\"\n        }\n...\n```\n\nLooks good!\
    \ CockroachDB backups are stored in a directory structure whose directories indicate\
    \ the date and time of the backup.\n\nLet’s ensure our `sensor_reading` table\
    \ was backed up successfully by running a restore. As all of the data is safely\
    \ replicated across our three nodes, a restore won’t currently prove anything;\
    \ let’s remedy that:\n\n```sql\nTRUNCATE sensor_reading;\n\nSELECT COUNT(*) FROM\
    \ sensor_reading;\n```\n\n```\n  count\n---------\n     0\n```\n\nWith the data\
    \ gone (and the department panicking), it’s time to run our restore. Pay attention\
    \ to the backups objects’ directory structure, we’ll need them now:\n\n```sql\n\
    RESTORE FROM '2022/03/06-190437.13' IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2';\n\
    ```\n\n```\nERROR: full cluster restore can only be run on a cluster with no tables\
    \ or databases but found 4 descriptors: [sensors crdb_internal_region _crdb_internal_region\
    \ sensor_reading]\n```\n\nOh no! It seems we can’t restore unless we have an empty\
    \ cluster. What if we had other databases or tables that are not in need of restoration?\
    \ Happily, CockroachDB has alternative `RESTORE` commands you can use, depending\
    \ on your situation. All of which can be performed from the full backup we just\
    \ took:\n\n*   **Ruined your cluster?** – Use `RESTORE FROM` to restore your entire\
    \ cluster.\n*   **Ruined your database?** – Use `RESTORE DATABASE {DATABASE} FROM`\
    \ to restore just your database.\n*   **Ruined your table?** – Use `RESTORE TABLE\
    \ {DATABASE}.{TABLE} FROM` to restore just your table. Note that by passing in\
    \ a comma-separated string of tables, you can back up multiple tables in one go."
  raw: 'Let’s start by decommissioning node1, node2, and node3\. This process will
    ensure that all ranges are replicated away from these nodes and then remove them
    from the cluster. Note that I’m connected to node6 but I could have connected
    to any node in the cluster to perform this operation:


    $ cockroach node decommission 1 --insecure --url postgres://localhost:26262


    $ cockroach node decommission 2 --insecure --url postgres://localhost:26262


    $ cockroach node decommission 3 --insecure --url postgres://localhost:26262


    Chapter 9 produCtion


    Once the nodes are decommissioned, check that the replication status in the


    dashboard still looks like Figure [9-1](#index_split_002.html#p240) and then shut
    the nodes down.


    You’ve just moved your cluster from AWS’s Frankfurt region to GCP’s St.


    Ghislain region!


    **Backing Up and Restoring Data**


    Being a multiactive database, CockroachDB does not require the conventional DR


    (Disaster Recovery) architecture of many traditional relational databases. Unfortunately,
    a multiactive database will not protect you against bad actors or simply bad mistakes;
    a TRUNCATE statement may wreak as much havoc on a CockroachDB as any other


    relational database.


    That’s where backups come to the rescue. With CockroachDB, you can back up your
    clusters in any of the following ways[:10](#index_split_002.html#p241)


    • **Full backups** – Full backups contain all of the data in your cluster (without
    replication). Say, for example, you replicate 1GB of data


    across five nodes; your backup will contain 1GB of data, not 5GB. Full


    backups are available for all clusters.


    • **Incremental backups** – Incremental backups capture the changes


    since the last backup was made. You’ll always need at least one


    full backup but can take as many incremental backups as you like.


    Incremental backups are available for Enterprise clusters.


    • **Encrypted backups** – Encrypted backups add an additional level of


    security to your database backups. Note that you can achieve secure


    backups without manual encryption by simply backing up into an


    encrypted S3 bucket (or similar). Encrypted backups are available for


    Enterprise clusters.


    • **Backups with revision history** – Backups with revision history not


    only back up the latest data in the database but also any revision


    history yet to be garbage collected (you’ll have 25 hours'' worth of


    revision history by default). From these backups, you can restore


    10 [www.cockroachlabs.com/docs/v21.2/take-full-and-incremental-backups](http://www.cockroachlabs.com/docs/v21.2/take-full-and-incremental-backups)


    Chapter 9 produCtion


    either the latest data or data from a previous point in time. These are


    available for Enterprise clusters.


    • **Locality-aware backups** – Locality-aware backups allow specific


    database localities (e.g., just eu-central-1) to be backed up and are


    available for Enterprise clusters.


    Let’s run through each of the backup methods to see how they work for different
    use cases. I’ll run each of the following examples in a demo cluster (which enables
    Enterprise features). To enable Enterprise features in a regular cluster, configure
    the following settings:


    $ cockroach sql --insecure --host=<YOUR_HOST>


    $ SET CLUSTER SETTING cluster.organization = ''your_organisation'';


    $ SET CLUSTER SETTING enterprise.license = ''your_license_key'';


    Before we create any backups, I’ll create a small database and table to prove
    that our backup and restore operations are successful. For this, I’ll create a
    *new* sensor_reading table that will work nicely for all of the backup methods:


    CREATE TABLE sensor_reading (


    sensor_id UUID PRIMARY KEY,


    country STRING NOT NULL,


    reading DECIMAL NOT NULL,


    timestamp TIMESTAMPTZ NOT NULL DEFAULT NOW()


    );


    INSERT INTO sensor_reading (sensor_id, country, reading, timestamp)


    SELECT


    gen_random_uuid(),


    ''DE'',


    CAST(random() AS DECIMAL),


    ''2022-02-18'' - CAST(s * 10000 AS INTERVAL)


    FROM generate_series(1, 1000) AS s;


    Just one more step before we’re ready to backup. Unlike the IMPORT statement,
    which can use an HTTP endpoint, backups and restorations need to use cloud provider
    blob storage (e.g., S3, Google Cloud Storage, and Azure Storage). Let’s create
    a few S3


    buckets for our backup examples:


    Chapter 9 produCtion


    $ aws s3api create-bucket \


    --bucket practical-cockroachdb-backups \


    --region eu-west-2 \


    --create-bucket-configuration LocationConstraint=eu-west-2


    {


    "Location": "http://practical-cockroachdb-backups.s3.amazonaws.com/"


    }


    $ aws s3api create-bucket \


    --bucket practical-cockroachdb-backups-us-west \


    --region us-west-1 \


    --create-bucket-configuration LocationConstraint=us-west-1


    {


    "Location": "http://practical-cockroachdb-backups-us-west.


    s3.amazonaws.com/"


    }


    $ aws s3api create-bucket \


    --bucket practical-cockroachdb-backups-us-east \


    --region us-east-1


    {


    "Location": "/practical-cockroachdb-backups-us-east"


    }


    **Full Backups**


    With the database, table, and bucket in place, we’re ready to begin! Let’s start
    by running a full backup and restore of the data:


    BACKUP INTO ''s3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_


    SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'' AS OF SYSTEM TIME ''-10s'';


    job_id | status | fraction_completed | rows | index_entries | bytes


    *---------------------+-----------+--------------------+------+---------------+------*


    742270852339073025 | succeeded | 1 | 1032 | 20 | 57311


    Chapter 9 produCtion


    Note that in our backup request, we tell CockroachDB to back up the database as
    it was ten seconds ago. This means that it’s not trying to back up live data while
    it’s being served to clients. This is a performance recommendation from Cockroach
    Labs, and ten seconds is the *minimum* recommended period; depending on your garbage
    collection window (the default is 25 hours), you may want to set this to be further
    in the past.


    Let’s check that S3 has our backup:


    $ aws s3api list-objects-v2 \


    --bucket practical-cockroachdb-backups


    {


    "Contents": [


    {


    "Key": "2022/03/06-190437.13/BACKUP-


    CHECKPOINT- 742270852339073025-CHECKSUM",


    "LastModified": "2022-03-06T19:04:48+00:00",


    "ETag": "\"79f98a6fd4b39f02b7727c91707b71cd\"",


    "Size": 4,


    "StorageClass": "STANDARD"


    }


    ...


    Looks good! CockroachDB backups are stored in a directory structure whose


    directories indicate the date and time of the backup.


    Let’s ensure our sensor_reading table was backed up successfully by running a
    restore. As all of the data is safely replicated across our three nodes, a restore
    won’t currently prove anything; let’s remedy that:


    TRUNCATE sensor_reading;


    SELECT COUNT(*) FROM sensor_reading;


    count


    *---------*


    Chapter 9 produCtion


    With the data gone (and the department panicking), it’s time to run our restore.
    Pay attention to the backups objects’ directory structure, we’ll need them now:


    RESTORE FROM ''2022/03/06-190437.13'' IN ''s3://practical-cockroachdb-


    backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_


    REGION=eu-west-2'';


    ERROR: full cluster restore can only be run on a cluster with no tables or


    databases but found 4 descriptors: [sensors crdb_internal_region _crdb_


    internal_region sensor_reading]


    Oh no! It seems we can’t restore unless we have an empty cluster. What if we had
    other databases or tables that are not in need of restoration? Happily, CockroachDB
    has alternative RESTORE commands you can use, depending on your situation. All
    of which can be performed from the full backup we just took:


    • **Ruined your cluster?** – Use RESTORE FROM to restore your entire


    cluster.


    • **Ruined your database?** – Use RESTORE DATABASE {DATABASE} FROM


    to restore just your database.


    • **Ruined your table?** – Use RESTORE TABLE {DATABASE}.{TABLE}


    FROM to restore just your table. Note that by passing in a comma-


    separated string of tables, you can back up multiple tables in one go.'
  trans: "\n让我们首先退役 `node1`、`node2` 和 `node3`。此过程将确保所有范围都从这些节点上复制出去，然后将它们从集群中移除。请注意，我是连接到\
    \ `node6`，但我本可以连接到集群中的任何节点来执行此操作：\n\n```bash\n$ cockroach node decommission 1\
    \ --insecure --url postgres://localhost:26262\n```\n\n```bash\n$ cockroach node\
    \ decommission 2 --insecure --url postgres://localhost:26262\n```\n\n```bash\n\
    $ cockroach node decommission 3 --insecure --url postgres://localhost:26262\n\
    ```\n\n## 第 9 章 生产环境\n\n节点退役后，请检查仪表板中的复制状态是否仍如图 9-1 所示，然后关闭这些节点。\n\n您刚刚将集群从 AWS\
    \ 的法兰克福区域迁移到了 GCP 的圣吉斯兰区域！\n\n### 备份与恢复数据\n\n作为一个多活数据库，CockroachDB 不需要许多传统关系数据库的常规\
    \ DR（灾难恢复）架构。不幸的是，多活数据库并不能保护您免受恶意行为者或单纯的错误操作；一条 `TRUNCATE` 语句可能像在其他任何关系数据库中一样对\
    \ CockroachDB 造成严重破坏。\n\n这就是备份发挥作用的地方。使用 CockroachDB，您可以通过以下任何一种方式备份集群：\n\n* \
    \  **完整备份** – 完整备份包含集群中的所有数据（不含副本）。例如，假设您将 1GB 的数据复制到五个节点；您的备份将包含 1GB 的数据，而不是\
    \ 5GB。所有集群都提供完整备份功能。\n*   **增量备份** – 增量备份捕获自上次备份以来的更改。您始终需要至少一个完整备份，但可以按需进行任意多次增量备份。增量备份仅适用于企业版集群。\n\
    *   **加密备份** – 加密备份为您的数据库备份增加了一层额外的安全性。请注意，您可以通过简单地备份到加密的 S3 存储桶（或类似存储）来实现安全备份，而无需手动加密。加密备份仅适用于企业版集群。\n\
    *   **带修订历史的备份** – 带修订历史的备份不仅备份数据库中的最新数据，还备份尚未被垃圾回收的任何修订历史（默认情况下，您将拥有 25 小时的修订历史）。通过这些备份，您可以恢复最新数据或之前某个时间点的数据。此功能仅适用于企业版集群。\n\
    *   **地域感知备份** – 地域感知备份允许备份特定的数据库地域（例如，仅 `eu-central-1`），仅适用于企业版集群。\n\n让我们逐一介绍每种备份方法，看看它们如何应对不同的用例。我将在演示集群（启用了企业版功能）中运行以下每个示例。要在常规集群中启用企业版功能，请配置以下设置：\n\
    \n```bash\n$ cockroach sql --insecure --host=<YOUR_HOST>\n```\n\n```sql\n$ SET\
    \ CLUSTER SETTING cluster.organization = 'your_organisation';\n$ SET CLUSTER SETTING\
    \ enterprise.license = 'your_license_key';\n```\n\n在我们创建任何备份之前，我将创建一个小数据库和表来证明我们的备份和恢复操作是成功的。为此，我将创建一个新的\
    \ `sensor_reading` 表，它适用于所有的备份方法：\n\n```sql\nCREATE TABLE sensor_reading (\n \
    \   sensor_id UUID PRIMARY KEY,\n    country STRING NOT NULL,\n    reading DECIMAL\
    \ NOT NULL,\n    timestamp TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n\nINSERT INTO\
    \ sensor_reading (sensor_id, country, reading, timestamp)\nSELECT\n    gen_random_uuid(),\n\
    \    'DE',\n    CAST(random() AS DECIMAL),\n    '2022-02-18' - CAST(s * 10000\
    \ AS INTERVAL)\nFROM generate_series(1, 1000) AS s;\n```\n\n在我们准备好备份之前，还差一步。与可以使用\
    \ HTTP 端点的 `IMPORT` 语句不同，备份和恢复需要使用云提供商的对象存储（例如，S3、Google Cloud Storage 和 Azure\
    \ Storage）。让我们为备份示例创建几个 S3 存储桶：\n\n```bash\n$ aws s3api create-bucket \\\n   \
    \ --bucket practical-cockroachdb-backups \\\n    --region eu-west-2 \\\n    --create-bucket-configuration\
    \ LocationConstraint=eu-west-2\n{\n    \"Location\": \"http://practical-cockroachdb-backups.s3.amazonaws.com/\"\
    \n}\n```\n\n```bash\n$ aws s3api create-bucket \\\n    --bucket practical-cockroachdb-backups-us-west\
    \ \\\n    --region us-west-1 \\\n    --create-bucket-configuration LocationConstraint=us-west-1\n\
    {\n    \"Location\": \"http://practical-cockroachdb-backups-us-west.s3.amazonaws.com/\"\
    \n}\n```\n\n```bash\n$ aws s3api create-bucket \\\n    --bucket practical-cockroachdb-backups-us-east\
    \ \\\n    --region us-east-1\n{\n    \"Location\": \"/practical-cockroachdb-backups-us-east\"\
    \n}\n```\n\n### 完整备份\n\n数据库、表和存储桶都已就绪，我们可以开始了！让我们首先对数据进行一次完整的备份和恢复：\n\n```sql\n\
    BACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\
    \ AS OF SYSTEM TIME '-10s';\n```\n\n```\n  job_id           |  status   | fraction_completed\
    \ | rows | index_entries | bytes\n-------------------+-----------+--------------------+------+---------------+--------\n\
    \  742270852339073025 | succeeded |         1          | 1032 |       20     \
    \ | 57311\n```\n\n请注意，在我们的备份请求中，我们告诉 CockroachDB 备份十秒钟前的数据库状态。这意味着它不会尝试备份正在为客户端提供服务的实时数据。这是\
    \ Cockroach Labs 推荐的性能优化建议，十秒钟是推荐的`最小`时间间隔；根据您的垃圾回收窗口（默认为 25 小时），您可能希望将其设置为更早的时间点。\n\
    \n让我们检查 S3 是否有我们的备份：\n\n```bash\n$ aws s3api list-objects-v2 \\\n    --bucket\
    \ practical-cockroachdb-backups\n{\n    \"Contents\": [\n        {\n         \
    \   \"Key\": \"2022/03/06-190437.13/BACKUP-CHECKPOINT-742270852339073025-CHECKSUM\"\
    ,\n            \"LastModified\": \"2022-03-06T19:04:48+00:00\",\n            \"\
    ETag\": \"\\\"79f98a6fd4b39f02b7727c91707b71cd\\\"\",\n            \"Size\": 4,\n\
    \            \"StorageClass\": \"STANDARD\"\n        }\n...\n```\n\n看起来不错！CockroachDB\
    \ 备份存储在一个目录结构中，其目录表明了备份的日期和时间。\n\n让我们通过运行恢复来确保我们的 `sensor_reading` 表已成功备份。由于所有数据都安全地复制在我们的三个节点上，目前进行恢复还无法证明什么；让我们来补救一下：\n\
    \n```sql\nTRUNCATE sensor_reading;\n\nSELECT COUNT(*) FROM sensor_reading;\n```\n\
    \n```\n  count\n---------\n     0\n```\n\n数据消失了（部门也陷入了恐慌），是时候运行恢复了。请注意备份对象的目录结构，我们现在需要用到它们：\n\
    \n```sql\nRESTORE FROM '2022/03/06-190437.13' IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2';\n\
    ```\n\n```\nERROR: full cluster restore can only be run on a cluster with no tables\
    \ or databases but found 4 descriptors: [sensors crdb_internal_region _crdb_internal_region\
    \ sensor_reading]\n```\n\n哦，不！看来我们只能在空集群上进行恢复。如果我们有其他不需要恢复的数据库或表怎么办？幸运的是，CockroachDB\
    \ 根据您的情况提供了替代的 `RESTORE` 命令。所有这些都可以从我们刚刚进行的完整备份执行：\n\n*   **集群损坏了？** – 使用 `RESTORE\
    \ FROM` 恢复整个集群。\n*   **数据库损坏了？** – 使用 `RESTORE DATABASE {DATABASE} FROM` 仅恢复您的数据库。\n\
    *   **表损坏了？** – 使用 `RESTORE TABLE {DATABASE}.{TABLE} FROM` 仅恢复您的表。请注意，通过传入一个逗号分隔的表字符串，您可以一次性备份多个表。\n\
    \n"
- fmt: "## Chapter 9 produCtion\n\nThere’s one more step we need to perform before\
    \ our table can be restored. We need to `DROP` or `RENAME` it[11 b](#index_split_002.html#p245)efore\
    \ running the restore. As my `sensor_reading` table is empty, there’s nothing\
    \ I need to archive, so `DROP` works best for me:\n\n```sql\nDROP TABLE sensor_reading;\n\
    ```\n\n```sql\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/06-190437.13'\
    \ IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2';\n\
    ```\n\n11 [www.cockroachlabs.com/docs/stable/restore.html#restore-a-cluster](http://www.cockroachlabs.com/docs/stable/restore.html#restore-a-cluster)\n\
    \n```\njob_id | status | fraction_completed | rows | index_entries | bytes\n---------------------+-----------+--------------------+------+---------------+-------\n\
    742274102397501441 | succeeded | 1 | 1000 | 0 | 52134\n```\n\n## Incremental Backups\n\
    \nA full backup and restore works in this case, as the database and objects are\
    \ small. If your cluster is many gigabytes in size, incremental backups may be\
    \ a more efficient option for you. Let’s explore incremental backups to see how\
    \ they work.\n\nFirst, we’ll insert some new data into our restored `sensor_reading`\
    \ table to simulate data being added to the table over time. This will create\
    \ a delta between the original data we inserted at the start of the backups section\
    \ to now. If CockroachDB does not detect a change between an incremental backup\
    \ and the previous backup (whether full or incremental), you’ll see an empty backup\
    \ directory:\n\n```sql\nINSERT INTO sensor_reading (sensor_id, country, reading,\
    \ timestamp)\nSELECT\n  gen_random_uuid(),\n  'DE',\n  CAST(random() AS DECIMAL),\n\
    \  '2022-02-18' - CAST(s * 10000 AS INTERVAL)\nFROM generate_series(1, 500) AS\
    \ s;\n```\n\n```sql\nSELECT COUNT(*) FROM sensor_reading;\n```\n\n```\ncount\n\
    ---------\n1511\n```\n\nNow, let’s run an incremental backup:\n\n```sql\nBACKUP\
    \ INTO LATEST IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\
    \ AS OF SYSTEM TIME '-10s';\n```\n\n```\njob_id | status | fraction_completed\
    \ | rows | index_entries | bytes\n---------------------+-----------+--------------------+------+---------------+-------\n\
    742278826975625217 | succeeded | 1 | 1511 | 35 | 85097\n```\n\nThe number of rows\
    \ indicates the number of rows backed up by the last backup operation. Note that\
    \ because we have not yet backed up our restored dataset, the delta includes all\
    \ rows in the table. If you run again now, you’ll see zero rows as there’s nothing\
