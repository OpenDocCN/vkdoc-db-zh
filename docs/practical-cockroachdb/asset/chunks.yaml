    **CHAPTER 1**


    **The Reason**


    **for CockroachDB**


    Databases are a critical part of almost every stateful system. However, correctly
    running them can be challenging, especially where price, availability, and shifting
    international data privacy regulations are concerned. CockroachDB makes navigating
    this tricky landscape not only easier but enjoyable.


    In this chapter, we’ll explore the *why* of CockroachDB – why it came to be, and
    why you might want to consider using it for your data.


    **What Is CockroachDB?**


    CockroachDB is a cloud-native Relational Database Management System (RDBMS). It
    falls into the class of “NewSQL” or “DistSQL” (Distributed SQL) databases, which
    aim to provide the scalability of NoSQL databases while giving users the experience
    and features of a traditional SQL database. It is wire-compatible with Postgres,
    which means you can connect to a CockroachDB cluster with most Postgres tools
    and drivers. To find out which drivers are available, vis[it www.cockroachlabs.com/docs/stable/install-](http://www.cockroachlabs.com/docs/stable/install-client-drivers.html)


    [client-drivers.html.](http://www.cockroachlabs.com/docs/stable/install-client-drivers.html)


    On paper, CockroachDB is “CP,” which, in terms of the CAP Theorem, means it favors
    data **C**onsistency over **A**vailability in the face of network **P**artitions.
    In reality, however, CockroachDB – as its name suggests – has been built with
    availability in mind as well.


    In practice, if you were to lose the majority of replicas in a CockroachDB cluster,
    rather than compromising the integrity of your data, requests will block until
    the nodes have recovered. Sizing your cluster to ensure CockroachDB can continue
    to function in the event of lost nodes is, therefore, an essential constituent
    to availability.


    © Rob Reid 2022


    R. Reid, *Practical CockroachDB*[, https://doi.org/10.1007/978-1-4842-8224-3_1](https://doi.org/10.1007/978-1-4842-8224-3_1#DOI)


    Chapter 1 the reason for CoCkroaChDB


    Cockroach Labs – the company behind CockroachDB – was founded in 2015 by


    Spencer Kimball, Peter Mattis, and Ben Darnell. Inspired by Google’s Spanner database,
    the team sought to bring Spanner’s level of scalability to the masses, removing
    Spanner’s dependency on atomic clocks and writing in the performant, modern, and
    increasingly ubiquitous programming language, Go.


    It gives you the freedom to create multiregion databases without the need for
    a database department. Importantly, it’s also a safety net, making it harder to
    create that multiregion database incorrectly.


    **CockroachDB’s Architecture**


    CockroachDB uses the Raft Consensus algorithm to give users a multiactive system,
    which means every node is the same. There are no special “active,” “leader,” or
    “write”


    nodes. Every node can receive a portion of read and write requests for different
    shards (or “ranges”) of data, helping CockroachDB to scale horizontally.


    Under the hood, CockroachDB is a distributed key/value store. But thanks to its
    layered architecture of SQL > Transactions > Distribution > Replication > Storage,
    you can interact with data as richly as you would in any other RDBMS.


    **What Does CockroachDB Solve?**


    Creating a new database is relatively easy, regardless of the technology. You
    download a binary, pull a Docker image, or start a subscription, and away you
    go. On the other hand, you typically install a traditional database on a single
    machine that will need to be vertically scaled, sharded, or have read replicas
    added when outgrown. All of these needs pose complexity, availability, and consistency
    challenges.


    With CockroachDB, the challenges of complexity and reliability shift to the database.


    It takes care of distribution, scaling, and replication, leaving you to focus
    on your data.


    Generally speaking, if a cluster requires more capacity, you simply add a node
    to that cluster. CockroachDB will automatically rebalance the data evenly across
    all nodes.


    Figur[e 1-1 depicts a c](#index_split_000.html#p17)luster of three nodes, each
    with a capacity of 100GB and each with a 40GB share of 120GB total data.


    ![](index-17_1.png)


    Chapter 1 the reason for CoCkroaChDB


    ***Figure 1-1.** A three-node cluster*


    In Figur[e 1-2, y](#index_split_000.html#p18)ou’ll see that when we add a node,
    data in the cluster will be rebalanced across all four nodes, resulting in shares
    of 30GB per node of the 120GB total.


    ![](index-18_1.png)


    Chapter 1 the reason for CoCkroaChDB


    ***Figure 1-2.** The same cluster, rebalanced across four nodes*


    **Who Is CockroachDB For?**


    CockroachDB is an excellent choice for anyone needing a scalable, reliable, and
    distributed Online Transaction Processing (OLTP) database. Built with modern,
    cloud-based infrastructure and workloads in mind, it will be at home in the cloud,
    on-premises, or a hybrid of the two.


    It’s also a great choice if you’re unsure of your database storage requirements.
    You can start small, expanding your cluster node by node as your data grows. CockroachDB


    will ensure that your data is distributed evenly and safely across the growing
    cluster.


    If you are familiar with RDBMSs, CockroachDB will feel familiar to you. For Postgres
    users, you may even find that CockroachDB can be a drop-in replacement for your
    database.


    As you’ll see shortly, CockroachDB can be installed with minimal fuss whether
    you want to create a local development database or a distributed production database.


    CockroachDB is trusted to run critical, globally distributed workflows by some
    of the world’s largest tech, finance, travel, retail, telecoms, video streaming,
    and gaming companies. And its position on [https://db-engines.com/en/ranking](https://db-engines.com/en/ranking)
    continues to improve. It is now more popular than Google’s Spanner, the database
    that inspired it.


    **CHAPTER 2**


    **Installing CockroachDB**


    One of CockroachDB’s many strengths is the ease with which you can install it.
    In this chapter, we’ll explore CockroachDB’s licensing model and the various ways
    you can install it.


    **Licensing**


    We’ll start with a tour of CockroachDB’s licensing options to familiarize ourselves
    with what each option provides. There are both free and paid-for models, and your
    choice of model will depend on your requirements and the features available in
    each.


    **Free**


    There are two free options available. One is an on-premises installation of the
    CockroachDB Core functionality, and the other is a cloud offering:


    • **CockroachDB Core** – Build and elastically scale a distributed


    database with many of the most critical features as standard; a good


    option if you don’t need some of CockroachDB’s more advanced


    features. You would need to install this option onto either cloud-


    based or on-premises hardware.


    • **CockroachDB Serverless (Free Tier)** – Sign up and create a free


    CockroachDB cluster in the cloud. At the time of writing, this cloud


    option provides similar but slightly more limited functionality to


    CockroachDB Core, limiting users to a multitenant, single-node


    machine with 1 vCPU and 5GB of storage.


    © Rob Reid 2022


    R. Reid, *Practical CockroachDB*[, https://doi.org/10.1007/978-1-4842-8224-3_2](https://doi.org/10.1007/978-1-4842-8224-3_2#DOI)


    Chapter 2 InstallIng CoCkroaChDB


    **Paid For**


    To unlock everything that CockroachDB has to offer (and to support Cockroach Labs
    in continuing to build the database into the future), the following paid-for models
    are available:


    • **CockroachDB Self-Hosted** – The complete CockroachDB offering for


    cloud-based or on-premises installations. Sporting advanced features


    such as geo and archival partitioning, incremental backups, encryption


    at rest, change data capture, and direct support from Cockroach Labs.


    • **CockroachDB Dedicated** – The complete CockroachDB offering in


    the cloud. In addition to CockroachDB Enterprise, it provides SLAs


    and cloud-specific options like VPC peering.


    A decision to use any of the aforementioned licenses will depend on your


    requirements. In each of the following installation options, I’ll provide a recap
    of the licensing model to help you decide which best matches your needs.


    **CockroachDB Core**


    Beginning in version 19.2, CockroachDB Core is subject to multiple licenses. Some
    functionality retains the original Apache 2.0 license, meaning it is fully Open
    Source. Other features are subject to a Cockroach Community License, which protects
    Cockroach Labs from companies using their code to build products that do not benefit
    Cockroach Labs.


    In short, if you plan on using CockroachDB Core’s free features to power your
    own databases and do not intend to sell CockroachDB as a service to others, CockroachDB


    Core is a good choice for you.


    **Local Installation**


    In this section, I’ll show you how to install CockroachDB on your local machine.
    For each installation method, we’ll run CockroachDB with insecure configuration
    for brevity for each installation method, which means **no authentication or encryption**.
    This is acceptable for a local development database but not for anything else.
    Once we’ve installed and tested local insecure deployments, we’ll move on to some
    real-world secure implementations.


    Chapter 2 InstallIng CoCkroaChDB


    **Binary Install**


    You can install the cockroach binary in several ways, depending on your


    operating system.


    For Linux users, run the following commands to get started:


    $ curl https://binaries.cockroachdb.com/cockroach-v21.1.7.linux-amd64.tgz


    | tar -xz


    $ sudo cp cockroach-v21.1.7.linux-amd64/cockroach /usr/local/bin/


    For Mac users, run the following command to get started:


    $ brew install cockroachdb/tap/cockroach


    For Windows 10 users, run the following commands to get started:


    $ curl -o cockroach-v21.1.7.windows-6.2-amd64.zip


    https://binaries.cockroachdb.com/cockroach-v21.1.7.windows-6.2-amd64.zip


    $ powershell.exe -NoP -NonI -Command "Expand-Archive ''.\cockroach-


    v21.1.7.windows-6.2-amd64.zip'' ''.''"


    Either change directory (cd) into the cockroach-v21.1.7.windows-6.2-amd64


    directory and invoke the cockroach executable when you need it, or add its containing
    directory to your PATH and invoke the cockroach executable from any directory.


    The cockroach executable is now available, and you can start a local instance
    of CockroachDB using the following command:


    $ cockroach start-single-node --insecure --listen-addr=localhost


    We’ve just started a single node, insecure cluster, listening on localhost with
    the default 26527 port for SQL connections and the 8080 port for HTTP connections.


    To test that CockroachDB is up and running, use the cockroach sql command to enter
    the CockroachDB SQL shell. Note that the --host argument can be omitted, as the
    default value assumes a locally running node using the default port:


    $ cockroach sql --insecure


