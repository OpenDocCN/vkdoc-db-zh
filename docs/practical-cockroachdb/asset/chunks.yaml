- fmt: "# Chapter 5 Interacting with CockroachDB\n\nWHERE `date_of_birth` BETWEEN\
    \ '1979-01-01' and '1997-12-31'\n\nAND `pets` <@ ARRAY['Mr. Dog']\n\nORDER BY\
    \ `date_of_birth` DESC;\n\n`distribution: full`\n`vectorized: true`\n\n- `sort`\n\
    \  - `order: -date_of_birth`\n- `filter`\n  - `filter: pets <@ ARRAY['Mr. Dog']`\n\
    - `index join`\n  - `table: person@primary`\n- `scan`\n  - `missing stats`\n \
    \ - `table: person@person_date_of_birth_idx`\n  - `spans: [/'1979-01-01 00:00:00'\
    \ - /'1997-12-31 00:00:00']`\n\nCockroachDB has had to sort the results manually\
    \ for us before returning them because the indexes on the table sort in ascending\
    \ order by default and we’ve asked for them in descending order.\n\nSuppose you\
    \ know that CockroachDB may return the results of a query in either ascending\
    \ or descending order by a column. In that case, it’s worth considering adding\
    \ indexes for both scenarios as follows:\n\n```sql\nCREATE TABLE person (\n  \
    \  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    date_of_birth TIMESTAMP\
    \ NOT NULL,\n    pets STRING[],\n    INDEX person_date_of_birth_asc_idx (date_of_birth\
    \ ASC),\n    INDEX person_date_of_birth_desc_idx (date_of_birth DESC),\n    INVERTED\
    \ INDEX (pets)\n);\n```\n\nWith this in place, CockroachDB knows how to return\
    \ query results that are ordered by `date_of_birth` in ascending or descending\
    \ order without having to manually sort them.\n\nIf you’re indexing columns containing\
    \ sequential data, such as `TIMESTAMP` or incrementing `INT` values, you may want\
    \ to consider using hash-sharded indexes[.3](#index_split_001.html#p121)\n\nHash-sharded\
    \ indexes ensure that indexed data is distributed evenly across ranges, which\
    \ prevent single-range hotspots. Single-range hotspots occur when multiple similar\
    \ values are queried and exist in the same range.\n\nAt the time of writing, hash-sharded\
    \ indexes are still experimental, so they need to be enabled as follows:\n\n```sql\n\
    SET experimental_enable_hash_sharded_indexes = true;\n\nCREATE TABLE device_event\
    \ (\n    device_id UUID NOT NULL,\n    event_timestamp TIMESTAMP NOT NULL,\n \
    \   INDEX (device_id, event_timestamp) USING HASH WITH bucket_count = 10\n);\n\
    ```\n\nUnder the covers, the values in the index will be an `FNV` hash representation\
    \ of the data you’re indexing. Any small changes to the input data may result\
    \ in a different hash output and a different index bucket. The table can now scale\
    \ more evenly across the nodes in your cluster, resulting in increased performance.\n\
    \n3 [www.cockroachlabs.com/docs/stable/hash-sharded-indexes](http://www.cockroachlabs.com/docs/stable/hash-sharded-indexes)\n\
    \n## View Design\n\nA view is simply a `SELECT` query that you assign a name to\
    \ ask CockroachDB to remember. CockroachDB supports three types of views:\n\n\
    - `Materialized views` – CockroachDB stores the resulting data for improved performance\
    \ in subsequent queries. I would only recommend using materialized views if you\
    \ cannot index the data in your table, for query performance, and if the data\
    \ in that table does not update frequently. If data frequently updates, your results\
    \ might be stale.\n- `Dematerialized views` – The results of a view are not stored,\
    \ meaning data is always consistent with the table. As the results are not stored,\
    \ CockroachDB will query the underlying table for each view query. If you’ve appropriately\
    \ indexed your table for performance, dematerialized views are the best choice,\
    \ as they will always return correct data.\n- `Temporary views` – Temporary views\
    \ are ephemeral views that are accessible only to the session in which they were\
    \ created and deleted at the end of that session.\n\nIf you need to restrict table\
    \ data to specific users or have complex queries you’d like to expose as simpler\
    \ ones, views are a good choice. Let’s create some views to see what they can\
    \ offer us.\n\n### Simplify Queries\n\nSuppose you have a query whose complexity\
    \ you’d like to hide (or simply not have to rewrite). You can create a view over\
    \ this data to expose a simpler query."
