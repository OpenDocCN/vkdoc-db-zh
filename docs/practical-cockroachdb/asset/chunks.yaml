    have been used to store the data. This is because CockroachDB does not know why
    you’re geo-partitioning data, so it tries to replicate data in as resilient a
    way as possible, given the default survival goal of REGION. This is acceptable
    when data can flow freely between regions, but not acceptable when it needs to
    be pinned for regulatory reasons.


