    **CHAPTER 9**


    **Production**


    In the last chapter of this book, we’ll cover some practices and tools that will
    ensure our cluster is ready for whatever a production environment can throw at
    it:


    • **Best practices** – Learning new technologies can be overwhelming,


    and knowing how to do things *correctly* can seem a daunting


    prospect. This section will explore some best practices to consider


    when running a production cluster.


    • **Upgrading clusters** – We''ll need to keep our nodes up to date to take advantage
    of the latest CockroachDB features and fixes.


    • **Backing up and restoring data** – While CockroachDB’s philosophy


    of being “multiactive” negates the need for DR (Disaster Recovery)


    planning, it’s still good practice to consider taking database


    snapshots to return to in the event of accidental database corruption


    (e.g., DELETE * FROM customer...).


    • **Moving a cluster** – Having had the privilege of working at the


    cosmetics retailer Lush, I appreciate that no cloud provider


    lasts forever[.1](#index_split_002.html#p217) This section will show you how to
    lift and shift a CockroachDB cluster from one place to another in the event of
    a


    major infrastructure overhaul.


    1 [https://cloud.google.com/customers/lush](https://cloud.google.com/customers/lush)


    © Rob Reid 2022


    R. Reid, *Practical CockroachDB*[, https://doi.org/10.1007/978-1-4842-8224-3_9](https://doi.org/10.1007/978-1-4842-8224-3_9#DOI)


    Chapter 9 produCtion


    **Best Practices**


    The best practices documenta[tion2 on the C](#index_split_002.html#p218)ockroach
    Labs website is comprehensive and a great reference for anyone wishing to get
    the best out of their CockroachDB clusters.


    We’ll put these best practices to work in this section and see what happens if
    we don’t.


    Unless stated, many of the examples that follow in this chapter will use the three-node,
    load-balanced cluster I created in Chapt[er 8.](https://doi.org/10.1007/978-1-4842-8224-3_8)


    **SELECT Performance**


    In this section, we’ll look at some performance best practices concerning SELECT


    statements and what configuration values you can tweak to enjoy the best possible
    performance.


    If you find that SELECT queries are running slowly and you’ve ruled out indexes
    as the culprit, your database might lack cache memory. By default, each node will
    have a cache size of 128MiB (~134MB), which stores information required by queries.
    This size works well as a default for local database development, but you may
    find that increasing it will make for faster SELECT performance. Cockroach Labs
    recommends setting the cache size to at least 25% of the machine’s available memory
    for production deployments.


    To update this setting, pass a value to the --cache argument when you start


    your node:


    // Set the cache size to 30% of the node''s total memory:


    $ cockroach start --cache=.30 ...


    $ cockroach start --cache=30% ...


    // Set the cache size to a specific value:


    $ cockroach start --cache=200MB ...


    $ cockroach start --cache=200MiB ...


    Another setting to consider changing is the --max-sql-memory argument, which will
    use 25% of a node’s total memory by default. Increasing this value will allow
    CockroachDB to allocate more memory for aggregation operations like GROUP BY and
    ORDER BY and increase the number of possible concurrent connections to the database,
    easing connection pool contention.


