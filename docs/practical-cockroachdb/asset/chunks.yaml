    ## Multinode Clusters


    Up to this point, we’ve only created single-node, local clusters, which are not
    advised for real-world use cases, as such clusters cannot provide resilience.
    Instead, it’s better to create clusters of at least three nodes to survive a failure
    of one node, or at least five nodes to survive a failure of two nodes.


    The CockroachDB documentation provides guidance on the topologies you’ll need
    to use in order to survive everything from single-node to multiregion failures:

    [www.cockroachlabs.com/docs/stable/disaster-recovery.html](http://www.cockroachlabs.com/docs/stable/disaster-recovery.html)


    There are plenty of ways to install a multinode CockroachDB cluster. A Kubernetes
    `StatefulSet` deployment is one of the more accessible options. It takes care
    of the manual work involved in managing multiple application instances such as
    service discovery and rolling updates. In the previous section on installing via
    Kubernetes, had we been working with a multinode/region cluster, our `StatefulSet`
    would have deployed one CockroachDB node to each of them.


    In this section, we’ll simulate a three-node CockroachDB cluster with the `cockroach`
    binary.


    First, start the three nodes with the following commands:


    ```

    $ cockroach start \

    --insecure \

    --store=node1 \

    --listen-addr=localhost:26257 \

    --http-addr=localhost:8080 \

    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \

    --insecure \

    --store=node2 \

    --listen-addr=localhost:26258 \

    --http-addr=localhost:8081 \

    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \

    --insecure \

    --store=node3 \

    --listen-addr=localhost:26259 \

    --http-addr=localhost:8082 \

    --join=localhost:26257,localhost:26258,localhost:26259

    ```


    Next, initialize the cluster by executing the `init` command against one of the
    nodes:


    ```

    $ cockroach init --insecure --host=localhost:26257

    Cluster successfully initialized

    ```


    Finally, connect to the cluster by executing the `sql` command against one of
    the nodes:


    ```

    $ cockroach sql --insecure --host=localhost:26257


    #

    # Welcome to the CockroachDB SQL shell.

    # All statements must be terminated by a semicolon.

    # To exit, type: \q.

    #

    # Server version: CockroachDB CCL v21.1.7 (x86_64-apple-darwin19, built

    2021/08/09 17:58:36, go1.15.14) (same version as client)

    # Cluster ID: 689b7704-af5d-4527-a638-bad622fff923

    #

    ```'
