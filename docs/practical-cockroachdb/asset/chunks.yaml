  trans: '# 第六章 数据隐私


    2021 年 6 月 28 日，欧洲委员会承认欧洲公民的个人数据可以通过两项充分性决定.4 安全地存储在英国。因此，您可以自由选择将数据存储在英国或欧盟。由于个人数据可以自由流入和流出英国，您在集群架构设计上拥有灵活性：


    -   **在英国处理所有客户数据** – 为降低基础设施成本和复杂性，您可以将集群部署在英国的单个区域内。鉴于英国与欧洲其他地区的邻近性，到中欧的延迟将在
    12 毫秒至 33 毫秒之间（具体取决于您的云提供商）。请访问 `www.cloudping.co/` 查看 `AWS` 区域的延迟网格。

    -   **在欧盟处理所有客户数据** – 与将所有数据存放在英国单个区域可以降低成本和简化基础设施的原因相同，将所有数据存放在欧盟的单个区域也是一个不错的选择。

    -   **一个集群，节点靠近您的用户** – `CockroachDB` 的跨区域水平扩展能力在这种场景下会表现良好。您可以创建一个跨多个区域的数据库节点集群，并将节点部署在客户附近，无论他们身处英国还是欧洲。


    ## 拥有欧洲和美国客户的欧洲公司


    如果您是一家总部位于欧洲的公司，客户分布在欧洲和美国，那么您将同时受到 `GDPR` 和您在美国客户所在州的法规约束。


    由于 `GDPR` 目前比任何美国数据隐私框架（包括 `CCPA`）都更严格，对您的欧洲和美国客户都采用 `GDPR` 标准可能是合理的。


    关于存储数据的位置，您有三个主要选项：


    -   **在欧洲处理所有客户数据** – Schrems II 裁决保护欧洲人免受美国政府监控，因此将美国客户数据存储在欧盟数据中心比将欧盟客户数据存储在美国数据中心更直接。这种方法明显的缺点是，如果美国客户的请求直接访问欧盟数据库节点，他们将面临延迟问题。

    -   **一个具有地理分离节点的集群** – 如果您希望运行单个多区域集群，可以使用地理分区来分离欧盟和美国客户数据。

    -   **多个独立集群** – 如果您更愿意将欧盟和美国客户数据完全隔离，可以运行两个集群：一个在欧盟，一个在美国。


    这些选项各有利弊。在这种情况下，我建议运行一个地理分区集群或多个独立集群。


    ## 拥有美国客户的美国公司


    如果您是一家总部位于美国且只有美国客户的公司，您需要考虑美国各地不同的州法规。


    在撰写本文时，美国使用了三个综合性框架：适用于加利福尼亚州、弗吉尼亚州和科罗拉多州客户的 `CCPA`、`VCDPA` 和 `ColoPA`。每个框架为客户提供不同级别的保护。例如，`VCDPA`
    吸取了亚马逊的意见，因此更有利于企业而非客户。5


    与欧盟/美国示例类似，与其试图遵守数量不断增长且差异巨大的数据隐私框架，不如以遵守最严格的框架为目标。我们已确定 `VCDPA` 不是以客户为中心的框架，所以
    `CCPA` 将是更严格的框架，但 `ColoPA` 呢？`CCPA` 赋予客户 *某些* 就数据处理疏忽起诉公司的权利，但 `ColoPA` 没有提供此类权利。


    对加利福尼亚州以外的客户适用 `CCPA` 是合理的，理由与对美国客户适用 `GDPR` 相同；它是更严格的数据隐私框架。


    ## 拥有美国和欧洲客户的美国公司


    2020 年 7 月 16 日，Schrems II 裁决生效。6 It 认定根据《外国情报监视法》(`FISA`) 进行的美国政府监控的可能性对欧盟公民的数据隐私构成了足够大的威胁，从而废除了之前适用的欧盟-美国数据保护盾协议。


    因此，希望存储欧盟客户数据的美国公司必须遵守 `GDPR` 法规。鉴于此，在这种情况下分离美国和欧盟客户数据是明智之举。如果我们需要在美国对数据进行任何分析处理，可以获取欧盟客户数据的匿名副本并将其存储在美国是可以接受的。


    我们可以设计多种合规的数据库基础设施来应对这种情况。让我们回顾两个选项：


    -   **多个独立集群** – 这是在此场景下最安全的操作方式，因为集群信息、凭据和证书保持分离。

    -   **一个具有地理分离节点的集群** – 除了分离节点，我们还可以实施一种机制来防止欧盟数据离开欧洲。这可以简单地是一个视图，该视图仅允许美国服务访问美国数据。


    ## 拥有中国客户的非中国公司


    2021 年 11 月 1 日，中国实施了其首个综合性数据隐私框架——《个人信息保护法》(`PIPL`)。与 `CCPA` 类似，`PIPL` 借鉴了 `GDPR`，但不同于关注个人权利和消费者权利的
    `GDPR` 和 `CCPA`，`PIPL` 更侧重于国家安全.7


    希望存储中国客户数据的公司必须在中国境内进行存储。对我们来说，这意味着在中国运行 `CockroachDB` 节点。任何需要在境外处理中国客户数据的公司，在处理前必须通过国家安全审查.8


    除非您是中国企业，否则在中国托管基础设施并非易事。拥有 `AWS` 账户不足以将软件部署到中国。您需要在中国的 `AWS` 站点 `amazonaws.cn`
    上创建一个单独的账户，并提供信息安全标识和商业登记证书。


    为了在中国大陆实际托管站点，公司必须拥有一家注册的中国公司并完成 `ICP`（互联网内容提供商）商业许可证。9


    ## 个人身份信息


    个人身份信息 (`PII`) 是向处理不当的公司开具巨额罚单的“黄金门票”。虽然 `PII` 的定义可能因国家/地区而异，但您可以将其视为任何可能识别某人身份的个人信息。例如，姓名、地址以及财务和地理信息都可用于识别某人。'
- fmt: 'Here is a nonexhaustive list of PII storage considerations:


    - Payment information – Your responsibilities to customers will be far greater
    if you store their financial information, not to mention your compliance requirements.
    Try to delegate the responsibility of storing payment information to a payment
    provider if you have one.


    - Names – Names are perhaps the most obvious way to identify someone. You might
    need to store a user''s name to contact them, process a payment, or make a delivery
    to them. If your website doesn''t need to store their name (or their full name),
    keep this to a minimum.


    - Contacting customers – If a user does not permit you to contact them, consider
    obfuscating their email address, so it''s impossible to email them. This could
    be as simple as hashing their email address, a process that would still allow
    you to re-hash and verify their email address at login without having it stored
    in plaintext.


    ## Encryption


    With global regulations and PII considered, the next line of defense for data
    is encryption. Properly implemented, encryption makes it all but impossible for
    a bad actor to understand and use your data for malicious purposes. In this section,
    we''ll cover data encryption in CockroachDB.


    At a high level, there are two areas to focus on when using encryption:


    - Data in transit – This concerns data travelling between nodes and end users
    or between nodes.

    - Data at rest – This concerns data stored on a physical disk.


    CockroachDB provides two ways of doing this, and I''ll introduce you to both.


    ### In Transit


    By default, CockroachDB will attempt to start securely and look for certificates
    and keys to use on startup. If you try to run the following command without generating
    certificates or keys, CockroachDB will fail to start:


    ```bash

    $ cockroach start-single-node

    *

    * ERROR: ERROR: cannot load certificates.

    * Check your certificate settings, set --certs-dir, or use --insecure for insecure
    clusters.

    *

    * failed to start server: problem using security settings: no certificates found;
    does certs dir exist?

    *

    ...

    ```


    Up to this point, my focus has been to demonstrate runtime CockroachDB features,
    so I''ve been using the `--insecure` flag to bypass this check and run the database
    insecurely. For anything other than a local installation of CockroachDB for development
    purposes, you should by securing your cluster with certificates. Let''s do that
    now.


    First, create two directories: one to store certificates and one to store keys.
    Note that once CockroachDB has generated certificates and keys, both of these
    directories will contain sensitive information:


    ```bash

    $ mkdir certs

    $ mkdir keys

    ```


    Next, we''ll ask CockroachDB to generate a Certificate Authority (CA) certificate
    and a private key. We''ll use these files to create certificates for nodes in
    subsequent steps:


    ```bash

    $ cockroach cert create-ca \

    --certs-dir=certs \

    --ca-key=keys/ca.key

    ```


    ```bash

    $ ls certs

    ca.crt

    $ ls keys

    ca.key

    ```


    Next, we''ll ask CockroachDB to generate a certificate and a public/private key
    pair for the cluster nodes:


    ```bash

    $ cockroach cert create-node \

    --certs-dir=certs \

    --ca-key=keys/ca.key \

    localhost

    ```


    ```bash

    $ ls certs

    ca.crt node.crt node.key

    $ ls keys

    ca.key

    ```


    The `cockroach cert create-node` command earlier takes a variadic set of host
    arguments to aid in node discovery. I''m running everything locally in this example,
    so passing a single value of `localhost` is sufficient.


    Now let''s start some CockroachDB nodes using the certificate and key we generated.
    Previously, CockroachDB returned an error when we attempted to do this, but now
    we have the files it requires to start securely, so it will start without issue:


    ```bash

    $ cockroach start \

    --certs-dir=certs \

    --store=node1 \

    --listen-addr=localhost:26257 \

    --http-addr=localhost:8080 \

    --join=localhost:26257,localhost:26258,localhost:26259

    ```


    ```bash

    $ cockroach start \

    --certs-dir=certs \

    --store=node2 \

    --listen-addr=localhost:26258 \

    --http-addr=localhost:8081 \

    --join=localhost:26257,localhost:26258,localhost:26259

    ```


    ### Data at Rest'
