    address includes addresses from 10.0.1.0 to 10.0.1.255\. On the other hand, the
    10.0.1.1/32 address has a mask of /32, which means “this IP address only,” meaning
    we have a specific IP address, and the mask is superfluous. The same holds for
    the IPv6


    addresses, where a /128 means “this IP address only.”


    **INTERVAL**


    The INTERVAL data type stores durations ranging from microseconds to years and
    is created as follows:


    CREATE TABLE rodeo_records (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    duration


    INTERVAL NOT NULL


    );


    You can provide durations as ISO 8601 strings, time strings, and seconds. Selecting
    the rows out of the table reveals how the values are stored and how you can cast
    them to seconds:


    INSERT


    INTO rodeo_records (duration)


    VALUES


    (''10:45:00.0''), *-- Time string*


    (''1h30m''), *-- ISO 8601 string*


    (30::INTERVAL); *-- Seconds*


