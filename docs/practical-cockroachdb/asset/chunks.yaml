    • You need to insert a lot of data quickly.


    • You need to insert data outside of your application’s typical insert


    workflow. In this instance, having a process for importing data from


    files might make sense.


    **Watching for Database Changes**


    Like Postgres, CockroachDB supports Change Data Capture (CDC), which allows you
    to stream changes to table data out of CockroachDB and into external systems.


    In this section, we’ll create an Enterprise Changefeed and stream data changes
    out of a table. Changefeeds are available in both Enterprise and Core clusters,
    but the creation syntax and behaviors are slightly different.


    **Kafka Sink**


    The Kafka CDC sink was the first to appear in CockroachDB, making its first appearance
    in v2.1.'
