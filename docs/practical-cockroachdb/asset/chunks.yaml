    for raw materials, and finance would like to capture transactions made on company
    cards as orders.


    # Chapter 5 Interacting with CockroachDB


    Let’s create a database with some schemas to see how we might harness schema design
    to give us a flexible system. First, we’ll create a database:


    ```

    CREATE DATABASE IF NOT EXISTS acme;


    USE acme;

    ```


    Next, we’ll create some users to represent people in each of the three business
    areas:


    ```

    CREATE USER IF NOT EXISTS retail_user;


    CREATE USER IF NOT EXISTS manufacturing_user;


    CREATE USER IF NOT EXISTS finance_user;

    ```


    Finally, we’ll create some schemas. The following statements create three schemas,
    one for each business area. For the retail and manufacturing schemas, we’ll give
    access to the finance user, as they will need to view data from tables in both
    schemas:


    ```

    CREATE SCHEMA retail AUTHORIZATION retail_user;


    GRANT USAGE ON SCHEMA retail TO finance_user;


    CREATE SCHEMA manufacturing AUTHORIZATION manufacturing_user;


    GRANT USAGE ON SCHEMA manufacturing TO finance_user;


    CREATE SCHEMA finance AUTHORIZATION finance_user;

