    Let’s start this section by understanding the client-side interactions and how
    they result in database calls. We’ll do this by listing the interactions in descending
    order of expected call frequency:


    • **Fetch all products** – This will invoke a fairly simple SELECT


    statement once per call. This statement could potentially return a lot


    of data.


    • **Fetch a customer** – This will invoke a simple SELECT statement


    once per call. This request uses a primary key index, so it’s inherently


    optimized.


    • **Fetch customer orders** – This will invoke a simple SELECT statement using
    three joins.


    Chapter 8 testing


    • **Create a customer** – This will invoke a simple INSERT statement


    once per new customer.


    • **Create an order** – Like the request to create a product, this will


    invoke at least one INSERT statement and a subsequent INSERT


    statement of each product ordered. All within a simple transaction.


    • **Create a product** – This will invoke at least one INSERT statement


    and a subsequent INSERT statement for each product price. All


    within a simple transaction.


    I’ll us[e k6,3](#index_split_002.html#p205) an open source load testing tool written
    in Go, and JavaScript scriptable, to simulate these transactions.


    To keep things light, I’ll implement just two k6 scripts. For the sake of brevity,
    I won’t spend time simulating accurate user behavior:


    • **products.js** – A script to insert multiple random products into the database
    via the API


    • **customers.js** – A script to simulate a user browsing for products,


    placing an order, then checking the status of their order


    First, let’s create the products.js script to simulate a user creating products.
    This script will


    • Make a POST request to the /products endpoint with a JSON body


    representing a product with a random name, SKU, and an active,


    random price


    • Fail if the response status is not 200 (success)


    • Fail if after running all of the test iterations, the error rate was greater
    than 1% or the request duration for the 95% percentile was greater


    than 100ms


    import http from ''k6/http'';


    import { check } from ''k6'';


    import { randomString, randomIntBetween } from ''https://jslib.k6.io/k6-


    utils/1.1.0/index.js'';


    3 [https://k6.io](https://k6.io)


    Chapter 8 testing


    const BASE_URL = ''http://localhost:3000'';


    export const options = {


    thresholds: {


    http_req_failed: [''rate<0.01''],


    http_req_duration: [''p(95)<100''],


    }


    };


    export default() => {


    const createResponse = http.post(


    `${BASE_URL}/products`,


    JSON.stringify({


    name: ''Name '' + randomString(16),


    sku: ''SKU '' + randomString(10),


    prices: [


    {


    amount: randomIntBetween(1, 100),


    start_date: addDays(new Date(), -10),


    end_date: addDays(new Date(), 10),


    }


    ]


    }),


    { headers: {''Content-Type'': ''application/json''} }


    );


    check(createResponse, { ''create product response'': (r) => r.status


    === 200 });


    };


    function addDays(date, days) {


    date.setDate(date.getDate() + days);


    return date;


    }


    Chapter 8 testing


    Now, let’s create the customers.js script to simulate a customer using the database
    via the API. This script will


    • Make a POST request to the /customers endpoint with a JSON body


    that represents a customer with a random full_name and email


    • Fail if the response status from creating the customer is not 200


    (success)


    • Capture the customer’s ID from the response body JSON and pass it'
  trans: '

    ## 非功能性测试


    非功能性测试旨在验证数据库是否满足各种*“性”*能要求：可靠性、可扩展性等。本节将介绍在集成 CockroachDB 时你可能遇到的一些最常见的非功能性测试类型。


    ## 性能测试


    要从性能测试中获得价值，我们首先必须了解应用程序将如何使用我们的数据库。哪些表会被最频繁使用？调用它们会产生什么影响？是否存在导致大量数据库调用的客户端交互？


    让我们从了解客户端交互及其如何导致数据库调用开始本节内容。我们将通过按预期调用频率降序列出这些交互来完成：


    • **获取所有产品** – 这将每次调用触发一个相当简单的 `SELECT` 语句。该语句可能会返回大量数据。


    • **获取一个客户** – 这将每次调用触发一个简单的 `SELECT` 语句。此请求使用主键索引，因此本质上是优化的。


    • **获取客户订单** – 这将触发一个使用了三个连接（join）的简单 `SELECT` 语句。


    • **创建客户** – 这将为每个新客户触发一次简单的 `INSERT` 语句。


    • **创建订单** – 与创建产品的请求类似，这将触发至少一个 `INSERT` 语句，以及针对所订购的每个产品的后续 `INSERT` 语句。所有这些都在一个简单的事务中完成。


    • **创建产品** – 这将触发至少一个 `INSERT` 语句，以及针对每个产品价格的后续 `INSERT` 语句。所有这些都在一个简单的事务中完成。


    我将使用 `k6`（一个用 Go 和 JavaScript 编写、可编写脚本的开源负载测试工具）来模拟这些事务。


    为了简化，我只实现两个 `k6` 脚本。为了简洁起见，我不会花时间模拟准确的用户行为：


    • **products.js** – 一个通过 API 将多个随机产品插入数据库的脚本


    • **customers.js** – 一个模拟用户浏览产品、下订单然后检查其订单状态的脚本


    首先，让我们创建 `products.js` 脚本来模拟用户创建产品。该脚本将


    • 向 `/products` 端点发送一个 `POST` 请求，其 JSON 主体代表一个产品，包含随机名称、`SKU` 和一个有效的、随机价格


    • 如果响应状态不是 `200`（成功），则判定失败


    • 如果在运行完所有测试迭代后，错误率大于 1%，或 95% 百分位的请求持续时间大于 100 毫秒，则判定失败


    ```javascript

    import http from ''k6/http'';

    import { check } from ''k6'';

    import { randomString, randomIntBetween } from ''https://jslib.k6.io/k6-utils/1.1.0/index.js'';


    const BASE_URL = ''http://localhost:3000'';


    export const options = {

    thresholds: {

    http_req_failed: [''rate<0.01''],

    http_req_duration: [''p(95)<100''],

    }

    };


    export default() => {

    const createResponse = http.post(

    `${BASE_URL}/products`,

    JSON.stringify({

    name: ''Name '' + randomString(16),

    sku: ''SKU '' + randomString(10),

    prices: [

    {

    amount: randomIntBetween(1, 100),

    start_date: addDays(new Date(), -10),

    end_date: addDays(new Date(), 10),

    }

    ]

    }),

    { headers: {''Content-Type'': ''application/json''} }

    );


    check(createResponse, { ''create product response'': (r) => r.status === 200 });

    };


    function addDays(date, days) {

    date.setDate(date.getDate() + days);

    return date;

    }

    ```


    现在，让我们创建 `customers.js` 脚本来模拟一个客户通过 API 使用数据库。该脚本将


    • 向 `/customers` 端点发送一个 `POST` 请求，其 JSON 主体代表一个客户，包含随机的 `full_name` 和 `email`


    • 如果创建客户的响应状态不是 `200`（成功），则判定失败


    • 从响应体 `JSON` 中捕获客户 ID 并传递它

    '
- fmt: "# Chapter 8 Testing\n\n## Test Scenario Overview\n\n进入迭代循环后，在循环内部，我们：\n\n\
    *   向 `/products` 端点发出两次 GET 请求，以模拟顾客浏览商品。\n*   第三次向 `/products` 端点发出 GET 请求，但这次捕获一个产品数组。\n\
    *   从产品数组中随机选择一个产品。\n*   向 `/orders` 端点发出一个 POST 请求，请求体是一个表示顾客订单和产品的 JSON。\n*\
    \   向 `/customers/{id}/orders` 端点发出两次 GET 请求，以模拟顾客查看其订单状态。\n*   如果在所有测试迭代运行完毕后，错误率大于\
    \ 1% 或 95% 百分位的请求时长大于 200 毫秒，则测试失败。\n\n## Test Script\n\n```javascript\nimport\
    \ http from 'k6/http';\nimport { check, group } from 'k6';\nimport { randomString,\
    \ randomItem } from 'https://jslib.k6.io/k6-utils/1.1.0/index.js';\n\nconst BASE_URL\
    \ = 'http://localhost:3000';\n\nexport const options = {\n  thresholds: {\n  \
    \  http_req_failed: ['rate<0.01'],\n    http_req_duration: ['p(95)<200'],\n  }\n\
    };\n\nexport function setup() {\n  const name = randomString(16);\n  const createResponse\
    \ = http.post(\n    `${BASE_URL}/customers`,\n    JSON.stringify({\n      full_name:\
    \ 'Full Name ' + name,\n      email: name + `@acme.com`\n    }),\n    { headers:\
    \ {'Content-Type': 'application/json'} }\n  );\n\n  check(createResponse, { 'create\
    \ customer response': (r) => r.status === 200 });\n  return createResponse.json('id');\n\
    }\n\nexport default (id) => {\n  group('make order', () => {\n    `// Simulate\
    \ a customer browsing before placing an order.`\n    http.batch([\n      ['GET',\
    \ `${BASE_URL}/products`, null],\n      ['GET', `${BASE_URL}/products`, null],\n\
    \    ]);\n\n    `// Make a request and capture the response to extract a random\
    \ product to buy.`\n    const productsResponse = http.get(\n      `${BASE_URL}/products`,\n\
    \    );\n    const product = randomItem(productsResponse.json());\n    const productId\
    \ = product.id;\n    const priceId = product.prices[0].id;\n\n    `// Place order.`\n\
    \    http.post(\n      `${BASE_URL}/orders`,\n      JSON.stringify({\n       \
    \ customer_id: id,\n        products: { [productId]: priceId },\n      }),\n \
    \     { headers: {'Content-Type': 'application/json'} }\n    );\n  });\n\n  `//\
    \ Simulate a customer checking their order status.`\n  group('check orders', ()\
    \ => {\n    http.batch([\n      ['GET', `${BASE_URL}/customers/${id}/orders`,\
    \ null],\n      ['GET', `${BASE_URL}/customers/${id}/orders`, null],\n    ]);\n\
    \  });\n};\n```\n\n## Running the Simulation\n\n现在是运行模拟的时候了。首先，让我们启动 `products.js`\
    \ 脚本并让它运行十秒。由于不会有太多人进入产品页面，我将模拟只有一个用户浏览产品（每秒五个产品；我可没说他们是普通人）。\n\n```bash\n$ k6\
    \ -u 1 -d 10m --rps 5 run products.js\n```\n\n```\nrunning (10.0s), 0/1 VUs, 51\
    \ complete and 0 interrupted iterations\ndefault ✓ [======================================]\
    \ 1 VUs 10s\n✓ create product response\nchecks.........................: 100.00%\
    \ ✓ 51 ✗ 0\ndata_received..................: 8.2 kB 818 B/s\ndata_sent......................:\
    \ 15 kB 1.5 kB/s\n✓ http_req_duration..............: avg=41.36ms min=24.43ms med=37.63ms\
    \ max=114.66ms p(90)=67.91ms p(95)=77.02ms\n{ expected_response:true }...: avg=41.36ms\
    \ min=24.43ms med=37.63ms max=114.66ms p(90)=67.91ms p(95)=77.02ms\n✓ http_req_failed................:\
    \ 0.00% ✓ 0 ✗ 51\niterations.....................: 51 5.077393/s\nvus............................:\
    \ 1 min=1 max=1\nvus_max........................: 1 min=1 max=1\n```\n\n在它运行的同时，我们将启动\
    \ `customers.js` 脚本并让它运行十秒。我现在只模拟两个顾客，他们会尽快完成整个场景：\n\n```bash\n$ k6 -u 2 -d 10s\
    \ run customer.js\n```\n\n```\nrunning (10.0s), 0/2 VUs, 55 complete and 0 interrupted\
    \ iterations\ndefault ✓ [======================================] 2 VUs 10s\n█\
