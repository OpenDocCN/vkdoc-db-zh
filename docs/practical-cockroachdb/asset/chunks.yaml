    Now let’s create a cluster to simulate the Regional Tables topology. In this example,
    we’ll create a nine-node cluster that’s capable of surviving regional outages.
    We’ll reuse the start commands from the “Multiregion Clusters” section in Chapter
    [2](https://doi.org/10.1007/978-1-4842-8224-3_2) to save repetition.


    Next, we’ll set up our database and regions (note that an Enterprise license is
    required for geo-partitioning):


    CREATE DATABASE topologies_demo;


    USE topologies_demo;


    ALTER DATABASE "topologies_demo" PRIMARY REGION "us-east1"; ALTER DATABASE "topologies_demo"
    ADD REGION "us-central1"; ALTER DATABASE "topologies_demo" ADD REGION "us-west1";


    ALTER DATABASE "topologies_demo" SURVIVE REGION FAILURE;


    With the cluster up and running, let’s create two tables: one that’s completely
    regional (i.e., all data remains in one region) and another whose rows will be
    pinned to different regions. First, we’ll create the regional table and insert
    a single row into it: CREATE TABLE example_regional_table(


    id UUID PRIMARY KEY DEFAULT gen_random_uuid()


    );


    ALTER TABLE example_regional_table SET LOCALITY REGIONAL BY TABLE IN


    "us- central1";


    INSERT INTO example_regional_table DEFAULT VALUES;


    Next, we’ll create the table that’s regional by row and insert three rows into
    it, one for each region:


    CREATE TABLE example_regional_rows (


    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),


    city TEXT NOT NULL,


    crdb_region crdb_internal_region NOT NULL AS (


    CASE


    WHEN city IN (''Charleston'', ''Columbia'', ''North Charleston'') THEN


    ''us-east1''


    ChApTEr 7 DEploymENT TopologiEs


    WH EN city IN (''Des Moines'', ''Cedar Rapids'', ''Davenport'') THEN


    ''us- central1''


    WHEN city IN (''Portland'', ''Eugene'', ''Salem'') THEN ''us-west1''


    ELSE ''us-central1''


    END


    ) STORED


    );


    ALTER TABLE example_regional_rows SET LOCALITY REGIONAL BY ROW;


    INSERT into example_regional_rows (city)


    VALUES


    (''Charleston''),


    (''Des Moines''),


    (''Portland'');


