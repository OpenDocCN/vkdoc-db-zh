  trans: "\n# 第八章 测试\n\n结构测试的目标之一是验证所设计的数据库结构及其对象是否满足业务需求。因此，我不会预先创建大量表，而是逐一审查每个对象，并详细说明我对每个数据库对象的设计决策。请记住，这个业务场景（以及所有数据库对象）是虚构的，并非生产就绪；最终得到的数据库将是最基本的骨架。\n\
    \n让我们从创建数据库开始。公司名为 Bean About Town（纯属虚构，尽管快速搜索显示伦敦至少有三家精明的公司有同样的想法）。对于接下来的命令，我们将使用\
    \ root 用户。让我们打开一个 CockroachDB shell 并创建数据库 `bean_about_town`。我们将把所有数据库对象都安排在这个数据库下：\n\
    \n```\n$ cockroach sql \\\n--certs-dir=certs\n\nCREATE DATABASE bean_about_town;\n\
    USE bean_about_town;\n```\n\n数据库将有三个主要用户组：客户、咖啡烘焙部门成员和会计部门成员。让我们创建三个具有简单密码的用户，以确保权限和特权得到合理的隔离。\n\
    \n我们将有一个可以访问面向客户表的 `retail_user`，一个可以访问烘焙相关表的 `roasting_user`，以及一个可以访问账目相关表的 `finance_user`：\n\
    \n```\nCREATE USER retail_user WITH LOGIN PASSWORD '7efd7222dfdfb107';\nCREATE\
    \ USER roasting_user WITH LOGIN PASSWORD '9389884141ecaf04';\nCREATE USER finance_user\
    \ WITH LOGIN PASSWORD 'a02308ce58c92131';\n```\n\n在整个业务中，我们将处理不同类型订单的创建和接收：\n\n\
    -   `Retail` – 接收客户订单。\n-   `Roasting` – 为原材料下采购订单，并接收来自业务零售端（例如，一个履行在线订单的仓库需要烘焙咖啡豆）的订单。为简单起见，在此示例中，我们只为采购订单创建表。\n\
    -   `Finance` – 将客户订单与在线销售对账，并将烘焙订单与公司库存对账。我们暂时忽略财务部门为其所需物品下采购订单的需求。\n\n了解到我们需要概念化多种订单类型，很明显，创建\
    \ schema 将简化此过程。现在让我们创建一些 schema 和数据库对象。为简化起见，我不会创建 `roasting` 或 `finance` schema，因为仅通过\
    \ `retail` schema 我们就可以涵盖各种类型的测试。\n\n现在让我们创建 `retail` schema。`retail` schema 将保存与业务零售操作相关的所有数据库对象：\n\
    \n```\nCREATE SCHEMA retail AUTHORIZATION retail_user;\n```\n\n接下来，我们将创建一个表来保存客户信息：\n\
    \n```\nCREATE TABLE retail.customer (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
    \    full_name STRING(255) NOT NULL,\n    email STRING(320) NOT NULL,\n    join_date\
    \ TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n```\n\n关键设计决策：\n\n-   `客户姓名` – 并非每个人都有名和姓，因此与其要求分别提供名和姓，不如考虑直接要求提供客户的全名。\n\
    -   `join_date` – 处理时区时值得问的一个问题是，是否需要按用户时间还是系统时间捕获时间戳。如果是用户时间，使用 `TIMESTAMPTZ`\
    \ 数据类型是有意义的，因为这允许我们提供特定用户时区的时间。\n\n接下来，我们将创建一个表来保存产品信息：\n\n```\nCREATE TABLE retail.product\
    \ (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    name STRING(100)\
    \ NOT NULL,\n    sku STRING(16) NOT NULL\n);\n```\n\n关键设计决策：\n\n-   `用户体验 (UX)`\
    \ – 与订单表一样，考虑公司内部用户的体验很重要。如果使用库存单位 (SKU) 来标识产品，请确保它们易于使用和记忆。\n\n我们不会将价格与产品存储在一起，而是创建一种允许产品价格随时间变化的方法。例如，客户可能在促销期间购买产品。如果他们稍后要求退款，企业不能因按非促销价退款而亏本。\n\
    \n以下表格是历史价格的基本实现：\n\n```\nCREATE TABLE retail.product_price (\n    id UUID PRIMARY\
    \ KEY DEFAULT gen_random_uuid(),\n    product_id UUID NOT NULL REFERENCES retail.product(id),\n\
    \    amount DECIMAL NOT NULL,\n    start_date TIMESTAMPTZ NOT NULL,\n    end_date\
    \ TIMESTAMPTZ\n);\n```\n\n关键设计决策：\n\n-   `简单性` – 为保持简单明了，企业决定只处理一种货币。因此，我目前不会明确存储货币。\n\
    -   `正确性` – 对于应使用小数还是整数来存储货币价值，存在不同的观点。如果使用浮点数进行计算，可能会出现舍入错误，因此有些人更喜欢使用整数，并且仅在代码中临时转换为小数进行计算。这样，他们可以控制小数的舍入方式。由于我不会执行任何计算，我决定保持简单，使用小数。\n\
    -   `灵活性` – 通过将产品价格存储在产品表之外，我们在定价方面有了灵活性。通过包含价格的 `start_date` 和 `end_date`，我们可以安排价格变更，而无需手动更新它们。\n\
    \n接下来，我们将创建一个表来保存客户订单信息：\n\n```\nCREATE TABLE retail.order (\n    id UUID PRIMARY\
    \ KEY DEFAULT gen_random_uuid(),\n    reference STRING(16) NOT NULL,\n    customer_id\
    \ UUID NOT NULL REFERENCES retail.customer(id),\n    delivery_instructions STRING(255),\n\
    \    order_date TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n```\n\n关键设计决策：\n\n-  \
    \ `用户体验 (UX)` – 考虑一下如果用户看到 UUID 订单号时的体验。如果他们在联系客服时需要输入或说出一个 UUID，这可能会损害他们的体验。因此，请为他们创建简短、易于阅读的标识符。\n\
    \n每个订单可以包含多个产品，每个产品可以出现在多个订单中。我们将通过第三张表来解决这个多对多关系：\n\n```\nCREATE TABLE retail.product_order\
    \ (\n    order_id UUID NOT NULL REFERENCES retail.order(id),\n    product_id UUID\
    \ NOT NULL REFERENCES retail.product(id),\n    product_price_id UUID NOT NULL\
    \ REFERENCES retail.product_price(id)\n);\n```\n\n在与财务部门沟通后，我们了解到他们团队的成员需要能够访问\
    \ `retail` schema 中的对象，以便生成日终报告等。目前，如果他们尝试访问 `retail` schema 的对象，他们将看不到任何内容：\n\
    \n```\n$ cockroach sql \\\n--certs-dir=certs \\\n--url \"postgres://finance_user:a02308ce58c92131@localhost:26257/bean_about_town\"\
    \ \\\n--execute \"SELECT COUNT(*) FROM retail.order\"\n\nERROR: user finance_user\
    \ does not have SELECT privilege on relation order\n```\n\n授予他们对 `retail` schema\
    \ 对象的 `USAGE` 和 `SELECT` 权限将解决此问题：\n\n```\nGRANT SELECT, INSERT, UPDATE, DELETE\
    \ ON retail.* TO retail_user;\nGRANT SELECT ON retail.* TO retail_user;\nGRANT\
    \ USAGE ON SCHEMA retail TO finance_user;\nGRANT SELECT ON retail.* TO finance_user;\n\
    ```\n\n## 功能测试\n\n功能测试验证数据库是否满足业务需求和用例。我们可以从用户角度（黑盒）或凭借对数据库的深入理解和直接访问（白盒）运行功能测试。我们现在将逐一介绍每种测试类型。\n\
    \n为避免复杂性失控，我将测试范围限制在覆盖 `retail` schema。\n\n### 黑盒测试\n"
- fmt: "Black Box testing tests the database from a user’s perspective. No assumptions\
    \ are made as to the database’s internal structure, so tests can either happen\
    \ via a UI or an API. I’ll provide a simple API to abstract us from the database,\
    \ as we don’t have either. I’ll use the Crystal driver from [Chapter 5](https://doi.org/10.1007/978-1-4842-8224-3_5)\
    \ to keep things succinct.\n\nBefore we begin, let’s take a look at the use cases\
    \ we’ll need to implement for this test:\n\n*   `Create customer` – Insert a new\
    \ customer into the database and return their ID.\n*   `Get customer` – Select\
    \ a customer from the database by their ID.\n*   `Create Product with prices`\
    \ – Insert a product and a collection of prices for it.\n*   `Get products` –\
    \ Select a list of every product in the database.\n*   `Place order` – Insert\
    \ a customer order for a list of products.\n\n## Create a Simple Application\n\
    \nFirst, create the scaffolding for the application with the following commands:\n\
    \n```\ncrystal init app api\ncd api\n```\n\nNext, bring in the dependencies we’ll\
    \ need for this application by adding them to the `shard.yml` file and installing\
    \ them:\n\n```\ndependencies:\n  kemal:\n    github: kemalcr/kemal\n  pg:\n  \
    \  github: will/crystal-pg\nshards install\n```\n\nWith the dependencies installed,\
    \ we’re ready to write our API. As with the example code from [Chapter 5](https://doi.org/10.1007/978-1-4842-8224-3_5),\
    \ this code is nowhere near production quality and is provided to act as a mechanism\
    \ for Black Box testing.\n\nLet’s start by importing some modules:\n\n```\nrequire\
    \ \"kemal\"\nrequire \"db\"\nrequire \"pg\"\nrequire \"json\"\nrequire \"uuid\"\
    \nrequire \"uuid/json\"\n```\n\nNext, we’ll create a connection to the database.\
    \ Note that this connection will be in cleartext, which is not what you’d want\
    \ for production use cases:\n\n```\ndb = PG.connect \"postgres://retail_user:7efd7222dfdfb107@localhost:26257/bean_about_town?auth_methods=cleartext\"\
    \n```\n\nNow we’re ready to wire up our API handlers. Let’s start with a filter\
    \ middleware handler that will attach a JSON `Content-Type` header to all responses.\
    \ This will run before all of our handers execute and will add the correct `Content-Type`\
    \ header to all responses:\n\n```\nbefore_all do |env|\n  env.response.content_type\
    \ = \"application/json\"\nend\n```\n\nNext, we’ll add a `POST` request handler\
    \ to insert customers. This handler will\n\n*   Read `full_name` and `email` string\
    \ values from a JSON request body\n*   Insert them into the `retail.customer`\
    \ table\n*   Return the customer’s ID and `join_date`\n\n```\npost \"/customers\"\
    \ do |env|\n  full_name = env.params.json[\"full_name\"].as(String)\n  email =\
    \ env.params.json[\"email\"].as(String)\n  id, join_date = db.query_one \"INSERT\
    \ INTO retail.customer (full_name, email) VALUES ($1, $2) RETURNING id, join_date\"\
    , full_name, email, as: { UUID, Time }\n  { \"id\": id, \"join_date\": join_date\
    \ }.to_json\nend\n```\n\nNext, we’ll add a `GET` request handler to select customers\
    \ by their IDs. This handler will\n\n*   Read an ID from the request URL path\n\
    *   Select a customer out of the database with a matching ID\n*   Return a JSON\
    \ object that represents the user\n\n```\nget \"/customers/:id\" do |env|\n  id\
    \ = env.params.url[\"id\"]\n  full_name, email, join_date = db.query_one \"SELECT\
    \ full_name, email, join_date FROM retail.customer WHERE id = $1 LIMIT 1\", id,\
    \ as: { String, String, Time }\n  { \"id\": id, \"full_name\": full_name, \"email\"\
    : email, \"join_date\": join_date }.to_json\nend\n```\n\nNow we’ll move onto products.\
    \ Let’s add a `POST` request endpoint to insert a product and its prices. This\
    \ handler will\n\n*   Parse a product object from the request body\n*   Begin\
    \ a transaction that will\n    *   Insert a product into the `product` table\n\
    \    *   Insert the prices for that product into the `produce_price` table\n*\
    \   Commit the transaction\n*   Return the product’s ID\n\nAs we’re reading an\
    \ object from the request, I’ve created two classes: a `Product` class that will\
    \ hold the top-level information of the product and a `ProductPrice` class that\
    \ will contain a single, optionally expirable price for that product.\n\n```\n\
    class Product\n  include JSON::Serializable\n  def initialize(@name : String,\
    \ @sku : String)\n    @prices = Array(ProductPrice).new\n  end\n```"
  raw: 'Black Box testing tests the database from a user’s perspective. No assumptions
    are made as to the database’s internal structure, so tests can either happen via
    a UI or an API. I’ll provide a simple API to abstract us from the database, as
    we don’t have either. I’ll use the Crystal driver from Chapt[er 5](https://doi.org/10.1007/978-1-4842-8224-3_5)
    to keep things succinct.


    Before we begin, let’s take a look at the use cases we’ll need to implement for
    this test:


    • **Create customer** – Insert a new customer into the database and


    return their ID.


    • **Get customer** – Select a customer from the database by their ID.


    Chapter 8 testing


    • **Create Product with prices** – Insert a product and a collection of


    prices for it.


    • **Get products** – Select a list of every product in the database.


    • **Place order** – Insert a customer order for a list of products.


    **Create a Simple Application**


    First, create the scaffolding for the application with the following commands:
    $ crystal init app api


    $ cd api


    Next, bring in the dependencies we’ll need for this application by adding them
    to the shard.yml file and installing them:


    dependencies:


    kemal:


    github: kemalcr/kemal


    pg:


    github: will/crystal-pg


    $ shards install


    With the dependencies installed, we’re ready to write our API. As with the example
    code from Chapt[er 5](https://doi.org/10.1007/978-1-4842-8224-3_5), this code
    is nowhere near production quality and is provided to act as a mechanism for Black
    Box testing.


    Let’s start by importing some modules:


    require "kemal"


    require "db"


    require "pg"


    require "json"


    require "uuid"


    require "uuid/json"


    Next, we’ll create a connection to the database. Note that this connection will
    be in cleartext, which is not what you’d want for production use cases:


    db = PG.connect "postgres://retail_user:7efd7222dfdfb107@localhost:26257/


    bean_about_town?auth_methods=cleartext"


    Chapter 8 testing


    Now we’re ready to wire up our API handlers. Let’s start with a filter middleware
    handler that will attach a JSON Content-Type header to all responses. This will
    run before all of our handers execute and will add the correct Content-Type header
    to all responses:


    before_all do |env|


    env.response.content_type = "application/json"


    end


    Next, we’ll add a POST request handler to insert customers. This handler will


    • Read full_name and email string values from a JSON request body


    • Insert them into the retail.customer table


    • Return the customer’s ID and join_date


    post "/customers" do |env|


    full_name = env.params.json["full_name"].as(String)


    email = env.params.json["email"].as(String)


    id, join_date =


    db.query_one "INSERT INTO retail.customer (full_name, email)


    VALUES ($1, $2)


    RETURNING id, join_date", full_name, email, as: {


    UUID, Time }


    { "id": id, "join_date": join_date }.to_json


    end


    Next, we’ll add a GET request handler to select customers by their IDs. This handler
    will


    • Read an ID from the request URL path


    • Select a customer out of the database with a matching ID


    • Return a JSON object that represents the user


    get "/customers/:id" do |env|


    id = env.params.url["id"]


    full_name, email, join_date =


    Chapter 8 testing


    db.query_one "SELECT full_name, email, join_date FROM retail.customer


    WHERE id = $1


    LIMIT 1", id, as: { String, String, Time }


    { "id": id, "full_name": full_name, "email": email, "join_date": join_


    date }.to_json


    end


    Now we’ll move onto products. Let’s add a POST request endpoint to insert a product
    and its prices. This handler will


    • Parse a product object from the request body


    • Begin a transaction that will


    • Insert a product into the product table


    • Insert the prices for that product into the produce_price table


    • Commit the transaction


    • Return the product’s ID


    As we’re reading an object from the request, I’ve created two classes: a Product
    class that will hold the top-level information of the product and a ProductPrice
    class that will contain a single, optionally expirable price for that product.


    class Product


    include JSON::Serializable


    def initialize(@name : String, @sku : String)


    @prices = Array(ProductPrice).new


    end'
  trans: "\n黑盒测试从用户的角度测试数据库。我们不对其内部结构做任何假设，因此测试可以通过用户界面或 API 进行。由于我们没有实际的数据库或用户界面，我将提供一个简单的\
    \ API 来抽象数据库操作。为了简洁起见，我将使用来自[第 5 章](https://doi.org/10.1007/978-1-4842-82243_5)的\
    \ Crystal 驱动。\n\n在开始之前，我们先看看这个测试需要实现的用例：\n\n*   `创建客户` – 向数据库中插入一个新客户并返回其 ID。\n\
    *   `获取客户` – 根据 ID 从数据库中选择一位客户。\n*   `创建带价格的产品` – 插入一个产品及其相关的一组价格。\n*   `获取产品`\
    \ – 选择数据库中所有产品的列表。\n*   `下订单` – 为客户插入一份包含产品列表的订单。\n\n## 创建一个简单的应用程序\n\n首先，使用以下命令为应用程序创建脚手架：\n\
    \n```\ncrystal init app api\ncd api\n```\n\n接下来，通过将它们添加到 `shard.yml` 文件并安装，引入我们将需要的依赖项：\n\
    \n```\ndependencies:\n  kemal:\n    github: kemalcr/kemal\n  pg:\n    github:\
    \ will/crystal-pg\nshards install\n```\n\n依赖项安装好后，我们就可以编写 API 了。与[第 5 章](https://doi.org/10.1007/978-1-4842-82243_5)中的示例代码一样，这段代码远未达到生产质量，仅作为黑盒测试的一种机制提供。\n\
    \n让我们从导入一些模块开始：\n\n```\nrequire \"kemal\"\nrequire \"db\"\nrequire \"pg\"\nrequire\
    \ \"json\"\nrequire \"uuid\"\nrequire \"uuid/json\"\n```\n\n接下来，我们将创建一个到数据库的连接。请注意，此连接将是明文的，这显然不适合生产环境使用：\n\
    \n```\ndb = PG.connect \"postgres://retail_user:7efd7222dfdfb107@localhost:26257/bean_about_town?auth_methods=cleartext\"\
    \n```\n\n现在我们准备好连接我们的 API 处理器了。让我们从一个过滤器中间件处理器开始，它将为所有响应附加一个 JSON `Content-Type`\
    \ 头。这将在我们所有处理器执行之前运行，并为所有响应添加正确的 `Content-Type` 头：\n\n```\nbefore_all do |env|\n\
    \  env.response.content_type = \"application/json\"\nend\n```\n\n接下来，我们将添加一个 `POST`\
    \ 请求处理器来插入客户。这个处理器将\n\n*   从 JSON 请求体中读取 `full_name` 和 `email` 字符串值\n*   将它们插入到\
    \ `retail.customer` 表中\n*   返回客户的 ID 和 `join_date`\n\n```\npost \"/customers\"\
    \ do |env|\n  full_name = env.params.json[\"full_name\"].as(String)\n  email =\
    \ env.params.json[\"email\"].as(String)\n  id, join_date = db.query_one \"INSERT\
    \ INTO retail.customer (full_name, email) VALUES ($1, $2) RETURNING id, join_date\"\
    , full_name, email, as: { UUID, Time }\n  { \"id\": id, \"join_date\": join_date\
    \ }.to_json\nend\n```\n\n接下来，我们将添加一个 `GET` 请求处理器来按 ID 选择客户。这个处理器将\n\n*   从请求 URL\
    \ 路径中读取一个 ID\n*   从数据库中选择一个具有匹配 ID 的客户\n*   返回一个表示该用户的 JSON 对象\n\n```\nget \"\
    /customers/:id\" do |env|\n  id = env.params.url[\"id\"]\n  full_name, email,\
    \ join_date = db.query_one \"SELECT full_name, email, join_date FROM retail.customer\
    \ WHERE id = $1 LIMIT 1\", id, as: { String, String, Time }\n  { \"id\": id, \"\
    full_name\": full_name, \"email\": email, \"join_date\": join_date }.to_json\n\
    end\n```\n\n现在我们将处理产品。让我们添加一个 `POST` 请求端点来插入产品及其价格。这个处理器将\n\n*   从请求体中解析一个产品对象\n\
    *   开启一个事务，该事务将\n    *   将一个产品插入到 `product` 表\n    *   将该产品的价格插入到 `produce_price`\
    \ 表\n*   提交事务\n*   返回产品的 ID\n\n由于我们是从请求中读取一个对象，我创建了两个类：一个 `Product` 类用于保存产品的顶层信息，以及一个\
    \ `ProductPrice` 类用于包含该产品的单个、可选择是否过期的价格。\n\n```\nclass Product\n  include JSON::Serializable\n\
    \  def initialize(@name : String, @sku : String)\n    @prices = Array(ProductPrice).new\n\
    \  end\n```\n"
- fmt: '# Chapter 8 testing


    ## Class Definitions


    ### `Product`


    ```crystal

    property id : UUID?


    property name : String


    property sku : String


    property prices : Array(ProductPrice)


    end

    ```


    ### `ProductPrice`


    ```crystal

    class ProductPrice


    include JSON::Serializable


    def initialize(@id : UUID, @amount : Float64)


    end


    property id : UUID?


    property amount : Float64


    property start_date : Time?


    property end_date : Time?


    end

    ```


    ## Handler Implementations


    ### POST `/products`


    ```crystal

    post "/products" do |env|


    request = Product.from_json env.request.body.not_nil!


    id = UUID.empty


    db.transaction do |tx|


    id = tx.connection.query_one "INSERT INTO retail.product (name, sku)


    VALUES ($1, $2)


    RETURNING id", request.name, request.sku,


    as: { UUID }


    request.prices.each do |price|


    tx.connection.exec "INSERT INTO retail.product_price (product_id,


    amount, start_date, end_date)


    VALUES ($1, $2, $3, $4)", id, price.amount,


    price.start_date, price.end_date


    end


    end


    { "id": id }.to_json


    end

    ```


    As with the customer handler, we’ll add a GET request handler for products too.
    This handler will


    *   Select the lowest active price for each product. This is defined as the lowest
    price for a product that has a `start_date` that’s not in the future and either
    an `end_date` in the future or no `end_date`.

    *   Build up a collection of products found.

    *   Return the products as a JSON array.


    # Chapter 8 testing


    ### GET `/products`


    ```crystal

    get "/products" do |env|


    products = Array(Product).new


    db.query "WITH min_product_price AS (


    SELECT DISTINCT ON(product_id) product_id, id, min(amount)


    AS amount


    FROM retail.product_price


    WHERE start_date <= now()


    AND (end_date >= now() OR end_date IS NULL)


    GROUP BY id


    ORDER BY product_id, amount


    )


    SELECT p.id, p.name, p.sku, pp.id, pp.amount FROM min_product_


    price pp


    JOIN retail.product p ON pp.product_id = p.id" do |rs|


    rs.each do


    product_id, name, sku, price_id, amount = rs.read(UUID, String,


    String, UUID, PG::Numeric)


    product = Product.new(name, sku)


    product.id = product_id


    product.prices << ProductPrice.new(price_id, amount.to_f)


    products << product


    end


    end


    products.to_json


    end

    ```


    The next handler we’ll create is a POST request handler to insert orders. As with
    the product POST handler, we’ll capture a JSON request from the caller, so we
    will introduce a new class to handle the serialization. This handler will


    *   Parse an order object from the request body

    *   Generate a short customer reference number


    # Chapter 8 testing


    *   Begin a transaction that will

    *   Insert an order into the `order` table

    *   Insert the products and paid price into the `product_order` table

    *   Close the transaction

    *   Return the order ID and customer reference number


    ### `Order`


    ```crystal

    class Order


    include JSON::Serializable


    property id : UUID?


    property customer_id : UUID


    property delivery_instructions : String?


    property products : Hash(UUID, UUID)


    end

    ```


    ### POST `/orders`


    ```crystal

    post "/orders" do |env|


    request = Order.from_json env.request.body.not_nil!


    id = UUID.empty


    ref = (''A''..''Z'').to_a.shuffle(Random::Secure)[0, 8].join


    db.transaction do |tx|


    id = tx.connection.query_one "INSERT INTO retail.order (reference,


    customer_id, delivery_instructions)


    VALUES ($1, $2, $3)


    RETURNING id", ref, request.customer_


    id, request.delivery_instructions, as:


    { UUID }


    request.products.each do |product_id, price_id|


    tx.connection.exec "INSERT INTO retail.product_order (order_id,


    product_id, product_price_id)


    VALUES ($1, $2, $3)", id, product_id, price_id


    end


    end


    { "id": id }.to_json


    end

    ```


    # Chapter 8 testing


    The last handler we’ll create is a GET request handler to select orders for a
    given customer ID. This handler will


    *   Read a customer ID from the request URL path

    *   Use the customer ID to select all of their orders

    *   Iterate through the results, building up a collection of orders with products

    *   Return an array of orders


    ### `Order` (Expanded Definition)


    ```crystal

    class Order


    include JSON::Serializable


    def initialize(@id, @reference, @customer_id, @date, @delivery_


    instructions)


    @products = Hash(String, Float64).new


    end


    property id : UUID


    property reference : String


    property customer_id : UUID


    property date : Time


    property delivery_instructions : String


    property products : Hash(String, Float64)


    end

    ```


    ### GET `/customers/:id/orders`


    ```crystal

    get "/customers/:id/orders" do |env|


    customer_id = UUID.new(env.params.url["id"])


    orders = Hash(UUID, Order).new

    ```'
  raw: 'property id : UUID?


    property name : String


    property sku : String


    property prices : Array(ProductPrice)


    end


    class ProductPrice


    include JSON::Serializable


    Chapter 8 testing


    def initialize(@id : UUID, @amount : Float64)


    end


