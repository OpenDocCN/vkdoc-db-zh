  trans: "\n# 第 7 章 部署拓扑\n\n如果数据未被固定且来自多个区域，你将产生区域间延迟。\n\n## 写入\n\n★★\n\n在写入语句返回之前，数据会在各区域间复制。\n\
    \n## 延迟\n\n## 弹性\n\n★★★★★ 如果你在各区域间复制数据，你将能抵御区域故障。如果你将数据固定到特定区域，并在该区域内的不同可用区部署节点，你将能抵御可用区故障。\n\
    \n## 部署便捷度\n\n★★★\n\n设置一个全局表集群与设置一个区域表集群类似。\n\n要启用全局表拓扑模式，我们只需更新表的配置使其变为全局表。在此示例中，我将把我们的\
    \ `example_regional_table` 更新为全局表：\n\n```sql\nALTER TABLE example_regional_table\
    \ SET LOCALITY GLOBAL;\n```\n\n你可能会注意到副本数量已从三变为五。这是全局表的默认副本数量，它允许 CockroachDB\
    \ 将表扩展到现有 `us-central1` 区域之外：\n\n```sql\nSELECT lease_holder_locality, replicas,\
    \ replica_localities\nFROM [SHOW RANGES FROM TABLE example_regional_table];\n\
    ```\n\n```\nregion=us-east1,zone=us-east1a\n{1,2,3,5,9}\n{\n  \"region=us-east1,zone=us-east1a\"\
    ,\n  \"region=us-east1,zone=us-east1b\",\n  \"region=us-east1,zone=us-east1c\"\
    ,\n  \"region=us-west1,zone=us-west1b\",\n  \"region=us-central1,zone=us-central1b\"\
    \n}\n```\n\n## 跟随者读取\n\n跟随者读取拓扑非常适合读多写少的场景，其中可以容忍读取过时数据以及写入延迟。这种模式所提供的过期容忍度降低了对相同数据的读写争用，因为可以请求稍不同时间段的数据。读取过期的程度取决于你的要求，可以是以下之一：\n\
    \n• **精确过期** – 数据过期量是精确的（至少 4.8 秒），因此读取比有界过期读取更快。\n• **有界过期** – CockroachDB 动态确定数据过期量，从而最小化过期。在发生网络分区的情况下，其可用性高于精确过期，因为读取可以从本地副本提供，而非必须从租赁者提供。\n\
    \n让我们看看使用此拓扑的集群的一些优缺点：\n\n### 读取延迟\n★★★★★ 读取速度非常快，因为延迟优先于一致性。\n\n### 写入延迟\n★★\n\
    \n在写入语句返回之前，数据会在各区域间复制。\n\n### 弹性\n★★★★★ 集群可以容忍可用区和区域的故障。\n\n### 部署便捷度\n★★★\n\n\
    跟随者读取的配置由客户端在读取时提供，因此此拓扑并不比其他任何多区域集群更困难。\n\n要启用跟随者读取拓扑，我们只需执行允许数据过期的 `SELECT`\
    \ 查询。以下是对 `example_regional_rows` 表进行跟随者读取的查询：\n\n```sql\nSELECT * FROM example_regional_rows\n\
    \  AS OF SYSTEM TIME follower_read_timestamp();\n```\n\n```\n  id            \
    \                       | city       | crdb_region\n---------------------------------------+------------+--------------\n\
    \  7b65d3fa-a0e1-4cd6-b125-05654a6fbce8 | Portland   | us-west1\n  d39ec728-cfc0-47e8-914c-fff493064071\
    \ | Des Moines | us-central1\n  e6a0c79c-2026-4877-b24f-6d4d9dd86848 | Charleston\
    \ | us-east1\n```\n\n也可以使用以下语法在事务中启用跟随者读取：\n\n```sql\nBEGIN;\nSET TRANSACTION\
    \ AS OF SYSTEM TIME follower_read_timestamp();\nSELECT * FROM example_regional_rows;\n\
    COMMIT;\n```\n\n使用 `follower_read_timestamp()` 函数不仅方便，而且返回的时间戳增加了查询从本地区域返回数据的可能性。\n\
    \n## 跟随工作负载\n\n跟随工作负载拓扑是未指定表局部性（例如，按行分区的区域表）的集群的默认拓扑。对于当前最活跃区域的读取延迟必须很低的场景，它们是一个不错的选择。\n\
    \n在使用跟随工作负载拓扑的集群中，CockroachDB 将移动数据以确保最繁忙的读取区域获得所需的数据。\n"
- fmt: "Let’s look at some of the benefits and drawbacks of a cluster using this topology:\n\
    \n### Read latency ★★★★\nreads for data within the current busiest region will\
    \ be fast, whereas reads from outside that region will be slower.\n\n### Write\
    \ latency ★★\nData is replicated across regions before write statements return.\n\
    \n### Resiliency ★★★★★\nThe cluster can tolerate failures of AZs and regions.\n\
    \n### Ease of setup ★★★\nThis topology is the default topology for multiregion\
    \ clusters, so no more difficult than any other multiregion cluster.\n\nBeing\
    \ the default topology, there’s nothing we need to do to explicitly enable it.\n\
    \n## Antipatterns\nConsidering antipatterns and the performance implications of\
    \ a poorly designed cluster is as critical as considering the recommended topology\
    \ patterns. In this section, we’ll create a cluster using the `demo` command that\
    \ *seems* well designed but will have poor performance characteristics.\n\n##\
    \ ChApTEr 7 DEploymENT TopologiEs\nFirst, we’ll spin up the cluster. This cluster\
    \ will be a nine-node, multiregion deployment, with nodes in `us-west1`, `us-east1`,\
    \ and `europe-west1`.\n\n```\ncockroach demo --nodes 9 --no-example-database\n\
    ```\n\nNext, we’ll create some database objects. The following statements will\n\
    - Create a database called `antipatterns_database` with three regions, reflecting\
    \ the regions created by the `demo` command\n- Create a regional table whose rows\
    \ will be geographically distributed between the regions\n- Insert data for each\
    \ of the regions\n- Update the table’s zone configuration to ensure that data\
    \ stays within those regions\n\n```\nCREATE DATABASE antipattern_database;\nUSE\
    \ antipattern_database;\nALTER DATABASE \"antipattern_database\" PRIMARY REGION\
    \ \"us-east1\";\nALTER DATABASE \"antipattern_database\" ADD REGION \"us-west1\"\
    ;\nALTER DATABASE \"antipattern_database\" ADD REGION \"europe-west1\";\nALTER\
    \ DATABASE \"antipattern_database\" SURVIVE ZONE FAILURE;\nCREATE TABLE antipattern_table\
    \ (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    city TEXT NOT NULL,\n\
    \    crdb_region crdb_internal_region NOT NULL AS (\n        CASE\n          \
    \  WHEN city IN ('New York', 'Boston', 'Chicago') THEN 'us-east1'\n          \
    \  WHEN city IN ('San Francisco', 'Portland', 'Seattle') THEN 'us-west1'\n   \
    \         WHEN city IN ('Berlin', 'Paris', 'Madrid') THEN 'europe-west1'\n   \
    \         ELSE 'europe-west1'\n        END\n    ) STORED\n);\nALTER TABLE antipattern_table\
    \ SET LOCALITY REGIONAL BY ROW;\nINSERT into antipattern_table (city)\nVALUES\n\
    \    ('New York'), ('Boston'), ('Chicago'),\n    ('San Francisco'), ('Portland'),\
    \ ('Seattle'),\n    ('Berlin'), ('Paris'), ('Madrid');\nSET override_multi_region_zone_config\
    \ = true;\nALTER TABLE antipattern_table CONFIGURE ZONE USING num_voters = 3;\n\
    ALTER TABLE antipattern_table CONFIGURE ZONE USING num_replicas = 3;\n```\n\n\
    What we’ve essentially created with these commands is a globally distributed follow-the-workload\
    \ cluster. If the most active region is Europe in this example, queries against\
    \ the `antipattern_table` will have to fetch data from the States and vice versa.\n\
    \nAfter a short while, run the following statement to ensure that data has been\
    \ distributed equally between the nodes:\n\n```\nSELECT lease_holder_locality,\
    \ replicas, replica_localities\nFROM [SHOW RANGES FROM TABLE antipattern_table]\n\
    WHERE \"start_key\" NOT LIKE '%Prefix%';\n```\n\n```\nregion=europe-west1,az=c\n\
    {7,8,9}\n{\n  \"region=europe-west1,az=b\",\n  \"region=europe-west1,az=c\",\n\
    \  \"region=europe-west1,az=d\"\n}\nregion=us-east1,az=d\n{1,2,3}\n{\n  \"region=us-east1,az=b\"\
    ,\n  \"region=us-east1,az=c\",\n  \"region=us-east1,az=d\"\n}\n```\n\n## ChApTEr\
    \ 7 DEploymENT TopologiEs\n```\nregion=us-west1,az=b\n{4,5,6}\n{\n  \"region=us-west1,az=a\"\
    ,\n  \"region=us-west1,az=b\",\n  \"region=us-west1,az=c\"\n}\n```\n\nNow let’s\
    \ perform a query to check the latency:\n\n```\nSELECT * FROM antipattern_table;\n\
    ```\n\n```\nid | city | crdb_region\n---------------------------------------+---------------+---------------\n\
    3c24dee9-f006-4c2a-b556-0d7d6d0a7f6d | Portland | us-west1\n8aaab90d-2ff3-471b-ac5a-39eec13b97bd\
    \ | San Francisco | us-west1\n9489216e-95f2-4796-98bd-ba654f85b688 | Seattle |\
    \ us-west1\n421f2184-99d7-4d2a-823c-e330ccbf5a87 | Madrid | europe-west1\n48b68338-93b2-4761-832b-4a3a91ba77e5\
    \ | Berlin | europe-west1\n```"
