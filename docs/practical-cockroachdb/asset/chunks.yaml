- fmt: "# Chapter 8 testing\n\nOne of the goals of structural testing is to assert\
    \ whether the proposed structure of the database and its objects will satisfy\
    \ business requirements. So rather than creating a bunch of tables up front, I’ll\
    \ go object by object and detail my design decisions for each database object.\
    \ Remember that this business scenario (and all database objects) is contrived\
    \ and not production-ready; the resulting database will be bare-bones.\n\nLet’s\
    \ start by creating the database. The company is called Bean About Town (totally\
    \ fictional, although a quick Google reveals that at least three cunning London-based\
    \ companies have had the same idea). For the commands that follow, we’ll use the\
    \ root user. Let’s open a CockroachDB shell and create the database `bean_about_town`.\
    \ We will arrange all of our database objects under that:\n\n```\n$ cockroach\
    \ sql \\\n--certs-dir=certs\n\nCREATE DATABASE bean_about_town;\nUSE bean_about_town;\n\
    ```\n\nThere are to be three primary user groups for the database: customers,\
    \ members of the coffee roasting department, and members of the accounting department.\
    \ Let’s create three users with simple passwords to ensure sensible isolation\
    \ of grants and privileges.\n\nWe’ll have a retail user with access to customer-facing\
    \ tables, a roasting user with access to roasting-related tables, and a finance\
    \ user with access to accounts-related tables:\n\n```\nCREATE USER retail_user\
    \ WITH LOGIN PASSWORD '7efd7222dfdfb107';\nCREATE USER roasting_user WITH LOGIN\
    \ PASSWORD '9389884141ecaf04';\nCREATE USER finance_user WITH LOGIN PASSWORD 'a02308ce58c92131';\n\
    ```\n\nAcross the business, we’ll be making and taking orders for different things:\n\
    \n- `Retail` – Taking customer orders.\n- `Roasting` – Making orders for raw materials\
    \ and taking orders from the retail side of the business (e.g., a warehouse that\
    \ fulfills online orders needs roasted coffee beans). We’ll only create tables\
    \ for making orders in this example for simplicity.\n- `Finance` – Reconciling\
    \ customer orders to online sales and roasting orders to company inventory. We’ll\
    \ ignore the need for the finance to make orders for anything they need for now.\n\
    \nKnowing that we’ll need to conceptualize multiple order types, it’s clear that\
    \ creating schemas will simplify this. Let’s create some schemas and database\
    \ objects now. I won’t create the `roasting` or `finance` schemas to keep things\
    \ simple, as we can cover various types of testing by having just the `retail`\
    \ schema.\n\nLet’s create the `retail` schema now. The `retail` schema will hold\
    \ all of the database objects that are related to the retail operations of the\
    \ business:\n\n```\nCREATE SCHEMA retail AUTHORIZATION retail_user;\n```\n\nNext,\
    \ we’ll create a table to hold our customer information:\n\n```\nCREATE TABLE\
    \ retail.customer (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    full_name\
    \ STRING(255) NOT NULL,\n    email STRING(320) NOT NULL,\n    join_date TIMESTAMPTZ\
    \ NOT NULL DEFAULT now()\n);\n```\n\nKey design decisions:\n\n- `Customer names`\
    \ – Not everyone has a first and last name, so rather than asking for a separate\
    \ first and last name, consider asking for a customer’s full name instead.\n-\
    \ `join_date` – A question worth asking whenever you’re dealing with time zones\
    \ is whether you need to capture a timestamp as of a user’s time, or the system’s\
    \ time. If it’s the user’s time, it makes sense to use the `TIMESTAMPTZ` data\
    \ type, as this allows us to provide a user-specific time zone.\n\nNext, we’ll\
    \ create a table to hold products:\n\n```\nCREATE TABLE retail.product (\n   \
    \ id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    name STRING(100) NOT NULL,\n\
    \    sku STRING(16) NOT NULL\n);\n```\n\nKey design decisions:\n\n- `User Experience\
    \ (UX)` – As with the order table, it’s important to think of the experience of\
    \ users within your company. If Stock-Keeping Units (SKUs) are used to identify\
    \ products, make them easy to use and recall.\n\nRather than storing prices alongside\
    \ products, we’ll create a way of allowing product prices to change over time.\
    \ For example, a customer might purchase a product while on sale. If they ask\
    \ for a refund later, the business can’t afford to lose money by refunding the\
    \ product at a non-sale price.\n\nThe following table is a basic implementation\
    \ of historical prices:\n\n```\nCREATE TABLE retail.product_price (\n    id UUID\
    \ PRIMARY KEY DEFAULT gen_random_uuid(),\n    product_id UUID NOT NULL REFERENCES\
    \ retail.product(id),\n    amount DECIMAL NOT NULL,\n    start_date TIMESTAMPTZ\
    \ NOT NULL,\n    end_date TIMESTAMPTZ\n);\n```\n\nKey design decisions:\n\n- `Simplicity`\
    \ – To keep things straightforward, the business has decided to deal exclusively\
    \ in one currency. As a result, I won’t explicitly store currencies for now.\n\
    - `Correctness` – There are opposing schools of thought about whether decimals\
    \ or integers should be used to store monetary values. Rounding errors may surface\
    \ if calculations use floating-point numbers, so some prefer to use integers and\
    \ only convert them to decimals for calculations temporarily in their code. This\
    \ way, they can control how decimal values get rounded. As I won’t perform any\
    \ calculations, I’ve decided to keep things simple and use decimal.\n- `Flexibility`\
    \ – By storing product prices outside of the products table, we have flexibility\
    \ with pricing. By including a `start_date` and `end_date` for a price, we can\
    \ schedule price changes without updating them manually.\n\nNext, we’ll create\
    \ a table to hold customer order information:\n\n```\nCREATE TABLE retail.order\
    \ (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    reference STRING(16)\
    \ NOT NULL,\n    customer_id UUID NOT NULL REFERENCES retail.customer(id),\n \
    \   delivery_instructions STRING(255),\n    order_date TIMESTAMPTZ NOT NULL DEFAULT\
    \ now()\n);\n```\n\nKey design decisions:\n\n- `User Experience (UX)` – Consider\
    \ your user’s experience if presented with a UUID order number. If they’re required\
    \ to type or speak in a UUID when going through customer support, this could sour\
    \ their experience. Instead, create short, easy-to-read identifiers for them.\n\
    \nEach order can contain multiple products, and each can appear in multiple orders.\
    \ We’ll resolve this many-to-many relationship with a third table:\n\n```\nCREATE\
    \ TABLE retail.product_order (\n    order_id UUID NOT NULL REFERENCES retail.order(id),\n\
    \    product_id UUID NOT NULL REFERENCES retail.product(id),\n    product_price_id\
    \ UUID NOT NULL REFERENCES retail.product_price(id)\n);\n```\n\nFollowing a conversation\
    \ with the finance department, we’ve learned that members of their team will need\
    \ to have access to objects in the `retail` schema for generating end-of-day reports,\
    \ etc. Currently, if they try to access the objects of the `retail` schema, they\
    \ won’t see anything:\n\n```\n$ cockroach sql \\\n--certs-dir=certs \\\n--url\
    \ \"postgres://finance_user:a02308ce58c92131@localhost:26257/bean_about_town\"\
    \ \\\n--execute \"SELECT COUNT(*) FROM retail.order\"\n\nERROR: user finance_user\
    \ does not have SELECT privilege on relation order\n```\n\nGranting them `USAGE`\
    \ and `SELECT` permissions on the `retail` schema objects will rectify this:\n\
    \n```\nGRANT SELECT, INSERT, UPDATE, DELETE ON retail.* TO retail_user;\nGRANT\
    \ SELECT ON retail.* TO retail_user;\nGRANT USAGE ON SCHEMA retail TO finance_user;\n\
    GRANT SELECT ON retail.* TO finance_user;\n```\n\n## Functional Testing\n\nFunctional\
    \ testing asserts that the database satisfies business requirements and use cases.\
    \ We can run functional tests from either a user perspective (Black Box) or with\
    \ a deeper understanding and direct access to the database (White Box). We’ll\
    \ go through each type of testing now.\n\nTo keep complexity from spiralling,\
    \ I’ll limit the tests to cover the `retail` schema.\n\n### Black Box Testing"
