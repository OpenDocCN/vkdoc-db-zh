    698584214451748865 | 698584214451781633 | 698584214451814401


    698584216070979585 | 698584216071012353 | 698584216071045121


    698584216921047041 | 698584216921079809 | 698584216921112577


    698584217849954305 | 698584217849987073 | 698584217850019841


    As we can see from the values generated, regardless of the integer size provided
    by the data type definition, the default mode for generating these values (unique_rowid())
    will always result in a 64-bit integer.


    **STRING**


    The STRING, TEXT, CHARACTER, CHAR, or VARCHAR data type stores either fixed or
    variable-length strings of Unicode characters and is created as follows:


    CREATE TABLE person (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    first_name


    TEXT NOT NULL,


    last_name


    VARCHAR(50) NOT NULL,


    grade


    CHAR NOT NULL


    );


    By showing the columns of our table, we can see what the data types resolve to
    behind the scenes:


    SELECT column_name, data_type


    FROM [SHOW columns FROM person];


    Chapter 3 ConCepts


    column_name | data_type


    --------------+--------------


    id | UUID


    first_name | STRING


    last_name | VARCHAR(50)


    grade | CHAR


    Note that VARCHAR(n) is, in fact, an alias of STRING(n), but for Postgres compatibility,
    it is still represented as VARCHAR(n) here, as Postgres does not have a STRING
    data type.


    Inserting data into this table will reveal that CockroachDB faithfully represents
    Unicode characters:


    As in Postgres, you’ll receive an error from CockroachDB if you try to insert
    data that will not fit into a fixed-length or limited variable-length column.


    **TIME/TIMETZ**


    The TIME and TIMEZ data types store time (minus date) values in UTC and zoned
    representations, respectively. They can store time values to various levels of
    precision, ranging from second precision down to microsecond precision.


    Cockroach Labs recommends using the TIME variant and converting to local time
    in the front-end.


    Chapter 3 ConCepts


    CREATE TABLE schedule (


    name STRING(50)


    NOT NULL,


    time_of_day TIME NOT NULL


    );


    INSERT INTO schedule (name, time_of_day)


    VALUES


    (''Take dogs for walk'', ''10:30:00''),


    (''Make lunch'', ''12:00:00'');


    SELECT * FROM schedule;


    name | time_of_day


    ---------------------+--------------


    Take dogs for walk | 10:30:00


    Make lunch | 12:00:00


    **TIMESTAMP/TIMESTAMPTZ**


    The TIMESTAMP and TIMESTAMPTZ data types store timestamps in UTC and *display*
    the values in UTC and zoned representations, respectively.


    Cockroach Labs recommends using the TIMESTAMPTZ data type over the TIMESTAMP


    data type for explicitness, so I’ll demonstrate the use of the TIMESTAMPTZ data
    type, which is created as follows:


    CREATE TABLE episode_schedule (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    name


    TEXT NOT NULL,


    next_show_time


    TIMESTAMPTZ(0) NOT NULL


    );


    Chapter 3 ConCepts


    As you can see, the TIMESTAMP data types allow for an optional precision to be
    provided. This precision accepts a value between zero (representing second precision)
    and six (representing microsecond precision). The default precision for TIMESTAMP
    data types is 6, so for most cases, you can omit the precision entirely.


    Let’s insert some data into the table to show its representation to users in different
    time zones:


    INSERT


    INTO episode_schedule (name, next_show_time)


    VALUES


    (''South Park - The Tail of Sc...'', ''2021-12-10 22:00:00+00:00''),


    (''South Park - Grounded Vinda...'', ''2021-12-10 22:30:00+00:00''),


    (''South Park - Make Love, Not...'', ''2021-12-10 23:00:00+00:00'');


    Let’s select the rows out of the table now, once for users in a UTC time zone
    and once for users in the Eastern Daylight Time (EDT) time zone:


    SET TIME ZONE ''UTC'';


    SELECT next_show_time FROM episode_schedule;


    next_show_time


    2021-12-10 23:00:00+00


    2021-12-10 22:30:00+00


    2021-12-10 22:00:00+00


    SET TIME ZONE ''America/New_York'';


    SELECT next_show_time FROM episode_schedule;


    next_show_time


    2021-12-10 18:00:00-05


    2021-12-10 17:30:00-05


    2021-12-10 17:00:00-05


    As you can see, users in the UTC time zone see the data as it was inserted into
    the database, while users in the EDT time zone see the data in their local time
    as a -05:00


    offset from UTC.


