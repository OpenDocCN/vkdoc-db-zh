    \ = '[+unencrypted]';`\n\nAfter creating each table in the example shown previously,\
    \ I’m setting zone configurations to mark a table as being either `+encrypted`\
    \ (needs encrypting) or `+unencrypted` (does not need encrypting). These constraints\
    \ coincide with the attributes we used when defining the stores earlier.\n\nIf\
    \ you open the CockroachDB admin console and navigate to the data source URLs\
