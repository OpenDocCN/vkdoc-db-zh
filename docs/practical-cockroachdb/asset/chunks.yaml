  trans: "# 第九章 生产环境\n\n## Prometheus 配置\n\n`prometheus.yml 文件`用于配置 Prometheus 的基本属性。它决定了\
    \ Prometheus 抓取指标数据的频率、从哪些主机抓取数据，以及这些主机通过哪些 URL 提供指标数据。请注意，由于我将使用 Docker 运行 Prometheus，因此我使用了\
    \ `host.docker.internal` 这个 DNS 名称，它可以从容器内部解析到我的主机：\n\n```\nglobal:\n  scrape_interval:\
    \ 10s\n\nrule_files:\n  - alert_rules.yml\n\nscrape_configs:\n  - job_name: cockroachdb\n\
    \    metrics_path: /_status/vars\n    static_configs:\n      - targets:\n    \
    \    - host.docker.internal:8080\n        - host.docker.internal:8081\n      \
    \  - host.docker.internal:8082\n```\n\n## Alertmanager 配置\n\n`alert_rules.yml\
    \ 文件`用于配置包含指标规则的告警组。如果任何指标规则超过了配置的阈值，将为该告警组触发告警。在此示例中，我创建了一个告警，如果 CockroachDB\
    \ 检测到某个节点离线超过一分钟，该告警就会触发：\n\n```\ngroups:\n  - name: node_down\n    rules:\n \
    \     - alert: NodeDown\n        expr: up == 0\n        for: 1m\n        labels:\n\
    \          severity: critical\n```\n\n接下来，我们将创建一个 Alertmanager 实例。它将接收来自 Prometheus\
    \ 的告警，并将其发送给接收器。通过以下配置，我使用一个简单的 HTTP 接收器将通知发送到 `https://httpbin.org`：\n\n```\n\
    global:\n  resolve_timeout: 5m\n\nroute:\n  group_by: ['alertname']\n  group_wait:\
    \ 5s\n  group_interval: 5s\n  repeat_interval: 1h\n  receiver: api_notify\n```\n\
    \n![](img/index-257_1.png)\n\n```\nreceivers:\n  - name: api_notify\n    webhook_configs:\n\
    \      - url: https://httpbin.org/post\n```\n\n## 启动服务并观察告警\n\n现在让我们启动 Prometheus\
    \ 和 Alertmanager：\n\n```\n$ docker run \\\n    --name prometheus \\\n    --rm\
    \ -it \\\n    -p 9090:9090 \\\n    -v ${PWD}/prometheus.yml:/etc/prometheus/prometheus.yml\
    \ \\\n    -v ${PWD}/alert_rules.yml:/etc/prometheus/alert_rules.yml \\\n    prom/prometheus\n\
    ```\n\n```\n$ docker run \\\n    --name alertmanager \\\n    --rm -it \\\n   \
    \ -p 9093:9093 \\\n    -v ${PWD}/alertmanager.yml:/etc/alertmanager/alertmanager.yml\
    \ \\\n    prom/alertmanager\n```\n\n如果你访问 `http://localhost:9090/alerts`，你会看到\
    \ `NodeDown` 告警处于活动状态，并报告当前没有节点宕机：\n\n如果我们现在终止一个节点，该告警将先进入“待处理”状态，然后变为“触发”状态。我将终止\
    \ `node3` 的 `cockroach` 进程来演示这些告警状态。\n\n![](img/index-258_1.png)\n![](img/index-258_2.png)\n\
    \n稍等片刻，告警将进入待处理状态：\n\n再过一会儿，它将进入触发状态：\n\n如果我们重启 `node3` 并稍等片刻，告警将清除，并报告我们的集群再次恢复健康。\n\
    \n## 索引\n\n**A**\n\n序列化，170\n结合应用程序代码测试，179–184\n反模式，152–156\n`argPlaceholders`，212\n\
    可用区（`AZs`），21, 140, 141, 151\n\n**B**\n\n数据备份与恢复\n带修订历史的备份，231\n加密备份，231, 237–240\n\
    全量备份，231, 233–235\n增量备份，231, 236\n地域感知备份，232\n计划备份，241, 242\n备份方法，232\n带修订历史的备份，231–232\n\
    基本生产拓扑，140, 141, 160\nBean About Town，161\n黑盒测试\n`API` 服务器监听，173\n应用程序，166\n应用程序测试，173\n\
    `Cockroach` 二进制文件，67\n数据库内部结构，165\n错误处理，174\n`GET` 请求处理器，167, 169, 172\n格式错误的客户\
    \ ID，176\n机制，166\n多语句事务，176\n`POST` 请求端点，168\n`POST` 请求处理器，167\n`Product` 类，168\n\
    对不存在 ID 的请求，176\n\n**C**\n\n《加州消费者隐私法案》（`CCPA`），124, 126–128\n证书颁发机构（`CA`），70,\
    \ 130\n变更数据捕获（`CDC`），6, 114, 116, 119, 120, 156\n变更数据流，116\n云提供商对象存储，232\n集群设计\n\
    集群规模规划，243\n节点规模规划，243, 244\n集群维护\n集群范围操作，220\n法兰克福集群，223\n`gossip` 协议，221\n`Kubernetes`\
    \ 用户，225\n节点启动命令，220\n扩缩容，221, 222\n`cockroach cert` 命令，70, 71\n命令树，68\n演示命令，69\n\
    `import` 命令，78\n`node` 命令，73–76\n`recommission` 命令，77\n示例数据库，69, 70\n`sqlfmt`\
    \ 命令，78, 79\n`start` 和 `start-single-node` 命令，68, 69\n\n© Rob Reid 2022"
