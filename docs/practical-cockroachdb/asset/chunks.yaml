  trans: "\n## 第 9 章 生产环境\n\nKEY=`****&AWS_REGION=eu-west-2'`\n\nWITH `encryption_passphrase`\
    \ = 'correct horse battery staple';\n\n`job_id` | `status` | `fraction_completed`\
    \ | `rows` | `index_entries` | `bytes`\n--- | --- | --- | --- | --- | ---\n742838121558212609\
    \ | succeeded | 1 | 1000 | 0 | 52150\n\n## 区域感知备份\n\n要使备份具备区域感知能力，我们只需向`BACKUP`命令传递一些额外的配置，以确保备份保留在各自的区域内。\n\
    \n让我们使用演示命令创建一个新集群来模拟一个多区域集群。\n\n在下面的例子中，我们指定默认情况下，CockroachDB 应备份到美西存储桶，但具有`us-east-1`区域性的节点除外，这些节点将备份到美东存储桶：\n\
    \n```\nBACKUP INTO (\n    's3://practical-cockroachdb-backups-us-west?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&COCKROACH_LOCALITY=default',\n\
    \    's3://practical-cockroachdb-backups-us-east?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&COCKROACH_LOCALITY=region%3Dus-east-1'\n\
    );\n\nRESTORE TABLE `sensor_reading` FROM '2022/06/29-183902.85' IN (\n    's3://practical-cockroachdb-backups-us-west?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=us-west-1&COCKROACH_LOCALITY=default',\n\
    \    's3://practical-cockroachdb-backups-us-east?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=us-east-1&COCKROACH_LOCALITY=region%3Dus-east-1'\n\
    );\n```\n\nKMS 密钥和加密口令短语可以与区域备份结合使用，从而实现灵活的 CockroachDB 备份和恢复。\n\n## 计划备份\n\n\
    可以安全地假设，你不会想在每晚午夜手动备份你的集群。这就是 CockroachDB 备份计划的用武之地。以下语句创建了两个备份计划：\n\n- **每周完整备份**\
    \ – 创建每周完整备份，以确保每周都捕获一个干净的基线备份。\n- **每日增量备份** – 根据我们的指令，使用`crontab`语法创建每日备份。\n\
    \n```\nCREATE SCHEDULE cluster_backup\n    FOR BACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \    WITH revision_history\n    RECURRING '@daily'\n    WITH SCHEDULE OPTIONS\
    \ first_run = 'now';\n```\n\n此语句的输出将包含两个新创建计划的信息：\n\n- **每周完整备份:**\n    - ID:\
    \ `742844058827390977`\n    - 状态: `ACTIVE`\n- **每日增量备份:**\n    - ID: `742844058837024769`\n\
    \    - 状态: `PAUSED`: 等待首次备份完成\n\n一旦每日初始备份完成，其状态将从`PAUSED`变为`ACTIVE`。这可以通过调用`SHOW\
    \ SCHEDULES`来查看：\n\n```\n$ cockroach sql --url \"postgresql://localhost:26260\"\
    \ --insecure \\\n--execute \"SHOW SCHEDULES\" \\\n--format records\n-[ RECORD\
    \ 1 ]\nid             | 742844058837024769\nlabel          | cluster_backup\n\
    schedule_status| ACTIVE\nnext_run       | 2022-03-13 00:00:00+00\nrecurrence \
    \    | @weekly\n-[ RECORD 3 ]\nid             | 742844058827390977\nlabel    \
    \      | cluster_backup\nschedule_status| ACTIVE\nnext_run       | 2022-03-09\
    \ 00:00:00+00\nrecurrence     | @daily\n```\n\n我们的每日备份作业将于明天午夜执行，而每周备份作业将于周日执行。\n\
    \n我们要求 CockroachDB 立即开始第一次每日备份。如果在白天创建计划，这不太可能是你期望的行为。要为首次运行设置不同的开始时间，只需将`first_run`值替换为时间戳。例如：\n\
    \n```\nCREATE SCHEDULE cluster_backup\n    FOR BACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \    WITH revision_history\n    RECURRING '@daily'\n    WITH SCHEDULE OPTIONS\
    \ first_run = '2022-03-08 00:00:00+00';\n```\n\n## 集群设计\n\n在设计集群时，有许多配置需要决定，以获得最佳性能和弹性。在本节中，我们将重点讨论这些决策及其权衡。\n\
    \n### 集群规模规划\n"
- fmt: "# CockroachDB 集群架构与生产规划\n\n如果你将 CockroachDB 集群视为分布在各个节点上的一组 vCPU（虚拟 CPU），那么设计集群架构的过程就会变得更简单。\n\
    \n拥有少量大型节点的集群与拥有大量小型节点的集群之间存在权衡。\n\n在由少量大型节点组成的小型集群中，每台机器额外的计算能力以及满足大型查询所需的较少网络跳数，使得集群更加**稳定**。\n\
    \n在由大量小型节点组成的大型集群中，用于分发数据和并行化备份与恢复等分布式操作的额外节点，使得集群更加**有弹性**。\n\n在稳定性和弹性之间做决定是你的选择，但作为经验法则，Cockroach\
    \ Labs 建议你采取折中方案，在尽可能少的节点上分布 vCPU，同时仍能实现弹性。他们的 [Production Checklist](https://www.cockroachlabs.com/docs/stable/recommended-production-settings.html)\
    \ 提供了每种情况的详细分解。\n\n## 节点规模\n\nCockroach Labs 提供了一套简单的建议，用于根据 vCPU 数量来确定集群节点的规模。让我们针对最低和推荐的\
    \ vCPU 数量逐一了解这些建议。请注意，这些只是一般性建议。根据你独特的性能需求，你可能需要不同的比例：\n\n*   **内存** – 每 vCPU\
    \ 4GB：\n    *   4 vCPUs -> 每节点 16GB RAM\n    *   8 vCPUs -> 每节点 32GB RAM\n*  \
    \ **存储** – 每 vCPU 150GB：\n    *   4 vCPUs -> 每节点 600GB 磁盘\n    *   8 vCPUs ->\
    \ 每节点 1.2TB 磁盘\n*   **IOPS** – 每 vCPU 500 IOPS（每秒输入/输出操作数）：\n    *   4 vCPUs ->\
    \ 2,000 IOPS\n    *   8 vCPUs -> 4,000 IOPS\n*   **MB/s** – 每 vCPU 30MB/s（每秒传输到磁盘或从磁盘传出的数据量）：\n\
    \    *   4 vCPUs -> 120MB/s\n    *   8 vCPUs -> 240MB/s\n\n常言道：“过早优化是万恶之源。” 在为你的\
    \ CockroachDB 集群构建架构时也是如此。早在 2018 年，当我创建一个 CockroachDB 集群时，我问 Cockroach Labs 团队是否建议立即在集群前放置一个外部缓存来处理读取密集型工作负载。他们的回答是先利用\
    \ CockroachDB 自身的缓存。这样做可以减少网络跳数并提供查询原子性，而数据库与缓存的组合则无法做到这一点。\n\n使用 CockroachDB，你不仅可以扩展集群中的节点数量，还可以扩展节点本身。因此，设计时应支持一个合理的初始容量，并由此开始增长。\n\
    \n## 监控\n\n安全地在生产环境中运行任何软件的一个重要方面是监控。在本节中，我们将为 CockroachDB 集群配置监控，并针对一个简单指标设置警报。\n\
    \n在此示例中，我们将使用 Prometheus，这是一个流行的开源监控系统，CockroachDB 对其有很好的支持。\n\n首先，我们将创建一个要监控的集群：\n\
    \n```shell\n$ cockroach start \\\n--insecure \\\n--store=node1 \\\n--listen-addr=localhost:26257\
    \ \\\n--http-addr=localhost:8080 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
    \n$ cockroach start \\\n--insecure \\\n--store=node2 \\\n--listen-addr=localhost:26258\
    \ \\\n--http-addr=localhost:8081 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
    \n$ cockroach start \\\n--insecure \\\n--store=node3 \\\n--listen-addr=localhost:26259\
    \ \\\n--http-addr=localhost:8082 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
    \n$ cockroach init --insecure --host=localhost:26257\n```\n\n接下来，我们将创建一个 Prometheus\
    \ 实例来监控我们的三个节点。我们将创建 `prometheus.yml` 和 `alert_rules.yml` 配置文件，并将 Prometheus 实例指向这些文件。"
  raw: 'If you think about your CockroachDB cluster as a collection of vCPUs (Virtual
    CPUs) that are distributed across nodes, the process of architecting your cluster
    becomes simpler.


    There are trade-offs between having a cluster with a small number of large nodes
    and a cluster with a large number of smaller nodes.


    In a small cluster of large nodes, the additional computing power of each machine
    and fewer network hops required to satisfy large queries make for a more **stable**
    cluster.


    In a large cluster of small nodes, the additional nodes to distribute data and
    parallelize distributed operations like backups and restores make for a more **resilient**
    cluster.


    The decision between stability and resilience is yours to make, but as a rule-of-thumb,
    Cockroach Labs recommends that you meet in the middle and distribute your vCPUs
    across as few nodes as possible while still achieving resilience. Their Production
    Checklis[t12](#index_split_002.html#p253) offers a detailed breakdown of each
    scenario.


    **Node Sizing**


    Cockroach Labs provides a simple set of recommendations for sizing your cluster
    nodes based on their vCPU count. Let’s go through each of the recommendations
    against the minimum and recommended vCPU counts. Note that these are just general
    recommendations. Depending on your unique performance requirements, you may


    require different ratios:


    • **Memory** – 4GB per vCPU:


    • 4 vCPUs -> 16GB of RAM per node


    • 8 vCPUs -> 32GB of RAM per node


    12 [www.cockroachlabs.com/docs/stable/recommended-production-settings.html](http://www.cockroachlabs.com/docs/stable/recommended-production-settings.html)


    Chapter 9 produCtion


    • **Storage** – 150GB per vCPU:


    • 4 vCPUs -> 600GB of disk per node


    • 8 vCPUs -> 1.2TB of disk per node


    • **IOPS** – 500 IOPS (input/output operations per second) per vCPU:


    • 4 vCPUs -> 2,000 IOPS


    • 8 vCPUs -> 4,000 IOPS


    • **MB/s** – 30MB/s (amount of data transferred to or from disk per


    second) per vCPU:


    • 4 vCPUs -> 120MB/s


    • 8 vCPUs -> 240MB/s


    It’s often said that “premature optimization is the root of all evil.” The same
    applies when creating the architecture your CockroachDB cluster will live in.
    Back in 2018, I was creating a CockroachDB cluster and asked the Cockroach Labs
    team whether they recommended immediately placing an external cache in front of
    my CockroachDB


    cluster to cater for read-heavy workloads. Their response was to start by harnessing
    CockroachDB’s own cache. This would result in fewer network hops and would provide
    query atomicity, whereas a combination of database and cache would not.


    With CockroachDB, you have the freedom to not only scale the number of nodes in
    your cluster but also the nodes themselves. So design to support a sensible initial
    capacity and grow from there.


    **Monitoring**


    An important aspect of running any software safely in production is monitoring.
    In this section, we’ll configure monitoring for a CockroachDB cluster and raise
    alerts against a simple metric.


    For this example, we’ll use Prometheus, a popular open source monitoring system
    that CockroachDB has great support for.


    First, we’ll create a cluster to monitor:


    Chapter 9 produCtion


    $ cockroach start \


    --insecure \


    --store=node1 \


    --listen-addr=localhost:26257 \


    --http-addr=localhost:8080 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \


    --insecure \


    --store=node2 \


    --listen-addr=localhost:26258 \


    --http-addr=localhost:8081 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \


    --insecure \


    --store=node3 \


    --listen-addr=localhost:26259 \


    --http-addr=localhost:8082 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach init --insecure --host=localhost:26257


    Next, we’ll create an instance of Prometheus to monitor our three nodes. We’ll
    create prometheus.yml and alert_rules.yml configuration files and point the Prometheus
    instance at those.'
  trans: "# CockroachDB 集群架构与生产环境规划\n\n如果你将 CockroachDB 集群视为分布在各个节点上的一组 vCPU（虚拟 CPU），那么设计集群架构的过程就会变得更简单。\n\
    \n拥有少量大型节点的集群与拥有大量小型节点的集群之间存在权衡。\n\n在由少量大型节点组成的小型集群中，每台机器额外的计算能力以及满足大型查询所需的较少网络跳数，使得集群更加**稳定**。\n\
    \n在由大量小型节点组成的大型集群中，用于分发数据和并行化备份与恢复等分布式操作的额外节点，使得集群更加**有弹性**。\n\n在稳定性和弹性之间做决定是你的选择，但作为经验法则，Cockroach\
    \ Labs 建议你采取折中方案，在尽可能少的节点上分布 vCPU，同时仍能实现弹性。他们的 [生产检查清单](https://www.cockroachlabs.com/docs/stable/recommended-production-settings.html)\
    \ 提供了每种情况的详细分解。\n\n## 节点规模\n\nCockroach Labs 提供了一套简单的建议，用于根据 vCPU 数量来确定集群节点的规模。让我们针对最低和推荐的\
    \ vCPU 数量逐一了解这些建议。请注意，这些只是一般性建议。根据你独特的性能需求，你可能需要不同的比例：\n\n*   **内存** – 每 vCPU\
    \ 4GB：\n    *   4 vCPUs -> 每节点 16GB RAM\n    *   8 vCPUs -> 每节点 32GB RAM\n*  \
    \ **存储** – 每 vCPU 150GB：\n    *   4 vCPUs -> 每节点 600GB 磁盘\n    *   8 vCPUs ->\
    \ 每节点 1.2TB 磁盘\n*   **IOPS** – 每 vCPU 500 IOPS（每秒输入/输出操作数）：\n    *   4 vCPUs ->\
    \ 2,000 IOPS\n    *   8 vCPUs -> 4,000 IOPS\n*   **MB/s** – 每 vCPU 30MB/s（每秒传输到磁盘或从磁盘传出的数据量）：\n\
    \    *   4 vCPUs -> 120MB/s\n    *   8 vCPUs -> 240MB/s\n\n常言道：“过早优化是万恶之源。” 在为你的\
    \ CockroachDB 集群构建架构时也是如此。早在 2018 年，当我创建一个 CockroachDB 集群时，我问 Cockroach Labs 团队是否建议立即在集群前放置一个外部缓存来处理读取密集型工作负载。他们的回答是先利用\
    \ CockroachDB 自身的缓存。这样做可以减少网络跳数并提供查询原子性，而数据库与缓存的组合则无法做到这一点。\n\n使用 CockroachDB，你不仅可以扩展集群中的节点数量，还可以扩展节点本身。因此，设计时应支持一个合理的初始容量，并由此开始增长。\n\
    \n## 监控\n\n安全地在生产环境中运行任何软件的一个重要方面是监控。在本节中，我们将为 CockroachDB 集群配置监控，并针对一个简单指标设置警报。\n\
    \n在此示例中，我们将使用 Prometheus，这是一个流行的开源监控系统，CockroachDB 对其有很好的支持。\n\n首先，我们将创建一个要监控的集群：\n\
    \n```shell\n$ cockroach start \\\n--insecure \\\n--store=node1 \\\n--listen-addr=localhost:26257\
    \ \\\n--http-addr=localhost:8080 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
    \n$ cockroach start \\\n--insecure \\\n--store=node2 \\\n--listen-addr=localhost:26258\
    \ \\\n--http-addr=localhost:8081 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
    \n$ cockroach start \\\n--insecure \\\n--store=node3 \\\n--listen-addr=localhost:26259\
    \ \\\n--http-addr=localhost:8082 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
    \n$ cockroach init --insecure --host=localhost:26257\n```\n\n接下来，我们将创建一个 Prometheus\
    \ 实例来监控我们的三个节点。我们将创建 `prometheus.yml` 和 `alert_rules.yml` 配置文件，并将 Prometheus 实例指向这些文件。"
- fmt: "# Chapter 9 Production\n\n## Prometheus Configuration\n\n`The prometheus.yml\
    \ file` configures the basic properties of Prometheus. It dictates how frequently\
    \ Prometheus will scrape for metrics, which hosts to scrape metrics from, and\
    \ which URLs those hosts are serving metrics on. Note that because I’ll be running\
    \ Prometheus using Docker, I use the `host.docker.internal` DNS name, which resolves\
    \ out of the container to my host machine:\n\n```\nglobal:\n  scrape_interval:\
    \ 10s\n\nrule_files:\n  - alert_rules.yml\n\nscrape_configs:\n  - job_name: cockroachdb\n\
    \    metrics_path: /_status/vars\n    static_configs:\n      - targets:\n    \
    \    - host.docker.internal:8080\n        - host.docker.internal:8081\n      \
    \  - host.docker.internal:8082\n```\n\n## Alertmanager Configuration\n\n`The alert_rules.yml\
    \ file` configures alert groups containing metric rules. If any metric rules breach\
    \ configured thresholds, an alert will be raised for that group. For this example,\
    \ I create an alert that will fire if CockroachDB detects that a node has been\
    \ offline for one minute:\n\n```\ngroups:\n  - name: node_down\n    rules:\n \
    \     - alert: NodeDown\n        expr: up == 0\n        for: 1m\n        labels:\n\
    \          severity: critical\n```\n\nNext, we’ll create an instance of Alertmanager.\
    \ This will receive alerts from Prometheus and direct them to a receiver. With\
    \ the following configuration, I use a simple HTTP receiver to send notifications\
    \ to `https://httpbin.org`:\n\n```\nglobal:\n  resolve_timeout: 5m\n\nroute:\n\
    \  group_by: ['alertname']\n  group_wait: 5s\n  group_interval: 5s\n  repeat_interval:\
    \ 1h\n  receiver: api_notify\n```\n\n![](index-257_1.png)\n\n```\nreceivers:\n\
    \  - name: api_notify\n    webhook_configs:\n      - url: https://httpbin.org/post\n\
    ```\n\n## Starting Services and Observing Alerts\n\nLet’s start Prometheus and\
    \ Alertmanager now:\n\n```\n$ docker run \\\n    --name prometheus \\\n    --rm\
    \ -it \\\n    -p 9090:9090 \\\n    -v ${PWD}/prometheus.yml:/etc/prometheus/prometheus.yml\
    \ \\\n    -v ${PWD}/alert_rules.yml:/etc/prometheus/alert_rules.yml \\\n    prom/prometheus\n\
    ```\n\n```\n$ docker run \\\n    --name alertmanager \\\n    --rm -it \\\n   \
    \ -p 9093:9093 \\\n    -v ${PWD}/alertmanager.yml:/etc/alertmanager/alertmanager.yml\
    \ \\\n    prom/alertmanager\n```\n\nIf you visit `http://localhost:9090/alerts`,\
    \ you’ll see that the `NodeDown` alert is active and reporting that no nodes are\
    \ currently down:\n\nIf we kill a node now, the alert will enter a “pending” state\
    \ before “firing.” I’ll terminate the `cockroach` process for `node3` to demonstrate\
    \ these alert statuses.\n\n![](index-258_1.png)\n![](index-258_2.png)\n\nAfter\
    \ a short while, the alert will enter the pending state:\n\nAfter a little longer,\
    \ it will enter the firing state:\n\nIf we restart `node3` and wait a short while,\
    \ the alert will clear and report that our cluster is once again healthy.\n\n\
    ## Index\n\n**A**\n\nSerialization, 170\nTesting with application code, 179–184\n\
    Antipatterns, 152–156\n`argPlaceholders`, 212\nAvailability zones (`AZs`), 21,\
    \ 140, 141, 151\n\n**B**\n\nBacking up and restoring data\nBackups with revision\
    \ history, 231\nEncrypted backups, 231, 237–240\nFull backups, 231, 233–235\n\
    Incremental backups, 231, 236\nLocality-aware backups, 232\nScheduled backups,\
    \ 241, 242\nBackup methods, 232\nBackups with revision history, 231–232\nBasic\
    \ Production topology, 140, 141, 160\nBean About Town, 161\nBlack Box testing\n\
    `API` server listening, 173\nApplication, 166\nApplication, testing, 173\n`Cockroach`\
    \ binary, 67\nDatabase’s internal structure, 165\nError handling, 174\n`GET` request\
    \ handler, 167, 169, 172\nMalformatted customer ID, 176\nMechanism, 166\nMultistatement\
    \ transaction, 176\n`POST` request endpoint, 168\n`POST` request handler, 167\n\
    `Product` class, 168\nRequest for nonexistent ID, 176\n\n**C**\n\nThe California\
    \ Consumer Privacy Act (`CCPA`), 124, 126–128\nCertificate Authority (`CA`), 70,\
    \ 130\nChange Data Capture (`CDC`), 6, 114, 116, 119, 120, 156\nChangefeeds, 116\n\
    Cloud provider blob storage, 232\nCluster design\nCluster sizing, 243\nNode sizing,\
    \ 243, 244\nCluster maintenance\nCluster-wide operations, 220\nFrankfurt cluster,\
    \ 223\n`gossip` protocol, 221\n`Kubernetes` users, 225\nNode start command, 220\n\
    Scaling, 221, 222\n`cockroach cert` command, 70, 71\nCommand tree, 68\nDemo commands,\
    \ 69\n`import` command, 78\n`node` command, 73–76\n`recommission` command, 77\n\
    Sample databases, 69, 70\n`sqlfmt` command, 78, 79\n`start` and `start-single-node`\
    \ commands, 68, 69\n\n© Rob Reid 2022"
