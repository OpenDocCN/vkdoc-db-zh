    **Moving Data**


    In this section, we’ll explore some use cases that involve moving data into and
    out of databases via the IMPORT and EXPORT statements and CDC (Change Data Capture).


    **Exporting and Importing Data**


    Unless you’re creating a new database to store new data, you’ll likely need to
    migrate data from another database. This section will show you how to export data
    out of and import data into CockroachDB tables.


