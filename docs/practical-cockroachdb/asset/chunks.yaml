    INVERTED INDEX (pets)


    );


    With this in place, CockroachDB knows how to return query results that are


    ordered by date_of_birth in ascending or descending order without having to manually
    sort them.


    If you’re indexing columns containing sequential data, such as TIMESTAMP or


    incrementing INT values, you may want to consider using hash-sharded indexes[.3](#index_split_001.html#p121)


    Hash- sharded indexes ensure that indexed data is distributed evenly across ranges,
    which prevent single-range hotspots. Single-range hotspots occur when multiple
    similar values are queried and exist in the same range.


    At the time of writing, hash-sharded indexes are still experimental, so they need
    to be enabled as follows:


