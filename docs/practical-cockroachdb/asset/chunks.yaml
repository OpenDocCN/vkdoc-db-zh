- fmt: "# Chapter 7 Deployment Topologies\n\nif data is not pinned and comes from\
    \ multiple regions, you’ll incur interregion latency.\n\n## Write\n\n★★\n\nData\
    \ is replicated across regions before write statements return.\n\n## Latency\n\
    \n## Resiliency\n\n★★★★★ if you replicate data across regions, you’ll achieve\
    \ resilience against regional failures. if you pin data to regions and have nodes\
    \ in different AZs within that region, you’ll achieve resilience against AZ failure.\n\
    \n## Ease of setup\n\n★★★\n\nsetting up a global Tables cluster is similar to\
    \ setting up a region Tables cluster.\n\nTo enable the Global Tables topology\
    \ pattern, we simply need to update the configuration of a table to make it global.\
    \ For this example, I’ll update our `example_regional_table` to be global:\n\n\
    ```sql\nALTER TABLE example_regional_table SET LOCALITY GLOBAL;\n```\n\nYou may\
    \ notice that the replication count has gone from three to five. This is the default\
    \ replication count for global tables, and it allows CockroachDB to scale the\
    \ table beyond the existing `us-central1` region:\n\n```sql\nSELECT lease_holder_locality,\
    \ replicas, replica_localities\nFROM [SHOW RANGES FROM TABLE example_regional_table];\n\
    ```\n\n```\nregion=us-east1,zone=us-east1a\n{1,2,3,5,9}\n{\n  \"region=us-east1,zone=us-east1a\"\
    ,\n  \"region=us-east1,zone=us-east1b\",\n  \"region=us-east1,zone=us-east1c\"\
    ,\n  \"region=us-west1,zone=us-west1b\",\n  \"region=us-central1,zone=us-central1b\"\
    \n}\n```\n\n## Follower Reads\n\nThe Follower Reads topology is a good choice\
    \ for read-heavy scenarios where reads for stale data and write latencies can\
    \ be tolerated. The stale tolerance afforded by this pattern reduces read and\
    \ write contention for the same data, as the data can be requested for slightly\
    \ different time periods. The level of read staleness will depend on your requirements\
    \ and can be one of the following:\n\n• **Exact Staleness** – The amount of data\
    \ staleness is an exact amount (at least 4.8 seconds), so reads are quicker than\
    \ Bounded Staleness reads.\n• **Bounded Staleness** – CockroachDB determines the\
    \ amount of data staleness dynamically, minimizing staleness. Availability is\
    \ higher than Exact Staleness because reads can be served from local replicas\
    \ rather than leaseholders in the event of a network partition.\n\nLet’s look\
    \ at some of the benefits and drawbacks of a cluster using this topology:\n\n\
    ### Read latency\n★★★★★ reads are very fast because latency is prioritized over\
    \ consistency.\n\n### Write latency\n★★\n\nData is replicated across regions before\
    \ write statements return.\n\n### Resiliency\n★★★★★ The cluster can tolerate failures\
    \ of AZs and regions.\n\n### Ease of setup\n★★★\n\nThe configuration for Follower\
    \ reads is provided by clients during reads, so this topology is no more difficult\
    \ than any other multiregion cluster.\n\nTo enable the Follower Reads topology,\
    \ we simply need to make `SELECT` queries that allow for staleness. The following\
    \ query is a follower-read query against the `example_regional_rows` table:\n\n\
    ```sql\nSELECT * FROM example_regional_rows\n  AS OF SYSTEM TIME follower_read_timestamp();\n\
    ```\n\n```\n  id                                   | city       | crdb_region\n\
    ---------------------------------------+------------+--------------\n  7b65d3fa-a0e1-4cd6-b125-05654a6fbce8\
    \ | Portland   | us-west1\n  d39ec728-cfc0-47e8-914c-fff493064071 | Des Moines\
    \ | us-central1\n  e6a0c79c-2026-4877-b24f-6d4d9dd86848 | Charleston | us-east1\n\
    ```\n\nIt’s also possible to enable follower reads within transactions using the\
    \ following syntax:\n\n```sql\nBEGIN;\nSET TRANSACTION AS OF SYSTEM TIME follower_read_timestamp();\n\
    SELECT * FROM example_regional_rows;\nCOMMIT;\n```\n\nUsing the `follower_read_timestamp()`\
    \ function is not only convenient but returns a timestamp that increases the likelihood\
    \ of your query returning data from the local region.\n\n## Follow-the-Workload\n\
    \nThe Follow-the-Workload topology is the default topology for clusters that do\
    \ not specify a table locality (e.g., regional by rows). They are a good choice\
    \ for scenarios where read latencies in the current most active region must be\
    \ low.\n\nIn a cluster using the Follow-the-Workload topology, CockroachDB will\
    \ move data to ensure that the busiest region for reads gets the required data."
