    \ 密钥，你可以加密更多区域：\n\n```\nBACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \  WITH kms = (\n    'aws:///****AUTH=implicit&REGION=eu-west-2'\n  );\n```\n\n\
    ```\n  job_id           |  status   | fraction_completed | rows | index_entries\
    \ | bytes\n-------------------+-----------+--------------------+------+---------------+-------\n\
    742839873407320065 | succeeded |         1          | 1055 |       65      | 76388\n\
    ```\n\n```\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/08-191858.46' IN\
    \ 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \  WITH kms = (\n    'aws:///****AUTH=implicit&REGION=eu-west-2'\n  );\n```\n\n\
    ```\n  job_id           |  status   | fraction_completed | rows | index_entries\
    \ | bytes\n-------------------+-----------+--------------------+------+---------------+-------\n\
    742840069222793217 | succeeded |         1          | 1000 |        0      | 52150\n\
    ```\n\n请注意，恢复的行数少于备份的行数。这是因为备份是针对整个集群进行的，而恢复操作仅针对 `sensor_reading` 表。\n\n如果你不想使用云提供商存储的密钥来加密备份，可以提供自己的密码用于加密。以这种方式加密备份的过程与使用云密钥加密非常相似：\n\
    \n```\nBACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \  WITH encryption_passphrase = 'correct horse battery staple';\n```\n\n```\n\
    \  job_id           |  status   | fraction_completed | rows | index_entries |\
    \ bytes\n-------------------+-----------+--------------------+------+---------------+-------\n\
    742837673818750977 | succeeded |         1          | 1046 |       48      | 69464\n\
    ```\n\n恢复过程也与 KMS 方式非常相似：\n\n```\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/08-190747.27'\
    \ IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    ```\n"
- fmt: "## Chapter 9 Production\n\nKEY=`****&AWS_REGION=eu-west-2'`\n\nWITH `encryption_passphrase`\
    \ = 'correct horse battery staple';\n\n`job_id` | `status` | `fraction_completed`\
    \ | `rows` | `index_entries` | `bytes`\n--- | --- | --- | --- | --- | ---\n742838121558212609\
    \ | succeeded | 1 | 1000 | 0 | 52150\n\n## Locality-Aware Backups\n\nTo make a\
    \ backup locality-aware, we simply need to pass some additional configuration\
    \ to the `BACKUP` command to make sure that backups remain in their respective\
    \ regions.\n\nLet’s create a new cluster using the demo command to simulate a\
    \ multiregion cluster.\n\nIn the following example, we specify that by default,\
    \ CockroachDB should back up to the us-west bucket, except for nodes with the\
    \ `us-east-1` locality, which will back up to the us-east bucket:\n\n```\nBACKUP\
    \ INTO (\n    's3://practical-cockroachdb-backups-us-west?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&COCKROACH_LOCALITY=default',\n\
    \    's3://practical-cockroachdb-backups-us-east?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&COCKROACH_LOCALITY=region%3Dus-east-1'\n\
    );\n\nRESTORE TABLE `sensor_reading` FROM '2022/06/29-183902.85' IN (\n    's3://practical-cockroachdb-backups-us-west?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=us-west-1&COCKROACH_LOCALITY=default',\n\
    \    's3://practical-cockroachdb-backups-us-east?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=us-east-1&COCKROACH_LOCALITY=region%3Dus-east-1'\n\
    );\n```\n\nKMS keys and encryption passphrases can be used in conjunction with\
    \ regional backups, making for flexible backup and restores with CockroachDB.\n\
    \n## Scheduled Backups\n\nIt’s safe to assume that you won’t want to manually\
    \ back up your cluster at midnight every night. That’s where CockroachDB’s backup\
    \ schedules come in. The following statement creates two backup schedules:\n\n\
    - **Weekly full backup** – A weekly full backup is created to ensure a clean baseline\
    \ backup for each week is captured.\n- **Daily incremental backup** – A daily\
    \ backup is created as per our instructions using `crontab` syntax.\n\n```\nCREATE\
    \ SCHEDULE cluster_backup\n    FOR BACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \    WITH revision_history\n    RECURRING '@daily'\n    WITH SCHEDULE OPTIONS\
    \ first_run = 'now';\n```\n\nThe output of this statement will contain information\
    \ for two newly created schedules:\n\n- **Weekly full backup:**\n    - ID: `742844058827390977`\n\
    \    - Status: `ACTIVE`\n- **Daily incremental backup:**\n    - ID: `742844058837024769`\n\
    \    - Status: `PAUSED`: Waiting for initial backup to complete\n\nOnce the initial\
    \ daily backup has finished, its status will go from `PAUSED` to `ACTIVE`. This\
    \ can be seen with a call to `SHOW SCHEDULES`:\n\n```\n$ cockroach sql --url \"\
    postgresql://localhost:26260\" --insecure \\\n--execute \"SHOW SCHEDULES\" \\\n\
    --format records\n-[ RECORD 1 ]\nid             | 742844058837024769\nlabel  \
    \        | cluster_backup\nschedule_status| ACTIVE\nnext_run       | 2022-03-13\
    \ 00:00:00+00\nrecurrence     | @weekly\n-[ RECORD 3 ]\nid             | 742844058827390977\n\
    label          | cluster_backup\nschedule_status| ACTIVE\nnext_run       | 2022-03-09\
    \ 00:00:00+00\nrecurrence     | @daily\n```\n\nOur daily backup job will next\
    \ execute tomorrow at midnight, whereas our weekly backup job will next execute\
    \ on Sunday.\n\nWe asked CockroachDB to start our first daily backup immediately.\
    \ This will unlikely be your desired behavior if creating the schedule in the\
    \ middle of the day. To set a different time for the first run to start, simply\
    \ replace the `first_run` value with a timestamp. For example:\n\n```\nCREATE\
    \ SCHEDULE cluster_backup\n    FOR BACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \    WITH revision_history\n    RECURRING '@daily'\n    WITH SCHEDULE OPTIONS\
    \ first_run = '2022-03-08 00:00:00+00';\n```\n\n## Cluster Design\n\nWhen designing\
    \ your cluster, there are numerous configurations you’ll need to decide between\
    \ to get optimal performance and resilience. In this section, we’ll focus on these\
    \ decisions and their trade-offs.\n\n### Cluster Sizing"
