    and includes things like referential integrity checks, index query plan analysis,
    and default value assignment checks. Let’s go through some of these now.


    Chapter 8 testing


    **Referential Integrity Checks**


    Referential integrity checks ensure that intertable dependencies prevent unexpected
    destructive operations. Let’s perform a few destructive operations to ensure the
    referential integrity of our database.


    First, we’ll try to delete everything from the retail.order, retail.product, and
    retail.


    product_price tables. Something that – without due care – could result in a bad
    day in the office:


