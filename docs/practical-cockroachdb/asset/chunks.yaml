    \ *pgxpool.Pool, selectLimit, updateLimit int) (d time.Duration, err error) {\n\
    \tstart := time.Now()\n\tvar lastID string\n\tfor {\n\t\tids, err := updateMultiPassSelect(db,\
    \ lastID, selectLimit)\n\t\tif err != nil {\n\t\t\treturn 0, fmt.Errorf(\"fetching\
    \ ids to update: %w\", err)\n\t\t}\n\t\tif len(ids) == 0 {\n\t\t\tbreak\n\t\t\
    }\n\t\tif err = updateMultiPassUpdate(db, ids, updateLimit); err != nil {\n\t\t\
    \treturn 0, fmt.Errorf(\"updating items: %w\", err)\n\t\t}\n\t\tif len(ids) <\
    \ 1000 {\n\t\t\tbreak\n\t\t}\n```\n"
- fmt: "# Chapter 9: Production\n\n## Cluster Maintenance\n\nThe cluster you originally\
    \ deploy to production on day one is unlikely to resemble the cluster you have\
    \ running after year one (and especially after year five). If you’re planning\
    \ your CockroachDB cluster years ahead, you\n\n- Are potentially paying for resources\
    \ you’re not making full use of\n- Are not taking full advantage of CockroachDB’s\
    \ scaling capabilities\n\nIn this section, we’ll create a small cluster of nodes\
    \ and perform the following cluster-wide operations:\n\n- Scale the cluster by\
    \ adding additional nodes.\n- Increment the version of CockroachDB.\n- Move the\
    \ cluster onto new nodes.\n\nWe’ll start with scaling the cluster. If your CockroachDB\
    \ deployment is running via Cockroach Cloud, this scenario is handled for you;\
    \ all cluster scaling is automatic. If your cluster is hosted in Kubernetes, it’s\
    \ as simple as follows:\n\n```yaml\napiVersion: apps/v1\nkind: StatefulSet\nmetadata:\n\
    \  name: cockroachdb\nspec:\n  serviceName: \"cockroachdb\"\n  replicas: 3 *#\
    \ => 5*\n  ...\n```\n\nFor the examples in this chapter, we’ll spin up a cluster\
    \ manually, so we have full control over each of the nodes. Let’s start with three\
    \ nodes in three separate command-line terminal sessions and then initialize it\
    \ with a fourth terminal. Note that I’m using different ports and stores in this\
    \ example because the cluster is running on one machine.\n\nIn reality, this cluster\
    \ will be running across multiple machines, so the only difference between the\
    \ node start command will be the join addresses:\n\n```bash\n$ cockroach start\
    \ \\\n--insecure \\\n--store=node1 \\\n--listen-addr=localhost:26257 \\\n--http-addr=localhost:8080\
    \ \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\n$ cockroach start\
    \ \\\n--insecure \\\n--store=node2 \\\n--listen-addr=localhost:26258 \\\n--http-addr=localhost:8081\
    \ \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\n$ cockroach start\
    \ \\\n--insecure \\\n--store=node3 \\\n--listen-addr=localhost:26259 \\\n--http-addr=localhost:8082\
    \ \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\n$ cockroach init\
    \ --insecure --host=localhost:26257\n```\n\nTime to scale it. CockroachDB was\
    \ designed to run anywhere, with scalability and survivability being its raison\
    \ d'etre. As such, scaling a CockroachDB cluster is almost comically simple:\n\
    \n```bash\n$ cockroach start \\\n--insecure \\\n--store=node4 \\\n--listen-addr=localhost:26260\
    \ \\\n--http-addr=localhost:8083 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
    ```\n\nIn the preceding command, we start a new node in the exact same way we\
    \ started the three initial (or “seed”) nodes. Every node in the cluster will\
    \ use the gossip protocol[^1] to communicate with one other to organize scaling.\
    \ The three seed nodes are all it takes to create the basis for this gossip network,\
    \ and they don’t need to be aware of additional nodes. This allows you to continue\
    \ to scale your cluster without making any changes to the configuration of the\
    \ seed nodes.\n\nRunning the command starts a fourth node, which immediately joins\
    \ the cluster, expanding its capacity.\n\n[^1]: [https://en.wikipedia.org/wiki/Gossip_protocol](https://en.wikipedia.org/wiki/Gossip_protocol)\n\
    \nBefore moving onto the next example, stop the nodes and remove their data directories\
    \ (e.g., `node1`, `node2`, and `node3`).\n\n---\n\n```sql\nlastID = ids[len(ids)-1]\n\
    }\nreturn time.Since(start), nil\n}\n```\n\nNow for the results. The difference\
    \ between the two methods isn’t as obvious as the `INSERT` example, but for the\
    \ reduced table locking, an additional performance bump is great:\n\n| Test name\
    \ | Duration |\n| :--- | :--- |\n| `updateontheFly` | 3.69s |\n| `updateMultipass\
    \ (selectLimit = 10,000, updateLimit = 1,000)` | **2.04s** |\n\nCheck out the\
    \ Cockroach Labs site for a great example of a multipass bulk-update operation\
    \ using Python. [2]\n\n[2]: www.cockroachlabs.com/docs/stable/bulk-update-data"
