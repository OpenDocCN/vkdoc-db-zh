    \ store, as is shown in Figure 6-2.\n\n![](index-149_1.jpg)\n\n**Figure 6-2.**\
    \ The Node 1 data stores\n\n# Chapter 7 Deployment Topologies\n\nIn this chapter,\
    \ we’ll explore some common cluster deployment topologies. Each will make sense\
    \ in different circumstances, depending on your environment, latency, and survivability\
    \ requirements.\n\nI’ll create an example cluster for many of the topologies listed\
    \ in this chapter to show you how it’s done. To balance clarity with succinctness,\
    \ I will manually create CockroachDB nodes for all of the examples in this chapter.\
    \ Depending on your infrastructure and preferred deployment and orchestration\
    \ technologies, you may prefer to deploy with Kubernetes or use Cockroach Cloud.\
    \ Note also that in this chapter, I aim to show just the relationships between\
    \ nodes. I won’t be deploying geographically separate nodes.\n\nI’ll reuse some\
    \ generated certificates and keys for all clusters to reduce repetition. I’ll\
    \ create these with the following commands:\n\n```bash\nmkdir certs\nmkdir keys\n\
    cockroach cert create-ca \\\n    --certs-dir=certs \\\n    --ca-key=keys/ca.key\n\
    cockroach cert create-node \\\n    --certs-dir=certs \\\n    --ca-key=keys/ca.key\
    \ \\\n    localhost\ncockroach cert create-client \\\n    root \\\n    --certs-dir=certs\
    \ \\\n    --ca-key=keys/ca.key\n```\n\n© Rob Reid 2022\nR. Reid, *Practical CockroachDB*,\
    \ [https://doi.org/10.1007/978-1-4842-8224-3_7](https://doi.org/10.1007/978-1-4842-8224-3_7)\n\
    \n## Single-Region Topologies\n\nWe’ll start with the single-region topologies.\
    \ These are recommended for small-scale clusters that serve users from a single\
    \ location. For example, these topologies will work for you if you’re a UK business\
    \ with only UK customers. Let’s explore them.\n\n### Development\n\nYou’ll likely\
    \ want to keep costs to a minimum during the course of development. For this reason,\
    \ Cockroach Labs acknowledges that a single-node cluster works well for this scenario,\
    \ if you are prepared to prioritize cost-savings and simplicity over resiliency.\
    \ The Development Topology defines exactly this: a CockroachDB cluster with a\
    \ single node.\n\nI would give a single-node cluster the following characteristics:\n\
    \n**Read latency** ★★★★★\nThe gateway node is also the leaseholder node for all\
    \ data, meaning no internode hops required.\n\n**Write latency** ★★★★★\nNo replication\
    \ latencies incurred.\n\n**Resiliency** ★\nA single-node cluster offers no protection\
    \ against machine or network failures.\n\n**Ease of setup** ★★★★★\nCan be installed\
    \ onto a machine on the local network or an E2C server, etc.\n\nA development\
    \ cluster like this will exhibit different performance characteristics to a distributed\
    \ cluster. Care should be taken to thoroughly test an accurate representation\
    \ of your production cluster before real users start interacting with your application.\n\
    \n### Basic Production\n\nOnce your application has users who depend on an available\
    \ database, a single-node cluster is no longer a viable topology. The Basic Production\
    \ topology defines a CockroachDB cluster with nodes in multiple availability zones\
    \ (AZs) in a single region.\n\nThe number of nodes you choose to deploy is up\
    \ to you, but in order to survive an outage of a single AZ, you’ll need at least\
    \ three nodes with a replication factor of three. In order to survive an outage\
    \ of two AZs, you’ll need at least five nodes with a replication factor of five.\n\
    \n![](index-152_1.png)\n\nThe architecture of a Basic Production topology will\
    \ typically resemble Figure 7-1.\n\n**Figure 7-1.** Architecture of a cluster\
    \ using the Basic Production topology\n\nLet’s look at some of the benefits and\
    \ drawbacks of a cluster using this topology:\n\n**Read latency** ★★★★★\nThe gateway\
    \ node is in the same region as the leaseholder nodes.\n\n**Write latency** ★★★★★\n\
    All replication occurs within the same region, so consensus is achieved quickly.\n\
    \n**Resiliency** ★★★\nCan survive single/multiple AZ outages depending on your\
    \ architecture, node count, and replication strategy.\n\n**Ease of setup** ★★★★\n\
    All nodes exist within a single region, so they can be easily orchestrated with\
    \ Kubernetes with little effort.\n\nNow, let’s create a cluster to simulate the\
    \ Basic Production topology. Let’s create a five-node cluster that can handle\
    \ an outage of two AZs:\n\n```bash\ncockroach start \\\n    --certs-dir=certs\
    \ \\\n    --store=node1 \\\n    --listen-addr=localhost:26257 \\\n    --http-addr=localhost:8080\
    \ \\\n    --locality=region=us-east1,zone=a \\\n    --join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,localhost:26261\n\
    \ncockroach start \\\n    --certs-dir=certs \\\n    --store=node2 \\\n    --listen-addr=localhost:26258\
    \ \\\n    --http-addr=localhost:8081 \\\n    --locality=region=us-east1,zone=b\
    \ \\\n    --join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,localhost:26261\n\
    \ncockroach start \\\n    --certs-dir=certs \\\n    --store=node3 \\\n    --listen-addr=localhost:26259\
    \ \\\n    --http-addr=localhost:8082 \\\n    --locality=region=us-east1,zone=c\
    \ \\\n    --join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,localhost:26261\n\
    \ncockroach start \\\n    --certs-dir=certs \\\n    --store=node4 \\\n    --listen-addr=localhost:26260\
    \ \\\n    --http-addr=localhost:8083 \\\n    --locality=region=us-east1,zone=d\
    \ \\\n    --join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,localhost:26261\n\
    \ncockroach start \\\n    --certs-dir=certs \\\n    --store=node5 \\\n    --listen-addr=localhost:26261\
    \ \\\n    --http-addr=localhost:8084 \\\n    --locality=region=us-east1,zone=e\
    \ \\\n    --join=localhost:26257,localhost:26258,localhost:26259,localhost:26260,localhost:26261\n\
    \ncockroach init --certs-dir=certs --host=localhost:26257\n```\n\nNext, we’ll\
    \ connect to the cluster and run some commands to ensure CockroachDB replicates\
    \ our data across the five nodes.\n\n```sql\ncockroach sql --certs-dir=certs\n\
    ALTER RANGE default CONFIGURE ZONE USING num_replicas = 5;\nCREATE TABLE example();\n\
    SELECT lease_holder_locality, replicas FROM [SHOW RANGES FROM TABLE example];\n\
    ```\n\n```\n  lease_holder_locality | replicas\n------------------------+-----------\n\
    \  region=us-east1,zone=e | {1,2,3,4,5}\n```\n\nThe increase in replicas from\
    \ three to five can take a minute or two to take effect, but once it has, you’ll\
    \ notice that CockroachDB uses all five of the nodes as replicas for data in the\
    \ `example` table. If we lose two of the five nodes, the remaining three will\
    \ still manage to achieve quorum.\n\n## Multiregion Topologies\n\nMultiregion\
    \ topologies are good for applications requiring a higher degree of failure tolerance.\
    \ I’d recommend these topologies for clusters that need to span larger geographic\
    \ areas, with customers in multiple locations. I’d also recommend these topologies\
    \ if your survival goals include the outage of an entire cloud region, regardless\
    \ of where your customers are situated. For example, if you’re an EU-based business\
    \ with customers in Europe and Asia, these topologies will work well. Let’s explore\
    \ them.\n\n### Regional Tables\n\nThe Regional Tables topology is a good choice\
    \ for scenarios where you need to pin data to specific regions. In this configuration,\
    \ you’ll ensure that data for users in a given region is always close to them,\
    \ making for fast local region reads and writes."
