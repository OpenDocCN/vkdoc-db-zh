    \treturn nil\n\t\t}\n\t\tupdateIDs = updateIDs[idCount:]\n\t}\n}\n\nfunc min(x,\
    \ y int) int {\n\tif x < y {\n\t\treturn x\n\t}\n\treturn y\n}\n```\n\n## updateMultiPass\n\
    \n最后，是函数本身。该函数\n\n*   通过 select 函数获取一批尚未处理的 ID，并将它们传递给 update 函数。\n*   如果在任何时候没有更多\
