    \ a simple CockroachDB cluster in Kubernetes, create the files described in each\
    \ of the following subsections. If you’d rather avoid handcrafting the following\
    \ files, you can apply a ready-made Kubernetes manifest from Cockroach Labs here:\
    \ [https://github.com/cockroachdb/cockroach/blob/master/cloud/kubernetes/cockroachdb-statefulset.yaml](https://github.com/cockroachdb/cockroach/blob/master/cloud/kubernetes/cockroachdb-statefulset.yaml)\n\
    \n### 1_pod-disruption-budget.yaml\n\nThis file creates the `PodDisruptionBudget`\
    \ resource for our StatefulSet. A Pod Disruption Budget provides Kubernetes with\
    \ a tolerance for pod failures against a given application (identified by the\
    \ selector “cockroachdb”). It ensures that there are never more than `maxUnavailable`\
    \ pods unavailable in the cluster at any one time. By setting this to 1, we’ll\
    \ prevent Kubernetes from removing more than 1 CockroachDB node during operations\
    \ like rolling updates, etc.\n\nIf you’re configuring a cluster of 5 nodes in\
    \ Kubernetes, consider setting this to 2, as you’ll still have a 3-node cluster\
    \ if 2 of your nodes are temporarily unavailable.\n\n```yaml\napiVersion: policy/v1\n\
    kind: PodDisruptionBudget\nmetadata:\n  name: cockroachdb-budget\n  labels:\n\
    \    app: cockroachdb\nspec:\n  selector:\n    matchLabels:\n      app: cockroachdb\n\
    \  maxUnavailable: 1\n```\n\nRun the following command to create the pod disruption\
    \ budget:\n\n```\n$ kubectl apply -f 1_pod-disruption-budget.yaml\n```\n\n###\
    \ 2_stateful-set.yaml\n\nNow we’re getting into the guts of our Kubernetes configuration.\
    \ It’s time to create our StatefulSet. A StatefulSet is like a deployment that\
    \ provides additional guarantees around pod scheduling to ensure that pods have\
    \ a persistent disk.\n\n```yaml\napiVersion: apps/v1\nkind: StatefulSet\nmetadata:\n\
    \  name: cockroachdb\nspec:\n  serviceName: \"cockroachdb\"\n  replicas: 3\n \
    \ selector:\n    matchLabels:\n      app: cockroachdb\n  template:\n    metadata:\n\
    \      labels:\n        app: cockroachdb\n    spec:\n      affinity:\n       \
    \ podAntiAffinity:\n          preferredDuringSchedulingIgnoredDuringExecution:\n\
    \          - weight: 1\n            podAffinityTerm:\n              labelSelector:\n\
    \                matchExpressions:\n                - key: app\n             \
    \     operator: In\n                  values:\n                  - cockroachdb\n\
    \              topologyKey: kubernetes.io/hostname\n      containers:\n      -\
    \ name: cockroachdb\n        image: cockroachdb/cockroach:v21.1.7\n        imagePullPolicy:\
    \ IfNotPresent\n        resources:\n          requests:\n            cpu: \"1\"\
    \n            memory: \"1Gi\"\n          limits:\n            cpu: \"1\"\n   \
    \         memory: \"1Gi\"\n        ports:\n        - containerPort: 26257\n  \
    \        name: grpc\n        - containerPort: 8080\n          name: http\n   \
    \     readinessProbe:\n          httpGet:\n            path: \"/health?ready=1\"\
    \n            port: http\n          initialDelaySeconds: 10\n          periodSeconds:\
    \ 5\n          failureThreshold: 2\n        volumeMounts:\n        - name: datadir\n\
    \          mountPath: /cockroach/cockroach-data\n        env:\n        - name:\
    \ COCKROACH_CHANNEL\n          value: kubernetes-insecure\n        - name: GOMAXPROCS\n\
    \          valueFrom:\n            resourceFieldRef:\n              resource:\
    \ limits.cpu\n              divisor: \"1\"\n        command:\n        - \"/bin/bash\"\
    \n        - \"-ecx\"\n        - >-\n          exec /cockroach/cockroach\n    \
    \      start\n          --logtostderr\n          --insecure\n          --advertise-host\
    \ $(hostname -f)\n          --http-addr 0.0.0.0\n```"
