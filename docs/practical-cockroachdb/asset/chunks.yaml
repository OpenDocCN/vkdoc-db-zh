  trans: "\n让我们来看看采用这种拓扑结构的集群的一些优点和缺点：\n\n### 读取延迟 ★★★★\n对于当前最繁忙区域内的数据读取会很快，而来自该区域外的读取则会较慢。\n\
    \n### 写入延迟 ★★\n数据在写入语句返回前会在各区域间进行复制。\n\n### 弹性 ★★★★★\n集群可以容忍可用区（AZ）和区域的故障。\n\n\
    ### 设置简易度 ★★★\n此拓扑是多区域集群的默认拓扑，因此不比任何其他多区域集群更困难。\n\n由于它是默认拓扑，我们无需做任何额外操作来显式启用它。\n\
