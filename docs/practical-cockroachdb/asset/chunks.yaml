    :1}\n```\n\n# 第六章 数据隐私\n\n数据隐私应该是无论身处世界何处、规模大小的企业都应关注的问题。虽然因安全措施实施不力而产生的处罚法律可能因国家而异，但保护用户是至关重要的。\n\
    \n在本主题中，我们将深入探讨 CockroachDB 如何帮助您为数据创建安全且合规的基础设施。\n\n## 全球法规\n\n没有任何一部数据隐私法可以管辖全世界。每个国家都有其自身的立法，并且可能随着时间的推移进行修订。这就形成了一个不断变化的格局，我们作为工程师需要跟上并保持合规。律师事务所\
    \ DLA Piper 维护了一个优秀的网站，按国家逐个概述了这一格局：`www.dlapiperdataprotection.com`。我将使用 DLA\
    \ Piper 的研究作为本部分内容的起点。\n\n我在本节中介绍的内容不应被视为法律建议。在为客户数据创建生产级 CockroachDB 集群之前，请咨询数据隐私专家。\n\
    \n以下是一些要点，让您了解这种合规挑战的复杂性：\n\n• 没有公认的成文标准可以全球性地认定数据应受保护。在一些监管严格的国家，个人身份信息（`PII`）的定义很明确，而在其他一些监管严格的国家，则根本没有定义。\n\
    \n• 在美国，数据隐私立法权下放给各州，这意味着每个州都可能有不同的数据隐私法。\n\n• 《加州消费者隐私法案》（`CCPA`）现已生效，成为首个全州范围的综合性隐私政策。虽然常与欧洲的《通用数据保护条例》（`GDPR`）相比较，但两者在细微但重要的方面存在差异：`GDPR`框架要求个人的“事先同意”，而`CCPA`框架赋予个人“选择退出”的权利。1\n\
    \n• `GDPR`将数据收集和处理的同意年龄定为 16 岁，但允许欧洲成员国根据需要降低这一年龄。因此，在欧洲，关于儿童数据保护没有统一的定义。2\n\n\
    • 脱欧后，英国制定了英国特定的`GDPR`，其内容与欧盟版本大体相同。然而，英国《2018 年数据保护法案》（`DPA`）的某些部分会影响`GDPR`所提供的规定。\n\
    \n• 在欧洲，对于何谓数据传输没有标准定义。因此，任何涉及数据的操作都被视为传输。\n\n法规及其差异的列表超出了本书的范围。然而，我希望通过分享上述要点，强调了在您运营或从其用户处收集或处理数据的任何国家了解数据隐私法律的重要性。\n\
    \n您的责任和义务将根据您被视为数据的处理者、控制者还是联合控制者而变化，因此理解两者之间的区别至关重要。在英国，`信息专员办公室`（`ICO`）提供了一个有用的清单来帮助您确定自己的角色。3\
    \ 简而言之，如果您决定收集数据并知晓处理数据的方式和原因，那么您就是控制者。\n\n1. [`www.cookiebot.com/en/ccpa-vs-gdpr-compliance-with-cookiebot-cmp`](http://www.cookiebot.com/en/ccpa-vs-gdpr-compliance-with-cookiebot-cmp)\n\
    2. [`www.clarip.com/data-privacy/gdpr-child-consent`](http://www.clarip.com/data-privacy/gdpr-child-consent)\n\
    3. [`https://ico.org.uk/for-organisations/guide-to-data-protection/guide-to-the-general-data-protection-regulation-gdpr/key-definitions/controllers-and-processors/`](https://ico.org.uk/for-organisations/guide-to-data-protection/guide-to-the-general-data-protection-regulation-gdpr/key-definitions/controllers-and-processors/)\n\
    \n您的责任和义务也会根据您处理的数据类型而变化。如果您存储的是医疗保健数据（例如患者姓名和健康状况），您将受到比在线零售环境中存储客户数据（例如客户电子邮件和实体地址）更严格的审查。\n\
    \n根据经验，如果您在多个国家运营，明智的做法是遵守数据隐私法律最严格的国家的规定，并将其应用到所有国家。\n\n此外，如果两个国家的规则存在冲突，您可能需要根据客户的所在国/州，为每个客户单独实施相应的规则。\n\
    \n尽管驾驭数据隐私的复杂水域仍然是所有数据库用户需要考虑的重要问题，但 CockroachDB 的传输中加密、静态加密和地理分区功能使得这种复杂性更易于管理。\n\
    \n## 特定地点的考量因素\n\n在本节中，我们将更详细地探讨在跨地域运营以及面临影响您合规责任的不同情况时，您需要考虑的因素。\n\n### 拥有英国和欧洲客户的英国公司\n\
    \n如果您是一家总部位于英国的公司，并且拥有英国和欧盟的客户，您将受到`GDPR`和`UK-GDPR`的约束。脱欧后，英国采纳了原始`GDPR`框架的所有原则，这意味着如果您满足`GDPR`要求，您将在欧盟和英国都保持合规。\n\
    \n© Rob Reid 2022\nR. Reid, *Practical CockroachDB*, [`doi.org/10.1007/978-1-4842-8224-3_6`](https://doi.org/10.1007/978-1-4842-8224-3_6#DOI)\n"
- fmt: '# Chapter 6 Data privaCy


    On June 28, 2021, the European Commission acknowledged that the personal data
    of European citizens could be safely stored in the UK via two adequacy decisions[.4](#index_split_001.html#p136)
    As a result, you are free to store data either in the UK or the EU. As personal
    data can flow freely into and out of the UK, you have flexibility as to how your
    cluster is architected:


    - **Process all customer data in the UK** – To keep your infrastructure costs
    and complexity down, you could run your cluster within a single region in the
    UK. Owing to the proximity of the UK to the rest of Europe, latencies to central
    Europe will be between 12ms and 33ms depending on your cloud provider. Visit `www.cloudping.co/`
    for a latency grid for `AWS` regions.

    - **Process all customer data in the EU** – For the same reason that housing all
    data within a single UK region will keep costs down and infrastructure simple,
    housing all data within a single EU region can also be a good option.

    - **One cluster with nodes close to your users** – `CockroachDB`’s ability to
    scale horizontally across regions would work well in this scenario. You can create
    a cluster of database nodes across multiple regions and place nodes near your
    customers, wherever they are in the UK or Europe.


    ## European Company with European and American Customers


    If you are a Europe-based company and have customers in Europe and the United
    States, you will be subject to both `GDPR` and the states'' regulations in which
    you have customers in the United States.


    As `GDPR` is currently more restrictive than any US data privacy framework (including
    `CCPA`), applying `GDPR` for both your European and US customers could make sense.


    You have three main options regarding the location of stored data:


    - **Process all customer data in Europe** – Schrems II protects Europeans from
    US government surveillance, so storing US customer data in EU data centers is
    more straightforward than storing EU customer data in US data centers. The obvious
    drawback of this approach is the latency US customers will face if their requests
    are hitting EU database nodes directly.

    - **One cluster with geographically separated nodes** – If you’d like to run a
    single, multiregion cluster, you could use geo-partitioning to separate EU and
    US customer data.

    - **Multiple isolated clusters** – If you’d rather keep EU and US customer data
    completely isolated, you could run two clusters: one in the EU and one in the
    United States.


    Each of these options has benefits and trade-offs. I would either run a single
    geo-partitioned cluster or multiple isolated clusters in this scenario.


    ## American Company with American Customers


    If you are a US-based company with just US customers, you’ll need to consider
    the various state regulations around the country.


    At the time of writing, there are three comprehensive frameworks in use in the
    United States: `CCPA`, `VCDPA`, and `ColoPA` for customers in California, Virginia,
    and Colorado, respectively. Each framework provides a different level of protection
    for customers. For example, `VCDPA` received input from Amazon and so works for
    businesses rather than customers. [5](#index_split_001.html#p138)


    As with the EU/US example, rather than trying to achieve compliance with a growing
    number of very different data privacy frameworks, it makes sense to aim for compliance
    with the most restrictive framework. We’ve identified that `VCDPA` is not a customer-centric
    framework, so we know that `CCPA` will be the more restrictive framework, but
    what about `ColoPA`? `CCPA` gives customers *some* ability to sue companies over
    negligence concerning data handling, but `ColoPA` offers no such ability.


    Applying `CCPA` for customers outside of California makes sense for the same reason
    that applying `GDPR` for US customers makes sense; it’s the more restrictive data
    privacy framework.


    ## American Company with American and European Customers


    On July 16, 2020, Schrems II came into effect. [6 I](#index_split_001.html#p138)t
    found the possibility of US government surveillance under the Foreign Intelligence
    Surveillance Act (`FISA`) a sufficient enough threat to the data privacy of EU
    citizens to invalidate the EU-US Data Protection Shield that had been in place.


    As a result, a US company wishing to store data on EU customers must comply with
    `GDPR` legislation. In this knowledge, it would be wise to separate US and EU
    customer data in this scenario. If we need to do any analytical processing of
    the data in the United States, it would be acceptable to take an anonymized copy
    of EU customer data and store that in the United States.


    There are many ways we could design a compliant database infrastructure for this
    scenario. Let’s review two options:


    - **Multiple isolated clusters** – This is the safest way to operate in this scenario,
    as cluster information, credentials, and certificates remain separate.

    - **One cluster with geographically separated nodes** – Besides separating the
    nodes, we could also implement a mechanism to prevent EU data from leaving Europe.
    This could be as simple as a view that gives US services access to US data.


    ## A Non-Chinese Company with Chinese Customers


    On November 1, 2021, China implemented its first comprehensive data privacy framework,
    the Personal Information Protection Law (`PIPL`). Like the `CCPA`, the `PIPL`
    resembles the `GDPR`, but unlike the `GDPR` and `CCPA`, which are focused on individual
    and consumer rights, respectively, the `PIPL` is focused on national securit[y.7](#index_split_001.html#p139)


    A company wishing to store the data of Chinese customers must do so within China
    itself. For us, this means running `CockroachDB` nodes in China. Any company needing
    to process Chinese customer data outside of China must undergo a national security
    review before doing so[.8](#index_split_001.html#p139)


    Unless you are a Chinese business, hosting infrastructure in China is not straightforward.
    An account on `AWS` will not be sufficient to deploy software to China. You will
    need to create a separate account on the Chinese `AWS` site `amazonaws.cn` by
    providing Information Security identification and a business registration certificate.


    To physically host a site in Mainland China, a company must have a registered
    Chinese company and complete an `ICP` (Internet Content Provider) Commercial License.
    [9](#index_split_001.html#p139)


    ## Personally Identifiable Information


    Personally Identifiable Information (`PII`) is a golden ticket to large fines
    to companies who mishandle it. While the definition of `PII` may change from country
    to country, you can think of it as being any personal information that could potentially
    identify someone. For example, names, addresses, and financial and geographic
    information could all be used to identify someone.'
