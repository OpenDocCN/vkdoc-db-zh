    **JSONB**


    The JSONB, JSON data type stores arbitrary JSON objects and is ideal for storing
    semi-structured data (data that has a structure that doesn’t fit or may outgrow
    your relational database tables). JSONB columns can be created as follows:


    CREATE TABLE song (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    details


    JSONB NOT NULL


    );


    If you plan on performing complex queries against a JSON column, you’ll want to
    create an inverted index for the column. I’ll cover these in a subsequent chapter
    on performance.


    To insert data into a JSONB column, simply provide a JSON string as follows: INSERT


    INTO song (details)


    VALUES


    (''{"label": "Century Media", "release_date": "2004-09-20"}''), (''{"label": "Season
    of Mist", "release_date": "2010-02-15"}''), (''{"label": "Season of Mist", "release_date":
    "2016-02-12"}''); JSON columns are very flexible. You can query their fields and
    select specific values to return. Let’s do both now. The following query returns
    the release dates of songs released under the “Season of Mist” record label as
    string values:


    Chapter 3 ConCepts


    SELECT


    details->>''release_date'' AS release_date


    FROM


    song


    WHERE


    details @> ''{"label": "Season of Mist"}'';


    release_date


    2010-02-15


    2016-02-12


    To access specific JSON fields as regular columns, create indexes or even create
    PRIMARY KEYs from JSON fields within JSON documents; this is also possible with
    the JSON data type.


    The following CREATE statement recreates the table, but this time, its id and
    label columns are from fields in the details JSON column:


    CREATE TABLE song (


    id


    UUID PRIMARY KEY AS ((details->>''id'')::UUID) STORED,


    label


    TEXT AS ((details->>''label'')::TEXT) STORED,


    details


    JSONB NOT NULL,


    INDEX (label),


    INVERTED INDEX idx_details(details)


    );


    INSERT


    INTO song (details)


    VALUES


    (''{"id":"60d28ed4-ee97-43d5-98a7-ba42d478f4c7", "label": "Century Media", "release_date":
    "2004-09-20"}''),


    (''{"id":"4b158ac6-386d-4143-8281-ca6f0f9c9a93", "label": "Season of Mist", "release_date":
    "2010-02-15"}''),


    (''{"id":"c82dc39d-f310-45a4-9a31-805d923f1c8e", "label": "Season of Mist", "release_date":
    "2016-02-12"}'');


    Chapter 3 ConCepts


    We can now treat the *id* and *label* columns exactly as we’d treat any other
    database column:


    SELECT


    id,


    label,


    details->>''release_date'' release_date


    FROM


    song


    WHERE


    label = ''Season of Mist'';


    **SERIAL**


    The SERIAL data type is not strictly a data type but rather an INT, INT2, INT4,
    or INT8


    with a default value applied, resulting in an auto-incrementing number. SERIAL
    was introduced to CockroachDB to provide Postgres compatibility. As such, you
    should consider using the UUID data type with a default value of gen_random_uuid()
    instead of the SERIAL data type, as this provides 128 bits of randomness vs. SERIAL’s
    maximum of 64 bits.


    SERIAL columns can be created as follows:


    CREATE TABLE random (


    r1


    SERIAL2, *-- 16-bits AKA SMALLSERIAL*


    r2


    SERIAL4, *-- 32-bits*


    r3


    SERIAL8 *-- 64-bits AKA SERIAL or BIGSERIAL*


    );


    Inserting data into this table will reveal that close attention to the SERIAL


    documentation[3 is r](#index_split_000.html#p62)equired to fully understand the
    nuances of this data type: 3 [www.cockroachlabs.com/docs/stable/serial.html](http://www.cockroachlabs.com/docs/stable/serial.html)


    Chapter 3 ConCepts


    INSERT


    INTO random


    DEFAULT VALUES;


    SELECT * FROM random;


    r1 | r2 | r3


