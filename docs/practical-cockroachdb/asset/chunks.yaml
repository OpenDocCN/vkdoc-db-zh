    **INSERT Performance**


    In this section, we’ll look at some performance best practices and why you’ll
    want to follow them. We’ll start by performing some INSERT statements to see why
    it’s important to use multirow DML statements over single-row DML statements.


    First, we’ll create a database and a table:


    CREATE TABLE sensor_reading (


    sensor_id UUID PRIMARY KEY,


    reading DECIMAL NOT NULL,


    timestamp TIMESTAMPTZ NOT NULL DEFAULT NOW()


    );


    Next, we’ll write a script to simulate the bulk insertion of 1000 rows and compare
    the performance of doing it via single and multirow DML statements.


    I’ll use Go for these tests, so my imports and main function look as follows:
    package main


    import (


    "context"


    "fmt"


    3 [www.cockroachlabs.com/docs/stable/cockroach-start#flags](http://www.cockroachlabs.com/docs/stable/cockroach-start#flags)


    4 [www.cockroachlabs.com/docs/stable/recommended-production-settings.html](http://www.cockroachlabs.com/docs/stable/recommended-production-settings.html)


    Chapter 9 produCtion


    "log"


    "time"


    "github.com/google/uuid"


    "github.com/jackc/pgx/v4/pgxpool"


    )


    func main() {


    connStr := "postgres://root@localhost:26257/best_


    practices?sslmode=disable"


    db, err := pgxpool.Connect(context.Background(), connStr)


    if err != nil {


    log.Fatalf("error connecting to db: %v", err)


    }


    defer db.Close()


    ...


    }


    Next, we’ll implement the single-row DML INSERT code. This code will make 1000


    separate requests (involving 1000 separate network hops) to insert a row into
    the sensor_


    reading table and time how long the complete operation takes:


    func insertSingleRowDML(db *pgxpool.Pool, rows int) (time.Duration,


    error) {


    const stmt = ÌNSERT INTO sensor_reading (sensor_id, reading) VALUES


    ($1, $2)`


    start := time.Now()


    for i := 0; i < rows; i++ {


    if _, err := db.Exec(context.Background(), stmt, uuid.New(),


    1); err != nil {


    return 0, fmt.Errorf("inserting row: %w", err)


    }


    }


    return time.Since(start), nil


    }


    Chapter 9 produCtion


    Next, we’ll perform the single-row INSERT statements in batches. This will send
    multiple INSERT statements to CockroachDB at the same time and execute them in
    a single transaction. It’s important to consider breaking large inserts into smaller
    ones when bulk-inserting data because the more data you’re inserting, the longer
    you’ll lock the table you’re inserting into. The following function allows me
    to execute batch inserts in small, concurrent chunks:


    func insertSingleRowDMLBatched(db *pgxpool.Pool, rows, chunks int) (time.


    Duration, error) {


    const stmt = ÌNSERT INTO sensor_reading (sensor_id, reading) VALUES


    ($1, $2)`


    start := time.Now()


    eg, _ := errgroup.WithContext(context.Background())


    for c := 0; c < chunks; c++ {


    eg.Go(func() error {


    batch := &pgx.Batch{}


    for i := 0; i < rows/chunks; i++ {


    batch.Queue(stmt, uuid.New(), i)


    }


    res := db.SendBatch(context.Background(), batch)


    if _, err := res.Exec(); err != nil {


    return fmt.Errorf("running batch query insert:


    %w", err)


    }


    return nil


    })


    }


    if err := eg.Wait(); err != nil {


    return 0, fmt.Errorf("in batch worker: %w", err)


    }


    return time.Since(start), nil


    }


    Chapter 9 produCtion


    Note that this implementation is still executed as single-row DML in the database.


    The difference between this implementation and the first, however, is that there
    are now far fewer network hops, making for faster end-to-end queries.


    If we really want to see performance gains from our queries, we’ll need to execute
    multirow DML statements. The following does just that, with the help of two additional
    functions. The first helper function is called counter, and its job is to simply
    return an incremented number every time it’s called:


