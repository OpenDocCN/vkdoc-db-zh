    ```\n\n## 测试应用程序\n\n让我们编写一些 `curl` 命令来测试 API（并在此过程中测试数据库）。在这一测试阶段，我们不仅需要断言数据库在接收到预期数据时行为符合预期，还需要断言它在接收到*非预期*数据时行为也符合预期。这些通常被称为边界测试。\n\
