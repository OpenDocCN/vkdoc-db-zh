    Subsequent queries will perform faster because of caching, but the design of our
    cluster topology is not currently optimal. There are various ways this can be
    improved upon:


    - `Views` – If some of your users require access to real-time global data, you
    could consider placing some geographically sensitive data behind views and have
    regional users connect to their local cluster with a region-specific database
    user. The view would expose just the data that’s closest to the user, meaning
    no globally distributed queries. We did just this in the “Restrict Table Data”
    section in Chapter 5.

    - `Separate clusters` – If you need compliant, global reach but not necessarily
    global data (e.g., one, globally queryable database), you could create separate
    clusters that only span regions that are close to one another (e.g., `us-west1`,
    `us-central1`, and `us-east1`). This way, you’ll achieve data privacy compliance
    and regional resilience. If you need access to all of global data but don’t necessarily
    need it in real time, you could configure CDC to update the data in a centralized
    store asynchronously. Just as we did in the “Watching for Database Changes” section
    in Chapter 5.


    ### Summary


    You’ll need to carefully design your production cluster to get the best out of
    it. The following points will help you cover the fundamentals:


    - `Read latencies` – Read latencies are good across the majority of topologies.
    When designing your cluster, consider the implications of pinning data to specific
    regions if you’re not locking data into those regions with something like views.
    A query for all data in a geo-partitioned database will result in cross-regional
    reads and increased latencies.

    - `Write latencies` – Write latencies between topologies vary to a greater degree
    than read latencies. There are latency implications to consider when using cross-region
    replication. If you require regional resilience, consider replicating to a set
    of local regions (e.g., replicating `europe-west1` data to `europe-north1` and
    `europe-central1`, for example, rather than to `australia-southeast2` and `us-west1`).

    - `Testing` – The best way to test your cluster and any applied topology patterns
    is to spin up a real-world cluster and monitor its performance. If this is not
    possible, you can simulate globally distributed clusters with the `--demo` command
    or by using Docker and the HAProxy container.


    ## Chapter 8 Testing


    In this chapter, we’ll explore some techniques for testing your database, whether
    it’s on your machine, in your CI/CD pipeline, ready for production, or already
    in production.


    It’s easy to overlook the database during application testing. The test areas
    to neglect during development time are numerous. I’ll share a real-world example
    with you to highlight the importance of having a test strategy when a database
    is involved.


    While developing my first database-backed application, I created a dataset with
    all row combinations I thought my application would need to support. Whenever
    I learned of a new requirement, I updated the dataset, and everything seemed to
    work as expected. Right up to the point where I deployed to production and saw
    production amounts of data. My application was sluggish and grew increasingly
    sluggish over the days that followed its deployment.


    In this example, I’d neglected to test one significant thing in my database: indexes.


    With my small (but seemingly comprehensive) dataset, I’d developed a false sense
    of confidence that my application and database were ready for production. The
    moment it saw production amounts of data, the missing index reared its ugly head,
    and my application grew steadily slower.


    There are many things you’ll want to get your application and database ready for
    before they come anywhere near your users. There are three high-level types of
    database tests you’ll want to consider to ensure comprehensive test coverage:


    - `Structural testing` – Focuses on everything that makes up your database, its
    schemas, tables, columns, and views.

    - `Functional testing` – Focuses on the functionality of your databases. In this
    stage of testing, you’ll ask questions like “how do CRUD operations against its
    tables affect the resulting state of data?”

    - `Nonfunctional testing` – Focuses on everything else (performance and security,
    etc.).


    Before we get onto testing, let’s create a basic (and very contrived) database
    and work through some testing scenarios together to assert its correctness. First,
    we’ll create a local cluster to more or less mirror a three-node Basic Production
    topology cluster:

    ```

    $ mkdir certs

    $ mkdir keys

    $ cockroach cert create-ca \

    --certs-dir=certs \

    --ca-key=keys/ca.key


    $ cockroach cert create-node \

    --certs-dir=certs \

    --ca-key=keys/ca.key \

    localhost


    $ cockroach start \

    --certs-dir=certs \

    --store=node1 \

    --listen-addr=localhost:26257 \

    --http-addr=localhost:8080 \

    --locality=region=us-east1,zone=a \

    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \

    --certs-dir=certs \

    --store=node2 \

    --listen-addr=localhost:26258 \

    --http-addr=localhost:8081 \

    --locality=region=us-east1,zone=b \

    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \

    --certs-dir=certs \

    --store=node3 \

    --listen-addr=localhost:26259 \

    --http-addr=localhost:8082 \

    --locality=region=us-east1,zone=c \

    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach init \

    --certs-dir=certs \

    --host=localhost:26257


    $ cockroach cert create-client \

    root \

    --certs-dir=certs \

    --ca-key=keys/ca.key

    ```


