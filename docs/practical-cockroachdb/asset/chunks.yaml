    f8a19a8f-c40c-4b6d-b186-18688f020f2b | 0.000030


    Now, let’s recreate the table and provide a precision and scale for the DECIMAL


    column this time. The DECIMAL column type now takes two arguments: the first defines
    the precision of the value, and the second defines the scale. The precision argument
    tells CockroachDB the maximum number of integral digits (digits to the left of
    the decimal point) and fractional digits (digitals to the right of the decimal
    point):


    CREATE TABLE person (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    bitcoin_balance


    DECIMAL(16, 8) NOT NULL


    );


    Inserting some values into this table will reveal that all eight of the fractional
    digits are used:


    INSERT


    INTO person (bitcoin_balance)


    VALUES


    (0.000030),


    (0.80),


    (147.50);


    SELECT * FROM person;


