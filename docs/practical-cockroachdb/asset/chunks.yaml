    ## 第 1 章：CockroachDB 的缘起


    数据库是几乎所有有状态系统的关键部分。然而，正确运行它们可能具有挑战性，尤其是在价格、可用性和不断变化的国际数据隐私法规方面。CockroachDB 使得驾驭这一棘手领域不仅更容易，而且令人愉悦。


    在本章中，我们将探讨 CockroachDB 的 *为什么*——它为何诞生，以及你可能想考虑将其用于你的数据的原因。


    ### 什么是 CockroachDB？


    CockroachDB 是一个云原生的关系数据库管理系统（`RDBMS`）。它属于“NewSQL”或“DistSQL”（分布式 SQL）数据库类别，旨在提供
    NoSQL 数据库的可扩展性，同时为用户提供传统 SQL 数据库的体验和功能。它在协议上与 Postgres 兼容，这意味着你可以使用大多数 Postgres
    工具和驱动程序连接到 CockroachDB 集群。要了解哪些驱动程序可用，请访问 [www.cockroachlabs.com/docs/stable/install-client-drivers.html.](http://www.cockroachlabs.com/docs/stable/install-client-drivers.html)


    理论上，CockroachDB 是“CP”，在 `CAP 定理` 的语境下，意味着它在面对网络 **P** 分区时，更倾向于数据的 **C** 一致性而非
    **A** 可用性。然而在现实中，正如其名所示，CockroachDB 在构建时也考虑了可用性。


    实际上，如果你丢失了 CockroachDB 集群中的大多数副本，为了维护数据的完整性，请求将被阻塞，直到节点恢复。因此，调整集群规模以确保在节点丢失时 CockroachDB
    能继续运行，是保障可用性的基本要素。


    Cockroach Labs——CockroachDB 背后的公司——由 Spencer Kimball、Peter Mattis 和 Ben Darnell
    于 2015 年创立。受 Google 的 Spanner 数据库的启发，团队致力于将 Spanner 级别的可扩展性带给大众，消除 Spanner 对原子钟的依赖，并使用高效、现代且日益普及的
    Go 编程语言进行编写。


    它让你无需数据库部门即可创建多区域数据库。重要的是，它也是一个安全网，使得错误创建这种多区域数据库变得更加困难。


    ### CockroachDB 的架构


    CockroachDB 使用 `Raft 共识` 算法为用户提供一个多活系统，这意味着每个节点都是相同的。没有特殊的“活动”、“领导者”或“写入”节点。每个节点都可以接收不同数据分片（或“range”）的部分读写请求，这有助于
    CockroachDB 进行水平扩展。


    在底层，CockroachDB 是一个分布式键/值存储。但得益于其 SQL > 事务 > 分布式 > 复制 > 存储的分层架构，你可以像使用任何其他 `RDBMS`
    一样丰富地与数据进行交互。


    ### CockroachDB 解决什么问题？


    创建一个新的数据库相对容易，无论采用何种技术。你下载一个二进制文件，拉取一个 Docker 镜像，或开始一个订阅，然后就可以开始了。另一方面，你通常将传统数据库安装在单台机器上，当它无法满足需求时，需要对其进行垂直扩展、分片或添加读取副本。所有这些需求都带来了复杂性、可用性和一致性方面的挑战。


    有了 CockroachDB，复杂性和可靠性的挑战就转移到了数据库本身。它负责处理分布式、扩展和复制，让你专注于你的数据。一般来说，如果一个集群需要更多容量，你只需向该集群添加一个节点。CockroachDB
    会自动将数据均匀地重新分配到所有节点上。


    图 1-1 描绘了一个三节点集群，每个节点容量为 100GB，共享 120GB 总数据中的 40GB。


    ![](img/index-17_1.png)


    ***图 1-1.** 一个三节点集群*


    在图 1-2 中，你会看到当我们添加一个节点时，集群中的数据将在所有四个节点上重新平衡，120GB 总数据中每个节点的份额变为 30GB。


    ![](img/index-18_1.png)


    ***图 1-2.** 同一个集群，在四个节点上重新平衡*


    ### CockroachDB 适用于谁？


    对于需要可扩展、可靠且分布式的在线事务处理（`OLTP`）数据库的任何人来说，CockroachDB 都是一个绝佳的选择。它专为现代、基于云的基础设施和工作负载而构建，无论是在云中、本地还是两者的混合环境中，它都能很好地适应。


    如果你不确定数据库存储需求，它也是一个很好的选择。你可以从小规模开始，随着数据的增长逐个节点地扩展集群。CockroachDB 将确保你的数据在不断增长的集群中均匀且安全地分布。


    如果你熟悉 `RDBMS`，CockroachDB 会让你感到熟悉。对于 Postgres 用户，你甚至可能会发现 CockroachDB 可以直接替换你的数据库。


    正如你将很快看到的，无论你是想创建一个本地开发数据库还是分布式生产数据库，CockroachDB 的安装都几乎没有麻烦。


    CockroachDB 被世界上一些最大的科技、金融、旅行、零售、电信、视频流媒体和游戏公司信任，用于运行关键的、全球分布式的工作流程。它在 [`db-engines.com/en/ranking`](https://db-engines.com/en/ranking)
    上的排名也在不断提高。它现在比启发它的 Google Spanner 数据库更受欢迎。


    ## 第 2 章：安装 CockroachDB


    CockroachDB 的众多优势之一就是安装简便。在本章中，我们将探讨 CockroachDB 的许可模式以及各种安装方法。


    ### 许可证


    我们首先介绍 CockroachDB 的许可选项，以熟悉每个选项提供的内容。有免费和付费模式，你的模式选择将取决于你的需求以及每个选项中可用的功能。


    #### 免费


    有两种免费选项可供选择。一种是 CockroachDB Core 功能的本地安装，另一种是云服务：


    *   **CockroachDB Core** —— 构建和弹性扩展分布式数据库，包含许多最关键的功能作为标准；如果你不需要 CockroachDB 的一些更高级功能，这是一个不错的选择。你需要将此选项安装到基于云或本地的硬件上。

    *   **CockroachDB Serverless（免费层）** —— 注册并在云中创建一个免费的 CockroachDB 集群。在撰写本文时，此云选项提供与
    CockroachDB Core 类似但略有局限的功能，将用户限制为多租户、单节点机器，配备 1 个 vCPU 和 5GB 存储。


    #### 付费


    为了解锁 CockroachDB 所提供的一切（并支持 Cockroach Labs 继续构建未来的数据库），提供以下付费模式：


    *   **CockroachDB Self-Hosted** —— 完整的 CockroachDB 产品，用于基于云或本地的安装。具备地理分区和归档分区、增量备份、静态加密、变更数据捕获以及来自
    Cockroach Labs 的直接支持等高级功能。

    *   **CockroachDB Dedicated** —— 云中的完整 CockroachDB 产品。除了 CockroachDB Enterprise
    外，它还提供 SLA 和特定于云的选项，如 VPC 对等连接。


    使用上述任何许可证的决定将取决于你的需求。在以下每个安装选项中，我将提供许可模式的回顾，以帮助你决定哪个最适合你的需求。


    ### CockroachDB Core


    从版本 19.2 开始，CockroachDB Core 受多种许可证约束。一些功能保留了原来的 Apache 2.0 许可证，这意味着它是完全开源的。其他功能受
    Cockroach Community License 约束，该许可证保护 Cockroach Labs 免受公司使用其代码构建不使 Cockroach Labs
    受益的产品的影响。


    简而言之，如果你计划使用 CockroachDB Core 的免费功能来驱动自己的数据库，并且不打算向他人销售 CockroachDB 即服务，那么 CockroachDB
    Core 是你的不错选择。


    ### 本地安装


    在本节中，我将向你展示如何在本地机器上安装 CockroachDB。对于每种安装方法，为了简洁起见，我们将以不安全配置运行 CockroachDB，这意味着**没有身份验证或加密**。这对于本地开发数据库是可以接受的，但对于其他任何情况则不行。一旦我们安装并测试了本地不安全部署，我们将转向一些真实世界的安全实现。


    #### 二进制安装


    根据你的操作系统，可以通过多种方式安装 `cockroach` 二进制文件。


    对于 Linux 用户，运行以下命令开始：


    ```

    $ curl https://binaries.cockroachdb.com/cockroach-v21.1.7.linux-amd64.tgz | tar
    -xz

    $ sudo cp cockroach-v21.1.7.linux-amd64/cockroach /usr/local/bin/

    ```


    对于 Mac 用户，运行以下命令开始：


    ```

    $ brew install cockroachdb/tap/cockroach

    ```


    对于 Windows 10 用户，运行以下命令开始：


    ```

    $ curl -o cockroach-v21.1.7.windows-6.2-amd64.zip https://binaries.cockroachdb.com/cockroach-v21.1.7.windows-6.2-amd64.zip

    $ powershell.exe -NoP -NonI -Command "Expand-Archive ''.\cockroach-v21.1.7.windows-6.2-amd64.zip''
    ''.''"

    ```


    然后进入（`cd`）`cockroach-v21.1.7.windows-6.2-amd64` 目录，并在需要时调用 `cockroach` 可执行文件；或者将其所在目录添加到你的
    `PATH` 中，从任何目录调用 `cockroach` 可执行文件。


    现在 `cockroach` 可执行文件已可用，你可以使用以下命令启动 CockroachDB 的本地实例：


    ```

    $ cockroach start-single-node --insecure --listen-addr=localhost

    ```


    我们刚刚启动了一个单节点、不安全的集群，监听 `localhost`，SQL 连接的默认端口是 `26527`，HTTP 连接的端口是 `8080`。


    要测试 CockroachDB 是否已启动并运行，请使用 `cockroach sql` 命令进入 CockroachDB SQL shell。注意，可以省略
    `--host` 参数，因为默认值假设是本地运行的节点使用默认端口：


    ```

    $ cockroach sql --insecure

    #

    # 欢迎使用 CockroachDB SQL shell。

    # 所有语句必须以分号结尾。

    # 退出，请输入: \q。

    #

    # 服务器版本: CockroachDB CCL v21.1.7 (x86_64-pc-linux-gnu, built 2021/09/01 14:32:57,
    go1.15.13)

    # 集群 ID: d83a0740-4616-4b2a-8003-82ea5e394548

    #

    # 输入 \? 获取简要介绍。

    #

    root@localhost:26257/defaultdb> \q

    ```


    你现在已经安装并启动了一个本地的单节点 CockroachDB 集群。我们将在本章后面介绍更复杂的集群配置。

