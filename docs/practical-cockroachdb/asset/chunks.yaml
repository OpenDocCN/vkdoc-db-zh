- fmt: '# Chapter 6 Data Privacy


    ## At Rest


    Encryption at rest is an Enterprise feature of CockroachDB. It will encrypt data
    on-disk transparently, meaning a user with proper access to the data will never
    be aware that encryption took place.


    CockroachDB uses the Advanced Encryption Standard (AES) algorithm to encrypt data
    with a key size of either 128, 192, or 256 bits.


    To generate an encryption key, simply invoke the `gen` command of the `cockroach`
    binary.


    The following command generates a 256 AES key that we’ll use for the rest of this
    chapter:


    ```

    $ cockroach gen encryption-key -s 256 keys/enc.key

    ```


    You must manage this key securely. If it gets into the wrong hands, your data
    will be available to anyone with access to your CockroachDB nodes. Cockroach Labs
    has the following recommendations for managing encryption keys:


    *   Only the UNIX user running the CockroachDB process should have access to encryption
    keys.

    *   You should not store encryption keys in the same place as your CockroachDB
    data. Something like HashiCorp’s Vault would be a good candidate for this.

    *   Rotate encryption keys regularly. Every few months to months.


    ## Database Encryption


    Database encryption involves encrypting all of the tables within a database. If
    you are unsure whether specific tables need encrypting or not, this is a sensible
    option, as it ensures everything is encrypted.


    First, let’s create some nodes. With one difference, these commands are similar
    to the commands we used to start the nodes in the encryption in-transit section.
    In the following commands, we provide an additional `--enterprise-encryption`
    argument that tells CockroachDB that we’ll be using Enterprise encryption features.


    The `--enterprise-encryption` argument uses key-value pairs to configure encryption-specific
    configurations:


    *   `path` – The directory that will store your CockroachDB data. This value corresponds
    to the value provided to the `--store` argument.

    *   `key` – The absolute or relative path to the current encryption key.

    *   `old-key` – The absolute or relative path to the previous encryption key.
    Use `plain` to tell CockroachDB to fall back to storing data in plaintext (a.k.a.
    unencrypted).

    *   `rotation-period` – The period after which CockroachDB will automatically
    rotate your encryption keys.


    The following commands create three nodes with encryption enabled. For consistency,
    I will reuse the certificates generated in the previous section:


    ```

    $ cockroach start \

    --certs-dir=certs \

    --store=node1 \

    --listen-addr=localhost:26257 \

    --http-addr=localhost:8080 \

    --join=localhost:26257,localhost:26258,localhost:26259 \

    --enterprise-encryption=path=node1,key=keys/enc.key,old-key=plain

    ```


    ```

    $ cockroach start \

    --certs-dir=certs \

    --store=node2 \

    --listen-addr=localhost:26258 \

    --http-addr=localhost:8081 \

    --join=localhost:26257,localhost:26258,localhost:26259 \

    --enterprise-encryption=path=node2,key=keys/enc.key,old-key=plain

    ```


    ```

    $ cockroach start \

    --certs-dir=certs \

    --store=node3 \

    --listen-addr=localhost:26259 \

    --http-addr=localhost:8082 \

    --join=localhost:26257,localhost:26258,localhost:26259 \

    --enterprise-encryption=path=node3,key=keys/enc.key,old-key=plain

    ```


    Let’s connect to our cluster. As this is a secure cluster, we’ll need to generate
    and provide a certificate to authenticate users. We’ll generate a client certificate
    for the database root user and use that to connect. First, generate the root client
    certificate:


    ```

    $ cockroach cert create-client \

    root \

    --certs-dir=certs \

    --ca-key=keys/ca.key

    ```


    We can now initialize the nodes and finish the cluster setup:


    ```

    $ cockroach init --certs-dir=certs --host=localhost:26257

    ```


    Finally, connect to the cluster as the root user using the client certificate
    we generated:


    ```

    $ cockroach sql --certs-dir=certs

    ```


    If you open a browser to the CockroachDB admin console (`https://localhost:8080`)
    now, you’ll be asked to log in with a username and password. These will have to
    be created from the CockroachDB shell as follows:


    ```

    CREATE USER rob WITH PASSWORD ''A_STRONG_PASSWORD'';

    ```


    The CockroachDB admin console requires logged-in users to have admin permissions
    to see certain elements (e.g., Node Map). Let’s give this user admin privileges
    ahead of time:


    ```

    GRANT ADMIN TO rob WITH ADMIN OPTION;

    ```'
