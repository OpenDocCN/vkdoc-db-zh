    **Test the Application**


    Let’s write some cURL commands to test the API (and, in doing so, the database).
    During this phase of testing, we’ll need to assert not only that the database
    behaves as expected when given expected data but also that it behaves as expected
    when given *unexpected* data. These are commonly referred to as Boundary Tests.


    In this section, we’ll go through each of our use cases to assert the database
    can support them. Let’s start by creating a customer:


    $ curl -X POST ''localhost:3000/customers'' \


    -H ''Content-Type: application/json'' \


    -d ''{


    "full_name": "Malala Yousafzai",


    "email": "malala.yousafzai@example.com"


    }''


    {"id":"7d640140-5581-41cf-a9db-0bccaf90f2de","join_date":"2022-01-20T18:26:18Z"}


    Chapter 8 testing


    This covers the happy path: a sensibly sized name and email address. Does our
    database support unicode characters? Let’s find out:


    $ curl -X POST ''localhost:3000/customers'' \


    -H ''Content-Type: application/json'' \


    -d ''{


    "full_name": "Наде́жда Андре́евна Толоко́нникова",


    "email": "nadya.tolokno@example.com"


    }''


    {"id":"85f05ac3-931f-4417-a6ae-1403468a2c10","join_date":"2022-01-20T18:26:34Z"}


    Seems to! How about long names? Does the database reject full names that are greater
    than the maximum 255 length we defined?


    $ curl -X POST ''localhost:3000/customers'' \


    -H ''Content-Type: application/json'' \


    -d ''{


    "full_name": "aaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeaaaa aaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeaaaaaaaaaabbbbbbbbbbcc


    ccccccccddddddddddeeeeeeeeeeaaaaaaaaaabbbbbbbbbbccccccccccdddddddddd


    eeeeeeeeeeaaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeefffffg",


    "email": "full_name@example.com"


    }''


