    The resulting node will have a new node ID, reflecting that this is not simply
    a recommissioning of an old node.


    **The import Command**


    The import command can be used to import small databases (<15MB) or tables from
    a local pgdump or mysqldump file. For anything larger than 15MB, Cockroach Labs
    recommends you use the IMPORT statement, which we’ll cover in Chapt[er 5](https://doi.org/10.1007/978-1-4842-8224-3_5).


    For this reason and for the symmetry of the IMPORT/EXPORT SQL statements, I prefer
    to use the IMPORT/EXPORT SQL statements, so will cover the exporting and importing
    of CockroachDB, Postgres, and MySQL files using these statements in Chapter [5](https://doi.org/10.1007/978-1-4842-8224-3_5).


    **The sqlfmt Command**


    The sqlfmt (pronounced “SEQUEL FUMPT”) command does for SQL what the go fmt


    command does for Go code. It’s useful if you’d like to format your SQL statements
    into a canonical format. If everyone in your team runs sqlfmt with the same configurations,
    everyone’s SQL will look the same.


    The sqlfmt command is configured with sensible defaults, so it can be used


    without many arguments, but I’ll demonstrate these to show you how they affect
    the resulting SQL.


    Let’s pass a simple SQL command into sqlfmt to see how the default settings change
    our statement:


    $ cockroach sqlfmt \


    -e "SELECT first_name, last_name, date_of_birth FROM person WHERE id


    = ''1c448ac9-73a9-47c5-9e4d-769f8aab27fd'';"


    SELECT


    first_name, last_name, date_of_birth


    FROM


    person


    WHERE


    id = ''1c448ac9-73a9-47c5-9e4d-769f8aab27fd''


    Chapter 4 Managing CoCkroaChDB froM the CoMManD Line


    As the statement contains 160 characters (100 more than the default print width
    of 60), sqlfmt reformats the command so that the print width of the statement
    remains below 60 characters. To change the print width, pass a value to the --print-width
    argument.


    If you prefer your SQL logic to stay on the same line as the keywords (FROM, etc.),
    pass the --align argument:


    $ cockroach sqlfmt \


    -e "SELECT first_name, last_name, date_of_birth FROM person WHERE id


    = ''1c448ac9-73a9-47c5-9e4d-769f8aab27fd'';" \


    --align


    SELECT first_name, last_name, date_of_birth


    FROM person


    WHERE id = ''1c448ac9-73a9-47c5-9e4d-769f8aab27fd''


    If you SQL statement contains quotes, you can wrap it in triple quotes as follows:
    $ cockroach sqlfmt \


    -e """SELECT p."first_name", p."last_name", p."date_of_birth", a."name" FROM "person"
    p JOIN "animal" a on p.id = a."owner_id" WHERE


    p."id" = ''1c448ac9-73a9-47c5-9e4d-769f8aab27fd'';"""


    SELECT


    p.first_name, p.last_name, p.date_of_birth, a.name


    FROM


    person AS p JOIN animal AS a ON p.id = a.owner_id


    WHERE


    p.id = ''1c448ac9-73a9-47c5-9e4d-769f8aab27fd''


    Note that the sqlfmt command does not consider the quotes to be necessary, so
    it removes them before outputting the result. It will also remove other superfluous
    characters from the input statement such as unnecessary brackets:


    $ cockroach sqlfmt \


    -e "SELECT first_name, last_name, date_of_birth FROM person WHERE


    id IN ((''1c448ac9-73a9-47c5-9e4d-769f8aab27fd''),(''652cfbbc-52a9-42be-


    a73f-32fc7604b7e9''));" \


    --align \


    --use-spaces


    Chapter 4 Managing CoCkroaChDB froM the CoMManD Line


    SELECT first_name, last_name, date_of_birth


    FROM person


    WHERE id


    IN (


    ''1c448ac9-73a9-47c5-9e4d-769f8aab27fd'',


    ''652cfbbc-52a9-42be-a73f-32fc7604b7e9''


    )


    **The workload Command**


    The workload command generates load scenarios against a selection of databases
    available from the demo command. Let’s create a sample database and run varying
    levels of load against it. Note that you don’t need to start the database with
    the demo command to use the workload command.


    First, let’s start a node:


    $ cockroach start-single-node --insecure


    Next, we’ll initialize the workload using the init subcommand:


    $ cockroach workload init bank ''postgres://root@127.0.0.1:26257?sslmod


    e=disable''


