    ## Introduction


    Every so often, the technology community is blessed with truly disruptive technology.


    We’ve seen the likes of Kubernetes for orchestration, Kafka for streaming, gRPC
    for Remote Procedure Call, and Terraform for infrastructure. CockroachDB does
    what these technologies have done for their respective use cases; it’s a game
    changer for data.


    I first discovered CockroachDB in 2016, where I used it to create rapid prototypes
    during company Hackathons at my then employer. It immediately felt familiar and
    as if it had been designed for a developer to build reliable and scalable software
    without an army of database specialists to help them.


    In this book, I’ll share my excitement for this database and the experience I’ve
    gained from using it for many different use cases.


    ### Who Should Read This Book


    This book is for developers, database specialists, and enterprise owners. So whether
    you’re in a position of convincing people to use CockroachDB or you’re looking
    for a tool to complement your enterprise tech stack, there’s something in this
    book for you.


    You don’t need to have existing knowledge of CockroachDB, as we’ll start with
    the basics and quickly ramp up to real-world examples. Any experience with relational
    databases (especially Postgres) will be beneficial but is not required.


    ### Navigating This Book


    This book is both an introduction and a reference to CockroachDB. It starts with
    the “why” of CockroachDB – why it was created and what problems it solves. It
    then dives into the “what” – the database’s data types, constructs, and fundamentals.
    Finally, it covers the “how” – how you can use what you’ve learned to solve real-world
    scaling, safety, and performance challenges.


    The book aims to remain practical, so it hovers above the database’s internal
    details. To continue your journey, I recommend reading the excellent documentation
    and blog posts available on the Cockroach Labs website: [www.cockroachlabs.com.](http://www.cockroachlabs.com)


    ### Using Code Examples


    Code examples can be found in GitHub and are arranged in chapters to help you
    find what you’re looking for as you make your way through the book.


    [https://github.com/codingconcepts/practical-cockroachdb](https://github.com/codingconcepts/practical-cockroachdb)


    Code is self-contained to a chapter, meaning you won’t have to read the whole
    book to get something working. In some cases, code examples are split across adjoining
    code blocks, but this will be highlighted.


    I execute all of the code examples against version `v21.1.7` of CockroachDB, which
    is the current stable version of the database at the time of writing.


