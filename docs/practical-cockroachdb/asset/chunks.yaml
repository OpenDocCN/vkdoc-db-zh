    ],\"topic\":\"example\",\"updated\":\"1637757680248432000.0000000000\"}],\"length\"\
    :1}\n```\n\n# Chapter 6 Data Privacy\n\nData privacy should be a concern for businesses\
    \ great and small, regardless of where they are in the world. While the laws affecting\
    \ the penalties for poorly implemented security can vary from country to country,\
    \ the safeguarding of users is of paramount importance.\n\nIn this topic, we’ll\
    \ take a closer look at how CockroachDB can support you in creating a secure and\
    \ compliant infrastructure for your data.\n\n## Global Regulations\n\nThere is\
    \ no one data privacy law that governs the entire world. Each country has its\
    \ own legislation, which it can revise over time. This makes for a forever-changing\
    \ landscape that we as engineers need to keep up and remain compliant with. The\
    \ DLA Piper law firm maintains an excellent site that provides a country-by-country\
    \ overview of this landscape: `www.dlapiperdataprotection.com`. I will be using\
    \ DLA Piper’s research as my starting point for the content in this section.\n\
    \nWhat I present in this section should not be considered legal advice. Before\
    \ creating a production CockroachDB cluster for customer data, please consult\
    \ a data privacy specialist.\n\nHere are a few headlines to give you a sense of\
    \ the complexity of this compliance challenge:\n\n• There is no documented standard\
    \ by which data can be globally considered subject to protection. In some heavily\
    \ regulated countries, the definition of Personally Identifiable Information (`PII`)\
    \ is well defined, whereas in other heavily regulated countries, it is not defined\
    \ at all.\n\n• In the United States, the devolution of data privacy legislative\
    \ power to each state means every state can have different data privacy laws.\n\
    \n• The California Consumer Privacy Act (`CCPA`) is now in effect, making it the\
    \ first comprehensive state-wide privacy policy. While often compared to Europe’s\
    \ General Data Protection Regulation (`GDPR`), the two differ in subtle but important\
    \ ways; the `GDPR` framework requires “prior consent” from individuals, whereas\
    \ the `CCPA` framework gives individuals the right to “opt out.” [1](#index_split_001.html#p135)\n\
    \n• The `GDPR` sets the age of consent for data collection and processing at 16\
    \ but allows European member states to lower that if they wish. As a result, there\
    \ is no one definition of a child regarding data protection in Europe. [2](#index_split_001.html#p135)\n\
    \n• Following Brexit, the UK has created a UK-specific `GDPR`, which is, for the\
    \ most part, the same as the EU equivalent. However, some parts of the UK’s `Data\
    \ Protection Act 2018` (`DPA`) affect those provided by the `GDPR`.\n\n• There\
    \ is no standard definition for what can be considered a data transfer in Europe.\
    \ As a result, everything that touches data is considered a transfer.\n\nThe list\
    \ of regulations and their differences is beyond the scope of this book. However,\
    \ I hope that by sharing the preceding points, I’ve highlighted the importance\
    \ of understanding the data privacy laws in any country where you are operating\
    \ or from which you will have users whose data you will collect or process.\n\n\
    Your responsibilities and liabilities will change, depending on whether you are\
    \ considered a processor, a controller, or a joint controller of data, so it’s\
    \ important to understand the difference between the two. In the UK, the `Information\
    \ Commissioner's Office` (`ICO`) has a useful checklist to help you identify your\
    \ role.[3](#index_split_001.html#p135) In short, however, if you have decided\
    \ to collect data and know how and why you are processing it, you are a controller.\n\
    \n1.  [`www.cookiebot.com/en/ccpa-vs-gdpr-compliance-with-cookiebot-cmp`](http://www.cookiebot.com/en/ccpa-vs-gdpr-compliance-with-cookiebot-cmp)\n\
    2.  [`www.clarip.com/data-privacy/gdpr-child-consent`](http://www.clarip.com/data-privacy/gdpr-child-consent)\n\
    3.  [`https://ico.org.uk/for-organisations/guide-to-data-protection/guide-to-the-general-data-protection-regulation-gdpr/key-definitions/controllers-and-processors/`](https://ico.org.uk/for-organisations/guide-to-data-protection/guide-to-the-general-data-protection-regulation-gdpr/key-definitions/controllers-and-processors/)\n\
    \nYour responsibilities and liabilities will also change depending on the type\
    \ of data you are processing. If you store healthcare data (e.g., patient names\
    \ and health conditions), you will be subject to more scrutiny than if you store\
    \ customer data (e.g., customer email and physical addresses) in an online retail\
    \ setting.\n\nAs a rule of thumb, if you are operating across multiple countries,\
    \ it’s wise to comply with the country with the most stringent data privacy laws\
    \ and apply this across all countries.\n\nAdditionally, if two countries have\
    \ conflicting rules, you may need to implement rules for each country on a customer-by-customer\
    \ basis, depending on their home country/state.\n\nAlthough navigating the complex\
    \ waters of data privacy remains an important consideration for all database users,\
    \ CockroachDB’s encryption in transit, encryption at rest, and geo-partitioning\
    \ functionally make the complexity easier to manage.\n\n## Location-Specific Considerations\n\
    \nIn this section, we’ll take a closer look at the considerations you’ll need\
    \ to make when operating across geographies and under different circumstances\
    \ that will affect your compliance responsibilities.\n\n### UK Company with UK\
    \ and European Customers\n\nIf you are a UK-based company and have customers in\
    \ the UK and the EU, you will be subject to `GDPR` and `UK-GDPR`. Following Brexit,\
    \ the UK adopted all of the principles of the original `GDPR` framework, meaning\
    \ that if you satisfy `GDPR`, you’ll be compliant in both the EU and the UK.\n\
    \n© Rob Reid 2022\nR. Reid, *Practical CockroachDB*, [https://doi.org/10.1007/978-1-4842-8224-3_6](https://doi.org/10.1007/978-1-4842-8224-3_6#DOI)"
