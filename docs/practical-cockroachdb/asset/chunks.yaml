    **Geo-partitioned Data**


    Geo-partitioning is one of CockroachDB’s most powerful Enterprise features, and
    as of v21.1.10, working with geo-partitioned data has become much more straightforward.


    To get started with geo-partitioned data, you first need to decide on a partitioning
    strategy. For example, will all of the rows within a table need to remain in one
    location, or will specific rows within that table need to be separated by location?
    If you need all of the rows within a table to remain in one location, the REGION
    BY TABLE table locality is what you need. On the other hand, if you need to pin
    rows to different places, the REGION


    BY ROW table locality is a good choice.


    Let’s create some database tables to demonstrate geo-partitioning for both locality
    strategies.


    Before we start, let’s create a cluster that spans multiple continents. Start
    by creating a temporary Enterprise cluster using CockroachDB’s demo command:


    $ cockroach demo \


    --no-example-database \


    --nodes 9 \


    --insecure \


    --demo-locality=region=us-east1,az=a:region=us-east1,az=b:region=us-


    east1,az=c:region=asia-northeast1,az=a:region=asia-


    northeast1,az=b:region=asia- northeast1,az=c:region=europe-


    west1,az=a:region=europe-west1,az=b:region=europe- west1,az=c


    This command creates an insecure, empty cluster with nine nodes. The --demo-


    locality argument allows us to specify the region and availability zones for the
    nodes to be distributed across: nine availability zones, one for each of our nine
    nodes. The syntax of this argument’s value looks tricky but is actually very simple;
    for each of the requested localities, we simply provide a colon-separated collection
    of region and availability zone pairs.


    In order for CockroachDB to show a map of your cluster in its Node Map view, we
    need to run a SQL command in the CockroachDB shell. At the time of writing, only
    a handful of locations are configured in the system.locations table; both the
    United States and Europe are configured, but Asia is not. We need to tell CockroachDB
    where to place the asia-northeast1 cluster on its Node Map, and the following
    statement does just that: INSERT into system.locations VALUES (''region'', ''asia-northeast1'',


    35.689487, 139.691706);


    ![](index-73_1.jpg)


    Chapter 3 ConCepts


    Open a browser to http://localhost:8080/#/overview/map and you’ll see a visual
    representation of your new cluster such as that shown in Figur[e 3-3.](#index_split_000.html#p73)


    ***Figure 3-3.** The CockroachDB Node Map view of our cluster*


    It’s now time to create some partitioned tables.


    Whether we’re pinning table or row data, we need to make CockroachDB region-


    aware. The following statements create three regions in the database. These match
    the three regions we created when initializing the cluster with the demo command.


    ALTER DATABASE defaultdb PRIMARY REGION "europe-west1";


    ALTER DATABASE defaultdb ADD REGION "us-east1";


    ALTER DATABASE defaultdb ADD REGION "asia-northeast1";


    As discussed in Chapt[er 2](https://doi.org/10.1007/978-1-4842-8224-3_2), it’s
    vital you correctly set regional or zonal survival goals for your databases. While
    it is not essential to geo-partitioning, it is helpful to know how your database
    will function in the event of an outage.


    ALTER DATABASE defaultdb SURVIVE REGION FAILURE;


    **REGION BY ROW**


    The REGION BY ROW table locality ensures that individual rows within a table are
    pinned to specific locations, depending on values set for a specific field. In
    human speak, a location can be a continent, a country, a state, or even a specific
    machine. In infrastructure speak, a location can be a region, an availability
    zone, or a node.


    Chapter 3 ConCepts


    First, we’ll create a database for this example and make it region-aware. The
    following code statements create a database and attach regions and a primary region
    via ALTER statements:


    CREATE DATABASE my_app;


    USE my_app;


    ALTER DATABASE my_app PRIMARY REGION "europe-west1";


    ALTER DATABASE my_app ADD REGION "us-east1";


    ALTER DATABASE my_app ADD REGION "asia-northeast1";


    We don’t need to manually set a survival goal in this example because for now,
    we’ll stick with the default configuration, which allows CockroachDB to survive
    zonal failures.


    Next, we’ll create a table. This table will have two columns that allow us to
    geo-partition data:


    • **country** – The country that is associated with the row.


    • **crdb_region** – The region that describes where CockroachDB will


    pin data. This column is populated automatically on-insert with a


    value derived from the country column. Using a case statement,


    we’ll ensure that when the country column is “JP” for Japan, “KR” for


    South Korea, or “TH” for Thailand, the crdb_region column receives


    the value “asia-northwest1”, etc.


    The following code creates a table called “person” with the aforementioned geo-partitioning
    columns. It ensures that locality rules for the table are set to REGIONAL BY


    ROW, meaning each row will be pinned to a different region:


    CREATE TABLE person (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    country


    TEXT NOT NULL,


    crdb_region crdb_internal_region NOT NULL AS (


    CASE


    WHEN country IN (''JP'', ''KR'', ''TH'') THEN ''asia-northeast1''


    WHEN country IN (''DE'', ''FR'', ''UK'') THEN ''europe-west1''


    Chapter 3 ConCepts


    WHEN country IN (''BR'', ''MX'', ''US'') THEN ''us-east1''


    ELSE ''europe-west1''


    END


    ) STORED


    );


    ALTER TABLE "person" SET LOCALITY REGIONAL BY ROW;


    Next, we’ll insert some data into the person table. We’ll provide different country
    codes to ensure that data is stored across each of our three regions.


    INSERT into person (country)


    VALUES


    (''JP''), (''KR''), -- *Japan and South Korea -> asia-northeast1*


    (''DE''), (''FR''), -- *German and France -> europe-west1*


    (''BR''), (''MX''); -- *Brazil and Mexico -> us-east1*


    Selecting the values back out of the person table reveals that the crdb_region
    column is populated as expected:


    SELECT * FROM person;


    id | country | crdb_region


    *---------------------------------------+---------+------------------*


    3a77bfcf-e289-4e47-8e11-7ca0b77ade72 | FR | europe-west1


    bc5f5bef-72b4-4c7a-a7d8-0ece1345a7e1 | DE | europe-west1


    74a1c95b-c5a4-46ae-bd8d-d049514fb728 | BR | us-east1


    477cbdc6-fe0f-436c-99fd-0f28866d394a | KR | asia-northeast1


    8c5e8b31-c361-4157-8671-b723cfcf0e06 | MX | us-east1


    e8a6760f-9596-4b4c-838b-94eb2098a73e | JP | asia-northeast1


    By default, CockroachDB will use a replication factor of five for the person table.
    You can confirm this with a query for the table’s RANGES (I’ve modified the formatting
    to make it easier to read):


    SELECT lease_holder_locality, replicas, replica_localities


    FROM [SHOW RANGES FROM TABLE person]


    WHERE start_key NOT LIKE ''%Prefix%'';


    Chapter 3 ConCepts


    region=asia-northeast1,az=c


    {3,4,5,6,7} {"region=us-east1,az=c","region=asia-


    northeast1,az=a","region=asia- northeast1,az=b","region=asia-northeast1,az=c","region=europe-west1,az=a"}


    region=europe-west1,az=a


    {3,6,7,8,9}


    {"region=us-east1,az=c","region=asia-northeast1,az=c","region=europe-west1,az=a","region=europe-west1,az=b","region=europe-west1,az=c"}


    region=us-east1,az=b


    {1,2,3,5,7}


    {"region=us-east1,az=a","region=us-east1,az=b","region=us-east1,az=c","region=asia-northeast1,az=b","region=europe-west1,az=a"}


    From the preceding output, you’ll see that data in the person table is shared
    across five nodes, as per the default replication factor in CockroachDB. A replication
    factor of five provides additional robustness if a region becomes unavailable.


    I’ll now drop the replication factor from five to three to show how CockroachDB


    will keep geo-partitioned data pinned to the regions specified in crdb_internal_region
    columns (in our case, the crdb_region column):


    SET override_multi_region_zone_config = true;


    ALTER TABLE person CONFIGURE ZONE USING num_replicas = 3;


    The preceding ALTER statement will be blocked by CockroachDB, as any request to
    update the number of replicas in a table or database requires special permissions.


    However, as seen in the preceding statement, we can ask CockroachDB to permit
    us to make this change by overriding the multiregion zone configuration flag.


    Over the next ~30 seconds, you’ll see CockroachDB reduce the number of replicas
    for the person table from five to three. Replicas are now pinned to the respective
    regions.


    SELECT lease_holder_locality, replicas, replica_localities


    FROM [SHOW RANGES FROM TABLE person]


    WHERE start_key NOT LIKE ''%Prefix%'';


    region=asia-northeast1,az=c


    {4,5,6}


    Chapter 3 ConCepts


    {"region=asia-northeast1,az=a","region=asia-northeast1,az=b",


    "region=asia- northeast1,az=c"}


    region=europe-west1,az=a


    {7,8,9}


    {"region=europe-west1,az=a","region=europe-west1,az=b",


    "region=europe- west1,az=c"}


    region=us-east1,az=b


    {1,2,3}


    {"region=us-east1,az=a","region=us-east1,az=b","region=us-east1,az=c"}


    **REGION BY TABLE**


    The REGION BY TABLE table locality ensures that all of the rows within a table
    remain in a particular location. In human speak, a location can be a continent,
    a country, a state, or even a specific machine. In infrastructure speak, a location
    can be a region, an availability zone, or a node.


    The REGION BY TABLE table locality is the default configuration for tables in
    CockroachDB. As a result, access to regional tables will be faster when accessed
    from the database’s primary region.


    Use this option if you wish to pin all data within a table to one region. In the
    following example, we’ll create a regional table.


    First, we’ll create a table. Note that in this example, I’m not providing any
    regional information to the rows of the table; this is because the table itself
    is regional.


    CREATE TABLE american_scientists (


    id


    UUID DEFAULT gen_random_uuid() PRIMARY KEY,


    first_name


    TEXT NOT NULL,


    last_name


    TEXT NOT NULL


    );


    INSERT into american_scientists (first_name, last_name)


    VALUES


    Chapter 3 ConCepts


    (''Grace'', ''Hopper''),


    (''Barbara'', ''McClintock''),


    (''Rachel'', ''Carson'');


    Assuming the database’s primary region is still set to europe-west1 from the REGION


    BY ROW example, if we were to select the table’s ranges at this point, we’d see
    that a European-based leaseholder currently manages our American scientists:


    SELECT lease_holder_locality, replicas, replica_localities


    FROM [SHOW RANGES FROM TABLE american_scientists];


    region=europe-west1,az=a


    {3,4,7,8,9}


    {"region=us-east1,az=c","region=asia-northeast1,az=a","region=europe-west1,az=a","region=europe-west1,az=b","region=europe-west1,az=c"}


    To move this table into the us-east1 region, we need to run a couple of simple
    statements. First, set the database’s primary region to us-east1, which will update
    the leaseholder for the data but will not physically locate all replicas to the
    United States.


    CockroachDB sets a default number of replicas for a new table to five, so as we
    have only three nodes in the us-east1 region, CockroachDB will use nodes from
    other regions to bring the replica count up to five:


    ALTER DATABASE my_app PRIMARY REGION "us-east1";


    SELECT lease_holder_locality, replicas, replica_localities


    FROM [SHOW RANGES FROM TABLE american_scientists];


    region=us-east1,az=c


    {1,2,3,4,8}


    {"region=us-east1,az=a","region=us-east1,az=b","region=us-east1,az=c","region=asia-northeast1,az=a","region=europe-west1,az=b"}


    Next, drop the replica count down to three to ensure that all data moves across
    to the three nodes in the us-east1 region:


    SET override_multi_region_zone_config = true;


    ALTER TABLE american_scientists CONFIGURE ZONE USING num_replicas = 3;


    Chapter 3 ConCepts


    SELECT lease_holder_locality, replicas, replica_localities


    FROM [SHOW RANGES FROM TABLE american_scientists];


    region=us-east1,az=c


    {1,2,3}


    {"region=us-east1,az=a","region=us-east1,az=b","region=us-east1,az=c"}


    In the previous step, we reduced the number of replicas for the american_scientists
    table from five to three. Doing so will impact the resilience of the cluster,
    given that CockroachDB will now replicate data across fewer nodes. In later chapters,
    I share some cluster size and replication number recommendations for production
    environments.


    **CHAPTER 4**


    **Managing CockroachDB**


    **from the Command Line**


    As we discovered in Chapter [2](https://doi.org/10.1007/978-1-4842-8224-3_2),
    CockroachDB can be installed in many ways. A great way to create databases during
    development is to use the cockroach binary. In this chapter, we’ll explore the
    cockroach binary and the features it provides.


    **The Cockroach Binary**


    The cockroach binary us[es the https://github.com/spf13/cobra libr](https://github.com/spf13/cobra)ary
    to manage commands and subcommands. Cobra is a popular Go package for creating
    rich CLIs (Command-Line Interfaces) used by many popular CLIs, including docker
    and kubectl.


    It will be familiar to users of either.


    Commands in the cockroach binary are hierarchical and start with the cockroach


    “root” command itself. A set of subcommands are exposed in a tree-like structure,
    as shown in Figure [4-1](#index_split_001.html#p81).


    © Rob Reid 2022


    R. Reid, *Practical CockroachDB*[, https://doi.org/10.1007/978-1-4842-8224-3_4](https://doi.org/10.1007/978-1-4842-8224-3_4#DOI)


    ![](index-81_1.png)


    Chapter 4 Managing CoCkroaChDB froM the CoMManD Line


    ***Figure 4-1.** A tree that represents the commands under the cockroach binary*
    Navigate the command tree by entering a subcommand and using the --help


    argument at each level. For example:


    $ cockroach -h


    $ cockroach start -h


    $ cockroach demo bank


    **The start and start-single-node Commands**


    CockroachDB provides separate commands for starting single-node and multinode
    clusters. Use start-single-node to create a single-node cluster and start to create
    a multinode cluster.


    At first, it might seem clunky to have two commands to start clusters. Shouldn’t
    it be possible to use the start command for both? The requirements of a single-node
    vs.


    multinode cluster are different, so having two commands prevents you from creating
    inappropriately sized clusters.


    We’ve created multiple clusters in the previous chapters, so I won’t labor the
    start and start-single-node commands here. I will, however, demonstrate the differences
    and why it’s necessary to get them right.


    Starting a multinode cluster using the cockroach binary is a two-step process
    involving the start and init commands. First, you run the start command to create
    the nodes and configure them.


    Chapter 4 Managing CoCkroaChDB froM the CoMManD Line


    The start command requires a --join argument that takes the addresses of other
    nodes in the cluster, forcing you to think about the basic topology of your cluster
    and how the nodes will find one another. Cockroach Labs recommends configuring
    between three and five nodes in the --join argument to ensure the startup performance
    of your node.


    After starting your nodes, you run the init command to initialize the cluster
    nodes.


    In a nutshell, the init command initializes the database engine on each node and
    ensures they are running the same version of CockroachDB.


    To start a single-node CockroachDB cluster, use the start-single-node command.


    This command starts a node and initializes it, meaning you don’t have to run the
    init command as you would with a multinode cluster.


    Unlike the start command, the start-single-node command does not allow you


    to pass a --join argument, forcing your cluster to remain as a single node.


    **The demo Command**


    As discussed in Chapt[er 2](https://doi.org/10.1007/978-1-4842-8224-3_2), the
    demo command starts an in-memory Enterprise cluster, allowing you to try out all
    of the features of CockroachDB Enterprise on your local machine.


    The demo command allows you to create an empty database and comes with a


    handful of preloaded sample databases to give you a head start. A call to the
    cockroach demo command with the -h or --help argument will list these databases:


    $ cockroach demo --help


    The list of sample databases currently includes the following databases:


    • **bank** – A sample database with a single table containing accounts


    and balances


    • **intro** – A sample database with a single table containing the ASCII representation
    of a cockroach stored across multiple lines in a table


    • **kv** – A sample database with a single key-value table


    • **movr** – A sample database that represents the data store for a


    fictional ride-sharing application


    Chapter 4 Managing CoCkroaChDB froM the CoMManD Line


    • **startrek** – A sample database with two related tables: one that stores Star
    Trek episodes and one that stores the quotes from them


    • **tpcc** – A sample database representing the data store for a fictional commerce
    business that’s ready to be hit by TPC[-C1](#index_split_001.html#p83) benchmarks


    • **ycsb** – A sample database with a single table containing user data, ready
    to be hit by the Yahoo! Cloud Serving Benchmark[2](#index_split_001.html#p83)


    For most use cases, you’ll want to start an empty database. I do just this in
    Chapter [3](https://doi.org/10.1007/978-1-4842-8224-3_3)


    as follows:


    $ cockroach demo \


    --no-example-database \


    --nodes 9 \


    --demo-locality=region=us-east1,az=a:region=us-east1,az=b:region=us-


    east1,az=c:region=asia-northeast1,az=a:region=asia-


    northeast1,az=b:region=asia-northeast1,az=c:region=europe-


    west1,az=a:region=europe-west1,az=b:region=europe-west1,az=c


    **The cert Command**


    The cockroach cert command initializes all of the certificates you’ll need to
    run and connect to a CockroachDB cluster. There are four main subcommands to be
    aware of:


    • **create-ca** – Create a Certificate Authority (CA) certificate that you can
    use to create node and client certificates.


    • **create-node** – Create a certificate and key to use for cluster nodes.


    • **create-client** – Create a certificate and key to use for client


    connections.


    • **list** – List the certificates in a given certificate directory (--cert-dir)
    or ${HOME}/.cockroach-certs if empty.


    1 [www.tpc.org/tpcc](http://www.tpc.org/tpcc)


    2 [https://github.com/brianfrankcooper/YCSB](https://github.com/brianfrankcooper/YCSB)


    Chapter 4 Managing CoCkroaChDB froM the CoMManD Line


    We’ll explore the create-* subcommands of the cockroach cert command in


    Chapt[er 6 t](https://doi.org/10.1007/978-1-4842-8224-3_6)o create a secure cluster.
    Let’s see what the list subcommand does here: $ cockroach cert list --certs-dir
    certs


    Certificate directory: certs


    Usage | Certificate File | Key File | Expires | Notes |


    ---------+------------------+-----------------+------------+----------------------+


    CA | ca.crt | | 2031/10/28 | num certs: 1 |


    Node | node.crt | node.key | 2026/10/24 | addresses: localhost |


    Client | client.root.crt | client.root.key | 2026/10/24 | user: root |


    All three types of certificates (and any related keys) are listed in the response,
    along with their expiry dates and accompanying notes.


    **The sql Command**


    The cockroach sql command creates a SQL shell to a CockroachDB cluster node. There
    are many useful subcommands to use; let’s explore them now.


    To connect to a CockroachDB cluster’s default database, execute the following
    command against one of its nodes:


    $ cockroach sql --url "postgresql://localhost?sslmode=disable"


    This command omits the user, port, and database elements of the URL; the following
    command will do exactly the same as the above:


    $ cockroach sql --url "postgresql://root@localhost:26257/


    defaultdb?sslmode=disable"


    To connect to a different database, either change the database portion of the
    URL or provide a -d or --database argument as follows:


    $ cockroach sql \


    -d defaultdb \


    --url "postgresql://root@localhost:26257?sslmode=disable"


    Chapter 4 Managing CoCkroaChDB froM the CoMManD Line


    You may wish to run a command against a CockroachDB cluster without keeping a
    SQL shell open. This can be achieved with the --execute/-e argument:


    $ cockroach sql --url "postgresql://localhost/?sslmode=disable" \


    -e "SHOW DATABASES"


    database_name | owner | primary_region | regions | survival_goal


    ----------------+-------+----------------+---------+----------------


    defaultdb | root | NULL | {} | NULL


    postgres | root | NULL | {} | NULL


    system | node | NULL | {} | NULL


    yo | root | NULL | {} | NULL


    You can harness the --execute argument to perform any database operation against
    a cluster. It’s even possible to extract data by piping the output from a statement
    into another command. The following statements use the --execute argument to create
    a table, insert data into it, and extract the data into a JSON file, all without
    opening a long-lived SQL shell:


    $ cockroach sql --url "postgresql://localhost/?sslmode=disable" \


    -e "CREATE TABLE person (first_name TEXT, last_name TEXT)"


    $ cockroach sql --url "postgresql://localhost/?sslmode=disable" \


    -e "INSERT INTO person (first_name, last_name) VALUES (''Ben'',


    ''Darnell''), (''Peter'', ''Mattis''), (''Spencer'', ''Kimball'')"


    $ cockroach sql --url "postgresql://localhost/?sslmode=disable" \


    -e "SELECT first_name, last_name FROM person" --format=csv > names.csv $ cat names.csv


    first_name,last_name


    Ben,Darnell


    Peter,Mattis


    Spencer,Kimball


    If you’d like to watch for changes, you can pass the --watch argument in conjunction
    with the --execute argument. The following command will get the current database
    time once per second:


    $ cockroach sql --url "postgresql://localhost/?sslmode=disable" \


