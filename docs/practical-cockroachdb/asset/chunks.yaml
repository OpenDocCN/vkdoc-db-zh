    \    name STRING(50) NOT NULL,\n    age INT2 NOT NULL,\n    is_admin BOOL NOT\
    \ NULL DEFAULT false,\n    primary_role users_primary_role NOT NULL DEFAULT 'read'\n\
    );\n```\n\nIn summary:\n\n- There’s usually a data type that is well suited to\
    \ the data you’d like to store.\n- If you can make some reasonable predictions\
    \ to the amount of data in a column, use the limited variable-length variant of\
    \ a data type where possible.\n- If you require data in a given column, make it\
    \ nonnullable.\n- Use `ENUM`s to represent the choice between a finite set of\
    \ string values.\n- Consider using `DEFAULT` values to achieve Least Privilege\
    \ semantics.\n\n## Indexes\n\nUse indexes to improve the performance of `SELECT`\
    \ queries by giving CockroachDB hints as to where it should look in a dataset\
    \ for the value(s) you’re requesting.\n\nCockroachDB distinguishes between two\
    \ types of indexes:\n\n- **Primary indexes** – Every table receives a primary\
    \ index. If you have provided a primary key for a table, this will be your table’s\
    \ primary index. If you have not provided an index, CockroachDB will create a\
    \ primary index called “rowid” and assign a unique value to each row.\n- **Secondary\
