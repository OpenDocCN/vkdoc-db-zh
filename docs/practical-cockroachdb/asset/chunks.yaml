    ## About the Author


    **Rob Reid** is a software developer from London, England. In his career, he has
    written back-end, front-end, and messaging software for the police, travel, finance,
    commodity, sports betting, telecom, retail, and aerospace industries. He is an
    avid user of CockroachDB and has worked with the Cockroach Labs team in recent
    years to promote the database and embed it into development teams in the United
    States and the UK.


    ## About the Technical Reviewer


    **Fernando Ipar** has been working on and with open source databases since 2000,
    focusing on performance, scaling, and high availability. He currently works as
    a Database Reliability Engineer at Life360. Before that, he has worked at Perceptyx,
    Pythian, and Percona, among other places. When not working, Fernando enjoys going
    to plant nurseries with his wife and playing music with their children while being
    a good service employee for the family’s cat.


