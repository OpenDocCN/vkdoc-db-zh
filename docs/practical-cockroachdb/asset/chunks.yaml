    Chapter 2 InstallIng CoCkroaChDB


    Being a database, CockroachDB is considered a stateful resource in Kubernetes,
    so you’ll need to give it a Persistent Volume Claim (PVC). PVCs live at the node
    level, not at the pod level, so your data will be safe if any of your CockroachDB
    pods get deleted or restarted.


    To install a simple CockroachDB cluster in Kubernetes, create the files described
    in each of the following subsections. If you’d rather avoid handcrafting the following
    files, you can apply a ready-made Kubernetes manifest from Cockroach Labs here:


