- fmt: "## INSERT 性能\n\n在本节中，我们将探讨一些性能最佳实践及其重要性。我们将从执行一些 `INSERT` 语句开始，了解为何使用多行 DML\
    \ 语句优于单行 DML 语句至关重要。\n\n首先，创建一个数据库和一个表：\n\n```sql\nCREATE TABLE sensor_reading\
    \ (\n    sensor_id UUID PRIMARY KEY,\n    reading DECIMAL NOT NULL,\n    timestamp\
    \ TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n```\n\n接下来，我们将编写一个脚本来模拟批量插入 1000 行数据，并比较通过单行和多行\
    \ DML 语句执行的性能差异。\n\n我将使用 Go 进行这些测试，因此我的导入和主函数如下所示：\n\n```go\npackage main\n\n\
    import (\n    \"context\"\n    \"fmt\"\n    \"log\"\n    \"time\"\n\n    \"github.com/google/uuid\"\
    \n    \"github.com/jackc/pgx/v4/pgxpool\"\n)\n\nfunc main() {\n    connStr :=\
    \ \"postgres://root@localhost:26257/best_practices?sslmode=disable\"\n    db,\
    \ err := pgxpool.Connect(context.Background(), connStr)\n    if err != nil {\n\
    \        log.Fatalf(\"error connecting to db: %v\", err)\n    }\n    defer db.Close()\n\
    \    // ...\n}\n```\n\n接下来，我们将实现单行 DML `INSERT` 代码。此代码将发出 1000 个独立请求（涉及 1000 次独立的网络往返），以将一行数据插入\
    \ `sensor_reading` 表，并记录整个操作所需的时间：\n\n```go\nfunc insertSingleRowDML(db *pgxpool.Pool,\
    \ rows int) (time.Duration, error) {\n    const stmt = `INSERT INTO sensor_reading\
    \ (sensor_id, reading) VALUES ($1, $2)`\n    start := time.Now()\n    for i :=\
    \ 0; i < rows; i++ {\n        if _, err := db.Exec(context.Background(), stmt,\
    \ uuid.New(), 1); err != nil {\n            return 0, fmt.Errorf(\"inserting row:\
    \ %w\", err)\n        }\n    }\n    return time.Since(start), nil\n}\n```\n\n\
    接下来，我们将以批处理方式执行单行 `INSERT` 语句。这会将多个 `INSERT` 语句同时发送给 CockroachDB，并在单个事务中执行它们。在批量插入数据时，考虑将大型插入分解为较小的部分非常重要，因为插入的数据越多，锁定要插入的表的时间就越长。以下函数允许我以小的并发块执行批量插入：\n\
    \n```go\nfunc insertSingleRowDMLBatched(db *pgxpool.Pool, rows, chunks int) (time.Duration,\
    \ error) {\n    const stmt = `INSERT INTO sensor_reading (sensor_id, reading)\
    \ VALUES ($1, $2)`\n    start := time.Now()\n    eg, _ := errgroup.WithContext(context.Background())\n\
    \    for c := 0; c < chunks; c++ {\n        eg.Go(func() error {\n           \
    \ batch := &pgx.Batch{}\n            for i := 0; i < rows/chunks; i++ {\n    \
    \            batch.Queue(stmt, uuid.New(), i)\n            }\n            res\
    \ := db.SendBatch(context.Background(), batch)\n            if _, err := res.Exec();\
    \ err != nil {\n                return fmt.Errorf(\"running batch query insert:\
    \ %w\", err)\n            }\n            return nil\n        })\n    }\n    if\
    \ err := eg.Wait(); err != nil {\n        return 0, fmt.Errorf(\"in batch worker:\
    \ %w\", err)\n    }\n    return time.Since(start), nil\n}\n```\n\n请注意，此实现仍然是在数据库中作为单行\
    \ DML 执行的。然而，此实现与第一种实现的区别在于，现在的网络往返次数要少得多，从而加快了端到端查询的速度。\n\n如果我们真想从查询中看到性能提升，就需要执行多行\
