    INSERT INTO purchase (customer_id, product_id, checkout_at) VALUES


    (''2df28d7d-67a3-4e83-a713-96a68a196b0b'', ''486ecc02-6d8e-44fe-b8ef-


    b8d004658465'', ''2021-11-23T06:50:46Z''),


    (''5047d78c-12cc-48e3-a36a-7cac1018ba7e'', ''5b2756e6-


    cc88- 47e6-849d-6291a76f3881'', ''2021-11-22T08:13:13+07:00''),


    (''792ab188-1bb2-4ac6-b1d2-f1adbcf9223e'', ''6cfd7bed-


    bf11- 4c96-9300-82c8e9dd97f2'', ''2021-11-23T06:50:46-05:00'');


    Finally, we’ll create the view. This view will be a simple selection on the purchase
    table, along with a grouping over the extracted day-of-week value of the checkout_


    at column:


    CREATE VIEW purchases_by_dow (dow, purchases) AS


    SELECT EXTRACT(''ISODOW'', pu.checkout_at), COUNT(*)


    FROM purchase pu


    GROUP BY EXTRACT(''ISODOW'', pu.checkout_at);


    Chapter 5 InteraCtIng wIth CoCkroaChDB


    With this in place, we can now work against the view, which hides the complexity
    of the date manipulation:


    SELECT * FROM purchases_by_dow;


    dow | purchases


    ------+------------


    2 | 2


    1 | 1


    **Restrict Table Data**


    Another good use case for views is for restricting access to data. In the following
    example, we’ll create a table and restrict its data to groups of users.


    Assume that in the previous example, our shop operates globally. We might not
    want to sell all products everywhere, so limiting the products we show users in
    different countries makes sense.


    Before we begin, we’ll need to create and connect to a secure cluster. Let’s create
    a single-node cluster now.


    $ mkdir certs


    $ mkdir keys


    $ cockroach cert create-ca \


    --certs-dir=certs \


    --ca-key=keys/ca.key


    $ cockroach cert create-node \


    --certs-dir=certs \


    --ca-key=keys/ca.key \


