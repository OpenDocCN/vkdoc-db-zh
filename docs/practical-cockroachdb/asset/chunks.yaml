    \ we’ll package up the application into a Docker image, so it can be executed\
    \ alongside CockroachDB in a Docker Compose environment. This can be very simple\
    \ because we’ll be executing a Linux-compatible executable that will exist in\
    \ the`/app`directory.\n\n```\nFROM alpine:latest\nCOPY . /app\nWORKDIR /app\n\
    ```\n\nWith our code (and this Dockerfile) in place, we can build a Docker image\
    \ ready to use in Docker Compose. The first command will build a test executable\
    \ for a Linux machine called “crdb-test”. The second command will bundle our current\
    \ working directory (including the test executable) into the`/app`directory:\n\
    \n```\nGOOS=linux go test ./... -c -o crdb-test\ndocker build -t crdb-test .\n\
    ```\n\nThe last file we’ll create will be for Docker Compose. This file will create\
    \ two services: one for CockroachDB and one for our test suite. In this file,\
    \ we\n\n• Create a cockroach_test service using the v21.2.4 version of the\n\n\
    CockroachDB Docker image that will\n\n• Customize its startup command to run just\
    \ a single node, so it\n\ndoesn’t wait for an initialization command\n\n• Not\
    \ expose CockroachDB’s default port of 26257, as there’s no\n\nneed to access\
    \ CockroachDB from the host machine\n\n• Suppress logs, meaning our test suite\
    \ logs are the only\n\noutput we see\n\nChapter 8 testing\n\n• Create an app_test\
    \ service using the Docker image we built in the\n\nprevious step:\n\n• Pass an\
    \ environment variable called CONN_STR to the container,\n\ncontaining the information\
    \ required to connect to the database.\n\nNote that we use the name of the cockroach_test\
    \ service instead\n\nof “localhost” because of the way Docker networking works.\n\
    \n• Pass the -db command-line argument to ensure that database\n\ntests run.\n\
    \n• Pass the -test.v command-line argument to ensure that we\n\nreceive verbose\
    \ logging. With this set, we’ll see each function\n\nthat runs.\n\n• Set the working\
    \ directory for the container to the directory where\n\nthe test executable resides.\n\
    \n• Mark the container as being dependent on the cockroach_\n\ntest service\n\n\
    We’ll run both of the containers in a Docker bridge network called app-network\
    \ so that they can talk to each other.\n\n```\nversion: '3'\nservices:\n  cockroach_test:\n\
    \    image: cockroachdb/cockroach:v21.2.4\n    command: start-single-node --insecure\n\
    \    logging:\n      driver: none\n    networks:\n      - app-network\n  app_test:\n\
    \    image: crdb-test:latest\n    environment:\n      CONN_STR: postgres://root@cockroach_test:26257/defaultdb?sslmode=disable\n\
    \    command: ./crdb-test -db -test.v\n    working_dir: /app\n    depends_on:\n\
    \      - cockroach_test\n    networks:\n      - app-network\nnetworks:\n  app-network:\n\
    \    driver: bridge\n```\n\nWith everything in place, we can kick off the full\
    \ database test with the following command:\n\n`docker-compose up --abort-on-container-exit\
    \ --force-recreate`\n\n```\nRecreating app_cockroach_test_1 ... done\nRecreating\
    \ app_app_test_1 ... done\nAttaching to app_app_test_1\napp_test_1 | === RUN TestADatabaseInteraction\n\
    app_test_1 | main_test.go:61: running database test\napp_test_1 | --- PASS: TestADatabaseInteraction\
    \ (0.00s)\napp_test_1 | === RUN TestANonDatabaseInteraction\napp_test_1 | main_test.go:65:\
    \ running non-database test\napp_test_1 | --- PASS: TestANonDatabaseInteraction\
    \ (0.00s)\napp_test_1 | PASS\napp_app_test_1 exited with code 0\nAborting on container\
    \ exit...\nStopping app_cockroach_test_1 ... done\n```\n\nAs we can see, both\
    \ the database and the nondatabase test ran as expected. After the app_test service\
    \ container finishes, both the app_test and the cockroach_test containers exit.\n\
    \n`White Box Testing`\n```"
