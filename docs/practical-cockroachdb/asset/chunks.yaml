    id | country_iso | sku'
  trans: "\n# 第五章 与 CockroachDB 交互\n\n假设我们正在经营一家网店，并且希望有一个查询能返回每日的购买数量。诚然，这是一个直接的查询，但为了论证起见，我们将把它封装在一个视图中以演示这个概念。\n\
    \n## 基本视图示例\n\n首先，我们将创建表：\n\n```sql\nCREATE TABLE customer (\n    id UUID PRIMARY\
    \ KEY DEFAULT gen_random_uuid(),\n    email STRING(50) NOT NULL,\n    INDEX(email)\n\
    );\n\nCREATE TABLE product (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
    \    sku STRING(20) NOT NULL,\n    INDEX(sku)\n);\n\nCREATE TABLE purchase (\n\
    \    customer_id UUID NOT NULL REFERENCES customer(id),\n    product_id UUID NOT\
    \ NULL REFERENCES product(id),\n    checkout_at TIMESTAMPTZ NOT NULL\n);\n```\n\
    \n接下来，我们将向表中插入一些数据以便进行操作：\n\n```sql\nINSERT INTO customer (email) VALUES\n   \
    \ ('m.curie@gmail.com'),\n    ('l.meitner@gmail.com'),\n    ('d.hodgkin@gmail.com');\n\
    \nINSERT INTO product (sku) VALUES\n    ('E81ML1GA'),\n    ('4UXK19D0'),\n   \
    \ ('L28C0XJ4');\n\nINSERT INTO purchase (customer_id, product_id, checkout_at)\
    \ VALUES\n    ('2df28d7d-67a3-4e83-a713-96a68a196b0b', '486ecc02-6d8e-44fe-b8ef-b8d004658465',\
    \ '2021-11-23T06:50:46Z'),\n    ('5047d78c-12cc-48e3-a36a-7cac1018ba7e', '5b2756e6-cc88-47e6-849d-6291a76f3881',\
    \ '2021-11-22T08:13:13+07:00'),\n    ('792ab188-1bb2-4ac6-b1d2-f1adbcf9223e',\
    \ '6cfd7bed-bf11-4c96-9300-82c8e9dd97f2', '2021-11-23T06:50:46-05:00');\n```\n\
    \n最后，我们将创建视图。这个视图将是对 `purchase` 表的一个简单选择，并按从 `checkout_at` 列提取的星期几的值进行分组：\n\n\
    ```sql\nCREATE VIEW purchases_by_dow (dow, purchases) AS\n    SELECT EXTRACT('ISODOW',\
    \ pu.checkout_at), COUNT(*)\n    FROM purchase pu\n    GROUP BY EXTRACT('ISODOW',\
    \ pu.checkout_at);\n```\n\n有了这个视图，我们就可以针对视图进行操作，它隐藏了日期处理的复杂性：\n\n```sql\nSELECT\
    \ * FROM purchases_by_dow;\n```\n\n```\n  dow | purchases\n------+------------\n\
    \    2 |         2\n    1 |         1\n```\n\n## 限制表数据\n\n视图的另一个良好用例是限制对数据的访问。在下面的例子中，我们将创建一个表，并将其数据限制为用户组访问。\n\
    \n假设在前面的例子中，我们的商店是全球运营的。我们可能不希望在所有地方销售所有产品，因此限制在不同国家展示给用户的产品是合理的。\n\n在开始之前，我们需要创建并连接到一个安全的集群。现在让我们创建一个单节点集群。\n\
    \n```bash\nmkdir certs\nmkdir keys\n\ncockroach cert create-ca \\\n    --certs-dir=certs\
    \ \\\n    --ca-key=keys/ca.key\n\ncockroach cert create-node \\\n    --certs-dir=certs\
    \ \\\n    --ca-key=keys/ca.key \\\n    localhost\n\ncockroach start-single-node\
    \ \\\n    --certs-dir=certs \\\n    --store=node1 \\\n    --listen-addr=localhost:26257\
    \ \\\n    --http-addr=localhost:8080\n\ncockroach cert create-client \\\n    root\
    \ \\\n    --certs-dir=certs \\\n    --ca-key=keys/ca.key\n\ncockroach sql --certs-dir=certs\n\
    ```\n\n首先，我们将创建 `products` 表并向其中插入一些产品：\n\n```sql\nCREATE TABLE product (\n  \
    \  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    country_iso STRING(3) NOT\
    \ NULL,\n    sku STRING(20) NOT NULL\n);\n\nINSERT INTO product (country_iso,\
    \ sku) VALUES\n    ('BRA', 'E81ML1GA'),\n    ('FIN', '4UXK19D0'),\n    ('GBR',\
    \ 'L28C0XJ4');\n```\n\n接下来，我们将创建一个视图，返回给英国客户的所有产品：\n\n```sql\nCREATE VIEW product_gbr\
    \ (id, country_iso, sku) AS\n    SELECT id, country_iso, sku FROM product\n  \
    \  WHERE country_iso = 'GBR';\n```\n\n最后，我们将创建一个用户并授予他们对该视图的访问权限。我们假设以下用户将服务英国客户：\n\
    \n```sql\nCREATE USER user_gbr WITH LOGIN PASSWORD 'some_password';\n\nGRANT SELECT\
    \ ON product_gbr TO user_gbr;\n\nREVOKE SELECT ON product FROM user_gbr;\n```\n\
    \n让我们以新用户身份连接到数据库，看看我们能（和不能）访问什么：\n\n```bash\ncockroach sql \\\n    --certs-dir=certs\
    \ \\\n    --url \"postgres://user_gbr:some_password@localhost:26257/defaultdb\"\
    \n```\n\n```sql\nuser_gbr@localhost:26257/defaultdb> SELECT * FROM product;\n\
    ERROR: user user_gbr does not have SELECT privilege on relation product\nSQLSTATE:\
    \ 42501\n\nuser_gbr@localhost:26257/defaultdb> SELECT * FROM product_gbr;\n```\n"
- fmt: "# 第五章 与 CockroachDB 交互\n\n## 移动数据\n\n在本节中，我们将探讨一些涉及通过 `IMPORT` 和 `EXPORT`\
    \ 语句以及 CDC（变更数据捕获）将数据移入和移出数据库的用例。\n\n## 导出和导入数据\n\n除非你正在创建一个新数据库来存储新数据，否则你很可能需要从另一个数据库迁移数据。本节将向你展示如何将数据从\
    \ CockroachDB 表中导出以及导入数据到其中。\n\n首先，让我们创建一个单节点集群：\n\n```bash\n$ cockroach demo\
    \ --no-example-database --insecure\n```\n\n集群建立后，我们将创建一个包含两张表的数据库：一张用于导出数据，另一张用于导入数据。我们还将插入一些要导出的数据：\n\
    \n```sql\nCREATE DATABASE import_export;\n\nUSE import_export;\n\nCREATE TABLE\
    \ to_export (\n    name TEXT NOT NULL\n);\n\nCREATE TABLE to_import (\n    name\
    \ TEXT NOT NULL\n);\n\nINSERT INTO to_export (name) VALUES ('A'), ('B'), ('C');\n\
    ```\n\n接下来，我们需要一个导出数据的地方。CockroachDB 支持云提供商目的地，如 Amazon S3、Azure Storage 和 Google\
