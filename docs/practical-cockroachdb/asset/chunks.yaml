    以下是一份非穷尽的 PII 存储注意事项清单：


    -   支付信息——如果您存储客户的财务信息，您对他们的责任将远大于合规要求。如果您有可用的支付处理方，请尽量将存储支付信息的责任委托给他们。


    -   姓名——姓名或许是识别某人最明显的方式。您可能需要存储用户的姓名以便联系他们、处理支付或向其发货。如果您的网站无需存储他们的姓名（或全名），请尽量最小化存储。


    -   联系客户——如果用户不允许您联系他们，请考虑对其电子邮件地址进行混淆处理，使其无法被发送邮件。这可以像对其电子邮件地址进行哈希处理一样简单，该过程仍允许您在登录时重新哈希并验证其电子邮件地址，而无需以明文形式存储。


    ## 加密


    在考虑了全球法规和 PII 之后，数据的下一道防线是加密。如果实施得当，加密将使恶意行为者几乎无法理解您的数据并将其用于恶意目的。在本节中，我们将介绍 CockroachDB
    中的数据加密。


    从宏观层面看，使用加密时有两个重点领域：


    -   **传输中**数据——这涉及在节点与终端用户之间或节点之间传输的数据。

    -   **静态**数据——这涉及存储在物理磁盘上的数据。


    CockroachDB 提供了两种实现方式，我将向您介绍这两种方式。


    ### 传输中


    默认情况下，CockroachDB 会尝试安全启动，并在启动时查找要使用的证书和密钥。如果您在未生成证书或密钥的情况下尝试运行以下命令，CockroachDB
    将无法启动：


    ```bash

    $ cockroach start-single-node

    *

    * ERROR: ERROR: cannot load certificates.

    * Check your certificate settings, set --certs-dir, or use --insecure for insecure
    clusters.

    *

    * failed to start server: problem using security settings: no certificates found;
    does certs dir exist?

    *

    ...

    ```


    到目前为止，我的重点一直是演示 CockroachDB 的运行时功能，因此我一直在使用 `--insecure` 标志来绕过此检查，并以不安全模式运行数据库。对于除用于开发的本地
    CockroachDB 安装以外的任何情况，您都应该通过使用证书保护集群安全。我们现在就来做这件事。


    首先，创建两个目录：一个用于存储证书，一个用于存储密钥。请注意，一旦 CockroachDB 生成了证书和密钥，这两个目录都将包含敏感信息：


    ```bash

    $ mkdir certs

    $ mkdir keys

    ```


    接下来，我们将要求 CockroachDB 生成一个证书颁发机构（CA）证书和一个私钥。我们将在后续步骤中使用这些文件为节点创建证书：


    ```bash

    $ cockroach cert create-ca \

    --certs-dir=certs \

    --ca-key=keys/ca.key

    ```


    ```bash

    $ ls certs

    ca.crt

    $ ls keys

    ca.key

    ```


    接下来，我们将要求 CockroachDB 为集群节点生成一个证书和一对公钥/私钥：


    ```bash

    $ cockroach cert create-node \

    --certs-dir=certs \

    --ca-key=keys/ca.key \

    localhost

    ```


    ```bash

    $ ls certs

    ca.crt node.crt node.key

    $ ls keys

    ca.key

    ```


    前面的 `cockroach cert create-node` 命令接受一个可变数量的主机参数以帮助节点发现。在此示例中，我在本地运行所有内容，因此传递单个
    `localhost` 值就足够了。


    现在，让我们使用生成的证书和密钥来启动一些 CockroachDB 节点。之前，当我们尝试这样做时，CockroachDB 返回了一个错误，但现在我们拥有了安全启动所需的文件，因此它将毫无问题地启动：


    ```bash

    $ cockroach start \

    --certs-dir=certs \

    --store=node1 \

    --listen-addr=localhost:26257 \

    --http-addr=localhost:8080 \

    --join=localhost:26257,localhost:26258,localhost:26259

    ```


    ```bash

    $ cockroach start \

    --certs-dir=certs \

    --store=node2 \

    --listen-addr=localhost:26258 \

    --http-addr=localhost:8081 \

    --join=localhost:26257,localhost:26258,localhost:26259

    ```


