    \  imagePullPolicy: IfNotPresent\n```\n\nKubernetes 将对您的节点执行滚动升级，不会有任何停机时间，并且会在替换每个节点之前将其从负载均衡器中移除。\n\
    \nCockroach Labs 提供了一些在执行版本间升级（包括像我们即将进行的这种小版本更新）时需要考虑的最佳实践。需要了解的一个关键点是自动最终化，以及在升级节点前它是否已启用。\n\
    \n如果升级集群节点有可能无意中损坏您的数据库（例如，在存在破坏性变更的版本之间升级），那么禁用自动最终化就很重要。可以通过以下方式实现：\n\n```sql\n\
    SET CLUSTER SETTING cluster.preserve_downgrade_option = '21.2';\n```\n\n要重新启用自动最终化：\n\
    \n```sql\nRESET CLUSTER SETTING cluster.preserve_downgrade_option;\n```\n\n在开始之前，我将运行前一章中的一条语句来获取集群中节点的基本信息：\n\
    \n```shell\ncockroach node status --insecure\n```\n\n```\n  id |    address  \
    \   |    sql_address  |   build\n-----+----------------+-----------------+-----------\n\
    \   1 | localhost:26257 | localhost:26257 | v21.2.0\n   2 | localhost:26258 |\
    \ localhost:26258 | v21.2.0\n   3 | localhost:26259 | localhost:26259 | v21.2.0\n\
    ```\n\n## 第 9 章 生产环境\n\n如我们所见，所有节点都按预期运行着 `v21.2.0`。现在让我们从节点一开始执行滚动升级。首先，我们将停止该节点（目前只需\
    \ `ctrl-c` 进程）并检查它是否已变得不可用。请注意，在节点一关闭期间，我们需要连接到另一个节点来检查状态：\n\n```shell\ncockroach\
    \ node status --insecure --url postgres://localhost:26258\n```\n\n```\n  id |\
    \    address     |    sql_address  |  build  | is_available | is_live\n-----+----------------+-----------------+---------+--------------+----------\n\
    \   1 | localhost:26257 | localhost:26257 | v21.2.0 |     false    |  false\n\
    \   2 | localhost:26258 | localhost:26258 | v21.2.0 |     true     |  true\n \
    \  3 | localhost:26259 | localhost:26259 | v21.2.0 |     true     |  true\n```\n\
    \n由于 `v21.2.0` 和 `v21.2.5` 之间没有破坏性变更，在获取到 `v21.2.5` 的二进制文件后，我们可以简单地再次运行启动命令；我们不需要删除节点的存储目录。\n\
    \n再次启动节点后，我们可以看到节点再次可用，并且其版本已经递增。我们也可以再次对节点一运行 `node` 命令：\n\n```shell\ncockroach\
    \ node status --insecure\n```\n\n```\n  id |    address     |    sql_address \
    \ |  build\n-----+----------------+-----------------+---------\n   1 | localhost:26257\
    \ | localhost:26257 | v21.2.5\n   2 | localhost:26258 | localhost:26258 | v21.2.0\n\
    \   3 | localhost:26259 | localhost:26259 | v21.2.0\n```\n\n我们现在将对节点二和节点三重复这些步骤。请注意，因为我们的集群只有三个节点，所以一次只对一个节点执行升级至关重要。如果我们同时从集群中移除两个节点，集群将变得不可用。\n\
    \n```shell\ncockroach node status --insecure\n```\n\n```\n  id |    address  \
    \   |    sql_address  |  build\n-----+----------------+-----------------+---------\n\
    \   1 | localhost:26257 | localhost:26257 | v21.2.5\n   2 | localhost:26258 |\
    \ localhost:26258 | v21.2.5\n   3 | localhost:26259 | localhost:26259 | v21.2.5\n\
    ```\n\n## 第 9 章 生产环境：迁移集群\n\n让我们假设在本节的最后部分，我们需要将集群从一个位置迁移到另一个位置（例如，为了云提供商迁移，或者在本地场景中迁移到更新的硬件）。这里我不讨论负载均衡或\
    \ DNS 等主题，而是提供一个节点迁移的模式。\n\n我们将为此示例启动一个全新的集群，从 AWS 的 `eu-central-1`（法兰克福）区域启动一个三节点集群，然后将它们迁移到\
    \ GCP 的 `europe-west1`（圣吉斯兰）区域。所有操作都将在本地运行，因此请注意，实际上并没有发生云迁移。\n"
- fmt: '# 集群节点迁移操作指南


    在开始之前，必须讨论添加和移除节点的顺序。我们有一个三节点集群，复制因子为三（可通过运行 `SHOW ZONE CONFIGURATION FROM DATABASE
    defaultdb` 查看），因此应始终保持一个三节点集群可用。这意味着在关闭一个节点之前先启动一个节点，并等待所有副本重新平衡到新节点后，再开始处理下一个节点。


    ## 初始化三节点集群


    首先，我们在法兰克福区域启动 `node1`、`node2` 和 `node3` 并初始化集群：


    ```

    $ cockroach start \

    --insecure \

    --store=node1 \

    --listen-addr=localhost:26257 \

    --http-addr=localhost:8080 \

    --locality=region=eu-central-1,zone=eu-central-1a \

    --join=''localhost:26257, localhost:26258, localhost:26259''

    ```


    ```

    $ cockroach start \

    --insecure \

    --store=node2 \

    --listen-addr=localhost:26258 \

    --http-addr=localhost:8081 \

    --locality=region=eu-central-1,zone=eu-central-1a \

    --join=''localhost:26257, localhost:26258, localhost:26259''

    ```


    ```

    $ cockroach start \

    --insecure \

    --store=node3 \

    --listen-addr=localhost:26259 \

    --http-addr=localhost:8082 \

    --locality=region=eu-central-1,zone=eu-central-1a \

    --join=''localhost:26257, localhost:26258, localhost:26259''

    ```


    ```

    $ cockroach init --insecure --host=localhost:26257

    ```


    ## 扩展至六节点集群


    接下来，我们在圣吉斯兰区域启动 `node4`、`node5` 和 `node6` 并让它们加入集群。一旦任何副本不足的区间被重新平衡并解决，我们将开始拆除原始集群节点：


    ```

    $ cockroach start \

    --insecure \

    --store=node4 \

    --listen-addr=localhost:26260 \

    --http-addr=localhost:8083 \

    --locality=region=europe-west1,zone=europe-west1b \

    --join=''localhost:26257, localhost:26258, localhost:26259,

    localhost:26260, localhost:26261, localhost:26262''

    ```


    ```

    $ cockroach start \

    --insecure \

    --store=node5 \

    --listen-addr=localhost:26261 \

    --http-addr=localhost:8084 \

    --locality=region=europe-west1,zone=europe-west1c \

    --join=''localhost:26257, localhost:26258, localhost:26259,

    localhost:26260, localhost:26261, localhost:26262''

    ```


    ```

    $ cockroach start \

    --insecure \

    --store=node6 \

    --listen-addr=localhost:26262 \

    --http-addr=localhost:8085 \

    --locality=region=europe-west1,zone=europe-west1d \

    --join=''localhost:26257, localhost:26258, localhost:26259,

    localhost:26260, localhost:26261, localhost:26262''

    ```


    注意，我已将所有新旧主机都包含在 `--join` 参数中；这将防止在开始移除旧节点后集群变得不可用。


    ## 检查集群状态


    新节点就位且所有副本不足的区间都已解决后，让我们运行 `node` 命令查看集群状态：


    ```

    $ cockroach node status --insecure --url postgres://localhost:26260

    --format records

    -[ RECORD 1 ]

    id             | 1

    address        | localhost:26257

    locality       | region=eu-central-1,zone=eu-central-1a

    is_available   | true

    is_live        | true

    -[ RECORD 2 ]

    id             | 2

    address        | localhost:26259

    locality       | region=eu-central-1,zone=eu-central-1a

    is_available   | true

    is_live        | true

    -[ RECORD 3 ]

    id             | 3

    address        | localhost:26258

    locality       | region=eu-central-1,zone=eu-central-1a

    is_available   | true

    is_live        | true

    -[ RECORD 4 ]

    id             | 4

    address        | localhost:26260

    locality       | region=europe-west1,zone=europe-west1b

    is_available   | true

    is_live        | true

    ![](index-240_1.jpg)

    -[ RECORD 5 ]

    id             | 5

    address        | localhost:26261

    locality       | region=europe-west1,zone=europe-west1c

    is_available   | true

    is_live        | true

    -[ RECORD 6 ]

    id             | 6

    address        | localhost:26262

    locality       | region=europe-west1,zone=europe-west1d

    is_available   | true

    is_live        | true

    ```


    一切看起来很好。所有六个节点都在运行。一旦所有剩余的副本不足区间都已解决（健康的复制状态示例见图 9-1）并且你已完成任何必需的备份，就可以安全地从集群中移除原始的三个节点并完成迁移。


    *图 9-1. 六个健康节点的复制状态*'
  raw: 'Before we begin, it’s important to discuss the order in which we’ll add and
    remove nodes. We have a three-node cluster, with a replication factor of three
    (as can be seen by running SHOW ZONE CONFIGURATION FROM DATABASE defaultdb), so
    we should keep a three-node cluster available at all times. This means bringing
    up a node before taking another node down and waiting for all replicas to be rebalanced
    onto the new node before starting work on the next node.


    First, we’ll start node1, node2, and node3 in the Frankfurt region and initialize
    the cluster:


    $ cockroach start \


    --insecure \


    --store=node1 \


    --listen-addr=localhost:26257 \


    --http-addr=localhost:8080 \


    --locality=region=eu-central-1,zone=eu-central-1a \


    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach start \


    --insecure \


    --store=node2 \


    --listen-addr=localhost:26258 \


    --http-addr=localhost:8081 \


    --locality=region=eu-central-1,zone=eu-central-1a \


    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach start \


    --insecure \


    --store=node3 \


    Chapter 9 produCtion


    --listen-addr=localhost:26259 \


    --http-addr=localhost:8082 \


    --locality=region=eu-central-1,zone=eu-central-1a \


    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach init --insecure --host=localhost:26257


    Next, we’ll start node4, node5, and node6 in the St. Ghislain region and have
    them join the cluster. Once any underreplicated ranges have been rebalanced and
    resolved, we’ll start tearing down the original cluster nodes:


    $ cockroach start \


    --insecure \


    --store=node4 \


    --listen-addr=localhost:26260 \


    --http-addr=localhost:8083 \


    --locality=region=europe-west1,zone=europe-west1b \


    --join=''localhost:26257, localhost:26258, localhost:26259,


    localhost:26260, localhost:26261, localhost:26262''


    $ cockroach start \


    --insecure \


    --store=node5 \


    --listen-addr=localhost:26261 \


    --http-addr=localhost:8084 \


    --locality=region=europe-west1,zone=europe-west1c \


    --join=''localhost:26257, localhost:26258, localhost:26259,


    localhost:26260, localhost:26261, localhost:26262''


    $ cockroach start \


    --insecure \


    --store=node6 \


    --listen-addr=localhost:26262 \


    --http-addr=localhost:8085 \


    --locality=region=europe-west1,zone=europe-west1d \


    -- join=''localhost:26257, localhost:26258, localhost:26259,


    localhost:26260, localhost:26261, localhost:26262''


    Chapter 9 produCtion


    Note that I’ve included all of the new and existing hosts to the --join argument;
    this will prevent the cluster from becoming unavailable once I start removing
    the old nodes.


    With the new nodes in place and all underreplicated ranges resolved, let’s run
    the node command to see how our cluster is looking:


    $ cockroach node status --insecure --url postgres://localhost:26260


    --format records


    -[ RECORD 1 ]


    id | 1


    address | localhost:26257


    locality | region=eu-central-1,zone=eu-central-1a


    is_available | true


    is_live | true


    -[ RECORD 2 ]


    id | 2


    address | localhost:26259


    locality | region=eu-central-1,zone=eu-central-1a


    is_available | true


    is_live | true


    -[ RECORD 3 ]


    id | 3


    address | localhost:26258


    locality | region=eu-central-1,zone=eu-central-1a


    is_available | true


    is_live | true


    -[ RECORD 4 ]


    id | 4


    address | localhost:26260


    locality | region=europe-west1,zone=europe-west1b


    is_available | true


    is_live | true


    ![](index-240_1.jpg)


    Chapter 9 produCtion


    -[ RECORD 5 ]


    id | 5


    address | localhost:26261


    locality | region=europe-west1,zone=europe-west1c


    is_available | true


    is_live | true


    -[ RECORD 6 ]


    id | 6


    address | localhost:26262


    locality | region=europe-west1,zone=europe-west1d


    is_available | true


    is_live | true


    Everything’s looking good. All six nodes are operational. Once all remaining underreplicated
    ranges are resolved (see Figure [9-1](#index_split_002.html#p240) for an example
    of healthy replication) and you’ve taken any backups required, it’s safe to remove
    the original three nodes from the cluster and finish the move.


    ***Figure 9-1.** Replication status of six healthy nodes*'
