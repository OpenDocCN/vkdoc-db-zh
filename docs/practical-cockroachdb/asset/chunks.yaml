- fmt: '# Multiregion Clusters


    If you’re creating a cluster on a known set of machines and you’d rather avoid
    orchestration tools like Kubernetes, this might be a good option for you.


    For many use cases, installing CockroachDB into multiple availability zones (AZs)
    within a cloud provider region will provide a suitable level of resilience for
    your database.


    If you require more resiliency than a single-region deployment can provide, CockroachDB
    has you covered again. In this section, we’ll simulate a multiregion deployment
    using the `cockroachdb` binary. This cluster will survive not only AZ failures
    but also complete cloud provider *region* failures.


    ![](index-36_1.jpg)


    ## Multiregion Deployment


    In the previous example, we were operating *within* a cloud provider region. A
    single AZ failure would have removed one CockroachDB node from the cluster, leaving
    two nodes to continue working until it was available again. From a latency perspective,
    this would have been acceptable, thanks to the proximity of the other nodes.


    On a map, our cluster may have looked similar to the cluster in Figure 2-1. Note
    that the map view for nodes is only available for Enterprise clusters:


    **Figure 2-1.** Single-region, multinode cluster


    All nodes are located within a given cloud provider region (e.g., `us-east1`,
    as shown previously).


    In the following example, we’re operating *across* cloud provider regions. This
    means the distance (and latency) between regions may be significant. Creating
    a cluster with one node in each region would therefore be a bad idea. Consider
    Figure 2-2, where we’ve taken our three-node, single-region cluster and have installed
    it across regions instead of AZs. If we lose one node, the cluster will continue
    to work with two. However, as mentioned, the latency between nodes will now be
    much greater.


    ![](index-37_1.jpg)


    **Figure 2-2.** Multiregion, single-node cluster


    Outages aside, our cluster will be spending a lot of time replicating data between
    nodes. When writing to CockroachDB in a three-node replicated cluster, consensus
    between the leaseholder node (the primary write node for a range of data) and
    at least one of its follower nodes will need to be achieved. This will take time
    in a cross-region cluster, making writes very slow.


    We need a new topology.


    In this example, we’ll partition our data by region so that database consumers
    (users and applications, etc.) will access their closest region for all write
    operations. For a cluster like this to provide adequate regional and zonal resilience,
    we’ll now need nine nodes. Use the following commands to create these:


    ```

    $ cockroach start \

    --insecure \

    --store=node1 \

    --listen-addr=localhost:26257 \

    --http-addr=localhost:8080 \

    --locality=region=us-east1,zone=us-east1a \

    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach start \

    --insecure \

    --store=node2 \

    --listen-addr=localhost:26258 \

    --http-addr=localhost:8081 \

    --locality=region=us-east1,zone=us-east1b \

    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach start \

    --insecure \

    --store=node3 \

    --listen-addr=localhost:26259 \

    --http-addr=localhost:8082 \

    --locality=region=us-east1,zone=us-east1c \

    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach start \

    --insecure \

    --store=node4 \

    --listen-addr=localhost:26260 \

    --http-addr=localhost:8083 \

    --locality=region=us-central1,zone=us-central1a \

    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach start \

    --insecure \

    --store=node5 \

    --listen-addr=localhost:26261 \

    --http-addr=localhost:8084 \

    --locality=region=us-central1,zone=us-central1b \

    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach start \

    --insecure \

    --store=node6 \

    --listen-addr=localhost:26262 \

    --http-addr=localhost:8085 \

    --locality=region=us-central1,zone=us-central1c \

    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach start \

    --insecure \

    --store=node7 \

    --listen-addr=localhost:26263 \

    --http-addr=localhost:8086 \

    --locality=region=us-west1,zone=us-west1a \

    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach start \

    --insecure \

    --store=node8 \

    --listen-addr=localhost:26264 \

    --http-addr=localhost:8087 \

    --locality=region=us-west1,zone=us-west1b \

    --join=''localhost:26257, localhost:26258, localhost:26259''


    $ cockroach start \

    --insecure \

    --store=node9 \

    --listen-addr=localhost:26265 \

    --http-addr=localhost:8088 \

    --locality=region=us-west1,zone=us-west1c \

    --join=''localhost:26257, localhost:26258, localhost:26259''

    ```


    Next, initialize the cluster by executing the `init` command against one of the
    nodes:


    ```

    $ cockroach init --insecure --host=localhost:26257

    ```


    Cluster successfully initialized.


    To partition the database in this way, we’ll need an Enterprise license. You can
    obtain a free 30-day trial license from the Cockroach Labs website. Visit the
    [www.cockroachlabs.com/get-cockroachdb/enterprise/](http://www.cockroachlabs.com/get-cockroachdb/enterprise/)
    page and grab your trial Enterprise license now.


    It’s time to convert the cluster to Enterprise! Connect to one of the nodes in
    the cluster and run the following commands, substituting the `cluster.organization`
    and `enterprise.license` values with the ones you received in the Enterprise trial
    email:


    ```

    $ cockroach sql --insecure --host=localhost:26257

    #

    # Welcome to the CockroachDB SQL shell.

    # All statements must be terminated by a semicolon.

    # To exit, type: \q.

    #

    # Server version: CockroachDB CCL v21.1.7 (x86_64-apple-darwin19, built 2021/08/09
    17:58:36, go1.15.14) (same version as client)

    # Cluster ID: 689b7704-af5d-4527-a638-bad622fff923

    #

    ```'
