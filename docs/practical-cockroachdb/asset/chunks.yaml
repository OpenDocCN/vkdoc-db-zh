    the data you’re indexing. Any small changes to the input data may result in a
    different hash output and a different index bucket. The table can now scale more
    evenly across the nodes in your cluster, resulting in increased performance.


    **View Design**


    A view is simply a SELECT query that you assign a name to ask CockroachDB to remember.
    CockroachDB supports three types of views:


    • **Materialized views** – CockroachDB stores the resulting data


    for improved performance in subsequent queries. I would only


    recommend using materialized views if you cannot index the data in


    3 [www.cockroachlabs.com/docs/stable/hash-sharded-indexes](http://www.cockroachlabs.com/docs/stable/hash-sharded-indexes)


    Chapter 5 InteraCtIng wIth CoCkroaChDB


    your table, for query performance, and if the data in that table does


    not update frequently. If data frequently updates, your results might


    be stale.


    • **Dematerialized views** – The results of a view are not stored, meaning data
    is always consistent with the table. As the results are not


    stored, CockroachDB will query the underlying table for each view


    query. If you’ve appropriately indexed your table for performance,


    dematerialized views are the best choice, as they will always return


    correct data.


    • **Temporary views** – Temporary views are ephemeral views that are


    accessible only to the session in which they were created and deleted


    at the end of that session.


    If you need to restrict table data to specific users or have complex queries you’d
    like to expose as simpler ones, views are a good choice. Let’s create some views
    to see what they can offer us.


    **Simplify Queries**


    Suppose you have a query whose complexity you’d like to hide (or simply not have
    to rewrite). You can create a view over this data to expose a simpler query.'
  trans: "# 第 5 章 与 CockroachDB 交互\n\nWHERE `date_of_birth` BETWEEN '1979-01-01' and\
    \ '1997-12-31'\n\nAND `pets` <@ ARRAY['Mr. Dog']\n\nORDER BY `date_of_birth` DESC;\n\
    \n`distribution: full`\n`vectorized: true`\n\n- `sort`\n  - `order: -date_of_birth`\n\
    - `filter`\n  - `filter: pets <@ ARRAY['Mr. Dog']`\n- `index join`\n  - `table:\
    \ person@primary`\n- `scan`\n  - `missing stats`\n  - `table: person@person_date_of_birth_idx`\n\
    \  - `spans: [/'1979-01-01 00:00:00' - /'1997-12-31 00:00:00']`\n\nCockroachDB\
    \ 必须在返回结果前为我们手动排序，因为表上的索引默认按升序排列，而我们要求按降序排列。\n\n假设你知道 CockroachDB 可能按某列以升序或降序返回查询结果。在这种情况下，值得考虑为这两种场景添加索引，如下所示：\n\
    \n```sql\nCREATE TABLE person (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
    \    date_of_birth TIMESTAMP NOT NULL,\n    pets STRING[],\n    INDEX person_date_of_birth_asc_idx\
    \ (date_of_birth ASC),\n    INDEX person_date_of_birth_desc_idx (date_of_birth\
    \ DESC),\n    INVERTED INDEX (pets)\n);\n```\n\n有了这个，CockroachDB 就知道如何返回按 `date_of_birth`\
    \ 升序或降序排列的查询结果，而无需手动排序。\n\n如果你正在索引包含顺序数据的列，例如 `TIMESTAMP` 或递增的 `INT` 值，你可能需要考虑使用哈希分片索引.3\n\
    \n哈希分片索引确保索引数据均匀分布在各个范围（range）中，从而防止单范围热点。当查询多个相似值且这些值存在于同一个范围中时，就会发生单范围热点。\n\n\
    在撰写本文时，哈希分片索引仍处于实验阶段，因此需要按如下方式启用：\n\n```sql\nSET experimental_enable_hash_sharded_indexes\
    \ = true;\n\nCREATE TABLE device_event (\n    device_id UUID NOT NULL,\n    event_timestamp\
    \ TIMESTAMP NOT NULL,\n    INDEX (device_id, event_timestamp) USING HASH WITH\
    \ bucket_count = 10\n);\n```\n\n在底层，索引中的值将是你要索引的数据的 `FNV` 哈希表示。对输入数据的任何微小更改都可能导致不同的哈希输出和不同的索引存储桶（bucket）。现在，表可以在集群的节点之间更均匀地扩展，从而提高性能。\n\
    \n3 [www.cockroachlabs.com/docs/stable/hash-sharded-indexes](http://www.cockroachlabs.com/docs/stable/hash-sharded-indexes)\n\
    \n## 视图设计\n\n视图只是一个你为其命名并让 CockroachDB 记住的 `SELECT` 查询。CockroachDB 支持三种类型的视图：\n\
    \n- `物化视图` – CockroachDB 存储结果数据，以提高后续查询的性能。我仅建议在无法为表中的数据创建索引以提升查询性能，且该表中的数据不经常更新的情况下使用物化视图。如果数据频繁更新，你的结果可能会过时。\n\
    - `非物化视图` – 视图的结果不被存储，这意味着数据始终与表保持一致。由于结果不被存储，CockroachDB 将为每次视图查询查询底层表。如果你已为表适当地建立了索引以提升性能，非物化视图是最佳选择，因为它们总是返回正确的数据。\n\
    - `临时视图` – 临时视图是临时性的视图，只能在创建它们的会话中访问，并在该会话结束时删除。\n\n如果你需要将表数据限制给特定用户，或者有希望以更简单形式呈现的复杂查询，视图是一个不错的选择。让我们创建一些视图，看看它们能为我们提供什么。\n\
    \n### 简化查询\n\n假设你有一个希望隐藏其复杂性（或只是不想重复编写）的查询。你可以基于此数据创建一个视图，以呈现一个更简单的查询。"
- fmt: "# Chapter 5 Interacting with CockroachDB\n\nLet’s assume we’re running an\
    \ online shop and would like a query to return the number of purchases by day.\
    \ Granted, this is a straightforward query, but for the sake of argument, we’ll\
    \ wrap this in a view to demonstrate the concept.\n\n## Basic View Example\n\n\
    First, we’ll create the tables:\n\n```sql\nCREATE TABLE customer (\n    id UUID\
    \ PRIMARY KEY DEFAULT gen_random_uuid(),\n    email STRING(50) NOT NULL,\n   \
    \ INDEX(email)\n);\n\nCREATE TABLE product (\n    id UUID PRIMARY KEY DEFAULT\
    \ gen_random_uuid(),\n    sku STRING(20) NOT NULL,\n    INDEX(sku)\n);\n\nCREATE\
    \ TABLE purchase (\n    customer_id UUID NOT NULL REFERENCES customer(id),\n \
    \   product_id UUID NOT NULL REFERENCES product(id),\n    checkout_at TIMESTAMPTZ\
    \ NOT NULL\n);\n```\n\nNext, we’ll insert some data into the tables to give us\
    \ something to work with:\n\n```sql\nINSERT INTO customer (email) VALUES\n   \
    \ ('m.curie@gmail.com'),\n    ('l.meitner@gmail.com'),\n    ('d.hodgkin@gmail.com');\n\
    \nINSERT INTO product (sku) VALUES\n    ('E81ML1GA'),\n    ('4UXK19D0'),\n   \
    \ ('L28C0XJ4');\n\nINSERT INTO purchase (customer_id, product_id, checkout_at)\
    \ VALUES\n    ('2df28d7d-67a3-4e83-a713-96a68a196b0b', '486ecc02-6d8e-44fe-b8ef-b8d004658465',\
    \ '2021-11-23T06:50:46Z'),\n    ('5047d78c-12cc-48e3-a36a-7cac1018ba7e', '5b2756e6-cc88-47e6-849d-6291a76f3881',\
    \ '2021-11-22T08:13:13+07:00'),\n    ('792ab188-1bb2-4ac6-b1d2-f1adbcf9223e',\
    \ '6cfd7bed-bf11-4c96-9300-82c8e9dd97f2', '2021-11-23T06:50:46-05:00');\n```\n\
    \nFinally, we’ll create the view. This view will be a simple selection on the\
    \ `purchase` table, along with a grouping over the extracted day-of-week value\
    \ of the `checkout_at` column:\n\n```sql\nCREATE VIEW purchases_by_dow (dow, purchases)\
    \ AS\n    SELECT EXTRACT('ISODOW', pu.checkout_at), COUNT(*)\n    FROM purchase\
    \ pu\n    GROUP BY EXTRACT('ISODOW', pu.checkout_at);\n```\n\nWith this in place,\
    \ we can now work against the view, which hides the complexity of the date manipulation:\n\
    \n```sql\nSELECT * FROM purchases_by_dow;\n```\n\n```\n  dow | purchases\n------+------------\n\
    \    2 |         2\n    1 |         1\n```\n\n## Restrict Table Data\n\nAnother\
    \ good use case for views is for restricting access to data. In the following\
    \ example, we’ll create a table and restrict its data to groups of users.\n\n\
    Assume that in the previous example, our shop operates globally. We might not\
    \ want to sell all products everywhere, so limiting the products we show users\
    \ in different countries makes sense.\n\nBefore we begin, we’ll need to create\
    \ and connect to a secure cluster. Let’s create a single-node cluster now.\n\n\
    ```bash\nmkdir certs\nmkdir keys\n\ncockroach cert create-ca \\\n    --certs-dir=certs\
    \ \\\n    --ca-key=keys/ca.key\n\ncockroach cert create-node \\\n    --certs-dir=certs\
    \ \\\n    --ca-key=keys/ca.key \\\n    localhost\n\ncockroach start-single-node\
    \ \\\n    --certs-dir=certs \\\n    --store=node1 \\\n    --listen-addr=localhost:26257\
    \ \\\n    --http-addr=localhost:8080\n\ncockroach cert create-client \\\n    root\
    \ \\\n    --certs-dir=certs \\\n    --ca-key=keys/ca.key\n\ncockroach sql --certs-dir=certs\n\
    ```\n\nFirst, we’ll create the `products` table and insert some products into\
    \ it:\n\n```sql\nCREATE TABLE product (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
    \    country_iso STRING(3) NOT NULL,\n    sku STRING(20) NOT NULL\n);\n\nINSERT\
    \ INTO product (country_iso, sku) VALUES\n    ('BRA', 'E81ML1GA'),\n    ('FIN',\
    \ '4UXK19D0'),\n    ('GBR', 'L28C0XJ4');\n```\n\nNext, we’ll create a view to\
    \ return all products for customers in the UK:\n\n```sql\nCREATE VIEW product_gbr\
    \ (id, country_iso, sku) AS\n    SELECT id, country_iso, sku FROM product\n  \
    \  WHERE country_iso = 'GBR';\n```\n\nFinally, we’ll create a user and grant them\
    \ access to the view. We’ll assume the following user will serve UK customers:\n\
    \n```sql\nCREATE USER user_gbr WITH LOGIN PASSWORD 'some_password';\n\nGRANT SELECT\
    \ ON product_gbr TO user_gbr;\n\nREVOKE SELECT ON product FROM user_gbr;\n```\n\
    \nLet’s connect to the database as the new user and see what we can (and can’t)\
    \ access:\n\n```bash\ncockroach sql \\\n    --certs-dir=certs \\\n    --url \"\
    postgres://user_gbr:some_password@localhost:26257/defaultdb\"\n```\n\n```sql\n\
    user_gbr@localhost:26257/defaultdb> SELECT * FROM product;\nERROR: user user_gbr\
    \ does not have SELECT privilege on relation product\nSQLSTATE: 42501\n\nuser_gbr@localhost:26257/defaultdb>\
    \ SELECT * FROM product_gbr;\n```"
