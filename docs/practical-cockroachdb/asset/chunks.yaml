    \n哎呀！从`FULL SCAN`来看，很明显我们缺少一些索引。CockroachDB 将`start_date <= filter`、`end_date\
    \ >= filter`和`end_date IS NULL`这几个过滤条件标识为可能导致此问题的原因。如果不修复，随着表的增长，该查询的性能将继续下降。\n\
