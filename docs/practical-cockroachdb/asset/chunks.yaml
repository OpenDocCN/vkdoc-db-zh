    **CHAPTER 5**


    **Interacting with**


    **CockroachDB**


    We’ve covered a lot of conceptual ground, and it’s now time to start using CockroachDB


    as an end user. We’ve created clusters and tables; now, let’s connect to them
    and put them to work.


    **Connecting to CockroachDB**


    When presented with a new database, the first thing you might want to do is connect
    to it and start querying! In this section, we’ll connect to self-hosted and cloud-based
    CockroachDB clusters with tools and from code.


    **Connecting with Tools**


    There are plenty of off-the-shelf tools you can use to connect to a CockroachDB
    cluster.


    Some are free, and some you’ll pay to use.


    Here are some of the popular off-the-shelf tools for interacting with CockroachDB.
    I will be using DBeaver Community, but both DataGrip and TablePlus have excellent
    support for CockroachDB:


    • **DBeaver** – [https://dbeaver.com](https://dbeaver.com)


    • **DataGrip** – [www.jetbrains.com/datagrip](http://www.jetbrains.com/datagrip)


    • **TablePlus** – [https://tableplus.com](https://tableplus.com)


