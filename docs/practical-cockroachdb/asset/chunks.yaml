    ***Figure 2-3.** Multiregion, multinode cluster*


    CockroachDB allows you to decide how the cluster should behave in the event of
    zonal or regional failure. These are configured as “Survival Goals” options, and
    your decision of which one to use should be based on your resilience and performance
    requirements.


    **Zone Failure Goal**


    The Zone Failure Goal (CockroachDB’s default setting) provides resilience against
    a cloud provider *zone* going down within a region. If two zones go down in the
    same region, your cluster is not guaranteed to function correctly. If you favor
    performance over resilience, this might be a good option for you.


    To configure zone failure resilience, run the following command against a database
    to configure a primary region and set the survival goal:


    ALTER DATABASE "YOUR_DATABASE" PRIMARY REGION "us-east1"; ALTER DATABASE "YOUR_DATABASE"
    SURVIVE ZONE FAILURE;


    Chapter 2 InstallIng CoCkroaChDB


    By running the following command, we’ll see that the number of replicas is set
    to 3, the default value for CockroachDB with or without explicitly configuring
    survival goals.


    SHOW ZONE CONFIGURATION FROM RANGE default;


    **Regional Failure Goal**


    The Region Failure Goal provides resilience against a cloud provider *region*
    going down.


    This is achieved by increasing the replication factor of the database from 3 to
    5, meaning writes will become slower in the event of a region outage, as follower
    nodes will be further away from the leaseholder node until the region recovers.
    If you favor resilience over performance, this might be a good option for you.


    To configure region failure resilience, run the following commands against a database
    to add regions, configure a primary region, and set the survival goal: ALTER DATABASE
    "YOUR_DATABASE" PRIMARY REGION "us-east1"; ALTER DATABASE "YOUR_DATABASE" ADD
    REGION "us-west1";


    ALTER DATABASE "YOUR_DATABASE" ADD REGION "us-central1"; ALTER DATABASE "YOUR_DATABASE"
    SURVIVE REGION FAILURE;


    This database is now configured to survive region failures instead of zone failures.


    Now run the following command to set the number of replicas to 5.


    SHOW ZONE CONFIGURATION FROM DATABASE defaultdb;


    **The demo Command**


    The cockroach CLI’s demo command starts an in-memory CockroachDB Enterprise


    cluster on your machine. The Enterprise license for this cluster is valid for
    one hour, which is plenty of time to try out CockroachDB’s enterprise features.
    Once expired, you simply rerun the demo command to start another hour.


    We’ll run a local CockroachDB Enterprise cluster via the demo command for most
    examples in this book. Any CockroachDB Enterprise features demonstrated will be
    clearly highlighted.


    Chapter 2 InstallIng CoCkroaChDB


    **CockroachDB Serverless/Dedicated**


    If you prefer to use Software-as-a-Service (SaaS) tools, CockroachDB Serverless
    and CockroachDB Dedicated (collectively referred to as “CockroachDB Serverless”)
    are a great way to get started with CockroachDB. Both services allow you to spin
    up a secure CockroachDB cluster in a matter of seconds. Depending on your requirements,
    it provides everything from free single-core/5GB/multitenant instances of CockroachDB
    to multiregion Enterprise clusters hosted on your choice of cloud provider.


    **Creating a Cluster**


    Let’s create and connect to a free-tier CockroachDB Serverless instance now.


    First, head to [https://cockroachlabs.cloud](https://cockroachlabs.cloud) and
    register for an account if you don’t already have one. Cockroach Labs will not
    ask for you any billing information.


    Next, choose the Free plan, select your preferred cloud provider, choose a


    deployment region, provide a name, and create your cluster. At the time of writing,
    you can choose to host your Free Tier instance in either GCP’s europe-west1, us-central1,
    and asia-southeast1 regions or AWS’s eu-west-1, us-west-2, and ap-southeast-1
    regions.


    After approximately 20 seconds, your cluster will be ready for connections.


    **Connecting to Your Cluster**


    To connect to your cluster from the command line, download the root certificate
    for your cluster. To do this, run the following command, replacing the emboldened
    text with your cluster ID. This will be a UUID that forms part of the URL path
    when visiting the cluster via the CockroachDB Serverless site:


    $ curl -o root.crt https://cockroachlabs.cloud/clusters/**YOUR_**


    **CLUSTER_ID**/cert


    Next, connect to your database via the SQL shell using the following command.
    The emboldened text will be provided by the UI when you click on Connect:


    $ cockroach sql --url ''postgresql://**YOUR_USERNAME**:**YOUR_PASSWORD**@free-tier5.gcp-europe-west1.cockroachlabs.cloud:26257/defaultdb?sslmode=verify-


    full&sslrootcert=root.crt&options=--cluster=**YOUR_CLUSTER_NAME**''


