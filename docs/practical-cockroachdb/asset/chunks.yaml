  trans: "# 第 9 章：生产环境\n\n## 集群维护\n\n你在上线第一天部署到生产环境的集群，不太可能与一年后（尤其是五年后）运行的集群相似。如果你提前数年规划\
    \ CockroachDB 集群，那么你\n\n- 可能正在为未充分利用的资源付费\n- 没有充分利用 CockroachDB 的扩展能力\n\n在本节中，我们将创建一个小型节点集群，并执行以下集群范围的操作：\n\
    \n- 通过添加额外节点来扩展集群。\n- 升级 CockroachDB 的版本。\n- 将集群迁移到新节点。\n\n我们将从扩展集群开始。如果你的 CockroachDB\
    \ 部署是通过 Cockroach Cloud 运行的，这种场景会由平台处理；所有集群扩展都是自动的。如果你的集群托管在 Kubernetes 中，则操作非常简单：\n\
    \n```yaml\napiVersion: apps/v1\nkind: StatefulSet\nmetadata:\n  name: cockroachdb\n\
    spec:\n  serviceName: \"cockroachdb\"\n  replicas: 3 *# => 5*\n  ...\n```\n\n\
    对于本章的示例，我们将手动启动一个集群，以便完全控制每个节点。让我们从三个独立的命令行终端会话中启动三个节点开始，然后用第四个终端进行初始化。请注意，在此示例中我使用了不同的端口和存储，因为集群是运行在一台机器上的。\n\
    \n实际上，这个集群将运行在多台机器上，因此节点启动命令之间的唯一区别将是加入地址：\n\n```bash\n$ cockroach start \\\n\
    --insecure \\\n--store=node1 \\\n--listen-addr=localhost:26257 \\\n--http-addr=localhost:8080\
    \ \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\n$ cockroach start\
    \ \\\n--insecure \\\n--store=node2 \\\n--listen-addr=localhost:26258 \\\n--http-addr=localhost:8081\
    \ \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\n$ cockroach start\
    \ \\\n--insecure \\\n--store=node3 \\\n--listen-addr=localhost:26259 \\\n--http-addr=localhost:8082\
    \ \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\n$ cockroach init\
    \ --insecure --host=localhost:26257\n```\n\n是时候进行扩展了。CockroachDB 设计为可运行于任何地方，可扩展性和生存能力是其存在的根本原因。因此，扩展\
    \ CockroachDB 集群几乎简单得可笑：\n\n```bash\n$ cockroach start \\\n--insecure \\\n--store=node4\
    \ \\\n--listen-addr=localhost:26260 \\\n--http-addr=localhost:8083 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
    ```\n\n在上面的命令中，我们以与启动三个初始（或“种子”）节点完全相同的方式启动了一个新节点。集群中的每个节点都将使用八卦协议[¹] 相互通信以组织扩展。三个种子节点就足以构成这个八卦网络的基础，它们不需要感知额外节点。这允许你继续扩展集群，而无需对种子节点的配置进行任何更改。\n\
    \n运行该命令会启动第四个节点，该节点立即加入集群，从而扩展其容量。\n\n[¹]: [`en.wikipedia.org/wiki/Gossip_protocol`](https://en.wikipedia.org/wiki/Gossip_protocol)\n\
    \n在进入下一个示例之前，请停止节点并删除它们的数据目录（例如，`node1`、`node2` 和 `node3`）。\n\n---\n\n```sql\n\
    lastID = ids[len(ids)-1]\n}\nreturn time.Since(start), nil\n}\n```\n\n现在来看结果。两种方法之间的差异不像\
    \ `INSERT` 示例那样明显，但考虑到减少了表锁，额外的性能提升是很好的：\n\n| 测试名称 | 耗时 |\n| :--- | :--- |\n|\
    \ `updateontheFly` | 3.69s |\n| `updateMultipass (selectLimit = 10,000, updateLimit\
    \ = 1,000)` | **2.04s** |\n\n请查看 Cockroach Labs 网站，了解一个使用 Python 进行多遍批量更新操作的精彩示例。[2]\n\
    \n[2]: www.cockroachlabs.com/docs/stable/bulk-update-data"
- fmt: "Scaling a cluster into a different region requires a little more configuration\
