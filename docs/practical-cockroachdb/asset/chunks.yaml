    **Incremental Backups**


    A full backup and restore works in this case, as the database and objects are
    small. If your cluster is many gigabytes in size, incremental backups may be a
    more efficient option for you. Let’s explore incremental backups to see how they
    work.


    First, we’ll insert some new data into our restored sensor_reading table to simulate
    data being added to the table over time. This will create a delta between the
    original data we inserted at the start of the backups section to now. If CockroachDB
    does not detect a change between an incremental backup and the previous backup
    (whether full or incremental), you’ll see an empty backup directory:


