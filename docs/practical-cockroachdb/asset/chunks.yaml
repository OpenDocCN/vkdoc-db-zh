    **1_pod-disruption-budget.yaml**


    This file creates the PodDisruptionBudget resource for our StatefulSet. A Pod
    Disruption Budget provides Kubernetes with a tolerance for pod failures against
    a given application (identified by the selector “cockroachdb”). It ensures that
    there are never more than maxUnavailable pods unavailable in the cluster at any
    one time. By setting this to 1, we’ll prevent Kubernetes from removing more than
    1 CockroachDB node during operations like rolling updates, etc.


    If you’re configuring a cluster of 5 nodes in Kubernetes, consider setting this
    to 2, as you’ll still have a 3-node cluster if 2 of your nodes are temporarily
    unavailable.


    apiVersion: policy/v1


    kind: PodDisruptionBudget


    metadata:


    name: cockroachdb-budget


    labels:


    app: cockroachdb


    spec:


    selector:


    matchLabels:


    app: cockroachdb


    maxUnavailable: 1


    Run the following command to create the pod disruption budget:


    $ kubectl apply -f 1_pod-disruption-budget.yaml


