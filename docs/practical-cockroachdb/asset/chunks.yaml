    discovery and rolling updates. In the previous section on installing via Kubernetes,
    had we been working with a multinode/region cluster, our StatefulSet would have
    deployed one CockroachDB node to each of them.


    In this section, we’ll simulate a three-node CockroachDB cluster with the


    cockroach binary.


    First, start the three nodes with the following commands:


    $ cockroach start \


    --insecure \


    --store=node1 \


    --listen-addr=localhost:26257 \


    --http-addr=localhost:8080 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \


    --insecure \


    --store=node2 \


    --listen-addr=localhost:26258 \


    --http-addr=localhost:8081 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \


    --insecure \


    --store=node3 \


    --listen-addr=localhost:26259 \


    Chapter 2 InstallIng CoCkroaChDB


    --http-addr=localhost:8082 \


    --join=localhost:26257,localhost:26258,localhost:26259


    Next, initialize the cluster by executing the init command against one of the
    nodes: $ cockroach init --insecure --host=localhost:26257


    Cluster successfully initialized


    Finally, connect to the cluster by executing the sql command against one of


    the nodes:


    $ cockroach sql --insecure --host=localhost:26257


