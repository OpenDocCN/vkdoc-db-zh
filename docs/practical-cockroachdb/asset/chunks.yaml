- fmt: '## Nonfunctional Testing


    Nonfunctional testing asserts that the database satisfies the *‘ilities*: reliability,
    scalability, etc. In this section, we’ll cover some of the most common types of
    nonfunctional testing you might come across when integrating CockroachDB.


    ## Performance Testing


    To get value from a performance test, we must first understand how the application
    will use our database. Which tables will be the most frequently used? What is
    the impact of calling them? Are there any client-side interactions that result
    in many database calls?


    Let’s start this section by understanding the client-side interactions and how
    they result in database calls. We’ll do this by listing the interactions in descending
    order of expected call frequency:


    • **Fetch all products** – This will invoke a fairly simple `SELECT` statement
    once per call. This statement could potentially return a lot of data.


    • **Fetch a customer** – This will invoke a simple `SELECT` statement once per
    call. This request uses a primary key index, so it’s inherently optimized.


    • **Fetch customer orders** – This will invoke a simple `SELECT` statement using
    three joins.


    • **Create a customer** – This will invoke a simple `INSERT` statement once per
    new customer.


    • **Create an order** – Like the request to create a product, this will invoke
    at least one `INSERT` statement and a subsequent `INSERT` statement of each product
    ordered. All within a simple transaction.


    • **Create a product** – This will invoke at least one `INSERT` statement and
    a subsequent `INSERT` statement for each product price. All within a simple transaction.


    I’ll use `k6`, an open source load testing tool written in Go and JavaScript scriptable,
    to simulate these transactions.


    To keep things light, I’ll implement just two `k6` scripts. For the sake of brevity,
    I won’t spend time simulating accurate user behavior:


    • **products.js** – A script to insert multiple random products into the database
    via the API


    • **customers.js** – A script to simulate a user browsing for products, placing
    an order, then checking the status of their order


    First, let’s create the `products.js` script to simulate a user creating products.
    This script will


    • Make a `POST` request to the `/products` endpoint with a JSON body representing
    a product with a random name, `SKU`, and an active, random price


    • Fail if the response status is not `200` (success)


    • Fail if after running all of the test iterations, the error rate was greater
    than 1% or the request duration for the 95% percentile was greater than 100ms


    ```javascript

    import http from ''k6/http'';

    import { check } from ''k6'';

    import { randomString, randomIntBetween } from ''https://jslib.k6.io/k6-utils/1.1.0/index.js'';


    const BASE_URL = ''http://localhost:3000'';


    export const options = {

    thresholds: {

    http_req_failed: [''rate<0.01''],

    http_req_duration: [''p(95)<100''],

    }

    };


    export default() => {

    const createResponse = http.post(

    `${BASE_URL}/products`,

    JSON.stringify({

    name: ''Name '' + randomString(16),

    sku: ''SKU '' + randomString(10),

    prices: [

    {

    amount: randomIntBetween(1, 100),

    start_date: addDays(new Date(), -10),

    end_date: addDays(new Date(), 10),

    }

    ]

    }),

    { headers: {''Content-Type'': ''application/json''} }

    );


    check(createResponse, { ''create product response'': (r) => r.status === 200 });

    };


    function addDays(date, days) {

    date.setDate(date.getDate() + days);

    return date;

    }

    ```


    Now, let’s create the `customers.js` script to simulate a customer using the database
    via the API. This script will


    • Make a `POST` request to the `/customers` endpoint with a JSON body that represents
    a customer with a random `full_name` and `email`


    • Fail if the response status from creating the customer is not `200` (success)


    • Capture the customer’s ID from the response body `JSON` and pass it'
