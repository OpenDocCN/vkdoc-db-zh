    ## 最佳实践


    Cockroach Labs 网站上的最佳实践文档非常全面，是任何希望充分利用其 CockroachDB 集群的人的绝佳参考。


    在本节中，我们将应用这些最佳实践，并观察如果不遵循它们会发生什么。


    除非特别说明，本章后续的许多示例将使用我在第 8 章中创建的三节点、负载均衡的集群。


    ## SELECT 性能


    在本节中，我们将探讨一些关于 `SELECT` 语句的性能最佳实践，以及您可以调整哪些配置值以获得最佳性能。


    如果您发现 `SELECT` 查询运行缓慢，并且已经排除了索引问题，那么您的数据库可能缺乏缓存内存。默认情况下，每个节点将拥有 128MiB（~134MB）的缓存大小，用于存储查询所需的信息。这个大小作为本地数据库开发的默认值效果良好，但您可能会发现增加它会带来更快的
    `SELECT` 性能。Cockroach Labs 建议在生产部署中将缓存大小设置为机器可用内存的至少 25%。


    要更新此设置，请在启动节点时向 `--cache` 参数传递一个值：


    ```

    # 将缓存大小设置为节点总内存的 30%：

    $ cockroach start --cache=.30 ...

    $ cockroach start --cache=30% ...


    # 将缓存大小设置为特定值：

    $ cockroach start --cache=200MB ...

    $ cockroach start --cache=200MiB ...

    ```


    另一个需要考虑更改的设置是 `--max-sql-memory` 参数，它默认使用节点总内存的 25%。增加此值将允许 CockroachDB 为 `GROUP
    BY` 和 `ORDER BY` 等聚合操作分配更多内存，并增加可能的并发数据库连接数，从而缓解连接池争用。


