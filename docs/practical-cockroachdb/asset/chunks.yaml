    # Production


    在本书的最后一章，我们将介绍一些确保集群能够应对生产环境各种挑战的实践和工具：


    • **最佳实践** – 学习新技术可能让人不知所措，而知道如何“正确”做事看起来也是一项艰巨的任务。本节将探讨在运行生产集群时需要考虑的一些最佳实践。

    • **升级集群** – 我们需要保持节点更新，以利用最新的 CockroachDB 特性和修复。

    • **备份和恢复数据** – 虽然 CockroachDB “多活”的理念消除了灾难恢复规划的必要性，但考虑采取数据库快照以便在发生意外数据库损坏（例如
    `DELETE * FROM customer...`）时回退，仍然是良好的实践。

    • **迁移集群** – 我曾在化妆品零售商 Lush 工作过，深知没有任何云服务商是永恒的。本节将向您展示如何在重大基础设施改革时，将 CockroachDB
