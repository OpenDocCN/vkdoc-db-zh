    **The node Command**


    The node command provides functionality to view and manage nodes in a CockroachDB


    cluster. Let’s create some nodes and use the node command to manage them now.


    First, we’ll need some nodes; create a five-node insecure cluster with the following
    commands (note that for the --join argument, it’s enough to pass three of the
    five nodes, as the other nodes will get discovered via the gossip protocol):


    $ cockroach start \


    --insecure \


    --store=node1 \


    --listen-addr=localhost:26257 \


    --http-addr=localhost:8080 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \


    --insecure \


    --store=node2 \


    --listen-addr=localhost:26258 \


    --http-addr=localhost:8081 \


    --join=localhost:26257,localhost:26258,localhost:26259


    Chapter 4 Managing CoCkroaChDB froM the CoMManD Line


    $ cockroach start \


    --insecure \


    --store=node3 \


    --listen-addr=localhost:26259 \


    --http-addr=localhost:8082 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \


    --insecure \


    --store=node4 \


    --listen-addr=localhost:26260 \


    --http-addr=localhost:8083 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \


    --insecure \


    --store=node5 \


    --listen-addr=localhost:26261 \


    --http-addr=localhost:8084 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach init --insecure --host=localhost:26257


    Next, we’ll use the ls subcommand to list our cluster nodes:


    $ cockroach node ls --insecure


