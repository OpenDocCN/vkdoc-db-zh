    --listen-addr=localhost:26258 \


    --http-addr=localhost:8081 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach start \


    --insecure \


    --store=node3 \


    --listen-addr=localhost:26259 \


    --http-addr=localhost:8082 \


    --join=localhost:26257,localhost:26258,localhost:26259


    $ cockroach init --insecure --host=localhost:26257


    Time to scale it. CockroachDB was designed to run anywhere, with scalability and
    survivability being its raison d''etre. As such, scaling a CockroachDB cluster
    is almost comically simple:


    $ cockroach start \


    --insecure \


    --store=node4 \


    --listen-addr=localhost:26260 \


    --http-addr=localhost:8083 \


    --join=localhost:26257,localhost:26258,localhost:26259


    In the preceding command, we start a new node in the exact same way we started
    the three initial (or “seed”) nodes. Every node in the cluster will use the gossip
    proto[col8](#index_split_002.html#p231)


