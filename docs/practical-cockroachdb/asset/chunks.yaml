  trans: "\n# 第二章 安装 CockroachDB\n\n## Docker 安装\n\n要使用 Docker 安装 CockroachDB，首先确保你的机器上已安装\
    \ Docker。如果尚未安装，请访问 Docker 安装网站 [`docs.docker.com/get-docker`](https://docs.docker.com/get-docker)\
    \ 获取安装说明。\n\n你可以通过以下命令在 Docker 中启动一个 CockroachDB 实例：\n\n```\n$ docker run \\\n\
    \    --rm -it \\\n    --name=cockroach \\\n    -p 26257:26257 \\\n    -p 8080:8080\
    \ \\\n    cockroachdb/cockroach:v21.1.7 start-single-node \\\n    --insecure\n\
    ```\n\n该命令将拉取 CockroachDB Docker 镜像并运行它，同时暴露端口 26257 用于客户端连接和端口 8080 用于 HTTP 连接。此命令会阻塞直到进程终止，届时\
    \ CockroachDB Docker 容器将被停止并移除。\n\n要测试 CockroachDB 是否已启动并运行，请使用 `cockroach sql`\
    \ 命令进入 CockroachDB SQL shell：\n\n```\n$ cockroach sql --insecure\n#\n# 欢迎使用 CockroachDB\
    \ SQL shell。\n# 所有语句必须以分号结尾。\n# 输入 \\q 退出。\n#\n# 客户端版本：CockroachDB CCL v21.1.5\
    \ (x86_64-w64-mingw32, built 2021/07/02 04:03:50, go1.15.11)\n# 服务器版本：CockroachDB\
    \ CCL v21.1.7 (x86_64-unknown-linux-gnu, built 2021/08/09 17:55:28, go1.15.14)\n\
    # 集群 ID：0b3ff09c-7bcc-4631-8121-335cfd83b04c\n#\n# 输入 \\? 获取简要介绍。\n#\nroot@:26257/defaultdb>\n\
    ```\n\n## Kubernetes 安装\n\n要使用 Kubernetes 安装 CockroachDB，请确保已安装以下先决条件：\n\n- 本地\
    \ Kubernetes 安装 – 有多种方式可以在你的机器上安装 Kubernetes。以下是一些可用选项：\n  - `kind` ([`kind.sigs.k8s.io/docs/user/quick-start`](https://kind.sigs.k8s.io/docs/user/quick-start))\n\
    \  - `minikube` ([`minikube.sigs.k8s.io/docs/start`](https://minikube.sigs.k8s.io/docs/start))\n\
    \  - `k3s` ([`rancher.com/docs/k3s/latest/en/installation`](https://rancher.com/docs/k3s/latest/en/installation))\n\
    \  \n  我将使用 `kind` 创建一个本地 Kubernetes 集群，在撰写本文时，这将安装 Kubernetes 1.21 版本。\n\n- `kubectl`\
    \ – Kubernetes CLI；访问 [`kubernetes.io/docs/tasks/tools`](https://kubernetes.io/docs/tasks/tools)\
    \ 获取安装说明。\n\n安装好这些先决条件后，我们就可以开始了。\n\n作为一个数据库，CockroachDB 在 Kubernetes 中被视为有状态资源，因此你需要为它提供一个持久卷声明（PVC）。PVC\
    \ 存在于节点级别，而非 Pod 级别，因此即使你的任何 CockroachDB Pod 被删除或重启，你的数据也是安全的。\n\n要在 Kubernetes\
    \ 中安装一个简单的 CockroachDB 集群，请创建以下每个小节中描述的文件。如果你不想手动创建以下文件，可以在此处应用来自 Cockroach Labs\
    \ 的预制 Kubernetes 清单：[`github.com/cockroachdb/cockroach/blob/master/cloud/kubernetes/cockroachdb-statefulset.yaml`](https://github.com/cockroachdb/cockroach/blob/master/cloud/kubernetes/cockroachdb-statefulset.yaml)\n\
    \n### 1_pod-disruption-budget.yaml\n\n此文件为我们的 StatefulSet 创建 `PodDisruptionBudget`\
    \ 资源。Pod 中断预算为 Kubernetes 提供了针对给定应用程序（由选择器 \"cockroachdb\" 标识）的 Pod 故障的容忍度。它确保在任何时间点，集群中不可用的\
    \ Pod 永远不会超过 `maxUnavailable` 个。通过将此值设置为 1，我们可以防止 Kubernetes 在滚动更新等操作期间移除超过 1\
    \ 个 CockroachDB 节点。\n\n如果你在 Kubernetes 中配置的是 5 节点集群，请考虑将此值设置为 2，因为即使有 2 个节点暂时不可用，你仍然会有一个\
    \ 3 节点集群。\n\n```yaml\napiVersion: policy/v1\nkind: PodDisruptionBudget\nmetadata:\n\
    \  name: cockroachdb-budget\n  labels:\n    app: cockroachdb\nspec:\n  selector:\n\
    \    matchLabels:\n      app: cockroachdb\n  maxUnavailable: 1\n```\n\n运行以下命令创建\
    \ Pod 中断预算：\n\n```\n$ kubectl apply -f 1_pod-disruption-budget.yaml\n```\n\n###\
    \ 2_stateful-set.yaml\n\n现在我们进入 Kubernetes 配置的核心部分。是时候创建我们的 StatefulSet 了。StatefulSet\
    \ 类似于部署，但它提供了围绕 Pod 调度的额外保证，以确保持久磁盘的存在。\n\n```yaml\napiVersion: apps/v1\nkind:\
    \ StatefulSet\nmetadata:\n  name: cockroachdb\nspec:\n  serviceName: \"cockroachdb\"\
    \n  replicas: 3\n  selector:\n    matchLabels:\n      app: cockroachdb\n  template:\n\
    \    metadata:\n      labels:\n        app: cockroachdb\n    spec:\n      affinity:\n\
    \        podAntiAffinity:\n          preferredDuringSchedulingIgnoredDuringExecution:\n\
    \          - weight: 1\n            podAffinityTerm:\n              labelSelector:\n\
    \                matchExpressions:\n                - key: app\n             \
    \     operator: In\n                  values:\n                  - cockroachdb\n\
    \              topologyKey: kubernetes.io/hostname\n      containers:\n      -\
    \ name: cockroachdb\n        image: cockroachdb/cockroach:v21.1.7\n        imagePullPolicy:\
    \ IfNotPresent\n        resources:\n          requests:\n            cpu: \"1\"\
    \n            memory: \"1Gi\"\n          limits:\n            cpu: \"1\"\n   \
    \         memory: \"1Gi\"\n        ports:\n        - containerPort: 26257\n  \
    \        name: grpc\n        - containerPort: 8080\n          name: http\n   \
    \     readinessProbe:\n          httpGet:\n            path: \"/health?ready=1\"\
    \n            port: http\n          initialDelaySeconds: 10\n          periodSeconds:\
    \ 5\n          failureThreshold: 2\n        volumeMounts:\n        - name: datadir\n\
    \          mountPath: /cockroach/cockroach-data\n        env:\n        - name:\
    \ COCKROACH_CHANNEL\n          value: kubernetes-insecure\n        - name: GOMAXPROCS\n\
    \          valueFrom:\n            resourceFieldRef:\n              resource:\
    \ limits.cpu\n              divisor: \"1\"\n        command:\n        - \"/bin/bash\"\
    \n        - \"-ecx\"\n        - >-\n          exec /cockroach/cockroach\n    \
    \      start\n          --logtostderr\n          --insecure\n          --advertise-host\
    \ $(hostname -f)\n          --http-addr 0.0.0.0\n```\n"
- fmt: "# Chapter 2 Installing CockroachDB\n\n```\n-- join cockroachdb-0.cockroachdb,cockroachdb-1.cockroachdb,cockroachdb-2.cockroachdb\n\
    --cache 25%\n--max-sql-memory 25%\nterminationGracePeriodSeconds: 60\nvolumes:\n\
    - name: datadir\n  persistentVolumeClaim:\n    claimName: datadir\npodManagementPolicy:\
    \ Parallel\nupdateStrategy:\n  type: RollingUpdate\nvolumeClaimTemplates:\n- metadata:\n\
    \    name: datadir\n  spec:\n    accessModes:\n    - \"ReadWriteOnce\"\n    resources:\n\
    \      requests:\n        storage: 1Gi\n```\n\nRun the following command to create\
    \ the stateful set:\n\n```\n$ kubectl apply -f 2_stateful-set.yaml\n```\n\nWhether\
    \ you’re a seasoned Kubernetes user or not, a lot is going on here. I’ll take\
    \ you through some of the less obvious configuration blocks to further demystify\
    \ the configuration.\n\n## **podAntiAffinity**\n\n```\npreferredDuringSchedulingIgnoredDuringExecution:\n\
    - weight: 1\n  podAffinityTerm:\n    labelSelector:\n      matchExpressions:\n\
    \      - key: app\n        operator: In\n        values:\n        - cockroachdb\n\
    \    topologyKey: kubernetes.io/hostname\n```\n\nYou can ask the Kubernetes scheduler\
    \ to give pods an affinity or an antiaffinity to other pods. By doing this, you’re\
    \ either asking them to be placed together or placed away from one another, respectively.\n\
    \nTo highlight the importance of this configuration, let’s assume that our Kubernetes\
    \ cluster is running in the cloud and each node is running in a different availability\
    \ zone (AZ). This `podAntiAffinity` rule asks Kubernetes to launch each `cockroachdb`\
    \ pod on a different node (identified by its `kubernetes.io/hostname`). Depending\
    \ on your requirements, you may prefer to use the `requiredDuringSchedulingIgnoredDuringExecution`\
    \ rule, which guarantees that each pod schedules onto a different node. This makes\
    \ sense for clusters with multiple Kubernetes nodes but not for our local, single-node\
    \ Kubernetes cluster.\n\n## **env**\n\n```\nenv:\n- name: COCKROACH_CHANNEL\n\
    \  value: kubernetes-insecure\n- name: GOMAXPROCS\n  valueFrom:\n    resourceFieldRef:\n\
    \      resource: limits.cpu\n      divisor: \"1\"\n```\n\nIn this block, we’re\
    \ setting the environment variables consumed during both initialization and runtime.\
    \ The `COCKROACH_CHANNEL` variable will help us identify how we installed the\
    \ cluster (e.g., installed securely on Kubernetes or installed via helm, etc.).\
    \ The `GOMAXPROCS` variable is passed to CockroachDB and used by the Go runtime\
    \ to limit the CPU cores allocated to the CockroachDB process.\n\n## **command**\n\
    \n```\ncommand:\n- \"/bin/bash\"\n- \"-ecx\"\n- |\n  exec /cockroach/cockroach\
    \ start \\\n    --logtostderr \\\n    --insecure \\\n    --advertise-host $(hostname\
    \ -f) \\\n    --http-addr 0.0.0.0 \\\n    --join cockroachdb-0.cockroachdb,cockroachdb-1.cockroachdb,cockroachdb-2.cockroachdb\
    \ \\\n    --cache 25% \\\n    --max-sql-memory 25%\n```\n\nIn this block, we’re\
    \ passing some arguments to the CockroachDB executable. These arguments tell CockroachDB\
    \ how to discover other nodes and how to be discovered *by* other nodes and set\
    \ memory constraints for the database. These are useful when running on machines\
    \ where resources are limited.\n\n## **volumeClaimTemplates**\n\n```\nvolumeClaimTemplates:\n\
    - metadata:\n    name: datadir\n  spec:\n    accessModes:\n    - \"ReadWriteOnce\"\
    \n    resources:\n      requests:\n        storage: 1Gi\n```\n\nIn this block,\
    \ we’re asking Kubernetes for 1 gibibyte of disk storage. There are various access\
    \ modes available, but I’m using `ReadWriteOnce` as we only need to allocate disk\
    \ space for each node once.\n\n1 gibibyte = 2^30 = 1,073,741,824 bytes\n\n## **3_private-service.yaml**\n\
    \nThis file creates the Kubernetes service that will be used both by the CockroachDB\
    \ nodes to discover one another and by other resources in the Kubernetes cluster.\
    \ It will not be available outside of the cluster, as it doesn’t expose a cluster\
    \ IP.\n\nExposing port 26257 will allow the CockroachDB nodes to communicate with\
    \ one another, and exporting port 8080 will allow services like Terraform to obtain\
    \ metrics.\n\n```\napiVersion: v1\nkind: Service\nmetadata:\n  name: cockroachdb\n\
    \  labels:\n    app: cockroachdb\nspec:\n  ports:\n  - name: tcp\n    port: 26257\n\
    \    targetPort: 26257\n  - name: http\n    port: 8080\n    targetPort: 8080\n\
    \  publishNotReadyAddresses: true\n  clusterIP: None\n  selector:\n    app: cockroachdb\n\
    ```\n\nRun the following command to create the private service:\n\n```\n$ kubectl\
    \ apply -f 3_private-service.yaml\n```\n\n## **4_public-service.yaml**\n\nThis\
    \ file creates a Kubernetes `LoadBalancer` Service that will be used for external\
    \ connections to the CockroachDB nodes. We’ll use this service to connect to the\
    \ database later.\n\n> **Warning** Depending on your infrastructure, when running\
    \ a hosted instance of Kubernetes, a `LoadBalancer` service may create a publicly\
    \ accessible endpoint. Consider creating an internal load balancer or using a\
    \ `ClusterIP` service and making the service available via a hardened ingress.\n\
    \nExposing port 26257 will allow us to connect to the database, and exposing port\
    \ 8080 will allow us to view its dashboard. The following code creates a Kubernetes\
    \ service that exposes the ports defined in the StatefulSet.\n\n```\napiVersion:\
    \ v1\nkind: Service\nmetadata:\n  name: cockroachdb-public\n  labels:\n    app:\
    \ cockroachdb\nspec:\n  ports:\n  - name: tcp\n    port: 26257\n    targetPort:\
    \ 26257\n  - name: http\n    port: 8080\n    targetPort: 8080\n  selector:\n \
    \   app: cockroachdb\n  type: LoadBalancer\n```\n\nRun the following command to\
    \ create the private service:\n\n```\n$ kubectl apply -f 4_public-service.yaml\n\
    ```\n\n## **5_init.yaml**\n\nThis file initializes the CockroachDB cluster. When\
    \ run, it will connect to the first node in the cluster to perform initialization.\
    \ In our case, we could have specified any of the nodes to start the initialization,\
    \ as they are all configured to connect to the other nodes via the `--join` argument.\n\
