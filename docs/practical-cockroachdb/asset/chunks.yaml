  trans: "\n## 第 9 章 生产环境\n\n在恢复我们的表之前，还需要执行一个步骤。在运行恢复操作前，我们需要`DROP`（删除）或`RENAME`（重命名）它\
    \ 11 b。由于我的`sensing_reading`表是空的，不需要归档任何内容，因此`DROP`最适合我：\n\n```sql\nDROP TABLE\
    \ sensor_reading;\n```\n\n```sql\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/06-190437.13'\
    \ IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2';\n\
    ```\n\n11 [www.cockroachlabs.com/docs/stable/restore.html#restore-a-cluster](http://www.cockroachlabs.com/docs/stable/restore.html#restore-a-cluster)\n\
    \n```\njob_id | status | fraction_completed | rows | index_entries | bytes\n---------------------+-----------+--------------------+------+---------------+-------\n\
    742274102397501441 | succeeded | 1 | 1000 | 0 | 52134\n```\n\n## 增量备份\n\n在此案例中，完整备份和恢复有效，因为数据库及其对象都很小。如果你的集群大小达到许多\
    \ GB，增量备份可能是更高效的选择。让我们来探索增量备份，看看它们是如何工作的。\n\n首先，我们将在恢复的`sensor_reading`表中插入一些新数据，以模拟随时间推移添加到表中的数据。这将创建一个差异，该差异存在于我们在备份章节开始时插入的原始数据与现在之间。如果\
    \ CockroachDB 在增量备份与上一次备份（无论是完整备份还是增量备份）之间未检测到任何更改，你将看到一个空的备份目录：\n\n```sql\nINSERT\
    \ INTO sensor_reading (sensor_id, country, reading, timestamp)\nSELECT\n  gen_random_uuid(),\n\
    \  'DE',\n  CAST(random() AS DECIMAL),\n  '2022-02-18' - CAST(s * 10000 AS INTERVAL)\n\
    FROM generate_series(1, 500) AS s;\n```\n\n```sql\nSELECT COUNT(*) FROM sensor_reading;\n\
    ```\n\n```\ncount\n---------\n1511\n```\n\n现在，让我们运行一次增量备份：\n\n```sql\nBACKUP INTO\
    \ LATEST IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\
    \ AS OF SYSTEM TIME '-10s';\n```\n\n```\njob_id | status | fraction_completed\
    \ | rows | index_entries | bytes\n---------------------+-----------+--------------------+------+---------------+-------\n\
    742278826975625217 | succeeded | 1 | 1511 | 35 | 85097\n```\n\n行数表示上次备份操作备份的行数。请注意，由于我们尚未备份已恢复的数据集，此差异包含了表中的所有行。如果你现在再次运行备份，你将看到零行，因为没有任何新内容需要备份：\n\
    \n```sql\nBACKUP INTO LATEST IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\
    \ AS OF SYSTEM TIME '-10s';\n```\n\n```\njob_id | status | fraction_completed\
    \ | rows | index_entries | bytes\n---------------------+-----------+--------------------+------+---------------+-------\n\
    742280265162588161 | succeeded | 1 | 0 | 0 | 0\n```\n\n请注意，由于我们正在对整个集群进行增量备份，任何其他数据库对象的更改都会被检测到（并备份）。要恢复我们的表，我们只需像之前一样重新运行恢复操作。所有增量备份都存在于\
    \ S3 中，并会自动被检索到：\n\n```sql\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/06-190437.13'\
    \ IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2';\n\
    ```\n\n## 加密备份\n\n要加密备份，你需要创建自己的加密密钥，并使用该密钥在备份持久化到云存储之前对其进行加密。让我们现在创建一个加密密钥并用它创建一个加密备份：\n\
    \n```bash\n$ aws kms create-key \\\n  --key-spec=SYMMETRIC_DEFAULT \\\n  --tags\
    \ TagKey=Purpose,TagValue=\"Encrypt CockroachDB backups\" \\\n  --description\
    \ \"Practical CockroachDB Backups\"\n```\n\n要使用加密密钥进行备份和恢复，只需将参数传递给`BACKUP`/`RESTORE`命令，如下所示：\n\
    \n```sql\nBACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    WITH kms = 'aws:///****?AUTH=implicit&REGION=eu-west-2';\n```\n"
- fmt: "# Chapter 9 Production\n\nThere are a few things to note here:\n\n• The KMS\
    \ key URL scheme of `\"aws:///\"` is not a typo.\n\n• The key ID to use in the\
    \ URL can be obtained by running the following AWS CLI command and extracting\
    \ the `KeyId` for the key you’d like to use:\n\n```\n$ aws kms list-keys\n{\n\
    \  \"Keys\": [\n    {\n      \"KeyId\": \"********-****-****-****-************\"\
    ,\n      \"KeyArn\": \"arn:aws:kms:eu-west-2:***:key/********-****-****-****-************\"\
    \n    },\n    {\n      \"KeyId\": \"********-****-****-****-************\",\n\
    \      \"KeyArn\": \"arn:aws:kms:eu-west-2:***:key/********-****-****-****-************\"\
    \n    }\n  ]\n}\n```\n\n• By using the configuration `AUTH=implicit`, I’m telling\
    \ CockroachDB to use the same credentials to access the KMS key as it used to\
    \ access the bucket. If your KMS key uses different credentials, provide the associated\
    \ `AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`, and `REGION` query arguments for\
    \ that key.\n\nIf you attempt to restore the backup without a KMS key, you’ll\
    \ receive an error, as CockroachDB is aware that this backup has been manually\
    \ encrypted with a KMS key:\n\n```\nRESTORE TABLE sensors.sensor_reading FROM\
    \ '2022/03/08-183653.00' IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2';\n\
    ```\n\nERROR: file appears encrypted -- try specifying one of `\"encryption_passphrase\"\
    ` or `\"kms\"`: proto: wrong wireType = 5 for field EntryCounts\n\n## Chapter\
    \ 9 Production\n\nRestoring from a backup *with* the use of a KMS key performs\
    \ the restore as expected:\n\n```\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/08-183653.00'\
    \ IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \  WITH kms = 'aws:///****?AUTH=implicit&REGION=eu-west-2';\n```\n\n```\n  job_id\
    \           |  status   | fraction_completed | rows | index_entries | bytes\n\
    -------------------+-----------+--------------------+------+---------------+-------\n\
    742834697875423233 | succeeded |         1          | 1000 |        0      | 52140\n\
    ```\n\nTo encrypt a multiregion cluster using KMS keys stored in different regions,\
    \ simply provide a KMS key for each of the regions you’d like to encrypt. The\
    \ cluster I’m encrypting is currently in a single region, but by adding more KMS\
    \ keys to the array of keys, you can encrypt more regions:\n\n```\nBACKUP INTO\
    \ 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \  WITH kms = (\n    'aws:///****AUTH=implicit&REGION=eu-west-2'\n  );\n```\n\n\
    ```\n  job_id           |  status   | fraction_completed | rows | index_entries\
    \ | bytes\n-------------------+-----------+--------------------+------+---------------+-------\n\
    742839873407320065 | succeeded |         1          | 1055 |       65      | 76388\n\
    ```\n\n```\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/08-191858.46' IN\
    \ 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \  WITH kms = (\n    'aws:///****AUTH=implicit&REGION=eu-west-2'\n  );\n```\n\n\
    ```\n  job_id           |  status   | fraction_completed | rows | index_entries\
    \ | bytes\n-------------------+-----------+--------------------+------+---------------+-------\n\
    742840069222793217 | succeeded |         1          | 1000 |        0      | 52150\n\
    ```\n\nNote that the number of rows restored is less than the number of rows backed\
    \ up. This is because a backup was made across the whole cluster, while the restore\
    \ targets just the `sensor_reading` table.\n\nIf you’d rather not use keys stored\
    \ in your cloud provider for encrypting backups, you can provide your own password\
    \ to use for encryption. The process of encrypting backups in this manner is very\
    \ similar to encrypt backups with cloud keys:\n\n```\nBACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    \  WITH encryption_passphrase = 'correct horse battery staple';\n```\n\n```\n\
    \  job_id           |  status   | fraction_completed | rows | index_entries |\
    \ bytes\n-------------------+-----------+--------------------+------+---------------+-------\n\
    742837673818750977 | succeeded |         1          | 1046 |       48      | 69464\n\
    ```\n\nThe restore is also very similar to the KMS equivalent:\n\n```\nRESTORE\
    \ TABLE sensors.sensor_reading FROM '2022/03/08-190747.27' IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
    ```"
