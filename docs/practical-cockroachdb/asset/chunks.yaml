    \ fmt.Errorf(\"scanning row: %w\", err)\n\t\t}\n\t\tids = append(ids, id)\n\t\
    }\n\treturn ids, nil\n}\n```\n\n## updateMultiPassUpdate\n\n下一个函数将更新与我们从上一个查询中获取的\
    \ ID 相匹配的所有行。该函数\n\n*   创建传入 ID 的一个子集\n*   基于该 ID 子集运行查询以更新行\n*   更新 ID 子集以指向另一组\
    \ ID\n*   一旦所有 ID 处理完毕，即返回\n\n我们将该函数命名为 `updateMultiPassUpdate`：\n\n```go\nfunc\
    \ updateMultiPassUpdate(db *pgxpool.Pool, ids []string, limit int) error {\n\t\
    const updateStmt = `UPDATE sensor_reading\n\tSET reading = reading - 0.001\n\t\
    WHERE sensor_id = ANY $1`\n\n\tupdateIDs := ids\n\tfor {\n\t\tidCount := min(len(updateIDs),\
    \ limit)\n\t\tif idCount == 0 {\n\t\t\treturn nil\n\t\t}\n\t\tif _, err := db.Exec(context.Background(),\
