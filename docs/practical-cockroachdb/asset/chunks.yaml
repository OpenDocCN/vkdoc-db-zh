- fmt: "# 白盒测试与数据库验证\n\n白盒测试涉及测试用户通常无法看到的所有内容，包括引用完整性检查、索引查询计划分析和默认值赋值检查等。现在，让我们来看其中的一些内容。\n\
    \n## 引用完整性检查\n\n引用完整性检查确保表间依赖关系能够防止意外的破坏性操作。让我们执行一些破坏性操作，以验证数据库的引用完整性。\n\n首先，我们将尝试删除\
    \ `retail.order`、`retail.product` 和 `retail.product_price` 表中的所有数据。如果不加注意，这可能会导致糟糕的一天：\n\
    \n```sql\nDELETE FROM retail.order WHERE true;\n```\n\n```\nERROR: delete on table\
    \ \"order\" violates foreign key constraint \"fk_order_id_ref_order\" on table\
    \ \"product_order\"\nSQLSTATE: 23503\nDETAIL: Key (id)=('93bff9af-5794-47a5-94e5-18e8a9832c41')\
    \ is still referenced from table \"product_order\".\nCONSTRAINT: fk_order_id_ref_order\n\
    ```\n\n```sql\nDELETE FROM retail.product_price WHERE true;\n```\n\n```\nERROR:\
    \ delete on table \"product_price\" violates foreign key constraint \"fk_product_price_id_ref_product_price\"\
    \ on table \"product_order\"\nSQLSTATE: 23503\nDETAIL: Key (id)=('cbdc9d9c-a987-4655-b3f8-6b9b2ec9c50e')\
    \ is still referenced from table \"product_order\".\nCONSTRAINT: fk_product_price_id_ref_product_price\n\
    ```\n\n```sql\nDELETE FROM retail.product WHERE true;\n```\n\n```\nERROR: delete\
    \ on table \"product\" violates foreign key constraint \"fk_product_id_ref_product\"\
    \ on table \"product_price\"\nSQLSTATE: 23503\nDETAIL: Key (id)=('386e841e-4da8-4688-82a4-71d6fbb369fa')\
    \ is still referenced from table \"product_price\".\nCONSTRAINT: fk_product_id_ref_product\n\
    ```\n\n如果没有这些引用检查，我们将在引用表中创建孤立数据。需要指出的是，如果没有适当的权限，我们仍可能无意中从 `retail.customer`\
    \ 和 `retail.product_order` 表中删除数据。不过，我们可以放心，其他表的检查机制是到位的。\n\n## 索引与查询计划\n\n接下来是索引。让我们检查一下我们正在查询的表中的索引是否足够，以避免进行全表扫描。我们将遍历\
