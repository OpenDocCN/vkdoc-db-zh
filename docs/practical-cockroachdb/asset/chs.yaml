  \      - app-network\n\nnetworks:\n  app-network:\n    driver: bridge\n```\n\n要启动容器、初始化集群并进入一个\
  \ CockroachDB 容器的 shell，请运行以下命令：\n\n```\n$ docker compose up -d\n$ docker exec -it\
