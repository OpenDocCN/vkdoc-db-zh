  \ \\\n    --cache 25% \\\n    --max-sql-memory 25%\n```\n\n在这个块中，我们向 CockroachDB\
  \ 可执行文件传递了一些参数。这些参数告诉 CockroachDB 如何发现其他节点以及如何被其他节点发现，并为数据库设置内存限制。这些在资源有限的机器上运行时非常有用。\n\
  \n## **volumeClaimTemplates**\n\n```\nvolumeClaimTemplates:\n- metadata:\n    name:\
  \ datadir\n  spec:\n    accessModes:\n    - \"ReadWriteOnce\"\n    resources:\n\
  \      requests:\n        storage: 1Gi\n```\n\n在这个块中，我们向 Kubernetes 申请 1 gibibyte\
  \ 的磁盘存储。有多种访问模式可用，但我使用了`ReadWriteOnce`，因为我们只需要为每个节点分配一次磁盘空间。\n\n1 gibibyte = 2³⁰\
  \ = 1,073,741,824 字节\n\n## **3_private-service.yaml**\n\n此文件创建 Kubernetes 服务，该服务将被\
  \ CockroachDB 节点用于互相发现，也将被 Kubernetes 集群中的其他资源使用。由于它不暴露集群 IP，因此无法在集群外部访问。\n\n暴露端口\
  \ 26257 将允许 CockroachDB 节点相互通信，暴露端口 8080 将允许像 Terraform 这样的服务获取指标。\n\n```\napiVersion:\
  \ v1\nkind: Service\nmetadata:\n  name: cockroachdb\n  labels:\n    app: cockroachdb\n\
  spec:\n  ports:\n  - name: tcp\n    port: 26257\n    targetPort: 26257\n  - name:\
  \ http\n    port: 8080\n    targetPort: 8080\n  publishNotReadyAddresses: true\n\
  \  clusterIP: None\n  selector:\n    app: cockroachdb\n```\n\n运行以下命令来创建私有服务：\n\n\
  ```\n$ kubectl apply -f 3_private-service.yaml\n```\n\n## **4_public-service.yaml**\n\
  \n此文件创建一个 Kubernetes `LoadBalancer`服务，用于外部连接到 CockroachDB 节点。稍后我们将使用此服务连接到数据库。\n\
  \n> **警告** 根据你的基础设施，当运行托管的 Kubernetes 实例时，`LoadBalancer`服务可能会创建一个可公开访问的端点。考虑创建一个内部负载均衡器，或使用`ClusterIP`服务并通过强化的入口使服务可用。\n\
  \n暴露端口 26257 将允许我们连接到数据库，暴露端口 8080 将允许我们查看其仪表板。以下代码创建了一个 Kubernetes 服务，该服务暴露了在有状态集中定义的端口。\n\
  \n```\napiVersion: v1\nkind: Service\nmetadata:\n  name: cockroachdb-public\n  labels:\n\
  \    app: cockroachdb\nspec:\n  ports:\n  - name: tcp\n    port: 26257\n    targetPort:\
  \ 26257\n  - name: http\n    port: 8080\n    targetPort: 8080\n  selector:\n   \
  \ app: cockroachdb\n  type: LoadBalancer\n```\n\n运行以下命令来创建私有服务：\n\n```\n$ kubectl\
  \ apply -f 4_public-service.yaml\n```\n\n## **5_init.yaml**\n\n此文件初始化 CockroachDB\
  \ 集群。运行时，它将连接到集群中的第一个节点执行初始化。在我们的例子中，我们本可以指定任何节点来开始初始化，因为它们都配置为通过`--join`参数连接到其他节点。\n\
  \n```\napiVersion: batch/v1\nkind: Job\nmetadata:\n  name: init\n  labels:\n   \
  \ app: cockroachdb\nspec:\n  template:\n    spec:\n      containers:\n      - name:\
  \ init\n        image: cockroachdb/cockroach:v21.1.7\n        imagePullPolicy: IfNotPresent\n\
  \        command:\n        - \"/cockroach/cockroach\"\n        - \"init\"\n    \
  \    - \"--insecure\"\n        - \"--host=cockroachdb-0.cockroachdb\"\n      restartPolicy:\
  \ Never\n```\n\n运行以下命令来创建初始化作业：\n\n```\n$ kubectl apply -f 5_init.yaml\n```\n\n\
  如果你进行到这一步，你将有一个正常运行的 CockroachDB 集群在 Kubernetes 中运行！这个例子中涉及很多部分，所以你遇到的情况可能有所不同。\n\
  \n如果你的本地 Kubernetes 集群在 Docker 中运行并且遇到问题，请确保你已为 Docker 分配了足够的内存来运行此示例。6GB 应该绰绰有余。\n\
  \n要连接到集群的 HTTP 端点，创建一个到公共服务的端口转发并打开`http://localhost:8080`：\n\n```\n$ kubectl port-forward\
  \ service/cockroachdb-public 8080\nForwarding from 127.0.0.1:8080 -> 8080\nForwarding\
  \ from [::1]:8080 -> 8080\n```\n\n要连接到集群的 SQL 端点，创建一个到公共服务的端口转发：\n\n```\n$ kubectl\
  \ port-forward service/cockroachdb-public 26257\nForwarding from 127.0.0.1:26257\
  \ -> 26257\nForwarding from [::1]:26257 -> 26257\n```\n\n然后像集群在本地运行一样使用`cockroach`命令：\n\
  \n```\n$ cockroach sql --insecure\n#\n# 欢迎使用 CockroachDB SQL shell。\n# 所有语句必须以分号结尾。\n\
  # 输入 \\q 退出。\n#\n# 服务器版本: CockroachDB CCL v21.1.7 (x86_64-unknown-linux-gnu, built\
  \ 2021/08/09 17:55:28, go1.15.14) (与客户端版本相同)\n# 集群 ID: c3f571a3-1f67-44ab-9a62-d6f3ce6a6b20\n\
  #\n# 输入 \\? 获取简要介绍。\n#\nroot@:26257/defaultdb>\n```\n\n如果你想从 Kubernetes*内部*连接到 CockroachDB\
  \ 集群，请运行以下命令来创建一个打开 SQL shell 的 Kubernetes Pod：\n\n```\n$ kubectl run cockroachdb\
  \ --rm -it \\\n    --image=cockroachdb/cockroach:v21.1.7 \\\n    --restart=Never\
  \ \\\n    -- sql \\\n    --insecure \\\n    --host=cockroachdb-public\n```\n\n\n\
  \n"
- '# 第二章 安装 CockroachDB


  ### 多节点集群


  到目前为止，我们只创建了单节点的本地集群，但这**不建议**用于实际场景，因为此类集群无法提供**容错能力**。更好的做法是创建至少包含三个节点的集群，以承受单个节点故障；或至少包含五个节点的集群，以承受两个节点故障。


  CockroachDB 文档提供了拓扑结构指南，帮助你应对从单节点到多区域故障的各种情况：

  [www.cockroachlabs.com/docs/stable/disaster-recovery.html](http://www.cockroachlabs.com/docs/stable/disaster-recovery.html)


  安装多节点 CockroachDB 集群有多种方式。Kubernetes `StatefulSet` 部署是较为简便的选项之一，它能自动处理管理多个应用实例时涉及的手动工作，例如服务发现和滚动更新。在上一节关于通过
  Kubernetes 安装的内容中，如果我们操作的是多节点/区域集群，我们的 `StatefulSet` 会为每个节点部署一个 CockroachDB 实例。


  在本节中，我们将使用 `cockroach` 二进制文件模拟一个三节点 CockroachDB 集群。


  首先，使用以下命令启动三个节点：


  ```

  $ cockroach start \

  --insecure \

  --store=node1 \

  --listen-addr=localhost:26257 \

  --http-addr=localhost:8080 \

  --join=localhost:26257,localhost:26258,localhost:26259


  $ cockroach start \

  --insecure \

  --store=node2 \

  --listen-addr=localhost:26258 \

  --http-addr=localhost:8081 \

  --join=localhost:26257,localhost:26258,localhost:26259


  $ cockroach start \

  --insecure \

  --store=node3 \

  --listen-addr=localhost:26259 \

  --http-addr=localhost:8082 \

  --join=localhost:26257,localhost:26258,localhost:26259

  ```


  接下来，通过向其中一个节点执行 `init` 命令来初始化集群：


  ```

  $ cockroach init --insecure --host=localhost:26257

  集群初始化成功

  ```


  最后，通过向其中一个节点执行 `sql` 命令来连接集群：


  ```

  $ cockroach sql --insecure --host=localhost:26257


  #

  # 欢迎使用 CockroachDB SQL shell。

  # 所有语句必须以分号结尾。

  # 输入 \q 退出。

  #

  # 服务器版本： CockroachDB CCL v21.1.7 (x86_64-apple-darwin19, built

  2021/08/09 17:58:36, go1.15.14) (与客户端版本相同)

  # 集群 ID： 689b7704-af5d-4527-a638-bad622fff923

  #

  ```




  ### 多区域集群


  如果你正准备在一组已知的机器上创建集群，并且希望避免使用像 Kubernetes 这样的编排工具，那么这对你来说可能是一个不错的选择。


  对于许多使用场景，在云服务提供商的单个区域内的多个可用区中安装 CockroachDB，就能为你的数据库提供足够级别的弹性。


  如果你需要比单区域部署所能提供的更高的弹性，CockroachDB 也能满足你的需求。在本节中，我们将使用 `cockroachdb` 二进制文件来模拟一个多区域部署。这个集群不仅能承受可用区故障，还能承受整个云服务提供商的*区域*故障。


  ![](img/index-36_1.jpg)


  #### 多区域部署


  在前面的例子中，我们是在云服务提供商的单个区域*内部*进行操作。一个可用区的故障会使集群中的一个 CockroachDB 节点下线，剩下的两个节点会继续工作，直到故障节点恢复。从延迟的角度来看，由于其他节点位置接近，这种部署是可以接受的。


  在地图上，我们的集群可能类似于图 2-1 中的集群。请注意，节点的地图视图仅对企业版集群可用：


  **图 2-1.** 单区域、多节点集群


  所有节点都位于某个给定的云服务提供商区域内（例如，如前所示的 `us-east1`）。


  在下面的例子中，我们是在*跨*云服务提供商区域进行操作。这意味着区域之间的距离（和延迟）可能非常大。因此，在每个区域只创建一个节点的集群是个坏主意。考虑图 2-2，我们把三节点单区域集群安装到了跨区域而不是跨可用区的环境中。如果我们失去一个节点，集群将继续以两个节点运行。然而，如前所述，节点之间的延迟现在会大得多。


  ![](img/index-37_1.jpg)


  **图 2-2.** 多区域、单节点集群


  除了停机问题，我们的集群还会花费大量时间在节点之间复制数据。在具有三个副本节点的集群中写入 CockroachDB 时，需要在 leaseholder 节点（某个数据范围的主要写入节点）与其至少一个
  follower 节点之间达成共识。在跨区域集群中，这将耗费时间，导致写入非常缓慢。


  我们需要一种新的拓扑结构。


  在这个例子中，我们将按区域对数据进行分区，这样数据库的消费者（用户和应用程序等）将访问他们最近的区域来进行所有写入操作。要使这样的集群提供足够的区域和可用区弹性，我们现在需要九个节点。使用以下命令来创建它们：


  ```

  $ cockroach start \

  --insecure \

  --store=node1 \

  --listen-addr=localhost:26257 \

  --http-addr=localhost:8080 \

  --locality=region=us-east1,zone=us-east1a \

  --join=''localhost:26257, localhost:26258, localhost:26259''


  $ cockroach start \

  --insecure \

  --store=node2 \

  --listen-addr=localhost:26258 \

  --http-addr=localhost:8081 \

  --locality=region=us-east1,zone=us-east1b \

  --join=''localhost:26257, localhost:26258, localhost:26259''


  $ cockroach start \

  --insecure \

  --store=node3 \

  --listen-addr=localhost:26259 \

  --http-addr=localhost:8082 \

  --locality=region=us-east1,zone=us-east1c \

  --join=''localhost:26257, localhost:26258, localhost:26259''


  $ cockroach start \

  --insecure \

  --store=node4 \

  --listen-addr=localhost:26260 \

  --http-addr=localhost:8083 \

  --locality=region=us-central1,zone=us-central1a \

  --join=''localhost:26257, localhost:26258, localhost:26259''


  $ cockroach start \

  --insecure \

  --store=node5 \

  --listen-addr=localhost:26261 \

  --http-addr=localhost:8084 \

  --locality=region=us-central1,zone=us-central1b \

  --join=''localhost:26257, localhost:26258, localhost:26259''


  $ cockroach start \

  --insecure \

  --store=node6 \

  --listen-addr=localhost:26262 \

  --http-addr=localhost:8085 \

  --locality=region=us-central1,zone=us-central1c \

  --join=''localhost:26257, localhost:26258, localhost:26259''


  $ cockroach start \

  --insecure \

  --store=node7 \

  --listen-addr=localhost:26263 \

  --http-addr=localhost:8086 \

  --locality=region=us-west1,zone=us-west1a \

  --join=''localhost:26257, localhost:26258, localhost:26259''


  $ cockroach start \

  --insecure \

  --store=node8 \

  --listen-addr=localhost:26264 \

  --http-addr=localhost:8087 \

  --locality=region=us-west1,zone=us-west1b \

  --join=''localhost:26257, localhost:26258, localhost:26259''


  $ cockroach start \

  --insecure \

  --store=node9 \

  --listen-addr=localhost:26265 \

  --http-addr=localhost:8088 \

  --locality=region=us-west1,zone=us-west1c \

  --join=''localhost:26257, localhost:26258, localhost:26259''

  ```


  接下来，通过向其中一个节点执行 `init` 命令来初始化集群：


  ```

  $ cockroach init --insecure --host=localhost:26257

  ```


  集群已成功初始化。


  要以此方式对数据库进行分区，我们需要一个企业版许可证。你可以从 Cockroach Labs 网站获取免费的 30 天试用许可证。立即访问 [www.cockroachlabs.com/get-cockroachdb/enterprise/](http://www.cockroachlabs.com/get-cockroachdb/enterprise/)
  页面并获取你的试用企业版许可证。


  是时候将集群转换为企业版了！连接到集群中的一个节点并运行以下命令，将 `cluster.organization` 和 `enterprise.license`
  的值替换为你在企业版试用邮件中收到的信息：


  ```

  $ cockroach sql --insecure --host=localhost:26257

  #

  # 欢迎使用 CockroachDB SQL shell。

  # 所有语句必须以分号结尾。

  # 输入 \q 退出。

  #

  # 服务器版本: CockroachDB CCL v21.1.7 (x86_64-apple-darwin19, built 2021/08/09 17:58:36,
  go1.15.14) (与客户端版本相同)

  # 集群 ID: 689b7704-af5d-4527-a638-bad622fff923

  #

  ```




