- "# 第 7 章 部署拓扑\n\n如果数据未被固定且来自多个区域，你将产生区域间延迟。\n\n### 写入\n\n★★\n\n在写入语句返回之前，数据会在各区域间复制。\n\
  \n### 延迟\n\n#### 弹性\n\n★★★★★ 如果你在各区域间复制数据，你将能抵御区域故障。如果你将数据固定到特定区域，并在该区域内的不同可用区部署节点，你将能抵御可用区故障。\n\
  \n#### 部署便捷度\n\n★★★\n\n设置一个全局表集群与设置一个区域表集群类似。\n\n要启用全局表拓扑模式，我们只需更新表的配置使其变为全局表。在此示例中，我将把我们的\
  \ `example_regional_table` 更新为全局表：\n\n```sql\nALTER TABLE example_regional_table\
  \ SET LOCALITY GLOBAL;\n```\n\n你可能会注意到副本数量已从三变为五。这是全局表的默认副本数量，它允许 CockroachDB 将表扩展到现有\
  \ `us-central1` 区域之外：\n\n```sql\nSELECT lease_holder_locality, replicas, replica_localities\n\
  FROM [SHOW RANGES FROM TABLE example_regional_table];\n```\n\n```\nregion=us-east1,zone=us-east1a\n\
  {1,2,3,5,9}\n{\n  \"region=us-east1,zone=us-east1a\",\n  \"region=us-east1,zone=us-east1b\"\
  ,\n  \"region=us-east1,zone=us-east1c\",\n  \"region=us-west1,zone=us-west1b\",\n\
  \  \"region=us-central1,zone=us-central1b\"\n}\n```\n\n### 跟随者读取\n\n跟随者读取拓扑非常适合读多写少的场景，其中可以容忍读取过时数据以及写入延迟。这种模式所提供的过期容忍度降低了对相同数据的读写争用，因为可以请求稍不同时间段的数据。读取过期的程度取决于你的要求，可以是以下之一：\n\
  \n• **精确过期** – 数据过期量是精确的（至少 4.8 秒），因此读取比有界过期读取更快。\n• **有界过期** – CockroachDB 动态确定数据过期量，从而最小化过期。在发生网络分区的情况下，其可用性高于精确过期，因为读取可以从本地副本提供，而非必须从租赁者提供。\n\
  \n让我们看看使用此拓扑的集群的一些优缺点：\n\n#### 读取延迟\n★★★★★ 读取速度非常快，因为延迟优先于一致性。\n\n#### 写入延迟\n★★\n\
  \n在写入语句返回之前，数据会在各区域间复制。\n\n#### 弹性\n★★★★★ 集群可以容忍可用区和区域的故障。\n\n#### 部署便捷度\n★★★\n\n\
  跟随者读取的配置由客户端在读取时提供，因此此拓扑并不比其他任何多区域集群更困难。\n\n要启用跟随者读取拓扑，我们只需执行允许数据过期的 `SELECT` 查询。以下是对\
  \ `example_regional_rows` 表进行跟随者读取的查询：\n\n```sql\nSELECT * FROM example_regional_rows\n\
  \  AS OF SYSTEM TIME follower_read_timestamp();\n```\n\n```\n  id              \
  \                     | city       | crdb_region\n---------------------------------------+------------+--------------\n\
  \  7b65d3fa-a0e1-4cd6-b125-05654a6fbce8 | Portland   | us-west1\n  d39ec728-cfc0-47e8-914c-fff493064071\
  \ | Des Moines | us-central1\n  e6a0c79c-2026-4877-b24f-6d4d9dd86848 | Charleston\
  \ | us-east1\n```\n\n也可以使用以下语法在事务中启用跟随者读取：\n\n```sql\nBEGIN;\nSET TRANSACTION AS\
  \ OF SYSTEM TIME follower_read_timestamp();\nSELECT * FROM example_regional_rows;\n\
  COMMIT;\n```\n\n使用 `follower_read_timestamp()` 函数不仅方便，而且返回的时间戳增加了查询从本地区域返回数据的可能性。\n\
  \n### 跟随工作负载\n\n跟随工作负载拓扑是未指定表局部性（例如，按行分区的区域表）的集群的默认拓扑。对于当前最活跃区域的读取延迟必须很低的场景，它们是一个不错的选择。\n\
  \n在使用跟随工作负载拓扑的集群中，CockroachDB 将移动数据以确保最繁忙的读取区域获得所需的数据。\n\n\n\n让我们来看看采用这种拓扑结构的集群的一些优点和缺点：\n\
  \n#### 读取延迟 ★★★★\n对于当前最繁忙区域内的数据读取会很快，而来自该区域外的读取则会较慢。\n\n#### 写入延迟 ★★\n数据在写入语句返回前会在各区域间进行复制。\n\
  \n#### 弹性 ★★★★★\n集群可以容忍可用区（AZ）和区域的故障。\n\n#### 设置简易度 ★★★\n此拓扑是多区域集群的默认拓扑，因此不比任何其他多区域集群更困难。\n\
  \n由于它是默认拓扑，我们无需做任何额外操作来显式启用它。\n\n### 反模式\n考虑反模式以及设计不良的集群对性能的影响，与考虑推荐的拓扑模式同样关键。在本节中，我们将使用\
  \ `demo` 命令创建一个集群，它*看起来*设计良好，但性能特性会很差。\n\n## 第 7 章 部署拓扑\n首先，我们将启动集群。该集群将是一个九节点的多区域部署，节点位于\
  \ `us-west1`、`us-east1` 和 `europe-west1`。\n\n```\ncockroach demo --nodes 9 --no-example-database\n\
  ```\n\n接下来，我们将创建一些数据库对象。以下语句将：\n-   创建一个名为 `antipatterns_database` 的数据库，包含三个区域，反映由\
  \ `demo` 命令创建的区域。\n-   创建一个区域性表，其行将在区域间进行地理分布。\n-   为每个区域插入数据。\n-   更新表的区域配置，以确保数据保留在这些区域内。\n\
  \n```\nCREATE DATABASE antipattern_database;\nUSE antipattern_database;\nALTER DATABASE\
  \ \"antipattern_database\" PRIMARY REGION \"us-east1\";\nALTER DATABASE \"antipattern_database\"\
  \ ADD REGION \"us-west1\";\nALTER DATABASE \"antipattern_database\" ADD REGION \"\
  europe-west1\";\nALTER DATABASE \"antipattern_database\" SURVIVE ZONE FAILURE;\n\
  CREATE TABLE antipattern_table (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
  \    city TEXT NOT NULL,\n    crdb_region crdb_internal_region NOT NULL AS (\n \
  \       CASE\n            WHEN city IN ('New York', 'Boston', 'Chicago') THEN 'us-east1'\n\
  \            WHEN city IN ('San Francisco', 'Portland', 'Seattle') THEN 'us-west1'\n\
  \            WHEN city IN ('Berlin', 'Paris', 'Madrid') THEN 'europe-west1'\n  \
  \          ELSE 'europe-west1'\n        END\n    ) STORED\n);\nALTER TABLE antipattern_table\
  \ SET LOCALITY REGIONAL BY ROW;\nINSERT into antipattern_table (city)\nVALUES\n\
  \    ('New York'), ('Boston'), ('Chicago'),\n    ('San Francisco'), ('Portland'),\
  \ ('Seattle'),\n    ('Berlin'), ('Paris'), ('Madrid');\nSET override_multi_region_zone_config\
  \ = true;\nALTER TABLE antipattern_table CONFIGURE ZONE USING num_voters = 3;\n\
  ALTER TABLE antipattern_table CONFIGURE ZONE USING num_replicas = 3;\n```\n\n我们通过这些命令本质上创建了一个全局分布的、跟随工作负载的集群。如果在此示例中最活跃的区域是欧洲，那么对\
  \ `antipattern_table` 的查询将不得不从美国获取数据，反之亦然。\n\n稍等片刻后，运行以下语句以确保数据已均匀分布在各节点之间：\n\n\
  ```\nSELECT lease_holder_locality, replicas, replica_localities\nFROM [SHOW RANGES\
  \ FROM TABLE antipattern_table]\nWHERE \"start_key\" NOT LIKE '%Prefix%';\n```\n\
  \n```\nregion=europe-west1,az=c\n{7,8,9}\n{\n  \"region=europe-west1,az=b\",\n \
  \ \"region=europe-west1,az=c\",\n  \"region=europe-west1,az=d\"\n}\nregion=us-east1,az=d\n\
  {1,2,3}\n{\n  \"region=us-east1,az=b\",\n  \"region=us-east1,az=c\",\n  \"region=us-east1,az=d\"\
  \n}\n```\n\n## 第 7 章 部署拓扑\n```\nregion=us-west1,az=b\n{4,5,6}\n{\n  \"region=us-west1,az=a\"\
  ,\n  \"region=us-west1,az=b\",\n  \"region=us-west1,az=c\"\n}\n```\n\n现在，让我们执行一个查询来检查延迟：\n\
  \n```\nSELECT * FROM antipattern_table;\n```\n\n```\nid | city | crdb_region\n---------------------------------------+---------------+---------------\n\
  3c24dee9-f006-4c2a-b556-0d7d6d0a7f6d | Portland | us-west1\n8aaab90d-2ff3-471b-ac5a-39eec13b97bd\
  \ | San Francisco | us-west1\n9489216e-95f2-4796-98bd-ba654f85b688 | Seattle | us-west1\n\
  421f2184-99d7-4d2a-823c-e330ccbf5a87 | Madrid | europe-west1\n48b68338-93b2-4761-832b-4a3a91ba77e5\
  \ | Berlin | europe-west1\n```\n\n\n\n731b6876-d745-47f3-822e-d2fe2867d639 | 巴黎\
  \ | europe-west1\na1542138-f0ff-41ba-bfa7-1da3a5226103 | 纽约 | us-east1\nc66acd43-e23f-47ce-9965-6b09d6c4e502\
  \ | 芝加哥 | us-east1\nc73e23a1-65c1-4063-8f93-51094e0fe475 | 波士顿 | us-east1\n（共 9\
  \ 行）\n`时间：总计 14ms（执行 14ms / 网络 0ms）`\n\n如果你认为 CockroachDB 从美国东西海岸和西欧收集数据只需 `14ms`\
  \ 令人印象深刻，那你是对的！不幸的是，这凸显了此数据库配置中的一个重要疏忽。单独运行 `demo` 命令并不会模拟区域间延迟。我们需要添加 `--global`\
  \ 标志来启用此功能。\n\n这次，我们将按如下方式运行 `demo` 命令：\n```\n$ cockroach demo --global --nodes\
  \ 9 --no-example-database\n```\n\n### 第 7 章 部署拓扑\n\n如果你这次针对数据库运行相同的 SQL 命令，一旦数据复制到配置的区域中，你会看到不同的结果：\n\
  ```\nSELECT * FROM antipattern_table;\n\nid | city | crdb_region\n\n*---------------------------------------+---------------+---------------*\n\
  \n8c9600f7-81b2-40df-8d3c-9e00404bce7f | 巴黎 | europe-west1\n8d21288b-12f7-438d-8ef1-d51e7d3335be\
  \ | 马德里 | europe-west1\nde45d851-f25b-4c4b-90aa-4193c469c82c | 柏林 | europe-west1\n\
  0c04c9dd-4752-4489-a71f-3f13edae8923 | 波士顿 | us-east1\n87f4043b-d611-4129-a50e-dc941788110f\
  \ | 芝加哥 | us-east1\nd6ed2ab1-93d4-4306-8ef7-ec2bc00027f8 | 纽约 | us-east1\n948d90e2-e382-4e82-92fc-a57679ebf577\
  \ | 西雅图 | us-west1\nbc21e9e4-5929-47fa-a2e9-b7ff7cc29bec | 旧金山 | us-west1\nc41f5a0c-f854-4815-ac3d-62eb3efe4147\
  \ | 波特兰 | us-west1\n\n（共 9 行）\n`时间：总计 929ms（执行 928ms / 网络 0ms）`\n```\n\n由于缓存，后续查询会执行得更快，但我们集群拓扑的设计目前并非最优。有多种方式可以改进：\n\
  \n- `视图（Views）` – 如果你的部分用户需要访问实时全局数据，可以考虑将某些地理位置敏感的数据置于视图之后，并让区域性用户使用特定区域的数据库用户连接到其本地集群。该视图将仅暴露最接近用户的数据，这意味着不会进行全局分布式查询。我们在第\
  \ 5 章的“限制表数据”小节中正是这样做的。\n- `独立集群（Separate clusters）` – 如果你需要符合规定的、全球范围的覆盖，但不一定是全局数据（例如，一个全球可查询的数据库），你可以创建仅跨越彼此接近区域（例如，`us-west1`、`us-central1`\
  \ 和 `us-east1`）的独立集群。这样，你将实现数据隐私合规性和区域韧性。如果你需要访问所有全局数据，但不一定需要实时访问，你可以配置变更数据捕获（CDC）来异步更新集中存储中的数据。正如我们在第\
  \ 5 章的“监视数据库变更”小节中所做的那样。\n\n### 小结\n\n你需要仔细设计你的生产集群以发挥其最佳性能。以下要点将帮助你掌握基础：\n\n- `读取延迟（Read\
  \ latencies）` – 在大多数拓扑中，读取延迟表现良好。在设计集群时，请考虑将数据固定到特定区域的影响，除非你正在使用视图之类的东西将数据锁定在这些区域中。对地理分区数据库中所有数据的查询将导致跨区域读取并增加延迟。\n\
  - `写入延迟（Write latencies）` – 不同拓扑之间的写入延迟差异比读取延迟更大。使用跨区域复制时，需要考虑延迟影响。如果你需要区域韧性，请考虑复制到一组本地区域（例如，将\
  \ `europe-west1` 数据复制到 `europe-north1` 和 `europe-central1`，而不是 `australia-southeast2`\
  \ 和 `us-west1`）。\n- `测试（Testing）` – 测试集群及任何应用的拓扑模式的最佳方法是启动一个真实集群并监控其性能。如果无法实现，你可以使用\
  \ `--demo` 命令或通过 Docker 和 HAProxy 容器来模拟全局分布式集群。\n\n## 第 8 章 测试\n\n在本章中，我们将探讨一些测试数据库的技术，无论它是运行在你的本地机器、CI/CD\
  \ 流水线中、准备投入生产还是已经在生产环境中。\n\n在应用程序测试中，很容易忽视数据库。开发阶段容易被忽视的测试领域有很多。我将与你分享一个真实案例，以强调在涉及数据库时制定测试策略的重要性。\n\
  \n在开发我的第一个数据库支持的应用程序时，我创建了一个包含我认为我的应用程序需要支持的所有行组合的数据集。每当我了解到一个新需求，我都会更新数据集，一切似乎都按预期工作。直到我部署到生产环境并看到生产级别的数据量时，情况才发生变化。我的应用程序变得迟钝，并且在部署后的几天里越来越慢。\n\
  \n在这个例子中，我忽略了在我的数据库中测试一件重要的事情：索引。\n\n通过我的小（但看似全面的）数据集，我产生了一种虚假的信心，认为我的应用程序和数据库已经为生产环境做好了准备。当它面对生产级别的数据量时，缺失的索引露出了狰狞的面目，我的应用程序运行速度稳步下降。\n\
  \n在你的应用程序和数据库接近用户之前，有许多事情你需要让它们准备好。为了确保全面的测试覆盖，你需要考虑三种高层次的数据库测试类型：\n\n- `结构测试（Structural\
  \ testing）` – 专注于构成数据库的所有元素，包括其模式、表、列和视图。\n- `功能测试（Functional testing）` – 专注于数据库的功能。在此测试阶段，你会提出诸如“针对其表的\
  \ CRUD 操作如何影响数据的最终状态？”这样的问题。\n- `非功能测试（Nonfunctional testing）` – 专注于其他所有方面（性能、安全性等）。\n\
  \n在开始测试之前，让我们创建一个基本（且非常刻意的）数据库，并一起完成一些测试场景来验证其正确性。首先，我们将创建一个本地集群，以大致镜像一个三节点的基本生产拓扑集群：\n\
  ```\n$ mkdir certs\n$ mkdir keys\n$ cockroach cert create-ca \\\n--certs-dir=certs\
  \ \\\n--ca-key=keys/ca.key\n\n$ cockroach cert create-node \\\n--certs-dir=certs\
  \ \\\n--ca-key=keys/ca.key \\\nlocalhost\n\n$ cockroach start \\\n--certs-dir=certs\
  \ \\\n--store=node1 \\\n--listen-addr=localhost:26257 \\\n--http-addr=localhost:8080\
  \ \\\n--locality=region=us-east1,zone=a \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
  \n$ cockroach start \\\n--certs-dir=certs \\\n--store=node2 \\\n--listen-addr=localhost:26258\
  \ \\\n--http-addr=localhost:8081 \\\n--locality=region=us-east1,zone=b \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
  \n$ cockroach start \\\n--certs-dir=certs \\\n--store=node3 \\\n--listen-addr=localhost:26259\
  \ \\\n--http-addr=localhost:8082 \\\n--locality=region=us-east1,zone=c \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
  \n$ cockroach init \\\n--certs-dir=certs \\\n--host=localhost:26257\n\n$ cockroach\
  \ cert create-client \\\nroot \\\n--certs-dir=certs \\\n--ca-key=keys/ca.key\n```\n\
  \n### 结构测试\n\n\n\n"
- "# 第八章 测试\n\n结构测试的目标之一是验证所设计的数据库结构及其对象是否满足业务需求。因此，我不会预先创建大量表，而是逐一审查每个对象，并详细说明我对每个数据库对象的设计决策。请记住，这个业务场景（以及所有数据库对象）是虚构的，并非生产就绪；最终得到的数据库将是最基本的骨架。\n\
  \n让我们从创建数据库开始。公司名为 Bean About Town（纯属虚构，尽管快速搜索显示伦敦至少有三家精明的公司有同样的想法）。对于接下来的命令，我们将使用\
  \ root 用户。让我们打开一个 CockroachDB shell 并创建数据库 `bean_about_town`。我们将把所有数据库对象都安排在这个数据库下：\n\
  \n```\n$ cockroach sql \\\n--certs-dir=certs\n\nCREATE DATABASE bean_about_town;\n\
  USE bean_about_town;\n```\n\n数据库将有三个主要用户组：客户、咖啡烘焙部门成员和会计部门成员。让我们创建三个具有简单密码的用户，以确保权限和特权得到合理的隔离。\n\
  \n我们将有一个可以访问面向客户表的 `retail_user`，一个可以访问烘焙相关表的 `roasting_user`，以及一个可以访问账目相关表的 `finance_user`：\n\
  \n```\nCREATE USER retail_user WITH LOGIN PASSWORD '7efd7222dfdfb107';\nCREATE USER\
  \ roasting_user WITH LOGIN PASSWORD '9389884141ecaf04';\nCREATE USER finance_user\
  \ WITH LOGIN PASSWORD 'a02308ce58c92131';\n```\n\n在整个业务中，我们将处理不同类型订单的创建和接收：\n\n\
  -   `Retail` – 接收客户订单。\n-   `Roasting` – 为原材料下采购订单，并接收来自业务零售端（例如，一个履行在线订单的仓库需要烘焙咖啡豆）的订单。为简单起见，在此示例中，我们只为采购订单创建表。\n\
  -   `Finance` – 将客户订单与在线销售对账，并将烘焙订单与公司库存对账。我们暂时忽略财务部门为其所需物品下采购订单的需求。\n\n了解到我们需要概念化多种订单类型，很明显，创建\
  \ schema 将简化此过程。现在让我们创建一些 schema 和数据库对象。为简化起见，我不会创建 `roasting` 或 `finance` schema，因为仅通过\
  \ `retail` schema 我们就可以涵盖各种类型的测试。\n\n现在让我们创建 `retail` schema。`retail` schema 将保存与业务零售操作相关的所有数据库对象：\n\
  \n```\nCREATE SCHEMA retail AUTHORIZATION retail_user;\n```\n\n接下来，我们将创建一个表来保存客户信息：\n\
  \n```\nCREATE TABLE retail.customer (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n\
  \    full_name STRING(255) NOT NULL,\n    email STRING(320) NOT NULL,\n    join_date\
  \ TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n```\n\n关键设计决策：\n\n-   `客户姓名` – 并非每个人都有名和姓，因此与其要求分别提供名和姓，不如考虑直接要求提供客户的全名。\n\
  -   `join_date` – 处理时区时值得问的一个问题是，是否需要按用户时间还是系统时间捕获时间戳。如果是用户时间，使用 `TIMESTAMPTZ` 数据类型是有意义的，因为这允许我们提供特定用户时区的时间。\n\
  \n接下来，我们将创建一个表来保存产品信息：\n\n```\nCREATE TABLE retail.product (\n    id UUID PRIMARY\
  \ KEY DEFAULT gen_random_uuid(),\n    name STRING(100) NOT NULL,\n    sku STRING(16)\
  \ NOT NULL\n);\n```\n\n关键设计决策：\n\n-   `用户体验 (UX)` – 与订单表一样，考虑公司内部用户的体验很重要。如果使用库存单位\
  \ (SKU) 来标识产品，请确保它们易于使用和记忆。\n\n我们不会将价格与产品存储在一起，而是创建一种允许产品价格随时间变化的方法。例如，客户可能在促销期间购买产品。如果他们稍后要求退款，企业不能因按非促销价退款而亏本。\n\
  \n以下表格是历史价格的基本实现：\n\n```\nCREATE TABLE retail.product_price (\n    id UUID PRIMARY\
  \ KEY DEFAULT gen_random_uuid(),\n    product_id UUID NOT NULL REFERENCES retail.product(id),\n\
  \    amount DECIMAL NOT NULL,\n    start_date TIMESTAMPTZ NOT NULL,\n    end_date\
  \ TIMESTAMPTZ\n);\n```\n\n关键设计决策：\n\n-   `简单性` – 为保持简单明了，企业决定只处理一种货币。因此，我目前不会明确存储货币。\n\
  -   `正确性` – 对于应使用小数还是整数来存储货币价值，存在不同的观点。如果使用浮点数进行计算，可能会出现舍入错误，因此有些人更喜欢使用整数，并且仅在代码中临时转换为小数进行计算。这样，他们可以控制小数的舍入方式。由于我不会执行任何计算，我决定保持简单，使用小数。\n\
  -   `灵活性` – 通过将产品价格存储在产品表之外，我们在定价方面有了灵活性。通过包含价格的 `start_date` 和 `end_date`，我们可以安排价格变更，而无需手动更新它们。\n\
  \n接下来，我们将创建一个表来保存客户订单信息：\n\n```\nCREATE TABLE retail.order (\n    id UUID PRIMARY\
  \ KEY DEFAULT gen_random_uuid(),\n    reference STRING(16) NOT NULL,\n    customer_id\
  \ UUID NOT NULL REFERENCES retail.customer(id),\n    delivery_instructions STRING(255),\n\
  \    order_date TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n```\n\n关键设计决策：\n\n-   `用户体验\
  \ (UX)` – 考虑一下如果用户看到 UUID 订单号时的体验。如果他们在联系客服时需要输入或说出一个 UUID，这可能会损害他们的体验。因此，请为他们创建简短、易于阅读的标识符。\n\
  \n每个订单可以包含多个产品，每个产品可以出现在多个订单中。我们将通过第三张表来解决这个多对多关系：\n\n```\nCREATE TABLE retail.product_order\
  \ (\n    order_id UUID NOT NULL REFERENCES retail.order(id),\n    product_id UUID\
  \ NOT NULL REFERENCES retail.product(id),\n    product_price_id UUID NOT NULL REFERENCES\
  \ retail.product_price(id)\n);\n```\n\n在与财务部门沟通后，我们了解到他们团队的成员需要能够访问 `retail` schema\
  \ 中的对象，以便生成日终报告等。目前，如果他们尝试访问 `retail` schema 的对象，他们将看不到任何内容：\n\n```\n$ cockroach\
  \ sql \\\n--certs-dir=certs \\\n--url \"postgres://finance_user:a02308ce58c92131@localhost:26257/bean_about_town\"\
  \ \\\n--execute \"SELECT COUNT(*) FROM retail.order\"\n\nERROR: user finance_user\
  \ does not have SELECT privilege on relation order\n```\n\n授予他们对 `retail` schema\
  \ 对象的 `USAGE` 和 `SELECT` 权限将解决此问题：\n\n```\nGRANT SELECT, INSERT, UPDATE, DELETE\
  \ ON retail.* TO retail_user;\nGRANT SELECT ON retail.* TO retail_user;\nGRANT USAGE\
  \ ON SCHEMA retail TO finance_user;\nGRANT SELECT ON retail.* TO finance_user;\n\
  ```\n\n### 功能测试\n\n功能测试验证数据库是否满足业务需求和用例。我们可以从用户角度（黑盒）或凭借对数据库的深入理解和直接访问（白盒）运行功能测试。我们现在将逐一介绍每种测试类型。\n\
  \n为避免复杂性失控，我将测试范围限制在覆盖 `retail` schema。\n\n#### 黑盒测试\n\n\n\n黑盒测试从用户的角度测试数据库。我们不对其内部结构做任何假设，因此测试可以通过用户界面或\
  \ API 进行。由于我们没有实际的数据库或用户界面，我将提供一个简单的 API 来抽象数据库操作。为了简洁起见，我将使用来自[第 5 章](https://doi.org/10.1007/978-1-4842-82243_5)的\
  \ Crystal 驱动。\n\n在开始之前，我们先看看这个测试需要实现的用例：\n\n*   `创建客户` – 向数据库中插入一个新客户并返回其 ID。\n\
  *   `获取客户` – 根据 ID 从数据库中选择一位客户。\n*   `创建带价格的产品` – 插入一个产品及其相关的一组价格。\n*   `获取产品` –\
  \ 选择数据库中所有产品的列表。\n*   `下订单` – 为客户插入一份包含产品列表的订单。\n\n#### 创建一个简单的应用程序\n\n首先，使用以下命令为应用程序创建脚手架：\n\
  \n```\ncrystal init app api\ncd api\n```\n\n接下来，通过将它们添加到 `shard.yml` 文件并安装，引入我们将需要的依赖项：\n\
  \n```\ndependencies:\n  kemal:\n    github: kemalcr/kemal\n  pg:\n    github: will/crystal-pg\n\
  shards install\n```\n\n依赖项安装好后，我们就可以编写 API 了。与[第 5 章](https://doi.org/10.1007/978-1-4842-82243_5)中的示例代码一样，这段代码远未达到生产质量，仅作为黑盒测试的一种机制提供。\n\
  \n让我们从导入一些模块开始：\n\n```\nrequire \"kemal\"\nrequire \"db\"\nrequire \"pg\"\nrequire\
  \ \"json\"\nrequire \"uuid\"\nrequire \"uuid/json\"\n```\n\n接下来，我们将创建一个到数据库的连接。请注意，此连接将是明文的，这显然不适合生产环境使用：\n\
  \n```\ndb = PG.connect \"postgres://retail_user:7efd7222dfdfb107@localhost:26257/bean_about_town?auth_methods=cleartext\"\
  \n```\n\n现在我们准备好连接我们的 API 处理器了。让我们从一个过滤器中间件处理器开始，它将为所有响应附加一个 JSON `Content-Type`\
  \ 头。这将在我们所有处理器执行之前运行，并为所有响应添加正确的 `Content-Type` 头：\n\n```\nbefore_all do |env|\n\
  \  env.response.content_type = \"application/json\"\nend\n```\n\n接下来，我们将添加一个 `POST`\
  \ 请求处理器来插入客户。这个处理器将\n\n*   从 JSON 请求体中读取 `full_name` 和 `email` 字符串值\n*   将它们插入到\
  \ `retail.customer` 表中\n*   返回客户的 ID 和 `join_date`\n\n```\npost \"/customers\" do\
  \ |env|\n  full_name = env.params.json[\"full_name\"].as(String)\n  email = env.params.json[\"\
  email\"].as(String)\n  id, join_date = db.query_one \"INSERT INTO retail.customer\
  \ (full_name, email) VALUES ($1, $2) RETURNING id, join_date\", full_name, email,\
  \ as: { UUID, Time }\n  { \"id\": id, \"join_date\": join_date }.to_json\nend\n\
  ```\n\n接下来，我们将添加一个 `GET` 请求处理器来按 ID 选择客户。这个处理器将\n\n*   从请求 URL 路径中读取一个 ID\n*   从数据库中选择一个具有匹配\
  \ ID 的客户\n*   返回一个表示该用户的 JSON 对象\n\n```\nget \"/customers/:id\" do |env|\n  id =\
  \ env.params.url[\"id\"]\n  full_name, email, join_date = db.query_one \"SELECT\
  \ full_name, email, join_date FROM retail.customer WHERE id = $1 LIMIT 1\", id,\
  \ as: { String, String, Time }\n  { \"id\": id, \"full_name\": full_name, \"email\"\
  : email, \"join_date\": join_date }.to_json\nend\n```\n\n现在我们将处理产品。让我们添加一个 `POST`\
  \ 请求端点来插入产品及其价格。这个处理器将\n\n*   从请求体中解析一个产品对象\n*   开启一个事务，该事务将\n    *   将一个产品插入到 `product`\
  \ 表\n    *   将该产品的价格插入到 `produce_price` 表\n*   提交事务\n*   返回产品的 ID\n\n由于我们是从请求中读取一个对象，我创建了两个类：一个\
  \ `Product` 类用于保存产品的顶层信息，以及一个 `ProductPrice` 类用于包含该产品的单个、可选择是否过期的价格。\n\n```\nclass\
  \ Product\n  include JSON::Serializable\n  def initialize(@name : String, @sku :\
  \ String)\n    @prices = Array(ProductPrice).new\n  end\n```\n\n\n\n"
