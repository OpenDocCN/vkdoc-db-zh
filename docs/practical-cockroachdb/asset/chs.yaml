  \n我们将该函数命名为 `updateMultiPassUpdate`：\n\n```go\nfunc updateMultiPassUpdate(db *pgxpool.Pool,\
  \ ids []string, limit int) error {\n\tconst updateStmt = `UPDATE sensor_reading\n\
  \tSET reading = reading - 0.001\n\tWHERE sensor_id = ANY $1`\n\n\tupdateIDs := ids\n\
