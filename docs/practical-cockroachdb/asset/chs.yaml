  FROM retail.product_price


  WHERE start_date <= now()


  AND (end_date >= now() OR end_date IS NULL)


  GROUP BY id


  ORDER BY product_id, amount


  )


  SELECT p.id, p.name, p.sku, pp.id, pp.amount FROM min_product_


