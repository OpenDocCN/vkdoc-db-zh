- "# 第 8 章测试\n\n我们将创建的最后一个处理器是一个 GET 请求处理器，用于根据给定的客户 ID 选择其订单。该处理器将\n*   从请求 URL 路径读取客户\
  \ ID\n*   使用客户 ID 选择其所有订单\n*   遍历结果，构建包含产品的订单集合\n*   返回订单数组\n\n###### `Order` (扩展定义)\n\
  \n```crystal\nclass Order\n\ninclude JSON::Serializable\n\ndef initialize(@id, @reference,\
  \ @customer_id, @date, @delivery_\n\ninstructions)\n\n@products = Hash(String, Float64).new\n\
  \nend\n\nproperty id : UUID\n\nproperty reference : String\n\nproperty customer_id\
  \ : UUID\n\nproperty date : Time\n\nproperty delivery_instructions : String\n\n\
  property products : Hash(String, Float64)\n\nend\n```\n\n###### GET `/customers/:id/orders`\n\
  \n```crystal\nget \"/customers/:id/orders\" do |env|\n\ncustomer_id = UUID.new(env.params.url[\"\
  id\"])\n\norders = Hash(UUID, Order).new\n```\n\n\n## 第 8 章：测试\n\n##### 启动 API 服务器\n\
  \n剩下的所有工作就是启动 API 服务器进行监听。下面的代码将：\n- 在端口 `3000` 上启动 Kemal Web 服务器\n\n```\nKemal.run\n\
  ```\n\n代码就绪后，我们可以使用以下命令启动服务器：\n\n```\n$ crystal run src/api.cr\n[development] Kemal\
  \ is ready to lead at http://0.0.0.0:3000\n```\n\n##### 测试应用程序\n\n让我们编写一些 `curl`\
  \ 命令来测试 API（并在此过程中测试数据库）。在这一测试阶段，我们不仅需要断言数据库在接收到预期数据时行为符合预期，还需要断言它在接收到*非预期*数据时行为也符合预期。这些通常被称为边界测试。\n\
  \n在本节中，我们将遍历每个用例，以断言数据库能够支持它们。让我们从创建一个客户开始：\n\n```\n$ curl -X POST 'localhost:3000/customers'\
  \ \\\n    -H 'Content-Type: application/json' \\\n    -d '{\n  \"full_name\": \"\
  Malala Yousafzai\",\n  \"email\": \"malala.yousafzai@example.com\"\n}'\n{\"id\"\
  :\"7d640140-5581-41cf-a9db-0bccaf90f2de\",\"join_date\":\"2022-01-20T18:26:18Z\"\
  }\n```\n\n这涵盖了快乐路径：一个合理长度的姓名和电子邮件地址。我们的数据库支持 Unicode 字符吗？让我们一探究竟：\n\n```\n$ curl\
  \ -X POST 'localhost:3000/customers' \\\n    -H 'Content-Type: application/json'\
  \ \\\n    -d '{\n  \"full_name\": \"Наде́жда Андре́евна Толоко́нникова\",\n  \"\
  email\": \"nadya.tolokno@example.com\"\n}'\n{\"id\":\"85f05ac3-931f-4417-a6ae-1403468a2c10\"\
  ,\"join_date\":\"2022-01-20T18:26:34Z\"}\n```\n\n看起来支持！那长名字呢？数据库会拒绝超过我们定义的 `255`\
  \ 个字符长度的 `full_name` 吗？\n\n```\n$ curl -X POST 'localhost:3000/customers' \\\n \
  \   -H 'Content-Type: application/json' \\\n    -d '{\n  \"full_name\": \"aaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeaaaa\
  \ aaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeaaaaaaaaaabbbbbbbbbbcc ccccccccddddddddddeeeeeeeeeeaaaaaaaaaabbbbbbbbbbccccccccccdddddddddd\
  \ eeeeeeeeaaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeefffffg\",\n  \"email\"\
  : \"full_name@example.com\"\n}'\n...ERROR OMITTED\n```\n\n服务器没有任何错误处理，但日志确认我们尝试存储一个\
  \ `full_name` 长度为 `256` 个字符的客户失败了：\n\n```\nException: value too long for type STRING(255)\
  \ (PQ::PQError)\n```\n\n那么边界情况，一个 `255` 个字符长的 `full_name` 呢？\n\n```\n$ curl -X POST\
  \ 'localhost:3000/customers' \\\n    -H 'Content-Type: application/json' \\\n  \
  \  -d '{\n  \"full_name\": \"aaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeaaaa\
  \ aaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeaaaaaaaaaabbbbbbbbbbcc ccccccccddddddddddeeeeeeeeeeaaaaaaaaaabbbbbbbbbbccccccccccdddddddddd\
  \ eeeeeeeeaaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeefffff\",\n  \"email\"\
  : \"full_name@example.com\"\n}'\n{\"id\":\"d93bedb4-3e59-4bd5-b018-b6d89d688904\"\
  ,\"join_date\":\"2022-01-20T18:26:53Z\"}\n```\n\n暂时忽略电子邮件地址，我们的创建客户用例看起来不错，似乎我们的数据库正在满足这个用例的基本要求。现在让我们继续处理获取客户的用例。\n\
  \n首先，我们将发出一个请求来获取一个现有客户：\n\n```\n$ curl -X GET 'localhost:3000/customers/85f05ac3-931f-4417-a6ae-1403468a2c10'\n\
  {\"id\":\"85f05ac3-931f-4417-a6ae-1403468a2c10\",\"full_name\":\"Наде́жда Андре́евна\
  \ Толоко́нникова\",\"email\":\"nadya.tolokno@example.com\",\"join_date\":\"2022-01-20T18:26:34Z\"\
  }\n```\n\n这返回了我们最初为该用户插入的数据。显然，关于谁被允许请求特定用户没有任何安全检查，但从数据库的角度来看，这是我们的快乐路径测试满足了。不快乐的路径呢？让我们尝试在\
  \ URL 路径中省略客户 ID、通过不存在的 ID 搜索客户，以及使用格式错误的 UUID 搜索客户。对于这些测试，我将响应限制为仅头部，因为没有适当的错误处理，我们将收到\
  \ HTML 页面响应。\n\n```\ncurl -I -X GET localhost:3000/customers/\nHTTP/1.1 404 Not\
  \ Found\nConnection: keep-alive\nX-Powered-By: Kemal\nContent-Type: text/html\n\
  Transfer-Encoding: chunked\n```\n\n在对路径中没有 ID 的请求的响应中，我们收到一个 `404`，因为路径期望的是 `/customers/{CUSTOMER_ID}`。此测试尚未触及数据库，这是预期的。\n\
  \n```\ncurl -I -X GET localhost:3000/customers/df24592d-62dd-4876-b54a-405be8614aaf\n\
  HTTP/1.1 500 Internal Server Error\nConnection: keep-alive\nX-Powered-By: Kemal\n\
  Content-Type: text/html\nTransfer-Encoding: chunked\n```\n\n在对不存在的 ID 的请求的响应中，我们收到一个\
  \ `500`，原因是数据库调用周围的异常处理不足。检查服务器日志，我们可以看到该请求没有产生结果。再次，一个预期的结果：\n\n```\nException:\
  \ no results (DB::NoResultsError)\n```\n\n```\ncurl -I -X GET localhost:3000/customers/a\n\
  HTTP/1.1 500 Internal Server Error\nConnection: keep-alive\nX-Powered-By: Kemal\n\
  Content-Type: text/html\nTransfer-Encoding: chunked\n```\n\n在对格式错误的客户 ID 的请求的响应中，我们收到一个\
  \ `500`。再次，这是由于数据库调用周围的错误处理不足。再次检查服务器日志揭示了我们收到响应的根本原因。此请求也到达了数据库，但在查询准备期间返回了错误。再次，一个预期的结果：\n\
  \n```\nException: error in argument for $1: could not parse string \"a\" as uuid\
  \ (PQ::PQError)\n```\n\n接下来是产品的创建。这个场景提供了对多语句事务的第一次测试。在这个事务中，我们插入一个产品，然后使用先前插入的产品\
  \ ID 插入一些价格。让我们发出一个请求：\n\n```\n$ curl -X POST 'localhost:3000/products' \\\n   \
  \ -d '{\n  \"name\": \"Where Have You Bean All My Life?\",\n  \"sku\": \"L2JM9XAO\"\
  ,\n  \"prices\": [\n    { \"amount\": 6.00, \"start_date\": \"2022-01-01T09:00:00Z\"\
  , \"end_date\": \"2022-01-01T10:00:00Z\" },\n    { \"amount\": 12.00, \"start_date\"\
  : \"2022-01-01T09:00:00Z\" }\n  ]\n}'\n{\"id\":\"d77bfea2-f0df-4da9-aeef-7c8d9c362e38\"\
  }\n```\n\n我们为我们刚刚插入的产品提供了两个价格：全价 `12.00` 和半价 `6.00`。半价优惠设置在一小时后过期，因此在测试时，我预计每个请求的此产品价格为\
  \ `12.00`。\n\n我们还想断言，如果有多个活动价格，我们总是返回最便宜的那个：\n\n```\n$ curl -X POST 'localhost:3000/products'\
  \ \\\n    -d '{\n  \"name\": \"Has Bean\",\n  \"sku\": \"1OLEMX05\",\n  \"prices\"\
  : [\n    { \"amount\": 6.00, \"start_date\": \"2022-01-02T09:00:00Z\", \"end_date\"\
  : \"2022-01-02T10:00:00Z\" },\n    { \"amount\": 10.00, \"start_date\": \"2022-01-01T09:00:00Z\"\
  \ },\n    { \"amount\": 12.00, \"start_date\": \"2022-01-01T09:00:00Z\" }\n  ]\n\
  }'\n{\"id\":\"386e841e-4da8-4688-82a4-71d6fbb369fa\"}\n```\n\n与其针对此端点运行一套探索性测试，让我们直接跳到获取产品及其价格：\n\
  \n```\n$ curl -X GET 'localhost:3000/products'\n[\n  {\"id\":\"386e841e-4da8-4688-82a4-71d6fbb369fa\"\
  ,\"name\":\"Has Bean\",\"sku\":\"1OLEMX05\",\"prices\":[{\"id\":\"cc71e211-abc6-42d5-8f59-d357042334b0\"\
  ,\"amount\":10.0}]},\n  {\"id\":\"d77bfea2-f0df-4da9-aeef-7c8d9c362e38\",\"name\"\
  :\"Where Have You Bean All My Life?\",\"sku\":\"L2JM9XAO\",\"prices\":[{\"id\":\"\
  cbdc9d9c-a987-4655-b3f8-6b9b2ec9c50e\",\"amount\":12.0}]}\n]\n```\n\n\n"
- "# 第 8 章 测试\n\n#### 使用应用代码进行测试\n\n到目前为止，我们一直将 API 本身作为一个黑盒进行测试。如果我们想从我们应用程序自身的测试套件中，仅将数据库作为黑盒来测试，该怎么办呢？让我们看看如何通过\
  \ Docker Compose 将 CockroachDB 包含到你的本地测试环境中。\n\n对于这个示例，我们需要几个文件：\n\n- `docker-compose.yml`\
  \ – 包含将作为我们组合的应用程序和数据库测试套件一部分运行的 Docker 服务。具体来说，是一个用于我们应用代码的服务和一个用于 CockroachDB\
  \ 的服务。\n- `Dockerfile` – 一个将我们的应用程序测试二进制文件打包成 Docker 镜像的文件。\n- `main_test.go` –\
  \ 我们的应用程序测试代码。在本例中，我使用的是 Go 语言。\n\n让我们开始吧！我们将首先通过几个命令准备一个目录来存放我们的测试：\n\n```\nmkdir\
  \ db_tests\ncd db_tests\ngo mod init dbtests\n```\n\n接下来，我们将引入实现数据库交互所需的数据库依赖：\n\
  \n```\ngo get -u github.com/jackc/pgx\n```\n\n接着，我们将创建 Go 代码，该代码将连接到数据库并运行一些单元测试。由于此文件独立于任何其他\
  \ Go 代码存在，因此没有其他自管理 Go 模块的依赖。在这段代码中，我们将：\n\n- 从命令行读取一个标志，指示是否应包含数据库测试（默认为 false）\n\
  - 如果标志指示要运行数据库测试：\n  - 从环境变量中读取连接字符串。\n  - 在数据库启动时，尝试通过一个简单的退避循环连接到数据库。\n  - 所有测试完成后关闭数据库连接。\n\
  \  - 运行单元测试并捕获一个状态码，指示测试是通过还是失败。\n  - 使用从测试运行接收到的状态码退出应用程序。\n- 请注意，`TestADatabaseInteraction`函数仅在提供了数据库标志时才会执行。\n\
  \n```go\npackage main\n\nimport (\n    \"context\"\n    \"flag\"\n    \"log\"\n\
  \    \"os\"\n    \"testing\"\n    \"time\"\n\n    \"github.com/jackc/pgx/v4/pgxpool\"\
  \n)\n\nvar (\n    dbTests *bool\n    db      *pgxpool.Pool\n)\n\nfunc TestMain(m\
  \ *testing.M) {\n    dbTests = flag.Bool(\"db\", false, \"run database tests\")\n\
  \    flag.Parse()\n\n    if *dbTests {\n        connStr, ok := os.LookupEnv(\"CONN_STR\"\
  )\n        if !ok {\n            log.Fatal(\"connection string env var not found\"\
  )\n        }\n\n        if err := waitForDB(connStr); err != nil {\n           \
  \ log.Fatalf(\"error waiting for database: %v\", err)\n        }\n    }\n\n    code\
  \ := m.Run()\n\n    if *dbTests {\n        db.Close()\n    }\n\n    os.Exit(code)\n\
  }\n\nfunc waitForDB(connStr string) error {\n    var err error\n    for i := 1;\
  \ i <= 10; i++ {\n        db, err = pgxpool.Connect(context.Background(), connStr)\n\
  \        if err != nil {\n            log.Printf(\"error connecting to database:\
  \ %v\", err)\n        }\n    }\n}\n```\n\n在响应体中（我为了可读性稍微调整了一下格式），我们可以看到我们的两个产品已被返回，并且过期的促销价和更贵的现价都没有出现。\n\
  \n接下来，让我们下一个订单，并通过下一个多语句事务调用来检查数据库行为。在这个场景中，我们将创建一个订单，然后使用其 ID 向`product_order`表中插入行：\n\
  \n```\ncurl -X POST 'localhost:3000/orders' \\\n-d '{\n  \"customer_id\": \"85f05ac3-931f-4417-a6ae-1403468a2c10\"\
  ,\n  \"delivery_instructions\": \"Please leave package behind the green bin.\",\n\
  \  \"products\": {\n    \"386e841e-4da8-4688-82a4-71d6fbb369fa\": \"cc71e211-abc6-42d5-8f59-d357042334b0\"\
  ,\n    \"d77bfea2-f0df-4da9-aeef-7c8d9c362e38\": \"cbdc9d9c-a987-4655-b3f8-6b9b2ec9c50e\"\
  \n  }\n}'\n{\"id\":\"3ad9469a-50ec-4773-bc50-1c92209078de\",\"reference\":\"NIAXGBQP\"\
  }\n```\n\n让我们通过向返回客户订单的端点发起请求，来检查订单是否成功插入：\n\n```\ncurl -X GET localhost:3000/customers/85f05ac3-931f-4417-a6ae-1403468a2c10/orders\n\
  [{\"id\":\"93bff9af-5794-47a5-94e5-18e8a9832c41\",\"reference\":\"GDCQONIR\",\"\
  customer_id\":\"85f05ac3-931f-4417-a6ae-1403468a2c10\",\"date\":\"2022-01-20T18:32:45Z\"\
  ,\"delivery_instructions\":\"Please leave package behind the green bin.\",\"products\"\
  :{\"Has Bean\":10.0,\"Where Have You Bean All My Life?\":12.0}}]\n```\n\n在响应体中，我们可以看到包含了所有订单字段，以及正确的产品和价格。\n\
  \n\n\n```\ntime.Sleep(time.Second * time.Duration(i))\n\n}\n\n}\n\nreturn err\n\n\
  }\n\nfunc TestADatabaseInteraction(t *testing.T) {\n\nif !*dbTests {\n\nt.SkipNow()\n\
  \n}\n\nt.Log(\"running database test\")\n\n}\n\nfunc TestANonDatabaseInteraction(t\
  \ *testing.T) {\n\nt.Log(\"running non-database test\")\n\n}\n```\n\n请注意，此时我们可以使用以下命令运行所有**不需要**数据库连接的测试：\n\
  \n`go test ./... -v`\n\n```\n=== RUN TestADatabaseInteraction\n--- SKIP: TestADatabaseInteraction\
  \ (0.00s)\nChapter 8 testing\n=== RUN TestANonDatabaseInteraction\nmain_test.go:65:\
  \ running non-database test\n--- PASS: TestANonDatabaseInteraction (0.00s)\nPASS\n\
  ok\n```\n\n接下来，我们将应用程序打包成一个 Docker 镜像，以便能在 Docker Compose 环境中与 CockroachDB 一同运行。这会非常简单，因为我们将执行一个与\
