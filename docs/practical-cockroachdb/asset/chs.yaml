  \ `localhost:26257` 访问集群中的所有节点，这个改动对于正在运行的 API 将是透明的。\n\n#### 弹性测试\n\n弹性测试旨在确保我们的数据库在节点故障时保持可用。我们将使用本节之前的\
  \ Docker Compose 示例，因为它具有负载均衡，这意味着我们可以逐个从集群中移除节点而无需连接到其他节点。在我们的案例中，我们有一个三节点集群，因此最多可以容忍一个不可用的节点。\n\
