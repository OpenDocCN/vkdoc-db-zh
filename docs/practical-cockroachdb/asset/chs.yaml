  ```\n  region   |    zones     | database_names | primary_region_of\n-----------+--------------+----------------+--------------------\n\
  \  eu-central-1 | {eu-central-1a} | {} | {}\n  eu-west-3    | {eu-west-3a}    |\
  \ {} | {}\n```\n\n接下来，我们将升级所有集群节点上的 CockroachDB 版本。为简单起见，我们先从法兰克福集群的节点开始，依次更新每个节点，实现零停机时间。\n\
  \n在我的机器上，法兰克福节点当前运行的是 CockroachDB `v21.2.0`：\n\n```shell\ncockroach version\n```\n\
  \n```\nBuild Tag:        v21.2.0\nBuild Time:       2021/11/15 14:00:58\nDistribution:\
  \     CCL\nPlatform:         darwin amd64 (x86_64-apple-darwin19)\nGo Version: \
  \      go1.16.6\nC Compiler:       Clang 10.0.0\nBuild Commit ID:  79e5979416cb426092a83beff0be1c20aebf84c6\n\
  Build Type:       release\n```\n\n撰写本文时，CockroachDB 的最新版本是 `v21.2.5`。升级 CockroachDB\
  \ 后，我可以在命令行上确认：\n\n```shell\ncockroach version\n```\n\n```\nBuild Tag:        v21.2.5\n\
  Build Time:       2022/02/07 21:04:05\nDistribution:     CCL\nPlatform:        \
  \ darwin amd64 (x86_64-apple-darwin19)\nGo Version:       go1.16.6\nC Compiler:\
  \       Clang 10.0.0\nBuild Commit ID:  5afb632f77eee9f09f2adfa2943e1979ec4ebedf\n\
  Build Type:       release\n```\n\n## 第 9 章 生产环境\n\n让我们将这个版本的 CockroachDB 应用到每个节点。在您手动配置了负载均衡的环境中，在将节点从集群中移除之前，需要先将它们从负载均衡器中移除。这将防止任何请求被路由到已停用的节点。对于\
  \ Kubernetes 用户，以下是安全的操作方式：\n\n```yaml\napiVersion: apps/v1\nkind: StatefulSet\n\
  ...\ncontainers:\n- name: cockroachdb\n  image: cockroachdb/cockroach:v21.2.5\n\
  \  imagePullPolicy: IfNotPresent\n```\n\nKubernetes 将对您的节点执行滚动升级，不会有任何停机时间，并且会在替换每个节点之前将其从负载均衡器中移除。\n\
  \nCockroach Labs 提供了一些在执行版本间升级（包括像我们即将进行的这种小版本更新）时需要考虑的最佳实践。需要了解的一个关键点是自动最终化，以及在升级节点前它是否已启用。\n\
  \n如果升级集群节点有可能无意中损坏您的数据库（例如，在存在破坏性变更的版本之间升级），那么禁用自动最终化就很重要。可以通过以下方式实现：\n\n```sql\n\
  SET CLUSTER SETTING cluster.preserve_downgrade_option = '21.2';\n```\n\n要重新启用自动最终化：\n\
  \n```sql\nRESET CLUSTER SETTING cluster.preserve_downgrade_option;\n```\n\n在开始之前，我将运行前一章中的一条语句来获取集群中节点的基本信息：\n\
  \n```shell\ncockroach node status --insecure\n```\n\n```\n  id |    address    \
  \ |    sql_address  |   build\n-----+----------------+-----------------+-----------\n\
  \   1 | localhost:26257 | localhost:26257 | v21.2.0\n   2 | localhost:26258 | localhost:26258\
  \ | v21.2.0\n   3 | localhost:26259 | localhost:26259 | v21.2.0\n```\n\n## 第 9 章\
  \ 生产环境\n\n如我们所见，所有节点都按预期运行着 `v21.2.0`。现在让我们从节点一开始执行滚动升级。首先，我们将停止该节点（目前只需 `ctrl-c`\
  \ 进程）并检查它是否已变得不可用。请注意，在节点一关闭期间，我们需要连接到另一个节点来检查状态：\n\n```shell\ncockroach node status\
  \ --insecure --url postgres://localhost:26258\n```\n\n```\n  id |    address   \
  \  |    sql_address  |  build  | is_available | is_live\n-----+----------------+-----------------+---------+--------------+----------\n\
  \   1 | localhost:26257 | localhost:26257 | v21.2.0 |     false    |  false\n  \
  \ 2 | localhost:26258 | localhost:26258 | v21.2.0 |     true     |  true\n   3 |\
  \ localhost:26259 | localhost:26259 | v21.2.0 |     true     |  true\n```\n\n由于\
  \ `v21.2.0` 和 `v21.2.5` 之间没有破坏性变更，在获取到 `v21.2.5` 的二进制文件后，我们可以简单地再次运行启动命令；我们不需要删除节点的存储目录。\n\
  \n再次启动节点后，我们可以看到节点再次可用，并且其版本已经递增。我们也可以再次对节点一运行 `node` 命令：\n\n```shell\ncockroach\
  \ node status --insecure\n```\n\n```\n  id |    address     |    sql_address  |\
  \  build\n-----+----------------+-----------------+---------\n   1 | localhost:26257\
  \ | localhost:26257 | v21.2.5\n   2 | localhost:26258 | localhost:26258 | v21.2.0\n\
  \   3 | localhost:26259 | localhost:26259 | v21.2.0\n```\n\n我们现在将对节点二和节点三重复这些步骤。请注意，因为我们的集群只有三个节点，所以一次只对一个节点执行升级至关重要。如果我们同时从集群中移除两个节点，集群将变得不可用。\n\
  \n```shell\ncockroach node status --insecure\n```\n\n```\n  id |    address    \
  \ |    sql_address  |  build\n-----+----------------+-----------------+---------\n\
  \   1 | localhost:26257 | localhost:26257 | v21.2.5\n   2 | localhost:26258 | localhost:26258\
  \ | v21.2.5\n   3 | localhost:26259 | localhost:26259 | v21.2.5\n```\n\n## 第 9 章\
  \ 生产环境：迁移集群\n\n让我们假设在本节的最后部分，我们需要将集群从一个位置迁移到另一个位置（例如，为了云提供商迁移，或者在本地场景中迁移到更新的硬件）。这里我不讨论负载均衡或\
  \ DNS 等主题，而是提供一个节点迁移的模式。\n\n我们将为此示例启动一个全新的集群，从 AWS 的 `eu-central-1`（法兰克福）区域启动一个三节点集群，然后将它们迁移到\
  \ GCP 的 `europe-west1`（圣吉斯兰）区域。所有操作都将在本地运行，因此请注意，实际上并没有发生云迁移。\n\n\n### 集群节点迁移操作指南\n\
  \n在开始之前，必须讨论添加和移除节点的顺序。我们有一个三节点集群，复制因子为三（可通过运行 `SHOW ZONE CONFIGURATION FROM DATABASE\
  \ defaultdb` 查看），因此应始终保持一个三节点集群可用。这意味着在关闭一个节点之前先启动一个节点，并等待所有副本重新平衡到新节点后，再开始处理下一个节点。\n\
  \n#### 初始化三节点集群\n\n首先，我们在法兰克福区域启动 `node1`、`node2` 和 `node3` 并初始化集群：\n\n```\n$ cockroach\
  \ start \\\n--insecure \\\n--store=node1 \\\n--listen-addr=localhost:26257 \\\n\
  --http-addr=localhost:8080 \\\n--locality=region=eu-central-1,zone=eu-central-1a\
  \ \\\n--join='localhost:26257, localhost:26258, localhost:26259'\n```\n\n```\n$\
  \ cockroach start \\\n--insecure \\\n--store=node2 \\\n--listen-addr=localhost:26258\
  \ \\\n--http-addr=localhost:8081 \\\n--locality=region=eu-central-1,zone=eu-central-1a\
  \ \\\n--join='localhost:26257, localhost:26258, localhost:26259'\n```\n\n```\n$\
  \ cockroach start \\\n--insecure \\\n--store=node3 \\\n--listen-addr=localhost:26259\
  \ \\\n--http-addr=localhost:8082 \\\n--locality=region=eu-central-1,zone=eu-central-1a\
  \ \\\n--join='localhost:26257, localhost:26258, localhost:26259'\n```\n\n```\n$\
  \ cockroach init --insecure --host=localhost:26257\n```\n\n#### 扩展至六节点集群\n\n接下来，我们在圣吉斯兰区域启动\
  \ `node4`、`node5` 和 `node6` 并让它们加入集群。一旦任何副本不足的区间被重新平衡并解决，我们将开始拆除原始集群节点：\n\n```\n\
  $ cockroach start \\\n--insecure \\\n--store=node4 \\\n--listen-addr=localhost:26260\
  \ \\\n--http-addr=localhost:8083 \\\n--locality=region=europe-west1,zone=europe-west1b\
  \ \\\n--join='localhost:26257, localhost:26258, localhost:26259,\nlocalhost:26260,\
  \ localhost:26261, localhost:26262'\n```\n\n```\n$ cockroach start \\\n--insecure\
  \ \\\n--store=node5 \\\n--listen-addr=localhost:26261 \\\n--http-addr=localhost:8084\
  \ \\\n--locality=region=europe-west1,zone=europe-west1c \\\n--join='localhost:26257,\
  \ localhost:26258, localhost:26259,\nlocalhost:26260, localhost:26261, localhost:26262'\n\
  ```\n\n```\n$ cockroach start \\\n--insecure \\\n--store=node6 \\\n--listen-addr=localhost:26262\
  \ \\\n--http-addr=localhost:8085 \\\n--locality=region=europe-west1,zone=europe-west1d\
  \ \\\n--join='localhost:26257, localhost:26258, localhost:26259,\nlocalhost:26260,\
  \ localhost:26261, localhost:26262'\n```\n\n注意，我已将所有新旧主机都包含在 `--join` 参数中；这将防止在开始移除旧节点后集群变得不可用。\n\
  \n#### 检查集群状态\n\n新节点就位且所有副本不足的区间都已解决后，让我们运行 `node` 命令查看集群状态：\n\n```\n$ cockroach\
  \ node status --insecure --url postgres://localhost:26260\n--format records\n-[\
  \ RECORD 1 ]\nid             | 1\naddress        | localhost:26257\nlocality   \
  \    | region=eu-central-1,zone=eu-central-1a\nis_available   | true\nis_live  \
  \      | true\n-[ RECORD 2 ]\nid             | 2\naddress        | localhost:26259\n\
  locality       | region=eu-central-1,zone=eu-central-1a\nis_available   | true\n\
  is_live        | true\n-[ RECORD 3 ]\nid             | 3\naddress        | localhost:26258\n\
  locality       | region=eu-central-1,zone=eu-central-1a\nis_available   | true\n\
  is_live        | true\n-[ RECORD 4 ]\nid             | 4\naddress        | localhost:26260\n\
  locality       | region=europe-west1,zone=europe-west1b\nis_available   | true\n\
  is_live        | true\n![](img/index-240_1.jpg)\n-[ RECORD 5 ]\nid             |\
  \ 5\naddress        | localhost:26261\nlocality       | region=europe-west1,zone=europe-west1c\n\
  is_available   | true\nis_live        | true\n-[ RECORD 6 ]\nid             | 6\n\
  address        | localhost:26262\nlocality       | region=europe-west1,zone=europe-west1d\n\
  is_available   | true\nis_live        | true\n```\n\n一切看起来很好。所有六个节点都在运行。一旦所有剩余的副本不足区间都已解决（健康的复制状态示例见图\
  \ 9-1）并且你已完成任何必需的备份，就可以安全地从集群中移除原始的三个节点并完成迁移。\n\n*图 9-1. 六个健康节点的复制状态*\n\n\n让我们首先退役\
  \ `node1`、`node2` 和 `node3`。此过程将确保所有范围都从这些节点上复制出去，然后将它们从集群中移除。请注意，我是连接到 `node6`，但我本可以连接到集群中的任何节点来执行此操作：\n\
  \n```bash\n$ cockroach node decommission 1 --insecure --url postgres://localhost:26262\n\
  ```\n\n```bash\n$ cockroach node decommission 2 --insecure --url postgres://localhost:26262\n\
  ```\n\n```bash\n$ cockroach node decommission 3 --insecure --url postgres://localhost:26262\n\
  ```\n\n## 第 9 章 生产环境\n\n节点退役后，请检查仪表板中的复制状态是否仍如图 9-1 所示，然后关闭这些节点。\n\n您刚刚将集群从 AWS\
  \ 的法兰克福区域迁移到了 GCP 的圣吉斯兰区域！\n\n### 备份与恢复数据\n\n作为一个多活数据库，CockroachDB 不需要许多传统关系数据库的常规\
  \ DR（灾难恢复）架构。不幸的是，多活数据库并不能保护您免受恶意行为者或单纯的错误操作；一条 `TRUNCATE` 语句可能像在其他任何关系数据库中一样对 CockroachDB\
  \ 造成严重破坏。\n\n这就是备份发挥作用的地方。使用 CockroachDB，您可以通过以下任何一种方式备份集群：\n\n*   **完整备份** – 完整备份包含集群中的所有数据（不含副本）。例如，假设您将\
  \ 1GB 的数据复制到五个节点；您的备份将包含 1GB 的数据，而不是 5GB。所有集群都提供完整备份功能。\n*   **增量备份** – 增量备份捕获自上次备份以来的更改。您始终需要至少一个完整备份，但可以按需进行任意多次增量备份。增量备份仅适用于企业版集群。\n\
  *   **加密备份** – 加密备份为您的数据库备份增加了一层额外的安全性。请注意，您可以通过简单地备份到加密的 S3 存储桶（或类似存储）来实现安全备份，而无需手动加密。加密备份仅适用于企业版集群。\n\
  *   **带修订历史的备份** – 带修订历史的备份不仅备份数据库中的最新数据，还备份尚未被垃圾回收的任何修订历史（默认情况下，您将拥有 25 小时的修订历史）。通过这些备份，您可以恢复最新数据或之前某个时间点的数据。此功能仅适用于企业版集群。\n\
  *   **地域感知备份** – 地域感知备份允许备份特定的数据库地域（例如，仅 `eu-central-1`），仅适用于企业版集群。\n\n让我们逐一介绍每种备份方法，看看它们如何应对不同的用例。我将在演示集群（启用了企业版功能）中运行以下每个示例。要在常规集群中启用企业版功能，请配置以下设置：\n\
  \n```bash\n$ cockroach sql --insecure --host=<YOUR_HOST>\n```\n\n```sql\n$ SET CLUSTER\
  \ SETTING cluster.organization = 'your_organisation';\n$ SET CLUSTER SETTING enterprise.license\
  \ = 'your_license_key';\n```\n\n在我们创建任何备份之前，我将创建一个小数据库和表来证明我们的备份和恢复操作是成功的。为此，我将创建一个新的\
  \ `sensor_reading` 表，它适用于所有的备份方法：\n\n```sql\nCREATE TABLE sensor_reading (\n   \
  \ sensor_id UUID PRIMARY KEY,\n    country STRING NOT NULL,\n    reading DECIMAL\
  \ NOT NULL,\n    timestamp TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n\nINSERT INTO\
  \ sensor_reading (sensor_id, country, reading, timestamp)\nSELECT\n    gen_random_uuid(),\n\
  \    'DE',\n    CAST(random() AS DECIMAL),\n    '2022-02-18' - CAST(s * 10000 AS\
  \ INTERVAL)\nFROM generate_series(1, 1000) AS s;\n```\n\n在我们准备好备份之前，还差一步。与可以使用 HTTP\
  \ 端点的 `IMPORT` 语句不同，备份和恢复需要使用云提供商的对象存储（例如，S3、Google Cloud Storage 和 Azure Storage）。让我们为备份示例创建几个\
  \ S3 存储桶：\n\n```bash\n$ aws s3api create-bucket \\\n    --bucket practical-cockroachdb-backups\
  \ \\\n    --region eu-west-2 \\\n    --create-bucket-configuration LocationConstraint=eu-west-2\n\
  {\n    \"Location\": \"http://practical-cockroachdb-backups.s3.amazonaws.com/\"\n\
  }\n```\n\n```bash\n$ aws s3api create-bucket \\\n    --bucket practical-cockroachdb-backups-us-west\
  \ \\\n    --region us-west-1 \\\n    --create-bucket-configuration LocationConstraint=us-west-1\n\
  {\n    \"Location\": \"http://practical-cockroachdb-backups-us-west.s3.amazonaws.com/\"\
  \n}\n```\n\n```bash\n$ aws s3api create-bucket \\\n    --bucket practical-cockroachdb-backups-us-east\
  \ \\\n    --region us-east-1\n{\n    \"Location\": \"/practical-cockroachdb-backups-us-east\"\
  \n}\n```\n\n#### 完整备份\n\n数据库、表和存储桶都已就绪，我们可以开始了！让我们首先对数据进行一次完整的备份和恢复：\n\n```sql\n\
  BACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\
  \ AS OF SYSTEM TIME '-10s';\n```\n\n```\n  job_id           |  status   | fraction_completed\
  \ | rows | index_entries | bytes\n-------------------+-----------+--------------------+------+---------------+--------\n\
  \  742270852339073025 | succeeded |         1          | 1032 |       20      |\
  \ 57311\n```\n\n请注意，在我们的备份请求中，我们告诉 CockroachDB 备份十秒钟前的数据库状态。这意味着它不会尝试备份正在为客户端提供服务的实时数据。这是\
  \ Cockroach Labs 推荐的性能优化建议，十秒钟是推荐的`最小`时间间隔；根据您的垃圾回收窗口（默认为 25 小时），您可能希望将其设置为更早的时间点。\n\
  \n让我们检查 S3 是否有我们的备份：\n\n```bash\n$ aws s3api list-objects-v2 \\\n    --bucket practical-cockroachdb-backups\n\
  {\n    \"Contents\": [\n        {\n            \"Key\": \"2022/03/06-190437.13/BACKUP-CHECKPOINT-742270852339073025-CHECKSUM\"\
  ,\n            \"LastModified\": \"2022-03-06T19:04:48+00:00\",\n            \"\
  ETag\": \"\\\"79f98a6fd4b39f02b7727c91707b71cd\\\"\",\n            \"Size\": 4,\n\
  \            \"StorageClass\": \"STANDARD\"\n        }\n...\n```\n\n看起来不错！CockroachDB\
  \ 备份存储在一个目录结构中，其目录表明了备份的日期和时间。\n\n让我们通过运行恢复来确保我们的 `sensor_reading` 表已成功备份。由于所有数据都安全地复制在我们的三个节点上，目前进行恢复还无法证明什么；让我们来补救一下：\n\
  \n```sql\nTRUNCATE sensor_reading;\n\nSELECT COUNT(*) FROM sensor_reading;\n```\n\
  \n```\n  count\n---------\n     0\n```\n\n数据消失了（部门也陷入了恐慌），是时候运行恢复了。请注意备份对象的目录结构，我们现在需要用到它们：\n\
  \n```sql\nRESTORE FROM '2022/03/06-190437.13' IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2';\n\
  ```\n\n```\nERROR: full cluster restore can only be run on a cluster with no tables\
  \ or databases but found 4 descriptors: [sensors crdb_internal_region _crdb_internal_region\
  \ sensor_reading]\n```\n\n哦，不！看来我们只能在空集群上进行恢复。如果我们有其他不需要恢复的数据库或表怎么办？幸运的是，CockroachDB\
  \ 根据您的情况提供了替代的 `RESTORE` 命令。所有这些都可以从我们刚刚进行的完整备份执行：\n\n*   **集群损坏了？** – 使用 `RESTORE\
  \ FROM` 恢复整个集群。\n*   **数据库损坏了？** – 使用 `RESTORE DATABASE {DATABASE} FROM` 仅恢复您的数据库。\n\
  *   **表损坏了？** – 使用 `RESTORE TABLE {DATABASE}.{TABLE} FROM` 仅恢复您的表。请注意，通过传入一个逗号分隔的表字符串，您可以一次性备份多个表。\n\
  \n\n\n\n## 第 9 章 生产环境\n\n在恢复我们的表之前，还需要执行一个步骤。在运行恢复操作前，我们需要`DROP`（删除）或`RENAME`（重命名）它\
  \ 11 b。由于我的`sensing_reading`表是空的，不需要归档任何内容，因此`DROP`最适合我：\n\n```sql\nDROP TABLE sensor_reading;\n\
  ```\n\n```sql\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/06-190437.13'\
  \ IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2';\n\
  ```\n\n11 [www.cockroachlabs.com/docs/stable/restore.html#restore-a-cluster](http://www.cockroachlabs.com/docs/stable/restore.html#restore-a-cluster)\n\
  \n```\njob_id | status | fraction_completed | rows | index_entries | bytes\n---------------------+-----------+--------------------+------+---------------+-------\n\
  742274102397501441 | succeeded | 1 | 1000 | 0 | 52134\n```\n\n#### 增量备份\n\n在此案例中，完整备份和恢复有效，因为数据库及其对象都很小。如果你的集群大小达到许多\
  \ GB，增量备份可能是更高效的选择。让我们来探索增量备份，看看它们是如何工作的。\n\n首先，我们将在恢复的`sensor_reading`表中插入一些新数据，以模拟随时间推移添加到表中的数据。这将创建一个差异，该差异存在于我们在备份章节开始时插入的原始数据与现在之间。如果\
  \ CockroachDB 在增量备份与上一次备份（无论是完整备份还是增量备份）之间未检测到任何更改，你将看到一个空的备份目录：\n\n```sql\nINSERT\
  \ INTO sensor_reading (sensor_id, country, reading, timestamp)\nSELECT\n  gen_random_uuid(),\n\
  \  'DE',\n  CAST(random() AS DECIMAL),\n  '2022-02-18' - CAST(s * 10000 AS INTERVAL)\n\
  FROM generate_series(1, 500) AS s;\n```\n\n```sql\nSELECT COUNT(*) FROM sensor_reading;\n\
  ```\n\n```\ncount\n---------\n1511\n```\n\n现在，让我们运行一次增量备份：\n\n```sql\nBACKUP INTO\
  \ LATEST IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\
  \ AS OF SYSTEM TIME '-10s';\n```\n\n```\njob_id | status | fraction_completed |\
  \ rows | index_entries | bytes\n---------------------+-----------+--------------------+------+---------------+-------\n\
  742278826975625217 | succeeded | 1 | 1511 | 35 | 85097\n```\n\n行数表示上次备份操作备份的行数。请注意，由于我们尚未备份已恢复的数据集，此差异包含了表中的所有行。如果你现在再次运行备份，你将看到零行，因为没有任何新内容需要备份：\n\
  \n```sql\nBACKUP INTO LATEST IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\
  \ AS OF SYSTEM TIME '-10s';\n```\n\n```\njob_id | status | fraction_completed |\
  \ rows | index_entries | bytes\n---------------------+-----------+--------------------+------+---------------+-------\n\
  742280265162588161 | succeeded | 1 | 0 | 0 | 0\n```\n\n请注意，由于我们正在对整个集群进行增量备份，任何其他数据库对象的更改都会被检测到（并备份）。要恢复我们的表，我们只需像之前一样重新运行恢复操作。所有增量备份都存在于\
  \ S3 中，并会自动被检索到：\n\n```sql\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/06-190437.13'\
  \ IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2';\n\
  ```\n\n#### 加密备份\n\n要加密备份，你需要创建自己的加密密钥，并使用该密钥在备份持久化到云存储之前对其进行加密。让我们现在创建一个加密密钥并用它创建一个加密备份：\n\
  \n```bash\n$ aws kms create-key \\\n  --key-spec=SYMMETRIC_DEFAULT \\\n  --tags\
  \ TagKey=Purpose,TagValue=\"Encrypt CockroachDB backups\" \\\n  --description \"\
  Practical CockroachDB Backups\"\n```\n\n要使用加密密钥进行备份和恢复，只需将参数传递给`BACKUP`/`RESTORE`命令，如下所示：\n\
  \n```sql\nBACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
  WITH kms = 'aws:///****?AUTH=implicit&REGION=eu-west-2';\n```\n\n\n\n"
- "# 第 9 章 生产环境\n\n这里有几点需要注意：\n\n• `\"aws:///\"` 这个 KMS 密钥 URL 方案并非拼写错误。\n\n• 可在 URL\
  \ 中使用的密钥 ID 可以通过运行以下 AWS CLI 命令并提取你想要使用的密钥的 `KeyId` 来获取：\n\n```\n$ aws kms list-keys\n\
  {\n  \"Keys\": [\n    {\n      \"KeyId\": \"********-****-****-****-************\"\
  ,\n      \"KeyArn\": \"arn:aws:kms:eu-west-2:***:key/********-****-****-****-************\"\
  \n    },\n    {\n      \"KeyId\": \"********-****-****-****-************\",\n  \
  \    \"KeyArn\": \"arn:aws:kms:eu-west-2:***:key/********-****-****-****-************\"\
  \n    }\n  ]\n}\n```\n\n• 通过使用配置 `AUTH=implicit`，我是在告诉 CockroachDB 使用与访问存储桶相同的凭证来访问\
  \ KMS 密钥。如果你的 KMS 密钥使用不同的凭证，请为该密钥提供关联的 `AWS_ACCESS_KEY_ID`、`AWS_SECRET_ACCESS_KEY`\
  \ 和 `REGION` 查询参数。\n\n如果你尝试在没有 KMS 密钥的情况下恢复备份，将会收到错误，因为 CockroachDB 知道此备份是使用 KMS\
  \ 密钥手动加密的：\n\n```\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/08-183653.00'\
  \ IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2';\n\
  ```\n\nERROR: file appears encrypted -- try specifying one of `\"encryption_passphrase\"\
  ` or `\"kms\"`: proto: wrong wireType = 5 for field EntryCounts\n\n## 第 9 章 生产环境\n\
  \n*使用* KMS 密钥进行恢复会按预期执行恢复操作：\n\n```\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/08-183653.00'\
  \ IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
  \  WITH kms = 'aws:///****?AUTH=implicit&REGION=eu-west-2';\n```\n\n```\n  job_id\
  \           |  status   | fraction_completed | rows | index_entries | bytes\n-------------------+-----------+--------------------+------+---------------+-------\n\
  742834697875423233 | succeeded |         1          | 1000 |        0      | 52140\n\
  ```\n\n要加密一个多区域集群，只需为想要加密的每个区域提供一个存储在该区域的 KMS 密钥。我加密的集群当前位于单个区域，但通过向密钥数组添加更多 KMS\
  \ 密钥，你可以加密更多区域：\n\n```\nBACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
  \  WITH kms = (\n    'aws:///****AUTH=implicit&REGION=eu-west-2'\n  );\n```\n\n\
  ```\n  job_id           |  status   | fraction_completed | rows | index_entries\
  \ | bytes\n-------------------+-----------+--------------------+------+---------------+-------\n\
  742839873407320065 | succeeded |         1          | 1055 |       65      | 76388\n\
  ```\n\n```\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/08-191858.46' IN\
  \ 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
  \  WITH kms = (\n    'aws:///****AUTH=implicit&REGION=eu-west-2'\n  );\n```\n\n\
  ```\n  job_id           |  status   | fraction_completed | rows | index_entries\
  \ | bytes\n-------------------+-----------+--------------------+------+---------------+-------\n\
  742840069222793217 | succeeded |         1          | 1000 |        0      | 52150\n\
  ```\n\n请注意，恢复的行数少于备份的行数。这是因为备份是针对整个集群进行的，而恢复操作仅针对 `sensor_reading` 表。\n\n如果你不想使用云提供商存储的密钥来加密备份，可以提供自己的密码用于加密。以这种方式加密备份的过程与使用云密钥加密非常相似：\n\
  \n```\nBACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
  \  WITH encryption_passphrase = 'correct horse battery staple';\n```\n\n```\n  job_id\
  \           |  status   | fraction_completed | rows | index_entries | bytes\n-------------------+-----------+--------------------+------+---------------+-------\n\
  742837673818750977 | succeeded |         1          | 1046 |       48      | 69464\n\
  ```\n\n恢复过程也与 KMS 方式非常相似：\n\n```\nRESTORE TABLE sensors.sensor_reading FROM '2022/03/08-190747.27'\
  \ IN 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
  ```\n\n\n\n## 第 9 章 生产环境\n\nKEY=`****&AWS_REGION=eu-west-2'`\n\nWITH `encryption_passphrase`\
  \ = 'correct horse battery staple';\n\n`job_id` | `status` | `fraction_completed`\
  \ | `rows` | `index_entries` | `bytes`\n--- | --- | --- | --- | --- | ---\n742838121558212609\
  \ | succeeded | 1 | 1000 | 0 | 52150\n\n#### 区域感知备份\n\n要使备份具备区域感知能力，我们只需向`BACKUP`命令传递一些额外的配置，以确保备份保留在各自的区域内。\n\
  \n让我们使用演示命令创建一个新集群来模拟一个多区域集群。\n\n在下面的例子中，我们指定默认情况下，CockroachDB 应备份到美西存储桶，但具有`us-east-1`区域性的节点除外，这些节点将备份到美东存储桶：\n\
  \n```\nBACKUP INTO (\n    's3://practical-cockroachdb-backups-us-west?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&COCKROACH_LOCALITY=default',\n\
  \    's3://practical-cockroachdb-backups-us-east?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&COCKROACH_LOCALITY=region%3Dus-east-1'\n\
  );\n\nRESTORE TABLE `sensor_reading` FROM '2022/06/29-183902.85' IN (\n    's3://practical-cockroachdb-backups-us-west?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=us-west-1&COCKROACH_LOCALITY=default',\n\
  \    's3://practical-cockroachdb-backups-us-east?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=us-east-1&COCKROACH_LOCALITY=region%3Dus-east-1'\n\
  );\n```\n\nKMS 密钥和加密口令短语可以与区域备份结合使用，从而实现灵活的 CockroachDB 备份和恢复。\n\n#### 计划备份\n\n\
  可以安全地假设，你不会想在每晚午夜手动备份你的集群。这就是 CockroachDB 备份计划的用武之地。以下语句创建了两个备份计划：\n\n- **每周完整备份**\
  \ – 创建每周完整备份，以确保每周都捕获一个干净的基线备份。\n- **每日增量备份** – 根据我们的指令，使用`crontab`语法创建每日备份。\n\n\
  ```\nCREATE SCHEDULE cluster_backup\n    FOR BACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
  \    WITH revision_history\n    RECURRING '@daily'\n    WITH SCHEDULE OPTIONS first_run\
  \ = 'now';\n```\n\n此语句的输出将包含两个新创建计划的信息：\n\n- **每周完整备份:**\n    - ID: `742844058827390977`\n\
  \    - 状态: `ACTIVE`\n- **每日增量备份:**\n    - ID: `742844058837024769`\n    - 状态: `PAUSED`:\
  \ 等待首次备份完成\n\n一旦每日初始备份完成，其状态将从`PAUSED`变为`ACTIVE`。这可以通过调用`SHOW SCHEDULES`来查看：\n\n\
  ```\n$ cockroach sql --url \"postgresql://localhost:26260\" --insecure \\\n--execute\
  \ \"SHOW SCHEDULES\" \\\n--format records\n-[ RECORD 1 ]\nid             | 742844058837024769\n\
  label          | cluster_backup\nschedule_status| ACTIVE\nnext_run       | 2022-03-13\
  \ 00:00:00+00\nrecurrence     | @weekly\n-[ RECORD 3 ]\nid             | 742844058827390977\n\
  label          | cluster_backup\nschedule_status| ACTIVE\nnext_run       | 2022-03-09\
  \ 00:00:00+00\nrecurrence     | @daily\n```\n\n我们的每日备份作业将于明天午夜执行，而每周备份作业将于周日执行。\n\
  \n我们要求 CockroachDB 立即开始第一次每日备份。如果在白天创建计划，这不太可能是你期望的行为。要为首次运行设置不同的开始时间，只需将`first_run`值替换为时间戳。例如：\n\
  \n```\nCREATE SCHEDULE cluster_backup\n    FOR BACKUP INTO 's3://practical-cockroachdb-backups?AWS_ACCESS_KEY_ID=****&AWS_SECRET_ACCESS_KEY=****&AWS_REGION=eu-west-2'\n\
  \    WITH revision_history\n    RECURRING '@daily'\n    WITH SCHEDULE OPTIONS first_run\
  \ = '2022-03-08 00:00:00+00';\n```\n\n### 集群设计\n\n在设计集群时，有许多配置需要决定，以获得最佳性能和弹性。在本节中，我们将重点讨论这些决策及其权衡。\n\
  \n#### 集群规模规划\n\n\n##### CockroachDB 集群架构与生产环境规划\n\n如果你将 CockroachDB 集群视为分布在各个节点上的一组\
  \ vCPU（虚拟 CPU），那么设计集群架构的过程就会变得更简单。\n\n拥有少量大型节点的集群与拥有大量小型节点的集群之间存在权衡。\n\n在由少量大型节点组成的小型集群中，每台机器额外的计算能力以及满足大型查询所需的较少网络跳数，使得集群更加**稳定**。\n\
  \n在由大量小型节点组成的大型集群中，用于分发数据和并行化备份与恢复等分布式操作的额外节点，使得集群更加**有弹性**。\n\n在稳定性和弹性之间做决定是你的选择，但作为经验法则，Cockroach\
  \ Labs 建议你采取折中方案，在尽可能少的节点上分布 vCPU，同时仍能实现弹性。他们的 [生产检查清单](https://www.cockroachlabs.com/docs/stable/recommended-production-settings.html)\
  \ 提供了每种情况的详细分解。\n\n#### 节点规模\n\nCockroach Labs 提供了一套简单的建议，用于根据 vCPU 数量来确定集群节点的规模。让我们针对最低和推荐的\
  \ vCPU 数量逐一了解这些建议。请注意，这些只是一般性建议。根据你独特的性能需求，你可能需要不同的比例：\n\n*   **内存** – 每 vCPU 4GB：\n\
  \    *   4 vCPUs -> 每节点 16GB RAM\n    *   8 vCPUs -> 每节点 32GB RAM\n*   **存储** –\
  \ 每 vCPU 150GB：\n    *   4 vCPUs -> 每节点 600GB 磁盘\n    *   8 vCPUs -> 每节点 1.2TB 磁盘\n\
  *   **IOPS** – 每 vCPU 500 IOPS（每秒输入/输出操作数）：\n    *   4 vCPUs -> 2,000 IOPS\n   \
  \ *   8 vCPUs -> 4,000 IOPS\n*   **MB/s** – 每 vCPU 30MB/s（每秒传输到磁盘或从磁盘传出的数据量）：\n\
  \    *   4 vCPUs -> 120MB/s\n    *   8 vCPUs -> 240MB/s\n\n常言道：“过早优化是万恶之源。” 在为你的\
  \ CockroachDB 集群构建架构时也是如此。早在 2018 年，当我创建一个 CockroachDB 集群时，我问 Cockroach Labs 团队是否建议立即在集群前放置一个外部缓存来处理读取密集型工作负载。他们的回答是先利用\
  \ CockroachDB 自身的缓存。这样做可以减少网络跳数并提供查询原子性，而数据库与缓存的组合则无法做到这一点。\n\n使用 CockroachDB，你不仅可以扩展集群中的节点数量，还可以扩展节点本身。因此，设计时应支持一个合理的初始容量，并由此开始增长。\n\
  \n### 监控\n\n安全地在生产环境中运行任何软件的一个重要方面是监控。在本节中，我们将为 CockroachDB 集群配置监控，并针对一个简单指标设置警报。\n\
  \n在此示例中，我们将使用 Prometheus，这是一个流行的开源监控系统，CockroachDB 对其有很好的支持。\n\n首先，我们将创建一个要监控的集群：\n\
  \n```shell\n$ cockroach start \\\n--insecure \\\n--store=node1 \\\n--listen-addr=localhost:26257\
  \ \\\n--http-addr=localhost:8080 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
  \n$ cockroach start \\\n--insecure \\\n--store=node2 \\\n--listen-addr=localhost:26258\
  \ \\\n--http-addr=localhost:8081 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
  \n$ cockroach start \\\n--insecure \\\n--store=node3 \\\n--listen-addr=localhost:26259\
  \ \\\n--http-addr=localhost:8082 \\\n--join=localhost:26257,localhost:26258,localhost:26259\n\
  \n$ cockroach init --insecure --host=localhost:26257\n```\n\n接下来，我们将创建一个 Prometheus\
  \ 实例来监控我们的三个节点。我们将创建 `prometheus.yml` 和 `alert_rules.yml` 配置文件，并将 Prometheus 实例指向这些文件。\n\
  \n"
- "# 第九章 生产环境\n\n#### Prometheus 配置\n\n`prometheus.yml 文件`用于配置 Prometheus 的基本属性。它决定了\
  \ Prometheus 抓取指标数据的频率、从哪些主机抓取数据，以及这些主机通过哪些 URL 提供指标数据。请注意，由于我将使用 Docker 运行 Prometheus，因此我使用了\
  \ `host.docker.internal` 这个 DNS 名称，它可以从容器内部解析到我的主机：\n\n```\nglobal:\n  scrape_interval:\
  \ 10s\n\nrule_files:\n  - alert_rules.yml\n\nscrape_configs:\n  - job_name: cockroachdb\n\
  \    metrics_path: /_status/vars\n    static_configs:\n      - targets:\n      \
  \  - host.docker.internal:8080\n        - host.docker.internal:8081\n        - host.docker.internal:8082\n\
  ```\n\n#### Alertmanager 配置\n\n`alert_rules.yml 文件`用于配置包含指标规则的告警组。如果任何指标规则超过了配置的阈值，将为该告警组触发告警。在此示例中，我创建了一个告警，如果\
  \ CockroachDB 检测到某个节点离线超过一分钟，该告警就会触发：\n\n```\ngroups:\n  - name: node_down\n   \
  \ rules:\n      - alert: NodeDown\n        expr: up == 0\n        for: 1m\n    \
  \    labels:\n          severity: critical\n```\n\n接下来，我们将创建一个 Alertmanager 实例。它将接收来自\
  \ Prometheus 的告警，并将其发送给接收器。通过以下配置，我使用一个简单的 HTTP 接收器将通知发送到 `https://httpbin.org`：\n\
  \n```\nglobal:\n  resolve_timeout: 5m\n\nroute:\n  group_by: ['alertname']\n  group_wait:\
  \ 5s\n  group_interval: 5s\n  repeat_interval: 1h\n  receiver: api_notify\n```\n\
  \n![](img/index-257_1.png)\n\n```\nreceivers:\n  - name: api_notify\n    webhook_configs:\n\
  \      - url: https://httpbin.org/post\n```\n\n#### 启动服务并观察告警\n\n现在让我们启动 Prometheus\
  \ 和 Alertmanager：\n\n```\n$ docker run \\\n    --name prometheus \\\n    --rm -it\
  \ \\\n    -p 9090:9090 \\\n    -v ${PWD}/prometheus.yml:/etc/prometheus/prometheus.yml\
  \ \\\n    -v ${PWD}/alert_rules.yml:/etc/prometheus/alert_rules.yml \\\n    prom/prometheus\n\
  ```\n\n```\n$ docker run \\\n    --name alertmanager \\\n    --rm -it \\\n    -p\
  \ 9093:9093 \\\n    -v ${PWD}/alertmanager.yml:/etc/alertmanager/alertmanager.yml\
  \ \\\n    prom/alertmanager\n```\n\n如果你访问 `http://localhost:9090/alerts`，你会看到 `NodeDown`\
  \ 告警处于活动状态，并报告当前没有节点宕机：\n\n如果我们现在终止一个节点，该告警将先进入“待处理”状态，然后变为“触发”状态。我将终止 `node3` 的\
  \ `cockroach` 进程来演示这些告警状态。\n\n![](img/index-258_1.png)\n![](img/index-258_2.png)\n\
  \n稍等片刻，告警将进入待处理状态：\n\n再过一会儿，它将进入触发状态：\n\n如果我们重启 `node3` 并稍等片刻，告警将清除，并报告我们的集群再次恢复健康。\n\
