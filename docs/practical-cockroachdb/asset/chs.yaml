  \n```\n  region    |   zones    | database_names | primary_region_of\n------------+------------+----------------+--------------------\n\
  \  europe-north1 | {a,b,c} | {}             | {}\n  europe-west1  | {a,b,c} | {}\
  \             | {}\n  europe-west3  | {a,b,c} | {}             | {}\n  us-east1\
  \      | {a,b,c} | {}             | {}\n```\n\n让我们创建一个跨越欧洲区域的数据库，看看这会如何影响我们的区域视图：\n\
  \n```sql\nCREATE DATABASE db_name\nPRIMARY REGION \"europe-west1\"\nREGIONS = \"\
