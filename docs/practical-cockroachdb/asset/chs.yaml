  \  europe-north1 | {a,b,c} | {db_name}      | {}\n  europe-west1  | {a,b,c} | {db_name}\
  \      | {db_name}\n  europe-west3  | {a,b,c} | {db_name}      | {}\n  us-east1\
  \      | {a,b,c} | {}             | {}\n```\n\n`SHOW REGIONS` 的结果确认我们的 `\"db_name\"\
