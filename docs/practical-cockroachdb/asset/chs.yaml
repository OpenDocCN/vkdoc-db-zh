  ## 关于作者


  **Rob Reid** 是一位来自英国伦敦的软件开发者。在他的职业生涯中，他曾为警察、旅行、金融、大宗商品、体育博彩、电信、零售和航空航天行业编写后端、前端和消息软件。他是
  CockroachDB 的热心用户，近年来一直与 Cockroach Labs 团队合作，推广该数据库并将其嵌入美国和英国的开发团队。


  ## 关于技术审校者


  **Fernando Ipar** 自 2000 年以来一直从事开源数据库的工作，专注于性能、扩展和高可用性。他目前在 Life360 担任数据库可靠性工程师。在此之前，他曾在
  Perceptyx、Pythian 和 Percona 等公司工作。工作之余，Fernando 喜欢和妻子一起去植物苗圃，与孩子们一起演奏音乐，并为家里的猫提供良好的服务。


