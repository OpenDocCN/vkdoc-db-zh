  \ 1 min=1 max=1\n\n##### 扩展你的测试环境\n\n如果你在运行前面的测试时遇到问题，可能是因为你三节点的 CockroachDB 集群是通过单个“热点”节点访问的。为了扩展你的测试环境并引入负载均衡，我现在将创建一个位于\
  \ HAProxy 后面的本地 Docker 化集群，这个容器由 Cockroach Labs 的杰出人物 Tim Veil 提供。\n\n创建一个名为 `docker-compose.yml`\
  \ 的 Docker Compose 配置文件，内容如下。这个文件将：\n\n- 创建三个 CockroachDB 节点，它们在启动时将尝试共同组成一个集群\n\
  - 创建一个 HAProxy 负载均衡器，它将把来自主机的请求转发到每个 CockroachDB 节点\n\n```yaml\nservices:\n  node1:\n\
  \    image: cockroachdb/cockroach:v21.2.4\n    hostname: node1\n    container_name:\
  \ node1\n    command: start --insecure --join=node1,node2,node3\n    networks:\n\
  \      - app-network\n  node2:\n    image: cockroachdb/cockroach:v21.2.4\n    hostname:\
  \ node2\n    container_name: node2\n    command: start --insecure --join=node1,node2,node3\n\
