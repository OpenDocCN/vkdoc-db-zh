  \ y {\n\t\treturn x\n\t}\n\treturn y\n}\n```\n\n##### updateMultiPass\n\n最后，是函数本身。该函数\n\
  \n*   通过 select 函数获取一批尚未处理的 ID，并将它们传递给 update 函数。\n*   如果在任何时候没有更多 ID 可供处理，该函数即返回。\n\
  \n我们将此函数命名为 `updateMultiPass`：\n\n```go\nfunc updateMultiPass(db *pgxpool.Pool,\
  \ selectLimit, updateLimit int) (d time.Duration, err error) {\n\tstart := time.Now()\n\
  \tvar lastID string\n\tfor {\n\t\tids, err := updateMultiPassSelect(db, lastID,\
  \ selectLimit)\n\t\tif err != nil {\n\t\t\treturn 0, fmt.Errorf(\"fetching ids to\
  \ update: %w\", err)\n\t\t}\n\t\tif len(ids) == 0 {\n\t\t\tbreak\n\t\t}\n\t\tif\
  \ err = updateMultiPassUpdate(db, ids, updateLimit); err != nil {\n\t\t\treturn\
  \ 0, fmt.Errorf(\"updating items: %w\", err)\n\t\t}\n\t\tif len(ids) < 1000 {\n\t\
  \t\tbreak\n\t\t}\n```\n\n\n## 第 9 章：生产环境\n\n### 集群维护\n\n你在上线第一天部署到生产环境的集群，不太可能与一年后（尤其是五年后）运行的集群相似。如果你提前数年规划\
  \ CockroachDB 集群，那么你\n\n- 可能正在为未充分利用的资源付费\n- 没有充分利用 CockroachDB 的扩展能力\n\n在本节中，我们将创建一个小型节点集群，并执行以下集群范围的操作：\n\
  \n- 通过添加额外节点来扩展集群。\n- 升级 CockroachDB 的版本。\n- 将集群迁移到新节点。\n\n我们将从扩展集群开始。如果你的 CockroachDB\
  \ 部署是通过 Cockroach Cloud 运行的，这种场景会由平台处理；所有集群扩展都是自动的。如果你的集群托管在 Kubernetes 中，则操作非常简单：\n\
  \n```yaml\napiVersion: apps/v1\nkind: StatefulSet\nmetadata:\n  name: cockroachdb\n\
  spec:\n  serviceName: \"cockroachdb\"\n  replicas: 3 *# => 5*\n  ...\n```\n\n对于本章的示例，我们将手动启动一个集群，以便完全控制每个节点。让我们从三个独立的命令行终端会话中启动三个节点开始，然后用第四个终端进行初始化。请注意，在此示例中我使用了不同的端口和存储，因为集群是运行在一台机器上的。\n\
  \n实际上，这个集群将运行在多台机器上，因此节点启动命令之间的唯一区别将是加入地址：\n\n```bash\n$ cockroach start \\\n--insecure\
  \ \\\n--store=node1 \\\n--listen-addr=localhost:26257 \\\n--http-addr=localhost:8080\
