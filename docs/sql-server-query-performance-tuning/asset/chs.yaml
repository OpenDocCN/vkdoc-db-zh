  即使返回的数据完全相同且查询语句完全一致，当统计信息过时时，逻辑读取次数和 CPU 利用率也显著更高。因此，建议保持自动更新统计信息功能开启。保持统计信息更新的益处超过了执行更新的成本。在结束本节之前，请将
