  ## 第 15 章 ■ 执行计划缓存行为


  由于这些不是参数化查询，因此创建了两个不同的计划；它们过于复杂，无法被视为简单参数化，而强制参数化是关闭的。这两个计划具有相同的哈希值，因为它们仅在传递的值上有所不同。大小写的差异对于查询哈希或查询计划哈希值没有影响。然而，如果你在
  `queryhash` 中更改了 SELECT 条件，那么将从 `sys.dm_exec_query_stats` 中检索到的值如图 15-23 所示，查询也会发生变化。


  ```sql

  SELECT p.ProductID

  FROM Production.Product AS p

  JOIN Production.ProductSubcategory AS ps

  ON p.ProductSubcategoryID = ps.ProductSubcategoryID

  JOIN Production.ProductCategory AS pc

  ON ps.ProductCategoryID = pc.ProductCategoryID

  WHERE pc.[Name] = ''Bikes''

  AND ps.[Name] = ''Touring Bikes'';

  ```


  **图 15-23.** `sys.dm_exec_query_stats` 显示不同的哈希值


  尽管查询的基本结构相同，但返回列的更改足以改变查询哈希值和查询计划哈希值。


  由于数据分布和索引的差异可能导致相同的查询产生两个不同的计划，`query_hash` 可能相同，而 `query_plan_hash` 可能不同。为了说明这一点，请执行两个新的查询。


  ```sql

  SELECT p.[Name],

  tha.TransactionDate,

  tha.TransactionType,

  tha.Quantity,

  tha.ActualCost

  FROM Production.TransactionHistoryArchive tha

