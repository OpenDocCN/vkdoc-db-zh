  \n## 内存中索引\n\n一个内存中表上最多可以同时创建八个索引。但是，每个内存优化表必须至少有一个索引。由主键定义的索引也算在内。一个持久化表必须有一个主键。\n\
  \n您可以创建两种基本索引类型：之前使用的非聚集哈希索引和非聚集索引。但这些索引并非与标准表一起创建的索引类型。首先，它们以内存中表相同的方式维护在内存中。其次，索引的持久性规则与内存中表相同。\n\
  \n### 哈希索引\n\n\n\n哈希索引并非仅仅是存储在内存中的平衡树索引。相反，哈希索引使用预定义的哈希桶（或表）以及键的哈希值，来提供一种检索表数据的机制。SQL\
  \ Server 有一个哈希函数，对于给定的输入，该函数总是会产生一个恒定的哈希值。这意味着对于一个给定的键值，你总是会得到相同的哈希值。你可以在哈希桶中存储多个哈希值副本。使用哈希值来执行点查找（检索单行）是一种极其高效的操作，**前提是**你不会遇到大量的哈希冲突。哈希冲突发生在多个值存储在同一个位置时。\n\
  \n这意味着，正确设置哈希索引的关键在于确保值在各个桶之间**正确分布**。这通过为索引定义桶计数来实现。对于我创建的第一张表 `dbo.Address`，我将桶计数设置为\
  \ 50,000。目前表中有一万九千行数据。因此，通过设置 50,000 的桶计数，我确保了有足够的存储空间来容纳现有的值集，并提供了充足的增量空间。你需要设置一个足够大但又不过大的桶计数。如果桶计数过小，你将在一个桶内存储大量数据，这会严重影响系统高效检索数据的能力。简而言之，**宁可让桶过大，也不要让它太小**。如果你查看图\
  \ 23-4，你可以从另一个角度看到这一点。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-487_1.png)\n\
  \n## 第 23 章 ■ 内存优化 OLTP 表与过程\n\n### 图 23-4. 大量桶与少量桶中的哈希值分布\n\n第一组桶呈现出所谓的*浅分布*，即少量哈希值分布于大量桶中。这是一种更优的存储方案。正如你所看到的，某些桶可能是空的，但由于每个桶只包含一个值，查找速度很快。第二组桶显示了较小的桶计数，或称为*深分布*。这意味着在给定的桶中有更多的哈希值，需要在桶内进行扫描才能识别出各个哈希值。\n\
  \n微软对于桶计数的建议是设置为表行数的一到两倍。但是，由于你无法修改内存表，因此还需要考虑**预期的增长**。\n\n如果你认为你的内存表在未来三到六个月内可能会增长到原来的三倍，你可能需要扩大桶计数。桶计数过大唯一会遇到的问题是扫描操作会耗时更长，因此你会分配更多的内存。但是，如果你的查询很可能导致扫描操作，那么你真的不应该使用非聚集哈希索引，而应直接使用非聚集索引。\n\
  \n你还需要关注每个哈希值可能返回的值的数量。唯一索引和主键是使用哈希索引的主要候选对象，因为它们始终是唯一的。微软的建议是，如果平均每个哈希值会对应超过五个值，你就应该放弃非聚集哈希索引，转而使用非聚集索引。这是因为哈希桶仅仅充当指向存储在该桶中第一个行的指针。然后，如果桶中存储了重复或额外的值，第一行会指向第二行，每一后续行依次指向其后的行。这会将点查找操作转变为扫描操作，再次严重损害性能。这就是为什么哈希索引最适合用于重复项很少（少于五个）或值唯一的情况。\n\
  \n要查看哈希表中索引的分布情况，可以使用 `sys.dm_db_xtp_hash_index_stats`。\n\n```\nSELECT i.name AS\
  \ 'index name',\n\nhs.total_bucket_count,\n\nhs.empty_bucket_count,\n\nhs.avg_chain_length,\n\
  \nhs.max_chain_length\n```\n\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-488_1.jpg)\n\n## 第 23 章 ■ 内存优化的 OLTP 表和过程\n\n```sql\nFROM sys.dm_db_xtp_hash_index_stats\
  \ AS hs\nJOIN sys.indexes AS i\n  ON hs.object_id = i.object_id AND hs.index_id\
  \ = i.index_id\nWHERE OBJECT_NAME(hs.object_id) = 'Address';\n```\n\n图 23-5 显示了此查询的结果。\n\
  \n**图 23-5.** 查询 `sys.dm_db_xtp_hash_index_stats` 的结果\n\n由此，你可以看到一些关于哈希索引如何创建和维护的有趣事实。你会注意到总存储桶数并非我设置的值\
  \ `50,000`。存储桶数被向上舍入到最接近的下一个 2 的幂，在本例中是 `65,536`。有 `48,652` 个空存储桶。由于这是唯一索引，平均链长度值为\
  \ `1`，因为值是唯一的。存在一些链值是因为当行被修改或更新时，会存储数据版本，直到所有问题都得到解决。\n\n### 非聚集索引\n\n非聚集索引基本上就像常规索引一样，只是它们与数据一起存储在内存中以协助数据检索。它们也有指向数据存储位置的指针，类似于非聚集索引在堆表上的行为。内存中的非聚集索引与标准非聚集索引之间一个有趣的区别是，SQL\
  \ Server 无法从内存索引中按相反顺序检索数据。\n\n其他行为似乎与标准索引大致相同。\n\n为了看看非聚集索引的实际效果，我们使用这个查询：\n\n\
  ```sql\nSELECT a.AddressLine1,\n    a.City,\n    a.PostalCode,\n    sp.Name AS StateProvinceName,\n\
  \    cr.Name AS CountryName\nFROM dbo.Address AS a\nJOIN dbo.StateProvince AS sp\n\
  \    ON sp.StateProvinceID = a.StateProvinceID\nJOIN dbo.CountryRegion AS cr\n \
  \   ON cr.CountryRegionCode = sp.CountryRegionCode\nWHERE a.City = 'Walla Walla';\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-489_1.png)\n\
  \n## 第 23 章 ■ 内存优化的 OLTP 表和过程\n\n目前的性能表现如下：\n\n```\nTable 'CountryRegion'. Scan\
  \ count 1, logical reads 4\nCPU time = 16 ms, elapsed time = 118 ms.\n```\n\n图 23-6\
  \ 显示了执行计划。\n\n**图 23-6.** 导致表扫描的执行计划\n\n虽然内存表扫描肯定比磁盘上存储的表的相同扫描要快，但这仍然不是一种好的情况。另外，考虑到优化器为了满足其认为需要的\
  \ `Merge Join` 而产生的额外工作，即 `Filter` 操作和 `Sort` 操作，这是一个有问题的查询。因此，你应该为该表添加索引以加快速度。\n\
  \n但是，你不能直接在 `dbo.Address` 表上运行 `CREATE INDEX`。相反，你必须删除该表，重新创建它，然后用数据重新加载它。现在的表创建脚本如下所示：\n\
  \n```sql\nCREATE TABLE dbo.Address(\n    AddressID int IDENTITY(1,1) NOT NULL PRIMARY\
  \ KEY NONCLUSTERED HASH WITH (BUCKET_COUNT=50000),\n    AddressLine1 nvarchar(60)\
  \ NOT NULL,\n    AddressLine2 nvarchar(60) NULL,\n    City nvarchar(30) COLLATE\
  \ Latin1_General_100_BIN2 NOT NULL,\n    StateProvinceID int NOT NULL,\n    PostalCode\
  \ nvarchar(15) NOT NULL,\n    ModifiedDate datetime NOT NULL CONSTRAINT DF_Address_ModifiedDate\
  \ DEFAULT (getdate()),\n    INDEX nci NONCLUSTERED (City)\n) WITH (MEMORY_OPTIMIZED=ON);\n\
  ```\n\n请注意，我不得不为 `City` 列添加一个排序规则才能创建索引。这是因为内存数据库中字符列上的索引只支持 `*_BIN2` 排序规则。你或者需要更改整个数据库的排序规则，或者像我之前那样在局部设置排序规则。\n\
  \n将数据重新加载到新创建的表后，你可以再次尝试查询。这次在我的系统上它运行了 `15ms`，比之前快得多。图 23-7 显示了执行计划。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-490_1.jpg)\n\n![](img/index-490_2.jpg)\n\n## 第 23 章 ■ 内存优化的 OLTP\
  \ 表和过程\n\n\n\n**图 23-7.**`一个利用非聚集索引改进后的执行计划`\n正如你所见，非聚集索引被用来替代表扫描以提升性能，其效果与标准表上的索引如出一辙。然而，与标准表不同的是，尽管此查询确实检索了非聚集索引未包含的列，却无需通过键查找来从内存表中获取数据，因为每个索引都直接指向内存中所需数据的存储位置。这是对标准表行为的又一个虽小但重要的改进。\n\
  \n### 索引维护\n\n与标准表相比，内存表上的索引创建方式存在许多根本性的差异。但索引维护仍然是你必须考虑的事项。内存索引会维护统计信息，这些信息需要更新。你还需要获取有关内存索引的信息，例如它们是通过扫描还是查找来访问的。虽然追踪所有这些信息的动机是相同的，但实现的机制却不同。\n\
  \n你实际上无法查看内存索引的统计信息。你可以对索引运行 `DBCC SHOW_STATISTICS`，但输出结果如图 23-8 所示。\n\n**图 23-8.**`内存索引统计信息的空输出`\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 23 章 ■ 内存优化 OLTP 表与存储过程\n\
  \n这意味着没有办法查看内存索引的统计信息。然而，随着数据的变化，这些统计信息仍然会过时。更重要的是，无论你的系统设置如何，它们都不会随数据更改而自动更新。因此，你必须计划手动运行更新。你可以使用\
  \ `sp_updatestats`。\n\n2014 版本的该存储过程完全知晓内存索引及其差异。你也可以使用 `UPDATE STATISTICS`，但必须配合\
  \ `FULLSCAN` 或 `RESAMPLE` 以及 `NORECOMPUTE` 选项，如下所示：\n```sql\nUPDATE STATISTICS dbo.Address\
  \ WITH FULLSCAN, NORECOMPUTE;\n```\n\n如果不使用此语法，系统会认为你试图修改内存表上的统计信息，而这是不允许的。你会看到一个相当明确的错误提示。\n\
  ```text\nMsg 41346, Level 16, State 2, Line 1\nCREATE and UPDATE STATISTICS for\
  \ memory optimized tables requires the WITH FULLSCAN or RESAMPLE and the NORECOMPUTE\
  \ options. The WHERE clause is not supported.\n```\n\n通过将采样定义为 `FULLSCAN` 或 `RESAMPLE`，然后使用\
  \ `NORECOMPUTE` 明确表示你并非试图启用自动更新，统计信息就将得以更新。你需要根据数据的易变性来制定定期更新的计划，但目前尚无明确方法来观察统计信息本身。\n\
  \n内存索引不是从磁盘访问的，因此你无需担心这些索引的碎片问题，也无需对它们进行碎片整理。\n\n## 本地编译存储过程\n\n仅仅将表放入内存并通过乐观并发方式大幅减少锁争用，就能带来相当可观的性能提升。但要真正让系统飞速运行，你还可以实现一项新功能：将存储过程编译为在\
  \ SQL Server 可执行文件内运行的 `DLL`。\n\n这确实能让性能飙升。语法很简单。以下是如何将之前的查询进行编译：\n```sql\nCREATE\
  \ PROC dbo.AddressDetails @City NVARCHAR(30)\nWITH NATIVE_COMPILATION,\n     SCHEMABINDING,\n\
  \     EXECUTE AS OWNER\nAS\nBEGIN ATOMIC\nWITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT,\
  \ LANGUAGE = N'us_english')\n    SELECT a.AddressLine1,\n           a.City,\n  \
  \         a.PostalCode,\n           sp.Name AS StateProvinceName,\n           cr.Name\
  \ AS CountryName\n    FROM dbo.Address AS a\n    JOIN dbo.StateProvince AS sp\n\
  \        ON sp.StateProvinceID = a.StateProvinceID\n    JOIN dbo.CountryRegion AS\
  \ cr\n        ON cr.CountryRegionCode = sp.CountryRegionCode\n    WHERE a.City =\
  \ @City;\nEND\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-492_1.jpg)\n\
  \n\n"
- '# 第 23 章 ■ 内存优化 OLTP 表与存储过程


  遗憾的是，如果您尝试按当前定义运行此查询，将收到以下错误：`错误号 10775，级别 16，状态 1，过程 AddressDetails，行 5530`


  `对象 ''dbo.CountryRegion'' 不是内存优化表，无法从本地编译存储过程访问。`


  虽然您可以查询内存中表与标准表的混合组合，但只能针对内存中表创建本地编译存储过程。我将使用前述方法将 `dbo.CountryRegion` 表加载到内存中，然后再次运行脚本。此次它将成功编译。如果您随后像之前一样使用
  `@City = ''Walla Walla''` 执行查询，其执行时间在 `SSMS` 中甚至不会显示出来。


  您必须通过扩展事件捕获该事件，如图 23-9 所示。


  **图 23-9.** 显示本地编译存储过程执行时间的扩展事件


  那里的执行时间单位不是毫秒而是微秒。因此，查询执行时间已从原始运行的 `154ms` 减少到内存中运行的 `15ms`，最终降至小于 1/2 毫秒。


  这是一个相当显著的性能提升。


  但是，存在限制条件。如前所述，您必须仅引用内存中的表。


  分配给存储过程的参数值不能接受 `NULL` 值。如果您选择将参数设置为 `NOT NULL`，则必须同时提供初始值。否则，所有参数都是必需的。您必须强制实施与基础表的架构绑定。最后，存储过程需要存在于一个
  `ATOMIC` 块中。原子块要求事务中的所有语句都成功，否则事务内的所有语句都将被回滚。


  关于本地编译存储过程还有另外几个有趣之处。您只能检索估算的执行计划，而无法获取实际执行计划。如果您在 `SSMS` 中开启实际执行计划然后执行查询，不会显示任何内容。但是，如果您请求估算执行计划，则可以检索到一个。图
  23-10 显示了先前创建的存储过程的估算计划。


  **图 23-10.** 本地编译存储过程的估算执行计划


  您会注意到它看起来与常规执行计划大体相似，但幕后存在许多差异。如果单击 `SELECT` 操作符，其属性远没有那么多。将之前展示的编译存储过程的两组数据与图 23-11
  中先前运行的常规查询的属性进行比较。


  **图 23-11.** 两种不同执行计划中的 SELECT 操作符属性


  您期望看到的许多信息都消失了，因为本地编译存储过程的运行方式与其他查询不同。使用执行计划来确定这些查询的行为在此处与标准查询中一样有价值，但其内部机制将会不同。


  ## 建议


  虽然内存中表和本地编译存储过程可以在 `SQL Server` 内带来性能的显著提升，但您仍然需要评估在您的情况下是否值得使用它们。这些新对象行为上的限制意味着它们并非在所有情况下都适用。此外，由于对硬件的要求以及需要企业级
  `SQL Server` 安装，许多人将无法实现这些新对象及其行为。要确定您的工作负载是否适合使用这些新对象，您可以采取若干措施。


