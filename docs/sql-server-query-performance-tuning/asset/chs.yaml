- '# 第七章：分析查询性能


  上一章展示了如何收集查询性能指标。本章将展示如何利用这些指标来识别运行时间长或频繁调用的查询。然后，我将介绍 Management Studio 内置的工具，以便你能够理解给定查询的性能表现。我还将花大量时间讨论如何使用执行计划，这是深入了解查询优化器决策的最佳途径。


  在本章中，我将涵盖以下主题：


  *   如何使用 Management Studio 分析高开销 SQL 查询的处理策略

  *   如何分析 SQL 查询的查询优化器所使用的方法

  *   如何使用 SQL 实用工具度量 SQL 查询的开销


  ## 高开销查询


  既然你已经看到了两种收集查询性能指标的不同方法，现在让我们看看这些数据代表什么：高开销查询本身。当 SQL Server 的性能变差时，很可能正在发生几件事。


  *   首先，某些查询对系统资源造成高压。这些查询会影响整个系统的性能，因为服务器无法足够快地服务其他 SQL 查询。

  *   此外，高开销查询会阻塞所有请求相同数据库资源的其他查询，进一步降低那些查询的性能。优化高开销查询不仅可以提高它们自身的性能，还可以通过减少数据库阻塞和对
  SQL Server 资源的压力来提高其他查询的性能。

  *   最后，一个本身开销不大的查询可能每分钟被调用数千次，仅仅由于次优代码的简单累积，就可能导致主要的资源瓶颈。


  要开始确定你需要花时间处理哪些查询，你将使用我到目前为止谈到的资源。例如，假设查询在缓存中，你将能够使用 `DMO` 来整合有意义的数据以确定开销最高的查询。或者，因为你已经使用
  `Extended Events` 捕获了查询，你可以访问该数据作为识别开销最高查询的手段。


  [www.it-ebooks.info](http://www.it-ebooks.info/)




  '
- "# 第 7 章 ■ 分析查询性能\n\n关于扩展事件（Extended Events）数据的一个小提示：如果数据要收集到文件中，那么之后你需要将数据加载到表中，或者直接对其进行查询。你可以通过使用这个系统函数查询扩展事件文件来直接读取：\n\
  \n```sql\nSELECT *\nFROM sys.fn_xe_file_target_read_file('C:\\Sessions\\QueryPerformanceMetrics*.xel',\n\
  NULL, NULL, NULL);\n```\n\n该查询将每个事件作为单行返回。关于事件的数据存储在 XML 列 `event_data` 中。\n\n你需要使用\
  \ `XQuery` 来直接读取数据，但一旦读取，你就可以对捕获的数据进行搜索、排序和聚合。在下一节中，我将带你逐步完成这个机制的完整示例。\n\n### 识别高成本查询\n\
  \nSQL Server 的目标是在最短时间内将结果集返回给用户。为此，SQL Server 内置了一个基于成本的优化器，称为**查询优化器**，它会生成一个成本效益高的策略，称为**查询执行计划**。查询优化器会权衡许多因素，包括（但不限于）执行查询所需的\
  \ CPU、内存和磁盘 I/O 的使用情况，这些数据来源于各种渠道，例如索引维护的或动态生成的统计数据、数据约束，以及对查询运行系统的一些了解，如 CPU 数量和内存量。根据所有这些信息，优化器创建一个成本效益高的执行计划。\n\
  \n在会话返回的数据中，`cpu_time` 和 `logical_reads` 或 `physical_reads` 字段也显示了查询在哪些方面成本较高。`cpu_time`\
  \ 字段表示执行查询所使用的 CPU 时间。两个读取字段表示查询操作的页面（大小为 8KB）数量，从而表明查询引起的内存或 I/O 压力。它也表明了磁盘压力，因为对于操作查询，内存页面在首次访问数据时需要被填充，在内存瓶颈时需要换出到磁盘。查询的\
  \ `logical_reads` 数量越高，可能对磁盘造成的压力就越大。过多的逻辑页面也会增加 CPU 在管理这些页面上的负载。这不是一个自动的关联。你不能总是指望读取次数最多的查询就是性能最差的。但这是一个通用指标，也是一个良好的起点。尽管最小化\
  \ I/O 次数并不是成本效益高计划的必然要求，但你通常会发现成本最低的计划通常具有最少的 I/O，因为 I/O 操作是昂贵的。\n\n导致大量逻辑读取的查询通常会对相应的大量数据集获取锁。即使读取（相对于写入）也可能需要根据隔离级别对所有数据获取共享锁。\n\
  \n这些查询会阻塞所有其他出于修改目的（而非读取）而请求此数据（或部分数据）的查询。由于这些查询本身成本高昂且执行时间长，它们会长时间阻塞其他查询。被阻塞的查询接着又会阻塞进一步的查询，在数据库中引入一连串的阻塞。（第\
  \ 13 章将介绍锁模式。）\n\n因此，识别出高成本查询并首先优化它们是有意义的，从而做到以下几点：\n\n- 提升高成本查询本身的性能\n- 降低对系统资源的整体压力\n\
  - 减少数据库阻塞\n\n高成本查询可分为以下两种类型：\n\n- **单次执行**：查询的单次执行成本很高。\n- **多次执行**：查询本身可能成本不高，但重复执行该查询会对系统资源造成压力。\n\
  \n你可以使用不同的方法来识别这两种类型的高成本查询，如下节所述。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 单次执行的高成本查询\n\n你可以通过分析会话输出文件或查询 `sys.dm_exec_query_stats` 来识别高成本查询。在这个例子中，我们将从识别执行大量逻辑读取的查询开始，因此你应该按\
  \ `logical_reads` 数据列对会话输出进行排序。你可以更改排序方式，按持续时间或 CPU 排序，甚至以有趣的方式组合它们。你可以通过以下步骤访问会话信息：\n\
  \n1.  捕获一个包含典型工作负载的会话。\n2.  将会话输出保存到文件。\n3.  使用“文件”->“打开”打开文件，并选择一个 `.xel` 文件以使用数据浏览器窗口。在那里对信息进行排序。\n\
  4.  或者，你可以查询跟踪文件进行分析，按 `logical_reads` 字段排序。\n\n```sql\nWITH xEvents\nAS (SELECT\
  \ object_name AS xEventName,\n           CAST (event_data AS XML) AS xEventData\n\
  \    FROM sys.fn_xe_file_target_read_file('C:\\Sessions\\QueryPerformanceMetrics*.xel',\
  \ NULL, NULL, NULL)\n)\nSELECT xEventName,\n       xEventData.value('(/event/data[@name=''duration'']/value)[1]',\
  \ 'bigint') Duration,\n       xEventData.value('(/event/data[@name=''physical_reads'']/value)[1]',\
  \ 'bigint') PhysicalReads,\n       xEventData.value('(/event/data[@name=''logical_reads'']/value)[1]',\
  \ 'bigint') LogicalReads,\n       xEventData.value('(/event/data[@name=''cpu_time'']/value)[1]',\
  \ 'bigint') CpuTime,\n       CASE xEventName\n            WHEN 'sql_batch_completed'\n\
  \            THEN xEventData.value('(/event/data[@name=''batch_text'']/value)[1]',\
  \ 'varchar(max)')\n            WHEN 'rpc_completed'\n            THEN xEventData.value('(/event/data[@name=''statement'']/value)[1]',\
  \ 'varchar(max)')\n       END AS SQLText,\n       xEventData.value('(/event/data[@name=''query_hash'']/value)[1]',\
  \ 'binary(8)') QueryHash\nINTO Session_Table\nFROM xEvents;\n\nSELECT st.xEventName,\n\
  \       st.Duration,\n       st.PhysicalReads,\n       st.LogicalReads,\n      \
  \ st.CpuTime,\n       st.SQLText,\n       st.QueryHash\nFROM Session_Table AS st\n\
  ORDER BY st.LogicalReads DESC;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n让我们稍微分解一下这个查询。首先，我创建了一个名为 `xEvents` 的公共表表达式（CTE）。我这样做只是因为它使代码更容易阅读。它并没有从根本上改变任何行为。当我需要从文件读取并转换数据类型时，我更喜欢这样做。这样我后续语句中的\
  \ XML 查询就更有意义了。请注意，我在读取文件时使用了通配符 `QueryPerformanceMetrics*.xel`。这使我能够读取扩展事件会话创建的所有滚动文件（更多细节见第\
  \ 6 章）。\n\n根据收集的数据量和文件的大小，直接对从扩展事件收集的文件运行查询可能会异常缓慢。在这种情况下，请使用相同的基本函数 `sys.fn_xe_file_target_read_file`\
  \ 将数据加载到表中，而不是直接查询。完成后，你可以对表应用索引以加快查询速度。我使用前面的脚本将数据放入一个表中，然后查询该表以获取输出。这对于测试来说效果很好，但对于更永久的解决方案，你会希望有一个专门的数据库来存储此类数据，表结构要适当，而不是像我这里使用\
  \ `INTO` 这样的快捷方式。\n\n在某些情况下，你可能从系统监视器输出中识别出 CPU 存在巨大压力。对 CPU 的压力可能是由于大量 CPU 密集型操作造成的，例如存储过程重新编译、聚合函数、数据排序、哈希连接等。在这种情况下，你应该按\
  \ `cpu_time` 字段对会话输出进行排序，以识别那些占用大量处理器周期的查询。\n\n### 多次执行的高成本查询\n\n\n\n正如我之前提到的，有时单个查询本身可能成本不高，但多次执行同一查询的累积效应可能会给系统资源带来压力。在这种情况下，按\
  \ `logical_reads` 字段排序无法帮助你识别这类成本较高的查询。你真正需要知道的是该查询多次执行所产生的总读取次数、总 CPU 时间或累计持续时间。\n\
  \n*   查询会话输出，并按你感兴趣的某些值进行分组。\n*   访问 `sys.dm_exec_query_stats` DMO（动态管理对象），从生产服务器检索信息。这假设你处理的是近期发生或不依赖于已知历史记录的问题，因为此数据仅来自当前存储在过程缓存中的内容。\n\
  \n但如果你需要准确的历史数据视图，可以查阅通过扩展事件收集的指标。一旦会话数据被导入到数据库表中，就可以执行 `SELECT` 语句来查找同一查询多次执行的总读取次数，如下所示：\n\
  \n```sql\nSELECT COUNT(*) AS TotalExecutions,\nst.xEventName,\nst.SQLText,\nSUM(st.Duration)\
  \ AS DurationTotal,\nSUM(st.CpuTime) AS CpuTotal,\nSUM(st.LogicalReads) AS LogicalReadTotal,\n\
  SUM(st.PhysicalReads) AS PhysicalReadTotal\nFROM Session_Table AS st\nGROUP BY st.xEventName,\
  \ st.SQLText\nORDER BY LogicalReadTotal DESC;\n```\n\n前面脚本中的 `TotalExecutions` 列表示查询执行的次数。\n\
  \n`LogicalReadTotal` 列表示该查询多次执行所执行的逻辑读取总数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 查询性能分析\n\n通过此方法识别出的成本较高的查询，比通过会话识别出的单次执行成本较高的查询，更能准确反映负载情况。例如，一个需要 50\
  \ 次读取的查询可能被执行了 1,000 次。单次查询本身可能被认为足够“廉价”，但该查询执行的总读取次数结果为 50,000 (`=50 * 1,000`)，这就不能被认为是廉价的了。优化此查询，即使每次执行减少\
  \ 10 次读取，也能使总读取次数减少 10,000 (`=10 * 1,000`)，这可能比优化一个单次执行需要 5,000 次读取的查询更有益。\n\n这种方法的问题在于，大多数查询的\
  \ `WHERE` 子句中会有一组不同的条件，或者过程调用会传入不同的参数值。这使得仅按带参数的查询或过程进行简单分组变得不可能。你可以采用多种方法来处理这个问题。既然你已经使用了扩展事件，实际上可以利用它来为你服务。例如，`rpc_completed`\
  \ 事件会捕获过程名作为一个字段。你可以直接按该字段分组。对于批处理，你可以添加 `query_hash` 字段，然后按其分组。另一种方法是清理数据，移除参数值，正如微软开发者网络（MSDN）上所述：[`bit.ly/1e1I38f`](http://bit.ly/1e1I38f)。虽然最初是为\
  \ SQL Server 2005 编写的，但其概念在 SQL Server 2014 中同样适用。\n\n要从 `sys.dm_exec_query_stats`\
  \ 视图中获取相同的信息，只需针对该 DMV 进行查询即可。\n\n```sql\nSELECT s.totalexecutioncount,\nt.text,\n\
  s.TotalExecutionCount,\ns.TotalElapsedTime,\ns.TotalLogicalReads,\ns.TotalPhysicalReads\n\
  FROM (SELECT deqs.plan_handle,\nSUM(deqs.execution_count) AS TotalExecutionCount,\n\
  SUM(deqs.total_elapsed_time) AS TotalElapsedTime,\nSUM(deqs.total_logical_reads)\
  \ AS TotalLogicalReads,\nSUM(deqs.total_physical_reads) AS TotalPhysicalReads\n\
  FROM sys.dm_exec_query_stats AS deqs\nGROUP BY deqs.plan_handle\n) AS s\nCROSS APPLY\
  \ sys.dm_exec_sql_text(s.plan_handle) AS t\nORDER BY s.TotalLogicalReads DESC ;\n\
  ```\n\n另一种利用执行 DMOs 中可用数据的方法是使用 `query_hash` 和 `query_plan_hash` 作为聚合机制。尽管一个给定的存储过程或参数化查询可能传入不同的值，但它们的\
  \ `query_hash` 和 `query_plan_hash` 在大多数情况下是相同的。\n\n这意味着你可以根据这些哈希值进行聚合，以识别那些原本无法看到的通用计划或通用查询模式。以下只是对前一个查询的轻微修改：\n\
  \n```sql\nSELECT s.TotalExecutionCount,\nt.text,\ns.TotalExecutionCount,\ns.TotalElapsedTime,\n\
  s.TotalLogicalReads,\ns.TotalPhysicalReads\nFROM (SELECT deqs.query_plan_hash,\n\
  SUM(deqs.execution_count) AS TotalExecutionCount,\nSUM(deqs.total_elapsed_time)\
  \ AS TotalElapsedTime,\nSUM(deqs.total_logical_reads) AS TotalLogicalReads,\nSUM(deqs.total_physical_reads)\
  \ AS TotalPhysicalReads\nFROM sys.dm_exec_query_stats AS deqs\nGROUP BY deqs.query_plan_hash\n\
  ) AS s\nCROSS APPLY (SELECT plan_handle\nFROM sys.dm_exec_query_stats AS deqs\n\
  WHERE s.query_plan_hash = deqs.query_plan_hash\n) AS p\nCROSS APPLY sys.dm_exec_sql_text(p.plan_handle)\
  \ AS t\nORDER BY TotalLogicalReads DESC;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 查询性能分析\n\n这种方法比收集会话数据所需的所有工作要容易得多，以至于让人疑惑为什么还要使用扩展事件。主要原因是精确性。`sys.dm_exec_query_stats`\
  \ 视图是针对某个特定计划在内存中存在期间的运行时聚合。而扩展事件会话则是在你运行它的任意时间范围内的历史跟踪。你甚至可以将会话结果添加到数据库中。拥有这样一个数据列表，你可以更精确地生成关于事件的总计，而不是仅仅依赖于某个特定时间点。但要理解，大量的性能问题故障排查都聚焦于服务器近期发生的情况，由于\
  \ `sys.dm_exec_query_stats` 基于缓存，该 DMV 通常代表了系统近期的状况，因此 `sys.dm_exec_query_stats`\
  \ 极其重要。但是，如果你处理的是“现在到底是什么运行得慢”这种更具战术性的情况，你会使用 `sys.dm_exec_requests`。\n\n### 识别运行缓慢的查询\n\
  \n因为用户的体验深受其请求响应时间的影响，所以你应该定期监控传入 SQL 查询的执行时间，找出运行缓慢查询的响应时间，创建一个查询性能基线。如果运行缓慢查询的响应时间（或持续时间）变得无法接受，那么你就应该分析性能下降的原因。不过，并非每个性能低下的查询都是由资源问题引起的。\n\
  \n其他问题，如阻塞，也可能导致查询性能下降。阻塞将在第 12 章中详细讨论。\n\n要识别运行缓慢的查询，只需更改针对会话数据的查询，改变排序依据，如下所示：\n\
  \n```sql\nWITH xEvents AS\n(SELECT object_name AS xEventName,\nCAST (event_data\
  \ AS xml) AS xEventData\nFROM sys.fn_xe_file_target_read_file\n('C:\\Sessions\\\
  QueryPerformanceMetrics*.xel', NULL, NULL, NULL)\n)\nSELECT\nxEventName,\nxEventData.value('(/event/data[@name=''duration'']/value)[1]','bigint')\
  \ Duration,\nxEventData.value('(/event/data[@name=''physical_reads'']/value)[1]','bigint')\
  \ PhysicalReads,\nxEventData.value('(/event/data[@name=''logical_reads'']/value)[1]','bigint')\
  \ LogicalReads,\nxEventData.value('(/event/data[@name=''cpu_time'']/value)[1]','bigint')\
  \ CpuTime,\nxEventData.value('(/event/data[@name=''batch_text'']/value)[1]','varchar(max)')\
  \ BatchText,\nxEventData.value('(/event/data[@name=''statement'']/value)[1]','varchar(max)')\
  \ StatementText,\nxEventData.value('(/event/data[@name=''query_plan_hash'']/value)[1]','binary(8)')\
  \ QueryPlanHash\nFROM xEvents\nORDER BY Duration DESC;\n```\n\n\n\n对于运行缓慢的系统，你应在优化过程前后记录慢速查询的耗时。应用优化技术后，你需要评估其对系统的整体影响。有可能你的优化步骤会对其他查询产生负面影响，导致它们变得更慢。\n\
  \n`[www.it-ebooks.info](http://www.it-ebooks.info/)`\n\n## 第 7 章 ■ 分析查询性能\n\n##\
  \ 执行计划\n\n一旦识别出代价高昂的查询，你需要找出其代价高昂的`原因`。你可以从`扩展事件`或`sys.dm_exec_procedure_stats`中识别出代价高昂的过程，在`Management\
  \ Studio`中重新运行它，并查看`查询优化器`所使用的`执行计划`。`执行计划`显示了`查询优化器`用来执行查询的处理策略（包括多个中间步骤）。\n\n\
  为了创建`执行计划`，`查询优化器`会评估各种索引和连接策略的排列组合。\n\n由于存在大量潜在计划的可能性，这个优化过程可能需要很长时间才能生成最具成本效益的`执行计划`。为了防止对`执行计划`进行过度优化，优化过程被分为多个阶段。每个阶段是一套转换规则，用于评估各种索引和连接策略的排列组合，最终目标是找到一个足够好的计划，而非一个完美的计划。\n\
  \n正是这种“足够好”与“完美”之间的差异，可能导致因`执行计划`优化不足而性能低下。`查询优化器`在直接采用当前成本最低的计划之前，只会尝试有限次数的优化。\n\
  \n完成一个阶段后，`查询优化器`会检查所得计划的估计成本。如果`查询优化器`确定该计划足够“便宜”，它就会使用该计划，而不再进行后续的优化阶段。然而，如果计划不够“便宜”，优化器将进入下一个优化阶段。我将在第\
  \ 9 章更深入地探讨`执行计划`的生成。\n\nSQL Server 以多种形式和两种不同类型显示查询`执行计划`。在 SQL Server 2012 中，最常用的形式是`图形化执行计划`和`XML\
  \ 执行计划`。实际上，`图形化执行计划`只是为屏幕显示而解析的`XML 执行计划`。两种`执行计划`类型分别是`估计执行计划`和`实际执行计划`。`估计`计划代表来自`查询优化器`的结果，而`实际`计划是同一计划外加一些运行时指标。`估计执行计划`的优点在于它不需要执行查询。这些类型生成的计划可能不同，但仅当执行期间发生语句级重编译时才会如此。大多数情况下，两种类型的计划是相同的。主要区别在于`实际执行计划`中包含了一些`估计执行计划`中没有的执行统计信息。\n\
  \n`图形化执行计划`使用图标来表示查询的处理策略。要获取`图形化估计执行计划`，请选择“查询”->“显示估计的执行计划”。`XML 执行计划`包含与`图形化计划`相同的数据，但以更便于编程访问的格式呈现。此外，借助\
  \ SQL Server 的 XQuery 功能，可以像查询表一样查询`XML 执行计划`。`XML 执行计划`通过 `SET SHOWPLAN_XML` 语句生成`估计计划`，通过\
  \ `SET STATISTICS XML` 语句生成`实际执行计划`。你也可以右键单击`图形化执行计划`并选择“显示执行计划 XML”。你还可以使用 DMO\
  \ `sys.dm_exec_query_plan` 直接从计划缓存中提取计划。缓存中存储的计划没有运行时信息，因此从技术上讲它们是`估计计划`。\n\n■ `注意`\
  \ 你应该确保数据库设置为 `兼容级别 120`，以便它能准确反映对 SQL Server 2014 的更新。\n\n\n"
- "# 第 7 章：分析查询性能\n\n### 分析查询执行计划\n\n你可以使用 `SET SHOWPLAN_XML` 命令来获取先前确定的代价最高的查询的估计\
  \ XML 执行计划，如下所示：\n\n```sql\nUSE AdventureWorks2012;\nGO\nSET SHOWPLAN_XML ON;\n\
  GO\nSELECT soh.AccountNumber,\nsod.LineTotal,\nsod.OrderQty,\nsod.UnitPrice,\np.Name\n\
  FROM Sales.SalesOrderHeader soh\nJOIN Sales.SalesOrderDetail sod\nON soh.SalesOrderID\
  \ = sod.SalesOrderID\nJOIN Production.Product p\nON sod.ProductID = p.ProductID\n\
  WHERE sod.LineTotal > 20000;\nGO\nSET SHOWPLAN_XML OFF;\nGO\n```\n\n运行此查询会产生一个指向执行计划的链接，而不是执行计划本身或任何数据。点击该链接将打开一个执行计划。虽然计划会以图形化计划的形式显示，但右键单击该计划并选择“显示执行计划\
  \ XML”将显示 XML 数据。图 7-1 显示了部分 XML 执行计划输出。\n\n![XML 执行计划输出](img/index-99_1.jpg)\n\n\
  ### 图 7-1：XML 执行计划输出\n\n让我们从上一个查询中确定的代价高昂的查询开始。将其（去掉 `SET SHOWPLAN_XML` 语句）复制到 SQL\
  \ Server Management Studio 中，并打开“包括实际执行计划”。现在，执行此查询时，你将看到图 7-2 中的执行计划。\n\n![查询执行计划](img/index-100_1.jpg)\n\
  \n### 图 7-2：查询执行计划\n\n执行计划显示了两种不同的信息流。从左侧读起，你可以看到逻辑流，从 `SELECT` 运算符开始，依次经过每个执行步骤。从右侧开始并以另一个方向读取的是信息的物理流，首先从\
  \ `Clustered Index Scan` 运算符拉取数据，然后进行到后续的每个步骤。大多数情况下，按照数据物理流的方向阅读更有利于理解执行计划中发生的事情，但并非总是如此。有时，理解执行计划中正在发生的唯一方法是按照逻辑处理顺序从左到右阅读它。每个步骤代表为获取查询的最终输出而执行的一个操作。执行计划所表示的查询执行的某些方面如下：\n\
  \n*   如果一个查询由一批多个查询组成，则每个查询的执行计划将按执行顺序显示。批处理中的每个执行计划都将有一个相对的估计成本，整个批处理的总成本为 100%。\n\
  *   执行计划中的每个图标代表一个运算符。它们各自都有一个相对的估计成本，执行计划中所有节点的总成本为 100%（尽管统计信息不准确，甚至 SQL Server\
  \ 中的错误都可能导致你看到超过 100% 的成本，但这并不常见）。\n*   通常，执行计划中的第一个物理运算符代表从数据库对象（表或索引）检索数据的机制。例如，在图\
  \ 7-2 的执行计划中，三个起点分别代表从 `SalesOrderHeader`、`SalesOrderDetail` 和 `Product` 表中进行的检索。\n\
  *   数据检索通常是表操作或索引操作。例如，在图 7-2 的执行计划中，所有三个数据检索步骤都是索引操作。\n*   索引上的数据检索要么是索引扫描，要么是索引查找。例如，在图\
  \ 7-2 中，你可以看到一个聚集索引扫描、一个聚集索引查找和一个索引扫描。\n*   索引上数据检索操作的命名约定是 `[表名].[索引名]`。\n*   计划的逻辑流是从左到右，就像阅读英文书籍一样。数据在运算符之间从右向左流动，并由运算符之间的连接箭头指示。\n\
  *   运算符之间连接箭头的粗细代表了传输行数的图形化表示。\n\n![执行计划详情](img/index-101_1.png)\n\n*   同一列中两个运算符之间的连接机制将是嵌套循环连接、哈希匹配连接或合并连接。例如，在图\
  \ 7-2 所示的执行计划中，有一个哈希连接和一个循环连接。（连接机制将在后面更详细地介绍。）\n*   将鼠标悬停在执行计划中的节点上会显示一个包含一些详细信息的弹出窗口。大多数情况下，工具提示用处不大。图\
  \ 7-3 显示了一个示例。\n\n### 图 7-3：来自执行计划运算符的工具提示窗口\n\n*   有关运算符的完整详细信息可在“属性”窗口中找到，如图 7-4\
  \ 所示，你可以通过右键单击运算符并选择“属性”来打开它。\n\n![选择运算符属性](img/index-102_1.jpg)\n\n### 图 7-4：选择运算符属性\n\
  \n*   运算符详细信息在顶部显示物理和逻辑操作类型。物理操作代表存储引擎实际使用的操作，而逻辑操作是优化器用于构建估计执行计划的构造。如果逻辑操作和物理操作相同，则只显示物理操作。它还显示其他有用的信息，例如行数、I/O\
  \ 成本、CPU 成本等。\n*   阅读许多运算符上的属性对于理解查询在 SQL Server 中的执行方式是必要的，以便更好地知道如何优化该查询。\n\n\
  ### 识别执行计划中代价高昂的步骤\n\n执行计划中最直接的方法是找出哪些步骤相对代价高昂。这些步骤是你查询优化的起点。你可以通过采用以下技术来选择起始步骤：\n\
  \n*   执行计划中的每个节点都显示其在整个执行计划中的相对估计成本，整个计划的总成本为 100%。因此，重点关注相对成本最高的节点。例如，图 7-2 中的执行计划有一个步骤的估计成本为\
  \ 59%。\n*   执行计划可能来自一批语句，因此你可能还需要找到代价最高的估计语句。在图 7-2 中，你可以在计划顶部看到文本“Query 1”。在批处理情况下，会有多个计划，并且它们将按在批处理中出现的顺序编号。\n\
  *   观察节点之间连接箭头的粗细。非常粗的连接箭头表示在相应节点之间传输了大量行。分析箭头左侧的节点，以了解为什么它需要这么多行。也要检查箭头的属性。你可能会看到估计行数与实际行数不同。这可能是由统计信息过时等原因造成的。如果你在计划的大部分地方看到粗箭头，而在末尾看到细箭头，则可能通过修改查询或索引，以便在计划中更早地进行过滤。\n\
  *   查找哈希连接操作。对于小型结果集，嵌套循环连接通常是首选的连接技术。本章后面你将了解更多关于哈希连接与嵌套循环连接的比较。请记住，哈希连接不一定坏，循环连接也不一定好。这确实取决于查询返回的数据量。\n\
  \n\n• 查找关键的键查找操作。针对大型结果集的查找操作可能导致大量随机读取。我将在第 11 章更详细地讨论关键查找。\n\n• 可能存在由某个操作符上的感叹号指示的警告，这些是需要立即关注的区域。这些问题可能由多种原因引起，包括缺少联接条件的联接，或者缺少统计信息的索引或表。通常，解决警告情况有助于提升性能。\n\
  \n• 查找执行排序操作的步骤。这表明数据未按正确的排序顺序检索。同样，这可能不是问题，但它指示了潜在的问题，可能是缺少或错误的索引。这里假设你没有`ORDER\
  \ BY`子句，该子句可能是排序操作的原因。\n\n• 注意可能给系统带来额外负载的额外操作符，例如表假脱机。它们可能是查询操作所必需的，也可能表明查询编写不当或索引设计糟糕。\n\
  \n• 并行查询执行的默认成本阈值是估计成本为 5，这个值非常低。注意不必要的并行操作。请记住，估计成本是查询优化器分配的、代表 CPU 和 I/O 数学模型的数字，并不是实际的度量值。\n\
  \n分析索引有效性\n\n为了进一步检查执行计划中的一个代价高昂的步骤，你应该分析相关表或索引的数据检索机制。首先，你应该检查索引操作是查找（`seek`）还是扫描（`scan`）。通常，为了获得最佳性能，你应该从表中检索尽可能少的行，而索引`seek`通常是访问少量行最有效的方式。`scan`操作通常表示访问了大量行。因此，通常更倾向于使用`seek`而不是`scan`。\n\
  \n接下来，你需要确保索引机制设置正确。查询优化器评估可用索引，以发现哪个索引能以最有效的方式从表中检索数据。如果所需的索引不可用，优化器会使用次优的索引。为了获得最佳性能，你应该始终确保在数据检索操作中使用了最佳索引。你可以通过分析节点详细信息的“参数”部分来判断索引有效性（是否使用了最佳索引），该部分用于以下操作：\n\
  \n• 数据检索操作\n\n• 联接操作\n\n让我们看一下前面执行计划（图 7-2）中`SalesOrderHeader`表的数据检索机制。图 7-5 显示了操作符属性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-104_1.jpg)\n\
  \n第 7 章 分析查询性能\n\n**图 7-5. `SalesOrderHeader`表的数据检索机制**\n\n在`SalesOrderHeader`表的操作符属性中，`Object`属性指定了使用的索引`PK_SalesOrderHeader_SalesOrderID`。它使用以下命名约定：`[数据库].[所有者].[表名].[索引名]`。`Seek\
  \ Predicates`属性指定了用于在索引中查找键的列。\n\n`SalesOrderHeader`表通过`SalesOrderld`列与`SalesOrderDetail`表联接。`SEEK`操作基于联接条件`SalesOrderld`是聚集索引和主键`PK_SalesOrderHeader`的前缘这一事实。\n\
  \n有时你可能会遇到不同的数据检索机制。与你在图 7-5 中看到的`Seek Predicates`属性不同，图 7-6 显示了一个简单的谓词，表明一种完全不同的数据检索机制。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-105_1.jpg)\n\
  \n第 7 章 分析查询性能\n\n**图 7-6. 数据检索机制的一种变体：扫描**\n\n\n\n在图 7-6 所示的属性中，没有搜索谓词。由于在列上执行了函数`ISNULL`和`CONVERT_IMPLICIT`，必须扫描整个表以检查是否存在谓词值。\n\
  \n```\nisnull(CONVERT_IMPLICIT(numeric(19,4),[AdventureWorks2012].[Sales].[SalesOrderDetail].\n\
  [UnitPrice] as [sod].[UnitPrice],0)*((1.0)-CONVERT_IMPLICIT(numeric(19,4),[AdventureWorks2012].\n\
  [Sales].[SalesOrderDetail].[UnitPriceDiscount] as [sod].[UnitPriceDiscount],0))*CONVERT_I\
  \ MPLICIT(numeric(5,0),[AdventureWorks2012].[Sales].[SalesOrderDetail].[OrderQty]\
  \ as [sod].\n[OrderQty],0),(0.000000))>(20000.000000)\n```\n\n因为正在对数据进行计算，而索引并不存储计算结果，所以无法简单地通过索引查找信息，必须扫描数据、执行计算，然后验证数据的正确性。\n\
  \n### 分析连接的有效性\n\n除了分析所使用的索引外，你还应检查优化器决定的连接策略的有效性。SQL Server 使用三种类型的连接。\n\n- 哈希连接\n\
  - 合并连接\n- 嵌套循环连接\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-106_1.png)\n\
  \n第 7 章 ■ 分析查询性能\n\n在许多影响少量行的简单查询中，嵌套循环连接远优于哈希连接和合并连接。随着连接变得更复杂，在适当的地方会使用其他连接类型。没有哪种连接类型天生就是错误或不好的。你主要需要寻找优化器可能选择了与手头数据不兼容的类型的情况。这通常是由优化器在决定使用哪种类型时，其所依据的统计信息存在差异造成的。\n\
  \n#### 哈希连接\n\n要理解 SQL Server 的哈希连接策略，请考虑以下简单查询：\n\n```sql\nSELECT p.*\n\nFROM Production.Product\
  \ p\n\nJOIN Production.ProductCategory pc\n\nON p.ProductSubcategoryID = pc.ProductCategoryID;\n\
  ```\n\n表 7-1 显示了两个表的索引和行数。\n\n**表 7-1.** 产品表和产品类别表的索引及行数\n**表**\n**索引**\n**行数**\n\
  Product\nProductID 上的聚集索引\nProductCategory\nProductCategoryld 上的聚集索引\n\n图 7-7 显示了上述查询的执行计划。\n\
  \n**图 7-7.** 包含哈希连接的执行计划\n\n你可以看到优化器在两个表之间使用了哈希连接。\n\n哈希连接使用两个连接输入作为`生成输入`和`探测输入`。生成输入显示在执行计划的上方，探测输入显示在下方。通常两个输入中较小的那个作为生成输入，因为它将被存储在系统中，因此优化器会尝试最小化内存使用。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■ 分析查询性能\n\n哈希连接分两个阶段执行其操作：`生成阶段`和`探测阶段`。在最常用的哈希连接形式——`内存中哈希连接`中，会扫描或计算整个生成输入，然后在内存中构建哈希表。根据为`哈希键`（等式谓词中的列集）计算的哈希值，将外部输入的每一行插入到相应的哈希桶中。哈希值只是针对相关值运行的一种数学构造，用于比较目的。\n\
  \n生成阶段之后是探测阶段。逐行扫描或计算整个探测输入，对于每个探测行，计算其哈希键值。扫描探测输入哈希键值对应的哈希桶，并产生匹配项。图 7-8 说明了内存中哈希连接的过程。\n\
  \n探测\n\n开始哈希连接\n\n开始生成阶段\n\n阶段\n\n选择生成输入\n\n在内存中生成\n\n和探测输入\n\n哈希表\n\n开始探测阶段\n\n\
  生成阶段\n\n扫描生成输入\n\n扫描探测输入以获取\n\n\n#### 哈希连接\n\n探针阶段：为构建输入行计算哈希键，然后为探针输入行计算哈希键。检查哈希表中是否存在对应的哈希桶。\n\
  \n*   **否**：创建哈希桶。\n*   **是**：检查是否在哈希桶中找到匹配的行。\n    *   **是**：插入来自构建输入的所有行。\n  \
  \  *   **否**：生成匹配的行。\n\n此过程对探针输入和构建输入中的所有行重复，直到探针阶段完成。\n\n***图 7-8.** 内存中哈希连接的工作流程*\n\
  \n查询优化器使用哈希连接来高效处理大型、未排序、未建立索引的输入。现在让我们看看下一种连接类型：合并连接。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-108_1.png)\n\n![](img/index-108_2.png)\n\n#### 合并连接\n\n在前面的案例中，来自\
  \ `Product` 表的输入更大，并且该表在连接列 (`ProductCategoryID`) 上没有索引。使用下面这个简单的查询，你可以看到不同的行为：\n\
  \n```sql\nSELECT pm.*\nFROM Production.ProductModel pm\nJOIN Production.ProductModelProductDescriptionCulture\
  \ pmpd\nON pm.ProductModelID = pmpd.ProductModelID;\n```\n\n图 7-9 显示了此查询的执行计划结果。\n\
  \n***图 7-9.** 包含合并连接的执行计划*\n\n对于此查询，优化器在两个表之间使用了 `合并连接`。`合并连接` 要求两个连接输入都根据连接条件定义的合并列进行排序。如果两个连接列上都有可用的索引，则连接输入将通过索引进行排序。由于每个连接输入都已排序，`合并连接`\
  \ 从每个输入获取一行并比较它们是否相等。如果相等，则生成匹配的行。重复此过程，直到所有行都被处理完毕。\n\n在数据已通过索引排序的情况下，`合并连接` 可以是最快的连接操作之一。但如果数据未排序而优化器仍选择执行\
  \ `合并连接`，则数据必须通过一个额外的操作——排序——来排序。这可能会使 `合并连接` 在内存和 I/O 资源方面变得更慢、成本更高。\n\n在这种情况下，查询优化器发现连接输入都在其连接列上进行了排序（或建立了索引）。你可以在索引扫描操作符的属性中看到这一点，如图\
  \ 7-10 所示。\n\n***图 7-10.** 显示数据已排序的聚集索引扫描的属性*\n\n由于正在使用的索引对数据进行了排序，`合并连接` 在此情况下被选为比任何其他连接更快的连接策略。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-109_1.png)\n\
  \n#### 嵌套循环连接\n\n我在这里要介绍的最后一种连接类型是 `嵌套循环连接`。为了获得更好的性能，你应该始终努力从各个表中访问有限数量的行。为了理解使用较小结果集的效果，减少查询中的连接输入，如下所示：\n\
  \n```sql\nSELECT pm.*\nFROM Production.ProductModel pm\nJOIN Production.ProductModelProductDescriptionCulture\
  \ pmpd\nON pm.ProductModelID = pmpd.ProductModelID\nWHERE pm.Name = 'HL Mountain\
  \ Front Wheel';\n```\n\n图 7-11 显示了新查询的执行计划结果。\n\n***图 7-11.** 包含嵌套循环连接的执行计划*\n\n\
  如你所见，优化器在两个表之间使用了 `嵌套循环连接`。它还添加了另一个嵌套循环来执行键查找操作（我将在第 6 章详细讨论这一点）。\n\n`嵌套循环连接` 使用一个连接输入作为外部输入表，另一个作为内部输入表。外部输入表在执行计划中显示为顶部输入，内部输入表显示为底部输入表。外部循环逐行处理外部输入表。内部循环则针对每个外部行执行，在内部输入表中搜索匹配的行。\n\
  \n如果外部输入非常小，而内部输入较大但已建立索引，`嵌套循环连接` 是非常高效的。\n\n在许多影响少量行的简单查询中，**嵌套循环连接**远优于*哈希连接*和*合并连接*。\n\
  \n连接操作通过其他方面的牺牲来获得速度。循环连接之所以快速，是因为它使用内存将一小部分数据与第二部分数据进行快速比较。合并连接同样使用内存和少量的 `tempdb`\
  \ 来进行有序比较。哈希连接则使用内存和 `tempdb` 来构建连接所需的哈希表。虽然循环连接在小数据集上可能更快，但当数据集变大或没有索引支持数据检索时，它的速度可能会下降。这就是\
  \ SQL Server 提供不同连接机制的原因。\n\n即使是对于小的连接输入，如之前的查询，在连接列上建立索引也很重要。\n\n正如你在前面的执行计划中所看到的，对于少量的行，连接列上的索引允许查询优化器考虑采用嵌套循环连接策略。如果输入表的连接列缺少索引，则会迫使查询优化器使用哈希连接。\n\
  \n表 7-2 总结了三种连接类型的使用场景。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ## 第 7 章 ■ 分析查询性能\n\n### 表 7-2. 三种连接类型的特征\n\n**连接类型** | **连接列上的索引** | **连接表的通常大小**\
  \ | **是否预排序** | **连接子句**\n---|---|---|---|---\n哈希 | 内部表：无索引<br>外部表：可选<br>最佳条件：外部表小，内部表大\
  \ | 任意 | 否 | 等值连接\n合并 | 两个表都必须有<br>最佳条件：两个表上都有聚集索引或覆盖索引 | 大 | 是 | 等值连接\n嵌套循环 | 内部表：必须有<br>外部表：最好有\
  \ | 小 | 可选 | 所有类型\n\n**注意**，在哈希连接和循环连接中，外部表通常是两个连接表中较小的那个。\n\n我将在第 8 章介绍索引类型，包括聚集索引和覆盖索引。\n\
  \n### 实际执行计划与估计执行计划\n\n存在估计执行计划和实际执行计划。在某种程度上，它们可以互换使用。但是，实际执行计划带有查询执行时的信息，特别是受影响的行数以及其他一些在估计计划中无法获得的信息。这些信息可能非常有用，尤其是在尝试理解统计估计时。因此，在优化查询时，首选实际执行计划。\n\
  \n不幸的是，你并不总是能够访问它们。你可能无法执行查询，例如在生产环境中。你可能只能访问缓存中的计划，其中不包含运行时信息。\n\n因此，在有些情况下，你将不得不使用估计执行计划。\n\
  \n然而，在其他情况下，估计执行计划完全不起作用。考虑下面这个存储过程：\n\n```sql\nIF (SELECT OBJECT_ID('p1')) IS NOT\
  \ NULL\n    DROP PROC p1\nGO\n\nCREATE PROC p1\nAS\nCREATE TABLE t1 (c1 INT);\n\
  INSERT INTO t1\n    SELECT ProductID\n    FROM Production.Product;\nSELECT *\n \
  \   FROM t1;\nDROP TABLE t1;\nGO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-111_1.jpg)\n\n## 第 7 章 ■ 分析查询性能\n\n你可以尝试使用 `SHOWPLAN_XML` 来获取查询的估计\
  \ XML 执行计划，如下所示：\n\n```sql\nSET SHOWPLAN_XML ON;\nGO\nEXEC p1 ;\nGO\nSET SHOWPLAN_XML\
  \ OFF;\nGO\n```\n\n但这会失败，并显示以下错误：\n\n```\nMsg 208, Level 16, State 1, Procedure\
  \ p1, Line 360\nInvalid object name 't1'.\n```\n\n由于 `SHOWPLAN_XML` 并不实际执行查询，查询优化器无法为表\
  \ (`t1`) 上的 `INSERT` 和 `SELECT` 语句生成执行计划，因为该表在查询执行前并不存在。相反，你可以使用 `STATISTICS XML`，如下所示：\n\
  \n```sql\nSET STATISTICS XML ON;\nGO\nEXEC p1;\nGO\nSET STATISTICS XML OFF;\nGO\n\
  ```\n\n由于 `STATISTICS XML` 会执行查询，表在查询过程中被创建和访问，这些都被执行计划捕获。图 7-12 显示了查询结果以及 `STATISTICS\
  \ XML` 提供的存储过程中两个语句的两个执行计划。\n\n### 图 7-12. STATISTICS PROFILE 输出\n\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 7 章 ■ 查询性能分析\n\n■ **提示** 记得在 `management Studio` 中关闭 `Query ➤ Show execution\
  \ plan`，否则你将看到图形化的执行计划，而非文本形式的。\n\n## 计划缓存\n\n访问执行计划的最后一个位置是直接从存储它们的内存空间——计划缓存——中读取。SQL\
  \ Server 提供了动态管理视图和函数来访问这些数据。\n\n要查看缓存中的执行计划列表，请运行以下查询：\n\n```sql\nSELECT p.query_plan,\n\
  \       t.text\nFROM   sys.dm_exec_cached_plans r\n       CROSS APPLY sys.dm_exec_query_plan(r.plan_handle)\
  \ p\n       CROSS APPLY sys.dm_exec_sql_text(r.plan_handle) t;\n```\n\n该查询会返回一个\
  \ XML 执行计划链接列表。打开其中任何一个都将显示执行计划。这些执行计划是编译后的计划，但不包含任何执行指标。通过动态管理视图提供的列进行进一步操作，将允许你搜索特定的存储过程或执行计划。\n\
  \n虽然没有运行时数据在某种程度上有所限制，但能够访问执行计划（即使是在查询执行期间）对于从事性能调优工作的人员来说是无价的资源。如前所述，你可能无法在生产环境中执行查询，因此获取到任何计划都是有用的。\n\
  \n## 查询资源成本\n\n尽管查询的执行计划提供了详细的处理策略和各个步骤的预估相对成本，但它并未提供查询在 `CPU` 使用率、磁盘读写或查询持续时间方面的实际成本。在优化查询时，你可能会添加索引来降低某个步骤的相对成本。\n\
  \n这可能会影响到执行计划中依赖该步骤的其他步骤，有时甚至可能修改执行计划本身。因此，如果你只看执行计划，无法确定你的查询优化是使整个查询受益，还是仅仅受益于执行计划中的那一个步骤。你可以通过不同的方式来分析查询的总体成本。\n\
  \n在优化查询时，你应该监控其总体成本。如前所述，你可以使用 `扩展事件` 来监控查询的 `duration`、`cpu`、`reads` 和 `writes`\
  \ 信息。`扩展事件` 是一种非常高效的指标收集机制。你应该计划利用这一事实，并使用此机制来收集你的查询性能指标。只需明白，收集这些信息会产生大量数据，你必须在系统中找到地方来维护它们。\n\
  \n还有其他收集性能数据的方法，它们比 `扩展事件` 更即时。\n\n## 客户端统计信息\n\n客户端统计信息从你的机器作为服务器客户端的角度捕获执行信息。这意味着记录的任何时间都包含了数据通过网络传输所需的时间，而不仅仅是\
  \ SQL Server 机器本身所花费的时间。要使用它们，只需点击 `Query ➤ Include Client Statistics`。现在，每次运行查询时，都会收集一组有限的数据，包括执行时间、受影响的行数、与服务器的往返次数等等。此外，每次查询执行都会在\
  \ `客户端统计信息` 选项卡上单独显示，并有一列聚合了多次执行的数据，显示所收集数据的平均值。\n\n这些统计信息还会显示某个时间或计数是否在连续运行之间发生了变化，并以箭头形式显示，如图\
  \ 7-13 所示。例如，考虑以下查询：\n\n```sql\nSELECT TOP 100\n       p.*\nFROM   Production.Product\
  \ p;\n```\n\n该查询的客户端统计信息应该看起来类似于图 7-13 所示。\n\n`图 7-13. 客户端统计信息`\n\n虽然捕获客户端统计信息可能是一种有用的数据收集方式，但它是一组有限的数据，并且无法显示一次执行与另一次执行有何不同。你甚至可能运行了一个完全不同的查询，其数据也会与其他查询的数据混合在一起，使得平均值失去意义。如果需要，你可以重置客户端统计信息。\n\
  \n选择 `Query` 菜单，然后选择 `Reset Client Statistics` 菜单项。\n\n## 执行时间\n\n`持续时间` 和 `CPU`\
  \ 都代表了查询的时间因素。要获取有关解析、编译和执行查询所需时间（以毫秒为单位）的详细信息，请使用 `SET STATISTICS TIME`，如下所示：\n\
  \n```sql\nSET STATISTICS TIME ON\nGO\nSELECT soh.AccountNumber,\n       sod.LineTotal,\n\
  \       sod.OrderQty,\n       sod.UnitPrice,\n       p.Name\nFROM   Sales.SalesOrderHeader\
  \ soh\n       JOIN Sales.SalesOrderDetail sod\n         ON soh.SalesOrderID = sod.SalesOrderID\n\
  \       JOIN Production.Product p\n         ON sod.ProductID = p.ProductID\nWHERE\
  \  sod.LineTotal > 1000;\nGO\nSET STATISTICS TIME OFF\nGO\n```\n\n前面的 `SELECT` 语句的\
  \ `STATISTICS TIME` 输出如下：\n\n```text\nSQL Server parse and compile time:\n CPU time\
  \ = 0 ms, elapsed time = 0 ms.\n(32101 row(s) affected)\nSQL Server Execution Times:\n\
  \ CPU time = 328 ms, elapsed time = 643 ms.\nSQL Server parse and compile time:\n\
  \ CPU time = 0 ms, elapsed time = 0 ms.\n```\n\n执行时间中的 `CPU time = 328 ms` 部分对应于\
  \ `Profiler` 工具和 `Server Trace` 选项提供的 `CPU` 值。同样，对应的 `Elapsed time = 643 ms` 代表了其他机制提供的\
  \ `Duration` 值。\n\n0 毫秒的解析和编译时间表明优化器为该查询重用了现有的执行计划，因此无需再次花费时间解析和编译查询。如果查询是第一次执行，则优化器必须先解析查询语法，然后编译它以生成执行计划。这可以通过使用系统调用\
  \ `DBCC FREEPROCCACHE` 清除缓存然后重新运行查询来轻松验证。\n\n```text\nSQL Server parse and compile\
  \ time:\n CPU time = 32 ms, elapsed time = 33 ms.\n(32101 row(s) affected)\nSQL\
  \ Server Execution Times:\n CPU time = 187 ms, elapsed time = 678 ms.\nSQL Server\
  \ parse and compile time:\n CPU time = 0 ms, elapsed time = 0 ms.\n```\n\n这次，SQL\
  \ Server 花费了 32 毫秒的 `CPU` 时间和总共 33 毫秒的时间来解析和编译查询。\n\n`注意`\n除非你准备承担重新编译系统上每个查询的不小成本，否则不应在生产系统上运行\
  \ `DBCC FREEPROCCACHE`。在某种程度上，这对你的系统来说，其成本将与重启或 `SQL Server` 实例重新启动相当。\n\n## STATISTICS\
  \ IO\n\n正如本章前面“识别高成本查询”一节所讨论的，`Reads` 列中的读取次数通常是 `duration`、`cpu`、`reads` 和 `writes`\
  \ 中最重要的成本因素。查询执行的总读取次数由查询中涉及的所有表的读取次数之和组成。\n\n对各个表执行的读取次数可能有很大差异，这取决于从各个表请求的结果集大小以及可用的索引。\n\
  \n为了减少总读取次数，找出查询中访问的所有表及其相应的读取次数将非常有用。这些详细信息有助于你专注于优化读取次数较多的表的数据访问。每个表的读取次数也有助于你评估为某个表实施的优化步骤对查询中引用的其他表的影响。\n\
  \n\n\n"
- '# 第 7 章 ■ 分析查询性能


  在一个简单的查询中，你可以通过仔细查看查询语句来确定访问了哪些独立的表。随着查询变得越来越复杂，这变得越来越困难。对于存储过程、数据库视图或函数，识别优化器实际访问的所有表变得更加困难。无论查询复杂度如何，你都可以使用
  `STATISTICS IO` 来获取此信息。


  要在 Management Studio 中开启 `STATISTICS IO`，请导航至“查询” ➤ “查询选项” ➤ “高级” ➤ “设置 STATISTICS
  IO”。你也可以通过以下程序化的方式获取此信息：


  ```sql

  SET STATISTICS IO ON;


  GO


  SELECT soh.AccountNumber,

  sod.LineTotal,

  sod.OrderQty,

  sod.UnitPrice,

  p.Name

  FROM Sales.SalesOrderHeader soh

  JOIN Sales.SalesOrderDetail sod

  ON soh.SalesOrderID = sod.SalesOrderID

  JOIN Production.Product p

  ON sod.ProductID = p.ProductID

  WHERE sod.SalesOrderID = 71856;


  GO


  SET STATISTICS IO OFF;


  GO

  ```


  如果你运行此查询并查看其执行计划，它由三个聚集索引查找和两个循环联接组成。如果移除 WHERE 子句并再次运行查询，你会得到一系列扫描和一些哈希联接。这是个有趣的事实——但你不知道它如何影响查询的
  I/O 使用！你可以像前面那样使用 `SET STATISTICS IO` 来比较优化器使用的两种处理策略之间的查询开销（以逻辑读取计）。


  当查询使用哈希联接时，你会得到以下 `STATISTICS IO` 输出：


  ```

  (121317 行受影响)

  表 ''Workfile''。扫描计数 0，逻辑读取 0...

  表 ''Worktable''。扫描计数 0，逻辑读取 0...

  表 ''SalesOrderDetail''。扫描计数 1，逻辑读取 1246...

  表 ''SalesOrderHeader''。扫描计数 1，逻辑读取 689...

  表 ''Product''。扫描计数 1，逻辑读取 6...

  (1 行受影响)

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  现在，当你重新加入 WHERE 子句以适当地过滤数据时，得到的 `STATISTICS IO` 输出如下：


  ```

  (2 行受影响)

  表 ''Product''。扫描计数 0，逻辑读取 4...

  表 ''SalesOrderDetail''。扫描计数 1，逻辑读取 3...

  表 ''SalesOrderHeader''。扫描计数 0，逻辑读取 3...

  (1 行受影响)

  ```


  由于索引查找和循环联接，`SalesOrderDetail` 表的逻辑读取数从 1,246 降至 3。它也没有显著影响 `Product` 表的数据检索开销。


  在解释 `STATISTICS IO` 的输出时，你主要参考逻辑读取的数量。当数据未在内存中找到时，物理读取和预读的次数将不为零，但一旦数据被加载到内存中，物理读取和预读往往会变为零。


  了解查询使用的所有表及其对应的读取次数还有另一个优势。在表架构（包括索引）或数据未改变的情况下，重新执行相同的查询时，持续时间和 CPU 值可能会波动很大，因为运行在
  SQL Server 机器上的基本服务和后台应用程序会影响被观察查询的处理时间。但是，不要忘记逻辑读取并不总是最准确的衡量标准。持续时间和 CPU 绝对有用，并且是任何查询调优的重要部分。


  在优化步骤中，你需要一个不波动的开销数值作为参考。对于具有固定表架构和数据的查询，其读取（或逻辑读取）在多次执行之间不会变化。例如，如果你执行前面的 `SELECT`
  语句十次，你可能会得到十个不同的持续时间和 CPU 数值，但每次的读取数将保持不变。因此，在优化过程中，你可以参考单个表的读取次数，以确保你确实降低了该表的数据访问开销。只是永远不要假设它是你唯一的衡量标准，甚至不是主要的衡量标准。它只是一个恒定的衡量标准，因此很有用。


  尽管逻辑读取的数量也可以从扩展事件中获得，但使用 `STATISTICS IO` 时你还能获得另一个好处。当结合查询使用不同的 `SET` 语句（前面提到过）时，Profiler
  或 Server Trace 选项显示的查询逻辑读取数会增加。但 `STATISTICS IO` 显示的逻辑读取数不包括使用 `SET` 语句时访问的额外页。因此，`STATISTICS
  IO` 提供了逻辑读取数量的一致数值。


  ## 总结


  在本章中，你了解到可以使用扩展事件来识别 SQL 工作负荷中给系统资源造成高压力的查询。收集会话数据可以并且应该使用系统存储过程实现自动化。要即时访问有关正在运行查询的统计信息，请使用
  DMV `sys.dm_exec_query_stats`。


  你可以使用 Management Studio 进一步分析这些查询，以找出查询处理策略中开销较大的步骤。为了获得更好的性能，在分析查询时考虑执行计划中使用的索引和联接机制非常重要。`SET
  STATISTICS IO` 提供的单个表的数据检索（或读取）次数有助于你集中关注读取次数最多的表的数据访问机制。你还应该关注最昂贵查询的 CPU 开销和总时间。


  一旦你识别出一个昂贵的查询并完成初步分析，下一步应该是针对性能优化该查询。由于索引是最常用的性能调优技术之一，在下一章中，我将深入讨论 SQL Server 中可用的各种索引机制。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 8 章 ■ 索引架构与行为


  在正确的列或列上建立正确的索引，是查询调优的起点。缺少索引或在错误的列或列上建立索引，可能是所有性能问题的根源，从基础数据访问开始，贯穿联接，直到筛选子句。因此，对于每个人——而不仅仅是
  DBA——来说，理解可用于优化数据库设计的不同索引技术都至关重要。


  在本章中，我将涵盖以下主题：

  *   什么是索引

  *   索引的收益和开销

  *   索引设计的一般建议

  *   聚集索引和非聚集索引的行为与比较

  *   聚集索引和非聚集索引的建议


  ## 什么是索引？


  减少磁盘 I/O 的最佳方法之一是使用索引。索引允许 SQL Server 无需扫描整个表即可在表中查找数据。数据库中的索引类似于书籍中的索引。例如，假设你想在本书中查找
  *表扫描* 这个短语。在纸质版本中，如果没有书末的索引，你将不得不翻阅整本书来找到你需要的内容。有了索引，你就确切地知道所需信息存储的位置。


  在为数据库性能进行调优时，你会在查询中使用的不同列上创建索引，以帮助 SQL Server 快速查找数据。例如，下面这个针对 `Production.Product`
  表的查询产生的数据如图 8-1 所示（500 多行中的前 10 行）：


  ```sql

  SELECT TOP 10

  p.ProductID,

  p.[Name],

  p.StandardCost,

  p.[Weight],

  ROW_NUMBER() OVER (ORDER BY p.Name DESC) AS RowNumber

  FROM Production.Product p

  ORDER BY p.Name DESC;

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-118_1.jpg)


  ![](img/index-118_2.jpg)


  `图 8-1.` `Production.Product` 表示例



  '
- '# 第 8 章 ■ 索引架构与行为


  前面的查询扫描了整个表，因为没有 `WHERE` 子句。如果需要通过 `WHERE` 子句添加筛选器来检索所有 `StandardCost` 大于 150 的产品，在没有索引的情况下，仍然必须扫描整个表，逐行检查
  `StandardCost` 的值，以确定哪些行包含大于 150 的值。在 `StandardCost` 列上创建索引可以通过提供一种允许对数据进行结构化搜索而非逐行检查的机制来加速此过程。你可以采用两种不同且基本的方法来创建此索引。


  • *类似字典*：字典是按字母顺序排列的单词的独立列表。索引可以以类似方式存储。数据是有序的，尽管仍会有重复项。按 `StandardCost` `DESC`
  排序（而不是按 `Name` 排序）的前 10 行数据，看起来会像图 8-2 中所示的数据。请注意，`RowNumber` 列显示了按 `Name` 排序时行的原始位置。


  ***图 8-2.** 按 StandardCost 排序的产品表*


  因此，现在如果你想查找 `StandardCost` 大于 150 的所有行数据，索引将允许你通过直接移动到第一个大于 150 的值来立即找到它们。这种根据索引键顺序对存储的数据应用顺序的索引被称为
  `聚集索引`。由于 SQL Server 存储数据的方式，这是你数据库设计中最重要的索引之一。我将在本章后面详细解释这一点。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  • *类似书籍的索引架构*：可以在不改变表布局的情况下创建一个有序列表，类似于书籍索引的创建方式。就像书籍的关键词索引在单独的部分列出关键词并带有页码指向书籍正文一样，`StandardCost`
  值的列表被创建为一个独立的结构，并通过指针引用 `Product` 表中对应的行。对于此示例，我将使用 `RowNumber` 作为指针。表 8-1 显示了该制造商索引的结构。


  ***表 8-1.** 制造商索引的结构*


  **StandardCost**


  **RowNumber**


  2171.2942


  2171.2942


  2171.2942


  2171.2942


  2171.2942


  1912.1544


  SQL Server 可以扫描该制造商索引来查找 `StandardCost` 大于 150 的行。由于 `StandardCost` 值按排序顺序排列，SQL
  Server 一旦遇到值为 150 或更小的行即可停止扫描。这种类型的索引称为 `非聚集索引`，我将在本章后面详细解释。


  在任何一种情况下，SQL Server 都能够比在没有索引的情况下更快地在大多数情形下找到所有 `StandardCost` 大于 150 的产品。


  你可以在单个列（如前所述）或表中列的组合上创建索引。SQL Server 会为某些类型的约束（例如，`PRIMARY KEY` 和 `UNIQUE` 约束）自动创建索引。


  ## 索引的好处


  即使表上没有索引，SQL Server 也必须能够找到数据。当没有聚集索引来为数据建立存储顺序时，存储引擎只会读取整个表来找到所需内容。


  没有聚集索引的表称为 `堆表`。堆只是一个无序的数据堆栈，带有一个行标识符作为指向存储位置的指针。除了通过称为 `扫描` 的过程逐行遍历数据外，这些数据既没有排序，也无法搜索。当在表上放置聚集索引时，索引的键值为数据建立了顺序。此外，有了聚集索引，数据与索引一起存储，因此数据本身现在是有序的。当存在聚集索引时，非聚集索引上的指针由定义聚集索引键的值组成。这是聚集索引如此重要的一个重要原因。


  SQL Server 中的数据存储在大小为 8KB 的页面上。页面是从磁盘移动到内存的最小信息量，因此在一个页面上可以存储多少内容变得很重要。由于页面空间有限，如果行包含的列数较少或列尺寸较小，则可以存储更多的行。非聚集索引通常不（也不应该）包含表的所有列；它通常只包含有限数量的列。因此，一个页面将能够比存储表本身（包含所有列）的行的页面存储更多非聚集索引的行。因此，SQL
  Server 将能够从表示该列上非聚集索引的页面比从表示包含该列的表的页面读取更多的列值。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-120_1.png)


  ![](img/index-120_2.png)


  ![](img/index-120_3.png)


  非聚集索引的另一个好处是，由于它与数据表是分开的结构，可以将其放在不同的文件组中，使用不同的 I/O 路径，如第 3 章所述。这意味着 SQL Server 可以并发访问索引和表，使搜索速度更快。


  索引将其信息存储在平衡树（称为 `B 树`）结构中，因此查找特定行所需的读取次数被最小化。以下示例展示了 B 树结构的好处。


  考虑一个包含 27 行、随机顺序且每个叶级页面仅 3 行的单列表。假设页面中行的布局如图 8-3 所示。


  ***图 8-3.** 27 行的初始布局*


  要搜索列值为 5 的行（或多行），SQL Server 必须扫描所有行和页面，因为即使是最后一页的最后一行也可能具有值 5。因为读取次数取决于访问的页面数，在没有该列索引的情况下，必须执行九次读取操作（从磁盘检索页面并将其传输到内存）。可以通过在该列上创建索引来使内容有序，结果行和页面的布局如图
  8-4 所示。


  ***图 8-4.** 27 行的有序布局*


  为列创建索引将内容按排序方式排列。这使得 SQL Server 能够确定一行在列中可能的值相对于另一行在列中值的大小关系。例如，在图 8-4 中，当 SQL Server
  找到第一行列值为 6 时，它可以确信不再有列值为 5 的行。因此，当内容被索引时，只需两次读取操作即可获取列值为 5 的行。但是，如果要搜索列值 25 会怎样？这将需要九次读取操作！这个问题通过使用
  B 树结构实现索引来解决（如图 8-5 所示）。


  ***图 8-5.** 27 行的 B 树布局*



  ## B 树结构简介


  B 树由一个称为 **根节点** 的起始节点（或页面）构成，**分支节点**（或页面）从中生长出来（或链接到它）。所有键都存储在叶子节点中。每个内部节点（位于叶子节点之上）都包含指向其分支节点的指针，以及表示在该分支节点中找到的最小值的值。键在每个节点内保持排序顺序。B
  树使用平衡树结构来实现高效的记录检索——当所有叶子节点距离根节点的层级相同时，B 树就是平衡的。例如，在前面的内容上创建索引将生成如图 8-5 所示的平衡 B
  树结构。在底层，所有叶子节点通过一个双向链表相互连接，这意味着每个页面都指向它后面的页面，而它后面的页面又指向前一个页面。当遍历页面超越了中间页面的定义范围时，这避免了不得不回溯到链上。


