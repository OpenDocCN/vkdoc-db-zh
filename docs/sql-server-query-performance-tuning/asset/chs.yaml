  \ Scan count 1, logical reads 44, physical reads 1, read-ahead reads 42, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Person'. Scan count\
  \ 1, logical reads 3, physical reads 1, read-ahead reads 8, lob logical reads 0,\
  \ lob physical reads 0, lob read-ahead reads 0.\nSQL Server Execution Times:\nCPU\
  \ time = 62 ms, elapsed time = 1313 ms.\nSQL Server Execution Times:\nCPU time =\
  \ 62 ms, elapsed time = 1442 ms.\nSQL Server parse and compile time:\nCPU time =\
  \ 0 ms, elapsed time = 0 ms.\n```\n\n表 25-3 总结了`STATISTICS IO`的输出。\n\n***表 25-3.**\
  \ `STATISTICS IO` 输出分解*\n\n**表** | **逻辑读取次数**\n---|---\n`Person.Employee` | 2,992\n\
  `Production.Product` | 2,992\n`Purchasing.PurchaseOrderDetail` | 1,539\n`Purchasing.PurchaseOrderHeader`\
  \ | 44\n`Person.Person` | 3\n\n通常，查询所涉及的各个表的读取次数总和将小于查询执行的总读取次数。这是因为需要读取额外的页面来访问内部数据库对象，例如`sysobjects`、`syscolumns`和`sysindexes`。\n\
  \n表 25-4 总结了`STATISTICS TIME`的输出。\n\n***表 25-4.** `STATISTICS TIME` 输出分解*\n\n**事件**\
  \ | **持续时间** | **CPU 时间**\n---|---|---\n编译 | 128 ms | 0 ms\n执行 | 1313 ms | 62 ms\n\
  完成 | 1442 ms | 62 ms\n\n不要孤立地使用逻辑读取次数而不考虑执行时间。在确定性能不佳的查询时，你需要将所有衡量指标都纳入考量。反之，也不要假设执行时间是一个完美的衡量标准。资源争用在执行时间中扮演着重要角色，因此你会看到这个指标存在一些波动。使用这两个值，但要充分理解，单独使用任何一个都可能无法准确反映现实情况。\n\
  \n一旦确定了性能最差的查询并衡量了其资源使用情况，接下来的优化步骤是确定影响查询性能的因素。然而，在进行此操作之前，你应检查是否存在查询外部的任何因素可能导致了性能不佳。\n\
  \n## 分析与优化外部因素\n\n除了查询设计和索引等因素外，外部因素也会影响查询性能。因此，在深入研究查询的执行计划之前，你应该分析并优化可能影响查询性能的主要外部因素。以下是一些外部因素：\n\
  \n-   应用程序使用的连接选项\n-   查询所访问的数据库对象的统计信息\n-   查询所访问的数据库对象的碎片情况\n\n### 分析应用程序使用的连接选项\n\
  \n在连接到 SQL Server 时，可以设置各种选项（如`ANSI_NULL`或`CONCAT_NULL_YIELDS_NULL`），使其与服务器或数据库的默认设置不同。然而，按连接更改这些设置可能导致存储过程重新编译，从而引发性能下降。此外，某些选项（如`ARITHABORT`）在处理索引视图和某些其他专用索引时必须设置为`ON`。如果未设置，可能会导致性能低下，甚至在代码中出现错误。例如，将`ANSI_WARNINGS`设置为`OFF`将导致优化器在生成执行计划时忽略索引视图和索引计算列。你可以使用扩展事件的输出来查看此信息。`login`事件和`existing_connection`事件中的`options_text`列包含了该连接使用的设置，如图\
  \ 25-2.所示。\n\n***图 25-2.** 显示批处理级别选项的现有连接*\n\n此列不仅能显示批处理级别的选项；它还可以让你检查事务隔离级别。\n\n\
  你也可以从执行计划中第一个操作符的属性中获取这些设置。\n\n我建议使用 ANSI 标准设置，即将以下选项设置为`ON`：`ANSI_NULLS`、`ANSI_NULL_DFLT_ON`、`ANSI_PADDING`、`ANSI_WARNINGS`、`CURSOR_CLOSE_ON_COMMIT`、`IMPLICIT_TRANSACTIONS`和`QUOTED_IDENTIFIER`。你可以使用单一命令`SET\
  \ ANSI_DEFAULTS ON`将它们同时全部设置为`ON`。\n\n### 分析统计信息的有效性\n\n查询所引用的数据库对象的统计信息是查询优化器用于决定某些执行计划的关键信息之一。如第\
  \ 12 章所述，优化器根据查询所引用对象的统计信息来生成查询的执行计划。优化器查看查询所引用的数据库对象的统计信息，并估算受影响的行数。通过这种方式，它确定查询的处理策略。如果数据库对象的统计信息不准确，那么优化器可能会为查询生成一个低效的执行计划。\n\
  \n如第 12 章所述，你可以使用`DBCC SHOW_STATISTICS`来检查表及其索引的统计信息。\n\n\n\n"
- "# 检查统计信息\n\n在此次查询中引用了五张表：`Purchasing.PurchaseOrderHeader`、`Purchasing.PurchaseOrderDetail`、`Person.Employee`、`Person.Person`\
  \ 以及 `Production.Product`。你必须知道查询使用了哪些索引才能获取其统计信息。这一点可以通过查看执行计划来确定。现在，我将检查 `HumanResources.Employee`\
  \ 表主键的统计信息，因为该表产生了最多的读取操作。现在运行以下查询：\n\n```sql\nDBCC SHOW_STATISTICS('HumanResources.Employee',\n\
  'PK_Employee_BusinessEntityID');\n```\n\n当上述查询完成后，你将看到如图 25-3 所示的输出。\n\n**图 25-3.**\
  \ `HumanResources.Employee` 的 `SHOW_STATISTICS` 输出\n\n你可以看到索引的选择性非常高，因为如“全部密度”列所示，其密度相当低。在此情况下，统计信息不太可能是此查询性能不佳的原因。在可能的情况下，最好查看实际的执行计划并比较其中的估计行数与实际行数。你还可以检查“更新”列以确定此组统计信息的最后更新时间。如果统计信息的更新时间距今已超过几天，那么你需要检查你的统计信息维护计划，并应手动更新这些统计信息。就提供的数据而言，这些统计信息可能已经严重过时。\n\
  \n### 分析碎片需求的必要性\n\n如第 13 章所述，碎片化的表会增加执行扫描的查询所需访问的页数，从而对性能产生不利影响。然而，对于点查询，碎片通常不是问题。因此，你应该确保查询中引用的数据库对象没有过度碎片化。\n\
  \n你可以通过运行一个针对 `sys.dm_db_index_physical_stats` 的查询来确定性能最差的查询所访问的五张表的碎片情况。首先针对 `HumanResources.Employee`\
  \ 表运行查询。\n\n```sql\nSELECT s.avg_fragmentation_in_percent,\n       s.fragment_count,\n\
  \       s.page_count,\n       s.avg_page_space_used_in_percent,\n       s.record_count,\n\
  \       s.avg_record_size_in_bytes,\n       s.index_id\nFROM sys.dm_db_index_physical_stats(DB_ID('AdventureWorks2012'),\n\
  \                                    OBJECT_ID(N'HumanResources.Employee'),\n  \
  \                                  NULL, NULL, 'Sampled') AS s\nWHERE s.record_count\
  \ > 0\nORDER BY s.index_id;\n```\n\n图 25-4 展示了此查询的输出。\n\n**图 25-4.** `HumanResources.Employee`\
  \ 表的索引碎片情况\n\n如果你针对其他四张表运行相同的查询（按顺序为 `Purchasing.PurchaseOrderHeader`、`Purchasing.PurchaseOrderDetail`、`Production.Product`\
  \ 和 `Person.Person`），输出将如图 25-5 所示。\n\n**图 25-5.** 问题查询中四张表的索引碎片情况\n\n`Purchasing.PurchaseOrderHeader`\
  \ 表的碎片非常轻微：28%。同时，许多索引的 `avg_page_space_used_in_percent` 都大于 90%。考虑到该表上索引的页数（42\
  \ 或更少），如第 13 章详述，通过整理索引（假设可以整理）来提升性能的可能性非常低。\n\n`Purchasing.PurchaseOrderDetail`\
  \ 表也是如此，其碎片率很低，页数也很少。`Production.Product` 的碎片程度稍高；但同样，页数非常少，因此整理索引可能帮助不大。`Person.Employee`\
  \ 有一个索引的碎片率为 **66**%；然而，它又只分布在三页上。最后，`Person.Person` 几乎没有碎片可言。\n\n\n\n"
- "# 第 25 章：数据库工作负载优化\n\n作为迭代性能调优过程的一部分，这里有一个实验可以尝试。运行第 13 章提供（并在本章重复）的索引碎片整理脚本。\n\
  \n```sql\nDECLARE @DBName NVARCHAR(255),\n    @TableName NVARCHAR(255),\n    @SchemaName\
  \ NVARCHAR(255),\n    @IndexName NVARCHAR(255),\n    @PctFrag DECIMAL,\n    @Defrag\
  \ NVARCHAR(MAX)\n\nIF EXISTS ( SELECT *\n            FROM sys.objects\n        \
  \    WHERE object_id = OBJECT_ID(N'#Frag') )\n    DROP TABLE #Frag;\n\nCREATE TABLE\
  \ #Frag\n(\n    DBName NVARCHAR(255),\n    TableName NVARCHAR(255),\n    SchemaName\
  \ NVARCHAR(255),\n    IndexName NVARCHAR(255),\n    AvgFragment DECIMAL\n)\n\nEXEC\
  \ sys.sp_MSforeachdb 'INSERT INTO #Frag ( DBName, TableName, SchemaName, IndexName,\
  \ AvgFragment ) SELECT ''?'' AS DBName ,t.Name AS TableName ,sc.Name AS SchemaName\
  \ ,i.name AS IndexName ,s.avg_fragmentation_in_percent FROM ?.sys.dm_db_index_physical_stats(DB_ID(''?''),\
  \ NULL, NULL, NULL, ''Sampled'') AS s JOIN ?.sys.indexes i ON s.Object_Id = i.Object_id\
  \ AND s.Index_id = i.Index_id JOIN ?.sys.tables t ON i.Object_id = t.Object_Id JOIN\
  \ ?.sys.schemas sc ON t.schema_id = sc.SCHEMA_ID WHERE s.avg_fragmentation_in_percent\
  \ > 20 AND t.TYPE = ''U'' AND s.page_count > 8 ORDER BY TableName,IndexName';\n\n\
  DECLARE cList CURSOR\nFOR\n    SELECT *\n    FROM #Frag\n\nOPEN cList;\n\nFETCH\
  \ NEXT FROM cList\n    INTO @DBName, @TableName, @SchemaName, @IndexName, @PctFrag;\n\
  \nWHILE @@FETCH_STATUS = 0\nBEGIN\n    IF @PctFrag BETWEEN 20.0 AND 40.0\n    BEGIN\n\
  \        SET @Defrag = N'ALTER INDEX ' + @IndexName + ' ON ' + @DBName +\n     \
  \       '.' + @SchemaName + '.' + @TableName + ' REORGANIZE';\n        EXEC sp_executesql\
  \ @Defrag;\n        PRINT 'Reorganize index: ' + @DBName + '.' + @SchemaName + '.'\
  \ +\n            @TableName + '.' + @IndexName;\n    END\n    ELSE\n        IF @PctFrag\
  \ > 40.0\n        BEGIN\n            SET @Defrag = N'ALTER INDEX ' + @IndexName\
  \ + ' ON ' +\n                @DBName + '.' + @SchemaName + '.' + @TableName +\n\
  \                ' REBUILD';\n            EXEC sp_executesql @Defrag;\n        \
  \    PRINT 'Rebuild index: ' + @DBName + '.' + @SchemaName +\n                '.'\
  \ + @TableName + '.' + @IndexName;\n        END\n\n    FETCH NEXT FROM cList\n \
  \       INTO @DBName, @TableName, @SchemaName, @IndexName, @PctFrag;\nEND\n\nCLOSE\
  \ cList;\nDEALLOCATE cList;\n\nDROP TABLE #Frag;\nGO\n```\n\n在整理数据库上的索引后，重新针对所有五个表运行对\
  \ `sys.dm_db_index_physical_stats` 的查询。这将使你能够确定索引碎片（如果有的话）的变化情况（见图 25-6）。\n\n![](img/index-527_1.jpg)\n\
  \n**图 25-6.** 重建索引后各表的索引碎片情况\n\n如图 25-6 所示，在性能最差的查询所使用的表中，任何索引的碎片都没有减少。在大多数情况下，这是因为页数太少，以至于无法进行碎片整理。通常，我甚至不会费心去整理少于\
  \ 100 页的索引。Microsoft 的建议是等到有 1,000 页时再进行碎片整理。\n\n一旦你分析了可能影响查询性能的外部因素并解决了其中非最优的部分，接下来就应该分析内部因素，例如不当的索引和查询设计。\n\
  \n## 分析代价最高查询的内部行为\n\n既然统计信息是最新的，你就可以分析优化器为查询选择的处理策略，以确定影响查询性能的内部因素。分析可能影响查询性能的内部因素涉及以下步骤：\n\
  \n• 分析查询执行计划\n\n• 识别执行计划中的高代价步骤\n\n• 分析处理策略的有效性\n\n![](img/index-528_1.jpg)\n\n\
  ### 分析查询执行计划\n\n要查看执行计划，单击“显示实际执行计划”按钮以启用它，然后运行存储过程。\n\n请确保你在非生产系统上进行此类测试。关于阅读执行计划的更多细节，请查阅我的书\
  \ `SQL Server Execution Plans`（Red Gate Publishing，2013）。图 25-7 显示了性能最差查询的图形化执行计划。\n\
  \n**图 25-7.** 性能最差查询的实际执行计划\n\n此计划的图形有些难以阅读。如果你没有跟随代码，我将分解一些有趣的细节。阅读执行计划在第 15 章中已作解释。你可以从该执行计划中观察到以下内容：\n\
  \n• `SELECT` 属性：\n\n  • 优化级别：完全\n\n  • 提前终止原因：找到了足够好的计划\n\n• 数据访问：\n\n  • 在非聚集索引\
  \ `Person.IX_Person_LastName_FirstName_MiddleName` 上进行索引查找\n\n  • 在聚集索引 `PurchaseOrderHeader.PK_PruchaseOrderHeader_PurchaseOrderID`\
  \ 上进行索引扫描\n\n  • 在聚集索引 `PurchaseOrderDetail.PK_PurchaseOrderDetail_PurchaseOrderDetailID`\
  \ 上进行索引查找\n\n  • 在聚集索引 `Product.PK_Product_ProductID` 上进行索引查找\n\n  • 在聚集索引 `Employee.PK_Employee_BusinessEntityID`\
  \ 上进行索引查找\n\n• 连接策略：\n\n  • 在常量扫描和 `Person.Person` 表之间进行嵌套循环联接，`Person.Person` 表作为外部表\n\
  \n  • 在先前联接的输出与 `Purchasing.PurchaseOrderHeader` 表之间进行嵌套循环联接，`Purchasing.PurchaseOrderHeader`\
  \ 表作为外部表\n\n  • 在先前联接的输出与 `Purchasing.PurchaseOrderDetail` 表之间进行嵌套循环联接，该表也是外部表\n\
  \n  • 在先前联接的输出与 `Production.Product` 表之间进行嵌套循环联接，`Production.Product` 作为外部表\n\n\
  \  • 在先前的联接与 `HumanResources.Employee` 表之间进行嵌套循环联接，`HumanResource.Employee` 表作为外部表\n\
  \n• 附加处理：\n\n  • 常量扫描，为 `@LastName` 变量的 `LIKE` 操作提供占位符\n\n  • 计算标量，定义了 `@LastName`\
  \ 变量 `LIKE` 操作的结构，显示范围的上限和下限以及要检查的值\n\n  • 计算标量，将 `FirstName` 和 `LastName` 列组合成一个新列\n\
  \n  • 计算标量，计算来自 `Purchasing.PurchaseOrderDetail` 表的 `LineTotal` 列\n\n  • 计算标量，获取计算出的\
  \ `LineTotal` 并将其作为永久值存储在结果集中，以供进一步处理\n\n所有这些信息都可以通过浏览图形化执行计划中属性表所暴露的操作符详细信息来获取。\n\
  \n### 识别执行计划中的高代价步骤\n\n一旦理解了查询的执行计划，下一步就是识别执行计划中估计代价最高的步骤。尽管这些代价是估计值，并不能以任何方式反映现实情况，但它们是你将获得的用于衡量计划功能的唯一数字。因此，识别、理解并可能解决代价最高的操作可以带来巨大的性能收益。你可以看到以下是两个代价最高的步骤：\n\
  \n• `高代价步骤 1`：在 `Purchasing.PurchaseOrderHeader` 表上的聚集索引扫描占 36%。\n\n• `高代价步骤 2`：哈希匹配联接操作占\
  \ 32%。\n\n接下来的优化步骤是分析这些高代价步骤，以确定是否可以通过诸如重新设计查询或索引等技术来优化这些步骤。\n\n### 分析处理策略\n\n虽然优化器完成了计划的优化（你知道这一点，因为优化过程提前终止的原因是“找到了足够好的计划”），但这并不意味着查询和结构中不存在调优的机会。你可以遵循传统步骤开始评估它。\n\
  \n\n\n代价高昂的步骤 1 是一个聚集索引扫描。扫描操作本身不一定是个问题。它们仅仅表明，为了获取查询所需的信息，对相关对象（本例中是整个表）进行全表扫描的成本低于其他备选方案。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 25 章 ■ 数据库工作负载优化\n\n代价高昂的步骤 2 是查询的`哈希匹配`连接操作。这同样不一定是个问题。但是，有时候`哈希匹配`操作表明存在不良索引或缺失索引，或者查询无法利用现有索引，因此它们常常是需要优化的领域。至少，对于\
  \ OLTP 系统来说通常如此。对于大型数据仓库系统，`哈希匹配`可能是处理你将在那里看到的查询类型的理想选择。\n\n**提示** 有时你可能会发现，无法对处理策略中代价最高的步骤进行任何改进。在这种情况下，请专注于下一个代价最高的步骤以识别问题。如果所有步骤都无法进一步优化，那么就转向处理工作负载中下一个代价最高的查询。你可能需要考虑更改数据库设计或查询结构。\n\
  \n## 优化代价最高的查询\n\n一旦你诊断出具有高成本步骤的查询，下一阶段就是实施必要的修正以降低这些步骤的成本。\n\n对于一个问题的步骤，纠正措施可能有一个或多个替代解决方案。例如，是应该创建一个新索引，还是以不同方式构造查询？在这种情况下，你应该根据预期效果和所需的工作量来对解决方案进行优先级排序。例如，如果一个窄索引或多或少能完成这项工作，那么通常最好优先选择它，而不是可能导致业务测试的代码更改。更改代码也可能是干扰性较小的方法。你需要根据你所处的业务和应用架构来评估每种情况。\n\
  \n按预期收益的顺序单独应用解决方案，并衡量它们对查询性能的单独影响。最后，你可以应用能提供最大性能改进的解决方案（或一组解决方案）来纠正有问题的步骤。有时，很明显最佳解决方案会损害工作负载中的其他查询。例如，在大量列上创建新索引可能会损害操作查询的性能。然而，由于这并非总是如此，最好通过测试来确定此类优化技术对整个工作负载的影响。如果某个特定解决方案损害了工作负载的整体性能，请选择次优解决方案，同时密切关注工作负载的整体性能。\n\
  \n### 修改代码\n\n查询中代价最高的操作是对 `PurchaseOrderHeader` 表的聚集索引扫描。你首先需要了解的是，对于返回的查询和数据，聚集索引扫描是否是必要的，或者它可能是因为代码的原因，甚至是因为另一个索引或不同的索引结构可能效果更好而出现的。要开始理解为什么会出现聚集索引扫描，你应该查看扫描操作的属性。既然你得到了一个扫描，你也需要查看代码以确保它是可搜索的（sargable）。你特别需要关注\
  \ `Predicate` 属性，如图 25-8 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-531_1.jpg)\n\n图 25-8. 聚集索引扫描的谓词\n\n这是一个计算。在 `PurchaseOrderTable`\
  \ 表的 `VendorID` 列上存在一个可能对查询有用的索引，但因为你使用了 `COALESCE` 语句来过滤值，所以需要扫描整个表来检索信息。`COALESCE`\
  \ 运算符基本上是一种考虑给定值可能为 `NULL` 的方法，如果它是 `NULL`，则提供一个备选值，甚至可能是几个备选值。然而，它是一个函数，而在 `WHERE`\
  \ 子句、`JOIN` 条件或 `HAVING` 子句中针对列使用函数很可能导致扫描，因此你需要消除这个函数。由于这个函数，你不能简单地添加或修改索引，因为最终仍然会导致扫描。你可以尝试用一个\
  \ `OR` 子句重写查询，像这样：\n\n```sql\n...WHERE per.LastName LIKE @LastName AND\npoh.VendorID\
  \ = @VendorID\nOR poh.VendorID = poh.VendorID...\n```\n\n但在逻辑上，这与 `COALESCE` 操作并不相同。相反，它是将\
  \ `WHERE` 子句的一部分替换为另一部分，而不仅仅是使用 `OR` 结构。因此，你可以像这样重写整个存储过程的定义：\n\n```sql\nALTER PROCEDURE\
  \ dbo.PurchaseOrderBySalesPersonName\n    @LastName NVARCHAR(50),\n    @VendorID\
  \ INT = NULL\nAS\nIF @VendorID IS NULL\nBEGIN\n    SELECT poh.PurchaseOrderID,\n\
  \        poh.OrderDate,\n        pod.LineTotal,\n        p.[Name] AS ProductName,\n\
  \        e.JobTitle,\n        per.LastName + ', ' + per.FirstName AS SalesPerson,\n\
  \        poh.VendorID\n    FROM Purchasing.PurchaseOrderHeader AS poh\n    JOIN\
  \ Purchasing.PurchaseOrderDetail AS pod\n        ON poh.PurchaseOrderID = pod.PurchaseOrderID\n\
  \    JOIN Production.Product AS p\n        ON pod.ProductID = p.ProductID\n    JOIN\
  \ HumanResources.Employee AS e\n        ON poh.EmployeeID = e.BusinessEntityID\n\
  \    JOIN Person.Person AS per\n        ON e.BusinessEntityID = per.BusinessEntityID\n\
  \    WHERE per.LastName LIKE @LastName\n    ORDER BY per.LastName,\n        per.FirstName;\n\
  END\nELSE\nBEGIN\n    SELECT poh.PurchaseOrderID,\n        poh.OrderDate,\n    \
  \    pod.LineTotal,\n        p.[Name] AS ProductName,\n        e.JobTitle,\n   \
  \     per.LastName + ', ' + per.FirstName AS SalesPerson,\n        poh.VendorID\n\
  \    FROM Purchasing.PurchaseOrderHeader AS poh\n    JOIN Purchasing.PurchaseOrderDetail\
  \ AS pod\n        ON poh.PurchaseOrderID = pod.PurchaseOrderID\n    JOIN Production.Product\
  \ AS p\n        ON pod.ProductID = p.ProductID\n    JOIN HumanResources.Employee\
  \ AS e\n        ON poh.EmployeeID = e.BusinessEntityID\n    JOIN Person.Person AS\
  \ per\n        ON e.BusinessEntityID = per.BusinessEntityID\n    WHERE per.LastName\
  \ LIKE @LastName AND\n        poh.VendorID = @VendorID\n    ORDER BY per.LastName,\n\
  \        per.FirstName;\nEND\nGO\n```\n\n使用 `IF` 结构将查询分成了两个。使用相同的参数集运行它，导致执行时间从\
  \ 1313 毫秒变为 267 毫秒，这是一个相当显著的改进。对 `Purchasing.PurchaseOrderHeader` 的读取次数从 44 次增加到\
  \ 87 次，这可能不太好。但是对 `Purchasing.PurchaseOrderDetail` 的读取次数从 1,539 次下降到 763 次。综合考虑读取次数的减少和性能时间的降低，我们看到的是一个不错的解决方案。\n\
  \n执行计划当然不同了，如图 25-9 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ![](img/index-533_1.jpg)\n\n图 25-9. 拆分查询后的新执行计划\n\n现在，代价最高的两个操作符已经消失了。不再有扫描操作，所有的连接操作现在都是\
  \ `循环` 连接。但是，添加了一个新的数据访问操作。你现在看到了一个 `键查找` 操作，如第 11 章所述，因此你还有更多的调优机会。\n\n### 修复键查找操作\n\
  \n现在你知道有一个 `键查找` 操作，你需要确定第 11 章中建议的解决它的任何方法是否适用。首先，你需要知道在此操作中正在检索哪些列。\n\n\n\n"
- "# 索引优化\n\n这意味着访问键查找运算符的属性。这些属性显示了 `VendorID` 和 `OrderDate` 列。这意味着你只需通过非聚集索引的 `INCLUDE`\
  \ 部分将这些列添加到索引的叶级页中。你可以按如下方式修改该索引：\n\n```sql\nCREATE NONCLUSTERED INDEX [IX_PurchaseOrderHeader_EmployeeID]\
  \ ON [Purchasing].[PurchaseOrderHeader]\n(\n    [EmployeeID] ASC\n)\nINCLUDE (VendorID,\
  \ OrderDate)\nWITH DROP_EXISTING;\n```\n\n应用此索引会带来执行计划的改变和性能的调整。之前的结构和代码耗时为 267\
  \ 毫秒。使用这个新索引后，查询执行时间降至 56 毫秒。执行计划现在完全不同了，如图 25-10 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-534_1.jpg)\n\n`图 25-10.` 修改索引后的新执行计划\n\n至此，执行计划中只剩下嵌套循环联接和索引查找操作。尽管查询中有\
  \ `ORDER BY` 语句，但甚至不再有排序操作。这是因为针对 `Person` 表的索引查找输出是**有序的**。简而言之，就这个查询而言，你的状况已经相当不错了，但过程中现在有两个查询。\n\
  \n### 调优第二个查询\n\n消除 `COALESCE` 使你能够使用现有索引，但这样做实际上为你的查询创建了两条路径。因为你只使用了单个参数，只探索了第一条路径，从而忽略了第二个查询。让我们修改测试脚本，看看第二条查询路径将如何工作。\n\
  \n```sql\nDBCC FREEPROCCACHE();\nDBCC DROPCLEANBUFFERS;\nGO\n\nSET STATISTICS TIME\
  \ ON;\nGO\nSET STATISTICS IO ON;\nGO\n\nEXEC dbo.PurchaseOrderBySalesPersonName\
  \ @LastName = 'Hill%',\n    @VendorID = 1496;\nGO\n\nSET STATISTICS TIME OFF;\n\
  GO\nSET STATISTICS IO OFF;\nGO\n```\n\n运行此查询会产生一个完全不同的执行计划，如图 25-11 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-535_1.jpg)\n\n![](img/index-535_2.jpg)\n\n`图 25-11.` 存储过程中另一个查询的执行计划\n\
  \n这个新查询的行为不同是由于查询本身的差异。这里的主要问题是针对 `PurchaseOrderHeader` 表的聚集索引扫描。尽管 `VendorID` 上存在索引，你仍然看到了扫描操作。\n\
  \n再次，你可以查看该运算符的输出内容。这次，它不止两个列：`OrderDate`, `EmployeeID`, `PurchaseOrderID`。这些列虽然不大，但会增加索引的大小。\n\
  \n你需要评估索引大小的增加是否值得通过消除索引扫描带来的性能提升。我打算直接尝试，按如下方式修改索引：\n\n```sql\nCREATE NONCLUSTERED\
  \ INDEX IX_PurchaseOrderHeader_VendorID ON Purchasing.PurchaseOrderHeader (\n  \
  \  VendorID ASC\n)\nINCLUDE(OrderDate,EmployeeID,PurchaseOrderID)\nWITH DROP_EXISTING;\n\
  GO\n```\n\n应用索引前，执行时间约为 340 毫秒。应用索引后，执行时间降至 154 毫秒。执行计划现在如图 25-12. 所示。\n\n`图 25-12.`\
  \ 修改索引后的第二个执行计划\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n新的执行计划由索引查找和嵌套循环联接组成。存在一个排序运算符（计划中代价第二高的操作），按\
  \ `LastName` 和 `FirstName` 对数据排序。让检索过程处理这个排序可能有助于提高性能，但到目前为止我的调优相当成功，所以我暂时保持原样。\n\
  \n对于拆分查询还有一点需要考虑。当优化器处理这样的查询时，两个语句都将针对传入的参数值进行优化。因此，你可能会看到糟糕的执行计划，特别是对于使用 `VendorID`\
  \ 进行过滤的第二个查询，因为参数嗅探可能出现问题。\n\n为避免这种情况，应进行一次额外的调优工作。\n\n### 创建包装器过程\n\n因为你为了适应不同的数据查询机制而在存储过程中创建了两条路径，所以存在获得糟糕参数嗅探的可能性，因为无论传入什么参数，两条路径都会被编译。解决此问题的一个机制是将现有过程封装到一个包装器过程中。但首先，你必须为每个查询创建两个新过程，如下所示：\n\
  \n```sql\nCREATE PROCEDURE dbo.PurchaseOrderByLastName\n    @LastName NVARCHAR(50)\n\
  AS\nSELECT\n    poh.PurchaseOrderID,\n    poh.OrderDate,\n    pod.LineTotal,\n \
  \   p.[Name] AS ProductName,\n    e.JobTitle,\n    per.LastName + ', ' + per.FirstName\
  \ AS SalesPerson,\n    poh.VendorID\nFROM Purchasing.PurchaseOrderHeader AS poh\n\
  JOIN Purchasing.PurchaseOrderDetail AS pod\n    ON poh.PurchaseOrderID = pod.PurchaseOrderID\n\
  JOIN Production.Product AS p\n    ON pod.ProductID = p.ProductID\nJOIN HumanResources.Employee\
  \ AS e\n    ON poh.EmployeeID = e.BusinessEntityID\nJOIN Person.Person AS per\n\
  \    ON e.BusinessEntityID = per.BusinessEntityID\nWHERE per.LastName LIKE @LastName\n\
  ORDER BY per.LastName,\n    per.FirstName;\nGO\n\nCREATE PROCEDURE dbo.PurchaseOrderByLastNameVendor\n\
  \    @LastName NVARCHAR(50),\n    @VendorID INT\nAS\nSELECT\n    poh.PurchaseOrderID,\n\
  \    poh.OrderDate,\n    pod.LineTotal,\n    p.[Name] AS ProductName,\n    e.JobTitle,\n\
  \    per.LastName + ', ' + per.FirstName AS SalesPerson,\n    poh.VendorID\nFROM\
  \ Purchasing.PurchaseOrderHeader AS poh\nJOIN Purchasing.PurchaseOrderDetail AS\
  \ pod\n    ON poh.PurchaseOrderID = pod.PurchaseOrderID\nJOIN Production.Product\
  \ AS p\n    ON pod.ProductID = p.ProductID\nJOIN HumanResources.Employee AS e\n\
  \    ON poh.EmployeeID = e.BusinessEntityID\nJOIN Person.Person AS per\n    ON e.BusinessEntityID\
  \ = per.BusinessEntityID\nWHERE per.LastName LIKE @LastName AND\n    poh.VendorID\
  \ = @VendorID\nORDER BY per.LastName,\n    per.FirstName;\nGO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n然后，你需要修改现有的存储过程，使其如下所示：\n\n```sql\nALTER PROCEDURE dbo.PurchaseOrderBySalesPersonName\n\
  \    @LastName NVARCHAR(50),\n    @VendorID INT = NULL\nAS\nIF @VendorID IS NULL\n\
  BEGIN\n    EXEC dbo.PurchaseOrderByLastName @LastName\nEND\nELSE\nBEGIN\n    EXEC\
  \ dbo.PurchaseOrderByLastNameVendor @LastName, @VendorID\nEND\nGO\n```\n\n这样设置后，无论选择哪条代码路径，当这些查询第一次被调用时，每个过程都将获得自己独特的执行计划，从而避免了糟糕的参数嗅探。而且，这不会对性能时间产生负面影响。如果我现在运行这两个查询，结果大致相同。\n\
  \n将性能从 1313 毫秒降低到 56 毫秒或 154 毫秒，这是一个相当不错的执行时间缩减。如果这个查询在一分钟内被调用数百次，那么这种程度的缩减确实相当可观。但是，你应该始终回头评估对整体数据库工作负载的影响。\n\
  \n## 分析对数据库工作负载的影响\n\n一旦你优化了性能最差的查询，必须确保它不会损害其他查询的性能；否则，你的工作将功亏一篑。\n\n要分析整体工作负载的最终性能，你需要使用第\
  \ 15 章概述的技术。为了这个小型测试的目的，重新执行完整的工作负载并捕获扩展事件以记录整体性能。\n\n**■ 提示** 为了与原始扩展事件进行适当比较，请确保图形执行计划已关闭。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-538_1.jpg)\n\
  \n图 25-13 显示了捕获到的相应跟踪输出。\n\n\n\n"
- "# 第 25 章 ■ 数据库工作负载优化\n\n## 迭代优化阶段\n\n**图 25-13.** 显示优化代价最高查询对完整工作负载影响的扩展事件输出\n\n\
  根据此跟踪，表 25-5 总结了所考虑查询的资源使用情况和响应时间（即持续时间）。\n\n**表 25-5.** 优化前后，优化查询的资源使用情况和响应时间\n\
  \n| 列名 | 优化前 | 优化后 |\n| :--- | :--- | :--- |\n| 读取次数 | | |\n| 写入次数 | | |\n| CPU\
  \ | 16 ms | 0 ms |\n| 持续时间 | 1313 ms | 19.4 ms |\n\n■ **请注意**，绝对值不如优化前与对应优化后值之间的相对差异重要。数值间的相对差异表明了性能的提升。\n\
  \n优化性能最差的查询可能会损害工作负载中某些其他查询的性能。然而，只要工作负载的整体性能得到提升，就可以保留对该查询执行的优化。在本例中，其他查询未受到影响。但现在有一个查询比其他查询花费时间更长。它可能也需要优化，于是整个过程再次开始。\n\
  \n需要记住的一个重要点是，你需要多次迭代优化步骤。在每次迭代中，你可以识别一个或多个性能不佳的查询，并对这些查询进行优化以提高整体工作负载的性能。你必须持续迭代优化步骤，直到获得足够的性能或满足你的服务级别协议（`SLA`）。\n\
  \n除了分析资源密集型查询的工作负载外，你还必须分析工作负载是否存在错误条件。例如，如果你尝试向一个包含受唯一约束保护的列的表中插入重复行，`SQL Server`\
  \ 将拒绝新行并向应用程序报告错误条件。尽管数据未被输入表中，也没有执行有用的工作，但宝贵的资源却被用于确定数据无效并必须被拒绝。\n\n要识别由数据库请求引起的错误条件，你需要在\
  \ `扩展事件` 会话中包含以下内容（或者，你可以创建一个新会话，在错误或警告类别中查找这些事件）：\n\n- `error_reported`\n- `execution_warning`\n\
  - `hash_warning`\n- `missing_column_statistics`\n- `missing_join_predicate`\n- `sort_warning`\n\
  \n例如，考虑以下 SQL 查询：\n\n```sql\nINSERT INTO Purchasing.PurchaseOrderDetail\n(\n   \
  \ PurchaseOrderID,\n    DueDate,\n    OrderQty,\n    ProductID,\n    UnitPrice,\n\
  \    ReceivedQty,\n    RejectedQty,\n    ModifiedDate\n)\nVALUES\n(\n    1066,\n\
  \    '1/1/2009',\n    1,\n    42,\n    98.6,\n    5,\n    4,\n    '1/1/2009'\n);\n\
  GO\n```\n\n```sql\nSELECT p.[Name], psc.[Name]\nFROM Production.Product AS p, Production.ProductSubCategory\
  \ AS psc;\nGO\n```\n\n图 25-14 显示了相应的会话输出。\n\n**图 25-14.** 显示 SQL 工作负载引发错误的扩展事件输出\n\
  \n从图 25-14 的 `扩展事件` 输出中，你可以看到我故意生成的两个错误发生了：\n\n- `error_reported`\n- `missing_join_predicate`\n\
  \n`error_reported` 错误是由 `INSERT` 语句引起的，该语句尝试插入的数据未通过引用完整性检查；具体来说，它尝试插入 `ProductId\
  \ = 42`，但 `Production.Product` 表中不存在该值。从 `error_number` 列中，你可以看到错误编号是 `547`。`message`\
  \ 列显示了错误的完整描述。不过值得注意的是，`error_reported` 可能相当“健谈”，返回大量数据，并非所有数据都有用。\n\n第二种错误 `missing_join_predicate`\
  \ 是由 `SELECT` 语句引起的。\n\n```sql\nSELECT p.[Name], c.[Name]\nFROM Production.Product\
  \ AS p, Production.ProductSubCategory AS c;\nGO\n```\n\n如果你仔细查看 `SELECT` 语句，会发现该查询没有在两张表之间指定\
  \ `JOIN` 子句。表之间缺少连接谓词通常会导致不准确的结果集和高成本的查询计划。这就是所谓的 `笛卡尔连接`，它会导致 `笛卡尔积`，即一张表的每一行与另一张表的每一行组合。你必须在“错误和警告”部分识别引起此类事件的查询，并实施必要的修复。例如，在上面的\
  \ `SELECT` 语句中，你不应该将 `Production.ProductCategory` 表的每一行与 `Production.Product` 表的每一行连接起来——你只应该连接具有匹配\
  \ `ProductCategoryID` 的行，如下所示：\n\n```sql\nSELECT p.[Name], c.[Name]\nFROM Production.Product\
  \ AS p\nJOIN Production.ProductSubCategory AS c\n    ON p.ProductSubcategoryID =\
  \ c.ProductSubcategoryID;\n```\n\n即使在你彻底分析并优化了工作负载之后，你也必须记住，工作负载优化不是一个一次性的过程。数据库上的工作负载或数据分布会随时间变化，因此你应该定期检查你的查询是否针对当前情况进行了优化。你也可能发现数据库本身设计上的缺陷。过度规范化导致的过多连接或不当反规范化导致的过多列，都可能导致查询性能不佳，且没有真正的优化机会。在这种情况下，你将需要考虑重新设计数据库以获得更优化的结构。\n\
  \n## 总结\n\n正如你在本章所学，优化数据库工作负载需要一系列工具、实用程序和命令来分析工作负载中涉及的查询的不同方面。你可以使用 `扩展事件` 来分析工作负载的全局情况并识别高成本查询。一旦识别出高成本查询，你可以使用查询窗口和各种\
  \ `SQL` 命令来排查与这些高成本查询相关的问题。根据检测到的高成本查询问题，你可以应用一组或多组优化技术来提高查询性能。对高成本查询的优化应能提升工作负载的整体性能；如果未能实现这一点，你应该回滚所做的更改。\n\
  \n在下一章中，我将简明扼要地总结与性能相关的最佳实践。你将能够把这些信息作为快速简便的参考。\n\n"
- '# 第 26 章


  '
- '# SQL Server 优化检查清单


  如果你已经阅读了本书前 25 章，那么你应该理解了性能优化涉及的主要方面。你也明白这是一项具有挑战性且持续进行的活动。


  我希望在本章做的是提供一份性能监控检查清单，可以作为数据库开发人员和 `DBA` 在现场时的快速参考。其理念类似于可撕下的最佳实践卡片。本章并未涵盖所有内容，但它在一个地方总结了一些主要的调优活动，这些活动可以快速并显著地影响你的
  `SQL Server` 系统的性能。我已将这些检查清单项目分类为以下几个部分：


  - 数据库设计

  - 配置设置

  - 数据库管理

  - 数据库备份

  - 查询设计


  每个部分都包含若干优化建议和技术。在适当的情况下，每个部分也交叉引用了本书中提供更详细信息的具体章节。


  ## 数据库设计



  '
- '# 面向性能的数据库设计考量


  数据库设计是一个宽泛的主题，无法在一本查询调优书籍的简短章节中详尽阐述；尽管如此，我建议您关注以下几个设计方面，以确保从早期阶段就重视数据库性能：


  *   平衡欠规范化与过度规范化

  *   利用实体完整性约束

  *   利用域和参照完整性约束

  *   采用索引设计的最佳实践

  *   避免在存储过程名称中使用 `sp_` 前缀

  *   最小化触发器的使用

  *   考虑将表放入内存存储


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ### 平衡欠规范化与过度规范化


  在设计数据库时，您有两个极端的选项：


  *   将完整数据保存在单个扁平表中，几乎没有规范化。

  *   通过将每个属性拆分成自己的表，从而以细粒度的表保存数据，允许每个属性保存无限数量的多个值。


  请别误会。有些场景非常适合使用 NoSQL 风格的数据库，采用键值对机制进行存储甚至检索。但是，关系型存储仍然有其必要性。合理的规范化能提升数据库性能。拥有大量列的宽表通常是欠规范化数据库的特征。`欠规范化`会导致数据过度重复，可能引发错误结果，并常常损害查询性能。例如，在一个订单系统中，您可以将客户资料和该客户的所有订单保存在单个表中，如表
  26-1 所示。


  **表 26-1. 原始客户表**


  | CustID | Name | Address | Phone | OrderDt | ShippingAddress |

  | :--- | :--- | :--- | :--- | :--- | :--- |

  | Liu Hong | Boise, ID, USA | 123-456-7890 | 08-Jul-04 | Boise, ID, USA |

  | Liu Hong | Boise, ID, USA | 123-456-7890 | 10-Jul-04 | Austin, TX, USA |


  将客户资料和订单信息一起保存在单个表中，会导致客户资料在该客户的每个订单中重复出现，使得表中的行非常宽。结果，一个数据页中可以保存的客户资料数量就更少了。对于一个只关心一系列客户资料（而非其订单信息）的查询，与将客户资料单独保存在一张表的设计相比，需要读取更多的数据页。此外，由于所有数据都在一个大表中，您会看到更多的锁和并发问题，因为更多人会更频繁地访问同一页或同一行中的相同数据。这一点尤其明显，因为每页存储的数据行会更少（因为行更宽）。为了避免欠规范化的性能影响，您必须将具有
  1:N 关系的两个逻辑实体（例如，客户资料和订单）规范化到单独的表中，如表 26-2 和表 26-3 所示。


  **表 26-2. 新的客户表**


  | CustID | Name | Address | Phone |

  | :--- | :--- | :--- | :--- |

  | Liu Hong | Boise, ID, USA | 123-456-7890 |


  **表 26-3. 订单表**


  | CustID | OrderDt | ShippingAddress |

  | :--- | :--- | :--- |

  | 08-Jul-04 | Boise, ID, USA |

  | 10-Jul-04 | Austin, TX, USA |


  是的，这些表还有进一步规范化的可能；然而，这取决于您和您的业务部门来决定是否需要这样做。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  同样，过度规范化对查询性能也不利。`过度规范化`会导致在过多狭窄的表之间进行过多的连接。对一个表中基数的错误估计可能会在连接时严重影响大量其他表。尽管 20 个表的连接可以运行得很好，而
  2 个表的连接也可能出问题，但一个好的经验法则是：当连接条件涉及的表超过 8 到 12 个时，应更仔细地检查该查询。这并非意味着低于这个数量就是好的，高于就是坏的；但是，这个连接数量应该作为一个评估的标志。为了从数据库中获取任何有用的内容，数据库开发人员必须在
  SQL 查询中连接大量的表。例如，如果您为客户的姓名、地址和电话号码分别创建了单独的表，那么您将不得不连接至少三个表来检索客户信息。如果数据（例如，客户姓名和地址）具有一对一关系，并且通常被查询一起访问，那么将数据规范化到单独的表中反而会损害查询性能。


  ### 利用实体完整性约束


  `数据完整性`对于确保数据库中的数据质量至关重要。数据完整性的一个基本组成部分是`实体完整性`，它将一行定义为特定表中的唯一实体；也就是说，表中的每一行都必须是唯一可标识的。用作表中唯一行标识符的列（或多列）必须表示为该表的主键。


  有时，一个表可能包含一个额外的列（或多列），它们也可以用来唯一标识表中的某一行。例如，一个 `Employee` 表可能有 `EmployeeID` 和 `SocialSecurityNumber`
  列。


  `EmployeeID` 列作为唯一的行标识符，可以定义为 `主键`。同样，`SocialSecurityNumber` 列可以定义为 `候选键`。在 SQL
  Server 中，可以使用唯一约束来定义候选键，它们本质上是主键的“小兄弟”。实际上，唯一约束和主键约束在后台都使用唯一索引。


  值得注意的是，关于使用自然键（例如前面示例中的 `SocialSecurityNumber` 列）还是代理键（例如 `EmployeeID` 列），存在着真诚的分歧。


  我见过两种设计都取得了成功，但每种方法都有其优缺点。与其建议选其一，我不如给您几个同时使用它们的理由，以及与每种方法相关的一些成本，从而避免陷入教条式的争论。标识列通常是
  `INT` 或 `BIGINT` 类型，这使得它更窄，更容易建立索引，从而提高性能。此外，将主键的值与任何业务知识分离，在某些圈子里被认为是良好的设计。这种方法的一个缺点是，这些数字有时会被赋予业务含义，而这绝不应该发生。另一件需要记住的事情是，您必须为候选键创建唯一约束，以防止在不应该存在重复的情况下创建多行。这增加了您必须存储和维护的信息量。自然键提供了清晰、人类可读、具有真实业务含义的主键。它们往往是更宽的字段——有时非常宽——使得它们在索引内的效率较低。此外，有时数据可能会发生变化，这会在您的数据库和企业中产生深远的连锁影响。


  我只想重申，两种方法都可以很好地工作，并且每种都提供了大量的调优机会。只要应用和维护得当，任何一种方法都能保护您数据的完整性。



  '
- "# 除了维护数据完整性，唯一索引还有助于优化器生成高效的执行计划\n\n除了维护数据完整性之外，唯一索引——实体完整性约束的主要载体——还有助于优化器生成高效的执行计划。SQL\
  \ Server 通常能比搜索非唯一索引更快地搜索唯一索引。这是因为唯一索引中的每一行都是唯一的；一旦找到一行，SQL Server 就不需要继续查找其他匹配的行（优化器知道这一点）。如果某一列用于排序（或\
  \ `GROUP BY` 或 `DISTINCT`）操作，请考虑在该列上定义唯一约束（使用唯一索引），因为具有唯一约束的列通常比没有唯一约束的列排序更快。\n\n\
  ## 理解实体完整性或唯一约束的性能优势\n\n考虑一个例子来理解实体完整性或唯一约束带来的性能优势。假设你想要修改 `Production.Product`\
  \ 表上现有的唯一索引。\n\n```sql\nCREATE NONCLUSTERED INDEX [AK_Product_Name]\nON [Production].[Product]\
  \ ([Name] ASC) WITH (\n    DROP_EXISTING = ON)\nON [PRIMARY];\nGO\n```\n\n![](img/index-545_1.jpg)\n\
  \n![](img/index-545_2.jpg)\n\n**第 26 章 ■ SQL Server 优化清单**\n\n该非聚集索引不包含 `UNIQUE`\
  \ 约束。因此，尽管 `[Name]` 列包含唯一值，但非聚集索引中缺乏 `UNIQUE` 约束，无法提前将此信息提供给优化器。现在，让我们考虑 `UNIQUE`\
  \ 约束（或缺失的 `UNIQUE` 约束）对以下 `SELECT` 语句的性能影响：\n\n```sql\nSELECT DISTINCT\n    (p.[Name])\n\
  FROM Production.Product AS p;\n```\n\n**图 26-1.** `[Name]` 列上没有 `UNIQUE` 约束的执行计划\n\
  \n从执行计划中可以看到，使用了非聚集索引 `AK_ProductName` 来检索数据，然后对数据执行 `Stream Aggregate` 操作，以便在 `[Name]`\
  \ 列上对数据进行分组，从而可以从最终结果集中删除重复的 `[Name]` 值。请注意，如果优化器提前知道 `[Name]` 列的唯一性，那么 `Stream\
  \ Aggregate` 操作本来是不需要的。你可以通过使用 `UNIQUE` 约束定义非聚集索引来实现这一点，如下所示：\n\n```sql\nCREATE\
  \ UNIQUE NONCLUSTERED INDEX [AK_Product_Name]\nON [Production].Product\nWITH (\n\
  \    DROP_EXISTING = ON)\nON [PRIMARY];\nGO\n```\n\n**图 26-2.** `[Name]` 列上具有 `UNIQUE`\
  \ 约束的 `SELECT` 语句的新执行计划\n\n一般来说，实体完整性约束（换言之，主键和唯一约束）为优化器提供了关于预期结果的有用信息，帮助优化器生成高效的执行计划。值得注意的是，`sys.dm_db_index_usage_stats`\
  \ 不会显示何时针对定义唯一约束的索引运行了约束检查。\n\n**第 26 章 ■ SQL Server 优化清单**\n\n### 受益于域和引用完整性约束\n\
  \n数据完整性的另外两个重要组成部分是**域完整性**和**引用完整性**。可以通过限制列的数据类型、定义输入数据的格式以及限制列的可接受值范围来强制执行列的域完整性。SQL\
  \ Server 提供以下功能来实现域完整性：数据类型、`FOREIGN KEY` 约束、`CHECK` 约束、`DEFAULT` 定义和 `NOT NULL`\
  \ 定义。如果应用程序要求将数据列的值限制在某个值范围内，则此业务规则可以在应用程序代码中实现，也可以在数据库架构中实现。在数据库中使用域约束（例如 `CHECK`\
  \ 约束）实现此类业务规则通常有助于优化器生成高效的执行计划。\n\n\n\n要理解域完整性带来的性能优势，请考虑以下示例：\n\n```sql\n--创建两个测试表\n\
  \nIF (SELECT OBJECT_ID('dbo.Test1')\n) IS NOT NULL\nDROP TABLE dbo.Test1;\nGO\n\n\
  CREATE TABLE dbo.Test1 (\n    C1 INT,\n    C2 INT CHECK (C2 BETWEEN 10 AND 20)\n\
  ) ;\n\nINSERT INTO dbo.Test1\nVALUES (11, 12);\nGO\n\nIF (SELECT OBJECT_ID('dbo.Test2')\n\
  ) IS NOT NULL\nDROP TABLE dbo.Test2;\nGO\n\nCREATE TABLE dbo.Test2 (C1 INT, C2 INT);\n\
  \nINSERT INTO dbo.Test2\nVALUES (101, 102);\n```\n\n现在执行以下两条 `SELECT` 语句：\n\n```sql\n\
  SELECT T1.C1,\n       T1.C2,\n       T2.C2\nFROM   dbo.Test1 AS T1\n       JOIN\
  \ dbo.Test2 AS T2\n            ON  T1.C1 = T2.C2\n            AND T1.C2 = 20;\n\
  GO\n\nSELECT T1.C1,\n       T1.C2,\n       T2.C2\nFROM   dbo.Test1 AS T1\n     \
  \  JOIN dbo.Test2 AS T2\n            ON  T1.C1 = T2.C2\n            AND T1.C2 =\
  \ 30;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-547_1.jpg)\n\
  \n"
- '# 第 26 章 ■ SQL Server 优化清单


  这两条 `SELECT` 语句看起来完全相同，唯一的区别在于谓词值（第一条语句中是 `20`，第二条中是 `30`）。尽管形式相同，但优化器对它们的处理方式却不同，原因是
  `T1.C2` 列上定义了 `CHECK` 约束，如图 26-3 中的执行计划所示。


  **图 26-3.** 谓词值在 `CHECK` 约束边界内和边界外的执行计划


  从执行计划中可以看出，对于第一条查询（`T1.C2 = 20`），优化器访问了两个表的数据。对于第二条查询（`T1.C2 = 30`），优化器根据 `T1.C2`
  列上对应的 `CHECK` 约束了解到，该列不可能包含 `10` 到 `20` 范围之外的任何值。因此，优化器甚至不需要访问表中的数据。相应地，第二条查询的相对估计成本为
  `0%`。


  我在第 18 章的“声明性引用完整性”一节中详细解释了引用完整性的性能优势。


  因此，您不仅应该使用域约束和引用来实现数据完整性，还应该利用它们来帮助优化器生成高效的查询计划。要了解域和引用完整性的其他性能优势，请参考第 18 章的“使用域和引用完整性”一节。


  ### 采用索引设计最佳实践


  最常见的优化建议——并且通常是提升性能的最大贡献者之一——就是为数据库工作负载实施正确的索引。索引与表不同，表用于存储数据，甚至可以在不完全了解查询的情况下进行设计（只要表能正确表示业务实体）。相反，索引必须通过仔细审查数据库查询来设计。


  除了常见且显而易见的情况（如主键和唯一索引）之外，请避免陷入在不了解查询的情况下设计索引的误区。即使是对于主键和唯一索引，我也建议您在开始设计数据库查询时，验证这些索引的适用性。考虑到索引对数据库性能的重要性，在设计索引时必须谨慎。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 26 章 ■ SQL Server 优化清单


  尽管索引的性能方面已在第 8、11 和 12 章中详细解释，但这里我将重申一份简短的建议清单，以便于您参考：


  -   为索引选择窄列。

  -   确保候选列中数据的选择性非常高（即该列必须具有大量唯一值）。

  -   优先选择整数数据类型（或整数数据类型的变体）的列。同时，避免在 `VARCHAR` 等字符串数据类型的列上创建索引。

  -   在多列索引中，考虑将选择性更高的列列在前面。

  -   在索引中使用 `INCLUDE` 列表，作为一种在不更改索引键结构的情况下使索引覆盖查询的方法。通过将列添加到键中（而非 `INCLUDE` 列表），您可以避免昂贵的书签查找操作。

  -   在决定对哪些列创建索引时，要特别注意查询的 `WHERE` 子句、`JOIN` 条件列和 `HAVING` 子句。这些可以作为进入表的入口点，特别是当
  `WHERE` 子句中的条件对某个列使用高选择性的值或常量进行数据过滤时。这样的子句可以使该列成为索引的主要候选。

  -   在选择索引类型（聚集或非聚集）时，请牢记聚集索引和非聚集索引类型的优缺点。


  设计聚集索引时要格外小心，因为表上的每个非聚集索引都依赖于聚集索引。因此，在设计和实现聚集索引时，请遵循以下建议：


  -   尽可能保持聚集索引狭窄。您不希望因为拥有一个宽的聚集索引而加宽所有非聚集索引。

  -   首先创建聚集索引，然后在表上创建非聚集索引。

  -   如果需要，在 `CREATE INDEX` 命令中使用 `DROP_EXISTING = {ON|OFF}` 选项以单一步骤重建聚集索引。您不希望重建表上所有非聚集索引两次：一次在删除聚集索引时，另一次在重新创建聚集索引时。

  -   不要在频繁更新的列上创建聚集索引。如果这样做，表上的非聚集索引将因为需要与聚集索引键值保持同步而产生额外负载。

  -   在适用的情况下，例如当您需要跨大型数据集进行聚合时，考虑使用列存储索引。


  为了跟踪您已创建的索引并确定需要创建的其他索引，您应该利用 SQL Server 2014 提供的动态管理视图。通过定期（比如每周一次）检查 `sys.dm_db_index_usage_stats`
  中的数据，您可以确定哪些索引实际上正在被使用，哪些是冗余的。那些没有为您的查询做出贡献以帮助您提升性能的索引，只会消耗系统资源。它们不仅需要更多的磁盘空间，而且在表中数据发生变化时，还需要额外的
  I/O 来维护索引内的数据。另一方面，查询 `sys.dm_db_missing_indexes_details` 将显示系统认为缺失的潜在索引，甚至会建议 `INCLUDE`
  列。您可以访问 DMV `sys.dm_db_missing_indexes_groups_stats` 来查看有关可能受益于特定索引组的查询被调用次数的汇总信息。请记住，要彻底测试这些建议，不要假定它们一定是正确的。所有这些都只是建议。


  将这些技巧结合起来，可以为您提供一个长期维护系统中索引的最佳方法。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 26 章 ■ SQL Server 优化清单


  ### 避免对存储过程名称使用 `sp_` 前缀


  作为规则，不要为用户存储过程使用 `sp_` 前缀，因为 SQL Server 会假定以 `sp_` 开头的存储过程是系统存储过程，而它们应该位于 `master`
  数据库中。使用 `sp` 或 `usp` 作为用户存储过程的前缀非常普遍。这既不是主要的性能问题，也不是大麻烦，但何必自找麻烦呢？`sp_` 前缀带来的性能影响在第
  19 章的“小心命名存储过程”一节中有详细解释。完全去掉前缀是个不错的方法。您有足够的空间使用描述性的对象名称，无需使用那些不能增加查询功能定义的奇怪缩写。


  ### 最小化触发器的使用




  触发器为在数据库内自动化行为提供了一种极具吸引力的方法。由于触发器在数据被其他进程（无论这些进程是什么）操纵时触发，因此可被用于确保某些功能在数据变更时自动执行。然而，同样的功能也使其具有危险性，因为对于正在系统上工作的开发人员或数据库管理员（DBA）来说，它们并非立即可见。在设计查询和排查性能问题时，必须考虑到触发器的存在。由于它们带有一种隐性的成本，因此需要仔细权衡是否使用触发器。在使用触发器之前，请确保解决当前问题的唯一方法就是触发器。如果你确实使用了触发器，请在尽可能多的地方记录这一事实，以确保其他开发人员和
  DBA 能考虑到触发器的存在。


  ### 考虑将表放入内存存储


  尽管新的内存存储机制存在大量限制，但其性能提升非常显著。如果你拥有一个高吞吐量的 OLTP 系统，并且观察到大量的 I/O 争用，尤其是在门锁（latches）方面，那么内存存储是一个可行的选择。你可能还想探索将内存存储用于表变量，以帮助提升其性能。如果你的数据不需要持久化，你甚至可以使用
  `SCHEMA_ONLY` 持久性选项在内存中创建表。所有这些方法都能带来显著的性能收益。


  但请记住，你必须有足够的内存来支持这些选项。这里没有什么魔法。你是在通过投入大量的内存（也就是金钱）来解决问题。此外，要实现这一点，你还必须运行 SQL Server
  的企业版。


  ## 配置设置


  以下是服务器和数据库配置设置的清单，这些设置对数据库性能有重大影响：

  - 内存配置选项

  - `并行的成本阈值`

  - `最大并行度`

  - `即席工作负载优化`

  - `已阻塞进程阈值`

  - 数据库文件布局

  - 数据库压缩


  我将在后续章节中更详细地介绍这些设置。


  ### 内存配置选项


  如第 2 章“SQL Server 内存管理”部分所述，强烈建议将 `最大服务器内存` 设置配置为一个由系统配置确定的非默认值。SQL Server 的这些内存配置在第
  2 章的“内存瓶颈分析”和“内存瓶颈解决方案”部分有详细说明。


  ### 并行的成本阈值


  在具有多处理器的系统上，可以并行执行查询。并行的默认值为 5。这代表优化器估计该查询需要执行五秒的成本。在大多数情况下，我发现这个值设置得太低；换句话说，设置更高的并行阈值会带来更好的性能。在你的系统上进行测试将帮助你确定合适的值。为这个值提供建议可能有点危险，但我还是要这么做。我会从测试值
  35 开始，看看后续效果如何。


  ### 最大并行度


  当系统有多个可用处理器时，默认情况下 SQL Server 会在并行执行期间使用所有处理器。


  为了更好地控制机器负载，你可能会发现限制并行执行使用的处理器数量是有用的。此外，你可能需要设置处理器关联性，以便为操作系统以及与 SQL Server 一起运行的其他服务保留特定的处理器。完全禁用并行可能会使
  OLTP 系统受益。首先尝试增加并行的成本阈值，因为即使在 OLTP 系统中，也有一些查询会从并行执行中获益。你也可以探索使用资源调控器来控制某些工作负载的可能性。


  ### 即席工作负载优化


  如果你的系统的主要调用是以即席或动态 SQL 的形式发出，而不是通过定义良好的存储过程或参数化查询（例如你在一些对象关系映射（ORM）软件实现中可能看到的那样），那么启用
  `即席工作负载优化` 设置将减少过程缓存的消耗，因为对于初始查询调用，会创建计划存根，而不是完整的执行计划。


  这将在第 17 章中详细讨论。


  ### 已阻塞进程阈值


  `已阻塞进程阈值` 设置以秒为单位定义触发已阻塞进程报告的时间点。当查询运行并超过此阈值时，报告就会被触发。同时也会触发一个警报，可用于发送电子邮件或短信。测试单个系统以确定应将其设置为何值。你可以使用
  SQL Profiler 定义的跟踪中的事件来监控此设置。


  ### 数据库文件布局


  为方便参考，以下是布局数据库文件时应考虑的最佳实践：

  - 将用户数据库的数据文件和事务日志文件放在不同的磁盘上。这允许事务日志磁头顺序推进，而不会因数据文件常用的非顺序 I/O 而随机移动。

  - 将事务日志放在专用磁盘上也能增强数据保护。如果数据库磁盘发生故障，你将能够通过备份事务日志来保存直至故障发生点的已完成事务。在恢复过程中使用这个最后的事务日志备份，你将能够将数据库恢复到故障发生点。这被称为
  `时间点恢复`。

  - 避免为事务日志使用 `RAID 5`，因为对于每个写入请求，`RAID 5` 磁盘阵列产生的磁盘 I/O 次数是 `RAID 1` 或 `10` 的两倍。

  - 你可以为数据文件选择 `RAID 5`，因为即使在繁重的 OLTP 系统中，读取请求的数量通常是写入请求的七到八倍。此外，对于读取请求，`RAID 5` 的性能与具有相同总磁盘数的
  `RAID 1` 和 `RAID 10` 相似。

  - 考虑转向更现代的磁盘子系统，如 `SSD` 或 `FusionIO`。


  有关数据库文件布局和 RAID 子系统的详细理解，请参阅第 3 章的“磁盘瓶颈解决方案”部分。


  ### 数据库压缩


  自 2008 年起，SQL Server 的企业版和开发版就提供了数据压缩功能。由于更多数据存储在单个页面上，这可以在空间使用和性能方面带来巨大收益。这些收益的代价是增加了系统
  CPU 和内存的开销；然而，收益通常远远超过成本。在实施压缩时请考虑到这一点。


  ## 数据库管理


  供你参考，以下是与性能相关的数据库管理活动的简要清单，你应将其作为管理数据库服务器过程的一部分定期执行：

  - 保持统计信息最新。

  - 将索引碎片保持在最低水平。

  - 避免使用 `自动关闭` 或 `自动收缩` 等自动数据库功能。

  - 最小化 SQL 跟踪的开销。


  在以下部分，我将更详细地介绍上述活动。




  **注意** 有关 SQL Server 2014 管理需求与方法的详细说明，请参阅微软 SQL Server 联机手册文章“数据库引擎功能与任务”（[`bit.ly/SIlz8d`](http://bit.ly/SIlz8d)）。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 26 章 ■ SQL Server 优化检查清单


  ### 保持统计信息最新


  数据库统计信息对性能的影响在第 12 章中有详细解释；不过，这个简短的清单将作为保持统计信息最新的快速参考：


  -   允许 SQL Server 使用配置参数 `AUT0_CREATE_STATISTICS` 和 `AUTO_UPDATE_STATISTICS` 的默认设置，自动维护表中数据分布的统计信息。

  -   作为一种主动措施，您可以在系统需要且支持的情况下，以编程方式定期更新每个数据库对象的统计信息。这种做法可以在自动更新统计信息功能未能提供满意结果时，部分保护您的数据库免受过时统计信息的影响。在第
  12 章中，我将说明如何设置一个 SQL Server 作业来以编程方式定期更新统计信息。

  -   请记住，您还可以异步方式更新统计信息。这减少了更新统计信息时对其的争用；因此，如果您的系统访问量相当稳定，可以使用此方法更频繁地更新统计信息。


  **注意** 请确保在索引碎片整理作业完成之前安排统计信息更新作业，如本章后面所述。


  ### 保持最低限度的索引碎片


  以下最佳实践将帮助您保持最低限度的索引碎片：


  -   在非高峰时段定期对数据库进行碎片整理。

  -   定期确定索引的碎片级别；然后，根据碎片情况，要么重建索引，要么执行第 13 章中概述的碎片整理查询来整理索引碎片。

  -   请记住，非常小的表根本不需要进行碎片整理。

  -   对于超大型数据库，整理索引碎片时可能适用不同的规则。

  -   如果您的索引仅用于单次查找操作，那么碎片不会影响性能。


  ### 避免使用 AUTO_CLOSE 或 AUTO_SHRINK 等数据库函数


  `AUTO_CLOSE` 会在最后一个用户连接关闭时干净地关闭数据库并释放其所有资源。这意味着缓存中的所有数据和查询都会被自动清空。当下一个连接到来时，不仅数据库需要重启，所有数据也必须重新加载到缓存中。此外，存储过程和其他查询也需要重新编译。这对大多数数据库系统来说是一项极其昂贵的操作。请将
  `AUT0_CL0SE` 保留为默认的 OFF 设置。


  `AUTO_SHRINK` 会定期收缩数据库的大小。它可以收缩数据文件，并且在简单恢复模式下，也可以收缩日志文件。在此过程中，它可能会阻塞其他进程，严重减慢系统速度。通常，在启用了
  `AUTO_SHRINK` 的系统上，文件增长也被设置为自动发生，因此当数据或日志文件需要增长时，您的系统会再次变慢。此外，您会看到物理文件存储在操作系统级别变得碎片化，严重影响性能。请将数据库大小设置为合适的大小，并监控其增长需求。如果必须自动增长，请按物理增量增长，而不是按百分比增长。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ## 数据库备份


  数据库备份是一个广泛的话题，在这本查询优化书籍中无法得到应有的重视。尽管如此，我建议当涉及到数据库性能时，请关注数据库备份过程的以下几个方面：


  -   差异备份和事务日志备份频率

  -   备份分布

  -   备份压缩


  接下来的章节将详细阐述这些建议。


  ### 差异备份和事务日志备份频率


  对于 OLTP 数据库，定期备份数据库是强制性的，以便在发生故障时，可以将数据库还原到不同的服务器上。对于大型数据库，完整的数据库备份通常需要很长时间，因此不能频繁执行完整备份。因此，完整备份在较长的时间间隔执行，而在两个连续完整备份之间，安排更频繁的差异备份和事务日志备份。通过设置频繁的差异备份和事务日志备份，如果数据库完全故障，可以将数据库恢复到某个时间点。


  差异备份可用于减少完整备份的开销，因为它只备份自上次完整备份以来更改的数据。因为这可能快得多，所以对生产系统造成的减速也更少。每种情况都是独特的，因此您需要找到最适合您的方法。作为一般规则，我建议每周进行一次完整备份，然后每天进行差异备份。之后，您可以确定事务日志备份的需求。


  频繁备份事务日志会给服务器增加少量开销，尤其是在高峰时段。对于大多数企业来说，可接受的数据丢失量（以时间衡量）通常优先于节省日志磁盘空间或提供理想的数据库性能。因此，在安排事务日志备份时，必须考虑到可接受的数据丢失量，而不是随意将备份计划设置为较短的时间间隔。


  ### 备份计划分布


  当需要备份多个数据库时，必须确保所有完整备份不会安排在同一时间，以免硬件资源同时受到冲击。如果备份过程涉及将数据库备份到中央 SAN 磁盘阵列，那么来自所有数据库服务器的完整备份必须分布在备份时间窗口内，以便中央备份基础设施不会同时受到过多备份请求的冲击。同时用大量备份请求淹没中央基础设施，会迫使基础设施的组件花费大量资源来管理过多的请求。这种资源管理不善会显著增加备份持续时间，导致完整备份在高峰时段继续进行，从而影响用户请求的性能。


  为了最大限度地减少完整备份过程对数据库性能的影响，您必须首先确定可以安排完整备份的非高峰时段，然后将完整备份分布在该非高峰时段内，如下所示：


  1.  确定必须备份的数据库数量。

  2.  根据数据库对业务的重要性进行优先级排序。

  3.  确定可以安排完整数据库备份的非高峰时段。

  4.  按以下公式计算两个连续完整备份之间的时间间隔：时间间隔 = （总备份时间窗口） / （完整备份数量）。

  5.  按照数据库优先级顺序安排完整备份，第一个备份从备份窗口开始时间启动，后续备份按照上述方程计算的时间间隔均匀分布。


  这种完整备份的均匀分布将确保备份基础设施不会同时受到过多备份请求的冲击，从而减少完整备份对数据库性能的影响。


  ### 备份压缩




  '
- '# SQL Server 优化检查清单


  对于较大的数据库，备份时长和备份文件大小通常会成为一个问题。过长的备份时长使得在管理时间窗口内完成备份变得困难，进而开始影响最终用户的体验。备份文件的大尺寸使得备份文件的空间管理颇具挑战性，并且当通过网络执行备份到集中备份基础设施时，会增加网络压力。压缩也能加快备份进程，因为需要写入磁盘的数据更少了。


  优化备份时长、备份文件大小以及由此产生的网络压力的推荐方法是使用**备份压缩**。SQL Server 2008R2 SP1 及更高版本的 Standard 版本及以上版本支持备份压缩。


  ## 查询设计


  以下是设计数据库查询时应遵循的与性能相关的最佳实践列表：


  -   使用命令 `SET NOCOUNT ON`。

  -   显式定义对象的所有者。

  -   避免**非 Sargable** 的搜索条件。

  -   避免在 `WHERE` 子句的列上使用算术运算符和函数。

  -   避免优化器提示。

  -   远离嵌套视图。

  -   确保没有隐式数据类型转换。

  -   最小化日志记录开销。

  -   采用重用执行计划的最佳实践。

  -   采用数据库事务的最佳实践。

  -   消除或减少数据库游标的开销。

  -   原生编译存储过程。


  我将在后续章节中详细说明每条最佳实践。


