  ON dbo.Test1 (C1);\n```\n\n由于该表有一个聚集索引，非聚集索引的行定位器包含了聚集索引键值。因此：\n\n-   非聚集索引行的宽度\
  \ = 非聚集索引列的宽度 + 聚集索引列的宽度 = `INT` 数据类型的大小 + `INT` 数据类型的大小 = 4 字节 + 4 字节 = 8 字节\n\n\
  由于非聚集索引行如此之小，所有行都可以存储在一个索引页中。你可以通过查询索引统计信息来确认这一点，如 `图 8-19` 所示。\n\n`图 8-19. 窄索引的索引页数量`\n\
  \n```sql\nSELECT i.name,\n    i.type_desc,\n    s.page_count,\n    s.record_count,\n\
  \    s.index_level\nFROM sys.indexes i\nJOIN sys.dm_db_index_physical_stats(DB_ID(N'AdventureWorks2012'),\n\
  \    OBJECT_ID(N'dbo.Test1'), NULL, NULL, 'DETAILED') AS s\nON i.index_id = s.index_id\n\
  WHERE i.object_id = OBJECT_ID(N'dbo.Test1');\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-139_1.png)\n\n"
- '# 第 8 章 ■ 索引架构与行为


  为了理解宽聚集索引对非聚集索引的影响，将聚集索引列 `C2` 的数据类型从 `INT` 修改为 `CHAR(500)`。


  ```sql

  DROP INDEX dbo.Test1.iClustered;

  ALTER TABLE dbo.Test1 ALTER COLUMN C2 CHAR(500);

  CREATE CLUSTERED INDEX iClustered ON dbo.Test1(C2);

  ```


  再次运行针对 `sys.dm_db_index_physical_stats` 的查询，将返回 `图 8-20` 中的结果。


  `图 8-20. 宽索引的索引页数量`


  你可以看到，宽聚集索引增加了非聚集索引行的宽度。由于非聚集索引行宽度很大，一个 8KB 的索引页无法容纳所有的索引行。相反，需要两个索引页来存储全部 20 个索引行。对于大型表而言，由于大的聚集索引键大小而导致的非聚集索引尺寸膨胀，会显著增加非聚集索引的页数。


  因此，大的聚集索引键大小不仅影响其自身的宽度，还会加宽表上所有的非聚集索引。这会增加表上所有索引的索引页数量，从而增加索引所需的逻辑读取和磁盘 I/O。


  ##### 一步重建聚集索引


  由于非聚集索引依赖于聚集索引，使用独立的 `DROP INDEX` 和 `CREATE INDEX` 语句重建聚集索引会导致所有非聚集索引被重建两次。为避免此情况，请使用
  `CREATE INDEX` 语句的 `DROP_EXISTING` 子句，以单个原子步骤重建聚集索引。


  类似地，你也可以对非聚集索引使用 `DROP_EXISTING` 子句。


  值得注意的是，在 SQL Server 2005 及更高版本中，当你直接重建聚集索引时，不会看到非聚集索引也被重建。


  ##### 尽可能使聚集索引唯一


  因为聚集索引用于存储数据，你必须能够找到每一行。虽然聚集索引在其定义和存储层面不一定是唯一的，但如果键值不唯一，SQL Server 将无法找到这些行，除非有一种方法可以使聚集索引唯一地标识每个独立数据行的位置。因此，SQL
  Server 会向非唯一的聚集索引添加一个值以使其唯一。这个值称为 `唯一化值`。正如前面提到的，它会增加你的聚集索引以及所有非聚集索引的大小。



  '
- "# 第 8 章 ■ 索引架构与行为\n\n#### 何时使用聚集索引\n\n在某些情况下，使用聚集索引是有益的。我将在接下来的章节中讨论这些情况。\n\n#####\
  \ 直接访问数据\n\n由于所有数据都存储在聚集索引的叶级页中，因此任何时候访问聚集数据时，数据都是立即可用的。聚集索引的一个用途是支持最常用的数据访问路径。任何对聚集索引的访问都不需要额外的读取来检索数据，这意味着针对聚集索引的查找或扫描操作不需要额外的读取来获取数据。这可能是\
  \ Microsoft 默认将主键设为聚集索引的另一个原因。由于主键通常是访问表中数据最可能的方式，因此它很适合用作聚集索引。\n\n请记住，主键作为聚集索引是默认行为，但不一定是访问数据最常见的路径。这可能是通过外键约束、表中的备用键或其他列实现的。在规划和设计聚集索引时，要同时考虑存储和访问，这样应该就没问题了。\n\
  \n只有当你访问表中相当一部分数据时，聚集索引作为数据的主要路径才效果良好。另一方面，如果你只访问数据的小子集，使用非聚集覆盖索引可能更合适。此外，你还需要考虑定义数据访问路径的列数和类型。由于聚集索引的键成为非聚集索引的指针，过宽的聚集键会严重影响非聚集索引的性能和存储。\n\
  \n##### 检索预排序数据\n\n当数据检索需要排序时，聚集索引特别高效（覆盖非聚集索引对此也有用）。如果你在可能需要排序的列（或多列）上创建聚集索引，那么行将按该顺序物理存储，从而消除了检索数据后进行排序的开销。\n\
  \n让我们通过实例来看看这一点。创建一个测试表，如下所示：\n\n```sql\nIF (SELECT OBJECT_ID('od')) IS NOT NULL\n\
  \    DROP TABLE dbo.od ;\nGO\n\nSELECT pod.*\nINTO dbo.od\nFROM Purchasing.PurchaseOrderDetail\
  \ AS pod;\n```\n\n新表 `od` 仅包含数据创建而成。它没有任何索引。你可以通过执行以下命令来验证表上的索引，该命令不返回任何内容：\n\n\
  ```sql\nEXEC sp_helpindex 'dbo.od';\n```\n\n为了理解聚集索引的用途，获取一个按特定列排序的大范围行集。\n\n```sql\n\
  SELECT od.*\nFROM dbo.od\nWHERE od.ProductID BETWEEN 500 AND 510\nORDER BY od.ProductID;\n\
  ```\n\n你可以从 `STATISTICS IO` 输出中获取执行此查询（在没有任何索引的情况下）的成本。\n\n```\nTable 'od'. Scan\
  \ count 1, logical reads 78\nCPU time = 15 ms, elapsed time = 388 ms.\n```\n\n为了改进此查询的性能，你应该在\
  \ `WHERE` 子句的列上创建索引。此查询既需要一个行范围，也需要排序的输出。此查询的结果集要求符合聚集索引的建议。因此，按如下所示创建聚集索引，并重新检查查询成本。\n\
  \n```sql\nCREATE CLUSTERED INDEX i1 ON od(ProductID);\n```\n\n当你再次运行查询时，查询（带有聚集索引）的结果成本如下：\n\
  \n```\nTable 'od'. Scan count 1, logical reads 8\nCPU time = 16 ms, elapsed time\
  \ = 373 ms.\n```\n\n创建聚集索引减少了逻辑读取次数，因此应该有助于提升查询性能。\n\n另一方面，如果你在候选列上创建非聚集索引（而不是聚集索引），则查询性能可能会受到不利影响。让我们验证一下在这种情况下非聚集索引的影响。\n\
  \n```sql\nDROP INDEX od.i1;\nCREATE NONCLUSTERED INDEX i1 on dbo.od(ProductID);\n\
  ```\n\n查询（带有非聚集索引）的结果成本如下：\n\n```\nTable 'od'. Scan count 1, logical reads 78\n\
  CPU time = 0 ms, elapsed time = 434 ms.\n```\n\n非聚集索引甚至没有在最终的执行计划中被直接使用。相反，你会得到一个表扫描，但在此新计划中，对数据进行排序的估计成本与原始表扫描不同，因为索引为优化器提供了额外的选择性来估计成本，即使索引未被使用。完成后请删除测试表。\n\
  \n```sql\nDROP TABLE dbo.od;\n```\n\n#### 聚集索引的不良设计实践\n\n在某些情况下，最好不要使用聚集索引。我将在接下来的章节中讨论这些情况。\n\
  \n##### 经常更新的列\n\n如果聚集索引列经常更新，这将导致所有非聚集索引的行定位器相应地更新，从而显著增加相关操作查询的成本。这还会影响数据库并发性，因为在更新期间会阻塞引用同一表部分和非聚集索引的所有其他查询。因此，避免在高度可更新的列上创建聚集索引。\n\
  \n■ **注意** 第 20 章更深入地介绍了阻塞。\n\n为了理解仅修改聚集键列的 `UPDATE` 语句的成本是如何因表上的非聚集索引而增加的，请考虑以下示例。`Sales.SpecialOfferProduct`\
  \ 表在主键上有一个复合聚集索引，该主键也是来自两个不同表的外键；这是一个经典的多对多连接。在此示例中，我使用以下语句更新了两个列中的一个（注意使用事务来保持测试数据完整）：\n\
  \n```sql\nBEGIN TRAN\nSET STATISTICS IO ON;\n\nUPDATE Sales.SpecialOfferProduct\n\
  SET ProductID = 345\nWHERE SpecialOfferID = 1\n  AND ProductID = 720;\n\nSET STATISTICS\
  \ IO OFF;\nROLLBACK TRAN\n```\n\n`STATISTICS IO` 输出显示了所需的读取次数。\n\n```\nTable 'Product'.\
  \ Scan count 0, logical reads 2\nTable 'SalesOrderDetail'. Scan count 1, logical\
  \ reads 1246\nTable 'SpecialOfferProduct'. Scan count 0, logical reads 15\n```\n\
  \n如果你向表中添加一个非聚集索引，你会看到读取次数增加，如下所示：\n\n```sql\nCREATE NONCLUSTERED INDEX ixTest\n\
  ON Sales.SpecialOfferProduct (ModifiedDate);\n```\n\n当你再次运行相同的查询时，`SpecialOfferProduct`\
  \ 表的 `STATISTICS IO` 输出发生了变化。\n\n```\nTable 'Product'. Scan count 0, logical reads\
  \ 2\nTable 'SalesOrderDetail'. Scan count 1, logical reads 1246\nTable 'SpecialOfferProduct'.\
  \ Scan count 0, logical reads 19\n```\n\n由于聚集索引更新而导致的读取次数随着非聚集索引的增加而增加。请确保删除该索引。\n\
  \n```sql\nDROP INDEX Sales.SpecialOfferProduct.ixTest;\n```\n\n##### 宽键\n\n由于所有非聚集索引都将其聚集键作为行定位器，出于性能原因，你应该避免在非常宽的列（或多列）或太多列上创建聚集索引。如前一节所述，聚集索引应尽可能窄。\n\
  \n### 非聚集索引\n\n这也意味着在插入每一行时，获取唯一值会增加一点处理开销。基于所有这些原因，在可能的情况下使聚集索引具有唯一性是有意义的。这就是为什么主键的默认行为是使其成为聚集索引的一个重要原因。\n\
  \n你不必使聚集索引具有唯一性。但在定义存储和索引时，你需要考虑唯一标识符。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n\n### 非聚集索引\n\n非聚集索引不会影响数据在表页中的顺序，因为非聚集索引的叶级页与表的数据页是分离的。需要通过一个指针（行定位器）来从非聚集索引中的索引行导航到数据行，无论该数据是存储在聚集索引还是堆中。正如你在前面的“聚集索引”一节中所了解到的，行定位器的结构取决于数据页是存储在堆中还是聚集索引中。对于堆，行定位器是指向数据行\
  \ `RID` 的指针；对于有聚集索引的表，行定位器是聚集索引键。\n\n#### 非聚集索引维护\n\n非聚集索引的行定位器值在聚集索引行发生物理重定位时，仍然保持相同的聚集索引值。\n\
  \n在作为堆的表中（即没有聚集索引），为了优化此维护成本，SQL Server 在页拆分后，会向旧数据页添加一个指向新数据页的指针，而不是更新所有相关非聚集索引的行定位器。虽然这降低了非聚集索引的维护成本，但它增加了从非聚集索引行导航到堆内数据行的成本，因为在旧数据页和新数据页之间增加了一个额外的链接。因此，使用聚集索引作为行定位器可以减少与非聚集索引相关的这种开销。\n\
  \n#### 定义查找操作\n\n当查询请求的列不属于优化器选择的非聚集索引的一部分时，就需要进行查找。\n\n当查询针对聚集索引时，这可能是一个键查找；当针对堆执行时，则是一个\
  \ `RID` 查找。过去，这些查找的通用术语源自旧的定义名称，即 `书签查找`。由于自 SQL Server 2000 以后人们在执行计划中不再看到该短语，因此该术语的使用越来越少。现在你只需将其称为查找，然后定义其类型、键或\
  \ `RID`。查找通过遵循索引行中的行定位器值，从表中获取相应的数据行，这需要在数据页上进行一次逻辑读取，以及在索引页上的一次逻辑读取，以及一个联接操作将数据组合到一个共同的输出中。但是，如果查询所需的所有列在索引本身中都可用，则无需访问数据页。这被称为\
  \ `覆盖索引`。\n\n这些查找是为什么大型结果集更适合使用聚集索引的原因。聚集索引不需要查找，因为聚集索引的叶级页和数据页是相同的。\n\n■ **注意**\
  \ 第 11 章将更详细地介绍查找操作。\n\n#### 非聚集索引建议\n\n由于一个表只能有一个聚集索引，你可以利用多个非聚集索引的灵活性来帮助提高性能。我将在以下章节中解释决定是否使用非聚集索引的因素。\n\
  \n#### 何时使用非聚集索引\n\n当你只想从大型表中检索单独的少量行和列时，非聚集索引最有用。随着要检索的列数增加，拥有 `覆盖索引` 的可能性会降低。然后，如果你还要检索大量行，则任何查找的开销成本都会按比例上升。要从表中检索单独的少量行，索引列应具有高选择性。\n\
  \n此外，会有一些索引需求不适合聚集索引，如“聚集索引”部分所述。\n\n*   频繁可更新的列\n*   宽键\n\n在这些情况下，你可以使用非聚集索引，因为与聚集索引不同，它不会影响表中的其他索引。在频繁可更新的列上创建非聚集索引的成本不如在该列上创建聚集索引高。对非聚集索引的\
  \ `UPDATE` 操作仅限于基表和非聚集索引本身。它不会影响表上的任何其他非聚集索引。类似地，在宽列（或列集）上的非聚集索引不会增加任何其他索引的大小，而聚集索引则会。但是，即使在高度可更新的列或宽列（或列集）上创建非聚集索引时，也要保持谨慎，因为正如本章前面所述，这会增加操作查询的成本。\n\
  \n■ **提示** 非聚集索引也有助于解决阻塞和死锁问题。我将在第 20 和 21 章更深入地介绍这一点。\n\n#### 何时不使用非聚集索引\n\n非聚集索引不适用于检索大量行的查询。此类查询更适合使用聚集索引，后者不需要单独的查找来检索数据行。因为除了在非聚集索引页上的逻辑读取外，查找还需要额外的逻辑读取来访问数据页，所以对于大量行（例如在需要一个接一个查找的循环联接中），使用非聚集索引的查询成本会显著增加。SQL\
  \ Server 查询优化器会考虑此成本，并可能在检索大型结果集时放弃使用非聚集索引。\n\n如果你的要求是从表中检索大型结果集，那么在筛选条件（或联接条件）列上拥有非聚集索引可能没有用，除非你使用一种特殊类型的非聚集索引，称为\
  \ `覆盖索引`。我将在第 9 章详细介绍这种索引类型。\n\n### 聚集索引与非聚集索引\n\n在选择聚集索引和非聚集索引之间的主要考虑因素如下：\n\n\
  *   要检索的行数\n*   数据排序要求\n*   索引键宽度\n*   列更新频率\n*   查找成本\n*   任何磁盘热点\n\n#### 聚集索引相对于非聚集索引的优势\n\
  \n在决定为无索引的表选择索引类型时，聚集索引通常是首选。\n\n因为索引页和数据页是相同的，所以聚集索引不必像非覆盖非聚集索引那样从索引行跳转到基行。\n\n\
  为了理解在这些情况下，即使是检索少量行，聚集索引如何能优于非聚集索引，可以创建一个测试表，其中一列具有高选择性。\n\n```sql\nIF (SELECT OBJECT_ID('dbo.Test1'))\
  \ IS NOT NULL\n    DROP TABLE dbo.Test1;\nGO\n\nCREATE TABLE dbo.Test1 (C1 INT,\
  \ C2 INT);\n\nWITH Nums\nAS (SELECT TOP (10000)\n        ROW_NUMBER() OVER (ORDER\
  \ BY (SELECT 1)) AS n\n    FROM master.sys.all_columns AS ac1\n    CROSS JOIN master.sys.all_columns\
  \ AS ac2\n)\nINSERT INTO dbo.Test1 (C1, C2)\nSELECT n, n\nFROM Nums;\n```\n\n以下\
  \ `SELECT` 语句仅从表中获取 10,000 行中的 1 行：\n\n```sql\nSELECT t.C1, t.C2\nFROM dbo.Test1\
  \ AS t\nWHERE C1 = 1000;\n```\n\n这将产生如图 8-21 所示的图形化执行计划，以及 `SET STATISTICS IO` 和\
  \ `STATISTICS TIME` 的输出如下：\n\n```\nTable 'Test1'. Scan count 1, logical reads 39\n\
  CPU time = 0 ms, elapsed time = 1 ms.\n```\n\n考虑到前面 `SELECT` 语句检索的结果集很小，在 `c1` 上创建非聚集索引可能是一个不错的选择。\n\
  \n```sql\nCREATE NONCLUSTERED INDEX incl ON dbo.Test1(C1);\n```\n\n\n\n"
- "# 第 8 章：索引结构与行为\n\n#### 非聚集索引相对于聚集索引的优势\n\n你可以再次运行相同的 `SELECT` 命令。由于通过非聚集索引检索少量行比全表扫描更经济，优化器使用了列\
  \ `c1` 上的非聚集索引，如图 8-22 所示。`STATISTICS IO` 报告的逻辑读取次数如下：\n\n```sql\n表 'Test1'。扫描次数\
  \ 1，逻辑读取次数 3\n\nCPU 时间 = 0 ms，耗时 = 0 ms。\n```\n\n图 8-22. 使用非聚集索引的执行计划\n\n尽管使用高选择性的列来检索少量结果集是创建该列上非聚集索引的一个良好指标，但在同一列上创建聚集索引可能同样有益，甚至效果更佳。\n\
  \n为了评估聚集索引为何能比非聚集索引带来更大好处，请在同一列上创建一个聚集索引。\n\n```sql\nCREATE CLUSTERED INDEX icl\
  \ ON dbo.Test1(C1);\n```\n\n再次运行相同的 `SELECT` 命令。从上述 `SELECT` 语句的结果执行计划（参见图 8-22）中可以看到，即使对于少量结果集，优化器也使用了聚集索引（而非非聚集索引）。`SELECT`\
  \ 语句的逻辑读取次数从三次减少到了两次（图 8-23）。\n\n```sql\n表 't1'。扫描次数 1，逻辑读取次数 2\n\nCPU 时间 = 0 ms，耗时\
  \ = 0 ms。\n```\n\n图 8-23. 使用聚集索引的执行计划\n\n> **注意**：因为一个表只能有一个聚集索引，并且该索引是数据实际存储的地方，所以我通常会将聚集索引保留给最常用的数据访问路径。\n\
  \n正如你在上一节所学，在以下情况下，非聚集索引比聚集索引更受青睐：\n\n*   当索引键尺寸较大时。\n*   为了避免与聚集索引相关的开销，因为重建聚集索引会重建表的所有非聚集索引。\n\
  *   通过让数据库读取器在非聚集索引的页面上工作，而数据库写入器修改数据页中的其他列（不包含在非聚集索引中），从而解决阻塞问题；在这种情况下，写入器在数据页上工作时，不会阻塞能够直接从非聚集索引获取所有所需列值而无需访问基表的读取器。我将在第\
  \ 13 章详细解释这一点。\n*   当查询所引用的所有（来自表的）列都可以安全地包含在非聚集索引本身中时，正如本节所解释的。\n\n如前所述，使用非聚集索引时的数据检索性能通常比使用聚集索引时差，这是因为从非聚集索引行跳转到基表中的数据行需要成本。在不需要跳转到数据行的情况下，非聚集索引的性能应该与聚集索引一样好，甚至更好。如果非聚集索引本身（在页面级别，键加上任何包含列）包含了表中所需的所有列，这种情况就可能发生。\n\
  \n为了理解非聚集索引可能优于聚集索引的情况，请考虑以下示例。假设你需要检查在 2008 年 6 月至 2008 年 9 月期间到期的信用卡。你可能会有一个返回大量行的查询，如下所示：\n\
  \n```sql\nSELECT cc.CreditCardID,\n       cc.CardNumber,\n       cc.ExpMonth,\n\
  \       cc.ExpYear\nFROM Sales.CreditCard cc\nWHERE cc.ExpMonth BETWEEN 6 AND 9\n\
  \  AND cc.ExpYear = 2008\nORDER BY cc.ExpMonth;\n```\n\n以下是 I/O 和时间结果。图 8-24 显示了执行计划。\n\
  \n```sql\n表 'CreditCard'。扫描次数 1，逻辑读取次数 189\n\nCPU 时间 = 16 ms，耗时 = 240 ms。\n```\n\
  \n图 8-24. 扫描聚集索引的执行计划\n\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ![](img/index-148_1.jpg)\n\n"
- '# 第 8 章 ■ 索引架构与行为


  聚集索引建立在主键上，虽然对该表的大多数访问可能都是通过该键进行的，这使得索引很有用，但在当前这个实例中，聚集索引的性能并未达到你需要的水平。虽然你可以将索引的定义扩展到包含查询中的所有其他列，但它们对于聚集索引的功能并非必需，并且会干扰主键的操作。相反，你可以使用
  `INCLUDE` 操作来将其中定义的列存储在索引的叶级。它们不会以任何方式影响索引的键结构，但通过牺牲一些额外的磁盘空间，可以提供使非聚集索引成为覆盖索引（稍后详细介绍）的能力。在这个实例中，创建一个不同的索引是合适的。


  ```sql

  CREATE NONCLUSTERED INDEX ixTest

  ON Sales.CreditCard (ExpMonth, ExpYear)

  INCLUDE (CardNumber);

  ```


  现在，当再次运行查询时，结果如下：


  表 ''CreditCard''。扫描计数 1，逻辑读取 32 次


  CPU 时间 = 0 毫秒，elapsed time = 166 毫秒。


  图 8-25 显示了相应的执行计划。


  **图 8-25.** 包含非聚集索引的执行计划


  在这种情况下，`SELECT` 语句不包含任何需要从非聚集索引页跳转到表的数据页的列，而这通常是导致对于大型结果集和/或排序输出而言，非聚集索引比聚集索引开销更大的原因。这种非聚集索引被称为
  ``覆盖索引``。


  测试完成后清理索引。


  ```sql

  DROP INDEX Sales.CreditCard.ixTest;

  ```


  ## 本章小结


  在本章中，你学习了索引是减少查询逻辑读取次数和磁盘 I/O 的有效方法。尽管索引可能会给操作查询增加开销，但即使是像 `UPDATE` 和 `DELETE` 这样的操作查询也能从索引中受益。


  要为特定查询决定索引键列，需要评估查询的 `WHERE` 子句和联接条件。诸如列选择性、宽度、数据类型和列顺序等因素对于决定索引键中的列非常重要。由于索引主要用于检索少量行，因此索引列的选择性应该非常高。需要注意的是，非聚集索引包含聚集索引键的值作为其行定位器，因为这种行为极大地影响了索引类型的选择。


  在下一章中，你将学习更多关于可用于帮助调整查询的其他功能和其他类型的索引。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


