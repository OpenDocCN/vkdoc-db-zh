- '# 第 5 章


  ## 创建基线


  在之前的三章中，你了解了由内存、磁盘和 `CPU` 引起的各种可能的系统瓶颈。我还介绍了一些用于收集这些系统部分数据的 `性能监视器` 指标。在大多数计数器的描述中，我都提到了将你的指标与基线进行比较。本章将介绍如何收集你的指标，以便你拥有那个用于后期比较的基线。我将概述如何配置一个自动收集这些信息的方法。基线是理解系统行为的基础，因此你应该始终有一个可用的基线。本章涵盖以下主题：


  -   监控虚拟机和托管机器的注意事项

  -   如何设置 `性能监视器` 指标的自动收集

  -   使用 `性能监视器` 时避免问题的注意事项

  -   创建基线


  ### 监控虚拟机和托管机器的注意事项




  '
- '# 第五章：创建基线


  在开始创建基线之前，我将先谈谈虚拟机（VM）。越来越多的 SQL Server 实例运行在虚拟机上。当你使用虚拟机或在 Amazon 或 Microsoft Azure
  等远程环境中托管虚拟机时，许多标准性能计数器将不再显示有意义的信息。如果你在虚拟机内部监控这些计数器，从故障排除的角度来看，你的数字可能没有帮助。如果你在物理机（假设有访问权限，而这台物理机无疑被多个不同的虚拟机共享）上监控这些计数器，你将无法识别特定
  SQL Server 实例的资源瓶颈。


  因此，在使用虚拟机工作时，必须监控额外的信息。你可以在虚拟机设置中收集的关于磁盘和网络性能的大多数信息仍然适用。所有查询度量信息对于那些查询也将是准确的。完全不同的且相当不可靠的是内存和
  CPU 度量。


  这是因为在虚拟化服务器环境中，CPU 和内存在机器之间是共享的。你可能在一个 CPU 上启动一个进程，却在另一个完全不同的 CPU 上完成它。一些虚拟环境实际上可以根据机器对内存需求的变化来改变分配给该机器的内存。面对这些变化，传统的监控方式并不适用。好消息是，主要的虚拟机供应商为你提供了如何监控其系统以及如何在他们的系统中使用
  SQL Server 的指南。对于监控虚拟机的具体细节，你可以很大程度上依赖这些第三方文档。以两种最常见的虚拟机管理程序为例，VMware 和 HyperV，以下是各自的一份文档：


  *   VMware 监控虚拟机性能（[`bit.ly/1f37tEh`](http://bit.ly/1f37tEh)）

  *   测量 HyperV 性能（[`bit.ly/1aBHdxW`](http://bit.ly/1aBHdxW)）


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-65_1.jpg)


  队列计数器，例如 `处理器队列长度`，在虚拟机内部监控时仍然适用。这些表明虚拟机本身资源匮乏，导致你的 SQL Server 实例也资源匮乏，不得不等待访问虚拟
  CPU。需要记住的重要一点是，在虚拟机上 CPU 和内存会更慢，因为虚拟机的管理会干扰系统资源。由于托管资源的共享性质，你可能还会看到托管虚拟机上的 I/O 速度较慢。


  ## 创建基线


  现在你已经了解了一些主要的性能计数器，让我们看看如何将这些计数器整合起来创建一个系统基线。你需要遵循以下步骤：


  1.  创建一个可重用的性能计数器列表。

  2.  使用你的性能计数器列表创建一个计数器日志。

  3.  最小化性能监视器开销。


  ### 创建一个可重用的性能计数器列表


  在一台连接到与 SQL Server 系统相同网络的 Windows Server 2012 R2 机器上运行性能监视器工具。通过 属性 ➤ 数据 ➤ 添加计数器
  对话框，将性能计数器添加到性能监视器的“查看图表”显示中，如图 5-1 所示。


  **图 5-1.** 添加性能监视器计数器


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  例如，要添加性能计数器 `SQLServer:Latches:Total Latch Wait Time(ms)`，请按照以下步骤操作：

  1.  选择 `从计算机选择计数器` 选项，并在相应的输入字段中指定运行 SQL Server 的计算机名称。

  2.  单击性能对象 `SQLServer:Latches` 旁边的箭头。

  3.  从性能计数器列表中选择 `Total Latch Wait Time(ms)` 计数器。

  4.  单击 `添加` 按钮，将此性能计数器添加到要添加的计数器列表中。

  5.  根据需要继续添加其他计数器。完成后，单击 `确定` 按钮。


  在为基线创建可重用列表时，你可以重复前面的步骤来添加表 5-1 中列出的所有性能计数器。


