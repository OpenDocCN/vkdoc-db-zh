- '# 第 9 章 ■ 索引分析


  在创建大量覆盖索引之前，请考虑 SQL Server 如何通过索引交叉，高效且自动地为查询动态创建覆盖索引。


  覆盖索引在物理上按顺序组织所有索引列的数据。因此，从磁盘 I/O 的角度来看，一个不使用包含列的覆盖索引，对于完全由覆盖索引中的列满足的所有查询而言，就变成了一个聚集索引。如果查询的结果集需要排序输出，那么覆盖索引可以用来在物理上维持与结果集要求相同顺序的列数据——然后它可以像聚集索引一样用于排序输出。如前一个示例所示，对于请求一定范围行和/或排序输出的查询，覆盖索引可以提供比聚集索引更好的性能。包含列不是键的一部分，因此无法像索引的键列那样提供相同的排序优势。


  ## 建议


  为了利用覆盖索引的优势，请注意 `SELECT` 语句中的列列表，只移动你需要的数据。对于覆盖索引，尽可能使用较少的列以保持索引键尺寸较小也是一个好主意。在合适的地方，使用
  `INCLUDE` 语句添加列。由于覆盖索引包含了查询中使用的所有列，它往往非常宽，从而增加了覆盖索引的维护成本。你必须在覆盖索引带来的性能提升与其维护成本之间取得平衡。如果索引中所有列的字节数与该表中单个数据行的字节数相比很小，并且你确定利用覆盖索引的查询将频繁执行，那么使用覆盖索引可能是有益的。


  **提示：** 覆盖索引也有助于解决阻塞和死锁问题，你将在第 19 章和第 20 章中看到。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-152_1.jpg)


  ### 索引交叉


  如果一个表有多个索引，那么 SQL Server 可以使用多个索引来执行查询。SQL Server 可以利用多个索引，根据每个索引选择小的数据子集，然后执行这两个子集的交叉（即，只返回满足所有条件的行）。SQL
  Server 可以利用表上的多个索引，然后采用连接算法来获取两个子集之间的索引交叉。


  在下面的 `SELECT` 语句中，对于 `WHERE` 子句的列，该表在 `SalesPersonID` 列上有一个非聚集索引，但在 `OrderDate`
  列上没有索引：


  ```sql

  --SELECT * 在此查询中是故意使用的

  SELECT soh.*

  FROM Sales.SalesOrderHeader AS soh

  WHERE soh.SalesPersonID = 276

  AND soh.OrderDate BETWEEN ''4/1/2005'' AND ''7/1/2005'';

  ```


  图 9-3 显示了此查询的执行计划。


  ### 图 9-3. OrderDate 列上没有索引的执行计划


  如你所见，优化器没有使用 `SalesPersonID` 列上的非聚集索引。由于也需要 `OrderDate` 列的值，优化器选择了聚集索引来获取所有引用列的值。检索此数据的
  I/O 如下：


  `表 ''SalesOrderHeader''。扫描计数 1，逻辑读取 689`


  `CPU 时间 = 16 毫秒，耗时 = 47 毫秒。`


  为了提高查询的性能，可以将 `OrderDate` 列添加到 `SalesPersonId` 列上的非聚集索引中，或者将其定义为同一索引的包含列。但在这种实际场景中，修改现有索引时可能需要考虑以下几点：


  • 出于各种原因，可能不允许修改现有索引。

  • 现有的非聚集索引键可能已经相当宽。

  • 使用现有索引的其他查询的成本将受到修改的影响。




  '
- "# 第 9 章 ■ 索引分析\n\n### 索引连接\n\n*索引连接*是索引交集的一种变体，其中覆盖索引技术被应用于索引交集。\n\n如果没有单个索引能覆盖查询，但多个索引组合起来可以覆盖查询，那么\
  \ SQL Server 可以使用索引连接来完全满足查询，而无需访问基表。\n\n让我们看看这种索引技术的实际应用。对“索引交集”一节中的查询稍作修改，如下所示：\n\
  \n```sql\nSELECT soh.SalesPersonID,\n       soh.OrderDate\nFROM Sales.SalesOrderHeader\
  \ AS soh\n```\n\n在这种情况下，你可以在 `OrderDate` 列上创建一个新的非聚集索引。\n\n```sql\nCREATE NONCLUSTERED\
  \ INDEX IX_Test\nON Sales.SalesOrderHeader (OrderDate);\n```\n\n再次运行你的 `SELECT`\
  \ 命令。\n\n图 9-4 显示了 `SELECT` 语句的最终执行计划。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-153_1.jpg)\n\n**图 9-4.** 在 `OrderDate` 列上创建索引后的执行计划\n\n如你所见，SQL\
  \ Server 将两个非聚集索引都作为索引 seek（而非扫描）加以利用，然后采用一种交集算法来获取两个子集的索引交集。接着，它从结果数据集中执行键查找，以检索索引中未包含的其余数据。但是，该计划的复杂性表明性能可能更差。检查统计信息\
  \ I/O 和时间后，你会发现实际上你确实获得了显著的性能提升：\n\n```\n表 'SalesOrderHeader'。扫描计数 2，逻辑读取 10 次\n\
  CPU 时间 = 0 毫秒，耗时 = 31 毫秒。\n```\n\n读取次数从 689 次下降到了 10 次，尽管该计划在表内使用了三个不同的访问点。执行时间也减少了。你还可以看到计划中发生了额外的操作，例如排序和键查找，通过进一步调整索引，也许能够消除这些操作。然而，值得注意的是，由于你通过\
  \ `SELECT *` 命令返回所有列，因此无法通过使用 `INCLUDE` 列来消除键查找，所以你可能还需要调整查询。\n\n为了提高查询性能，SQL Server\
  \ 可以对表使用多个索引。因此，与其创建宽索引键，不如考虑创建多个窄索引。SQL Server 将能够在需要时一起使用它们，而在不需要时，查询也能从窄索引中受益。在创建覆盖索引时，请确定索引的宽度是否可接受，以及使用包含列是否足以完成任务。如果不行，则识别出现有的非聚集索引中是否包含了覆盖索引所需的大多数列。你可能已经拥有两个现有的非聚集索引，它们共同服务于覆盖索引所需的所有列。如果可能，适当调整现有非聚集索引的列顺序，使优化器能够考虑这两个非聚集索引之间的索引交集。\n\
  \n有时，可能由于以下原因，你不得不创建一个单独的非聚集索引：\n\n• 不允许重新排列现有索引中的列顺序。\n\n• 覆盖索引所需的一些列可能未包含在现有的非聚集索引中。\n\
  \n• 两个现有非聚集索引中的列总数可能多于覆盖索引所需的列数。\n\n在这种情况下，你可以在剩余的列上创建一个非聚集索引。如果新索引与一个现有非聚集索引的组合列顺序满足覆盖索引的要求，优化器将能够使用索引交集。在确定新索引的列及其顺序时，尝试通过关注其他查询来最大化其效益。\n\
  \n删除为测试创建的索引。\n\n```sql\nDROP INDEX Sales.SalesOrderHeader.IX_Test;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-154_1.jpg)\n\n![](img/index-154_2.jpg)\n\n\n"
- "# 第 9 章 ■ 索引分析\n\n### 筛选索引\n\n`WHERE soh.SalesPersonID = 276`\n`AND soh.OrderDate\
  \ BETWEEN '4/1/2005' AND '7/1/2005';`\n\n该查询的执行计划如图 9-5 所示，读取情况如下：表 'SalesOrderHeader'。扫描计数\
  \ `1`，逻辑读取 `689`\nCPU 时间 = `0 ms`，耗时 = `55 ms`。\n\n**图 9-5.** 无索引连接的执行计划\n\n如图 9-5\
  \ 所示，优化器没有使用 `SalesPersonID` 列上现有的非聚集索引。\n\n由于查询还需要 `OrderDate` 列的值，优化器选择了聚集索引来检索查询中引用的所有列的值。如果在\
  \ `OrderDate` 列上创建如下索引：\n\n```sql\nCREATE NONCLUSTERED INDEX IX_Test\nON Sales.SalesOrderHeader\
  \ (OrderDate ASC);\n```\n\n并重新运行查询，那么图 9-6 显示了结果，你可以在这里看到读取情况：表 'SalesOrderHeader'。扫描计数\
  \ `2`，逻辑读取 `4`\nCPU 时间 = `0 ms`，耗时 = `35 ms`。\n\n**图 9-6.** 带有索引连接的执行计划\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-155_1.jpg)\n\n第 9 章 ■ 索引分析\n\n两个索引的组合作用类似于覆盖索引，将表的读取次数从 `689` 减少到\
  \ `4`，因为它使用了两个 `索引查找` 操作连接在一起，而不是进行聚集索引扫描。\n\n但是，如果 `WHERE` 子句没有导致使用两个索引怎么办？相反，你知道两个索引都存在，并且像前面的查询一样对每个索引进行查找是可行的，因此你选择使用索引提示。\n\
  \n```sql\nSELECT soh.SalesPersonID,\n       soh.OrderDate\nFROM Sales.SalesOrderHeader\
  \ AS soh WITH\n    (INDEX (IX_Test,\n            IX_SalesOrderHeader_SalesPersonID))\n\
  WHERE soh.OrderDate BETWEEN '4/1/2002' AND '7/1/2002';\n```\n\n这个新查询的结果如图 9-7 所示，I/O\
  \ 情况如下：表 'Workfile'。扫描计数 `0`，逻辑读取 `0`\n表 'Worktable'。扫描计数 `0`，逻辑读取 `0`\n表 'SalesOrderHeader'。扫描计数\
  \ `2`，逻辑读取 `59`\nCPU 时间 = `16 ms`，耗时 = `144 ms`。\n\n**图 9-7.** 通过提示进行索引连接的执行计划\n\
  \n读取次数明显增加，并且出现了使用 `tempdb` 在处理期间存储数据的工作表和工作文件。大多数情况下，优化器在索引和执行计划方面会做出良好的选择。\n\n\
  虽然可以使用查询提示来让你从优化器手中接管控制权，但这种控制可能带来的问题与它解决的问题一样多。在试图强制使用索引连接以获得性能提升时，强制选择索引反而减慢了查询的执行速度。\n\
  \n继续之前请删除测试索引。\n\n```sql\nDROP INDEX Sales.SalesOrderHeader.IX_Test;\n```\n\n`注意`\n\
  \n在生成查询执行计划时，SQL Server 优化器会经历多个优化阶段，不仅确定要使用的索引类型和连接策略，还会评估高级索引技术，例如索引交叉和索引连接。因此，在某些情况下，与其创建宽泛的覆盖索引，不如考虑创建多个窄索引。SQL\
  \ Server 可以将它们一起用作覆盖索引，同时在需要时单独使用它们。但你需要通过测试来确定哪种方式在你的情况下效果更好——是更宽的索引，还是索引交叉和连接。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-156_1.jpg)\n\
  ![](img/index-156_2.jpg)\n\n第 9 章 ■ 索引分析\n\n筛选索引是一种非聚集索引，它使用过滤器（基本上是一个 `WHERE` 子句）来针对一个或多个列创建高度选择性的键集，否则这些列可能没有良好的选择性。例如，具有大量\
  \ `NULL` 值的列可能存储为稀疏列以减少这些 `NULL` 值的开销。向该列添加筛选索引将允许你拥有一个可用于非 `NULL` 数据的索引。理解这一点的最好方式是查看实际应用。\n\
  \n`Sales.SalesOrderHeader` 表有超过 30,000 行。在这些行中，有 27,000 多行的 `PurchaseOrderNumber`\
  \ 列和 `SalesPersonId` 列具有空值。如果你想获取一个简单的采购订单号列表，查询可能如下所示：\n\n```sql\nSELECT soh.PurchaseOrderNumber,\n\
  \       soh.OrderDate,\n       soh.ShipDate,\n       soh.SalesPersonID\nFROM Sales.SalesOrderHeader\
  \ AS soh\nWHERE PurchaseOrderNumber LIKE 'PO5%'\n  AND soh.SalesPersonID IS NOT\
  \ NULL;\n```\n\n运行查询后，正如你所料，会进行聚集索引扫描，以及以下 I/O 和执行时间，如图 9-8 所示：\n表 'SalesOrderHeader'。扫描计数\
  \ `1`，逻辑读取 `689`\nCPU 时间 = `0 ms`，耗时 = `87 ms`。\n\n**图 9-8.** 无索引的执行计划\n\n为了解决这个问题，可以创建一个索引并包含查询中的部分列，使其成为覆盖索引（如图\
  \ 9-9 所示）。\n\n```sql\nCREATE NONCLUSTERED INDEX IX_Test\nON Sales.SalesOrderHeader(PurchaseOrderNumber,SalesPersonID)\n\
  INCLUDE (OrderDate,ShipDate);\n```\n\n**图 9-9.** 带有覆盖索引的执行计划\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-157_1.jpg)\n\n第 9 章 ■ 索引分析\n\n当你重新运行查询时，性能提升相当显著（见图 9-9 及以下结果中的\
  \ I/O 和时间）。\n表 'SalesOrderHeader'。扫描计数 `1`，逻辑读取 `5`\nCPU 时间 = `0 ms`，耗时 = `69 ms`。\n\
  \n如你所见，覆盖索引将读取次数从 `689` 减少到 `5`，时间从 `87 ms` 减少到 `69 ms`。通常，这已经足够了。假设这个查询必须频繁调用。现在，你能从中榨取的每一丁点速度都会带来回报。知道索引列中有如此多的数据为空，你可以调整索引，使其过滤掉空值（这些值无论如何索引也不会使用），从而减小树的大小，进而减少所需的搜索量。\n\
  \n```sql\nCREATE NONCLUSTERED INDEX IX_Test\nON Sales.SalesOrderHeader(PurchaseOrderNumber,SalesPersonID)\n\
  INCLUDE (OrderDate,ShipDate)\nWHERE PurchaseOrderNumber IS NOT NULL AND SalesPersonID\
  \ IS NOT NULL\nWITH (DROP_EXISTING = ON);\n```\n\n查询的最终运行结果在以下结果和图 9-10 中可见。\n表\
  \ 'SalesOrderHeader'。扫描计数 `1`，逻辑读取 `4`\nCPU 时间 = `0 ms`，耗时 = `55 ms`。\n\n**图 9-10.**\
  \ 带有筛选索引的执行计划\n\n虽然在绝对数字上，将读取次数从 `5` 减少到 `4` 并不算多，但这意味着查询的 I/O 成本降低了 20%。如果这个查询像某些查询那样，每分钟运行数百甚至数千次，那么这\
  \ 20% 的减少确实会带来巨大的收益。另一个可见的收益证据是执行时间再次从 `69 ms` 降到了 `55 ms`。\n\n筛选索引在许多方面提升了性能。\n\
  *   通过减小索引大小来提高查询效率。\n*   通过创建更小的索引来降低存储成本。\n*   由于索引变小，减少了索引维护的成本。\n\n但是，任何事情都有代价。你可能会遇到参数化查询与筛选索引不匹配的问题，从而无法使用它。统计信息不是基于过滤条件更新的，而是像常规索引一样基于整个表更新的。就像本书中的任何建议一样，请在你的环境中进行测试，以确保筛选索引是有帮助的。\n\
  \n\n"
- '# 第 9 章：索引分析


  建议其应用的首要场景之一，就是像前面的例子一样，从索引中消除 `NULL` 值。你也可以通过特殊索引来隔离频繁访问的数据集，从而大幅提升针对该数据的查询性能。你可以使用
  `WHERE` 子句来过滤数据，这种方式类似于创建索引视图（将在“索引视图”一节中更详细地介绍），但通过创建筛选索引来实现覆盖索引，可以避免与索引视图相关的数据维护难题，正如前面的例子所示。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  筛选索引在访问或创建时需要一组特定的 `ANSI` 设置。


  *   `ON`：`ANSI_NULLS`、`ANSI_PADDING`、`ANSI_WARNINGS`、`ARITHABORT`、`CONCAT_NULL_YIELDS_NULL`、`QUOTED_IDENTIFIER`

  *   `OFF`：`NUMERIC_ROUNDABORT`


  完成后，请删除测试索引。


  ```sql

  DROP INDEX Sales.SalesOrderHeader.IX_Test;

  ```


  ### 索引视图


  SQL Server 中的数据库视图类似于虚拟表，但它只是一个 `SELECT` 语句的输出。你使用 `CREATE VIEW` 语句创建视图，然后可以像查询表一样对视图编写查询。视图本身不存储任何数据——只存储与之关联的
  `SELECT` 语句。每次查询视图时，定义该视图的 `SELECT` 语句都会被发送到优化器。


  通过在视图上创建唯一的聚集索引，数据库视图可以在磁盘上具体化。这样的视图被称为 `索引视图` 或 `物化视图`。在视图上创建唯一聚集索引后，视图的结果集会立即具体化，并持久化存储在数据库的物理存储中，从而省去了在查询执行时进行昂贵操作的开销。视图具体化后，可以在该索引视图上创建多个非聚集索引。实际上，这将视图（再次说明，它只是一个查询）变成了一个具有定义存储的实际表。


  #### 优势


  你可以通过以下方式使用索引视图来提升查询性能：


  *   聚合可以预计算并存储在索引视图中，以最小化查询执行期间的昂贵计算。

  *   表可以预先连接，并且结果数据集可以被具体化。

  *   连接或聚合的组合可以被具体化。


  #### 开销


  索引视图可能会对 `OLTP` 数据库产生重大开销。索引视图的一些开销如下：


  *   基础表中的任何更改都必须通过执行视图的 `SELECT` 语句反映到索引视图中。

  *   对定义了索引视图的基础表的任何更改，都可能引发该索引视图的一个或多个非聚集索引的更改。如果更新了聚集键，则聚集索引也必须更改。

  *   索引视图增加了数据库持续维护的开销。

  *   数据库需要额外的存储空间。


  创建索引视图的限制包括：


  *   视图上的第一个索引必须是唯一的聚集索引。

  *   只有在创建了唯一的聚集索引之后，才能在索引视图上创建非聚集索引。

  *   视图定义必须是 `确定性` 的——也就是说，对于给定的查询，它只能返回一种可能的结果。（SQL Server 联机丛书中提供了确定性和非确定性函数的列表。）

  *   索引视图必须只引用同一数据库中的基础表，而不能引用其他视图。

  *   索引视图可以包含 `float` 列。但是，此类列不能包含在聚集索引键中。

  *   索引视图必须与视图中引用的表进行架构绑定，以防止表架构的修改（这通常是一个主要问题）。

  *   视图定义在语法上有若干限制。（SQL Server 联机丛书中提供了视图定义的语法限制列表。）

  *   必须固定的 `SET` 选项列表如下：


