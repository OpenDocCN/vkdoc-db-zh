- "# 第 8 章 ■ 索引体系结构与行为\n\nB 树算法最小化了定位所需键需要访问的页面数量，从而加快了数据访问过程。例如，在图 8-5 中，搜索键值 5 从顶部的根节点开始。由于键值介于\
  \ 1 和 10 之间，搜索过程沿着左分支到达下一个节点。因为键值 5 介于值 4 和 7 之间，搜索过程沿着中间分支到达下一个起始键值为 4 的节点。搜索过程从这个叶子页面检索到键值\
  \ 5。如果键值 5 不在此页面中，搜索过程将停止，因为它是叶子页面。类似地，键值 25 也可以使用相同次数的读取来搜索。\n\n## 索引开销\n\n索引带来的性能优势确实伴随着成本。带有索引的表除了表的数据页面外，还需要额外的存储和内存空间来存放索引页面。数据操作查询（`INSERT`、`UPDATE`\
  \ 和 `DELETE` 语句，或 CRUD 的创建、读取、更新、删除部分）可能需要更长的时间，并且对于不断变化的表，维护索引需要更多的处理时间。这是因为，与\
  \ `SELECT` 语句不同，数据操作查询会修改表的数据内容。如果 `INSERT` 语句向表中添加一行，那么它还必须在索引结构中添加一行。如果索引是聚集索引，则开销更大，因为必须按照正确的顺序将该行添加到数据页面本身中，这可能需要将其他数据行重新定位到新条目位置之下。`UPDATE`\
  \ 和 `DELETE` 数据操作查询以类似方式更改索引页面。\n\n在设计索引时，您将从两个不同的角度进行操作：一是现有生产系统，您需要衡量索引的整体影响；二是战术方法，通常只关注索引的即时利益，在初始设计系统时使用。当您必须处理现有系统时，您应确保索引的性能优势超过处理资源上的额外成本。您可以通过使用扩展事件（在第\
  \ 3 章中解释）进行整体工作负载优化（在第 25 章中解释）来实现这一点。当您只关注索引的即时利益时，SQL Server 提供了一系列动态管理视图来提供有关索引性能的详细信息，例如\
  \ `sys.dm_db_index_operational_stats` 或 `sys.dm_db_index_usage_stats`。视图 `sys.dm_db_index_operational_stats`\
  \ 显示正在使用的索引上的低级别活动，例如锁和 I/O。视图 `sys.dm_db_index_usage_stats` 返回随时间推移对索引发生的各种索引操作的统计计数。这两者都将在第\
  \ 20 章讨论阻塞时更广泛地使用。\n\n■ **注意** 在本书中，我使用 `STATISTICS IO` 和 `STATISTICS TIME` 来测量正在运行的查询。您可以将\
  \ `SET` 命令添加到代码中，也可以更改查询窗口的连接设置。我建议只更改连接设置。\n\n为了理解索引对数据操作查询的开销成本，请考虑以下示例。\n\n首先，创建一个包含\
  \ 10,000 行的测试表。\n```sql\nIF (SELECT OBJECT_ID('Test1')) IS NOT NULL\n    DROP TABLE\
  \ dbo.Test1;\nGO\nCREATE TABLE dbo.Test1\n(\n    C1 INT,\n    C2 INT,\n    C3 VARCHAR(50)\n\
  );\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 8 章 ■ 索引体系结构与行为\n\n```sql\nWITH Nums\nAS (SELECT TOP (10000)\n        ROW_NUMBER()\
  \ OVER (ORDER BY (SELECT 1)) AS n\n    FROM master.sys.all_columns ac1\n    CROSS\
  \ JOIN master.sys.all_columns ac2\n)\nINSERT INTO dbo.Test1\n    (C1, C2, C3)\n\
  SELECT n,\n    n,\n    'C3'\nFROM Nums;\n```\n\n运行一个 `UPDATE` 语句，如下所示：\n```sql\n\
  UPDATE dbo.Test1\nSET C1 = 1,\n    C2 = 1\nWHERE C2 = 1;\n```\n\n然后 `SET STATISTICS\
  \ IO` 报告的逻辑读取次数如下：\n```\nTable 'Test1'. Scan count 1, logical reads 29\n```\n\n\
  在列 `c1` 上添加一个索引，如下所示：\n```sql\nCREATE CLUSTERED INDEX iTest\nON dbo.Test1(C1);\n\
  ```\n\n对于相同的 `UPDATE` 语句，逻辑读取次数从 29 增加到 42，但还添加了一个工作表，额外增加了 5 次读取，总计 47：\n```\n\
  Table 'Test1'. Scan count 1, logical reads 42\nTable 'Worktable'. Scan count 1,\
  \ logical reads 5\n```\n\n读取次数增加是因为需要重新排列数据，以便在聚集索引中按正确顺序存储，这增加了读取次数，超过了堆表仅将数据添加到现有存储末尾所需的次数。\n\
  \n尽管维护索引所需的开销量确实会因数据操作查询而增加，但请注意，SQL Server 必须先找到一行，然后才能更新或删除它；因此，对于带有必要 `WHERE`\
  \ 子句的 `UPDATE` 和 `DELETE` 语句，索引可能是有用的。使用索引定位行的效率提高通常抵消了更新索引所需的额外开销，除非表有很多索引。\n\n\
  此外，绝大多数系统都是读取密集型的，这意味着检索的数据量远多于插入或修改的数据量。\n\n为了理解索引如何有益于数据修改查询，让我们基于这个例子继续。在表 `t1`\
  \ 上创建另一个索引。这次，在 `UPDATE` 语句的 `WHERE` 子句中引用的列 `c2` 上创建索引。\n```sql\nCREATE INDEX iTest2\n\
  ON dbo.Test1(C2);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
