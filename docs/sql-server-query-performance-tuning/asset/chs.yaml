  \n在继续之前，请确保从表中删除测试索引。\n\n```sql\nDROP INDEX HumanResources.Employee.IX_Employee_Test;\n\
  ```\n\n### 检查列数据类型\n\n\n\n索引的数据类型至关重要。以整型键为例，基于 `INTEGER`（或 `INT`）数据类型的索引搜索速度很快，因其体积小且算术运算处理简便。你也可以使用其他整型变体（`BIGINT`、`SMALLINT`\
  \ 和 `TINYINT`）作为索引列，而字符串数据类型（`CHAR`、`VARCHAR`、`NCHAR` 和 `NVARCHAR`）则需要进行字符串匹配操作，这通常比整型匹配操作成本更高。\n\
  \n假设你希望在某一列上创建索引，并且有两个候选列——一列是 `INTEGER` 数据类型，另一列是 `CHAR(4)` 数据类型。尽管在 SQL Server\
  \ 2014 中，这两种数据类型的大小都是 4 字节，但你仍应优先选择 `INTEGER` 数据类型索引。以算术运算为例。`CHAR(4)` 数据类型中的值 `1`\
  \ 实际存储为 `1` 后跟三个空格，由以下四个字节组合而成：`0x35`、`0x20`、`0x20` 和 `0x20`。CPU 无法理解如何对此数据执行算术运算，因此它会在进行算术运算前将其转换为整型数据类型，而整型数据类型中的值\
  \ `1` 则保存为 `0x00000001`。CPU 可以轻松地对此数据执行算术运算。\n\n当然，大多数时候，你并不会面临在大小完全相同的数据类型之间做简单选择的情况，从而允许你选择更优的类型。在设计和构建索引时，请记住这一点。\n\
  \n### 考虑列顺序\n\n索引键首先按索引的第一列排序，然后在前一列的每个值内按下一列进行子排序。复合索引中的第一列通常被称为索引的 `leading edge`（前导列）。\n\
  \n例如，考虑表 8-2。\n\n第 8 章 ■ 索引架构与行为\n\n**表 8-2.** 示例表\n\n| **c1** | **c2** |\n|--------|--------|\n\
  \n如果在列 (`c1`, `c2`) 上创建复合索引，则索引将按表 8-3 所示排序。\n\n**表 8-3.** 在列 (`c1`, `c2`) 上的复合索引\n\
  \n| **c1** | **c2** |\n|--------|--------|\n\n如表 8-3 所示，数据首先按复合索引中的第一列 (`c1`) 排序。在第一列的每个值内，数据进一步按第二列\
  \ (`c2`) 排序。\n\n因此，复合索引中的列顺序是影响索引有效性的重要因素。你可以通过考虑以下几点来理解：\n\n- 列的唯一性\n- 列的宽度\n-\
