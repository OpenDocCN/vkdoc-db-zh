  ## 第 26 章 ■ SQL Server 优化检查清单


  ### 使用命令 `SET NOCOUNT ON`


  作为规则，始终在存储过程、触发器和其他批查询中将命令 `SET NOCOUNT ON` 作为第一条语句。这使您可以避免与每条 SQL 语句执行后返回受影响行数相关的网络开销。命令
  `SET NOCOUNT` 在第 19 章的“使用 `SET NOCOUNT`”一节中有详细解释。


  ### 显式定义对象的所有者


  作为性能最佳实践，始终用其所有者限定数据库对象，以避免验证对象所有者所需的运行时成本。显式限定数据库对象所有者的性能优势在第 15 章的“不允许在查询中隐式解析对象”一节中有详细解释。


  ### 避免非 Sargable 搜索条件


  在查询中定义搜索条件时要警惕。如果 `WHERE` 子句中使用的列上的搜索条件阻止优化器有效地使用该列上的索引，那么即使存在正确的索引，查询的执行成本也会很高。非
  sargable 搜索条件的性能影响在第 18 章的相应章节中有详细解释。


  此外，请注意不要在搜索功能上提供过多的灵活性。如果您定义了一个应用程序功能，例如“检索产品名称以‘Caps’结尾的所有产品”，那么您将得到扫描整个表（或聚集索引）的查询。如您所知，扫描包含数百万行的表会损害数据库性能。除非您使用索引提示，否则您将无法从该列的索引中受益。


  然而，使用索引提示会覆盖查询优化器的决策，因此通常也不建议您使用索引提示（更多信息请参见第 18 章）。要理解此类业务规则的性能影响，请考虑以下 `SELECT`
  语句：


  ```sql

  SELECT p.*

  FROM Production.Product AS p

  WHERE p.[Name] LIKE ''%Caps'';

  ```


  在**图 26-4** 中，您可以看到执行计划使用了 `[Name]` 列上的索引，但它必须执行扫描而不是查找。由于对字符数据类型（如 `CHAR` 和 `VARCHAR`）列上的索引按列的前导字符对数据值进行排序，在
  `LIKE` 条件中使用前导的 `%` 不允许对索引进行查找操作。匹配的行可能分布在整个索引行中，使得索引对搜索条件无效，从而损害查询的性能。


  ***图 26-4.** 显示由非 sargable `LIKE` 子句引起的聚集索引扫描的执行计划* 560


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-556_1.png)


  ## 第 26 章 ■ SQL Server 优化检查清单


  ### 避免在 `WHERE` 子句列上使用算术表达式


  始终尝试避免在 `WHERE` 和 `JOIN` 子句中的列上使用算术运算符和函数。在列上使用运算符和函数会阻止使用这些列上的索引。在 `WHERE` 子句列上使用算术运算符的性能影响在第
  18 章的“避免在 `WHERE` 子句列上使用算术运算符”一节中有详细解释，而使用函数的影响在同一章的“避免在 `WHERE` 子句列上使用函数”一节中有详细解释。


  为了实际观察，请考虑以下查询：


  ```sql

  SELECT soh.SalesOrderNumber

  FROM Sales.SalesOrderHeader AS soh

  WHERE ''SO5'' = LEFT(SalesOrderNumber, 3);


  SELECT soh.SalesOrderNumber

  FROM Sales.SalesOrderHeader AS soh

  WHERE SalesOrderNumber LIKE ''SO5%'';

  ```


  这些查询基本上实现了相同的逻辑：它们检查 `SalesOrderNumber` 是否等于 `S05`。


  然而，第一个查询在 `SalesOrderNumber` 列上执行了一个函数，而第二个使用 `LIKE` 子句来检查相同的数据。**图 26-5** 显示了生成的执行计划。


  ***图 26-5.** 显示函数阻止索引使用的执行计划*


  如您在**图 26-5** 中所见，第一个查询强制了索引扫描操作，而第二个能够执行一个良好、清晰的索引查找。这些示例清楚地说明了为什么应该避免在 `WHERE`
  子句列上使用函数和运算符。


  您在计划中看到的警告与 `SalesOrderHeader` 表中计算列内发生的隐式转换有关。


  ### 避免优化器提示


  作为规则，避免使用优化器提示，例如索引提示和连接提示，因为它们会覆盖优化器的决策过程。在大多数情况下，优化器足够智能以生成高效的执行计划，并且在没有任何优化器提示强加的情况下，它工作得最好。这同样适用于计划指南。强制计划在极少数情况下有帮助，但通常最好依赖优化器做出好的选择。要详细了解优化器提示的性能影响，请参阅第
  18 章的“避免优化器提示”一节。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ## 第 26 章 ■ SQL Server 优化检查清单


  ### 远离嵌套视图


  当一个视图调用另一个视图，后者又调用更多视图，依此类推时，就存在嵌套视图。这可能导致代码混乱，原因有二。首先，这些视图掩盖了所执行的操作。其次，查询可能很简单，但
  SQL 引擎的执行计划和后续操作可能既复杂又昂贵。这是因为优化器没有时间来简化查询，消除它不需要的表和列；相反，优化器假定所有表和列都是必需的。同样的规则也适用于嵌套用户定义函数。


  ### 确保没有隐式数据类型转换




  在查询中创建变量时，请确保这些变量的数据类型与它们将用于比较的列的数据类型相同。尽管 SQL Server 能够并且确实会进行例如将 `VARCHAR` 转换为
  `DATE` 的操作，但这种隐式转换可能导致索引无法使用。在诸如表连接等情况下，你也必须同样谨慎，确保一个表的主键数据类型与所连接表的外键匹配。你偶尔可能会在执行计划中看到警告来帮助你解决这个问题，但不能依赖于此。


  ### 最小化日志开销


  SQL Server 在事务日志中维护每个原子操作（或事务）的新旧状态，以确保数据库的一致性和持久性。这可能会给日志磁盘带来巨大压力，常常使日志磁盘成为争用点。因此，为了提高数据库性能，你必须尝试优化事务日志开销。除了本章后面讨论的硬件解决方案外，你还应采用以下查询设计最佳实践：


  • 对于小型结果集（小于 20 到 50 行），尽可能选择使用 `表变量` 而不是 `临时表`。请记住：如果结果集不小，你可能会遇到严重问题。


  `表变量` 的性能优势在第 17 章的“使用表变量”一节中有详细解释。


  • 将多个操作查询批处理在一个单一事务中。使用此选项时必须小心，因为如果在单个事务中影响的行过多，相应的数据库对象将被长时间锁定，阻塞所有其他尝试访问这些对象的用户。


  • 通过使用 `大容量日志` 恢复模型来减少某些操作的日志记录量。


  此规则主要适用于处理大规模数据操作时。当启用 `大容量日志` 并使用 `UPDATE` 语句的 `WRITE` 子句或删除或创建索引时，你也会使用最小日志记录。


  ### 采用最佳实践以重用执行计划


  优化计划生成成本的最佳实践可大致分为以下两类：


  • 有效缓存 `执行计划`


  • 最小化 `执行计划` 的重新编译


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 26 章 ■ SQL Server 优化检查清单


  #### 有效缓存执行计划


  你必须确保查询的 `执行计划` 不仅被缓存，而且被频繁重用。通过采用以下最佳实践来实现：


  • 避免以非参数化的即席查询方式执行查询。相反，对查询的可变部分进行参数化，并使用存储过程或 `sp_executesql` 系统存储过程提交参数化查询。


  • 如果必须使用大量即席查询，请启用 `即席工作负载优化` 选项，该选项将在第一次调用查询时创建计划存根而不是完整计划。这大大减少了使用的 `过程缓存` 量。


  • 在执行相同参数化查询的每个连接中使用相同的环境设置（如 `ANSI_NULLS`）。这一点很重要，因为查询的 `执行计划` 取决于连接的环境设置。


  • 如前面“显式定义对象的所有者”一节所述，在查询中访问对象时显式限定其所有者。


  前面这些关于计划缓存的方面在第 16 章中有详细解释。


  #### 最小化执行计划的重新编译


  为了最小化为查询生成 `执行计划` 的成本，你必须确保缓存中的计划不会因你可控的原因而失效或重新编译。以下推荐的最佳实践可最小化存储过程计划的重新编译：


  • 不要在你的 `存储过程` 中交错使用 `DDL` 和 `DML` 语句。你应该将所有 `DDL` 语句放在 `存储过程` 的顶部。


  • 在 `存储过程` 中，避免使用在 `存储过程` 外部创建的 `临时表`。




  • 对于小型数据集，优先使用表变量而非临时表。


  • 不要在存储过程中更改 ANSI SET 选项。


  • 如果实在无法避免重编译，那么识别导致重编译的存储过程语句，并通过 `sp_execute_sql` 系统存储过程来执行它。


  存储过程重编译的原因及推荐解决方案在第 17 章中有详细解释。


  ### 采用数据库事务的最佳实践


  你为并发设计的查询越有效，查询就能越快完成而不会相互阻塞。在设计查询中的事务时，请考虑以下建议：


  • 将事务的范围尽可能缩短。在事务中，仅包含那些为了数据一致性必须一起提交的语句。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 26 章 ■ SQL Server 优化检查清单


  • 防止因糟糕的错误处理例程或应用程序逻辑而导致事务保持打开状态。请使用以下技术来实现：


  • 使用 `SET XACTABORT ON` 来确保在事务内发生错误条件时，事务会被中止或回滚。


  • 从客户端代码执行包含事务的存储过程或查询批处理后，始终检查是否有未关闭的事务，然后使用以下 SQL 语句回滚任何未关闭的事务：


  ```

  IF @@TRANC0UNT > 0 ROLLBACK

  ```


  • 使用为满足应用程序需求而确定的、能维持数据一致性的最低级别事务隔离。默认的隔离级别 `Read Committed` 所提供的隔离程度在大多数情况下是足够的。如果发生了过多的锁，请考虑使用
  `Read Committed Snapshot` 隔离级别。


  事务对数据库性能的影响在第 19 章中有详细解释。


  ### 消除或减少数据库游标的开销


  由于 SQL Server 被设计为处理数据集，因此使用 DML 语句处理多行数据通常比使用数据库游标逐行处理要快得多。如果你发现自己在大量使用游标，请重新检查逻辑，看看是否有办法消除游标。如果必须使用数据库游标，那么请使用开销最小的数据库游标：`FASTFORWARD`
  游标类型（通常称为“只进快速游标”）。你也可以在 ADO.NET 中使用等效的 `DataReader` 对象。


  数据库游标的性能开销在第 22 章中有详细解释。


  ### 原生编译存储过程


  在你仅访问内存中表的情况下，你可以采用另一个额外的性能增强方法，那就是将你的存储过程编译成在 SQL Server 可执行文件内运行的 DLL。正如第 23 章所示，这具有相当显著的性能影响。只需确保你以正确的方式调用这些过程，通过序数位置而不是参数名来传递参数。尽管这感觉像是打破了最佳实践，但它能带来编译后过程更好的性能。


  ## 总结


  性能优化是一个持续的过程。它需要持续关注影响性能的数据库和查询特性。本章的目标是为你提供一份这些特性的检查清单，以便在数据库应用程序的开发和维护阶段作为快速简便的参考。


