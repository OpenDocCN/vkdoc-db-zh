  \ Scan count 0, logical reads 0, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Worktable'. Scan\
  \ count 0, logical reads 0, physical reads 0, read-ahead reads 0, lob logical reads\
