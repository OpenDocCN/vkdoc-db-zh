- "# 磁盘性能分析与瓶颈解决\n\n## I/O 等待与瓶颈识别\n\n当你查看各种 I/O 锁存操作时，会发现它们是导致等待发生的原因。与 `sys.dm_io_virtual_status`\
  \ 类似，你无法从这个动态管理对象（DMO）中获得具体的查询信息，但它确实可以识别 I/O 是否存在瓶颈。像许多性能计数器一样，你不能只看单个数值。你需要将当前值与基线值进行比较，才能判断当前的状况。\n\
  \n前面展示的 `WHERE` 子句使用了 `PAGEIOLATCH%`，但你还应该查找与其他 I/O 进程相关的等待，例如 `WRITELOG`、`LOGBUFFER`\
  \ 和 `ASYNC_IO_COMPLETION`。\n\n运行此查询后，你将获得已发生等待的次数以及总等待时间的汇总。你还会得到这些等待的最大值，从而了解最长的等待时间是多久，因为有可能单个等待就导致了大部分的等待时间。\n\
  \n## 解决磁盘瓶颈\n\n一些常见的解决磁盘瓶颈的方法如下：\n\n- 优化应用程序工作负载\n- 使用更快的 I/O 路径\n- 使用 RAID 阵列\n\
  - 使用 SAN 系统\n- 使用固态硬盘（SSD）\n- 正确对齐磁盘\n- 使用带电池备份的控制器缓存\n- 增加系统内存\n- 创建多个文件和文件组\n\
  - 将日志文件移动到独立的物理驱动器\n- 使用分区表\n\n接下来，我将逐一介绍这些解决方案。\n\n### 优化应用程序工作负载\n\n我无法再强调优化应用程序工作负载在解决性能问题时的重要性。\n\
  \n具有最高读写次数的查询将会导致大量的磁盘 I/O。本书后续部分将更详细地介绍优化这些查询的策略。\n\n### 使用更快的 I/O 路径\n\n最高效的解决方案之一，也是你在任何可能的时候都应该采用的，就是使用具有更快磁盘传输速度的驱动器、控制器和其他架构。然而，你不应该仅仅在未经进一步调查的情况下升级磁盘驱动器；你需要找出导致磁盘压力的原因。\n\
  \n### 使用 RAID 阵列\n\n获得磁盘 I/O 并行性的一种方法是创建一个单一的驱动器池来服务所有 SQL Server 数据库文件（事务日志文件除外）。这个池可以是一个单独的\
  \ RAID 阵列，在 Windows Server 2012 R2 中表现为一个物理磁盘驱动器。驱动器池的有效性取决于 RAID 磁盘的配置。\n\n在所有可用的\
  \ RAID 配置中，最常用的 RAID 配置如下（也如图 3-1 所示）：\n\n- **RAID 0**：带区化，无容错\n- **RAID 1**：镜像\n\
  - **RAID 5**：带奇偶校验的带区化\n- **RAID 1+0**：带镜像的带区化\n\n> **浅灰色表示数据**  \n> **深灰色表示容错信息**\
  \  \n> **RAID 0** - 磁盘包含数据  \n> **RAID 1** - 磁盘包含数据的镜像内容  \n> **RAID 5**  \n> **RAID\
  \ 0+1**  \n> ***图 3-1.** RAID 配置*\n\n### RAID 0\n\n由于此 RAID 配置没有容错能力，你只能在数据可靠性不是问题的场景下使用它。阵列中任何磁盘的故障都会导致磁盘子系统中的数据完全丢失。因此，你不应将其用于构成数据库的任何数据文件或事务日志文件，可能的例外是名为\
  \ `tempdb` 的系统临时数据库。RAID 0 中每个磁盘的 I/O 数由以下等式表示：\n\n```\n每个磁盘的 I/O 数 = (读取次数 + 写入次数)\
  \ / 阵列中的磁盘数\n```\n\n在此等式中，`Reads` 是对磁盘子系统的读取请求数，`Writes` 是对磁盘子系统的写入请求数。\n\n### RAID\
  \ 1\n\nRAID 1 通过将数据磁盘镜像到另一个独立的磁盘上，为关键数据提供高容错能力。它可用于完整数据能够容纳在一个磁盘上的场景。用户数据库的事务日志文件、操作系统文件以及\
  \ SQL Server 系统数据库（`master` 和 `msdb`）通常足够小，适合使用 RAID 1。\n\nRAID 1 中每个磁盘的 I/O 数由以下等式表示：\n\
  \n```\n每个磁盘的 I/O 数 = (读取次数 + 2 * 写入次数) / 2\n```\n\n### RAID 5\n\nRAID 5 在许多情况下是一个可接受的选择。它通过有效地仅使用一个额外磁盘来保存其他磁盘数据的计算奇偶校验信息，提供合理的容错能力，如图\
  \ 3-1 所示。当 RAID 5 配置中出现磁盘故障时，I/O 性能会变得非常糟糕，尽管系统在故障驱动器下运行时仍然可用。\n\n任何写入操作占总磁盘请求超过\
  \ 10% 的数据都不是 RAID 5 的良好候选对象。\n\n因此，在只读卷或磁盘写入百分比较低的卷上使用 RAID 5。\n\nRAID 5 中每个磁盘的\
  \ I/O 数由以下等式表示：\n\n```\n每个磁盘的 I/O 数 = (读取次数 + 4 * 写入次数) / 阵列中的磁盘数\n```\n\n如这个等式所示，对\
  \ RAID 5 磁盘子系统的写入操作被放大了四倍。对于每个传入的写入请求，磁盘子系统上有以下四个对应的 I/O 请求：\n\n- 一次读取 I/O，从要修改内容的数据磁盘读取现有数据\n\
  - 一次读取 I/O，从相应的奇偶校验磁盘读取现有奇偶校验信息\n- 一次写入 I/O，将新数据写入要修改内容的数据磁盘\n- 一次写入 I/O，将新的奇偶校验信息写入相应的奇偶校验磁盘\n\
  \n因此，每个写入请求的四个 I/O 包含两次读取 I/O 和两次写入 I/O。\n\n在 OLTP 数据库中，所有数据修改都会作为数据库事务的一部分立即写入事务日志文件，但数据文件本身的内容与事务日志文件内容的同步是以批处理操作异步进行的。此操作由\
  \ SQL Server 的内部进程（称为 `checkpoint process`）管理。此操作的频率可以通过使用 SQL Server 的 `recovery\
  \ interval (min)` 配置参数来控制。请记住，检查点的时机可以通过 SQL Server 2012 中引入的间接检查点来控制。\n\n由于高事务性\
  \ OLTP 数据库中事务日志文件的连续写入操作，将事务日志文件放在 RAID 5 阵列上会降低阵列的性能。虽然在可能的情况下不应将事务日志文件放在 RAID\
  \ 5 阵列上，但数据文件可以放在 RAID 5 上，因为对数据文件的写入操作是间歇性的，并且为了提高写入操作的效率而分批进行。\n\n### RAID 6\n\
  \nRAID 6 是在 RAID 5 基础上增加的一层。在 RAID 5 的存储中添加了一个额外的奇偶校验块。这不会对读取产生任何负面影响。这意味着对于读取，其性能与\
  \ RAID 5 相同。对于额外的写入操作会有额外的开销，但并不算大。添加这个额外的奇偶校验块是因为如今的 RAID 阵列变得如此之大，数据丢失是不可避免的。这个额外的奇偶校验块充当了检查机制，以更好地确保你的数据安全。\n\
  \n### RAID 1+0 (RAID 10)\n\n\n\n"
- "# 第三章 ■ 磁盘性能分析\n\nRAID 1+0（也称为 RAID 10）配置通过镜像阵列中的每个数据盘，提供了高度的容错能力。与 RAID 5 相比，这是一个昂贵得多的解决方案，因为它需要双倍的数据盘来提供容错。当需要大容量存储数据且超过\
  \ 10% 的磁盘请求是写入时，应使用这种 RAID 配置。由于 RAID 1+0 支持 `split seeks`（将读操作分布到数据盘和镜像盘上，然后合并两个数据流的能力），其读取性能也非常出色。因此，在性能至关重要的场景中，应使用\
  \ RAID 1+0。\n\nRAID 1+0 中每个磁盘的 I/O 数由以下等式表示：\n\n`每个磁盘的 I/O 数 = (读取次数 + 2 X 写入次数)\
  \ / 阵列中的磁盘数量`\n\n### 使用 SAN 系统\n\n尽管成本已经下降，但 SAN 仍然主要是大型企业系统的领域。SAN 可以通过简单地提供更多可读写的主轴和磁盘驱动器来提高存储子系统的性能。由于其规模、复杂性和成本，SAN\
  \ 并不一定在所有情况下都是好的解决方案。此外，根据数据量，直连存储（DAS）可以配置得运行更快。\n\nSAN 系统的主要优势并不体现在性能上，而是在可扩展性、可用性和维护方面。\n\
  \nSAN 的另一个增长领域是使用互联网小型计算机系统接口（iSCSI）将设备连接到网络的 SAN 设备。由于 iSCSI 接口的工作方式，你可以使网络设备看起来像是本地连接的存储。事实上，它的速度几乎和本地连接存储一样快，但你可以整合你的存储系统。\n\
  \n相反，通过使用本地磁盘并摆脱 SAN，你可能会获得性能提升。SAN 系统在设计上是高度冗余的。但是，这种冗余给磁盘操作增加了很多开销，尤其是 SQL Server\
  \ 典型执行的操作类型：快速执行的大量小型写入。虽然从单个本地磁盘迁移到 SAN 可能是一种改进，但根据你的系统和你搭建的磁盘子系统，在 SAN 之外可能会获得更好的性能。\n\
  \n### 使用固态硬盘\n\n固态硬盘正在席卷磁盘性能领域。这些驱动器使用内存而不是旋转磁盘来存储信息。它们安静、功耗低、速度极快。然而，与硬盘驱动器（HDD）相比，它们也相当昂贵。在撰写本文时，HDD\
  \ 的成本约为 0.03 美元/GB，而 SSD 约为 0.90 美元/GB。但这种成本被速度的提升所抵消，从大约每秒 100 次操作提升到每秒 5,000 次操作甚至更高。你还可以通过\
  \ SAN 或 RAID 将 SSD 放入阵列中，进一步增加性能优势。SSD 驱动器可能执行的写入操作次数是有限的，但到目前为止，其故障率并不高于 HDD。还有具有不同价格点和性能指标的混合解决方案。对于纯硬件解决方案，为\
  \ I/O 受限的系统实施 SSD 可能是你能做的最佳操作。\n\n### 正确对齐磁盘\n\nWindows Server 2012 R2 在安装过程中会进行磁盘对齐，因此现代服务器应该不会遇到这个问题。但是，如果你有较旧的服务器，这仍然是个问题。如果你要从\
  \ Windows Server 2008 之前的系统迁移卷，也需要担心这个问题。你将需要重新格式化这些卷以正确设置对齐。数据存储在磁盘上的方式是一系列存储在磁道上的`扇区`（也称为`块`）。当供应商确定的磁道大小（包含的扇区数量）与你正在写入的默认大小不同时，磁盘就处于未对齐状态。这意味着一个扇区可以正确写入，但下一个扇区将不得不跨越两个磁道。这可能会使读写磁盘所需的\
  \ I/O 量增加一倍以上。关键是对齐分区，以便为磁道存储正确数量的扇区。\n\n### 增加系统内存\n\n当物理内存不足时，系统开始将内存内容写回磁盘，并更频繁地读取较小的数据块，或读取较大的数据块，这两者都会导致大量分页。系统的内存越少，磁盘子系统的使用就越频繁。这可以通过使用前一节列举的内存瓶颈解决方案来解决。\n\
  \n### 创建多个文件和文件组\n\n在 SQL Server 中，每个用户数据库由一个或多个数据文件和通常一个事务日志文件组成。属于一个数据库的数据文件可以组合在一个或多个文件组中，用于管理和数据分配/放置目的。例如，如果一个数据文件被放在一个单独的文件组中，那么可以通过将文件组设置为只读来集体控制对该文件组中所有表的写入访问（事务日志文件不属于任何文件组）。\n\
  \n你可以从 SQL Server Management Studio 为数据库创建文件组，如图 3-2 所示。\n\n数据库的文件组显示在“数据库属性”对话框的“文件组”窗格中。\n\
  \n![](img/index-50_1.jpg)\n\n![](img/index-50_2.jpg)\n\n`图 3-2. 文件组配置`\n\n在图 3-2\
  \ 中，你可以看到默认为 AdventureWorks2012 创建了一个单一的文件组。你可以将多个文件添加到分布在多个 I/O 路径上的多个文件组中，以便在将数据库对象也移动到这些不同的组之后，可以在组之间并行工作并进行分布式存储，实质上是让多个主轴和多个\
  \ I/O 路径工作起来。但是，仅仅通过单个磁盘控制器向磁盘（即使是不同的磁盘）抛出大量文件，可能会导致性能更差，而不是更好。\n\n你可以在“数据库属性”对话框的“文件”窗口中，通过从下拉列表中选择，向文件组添加数据文件，如图\
  \ 3-3 所示。\n\n`图 3-3. 数据文件配置`\n\n你也可以通过编程方式执行此操作，如下所示：\n\n```\nALTER DATABASE AdventureWorks2012\
  \ ADD FILEGROUP Indexes;\nALTER DATABASE AdventureWorks2012 ADD FILE (NAME = AdventureWorks2012_Data2,\n\
  \     FILENAME = 'S:\\DATA\\AdventureWorks2012_2.ndf',\n     SIZE = 1mb,\n     FILEGROWTH\
  \ = 10%) TO FILEGROUP Indexes;\n```\n\n通过将经常连接的表分离到不同的文件组中，然后将文件组中的文件放在不同的磁盘或 LUN\
  \ 上，分离的 I/O 路径可以提高性能。例如，考虑以下查询：\n\n```\nSELECT jc.JobCandidateID,\n       e.ModifiedDate\n\
  FROM HumanResources.JobCandidate AS jc\nINNER JOIN HumanResources.Employee AS e\n\
  \     ON jc.BusinessEntityID = e.BusinessEntityID;\n```\n\n\n\n"
- "# 第三章 ■ 磁盘性能分析\n\n如果表 `HumanResources.JobCandidate` 和 `Person.BusinessEntity` 被分别放置在各自包含一个文件的独立文件组中，那么磁盘就可以通过多个\
  \ I/O 路径进行读取，从而提升性能。\n\n出于性能和恢复的目的，建议如果要使用多个文件组，则主文件组应仅用于系统对象，而次文件组应仅用于用户对象。这种方法提高了从损坏中恢复的能力。如果主数据文件和日志文件完好无损，数据库的可恢复性会更高。仅将主文件组用于系统对象，并将所有用户相关对象存储在一个或多个次文件组上。\n\
  \n将数据库分散到多个文件中（即使在同一驱动器上），可以轻松地将数据库文件移动到独立的驱动器上，从而使未来的磁盘升级更容易。例如，要将用户数据库文件 (`AdventureWorks2012_2.ndf`)\
  \ 移动到新的磁盘子系统 (`F:`)，您可以遵循以下步骤：\n\n1.  分离用户数据库，如下所示：\n    ```sql\n    USE master;\n\
  \    GO\n    EXEC sp_detach_db 'AdventureWorks2012';\n    GO\n    ```\n2.  将数据文件\
  \ `AdventureWorks2012_2.ndf` 复制到新磁盘子系统上的文件夹 `F:\\Data\\` 中。\n3.  通过引用适当位置的文件重新附加用户数据库，如下所示：\n\
  \    ```sql\n    USE master;\n    GO\n    sp_attach_db 'AdventureWorks2012R2',\n\
  \        'R:\\DATA\\AdventureWorks2012.mdf',\n        'F:\\DATA\\AdventureWorks2012_2.ndf',\n\
  \        'S:\\LOG\\AdventureWorks2012.ldf';\n    GO\n    ```\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  4.  要验证属于某个数据库的文件，请执行以下命令：\n    ```sql\n    USE AdventureWorks2012;\n    GO\n  \
  \  SELECT * FROM sys.database_files;\n    GO\n    ```\n\n### 将日志文件移动到独立的物理磁盘\n\n\
  只要可能，SQL Server 事务日志文件应始终位于与其他所有 SQL Server 数据库文件分离的独立硬盘驱动器上。与数据文件所需的非顺序（或随机）I/O\
  \ 不同，事务日志活动主要由顺序写入 I/O 组成。将事务日志活动与其他非顺序磁盘 I/O 活动分离可以带来 I/O 性能的提升，因为它使包含日志文件的硬盘驱动器能够专注于顺序\
  \ I/O。但是请记住，事务日志也存在随机读取，并且数据读写也可以像事务日志一样是顺序的。只是事务日志写入具有强烈的顺序性倾向。\n\n从硬盘访问数据所需时间的主要部分花费在磁盘主轴头的物理移动以定位数据上。一旦数据被定位，数据就会以电子方式读取，这比主轴头的物理移动要快得多。如果在日志磁盘上仅进行顺序\
  \ I/O 操作，则日志磁盘的主轴头可以用最少的物理移动写入日志磁盘。然而，如果同一个磁盘也用于数据文件，主轴头在写入日志文件之前必须移动到正确的位置。这增加了写入日志文件所需的时间，从而损害了性能。\n\
  \n即使使用 SSD 磁盘，将数据与事务日志隔离也意味着工作将被分配到多个位置，从而提高性能。\n\n此外，对于拥有多个 OLTP 数据库的 SQL Server，事务日志文件应在不同的物理驱动器上彼此物理分离以提高性能。此要求的例外情况是只读数据库或数据库更改很少的数据库。由于对只读数据库不进行联机更改，因此不会对日志文件执行写入操作。因此，对于只读数据库，不需要将日志文件放在单独的磁盘上。\n\
  \n作为一个经验法则，您应尽可能尝试将具有最高 I/O 的文件与其他高 I/O 文件隔离。这将减少磁盘上的争用并可能提高性能。要识别那些使用最多 I/O 的文件，请参考\
  \ `sys.dm_io_virtual_file_stats`。\n\n### 使用分区表\n\n\n"
- '# 第三章：磁盘性能分析


  ## 总结


  本章重点介绍如何收集和解读有关磁盘行为的指标。请记住，每套硬件可能有根本性的不同，因此应用任何关于行为的硬性指标都可能存在问题。您现在拥有了使用性能监视器和一些
  T-SQL 命令来收集磁盘性能指标的工具。磁盘瓶颈的解决方案多种多样，但如果您遇到与磁盘行为相关的瓶颈，则必须进行探索。


  下一章将通过讨论 CPU 来完成对系统瓶颈的探讨。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第四章：CPU 性能分析


  本章通过讨论 CPU、网络和通用 SQL Server 指标，结束本书对系统的探讨。CPU 是系统的工作引擎，它保持一切运行。收集和传输数据、维护系统以及排序访问所需的所有不同计算都是由
  CPU 执行的。在 CPU 上遇到瓶颈可能是一个难以摆脱的过程。与内存（您有时可以轻松安装更多）或磁盘（您有时可以轻松添加更多或升级）不同，CPU 是您所运行系统的一个组成部分，并且通常只能通过购买更新的机器来升级。因此，您需要密切关注
  CPU 使用率。


  网络很少成为 SQL Server 的主要瓶颈，但同样值得密切关注。最后，有一些 SQL Server 内部进程您需要收集指标。本章涵盖以下主题：


  -   如何收集处理器指标

  -   通过 T-SQL 查询可用的其他指标

  -   解决处理器瓶颈的方法


  ## 处理器瓶颈分析


  SQL Server 大量使用任何可用的处理器资源。您可以使用表 4-1 中的性能监视器计数器来分析处理器资源上的压力。


  **表 4-1. 用于分析 CPU 压力的性能监视器计数器**


  | 对象(实例[,实例 N]) 计数器 | 描述 | 值 |

  | :--- | :--- | :--- |

  | Processor(_Total)% Processor Time | 处理器处于忙状态的时间百分比 | 平均值 < 80%，但需与基线比较 |

  | Processor(_Total)% Privileged Time | 处理器在特权模式下花费的时间百分比 | 平均值 < 10%，但需与基线比较 |

  | System Processor Queue Length | 处理器上未完成的请求数量 | 平均值 < 2，但需与基线比较 |

  | System Context Switches/sec | 处理器从一个线程切换到另一个线程的速率 | 平均值 < 5,000，但需与基线比较 |

  | SQL Server:SQL Statistics Batch Requests/sec | 每秒收到的 SQL 命令批处理数 | 根据您的标准工作负载 |

  | SQL Server:SQL Statistics SQL Compilations/sec | SQL 被编译的次数 | 根据您的标准工作负载 |

  | SQL Server:SQL Statistics SQL Recompilations/sec | 重编译次数 | 根据您的标准工作负载 |


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  让我们更详细地讨论这些计数器。


  ### % Processor Time


  `% Processor Time` 不应持续过高（大于 80%）。任何持续超过 90% 的处理器时间的影响实际上与 100% 相同。如果 `% Processor
  Time` 持续较高，而磁盘和网络计数器值较低，您的首要任务必须是减轻处理器的压力。请记住，这里的数字只是建议；人们可以基于有效理由不同意这些数字。将它们作为评估系统的起点，而不是具体的建议。


  例如，如果 `% Processor Time` 是 85%，并且通过监控 I/O 计数器您发现磁盘使用过多，那么很可能大部分处理器时间都花在了管理磁盘活动上。这将反映在处理器的
  `% Privileged Time` 计数器中，如下一节所述。在这种情况下，首先优化磁盘瓶颈将是有利的。此外，请记住，磁盘瓶颈反过来可能是由于内存瓶颈造成的，如本章前面所述。


  您可以跟踪机器上所有处理器的聚合处理器时间，也可以单独跟踪特定处理器的利用率百分比。这允许在 SQL Server 运行在四处理器机器的三个处理器上的情况下隔离数据收集。请记住，您可能会看到一个处理器满负荷运行，而另一个处理器负载很小。在这种情况下，平均值无法反映现实情况。将平均值仅作为一个指标，而将个体值作为系统实际负载和处理的更准确度量。


  ### % Privileged Time


  Windows 服务器上的处理在两种模式下完成：*用户模式*和*特权*（或*内核*）模式。所有系统级别的活动，包括磁盘访问，都在特权模式下完成。如果您在专用的
  SQL Server 系统上发现 `% Privileged Time` 达到 20% 到 25% 或更高，那么系统可能正在进行大量的外部处理。它可能是 I/O、筛选器驱动程序（如加密服务）、有缺陷的
  I/O 组件，甚至是过时的驱动程序。专用 SQL Server 系统上的 `% Privileged Time` 计数器最多应为 5% 到 10%，但请使用您的基线来确定您系统上哪些行为看起来是正常的。


  ### Processor Queue Length


  `Processor Queue Length` 是处理器队列中的线程数量。（即使在具有多个处理器的计算机上，也只有一个处理器队列。）与磁盘计数器不同，`Processor
  Queue Length` 计数器不读取已经在运行的线程。在 CPU 利用率较低的系统上，`Processor Queue Length` 计数器通常为 0 或
  1。


  持续的 `Processor Queue Length` 计数器大于 2 通常表示处理器拥塞。由于存在多个处理器，您可能需要考虑处理处理器队列长度的调度程序数量。超过调度程序数量（通常与处理器
  1:1 对应）两倍的处理器队列长度也可能表明存在处理器瓶颈。虽然较高的 `% Processor Time` 计数器表示处理器繁忙，但持续较高的 `Processor
  Queue Length` 计数器是一个更确定的指标。如果超过了建议值，这通常表示有比当前处理器数量在最优方式下能够服务的更多的线程准备就绪。


  ### Context Switches/Sec


  *（注意：原文在此处中断，后续内容缺失。）*



  '
- '# 第 4 章 ■ CPU 性能分析


  `Context Switches/sec`（每秒上下文切换）计数器监控计算机上所有处理器从一个线程切换到另一个线程的综合速率。当运行中的线程自愿 relinquishes
  处理器、被更高优先级的就绪线程抢占，或者在用户模式与特权模式之间切换以使用执行体或子系统服务时，就会发生上下文切换。它是计算机上所有处理器中运行的所有线程的`Thread:Context
  Switches/sec`（线程：每秒上下文切换）之和，以切换次数进行度量。


  每个处理器每秒 5,000 次`Context Switches/sec`属于优秀到良好的范围。高数值很大程度上取决于你的 CPU 速度，因此需要随时间测量性能，并将此数字与你的基线进行比较，以了解何时可能出现偏离。


  ### 批处理请求/秒


  `Batch Requests/sec`（每秒批处理请求）为你提供了一个很好的指标，显示了系统上承受的负载量，这与处理器上承受的负载有直接关联。因为你的系统上可能看到大量低成本查询，或者少量高成本查询，所以你不能孤立地看这个数字，而必须参考本节中定义的其他计数器；每秒
  10,000 个请求可以被认为是繁忙的系统。更大的数值可能值得关注，但这完全取决于你的系统正常情况是怎样的。了解什么值在你自己的系统中具有意义的最佳方法是建立一个基线，然后从那里开始监控。请记住，这里的高数字不一定需要担心。如果你的所有其他资源都控制得当，并且你持续维持着较高的`batch
  requests/sec`，这仅仅意味着你的服务器很忙。


  ### SQL 编译/秒


  `SQL Compilations/sec`（每秒 SQL 编译）计数器在其聚合中同时显示了批处理编译和语句重编译。


  当服务器首次启动（或在故障转移或任何其他启动类型事件之后），这个数字可能非常高，但它会随着时间的推移趋于稳定。一旦稳定后，与基线度量相比，编译出现显著或持续的峰值就值得关注了，并且肯定会在处理器上表现为问题，因为查询编译是一项昂贵的操作。如果你正在使用某种对象关系映射引擎，例如`nHibernate`或`Entity
  Framework`，高编译次数可能是正常的，尽管成本同样高昂。第 14 章详细介绍了 SQL 编译。


  ### SQL 重编译/秒


  `SQL Recompilations/sec`（每秒 SQL 重编译）是对批处理和语句重编译的度量。大量的重编译可能导致处理器压力。因为语句重编译是此计数的一部分，所以它可能比
  SQL Server 2005 之前的版本高得多。第 17 章详细介绍了查询重编译。


  ## 其他测量 CPU 性能的工具


  你也可以使用 DMO 来捕获有关 CPU 的信息。这些 DMO 中的信息需要通过运行查询来捕获，然后将其作为基线度量的一部分保留下来。


  ### `Sys.dm_os_wait_stats`


  等待统计信息是了解系统是否存在瓶颈的好方法。不过，你不能简单地认为大于`x`就是一个坏数字。你需要随时间收集指标，以了解你的系统上什么是正常的。偏离正常值的部分才值得关注。针对此
  DMO 查询信号等待时间可以指示 CPU 瓶颈。


  ### `Sys.dm_os_workers` 和 `Sys.dm_os_schedulers`


  这些 DMO 显示 Windows 操作系统内的工作线程和调度器线程。定期针对这些运行查询将使你能够获取处于可运行状态的进程数量。这是处理器负载的一个极佳指示。


  ## 处理器瓶颈解决方案


  一些常见的处理器瓶颈解决方案如下：


  - 优化应用程序工作负载




  • 消除或减少过度的编译/重编译


  • 使用更多或更快的处理器


  • 不运行不必要的软件


  让我们依次考虑这些解决方案。


  ### 优化应用程序工作负载


  要识别处理器密集型的查询，请使用扩展事件会话（我将在下一章讨论）捕获所有 SQL 查询，然后按 CPU 列对输出进行分组。消耗 CPU 时间最多的查询对 CPU
  压力的贡献最大。随后，您应该分析并优化这些查询，以减轻 CPU 的压力。通常，导致 CPU 压力的原因并非查询内的大量计算，而是逻辑 I/O 中的争用。解决 I/O
  问题通常也能帮助您解决 CPU 问题。您也可以直接查询 `sys.dm_exec_query_stats` 或 `sys.dm_exec_procedure_stats`
  动态管理视图，以实时查看即时问题。最后，通过使用查询哈希和查询计划哈希，您可以识别并调整常见的查询或常见的执行计划（这将在第 14 章详细讨论）。本书的大部分后续章节都与优化应用程序工作负载有关。


  ### 消除过度的编译/重编译


  一定数量的查询编译和重编译是不可避免的，特别是如前所述，当使用 ORM 工具时。只有当这些情况在持续期间内大量发生时，才意味着存在问题。同样值得注意的是它们之间的比例。编译数量高而重编译数量低，意味着系统中查询重用较少（查询重用在第
  9 章详细讨论）。大量的重编译将导致处理器使用率过高。解决重编译的方法在第 17 章介绍。


  ### 使用更多或更快的处理器


  最容易的解决方案之一，也是您大多数时候会采用的方案，是增加系统处理能力。然而，由于处理器升级成本高昂，您应首先尽可能优化 CPU 密集型操作。


  可以通过提升单个处理器的性能或增加处理器数量来提高系统的处理能力。当 `% Processor Time` 计数器高而 `Processor Queue Length`
  计数器低时，提升单个处理器的性能是合理的。当 `% Processor Time` 计数器和 `Processor Queue Length` 计数器都高时，则应考虑增加处理器数量。增加处理器数量允许系统同时执行更多请求。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  第 4 章 ■ CPU 性能分析


  ### 不运行不必要的软件


  公司政策通常要求在服务器上安装病毒检查软件。服务器上也可能运行其他产品。在可能的情况下，同一台服务器上不应运行与 SQL Server 无关的不必要软件。与维护
  Windows Server 或 SQL Server 无关的外部应用程序最好放置在不同的机器上。


  ## 网络瓶颈分析


  在 SQL Server OLTP 生产环境中，很少有性能问题是由网络问题导致的。您在 OLTP 环境中遇到的大多数网络问题实际上是硬件或驱动程序限制，或者是交换机或路由器的问题。其中大多数问题最好使用网络监视器工具进行诊断。但是，性能监视器也提供了收集网络活动数据的对象，如表
  4-2 所示。


  **表 4-2.** 用于分析网络压力的性能监视器计数器


  **对象(实例[,实例 N])** | **计数器** | **描述** | **值**

  ---|---|---|---

  `Network Interface(网卡)` | `Bytes Total/sec` | 网卡上字节传输的速率 | 平均值 < 网卡容量的 50%，但需与基线比较

  `Network Segment` | `% Net Utilization` | 网络上使用的网络带宽百分比 | 平均值 < 网络带宽的 80%，但需与基线比较




