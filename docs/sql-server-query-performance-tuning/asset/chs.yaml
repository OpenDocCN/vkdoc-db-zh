  添加完所有性能计数器后，单击 `确定` 关闭“添加计数器”对话框。要将计数器列表保存为 `.htm` 文件，请在性能监视器的右框架中任意位置右键单击，然后选择
  `将设置另存为` 菜单项。


  这个 `.htm` 文件列出了所有的性能计数器，可以用作基础计数器集，来创建计数器日志或为同一台 SQL Server 机器交互式查看性能监视器图表。要将此计数器列表用于其他
  SQL Server 机器，请在文本编辑器（如记事本）中打开 `.htm` 文件，并将所有出现的 `\\SQLServerMachineName` 替换为空字符串（即删除）。


  Erin Stellato 在文章 “自定义性能监视器的默认计数器”（[`bit.ly/1brQKeZ`](http://bit.ly/1brQKeZ)）中概述了完成所有这些操作的一个快捷方法。


  你还可以使用此计数器列表文件在 Internet 浏览器中交互式查看性能监视器图表，如图 5-2 所示。


