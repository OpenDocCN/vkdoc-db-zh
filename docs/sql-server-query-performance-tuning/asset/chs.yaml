  您可能希望通过 SQL Agent 自动化执行最后一步，或者甚至可以使用 `sqlcmd.exe` 实用程序从命令行运行脚本。无论您使用哪种方法，最后一步都将启动会话。


  要停止会话，只需运行相同的脚本并将 `STATE` 设置为 `stop`。我将在下一节中演示如何操作。


