- '# 第 1 章：SQL 查询性能调优


  查询性能调优在当今的数据库应用程序中仍然至关重要。是的，硬件性能在不断提高。SQL Server 的升级——尤其是对有助于决定查询执行方式的优化器以及执行查询的查询引擎的升级——本身就带来了更好的性能。与此同时，SQL
  Server 实例被部署到虚拟机上，无论是本地还是托管环境，其硬件行为都无法得到保证。数据库正在走向平台即服务系统，例如 Amazon RDS 和 Windows
  Azure SQL Database。您仍然需要处理基本的数据库设计和代码生成。


  简而言之，查询性能调优仍然是提高数据库管理系统性能的关键机制。查询性能调优的妙处在于，在许多情况下，对索引或 SQL 查询的微小改动就能以极低的成本使应用程序效率大幅提升。在这些情况下，性能的提升可能比使用速度稍快的
  CPU 或稍好一点的优化器所带来的提升还要高出几个数量级。




  '
- '# 第 1 章：SQL 查询性能调优


  然而，对于粗心大意的人来说，其中存在许多陷阱。因此，需要一个经过验证的流程来确保你正确识别并解决性能瓶颈。为了激发你对磨练查询优化技能至关重要的各类主题的兴趣，以下是我本书涵盖的查询优化方面的快速列表：


  -   识别有问题的 SQL 查询

  -   分析查询执行计划

  -   评估当前索引的有效性

  -   避免书签查找

  -   评估当前统计信息的有效性

  -   理解参数嗅探及其故障修复

  -   分析和解决碎片问题

  -   优化执行计划缓存

  -   分析和避免语句重编译

  -   最小化阻塞和死锁

  -   分析游标使用的有效性

  -   应用内存中表存储和过程执行

  -   应用性能调优流程、工具和优化技术来优化 SQL 工作负载


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  在直接深入这些主题之前，让我们首先探讨一下我们为何要以这种方式进行性能调优。


  在本章中，我将讨论 SQL Server 数据库系统性能调优的基本概念。拥有一个你遵循的流程非常重要，这样才能找到并识别性能问题、修复这些问题，并记录你所做的改进。如果没有一个结构良好的流程，你将如同在黑暗中摸索，希望能命中目标。我将详述主要的性能瓶颈，并展示设计一个对数据库友好的应用程序（即数据的消费者）以及如何优化数据库是多么重要。具体来说，我涵盖以下主题：


  -   性能调优流程

  -   性能与成本

  -   性能基线

  -   调优工作的重点方向

  -   前 13 大 SQL Server 性能杀手


  本书未涵盖的内容足以填充其他许多本书。正如书名所示，本书的重点是 T-SQL 查询性能调优。但是，为了让你清楚，以下内容将不会涉及：


  -   硬件选择

  -   应用程序编码方法

  -   服务器配置（除非其影响查询调优）

  -   SQL Server Integration Services

  -   SQL Server Analysis Services

  -   SQL Server Reporting Services

  -   PowerShell


  ## 性能调优流程


  性能调优流程包括识别性能瓶颈、对已识别的问题进行优先级排序、排查其原因、应用不同的解决方案、量化性能改进，然后不断重复整个流程。你需要具备一点创造力，因为大多数时候，没有单一的“银弹”可以提升性能。挑战在于缩小可能原因的范围，并评估不同解决方案的效果。在迭代调优过程中，你甚至可以撤销之前的修改。


  ### 核心流程


  在调优过程中，你必须检查可能影响基于 SQL Server 的应用程序性能的各种硬件和软件因素。在进行性能分析时，你应该自问以下一般性问题：


  -   同一服务器上是否运行着其他资源密集型应用程序？

  -   硬件子系统的能力是否足以承受最大工作负载？

  -   SQL Server 配置是否正确？

  -   共享环境（无论是虚拟机还是平台）是否有足够的资源？或者我正在处理那里的配置问题，甚至是来自外部力量的资源争用？

  -   SQL Server 与数据库应用程序之间的数据库连接是否高效？

  -   数据库设计是否支持最快的数据检索（以及用于可更新数据库的修改）？

  -   由 SQL 查询组成的用户工作负载是否经过优化以减少 SQL Server 上的负载？

  -   哪些进程导致系统变慢？这反映在各种等待状态、性能计数器和动态管理对象的测量中。

  -   工作负载是否支持所需的并发级别？


  如果这些因素中的任何一个配置不当，那么整个系统性能可能会受到影响。让我们简要探讨一下这些因素。


  在同一服务器上运行另一个资源密集型应用程序会限制 SQL Server 可用的资源。即使是作为服务运行的应用程序也可能消耗大量系统资源，从而限制 SQL Server
  可用的资源。例如，应用程序可能被配置为以比 SQL Server 更高的优先级使用处理器。`优先级`是分配给资源的权重，促使处理器在执行时给予其更高的优先权。要确定进程的优先级，请按照以下步骤操作：


  1.  启动 Windows 任务管理器。

  2.  选择 查看 > 选择列。

  3.  选中 "基本优先级" 复选框。

  4.  单击 "确定" 按钮。


  这些步骤会将 "基本优先级" 列添加到进程列表中。随后，你将能够确定 SQL Server 进程 (`sqlservr.exe`) 默认以 "正常" 优先级运行，而
  Windows 任务管理器进程 (`taskmgr.exe`) 则以 "高" 优先级运行。因此，为了允许 SQL Server 最大化利用可用资源，你应该查找在
  SQL Server 计算机上运行的所有非必要应用程序/服务，并确保它们不是资源消耗大户。


  不正确地配置硬件可能会阻止 SQL Server 从可用资源中获得最大收益。需要考虑的主要硬件资源是处理器、内存、磁盘和网络。如果某个特定硬件资源的容量较小，那么它可能很快成为
  SQL Server 的性能瓶颈。


  虽然我不涉及硬件选择，但作为查询调优的一部分，你确实需要了解你所拥有的硬件可能在何处以及如何导致性能瓶颈。第 2、3 和 4 章详细介绍了其中一些硬件瓶颈。


  你还应该查看 SQL Server 的配置，因为正确的配置对于优化应用程序至关重要。有一长串定义 SQL Server 安装通用行为的配置项。这些配置可以使用系统存储过程
  `sys.configurations` 查看和修改。


  其中许多配置也可以通过 SQL Server Management Studio 以交互方式管理。


  由于 SQL Server 配置适用于整个 SQL Server 安装，因此通常首选标准配置。好消息是，通常你无需修改这些配置中的大多数；默认设置在大多数情况下效果最佳。事实上，一般建议是将大多数
  SQL Server 配置保持为默认值。我在本书中会详细讨论配置参数，并对更改其中一些参数提出一些建议。数据库选项的情况也类似。model 数据库上的默认设置对大多数系统来说是足够的。你可能需要调整自动增长设置，使其不同于默认值，但许多其他属性，如自动关闭或自动收缩，应保持关闭状态，而其他属性，如自动创建统计信息，在大多数情况下应保持开启。




