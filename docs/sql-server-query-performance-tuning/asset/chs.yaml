- "# 第 15 章 ■ 执行计划缓存行为\n\nJOIN `Production.Product` p\nON tha.`ProductID` = p.`ProductID`\n\
  WHERE p.`ProductID` = 461;\n\nSELECT p.[Name],\ntha.`TransactionDate`,\ntha.`TransactionType`,\n\
  tha.`Quantity`,\ntha.`ActualCost`\nFROM `Production.TransactionHistoryArchive` tha\n\
  JOIN `Production.Product` p\nON tha.`ProductID` = p.`ProductID`\nWHERE p.`ProductID`\
  \ = 712;\n\n与之前使用的原始查询类似，这些查询的差异仅在于传递给 `ProductID` 列的值。当两个查询都运行时，你可以从 `sys.dm_exec_query_stats`\
  \ 中选择数据来查看哈希值（图 15-24）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ![](img/index-307_1.jpg)\n\n![](img/index-307_2.png)\n\n**图 15-24.** `query_plan_hash`\
  \ 的差异\n\n你可以看到 `query_hash` 值是相同的，但 `query_plan_hash` 值不同。这是因为根据传入值的统计信息创建的执行计划截然不同，如你在图\
  \ 15-25 中所见。\n\n**图 15-25.** 不同的参数导致截然不同的计划\n\n查询计划哈希和查询哈希值是追踪不同查询间常见问题的有用工具，但正如你所见，它们并非在所有情况下都能检索到准确的信息集合。\n\
  \n它们确实为识别其他可能导致查询性能不佳的地方增添了另一个实用工具。它们也可用于随时间跟踪执行计划。你可以在将查询部署到生产环境后捕获其 `query_plan_hash`，然后观察它是否因数据变化而改变。借此，你还可以通过计划跟踪聚合的查询统计信息，参考\
  \ `sys.dm_exec_query_stats`，但请记住，当服务器重启或计划缓存以任何方式被清除时，聚合数据会被重置。在调优查询时，请牢记这些工具。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 执行计划缓存建议\n\n计划缓存的基本目的是通过重用执行计划来提高性能。因此，确保你的执行计划确实可重用至关重要。由于即席查询的计划重用效率低下，通常建议尽可能依赖参数化的工作负载技术。为确保有效利用执行计划缓存，请遵循以下建议：\n\
  \n• 显式参数化查询的可变部分。\n• 使用存储过程来实现业务功能。\n• 使用 `sp_executesql` 以避免存储过程维护。\n• 使用准备/执行模型以避免重新发送查询字符串。\n\
  • 避免即席查询。\n• 对于动态查询，优先使用 `sp_executesql` 而非 `EXECUTE`。\n• 谨慎地参数化查询的可变部分。\n• 避免在连接之间修改环境设置。\n\
  • 避免查询中对象的隐式解析。\n\n让我们更详细地看看这些要点。\n\n### 显式参数化查询的可变部分\n\n一个查询通常会运行多次，每次运行之间唯一的差异是可变部分的值不同。然而，如果能将查询的静态部分和可变部分分开，它们的计划就可以被重用。\n\
  \n尽管 SQL Server 具有简单参数化和强制参数化功能，但它们有严重的局限性。请始终使用标准的参数化工作负载技术显式执行参数化。\n\n### 创建存储过程以实现业务功能\n\
  \n如果你已显式地参数化了查询，那么将其放入存储过程可以获得最佳的可重用性。由于只需随存储过程名称一起发送参数，网络流量得以减少。\n\n由于存储过程是从缓存中重用的，它们可以比即席查询运行得更快。\n\
  \n像任何事物一样，好事也可能过头。有些业务流程适合放在数据库中，但也有些业务流程绝不应该放在数据库内。\n\n### 使用 `sp_executesql` 编码以避免存储过程维护\n\
  \n如果存储过程所需的对象维护成为一个考虑因素，或者你正在使用客户端生成的查询，那么请使用 `sp_executesql` 将查询作为参数化工作负载提交。与存储过程模型不同，`sp_executesql`\
  \ 不会在数据库中创建任何持久对象。`sp_executesql` 适合执行单例查询或小批量查询。\n\n在存储过程中实现的完整业务逻辑也可以通过 `sp_executesql`\
  \ 作为一个大的查询字符串提交。然而，随着业务逻辑复杂性的增加，为完整逻辑创建和维护查询字符串变得困难。\n\n此外，使用 `sp_executesql` 和带有适当参数的存储过程可以防止针对服务器的\
  \ SQL 注入攻击。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 实现准备/执行模型以避免重新发送查询字符串\n\
  \n`sp_executesql` 要求每次重新执行查询时都要通过网络发送查询字符串。它还需要在服务器端进行查询字符串匹配的成本，以在过程缓存中找到相应的执行计划。在\
  \ ODBC 或 OLEDB（或 OLEDB .NET）应用程序的情况下，你可以使用准备/执行模型来避免在多次执行期间重新发送查询字符串，因为只需提交计划句柄和参数。在准备/执行模型中，由于计划句柄会返回给应用程序，因此该计划可以被其他用户连接重用；它不限于创建该计划的用户。\n\
  \n### 避免即席查询\n\n不要设计使用即席查询的新应用程序！为即席查询创建的执行计划在查询以不同的可变部分值重新提交时无法被重用。尽管 SQL Server\
  \ 具有简单参数化和强制参数化功能来隔离查询的可变部分，但由于 SQL Server 在参数化方面严格的保守性，该功能仅限于简单查询。为了获得更好的计划可重用性，请将查询作为参数化工作负载提交。\n\
  \n有些系统完全建立在即席查询的概念之上。这在功能上可行，并且可以在 SQL Server 中工作，但正如你所见，它伴随着大量你需要规划的额外开销。\n\n此外，即席查询通常是\
  \ SQL 注入被引入系统的方式。\n\n### 对于动态查询，优先使用 `sp_executesql` 而非 `EXECUTE`\n\n在存储过程或数据库应用程序内动态生成的\
  \ SQL 查询字符串应使用 `sp_executesql` 执行，而不是 `EXECUTE` 命令。`EXECUTE` 命令不允许显式参数化查询的可变部分。\n\
  \n要理解前面关于 `sp_executesql` 和 `EXECUTE` 的比较，考虑在 `adhocsproc` 中用于执行 `SELECT` 语句的动态\
  \ SQL 查询字符串。\n\n```sql\nDECLARE @n VARCHAR(3) = '776',\n        @sql VARCHAR(MAX);\n\
  \nSET @sql = 'SELECT * FROM Sales.SalesOrderDetail sod '\n         + 'JOIN Sales.SalesOrderHeader\
  \ soh '\n         + 'ON sod.SalesOrderID=soh.SalesOrderID '\n         + 'WHERE sod.ProductID='''\n\
  \         + @n + '''';\n\n--使用 EXECUTE 语句执行动态查询\nEXECUTE (@sql);\n```\n\n`EXECUTE`\
  \ 语句将查询连同 `d.ProductID` 的值作为即席查询提交，因此可能不会导致简单参数化。通过查看缓存来自己检查输出。\n\n```sql\nSELECT\
  \ deqs.execution_count,\n       deqs.query_hash,\n       deqs.query_plan_hash,\n\
  \       dest.text,\n       deqp.query_plan\nFROM   sys.dm_exec_query_stats AS deqs\n\
  \       CROSS APPLY sys.dm_exec_sql_text(deqs.plan_handle) dest\n       CROSS APPLY\
  \ sys.dm_exec_query_plan(deqs.plan_handle) AS deqp;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n\n"
- "# 第 15 章 ■ 执行计划缓存行为\n\n为提高计划缓存的可重用性，请使用 `sp_executesql` 将动态 SQL 字符串作为参数化查询执行。\n\
  \n```sql\nDECLARE @n NVARCHAR(3) = '776',\n    @sql NVARCHAR(MAX),\n    @paramdef\
  \ NVARCHAR(6);\n\nSET @sql = 'SELECT * FROM Sales.SalesOrderDetail sod '\n    +\
  \ 'JOIN Sales.SalesOrderHeader soh '\n    + 'ON sod.SalesOrderID=soh.SalesOrderID\
  \ ' + 'WHERE sod.ProductID=@1' ;\n\nSET @paramdef = N'@1 INT';\n\n--使用系统存储过程 sp_executesql\
  \ 执行动态查询\nEXECUTE sp_executesql\n    @sql,\n    @paramdef,\n    @1 = @n;\n```\n\n\
  使用 `sp_executesql` 作为显式参数化查询执行，会为查询生成参数化计划，从而增加执行计划的可重用性。\n\n### 谨慎地将查询的可变部分参数化\n\
  \n在将查询的可变部分转换为参数时要小心。某些变量的取值范围可能差异极大，导致适用于某一范围值的执行计划可能不适用于其他值。这可能导致糟糕的参数嗅探（在第 16\
  \ 章中介绍）。\n\n### 不要允许查询中对象的隐式解析\n\nSQL Server 允许在不同架构下创建具有相同名称的多个数据库对象。例如，表 `t1`\
  \ 可以使用两种不同的架构（`u1` 和 `u2`）创建，它们各自独立。大多数系统中的默认所有者是 `dbo`（数据库所有者）。如果用户 `u1` 执行以下查询，SQL\
  \ Server 会首先尝试查找表 `t1` 是否存在于用户 `u1` 的默认架构中。\n\n```sql\nSELECT * FROM tl WHERE cl\
  \ = 1;\n```\n\n如果没有找到，则会尝试查找表 `t1` 是否存在于 `dbo` 用户下。这种隐式解析允许用户 `u1` 在另一架构下创建另一个表\
  \ `t1` 实例，并（使用相同的应用程序代码）临时访问它，而不影响其他用户。\n\n在生产数据库上，我建议使用架构所有者并避免隐式解析。如果不这样做，在生产服务器上使用隐式解析会增加以下开销：\n\
  \n-   需要更多时间来识别对象。\n-   会降低计划缓存可重用性的效率。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 小结\n\nSQL Server 基于成本的查询优化器不是根据查询的确切语法，而是通过评估使用不同处理策略执行查询的成本来决定有效的执行计划。使用不同处理策略的成本评估在多个优化阶段完成，以避免在优化查询上花费过多时间。然后，执行计划会被缓存，以便在重新执行相同查询时节省执行计划生成的成本。为提高缓存计划的可重用性，SQL\
  \ Server 支持在重新运行查询、可变部分取不同值时重用执行计划的不同技术。\n\n使用存储过程通常是提高执行计划可重用性的最佳技术。SQL Server\
  \ 为存储过程生成参数化执行计划，以便在使用相同或不同参数值重新运行存储过程时可以重用现有计划。但是，如果存储过程的现有执行计划失效，则无法在不重新编译的情况下重用该计划，从而降低了计划缓存可重用性的效率。\n\
  \n在下一章中，我将讨论如何对糟糕的参数嗅探进行故障排除和解决。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# `第 16 章`\n\n## `参数嗅探`\n\n在上一章中，我讨论了如何将执行计划放入缓存以及如何重用它们。这是一个值得称赞的目标，也是提高系统整体性能的众多方法之一。确保计划重用的最佳机制之一是参数化查询，可以通过存储过程、预处理语句或\
  \ `sp_executesql` 实现。所有这些机制都会创建一个参数，在创建计划时用该参数代替硬编码值。这些参数可以被优化器采样或“嗅探”，以便在创建执行计划时使用其中包含的值。当这种情况顺利进行时（大多数时候确实如此），你会受益于更准确的计划。但当它出错并变成糟糕的参数嗅探时，你可能会遇到严重的性能问题。\n\
  \n在本章中，我将涵盖以下主题：\n\n-   参数嗅探背后有益的机制\n-   参数嗅探如何变糟\n-   处理糟糕参数嗅探的机制\n\n## 参数嗅探\n\n\
  当参数化查询被发送到优化器，并且缓存中没有现有的计划时，优化器将执行其功能，为按 T-SQL 语句请求操作数据创建执行计划。当这个参数化查询被调用时，参数的值会被设置（通过你的程序或参数定义中的默认值）。无论哪种方式，那里都有一个值。优化器知道这一点。因此，它利用这一事实读取参数的值。这就是被称为\
  \ *参数嗅探* 的过程中“嗅探”的部分。\n\n有了这些可用值，优化器随后将使用这些特定值来查看参数所引用数据的统计信息。有了特定值和一套准确的统计信息，你将得到更好的执行计划。这种有益的参数嗅探过程会自动地、持续不断地为所有参数化查询运行，无论它们来自哪里。\n\
  \n你也可以对局部变量进行嗅探。不过在深入之前，让我们先区分一下局部变量和参数，因为在 T-SQL 语句中，它们看起来可能一样。这个例子同时展示了局部变量和参数：\n\
  \n```sql\nCREATE PROCEDURE dbo.ProductDetails\n    (@ProductID INT)\nAS\nDECLARE\
  \ @CurrentDate DATETIME = GETDATE();\nSELECT p.Name,\n    p.Color,\n    p.DaysToManufacture,\n\
  \    pm.CatalogDescription\nFROM Production.Product AS p\nJOIN Production.ProductModel\
  \ AS pm\n    ON pm.ProductModelID = p.ProductModelID\nWHERE p.ProductID = @ProductID\n\
  \    AND pm.ModifiedDate < @CurrentDate;\nGO\n```\n\n前面查询中的参数是 `@ProductID`。局部变量是\
  \ `@CurrentDate`。区分它们很重要，因为当你看到 `WHERE` 子句时，它们看起来完全一样。\n\n如果使用局部变量的任何语句发生重新编译，这些变量可以被优化器以与嗅探参数相同的方式嗅探。只需意识到这一点。除了重新编译的这种情况外，当优化器尝试编译计划时，局部变量对它来说是未知量。通常只有参数可以被嗅探。\n\
  \n为了观察参数嗅探的实际效果并展示其有用性，让我们从一个不同的存储过程开始。\n\n```sql\nIF (SELECT OBJECT_ID('dbo.AddressByCity')\n\
  ) IS NOT NULL\nDROP PROC dbo.AddressByCity;\nGO\n\nCREATE PROC dbo.AddressByCity\
  \ @City NVARCHAR(30)\nAS\nSELECT a.AddressID,\n    a.AddressLine1,\n    AddressLine2,\n\
  \    a.City,\n    sp.[Name] AS StateProvinceName,\n    a.PostalCode\nFROM Person.Address\
  \ AS a\nJOIN Person.StateProvince AS sp\n    ON a.StateProvinceID = sp.StateProvinceID\n\
  WHERE a.City = @City;\n```\n\n创建存储过程后，使用此参数运行它：\n\n```sql\nEXEC dbo.AddressByCity\
  \ @City = N'London';\n```\n\n这将导致以下 I/O 和执行时间，以及如图 16-1 所示的查询计划。\n\n表 'Address'。扫描计数\
  \ 1，逻辑读取 216\n表 'StateProvince'。扫描计数 1，逻辑读取 3\n\n\n"
- "# 第 16 章：参数嗅探\n\n### 执行计划分析\n\nCPU 时间 = 0 毫秒，耗时 = 124 毫秒。\n\n***图 16-1.** AddressByCity\
  \ 的执行计划*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-314_1.png)\n\
  \n优化器嗅探到了值 `London`，并基于 `Address` 表的统计数据中 `London` 市所代表的数据分布，得出了一个执行计划。该查询或表上的索引可能还有其他调优机会，但对于\
  \ `London` 而言，此计划是最优的。你可以像下面这样，使用一个局部变量来编写一个完全相同的查询：\n\n```sql\nDECLARE @City NVARCHAR(30)\
  \ = N'London';\n\nSELECT a.AddressID,\n       a.AddressLine1,\n       AddressLine2,\n\
  \       a.City,\n       sp.[Name] AS StateProvinceName,\n       a.PostalCode\nFROM\
  \ Person.Address AS a\nJOIN Person.StateProvince AS sp\n    ON a.StateProvinceID\
  \ = sp.StateProvinceID\nWHERE a.City = @City;\n```\n\n当这个查询被执行时，I/O 和执行时间的结果是不同的。\n\
  \n```\n表 'StateProvince'。扫描计数 0，逻辑读取 868 次\n表 'Address'。扫描计数 1，逻辑读取 216 次\nCPU 时间\
  \ = 0 毫秒，耗时 = 212 毫秒。\n```\n\n执行时间增加了，总读取次数从 219 次增加到了 1084 次。这可以通过查看图 16-2. 所示的新执行计划得到部分解释。\n\
  \n***图 16-2.** 使用局部变量创建的执行计划*\n\n所发生的情况是，优化器无法对局部变量的值进行采样或嗅探，因此不得不使用统计数据中的平均行数。通过查看\
  \ `索引扫描` 运算符属性中的估计行数，你可以看到这一点。它显示为 34.113。然而，如果你查看返回的数据，`London` 值实际上有 434 行。简而言之，如果优化器认为需要检索\
  \ 434 行，它会使用 `合并联接` 并只进行 219 次读取来创建一个计划。但是，如果它认为只返回大约 34 行，它会使用带有 `嵌套循环` 联接的计划，由于嵌套循环的特性（为上层数据集中的每个值在下层数据中执行一次查找），这导致了\
  \ 1,084 次读取和更差的性能。\n\n这就是参数嗅探在实际中导致性能提升的情况。现在，让我们看看当参数嗅探出问题时会发生什么。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 糟糕的参数嗅探\n\n当你的统计数据存在问题时，参数嗅探就会产生问题。传递给参数的值可能代表你的数据以及统计数据内部的数据分布。在这种情况下，你会看到一个良好的执行计划。但是，当传递的参数不能代表表中其余数据时，会发生什么？\n\
  \n这种情况可能出现，因为你的数据分布本身就不是平均的。例如，统计数据中的大多数值只会返回几行，比如六行，但某些值会返回数百行。反之亦然，常见的情况是大量数据的分布，而小值的集合不常见。在这种情况下，基于非代表性数据创建了一个执行计划，但这个计划对大多数查询来说并不实用。这种情况最常表现为性能突然下降，有时相当严重。它甚至可能看似随机地自我修复，当重新编译事件允许一个更好的代表性数据值作为参数传入时。\n\
  \n当统计数据过时或由于是采样而非扫描导致不准确时（更多关于统计信息的细节，请参见第 12 章），你也可能看到这种情况发生。无论如何，这种情况会产生一个用处不大的计划，并将其存储在缓存中。例如，考虑以下存储过程：\n\
  \n```sql\nCREATE PROC dbo.AddressByCity\n    @City NVARCHAR(30)\nAS\nSELECT a.AddressID,\n\
  \       a.AddressLine1,\n       AddressLine2,\n       a.City,\n       sp.[Name]\
  \ AS StateProvinceName,\n       a.PostalCode\nFROM Person.Address AS a\nJOIN Person.StateProvince\
  \ AS sp\n    ON a.StateProvinceID = sp.StateProvinceID\nWHERE a.City = @City;\n\
  GO\n```\n\n\n## 第 16 章 ■ 参数嗅探\n\n如果再次运行之前创建的存储过程 `dbo.AddressByCity`，但这次使用不同的参数，那么它将返回一组不同的\
  \ I/O 和执行时间，但执行计划是相同的，因为它从缓存中被重用了。\n\n`EXEC dbo.AddressByCity @City = N'Mentor';`\n\
  \n表 'Address'。扫描计数 1，逻辑读取 216\n表 'StateProvince'。扫描计数 1，逻辑读取 3\nCPU 时间 = 15 ms，耗时\
  \ = 84 ms。\n\n由于重用了相同的执行计划，I/O 是相同的。执行时间更快是因为返回的行数更少。你可以查看 `sys.dm_exec_query_stats`\
  \ 的输出（如图 16-3 所示）来验证该计划确实被重用了。\n\n```sql\nSELECT dest.text,\ndeqs.execution_count,\n\
  deqs.creation_time\nFROM sys.dm_exec_query_stats AS deqs\nCROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle)\
  \ AS dest\nWHERE dest.text LIKE 'CREATE PROC dbo.AddressByCity%';\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-316_1.jpg)\n\n![](img/index-316_2.png)\n\n图 16-3. `sys.dm_exec_query_stats`\
  \ 的输出验证了存储过程的重用\n\n为了展示不良的参数嗅探如何发生，你可以颠倒存储过程的执行顺序。首先运行 `DBCC FREEPROCCACHE` 来清空缓冲区缓存（这不应该在生产机器上运行）。然后以相反的顺序重新运行查询。第一个查询使用参数值\
  \ Mentor，产生以下 I/O 和执行计划（图 16-4）：\n\n表 'StateProvince'。扫描计数 0，逻辑读取 2\n表 'Address'。扫描计数\
  \ 1，逻辑读取 216\nCPU 时间 = 0 ms，耗时 = 78 ms\n\n图 16-4. 执行计划发生了变化\n\n图 16-4 与图 16-2 所示的执行计划不同。读取次数略有下降，但执行时间大致相同。第二次执行，使用\
  \ London 作为参数值，产生以下 I/O 和执行时间：\n\n表 'StateProvince'。扫描计数 0，逻辑读取 868\n表 'Address'。扫描计数\
  \ 1，逻辑读取 216\nCPU 时间 = 0 ms，耗时 = 283 ms。\n\n这一次，读取次数急剧增加，达到了使用局部变量时的水平，执行时间也增加了。第一次使用参数\
  \ London 执行存储过程时创建的计划，最适合检索数据库中符合该条件的 434 行。然后，下一次使用参数值 Mentor 执行存储过程时，使用第一次执行生成的相同计划，表现也还算可以。当顺序颠倒后，为\
  \ Mentor 值创建了一个新的执行计划，而这个计划对于 London 值来说效果非常差。\n\n在这些例子中，我实际上稍微取了点巧。如果你查看相关统计信息中的数据分布，你会发现平均返回行数在\
  \ 34 左右，而 London 的 434 行是一个离群值。当存储过程为 London 编译时，你看到的略好的性能反映了一个事实：需要一个不同的计划。然而，对于像\
  \ Mentor 这样的值，在使用为 London 创建的计划时，性能略有下降。但是，为 Mentor 改进的计划对于像 London 这样的值来说，绝对是灾难性的。现在到了困难的部分。\n\
  \n你必须确定哪个计划适合你系统的负载。一个计划对平均值来说稍差一些，而另一个计划对平均值更好，但严重损害了离群值的性能。问题是，是为了支持离群值获得更好性能，而让所有可能的数据集都运行得稍慢一些，还是为了让更大部分的数据子集运行良好（因为它可能被更频繁地调用）而让离群值承受性能损失？\n\
  \n这需要你根据自己系统的具体情况来判断。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-317_1.jpg)\n\
  \n### 识别不良参数嗅探\n\n\n"
- "# 这将是一个间歇性问题\n\n有时你会得到一个运行得足够好、没人抱怨的执行计划，有时则会得到另一个，然后突然电话响个不停，全是抱怨系统速度的投诉。因此，这个问题很难追踪。关键在于识别出你正在为给定的参数化查询获取两个（或有时更多）不同的执行计划。当你开始遇到这种性能间歇性变化时，必须捕获相关的查询计划。\n\
  \n一种方法是使用 `sys.dm_exec_query_plan` DMO 直接从缓存中提取估计的计划，如下所示：\n\n```sql\nSELECT deps.execution_count,\n\
  \       deps.total_elapsed_time,\n       deps.total_logical_reads,\n       deps.total_logical_writes,\n\
  \       deqp.query_plan\nFROM sys.dm_exec_procedure_stats AS deps\nCROSS APPLY sys.dm_exec_query_plan(deps.plan_handle)\
  \ AS deqp\nWHERE deps.object_id = OBJECT_ID('AdventureWorks2012.dbo.AddressByCity');\n\
  ```\n\n此查询使用 `sys.dm_exec_procedure_stats` DMO 来检索缓存中关于该存储过程的信息及其查询计划。在 SSMS 中运行结果将包含一个可点击的\
  \ `query_plan` 列。\n\n点击它将打开一个图形化计划，即使检索到的是 XML。要保存计划以便以后比较，只需右键单击计划本身，然后从上下文菜单中选择“另存为执行计划”。然后你可以保存此计划，以便与以后的计划进行比较。你需要查看的是第一个运算符的属性，本例中是\
  \ `SELECT` 运算符。在那里，你会找到“参数列表”项，它将显示优化器编译计划时使用的值，如图 16-5 所示。\n\n`图 16-5`\n\n然后你可以使用这个值来查看你的统计信息，以理解为什么你会看到一个与预期不同的计划。在这种情况下，如果我运行以下查询，我可以检查直方图，看看像\
  \ `London` 这样的值可能存储在哪里以及我可以预期多少行：\n\n```sql\nDBCC SHOW_STATISTICS('Person.Address','_WA_Sys_00000004_164452B1');\n\
  ```\n\n图 16-6 显示了直方图的相关部分。\n\n`www.it-ebooks.info`\n\n![index-318_1.jpg](img/index-318_1.jpg)\n\
  \n第 16 章 ■ 参数嗅探\n\n`图 16-6`\n\n你可以看到，`London` 的值返回的行数比 `AVG_RANGE_ROWS` 中显示的任何平均行数都要多，并且它比\
  \ `RANG_HI_KEY` 计数中存储的许多其他步骤的 `EQ_ROWS` 都要高。\n\n简而言之，`London` 的值与其余数据相比是偏斜的。这就是为什么那里的计划与其他计划不同。\n\
  \n你必须对统计信息和编译时参数值进行同样类型的评估，以理解不良的参数嗅探来自哪里。\n\n但是，如果你有一个参数化查询正遭受不良参数嗅探的困扰，你可以采取几种不同的方法来尝试减轻这个问题。\n\
  \n### 减轻不良参数嗅探\n\n一旦你确定在某种情况下遇到了不良参数嗅探，你不必默默忍受。你可以做些什么，但你需要做出决定。你有几种选择来减轻不良参数嗅探的行为。\n\
  \n- 你可以通过在执行存储过程前对其运行 `sp_recompile` 来强制在执行时重新编译计划。\n- 另一种强制重新编译的方法是使用 `EXEC <procedure\
  \ name> WITH RECOMPILE`。\n- 还有一种强制每次执行都重新编译的机制，是在创建存储过程时使用 `WITH RECOMPILE` 作为过程定义的一部分。\n\
  - 你也可以在单个语句上使用 `OPTION (RECOMPILE)`，让只有那些语句而不是整个过程重新编译。如果你打算强制重新编译，这通常是最佳方法。\n-\
  \ 你可以将输入参数重新分配给局部变量。这种流行的修复方法强制优化器通过查看所引用数据的统计信息来猜测可能使用的值，这可以消除实际参数值被考虑在内的情况。这是一种旧方法，已被使用\
  \ `OPTIMIZE FOR UNKNOWN` 所取代。\n- 你可以在创建存储过程时使用查询提示 `OPTIMIZE FOR`，并为其提供已知的良好参数，这些参数将为大多数查询生成一个有效的计划。你可以指定一个生成特定计划的值，或者你可以指定\
  \ `UNKNOWN` 以获取基于统计信息平均值的通用计划。\n- 你可以使用计划指南，这是一种使查询以某种方式行为而无需修改存储过程的方法。这将在第 17 章中详细讨论。\n\
  - 你可以通过将跟踪标志 4136 设置为 `on` 来在服务器上禁用参数嗅探。请理解，这种有益的行为将对整个服务器关闭，而不仅仅是一个有问题的查询。对于你的系统来说，这可能是一个非常危险的选择。我稍后会进一步讨论它。\n\
  - 如果你有一个特定的查询模式导致不良参数嗅探，你可以通过设置两个或更多不同的存储过程来隔离功能，使用一个包装过程来确定调用哪一个。这可以帮助你同时使用多种不同的方法。\n\
  \n这些可能的解决方案中的每一个都伴随着必须考虑的权衡。如果你决定每次调用查询时都重新编译它，你将不得不为重新编译查询所需的额外 CPU 付出代价。这违背了通过使用参数化查询来尝试获得计划重用的整个想法，但在你的情况下，它可能是最佳解决方案。将参数重新分配给局部变量是一种老派的方法；代码看起来可能很傻。\n\
  \n```sql\nALTER PROC dbo.AddressByCity @City NVARCHAR(30)\nAS\nDECLARE @LocalCity\
  \ NVARCHAR(30) = @City;\nSELECT a.AddressID,\n       a.AddressLine1,\n       AddressLine2,\n\
  \       a.City,\n       sp.[Name] AS StateProvinceName,\n       a.PostalCode\nFROM\
  \ Person.Address AS a\nJOIN Person.StateProvince AS sp\n  ON a.StateProvinceID =\
  \ sp.StateProvinceID\nWHERE a.City = @LocalCity;\n```\n\n使用这种方法，优化器基于相关列的密度而不是直方图来进行基数估计。但它在查询中看起来很奇怪。事实上，如果你采用这种方法，我强烈建议在变量声明前添加注释，以明确你为什么这样做。这里有一个例子：\n\
  \n```sql\n-- 这允许查询绕过不良参数嗅探\nDECLARE @LocalCity NVARCHAR(30) = @City;\n```\n\n但是，采用这种方法，你现在可能面临“变量嗅探”的可能性，因此除非你使用的是早于\
  \ 2008 的 SQL Server 实例，否则并不真正推荐。从 SQL Server 2008 及更高版本开始，你最好使用 `OPTIMIZE FOR UNKNOWN`\
  \ 查询提示来完成同样的事情。\n\n你可以使用 `OPTIMIZE FOR` 查询提示并传递一个特定值。因此，例如，如果你想确保始终使用值 `Mentor`\
  \ 生成的计划，你可以对查询执行以下操作：\n\n```sql\nALTER PROC dbo.AddressByCity @City NVARCHAR(30)\n\
  AS\nSELECT a.AddressID,\n       a.AddressLine1,\n       AddressLine2,\n       a.City,\n\
  \       sp.[Name] AS StateProvinceName,\n       a.PostalCode\nFROM Person.Address\
  \ AS a\nJOIN Person.StateProvince AS sp\n  ON a.StateProvinceID = sp.StateProvinceID\n\
  WHERE a.City = @City\nOPTION (OPTIMIZE FOR (@City = 'Mentor'));\n```\n\n`www.it-ebooks.info`\n\
  \n![index-320_1.jpg](img/index-320_1.jpg)\n\n第 16 章 ■ 参数嗅探\n\n\n现在优化器将忽略传递给 `@City`\
  \ 的任何值，并始终使用 `Mentor` 的值。您甚至可以通过如图所示修改查询来实际观察这一点，这将把查询从缓存中移除，然后使用参数值 `London` 执行它。这会在缓存中生成一个新的执行计划。如果您打开该计划并查看\
  \ `SELECT` 属性，您将看到图 16-7 中所示的提示证据。\n\n**图 16-7.** 运行时与编译时值不同\n\n如您所见，优化器完全按照您的指定操作，使用了值\
  \ `Mentor` 来编译计划，尽管您也可以看到您是使用值 `London` 执行的查询。这种方法的问题在于数据会随时间变化，对您当时数据是最优的计划，可能不再是最优的。如果您选择使用\
  \ `OPTIMIZE FOR` 提示，则需要计划定期重新评估它。\n\n如果您选择使用跟踪标志完全禁用参数嗅探，请注意这会在整个服务器上关闭它。由于大多数情况下，参数嗅探绝对对您有帮助，您最好确认自己从中得不到任何益处，并且处理它的唯一希望是关闭嗅探。这甚至不需要重启服务器，因此是即时生效的。生成的计划将基于可用统计信息的平均值，因此根据您的数据，计划可能会严重次优。在这样做之前，请探索在您最有问题的查询上使用\
  \ `RECOMPILE` 提示的可能性。通过这种方式，您更有可能获得更好的计划，尽管您不会得到计划重用。\n\n对于所有这些可能的缓解方法，在决定采用哪种方法之前，请在您的系统上仔细测试。\n\
  \n这些方法中的每一种都有效，但它们的工作方式可能在某种情况下优于另一种情况，因此了解不同的方法是很好的，并且您可以根据您的情况对它们进行实验。\n\n最后，请记住这是由统计信息驱动的，因此如果您的统计信息不准确或已过时，您更有可能遇到糟糕的参数嗅探。重新检查您的统计信息维护例程以确保其有效性通常是最简单的最佳解决方案。\n\
  \n## 总结\n\n在本章中，我概述了参数嗅探究竟是什么，以及它在大多数情况下如何有益于您所有参数化的查询。这一点很重要，因为当您遇到糟糕的参数嗅探时，它可能看起来弊大于利。我讨论了统计信息和数据分布如何为部分数据集创建次优计划，即使它们对其他数据部分是最优的。这就是糟糕的参数嗅探在起作用。有几种方法可以缓解糟糕的参数嗅探，但每种方法都是一种权衡，因此请仔细检查它们以确保您为系统做出最佳选择。\n\
  \n在下一章中，我将讨论导致查询重新编译的原因以及可以采取的措施。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- '# 第 17 章

  ## 查询重编译


  存储过程和参数化查询通过显式地将查询的可变部分转换为参数来提高执行计划的可重用性。这允许在查询使用相同或不同的可变部分值重新提交时重用执行计划。由于存储过程主要用于实现复杂的业务规则，一个典型的存储过程包含一组复杂的
  SQL 语句，这使得生成存储过程内查询的执行计划的成本有点高。因此，通常重用存储过程的现有执行计划而不是生成新计划是有益的。然而，有时现有计划可能不是最优的，或者在重用期间可能无法提供最佳处理策略。SQL
  Server 通过重新编译存储过程中的语句来解决这种情况，以生成新的执行计划。




  '
- "# 第 17 章：查询重新编译\n\n本章涵盖以下主题：\n*   重新编译的优点与缺点\n*   如何识别导致重新编译的语句\n*   如何分析重新编译的原因\n\
  *   必要时避免重新编译的方法\n\n## 重新编译的优点与缺点\n\n查询的重新编译可能有益也可能有害。有时，为查询考虑一个新的处理策略而非重用现有计划可能是有益的，特别是当表中的数据分布（或相应的统计信息）已更改，或表中添加了新索引时。SQL\
  \ Server 2014 中的重新编译是在语句级别进行的。这增加了过程中可能发生的重新编译总次数，但总体上减少了一般重新编译的影响和开销。语句级重新编译降低了开销，因为它们只重新编译单个语句，而不是过程中的所有语句，而\
  \ SQL Server 2000 中的重新编译会导致整个过程被反复重新编译。尽管重新编译的足迹变小了，但在实际情况下，仍需尽可能减少和控制它。\n\n为了理解重新编译现有计划有时为何有益，假设您需要从\
  \ `Production.WorkOrder` 表中检索一些信息。存储过程可能如下所示：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.WorkOrder'))\
  \ IS NOT NULL\n    DROP PROCEDURE dbo.WorkOrder;\nGO\nCREATE PROCEDURE dbo.WorkOrder\n\
  AS\n    SELECT wo.WorkOrderID, wo.ProductID, wo.StockedQty\n    FROM Production.WorkOrder\
  \ AS wo\n    WHERE wo.StockedQty BETWEEN 500 AND 700;\n```\n\n根据当前索引，作为存储过程计划一部分的\
  \ `SELECT` 语句的执行计划会扫描索引 `PK_WorkOrder_WorkOrderID`，如图 17-1 所示。\n\n**图 17-1.** 存储过程的执行计划\n\
  \n此计划保存在过程缓存中，以便在存储过程重新执行时可以重用。但是，如果按如下所示在表上添加了一个新索引，那么现有计划将不再是执行查询的最高效处理策略。\n\n\
  ```sql\nCREATE INDEX IX_Test ON Production.WorkOrder(StockedQty, ProductID);\n```\n\
  \n在这种情况下，花费额外的 CPU 周期来重新编译存储过程以生成更好的执行计划是有益的。\n\n由于索引 `IX_Test` 可以作为 `SELECT` 语句的覆盖索引，通过使用索引\
  \ `IX_Test` 代替扫描 `PK_WorkOrder_WorkOrderID`，可以避免书签查找的成本。SQL Server 会自动检测到此更改，并重新编译现有计划以考虑使用新索引的优势。这导致了存储过程（执行时）的一个新执行计划，如图\
  \ 17-2 所示。\n\n**图 17-2.** 存储过程的新执行计划\n\nSQL Server 会自动检测需要重新编译现有计划的条件。SQL Server\
  \ 在确定现有计划何时需要重新编译时遵循特定规则。如果查询的特定实现符合重新编译的规则（执行计划老化退出、`SET` 选项更改等），那么每次该语句满足重新编译要求时，它都将被重新编译，并且\
  \ SQL Server 可能会也可能不会生成更好的执行计划。\n\n为了观察实际效果，您需要一个不同的存储过程。以下过程返回 `WorkOrder` 表中的所有行：\n\
  \n```sql\nIF (SELECT OBJECT_ID('dbo.WorkOrderAll')) IS NOT NULL\n    DROP PROCEDURE\
  \ dbo.WorkOrderAll;\nGO\nCREATE PROCEDURE dbo.WorkOrderAll\nAS\n    SELECT *\n \
  \   FROM Production.WorkOrder AS wo;\n```\n\n在执行此过程之前，请删除索引 `IX_Test`。\n\n```sql\n\
  DROP INDEX Production.WorkOrder.IX_Test;\n```\n\n\n\n"
- '# 第 17 章 ■ 查询重编译


  当你执行这个过程时，`SELECT`语句从表中返回完整的数据集（所有行和列），因此最好通过对表 `WorkOrder` 执行表扫描来完成。正如第 4 章所解释的，`SELECT`语句的处理不会受益于任何列上的非聚集索引。因此，理想情况下，在执行存储过程之前创建非聚集索引（如下所示）应该没有影响。


  ```sql

  EXEC dbo.WorkOrderAll;

  GO

  CREATE INDEX IX_Test ON Production.WorkOrder(StockedQty,ProductID);

  GO

  EXEC dbo.WorkOrderAll; --创建索引 IX_Test 之后

  ```


  但是，索引创建后的存储过程执行面临着重编译，如图 17-3 中相应的扩展事件输出所示。


  ### 图 17-3. 存储过程的无益重编译


  使用 `sql_statement_recompile` 事件来跟踪语句重编译。在旧的跟踪事件中曾有的单独过程重编译事件已不复存在。


  在这种情况下，重编译对存储过程并无实际益处。但不幸的是，它属于导致 SQL Server 在每次执行时都重编译存储过程的条件范围。这可能使存储过程的计划缓存失效，并在此次执行中浪费
  CPU 周期来重新生成相同的计划。因此，重要的是要了解导致查询重编译的条件，并在实现旨在重用计划的存储过程和参数化查询时，尽一切努力避免这些条件。


  在确定了在各种情况下导致 SQL Server 重编译语句的具体语句后，我接下来将讨论这些条件。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ## 识别导致重编译的语句


  SQL Server 可以重编译存储过程内的单个语句或整个过程。因此，要找到重编译的原因，重要的是识别出无法重用现有计划的 SQL 语句。


  你可以使用扩展事件来跟踪语句重编译。你也可以使用相同的事件来识别导致重编译的存储过程语句。表 17-1 显示了你可以使用的相关事件。


  ### 表 17-1. 用于分析查询重编译的事件


  - `sql_batch_completed` 或 `module_end`

  - `sql_statement_recompile`

  - `sql_batch_starting` 或 `module_start`

  - `sp_statement_completed` 或 `sql_statement_completed` （可选）

  - `sp_statement_starting` 或 `sql_statement_starting` （可选）


  考虑以下简单的存储过程：


  ```sql

  IF (SELECT OBJECT_ID(''dbo.TestProc'')) IS NOT NULL

  DROP PROC dbo.TestProc;

  GO

  CREATE PROC dbo.TestProc

  AS

  CREATE TABLE #TempTable (C1 INT);

  INSERT INTO #TempTable (C1) VALUES (42); -- 数据更改导致重编译

  GO

  ```


  第一次执行此存储过程时，会得到如图 17-4 所示的扩展事件输出。


  ```sql

  EXEC dbo.TestProc;

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-325_1.jpg)


  ### 图 17-4. 显示因重编译产生的 sql_statement_recompile 事件的扩展事件输出


  在图 17-4 中，你可以看到一个重编译事件 (`sql_statement_recompile`)，表明存储过程经历了重编译。正如前一章所述，当第一次执行存储过程时，SQL
  Server 会编译该存储过程并生成一个执行计划。顺便说一句，如果你使用扩展事件进行跟踪，可能会看到其他语句。只需按数据库 ID 进行筛选或分组，就可以更轻松地查看你感兴趣的事件。在你的扩展事件会话中添加筛选器总是一个好主意。


  由于执行计划仅维护在易失性内存中，因此在 SQL Server 重新启动时，它们会被清除。




