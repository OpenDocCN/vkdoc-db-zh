  如果右键单击执行计划，你可以查看其背后的 XML 数据。如图 12-31 所示，XML 执行计划在其 `Warnings` 元素下指出了某个执行步骤的统计信息缺失。这表明列
  `Test1.C2` 的统计信息缺失。


