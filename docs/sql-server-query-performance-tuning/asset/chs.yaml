- '# 第 12 章：统计信息、数据分布与基数


  #### 解决统计信息过时问题


  有时，过时或不正确的统计信息可能比缺失的统计信息更具破坏性。基于旧的统计信息或对已更改数据的部分扫描，优化器可能决定采用某种特定的索引策略，而这可能与当前的数据分布极不匹配。不幸的是，执行计划不会像对缺失统计信息那样，对过时或不正确的统计信息显示同样明显的警告。然而，有一个名为
  `inaccurate_cardinality_estimate` 的事件。这是一个调试事件，这意味着它的使用在生产系统上可能有些问题。我强烈建议谨慎使用，仅在适当过滤且仅用于短时间的情况下使用，但我需要指出这一点。


  识别过时统计信息更传统也更安全的方法是，检查优化器估算的影响行数与实际影响行数的接近程度。


  以下示例展示了如何识别并解决过时的统计信息问题。图 12-35 显示了由 `DBCC SHOW_STATISTICS` 提供的列 `C1` 上非聚集索引键的统计信息。


  ```sql

  DBCC SHOW_STATISTICS (Test1, iFirstIndex);

  ```


  图 12-35. 索引 `FirstIndex` 上的统计信息


  这些结果显示列 `C1` 的密度值为 0.5。现在考虑以下 `SELECT` 语句：


  ```sql

  SELECT *

  FROM dbo.Test1

  WHERE C1 = 51;

  ```


  由于表中的总行数当前为 10,002，筛选条件 `C1 = 51` 的匹配行数可估算为 5,001 (=0.5 * 10,002)。这个估算行数 (5,001)
  与此列值的实际匹配行数相差甚远。表中实际只包含一行 `C1 = 51` 的数据。




  '
- "# 第 12 章：统计、数据分布和基数\n\n你可以从执行计划中获取估计和实际行数的信息。估计执行计划仅参考并使用统计信息，而非实际数据。这意味着它与实际数据可能大相径庭，正如你现在所看到的。而实际执行计划则同时包含估计行数和实际行数。\n\
  \n执行查询会产生此执行计划（图 12-36）和性能数据：\n```\nTable 'Test1'. Scan count 1, logical reads 84\n\
  SQL Server Execution Times: CPU time = 0 ms, elapsed time = 16 ms.\n```\n\n![](img/index-236_1.jpg)\n\
  ![](img/index-236_2.jpg)\n\n**图 12-36.** 使用过期统计信息的执行计划\n\n要查看估计行数和实际行数，你可以查看 `Table\
  \ Scan` 运算符的属性（图 12-37）。\n\n**图 12-37.** 显示行数差异的属性\n\n从估计行数值与实际行数值的对比可以明显看出，优化器基于过时的统计信息做出了错误的估计。如果估计行数和实际行数之间的差异超过\
  \ 10 倍，那么所选择的处理策略对于当前的数据分布来说很可能不太具有成本效益。不准确的估计可能会误导优化器决定处理策略。统计信息不准确的原因有很多。表变量和多语句用户定义函数根本没有统计信息，因此对这些对象的所有估计都假定为单行，而不考虑对象实际涉及多少行。\n\
  \n为了帮助优化器做出准确的估计，你应该更新列 `C1` 上非聚集索引的统计信息（当然，你也可以直接保持自动更新统计信息功能开启）。\n```sql\nUPDATE\
  \ STATISTICS Test1 iFirstIndex WITH FULLSCAN;\n```\n这里可能不需要 `FULLSCAN`。采用抽样方法创建的统计信息通常相当准确，而且速度快得多。但是，在系统负载不高或非高峰时段，我倾向于使用\
  \ `FULLSCAN`，因为它能提高准确性。只要你能得到所需的统计信息，这两种方法都是有效的。\n\n如果你再次运行查询，将得到以下统计信息，输出结果如图 12-38\
  \ 所示：\n```\nTable 'Test1'. Scan count 1, logical reads 4\nSQL Server Execution Times:\
  \ CPU time = 0 ms, elapsed time = 0 ms.\n```\n\n![](img/index-237_1.jpg)\n\n**图\
  \ 12-38.** 使用最新统计信息的实际行数和估计行数\n\n优化器利用更新的统计信息准确地估计了行数，从而能够制定出更高效的计划。由于估计行数为 1，通过\
  \ `C1` 上的非聚集索引检索行是有意义的，而不是扫描基表。\n\n在索引键列上更新准确的统计信息有助于优化器就处理策略做出更佳决策，从而将逻辑读次数从 84\
  \ 次减少到 4 次，并将执行时间从 16 毫秒减少到 0 毫秒（存在 4 毫秒的延迟）。\n\n在继续之前，重新为数据库启用统计信息。\n```sql\nALTER\
  \ DATABASE AdventureWorks2012 SET AUTO_CREATE_STATISTICS ON;\nALTER DATABASE AdventureWorks2012\
  \ SET AUTO_UPDATE_STATISTICS ON;\n```\n\n## 建议\n\n在本章中，我介绍了关于统计信息的各种建议。为便于查阅，我将这些建议整合并扩展如下。\n\
  \n### 统计信息的向后兼容性\n\nSQL Server 2014 中的统计信息生成方式可能与之前版本的 SQL Server 不同。然而，SQL Server\
  \ 2014 在升级过程中会传输统计信息，并且默认情况下，会随着数据变化自动更新这些统计信息。但是，为了获得最佳性能，我建议在升级后立即手动更新统计信息，如果可能，最好使用\
  \ `FULLSCAN`。\n\n### 自动创建统计信息\n\n此功能通常应保持开启。在默认设置下，在创建执行计划期间，SQL Server 会判断非索引列上的统计信息是否有益。如果认为有益，SQL\
  \ Server 会在该非索引列上创建统计信息。但是，如果你计划手动在非索引列上创建统计信息，那么你必须准确识别哪些非索引列上的统计信息会有帮助。\n\n###\
  \ 自动更新统计信息\n\n此功能通常应保持开启，允许 SQL Server 根据数据分布随时间的变化来决定合适的执行计划。通常，此功能带来的性能收益大于开销。你很少需要干预统计信息的自动维护，此类需求通常在故障排除或分析性能时才会被发现。为了确保你不会因自动统计信息功能而遇到意外情况，在诊断\
  \ SQL Server 问题时分析统计信息的有效性非常重要。\n\n不幸的是，如果你遇到自动更新统计信息功能的问题并不得不将其关闭，请确保创建一个 SQL Server\
  \ 作业来更新统计信息，并将其安排为定期运行。出于性能原因，如有可能，请确保将 SQL 作业安排在非高峰时段运行。\n\n你可以通过以下简单步骤，在 SQL Server\
  \ Management Studio 中创建用于更新统计信息的 SQL Server 作业：\n\n1.  选择 **ServerName** ➤ **SQL\
  \ Server Agent** ➤ **Jobs**，右键单击并选择 **New Job**。\n2.  在 **New Job** 对话框的 **General**\
  \ 页面上，输入作业名称和其他详细信息，如图 12-39 所示。\n\n    **图 12-39.** 输入新作业信息\n\n3.  选择 **Steps**\
  \ 页面，单击 **New**，并为用户数据库输入 SQL 命令，如图 12-40 所示。这是一种确保更新数据库中所有表上所有统计信息的简短方法。它不够精确，并且根据系统大小可能会产生较大负载，因此在运行前请确保这确实是你的系统所需要的。\n\
  \    ```sql\n    EXEC sys.sp_MSforeachtable 'UPDATE STATISTICS ? ALL WITH FULLSCAN';\n\
  \    ```\n    **图 12-40.** 为用户数据库输入 SQL 命令\n\n4.  通过单击 **OK** 按钮返回 **New Job** 对话框。\n\
  5.  在 **New Job** 对话框的 **Schedules** 页面上，单击 **New Schedule**，并输入运行 SQL Server 作业的适当计划。通过单击\
  \ **OK** 按钮返回 **New Job** 对话框。\n6.  输入所有信息后，单击 **New Job** 对话框中的 **OK** 以创建 SQL\
  \ Server 作业。\n7.  确保 **SQL Server Agent** 正在运行，以便 SQL Server 作业在设定的计划时间自动运行。\n\n\
  另一种统计信息维护方法是运行由 Ola Holengren 开发和维护的脚本之一：http://bit.ly/JijaNI。\n\n### 异步自动更新统计信息\n\
  \n\n\n"
- '# SQL Server 统计信息与索引碎片管理


  ## 统计信息管理


  ### 异步更新统计信息


  在大多数情况下，等待统计信息在查询计划生成前进行更新（这是默认行为）是完全可以接受的。只有在极少数情况下，当统计信息更新或由此更新引起的执行计划重编译的代价过高（甚至高于使用过时统计信息的代价）时，你才可以考虑启用统计信息的异步更新。但需要明白，这可能会导致那些本可受益于更新统计信息的存储过程，在下次运行前性能表现较差。请记住——必须先启用统计信息的自动更新功能，才能启用异步更新。


  ### 收集统计信息的采样量


  通常建议使用默认的采样率。这个比率是由一个高效算法根据数据量和修改次数决定的。尽管默认采样率在大多数情况下是最佳选择，但如果你发现某个特定查询的统计信息不准确，可以使用`FULLSCAN`选项手动更新它们。你也可以选择使用`SAMPLE
  number`来设置特定的采样百分比。这个数字既可以是一个百分比，也可以是一个固定的行数。


  如果需要频繁执行此操作，可以添加一个 SQL Server 作业来处理。出于性能考虑，请确保该 SQL 作业安排在非高峰时段运行。要识别默认采样率并非最佳的情况，应在排查数据库性能问题时，分析高成本查询的统计信息有效性。请记住，`FULLSCAN`代价高昂，因此只应在你确定能真正受益的表或索引上运行。


  ## 小结


  如本章所述，SQL Server 基于成本的优化器需要准确的统计信息，以了解用于筛选和联接条件中的列的信息，从而确定高效的处理策略。索引键的统计信息总是在创建索引时生成，并且默认情况下，SQL
  Server 也会随着数据变化保持索引列和非索引列的统计信息更新。这使得它能够根据当前的数据分布情况确定最佳处理策略。


  尽管你可以禁用自动创建统计信息和自动更新统计信息功能，但建议保持这些功能*开启（on）*，因为它们对优化器带来的好处几乎总是超过其开销成本。对于一个高成本的查询，应分析统计信息，以确保自动统计信息维护能兑现其承诺。最好的消息是，只要稍加留意，你就可以高枕无忧，因为自动统计信息在大多数时候都能很好地完成工作。如果使用手动统计信息维护程序，则可以利用
  SQL Server 作业将其自动化。


  即使拥有适当的索引和统计信息，一个严重碎片化的数据库也会导致数据检索成本增加。在下一章中，你将了解索引中的碎片如何影响查询性能，并学习如何分析和解决碎片问题。


  ---


  '
- '# 第 13 章：索引碎片


  如第 8 章所述，索引列值存储在索引 B 树结构的叶级页中。当你在表上创建索引（聚集或非聚集）时，通过对索引的叶级页及页内行进行正确排序，可以降低数据检索的成本。在
  OLTP 数据库中，数据不断变化，导致索引产生碎片。结果，为了返回相同数量的行，随着时间的推移，所需的读取次数会增加。


  本章将涵盖以下主题：


  *   索引碎片的产生原因，包括分析由`INSERT`和`UPDATE`语句引起的页拆分

  *   碎片相关的开销成本

  *   如何分析碎片量

  *   解决碎片的技术

  *   填充因子（`fill factor`）在帮助控制碎片方面的重要性

  *   如何自动化碎片分析过程


  ## 碎片的原因


  当表中的数据被修改时，就会产生碎片。当你向表中插入或更新数据（通过`INSERT`或`UPDATE`）时，表对应的聚集索引和受影响的非聚集索引都会被修改。如果对索引的修改无法在同一页内容纳，则可能导致索引叶级页拆分。然后将添加一个新的叶级页，其中包含原页的一部分内容，并保持索引键中行的逻辑顺序。虽然新的叶级页保持了原页中数据行的*逻辑*顺序，但这个新页在磁盘上通常不会与原页*物理*相邻。或者，稍微换种说法，索引的逻辑键顺序与文件内的物理顺序不匹配。


  例如，假设一个索引有九个键值（或索引行），并且索引行的平均大小允许一个叶级页最多容纳四个索引行。如第 8 章所述，8KB 的叶级页连接到前一个和后一个叶级页以维护索引的逻辑顺序。图
  13-1 展示了索引叶级页的布局。


  ![叶级页布局](img/index-242_1.png)

  ![叶级页布局](img/index-242_2.png)

  ![叶级页布局](img/index-242_3.png)


  **图 13-1.** 叶级页布局


  由于叶级页中的索引键值总是排序的，一个键值为 25 的新索引行必须占据现有键值 20 和 30 之间的位置。因为包含这些现有索引键值的叶级页已满（有四个索引行），新索引行将导致相应的叶级页拆分。将为索引分配一个新的叶级页，并将第一个叶级页的一部分移动到这个新叶级页，以便可以按正确的逻辑顺序插入新的索引键。索引页之间的链接也会被更新，以便页按索引顺序逻辑连接。如图
  13-2 所示，新的叶级页，即使以正确的逻辑顺序链接到其他页，在物理上也可能是乱序的。


  **图 13-2.** 乱序的叶级页


  页被分组在更大的单元中，称为*区（extents）*，一个区可以包含八个页。SQL Server 使用区作为磁盘上的物理分配单位。理想情况下，包含索引叶级页的区的物理顺序应与索引的逻辑顺序相同。这减少了在检索一系列索引行时在区之间切换的次数。然而，页拆分可能会使区内的页物理上无序，并且它们也可能使区本身物理上无序。例如，假设索引的前两个叶级页在区
  1 中，第三个叶级页在区 2 中。如果区 2 有空闲空间，那么由于页拆分而分配给索引的新叶级页将在区 2 中，如图 13-3 所示。


  **图 13-3.** 分布在多个区中的乱序叶级页


  随着叶级页分布在两个区中，理想情况下，你预期检索一系列索引行最多只需要在两个区之间切换一次。然而，区之间的页组织混乱可能导致检索一系列索引行时需要多次区切换。例如，要检索键值在
  25 到 90 之间的一系列索引行，你将需要在两个区之间进行三次区切换，如下所示：


  *   第一次区切换：在键值 25 之后检索键值 30

  *   第二次区切换：在键值 40 之后检索键值 50

  *   第三次区切换：在键值 80 之后检索键值 90


  [www.it-ebooks.info](http://www.it-ebooks.info/)




  '
- "# SQL Server 索引碎片概述\n\n## 碎片类型\n这种类型的碎片称为**外部碎片**。外部碎片始终是不希望出现的。\n\n碎片也可能发生在索引页内部。如果\
  \ `INSERT` 或 `UPDATE` 操作导致页面拆分，那么原始叶页中将会留下空闲空间。`DELETE` 操作也可能导致空闲空间。其净效应是减少叶页中包含的行数。例如，在图\
  \ 13-3 中，由 `INSERT` 操作引发的页面拆分在第一个叶页中创建了空闲空间。这被称为**内部碎片**。\n\n对于高度事务性的数据库，最好在叶页中故意留出一些空闲空间，以便可以在不引起页面拆分的情况下添加新行或更改现有行的大小。在图\
  \ 13-3 中，第一个叶页内的空闲空间允许将索引键值 26 添加到该叶页，而不会引起页面拆分。\n\n## 注意事项\n■ **注意**：请注意，此索引碎片不同于磁盘碎片。无法仅通过运行磁盘碎片整理工具来修复索引碎片，因为只有\
  \ SQL Server 理解 SQL Server 文件内页面的顺序，操作系统并不理解。\n\n## 堆碎片与 DBCC 命令\n堆页可能以相同方式变得碎片化。不幸的是，由于堆的存储方式以及任何非聚集索引使用物理数据位置从堆中检索数据的方式，对堆进行碎片整理是相当成问题的。你可以使用\
  \ `ALTER TABLE` 的 `REBUILD` 命令来执行堆重建，但要明白，这将强制重建与该表关联的任何非聚集索引。\n\nSQL Server 2014\
  \ 通过一个名为 `sys.dm_db_index_physical_stats` 的动态管理视图公开叶页和非叶页以及其他数据。它存储索引大小和碎片信息。我将在下一节中更详细地介绍它。这个\
  \ DMV 比旧的 `DBCC SHOWCONTIG` 更容易使用。\n\n现在，让我们看一下碎片化的机制。\n\n## 通过 UPDATE 语句引发的页面拆分示例\n\
  为了展示由 `UPDATE` 语句引发的页面拆分时会发生什么，我将使用一个构造的表。这个小测试表将有一个聚集索引，该索引在一个叶（或数据）页内对行进行排序，如下所示：\n\
  \n```sql\nUSE AdventureWorks2012;\nGO\nIF (SELECT OBJECT_ID('Test1')) IS NOT NULL\n\
  \    DROP TABLE dbo.Test1;\nGO\nCREATE TABLE dbo.Test1\n(C1 INT,\n C2 CHAR(999),\n\
  \ C3 VARCHAR(10)\n)\nINSERT INTO dbo.Test1\nVALUES (100, 'C2', ''),\n       (200,\
  \ 'C2', ''),\n       (300, 'C2', ''),\n       (400, 'C2', ''),\n       (500, 'C2',\
  \ ''),\n       (600, 'C2', ''),\n       (700, 'C2', ''),\n       (800, 'C2', '');\n\
  CREATE CLUSTERED INDEX iClust\nON dbo.Test1(C1);\n```\n\n聚集索引叶页中一行的平均大小（不包括内部开销）不仅仅是聚集索引列的平均大小之和；它是表中所有列的平均大小之和，因为聚集索引的叶页和表的数据页是同一个。因此，基于前面样本数据的聚集索引中一行的平均大小如下：\n\
  \n= (`C1` 的平均大小) + (`C2` 的平均大小) + (`C3` 的平均大小) 字节 = (`INT` 的大小) + (`CHAR(999)` 的大小)\
  \ + (`C3` 中数据的平均大小) 字节\n\n= 4 + 999 + 0 = 1,003 字节\n\nSQL Server 中一行的最大大小是 8,060\
  \ 字节。因此，如果内部开销不是很高，所有八行都可以容纳在一个 8KB 页面中。\n\n要确定分配给 `iClust` 聚集索引的叶页数量，请针对 `sys.dm_db_index_physical_stats`\
  \ 执行 `SELECT` 语句。\n\n```sql\nSELECT ddips.avg_fragmentation_in_percent,\n      \
  \ ddips.fragment_count,\n       ddips.page_count,\n       ddips.avg_page_space_used_in_percent,\n\
  \       ddips.record_count,\n       ddips.avg_record_size_in_bytes\nFROM sys.dm_db_index_physical_stats(DB_ID('AdventureWorks2012'),\n\
  \                                    OBJECT_ID(N'dbo.Test1'), NULL,\n          \
  \                          NULL, 'Sampled') AS ddips;\n```\n\n\n"
