- "# 第 12 章：统计信息、数据分布与基数\n\n在分析查询的执行计划时，请关注以下几点，以确保采用成本效益最优的处理策略：\n\n*   筛选和连接条件中引用的列上存在索引。\n\
  *   若缺少索引，则应在没有索引的列上存在统计信息。拥有索引本身是更可取的。\n*   由于过时的统计信息不仅无用，甚至可能产生误导，因此优化器依据统计信息所作的估算必须是最新的，这一点至关重要。\n\
  \n你在第 6 章分析了如何正确使用索引。在本节中，你将分析统计信息对查询的有效性。\n\n#### 解决统计信息缺失问题\n\n要了解如何识别并解决统计信息缺失问题，请考虑以下示例。为了更直接地控制数据，我将使用测试表，而非\
  \ `AdventureWorks2012` 中的表。首先使用 `ALTER DATABASE` 命令禁用自动创建统计信息和自动更新统计信息功能。\n\n```sql\n\
  ALTER DATABASE AdventureWorks2012 SET AUTO_CREATE_STATISTICS OFF;\n\nALTER DATABASE\
  \ AdventureWorks2012 SET AUTO_UPDATE_STATISTICS OFF;\n```\n\n创建一个包含大量行和非聚集索引的测试表。\n\
  \n```sql\nIF EXISTS ( SELECT *\n            FROM sys.objects\n            WHERE\
  \ object_id = OBJECT_ID(N'dbo.Test1') )\n    DROP TABLE [dbo].[Test1] ;\nGO\n\n\
  CREATE TABLE dbo.Test1 (C1 INT, C2 INT, C3 CHAR(50)) ;\n\nINSERT INTO dbo.Test1\n\
  \    (C1, C2, C3)\nVALUES (51, 1, 'C3') ,\n       (52, 1, 'C3') ;\n\nCREATE NONCLUSTERED\
  \ INDEX iFirstIndex ON dbo.Test1 (C1, C2) ;\n\nSELECT TOP 10000\n    IDENTITY( INT,1,1\
  \ ) AS n\nINTO #Nums\nFROM Master.dbo.SysColumns scl,\n     Master.dbo.SysColumns\
  \ sC2 ;\n\nINSERT INTO dbo.Test1\n    (C1, C2, C3)\nSELECT n % 50,\n       n,\n\
  \       'C3'\nFROM #Nums ;\n\nDROP TABLE #Nums ;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-233_1.png)\n\n![](img/index-233_2.jpg)\n\n![](img/index-233_3.jpg)\n\
  \n"
