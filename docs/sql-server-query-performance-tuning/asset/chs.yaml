- '# 第 20 章 ■ 阻塞与被阻塞进程


  理想情况下，你希望你的数据库应用程序能够随着数据库用户数量和数据量的增长而线性扩展。然而，通常会发现随着用户数量的增加和数据量的增长，性能会下降。导致性能下降的一个原因，尤其是与规模不断增长相关的原因，就是阻塞。事实上，数据库阻塞通常是数据库应用程序可扩展性的最大敌人之一。


  在本章中，我将涵盖以下主题：

  * SQL Server 中阻塞的基础知识

  * 事务性数据库的 ACID 属性

  * 数据库锁的粒度、升级、模式及兼容性

  * ANSI 隔离级别

  * 索引对锁的影响

  * 分析阻塞所需的信息

  * 用于收集阻塞信息的 SQL 脚本

  * 避免阻塞的解决方案和建议

  * 自动化阻塞检测和信息收集过程的技术


  ## 阻塞基础知识


  在理想世界中，每个 SQL 查询都能并发执行，不会被其他查询阻塞。


  然而，在现实世界中，查询*确实*会相互阻塞，类似于在十字路口，一辆车通过绿色交通信号灯时会阻塞其他等待通过十字路口的车辆。在 SQL Server 中，这种交通管理以
  `锁管理器` 的形式实现，它控制对数据库资源的并发访问以维护数据一致性。对数据库资源的并发访问在多个数据库连接之间受到控制。


  我想在继续之前确保事情是清晰的。数据库中使用了三个听起来相同且相互关联但含义不同的术语。这些术语经常被混淆，人们也经常误用它们。这些术语是 `锁`、`阻塞` 和
  `死锁`。锁是 SQL Server 管理多个会话过程的组成部分。当一个会话需要访问某段数据时，会对其放置某种类型的锁。这与阻塞不同，阻塞是指一个会话或线程需要访问某段数据，但必须等待另一个会话的锁被释放。最后，死锁是指两个会话或线程形成了有时被称为
  `致命拥抱` 的情况。它们都在等待对方释放锁。死锁也可以被称为永久性阻塞情况，但它是即使等待任何时间段也不会自行解决的那种。


  死锁将在第 21 章更详细地介绍。因此，锁可能导致阻塞，而锁和阻塞在死锁中都起作用，但这是三个截然不同的概念。请理解这些术语之间的区别并正确使用它们。这将有助于你理解系统、进行故障排除以及与其他数据库管理员和开发人员交流。


  在 SQL Server 中，数据库连接由会话 ID 标识。连接可能来自一个或多个应用程序，以及这些应用程序上的一个或多个用户；对 SQL Server 而言，每个连接都被视为一个独立的会话。两个会话在同一时间访问同一段数据时发生的阻塞，是
  SQL Server 中的自然现象。每当两个会话试图以冲突的方式访问一个共同的数据库资源时，`锁管理器` 会确保第二个会话等待，直到第一个会话完成其工作，这与系统内的事务管理相协调。例如，一个会话可能正在修改表记录，而另一个会话试图删除该记录。由于这两个数据访问请求是不兼容的，第二个会话将被阻塞，直到第一个会话完成其任务。


  另一方面，如果两个会话试图同时读取一个表，两个请求都会被允许执行而不会阻塞，因为这些数据访问请求彼此兼容。


  通常，阻塞对会话的影响很小，不会明显影响其性能。然而，有时由于查询和/或事务设计不佳（或者运气不好），阻塞会显著影响查询性能。在数据库应用程序中，应尽一切努力最小化阻塞，从而增加可以同时使用数据库的用户数量。


  随着 SQL Server 2014 中引入内存中表，至少对于这些表，锁的概念呈现出了全新的维度。我将在第 23 章单独介绍它们的行为。


  ## 理解阻塞




  '
- "# SQL Server 事务与锁：ACID 属性\n\n在 SQL Server 中，一个数据库查询可以作为一个独立的工作逻辑单元执行，也可以参与一个更大的工作逻辑单元。一个更大的工作逻辑单元可以使用\
  \ `BEGIN TRANSACTION` 语句以及 `COMMIT` 和/或 `ROLLBACK` 语句来定义。每个工作逻辑单元必须遵循一组称为 `ACID`\
  \ 属性的四个属性：\n\n*   `原子性`\n*   `一致性`\n*   `隔离性`\n*   `持久性`\n\n我将在接下来的章节中介绍这些属性，因为理解事务的工作原理是理解锁的基础。\n\
  \n## `原子性`\n\n一个工作逻辑单元必须是 `原子性` 的。也就是说，工作逻辑单元的所有操作要么全部完成，要么不保留任何效果。为了理解工作逻辑单元的原子性，请看以下示例：\n\
  \n```sql\nUSE AdventureWorks2012;\nGO\n\nIF (SELECT OBJECT_ID('dbo.ProductTest'))\
  \ IS NOT NULL\n    DROP TABLE dbo.ProductTest;\nGO\n\nCREATE TABLE dbo.ProductTest\
  \ (\n    ProductID INT CONSTRAINT ValueEqualsOne CHECK (ProductID = 1));\nGO\n\n\
  --所有 ProductID 作为一个逻辑工作单元添加到 t1\nINSERT INTO dbo.ProductTest\nSELECT p.ProductID\n\
  FROM Production.Product AS p;\nGO\n\nSELECT *\nFROM dbo.ProductTest; --返回 0 行\n\
  ```\n\nSQL Server 将前面的 `INSERT` 语句视为一个工作逻辑单元。`dbo.ProductTest` 表的 `ProductID` 列上的\
  \ `CHECK` 约束只允许值为 1。尽管 `Production.Product` 表中的 `ProductID` 列以值 1 开始，但它也包含其他值。因此，`INSERT`\
  \ 语句根本不会向 `dbo.ProductTest` 表添加任何记录，并且由于 `CHECK` 约束会引发错误。这种原子性由 SQL Server 自动确保。\n\
  \n到目前为止，一切正常。但是，在更大的工作逻辑单元的情况下，你应该注意 SQL Server 的一个有趣行为。假设前面的插入任务由多个 `INSERT` 语句组成。它们可以组合形成一个更大的工作逻辑单元，如下所示：\n\
  \n```sql\nBEGIN TRAN\n    --开始：逻辑工作单元\n    --第一个：\n    INSERT INTO dbo.ProductTest\n\
  \    SELECT p.ProductID\n    FROM Production.Product AS p;\n    --第二个：\n    INSERT\
  \ INTO dbo.ProductTest\n    VALUES (1);\nCOMMIT --结束：逻辑工作单元\nGO\n```\n\n在前面脚本中已创建\
  \ `dbo.ProductTest` 表的情况下，`BEGIN TRAN` 和 `COMMIT` 语句对定义了一个工作逻辑单元，表明事务内的所有语句本质上都应该是原子的。然而，SQL\
  \ Server 的默认行为并不确保用户定义事务范围内的某个语句失败时会撤消先前语句的效果。在前面的事务中，第一个 `INSERT` 语句将如前所述失败，而第二个\
  \ `INSERT` 语句完全没有问题。SQL Server 的默认行为允许第二个 `INSERT` 语句执行，即使第一个 `INSERT` 语句失败。如下的\
  \ `SELECT` 语句将返回第二个 `INSERT` 语句插入的行：\n\n```sql\nSELECT *\nFROM dbo.ProductTest;\
  \ --返回一行，其中 t1.c1 = 1\n```\n\n可以通过以下两种方式确保用户定义事务的原子性：\n\n*   `SET XACT_ABORT ON`\n\
  *   显式回滚\n\n让我们快速了解一下这些方法。\n\n### `SET XACT_ABORT ON`\n\n你可以使用 `SET XACT_ABORT ON`\
  \ 语句修改前面部分中 `INSERT` 任务的原子性：\n\n```sql\nSET XACT_ABORT ON;\nGO\n\nBEGIN TRAN\n \
  \   --开始：逻辑工作单元\n    --第一个：\n    INSERT INTO dbo.ProductTest\n    SELECT p.ProductID\n\
  \    FROM Production.Product AS p;\n    --第二个：\n    INSERT INTO dbo.ProductTest\n\
  \    VALUES (1);\nCOMMIT\n    --结束：逻辑工作单元\nGO\n\nSET XACT_ABORT OFF;\nGO\n```\n\n\
  `SET XACT_ABORT` 语句指定当事务中的语句失败时，SQL Server 是否应自动回滚并中止整个事务。第一个 `INSERT` 语句的失败将自动挂起整个事务，因此第二个\
  \ `INSERT` 语句将不会被执行。`SET XACT_ABORT` 的作用域是连接级别，在重新配置或关闭连接之前一直有效。默认情况下，`SET XACT_ABORT`\
  \ 为 `OFF`。\n\n### 显式回滚\n\n你还可以使用 SQL Server 中的 `TRY/CATCH` 错误捕获机制来管理用户定义事务的原子性。如果\
  \ `TRY` 代码块中的语句产生错误，则 `CATCH` 代码块将处理该错误。如果发生错误并且激活了 `CATCH` 块，则可以回滚用户定义事务的全部工作，并阻止进一步语句的执行，如下所示：\n\
  \n```sql\nBEGIN TRY\n    BEGIN TRAN\n        --开始：逻辑工作单元\n        --第一个：\n     \
  \   INSERT INTO dbo.ProductTest\n        SELECT p.ProductID\n        FROM Production.Product\
  \ AS p;\n        --第二个：\n        INSERT INTO dbo.ProductTest\n            (ProductID)\n\
  \        VALUES (1);\n    COMMIT --结束：逻辑工作单元\nEND TRY\nBEGIN CATCH\n    ROLLBACK\n\
  \    PRINT 'An error occurred'\n    RETURN\nEND CATCH\n```\n\n`ROLLBACK` 语句回滚事务中在该点之前执行的所有操作。有关如何在基于\
  \ SQL Server 的应用程序中实现错误处理的详细说明，请参阅 MSDN 库文章“在 Transact-SQL 中使用 TRY . . . CATCH”（[`bit.ly/PNlAHF`](http://bit.ly/PNlAHF)）或介绍性文章“SQL\
  \ Server 错误处理工作台”（[`bit.ly/1nC3VBt`](http://bit.ly/1nC3VBt)）。\n\n由于原子性属性要求工作逻辑单元的所有操作要么全部完成，要么不保留任何效果，因此\
  \ SQL Server 通过授予事务对受影响资源的独占访问权，将其工作与其他事务的工作 `隔离`。这意味着事务可以在需要时安全地回滚其所有操作的效果。授予事务在受影响资源上的独占权会阻塞在此期间试图访问这些资源的所有其他事务（或数据库请求）。因此，虽然原子性是为了维护数据完整性所必需的，但它也带来了锁这种不良的副作用。\n\
  \n## `一致性`\n\n一个工作逻辑单元应该导致数据库状态从一个 `一致` 状态迁移到另一个状态。在事务结束时，数据库状态应完全一致。SQL Server\
  \ 始终确保数据库的内部状态正确有效，方法是自动将受影响数据库资源的所有约束作为事务的一部分应用。SQL Server 确保内部结构（如数据和索引布局）的状态在事务之后是正确的。例如，当修改表的数据时，SQL\
  \ Server 会自动识别表上的所有索引、约束和其他依赖对象，并作为事务的一部分将必要的修改应用于所有依赖的数据库对象。\n\n业务规则所需的数据逻辑一致性应由数据库开发人员确保。业务规则可能要求将更改应用于多个表。数据库开发人员应相应地定义一个工作逻辑单元，以确保满足业务规则的所有标准。SQL\
  \ Server 提供了不同的事务管理功能，数据库开发人员可以使用这些功能来确保数据的逻辑一致性。\n\n\n## 一致性（ACID 特性）\n\n正如刚才所解释的，维护一致的逻辑状态需要按照业务规则使用事务来定义逻辑工作单元。此外，为了维护一致的物理状态，SQL\
  \ Server 会识别并处理作为逻辑工作单元一部分的依赖数据库对象。逻辑工作单元的原子性特性会在此期间阻止所有其他试图访问受影响对象的事务（或数据库请求）。\n\
  \n因此，尽管为了维护数据库有效的逻辑和物理状态需要一致性，但它也引入了阻塞这一不良副作用。\n\n### 隔离性\n\n在多用户环境中，可以同时执行多个事务。这些并发事务应彼此隔离，以便一个事务所做的中间更改不会影响其他事务的数据一致性。事务所需的\
  \ *隔离* 程度可能有所不同。SQL Server 提供了不同的事务隔离级别特性，以实现事务所需的隔离程度。\n\n■ **注意**：本章后面的“隔离级别”部分将解释事务隔离级别。\n\
  \n事务在数据库资源上操作的隔离要求可能会阻止其他事务访问该资源。在多用户数据库环境中，通常同时执行多个事务。必须保护进行中事务所做的数据修改免受其他事务修改的影响。例如，假设一个事务正在修改表中的几行数据。在此期间，为了维护数据库一致性，您必须确保其他事务不会修改或删除相同的行。SQL\
  \ Server 通过适当阻塞，从事务逻辑上隔离其活动，从而允许多个事务同时执行而不会相互破坏工作。\n\n隔离性导致的过度阻塞会对数据库应用程序的可伸缩性产生不利影响。一个事务可能会无意中长时间阻塞其他事务，从而损害数据库并发性。由于\
  \ SQL Server 使用锁管理隔离性，因此理解 SQL Server 的锁定架构非常重要。这有助于您分析阻塞场景并实施解决方案。\n\n■ **注意**：本章后面的“捕获阻塞信息”部分将解释数据库锁的基本原理。\n\
  \n### 持久性\n\n一旦事务完成，事务所做的更改就应该是 *持久* 的。即使在事务完成后立即切断机器电源，事务内所有操作的效果也应保留。SQL Server\
  \ 通过跟踪事务日志中正在修改的数据的前像和后像来确保持久性。事务完成后，SQL Server 确保事务所做的所有更改都被保留——即使 SQL Server、操作系统或硬件发生故障（日志磁盘除外）。在重新启动期间，SQL\
  \ Server 运行其数据库恢复功能，该功能从事务日志中识别已完成事务的待处理更改，并将它们应用到数据库资源。此数据库功能称为 *前滚*。\n\n恢复间隔时间取决于重新启动期间需要应用到数据库资源的待处理更改数量。为了减少恢复间隔时间，SQL\
  \ Server 会间歇性地应用运行中事务所做的中间更改，这是由 `recovery interval` 选项配置的。`recovery interval` 选项可以使用\
  \ `spconfigure` 语句进行配置。间歇性应用中间更改的过程称为 *检查点* 过程。在重新启动期间，恢复过程识别所有未提交的更改，并使用事务日志中数据的前像将它们从数据库资源中移除。\n\
  \n持久性属性并非大多数阻塞的直接原因，因为它不需要事务的操作与其他事务的操作隔离。但在间接方式上，它增加了阻塞的持续时间。由于持久性属性要求将正在修改的数据的前像和后像保存到磁盘上的事务日志，因此它增加了事务和阻塞的持续时间。\n\
  \nSQL Server 2014 引入了一项功能，可以通过修改给定数据库的持久性行为来减少延迟（等待查询提交并写入日志的时间）。现在可以使用延迟持久性。这意味着当一个事务完成时，它会立即向应用程序报告为成功的事务，从而减少延迟。\n\
  \n但此时对日志的写入尚未发生。这也可能允许在系统仍在将所有输出写入事务日志的同时完成更多事务。虽然这可能会增加系统内的表观速度，并可能减少事务日志 I/O 上的争用，但这本质上是一个危险的选择。这是一个难以提出的建议。Microsoft\
  \ 建议了三种可能使其具有吸引力的情况。\n\n*   *您不关心可能丢失部分数据*：由于您可能需要从日志备份恢复到某个时间点，通过选择将数据库置于延迟持久性模式，在必须进行恢复时您可能会丢失一些数据。\n\
  *   *日志写入期间存在高度争用*：如果在事务写入日志时看到大量等待，延迟持久性可能是一个可行的解决方案。但是，如前所述，您也需要容忍数据丢失。\n*   *您正经历较高的整体资源争用*：服务器上的大量资源争用归根结底是由于锁保持时间过长。如果您看到大量争用，并且看到日志写入时间长或日志上也存在争用，并且您对数据丢失有较高的容忍度，这可能是一种可行的方法来帮助减少系统的争用。\n\
  \n换句话说，我建议仅当您满足所有这些标准时，才使用延迟持久性，其中第一个标准最为重要。\n\n■ **注意**：在四个 ACID 属性中，隔离属性（也用于确保原子性和一致性）是\
  \ SQL Server 数据库中阻塞的主要原因。在 SQL Server 中，隔离是使用锁实现的，如下一节所述。\n\n## 锁\n\n当会话执行查询时，SQL\
  \ Server 确定需要访问的数据库资源；如果需要，锁管理器会将会话授予不同类型的锁。如果另一个会话已被授予锁，则该查询会被阻塞；但是，为了提供事务隔离和并发性，SQL\
  \ Server 使用不同的锁粒度，如下节所述。\n\n### 锁粒度\n\n\n"
- "# SQL Server 锁机制概述\n\nSQL Server 数据库作为物理磁盘上的文件进行维护。对于桌面上的传统非数据库文件（例如 Excel 文件），一次可能只有一名用户写入。其他用户任何写入文件的尝试都会失败。然而，与非数据库文件有限的并发性不同，SQL\
  \ Server 允许多个用户同时修改（或访问）内容，只要它们不影响彼此的数据一致性。这减少了阻塞并提高了事务间的并发性。\n\n为了提高并发性，SQL Server\
  \ 在以下资源级别按此顺序实现锁粒度：\n\n-   行（`RID`）\n-   键（`KEY`）\n-   页（`PAG`）\n-   区（`EXT`）\n\
  -   堆或 B 树（`HoBT`）\n-   表（`TAB`）\n-   文件（`FIL`）\n-   应用程序（`APP`）\n-   元数据（`MDT`）\n\
  -   分配单元（`AU`）\n-   数据库（`DB`）\n\n让我们更详细地了解这些锁级别。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-402_1.jpg)\n\n**第 20 章 ■ 阻塞与被阻塞的进程**\n\n#### 行级锁\n\n此锁维护在表中的单个行上，是数据库表的最低级别锁。当查询修改表中的一行时，会授予该查询在该行上的\
  \ `RID` 锁。例如，考虑以下测试表上的事务：\n\n```sql\n--Create a test table\nIF (SELECT OBJECT_ID('dbo.Test1'))\
  \ IS NOT NULL\n    DROP TABLE dbo.Test1;\nGO\n\nCREATE TABLE dbo.Test1 (C1 INT);\n\
  INSERT INTO dbo.Test1\nVALUES (1);\nGO\n\nBEGIN TRAN\nDELETE dbo.Test1\nWHERE C1\
  \ = 1;\n\nSELECT dtl.request_session_id,\n       dtl.resource_database_id,\n   \
  \    dtl.resource_associated_entity_id,\n       dtl.resource_type,\n       dtl.resource_description,\n\
  \       dtl.request_mode,\n       dtl.request_status\nFROM sys.dm_tran_locks AS\
  \ dtl\nWHERE dtl.request_session_id = @@SPID;\nROLLBACK\n```\n\n动态管理视图 `sys.dm_tran_locks`\
  \ 可用于显示锁状态。图 20-1 中对 `sys.dm_tran_locks` 的查询显示，`DELETE` 语句获取了（以及其他锁）一个针对待删除行的排他\
  \ `RID` 锁。\n\n***图 20-1.*** *`sys.dm_tran_locks` 的输出，显示授予 `DELETE` 语句的行级锁*\n\n>\
  \ **注意** 我将在本章后面的“锁模式”一节中解释锁模式。\n\n授予 `DELETE` 语句一个 `RID` 锁可以防止其他事务访问该行。\n\n由 `RID`\
  \ 锁锁定的资源可以从 `resource_description` 列中以以下格式表示：\n\n`DatabaseID:FileID:PageID:Slot(row)`\n\
  \n在图 20-1 对 `sys.dm_tran_locks` 的查询输出中，`DatabaseID` 单独显示在 `resource_database_id`\
  \ 列下。`RID` 类型的 `resource_description` 列值表示 `RID` 资源的剩余部分为 `1:23819:0`。在此情况下，`FileID`\
  \ 1 是主数据文件，`PageID` 23819 是属于由 `C1` 列标识的 `dbo.Test1` 表的一页，`Slot (row)` 0 代表该页内的行位置。您可以通过执行以下\
  \ SQL 语句获取表名和数据库名：\n\n```sql\nSELECT OBJECT_NAME(1668200993),\n       DB_NAME(5);\n\
  ```\n\n行级锁提供了非常高的并发性，因为阻塞仅限于受影响的行。\n\n#### 键级锁\n\n这是索引内的行锁，被标识为 `KEY` 键。如您所知，对于具有聚集索引的表，表的数据页与聚集索引的叶页是相同的。由于对于具有聚集索引的表，这两者的行是相同的，因此在从表（或聚集索引）访问行时，仅在聚集索引行或有限的行范围内获取一个\
  \ `KEY` 键锁。例如，考虑在 `Test1` 表上有一个聚集索引。\n\n```sql\nCREATE CLUSTERED INDEX TestIndex\
  \ ON dbo.Test1(C1);\n```\n\n接下来，重新运行以下代码：\n\n```sql\nBEGIN TRAN\nDELETE dbo.Test1\n\
  WHERE C1 = 1 ;\n\nSELECT dtl.request_session_id,\n       dtl.resource_database_id,\n\
  \       dtl.resource_associated_entity_id,\n       dtl.resource_type,\n```\n\n\n"
- "# 第 20 章 ■ 阻塞与被阻塞进程\n\n## 锁的类型\n\n#### 行级锁\n\n行级锁是最细粒度的锁，应用于单行数据。当查询需要锁定特定行时，会使用此类锁。例如，在以下查询中：\n\
  \n```sql\ndtl.resource_description,\ndtl.request_mode,\ndtl.request_status\nFROM\
  \ sys.dm_tran_locks AS dtl\nWHERE dtl.request_session_id = @@SPID ;\nROLLBACK\n\
  ```\n\n从`sys.dm_tran_locks`对应的输出中可以看到，它显示的是 KEY 锁而非 RID 锁，如图 20-2.所示。\n\n![](img/index-404_1.jpg)\n\
  \n*图 20-2. 显示授予 DELETE 语句的键级锁的 sys.dm_tran_locks 输出*\n\n当查询`sys.dm_tran_locks`时，可以检索数据库标识符`resource_database_id`。也可以从`resource_associated_entity_id`获取被锁定对象的信息；然而，要获取特定资源（本例中是键所在的页），必须查看`resource_description`列的值，即`1:24117`。其中，Index\
  \ ID 为 1 表示`dbo.Test1`表上的聚集索引。还可以看到各种请求类型：S、Sch-S、X 等。这些将在接下来的“锁模式”部分详细介绍。\n\n>\
  \ **注意** 本章的“索引对锁的影响”部分将介绍`IndId`列的不同值以及如何确定对应的索引名称。\n\n与行级锁类似，键级锁提供了非常高的并发性。\n\n\
  #### 页级锁\n\n页级锁维护在表或索引中的单个页上，标识为 PAG 锁。当查询请求一页内的多个行时，锁管理器可以通过在各行上获取 RID/KEY 锁或在整个页上获取\
  \ PAG 锁来维护所有请求行的一致性。从查询计划中，锁管理器会确定获取多个 RID/KEY 锁的资源压力，如果压力很高，则会请求 PAG 锁。\n\nPAG\
  \ 锁锁定的资源在`sys.dm_tran_locks`的`resource_description`列中可能表示为以下格式：\n\n`DatabaseID:FileID:PageID`\n\
  \n页级锁可以通过减少锁开销来提高单个查询的性能，但会通过阻塞对页中所有行的访问而损害数据库的并发性。\n\n#### 区级锁\n\n区级锁维护在区（一组八个连续的数据或索引页）上，标识为\
  \ EXT 锁。例如，当在表上执行`ALTER INDEX REBUILD`命令，并且表的页可能从现有区移动到新区时，会使用此锁。在此期间，使用 EXT 锁保护区的完整性。\n\
  \n#### 堆或 B 树锁\n\n堆或 B 树锁用于描述可能对任一类型对象加锁的情况。目标对象可以是无序堆表（即没有聚集索引的表），或 B 树对象（通常指分区）。`ALTER\
  \ TABLE`函数中的一个设置允许你控制锁升级（在“锁升级”部分介绍）如何影响分区。由于分区可能跨多个文件组，每个分区必须有自己的数据分配定义。这就是 HoBT\
  \ 锁的作用。它的作用类似于表级锁，但作用于分区本身而非整个表。\n\n#### 表级锁\n\n这是表的最高级别锁，标识为 TAB 锁。表上的表级锁保留了对整个表及其所有索引的访问权限。\n\
  \n当执行查询时，锁管理器会自动确定在较低级别获取多个锁的锁开销。如果确定在行级或页级获取锁的资源压力很高，则锁管理器会直接为查询获取表级锁。\n\nTAB 锁锁定的资源在`resource_description`中表示为以下格式：`DatabaseID:ObjectID`\n\
  \n与其他锁相比，表级锁所需的开销最小，因此可以提高单个查询的性能。另一方面，由于表级锁会阻塞整个表（包括索引）上的所有写请求，因此可能严重损害数据库并发性。\n\
  \n有时，应用程序功能可能受益于对查询中引用的表使用特定的锁级别。例如，如果在非高峰时间执行管理查询，则表级锁可能不会对系统用户造成太大影响；但是，它可以减少查询的锁开销，从而提高其性能。在这种情况下，查询开发人员可以通过使用锁提示来覆盖锁管理器对查询中引用表的锁级别选择。\n\
  \n```sql\nSELECT * FROM <TableName> WITH(TABLOCK)\n```\n\n但是，在像这样从 SQL Server 拿走控制权时要谨慎。在实施前进行彻底测试。\n\
  \n#### 数据库级锁\n\n数据库级锁维护在数据库上，标识为 DB 锁。当应用程序建立数据库连接时，锁管理器会为相应的`session_id`分配一个数据库级共享锁。这可以防止用户在其他用户连接到数据库时意外地删除或还原数据库。\n\
  \nSQL Server 确保一个级别请求的锁尊重在其他级别授予的锁。例如，一旦用户获取了表行的行级锁，其他用户就无法获取可能影响该行完整性的任何其他级别的锁。第二个用户可以获取其他行的行级锁或其他页的页级锁，但包含该行的不兼容的页级或表级锁不会授予其他用户。\n\
  \n用户或数据库管理员无需指定应应用锁的级别；锁管理器会自动确定。当访问少量行时，它通常倾向于行级锁和键级锁以辅助并发性。但是，如果多个低级别锁的锁开销变得非常高，锁管理器会自动选择一个适当的高级别锁。\n\
  \n### 锁操作和模式\n\n由于 SQL Server 需要执行多种操作，因此维护了一套同样庞大且复杂的锁机制。除了不同类型的锁之外，还有一个升级路径可以将一种类型的锁更改为另一种。以下部分描述了这些模式和过程及其用途。\n\
  \n#### 锁升级\n\n当执行查询时，SQL Server 确定查询引用的数据库对象所需的锁级别，并在获取所需锁后开始执行查询。在查询执行期间，锁管理器会跟踪查询请求的锁数量，以确定是否需要将锁级别从当前级别升级到更高级别。\n\
  \n锁升级阈值由 SQL Server 在事务过程中确定。当事务超过其阈值时，行锁和页锁会自动升级为表锁。锁级别升级为表级锁后，表上所有较低级别的锁都会自动释放。锁管理器的这种动态锁升级功能优化了查询的锁开销。\n\
  \n可以对给定表上的锁机制建立一定程度的控制。例如，你可以控制是否发生锁升级。以下是用于进行更改的 T-SQL 语法：\n\n```sql\nALTER TABLE\
  \ schema.table\nSET (LOCK_ESCALATION = DISABLE)\n```\n\n\n此语法将完全禁用表上的锁升级（少数特殊情况除外）。你也可以将其设置为\
  \ `TABLE`，这将导致每次升级都直接升级到表锁。你还可以将表上的锁升级设置为 `AUTO`，这将允许 SQL Server 自行决定锁定架构和任何必要的升级。如果该表已分区，你可能会看到升级变为分区级别。再次强调，使用这些修改来改变标准\
  \ SQL Server 行为时请**谨慎操作**。\n\n你也可以选择使用跟踪标志 `1224` 来在更广的范围内禁用锁升级。这将基于锁的数量禁用锁升级，但保留基于内存压力的锁升级。你也可以通过使用跟踪标志\
  \ `1211` 来同时禁用基于内存压力和锁数量的升级，但这是一个危险的选择，可能导致系统错误。我强烈建议在使用这两种选项之前进行彻底的测试。\n\n### 锁模式\n\
  \n不同事务所需的数据隔离级别可能不同。例如，两个事务同时读取数据不会影响数据一致性；然而，如果允许两个事务同时修改数据，则会影响一致性。根据请求的访问类型，SQL\
  \ Server 在锁定资源时会使用不同的锁模式：\n\n*   共享锁 (`S`)\n*   更新锁 (`U`)\n*   排他锁 (`X`)\n*   意向锁：\n\
  \    *   意向共享锁 (`IS`)\n    *   意向排他锁 (`IX`)\n    *   共享意向排他锁 (`SIX`)\n*   架构锁：\n\
  \    *   架构修改锁 (`Sch-M`)\n    *   架构稳定性锁 (`Sch-S`)\n*   大容量更新锁 (`BU`)\n*   键范围锁\n\
  \n#### 共享 (S) 模式\n\n共享模式用于只读查询，例如 `SELECT` 语句。它不会阻止其他只读查询同时访问数据，因为并发读取不会损害数据的完整性。\n\
  \n然而，为了维护数据一致性，会阻止对数据的并发修改查询。`（S）`锁会一直持有在数据上，直到数据被读取。默认情况下，`SELECT` 语句获取的 `（S）`\
  \ 锁在数据被读取后会立即释放。例如，考虑以下事务：\n\n```sql\nBEGIN TRAN\nSELECT *\nFROM Production.Product\
  \ AS p\nWHERE p.ProductID = 1;\n--其他查询\nCOMMIT\n```\n\n`SELECT` 语句获取的 `（S）` 锁不会持有到事务结束；相反，在默认隔离级别\
  \ `read_committed` 下，它会在 `SELECT` 语句读取数据后立即释放。`（S）` 锁的这种行为可以通过使用更高的隔离级别或锁提示来改变。\n\
  \n#### 更新 (U) 模式\n\n更新模式可以被认为类似于 `（S）` 锁，但它还包含在同一查询中修改数据的目标。与 `（S）` 锁不同，`（U）` 锁表示数据是为修改而读取的。由于数据是为修改目的而读取的，SQL\
  \ Server 不允许同时对数据持有多个 `（U）` 锁。此规则有助于维护数据一致性。请注意，数据上允许并发的 `（S）` 锁。`（U）` 锁与 `UPDATE`\
  \ 语句相关联，而 `UPDATE` 语句的动作实际上涉及两个中间步骤。\n\n1.  读取要修改的数据。\n2.  修改数据。\n\n在这两个中间步骤中使用了不同的锁模式以最大化并发性。在第一步读取数据时，不是获取排他权，而是在数据上获取一个\
  \ `（U）` 锁。在第二步中，`（U）` 锁被转换为排他锁以进行修改。如果不需要修改，则释放 `（U）` 锁；换句话说，它不会持有到事务结束。考虑以下示例，它演示了\
  \ `UPDATE` 语句的锁定行为：\n\n```sql\nBEGIN TRANSACTION LockTran1\nUPDATE Sales.Currency\n\
  SET Name = 'Euro'\nWHERE CurrencyCode = 'EUR';\nCOMMIT\n```\n\n要理解 `UPDATE` 语句中间步骤的锁定行为，你需要在每一步结束时从\
  \ `sys.dm_tran_locks` 获取数据。你可以按照以下概述的步骤，在 `UPDATE` 语句的每一步之后获取锁状态。你需要打开三个连接，我将它们称为连接\
  \ 1、连接 2 和连接 3。这需要 Management Studio 中的三个不同查询窗口。你需要按照我指定的顺序运行我所列连接中的查询，以达到一个阻塞情况；目的是观察这些阻塞发生的过程。最初的查询，如前所述，在连接\
  \ 1 中：\n\n3.  首先从第二个连接（连接 2）执行一个事务来阻塞 `UPDATE` 语句的第二步。\n\n```sql\n--从第二个连接执行\nBEGIN\
  \ TRANSACTION LockTran2\n--在资源上保留一个 (S) 锁\nSELECT *\nFROM Sales.Currency AS c WITH\
  \ (REPEATABLEREAD)\nWHERE c.CurrencyCode = 'EUR' ;\n--允许在事务 LockTran1 执行 UPDATE\
  \ 语句的第二步之前执行 DMV\nWAITFOR DELAY '00:00:10';\nCOMMIT\n```\n\n在连接 2 中运行的 `REPEATABLEREAD`\
  \ 锁提示允许 `SELECT` 语句在资源上保留 `（S）` 锁。\n\n4.  当事务 `LockTran2` 正在执行时，从第一个连接（连接 1）执行 `UPDATE`\
  \ 事务 `updatelock`（为清晰起见在此重复）。\n\n```sql\nBEGIN TRANSACTION LockTran1\nUPDATE Sales.Currency\n\
  SET Name = 'Euro'\nWHERE CurrencyCode = 'EUR';\n-- 注意：我们尚未提交\n--COMMIT\n```\n\n\
  5.  当 `UPDATE` 语句被阻塞时，从第三个连接（连接 3）查询 `sys.dm_tran_locks` DMV，如下所示：\n\n```sql\nSELECT\
  \ dtl.request_session_id,\ndtl.resource_database_id,\ndtl.resource_associated_entity_id,\n\
  dtl.resource_type,\ndtl.resource_description,\ndtl.request_mode,\ndtl.request_status\n\
  FROM sys.dm_tran_locks AS dtl\nORDER BY dtl.request_session_id;\n```\n\n连接 3 中 `sys.dm_tran_locks`\
  \ 的输出将提供 `UPDATE` 语句第一步之后的锁状态，因为 `UPDATE` 语句向排他 `（X）` 锁的转换被 `SELECT` 语句阻塞了。\n\n\
  6.  通过重新运行连接 3 中对 `sys.dm_tran_locks` 的查询，将提供 `UPDATE` 语句第二步之后的锁状态。\n\n接下来，让我们看看在\
  \ `UPDATE` 语句的各个步骤中，`sys.dm_tran_locks` 提供的锁状态。\n\n*   图 20-3 显示了 `UPDATE` 语句第 1\
  \ 步之后的锁状态（如前所述，从在第三个连接（连接 3）上执行的 `sys.dm_tran_locks` 的输出中获得）。\n\n**图 20-3.** `sys.dm_tran_locks`\
  \ 的输出，显示 `UPDATE` 语句的锁转换状态\n\n**注意**这些行的顺序并不重要。我按 `session_id` 排序是为了将每个查询的锁分组。\n\
  \n*   图 20-4 显示了 `UPDATE` 语句第 2 步之后的锁状态。\n\n**图 20-4.** `sys.dm_tran_locks` 的输出，显示\
  \ `UPDATE` 语句持有的最终锁状态\n\n从 `UPDATE` 语句第一步之后的 `sys.dm_tran_locks` 输出中，你可以注意到以下几点：\n\
  \n*   一个 `（U）` 锁被授予了数据行上的 `SPID`。\n*   请求了在该数据行上转换为 `（X）` 锁。\n\n从 `UPDATE` 语句第二步之后的\
  \ `sys.dm_tran_locks` 输出中，你可以看到 `UPDATE` 语句仅在该数据行上持有一个 `（X）` 锁。本质上，数据行上的 `（U）` 锁被转换为了\
  \ `（X）` 锁。\n\n\n\n"
- '# 第 20 章 ■ 阻塞与被阻塞的进程


  由于在第一步没有获取排他锁，`UPDATE` 语句允许其他事务在此期间使用 `SELECT` 语句读取数据。这是可能的，因为 `(U)` 锁和 `(S)` 锁彼此兼容。这增加了数据库的并发性。


  **注意**


  ■


  我将在本章后面讨论不同锁模式之间的锁兼容性。


  你可能会好奇，为什么在 `UPDATE` 语句的第一步使用 `(U)` 锁而不是 `(S)` 锁。


  要理解在 `UPDATE` 语句第一步使用 `(S)` 锁代替 `(U)` 锁的缺点，让我们将 `UPDATE` 语句分解为两个步骤。


  1.  使用 `(S)` 锁（而不是 `(U)` 锁）读取要修改的数据。

  2.  通过获取 `(X)` 锁来修改数据。


  考虑以下代码：


  ```sql

  BEGIN TRAN


  --1.使用(S)锁而不是(U)锁读取要修改的数据。

  -- 使用 REPEATABLEREAD 锁定提示保留(S)锁，因为

  -- 原始的(U)锁会一直保留，直到转换为

  -- (X)锁。

  SELECT *

  FROM Sales.Currency AS c WITH (REPEATABLEREAD)

  WHERE c.CurrencyCode = ''EUR'' ;


  --允许另一个相同的更新操作并发开始

  WAITFOR DELAY ''00:00:10'' ;


  --2. 通过获取(X)锁修改数据

  UPDATE Sales.Currency WITH (XLOCK)

  SET Name = ''EURO''

  WHERE CurrencyCode = ''EUR'' ;


  COMMIT

  ```


  如果此事务从两个连接同时执行，则会导致死锁，如下所示：


  ```

  Msg 1205, Level 13, State 51, Line 13

  事务(进程 ID 58)在锁资源上与另一个进程发生了死锁，并被选作死锁牺牲品。请重新运行该事务。

  ```


  两个事务都使用 `(S)` 锁读取要修改的数据，然后请求 `(X)` 锁进行修改。


  当第一个事务尝试转换到 `(X)` 锁时，它被第二个事务持有的 `(S)` 锁阻塞。同样，当第二个事务尝试从 `(S)` 锁转换到 `(X)` 锁时，它被第一个事务持有的
  `(S)` 锁阻塞，而第一个事务又反过来被第二个事务阻塞。这导致了循环阻塞——因此，发生了死锁。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- "# 第 20 章 ■ 阻塞与被阻塞的进程\n\n**注意** 死锁将在第 21 章中更详细地介绍。\n\n为了避免这种典型的死锁，`UPDATE` 语句在其第一个中间步骤使用\
  \ `(U)` 锁代替 `(S)` 锁。与 `(S)` 锁不同，`(U)` 锁不允许同时在同一个资源上再放置另一个 `(U)` 锁。这迫使第二个并发的 `UPDATE`\
  \ 语句等待，直到第一个 `UPDATE` 语句完成。\n\n#### 排他 (X) 模式\n\n排他模式为数据操作查询（如 `INSERT`、`UPDATE`\
  \ 和 `DELETE`）修改数据库资源提供了排他权利。它阻止其他并发事务访问正在修改的资源。`INSERT` 和 `DELETE` 语句都在其执行一开始就获取\
  \ `(X)` 锁。如前所述，`UPDATE` 语句在读取要修改的数据后转换为 `(X)` 锁。在一个事务中授予的 `(X)` 锁会一直持有到事务结束。\n\n\
  `(X)` 锁有两个用途。\n\n- 它防止其他事务访问正在修改的资源，这样它们看到的值要么是修改前的，要么是修改后的，而不是一个正在修改中的值。\n- 它允许修改资源的事务在需要时安全地回滚到修改前的原始值，因为不允许其他事务同时修改该资源。\n\
  \n#### 意向共享 (IS)、意向排他 (IX) 和共享意向排他 (SIX) 模式\n\n意向共享、意向排他和共享意向排他锁表明查询打算在较低的锁层级上获取相应的\
  \ `(S)` 或 `(X)` 锁。例如，考虑在 `Sales.Currency` 表上的以下事务：\n\n```sql\nBEGIN TRAN\nDELETE\
  \ Sales.Currency\nWHERE CurrencyCode = 'ALL';\n\nSELECT \n    tl.request_session_id,\n\
  \    tl.resource_database_id,\n    tl.resource_associated_entity_id,\n    tl.resource_type,\n\
  \    tl.resource_description,\n    tl.request_mode,\n    tl.request_status\nFROM\
  \ sys.dm_tran_locks tl;\n\nROLLBACK TRAN\n```\n\n图 20-5 显示了 `sys.dm_tran_locks`\
  \ 的输出。\n\n![](img/index-412_1.png)\n\n**图 20-5.** `sys.dm_tran_locks` 的输出，显示在较高层级授予的意向锁\n\
  \n表级（PAGE）的 `(IX)` 锁表明 `DELETE` 语句打算在页、行或键级别获取 `(X)` 锁。类似地，页级（PAGE）的 `(IX)` 锁表明查询打算在该页中的某一行上获取\
  \ `(X)` 锁。较高层级的 `(IX)` 锁阻止另一个事务在表或包含该行的页上获取不兼容的锁。\n\n事务在较低层级持有锁的同时，在相应较高层级标记意向锁——`(IS)`\
  \ 或 `(IX)`——可防止其他事务在较高层级获取不兼容的锁。如果不使用意向锁，那么尝试在较高层级获取锁的事务将必须扫描较低层级以检测较低层级锁的存在。虽然较高层级的意向锁表明存在较低层级的锁，但获取较高层级锁的锁定开销得到了优化。授予事务的意向锁会一直持有到事务结束。\n\
  \n一次只能在给定资源上放置一个 `(SIX)` 锁。这防止了其他事务进行更新。当 `(SIX)` 锁生效时，其他事务可以在较低层级的资源上放置 `(IS)`\
  \ 锁。\n\n此外，在某个层级请求（或获取）的锁与打算在较低层级拥有锁的组合是可能的。例如，可能存在 `(SIU)` 和 `(UIX)` 锁组合，表示在相应层级已获取\
  \ `(S)` 或 `(U)` 锁，并打算在较低层级获取 `(U)` 或 `(X)` 锁。\n\n#### 架构修改 (Sch-M) 和架构稳定性 (Sch-S)\
  \ 模式\n\n架构修改和架构稳定性锁由依赖于表架构的 SQL 语句在表上获取。对表的架构进行操作的 DDL 语句会在表上获取 `(Sch-M)` 锁，并阻止其他事务访问该表。对于依赖于架构但不修改架构的数据库活动（例如查询编译），会获取\
  \ `(Sch-S)` 锁。它阻止在表上获取 `(Sch-M)` 锁，但允许在表上授予其他锁。\n\n由于在生产数据库上，架构修改并不频繁，`(Sch-M)`\
  \ 锁通常不会成为阻塞问题。并且因为 `(Sch-S)` 锁除了 `(Sch-M)` 锁外不会阻塞其他锁，所以并发性通常也不会受到 `(Sch-S)` 锁的影响。\n\
  \n#### 批量更新 (BU) 模式\n\n批量更新锁模式是批量加载操作独有的。这些操作包括旧式的 `bcp`（批量复制）、`BULK INSERT` 语句以及使用\
  \ `BULK` 选项的 `OPENROWSET` 插入。作为加速这些过程的一种机制，你可以提供 `TABLOCK` 提示或在表上设置选项以使其在批量加载时锁定。`(BU)`\
  \ 锁模式的关键在于，它允许多个针对被锁定表的批量操作，但在批量进程运行时阻止其他操作。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
