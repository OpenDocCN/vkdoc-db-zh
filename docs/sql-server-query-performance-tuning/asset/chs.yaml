  ![](img/index-248_1.png)

  ![](img/index-248_2.jpg)


  ## 由 INSERT 语句引起的页拆分


  要理解 `INSERT` 语句如何引起页拆分，请创建与之前相同的测试表，包含初始的八行和聚集索引。由于单个索引叶级页已完全填满，任何尝试按如下方式添加中间行的操作都应导致叶级页的页拆分。


  ```sql

  INSERT INTO Test1

  VALUES (110, ''C2'', '''');

  ```


  你可以通过检查 `sys.dm_db_index_physical_stats` 的输出（图 13-9). 来验证这一点。


  **图 13-9. 插入后的页**


  如前所述，原始叶级页中的一半行被移动到新页。一旦在原始叶级页中腾出空间，新行就会按适当的顺序添加到原始叶级页中。请注意，一行只与一个页关联；它不能跨越多个页。图
  13-10 shows 两个页中行的最终分布。


  **图 13-10. 由 INSERT 语句引起的页拆分**


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  从前一个索引页中，你可以看到由 `INSERT` 语句引起的页拆分导致行稀疏地分布在叶级页上，从而引起内部碎片。它通常也会引起外部碎片，因为新的叶级页可能无法在物理上与原始页相邻。对于碎片量大的大表，由
  `INSERT` 语句引起的页拆分将需要更多的叶级页来容纳所有的索引行。


  为了演示索引页中显示的行分布，你可以再次运行创建 `dbo.Test1` 的脚本，向这些页添加更多行：


  ```sql

  INSERT INTO dbo.Test1

  VALUES (410, ''C4'', ''''),

  (900, ''C4'', '''');

  ```


  结果与前面的示例相同：这些新行可以被容纳在两个现有的叶级页中，而不会引起任何页拆分。你可以通过调用 `DBCC IND` 和 `DBCC PAGE` 来验证这一点。注意，在第一页中，新行被添加到该页的其他行之间。由于页中有可用空间，这不会引起页拆分。


  那么，当你必须向索引末尾添加行时呢？在这种情况下，即使需要一个新页，它也不会拆分任何现有页。例如，添加一个 `C1` 等于 1300 的新行将需要一个新页，但它不会引起页拆分，因为该行不是添加在中间位置。因此，如果新行是按聚集索引的顺序添加的，那么索引行将始终添加在索引的末尾，从而防止原本可能由
  `INSERT` 语句引起的页拆分。


  由页拆分引起的碎片会损害数据检索性能，接下来你将看到这一点。


  ## 碎片开销


  内部和外部碎片都会对数据检索性能产生不利影响。外部碎片导致磁盘上的索引页序列不连续，新的叶级页远离原始叶级页，并且它们的物理顺序与逻辑顺序不同。因此，对索引的范围扫描将需要比理想情况下更多的区切换，如本章前面所述。此外，对索引的范围扫描将无法受益于磁盘执行的预读操作。如果页面是连续排列的，那么预读操作可以在头部移动不多的情况下提前读取页面。



  '
- "# 第 13 章：索引碎片化\n\n## 理解碎片化的影响\n\n为了获得更好的性能，通常优选使用顺序 I/O，因为这可以在一次磁盘 I/O 操作中读取整个区（八个\
  \ 8KB 页）。相比之下，非连续的页面布局需要非顺序或随机 I/O 操作来从磁盘检索索引页，而一次随机 I/O 操作在一次磁盘操作中只能读取 8KB 数据（但是，如果您只检索一行，这可能是可以接受的）。硬盘驱动器，尤其是\
  \ SSD，速度的不断提升已经降低了这个问题的影响，但它仍然存在。\n\n在内部碎片化的情况下，行稀疏地分布在大量页面上，增加了将索引页读入内存所需的磁盘 I/O\
  \ 操作数量，并增加了从内存中检索多个索引行所需的逻辑读取次数。如前所述，尽管它增加了数据检索的成本，但少量的内部碎片化可能是有益的，因为它允许您执行 `INSERT`\
  \ 和 `UPDATE` 查询而不会引起页拆分。对于那些不需要遍历一系列页面来检索数据的查询，碎片化可能影响极小。换句话说，从索引中检索单个值不会受到碎片化的影响；或者，最多可能会多一个需要向下遍历的\
  \ B-Tree 层级。\n\n## 演示碎片化效果\n\n为了理解碎片化如何影响查询成本，请创建一个带有聚集索引的测试表，并向表中插入一个高度碎片化的数据集。由于在有序数据集之间执行\
  \ `INSERT` 操作可能导致页拆分，您可以通过按以下顺序添加行来轻松创建碎片化数据集：\n\n```sql\nIF (SELECT OBJECT_ID('Test1'))\
  \ IS NOT NULL\n    DROP TABLE dbo.Test1;\nGO\n\nCREATE TABLE dbo.Test1\n(\n    C1\
  \ INT,\n    C2 INT,\n    C3 INT,\n    c4 CHAR(2000)\n);\n\nCREATE CLUSTERED INDEX\
  \ i1 ON dbo.Test1 (C1);\n\nWITH Nums\nAS (SELECT TOP (10000)\n        ROW_NUMBER()\
  \ OVER (ORDER BY (SELECT 1)) AS n\n    FROM master.sys.All_Columns ac1\n    CROSS\
  \ JOIN master.sys.All_Columns ac2\n    )\nINSERT INTO dbo.Test1\n    (C1, C2, C3,\
  \ c4)\nSELECT n,\n    n,\n    n,\n    'a'\nFROM Nums;\n\nWITH Nums\nAS (SELECT 1\
  \ AS n\n    UNION ALL\n    SELECT n + 1\n    FROM Nums\n    WHERE n < 100\n    )\n\
  INSERT INTO dbo.Test1\n    (C1, C2, C3, c4)\nSELECT 41 - n,\n    n,\n    n,\n  \
  \  'a'\nFROM Nums;\n```\n\n为了确定从这个碎片化表中检索小结果集和大结果集所需的逻辑读取次数，请在 `STATISTICS IO` 和\
  \ `TIME` 设置为 `ON` 的情况下执行这两个 `SELECT` 语句：\n\n```sql\n--读取 6 行\nSELECT *\nFROM dbo.Test1\n\
  WHERE C1 BETWEEN 21 AND 23;\n\n--读取所有行\nSELECT *\nFROM dbo.Test1\nWHERE C1 BETWEEN\
  \ 1 AND 10000;\n```\n\n各个查询执行的逻辑读取次数分别如下：\n`表 'Test1'。扫描计数 1，逻辑读取 8 次`\n`CPU 时间\
  \ = 0 ms，已用时间 = 19 ms。`\n\n`表 'Test1'。扫描计数 1，逻辑读取 2542 次`\n`CPU 时间 = 0 ms，已用时间 =\
  \ 317 ms。`\n\n## 重建以分析性能\n\n为了评估碎片化数据集如何影响逻辑读取次数，请通过重建聚集索引来物理重新排列索引叶级页。\n\n```sql\n\
  ALTER INDEX i1 ON dbo.Test1 REBUILD;\n```\n\n在索引叶级页按正确顺序重新排列后，重新运行测试。前面两个 `SELECT`\
  \ 语句所需的逻辑读取次数分别减少到 5 和 13。\n\n`表 'Test1'。扫描计数 1，逻辑读取 6 次`\n`CPU 时间 = 0 ms，已用时间 =\
  \ 15 ms。`\n\n`表 'Test1'。扫描计数 1，逻辑读取 2536 次`\n`CPU 时间 = 0 ms，已用时间 = 297 ms。`\n\n\
  对于较小的数据集，性能有所改善，但对于较大的数据集变化不大，因为仅仅跳过几个页面不太可能产生那么大的影响。由于碎片化带来的成本开销通常随着检索行数的增加而线性增长，因为这涉及到读取更多无序的页面。对于\
  \ `点查询`（只检索一行的查询），碎片化通常无关紧要，因为该行仅从一个叶级页检索，但情况并非总是如此。由于索引的内部结构，碎片化甚至可能增加点查询的成本。\n\
  \n> **注意** 本节的经验是，为了获得更好的查询性能，分析索引中的碎片化量并在需要时重新排列它至关重要。\n\n## 分析碎片化量\n\n您可以使用 `sys.dm_db_index_physical_stats`\
  \ 动态管理函数来分析索引的碎片化比率。对于具有聚集索引的表，聚集索引的碎片化与数据页的碎片化一致，因为聚集索引的叶级页和数据页是相同的。\n\n`sys.dm_db_index_physical_stats`\
  \ 也指示堆表（或没有聚集索引的表）中的碎片化量。由于堆表不需要任何行排序，页面的逻辑顺序对于堆表并不重要。\n\n`sys.dm_db_index_physical_stats`\
  \ 的输出显示有关索引（或表）的页面和区的信息。为索引中的 B-树的每一级返回一行。为堆中的每个分配单元返回一行。如前所述，在 SQL Server 中，八个连续的\
  \ 8KB 页面被分组在一个大小为 64KB 的区中。对于小表（远小于 64KB），一个区中的页面可以属于多个索引或表——这些被称为 `混合区`。如果数据库中有许多小表，混合区有助于\
  \ SQL Server 节省磁盘空间。\n\n随着表（或索引）增长并请求超过八个页面，SQL Server 会创建一个专用于该表（或索引）的区，并分配此区中的页面。这样的区称为\
  \ `统一区`，它为同一个表（或索引）提供最多八次页面请求。统一区有助于 SQL Server 将表（或索引）的页面连续排列。它们还将页面创建请求的数量减少了八分之一，因为一组八个页面是以区的形式创建的。存储在统一区中的信息仍然可能是碎片化的，但访问一个页面分配将高效得多。如果您有混合区，页面在多个对象之间共享，并且这些区内存在碎片化，访问信息就会变得更加成问题。但不会对混合区进行碎片整理。\n\
  \n为了分析索引的碎片化，让我们使用“碎片化开销”部分中使用的碎片化数据集重新创建表。您可以通过执行前面使用的针对 `sys.dm_db_index_physical_stats`\
  \ 动态视图的查询来获取聚集索引的碎片化详细信息（图 13-11）。\n\n*图 13-11. 碎片化统计信息*\n\n```sql\nSELECT\n   \
  \ ddips.avg_fragmentation_in_percent,\n    ddips.fragment_count,\n    ddips.page_count,\n\
  \    ddips.avg_page_space_used_in_percent,\n    ddips.record_count,\n    ddips.avg_record_size_in_bytes\n\
  FROM sys.dm_db_index_physical_stats(DB_ID('AdventureWorks2012'),\n    OBJECT_ID(N'dbo.Test1'),NULL,\n\
  \    NULL,'Sampled') AS ddips;\n```\n\n\n"
- '# 第十三章 ■ 索引碎片


  动态管理函数 `sys.dm_db_index_physical_stats` 会扫描索引的页面以返回数据。你可以控制扫描的级别，这会影响扫描的速度和准确性。要快速检查索引的碎片情况，请使用
  `Limited` 选项。通过使用 `Sample` 选项（如前面的示例，扫描 1% 的页面），你可以获得更高的准确性，同时速度仅适度下降。要获得最高的准确性，请使用
  `Detailed` 扫描，它会访问索引中的所有页面。但请理解，`Detailed` 扫描可能会对性能产生重大影响，具体取决于所涉及的表和索引的大小。如果索引少于
  10,000 个页面，而你选择了 `Sample` 模式，则系统会转而使用 `Detailed` 模式。这意味着尽管在之前的查询中做出了选择，但实际使用了 `Detailed`
  扫描模式。默认模式是 `Limited`。


  通过定义不同的参数，你可以获取不同数据集的碎片信息。如果移除之前查询中的 `OBJECTID` 函数并提供一个 `NULL` 值，查询将返回数据库中所有索引的信息。对此不必感到惊讶，但要避免不小心对所有索引运行
  `Detailed` 扫描。你也可以指定要获取信息的索引，甚至是分区索引的特定分区。


  `sys.dm_db_index_physical_stats` 的输出包含 21 个不同的列。我选择了一组基本的列，用于确定索引的碎片和大小。此输出代表以下内容：


  - `avg_fragmentation_in_percent`：此数字表示索引和堆的逻辑平均碎片百分比。如果表是堆且模式为 `Sampled`，则此值将为 `NULL`。如果平均碎片率低于
  10% 到 20%，并且表不是非常大，那么碎片不太可能成为问题。如果索引碎片率在 20% 到 40% 之间，碎片可能是个问题，但通常可以通过索引重新组织（关于索引重新组织和索引重建的更多信息，请参阅“碎片解决方案”一节）来改善。大规模碎片，通常大于
  40%，可能需要重建索引。你的系统可能有不同的要求，不一定要遵循这些一般数字。


  - `fragment_count`：此数字表示构成索引的片段（即分离的页面组）的数量。这个数字有助于理解索引的分布情况，特别是当与 `page_count`
  值进行比较时。当采样模式为 `Sampled` 时，`fragment_count` 为 `NULL`。大量的片段数是存储碎片的另一个迹象。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-253_1.jpg)


  - `page_count`：这个数字是构成统计信息的索引或数据页面的数量。这个数字是大小的一个度量，但也可以帮助指示碎片情况。如果你知道数据或索引的大小，你可以计算一个页面可以容纳多少行。然后，如果你将此数字与表中的行数相关联，应该会得到一个接近
  `page_count` 的值。如果 `page_count` 值显著偏高，你可能正在处理碎片问题。请参考 `avg_fragmentation_in_percent`
  值以获得精确的度量。


  - `avg_page_space_used_in_percent`：要了解索引页面内分配空间的使用情况，请使用此数字。当采样模式为 `Limited` 时，此值为
  `NULL`。


  - `record_count`：简单来说，这是统计信息所代表的记录数量。对于索引，这是扫描模式所表示的 B 树当前层级中的记录数。（详细扫描将显示 B 树的所有层级，而不仅仅是叶级。）对于堆，此数字表示存在的记录数，但此数字可能与表中的行数并不完全对应，因为一个堆在更新后可能有两条记录，并且可能发生页面拆分。


  - `avg_record_size_in_bytes`：此数字简单地表示索引或堆记录中存储的数据量的一个有用度量。


  使用 `Detailed` 模式运行 `sys.dm_db_index_physical_stats` 将为给定索引返回多行数据。也就是说，如果该索引跨越多个层级，则会显示多行。当索引跨越多个页面时，索引中就会存在多个层级。要查看其外观并观察动态管理函数中存在的其他一些数据列，请按以下方式运行查询：


  ```sql

  SELECT ddips.*

  FROM sys.dm_db_index_physical_stats(DB_ID(''AdventureWorks2012''),

  OBJECT_ID(N''dbo.Test1''),NULL,

  NULL,''Detailed'') AS ddips;

  ```


  为了使数据易于阅读，我将结果数据表分成了三部分，放在一张图中；请参见图 13-12。


  **图 13-12.** 碎片索引的详细扫描


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-254_1.png)


  如你所见，返回了两行，分别代表索引的叶级（`index_level = 0`）和 B 树的第一级（`index_level = 1`，即第二行）。你可以看到 `sys.dm_db_index_physical_stats`
  提供的更多信息，这些信息可以提供对索引更详细的分析。例如，你可以看到最小和最大的记录大小，以及索引深度（B 树中的层级数）和每个层级上的记录数。对于基本的碎片分析，这些信息大多不太有用，这就是为什么我在示例中选择了限制列数并使用
  `Sampled` 扫描模式。


  ## 分析小型表的碎片


  不要过于担心 `sys.dm_db_index_physical_stats` 对小型表的输出。对于少于八个页面的小型表或索引，SQL Server 为这些页面使用混合区。例如，如果一个表（SmallTable1
  或其聚集索引）只包含两个页面，那么 SQL Server 会从一个混合区中分配这两个页面，而不是专门为该表分配一个区。混合区还可能包含其他小型表/索引的页面，如图
  13-13 所示。


  **图 13-13.** 混合区


  页面分布在多个混合区上可能会让你认为表或索引存在高度的外部碎片，而实际上这是 SQL Server 的设计使然，因此是完全可以接受的。


  要了解小型表或索引的碎片信息可能是什么样子，请创建一个带有聚集索引的小型表。


  ```sql

  IF (SELECT OBJECT_ID(''dbo.Test1'')

  ) IS NOT NULL

  DROP TABLE dbo.Test1;

  GO

  CREATE TABLE dbo.Test1

  (C1 INT,

  C2 INT,

  C3 INT,

  C4 CHAR(2000)

  );

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-255_1.jpg)


  ```sql

  DECLARE @n INT = 1;

  WHILE @n <= 28

  BEGIN

  INSERT INTO dbo.Test1

  VALUES (@n, @n, @n, ''a'');

  SET @n = @n + 1;

  END

  CREATE CLUSTERED INDEX FirstIndex ON dbo.Test1(C1);

  ```


  在前面的表中，每个 `INT` 占用 4 字节，平均行大小为 2,012 (=4 + 4 + 4 + 2,000) 字节。



  因此，默认的 8KB 页面最多可以包含四行。当所有 28 行都添加到表中后，会创建一个聚集索引来物理排列这些行，并将碎片降至最低。由于内部碎片最小，聚集索引（或基表）需要七个（=28
  / 4）页面。因为页面数不超过八个，SQL Server 会为聚集索引（或基表）使用混合区中的页面。如果用于聚集索引的混合区不是连续相邻的，那么 `sys.dm_db_index_physical_stats`
  的输出可能会显示出很高的外部碎片量。但是，作为 SQL 用户，你无法减少由此产生的外部碎片。图 13-14 展示了 `sys.dm_db_index_physical_stats`
  的输出。


  图 13-14. 一个小聚集索引的碎片情况


  根据 `sys.dm_db_index_physical_stats` 的输出，你可以如下分析这个小聚集索引（或表）的碎片：


  - `avg_fragmentation_in_percent`：虽然这个索引可能跨越多个区，但此处显示的碎片并非外部碎片的指示，因为该索引存储在混合区上。

  - `Avg_page_space_used_in_percent`：这显示所有或大部分数据都良好地存储在 `pagecount` 字段显示的七个页面内。这排除了逻辑碎片的可能性。

  - `Fragment_count`：这表明数据是碎片化的，并存储在不止一个区上，但由于其长度少于八个页面，SQL Server 在数据存储位置上没有太多选择。


  尽管有上述误导性的数值，一个少于八页的小表（或索引）不太可能从消除碎片的努力中受益，因为它将存储在混合区上。


  一旦确定索引（或表）中的碎片需要处理，你就需要决定使用哪种碎片整理技术。影响这一决定的因素以及不同的技术将在下一节中解释。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- "# 第 13 章 ■ 索引碎片\n\n## 碎片解决方案\n\n你可以通过重新排列索引行和页面，使它们的物理顺序和逻辑顺序匹配来解决索引碎片问题。为了减少外部碎片，你可以物理地重新排序索引的叶级页面，使其遵循索引的逻辑顺序。你可以通过以下技术实现这一点：\n\
  \n- 删除并重新创建索引\n- 使用 `DROP_EXISTING = ON` 子句重新创建索引\n- 对索引执行 `ALTER INDEX REBUILD`\
  \ 语句\n- 对索引执行 `ALTER INDEX REORGANIZE` 语句\n\n### 删除并重新创建索引\n\n消除索引碎片的最简单方法之一显然是先删除索引，然后重新创建它。\n\
  \n删除并重新创建索引可以最大程度地减少碎片，因为它允许 SQL Server 为索引使用全新的页面，并使用现有数据适当地填充它们。这避免了内部和外部碎片。不幸的是，这种方法有许多严重的缺点。\n\
  \n- **阻塞**：这种碎片整理技术会给系统增加大量开销，并导致阻塞。删除和重新创建索引会阻塞对该表（或表上任何其他索引）的所有其他请求。它也可能被针对该表的其他请求阻塞。\n\
  - **索引缺失**：在索引被删除，并且可能被阻塞并等待重新创建期间，针对该表的查询将无法使用该索引。这可能导致该索引原本打算解决的性能不佳问题。\n- **非聚集索引**：如果被删除的索引是聚集索引，那么在聚集索引被删除后，表上所有的非聚集索引都必须重建。然后在聚集索引重新创建后，它们又必须再次重建。这导致了进一步的阻塞以及其他问题，例如语句重新编译（详见第\
  \ 17 章）。\n- **唯一约束**：用于定义主键或唯一约束的索引不能使用 `DROP INDEX` 语句删除。此外，唯一约束和主键都可以被外键约束引用。在删除主键之前，必须首先删除所有引用该主键的外键。尽管这是可行的，但这是一种有风险且耗时的索引碎片整理方法。\n\
  \n可以使用 `ONLINE` 选项来删除聚集索引，这意味着在删除过程中索引仍然可读，但这只能让你避免前述的阻塞问题。基于所有这些原因，删除并重新创建索引不推荐用于生产数据库，尤其是在非高峰时段之外的任何时候。\n\
  \n### 使用 DROP_EXISTING 子句重新创建索引\n\n为了避免在重建聚集索引时两次重建非聚集索引的开销，请使用 `CREATE INDEX` 语句的\
  \ `DROP_EXISTING` 子句。这可以在一个原子步骤中重新创建聚集索引，避免重新创建非聚集索引，因为行定位器使用的聚集索引键值保持不变。\n\n要使用\
  \ `DROP_EXISTING` 子句在一个原子步骤中重建聚集索引键，请执行如下 `CREATE INDEX` 语句：\n\n```\nCREATE UNIQUE\
  \ CLUSTERED INDEX FirstIndex\nON dbo.Test1(C1)\nWITH (DROP_EXISTING = ON);\n```\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 ■ 索引碎片\n\n你可以在聚集索引和非聚集索引上使用\
  \ `DROP_EXISTING` 子句，甚至可以将非聚集索引转换为聚集索引。但是，不能用它将聚集索引转换为非聚集索引。\n\n这种碎片整理技术的缺点如下：\n\
  \n- **阻塞**：类似于 `DROP` 和 `CREATE` 方法，此技术也会导致并面临来自访问该表（或表上任何索引）的其他查询的阻塞。\n- **带约束的索引**：与第一种方法不同，带有\
  \ `DROP_EXISTING` 的 `CREATE INDEX` 语句可用于重新创建带约束的索引。如果该约束是主键，或者唯一约束与外键关联，那么在 `CREATE`\
  \ 语句中不包含 `UNIQUE` 关键字将导致如下错误：\n\n  **注意** `msg 1907, Level 16, State 1, Line 1`\
  \ 无法重新创建索引 'pK_name'。新的索引定义与现有索引强制实施的约束不匹配。\n\n- **具有多个碎片化索引的表**：随着表数据碎片化，索引通常也会变得碎片化。如果使用这种碎片整理技术，则必须识别表上的所有索引并分别重建它们。\n\
  \n你可以通过使用 `ALTER INDEX REBUILD` 来避免与此技术相关的最后两个限制，如下所述。\n\n### 执行 ALTER INDEX REBUILD\
  \ 语句\n\n`ALTER INDEX REBUILD` 在一个原子步骤中重建索引，就像带有 `DROP_EXISTING` 子句的 `CREATE INDEX`\
  \ 一样。\n\n由于 `ALTER INDEX REBUILD` 也会物理地重建索引，它允许 SQL Server 分配全新的页面，以将内部和外部碎片降至最低。但与带有\
  \ `DROP_EXISTING` 子句的 `CREATE INDEX` 不同，它允许动态重建一个索引（支持 `PRIMARY KEY` 或 `UNIQUE`\
  \ 约束），而无需删除和重新创建约束。\n\n为了理解使用 `ALTER INDEX REBUILD` 来整理索引碎片，请考虑在“碎片开销”和“分析碎片量”部分中使用的碎片化表。此表在此重复：\n\
  \n```\nIF (SELECT OBJECT_ID('Test1')) IS NOT NULL\nDROP TABLE dbo.Test1 ;\nGO\n\
  ```\n\n\n\n"
