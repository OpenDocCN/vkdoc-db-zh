- '# 第 13 章 ■ 索引碎片



  '
- "# 第 13 章 ■ 索引碎片\n\n### 碎片整理与分区\n\n如果你拥有海量数据库，一种有效的数据管理标准机制是将其拆分为分区。虽然分区在某些罕见情况下可能有助于提升性能，但其首要目的还是为了管理数据。然而，索引和分区的一个问题是，如果你重建索引，在重建期间它将不可用。这意味着对于海量索引上的分区，你可能会在重建过程中使大部分数据处于离线状态。SQL\
  \ Server 2012 引入了在线重建的能力。如果你有一个分区索引，它看起来会像这样：\n\n```sql\nALTER INDEX i1 ON dbo.Test1\n\
  REBUILD PARTITION = ALL\nWITH (ONLINE = ON);\n```\n\n这可以重建整个分区，并以在线操作的方式进行，意味着在重建过程中，索引在很大程度上保持可用。但是，对于某些分区来说，这是一项庞大的任务，可能会导致服务器负载过高，并且需要更多的\
  \ `tempdb` 存储空间。SQL Server 2014 引入了新功能，允许你指定单个分区。\n\n```sql\nALTER INDEX i1 ON dbo.Test1\n\
  REBUILD PARTITION = 1\nWITH (ONLINE = ON);\n```\n\n这减少了重建操作的开销，同时在重建期间仍保持索引基本可用。我需要强调是“基本”在线，因为在重建过程中仍然会发生一定程度的锁和争用。这并非完全无开销的操作，但比起替代方案已经有了巨大的改进。\n\
  \n谈到分区索引重建操作涉及的锁，SQL Server 2014 还引入了另一项新功能。你可以通过调整 `REBUILD` 命令来修改重建操作期间使用的锁优先级。\n\
  \n```sql\nALTER INDEX i1 ON dbo.Test1\nREBUILD PARTITION = 1\nWITH (ONLINE = ON\
  \ (WAIT_AT_LOW_PRIORITY (MAXDURATION = 20, ABORT_AFTER_WAIT = SELF)));\n```\n\n\
  这样做的作用是设置重建操作愿意等待的时长（以分钟为单位）。然后，它允许你决定为了给索引重建让路而中止哪些进程。你可以让它中止自身或造成阻塞的进程。最有趣的是，等待进程被设置为低优先级，因此它不会占用大量系统资源，并且任何新传入的事务都不会被这个进程阻塞。\n\
  \n结合这两项新功能，使用 SQL Server 2014 管理分区中的索引变得容易得多。\n\n## 填充因子的重要性\n\n你还可以通过在页面内压缩更多行来减少内部碎片，从而减少页面内的空闲空间。索引叶页面内可以进行的最大压缩量由\
  \ `fill factor` 控制，你将在下文看到。\n\n索引的内部碎片是通过在索引的叶页面中获取更多行来减少的。在叶页面中获得更多行减少了索引所需的总页面数，进而降低了检索一系列索引行所需的磁盘\
  \ I/O 和逻辑读取。另一方面，如果索引键值具有高度的事务性，那么完全使用的索引页面会导致页拆分。因此，对于一个事务性表，需要在最大化页面中的行数和避免页拆分之间取得良好平衡。\n\
  \nSQL Server 允许你使用 `fill factor` 来控制索引叶页面内的空闲空间量。如果你知道表上会有大量的 `INSERT` 查询或对索引键列的\
  \ `UPDATE` 查询，那么你可以使用 `fill factor` 预先在索引叶页面中添加空闲空间，以最小化页拆分。如果表是只读的，你可以使用高 `fill\
  \ factor` 创建索引以减少索引页面的数量。\n\n默认的 `fill factor` 为 0，这意味着叶页面被填满到 100%，尽管在 B 树结构的分支节点中会保留一些空闲空间。索引的\
  \ `fill factor` 仅在创建索引时应用。\n\n随着键的插入和更新，索引中的行密度最终会在一个狭窄的范围内趋于稳定。\n\n正如你在前一章关于 `UPDATE`\
  \ 和 `INSERT` 导致的页拆分的章节中看到的，当发生页拆分时，通常原始页面的一半会被移动到一个新页面，无论创建索引时使用了何种 `fill factor`，这种情况都会发生。\n\
  \n为了理解 `fill factor` 的重要性，我们使用一个有 24 行的小型测试表。\n\n```sql\nIF (SELECT OBJECT_ID('dbo.Test1'))\
  \ IS NOT NULL\n    DROP TABLE dbo.Test1;\nGO\n\nCREATE TABLE dbo.Test1 (C1 INT,\
  \ C2 CHAR(999));\n\nWITH Nums\nAS (SELECT 1 AS n\n    UNION ALL\n    SELECT n +\
  \ 1\n    FROM Nums\n    WHERE n < 24\n)\nINSERT INTO dbo.Test1 (C1, C2)\nSELECT\
  \ n * 100, 'a'\nFROM Nums;\n```\n\n通过使用默认 `fill factor` 创建聚集索引来增加叶（或数据）页面中的最大行数。\n\
  \n```sql\nCREATE CLUSTERED INDEX FillIndex ON Test1(C1);\n```\n\n由于平均行大小为 1,010\
  \ 字节，一个聚集索引叶页面（或表数据页面）最多可包含 8 行。因此，24 行至少需要 3 个叶页面。你可以在图 13-18 所示的 `sys.dm_db_index_physical_stats`\
  \ 输出中确认这一点。\n\n**图 13-18.** 填充因子设置为默认值 0\n\n请注意 `avg_page_space_used_in_percent`\
  \ 是 100%，因为默认的 `fill factor` 允许页面中压缩最大行数。由于一个页面无法包含部分行来完全填满页面，因此即使使用默认的 `fill factor`，`avg_page_space_used_in_percent`\
  \ 通常也会略低于 100%。\n\n为了减少由 `INSERT` 和 `UPDATE` 操作引起的初始页拆分频率，通过使用如下所示的 `fill factor`\
  \ 重新创建聚集索引，在叶（或数据）页面中创建一些空闲空间：\n\n```sql\nALTER INDEX FillIndex ON dbo.Test1 REBUILD\n\
  WITH (FILLFACTOR = 75);\n```\n\n因为每个页面的总空间可容纳 8 行，75% 的 `fill factor` 将允许每页 6 行。因此，对于\
  \ 24 行，叶页面的数量应增加到 4 个，如图 13-19 所示的 `sys.dm_db_index_physical_stats` 输出。\n\n**图 13-19.**\
  \ 填充因子设置为 75\n\n请注意 `avg_page_space_used_in_percent` 大约为 75%，这正是由 `fill factor`\
  \ 设置的。这允许在每个页面中再插入两行而不会导致页拆分。你可以通过向第一组 6 行（`C1 = 100 - 600`，包含在第一页中）添加两行来确认这一点。\n\
  \n```sql\nINSERT INTO dbo.Test1\nVALUES (110, 'a'), --第 25 行\n      (120, 'a');\
  \  --第 26 行\n```\n\n图 13-20 显示了当前的碎片情况。\n\n当处理大型数据库及其关联的索引时，可能有必要使用分区将表和索引拆分到不同的磁盘上。随着分区内数据的变化，分区上的索引也可能变得碎片化。在处理分区索引时，你需要确定是希望作为\
  \ `ALTER INDEX` 命令的一部分，对一个、部分或所有分区执行 `REORGANIZE` 还是 `REBUILD`。分区索引无法在线重建。请记住，执行任何影响所有分区的操作都可能是一项代价高昂的操作。\n\
  \n如果指定了索引上的压缩（即使是在分区索引上），你必须确保在执行 `ALTER INDEX` 操作时将其压缩设置为之前的值；如果不这样做，压缩设置将会丢失，你将不得不重新创建索引。这对于非聚集索引尤其重要，因为它们不会从表继承压缩设置。\n\
  \n\n***图 13-20.** 新增记录后的碎片化情况*\n\n从输出中可以看到，两行记录的添加并未给索引增加任何页面。相应地，`avg_page_space_used_in_percent`（平均页面空间使用百分比）从\
  \ 74.99% 上升到了 81.25%。在最初六行记录的基础上再添加两行，第一页应当完全填满（八行）。此后，如果在首八行的范围内继续添加行，就会引发页拆分，从而将索引页面数量增加到五个。\n\
  \n`INSERT INTO dbo.Test1 VALUES (130, 'a') ; --第 27 行`\n\n现在，`sys.dm_db_index_physical_stats`\
  \ 显示了如图 13-21. 所示的差异。\n\n***图 13-21.** 页面数量增加*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 13 章 ■ 索引碎片化\n\n请注意，尽管索引的填充因子为 75%，但 `平均页面密度（完整）` 已降至 67.49%，其计算方式如下：\n\n\
  `平均页面密度（完整）` = 每页平均行数 / 每页最大行数 = (27 / 5) / 8 = 67.5%\n\n从前面的例子可以看出，填充因子在索引创建时被应用。但之后，随着数据被修改，它就不再有意义。无论填充因子如何设置，每当发生页拆分时，原始页面的行都会分布到两个页面之间，`avg_page_space_used_in_percent`\
  \ 会相应调整。因此，如果你使用了非默认的填充因子，应确保定期重新应用填充因子以保持其效果。\n\n你可以通过重建索引，或使用 `ALTER INDEX REORGANIZE`\
  \ 或 `ALTER INDEX REBUILD` 命令（如前所示）来重新应用填充因子。`ALTER INDEX REORGANIZE` 命令会考虑索引创建时指定的填充因子。`ALTER\
  \ INDEX REBUILD` 命令也会考虑原始填充因子，但如果需要，它允许指定一个新的填充因子。\n\n如果没有对填充因子进行定期维护，无论是默认还是非默认的填充因子设置，索引（或表）的\
  \ `avg_page_space_used_in_percent` 最终都会稳定在一个狭窄的范围内。因此，在大多数情况下，无需手动维护填充因子，默认填充因子通常就足够好了。\n\
  \n在决定填充因子时，你还应考虑最后一个方面。即使对于繁重的 OLTP 应用程序，数据库读取次数通常也比写入次数多 5 到 10 倍。指定一个非默认的填充因子可能会降低读取性能，其降低程度与填充因子设置成反比，因为它将键值分散到更广的区域。在数据库级别设置填充因子之前，请使用性能监视器比较\
  \ `SQL Server:Buffer Manager:Page reads/sec`（SQL Server:缓冲区管理器:页面读取/秒）计数器与 `SQL\
  \ Server:Buffer Manager:Page writes/sec`（SQL Server:缓冲区管理器:页面写入/秒）计数器，仅当写入量占读取量的相当大比例（超过\
  \ 30%）时才使用填充因子选项。此外，优化器在构建执行计划进行选择时会考虑页面数量。如果你的页面数量较多，可能会在计划中看到一些糟糕的选择，导致性能不佳。\n\
  \n## 自动维护\n\n在事务量巨大的数据库中，表和索引会随着时间的推移而产生碎片。因此，为了提高性能，你应该定期检查表和索引的碎片情况，并对碎片化程度高的对象进行碎片整理。你可能还需要考虑工作负载情况，并根据负载以及索引的碎片化级别来决定何时对索引进行碎片整理。你可以按照以下步骤对数据库进行此类分析：\n\
  \n1.  确定当前数据库中需要分析碎片的所有用户表。\n2.  确定每个用户表和索引的碎片情况。\n3.  根据以下注意事项确定需要碎片整理的用户表和索引：\n\
  \    *   碎片化程度高，即 `avg_fragmentation_in_percent`（平均碎片百分比）大于 20%\n\n\n"
- "# 第 13 章 索引碎片整理\n\n*   表/索引不能非常小——即 `pagecount` 大于 8\n\n## 4. 对高碎片化的表和索引进行碎片整理\n\
  \n这里包含了一个 SQL 存储过程的示例，以便于参考。此脚本将执行基本操作，我将其包含在此处用于教学目的。但对于一个功能齐全、包含强大能力的脚本，我强烈推荐使用\
  \ Michelle Ufford 提供的脚本，地址为：[`bit.ly/1cjmzXv`](http://bit.ly/1cjmzXv)。另一套流行的脚本是\
  \ Ola Hollengren 的，地址为：[`bit.ly/JijaNI`](http://bit.ly/JijaNI)。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n我的脚本执行以下操作：\n\n*   遍历系统上的所有数据库，识别每个数据库中符合碎片标准的用户表索引，并将它们保存在一个临时表中\n*   根据碎片级别，重组轻度碎片的索引，并重建高度碎片化的索引\n\
  \n以下是分析和解决数据库碎片的方法（请将其存储在系统上的适当位置；我有一个专门用于企业级脚本的数据库）：\n\n```sql\nCREATE PROCEDURE\
  \ IndexDefrag\nAS\nDECLARE @DBName NVARCHAR(255),\n    @TableName NVARCHAR(255),\n\
  \    @SchemaName NVARCHAR(255),\n    @IndexName NVARCHAR(255),\n    @PctFrag DECIMAL,\n\
  \    @Defrag NVARCHAR(MAX)\n\nIF EXISTS ( SELECT *\n    FROM sys.objects\n    WHERE\
  \ object_id = OBJECT_ID(N'#Frag') )\n    DROP TABLE #Frag;\n\nCREATE TABLE #Frag\
  \ (\n    DBName NVARCHAR(255),\n    TableName NVARCHAR(255),\n    SchemaName NVARCHAR(255),\n\
  \    IndexName NVARCHAR(255),\n    AvgFragment DECIMAL)\n\nEXEC sys.sp_MSforeachdb\
  \ 'INSERT INTO #Frag ( DBName, TableName, SchemaName, IndexName, AvgFragment ) SELECT\
  \ ''?'' AS DBName ,t.Name AS TableName ,sc.Name AS SchemaName ,i.name AS IndexName\
  \ ,s.avg_fragmentation_in_percent FROM ?.sys.dm_db_index_physical_stats(DB_ID(''?''),\
  \ NULL, NULL, NULL, ''Sampled'') AS s JOIN ?.sys.indexes i ON s.Object_Id = i.Object_id\
  \ AND s.Index_id = i.Index_id JOIN ?.sys.tables t ON i.Object_id = t.Object_Id JOIN\
  \ ?.sys.schemas sc ON t.schema_id = sc.SCHEMA_ID WHERE s.avg_fragmentation_in_percent\
  \ > 20 AND t.TYPE = ''U'' AND s.page_count > 8 ORDER BY TableName,IndexName';\n\n\
  DECLARE cList CURSOR\nFOR\n    SELECT *\n    FROM #Frag\n\nOPEN cList;\n\nFETCH\
  \ NEXT FROM cList\nINTO @DBName,@TableName,@SchemaName,@IndexName,@PctFrag;\n\n\
  WHILE @@FETCH_STATUS = 0\nBEGIN\n    IF @PctFrag BETWEEN 20.0 AND 40.0\n    BEGIN\n\
  \        SET @Defrag = N'ALTER INDEX ' + @IndexName + ' ON ' + @DBName\n       \
  \     + '.' + @SchemaName + '.' + @TableName + ' REORGANIZE';\n        EXEC sp_executesql\
  \ @Defrag;\n        PRINT 'Reorganize index: ' + @DBName + '.' + @SchemaName + '.'\n\
  \            + @TableName + '.' + @IndexName;\n    END\n    ELSE\n        IF @PctFrag\
  \ > 40.0\n        BEGIN\n            SET @Defrag = N'ALTER INDEX ' + @IndexName\
  \ + ' ON '\n                + @DBName + '.' + @SchemaName + '.' + @TableName\n \
  \               + ' REBUILD';\n            EXEC sp_executesql @Defrag;\n       \
  \     PRINT 'Rebuild index: ' + @DBName + '.' + @SchemaName\n                + '.'\
  \ + @TableName + '.' + @IndexName;\n        END\n\n    FETCH NEXT FROM cList\n \
  \   INTO @DBName,@TableName,@SchemaName,@IndexName,@PctFrag;\nEND\n\nCLOSE cList;\n\
  DEALLOCATE cList;\nDROP TABLE #Frag;\nGO\n```\n\n要自动化碎片分析过程，您可以通过以下简单步骤从 SQL Server\
  \ 企业管理器创建一个 SQL Server 作业：\n\n1.  打开 Management Studio，右键单击 SQL Server Agent 图标，然后选择“新建”➤“作业”。\n\
  2.  在“新建作业”对话框的“常规”页上，输入作业名称和其他详细信息，如图 13-22 所示。\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n    ![](img/index-267_1.jpg)\n\n    **图 13-22.** 输入作业名称和详细信息\n\n3.  在“新建作业”对话框的“步骤”页上，单击“新建”，然后输入用户数据库的\
  \ SQL 命令，如图 13-23 所示。\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  \    ![](img/index-268_1.jpg)\n\n    **图 13-23.** 输入用户数据库的 SQL 命令\n\n\n4.  在“新建作业步骤”对话框的“高级”页面中，输入一个输出文件名来报告碎片分析结果，如**图\
  \ 13-24**所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-269_1.jpg)\n\
  \n第 13 章 ■ 索引碎片\n\n**图 13-24.** 输入输出文件名\n\n5.  单击“确定”返回到“新建作业”对话框。\n6.  在“新建作业”对话框的“计划”页面中，单击“新建计划”，并输入合适的计划来运行\
  \ SQL Server 作业，如**图 13-25**所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-270_1.jpg)\n\n第 13 章 ■ 索引碎片\n\n**图 13-25.** 输入作业计划\n\n将这个存储过程安排在非高峰时段执行。为了确切了解数据库的使用模式，需要全天记录\
  \ `SQLServer:SQL Statistics\\Batch Requests/sec` 性能计数器。它将显示数据库负载的波动情况。（我将在第 2 章详细解释这个性能计数器。）\n\
  7.  单击“确定”按钮返回到“新建作业”对话框。\n8.  输入所有信息后，单击“新建作业”对话框中的“确定”以创建 SQL Server 作业。创建的 SQL\
  \ Server 作业会将 `spIndexDefrag` 存储过程安排在定期的（每周）时间间隔运行。\n9.  确保 `SQL Server Agent` 正在运行，以便\
  \ SQL Server 作业能根据设定的计划自动运行。\n\nSQL 作业将在每周日凌晨 1 点自动分析和整理每个数据库的碎片。\n\n**图 13-26**\
  \ 显示了 `FragmentationOutput.txt` 文件的相应输出。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-271_1.png)\n\n第 13 章 ■ 索引碎片\n\n**图 13-26.** FragmentationOutput.txt\
  \ 文件输出\n\n输出显示该作业分析了数据库的碎片，并识别出了一系列需要整理（具体是重组）的索引。随后，它对索引进行了整理。该存储过程只整理了高度碎片化的数据库对象。因此，下次运行\
  \ SQL 作业时，通常不会再次识别出这些相同的索引进行整理。\n\n除了这个脚本，你还可以使用 Michelle 的脚本或 Ola 的脚本，也可以使用 SQL\
  \ Server 内置的维护计划。不过，我不推荐后者，因为为了易用性，你会牺牲很多控制权。\n\n使用前面推荐的一套脚本，你会对结果满意得多。\n\n## 总结\n\
  \n正如你在本章所学，在高度事务性的数据库中，由 `INSERT` 和 `UPDATE` 语句导致的页面拆分会碎片化表和索引，从而增加数据检索的成本。你可以通过使用\
  \ `fill factor`（填充因子）在页面中预留可用空间来避免这些页面拆分。由于填充因子只在创建索引时应用，你应该定期重新应用它以保持其有效性。你可以使用\
  \ `sys.dm_db_index_physical_stats` 来确定索引（或表）的碎片量。确定存在大量碎片后，你可以根据所需的碎片整理程度和数据库并发性，选择使用\
  \ `ALTER INDEX REBUILD` 或 `ALTER INDEX REORGANIZE`。\n\n碎片整理会重新排列数据，使其在磁盘上的物理顺序与表/索引中的逻辑顺序一致，从而提高查询性能。然而，除非优化器为查询确定了有效的执行计划，否则即使在碎片整理后，查询性能也可能仍然很差。因此，让优化器使用高效的技术来生成成本效益高的执行计划非常重要。\n\
  \n在下一章中，我将解释执行计划的生成以及优化器用来确定有效执行计划的技术。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- '# 第 14 章 执行计划生成




  '
- "# SQL Server 执行计划生成\n\n任何查询的性能都取决于优化器决定的执行计划的有效性。执行查询所需的总时间等于生成执行计划所需的时间加上基于该计划执行查询所需的时间，因此控制生成执行计划本身的成本非常重要。生成执行计划时产生的成本取决于生成过程、缓存计划的过程以及从计划缓存中重用计划的可能性。本章将介绍执行计划是如何生成的。\n\
  \n本章涵盖以下主题：\n\n*   执行计划生成与缓存\n*   用于生成执行计划的 SQL Server 组件\n*   优化执行计划生成成本的策略\n*\
  \   影响并行计划生成的因素\n\n## 执行计划生成\n\nSQL Server 使用基于成本的优化技术来确定查询的处理策略。优化器在决定使用哪个索引和连接策略时，会考虑数据库对象的元数据（如唯一约束或索引大小）以及查询中引用列的当前分布统计信息。\n\
  \n基于成本的优化使数据库开发人员能够专注于实现业务规则，而不是查询的确切语法。同时，确定查询处理策略的过程相当复杂，可能消耗大量资源。SQL Server 使用多种技术来优化资源消耗：\n\
  \n*   查询的基于语法的优化\n*   通过简单的计划匹配，避免对简单查询进行深入优化\n*   基于当前分布统计信息的索引和连接策略\n*   分阶段进行查询优化以控制优化成本\n\
  *   执行计划缓存以避免重新生成查询计划\n\n这些技术按顺序执行，如图 14-1 所示：\n\n1.  解析\n2.  绑定\n3.  查询优化\n4. \
  \ 执行计划生成、缓存和哈希计划生成\n5.  查询执行\n\n```\nAlgebrizer\nT-SQL Statement\nParser\nParse\
  \ Tree\nDML Statement?\nNo\nYes\nObject Binding\nQuery Processor\nTree\nStorage\
  \ Engine\nOptimizer\n```\n\n**图 14-1.** SQL Server 优化查询执行的技术\n\n让我们详细看看这些步骤。\n\n\
  ### 解析器\n\n当提交查询时，SQL Server 将其传递给 *关系引擎* 中的 `algebrizer`。（这个关系引擎是 SQL Server 数据检索和操作的两个主要部分之一，另一个是\
  \ *存储引擎*，负责数据访问、修改和缓存。）关系引擎负责解析、名称和类型解析以及优化。它还根据查询执行计划执行查询，并向存储引擎请求数据。\n\n`algebrizer`\
  \ 过程的第一部分是 `Parser`。`Parser` 检查传入的查询，验证其语法是否正确。如果检测到语法错误，查询将被终止。如果多个查询作为一个批处理一起提交（注意语法错误），则\
  \ `Parser` 会检查整个批处理的语法，并在检测到语法错误时取消整个批处理。（注意，一个批处理中可能出现多个语法错误，但 `Parser` 只会处理到第一个错误为止。）\n\
  \n```sql\nCREATE TABLE dbo.Test1 (c1 INT);\n\nINSERT INTO dbo.Test1\nVALUES (1);\n\
  \nCEILEKT * FROM dbo.t1; --错误：我的意思是，SELECT * FROM t1\n```\n\n在验证查询语法正确后，`Parser`\
  \ 会为 `algebrizer` 生成一个称为 *解析树* 的内部数据结构。`Parser` 和 `algebrizer` 合称为 *查询编译*。\n\n###\
  \ 绑定\n\n`Parser` 生成的解析树被传递给 `algebrizer` 的下一部分进行处理。`algebrizer` 现在解析 T-SQL 中引用的所有不同对象（如表、列等）的名称，这个过程称为\
  \ *绑定*。它还识别正在处理的所有不同数据类型。它甚至会检查聚合（如 `GROUP BY` 和 `MAX`）的位置。所有这些验证和解析的输出是一个称为 *查询处理器树*\
  \ 的二进制数据集。\n\n为了展示 `algebrizer` 的这一部分，如果提交以下批处理查询，那么错误语句之前的前三条语句将被执行，而错误语句及其后的语句将被取消。\n\
  \n```sql\nIF (SELECT OBJECT_ID('dbo.Test1')\n) IS NOT NULL\n    DROP TABLE dbo.Test1;\n\
  GO\n\nCREATE TABLE dbo.Test1 (c1 INT) ;\n\nINSERT INTO dbo.Test1\nVALUES (1);\n\n\
  SELECT '错误前',\n    c1\nFROM dbo.Test1 AS t;\n\nSELECT '错误',\n    c1\nFROM dbo.no_Test1;\
  \ --错误：表不存在\n\nSELECT '错误后' c1\nFROM dbo.Test1 AS t;\n```\n\n如果查询包含隐式数据转换，规范化过程会向查询树添加适当的步骤。该过程还执行一些基于语法的优化。例如，如果提交以下查询，基于语法的优化会转换查询的语法，如执行计划中\
  \ `SELECT` 操作符属性所示（见图 14-2），其中 `BETWEEN` 变成了 `>=` 和 `<=`。\n\n```sql\nSELECT soh.AccountNumber,\n\
  \       soh.OrderDate,\n       soh.PurchaseOrderNumber,\n       soh.SalesOrderNumber\n\
  FROM   Sales.SalesOrderHeader AS soh\nWHERE  soh.SalesOrderID BETWEEN 62500 AND\
  \ 62550;\n```\n\n**图 14-2.** 基于语法的优化\n\n你还可以看到参数化的一些证据，本章稍后将详细讨论。从查询生成的执行计划如图 14-3\
  \ 所示。\n\n**图 14-3.** 带有警告的执行计划\n\n你还应该注意 `SELECT` 操作符上的警告指示器。查看此操作符的属性，你可以看到 `SalesOrderID`\
  \ 实际上在转换过程中被转换了，优化器正在向你发出警告。\n\n```\nType conversion in expression (CONVERT(nvarchar(23),[soh].[SalesOrderID],0))\
  \ may affect\n\"CardinalityEstimate\" in query plan choice\n```\n\n我保留了这个带有警告的示例，是为了说明几点。首先，警告可能不清楚。在这个案例中，警告来自计算列\
  \ `SalesOrderNumber`。它正在将 `SalesOrderID` 转换为字符串并添加一个值。优化器以它的方式识别出这可能有问题，因此它给你一个警告。但是，你并没有以任何过滤方式（如\
  \ `WHERE` 子句、`JOIN` 或 `HAVING`）引用该列。因此，你可以安全地忽略这个警告。我保留它还因为 `AdventureWorks` 是一个很好的示例数据库，因为它包含了与现实世界数据库中有时出现的相同类型的不佳选择。\n\
  \n对于大多数数据定义语言（DDL）语句（如 `CREATE TABLE`、`CREATE PROC` 等），在通过 `algebrizer` 后，查询会被直接编译执行，因为优化器无需在多个处理策略中进行选择。特别是对于\
  \ `CREATE INDEX` 这条 DDL 语句，优化器可以根据表上其他现有索引来确定高效的处理策略，如第 8 章所述。\n\n\n### 优化\n\n根据查询的复杂程度（包括涉及的表数量和可用索引），在查询处理器树中执行查询的方式可能有多种。详尽比较所有执行方式的开销可能耗费大量时间，有时甚至可能超过找到最优查询所带来的益处。图\
  \ 14-4 显示，为避免优化开销相对于查询实际执行成本过高，优化器采用了不同的技术，即以下各项：\n\n*   简化\n*   平凡计划匹配\n*   多阶段优化\n\
  *   并行计划优化\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 14 章 ■ 执行计划生成\n\
  \n```\n简化\n平凡计划匹配\n是否找到平凡计划？\n否\n多阶段优化\n是\n1 到 n 个执行计划\n是否符合并行计划条件？\n是\n并行优化\n否\n\
  保存计划至过程缓存\n```\n\n***图 14-4.** 查询优化步骤*\n\n#### 简化\n\n在优化器开始处理您的查询之前，逻辑引擎已经识别了数据库中引用的所有对象。当优化器开始构建执行计划时，它首先确保所有被引用的对象都是实际使用且准确返回数据所必需的。如果您编写的查询涉及三个表的连接，但只有两个表被\
  \ `SELECT` 条件或 `WHERE` 子句实际引用，优化器可能会选择将另一个表排除在处理之外。这被称为简化步骤。它实际上是一个更大的处理过程的一部分，该过程收集统计数据并开始估算查询所涉及数据的基数。优化器还会收集有关约束（特别是外键约束）的必要信息，这将帮助其决定连接顺序，优化器可以根据需要重新排列顺序，以得出足够好的计划。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 14 章 ■ 执行计划生成\n\n#### 平凡计划匹配\n\
  \n有时可能只有一种执行查询的方法。例如，没有索引的堆表只能通过一种方式访问：表扫描。为避免此类查询的运行时优化开销，SQL Server 维护一个定义平凡计划的模式列表。如果优化器找到匹配项，则会为查询生成一个类似的计划而无需任何优化。生成的计划随后存储在过程缓存中。消除优化阶段意味着生成平凡计划的成本非常低。这并不意味着平凡计划是理想的或比更复杂的计划更可取。平凡计划仅适用于极其简单的查询。一旦查询的复杂性上升，它必须经过优化。\n\
  \n#### 多阶段优化\n\n对于一个非平凡的查询，需要分析的备选处理策略数量可能很多，并且评估每个选项可能需要很长时间。因此，优化器会经历三个不同级别的优化。这些级别被称为\
  \ `search 0`、`search 1` 和 `search 2`。但更易于将它们理解为事务、快速计划和完全优化。根据查询的大小和复杂性，这些不同的优化可能会逐一尝试，或者优化器可能直接跳到完全优化。每种优化都会考虑使用不同的连接技术以及通过扫描、查找和其他操作访问数据的不同方式。\n\
  \n索引变体考虑不同的索引方面，例如单列索引、复合索引、索引列顺序、列密度等。类似地，连接变体考虑 SQL Server 中可用的不同连接技术：`nested\
  \ loop join`、`merge join` 和 `hash join`。（第 4 章详细介绍了这些连接技术。）诸如唯一值和外键约束等约束也是优化决策过程的一部分。\n\
  \n优化器会考虑 `WHERE` 子句中引用的列的统计信息，以评估索引和连接策略的有效性。基于当前的统计信息，它会在多个优化阶段评估配置的成本。成本包括许多因素，包括但不限于执行查询所需的\
  \ CPU、内存和磁盘 I/O（包括随机与顺序 I/O 估算）的使用情况。在每个优化阶段之后，优化器会评估处理策略的成本。此成本仅为估计值，并非实际测量或行为预测；它是基于统计信息和所考虑过程的数学构建。如果发现成本足够低，则优化器会停止进一步迭代优化阶段并退出优化过程。否则，它会继续迭代优化阶段，以确定具有成本效益的处理策略。\n\
  \n有时查询可能非常复杂，以至于优化器需要广泛地迭代优化阶段。在优化查询时，如果发现处理策略的成本超过并行度成本阈值，则它会评估使用多个 CPU 处理查询的成本。否则，优化器将继续使用串行计划。\n\
  \n您可以通过两个来源了解多阶段优化期间发生的一些细节。例如，这个查询：\n\n```sql\nSELECT soh.SalesOrderNumber,\nsod.OrderQty,\n\
  sod.LineTotal,\nsod.UnitPrice,\nsod.UnitPriceDiscount,\np.[Name] AS ProductName,\n\
  p.ProductNumber,\nps.[Name] AS ProductSubCategoryName,\npc.[Name] AS ProductCategoryName\n\
  FROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail AS sod\nON soh.SalesOrderID\
  \ = sod.SalesOrderID\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-279_1.jpg)\n\
  \n第 14 章 ■ 执行计划生成\nJOIN Production.Product AS p\nON sod.ProductID = p.ProductID\n\
  JOIN Production.ProductModel AS pm\nON p.ProductModelID = pm.ProductModelID\nJOIN\
  \ Production.ProductSubcategory AS ps\nON p.ProductSubcategoryID = ps.ProductSubcategoryID\n\
  JOIN Production.ProductCategory AS pc\nON ps.ProductCategoryID = pc.ProductCategoryID\n\
  WHERE soh.CustomerID = 29658;\n```\n\n运行此查询时，会返回图 14-5 中的执行计划，这肯定是一个非平凡计划。\n\n***图\
  \ 14-5.** 非平凡执行计划*\n\n我知道这个执行计划很难阅读，但请不要尝试阅读它。需要理解的重点是，它涉及相当多的表，每个表都有索引和统计信息，所有这些都必须被考虑才能得出此执行计划。您首先可以查找有关优化器在此执行计划上工作的信息的位置是第一个运算符的属性表，在本例中是位于执行计划最左侧的\
  \ `T-SQL SELECT` 运算符。\n\n图 14-6 显示了属性表。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-280_1.jpg)\n\n第 14 章 ■ 执行计划生成\n\n***图 14-6.** `SELECT` 运算符属性表*\n\
  \n从顶部开始，您可以看到与创建和优化此执行计划直接相关的信息。\n\n*   缓存的计划大小，为 64 字节\n*   编译计划所使用的 CPU 周期数，为\
  \ 30ms\n*   使用的内存量，为 1144KB\n*   编译时间，为 42ms\n\n\n#### 优化级别与执行计划哈希\n\n优化级别属性（XML\
  \ 计划中的 `StatementOptmLevel`）显示了优化器内发生了何种类型的处理。在本例中，`FULL` 表示优化器执行了完全优化。这在“语句提前终止原因”属性中进一步显示为\
  \ `Good Enough Plan Found`。因此，优化器花费了 42 毫秒来追踪一个它认为在此情况下足够好的计划。您还可以看到 `QueryPlanHash`\
  \ 值，也称为执行计划的 ``fingerprint``（您可以在“查询计划哈希与查询哈希”一节中找到更多详细信息）。`SELECT`（以及 `INSERT`、`UPDATE`\
  \ 和 `DELETE`）操作符的属性是评估任何执行计划时重要的第一个停留点，因为包含了这些信息。\n\n"
- "# 优化器信息的第二个来源\n\n优化器信息的第二个来源是动态管理视图 `sys.Dm_exec_query_optimizer_info`。\n\n这个 DMV\
  \ 是随时间优化的事件聚合。它不会显示给定查询的个别优化，但会跟踪已执行的优化操作。这对于调整单个查询不那么直接方便，但如果您致力于降低一段时间内的工作负载成本，能够跟踪这些信息可以帮助您确定查询调整是否产生了积极的差异，至少在优化时间方面是如此。\n\
  \n返回的部分数据仅供 SQL Server 内部使用。图 14-7 显示了以下查询返回结果中有用数据的截断示例：\n\n```sql\nSELECT\n  \
  \  deqoi.counter,\n    deqoi.occurrence,\n    deqoi.value\nFROM sys.dm_exec_query_optimizer_info\
  \ AS deqoi;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-281_1.jpg)\n\
  \n**图 14-7.** `sys.dm_exec_query_optimizer_info` 的输出\n\n在另一个查询运行前后执行此查询，可以显示已完成的优化数量和类型所发生的变化。不过，如果您可以在测试服务器上隔离您的查询，就能更有把握地获得仅与您试图测量的查询直接相关的前后差异。\n\
  \n#### 并行计划优化\n\n优化器在评估使用并行计划处理查询的成本时会考虑多种因素。其中一些因素如下：\n\n*   SQL Server 可用的 CPU\
  \ 数量\n*   SQL Server 版本\n*   可用内存\n*   并行度的代价阈值\n*   正在执行的查询类型\n*   给定流中要处理的行数\n\
  *   活动的并发连接数\n\n如果 SQL Server 只有一个 CPU 可用，则优化器不会考虑并行计划。SQL Server 可用的 CPU 数量可以使用\
  \ SQL Server 配置的 ``affinity`` 设置来限制。亲和性值可以设置为特定的 CPU，或特定的 NUMA 节点。您也可以将其设置为范围。例如，要允许\
  \ SQL Server 在八路服务器上仅使用 CPU0 到 CPU3，请执行以下语句：\n\n```sql\nUSE master;\nEXEC sp_configure\
  \ 'show advanced option', '1';\nRECONFIGURE;\nALTER SERVER CONFIGURATION SET PROCESS\
  \ AFFINITY CPU = 0 TO 3;\nGO\n```\n\n此配置立即生效。``affinity`` 是一个特殊设置，我建议您仅在将控制权从 SQL\
  \ Server 手中夺走有意义的情况下使用它，例如当您在同一台机器上运行 SQL Server 的多个实例并且希望将它们彼此隔离时。您也可以使用相同的方式，通过\
  \ ``affinity I/O`` 选项将 I/O 绑定到特定的处理器集。\n\n即使 SQL Server 有多个 CPU 可用，如果单个查询不允许使用多于一个\
  \ CPU 执行，那么优化器会放弃并行计划选项。并行查询可以使用的最大 CPU 数量由 SQL Server 配置的 ``max degree of parallelism``\
  \ 设置决定。默认值为 `0`，这允许所有 CPU（由亲和性掩码设置提供）用于并行查询。您也可以通过资源调控器控制并行度。如果您希望允许并行查询在 CPU0 到\
  \ CPU3 中使用不超过两个 CPU（受前述亲和性掩码设置限制），请执行以下语句：\n\n```sql\nUSE master;\nEXEC sp_configure\
  \ 'show advanced option', '1';\nRECONFIGURE;\nEXEC sp_configure 'max degree of parallelism',\
  \ 2;\nRECONFIGURE;\n```\n\n此更改立即生效，无需任何重启。``max degree of parallelism`` 设置也可以在查询级别使用\
  \ `MAXDOP` 查询提示进行控制。\n\n```sql\nSELECT *\nFROM dbo.t1\nWHERE C1 = 1\nOPTION (MAXDOP\
  \ 2);\n```\n\n更改 ``max degree of parallelism`` 设置最好由您的应用程序需求及其上的工作负载决定。除非有迹象表明需要更改，否则我通常会将\
  \ ``max degree of parallelism`` 保留为默认值。我通常会将 ``cost threshold for parallelism``\
  \ 从其默认值 `5` 往上调。\n\n由于并行查询需要更多内存，优化器在选择并行计划之前会确定可用内存量。所需内存量随着并行度的增加而增加。如果对于给定的并行度，并行计划的内存需求无法满足，那么\
  \ SQL Server 会自动降低并行度，或者在给定的工作负载上下文中完全放弃该查询的并行计划。您可以在图 14-6 的 `SELECT` 属性中看到这部分评估。\n\
  \nCPU 开销非常高的查询是并行计划的最佳候选者。示例包括连接大表、执行大量聚合以及对大型结果集进行排序，这些都是报表系统（在 OLTP 系统中较少）上常见的操作。对于事务处理应用程序中通常出现的简单查询，初始化、同步和终止并行计划所需的额外协调超过了潜在的性能优势。\n\
  \n查询是否简单是通过比较查询的估计执行时间与代价阈值来确定的。此代价阈值由 SQL Server 配置的 ``cost threshold for parallelism``\
  \ 设置控制。默认情况下，该设置的值为 `5`，这意味着如果串行计划的估计执行时间超过 5 秒，则优化器会考虑为该查询使用并行计划。例如，要将代价阈值修改为 35\
  \ 秒，请执行以下语句：\n\n```sql\nUSE master;\nEXEC sp_configure 'show advanced option', '1';\n\
  RECONFIGURE;\nEXEC sp_configure 'cost threshold for parallelism', 35;\nRECONFIGURE;\n\
  ```\n\n此更改立即生效，无需任何重启。如果只有一个 CPU 可用于 SQL Server，则忽略此设置。我发现当 ``cost threshold for\
  \ parallelism`` 设置得如此之低时，OLTP 系统会受到影响。通常将该值增加到 30 到 50 之间会是有益的。请务必针对您的系统测试此建议，以确保它对您有效。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n另一个选择是简单地查看缓存中的计划，然后根据其中的查询及其代表的\
  \ workload 类型进行估算，以得出一个具体的数字。您可以将 OLTP 查询与报表查询分开，然后重点关注最可能从并行执行中受益的报表查询。取这些成本的平均值，并将您的代价阈值设置为该数字。\n\
  \n\n### 注意\n虽然我确实将这些值称为以秒为单位进行度量，但这只是优化器使用的一种抽象概念。\n它们并非字面意义上的度量值。\n\nDML 操作查询（`INSERT`、`UPDATE`\
  \ 和 `DELETE`）是串行执行的。然而，`INSERT` 语句的 `SELECT` 部分以及 `UPDATE` 或 `DELETE` 语句的 `WHERE`\
  \ 子句可以并行执行。实际的数据更改操作是串行应用到数据库的。此外，如果优化器判断估算成本过低，则不会引入并行运算符。\n\n请注意，即使在执行时，SQL Server\
  \ 也会判断当前系统工作负载和配置信息是否允许并行查询执行。如果允许并行查询执行，SQL Server 会确定最优线程数，并将查询的执行分配到这些线程上。当查询开始并行执行时，它将使用相同数量的线程直至完成。SQL\
  \ Server 在下次执行并行查询前，会重新检查最优线程数。\n\n一旦通过使用串行计划或并行计划确定了处理策略，优化器就会生成查询的执行计划。执行计划包含优化器为执行查询所决定的详细处理策略。这包括诸如数据检索、结果集连接、结果集排序等步骤。关于如何分析执行计划中包含的处理步骤的详细说明将在第\
  \ 4 章中介绍。为查询生成的执行计划会被保存在计划缓存中，以供将来重用。\n\n### 执行计划缓存\n优化器生成的查询执行计划保存在 SQL Server\
  \ 内存池的一个特殊区域，称为 `plan cache`（计划缓存）或 `procedure cache`（过程缓存）。（`procedure cache` 是\
  \ SQL Server 缓冲区缓存的一部分，将在第 2 章中解释。）将计划保存在缓存中，使得 SQL Server 在重新提交相同查询时，可以避免再次运行整个查询优化过程。SQL\
  \ Server 支持不同的技术，如 `plan cache aging`（计划缓存老化）和 `plan cache types`（计划缓存类型），以提高缓存计划的可重用性。它还存储两个二进制值，称为\
  \ `query hash`（查询哈希）和 `query plan hash`（查询计划哈希）。\n\n#### 注意\n我将在本章（第 15 章）讨论 SQL\
  \ Server 为提高执行计划重用有效性所支持的技术。\n\n### 执行计划的组件\n优化器生成的执行计划包含两个组件。\n- `Query plan`（查询计划）：这表示指定了执行查询所需的所有物理操作的命令。\n\
  - `Execution context`（执行上下文）：这在给定用户的上下文中维护查询的可变部分。\n\n我将在接下来的章节中更详细地介绍这些组件。\n\n\
  #### 查询计划\n查询计划是一个可重入的、只读的数据结构，其命令指定了执行查询所需的所有物理操作。可重入特性允许多个连接并发访问查询计划。物理操作包括规范要访问哪些表和索引、如何以及以何种顺序访问它们、要在多个表之间执行的连接操作类型等等。\n\
  \n查询计划中不存储任何用户上下文。\n\n#### 执行上下文\n执行上下文是另一个数据结构，用于维护查询的可变部分。虽然服务器在 `procedure cache`\
  \ 中跟踪执行计划，但这些计划是上下文中立的。因此，执行查询的每个用户都将拥有一个独立的执行上下文，其中保存特定于其执行的数据，例如参数值和连接详细信息。\n\n\
  #### 执行计划的老化\n`procedure cache` 是 SQL Server 缓冲区缓存的一部分，它也保存数据页。随着新的执行计划添加到 `procedure\
  \ cache`，其大小不断增长，影响了内存中有用数据页的保留。为避免这种情况，SQL Server 动态控制执行计划在 `procedure cache` 中的保留时间，保留频繁使用的执行计划，并丢弃在一定时间内未使用的计划。\n\
  \nSQL Server 通过为每个执行计划关联一个 `age field`（老化字段）来跟踪其重用频率。生成执行计划时，会使用生成该计划的 `cost`（成本）填充\
  \ `age field`。一个需要大量优化的复杂查询的 `age field` 值将高于一个较简单查询的值。\n\nSQL Server 的 `lazy writer\
  \ process`（惰性写入器进程）（它管理 SQL Server 中的大部分后台进程）会定期检查 `procedure cache` 中所有执行计划的当前\
  \ `cost`。如果某个执行计划长时间未被重用，那么其当前 `cost` 最终将降至 0。生成执行计划的成本越低，其 `cost` 就会越快降至 0。一旦执行计划的\
  \ `cost` 达到 0，该计划就成为从内存中移除的候选对象。当内存压力增大到不再有足够的可用内存来满足新请求时，SQL Server 会从 `procedure\
  \ cache` 中移除所有 `cost` 为 0 的计划。\n\n但是，如果系统有足够的内存，并且有空闲内存页可用于满足新请求，那么 `cost` 为 0 的执行计划可以在\
  \ `procedure cache` 中保留很长时间，以便在需要时以后重用。\n\n除了将 `cost` 向下调整外，每次执行计划被重用时，其 `cost`\
  \ 也可以增加到生成该计划的最大 `cost`（对于即席计划，则是增加到该计划的当前 `cost`）。例如，假设您有两个执行计划，其生成 `cost` 分别为\
  \ 100 和 10。那么它们的起始 `cost` 值将分别是 100 和 10。如果这两个执行计划都被立即重用，它们的 `age field` 将被重置为该最大\
  \ `cost`。在这些 `cost` 值下，`lazy writer` 会比第一个计划更快地将第二个计划的 `cost` 降至 0，除非第二个计划被更频繁地重用。因此，即使一个昂贵的计划比一个廉价的计划重用频率更低，但由于初始\
  \ `cost` 的影响，该昂贵的计划可以在更长的时间内保持非零的 `cost` 值。\n\n## 总结\nSQL Server 基于成本的查询优化器决定有效执行计划的依据，不是查询的确切语法，而是通过评估使用不同处理策略执行查询的\
  \ `cost`。使用不同处理策略的 `cost` 评估在多个优化阶段完成，以避免花费过多时间优化单个查询。然后，执行计划会被缓存起来，以便在重新执行相同查询时节省执行计划生成的\
  \ `cost`。\n\n在下一章中，我将讨论这些计划如何根据其调用方式以不同方式从缓存中重用。\n\n## 第 15 章\n## 执行计划缓存行为\n一旦完成生成执行计划所需的所有处理，如果\
  \ SQL Server 每次调用查询时都丢弃已完成的工作并从头再来，那将是疯狂的。相反，它将创建的计划保存在服务器上一个称为 `plan cache`（计划缓存）的内存空间中。本章将引导您了解如何监控\
  \ `plan cache`，以便查看 SQL Server 如何重用执行计划。\n\n在本章中，我将涵盖以下主题：\n- 如何分析执行计划缓存\n- `Query\
  \ plan hash`（查询计划哈希）和 `query hash`（查询哈希）作为识别需要优化的查询的机制\n- 执行计划出错和参数嗅探\n- 提高执行计划缓存可重用性的方法\n\
  \n## 分析执行计划缓存\n\n\n\n\n"
- "# 第 15 章：执行计划缓存行为\n\n通过访问各种动态管理对象，你可以获取关于过程缓存中执行计划的大量信息。用于处理执行计划的初始 DMO 是 `sys.dm_exec_cached_plans`。\n\
  \n```sql\nSELECT *\nFROM sys.dm_exec_cached_plans;\n```\n\n表 15-1 展示了 `sys.dm_exec_cached_plans`\
  \ 提供的一些有用信息（在网格视图下更易阅读）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ## 表 15-1。`sys.dm_exec_cached_plans`\n\n| 列名 | 描述 |\n| :--- | :--- |\n| `refcounts`\
  \ | 这表示缓存中引用此计划的其他对象的数量。 |\n| `usecounts` | 这是此对象自添加到缓存以来被使用的次数。 |\n| `size_in_bytes`\
  \ | 这是存储在缓存中的计划的大小。 |\n| `cacheobjtype` | 这指定了计划的类型；有多种类型，但特别值得关注的有以下几种：<br>• `Compiled\
  \ plan`：一个完整的执行计划。<br>• `Compiled plan stub`：用于即席查询的标记（你可以在本章的“即席工作负载”小节中找到更多细节）。<br>•\
  \ `Parse tree`：为访问视图而存储的计划。 |\n| `objtype` | 这是生成该计划的对象类型。同样有多种，但特别值得关注的有：<br>•\
  \ `Proc`<br>• `Prepared`<br>• `Ad hoc`<br>• `View` |\n| `plan_handle` | 这是内存中此计划的标识符；用于检索查询文本和执行计划。\
  \ |\n\n单独使用 DMV `sys.dm_exec_cached_plans` 只能让你获得一小部分信息。DMO 最好与其他 DMO 和其他系统视图结合使用。例如，将动态管理函数\
  \ `sys.dm_exec_query_plan(plan_handle)` 与 `sys.dm_exec_cached_plans` 结合使用，还会返回 XML\
  \ 执行计划本身，这样你就可以显示它并进行操作。如果你再引入 `sys.dm_exec_sql_text(plan_handle)`，你还可以检索原始查询文本。在你为这里的示例运行已知查询时，这可能看起来没用，但当你进入生产系统并开始从缓存中提取执行计划时，能够获取原始查询可能会很方便。要获取有关缓存计划的聚合性能指标，你可以使用\
  \ `sys.dm_exec_query_stats` 来返回该数据。其中包括查询哈希和查询计划哈希等信息都存储在此 DMF 中。最后，要查看当前正在执行的查询的执行计划，你可以使用\
  \ `sys.dm_exec_requests`。\n\n在接下来的小节中，我将通过实际查询这些 DMO 来探讨计划缓存的工作原理。\n\n## 执行计划重用\n\
  \n当提交一个查询时，SQL Server 会检查过程缓存中是否有匹配的执行计划。如果没有找到，那么 SQL Server 会执行查询编译和优化以生成一个新的执行计划。但是，如果该计划存在于过程缓存中，它将与私有执行上下文一起被重用。这节省了本该花费在计划生成上的\
  \ CPU 周期。\n\n查询提交给 SQL Server 时会带有用于限制结果集大小的过滤条件。相同的查询经常使用不同的过滤条件值重新提交。例如，考虑以下查询：\n\
  \n```sql\nSELECT soh.SalesOrderNumber,\n       soh.OrderDate,\n       sod.OrderQty,\n\
  \       sod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail\
  \ AS sod\nON soh.SalesOrderID = sod.SalesOrderID\nWHERE soh.CustomerID = 29690\n\
  \  AND sod.ProductID = 711;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n当此查询被提交时，优化器会创建一个执行计划并将其保存在过程缓存中，以备将来重用。如果此查询使用不同的过滤条件值重新提交——例如 `soh.CustomerID\
  \ = 29500`——重用先前提供的过滤条件值的现有执行计划将是有益的。但是，为一个过滤条件值创建的执行计划是否可以重用于另一个过滤条件值，取决于查询是如何提交给\
  \ SQL Server 的。\n\n提交给 SQL Server 的查询（或工作负载）可以大致分为两类，这决定了当查询的可变部分的值发生变化时，执行计划是否可重用。\n\
  \n*   即席\n*   预编译\n\n**提示：** 要测试本章中 `sys.dm_exec_cached_plans` 的输出，有时需要通过执行 `DBCC\
  \ FREEPROCCACHE` 来从缓存中移除计划。不要在你的生产服务器上运行此命令，因为清空缓存将要求所有执行计划在执行时重新构建，这会对你的生产系统造成无谓的严重压力。你可以使用\
  \ `DBCC FREEPROCCACHE(plan_handle)` 来针对特定的计划。使用我已经讨论过的 DMO 来检索 `plan_handle`。\n\n\
  ## 即席工作负载\n\n查询可以在没有显式地将变量与查询分离的情况下提交给 SQL Server。这些没有显式地将查询的可变部分转换为参数来执行的查询类型被称为\
  \ `即席工作负载`（或查询）。到目前为止本书中的大多数示例都是即席查询。再举一个例子，考虑这个查询：\n\n```sql\nSELECT soh.SalesOrderNumber,\n\
  \       soh.OrderDate,\n       sod.OrderQty,\n       sod.LineTotal\nFROM Sales.SalesOrderHeader\
  \ AS soh\nJOIN Sales.SalesOrderDetail AS sod\nON soh.SalesOrderID = sod.SalesOrderID\n\
  WHERE soh.CustomerID = 29690\n  AND sod.ProductID = 711;\n```\n\n如果查询按原样提交，没有显式地将任何一个硬编码值转换为（可以在执行时提供给查询的）参数，那么该查询就是即席查询。使用\
  \ `DECLARE` 语句将值设置为局部变量与参数不同。\n\n在这个查询中，过滤条件值嵌入在查询本身中，没有显式地参数化以将其与查询分离。这意味着你无法重用此查询的执行计划，除非你使用相同的值并且所有空格和回车符都完全相同。然而，查询中使用值的地方可以通过三种不同的方式显式地参数化，这些方式共同归类为预编译工作负载。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 预编译工作负载\n\n`预编译工作负载`（或查询）显式地参数化查询的可变部分，使得查询计划不与可变部分的值绑定。在\
  \ SQL Server 中，可以使用以下三种方法将查询作为预编译工作负载提交：\n\n*   **存储过程：** 允许保存可接受和返回用户提供参数的一组 SQL\
  \ 语句。\n*   **`sp_executesql`：** 允许执行可能包含用户提供参数的 SQL 语句或 SQL 批处理，而不保存该 SQL 语句或批处理。\n\
  *   **准备/执行模型：** 允许 SQL 客户端请求生成一个查询计划，该计划可以在后续使用不同参数值执行查询时重用，而无需在 SQL Server 中保存\
  \ SQL 语句。\n\n例如，前面显示的 `SELECT` 语句可以使用存储过程显式地参数化，如下所示：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.BasicSalesInfo'))\
  \ IS NOT NULL\n    DROP PROC dbo.BasicSalesInfo;\nGO\nCREATE PROC dbo.BasicSalesInfo\n\
  \    @ProductID INT,\n    @CustomerID INT\nAS\nSELECT soh.SalesOrderNumber,\n  \
  \     soh.OrderDate,\n       sod.OrderQty,\n       sod.LineTotal\nFROM Sales.SalesOrderHeader\
  \ AS soh\nJOIN Sales.SalesOrderDetail AS sod\nON soh.SalesOrderID = sod.SalesOrderID\n\
  WHERE soh.CustomerID = @CustomerID\n  AND sod.ProductID = @ProductID;\n```\n\n\n\
  \n"
- "# 第 15 章 ■ 执行计划缓存行为\n\n### 即席工作负载的计划可重用性\n\n存储过程中包含的`SELECT`语句的计划将嵌入参数（`@ProductID`和`@CustomerID`），而非变量值。我很快会更详细地介绍这些方法。\n\
  \n当查询作为即席工作负载提交时，`SQL Server`会生成执行计划并将该计划存储在缓存中。如果相同的即席查询被重新提交，则可以重用该计划。由于没有参数，硬编码的值会作为计划的一部分存储。为了能从缓存中重用计划，`T-SQL`文本必须完全匹配。这包括所有空格、回车符以及随计划提供的任何值。如果其中任何一项发生变化，计划就无法重用。\n\
  \n为了理解这一点，考虑一下你之前使用过的即席查询：\n\n```sql\nSELECT soh.SalesOrderNumber,\n       soh.OrderDate,\n\
  \       sod.OrderQty,\n       sod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\n\
  JOIN Sales.SalesOrderDetail AS sod\n   ON soh.SalesOrderID = sod.SalesOrderID\n\
  WHERE soh.CustomerID = 29690\n  AND sod.ProductID = 711;\n```\n\n为这个即席查询生成的执行计划基于查询的确切文本，包括注释、大小写、尾随空格和硬回车。要从`sys.dm_exec_cached_plans`中提取信息，必须使用确切的文本。\n\
  \n```sql\nSELECT c.usecounts,\n       c.cacheobjtype,\n       c.objtype\nFROM sys.dm_exec_cached_plans\
  \ c\nCROSS APPLY sys.dm_exec_sql_text(c.plan_handle) t\nWHERE t.text = 'SELECT soh.SalesOrderNumber,\n\
  \       soh.OrderDate,\n       sod.OrderQty,\n       sod.LineTotal\nFROM Sales.SalesOrderHeader\
  \ AS soh\nJOIN Sales.SalesOrderDetail AS sod\n   ON soh.SalesOrderID = sod.SalesOrderID\n\
  WHERE soh.CustomerID = 29690\n  AND sod.ProductID = 711;';\n```\n\n图 15-1 显示了`sys.dm_exec_cached_plans`的输出。\n\
  \n图 15-1. `sys.dm_exec_cached_plans` 输出\n\n从图 15-1 可以看出，一个已编译的计划已为前述即席查询生成并保存在过程缓存中。为了找到特定查询，我在`WHERE`子句中使用了查询文本本身。可以看到，这个计划到目前为止已被使用了一次（`usecounts`\
  \ = 1）。如果重新执行这个即席查询，`SQL Server`会从过程缓存中重用现有的可执行计划，如图 15-2 所示。\n\n图 15-2. 从过程缓存中重用可执行计划\n\
  \n在图 15-2 中，您可以看到前述查询的可执行计划的`usecounts`值已增加到 2，这证实该查询的现有计划已被重用。如果此查询被重复执行，现有计划每次都将会被重用。\n\
  \n由于为前述查询生成的计划包含了筛选条件值，该计划的可重用性仅限于使用相同的筛选条件值。重新执行查询，但将`soh.CustomerID`更改为 29500。\n\
  \n```sql\nSELECT soh.SalesOrderNumber,\n       soh.OrderDate,\n       sod.OrderQty,\n\
  \       sod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail\
  \ AS sod\n   ON soh.SalesOrderID = sod.SalesOrderID\nWHERE soh.CustomerID = 29500\n\
  \  AND sod.ProductID = 711;\n```\n\n无法重用现有计划，如果原样重新运行`sys.dm_exec_cached_plans`，您会看到执行计数并未增加（图\
  \ 15-3）。\n\n图 15-3. `sys.dm_exec_cached_plans` 显示现有计划未被重用\n\n相反，我将调整查询`sys.dm_exec_cached_plans`的方式。\n\
  \n```sql\nSELECT c.usecounts,\n       c.cacheobjtype,\n       c.objtype,\n     \
  \  t.text,\n       c.plan_handle\nFROM sys.dm_exec_cached_plans c\nCROSS APPLY sys.dm_exec_sql_text(c.plan_handle)\
  \ t\nWHERE t.text LIKE 'SELECT soh.SalesOrderNumber,\n       soh.OrderDate,\n  \
  \     sod.OrderQty,\n       sod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\n\
  JOIN Sales.SalesOrderDetail AS sod\n   ON soh.SalesOrderID = sod.SalesOrderID%';\n\
  ```\n\n您可以在图 15-4 中看到此查询的输出。\n\n图 15-4. `sys.dm_exec_cached_plans` 显示现有计划无法重用\n\n\
  从图 15-4 的`sys.dm_exec_cached_plans`输出中，您可以看到该查询的先前计划未被重用；相应的`usecounts`值保持在旧的 2。没有重用现有计划，而是为该查询生成了一个新计划，并以新的`plan_handle`保存在过程缓存中。如果使用不同的筛选条件值重复执行此即席查询，则每次都会生成一个新的执行计划。此即席查询对执行计划的低效重用，通过消耗额外的`CPU`周期来重新生成计划，从而增加了`CPU`的负载。\n\
  \n#### 简单参数化\n\n总结一下，即席计划缓存使用语句级缓存，并且仅限于精确的文本匹配。如果即席查询不复杂，`SQL Server`可以隐式地参数化查询，以通过称为“简单参数化”的功能提高计划的可重用性。用于简单参数化的“简单查询”定义仅限于相当简单的情况，例如仅包含一个表的即席查询。如前例所示，大多数需要连接操作的查询无法被自动参数化。\n\
  \n## 针对即席工作负载进行优化\n\n如果您的服务器将主要支持即席查询，则有可能实现一定程度的性能改进。有一个服务器选项称为`optimize for ad\
  \ hoc workloads`（针对即席工作负载进行优化）。为服务器启用此选项会改变引擎处理即席查询的方式。不是在第一次调用查询时保存其完整的已编译计划，而是存储一个已编译计划存根。该存根没有关联完整的执行计划，从而节省了存储空间以及将其保存到缓存所需的时间。此选项可以在不重新启动服务器的情况下启用。\n\
  \n```sql\nEXEC sp_configure\n'optimize for ad hoc workloads',\n1;\nGO\nRECONFIGURE;\n\
  ```\n\n更改选项后，刷新缓存，然后重新运行即席查询。修改对`sys.dm_exec_cached_plans`的查询，使其包含`size_in_bytes`列；然后运行它以查看图\
  \ 15-5 中的结果。\n\n图 15-5. `sys.dm_exec_cached_plans` 显示已编译计划存根\n\n图 15-5 在`cacheobjtype`列中显示，缓存中的新对象是一个已编译计划存根。与完整的已编译计划相比，可以为更多的查询创建存根，对服务器的影响更小。但是，当下一次执行即席查询时，会创建一个完整的已编译计划。为了查看这一过程，再运行一次查询，并检查`sys.dm_exec_cached_plans`中的结果，如图\
  \ 15-6 所示。\n\n图 15-6. 已编译计划存根已变为已编译计划\n\n检查`cacheobjtype`值。它已从`Compiled Plan Stub`更改为`Compiled\
  \ Plan`。最后，要查看存根和完整计划之间的真正区别，请检查图 15-5 和图 15-6 中的`size_in_bytes`列。大小从存根中的 352 变为完整计划中的\
  \ 65536。这精确地显示了在处理大量即席查询时可节省的空间。在继续之前，请确保禁用`optimize for ad hoc workloads`。\n\n\
  ```sql\nEXEC sp_configure\n'optimize for ad hoc workloads',\n0;\nGO\nRECONFIGURE;\n\
  ```\n\n\n\n就个人而言，我认为在几乎任何系统上实施这一点都几乎没有坏处。与所有建议一样，您应该进行测试，以确保您的系统不是例外。但是，当第二次调用计划时将其写入内存的成本，与您通过不存储那些只会使用一次的计划所看到的总体内存节省相比，是极其微不足道的。在我所有的测试和经验中，这纯粹是有益的，几乎没有缺点。\n\
  \n#### 简单参数化\n\n当提交一个即席查询时，SQL Server 会分析查询以确定传入文本的哪些部分可能是参数。它会查看即席查询的可变部分，以确定是否可以安全地自动参数化它们，并在查询中使用参数（而不是可变部分），这样查询计划就可以独立于可变值。这种自动将查询的可变部分转换为参数的特性，即使没有显式参数化（使用预处理工作负载技术），也被称为\
  \ `简单参数化`。\n\n在简单参数化过程中，SQL Server 确保如果即席查询被转换为参数化模板，参数值的更改不会广泛改变计划需求。在确定简单参数化是安全的之后，SQL\
  \ Server 为即席查询创建一个参数化模板，并将参数化计划保存在过程缓存中。\n\n参数化计划不是基于查询中使用的动态值。由于计划是为参数化模板生成的，因此当使用不同的值重新执行即席查询时，可以重用该计划。\n\
  \n为了理解 SQL Server 的简单参数化特性，请考虑以下查询：\n```sql\nSELECT a.*\nFROM Person.Address AS\
  \ a\nWHERE a.AddressID = 42;\n```\n当提交此即席查询时，SQL Server 可以按原样处理该查询以创建计划。然而，在执行查询之前，SQL\
  \ Server 会尝试确定是否可以安全地参数化。在确定查询的可变部分可以在不影响查询基本结构的情况下被参数化后，SQL Server 会对查询进行参数化，并为参数化查询生成一个计划。您可以从图\
  \ 15-7 所示的 `sys.dm_exec_cached_plans` 输出中观察到这一点。\n\n**图 15-7.** `sys.dm_exec_cached_plans`\
  \ 输出，显示自动参数化计划\n\n![](img/index-293_1.jpg)\n![](img/index-293_2.jpg)\n\n该参数化查询的可执行计划的\
  \ `usecounts` 恰当地将重用次数表示为 1。另请注意，自动参数化可执行计划的 `objtype` 不再是 `Adhoc`；它反映了该计划是针对参数化查询的这一事实，即\
  \ `Prepared`。\n\n原始的即席查询，即使没有执行，也会被编译以创建简单参数化所需的查询树。即席查询的编译计划将保存在计划缓存中。但在创建即席查询的可执行计划之前，SQL\
  \ Server 已经发现可以安全地自动参数化，因此为了进一步处理而自动参数化了查询。这在图 15-7 中作为突出显示的行可见。\n\n由于此即席查询已被自动参数化，如果您使用不同的可变部分值重新执行\
  \ `simpleparameterization.sql`，SQL Server 将重用现有的执行计划。\n```sql\nSELECT a.*\nFROM\
  \ Person.Address AS a\nWHERE a.[AddressID] = 52; --先前的值是 42\n```\n图 15-8 显示了 `sys.dm_exec_cached_plans`\
  \ 的输出。\n\n**图 15-8.** `sys.dm_exec_cached_plans` 输出，显示自动参数化计划的重用\n\n从图 15-8 可以看出，尽管为这个使用\
  \ `AddressId` 值 52 的即席查询生成了一个新计划，但现有的 `Prepared` 计划被重用了，这由相应的 `usecounts` 值增加到 2\
  \ 表明。即席查询可以使用不同的筛选条件值反复重新执行，重用现有的执行计划——尽管两个查询的原始文本并不匹配。两者的参数化查询将是相同的，因此它被重用了。\n\n\
  对于缓存执行计划的参数化查询，还有另一个方面需要注意。在图 15-7 中，观察参数化查询的主体与提交的即席查询的主体并不完全匹配。例如，在即席查询中，任何对象上都没有方括号。\n\
  \n在意识到即席查询可以安全地自动参数化后，SQL Server 会选择一个模板来代替查询的确切文本。\n\n为了理解这一点的重要性，请考虑以下查询：\n```sql\n\
  SELECT a.*\nFROM Person.Address AS a\nWHERE a.AddressID BETWEEN 40 AND 60;\n```\n\
  图 15-9 显示了 `sys.dm_exec_cached_plans` 的输出。\n\n**图 15-9.** `sys.dm_exec_cached_plans`\
  \ 输出，显示使用模板进行查询简单参数化\n\n![](img/index-294_1.png)\n\n从图 15-9 可以看出，SQL Server 对查询进行了简化处理，并用一对\
  \ `>=` 和 `<=` 运算符（它们等效于 `BETWEEN` 运算符）进行了替换。然后参数化步骤再次修改了查询。这意味着，如果不是重新提交前面的使用 `BETWEEN`\
  \ 子句的即席查询，而是提交一个使用一对 `>=` 和 `<=` 的类似查询，SQL Server 将能够重用现有的执行计划。为了确认此行为，让我们按如下方式修改即席查询：\n\
  ```sql\nSELECT a.*\nFROM Person.Address AS a\nWHERE a.AddressID >= 40\n  AND a.AddressID\
  \ <= 60;\n```\n图 15-10 显示了 `sys.dm_exec_cached_plans` 的输出。\n\n**图 15-10.** `sys.dm_exec_cached_plans`\
  \ 输出，显示自动参数化计划的重用\n\n从图 15-10 可以看出，即使该查询在语法上与之前执行的查询不同，现有计划也被重用了。SQL Server 生成的自动参数化计划允许在查询使用不同的可变值重新提交时重用现有计划，也适用于具有相同模板形式的查询。\n\
  \n#### 简单参数化限制\n\nSQL Server 在简单参数化期间非常保守，因为糟糕计划的成本可能远远超过生成新计划的成本。这种保守的方法可以防止 SQL\
  \ Server 创建不安全的自动参数化计划。因此，简单参数化仅限于相当简单的情况，例如仅包含一个表的即席查询。包含两个（或多个）表之间联接操作的即席查询（如“即席工作负载的计划可重用性”部分前面所示）不被认为是简单参数化安全的。\n\
  \n在可扩展的系统中，不要依赖简单参数化来实现计划可重用性。SQL Server 的简单参数化特性会对哪些变量和常量可以参数化进行有根据的猜测。您不应该依赖 SQL\
  \ Server 进行简单参数化，而应该在构建应用程序时以编程方式明确指定它。\n\n#### 强制参数化\n\n\n\n## 第 15 章 ■ 执行计划缓存行为\n\
  \n如果你正在处理的系统主要由即席查询组成，你可能希望尝试增加可接受参数化的查询数量。你可以修改数据库以尝试强制所有查询实现参数化，就像简单参数化一样，但这存在某些限制。\n\
  \n要实现这一点，你需要使用 `ALTER DATABASE` 将数据库选项 `PARAMETERIZATION` 更改为 `FORCED`，如下所示：`ALTER\
  \ DATABASE AdventureWorks2012 SET PARAMETERIZATION FORCED;`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-295_1.jpg)\n\n![](img/index-295_2.jpg)\n\n但是，如果你的查询稍微复杂一些，它就不会应用简单参数化。\n\
  \n```sql\nSELECT ea.EmailAddress,\n       e.BirthDate,\n       a.City\nFROM Person.Person\
  \ AS p\nJOIN HumanResources.Employee AS e\n    ON p.BusinessEntityID = e.BusinessEntityID\n\
  JOIN Person.BusinessEntityAddress AS bea\n    ON e.BusinessEntityID = bea.BusinessEntityID\n\
  JOIN Person.Address AS a\n    ON bea.AddressID = a.AddressID\nJOIN Person.StateProvince\
  \ AS sp\n    ON a.StateProvinceID = sp.StateProvinceID\nJOIN Person.EmailAddress\
  \ AS ea\n    ON p.BusinessEntityID = ea.BusinessEntityID\nWHERE ea.EmailAddress\
  \ LIKE 'david%'\n  AND sp.StateProvinceCode = 'WA';\n```\n\n当你运行此查询时，简单参数化并未被应用，正如你在图\
  \ 15-11. 中所看到的那样。\n\n**图 15-11.** 一个更复杂的查询不会被参数化\n\n在 `sys.dm_exec_cached_plans`\
  \ 的输出中看不到任何预编译计划。但如果你使用之前的脚本将 `PARAMETERIZATION` 设置为 `FORCED`，清空缓存，然后重新运行查询，`sys.dm_exec_cached_plans`\
  \ 的输出会有所变化，如图 15-12 所示。\n\n**图 15-12.** 强制参数化改变了执行计划\n\n现在，在第三行可以看到一个预编译计划。然而，只提供了一个参数，即\
  \ `@0 varchar(8000)`。\n\n如果你从 `sys.dm_exec_querytext` 获取预编译计划的完整文本并进行格式化，它看起来像这样：`(@0\
  \ varchar(8000))`\n\n```sql\nSELECT ea.EmailAddress,\n       e.BirthDate,\n    \
  \   a.City\nFROM Person.Person AS p\nJOIN HumanResources.Employee AS e\n    ON p.BusinessEntityID\
  \ = e.BusinessEntityID\nJOIN Person.BusinessEntityAddress AS bea\n    ON e.BusinessEntityID\
  \ = bea.BusinessEntityID\nJOIN Person.Address AS a\n    ON bea.AddressID = a.AddressID\n\
  JOIN Person.StateProvince AS sp\n    ON a.StateProvinceID = sp.StateProvinceID\n\
  JOIN Person.EmailAddress AS ea\n    ON p.BusinessEntityID = ea.BusinessEntityID\n\
  WHERE ea.EmailAddress LIKE 'david%'\n  AND sp.StateProvinceCode = @0\n```\n\n由于其限制，强制参数化无法为字符串\
  \ 'david%' 进行替换，但成功替换了字符串 'WA'。值得注意的是，变量被声明为完整的 8,000 长度 `VARCHAR`，而不是像 `Person.StateProvince`\
  \ 表中实际列那样的三字符 `NCHAR`。虽然你有了一个参数，但这可能导致隐式数据转换，从而阻止索引的使用。\n\n在你开始使用强制参数化之前，以下限制列表可能为你提供信息，帮助你决定强制参数化是否适用于你的数据库。（这是一个部分列表；完整列表请查阅在线手册。）\n\
  \n- `INSERT ... EXECUTE` 查询\n- 存储过程、触发器和用户定义函数内部的语句，因为它们已有执行计划\n- 客户端预编译语句（本章稍后将详细介绍）\n\
  - 使用查询提示 `RECOMPILE` 的查询\n- `LIKE` 语句中使用的模式和转义子句参数（如前所示）\n\n这让你对强制参数化所面临的限制类型有所了解。强制参数化真正具有潜在帮助的情况是，如果你正因即席查询而遭受大量的编译和重编译。任何其他负载都不会从使用强制参数化中受益。\n\
  \n\n\n在继续之前，请将数据库更改回 `SIMPLE PARAMETERIZATION`。\n\n```sql\nALTER DATABASE AdventureWorks2012\
  \ SET PARAMETERIZATION SIMPLE;\n```\n\n### 预准备的工作负载的计划可重用性\n\n将查询定义为预准备的工作负载，可以显式地将查询的可变部分参数化。这使得\
  \ SQL Server 能够生成一个不绑定于查询可变部分的查询计划，并将可变部分隔离在独立的执行上下文中。正如你在上一节所见，SQL Server 支持三种提交预准备工作负载的技术。\n\
  \n-   存储过程\n-   `sp_executesql`\n-   准备/执行模型\n\n在接下来的章节中，我将更深入地介绍每种技术，并指出参数化执行计划可能在何处引发问题。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 15 章 ■ 执行计划缓存行为\n\n####\
  \ 存储过程\n\n使用存储过程是提高计划缓存效率的标准技术。当存储过程在执行时编译（对于原生编译存储过程则不同，将在第 22 章介绍），会为存储过程中的每条\
  \ SQL 语句生成一个计划。为存储过程生成的执行计划可以在该存储过程使用不同参数值重新执行时被重用。\n\n除了检查 `sys.dm_exec_cached_plans`，你还可以使用扩展事件工具跟踪存储过程的执行计划缓存。扩展事件提供了表\
  \ `15-2` 中列出的事件来跟踪存储过程的计划缓存。\n\n**表 15-2.** 用于分析存储过程计划缓存的事件\n| 事件类别 | **事件** |\n\
  | :--- | :--- |\n| `sp_cache_hit` | 在缓存中找到了计划。 |\n| `sp_cache_miss` | 在缓存中未找到计划。\
  \ |\n| `sp_cache_insert` | 当计划被添加到缓存时触发该事件。 |\n| `sp_cache_remove` | 当计划被从缓存中移除时触发该事件。\
  \ |\n\n要使用跟踪事件跟踪存储过程的计划缓存，你可以使用这些事件以及表 `15-3` 中显示的其他存储过程事件和数据列。\n\n**表 15-3.** 用于分析存储过程计划缓存的数据列\n\
  | 事件类别 | **事件** |\n| :--- | :--- |\n| `SP:CacheHit` | `EventClass` |\n| `SP:CacheMiss`\
  \ | `TextData` |\n| `SP:Completed` | `LoginName` |\n| `SP:ExecContextHit` | `SPID`\
  \ |\n| `SP:Starting` | `StartTime` |\n| `SP:StmtCompleted` | |\n\n为了理解存储过程如何能改进计划缓存，让我们重新检查之前创建的名为\
  \ `BasicSalesInfo` 的过程。为清晰起见，此处重复该过程：\n\n```sql\nIF (SELECT OBJECT_ID('BasicSalesInfo'))\
  \ IS NOT NULL\n    DROP PROC dbo.BasicSalesInfo ;\nGO\nCREATE PROC dbo.BasicSalesInfo\n\
  \    @ProductID INT,\n    @CustomerID INT\nAS\nSELECT soh.SalesOrderNumber,\n  \
  \     soh.OrderDate,\n       sod.OrderQty,\n       sod.LineTotal\nFROM Sales.SalesOrderHeader\
  \ AS soh\nJOIN Sales.SalesOrderDetail AS sod\n    ON soh.SalesOrderID = sod.SalesOrderID\n\
  WHERE soh.CustomerID = @CustomerID\n    AND sod.ProductID = @ProductID;\n```\n\n\
  要检索 `soh.Customerld = 29690` 和 `sod.ProductId=711` 的结果集，你可以像这样执行存储过程：\n\n```sql\n\
  EXEC dbo.BasicSalesInfo\n    @CustomerID = 29690,\n    @ProductID = 711;\n```\n\n\
  图 `15-13` 显示了 `sys.dm_exec_cached_plans` 的输出。\n\n**图 15-13.** `sys.dm_exec_cached_plans`\
  \ 输出，显示存储过程的计划缓存\n\n从图 `15-13` 可以看出，为该存储过程生成并缓存了一个类型为 `Proc` 的已编译计划。由于该存储过程只执行了一次，可执行计划的\
  \ `usecounts` 值为 1。\n\n图 `15-14` 显示了此存储过程执行的扩展事件输出。\n\n**图 15-14.** 扩展事件输出，显示该存储过程的计划不易在缓存中找到\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\n"
- "# 第 15 章：执行计划缓存行为\n\n![](img/index-299_3.jpg)\n\n从扩展事件的输出中，您可以看到存储过程的计划未在缓存中找到。\n\
  \n当首次执行存储过程时，SQL Server 会查找过程缓存，但未能找到该过程 `BasicSalesInfo` 的任何缓存条目，这导致了一个 `sp_cache_miss`\
  \ 事件。在未找到缓存计划后，SQL Server 会安排编译该存储过程。随后，SQL Server 生成并保存计划，然后继续执行该存储过程。您可以在 `sp_cache_insert`\
  \ 事件中看到这一点。\n\n`图 15-15: sp_cache_hit 扩展事件的详细信息`\n\n如果重新执行此存储过程以检索 `@Productld =\
  \ 777` 的结果集，则会重用现有计划，如图 15-16 中的 `sys.dm_exec_cached_plans` 输出所示。\n\n`图 15-16: 显示存储过程计划重用的\
  \ sys.dm_exec_cached_plans 输出`\n\n```sql\nEXEC dbo.BasicSalesInfo\n    @CustomerID\
  \ = 29690,\n    @ProductID = 777;\n```\n\n您也可以从扩展事件的输出中确认执行计划的重用，如图 15-17 所示。\n\n\
  `图 15-17: 显示存储过程计划重用的 Profiler 跟踪输出`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n从扩展事件的输出中，您可以看到在过程缓存中找到了现有计划。在搜索缓存后，SQL Server 找到了存储过程 `BasicSalesInfo` 的可执行计划，这导致了一个\
  \ `sp_cache_hit` 事件。一旦找到现有的执行计划，SQL 就会重用该计划来执行存储过程。\n\n一个值得注意的地方是：之前的 `sp_cache_miss`\
  \ 事件是针对调用该过程的 SQL 批处理。由于参数值的更改，该语句未在缓存中找到，但该过程的执行计划却找到了。\n\n这种看似“额外”的缓存未命中事件可能会引起混淆。\n\
  \n存储过程的这些其他方面也值得考虑：\n\n-   存储过程首次执行时会被编译。\n-   存储过程具有其他性能优势，例如减少网络流量。\n-   存储过程具有额外的好处，例如数据隔离。\n\
  \n##### 存储过程首次执行时编译\n\n存储过程的执行计划在首次执行时生成。当创建存储过程时，它仅被解析并保存在数据库中。在创建存储过程期间不执行规范化与优化过程。这允许在创建存储过程所访问的所有对象之前创建存储过程。例如，即使存储过程中引用的表\
  \ `NotHere` 不存在，您也可以创建以下存储过程：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.MyNewProc'))\
  \ IS NOT NULL\n    DROP PROCEDURE dbo.MyNewProc\nGO\n\nCREATE PROCEDURE dbo.MyNewProc\n\
  AS\n    SELECT MyID\n    FROM dbo.NotHere; --Table no_tl doesn't exist\n```\n\n\
  该存储过程将成功创建，因为在存储过程创建期间不执行将引用对象绑定到查询树（由命令解析器在存储过程执行期间生成）的规范化过程。如果到那时表 `NotHere` 还未创建，该存储过程将在首次执行时报告错误，因为存储过程在首次执行时才会被编译。\n\
  \n##### 存储过程的其他性能优势\n\n除了通过执行计划可重用性来提高性能外，存储过程还提供以下性能优势：\n\n-   `业务逻辑贴近数据`：对存储在数据库中的数据执行大量操作的业务逻辑部分应置于存储过程中，因为\
  \ SQL Server 引擎对于关系和集合论操作极其强大。\n-   `减少网络流量`：数据库应用程序仅通过网络发送存储过程的名称和参数值。只有处理后的结果集才会返回给应用程序。中间数据不需要在应用程序和数据库之间来回传递。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n##### 存储过程的额外好处\n\n存储过程提供的其他一些好处如下：\n\
  \n-   `应用程序与数据结构更改隔离`：如果所有关键的数据访问都通过存储过程进行，那么当数据库架构更改时，可以重新创建存储过程而不影响通过这些存储过程访问数据的应用程序代码。实际上，访问数据库的应用程序甚至无需停止。\n\
  -   `管理点单一`：在存储过程中实现的所有业务逻辑都作为数据库的一部分进行维护，并可以在数据库本身上进行集中管理。当然，这个好处是相对的，取决于你问的是谁。要想获得不同的意见，请咨询一位非\
  \ DBA 人员！\n-   `可以增强安全性`：可以限制用户对数据库表的权限，并且只能通过存储过程中实现的标准业务逻辑进行访问。例如，如果您希望限制用户 `UserOne`\
  \ 从表 `RestrictedAccess` 中物理删除行，并且只允许通过存储过程 `MarkDeleted` 将行的状态设置为 'Deleted' 来标记为虚拟删除，那么您可以执行如下\
  \ `DENY` 和 `GRANT` 命令：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.RestrictedAccess'))\
  \ IS NOT NULL\n    DROP TABLE dbo.RestrictedAccess;\nGO\n\nCREATE TABLE dbo.RestrictedAccess\
  \ (ID INT, Status VARCHAR(7));\nINSERT INTO dbo.RestrictedAccess VALUES (1,'New');\n\
  GO\n\nIF (SELECT OBJECT_ID('dbo.MarkDeleted')) IS NOT NULL\n    DROP PROCEDURE dbo.MarkDeleted;\n\
  GO\n\nCREATE PROCEDURE dbo.MarkDeleted @ID INT\nAS\n    UPDATE dbo.RestrictedAccess\n\
  \    SET Status = 'Deleted'\n    WHERE ID = @ID;\nGO\n\n--Prevent user u1 from deleting\
  \ rows\nDENY DELETE ON dbo.RestrictedAccess TO UserOne;\n\n--Allow user u1 to mark\
  \ a row as 'deleted'\nGRANT EXECUTE ON dbo.MarkDeleted TO UserOne;\n```\n\n这里假设用户\
  \ `UserOne` 存在。请注意，如果存储过程 `MarkDeleted` 中的查询是作为字符串 (`@sql`) 动态构建的，如下所示，那么授予存储过程的权限不会授予该查询任何权限，因为动态查询不被视为存储过程的一部分：\n\
  \n```sql\nCREATE PROCEDURE dbo.MarkDeleted @ID INT\nAS\n    DECLARE @SQL NVARCHAR(MAX);\n\
  \    SET @SQL = 'UPDATE dbo.RestrictedAccess\n                SET Status = ''Deleted''\n\
  \                WHERE ID = ' + CAST(@ID AS NVARCHAR(10));\n    EXEC sys.sp_executesql\
  \ @SQL;\nGO\n\nGRANT EXECUTE ON dbo.MarkDeleted TO UserOne;\n```\n\n因此，用户 `UserOne`\
  \ 将无法使用存储过程 `MarkDeleted` 将行标记为 'Deleted'。\n\n（我将在下一章介绍在存储过程中使用动态查询的各个方面。）由于存储过程保存为数据库对象，它们会给数据库管理增加维护开销。很多时候，您可能只需要从应用程序中执行一个或几个查询。如果这些单一查询频繁执行，您应该致力于重用它们的执行计划以提高性能。但为这些单个的单一查询创建存储过程，会向数据库添加大量的存储过程，从而显著增加数据库管理开销。为了避免使用存储过程的维护开销，同时又能获得计划重用的好处，请使用系统存储过程\
  \ `sp_executesql` 将单一查询作为准备好的工作负载提交。\n\n`sp_executesql`\n\n\n\n#### `sp_executesql`\
  \ 与执行计划缓存\n\n`sp_executesql` 是一个系统存储过程，它提供了一种将一个或多个查询作为预编译负载提交的机制。它允许查询的可变部分被显式地参数化，因此可以提供与存储过程一样有效的执行计划可重用性。`BasicSalesInfo`\
  \ 的 `SELECT` 语句可以通过 `sp_executesql` 提交，如下所示：\n\n```sql\nDECLARE @query NVARCHAR(MAX),\n\
  @paramlist NVARCHAR(MAX);\n\nSET @query = N'SELECT soh.SalesOrderNumber ,soh.OrderDate\
  \ ,sod.OrderQty ,sod.LineTotal FROM\nSales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail\
  \ AS sod ON soh.SalesOrderID = sod.SalesOrderID WHERE\nsoh.CustomerID = @CustomerID\n\
  AND sod.ProductID = @ProductID';\n\nSET @paramlist = N'@CustomerID INT, @ProductID\
  \ INT';\n\nEXEC sp_executesql @query,@paramlist,@CustomerID = 29690,@ProductID =\
  \ 711;\n```\n\n请注意，传递给 `sp_executesql` 存储过程的字符串被声明为 `NVARCHAR`，并且它们是以 `N` 为前缀构建的。这是必需的，因为\
  \ `sp_executesql` 使用 Unicode 字符串作为输入参数。\n\n`sys.dm_exec_cached_plans` 的输出如下所示（见图\
  \ 15-18）：\n\n```sql\nSELECT c.usecounts,\nc.cacheobjtype,\nc.objtype,\nt.text\n\
  FROM sys.dm_exec_cached_plans c\nCROSS APPLY sys.dm_exec_sql_text(c.plan_handle)\
  \ t\nWHERE text LIKE '(@CustomerID%';\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-303_1.jpg)\n\n![](img/index-303_2.jpg)\n\n![](img/index-303_3.jpg)\n\
  \n**图 15-18.** `sys.dm_exec_cached_plans` 输出，显示使用 `sp_executesql` 生成的参数化计划\n\n在图\
  \ 15-18 中，你可以看到该计划是为通过 `sp_executesql` 提交的查询的参数化部分生成的。由于该计划不绑定于查询的可变部分，如果使用不同的参数值（`d.ProductID=777`）重新提交此查询，则可以重用现有的执行计划，如下所示：\n\
  \n```sql\nEXEC sp_executesql @query,@paramlist,@CustomerID = 29690,@ProductID =\
  \ 777;\n```\n\n图 15-19 显示了 `sys.dm_exec_cached_plans` 的输出。\n\n**图 15-19.** `sys.dm_exec_cached_plans`\
  \ 输出，显示重用使用 `sp_executesql` 生成的参数化计划\n\n从图 15-19 可以看出，当使用不同的变量值重新提交查询时，重用了现有计划（第\
  \ 2 行计划上的 `usecounts` 为 2）。如果使用可变部分的不同值多次重新提交此查询，则可以重用现有的执行计划，而无需重新生成新的执行计划。\n\n\
  为其创建计划的查询（`text` 列）与通过 `sp_executesql` 提交的参数化查询的确本文本字符串相匹配。因此，如果从应用程序的不同部分提交相同的查询，请确保在所有位置使用相同的文本字符串。例如，如果使用查询字符串中的微小修改（例如小写字母而不是大写字母）重新提交相同的查询，则不会重用现有计划，而是创建一个新计划，如图\
  \ 15-20 的 `sys.dm_exec_cached_plans` 输出所示。\n\n```sql\nSET @query = N'SELECT soh.SalesOrderNumber\
  \ ,soh.OrderDate ,sod.OrderQty ,sod.LineTotal FROM\nSales.SalesOrderHeader AS soh\
  \ JOIN Sales.SalesOrderDetail AS sod ON soh.SalesOrderID = sod.\nSalesOrderID where\
  \ soh.CustomerID = @CustomerID AND sod.ProductID = @ProductID' ;\n```\n\n**图 15-20.**\
  \ `sys.dm_exec_cached_plans` 输出，显示使用 `sp_executesql` 生成的计划的敏感性\n\n另一种查看缓存中有两个不同计划的方法是使用其他动态管理对象来查看缓存中计划的属性。\n\
  \n```sql\nSELECT decp.usecounts,\ndecp.cacheobjtype,\ndecp.objtype,\ndest.text,\n\
  deqs.creation_time,\ndeqs.execution_count,\ndeqs.query_hash,\ndeqs.query_plan_hash\n\
  FROM sys.dm_exec_cached_plans AS decp\nCROSS APPLY sys.dm_exec_sql_text(decp.plan_handle)\
  \ AS dest\nJOIN sys.dm_exec_query_stats AS deqs\nON decp.plan_handle = deqs.plan_handle\n\
  WHERE dest.text LIKE '(@CustomerID INT, @ProductID INT)%' ;\n```\n\n图 15-21 显示了此查询的结果。\n\
  \n**图 15-21.** 来自 `sys.dm_exec_query_stats` 的额外输出\n\n`sys.dm_exec_query_stats` 的输出显示，该查询的两个版本具有不同的\
  \ `creation_time` 值。更有趣的是，它们具有相同的 `query_hash` 但不同的 `query_plan_hash`（关于哈希值将在该部分后面详述）。所有这些都表明，更改大小写导致缓存中存储了不同的执行计划。\n\
  \n通常，使用 `sp_executesql` 显式参数化查询，以使它们在使用可变部分的不同值重新提交时其执行计划可重用。这提供了可重用计划的性能优势，而无需管理任何持久性对象（如存储过程所需的）。此功能通过\
  \ `SQLExecDirect` 和 `ICommandWithParameters` 分别由 `ODBC` 和 `OLEDB` 提供。\n\n像 .NET\
  \ 开发人员或 [ADO.NET](http://ado.net/)（ADO 2.7 或更新版本）用户一样，你可以使用 ADO Command 和 Parameters\
  \ 提交前面的 `SELECT` 语句。如果你将 ADO Command 的 `Prepared` 属性设置为 `FALSE` 并使用 ADO Command（`'SELECT\
  \ * FROM \"Order Details\" d, Orders o WHERE d.OrderID=o.OrderID and d.ProductID=?'`）与\
  \ ADO Parameters，那么 [.NET](http://ado.net/) 将使用 `sp_executesql` 发送 `SELECT` 语句。大多数对象关系映射工具（如\
  \ `nHibernate` 或 `Entity Framework`）也具有允许准备语句和使用参数的机制。\n\n除了参数之外，`sp_executesql`\
  \ 每次重新执行查询时都会通过网络发送整个查询字符串。你可以通过使用 `ODBC` 和 `OLEDB`（或 `OLEDB .NET`）的准备/执行模型来避免这种情况。\n\
  \n##### 准备/执行模型\n\n`ODBC` 和 `OLEDB` 提供了一个准备/执行模型来将查询作为预编译负载提交。与 `sp_executesql`\
  \ 类似，此模型允许显式参数化查询的可变部分。准备阶段允许 SQL Server 为查询生成执行计划，并将该执行计划的句柄返回给应用程序。此执行计划句柄由执行阶段用于使用不同的参数值执行查询。此模型只能用于通过\
  \ `ODBC` 或 `OLEDB` 提交查询，不能在 SQL Server 内部使用——存储过程内的查询无法使用此模型执行。\n\nSQL Server `ODBC`\
  \ 驱动程序提供了 `SQLPrepare` 和 `SQLExecute` API 来支持准备/执行模型。SQL Server `OLEDB` 提供程序通过 `ICommandPrepare`\
  \ 接口公开此模型。`ADO.NET` 的 [OLEDB .NET](http://ado.net/) 提供程序的行为类似。\n\n> **注意** 有关如何在数据库应用程序中使用准备/执行模型的详细说明，请参阅\
  \ MSDN 文章“Preparing SQL Statements”[(http://bit.ly/MskJcG](http://bit.ly/MskJcG))。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-305_1.jpg)\n\
  \n##### 查询计划哈希与查询哈希\n\n\n\n"
- '# 第 15 章 ■ 执行计划缓存行为


  自 SQL Server 2008 起，引入了围绕执行计划和缓存的新功能，称为 `query plan hash` 和 `query hash`。它们是二进制对象，通过对查询或查询计划应用某种算法来生成二进制哈希值。这对于开发中的一个常见实践——*复制和粘贴*——非常有用。你会发现，通用的模式和实践会在你的代码中反复出现。在最理想的情况下，这是一件好事，因为你会看到最佳类型的查询、联接、基于集合的操作等，根据需要从一个存储过程复制到另一个。但有时，你会看到最糟糕的实践在你的代码中一遍又一遍地重复。这正是查询哈希和查询计划哈希发挥作用、为你提供帮助的地方。


  你可以从 `sys.dm_exec_query_stats` 或 `sys.dm_exec_requests` 中检索查询计划哈希和查询哈希。


  尽管这是一种识别查询及其计划的机制，但哈希值并非唯一的。不同的计划可能产生相同的哈希值，因此你不能依赖它作为替代的主键。


  要查看哈希值的实际效果，请创建两个查询。


  ```sql

  SELECT *

  FROM Production.Product AS p

  JOIN Production.ProductSubcategory AS ps

  ON p.ProductSubcategoryID = ps.ProductSubcategoryID

  JOIN Production.ProductCategory AS pc

  ON ps.ProductCategoryID = pc.ProductCategoryID

  WHERE pc.[Name] = ''Bikes''

  AND ps.[Name] = ''Touring Bikes'';

  ```


  ```sql

  SELECT *

  FROM Production.Product AS p

  JOIN Production.ProductSubcategory AS ps

  ON p.ProductSubcategoryID = ps.ProductSubcategoryID

  JOIN Production.ProductCategory AS pc

  ON ps.ProductCategoryID = pc.ProductCategoryID

  where pc.[Name] = ''Bikes''

  and ps.[Name] = ''Road Bikes'';

  ```


  注意，这两个查询之间唯一实质性的区别在于 `ProductSubcategory.Name` 不同，一个是 Touring Bikes，另一个是 Road Bikes。同时也要注意，第二个查询中的
  `WHERE` 和 `AND` 关键字是小写的。在你执行每个查询之后，你可以通过以下查询从 `sys.dm_exec_query_stats` 中看到这些格式更改带来的结果，如图
  15-22 所示：


  ```sql

  SELECT deqs.execution_count,

  deqs.query_hash,

  deqs.query_plan_hash,

  dest.text

  FROM sys.dm_exec_query_stats AS deqs

  CROSS APPLY sys.dm_exec_sql_text(deqs.plan_handle) dest

  WHERE dest.text LIKE ''SELECT *

  FROM Production.Product AS p%'';

  ```


