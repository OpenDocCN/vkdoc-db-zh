- "# 索引分析与压缩\n\n#### 使用场景\n\n报表系统最能从索引视图中获益。写入频繁的 OLTP 系统可能无法充分利用索引视图，因为维护索引视图及其底层基表的成本会增加。索引视图带来的净性能提升，是视图提供的总查询执行节省与存储和维护视图的成本之差。\n\
  \n> **注意**\n> 如果查询连接设置与这些 ANSI 标准设置不匹配，在针对索引视图中使用的表进行插入/更新/删除操作时，你可能会看到错误。\n\n如果你使用的是\
  \ SQL Server 企业版，查询优化器在执行查询时无需在查询语句中显式引用索引视图。这使得现有应用程序无需修改就能从新创建的索引视图中受益。否则，在非企业版的\
  \ SQL Server 上，你需要在 T-SQL 代码中直接引用它。查询优化器仅为成本显著的查询考虑索引视图。你可能还会发现，新的列存储索引可能比索引视图更适合你，尤其是在预聚合数据时。我将在本章后面的一节中介绍列存储索引。\n\
  \n让我们通过以下示例看看索引视图是如何工作的。考虑以下三个查询：\n\n```sql\nSELECT p.[Name] AS ProductName,\n \
  \   SUM(pod.OrderQty) AS OrderOty,\n    SUM(pod.ReceivedQty) AS ReceivedOty,\n \
  \   SUM(pod.RejectedQty) AS RejectedOty\nFROM Purchasing.PurchaseOrderDetail AS\
  \ pod\nJOIN Production.Product AS p\n    ON p.ProductID = pod.ProductID\nGROUP BY\
  \ p.[Name];\n```\n\n```sql\nSELECT p.[Name] AS ProductName,\n    SUM(pod.OrderQty)\
  \ AS OrderOty,\n    SUM(pod.ReceivedQty) AS ReceivedOty,\n    SUM(pod.RejectedQty)\
  \ AS RejectedOty\nFROM Purchasing.PurchaseOrderDetail AS pod\nJOIN Production.Product\
  \ AS p\n    ON p.ProductID = pod.ProductID\nGROUP BY p.[Name]\nHAVING (SUM(pod.RejectedQty)\
  \ / SUM(pod.ReceivedQty)) > .08;\n```\n\n```sql\nSELECT p.[Name] AS ProductName,\n\
  \    SUM(pod.OrderQty) AS OrderQty,\n    SUM(pod.ReceivedQty) AS ReceivedQty,\n\
  \    SUM(pod.RejectedQty) AS RejectedQty\nFROM Purchasing.PurchaseOrderDetail AS\
  \ pod\nJOIN Production.Product AS p\n    ON p.ProductID = pod.ProductID\nWHERE p.[Name]\
  \ LIKE 'Chain%'\nGROUP BY p.[Name];\n```\n\n所有三个查询都对`PurchaseOrderDetail`表的列使用了聚合函数`SUM()`。因此，你可以创建一个索引视图来预计算这些聚合，并在查询执行期间最小化这些复杂计算的成本。\n\
  \n以下是这些查询执行的逻辑读次数：\n- 查询 1：\n  ```\n  Table 'Workfile'. Scan count 0, logical reads\
  \ 0\n  Table 'Worktable'. Scan count 0, logical reads 0\n  Table 'Product'. Scan\
  \ count 1, logical reads 6\n  Table 'PurchaseOrderDetail'. Scan count 1, logical\
  \ reads 66\n  CPU time = 0 ms, elapsed time = 128 ms.\n  ```\n- 查询 2：\n  ```\n \
  \ Table 'Workfile'. Scan count 0, logical reads 0\n  Table 'Worktable'. Scan count\
  \ 0, logical reads 0\n  Table 'Product'. Scan count 1, logical reads 6\n  Table\
  \ 'PurchaseOrderDetail'. Scan count 1, logical reads 66\n  CPU time = 0 ms, elapsed\
  \ time = 158 ms.\n  ```\n- 查询 3：\n  ```\n  Table 'PurchaseOrderDetail'. Scan count\
  \ 5, logical reads 894\n  Table 'Product'. Scan count 1, logical reads 2, physical\
  \ rea\n  CPU time = 0 ms, elapsed time = 139 ms.\n  ```\n\n我将使用以下脚本创建索引视图来预计算开销大的计算并连接表：\n\
  \n```sql\nIF EXISTS ( SELECT *\n    FROM sys.views\n    WHERE object_id = OBJECT_ID(N'[Purchasing].[IndexedView]')\
  \ )\n    DROP VIEW [Purchasing].[IndexedView];\nGO\n\nCREATE VIEW Purchasing.IndexedView\n\
  \    WITH SCHEMABINDING\nAS\n    SELECT pod.ProductID,\n        SUM(pod.OrderQty)\
  \ AS OrderQty,\n        SUM(pod.ReceivedQty) AS ReceivedQty,\n        SUM(pod.RejectedQty)\
  \ AS RejectedQty,\n        COUNT_BIG(*) AS [Count]\n    FROM Purchasing.PurchaseOrderDetail\
  \ AS pod\n    GROUP BY pod.ProductID;\nGO\n\nCREATE UNIQUE CLUSTERED INDEX iv\n\
  \    ON Purchasing.IndexedView (ProductID);\nGO\n```\n\n某些构造（如`AVG()`）是不允许的。（有关不允许的构造的完整列表，请参阅\
  \ SQL Server 联机丛书。）如果视图中包含聚合，如此示例，则必须默认包含`COUNT_BIG()`。\n\n索引视图将聚合函数的结果具体化存储在磁盘上。这消除了在执行关注聚合输出的查询时计算聚合函数的需要。\n\
  \n例如，第三个查询请求`PurchaseOrderDetail`表中某些产品的`ReceivedQty`和`RejectedQty`之和。由于这些值已在索引视图中为`PurchaseOrderDetail`表中的每个产品具体化，你可以使用以下`SELECT`语句从索引视图中获取这些预聚合的值：\n\
  \n```sql\nSELECT iv.ProductID,\n    iv.ReceivedQty,\n    iv.RejectedQty\nFROM Purchasing.IndexedView\
  \ AS iv;\n```\n\n如图 9-11 所示的执行计划中，`SELECT`语句直接从索引视图检索值，而无需访问基表（`PurchaseOrderDetail`）。\n\
  \n**图 9-11.** 使用索引视图的执行计划\n\n索引视图不仅使直接基于该视图的查询受益，也可能使其他关注具体化数据的查询受益。例如，有了索引视图后，针对`PurchaseOrderDetail`的三个查询无需重写即可获益（第一个查询的执行计划见图\
  \ 9-12），逻辑读次数减少如下：\n\n- 使用索引视图后的查询 1：\n  ```\n  Table 'Product'. Scan count 1, logical\
  \ reads 13\n  Table 'IndexedView'. Scan count 1, logical reads 4\n  CPU time = 0\
  \ ms, elapsed time = 88 ms.\n  ```\n- 使用索引视图后的查询 2：\n  ```\n  Table 'Product'. Scan\
  \ count 1, logical reads 13\n  Table 'IndexedView'. Scan count 1, logical reads\
  \ 4\n  CPU time = 0 ms, elapsed time = 0 ms.\n  ```\n- 使用索引视图后的查询 3：\n  ```\n  Table\
  \ 'IndexedView'. Scan count 0, logical reads 10\n  Table 'Product'. Scan count 1,\
  \ logical reads 2\n  CPU time = 0 ms, elapsed time = 41 ms.\n  ```\n\n**图 9-12.**\
  \ 自动使用索引视图的执行计划\n\n尽管查询未被修改以引用新的索引视图，优化器仍然使用索引视图来提高性能。因此，即使数据库应用程序中的现有查询也能从新的索引视图中受益，而无需修改查询。如果你需要与索引视图提供的聚合不同的聚合，那将无法实现。这里再次体现了列存储索引的优势。\n\
  \n请确保清理资源。\n\n```sql\nDROP VIEW Purchasing.IndexedView;\n```\n\n### 索引压缩\n\n数据和索引压缩在\
  \ SQL Server 2008 中引入（在企业版和开发人员版中可用）。*压缩*索引意味着将更多的键信息容纳到单个页面上。这可以带来显著的性能改进，因为存储索引所需的页面更少，索引层级也更少。在\
  \ CPU 方面会有开销，因为索引中的键值会被压缩和解压缩，所以这可能不是所有索引的解决方案。内存也受益，因为压缩后的页面在内存中以压缩状态存储。\n\n\n\n\
  默认情况下，索引不会被压缩。你必须在创建索引时显式地调用压缩。压缩有两种类型：行级压缩和页级压缩。*行级压缩*识别可压缩的列（详见联机丛书）并压缩该列的存储，对每一行都执行此操作。*页级压缩*实际上先使用行级压缩，然后在此基础上添加额外的压缩，以减少存储在页上的非行元素的存储空间。在页类型下，索引的非叶页不接收任何压缩。\n\
  \n要查看索引压缩的实际效果，考虑以下索引：\n```sql\nCREATE NONCLUSTERED INDEX IX_Test\nON Person.Address(City\
  \ ASC, PostalCode ASC);\n```\n该索引在本章前面已创建。如果按照此处定义重新创建它，则会为具有与第一个测试索引`IX_Test`相同两列的索引创建行类型压缩。\n\
  \n```sql\nCREATE NONCLUSTERED INDEX IX_Comp_Test\nON Person.Address (City,PostalCode)\n\
  WITH (DATA_COMPRESSION = ROW);\n```\n再创建一个索引。\n```sql\nCREATE NONCLUSTERED INDEX\
  \ IX_Comp_Page_Test\nON Person.Address (City,PostalCode)\nWITH (DATA_COMPRESSION\
  \ = PAGE);\n```\n为了检查存储的索引，修改针对`sys.dm_db_index_physical_stats`的原始查询，添加另一个列`compressed_page_count`。\n\
  ```sql\nSELECT i.Name,\ni.type_desc,\ns.page_count,\ns.record_count,\ns.index_level,\n\
  compressed_page_count\nFROM sys.indexes i\nJOIN sys.dm_db_index_physical_stats(DB_ID(N'AdventureWorks2012'),\n\
  OBJECT_ID(N'Person.Address'),NULL,\nNULL,'DETAILED') AS s\nON i.index_id = s.index_id\n\
  WHERE i.OBJECT_ID = OBJECT_ID(N'Person.Address');\n```\n运行查询，得到图 9-13 所示的结果。\n*图\
  \ 9-13. `sys.dm_db_index_physical_stats`关于压缩索引的输出*\n对于这个索引，你可以看到页压缩能够将索引从 106 页减少到\
  \ 25 页，其中 25 页被压缩。此实例中的行类型压缩减少了索引中的页数，但效果远不如页压缩显著。\n\n为了在不修改代码的情况下看到压缩为你工作，运行以下查询：\n\
  ```sql\nSELECT a.City,\na.PostalCode\nFROM Person.Address AS a\nWHERE a.City = 'Newton'\n\
  AND a.PostalCode = 'V2M1N7';\n```\n优化器选择在我的系统上使用`IXCompPageTest`索引。即使我强制它使用`IXTest`索引如下，性能也是相同的，尽管在第二个查询中多读取了一页：\n\
  ```sql\nSELECT a.City,\na.PostalCode\nFROM Person.Address AS a WITH (INDEX = IX_Test)\n\
  WHERE a.City = 'Newton'\nAND a.PostalCode = 'V2M1N7';\n```\n因此，虽然一个索引占用的空间大约是另一个的四分之一，页数也少得多，但这是在没有性能成本的情况下实现的。\n\
  \n压缩对 SQL Server 内的其他过程有一系列影响，因此在实施前应彻底探索可能的影响以及可能的益处。在大多数情况下，CPU 的成本完全被其他地方的收益所超越，但你应该测试并监控你的系统。\n\
  \n测试完成后清理索引。\n```sql\nDROP INDEX Person.Address.IX_Test;\nDROP INDEX Person.Address.IX_Comp_Test;\n\
  DROP INDEX Person.Address.IX_Comp_Page_Test;\n```\n\n### 列存储索引\n列存储索引在 SQL Server\
  \ 2012 中引入，它按列而非按行来索引信息。\n这在处理需要快速聚合和访问大量数据的数据仓库系统时特别有用。列存储索引中存储的信息按每列分组，并且这些分组是单独存储的。这使得对不同列集合的聚合变得极快，因为可以访问列存储索引，而无需访问大量行来聚合信息。\n\
  \n此外，你能获得更快的速度，因为存储是面向列的，因此你只会触及感兴趣的列的存储，而不是整行的列。最后，你会看到列存储带来的一些性能提升，因为列数据是压缩存储的。列存储有两种类型，类似于常规索引：聚集列存储和非聚集列存储。非聚集列存储不能被更新。你必须先删除它，然后重新创建它（或者，如果你正在使用分区，可以切换入和切换出不同的分区）。聚集列存储在\
  \ SQL Server 2014 中引入，并且仅在生产机器的 Enterprise 版本中可用。使用列存储索引有一些限制。\n\n*   不能使用某些数据类型，如`binary`、`text`、`varchar(max)`、`uniqueidentifier`（在\
  \ SQL Server 2012 中，此数据类型在 SQL Server 2014 中有效）、`clr`数据类型、`xml`或精度大于 18 的`decimal`。\n\
  *   不能在稀疏列上创建列存储索引。\n*   创建聚集列存储索引时，它可以是表上的唯一索引。\n*   你想创建聚集列存储索引的表不能有任何约束，包括主键或外键约束。\n\
  \n有关限制的完整列表，请参阅联机丛书。\n\n列存储主要设计用于数据仓库内部，因此在处理相关的存储样式（如星型模式）时效果最佳。在`AdventureWorks2012`数据库中，`Production.TransactionHistoryArchive`表是一种比许多其他结构更可能用于聚合查询的结构。由于它是一个存档表，其加载也是受控的，因此列存储索引可以成功地在这里使用。以这个查询为例：\n\
  ```sql\nSELECT tha.ProductID,\nCOUNT(tha.ProductID) AS CountProductID,\nSUM(tha.Quantity)\
  \ AS SumQuantity,\nAVG(tha.ActualCost) AS AvgActualCost\nFROM Production.TransactionHistoryArchive\
  \ AS tha\nGROUP BY tha.ProductID;\n```\n如果你对当前配置的表运行此查询，你会看到一个执行计划，如图 9-14 所示。\n\
  *图 9-14. `GROUP BY`查询的聚集索引扫描和哈希匹配聚合*\n该查询的读取次数和执行时间如下：\n```\nTable 'Worktable'.\
  \ Scan count 0, logical reads 0, physical reads 0\nTable 'Workfile'. Scan count\
  \ 0, logical reads 0, physical reads 0,\nTable 'TransactionHistoryArchive'. Scan\
  \ count 1, logical reads 628\nCPU time = 16 ms, elapsed time = 126 ms.\n```\n有大量的读取，此查询使用了相当多的\
  \ CPU，并且执行速度不是特别快。我们有两种类型的列存储索引可供选择。如果你想只为现有表添加一个非聚集列存储索引，这也是可能的。\n```sql\nCREATE\
  \ NONCLUSTERED COLUMNSTORE INDEX ix_csTest\nON Production.TransactionHistoryArchive\n\
  (ProductID,\nQuantity,\nActualCost);\n```\n\n\n"
- '# SQL Server 高级索引：列存储与特殊索引类型


  ## 列存储索引的使用与优势


  在部署了 `非聚集列存储索引` 后，优化器现在便有了使用该索引来满足前述查询的选项。就像优化器可用的所有其他索引一样，`列存储索引` 也有关联的成本，因此对于针对表的任何给定查询，它可能被选用，也可能不被选用来满足要求。在本例中，如果你重新运行最初的聚合查询，可以看到优化器判定使用
  `列存储索引` 相关的成本对该查询是有利的。执行计划现在如图 9-15 所示。


  **图 9-15.** `列存储索引` 被使用，而非 `聚集索引`

  如你所见，查询的基本操作是相同的，但扫描的是 `列存储索引` 而非 `聚集索引`。真正的差异体现在查询的读取次数和执行时间上。


  ```

  Table ''Worktable''. Scan count 0, logical reads 0

  Table ''TransactionHistoryArchive''. Scan count 1, logical reads 48

  CPU time = 0 ms, elapsed time = 122 ms.

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-166_1.jpg)


  检索数据所需读取次数的大幅减少以及速度的些许提升，都是能够引用按列而非按行索引的信息的结果。前述查询以所谓的 *行模式* 运行。`列存储索引` 有两种操作模式：`批处理模式`
  和 `行模式`。两者之中，`批处理模式` 要快得多。它利用了一种特殊的数据访问方法，允许以批次方式拉取大量数据，因此无需解压。`批处理模式` 处理在使用多处理器机器和具有大缓存的现代处理器时，还具有额外的优势。要查看
  `列存储` 是以 `批处理` 还是 `行模式` 运行，你只需检查 `列存储` 操作的属性即可。例如，在所述查询中，图 9-16 显示了来自 `列存储扫描` 操作符的属性表。


  **图 9-16.** `实际执行模式`

  联机丛书中记录了一组有限的操作会导致 `批处理模式` 处理，但在具有足够处理器的系统上处理这些操作时，你将看到又一次显著的性能提升。


  `列存储索引` 不要求你以特定顺序排列列，这与 `聚集` 和 `非聚集索引` 不同。同样，与这些其他索引不同，你应该将多个列放入一个 `列存储索引` 中，以便跨这些列获得益处。换句话说，如果你预计将来需要查询某个列，应主动将其添加到
  `列存储索引` 定义中。但是，如果你从 `列存储索引` 中检索大量列，可能会看到一些性能下降。


  你也可以看到 `聚集列存储索引` 的实际应用。由于不能有约束，你只需用此脚本重新创建表：


  ```sql

  SELECT *

  INTO dbo.TransactionHistoryArchive

  FROM Production.TransactionHistoryArchive;


  CREATE INDEX ClusteredColumnstoreTest

  ON dbo.TransactionHistoryArchive

  (TransactionID);

  ```


  从那里，就有可能创建一个 `聚集列存储索引`，有效地将表从传统的 `聚集表` 转换为 `列存储表`，因为与常规 `聚集索引` 类似，`聚集列存储索引` 存储数据。语法如下：


  ```sql

  CREATE CLUSTERED COLUMNSTORE INDEX ClusteredColumnstoreTest

  ON dbo.TransactionHistoryArchive

  WITH (DROP_EXISTING = ON);

  ```


  这将生成一个现在存储为 `聚集列存储` 的表。如果你修改之前的聚合查询以针对此新表运行，并将查询指向此表，你将看到与使用 `非聚集列存储索引` 时相同的执行计划和性能。但是，与你之前创建的索引不同，这个新结构可以被更新。


  虽然使用 `列存储索引` 的限制有些严格，特别是对于 `非聚集列存储索引`，但对于能在这些限制内操作的结构来说，其好处是显而易见的。


  请务必清理任何剩余的对象。


  ```sql

  DROP TABLE dbo.TransactionHistoryArchive;

  DROP INDEX Production.TransactionHistoryArchive.ix_csTest;

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ### 特殊索引类型


  随着 Microsoft 向 `SQL Server` 引入特殊数据类型和存储机制，为这些特殊存储类型建立索引的方法也随之发展。详细解释所有这些特殊索引类型的每一个细节超出了本书的范围。在以下部分中，我将介绍每种索引类型的基本概念，以便为在调整查询时使用它们提供可能性。


  #### 全文索引


  你可以通过在 `VARCHAR`、`NVARCHAR`、`CHAR` 和 `NCHAR` 字段中使用 `MAX` 值，在 `SQL Server` 中存储大量文本。针对这些大字段的普通
  `聚集` 或 `非聚集索引` 将是不可行的，因为单个值可能远远超过索引中的页大小。因此，一种不同的文本索引机制是使用 `全文引擎`，该引擎必须正在运行才能处理
  `全文索引`。你也可以在 `VARBINARY` 数据上构建 `全文索引`。


  你需要在表上有一个唯一的列。最佳性能候选者是整数：`INT` 或 `BIGINT`。然后，此列与单词一起使用，以标识它属于表中的哪一行，以及在字段内的位置。`SQL
  Server` 允许对 `全文索引` 进行增量更改，包括 `更改跟踪` 或基于时间的更改，也允许完全重建。


  `SQL Server 2012` 引入了另一种处理文本的方法，称为 `语义搜索`。它使用文档中的短语来识别存储在数据库内的不同文本集之间的关系。


  #### 空间索引


  `SQL Server 2008` 中引入了存储 `空间数据` 的功能。这些数据可以是 `geometry` 类型，也可以是非常复杂的 `geographical`
  类型，字面意义上标识了地球上的一个点。至少可以说，为这类数据建立索引是复杂的。`SQL Server` 将这些索引存储在扁平的 `B 树` 中，类似于常规索引，区别在于它也是一个由四个网格连接在一起的层次结构。每个网格可以被赋予
  `低`、`中` 或 `高` 的密度，以概述每个网格的大小。存在一些机制来支持 `空间数据类型` 的索引，使得不同类型的查询，例如查找一个对象何时在另一个对象的边界内或附近，都能受益于索引固有的性能提升。


  `空间索引` 只能针对 `geometry` 或 `geography` 类型的列创建。它必须在基表上，表上不能有索引视图，并且表必须有一个 `主键`。在任何给定的表列上，最多可以创建
  249 个 `空间索引`。不同的索引用于定义不同类型的索引行为。更多信息请参阅 Alastair Aitchison 所著的 *Beginning Spatial
  with SQL Server 2008* (Apress, 2009)。


  #### XML 索引


  `XML` 作为数据类型在 `SQL Server 2005` 中引入，可以存储为良构的 `XML 数据` 而非文本。可以使用 `SQL Server` 支持的
  `XQuery 语言` 对此数据进行查询。为了增强性能能力，定义了一组特殊的索引。一个 `XML 列` 可以有一个 `主索引` 和若干 `辅助索引`。`主 XML
  索引` 将 `XML 数据` 的属性、特性和元素分解并存储为一个内部表。表上必须有一个 `主键`，并且该 `主键` 必须是 `聚集的` 才能创建 `XML 索引`。创建
  `XML 索引` 后，就可以创建 `辅助索引`。这些索引有 `PATH`、`VALUE` 和 `PROPERTY` 类型，具体取决于你如何查询 `XML`。更多详情，请查阅
  Michael Coles 所著的 *Pro SQL Server 2008 XML* (Apress, 2008)。



  '
- '# 第 9 章 ■ 索引分析


  ## 索引的其他特性


  索引的其他属性可能对性能产生正面或负面影响。这里将探讨其中的一些行为。


  ### 不同的列排序顺序


  SQL Server 支持为复合索引的不同列指定不同的排序顺序。


  假设你需要一个索引，其第一列按升序排序，第二列按降序排序，以消除可能非常耗时的排序操作。你可以按如下方式实现：


  ```sql

  CREATE NONCLUSTERED INDEX i1 ON t1(c1 ASC, c2 DESC);

  ```


  ### 计算列上的索引


  你可以在计算列上创建索引，只要为该计算列定义的表达式符合某些限制，例如仅引用包含该计算列的表中的列，并且它是确定性的。


  ### BIT 数据类型列上的索引


  SQL Server 允许你在 `BIT` 数据类型的列上创建索引。单独在 `BIT` 数据类型列上创建索引的能力优势不大，因为这样的列通常只有两个唯一值，除非在极少数情况下，绝大多数数据是一个值，只有少数行是另一个值。如前所述，这种低选择性（唯一值数量）的列通常不是索引的良好候选者。


  然而，当你考虑覆盖索引时，这个特性就显得很重要了。因为覆盖索引要求包含索引中的所有列，能够将 `BIT` 数据类型列添加到索引键中，使得覆盖索引在需要时可以包含这样的列（在通常属于
  `INCLUDE` 子句的列之外）。


  ### CREATE INDEX 语句作为查询处理


  `CREATE INDEX` 操作被集成到查询处理器中。优化器可以在创建索引时利用现有索引来减少扫描成本和排序。


  以 `Person.Address` 表为例。存在一个包含多个列的非聚集索引：`AddressLine1`、`AddressLine2`、`City`、`StateProvinceId`
  和 `PostalCode`。如果你需要针对 `City` 列运行查询，并且已有这个索引，你会得到对该索引的扫描。现在像这样创建一个新索引：


  ```sql

  CREATE INDEX IX_Test ON Person.Address(City);

  ```


  你可以在图 9-17 中看到，优化器选择扫描现有索引，而不是扫描整张表来创建新索引，因为新索引所需的列已经包含在其他非聚集索引中。


  **图 9-17.** `CREATE INDEX` 的执行计划


  ### 并行索引创建


  SQL Server 支持为 `CREATE INDEX` 语句使用并行计划，就像支持其他 SQL 查询一样。在多处理器机器上，索引创建不会局限于单个处理器，而是会受益于多个处理器。你可以使用
  SQL Server 的 `max degree of parallelism` 配置参数来控制在 `CREATE INDEX` 语句中使用的处理器数量。通过执行
  `sp_configure` 存储过程可以看到此参数的默认值为 0。


  ```sql

  EXEC sp_configure ''max degree of parallelism'';

  ```


  默认值 0 意味着 SQL Server 可以使用系统中所有可用的 CPU 来并行执行 T-SQL 语句。在具有四个处理器的系统上，可以通过执行 `sp_configure`
  将最大并行度设置为 2。


  ```sql

  EXEC sp_configure ''max degree of parallelism'', 2;

  RECONFIGURE WITH OVERRIDE;

  ```


  这允许 SQL Server 最多使用两个 CPU 来并行执行 T-SQL 语句。此配置设置立即生效，无需重启服务器。


  查询提示 `MAXDOP` 可用于 `CREATE INDEX` 语句。同时请注意，并行 `CREATE INDEX` 功能仅在 SQL Server 企业版中可用。


  ### 联机索引创建


  索引的默认创建是作为脱机操作执行的。这意味着在表上放置排他锁，在创建索引期间限制用户访问。可以以联机操作的方式创建索引。这允许用户在索引创建期间继续访问数据。代价是增加创建索引所需的时间和资源。从
  SQL Server 2012 开始引入，包含 `varchar(MAX)`、`nvarchar(MAX)` 和 `varbinary(MAX)` 的索引实际上可以在线重建。联机索引操作仅在
  SQL Server 企业版中可用。


  ### 考虑数据库引擎优化顾问


  一种简单的索引方法是使用 SQL Server 提供的数据库引擎优化顾问工具。这是一个基于使用情况的工具，它查看特定的工作负载，并与查询优化器协作以确定各种索引组合的相关成本。基于该工具的分析，你可以适当地添加或删除索引。


  ■ **注意** 我将在第 5 章更深入地介绍数据库引擎优化顾问工具。


  ## 小结


  在本章中，你了解到索引内外存在许多附加功能，它们扩展了前一章定义的行为。


  在下一章中，你将了解更多关于数据库引擎优化顾问的信息，这是 SQL Server 提供的工具，可帮助你确定针对给定 SQL 工作负载的数据库中正确的索引。


  '
- '# 第 10 章 ■ 数据库引擎优化顾问


  SQL Server 的性能通常取决于数据库表上是否有合适的索引。然而，随着工作负载和数据随时间变化，现有的索引可能不完全合适，可能需要新的索引。决定正确索引的任务之所以复杂，是因为对一组查询有益的索引更改可能对另一组查询有害。


  为了帮助你完成这个过程，SQL Server 提供了一个名为数据库引擎优化顾问的工具。该工具可以帮助为给定的工作负载识别一组最优的索引和统计信息，而无需具备数据库架构、工作负载或
  SQL Server 内部机制的专家级知识。它还可以为一小部分问题查询推荐调优选项。除了该工具的优点外，我还在本章中介绍了它的局限性，因为它是一个如果使用不当可能弊大于利的工具。


  在本章中，我将介绍以下主题：


  -   数据库引擎优化顾问的工作原理

  -   如何在有问题的查询集上使用数据库引擎优化顾问来获取索引建议，包括如何定义跟踪

  -   数据库引擎优化顾问的局限性


  ## 数据库引擎优化顾问机制


  你可以通过选择 Microsoft SQL Server 2012 ➤ 性能工具 ➤ 数据库引擎优化顾问来直接运行数据库引擎优化顾问。你也可以从命令提示符 (`dta.exe`)、SQL
  Profiler（工具 ➤ 数据库引擎优化顾问）、Management Studio 中的查询（突出显示所需的查询，然后选择查询 ➤ 在数据库引擎优化顾问中分析查询）或
  Management Studio（选择工具 ➤ 数据库引擎优化顾问）运行它。一旦打开工具并连接到服务器，你应该会看到一个类似于图 10-1 的窗口。我将在本节介绍定义和运行分析的选项，然后在下一节通过一些详细示例进行说明。



  '
- "# 第 10 章：数据库引擎调优顾问\n\n## 使用概述\n\n**图 10-1. 在数据库引擎调优顾问中选择服务器和数据库** 数据库引擎调优顾问已经连接到服务器。从这里开始，您需要概述工作负载以及要调优的对象。创建会话名称对于为文档目的标记会话是必要的。然后您需要选择一个工作负载。工作负载可以来自跟踪文件或表，或者（在\
  \ SQL Server 2012 中引入）您可以使用计划缓存中存在的查询。最后，您需要浏览到适当的位置。工作负载的定义取决于您启动数据库引擎调优顾问的方式。如果您从查询窗口启动它，您将看到一个“查询”单选按钮，并且“文件”和“表”单选按钮将被禁用。您还必须定义“工作负载分析的数据库”设置，并最终选择要调优的数据库。\n\
  \n**提示** 数据库引擎调优顾问仅支持在支持索引视图的平台上推荐索引视图。SQL Server 2014 企业版支持，但标准版不支持。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-172_1.jpg)\n\n![](img/index-172_2.jpg)\n\n选择数据库时，还可以通过单击屏幕右侧的下拉框选择要调优的个别表；您将看到如图\
  \ 10-2 所示的表列表。\n\n**图 10-2. 单击复选框定义数据库引擎调优顾问中用于调优的个别表** 定义了工作负载后，您需要选择“调优选项”选项卡，如图\
  \ 10-3 所示。\n\n**图 10-3. 在数据库引擎调优顾问中定义选项**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-173_1.jpg)\n\n您可以通过选择“限制调优时间”然后定义调优停止的日期和时间，来定义希望数据库引擎调优顾问运行的时间长度。数据库引擎调优顾问运行时间越长，它应该能提出更好的建议。您选择数据库引擎调优顾问考虑创建的物理设计结构的类型，还可以设置分区策略，以便调优顾问知道是否应将表和索引分区作为分析的一部分。请记住，分区首先是一个数据管理工具，而不是性能调优机制。如果您的数据和结构不需要，分区可能不是理想的结果。最后，您可以定义希望数据库中保留不变的物理设计结构。更改这些选项将会缩小或扩大数据库引擎调优顾问可以做出以提高性能的选择范围。\n\
  \n您可以单击“高级选项”按钮查看更多选项，如图 10-4 所示。\n\n**图 10-4. 高级调优选项对话框**\n\n此对话框允许您限制建议的空间和索引中可以包含的列数。您可以决定是否要包含系统中所有数据库的计划缓存事件。最后，您可以定义新索引或索引更改是作为联机还是脱机索引操作完成。\n\
  \n一旦您适当地定义了所有这些设置，就可以通过单击“开始分析”按钮来启动数据库引擎调优顾问。针对您运行数据库引擎调优顾问的任何服务器实例，创建的会话都保存在 `msdb`\
  \ 数据库中。它显示正在分析的内容和已完成的进度，您可以在图 10-5 中看到。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-174_1.jpg)\n\n![](img/index-174_2.jpg)\n\n**图 10-5. 调优进度**\n\n您将在下一部分的示例分析中看到更详细的进度显示示例。\n\
  \n分析完成后，您将获得一份建议列表（在图 10-6 中可见），并且许多报告变得可用。表 10-1 描述了这些报告。\n\n**图 10-6. 查询调优常规设置**\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**表 10-1. 数据库引擎调优顾问报告**\n\n\
  | 报告名称 | 报告描述 |\n| :--- | :--- |\n| 列访问 | 列出工作负载中引用的列和表 |\n| 数据库访问 | 列出工作负载中引用的每个数据库以及每个数据库的工作负载语句百分比\
  \ |\n| 事件频率 | 列出工作负载中按发生频率排序的所有事件 |\n| 索引详细信息（当前） | 定义工作负载引用的索引及其属性 |\n| 索引详细信息（建议）\
  \ | 与“索引详细信息（当前）”报告相同，但显示有关数据库引擎调优顾问建议的索引的信息 |\n| 索引使用情况（当前） | 列出工作负载引用的索引及其使用百分比\
  \ |\n| 索引使用情况（建议） | 与“索引使用情况（当前）”报告相同，但针对建议的索引 |\n| 语句成本 | 列出如果实施建议，每条语句的性能改进 |\n\
  | 语句成本范围 | 按百分位数分解成本改进，以显示对于任何给定的更改集可以实现多少收益；这些成本是优化器提供的估计值 |\n| 语句详细信息 | 列出工作负载中的语句、它们的成本以及如果实施建议后的降低成本\
  \ |\n| 语句到索引关系 | 列出各个语句引用的索引；提供报告的当前版本和建议版本 |\n| 表访问 | 列出工作负载引用的表 |\n| 视图到表关系 |\
  \ 列出物化视图引用的表 |\n| 工作负载分析 | 提供有关工作负载的详细信息，包括语句数量、成本降低的语句数量以及成本保持不变的语句数量 |\n\n## 数据库引擎调优顾问示例\n\
  \n学习如何使用数据库引擎调优顾问的最佳方法就是使用它。这不是一个很难掌握的工具，因此我建议打开它并开始使用。\n\n### 调优查询\n\n您可以使用数据库引擎调优顾问，通过一个能公平代表所有\
  \ SQL 活动的工作负载，来为整个数据库推荐索引。您也可以使用它为一组有问题的查询推荐索引。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n要了解如何使用数据库引擎调优顾问获取一组有问题的查询的索引建议，假设您有一个经常调用的简单查询。由于调用频繁，您希望快速获得一些调优结果。查询如下：\n\n\
  ```sql\nSELECT soh.DueDate,\n       soh.CustomerID,\n       soh.Status\nFROM Sales.SalesOrderHeader\
  \ AS soh\nWHERE soh.DueDate BETWEEN '1/1/2008' AND '2/1/2008';\n```\n\n要分析该查询，请在查询窗口中右键单击它，然后选择“在数据库引擎调优顾问中分析查询”。调优顾问将打开一个窗口，您可以在其中将会话名称更改为有意义的名称。在本例中，我选择了“Report\
  \ Query Round 1 – 1/16/2014”。数据库和表不需要编辑。当您完成时，“常规”选项卡将如图 10-6 所示。\n\n\n"
- "# 第 10 章 数据库引擎调优顾问\n\n鉴于此查询至关重要，且对其进行调优对业务极其关键，我将在“调优选项”选项卡上更改一些设置，以期最大化可能的建议。为此示例，我将让数据库引擎调优顾问运行默认的一小时，但对于更大负载或更复杂的查询，你可能需要考虑给予系统更多时间。我将勾选“包括筛选索引”复选框，以便在筛选索引有益时将其纳入考虑。我还将把“分区策略采用”设置从“无分区”切换为“完全分区”。最后，我将允许数据库引擎调优顾问提出结构更改（如果它发现任何有助于性能的更改），方法是将“保留所有现有\
  \ PDS”更改为“不保留任何现有 PDS”。完成这些设置后，“调优选项”选项卡将如图 10-7 所示。\n\n![](img/index-177_1.jpg)\n\
  \n**图 10-7.** 已调整的调优选项卡\n\n请注意，当你更改上述选项的定义时，屏幕底部的描述也会随之变化。开始分析后，应会出现进度屏幕。虽然设置是评估一小时，但\
  \ DTA 仅用了大约一分钟就评估了此查询。初始建议并不是一个好的选择集。如图 10-8 所示，数据库引擎调优顾问建议删除数据库中大量的索引。这不是运行该工具时希望看到的建议类型。\n\
  \n![](img/index-178_1.jpg)\n\n**图 10-8.** 查询调优的初始建议\n\n这是因为数据库引擎调优顾问假定正在测试的负载是数据库的完整负载。如果有索引未被使用，那么它们就应该被删除。这是一个最佳实践，应该在任何数据库上实施。然而，在这种情况下，这是针对一个单一查询，而不是系统的完整负载。\n\
  \n要查看顾问是否能提出更有意义的建议集，你必须启动一个新的会话。\n\n这次，我将调整选项，使数据库引擎调优顾问无法删除任何现有结构。这是在“调优选项”选项卡（如图\
  \ 10-7 所示）中设置的。在那里，我将把“物理设计结构 (PDS) 在数据库中保留”设置从“不保留任何现有 PDS”更改为“保留所有现有 PDS”。我将保持运行时间不变，因为评估在此时间范围内运行良好。\n\
  \n再次运行数据库引擎调优顾问后，它在一分钟内完成，并显示了图 10-9 所示的建议。\n\n![](img/index-179_1.jpg)\n\n![](img/index-179_2.jpg)\n\
  \n**图 10-9.** 查询调优建议\n\n第一次，数据库引擎调优顾问建议删除正在测试的表上的大部分索引以及一些相关表上的索引。这次它建议在查询引用的列上创建一个覆盖索引。正如第\
  \ 4 章所述，覆盖索引可能是检索数据的最佳方法之一。数据库引擎调优顾问能够识别出，一个包含查询引用的所有列的索引（即覆盖索引）性能最佳。\n\n收到建议后，你应仔细检查提议的\
  \ T-SQL 命令。这些建议并不总是有用的，因此你需要评估并测试它们以确定其有效性。假设检查后的建议看起来不错，你会想要应用它。选择“操作” > “评估建议”。这将打开一个新的数据库引擎调优顾问会话，并允许你使用最初提出建议时的相同衡量标准来评估这些建议是否有效。所有这些都是为了验证原始建议是否具有其声称的效果。新会话看起来就像一个常规的评估报告。\n\
  \n如果你仍然对建议感到满意，请选择“操作” > “应用建议”。这将打开一个对话框，允许你立即应用建议或计划应用（见图 10-10）。\n\n**图 10-10.**\
  \ 应用建议对话框\n\n如果单击“确定”按钮，数据库引擎调优顾问会将索引应用到你一直在测试查询的数据库（见图 10-11）。\n\n![](img/index-180_1.jpg)\n\
  \n**图 10-11.** 成功应用的调优会话\n\n生成建议后，你可能希望将其保存到文件中，并累积一系列更改，以便在计划的部署窗口期间发布到生产环境，而不是当场应用。此外，仅采用默认设置，你最终会得到许多名称类似这样的索引：`_dta_index_SalesOrderHeader_5_1266103551__K4_6_11`。这不是很清晰，因此将更改保存到\
  \ T-SQL 也将允许你使更改更易于人类阅读。请记住，对表（尤其是大型表）应用索引可能会在创建索引期间对系统上主动运行的进程造成性能影响。\n\n虽然一次获得一个索引建议很好，但最好能够一次性检查数据库的大部分内容。这就是调优跟踪工作负载的用武之地。\n\
  \n### 调优跟踪工作负载\n\n从生产服务器上运行的实际查询中捕获跟踪，是向数据库引擎调优顾问提供有意义数据的一种方法。（捕获跟踪将在第 17 章介绍。）定义用于数据库引擎调优顾问的跟踪的最简单方法是使用“调优”模板实现跟踪。\n\
  \n在需要调优的系统上启动跟踪。我通过在循环中从 PowerShell `sqlps.exe` 命令提示符运行查询来生成了人工负载。这是具有 SQL Server\
  \ 配置设置的 PowerShell 命令提示符。它随 SQL Server 一起安装。\n\n为了找到一些有趣的问题，我将创建一个具有明显调优问题的存储过程。\n\
  \n```sql\nCREATE PROCEDURE dbo.uspProductSize\nAS\nSELECT p.ProductID,\n       p.Size\n\
  FROM Production.Product AS p\nWHERE p.Size = '62';\n```\n\n这是我使用的简单 PowerShell 脚本。你需要为你的环境调整连接字符串。\n\
  \n将文件下载到某个位置后，你只需通过命令提示符引用该文件及其完整路径即可运行它。你可能会遇到安全问题，因为这是一个未签名的原始脚本。如果需要，请遵循该错误消息中提供的帮助指南（`queryload.ps1`）。\n\
  \n```powershell\n[reflection.assembly]::LoadWithPartialName(\"Microsoft.SqlServer.Smo\"\
  ) | out-null\n\n# Get the connection\n$SqlConnection = New-Object System.Data.SqlClient.SqlConnection\n\
  $SqlConnection.ConnectionString = \"Server=DOJO\\RANDORI;Database=AdventureWorks2012;Integrated\
  \ Security=True\"\n\n# Load Product data\n$ProdCmd = New-Object System.Data.SqlClient.SqlCommand\n\
  $ProdCmd.CommandText = \"SELECT ProductID FROM Production.Product\"\n$ProdCmd.Connection\
  \ = $SqlConnection\n\n$SqlAdapter = New-Object System.Data.SqlClient.SqlDataAdapter\n\
  $SqlAdapter.SelectCommand = $ProdCmd\n\n$ProdDataSet = New-Object System.Data.DataSet\n\
  $SqlAdapter.Fill($ProdDataSet)\n```\n\n\n\n"
- "# 第 10 章 ■ 数据库引擎调优顾问\n\n## 用于工作负载模拟的 PowerShell 脚本\n\n```powershell\n# 加载员工数据\n\
  $EmpCmd = New-Object System.Data.SqlClient.SqlCommand\n$EmpCmd.CommandText = \"\
  SELECT BusinessEntityID FROM HumanResources.Employee\"\n$EmpCmd.Connection = $SqlConnection\n\
  $SqlAdapter.SelectCommand = $EmpCmd\n$EmpDataSet = New-Object System.Data.DataSet\n\
  $SqlAdapter.Fill($EmpDataSet)\n\n# 设置要运行的存储过程\n$WhereCmd = New-Object System.Data.SqlClient.SqlCommand\n\
  $WhereCmd.CommandText = \"dbo.uspGetWhereUsedProductID @StartProductID = @ProductId,\
  \ @CheckDate=NULL\"\n$WhereCmd.Parameters.Add(\"@ProductID\",[System.Data.SqlDbType]\"\
  Int\")\n$WhereCmd.Connection = $SqlConnection\n\n# 另一个存储过程\n$BomCmd = New-Object\
  \ System.Data.SqlClient.SqlCommand\n$BomCmd.CommandText = \"dbo.uspGetBillOfMaterials\
  \ @StartProductID = @ProductId, @CheckDate=NULL\"\n$BomCmd.Parameters.Add(\"@ProductID\"\
  ,[System.Data.SqlDbType]\"Int\")\n$BomCmd.Connection = $SqlConnection\n\n# 再一个存储过程\n\
  $ManCmd = New-Object System.Data.SqlClient.SqlCommand\n$ManCmd.CommandText = \"\
  dbo.uspGetEmployeeManagers @BusinessEntityID =@EmpId\"\n$ManCmd.Parameters.Add(\"\
  @EmpId\",[System.Data.SqlDbType]\"Int\")\n$ManCmd.Connection = $SqlConnection\n\n\
  # 特殊的存储过程\n$SpecCmd = New-Object System.Data.SqlClient.SqlCommand\n$SpecCmd.CommandText\
  \ = \"dbo.uspProductSize\"\n$SpecCmd.Connection = $SqlConnection\n\n# 无限循环\nwhile(1\
  \ -ne 0)\n{\n    foreach($row in $ProdDataSet.Tables[0])\n    {\n        $SqlConnection.Open()\n\
  \        $ProductId = $row[0]\n        $WhereCmd.Parameters[\"@ProductID\"].Value\
  \ = $ProductId\n        $WhereCmd.ExecuteNonQuery() | Out-Null\n        $SqlConnection.Close()\n\
  \n        foreach($row in $EmpDataSet.Tables[0])\n        {\n            $SqlConnection.Open()\n\
  \            $EmpId = $row[0]\n            $ManCmd.Parameters[\"@EmpID\"].Value\
  \ = $EmpId\n            $ManCmd.ExecuteNonQuery() | Out-Null\n            $SqlConnection.Close()\n\
  \        }\n\n        $SqlConnection.Open()\n        $BomCmd.Parameters[\"@ProductID\"\
  ].Value = $ProductId\n        $BomCmd.ExecuteNonQuery() | Out-Null\n        $SpecCmd.ExecuteNonQuery()\
  \ | Out-Null\n        $SqlConnection.Close()\n    }\n}\n```\n\n`注意` 有关 PowerShell\
  \ 的更多信息，请查阅 Don Jones 和 Jeffrey Hicks 所著的《Windows PowerShell》（Sapien, 2010）。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 使用数据库引擎调优顾问\n\n创建跟踪文件后，打开数据库引擎调优顾问。它默认的文件类型就是跟踪文件，因此只需浏览到跟踪文件的位置即可。和之前一样，你需要从下拉列表中选择\
  \ `AdventureWorks2012` 数据库作为工作负载分析的数据库。为了限制建议范围，还需从屏幕底部的数据库列表中选择 `AdventureWorks2012`。设置适当的调优选项，然后开始分析。这次分析运行时间会超过一分钟（参见\
  \ `图 10-12`）。\n\n![](img/index-183_1.jpg)\n\n![](img/index-183_2.jpg)\n\n![](img/index-183_3.jpg)\n\
  \n`图 10-12` 数据库调优引擎运行中\n\n在我的机器上，处理过程大约运行了 15 分钟。然后生成输出，如 `图 10-13` 所示。\n\n`图 10-13`\
  \ 针对手动统计信息的建议\n\n将所有查询通过数据库引擎调优顾问运行后，顾问提出了为 `Product` 表新建一个索引的建议，这将提升该查询的性能。现在我只需要将它保存到一个\
  \ T-SQL 文件中，以便在应用到数据库之前编辑其名称。\n\n### 从过程缓存进行调优\n\nSQL Server 2012 引入了一项功能，允许将存储在缓存中的查询计划用作调优建议的来源。过程很简单。只需在\
  \ `常规` 页面上多做一个选择，即选择计划缓存作为调优工作的来源，如 `图 10-14` 所示。\n\n`图 10-14` 选择计划缓存作为 DTA 的来源\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-184_1.jpg)\n\
  \n所有其他选项的行为与之前本章概述的完全一致。处理时间比顾问处理工作负载时大大缩短。它只需处理缓存中的查询，因此，根据系统内存量的不同，这可能是一个简短的列表。处理我的缓存后得出的结果建议在\
  \ `Person` 表上创建一个索引。据估计，这可以将性能提升约 45%，如 `图 10-15` 所示。\n\n`图 10-15` 来自计划缓存的建议\n\n\
  这为你提供了另一种尝试以自动化方式调优系统的机制。但它仅限于当前缓存中的查询。根据缓存的易变性（计划老化或被新计划替换的速度），这种方法可能有用，也可能没用。\n\
  \n## 数据库引擎调优顾问的局限性\n\n数据库引擎调优顾问的建议基于输入的工作负载。如果输入的工作负载不能真实反映实际的工作负载，那么推荐的索引有时可能会对工作负载中缺失的某些查询产生\
  \ `负面` 影响。但最重要的是，在许多情况下，数据库引擎调优顾问可能无法识别可能的调优机会。它拥有一个复杂的测试引擎，但在某些场景下，其能力是有限的。\n\n\
  \n\n对于生产服务器，你应确保 `SQL` 跟踪包含数据库工作负载的完整表示。对于大多数数据库应用程序，捕获一整天的跟踪通常包含了数据库上执行的大多数查询，但也存在例外，例如每周、每月或年终处理。请务必了解你的负载以及正确捕获它所需的条件。`数据库引擎优化顾问`\
  \ 的其他一些考虑因素/限制如下：\n\n• **使用 `SQL:BatchCompleted` 事件进行跟踪输入**：如前所述，输入到 `数据库引擎优化顾问`\
  \ 的 `SQL` 跟踪必须包含 `SQL:BatchCompleted` 事件；否则，向导将无法识别工作负载中的查询。\n\n• **工作负载中的查询分布**：在工作负载中，一个查询可能使用相同的参数值执行多次。即使对最常见的查询进行微小的性能改进，与仅执行一次的查询的重大性能改进相比，也能对整体工作负载的性能做出更大的贡献。\n\
  \n• **索引提示**：`SQL` 查询中的索引提示可能会阻止 `数据库引擎优化顾问` 选择更好的执行计划。该向导会将 `SQL` 查询中使用的所有索引提示作为其建议的一部分。因为这些索引对于表可能不是最优的，所以在将工作负载提交给向导之前，请从查询中移除所有索引提示，但请记住，你需要将它们添加回去以查看它们是否真的能改善性能。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 10 章 ■ 数据库引擎优化顾问\n\n\
  ## 总结\n\n正如你在本章所学到的，`数据库引擎优化顾问` 可以是一个用于分析现有索引有效性并为 `SQL` 工作负载推荐新索引的有用工具。随着 `SQL`\
  \ 工作负载随时间变化，你可以使用此工具来确定哪些现有索引不再使用，以及需要哪些新索引来提高性能。偶尔运行向导以检查你现有的索引是否真的最适合你当前的工作负载可能是个好主意。这假设你没有自己捕获指标并进行评估。优化顾问还提供了许多有用的报告，用于分析\
  \ `SQL` 工作负载及其自身建议的有效性。请记住，该工具的限制使其无法发现所有优化机会。还要记住，`DTA` 提供的建议的好坏取决于你为其提供的输入。如果你的数据库状况不佳，该工具可以给你一个快速的帮助。如果你已经在定期监控和调整查询，你可能看不到\
  \ `数据库引擎优化顾问` 的建议带来的好处。\n\n通常，你会依赖非聚集索引来提高 `SQL` 工作负载的性能。这假设你已经为表分配了聚集索引。由于非聚集索引的性能高度依赖于与其关联的\
  \ `书签查找` 的成本，你将在下一章中看到如何分析和解析查找。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- '# 第 11 章：键查找及其解决方案


  为了最大化非聚集索引的收益，你必须尽可能最小化数据检索的成本。与非聚集索引相关的一个主要开销是过度查找的成本，以前称为 `书签查找`，这是一种从非聚集索引行导航到聚集索引或堆中相应数据行的机制。因此，研究查找的原因并评估如何避免此成本是很有意义的。


  在本章中，我将涵盖以下主题：


  • 查找的目的


  • 使用查找的缺点


  • 查找原因的分析


  • 解决查找的技术


  ## 查找的目的


  当 `SQL` 查询通过查询请求信息时，如果可用，优化器可以使用 `WHERE` 或 `JOIN` 子句中列上的非聚集索引来检索数据。如果查询引用的列不属于用于检索数据的非聚集索引的一部分，则需要从索引行导航到表中的相应数据行以访问这些剩余列。


  例如，在以下 `SELECT` 语句中，如果优化器使用的非聚集索引未包含所有列，则需要从非聚集索引行导航到聚集索引或堆中的数据行以检索这些列的值：


  ```

  SELECT p.[Name],


  AVG(sod.LineTotal)


  FROM Sales.SalesOrderDetail AS sod


  JOIN Production.Product p


  ON sod.ProductID = p.ProductID


  WHERE sod.ProductID = 776


  GROUP BY sod.CarrierTrackingNumber,


  p.[Name]


  HAVING MAX(sod.OrderQty) > 1


  ORDER BY MIN(sod.LineTotal);

  ```


  `SalesOrderDetail` 表在 `ProductID` 列上有一个非聚集索引。优化器可以使用该索引来过滤表中的行。该表在 `SalesOrderID`
  和 `SalesOrderDetailID` 上有一个聚集索引，因此它们将包含在非聚集索引中。但由于它们在查询中未被引用，它们对查询没有任何帮助。查询引用的其他列（`LineTotal`、`CarrierTrackingNumber`、`OrderQty`
  和 `LineTotal`）在非聚集索引中不可用。为了获取这些列的值，需要通过聚集索引从非聚集索引行导航到相应的数据行，此操作就是键查找。你可以在图 11-1.
  中看到实际效果。


  ***图 11-1.** 更复杂执行计划中的键查找*


  为了更好地理解非聚集索引如何导致查找，请考虑以下 `SELECT` 语句，该语句仅请求几行，但由于通配符 `*` 而请求所有列，它使用 `ProductID`
  列上的过滤条件从 `SalesOrderDetail` 表中检索：


  ```

  SELECT *


  FROM Sales.SalesOrderDetail AS sod


  WHERE sod.ProductID = 776 ;

  ```


  优化器评估 `WHERE` 子句，并发现包含在 `WHERE` 子句中的列 `ProductID` 上有一个非聚集索引，可以筛选行数。由于只请求了少量行（228
  行），通过非聚集索引检索数据将比扫描聚集索引（包含超过 120,000 行）以识别匹配行更便宜。列 `ProductID` 上的非聚集索引将有助于快速识别匹配行。该非聚集索引包含列
  `ProductID` 和聚集索引列 `SalesOrderID` 及 `SalesOrderDetailID`；所有被请求的其他列均未包含。因此，正如你可能猜到的，在使用非聚集索引的同时检索其余列，你需要进行一次查找。


  这在以下指标和图 11-2. 的执行计划中显示。你可以使用“查询”➤“查询选项”菜单打开 `STATISTICS IO`。查找 `Key Lookup (Clustered)`
  操作符。那就是正在执行的查找。


  ```

  Table ''SalesOrderDetail''. Scan count 1, logical reads 710

  CPU time = 0 ms, elapsed time = 104 ms.

  ```


  ***图 11-2.** 包含书签查找的执行计划*


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-188_1.png)


  ## 查找的缺点



  '
- "# 关键查找与解决方案\n\n查找操作除了需要访问索引页之外，还需要访问数据页。访问两组页面会增加查询的逻辑读取次数。此外，如果这些页面不在内存中，查找操作很可能还需要在磁盘上进行一次随机（或非连续）I/O\
  \ 操作，以便从索引页跳转到数据页，同时还需要足够的 CPU 能力来编组这些数据并执行必要的操作。这是因为在大型表中，索引页和对应的数据页在磁盘上通常并不直接相邻。\n\
  \n增加的逻辑读取以及代价高昂的物理读取（如果需要）使得查找操作的数据检索成本相当高。此外，你还需要处理将从索引中检索到的数据与通过查找操作检索到的数据进行合并，这通常是通过某个\
  \ `JOIN` 运算符来完成的。这个成本因素是非聚集索引更适合返回表中少量行的查询的原因。随着查询检索的行数增加，查找操作的开销成本变得令人无法接受。\n\n\
  为了理解随着检索行数增加，查找操作如何使非聚集索引失效，让我们看一个不同的例子。产生图 11-2 执行计划的查询仅从 `SalesOrderDetail` 表返回几行。保持查询不变但将过滤器更改为不同的值，当然会改变返回的行数。如果你将参数值改为如下所示：\n\
  ```sql\nSELECT *\nFROM Sales.SalesOrderDetail AS sod\nWHERE sod.ProductID = 793;\n\
  ```\n那么运行查询将返回超过 700 行，具有不同的性能指标和完全不同的执行计划（图 11-3）。\n\n```\nTable 'SalesOrderDetail'.\
  \ Scan count 1, logical reads 1246\nCPU time = 15 ms, elapsed time = 137 ms.\n```\n\
  \n***图 11-3.** 返回更多行的查询的不同执行计划*\n\n要确定使用非聚集索引的成本，请考虑查询在执行表扫描期间执行的逻辑读取次数（`1,246`）。如果你通过使用索引提示强制优化器使用非聚集索引，如下所示：\n\
  ```sql\nSELECT *\nFROM Sales.SalesOrderDetail AS sod WITH (INDEX (IX_SalesOrderDetail_ProductID))\n\
  WHERE sod.ProductID = 793 ;\n```\n那么逻辑读取次数从 `1,246` 增加到 `2,173`：\n```\nTable 'SalesOrderDetail'.\
  \ Scan count 1, logical reads 2173\nCPU time = 31 ms, elapsed time = 319 ms.\n```\n\
  \n图 11-4 显示了相应的执行计划。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-189_1.png)\n\
  \n![](img/index-189_2.png)\n\n***图 11-4.** 使用索引提示获取更多行的执行计划*\n\n要从非聚集索引中受益，查询应请求相对明确的数据集。应用程序设计在处理大型结果集的需求中扮演着重要角色。例如，网上的搜索引擎大多一次返回有限数量的文章，即使搜索标准可能返回成千上万的匹配文章。如果查询请求大量行，那么增加的查找开销成本可能使非聚集索引不再适用；随后，你必须考虑避免查找操作的可能性。\n\
  \n## 分析查找的原因\n\n由于查找操作可能代价高昂，你应该分析是什么原因导致查询计划在执行计划中选择了查找步骤。你可能会发现，通过在非聚集索引键中包含缺失的列，或者将其作为\
  \ `INCLUDE` 列包含在索引页级别，可以避免查找，从而避免与查找相关的额外开销。\n\n要了解如何识别未包含在非聚集索引中的列，请考虑以下查询，该查询基于\
  \ `NationalIDNumber` 从 `HumanResources.Employee` 表中提取信息：\n```sql\nSELECT NationalIDNumber,\n\
  \       JobTitle,\n       HireDate\nFROM HumanResources.Employee AS e\nWHERE e.NationalIDNumber\
  \ = '693168613' ;\n```\n这会产生以下性能指标和执行计划（参见图 11-5）：\n```\nTable 'Employee'. Scan\
  \ count 0, logical reads 4\nCPU time = 0 ms, elapsed time = 53 ms\n```\n\n***图 11-5.**\
  \ 带有查找操作的执行计划*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-190_1.png)\n\
  \n![](img/index-190_2.jpg)\n\n如执行计划所示，存在一个键查找。`SELECT` 语句引用了 `NationalIDNumber`、`JobTitle`\
  \ 和 `HireDate` 列。在 `NationalIDNumber` 列上的非聚集索引并不提供 `JobTitle` 和 `HireDate` 列的值，因此需要通过查找操作从数据存储位置检索这些列。这是一个键查找，因为它通过存储在非聚集索引中的聚集键来检索数据。如果该表是一个堆，则会是\
  \ RID 查找。然而，在现实世界中，识别查询使用的所有列通常不会这么简单。请记住，如果查询任何部分（不仅仅是选择列表）引用的所有列不是所使用的非聚集索引的一部分，就会导致查找操作。\n\
  \n对于基于视图和用户定义函数的复杂查询，要找出查询引用的所有列可能过于困难。因此，你需要一种标准机制来找出查找返回但未包含在非聚集索引中的列。\n\n如果你查看\
  \ `Key Lookup (Clustered)` 操作的属性，可以看到该操作的输出列表。这显示了查找操作输出的列。要快速、轻松地获取输出列列表并能够复制它们，请右键单击该操作符（本例中为\
  \ `Key Lookup (Clustered)`）。然后选择 `Properties` 菜单项。在打开的属性窗口中向下滚动到 `Output List` 属性（图\
  \ 11-6）。\n\n此属性有一个展开箭头，允许你展开列列表，并且每个列旁边还有进一步的展开箭头，允许你展开该列的属性。\n\n***图 11-6.** 键查找属性窗口*\n\
  \n要直接从属性窗口获取列列表，请单击 `Output List` 属性右侧的省略号。这将在文本窗口中打开输出列表，你可以从中复制数据以用于修改索引（图 11-7）。\n\
  \n***图 11-7.** 非聚集索引中不可用的所需列*\n\n## 解决查找问题\n\n由于查找的相对成本可能很高，你应该尽可能尝试消除查找操作。\n\n\
  在上一节中，你需要在不从索引行导航到数据行的情况下获取 `JobTitle` 和 `HireDate` 列的值。你可以通过三种不同的方式来实现，如下节所述。\n\
  \n### 使用聚集索引\n\n对于聚集索引，索引的叶页与表的数据页相同。因此，在读取聚集索引键列的值时，数据库引擎还可以读取其他列的值，而无需从索引行进行任何导航。在前面的例子中，如果你将特定行的非聚集索引转换为聚集索引，`SQL\
  \ Server` 可以从同一页检索所有列的值。\n\n\n"
- "# 第 11 章：键查找与解决方案\n\n## 简单地说，你想将非聚集索引转换为聚集索引是很容易做到的。然而，在这种情况下，以及在你可能遇到的大多数情况下，这样做是不可能的，因为表上已经存在聚集索引。此表上的聚集索引恰好也是主键。你将不得不删除所有外键约束，删除主键并重新创建为非聚集索引，然后针对\
  \ `NationalIDNumber` 重新创建索引。你不仅需要考虑涉及的工作量，还可能严重影响依赖于现有聚集索引的其他查询。\n\n**注意** 请记住，一个表只能有一个聚集索引。\n\
  \n### 使用覆盖索引\n\n在第 8 章中，你学到了覆盖索引对于查询来说就像一个伪聚集索引，因为它无需借助表数据即可返回结果。因此，你也可以使用覆盖索引来避免查找。\n\
  \n为了理解如何使用覆盖索引来避免查找，再次查看针对 `HumanResources.Employee` 表的查询。\n\n```sql\nSELECT NationalIDNumber,\
  \ JobTitle, HireDate\nFROM HumanResources.Employee AS e\nWHERE e.NationalIDNumber\
  \ = '693168613';\n```\n\n为了避免这个书签查找，你可以将查询中引用的列 `JobTitle` 和 `HireDate` 直接添加到非聚集索引键中。这将使该非聚集索引成为此查询的覆盖索引，因为所有列都可以从索引中检索，而无需访问堆或聚集索引。\n\
  \n```sql\nCREATE UNIQUE NONCLUSTERED INDEX [AK_Employee_NationalIDNumber]\nON [HumanResources].[Employee]\n\
  (NationalIDNumber ASC, JobTitle ASC, HireDate ASC)\nWITH DROP_EXISTING;\n```\n\n\
  现在当查询运行时，你会看到以下指标和不同的执行计划（图 11-8）：\n\n```\nTable 'Employee'. Scan count 0, logical\
  \ reads 2\nCPU time = 0 ms, elapsed time = 0 ms.\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-192_1.png)\n\n![](img/index-192_2.png)\n\n**图 11-8：** 使用覆盖索引的执行计划\n\
  \n然而，通过更改键来创建覆盖索引有几个注意事项。如果你向非聚集索引添加过多列，它会变得“宽”。与操作查询相关的索引维护成本可能会增加，正如第 8 章所讨论的。因此，需要仔细评估添加键值是否会为索引的一般使用带来好处。如果某个键值不会用于索引内的搜索，那么将其添加到键中就没有意义。同时，也要评估要添加到非聚集索引键中的列数（考虑大小和数据类型）。如果附加列的总宽度不是太大（最好通过测试和测量生成的索引大小来确定），那么这些列可以添加到非聚集索引键中，用作覆盖索引。此外，如果你向索引键添加列，当然，这取决于索引，你可能会对其他查询产生负面影响。它们可能期望以特定顺序看到索引键列，或者可能不引用键中的某些列，导致优化器无法使用该索引。只有在基于这些评估有意义的情况下，才通过添加键来修改索引，特别是因为你还有一个替代方案来修改键。\n\
  \n另一种实现覆盖索引的方法，无需通过添加键列来重塑索引，是使用 `INCLUDE` 列。将索引更改为如下所示：\n\n```sql\nCREATE UNIQUE\
  \ NONCLUSTERED INDEX [AK_Employee_NationalIDNumber]\nON [HumanResources].[Employee]\n\
  (NationalIDNumber ASC)\nINCLUDE (JobTitle, HireDate)\nWITH DROP_EXISTING;\n```\n\
  \n现在当查询运行时，你会得到以下指标和执行计划（图 11-9）：\n\n```\nTable 'Employee'. Scan count 1, logical\
  \ reads 2\nCPU time = 0 ms, elapsed time = 0 ms.\n```\n\n**图 11-9：** 使用 `INCLUDE`\
  \ 列的执行计划\n\n\n\n索引仍在覆盖数据，其效果与图 11-8 所展示的执行计划完全一致。因为数据存储在索引的叶子层，所以当使用索引检索键值时，`INCLUDE`\
  \ 语句中指定的其余列几乎如同键的一部分，可供直接使用。请参考图 11-10。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-193_1.png)\n\n**图 11-10.** 使用 `INCLUDE` 关键字的索引存储\n\n获得覆盖索引的另一种方法是利用\
  \ SQL Server 内部的结构。如果对之前的查询稍作修改，使其检索一组不同的数据，而不是特定的 `NationalIDNumber` 及其关联的 `JobTitle`\
  \ 和 `HireDate`，那么这次查询将检索 `NationalIDNumber`（作为备用键）和 `BusinessEntityID`（表的主键），并限定在某个值范围内。\n\
  \n```sql\nSELECT NationalIDNumber,\n    BusinessEntityID\nFROM HumanResources.Employee\
  \ AS e\nWHERE e.NationalIDNumber BETWEEN '693168613'\n    AND '7000000000';\n```\n\
  \n表上的原始索引并未以任何方式引用 `BusinessEntityID` 列。\n\n```sql\nCREATE UNIQUE NONCLUSTERED INDEX\
  \ [AK_Employee_NationalIDNumber]\nON [HumanResources].[Employee]\n(\n    [NationalIDNumber]\
  \ ASC\n)WITH DROP_EXISTING ;\n```\n\n当针对表运行此查询时，你可以看到图 11-11. 所示的结果。\n\n**图 11-11.**\
  \ 意外的覆盖索引\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-194_1.jpg)\n\
  \n![](img/index-194_2.jpg)\n\n优化器是如何基于所提供的索引，为这个查询构建出覆盖索引的呢？它知道，在具有聚集索引的表上，聚集索引键（本例中是\
  \ `BusinessEntityID` 列）会作为指向数据的指针，随非聚集索引一起存储。这意味着，任何在查询的过滤机制（`WHERE` 子句）或连接条件中，同时包含聚集索引键和非聚集索引中一组列的查询，都可以利用覆盖索引。\n\
  \n要查看这三个不同索引在存储中是如何体现的，你可以使用 `DBCC SHOWSTATISTICS` 查看索引本身的统计信息。当你针对该索引运行以下查询时，可以在图\
  \ 11-12: 中看到输出结果。\n\n```sql\nDBCC SHOW_STATISTICS('HumanResources.Employee',\n \
  \   AK_Employee_NationalIDNumber);\n```\n\n**图 11-12.** 原始索引的 `DBCC SHOW_STATISTICS`\
  \ 输出\n\n如你所见，`NationalIDNumber` 列首先列出，但表的主键也作为索引的一部分被包含在内，因此第二行显示了包含的 `BusinessEntityID`\
  \ 列。这使得键的平均长度约为 22 字节。这就是那些既引用主键值又引用索引键值的索引能够充当覆盖索引的方式。\n\n如果你对你尝试的第一个备用索引（将所有三列都包含在键中）运行相同的\
  \ `DBCC SHOW_STATISTICS`，如下所示，你将看到一组不同的统计信息（图 11-13):\n\n```sql\nCREATE UNIQUE NONCLUSTERED\
  \ INDEX [AK_Employee_NationalIDNumber] ON\n    [HumanResources].[Employee]\n   \
  \ (NationalIDNumber ASC,\n    JobTitle ASC,\n    HireDate ASC )\nWITH DROP_EXISTING\
  \ ;\n```\n\n**图 11-13.** 宽键覆盖索引的 `DBCC SHOW_STATISTICS` 输出\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-195_1.jpg)\n\n现在你会看到所有的列加在一起，包括三个索引键列，最后是额外添加的主键。\n\n宽度从 22 字节增长到了\
  \ 74 字节。这反映了增加了 `JobTitle` 列（一个 `VARCHAR(50)` 类型）以及宽度为 6 字节的 `datetime` 字段。\n\n\n\
  \n"
- '# 最后，查看第二个备用索引的统计数据，通过包含的列，你可以在图 11-14 中看到输出结果。


  ```sql

  CREATE UNIQUE NONCLUSTERED INDEX [AK_Employee_NationalIDNumber]

  ON [HumanResources].[Employee]

  (NationalIDNumber ASC )

  INCLUDE (JobTitle,HireDate)

  WITH DROP_EXISTING ;

  ```


  `图 11-14.` 使用 INCLUDE 创建的覆盖索引的 DBCC SHOW_STATISTICS 输出


  现在，键宽度恢复到原始大小，因为 `INCLUDE` 语句中的列不是与键一起存储，而是存储在索引的叶级。


  从存储的统计数据中还可以挖掘出更多有趣的信息，但我将在第 12 章中介绍。


  ### 使用索引联接


  如果覆盖索引变得非常宽，那么你可以考虑使用索引联接技术。正如第 9 章所解释的，索引联接技术利用两个或多个索引之间的索引交集来完全覆盖一个查询。由于索引联接技术需要访问多个索引，它必须对索引联接中使用的所有索引执行逻辑读取。因此，它比覆盖索引需要更高的逻辑读取次数。但是，由于用于索引联接的多个窄索引可以比宽覆盖索引服务更多的查询（如第
  9 章所述），你当然可以考虑将索引联接作为一种避免键查找的技术。


  为了更好地理解如何使用索引联接来避免键查找，针对 `PurchaseOrderHeader` 表运行以下查询，以检索特定供应商在特定日期的 `PurchaseOrderID`：


  ```sql

  SELECT poh.PurchaseOrderID,

  poh.VendorID,

  poh.OrderDate

  FROM Purchasing.PurchaseOrderHeader AS poh

  WHERE VendorID = 1636

  AND poh.OrderDate = ''12/5/2007'' ;

  ```


  运行时，此查询会导致键查找操作（图 11-15）和以下 I/O：

  表 ''Employee''。扫描计数 1，逻辑读取 10

  CPU 时间 = 15 毫秒，经过时间 = 19 毫秒。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-196_1.png)


  ![](img/index-196_2.png)


  第 11 章 ■ 键查找及其解决方案


  `图 11-15.` 键查找操作


  之所以发生查找，是因为 `SELECT` 语句和 `WHERE` 子句引用的所有列并未都包含在 `VendorID` 列上的非聚集索引中。使用非聚集索引仍然比不使用它要好，因为不使用它将需要对表进行扫描（在本例中是聚集索引扫描），逻辑读取次数更多。


  要避免查找，你可以考虑在 `OrderDate` 列上创建覆盖索引，如前一节所述。但除了覆盖索引解决方案之外，你还可以考虑索引联接。正如你所了解的，索引联接需要的索引比覆盖索引更窄，因此提供以下两个好处。


  *   多个窄索引可以比宽覆盖索引服务更多的查询。

  *   窄索引比宽覆盖索引需要更少的维护开销。


  要使用索引联接避免查找，请在现有非聚集索引中未包含的 `OrderDate` 列上创建一个窄的非聚集索引。


  ```sql

  CREATE NONCLUSTERED INDEX Ix_TEST

  ON Purchasing.PurchaseOrderHeader(OrderDate);

  ```


  如果你再次运行 `SELECT` 语句，则会返回以下输出和如图 11-16 所示的执行计划：

  表 ''PurchaseOrderHeader''。扫描计数 2，逻辑读取 4

  CPU 时间 = 0 毫秒，经过时间 = 28 毫秒。


  `图 11-16.` 没有查找的执行计划


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  第 11 章 ■ 键查找及其解决方案


  从前面的执行计划中，你可以看到优化器使用了 `VendorID` 列上的非聚集索引 `IX_PurchaseOrder_VendorID` 和 `OrderID`
  列上的新非聚集索引 `IxTEST` 来完全满足查询，而无需访问其余数据的存储位置。此索引联接操作避免了键查找，从而将逻辑读取次数从 10 次减少到 4 次。


  确实，在 `VendorID` 和 `OrderID` (c1, c2) 列上创建覆盖索引可以进一步减少逻辑读取次数。但使用覆盖索引可能并不总是可行，因为它们可能很宽并且有相关的开销。在这种情况下，索引联接可能是一个很好的替代方案。


  ## 总结


  正如本章所演示的，与非聚集索引相关联的查找步骤会使得通过非聚集索引检索数据成本非常高。SQL Server 优化器在生成执行计划时会考虑到这一点，如果它发现使用非聚集索引的开销成本很高，它会丢弃该索引并执行表扫描（或者如果表存储为聚集索引，则执行聚集索引扫描）。因此，为了提高非聚集索引的有效性，分析查找的原因并考虑是否可以通过向索引键或
  `INCLUDE` 列（或索引联接）添加字段来完全避免它，并创建覆盖索引，是很有意义的。


  到目前为止，你一直专注于索引技术，并假设 SQL Server 优化器能够确定索引对查询的有效性。在下一章中，你将看到统计信息在帮助优化器确定索引有效性方面的重要性。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


