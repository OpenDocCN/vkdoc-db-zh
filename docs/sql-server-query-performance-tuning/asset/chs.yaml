- '# 网络段


  ## 与基线对比


  ### 每秒总字节数


  你可以使用 `Bytes Total/Sec` 计数器来判断网络接口卡（`NIC`）或网络适配器的性能。`Bytes Total/sec` 计数器应报告高值，表明大量传输成功。将此值与
  `Network Interface\Current Bandwidth` 性能计数器报告的值进行比较，后者反映了每个适配器的带宽。


  为流量高峰预留空间，通常平均使用率不应超过容量的 50%。如果这个数字接近连接容量，并且处理器和内存使用率适中，那么连接本身可能就是问题所在。


  ### 网络利用率百分比


  `% Net Utilization` 计数器表示网络段上正在使用的网络带宽百分比。此计数器的阈值取决于网络类型。例如，对于以太网，当 SQL Server 位于共享网络集线器上时，推荐的阈值是
  30%。对于位于专用全双工网络上的 SQL Server，即使网络使用率接近 100% 是可接受的，但将网络利用率保持在可接受阈值以下以负载高峰预留空间是有利的。


  > **注意**：你必须安装 `Network Monitor Driver` 才能使用 `network segment` 对象计数器收集性能数据。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ## 第 4 章 ■ CPU 性能分析


  在 Windows Server 2012 R2 中，你可以从网络适配器的局域网连接属性中安装 `Network Monitor Driver`。`Network
  Monitor Driver` 位于网络适配器的网络组件协议列表中。


  你也可以查看 `sys.dm_os_wait_stats` 中与网络相关的等待统计信息。但是，一个经常出现的等待是 `ASYNC_NETWORK_IO`。虽然这可能表示网络相关的等待，但更常见的情况是反映了因编程代码效率低下、未能有效使用结果集而导致的等待。


  ## 网络瓶颈解决方案


  一些常见的网络瓶颈解决方案如下：


  -   优化应用程序工作负载

  -   添加网络适配器

  -   调节和避免中断


  让我们更详细地考虑这些解决方案。


  ### 优化应用程序工作负载


  要优化数据库应用程序和数据库服务器之间的网络流量，请在应用程序中进行以下设计更改：


  -   与其发送长的 SQL 字符串，不如为 SQL 查询创建存储过程。然后，你只需要通过网络发送存储过程的名称及其参数。

  -   将多个数据库请求分组到一个存储过程中。这样，对于存储过程中实现的一组 SQL 查询，只需要一个跨网络的数据库请求。

  -   请求小的数据集。不要请求应用程序逻辑中未使用的表列。

  -   将数据密集型的业务逻辑移动到数据库中，作为存储过程或数据库触发器，以减少网络往返次数。

  -   如果数据不经常更改，尝试将信息缓存在应用程序中，而不是频繁调用数据库获取与上次调用完全相同的信息。

  -   最小化网络调用，例如返回未使用的多个结果集。一个常见问题是由 SQL Server 返回的结果集包含每个语句的行数导致的。你可以在查询开头使用 `SET
  NOCOUNT ON` 来禁用此功能。


  ## SQL Server 整体性能


  要分析 SQL Server 实例的整体性能，除了检查硬件资源利用率外，还应该检查 SQL Server 本身的一些常规方面。你可以使用表 4-3 中介绍的性能计数器。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


