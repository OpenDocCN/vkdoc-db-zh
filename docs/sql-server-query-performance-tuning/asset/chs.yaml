  \n如果你处于需要禁用统计信息自动创建的情况，你可能仍然希望跟踪统计信息可能对你的查询有用的地方。你可以使用扩展事件 `missing_column_statistics`\
  \ 来捕获该信息。对于前面的示例，你可以在图 12-16 中看到此事件的输出示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-214_1.png)\n\n**图 12-16.** `missing_column_statistics` 扩展事件的输出\n\
  \n`column_list` 将显示哪些列没有统计信息，而 `sql_text` 事件字段将显示该事件适用于哪个查询。然后，你可以决定是否创建自己的统计信息以使相关查询受益。\n\
  \n在继续之前，请务必将统计信息的自动创建重新打开。\n\n```sql\nALTER DATABASE AdventureWorks2012 SET AUTO_CREATE_STATISTICS\
  \ ON;\n```\n\n## 分析统计信息\n\n统计信息是由三组数据定义的信息集合：头信息、密度图和直方图。其中最常用的数据集之一是直方图。`直方图` 是一种统计结构，显示数据落入不同类别（称为\
  \ `步骤`）的频率。SQL Server 存储的直方图由对某一列或索引键（或多列索引键的第一列）数据分布的采样组成，最多包含 200 行。两个连续采样之间的索引键值范围信息即为一个\
  \ `步骤`。这些步骤由存储的 200 个值之间的不同大小的区间组成。一个步骤提供以下信息：\n\n-   给定步骤的最高值 (`RANGE_HI_KEY`)\n\
  -   等于 `RANGE_HI_KEY` 的行数 (`EQ_ROWS`)\n-   在前一个最高值与当前最高值之间（不包括这两个边界点）的行数 (`RANGE_ROWS`)\n\
  -   范围内的不同值数量 (`DISTINCT_RANGE_ROWS`)；如果范围内的所有值都是唯一的，则 `RANGE_ROWS` 等于 `DISTINCT_RANGE_ROWS`\n\
  -   范围内任何潜在键值的平均行数 (`AVG_RANGE_ROWS`)\n\n例如，当引用索引时，直方图中某个步骤内键值的 `AVG_RANGE_ROWS`\
  \ 值可帮助优化器决定在 `WHERE` 子句中引用索引列时如何（以及是否）使用该索引。因为优化器可以执行 `SEEK` 或 `SCAN` 操作来从表中检索行，所以优化器可以根据索引键值的潜在匹配行数来决定执行哪种操作。当引用\
  \ `RANGE_HI_KEY` 时，这可以更加精确，因为优化器知道应该从该值中找到相当精确的行数（假设统计信息是最新的）。\n\n要理解优化器的数据检索策略如何依赖于匹配行数，请在索引列上创建具有不同数据分布的测试表。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-215_1.png)\n\
  \n```sql\nIF (SELECT OBJECT_ID('dbo.Test1')) IS NOT NULL\n    DROP TABLE dbo.Test1\
  \ ;\nGO\nCREATE TABLE dbo.Test1 (C1 INT, C2 INT IDENTITY) ;\nINSERT INTO dbo.Test1\
  \ (C1) VALUES (1) ;\nSELECT TOP 10000 IDENTITY( INT,1,1 ) AS n\nINTO #Nums\nFROM\
  \ Master.dbo.SysColumns sc1, Master.dbo.SysColumns sc2 ;\nINSERT INTO dbo.Test1\
  \ (C1)\nSELECT 2\nFROM #Nums ;\nDROP TABLE #Nums;\nCREATE NONCLUSTERED INDEX FirstIndex\
  \ ON dbo.Test1 (C1) ;\n```\n\n当创建上述非聚集索引时，SQL Server 会自动在索引键上创建统计信息。\n\n你可以通过执行\
  \ `DBCC SHOW_STATISTICS` 命令来获取此非聚集索引 (`FirstIndex`) 的统计信息。\n\n```sql\nDBCC SHOW_STATISTICS(Test1,\
  \ FirstIndex);\n```\n\n图 12-17 显示了统计信息输出。\n\n**图 12-17.** 索引 `FirstIndex` 上的统计信息\n\
  \n现在，为了理解优化器如何根据统计信息有效地决定不同的数据检索策略，请执行以下两个查询不同行数的查询：\n\n```sql\n--检索 1 行；\nSELECT\
  \ *\nFROM dbo.Test1\nWHERE C1 = 1;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-216_1.jpg)\n\n```sql\n--检索 10000 行；\nSELECT *\nFROM dbo.Test1\n\
  WHERE C1 = 2;\n```\n\n图 12-18 显示了这些查询的执行计划。\n\n**图 12-18.** 小结果集和大结果集查询的执行计划\n\n\
  根据统计信息，优化器可以找到上述两个查询所需的行数。\n\n理解第一个查询只有一行需要检索，优化器选择了 `Index Seek` 操作，随后是必要的 `RID\
  \ Lookup` 来检索未存储在聚集索引中的数据。对于第二个查询，优化器知道将影响大量行（10,000 行），因此避免使用索引以试图提高性能。（第 6 章详细解释了索引策略。）\n\
  \n除了直方图中包含的信息外，头信息还包含其他有用的信息，包括：\n\n-   统计信息最后更新的时间\n-   表中的行数\n-   平均索引键长度\n- \
  \  为直方图采样的行数\n-   列组合的密度\n\n关于最后更新时间的信息可以帮助你决定是否应手动更新统计信息。平均键长代表索引键列中数据的平均大小。它有助于你理解索引键的宽度，这是决定索引有效性的一个重要度量。\n\
  \n如第 6 章所述，宽索引的维护成本可能较高，需要更多的磁盘空间和内存页，但如下一节所述，它可以使索引具有极高的选择性。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-217_1.jpg)\n\n### 密度\n\n在创建执行计划时，查询优化器会分析 `filter` 和 `JOIN` 子句中使用的列的统计信息。具有高选择性的筛选条件会将表中的行数限制为一个较小的结果集，并有助于优化器保持查询成本较低。具有唯一索引的列将具有高选择性，因为它可以将匹配行数限制为一。\n\
  \n另一方面，具有低选择性的筛选条件将从表中返回大的结果集。低选择性的筛选条件使该列上的非聚集索引失效。对于大结果集，通过非聚集索引导航到基表通常比直接扫描基表（或聚集索引）成本更高，因为与非聚集索引相关的查找操作存在开销成本。你可以在图\
  \ 12-18 的执行计划中观察到这种行为。\n\n\n"
- "# 统计信息、数据分布与基数\n\n统计信息以密度比的形式跟踪列的选择性。具有高选择性（或唯一性）的列将具有低密度。具有低密度（即高选择性）的列适合作为筛选条件，因为它可以帮助优化器快速检索少量行。这也是筛选索引（filtered\
  \ index）运作的原理，因为筛选器的目标是提高索引的选择性或密度。\n\n### 密度计算\n\n密度可以表示如下：\n\n`密度 = 1 / 列中不同值的数量`\n\
  \n密度的结果始终是介于 0 到 1 之间的数字。列的密度越低，它越适合用作索引键。你可以自己计算以确定索引和统计信息中列的密度。例如，要计算由 `create_t3.sql`\
  \ 创建的测试表中列 `c1` 的密度，请使用以下查询（结果见图 12-19）：\n\n```sql\nSELECT 1.0 / COUNT(DISTINCT\
  \ C1)\nFROM dbo.Test1;\n```\n\n**图 12-19.** 列 `C1` 的密度计算结果\n\n你可以在 `DBCC SHOW_STATISTICS`\
  \ 输出的 `All density` 列中看到此实际数据。该列的高密度值使其不太适合作为索引（即使是筛选索引）的候选。然而，索引键值的统计信息有助于查询优化器将索引用于谓词\
  \ `C1 = 1`，如前面的执行计划所示。\n\n### 多列索引的统计信息\n\n对于单列索引，统计信息由该列的直方图和一个密度值组成。对于包含多列的复合索引，统计信息仅包含第一列的一个直方图和多个密度值。这是在构建复合索引或复合统计信息时，通常将选择性更高的列（密度最低的列）放在首位的一个原因。密度值包括第一列的密度以及索引键列的每个前缀组合的密度。多个密度值有助于优化器在\
  \ `WHERE` 和 `JOIN` 子句中谓词引用多列时，找到复合索引的选择性。尽管第一列有助于确定直方图，但列本身的最终密度与列的顺序无关。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-218_1.jpg)\n\n![](img/index-218_2.jpg)\n\n第 12 章 ■ 统计信息、数据分布与基数\n\
  \n多列密度图可能来自索引键中的多列，也可能来自手动创建的统计信息。但是，你永远不会看到由自动统计信息创建过程创建的多列密度图。让我们看一个简单的例子。这是一个可能生成包含两列统计信息的查询：\n\
  \n```sql\nSELECT p.Name,\n       p.Class\nFROM Production.Product AS p\nWHERE p.Color\
  \ = 'Red' AND\n      p.DaysToManufacture > 15;\n```\n\n在列 `p.Color` 和 `p.DaysToManufacture`\
  \ 上创建的索引将具有一个多列密度值。在运行此查询之前，这是一个可以让你查看给定表上统计信息基本结构的查询：\n\n```sql\nSELECT s.name,\n\
  \       s.auto_created,\n       s.user_created,\n       s.filter_definition,\n \
  \      sc.column_id,\n       c.name AS ColumnName\nFROM sys.stats AS s\nJOIN sys.stats_columns\
  \ AS sc ON sc.stats_id = s.stats_id\n                            AND sc.object_id\
  \ = s.object_id\nJOIN sys.columns AS c ON c.column_id = sc.column_id\n         \
  \             AND c.object_id = s.object_id\nWHERE s.object_id = OBJECT_ID('Production.Product');\n\
  ```\n\n在 `Production.Product` 表上运行此查询的结果如图 12-20 所示。\n\n**图 12-20.** Product 表的统计信息列表\n\
  \n你可以看到表上的索引，每个索引都由单列组成。现在我将运行可能生成多列密度图的查询。但是，与其尝试通过 `SHOW_STATISTICS` 追踪统计信息，我将再次查询系统表。结果如图\
  \ 12-21 所示。\n\n**图 12-21.** Product 表中新增了两个统计信息\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-219_1.jpg)\n\n第 12 章 ■ 统计信息、数据分布与基数\n\n如你所见，系统没有添加一个包含多列的统计信息，而是创建了两个新的统计信息。你只会在多列索引键或手动创建的统计信息中获得多列统计信息。\n\
  \n为了更好地理解为多列索引维护的密度值，你可以修改之前使用的非聚集索引以包含两列。\n\n```sql\nCREATE NONCLUSTERED INDEX\
  \ FirstIndex\nON dbo.Test1(C1,C2) WITH DROP_EXISTING = ON;\n```\n\n图 12-22 显示了由\
  \ `DBCC SHOW_STATISTICS` 提供的统计信息结果。\n\n**图 12-22.** 多列索引 `FirstIndex` 上的统计信息\n\n\
  如你所见，`All density` 列下有两个密度值。\n\n- 第一列的密度\n- （第一列 + 第二列）组合的密度\n\n对于包含三列的多列索引，索引的统计信息还将包含（第一列\
  \ + 第二列 + 第三列）组合的密度值。直方图不会包含任何其他列组合的选择性值。因此，此索引 (`FirstIndex`) 对于仅按第二列 (`C2`) 筛选行不太有用，因为第二列\
  \ (`C2`) 单独的值并未维护在直方图中。\n\n你可以通过以下步骤计算图 12-19 中显示的第二个密度值 (`0.000099990000`)。\n\n\
  这是列组合 `(C1, C2)` 的不同值的数量。\n\n```sql\nSELECT 1.0 / COUNT(*)\nFROM (SELECT DISTINCT\n\
  \             C1,\n             C2\n      FROM dbo.Test1\n     ) DistinctRows;\n\
  ```\n\n### 筛选索引的统计信息\n\n筛选索引的目的是限制构成索引的数据，从而改变密度和直方图以使索引性能更佳。此示例将使用 AdventureWorks2012\
  \ 数据库中的一个表，而不是测试表。在 `Sales.PurchaseOrderHeader` 表的 `PurchaseOrderNumber` 列上创建索引。\n\
  \n```sql\nCREATE INDEX IX_Test\nON Sales.SalesOrderHeader (PurchaseOrderNumber);\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-220_1.jpg)\n\
  \n![](img/index-220_2.jpg)\n\n第 12 章 ■ 统计信息、数据分布与基数\n\n图 12-23 显示了针对此新索引运行的 `DBCC\
  \ SHOW_STATISTICS` 输出的标头和密度。\n\n```sql\nDBCC SHOW_STATISTICS('Sales.SalesOrderHeader',IX_Test);\n\
  ```\n\n**图 12-23.** 未筛选索引的统计信息标头\n\n如果重新创建相同的索引以处理列中不为 `NULL` 的值，它将如下所示：\n\n```sql\n\
  CREATE INDEX IX_Test\nON Sales.SalesOrderHeader (PurchaseOrderNumber)\nWHERE PurchaseOrderNumber\
  \ IS NOT NULL\nWITH DROP_EXISTING = ON;\n```\n\n现在，在图 12-24 中查看统计信息。\n\n**图 12-24.**\
  \ 筛选索引的统计信息标头\n\n首先你可以看到，由于存在筛选器，构成统计信息的行数在筛选索引中急剧下降，从 31465 行降至 3806 行。还要注意，由于不再处理零长度字符串，平均键长增加了。定义了筛选表达式，而不是图\
  \ 12-21 中可见的 `NULL` 值。但两组数据的未筛选行是相同的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 统计信息、数据分布与基数\n\n\n\n密度测量结果很有意思。请注意，两个值的密度接近，但过滤后的密度略低，这意味着唯一值更少。这是因为过滤后的数据虽然选择性稍低，但实际上更准确，它消除了所有不会对搜索有贡献的\
  \ `NULL` 值。而第二个值（代表聚集索引指针）的密度与 `PurchaseOrderNumber` 单独的密度值相同，因为它们都代表了相同数量的唯一数据。上一列中额外聚集索引的密度是一个小得多的数字，这是由于\
  \ `SalesOrderId` 的所有唯一值因为 `NULL` 值的消除而未包含在过滤数据中。你还可以看到，直方图的第一列在图 12-23 中显示为 `NULL`\
  \ 值，但在图 12-24 中却有值。\n\n你还可以选择创建筛选统计信息。这允许你创建更精细的直方图。这在分区表上尤其有用。这是必要的，因为统计信息不会在分区表上自动创建，而且你无法使用\
  \ `CREATE STATISTICS` 创建自己的统计信息。你可以按分区创建筛选索引并获取统计信息，或者专门为分区创建筛选统计信息。\n\n继续之前，清理（如有）已创建的索引。\n\
  ```\nDROP INDEX Sales.SalesOrderHeader.IX_Test;\n```\n\n**基数**\n\n统计信息由直方图和密度组成，查询优化器使用它们来计算查询执行中每个过程（称为\
  \ `operations`）预期返回的行数。这个确定返回行数的计算称为 `cardinality estimate`（基数估计）。基数表示数据集中的行数，这意味着它与\
  \ SQL Server 中的密度度量直接相关。从 SQL Server 2014 开始，引入了一个新的基数估计器。这是自 SQL Server 7.0 以来对核心基数估计过程的首次更改。\n\
  \n估计器某些区域的更改意味着优化器以与以前相同的方式读取统计信息，但优化器根据已修改的基数计算，执行不同类型的计算来确定在执行计划中将通过每个操作的行数。\n\
  \n大多数情况下，数据是从直方图中提取的。对于单个谓词，值简单地使用直方图定义的选择性。但是，当使用多个列进行过滤时，基数计算必须考虑每个列潜在的选择性。在 SQL\
  \ Server 2014 之前，使用几个简单的计算来确定基数。对于 `AND` 组合，计算基于将第一列的选择性乘以第二列的选择性，类似于这样：`Selectivity1\
  \ * Selectivity2 * Selectivity3 ...`\n\n两个列之间的 `OR` 计算则更复杂。新的计算看起来像这样：`Selectivity1\
  \ * Power(Selectivity2,1/2) * Power(Selectivity3,1/4) ...`\n\n简而言之，不是简单地相乘选择性以产生越来越高选择性的数据，而是提供了一个更柔和的计算，从选择性最低的数据到选择性最高的数据，但通过获取选择性的\
  \ 1/2 次幂，然后 1/4 次幂，然后 1/8 次幂等等（取决于涉及多少列数据），从而得到一个更柔和、偏斜更小的估计。它不会改变所有生成的执行计划，但更准确的估计可能会改变某些位置的计划。\n\
  \n在 SQL Server 2014 中，发生了几组新的计算。这意味着对于大多数查询，平均而言，如果你的统计信息是最新的，你可能会看到性能提升，因为更准确的基数计算意味着优化器会做出更好的选择。但是，由于基数计算方式的更改，某些查询你也可能看到性能下降。这是可以预期的，因为你可能会遇到各种各样的工作负载、架构和数据分布。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 12 章 ■ 统计信息、数据分布和基数**\n\
  \nSQL Server 2014 引入了另一个新的基数估计。在 SQL Server 2012 及更早版本中，当索引中包含递增或递减增量（例如标识列或日期时间值）的值引入了一个超出当前直方图范围的新行时，优化器会回退到其对无统计信息数据的默认估计，即一行。这可能导致严重不准确的查询计划，引起性能问题。现在，有了全新的计算。\n\
  \n首先，如果你使用 `FULLSCAN`（在“统计信息维护”部分详细解释）创建了统计信息，并且数据没有被修改，那么基数估计的工作方式与以前相同。\n\n但是，如果统计信息是使用默认抽样创建的，或者数据已被修改，那么基数估计器将基于该统计信息集中返回的平均行数进行工作，并假设它不是单行。这可以使执行计划准确得多，但假设数据分布相当一致。不均匀的分布（称为\
  \ `skewed data`，偏斜数据）可能导致糟糕的基数估计，从而导致类似于糟糕的参数嗅探（在第 16 章详细介绍）的行为。\n\n你现在可以使用扩展事件，通过\
  \ `query_optimizer_estimate_cardinality` 事件来观察基数估计的实际操作。我不会详细介绍事件的所有可能输出，但我确实想展示如何观察优化器行为，并在执行计划和基数估计之间建立关联。\n\
  \n对于绝大多数查询调优来说，这并不是那么有帮助，但如果你不确定优化器是如何做出估计的，或者这些估计似乎不准确，你可以使用这种方法进一步调查信息。\n\n首先，你应该使用\
  \ `query_optimizer_estimate_cardinality` 事件设置一个扩展事件会话。\n\n我创建了一个包含 `auto_stats`\
  \ 事件的示例。然后，我运行了一个查询。\n```\nSELECT so.Description,\n       p.Name AS ProductName,\n\
  \       p.ListPrice,\n       p.Size,\n       pv.AverageLeadTime,\n       pv.MaxOrderQty,\n\
  \       v.Name AS VendorName\nFROM   Sales.SpecialOffer AS so\n       JOIN Sales.SpecialOfferProduct\
  \ AS sop\n            ON  sop.SpecialOfferID = so.SpecialOfferID\n       JOIN Production.Product\
  \ AS p\n            ON  p.ProductID = sop.ProductID\n       JOIN Purchasing.ProductVendor\
  \ AS pv\n            ON  pv.ProductID = p.ProductID\n       JOIN Purchasing.Vendor\
  \ AS v\n            ON  v.BusinessEntityID = pv.BusinessEntityID\nWHERE  so.DiscountPct\
  \ > .15;\n```\n\n我选择了一个稍微复杂一些的查询，这样在执行计划中就有大量的运算符。当我运行查询时，我可以看到扩展事件会话的输出，如图 12-25\
  \ 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-223_1.jpg)\n\
  \n![](img/index-223_2.jpg)\n\n**第 12 章 ■ 统计信息、数据分布和基数**\n\n**图 12-25.** 显示 `query_optimizer_estimate_cardinality`\
  \ 事件输出的会话\n图 12-25 中可见的第一个事件显示 `auto_stats` 事件触发，因为它加载了索引 `Purchasing.ProductVendor.IX_ProductVendor_BusinessEntityID`\
  \ 的统计信息。这意味着在基数估计触发之前，统计信息已经准备就绪。有多个这样的事件，包括一个针对 `PK_ProductID` 列的事件。\n\n\n## 随后，“详细信息”选项卡上的信息是基数估算计算的结果输出。详细信息以\
  \ XML 格式包含在 `calculator` 字段和 `input_relation` 字段中。这些字段将显示计算的类型以及计算中使用的值。\n\n如果您还捕获了查询的执行计划，您将在计划中获得额外的信息，以帮助您将基数估算与计划内的操作关联起来。如果您查看\
  \ `PK_ProductID` 列的 `Seek` 运算符的属性，您将获得如图 12-26 所示的值。\n\n图 12-26. `聚集索引 Seek` 运算符的属性\n\
  \n`StatsCollectionId` 的值直接对应于图 12-25 中所示的事件以及该图中的 `stats_collection_id` 字段。这使您能够将统计信息收集事件与执行计划中的特定运算符相匹配。\n\
  \n## 启用和禁用基数估算器\n\n如果您在 SQL Server 2014 中创建数据库，它将自动带有设置为 `120` 的兼容级别，这是 SQL Server\
  \ 2014 的正确版本。但是，如果您从早期版本的 SQL Server 还原或附加数据库，则兼容级别将设置为该版本，即 `110` 或更早。该数据库随后将使用\
  \ SQL Server 7 基数估算器。您可以通过查看执行计划中第一个运算符（`SELECT`/`INSERT`/`UPDATE`/`DELETE`）的 `CardinalityEstimationModelVersion`\
  \ 属性来判断，如图 12-27 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-224_1.jpg)\n\
  \n第 12 章 ■ 统计信息、数据分布与基数\n\n图 12-27. 第一个运算符中显示正在使用的基数估算器的属性\n\nSQL Server 2014 的显示值将对应于版本\
  \ `120`。这就是您可以判断正在使用哪个版本的基数估算器的方法。这很重要，因为估算可能导致执行计划的更改，因此您必须了解如何在因新的基数估算而导致性能下降时进行故障排除。\n\
  \n如果您怀疑遇到了升级引起的问题，您绝对应该比较执行计划中操作返回的实际行数与估计行数。这始终是判断统计信息或基数估算是否给您带来问题的好方法。您可以选择通过将兼容级别设置为\
  \ `110` 来禁用整个升级，但这也同时禁用了其他 SQL Server 2014 功能，因此可能不是一个好的选择。您可以对数据库的还原使用 `OPTION\
  \ (QUERYTRACEON 9481)` 运行一个跟踪标志，这将仅针对该数据库的基数估算器。如果您在某个给定查询中确定遇到了新的基数估算器的问题，您可以在查询中以相同的方式利用跟踪标志。\n\
  \n```sql\nSELECT p.Name,\n    p.Class\nFROM Production.Product AS p\nWHERE p.Color\
  \ = 'Red' AND\n    p.DaysToManufacture > 15\nOPTION(QUERYTRACEON 9481);\n```\n\n\
  相反，如果您已使用跟踪标志或兼容级别关闭了基数估算器，您可以使用与之前相同的功能，但将跟踪标志值替换为 `2312`，有选择地为给定查询启用它。\n\n## 统计信息维护\n\
  \nSQL Server 允许用户手动覆盖单个数据库中统计信息的维护。控制 SQL Server 自动统计信息维护行为的四个主要配置如下：\n\n-   在没有索引的列上创建新统计信息（`自动创建统计信息`）\n\
  -   更新现有统计信息（`自动更新统计信息`）\n-   用于生成统计信息的抽样程度\n-   异步更新现有统计信息（`自动异步更新统计信息`）\n\n您可以在数据库级别（所有表的所有索引和统计信息）或针对单个索引或统计信息逐案控制上述配置。`自动创建统计信息`设置仅适用于非索引列，因为\
  \ SQL Server 在创建索引时总是为索引键创建统计信息。\n\n`自动更新统计信息`设置及其异步版本适用于索引和没有索引的 `WHERE` 子句列上的统计信息。\n\
  \n## 自动维护\n\n默认情况下，SQL Server 会自动处理统计信息。`自动创建统计信息`和`自动更新统计信息`设置默认都是开启的。如前所述，通常最好保持这些设置为开启状态。`自动异步更新统计信息`设置默认是关闭的。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-225_1.jpg)\n\
  \n第 12 章 ■ 统计信息、数据分布与基数\n\n### 自动创建统计信息\n\n`自动创建统计信息`功能会在查询的 `WHERE` 子句中引用非索引列时，自动在该列上创建统计信息。例如，当针对没有索引的列在\
  \ `Sales.SalesOrderHeader` 表上运行此 `SELECT` 语句时，将为该列创建统计信息。\n\n```sql\nSELECT cc.CardNumber,\n\
  \    cc.ExpMonth,\n    cc.ExpYear\nFROM Sales.CreditCard AS cc\nWHERE cc.CardType\
  \ = 'Vista';\n```\n\n然后，`自动创建统计信息`功能（如果您已将其关闭，请确保重新打开）会自动在 `CardType` 列上创建统计信息。您可以在图\
  \ 12-28 的扩展事件会话输出中看到这一点。\n\n图 12-28. `AUTO_CREATE_STATISTICS ON` 的会话输出\n\n`auto_stats`\
  \ 事件触发以创建新的统计信息集。您可以在 `statistics_list` 字段中看到正在发生的事情的详细信息：“已创建：`CardType`。”\n\n\
  ### 自动更新统计信息\n\n`自动更新统计信息`功能会在永久表被查询引用时，自动更新其索引和列上的现有统计信息，前提是统计信息已被标记为过时。更改类型是操作语句，例如\
  \ `INSERT`、`UPDATE` 和 `DELETE`。更改数量的默认阈值取决于表中的行数，如表 12-4 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 统计信息、数据分布与基数\n\n表 12-4. 更改数量的统计信息更新阈值\n\n| 行数 | 更改数量阈值 |\n| --- | ---\
  \ |\n| < 500 | > 1 次插入 |\n| >500 | 500 + 行更改的 20% |\n\n行更改计为表中插入、更新或删除的次数。\n\n使用阈值可以降低自动更新统计信息的频率。例如，考虑以下表（下载中的\
  \ `--autoupdates`）：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.Test1')\n) IS NOT NULL\n\
  DROP TABLE dbo.Test1;\n\nCREATE TABLE dbo.Test1 (C1 INT);\nCREATE INDEX ixl ON dbo.Test1(C1);\n\
  INSERT INTO dbo.Test1\n    (C1)\nVALUES (0);\n```\n\n在创建非聚集索引后，向表中添加了一行。这使得非聚集索引上的现有统计信息过时。如果执行以下带有\
  \ `WHERE` 子句中引用索引列的 `SELECT` 语句，如下所示，那么 `自动更新统计信息`功能会自动更新非聚集索引上的统计信息，如图 12-29 的会话输出所示。\n\
  \n```sql\nSELECT C1\nFROM dbo.Test1\nWHERE C1 = 0;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-227_1.jpg)\n\n第 12 章 ■ 统计信息、数据分布与基数\n\n图 12-29. `AUTO_UPDATE_STATISTICS\
  \ ON` 的会话输出\n\n统计信息更新后，相应表的更改跟踪机制被设置为 `0`。\n\n通过这种方式，SQL Server 可以跟踪表的更改次数，并管理自动更新统计信息的频率。\n\
  \n\n"
- '# 第 12 章：统计信息、数据分布与基数


  对于大型表，你可能会发现需要更频繁地更新统计信息。如前所述，你可以使用跟踪标志 `2371` 来修改统计信息自动更新的默认行为。


  启用该跟踪标志后，系统会采用一个滑动刻度，随着系统内数据量的增加而更频繁地更新统计信息。


  ### 异步自动更新统计信息


  如果将异步自动更新统计信息设置为开启，SQL Server 中统计信息的基本行为并不会发生根本性改变。当一组统计信息被标记为过时，并且随后有查询使用这些统计信息运行时，统计信息更新**不会**像通常那样中断查询的执行。相反，查询会使用旧的统计信息集完成执行。查询完成后，统计信息才会被更新。这种做法可能吸引人的原因是，当统计信息更新时，存储过程缓存中的查询计划会被移除，而正在运行的查询必须重新编译。因此，与其让查询同时等待统计信息更新和存储过程的重新编译，不如让查询先完成其运行。下次调用同一个查询时，它将使用已更新的统计信息，并且只需进行重新编译即可。


  尽管此功能确实使重新编译在一定程度上变快，但它也可能导致本可以从更新的统计信息和新执行计划中受益的查询，继续使用旧的执行计划。在开启此功能之前，需要进行仔细的测试，以确保它不会弊大于利。


  **注意**：若要异步更新统计信息，你必须先将 `AUTO_UPDATE_STATISTICS` 设置为 `ON`。


  ### 手动维护


  在以下情况下，你需要干预或协助统计信息的自动维护：


  *   当试验统计信息时：一个友好的建议——请将你的生产服务器与你在本书中进行的此类实验隔离开来。

  *   从早期版本升级到 SQL Server 2014 之后：由于 SQL Server 2014 的统计信息维护已升级和修改，升级后应立即手动更新整个数据库的统计信息，而不是等待
  SQL Server 借助自动统计功能随时间推移进行更新。此外，我建议你对此统计信息更新使用 `FULLSCAN`，以确保它们尽可能准确。据我所知，唯一不适用的版本是从
  SQL Server 2008 到 SQL Server 2008 R2 的版本。关于这是否必要存在一些争议，但在大多数情况下，这样做是安全且稳妥的。

  *   在执行一系列你不会再次运行的临时 SQL 活动时：在这种情况下，你必须权衡是否愿意支付自动统计信息维护的成本，以在这一次获得更好的计划，同时影响其他 SQL
  Server 活动的性能。因此，一般来说，你可能不需要关心这种一次性操作。这主要适用于较大的数据库，但如果你认为可能适用，可以在你的环境中进行测试。

  *   当你遇到自动统计信息维护问题，并且目前的唯一解决方法是关闭自动统计信息维护功能时：即使在这些情况下，你也可以只针对遇到问题的特定数据库表关闭此功能，而不是为整个数据库禁用它。此类问题可能出现在数据更新频繁但不足以触发更新阈值的大型数据集中。此外，当自动更新的采样级别对于某些数据分布不够充分时，也可以使用此方法。

  *   在分析查询性能时，你发现查询引用的少数数据库对象缺少统计信息：这可以从图形和 XML 执行计划中进行评估，如本章前面所述。

  *   在分析统计信息的有效性时，你发现它们不准确：当本应良好的统计信息集却生成了糟糕的执行计划时，就可以确定这一点。


  SQL Server 允许用户控制其许多自动统计信息维护功能。你可以分别使用 `auto create statistics` 和 `auto update statistics`
  设置来启用（或禁用）自动统计信息创建和更新功能，然后你就可以动手操作了。


  #### 管理统计信息设置


  你可以在数据库级别控制 `auto create statistics` 设置。要禁用此设置，请使用 `ALTER DATABASE` 命令：


  ```sql

  ALTER DATABASE AdventureWorks2012 SET AUTO_CREATE_STATISTICS OFF;

  ```


  你可以在数据库的不同级别控制 `auto update statistics` 设置，包括表上的所有索引和统计信息，或者在单个索引或统计信息级别。要在数据库级别禁用
  `auto update statistics`，请使用 `ALTER DATABASE` 命令。


  ```sql

  ALTER DATABASE AdventureWorks2012 SET AUTO_UPDATE_STATISTICS OFF;

  ```


  在数据库级别禁用此设置会覆盖较低级别的单个设置。`异步更新统计信息` 要求 `自动更新统计信息` 首先处于开启状态。然后你才能启用异步更新。


  ```sql

  ALTER DATABASE AdventureWorks2012 SET AUTO_UPDATE_STATISTICS_ASYNC ON;

  ```


  要为当前数据库中表上的所有索引和统计信息配置 `auto update statistics`，请使用 `sp_autostats` 系统存储过程。


  ```sql

  USE AdventureWorks2012;

  EXEC sp_autostats ''HumanResources.Department'', ''OFF'';

  ```


  你也可以使用相同的存储过程为单个索引或统计信息配置此设置。要为 `AdventureWorks2012.HumanResources.Department` 上的
  `AK_Department_Name` 索引禁用此设置，请执行以下语句：


  ```sql

  EXEC sp_autostats ''HumanResources.Department'', ''OFF'', AK_Department_Name;

  ```


  你还可以使用 `UPDATE STATISTICS` 命令的 `WITH NORECOMPUTE` 选项，为当前数据库中表上的所有或单个索引和统计信息禁用此设置。`sp_createstats`
  存储过程也有 `NORECOMPUTE` 选项。`NORECOMPUTE` 选项不会禁用数据库的自动统计信息更新，但会针对给定的一组统计信息禁用自动更新。


  避免禁用自动统计信息功能，除非你已通过测试确认这能带来性能优势。如果自动统计信息功能被禁用，那么你就有责任手动识别未索引列上缺失的统计信息并进行创建，然后保持现有统计信息为最新状态。一般来说，你只会在非常大的表上禁用自动统计信息功能。


  如果你想检查某个表是否已关闭其自动统计信息，可以使用：


  ```sql

  EXEC sp_autostats ''HumanResources.Department'';

  ```


  重置索引的自动维护，以便在已关闭的位置将其重新开启。


  ```sql

  EXEC sp_autostats ''HumanResources.Department'', ''ON'';

  EXEC sp_autostats ''HumanResources.Department'', ''ON'', AK_Department_Name;

  ```


  #### 生成统计信息


  要手动创建统计信息，请使用以下选项之一：


  *   `CREATE STATISTICS`：你可以使用此选项在表或索引视图的单个或多个列上创建统计信息。与 `CREATE INDEX` 命令不同，`CREATE
  STATISTICS` 默认使用采样。




  '
- '# 第 12 章 ■ 统计、数据分布与基数


  • `sys.sp_createstats`：使用此存储过程为当前数据库中所有用户表的所有符合条件的列创建单列统计信息。这包括除计算列、具有 `NTEXT`、`TEXT`、`GEOMETRY`、`GEOGRAPHY`
  或 `IMAGE` 数据类型的列、稀疏列以及已有统计信息或是索引首列的列之外的所有列。


  此功能主要用于向后兼容，我不建议使用它。


  类似地，要手动更新统计信息，请使用以下选项之一：


  • `UPDATE STATISTICS`：您可以使用此选项更新表或索引视图的单个或所有索引键及非索引列的统计信息。


  • `sys.sp_updatestats`：使用此存储过程更新当前数据库中所有用户表的统计信息。


  您可能会发现，允许自动更新统计信息对于您的系统来说并不完全足够。在非工作时段安排对数据库执行 `UPDATE STATISTICS` 是处理此问题的可接受方法。`UPDATE
  STATISTICS` 是首选机制，因为它提供了更高程度的灵活性和控制力。由于插入的数据类型，用于收集统计信息的抽样方法（因其速度更快而被采用）可能无法收集到适当的数据。在这些情况下，您可以强制执行
  `FULLSCAN`，以便使用所有数据来更新统计信息，就像统计信息最初创建时那样。这可能是一项成本高昂的操作，因此最好有选择性地决定对哪些索引进行此类处理以及何时运行。


  ■ 注意 通常，您应始终使用自动统计信息的默认设置。仅在确认默认设置似乎有损性能后，才考虑修改这些设置。


  #### 统计信息维护状态


  您可以使用以下方法验证自动统计信息功能的当前设置：


  • `sys.databases`


  • `DATABASEPROPERTYEX`


  • `sp_autostats`


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-231_1.jpg)


  #### 自动创建统计信息的状态


  您可以通过查询 `sys.databases` 系统表来验证自动创建统计信息的当前设置。


  ```sql

  SELECT is_auto_create_stats_on

  FROM sys.databases

  WHERE [name] = ''AdventureWorks2012'';

  ```


  返回值 1 表示启用，值 0 表示禁用。


  您还可以使用 `sp_autostats` 系统存储过程验证特定索引的状态，如以下代码所示。向该存储过程提供任何表名，都将在全局统计信息设置的“输出”部分提供当前数据库的自动创建统计信息配置值。


  ```sql

  USE AdventureWorks2012;

  EXEC sys.sp_autostats

  ''HumanResources.Department'';

  ```


  图 12-30 显示了前述 `sp_autostats` 语句输出的摘录。


  图 12-30. `sp_autostats` 输出


  返回值 `ON` 表示启用，`OFF` 表示禁用。正如本章前面所述，在验证自动更新统计信息状态时，此存储过程更为有用。


  #### 自动更新统计信息的状态


  您可以以与验证自动创建统计信息类似的方式，验证自动更新统计信息以及异步自动更新统计信息的当前设置。使用函数 `DATABASEPROPERTYEX` 的方法如下：


  ```sql

  SELECT DATABASEPROPERTYEX(''AdventureWorks2012'', ''IsAutoUpdateStatistics'');

  ```


  使用 `sp_autostats` 的方法如下。


  ```sql

  USE AdventureWorks2012;

  EXEC sp_autostats

  ''Sales.SalesOrderDetail'';

  ```


  #### 分析统计信息对查询的有效性


  出于性能原因，在数据库对象上维护适当的统计信息极为重要。与统计信息相关的问题可能相当常见。在分析查询性能时，您需要对统计信息可能出现问题的可能性保持警惕。如果确实出现统计信息问题，那么它真的会让您大费周章。




  实际上，在查询调优会话开始时检查统计信息是否为最新，可以避免一个容易修复的问题。在本节中，你将了解到当发现统计信息缺失或过时时，可以采取哪些措施。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


