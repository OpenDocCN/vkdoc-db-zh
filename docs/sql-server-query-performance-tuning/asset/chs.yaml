- "# 查询重编译\n\n#### 执行计划老化\n\nSQL Server 通过维护缓存中执行计划的“年龄”来管理过程缓存的大小，正如你在第 15 章所见。如果一个存储过程长时间没有重新执行，其执行计划的年龄字段可能降至\
  \ 0，并且该计划可能因内存压力而被从缓存中移除。当这种情况发生且存储过程被重新执行时，将生成一个新计划并缓存到过程缓存中。然而，如果系统中有足够的内存，未使用的计划在内存压力增加之前不会从缓存中移除。\n\
  \n#### 显式调用 sp_recompile\n\n当架构更改或统计信息发生足够变化时，SQL Server 会自动重编译查询。它还提供了 `sp_recompile`\
  \ 系统存储过程来手动将整个存储过程标记为待重编译。\n\n可以在表、视图、存储过程或触发器上调用此存储过程。如果在存储过程或触发器上调用，则该存储过程或触发器将在下次执行时重编译。在表或视图上调用\
  \ `sp_recompile` 会将引用该表/视图的所有存储过程和触发器标记为在下次执行时重编译。\n\n例如，如果在表 `Test1` 上调用 `sp_recompile`，所有引用表\
  \ `Test1` 的存储过程和触发器都将被标记为待重编译，并在下次执行时重编译，如下所示：\n\n```sql\nsp_recompile 'Test1';\n\
  ```\n\n在使用 `sp_executesql` 执行动态查询时，可以使用 `sp_recompile` 来取消对现有计划的重用。如前一章所述，对于变量部分的值范围可能需要不同处理策略的查询，不应将其参数化。例如，重新考虑相应的示例，你知道查询的第二次执行重用了为第一次执行生成的计划。为了便于参考，此处重复该示例：\n\
  \n```sql\nDBCC FREEPROCCACHE; -- 清除过程缓存\nGO\nDECLARE @query NVARCHAR(MAX);\nDECLARE\
  \ @param NVARCHAR(MAX);\nSET @query = N'SELECT soh.SalesOrderNumber, soh.OrderDate,\
  \ sod.OrderQty, sod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail\
  \ AS sod ON soh.SalesOrderID = sod.SalesOrderID\nWHERE soh.CustomerID >= @CustomerId;';\n\
  SET @param = N'@CustomerId INT';\nEXEC sp_executesql @query, @param, @CustomerId\
  \ = 1;\nEXEC sp_executesql @query, @param, @CustomerId = 30118;\n```\n\n查询的第二次执行对\
  \ `SalesOrderHeader` 表执行索引扫描操作以检索数据。如第 8 章所述，对于第二次执行，可能更倾向于在 `SalesOrderHeader`\
  \ 表上执行索引查找操作。你可以通过以下方式在 `SalesOrderHeader` 表上执行 `sp_recompile` 系统存储过程来实现这一点：\n\n\
  ```sql\nEXEC sp_recompile 'Sales.SalesOrderHeader'\n```\n\n现在，如果使用第二个参数值重新执行该查询，查询的计划将如前面的\
  \ `sp_recompile` 语句所标记的那样被重编译。这使得 SQL Server 能够为第二次执行生成最优计划。\n\n嗯，这里有一个小问题：你可能会希望再次执行第一条语句。由于计划存在于缓存中，SQL\
  \ Server 将为第一条语句重用该计划（在 `SalesOrderHeader` 表上的索引扫描操作），即使使用索引查找操作（利用过滤条件列 `soh.CustomerID`\
  \ 上的索引）本来会更优。避免此问题的一种方法是为查询创建一个存储过程，并在语句上使用 `OPTION (RECOMPILE)` 子句。接下来我将介绍控制重编译的各种方法。\n\
  \n#### 显式使用 RECOMPILE\n\nSQL Server 允许通过三种方式使用 `RECOMPILE` 命令显式重编译存储过程和查询：在 `CREATE\
  \ PROCEDURE` 语句中、作为 `EXECUTE` 语句的一部分以及在查询提示中。这些方法会降低计划重用的效率，因此你应在以下部分解释的具体情况下才考虑它们。\n\
  \n##### RECOMPILE 子句与 CREATE PROCEDURE 语句\n\n有时，存储过程的计划需求会随着传递给存储过程的参数值的变化而变化。在这种情况下，对不同参数值重用同一个计划可能会降低存储过程的性能。你可以通过在\
  \ `CREATE PROCEDURE` 语句中使用 `RECOMPILE` 子句来避免此问题。例如，对于上一节中的查询，你可以使用 `RECOMPILE` 子句创建一个存储过程。\n\
  \n```sql\nIF (SELECT OBJECT_ID('dbo.CustomerList')) IS NOT NULL\n    DROP PROC dbo.CustomerList;\n\
  GO\nCREATE PROCEDURE dbo.CustomerList @CustomerId INT\nWITH RECOMPILE\nAS\nSELECT\
  \ soh.SalesOrderNumber,\n       soh.OrderDate,\n       sod.OrderQty,\n       sod.LineTotal\n\
  FROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail AS sod\n    ON soh.SalesOrderID\
  \ = sod.SalesOrderID\nWHERE soh.CustomerID >= @CustomerId;\nGO\n```\n\n`RECOMPILE`\
  \ 子句会阻止过程内每个语句的存储过程计划被缓存。每次执行存储过程时，都会生成新计划。因此，如果使用 `soh.CustomerID` 值 30118 或 1\
  \ 执行存储过程：\n\n```sql\nEXEC CustomerList @CustomerId = 1;\nEXEC CustomerList @CustomerId\
  \ = 30118;\n```\n\n会在每次执行期间生成一个新计划，如图 17-12 所示。\n\n##### RECOMPILE 子句与 EXECUTE 语句\n\
  \n如前所示，存储过程中的特定参数值根据其性质可能需要不同的计划。你可以将 `RECOMPILE` 子句从存储过程中移出，并在执行存储过程时根据具体情况使用它，如下所示：\n\
  \n```sql\nEXEC dbo.CustomerList\n    @CustomerId = 1\n    WITH RECOMPILE;\n```\n\
  \n当使用 `RECOMPILE` 子句执行存储过程时，会临时生成一个新计划。新计划不会被缓存，也不会影响现有计划。当不使用 `RECOMPILE` 子句执行存储过程时，计划照常缓存。与在\
  \ `CREATE PROCEDURE` 语句中使用 `RECOMPILE` 子句相比，这提供了对现有计划缓存重用性的某种程度控制。\n\n\n\n由于带有 `RECOMPILE`\
  \ 子句执行的存储过程的计划不会被缓存，因此每次使用 `RECOMPILE` 子句执行该存储过程时，都会重新生成计划。然而，为了获得更好的性能，与其使用 `RECOMPILE`，不如考虑为每个需要不同计划的参数值集分别创建独立的存储过程——前提是这些计划易于识别，且您只需处理少量可能的计划。\n\
  \n##### 使用 RECOMPILE 提示控制单个语句\n\n虽然可以使用前述任一方法来重新编译整个过程，但如果过程包含多条命令，这可能会带来问题。使用前述任一方法时，过程中的所有语句都将被重新编译。对于某些查询，编译时间可能是执行过程中最昂贵的部分，因此应尽量避免重新编译。为此，一种更精细的方法是将重新编译隔离到仅需要它的语句。这可以通过使用\
  \ `RECOMPILE` 查询提示来实现，如下所示：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.CustomerList')\n\
  ) IS NOT NULL\nDROP PROC dbo.CustomerList;\nGO\n\nCREATE PROCEDURE dbo.CustomerList\
  \ @CustomerId INT\nAS\nSELECT soh.SalesOrderNumber,\n       soh.OrderDate,\n   \
  \    sod.OrderQty,\n       sod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN\
  \ Sales.SalesOrderDetail AS sod\n  ON soh.SalesOrderID = sod.SalesOrderID\nWHERE\
  \ soh.CustomerID >= @CustomerId\nOPTION (RECOMPILE);\nGO\n```\n\n此过程的表现看起来与将 `RECOMPILE`\
  \ 应用于整个过程时相同，但如果您向此查询添加多个语句，则只有带有 `OPTION (RECOMPILE)` 查询提示的语句会在每次执行过程时进行编译。\n\n\
  ## 避免重新编译\n\n有时重新编译是有益的，但有时则值得避免。如果在查询的 `WHERE` 或 `JOIN` 子句引用的列上创建了新索引，那么重新生成引用该表的存储过程的执行计划是合理的，这样它们才能从使用索引中受益。但是，如果认为重新编译对性能有害（例如导致阻塞或消耗\
  \ CPU 等资源），您可以通过以下实现实践来避免它：\n\n-   不要交错使用 DDL 和 DML 语句。\n-   避免由统计信息更改引起的重新编译。\n\
  -   使用 `KEEPFIXED PLAN` 选项。\n-   禁用表上的自动更新统计信息功能。\n-   使用表变量。\n-   避免在存储过程中更改 `SET`\
  \ 选项。\n-   使用 `OPTIMIZE FOR` 查询提示。\n-   使用计划指南。\n\n### 不要交错 DDL 和 DML 语句\n\n在存储过程中，DDL\
  \ 语句常用于创建本地临时表并更改其架构（包括添加索引）。这样做会影响现有计划的有效性，并可能导致在执行引用这些表的存储过程语句时发生重新编译。要理解对本地临时表使用\
  \ DDL 语句如何导致存储过程重复重新编译，请考虑以下示例：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.TempTable')\n\
  ) IS NOT NULL\nDROP PROC dbo.TempTable\nGO\n\nCREATE PROC dbo.TempTable\nAS\nCREATE\
  \ TABLE #MyTempTable (ID INT,Dsc NVARCHAR(50))\nINSERT INTO #MyTempTable\n(ID,\n\
  \ Dsc)\nSELECT pm.ProductModelID,\n       pm.[Name]\nFROM Production.ProductModel\
  \ AS pm; --需要第 1 次重新编译\n\nSELECT *\nFROM #MyTempTable AS mtt;\n\nCREATE CLUSTERED\
  \ INDEX iTest ON #MyTempTable (ID);\n\nSELECT *\nFROM #MyTempTable AS mtt; --需要第\
  \ 2 次重新编译\n\nCREATE TABLE #t2 (c1 INT);\n\nSELECT *\nFROM #t2;\n--需要第 3 次重新编译\n\
  GO\n\nEXEC dbo.TempTable; --首次执行\n```\n\n此存储过程交错使用了 DDL 和 DML 语句。图 17-13 展示了此代码的扩展事件输出。\n\
  \n\n"
- "# 第 17 章 ■ 查询重编译\n\n`图 17-13.` 扩展事件输出，显示因 DDL 和 DML 交错执行而导致的重编译。可以看到，这些语句被重编译了四次。\n\
  \n*   查询首次执行时生成的执行计划不包含任何关于局部临时表的信息。因此，最初生成的计划永远无法用于通过 DML 语句访问该临时表。\n*   第二次重编译源于表在加载过程中其包含数据的变化。\n\
  *   第三次重编译是由第一个临时表 (`#MyTempTable`) 的架构更改引起的。在 `#MyTempTable` 上创建索引会使现有计划失效，导致再次访问该表时发生重编译。如果在此索引是在第一次重编译之前创建的，那么现有计划对于第二个\
  \ `SELECT` 语句也将保持有效。因此，你可以通过将 `CREATE INDEX` DDL 语句放在所有引用该表的 DML 语句之前来避免此次重编译。\n\
  *   第四次重编译生成了一个包含 `#t2` 处理策略的计划。现有计划没有关于 `#t2` 的信息，因此无法用于通过第三个 `SELECT` 语句访问 `#t2`。如果\
  \ `#t2` 的 `CREATE TABLE` DDL 语句被放置在所有可能导致重编译的 DML 语句之前，那么第一次重编译本身就会包含关于 `#t2` 的信息，从而避免第三次重编译。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 避免因统计信息更改导致的重编译\n\n在“分析重编译原因”一节中，你看到统计信息的更改是重编译的原因之一。对于一个具有均匀数据分布的简单表，因统计信息更改而导致的重编译可能会生成一个与前一计划相同的计划。在这种情况下，重编译可能是不必要的，如果成本过高则应避免。但是，大多数情况下，统计信息的更改需要反映在执行计划中。我这里指的是那些重编译时间过长或重编译次数过多影响到\
  \ CPU 的情况。\n\n你有两种技术可以避免因统计信息更改导致的重编译。\n\n*   使用 `KEEPFIXED PLAN` 选项。\n*   禁用表上的自动更新统计信息功能。\n\
  \n#### 使用 KEEPFIXED PLAN 选项\n\nSQL Server 提供了 `KEEPFIXED PLAN` 选项来避免因统计信息更改而导致的重编译。要了解如何使用\
  \ `KEEPFIXED PLAN`，请考虑 `statschanges.sql` 脚本，并做适当修改以使用 `KEEPFIXED PLAN` 选项。\n\n\
  ```sql\n--创建一个包含一行数据和索引的小表\nIF (SELECT OBJECT_ID('dbo.Test1')) IS NOT NULL\n   \
  \ DROP TABLE dbo.Test1 ;\nGO\nCREATE TABLE dbo.Test1 (C1 INT, C2 CHAR(50)) ;\nINSERT\
  \ INTO dbo.Test1\nVALUES (1, '2') ;\nCREATE NONCLUSTERED INDEX IndexOne ON dbo.Test1\
  \ (C1) ;\n\n--创建一个引用前述表的存储过程\nIF (SELECT OBJECT_ID('dbo.TestProc')) IS NOT NULL\n\
  \    DROP PROC dbo.TestProc ;\nGO\nCREATE PROC dbo.TestProc\nAS\n    SELECT *\n\
  \    FROM dbo.Test1 AS t\n    WHERE t.C1 = 1\n    OPTION (KEEPFIXED PLAN) ;\nGO\n\
  \n--第一次执行存储过程，表中只有 1 行数据\nEXEC dbo.TestProc ; --第一次执行\n\n--向表中添加大量行以引起统计信息更改\nWITH\
  \ Nums\nAS (SELECT 1 AS n\n    UNION ALL\n    SELECT n + 1\n    FROM Nums\n    WHERE\
  \ n < 1000\n    )\nINSERT INTO dbo.Test1\n    (C1, C2)\nSELECT 1, n\nFROM Nums\n\
  OPTION (MAXRECURSION 1000) ;\nGO\n\n--因统计信息更改而重新执行存储过程\nEXEC dbo.TestProc ; --数据分布已更改\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`图 17-14.` 扩展事件输出，显示\
  \ `KEEPFIXED PLAN` 选项在减少重编译中的作用。可以看到，与之前数据更改的例子不同，这里没有 `auto_stats` 事件。因此，没有额外的重编译。所以，通过使用\
  \ `KEEPFIXED PLAN` 选项，你可以避免因统计信息更改导致的重编译。\n\n**注意：** 这是一个潜在危险的选择。在你考虑使用此选项之前，请确保任何可能生成的新计划都不会优于现有计划，并且你已经穷尽了所有其他可能的解决方案。在大多数情况下，重编译查询是更可取的，尽管可能成本较高。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#### 禁用表上的自动更新统计信息\n\n你也可以通过禁用相关表上的自动统计信息更新来避免因统计信息更新导致的重编译。例如，你可以如下禁用\
  \ `dbo.Test1` 表上的自动更新统计信息功能：\n\n```sql\nEXEC sp_autostats\n    'dbo.Test1',\n  \
  \  'OFF' ;\n```\n\n如果你在插入导致统计信息更改的大量行之前禁用此功能，就可以避免因统计信息更改导致的重编译。\n\n然而，使用此技术需谨慎，因为过时的统计信息会对基于成本的优化器的有效性产生不利影响，如第\
  \ 12 章所述。此外，如第 12 章所述，如果你禁用了自动更新统计信息，你应该有一个 SQL 作业来定期手动更新统计信息。\n\n#### 使用表变量\n\n\
  SQL Server 2014 支持的变量类型之一是表变量。你可以像使用其他数据类型一样，使用 `DECLARE` 语句创建表变量数据类型。它的行为类似于局部变量，你可以在存储过程中使用它来保存中间结果集，就像使用临时表一样。\n\
  \n如果使用表变量，你可以避免由临时表引起的重编译。因为不会为表变量创建统计信息，所以与临时表相关的各种重编译问题不适用于它。例如，考虑“识别导致重编译的语句”一节中使用的脚本。这里重复供你参考。\n\
  \n```sql\nIF (SELECT OBJECT_ID('dbo.TestProc')) IS NOT NULL\n    DROP PROC dbo.TestProc\
  \ ;\nGO\nCREATE PROC dbo.TestProc\nAS\n    CREATE TABLE #TempTable (C1 INT) ;\n\
  \    INSERT INTO #TempTable (C1) VALUES (42) ; -- 数据更改导致重编译\nGO\nEXEC dbo.TestProc\
  \ ; --第一次执行\n```\n\n由于延迟对象解析，存储过程在第一次执行时会被重编译。你可以通过使用表变量来避免这种由临时表引起的重编译，如下所示：\n\n\
  ```sql\nIF (SELECT OBJECT_ID('dbo.TestProc')) IS NOT NULL\n    DROP PROC dbo.TestProc;\n\
  GO\nCREATE PROC dbo.TestProc\nAS\n    DECLARE @TempTable TABLE (C1 INT);\n    INSERT\
  \ INTO @TempTable (C1) VALUES (42); -- 不需要重编译\nGO\nEXEC dbo.TestProc; --第一次执行\n\
  ```\n\n`图 17-15.` 显示了存储过程第一次执行时的扩展事件输出。通过使用表变量，避免了由临时表引起的重编译。\n\n`图 17-15.` 扩展事件输出，显示表变量在解决重编译中的作用。然而，表变量有其局限性。主要局限如下：\n\
  \n*   表变量一旦创建，就无法在其上执行任何 DDL 语句，这意味着以后无法向表变量添加索引或约束。约束只能作为表变量 `DECLARE` 语句的一部分来指定。因此，只能使用\
  \ `PRIMARY KEY` 或 `UNIQUE` 约束在表变量上创建一个索引。\n\n\n## 表变量的统计信息与性能影响\n*   不会为表变量创建统计信息，这意味着它们在执行计划中被解析为单行表。当表实际只包含少量数据（大约少于\
  \ 100 行）时，这不是问题。但是，当表变量包含更多数据时，这会成为一个主要的性能问题，因为执行计划中对正确操作类型的选择完全依赖于统计信息。\n\n*  \
  \ 以下语句不支持对表变量使用：\n    *   `INSERT INTO TableVariable EXEC StoredProcedure`\n   \
  \ *   `SELECT SelectList INTO TableVariable FROM Table`\n    *   `SET TableVariable\
  \ = Value`\n\n## 第 17 章 ■ 查询重编译\n#### 避免在存储过程中更改 SET 选项\n通常建议不要在存储过程中更改环境设置，从而避免因\
  \ SET 选项更改而导致的重编译。为了 ANSI 兼容性，建议保持以下 SET 选项为 ON：\n*   `ARITHABORT`\n*   `CONCAT_NULL_YIELDS_NULL`\n\
  *   `QUOTED_IDENTIFIER`\n*   `ANSI_NULLS`\n*   `ANSI_PADDING`\n*   `ANSI_WARNINGS`\n\
  *   以及 `NUMERIC_ROUNDABORT` 应设为 OFF。\n\n虽然不推荐以下方法，但您可以通过为连接重置选项来避免因其中一些 SET 选项更改而引起的重编译，如下对`set.sql`的修改所示：\n\
  ```sql\nIF (SELECT OBJECT_ID('dbo.TestProc')) IS NOT NULL\n    DROP PROC dbo.TestProc\n\
  GO\nCREATE PROC dbo.TestProc\nAS\n    SELECT 'a' + NULL + 'b'; --1st\n    SET CONCAT_NULL_YIELDS_NULL\
  \ OFF\n    SELECT 'a' + NULL + 'b'; --2nd\n    SET ANSI_NULLS OFF\n    SELECT 'a'\
  \ + NULL + 'b'; --3rd\nGO\nSET CONCAT_NULL_YIELDS_NULL OFF;\nSET ANSI_NULLS OFF;\n\
  EXEC dbo.TestProc;\nSET CONCAT_NULL_YIELDS_NULL ON; --Reset to default\nSET ANSI_NULLS\
  \ ON; --Reset to default\n```\n图 17-16 显示了扩展事件输出。\n\n![](img/index-347_1.jpg)\n\n\
  **图 17-16.** 显示 ANSI SET 选项对存储过程重编译影响的扩展事件输出\n您可以看到，与原始的`set.sql`代码（图 17-11）相比，重编译次数减少了。\n\
  \n在之前列出的 SET 选项中，`ANSI_NULLS`和`QUOTED_IDENTIFIER`选项在创建存储过程时会作为其一部分保存。因此，在存储过程外的连接中设置这些选项不会影响任何重编译问题；只有重新创建存储过程才能更改这些设置。\n\
  \n#### 使用 OPTIMIZE FOR 查询提示\n虽然您可能并不总能减少或消除重编译，但在重编译确实发生时，使用`OPTIMIZE FOR`查询提示可以帮助您获得想要的计划。`OPTIMIZE\
  \ FOR`查询提示使用您提供的参数值来编译计划，而不管调用应用程序传入的参数值如何。\n\n以本章前面的`CustomerList`为例。您知道如果此过程接收到某些值，它将需要创建一个新计划。根据您的数据，您还知道两个更重要的事实：此查询返回小数据集的频率极低，并且当它使用错误的计划时，性能会受到影响。与其让它反复重编译，不如修改它，使其创建在大多数情况下效果最佳的计划。\n\
  ```sql\nIF (SELECT OBJECT_ID('dbo.CustomerList')) IS NOT NULL\n    DROP PROC dbo.CustomerList\n\
  GO\nCREATE PROCEDURE dbo.CustomerList @CustomerID INT\nAS\n    SELECT soh.SalesOrderNumber,\n\
  \           soh.OrderDate,\n           sod.OrderQty,\n           sod.LineTotal\n\
  \    FROM Sales.SalesOrderHeader AS soh\n    JOIN Sales.SalesOrderDetail AS sod\n\
  \        ON soh.SalesOrderID = sod.SalesOrderID\n    WHERE soh.CustomerID >= @CustomerID\n\
  \    OPTION (OPTIMIZE FOR (@CustomerID = 1));\nGO\n```\n当此查询第一次执行或因任何原因重编译时，它总是获得相同的执行计划。\n\
  \n\n"
- "# 第 17 章：查询重编译\n\n要进行测试，请按以下方式执行存储过程：\n\n```\nEXEC dbo.CustomerList\n@CustomerID\
  \ = 7920\nWITH RECOMPILE;\n```\n\n```\nEXEC dbo.CustomerList\n@CustomerID = 30118\n\
  WITH RECOMPILE;\n```\n\n正如本章前面所述，这将强制存储过程在每次执行时都重新编译。图 17-17 显示了生成的执行计划。\n\n**图\
  \ 17-17.** `WITH RECOMPILE` 不会改变相同的执行计划\n\n与本章前面的情况不同，现在重新编译存储过程并不会产生新的执行计划。相反，无论输入是什么，都会生成相同的计划，因为查询优化器在优化查询时收到了指令，要求使用提供的值\
  \ `@Customerld = 1`。\n\n这可以减少重编译的次数，并且确实有助于你控制生成的执行计划。但这要求你非常了解你的数据。如果你的数据随时间变化，你可能需要重新审视那些使用了\
  \ `OPTIMIZE FOR` 查询提示的区域。\n\n要在执行计划中查看该提示，只需查看 `SELECT` 运算符的属性，如图 17-18 所示。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-349_1.jpg)\n\n\
  **图 17-18.** 参数编译值与查询提示提供的值相匹配\n\n你可以看到，虽然查询被重新编译并赋予了一个 `30118` 的值，但由于提示的存在，实际使用的编译值是提示所指定的\
  \ `1`。\n\n你可以指定查询使用 `OPTIMIZE FOR UNKNOWN` 进行优化。这与 `OPTIMIZE FOR` 提示几乎是相反的。`OPTIMIZE\
  \ FOR` 提示会尝试使用直方图，而 `OPTIMIZE FOR UNKNOWN` 提示将使用统计信息的密度向量。你是在指示处理器始终基于统计信息的平均值来执行优化，并忽略查询优化时传入的实际值。\n\
  \n你可以将它与 `OPTIMIZE FOR <value>` 结合使用。它会为该参数提供的值进行优化，但会使用所有其他参数的统计信息。正如前一章所讨论的，这两种机制都是为了解决不良的参数探测问题。\n\
  \n#### 使用计划指南\n\n计划指南允许你在不修改查询或过程文本的情况下使用查询提示或其他优化技术。当你有一个第三方产品，其中包含需要调整但无法修改的性能不佳的过程时，这尤其有用。作为优化过程的一部分，如果在编译或重新编译过程时存在计划指南，它将使用该指南来创建执行计划。\n\
  \n在上一节中，我向你展示了使用 `OPTIMIZE FOR` 会如何影响为过程创建的执行计划。以下是原始过程中的查询，不带任何提示：\n\n```\nIF (SELECT\
  \ OBJECT_ID('dbo.CustomerList')) IS NOT NULL\n    DROP PROC dbo.CustomerList;\n\
  GO\n```\n\n```\nIF (SELECT OBJECT_ID('dbo. CustomerList')) IS NOT NULL\n    DROP\
  \ PROC dbo. CustomerList;\nGO\n```\n\n```\nCREATE PROCEDURE dbo.CustomerList @CustomerID\
  \ INT\nAS\nSELECT soh.SalesOrderNumber,\n       soh.OrderDate,\n       sod.OrderQty,\n\
  \       sod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail\
  \ AS sod\n    ON soh.SalesOrderID = sod.SalesOrderID\nWHERE soh.CustomerID >= @CustomerID;\n\
  GO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-350_1.png)\n\
  \n现在假设这个查询是某个第三方应用程序的一部分，你无法修改它来包含 `OPTION (OPTIMIZE FOR)`。为了给它提供 `OPTIMIZE FOR`\
  \ 查询提示，可以像下面这样创建一个计划指南：\n\n```\nsp_create_plan_guide @name = N'MyGuide',\n@stmt\
  \ = N'SELECT soh.SalesOrderNumber,\n       soh.OrderDate,\n       sod.OrderQty,\n\
  \       sod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail\
  \ AS sod\n    ON soh.SalesOrderID = sod.SalesOrderID\nWHERE soh.CustomerID >= @CustomerID;',\n\
  @type = N'OBJECT',\n@module_or_batch = N'dbo.CustomerList',\n@params = NULL,\n@hints\
  \ = N'OPTION (OPTIMIZE FOR (@CustomerID = 1))';\n```\n\n\n\n"
- '# 第 17 章 ■ 查询重新编译


  现在，当使用不同的参数执行存储过程时，即使如下面所示强制使用了`RECOMPILE`，`OPTIMIZE FOR`提示也会被应用。图 17-19 显示了生成的执行计划。


  ```sql

  EXEC dbo.CustomerList

  @CustomerID = 7920

  WITH RECOMPILE;

  ```


  ```sql

  EXEC dbo.CustomerList

  @CustomerID = 30118

  WITH RECOMPILE;

  ```


  **图 17-19.** 使用计划指南来应用 `OPTIMIZE FOR` 查询提示


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-351_1.jpg)

  ![](img/index-351_2.png)


  结果与修改存储过程时相同，但在这种情况下，无需进行任何修改。


  你可以通过再次查看`SELECT`属性（图 17-20），来确认执行计划中已应用了计划指南。


  **图 17-20.** `SELECT` 操作符属性显示了计划指南


  存在多种类型的计划指南。前面的示例是一个*对象*计划指南，它与数据库中的特定对象（本例中是`CustomerList`）匹配。你还可以通过创建*SQL*计划指南来为系统中重复出现的即席查询创建计划指南，该指南用于查找特定的
  SQL 语句。


  假设传递给系统的是以下查询而非存储过程，并且需要一个`OPTIMIZE FOR`查询提示：


  ```sql

  SELECT soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM Sales.SalesOrderHeader AS soh

  JOIN Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  WHERE soh.CustomerID >=1;

  ```


  运行此查询会产生你在图 17-21 中看到的执行计划。


  **图 17-21.** 该查询使用了与预期不同的执行计划


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  要创建查询计划指南，你首先需要知道查询使用的精确格式，以防参数化（强制或简单）改变查询文本。文本必须精确。


  如果你第一次尝试创建的查询计划指南如下所示：


  ```sql

  EXECUTE sp_create_plan_guide

  @name = N''MyBadSQLGuide'',

  @stmt = N''SELECT soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM Sales.SalesOrderHeader AS soh

  join Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  WHERE soh.CustomerID >= @CustomerID'',

  @type = N''SQL'',

  @module_or_batch = NULL,

  @params = N''@CustomerID int'',

  @hints = N''OPTION (TABLE HINT(soh, FORCESEEK))'';

  ```


  那么运行 select 查询时，你仍然会得到相同的执行计划。这是因为查询的文本与为计划指南输入的内容不完全一致。有几处差异，例如空格和`JOIN`语句的大小写。


  你可以使用 T-SQL 语句删除这个错误的计划指南。


  ```sql

  EXECUTE sp_control_plan_guide

  @operation = ''Drop'',

  @name = N''MyBadSQLGuide'';

  ```


  输入正确的语法将创建一个新的计划指南。


  ```sql

  EXECUTE sp_create_plan_guide

  @name = N''MyGoodSQLGuide'',

  @stmt = N''SELECT soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM Sales.SalesOrderHeader AS soh

  JOIN Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  WHERE soh.CustomerID >=1;'',

  @type = N''SQL'',

  @module_or_batch = NULL,

  @params = NULL,

  @hints = N''OPTION (TABLE HINT(soh, FORCESEEK))'';

  ```


  现在，当查询运行时，会创建一个完全不同的计划，如图 17-22 所示。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-353_1.png)


  **图 17-22.** 计划指南强制在同一查询上生成新的执行计划


  当你认为缓存中已有的某个计划符合要求时，还有另一种选择。你可以将该计划捕获到计划指南中，以确保下次运行查询时执行相同的计划。这可以通过运行`sp_create_plan_guide_from_handle`来实现。


  为了进行测试，首先清除过程缓存，以便精确控制使用哪个查询计划。


  ```sql

  DBCC FREEPROCCACHE();

  ```



  '
- "# 第 17 章：查询重编译\n\n在清除了过程缓存并且现有的计划指南 `MyGoodSOQLGuide` 就位后，重新运行查询。它将使用计划指南来生成如图\
  \ 17-20 所示的执行计划。为了确认此计划是否可以被保留，首先删除那个强制了索引查找操作的计划指南。\n\n```sql\nEXECUTE sp_control_plan_guide\n\
  \    @operation = 'Drop',\n    @name = N'MyGoodSQLGuide' ;\n```\n\n如果此时重新运行查询，它将恢复到其原始的执行计划。然而，当前在计划缓存中，保存着如图\
  \ 17-20 所示的计划。要保留它，请运行以下脚本：\n\n```sql\nDECLARE @plan_handle VARBINARY(64),\n   \
  \     @start_offset INT ;\n\nSELECT @plan_handle = deqs.plan_handle,\n       @start_offset\
  \ = deqs.statement_start_offset\nFROM   sys.dm_exec_query_stats AS deqs\n      \
  \ CROSS APPLY sys.dm_exec_sql_text(sql_handle)\n       CROSS APPLY sys.dm_exec_text_query_plan(deqs.plan_handle,\n\
  \                                              deqs.statement_start_offset,\n  \
  \                                            deqs.statement_end_offset) AS qp\n\
  WHERE  text LIKE N'SELECT soh.SalesOrderNumber%'\n\nEXECUTE sp_create_plan_guide_from_handle\n\
  \    @name = N'ForcedPlanGuide',\n    @plan_handle = @plan_handle,\n    @statement_start_offset\
  \ = @start_offset ;\nGO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n这将根据当前缓存中的执行计划创建一个计划指南。为确保其有效，请再次清除缓存。这样，查询将必须生成一个新的执行计划。重新运行查询，并观察执行计划。由于使用了\
  \ `sp_create_plan_guide_from_handle` 创建的计划指南，它将与图 17-20b 中显示的计划相同。\n\n计划指南是控制 SQL\
  \ 查询和存储过程行为的有效机制，但你只应在对执行计划、数据以及系统结构有透彻理解时才使用它们。\n\n## 总结\n\n正如你在本章所学，查询重编译既可能有益也可能损害性能。如果重编译能生成更好的执行计划，就会提升存储过程的性能。然而，如果重编译只是重新生成了相同的计划，那么它只会消耗额外的\
  \ CPU 周期，而不会改进处理策略。因此，你应该仔细审视重编译，以确定其有用性。你可以使用扩展事件来识别是哪条存储过程语句引起了重编译，并且可以从扩展事件输出中的\
  \ `recompile_clause` 数据列值来确定原因。一旦确定了重编译的原因，你就可以应用不同的技术来避免不必要的重编译。\n\n到目前为止，你已经了解了如何从正确的索引和计划缓存中获益。然而，这些技术带来的性能提升取决于查询的设计方式。SQL\
  \ Server 的基于成本的优化器会处理许多查询设计问题。但在设计查询时，你仍应遵循一系列最佳实践。在下一章中，我将介绍一些影响性能的常见查询设计问题。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- '# `第 18 章`：`查询设计分析`


  数据库模式可能包含许多提升性能的特性，如索引、统计信息和存储过程。但如果你的查询一开始就写得很糟糕，这些特性都无法保证良好的性能。SQL 查询可能无法有效地使用可用的索引。SQL
  查询的结构可能会给查询成本增加可避免的开销。查询可能试图以逐行方式处理数据（或者引用 Jeff Moden 的说法，Row By Agonizing Row，缩写为
  RBAR，发音为 “reebar”），而不是以逻辑集合的方式。为了提高数据库应用程序的性能，理解与不同查询编写方式相关的成本至关重要。


  在本章中，我将涵盖以下主题：

  * 影响性能的查询设计方面

  * 查询设计如何有效地使用索引


  ## 查询设计建议


  当需要运行查询时，通常可以使用多种不同方法来获取相同的数据。在许多情况下，无论查询结构如何，优化器都会生成相同的执行计划。然而，在某些情况下，查询结构会限制优化器选择最佳的处理策略。重要的是要意识到这种情况可能发生，并知道在发生时如何避免。


  一般来说，请牢记以下建议以确保最佳性能：


  • 在小的结果集上操作。


  • 有效地使用索引。


  • 避免使用优化器提示。


  • 使用域和参照完整性。


  • 避免资源密集型查询。


  • 减少网络往返次数。


  • 降低事务成本。（最后三点将在下一章中详细讨论。）


  仔细的测试对于在特定数据库环境中确定提供最佳性能的查询形式至关重要。你应该熟悉编写和比较不同的 SQL 查询形式，以便能够评估在给定环境中提供最佳性能的查询形式。同时，你也需要能够实现测试的自动化。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-356_1.png)


  '
- '# 第 18 章 ■ 查询设计分析


  ## 在小的结果集上操作


  为了提升查询性能，应限制其操作的数据量，包括列和行。


  在小的结果集上操作可以减少查询消耗的资源量，并提高索引的有效性。为了限制数据集大小，你应该遵循以下两条规则：


  • 限制 `select` 列表中的列数。


  • 使用高选择性的 `WHERE` 子句来限制返回的行数。


  需要注意的是，你可能会被要求向 `OLTP` 系统返回数万行数据。仅仅因为有人告诉你这是业务需求，并不意味着它是正确的。人类无法处理数万行数据。能够处理数千行数据的人也是凤毛麟角。对于这类请求，要做好回绝的准备，并能给出充分的理由。


  ### 限制 `select_list` 中的列数


  在 `SELECT` 语句的 `select` 列表中使用最少量的列。不要使用输出结果集中不需要的列。例如，不要使用 `SELECT *` 来返回所有列。`SELECT
  *` 语句会使覆盖索引失效，因为将所有列都包含在索引中通常是不切实际的。例如，考虑以下查询：

  ```sql

  SELECT Name, TerritoryID

  FROM Sales.SalesTerritory AS st

  WHERE st.Name = ''Australia'' ;

  ```

  在 `Name` 列上的覆盖索引（以及通过聚集键 `ProductID`）可以快速通过索引本身服务于查询，而无需访问聚集索引。当启用 `STATISTICS IO`
  和 `STATISTICS TIME` 时，你将得到以下逻辑读取次数和执行时间，以及相应的执行计划（如图 18-1 所示）：

  ```

  Table ''SalesTerritory''. Scan count 0, logical reads 2

  CPU time = 0 ms, elapsed time = 6 ms.

  ```

  ***图 18-1.** 显示引用有限列数优势的执行计划*


  如果将此查询修改为在 `select` 列表中包含所有列，如下所示，那么之前的覆盖索引将失效，因为此查询所需的所有列并未都包含在该索引中：

  ```sql

  SELECT *

  FROM Sales.SalesTerritory AS st

  WHERE st.[Name] = ''Australia'';

  ```

  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-357_1.png)


  第 18 章 ■ 查询设计分析


  随后，必须访问包含所有列的基础表（或聚集索引），如下所示。逻辑读取次数和执行时间都增加了。

  ```

  Table ''SalesTerritory''. Scan count 0, logical reads 4

  CPU time = 0 ms, elapsed time = 20 ms

  ```

  如图 18-2 所示，`select` 列表中的列越少，查询性能越好。请记住，我们一直关注的这个简单查询只返回单个、小行的数据，其读取次数已经翻倍，执行时间增加了两倍。选择过多的列还会增加网络上的数据传输，进一步降低性能。


  ***图 18-2.** 显示引用过多列所带来的额外开销的执行计划*


  ### 使用高选择性的 `WHERE` 子句


  如第 8 章所述，`WHERE` 和 `HAVING` 子句中引用的列的选择性决定了该列上索引的使用。从表中请求大量行可能无法从使用索引中受益，要么因为它根本无法使用索引，要么（在非聚集索引的情况下）由于书签查找的额外开销。为确保索引的使用，`WHERE`
  子句中引用的列应具有高选择性。


  大多数时候，最终用户一次只关注有限数量的行。因此，你应该设计数据库应用程序，使其在用户导航数据时以增量方式请求数据。对于依赖大量数据进行数据分析或报告的应用程序，请考虑使用数据分析解决方案，如
  `Analysis Services` 或 `PowerPivot`。请记住，返回巨大的结果集成本高昂，而且这些数据不太可能被完全使用。


  ## 有效地使用索引


  在数据库表上建立有效的索引对于提高性能至关重要。然而，同样重要的是确保查询设计得当，以有效地利用这些索引。以下是一些应该遵循的、用于改进索引使用的查询设计规则：


  • 避免不可用搜索条件。


  • 避免在 `WHERE` 子句的列上使用算术运算符。


  • 避免在 `WHERE` 子句的列上使用函数。


  我将在以下各节中详细讨论每条规则。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  第 18 章 ■ 查询设计分析


  ### 避免不可用搜索条件


  查询中的 *可用（sargable）* 谓词是指可以使用索引的谓词。该词是“Search ARGument ABLE”的缩写。优化器从索引中获益的能力取决于搜索条件的选择性，而选择性又取决于
  `WHERE` 子句中引用的列的选择性，所有这些都可以追溯到索引的统计信息。`WHERE` 子句中列上使用的搜索谓词决定了是否可以对该列执行索引操作。


  表 18-1 中列出的可用搜索条件通常允许优化器使用 `WHERE` 子句中引用列上的索引。可用搜索条件通常允许 `SQL Server` 在索引中查找一行并检索该行（或检索相邻的行范围，直到搜索条件不再为真）。


  ***表 18-1.** 常见的可用和不可用搜索条件*


  **类型** | **搜索条件**

  ---|---

  可用（Sargable） | 包含条件 `=`、`>`、`>=`、`<`、`<=` 和 `BETWEEN`，以及一些 `LIKE` 条件如 `LIKE ''<literal>%''`

  不可用（Nonsargable） | 排除条件 `<>`、`!=`、`!>`、`!<`、`NOT EXISTS`、`NOT IN` 和 `NOT LIKE`；`IN`、`OR`
  以及一些 `LIKE` 条件如 `LIKE ''%<literal>''`


  另一方面，表 18-1 中列出的 *不可用（nonsargable）* 搜索条件通常会阻止优化器使用 `WHERE` 子句中引用列上的索引。排除性搜索条件通常不允许
  `SQL Server` 执行像可用搜索条件所支持的 `Index Seek` 操作。例如，`!=` 条件需要扫描所有行来识别匹配的行。



  '
- "# 第 18 章 ■ 查询设计分析\n\n### BETWEEN 与 IN/OR\n\n尝试为这些**不可搜索**的搜索条件实现变通方法以提升性能。在某些情况下，可以重写查询以避免不可搜索的搜索条件。例如，考虑用\
  \ `BETWEEN` 条件替换 `IN`/`OR` 搜索条件，如下一节所述。\n\n考虑以下使用 `IN` 搜索条件的查询：\n\n```sql\nSELECT\
  \ * FROM Sales.SalesOrderDetail AS sod\nWHERE sod.SalesOrderID IN (51825,51826,51827,51828);\n\
  ```\n\n另一种编写相同查询的方式是使用 `OR` 命令：\n\n```sql\nSELECT sod.*\nFROM Sales.SalesOrderDetail\
  \ AS sod\nWHERE sod.SalesOrderID = 51825 OR\nsod.SalesOrderID = 51826 OR\nsod.SalesOrderID\
  \ = 51827 OR\nsod.SalesOrderID = 51828 OR\n```\n\n你可以用以下 `BETWEEN` 子句替换此查询中的任一搜索条件：\n\
  \n```sql\nSELECT sod.*\nFROM Sales.SalesOrderDetail AS sod\nWHERE sod.SalesOrderID\
  \ BETWEEN 51825 AND 51828;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-359_1.png)\n\n![](img/index-359_2.png)\n\n这三个查询返回相同的结果。表面上看，三个查询的执行计划似乎相同，如图\
  \ 18-3 所示。\n\n**图 18-3.** 使用 BETWEEN 子句的简单 SELECT 语句的执行计划\n\n然而，仔细观察执行计划会揭示它们在数据检索机制上的差异，如图\
  \ 18-4 所示。上方的框是 `IN` 条件，下方的框是 `BETWEEN` 条件。\n\n**图 18-4.** IN 条件（上方）和 BETWEEN 条件（下方）的执行计划详情\n\
  \n如图 18-4 所示，SQL Server 将包含四个值的 `IN` 条件解析为四个 `OR` 条件。因此，聚簇索引（`PKSalesTerritoryTerritoryld`）被访问四次（扫描次数\
  \ 4）以检索四个 `IN` 和 `OR` 条件的行，如下方的相应 `STATISTICS IO` 输出所示。另一方面，`BETWEEN` 条件被解析为一对 `>=`\
  \ 和 `<=` 条件，如图 18-4 所示。SQL Server 仅访问聚簇索引一次（扫描次数 1），从第一个匹配行开始直到匹配条件为真，如下方的相应 `STATISTICS\
  \ IO` 和 `QUERY TIME` 输出所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n*   使用 `IN` 条件时：\n    `表 'SalesOrderDetail'。 扫描次数 4，逻辑读取 18`\n    `CPU 时间 = 0\
  \ ms，耗时 = 102 ms。`\n*   使用 `BETWEEN` 条件时：\n    `表 'SalesOrderDetail'。 扫描次数 1，逻辑读取\
  \ 6`\n    `CPU 时间 = 0 ms，耗时 = 63 ms。`\n\n将搜索条件 `IN` 替换为 `BETWEEN` 使此查询的逻辑读取次数从 18\
  \ 次减少到 6 次。\n\n如上所示，尽管三个查询都使用了聚簇索引寻址（`OrderID`），但优化器使用 `BETWEEN` 子句定位行范围的速度比使用 `IN`\
  \ 子句快得多。当你观察 `BETWEEN` 条件和 `OR` 子句时，也会发生同样的情况。因此，如果在 `IN`/`OR` 和 `BETWEEN` 搜索条件之间做选择，请始终选择\
  \ `BETWEEN` 条件，因为它通常比 `IN`/`OR` 条件高效得多。\n\n事实上，你应该更进一步，使用 `>=` 和 `<=` 的组合来代替 `BETWEEN`\
  \ 子句，因为这样可以让优化器少做一点工作。\n\n同样值得注意的是，此查询违反了之前关于仅返回有限列集而非使用 `SELECT *` 的建议。\n\n并非每个使用排除性搜索条件的\
  \ `WHERE` 子句都会阻止优化器使用该搜索条件所引用列上的索引。在许多情况下，SQL Server 2014 优化器能出色地将排除性搜索条件转换为可搜索的搜索条件。为了理解这一点，请考虑以下两个搜索条件，我将在后续章节中讨论：\n\
  \n*   `LIKE` 条件\n*   `!<` 条件与 `>=` 条件\n\n\n\n### LIKE 条件\n\n在使用 `LIKE` 搜索条件时，如果可能，请尝试在\
  \ `WHERE` 子句中使用一个或多个前导字符。在 `LIKE` 子句中使用前导字符允许优化器将 `LIKE` 条件转换为对索引友好的搜索条件。`LIKE`\
  \ 条件中的前导字符越多，优化器就越能确定有效的索引。请注意，使用通配符作为 `LIKE` 条件中的前导字符会*阻止*优化器在索引上执行 `SEEK`（或窄范围扫描）；它依赖于扫描整个表。\n\
  \n要理解 SQL Server 2014 优化器的这种能力，请考虑以下使用带前导字符的 `LIKE` 条件的 `SELECT` 语句：\n\n```sql\n\
  SELECT c.CurrencyCode\nFROM Sales.Currency AS c\nWHERE c.[Name] LIKE 'Ice%';\n```\n\
  \nSQL Server 2012 优化器会自动进行此转换，如图 18-5 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-361_1.png)\n\n第 18 章 ■ 查询设计分析\n\n**图 18-5.** 显示将带有尾部 `%` 符号的 `LIKE`\
  \ 子句自动转换为可索引搜索条件的执行计划\n\n如您所见，优化器会自动将 `LIKE` 条件转换为等效的 `>=` 和 `<` 条件对。因此，您可以重写此 `SELECT`\
  \ 语句，用可索引的搜索条件替换 `LIKE` 条件，如下所示：\n\n```sql\nSELECT c.CurrencyCode\nFROM Sales.Currency\
  \ AS c\nWHERE c.[Name] >=N'Ice'\n  AND c.[Name] < N'IcF';\n```\n\n请注意，在这两种情况下，逻辑读取次数、带有\
  \ `LIKE` 条件的查询的执行时间以及手动转换的可搜索搜索条件都完全相同。因此，如果您在 `LIKE` 子句中包含前导字符，SQL Server 2014\
  \ 优化器会优化搜索条件以允许使用列上的索引。\n\n### !< 条件 vs. >= 条件\n\n尽管 `!<` 和 `>=` 搜索条件检索相同的结果集，但它们在内部可能执行不同的操作。`>=`\
  \ 比较运算符允许优化器使用搜索参数中引用的列上的索引，因为该运算符的 `=` 部分允许优化器 seeks 到索引中的一个起始点，并从那里访问所有后续的索引行。另一方面，`!<`\
  \ 运算符没有 `=` 元素，需要访问每一行的列值。\n\n但真是这样吗？如第 14 章所述，SQL Server 优化器在执行查询前会执行基于语法的优化以提高性能。这使得\
  \ SQL Server 能够通过将 `!<` 转换为 `>=` 来处理该运算符的性能问题，如下面两个 `SELECT` 语句的执行计划图 18-6 所示：\n\
  \n```sql\nSELECT *\nFROM Purchasing.PurchaseOrderHeader AS poh\nWHERE poh.PurchaseOrderID\
  \ >=2975;\n```\n\n```sql\nSELECT *\nFROM Purchasing.PurchaseOrderHeader AS poh\n\
  WHERE poh.PurchaseOrderID !< 2975;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-362_1.png)\n\n第 18 章 ■ 查询设计分析\n\n**图 18-6.** 显示将不可索引的 `!`< 运算符自动转换为可索引的\
  \ `>=` 运算符的执行计划\n\n如您所见，优化器通常为您提供了使用首选 T-SQL 语法编写查询的灵活性，而不会牺牲性能。\n\n尽管 SQL Server\
  \ 优化器在许多情况下可以自动优化查询语法以提高性能，但您不应依赖它这样做。一开始就编写高效的查询是良好的实践。\n\n### 避免在 WHERE 子句列上使用算术运算符\n\
  \n在 `WHERE` 子句中的列上使用算术运算符会阻止优化器使用该列上的索引。例如，考虑以下 `SELECT` 语句：\n\n```sql\nSELECT *\n\
  FROM Purchasing.PurchaseOrderHeader AS poh\nWHERE poh.PurchaseOrderID * 2 = 3400;\n\
  ```\n\n在 `WHERE` 子句中的列上应用了一个乘法运算符 `*`。您可以通过如下重写 `SELECT` 语句来避免在列上使用它：\n\n```sql\n\
  SELECT *\nFROM Purchasing.PurchaseOrderHeader AS poh\nWHERE poh.PurchaseOrderID\
  \ = 3400 / 2;\n```\n\n该表在 `PurchaseOrderID` 列上有一个聚集索引。如第 4 章所述，该索引上的 `Index Seek`\
  \ 操作适用于此查询，因为它只返回一行。尽管两个查询返回相同的结果集，但第一个查询在 `PurchaseOrderID` 列上使用乘法运算符阻止了优化器使用该列上的索引，如图\
  \ 18-7 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-363_1.png)\n\
  \n第 18 章 ■ 查询设计分析\n\n**图 18-7.** 显示在 `WHERE` 子句列上使用算术运算符的有害影响的执行计划\n\n以下是相应的 `STATISTICS\
  \ IO` 和 `TIME` 输出。\n\n*   在 `PurchaseOrderID` 列上使用 `*` 运算符时：\n    `Table 'PurchaseOrderHeader'.\
  \ Scan count 1, logical reads 11 CPU time = 0 ms, elapsed time = 61 ms.`\n*   在\
  \ `PurchaseOrderID` 列上不使用运算符时：\n    `Table 'PurchaseOrderHeader'. Scan count 0,\
  \ logical reads 2 CPU time = 0 ms, elapsed time =27 ms.`\n\n因此，为了有效使用索引并提高查询性能，当表达式预期与索引一起使用时，避免在\
  \ `WHERE` 子句或 `JOIN` 条件中的列上使用算术运算符。\n\n值得注意的是，在图 18-7 所示的查询中，两个查询都足够简单，可以进行参数化，如查询中的\
  \ `@1` 和 `@2` 所示，它们代替了提供的值。\n\n**注意** 对于小结果集，尽管索引查找通常比表扫描（或完整的聚集索引扫描）是更好的数据检索策略，但对于小表（所有数据行都适合一页），表扫描的成本可能更低。我在第\
  \ 8 章中有更详细的解释。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-364_1.png)\n\
  \n![](img/index-364_2.png)\n\n第 18 章 ■ 查询设计分析\n\n### 避免在 WHERE 子句列上使用函数\n\n与算术运算符类似，在\
  \ `WHERE` 子句列上使用函数也会损害查询性能——原因相同。请尽量避免在 `WHERE` 子句列上使用函数，如下面两个示例所示：\n\n*   `SUBSTRING`\
  \ 与 `LIKE`\n*   日期部分比较\n\n### SUBSTRING 与 LIKE\n\n在以下 `SELECT` 语句中（下载中的 `substring.sql`），使用\
  \ `SUBSTRING` 函数会阻止使用 `ShipPostalCode` 列上的索引。\n\n```sql\nSELECT d.Name\nFROM HumanResources.Department\
  \ AS d\nWHERE SUBSTRING(d.[Name], 1, 1) = 'F';\n```\n\n图 18-8 说明了这一点。\n\n**图 18-8.**\
  \ 显示在 `WHERE` 子句列上使用 `SUBSTRING` 函数的有害影响的执行计划\n\n如您所见，使用 `SUBSTRING` 函数阻止了优化器使用\
  \ `[Name]` 列上的索引。该列上的函数使优化器使用了聚集索引扫描。如果没有 `DepartmentID` 列上的聚集索引，则会执行表扫描。\n\n您可以重新设计此\
  \ `SELECT` 语句以避免在列上使用函数，如下所示：\n```sql\nSELECT d.Name\nFROM HumanResources.Department\
  \ AS d\nWHERE d.[Name] LIKE 'F%';\n```\n\n此查询允许优化器选择 `[Name]` 列上的索引，如图 18-9 所示。\n\
  \n**图 18-9.** 显示不在 `WHERE` 子句列上使用 `SUBSTRING` 函数的好处的执行计划\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-365_1.png)\n\n第 18 章 ■ 查询设计分析\n\n### 日期部分比较\n\n\n"
- "# SQL Server 查询设计与优化\n\nSQL Server 可以将日期和时间数据存储为单独的字段，也可以存储为组合的 `DATETIME` 字段。虽然有时你可能需要将日期和时间数据保留在一个字段中，但有时你只需要日期部分，这通常意味着必须应用转换函数从\
  \ `DATETIME` 数据类型中提取日期部分。这样做会阻止优化器选择列上的索引，如下例所示。\n\n首先，需要在其中一个表的 `DATETIME` 列上建立一个良好的索引。使用\
  \ `Sales.SalesOrderHeader` 表并创建以下索引：\n\n```sql\nIF EXISTS ( SELECT *\n         \
  \   FROM sys.indexes\n            WHERE object_id = OBJECT_ID(N'[Sales].[SalesOrderHeader]')\n\
  \              AND name = N'IndexTest' )\n    DROP INDEX IndexTest ON [Sales].[SalesOrderHeader];\n\
  GO\n\nCREATE INDEX IndexTest ON Sales.SalesOrderHeader(OrderDate);\n```\n\n要检索 `Sales.SalesOrderHeader`\
  \ 中所有 `OrderDate` 在 2008 年 4 月的行，可以执行以下 `SELECT` 语句：\n\n```sql\nSELECT soh.SalesOrderID,\n\
  \       soh.OrderDate\nFROM   Sales.SalesOrderHeader AS soh\n       JOIN Sales.SalesOrderDetail\
  \ AS sod\n            ON  soh.SalesOrderID = sod.SalesOrderID\nWHERE  DATEPART(yy,\
  \ soh.OrderDate) = 2008\n       AND DATEPART(mm, soh.OrderDate) = 4;\n```\n\n在 `OrderDate`\
  \ 列上使用 `DATEPART` 函数会阻止优化器正确使用该列上的索引 `IndexTest`，反而导致扫描，如图 18-10 所示。\n\n**图 18-10.**\
  \ 显示在 WHERE 子句列上使用 `DATEPART` 函数带来负面影响的执行计划\n\n以下是 `SET STATISTICS IO` 和 `TIME`\
  \ 的输出：\n\n```\nTable 'Worktable'. Scan count 0, logical reads 0\nTable 'SalesOrderDetail'.\
  \ Scan count 1, logical reads 276\nTable 'SalesOrderHeader'. Scan count 1, logical\
  \ reads 73\n\nCPU time = 15 ms, elapsed time = 143 ms.\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-366_1.png)\n\n无需对 `DATETIME` 列应用函数即可完成日期部分的比较。\n\n```sql\nSELECT\
  \ soh.SalesOrderID,\n       soh.OrderDate\nFROM   Sales.SalesOrderHeader AS soh\n\
  \       JOIN Sales.SalesOrderDetail AS sod\n            ON  soh.SalesOrderID = sod.SalesOrderID\n\
  WHERE  soh.OrderDate >= '2008-04-01'\n       AND soh.OrderDate < '2008-05-01';\n\
  ```\n\n这允许优化器正确引用在 `DATETIME` 列上创建的索引 `IndexTest`，如图 18-11. 所示。\n\n**图 18-11.**\
  \ 显示不在 WHERE 子句列上使用 `CONVERT` 函数带来益处的执行计划\n\n以下是 `SET STATISTICS IO` 和 `TIME` 的输出：\n\
  \n```\nTable 'Worktable'. Scan count 0, logical reads 0\nTable 'SalesOrderDetail'.\
  \ Scan count 1, logical reads 276\nTable 'SalesOrderHeader'. Scan count 1, logical\
  \ reads 8\n\nCPU time = 0 ms, elapsed time = 132 ms\n```\n\n因此，为了允许优化器考虑 WHERE 子句中引用的列上的索引，请务必避免在被索引的列上使用函数。这增加了索引的有效性，从而可以提高查询性能。不过，在这个例子中值得注意的是，性能提升是轻微的，因为仍然需要扫描\
  \ `SalesOrderDetail` 表。\n\n务必删除之前创建的索引。\n\n```sql\nDROP INDEX Sales.SalesOrderHeader.IndexTest;\n\
  ```\n\n## 避免使用优化器提示\n\nSQL Server 基于成本的优化器会根据当前的表/索引结构和统计信息动态确定查询的处理策略。这种动态行为可以通过优化器提示被覆盖，通过指示优化器使用某种处理策略，从而从优化器那里拿走一些决策权。这使得优化器的行为变为静态，并且不允许它随着表/索引结构或统计信息的变化而动态更新处理策略。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n由于通常很难比优化器更聪明，因此通常的建议是避免使用优化器提示。\n\
  \n\n"
- "# 概述\n\n通常，让优化器根据数据分布统计信息、索引和其他因素来确定一个高性价比的处理策略是有益的。如下面这些提示的示例所示，强制优化器（使用提示）使用特定的处理策略往往会损害性能：\n\
  \n• `JOIN 提示`\n• `INDEX 提示`\n\n### JOIN 提示\n\n正如第 6 章所解释的，优化器会根据表/索引结构和数据，动态地确定两个数据集之间高性价比的`JOIN`策略。表\
  \ 18-2 总结了 SQL Server 2012 支持的`JOIN`类型，供您快速参考。\n\n**表 18-2. SQL Server 2014 支持的\
  \ JOIN 类型**\n\n| **JOIN 类型** | **连接列上的索引** | **连接表的通常大小** | **预排序的 JOIN 子句** |\n\
  | :--- | :--- | :--- | :--- |\n| 嵌套循环 | 内层表 a 必须<br>外层表最好 | 小 | 可选 |\n| 合并 | 两个表\
  \ a 都必须 | 大 | 是<br>最佳条件：两者上都有聚集索引或覆盖索引 |\n| 哈希 | 内层表*没有*索引 | 任意 | 否<br>最佳条件：内层表大，外层表小\
  \ |\n\n> **注意** 外层表通常是两个连接表中较小的那个。\n\n您可以通过使用表 18-3 中的`JOIN`提示来指示 SQL Server 使用特定的`JOIN`类型。\n\
  \n**表 18-3. JOIN 提示**\n\n| **JOIN 类型** | **JOIN 提示** |\n| :--- | :--- |\n| 嵌套循环\
  \ | `LOOP JOIN` |\n| 合并 | `MERGE JOIN` |\n| 哈希 | `HASH JOIN` |\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-368_1.png)\n\n要理解使用`JOIN`提示如何影响性能，请考虑以下`SELECT`语句：\n\n```sql\nSELECT\
  \ s.[Name] AS StoreName,\n       p.[LastName] + ', ' + p.[FirstName]\nFROM [Sales].[Store]\
  \ s\nJOIN [Sales].SalesPerson AS sp\n    ON s.SalesPersonID = sp.BusinessEntityID\n\
  JOIN HumanResources.Employee AS e\n    ON sp.BusinessEntityID = e.BusinessEntityID\n\
  JOIN Person.Person AS p\n    ON e.BusinessEntityID = p.BusinessEntityID;\n```\n\n\
  图 18-12 展示了执行计划。\n\n**图 18-12. 展示优化器所做选择的执行计划**\n\n如您所见，SQL Server 动态决定使用`LOOP JOIN`来添加来自`Person.Person`表的数据，并使用`HASH\
  \ JOIN`来连接`Sales.Salesperson`和`Sales.Store`表。正如第 6 章所演示的，对于影响小结果集的简单查询，`LOOP JOIN`通常比`HASH\
  \ JOIN`或`MERGE JOIN`提供更好的性能。由于来自`Sales.Salesperson`表的行数相对较少，您可能会觉得可以像这样强制`JOIN`为`LOOP`：\n\
  \n```sql\nSELECT s.[Name] AS StoreName,\n       p.[LastName] + ', ' + p.[FirstName]\n\
  FROM [Sales].[Store] s\nJOIN [Sales].SalesPerson AS sp\n    ON s.SalesPersonID =\
  \ sp.BusinessEntityID\nJOIN HumanResources.Employee AS e\n    ON sp.BusinessEntityID\
  \ = e.BusinessEntityID\nJOIN Person.Person AS p\n    ON e.BusinessEntityID = p.BusinessEntityID\n\
  OPTION (LOOP JOIN);\n```\n\n运行此查询时，执行计划会发生变化，您可以在图 18-13 中看到。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-369_1.png)\n\n**图 18-13. 使用 JOIN 查询提示所做的更改**\n\n以下是每个查询对应的`STATISTICS\
  \ IO`和`TIME`输出。\n\n• 无`JOIN`提示时：\n`Table 'Person'. Scan count 0, logical reads 2155`\n\
  `Table 'Worktable'. Scan count 0, logical reads 0`\n`Table 'Store'. Scan count 1,\
  \ logical reads 103`\n`Table 'SalesPerson'. Scan count 1, logical reads 2`\n`CPU\
  \ time = 0 ms, elapsed time = 48 ms.`\n\n• 使用`JOIN`提示时：\n`Table 'Person'. Scan count\
  \ 0, logical reads 2155`\n`Table 'SalesPerson'. Scan count 0, logical reads 1402`\n\
  `Table 'Store'. Scan count 1, logical reads 103`\n`CPU time = 16 ms, elapsed time\
  \ = 73 ms.`\n\n您可以看到，使用`JOIN`提示的查询比不使用提示的查询运行时间更长。它还增加了 CPU 的开销。您甚至可以让情况变得更糟。与其告诉查询中使用的所有提示都采用`LOOP`连接，不如只针对您感兴趣的那一个，像这样：\n\
  \n```sql\nSELECT s.[Name] AS StoreName,\n       p.[LastName] + ', ' + p.[FirstName]\n\
  FROM [Sales].[Store] s\n```\n\n\n\n"
- "# 第 18 章 查询设计分析\n\n### JOIN 提示\n\n```sql\nINNER LOOP JOIN [Sales].SalesPerson AS\
  \ sp\nON s.SalesPersonID = sp.BusinessEntityID\nJOIN HumanResources.Employee AS\
  \ e\nON sp.BusinessEntityID = e.BusinessEntityID\nJOIN Person.Person AS p\nON e.BusinessEntityID\
  \ = p.BusinessEntityID ;\n```\n\n运行此查询会产生如图 18-14 所示的执行计划。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-370_1.jpg)\n\n**图 18-14.** 使用 LOOP 连接提示带来的更多变化\n\n如你所见，查询计划中现在引用了四个表。虽然在之前的所有执行中都引用了四个表，但优化器通过优化的简化过程（在第\
  \ 8 章中提及）能够从查询中移除一个表。现在，这个提示迫使优化器做出了与其原本可能做出的不同选择，并将简化过程从流程中移除。读取次数和执行时间也受到了影响。\n\
  \n```text\nTable 'Person'. Scan count 0, logical reads 2155\nTable 'Worktable'.\
  \ Scan count 0, logical reads 0\nTable 'Employee'. Scan count 1, logical reads 9\n\
  Table 'SalesPerson'. Scan count 0, logical reads 1402\nTable 'Store'. Scan count\
  \ 1, logical reads 103\nCPU time = 0 ms, elapsed time = 92 ms.\n```\n\n`JOIN`提示强制优化器忽略其自身的优化策略，转而使用查询指定的策略。`JOIN`提示通常会损害查询性能，原因如下：\n\
  \n- 提示会阻止自动参数化。\n- 优化器无法动态决定表的连接顺序。\n\n因此，合理的做法是不使用`JOIN`提示，而是让优化器动态地确定一种成本效益高的处理策略。当然也有例外，但这些例外必须通过彻底的测试来验证其有效性。\n\
  \n### INDEX 提示\n\n如前所述，在`WHERE`子句列上使用算术运算符会阻止优化器选择该列上的索引。为了提高性能，你可以重写查询，避免在`WHERE`子句上使用算术运算符，如相应示例所示。或者，你甚至可能考虑使用`INDEX`提示（一种优化器提示）来强制优化器使用该列上的索引。然而，大多数情况下，最好避免使用`INDEX`提示，让优化器动态地运作。\n\
  \n要理解`INDEX`提示对查询性能的影响，请思考“避免在 WHERE 子句列上使用算术运算符”一节中给出的例子。`PurchaseOrderID`列上的乘法运算符阻止了优化器选择该列上的索引。你可以使用`INDEX`提示强制优化器使用`OrderID`列上的索引，如下所示：\n\
  \n```sql\nSELECT *\nFROM Purchasing.PurchaseOrderHeader AS poh WITH (INDEX (PK_PurchaseOrderHeader_PurchaseOrderID))\n\
  WHERE poh.PurchaseOrderID * 2 = 3400 ;\n```\n\n请注意与不使用`INDEX`提示相比，使用`INDEX`提示的相对成本，如图\
  \ 18-14.所示。\n\n同时，请注意以下`STATISTICS IO`输出显示的逻辑读次数的差异。\n\n- 无提示（在`WHERE`子句列上使用算术运算符）：\n\
  \  ```text\n  Table 'PurchaseOrderHeader'. Scan count 1, logical reads 11\n  CPU\
  \ time = 0 ms, elapsed time = 61 ms.\n  ```\n\n- 无提示（不在`WHERE`子句列上使用算术运算符）：\n  ```text\n\
  \  Table 'PurchaseOrderHeader'. Scan count 0, logical reads 2\n  CPU time = 0 ms,\
  \ elapsed time = 27 ms.\n  ```\n\n- `INDEX`提示：\n  ```text\n  Table 'PurchaseOrderHeader'.\
  \ Scan count 1, logical reads 44\n  CPU time = 0 ms, elapsed time = 83 ms.\n  ```\n\
  \n从执行计划的相对成本和逻辑读次数来看，显然使用`INDEX`提示的查询实际上损害了查询性能。尽管它允许优化器使用`PurchaseOrderID`列上的索引，但它并未允许优化器确定合适的索引访问机制。\n\
  \n\n\n因此，优化器使用了索引扫描，仅访问了一行数据。相比之下，避免在`WHERE`子句列上使用算术运算符，且不使用`INDEX`提示，不仅使得优化器能够使用`PurchaseOrderID`列上的索引，还能确定合适的索引访问机制：`INDEX\
  \ SEEK`（索引查找）。\n\n## 查询设计分析\n\n### 优化器与索引提示\n\n因此，通常而言，让优化器为查询选择最佳索引策略，不要使用`INDEX`提示来覆盖优化器的行为。此外，不使用`INDEX`提示允许优化器根据数据随时间的变化动态决定最佳索引策略。图\
  \ 18-15 展示了指定索引提示与不指定索引提示之间的差异。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-372_1.png)\n\n***图 18-15.** 使用不同`INDEX`提示与不使用`INDEX`提示时的查询成本*\n\n\
  ## 使用域完整性和引用完整性\n\n域完整性和引用完整性有助于为列定义并强制有效的值，从而维护数据库的完整性。这是通过列/表约束来实现的。\n\n由于数据访问通常是查询执行中最昂贵的操作之一，避免冗余的数据访问有助于优化器减少查询执行时间。域完整性和引用完整性帮助\
  \ SQL Server 2014 优化器在不实际访问数据的情况下分析有效的数据值，从而缩短查询时间。\n\n为了理解这是如何实现的，请考虑以下示例：\n\n\
  *   `NOT NULL`（非空）约束\n*   声明式引用完整性（DRI）\n\n### `NOT NULL` 约束\n\n`NOT NULL`列约束用于实现域完整性，它定义了不能在特定列中输入`NULL`值的事实。SQL\
  \ Server 在运行时自动强制执行此规则，以维护该列的域完整性。此外，定义`NOT NULL`列约束有助于优化器在查询中对该列使用`ISNULL`函数时生成高效的处理策略。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-373_1.png)\n\
  \n要理解`NOT NULL`列约束带来的性能优势，请看下面的例子。\n\n这两个查询旨在返回所有不等于`'B'`的值。这两个查询针对大小相似的列运行，每个查询都需要进行表扫描才能返回数据：\n\
  ```sql\nSELECT p.FirstName\nFROM Person.Person AS p\nWHERE p.FirstName < 'B'\n \
  \  OR p.FirstName >= 'C';\n```\n\n```sql\nSELECT p.MiddleName\nFROM Person.Person\
  \ AS p\nWHERE p.MiddleName < 'B'\n   OR p.MiddleName >= 'C';\n```\n\n这两个查询使用相同的执行计划，如图\
  \ 18-16 所示。\n\n***图 18-16.** 因缺少索引而导致的表扫描*\n\n由于`Person.MiddleName`列可以包含`NULL`值，因此返回的数据不完整。这是因为，根据定义，尽管`NULL`值满足不以任何方式等于`'B'`的必要条件，但无法以这种方式返回`NULL`值。需要添加一个`OR`子句。这意味着要像这样修改第二个查询：\n\
  ```sql\nSELECT p.FirstName\nFROM Person.Person AS p\nWHERE p.FirstName < 'B'\n \
  \  OR p.FirstName >= 'C';\n```\n\n```sql\nSELECT p.MiddleName\nFROM Person.Person\
  \ AS p\nWHERE p.MiddleName < 'B'\n   OR p.MiddleName >= 'C'\n   OR p.MiddleName\
  \ IS NULL;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-374_1.png)\n\
  \n此外，如图 18-15 执行计划中的缺失索引语句所示，这两个查询都可以从在其表上创建索引中受益。创建如下测试索引应该可以满足要求：\n```sql\nCREATE\
  \ INDEX TestIndex1\nON Person.Person (MiddleName);\n```\n\n```sql\nCREATE INDEX\
  \ TestIndex2\nON Person.Person (FirstName);\n```\n\n当重新执行查询时，图 18-17 显示了两个`SELECT`语句的最终执行计划。\n\
  \n***图 18-17.** 使用`IS NULL`选项的效果*\n\n\n\n"
- "# 第 18 章 查询设计分析\n\n如图 18-17 所示，优化器能够利用 `Person.FirstName` 列上的索引 `TestIndex2` 来执行一个简洁的索引查找操作。不幸的是，处理\
  \ `NULL` 列的需求则非常不同。索引 `TestIndex1` 没有以相同的方式使用。相反，为查询中定义的三个条件分别创建了三个常量。然后通过连接操作将它们连接起来，在通过嵌套循环操作符三次扫描索引之前进行排序和合并，以得到结果集。尽管从执行计划中的估计成本来看，这似乎是成本较低的查询（42%\
  \ 对比 58%），但 `STATISTICS IO` 和 `TIME` 告诉了我们更准确的情况，即 `NULL` 查询的成本更高。\n\n```\n表 'Person'.\
  \ 扫描计数 2, 逻辑读取 66\nCPU 时间 = 0 毫秒, 已用时间 = 126 毫秒.\n```\n\n对比\n\n```\n表 'Person'.\
  \ 扫描计数 3, 逻辑读取 42\nCPU 时间 = 0 毫秒, 已用时间 = 137 毫秒.\n```\n\n[IT 电子书](http://www.it-ebooks.info/)\n\
  \n### 声明式引用完整性\n\n声明式引用完整性用于定义父表和子表之间的引用完整性。它确保子表中的记录仅在父表中存在相应记录时才存在。此规则的唯一例外是，子表可以包含用于链接子表行与父表行的标识符的\
  \ `NULL` 值。对于子表中标识符的所有其他值，父表中必须存在相应的值。在 SQL Server 中，DRI 是通过在父表上使用 `PRIMARY KEY`\
  \ 约束并在子表上使用 `FOREIGN KEY` 约束来实现的。\n\n在两个表之间建立了 DRI，并且子表的外键列设置为 `NOT NULL` 后，SQL\
  \ Server 2014 优化器便能确定子表中的每条记录在父表中都有对应的记录。\n\n有时，这可以帮助优化器提高性能，因为不需要访问父表来验证子记录对应的父记录是否存在。\n\
  \n为了理解实现声明式引用完整性带来的性能优势，让我们考虑一个示例。首先，使用以下脚本消除两个表 `Person.Address` 和 `Person.StateProvince`\
  \ 之间的引用完整性：\n\n```sql\nIF EXISTS ( SELECT *\n            FROM sys.foreign_keys\n\
  \            WHERE object_id = OBJECT_ID(N'[Person].[FK_Address_StateProvince_StateProvinceID]')\
  \ \n              AND parent_object_id = OBJECT_ID(N'[Person].[Address]') )\nALTER\
  \ TABLE [Person].[Address] DROP CONSTRAINT [FK_Address_StateProvince_StateProvinceID];\n\
  ```\n\n考虑以下 `SELECT` 语句：\n\n```sql\nSELECT a.AddressID,\n       sp.StateProvinceID\n\
  FROM Person.Address AS a\nJOIN Person.StateProvince AS sp\n    ON a.StateProvinceID\
  \ = sp.StateProvinceID\nWHERE a.AddressID = 27234;\n```\n\n[IT 电子书](http://www.it-ebooks.info/)\n\
  \n![](img/index-376_1.png)\n\n请注意，此 `SELECT` 语句从父表 (`Person.Address`) 获取 `StateProvinceID`\
  \ 列的值。如果数据特性要求子表 (`Person.StateProvince`) 中的每个产品（由 `StateProvinceId` 标识）在父表 (`Person.Address`)\
  \ 中都包含相应的产品，那么您可以将前面的 `SELECT` 语句重写如下：\n\n```sql\nSELECT a.AddressID,\n       a.StateProvinceID\n\
  FROM Person.Address AS a\nJOIN Person.StateProvince AS sp\n    ON a.StateProvinceID\
  \ = sp.StateProvinceID\nWHERE a.AddressID = 27234;\n```\n\n两个 `SELECT` 语句应该返回相同的结果集。甚至优化器为两个\
  \ `SELECT` 语句生成了相同的执行计划，如图 18-18 所示。\n\n**图 18-18.** 两个表之间未定义 DRI 时的执行计划\n\n为了理解声明式引用完整性如何影响查询性能，替换之前删除的外键。\n\
  \n```sql\nALTER TABLE [Person].[Address]\nWITH CHECK ADD CONSTRAINT [FK_Address_StateProvince_StateProvinceID]\n\
  \    FOREIGN KEY ([StateProvinceID])\n    REFERENCES [Person].[StateProvince] ([StateProvinceID]);\n\
  ```\n\n**注意** 现在表之间已存在引用完整性。\n\n图 18-19 显示了两个 `SELECT` 语句的执行计划结果。\n\n[IT 电子书](http://www.it-ebooks.info/)\n\
  \n![](img/index-377_1.png)\n\n**图 18-19.** 显示在两个表之间定义 DRI 所带来好处的执行计划\n\n如您所见，第二个\
  \ `SELECT` 语句的执行计划是高度优化的：没有访问 `Person.StateProvince` 表。由于声明式引用完整性已就位（并且 `Address.StateProvince`\
  \ 设置为 `NOT NULL`），优化器能确定子表中的每条记录在父表中都有对应的记录。\n\n因此，在第二个 `SELECT` 语句中，父表和子表之间的 `JOIN`\
  \ 子句是多余的，因为没有从父表请求其他数据。\n\n您可能已经知道域和引用完整性是好事，但您可以看到它们不仅确保数据完整性，还能提高性能。如前所述，域和引用完整性为优化器提供了更多选择，以生成成本效益高的执行计划并提高性能。\n\
  \n为了获得 DRI 的性能优势，如前所述，子表中的外键列应设置为 `NOT NULL`。否则，子表中可能存在（外键列值为 `NULL`）在父表中没有对应表示的行。这不会阻止优化器在之前的查询中访问主表（Prod）。默认情况下——即如果未为列指定\
  \ `NOT NULL` 属性——该列可以包含 `NULL` 值。考虑到 `NOT NULL` 属性的好处以及本节解释的其他好处，如果 `NULL` 不是列的有效值，请始终将该列的属性标记为\
  \ `NOT NULL`。\n\n您还必须确保在构建外键约束时使用 `WITH CHECK` 选项。如果使用 `NOCHECK` 选项，优化器会认为这些约束是不可信的，您将无法实现它们可能带来的性能优势。\n\
  \n## 总结\n\n\n\n\n正如本章所讨论的，要提升数据库应用程序的性能，关键在于确保 SQL 查询设计得当，从而能够利用诸如索引、存储过程、数据库约束等性能增强技术。务必确保查询的设计不会妨碍索引的使用。在许多情况下，优化器有能力生成高性价比的执行计划，无论查询结构如何；但首先就将查询设计妥当，仍然是一个良好的做法。即使在你为单个查询设计了出色的性能之后，数据库应用程序的整体性能也可能不尽如人意。不仅提升单个查询的性能很重要，还要确保它们不会耗尽系统上的可用资源。下一章将介绍如何减少查询内的资源使用。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- '# 第 19 章


  ## 减少查询资源使用


  在前一章中，你专注于以适当利用索引和统计信息的方式编写查询。在本章中，你将确保以不会不恰当地消耗资源的方式编写查询。编写查询有一些方法可以避免使用内存、CPU
  和 I/O，也有一些方法会使查询使用的这些资源超出实际所需。我将介绍多种机制，以确保由你控制的查询能够最优地使用资源。


  在本章中，我将涵盖以下主题：


  • 资源密集度较低的查询设计

  • 有效利用过程缓存的查询设计

  • 减少网络开销的查询设计

  • 降低查询事务成本的技术


  ## 避免资源密集型查询


  许多数据库功能可以使用各种查询技术来实现。你应采取的方法是使用对资源友好且基于集合的查询技术。以下是几种可用于减少查询资源占用的技术：


  • 避免数据类型转换。

  • 使用 `EXISTS` 而非 `COUNT(*)` 来验证数据存在性。

  • 使用 `UNION ALL` 而非 `UNION`。

  • 为聚合和排序操作使用索引。

  • 避免在批处理查询中使用局部变量。

  • 命名存储过程时要谨慎。


  我将在后续小节中更详细地介绍这些要点。


  ### 避免数据类型转换


  在某些情况下（定义见联机丛书中庞大的数据类型转换表），`SQL Server` 允许将具有不同但兼容数据类型的值/常量与列的数据进行比较。`SQL Server`
  会自动将数据从一种数据类型转换为另一种数据类型。这个过程被称为*隐式数据类型转换*。


  尽管隐式转换很有用，但它给查询优化器增加了额外开销。为了提升性能，请使用与所比较列具有相同数据类型的值/常量。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  第 19 章 ■ 减少查询资源使用


  要理解隐式数据类型转换如何影响性能，请考虑以下示例：


  ```

  IF EXISTS ( SELECT *

  FROM sys.objects

  WHERE object_id = OBJECT_ID(N''dbo.Test1'') )

  DROP TABLE dbo.Test1;


  CREATE TABLE dbo.Test1 (

  Id INT IDENTITY(1,1),

  MyKey VARCHAR(50),

  MyValue VARCHAR(50));


  CREATE UNIQUE CLUSTERED INDEX Test1PrimaryKey ON dbo.Test1 ([Id] ASC);


  CREATE UNIQUE NONCLUSTERED INDEX TestIndex ON dbo.Test1 (MyKey);

  GO


  SELECT TOP 10000

  IDENTITY( INT,1,1 ) AS n

  INTO #Tally

  FROM Master.dbo.syscolumns scl,

  Master.dbo.syscolumns sc2;


  INSERT INTO dbo.Test1

  (MyKey,

  MyValue)

  SELECT TOP 10000

  ''UniqueKey'' + CAST(n AS VARCHAR),

  ''Description''

  FROM #Tally;


  DROP TABLE #Tally;


  SELECT t.MyValue

  FROM dbo.Test1 AS t

  WHERE t.MyKey = ''UniqueKey333'';


  SELECT t.MyValue

  FROM dbo.Test1 AS t

  WHERE t.MyKey = N''UniqueKey333'';

  ```


  在创建表 `Test1`、在其上创建几个索引并插入一些数据后，定义了两个查询。




