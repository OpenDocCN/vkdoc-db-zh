- "# 第 20 章 ■ 阻塞与被阻塞进程\n\n## 事务问题简介\n\n在多用户环境中，并发执行事务可能导致数据不一致。例如，以下业务逻辑可能因并发插入而产生错误结果：\n\
  \n```sql\nCREATE CLUSTERED INDEX i1 ON dbo.MyEmployees (GroupID);\n```\n\n```sql\n\
  --Group 10 中的 Employee 1\nINSERT INTO dbo.MyEmployees\nVALUES (1,10,1000),\n--Group\
  \ 10 中的 Employee 2\n(2,10,1000),\n--不同组的 Employees 3 & 4\n(3,20,1000),\n(4,9,1000);\n\
  ```\n\n上述业务功能可以如下实现：\n\n```sql\nDECLARE @Fund MONEY = 100,\n    @Bonus MONEY,\n\
  \    @NumberOfEmployees INT;\n\nBEGIN TRAN PayBonus\n\nSELECT @NumberOfEmployees\
  \ = COUNT(*)\nFROM dbo.MyEmployees\nWHERE GroupID = 10;\n\n/*允许事务 2 执行*/\nWAITFOR\
  \ DELAY '00:00:10';\n\nIF @NumberOfEmployees > 0\nBEGIN\n    SET @Bonus = @Fund\
  \ / @NumberOfEmployees;\n\n    UPDATE dbo.MyEmployees\n    SET Salary = Salary +\
  \ @Bonus\n    WHERE GroupID = 10;\n\n    PRINT 'Fund balance =\n' + CAST((@Fund\
  \ - (@@ROWCOUNT * @Bonus)) AS VARCHAR(6)) + ' $';\nEND\n\nCOMMIT\n```\n\n您将看到返回的资金余额为\
  \ 0 美元，因为更新成功完成。`PayBonus` 事务在单用户环境中运行良好。然而，在多用户环境中，存在问题。\n\n考虑另一个事务，它添加一个新员工到 `GroupID\
  \ = 10`，如下所示，并与 `PayBonus` 事务并发执行（在 `PayBonus` 事务开始后立即从第二个连接执行）：\n\n```sql\nBEGIN\
  \ TRAN NewEmployee\n\nINSERT INTO MyEmployees\nVALUES (5, 10, 1000);\n\nCOMMIT\n\
  ```\n\n`PayBonus` 事务之后的资金余额将是 -$50！尽管新员工可能喜欢这样，但小组基金将出现赤字。这会导致数据逻辑状态的不一致。\n\n##\
  \ 使用可序列化隔离级别的解决方案\n\n为防止这种数据不一致，应阻止对正在操作的数据集（或数据集）添加新员工。在讨论的五种隔离级别中，只有快照（Snapshot）隔离可以提供类似功能，因为事务不仅需要保护现有数据，还需要防止新数据进入数据集。可序列化（Serializable）隔离级别可以通过在受影响行及\
  \ `MyEmployees` 表上基于 `GroupID` 列的 `i1` 索引顺序确定的下一行上获取范围锁来提供这种隔离。因此，可以通过将事务隔离级别设置为\
  \ `Serializable` 来防止 `PayBonus` 事务的数据不一致。\n\n请记住首先重新创建表。\n\n```sql\nSET TRANSACTION\
  \ ISOLATION LEVEL SERIALIZABLE;\nGO\n\nDECLARE @Fund MONEY = 100,\n    @Bonus MONEY,\n\
  \    @NumberOfEmployees INT;\n\nBEGIN TRAN PayBonus\n\nSELECT @NumberOfEmployees\
  \ = COUNT(*)\nFROM dbo.MyEmployees\nWHERE GroupID = 10;\n\n/*允许事务 2 执行*/\nWAITFOR\
  \ DELAY '00:00:10';\n\nIF @NumberOfEmployees > 0\nBEGIN\n    SET @Bonus = @Fund\
  \ / @NumberOfEmployees;\n\n    UPDATE dbo.MyEmployees\n    SET Salary = Salary +\
  \ @Bonus\n    WHERE GroupID = 10;\n\n    PRINT 'Fund balance =\n' + CAST((@Fund\
  \ - (@@ROWCOUNT * @Bonus)) AS VARCHAR(6)) + ' $';\nEND\n\nCOMMIT\nGO\n\n--恢复为默认值\n\
  SET TRANSACTION ISOLATION LEVEL READ COMMITTED;\nGO\n```\n\n可序列化隔离级别的效果也可以通过在查询级别使用\
  \ `SELECT` 语句上的 `HOLDLOCK` 锁定提示来实现，如下所示：\n\n```sql\nDECLARE @Fund MONEY = 100,\n\
  \    @Bonus MONEY,\n    @NumberOfEmployees INT;\n\nBEGIN TRAN PayBonus\n\nSELECT\
  \ @NumberOfEmployees = COUNT(*)\nFROM dbo.MyEmployees WITH (HOLDLOCK)\nWHERE GroupID\
  \ = 10;\n\n/*允许事务 2 执行*/\nWAITFOR DELAY '00:00:10';\n\nIF @NumberOfEmployees > 0\n\
  BEGIN\n    SET @Bonus = @Fund / @NumberOfEmployees\n\n    UPDATE dbo.MyEmployees\n\
  \    SET Salary = Salary + @Bonus\n    WHERE GroupID = 10;\n\n    PRINT 'Fund balance\
  \ = ' + CAST((@Fund - (@@ROWCOUNT * @Bonus)) AS VARCHAR(6)) + ' $';\nEND\n\nCOMMIT\n\
  ```\n\n## 分析范围锁\n\n您可以查询 `sys.dm_tran_locks` 来观察 `PayBonus` 事务获取的范围锁，如图 20-6 所示。\n\
  \n**图 20-6.** sys.dm_tran_locks 的输出，显示授予可序列化事务的范围锁\n\n`sys.dm_tran_locks` 的输出显示，在三个索引行上获取了共享范围（RangeS-S）锁：`GroupID\
  \ = 10` 中的第一个员工、`GroupID = 10` 中的第二个员工以及 `GroupID = 20` 中的第三个员工。\n\n这些范围锁阻止了任何新员工进入\
  \ `GroupID = 10`。\n\n刚刚展示的范围锁引入了一些有趣的副作用。\n\n- 在此期间，无法添加任何 `GroupID` 在 10 到 20 之间（不包括\
  \ 10 和 20）的新员工。例如，尝试添加一个 `GroupID` 为 15 的新员工将被 `PayBonus` 事务阻塞。\n\n    ```sql\n\
  \    BEGIN TRAN NewEmployee\n    INSERT INTO dbo.MyEmployees\n    VALUES (6, 15,\
  \ 1000);\n    COMMIT\n    ```\n\n- 如果 `PayBonus` 事务的数据集是索引排序中现有数据的最后一个集合，那么所需的数据集最后一行之后的范围锁将获取在表中最后一个可能的数据值上。\n\
  \n    要理解此行为，让我们删除 `GroupID > 10` 的员工，使 `GroupID = 10` 数据集成为聚簇索引（或表）中的最后一个数据集。\n\
  \n    ```sql\n    DELETE dbo.MyEmployees\n    WHERE GroupID > 10;\n    ```\n\n \
  \   再次运行更新奖金查询和新增员工查询。图 20-7 显示了 `PayBonus` 事务的 `sys.dm_tran_locks` 输出结果。\n\n  \
  \  **图 20-7.** sys.dm_tran_locks 的输出，显示授予可序列化事务的扩展范围锁\n\n    如图 20-7 所示，聚簇索引中最后一行（`KEY\
  \ = ffffffffffff`）上的范围锁将阻止添加所有大于或等于 10 的 `GroupID` 的新员工。您知道锁是在最后一行上，不是因为它在 `sys.dm_tran_locks`\
  \ 的输出中以可见形式显示，而是因为您之前清空了直到该行的所有内容。例如，尝试添加一个 `GroupID = 999` 的新员工将被 `PayBonus` 事务阻塞。\n\
  \n    ```sql\n    BEGIN TRAN NewEmployee\n    INSERT INTO dbo.MyEmployees\n    VALUES\
  \ (7, 999, 1000);\n    COMMIT\n    ```\n\n### 索引对可序列化隔离级别效果的影响\n\n如果表在 `GroupID`\
  \ 列（即 `WHERE` 子句中的列）上没有索引，您猜会发生什么？在您思考的时候，我将在不同列上重新创建带有聚簇索引的表。\n\n```sql\nIF (SELECT\
  \ OBJECT_ID('dbo.MyEmployees')) IS NOT NULL\n    DROP TABLE dbo.MyEmployees;\nGO\n\
  \nCREATE TABLE dbo.MyEmployees\n(EmployeeID INT,\nGroupID INT,\nSalary MONEY\n);\n\
  \nCREATE CLUSTERED INDEX i1 ON dbo.MyEmployees (EmployeeID);\n\n--Group 10 中的 Employee\
  \ 1\nINSERT INTO dbo.MyEmployees\nVALUES (1,10,1000),\n--Group 10 中的 Employee 2\n\
  (2,10,1000),\n--不同组的 Employees 3 & 4\n(3,20,1000),\n(4,9,1000);\n```\n\n现在重新运行更新奖金查询和新增员工查询。图\
  \ 20-8 显示了 `PayBonus` 事务的 `sys.dm_tran_locks` 输出结果。\n\n**图 20-8.** sys.dm_tran_locks\
  \ 的输出，显示授予可序列化事务的范围锁（WHERE 子句列上无索引）\n\n如图 20-8 所示，新聚簇索引中最后一行（`KEY = ffffffffffff`）上的范围锁将阻止向表中添加任何新行。我将在本章后面的“索引对可序列化隔离级别效果的影响”一节中讨论这种广泛锁定背后的原因。\n\
  \n"
- "# 可序列化和快照隔离级别\n\n正如你所看到的，`可序列化`隔离级别不仅像`可重复读`隔离级别那样持有共享锁直到事务结束，还通过持有范围锁来防止任何新行出现在数据集中。因为这种增加的阻塞会损害数据库并发性，所以应避免使用`可序列化`隔离级别。如果必须使用`可序列化`，那么请确保你已准备好优化性能的良好索引和查询，以最小化事务的规模和持续时间。\n\
  \n### 快照\n\n自 SQL Server 2005 以来，快照隔离是 SQL Server 提供的第二种行版本控制隔离级别。与`已提交读快照`隔离不同，`快照`隔离需要在事务开始时显式调用\
  \ `SET TRANSACTION ISOLATION LEVEL`。它还需要在数据库上设置隔离级别。\n\n`快照`隔离旨在成为比`已提交读快照`隔离更严格的隔离级别。`快照`隔离将尝试对其打算修改的数据放置排他锁。如果该数据上已存在锁，则快照事务将失败。它提供事务级别的读取一致性，这使得它比`已提交读快照`更适用于金融类型的系统。\n\
  \n## 索引对锁的影响\n\n索引会影响表上的锁行为。在没有索引的表上，锁的粒度是 `RID`、`PAG`（包含 `RID` 的页面）和 `TAB`。向表添加索引会影响要锁定的资源。\n\
  \n例如，考虑以下没有索引的测试表：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.Test1')) IS NOT NULL\n \
  \   DROP TABLE dbo.Test1;\nGO\n\nCREATE TABLE dbo.Test1 (C1 INT, C2 DATETIME);\n\
  INSERT INTO dbo.Test1\nVALUES (1, GETDATE());\n```\n\n接下来，观察该表上事务的锁行为（下载中的 `--indexlock`）。\n\
  \n```sql\nBEGIN TRAN LockBehavior\n    UPDATE dbo.Test1 WITH (REPEATABLEREAD) --Hold\
  \ all acquired locks\n    SET C2 = GETDATE()\n    WHERE C1 = 1 ;\n\n    --Observe\
  \ lock behavior from another connection\n    WAITFOR DELAY '00:00:10' ;\nCOMMIT\n\
  ```\n\n图 20-9 显示了适用于测试表的 `sys.dm_tran_locks` 的输出。\n\n***图 20-9.** `sys.dm_tran_locks`\
  \ 的输出，显示在没有索引的表上授予的锁*\n\n该事务获取了以下锁：\n\n*   表上的 (`IX`) 锁\n*   包含数据行的页面上的 (`IX`) 锁\n\
  *   表中数据行上的 (`X`) 锁\n\n当 `resource_type` 是对象时，`sys.dm_tran_locks` 中的 `resource_associated_entity_id`\
  \ 列值表示放置锁的对象的 `objectid`。你可以从 `sys.object` 系统表中获取获取锁的具体对象名称，如下所示：\n\n```sql\nSELECT\
  \ OBJECT_NAME(<object_id>);\n```\n\n索引对表锁行为的影响随 `WHERE` 子句列上的索引类型而异。这种差异源于非聚集索引和聚集索引的叶级页与表的数据页有不同的关系。让我们深入研究这些索引对表锁行为的影响。\n\
  \n### 非聚集索引的影响\n\n因为非聚集索引的叶级页与表的数据页是分开的，所以与非聚集索引关联的资源也受到保护以防止损坏。SQL Server 会自动确保这一点。\n\
  \n要查看实际效果，请在测试表上创建一个非聚集索引。\n\n```sql\nCREATE NONCLUSTERED INDEX iTest ON dbo.Test1(C1);\n\
  ```\n\n再次运行 `LockBehavior` 事务并从另一个连接查询 `sys.dm_tran_locks`，你将得到如图 20-10 所示的结果。\n\
  \n***图 20-10.** `sys.dm_tran_locks` 的输出，显示非聚集索引对锁行为的影响*\n\n该事务获取了以下锁：\n\n*   包含非聚集索引行的页面上的\
  \ (`IU`) 锁\n*   索引页中非聚集索引行上的 (`U`) 锁\n*   表上的 (`IX`) 锁\n*   包含数据行的页面上的 (`IX`) 锁\n\
  *   数据页中数据行上的 (`X`) 锁\n\n请注意，只有行级锁和页级锁与非聚集索引直接关联。非聚集索引的下一个更高级别的锁粒度是对相应表的表级锁。\n\n\
  因此，非聚集索引会给表带来额外的锁开销。你可以通过在 `ALTER INDEX` 中使用 `ALLOW_ROW_LOCKS` 和 `ALLOW_PAGE_LOCKS`\
  \ 选项来避免索引上的锁开销。不过，要明白这是一种权衡，可能会涉及性能损失，并且需要仔细测试以确保它不会对你的系统产生负面影响。\n\n```sql\nALTER\
  \ INDEX iTest ON dbo.Test1\nSET (ALLOW_ROW_LOCKS = OFF ,ALLOW_PAGE_LOCKS= OFF);\n\
  \nBEGIN TRAN LockBehavior\n    UPDATE dbo.Test1 WITH (REPEATABLEREAD) --Hold all\
  \ acquired locks\n    SET C2 = GETDATE()\n    WHERE C1 = 1;\n\n    --Observe lock\
  \ behavior using sys.dm_tran_locks\n    --from another connection\n    WAITFOR DELAY\
  \ '00:00:10';\nCOMMIT\n\nALTER INDEX iTest ON dbo.Test1\nSET (ALLOW_ROW_LOCKS =\
  \ ON ,ALLOW_PAGE_LOCKS= ON);\n```\n\n在使用索引时，你可以使用这些选项来启用/禁用索引上的 `KEY` 锁和 `PAG` 锁。仅禁用\
  \ `KEY` 锁会导致索引上的最低锁粒度变为 `PAG` 锁。对索引配置的锁粒度在重新配置之前一直有效。\n\n**注意：** 像这样修改锁应该是尝试许多其他选项后的最后手段。这可能会导致显著的锁开销，从而严重影响系统性能。\n\
  \n图 20-11 显示了从另一个连接执行的 `sys.dm_tran_locks` 的输出。\n\n***图 20-11.** `sys.dm_tran_locks`\
  \ 的输出，显示 `sp_index` 选项对锁粒度的影响*\n\n事务在测试表上获取的唯一锁是表上的 (`X`) 锁。\n\n从新的锁行为可以看出，禁用 `KEY`\
  \ 锁会将锁粒度升级到表级。这将阻塞对表或表上索引的每个并发访问；因此，它会严重损害数据库并发性。然而，如果非聚集索引在阻塞场景中成为一个争用点，那么禁用索引上的\
  \ `PAG` 锁，从而只允许索引上的 `KEY` 锁，可能是有益的。\n\n**注意：** 使用此选项可能产生严重的副作用。仅应将其作为最后手段使用。\n\n\
  ### 聚集索引的影响\n\n因为对于聚集索引，索引的叶级页和表的数据页是相同的，所以可以使用聚集索引来避免非聚集索引引入的额外锁定页（叶级页）和行的开销。要理解与聚集索引相关的锁开销，请将前面的非聚集索引转换为聚集索引。\n\
  \n```sql\nCREATE CLUSTERED INDEX iTest ON dbo.Test1(C1) WITH DROP_EXISTING;\n```\n\
  \n如果你再次运行锁定脚本并在另一个连接中查询 `sys.dm_tran_locks`，你应该会看到 `LockBehavior` 事务在 `iTest` 上的结果输出，如图\
  \ 20-12 所示。\n\n***图 20-12.** `sys.dm_tran_locks` 的输出，显示聚集索引对锁行为的影响*\n\n该事务获取了以下锁：\n\
  \n*   表上的 (`IX`) 锁\n*   包含聚集索引行的页面上的 (`IX`) 锁\n\n\n### 聚簇索引的锁定优势\n\n• 对表或聚簇索引中的行施加\
  \ (`X`) 锁。\n\n聚簇索引行上的锁以及叶级页上的锁实际上也是数据行和数据页上的锁，因为数据页和叶级页是相同的。因此，与非聚簇索引相比，聚簇索引减少了对表的锁定开销。\n\
  \n使用聚簇索引而非堆表所带来的降低锁定开销，是使用聚簇索引的另一个好处。\n\n### 索引对可序列化隔离级别（Serializable Isolation\
  \ Level）的影响\n\n索引在决定可序列化隔离级别导致的阻塞量方面起着重要作用。\n\n在 WHERE 子句列（导致数据集被锁定）上存在索引，使得 SQL\
  \ Server 能够确定要锁定行的顺序。例如，考虑“可序列化隔离级别”部分中使用的例子。`SELECT` 语句使用 `GroupID` 列上的过滤器来形成其数据集，如下所示：\n\
  \n```sql\nDECLARE @NumberOfEmployees INT;\n\nSELECT @NumberOfEmployees = COUNT(*)\n\
  FROM dbo.MyEmployees WITH (HOLDLOCK)\nWHERE GroupID = 10;\n```\n\n在 `GroupID` 列上存在聚簇索引，这允许\
  \ SQL Server 在要访问的行及其正确的顺序中的下一行上获取 (`RangeS-S`) 锁。\n\n如果删除 `GroupID` 列上的索引，则 SQL\
  \ Server 无法确定应在哪些行上获取范围锁，因为行的顺序不再得到保证。因此，`SELECT` 语句会在表级别获取 (`IS`) 锁，而不是在行级别获取粒度更低的锁，如图\
  \ 20-13. 所示。\n\n***图 20-13.** `sys.dm_tran_locks` 的输出，显示了在 WHERE 子句列上没有索引时授予 `SELECT`\
  \ 语句的锁*\n\n未能在过滤列上创建索引，会显著增加可序列化隔离级别导致的阻塞程度。这也是在 WHERE 子句列上创建索引的另一个充分理由。\n\n## 捕获阻塞信息\n\
  \n尽管阻塞对于将事务与其他并发事务隔离是必要的，但有时它可能上升到过高的水平，对数据库并发性产生不利影响。在最简单的阻塞场景中，一个会话在资源上获取的锁会阻塞另一个请求在该资源上不兼容锁的会话。为了提高并发性，分析阻塞的原因并应用适当的解决方案非常重要。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 20 章 ■ 阻塞与被阻塞的进程\n\n在阻塞场景中，你需要以下信息来清晰理解阻塞原因：\n\
  \n• *阻塞和被阻塞会话的连接信息：* 你可以从 `sys.dm_os_waiting_tasks` 动态管理视图或 `sp_who2` 系统存储过程获取此信息。\n\
  \n• *阻塞和被阻塞会话的锁信息：* 你可以从 `sys.dm_tran_locks` DMO 获取此信息。\n\n• *阻塞和被阻塞会话最后执行的 SQL\
  \ 语句：* 你可以结合使用 `sys.dm_exec_requests` DMV 与 `sys.dm_exec_sql_text` 和 `sys.dm_exec_queryplan`\
  \ 或 Extended Events 来获取此信息。\n\n你也可以通过运行 SQL Server Management Studio 中的活动监视器（Activity\
  \ Monitor）来获取以下信息。“进程”页面提供了所有 SPID 的连接信息。这显示了被阻塞的 SPID、阻塞它们的进程以及任何阻塞链的头部，并详细说明了进程已运行多久、其\
  \ SPID 等信息。可以利用阻塞报告来启用 Extended Events，以收集大量相同的信息。对于立即检查锁的情况，请使用 DMO；对于扩展监视和历史跟踪，则需要使用\
  \ Extended Events。你可以在“Extended Events 与 blocked_process_report 事件”一节中找到更多相关信息。\n\
  \n\n为了在收集阻塞信息的过程中提供更强大的功能和灵活性，SQL Server 管理员可以使用 SQL 脚本来提供此处列出的相关信息。\n\n### 使用 SQL\
  \ 捕获阻塞信息\n\n要获取关于被阻塞进程和阻塞进程的充分信息，你可以借助多个动态管理视图。此查询将基于那些正在等待的进程，显示识别被阻塞进程所必需的信息。你可以轻松添加筛选条件，例如仅访问那些被阻塞超过一定时间的进程，或仅限于某些数据库中的进程等。\n\
  \n```sql\nSELECT dtl.request_session_id AS WaitingSessionID,\nder.blocking_session_id\
  \ AS BlockingSessionID,\ndowt.resource_description,\nder.wait_type,\ndowt.wait_duration_ms,\n\
  DB_NAME(dtl.resource_database_id) AS DatabaseName,\ndtl.resource_associated_entity_id\
  \ AS WaitingAssociatedEntity,\ndtl.resource_type AS WaitingResourceType,\ndtl.request_type\
  \ AS WaitingRequestType,\ndest.[text] AS WaitingTSql,\ndtlbl.request_type BlockingRequestType,\n\
  destbl.[text] AS BlockingTsql\nFROM sys.dm_tran_locks AS dtl\nJOIN sys.dm_os_waiting_tasks\
  \ AS dowt\nON dtl.lock_owner_address = dowt.resource_address\nJOIN sys.dm_exec_requests\
  \ AS der\nON der.session_id = dtl.request_session_id\nCROSS APPLY sys.dm_exec_sql_text(der.sql_handle)\
  \ AS dest\nLEFT JOIN sys.dm_exec_requests derbl\nON derbl.session_id = dowt.blocking_session_id\n\
  OUTER APPLY sys.dm_exec_sql_text(derbl.sql_handle) AS destbl\nLEFT JOIN sys.dm_tran_locks\
  \ AS dtlbl\nON derbl.session_id = dtlbl.request_session_id;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-429_1.jpg)\n\n## 第 20 章 ■ 阻塞与被阻塞进程\n\n为了理解如何分析阻塞场景以及阻塞脚本提供的相关信息，请考虑以下示例。首先，创建一个测试表。\n\
  \n```sql\nIF (SELECT OBJECT_ID('dbo.BlockTest')\n) IS NOT NULL\nDROP TABLE dbo.BlockTest;\n\
  GO\n\nCREATE TABLE dbo.BlockTest\n(C1 INT,\nC2 INT,\nC3 DATETIME\n);\n\nINSERT INTO\
  \ dbo.BlockTest\nVALUES (11, 12, GETDATE()),\n(21, 22, GETDATE());\n```\n\n现在打开三个连接，并同时运行以下两个查询。运行它们之后，在第三个连接中使用阻塞脚本。在一个连接中执行以下代码：\n\
  \n```sql\nBEGIN TRAN User1\nUPDATE dbo.BlockTest\nSET C3 = GETDATE();\n```\n\n接下来，在\
  \ `User1` 事务执行期间，执行此代码：\n\n```sql\nBEGIN TRAN User2\nSELECT C2\nFROM dbo.BlockTest\n\
  WHERE C1 = 11;\nCOMMIT\n```\n\n这就创建了一个简单的阻塞场景，其中 `User1` 事务阻塞了 `User2` 事务。\n\n阻塞脚本的输出提供了立即对开始解决阻塞问题有用的信息。\n\
  \n首先，你可以识别具体的会话信息，包括阻塞会话和等待会话的 ID。你可以立即获得等待资源的资源描述、等待类型以及进程已等待的时间长度（以毫秒为单位）。正是这个值允许你提供筛选条件以消除短期阻塞，这是正常处理的一部分。\n\
  \n这里提供了数据库名称，因为阻塞可能发生在系统中的任何位置，而不仅限于 `AdventureWorks2012`。你需要确定它发生的位置。基本锁信息中的资源和类型是为等待进程检索的。\n\
  \n会显示阻塞请求类型，如果有的话，还会显示等待的 T-SQL 和阻塞的 T-SQL。一旦你获得了发生阻塞的对象，拥有 T-SQL 代码可以帮助你确切理解进程正在何处以及如何阻塞或被阻塞，这是消除或减少阻塞量的关键部分。所有这些信息都可以从一个简单的查询中获得。图\
  \ 20-14 显示了前面被阻塞进程的示例输出。\n\n**图 20-14.** 阻塞脚本的输出\n\n请务必返回到连接 1 并提交或回滚该事务。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-430_1.png)\n\n## 第 20 章 ■ 阻塞与被阻塞进程\n\n\n扩展事件与 `blocked_process_report`\
  \ 事件\n\n扩展事件提供了一个名为 `blocked_process_report` 的事件。该事件基于你提供给系统配置的**阻塞进程阈值**工作。以下脚本将阈值设置为五秒：\n\
  \n```sql\nEXEC sp_configure 'show advanced option', '1';\nRECONFIGURE;\nEXEC sp_configure\
  \ 'blocked process threshold', 5;\nRECONFIGURE;\n```\n\n在大多数系统中，这通常是一个非常低的值。如果你已建立了成熟的性能服务级别协议（SLA），可以将其用作阈值。一旦设置了该值，你就可以配置警报，以便在任何进程被阻塞的时间超过你设定的值时发送电子邮件、推文或即时消息。它也充当了扩展事件的触发器。\n\
  \n要设置一个捕获 `blocked_process_report` 的会话，首先打开扩展事件会话属性窗口。（尽管在生产环境中应使用脚本来设置此事件，但我将展示如何使用图形界面。）为会话提供一个名称，然后导航到“事件”页面。在“事件库”文本框中输入\
  \ **block**，这将找到 `blocked_process_report` 事件。通过单击右箭头选择该事件。你应该会看到类似图 20-15 的内容。\n\
  \n**图 20-15.** 在扩展事件窗口中选择的阻塞进程报告事件\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-431_1.jpg)\n\n第 20 章 ■ 阻塞与被阻塞进程\n\n事件字段都已为你预选。如果你仍有来自上一节创建阻塞的查询在运行，你现在只需单击“运行”按钮即可捕获该事件。否则，返回清单\
  \ 20-1 和 20-2，并在两个不同的连接中运行它们。在阻塞进程阈值通过后，你会看到事件触发……并持续触发。如果你配置如此且让清单 20-1 和 20-2\
  \ 的连接保持运行，它将每五秒触发一次。实时数据流中的输出如图 20-16 所示。\n\n**图 20-16.** `blocked_process_report`\
  \ 事件的输出\n\n部分信息是自解释的；要了解细节，你需要查看 `blocked_process` 字段中生成的 XML。\n\n```xml\n<blocked-process-report\
  \ monitorLoop=\"29133\">\n <blocked-process>\n  <process id=\"process26911b848\"\
  \ taskpriority=\"0\" logused=\"0\" waitresource=\"RID: 5:1:24292:0\"\n  waittime=\"\
  5331\" ownerId=\"255377\" transactionname=\"User2\" lasttranstarted=\"2014-03-26T20:31:40.427\"\
  \n  XDES=\"0x26b386d70\" lockMode=\"S\" schedulerid=\"1\" kpid=\"2340\" status=\"\
  suspended\" spid=\"55\"\n  sbid=\"0\" ecid=\"0\" priority=\"0\" trancount=\"1\"\
  \ lastbatchstarted=\"2014-03-26T20:31:40.427\"\n  lastbatchcompleted=\"2014-03-26T20:31:40.423\"\
