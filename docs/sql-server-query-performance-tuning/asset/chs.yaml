  ### 使用性能计数器列表创建计数器日志


  性能监视器提供了一个计数器日志工具，用于保存一段时间内多个计数器的性能数据。你可以使用性能监视器查看保存的计数器日志来分析性能数据。通常，从已定义的性能计数器列表创建计数器日志是很方便的。仅仅收集数据，而不是通过
  GUI 查看，是为服务器性能故障排除或建立基线做准备的首选自动化方法。


  在性能监视器中，展开 `数据收集器集` ➤ `用户定义`。右键单击并选择 `新建` ➤ `数据收集器集`。定义集的名称，并通过单击相应的单选按钮选择手动创建；然后像我在图
  5-3 中配置的那样单击 `下一步`：


  **图 5-3.** 为数据收集器集命名


