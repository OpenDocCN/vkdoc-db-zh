  \ Management Studio - Query\" hostname=\"WIN-TUTJRM1T45J\" hostpid=\"2324\"\n  loginname=\"\
  WIN-TUTJRM1T45J\\Administrator\" isolationlevel=\"read committed (2)\" xactid=\"\
  255377\"\n  currentdb=\"5\" lockTimeout=\"4294967295\" clientoption1=\"671098976\"\
  \ clientoption2=\"390200\">\n   <executionStack>\n    <frame line=\"2\" stmtstart=\"\
  24\" stmtend=\"118\" sqlhandle=\"0x02000000ccf3e6045e680885750c3f36d7cc54\n9d8ff013680000000000000000000000000000000000000000\"\
  \ />\n    <frame line=\"2\" stmtstart=\"36\" stmtend=\"134\" sqlhandle=\"0x0200000063e12d309fa7874804b7b56c7be7be\n\
  ecf2a0255b0000000000000000000000000000000000000000\" />\n   </executionStack>\n\
  \   <inputbuf>\nBEGIN TRAN User2\nSELECT C2\nFROM dbo.BlockTest\nWHERE C1 = 11;\n\
  COMMIT </inputbuf>\n  </process>\n </blocked-process>\n <blocking-process>\n  <process\
  \ status=\"sleeping\" spid=\"52\" sbid=\"0\" ecid=\"0\" priority=\"0\" trancount=\"\
  1\"\n  lastbatchstarted=\"2014-03-26T20:31:36.567\" lastbatchcompleted=\"2014-03-26T20:31:36.567\"\
  \n  lastattention=\"1900-01-01T00:00:00.567\" clientapp=\"Microsoft SQL Server Management\
  \ Studio -\nQuery\" hostname=\"WIN-TUTJRM1T45J\" hostpid=\"2324\" loginname=\"WIN-TUTJRM1T45J\\\
  Administrator\"\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 20\
  \ 章 ■ 阻塞与被阻塞进程\n\n\n\n### 阻塞解决方案\n\n一旦分析了阻塞的原因，下一步就是确定所有可能的解决方案。以下是一些你可以用于此目的的技术：\n\
  \n•  优化引起阻塞和被阻塞的 SPID 所执行的查询。\n•  降低隔离级别。\n•  对争用的数据进行分区。\n•  在争用的数据上使用覆盖索引。\n\n\
  `注意`：本章后面的“减少阻塞的建议”一节将提供一个详细的避免阻塞的建议列表。\n\n为了理解这些解决技术，让我们将它们依次应用于前面的阻塞场景。\n\n####\
  \ 优化查询\n\n优化引起阻塞和被阻塞进程所执行的查询有助于减少阻塞持续时间。在阻塞场景中，参与阻塞的进程所执行的查询如下：\n\n•  引起阻塞的进程：\n\
  ```sql\nBEGIN TRAN User1\nUPDATE dbo.BlockTest\nSET C3 = GETDATE();\n```\n\n•  被阻塞的进程：\n\
  ```sql\nBEGIN TRAN User2\nSELECT C2\nFROM dbo.BlockTest\nWHERE C1 = 11;\nCOMMIT\n\
  ```\n\n接下来，让我们分析引起阻塞和被阻塞的 SPID 所执行的各个 SQL 语句，以优化其性能。\n\n•  引起阻塞的 SPID 的 `UPDATE`\
  \ 语句在没有 `WHERE` 子句的情况下访问数据。这使得该查询在大表上本质上就是代价高昂的。如果可能，请使用适当的 `WHERE` 子句将 `UPDATE`\
  \ 语句的操作分解为多个批次。记住要尝试使用基于集合的操作，例如 `TOP` 语句来限制行数。如果批处理中的各个 `UPDATE` 语句在单独的事务中执行，那么在一个事务内资源上持有的锁将更少，且持有时间更短。这也有助于减少或避免锁升级。\n\
  \n•  被阻塞的 SPID 执行的 `SELECT` 语句有一个针对 `C1` 列的 `WHERE` 子句。从测试表的索引结构可以看出，该列上没有索引。为了优化\
  \ `SELECT` 语句，你可以在 `C1` 列上创建一个聚集索引：\n```sql\nCREATE CLUSTERED INDEX i1 ON dbo.BlockTest(C1);\n\
  ```\n\n`注意`：由于示例表仅适合一个页，因此添加聚集索引对查询性能不会有太大影响。但是，随着表中行数的增加，索引的有益效果将变得更加明显。\n\n优化查询减少了进程持有锁的时间。查询优化降低了阻塞的影响，但它并不能完全阻止阻塞。然而，只要优化后的查询在可接受的性能限制内执行，少量的阻塞或许可以忽略。\n\
  \n#### 降低隔离级别\n\n另一种解决阻塞的方法是，如果可能，使用更低的隔离级别。`User2` 事务的 `SELECT` 语句在请求数据行的共享 (S)\
  \ 锁时被阻塞。可以通过利用 `SNAPSHOT` 隔离级别（即 `Read Committed Snapshot`）来缓解此事务的隔离级别，这样 `SELECT`\
  \ 语句就不会请求 (S) 锁。可以使用 `SET` 语句为连接配置 `Read Committed Snapshot` 隔离级别。\n```sql\nSET\
  \ TRANSACTION ISOLATION LEVEL READ COMMITTED SNAPSHOT;\nGO\nBEGIN TRAN User2\nSELECT\
  \ C2\nFROM dbo.BlockTest\nWHERE C1 = 11;\nCOMMIT\nGO\n--恢复为默认值\nSET TRANSACTION\
  \ ISOLATION LEVEL READ COMMITTED;\nGO\n```\n\n这个例子展示了降低隔离级别的实用性。使用这种 `SNAPSHOT`\
  \ 隔离远比使用任何可能导致脏读（进而引发数据不正确、行缺失或额外行）的方法更受青睐。\n\n#### 对争用的数据进行分区\n\n当处理大型数据集或可以离散存储的数据时，可以考虑对数据应用表分区。分区数据是水平拆分的，即根据某些值进行拆分（例如，按月拆分销售数据）。这允许事务在各个分区上并发执行，而不会相互阻塞。这些独立的分区在查询、更新和插入时被视为一个单一单元；只有存储和访问由\
  \ SQL Server 分开处理。需要注意的是，分区仅在 SQL Server 的开发者版和企业版中可用。\n\n在前面的阻塞场景中，可以按日期对数据进行分离。如果你关心性能，这将需要设置多个文件组（或者如果担心管理问题，可以将所有内容放在\
  \ `PRIMARY` 文件组上），并根据定义的规则拆分数据。一旦 `UPDATE` 语句有了 `WHERE` 子句，那么它与原始的 `SELECT` 语句就能在两个独立的分区上并发执行。这确实要求\
  \ `WHERE` 子句仅基于分区键列进行过滤。一旦你加入了其他条件，你就不太可能从分区消除中受益，这意味着性能可能会更差，而不是更好。\n\n`注意`：如果操作得当，分区可以提高大型数据集上的性能和并发性。但是，分区主要是一种数据管理解决方案，而不是一种性能调优选项。\n\
  \n#### 在争用的数据上使用覆盖索引\n\n在阻塞场景中，你应该分析引起阻塞或被阻塞进程的查询是否可以通过覆盖索引来完全满足。如果其中一个进程的查询可以通过覆盖索引来满足，那么它将阻止该进程在争用的资源上请求锁。此外，如果另一个进程不需要在覆盖索引上获取锁（以维护数据完整性），那么两个进程将能够并发执行而不会相互阻塞。\n\
  \n例如，在前面的阻塞场景中，被阻塞进程的 `SELECT` 语句可以通过在 `C1` 和 `C2` 列上的覆盖索引来完全满足。\n```sql\nCREATE\
  \ NONCLUSTERED INDEX iAvoidBlocking ON dbo.BlockTest(C1, C2);\n```\n引起阻塞的进程的事务无需在覆盖索引上获取锁，因为它只访问表的\
  \ `C3` 列。覆盖索引将允许 `SELECT` 语句获取 `C1` 和 `C2` 列的值，而无需访问基表。因此，被阻塞进程的 `SELECT` 语句可以在覆盖索引行上获取共享\
  \ (S) 锁，而不会被引起阻塞进程在数据行上获取的排他 (X) 锁所阻塞。这允许两个事务并发执行，没有任何阻塞。\n\n查看此 XML，元素就很清晰了。`<blocked-process>`\
  \ 显示了有关被阻塞进程的信息，包括熟悉的信息，例如会话 ID（此处标记为老式的 `SPID`）、数据库 ID 等。你可以在 `<inputbuf>` 元素中看到查询。诸如\
  \ `lockMode` 之类的详细信息可在 `<process>` 元素中找到。请注意，该 XML 不包括你可以轻松从 T-SQL 查询中获取的一些其他信息，例如被阻塞和正在等待的进程的查询字符串。但有了可用的\
  \ `SPID`，如果缓存中有的话，你可以从中获取它们，或者你可以将阻塞进程报告与其他事件（如 `rpc_starting`）结合以显示查询信息。然而，这样做会增加在数据库中长期使用这些事件的开销。如果你知道存在阻塞问题，这可以作为短期监控项目的一部分来捕获必要的阻塞信息。\n\
  \n```xml\nisolationlevel=\"read committed (2)\" xactid=\"255368\" currentdb=\"5\"\
  \ lockTimeout=\"4294967295\"\nclientoption1=\"671098976\" clientoption2=\"390200\"\
  >\n    <executionStack />\n    <inputbuf>\nSET STATISTICS IO OFF SET STATISTICS\
  \ TIME OFF </inputbuf>\n    </process>\n</blocking-process>\n</blocked-process-report>\n\
  ```\n\n\n\n## 考虑将覆盖索引作为一种“复制”部分表数据的机制，这种复制由 SQL Server 自动维护其一致性。如果该覆盖索引主要是只读的，它可以允许某些事务从“复制”数据中得到服务，而基础表（及其他索引）则可以继续服务其他事务。\n\
  \n这种方法的权衡之处在于需要额外的存储空间，以及在数据修改期间可能产生额外的开销。\n\n## 减少阻塞的建议\n\n单用户性能和多用户扩展能力对于数据库应用都至关重要。\n\
  \n在多用户环境中，确保数据库操作不会长时间持有数据库资源非常重要。这使得数据库能够支持大量操作（或数据库用户）并发执行，而不会出现严重的性能下降。以下是一些减少/避免数据库阻塞的技巧列表：\n\
  \n*   保持事务简短。\n*   在事务内执行最少量的步骤/逻辑。\n*   不要在事务内执行开销大的外部活动，例如发送确认邮件或执行由最终用户驱动的活动。\n\
  *   优化查询。\n*   根据需要创建索引，以确保系统中查询的最佳性能。\n*   避免在频繁更新的列上创建聚集索引。更新聚集索引键列需要在聚集索引和所有非聚集索引上加锁（因为它们的行定位器包含聚集索引键）。\n\
  *   考虑使用覆盖索引来服务被阻塞的 SELECT 语句。\n*   考虑对存在争用的表进行分区。\n*   使用查询超时或资源调控器来控制失控的查询。有关资源调控器的更多信息，请查阅在线手册：[`bit.ly/1jiPhfS.`](http://bit.ly/1jiPhfS)\n\
  *   避免因错误处理例程或应用程序逻辑不佳而失去对事务范围的控制。\n*   使用 `SET XACTABORT ON` 来避免在事务内出现错误条件时，事务保持打开状态。\n\
  *   在执行包含事务的 SQL 批处理或存储过程后，从客户端错误处理程序 (`TRY/CATCH`) 执行以下 SQL 语句。\n\n    ```\n  \
  \  IF @@TRANCOUNT > 0 ROLLBACK\n    ```\n*   使用所需的最低隔离级别。\n*   考虑使用行版本控制（SNAPSHOT\
  \ 隔离级别之一）来帮助减少争用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 自动化检测和收集阻塞信息\n\
  \n除了使用扩展事件捕获信息外，您还可以使用 SQL Server Agent 自动化检测阻塞条件并收集相关信息的过程。SQL Server 提供了如表 20-1\
  \ 所示的性能监视器计数器来跟踪等待时间。\n\n**表 20-1.** 性能监视器计数器\n\n| 对象 | 计数器 | 实例 | 描述 |\n| :---\
  \ | :--- | :--- | :--- |\n| `SQLServer:Locks` (对于 SQL Server 命名实例 `MSSQL$<实例名>:Locks`)\
  \ | `Average Wait Time(ms)` | `_Total` | 导致等待的每个锁的平均等待时间 |\n| | `Lock Wait Time\
  \ (ms)` | `_Total` | 过去一秒内锁的总等待时间 |\n\n您可以创建 SQL Server 警报和作业的组合来自动化以下过程：\n\n1.\
  \  使用 `Average Wait Time (ms)` 计数器确定平均等待时间何时超过可接受的阻塞量。根据您的偏好，也可以使用 `Lock Wait Time\
  \ (ms)` 计数器。\n2.  一旦确定了最小等待时间，就设置 `Blocked Process Threshold`（阻塞进程阈值）。当平均等待时间超过限制时，通过电子邮件通知\
  \ SQL Server DBA 阻塞情况。\n3.  在一段时间内，自动使用阻塞脚本或依赖于阻塞进程报告的跟踪来收集阻塞信息。\n\n要设置自动运行阻塞进程报告，首先创建名为“Blocking\
  \ Analysis”的 SQL Server 作业，以便稍后由您将创建的 SQL Server 警报使用。您可以通过以下步骤从 SQL Server Management\
  \ Studio 创建此 SQL Server 作业来收集阻塞信息：\n\n1.  使用 `blocked_process_report` 事件生成一个扩展事件脚本（如第\
  \ 6 章详述）。\n2.  运行该脚本在服务器上创建会话，但先不要启动它。\n3.  在 Management Studio 中，通过选择 *<服务器名>*\
  \ ➤ SQL Server Agent ➤ Jobs 来展开服务器。最后，右键单击并选择新建作业（New Job）。\n4.  在“新建作业”对话框的“常规”页上，输入作业名称和其他详细信息。\n\
  5.  在“步骤”页上，单击“新建”，然后输入通过 T-SQL 启动和停止会话的命令，如图 20-17 所示。\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n    ![](img/index-437_1.jpg)\n\n    **图 20-17.** 输入运行阻塞脚本的命令\n\n    您可以使用以下命令执行此操作：\n\
  \n    ```sql\n    ALTER EVENT SESSION Blocking\n    ON SERVER\n    STATE = START;\n\
  \n    WAITFOR DELAY '00:10';\n\n    ALTER EVENT SESSION Blocking\n    ON SERVER\n\
  \    STATE = STOP;\n    ```\n\n    会话的输出取决于您在创建时如何定义目标。\n6.  单击“确定”返回“新建作业”对话框。\n\
  7.  单击“确定”创建 SQL Server 作业。SQL Server 作业将被创建为启用且可运行状态，使用跟踪脚本收集十分钟的阻塞信息。\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n    ![](img/index-438_1.jpg)\n\n您可以创建 SQL Server 警报来自动化以下任务：\n\n*   通过电子邮件、短信或寻呼机通知\
  \ DBA。\n*   执行“Blocking Analysis”作业以收集十分钟的阻塞信息。\n\n您可以通过以下步骤从 SQL Server 企业管理器创建\
  \ SQL Server 警报：\n\n1.  在 Management Studio 中，仍然在对象资源管理器的 SQL Agent 区域中，右键单击“警报”（Alerts）并选择“新建警报”（New\
  \ Alert）。\n2.  在新警报属性对话框的“常规”页上，输入警报名称和其他详细信息，如图 20-18 所示。您需要从中捕获信息的特定对象是 `Locks`（图\
  \ 20-18 中的 `MSSQL$GF2008:Locks`）。我选择了 500ms 作为严格 SLA 的示例，希望在查询超过该值时得到通知。\n\n   \
  \ ![](img/index-438_1.jpg)\n\n    **图 20-18.** 输入警报名称和其他详细信息\n3.  在“响应”页上，定义您认为合适的响应，例如通知操作员。\n\
  4.  单击“确定”返回新警报的属性对话框。\n5.  在“响应”页上，输入图 20-19 中所示的剩余信息。\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n    ![](img/index-439_1.jpg)\n\n    **图 20-19.** 输入警报触发时要执行的操作\n6.  选择“Blocking\
  \ Analysis”作业以自动收集阻塞信息。\n7.  完成所有信息输入后，单击“确定”创建 SQL Server 警报。\n\n    SQL Server\
  \ 警报将被创建为启用状态，以执行预期任务。\n8.  确保 SQL Server Agent 正在运行。\n\nSQL Server 警报和作业一起，将自动化阻塞检测和信息收集过程。这种自动收集阻塞信息的方式将确保当系统进入大规模阻塞状态时，能够获得足够多的阻塞信息。\n\
  \n## 总结\n\n尽管阻塞是不可避免的，并且实际上是维持事务间隔离所必需的，但它有时会对数据库并发性产生不利影响。在多用户数据库应用程序中，您必须尽量减少并发事务之间的阻塞。\n\
  \n\n\n"
- "# 第 21 章：死锁的原因与解决方案\n\nSQL Server 提供了不同的技术来避免或减少阻塞，数据库应用程序应该利用这些技术，随着数据库用户数量的增加而线性扩展。当应用程序面临高度阻塞时，可以使用各种工具收集相关的阻塞信息，以了解阻塞的根本原因。下一步就是使用适当的技术来避免或减少阻塞。\n\
  \n阻塞不仅会损害并发性，还会在进程之间甚至进程内部发生相互阻塞的情况下，导致数据库请求突然终止。我们将在下一章中介绍这一事件，称为*死锁*。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n在上一章中，我讨论了阻塞的工作原理。阻塞是性能不佳的主要原因。\n\n它可能导致一种特殊情况，称为*死锁*，这反过来意味着死锁从根本上说是一个性能问题。当两个或多个事务之间发生死锁时，SQL\
  \ Server 允许一个事务完成，并终止另一个事务，回滚该事务。然后，SQL Server 向相应的应用程序返回错误，通知用户其事务已被选为死锁牺牲品。这使得应用程序只有两个选择：重新提交事务或向最终用户道歉。为了成功完成事务并避免道歉，了解可能导致死锁的原因以及处理死锁的方法非常重要。\n\
  \n在本章中，我将涵盖以下主题：\n\n*   死锁基础\n*   捕获死锁的错误处理\n*   分析死锁原因的方法\n*   解决死锁的技术\n\n## 死锁基础\n\
  \n*死锁*是一种特殊的阻塞场景，其中两个进程被彼此阻塞。每个进程在持有自己的资源时，都试图访问被另一个进程锁定的资源。这将导致一种称为*致命拥抱*的阻塞场景，如图\
  \ 21-1 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 21 章 ■ 死锁的原因与解决方案\n\
  \n等待于\n\n资源 1\n\nSPID1\n\nSPID2\n\n持有的锁：\n\n持有的锁：\n\n-资源 1\n\n-资源 2\n\n请求的锁\n\n\
  请求的锁\n\n-资源 2\n\n-资源 1\n\n等待于\n\n资源 2\n\n***图 21-1.** 死锁场景*\n\n当两个进程尝试在同一资源上升级其锁定机制时，死锁也经常发生。在这种情况下，两个进程中的每一个都对某个资源（如\
  \ RID）持有共享锁，并且每个进程都试图将锁从共享锁提升为独占锁；然而，除非另一个进程释放其共享锁，否则两者都无法做到。这同样会导致其中一个进程被选为死锁牺牲品。\n\
  \n最后，在并行操作期间，单个进程也可能发生死锁。在并行操作期间，一个线程可能持有对一个资源 A 的锁，同时等待另一个资源 B；与此同时，另一个线程可能持有对\
  \ B 的锁，同时等待 A。这与涉及多个进程的死锁情况一样，但涉及的是同一个进程中的多个线程。这是一个罕见的事件，但它是可能的。\n\n死锁是一种特别麻烦的阻塞类型，因为即使给予无限时间，死锁也无法自行解决。死锁需要一个外部进程来打破循环阻塞。\n\
  \nSQL Server 有一个死锁检测例程，称为*锁监视器*，它会定期检查 SQL Server 中是否存在死锁。一旦检测到死锁条件，SQL Server 会选择参与死锁的会话之一作为*牺牲品*，以打破循环阻塞。牺牲品通常是估计成本最低的进程，因为这意味着该进程对于\
  \ SQL Server 来说最容易回滚。此操作涉及撤回牺牲品会话持有的所有资源。SQL Server 通过回滚被选为牺牲品的会话的未提交事务来实现这一点。\n\
  \n### 选择死锁牺牲品\n\nSQL Server 通过评估参与会话的事务回滚成本来确定哪个会话作为死锁牺牲品，并选择估计成本最低的会话。你可以通过将其连接的死锁优先级设置为\
  \ `LOW` 来对被选为牺牲品的会话施加一些控制。\n\n```sql\nSET DEADLOCK_PRIORITY LOW;\n```\n\n这会引导 SQL\
  \ Server 在发生死锁时选择此特定会话作为牺牲品。你可以通过执行以下 `SET` 语句将连接的死锁优先级重置为其正常值：`SET DEADLOCK_PRIORITY\
  \ NORMAL;`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 21 章 ■ 死锁的原因与解决方案\n\
  \n`SET` 语句也允许将会话标记为高 (`HIGH`) 死锁优先级。这不会阻止给定会话上发生死锁，但会降低给定会话被选为牺牲品的可能性。你甚至可以将优先级级别设置为数字值，从\
  \ `-10` 表示最低优先级，到 `10` 表示最高优先级。\n\n■ **注意** 设置死锁优先级不应随意应用。你可能会意外地在报告上设置优先级，导致关键任务进程被选为牺牲品。必须对此设置进行仔细测试。\n\
  \n在平局的情况下，其中一个进程会被选为牺牲品并回滚，就像它的成本最低一样。有些进程对成为死锁牺牲品是免疫的。这些进程被标记为这样，永远不会被选为死锁牺牲品。我见过的最常见的例子是当进程已经处于回滚过程时。\n\
  \n### 使用错误处理捕获死锁\n\n当 SQL Server 选择一个会话作为牺牲品时，它会引发一个带有错误号的错误。你可以在 T-SQL 中使用 `TRY/CATCH`\
  \ 结构来处理该错误。SQL Server 通过自动回滚牺牲品会话的事务来确保数据库的一致性。回滚确保会话返回到其事务开始之前的状态。在错误处理程序中确定死锁情况后，可以在将错误返回给应用程序之前，在\
  \ T-SQL 中尝试多次重启事务。\n\n以下 T-SQL 语句是处理死锁错误的一种方法的示例：\n\n```sql\nDECLARE @retry AS TINYINT\
  \ = 1,\n        @retrymax AS TINYINT = 2,\n        @retrycount AS TINYINT = 0;\n\
  \nWHILE @retry = 1\n    AND @retrycount <= @retrymax\nBEGIN\n    SET @retry = 0;\n\
  \n    BEGIN TRY\n        UPDATE HumanResources.Employee\n        SET LoginID = '54321'\n\
  \        WHERE BusinessEntityID = 100;\n    END TRY\n\n    BEGIN CATCH\n       \
  \ IF (ERROR_NUMBER() = 1205)\n        BEGIN\n            SET @retrycount = @retrycount\
  \ + 1;\n            SET @retry = 1;\n        END\n    END CATCH\nEND\n```\n\n`TRY/CATCH`\
  \ 方法允许你捕获错误。然后你可以使用 `ERROR_NUMBER()` 函数检查错误号，以确定是否发生了死锁。一旦确定是死锁，就可以尝试在设定的次数内（本例中为两次）重新启动事务。使用错误捕获将帮助你的应用程序处理间歇性或偶尔发生的死锁，但最好的方法是分析死锁的原因，并在可能的情况下解决它。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 21 章 ■ 死锁的原因与解决方案\n\n##\
  \ 死锁分析\n\n\n\n有时，你可以通过分析成因来防止死锁发生。为此，你需要以下信息：\n\n*   参与死锁的会话\n*   死锁涉及的资源\n*   会话执行的查询\n\
  \n### 收集死锁信息\n\n你可以通过四种方式收集死锁信息。\n\n*   使用扩展事件\n*   设置跟踪标志 `1222`\n*   设置跟踪标志 `1204`\n\
  *   使用跟踪事件\n\n跟踪标志用于自定义某些 `SQL Server` 行为，例如在此情况下生成死锁信息。但是，它们是一种较旧的捕获此信息的方法。在 `SQL\
  \ Server` 中，自 2008 年起的每个实例上，都有一个名为 `system_health` 的 `Extended Events` 会话。此会话自动运行，其默认收集的事件之一就是死锁图。这是无需以任何方式修改服务器即可立即获取死锁信息的最简单方法。\n\
  \n然而，`system_health` 仅适用于快速检查。并且由于它使用 `ring_buffer` 来捕获数据，除非在发生死锁后立即查看，否则你可能会发现信息已丢失。如果你需要收集更长时间段的信息并确保捕获尽可能多的事件，`Extended\
  \ Events` 提供了多种收集死锁信息的方法。这可能是你可以应用于服务器以收集死锁信息的最佳方法。你可以使用这些选项：\n\n*   `Lock_deadlock`：显示有关死锁事件的基本信息\n\
  *   `Lock_deadlock_chain`：捕获死锁中每个参与者的信息\n*   `Xml_deadlock_report`：显示包含死锁原因的 XML\
  \ 死锁图\n\n死锁图生成 XML 输出。在 `Extended Events` 捕获死锁事件后，你可以通过 `SSMS` 中的事件查看器，或者如果你已将事件结果输出到文件，则通过打开\
  \ XML 文件来查看死锁图。虽然这三个事件显示的信息类似，但对于基本的死锁信息，最容易理解的是 `xml_deadlock_report`。在监控死锁时，我建议同时捕获\
  \ `lock_deadlock_chain`，以便在需要时拥有有关死锁中涉及的各个会话的更详细信息。\n\n你可以在 Management Studio 中打开死锁图。你可以搜索\
  \ XML，但从 XML 生成的死锁图几乎可以像死锁的执行计划一样工作，如图 21-2. 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-444_1.png)\n\n第 21 章 ■ 死锁的原因与解决方案\n\n**图 21-2.** 在 Profiler 中显示的死锁图\n\
  \n我将在本章后面的“分析死锁”一节中向你展示如何使用此图。\n\n生成死锁信息的两个跟踪标志可以单独使用或一起使用，以生成不同的信息集。通常人们更喜欢运行其中一个，因为它们会将大量信息写入\
  \ `SQL Server` 的错误日志。跟踪标志将收集到的信息写入发生死锁事件的服务器上的日志文件。跟踪标志 `1222` 提供有关死锁的最详细信息。\n\n\
  跟踪标志 `1204` 提供详细的死锁信息，可帮助你分析死锁的原因。它按死锁中涉及的每个节点对信息进行排序。跟踪标志 `1222` 也提供详细的死锁信息，但其信息分解方式不同。跟踪标志\
  \ `1222` 按资源和进程对信息进行排序，并提供更多信息。两组数据都将在“分析死锁”一节中讨论。\n\n`DBCC TRACEON` 语句用于打开（或启用）跟踪标志。跟踪标志将保持启用状态，直到使用\
  \ `DBCC TRACEOFF` 语句将其禁用。如果服务器重新启动，此跟踪标志将被清除。你可以使用 `DBCC TRACESTATUS` 语句确定跟踪标志的状态。设置两个死锁跟踪标志如下所示：\n\
  \n```\nDBCC TRACEON (1222, -1);\nDBCC TRACEON (1204, -1);\n```\n\n为确保跟踪标志始终设置，你可以按照以下步骤在\
  \ `SQL Server Configuration Manager` 中将其设置为 `SQL Server` 启动参数的一部分：\n\n1.  打开 `SQL\
  \ Server` 实例的属性对话框。\n2.  切换到属性对话框的“启动参数”选项卡，如图 21-3. 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-445_1.jpg)\n\n第 21 章 ■ 死锁的原因与解决方案\n\n**图 21-3.** SQL Server 实例的属性对话框，显示“启动参数”选项卡\n\
  3.  在“指定启动参数”文本框中键入 `-T1222`，然后单击“添加”以添加跟踪标志 `1222`。\n4.  单击“确定”按钮关闭所有对话框。\n\n这些跟踪标志设置将在你重新启动\
  \ `SQL Server` 实例后生效。\n\n### 分析死锁\n\n为了分析死锁的原因，让我们考虑一个简单的示例。首先，请确保你已经启用了死锁跟踪标志 `1222`\
  \ 并创建了一个使用 `xml_deadlock_report` 事件的 `Extended Events` 会话。我同时使用这两种方法进行演示。通常你只需要一种方法来捕获死锁信息。\n\
  \n在一个连接中，执行此脚本：\n\n```\nBEGIN TRAN\nUPDATE Purchasing.PurchaseOrderHeader\nSET Freight\
  \ = Freight * 0.9 -- 运费打九折\nWHERE PurchaseOrderID = 1255;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-446_1.png)\n\n第 21 章 ■ 死锁的原因与解决方案\n\n在第二个连接中，执行此脚本：\n\n```\nBEGIN\
  \ TRANSACTION\nUPDATE Purchasing.PurchaseOrderDetail\nSET OrderQty = 4\nWHERE ProductID\
  \ = 448\nAND PurchaseOrderID = 1255;\n```\n\n这两个脚本都打开一个事务并操作数据，但都没有提交或回滚事务。切换回第一个事务并运行这个附加查询：\n\
  \n```\nUPDATE Purchasing.PurchaseOrderDetail\nSET OrderQty = 2\nWHERE ProductID\
  \ = 448\nAND PurchaseOrderID = 1255;\n```\n\n不幸的是，可能几秒钟后，第一个连接就遇到了死锁。\n\n```\n错误\
  \ 1205，级别 13，状态 51，第 1 行\n进程 ID 为 52 的事务在锁资源上与另一个进程发生死锁，并被选作死锁牺牲品。请重新运行该事务。\n```\n\
  \n知道问题出在哪里吗？\n\n让我们首先通过检查通过跟踪事件收集的死锁图来分析死锁。事件资源管理器窗口中有一个单独的选项卡用于 `xml_deadlock_report`\
  \ 事件。打开该选项卡将显示死锁图（见图 21-4）。\n\n**图 21-4.** 在 Profiler 工具中显示的死锁图\n\n从图 21-4 所示的死锁图可以清楚地看到，涉及两个进程：会话\
  \ `51` 和会话 `52`。会话 `52`（屏幕上带有一个大 *X* 将其划掉的，在死锁图上显示为蓝色）被选为死锁牺牲品。涉及两个不同的键。顶部的键由会话\
  \ `51` 拥有，如指向会话对象的箭头所示，名为所有者模式，并标记为 `X`（排他锁）。会话 `52` 正在尝试请求相同的键进行更新。另一个键由会话 `54`\
  \ 拥有，会话 `51` 请求更新，由 `U`（更新锁）表示。你可以看到死锁所涉及对象的确切 `HoBt ID`、`object ID`、`object name`\
  \ 和 `index name`。对于像这样一个经典的、简单的死锁，你已经拥有了所需的大部分信息。\n\n最后一部分是每个进程运行的查询。这些需要使用不同的扩展事件来捕获。\n\
  \n\n\n"
