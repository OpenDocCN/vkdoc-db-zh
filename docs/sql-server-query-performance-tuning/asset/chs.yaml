- "# 第 19 章 ■ 减少查询资源使用\n\n***图 19-2.** COUNT 与 EXISTS 的区别*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-382_1.jpg)\n\n![](img/index-382_2.jpg)\n\n如图所示，`EXISTS` 技术仅使用了 3\
  \ 次逻辑读取，而 `COUNT(*)` 技术使用了 1,246 次，执行时间从 29 毫秒缩短到 4 毫秒。因此，要判断数据是否存在，请使用 `EXISTS`\
  \ 技术。\n\n### 使用 UNION ALL 代替 UNION\n\n您可以使用 `UNION` 子句来串联多个 `SELECT` 语句的结果集，如下所示，如图\
  \ 19-3 所示：\n\n```sql\nSELECT *\nFROM Sales.SalesOrderDetail AS sod\nWHERE sod.ProductID\
  \ = 934\nUNION\nSELECT *\nFROM Sales.SalesOrderDetail AS sod\nWHERE sod.ProductID\
  \ = 932;\n```\n\n***图 19-3.** 使用 UNION 子句的查询执行计划*\n\n`UNION` 子句处理来自两个 `SELECT` 语句的结果集，从最终结果集中删除重复项，实际上是对每个查询运行了\
  \ `DISTINCT`。如果参与 `UNION` 子句的 `SELECT` 语句的结果集彼此互斥，或者您允许最终结果集中存在重复行，那么请使用 `UNION\
  \ ALL` 代替 `UNION`。这避免了检测和删除任何重复项的开销，从而提高了性能，如图 19-4 所示。\n\n***图 19-4.** 使用 UNION\
  \ ALL 的查询执行计划*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-383_1.png)\n\
  \n![](img/index-383_2.png)\n\n如图所示，在第一种情况下（使用 `UNION`），优化器在串联两个 `SELECT` 语句的结果集时，以完全不同的方式筛选记录以消除重复。由于结果集是互斥的，您可以使用\
  \ `UNION ALL` 代替 `UNION` 子句。使用 `UNION ALL` 子句避免了检测重复项的开销，从而提高了性能。\n\n### 为聚合和排序条件使用索引\n\
  \n通常，`MIN` 和 `MAX` 等聚合函数会受益于对应列上的索引。如果列上没有任何索引，优化器必须扫描基表（或聚集索引），检索所有行，并在包含所有行的组上执行流聚合以识别\
  \ `MIN`/`MAX` 值，如下面的示例所示（参见图 19-5：）\n\n```sql\nSELECT MIN(sod.UnitPrice)\nFROM Sales.SalesOrderDetail\
  \ AS sod;\n```\n\n***图 19-5.** 扫描整个表被过滤为单行*\n\n使用 `MIN` 聚合函数的 `SELECT` 语句的 `STATISTICS\
  \ IO` 和 `TIME` 输出如下：表 'SalesOrderDetail'。扫描计数 1，逻辑读取 1246 CPU 时间 = 46 毫秒，经过时间 =\
  \ 52 毫秒。\n\n如 `STATISTICS` 输出所示，该查询仅为了检索 `UnitPrice` 列最小值所在的行就执行了超过 1,200 次逻辑读取。您可以在图\
  \ 19-5 的执行计划中看到这一点。从 `Clustered Index Scan` 出来一个巨大的胖行，结果被 `Stream Aggregate` 操作过滤为单行。如果您在\
  \ `UnitPrice` 列上创建索引，那么 `UnitPrice` 值将由索引在叶页面中预排序。\n\n```sql\nCREATE INDEX TestIndex\
  \ ON Sales.SalesOrderDetail (UnitPrice ASC);\n```\n\n`UnitPrice` 列上的索引显著提高了 `MIN`\
  \ 聚合函数的性能。优化器可以通过寻址到索引中最顶部的行来检索最小的 `UnitPrice` 值。这减少了查询的逻辑读取次数，如相应的 `STATISTICS`\
  \ 输出所示（参见图 19-6。）\n\n表 'SalesOrderDetail'。扫描计数 1，逻辑读取 3 CPU 时间 = 0 毫秒，经过时间 = 20\
  \ 毫秒。\n\n***图 19-6.** 索引从根本上提高了性能*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-384_1.png)\n\n类似地，在 `ORDER BY` 子句引用的列上创建索引有助于优化器快速组织结果集，因为列值已在索引中预先排列。`GROUP\
  \ BY` 子句的内部实现也会首先对列值进行排序，因为排序的列值允许快速地将相邻的匹配值分组。因此，与 `ORDER BY` 子句类似，`GROUP BY` 子句也受益于\
  \ `GROUP BY` 子句引用的列中的值预先排序。\n\n### 避免在批量查询中使用局部变量\n\n通常，多个查询会作为一批一起提交，以避免多次网络往返。在查询批处理中使用局部变量在各个查询之间传递值是很常见的。但是，在批处理中查询的\
  \ `WHERE` 子句中使用局部变量，不允许优化器生成高效的执行计划。\n\n为了理解在批处理中查询的 `WHERE` 子句中使用局部变量如何影响性能，请考虑以下批处理查询（`--batch`）：\n\
  \n```sql\nDECLARE @Id INT = 1;\n\nSELECT pod.LineTotal,\n       poh.OrderDate\n\
  FROM Purchasing.PurchaseOrderDetail AS pod\nJOIN Purchasing.PurchaseOrderHeader\
  \ AS poh\n    ON poh.PurchaseOrderID = pod.PurchaseOrderID\nWHERE poh.PurchaseOrderID\
  \ >= @Id;\n```\n\n图 19-7 显示了 此 `SELECT` 语句的执行计划。\n\n***图 19-7.** 显示局部变量在批量查询中影响的执行计划*\n\
  \n如图所示，执行了 `Clustered Index Seek` 操作来访问 `Purchasing.PurchaseOrderDetail` 表中的行。如果执行\
  \ `SELECT` 语句时不使用局部变量，而是用适当的常量值替换局部变量值，如下面的查询，优化器会做出不同的选择。\n\n```sql\nSELECT pod.LineTotal,\n\
  \       poh.OrderDate\nFROM Purchasing.PurchaseOrderDetail AS pod\nJOIN Purchasing.PurchaseOrderHeader\
  \ AS poh\n    ON poh.PurchaseOrderID = pod.PurchaseOrderID\nWHERE poh.PurchaseOrderID\
  \ >=1;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-385_1.png)\n\
  \n图 19-8 显示了 结果。\n\n***图 19-8.** 未使用局部变量时的查询执行计划*\n\n虽然这两种方法看起来相同，但仔细检查后，开始出现有趣的差异。\n\
  \n注意某些操作的估算成本。例如，图 19-6 和图 19-7 之间的 `Merge Join` 就不同；前者是 29%，后者是 25%。如果查看每个查询的 `STATISTICS\
  \ IO` 和 `TIME`，还会出现其他差异。首先是第一个查询的信息：表 'PurchaseOrderDetail'。扫描计数 1，逻辑读取 66 表 'PurchaseOrderHeader'。扫描计数\
  \ 1，逻辑读取 44 CPU 时间 = 16 毫秒，经过时间 = 151 毫秒。\n\n然后是第二个查询，没有局部变量：表 'PurchaseOrderDetail'。扫描计数\
  \ 1，逻辑读取 66 表 'PurchaseOrderHeader'。扫描计数 1，逻辑读取 44 CPU 时间 = 0 毫秒，经过时间 = 132 毫秒。\n\
  \n请注意，扫描和读取次数是相同的，正如具有几乎相同执行计划的查询所预期的那样。CPU 时间和经过时间不同，第二个查询（没有局部变量的那个）总是稍少一些。基于这些事实，您可能会假设第一个查询的执行计划会比第二个查询成本更高。但实际情况却大不相同，如图\
  \ 19-9 中的 执行计划成本比较所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-386_1.png)\n\
  \n\n\n"
- "# 第 19 章 ■ 减少查询资源使用\n\n## *图 19-9. 使用与不使用局部变量时的查询相对成本*\n\n从两个执行计划的相对成本来看，第二个查询似乎并不比第一个查询更便宜。然而，从\
  \ `STATISTICS` 的对比来看，第二个查询应该比第一个查询更便宜。你应该相信哪个：`STATISTICS` 的比较结果还是执行计划的相对成本？这个异常现象的根源是什么？\n\
  \n执行计划是基于优化器对每个执行步骤所影响行数的估算生成的。如果你查看带有局部变量的查询的初始执行计划中各个操作符的属性（如图 19-7 所示），你可能会注意到一个差异。请看图\
  \ 19-10。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-387_1.jpg)\n\
  \n![](img/index-387_2.jpg)\n\n## *图 19-10. 使用局部变量时的聚集索引查找详细信息*\n\n你要找的差异是“Actual\
  \ Number of Rows（实际行数）”值（靠近顶部）与“Estimated Number of Rows（估计行数）”值（在底部）的对比。在图 19-10\
  \ 所示的属性中，估计行数是 1,203.6，而实际行数要高得多，为 4,012。如果你将此与第二个查询（没有局部变量的查询）中的相同操作符进行比较，可能会注意到其他情况。看一下图\
  \ 19-11。\n\n## *图 19-11. 不使用局部变量时的聚集索引查找详细信息*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n在这里，你会看到“Actual Number of Rows（实际行数）”和“Estimated Number of Rows（估计行数）”值是相同的：4,012。\n\
  \n从这两个测量值可以看出，第一个查询（在 `WHERE` 子句中使用局部变量）执行步骤的估计行数与该步骤返回的实际行数相差甚远。因此，基于估计行数计算的第一个查询的执行计划成本在某种程度上是具有误导性的。错误的估计误导了优化器，并导致查询执行方式出现一些变化。你可以在查询的返回时间上看到这一点，即使最终返回的行数是相同的。\n\
  \n任何时候，当你在分析查询时发现相对执行计划成本与 `STATISTICS` 输出之间存在这样的异常时，都应该验证估算的基础。如果执行计划本身的基础事实（估计行数）是错误的，那么执行计划中表示的成本也很可能出错。\n\
  \n但是，由于各种 `STATISTICS` 测量的输出显示了实际的逻辑读取次数和执行查询所需的实际经过时间，并且不受初始估计的影响，因此你可以依赖 `STATISTICS`\
  \ 输出。\n\n现在让我们回到与在 `WHERE` 子句中使用局部变量相关的实际性能问题。如前面的示例所示，在批处理查询的 `WHERE` 子句中使用局部变量作为过滤条件，不允许优化器确定正确的索引策略。这是因为，在优化批处理中的查询时，优化器不知道\
  \ `WHERE` 子句中使用的变量的值，也无法确定正确的访问策略——它要到执行时才知道变量的值。这实际上意味着优化器不得不使用密度向量，而不是通过统计信息中的直方图来查找信息。\n\
  \n为避免此特定性能问题，请使用以下方法之一：不要在批处理中使用局部变量作为此类查询的过滤条件。局部变量不同于参数值，如第 16 章所示。为批处理创建一个存储过程并按如下方式执行：\n\
  \n```sql\nCREATE PROCEDURE dbo.LocalVarProc\n    @LocalVar INT\nAS\nSELECT  columnlist\n\
  FROM    dbo.tablename\nWHERE   keycolumn = @LocalVar;\n```\n\n\n\n```markdown\n\
  # 第 19 章 ■ 减少查询资源使用\n\n```sql\nCREATE PROCEDURE spProductDetails (@id INT)\nAS\n\
  SELECT pod.*\nFROM Purchasing.PurchaseOrderDetail AS pod\nJOIN Purchasing.PurchaseOrderHeader\
  \ AS poh\nON poh.PurchaseOrderID = pod.PurchaseOrderID\nWHERE poh.PurchaseOrderID\
  \ >= @id;\nGO\n\nEXEC spProductDetails\n@id = 1;\n```\n\n在理想情况下，优化器生成的执行计划与不使用局部变量的查询相同。相应地，执行时间也得以减少。对于存储过程，优化器在首次执行存储过程时生成执行计划，并根据提供的参数值来确定正确的处理策略。\n\
  \n这种方法可能适得其反。使用传递给参数的值的过程被称为*参数嗅探*。参数嗅探会自动发生在所有存储过程和参数化查询中。根据统计信息的准确性和传递给参数的值，有可能使用特定值得到一个糟糕的计划，而使用采样值（当你使用局部变量时）得到一个良好的计划。在任何给定情况下，测试是确定哪种方法效果最好的唯一途径。然而，在大多数情况下，拥有准确值通常比采样值更好。有关参数嗅探的更多详细信息，请参见第\
  \ 16 章。\n\n### 命名存储过程时要小心\n\n存储过程的名称确实很重要。你不应该使用 `sp_` 前缀来命名你的过程。开发人员通常给他们的存储过程加上\
  \ `sp_` 前缀，以便轻松识别。然而，SQL Server 会假定任何带有此前缀的存储过程很可能是一个系统存储过程，其位置在 `master` 数据库中。当提交一个带有\
  \ `sp_` 前缀的存储过程执行时，SQL Server 会按以下顺序在以下位置查找该存储过程：\n\n*   在 `master` 数据库中\n*   在当前数据库中，基于提供的任何限定符（数据库名或所有者）\n\
  *   如果未指定架构，则在当前数据库中使用 `dbo` 作为架构\n\n因此，尽管用户创建的、以 `sp_` 为前缀的存储过程存在于当前数据库中，但系统仍会首先检查\
  \ `master` 数据库。即使存储过程已用数据库名限定，这种情况也会发生。\n\n要理解给存储过程名称添加 `sp_` 前缀的影响，请考虑以下存储过程：\n\
  \n```sql\nIF EXISTS ( SELECT *\n            FROM sys.objects\n            WHERE\
  \ object_id = OBJECT_ID(N'[dbo].[sp_Dont]')\n              AND type IN (N'P', N'PC')\
  \ )\n    DROP PROCEDURE [dbo].[sp_Dont]\nGO\n\nCREATE PROC [sp_Dont]\nAS\n    PRINT\
  \ 'Done!'\nGO\n\n--将 sp_Dont 的计划添加到过程缓存中\nEXEC AdventureWorks2012.dbo.[sp_Dont]\
  \ ;\nGO\n\n--使用上面缓存的 sp_Dont 计划\nEXEC AdventureWorks2012.dbo.[sp_Dont] ;\nGO\n```\n\
  \n存储过程的第一次执行将其执行计划添加到过程缓存中。随后执行该存储过程时，除非需要重新编译计划（存储过程重新编译的原因在第 10 章中解释），否则会重用过程缓存中现有的计划。\n\
  \n因此，如图 19-12 所示的存储过程 `sp_Dont` 的第二次执行应该在过程缓存中找到一个计划。这在相应的扩展事件输出中由 `SP:CacheMiss`\
  \ 事件表示。\n\n***图 19-12.** 扩展事件输出，显示了 `sp_` 前缀对存储过程名称的影响*\n\n请注意，在 SQL Server 尝试在过程缓存中定位存储过程的计划之前，会触发一个\
  \ `SP:CacheMiss` 事件。该 `SP:CacheMiss` 事件是由 SQL Server 在 `master` 数据库中查找存储过程引起的，即使存储过程的执行已正确限定为用户数据库名。\n\
  ```\n\n\n\n当您创建一个与现有系统存储过程同名的存储过程时，`sp_`前缀的这个特性会变得更加有趣。\n\n```\nCREATE PROC sp_addmessage\
  \ @param1 NVARCHAR(25)\n\nAS\n\nPRINT '@param1 = ' + @param1 ;\n\nGO\n\nEXEC AdventureWorks2012.dbo.[sp_addmessage]\
  \ 'AdventureWorks';\n```\n\n如图 19-13 所示，执行这个用户定义的存储过程，反而会导致执行`master`数据库中的系统存储过程`sp_addmessage`。\n\
  \n***图 19-13.** 展示`sp_`前缀对存储过程名称影响的执行结果* 不幸的是，无法执行这个用户定义的存储过程。现在您能明白为什么不应该用`sp_`作为用户定义存储过程名称的前缀了。请使用其他命名约定。\n\
  \n## 减少网络往返次数\n\n数据库应用程序通常执行多个查询来实现一个数据库操作。除了优化单个查询的性能外，优化批处理的性能也很重要。为了减少多次网络往返的开销，请考虑以下技术：\n\
  \n• 一起执行多个查询。\n\n• 使用`SET NOCOUNT`。\n\n让我们更深入地了解一下这些技术。\n\n### 一起执行多个查询\n\n最好将一组查询作为一个批处理或存储过程一起提交。除了减少数据库应用程序和服务器之间的网络往返次数外，存储过程还提供多种性能和管理上的优势，如第\
  \ 15 章所述。这意味着应用程序中的代码需要能够处理多个结果集。这也意味着您的 T-SQL 代码可能需要处理 XML 数据或其他大型数据集，而不是单行的插入或更新。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 19 章 ■ 减少查询资源使用\n\n### 使用`SET\
  \ NOCOUNT`\n\n在执行批处理或存储过程时，还需要考虑另一个因素。在批处理或存储过程中的每个查询执行完毕后，服务器会报告受影响的行数。\n\n(<Number>\
  \ row(s) affected)\n\n此信息会返回给数据库应用程序，并增加了网络开销。使用 T-SQL 语句`SET NOCOUNT`可以避免此开销。\n\
  \n`SET NOCOUNT ON` <SQL queries> `SET NOCOUNT OFF`\n\n请注意，与某些 SET 语句不同（如第 17 章所述），`SET\
  \ NOCOUNT`语句不会导致存储过程的重新编译问题。\n\n## 降低事务成本\n\nSQL Server 中的每个操作查询都是作为*原子*操作执行的，因此数据库表的状态从一个*一致*状态转移到另一个一致状态。SQL\
  \ Server 自动执行此操作，且无法禁用。如果从一个一致状态转移到另一个一致状态需要多个数据库查询，则应使用显式定义的数据库事务来维护跨多个查询的原子性。每个原子操作的旧状态和新状态都保存在事务日志（在磁盘上）中，以确保*持久性*，这保证了一旦原子操作成功完成，其结果不会丢失。执行中的原子操作通过数据库锁与其他数据库操作*隔离*。\n\
  \n基于事务的特性，以下是降低事务成本的两条主要建议：\n\n• 减少日志记录开销。\n\n• 减少锁开销。\n\n### 减少日志记录开销\n\n一个数据库查询可能包含多个数据操作查询。如果为每个查询单独维护原子性，则会在事务日志上执行大量的磁盘写入。由于磁盘活动相比内存或\
  \ CPU 活动极其缓慢，过度的磁盘活动会增加数据库功能的执行时间。例如，考虑以下批处理查询：\n\n```\n--Create a test table\n\
  IF (SELECT OBJECT_ID('dbo.Test1')\n) IS NOT NULL\nDROP TABLE dbo.Test1;\nGO\nCREATE\
  \ TABLE dbo.Test1 (C1 TINYINT);\nGO\n```\n\n\n\n"
- "# 第 19 章 ■ 减少查询资源使用\n\n## 减少日志磁盘写入\n\n--插入 10000 行数据\n```sql\nDECLARE @Count INT\
  \ = 1;\n\nWHILE @Count <= 10000\nBEGIN\n    INSERT INTO dbo.Test1 (C1)\n    VALUES\
  \ (@Count % 256);\n    SET @Count = @Count + 1;\nEND\n```\n\n由于每次执行`INSERT`语句本身都是原子性的，SQL\
  \ Server 会对每次`INSERT`语式的执行都写入事务日志。\n\n减少日志磁盘写入次数的一个简单方法是将操作查询包含在一个显式事务中。\n```sql\n\
  DECLARE @Count INT = 1;\n\nDBCC SQLPERF(LOGSPACE);\n\nBEGIN TRANSACTION\n\nWHILE\
  \ @Count <= 10000\nBEGIN\n    INSERT INTO dbo.Test1 (C1)\n    VALUES (@Count % 256);\n\
  \    SET @Count = @Count + 1;\nEND\n\nCOMMIT\n\nDBCC SQLPERF(LOGSPACE);\n```\n\n\
  定义的事务范围（在`BEGIN TRANSACTION`和`COMMIT`命令对之间）将原子性的范围扩展到事务内包含的多个`INSERT`语句。这减少了日志磁盘写入的次数，并提高了数据库功能的性能。为了验证这个理论，请在每个`WHILE`循环前后运行以下\
  \ T-SQL 命令。\n```sql\nDBCC SQLPERF(LOGSPACE);\n```\n\n这将向你显示日志空间的使用百分比。在我的数据库上运行第一组插入时，日志使用率从\
  \ 2.6%上升到 29%。运行第二组插入时，日志增长了约 6%。\n\n最佳方法是处理数据集而不是单个行。`WHILE`循环可能本身就是一种成本高昂的操作，类似于游标（关于游标的更多细节见第\
  \ 22 章）。因此，运行一个避免使用`WHILE`循环，而是采用基于集合的方法的查询会更好。\n```sql\nDECLARE @Count INT = 1;\n\
  \nBEGIN TRANSACTION\n\nWHILE @Count <= 10000\nBEGIN\n    INSERT INTO dbo.Test1 (C1)\n\
  \    VALUES (@Count % 256);\n    SET @Count = @Count + 1;\nEND\n\nCOMMIT\n```\n\n\
  在前后运行`DBCC SQLPERF()`函数执行此查询显示，日志内已用空间的增长不到 4%，并且它在 41 毫秒内运行完成，而`WHILE`循环则需要超过 2\
  \ 秒。\n\n然而，需要注意的一个问题是，在事务中包含过多的数据操作查询会增加事务的持续时间。在此期间，所有试图访问事务中涉及的资源的其他查询都会被阻塞。长事务还会导致回滚持续时间和恢复期间的恢复时间增加。\n\
  \n### 减少锁开销\n\n默认情况下，所有四种 SQL 语句（`SELECT`、`INSERT`、`UPDATE`和`DELETE`）都使用数据库锁将其工作与其他\
  \ SQL 语句的工作隔离开来。这种锁管理为查询增加了性能开销。通过请求更少的锁可以提高查询的性能。推而广之，其他查询的性能也会得到改善，因为它们需要等待获取自身锁的时间更短。\n\
  \n默认情况下，SQL Server 可以提供行级锁。对于处理大量行的查询，为所有单独的行请求行锁会给锁管理过程增加显著的开销。你可以通过降低锁的粒度（例如页级或表级）来减少这种锁开销。SQL\
  \ Server 会动态考虑锁开销来执行锁升级。因此，通常不需要手动升级锁级别。但是，如果需要，可以使用锁提示以编程方式控制查询的并发性，如下所示：\n```sql\n\
  SELECT * FROM <TableName> WITH(PAGLOCK) --使用页级锁\n```\n\n类似地，默认情况下，SQL Server 除了对`INSERT`、`UPDATE`和`DELETE`语句使用锁外，也对`SELECT`语句使用锁。这允许`SELECT`语句读取未被修改的数据。在某些情况下，数据可能相当静态，不会经历太多修改。在这种情况下，你可以通过以下方式之一来减少`SELECT`语句的锁开销：\n\
  - 将数据库标记为 `READONLY`（只读）。\n  ```sql\n  ALTER DATABASE <DatabaseName> SET READ_ONLY\n\
  \  ```\n\n\n\n"
- '# 第 19 章 ■ 减少查询资源使用


  此设置允许用户从数据库检索数据，但防止其修改数据。设置会立即生效。如果需要对数据库进行偶尔的修改，则可以临时将其转换为 `READWRITE` 模式。


  `ALTER DATABASE <数据库名称> SET READ_WRITE`


  `<数据库修改操作>`


  `ALTER DATABASE <数据库名称> SET READONLY`


  • 使用一种快照隔离级别。


  SQL Server 提供了一种机制，在数据更新发生时将其版本存入 `tempdb`，从而显著减少读取操作的锁开销和阻塞。你可以使用 `ALTER` 语句更改数据库的隔离级别。


  ```sql

  ALTER DATABASE AdventureWorks2012 SET TRANSACTION ISOLATION LEVEL READ_COMMITTED_SNAPSHOT;

  ```


  • 防止 `SELECT` 语句请求任何锁。


  ```sql

  SELECT * FROM <表名> WITH(NOLOCK)

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  这可以防止 `SELECT` 语句请求任何锁，并且仅适用于 `SELECT` 语句。


  虽然 `NOLOCK` 提示不能直接在操作查询（`INSERT`、`UPDATE` 和 `DELETE`）所引用的表上使用，但它可以在操作查询的数据检索部分使用，如下所示：


  ```sql

  DELETE Sales.SalesOrderDetail

  FROM Sales.SalesOrderDetail sod WITH(NOLOCK)

  JOIN Production.Product p WITH(NOLOCK)

  ON sod.ProductID = p.ProductID

  AND p.ProductID = 0;

  ```


  需要了解的是，这会导致脏读，可能引起行重复或行丢失，因此被认为是控制锁的最后手段。最佳做法是将数据库标记为只读或使用一种快照隔离级别。


  这是一个很大的话题，还有很多内容可以讨论。我将在下一章讨论不同类型的锁请求以及如何管理锁开销。如果你对数据库执行了本节中提出的任何更改，我建议从备份中恢复。


  ## 本章小结


  正如本章所述，要提高数据库应用程序的性能，确保 SQL 查询设计得当以受益于索引、存储过程、数据库约束等性能增强技术至关重要。确保查询对资源友好，并且不妨碍索引的使用。在许多情况下，优化器能够生成具有成本效益的执行计划，无论查询结构如何，但首先正确设计查询仍然是良好的实践。即使你为单个查询设计了出色的性能，数据库应用程序的整体性能也可能不尽如人意。不仅提高单个查询的性能很重要，确保它们与其他查询良好协作而不引起严重的阻塞问题也同样重要。在下一章中，你将探讨数据库应用程序的不同阻塞方面。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


