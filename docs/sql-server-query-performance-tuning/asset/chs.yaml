  >`\n`<owner-list>`\n`<owner id=\"processf4ecf498\" mode=\"X\" />`\n`</owner-list>`\n\
  `<waiter-list>`\n`<waiter id=\"processf4ced868\" mode=\"U\" requestType=\"wait\"\
  \ />`\n`</waiter-list>`\n`</keylock>`\n\n(续)\n\n### 表 21-1. （续）\n\n**日志中的条目**\n\n\
  **描述**\n\n\n\n**<keylock hobtid=\"72057594046840832\" dbid=\"9\" objectname=\"AdventureWorks2008R2.Purchasing.PurchaseOrderHeader\"\
  \ indexname=\"1\" id=\"lockf98b8800\" mode=\"X\" associatedObjectId=\"72057594046840832\"\
  >** <owner-list> <owner id=\"processf4ced868\" mode=\"X\" /> </owner-list> <waiter-list>\
  \ <waiter id=\"processf4ecf498\" mode=\"U\" requestType=\"wait\" /> </waiter-list>\
  \ </keylock> </resource-list> </deadlock>\n\n这些信息比图形化死锁图提供的那套干净数据更难读一些。不过，它们包含的信息类似，只是更为详细。你可以看到，在底部附近加粗高亮的部分，是与死锁相关的其中一个键的定义。你还可以看到，在它之前一点，执行计划的文本可以通过扩展事件\
  \ XML 输出获得，这一点与死锁图不同。在这种情况下，你更有可能获得隔离死锁原因所需的一切信息。\n\n由跟踪标志 `1222` 收集的信息在各个方面几乎与\
  \ XML 数据完全相同。主要区别在于格式和位置。`1222` 的输出位于 SQL Server 错误日志中，并且是文本格式，而不是整洁的 XML。由跟踪标志\
  \ `1204` 收集的信息则与另外两套数据完全不同，并且提供的细节远没有那么丰富。跟踪标志 `1204` 也更难解读。基于所有这些原因，我建议你尽可能坚持使用扩展事件——如果不行，则使用跟踪标志\
  \ `1222` ——来捕获死锁数据。你还有 `system_health` 会话，它默认捕获许多事件，包括死锁。如果你没有准备好捕获这些信息，它是一个很好的资源。只需记住，它只在线保留四个\
  \ 5MB 的文件。当这些文件填满时，最旧文件中的数据就会丢失。根据系统中的事务数量以及可能填满这些文件的死锁或其他事件的数量，你可能只有近期数据可用。此外，如前所述，由于\
  \ `system_health` 会话使用环形缓冲区来捕获事件，你可能会预期大量的事件丢失，因此你的死锁事件可能会丢失。\n\n此示例演示了一个经典的循环引用。虽然不明显，但死锁是由\
  \ `Purchasing.PurchaseOrderDetail` 表上的触发器引起的。当 `Purchasing.PurchaseOrderDetail`\
  \ 表上的 `Quantity` 被更新时，它会尝试更新 `Purchasing.PurchaseOrderHeader` 表。\n\n当前两个查询分别在开放的事务中运行时，这只是一个阻塞情况。第二个查询正在等待第一个查询完成，以便它也能更新\
  \ `Purchasing.PurchaseOrderHeader` 表。但是，当第三个查询（即第一个事务中的第二个查询）被引入时，就产生了循环引用。解决它的唯一方法是终止其中一个进程。\n\
  \n在继续之前，请确保回滚任何未完成的事务。\n\n在这个阶段，显而易见的问题是：你能避免这个死锁吗？如果答案是“能”，那么该怎么做？\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 21 章 ■ 死锁的原因和解决方案\n\n## 避免死锁\n\n避免死锁场景的方法取决于死锁的性质。以下是一些可用于避免死锁的技术：\n\n- 以相同的物理顺序访问资源。\n\
  - 减少访问的资源数量。\n- 最小化锁争用。\n\n### 以相同的物理顺序访问资源\n\n避免死锁最常用的技术之一是确保每个事务以相同的物理顺序访问资源。例如，假设两个事务需要访问两个资源。\n\
  \n如果每个事务以相同的物理顺序访问资源，那么第一个事务将成功获取资源上的锁，而不会被第二个事务阻塞。第二个事务在尝试获取第一个资源上的锁时，将被第一个事务阻塞。这将导致典型的阻塞场景，而不会导致循环阻塞和死锁。\n\
  \n如果资源不是以相同的物理顺序访问（如前面的死锁分析示例所示），这可能导致两个事务之间的循环阻塞。\n\n- 事务 1：\n    - 访问资源 1\n  \
  \  - 访问资源 2\n- 事务 2：\n    - 访问资源 2\n    - 访问资源 1\n\n在当前的死锁场景中，以下资源涉及死锁：\n\n- 资源\
  \ 1，`hobtid=72057594046578688`：这是 `Purchasing.PurchaseOrderDetail` 表上索引 `PK_PurchaseOrderDetail_PurchaseOrderId_PurchaseOrderDetailId`\
  \ 中的索引行。\n- 资源 2，`hobtid=72057594046644224`：这是 `Purchasing.PurchaseOrderHeader`\
  \ 表上聚集索引 `PK_PurchaseOrderHeader_PurchaseOrderId` 中的行。\n\n两个会话都试图访问该资源；不幸的是，它们访问键的顺序不同。\n\
  \n在由 `nHibernate` 和 `Entity Framework` 等工具生成的代码中，经常可以看到不同查询中以不同顺序引用对象。你必须与你的开发团队合作，以确保在生成的代码中消除这类问题。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 减少访问的资源数量\n\n死锁涉及至少两个资源。一个会话持有第一个资源，然后请求第二个资源。另一个会话持有第二个资源，然后请求第一个资源。如果你能阻止会话（或至少其中一个）访问死锁中涉及的一个资源，那么你就可以防止死锁。你可以通过重新设计应用程序来实现这一点，这是一个在项目后期开发人员强烈抵制的解决方案。\n\
  \n但是，你可以考虑在不改变应用程序设计的情况下使用 SQL Server 的以下特性：\n\n- 将非聚集索引转换为聚集索引。\n- 为 `SELECT` 语句使用覆盖索引。\n\
  \n#### 将非聚集索引转换为聚集索引\n\n如你所知，非聚集索引的叶级页与堆或聚集索引的数据页是分开的。因此，一个非聚集索引需要两个锁：一个用于基表（无论是聚集索引还是堆），另一个用于非聚集索引本身。然而，在聚集索引的情况下，索引的叶级页和表的数据页是相同的；它只需要一个锁，这个锁同时保护聚集索引和表，因为叶级页和数据页是相同的。与非聚集索引相比，这减少了同一查询需要访问的资源数量。但是，这完全取决于这是否是一个合适的聚集索引。\n\
  \n聚集索引本身并没有什么神奇之处，简单地将其应用于任何列都不会有帮助。你仍然需要评估它是否合适。\n\n#### 为 SELECT 语句使用覆盖索引\n\n\
  你也可以使用覆盖索引来减少 `SELECT` 语句访问的资源数量。由于 `SELECT` 语句可以直接从覆盖索引本身获取所有内容，因此它不需要访问基表。否则，`SELECT`\
  \ 语句需要访问索引和基表以检索所有必需的列值。\n\n使用覆盖索引可以阻止 `SELECT` 语句访问基表，从而使基表可以被其他会话自由锁定。\n\n###\
  \ 最小化锁争用\n\n\n\n"
- '# 第 21 章 ■ 死锁的原因与解决方案


  你还可以通过避免对其中一个争用资源发起锁请求来解决死锁。当资源仅用于读取数据时，可以采用此方法。修改资源时，系统总会获取该资源的排他锁（X 锁）以维护资源的一致性；因此，在死锁情况下，识别那些只读的资源访问，并尽可能通过使用脏读功能来避免它们对应的锁请求。你可以使用以下技术来避免对争用资源的锁请求：


  *   实现行版本控制。

  *   降低隔离级别。

  *   使用锁提示。


  #### 实现行版本控制


  与其试图通过更严格的锁定方案来阻止对资源的访问，不如通过 `READ_COMMITTED_SNAPSHOT` 隔离级别或 `SNAPSHOT` 隔离级别来实现行版本控制。行版本控制隔离级别用于减少阻塞，如第
  20 章所述。由于它们减少了阻塞（这是死锁的根本原因），因此也有助于解决死锁问题。通过以下 T-SQL 引入 `READ_COMMITTED_SNAPSHOT`，你可以在
  `tempdb` 中获得行的版本，从而有可能消除前述死锁场景中由锁引起的争用：


  ```sql

  ALTER DATABASE AdventureWorks2012

  SET READ_COMMITTED_SNAPSHOT ON;

  ```


  这将允许任何必要的读取操作而不会引起锁争用，因为读取操作针对的是数据的另一个版本。行版本控制会带来开销，尤其是在 `tempdb` 中，并且在从多个资源（而不仅仅是查询中使用的表或索引）整合数据时。但是，增加的
  `tempdb` 开销与减少死锁、提高并发性所带来的好处之间的权衡可能是值得的。


  #### 降低隔离级别


  有时，`SELECT` 语句请求的（S）锁会导致循环阻塞的形成。你可以通过将包含 `SELECT` 语句的事务的隔离级别降低到 `READ UNCOMMITTED`
  来避免这种类型的循环阻塞。这将允许 `SELECT` 语句在不请求（S）锁的情况下读取数据，从而避免循环阻塞。然而，读取未提交数据会带来一个严重问题，即向客户端返回错误数据。你需要在走投无路的情况下，才考虑将此作为消除死锁的方法。


  同时，检查连接是否将自己设置为 `SERIALIZABLE`。有时在线连接字符串生成器会包含此选项，开发者可能会完全无意中使用它。`MSDTC` 默认使用可序列化隔离级别，但可以更改。


  #### 使用锁提示


  我绝对不推荐这种方法。但是，你可以使用以下锁提示来解决前述技术中呈现的死锁：


  *   `NOLOCK`

  *   `READUNCOMMITTED`


  与 `READ UNCOMMITTED` 隔离级别类似，`NOLOCK` 或 `READUNCOMMITTED` 锁提示将避免给定会话请求的（S）锁，从而防止循环阻塞的形成。


  锁提示的作用是在查询级别，并且仅限于应用它的表（及其索引）。


  `NOLOCK` 和 `READUNCOMMITTED` 锁提示仅允许在 `SELECT` 语句以及 `INSERT`、`DELETE` 和 `UPDATE`
  语句的数据选择部分中使用。


  最小化锁争用的解决技术会带来脏读的副作用，这可能并非在所有事务中都可接受。脏读可能涉及由于页面拆分和页面重排而导致的行缺失或额外行。因此，仅在数据质量要求不高的情况下使用这些解决技术。


  ## 小结


  如本章所述，死锁是进程间冲突阻塞的结果，并通过错误号 `1205` 报告给应用程序。你可以通过使用各种资源收集死锁信息来分析死锁的原因，但扩展事件 `Xml_deadlock_report`
  可能是最好的选择。


  你可以使用多种技术来避免死锁；适用哪种技术取决于参与会话执行的查询类型、在相关资源上持有和请求的锁，以及管理所需隔离级别的业务规则。通常，你可以通过重新配置索引和事务隔离级别来解决死锁。然而，有时你可能需要重新设计应用程序或在发生死锁时自动重新执行事务。请记住，从本质上讲，死锁是一个性能问题，任何能够使查询运行更快的措施都有助于缓解（即使不能完全消除）查询中的死锁。


  在下一章中，我将介绍游标的性能方面以及如何优化使用游标的成本开销。


