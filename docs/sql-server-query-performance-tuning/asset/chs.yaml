- '# 第二章：内存性能分析


  ## 系统相关指标


  ### 页面数/秒

  硬性页面故障的速率

  平均值 < 50，但需与基线进行对比


  ### 页面故障/秒

  总页面故障的速率

  需与其基线值进行对比以分析趋势


  ### 输入页面数/秒

  输入页面故障的速率


  ### 输出页面数/秒

  输出页面故障的速率


  ### 页面文件使用率百分比峰值

  内存页面文件中的峰值


  ### 页面文件：使用率百分比

  内存页面文件的使用率


  ## SQLServer:缓冲区管理器


  ### 缓冲区缓存命中率

  由缓冲区缓存满足的请求百分比

  需与其基线值进行对比以分析趋势


  ### 页面预期寿命

  页面在缓冲区缓存中停留的时间

  需与其基线值进行对比以分析趋势


  ### 检查点页面数/秒

  由检查点写入磁盘的页面

  平均值 < 30，但需与基线进行对比


  ### 惰性写入器/秒

  从缓冲区刷新的脏页（老化页面）

  平均值 < 20，但需与基线进行对比


  ## SQLServer:内存管理器


  ### 待处理内存授予

  等待内存授予的进程数

  平均值 = 0


  ### 目标服务器内存 (KB)

  SQL Server 在该服务器上可以拥有的最大物理内存

  接近物理内存的大小


  ### 服务器总内存 (KB)

  当前分配给 SQL 的物理内存

  接近目标服务器内存 (KB)


  ## 进程


  ### 私有字节

  此进程分配的、无法与其他进程共享的内存大小（以字节为单位）


  ***


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  内存与磁盘 I/O 密切相关。即使你认为遇到的问题是直接与内存相关的，你也应该收集 I/O 指标，以便理解系统在这两种资源之间的交互行为。


  现在，我将引导你了解这些计数器，以便更好地理解其可能用途。


  ### 可用字节数

  `可用字节数`计数器表示系统中可用的物理内存。你也可以查看 `可用千字节数` 和 `可用兆字节数`，它们提供相同的数据但粒度较粗。为了获得良好性能，此计数器的值不应过低。如果
  SQL Server 配置为动态内存使用，则此值将由调用 Windows API 控制，该 API 决定何时以及释放多少内存。如果此值长时间处于极低状态，并且
  SQL Server 的内存使用量没有变化，则表明服务器正承受严重的内存压力。


  ### 页面数/秒 和 页面故障/秒

  要理解 `页面数/秒` 和 `页面故障/秒` 计数器的重要性，你首先需要了解页面故障。


  *页面故障* 发生在一个进程需要的代码或数据不在其*工作集*（其在物理内存中的空间）中时。


  它可能导致软页面故障或硬页面故障。如果故障页面在物理内存的其他地方找到，则称为*软页面故障*。当进程需要的代码或数据不在其工作集或物理内存的其他地方，必须从磁盘检索时，就会发生*硬页面故障*。


  磁盘访问的速度对于机械硬盘来说是毫秒级，对于固态硬盘（SSD）可能低至 0.1 毫秒，而内存访问的速度是纳秒级。磁盘访问与内存访问之间的这种巨大速度差异，使得硬页面故障的影响与软页面故障相比非常显著。


  `页面数/秒` 计数器表示每秒为解决硬页面故障而从磁盘读取或写入磁盘的页面数。`页面故障/秒` 性能计数器表示系统处理的每秒总页面故障数——软页面故障加上硬页面故障。这些主要是负载的度量指标，并非性能问题的直接指标。


  由 `页面数/秒` 指示的硬页面故障不应持续高于正常水平。对于什么数值表示问题，没有硬性规定，因为这些数字会因系统配置（内存量、类型以及磁盘访问速度）的不同而有很大差异。


  如果 `页面数/秒` 计数器值很高，你可以将其拆分为 `输入页面数/秒` 和 `输出页面数/秒` 来分析。


  - *输入页面数/秒*：应用程序只会等待输入页面，而不会等待输出页面。

  - *输出页面数/秒*：页面输出会给系统带来压力，但应用程序通常不会直接感受到这种压力。页面输出通常由应用程序需要写回磁盘的脏页表示。`输出页面数/秒` 只有在磁盘负载成为问题时才需要关注。


  此外，在 `页面数/秒` 值很高的情况下，可以检查 `进程:页面故障/秒` 以找出是哪个进程导致了过多的分页。`进程` 对象是提供系统上运行进程性能数据的系统组件，每个进程由其对应的实例名称表示。


  例如，SQL Server 进程由 `Process` 对象的 `sqlservr` 实例表示。此计数器的高数值通常意义不大，除非 `页面数/秒` 也很高。`页面故障/秒`
  的值在正常应用行为中可能变化很大，从每秒 0 到 1,000 都是可接受的。因此，建立基线对于确定预期正常行为至关重要。


  ### 页面文件使用率百分比 和 页面文件使用率百分比

  Windows 系统中的内存并非全部是物理机的物理内存。Windows 会将那些未立即激活的内存交换到页面文件中，从而在物理内存空间中移入移出。这些计数器用于了解在你的系统上这种交换发生的频率。作为系统性能的一般度量，这些计数器仅适用于
  Windows 操作系统，而不直接适用于 SQL Server。然而，虚拟内存不足的影响会波及 SQL Server。收集这些计数器是为了了解 SQL Server
  面临的内存压力是内部的还是外部的。如果是外部内存压力，你需要进入 Windows 操作系统来确定可能的问题所在。


  ### 缓冲区缓存命中率

  *缓冲区缓存* 是数据页被读入的缓冲页池，通常是 SQL Server 内存池中最大的部分。此计数器的值应尽可能高，特别是对于 OLTP 系统，这类系统通常具有相当规范的数据访问模式，这与仓库或报表系统不同。对于大多数生产服务器，此计数器的值达到
  99% 或更高是极为常见的。`缓冲区缓存命中率` 值低表明很少有请求可以由缓冲区缓存满足，其余请求由磁盘满足。


  当发生这种情况时，要么 SQL Server 仍在预热阶段，要么缓冲区缓存的内存需求超过了可用于其增长的最大可用内存。如果缓存命中率持续较低，你可能需要考虑为系统增加更多内存，或者通过使用良好的索引和其他查询调优机制来减少内存需求，除非你处理的是包含大量即席查询的报表系统。在处理报表系统时，持续观察到缓存命中率极低是可能的。


  这使得缓冲区缓存命中率成为理解系统行为方面的有趣指标，但它本身并不足以表明潜在的性能问题。虽然这个数字代表了系统内一种有趣的行为，但它不是精确问题的良好度量标准，而是展示了一种行为类型。


  ### 页面预期寿命



  '
- "# 第 2 章 ■ 内存性能分析\n\n`页面使用寿命` 指示一个页面在不被引用的情况下将在缓冲池中保留多久。通常，此计数器的值较低意味着页面正从缓冲区中移除，降低了缓存的效率，并表明可能存在内存压力。在报告系统上，与\
  \ OLTP 系统相反，由于报告系统会访问更多数据，此数值可能保持在较低水平。在夜间加载期间，`页面使用寿命` 降至非常低的水平也很常见。由于这取决于您拥有的可用内存量和系统上运行的查询类型，因此没有适用于广大受众的硬性数字。因此，您需要为系统建立基线并随时间进行监控。\n\
  \n如果您的机器是非统一内存访问（NUMA）架构，您需要知道标准的 `页面使用寿命` 计数器是一个平均值。要查看特定度量，您需要使用 `缓冲区节点：页面使用寿命`\
  \ 计数器。\n\n## 检查点页数/秒\n\n`检查点页数/秒` 计数器表示由检查点操作移动到磁盘的页面数量。\n\n这些数字应该相对较低，例如，对于大多数系统，应小于每秒\
  \ 30。较高的数字意味着更多页面在缓存中被标记为 `脏页`。`脏页` 是在缓冲区中被修改的页面。\n\n当它被修改时，它会被标记为脏页，并将在下一个检查点期间写回磁盘。此计数器上的较高值表明系统中发生的写入数量较大，可能指示存在\
  \ I/O 问题。\n\n但是，如果您正在利用新的间接检查点，它允许您控制检查点的发生时间以减少恢复间隔，您可能会在这里看到不同的数字。在监控配置了间接检查点的数据库时，请考虑到这一点。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 惰性写入/秒\n\n`惰性写入/秒` 计数器记录缓冲区管理器的惰性写入进程每秒写入的缓冲区数量。此进程是系统进程将脏的、老化的缓冲区从缓冲区中移除，以释放内存供其他用途。脏的、老化的缓冲区是指有更改并需要写入磁盘的缓冲区。此计数器上的较高值可能指示\
  \ I/O 问题甚至内存问题。`惰性写入/秒` 的值对于普通系统应持续小于 20。然而，与所有其他计数器一样，您必须将您的值与基线度量进行比较。\n\n## 内存授予挂起\n\
  \n`内存授予挂起` 计数器表示 SQL Server 内存中等待内存授予的进程数量。如果此计数器值很高，则 SQL Server 缓冲区内存短缺。在正常情况下，对于大多数生产服务器，此计数器值应持续为\
  \ 0。\n\n另一种即时检索此值的方法是对 DMV `sys.dm_exec_query_memory_grants` 运行查询。\n\n`grant_time`\
  \ 列中的 `null` 值表示该进程仍在等待内存授予。这是您可用于通过识别查询（或多个查询）正在等待内存以执行来排查查询超时问题的一种方法。\n\n## 目标服务器内存\
  \ (KB) 与 总服务器内存 (KB)\n\n`目标服务器内存 (KB)` 指示 SQL Server 愿意消耗的动态内存总量。`总服务器内存 (KB)` 指示当前分配给\
  \ SQL Server 的内存量。如果系统专用于 SQL Server，`总服务器内存 (KB)` 计数器值可能非常高。如果 `总服务器内存 (KB)` 远小于\
  \ `目标服务器内存 (KB)`，则要么 SQL Server 内存需求低，要么 SQL Server 的 `max server memory` 配置参数设置得太低，或者系统处于\
  \ `预热阶段`。`预热阶段` 是指 SQL Server 启动后，数据库服务器在访问更多数据集时动态扩展其内存分配，将更多数据页带入内存的时期。\n\n您可以通过存在大量空闲页（通常为\
  \ 5,000 页或更多）来确认 SQL Server 的内存需求较低。此外，您可以通过查询 DMO `sys.dm_os_ring_buffers` 直接检查内存状态，它返回有关\
  \ SQL Server 内部内存分配的信息。我将在下一节更详细地介绍 `sys.dm_os_ring_buffers`。\n\n## 附加内存监控工具\n\n\
  虽然您可以从性能监视器计数器获得 SQL Server 内部内存行为的基础数据，但一旦知道需要花时间查看内存使用情况，您就需要利用其他工具和工具集。以下是一些常用于识别\
  \ SQL Server 系统上内存问题的参考点。其中一些工具仅适用于内存 OLTP 管理。虽然这些工具中的一些被大量 SQL Server 社区积极使用，但并未记录在\
  \ SQL Server 联机丛书中。这意味着它们绝对可能被更改或移除。\n\n### DBCC MEMORYSTATUS\n\n此命令深入 SQL Server\
  \ 内存并读出当前分配。它是一个时间点的测量，一个快照。它为您提供一组关于内存当前分配位置的度量。运行命令的结果返回为两个基本的结果集，如图 2-5 所示。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-35_1.jpg)\n\n\
  *图 2-5. `DBCC MEMORYSTATUS` 的输出*\n\n第一个数据集显示基本的内存分配和发生次数的计数。例如，`可用物理内存` 是系统可用内存的度量，而\
  \ `页面错误` 只是发生的页面错误次数的计数。\n\n第二个数据集显示 SQL Server 内部不同的内存管理器以及在调用 `MEMORYSTATUS` 命令时它们消耗的内存量。\n\
  \n这些都可以用来理解内存分配在系统中的发生位置。例如，在大多数系统中，大多数时间内存的主要消费者是缓冲池。您可以将 `目标提交` 值与 `当前提交` 值进行比较，以了解缓冲池是否面临压力。当\
  \ `目标提交` 高于 `当前提交` 时，您可能正遇到缓冲缓存问题，需要找出当前正在执行的 SQL Server 进程中哪个进程使用了最多的内存。这可以使用动态管理对象完成。\n\
  \n其余的数据集是 `DBCC MEMORYSTATUS` 产生的完整内存转储中的各种内存管理器、内存 clerks 和其他内存存储。它们仅在非常特定的、涉及\
  \ SQL Server 特定管理方面的狭窄情况下才有趣，并且远超出本文档记录它们的范围。您可以在 MSDN 文章 \"How to use the DBCC\
  \ MEMORYSTATUS 命令\" ([`bit.ly/1eJ2M2f`](http://bit.ly/1eJ2M2f)) 中阅读更多信息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 动态管理对象\n\n\n## SQL Server 中与内存相关的 DMO\n\nSQL Server 内部存在大量与内存相关的动态管理对象（DMO）。其中一些已随\
  \ SQL Server 2014 进行了更新，并且新增了一些。逐一详述所有这些对象超出了本书的范围。在判断 SQL Server 是否存在内存瓶颈时，最常用的主要有三种。\n\
  \n当你需要监控内存 OLTP（事务处理）的内存使用情况时，另外还有两个也很实用。\n\n### Sys.dm_os_memory_brokers\n\n尽管\
  \ SQL Server 中的大部分内存都分配给了缓冲区缓存，但内部还有许多其他进程也可能并且确实会消耗内存。这些进程通过此 DMO 暴露它们的内存分配情况。在你有其他迹象表明存在内存瓶颈时，可以使用此\
  \ DMO 查看哪些进程可能从缓冲区缓存中抢占了资源。\n\n### Sys.dm_os_memory_clerks\n\n内存 clerk（ clerks ）是在\
  \ SQL Server 内部分配内存的进程。查看这些进程的活动情况，可以让你了解 SQL Server 内部是否存在可能剥夺过程缓存所需内存的内部内存分配问题。如果性能监视器中\
  \ `Private Bytes`（私有字节）计数器很高，你可以通过 DMV 确定是系统的哪些部分消耗了这些内存。\n\n如果你有一个使用内存 OLTP 存储的数据库，可以使用\
  \ `sys.dm_db_xtp_table_memory_stats` 来查看各个数据库对象的情况。但如果你想查看整个实例范围内这些对象的分配情况，则需要使用\
  \ `sys.dm_os_memory_clerks`。\n\n### Sys.dm_os_ring_buffers\n\n此 DMV（动态管理视图）未在联机丛书中记录，因此可能会被更改或移除。它在\
  \ SQL Server 2008R2 和 SQL Server 2012 之间发生了变化。我通常针对它运行的查询似乎仍然适用于 SQL Server 2014，但这不能保证。此\
  \ DMV 以 XML 格式输出。通常你可以肉眼阅读其输出，但若要实现对环形缓冲区的复杂读取，可能需要使用 XQuery。\n\n环形缓冲区不过是对通知的记录响应。环形缓冲区保存在此\
  \ DMV 中，访问 `sys.dm_os_ring_buffers` 可以让你看到内存中事物的变化情况。表 2-2 描述了与内存相关的主要环形缓冲区。\n\n\
  ### 表 2-2. 与内存相关的主要环形缓冲区\n\n**环形缓冲区** | **Ring_buffer_type** | **用途**\n---|---|---\n\
  资源监视器 | `RING_BUFFER_RESOURCE_MONITOR` | 随着内存分配的变化，对此变化的通知会记录在此处。此信息对于识别外部内存压力很有用。\n\
  内存不足 | `RING_BUFFER_OOM` | 当你遇到内存不足问题时，它们会被记录在此处，这样你就可以知道是哪种内存操作失败了。\n内存代理 | `RING_BUFFER_MEMORY_BROKER`\
  \ | 当 SQL Server 内部内存下降时，低内存通知将强制进程为缓冲区释放内存。这些通知记录在此处，使其成为衡量内部内存压力何时发生的有用指标。\n缓冲池\
  \ | `RING_BUFFER_BUFFER_POOL` | 缓冲池本身内存不足的通知记录在此处。这只是内存压力的一般性指示。\n\n还有其他可用的环形缓冲区，但它们不适用于内存分配问题。\n\
  \n### Sys.dm_db_xtp_table_memory_stats\n\n要查看你创建的内存中表和索引的使用内存情况，可以查询此 DMV。输出会测量表和索引的已分配内存和已使用内存。它只输出\
  \ `object_id`（对象 ID），因此你还需要查询系统视图 `sys.objects` 以获取表或索引的名称。查询此 DMV 时，它仅输出你当前连接到的数据库的信息。\n\
  \n### Sys.dm_xtp_system_memory_consumers\n\n此 DMV 显示用于管理内存引擎内部的系统结构。这通常不是你需要处理的东西，但在排查内存问题时，了解你是直接处理系统内部发生的某些情况，还是仅仅处理你加载到内存中的数据量，是很有帮助的。你在此处要查找的主要指标是每个管理结构显示的\
  \ `allocated`（已分配）和 `used`（已使用）字节数。\n\n## 内存瓶颈解决方案\n\n当内存压力很大时（表现为大量的硬错误页面故障），你可以使用图\
  \ 2-6 所示的流程图来解决内存瓶颈。\n\n### 图 2-6. 内存瓶颈解决流程图\n\n```\n开始\n  |\n  V\n内存计数器偏离基线？\n\
  \  | 是\n  V\n内存：可用 MBytes（兆字节）低？\n  | 是\n  V\n在 Windows 操作系统中进行故障排除。\n  | 否\n  V\n\
  页面文件：使用率百分比达到峰值或页面文件：使用率百分比很高？\n  | 是\n  V\n在 Windows 操作系统中进行故障排除。\n  | 否\n  V\n\
  你存在内部内存压力。\n  |\n  V\n在 DBCC MEMORYSTATUS 中，COMMITTED（已提交）是否高于 TARGET（目标）？\n  |\
  \ 是\n  V\n使用 sys.dm_os_memory_brokers 识别大型消耗者。\n  | 否\n  V\n进程：私有字节数是否很高？\n  | 是\n\
  \  V\n使用 sys.dm_os_memory_clerks 识别大型消耗者。\n  | 否\n  V\n检查 VAS（虚拟地址空间）内存问题。\n  |\n\
  \  V\n检查 Windows 日志和 SQL Server 日志中的内存错误。\n```\n\n以下是内存瓶颈的一些常见解决方案：\n- 优化应用程序工作负载\n\
  - 为 SQL Server 分配更多内存\n- 将内存表移回标准存储\n- 增加系统内存\n- 从 32 位处理器更改为 64 位处理器\n- 启用 3GB\
  \ 进程空间\n- 压缩数据\n- 解决碎片问题\n\n当然，修复任何可能导致过度内存使用的查询问题始终是一个选择。让我们依次看看这些解决方案。\n\n###\
  \ 优化应用程序工作负载\n\n大多数情况下，优化应用程序工作负载是最有效的解决方案，但由于此过程涉及复杂性和挑战，通常最后才考虑。要识别内存密集型查询，请使用扩展事件（你将在第\
  \ 3 章学习如何使用）捕获所有 SQL 查询，然后按 `Reads`（读取）列对跟踪输出进行分组。逻辑读取次数最多的查询最常导致内存压力，但两者之间并不存在线性相关关系。你也可以使用\
  \ `sys.dm_exec_query_stats`（一个收集活动缓存中查询指标的 DMV）来识别相同的情况。但是，由于此 DMV 基于缓存，它可能不如使用扩展事件捕获指标那么准确，尽管它会更快、更简单。你将在本书中更详细地了解如何优化这些查询。\n\
  \n### 为 SQL Server 分配更多内存\n\n正如你在“SQL Server 内存管理”部分学到的，`max server memory`（最大服务器内存）配置可以限制\
  \ SQL Server 缓冲区内存池的最大大小。如果 SQL Server 的内存需求超过了 `max server memory` 值（你可以通过硬错误页面故障的数量来判断），那么增加该值将允许内存池增长。为了从增加\
  \ `max server memory` 值中获益，请确保系统中有足够的物理内存可用。\n\n如果你正在使用内存 OLTP 存储，你可能需要调整为已定义的内存对象资源池分配的内存百分比。但是，这将从\
  \ SQL Server 实例的其他部分获取内存。\n\n### 将内存表移回标准存储\n\n\n\n"
- '# 第二章：内存性能分析


  SQL Server 2014 引入了一种新的表类型，称为*内存*表。它将表的存储从磁盘转移到内存中，从而显著提升了性能。然而，并非所有的表或工作负载都能从这一新功能中受益。你需要密切关注内存表的常规查询性能指标，并利用特定的
  DMV（动态管理视图）来监控内存表。我将在第 23 章详细讨论这一切。如果你的工作负载与内存表配合不佳，或者系统内存不足，你可能需要将那些内存表移回磁盘存储。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ### 增加系统内存


  SQL Server 的内存需求取决于 SQL 活动所处理的数据总量。它与数据库的大小或传入的 SQL 查询数量没有直接关联。例如，一个内存密集型的查询如果对两个小表进行无任何过滤条件以缩小结果集的交叉连接，就可能给系统内存带来巨大压力。


  最简单快速的解决方法之一就是购买并安装更多内存以直接增加系统内存。然而，找出消耗物理内存的原因仍然很重要，因为如果应用程序工作负载是极端内存密集型的，你很快就会受到系统可访问最大内存量的限制。要识别哪些查询使用了更多内存，可以查询
  `sys.dm_exec_query_memory_grants` DMV 并收集有关查询及其 I/O 使用情况的指标。不过，当你使用 `JOIN` 或 `ORDER
  BY` 语句针对此 DMV 运行查询时请务必小心；如果你的系统已经处于内存压力之下，这些操作可能导致你的查询本身需要分配内存授权。


  ### 从 32 位处理器更改为 64 位处理器


  将物理服务器从 32 位处理器切换到 64 位处理器（并随之升级 Windows Server 软件）会从根本上改变 SQL Server 的内存管理能力。SQL
  Server 的内存限制从 3GB 提升到高达 8TB，具体取决于操作系统版本和特定的处理器类型。


  在 SQL Server 2012 之前，可以通过使用地址窗口扩展（Address Windowing Extensions）向 SQL Server 实例添加最多
  64GB 的数据缓存。这些功能在 SQL Server 2012 中被移除，因此 32 位的 SQL Server 实例被限制为只能访问 3GB 内存。由于此限制，只有小型系统才应运行
  SQL Server 2014 的 32 位版本。


  ### 压缩数据


  数据压缩在存储和检索信息方面有许多显著的优点。它还有一个许多人没有意识到的好处：当压缩信息存储在内存中时，它会保持压缩状态。这意味着可以用更少的系统内存移动更多的信息，从而提高你的整体内存吞吐量。


  这一切确实会带来一定的 CPU 开销，因此你需要密切关注，以确保你不是在简单地转移压力。有时，由于数据的性质，你可能看不到太大的压缩效果。


  ### 启用 3GB 进程地址空间


  标准的 32 位地址最多可以映射 4GB 的内存。因此，32 位 Windows 操作系统进程的标准地址空间被限制为 4GB。在这 4GB 的进程空间中，默认情况下，上部
  2GB 预留给操作系统，下部 2GB 供应用程序使用。如果你在 32 位操作系统的 `boot.ini` 文件中指定 `/3GB` 开关，操作系统只保留 1GB
  的地址空间，应用程序可以访问最多 3GB。这也被称为*4GB 调优*（4GT）。此目的不需要新的 API。


  因此，在一个具有 4GB 物理内存和默认 Windows 配置的机器上，你会发现可用内存大约为 2GB 或更多。为了让 SQL Server 使用最多 3GB
  的可用内存，你可以在 `boot.ini` 文件中添加 `/3GB` 开关，如下所示：


  ```

  [boot loader]

  timeout=30

  default=multi(0)disk(0)rdisk(0)partition(1)\WINNT

  [operating systems]

  multi(0)disk(0)rdisk(0)partition(1)\WINNT=

  "Microsoft Windows Server 2012 R2 Advanced Server"

  /fastdetect /3GB

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  如后续章节所述，对于物理内存超过 16GB 的系统，或需要更高内核内存量的系统，不应使用 `/3GB` 开关。


  64 位系统上的 SQL Server 2014 在 x64 平台上可以支持高达 8TB。将生产系统，特别是企业级生产系统，放在 32 位架构上已经没有太大意义了。


  ### 处理碎片


  虽然存储碎片听起来可能不像是一个性能问题，但由于 SQL Server 从磁盘检索信息到内存的方式，访问的是信息页。如果你有高水平的碎片，这将直接转化为你的内存管理问题，因为你必须将从磁盘检索到的页面按原样存储到内存中，包括空白空间。因此，碎片不仅影响存储，也会影响内存。


  我将在第 17 章讨论碎片问题。


  ## 小结


  在本章中，你了解了性能监视器和 DMO（动态管理对象）。你探索了在 SQL Server 中收集内存和内存行为指标的不同方法。理解内存的行为方式将帮助你理解系统的性能表现。你还看到了除简单地购买更多内存之外，解决内存问题的多种可能方案。SQL
  Server 将会利用你能提供的所有内存，所以请管理好这项资源。


  在下一章中，你将了解到下一个系统瓶颈：磁盘和磁盘子系统。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


