- '# 第 24 章 ■ 数据库性能测试


  知道如何识别性能问题以及如何修复它们是很好的技能。但问题在于，你需要能够证明你所做的改进是真正的改进。虽然你能够也应该在调整查询或添加索引前后捕获性能指标，但确保你看到的是可衡量的改进的最佳方法是让你所做的更改发挥作用。测试不仅仅是简单地运行几次查询，然后将其投入生产系统并祈求好运。你需要一种系统的方法，使用在现实环境中针对你的系统运行的全套查询来验证性能改进。`SQL
  Server` 从 2012 版本开始，通过其 `Distributed Replay` 工具提供了这样的机制。


  `Distributed Replay` 与来自 `SQL Profiler` 及其创建的跟踪事件的信息一起工作。


  跟踪事件捕获信息的方式与 `Extended Events` 工具有些相似，但跟踪事件是一种较旧（且功能较弱）的在系统中捕获事件的机制。在 `SQL Server`
  2012 版本发布之前，你可以使用 `SQL Server` 的 `Profiler` 工具通过服务器端跟踪重放捕获的事件。这虽然可行，但过程极其有限。例如，该工具只能在单台机器上运行，并且它处理重放机制的方式——一个以串行方式运行的单线程过程，而不是现实中发生的情况。


  微软为 `SQL Server` 添加了能够从多台机器以并行方式运行的功能。在微软提供一种通过 `Extended Events` 输出使用 `Distributed
  Replay` 的机制之前，你仍然需要使用跟踪事件来进行部分性能测试。


  `Distributed Replay` 并不是一个被广泛采用的工具。大多数人干脆跳过了实施可重复测试的想法。其他人可能会使用一些提供更多功能的第三方工具。我强烈建议你进行某种形式的测试，以确保你的调整工作正在对你的系统产生可准确衡量的积极影响。


  本章涵盖以下主题：


  • 数据库测试的概念


  • 如何创建服务器端跟踪


  • 使用 `Distributed Replay` 进行数据库测试


  ## 数据库性能测试


  数据库性能和负载测试的通用方法相当简单。你需要捕获生产系统在正常负载下的调用，然后能够在测试系统上反复重放该负载。


  这使你能够直接测量由代码或结构更改引起的性能变化。


  不幸的是，在现实世界中实现这一点并不像听起来那么简单。


  首先，你不能简单地捕获查询的记录。相反，你必须首先确保你可以将生产数据库恢复到测试系统上的某个时间点。具体来说，你需要能够恢复到你在系统上开始记录事务的确切时刻，因为如果你恢复到任何其他时间点，你可能会拥有不同的数据甚至不同的结构。这将导致重放机制生成错误而不是有用的信息。这意味着，首先，你必须有一个处于
  `Full Recovery` 模式的数据库，以便你可以进行定期的完整备份以及日志备份，从而恢复到测试将开始的特定时间点。


  一旦你建立了恢复到适当时间点的能力，你将需要配置你的查询捕获机制——在本例中，是由 `Profiler` 生成的服务器端跟踪定义。重放机制将准确定义你需要捕获哪些事件。你需要设置你的捕获过程，使其对你的系统影响尽可能小。


  接下来，你必须处理跟踪捕获的大量数据。根据你的系统规模，你可能在短时间内有大量的事务。所有这些数据都必须存储和管理，并且会产生许多文件。


  你可以将此过程设置在单台机器上；然而，为了真正看到好处，你将需要设置多台机器来支持 `Distributed Replay` 工具的重放能力。这意味着你需要将这些机器作为你测试过程的一部分。不幸的是，除了
  `Enterprise` 版本外，所有版本都只能使用单个客户端，因此在设置测试环境时需要考虑到这一点。


  当你将所有这些不同的部分都准备就绪后，就可以开始测试了。当然，这引出了一个新问题：你到底在用数据库测试做什么？


  ### 可重复的过程


  如第 1 章所述，性能调优你的系统是一个迭代过程，你可能需要经历多次才能将性能提升到你所需的位置并保持在那里。因为业务会随时间变化，你的数据分布、应用程序、数据结构以及所有支持它的代码也会随之变化。鉴于这一切，你能为测试做的最重要的事情之一就是创建一个可以反复运行的过程。


  你需要创建一个可重复测试过程的主要原因是你不能总是确保本书前面章节中概述的方法在所有情况下都有效。这种疑虑意味着你需要能够验证你所做的更改是否带来了性能的积极改进。


  如果没有，你需要能够撤销任何你所做的更改，进行一组新的更改，然后重复测试，迭代地重复这个过程。你可能会发现你需要重复整个调优周期，直到你达到这一轮的目标。


  由于这个过程的迭代性质，你绝对需要专注于尽可能地自动化它。这就是 `Distributed Replay` 工具发挥作用的地方。


  ### 分布式重放


  `Distributed Replay` 工具由三部分架构组成。


  • `Distributed Replay Controller`：此服务管理 `Distributed Replay` 系统的进程。




  '
- '# 第 24 章 ■ 数据库性能测试


  • `分布式重放管理员`：这是一个允许您控制`分布式重放控制器`和`分布式重放`进程的界面。


  • `分布式重放客户端`：这是一个在一台或多台机器（最多 16 台）上运行的界面，用于向您的数据库服务器发出所有调用。


  您可以将所有三个组件安装到一台机器上；然而，理想的方法是将控制器放在一台机器上，然后让一个或多个客户端机器与控制器完全分离，以便这些机器中的每一台仅处理您将对测试机器进行的部分事务。仅为说明目的，我将所有组件都运行在单个实例上。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  首先将`分布式重放控制器`服务安装到一台机器上。`分布式重放`实用程序没有图形界面。相反，您将使用 XML 配置文件来控制`分布式重放`架构的不同部分。您可以将分布式重放用于各种任务，例如基本查询重放、服务器端游标或预处理服务器语句。由于我主要涵盖查询调优，因此我专注于查询和预处理服务器语句（也称为`参数化查询`）。这定义了一组必须捕获的特定事件。我将在下一节介绍如何执行此操作。


  一旦信息被捕获到跟踪文件中，您就需要使用`分布式重放控制器`通过预处理事件运行该文件。这会将基本的跟踪数据修改为不同的格式，以便分发到各个`分布式重放客户端`机器。然后，您可以启动重放过程。重新格式化的数据被发送到客户端，客户端继而将创建查询以针对目标服务器运行。您可以从客户端机器捕获另一个跟踪输出，以准确查看它们执行了哪些调用，以及这些调用的
  I/O 和 CPU 情况。


  大概您还将在目标服务器上设置标准监控，以了解您生成的负载如何影响该服务器。


  当您准备对服务器运行系统时，可以选择两种重放类型之一：`同步模式`或`压力模式`。在`同步模式`下，您将获得与原始重放完全相同的副本，尽管您可以影响系统的空闲时间量。这对于精确的性能调优非常有用，因为它有助于您了解系统如何工作，特别是当您对结构、索引或
  T-SQL 代码进行更改时。


  `压力模式`不以任何特定顺序运行，但在单个连接内除外，查询将按正确顺序流式传输。在这种情况下，调用以客户端机器能够达到的最快速度发出——按任何顺序——以服务器能够接收的最快速度进行。简而言之，它执行压力测试。这对于测试数据库设计或硬件安装非常有用。


  ## 使用服务器端跟踪捕获数据


  使用跟踪事件捕获数据类似于使用`扩展事件`捕获查询执行。为了支持`分布式重放`过程，您需要为这些事件捕获一些特定事件和特定列。如果要构建自己的跟踪事件，您需要捕获下表中列出的事件。


  ### 表 24-1. 需要捕获的事件


  | 事件 | 列 |

  | :--- | :--- |

  | `准备 SQL` | `事件类` |

  | `执行准备的 SQL` | `EventSequence` |

  | `SQL:BatchStarting` | `TextData` |

  | `SQL:BatchCompleted` | `应用程序名称` |

  | `RPC:Starting` | `LoginName` |

  | `RPC:Completed` | `数据库名称` |

  | `RPC 输出参数` | `数据库 ID` |

  | `审核登录` | `主机名` |

  | `审核注销` | `二进制数据` |

  | `现有连接` | `SPID` |

  | `服务器端游标` | `开始时间` |

  | `服务器端准备的 SQL` | `结束时间` |

  |  | `IsSystem` |


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/index-504_1.jpg)




  设置这些事件有两种选择。首先，你可以使用 `T-SQL` 来设置服务器端跟踪。其次，你可以使用一个名为 `Profiler` 的外部工具。虽然 `Profiler`
  可以直接连接到你的 `SQL Server` 实例，但我强烈建议不要使用此工具来捕获数据。`Profiler` 最好用作执行捕获操作的模板提供程序。你应该使用
  `T-SQL` 来生成实际的服务器端跟踪。


  在测试或开发机器上，打开 `Profiler`，并从模板列表中选择 `TSQL_Replay`，如 `图 24-1` 所示。


  `图 24-1`：分布式重放跟踪模板


  由于分布式重放需要文件，你会希望将跟踪的输出保存到文件。反正这也是设置服务器端跟踪的最佳方式，所以这样做正合适。你应该将输出到一个有足够空间的目录。


  根据系统需要支持的事务数量，跟踪文件可能会非常大。


  另外，对文件大小设置限制并允许它们在需要时滚动创建新文件也是一个好主意。


  这样虽然会需要处理更多文件，但操作系统实际上能更好地处理大量较小文件的写入操作，而不是单个大文件。我发现这确实成立，原因有二。首先，较小的文件大小，滚动更新更快，这意味着如果你需要将其加载到表中或复制到另一台服务器，前一个文件可立即用于处理。其次，根据我的经验，简单日志文件的写入通常耗时更长，因为此类文件会变得非常大。我还建议为跟踪进程定义一个停止时间；这同样有助于确保不会填满你指定用于存储跟踪数据的驱动器。


  由于这是一个模板，事件和列已经为你选定。你可以单击“事件选择”选项卡来验证事件和列，确保你获得的正是所需内容。`图 24-2` 显示了一些事件和列，所有这些都已为你预先定义好。


  `图 24-2`：`T-SQL_Replay` 模板的事件和列


  此模板是通用的，因此它包含了完整的事件列表，包括所有游标事件。你可以通过单击框来取消选择事件进行编辑；但是，如果确实要移除内容，除了游标事件，我不建议移除其他任何内容。


  我是在连接到测试服务器而非生产机器的情况下启动此模板的，因为一旦你正确设置好，就必须单击 `Run` 来启动跟踪。我不会在生产系统上这样做。然而，在测试系统上，你可以查看屏幕以确保获得预期的事件。它将显示事件，同时也会将其捕获到文件中。当你满意配置正确后，可以暂停跟踪。接下来，单击
  `File` 菜单，然后选择 `Export` ➤ `Script Trace Definition`。最后，选择 `For SQL Server 2005 –
  2014`（参见 `图 24-3`）。


  `图 24-3`：用于输出跟踪定义的菜单选择


  此模板允许你将刚刚创建的跟踪保存为 `T-SQL` 文件。一旦有了 `T-SQL`，你就可以配置它在任何你喜欢的服务器上运行。文件路径将需要替换，并且你可以通过脚本中的参数重置停止时间。以下脚本展示了用于设置服务器端跟踪事件的
  `T-SQL` 过程的开头部分：


  ```

  /****************************************************/

  /* Created by: SQL Server 2014 Profiler             */

  /* Date: 06/06/2014 02:58:35 PM                     */

  /****************************************************/


  -- Create a Queue

  declare @rc int

  declare @TraceID int

  declare @maxfilesize bigint

  set @DateTime = ''2014-06-06 16:00:20.000''

  set @maxfilesize = 50


  -- Please replace the text InsertFileNameHere, with an appropriate

  -- filename prefixed by a path, e.g., c:\MyFolder\MyTrace. The .trc extension

  -- will be appended to the filename automatically. If you are writing from

  -- remote server to local drive, please use UNC path and make sure server has

  -- write access to your network share


  exec @rc = sp_trace_create @TraceID output, 0, N''InsertFileNameHere'', @maxfilesize,
  NULL

  if (@rc != 0) goto error

  ```


  你可以在显示 `InsertFileNameHere` 的地方编辑路径，并为 `@DateTime` 提供不同的值。至此，你的脚本就可以在任何 `SQL Server
  2014` 服务器上运行了。


  你收集的信息量确实取决于你想要运行的测试类型。对于标准性能测试，收集至少一小时的信息可能是个好主意；然而，在大多数情况下，你不希望捕获超过两到三小时的数据。另外，必须强调的是，跟踪事件不像扩展事件那样轻量级，因此你捕获数据的时间越长，对生产服务器的负面影响就越大。捕获更多数据意味着要管理更多数据，也意味着你计划运行测试的时间很长。


  在捕获数据之前，你确实需要考虑将在哪里运行测试。假设你不担心磁盘空间，也不需要保护法律审计数据（如果存在这些问题，你需要单独解决）。如果你的数据库未处于 `Full
  Recovery` 模式，那么你将无法使用日志备份将其恢复到某个时间点。如果是这种情况，我强烈建议在启动跟踪数据收集时运行一次数据库备份。原因是你需要数据库在开始记录事务时保持相同的状态。如果不是，你可能会遇到大量错误，这可能会严重改变性能测试的运行方式。例如，尝试选择或修改不存在的数据会影响测试中测量的
  `I/O` 和 `CPU`。如果你的数据库保持在与你跟踪开始时（或接近开始时）相同的状态，那么你应该很少（如果有的话）遇到错误。


  准备好数据库副本和一组跟踪数据后，你就可以运行分布式重放工具了。


  ## 用于数据库测试的分布式重放


  假设你使用了分布式重放模板来捕获跟踪信息，现在应该可以开始处理文件了。如前所述，第一步是将跟踪文件转换为不同的格式，一种可以分配到多个客户端机器上进行重放的格式。但这不仅仅是简单地对你的文件运行可执行文件。你还需要就希望分布式重放如何运行做出一些决定；这些决定是在预处理跟踪文件时做出的。


  这些决定相当直接。首先，你需要决定是否要与用户进程一起重放系统进程。除非你要处理特定的系统问题，否则我建议将此值设置为 `No`。这也是默认值。其次，你需要决定如何处理空闲时间。


  你可以使用实际的数据库调用频率值；或者，你可以输入一个以秒为单位的值，将等待时间限制为不超过该值。这实际上取决于你将要运行的重放类型。假设你使用 `Synchronization`
  模式重放（最适合直接性能测量的模式），通过将值设置得较低（例如三到五秒）来消除空闲时间是个好主意。




  '
- '# 配置与运行分布式重放


  如果你选择使用默认值，则无需修改配置文件。但如果你选择包含系统调用或更改空闲时间，那么就需要修改配置文件 `DReplay.Exe.Preprocess.config`。这是一个简单的
  XML 配置文件。我正在使用的文件如下所示：


  ```xml

  <?xml version="1.0" encoding="utf-8"?>

  <Options>

  <PreprocessModifiers>

  <IncSystemSession>No</IncSystemSession>

  <MaxIdleTime>2</MaxIdleTime>

  </PreprocessModifiers>

  </Options>

  ```


  我只做了一处更改，调整了 `MaxIdleTime` 以限制重放过程中的任何停顿时间。


  在运行预处理之前，请确保已安装 `DRController` 并且 `DReplay` 服务正在你的系统上运行。如果满足条件，你只需调用 `DReplay.exe`
  来执行预处理。


  ```

  dreplay preprocess –i c:\data\dr.trc –d c:\DRProcess

  ```


  在上面的代码中，你可以看到 `dreplay` 执行了 `preprocess` 事件。输入文件由 `–i` 参数提供，用于存放输出的文件夹则通过 `–d` 参数提供。跟踪文件将被处理，输出将进入指定的文件夹。输出结果将类似于图
  24-4。


  **图 24-4.** 分布式重放预处理步骤的输出


  预处理完成后，你就可以继续运行分布式重放过程了。


  但在此之前，你需要确保已准备好一个或多个客户端系统。


  ### 配置客户端


  客户端计算机必须进行配置才能与分布式重放控制器协同工作。首先，将你的客户端安装到不同的机器上。仅为演示目的，我在单台机器上运行所有组件；不过，即使你使用多台机器，设置过程也没有不同。你需要配置客户端以连接控制器，且一个客户端一次只能与一个控制器工作。你的系统还需要为两项内容预留空间。首先，你需要一个位置来存放每次重放时会被覆盖的工作文件。其次，如果你希望从该客户端收集执行数据，则需要为客户端输出的跟踪文件预留空间。你还需要决定客户端进程的日志记录级别。所有这些都在另一个
  XML 配置文件 `DReplayClient.config` 中设置。以下是我的配置：


  ```xml

  <Options>

  <Controller>DOJO</Controller>

  <WorkingDirectory>C:\DRClientWork\</WorkingDirectory>

  <ResultDirectory>C:\DRClientOutput\</ResultDirectory>

  <LoggingLevel>CRITICAL</LoggingLevel>

  </Options>

  ```


  目录和日志级别是清楚的。我还必须将客户端指向运行分布式重放服务的服务器。对于多个客户端工作，不需要其他设置；你只需要确保它们连接到正确的控制器系统即可。


  ### 运行分布式测试


  至此，你已完成所有配置并捕获了数据。接下来，你需要回到命令行，使用 `Dreplay.exe` 可执行文件来运行。大部分控制通过配置文件完成，因此可执行文件本身需要的输入很少。你使用以下命令调用测试：`Dreplay
  replay –d c:\data –w DOJO`


  你需要输入预处理输出的位置，这意味着你需要以逗号分隔的列表列出参与的客户端机器。执行的输出将类似于图 24-5。


  **图 24-5.** 运行 DReplay.exe 的输出


  如你所见，捕获了 365 个事件，但只重放了 244 个事件。其中，只有 151 个事件实际成功。在这种情况下，你可能需要确定关于为何某些事件失败的可能信息。为此，只需重新配置测试并再次运行即可。拥有可重复测试过程的整个理念就在于你可以反复运行它。前面的例子代表了对我本地
  `AdventureWorks2012` 副本进行的一次轻负载运行，捕获过程大约持续了五分钟。然而，我配置了空闲时间的限制，因此重放仅在 58 秒内就完成了。


  从这里开始，你可以根据需要重新配置测试、重置数据库并反复运行测试。


  请注意，更改配置文件将需要你重启相关服务，以确保更改在下一组测试中生效。


  运行这些测试时，建议使用我在第 2 至 6 章中讨论过的性能数据收集类型。这有助于你确保能够准确了解测试执行得好——或糟糕——的程度。


  ## 结论


  通过包含分布式重放实用工具，SQL Server 现在使你能够针对数据库执行负载和功能测试。你通过使用服务器端跟踪以简单的方式捕获代码来实现这一点。然而，如果你计划利用此功能，请务必验证你根据本书提出的原则对查询所做的更改是否确实有效，并将有助于提高系统性能。你还应确保重置数据库，以尽可能避免错误。


  '
- '# 数据库工作负载优化


  到目前为止，你已经了解到许多可能影响查询性能的方面，例如可用于分析查询性能的工具，以及可用于提高查询性能的优化技术。接下来，你将学习如何应用这些信息来分析、故障排除和优化数据库工作负载的性能。我将引导你完成一个调优过程，包括可能走一两次弯路，所以在我们浏览这个过程时请耐心等待。


  在本章中，我将涵盖以下主题：

  - 数据库工作负载的特征

  - 数据库工作负载优化涉及的步骤

  - 如何识别工作负载中代价高昂的查询

  - 如何测量代价高昂查询的基线资源使用和性能

  - 如何分析影响代价高昂查询性能的因素

  - 如何应用技术优化代价高昂的查询

  - 如何分析查询优化对整体工作负载的影响


  ## 工作负载优化基础


  优化数据库工作负载通常符合 80/20 法则：80% 的工作负载消耗大约 20% 的服务器资源。尝试优化大部分工作负载的性能通常效率不高。


  因此，工作负载优化的第一步是找到消耗 80% 服务器资源的那 20% 的工作负载。


  优化工作负载需要一套工具来测量工作负载不同部分的资源消耗和响应时间。正如你在第 4 和第 5 章中所看到的，SQL Server 提供了一套工具和实用程序来分析数据库工作负载和单个查询的性能。




  除了使用这些工具外，了解如何运用不同技术来优化工作负载也至关重要。关于工作负载优化，需要记住的最重要一点是：**并非每种优化技术都能保证解决每个性能问题**。许多优化技术针对特定的数据库应用程序设计和数据库环境。因此，对于每种优化技术，你都需要在应用前后分别测量工作负载各部分（即每个独立查询）的性能。之后，你需要使用第
  24 章概述的测试技术，衡量优化对整个工作负载的影响。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 25 章 ■ 数据库工作负载优化


  发现某种优化技术对工作负载的其他部分影响甚微，甚至产生负面影响，从而损害工作负载的整体性能，这种情况并不罕见。例如，为优化`SELECT`语句而添加的非聚集索引可能会损害修改索引列值的`UPDATE`语句的性能。`UPDATE`语句除了更新数据行外，还必须更新索引行。然而，如第
  6 章所示，有时索引也能提高操作查询的性能。因此，提升特定查询的性能可能会有益或损害整体工作负载的性能。一如既往，你最好的做法是通过测试来验证任何假设。


  ## 工作负载优化步骤


  优化数据库工作负载的过程遵循一系列特定步骤。在此过程中，你将使用前面章节介绍的一套优化技术。由于每个性能问题都是新的挑战，你可以使用不同的优化技术集来排查不同的性能问题。


  请始终牢记，第一步永远是确保服务器配置良好并在可接受的限制范围内运行，正如第 2 章和第 3 章所定义的那样。


  为了理解查询优化过程，你将使用一组查询来模拟一个示例工作负载。在优化此示例工作负载时，你将遵循以下优化步骤：


  1.  捕获工作负载。

  2.  分析工作负载。

  3.  确定开销最大/调用最频繁/运行时间最长的查询。

  4.  量化开销最大查询的基线资源使用情况。

  5.  确定总体资源使用情况。

  6.  编译资源使用的详细信息。

  7.  分析并优化外部因素。

  8.  分析索引的使用情况。

  9.  分析应用程序使用的批处理级别选项。

  10. 分析统计信息的有效性。

  11. 评估碎片整理的需求。

  12. 分析开销最大查询的内部行为。

  13. 分析查询执行计划。

  14. 确定执行计划中的高开销运算符。

  15. 分析处理策略的有效性。

  16. 优化开销最大的查询。

  17. 分析变更对数据库工作负载的影响。

  18. 迭代多个优化阶段。


  如第 1 章所述，性能调优是一个迭代过程。因此，你应该多次迭代执行性能优化步骤，直到达到期望的应用程序性能目标。经过一段时间后，你需要重复此过程，以应对数据和数据库变更对工作负载造成的影响。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- "# 第 25 章 ■ 数据库工作负载优化\n\n## 示例工作负载\n\n要对 SQL Server 性能进行故障排查，你需要了解在服务器上执行的 SQL 工作负载。然后，你可以分析工作负载以确定性能不佳的原因和适用的优化步骤。理想情况下，你应该在面临性能问题的\
  \ SQL Server 上捕获工作负载。在本章中，你将使用一组查询来模拟一个示例工作负载，以便遵循上一节列出的优化步骤。你将使用的示例工作负载由好坏查询组合而成。\n\
  \n■ `注意` 我建议你恢复一个干净的`AdventureWorks2012`数据库副本，以便完全移除前面章节遗留的任何对象。\n\n简单的测试工作负载由以下一组示例存储过程模拟；你使用第二个脚本在`AdventureWorks2012`数据库上执行它们：\n\
  \n```\nUSE AdventureWorks2012;\n\nGO\n\nCREATE PROCEDURE dbo.ShoppingCart\n@ShoppingCartId\
  \ VARCHAR(50)\nAS\n--提供购物车输出，包括行合计\nSELECT sci.Quantity,\n       p.ListPrice,\n\
  \       p.ListPrice * sci.Quantity AS LineTotal,\n       p.[Name]\nFROM Sales.ShoppingCartItem\
  \ AS sci\nJOIN Production.Product AS p\n  ON sci.ProductID = p.ProductID\nWHERE\
  \ sci.ShoppingCartID = @ShoppingCartId;\n\nGO\n```\n\n```\nCREATE PROCEDURE dbo.ProductBySalesOrder\n\
  @SalesOrderID INT\nAS\n/*提供特定销售订单的产品列表，\n按修改日期提供行排序，但按产品名称排序*/\nSELECT ROW_NUMBER()\
  \ OVER (ORDER BY sod.ModifiedDate) AS LineNumber,\n       p.[Name],\n       sod.LineTotal\n\
  FROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail AS sod\n  ON soh.SalesOrderID\
  \ = sod.SalesOrderID\nJOIN Production.Product AS p\n  ON sod.ProductID = p.ProductID\n\
  WHERE soh.SalesOrderID = @SalesOrderID\nORDER BY p.[Name] ASC;\n\nGO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 25 章 ■ 数据库工作负载优化\n\n```\nCREATE PROCEDURE dbo.PersonByFirstName\n@FirstName\
  \ NVARCHAR(50)\nAS\n--从 Person 表中按名字获取任何人\nSELECT p.BusinessEntityID,\n       p.Title,\n\
  \       p.LastName,\n       p.FirstName,\n       p.PersonType\nFROM Person.Person\
  \ AS p\nWHERE p.FirstName = @FirstName;\n\nGO\n```\n\n```\nCREATE PROCEDURE dbo.ProductTransactionsSinceDate\n\
  @LatestDate DATETIME,\n@ProductName NVARCHAR(50)\nAS\n--获取所有有交易的产品的最新交易\nSELECT\
  \ p.Name,\n       th.ReferenceOrderID,\n       th.ReferenceOrderLineID,\n      \
  \ th.TransactionType,\n       th.Quantity\nFROM Production.Product AS p\nJOIN Production.TransactionHistory\
  \ AS th\n  ON p.ProductID = th.ProductID AND\n     th.TransactionID = (SELECT TOP\
  \ (1)\n                            th2.TransactionID\n                         FROM\
  \ Production.TransactionHistory th2\n                         WHERE th2.ProductID\
  \ = p.ProductID\n                         ORDER BY th2.TransactionID DESC\n    \
  \                    )\nWHERE th.TransactionDate > @LatestDate AND\n      p.Name\
  \ LIKE @ProductName;\n\nGO\n```\n\n```\nALTER PROCEDURE dbo.PurchaseOrderBySalesPersonName\n\
  @LastName NVARCHAR(50),\n@VendorID INT = NULL\nAS\nSELECT poh.PurchaseOrderID,\n\
  \       poh.OrderDate,\n       pod.LineTotal,\n       p.[Name] AS ProductName,\n\
  \       e.JobTitle,\n       per.LastName + ', ' + per.FirstName AS SalesPerson,\n\
  \       poh.VendorID\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 25 章 ■ 数据库工作负载优化\n\n```\nFROM Purchasing.PurchaseOrderHeader AS poh\nJOIN Purchasing.PurchaseOrderDetail\
  \ AS pod\n  ON poh.PurchaseOrderID = pod.PurchaseOrderID\nJOIN Production.Product\
  \ AS p\n  ON pod.ProductID = p.ProductID\nJOIN HumanResources.Employee AS e\n  ON\
  \ poh.EmployeeID = e.BusinessEntityID\nJOIN Person.Person AS per\n  ON e.BusinessEntityID\
  \ = per.BusinessEntityID\nWHERE per.LastName LIKE @LastName AND\n      poh.VendorID\
  \ = COALESCE(@VendorID, poh.VendorID)\nORDER BY per.LastName,\n         per.FirstName;\n\
  \nGO\n```\n\n创建这些过程后，你可以使用以下脚本执行它们：\n\n```\nEXEC dbo.PurchaseOrderBySalesPersonName\n\
  @LastName = 'Hill%';\n\nGO\n```\n\n```\nEXEC dbo.ShoppingCart\n@ShoppingCartID =\
  \ '20621';\n\nGO\n```\n\n```\nEXEC dbo.ProductBySalesOrder\n@SalesOrderID = 43867;\n\
  \nGO\n```\n\n```\nEXEC dbo.PersonByFirstName\n@FirstName = 'Gretchen';\n\nGO\n```\n\
  \n```\nEXEC dbo.ProductTransactionsSinceDate\n@LatestDate = '9/1/2004',\n@ProductName\
  \ = 'Hex Nut%';\n\nGO\n```\n\n```\nEXEC dbo.PurchaseOrderBySalesPersonName\n@LastName\
  \ = 'Hill%',\n@VendorID = 1496;\n\nGO\n```\n\n\n"
- "# 第 25 章：数据库工作负载优化\n\n这是一个极其简化的工作负载，仅用于说明流程。在一个典型系统中，你将会看到成百上千个额外的调用。然而，尽管它很简单，这个示例工作负载包含了你通常在\
  \ SQL Server 上执行的不同类型的查询。\n\n*   使用聚合函数的查询\n*   仅检索单行或少量行的点查询\n*   连接多个表的查询\n* \
  \  检索小范围行的查询\n*   执行额外结果集处理的查询，例如提供排序输出\n\n第一个优化步骤是识别性能最差的查询，如下一节所述。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 捕获工作负载\n\n作为诊断数据收集步骤的一部分，你必须定义一个 `Extended Events` 会话来捕获数据库服务器上的工作负载。你可以使用第\
  \ 6 章推荐的工具和方法来完成此操作。表 25-1 列出了你应使用的特定事件，以衡量查询的资源消耗情况。\n\n**表 25-1. 用于捕获高成本查询信息的事件**\n\
  \n| 类别 | 事件 |\n| :--- | :--- |\n| 执行 | `rpc_completed` |\n| | `sql_batch_completed`\
  \ |\n\n如第 6 章所述，对于生产数据库，建议将 `Extended Events` 会话的输出捕获到文件中。将输出捕获到文件有几个显著优势：\n\n*\
  \   由于你打算在工作负载捕获后分析 SQL 查询，因此不需要在捕获时显示这些 SQL 查询。\n*   通过 SSMS 运行会话无法为跟踪过程提供灵活的时序控制。\n\
  \n让我们更仔细地看看时序控制。假设你想在晚上 11 点开始捕获事件，并记录 24 小时的 SQL 工作负载。你可以使用 GUI 或 T-SQL 定义一个 `Extended\
  \ Events` 会话。但是，你不必立即启动该过程。这意味着你可以在 SQL Server Agent 或其他调度工具中创建命令，使用 `ALTER EVENT\
  \ SESSION` 命令来启动和停止该过程。\n\n```sql\nALTER EVENT SESSION <sessionname>\nON SERVER\n\
  STATE = <start/stop>;\n```\n\n在这个例子中，我对会话设置了筛选器，仅捕获来自 `AdventureWorks2012` 数据库的事件。\n\
  \n该文件将只捕获针对该数据库的查询，从而减少了我需要处理的信息量。对于你的系统来说，这可能也是一个不错的选择。虽然扩展事件的开销可能非常低（尤其是与较旧的跟踪事件相比），但它们并非免费。应始终应用良好的筛选，以确保最小的影响。\n\
  \n## 分析工作负载\n\n一旦工作负载被捕获到文件中，你可以通过使用 SSMS 浏览数据或将输出文件的内容导入数据库表来分析工作负载。\n\nSSMS 提供了以下两种分析文件内容的方法，这两种方法都相对简单：\n\
  \n*   **通过右键单击数据列选择排序顺序或按特定列分组来对输出进行排序**：你可能希望从“详细信息”选项卡中选择列，并使用“在表中显示列”命令将其上移。之后，你就可以在该列上发出分组和排序命令。\n\
  *   **重新排列输出为选择性的列和事件列表**：你可以通过右键单击表格并从上下文菜单中选择“选择列”来更改 SSMS 中显示的输出。这不仅可以让你挑选和选择列，还可以将它们组合成新列。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n不幸的是，使用 SSMS 分析 `Extended\
  \ Events` 输出的方法有限。例如，考虑一个频繁执行的查询。你不应该只查看该查询单次执行的成本，还应该尝试确定在固定时间内重复执行该查询的累积成本。\n\n\
  虽然该查询的单次执行成本可能不高，但如果它执行次数非常多，即使是一点小小的优化也可能带来巨大的改变。SSMS 的功能不够强大，无法以这种高级方式帮助分析工作负载。因此，虽然你可以按\
  \ `batch_text` 列分组，但参数值的差异意味着你会看到同一个存储过程调用的不同分组。如果你的查询都是存储过程，你可以捕获 `object_id` 并按其分组。但大多数系统至少有一些临时查询，甚至大量临时查询，所以这可能行不通。为了对工作负载进行深入分析，你必须将跟踪文件的内容导入数据库表。会话的输出将大多数重要数据放入\
  \ XML 字段中，因此你会希望在加载数据时按如下方式查询它：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.ExEvents'))\
  \ IS NOT NULL\n    DROP TABLE dbo.ExEvents;\nGO\n\nWITH xEvents\nAS (SELECT object_name\
  \ AS xEventName,\n           CAST (event_data AS XML) AS xEventData\n    FROM sys.fn_xe_file_target_read_file('C:\\\
  Data\\MSSQL11.RANDORI\\MSSQL\\Log\\QueryMetrics*.xel',\n                       \
  \                  NULL, NULL, NULL)\n    )\nSELECT xEventName,\n       xEventData.value('(/event/data[@name=''duration'']/value)[1]',\
  \ 'bigint') Duration,\n       xEventData.value('(/event/data[@name=''physical_reads'']/value)[1]',\
  \ 'bigint') PhysicalReads,\n       xEventData.value('(/event/data[@name=''logical_reads'']/value)[1]',\
  \ 'bigint') LogicalReads,\n       xEventData.value('(/event/data[@name=''cpu_time'']/value)[1]',\
  \ 'bigint') CpuTime,\n       CASE xEventName\n           WHEN 'sql_batch_completed'\n\
  \           THEN xEventData.value('(/event/data[@name=''batch_text'']/value)[1]',\
  \ 'varchar(max)')\n           WHEN 'rpc_completed'\n           THEN xEventData.value('(/event/data[@name=''statement'']/value)[1]',\
  \ 'varchar(max)')\n       END AS SQLText,\n       xEventData.value('(/event/data[@name=''query_plan_hash'']/value)[1]',\
  \ 'binary(8)') QueryPlanHash\nINTO dbo.ExEvents\nFROM xEvents;\n```\n\n你需要用你自己的路径和文件名替换\
  \ `<ExEventsFileName>`。一旦你将内容放入表中，就可以使用 SQL 查询来分析工作负载。例如，要找到最慢的查询，你可以执行以下 SQL 查询：\n\
  \n```sql\nSELECT *\nFROM dbo.ExEvents AS ee\nORDER BY ee.Duration DESC;\n```\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n前面的查询将显示成本最高的单个查询，这对于你在本章中进行的测试来说已经足够。你可能也想在生产系统上运行类似的查询；然而，你更可能希望基于聚合数据进行分析，如下例所示：\n\
  \n```sql\nSELECT ee.SQLText,\n       SUM(Duration) AS SumDuration,\n       AVG(Duration)\
  \ AS AvgDuration,\n       COUNT(Duration) AS CountDuration\nFROM dbo.ExEvents AS\
  \ ee\nGROUP BY ee.SQLText;\n```\n\n执行此查询可以让你按你最感兴趣的字段排序——例如，按 `CountDuration` 排序以获取最常调用的过程，或按\
  \ `SumDuration` 排序以获取累积运行时间最长的过程。你需要一种方法来移除或替换参数及参数值。这是必要的，以便仅基于过程名称或不带参数和参数值的查询文本来进行聚合（因为这些参数和值会不断变化）。\n\
  \n另一种方法是直接查询缓存，以查看其中代价最高的查询。这比设置扩展事件更简单。此外，大多数情况下，你很可能能捕获到大部分有问题的查询。因此，如果你是首次开始对系统进行查询调优，你可能希望跳过设置跟踪事件来识别代价最高的查询。然而，我发现在时间推移并开始量化系统行为后，你会希望获得使用扩展事件所提供的那种详细数据。\n\
  \n分析工作负载的目标是识别代价最高的查询（或通常代价较高的查询）；下一节将介绍如何做到这一点。\n\n## 识别代价最高的查询\n\n如前所述，你可以使用 SSMS\
  \ 或查询技术，根据不同的标准来识别代价较高的查询。如第三章所讨论的，工作负载中的查询可以按 `CPU`、`读取` 或 `写入` 列进行排序，以识别代价最高的查询。你还可以使用聚合函数来得出累计成本以及单个成本。在生产系统中，了解哪个存储过程累积了最长的运行时间、最多的\
  \ CPU 使用量或最大的读写次数，通常比仅仅识别一次数值最高的查询更有用。\n\n即使对于最繁重的 OLTP 数据库，读取总数通常至少是写入总数的七到八倍，因此按\
  \ `读取` 列对查询进行排序，通常比按 `写入` 列排序能识别出更多有问题的查询（但你应该始终在你的系统上测试这一点）。同样值得查看那些执行时间最长的查询。如第五章所述，你可以使用性能监视器捕获等待状态，并将其与特定查询一起查看，以帮助识别为何某个查询运行时间过长。\n\
  \n每个系统都是不同的。一般来说，我会首先处理最常调用的存储过程；然后是运行时间最长的；最后是读取次数最多的。当然，性能调优是一个迭代过程，因此你需要定期重新检查每个类别。\n\
  \n要分析样本工作负载中最差性能的查询，你需要知道查询在持续时间或读取方面的代价。由于这些值只有在查询执行完成后才能得知，因此你主要关注的是已完成的事件。（使用已完成事件进行性能分析背后的原理在第\
  \ 6 章有详细解释。）\n\n出于展示目的，在 SSMS 中打开跟踪文件。图 25-1 显示了将几列移动到网格后捕获的跟踪输出。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-518_1.jpg)\n\n第 25 章 ■ 数据库工作负载优化\n\n`图 25-1.` 显示 SQL 工作负载的扩展事件会话输出\n\
  \n在持续时间方面性能最差的查询，也是在 CPU 使用率和读取方面最差的查询之一。该存储过程 `dbo.PurchaseOrderBySalesPersonName`\
  \ 在图 25-1 中突出显示（你可能有不同的值，但此查询很可能是性能最差或至少是最差之一）。为方便参考，该存储过程内部的查询如下所示：\n\n```sql\n\
  SELECT poh.PurchaseOrderID,\n       poh.OrderDate,\n       pod.LineTotal,\n    \
  \   p.[Name] AS ProductName,\n       e.JobTitle,\n       per.LastName + ', ' + per.FirstName\
  \ AS SalesPerson,\n       poh.VendorID\nFROM   Purchasing.PurchaseOrderHeader AS\
  \ poh\n       JOIN Purchasing.PurchaseOrderDetail AS pod\n         ON poh.PurchaseOrderID\
  \ = pod.PurchaseOrderID\n       JOIN Production.Product AS p\n         ON pod.ProductID\
  \ = p.ProductID\n       JOIN HumanResources.Employee AS e\n         ON poh.EmployeeID\
  \ = e.BusinessEntityID\n       JOIN Person.Person AS per\n         ON e.BusinessEntityID\
  \ = per.BusinessEntityID\nWHERE  per.LastName LIKE @LastName AND\n       poh.VendorID\
  \ = COALESCE(@VendorID, poh.VendorID)\nORDER BY per.LastName,\n         per.FirstName;\n\
  ```\n\n如果你无法运行扩展事件，另一种可行的方法是使用 `sys.dm_exec_query_stats` DMO（动态管理视图）。这将为你提供当前缓存中所有查询的聚合信息。这是一种快速识别最常调用、运行时间最长和资源消耗最大的存储过程的方法。它还带来了一个额外的好处，即可以快速连接到其他\
  \ DMO 以提取执行计划和其他有趣的信息。\n\n一旦你识别出性能最差的查询，下一步优化步骤是确定该查询消耗的资源。\n\n### 确定代价最高查询的基线资源使用情况\n\
  \n在应用任何优化技术之前，性能最差查询的当前资源使用情况可以被视为一个基线数据。你可能会对该查询应用不同的优化技术，并将查询优化后的资源使用情况与基线数据进行比较，以确定特定优化技术的有效性。查询的资源使用情况可以分为两类呈现：\n\
  \n- 总体资源使用情况\n- 详细资源使用情况\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  第 25 章 ■ 数据库工作负载优化\n\n#### 总体资源使用情况\n\n查询的总体资源使用情况提供了性能最差查询所消耗硬件资源的总体数据。你可以将优化后查询的资源使用情况与未优化查询的总体资源使用情况相比较，以确保你所应用的性能技术的整体有效性。\n\
  \n你可以从工作负载跟踪中确定查询的总体资源使用情况。你将使用该存储过程的第一次调用，因为它显示了最差的行为。表 25-2 显示了图 25-1 中跟踪的查询总体使用情况。需要指出一点，表中的持续时间单位是毫秒，而图\
  \ 25-1 中的值单位是微秒。使用扩展事件时请记住考虑这一点。\n\n`表 25-2.` 表示查询所用资源数量的数据列\n**数据列** | **值** |\
  \ **描述**\n---|---|---\n逻辑读取 |  | 查询执行的逻辑读取次数。如果在内存中未找到某页，则为该页执行一次逻辑读取需要先从磁盘执行物理读取以将该页获取到内存中。\n\
  写入 |  | 查询修改的页数。\nCPU | 31 ms | 查询使用 CPU 的时间。\n持续时间 | 175.1 ms | SQL Server 从编译到返回结果集处理此查询所花费的时间。\n\
  \n**注意** 在你的环境中，前述数据列的值可能不同。无论数据列的绝对值如何，跟踪这些值都很重要，以便日后与相应的值进行比较。\n\n#### 详细资源使用情况\n\
  \n你可以分解查询的总体资源使用情况，以定位查询所访问的不同数据库表上的瓶颈。这种详细的资源使用情况有助于你确定哪些表访问问题最大。\n\n了解系统中的等待状态将帮助你确定需要重点关注调优的地方。一个粗略的经验法则是简单地查看持续时间；然而，持续时间可能受到太多因素的影响，充其量只是一个不完美的衡量标准。在这种情况下，我会在\
  \ CPU 使用率、读取和持续时间这三方面都投入时间。读取是衡量性能的常用指标，但像持续时间一样，孤立地看它们也可能同样有问题。这就是为什么我在所有这些值上都投入时间。\n\
  \n\n如你在第 6 章所见，你可以从给定查询的`STATISTICS IO`输出中，获取该查询访问的各个表上执行的读取次数。你也可以设置`STATISTICS\
  \ TIME`选项来获取查询的基本执行时间和 CPU 时间，包括其编译时间。你可以通过以下`SET`语句重新执行查询来获取此输出（或在查询窗口中选择`Set Statistics\
  \ IO`复选框）：\n\n```\n--不要在生产环境中运行\nDBCC FREEPROCCACHE();\nDBCC DROPCLEANBUFFERS;\n\
  GO\nSET STATISTICS TIME ON;\nGO\nSET STATISTICS IO ON;\nGO\nEXEC dbo.PurchaseOrderBySalesPersonName\
  \ @LastName = 'Hill%';\nGO\nSET STATISTICS TIME OFF;\nGO\nSET STATISTICS IO OFF;\n\
  GO\n```\n\n为了模拟图 25-1 中所示的相同首次运行情况，请使用`DBCC DROPCLEANBUFFERS`（不要在生产系统上运行）清除内存中存储的数据，并通过运行`DBCC\
  \ FREEPROCCACHE`（同样不要在生产系统上运行）将该存储过程从缓存中移除。\n\n性能最差查询的`STATISTICS`输出如下所示：\n\n```\n\
  DBCC execution completed. If DBCC printed error messages, contact your system administrator.\n\
  DBCC execution completed. If DBCC printed error messages, contact your system administrator.\n\
  SQL Server parse and compile time:\nCPU time = 1 ms, elapsed time = 1 ms.\nSQL Server\
  \ Execution Times:\nCPU time = 0 ms, elapsed time = 0 ms.\nSQL Server parse and\
