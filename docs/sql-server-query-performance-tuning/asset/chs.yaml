- "# 第 22 章 ■ 逐行处理\n\n使用游标逐行处理数据的数据库应用程序很常见。开发者倾向于以逐行方式思考数据处理。Oracle 甚至使用一种称为游标（cursor）的高速数据访问机制。但\
  \ SQL Server 中的游标不同。因为在 SQL Server 中通过游标进行数据操作会带来显著的额外开销，所以数据库应用程序应避免使用游标。T-SQL\
  \ 和 SQL Server 设计为最适合处理数据集，而不是一次处理一行。Jeff Moden 将此类处理方式形象地称为 RBAR（发音为 ree-bar），意为“逐行痛苦地处理”。然而，如果必须使用游标，那么应使用开销最小的游标。\n\
  \n在本章中，我将涵盖以下主题：\n\n*   游标的基础知识\n*   游标不同特性的成本分析\n*   默认结果集相对于游标的优势和劣势\n*   最小化游标成本开销的建议\n\
  \n## 游标基础知识\n\n当应用程序执行查询时，SQL Server 返回一组由行组成的数据。通常，应用程序无法一起处理多行；相反，它们通过遍历 SQL Server\
  \ 返回的结果集来一次处理一行。此功能由游标提供，游标是一种从多行结果集中一次处理一行的机制。\n\nT-SQL 游标处理通常涉及以下步骤：\n\n1.  声明游标，将其与\
  \ `SELECT` 语句关联并定义游标的特性。\n2.  打开游标以访问 `SELECT` 语句返回的结果集。\n3.  从游标中检索一行。可选地，通过游标修改该行。\n\
  4.  处理完结果集中的所有行后，关闭游标并释放分配给游标的资源。\n\n你可以使用 T-SQL 语句或用于连接到 SQL Server 的数据访问层创建游标。使用数据访问层创建的游标通常称为客户端游标。用\
  \ T-SQL 编写的游标称为服务器端游标。以下是一个处理表中查询结果的服务器端游标示例：\n\n```sql\n--将 SELECT 语句与游标关联并定义游标特性\n\
  USE AdventureWorks2012;\nGO\nSET NOCOUNT ON\nDECLARE MyCursor CURSOR /*<游标特性>*/\n\
  FOR\nSELECT adt.AddressTypeID,\n       adt.Name,\n       adt.ModifiedDate\nFROM\
  \ Person.AddressType adt;\n\n--打开游标以访问 SELECT 语句返回的结果集\nOPEN MyCursor;\n\n--从 SELECT\
  \ 语句返回的结果集中一次检索一行\nDECLARE @AddressTypeId INT,\n        @Name VARCHAR(50),\n   \
  \     @ModifiedDate DATETIME;\n```\n\n\n\n"
- "# SQL Server 游标\n\n```sql\nFETCH NEXT FROM MyCursor INTO @AddressTypeId, @Name,\
  \ @ModifiedDate;\n\nWHILE @@FETCH_STATUS = 0\n\nBEGIN\n\n    PRINT 'NAME = ' + @Name;\n\
  \n    -- Optionally, modify the row through the cursor\n    UPDATE Person.AddressType\n\
  \    SET Name = Name + 'z'\n    WHERE CURRENT OF MyCursor;\n\n    FETCH NEXT FROM\
  \ MyCursor\n    INTO @AddressTypeId, @Name, @ModifiedDate;\n\nEND\n\n-- Close the\
  \ cursor and release all resources assigned to the cursor\nCLOSE MyCursor;\nDEALLOCATE\
  \ MyCursor;\n```\n\n第 22 章 ■ 逐行处理\n\n游标的开销部分取决于其特性。SQL Server 和数据访问层提供的游标特性可以大致分为三类。\n\
  \n*   *游标位置:* 定义游标创建的位置。\n*   *游标并发性:* 定义游标与底层内容的隔离和同步程度。\n*   *游标类型:* 定义游标的具体特性。\n\
  \n在查看游标的成本之前，我将用几页篇幅介绍游标的各项特性。\n\n你可以用以下查询撤销对 `Person.AddressType` 表的更改：\n```sql\n\
  UPDATE Person.AddressType\nSET [Name] = LEFT([Name], LEN([Name]) - 1);\n```\n\n\
  ### 游标位置\n\n根据其创建位置，游标可分为两类。\n\n*   客户端游标\n*   服务器端游标\n\nT-SQL 游标总是在 SQL Server\
  \ 上创建。而数据库 API 游标则可以在客户端或服务器端创建。\n\n#### 客户端游标\n\n顾名思义，*客户端游标*是在运行应用程序的机器上创建的，无论该应用程序是服务、数据访问层还是用户前端。它具有以下特点：\n\
  \n*   在客户端机器上创建。\n*   游标元数据在客户端机器上维护。\n*   使用数据访问层创建。\n*   适用于大多数数据访问层（OLEDB 提供程序和\
  \ ODBC 驱动程序）。\n*   可以是仅向前或静态游标。\n\n■ **注意** 游标类型，包括仅向前和静态游标类型，将在本章后面的“游标类型”一节中描述。\n\
  \n#### 服务器端游标\n\n*服务器端游标*是在 SQL Server 机器上创建的。它具有以下特点：\n\n*   在服务器机器上创建。\n*   游标元数据在服务器机器上维护。\n\
  *   使用数据访问层或 T-SQL 语句创建。\n*   使用 T-SQL 语句创建的服务器端游标与 SQL Server 紧密集成。\n*   可以是任何类型的游标。（游标类型将在本章后面解释。）\n\
  \n■ **注意** 客户端和服务器端游标之间的成本比较将在本章后面的“游标类型成本比较”一节中介绍。\n\n### 游标并发性\n\n根据与底层内容所需的隔离和同步程度，游标可分为以下几种并发模型：\n\
  \n*   *只读:* 不可更新的游标。\n*   *乐观:* 使用乐观并发模型的可更新游标（不对底层数据行保留锁）。\n*   *滚动锁:* 对任何要更新的数据行都持有锁的可更新游标。\n\
  \n#### 只读\n\n只读游标是不可更新的；不对基表持有锁。在获取游标行时，是否在底层行上获取共享（S）锁取决于连接的隔离级别以及用于游标的 `SELECT`\
  \ 语句中使用的任何锁提示。但是，一旦行被获取，默认情况下锁就会被释放。以下 T-SQL 语句创建一个只读 T-SQL 游标：\n\n```sql\nDECLARE\
  \ MyCursor CURSOR READ_ONLY\nFOR\nSELECT adt.Name\nFROM Person.AddressType AS adt\n\
  WHERE adt.AddressTypeID = 1;\n```\n\n最低级别的锁定开销使得只读类型的游标更快、更安全。只需记住，你无法通过只读游标操作数据，这是你为性能所做的牺牲。\n\
  \n#### 乐观\n\n\n\n"
- "# 乐观并发模型\n\n乐观并发模型允许游标更新。底层数据上不会持有锁。决定是否在底层行上获取（S）锁的因素与只读游标相同。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 22 章 ■ 逐行处理\n\n乐观并发模型使用行版本控制来确定自该行被读入游标以来是否已被修改，而不是在将该行读入游标时锁定它。基于版本的乐观并发要求在创建游标的底层用户表中包含一个`ROWVERSION`列（以前是`TIMESTAMP`数据类型）。`ROWVERSION`数据类型是一个二进制数字，表示行的修改相对顺序。每次修改带有`ROWVERSION`列的行时，SQL\
  \ Server 会将全局`ROWVERSION`值`@@DBTS`的当前值存储在`ROWVERSION`列中；然后递增`@@DBTS`值。\n\n在通过乐观游标应用修改之前，SQL\
  \ Server 会确定该行的当前`ROWVERSION`列值与它被读入游标时的`ROWVERSION`列值是否匹配。只有当`ROWVERSION`值匹配时，才会修改底层行，这表明该行在此期间未被其他用户修改。否则，将引发错误。如果发生错误，首先使用更新后的数据刷新游标。\n\
  \n如果底层表不包含`ROWVERSION`列，则游标默认使用基于值的乐观并发，这要求将行的当前值与读入游标时的值进行匹配。基于版本的并发控制比基于值的并发控制更高效，因为它需要更少的处理来确定底层行的修改。因此，为了获得具有乐观并发模型的游标的最佳性能，请确保底层表具有`ROWVERSION`列。\n\
  \n以下 T-SQL 语句创建一个乐观的 T-SQL 游标：\n\n```sql\nDECLARE MyCursor CURSOR OPTIMISTIC\nFOR\n\
  SELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID = 1;\n\
  ```\n\n具有滚动锁并发的游标在底层行上持有（U）锁，直到获取另一个游标行或关闭游标。这可以防止其他用户在游标获取该行时修改底层行。滚动锁并发模型使游标可更新。\n\
  \n以下 T-SQL 语句创建一个具有滚动锁并发模型的 T-SQL 游标：\n\n```sql\nDECLARE MyCursor CURSOR SCROLL_LOCKS\n\
  FOR\nSELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID =\
  \ 1;\n```\n\n由于在引用的行上持有锁（直到获取另一个游标行或关闭游标），它会在此期间阻止所有其他试图修改该行的用户。这损害了数据库并发性。\n\n\
  ### 游标类型\n\n游标可分为以下四种类型：\n\n*   前进式游标\n*   静态游标\n*   键集驱动游标\n*   动态游标\n\n我们将在接下来的章节中更详细地了解这四种类型。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#### 前进式游标\n\n前进式游标具有以下特征：\n\
  \n*   它们直接在基表上操作。\n*   通常，直到使用游标`FETCH`操作获取游标行时，才会从底层表中检索行。但是，具有以下附加特征的数据库 API 前进式游标会首先从底层表中检索所有行：\n\
  \    *   客户端游标位置\n    *   服务器端游标位置和只读游标并发性。\n*   它们仅支持通过游标向前滚动（`FETCH NEXT`）。\n\
  *   它们允许通过游标进行所有更改（`INSERT`、`UPDATE`和`DELETE`）。此外，这些游标反映了对底层表所做的所有更改。\n\n\n"
- '# 游标的前向特性与类型实现


  数据库 API 游标和 T-SQL 游标对前向特性的实现方式不同。


  数据访问层将前向游标特性实现为之前列出的四种游标类型之一。但 T-SQL 游标并非将前向游标特性作为一种游标类型来实现；相反，它将此特性实现为定义游标滚动行为的一种属性。因此，对于
  T-SQL 游标，前向特性可用于定义其余三种游标类型的滚动行为。


  #### FAST_FORWARD 游标


  可以使用 `FAST_FORWARD` 语句创建具有只读属性的前向游标。T-SQL 语法提供了一个特定的游标类型选项 `FAST_FORWARD`，用于创建仅向前游标。`FAST_FORWARD`
  游标的别名是“软管”，因为它是通过游标移动数据最快的方式，并且所有信息单向流动。但是，当“软管”仍然不如传统的基于集合的操作快时，请不要感到惊讶。以下 T-SQL
  语句创建了一个仅向前 T-SQL 游标：


  ```sql

  DECLARE MyCursor CURSOR FAST_FORWARD

  FOR

  SELECT adt.Name

  FROM Person.AddressType AS adt

  WHERE adt.AddressTypeID = 1;

  ```


  `FAST_FORWARD` 属性指定了一个启用了性能优化的、仅向前、只读的游标。


  #### 静态游标


  静态游标具有以下特征：


  *   它们在打开游标时，在 `tempdb` 数据库中创建游标结果的快照。此后，静态游标在 `tempdb` 数据库中的快照上操作。

  *   数据在打开游标时从基础表中检索。

  *   静态游标支持所有滚动选项：`FETCH FIRST`、`FETCH NEXT`、`FETCH PRIOR`、`FETCH LAST`、`FETCH ABSOLUTE
  n` 和 `FETCH RELATIVE n`。

  *   静态游标始终是只读的；不允许通过静态游标进行数据修改。此外，对基础表所做的更改（`INSERT`、`UPDATE` 和 `DELETE`）不会反映在游标中。


  以下 T-SQL 语句创建了一个静态 T-SQL 游标：


  ```sql

  DECLARE MyCursor CURSOR STATIC

  FOR

  SELECT adt.Name

  FROM Person.AddressType AS adt

  WHERE adt.AddressTypeID = 1;

  ```


  一些测试表明，静态游标的性能可以与仅向前游标相当，有时甚至更快。请务必在您自己的系统上测试此行为。


  #### 键集驱动游标


  键集驱动游标具有以下特征：


  *   键集游标由一组称为键集的唯一标识符（或键）控制。键集由唯一标识结果集中行的一组列构建。

  *   这些游标在打开游标时，在 `tempdb` 数据库中创建键集行。

  *   游标中行的成员资格仅限于打开游标时在 `tempdb` 数据库中创建的键集行。

  *   在获取游标行时，数据库引擎首先查看 `tempdb` 中的键集行，然后导航到基础表中的相应数据行以检索其余列。

  *   它们支持所有滚动选项。

  *   键集游标允许通过游标进行所有更改。在游标外部执行的 `INSERT` 不会反映在游标中，因为游标中行的成员资格仅限于打开游标时在 `tempdb` 中创建的键集行。通过游标执行的
  `INSERT` 出现在游标末尾。对基础表执行的 `DELETE` 在游标导航到达已删除行时会引发错误。对基础表非键集列的 `UPDATE` 会反映在游标中。对键集列的
  `UPDATE` 被视为对旧键值的 `DELETE` 和对新键值的 `INSERT`。如果更改使某行不符合成员资格或影响行的顺序，则该行不会消失或移动，除非关闭并重新打开游标。


  以下 T-SQL 语句创建了一个键集驱动 T-SQL 游标：


  ```sql

  DECLARE MyCursor CURSOR KEYSET

  FOR

  SELECT adt.Name

  FROM Person.AddressType AS adt

  WHERE adt.AddressTypeID = 1;

  ```


  #### 动态游标


  动态游标具有以下特征：


  *   动态游标直接在基础表上操作。

  *   游标中行的成员资格不是固定的，因为它们直接在基础表上操作。

  *   与仅向前游标一样，基础表中的行直到使用游标 `FETCH` 操作获取游标行时才会被检索。

  *   动态游标支持除 `FETCH ABSOLUTE n` 之外的所有滚动选项，因为游标中行的成员资格不是固定的。

  *   这些游标允许通过游标进行所有更改。此外，对基础表所做的所有更改都会反映在游标中。

  *   动态游标不支持数据库 API 游标实现的所有属性和方法。诸如 `AbsolutePosition`、`Bookmark` 和 `RecordCount`
  等属性，以及 `clone` 和 `Resync` 等方法，不受动态游标支持。相反，它们由键集驱动游标支持。


  以下 T-SQL 语句创建了一个动态 T-SQL 游标：


  ```sql

  DECLARE MyCursor CURSOR DYNAMIC

  FOR

  SELECT adt.Name

  FROM Person.AddressType AS adt

  WHERE adt.AddressTypeID = 1;

  ```


  动态游标在所有情况下绝对是可能的最慢的游标。它获取更多的锁并保持更长时间，这极大地增加了其糟糕的性能。在设计系统时请考虑到这一点。


  '
- '# 游标成本比较


  现在您已经了解了不同类型的游标，让我们看看它们的成本。如果必须使用游标，您应该始终使用满足应用程序要求的最轻量级游标。不同游标特性之间的成本比较详述如下。


  ### 游标位置的成本比较


  客户端游标和服务器端游标各有其自身的成本收益和开销，如下节所述。


  #### 客户端游标


  与服务器端游标相比，客户端游标具有以下成本收益：


  *   **更高的可扩展性：** 由于游标元数据保存在连接到服务器的各个客户端机器上，维护游标元数据的开销由客户端机器承担。因此，服务更多用户的能力不受服务器资源的限制。

  *   **更少的网络往返：** 由于 `SELECT` 语句返回的结果集传递给维护游标的客户端，因此从游标检索行时不需要额外的到服务器的网络往返。

  *   **更快的滚动：** 由于游标在客户端本地维护，因此遍历游标行的速度更快。

  *   **高度可移植：** 由于游标是使用数据访问层实现的，因此它可以在广泛的数据库中工作：SQL Server、Oracle、Sybase 等。


  客户端游标具有以下成本开销或缺点：


  *   **对客户端资源的压力更高：** 由于游标在客户端管理，它增加了对客户端资源的压力。但这可能并不那么糟糕，考虑到大多数时候客户端应用程序是 Web 应用程序，并且使用标准的负载均衡解决方案横向扩展
  Web 应用程序（或 Web 服务器）相当容易。另一方面，横向扩展事务性 SQL Server 数据库仍然是一门艺术！

  *   **支持的游标类型有限：** 不支持动态和键集驱动游标。



  '
- "# 第 22 章 ■ 逐行处理\n\n#### 服务器端游标\n\n服务器端游标具有以下成本优势：\n\n*   `一个连接上支持多个活动的基于游标的语句`：使用服务器端游标时，在游标操作之间，连接上不会遗留未处理的结果。这释放了连接，允许在同一时间在一个连接上使用多个基于游标的语句。而对于客户端游标，如之前所述，在应用程序获取所有游标行之前，连接将一直保持忙碌状态。这意味着它们无法同时被多个基于游标的语句使用。\n\
  \n*   `靠近数据的行处理`：如果行处理涉及与其他表的连接以及大量的集合操作，那么使用服务器端游标靠近数据源执行行处理是有利的。\n\n*   `减轻客户端资源压力`：它减轻了客户端资源的压力。但这可能并不那么理想，因为如果服务器资源达到上限（而不是客户端资源），那么就需要对数据库进行横向扩展，这是一个困难的命题。\n\
  \n*   `支持所有游标类型`：客户端游标在支持哪些游标类型方面有限制。服务器端游标则没有此限制。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n服务器端游标具有以下成本开销或缺点：\n\n*   `可扩展性较低`：它们会使服务器的可扩展性降低，因为需要消耗服务器资源来管理游标。\n\n*   `更多的网络往返`：如果游标行处理在客户端应用程序中完成，它们会增加网络往返次数。可以通过在存储过程中处理游标行或使用数据访问层的缓存大小特性来优化网络往返次数。\n\
  \n*   `可移植性较差`：使用 T-SQL 游标实现的服务器端游标不易移植到其他数据库，因为管理游标的数据库代码语法在不同数据库之间存在差异。\n\n###\
  \ 游标并发的成本比较\n\n正如预期的那样，具有更高并发模型的游标在数据库中产生最少的阻塞，并支持更高的可扩展性，如下节所述。\n\n#### 只读\n\n\
  只读并发模型提供以下成本优势：\n\n*   `最低的锁开销`：只读并发模型对数据库引入的锁和同步开销最小。因为在获取游标行后，不会在底层行上持有（`S`）锁，其他用户不会被阻塞访问该行。此外，通过在游标的\
  \ `SELECT` 语句中使用 `NO_LOCK` 锁定提示，可以避免在获取游标行时对底层行获取的（`S`）锁，但这仅适用于你不关心因脏读而返回何种数据的情况。\n\
  \n*   `最高的并发性`：由于不在底层行上持有额外的锁，只读游标不会阻塞其他用户访问底层表。共享锁仍然会被获取。\n\n只读游标的主要缺点如下：\n\n*\
  \   `不可更新`：无法通过游标修改底层表的内容。\n\n#### 乐观\n\n乐观并发模型提供以下优势：\n\n*   `低锁开销`：与只读模型类似，乐观并发模型在获取游标行后，不会在游标行上持有（`S`）锁。为了进一步提高并发性，也可以像只读并发模型那样使用\
  \ `NOLOCK` 锁定提示。但是，请注意 `NOLOCK` 绝对可能导致不正确的数据或丢失或多余的行，因此使用时需要仔细规划。通过游标修改底层行需要操作查询所要求的对该行的独占权限。\n\
  \n*   `高并发性`：由于仅在底层行上使用共享锁，游标不会阻塞其他用户访问底层表。但是，通过游标对底层行进行的修改操作会在修改期间阻塞其他用户访问该行。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n以下示例详述了乐观并发模型的成本开销：\n\n* \
  \  `行版本控制`：由于乐观并发模型允许游标可更新，因此会产生额外成本，以确保在通过游标应用修改之前，先将当前底层行（使用基于版本或基于值的并发控制）与最初获取的游标行进行比较。这可以防止通过游标进行的修改意外覆盖在获取游标行之后由另一个用户进行的修改。\n\
  \n*   `没有 ROWVERSION 列的并发控制`：如前所述，底层表中的 `ROWVERSION` 列允许游标执行高效的基于版本的并发控制。如果底层表不包含\
  \ `ROWVERSION` 列，游标将采用基于值的并发控制，这需要将行的当前值与读入游标时的值进行匹配。这增加了并发控制的成本。两种形式的并发控制都会在 `TEMPDB`\
  \ 中导致额外开销。\n\n#### 滚动锁\n\n滚动锁并发模型的主要优势如下：\n\n*   `简单的并发控制`：通过对游标最后获取的行所对应的底层行加锁，游标确保该底层行不会被其他用户修改。这消除了乐观锁的版本控制开销。此外，由于该行不能被其他用户修改，应用程序也免于检查行不匹配错误。\n\
  \n滚动锁并发模型会产生以下成本开销：\n\n*   `最高的锁开销`：滚动锁并发模型引入了悲观锁的特性。一个（`U`）锁会一直保持在最后获取的游标行上，直到获取另一个游标行或关闭游标。\n\
  \n*   `最低的并发性`：由于在底层行上持有一个（`U`）锁，所有其他请求对该底层行加（`U`）或（`X`）锁的用户都将被阻塞。这会严重损害并发性。因此，除非绝对必要，请避免使用此游标并发模型。\n\
  \n### 游标类型的成本比较\n\n本章前面“游标基础”一节提到的四种基本游标类型中的每一种都会对服务器产生不同的成本开销。选择不正确的游标类型会损害数据库性能。除了四种基本游标类型外，还提供了一种仅向前快速游标（仅向前游标的一种变体）以增强性能。这些游标类型的成本开销将在接下来的章节中解释。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#### 仅向前游标\n\n仅向前游标具有以下成本优势：\n\
  \n\n\n## 只进游标\n\n- *游标打开成本低于静态游标和键集驱动游标：* 由于游标行不是从底层表中检索，且在游标打开时不会复制到 `tempdb` 数据库，因此只进\
  \ T-SQL 游标打开速度很快。类似地，具有乐观/滚动锁并发性的只进服务器端 API 游标也能快速打开，因为它们不会在打开时检索行。\n\n- *滚动开销更低：*\
  \ 由于此游标类型只能执行 `FETCH NEXT`，因此支持不同滚动操作所需的开销更少。\n\n- *对 `tempdb` 数据库的影响低于静态游标和键集驱动游标：*\
  \ 由于只进 T-SQL 游标不会将行从底层表复制到 `tempdb` 数据库，因此不会给该数据库带来额外压力。\n\n只进游标类型有以下缺点：\n\n- *并发性较低。*\
  \ 每次获取游标行时，根据游标并发模型（如前文并发性讨论所述），会对相应的底层行发出带锁请求。这可能会阻止其他用户访问该资源。\n\n- *不支持向后滚动。*\
  \ 需要双向滚动的应用程序无法使用此游标类型。\n\n但如果应用程序设计得当，不用向后滚动也并非难事。\n\n## 快速只进游标\n\n快速只进游标是速度最快、成本最低的游标类型。这种只进且只读的游标是专门为性能优化的。因此，在\
  \ `SQL Server` 中，你应始终优先选择它，而非其他游标类型。\n\n此外，数据访问层在客户端提供了快速只进游标。该类型的游标使用所谓的 `默认结果集`，使得游标开销几乎消失。\n\
  \n■ **注意** `默认结果集` 将在本章后面的“默认结果集”一节中解释。\n\n#### 静态游标\n\n静态游标有以下成本优势：\n\n- *获取成本低于其他游标类型：*\
  \ 由于在打开游标时，会在 `tempdb` 数据库中根据底层行创建快照，游标行的获取操作是针对快照而非底层行进行的。这避免了原本获取游标行可能需要的锁开销。\n\
  \n- *不会阻塞底层行：* 由于快照创建在 `tempdb` 数据库中，其他试图访问底层行的用户不会被阻塞。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 22 章 ■ 逐行处理\n\n另一方面，静态游标存在以下成本开销：\n\n- *打开成本高于其他游标类型：* 静态游标的打开操作比其他游标类型慢，因为必须在游标打开期间从底层表中检索结果集的所有行，并在\
  \ `tempdb` 数据库中创建快照。\n\n- *对 `tempdb` 的影响高于其他游标类型：* 在 `tempdb` 数据库中创建、填充和清理快照可能会对服务器资源产生显著影响。\n\
  \n#### 键集驱动游标\n\n键集驱动游标有以下成本优势：\n\n- *打开成本低于静态游标：* 由于在 `tempdb` 数据库中只创建键集，而非完整的快照，键集驱动游标的打开速度快于静态游标。\n\
  \n`SQL Server` 异步填充大型键集驱动游标的键集，这缩短了从游标打开到获取第一个游标行之间的时间。\n\n- *对 `tempdb` 的影响低于静态游标：*\
  \ 由于键集驱动游标更小，它在 `tempdb` 中占用的空间更少。\n\n键集驱动游标的成本开销如下：\n\n- *打开成本高于只进游标和动态游标：* 在 `tempdb`\
  \ 数据库中填充键集，使得键集驱动游标的打开操作比只进游标（前面提到的例外情况除外）和动态游标的成本更高。\n\n\n#### 键集驱动游标\n\n**键集驱动游标**具有以下成本开销：\n\
  \n*   `Higher fetch cost than other cursor types:` 获取每一行游标数据时，都必须先访问键集中的键，然后才能访问用户数据库中对应的底层行。为每一行获取操作同时访问\
  \ `tempdb` 和用户数据库，这使得获取操作的成本高于其他游标类型。\n*   `Higher impact on tempdb than forward-only\
  \ and dynamic cursors:` 在 `tempdb` 中创建、填充和清理键集会影响服务器资源。\n*   `Higher lock overhead\
  \ and blocking than the static cursor:` 由于从游标获取行时是从底层表中检索，因此在行获取操作期间会对底层行获取一个 `S`\
  \ 锁（除非使用了 `NOLOCK` 锁定提示）。\n\n#### 动态游标\n\n**动态游标**具有以下成本优势：\n\n*   `Lower open cost\
  \ than static and keyset-driven cursors:` 由于游标直接在底层行上打开，无需将任何内容复制到 `tempdb` 数据库，因此动态游标比静态游标和键集驱动游标打开得更快。\n\
  *   `Lower impact on tempdb than static and keyset-driven cursors:` 由于没有内容被复制到 `tempdb`，动态游标对\
  \ `tempdb` 造成的压力远小于其他游标类型。\n\n**动态游标**具有以下成本开销：\n\n*   `Higher lock overhead and\
  \ blocking than the static cursor:` 动态游标中的每一行游标获取操作都会对游标 `SELECT` 语句中涉及的底层表进行重新查询。动态获取通常开销较大，因为可能必须重新执行原始的选取条件。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 22 章 ■ 逐行处理\n\n## 默认结果集\n\
  \n数据访问层（ADO、OLEDB 和 ODBC）的默认游标类型是只进且只读的。数据访问层创建的默认游标类型并非真正的游标，而是从服务器到客户端的数据流，通常被称为\
  \ `default result set` 或仅进游标（由数据访问层创建）。\n\n在 ADO.NET 中，`DataReader` 控件具有只进和只读的属性，它可以被视为\
  \ ADO.NET 环境中的默认结果集。SQL Server 在以下条件下使用这种类型的结果集处理：\n\n*   使用数据访问层（ADO、OLEDB、ODBC）的应用程序将所有游标特性保留为默认设置，这会请求一个只进且只读的游标。\n\
  *   应用程序执行 `SELECT` 语句，而不是执行 `DECLARE CURSOR` 语句。\n\n> **Note** 因为 SQL Server 设计用于处理数据集，而不是逐条遍历记录，所以默认结果集总是比任何其他类型的游标更快。\n\
  \n客户端发送到 SQL Server 的唯一请求是与默认游标关联的 SQL 语句。\n\nSQL Server 执行查询，将结果集的行组织在网络数据包中（尽可能填满数据包），然后将这些数据包发送到客户端。这些网络数据包被缓存在客户端的网络缓冲区中。\n\
  \nSQL Server 将尽可能多的结果集行发送到客户端，只要客户端网络缓冲区可以缓存。随着客户端应用程序一次请求一行数据，客户端机器上的数据访问层从客户端网络缓冲区中提取该行并将其传输到客户端应用程序。\n\
  \n以下部分概述了默认结果集的优缺点。\n\n### 优点\n\n默认结果集通常是返回 SQL Server 行的最佳、最高效的方式，原因如下：\n\n*  \
  \ `Minimum network round-trips between the client and SQL Server:` 由于 SQL Server\
  \ 返回的结果集被缓存在客户端网络缓冲区中，因此客户端不必通过网络请求来获取各个行。SQL Server 将其可以放入网络缓冲区的大部分行发送给客户端，发送的数量取决于客户端网络缓冲区的缓存能力。\n\
  *   `Minimum server overhead:` 由于 SQL Server 不需要在服务器上存储数据，这减少了服务器资源的利用率。\n\n###\
  \ 多活动结果集\n\nSQL Server 2005 引入了多活动结果集的概念，其中单个连接在任何给定时刻可以运行多个批处理。在之前的版本中，在提交下一个请求之前，必须处理或关闭单个结果集。`MARS`\
  \ 允许通过同一连接同时提交多个请求。`MARS` 在 SQL Server 上始终启用。除非连接显式调用它，否则该连接不会启用它。事务必须在客户端级别处理，并且必须显式声明和提交或回滚。如果使用\
  \ `MARS`，某个语句上的事务未提交且连接关闭，则作为该单个连接一部分的所有其他事务都将回滚。`MARS` 通过应用程序连接属性启用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 22 章 ■ 逐行处理\n\n### 缺点\n\n虽然默认结果集有优势，但也有其缺点。使用默认结果集需要满足一些特殊条件以获得最佳性能：\n\n\
  *   `It doesn’t support all properties and methods:` 不支持诸如 `AbsolutePosition`、`Bookmark`\
  \ 和 `RecordCount` 等属性，以及 `Clone`、`MoveLast`、`MovePrevious` 和 `Resync` 等方法。\n*  \
  \ `Locks may be held on the underlying resource:` SQL Server 将尽可能多的结果集行发送到客户端，只要客户端网络缓冲区可以缓存。如果结果集的大小很大，则客户端网络缓冲区可能无法接收所有行。此时，SQL\
  \ Server 会在尚未发送到客户端的底层表的下一页上保持锁。\n\n为了演示这些概念，请考虑以下测试表：\n\n```sql\nUSE AdventureWorks2012;\n\
  GO\nIF (SELECT OBJECT_ID('dbo.Test1')) IS NOT NULL\n    DROP TABLE dbo.Test1;\n\
  GO\nCREATE TABLE dbo.Test1 (C1 INT, C2 CHAR(996));\nCREATE CLUSTERED INDEX Test1Index\
  \ ON dbo.Test1 (C1);\nINSERT INTO dbo.Test1\nVALUES (1, '1') ,\n       (2, '2');\n\
  GO\n```\n\n现在考虑这个 PowerShell 脚本，它使用 ADO 和 OLEDB 访问测试表的行，并使用数据库 API 游标（`ADODB.Recordset`\
  \ 对象）的默认游标类型，如下所示：\n\n```powershell\n$AdoConn = New-Object -comobject ADODB.Connection\n\
  $AdoRecordset = New-Object -comobject ADODB.Recordset\n$AdoConn.Open(\"Provider=\
  \ SQLOLEDB; Data Source=DOJO\\RANDORI; Initial Catalog=AdventureWorks2012; Integrated\
  \ Security=SSPI\")\n$AdoRecordset.Open(\"SELECT * FROM dbo.Test1\", $AdoConn)\n\
  do {\n    $C1 = $AdoRecordset.Fields.Item(\"C1\").Value\n    $C2 = $AdoRecordset.Fields.Item(\"\
  C2\").Value\n    Write-Output \"C1 = $C1 and C2 = $C2\"\n    $AdoRecordset.MoveNext()\n\
  } until ($AdoRecordset.EOF -eq $True)\n$AdoRecordset.Close()\n$AdoConn.Close()\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-471_1.jpg)\n\
  \n## 第 22 章 ■ 逐行处理\n\n这并非从 PowerShell 访问数据库的常规方式，但它确实展示了客户端游标如何操作。请注意，该表有两行，每行大小为\
  \ 1,000 字节（不考虑内部开销时，= 4 字节 `INT` + 996 字节 `CHAR(996)`）。因此，`SELECT` 语句返回的完整结果集大小约为\
  \ 2,000 字节（= 2 **x** 1,000 字节）。\n\n在执行游标打开语句（`$AdoRecordset.Open()`）时，在运行代码的客户端机器上创建了一个默认结果集。该默认结果集保存了客户端网络缓冲区可以缓存的尽可能多的行。\n\
  \n\n## 第 22 章 ■ 逐行处理\n\n由于结果集的大小足够小，可以被客户端网络缓冲区缓存，所有游标行在游标打开语句执行期间就被缓存在客户端机器上，而不会在\
  \ `dbo.Test1` 表上保留任何锁。你可以使用 `sys.dm_tran_locks` 动态管理视图来验证该连接的锁定状态。在整个游标操作期间，客户端向\
  \ SQL Server 发起的唯一请求是与游标关联的 `SELECT` 语句，如图 22-1 的扩展事件输出所示。\n\n**图 22-1.** 显示默认结果集所做数据库请求的\
  \ Profiler 跟踪输出\n\n为了了解大型结果集对默认结果集处理的影响，让我们向测试表中添加更多行。\n\n```sql\nSELECT TOP 100000\n\
  IDENTITY( INT,1,1 ) AS n\nINTO #Tally\nFROM Master.dbo.syscolumns scl,\nMaster.dbo.syscolumns\
  \ sc2;\n\nINSERT INTO dbo.Test1\n(C1, C2)\nSELECT n,\nn\nFROM #Tally AS t;\n\nGO\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-472_1.png)\n\
  \n此示例生成的额外行大大增加了结果集的大小。根据客户端网络缓冲区的大小，结果集可能只有一部分能被缓存。在执行 `Ado.Recordset.Open` 语句时，客户端机器上的默认结果集将获得部分结果集，而\
  \ SQL Server 则在网络另一端等待发送剩余的行。\n\n在此期间，在我的机器上，底层 `Test1` 表上持有的锁如图 22-2 所示，这是从 `sys.dm_tran_locks`\
  \ 的输出中获取的。\n\n**图 22-2.** `sys.dm_tran_locks` 输出，显示在处理大型结果集时默认结果集持有的锁\n\n表上的 (`IS`)\
  \ 锁会阻止其他用户尝试获取 (`X`) 锁。为了最小化阻塞问题，请遵循以下建议：\n-   立即处理默认结果集的所有行。\n-   保持结果集较小。如示例所示，如果结果集的大小很小，那么默认结果集将能够在游标打开操作期间读取所有行。\n\
  \n## 游标开销\n\n在应用程序中实现以游标为中心的功能时，你有两种选择。你可以使用 T-SQL 游标或数据库 API 游标。由于 T-SQL 游标和数据库\
  \ API 游标的内部实现不同，它们在 SQL Server 上产生的负载也不同。这些游标对数据库的影响还取决于游标的不同特性，例如位置、并发性和类型。你可以使用扩展事件来分析\
  \ T-SQL 和数据库 API 游标产生的负载。当然，用于监控查询的标准事件将非常有用。在 `cursor` 类别下还有一些事件。其中最有用的事件包括：\n\
  -   `cursor_open`\n-   `cursor_close`\n-   `cursor_execute`\n-   `cursor_prepare`\n\
  \n其他事件也很有用，但只有在你尝试对特定问题进行故障排除时才需要它们。甚至这些游标的优化选项也不同。让我们逐一分析这些游标的开销。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 使用 T-SQL 游标分析开销\n\n使用 T-SQL 语句实现的 T-SQL 游标总是在 SQL Server 上执行，因为它们需要 SQL Server\
  \ 引擎来处理其 T-SQL 语句。你可以结合先前解释的游标特性来减少这些游标的开销。如前所述，最轻量级的 T-SQL 游标不是用默认设置创建的，而是通过调整设置得到的仅向前只读游标。但这仍然留下了需要由\
  \ SQL Server 处理的、用于实现游标操作的 T-SQL 语句。游标的全部负载由 SQL Server 承担，客户端机器不提供任何帮助。\n\n假设一个应用程序需求导致必须支持以下任务列表：\n\
  -   识别所有已报废的产品（来自 `Production.WorkOrder` 表）。\n-   对于每个报废的产品，计算损失的金额，其中每个产品损失的金额等于库存单位乘以产品的单价。\n\
  -   计算总损失。\n-   根据总损失，确定业务状态。\n\n第二点中的 `FOR EACH` 短语表明这些应用程序任务可以由游标来完成。\n\n然而，在\
  \ SQL Server 内部使用 `FOR`、`WHILE`、游标或任何其他此类处理可能是危险的。让我们看看它如何使用游标工作。你可以使用 T-SQL 游标实现此应用程序需求，如下所示：\n\
  \n```sql\nIF (SELECT OBJECT_ID('dbo.TotalLoss_CursorBased')\n) IS NOT NULL\nDROP\
  \ PROC dbo.TotalLoss_CursorBased;\nGO\n\nCREATE PROC dbo.TotalLoss_CursorBased\n\
  AS --声明一个具有默认设置的 T-SQL 游标，即快速\n--仅向前游标以检索已丢弃的产品\nDECLARE ScrappedProducts CURSOR\n\
  FOR\nSELECT p.ProductID,\nwo.ScrappedQty,\np.ListPrice\nFROM Production.WorkOrder\
  \ AS wo\nJOIN Production.ScrapReason AS sr\nON wo.ScrapReasonID = sr.ScrapReasonID\n\
  JOIN Production.Product AS p\nON wo.ProductID = p.ProductID;\n\n--打开游标，一次处理一个产品\n\
  OPEN ScrappedProducts;\n\nDECLARE @MoneyLostPerProduct MONEY = 0,\n@TotalLoss MONEY\
  \ = 0;\n\n--通过一次处理一个产品来计算每个产品损失的金额\nDECLARE @ProductId INT,\n@UnitsScrapped SMALLINT,\n\
  @ListPrice MONEY;\n\nFETCH NEXT FROM ScrappedProducts INTO @ProductId,@UnitsScrapped,@ListPrice;\n\
  \nWHILE @@FETCH_STATUS = 0\nBEGIN\nSET @MoneyLostPerProduct = @UnitsScrapped * @ListPrice;\
  \ --计算总损失\nSET @TotalLoss = @TotalLoss + @MoneyLostPerProduct;\n\nFETCH NEXT FROM\
  \ ScrappedProducts INTO @ProductId,@UnitsScrapped,\n@ListPrice;\nEND\n\n--确定状态\n\
  IF (@TotalLoss > 5000)\nSELECT '我们破产了！' AS Status;\nELSE\nSELECT '我们很安全！' AS Status;\n\
  \n--关闭游标并释放分配给游标的所有资源\nCLOSE ScrappedProducts;\nDEALLOCATE ScrappedProducts;\nGO\n\
  ```\n\n可以按如下方式执行存储过程，但你应该执行两次以利用计划缓存（见图 22-3）：\n\n```sql\nEXEC dbo.TotalLoss_CursorBased;\n\
  GO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-475_1.jpg)\n\
  \n**图 22-3.** 扩展事件输出，显示了使用 T-SQL 游标进行数据处理的部分总成本\n\n如图 22-3 所示，许多语句在 SQL Server 上执行。本质上，存储过程中的所有\
  \ SQL 语句都在 SQL Server 上执行，而 `WHILE` 循环中的语句会执行多次（游标 `SELECT` 语句返回的每一行执行一次）。\n\n该存储过程执行的逻辑读取总数为\
  \ 8,788（由最后一个 `sql_batch_completed` 事件指示）。嗯，这个数字是高还是低？考虑到 `Production.Products`\
  \ 表只有 6,196 页，`Production.WorkOrder` 表只有 926 页，这个数字肯定不低。你可以通过查询动态管理视图 `sys.dm_db_index_physical_stats`\
  \ 来确定分配给这些表的页数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```sql\n\
  SELECT SUM(page_count)\nFROM sys.dm_db_index_physical_stats(DB_ID(N'AdventureWorks2012'),\n\
  OBJECT_ID('Production.WorkOrder'),\nDEFAULT, DEFAULT, DEFAULT);\n```\n\n**注意** `sys.dm_db_index_physical_stats`\
  \ DMV 在第 13 章中有详细解释。\n\n\n"
- "# 内存 OLTP 与游标优化\n\n## 游标替代方案\n\n在大多数情况下，你可以通过使用 SQL 查询重写功能来避免游标操作，专注于基于集合的数据访问方法。例如，你可以使用\
  \ SQL 查询（而非游标操作）重写前面的存储过程（下载中的`nocursor.sql`文件）：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.TotalLoss'))\
  \ IS NOT NULL\n    DROP PROC dbo.TotalLoss;\nGO\n\nCREATE PROC dbo.TotalLoss\nAS\n\
  SELECT CASE --根据以下计算确定状态\n    WHEN SUM(MoneyLostPerProduct) > 5000 THEN '我们破产了！'\n\
  \    ELSE '我们安全！'\nEND AS Status\nFROM (--计算所有废弃产品的总损失金额\n    SELECT SUM(wo.ScrappedQty\
  \ * p.ListPrice) AS MoneyLostPerProduct\n    FROM Production.WorkOrder AS wo\n \
  \   JOIN Production.ScrapReason AS sr\n        ON wo.ScrapReasonID = sr.ScrapReasonID\n\
  \    JOIN Production.Product AS p\n        ON wo.ProductID = p.ProductID\n    GROUP\
  \ BY p.ProductID\n) DiscardedProducts;\nGO\n```\n\n在此存储过程中，使用了 SQL Server 的聚合函数来计算每个产品的损失金额和总损失。`CASE`语句用于根据产生的总损失来确定业务状态。该存储过程可以按如下方式执行；但同样，你应该执行两次，以便看到计划缓存的结果：\n\
  \n```sql\nEXEC dbo.TotalLoss;\n```\n\n图 22-4 显示了相应的扩展事件输出。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-477_1.jpg)\n\n### 第 22 章 - 逐行处理\n\n`图 22-4`. 使用等效`SELECT`语句进行数据处理的总成本的\
  \ Profiler 跟踪输出\n\n在图 22-4 中，你可以看到存储过程的第二次执行重用了现有计划，总共使用了 597 次逻辑读取。但是，你可以看到一个比读取更重要的结果：CPU\
  \ 时间使用量从第一次查询的 156 毫秒下降到图 22-4 中的 31 毫秒，持续时间从 682 毫秒下降到 75 毫秒。使用 SQL 查询代替游标操作使执行速度提高了九倍。\n\
  \n因此，为了获得更好的性能，几乎总是建议你在 SQL 查询中使用基于集合的操作，而不是 T-SQL 游标。\n\n## 游标使用建议\n\n游标的低效使用会通过引入额外的网络往返和服务器资源负载来降低应用程序性能。为保持游标成本较低，请尽量遵循以下建议：\n\
  \n-   优先使用基于集合的 SQL 语句，而非 T-SQL 游标，因为 SQL Server 是为处理数据集而设计的。\n-   使用成本最低的游标。\n\
  -   使用 SQL Server 游标时，使用`FAST FORWARD`游标类型。\n-   使用`ADO`、`OLEDB`或`ODBC`实现的 API 游标时，使用默认游标类型，通常称为*默认结果集*。\n\
  -   使用`ADO.NET`时，使用`DataReader`对象。\n-   最小化对服务器资源的影响。\n-   对 API 游标使用客户端游标。\n- \
  \  不要通过游标对基础表执行操作。\n-   尽快释放游标。这有助于释放资源，尤其是在`tempdb`中。\n-   重新设计游标的`SELECT`语句（或应用程序）以返回最小的行集和列集。\n\
  -   通过将游标逻辑重写为基于集合的语句来完全避免 T-SQL 游标，基于集合的语句通常比游标更高效。\n-   对动态游标使用`ROWVERSION`列，以利用高效的、基于版本的并发控制，而不是依赖基于值的技术。\n\
  -   最小化对`tempdb`的影响。\n-   通过避免使用`static`和`keyset-driven`游标类型来最小化`tempdb`中的资源争用。\n\
  -   静态和键集驱动游标会给`tempdb`增加额外负载，因此如果必须使用它们，请考虑这一点，或者如果`tempdb`处于压力之下，请避免使用它们。\n- \
  \  最小化阻塞。\n-   使用默认结果集、仅向前快速游标或静态游标。\n-   尽快处理所有游标行。\n-   避免滚动锁或悲观锁。\n-   使用 API\
  \ 游标时最小化网络往返。\n-   使用`ADO`的`CacheSize`属性在一次往返中获取多行。\n-   使用客户端游标。\n-   使用断开连接的记录集。\n\
  \n## 总结\n\n正如你在本章所学，游标是对 SQL Server 返回的结果集的自然扩展，使调用应用程序能够一次处理一行数据。游标会给应用程序性能增加成本开销，并影响服务器资源。\n\
  \n你应该始终寻找避免游标的方法。基于集合的解决方案在几乎所有情况下都更有效。但是，如果必须执行游标操作，则选择最佳的游标位置、并发性、类型和缓存大小特性组合，以最小化游标的成本开销。\n\
  \n在下一章中，我们将探讨 SQL Server 2014 中引入的内存表、本机编译过程以及 Hekaton 的其他方面所带来的特殊功能。\n\n## 第 23\
  \ 章 - 内存优化 OLTP 表与过程\n\n在线事务处理（OLTP）系统的主要需求之一是尽可能提高系统速度。考虑到这一点，微软在 SQL Server 2014\
  \ 中引入了一套新的功能，专注于使 OLTP 系统尽可能快速。这些就是内存表和本机编译存储过程的内存优化技术。这套仅限企业版的功能面向高端、事务密集型、专注于\
  \ OLTP 的系统。内存优化技术是查询调优工具箱中的另一个工具，但它是一个高度专业化的工具，仅适用于某些应用程序。在采用这项新技术时需谨慎。也就是说，在合适的系统和合适的内存条件下，我谈论的是极快的速度。\n\
  \n在本章中，我将涵盖以下主题：\n\n-   内存表工作原理的基础知识\n-   通过本机编译存储过程提高性能\n-   本机编译过程和内存 OLTP 表的优点与缺点\n\
  -   何时使用内存 OLTP 表的建议\n\n## 内存 OLTP 基础\n\n归根结底，你可以调优查询以使其运行得非常快。但是，无论你让它们运行得多快，在某种程度上，你都受到现代计算机内部某些架构问题的限制。通常，头号瓶颈是存储系统。无论你仍在使用旋转盘片还是已经转向某种类型的`SSD`或类似技术，磁盘仍然是系统中最慢的方面。这意味着对于读取或写入，你必须等待。但内存很快，而且有了新的\
  \ 64 位操作系统，它可以非常充足。因此，如果你有可以完全移入内存的表，你就可以显著提高速度。这正是内存 OLTP 表的核心部分：将数据访问（包括读取和写入）移至内存中，脱离磁盘。\n\
  \n\n但微软所做的远不止于此。它认识到，虽然磁盘速度较慢，但系统变慢的另一个方面在于查询如何被编译、存储和访问，以及数据如何通过事务系统进行访问和管理。因此，微软也在此处进行了一系列改动。其中最主要的改动是将事务处理方式从悲观改为乐观。现有的产品要求所有事务在允许数据更改刷新到磁盘之前，必须先写入事务日志。这在事务处理过程中形成了一个瓶颈。于是，微软不再对事务能否成功完成持悲观态度，而是采取了乐观的方式，认为在大多数情况下事务会顺利完成。此外，为了避免出现阻塞情况（即一个事务必须完成数据更新后，下一个事务才能访问或更新数据），微软对数据进行了版本控制。此举现在消除了系统内的一个主要争用点，并大幅减少了阻塞，而且这一切都在内存中进行，因此速度更快。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 23 章 ■ 内存优化的 OLTP 表与存储过程\n\
  \n随后，微软将这一切又推进了一步。它没有对防止多个进程同时访问一个页面进行写入的内存锁采用悲观方式，而是将乐观方法扩展到了内存管理领域。现在，借助版本控制，内存中表的工作模式是“最终一致”，并配有冲突解决过程，该过程会回滚一个事务，但绝不会因一个事务而阻塞另一个事务。这有可能导致一些数据丢失，但它使数据访问层内的一切都变得非常快。\n\
  \n最后，正如你在本书其他部分所见，查询调优的一个主要部分是弄清楚如何与查询优化器协作以获得良好的执行计划，并让该计划被多次复用。这个过程也可能非常耗费资源且缓慢。SQL\
  \ Server 2014 引入了原生编译存储过程的概念。这些存储过程本质上是将 `T-SQL` 代码编译成 `DLLs`，并使其成为 SQL Server 操作系统的一部分。这个编译过程成本高昂，不应随意用于任何普通查询。其核心理念是投入时间和精力将一个存储过程编译为原生代码，然后以极大提升的速度使用该过程数百万次。\n\
  \n所有这些技术汇聚在一起，创造了新的功能，你可以单独使用它们，也可以结合现有的表结构和标准 `T-SQL` 来使用。事实上，你可以像对待普通 SQL Server\
  \ 表一样对待内存中表，仍然能实现一些性能改进。但是，你不能在任何地方都这样做。\n\n利用内存 OLTP 表和存储过程有一些相当具体的要求。\n\n### 系统要求\n\
  \n内存技术最重要的系统要求是，你必须运行 SQL Server 2014 的企业版才能使用它（尽管它在开发版中也能使用）。在考虑内存优化表是否可行之前，你还需要满足其他一些标准要求。\n\
  \n• 现代的 64 位处理器\n• 用于打算放入内存的数据的两倍的可用磁盘存储空间\n• 大量内存\n\n显然，对于大多数系统来说，关键是大量的内存。你需要有足够的内存供操作系统和\
  \ SQL Server 正常运行。然后，你还需要内存来满足系统所有非内存优化的需求，包括数据缓存。最后，你还需要在所有这些之外，额外为你的内存优化表分配内存。如果你考虑的不是一个相当大的系统（最低\
  \ 64GB 内存），我甚至不建议将此作为选项。较小的系统在内存中无法提供足够的存储空间，使得投入的时间、精力和额外的授权成本变得不值得。\n\n### 基本设置\n\
  \n\n\n"
- '# 第 23 章：内存优化的 OLTP 表与存储过程


  除了硬件要求外，您还必须对数据库进行额外工作才能启用内存表。我将从一个新数据库开始进行说明。


  ```sql

  CREATE DATABASE InMemoryTest ON PRIMARY

  (NAME = N''InMemoryTest_Data'',

  FILENAME = N''D:\Data\InMemoryTest_Data.mdf'',

  SIZE = 5GB)

  LOG ON

  (NAME = N''InMemoryTest_Log'',

  FILENAME = N''L:\Log\InMemoryTest_Log.ldf'');

  ```


  为了使内存表保持持久性，它们必须既写入内存也写入磁盘，因为内存会随着断电而消失。持久性（关系数据集的 ACID 属性之一）意味着一旦事务提交，它就保持提交状态。您可以拥有一个**持久**的内存表，或者一个**非持久**的表。对于非持久表，即使您可能已提交事务，但仍可能丢失该数据，这与
  SQL Server 中标准表的工作方式不同。非持久数据最常见的使用场景是会话状态或时间敏感的信息，例如电子购物车。总之，内存存储与标准关系表中的常规存储不同。因此，必须创建单独的文件组和文件。为此，您可以直接修改数据库，如下所示：


  ```sql

  ALTER DATABASE InMemoryTest

  ADD FILEGROUP InMemoryTest_InMemoryData

  CONTAINS MEMORY_OPTIMIZED_DATA;


  ALTER DATABASE InMemoryTest

  ADD FILE (NAME=''InMemoryTest_InMemoryData'',

  FILENAME =''D:\Data\InMemoryTest_InMemoryData.ndf'')

  TO FILEGROUP InMemoryTest_InMemoryData;

  ```


  我本可以直接修改您一直在试验的 `AdventureWorks2012` 数据库，但使用内存优化表时另一个需要考虑的因素是，一旦创建了特殊文件组，就无法将其移除。您只能删除整个数据库。这就是为什么我仅使用一个单独的数据库进行试验。这样更安全。


  使用内存 OLTP 的数据库在功能上有一些限制。


  *   `DBCC CHECKDB`：您可以运行一致性检查，但会跳过内存优化表。如果您尝试运行 `DBCC CHECKTABLE`，将会收到错误。

  *   `AUTO_CLOSE`：不支持此功能。

  *   `DATABASE SNAPSHOT`：不支持此功能。

  *   `ATTACH_REBUILD_LOG`：同样不支持此功能。


  完成这些修改后，您现在可以开始在系统中创建内存表了。


  ### 创建表


  数据库设置完成后，您现在就能够创建如前所述的内存优化表了。实际语法相当直接。我将尽可能复制 `AdventureWorks2012` 中的 `Person.Address`
  表。


  ```sql

  USE DATABASE InMemoryTest;

  GO


  CREATE TABLE dbo.Address

  (

  AddressID INT IDENTITY(1, 1)

  NOT NULL

  PRIMARY KEY NONCLUSTERED HASH WITH (BUCKET_COUNT = 50000),

  AddressLine1 NVARCHAR(60) NOT NULL,

  AddressLine2 NVARCHAR(60) NULL,

  City NVARCHAR(30) NOT NULL,

  StateProvinceID INT NOT NULL,

  PostalCode NVARCHAR(15) NOT NULL,

  --[SpatialLocation geography NULL,

  --rowguid uniqueidentifier ROWGUIDCOL NOT NULL CONSTRAINT DF_Address_rowguid DEFAULT
  (newid()),

  ModifiedDate DATETIME

  NOT NULL

  CONSTRAINT DF_Address_ModifiedDate DEFAULT (GETDATE())

  )

  WITH (

  MEMORY_OPTIMIZED= ON,

  DURABILITY = SCHEMA_AND_DATA);

  ```


  这将在系统内存中创建一个持久表，使用您定义的磁盘空间来保留数据的持久副本，确保在断电情况下不会丢失数据。它有一个像常规 SQL Server 表一样的 `IDENTITY`
  值作为主键（尽管在此版本的 SQL Server 中，若要使用 `IDENTITY` 而非 `SEQUENCE`，您将不得不放弃将定义设置为除 `(1,1)`
  以外任何值的能力）。但是，索引定义不是聚集索引，而是 `NON-CLUSTERED HASH`。我接下来将讨论索引以及 `BUCKET_COUNT` 等内容。



