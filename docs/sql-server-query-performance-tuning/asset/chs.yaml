- '# 第 6 章 ■ 查询性能指标


  这些步骤将生成创建会话并将其输出到文件所需的脚本。


  要手动创建此新跟踪，请按以下方式使用 Management Studio：


  1.  打开脚本文件或导航到查询窗口。

  2.  修改服务器上为创建此会话设置的路径和文件位置。

  3.  执行脚本。


  会话创建完成后，您可以使用以下命令启动它：


  ```sql

  ALTER EVENT SESSION [Query Performance Metrics]

  ON SERVER

  STATE = START;

