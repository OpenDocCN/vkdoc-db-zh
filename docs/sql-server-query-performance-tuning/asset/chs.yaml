  \ time:\nCPU time = 0 ms, elapsed time = 128 ms.\n(1496 row(s) affected)\nTable\
  \ 'Employee'. Scan count 0, logical reads 2992, physical reads 2, read-ahead reads\
  \ 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Product'.\
  \ Scan count 0, logical reads 2992, physical reads 3, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'PurchaseOrderDetail'.\
