  \ Server 会自动检测这种情况并重新编译存储过程。\n\n> `注意` 我将在“重新编译的优缺点”部分更详细地讨论由于架构更改导致的重新编译。\n\n####\
  \ 统计信息更改\n\nSQL Server 会跟踪表的更改次数。如果更改次数超过了重新编译阈值 (`RT`) 值，那么当语句中引用该表时，SQL Server\
  \ 会自动更新统计信息，正如你在第 12 章中看到的。当检测到自动更新统计信息的条件时，SQL Server 会自动将该语句标记为重新编译，同时更新统计信息。\n\
  \n`RT` 由一个公式决定，该公式取决于表是永久表还是临时表（不是表变量）以及表中的行数。表 17-3 展示了基本公式，以便你可以确定何时可能由于数据更改而看到语句重新编译。\n\
  \n### 表 17-3. 确定数据更改的公式\n\n| **表类型** | **公式** |\n| :--- | :--- |\n| 永久表 | 如果行数 (`n`)\
  \ <= 500，`RT` = 500<br>如果 `n` > 500，`RT` = 500 + .2 * `n`<br>或者<br>当设置了跟踪标志 2371\
  \ 时，25,000 行后按比例计算 |\n| 临时表 | 如果 `n` < 6，`RT` = 6<br>如果 6 <= `n` <= 500，`RT` = 500<br>如果\
  \ `n` > 500，`RT` = 500 + .2 * `n`<br>或者<br>当设置了跟踪标志 2317 时，25,000 行后按比例计算 |\n\n\
