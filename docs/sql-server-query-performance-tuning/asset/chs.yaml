  ### 缺失索引


  要分析缺失索引导致表扫描或检索大数据集的可能性，你可以使用表 4-4 中的计数器。


  **表 4-4. 用于分析过度数据扫描的性能监视器计数器**


  | 对象(实例[,实例 N]) | 计数器 |

  | :--- | :--- |

  | SQLServer:Access Methods | `Full Scans/sec` |


  ### 每秒完全扫描次数


  此计数器监控对基表或索引执行的无限制完全扫描的次数。扫描不一定是坏事。但它们确实代表了更广泛的数据访问，因此很可能表明存在问题。导致 `Full Scans/sec`
  值过高的几个主要原因如下：


  -   缺失索引

  -   请求的行数过多

  -   谓词选择性不够

  -   T-SQL 不当

  -   数据分布或数量不支持查找


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ## 第 4 章 ■ CPU 性能分析


  为了进一步调查产生这些问题的查询，请使用扩展事件来识别这些查询（我将在下一章介绍此工具）。存在缺失索引、请求过多行或 T-SQL 编写不佳的查询将产生大量逻辑读（由扫描整个表或整个索引引起）以及增加的
  CPU 时间。


  请注意，可能会对存储过程中使用的临时表执行完全扫描，因为大多数情况下你不会在临时表上建立索引（或者你不需要索引）。尽管如此，将此计数器添加到基线有助于识别临时表使用可能增加的情况，如果使用不当，可能会对性能不利。


  ### 动态管理对象


  检查缺失索引的另一种方法是查询动态管理视图 `sys.dm_db_missing_index_details`。


  此管理视图返回的信息可以基于正在针对数据库运行的查询的执行计划建议索引候选。视图 `sys.dm_db_missing_index_details` 是统称为
  *缺失索引功能* 的一系列 DMV 的一部分。这些 DMV 基于存储在缓存中的执行计划生成的数据。你可以直接查询此视图以收集数据，从而决定是否要基于视图中提供的信息创建索引。缺失索引也会显示在给定查询的
  XML 执行计划中，但我将在下一章更详细地介绍这一点。虽然这些视图对于建议可能的索引很有用，但由于它们无法链接到特定查询，因此不清楚这些索引中哪一个最有用。你最好使用我在下一章展示的技术将缺失索引与特定查询关联起来。对于所有缺失索引建议，在系统上实施任何建议之前，你必须先进行测试。


  与缺失索引相反的问题是从不使用的索引。DMV `sys.dm_db_index_usage_stats` 显示了哪些索引已被使用，至少是在 SQL Server
  实例上次重启以来。不幸的是，此 DMV 中的计数器有多种方式会被重置或移除，因此你不能完全依赖它来获得 100% 准确的索引使用视图。你也可以使用较低级别的 DMV
  `sys.dm_db_index_operational_stats` 查看正在使用的索引。




