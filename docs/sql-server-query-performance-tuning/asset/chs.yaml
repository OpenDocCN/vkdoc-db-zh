  由于索引是建立在 (`C1`, `C2`) 上的，该索引的统计信息包含了第一个列 `C1` 的直方图，以及前缀列组合（`C1` 和 `C1 * C2`）的密度值。没有单独为列
  `C2` 提供直方图或密度值。


  要了解如何识别没有索引的列上的缺失统计信息，请执行以下 `SELECT` 语句。由于自动创建统计信息功能已关闭，优化器将无法找到 `WHERE` 子句中使用的列
  `C2` 的数据分布信息。在执行查询之前，请确保通过点击查询工具栏或按下 `CTRL+M` 启用了“包括实际执行计划”。


