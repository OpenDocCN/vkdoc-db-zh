  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-486_1.jpg)\n\
  \n您不会使用与之前完全相同的衡量指标，而是会依赖执行时间。即使您通过扩展事件捕获指标，您也不会看到与图`23-3`所示相同类型的值；然而，在这种情况下，读取次数是对系统活动量的度量，因此您可以预期较高的值意味着更多的数据访问，较低的值意味着较少的访问。\n\
