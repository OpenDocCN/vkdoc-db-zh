  \ C1 = 1,\n    C2 = 1\nWHERE C2 = 1;\n```\n\n\n\n此 `UPDATE` 语句的逻辑读取总数从 47 减少到了 20\
  \ (`=15 + 5`)。\n\n`表 'Test1'。扫描计数 1，逻辑读取 15`\n\n`表 'Worktable'。扫描计数 1，逻辑读取 5`\n\n\
  -   `注意`，`worktable` 是 SQL Server 内部用于处理查询中间结果的临时表。\n    工作表在 `tempdb` 数据库中创建，并在查询执行后自动删除。\n\
  \n本节中的示例已经证明，尽管为操作查询添加索引会带来一些开销成本，但由于索引对搜索的有益效果（即使在更新期间），整体结果是成本降低。\n\n## 索引设计建议\n\
  \n索引设计的主要建议如下：\n\n-   检查 `WHERE` 子句和 `JOIN` 条件列。\n-   使用窄索引。\n-   检查列的唯一性。\n-  \
  \ 检查列的数据类型。\n-   考虑列的顺序。\n-   考虑索引类型（聚集索引与非聚集索引）。\n\n让我们依次考虑这些建议。\n\n### 检查 `WHERE`\
  \ 子句和 `JOIN` 条件列\n\n当查询提交给 SQL Server 时，查询优化器会尝试为查询中引用的每个表找到最佳的数据访问机制。以下是其工作方式：\n\
  \n1.  优化器识别包含在 `WHERE` 子句和 `JOIN` 条件中的列。\n2.  然后，优化器检查这些列上的索引。\n3.  优化器通过根据索引上维护的统计信息确定子句的选择性（即，将返回多少行）来评估每个索引的有用性。\n\
  4.  主键和外键等约束也会被评估和使用，以确定查询中使用的对象的选择性。\n5.  最后，优化器基于先前步骤中收集的信息，估算出检索符合条件行的最低成本方法。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-124_1.jpg)\n\
  \n第 8 章 ■ 索引架构与行为\n\n`注意` 第 12 章将更深入地介绍统计信息。\n\n为了理解 `WHERE` 子句列在查询中的重要性，让我们看一个例子。让我们回到帮助你理解索引是什么的原始代码清单；该查询由一个没有任何\
  \ `WHERE` 子句的 `SELECT` 语句组成，如下所示：\n\n```sql\nSELECT p.ProductID,\n    p.Name,\n\
  \    p.StandardCost,\n    p.Weight\nFROM Production.Product p;\n```\n\n查询优化器执行聚集索引扫描（对于具有聚集索引的表，这相当于在堆上执行表扫描）来读取行，如图\
  \ 8-6 所示（在查询窗口中使用 `Ctrl+M` 启用“包含实际执行计划”选项，并通过右键单击选择“查询选项”，然后在“高级”选项卡中勾选相应复选框来启用\
  \ `Set Statistics IO` 选项）。\n\n*图 8-6. 没有 `WHERE` 子句的执行计划*\n\n`SET STATISTICS IO`\
  \ 为 `SELECT` 语句报告的逻辑读取数如下：`表 'Product'。扫描计数 1，逻辑读取 15`\n\n为了理解 `WHERE` 子句列对查询优化器决策的影响，让我们添加一个\
  \ `WHERE` 子句来检索单行。\n\n```sql\nSELECT p.ProductID,\n    p.Name,\n    p.StandardCost,\n\
  \    p.Weight\nFROM Production.Product AS p\nWHERE p.ProductID = 738 ;\n```\n\n\
  有了 `WHERE` 子句后，查询优化器会检查 `WHERE` 子句列 `ProductID`，识别 `ProductID` 列上索引 `PK_Product_ProductId`\
  \ 的可用性，根据索引 `PK_Product_ProductId` 的统计信息评估 `WHERE` 子句的高选择性（即，只返回一行），并决定使用该索引检索数据，如图\
  \ 8-7. 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-125_1.jpg)\n\
  \n第 8 章 ■ 索引架构与行为\n\n*图 8-7. 带有 `WHERE` 子句的执行计划*\n\n产生的逻辑读取数如下：\n`表 'Product'。扫描计数\
  \ 0，逻辑读取 2`\n\n查询优化器的行为表明，`WHERE` 子句列有助于优化器为查询选择最优的索引操作。这也适用于两个表之间 `JOIN` 条件中使用的列。\n\
  \n优化器会查找 `WHERE` 子句列或 `JOIN` 条件列上的索引，如果可用，则考虑使用索引从表中检索行。查询优化器在执行查询时会考虑 `WHERE` 子句列和\
  \ `JOIN` 条件列上的索引。因此，在 SQL 查询中频繁使用的 `WHERE` 子句、`HAVING` 子句和 `JOIN` 条件列上建立索引，有助于优化器避免扫描基表。\n\
  \n当表内的数据量非常小，以至于可以放入单个页面（8KB）时，表扫描可能比索引查找效果更好。如果你有一个很好的索引，但仍然得到扫描结果，请考虑此问题。\n\n\
  ### 使用窄索引\n\n为获得最佳性能，在创建索引时，应使用尽可能实用的窄数据类型。此处的“窄”意味着尽可能小的数据类型。你还应避免在索引中使用非常宽的数据类型列。具有字符串数据类型（`CHAR`、`VARCHAR`、`NCHAR`\
  \ 和 `NVARCHAR`）的列有时可能相当宽，二进制和全局唯一标识符（`GUID`）也是如此。除非绝对必要，否则应尽量减少在索引中使用具有大尺寸的宽数据类型列。你可以在表中的列组合上创建索引。为获得最佳性能，索引中应使用尽可能少的列。但是，要使用你需要使用的列来为索引定义一个有用的键。\n\
  \n窄索引比宽索引在 8KB 索引页中能容纳更多行。这具有以下效果：\n\n-   减少 I/O（因为需要读取的 8KB 页更少）\n-   使数据库缓存更有效，因为\
  \ SQL Server 可以缓存更少的索引页，从而减少内存中索引页所需的逻辑读取\n-   减少数据库的存储空间\n\n为了解窄索引如何减少逻辑读取数，创建一个包含\
  \ 20 行和一个索引的测试表。\n\n```sql\nIF (SELECT OBJECT_ID('Test1')) IS NOT NULL\n    DROP\
  \ TABLE dbo.Test1;\nGO\nCREATE TABLE dbo.Test1 (C1 INT, C2 INT);\n\nWITH Nums\n\
  AS (SELECT 1 AS n\n    UNION ALL\n    SELECT n + 1\n    FROM Nums\n    WHERE n <\
  \ 20\n    )\nINSERT INTO dbo.Test1 (C1, C2)\nSELECT n, n\nFROM Nums;\n\nCREATE INDEX\
  \ iTest ON dbo.Test1(C1);\n```\n\n由于索引列很窄（`INT` 数据类型为 4 字节），所有索引行都可以容纳在一个 8KB 索引页中。如图\
  \ 8-8 所示，你可以通过与索引关联的动态管理视图来确认这一点。\n\n*图 8-8. 窄非聚集索引的页数*\n\n```sql\nSELECT i.Name,\n\
  \    i.type_desc,\n    ddips.page_count,\n    ddips.record_count,\n    ddips.index_level\n\
  FROM sys.indexes i\nJOIN sys.dm_db_index_physical_stats(DB_ID(N'AdventureWorks2012'),\n\
  \                                    OBJECT_ID(N'dbo.Test1'), NULL,\n          \
  \                          NULL, 'DETAILED') AS ddips\n    ON i.index_id = ddips.index_id\n\
  WHERE i.object_id = OBJECT_ID(N'dbo.Test1');\n```\n\n`sys.indexes` 系统表存储在每个数据库中，包含数据库中每个索引的基本信息。动态管理函数\
  \ `sys.dm_db_index_physical_stats` 包含有关索引统计信息的更详细信息（你将在第 13 章了解更多关于此 `DMF` 的信息）。为了理解宽索引键的缺点，将索引列\
  \ `C1` 的数据类型从 `INT` 修改为 `CHAR(500)`（下载中的 `narrow_alter.sql`）。\n\n```sql\nDROP INDEX\
  \ dbo.Test1.iTest;\nALTER TABLE dbo.Test1 ALTER COLUMN C1 CHAR(500);\nCREATE INDEX\
  \ iTest ON dbo.Test1(C1);\n```\n\n\n\n`INT` 数据类型列的宽度是 4 字节，而 `CHAR(500)` 数据类型列的宽度是\
  \ 500 字节。由于索引列的宽度较大，需要两个索引页来容纳所有 20 个索引行。你可以通过再次对其运行查询，在 `sys.dm_db_index_physical_stats`\
  \ 动态管理函数中确认这一点（参见图 8-9）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ![](img/index-127_1.jpg)\n\n## 第 8 章 ■ 索引架构与行为\n\n**图 8-9.** 一个宽的、非聚集索引的页数\n\n大的索引键大小会增加索引页的数量，从而增加索引所需的内存量和磁盘活动量。始终建议将索引键大小设置得尽可能窄。\n\
  \n在继续之前，请删除测试表。\n\n```sql\nDROP TABLE dbo.Test1;\n```\n\n### 检查列唯一性\n\n在可能唯一值范围非常小的列（如\
  \ `MaritalStatus`）上创建索引不会对性能有益，因为查询优化器将无法使用索引有效地缩小要返回的行的范围。考虑一个只有两个唯一值的 `MaritalStatus`\
  \ 列：`M` 和 `S`。当你在 `WHERE` 子句中使用 `MaritalStatus` 列执行查询时，最终会从表中获取大量行（假设 `M` 和 `S`\
  \ 的分布相对均匀），导致昂贵的表或聚集索引扫描。最好在 `WHERE` 子句中使用具有大量唯一行（或 `高选择性`）的列，以限制访问的行数。\n\n你应该在这些列上创建索引，以帮助优化器访问较小的结果集。\n\
  \n此外，在多列上创建索引（也称为 `复合索引`）时，列的顺序很重要。在许多情况下，首先使用最具选择性的列将有助于更有效地过滤索引行。\n\n**注意：** 本章后面的“考虑列顺序”一节将解释复合索引中列顺序的重要性。\n\
  \n由此可以看出，在列上创建索引之前了解其选择性非常重要。\n\n你可以通过执行如下查询来找到它；只需替换表和列名：\n\n```sql\nSELECT COUNT(DISTINCT\
  \ e.MaritalStatus) AS DistinctColValues,\n    COUNT(e.MaritalStatus) AS NumberOfRows,\n\
  \    (CAST(COUNT(DISTINCT e.MaritalStatus) AS DECIMAL)\n        / CAST(COUNT(e.MaritalStatus)\
  \ AS DECIMAL)) AS Selectivity,\n    (1.0/(COUNT(DISTINCT e.MaritalStatus))) AS Density\n\
  FROM HumanResources.Employee AS e;\n```\n\n当在 `WHERE` 子句或连接条件中引用时，具有最多唯一值（或选择性最高）的列可能是索引的最佳候选列。你可能也会遇到特殊数据，即你有数百行公共数据，只有少数是唯一的。这少数行也将从索引中受益。通过使用筛选索引（稍后将更详细地讨论）可以使这一点更加有益。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-128_1.jpg)\n\
  \n![](img/index-128_2.jpg)\n\n## 第 8 章 ■ 索引架构与行为\n\n要理解索引键列的选择性如何影响索引的使用，请查看 `HumanResources.Employee`\
  \ 表中的 `MaritalStatus` 列。如果你运行前面的查询，你会看到它在 290 行中只包含两个不同的值，选择性为 0.0069，密度为 0.5。一个只查找\
  \ `MaritalStatus` 为 `M` 的查询如下所示：\n\n```sql\nSELECT e.*\nFROM HumanResources.Employee\
  \ AS e\nWHERE e.MaritalStatus = 'M'\n    AND e.BirthDate = '1984-12-05'\n    AND\
  \ e.Gender = 'M';\n```\n\n这将导致图 8-10 所示的执行计划以及以下 I/O 和运行时间：\n\n```\nTable 'Employee'.\
  \ Scan count 1, logical reads 9\nCPU time = 0 ms, elapsed time = 49 ms.\n```\n\n\
  **图 8-10.** 没有索引的执行计划\n\n通过扫描聚集索引（数据存储的位置）来查找 `MaritalStatus = 'M'` 的相应值，从而返回数据。（其他运算符将在第\
  \ 14 和 15 章中介绍。）如果你在该列上放置一个索引，如下所示，并再次运行查询，执行计划保持不变。\n\n```sql\nCREATE INDEX IX_Employee_Test\
  \ ON HumanResources.Employee (Gender);\n```\n\n数据的选择性不足以让索引被使用，更不用说有用。如果改为使用如下所示的复合索引：\n\
  \n```sql\nCREATE INDEX IX_Employee_Test ON\n    HumanResources.Employee (BirthDate,\
  \ Gender, MaritalStatus)\nWITH (DROP_EXISTING = ON) ;\n```\n\n然后重新运行查询以查看图 8-11\
  \ 中的执行计划和性能结果，你会得到：\n\n```\nTable 'Employee'. Scan count 1, logical reads 4\nCPU\
  \ time = 0 ms, elapsed time = 38 ms.\n```\n\n**图 8-11.** 使用复合索引的执行计划\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-129_1.jpg)\n\n## 第 8 章 ■ 索引架构与行为\n\n现在，你比使用聚集索引扫描时表现更好了。一个干净利落的\
