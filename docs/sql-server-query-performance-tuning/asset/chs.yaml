- '# SQL 查询性能调优


  ## 服务器配置

  尽管对硬件、操作系统和 `SQL Server` 实例进行适当配置对于数据库应用获得最佳性能至关重要，但这些领域已经高度标准化，通常只需花费有限的时间即可完成针对性能的正确配置。而另一方面，诸如查询设计和索引策略等应用设计问题，则是您的代码和数据集所独有的。因此，数据访问层通常比硬件、操作系统或
  `SQL Server` 配置有更多的优化空间。图 1-3 展示了一项针对 346 名数据专业人士的调查结果（经 Paul Randal 许可）：[`bit.ly/1gRANRy`](http://bit.ly/1gRANRy)。


  `图 1-3. 性能问题的根本原因`


  如您所见，前两个问题是 `T-SQL` 代码和糟糕的索引。前六大问题中有四个都直接与 `T-SQL`、索引、代码和数据结构相关。我的经验与其他受访者一致。您可以通过首先关注数据访问领域（包括逻辑/物理数据库设计、查询设计和索引设计）来获得数据库应用性能的最大提升。


  诚然，如果您专注于硬件配置和升级，可能会获得令人满意的性能提升。然而，应用程序发送的一个糟糕的 `SQL` 查询会耗尽所有可用的硬件资源，无论您拥有多少资源。因此，糟糕的应用设计会使硬件升级的需求变得非常高，甚至超出您的成本限制。在存在繁重
  `SQL` 工作负载的情况下，专注于硬件配置和升级通常只能带来较低的投资回报。


  ## SQL 查询性能调优

  您应该从两个层面分析应用程序对 `SQL Server` 数据库造成的压力：


  `高层级`：分析数据库应用对各个硬件资源造成的压力以及 `SQL Server` 安装的整体行为。对此的最佳度量是各种等待状态。此信息可以通过两种方式帮助您。首先，它帮助您确定
  `SQL Server` 应用中性能不佳需要集中关注的领域。其次，它帮助您识别较高层级是否存在配置不当的问题。然后，您可以决定在无法使用 `Performance
  Monitor` 工具调整应用程序的情况下（如第 2 章所述）可能需要升级哪种硬件资源。


  `低层级`：识别应用程序内部的确切元凶——换句话说，就是那些在较高层级造成大部分可见压力的 `SQL` 查询。这可以使用 `Extended Events` 工具和各种
  `动态管理视图` 来完成，如第 6 章所述。


  ## SQL Server 性能杀手

  现在让我们考虑可能降低 `SQL Server` 性能的主要问题领域。通过预先了解 `SQL Server` 中主要的性能杀手，您将能够将调优工作集中在可能的原因上。


  一旦您优化了硬件、操作系统和 `SQL Server` 设置，`SQL Server` 中的主要性能杀手如下，按大致顺序排列（最严重的排在前面）：


  *   索引不足

  *   统计信息不准确

  *   查询设计不当

  *   执行计划生成不佳

  *   过度的阻塞和死锁

  *   非基于集合的操作，通常是 `T-SQL` 游标

  *   数据库设计不合理

  *   碎片过多

  *   执行计划不可重用

  *   查询频繁重新编译

  *   游标使用不当

  *   数据库事务日志配置不当

  *   `tempdb` 的过度使用或配置不当


  让我们快速浏览一下每个问题。


  ### 索引不足

  索引不足通常是 `SQL Server` 中最大的性能杀手之一。如果查询缺乏适当的索引，`SQL Server` 在执行查询时必须检索和处理更多的数据。这会导致对磁盘、内存和
  `CPU` 产生巨大压力，从而显著增加查询执行时间。增加的查询执行时间进而可能导致 `SQL Server` 中出现过度的阻塞和死锁。您将在第 8-12 章学习如何确定索引策略和解决索引问题。


  通常，索引被认为是数据库管理员 (`DBA`) 的职责。然而，`DBA` 无法主动定义如何使用索引，因为索引的使用是由开发人员编写的数据库查询和存储过程决定的。因此，定义索引必须是共同的责任，因为开发人员通常更了解要检索的数据，而
  `DBA` 则更了解索引的工作原理。不了解查询而创建的索引作用甚微。


  `注意`：由于不了解查询而创建的索引作用甚微，数据库开发人员需要至少像熟悉 `T-SQL` 那样理解索引。


  ### 统计信息不准确

  `SQL Server` 严重依赖基于成本的优化，因此准确的数据分布统计信息对于有效使用索引至关重要。没有准确的统计信息，`SQL Server` 内置的查询优化器就无法准确估计查询影响的行数。由于从表中检索的数据量对于决定如何优化查询执行非常重要，如果数据分布统计信息维护不准确，查询优化器的效果就会大打折扣。统计信息可能会因未更新而过时。您还可能看到数据以倾斜方式分布的问题损害了统计信息。在自动递增的列（如
  `identity` 或日期时间）上的统计信息，可能会随着新数据的添加而过时。您将在第 12 章学习如何分析统计信息。


  ### 查询设计不当

  索引的有效性在很大程度上取决于您编写 `SQL` 查询的方式。从表中检索过多的行，或者指定的筛选条件返回了比所需更大的结果集，都会使索引失效。为了提高性能，您必须确保编写的
  `SQL` 查询能够充分利用新的或现有的索引。未能编写高性价比的 `SQL` 查询可能会阻止 `SQL Server` 选择合适的索引，从而增加查询执行时间和数据库阻塞。第
  20 章涵盖了如何编写有效的查询。


  查询设计不仅涵盖单个查询，还包括通常用于实现数据库功能（例如队列读取器和写入器之间的队列管理）的一组查询。即使设计中使用的单个查询性能良好，数据库的整体性能也可能非常差。解决这种瓶颈需要对
  `SQL Server` 不同的特性有广泛的了解，这些特性会影响数据库功能的性能。您将在本书中看到如何使用 `SQL` 查询设计有效的数据库功能。


  ### 执行计划生成不佳




  允许 SQL Server 建立高效的存储过程并反复重用该过程而不必重新编译的相同机制，在某些情况下可能会适得其反。一个糟糕的执行计划可能是一个真正的**性能杀手**。当一个称为
  `参数探测` 的过程出现问题时，常常会导致不准确且性能低下的计划。参数探测是源于查询优化器所使用机制的一个过程，该优化器基于统计信息中采样或特定的值来确定最佳计划。理解统计信息和参数如何结合以创建执行计划，以及你可以采取哪些措施来控制它们，这一点非常重要。统计信息在第
  12 章中介绍，执行计划分析在第 14 和 15 章中介绍。我额外添加了第 16 章，专门讨论不良的参数探测问题以及如何最好地处理它。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 1 章 SQL 查询性能调优


  ## 过度的阻塞和死锁


  由于 SQL Server 完全遵循原子性、一致性、隔离性和持久性（ACID）原则，数据库引擎确保并发事务所做的修改彼此正确隔离。默认情况下，一个事务看到的数据要么是另一个并发事务修改之前的状态，要么是另一个事务完成之后的状态——它不会看到中间状态。


  由于这种隔离性，当多个事务试图以不兼容的方式并发访问同一资源时，数据库中就会发生 `阻塞`。两个进程无法同时更新同一数据。此外，由于 SQL Server 中的所有更新都建立在数据页（大小为
  8KB 的行集合）之上，你可以看到，即使两个进程并未更新同一行，也可能发生阻塞。就确保正确的数据存储和检索而言，阻塞是件好事，但在错误的地方出现过多阻塞会拖慢速度。


  与阻塞相关但实际是另一个问题的是，当两个资源试图升级或扩展锁资源并相互冲突时，就会发生 `死锁`。查询引擎会确定回滚代价最小的进程，并选择其作为 `死锁牺牲品`。这要求重新提交数据库请求以成功执行。尽管许多人认为死锁是一个结构性问题，但它实际上是一个根本性的性能问题。查询的执行时间会受到其面临的阻塞和死锁（如果有的话）数量的负面影响。


  为了实现多用户数据库应用程序的可扩展性能，正确控制查询的隔离级别和事务范围以最小化阻塞和死锁至关重要；否则，即使硬件资源可能未被充分利用，查询的执行时间也会显著增加。我将在第
  20 和 21 章深入探讨这个问题。


  ## 非集合操作


  Transact-SQL 是一种基于集合的脚本语言，这意味着它操作的是数据集。这迫使你从列的角度而非行的角度思考问题。非集合式的思维会导致过度使用游标和循环，而不是探索更高效的连接和子查询。T-SQL
  语言提供了丰富的机制来操作数据集。为了让性能出色，你需要利用这些机制，而不是在代码中强制采用逐行处理的方法，后者会扼杀性能。关于如何做到这一点的例子贯穿全书；同时，我将在第
  18 章讨论 T-SQL 最佳实践，在第 22 章讨论游标。


  ## 不恰当的数据库设计


  数据库应进行充分规范化，以提高数据检索性能并减少阻塞。


  例如，如果你有一个规范不足的数据库，客户和订单信息在同一张表中，那么客户信息将在该客户的所有订单行中重复。这种每行信息的重复会增加获取客户所有订单所需的页面读取次数。同时，处理客户订单的数据写入器将锁定所有包含客户信息的行，从而可能阻塞所有试图访问客户资料的其他数据写入器/数据读取器。


  数据库的过度规范化可能与规范化不足一样糟糕。过度规范化增加了检索数据所需的连接数量和复杂性。过度规范化的数据库包含大量表，但每个表的列数很少。过度规范化并不是我经常遇到的问题，但当我遇到时，它会对性能产生严重影响。更常见的情况是处理结构规范化不足或不当的问题。


  查询中连接过多也可能是因为数据库实体未清晰分区，或者查询服务于一组复杂的需求，而通过创建新的存储过程可能能更好地满足这些需求。


  数据库设计是一个庞大的主题。我将在第 18 章及本书其余部分提供一些指导。


  由于该主题的篇幅所限，我无法以其所需的完整方式来阐述。然而，如果你想阅读一本侧重于介绍该主题的数据库设计书籍，我推荐阅读 Louis Davidson 等人所著的
  *《Pro SQL Server 2012 关系数据库设计与实现》*（Apress，2012）。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 1 章 SQL 查询性能调优


  ## 过度碎片化


  在分析数据检索操作时，通常可以假设数据是按索引指示的、有序的方式组织的。然而，如果包含数据的页以无序方式碎片化，或者由于频繁的页拆分导致它们包含的数据量很少，那么数据检索操作所需的读取操作次数将远高于正常情况。碎片化导致的读取操作次数增加会损害查询性能。在第
  13 章，你将学习如何分析和消除碎片化。


  ### 不可重用的执行计划


  为了以高效的方式执行查询，SQL Server 的查询优化器会花费相当多的 CPU 周期来创建一个具有成本效益的执行计划。好消息是该计划会被缓存在内存中，因此一旦创建，你就可以重用它。


  然而，如果设计的计划无法插入参数值，那么 SQL Server 每次使用不同值重新提交相同的查询时，都会创建一个新的执行计划。因此，为了获得更好的性能，以有助于
  SQL Server 缓存和重用执行计划的形式提交 SQL 查询极其重要。我还将讨论诸如计划冻结、强制查询计划以及使用 `即席工作负载优化` 等主题。你将在第
  15 章详细了解如何提高执行计划的可重用性。


  ## 频繁的查询重编译


  确保执行计划可重用（独立于查询中使用的值）的标准方法之一是使用存储过程或参数化查询。使用存储过程来执行一组 SQL 查询允许 SQL Server 创建参数化的执行计划。


  `参数化执行计划` 独立于存储过程或参数化查询执行期间提供的参数值，因此具有很高的可重用性。频繁的查询重编译会增加 CPU 压力和查询执行时间。我将在第 15
  章详细讨论存储过程以及语句重编译的各种原因和解决方案。


  ## 游标的不当使用




  相较于常规的基于集合的 SQL 查询，偏好基于游标（逐行）的结果集——正如 Jeff Moden 精妙命名的“RBAR”（Row By Agonizing Row，逐行痛苦处理，发音为“ree-bar”）——会给
  SQL Server 带来大量额外开销。应尽可能使用基于集合的查询。但若不得不使用游标，则务必选用高效的游标类型，例如仅快速转发型。过度使用低效游标会加大 SQL
  Server 资源压力，导致系统性能下降。如果你必须使用游标，第 22 章将讨论如何正确操作游标。


  ## 数据库事务日志配置不当


  未能遵循通用建议来配置数据库事务日志，会对基于在线事务处理（OLTP）的 SQL Server 数据库性能产生负面影响。为了实现最佳性能，SQL Server
  高度依赖于高效访问数据库日志。第 3 章涵盖了如何正确配置数据库事务日志的某些方面。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 1 章 ■ SQL 查询性能调优


  ## tempdb 使用过度或配置不当


  任何 SQL Server 实例只有一个 `tempdb`。由于临时存储（例如涉及用户对象的操作，如临时表和表变量）、系统对象（如游标或用于联接的哈希表）以及包括排序和行版本控制在内的操作都使用
  `tempdb` 数据库，因此 `tempdb` 很容易成为性能瓶颈。


  所有这些选项以及其他因素都会导致 `tempdb` 内出现空间、I/O 和争用问题。第 3 章将介绍一些有助于解决此问题的配置选项，其他章节则会根据所处理问题的性质介绍其他相关选项。


  ## 小结


  在这个介绍性章节中，你已经了解到 SQL Server 性能调优是一个迭代过程，包括识别性能瓶颈、排查其原因、应用不同的解决方案、量化性能改进，然后重复这些步骤，直到达到所需的性能水平。


  为了辅助这个过程，你应该创建一个系统基线，以便与你的修改进行比较。在整个性能调优过程中，你需要客观看待你想要执行的调优工作量——你总是可以让查询运行得再快一点，但付出的努力是否值得其成本？最后，由于性能取决于用户活动模式和数据，因此你必须定期重新评估数据库服务器的性能。


  为了从 SQL Server 数据库系统中获得最佳性能，理解数据库应用程序对服务器造成的压力至关重要。在接下来的两章中，我将讨论如何分析这些压力，既从较高的系统层面，也从较低的
  SQL Server 活动层面。然后，我会展示如何将两者结合起来。


  在本书的其余部分，你将深入探讨本章前面提到的最大的 SQL Server 性能杀手。你将了解到，如果使用不当，这些单独因素会如何影响性能，以及如何解决或避免这些陷阱。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 2 章


  ## 内存性能分析


  系统主要在三个地方直接影响 SQL Server 及其上运行的查询：内存、磁盘和 CPU。在本章中，我们将首先探讨内存。在 SQL Server 中检索数据的查询必须先将该数据加载到内存中。任何对数据的修改首先被加载到内存中，在此进行修改，然后才写入磁盘。许多其他操作也利用系统内存的速度优势，从由于查询中的
  `ORDER BY` 子句而对数据进行排序，到执行计算以创建用于联接两个表的哈希表。由于所有这些工作都是在系统内存中完成的，因此理解内存的管理方式非常重要。


  在本章中，我将涵盖以下主题：


  *   `Performance Monitor`（性能监视器）工具的基础知识

  *   用于观察系统行为的一些动态管理对象

  *   硬件资源如何以及为何会成为瓶颈

  *   观察和测量 SQL Server 及 Windows 内存使用情况的方法

  *   内存瓶颈的可能解决方案


  ### 性能监视器工具


  Windows Server 2012 R2 提供了一个名为 `Performance Monitor` 的工具，它收集有关操作系统资源利用率的详细信息。它允许你追踪系统性能的几乎所有方面，包括内存、磁盘、处理器和网络。此外，SQL
  Server 2014 为 `Performance Monitor` 工具提供了扩展，用于追踪 SQL Server 内的各种功能领域。


  `Performance Monitor` 通过捕获系统硬件和软件组件（如处理器、进程、线程等）生成的性能数据来追踪资源行为。系统组件生成的性能数据由一个性能对象表示。该性能对象提供计数器，这些计数器代表组件的特定方面，例如
  `Processor` 对象的 `% Processor Time`。请记住，在虚拟机（VM）中运行这些计数器时，许多情况下（取决于计数器类型）为计数器测量的性能是针对
  VM 的，而非物理服务器。这意味着在 VM 上收集的一些值不能准确地反映物理现实。


  系统组件可以有多个实例。例如，在有两个处理器的计算机中，`Processor` 对象将有两个实例，表示为实例 0 和 1。具有多个实例的性能对象也可能有一个名为
  `Total` 的实例，以表示所有实例的总值。例如，对于一台有两个处理器的计算机，可以使用以下性能对象、计数器和实例来确定其总的处理器使用率（如图 2-1 所示）：


  *   *性能对象*：`Processor`

  *   *计数器*：`% Processor Time`

  *   *实例*：`_Total`


  **图 2-1.** 添加性能监视器计数器


  系统行为可以实时以图表形式跟踪，也可以捕获为文件（称为*数据收集器集*）以便离线分析。在生产服务器上，首选机制是使用文件。你需要将信息收集到文件中，以便存储并在需要时随时间传输。此外，将收集的数据写入文件比在活动内存中于屏幕上收集占用的资源更少。


  要运行 `Performance Monitor` 工具，请在命令提示符下执行 `perfmon`，这将打开 `Performance Monitor` 套件。你也可以右键单击桌面或开始菜单上的“计算机”图标，展开“诊断工具”，然后展开
  `Performance Monitor`。你还可以转到“开始”屏幕并开始键入 `Performance Monitor`；你会看到启动该应用程序的图标。这些方法中的任何一种都可以让你打开
  `Performance Monitor` 实用程序。


  你将在第 5 章学习如何设置各个计数器。既然我已经介绍了 `Performance Monitor` 的概念，我将介绍另一个指标收集接口——动态管理对象。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


