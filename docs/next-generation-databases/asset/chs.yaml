  \n#### DynamoDB\n\n数据库名称：DynamoDB\n\n许可证/公司：亚马逊\n\n维基百科描述：\n\nAmazon DynamoDB 是亚马逊公司作为亚马逊网络服务组合一部分提供的完全托管的专有\
  \ NoSQL 数据库服务。\n\n供应商描述：\n\nAmazon DynamoDB 是一个快速且灵活的 NoSQL 数据库服务，适用于所有需要在任何规模下保持一致、个位数毫秒延迟的应用程序。它是一个完全托管的云数据库，支持文档和键值存储模型。\n\
  \n我的看法：\n\n亚马逊发明了 Dynamo 模型并提供占主导地位的公共云平台，因此基于 Dynamo 模型提供云数据库是自然而然的事情。DynamoDB\
  \ 提供高性能、几乎无限的扩展性和非常低的管理开销。然而，对亚马逊的锁定和相对较高的价格可能限制了其当前的市场采用率。\n\n数据模型：\n\n支持列表、映射和\
  \ JSON 文档的键值存储。支持二级索引。\n\n事务模型：\n\n默认为最终一致，但应用程序可以请求一致性读取\n\n集群：\n\n一致性哈希\n\nAPI：\n\
  \n基于 REST 的 API，提供 Java、.NET 和 PHP 的驱动程序\n\n#### HBase\n\n数据库名称：Apache HBase\n\n\
  许可证/公司：Apache 许可证，由 Cloudera、MapR、Hortonworks 等公司提供商业支持\n\n维基百科描述：\n\nHBase 是一个开源、非关系型、分布式数据库，仿照谷歌的\
  \ BigTable 并用 Java 编写。它作为 Apache 软件基金会的 Apache Hadoop 项目的一部分开发，运行在`HDFS`（Hadoop\
  \ 分布式文件系统）之上，为 Hadoop 提供类似 BigTable 的功能。\n\n供应商描述：\n\nHBase 是为 Apache Hadoop 构建的高性能、分布式数据存储。\n\
  \n我的看法：\n\nHBase 通过与 Hadoop 平台的关联实现了早期的市场渗透和技术加速，并已在许多站点的大规模环境中得到验证。与 Hadoop `HDFS`的紧密集成有助于其实现非常高的可用性，并为大数据分析提供了内置的协同效应。\n\
  \n数据模型：\n\nBigTable 宽列族\n\n事务模型：\n\n严格一致的单行事务\n\n集群：\n\n范围键被分区到区域中，主服务器跟踪此分区。在磁盘级别，HBase\
  \ 使用`HDFS`进行分发和复制。\n\nAPI：\n\nREST 和 Thrift 接口，附带 Java 驱动程序\n\n#### MarkLogic\n\n\
  数据库名称：MarkLogic\n\n许可证/公司：专有，MarkLogic 公司\n\n维基百科描述：\n\nMarkLogic 被认为是一种多模型 NoSQL\
  \ 数据库，因为它能够存储、管理和搜索 JSON 和 XML 文档以及图数据（RDF 三元组）。\n\n供应商描述：\n\nMarkLogic 是一个新一代数据库，它采用灵活的数据模型构建，用于存储、管理和搜索当今的数据，同时不牺牲上一代关系数据库的数据弹性和一致性特性。\n\
  \n我的看法：\n\n在我们现在称之为 NoSQL 数据库出现之前，MarkLogic 已经构建了一个功能强大且广泛采用的 XML 数据库。MarkLogic\
  \ 最近增加了对 JSON 的支持，现在定位为一个组织级的 NoSQL 数据库。\n\n数据模型：\n\nXML， RDF， JSON\n\n事务模型：\n\n\
