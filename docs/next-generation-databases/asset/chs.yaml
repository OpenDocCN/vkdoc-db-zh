- "# 5. 表格并非友好之选：图数据库\n\n> 谷歌曾试图衡量人们所思所想，最终自身成为了人们所思所想。Facebook 曾试图绘制社交图谱，最终自身成为了社交图谱。——乔治·戴森，《图灵的大教堂》\n\
  > 无论何时有人给你一个问题，去思考图。——史蒂夫·耶格，《在谷歌找到那份工作》（博客文章）\n\n键值存储、文档数据库和关系型系统的拥护者们几乎在数据库设计的方方面面都存在分歧，但他们在一个观点上达成了一致：数据库是关于存储“事物”的信息，无论这些事物是由\
  \ `JSON`、`表格`还是二进制值来表示。但有时，我们主要关注的是事物之间的关系，而非事物本身。这正是图数据库系统大放异彩之处。\n\n图结构对我们来说最熟悉的例子来自诸如\
  \ Facebook 这样的社交网络。在 Facebook 中，关于个人的信息固然重要，但正是人与人之间的网络——社交图谱——赋予了该平台独特的力量。类似的面向图的数据集也存在于网络拓扑、访问控制系统、医疗模型等领域。\n\
  \n关系型数据库完全有能力通过使用 `外键` 和 `自连接` 来为这类网络建模。不幸的是，当处理非常庞大的图时，`RDBMS` 通常会遇到性能问题，而且 `SQL`\
  \ 缺乏一种能够有效处理图数据的表达性语法。\n\n到目前为止描述的 NoSQL 解决方案在处理图模型方面甚至比关系型数据库更差。在键值存储或文档数据库中，图结构可以存储在单个文档或对象中，但对象之间的关系并不是原生支持的（因为没有连接操作）。\n\
  \n要高效处理一种以对象或实体间复杂关系网络为主要焦点的数据模型，需要一种不同类型的数据库：图数据库。\n\n#### 什么是图？\n\n与关系型数据库类似，但与许多非关系型系统不同，图数据库基于坚实的理论基础。图论是数学中一个历史悠久的分支，在医学、物理学、社会学以及计算机科学中有许多实际应用。\n\
  \n图论定义了图的这些主要组成部分：\n\n*   顶点，或称“节点”，代表不同的对象。\n*   边，或称“关系”或“弧”，连接这些对象。\n*   节点和边都可以拥有属性。\n\
  \n虽然在数学理论中最常用的是顶点和边这两个术语，但在本章中，我们将更多地使用“节点”和“关系”，因为这些术语能让语言更简洁明了。\n\n节点和关系都可以有属性。节点的属性与你可能在关系表或\
  \ `JSON` 文档中找到的属性相似。关系的属性可能包括关系的类型、强度或历史。\n\n图 5-1 展示了一个简单的图，包含四个节点（顶点）和三条关系（边）。\n\
  \n![A978-1-4842-1329-2_5_Fig1_HTML.jpg](img/A978-1-4842-1329-2_5_Fig1_HTML.jpg)\n\
  \n图 5-1. 包含四个顶点（节点）和三条边（关系）的简单图\n\n图论提供了用于从图中定义或移除节点或关系，以及执行操作来查找相邻节点的数学符号。这些基本操作可用于执行图遍历——穿过图来探索网络。举一个熟悉的例子，Facebook\
  \ 有时会执行图遍历来查找你朋友的朋友。在图 5-1 所示的例子中，我们可能会执行图遍历来查找所有曾与基努·里维斯共同主演过电影的演员。\n\n#### 图的\
  \ RDBMS 模式\n\n在关系模型中表示图结构相对容易。例如，我们可以创建如图 5-2 所示的关系结构来表示图 5-1 所示的图。\n\n![A978-1-4842-1329-2_5_Fig2_HTML.jpg](img/A978-1-4842-1329-2_5_Fig2_HTML.jpg)\n\
  \n图 5-2. 表示我们示例图数据的关系模式\n\n虽然关系模型可以轻松地表示图模型中包含的数据，但在实践中我们面临两个显著问题：\n\n`SQL` 缺乏能够轻松执行图遍历的语法，尤其是那些深度未知或无界的遍历。例如，使用\
  \ `SQL` 查找你朋友的朋友还算容易，但要解决“分隔度”问题（通常用与凯文·贝肯相隔多少连接的例子来说明）就很困难了。\n当我们遍历图时，性能会迅速下降。每增加一级遍历，查询响应时间都会显著增加。\n\
  \n例如，考虑找出所有曾与基努·里维斯合作过的演员所需的 `SQL`。它可能如图 5-3 所示。\n\n![A978-1-4842-1329-2_5_Fig3_HTML.jpg](img/A978-1-4842-1329-2_5_Fig3_HTML.jpg)\n\
  \n图 5-3. 执行一级图遍历的 SQL\n\n此 `SQL` 查询 `PEOPLE` 表以找到基努，然后查询 `ACTORS` 和 `MOVIES` 表以找到他主演的电影，接着再次查询\
  \ `ACTORS` 和 `PEOPLE` 表以找到出演过那些电影的其他演员。像这样的五表连接尚可管理，但随着我们遍历得更深，每增加一次搜索深度，我们就必须再添加三个连接。此外，没有语法允许我们搜索到任意深度。因此，例如，如果我们想展开整个图，我们做不到，因为无法预先知道需要检查多少层级。\n\
  \n`RDBMS` 中的性能也是一个潜在问题。假设创建了适当的索引，我们上面的示例查询将以可接受的开销执行。但每次连接都需要为每个演员和电影进行索引查找。每次索引查找都会增加开销，对于深度图遍历来说，性能通常是不可接受的。有时最好的解决方案是将表完整加载到应用程序代码中的映射结构中，并在内存中遍历图。然而，这假设应用程序代码中有足够的内存来缓存所有数据，但情况并非总是如此。\n\
  \n由于键值存储不支持连接，它们提供的图遍历能力甚至比关系数据库更少。在纯粹的键值存储或文档数据库中，图遍历逻辑必须完全在应用程序代码中实现。\n\n#####\
  \ RDF 与 SPARQL\n\n资源描述框架（RDF）是一种网络标准，于 1990 年代后期开发，用于对网络资源及其之间的关系进行建模。它代表了最早用于表示和处理图形数据的标准之一。\n\
  \nRDF 中的信息以三元组的形式表示，概念上形如 `实体：属性：值；` 例如：\n\n`TheMatrix: is :Movie`\n`Kenau: is :Person`\n\
  `Kenau: starred in: TheMatrix`\n\nRDF 旨在作为一种在万维网上为资源（特别是 Web 服务）及其所依赖的依赖关系创建正式数据库的方法。\n\
  \nRDF 图可以以多种格式存储，包括 XML，甚至可以存储在关系数据库的表中。然而，原生 RDF 数据库（称为三元组存储）也已被实现。这些包括 AllegroGraph、Ontotext\
  \ GraphDB、StarDog 和 Oracle Spatial。\n\nRDF 支持一种查询语言 SPARQL（一个递归首字母缩写词：SPARQL 协议和\
  \ RDF 查询语言），这是一种类似于 SQL 的语言，用于查询 RDF 数据。图 5-4 展示了一个 SPARQL 查询，它正在查询 DBpedia（维基百科部分数据的\
  \ RDF 表示）以查找所有以 Edgar Codd 为主题的条目。\n\n![A978-1-4842-1329-2_5_Fig4_HTML.jpg](img/A978-1-4842-1329-2_5_Fig4_HTML.jpg)\n\
  \n图 5-4. 使用 SPARQL 查询 DBpedia\n\n##### 属性图与 Neo4j\n\n虽然 RDF 是一项重要的图技术，但属性图模型通过为节点和关系关联属性，提供了一个更丰富的模型来表示复杂数据。\n\
  \n属性图模型是 Neo4j 的基础，它是最广泛采用的图数据库。Neo4J 是一个基于 Java 的图数据库，可以轻松嵌入任何 Java 应用程序或作为独立服务器运行。Neo4j\
  \ 支持数十亿个节点、符合 ACID 的事务以及多版本一致性。\n\nNeo4j 实现了一种声明式图查询语言 Cypher。Cypher 允许使用类似于 SQL\
  \ 或 SPARQL 的简单语法来查询图，但特别针对图遍历进行了优化。\n\n以下 Cypher 语句将在 Neo4J 内部创建如图 5-1 所示的图形结构：\n\
  \n```cypher\nCREATE `(TheMatrix:Movie {title:'The Matrix', released:1999,`\n   \
  \     `tagline:'Welcome to the Real World'})`\nCREATE `(JohnWick:Movie {title:'John\
  \ Wick', released:2014,`\n        `tagline:'Silliest Keanu movie ever'})`\nCREATE\
  \ `(Keanu:Person {name:'Keanu Reeves', born:1964})`\nCREATE `(AndyW:Person {name:'Andy\
  \ Wachowski', born:1967})`\nCREATE\n  `(Keanu)-[:ACTED_IN {roles:['Neo']}]->(TheMatrix),`\n\
  \  `(Keanu)-[:ACTED_IN {roles:['John Wick']}]->(JohnWick),`\n  `(AndyW)-[:DIRECTED]->(TheMatrix)`\n\
  ```\n\n以下 Cypher 查询检索图中单个节点的信息：\n\n```\nneo4j-sh (?)$ `MATCH` `(kenau:Person {name:\"\
  Keanu Reeves\"})`\n>`              `RETURN` `kenau;`\n`+----------------------------------------+`\n\
  `| kenau                                  |`\n`+----------------------------------------+`\n\
  `| Node[1]{name:\"Keanu Reeves\",born:1964} |`\n`+----------------------------------------+`\n\
  ```\n\n`MATCH`子句大致等同于 SQL 中的`WHERE`子句，而`RETURN`子句则等同于`SELECT`列表。\n\n`MATCH`支持一种用于遍历图中关系的语法。例如，以下查询查找所有曾与基努·里维斯在同一部电影中出演过的演员：\n\
  \n```\nneo4j-sh (?)$ `MATCH` `(kenau:Person {name:\"Keanu Reeves\"})`\n        \
  \      `-[:ACTED_IN]->(movie)<-[:ACTED_IN]-(coStar)`\n              `RETURN` `coStar.name;`\n\
  `+----------------------+`\n`| coStar.name          |`\n`+----------------------+`\n\
  `| \"Jack Nicholson\"     |`\n`| \"Diane Keaton\"       |`\n`| \"Dina Meyer\"  \
  \       |`\n`| \"Ice-T\"              |`\n`| \"Takeshi Kitano\"     |`\n```\n\n\
  在上面的例子中，我们指定了关系类型（`ACTED_IN`）和节点类型（`movie`）。我们也可以指定通配符来匹配所有关系或节点类型，并且可以指定遍历的深度，如下面的查询所示，它匹配从“基努·里维斯”两步遍历范围内的所有节点。此列表将包括他出演的所有电影，以及所有联合主演和导演。\n\
  \n```\nneo4j-sh (?)$ `MATCH` `(kenau:Person {name:\"Keanu Reeves\"})`\n        \
  \      `-[*1..2]-(related)` `RETURN` `distinct related;`\n`+------------------------------------------------------------------------`\n\
  `| related`\n`+------------------------------------------------------------------------`\n\
  `| Node[0]{title:\"The Matrix\",released:1999,`\n          `tagline:\"Welcome to\
  \ the Real World\"}`\n`| Node[7]{name:\"Joel Silver\",born:1952}`\n`| Node[5]{name:\"\
  Andy Wachowski\",born:1967}`\n`| Node[6]{name:\"Lana Wachowski\",born:1965}`\n```\n\
  \n正如 SQL 查询生成结构化为表格的结果集一样，Cypher 返回的结果本身也可以是图。例如，在图 5-5 中，我们生成了一个图，显示了与“基努·里维斯”相关的所有节点，向外延伸两级。\n\
  \n![A978-1-4842-1329-2_5_Fig5_HTML.jpg](img/A978-1-4842-1329-2_5_Fig5_HTML.jpg)\n\
  \n图 5-5. Cypher 查询的图输出\n\n##### Gremlin\n\n虽然易于使用，但 Cypher 直到最近还仅限于 Neo4J。Gremlin\
  \ 是另一种图数据库查询语言，可以与 Neo4J 以及多种其他图引擎一起使用，包括 Titan（现为 Datastax Cassandra 发行版的一部分）和\
  \ OrientDB。\n\n与 Cypher 的非过程化、类似 SQL 的风格相比，Gremlin 是一种更面向过程的语言。使用 Gremlin，程序员声明要执行的具体遍历操作——可能使用多条语句。\n\
  \n图 5-6 展示了 Gremlin 的“示例”数据库。该数据库包含六个顶点（节点），定义了四个人和两个项目。有些人创建了项目，有些人认识其他人。\n\n![A978-1-4842-1329-2_5_Fig6_HTML.jpg](img/A978-1-4842-1329-2_5_Fig6_HTML.jpg)\n\
  \n图 5-6. Gremlin 示例图数据库\n\n在 Gremlin 表示法中，`V`代表顶点/节点，而`E`代表边/关系：\n\n```\ngremlin>\
  \ `myGraph.V.map`\n==>{name=marko, age=29}\n==>{name=vadas, age=27}\n==>{name=lop,\
  \ lang=java}\n==>{name=josh, age=32}\n==>{name=ripple, lang=java}\n==>{name=peter,\
  \ age=35}\ngremlin> `myGraph.E`\n==>e[11][4-created->3]\n==>e[12][6-created->3]\n\
  ==>e[7][1-knows->2]\n==>e[8][1-knows->4]\n==>e[9][1-created->3]\n==>e[10][4-created->5]\n\
  ```\n\n此命令显示 Marko“认识”的人：\n\n```\ngremlin> `marko=myGraph.v(1)`\n==>v[1]\ngremlin>\
  \ `marko.out('knows').name`\n==>vadas\n==>josh\n```\n\n此命令遍历树结构以查找 Marko 认识的人所创建的项目：\n\
  \n```\ngremlin> `marko.out('knows').out('created').name`\n==>lop\n==>ripple\n```\n\
  \n2015 年末，Neo 技术公司宣布了 Cypher 语言的开源版本。Oracle 和 Databricks（Spark 公司）以及其他几家供应商已宣布支持这种\
  \ openCypher 语言。考虑到 Neo4j 的流行以及 Cypher 提供的可能更易上手的语法，Gremlin 作为替代语言的动机很可能会减弱。\n\n\
  \n#### 图数据库内部原理\n\n图处理可以在各种数据库上执行，无论其内部存储格式如何。本章开头概述的图数据库逻辑模型几乎可以在任何数据库系统上实现；实际上，关系型系统可以在不妥协的情况下实现图中的逻辑关系。然而，正如我们之前讨论的，关系型系统上的性能——即使有最优索引——也会随着图遍历深度的增加而下降。要在实践中实现高效的实时图处理，需要一种能够无需索引查找即可遍历图结构的方式。这种无需索引的导航方式被称为\
  \ `无索引邻接`。\n\n例如，要在关系模型（如图 5-2 所示）中实现一个图，需要使用一个连接表来在代表相邻节点的两行之间进行导航——这两行可能位于同一个表中。索引允许将相邻行的逻辑键值转换为数据库内的物理地址。然后可以快速访问此物理地址。在典型的实现中，遍历\
  \ B-Tree 索引需要三到四次逻辑 IO 操作，以及进一步的查找以检索值。这些 IO 操作可能在缓存内存中得到满足，但通常需要一些物理 IO。\n\n正如我们之前讨论的，索引查找通常足以应对浅层遍历，但随着遍历深度增加，它们会导致性能下降。具体实现因数据库类型而异，但需要创建索引来促进图遍历是所有非图数据库的共同特点。\n\
  \n在利用 `无索引邻接` 的原生图数据库中，每个节点都知道所有相邻节点的物理位置。因此，无需使用索引即可高效导航图，因为每个节点都“指向”所有相邻节点。\n\n\
  毫不奇怪，对于图遍历操作，原生图数据库的性能远超其他实现方式。然而，这种架构在将图分布到多个服务器上时带来了挑战。虽然一个节点当然可以指向位于另一台机器上的相邻节点，但跨多台机器路由遍历的开销消除了图数据库模型的优势，因为服务器间通信远比本地访问耗时得多。因此，许多像\
  \ `Neo4j` 这样的纯图数据库目前不支持分布式部署——图数据库只能在单台服务器上运行。\n\n#### 图计算引擎\n\n纯图数据库当然擅长图处理，但对于典型应用中的所有工作负载来说，它们很少是最优选择。相反，许多应用——即使其主要工作负载由非图数据库技术满足——有时也需要能够执行高效的图遍历。\n\
  \n此外，正如我们之前讨论的，纯图模型难以处理大规模分布式数据集，因为跨多台物理机器执行基于图的遍历效率低下。\n\n图计算引擎为那些希望将图处理与其他数据模型合并的数据库，以及需要在大规模分布式数据集上进行图处理的场景提供了解决方案。图计算引擎实现了高效的图处理算法并提供了图\
  \ API，但它并不假设或要求数据必须以我们之前讨论的 `无索引邻接` 图格式存储；底层数据集可以保存在关系数据库、NoSQL 系统或 Hadoop 中。图计算引擎并不总是提供纯图数据库所具备的高效实时图遍历；相反，它们往往擅长处理整个图或图大部分内容的批处理操作。\n\
  \n重要的图计算引擎包括：\n\n*   `Apache Giraph`：一个设计用于在 Hadoop 数据上运行、使用 MapReduce 的图处理系统。\n\
  *   `GraphX`：一个图处理系统，是伯克利数据分析栈的一部分，该栈包括 Spark（见第 7 章）。它使用 Spark 作为图处理的基础，就像 Giraph\
  \ 使用 MapReduce 一样。\n*   `Titan`：一个图数据库，可以构建在大数据存储引擎之上，包括 HBase 和 Cassandra。Cassandra\
  \ 的商业供应商 Datastax 于 2014 年收购了 Titan 的商业赞助商 Aurelius。\n\n###### 总结\n\n图数据库在数据库技术中占据了一个特定且重要的\
  \ niche。与键值存储和文档数据库的倡导者不同，图数据库的支持者并不声称要取代历史悠久的 RDBMS；相反，他们正确地将图数据库描述为一种重要的替代方案，当分析对象之间的关系与对象本身同等重要时。\n\
  \n图数据库的逻辑模型在概念上相当简单。节点（或“顶点”）通过关系（或“边”）相互连接。节点和关系都可能具有属性——`名称:值` 对的集合。\n\n诸如 `SPARQL`、`Cypher`\
  \ 和 `Gremlin` 等语言针对图遍历操作进行了优化，提供了一种语法，使我们能够在不需要关系型数据库所必需的递归连接的情况下遍历图。\n\n像 `Neo4j`\
  \ 这样的纯图数据库以针对实时图处理优化的格式存储数据，但这种格式并不总是适合其他用途。这些数据库以匹配图逻辑关系的物理格式存储数据。\n\n图计算引擎对以其他格式保存的数据执行图处理，通常是在\
  \ Hadoop 中，但也可能以关系格式存储。图计算引擎通常针对对整个图执行批处理进行优化，而原生图数据库则针对实时图处理进行优化。\n\n修改数据的物理组织以适应特定处理工作负载并非图数据库独有。正如我们将在下一章看到的，列式数据库将传统的数据库存储物理组织方式进行了“侧转”，以优化分析工作负载。\n\
  \n## 6. 列数据库\n\n> 我真希望能找到一句关于列数据库的俏皮话 ——盖伊·哈里森，《下一代数据库》\n\n在西方文化中长大的我们，被训练成认为数据是按行排列的。数据在账簿、表格、电子表格中呈现的方式，甚至欧洲语言从左到右、从上到下的组织方式，都使我们习惯于以行格式可视化数据。因此，最早的数字文件将每条记录表示为一行，这并不奇怪。但无论这种格式多么方便和熟悉，它并不总是物理组织数据的最佳方式。\n\
  \n当第一个数字文件被创建时，每条记录的数据以我们称之为“行格式”的方式存储在一起。首批尝试实现关系模型的数据库诞生于一个时期，当时 OLTP 处理——本质上是按记录处理——是最重要的数据库工作负载类型。这类工作负载主要是面向记录的，而早期数字文件的面向行的物理结构提供了良好的性能。\n\
  \n然而，随着我们从 OLTP 处理进入数据仓库和分析工作负载领域，面向行的物理组织变得不那么理想。在数据仓库中，你很少想处理单行的所有列，但你经常想处理所有行中单列的值。面向列的数据库通过在磁盘上物理地将列存储在一起来满足这一要求。\n\
  \n\n\n##### 数据仓库模式\n\n在 Edgar Codd 发表其关于关系数据库模型的开创性论文时，数据库工作负载主要由基于记录的处理所主导：即所谓的\
  \ CRUD 操作（创建、读取、更新、删除）是最为关键的，而报表程序通常遍历整个表，并在后台批处理模式下运行，查询响应时间并非关键问题。然而，在 20 世纪 80\
  \ 年代末和 90 年代，越来越多的关系型数据库被要求支持分析型和决策支持型应用，这些应用通常要求交互式的响应时间。这些系统被称为数据仓库，并且日益与生成原始数据的\
  \ OLTP 系统并行运行。Edgar Codd 创造了缩写词 OLAP（在线分析处理）来区分这些工作负载与 OLTP 系统的工作负载。\n\n将 OLTP 和\
  \ OLAP 工作负载分离对于维护 OLTP 系统的服 务级别响应时间至关重要：突发的 I/O 密集型聚合查询通常会导致 OLTP 系统出现不可接受的响应时间下降。但同样重要的是，OLAP\
  \ 系统要求的模式与 OLTP 系统不同。\n\n开发星型模式是为了创建数据仓库，其中聚合查询可以快速执行，并为商业智能（BI）工具提供可预测的模式。在星型模式中，中央的大型事实表与众多较小的维度表相关联。当维度表实现了一组更复杂的外键关系时，则该模式被称为雪花模式。\n\
  \n图 6-1 展示了一个简化的星型模式示例。\n\n![A978-1-4842-1329-2_6_Fig1_HTML.jpg](img/A978-1-4842-1329-2_6_Fig1_HTML.jpg)\n\
  \n图 6-1. 星型模式\n\n注意：虽然星型模式常见于关系型数据库中，但它们并不代表一个完全规范化的关系数据模型。维度表和事实表通常都包含冗余信息，或者仅部分依赖于主键的信息。在某些方面，星型模式的广泛采用是朝着不再完全遵循\
  \ Codd 关系模型迈出的一步。\n\n几乎所有的数据仓库都采用了星型模式范式的某种变体，几乎所有的关系型数据库都采用了索引和 SQL 优化方案来加速针对星型模式的查询。这些优化使得关系型数据仓库能够作为管理仪表板和流行\
  \ BI 产品的基础。然而，尽管有这些优化，数据仓库中的星型模式处理仍然是极其消耗 CPU 和 I/O 资源的。随着数据量的增长和用户对交互式响应时间需求的持续，对传统数据仓库性能的不满日益增加。\n\
  \n##### 列式替代方案\n\n将数据以列式格式存储可能更好的想法可以追溯到 20 世纪 70 年代，尽管商用列式数据库直到 20 世纪 90 年代中期才出现。\n\
  \n列式概念的核心是列的数据在磁盘上分组存放。图 6-2 比较了一些简单数据的列式存储和行式存储：在列式数据库中，特定列的值位于相同的磁盘块中；而在行式模型中，每一行的所有列都位于一起。\n\
  \n![A978-1-4842-1329-2_6_Fig2_HTML.jpg](img/A978-1-4842-1329-2_6_Fig2_HTML.jpg)\n\
  \n图 6-2. 列式存储与行式存储的比较\n\n列式架构有两个主要优势。首先，在列式架构中，旨在聚合特定列值的查询得到了优化，因为所有要聚合的值都存在于相同的磁盘块中。图\
  \ 6-3 以我们的示例数据库说明了这一现象；从行存储中检索薪资总和必须扫描五个块，而在列存储中只需访问一个块就足够了。\n\n![A978-1-4842-1329-2_6_Fig3_HTML.jpg](img/A978-1-4842-1329-2_6_Fig3_HTML.jpg)\n\
  \n图 6-3. 列式存储中的聚合操作需要更少的 I/O\n\n列式架构所提供的确切 I/O 和 CPU 优化因工作负载、索引和模式设计而异。通常，在列式数据库中，跨多行工作的查询会得到显著加速。\n\
  \n#### 列式压缩\n\n列式架构的第二个关键优势是压缩。压缩算法主要通过消除数据值内的冗余来工作。高度重复的数据——特别是当这些重复是局部集中时——比重复度低的数据能实现更高的压缩比。尽管无论采用行式还是列式存储，整个数据库中的总重复量是相同的，但压缩方案通常尝试在数据的局部子集上工作；如果压缩能在隔离的数据块上进行，其\
  \ CPU 开销会低得多。由于在列式数据库中，列在磁盘上存储在一起，因此实现更高的压缩比所需的计算成本要低得多。\n\n此外，在许多情况下，列式数据库会以排序顺序存储列数据。在这种情况下，只需将每个列值表示为与前一个列值的“增量”，即可实现非常高的压缩比。其结果是以极低的计算开销实现极高的压缩比。\n\
  \n#### 列式写入惩罚\n\n列式架构的关键缺点——也是它对于 OLTP 数据库而言是一个糟糕选择的原因——是其施加在单行操作上的开销。在列式数据库中，检索单行需要从该表的每个列存储中组装该行。读取开销可以通过缓存和多列投影（在磁盘上将多个列存储在一起）来部分减少。然而，当涉及\
  \ DML 操作——尤其是插入时——几乎无法避免必须修改每一行的所有列。\n\n图 6-4 展示了在我们的简单示例数据库上，列存储插入操作的开销。行存储只需执行一次\
  \ I/O 即可插入一个新值，而列存储必须更新与列数一样多的磁盘块。\n\n![A978-1-4842-1329-2_6_Fig4_HTML.jpg](img/A978-1-4842-1329-2_6_Fig4_HTML.jpg)\n\
  \n图 6-4. 列存储的插入开销\n\n在实际的行存储（例如，传统的 RDBMS）中，由于索引开销，插入需要不止一次 I/O；而实际的列存储则实现了缓解方案，以避免单行修改期间的严重开销。然而，基本原则——列存储在单行修改时性能不佳——是成立的。\n\
  \n\n#### Sybase IQ、C-Store 与 Vertica\n\n在 20 世纪 90 年代中期，当时的四大关系型数据库供应商之一 Sybase\
  \ 收购了 Expressway 公司。Expressway 开发了可以说是首个重要的商用列式数据库。Expressway 的技术成为了 Sybase IQ（\"\
  智能查询\"）的基础，后者成为了 Sybase 的旗舰数据仓库平台。然而，尽管 Sybase IQ 在随后的十年中获得了显著增长，并且拥有尖端技术，但它未能主导数据仓库市场。业界对列式技术重要性的认识仍然较低。\n\
  \n2005 年，关系型数据库先驱、Ingres 的发明者 Mike Stonebraker 及其同事发表了一篇论文，概述了一个他们称为 `C-store` 的形式化数据库系统。¹\
  \ `C-store` 与现有的列式系统有许多共同特征，同时也包含一些提高写入性能的重要创新。Stonebraker 的论文包含了 `TPC-H` 基准测试结果，证明了\
  \ `C-Store` 架构在处理数据仓库工作负载时，性能优于现有的基于行的 `DBMS`。\n\nStonebraker 成立了 Vertica 公司——旨在构建\
  \ `C-Store` 的商业实现。Vertica 于 2011 年被 HP 收购。\n\n时机就是一切。尽管 Sybase IQ 早在近十年前就成功推出了商用列式数据库，但\
  \ `C-Store` 和 Vertica 的出现，恰逢\"万能通用\"的关系型架构大厦开始出现裂痕之时。`C-Store` 和 Vertica 成为了一波新浪潮系统的代表——这些系统虽然不排斥关系模型或\
  \ `SQL`，但与传统的 `RDBMS` 架构有显著区别。Vertica 成为了\"NewSQL\"数据库的典范。\n\n在 `C-Store` 模型发布之后，其他几个重要的基于列的系统也进入了市场，包括\
  \ InfoBright、VectorWise 和 MonetDB。列式技术也成为许多重要商用关系型数据库中的关键组成部分，包括 Oracle Exadata、Microsoft\
  \ SQL Server 和 SAP HANA。（我们将在本章后面探讨 Oracle 的实现，并在下一章探讨 HANA。）\n\n## 列数据库架构\n\n正如我们之前指出的，单行的插入和更新开销是列式架构的一个关键弱点。许多数据仓库是通过每日批处理作业批量加载的——典型的夜间\
  \ `ETL` 场景。然而，为数据仓库提供实时的\"最新\"信息变得越来越重要，这意味着数据仓库应该能够接受持续不断的增量更改流。上面概述的简单列式架构将无法应对这种持续不断的行级修改流。\n\
  \n为了解决这个问题，列式数据库通常会实现某种形式的写优化增量存储（我们简称其为 `delta store`）。数据库的这个区域针对频繁写入进行了优化。你可以简单地将\
  \ `delta store` 中的数据视为行格式，尽管实际上其内部格式可能仍是列式或行/列混合的。无论数据的内部格式如何，`delta store` 通常是内存驻留的，数据通常是未压缩的，并且该存储可以接受高频数据修改。\n\
  \n`delta store` 中的数据会定期与主列式存储合并。在 Vertica 中，此过程称为 `Tuple Mover`，在 Sybase IQ 中称为\
  \ `RLV (Row Level Versioned) Store Merge`。合并会定期进行，或者当 `delta store` 中的数据量超过阈值时进行。在合并之前，查询可能需要同时访问\
  \ `delta store` 和列存储才能返回完整准确的结果。\n\n`图 6-5` 展示了一个通用的列式数据库架构。数据库包含一个主要的列存储，其中存放着高度压缩的列式数据，由磁盘存储支持。一个较小的写优化\
  \ `delta store` 包含几乎未压缩、内存驻留且可能是行式的数据。\n\n![A978-1-4842-1329-2_6_Fig5_HTML.jpg](img/A978-1-4842-1329-2_6_Fig5_HTML.jpg)\n\
  \n`图 6-5`. 列存储数据库中的写优化\n\n大规模的批量顺序加载——例如夜间 `ETL` 作业——通常会定向到列存储（1）。增量插入和更新会定向到写优化存储（2）。查询可能需要从两个存储中读取才能获得完整和一致的结果（3）。系统会定期或根据需要，通过一个进程将数据从写优化存储转移到列存储（4）。\n\
  \n##### 投影\n\n在之前对列式数据库的简单描述中，我们展示了每列存储在一起。对于只访问单列的查询，将每列存储在磁盘上的单独区域可能就足够了，但在实际中，复杂的查询需要读取列数据的组合。因此，有时将列的组合一起存储在磁盘上是有意义的。\n\
  \n为了实现这一点，像 Vertica 这样的列式数据库将表物理存储为一系列 `投影`，其中包含了经常一起访问的列组合。\n\n例如，在 `图 6-6` 中，我们看到一个包含三个投影的单一逻辑表。在\
  \ Vertica 中，每个表都有一个默认的 `超级投影`，包含表中的所有列（1）。会创建额外的投影来支持特定查询。在这个例子中，创建了一个投影来支持按客户聚合的销售数据（2），另一个投影用于按地区和产品聚合的销售数据（3）。\n\
  \n![A978-1-4842-1329-2_6_Fig6_HTML.jpg](img/A978-1-4842-1329-2_6_Fig6_HTML.jpg)\n\
  \n`图 6-6`. 具有三个投影的列式数据库表\n\n在 Vertica 中，投影可以按一列或多列排序。这减少了排序和聚合操作的处理时间，同时也提高了压缩效率。Vertica\
  \ 还支持 `预连接投影`，这些投影基于连接条件物化来自多个表的列。`预连接投影` 的功能类似于传统关系系统中为支持特定连接操作而创建的 `物化视图`。\n\n\
  `投影` 可以由数据库管理员手动创建，也可以由查询优化器根据特定 `SQL` 即时创建，或者基于历史工作负载批量创建。创建正确的投影集对于列式存储的性能至关重要——其重要性大致相当于在行存储中正确索引的重要性。\n\
  \nSybase IQ 将其查询优化结构称为\"索引\"；然而，这些索引更类似于 Vertica 的投影，而不是 Oracle 或 SQL Server 中的\
  \ `B-Tree` 索引。实际上，Sybase IQ 的默认索引——在表创建时自动在所有列上创建——被称为 `快速投影索引`。Sybase 还支持基于传统 `位图`\
  \ 和 `B-Tree` 索引方案的其它索引选项。\n\n\n##### 其他数据库中的列式技术\n\n列式范式的变体已在传统关系型系统和其他“NewSQL”系统中实现。例如，内存数据库`SAP\
  \ HANA`提供了在表级别支持列或行定向的功能。`Oracle 12c`的“内存数据库”也实现了列存储。我们将在第 7 章中简要介绍这些架构。\n\nOracle\
  \ 的增强型混合列压缩（`EHCC`）是一种有趣的尝试，旨在结合行存储和列存储技术的优点。`EHCC`（目前仅在 Oracle 的`Exadata`系统中可用）中，数据行被包含在约`1\
  \ MB`的压缩单元内，而列则存储在更小的`8K`块中。因为列在块内一起存储，可以实现高压缩率。因为行被保证在`1 MB`的压缩单元内，执行行级修改的开销得以降低。图\
  \ 6-7 阐释了这个概念。行包含在`1MB`的压缩单元内，但每个`8K`块包含经过高度压缩的特定列的数据。\n\n![A978-1-4842-1329-2_6_Fig7_HTML.jpg](img/A978-1-4842-1329-2_6_Fig7_HTML.jpg)\n\
  \n图 6-7. Oracle 的混合列压缩方案\n\n列式存储在现代非关系型系统中也很常见。`Apache Parquet`是`Hadoop`文件的列式存储机制，允许`Hadoop`系统利用列式的性能优势和压缩能力。`Apache\
  \ Kudu`同时使用行和列存储格式，旨在弥合`HDFS`基于行的处理与`Hadoop`文件扫描之间公认的性能差距。\n\n#### 结论\n\n人们很容易认为列式架构只是对存储的物理调整，对数据库系统的整体设计影响甚微。然而，列式存储范式对现有关系系统（它们渴望承担数据仓库角色）和如`Vertica`这类“新\
  \ SQL”系统的演进都产生了巨大影响。\n\n理解列式架构对于审视新一代内存数据库也很重要；正如我们将在下一章看到的，其中许多数据库内部采用了列式架构，以优化和压缩驻留内存的数据，用于分析目的。\n\
  \n#### 注释\n\n`C-Store: A Column-oriented DBMS`，第 31 届 VLDB 会议论文集，挪威特隆赫姆，2005 年；[`http://db.lcs.mit.edu/projects/cstore/vldb.pdf`](http://db.lcs.mit.edu/projects/cstore/vldb.pdf)\n\
  \n"
- '# 7. 磁盘的终结？SSD 与内存数据库


  > 640K 的内存对任何人来说都足够了。——据称（无依据）出自比尔·盖茨，1981 年

  >

  > 我说过一些蠢话和错话，但不是那句。——比尔·盖茨，2001 年


  自第一个数据库系统诞生以来，数据库专业人员一直致力于不惜一切代价避免磁盘`IO`。对磁盘设备的`IO`速度一直比内存或`CPU`访问慢许多数量级，而且随着摩尔定律加速了`CPU`和内存的性能，而机械磁盘性能却停滞不前，这种情况只会变得更糟。


  经济实惠的固态硬盘（`SSD`）技术的出现，使数据库磁盘性能实现了量子飞跃。在过去的几年里，`SSD`技术已从昂贵的奢侈品转变为主流技术，在几乎每一个性能关键的数据库系统中都占有一席之地。然而，`SSD`具有一些独特的性能特性，因此一些数据库系统被开发出来以利用这些能力。


  虽然`SSD`允许加速`IO`，但服务器内存容量的增加和成本的降低有时使我们能够完全避免`IO`。许多较小的数据库现在可以完全装入单台服务器的内存容量，当然也可以装入集群的内存容量。对于这些数据库，内存解决方案可能比`SSD`架构更具吸引力。


  #### 磁盘的终结？


  自 20 世纪 50 年代以来，磁盘设备在数字计算中一直无处不在。其基本架构在此期间变化甚微：一个或多个盘片包含代表信息位的磁荷。这些磁荷由一个驱动臂读写，该臂移动到盘片半径上的特定位置，然后等待盘片旋转到适当的位置。这些机械操作本质上很慢，并且无法从摩尔定律描述的指数级改进中受益。这是简单的物理学——如果磁盘转速随着`CPU`处理能力的提高而增加，那么现在磁盘外缘的速度将达到光速的大约
  10 倍！


  图 7-1 说明，虽然这些设备的尺寸和密度多年来有所提升，但其架构基本未变。虽然摩尔定律驱动了`CPU`、内存和磁盘密度的指数级增长，但它并不适用于磁盘性能的机械方面。因此，磁盘已成为数据库性能日益增长的拖累。


  ![A978-1-4842-1329-2_7_Fig1_HTML.jpg](img/A978-1-4842-1329-2_7_Fig1_HTML.jpg)


  图 7-1. 历年来的磁盘设备


  ##### 固态硬盘


  与磁盘不同，固态硬盘没有活动部件，`IO`延迟大幅降低。商用`SSD`目前使用`DDR RAM`（本质上是带电池备份的`RAM`设备）或`NAND 闪存`实现。`NAND
  闪存`是一种固有的非易失性存储介质，几乎完全主导了当今的`SSD`市场。


  闪存`SSD`的性能比磁盘设备高出几个数量级，尤其是在读取操作方面。高端固态硬盘的随机读取可能只需`25`微秒，而磁盘读取可能需要高达`4,000`微秒（`4`毫秒或`4/1000`秒）——慢了`150`多倍。


  虽然`SSD`肯定比磁盘快，但对于所有工作负载来说，速度提升并不成比例。特别是，在`SSD`中修改信息的成本（花费时间）比从中读取信息要高。


  `SSD`在存储单元中存储信息位。单层单元（`SLC`）`SSD`每个单元存储一位信息，而多层单元（`MLC`）`SSD`在每个单元中存储多于一位——通常只有两位，但有时是三位。单元被排列成约`4K`的页，页被排列成块，通常每个块包含`256`个页。


  读取操作和初始写入操作只需要单页`IO`。然而，更改页的内容需要对整个块进行擦除和覆盖。即使是初始写入也可能明显慢于读取，但块擦除操作尤其慢——大约两毫秒。图
  7-2 显示了页寻道、页写入和块擦除的大致时间。


  ![A978-1-4842-1329-2_7_Fig2_HTML.jpg](img/A978-1-4842-1329-2_7_Fig2_HTML.jpg)


  图 7-2. 闪存 SSD 的性能特征


  商用`SSD`制造商花费巨大努力来避免擦除操作带来的性能损失，以及单元被修改时`SSD`产生的“磨损”所引发的可靠性问题。他们采用复杂的算法来确保最小化擦除操作，并使写入均匀分布在设备上。然而，这些算法会产生写入放大效应，即每次写入操作都伴随着`SSD`上的多次物理`IO`，因为数据被移动，存储空间被回收。


  注释


  无论`SSD`供应商实施了多么复杂的算法和优化，基本点仍然是：闪存`SSD`在执行写入时的速度明显慢于执行读取时的速度。



  ##### 磁盘经济学


  固态硬盘的前景让一些人预期所有磁盘终将被 SSD 取代。虽然这一天可能到来，但在短期内，存储的经济性与 I/O 的经济性却存在矛盾：磁盘技术提供了每单位存储更经济的介质，而闪存技术则提供了交付高
  I/O 速率和低延迟更经济的介质。尽管固态硬盘的成本正在迅速下降，磁盘的成本也是如此。图 7-3 展示了 SSD 和 HDD 每 GB 成本趋势的考察。


  ![A978-1-4842-1329-2_7_Fig3_HTML.jpg](img/A978-1-4842-1329-2_7_Fig3_HTML.jpg)


  图 7-3. SSD 与 HDD 存储成本趋势（注意对数刻度）


  虽然对于小型数据库或性能关键型系统而言，SSD 正日益成为一种经济的解决方案，但它不太可能成为海量数据库的通用解决方案，尤其是对于那些访问不频繁的数据。因此，我们很可能会看到固态硬盘、传统硬盘和内存的组合，为下一代数据库提供基础。


  ### 支持 SSD 的数据库


  一些下一代数据库系统专门设计了架构，以利用 SSD 的物理特性。


  许多传统的关系型数据库在 SSD 上表现相对较差，因为关键的 I/O 操作被隔离为顺序写操作，而硬盘驱动器在此类操作上表现良好，但这却代表着 SSD 最糟糕的工作负载。当一个符合`ACID`的关系型数据库中的事务提交时，事务记录通常会立即写入一个顺序事务日志（在某些数据库中称为重做日志）。即使将此事务日志移到
  SSD 上，其 I/O 性能也可能不会提升，因为 SSD 的写入性能较低，并且存在我们之前讨论过的写入放大效应。在这种情况下，用户可能会对将写密集型`RDBMS`迁移到
  SSD 后实现的性能提升感到失望。


  许多非关系型系统（例如`Cassandra`）使用日志结构化存储引擎——通常基于日志结构合并树（`LSM`）架构——详情参见第 10 章。这些系统倾向于避免更新现有块，而是执行更大的批量写入操作，这对固态硬盘的性能特性更为友好。


  `Aerospike`是一个 NoSQL 数据库，它试图提供一种能够充分利用闪存 SSD I/O 特性的数据库架构。`Aerospike`实现了一个日志结构化文件系统，其中更新是通过将新值追加到文件并将原始数据标记为无效来物理实现的。旧值的存储空间由后台进程在稍后时间回收。


  `Aerospike`在内存使用上也采用了一种不寻常的方法。它并非使用主内存作为缓存来避免物理磁盘 I/O，而是使用主内存来存储数据的索引，同时始终将数据保留在闪存上。这种方法代表了这样一种认识：在基于闪存的系统中，传统数据库“不惜一切代价避免
  I/O”的做法可能是不必要的。


  #### 内存数据库


  固态硬盘可能对数据库性能产生了变革性影响，但对大多数数据库架构而言，它只带来了渐进式的改变。一个更具范式转变趋势的，是将完整数据库存储在主内存中日益增长的实用性。


  自计算机发展初期以来，内存的成本以及单台服务器上可安装的内存容量都呈指数级增长。图 7-4 说明了这些趋势：几十年来，单位存储的内存成本以及单个内存芯片上可容纳的存储容量一直在增长（注意对数刻度——相对笔直的线条表明了指数级趋势）。


  ![A978-1-4842-1329-2_7_Fig4_HTML.jpg](img/A978-1-4842-1329-2_7_Fig4_HTML.jpg)


  图 7-4. 过去 40 年内存成本和容量趋势（注意对数刻度）


  平均数据库的规模——特别是在大数据现象的背景下——也呈指数级增长。对于许多系统，数据库的增长速度持续超过内存的增长速度。但现在，许多规模更适中的数据库可以轻松地存储在单台服务器的内存中。而比这多得多的数据库可以驻留在集群的内存容量范围内。


  传统的关系型数据库使用内存来缓存存储在磁盘上的数据，随着内存量的增加，它们通常会表现出显著的性能提升。但有一些数据库操作必须写入持久化介质。在传统的数据库架构中，`COMMIT`操作需要将数据写入持久化介质上的事务日志，并且数据库会定期将内存中的“检查点”块写入磁盘。要充分利用大内存系统，需要一种能够意识到数据库完全驻留在内存中的架构，并且能够在不丢失数据（即使在断电情况下）的前提下，利用高速访问的优势。


  内存系统应解决传统数据库架构的两个变化：


  *   无缓存架构：传统的基于磁盘的数据库几乎无一例外地在主内存中缓存数据，以最小化磁盘 I/O。在内存系统中，这是徒劳且适得其反的：缓存已经存储在内存中的数据毫无意义！

  *   替代持久化模型：内存中的数据在断电时会消失，因此数据库必须应用某种替代机制来确保数据不会丢失。


  内存数据库通常使用一些组合技术来确保不丢失数据。这些包括：


  *   将数据复制到集群中的其他成员。

  *   将完整的数据库映像（称为快照或检查点）写入磁盘文件。

  *   将事务/操作记录写入仅追加的磁盘文件（称为事务日志或日志）。



  #### TimesTen


  TimesTen 是一款相对较早的内存数据库系统，其目标是支持类似于传统关系型系统的负载，但性能更优。TimesTen 成立于 1995 年，于 2005 年被
  Oracle 收购。Oracle 将其作为独立的内存数据库或作为补充传统基于磁盘的`Oracle RDBMS`的缓存数据库提供。


  ###### 核心特点

  TimesTen 实现了一个相当熟悉的基于 SQL 的关系模型。在被 Oracle 收购后，它实现了`ANSI 标准 SQL`，但近年来的工作重点是使该数据库与
  Oracle 核心数据库兼容——甚至支持 Oracle 的存储过程语言`PL/SQL`。


  ###### 持久化与事务

  在 TimesTen 数据库中，所有数据都驻留在内存中。持久化是通过将内存的周期性快照写入磁盘，以及在事务提交后写入基于磁盘的事务日志来实现的。


  在默认配置下，所有磁盘写入都是异步的：数据库操作通常不需要等待磁盘 IO 操作。但是，如果在事务提交和事务日志写入之间发生电源故障，则数据可能会丢失。这种行为不符合`ACID`，因为事务的持久性（`ACID`中的"D"）无法得到保证。但是，用户可以选择在提交操作期间配置对事务日志的同步写入。在这种情况下，数据库变得符合`ACID`，但某些数据库操作将需要等待磁盘
  IO。


  ###### 架构图示

  图 7-5 展示了 TimesTen 的架构。当数据库启动时，所有数据从检查点文件加载到主内存中（1）。应用程序通过 SQL 请求与 TimesTen 交互，这些请求保证在主内存中找到所有相关数据（2）。按需或定期将数据库数据写入检查点文件（3）。应用程序提交会触发写入事务日志（4），不过默认情况下此写入是异步的，因此应用程序不需要等待磁盘。事务日志可用于在发生故障时恢复数据库（5）。


  ![A978-1-4842-1329-2_7_Fig5_HTML.jpg](img/A978-1-4842-1329-2_7_Fig5_HTML.jpg)


  图 7-5. TimesTen 架构


  ###### 当前意义

  TimesTen 在当今的重要性主要体现在它是 Oracle 企业解决方案架构的一部分。然而，它确实代表了一个早期的基于内存的事务型关系数据库架构的良好示例。


  #### Redis


  ###### 起源与发展

  TimesTen 是构建一个兼容`RDBMS`的内存数据库的尝试，而 Redis 则处于另一个极端：本质上是一个内存键值存储。`Redis`（远程字典服务器）最初被设想为一个简单的内存系统，能够在处理能力有限的系统（例如虚拟机镜像）上维持非常高的事务速率。


  Redis 由 Salvatore Sanfilippo 于 2009 年创建。VMware 在 2010 年雇佣了 Sanfilippo 并赞助 Redis
  的开发。2013 年，Pivotal 软件——从 VMware 母公司 EMC 分拆出来的大数据公司——成为了主要赞助商。


  ###### 架构与特性

  Redis 遵循熟悉的键值存储架构，其中键指向对象。在 Redis 中，对象主要包括字符串和各种类型的字符串集合（列表、有序列表、哈希映射等）。仅支持主键查找；Redis
  没有二级索引机制。


  尽管 Redis 设计为将所有数据保存在内存中，但通过使用其虚拟内存功能，Redis 可以在数据集大于可用内存的情况下运行。启用此功能后，Redis 会将较旧的键值“换出”到磁盘文件。如果需要这些键，它们将被换回内存。此选项显然会带来显著的性能开销，因为某些键查找将导致磁盘
  IO。


  ###### 持久化机制

  Redis 使用磁盘文件进行持久化：

  *   `快照`文件在某个时间点存储整个 Redis 系统的副本。可以按需创建快照，也可以配置为在达到计划间隔或写入阈值后发生。服务器关闭时也会进行一次快照。

  *   `仅追加文件 (AOF)`保留更改的日志，可用于在发生故障时从快照“向前滚动”数据库。配置选项允许用户配置在每次操作后、每秒间隔或基于操作系统决定的刷新间隔写入`AOF`。


  ###### 复制功能

  此外，Redis 支持异步主/从复制。如果性能至关重要且可接受少量数据丢失，则可以使用副本作为备份数据库，并为主库配置最少的基于磁盘的持久化。但是，无法限制可能的数据丢失量；在高负载期间，从库可能会显著落后于主库。


  ###### 架构图示

  图 7-6 展示了这些架构组件。应用程序通过主键查找与 Redis 交互，返回“值”——字符串、字符串集合、字符串哈希等（1）。键值几乎总是在内存中，尽管可以配置
  Redis 使用虚拟内存系统，在这种情况下键值可能需要被换入或换出（2）。Redis 可能会定期将整个内存空间的副本转储到磁盘（3）。此外，Redis 可以配置为将更改写入仅追加日志文件，无论是短时间间隔还是每次操作后（4）。最后，Redis
  可以将主数据库的状态异步复制到从 Redis 服务器（5）。


  ![A978-1-4842-1329-2_7_Fig6_HTML.jpg](img/A978-1-4842-1329-2_7_Fig6_HTML.jpg)


  图 7-6. Redis 架构


  ###### 性能考量

  尽管 Redis 从头开始设计为内存数据库系统，但在以下情况下，应用程序可能需要等待 IO 完成：

  *   如果`仅追加文件`被配置为在每次操作后写入，那么应用程序需要在修改返回控制之前等待 IO 完成。

  *   如果配置了 Redis 虚拟内存，那么应用程序可能需要等待一个键被“换入”内存。


  ###### 总结

  Redis 作为一种简单、高性能的键值存储，在开发人员中很受欢迎，它在无需昂贵硬件的情况下表现良好。它缺乏像`MongoDB`这样一些其他非关系型系统的复杂性，但在数据适合主内存的系统上，或作为基于磁盘的数据库前面的缓存层，它工作得很好。




  #### SAP HANA


  SAP 于 2010 年推出 `HANA`，将其定位为一款革命性的内存数据库，主要面向商业智能 (`BI`)，但也能支持 `OLTP` 工作负载。


  `SAP HANA` 是一款关系型数据库，旨在通过将内存技术与列式存储选项相结合，并在优化的硬件配置上部署，从而提供突破性的性能。虽然 `SAP` 不直接销售
  `HANA` 硬件，但他们为 `HANA` 认证服务器提供了详细指南，其中包括对快速 `SSD` 驱动器的要求。


  `HANA` 中的表可以配置为行式存储或列式存储。通常，用于 `BI` 目的的表会配置为列式存储，而 `OLTP` 表则配置为行式存储。选择行式或列式格式为 `HANA`
  提供了同时支持 `OLTP` 和分析工作负载的能力。


  行存储中的数据保证驻留在内存中，而列存储中的数据默认按需加载。但是，可以将特定的列或整个表配置为在数据库启动时立即加载。


  `HANA` 的持久化架构采用了在 `Redis` 和 `TimesTen` 中常见的快照与日志文件模式。`HANA` 会定期将内存状态快照到 `Savepoint`
  文件中。这些 `Savepoint` 会定期应用到主数据库文件中。


  `ACID` 事务一致性由事务“重做”日志实现。与大多数符合 `ACID` 的关系型数据库一样，该日志在事务提交时写入，这意味着应用程序在提交返回控制权之前，需要等待事务日志
  `IO` 完成。为了最小化可能减慢 `HANA` 以内存速度运行的 `IO` 等待，重做日志被放置在 `SAP` 认证的 `HANA` 设备中的固态硬盘上。


  `HANA` 的列式架构包含一个在第六章讨论的写优化增量存储模式的实现。针对列式表的事务会被缓冲在这个增量存储中。最初，数据以行式格式保存（`L1` 增量）。然后数据会移动到
  `L2` 增量存储，该存储是列式导向的，但压缩相对较轻且未排序。最后，数据会迁移到主列存储中，在那里数据被高度压缩并排序。


  图 7-7 说明了 `HANA` 架构的这些关键方面。启动时，基于行的表和选定的列式表从数据库文件中加载 (1)。其他列式表将按需加载。对行式表的读写可以直接应用
  (2)。对基于列的表的更新将被缓冲在增量存储中 (3)，最初是写入 `L1` 行式存储。`L1` 存储中的数据随后会被提升到 `L2` 存储，最后到达列存储本身
  (4)。对列式表的查询必须同时从增量存储和主列存储中读取数据 (5)。


  内容丰富的图 7-7 也说明了持久化架构。内存映像会定期复制到保存点 (6)，而这些保存点会在适当的时候与数据文件合并 (7)。当提交发生时，一个事务记录会被写入重做日志
  (8)。`HANA` 参考架构规定此重做日志必须位于快速的 `SSD` 上。


  ![A978-1-4842-1329-2_7_Fig7_HTML.jpg](img/A978-1-4842-1329-2_7_Fig7_HTML.jpg)


  图 7-7. `SAP HANA` 架构


  我们再次看到，尽管 `HANA` 被描述为内存数据库，但在某些情况下，应用程序仍需等待来自磁盘设备的 `IO`；具体来说，是在提交时，以及列式表按需加载到内存中时。


  #### VoltDB


  `Redis`、`HANA` 和 `TimesTen` 是正统的内存数据库系统：从设计之初就使用内存作为所有数据的主要——且通常是唯一的——来源。然而，正如我们所看到的，使用这些系统的应用程序仍然经常需要等待磁盘
  `IO`。特别是，在事务提交时，通常会有到某种形式的事务日志或日志的磁盘 `IO`。


  `VoltDB` 是 `H-store` 设计的商业实现。`H-store` 是 Michael Stonebraker 在 2007 年的开创性论文中描述的数据库之一，该论文认为没有单一的数据库架构适用于所有现代工作负载。¹
  `H-store` 描述了一种内存数据库，其设计明确意图是在正常的事务操作期间不需要磁盘 `IO`——它致力于成为一个纯粹的内存解决方案。


  `VoltDB` 支持 `ACID` 事务模型，但它不是通过写入磁盘来保证数据持久性，而是通过跨多台机器的复制来保证持久性。事务提交只有在数据成功写入超过一台物理机器的内存后才完成。涉及的机器数量取决于指定的
  `K-safety` 级别。例如，`K-safety` 级别为 2 保证在任何两台机器故障时数据不丢失；在这种情况下，提交必须在成功传播到三台机器后才能完成。


  也可以配置一个命令日志，将事务命令记录在基于磁盘的日志中。该日志可以是同步的——在每次事务提交时写入——也可以是异步的。因为 `VoltDB` 仅支持基于确定性存储过程的事务，所以日志只需记录驱动事务的实际命令，而不是像其他数据库事务日志那样记录修改块的副本。尽管如此，如果启用了同步命令日志选项，那么
  `VoltDB` 应用程序可能会遇到磁盘 `IO` 等待时间。


  `VoltDB` 支持关系模型，尽管其集群方案在模型能够按照公共键进行层次化分区时效果最佳。在 `VoltDB` 中，表必须要么被分区，要么被复制。分区分布在集群的各个节点上，而复制的表则在每个分区中复制一份。复制的表可能会在
  `OLTP` 操作中产生额外开销，因为事务必须在每个分区中复制；这与分区表形成对比，后者在需要从多个分区整理数据时会产生额外开销。因此，复制的表通常是较小的参考型表，而较大的事务表则被分区。


  `VoltDB` 中的分区不仅分布在物理机器上，也分布在具有多个 `CPU` 核心的机器内部。在 `VoltDB` 中，每个分区专用于一个 `CPU`，该 `CPU`
  拥有对该分区的独占单线程访问权限。这种独占访问减少了锁和闩锁的开销，但它要求事务快速完成以避免请求的串行化。


  图 7-8 说明了分区和复制如何影响 `VoltDB` 中的并发性。每个分区与一个 `CPU` 核心相关联，在任何给定时刻，针对该分区永远只有一个 `SQL`
  语句处于活动状态 (1)。在此示例中，`ORDERS` 和 `CUSTOMERS` 表已使用客户 ID 进行分区，而 `PRODUCTS` 表则完全复制在所有分区中。访问单个客户数据的查询仅需涉及单个分区
  (2)，而跨客户的查询必须在短时间内独占访问所有分区 (3)。


  ![A978-1-4842-1329-2_7_Fig8_HTML.jpg](img/A978-1-4842-1329-2_7_Fig8_HTML.jpg)


  图 7-8. `VoltDB` 分区


  `VoltDB` 事务通过被封装为单个 `Java` 存储过程调用来简化，而不是由一组单独的 `SQL` 语句表示。这确保了事务持续时间最小化（事务内没有思考时间或网络时间），并进一步减少了锁问题。




  ##### Oracle 12c “内存数据库”


  `Oracle RDBMS version 12.1` 引入了“Oracle 数据库内存”特性。这个表述可能具有误导性，因为并非整个数据库都驻留在内存中。实际上，Oracle
  实现了一个`内存列存储`来补充其`基于磁盘的行存储`。


  图 7-9 展示了 Oracle 内存列存储架构的基本要素。`OLTP`应用程序以常规方式与数据库交互。数据存储在磁盘文件中(1)，但也缓存在内存中(2)。`OLTP`应用程序主要从内存进行读写操作(3)，但任何已提交的事务都会立即写入磁盘上的事务日志(4)。当需要或按配置，行数据会被加载成列表示形式供分析应用程序使用(5)。一旦数据被加载到列格式后提交的任何事务都会被记录在日志中(6)，分析查询会查阅该日志以确定是否需要从行存储读取更新的数据(7)，或者可能需要重建列结构。


  ![A978-1-4842-1329-2_7_Fig9_HTML.jpg](img/A978-1-4842-1329-2_7_Fig9_HTML.jpg)


  图 7-9.


  Oracle 12c “内存”架构


  #### Berkeley Analytics Data Stack 与 Spark


  如果`SAP HANA`和`Oracle TimesTen`代表了关系数据库主题上的内存变体，并且如果`Redis`代表了键值存储主题上的内存变体，那么`Spark`就代表了`Hadoop`主题上的一个内存变体。


  `Hadoop`通过提供一个灵活、可扩展且经济的框架来处理海量结构化、非结构化和半结构化数据，成为了当今大数据堆栈的事实基础。`Hadoop 1.0 MapReduce`算法代表了一种相对简单但可扩展的并行处理方法。`MapReduce`并非对所有工作负载都是最优雅或最复杂的方法，但它几乎可以适用于任何问题，并且通常可以通过粗暴地应用许多服务器来扩展。


  然而，人们早就意识到`MapReduce`——尤其是在基于磁盘的存储上工作时——不足以应对新兴的大数据分析挑战。`MapReduce`擅长批处理，但在实时场景中表现不佳。即使是最简单的`MapReduce`任务也需要相当长的启动时间，而对于一些机器学习算法来说，执行时间根本不足够。


  2011 年，加州大学伯克利分校成立了`AMPlab (Algorithms, Machines, and People)`，旨在攻克大数据上高级分析和机器学习带来的新挑战。由此产生的伯克利数据分析堆栈(`BDAS`)——特别是`Spark`处理引擎——显示出快速的普及度。


  `BDAS`由几个核心组件组成：


  *   `Spark`是一个内存式、分布式、容错的处理框架。它用兼容 Java 虚拟机的编程语言`Scala`实现，提供了比`MapReduce`更高级别的抽象，从而提高了开发人员的生产力。作为内存解决方案，`Spark`在那些会导致`MapReduce`磁盘
  IO 瓶颈的任务上表现出色。特别是那些需要对数据集进行重复迭代的任务——许多机器学习工作负载的典型特征——显示出显著的改进。

  *   `Mesos`是一个集群管理层，某种程度上类似于`Hadoop 的 YARN`。然而，`Mesos`专门设计用于允许多个框架，包括`BDAS`和`Hadoop`，共享一个集群。

  *   `Tachyon`是一个容错的、兼容`Hadoop`的、以内存为中心的分布式文件系统。该文件系统允许将大型数据集存储在磁盘上，但提倡积极的缓存以为频繁访问的数据提供内存级的响应时间。


  其他`BDAS`组件构建在此核心之上。`Spark SQL`提供了特定于`Spark`的`SQL`实现用于临时查询，并且还有一个活跃的项目致力于允许`Hadoop`堆栈中的`SQL`实现`Hive`生成`Spark`代码。


  `Spark streaming`基于`Spark`基础提供了面向流的处理范式，而`GraphX`则提供了基于`Spark`构建的图计算引擎。`BDAS`还在`MLBase`组件中以不同抽象级别的机器学习库。


  `Spark`有时被称为`Hadoop`的继任者，但实际上`Spark`和`BDAS`的其他元素被设计为与`Hadoop HDFS`和`YARN`紧密协作，许多`Spark`实现使用`HDFS`进行持久化存储。图
  7-10 展示了`Hadoop`元素（如`YARN`和`HDFS`）如何与`Spark`和`BDAS`的其他元素交互。


  ![A978-1-4842-1329-2_7_Fig10_HTML.jpg](img/A978-1-4842-1329-2_7_Fig10_HTML.jpg)


  图 7-10.


  Spark, Hadoop 和伯克利数据分析堆栈


  `Spark`被纳入许多其他数据管理堆栈；它是三大主要组织`Hadoop`发行版(`Cloudera`, `Hortonworks`, 和`MapR`)的核心部分。`Spark`也是`Datastax`的`Cassandra`发行版的一个组件。


  ##### Spark 架构


  在`Spark`中，数据被表示为`弹性分布式数据集 (RDD)`。`RDDs`是可以分布在集群多个节点上的对象集合。分区和后续的处理分发由`Spark`框架自动处理。


  `RDDs`被描述为不可变的：对`RDDs`的`Spark`操作返回新的`RDDs`，而不是修改原始的`RDD`。因此，例如，对一个`RDD`进行排序会创建一个包含已排序数据的新`RDD`。


  `Spark API`定义了在`RDDs`上执行操作的高级方法。诸如连接、过滤和聚合等操作，在`MapReduce`中可能需要数百行`Java`代码，在`Spark`中则表达为简单的方法调用；其抽象级别类似于`Hadoop
  的 Pig`脚本语言。


  `RDD`内的数据可以是简单类型，如字符串或任何其他`Java/Scala`对象类型。然而，`RDD`通常包含键值对，`Spark`提供了特定的数据操作，如聚合和连接，这些操作仅适用于面向键值的`RDDs`。


  在底层，`Spark RDD`方法通过`有向无环图 (DAG)`操作实现。`有向无环图`为数据操作提供了一种比`MapReduce`更复杂和高效的处理范式。我们将在第
  11 章讨论`有向无环图`操作。


  尽管`Spark`期望在内存中处理数据，但它能够管理那些无法完全放入主内存的数据集合。根据配置，如果数据量超过内存容量，`Spark`可能会将数据分页到磁盘。


  `Spark`不是一个面向`OLTP`的系统，因此不需要我们在其他内存数据库中看到的事务日志或日志。然而，`Spark`可以从本地或分布式文件系统读取或写入，特别是它集成了标准的`Hadoop`方法来处理`HDFS`或外部数据。`RDDs`在磁盘上可以表示为文本文件或`JSON`文档。


  `Spark`也可以访问任何兼容`JDBC`的数据库（实际上，几乎是每个关系系统）中的数据，以及从`HBase`或`Cassandra`中的数据。


  图 7-11 展示了`Spark`处理的一些基本特征。数据可以从外部源（包括关系数据库(1)或分布式文件系统如`HDFS`(2)）加载到`弹性分布式数据集 (RDD)`中。`Spark`提供了对`RDDs`进行操作的高级方法，这些方法输出新的`RDDs`。这些操作包括连接(3)或聚合(4)。`Spark`数据可以以各种格式持久化到磁盘(5)。


  ![A978-1-4842-1329-2_7_Fig11_HTML.jpg](img/A978-1-4842-1329-2_7_Fig11_HTML.jpg)


  图 7-11.


  Spark 处理的基本要素



  #### 结论


  预测磁盘在数据库系统中终结显然为时过早：磁盘在存储海量“冷数据”或“温数据”方面仍然提供最佳经济效益，在大数据时代，存储的经济性依然至关重要。然而，`固态硬盘`对于那些检索速度比长期存储成本更重要的数据集，则提供了更优的经济效益。所有重要的数据库系统都在适应`SSD`的独特物理特性。一些数据库从底层开始构建，以充分利用`SSD`的处理特性。


  随着内存价格下降，单台数据库服务器可容纳的内存容量增加，`内存架构`对于规模较小，或延迟与事务处理速度比大规模存储经济性更重要的数据库，变得愈发具有吸引力。当一个数据库无法装入单台服务器的内存时，`分布式内存系统`可能提供一个极具吸引力的高性能解决方案。


  我们已经看到`内存数据库`设计如何在各类数据库系统中兴起：关系型、键值型以及大数据型。混合设计的数量也在不断增加，例如 Oracle 的方案，试图将`内存`处理的优势与仅传统磁盘设备才能提供的存储经济性相结合。


