  图 4-1. `XQuery`示例


  ##### XML 数据库


  组织内部`XML`文档数量的不断增长，推动了某种形式的`XML`文档管理系统——或原生`XML`数据库的出现。


  `XML`数据库通常由一个平台构成，该平台实现了`XQuery`和`XSLT`等各种`XML`标准，并为`XML`文件的存储、索引、安全和并发访问提供服务。图
  4-2 展示了一个简化的通用`XML`数据库架构。


  ![A978-1-4842-1329-2_4_Fig2_HTML.jpg](img/A978-1-4842-1329-2_4_Fig2_HTML.jpg)

  图 4-2. 通用`XML`数据库架构


  在 21 世纪前半叶，出现了多种`XML`数据库，并得到了健康的采用。然而，它们并非被定位为`RDBMS`的替代品，而是作为一种管理许多组织面临的`XML`文档激增问题的手段。


  两个较为重要的`XML`数据库包括开源的`eXist`和商业的`MarkLogic`。


  ##### 关系型系统中的 XML 支持


  关系型数据库厂商都在其核心产品中引入了`XML`支持，通常允许将`XML`文档存储在数据库表的`long/BLOB`列中，并提供对`DOM`、`XSLT`和`XQuery`等各种`XML`标准的支持。此外，`XML`支持被添加到`ANSI
  SQL`定义（`SQL/XML`）中，允许在标准`SQL`语言语句中进行`XML`操作。对这些`SQL`扩展的支持出现在`Oracle`、`Postgres`、`DB2`、`MySQL`和`SQL
  Server`中。


  #### JSON 文档数据库


  `XML`作为基于文件的文档和数据交换的标准格式具有许多优点。但对于严肃的数据库应用来说，它作为存储格式也有一些缺点。`XML`因浪费空间且处理开销大而受到合理批评。`XML`标签冗长且重复，通常会使所需存储量增加数倍。部分由于这个原因，`XML`语言格式的解析成本相对较高。


  长期以来，`XML`一直是结构化文件的主要格式，但对于数据交换和文档数据库本身而言，一种较新的格式——`JavaScript 对象表示法（JSON）`——承诺了更大的好处，并已取得了远比其`XML`前身更大的普及度。


  基于`JSON`的文档数据库和基于`XML`的文档数据库有许多相似之处，其中最不重要的就是`XML`和`JSON`格式之间的表面相似性。然而，两者的设计是为了支持截然不同的用例和差异显著的应用程序。`XML`数据库通常用作内容管理系统；即，组织和维护`XML`格式的文本文件集合——学术论文、商业文档等。另一方面，`JSON`文档数据库主要支持基于
  Web 的操作型工作负载——存储和修改现代 Web 应用程序核心的动态内容和事务数据。


  **注意**

  `JSON`和`XML`是相似的格式，但`XML`文档数据库和`JSON`文档数据库通常支持不同的应用程序。`XML`文档数据库擅长内容管理系统，`JSON`文档数据库通常旨在支持操作型
  Web 应用程序。


  ##### JSON 与 AJAX


  `JSON`由 JavaScript 先驱 Douglas Crockford 创建，是构建更动态、更具交互性的 Web 应用程序框架的尝试的一部分。`JSON`被明确设计为`XML`的一种更轻量级的替代品，并在`AJAX`编程模型中成为`XML`的重要替代品，该模型在
  21 世纪中期推动了 Web 应用程序的革命。


  `AJAX`（异步 JavaScript 和`XML`）是一种灵活的编程模式，其中 Web 浏览器上的`JavaScript`通过异步交换`XML`或`JSON`文档与后端
  Web 服务器通信，而不是通过交换完整的`HTML`页面。正是`AJAX`使得开创性的 Web 应用程序（如`Google Maps`和`Gmail`）能够提供丰富且交互式的体验。


  尽管`AJAX`中的“`X`”指的是`XML`，但`JSON`文档也可用作与 Web 服务器交互的媒介。实际上，由于其与`JavaScript`的紧密集成，`JSON`在数据交换方面逐渐变得比`XML`更受欢迎。在引入`AJAX`方法后的几年内，所有严肃的
  Web 开发人员都熟悉了`JavaScript`编程和`JSON`模型。


  图 4-3 比较了`JSON`和`XML`文档的外观。


  ![A978-1-4842-1329-2_4_Fig3_HTML.jpg](img/A978-1-4842-1329-2_4_Fig3_HTML.jpg)

  图 4-3. `XML`与`JSON`文件格式比较




  ##### JSON 数据库


  ###### 概述


  以 Amazon Dynamo 为代表的键值存储数据库的兴起，加上 JSON 作为数据交换格式的日益普及，为 JSON 文档数据库的出现奠定了基础。


  并没有一个单一的规范或宣言来阐述基于 JSON 的文档数据库应具备哪些属性。要成为一个 JSON 文档数据库，你只需以 JSON 格式存储数据即可。


  ###### 存储层级


  在 JSON 文档数据库中，存储的层级结构通常如下：


  *   `文档` 是基本存储单元，大致对应于关系数据库管理系统（RDBMS）中的一行。一个文档包含一个或多个键值对，还可以包含嵌套文档和数组。数组中也可以包含文档，从而形成复杂的层次结构。

  *   `集合` 或数据桶是一组具有某些共同用途的文档；这大致相当于关系型数据库中的表。集合中的文档不必是同类型，但通常一个集合中的文档代表某一共同类别的信息。


  ###### 数据建模


  虽然从理论上讲，文档数据库可以像关系型系统中那样精确地实现第三范式模式，但文档数据库更通常采用较少的集合来建模数据，并用嵌套文档来表示主从关系。


  例如，考虑一个电影和演员的数据库。在关系数据模型中，我们会将演员和电影分别表示在不同的表中，并创建一个 `连接` 表来表明哪些演员出演了哪些电影，如图 4-4
  所示。


  ![A978-1-4842-1329-2_4_Fig4_HTML.jpg](img/A978-1-4842-1329-2_4_Fig4_HTML.jpg)


  图 4-4. 简单的关系型电影数据库


  在 JSON 文档数据库中，我们可以创建三个集合，其键值对应于关系模式中的列——但这样做会显得很不自然。文档数据库通常不提供 `连接` 操作，而且程序员通常希望
  JSON 结构能紧密映射到其代码的对象结构。因此，更自然的方式是如图 4-5 所示来表示这些数据。


  ![A978-1-4842-1329-2_4_Fig5_HTML.jpg](img/A978-1-4842-1329-2_4_Fig5_HTML.jpg)


  图 4-5. JSON 电影集合


  #### 文档数据库中的数据模型


  在图 4-5 中，“演员”作为数组嵌套在“电影”文档内。这种模式通常被称为文档嵌入。该设计模式的优点在于允许在一个操作中检索出一部电影及其所有演员，并且避免了在应用程序代码中执行连接操作。


  另一方面，这种方法会导致“演员”信息在多个文档中重复出现，在复杂的设计中，如果任何“演员”属性需要更改，这可能会导致问题，并可能引发不一致。一部电影中的演员数量相对较少，但在其他应用场景中，如果嵌套文档中的成员数量无限增长（因为单个
  JSON 文档的大小通常有上限——例如在 `MongoDB` 中是 `64MB`），也会出现问题。


  由于这些原因，数据库设计者可能会选择使用文档标识符来链接多个文档，这很像关系数据库通过外键关联行的方式。例如，在图 4-6 中，我们在“电影”文档中嵌入了一个演员
  ID 数组，可用于定位出演某部电影的演员。


  ![A978-1-4842-1329-2_4_Fig6_HTML.jpg](img/A978-1-4842-1329-2_4_Fig6_HTML.jpg)


  图 4-6. 在文档数据库中链接文档


  在图 4-7 中，我们看到文档链接的另一个例子。在这个例子中，设计采用了关系风格：一个链接文档将电影与演员关联起来。虽然这对文档数据库来说有些不自然，但对于某些工作负载，它可能在性能和可维护性之间提供最佳平衡。


  ![A978-1-4842-1329-2_4_Fig7_HTML.jpg](img/A978-1-4842-1329-2_4_Fig7_HTML.jpg)


  图 4-7. 文档链接可以类似于关系型第三范式


  文档数据库中的数据建模不如关系数据库那样确定性强：没有类似第三范式的东西来定义一个“正确”的模型。此外，关系数据库的建模主要由待存储数据的性质驱动，而在文档数据库中，要执行的查询的性质则重要得多。


  #### 早期的 JSON 数据库


  由 Damien Katz 创建的 `CouchDB` 是第一个著名的基于 JSON 的数据库系统。Damien Katz 曾参与开发 `Lotus Notes`——一个具有强大文档处理能力的协作系统。2005
  年，他决定创建一个更贴近 Web 开发和面向对象编程模型的数据库系统。其成果就是 `CouchDB`。


  最初，`CouchDB` 是用 `C++` 编写的，存储的是 `XML` 文档。大约在 2007 年，出现了新的架构，将 `JSON` 作为主要存储格式，包含一个
  JavaScript 命令和查询接口，以及一个用 `Erlang` 语言重写的核心引擎。


  随着其发展成熟，`CouchDB` 借鉴了其他曾启发键值存储和 `Hadoop` 的范式，包括 `MapReduce` 的 JavaScript 实现、`最终一致性`
  和多版本模型，以及基于哈希的集群/分片模型，以允许 `CouchDB` 跨节点扩展。


  `CouchDB` 于 2008 年成为 `Apache` 项目，并得到了 `IBM` 的支持。2009 年，成立了商业公司 `couch.io`（后来更名为
  `CouchOne`）来维护和推广该技术。


  #### MemBase 与 CouchBase


  当 2009 年对非关系数据库的兴趣爆发时，`CouchDB` 已经有多年的积极开发，并且似乎能很好地受益于围绕“`NoSQL`”日益增长的热度。


  `Membase` 是这一时期另一个获得显著采用的非关系系统。`Membase` 数据库为极受欢迎的 `Memcached` 框架（我们在第 3 章讨论过）提供了持久化变体。`Memcached`
  是一个分布式只读对象缓存，通常与 `MySQL` 一起部署以减轻数据库负载。对象分布在多个 `Memcached` 节点上，可以通过哈希键查找来定位。如果数据存在于
  `Memcached` 服务器中，就可以避免数据库读取。


  `Membase` 提供了一个兼容 `Memcached` 的解决方案，其中数据也可以被修改并持久化到磁盘。因此，对于那些已经投资于 `Memcached` 技术的用户来说，`Membase`
  特别有吸引力，它提供了将应用程序从 `Memcached`/`MySQL` 转换到 `Membase` 的可能性。`Membase` 最初作为极具人气的 `Zynga`
  在线游戏 `Farmville` 的底层数据库而闻名。


  与此同时，尽管 `CouchDB` 有许多技术成就，但 `CouchDB` 数据库和 `CouchOne` 公司似乎在建立商业生态位方面举步维艰；它缺乏一个可行的横向扩展架构。2011
  年初，宣布了 `Membase` 和 `CouchOne` 的合并。合并后的公司名为 `CouchBase`。`CouchBase` 将现有的 `CouchDB`
  代码捐赠给了 `Apache` 社区，并着手进行一项新的工作，以融合 `CouchDB` 和 `Membase` 的功能。在最终的 `Couchbase` 服务器中，来自
  `CouchDB` 的 JSON 引擎与来自 `Membase` 的兼容 `Memcached` 的键值层被合并在一起。


  `Couchbase` 继承了 `CouchDB` 用于创建查询和视图的 `MapReduce` 接口，但 `Couchbase 4.0` 引入了一个类似 `SQL`
  的文档访问层，称为 `N1QL`（非第一范式查询语言）。有关此内容以及其他类似 `SQL` 的 `NoSQL` 接口的更多详细信息，请参见第 11 章。



  #### MongoDB


  2007 年，刚刚被`Google`收购的在线广告投放公司`Double Click`的创始人和资深工程师们，成立了一家名为`10gen`的新创公司。该公司的目标是创建一个类似于`Google
  App Engine`的`PaaS`（平台即服务）产品。这个平台需要一个可扩展且弹性十足的数据存储引擎；由于没有合适的现成候选方案，团队便自己创建了一个数据库，并将其命名为`MongoDB`。2008
  年，`10gen`转型，专注于`MongoDB`，并于 2009 年以开源许可证发布了该产品，同时提供商业企业版分发。


  `MongoDB`是一个面向`JSON`的文档数据库，尽管其内部使用了一种称为`BSON`的二进制编码变体。`BSON`格式相比`JSON`具有更低的解析开销，并且对日期和二进制数据等数据类型提供更丰富的支持。


  `MongoDB`提供了一个基于`JavaScript`的查询能力，相对容易学习——至少与最初在`CouchDB`中必需的`MapReduce`方法相比是如此。图
  4-8 比较了使用`MongoDB`的`JavaScript`查询来检索由特定演员出演的电影，以及在`MySQL`中等效的`SQL`语句。我们将在第 11 章详细探讨`MongoDB`查询语言。


  ![A978-1-4842-1329-2_4_Fig8_HTML.jpg](img/A978-1-4842-1329-2_4_Fig8_HTML.jpg)


  图 4-8. `MongoDB`的`JavaScript`查询及其`SQL`等效语句


  通过提供开发者友好的生态系统和架构，`MongoDB`在`NoSQL`数据库领域确立了强大的领先地位。寻求非关系型替代方案——通常替代`MySQL`或`Oracle`——的开发者发现，`MongoDB`相对容易上手。由开发者主导的`MongoDB`采用度很高，如今`MongoDB`可以称得上是使用最广泛的非关系型数据库。


  在许多方面，如今`MongoDB`的崛起类似于上个世纪`MySQL`的盛行。在这两种情况下，这些数据库进入组织并非源于某种战略技术计划，而是由于它们在开发者中的流行。正如`MySQL`在
  21 世纪初成为`LAMP`（Linux-Apache-`MySQL`-PHP）技术栈应用的默认数据库一样，`MongoDB`似乎也在现代 Web 开发社区中取得了类似的地位。


  `MongoDB`可能缺乏其他`NoSQL`产品（如`Cassandra`或`HBase`）的某些可扩展性和吞吐量能力，尽管 3.0 版本中`WiredTiger`存储引擎的实现为基础引擎带来了显著的能力提升。尽管如此，它已为许多高端、大规模的网站提供支持，并且看起来在不久的将来将成为领先的`NoSQL`数据库。


  ##### JSON, JSON, 无处不在


  `JSON`在现代文档数据库中的核心作用并不妨碍其在其他系统中的使用。


  正如关系型世界接纳了`XML`并将`XML`特性引入`SQL`标准一样，许多`RDBMS`供应商也提供了对`JSON`的原生支持。例如，`Oracle`和其他关系型供应商已经在`SQL`语言中引入了特性，允许在`SQL`语句中操作存储在数据库表中的`JSON`文档。实际上，正如我们将在第
  12 章看到的，`Oracle`现在为`JSON`提供了完全非`SQL`的访问路径。


  当然，将`JSON`文档存储在键值存储对象中一直是可能的，而且并不少见。然而，像`Riak`这样的纯键值数据库也引入了支持`JSON`的索引方案。此外，最新版本的`Cassandra`数据库允许将`JSON`结构直接映射到`Cassandra`表列。


  `MarkLogic`——本章前面提到的成功的商业`XML`数据库供应商——在 2014 年增加了对原生`JSON`存储的支持。基于其作为`XML`数据库的广泛渗透，`MarkLogic`现在可以声称自己是现代文档数据库市场的领先竞争者，尽管`MarkLogic`能否突破其`XML`内容管理的利基市场，直接与`MongoDB`和`CouchBase`等数据库竞争，赢得
  Web 应用程序开发者的青睐，还有待观察。


  无论如何，我们可以预期在几乎所有数据库系统中都会看到一定程度的`JSON`支持。


  #### 结论


  文档数据库通过采用文档格式——`XML`或`JSON`——作为数据模型，区别于其他关系型和非关系型系统。支持`XML`文档格式的文档数据库主要作为内容管理系统非常重要，为基于`XML`的文本文件提供管理仓库。另一方面，`JSON`文档数据库使用`JSON`文档作为基于
  Web 的应用程序的数据层——这是以前`MySQL`所承担的任务。在某种程度上，基于`XML`的文档数据库代表了上一代数据库系统，而`JSON`数据库则可以说是下一代。


  `JSON`的流行以及关系型数据库和键值存储中对`JSON`日益增长的支持，模糊了最初存在于像`MongoDB`这样的数据库与受`Dynamo`启发的数据库（如`Riak`）之间的界限。在不久的将来，对`JSON`的支持可能成为所有数据库的共同特性，而不是区分特定数据库技术细分市场的特性。


  然而，如今`JSON`文档数据库在下一代数据库系统中代表了一个独特且重要的细分领域。它们提供了超越纯键值存储的有用功能，特别是在程序员生产力和数据可访问性方面。


  `JSON`的简单自描述模型和简单的键值访问路径对于以简单`CRUD`（创建、读取、更新、删除）访问路径为主导的 Web 应用程序非常有效。然而，现代应用程序生成的数据模型不仅日益超越面向文档的键值存储的复杂度，甚至也超出了关系模型舒适的建模能力。我们将在下一章探讨这些图数据库。


