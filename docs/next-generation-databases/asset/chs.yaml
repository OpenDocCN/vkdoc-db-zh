  ### 3. 分片、亚马逊与 NoSQL 的诞生


  > 第一步 - 分片数据库。第二步 - 搞死你自己。——推特用户 @Dmitriy，2009

  > “鲍勃：那么，我怎么查询数据库呢？

  > IT 技术员：这不是数据库。这是个键值存储……你得用 `Erlang` 写一个分布式的 `map-reduce` 函数。

  > 鲍勃：你刚才是不是让我滚蛋？

  > IT 技术员：我相信是的，鲍勃。”——Fault Tolerance 卡通，@jrecursive，2009


  我们上一次看到主要的、新型的关系数据库品牌是在 1995 年左右，即 `MySQL` 的首次发布。在 1995 年，美国的万维网才刚刚两岁——`Netscape`
  浏览器是在前一年才发布的。就计算机系统而言，那是一个不同的时代。


  在 1995 年到 2005 年这 10 年间，互联网从拨号上网的新奇事物转变为我们文明中最重要的通信系统之一，成为国际商业的基础，并很快成为我们社交生活的核心。尽管如此，2005
  年使用的数据库系统与 1995 年使用的名称相同。回顾 2005 年的软件格局，您可能会认为数据库领域并无新事，这情有可原。


  然而，在幕后，关系数据库支撑 Web 应用程序需求的能力已经被拉伸到了断裂点。在这种压力之下，诞生了一种新型的 Web 规模事务数据库系统——即我们现在所称的
  `NoSQL`。


  #### 扩展 Web 2.0


  万维网最初被构想并实现为一个链接的静态文档的全球集合。事实上，网络的绝大部分内容仍然是只读的静态内容。`Google` 开发了上一章介绍的许多技术，以便为这些文档提供索引和搜索能力。


  但对于零售商和其他企业来说，网络承诺提供的远不止是存储在线目录和白皮书的地方。基于网络的零售网点的概念有望彻底改变现代商业。尽管这种电子商务的概念导致了我们这代人最大的繁荣与萧条，但其承诺最终得以实现，今天你几乎可以在线购买任何东西。


  静态页面的万维网通常被称为 `Web 1.0`，而具有事务处理能力的动态生成内容的万维网则被称为 `Web 2.0`。然而，2.0 版本并非受控架构重建的结果；相反，它是由于网络开发者争相应对功能、性能和规模方面不断增长的需求而产生的。



  ##### Web 2.0 如何取胜


  最初的网络服务器提供对用 `HTML` 编写的超文本文档的访问。当时没有数据库系统参与，也无法进行任何业务或交易活动。


  早期想要提供某种形式用户交互的网站——例如 `Amazon.com`——使用了 `通用网关接口` (`CGI`)。`CGI` 允许 `HTTP` 请求调用脚本，而不是显示一个
  `HTML` 页面。早期的动态网页会调用用 `Perl` 语言编写的脚本，这些脚本会连接到数据库，并根据数据库内容动态生成 `HTML` 代码。这样，网站就能根据数据库中存储的数据展示目录，或者根据用户档案个性化页面。


  `CGI` 的方法逐渐被更优雅、更集成的框架（如 `Java` `J2EE` 和 `ASP.NET`）所取代，尽管大量基于 `PHP` 语言的网站仍然遵循 `CGI`
  模型。然而，无论使用何种框架，通用的模式都涉及一个网络应用服务器，用于显示从数据库内容动态生成的信息。


  在这种架构中，扩展 Web 层很容易。就像在客户端/服务器架构中，一个数据库可以对应多个客户端一样，你可以根据需要部署任意多的 Web 服务器与单个后端数据库通信。因此，Web
  服务器层的瓶颈只需通过添加更多 Web 服务器即可解决。


  然而，解决数据库层的瓶颈则不那么简单。尽管在二十一世纪初已有一些数据库集群解决方案，但通常难以通过这些方案实现线性扩展，并且没有一个方案曾展现出大型电子商务网站所需级别的扩展能力。


  在 Web 2.0 的早期阶段，解决数据库性能问题的方法就是购买更强大的数据库服务器。数据库服务器的能力逐年增强，存储服务器能为数据库提供巨大的 `IO` 容量。因此，在最初的互联网泡沫期间，像
  `EMC` 和 `Oracle` 这样的公司表现非常好，因为对于这些早期的 Web 2.0 公司来说，购买最强大的数据库服务器来支撑他们预期的极其乐观的增长曲线是合理的。


  有两个因素导致了这种向上扩展方案的放弃。首先，互联网泡沫破灭将财务现实带回考量，幸存下来的网络公司需要财务上谨慎的解决方案。企业希望一个能够从小规模起步并根据需要增长的方案。其次，随着
  Web 2.0 公司达到全球规模，他们发现即使是最庞大的集中式数据库服务器也无法满足需求。向上扩展的方式已经行不通了。


  此外，即使向上扩展方案能提供所需的容量，它仍然代表着一个潜在的单点故障，并且无法在全球市场提供均衡的响应时间。


  ##### 开源解决方案


  互联网泡沫破灭后，开源软件在 Web 2.0 运营中越来越受到重视。`Linux` 取代了专有的 `UNIX` 成为首选操作系统，`Apache` 网络服务器占据了主导地位。在此期间，`MySQL`
  超越 `Oracle`，成为网站开发的首选 `数据库管理系统` (`DBMS`)。


  `MySQL` 在当时，甚至现在，其可扩展性也远不如 `Oracle`；它通常在性能较低的硬件上运行，并且不太能利用多核处理器。然而，Web 开发者想出了一些技巧来让
  `MySQL` 发挥更大作用。


  首先，他们使用了一种叫做 `Memcached` 的技术来尽可能避免访问数据库。`Memcached` 是一个开源实用程序，提供分布式对象缓存。面向对象的语言可以将数据库信息的面向对象表示缓存在多台服务器上。通过从这些服务器而不是数据库读取，可以减少数据库上的负载。


  其次，Web 开发者利用了 `MySQL` 的复制功能。复制允许将一个数据库的更改复制到另一个数据库。读取请求可以被定向到这些副本数据库中的任何一个。然而，写入操作仍然必须发送到主数据库，因为主到主的复制是不可能的。但是，在典型的数据库应用——特别是
  Web 应用中——读取次数远远多于写入次数，因此读取复制策略是合理的。


  图 3-1 展示了从单一 Web 服务器和数据库服务器到多 Web 服务器、`Memcached` 服务器和只读数据库副本的转变。


  ![A978-1-4842-1329-2_3_Fig1_HTML.jpg](img/A978-1-4842-1329-2_3_Fig1_HTML.jpg)


  图 3-1.


  使用 `Memcached` 服务器和复制进行扩展


  `Memcached` 和读取复制显著提高了基于 `MySQL` 的 Web 应用程序的整体容量。然而，这两种技术都只能增加系统的读取能力。当系统在数据库写入活动上达到瓶颈时，就需要一个更激进的解决方案。


  ##### 分片


  分片允许将一个逻辑数据库分区到多个物理服务器上。


  在分片的应用中，最大的表被分区到多个数据库服务器上。每个分区被称为一个分片。这种分区基于一个 `键值`，例如用户 `ID`。在操作特定记录时，应用程序必须确定哪个分片将包含该数据，然后将
  `SQL` 发送到适当的服务器。分片是最大型网站采用的解决方案；`Facebook` 和 `Twitter` 是最著名的例子。在这两个网站上，特定于单个用户的数据都集中在特定节点上的
  `MySQL` 表中。


  图 3-2 展示了本章前面所示的 `Memcached` 和复制配置，并添加了分片。在这个例子中，有三个分片，为简单起见，分片按主键的首字母标记。因此，我们可以想象键为
  `GUY` 的行在分片 2 中，而键 `BOB` 则被分配到分片 1。在实践中，更可能对主键进行哈希处理，以确保键均匀分布到服务器。


  ![A978-1-4842-1329-2_3_Fig2_HTML.jpg](img/A978-1-4842-1329-2_3_Fig2_HTML.jpg)


  图 3-2.


  图 3-1 中的 `Memcached`/复制架构，添加了分片


  `Facebook` 使用的确切服务器数量一直在变化，且并非总是公开披露，但在 2011 年左右，他们确实透露其配置中使用了超过 4000 个 `MySQL`
  分片和 9000 台 `Memcached` 服务器。这种分片的 `MySQL` 配置支持每秒 14 亿次峰值读取、每秒 350 万行更改和每秒 810 万次物理
  `IO`。正如我们将看到的，分片涉及显著的操作复杂性和妥协，但它是一种经过验证的、可在大规模上实现数据处理的技术。


  分片概念简单，但实践中极其复杂。应用程序必须包含理解任何特定数据位置的逻辑，以及将请求路由到正确分片的逻辑。分片通常与快速增长相关联，因此这种路由需要是动态的。那些只能通过访问多个分片才能满足的请求，也需要复杂的编码，而在非分片的数据库上，单个
  `SQL` 语句可能就足够了。



  ###### 千刀万剐的分片


  分片——与缓存和复制一起——可以说是将关系型数据库扩展至大规模网络应用的唯一途径。然而，分片的运营成本巨大。分片策略的缺点包括：


  *   **应用复杂度**：将 `SQL` 请求路由到正确的分片由应用代码负责。在一个静态分片的数据库中，这已经足够困难；然而，大多数大型网站都在增长过程中不断增加分片，这意味着必须实现一个动态路由层。这一层通常需要额外复杂的代码来维护
  `Memcached` 对象副本，并区分主数据库和只读副本。

  *   **残缺的 `SQL`**：在分片数据库中，无法执行跨分片的 `SQL` 语句。这通常意味着 `SQL` 语句仅限于行级访问。跨分片的连接无法实现，聚合的
  `GROUP BY` 操作也无法进行。这实际上意味着只有程序员才能查询整个数据库。

  *   **事务完整性丧失**：跨多个分片的 `ACID` 事务是不可能的——或者至少不切实际。理论上，在某些支持`两阶段提交 (2PC)`的数据库系统中可以实现跨数据库的事务——但在实践中，这会造成冲突解决的问题、可能产生瓶颈、对
  `MySQL` 存在问题，并且很少被实施。

  *   **运营复杂性**：跨分片的负载均衡变得极为棘手。添加新分片需要复杂的数据再平衡。更改数据库模式也需要在所有分片上进行滚动操作，从而导致模式出现暂时的不一致。简而言之，分片数据库需要大量的运营工作和管理员技能。


  关系型数据库供应商——特别是 `Oracle`——曾试图创建一种关系型数据库实现，旨在提供分片数据库的可扩展性，同时不牺牲 `ACID` 和关系特性，也避免运营上的麻烦。`Oracle`
  的 `真正应用集群 (RAC)` 是透明可扩展、符合 `ACID` 标准的、关系型集群的最重要范例。


  在 `Oracle RAC` 数据库中，每个数据库节点都处理位于共享存储设备上的数据。这种共享磁盘集群与无共享模型形成对比，后者被其他集群数据库采用，更适用于数据仓库工作负载。（我们将在第
  8 章更详细地比较共享磁盘和无共享架构。）


  在 `RAC` 中添加新的数据库节点无需进行任何数据再平衡，并且在这些数据库节点之间实现了一种分布式内存缓存。`Oracle RAC` 曾展现出巨大的前景，并且确实得到了广泛应用。然而，它作为
  `MySQL` 分片模型的替代方案却失败了，原因有三：第一，它过于昂贵。第二，它未能证明具备最大型网站所需的可扩展性水平。第三，人们逐渐认识到，没有任何符合 `ACID`
  的数据库能够满足世界上最大型网站的需求。这最后一点限制是一种“物理定律”般的约束，在后来被称为 `CAP` 定理中得到了阐述。


  ###### CAP 定理


  2000 年，埃里克·布鲁尔概述了“`CAP`”猜想，后来在提供了数学证明后被确立为定理。`CAP` 定理指出，在一个分布式数据库系统中，你最多只能同时拥有以下三者中的两者：一致性、可用性和分区容忍性。一致性意味着数据库的每个用户在任何给定时刻对数据都有完全一致的视图。可用性意味着在发生故障时，数据库仍保持可操作状态。分区容忍性意味着在分布式系统的两个部分之间的网络发生故障时，数据库仍能维持运行。


  在 2000 年，分区容忍性的问题在某种程度上还是理论性的。大多数系统位于单一数据中心内，该数据中心内的冗余网络连接防止了任何分区的发生。如果该数据中心发生故障，或许会启动一个故障转移数据中心。然而，当时几乎没有真正的多数据中心应用。


  但随着 Web 系统扩展到全球范围并追求持续可用性，分区容忍性成为一个现实问题。考虑图 3-3 所示的分布式应用。在发生图中所示的网络分区时，系统有两个选择：要么向每个用户显示不同的数据视图，要么关闭其中一个分区并断开其中一个用户的连接。


  `![A978-1-4842-1329-2_3_Fig3_HTML.jpg](img/A978-1-4842-1329-2_3_Fig3_HTML.jpg)`


  `图 3-3.`


  `分布式数据库应用中的网络分区`


  `Oracle` 的 `RAC` 解决方案当然支持 `ACID` 事务模型，在网络分区时（在 `Oracle` 领域被称为“脑裂”场景）会选择一致性。其中一个分区会选择关闭。然而，在全球社交网络应用或世界范围的电子商务系统背景下，期望的解决方案是即使牺牲用户之间的某些一致性也要保持可用性。


  ###### 最终一致性


  `CAP` 定理提供了一个严苛的选择：如果你希望系统不受网络分区干扰，就必须牺牲分区间严格的强一致性。


  然而，即使不考虑 `CAP` 定理，`ACID` 事务在大型分布式网站中也日益难以为继。这更多地与性能而非可用性有关。在任何高可用的数据库系统中，为了在节点故障时允许系统继续运行，必须维护每个数据元素的多个副本。在全球分布式系统中，将节点分布到世界各地以降低各地的延迟变得越来越可取。然而，为了确保强一致性，有必要确保数据库变更被同步且立即地传播到多个节点。当其中一个节点位于地球的另一端时，这会造成不可避免的延迟增加。


  对于银行来说，这种延迟代价是无法避免的。然而，对于包括社交网络和某些电子商务运营在内的许多网站来说，这种全球范围的同步一致性是不必要的。我在澳大利亚的朋友比我在美国的朋友早几秒钟看到我的推文，这无关紧要。只要两位朋友最终都能看到这条推文，我就很满意了。


  这种最终一致性的概念已成为许多 `NoSQL` 数据库的关键特性。这一概念最著名的是由亚马逊首席技术官维尔纳·沃格尔斯提出，并在亚马逊的 `Dynamo` 键值存储中得以实现。


  #### 亚马逊的 Dynamo


  亚马逊开创了许多早期 Web 2.0 时代使用的技术，特别是使用 Perl 语言来整合数据库与 Web 前端。早期的亚马逊使用 Oracle 数据库作为其商品目录、客户详细信息和订单的主要存储库。Oracle
  数据库承受的负载是巨大的，亚马逊几次著名的宕机事件都与数据库故障有关。


  亚马逊曾尝试将网站拆分为多个功能区域，每个区域可以拥有自己专用的数据库。他们也是面向服务架构（SOA）的早期采用者，在这种架构中，诸如`get-product-details`这样的逻辑服务不是通过
  SQL 查询解决，而是通过 Web 服务调用来完成。这使得数据库与应用层解耦，并允许亚马逊尝试替代的数据库技术。


  2007 年，亚马逊披露了一个内部开发的替代性非关系型系统的细节，该系统旨在满足其庞大在线网站的需求。这个被称为`Dynamo`的系统，其设计基于以下需求：


  *   持续可用性：即使是最短的应用宕机时间，对亚马逊来说也代价高昂。数据存储必须在所有可预见的情况下保持可用。

  *   网络分区容忍：作为一个在全球拥有客户和数据中心的全球电子商务供应商，亚马逊最关心的是网络分区不应导致可用性丧失，即使这种丧失仅限于特定地域。

  *   无损冲突解决：亚马逊的另一个关键需求是任何订单或购物车更新都不应丢失。例如，如果用户从两台不同的计算机向其购物车添加商品，这两件商品都应出现在最终的购物车中。此外，在任何情况下都不应有人被阻止向其购物车添加商品，这意味着对对象不能有排他的写锁。

  *   效率：系统需要快速响应，因为众所周知，即使网站响应时间的微小延迟也会导致在线销售额显著下降。在线顾客是出了名的善变和没耐心。

  *   经济性：该系统需要能够在通用硬件上运行。

  *   增量可扩展性：应该可以通过少量增量添加服务器来扩展系统，而无需手动维护或停机。


  为了达成这些目标，亚马逊愿意在现有数据库的许多特性上做出妥协。


  原则上，数据存储应在必要时放宽一致性（在一定限度内）以确保可用性。“在一定限度内”这个说法在这里很重要：系统应优先考虑可用性而非一致性，但要以一种可预测、可控和可管理的方式进行。此外，一致性和可用性之间的权衡应该是可配置的——例如，应用程序应该能够选择在发生网络分区时采取何种措施。


  此外，数据存储只需要支持基于主键的访问，无需支持数据模型：通过键查找检索到的值是未结构化的二进制对象。与设计目标为存储海量文件的 Google 的`BigTable`不同，`Dynamo`的假设是大多数对象都很小——小于
  1 MB。


  `Dynamo`——以及许多受其启发的系统——明确尝试在`CAP 定理`方面取得不同的结果。与其总是以牺牲网络分区容忍性为代价来达成一致性，`Dynamo`允许（尽管不强制要求）转而牺牲一致性。参见图
  3-4。


  ![A978-1-4842-1329-2_3_Fig4_HTML.jpg](img/A978-1-4842-1329-2_3_Fig4_HTML.jpg)


  图 3-4. `Dynamo`与`ACID RDBMS`在`CAP 定理`限制下的映射


  `Dynamo`已成为许多非关系型数据库的架构模型。（我们将在第 8 章和第 9 章深入探讨`Dynamo`的内部细节。）`Dynamo`的一些关键架构特性包括：


  *   一致性哈希：一致性哈希是一种方案，它使用主键的哈希值来确定集群中负责该键的节点，并允许以最小的再平衡开销向集群添加或移除节点。更多细节见下文。

  *   可调一致性：应用程序可以指定一致性、读性能和写性能之间的权衡。在`Dynamo`中，可以指定强一致性、最终一致性或弱一致性。更多细节见下文。

  *   数据版本控制：由于写操作永远不会被阻塞，系统中可能存在一个对象的多个版本。有时这些版本可以由数据存储本身合并，但有时需要由应用程序或用户来解决。例如，如果买家从两台计算机更新其购物车，结果购物车中可能有重复的物品，他可能需要将其移除。


  `Dynamo`系统中有许多复杂的设计特性；其中许多将在第 8 章和第 9 章讨论。然而，如果不稍微详细阐述两个关键特性——`一致性哈希`和`可调一致性`，那将是疏忽。


  ##### 一致性哈希


  当我们对键值进行哈希时，我们会对键值执行数学计算，并使用该计算值来确定存储数据的位置。使用哈希的一个原因是我们能够将数据均匀分布在一定数量的槽位中。最简单的例子是使用取模函数，该函数返回除法的余数。如果我们想将任何数字哈希到
  10 个桶中，我们可以使用模 10；那么键 27 将映射到桶 7，键 32 将映射到桶 2，键 25 映射到桶 5，以此类推。


  使用这种方法，我们可以将键均匀映射到 10 台服务器上。当我们想确定哪个节点应该存储特定项时，我们会计算其模数并使用结果来定位节点。实际上，哈希函数比简单的取模函数更复杂，一个好的哈希函数总能将哈希值均匀地分布在节点上，无论键值有何种偏斜。


  哈希作为在固定数量节点上均匀分布数据的方法效果很好。但如果我们添加或移除一个节点，就会出现问题——我们必须重新计算所有哈希值并重新分配所有数据。例如，如果我们想在上面的模
  10 示例中添加一台新服务器，我们将使用模 11 重新计算哈希，然后我们必须相应地移动几乎每个数据项。一致性哈希的工作原理是对键值进行哈希，并应用一种一致的方法将这些哈希值分配到特定节点。


  按照惯例，也可能根据联邦法律，一致性哈希方案被表示为环——因为哈希值会“循环回到”0。图 3-5 显示了向现有集群添加一个节点时发生的情况。只有当前映射到新节点“邻居”的那些键需要重新映射。


  ![A978-1-4842-1329-2_3_Fig5_HTML.jpg](img/A978-1-4842-1329-2_3_Fig5_HTML.jpg)


  图 3-5. 向一致性哈希方案中添加一个新节点


  添加新节点时的重新映射过程仍然是一个开销很大的操作，在实践中，基于`Dynamo`的数据库通常采用“虚拟节点”的变通方法来进一步减少开销。该机制将在第 8 章中详细解释。


  ### 4. 文档数据库


  > 关系型数据库就像一个车库，迫使你把汽车拆成零件，然后分门别类地存进小抽屉里。——面向对象数据社区，20 世纪 90 年代中期

  > 对象数据库就像一个衣橱，要求你把领带、内衣、皮带、袜子和鞋子全都挂在西装上一起收纳。——大卫·恩索，同一时期


  文档数据库是一种非关系型数据库，它将数据存储为结构化文档，通常采用 XML 或 JSON 格式。“文档数据库”这个定义本身，除了表明其文档存储模型之外，并不隐含任何特定的限制：文档数据库可以自由实现
  ACID 事务或其他传统关系型数据库管理系统的特性，不过主流的文档数据库提供的事务支持相对有限。


  基于 JSON 的文档数据库在 2008 年非关系型数据库爆发后蓬勃发展，主要有三个原因。首先，它们解决了面向对象编程与关系数据库模型之间的冲突，这种冲突曾令软件开发者感到沮丧，并且是
  20 世纪 90 年代中期面向对象数据库运动的重要驱动力。其次，因为自描述的文档格式可以独立于创建它们的程序进行查询，它们支持对数据库进行即席查询访问，这是纯键值存储所缺乏的。第三，它们与主流的基于
  Web 的编程范式，特别是 AJAX 编程模型，非常契合。


  文档数据库通过允许某种形式的数据描述而无需强制实施模式，或许在关系型数据库的严格模式与完全无模式的键值存储之间，提供了一个令人满意的折中方案。程序员仍然可以随着应用程序内部需求的变化而自由地更改数据模型，但数据使用者仍然能够查询数据以确定其含义。


  与 Web 开发编程实践的契合，使得 JSON 文档数据库——尤其是 MongoDB 数据库——成为许多 Web 开发者的默认选择。


  注意


  将某物描述为文档数据库，仅仅告诉我们它以 XML 或 JSON 格式存储数据。这个术语并未定义任何特定的事务或集群模型。


  ##### 可调节的一致性


  Dynamo 允许应用程序选择应用于特定操作的一致性级别。`NWR` 表示法描述了 Dynamo 如何在一致性、读性能和写性能之间进行权衡：


  *   `N` 是数据库为每个数据项维护的副本数量。

  *   `W` 是在写入操作完成前必须写入的数据项副本数量。

  *   `R` 是应用程序在读取数据项时将访问的副本数量。


  当 `W = N` 时，Dynamo 在将控制权交还给应用程序之前，总是会写入每一个副本——这正是 ACID 数据库在实现同步复制时的做法。如果应用程序更关心写性能而不是读性能，那么它可以设置
  `W = 1`，`R = N`。这样，每次读取必须访问所有副本以确定哪个是正确的，但每次写入只需在返回控制权之前接触数据的一个副本（其他副本的写入会作为后台任务传播到所有副本）。


  最常见的配置可能是 `N > W > 1`。这意味着必须完成多于一次的写入，但并非所有节点都需要立即更新。另一个常见的设置是 `W + R > N`；这确保了最新的值总是会包含在读操作中，即使它混杂在“较旧”的值之中。这有时被称为**法定人数集合**。


  图 3-6 展示了各种 `NWR` 设置的示例。根据不同的设置，Dynamo 可以在一致性、可靠性和性能之间进行权衡。


  ![A978-1-4842-1329-2_3_Fig6_HTML.jpg](img/A978-1-4842-1329-2_3_Fig6_HTML.jpg)


  图 3-6.

  Dynamo 中的可调节一致性


  #### Dynamo 与键值存储家族


  实现了 Dynamo 主要特性之一——即通过主键检索二进制值的概念——的系统，被统称为**键值存储**。正如 Google 的 GFS 和 MapReduce
  论文成为 Hadoop 的蓝图一样，Amazon 的 Dynamo 论文也成为了许多键值存储的蓝图。


  那些正苦恼于分片和其他高难度数据库技术所带来的操作复杂性的 Web 开发者们，早已开始尝试各种非关系型设计。然而，随着 Amazon Dynamo 论文的发布，这些开发者们有了一个经过验证的架构模型可供构建。结果是在
  2008 至 2009 年间，涌现出了一批受 Dynamo 启发的系统。这些系统是第一批可识别的 NoSQL 数据库。


  诚然，并非所有的键值存储都明确基于 Dynamo 模型。然而，受 Dynamo 启发的系统名单令人印象深刻，其中包括活跃的数据库系统，如 `Riak`、领英的
  `Voldemort`、`Cassandra`，当然还有 Amazon 自己的 `DynamoDB`。其中一些系统，如 `Riak` 和 `Voldemort`，或多或少是
  Dynamo 架构的精确复制品，而另一些则将 Dynamo 与其他概念结合使用。例如，Apache 的 `Cassandra` 实现了 Dynamo 的一致性哈希和可调节一致性模型，并结合了
  BigTable 数据模型的变体。


  尽管 Dynamo 代表了最流行且阐述最清晰的键值存储架构，但也存在一些与 Dynamo 设计关系不大或无关的键值存储。这些系统包括 `Redis` 和 `Oracle
  NoSQL`。


  #### 结论


  我们已经看到，维护高可用性全球网站的挑战与 ACID 事务模型存在冲突。Brewer 的 CAP 定理以及实践经验表明，在一个像互联网这样不完善的网络中，一个系统无法同时追求强一致性和全局可用性。对于大多数大型网站而言，持续的可用性可能比完美的数据一致性更重要。


  尝试在最大型 Web 应用所需的规模上部署关系型数据库，涉及了使用缓存（尤其是 `Memcached`）、只读复制和分片等技术。这种架构模式实际上破坏了数据库的关系型特性和
  ACID 特性：一旦数据库被分片，ACID 一致性和即席 SQL 查询访问能力就丧失了。尽管如此，分片解决方案在 Twitter 和 Facebook 等网站上已被证明是有效的。


  互联网零售的先驱 Amazon 放弃了将 RDBMS 作为核心数据库，转而支持其内部开发的非关系型键值存储系统 `Dynamo`。`Dynamo` 实现的是**最终一致性**而非严格一致性；对数据的更新最终保证会在整个系统中传播，但可能不会即时被每个用户看到。


  `Dynamo` 对许多其他键值存储的设计产生了强大影响，例如 `Riak` 和 `Cassandra`，并且是 Amazon 基于云的数据库 `DynamoDB`
  的基础。像 `Dynamo` 这样的系统对其承载的数据不强制任何结构。这使得它们除了程序员之外，对其他人而言都难以理解和使用。正如我们将在下一章看到的，另一类数据库——文档数据库——扩展了键值的概念，要求值必须以
  XML 或 JSON 等自描述格式进行结构化。


