  API：\n\n`Cypher`图编程语言，提供大多数编程语言的驱动程序\n\n#### NuoDB\n\n数据库名称：NuoDB\n\n许可证/公司：专有，由\
  \ NuoDB 公司提供\n\n维基百科描述：\n\nNuoDB 是一种在云中工作的新 SQL 数据库。它既可以用于单供应商，也可以用于多供应商的云设置。\n\n\
  供应商描述：\n\nNuoDB 革命性的持久分布式缓存（`DDC`）架构结合了传统关系数据库管理系统的强大功能——丰富的`ANSI SQL`支持、完整的`ACID`事务、用于安全、备份和管理的组织级工具——以及对跨多个数据中心弹性扩展和持续可用性的支持。\n\
  \n我的看法：\n\nNuoDB 是构建符合`ACID`的分布式 SQL 数据库的一次重要尝试。它包含一个可调节的一致性模型和一个可插拔的存储引擎架构。\n\n\
  数据模型：\n\n建立在可插拔存储层之上的关系模型，该存储层可能包含非关系引擎\n\n事务模型：\n\n具有可调节一致性级别的`ACID`，可能导致最终一致行为\n\
  \n集群：\n\n专有集群模型\n\nAPI：\n\n`SQL`，可以对底层存储引擎进行非`SQL`访问\n\n#### Oracle RDBMS\n\n数据库名称：Oracle\
  \ database 12c\n\n许可证/公司：甲骨文\n\n维基百科描述：\n\nOracle 数据库（通常称为 Oracle RDBMS 或简称 Oracle）是由甲骨文公司生产和销售的对象关系数据库管理系统。\n\
  \n供应商描述：\n\n\n\nOracle Database 12c 引入了全新的多租户架构，能够快速整合多个数据库并将其作为云服务进行管理。它还包含内存数据处理能力，可提供**突破性的分析性能**。\n\
  \n我的看法：\n\nOracle 可以称得上是第一个成功的、基于关系模型的商业数据库，并在大约 30 年的时间里一直主导着数据库市场。\n\n从技术地位来看，Oracle\
  \ 总体上也引领着市场，开创了许多核心的 RDBMS 架构，包括行级锁、`MVCC` 和共享磁盘集群。\n\nOracle 提供了 Hadoop 设备和一个 NoSQL\
  \ 键值存储。在其核心 RDBMS 中，它实现了许多面向文档的数据库特性，包括一个带有 `REST` 接口的 `JSON` 存储。\n\n##### 数据模型\n\
  \n关系型，并支持对象类型（varrays、嵌套表等）以及内嵌的 `XML` 和 `JSON`\n\n##### 事务模型\n\n遵循 `ACID`，采用 `MVCC`\n\
  \n##### 集群\n\n共享磁盘集群数据库（`RAC`）或分片\n\n##### API\n\n`SQL`，附带专有的 `PL/SQL` 存储过程语言\n\n\
