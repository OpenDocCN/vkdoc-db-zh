  数据库名称：MongoDB\n\n许可证/公司：GNU AGPL， Apache 许可的驱动程序。由 MongoDB 公司提供商业支持。\n\n维基百科描述：\n\
  \nMongoDB（源自\"巨大\"一词）是一个跨平台的面向文档数据库。被归类为 NoSQL 数据库，MongoDB 摒弃了传统的基于表的关系数据库结构，转而采用具有动态模式的类\
  \ JSON 文档（MongoDB 将格式称为`BSON`），这使得在某些类型的应用程序中集成数据更容易、更快捷。\n\n供应商描述：\n\nMongoDB 是一个开源的文档数据库，旨在便于开发和扩展。MongoDB\
  \ 提供高性能、高可用性和自动扩展。\n\n我的看法：\n\nMongoDB 在 NoSQL 采用方面建立了强大的领先优势，这得益于其在 Web 开发人员中的流行，在该领域，该数据库已经取代`MySQL`成为基于现代开源框架构建的网站的默认选择。\n\
