    failure management, because these are handled automatically by the underlying
    HDFS system.


    We introduced HDFS and Hadoop architecture in Chapter [2](#A978-1-4842-1329-2_2_Chapter.html);
    please refer to that chapter if you need a refresher. HDFS implements a distributed
    file system using disks that are directly attached to the servers—DataNodes—that
    constitute a Hadoop cluster. HDFS automatically manages redundancy of data: by
    default, data is replicated across three DataNodes, one of which (if possible)
    is located on a separate server rack.


    ### Tables, Regions, and RegionServers


    HBase implements a wide column store based on Google’s BigTable specification.
    We touched on that data model in Chapter [2](#A978-1-4842-1329-2_2_Chapter.html),
    and we’ll talk more about it in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html).
    For now, we can consider HBase tables as potentially massive tabular datasets
    that are implemented on disk by a variable number of HDFS files called Hfiles.


    All rows in an HBase table are identified by a unique row key. A table of nontrivial
    size will be split into multiple horizontal partitions called regions. Each region
    consists of a contiguous, sorted range of key values. This resembles the MongoDB
    range-based sharding scheme we described earlier in this chapter.


    Read or write access to a region is controlled by a RegionServer. Each RegionServer
    normally runs on a dedicated host, and is typically co-located with the Hadoop
    DataNode.


    There will usually be more than one region in each RegionServer. As regions grow,
    they split into multiple regions based on configurable policies. Regions may also
    be split manually. We’ll discuss this more a little later in this chapter.


    Each HBase installation will include a Hadoop Zookeeper service that is implemented
    across multiple nodes. Hbase may share this Zookeeper ensemble with the rest of
    the Hadoop cluster or use a dedicated service.


    When an HBase client wishes to read or write to a specific key value, it will
    ask Zookeeper for the address of the RegionServer that controls the HBase catalog.
    This catalog consists of the tables -ROOT- and .META., which identify the RegionServers
    that are responsible for specific key ranges. The client will then establish a
    connection with that RegionServer and request to read or write the key value concerned.


    The HBase master server performs a variety of housekeeping tasks. In particular,
    it controls the balancing of regions among RegionServers. If a RegionServer is
    added or removed, the master will organize for its regions to be relocated to
    other RegionServers.


    Figure [8-8](#A978-1-4842-1329-2_8_Chapter.html#Fig8) illustrates some of these
    architectural elements. An HBase client consults Zookeeper to determine the location
    of the HBase catalog tables (1), which can be then be interrogated to determine
    the location of the appropriate RegionServer (2). The client will then request
    to read or modify a key value from the appropriate RegionServer (3). The RegionServer
    reads or writes to the appropriate disk files, which are located on HDFS (4).


    ![A978-1-4842-1329-2_8_Fig8_HTML.jpg](A978-1-4842-1329-2_8_Fig8_HTML.jpg)


    Figure 8-8.


    HBase architecture


    ### Caching and Data Locality


    The RegionServer includes a block cache that can satisfy many reads from memory,
    and a MemStore, which writes in memory before being flushed to disk. However,
    to ensure durability of the writes, each RegionServer has a dedicated right ahead
    log (WAL), which journals all writes to HDFS. This architecture is an implementation
    of the log-structured merge tree (LSM) pattern that is more fully described in
    Chapter [10](#A978-1-4842-1329-2_10_Chapter.html).


    The RegionServer can act as a generic HDFS client, communicating with the HDFS
    NameNode to perform read and write operations to files. In the most typical production
    deployment scenario, each RegionServer is located on a Hadoop NameNode, and as
    a result, region data will be co-located with the RegionServer, providing good
    data locality. This data locality will be disrupted by rebalance operations and
    RegionServer failovers, but compactions—which merge HDFS disk files as described
    in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html)—will restore data locality.


    Hadoop and HBase support a mode known as short-circuit reads, in which the RegionServer
    can read directly from local disk, bypassing the NameNode. This, of course, is
    only possible when the data is stored on a DataNode that also hosts the RegionServer.


    The three levels of data locality are shown in Figure [8-9](#A978-1-4842-1329-2_8_Chapter.html#Fig9).
    In the first configuration, the RegionServer and the DataNode are located on different
    servers and all reads and writes have to pass across the network. In the second
    configuration, the RegionServer and the DataNode are co-located and all reads
    and writes pass through the DataNode, but they are satisfied by the local disk.
    In the third scenario, short-circuit reads are configured and the RegionServer
    can read directly from the local disk.


    ![A978-1-4842-1329-2_8_Fig9_HTML.jpg](A978-1-4842-1329-2_8_Fig9_HTML.jpg)


    Figure 8-9.


    Data locality in HBase


    ### Rowkey Ordering


    The HBase region partitioning scheme requires that regions consist of contiguous
    ranges of rowkeys. This range-based partitioning has a significant impact on performance
    when the rowkey contains some form of monotonically incrementing value, such as
    a timestamp or a incrementing counter. In this event, all write operations will
    be directed to a specific region and hence to a single RegionServer. This can
    create a bottleneck on write throughput.


    HBase offers no internal mechanisms to mitigate this issue. It’s up to the application
    designer to construct a key that is either randomized—a hash of the timestamp,
    for instance—or is prefixed in some way with a more balanced attribute. In the
    HBase time series database OpenTSDB, the timestamp is prefixed by a metric identifier
    variable that has a large number of values. Data for a single metric will be located
    in a specific RegionServer, but data for a specific timestamp will be distributed
    across all the RegionServers.'
  trans: '## HBase


    HBase 既可被视为"Hadoop 数据库"，也可被视为"开源 BigTable"。也就是说，我们可以将 HBase 描述为一种在 Hadoop HDFS
    文件系统之上提供随机访问数据库服务的机制，或者也可以将其视为 Google BigTable 数据库的开源实现，并且恰好使用 HDFS 进行数据存储。这两种描述都是准确的：尽管理论上
    HBase 可以在任何分布式文件系统——甚至非分布式文件系统——上实现，但它几乎总是在 Hadoop HDFS 上实现，并且 HBase 的许多架构假设也反映了这一点。另一方面，HBase
    实现了实时随机访问数据库功能，这本质上与 Hadoop 的基本能力不同。

    在接下来的讨论中，我们将重点关注最常见的 HBase 架构形式：在 HDFS 之上实现的形式。在 HDFS 上实现 HBase 创造了一种混合体，结合了无共享和共享磁盘的集群模式。一方面，每个
    HBase 节点都可以访问数据库中的任何数据元素，因为所有数据都可以通过 HDFS 访问。另一方面，通常将 HBase 服务器与 HDFS DataNode
    放置在同一位置，这意味着实际上每个节点往往负责存储在本地磁盘上的一个独有的数据子集。

    无论哪种情况，HDFS 都为磁盘上的数据提供了可靠性保证：HBase 架构不需要关心写入镜像或磁盘故障管理，因为这些都由底层的 HDFS 系统自动处理。

    我们在第 2 章介绍了 HDFS 和 Hadoop 架构；如果需要复习，请参考该章。HDFS 使用直接连接到构成 Hadoop 集群的服务器（即 DataNode）的磁盘来实现分布式文件系统。HDFS
    自动管理数据冗余：默认情况下，数据会在三个 DataNode 上进行复制，其中一个（如果可能）位于单独的服务器机架上。


    ### 表、区域与区域服务器


    HBase 基于 Google 的 BigTable 规范实现了一个宽列存储。我们在第 2 章接触过该数据模型，并将在第 10 章详细讨论。目前，我们可以将
    HBase 表视为潜在的海量表格数据集，在磁盘上由数量可变的、称为`Hfiles`的 HDFS 文件实现。

    HBase 表中的所有行都由一个唯一的`行键`标识。一个规模不小的表会被拆分成多个称为`区域`的水平分区。每个区域由一个连续的、排序的键值范围组成。这类似于本章前面描述的
    MongoDB 基于范围的分片方案。

    对一个区域的读或写访问由一个`区域服务器`控制。每个`区域服务器`通常运行在一个专用主机上，并且通常与 Hadoop `DataNode`放置在同一位置。

    每个`区域服务器`中通常会有多个区域。随着区域增长，它们会根据可配置的策略拆分成多个区域。区域也可以手动拆分。我们将在本章稍后详细讨论这一点。

    每个 HBase 安装都会包含一个跨多个节点实现的 Hadoop `Zookeeper`服务。HBase 可能与 Hadoop 集群的其他部分共享这个`Zookeeper`集合，也可能使用专用的服务。

    当 HBase 客户端希望读写特定的键值时，它会向`Zookeeper`询问控制 HBase 目录的`区域服务器`的地址。该目录包含表`-ROOT-`和`.META.`，它们标识了负责特定键范围的`区域服务器`。然后，客户端将与该`区域服务器`建立连接，并请求读写相关的键值。

    HBase 主服务器执行各种内务管理任务。特别是，它控制区域在`区域服务器`之间的平衡。如果添加或移除了一个`区域服务器`，主服务器将组织将其区域重新定位到其他`区域服务器`。

    图 8-8 展示了其中一些建筑元素。HBase 客户端咨询`Zookeeper`以确定 HBase 目录表的位置（1），然后可以查询该目录来确定相应的`区域服务器`的位置（2）。接着，客户端将向相应的`区域服务器`请求读取或修改键值（3）。`区域服务器`读取或写入位于
    HDFS 上的相应磁盘文件（4）。

    ![A978-1-4842-1329-2_8_Fig8_HTML.jpg](img/A978-1-4842-1329-2_8_Fig8_HTML.jpg)

    图 8-8.

    HBase 架构


    ### 缓存与数据本地性


    `区域服务器`包含一个可以满足许多内存读取的块缓存，以及一个`内存存储`，它在内存中写入，然后再刷写到磁盘。然而，为了确保写入的持久性，每个`区域服务器`都有一个专用的预写日志，它将所有写入操作记录到
    HDFS。这种架构是日志结构合并树模式的实现，该模式在第 10 章有更全面的描述。

    `区域服务器`可以充当通用的 HDFS 客户端，与 HDFS `名称节点`通信以执行文件的读写操作。在最典型的生产部署场景中，每个`区域服务器`位于一个 Hadoop
    `名称节点`上，因此，区域数据将与`区域服务器`放置在同一位置，提供良好的数据本地性。这种数据本地性会因重新平衡操作和`区域服务器`故障切换而被打乱，但压缩操作——如第
    10 章所述合并 HDFS 磁盘文件——将恢复数据本地性。

    Hadoop 和 HBase 支持一种称为`短路读取`的模式，在此模式下，`区域服务器`可以直接从本地磁盘读取，绕过`名称节点`。当然，这只有在数据存储在同时托管`区域服务器`的`数据节点`上时才可能。

    三种级别的数据本地性如图 8-9 所示。在第一种配置中，`区域服务器`和`数据节点`位于不同的服务器上，所有读写都必须通过网络。在第二种配置中，`区域服务器`和`数据节点`放置在同一位置，所有读写都通过`数据节点`，但由本地磁盘满足。在第三种场景中，配置了`短路读取`，`区域服务器`可以直接从本地磁盘读取。

    ![A978-1-4842-1329-2_8_Fig9_HTML.jpg](img/A978-1-4842-1329-2_8_Fig9_HTML.jpg)

    图 8-9.

    HBase 中的数据本地性


    ### 行键排序


    HBase 的区域分区方案要求区域由连续的行键范围组成。当行键包含某种形式的单调递增值（如时间戳或递增计数器）时，这种基于范围的分区方案会对性能产生显著影响。在这种情况下，所有写入操作都将定向到特定的区域，从而定向到单个`区域服务器`。这可能会在写入吞吐量上形成瓶颈。

    HBase 没有提供内部机制来缓解此问题。这取决于应用程序设计者来构建一个要么是随机化的键——例如，时间戳的哈希值——要么以某种方式用一个更平衡的属性作为前缀的键。在
    HBase 时间序列数据库`OpenTSDB`中，时间戳前面加上了一个具有大量值的度量标识符变量。单个度量的数据将位于特定的`区域服务器`中，但特定时间戳的数据将分布在所有`区域服务器`上。'
- fmt: '### RegionServer Splits, Balancing, and Failure


    As regions grow, they will be split by the `RegionServer` as required. The new
    regions will remain controlled by the original `RegionServer`—at least initially—but
    they are eligible for relocation during load-balancing operations. The default
    region-split policy results in regions of incrementally greater size, with the
    first split occurring after as little as 128M, while the tenth region will be
    approximately 10GB in size. However, it is possible to split regions manually
    or to override the split policy with custom code.


    One of the most important responsibilities of the HBase `master` node is to balance
    regions across `RegionServer`s. The `master` will periodically evaluate the balance
    of regions across all `RegionServer`s, and should it detect an imbalance, it will
    migrate regions to another server. This is a “soft” rebalance—the region’s data
    remains in its original location on `HDFS` disk, but the responsibility for managing
    that data is moved to a different `RegionServer`.


    As noted earlier, rebalancing tends to result in a loss of data locality: when
    the `RegionServer` acquires responsibility for a new region, that region will
    probably be located on a remote data node—at least until the next major compaction.


    ### Region Replicas


    In earlier versions of HBase, a failure of a `RegionServer` would require a failover
    to a new `RegionServer`. Because the `RegionServer`s don’t actually store the
    data for a region (the data is in `HDFS`), a failure is not catastrophic. The
    `master` would detect the failure and allocate the regions concerned to other
    `RegionServer`s in a similar way to the balancing operation. However, some interruption
    of service would result.


    Region replicas allow for redundant copies of regions to be stored on multiple
    `RegionServer`s. Should a `RegionServer` fail, these replicas can be used to service
    client requests.


    The original `RegionServer` serves as the master copy of the region. Read-only
    replicas of the region are distributed to other `RegionServer`s—located in other
    racks, if possible—which then “follow” the primary `RegionServer`. Writes to these
    replicas are asynchronous to primary `RegionServer` writes, so data in the replicas
    will not always be up to date. We’ll see in the next chapter how the configuration
    of HBase region replicas affects consistency and availability.


    HBase also supports a replication facility that can be used to stand up a duplicated
    HBase database. This is typically used to duplicate an entire HBase database in
    another data center.


    ## Cassandra


    In Chapter [3](#A978-1-4842-1329-2_3_Chapter.html), we introduced Amazon’s `Dynamo`
    database and the concept of consistent hashing. A number of open-source systems
    have implemented the `Dynamo` model. In this chapter, we consider the Cassandra
    implementation.


    ### Gossip


    In HBase and MongoDB, we encountered the concept of `master` nodes—nodes which
    have a specialized supervisory function, coordinate activities of other nodes,
    and record the current state of the database cluster. In Cassandra and other `Dynamo`
    databases, there are no specialized `master` nodes. Every node is equal and every
    node is capable of performing any of the activities required for cluster operation.


    Nodes in Cassandra do, however, have short-term specialized responsibilities.
    For instance, when a client performs an operation, a node will be allocated as
    the coordinator for that operation. When a new member is added to the cluster,
    a node will be nominated as the `seed` node from which the new node will seek
    information. However, these short-term responsibilities can be performed by any
    node in the cluster.


    One of the advantages of a `master` node is that it can maintain a canonical version
    of cluster configuration and state. In the absence of such a `master` node, Cassandra
    requires that all members of the cluster be kept up to date with the current state
    of cluster configuration and status. This is achieved by use of the `gossip` protocol.
    Every second each member of the cluster will transmit information about its state
    and the state of any other nodes it is aware of to up to three other nodes in
    the cluster. In this way, cluster status is constantly being updated across all
    members of the cluster.


    The `gossip` protocol is aptly named: when people gossip, they generally tend
    to gossip about other people! Likewise, in Cassandra, the nodes gossip about other
    nodes as well as about their own state.


    Cluster configuration is persisted in the `system` keyspace, which is available
    to all members of the cluster. A `keyspace` is roughly analogous to a schema in
    a relational database—the `system` `keyspace` contains tables that record metadata
    about the cluster configuration.


    This architecture eliminates any single point of failure within the cluster. Although
    distributed databases with `master` nodes have strategies to allow for rapid failover,
    the crash of a `master` node usually creates a temporary reduction in availability,
    such as momentarily falling back to read-only mode.


    One of the main topics of gossip within a Cassandra cluster is node availability.
    The traditional mechanism for detecting node failure is to send heartbeats between
    nodes. However, in a widely distributed system, the heartbeats may be lost because
    of network issues rather than actual node failure. For this reason, Cassandra
    failure detection is more probabilistic: if you like, nodes in the cluster become
    increasingly “worried” about other nodes. If it seems likely that a node is down,
    then the operations will be directed to “known good” nodes.'
