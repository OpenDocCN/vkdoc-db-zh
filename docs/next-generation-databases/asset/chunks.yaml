  trans: '


    ### RegionServer 的分割、负载均衡与故障处理


    随着区域（region）不断增长，`RegionServer` 会根据需要对其进行分割。新产生的区域最初仍将由原始的 `RegionServer` 管理——但它们有资格在负载均衡操作期间被重新分配。默认的区域分割策略会导致区域大小逐步增大，第一次分割可能在区域大小仅为
    128MB 时就发生，而第十个区域的大小将约为 10GB。不过，也可以手动分割区域，或通过自定义代码覆盖默认的分割策略。


    HBase `master` 节点最重要的职责之一，就是在各个 `RegionServer` 之间平衡区域分布。`master` 会定期评估所有 `RegionServer`
    的区域分布是否均衡，如果检测到不均衡，它就会将区域迁移到其他服务器。这是一种“软”重新平衡——区域的数据仍然保留在其位于 `HDFS` 磁盘上的原始位置，但管理该数据的职责被转移到了另一个
    `RegionServer`。


    如前所述，重新平衡往往会导致数据局部性（data locality）的损失：当某个 `RegionServer` 接管一个新区域的职责时，该区域很可能位于一个远程的数据节点上——至少在下一次
    major compaction 之前是这样。


    ### 区域副本


    在早期版本的 HBase 中，如果一个 `RegionServer` 发生故障，需要故障切换到一个新的 `RegionServer`。由于 `RegionServer`
    并不实际存储区域的数据（数据保存在 `HDFS` 中），因此故障并非灾难性的。`master` 会检测到故障，并以类似于负载均衡操作的方式，将相关区域分配给其他的
    `RegionServer`。然而，这仍然会导致服务出现一定程度的中断。


    区域副本允许在多个 `RegionServer` 上存储区域的冗余副本。如果某个 `RegionServer` 发生故障，这些副本就可以用来服务客户端的请求。


    原始的 `RegionServer` 作为该区域的主副本。区域的只读副本被分发到其他的 `RegionServer`——如果可能的话，这些 `RegionServer`
    最好位于不同的机架——它们随后“跟随”主 `RegionServer`。对这些副本的写入操作是异步于主 `RegionServer` 的写入的，因此副本中的数据并不总是最新的。我们将在下一章探讨
    HBase 区域副本的配置如何影响一致性和可用性。


    HBase 还支持一种复制功能，可用于建立一个重复的 HBase 数据库。这通常用于在另一个数据中心复制整个 HBase 数据库。


    ## Cassandra


    在第 3 章，我们介绍了亚马逊的 `Dynamo` 数据库以及一致性哈希的概念。许多开源系统都实现了 `Dynamo` 模型。在本章中，我们将探讨 Cassandra
    的实现。


    ### Gossip 协议


    在 HBase 和 MongoDB 中，我们接触到了 `master` 节点的概念——这些节点承担特殊的监督功能，协调其他节点的活动，并记录数据库集群的当前状态。在
    Cassandra 和其他 `Dynamo` 数据库中，则没有专门的 `master` 节点。所有节点都是平等的，每个节点都能够执行集群运行所需的任何活动。


    然而，Cassandra 中的节点确实具有短期的特定职责。例如，当客户端执行一个操作时，会分配一个节点作为该操作的协调者。当有新成员加入集群时，会提名一个节点作为
    `seed` 节点，新节点将从该节点获取信息。但是，这些短期职责可以由集群中的任何节点履行。


    `master` 节点的一个优势是它可以维护集群配置和状态的权威版本。在没有 `master` 节点的情况下，Cassandra 要求集群的所有成员都保持与集群配置和状态的当前信息同步。这是通过使用
    `gossip` 协议实现的。集群的每个成员每秒钟都会将其自身状态以及它所知道的任何其他节点的状态信息，发送给集群中最多三个其他节点。通过这种方式，集群状态在所有成员中不断得到更新。


    `gossip` 这个名称非常贴切：当人们八卦时，他们通常倾向于谈论其他人！同样，在 Cassandra 中，节点不仅传播自己的状态，也会“八卦”其他节点的状态。


    集群配置被持久化在 `system` 键空间（keyspace）中，该键空间对所有集群成员开放。`keyspace` 大致类似于关系数据库中的模式（schema）——`system`
    `keyspace` 包含记录集群配置元数据的表。


    这种架构消除了集群内的任何单点故障。尽管带有 `master` 节点的分布式数据库也有策略来实现快速故障切换，但 `master` 节点的崩溃通常会导致可用性暂时下降，例如短暂地回退到只读模式。


    Cassandra 集群中 gossip 的主要话题之一是节点的可用性。传统的节点故障检测机制是节点之间发送心跳。然而，在广泛分布的系统中，心跳可能因网络问题而丢失，而非实际的节点故障。因此，Cassandra
    的故障检测更具概率性：可以认为，集群中的节点对其他节点的“担忧”会逐渐加深。如果某个节点似乎很可能宕机，那么操作就会被定向到“已知状态良好”的节点。


    '
- fmt: '## 一致性哈希


    Cassandra 和其他基于 Dynamo 的数据库使用**一致性哈希**来在集群中分布数据。`rowkey`（类似于关系数据库中的主键）被哈希化。每个节点被分配一个哈希值范围，拥有特定哈希键值范围的节点负责该数据的初始放置。


    在默认的 Cassandra 分区方案中，哈希值范围从 `-2^(63)` 到 `2^(63)-1`。因此，如果集群中有四个节点，并且我们希望为每个节点分配相等数量的哈希值，那么每个节点的大致哈希范围如下：


    | 节点 | 低哈希值 | 高哈希值 |

    | --- | --- | --- |

    | 节点 A | `-2^(63)` | `-2^(63)/2` |

    | 节点 B | `-2^(63)/2` | `0` |

    | 节点 C | `0` | `2^(63)/2` |

    | 节点 D | `2^(63)/2` | `2^(63)` |


    我们通常将集群可视化为一个环：环的圆周代表所有可能的哈希值，节点在环上的位置代表其负责的区域。图 [8-10](#A978-1-4842-1329-2_8_Chapter.html#Fig10)
    展示了一个简单的一致性哈希：`rowkey` 的值被哈希化，这决定了它在“环”上的位置。集群中的节点负责环中值的范围，从而拥有特定的 `rowkey` 值。


    ![A978-1-4842-1329-2_8_Fig10_HTML.jpg](A978-1-4842-1329-2_8_Fig10_HTML.jpg)


    图 8-10.

    一致性哈希


    图 [8-10](#A978-1-4842-1329-2_8_Chapter.html#Fig10) 中的四节点集群是均衡的，因为每个节点负责的哈希范围大小相似。但随着我们添加节点，集群有失衡的风险。如果我们将集群中的节点数量翻倍，那么可以在环上现有节点之间为新增节点分配位置，集群将保持平衡。然而，翻倍集群通常是不切实际的：逐步增长集群更经济。


    早期版本的 Cassandra 在添加新节点时有两个选项。我们可以重新映射所有的哈希范围，或者可以在现有范围内映射新节点。第一种选项会获得一个平衡的集群，但代价是昂贵的重新平衡过程。在第二种选项中，集群变得不平衡；由于每个节点负责从自身到其前驱节点之间的环区域，在不更改其他节点范围的情况下添加新节点实质上是将一个区域一分为二。图
    [8-11](#A978-1-4842-1329-2_8_Chapter.html#Fig11) 展示了向集群添加节点如何导致哈希键范围分布不均衡。


    ![A978-1-4842-1329-2_8_Fig11_HTML.jpg](A978-1-4842-1329-2_8_Fig11_HTML.jpg)


    图 8-11.

    向 Cassandra 集群添加节点（不使用虚拟节点）


    在 Cassandra、Riak 和许多其他基于 Dynamo 的系统中实现的**虚拟节点**为这个问题提供了解决方案。使用虚拟节点时，哈希范围是为相对大量的虚拟节点（通常每个物理节点
    256 个虚拟节点）计算的，然后这些虚拟节点被分配给物理节点。现在，当添加新节点时，可以将特定的虚拟节点重新分配给新节点，从而以最小的开销实现平衡配置。图
    [8-12](#A978-1-4842-1329-2_8_Chapter.html#Fig12) 说明了虚拟节点与物理节点之间的关系。


    ![A978-1-4842-1329-2_8_Fig12_HTML.jpg](A978-1-4842-1329-2_8_Fig12_HTML.jpg)


    图 8-12.

    使用虚拟节点在物理节点间分区数据


    虚拟节点还有其他一些优势。例如，更容易平衡由异构系统组成的集群，因为你可以为更强大的新机器分配更多虚拟节点，为性能较弱的旧机器分配更少的虚拟节点。此外，如果一个节点死亡，可以从更多物理机中重建它，从而更公平地分摊恢复开销。


    #### 保留顺序的分区器


    Cassandra 分区器决定了键如何在节点间分布。默认分区器使用上一节描述的一致性哈希。Cassandra 也支持保留顺序的分区器，它将数据作为实际的（例如，未哈希的）`rowkey`
    范围分布在集群的各个节点上。这样做的好处是将特定行范围的请求隔离到特定机器，但这可能导致集群不均衡，并可能产生热点，特别是如果键值是递增的。例如，如果键值是时间戳并且实现了保留顺序的分区器，那么所有新行都倾向于在集群的单个节点上创建。


    在早期版本的 Cassandra 中，可能需要使用保留顺序的分区器来优化无法通过其他方式满足的范围查询；然而，在引入二级索引之后，保留顺序的分区器主要是为了向后兼容而保留，Cassandra
    文档建议在新应用中不要使用它。


    ## 副本


    到目前为止，我们已经了解了 Cassandra 如何将数据项的初始副本分配给节点。一致性哈希算法也决定了数据项的副本存储位置。


    负责与特定 `rowkey` 值对应的哈希范围的节点称为**协调节点**。协调器负责确保写入所需数量的副本数据副本。数据必须写入的节点数量称为`复制因子`，这也是我们在第
    [3](#A978-1-4842-1329-2_3_Chapter.html) 章首次遇到的 `NWR` 表示法中的 `N`。


    默认情况下，协调器会将数据副本写入环上的接下来 `N-1` 个节点。因此，如果`复制因子`是 3，协调器会将数据项的副本发送到环上的接下来两个节点。在此场景中，每个节点将复制来自环上前面两个节点的数据，并复制到环上的后面两个节点。这个简单的方案被称为`简单复制策略`。


    Cassandra 还允许你配置更复杂和高可用的方案。`网络拓扑感知复制策略`确保副本将被写入同一数据中心内其他机架的节点，或者可选地写入另一个数据中心的节点。图
    [8-13](#A978-1-4842-1329-2_8_Chapter.html#Fig13) 说明了这两种复制策略。


    ![A978-1-4842-1329-2_8_Fig13_HTML.jpg](A978-1-4842-1329-2_8_Fig13_HTML.jpg)


    图 8-13.

    Cassandra 中的复制策略


    ## 探测器


    Cassandra 使用**探测器**来帮助优化读写操作。可以配置多种探测器。


    *   `SimpleSnitch` 仅返回环上节点的列表。这对于我们在上一节讨论的`简单复制策略`已经足够。

    *   `RackInferringSnitch` 使用主机的 IP 地址来推断其机架和数据中心位置。此探测器支持`网络感知复制策略`。

    *   `PropertyFileSnitch` 使用配置文件中的数据而不是 IP 地址来确定数据中心和机架拓扑。


    此外，所有探测器都监控请求的读取延迟，并利用此数据构建统计模型，从而可以将请求路由到性能最佳的节点。


    存在专门的探测器，它们理解各种云平台（如 Amazon EC2）内部的网络拓扑。'
  raw: '### Consistent Hashing


    Cassandra and other dynamo-based databases distribute data throughout the cluster
    by using consistent hashing. The rowkey (analogous to a primary key in an RDBMS)
    is hashed. Each node is allocated a range of hash values, and the node that has
    the specific range for a hashed key value takes responsibility for the initial
    placement of that data.


    In the default Cassandra partitioning scheme, the hash values range from -2^(63)
    to 2^(63)-1\. Therefore, if there were four nodes in the cluster and we wanted
    to assign equal numbers of hashes to each node, then the hash ranges for each
    would be approximately as follows:


    | Node | Low Hash | High Hash |

    | --- | --- | --- |

    | Node A | -2^(63) | -2^(63)/2 |

    | Node B | -2^(63)/2 | 0 |

    | Node C | 0 | 2^(63)/2 |

    | Node D | 2^(63)/2 | 2^(63) |


    We usually visualize the cluster as a ring: the circumference of the ring represents
    all the possible hash values, and the location of the node on the ring represents
    its area of responsibility. Figure [8-10](#A978-1-4842-1329-2_8_Chapter.html#Fig10)
    illustrates simple consistent hashing: the value for a rowkey is hashed, which
    determines its position on “the ring.” Nodes in the cluster take responsibility
    for ranges of values within the ring, and therefore take ownership of specific
    rowkey values.


    ![A978-1-4842-1329-2_8_Fig10_HTML.jpg](A978-1-4842-1329-2_8_Fig10_HTML.jpg)


    Figure 8-10.


    Consistent hashing


    The four-node cluster in Figure [8-10](#A978-1-4842-1329-2_8_Chapter.html#Fig10)
    is well balanced because every node is responsible for hash ranges of similar
    magnitude. But we risk unbalancing the cluster as we add nodes. If we double the
    number of nodes in the cluster, then we can assign the new nodes at points on
    the ring between existing nodes and the cluster will remain balanced. However,
    doubling the cluster is usually impractical: it’s more economical to grow the
    cluster incrementally.


    Early versions of Cassandra had two options when adding a new node. We could either
    remap all the hash ranges, or we could map the new node within an existing range.
    In the first option we obtain a balanced cluster, but only after an expensive
    rebalancing process. In the second option the cluster becomes unbalanced; since
    each node is responsible for the region of the ring between itself and its predecessor,
    adding a new node without changing the ranges of other nodes essentially splits
    a region in half. Figure [8-11](#A978-1-4842-1329-2_8_Chapter.html#Fig11) shows
    how adding a node to the cluster can unbalance the distribution of hash key ranges.


    ![A978-1-4842-1329-2_8_Fig11_HTML.jpg](A978-1-4842-1329-2_8_Fig11_HTML.jpg)


    Figure 8-11.


    Adding a node to a Cassandra cluster (without virtual nodes)


    Virtual nodes , implemented in Cassandra, Riak, and many other Dynamo-based systems,
    provide a solution to this issue. When using virtual nodes, the hash ranges are
    calculated for a relatively large number of virtual nodes—256 virtual nodes per
    physical node, typically—and these virtual nodes are assigned to physical nodes.
    Now when a new node is added, specific virtual nodes can be reallocated to the
    new node, resulting in a balanced configuration with minimal overhead. Figure
    [8-12](#A978-1-4842-1329-2_8_Chapter.html#Fig12) illustrates the relationship
    between virtual nodes and physical nodes.


    ![A978-1-4842-1329-2_8_Fig12_HTML.jpg](A978-1-4842-1329-2_8_Fig12_HTML.jpg)


    Figure 8-12.


    Using virtual nodes to partition data among physical nodes


    Virtual nodes have some other advantages. For instance, it is easier to balance
    a cluster made up of heterogeneous systems, since you can allocate more virtual
    nodes to more powerful new machines and fewer virtual nodes to underpowered older
    machines. Also, if a node dies it can be reconstituted from a larger number of
    physical machines, thus sharing the overhead of recovery more equitably across
    the cluster.


    #### Order-Preserving Partitioning


    The Cassandra partitioner determines how keys are distributed across nodes. The
    default partitioner uses consistent hashing, as described in the previous section.
    Cassandra also supports order-preserving partitioners that distribute data across
    the nodes of the cluster as ranges of actual (e.g., not hashed) rowkeys. This
    has the advantage of isolating requests for specific row ranges to specific machines,
    but it can lead to an unbalanced cluster and may create hotspots, especially if
    the key value is incrementing. For instance, if the key value is a timestamp and
    the order-preserving partitioner is implemented, then all new rows will tend to
    be created on a single node of the cluster.


    In early versions of Cassandra, the order-preserving petitioner might be warranted
    to optimize range queries that could not be satisfied in any other way; however,
    following the introduction of secondary indexes, the order-preserving petitioner
    is maintained primarily for backward compatibility, and Cassandra documentation
    recommends against its use in new applications.


    ### Replicas


    So far, we have seen how Cassandra allocates the initial copy of a data item to
    a node. The consistent hashing algorithm also determines where replicas of data
    items are stored.


    The node responsible for the hash range that equates to a specific rowkey value
    is called the coordinator node. The coordinator is responsible for ensuring that
    the required number of replica copies of the data are also written. The number
    of nodes to which the data must be written is known as the replication factor,
    and is the “N” in the NWR notation that we first encountered in Chapter [3](#A978-1-4842-1329-2_3_Chapter.html).


    By default, the coordinator will write copies of the data to the next N-1 nodes
    on the ring. So if the replication factor is 3, the coordinator will send replicas
    of the data item to the next two nodes on the ring. In this scenario, each node
    will be replicating data from the previous two nodes on the ring and replicating
    to the next two nodes on the ring. This simple scheme is referred to as the simple
    replication strategy.


    Cassandra also allows you to configure a more complex and highly available scheme.
    The Network Topology Aware replication strategy ensures that copies will be written
    to nodes on other server racks within the same data center, or optionally to nodes
    in another data center altogether. Figure [8-13](#A978-1-4842-1329-2_8_Chapter.html#Fig13)
    illustrates these two replication strategies.


    ![A978-1-4842-1329-2_8_Fig13_HTML.jpg](A978-1-4842-1329-2_8_Fig13_HTML.jpg)


    Figure 8-13.


    Replication strategies in Cassandra


    ### Snitches


    Cassandra uses snitches to help optimize read and write operations. A variety
    of snitches may be configured.


    *   The simpleSnitch returns only a list of nodes on the ring. This is sufficient
    for the simple replication strategy we discussed in the previous section.

    *   The RackInferringSnitch uses the IP addresses of hosts to infer their rack
    and data center location. This snitch supports the network aware replication strategy.

    *   The PropertyFileSnitch uses data in the configuration file rather than IP
    addresses to determine the data center and rack topology.


    In addition, all snitches monitor the read latency for requests and use this to
    build a statistical model that can route requests to the best-performing nodes.


    Specialized snitches exist that understand the networked topology inside various
    cloud platforms, such as Amazon EC2.'
