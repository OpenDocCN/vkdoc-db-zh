    The second line invokes a reducer that emits an RDD containing the counts of customers
    in each country:


    `val` `custByCountry=customers.` `map` `(x=>(x.split(",")(3),1))`


    `val` `custByCountryCount=custByCountry.` `reduceByKey` `((x,y)=> x+y)`


    In the next statement, we join the RDD containing customer counts by country ID
    with the list of Asian country IDs that we created earlier. Because we are using
    the default inner join method, this returns only customer counts for Asian regions.


    `val` `AsiaCustCount=AsianCountries.` `join` `(custByCountryCount)`


    The next join joins our RDD containing country names keyed by country code to
    the previous RDD. We now have an RDD that contains counts of customers by country
    name in the Asian region:


    `val` `AsiaCustCountryNames=AsiaCustCount.` `join` `(countryNames)`


    This Spark workflow is roughly equivalent to the Pig workflow shown in Figure
    [11-3](#A978-1-4842-1329-2_11_Chapter.html#Fig3). However, for massive datasets,
    the Spark job could be expected to complete in a fraction of the time, since every
    operation following the initial load from HDFS would complete in memory.


    ## The Return of SQL


    I don’t know about you, but as I created the examples in the chapter I was struck
    by the “Tower of Babel” impression created by the new generation of database languages.
    Say what you will about SQL, but for more than two decades database programmers
    have all been speaking the same language. As a result of the explosion of nonrelational
    systems, we’ve all been forced to speak different languages. And while some of
    these languages offer definite advantages for working with unstructured data or
    for parallelization of programming tasks, in many cases the level of abstraction
    has been reduced and the work for the programmer increased.


    So it’s not surprising that within just a few years after the enthusiasm for NoSQL,
    we’ve seen SQL return to almost every new database niche. SQL just has too many
    advantages: it’s a high-level abstraction that simplifies data access and manipulation,
    it’s a language in which literally millions of database users are conversant,
    and there are hundreds of popular business intelligence and analytic tools that
    use it under the hood as the means for getting at data.'
  trans: '

    ## 有向无环图


    Hadoop 1.0 基于 MapReduce 模式。复杂的程序可以通过链接多个 MapReduce 步骤来实现最终结果。


    长期以来，人们一直承认，虽然 MapReduce 是一个应用广泛、能支持多种作业类型的模型，但它并非适用于所有工作负载的最佳模型。特别是，MapReduce
    有着巨大的启动开销，这意味着即使是最简单的"Hello World" MapReduce 作业通常也需要数分钟而非数秒才能启动；仅这一点就使得 MapReduce
    不适用于交互式工作负载和低延迟操作。


    Hadoop 2.0 引入了 YARN 框架，它允许 Hadoop 运行基于其他处理模式的工作负载——MapReduce 只是其中一种。


    Apache Tez 项目（Tez 在印地语中意为“速度”）是众多基于 YARN 的项目之一，它为 Hadoop 提供了一个处理框架，既支持传统 Hadoop
    工作负载所特有的大规模批处理，也支持低延迟操作，从而使 Hadoop 能支持更广泛的解决方案。


    Tez 基于一种称为有向无环图（`DAG`）的灵活处理范式。这个令人望而生畏的术语实际上描述了一种熟悉的处理模型。任何检查过 SQL 执行计划的人都会遇到过
    `DAG`。这些图描述了复杂请求如何被分解为多个操作，这些操作按特定顺序执行，并且可以任意相互提供数据。MapReduce 本身就是一个 `DAG`，但 MapReduce
    范式严重限制了可以构建的图的类型。此外，MapReduce 要求图中的每个步骤都由一组独立的进程执行，而 Tez 则允许图中的多个步骤由单个进程执行，并且可能位于
    Hadoop 集群的特定节点上。


    ## Cascading


    Cascading 是一个流行的开源 Java 框架，它对 Hadoop MapReduce 或基于 YARN 的处理原语进行了抽象。在某些方面，它类似于
    Pig，因为它处理高级别的数据流和转换，使程序员免于构建低级别并行化类的繁琐工作。然而，与 Pig 不同，Cascading 集成在 Java 语言中，并且能够创建更加模块化和精密的解决方案。


    Cascading 编程模型基于源（sources）、汇（sinks）和组装成数据流的管道（pipes）。程序员通过组装这些管道来构建比 MapReduce
    更复杂的程序。这些工作流代表了前一节讨论的 `DAG`。


    ## Spark


    我们在第 7 章探讨了 Spark 项目的起源和架构。Spark 可以被认为是“基于内存的 Hadoop”，但实际上它提供的不仅仅是内存速度提升。Spark
    API 的抽象级别高于原生的 YARN 或 MapReduce 代码，在程序员生产力和执行速度方面都有所提升。


    Spark 支持 Python、Java 和其他语言的 API，但它的原生语言是 Scala，因此我们这里的示例将使用 Scala API。


    在这里，我们将文本文件（本例中来自 HDFS）加载到 Spark 弹性分布式数据集（`RDDs`）中。


    ```

    val countries=sc.textFile("COUNTRIES")

    val customers=sc.textFile("CUSTOMERS")

    ```


    Spark `RDDs` 是不可变的：我们不能更改 `RDD` 的内容；相反，我们执行操作来创建新的 `RDDs`。


    HDFS 的输入是 CSV 文件，所以在我们初始的 `RDDs` 中，输入文件的每一行都表示为一个字符串。以下是 `countries` `RDD` 中的第一个元素：


    ```

    scala> countries.first()

    res9: String = "52790,United States of America,Americas"

    ```


    在下一个例子中，我们使用 `map` 函数从每个 CSV 字符串中提取键值，并创建键值对 `RDDs`。


    ```

    val countryRegions=countries.map(x=>(x.split(",")(0),x.split(",")(2)))

    val AsianCountries=countryRegions.filter(x=> x._2.contains("Asia") )

    // 国家代码和国家名称

    val countryNames=countries.map(x=>(x.split(",")(0),x.split(",")(1)))

    ```


    第一个 `RDD` `countryRegions` 包含所有国家代码及其关联的区域。第二个（`AsianCountries`）使用 `filter()`
    方法创建一个仅包含亚洲国家的 `RDD`。第三个（`countryNames`）创建一个以国家 ID 为键、包含国家名称的 `RDD`。以下是 `countryNames`
    `RDD` 中的第一个元素：


    ```

    scala> countryNames.first()

    res12: (String, String) = (52790,United States of America)

    ```


    聚合可以通过执行 `map` 和 `reduce` 操作来创建。下面的第一行使用 `map` 为每个客户发出一个国家名称和数字 1。第二行调用一个归约器（reducer），发出一个包含每个国家客户数量的
    `RDD`：


    ```

    val custByCountry=customers.map(x=>(x.split(",")(3),1))

    val custByCountryCount=custByCountry.reduceByKey((x,y)=> x+y)

    ```


    在下一个语句中，我们将包含按国家 ID 统计的客户数量的 `RDD` 与我们之前创建的亚洲国家 ID 列表进行连接（join）。因为我们使用的是默认的内连接（inner
    join）方法，所以这只返回亚洲区域的客户计数。


    ```

    val AsiaCustCount=AsianCountries.join(custByCountryCount)

    ```


    下一个连接操作将我们包含按国家代码为键的国家名称的 `RDD` 与上一个 `RDD` 连接起来。现在我们有了一个 `RDD`，其中包含了按亚洲区域国家名称统计的客户数量：


    ```

    val AsiaCustCountryNames=AsiaCustCount.join(countryNames)

    ```


    这个 Spark 工作流大致等同于图 11-3 所示的 Pig 工作流。然而，对于海量数据集，Spark 作业预计能在更短的时间内完成，因为从 HDFS 初始加载之后的每个操作都将在内存中完成。


    ## SQL 的回归


    我不知道你怎么想，但在我为本章创建示例时，我被新一代数据库语言所营造的“巴别塔”印象所触动。无论你对 `SQL` 有何看法，但在二十多年里，数据库程序员们一直都在使用同一种语言。由于非关系型系统的激增，我们都被迫使用不同的语言。虽然其中一些语言在处理非结构化数据或并行化编程任务方面确实具有明确优势，但在许多情况下，抽象级别降低了，程序员的工作量反而增加了。


    因此，在 `NoSQL` 的热潮兴起仅仅几年后，我们就看到 `SQL` 几乎回归到了每一个新的数据库领域，这并不令人惊讶。`SQL` 的优势实在太多：它是一种简化数据访问和操作的高级别抽象，它是数以百万计的数据库用户都熟练掌握的语言，而且有数百种流行的商业智能和分析工具在底层使用它作为访问数据的手段。

    '
- fmt: '# SQL-on-Hadoop 工具对比


    ## Hive


    Hive 是 Hadoop 上最初的 SQL 引擎。我们在第 2 章讨论了 Hive 的起源和架构。从 Hadoop 的早期开始，Hive 就代表了对许多用户而言最易接触的
    Hadoop 界面。


    Hive 查询语言（`HQL`）是一种基于 SQL 的语言，接近 `SQL-92` 入门级合规性，特别是在其 `SELECT` 语句中。`INSERT`、`DELETE`
    和 `UPDATE` 等 `DML` 语句在最近的版本中得到支持，尽管 Hive 的真正目的是提供对通常通过其他方式摄取的 Hadoop 数据的查询访问。一些
    `SQL-2003` 分析窗口函数也得到支持。


    如第 2 章所述，`HQL` 被编译为 `MapReduce` 或——在后期版本中——更复杂的基于 `YARN` 的 `DAG` 算法。


    以下是一个简单的 Hive 查询，它执行与我们之前 Pig 和 Spark 示例相同的分析：


    ```sql

    0: jdbc:Hive2://> SELECT country_name, COUNT(cust_id)

    0: jdbc:Hive2://>   FROM countries co JOIN customers cu

    0: jdbc:Hive2://>    ON (cu.country_id=co.country_id)

    0: jdbc:Hive2://>  WHERE region = ''Asia''

    0: jdbc:Hive2://> GROUP BY country_name

    0: jdbc:Hive2://>  HAVING COUNT(cust_id) > 500;


    2015-10-10 11:38:55     Starting to launch local task to process map join;      maximum
    memory = 932184064

    <<Bunch of Hadoop JobTracker output deleted>>

    2015-10-10 11:39:05,928 Stage-2 map = 0%,  reduce = 0%

    2015-10-10 11:39:12,246 Stage-2 map = 100%,  reduce = 0%, Cumulative CPU 2.28
    sec

    2015-10-10 11:39:20,582 Stage-2 map = 100%,  reduce = 100%, Cumulative CPU 4.4
    sec

    +---------------+------+--+

    | country_name  |_c1   |

    +---------------+------+--+

    | China         | 712  |

    | Japan         | 624  |

    | Singapore     | 597  |

    +---------------+------+--+

    3 rows selected (29.014 seconds)

    ```


    `HQL` 语句看起来和操作起来都像 `SQL` 语句。然而，`HQL` 与常用的标准 `SQL` 之间有一些显著差异：


    *   `HQL` 支持许多表生成函数，这些函数可用于从可能包含值数组或名称：值对映射的嵌入式字段中返回多行。`Explode()` 函数为数组或映射中的每个元素返回一行，而
    `json_tuple()` 则拆分嵌入的 `JSON` 文档。

    *   Hive 提供了一个 `SORT BY` 子句，该子句请求输出仅在 `MapReduce` 管道中的每个 `reducer` 内排序。与 `ORDER
    BY` 相比，这避免了在最终 `reducer` 阶段进行大型排序，但可能不会以排序顺序返回结果。

    *   `DISTRIBUTE BY` 控制 `mapper` 如何将输出分发给 `reducer`。我们可以坚持让每个 `reducer` 接收特定列的连续范围，而不是基于键值的哈希将值分发给
    `reducer`。`DISTRIBUTE BY` 可与 `SORT BY` 结合使用，以实现结果的总体排序，而无需进行昂贵的最终排序操作。`CLUSTER
    BY` 结合了指定相同列列表的 `DISTRIBUTE BY` 和 `SORT BY` 操作的语义。


    Hive 可以查询 `HBase` 表中的数据和 `HDFS` 中保存的数据。对 `Spark` 的支持是可用的，但仍处于积极开发中。


    ## Impala


    很难高估 Hive 对 Hadoop 早期采用的重要性。Hive 为非 Java 程序员提供了一种熟悉的访问 Hadoop 中数据的机制，并允许第三方分析解决方案更轻松地与
    Hadoop 集成。


    然而，Hive 与 `RDBMS SQL` 之间的相似性不可避免地导致了不切实际的期望。`RDBMS` 用户已经习惯于将 `SQL` 作为实时查询工具，而即使是最简单的
    Hive 查询通常也需要几分钟才能完成，因为即使是最简单的查询也必须承担启动 `MapReduce` 作业的开销。此外，内存中的数据缓存通常将整体 `SQL`
    响应时间减少 90% 或更多，而 Hive 查询完全受 `I/O` 限制。Hive 的初始版本也采用了相当初级的查询优化。


    对 Hive 性能的失望导致了一项相当密集的工作来改进 Hive，现代版本的 Hive 比初始版本在性能上提高了好几个数量级。


    Cloudera 的 `Impala` 项目旨在提供低延迟、符合 `ANSI` 标准的 Hadoop 上 `SQL`。`Impala` 方法与 Hive 方法之间的关键区别在于，虽然
    Hive 程序被转换为原生 Hadoop 处理——最初是 `MapReduce`，但今天也包括 `Tez`——`Impala` 包含自己的处理架构，直接从原生
    `HDFS` 或 `HBase` 存储读取。尽管 `Impala` 绕过了 Hadoop 处理层，但它可以通过 `HCatalog` 接口访问 Hive 和
    Pig 元数据，这意味着它知道 Hive 和 Pig 表的结构。


    `Impala` 架构深受传统大规模并行处理（`MPP`）数据仓库数据库架构的影响，我们在第 8 章讨论过。`Impala` 部署守护进程——通常在每个 Hadoop
    数据节点上——并使用类似于 `RDBMS` 系统（如 `Teradata` 或 `Oracle`）使用的算法将工作分发给这些守护进程。这些守护进程随时准备工作，因此不像
    Hive 那样存在作业创建的初始延迟。


    毫无疑问，对于短时查询，`Impala` 架构提供了比 Hive 更好的性能体验。然而，鉴于 Hive 最近版本的改进，有些人声称 Hive 在更大规模上仍提供更优越的性能。这种争论的一部分是由商业
    Hadoop 公司内的营销团队推动的，因此需要仔细评估相互竞争的说法。


    ## Spark SQL


    如前所述，最近的 Hive 版本中提供了一些对 Spark 的支持。然而，`Spark` 包含自己的 `SQL` 方言，毫不奇怪地被称为 `Spark SQL`。


    您可能还记得第 7 章，`Spark SQL` 处理的是数据框（`DataFrame`）而不是弹性分布式数据集（`RDD`）。数据框可以被认为是一种更表格化和模式化的关系，相对于
    `RDD`。数据框可以从 `RDD` 或 `Hive` 表创建。


    `SQL-92` 合规性在 `Spark SQL` 中是一项正在进行的工作。'
  raw: '### Hive


    Hive is the original SQL on Hadoop. We discussed the origins and architecture
    of Hive in Chapter [2](#A978-1-4842-1329-2_2_Chapter.html). From the very early
    days of Hadoop, Hive represented the most accessible face of Hadoop for many users.


    Hive Query Language (HQL) is a SQL-based language that comes close to SQL-92 entry-level
    compliance, particularly within its SELECT statement. DML statements—such as INSERT,
    DELETE, and UPDATE—are supported in recent versions, though the real purpose of
    Hive is to provide query access to Hadoop data usually ingested via other means.
    Some SQL-2003 analytic window functions are also supported.


    As discussed in Chapter [2](#A978-1-4842-1329-2_2_Chapter.html), HQL is compiled
    to MapReduce or—in later releases—more sophisticated YARN-based DAG algorithms.


    The following is a simple Hive query that performs the same analysis as our earlier
    Pig and Spark examples:


    `0: jdbc:Hive2://>`   `SELECT` `country_name,` `COUNT``(cust_id)`


    `0: jdbc:Hive2://>`     `FROM` `countries co` `JOIN` `customers cu`


    `0: jdbc:Hive2://>`      `ON` `(cu.country_id=co.country_id)`


    `0: jdbc:Hive2://>`    `WHERE` `region = ''Asia''`


    `0: jdbc:Hive2://>` `GROUP BY` `country_name`


    `0: jdbc:Hive2://>`   `HAVING COUNT` `(cust_id) > 500;`


    `2015-10-10 11:38:55     Starting to launch local task to process map join;      maximum
    memory = 932184064`


    `<<Bunch of Hadoop JobTracker output deleted>>`


    `2015-10-10 11:39:05,928 Stage-2 map = 0%,  reduce = 0%`


    `2015-10-10 11:39:12,246 Stage-2 map = 100%,  reduce = 0%, Cumulative CPU 2.28
    sec`


    `2015-10-10 11:39:20,582 Stage-2 map = 100%,  reduce = 100%, Cumulative CPU 4.4
    sec`


    `+---------------+------+--+`


    `|` `country_name`  `|``_c1`  `|`


    `+---------------+------+--+`


    `| China         | 712  |`


    `| Japan         | 624  |`


    `| Singapore     | 597  |`


    `+---------------+------+--+`


    `3 rows selected (29.014 seconds)`


    HQL statements look and operate like SQL statements. There are a few notable differences
    between HQL and commonly used standard SQL, however:


    *   HQL supports a number of table generating functions which can be used to return
    multiple rows from an embedded field that may contain an array of values or a
    map of name:value pairs. The `Explode`() function returns one row for each element
    in an array or map, while `json_tuple()` explodes an embedded JSON document.

    *   Hive provides a `SORT BY` clause that requests output be sorted only within
    each reducer within the MapReduce pipeline. Compared to ORDER BY, this avoids
    a large sort in the final reducer stage, but may not return results in sorted
    order.

    *   `DISTRIBUTE BY` controls how mappers distribute output to reducers. Rather
    than distributing values to reducers based on hashing of key values, we can insist
    that each reducer receive contiguous ranges of a specific column. `DISTRIBUTE
    BY` can be used in conjunction with `SORT BY` to achieve an overall ordering of
    results without requiring an expensive final sort operation. `CLUSTER BY` combines
    the semantics of `DISTRIBUTE BY` and `SORT BY` operations that specify the same
    column list.


    Hive can query data in HBase tables and data held in HDFS. Support for Spark is
    available, though still under active development.


    ### Impala


    It’s difficult to overstate the significance of Hive to the early adoption of
    Hadoop. Hive allowed non-Java programmers a familiar mechanism for accessing data
    held in Hadoop, and allowed third-party analytic solutions to more easily integrate
    with Hadoop.


    However, the similarity between Hive and RDBMS SQL led inevitably to unrealistic
    expectations. RDBMS users had become used to SQL as a real-time query tool, whereas
    even the simplest Hive queries would typically take minutes to complete, since
    even the simplest query had to undertake the overhead of initiating a MapReduce
    job. Furthermore, caching of data in memory typically reduces overall SQL response
    time by 90 percent or more, while Hive queries were totally I/O bound. Initial
    releases of Hive also employed fairly primitive query optimization.


    Disappointment with Hive performance led to a fairly intensive effort to improve
    Hive, and modern versions of Hive outperform the initial releases by several orders
    of magnitude.


    Cloudera’s Impala project aims to provide low-latency ANSI-compliant SQL on Hadoop.
    The key difference between Impala’s approach and that of Hive is that while Hive
    programs are translated to native Hadoop processing—initially MapReduce but today
    including Tez— Impala includes its own processing architecture that reads directly
    from native HDFS or HBase storage. Although Impala bypasses the Hadoop processing
    layer, it can access Hive and Pig metadata through the HCatalog interface, which
    means it knows the structure of Hive and Pig tables.


    Impala architecture is heavily influenced by traditional massively parallel processing
    (MPP) data warehouse database architectures, which we discussed in Chapter [8](#A978-1-4842-1329-2_8_Chapter.html).
    Impala deploys daemon processes—typically on each Hadoop data node—and distributes
    work to these daemons using algorithms similar to those used by RDBMS systems,
    such as Teradata or Oracle. These daemon processes are always ready for action,
    so there is no initial latency involved in job creation as there is in Hive.


    There’s no doubt that the Impala architecture offers a better performance experience
    for short-duration queries than Hive. However, given improvements in recent releases
    of Hive, there are those who claim that Hive still offers superior performance
    at greater scale. Some of this debate is driven by marketing groups within commercial
    Hadoop companies, so careful evaluation of competing claims is warranted.


    ### Spark SQL


    As noted earlier, there is some support for Spark within recent releases of Hive.
    However, Spark includes its own SQL dialect, called—not surprisingly—Spark SQL.


    You may recall from Chapter [7](#A978-1-4842-1329-2_7_Chapter.html) that Spark
    SQL works with data frames rather than RDDs. Data frames can be thought of as
    a more tabular and schematized relation to the RDD. A data frame can be created
    from an RDD, or from a Hive table.


    SQL-92 compliance is a work in progress within Spark SQL.'
  trans: '# SQL-on-Hadoop 工具对比


    ## Hive


    Hive 是 Hadoop 上最初的 SQL 引擎。我们在第 2 章讨论了 Hive 的起源和架构。从 Hadoop 的早期开始，Hive 就代表了对许多用户而言最易接触的
    Hadoop 界面。


    Hive 查询语言（`HQL`）是一种基于 SQL 的语言，接近 `SQL-92` 入门级合规性，特别是在其 `SELECT` 语句中。`INSERT`、`DELETE`
    和 `UPDATE` 等 `DML` 语句在最近的版本中得到支持，尽管 Hive 的真正目的是提供对通常通过其他方式摄取的 Hadoop 数据的查询访问。一些
    `SQL-2003` 分析窗口函数也得到支持。


    如第 2 章所述，`HQL` 被编译为 `MapReduce` 或——在后期版本中——更复杂的基于 `YARN` 的 `DAG` 算法。


    以下是一个简单的 Hive 查询，它执行与我们之前 Pig 和 Spark 示例相同的分析：


    ```sql

    0: jdbc:Hive2://> SELECT country_name, COUNT(cust_id)

    0: jdbc:Hive2://>   FROM countries co JOIN customers cu

    0: jdbc:Hive2://>    ON (cu.country_id=co.country_id)

    0: jdbc:Hive2://>  WHERE region = ''Asia''

    0: jdbc:Hive2://> GROUP BY country_name

    0: jdbc:Hive2://>  HAVING COUNT(cust_id) > 500;


    2015-10-10 11:38:55     Starting to launch local task to process map join;      maximum
    memory = 932184064

    <<Bunch of Hadoop JobTracker output deleted>>

    2015-10-10 11:39:05,928 Stage-2 map = 0%,  reduce = 0%

    2015-10-10 11:39:12,246 Stage-2 map = 100%,  reduce = 0%, Cumulative CPU 2.28
    sec

    2015-10-10 11:39:20,582 Stage-2 map = 100%,  reduce = 100%, Cumulative CPU 4.4
    sec

    +---------------+------+--+

    | country_name  |_c1   |

    +---------------+------+--+

    | China         | 712  |

    | Japan         | 624  |

    | Singapore     | 597  |

    +---------------+------+--+

    3 rows selected (29.014 seconds)

    ```


    `HQL` 语句看起来和操作起来都像 `SQL` 语句。然而，`HQL` 与常用的标准 `SQL` 之间有一些显著差异：


    *   `HQL` 支持许多表生成函数，这些函数可用于从可能包含值数组或名称：值对映射的嵌入式字段中返回多行。`Explode()` 函数为数组或映射中的每个元素返回一行，而
    `json_tuple()` 则拆分嵌入的 `JSON` 文档。

    *   Hive 提供了一个 `SORT BY` 子句，该子句请求输出仅在 `MapReduce` 管道中的每个 `reducer` 内排序。与 `ORDER
    BY` 相比，这避免了在最终 `reducer` 阶段进行大型排序，但可能不会以排序顺序返回结果。

    *   `DISTRIBUTE BY` 控制 `mapper` 如何将输出分发给 `reducer`。我们可以坚持让每个 `reducer` 接收特定列的连续范围，而不是基于键值的哈希将值分发给
    `reducer`。`DISTRIBUTE BY` 可与 `SORT BY` 结合使用，以实现结果的总体排序，而无需进行昂贵的最终排序操作。`CLUSTER
    BY` 结合了指定相同列列表的 `DISTRIBUTE BY` 和 `SORT BY` 操作的语义。


    Hive 可以查询 `HBase` 表中的数据和 `HDFS` 中保存的数据。对 `Spark` 的支持是可用的，但仍处于积极开发中。


    ## Impala


    很难高估 Hive 对 Hadoop 早期采用的重要性。Hive 为非 Java 程序员提供了一种熟悉的访问 Hadoop 中数据的机制，并允许第三方分析解决方案更轻松地与
    Hadoop 集成。


    然而，Hive 与 `RDBMS SQL` 之间的相似性不可避免地导致了不切实际的期望。`RDBMS` 用户已经习惯于将 `SQL` 作为实时查询工具，而即使是最简单的
    Hive 查询通常也需要几分钟才能完成，因为即使是最简单的查询也必须承担启动 `MapReduce` 作业的开销。此外，内存中的数据缓存通常将整体 `SQL`
    响应时间减少 90% 或更多，而 Hive 查询完全受 `I/O` 限制。Hive 的初始版本也采用了相当初级的查询优化。


    对 Hive 性能的失望导致了一项相当密集的工作来改进 Hive，现代版本的 Hive 比初始版本在性能上提高了好几个数量级。


    Cloudera 的 `Impala` 项目旨在提供低延迟、符合 `ANSI` 标准的 Hadoop 上 `SQL`。`Impala` 方法与 Hive 方法之间的关键区别在于，虽然
    Hive 程序被转换为原生 Hadoop 处理——最初是 `MapReduce`，但今天也包括 `Tez`——`Impala` 包含自己的处理架构，直接从原生
    `HDFS` 或 `HBase` 存储读取。尽管 `Impala` 绕过了 Hadoop 处理层，但它可以通过 `HCatalog` 接口访问 Hive 和
    Pig 元数据，这意味着它知道 Hive 和 Pig 表的结构。


    `Impala` 架构深受传统大规模并行处理（`MPP`）数据仓库数据库架构的影响，我们在第 8 章讨论过。`Impala` 部署守护进程——通常在每个 Hadoop
    数据节点上——并使用类似于 `RDBMS` 系统（如 `Teradata` 或 `Oracle`）使用的算法将工作分发给这些守护进程。这些守护进程随时准备工作，因此不像
    Hive 那样存在作业创建的初始延迟。


    毫无疑问，对于短时查询，`Impala` 架构提供了比 Hive 更好的性能体验。然而，鉴于 Hive 最近版本的改进，有些人声称 Hive 在更大规模上仍提供更优越的性能。这种争论的一部分是由商业
    Hadoop 公司内的营销团队推动的，因此需要仔细评估相互竞争的说法。


    ## Spark SQL


    如前所述，最近的 Hive 版本中提供了一些对 Spark 的支持。然而，`Spark` 包含自己的 `SQL` 方言，毫不奇怪地被称为 `Spark SQL`。


    您可能还记得第 7 章，`Spark SQL` 处理的是数据框（`DataFrame`）而不是弹性分布式数据集（`RDD`）。数据框可以被认为是一种更表格化和模式化的关系，相对于
    `RDD`。数据框可以从 `RDD` 或 `Hive` 表创建。


    `SQL-92` 合规性在 `Spark SQL` 中是一项正在进行的工作。'
- fmt: '### Couchbase N1QL


    到目前为止，我们看到的 SQL 都是在 Hadoop 和 Spark 等分析系统的上下文中使用的。NoSQL 类型的操作型数据库并没有如此迅速地实现 SQL；然而，在
    2015 年，Couchbase 宣布了非第一范式查询语言（Non-first Normal Form Query Language， N1QL），发音为“Nickel”，这是一个几乎完整的
    SQL 语言实现，用于文档数据库，并在 Couchbase Server 4.0 中实现。


    例如，考虑图 11-4 所示的示例数据（这是我们之前用于 MongoDB 的相同示例数据）。


    ![A978-1-4842-1329-2_11_Fig4_HTML.jpg](A978-1-4842-1329-2_11_Fig4_HTML.jpg)


    图 11-4. Couchbase 示例文档


    ## 基本查询


    N1QL 允许我们执行基本查询，以检索选定的文档或选定文档的属性：


    ```

    cbq> SELECT `Title` FROM films WHERE _id=200;

    {

    "requestID": "0d5cff15-f5e7-434d-9dc4-d950ef5e21f8",

    "signature": {

    "Title": "json"

    },

    "results": [

    {

    "Title": "CURTAIN VIDEOTAPE"

    }

    ],

    "status": "success",

    ```


    ## 访问嵌套文档


    N1QL 允许我们使用数组表示法访问 JSON 结构中的嵌套文档。因此，例如，在下面的示例中，`Actors[0]` 指的是 `Actors` 数组中的第一个嵌套文档：


    ```

    cbq> SELECT Actors[0].`First name`, Actors[0].`Last name`

    >   FROM films where _id=200;

    {

    "requestID": "5aa27ec1-ce4d-4452-a137-2239b88e47fe",

    "results": [

    {

    "First name": "JOE",

    "Last name": "SWANK"

    }

    ],

    "status": "success",

    ```


    ## 使用 WHERE ANY 查询子文档


    我们可以使用 `WHERE ANY` 语法查询符合搜索条件的子文档：


    ```

    cbq> SELECT `Title` FROM films

    >   WHERE ANY Actor IN films.Actors SATISFIES

    >   ( Actor.`First name`="JOE" AND Actor.`Last name`="SWANK" ) END;

    {

    "requestID": "f3d6dd05-912d-437b-984f-214770f87076",

    "results": [

    {

    "Title": "CHOCOLAT HARRY"

    },

    {

    "Title": "CHOCOLATE DUCK"

    },

    ... ...

    ```


    ## 使用 UNNEST 连接嵌套文档


    `UNNEST` 命令允许将嵌入的文档“连接”回父文档。因此，这里我们为每位出演电影 200 的演员返回一个结果，结果中包含电影标题：


    ```

    cbq> SELECT f.`Title`, a.`First name`, a.`Last name`

    >   FROM films f

    >   UNNEST f.Actors a

    >   WHERE f._id=200;

    {

    "requestID": "f8227647-3506-4bfd-a538-3f8a0d038198",

    "results": [

    {

    "First name": "JOE",

    "Last name": "SWANK",

    "Title": "CURTAIN VIDEOTAPE"

    },

    {

    "First name": "WALTER",

    "Last name": "TORN",

    "Title": "CURTAIN VIDEOTAPE"

    },

    ... ...

    ],

    "status": "success",

    }

    ```


    `UNNEST` 命令允许我们在子文档嵌套在父文档内时，执行等同于父文档和子文档之间连接的操作。N1QL 还允许我们在独立文档之间进行连接，前提是一篇文档包含对另一篇文档主键的引用。


    因此，例如，如果我们有一个包含我们假想的（现在肯定陷入困境的）DVD 店中“逾期”电影主键的文档存储桶，那么我们可以使用 `ON KEYS` 连接语法将其连接到
    `films` 集合，仅返回那些电影：


    ```

    cbq> SELECT f.`Title` FROM overdues

    >   JOIN films f ON KEYS overdues.filmId ;

    {

    "requestID": "6f0f505e-72f6-404d-9e20-953850dc9524",

    "results": [

    {

    "Title": "CURTAIN VIDEOTAPE"

    },

    {

    "Title": "HARPER DYING"

    }

    ],

    "status": "success",

    ```


    ## 总结


    N1QL 还包括 DML 语句，允许我们操作文档内容，以及 DDL 语句，允许创建和修改索引。


    N1QL 是一个雄心勃勃的尝试，旨在将 SQL 引入文档数据库的世界。有趣的是，在 CouchBase 等公司向其数据库引入 SQL 支持的同时，Oracle
    等公司也在其基于 SQL 的数据库中引入了强大的 JSON 支持。这两个世界似乎正在融合。'
  raw: '### Couchbase N1QL


    So far we’ve seen SQL used within the context of analytic systems such as Hadoop
    and Spark. Operational databases of the NoSQL variety have not been so quick to
    implement SQL; however, in 2015, Couchbase announced Non-first Normal Form Query
    Language (N1QL), pronounced “Nickel,” a virtually complete SQL language implementation
    for use with document databases and implemented within the Couchbase server 4.0.


    For example, consider the sample data shown in Figure [11-4](#A978-1-4842-1329-2_11_Chapter.html#Fig4)
    (this is the same sample data we used for MongoDB earlier).


    ![A978-1-4842-1329-2_11_Fig4_HTML.jpg](A978-1-4842-1329-2_11_Fig4_HTML.jpg)


    Figure 11-4.


    Couchbase sample document


    N1QL allows us to perform basic queries to retrieve selected documents or attributes
    of selected documents:


    `cbq>` `SELECT` `` `Title` `` `FROM` `films` `WHERE` `_id=200;`


    `{`


    `"requestID": "0d5cff15-f5e7-434d-9dc4-d950ef5e21f8",`


    `"signature": {`


    `"Title": "json"`


    `},`


    `"``results``": [`


    `{`


    `"``Title``": "CURTAIN VIDEOTAPE"`


    `}`


    `],`


    `"status": "success",`


    N1QL allows us to access nested documents within the JSON structure using array
    notation. So, for instance, in the example that follows, `Actors[0]` refers to
    the first nested document within the actors array:


    `cbq>`  `SELECT` `` Actors[0].`First name` , Actors[0].`Last name` ``


    `>`   `FROM` `films where _id=200;`


    `{`


    `"requestID": "5aa27ec1-ce4d-4452-a137-2239b88e47fe",`


    `"``results``": [`


    `{`


    `"``First name``": "JOE",`


    `"``Last name``": "SWANK"`


    `}`


    `],`


    `"status": "success",`


    We can query for subdocuments that match a search criteria using `WHERE ANY` syntax:


    `cbq>` `SELECT` `` `Title` `` `FROM` `films`


    `>`  `WHERE ANY` `Actor` `IN` `films.Actors` `SATISFIES`


    ``>   ( Actor.`First name`="JOE"`` `AND` ``Actor.`Last name`="SWANK" )`` `END``;`


    `{`


    `"requestID": "f3d6dd05-912d-437b-984f-214770f87076",`


    `"results": [`


    `{`


    `"Title": "CHOCOLAT HARRY"`


    `},`


    `{`


    `"Title": "CHOCOLATE DUCK"`


    `},`


    `... ...`


    The `UNNEST` command allows embedded documents to be “joined” back up to the parent
    document. So here we get one result for each actor who starred in film 200, with
    the film title included in the results:


    `cbq>` `SELECT` `` f.`Title` ,a.`First name` ,a.`Last name` ``


    `>`   `FROM` `films f`


    `>`  `UNNEST` `f.Actors a`


    `>`  `WHERE` `f._id=200;`


    `{`


    `"requestID": "f8227647-3506-4bfd-a538-3f8a0d038198",`


    `"results": [`


    `{`


    `"First name": "JOE",`


    `"Last name": "SWANK",`


    `"Title": "CURTAIN VIDEOTAPE"`


    `},`


    `{`


    `"First name": "WALTER",`


    `"Last name": "TORN",`


    `"Title": "CURTAIN VIDEOTAPE"`


    `},`


    `... ...`


    `],`


    `"status": "success",`


    `}`


    The `UNNEST` command allows us to perform the equivalent of joins between parent
    and child documents when the child documents are nested within the parent. N1QL
    also allows us to join between independent documents, providing that one of the
    documents contains a reference to the primary key in the other.


    So, for instance, if we had a bucket of documents that contained the primary keys
    of “overdue” films in our imaginary (and by now definitely struggling) DVD store,
    then we can join that to the films collection to return-just those films using
    the `ON KEYS` join syntax:


    `cbq>` `SELECT`  `` f.`Title` `` `FROM` `overdues`


    `>`   `JOIN` `films` `f ON KEYS` `overdues.filmId ;`


    `{`


    `"requestID": "6f0f505e-72f6-404d-9e20-953850dc9524",`


    `"results": [`


    `{`


    `"Title": "CURTAIN VIDEOTAPE"`


    `},`


    `{`


    `"Title": "HARPER DYING"`


    `}`


    `],`


    `"status": "success",`


    N1QL also includes DML statements allowing us to manipulate the contents of documents
    and DDL statements allowing creation and modification of indexes.


    N1QL is an ambitious attempt to bring SQL into the world of document databases.
    It’s interesting to consider that at the same time as companies like CouchBase
    are introducing SQL support into their database, companies like Oracle are introducing
    strong JSON support into their SQL-based database. It would seem that the two
    worlds are coming together.'
