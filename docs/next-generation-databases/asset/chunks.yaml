  trans: '

    ### 日志结构合并树


    日志结构合并（LSM）树是一种旨在优化存储并支持极高插入速率，同时仍能支持高效随机读取访问的结构。


    一个最简单的 LSM 树由两个带索引的“树”组成：


    *   一个**内存中的树**，它是所有新记录插入的接收者。在 Cassandra 中，这个内存中的树被称为`MemTable`，在 HBase 中则被称为`MemStore`。

    *   多个**磁盘上的树**，它们代表已刷新到磁盘的内存中树的副本。在 Cassandra 中，这个磁盘结构被称为`SSTable`，在 HBase 中则被称为`StoreTable`。


    磁盘上的树文件最初是内存中树的实时点副本，但会定期合并以创建更大的合并存储。这个合并过程被称为合并。


    **注意**


    日志结构合并树是一种被广泛采用的架构，是 BigTable、HBase、Cassandra 和其他数据库的基础。然而，不同实现中的命名约定有所不同。为方便起见，我们默认使用
    Cassandra 的术语，其中内存中的树称为`MemTable`，磁盘上的树称为`SSTables`。


    LSM 架构确保写入始终快速，因为它们以内存速度运行。向磁盘的传输也很快，因为它以仅追加的批处理方式进行，从而实现快速的顺序写入。读取要么来自内存中的树，要么来自磁盘上的树；无论哪种情况，读取都通过索引进行辅助，并且相对迅速。


    当然，如果数据在内存存储中时服务器发生故障，那么数据可能会丢失。因此，实现 LSM 模式的数据库都包含某种形式的事务日志，以便在发生故障时可以恢复更改。此日志文件大致相当于关系数据库的事务（重做）日志。在
    Cassandra 中，它被称为`CommitLog`，在 HBase 中，则称为预写日志（`WAL`）。一旦内存中的树刷新到磁盘，这些日志条目就可以被丢弃。


    图 10-11 使用 Cassandra 术语说明了日志结构合并树架构。来自数据库客户端的写入首先应用于`CommitLog`（1），然后应用于`MemTable`（2）。一旦`MemTable`达到特定大小，它将被刷新到磁盘以创建新的`SSTable`（3）。刷新完成后，`CommitLog`记录可以被清除（4）。定期地，多个`SSTables`被合并（压缩）成更大的`SSTables`（5）。


    ![A978-1-4842-1329-2_10_Fig11_HTML.jpg](img/A978-1-4842-1329-2_10_Fig11_HTML.jpg)


    图 10-11.


    LSM 架构（Cassandra 术语）


    #### SSTable 与布隆过滤器


    LSM 树的磁盘部分是一个带索引的结构。例如，在 Cassandra 中，每个`SSTable`都与一个索引相关联，该索引包含`SSTable`中存在的所有行键以及文件中相关值位置的偏移量。然而，磁盘上可能有很多`SSTables`，这会对索引查找产生倍增效应，因为理论上我们必须检查每个`SSTable`的每个索引才能找到所需的行。


    为避免这些多次索引查找，使用了布隆过滤器来减少必须执行的查找次数。


    布隆过滤器通过对键值应用多个哈希函数来创建。哈希函数的输出用于设置布隆过滤器结构中的位。在布隆过滤器中查找键值时，我们执行相同的哈希函数并查看位是否被设置。如果位未设置，则搜索值一定不包含在表中。但是，如果位被设置，可能是因为某个值恰好哈希到相同的值。最终结果是一个通常将大小减少
    85%，但仅产生 15%误报率的索引。


    布隆过滤器足够紧凑以适应内存，并且导航速度非常快。然而，为了实现这种压缩，布隆过滤器在某种意义上是“模糊”的，因为它们可能返回假阳性。如果从布隆过滤器得到阳性结果，仅意味着该文件可能包含该值。但是，布隆过滤器永远不会错误地告知您某个值不存在。因此，如果布隆过滤器告诉我们某个键未包含在特定的`SSTable`中，那么我们可以安全地从查找中省略该`SSTable`。


    图 10-12 显示了使用 Cassandra 术语的日志结构合并树的读取模式。数据库请求首先从`MemTable`读取（1）。如果未找到所需值，它将查询最新`SSTable`的布隆过滤器（2）。如果布隆过滤器表明不存在匹配的值，它将检查下一个`SSTable`（3）。如果布隆过滤器表明`SSTable`中可能存在匹配的键值，则该过程将使用`SSTable`索引（4）在`SSTable`内搜索该值（5）。一旦找到匹配的值，就不需要检查更旧的`SSTables`。


    ![A978-1-4842-1329-2_10_Fig12_HTML.jpg](img/A978-1-4842-1329-2_10_Fig12_HTML.jpg)


    图 10-12.


    日志结构合并树读取（Cassandra 术语）


    #### 更新与墓碑标记


    `SSTables`是不可变的——也就是说，一旦`MemTable`被刷新到磁盘并成为`SSTable`，就不能再对`SSTable`进行进一步的修改。如果一个值在一段时间内被反复修改，这些修改将累积在多个`SSTables`中。检索值时，系统将从最新到最旧的`SSTables`读取，以找到列的最新值，或构建完整的行。因此，要更新一个值，我们只需要插入新值，因为当存在较新版本时，不会检查较旧的值。


    删除操作通过将墓碑标记写入`MemTable`来实现，该标记最终会传播到`SSTables`。一旦遇到某行的墓碑标记，系统将停止检查更旧的条目，并向应用程序报告“未找到行”。


    #### 合并


    随着`SSTables`数量的增加，由于布隆过滤器、索引和过时值的数量增多，读取性能和存储会下降。因此，系统会定期将多个`SSTables`合并成一个文件。在合并过程中，分散在多个`SSTables`中的行会被合并，已删除的行会被移除。


    但是，墓碑标记会在系统中保留一段时间，以确保对行的延迟更新不会使本应保持删除状态的行复活。如果在较旧的对该行的更新仍在系统中传播时移除了墓碑标记，就可能发生这种情况。为避免这种可能性，默认设置防止墓碑标记被删除超过一周，而暗示性传递（参见第
    8 章）通常仅在三小时后过期。但是，如果这些默认设置被调整，或者发生异常长的网络分区，可以想象被删除的行将会复活。

    '
- fmt: '### Secondary Indexing


    A secondary index allows us to quickly find rows that meet some criteria other
    than their primary key or `rowkey` value.


    Secondary indexes are ubiquitous in relational systems: it’s a fundamental characteristic
    of a relational system that you be able to navigate primary key and foreign key
    relationships, and this would be impractical if only primary key indexes existed.
    In relational systems, primary key indexes and secondary indexes are usually implemented
    in the same way: most commonly with `B-tree` indexes, or sometimes with `bitmap`
    indexes.


    We discussed in [Chapter 6](#A978-1-4842-1329-2_6_Chapter.html) how columnar databases
    often use projections as an alternative to indexes: this approach works in columnar
    systems because queries typically aggregate data across a large number of rows
    rather than seeking a small number of rows matching a specific criteria. We also
    discussed in [Chapter 5](#A978-1-4842-1329-2_5_Chapter.html) how graph databases
    use index-free adjacency to perform efficient graph traversal without requiring
    a separate index structure.


    Neither of these solutions are suitable for nonrelational operational database
    systems. The underlying design of key-value stores, BigTable systems, and document
    databases assumes data retrieval by a specific key value, and indeed in many cases—especially
    in earlier key-value systems—lookup by `rowkey` value is the only way to find
    a row.


    However, for most applications, fast access to data by primary key alone is not
    enough. So most nonrelational databases provide some form of secondary index support,
    or at least provide patterns for “do-it-yourself” secondary indexing.


    #### DIY Secondary Indexing


    Creating a secondary index for a key-value store is conceptually fairly simple.
    You create a table in which the key value is the column or attribute to be indexed,
    and that contains the `rowkey` for the primary table.


    Figure [10-13](#A978-1-4842-1329-2_10_Chapter.html#Fig13) illustrates the technique.
    The table `USERS` contains a unique identifier (the `rowkey`) for each user, but
    we often want to retrieve users by email address. Therefore, we create a separate
    table in which the primary key is the user’s email address and that contains the
    `rowkey` for the source table.


    ![A978-1-4842-1329-2_10_Fig13_HTML.jpg](A978-1-4842-1329-2_10_Fig13_HTML.jpg)


    Figure 10-13. Do-it-yourself secondary indexing


    Variations on the theme allow for indexing of non-unique values. For instance,
    in a wide column store such as `HBase`, an index entry might consist of multiple
    columns that point to the rows matching the common value as shown in the “`COUNTRY`”
    index in Figure [10-13](#A978-1-4842-1329-2_10_Chapter.html#Fig13).


    However, there are some significant problems with the do-it-yourself approach
    outlined above:


    *   It’s up to the application code to consistently maintain both the data in
    the base table and all of its indexes. Bugs in application code or ad hoc manipulation
    of data using alternative clients can lead to missing or incorrect data in the
    index.

    *   Ideally, the operations that modify the base table and the operation that
    modifies the index will be atomic: either both succeed or neither succeeds. However,
    in nonrelational databases, multi-object transactions are rarely available. If
    the index operation succeeds but not the base table modification (or vice versa),
    then the index will be incorrect.

    *   Eventual consistency raises a similar issue: an application may read from
    the index an entry that has not yet been propagated to every replica of the base
    table (or vice versa).

    *   The index table supports equality lookups, but generally not range operations,
    since unlike as in the `B-tree` structure, there is no pointer from one index
    entry to the next logical entry.


    Do-it-yourself indexing is not completely impractical, but it places a heavy burden
    on the application and leads in practice to unreliable and fragile implementations.
    Most of these issues are mitigated when a database implements a native secondary
    indexing scheme. The secondary index implementation can be made independent of
    the application code, and the database engine can ensure that index entries and
    base table entries are maintained consistently.


    #### Global and Local Indexes


    Distributed databases raise additional issues for indexing schemes. If index entries
    are partitioned using normal mechanisms—either by consistent hashing of the key
    value or by using the key value as a shard key—then the index entry for a base
    table row is typically going to be located on a different node. As a result, most
    lookups will usually span two nodes and hence require two `IO` operations.


    If the indexed value is unique, then the usual sharding or hashing mechanisms
    will distribute data evenly across the cluster. However, if the key value is non-unique,
    and especially if there is significant skew in the distribution of values, then
    index entries and hence index load may be unevenly distributed. For instance,
    the index on `COUNTRY` in Figure [10-13](#A978-1-4842-1329-2_10_Chapter.html#Fig13)
    would result in the index entries for the largest country (`USA`, in our example)
    being located on a single node.


    To avoid these issues, secondary indexes in nonrelational databases are usually
    implemented as local indexes. Each node maintains its own index, which references
    data held only on the local node. Index-dependent queries are issued to each node,
    which returns any matching data via its local index to the query coordinator,
    which combines the results.


    Figure [10-14](#A978-1-4842-1329-2_10_Chapter.html#Fig14) illustrates the local
    secondary indexing approach. A database client requests data for a specific non-key
    value (1). A query coordinator sends these requests to each node in the cluster
    (2). Each node examines its local index to determine if a matching value exists
    (3). If a matching value exists in the index, then the `rowkey` is retrieved from
    the index and used to retrieve data from the base table (4). Each node returns
    data to the query coordinator (5), which consolidates the results and returns
    them to the database client (6).


    ![A978-1-4842-1329-2_10_Fig14_HTML.jpg](A978-1-4842-1329-2_10_Fig14_HTML.jpg)


    Figure 10-14. Local secondary indexing'
