- fmt: '### Review of the Relational Model of Data


    Before diving into nonrelational data models, let''s quickly recapitulate the
    relational model, which dominated the last generation of database systems and
    which remains the most widely adopted data model today. The relational model forms
    the basis not just for the traditional `RDBMS` but also for databases of the `NewSQL`
    variety—databases such as `Vertica` and `VoltDB`, for instance. We provided an
    overview of the relational model back in [Chapter 1](#A978-1-4842-1329-2_1_Chapter.html),
    and of course the relational data model is supported by a vast body of literature.
    What follows is a brief summary.


    The relational model organizes values into tuples (rows). Multiple tuples are
    used to construct relations (tables). Rows are identified by key values and—at
    least in third normal form—all values will be locatable by the entire primary
    key and nothing else. Foreign keys define relationships between tables by referencing
    the primary keys in another table.


    The process of eliminating redundancy from a relational model is known as normalization.
    Figure [10-1](#A978-1-4842-1329-2_10_Chapter.html#Fig1) provides an example of
    un-normalized and normalized data.


    ![A978-1-4842-1329-2_10_Fig1_HTML.jpg](A978-1-4842-1329-2_10_Fig1_HTML.jpg)

    Figure 10-1. Normalized relational data model


    The star schema represents a data modeling pattern commonly found—indeed, almost
    always found—in data warehouses. In a star schema, a large “fact” table contains
    detailed business data and contains foreign keys to smaller more static “dimension”
    tables that categorize the fact items in business terms, typically including time,
    product, customer, and so on.


    Figure [10-2](#A978-1-4842-1329-2_10_Chapter.html#Fig2) shows an example of a
    star schema. The central `SALES` fact table contains sales totals that are aggregated
    across various time periods, products, and customers. The detail and explanation
    of each aggregation can be found by joining to the dimension tables `TIMES`, `PRODUCTS`,
    and `CUSTOMERS`.


    ![A978-1-4842-1329-2_10_Fig2_HTML.jpg](A978-1-4842-1329-2_10_Fig2_HTML.jpg)

    Figure 10-2. Star schema


    ### Key-value Stores


    Unlike the relational model, there is no formal definition for how data is represented
    in a key-value store. Typically a key-value store will accept any binary value
    within specific size limits as a key and is capable of storing any binary data
    as a value. In this respect, we might say that the key-value store is data-type
    agnostic. However, most key-value stores provide additional support for certain
    types of data. The support stems from the desire to provide one of the following
    features:


    *   Secondary indexes. In a pure key-value store, the only way to locate an object
    is via its key. However, most applications perform lookups on non-key terms. For
    instance, we may wish to locate all users within a geography, all orders for a
    specific company, and so on.

    *   Conflict resolution. Key-value stores that provide eventual consistency or
    `Amazon Dynamo`-style tunable consistency may implement special data types that
    facilitate conflict resolution.


    `Riak`, a key-value store based on `Amazon`''s `Dynamo` specification, illustrates
    both of these patterns.


    As well as binary objects, `Riak` allows for data to be defined as one of the
    following:


    *   A `Riak` convergent replicated data type (`CRDT`). These data types, described
    in more detail below, include maps, sets, and counters. Conflicting operations
    on these data types can be resolved by `Riak` without requiring application or
    human intervention.

    *   A document type, such as `XML`, `JSON`, or `Text`.

    *   A custom data type.


    `Riak` includes `Solr`, an open-source text search engine. When a `Riak` value
    is defined as one of the built-in data types, or as a custom data type for which
    you have provided a custom search code, then `Solr` will index the value and provide
    a variety of lookup features, including exact match, regular expression, and range
    searches.


    In the case of `JSON`, `XML`, and `Riak` maps, searches can be restricted to specific
    fields within the document. So, for instance, you could search for documents that
    have a specific value for a specific `JSON` attribute.


    #### Convergent Replicated Data Types


    We touched on convergent replicated data types (`CRDT`) in [Chapter 9](#A978-1-4842-1329-2_9_Chapter.html).
    As we noted there, `Riak` users vector clocks to determine if two updates potentially
    conflict. By default, if after the examination of the vector clocks for two conflicting
    updates the system cannot determine which of the updates is most correct, then
    `Riak` will maintain both versions of the update by creating sibling values, which
    must be resolved by the user or application.


    `CRDT`s allow two conflicting updates to be merged even if their vector clocks
    indicate that they are concurrent. A `CRDT` encapsulates deterministic rules that
    can be used either to merge the conflicting values or to determine which of two
    conflicting values should “win” and be propagated.


    When a `CRDT` value is propagated between nodes, it includes not just the current
    value of the object but also a history of operations that have been applied to
    the object. This history is somewhat analogous to the vector clock data that accompanies
    each update in a `Riak` system, but unlike a vector clock, it contains information
    specifically pertaining to the history of a specific object.


    The simplest example of `CRDT` merging involves the `g-counter` (grow-only counter)
    data type. This is a monotonically incrementing counter that cannot be decremented
    (e.g., you can increase the counter, but you cannot decrease its value).


    You might think that you could merge `g-counter` updates simply by adding up all
    the increment operations that have occurred on every node to determine the total
    counter value. However, this approach ignores the possibility that some of these
    increment operations are replicas of other increment operations. To avoid such
    double counting, each node maintains an array of the counter values received from
    every node. Upon incrementing, the node increments its element in the array and
    then transmits the entire array to other nodes. Should a conflict between updates
    be detected (through the vector clock mechanism), we take the highest element
    for each node in each version and add them up.


    That last sentence was quite a mouthful, but it''s still simpler than the mathematical
    notation! Stepping through the example shown in Figure [10-3](#A978-1-4842-1329-2_10_Chapter.html#Fig3)
    will, we hope, illuminate the process.


    ![A978-1-4842-1329-2_10_Fig3_HTML.jpg](A978-1-4842-1329-2_10_Fig3_HTML.jpg)

    Figure 10-3. Convergent replicated data type g-counter


    *   At time `t0`, each node has a value of `0` for the counter, and each element
    in the array of counters (one for each node) is also set to `0`.

    *   Around time `t1`, node `1` receives an increment operation on the counter
    of `+1`, while node `2` receives an increment operation of `+2`. Nodes `1` and
    `2` transmit their counter values to node `3`.

    *   Around time `t2`, node `1` receives an increment of `+4` and an update from
    node `2`, while node `3` receives an increment of `+2`. Each node now has a different
    value for the counter: `7` (`5,0,2`), `3` (`1,0,2`), or `4` (`0,0,4`).

    *   Around time `t3`, node `2` receives updates from node `1` and node `3`. These
    updates are potentially conflicting, so node `2` has to merge the three counter
    arrays. By taking the highest element for each node from each array, node `2`
    concludes that the correct value for the counter is (`5,0,4`), which adds up to
    `9`.

    *   At time `t4`, node `2` propagates the correct values of the counter to the
    other nodes and the cluster is now back in sync.


    Other `CRDT`s are defined in academia and implemented in `Riak` or in other databases.
    For instance:'
