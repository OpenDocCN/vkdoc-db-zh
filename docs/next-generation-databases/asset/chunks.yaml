    in the last decade. In both cases these databases entered the organization not
    as a result of some sort of l strategic technology plan, but as the result of
    its popularity with developers. Just as MySQL became the default database for
    LAMP (Linux-Apache-MySQL-PHP) stack applications in the early 2000s, MongoDB seems
    to have achieved a similar position within the modern web-development community.


    MongoDB may lack some of the scalability and throughput capabilities of other
    NoSQL offerings such as Cassandra or HBase, although the implementation of the
    WiredTiger storage engine in version 3.0 has provided the base engine with a significant
    increase in capability. Nevertheless, it has powered many high-end, large-scale
    websites, and it looks poised to be a leading NoSQL database for the immediate
    future.


    ### JSON, JSON, Everywhere


    The central role of JSON within modern document databases does not preclude the
    use of JSON in other systems.


    Just as the relational world embraced XML and introduced XML features into the
    SQL standard, many RDBMS vendors are offering native support for JSON. For instance,
    Oracle and other relational vendors have introduced features in the SQL language
    to allow JSON documents stored within database tables to be manipulated within
    SQL statements. Indeed, as we’ll see in [Chapter 12](#A978-1-4842-1329-2_12_Chapter.html),
    Oracle now provides a completely non-SQL access path for JSON.


    It has, of course, always been possible and not unusual to store JSON documents
    within a key-value store object. However, pure key-value databases such as Riak
    have also introduced JSON-aware indexing schemes. Furthermore, the latest release
    of the Cassandra database allows JSON structures to be mapped directly to Cassandra
    table columns.


    MarkLogic—the successful commercial XML database vendor mentioned earlier in this
    chapter—added support for native JSON storage in 2014. Based on its broad penetration
    as an XML database, MarkLogic can now claim to be a leading contender in the modern
    document database market, though it remains to be seen if MarkLogic can break
    out of its XML content management niche to compete directly with databases such
    as MongoDB and CouchBase for the hearts and minds of web application developers.


    In any case, we can expect to see some level of JSON support in almost all database
    systems.


    ## Conclusion


    Document databases differentiate from other relational and nonrelational systems
    through their adoption of a document format—XML or JSON—as the data model. Document
    databases that support XML document formats have been primarily important as content
    management systems, providing a management repository for XML-based text files.
    JSON document databases, on the other hand, use JSON documents as the data layer
    for web-based applications—the sort of purpose to which MySQL would previously
    have been tasked. To some degree, XML-based document databases represent a previous
    generation of database system, while JSON databases can claim to be the next generation.


    The popularity of JSON and the growing support for JSON within relational databases
    and key-value stores blur the lines that initially existed between databases like
    MongoDB and Dynamo-inspired databases such as Riak. In the near future, support
    for JSON may be a feature common to all databases, rather than one that differentiates
    a specific database technology segment.


    However, today JSON document databases represent a distinct and important niche
    within next generation of database systems. They provide useful features beyond
    those of pure key-value stores, particularly in terms of programmer productivity
    and data accessibility.


    The simplistic self-describing model of JSON and simple key-value access paths
