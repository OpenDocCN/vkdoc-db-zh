    # 3. 分片、亚马逊与NoSQL的诞生


    > 第一步 - 分片数据库。第二步 - 搞死你自己。——推特用户 @Dmitriy，2009

    > “鲍勃：那么，我怎么查询数据库呢？

    > IT技术员：这不是数据库。这是个键值存储……你得用`Erlang`写一个分布式的`map-reduce`函数。

    > 鲍勃：你刚才是不是让我滚蛋？

    > IT技术员：我相信是的，鲍勃。”——Fault Tolerance 卡通，@jrecursive，2009


    我们上一次看到主要的、新型的关系数据库品牌是在1995年左右，即`MySQL`的首次发布。在1995年，美国的万维网才刚刚两岁——`Netscape`浏览器是在前一年才发布的。就计算机系统而言，那是一个不同的时代。


    在1995年到2005年这10年间，互联网从拨号上网的新奇事物转变为我们文明中最重要的通信系统之一，成为国际商业的基础，并很快成为我们社交生活的核心。尽管如此，2005年使用的数据库系统与1995年使用的名称相同。回顾2005年的软件格局，您可能会认为数据库领域并无新事，这情有可原。


    然而，在幕后，关系数据库支撑Web应用程序需求的能力已经被拉伸到了断裂点。在这种压力之下，诞生了一种新型的Web规模事务数据库系统——即我们现在所称的`NoSQL`。


    ## 扩展Web 2.0


    万维网最初被构想并实现为一个链接的静态文档的全球集合。事实上，网络的绝大部分内容仍然是只读的静态内容。`Google`开发了上一章介绍的许多技术，以便为这些文档提供索引和搜索能力。


    但对于零售商和其他企业来说，网络承诺提供的远不止是存储在线目录和白皮书的地方。基于网络的零售网点的概念有望彻底改变现代商业。尽管这种电子商务的概念导致了我们这代人最大的繁荣与萧条，但其承诺最终得以实现，今天你几乎可以在线购买任何东西。


    静态页面的万维网通常被称为`Web 1.0`，而具有事务处理能力的动态生成内容的万维网则被称为`Web 2.0`。然而，2.0版本并非受控架构重建的结果；相反，它是由于网络开发者争相应对功能、性能和规模方面不断增长的需求而产生的。'
  raw: '### The Hadoop Ecosystem


    MapReduce, YARN, and HDFS represent the foundations of the Hadoop architecture.
    HBase, Pig, and Hive are built on top of those foundations. The Hadoop ecosystem
    includes an ever expanding family of utilities and applications built on top of
    or designed to work with core Hadoop. Some of the most significant are:


    *   Flume, a utility for loading file-based data into HDFS.

    *   SQOOP, a utility for exchanging data with relational databases, either by
    importing relational tables into HDFS files or by exporting HDFS files to relational
    databases.

    *   Zookeeper, which provides coordination and synchronization services within
    the cluster.

    *   Oozie, a workflow scheduler that allows complex workflows to be constructed
    from lower level jobs (for instance, running a Sqoop or Flume job prior to a MapReduce
    application).

    *   Hue, a graphical user interface that simplifies Hadoop administrative and
    development tasks.


    In addition, there are many Apache and open-source projects that, while not entirely
    dependent on Hadoop, are often integrated into a Hadoop implementation. This includes
    the machine-learning framework Mahout, the distributed streaming messaging system
    Kafka, and many other significant Apache projects.


    The most important addition to the Hadoop family in recent years has been Spark
    and other elements of the Berkeley Data Analytics Stack (BDAS) to which it belongs.
    If we think about Hadoop as a disk-oriented framework for running MapReduce-style
    programs, Spark represents a memory-oriented framework for running similar workloads.
    We’ll look at Spark in more detail in [Chapter 7](#A978-1-4842-1329-2_7_Chapter.html).


    ## Conclusion


    Hadoop represents one of the most significant transformations in database architecture
    since the relational model. It provides economies of storage and processing that
    are beyond the reach of the traditional RDBMS, and it offers an ability for the
    storage and processing of unstructured and semi-structured data for which the
    RDBMS had no real solution. More than any other technology, Hadoop has rightfully
    been associated with the Big Data movement.


    However, while Hadoop provides a framework for the mass processing of data, it
    doesn’t have a framework for transactional and online operations. As we will see
    in the next chapter, bleeding-edge websites demanded not just a storage and batch
    processing solution but also an online transactional solution. These demands led
    to what we now call NoSQL, and that will be examined in the next chapter.


