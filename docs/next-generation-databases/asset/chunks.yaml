- fmt: 'Prepare/promise. Any node may propose a modification; this node is referred
    to as the `leader`. The `leader` sends a proposal to all replica nodes. Nodes
    can respond in three ways: They may promise to accept this proposal and not to
    accept any subsequent proposals. If the node already is in possession of an earlier
    proposal, then the earlier proposal will be included with its promise. If the
    majority of nodes reply with an earlier proposal, then that earlier proposal will
    have to be applied before the new proposal can be processed. The node may decline
    the proposal because it has already promised to apply a later proposal.


    Read current value. The current value of the data item will be requested from
    each node to confirm that the value conforms to the `IF` clause in the `UPDATE`
    or `INSERT` statement.


    Propose/accept. The new value is proposed to all nodes and nodes reply if they
    are able to apply the new value.


    Commit/acknowledge. If the propose/accept step succeeds, then the `leader` will
    indicate to all nodes that the transaction can be completed. The proposed value
    is applied to normal Cassandra storage and is visible to everyone.


    Remember that Paxos is a quorum-based protocol, which means that each step succeeds
    providing a majority of replicas agree. Replicas that cannot be reached or can
    for other reasons not participate will be corrected at a later time through normal
    anti-entropy mechanisms.


    The Cassandra lightweight transaction implementation involves a significantly
    larger number of round trips than the nontransactional alternatives—four times
    as many round trips are involved in a simple case, and could be potentially more
    should multiple conflicting proposals need to be reconciled.


    Figure 9-7 shows a simplified sequence of events in a successful Cassandra lightweight
    transaction. In phase 1, the `leader` proposes a change to a data item and replicas
    promise not to accept any earlier proposals. In phase 2, the `leader` checks that
    the value of the data is what is expected and as specified in the CQL `IF` clause.
    In phase 3, the `leader` proposes the new value for the data item and replicas
    accept the proposal. In phase 4, the `leader` commits the proposal and each replica
    acknowledges that the commit succeeded.


    ![A978-1-4842-1329-2_9_Fig7_HTML.jpg](A978-1-4842-1329-2_9_Fig7_HTML.jpg)


    Figure 9-7. Cassandra lightweight transaction processing


    ## Conclusion


    Many next-generation systems—generally those described as NewSQL—employ the time-tested
    consistency models of the traditional RDBMS, most significantly ACID transactions
    and multi-version concurrency control (`MVCC`).


    Next-generation databases of the NoSQL variety have an undeserved reputation for
    offering only simplistic consistency controls. In fact, as we have seen in this
    chapter, maintaining a predictable yet flexible consistency model while meeting
    availability and scalability requirements of a distributed database requires architectures
    at least as complicated as those we have come to know in the relational world.


    We have concentrated in this chapter on three approaches employed in the NoSQL
    world. MongoDB employs a relatively traditional pessimistic locking model that
    preserves consistency by blocking conflicting operations. HBase employs only very
    short-lived locks, instead relying on a version of `MVCC` to allow high-frequency
    mutations to occur without creating row-level inconsistencies. Cassandra employs
    the Dynamo model of tunable consistency, which allows the application to choose
    among consistency, availability, and performance. Cassandra also adds a lightweight
    Paxos-based transaction.


    In the next chapter, we’ll see how the consistency concepts of this chapter and
    distributed database architectures of the previous chapter are supported by data
    models and storage systems.


    # 10. Data Models and Storage


    > A model’s just an imitation of the real thing. — [Mae West](http://www.goodreads.com/author/show/259666.Mae_West)
    The ocean flows of online information are all streaming together, and the access
    tools are becoming absolutely critical. If you don’t index it, it doesn’t exist.
    It’s out there but you can’t find it, so it might as well not be there. — [Barbara
    Quint](http://www.goodreads.com/author/show/863738.Barbara_Quint)


    The relational database model provided a strong theoretical foundation for the
    representation of data that eliminated redundancy and maximized flexibility of
    data access. Many next-generation database systems, particularly those of the
    NewSQL variety, continue to embrace the relational model: their innovations generally
    focus on the underlying physical storage of data.


    However, databases of the NoSQL variety explicitly reject the fixed schema of
    the relational model. This rejection is not based on any theoretical disagreement
    with the principles of relational data modeling but, rather, from a practical
    desire to facilitate agility in application development by allowing schemas to
    evolve with the application. Additionally, NoSQL databases seek to avoid the overhead
    created by operations such as joins, which are a necessary consequence of relational
    normalization.


    Underneath the data model, all databases adopt physical storage mechanisms designed
    to optimize typical access paths. Following our review of new and traditional
    data models in this chapter, we’ll examine how storage is designed to support
    the models.


    ## Data Models


    Today’s databases adopt a variety of data models:


    *   Relational models serve as the inspiration for the representation of data
    in the traditional RDBMS (Oracle, SQL Server, etc.), as well as for NewSQL databases
    such as Vertica and VoltDB.

    *   Key-value stores theoretically impose no structure or limitation on the “value”
    part of the key value. However, in practice, most key-value stores provide additional
    support for certain types of data structures to allow for indexing and conflict
    resolution.

    *   Databases based on Google’s BigTable database implement the wide column store
    described in the BigTable specification. However, some significant innovations
    have been introduced in databases such as Cassandra.

    *   Document databases use JSON or XML documents, which generally impose no restriction
    on the data that can be represented, but which provide a self-describing and predictable
    data representation.

    *   Graph databases represent data as nodes, relationships, and properties. Graph
    databases were described in detail in [Chapter 5](#A978-1-4842-1329-2_5_Chapter.html).'
