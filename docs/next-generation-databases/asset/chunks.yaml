- fmt: "## Cassandra\n\nCassandra的数据模型基于BigTable设计，但自其初始版本以来已经发生了显著演变。事实上，通过Cassandra查询语言（CQL）操作Cassandra时，有时很难辨认出BigTable的结构。\n\
    \nCQL的`CREATE TABLE`语句允许我们定义复合主键，这看起来类似于关系型数据库中的多列键。例如，在下面展示的CQL中，我们创建了一个名为`FRIENDS`的表，其键是`NAME`和`FRIEND`列，分别对应用户名及其每个朋友的名字：\n\
    \n```sql\nCREATE TABLE friends\n(user text,\nfriend text,\nemail text,\nPRIMARY\
    \ KEY (user,friend));\n```\n\n对这个表的CQL查询返回的结果意味着，每个用户和朋友的组合都存在一行数据：\n\n```\ncqlsh:guy>\
    \   SELECT * FROM friends;\n user | friend | email\n------+--------+------------------\n\
    \   Jo | George | George@gmail.com\n   Jo |    Guy |    Guy@gmail.com\n   Jo |\
    \   John |   John@gmail.com\n  Guy |     Jo |     Jo@gmail.com\n```\n\n但是，当我们使用（现已弃用的）thrift客户端查看列族时，可以看到我们有两行，一行有四个列，另一行有六个列（此处的输出已为清晰起见进行了编辑）：\n\
    \n```\nRowKey : Jo\n=> ( name =George:,      value =,                 timestamp=...)\n\
    => ( name =George:email, value =George@gmail.com, timestamp=...)\n=> ( name =Guy:,\
    \         value =,                 timestamp=...)\n=> ( name =Guy:email,    value\
    \ =Guy@gmail.com,    timestamp=...)\n=> ( name =John:,        value =,       \
    \          timestamp=...)\n=> ( name =John:email,   value =John@gmail.com,   timestamp=...)\n\
    -------------------\nRowKey : Guy\n=> ( name =Jo:,          value =,         \
    \        timestamp=...)\n=> ( name =Jo:email,     value =Jo@gmail.com,     timestamp=...)\n\
    => ( name =John:,        value =,                 timestamp=...)\n=> ( name =John:email,\
    \   value =John@gmail.com,   timestamp=...)\n2 Rows Returned.\n```\n\nCQL主键的第一部分（在我们的例子中是`USER`）用于指定表的`rowkey`，并被称为分区键。主键的第二部分（在我们的例子中是`FRIEND`）是聚簇键，用于创建一个宽列结构，其中CQL键列的每个不同值都用作BigTable风格列名的一部分。因此，例如，列`Guy:email`是由CQL列`“Friend”`中的值`“Guy”`与CQL列`“email”`的名称组合构建而成的。\n\
    \n这相当令人困惑！难怪Cassandra倾向于通过更熟悉的关系型风格SQL类符号来隐藏这种复杂性。图 10-7 比较了数据的Cassandra CQL表示与底层的BigTable结构：CQL中显示的五个明显的行在底层存储中实际实现为两个BigTable风格的行。\n\
    \n![A978-1-4842-1329-2_10_Fig7_HTML.jpg](A978-1-4842-1329-2_10_Fig7_HTML.jpg)\n\
    \n图 10-7.\nCassandra CQL将宽列结构表示为窄表\n\n> 注意\n> Cassandra对术语“列族”的使用与HBase和BigTable不同。Cassandra的列族等同于HBase中的表。为了保持一致性，我们可能会用Cassandra“表”来指代，而纯粹主义者可能会说“列族”。\n\
    \nCassandra表的底层物理实现解释了Cassandra查询语言中的某些特定行为。例如，CQL要求`ORDER BY`子句只能引用复合键列。CQL中的`WHERE`子句也有看似奇怪和武断的限制，除非你理解底层的存储模型。分区键只接受等式子句（`IN`和`=`），这在你记得`rowkey`是跨集群进行哈希分区时是有意义的，正如我们在[第8章](#A978-1-4842-1329-2_8_Chapter.html)中讨论的那样。聚簇键列确实支持范围运算符，如`>`和`<`，这再次说明，当你记得在BigTable模型中列族实际上是排序的哈希映射时，这是有意义的。\n\
    \n#### Cassandra集合\n\nCassandra的分区键和聚簇键实现了一种高度可扩展且高效的存储模型。然而，Cassandra还支持集合数据类型，允许将重复组存储在列值内。\n\
    \n例如，我们可能使用`MAP`数据类型实现了`FRIENDS`表，这将允许我们在单个Cassandra列中存储一个朋友和电子邮件的哈希映射：\n\n```sql\n\
    CREATE TABLE friends2\n(person text,\n  friends map<text,text>,\n  PRIMARY KEY\
    \ (person ));\n\nINSERT into friends2(person,friends)\nVALUES('Guy',\n       \
    \  {'Jo':'jo@gmail.com',\n          'john':'john@gmail.com',\n          'Chris':'chris@gmail.com'});\n\
    ```\n\nCassandra还支持`SET`和`LIST`类型，以及上面显示的`MAP`类型。\n\n## JSON数据模型\n\nJavaScript对象表示法（JSON）是文档数据库事实上的标准数据模型。我们在[第4章](#A978-1-4842-1329-2_4_Chapter.html)专门讨论了文档数据库；在这里，我们将正式地看一下JSON的一些元素。\n\
    \nJSON文档由一小套非常简单的结构构建而成：值、对象和数组。\n\n*   数组由方括号（`[` 和 `]`）包围并由逗号（`,`）分隔的值列表组成。\n\
    *   对象由一个或多个`“name”:”value”`格式的名称值对组成，由花括号（`{` 和 `}`）包围并由逗号（`,`）分隔。\n*   值可以是Unicode字符串、标准格式的数字（可能包括科学记数法）、布尔值、数组或对象。\n\
    \n定义中的最后几个字非常重要：因为值可能包含本身包含值的对象或数组，所以JSON结构可以表示任意复杂和嵌套的信息集。特别是，数组可以用来表示文档的重复组，这在关系型数据库中需要一个单独的表。\n\
    \n诸如CouchBase和MongoDB之类的文档数据库将文档组织到存储桶或集合中，通常期望其中包含类似类型的文档。图 10-8 展示了JSON的一些基本元素。\n\
    \n![A978-1-4842-1329-2_10_Fig8_HTML.jpg](A978-1-4842-1329-2_10_Fig8_HTML.jpg)\n\
    \n图 10-8.\nJSON文档\n\n#### 二进制JSON\n\nMongoDB在内部以BSON格式存储JSON文档。BSON旨在成为JSON数据的更紧凑、更高效的表示形式，它对数字和其他数据类型使用更高效的编码。此外，BSON包含字段长度前缀，允许扫描操作“跳过”元素，从而提高效率。"
  raw: '### Cassandra


    Cassandra’s data model is based on the BigTable design, but has evolved significantly
    since its initial release. Indeed, it can be hard to recognize the BigTable structure
    when working with Cassandra through the Cassandra Query Language (CQL).


    The CQL CREATE TABLE statement allows us to define composite primary keys, which
    look like familiar multi-column keys in relational databases. For instance, in
    the CQL shown below, we create a table FRIENDS, which is keyed on columns NAME
    and FRIEND corresponding to the user’s name and the name of each of his or her
    friends:


    `CREATE TABLE friends`


    `(user text,`


    `friend text,`


    `email text,`


    `PRIMARY KEY (user,friend));`


    CQL queries on this table return results that imply one row exists for each combination
    of user and friend:


    `cqlsh:guy>   SELECT * FROM friends;`


    `user | friend | email`


    `------+--------+------------------`


    `Jo | George | George@gmail.com`


    `Jo |    Guy |    Guy@gmail.com`


    `Jo |   John |   John@gmail.com`


    `Guy |     Jo |     Jo@gmail.` `com`


    But when we look at the column family using the (now depreciated) thrift client,
    we can see we have two rows, one with four columns and the other with six columns
    (the output here has been edited for clarity):


    `RowKey` `: Jo`


    `=> (` `name` `=George:,`      `value` `=,                 timestamp=...)`


    `=> (` `name` `=George:email,` `value` `=George@gmail.com, timestamp=...)`


    `=> (` `name` `=Guy:,`         `value` `=,                 timestamp=...)`


    `=> (` `name` `=Guy:email,`    `value` `=Guy@gmail.com,    timestamp=...)`


    `=> (` `name` `=John:,`        `value` `=,                 timestamp=...)`


    `=> (` `name` `=John:email,`   `value` `=John@gmail.com,   timestamp=...)`


    `-------------------`


    `RowKey` `: Guy`


    `=> (` `name` `=Jo:,`          `value` `=,                 timestamp=...)`


    `=> (` `name` `=Jo:email,`     `value` `=Jo@gmail.com,     timestamp=...)`


    `=> (` `name` `=John:,`        `value` `=,                 timestamp=...)`


    `=> (` `name` `=John:email,`   `value` `=John@gmail.com,   timestamp=...)`


    `2 Rows Returned.`


    The first part of the CQL primary key (USER, in our example) is used to specify
    the rowkey for the table and is referred to as the partition key. The second parts
    of the primary key (FRIEND, in our example) are clustering keys and are used to
    create a wide column structure in which each distinct value of the CQL key column
    is used as part of the name of a BigTable-style column. So for instance, the column
    Guy:email is constructed from the value “Guy” within the CQL column “Friend” together
    with the name of the CQL column “email.”


    That’s quite confusing! So it’s no wonder that Cassandra tends to hide this complexity
    within a more familiar relational style SQL-like notation. Figure [10-7](#A978-1-4842-1329-2_10_Chapter.html#Fig7)
    compares the Cassandra CQL representation of the data with the underlying BigTable
    structure: the apparent five rows as shown in CQL are actually implemented as
    two BigTable-style rows in underlying storage.


    ![A978-1-4842-1329-2_10_Fig7_HTML.jpg](A978-1-4842-1329-2_10_Fig7_HTML.jpg)


    Figure 10-7.


    Cassandra CQL represents wide column structure as narrow tables Note


    Cassandra uses the term “column family” differently from HBase and BigTable. A
    Cassandra column family is equivalent to a table in HBase. For consistency’s sake,
    we may refer to Cassandra “tables” when a Cassandra purist would say “column family.”


    The underlying physical implementation of Cassandra tables explains some of the
    specific behaviors within the Cassandra Query Language. For instance, CQL requires
    that an ORDER BY clause refer only to composite key columns. WHERE clauses in
    CQL also have restrictions that seem weird and arbitrary unless you understand
    the underlying storage model. The partition key accepts only equality clauses
    (IN and “=”), which makes sense when you remember that rowkeys are hash-partitioned
    across the cluster, as we discussed in [Chapter 8](#A978-1-4842-1329-2_8_Chapter.html).
    Clustering key columns do support range operators such as “>” and “<”, which again
    makes sense when you remember that in the BigTable model the column families are
    actually sorted hash maps.


    #### Cassandra Collections


    Cassandra’s partitioning and clustering keys implement a highly scalable and efficient
    storage model. However, Cassandra also supports collection data types that allow
    repeating groups to be stored within column values.


    For instance, we might have implemented our FRIENDS table using the MAP data type,
    which would have allowed us to store a hash map of friends and emails within a
    single Cassandra column:


    `CREATE TABLE friends2`


    `(person text,`


      `friends map<text,text>,`


      `PRIMARY KEY (person ));`


      `INSERT into friends2(person,friends)`


      `VALUES(''Guy'',`


             `{''Jo'':''jo@gmail.com'',`


              `''john'':''john@gmail.com'',`


              `''Chris'':''chris@gmail.com''});`


    Cassandra also supports SET and LIST types, as well as the MAP type shown above.


    ### JSON Data Models


    JavaScript Object Notation (JSON) is the de facto standard data model for document
    databases. We devoted [Chapter 4](#A978-1-4842-1329-2_4_Chapter.html) to document
    databases; here, we will just formally look at some of the elements of JSON.


    JSON documents are built up from a small set of very simple constructs: values,
    objects, and arrays.


    *   Arrays consist of lists of values enclosed by square brackets (“[“ and “]”)
    and separated by commas (“,”).

    *   Objects consist of one or more name value pairs in the format “name”:”value”
    , enclosed by braces (“{“ and :}” ) and separated by commas (“,”).

    *   Values can be Unicode strings, standard format numbers (possibly including
    scientific notation), Booleans, arrays, or objects.


    The last few words in the definition are very important: because values may include
    objects or arrays, which themselves contain values, a JSON structure can represent
    an arbitrarily complex and nested set of information. In particular, arrays can
    be used to represent repeating groups of documents, which in a relational database
    would require a separate table.


    Document databases such as CouchBase and MongoDB organize documents into buckets
    or collections, which would generally be expected to contain documents of a similar
    type. Figure [10-8](#A978-1-4842-1329-2_10_Chapter.html#Fig8) illustrates some
    of the essential JSON elements.


    ![A978-1-4842-1329-2_10_Fig8_HTML.jpg](A978-1-4842-1329-2_10_Fig8_HTML.jpg)


    Figure 10-8.


    JSON documents


    #### Binary JSON (BSON)


    MongoDB stores JSON documents internally in the BSON format. BSON is designed
    to be a more compact and efficient representation of JSON data, and it uses more
    efficient encoding for numbers and other data types. In addition, BSON includes
    field length prefixes that allow scanning operations to “skip over” elements and
    hence improve efficiency.'
  trans: "## Cassandra\n\nCassandra 的数据模型基于 BigTable 设计，但自其初始版本以来已发生了显著演变。事实上，通过 Cassandra\
    \ 查询语言（CQL）操作 Cassandra 时，有时很难辨认出 BigTable 的结构。\n\nCQL 的`CREATE TABLE`语句允许我们定义复合主键，这看起来类似于关系型数据库中的多列键。例如，在下面展示的\
    \ CQL 中，我们创建了一个名为`FRIENDS`的表，其键是`NAME`和`FRIEND`列，分别对应用户名及其每个朋友的名字：\n\n```sql\n\
    CREATE TABLE friends\n(user text,\nfriend text,\nemail text,\nPRIMARY KEY (user,friend));\n\
    ```\n\n对这个表的 CQL 查询返回的结果意味着，每个用户和朋友的组合都存在一行数据：\n\n```\ncqlsh:guy>   SELECT * FROM\
    \ friends;\n user | friend | email\n------+--------+------------------\n   Jo\
    \ | George | George@gmail.com\n   Jo |    Guy |    Guy@gmail.com\n   Jo |   John\
    \ |   John@gmail.com\n  Guy |     Jo |     Jo@gmail.com\n```\n\n但是，当我们使用（现已弃用的）thrift\
    \ 客户端查看列族时，可以看到我们有两行，一行有四个列，另一行有六个列（此处的输出已为清晰起见进行了编辑）：\n\n```\nRowKey : Jo\n=>\
    \ ( name =George:,      value =,                 timestamp=...)\n=> ( name =George:email,\
    \ value =George@gmail.com, timestamp=...)\n=> ( name =Guy:,         value =, \
    \                timestamp=...)\n=> ( name =Guy:email,    value =Guy@gmail.com,\
    \    timestamp=...)\n=> ( name =John:,        value =,                 timestamp=...)\n\
    => ( name =John:email,   value =John@gmail.com,   timestamp=...)\n-------------------\n\
    RowKey : Guy\n=> ( name =Jo:,          value =,                 timestamp=...)\n\
    => ( name =Jo:email,     value =Jo@gmail.com,     timestamp=...)\n=> ( name =John:,\
    \        value =,                 timestamp=...)\n=> ( name =John:email,   value\
    \ =John@gmail.com,   timestamp=...)\n2 Rows Returned.\n```\n\nCQL 主键的第一部分（在我们的例子中是`USER`）用于指定表的`rowkey`，并被称为**分区键**。主键的第二部分（在我们的例子中是`FRIEND`）是**聚簇键**，用于创建一个宽列结构，其中\
    \ CQL 键列的每个不同值都用作 BigTable 风格列名的一部分。因此，例如，列`Guy:email`是由 CQL 列`“Friend”`中的值`“Guy”`与\
    \ CQL 列`“email”`的名称组合构建而成的。\n\n这相当令人困惑！难怪 Cassandra 倾向于通过更熟悉的关系型风格 SQL 类符号来隐藏这种复杂性。图\
    \ 10-7 比较了数据的 Cassandra CQL 表示与底层的 BigTable 结构：CQL 中显示的五个明显的行在底层存储中实际实现为两个 BigTable\
    \ 风格的行。\n\n![A978-1-4842-1329-2_10_Fig7_HTML.jpg](img/A978-1-4842-1329-2_10_Fig7_HTML.jpg)\n\
    \n**图 10-7.**\nCassandra CQL 将宽列结构表示为窄表\n\n> **注意**\n> Cassandra 对术语“列族”的使用与 HBase\
    \ 和 BigTable 不同。Cassandra 的列族等同于 HBase 中的表。为了保持一致性，我们可能会用 Cassandra“表”来指代，而纯粹主义者可能会说“列族”。\n\
    \nCassandra 表的底层物理实现解释了 Cassandra 查询语言中的某些特定行为。例如，CQL 要求`ORDER BY`子句只能引用复合键列。CQL\
    \ 中的`WHERE`子句也有看似奇怪和武断的限制，除非你理解底层的存储模型。分区键只接受等式子句（`IN`和`=`），这在你记得`rowkey`是跨集群进行哈希分区时是有意义的，正如我们在第\
    \ 8 章中讨论的那样。聚簇键列确实支持范围运算符，如`>`和`<`，这再次说明，当你记得在 BigTable 模型中列族实际上是排序的哈希映射时，这是有意义的。\n\
    \n#### Cassandra 集合\n\nCassandra 的分区键和聚簇键实现了一种高度可扩展且高效的存储模型。然而，Cassandra 还支持集合数据类型，允许将重复组存储在列值内。\n\
    \n例如，我们可能使用`MAP`数据类型实现了`FRIENDS`表，这将允许我们在单个 Cassandra 列中存储一个朋友和电子邮件的哈希映射：\n\n\
    ```sql\nCREATE TABLE friends2\n(person text,\n  friends map<text,text>,\n  PRIMARY\
    \ KEY (person ));\n\nINSERT into friends2(person,friends)\nVALUES('Guy',\n   \
    \      {'Jo':'jo@gmail.com',\n          'john':'john@gmail.com',\n          'Chris':'chris@gmail.com'});\n\
    ```\n\nCassandra 还支持`SET`和`LIST`类型，以及上面显示的`MAP`类型。\n\n## JSON 数据模型\n\nJavaScript\
    \ 对象表示法（JSON）是文档数据库事实上的标准数据模型。我们在第 4 章专门讨论了文档数据库；在这里，我们将正式地看一下 JSON 的一些元素。\n\n\
    JSON 文档由一小套非常简单的结构构建而成：值、对象和数组。\n\n*   数组由方括号（`[` 和 `]`）包围并由逗号（`,`）分隔的值列表组成。\n\
    *   对象由一个或多个`“name”:”value”`格式的名称值对组成，由花括号（`{` 和 `}`）包围并由逗号（`,`）分隔。\n*   值可以是\
    \ Unicode 字符串、标准格式的数字（可能包括科学记数法）、布尔值、数组或对象。\n\n定义中的最后几个字非常重要：因为值可能包含本身包含值的对象或数组，所以\
    \ JSON 结构可以表示任意复杂和嵌套的信息集。特别是，数组可以用来表示文档的重复组，这在关系型数据库中需要一个单独的表。\n\n诸如 CouchBase\
    \ 和 MongoDB 之类的文档数据库将文档组织到存储桶或集合中，通常期望其中包含类似类型的文档。图 10-8 展示了 JSON 的一些基本元素。\n\n\
    ![A978-1-4842-1329-2_10_Fig8_HTML.jpg](img/A978-1-4842-1329-2_10_Fig8_HTML.jpg)\n\
    \n**图 10-8.**\nJSON 文档\n\n#### 二进制 JSON\n\nMongoDB 在内部以 BSON 格式存储 JSON 文档。BSON\
    \ 旨在成为 JSON 数据的更紧凑、更高效的表示形式，它对数字和其他数据类型使用更高效的编码。此外，BSON 包含字段长度前缀，允许扫描操作“跳过”元素，从而提高效率。"
- fmt: '## Storage


    关系数据库模型的一个根本性创新是逻辑数据表示与物理存储模型的分离。在关系模型出现之前，为了操作数据库，必须理解数据的物理存储方式。这种严格的分离使得数据的关系表示在一代计算机科学家中保持相对稳定，而底层的存储机制（如索引）已经历了重大创新。这种解耦最极端的例子可以在列式数据库领域看到。像
    Vertica 和 Sybase IQ 这样的列式数据库继续支持面向行的关系数据库模型，即使它们通过以列式格式存储数据而将数据“侧翻”过来。


    我们已经在[第6章](#A978-1-4842-1329-2_6_Chapter.html)中探讨了列式系统的底层物理存储，因此这里不需要再研究那项特定的创新。然而，像
    HBase 和 Cassandra 这样的现代非关系型数据库，其物理布局发生了根本性的转变。这就是从为随机访问优化的 B 树存储结构，转向为顺序写入性能优化的**日志结构合并树**模式。


    ### 典型的关系型存储模型


    大多数关系型数据库都有类似的高级存储架构。


    图 [10-9](#A978-1-4842-1329-2_10_Chapter.html#Fig9) 展示了一个简化的关系统数据库架构。数据库客户端通过向数据库进程发送
    SQL 来与其交互 (1)。数据库进程最初从磁盘上的数据库文件中检索数据 (2)，并将数据存储在内存缓冲区中以优化后续访问 (3)。如果数据被修改，则会在内存副本中进行更改
    (4)。在事务提交时，数据库进程会写入事务日志 (5)，这确保了在系统故障的情况下事务不会丢失。内存中被修改的数据由一个“惰性”数据库写入进程异步写回到数据库文件。


    ![A978-1-4842-1329-2_10_Fig9_HTML.jpg](A978-1-4842-1329-2_10_Fig9_HTML.jpg)


    图 10-9.

    关系统数据库存储架构


    图 [10-9](#A978-1-4842-1329-2_10_Chapter.html#Fig9) 所示的大部分架构也可以在非关系系统中找到。特别是，事务日志的等效组件几乎存在于任何事务型数据库系统中。


    另一种无处不在的 RDBMS 架构模式——至少在操作型数据库领域——是 B 树索引。B 树索引是一种允许对数据库系统中的元素进行随机访问的结构。


    图 [10-10](#A978-1-4842-1329-2_10_Chapter.html#Fig10) 展示了一个 B 树索引结构。B 树索引具有层次化的树状结构。树的顶部是头部块。此块包含指向任何给定键值范围对应的适当分支块的指针。分支块通常会指向更具体范围的适当叶块，或者对于较大的索引，指向另一个分支块。叶块包含键值列表以及匹配表数据的物理地址。


    ![A978-1-4842-1329-2_10_Fig10_HTML.jpg](A978-1-4842-1329-2_10_Fig10_HTML.jpg)


    图 10-10.

    B 树索引结构


    叶块包含指向前一个和后一个叶块的链接。这允许我们按升序或降序扫描索引，并使得可以使用索引来满足使用 `">"`、`"<"` 或 `"BETWEEN"` 运算符的范围查询。


    B 树索引提供可预测的性能，因为每个叶节点都处于相同的深度。索引中每增加一层，所能支持的键数量呈指数级增长，对于几乎所有的表，三次或四次 IO 就足以定位到任何行。


    然而，在更改数据时维护 B 树可能代价高昂。例如，考虑将键值为 `"NIVEN"` 的行插入到图 [10-10](#A978-1-4842-1329-2_10_Chapter.html#Fig10)
    所示的表索引中。要插入该行，我们必须在 `L-O` 块中添加一个新条目。如果叶块中没有空闲空间容纳新条目，则需要进行索引拆分。必须分配一个新块，并将现有块中的一半条目移动到新块中。此外，还需要在分支块中添加一个新条目（以指向新创建的叶块）。如果分支块中没有空闲空间，则分支块也必须进行拆分。


    这些索引拆分是昂贵的操作：必须分配新块，并将索引条目从一个块移动到另一个块，在拆分期间访问时间会受到影响。因此，尽管 B 树索引是一种高效的随机读取机制，但它对于写入密集型工作负载来说就不那么出色了。


    B 树结构固有的局限性，通过能够将磁盘写入主数据库文件的操作延迟这一点得到了一定程度的缓解：只要在提交时写入了事务日志条目，数据文件的修改（包括索引块）就可以在内存中执行并稍后写入磁盘。然而，在大量、密集的写入活动期间，空闲内存将被耗尽，吞吐量将受到数据库块磁盘
    IO 的限制。


    为了提供更好的写入密集型工作负载吞吐量，已经出现了一些对 B 树模式的重大改进：Couchbase 的 `HB+-Trie` 和 Tokutek 的 `fractal
    tree index` 都声称提供了更好的写入优化。


    然而，越来越多的数据库实现了一种从底层开始就为支持写入密集型工作负载而优化的存储架构：**日志结构合并树**。'
  raw: '## Storage


    One of the fundamental innovations in the relational database model was the separation
    of logical data representation from the physical storage model. Prior to the relational
    model it was necessary to understand the physical storage of data in order to
    navigate the database. That strict separation has allowed the relational representation
    of data to remain relatively static for a generation of computer scientists, while
    underlying storage mechanisms such as indexing have seen significant innovation.
    The most extreme example of this decoupling can be seen in the columnar database
    world. Columnar databases such as Vertica and Sybase IQ continue to support the
    row-oriented relational database model, even while they have tipped the data on
    its side by storing data in a columnar format.


    We have looked at the underlying physical storage of columnar systems in [Chapter
    6](#A978-1-4842-1329-2_6_Chapter.html), so we don’t need to examine that particular
    innovation here. However, there has been a fundamental shift in the physical layout
    of modern nonrelational databases such as HBase and Cassandra. This is the shift
    away from B-tree storage structure optimized for random access to the log-structured
    mMerge tree pattern, which is optimized instead for sequential write performance.


    ### Typical Relational Storage Model


    Most relational databases share a similar high-level storage architecture.


    Figure [10-9](#A978-1-4842-1329-2_10_Chapter.html#Fig9) shows a simplified relational
    database architecture. Database clients interact with the database by sending
    SQL to database processes (1). The database processes retrieve data from database
    files on disk initially (2), and store the data in memory buffers to optimize
    subsequent accesses (3). If data is modified, it is changed within the in-memory
    copy (4). Upon transaction commit, the database process writes to a transaction
    log (5), which ensures that the transaction will not be lost in the event of a
    system failure. The modified data in memory is written out to database files asynchronously
    by a “lazy” database writer process.


    ![A978-1-4842-1329-2_10_Fig9_HTML.jpg](A978-1-4842-1329-2_10_Fig9_HTML.jpg)


    Figure 10-9.


    Relational database storage architecture


    Much of the architecture shown in Figure [10-9](#A978-1-4842-1329-2_10_Chapter.html#Fig9)
    can be found in nonrelational systems as well. In particular, some equivalent
    of the transaction log is present in almost any transactional database system.


    Another ubiquitous RDBMS architectural pattern—at least in the operational database
    world—is the B-tree index. The B-tree index is a structure that allows for random
    access to elements within a database system.


    Figure [10-10](#A978-1-4842-1329-2_10_Chapter.html#Fig10) shows a B-tree index
    structure. The B-tree index has a hierarchical tree structure. At the top of the
    tree is the header block. This block contains pointers to the appropriate branch
    block for any given range of key values. The branch block will usually point to
    the appropriate leaf block for a more specific range or, for a larger index, point
    to another branch block. The leaf block contains a list of key values and the
    physical addresses of matching table data.


    ![A978-1-4842-1329-2_10_Fig10_HTML.jpg](A978-1-4842-1329-2_10_Fig10_HTML.jpg)


    Figure 10-10.


    B-tree index structure


    Leaf blocks contain links to both the previous and the next leaf block. This allows
    us to scan the index in either ascending or descending order, and allows range
    queries using the “>”, “<” or “BETWEEN” operators to be satisfied using the index.


    B-tree indexes offer predictable performance because every leaf node is at the
    same depth. Each additional layer in the index exponentially increases the number
    of keys that can be supported, and for almost all tables, three or four IOs will
    be sufficient to locate any row.


    However, maintaining the B-tree when changing data can be expensive. For instance,
    consider inserting a row with the key value “NIVEN” into the table index diagrammed
    in Figure [10-10](#A978-1-4842-1329-2_10_Chapter.html#Fig10). To insert the row,
    we must add a new entry into the L-O block. If there is no free space within a
    leaf block for a new entry, then an index split is required. A new block must
    be allocated and half of the entries in the existing block have to be moved into
    the new block. As well as this, there is a requirement to add a new entry to the
    branch block (in order to point to the newly created leaf block). If there is
    no free space in the branch block, then the branch block must also be split.


    These index splits are an expensive operation: new blocks must be allocated and
    index entries moved from one block to another, and during this split access times
    will suffer. So although the B-tree index is an efficient random read mechanism,
    it is not so great for write-intensive workloads.


    The inherent limitations of the B-tree structure are somewhat mitigated by the
    ability to defer disk writes to the main database files: as long as a transaction
    log entry has been written on commit, data file modifications—including index
    blocks—can be performed in memory and written to disk later. However, during periods
    of heavy, intensive write activity, free memory will be exhausted and throughput
    will be limited by disk IO to the database blocks.


    There have been some significant variations on the B-tree pattern to provide for
    better throughput for write-intensive workloads: Both Couchbase’s HB+-Trie and
    Tokutek’s fractal tree index claim to provide better write optimization.


    However, an increasing number of databases implement a storage architecture that
    is optimized from the ground up to support write-intensive workloads: the log-structured
    merge (LSM) tree.'
