    replicas allow immediate failover to a backup RegionServer, which maintains a
    copy of the region data.


    By default, in HBase all reads are directed to the primary RegionServer, which
    results in strictly consistent behavior. However, if consistency for a read is
    configured for timeline consistency, then a read request will first be sent to
    the primary RegionServer, followed shortly by duplicate requests to the secondary
    RegionServer. The first server to return a result completes the request. Remember
    that the primary gets a head start in this contest, so if the primary is available
    it will usually be the first to return.


    The scheme is called timeline consistency because the secondary RegionServer always
    receives region updates in the same sequence as the primary. However, this architecture
    does not guarantee that a secondary RegionServer will have up-to-date information;
    and if there are multiple secondary RegionServers, then it’s possible that reads
    will return writes out of order, since there may be race conditions occurring
    among the multiple secondary servers and the primary.


    Figure [9-2](#A978-1-4842-1329-2_9_Chapter.html#Fig2) illustrates RegionServer
    replica processing. An HBase client is issuing writes in sequential order to the
    master RegionServer (1). These are being replicated asynchronously to the secondary
    RegionServers (2); at any given moment in time some of these replications may
    not yet have completed (3). If a client is using timeline consistency, then it
    may read data from the master, but if the master is unresponsive, it may read
    data from one of the secondary RegionServers (4). Successive reads may return
    data from either of the secondaries or from the primary—so data can be returned
    in any sequence. The “timeline” nature of the consistency only applies to an individual
    secondary, not to the system as a whole.


    ![A978-1-4842-1329-2_9_Fig2_HTML.jpg](A978-1-4842-1329-2_9_Fig2_HTML.jpg)


    Figure 9-2.


    HBase timeline consistency with RegionServer replicas Note


    Timeline consistency is not the default in HBase. By default, a client will read
    from the master RegionServer, in which case HBase will provide strong consistency.


    ## Cassandra Consistency


    Cassandra uses the Amazon Dynamo model of tunable consistency. This tunable consistency
    provides a variety of consistency levels, most of which can be specified at the
    level of individual requests.


    We touched on the Dynamo consistency model in Chapter [3](#A978-1-4842-1329-2_3_Chapter.html).
    At a high level, this model allows the following three variables to be configured
    independently to provide a variety of outcomes:


    *   N is the number of copies of each data item that the database will maintain.

    *   W is the number of copies of the data item that must be written before a write
    can return control to the application.

    *   R is the number of copies that the application will access when reading the
    data item.


    As we saw in Chapter [3](#A978-1-4842-1329-2_3_Chapter.html), these variables
    can be configured to allow for strong consistency, weak consistency, and to balance
    read and write performance.


    Cassandra follows the Dynamo model pretty closely, but has its own unique implementation.
    So while the following discussion should be broadly applicable to other Dynamo
    systems such as Riak or DynamoDB, the details are specific to Cassandra.


    ### Replication Factor


    The replication factor determines how many copies of the data will be maintained
    across multiple nodes. This is specified at the keyspace (roughly equivalent to
    a schema) level and is equivalent to the “N” in Dynamo NRW notation.


    As we saw in the previous chapter, various replication strategies can be established
    to ensure that replicas are distributed across multiple racks or data centers


    ### Write Consistency


    Each write operation can specify a write consistency level. The write consistency
    level controls what must happen before Cassandra can complete a write request.
    Some of the more common levels are:


    *   ALL: The write must be propagated to all nodes. This results in very strong
    consistency, but should a node be unavailable, the write cannot complete.

    *   ONE|TWO|THREE: The write must be propagated to the specified number of nodes.
    A level of ONE maximizes write performance but possibly at the expense of consistency.
    Depending on the read consistency settings and replication factor, TWO and THREE
    may or may not provide stronger consistency guarantees.

    *   QUORUM: The write must complete to a quorum of replica nodes. A quorum requires
    the majority of replicas accept the write before the write operation completes.

    *   EACH_QUORUM: The write must complete to a quorum of replica nodes in each
    data center. So if there are two data centers with three replicas each, at least
    two replicas from each data center must complete the write request before the
    operation can complete.

    *   LOCAL_QUORUM: Requires that a quorum of replicas be written in the current
    data center only.

    *   ANY: The write will succeed providing it is written to any node, even if that
    node is not responsible for storing that particular data item. If no node directly
    responsible for storing a replicas of the data item can be reached, then a hinted
    handoff—described in detail later in this chapter—on any node will be sufficient
    to complete the write. This is an extremely low reliability setting, since by
    default hinted handoffs are deleted after three hours; the best you could say
    about this setting is that data might be written.


    Some additional write consistency levels are described in the section on lightweight
    transactions below.'
  trans: '

    ## HBase 一致性


    HBase 为单行提供**强一致性**：HBase 客户端不能以会导致行数据不一致的方式同时修改一行。这种行为与我们在关系型数据库中看到的情况类似，后者通常使用行级锁来防止对单行的同时更新。然而，在
    HBase 中实现起来更为复杂，因为一行可能包含分布在多个列族中的数千个列，这些列族可能有不同的磁盘存储。在更新一行内的任何列或列族期间，`RegionServer`
    将锁定整行，以防止对任何其他列进行冲突的更新。


    读取操作不获取锁，读取也不会被写入操作阻塞。相反，读取操作使用一种我们本章前面讨论过的多版本并发控制 (`MVCC`) 形式。当读写操作并发执行时，读操作将读取该行的先前版本，而不是正在被更新的版本。


    HBase 使用了我们前面讨论过的 `SCN` 模式的一个变体来实现 `MVCC`。当写入开始时，它会递增一个存储在被修改的单元格（即行内的特定列值）中的写入编号。当读取开始时，会被分配一个读取点编号，该编号对应于最高已完成写入点。然后，读取可以检查数据项，以确保它不会读取一个单元格，如果该单元格的写入编号表明自读取开始以来它已被更新。


    ### 最终一致的区域副本


    在 HBase 的早期版本中，保证了所有读取的**强一致性**——你总是能读取到行的最新写入版本。然而，随着第 8 章介绍的区域副本的引入，就可能出现一种形式的最终一致性。


    引入区域副本是为了提高 HBase 的可用性。`RegionServer` 的故障绝不会导致数据丢失，但在新的 `RegionServer` 实例化期间，可能会造成轻微的性能中断。区域副本允许立即故障转移到备份的
    `RegionServer`，该服务器维护着区域数据的一个副本。


    默认情况下，在 HBase 中，所有读取都定向到主 `RegionServer`，这导致了严格一致的行为。但是，如果为读取配置了一致性为**时间线一致性**，那么读取请求将首先发送到主
    `RegionServer`，随后很快会向次级 `RegionServer` 发送重复的请求。第一个返回结果的服务器完成该请求。请记住，主服务器在此竞争中占得先机，因此如果主服务器可用，它通常会是第一个返回的。


    该方案被称为时间线一致性，因为次级 `RegionServer` 始终以与主服务器相同的顺序接收区域更新。然而，此架构不保证次级 `RegionServer`
    拥有最新信息；并且如果存在多个次级 `RegionServer`，那么读取可能会返回乱序的写入结果，因为多个次级服务器与主服务器之间可能存在竞争条件。


    图 9-2 说明了 `RegionServer` 副本处理过程。一个 HBase 客户端正在按顺序向主 `RegionServer` (1) 发出写入。这些写入被异步复制到次级
    `RegionServer` (2)；在任何给定时刻，其中一些复制可能尚未完成 (3)。如果客户端使用的是时间线一致性，那么它可能会从主服务器读取数据，但如果主服务器无响应，它可能会从某个次级
    `RegionServer` (4) 读取数据。连续的读取可能返回来自任一次级或主服务器的数据——因此数据可能以任何顺序返回。一致性的“时间线”特性仅适用于单个次级，而非整个系统。


    ![A978-1-4842-1329-2_9_Fig2_HTML.jpg](img/A978-1-4842-1329-2_9_Fig2_HTML.jpg)

    *图 9-2. 使用 `RegionServer` 副本的 HBase 时间线一致性*


    注意：时间线一致性在 HBase 中不是默认设置。默认情况下，客户端将从主 `RegionServer` 读取，在这种情况下，HBase 将提供强一致性。


    ## Cassandra 一致性


    Cassandra 使用了 Amazon Dynamo 模型的**可调一致性**。这种可调一致性提供了多种一致性级别，其中大多数可以在单个请求的级别上指定。


    我们在第 3 章简要介绍了 Dynamo 一致性模型。从高层来看，该模型允许独立配置以下三个变量，以提供多种结果：


    *   `N` 是数据库将为每个数据项维护的副本数量。

    *   `W` 是必须完成写入的数据项副本数量，之后写入操作才能将控制权返回给应用程序。

    *   `R` 是应用程序在读取数据项时将访问的副本数量。


    正如我们在第 3 章所见，这些变量可以配置为允许强一致性、弱一致性，以及平衡读写性能。


    Cassandra 遵循 Dynamo 模式非常紧密，但有自己独特的实现。因此，虽然以下讨论应广泛适用于其他 Dynamo 系统（如 Riak 或 DynamoDB），但细节是
    Cassandra 特有的。


    ### 副本因子


    **副本因子**决定了将在多个节点上维护多少数据副本。这在键空间（大致相当于一个模式）级别指定，等同于 Dynamo `NRW` 表示法中的 `N`。


    正如我们在上一章所见，可以建立各种复制策略，以确保副本分布在多个机架或数据中心。


    ### 写入一致性


    每个写入操作都可以指定一个**写入一致性级别**。写入一致性级别控制 Cassandra 在完成写入请求之前必须满足的条件。一些更常见的级别是：


    *   `ALL`：写入必须传播到所有节点。这导致**非常强的一致性**，但如果某个节点不可用，写入将无法完成。

    *   `ONE`|`TWO`|`THREE`：写入必须传播到指定数量的节点。级别为 `ONE` 可最大化写入性能，但可能以牺牲一致性为代价。根据读取一致性设置和副本因子，`TWO`
    和 `THREE` 可能提供也可能不提供更强的一致性保证。

    *   `QUORUM`：写入必须完成到副本节点的**法定人数**。法定人数要求大多数副本接受写入，然后写入操作才能完成。

    *   `EACH_QUORUM`：写入必须完成到**每个数据中心**的副本节点的法定人数。因此，如果有两个数据中心，每个数据中心有三个副本，则每个数据中心至少两个副本必须完成写入请求，操作才能完成。

    *   `LOCAL_QUORUM`：要求仅在**当前数据中心**写入法定数量的副本。

    *   `ANY`：只要写入到任何节点，即使该节点不负责存储该特定数据项，写入也会成功。如果无法到达任何直接负责存储该数据项副本的节点，那么在任何节点上的**提示移交**（本章稍后详述）就足以完成写入。这是一个**极低可靠性**的设置，因为默认情况下提示移交在三小时后会被删除；对此设置最好的说法是数据**可能**被写入了。


    一些额外的写入一致性级别在下文关于轻量级事务的部分中描述。

    '
- fmt: '## 读一致性


    读一致性级别与写一致性级别类似。关键术语是相同的，尽管其语义当然有所不同。写一致性的设置并不意味着任何特定的读一致性设置，正如我们将看到的，正是这两者之间的相互作用决定了数据库的整体行为。


    最常见的读一致性级别有：


    *   `ALL`：轮询所有副本。

    *   `ONE`|`TWO`|`THREE`：读取请求将被传播到“最近的”一个、两个或三个节点。“接近度”由一个`snitch`确定（参见第[8]章）。

    *   `LOCAL_ONE`：读取请求将被发送到当前数据中心中最近的节点。

    *   `QUORUM`：当一个法定人数（quorum）返回数据后，读取完成：一个`QUORUM`涉及所有数据中心中大多数副本。

    *   `EACH_QUORUM`：当每个数据中心中的副本法定人数都响应后，读取完成。

    *   `LOCAL_QUORUM`：当本地数据中心中的副本法定人数响应后，读取完成。


    一些额外的读一致性级别在后续关于轻量级事务的部分中有描述。


    请注意，当从多个副本请求读取时，`Cassandra`不需要看到每个节点的全部数据内容。相反，协调器通常会请求一个数据摘要。该摘要是一个数据的哈希表示，可用于确定两组返回的数据是否相同。我们将在关于读修复和暗示切换的部分进一步讨论这一点。


    ## 一致性级别间的相互作用


    读和写一致性级别的设置相互作用，产生了各种性能、一致性和可用性结果。可以以降低性能为代价来配置强一致性和高可用性；可以以牺牲一致性为代价来配置高可用性和性能；或者可以以牺牲可用性为代价来实现一致性和性能。其中一些权衡在图[3-6]中进行了说明。表[9-1]描述了一些组合及其含义。


    表 9-1.


    `Cassandra`中读写一致性级别的相互作用


    | 读\写 | `ONE` | `QUORUM` | `ALL` |

    | --- | --- | --- | --- |

    | `ONE` | 高性能和可用性，但无一致性 |   | 写入快速且高度可用；读取一致但速度慢且高度不可用 |

    | `QUORUM` |   | 性能中等，可用性好，强一致性 |   |

    | `ALL` | 写入缓慢且高度不可用；读取快速且一致 |   | 最严格的一致性，但可用性和性能最低 |


    ## 暗示切换与读修复


    我们在上一章关于`Cassandra`集群的上下文中讨论过暗示切换和读修复，但由于它们是`Cassandra`一致性机制的重要组成部分，有必要进一步讨论。


    除非写一致性级别设置为`ALL`，否则不一致性会在`Cassandra`集群中积累。网络分区或临时节点停机（例如重启）会阻止一些副本写入完成。随着时间的推移，这些不一致性会不断积累，造成无序和混乱——通常在热力学中被称为熵。`Cassandra`和其他基于`Dynamo`的数据库中的反熵机制旨在主动将系统恢复到一致状态。


    暗示切换允许一个节点存储原本打算发给另一个节点的更新，前提是该节点暂时不可用。如果该节点在短时间内（默认为三小时）重新上线，写入操作将被传输。如果该节点在该时间段内未重新上线，则暗示切换将被删除。如果一致性级别设置为`ANY`，暗示切换可以替代一次成功的写入。


    读修复是`Cassandra`可用于修复不一致性的机制，例如，当一个节点停机时间超过暗示切换限制时。当`Cassandra`从多个节点组装一次读取时，它会检测到任何具有过时数据的节点。一个更新将被发送到过时的副本以纠正不一致性。


    如前所述，`Cassandra`在多节点读取期间不会请求所有副本的整个数据值。相反，一个节点被直接发出读取实际数据的请求，而其他节点则被发送请求以获取数据的哈希摘要。如果结果不一致，则通过直接读取检索最新的数据，并向过时的节点发出读修复指令。


    图[9-3]提供了一个读修复操作的示例。协调器节点向一个副本（1）请求直接读取（例如实际数据），并向另外两个副本（2）请求摘要（例如哈希值）。其中一个副本具有过期数据（3）。在将正确结果返回给客户端（4）后，协调器向过期的副本（5）发出读修复。


    ![A978-1-4842-1329-2_9_Fig3_HTML.jpg](A978-1-4842-1329-2_9_Fig3_HTML.jpg)


    图 9-3.


    `Cassandra`中的读修复


    正如前一章所述，还可以安排或手动调用批量读修复操作，以查找整个键空间中的不一致性。这种机制将在第[10]章讨论压实策略时进一步探讨。


    ## 时间戳与粒度


    `Cassandra`使用时间戳来确定哪个副本是最新的。其他`Dynamo`系统（如`Riak`）使用不同的算法，称为向量钟，我们将在下一节讨论。


    `Cassandra`的方法涉及比较冲突写入的时间戳，并选择时间戳最高的那个；这种策略被称为**最后写入胜出**。


    当应用于文档数据库或键值存储中可能出现的大型复杂对象时，最后写入胜出的方法存在一些潜在的缺点。一个用户可能修改了用户的电子邮件地址，几秒钟后另一个用户修改了同一位用户的出生日期。我们不希望出生日期的修改抹掉电子邮件地址的更新。`MongoDB`和`HBase`在更新期间锁定整个文档或行以避免此潜在问题。


    `Cassandra`通过将修改、并发和冲突解决的单位定为单个单元格（即行和列的交点）来解决此问题。这意味着两个用户可以愉快地同时修改同一行，前提是他们不修改同一列。如果一个用户更新了出生日期，而另一个用户更新了同一行的电子邮件地址，这两个更新都不会相互冲突。'
  raw: '### Read Consistency


    Read consistency levels are similar to write consistency levels. The key words
    are identical, though the semantics are of course somewhat different. A setting
    for write consistency does not imply any particular read consistency setting,
    though as we shall see it is the interaction between the two that determines the
    overall behavior of the database.


    The most common consistency levels for reads are:


    *   ALL: All replicas are polled.

    *   ONE|TWO|THREE: Read requests will be propagated to the “closest” ONE, TWO,
    or THREE nodes. “Closeness” is determined by a snitch (see Chapter [8](#A978-1-4842-1329-2_8_Chapter.html)).

    *   LOCAL_ONE: The read request will be sent to the closest node in the current
    data center.

    *   QUORUM: The read completes after a quorum has returned data: a quorum involves
    a majority of replicas across all data centers.

    *   EACH_QUORUM: The read completes after a quorum of replicas in each data center
    have responded.

    *   LOCAL_QUORUM: The read completes after a quorum of replicas in the local data
    center respond.


    Some additional read consistency levels are described in the section on lightweight
    transactions that follows.


    Note that when requesting a read from multiple replicas, Cassandra does not need
    to see the entire data content from each node. Instead, the coordinator will often
    request a digest of the data. The digest is a hashed representation of the data
    that can be used to determine if two sets of returned data are identical. We’ll
    discuss this further in the sections on read repair and hinted handoff.


    ### Interaction between Consistency Levels


    The settings of read and write consistency interact to create a variety of performance,
    consistency, and availability outcomes. Strong consistency and high availability
    can be configured at the cost of lower performance; high availability and performance
    can be configured at the cost of consistency; or consistency and performance can
    be achieved at the cost of availability. Some of these trade-offs were illustrated
    in Figure [3-6](#A978-1-4842-1329-2_3_Chapter.html#Fig6). Table [9-1](#A978-1-4842-1329-2_9_Chapter.html#Tab1)
    describes some of the combinations and their implications.


    Table 9-1.


    Interaction between Read and Write Consistency Levels in Cassandra


    | ReadWrite | ONE | QUORUM | ALL |

    | --- | --- | --- | --- |

    | ONE | High performance and availability but no consistency |   | Fast and highly
    available for writes; consistent but slow and not highly available reads |

    | QUORUM |   | Intermediate performance, good availability, strong consistency
    |   |

    | ALL | Slow and not highly available for writes; fast and consistent reads |
      | Strictest consistency, but lowest availability and performance |


    ### Hinted Handoff and Read Repair


    We spoke about hinted handoff and read repair in the context of Cassandra clustering
    in the previous chapter, but since they form an important part of Cassandra’s
    consistency story, some further discussion is in order.


    Unless the write consistency level is set to ALL, inconsistencies will collect
    within the Cassandra cluster. Network partitions or temporary node downtime (from
    reboots, for instance) will prevent some replica writes from completing. Over
    time these inconsistencies will build up, creating disorder and chaos—what is
    often referred to as entropy in thermodynamics. Anti–entropy mechanisms in Cassandra
    and other Dynamo-based databases seek to actively return the system to a consistent
    state.


    Hinted handoffs allow a node to store an update that is intended for another node
    if that node is temporarily unavailable. If the node comes back online within
    a short interval (by default, three hours), the write will be transmitted. If
    the node does not come back online within that period, the hinted handoff is deleted.
    A hinted handoff can substitute for a successful write if the consistency level
    is set to ANY.


    Read repair is a mechanism that Cassandra can use to repair inconsistencies that
    might arise, for instance, when a node is down longer than the hinted handoff
    limit. When Cassandra assembles a read from multiple nodes, it will detect any
    nodes that have out-of-date data. An update will be sent to the out-of-date replicas
    to correct the inconsistency.


    As noted earlier, Cassandra does not request the entire data value from all replicas
    during a multi-node read. Instead, one node is issued a direct read request for
    the actual data, while other nodes are sent requests for hashed digests of the
    data. If the results are inconsistent, the most recent data is retrieved by a
    direct read, and a read repair instruction is issued to the out-of-date nodes.


    Figure [9-3](#A978-1-4842-1329-2_9_Chapter.html#Fig3) provides an example of a
    read-repair operation. A coordinator node requests a direct read (e.g., the actual
    data) from one replica (1) and digests (e.g., hashes) from two other replicas
    (2). One of the replicas has out-of-date data (3). After returning the correct
    result to the client (4), the coordinator issues a read repair to the out-of-date
    replica (5).


    ![A978-1-4842-1329-2_9_Fig3_HTML.jpg](A978-1-4842-1329-2_9_Fig3_HTML.jpg)


    Figure 9-3.


    Read repair in Cassandra


    As noted in the previous chapter, there is also the ability to schedule or manually
    invoke batch read-repair operations that find inconsistencies across entire keyspaces.
    This mechanism will be discussed further in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html),
    when we discuss compaction strategies.


    ### Timestamps and Granularity


    Cassandra uses timestamps to determine which replica is the most up to date. Other
    Dynamo systems such as Riak use a different algorithm, known as a vector clock,
    which we’ll discuss in the next section.


    The Cassandra approach involves comparing the timestamps of conflicting writes
    and choosing the one with the highest timestamp; this strategy is referred to
    as last write wins.


    The last write wins approach has some potential drawbacks when applied to large,
    complex objects such as you would find in a document database or in a key-value
    store. One user might modify the user’s email address while seconds later another
    user modifies the user’s date of birth. We don’t want the date-of-birth modification
    to obliterate the email address update. MongoDB and HBase lock the entire document
    or row during an update to avoid this potential problem.


    The issue is addressed in Cassandra by making the unit of modification, concurrency,
    and conflict resolution the individual cell: the intersection of row and column.
    This means that two users can happily modify the same row simultaneously, providing
    they are not modifying the same column. If one user updates the date of birth
    and another user updates the email address for a row, neither update will conflict
    with the other.'
