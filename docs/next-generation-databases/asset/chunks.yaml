    ### 事务模型


    关系模型本身并未定义数据库如何处理并发的数据变更请求。这些变更——通常被称为数据库事务——给所有数据库系统都带来了问题，因为需要确保数据的一致性和完整性。


    吉姆·格雷在 20 世纪 70 年代末定义了最广为接受的事务模型。正如他所说：“事务是一种状态转换，它具有原子性（要么全做，要么全不做）、持久性（效果在故障后依然存在）和一致性（一种正确的转换）这些属性。”³
    这很快被推广为 `ACID` 事务：原子性、一致性、隔离性和持久性。一个 `ACID` 事务应该是：


    *   **原子性**：事务是不可分割的——事务中的所有语句要么全部应用于数据库，要么全部不应用。

    *   **一致性**：数据库在事务执行前后都保持一致的状态。

    *   **隔离性**：虽然一个或多个用户可以同时执行多个事务，但一个事务不应该看到其他进行中事务的影响。

    *   **持久性**：一旦事务被保存到数据库（在 `SQL` 数据库中通过 `COMMIT` 命令），即使操作系统或硬件发生故障，其更改也应预期会持续存在。


    `ACID` 事务成为了所有严肃的数据库实现的标准，但也与格雷论文发表前后兴起的关系数据库联系最为紧密。


    正如我们稍后将看到的，`ACID` 事务模型所隐含的、对超越单一数据中心可扩展性的限制，一直是开发新数据库架构的关键驱动力。


    ### 最早的关系数据库


    最初对关系模型的反应有些冷淡。包括 `IBM` 在内的现有供应商不愿接受科德的基本假设：即当时的数据库建立在一个有缺陷的基础上。此外，许多人真诚地质疑，如果数据表示没有针对底层访问机制进行微调，一个系统是否能够提供足够的性能。有没有可能创建一个高性能数据库系统，允许用户以任何可能想象的方式访问数据呢？


    然而，`IBM` 确实在 1974 年启动了一个研究项目，开发一个名为 `System R` 的关系数据库系统原型。`System R` 证明了关系数据库可以提供足够的性能，并且它开创了
    `SQL` 语言。（科德曾规定关系系统应包括查询语言，但未强制要求特定的语法。）同样在此期间，伯克利的迈克尔·斯通布雷克开始着手一个最终名为 `INGRES`
    的数据库系统。`INGRES` 也是关系型的，但它使用了一种非 `SQL` 的查询语言，称为 `QUEL`。


    这时，拉里·埃里森出现在我们的故事中。埃里森本质上比学术型更富创业精神，尽管技术上极其精通，曾在 `Amdahl` 工作。埃里森既熟悉科德的工作，也了解 `System
    R`，他相信关系数据库代表了数据库技术的未来。1977 年，埃里森创立了最终成为 `Oracle 公司` 的公司，并发布了第一个商业上成功的关系数据库系统。


    ### 数据库之战！


    正是在这一时期，小型机挑战并最终终结了大型计算机的主导地位。与今天的计算机硬件相比，70 年代末 80 年代初的小型机几乎算不上“小型”。但与大型机不同，它们几乎不需要专门的设施，并且使得中型公司首次能够拥有自己的计算基础设施。这些新的硬件平台运行着新的操作系统，并催生了对能在这些操作系统上运行的新数据库的需求。


    到 1981 年，`IBM` 已经发布了一款名为 `SQL/DS` 的商业关系数据库，但由于它只能在 `IBM` 大型机操作系统上运行，因此在快速增长的小型机市场毫无影响力。埃里森的
    `Oracle` 数据库系统于 1979 年商业化发布，并迅速在 `Digital` 和 `Data General` 等公司提供的小型机上获得青睐。与此同时，伯克利的
    `INGRES` 项目也催生了商业关系数据库 `Ingres`。`Oracle` 和 `Ingres` 在早期的小型机关系数据库市场争夺主导地位。


    到 80 年代中期，关系数据库的好处——即使不是关系理论的细微差别——已被广泛理解。数据库购买者尤其欣赏 `SQL` 语言（现在包括 `Ingres` 在内的所有供应商都已采用），它为报表编写和分析查询带来了巨大的生产力提升。此外，新一代数据库开发工具——当时被称为
    4GL——日益流行，而这些新工具通常与关系数据库服务器配合得最好。最后，小型机在性价比上，特别是在中端市场，提供了明显优于大型机的优势，而在这里，关系数据库几乎是唯一的选择。


    事实上，关系数据库在心智份额上变得如此主导，以至于旧式数据库系统的供应商不得不将他们的产品也描述为关系型的。这促使科德写下了他著名的 12 条规则（实际上是
    13 条规则，从规则 0 开始），作为区分真正的关系数据库与冒牌货的一种严格测试。


    在随后的几十年里，许多新的数据库系统被引入。这些包括 `Sybase`、`Microsoft SQL Server`、`Informix`、`MySQL`
    和 `DB2`。虽然这些系统中的每一个都试图通过声称在性能、可用性、功能或经济性方面更优来差异化，但它们在依赖三个关键原则方面几乎是相同的：科德的关系模型、`SQL`
    语言和 `ACID` 事务模型。


    **注意**


    当我们说 `RDBMS` 时，通常指的是实现关系数据模型、支持 `ACID` 事务并使用 `SQL` 进行查询和数据操作的数据库。


    ### 客户端-服务器计算


    到 80 年代末，关系模型显然在争夺数据库心智份额的战斗中取得了决定性胜利。这种心智份额的主导地位在向客户端-服务器计算的转变过程中转化为了市场主导地位。


    小型机在某种程度上是“小型大型机”：在小型机应用程序中，所有处理都发生在小型机本身上，用户通过笨拙的“绿屏”终端与应用程序交互。然而，即使在小型机成为商业计算支柱的同时，一场新的应用程序架构革命正在兴起。


    基于 `IBM PC` 标准的微型计算机平台日益普及，以及 `Microsoft Windows` 等图形用户界面的出现，催生了一种新的应用范式：客户端-服务器。在客户端-服务器模型中，表示逻辑通常托管在运行
    `Microsoft Windows` 的 `PC` 终端上。这些基于 `PC` 的客户端程序与通常运行在小型机上的数据库服务器通信。应用程序逻辑通常集中在客户端，但也可以使用存储过程——在数据库内部运行的程序——位于数据库服务器内。


    客户端-服务器提供了绿屏时代无与伦比的丰富体验，到 90 年代初，几乎所有新的应用程序都追求客户端-服务器架构。几乎所有的客户端开发平台都假定后端是 `RDBMS`——事实上，通常假定
    `SQL` 是客户端与服务器之间所有请求的载体。

