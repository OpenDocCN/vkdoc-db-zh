  trans: '

    ### 其他数据库中的列式技术


    列式范式的变体已在传统关系型系统和其他“NewSQL”系统中实现。例如，内存数据库`SAP HANA`提供了在表级别支持列或行定向的功能。`Oracle 12c`的“内存数据库”也实现了列存储。我们将在第
    7 章中简要介绍这些架构。


    Oracle 的增强型混合列压缩（`EHCC`）是一种有趣的尝试，旨在结合行存储和列存储技术的优点。`EHCC`（目前仅在 Oracle 的`Exadata`系统中可用）中，数据行被包含在约`1
    MB`的压缩单元内，而列则存储在更小的`8K`块中。因为列在块内一起存储，可以实现高压缩率。因为行被保证在`1 MB`的压缩单元内，执行行级修改的开销得以降低。图
    6-7 阐释了这个概念。行包含在`1MB`的压缩单元内，但每个`8K`块包含经过高度压缩的特定列的数据。


    ![A978-1-4842-1329-2_6_Fig7_HTML.jpg](img/A978-1-4842-1329-2_6_Fig7_HTML.jpg)


    图 6-7. Oracle 的混合列压缩方案


    列式存储在现代非关系型系统中也很常见。`Apache Parquet`是`Hadoop`文件的列式存储机制，允许`Hadoop`系统利用列式的性能优势和压缩能力。`Apache
    Kudu`同时使用行和列存储格式，旨在弥合`HDFS`基于行的处理与`Hadoop`文件扫描之间公认的性能差距。


    ## 结论


    人们很容易认为列式架构只是对存储的物理调整，对数据库系统的整体设计影响甚微。然而，列式存储范式对现有关系系统（它们渴望承担数据仓库角色）和如`Vertica`这类“新
    SQL”系统的演进都产生了巨大影响。


    理解列式架构对于审视新一代内存数据库也很重要；正如我们将在下一章看到的，其中许多数据库内部采用了列式架构，以优化和压缩驻留内存的数据，用于分析目的。


    ## 注释


    `C-Store: A Column-oriented DBMS`，第 31 届 VLDB 会议论文集，挪威特隆赫姆，2005 年；[`http://db.lcs.mit.edu/projects/cstore/vldb.pdf`](http://db.lcs.mit.edu/projects/cstore/vldb.pdf)


    # 7. 磁盘的终结？SSD 与内存数据库


    > 640K 的内存对任何人来说都足够了。——据称（无依据）出自比尔·盖茨，1981 年

    >

    > 我说过一些蠢话和错话，但不是那句。——比尔·盖茨，2001 年


    自第一个数据库系统诞生以来，数据库专业人员一直致力于不惜一切代价避免磁盘`IO`。对磁盘设备的`IO`速度一直比内存或`CPU`访问慢许多数量级，而且随着摩尔定律加速了`CPU`和内存的性能，而机械磁盘性能却停滞不前，这种情况只会变得更糟。


    经济实惠的固态硬盘（`SSD`）技术的出现，使数据库磁盘性能实现了量子飞跃。在过去的几年里，`SSD`技术已从昂贵的奢侈品转变为主流技术，在几乎每一个性能关键的数据库系统中都占有一席之地。然而，`SSD`具有一些独特的性能特性，因此一些数据库系统被开发出来以利用这些能力。


    虽然`SSD`允许加速`IO`，但服务器内存容量的增加和成本的降低有时使我们能够完全避免`IO`。许多较小的数据库现在可以完全装入单台服务器的内存容量，当然也可以装入集群的内存容量。对于这些数据库，内存解决方案可能比`SSD`架构更具吸引力。


    ## 磁盘的终结？


    自 20 世纪 50 年代以来，磁盘设备在数字计算中一直无处不在。其基本架构在此期间变化甚微：一个或多个盘片包含代表信息位的磁荷。这些磁荷由一个驱动臂读写，该臂移动到盘片半径上的特定位置，然后等待盘片旋转到适当的位置。这些机械操作本质上很慢，并且无法从摩尔定律描述的指数级改进中受益。这是简单的物理学——如果磁盘转速随着`CPU`处理能力的提高而增加，那么现在磁盘外缘的速度将达到光速的大约
    10 倍！


    图 7-1 说明，虽然这些设备的尺寸和密度多年来有所提升，但其架构基本未变。虽然摩尔定律驱动了`CPU`、内存和磁盘密度的指数级增长，但它并不适用于磁盘性能的机械方面。因此，磁盘已成为数据库性能日益增长的拖累。


    ![A978-1-4842-1329-2_7_Fig1_HTML.jpg](img/A978-1-4842-1329-2_7_Fig1_HTML.jpg)


    图 7-1. 历年来的磁盘设备


    ### 固态硬盘


    与磁盘不同，固态硬盘没有活动部件，`IO`延迟大幅降低。商用`SSD`目前使用`DDR RAM`（本质上是带电池备份的`RAM`设备）或`NAND 闪存`实现。`NAND
    闪存`是一种固有的非易失性存储介质，几乎完全主导了当今的`SSD`市场。


    闪存`SSD`的性能比磁盘设备高出几个数量级，尤其是在读取操作方面。高端固态硬盘的随机读取可能只需`25`微秒，而磁盘读取可能需要高达`4,000`微秒（`4`毫秒或`4/1000`秒）——慢了`150`多倍。


    虽然`SSD`肯定比磁盘快，但对于所有工作负载来说，速度提升并不成比例。特别是，在`SSD`中修改信息的成本（花费时间）比从中读取信息要高。


    `SSD`在存储单元中存储信息位。单层单元（`SLC`）`SSD`每个单元存储一位信息，而多层单元（`MLC`）`SSD`在每个单元中存储多于一位——通常只有两位，但有时是三位。单元被排列成约`4K`的页，页被排列成块，通常每个块包含`256`个页。


    读取操作和初始写入操作只需要单页`IO`。然而，更改页的内容需要对整个块进行擦除和覆盖。即使是初始写入也可能明显慢于读取，但块擦除操作尤其慢——大约两毫秒。图
    7-2 显示了页寻道、页写入和块擦除的大致时间。


    ![A978-1-4842-1329-2_7_Fig2_HTML.jpg](img/A978-1-4842-1329-2_7_Fig2_HTML.jpg)


    图 7-2. 闪存 SSD 的性能特征


    商用`SSD`制造商花费巨大努力来避免擦除操作带来的性能损失，以及单元被修改时`SSD`产生的“磨损”所引发的可靠性问题。他们采用复杂的算法来确保最小化擦除操作，并使写入均匀分布在设备上。然而，这些算法会产生写入放大效应，即每次写入操作都伴随着`SSD`上的多次物理`IO`，因为数据被移动，存储空间被回收。


    注释


    无论`SSD`供应商实施了多么复杂的算法和优化，基本点仍然是：闪存`SSD`在执行写入时的速度明显慢于执行读取时的速度。

