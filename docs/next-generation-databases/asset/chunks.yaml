  trans: '### 磁盘经济学


    固态硬盘的前景让一些人预期所有磁盘终将被 SSD 取代。虽然这一天可能到来，但在短期内，存储的经济性与 I/O 的经济性却存在矛盾：磁盘技术提供了每单位存储更经济的介质，而闪存技术则提供了交付高
    I/O 速率和低延迟更经济的介质。尽管固态硬盘的成本正在迅速下降，磁盘的成本也是如此。图 7-3 展示了 SSD 和 HDD 每 GB 成本趋势的考察。


    ![A978-1-4842-1329-2_7_Fig3_HTML.jpg](img/A978-1-4842-1329-2_7_Fig3_HTML.jpg)


    图 7-3. SSD 与 HDD 存储成本趋势（注意对数刻度）


    虽然对于小型数据库或性能关键型系统而言，SSD 正日益成为一种经济的解决方案，但它不太可能成为海量数据库的通用解决方案，尤其是对于那些访问不频繁的数据。因此，我们很可能会看到固态硬盘、传统硬盘和内存的组合，为下一代数据库提供基础。


    ### 支持 SSD 的数据库


    一些下一代数据库系统专门设计了架构，以利用 SSD 的物理特性。


    许多传统的关系型数据库在 SSD 上表现相对较差，因为关键的 I/O 操作被隔离为顺序写操作，而硬盘驱动器在此类操作上表现良好，但这却代表着 SSD 最糟糕的工作负载。当一个符合`ACID`的关系型数据库中的事务提交时，事务记录通常会立即写入一个顺序事务日志（在某些数据库中称为重做日志）。即使将此事务日志移到
    SSD 上，其 I/O 性能也可能不会提升，因为 SSD 的写入性能较低，并且存在我们之前讨论过的写入放大效应。在这种情况下，用户可能会对将写密集型`RDBMS`迁移到
    SSD 后实现的性能提升感到失望。


    许多非关系型系统（例如`Cassandra`）使用日志结构化存储引擎——通常基于日志结构合并树（`LSM`）架构——详情参见第 10 章。这些系统倾向于避免更新现有块，而是执行更大的批量写入操作，这对固态硬盘的性能特性更为友好。


    `Aerospike`是一个 NoSQL 数据库，它试图提供一种能够充分利用闪存 SSD I/O 特性的数据库架构。`Aerospike`实现了一个日志结构化文件系统，其中更新是通过将新值追加到文件并将原始数据标记为无效来物理实现的。旧值的存储空间由后台进程在稍后时间回收。


    `Aerospike`在内存使用上也采用了一种不寻常的方法。它并非使用主内存作为缓存来避免物理磁盘 I/O，而是使用主内存来存储数据的索引，同时始终将数据保留在闪存上。这种方法代表了这样一种认识：在基于闪存的系统中，传统数据库“不惜一切代价避免
    I/O”的做法可能是不必要的。


    ## 内存数据库


    固态硬盘可能对数据库性能产生了变革性影响，但对大多数数据库架构而言，它只带来了渐进式的改变。一个更具范式转变趋势的，是将完整数据库存储在主内存中日益增长的实用性。


    自计算机发展初期以来，内存的成本以及单台服务器上可安装的内存容量都呈指数级增长。图 7-4 说明了这些趋势：几十年来，单位存储的内存成本以及单个内存芯片上可容纳的存储容量一直在增长（注意对数刻度——相对笔直的线条表明了指数级趋势）。


    ![A978-1-4842-1329-2_7_Fig4_HTML.jpg](img/A978-1-4842-1329-2_7_Fig4_HTML.jpg)


    图 7-4. 过去 40 年内存成本和容量趋势（注意对数刻度）


    平均数据库的规模——特别是在大数据现象的背景下——也呈指数级增长。对于许多系统，数据库的增长速度持续超过内存的增长速度。但现在，许多规模更适中的数据库可以轻松地存储在单台服务器的内存中。而比这多得多的数据库可以驻留在集群的内存容量范围内。


    传统的关系型数据库使用内存来缓存存储在磁盘上的数据，随着内存量的增加，它们通常会表现出显著的性能提升。但有一些数据库操作必须写入持久化介质。在传统的数据库架构中，`COMMIT`操作需要将数据写入持久化介质上的事务日志，并且数据库会定期将内存中的“检查点”块写入磁盘。要充分利用大内存系统，需要一种能够意识到数据库完全驻留在内存中的架构，并且能够在不丢失数据（即使在断电情况下）的前提下，利用高速访问的优势。


    内存系统应解决传统数据库架构的两个变化：


    *   无缓存架构：传统的基于磁盘的数据库几乎无一例外地在主内存中缓存数据，以最小化磁盘 I/O。在内存系统中，这是徒劳且适得其反的：缓存已经存储在内存中的数据毫无意义！

    *   替代持久化模型：内存中的数据在断电时会消失，因此数据库必须应用某种替代机制来确保数据不会丢失。


    内存数据库通常使用一些组合技术来确保不丢失数据。这些包括：


    *   将数据复制到集群中的其他成员。

    *   将完整的数据库映像（称为快照或检查点）写入磁盘文件。

    *   将事务/操作记录写入仅追加的磁盘文件（称为事务日志或日志）。'
- fmt: '### TimesTen


    TimesTen is a relatively early in-memory database system that aspires to support
    workloads similar to a traditional relational system, but with better performance.
    TimesTen was founded in 1995 and acquired by Oracle in 2005. Oracle offers it
    as a standalone in-memory database or as a caching database supplementing the
    traditional disk-based `Oracle RDBMS`.


    #### 核心特点

    TimesTen implements a fairly familiar SQL-based relational model. Subsequent to
    the purchase by Oracle, it implemented `ANSI standard SQL`, but in recent years
    the effort has been to make the database compatible with the core Oracle database—to
    the extent of supporting Oracle’s stored procedure language `PL/SQL`.


    #### 持久化与事务

    In a TimesTen database, all data is memory resident. Persistence is achieved by
    writing periodic snapshots of memory to disk, as well as writing to a disk-based
    transaction log following a transaction commit.


    In the default configuration, all disk writes are asynchronous: a database operation
    would normally not need to wait on a disk IO operation. However, if the power
    fails between the transaction commit and the time the transaction log is written,
    then data could be lost. This behavior is not `ACID` compliant because transaction
    durability (the “D” in `ACID`) is not guaranteed. However, the user may choose
    to configure synchronous writes to the transaction log during commit operations.
    In this case, the database becomes `ACID` compliant, but some database operations
    will wait on disk IO.


    #### 架构图示

    Figure 7-5 illustrates the TimesTen architecture. When the database is started,
    all data is loaded from checkpoint files into main memory (1). The application
    interacts with TimesTen via SQL requests that are guaranteed to find all relevant
    data inside that main memory (2). Periodically or when required database data
    is written to checkpoint files (3). An application commit triggers a write to
    the transaction log (4), though by default this write will be asynchronous so
    that the application will not need to wait on disk. The transaction log can be
    used to recover the database in the event of failure (5).


    ![A978-1-4842-1329-2_7_Fig5_HTML.jpg](A978-1-4842-1329-2_7_Fig5_HTML.jpg)


    Figure 7-5. TimesTen Architecture


    #### 当前意义

    TimesTen is significant today primarily as part of Oracle’s enterprise solutions
    architecture. However, it does represent a good example of an early memory-based
    transactional relational database architecture.


    ### Redis


    #### 起源与发展

    While TimesTen is an attempt to build an `RDBMS` compatible in-memory database,
    Redis is at the opposite extreme: essentially an in-memory key-value store. `Redis`
    (Remote Dictionary Server) was originally envisaged as a simple in-memory system
    capable of sustaining very high transaction rates on underpowered systems, such
    as virtual machine images.


    Redis was created by Salvatore Sanfilippo in 2009. VMware hired Sanfilippo and
    sponsored Redis development in 2010. In 2013, Pivotal software—a Big Data spinoff
    from VMware’s parent company EMC—became the primary sponsor.


    #### 架构与特性

    Redis follows a familiar key-value store architecture in which keys point to objects.
    In Redis, objects consist mainly of strings and various types of collections of
    strings (lists, sorted lists, hash maps, etc.). Only primary key lookups are supported;
    Redis does not have a secondary indexing mechanism.


    Although Redis was designed to hold all data in memory, it is possible for Redis
    to operate on datasets larger than available memory by using its virtual memory
    feature. When this is enabled, Redis will “swap out” older key values to a disk
    file. Should the keys be needed they will be brought back into memory. This option
    obviously involves a significant performance overhead, since some key lookups
    will result in disk IO.


    #### 持久化机制

    Redis uses disk files for persistence:

    *   The `Snapshot` files store copies of the entire Redis system at a point in
    time. Snapshots can be created on demand or can be configured to occur at scheduled
    intervals or after a threshold of writes has been reached. A snapshot also occurs
    when the server is shut down.

    *   The `Append Only File (AOF)` keeps a journal of changes that can be used to
    “roll forward” the database from a snapshot in the event of a failure. Configuration
    options allow the user to configure writes to the `AOF` after every operation,
    at one-second intervals, or based on operating-system-determined flush intervals.


    #### 复制功能

    In addition, Redis supports asynchronous master/slave replication. If performance
    is very critical and some data loss is acceptable, then a replica can be used
    as a backup database and the master configured with minimal disk-based persistence.
    However, there is no way to limit the amount of possible data loss; during high
    loads, the slave may fall significantly behind the master.


    #### 架构图示

    Figure 7-6 illustrates these architectural components. The application interacts
    with Redis through primary key lookups that return “values”—strings, sets of strings,
    hashes of strings, and so on (1). The key values will almost always be in memory,
    though it is possible to configure Redis with a virtual memory system, in which
    case key values may have to be swapped in or out (2). Periodically, Redis may
    dump a copy of the entire memory space to disk (3). Additionally, Redis can be
    configured to write changes to an append-only journal file either at short intervals
    or after every operation (4). Finally, Redis may replicate the state of the master
    database asynchronously to slave Redis servers (5).


    ![A978-1-4842-1329-2_7_Fig6_HTML.jpg](A978-1-4842-1329-2_7_Fig6_HTML.jpg)


    Figure 7-6. Redis architecture


    #### 性能考量

    Although Redis was designed from the ground up as in an in-memory database system,
    applications may have to wait for IO to complete under the following circumstances:

    *   If the `Append Only File` is configured to be written after every operation,
    then the application needs to wait for an IO to complete before a modification
    will return control.

    *   If Redis virtual memory is configured, then the application may need to wait
    for a key to be “swapped in” to memory.


    #### 总结

    Redis is popular among developers as a simple, high-performance key-value store
    that performs well without expensive hardware. It lacks the sophistication of
    some other nonrelational systems such as `MongoDB`, but it works well on systems
    where the data will fit into main memory or as a caching layer in front of a disk-based
    database.'
