- fmt: '### SAP HANA


    SAP introduced `HANA` in 2010, positioning it as a revolutionary in-memory database
    designed primary for Business Intelligence (`BI`), but also capable of supporting
    `OLTP` workloads.


    `SAP HANA` is a relational database designed to provide breakthrough performance
    by combining in-memory technology with a columnar storage option, installed on
    an optimized hardware configuration. Although `SAP` do not ship `HANA` hardware,
    they do provide detailed guidelines for `HANA`-certified servers, including a
    requirement for fast `SSD` drives.


    Tables in `HANA` can be configured for row-oriented or columnar storage. Typically,
    tables intended for `BI` purposes would be configured as columnar, while `OLTP`
    tables are configured as row oriented. The choice of row or columnar formats provides
    `HANA` with its ability to provide support for both `OLTP` and analytic workloads.


    Data in the row store is guaranteed to be in memory, while data in the column
    store is by default loaded on demand. However, specified columns or entire tables
    may be configured for immediate loading on database startup.


    The persistence architecture of `HANA` uses the snapshot and journal file pattern
    found in `Redis` and `TimesTen`. `HANA` periodically snapshots the state of memory
    to `Savepoint` files. These `Savepoints` are periodically applied to the master
    database files.


    `ACID` transactional consistency is enabled by the transaction “redo” log. As
    with most `ACID`-compliant relational databases, this log is written upon transaction
    commit, which means that applications will wait on the transaction log `IO` to
    complete before the commit can return control. To minimize the `IO` waits, which
    might slow down `HANA`’s otherwise memory-speed operations, the redo log is placed
    on solid state disk in `SAP`-certified `HANA` appliances.


    `HANA`’s columnar architecture includes an implementation of the write-optimized
    delta store pattern discussed in [Chapter 6](#A978-1-4842-1329-2_6_Chapter.html).
    Transactions to columnar tables are buffered in this delta store. Initially, the
    data is held in row-oriented format (the `L1` delta). Data then moves to the `L2`
    delta store, which is columnar in orientation but relatively lightly compressed
    and unsorted. Finally, the data migrates to the main column store, in which data
    is highly compressed and sorted.


    Figure [7-7](#A978-1-4842-1329-2_7_Chapter.html#Fig7) illustrates these key aspects
    of the `HANA` architecture. On start-up, row-based tables and selected column
    tables are loaded from the database files (1). Other column tables will be loaded
    on demand. Reads and writes to row-oriented tables can be applied directly (2).
    Updates to column-based tables will be buffered in the delta store (3), initially
    to the `L1` row-oriented store. Data in the `L1` store will consequently be promoted
    to the `L2` store, and finally to the column store itself (4). Queries against
    column tables must read from both the delta store and the main column store (5).


    Busy little Figure [7-7](#A978-1-4842-1329-2_7_Chapter.html#Fig7) also illustrates
    the persistence architecture. Images of memory are copied to save points periodically
    (6) and these save points are merged with the data files in due course (7). When
    a commit occurs, a transaction record is written to the redo log (8). The `HANA`
    reference architecture specifies that this redo log be on fast `SSD`.


    ![A978-1-4842-1329-2_7_Fig7_HTML.jpg](A978-1-4842-1329-2_7_Fig7_HTML.jpg)


    Figure 7-7. `SAP HANA` architecture


    Again, we see that although `HANA` is described as an in-memory database, there
    are situations in which an application will need to wait for `IO` from a disk
    device; that is, on commit, and when column tables are loaded on demand into memory.


    ### VoltDB


    `Redis`, `HANA`, and `TimesTen` are legitimate in-memory database systems: designed
    from the ground up to use memory as the primary—and usually exclusive—source for
    all data. However, as we have seen, applications that use these systems still
    often need to wait for disk `IO`. In particular, there will often be a disk `IO`
    to some form of journal or transaction log when a transaction commits.


    `VoltDB` is a commercial implementation of the `H-store` design. `H-store` was
    one of the databases described in Michael Stonebraker’s seminal 2007 paper, which
    argued that no single database architecture was suitable for all modern workloads.
    [¹](#A978-1-4842-1329-2_7_Chapter.html#Sec14) `H-store` describes an in-memory
    database designed with the explicit intention of not requiring disk `IO` during
    normal transactional operations—it aspires to be a pure in-memory solution.


    `VoltDB` supports the `ACID` transactional model, but rather than guaranteeing
    data persistence by writing to a disk, persistence is guaranteed through replication
    across multiple machines. A transaction commit only completes once the data is
    successfully written to memory on more than one physical machine. The number of
    machines involved depends on the `K-safety` level specified. For instance, a `K-safety`
    level of 2 guarantees no data loss if any two machines fail; in this case, the
    commit must successfully be propagated to three machines before completing.


    It is also possible to configure a command log that records transaction commands
    in a disk-based log. This log may be synchronous—written to at every transaction
    commit —or asynchronous. Because `VoltDB` supports only deterministic stored procedure-based
    transactions, the log need only record the actual command that drove the transaction,
    rather than copies of modified blocks, as is common in other database transaction
    logs. Nonetheless, if the synchronous command logging option is employed, then
    `VoltDB` applications may experience disk `IO` wait time.


    `VoltDB` supports the relational model, though its clustering scheme works best
    if that model can be partitioned hierarchically across common keys. In `VoltDB`,
    tables must either be partitioned or replicated. Partitions are distributed across
    nodes of the cluster while replicated tables are duplicated in each partition.
    Tables that are replicated may incur additional overhead during `OLTP` operations,
    since the transactions must be duplicated in each partition; this is in contrast
    to partitioned tables, which incur additional overhead if data must be collated
    from multiple partitions. For this reason, replicated tables are usually smaller
    reference-type tables, while the larger transactional tables are partitioned.


    Partitions in `VoltDB` are distributed not just across physical machines but also
    within machines that have multiple `CPU` cores. In `VoltDB`, each partition is
    dedicated to a single `CPU` that has exclusive single-threaded access to that
    partition. This exclusive access reduces the overhead of locking and latching,
    but it does require that transactions complete quickly to avoid serialization
    of requests.


    Figure [7-8](#A978-1-4842-1329-2_7_Chapter.html#Fig8) illustrates how partitioning
    and replication affect concurrency in `VoltDB`. Each partition is associated with
    a single `CPU` core, and only one `SQL` statement will ever be active against
    the partition at any given moment (1). In this example, `ORDERS` and `CUSTOMERS`
    have been partitioned using the customer ID, while the `PRODUCTS` table is replicated
    in its entirety in all partitions. A query that accesses data for a single customer
    need involve only a single partition (2), while a query that works across customers
    must access—exclusively, albeit for a short time—all partitions (3).


    ![A978-1-4842-1329-2_7_Fig8_HTML.jpg](A978-1-4842-1329-2_7_Fig8_HTML.jpg)


    Figure 7-8. `VoltDB` partitioning


    `VoltDB` transactions are streamlined by being encapsulated into a single `Java`
    stored procedure call, rather than being represented by a collection of separate
    `SQL` statements. This ensures that transaction durations are minimized (no think-time
    or network time within transactions) and further reduces locking issues.'
