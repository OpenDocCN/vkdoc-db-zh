  trans: '## Sybase IQ、C-Store 与 Vertica


    在 20 世纪 90 年代中期，当时的四大关系型数据库供应商之一 Sybase 收购了 Expressway 公司。Expressway 开发了可以说是首个重要的商用列式数据库。Expressway
    的技术成为了 Sybase IQ（"智能查询"）的基础，后者成为了 Sybase 的旗舰数据仓库平台。然而，尽管 Sybase IQ 在随后的十年中获得了显著增长，并且拥有尖端技术，但它未能主导数据仓库市场。业界对列式技术重要性的认识仍然较低。


    2005 年，关系型数据库先驱、Ingres 的发明者 Mike Stonebraker 及其同事发表了一篇论文，概述了一个他们称为 `C-store` 的形式化数据库系统。¹
    `C-store` 与现有的列式系统有许多共同特征，同时也包含一些提高写入性能的重要创新。Stonebraker 的论文包含了 `TPC-H` 基准测试结果，证明了
    `C-Store` 架构在处理数据仓库工作负载时，性能优于现有的基于行的 `DBMS`。


    Stonebraker 成立了 Vertica 公司——旨在构建 `C-Store` 的商业实现。Vertica 于 2011 年被 HP 收购。


    时机就是一切。尽管 Sybase IQ 早在近十年前就成功推出了商用列式数据库，但 `C-Store` 和 Vertica 的出现，恰逢"万能通用"的关系型架构大厦开始出现裂痕之时。`C-Store`
    和 Vertica 成为了一波新浪潮系统的代表——这些系统虽然不排斥关系模型或 `SQL`，但与传统的 `RDBMS` 架构有显著区别。Vertica 成为了"NewSQL"数据库的典范。


    在 `C-Store` 模型发布之后，其他几个重要的基于列的系统也进入了市场，包括 InfoBright、VectorWise 和 MonetDB。列式技术也成为许多重要商用关系型数据库中的关键组成部分，包括
    Oracle Exadata、Microsoft SQL Server 和 SAP HANA。（我们将在本章后面探讨 Oracle 的实现，并在下一章探讨
    HANA。）


    ## 列数据库架构


    正如我们之前指出的，单行的插入和更新开销是列式架构的一个关键弱点。许多数据仓库是通过每日批处理作业批量加载的——典型的夜间 `ETL` 场景。然而，为数据仓库提供实时的"最新"信息变得越来越重要，这意味着数据仓库应该能够接受持续不断的增量更改流。上面概述的简单列式架构将无法应对这种持续不断的行级修改流。


    为了解决这个问题，列式数据库通常会实现某种形式的写优化增量存储（我们简称其为 `delta store`）。数据库的这个区域针对频繁写入进行了优化。你可以简单地将
    `delta store` 中的数据视为行格式，尽管实际上其内部格式可能仍是列式或行/列混合的。无论数据的内部格式如何，`delta store` 通常是内存驻留的，数据通常是未压缩的，并且该存储可以接受高频数据修改。


    `delta store` 中的数据会定期与主列式存储合并。在 Vertica 中，此过程称为 `Tuple Mover`，在 Sybase IQ 中称为
    `RLV (Row Level Versioned) Store Merge`。合并会定期进行，或者当 `delta store` 中的数据量超过阈值时进行。在合并之前，查询可能需要同时访问
    `delta store` 和列存储才能返回完整准确的结果。


    `图 6-5` 展示了一个通用的列式数据库架构。数据库包含一个主要的列存储，其中存放着高度压缩的列式数据，由磁盘存储支持。一个较小的写优化 `delta store`
    包含几乎未压缩、内存驻留且可能是行式的数据。


    ![A978-1-4842-1329-2_6_Fig5_HTML.jpg](img/A978-1-4842-1329-2_6_Fig5_HTML.jpg)


    `图 6-5`. 列存储数据库中的写优化


    大规模的批量顺序加载——例如夜间 `ETL` 作业——通常会定向到列存储（1）。增量插入和更新会定向到写优化存储（2）。查询可能需要从两个存储中读取才能获得完整和一致的结果（3）。系统会定期或根据需要，通过一个进程将数据从写优化存储转移到列存储（4）。


    ### 投影


    在之前对列式数据库的简单描述中，我们展示了每列存储在一起。对于只访问单列的查询，将每列存储在磁盘上的单独区域可能就足够了，但在实际中，复杂的查询需要读取列数据的组合。因此，有时将列的组合一起存储在磁盘上是有意义的。


    为了实现这一点，像 Vertica 这样的列式数据库将表物理存储为一系列 `投影`，其中包含了经常一起访问的列组合。


    例如，在 `图 6-6` 中，我们看到一个包含三个投影的单一逻辑表。在 Vertica 中，每个表都有一个默认的 `超级投影`，包含表中的所有列（1）。会创建额外的投影来支持特定查询。在这个例子中，创建了一个投影来支持按客户聚合的销售数据（2），另一个投影用于按地区和产品聚合的销售数据（3）。


    ![A978-1-4842-1329-2_6_Fig6_HTML.jpg](img/A978-1-4842-1329-2_6_Fig6_HTML.jpg)


    `图 6-6`. 具有三个投影的列式数据库表


    在 Vertica 中，投影可以按一列或多列排序。这减少了排序和聚合操作的处理时间，同时也提高了压缩效率。Vertica 还支持 `预连接投影`，这些投影基于连接条件物化来自多个表的列。`预连接投影`
    的功能类似于传统关系系统中为支持特定连接操作而创建的 `物化视图`。


    `投影` 可以由数据库管理员手动创建，也可以由查询优化器根据特定 `SQL` 即时创建，或者基于历史工作负载批量创建。创建正确的投影集对于列式存储的性能至关重要——其重要性大致相当于在行存储中正确索引的重要性。


    Sybase IQ 将其查询优化结构称为"索引"；然而，这些索引更类似于 Vertica 的投影，而不是 Oracle 或 SQL Server 中的 `B-Tree`
    索引。实际上，Sybase IQ 的默认索引——在表创建时自动在所有列上创建——被称为 `快速投影索引`。Sybase 还支持基于传统 `位图` 和 `B-Tree`
    索引方案的其它索引选项。'
- fmt: '### Columnar Technology in Other Databases


    Variations on the columnar paradigm have been implemented within both traditional
    relational systems and other “NewSQL” systems. For instance the in-memory database
    `SAP HANA` provides support for column or row orientation on a table-by-table
    basis. The `Oracle 12c` “Database in Memory” also implements a column store. We’ll
    touch on these architectures in [Chapter 7](#A978-1-4842-1329-2_7_Chapter.html).


    Oracle’s Enhanced Hybrid Columnar Compression (`EHCC`) is an interesting attempt
    to achieve a best-of-both-worlds combination of row and column storage technologies.
    In `EHCC`— currently only available in Oracle’s `Exadata` system—rows of data
    are contained within compression units of about `1 MB`, with columns stored together
    within smaller `8K` blocks. Because the columns are stored together within blocks,
    high levels of compression can be achieved. Because rows are guaranteed to be
    within a `1 MB` compression unit, the overhead for performing row-level modifications
    is reduced. Figure [6-7](#A978-1-4842-1329-2_6_Chapter.html#Fig7) illustrates
    the concept. Rows are contained within `1MB` compression units, but each `8K`
    block contains data for a specific column that is highly compressed.


    ![A978-1-4842-1329-2_6_Fig7_HTML.jpg](A978-1-4842-1329-2_6_Fig7_HTML.jpg)


    Figure 6-7. Oracle’s hybrid columnar compression scheme


    Column-oriented storage is common in modern nonrelational systems as well. `Apache
    Parquet` is a column-oriented storage mechanism for `Hadoop` files that allows
    `Hadoop` systems to take advantage of columnar performance advantages and compression.
    `Apache Kudu` uses both row and column storage formats to bridge the perceived
    performance gap between `HDFS` row-based processing and `Hadoop` file scans.


    ## Conclusion


    It’s easy to think of columnar architecture as a physical tweak to storage that
    has only a minor impact on the overall design of database systems. However, the
    columnar storage paradigm is incredibly influential in the evolution of both existing
    relational systems that aspire to perform data warehousing roles and “new SQL”
    systems such as `Vertica`.


    Understanding columnar architecture is also important when examining the new breed
    of in-memory databases; as we will see in the next chapter, many of these adopt
    a columnar architecture internally in order to optimize and compress memory-resident
    data for analytical purposes.


    ## Note


    `C-Store: A Column-oriented DBMS`, Proceedings of the 31st VLDB Conference, Trondheim,
    Norway, 2005; [`http://db.lcs.mit.edu/projects/cstore/vldb.pdf`](http://db.lcs.mit.edu/projects/cstore/vldb.pdf)


    # 7. The End of Disk? SSD and In-Memory Databases


    > 640K of memory should be enough for anybody. —attributed (without foundation)
    to Bill Gates, 1981

    >

    > I’ve said some stupid things and some wrong things, but not that. —Bill Gates,
    2001


    Ever since the birth of the first database systems, database professionals have
    strived to avoid disk `IO` at all costs. `IO` to magnetic disk devices has always
    been many orders of magnitude slower than memory or `CPU` access, and the situation
    has only grown worse as Moore’s law accelerated the performance of `CPU` and memory
    while leaving mechanical disk performance behind.


    The emergence of affordable solid state disk (`SSD`) technology has allowed for
    a quantum leap in database disk performance. Over the past few years, `SSD` technology
    has shifted from an expensive luxury to a mainstream technology that has a place
    in almost every performance-critical database system. However, `SSDs` have some
    unique performance characteristics and some database systems have been developed
    to exploit these capabilities.


    While `SSDs` allow `IO` to be accelerated, the increasing capacity and economy
    of server memory sometimes allows us to avoid `IO` altogether. Many smaller databases
    can now fit entirely within the memory capacity of a single server, and certainly
    within the memory capacity of a cluster. For these databases, an in-memory solution
    may be even more attractive than an `SSD` architecture.


    ## The End of Disk?


    The magnetic disk device has been a pervasive presence within digital computing
    since the 1950s. The essential architecture has changed very little over that
    time: one or more platters contain magnetic charges that represent bits of information.
    These magnetic charges are read and written by an actuator arm, which moves across
    the disk to a specific position on the radius of the platter and then waits for
    the platter to rotate to the appropriate location. These mechanical operations
    are inherently slow and do not benefit from the exponential improvement described
    by Moore’s law. This is simple physics—if disk rotational speed had increased
    in line with increases in `CPU` processing capabilities, then by now the velocity
    on the outside of the disk would be about 10 times the speed of light!


    Figure [7-1](#A978-1-4842-1329-2_7_Chapter.html#Fig1) illustrates that while the
    size and density of these devices has improved over the years, the architecture
    remains fundamentally unchanged. While Moore’s law drives exponential growth in
    `CPU`, memory, and disk density, it does not apply to the mechanical aspects of
    disk performance. Consequently, magnetic disks have become an increasing drag
    on database performance.


    ![A978-1-4842-1329-2_7_Fig1_HTML.jpg](A978-1-4842-1329-2_7_Fig1_HTML.jpg)


    Figure 7-1. Disk devices over the years


    ### Solid State Disk


    In contrast to a magnetic disk, solid state disks contain no moving parts and
    provide tremendously lower `IO` latencies. Commercial `SSDs` are currently implemented
    using either `DDR RAM`—effectively a battery-backed `RAM` device—or `NAND flash`.
    `NAND flash` is an inherently nonvolatile storage medium and almost completely
    dominates today’s `SSD` market.


    Performance of flash `SSD` is on orders of magnitude superior to magnetic disk
    devices, especially for read operations. A random read from a high-end solid state
    disk may complete in as little as `25` microseconds, while a read from a magnetic
    disk may take up to `4,000` microseconds (`4` milliseconds or `4/1000` of a second)—over
    `150` times slower.


    While `SSDs` are certainly faster than magnetic disks, the speed improvement is
    not proportionate for all workloads. In particular, it costs more—takes longer—to
    modify information in an `SSD` than to read from it.


    `SSDs` store bits of information in cells. A single-level cell (`SLC`) `SSD` contains
    one bit of information per cell, while a multi-level cell (`MLC`) `SSD` contains
    more than one bit— usually only two but sometimes three—in each cell. Cells are
    arranged in pages of about `4K` and pages are arranged in blocks that typically
    contain `256` pages.


    Read operations, and initial write operations, require only a single-page `IO`.
    However, changing the contents of a page requires an erase and overwrite of a
    complete block. Even the initial write can be significantly slower than a read,
    but the block erase operation is particularly slow—around two milliseconds. Figure
    [7-2](#A978-1-4842-1329-2_7_Chapter.html#Fig2) shows the approximate times for
    a page seek, page write, and block erase.


    ![A978-1-4842-1329-2_7_Fig2_HTML.jpg](A978-1-4842-1329-2_7_Fig2_HTML.jpg)


    Figure 7-2. Flash SSD performance characteristics


    Commercial `SSD` manufacturers go to great efforts to avoid the performance penalty
    of the erase operation and the reliability concerns raised by the “wear” that
    occurs on an `SSD` when a cell is modified. Sophisticated algorithms are used
    to ensure that erase operations are minimized and that writes are evenly distributed
    across the device. However, these algorithms create a write amplification effect
    in which each write operation is associated with multiple physical `IOs` on the
    `SSD` as data is moved and storage is reclaimed.


    Note


    Regardless of whatever sophisticated algorithms and optimizations that an `SSD`
    vendor might implement, the essential point remains: flash `SSD` is significantly
    slower when performing writes than when performing reads.'
