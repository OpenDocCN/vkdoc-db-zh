    ## Meanwhile, Back at Oracle HQ ...


    Oracle was, of course, the company that first commercialized relational database
    technology, and as such might be expected to have the most vested interest in
    maintaining the RDBMS status quo. To some extent this is true: Oracle continues
    to dominate the RDBMS market, and actively evangelizes SQL and the relational
    model.


    However, behind the scenes, Oracle has arguably come as close as any other vendor
    to pursuing the vision for the converged database of the future that I outlined
    earlier. In particular, Oracle has:


    *   Provided its own engineered system based on Hadoop: the Oracle Big Data Appliance.
    The Big Data appliance includes the Cloudera distribution of Hadoop (including
    Spark). It also incorporates significant innovations in performance by pushing
    predicate filtering down to data nodes, using technology originally created for
    the Oracle Exadata RDBMS appliance. Oracle also provides connectors that facilitate
    data movement between the Big Data appliance and Oracle RDBMS and Oracle Big Data
    SQL, which allows SQL from the Oracle RDBMS to target data held in the Oracle
    Big Data Appliance.

    *   Provided very strong support for JSON embedded in the RDBMS. JSON documents
    may be stored in LOB (see following section) or character columns, and may be
    retrieved using extensions to SQL. JSON in the database may also be accessed directly
    by a REST-based JSON query API Simple Oracle Document Access (SODA). This API
    strongly resembles the MongoDB query API.

    *   Offers Oracle REST Data Services (ORDS), which also provides a REST-based
    interface to data in relational tables. This provides a non-SQL based API for
    retrieving table data using embedded JSON query documents in REST calls that are
    similar to the JSON-based query language supported by SODA.

    *   Enhanced its graph compute engine. The new Oracle graph will allow graph analytics
    using OpenCypher (the graph language originated by Neo4j) to be performed on any
    data stored in the RDBMS or Big Data Appliance.

    *   Supports a shared-nothing sharded distributed database, which provides an
    alternative distributed database model that can support a more linearly scalable
    OLTP solution compared to the shared-disk RAC clustered database architecture.


    Let’s look at some of these offerings in more detail.


