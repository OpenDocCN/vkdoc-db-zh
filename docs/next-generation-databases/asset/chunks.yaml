- fmt: '## Summary


    In this chapter we’ve reviewed distributed database patterns for traditional relational
    databases and for several nonrelational systems. Relational database architecture
    was developed in an era of large, monolithic database servers, and most relational
    databases still run as a single instance. However, shared-nothing clustering is
    commonplace in massively parallel data warehouses, and Oracle has a commercially
    successful shared-disk clustered RDBMS.


    We looked in detail at three distributed nonrelational database systems. MongoDB
    uses a combination of sharding and replication to enable distributed processing.
    HBase leverages the distributed file system of the Hadoop Distributed File System
    together with a range-partitioning strategy to achieve a highly scalable solution.
    Cassandra uses the consistent hashing scheme pioneered in Amazon’s Dynamo system
    to create a symmetrical clustering solution in which no master servers are required.


    In a distributed database, multiple copies of data are typically maintained across
    the cluster. In the next chapter, we’ll see how these databases manage data consistency
    within such a distributed system.


    # 9. Consistency Models


    > For changes to be of any true value, they’ve got to be lasting and consistent.
    —Tony Robbins, motivational speaker Consistency is contrary to nature, contrary
    to life. The only completely consistent people are dead. —Aldous Huxley


    One of the biggest factors powering the nonrelational database revolution is a
    desire to escape the restrictions of strict ACID consistency. It’s widely believed
    that the new breed of nonrelational databases provide only weak or at best eventual
    consistency, and that the underlying consistency mechanisms are simplistic. This
    belief represents a fundamental misunderstanding of nonrelational database systems.
    Nonrelational systems offer a range of consistency guarantees, including strict
    consistency, albeit at the single-object level. And in fact, there are some complex
    architectures required to balance an acceptable degree of consistency when we
    lose the strict and predictable rules provided by the ACID transaction model.


    In the absence of the ACID transaction model, a variety of approaches to consistency
    have emerged: these include relatively familiar concepts such as eventual consistency
    and various tunable consistency models. Many nonrelational databases are, in fact,
    strictly consistent with respect to individual objects, even if they don’t support
    strict multi-object consistency. And although ACID transactions are absent, systems
    such as Cassandra support a simpler, lightweight transaction model.


    Consistency models have a huge effect on database concurrency—the ability for
    multiple users to access data simultaneously—and on availability. Understanding
    how a database system treats consistency is essential in order to determine whether
    that database can meet the needs of an application.


    ## Types of Consistency


    Ironically, there is significant variation in how the term “consistency” is used
    in the database community. Consistency might mean any of the following:


    *   Consistency with other users: If two users query the database at the same
    time, will they see the same data? Traditional relational systems would generally
    try to ensure that they do, while nonrelational databases often take a more relaxed
    stance.

    *   Consistency within a single session: Does the data maintain some logical consistency
    within the context of a single database session? For instance, if we modify a
    row and then read it again, do we see our own update?

    *   Consistency within a single request: Does an individual request return data
    that is internally coherent? For instance, when we read all the rows in a relational
    table, we are generally guaranteed to see the state of the table as it was at
    a moment in time. Modifications to the table that occurred after we began our
    query are not included.

    *   Consistency with reality: Does the data correspond with the reality that the
    database is trying to reflect? For example, it’s not enough for a banking transaction
    to simply be consistent at the end of the transaction; it also has to correctly
    represent the actual account balances. Consistency at the expense of accuracy
    is not usually acceptable.


    ### ACID and MVCC


    Relational databases responded to the requirements of consistency using two major
    architectural patterns: ACID transactions and multi-version concurrency control
    (MVCC).


    We’ve covered ACID transactions extensively already in this book. To recap, ACID
    transactions should be:


    *   Atomic: The transaction is indivisible—either all the statements in the transaction
    are applied to the database or none are applied.

    *   Consistent: The database remains in a consistent state before and after transaction
    execution.

    *   Isolated: While multiple transactions can be executed by one or more users
    simultaneously, one transaction should not see the effects of other in-progress
    transactions.

    *   Durable: Once a transaction is saved to the database (in SQL databases via
    the `COMMIT` command), its changes are expected to persist even if there is a
    failure of operating system or hardware.


    Note


    Even relational databases such as Oracle don’t implement the strict isolation
    between transactions that ACID demands by default. The overhead for completely
    isolating all transactions is usually too high.


    The easiest way to implement ACID consistency is with locks. Using lock-based
    consistency, if a session is reading an item, no other session can modify it,
    and if a session is modifying an item, no other session can read it. However lock-based
    consistency leads to unacceptably high contention and low concurrency.


    To provide ACID consistency without excessive locking, relational database systems
    almost universally adopted the multi–version concurrency control (MVCC) model.
    In this model, multiple copies of data are tagged with timestamps or change identifiers
    that allow the database to construct a snapshot of the database at a given point
    in time. In this way, MVCC provides for transaction isolation and consistency
    while maximizing concurrency.


    For example, in MVCC, if a database table is subjected to modifications between
    the time a session starts reading the table and the time the session finishes,
    the database will use previous versions of table data to ensure that the session
    sees a consistent version. MVCC also means that until a transaction commits, other
    sessions do not see the transaction’s modifications—other sessions look at older
    versions of the data. These older copies of the data are also used to roll back
    transactions that do not complete successfully.


    Figure [9-1](#A978-1-4842-1329-2_9_Chapter.html#Fig1) illustrates the MVCC model.
    A database session initiates a transaction at time t1 (1). At time t2, the session
    updates data in a database table (2); this results in a new version of that data
    being created (3). At about the same time, a second database session queries the
    database table, but because the transaction from the first session has not yet
    been committed, they see the previous version of the data (4). After the first
    session commits the transaction (5), the second database session will read from
    the modified version of the data (6).


    ![A978-1-4842-1329-2_9_Fig1_HTML.jpg](A978-1-4842-1329-2_9_Fig1_HTML.jpg)


    Figure 9-1.


    Multi-version concurrency control (MVCC)


    The big advantage of MVCC is a reduction in lock overhead. In the example shown
    in Figure [9-1](#A978-1-4842-1329-2_9_Chapter.html#Fig1), without MVCC the update
    would have created a blocking lock that would have prevented the second session
    from reading the data until the transaction was completed.'
