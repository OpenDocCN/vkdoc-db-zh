- fmt: '## Conclusion


    It’s definitely premature to predict the end of magnetic disks in database systems:
    magnetic disks still offer the best economics for storage of massive amounts of
    “cold” or “warm” data, and in the age of Big Data the economics of storage still
    matter. However, `solid state disk` provides better economics for datasets where
    the speed of retrieval is more important than the cost of long-term storage. And
    all significant database systems are adapting to the unique physical characteristics
    of `SSD`. Some databases are being built from the ground up to exploit `SSD` processing
    characteristics.


    As memory reduces in price, and the amount of memory that can be housed in a single
    database server increases, `in-memory architectures` grow ever more attractive
    for databases of smaller size or where latency or transaction processing speed
    are more important than economics of mass storage. When a database cannot fit
    into the memory of a single server, a `distributed in-memory system` may offer
    a compelling high-performance solution.


    We’ve seen how `in-memory database` designs have arisen in each category of database
    system: relational, key-value, and Big Data. There are also an increasing number
    of hybrid designs such as Oracle’s, which attempt to merge the processing benefits
    of an `in-memory` approach with the storage economics that are still only provided
    by traditional disk devices.


    ## Note


    The End of an Architectural Era (It’s Time for a Complete Rewrite), `http://nms.csail.mit.edu/∼stavros/pubs/hstore.pdf`


    # Part II

    The Gory Details


    # 8. Distributed Database Patterns


    > The manager is to be blamed who distributes parts to his players which they
    are unable to act. —Franz Schubert The speed of communications is wondrous to
    behold. It is also true that speed can multiply the distribution of information
    that we know to be untrue. —Edward R. Murrow


    Administrators of web applications have traditionally had two choices when the
    application demand exceeds database capacity: scaling up by increasing the power
    of individual servers, or scaling out by adding more servers. For most of the
    relational database era, scaling up was the more practical option. Early relational
    databases did not provide a clustering option, whereas the CPU and memory supplied
    by a single server was constantly and exponentially increasing in line with Moore’s
    law. Consequently, scaling out was neither practical nor necessary.


    However, as database workloads shifted from client-server applications running
    behind the firewall to web applications with potentially global scope, it became
    increasingly difficult to support workload and availability requirements on a
    single server. Furthermore, Internet applications were often subject to unpredictable
    and massive growth in workload: it became possible for an application to “go viral”
    and to suddenly experience exponential growth in demand. The economic sweet spot
    for computer hardware and the imperatives of growth increasingly encouraged clusters
    of servers rather than single, monolithic proprietary servers. A scale-out solution
    for databases became imperative.


    To address the demands of web-scale applications, a new generation of distributed
    nonrelational databases emerged. In this chapter, we’ll dive deep into the architectures
    of these distributed database systems.


    ## Distributed Relational Databases


    The first database systems were designed to run on a single computer. Indeed,
    prior to the client-server revolution, all components of early database applications—including
    all the application code—would reside on a single system: the mainframe.


    In this centralized model, all program code runs on the server, and users communicate
    with the application code through dumb terminals (the terminals are “dumb” because
    they contain no application code). In the client-server model, presentation and
    business logic were implemented on workstations—usually Windows PCs—that communicated
    with a single back-end database server. In early Internet applications, business
    logic was implemented on one or more web application servers, while presentation
    logic was shared between the web browser and the application server, which still
    almost always communicated with a single database server.


    Figure 8-1 illustrates the three architectures, showing how each pattern continued
    to rely on a single, monolithic database server.


    ![A978-1-4842-1329-2_8_Fig1_HTML.jpg](A978-1-4842-1329-2_8_Fig1_HTML.jpg)


    Figure 8-1. Mainframe, client-server, and early web architectures relied on single,
    monolithic database servers


    ### Replication


    Database replication was initially adopted as a means of achieving high availability.
    Using replication, database administrators could configure a standby database
    that could take over for the primary database in the event of failure.


    Database replication often took advantage of the `transaction log` that most relational
    databases used to support `ACID` transactions. We introduced the `transaction
    log` pattern in the context of `in-memory databases` in Chapter 7. When a transaction
    commits in an `ACID`-compliant database, the transaction record is immediately
    written to the `transaction log` so that it is preserved in the event of failure.
    A replication process monitoring the `transaction log` can apply changes to a
    backup database, thereby creating a replica.


    Figure 8-2 illustrates the log-based replication approach. Database transactions
    are written in an asynchronous “lazy” manner to the database files (1), but a
    database transaction immediately writes to the `transaction log` upon commit (2).
    The replication process monitors the `transaction log` and applies transactions
    as they are written to the read-only slave database (3). Replication is usually
    asynchronous, but in some databases the commit can be deferred until the transaction
    has been replicated to the slave.


    ![A978-1-4842-1329-2_8_Fig2_HTML.jpg](A978-1-4842-1329-2_8_Fig2_HTML.jpg)


    Figure 8-2. Log-based replication


    As we saw in Chapter 3, replication is typically a first step toward distributing
    the database load across multiple servers. Using replication, the read workload
    can be distributed in a scale-out fashion, although database transactions must
    still be applied to the master copy.'
