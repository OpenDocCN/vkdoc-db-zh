    access paths dominate. However, modern applications have increasingly generated
    data models that not only exceed the sophistication of document oriented key-value
    stores but also exceed the comfortable modeling capability of even the relational
    models. We’ll consider these graph databases in the next chapter.'
  trans: '# MongoDB


    2007 年，刚刚被`Google`收购的在线广告投放公司`Double Click`的创始人和资深工程师们，成立了一家名为`10gen`的新创公司。该公司的目标是创建一个类似于`Google
    App Engine`的`PaaS`（平台即服务）产品。这个平台需要一个可扩展且弹性十足的数据存储引擎；由于没有合适的现成候选方案，团队便自己创建了一个数据库，并将其命名为`MongoDB`。2008
    年，`10gen`转型，专注于`MongoDB`，并于 2009 年以开源许可证发布了该产品，同时提供商业企业版分发。


    `MongoDB`是一个面向`JSON`的文档数据库，尽管其内部使用了一种称为`BSON`的二进制编码变体。`BSON`格式相比`JSON`具有更低的解析开销，并且对日期和二进制数据等数据类型提供更丰富的支持。


    `MongoDB`提供了一个基于`JavaScript`的查询能力，相对容易学习——至少与最初在`CouchDB`中必需的`MapReduce`方法相比是如此。图
    4-8 比较了使用`MongoDB`的`JavaScript`查询来检索由特定演员出演的电影，以及在`MySQL`中等效的`SQL`语句。我们将在第 11
    章详细探讨`MongoDB`查询语言。


    ![A978-1-4842-1329-2_4_Fig8_HTML.jpg](img/A978-1-4842-1329-2_4_Fig8_HTML.jpg)


    图 4-8. `MongoDB`的`JavaScript`查询及其`SQL`等效语句


    通过提供开发者友好的生态系统和架构，`MongoDB`在`NoSQL`数据库领域确立了强大的领先地位。寻求非关系型替代方案——通常替代`MySQL`或`Oracle`——的开发者发现，`MongoDB`相对容易上手。由开发者主导的`MongoDB`采用度很高，如今`MongoDB`可以称得上是使用最广泛的非关系型数据库。


    在许多方面，如今`MongoDB`的崛起类似于上个世纪`MySQL`的盛行。在这两种情况下，这些数据库进入组织并非源于某种战略技术计划，而是由于它们在开发者中的流行。正如`MySQL`在
    21 世纪初成为`LAMP`（Linux-Apache-`MySQL`-PHP）技术栈应用的默认数据库一样，`MongoDB`似乎也在现代 Web 开发社区中取得了类似的地位。


    `MongoDB`可能缺乏其他`NoSQL`产品（如`Cassandra`或`HBase`）的某些可扩展性和吞吐量能力，尽管 3.0 版本中`WiredTiger`存储引擎的实现为基础引擎带来了显著的能力提升。尽管如此，它已为许多高端、大规模的网站提供支持，并且看起来在不久的将来将成为领先的`NoSQL`数据库。


    ## JSON, JSON, 无处不在


    `JSON`在现代文档数据库中的核心作用并不妨碍其在其他系统中的使用。


    正如关系型世界接纳了`XML`并将`XML`特性引入`SQL`标准一样，许多`RDBMS`供应商也提供了对`JSON`的原生支持。例如，`Oracle`和其他关系型供应商已经在`SQL`语言中引入了特性，允许在`SQL`语句中操作存储在数据库表中的`JSON`文档。实际上，正如我们将在第
    12 章看到的，`Oracle`现在为`JSON`提供了完全非`SQL`的访问路径。


    当然，将`JSON`文档存储在键值存储对象中一直是可能的，而且并不少见。然而，像`Riak`这样的纯键值数据库也引入了支持`JSON`的索引方案。此外，最新版本的`Cassandra`数据库允许将`JSON`结构直接映射到`Cassandra`表列。


    `MarkLogic`——本章前面提到的成功的商业`XML`数据库供应商——在 2014 年增加了对原生`JSON`存储的支持。基于其作为`XML`数据库的广泛渗透，`MarkLogic`现在可以声称自己是现代文档数据库市场的领先竞争者，尽管`MarkLogic`能否突破其`XML`内容管理的利基市场，直接与`MongoDB`和`CouchBase`等数据库竞争，赢得
    Web 应用程序开发者的青睐，还有待观察。


    无论如何，我们可以预期在几乎所有数据库系统中都会看到一定程度的`JSON`支持。


    ## 结论


    文档数据库通过采用文档格式——`XML`或`JSON`——作为数据模型，区别于其他关系型和非关系型系统。支持`XML`文档格式的文档数据库主要作为内容管理系统非常重要，为基于`XML`的文本文件提供管理仓库。另一方面，`JSON`文档数据库使用`JSON`文档作为基于
    Web 的应用程序的数据层——这是以前`MySQL`所承担的任务。在某种程度上，基于`XML`的文档数据库代表了上一代数据库系统，而`JSON`数据库则可以说是下一代。


    `JSON`的流行以及关系型数据库和键值存储中对`JSON`日益增长的支持，模糊了最初存在于像`MongoDB`这样的数据库与受`Dynamo`启发的数据库（如`Riak`）之间的界限。在不久的将来，对`JSON`的支持可能成为所有数据库的共同特性，而不是区分特定数据库技术细分市场的特性。


    然而，如今`JSON`文档数据库在下一代数据库系统中代表了一个独特且重要的细分领域。它们提供了超越纯键值存储的有用功能，特别是在程序员生产力和数据可访问性方面。


    `JSON`的简单自描述模型和简单的键值访问路径对于以简单`CRUD`（创建、读取、更新、删除）访问路径为主导的 Web 应用程序非常有效。然而，现代应用程序生成的数据模型不仅日益超越面向文档的键值存储的复杂度，甚至也超出了关系模型舒适的建模能力。我们将在下一章探讨这些图数据库。'
- fmt: '# 5. Tables are Not Your Friends: Graph Databases


    > Google sought to gauge what people were thinking, and became what people were
    thinking. Facebook sought to map the social graph, and became the social graph
    —George Dyson, Turing’s Cathedral Whenever someone gives you a problem, think
    graphs. —Steve Yegge, Get That Job at Google (blog post)


    Proponents of key-value stores, document databases, and relational systems disagree
    about practically every aspect of database design, but they do agree in one respect:
    databases are about storing information about “things,” be those things represented
    by `JSON`, `tables`, or `binary values`. But sometimes it’s the relationship between
    things, rather than the things themselves, that are of primary interest. This
    is where graph database systems shine.


    Graph structures are most familiar to us from social networks such as Facebook.
    In Facebook, the information about individuals is important, but it’s the network
    between people—the social graph—that provides the unique power of the platform.
    Similar graph-oriented datasets occur within network topologies, access-control
    systems, medical models, and elsewhere.


    The relational database is completely capable of modeling such networks through
    the use of `foreign keys` and `self-joins`. Unfortunately, the `RDBMS` generally
    hits performance issues when working with very large graphs, and `SQL` lacks an
    expressive syntax to work with graph data.


    The NoSQL solutions described so far do even a worse job with graph models than
    the relational database. In a key-value store or document database, a graph structure
    can be stored in a single document or object, but relationships between objects
    are not inherently supported (because there are no joins).


    To efficiently process a data model in which complex networks of relationships
    between objects or entities are a primary focus, a different type of database
    is called for: the graph database.


    ## What is a Graph?


    Like the relational database, but unlike many nonrelational systems, graph databases
    are based on a strong theoretical foundation. Graph theory is a long-established
    branch of mathematics, with many practical applications in medicine, physics,
    and sociology, as well as in computer science.


    Graph theory defines these major components of a graph:


    *   Vertices, or “nodes,” represent distinct objects.

    *   Edges, or “relationships” or “arcs,” connect these objects.

    *   Both vertices and edges can have properties.


    While vertices and edges are the terms used most frequently in mathematical theory,
    we’ll use “nodes” and “relationships” more often in this chapter because those
    terms lead to less convoluted and murky language.


    Both nodes and relationships can have properties. The properties of nodes are
    not dissimilar to those you might find associated with a relational table or in
    a `JSON` document. Properties of relationships might include the type, strength,
    or history of the relationship.


    Figure [5-1](#A978-1-4842-1329-2_5_Chapter.html#Fig1) illustrates a simple graph
    with four nodes (vertices) and three relationships (edges).


    ![A978-1-4842-1329-2_5_Fig1_HTML.jpg](A978-1-4842-1329-2_5_Fig1_HTML.jpg)


    Figure 5-1. Simple graph with four vertices (nodes) and three edges (relationships)


    Graph theory provides mathematical notation for defining or removing nodes or
    relationships from the graph, and for performing operations to find adjacent nodes.
    These primitive operations can be used to perform a graph traversal—walking through
    the graph to explore the network. To use a familiar example, Facebook sometimes
    performs a graph traversal to find the friends of your friends. In the example
    shown in Figure [5-1](#A978-1-4842-1329-2_5_Chapter.html#Fig1), we might perform
    a graph traversal to find all the actors that have ever appeared as a co-star
    in a movie starring Keanu Reeves.


    ## RDBMS Patterns for Graphs


    It’s relatively easy to represent graph structures in the relational model. For
    instance, we might create the relational structure shown in Figure [5-2](#A978-1-4842-1329-2_5_Chapter.html#Fig2)
    to represent the graph shown in Figure [5-1](#A978-1-4842-1329-2_5_Chapter.html#Fig1).


    ![A978-1-4842-1329-2_5_Fig2_HTML.jpg](A978-1-4842-1329-2_5_Fig2_HTML.jpg)


    Figure 5-2. Relational schema to represent our sample graph data


    While the relational model can easily represent the data that is contained in
    a graph model, we face two significant problems in practice:


    `SQL` lacks the syntax to easily perform graph traversal, especially traversals
    where the depth is unknown or unbounded. For instance, using `SQL` to determine
    friends of your friends is easy enough, but it is hard to solve the “degrees of
    separation” problem (often illustrated using the example of the number of connections
    that separate you from Kevin Bacon).

    Performance degrades quickly as we traverse the graph. Each level of traversal
    adds significantly to query response time.


    For instance, consider the `SQL` needed to find all actors who have ever worked
    with Keanu Reeves. It might look something like that shown in Figure [5-3](#A978-1-4842-1329-2_5_Chapter.html#Fig3).


    ![A978-1-4842-1329-2_5_Fig3_HTML.jpg](A978-1-4842-1329-2_5_Fig3_HTML.jpg)


    Figure 5-3. SQL to perform first-level graph traversal


    This `SQL` queries `PEOPLE` to find Keanu, then `ACTORS` and `MOVIES` to find
    the movies he has starred in, then `ACTORS` and `PEOPLE` again to find other actors
    who have been in those movies. A five-way join such as this is manageable, but
    as we traverse more we have to add another three joins each time we increase the
    search depth. Furthermore, there is no syntax that allows us to search to an arbitrary
    depth. So for instance, if we want to expand the whole graph, we can’t because
    there is no way to know in advance how many levels we need to examine.


    Performance in an `RDBMS` is also a potential issue. Providing that appropriate
    indexes are created, our sample query above will execute with acceptable overhead.
    But each join requires an index lookup for each actor and movie. Each index lookup
    adds overhead and performance that for deep graph traversals are often unacceptable.
    Sometimes the best solution is to load the tables in their entirety into map structures
    within application code and traverse the graph in memory. However, this assumes
    that there is enough memory in application code to cache all the data, which is
    not always the case.


    Because key-value stores do not support joins, they offer even less graph traversal
    capability than the relational database. In a pure key-value store or document
    database, graph traversal logic must be implemented entirely in application code.'
