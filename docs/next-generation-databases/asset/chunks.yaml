    ## 致谢


    我要感谢 Apress 所有为本书出版提供帮助的人，特别是主编 Jonathan Gennick、协调编辑 Jill Balzano 和开发编辑 Douglas
    Pundick。我尤其要感谢 Stéphane Faroult，他提供了出色的技术审校反馈。我很少能与 Stéphane 这样高水平的审校者合作，他的评论非常宝贵。


    一如既往，感谢我的家人——Jenni, Chris, Kate, Mike 和 Willie——他们提供了承担这个项目所需的情感支持与理解。


    本书谨以此纪念我们挚爱的侄女凯瑟琳·玛蕾·阿诺德，她于 2010 年去世。我遇见凯瑟琳时她五岁；第一次见到她时，她向我展示了罗尔德·达尔《蠢特夫妇》的魔力。我最后一次见到她时，她向我解释了现代
    DNA 测序技术，并告诉我她拯救物种免于灭绝的抱负。她是那种你能期望遇到的最聪明、最有趣、最善良的人之一。1987 年我的第一本书出版时，她开玩笑地坚持要求我将书献给她，因此，将此书献给她的记忆是再合适不过的了。


    盖伊·哈里森

    澳大利亚墨尔本

