    ## Acknowledgments


    I’d like to thank everyone at Apress who helped in the production of this book,
    in particular lead editor Jonathan Gennick, coordinating editor Jill Balzano,
    and development editor Douglas Pundick. I’d like to especially thank Stéphane
    Faroult, who provided outstanding technical review feedback. Rarely have I worked
    with a reviewer of the caliber of Stéphane, and his comments were invaluable.


    As always, thanks to my family—Jenni, Chris, Kate, Mike, and Willie—for providing
    the emotional support and understanding necessary to take on this project.


    This book is dedicated to the memory of Catherine Maree Arnold, our beloved niece
    who passed away in 2010. I met Catherine when she was five years old; the first
    time I met her, she introduced me to the magic of Roald Dahl’s The Twits. The
    last time I saw her, she explained modern DNA sequencing techniques and told me
    about her ambition to save species from extinction. She was one of the smartest,
    funniest, and kindest human beings you could hope to meet. When my first book
    was published in 1987, she jokingly insisted that I should dedicate it to her,
    so it’s fitting that I dedicate this book to her memory.


    Guy Harrison

    Melbourne, Australia

    December 2015'
