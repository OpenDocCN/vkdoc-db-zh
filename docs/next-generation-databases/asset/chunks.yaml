    # 第一部分 新一代数据库


    ## 1. 三次数据库革命


    电子补充材料 本章的在线版本（doi：[10.1007/978-1-4842-1329-2_1](http://dx.doi.org/10.1007/978-1-4842-1329-2_1)）包含补充材料，可供授权用户使用。


    > 幻想。疯狂。所有的革命都是如此，直到它们发生，之后便成为历史的必然。——[大卫·米切尔](http://www.goodreads.com/author/show/6538289.David_Mitchell)，[《云图》](http://www.goodreads.com/work/quotes/1871423)
    我们仍处于互联网革命最初几分钟的开端。——斯科特·库克


    本书讲述的是数据库技术的第三次革命。第一次革命由`电子计算机`的出现驱动，第二次革命由`关系数据库`的出现驱动。而第三次革命，则是由需要全球范围和持续可用性的现代应用需求所驱动，导致了非关系型数据库替代方案的激增。在本章中，我们将概述这三波数据库技术浪潮，并讨论导致当今新一代数据库的市场和技术力量。


    图 1-1 展示了一个主要数据库版本发布时间的简单时间线。


    ![A978-1-4842-1329-2_1_Fig1_HTML.jpg](img/A978-1-4842-1329-2_1_Fig1_HTML.jpg)


    图 1-1. 主要数据库版本与创新的时间线


    图 1-1 阐明了数据库技术的三个主要时代。在`电子计算机`被广泛采用后的 20 年里，一系列日益复杂的数据库系统涌现出来。1970 年`关系模型`被定义后不久，几乎所有重要的数据库系统都共享了一个通用架构。这个架构的三大支柱是`关系模型`、`ACID`事务和`SQL`语言。


    然而，大约从 2008 年开始，新的数据库系统出现了爆炸式增长，而这些系统无一遵循传统的关系型实现方式。这些新的数据库系统是本书的主题，本章将展示先前几波数据库技术是如何引领至这新一代数据库系统的。


    ### 早期数据库系统


    维基百科将数据库定义为“有组织的数据集合”。尽管“数据库”一词直到 20 世纪 60 年代后期才进入我们的词汇表，但收集和组织数据一直是人类文明和技术发展中不可或缺的因素。书籍——尤其是那些具有严格结构的书籍，如字典和百科全书——代表了物理形式的数据集。图书馆和其他有索引的信息档案库代表了现代数据库系统在工业时代之前的等价物。


    我们也能从打孔卡和其他能够以可机械处理的形式存储信息的物理介质的采用中，看到数字数据库的起源。在 19 世纪，织机卡片被用来“编程”织布机以生成复杂的织物图案，而制表机使用打孔卡来生成人口普查统计数据，自动演奏钢琴则使用代表旋律的穿孔纸带。图
    1-2 展示了一台`霍列瑞斯`制表机在 1890 年被用于处理美国人口普查。


    ![A978-1-4842-1329-2_1_Fig2_HTML.jpg](img/A978-1-4842-1329-2_1_Fig2_HTML.jpg)


    图 1-2. 用于处理 1890 年美国人口普查的制表机和打孔卡


    第二次世界大战后`电子计算机`的出现代表了数据库领域的第一次革命。一些早期的数字计算机是为了执行纯粹的数学功能而创建的——例如计算弹道表。但同样常见的是，它们被设计用来操作和处理数据，例如处理轴心国加密的军事通讯。


    早期的“数据库”最初使用纸带，最终使用磁带顺序存储数据。虽然可以在这些数据集上“快进”和“倒带”，但直到 20 世纪 50 年代中期旋转磁盘的出现，直接高速访问单个记录才成为可能。直接访问允许快速访问任意大小文件中的任何条目。`ISAM`（`索引顺序访问方法`）等索引方法的发展使得快速的面向记录的访问变得可行，从而促成了第一个`OLTP`（`联机事务处理`）计算机系统的诞生。


    `ISAM`及类似的索引结构驱动了第一批电子数据库。然而，这些完全受应用程序控制——当时有数据库，但没有`数据库管理系统`（`DBMS`）。

    '
- fmt: '## The First Database Revolution


    Requiring every application to write its own data handling code was clearly a
    productivity issue: every application had to reinvent the database wheel. Furthermore,
    errors in application data handling code led inevitably to corrupted data. Allowing
    multiple users to concurrently access or change data without logically or physically
    corrupting the data requires sophisticated coding. Finally, optimization of data
    access through caching, pre-fetch, and other techniques required complicated and
    specialized algorithms that could not easily be duplicated in each application.


    Therefore, it became desirable to externalize database handling logic from the
    application in a separate code base. This layer—the Database Management System,
    or `DBMS`—would minimize programmer overhead and ensure the performance and integrity
    of data access routines.


    Early database systems enforced both a schema (a definition of the structure of
    the data within the database) and an access path (a fixed means of navigating
    from one record to another). For instance, the `DBMS` might have a definition
    of a `CUSTOMER` and an `ORDER` together with a defined access path that allowed
    you to retrieve the orders associated with a particular customer or the customer
    associated with a specific order.


    These first-generation databases ran exclusively on the mainframe computer systems
    of the day —largely `IBM` mainframes. By the early 1970s, two major models of
    `DBMS` were competing for dominance. The network model was formalized by the `CODASYL`
    standard and implemented in databases such as `IDMS`, while the hierarchical model
    provided a somewhat simpler approach as was most notably found in `IBM`’s `IMS`
    (Information Management System). Figure [1-3](#A978-1-4842-1329-2_1_Chapter.html#Fig3)
    provides a comparison of these databases’ structural representation of data.


    Note


    These early systems are often described as “navigational” in nature because you
    must navigate from one object to another using pointers or links. For instance,
    to find an order in a hierarchical database, it may be necessary to first locate
    the customer, then follow the link to the customer’s orders.


    ![A978-1-4842-1329-2_1_Fig3_HTML.jpg](A978-1-4842-1329-2_1_Fig3_HTML.jpg)


    Figure 1-3.


    Hierarchical and network database models


    Hierarchical and network database systems dominated during the era of mainframe
    computing and powered the vast majority of computer applications up until the
    late 1970s. However, these systems had several notable drawbacks.


    First, the navigational databases were extremely inflexible in terms of data structure
    and query capabilities. Generally only queries that could be anticipated during
    the initial design phase were possible, and it was extremely difficult to add
    new data elements to an existing system.


    Second, the database systems were centered on record at a time transaction processing—what
    we today refer to as `CRUD` (Create, Read, Update, Delete). Query operations,
    especially the sort of complex analytic queries that we today associate with business
    intelligence, required complex coding. The business demands for analytic-style
    reports grew rapidly as computer systems became increasingly integrated with business
    processes. As a result, most IT departments found themselves with huge backlogs
    of report requests and a whole generation of computer programmers writing repetitive
    `COBOL` report code.


    ## The Second Database Revolution


    Arguably, no single person has had more influence over database technology than
    Edgar Codd. Codd received a mathematics degree from Oxford shortly after the Second
    World War and subsequently immigrated to the United States, where he worked for
    `IBM` on and off from 1949 onwards. Codd worked as a “programming mathematician”
    (ah, those were the days) and worked on some of `IBM`’s very first commercial
    electronic computers.


    In the late 1960s, Codd was working at an `IBM` laboratory in San Jose, California.
    Codd was very familiar with the databases of the day, and he harbored significant
    reservations about their design. In particular, he felt that:


    *   Existing databases were too hard to use. Databases of the day could only be
    accessed by people with specialized programming skills.

    *   Existing databases lacked a theoretical foundation. Codd’s mathematical background
    encouraged him to think about data in terms of formal structures and logical operations;
    he regarded existing databases as using arbitrary representations that did not
    ensure logical consistency or provide the ability to deal with missing information.

    *   Existing databases mixed logical and physical implementations. The representation
    of data in existing databases matched the format of the physical storage in the
    database, rather than a logical representation of the data that could be comprehended
    by a nontechnical user.


    Codd published an internal `IBM` paper outlining his ideas for a more formalized
    model for database systems, which then led to his 1970 paper “`A Relational Model
    of Data for Large Shared Data Banks`.” [¹](#A978-1-4842-1329-2_1_Chapter.html#Sec19)
    This classic paper contained the core ideas that defined the relational database
    model that became the most significant—almost universal—model for database systems
    for a generation.


    ### Relational theory


    The intricacies of relational database theory can be complex and are beyond the
    scope of this introduction. However, at its essence, the relational model describes
    how a given set of data should be presented to the user, rather than how it should
    be stored on disk or in memory. Key concepts of the relational model include:


    *   Tuples, an unordered set of attribute values. In an actual database system,
    a tuple corresponds to a row, and an attribute to a column value.

    *   A relation, which is a collection of distinct tuples and corresponds to a
    table in relational database implementations.

    *   Constraints, which enforce consistency of the database. Key constraints are
    used to identify tuples and relationships between tuples.

    *   Operations on relations such as joins, projections, unions, and so on. These
    operations always return relations. In practice, this means that a query on a
    table returns data in a tabular format.


    A row in a table should be identifiable and efficiently accessed by a unique key
    value, and every column in that row must be dependent on that key value and no
    other identifier. Arrays and other structures that contain nested information
    are, therefore, not directly supported.


    Levels of conformance to the relational model are described in the various “normal
    forms.” Third normal form is the most common level. Database practitioners typically
    remember the definition of third normal form by remembering that all non-key attributes
    must be dependent on “the key, the whole key, and nothing but the key—So Help
    Me Codd”! [²](#A978-1-4842-1329-2_1_Chapter.html#Sec19)


    Figure [1-4](#A978-1-4842-1329-2_1_Chapter.html#Fig4) provides an example of normalization:
    the data on the left represents a fairly simple collection of data. However, it
    contains redundancy in student and test names, and the use of a repeating set
    of attributes for the test answers is dubious (while possibly within relational
    form, it implies that each test has the same number of questions and makes certain
    operations difficult). The five tables on the right represent a normalized representation
    of this data.


    ![A978-1-4842-1329-2_1_Fig4_HTML.jpg](A978-1-4842-1329-2_1_Fig4_HTML.jpg)


    Figure 1-4.


    Normalized and un-normalized data'
