  trans: '

    ### Apache Drill


    到目前为止，我们所了解的 SQL 变体都与其底层技术紧密耦合。诚然，像 Hive 这样的技术能够访问 HBase、Spark 以及 HDFS 中的数据，但这更多地体现了
    HDFS、HBase 和 Spark 的集成性，而非 Hive 系统本身固有的异构性。


    Apache Drill 框架旨在提供一个 SQL 引擎，它能够跨多个分布式数据存储（如 HDFS 或 Amazon S3）以及 NoSQL 系统（如 MongoDB
    和 HBase）进行操作。Drill 的架构基于 Google 的 Dremel 系统，后者是 Google BigQuery 产品的基础。


    Drill 集成了一个分布式的、异构的、基于成本的优化器，能够智能地将数据访问算法分配到多个不同的系统中。这使得一个 SQL 查询可以跨越 Hadoop、MongoDB、Oracle
    或其他数据库，并且——至少在理论上——能够以高效且最优的方式执行。


    目前，Drill 可以查询来自具有 JDBC 或 ODBC 连接器的关系型系统、由 Hive 支持的系统、各种基于云的分布式文件系统（如 Amazon S3、Google
    Cloud Drive）以及 MongoDB 的数据。


    让我们看看对 MongoDB 的支持，因为它能让我们了解 Drill 如何处理非表数据。这里，我们使用 Drill 来查询我们的示例 MongoDB 集合。


    简单的查询当然很简单：

    ```

    0: jdbc:drill:zk=local> SELECT Title FROM films WHERE Rating=''G'' LIMIT 5;

    +--------------------+

    |       Title        |

    +--------------------+

    | ACE GOLDFINGER     |

    | AFFAIR PREJUDICE   |

    | AFRICAN EGG        |

    | ALAMO VIDEOTAPE    |

    | AMISTAD MIDSUMMER  |

    +--------------------+

    5 rows selected (1.365 seconds)

    ```


    我们可以使用类似于 N1QL 数组表示法的点号表示法来深入查询子文档。因此，这里我们使用数组表示法 `Actors[2]:` 从电影《西部雄狮》的嵌入式 actors
    数组中的第二个文档检索数据。

    ```

    0: jdbc:drill:zk=local> SELECT

    . . . . . . . . . . . >   `Actors[2].First name`, `Actors[2].Last name`

    . . . . . . . . . . . >   FROM films WHERE Title=''WEST LION'';

    +---------+-----------+

    | EXPR$0  |  EXPR$1   |

    +---------+-----------+

    | SEAN    | WILLIAMS  |

    +---------+-----------+

    ```


    `FLATTEN` 函数为嵌入式数组中的每个文档返回一行。它与 Hive 的 `EXPLODE` 函数或 N1QL 的 `UNNEST` 子句有些类似。请注意，每个文档都以
    JSON 格式返回；目前似乎没有办法对这些结果进行模式化处理：

    ```

    0: jdbc:drill:zk=local> SELECT Title, FLATTEN(Actors)

    . . . . . . . . . . . >   FROM films WHERE Rating=''G'' LIMIT 5;

    +-----------------+---------------------------------------------------------

    |       Title     |                            EXPR$1

    +-----------------+---------------------------------------------------------

    | ACE GOLDFINGER  | {"First name":"BOB","Last name":"FAWCETT","actorId":19}

    | ACE GOLDFINGER  | {"First name":"MINNIE","Last name":"ZELLWEGER",

    | ACE GOLDFINGER  | {"First name":"SEAN","Last name":"GUINESS", "actorId":9

    | ACE GOLDFINGER  | {"First name":"CHRIS","Last name":"DEPP","actorId":160}

    | AFFAIR PREJUDICE| {"First name":"JODIE","Last name":"DEGENERES",

    +-----------------+---------------------------------------------------------

    5 rows selected (0.589 seconds)

    ```


    我们可以看到，Drill 具备基本的复杂 JSON 文档导航能力，我们可以期待这一能力会随着时间推移而改进。


    Drill 也能导航 HBase 中的宽列存储结构。让我们看看本章前面插入到 HBase 中的数据，这次使用 Drill：

    ```

    0: jdbc:drill:zk=local>  SELECT * FROM friends;

    +---------+---------+------+

    | row_key | friends | info |

    +---------+---------+------+

    | [B@6fe2da0c | {"Jo":"am9AZ21haWwuY29t","John":"am9obkBnbWFpbC5jb20="} | {"email":"Z3V5QGdtYWlsLmNvbQ==","userid":"OTk5MA=="}
    |

    | [B@43be5d62 | {"John":"am9obkBnbWFpbC5jb20=","Guy":"Z3V5QGdtYWlsLmNvbQ==","Paul":"cGF1bEBnbWFpbC5jb20=","Ringo":"cmluZ29AZ21haWwuY29t"}
    | {"email":"am9AZ21haWwuY29t","userid":"OTk5MQ=="} |

    +---------+---------+------+

    2 rows selected (1.532 seconds)

    ```

    输出不太友好！最初，Drill 在返回 HBase 数据时，没有解码内部的字节数组结构，也没有展平定义我们宽列族的任何映射。


    然而，我们可以使用 `FLATTEN` 函数从我们的宽列族“friends”中的每一列提取一行，使用 `KVGEN` 函数将映射转换为列，并使用 `CONVERT
    FROM` 函数将字节数组转换为 Unicode 字符：

    ```

    0: jdbc:drill:zk=local>

    WITH friend_details AS

    ( SELECT info, FLATTEN( KVGEN(friends)) AS friend_info FROM friends)

    SELECT CONVERT_FROM(friend_details.info.email,''UTF8'') AS email,

    CONVERT_FROM(friend_details.friend_info.`value`,''UTF8'')

    AS friend_email

    FROM friend_details;

    +----------------+------------------+

    |      email     |   friend_email   |

    +----------------+------------------+

    | guy@gmail.com  | jo@gmail.com     |

    | guy@gmail.com  | john@gmail.com   |

    | jo@gmail.com   | john@gmail.com   |

    | jo@gmail.com   | guy@gmail.com    |

    | jo@gmail.com   | paul@gmail.com   |

    | jo@gmail.com   | ringo@gmail.com  |

    +----------------+------------------+

    ```

    Drill 展现出巨大的潜力。一个能够导航关系和非关系系统所呈现的各种数据结构的统一 SQL 框架，正是我们解决由当今和未来新一代数据库所特有的海量语言和接口所构成的巴别塔问题所需要的。


    ### 其他用于 NoSQL 的 SQL 方案


    还有其他一些值得注意的 SQL-on-NoSQL 系统：

    * Presto 是一个开源的 SQL 引擎，在许多方面与 Drill 类似，可以查询 JDBC、Cassandra、Hive、Kafka 等系统中的数据。

    * 许多关系型数据库供应商提供连接器，允许其 SQL 语言从 Hadoop 或其他系统中检索数据。例如 Oracle Big Data SQL、IBM BigSQL
    和 Terradata QueryGrid。

    * Apache Phoenix 为 HBase 提供了一个 SQL 层。

    * Dell Toad Data Point 为各种非关系系统提供 SQL 访问，包括 MongoDB、Cassandra、HBase 和 DynamoDB。（免责声明：我在
    Dell 领导开发 Toad 的团队。）


    ## 结论


    本章试图让你感受新一代数据库系统提供的语言和 API。在许多情况下，提供的只是底层的编程 API。然而，未来的趋势似乎很明确：SQL 正在重新确立其作为数据库世界通用语言的地位。几乎所有新的数据库都变得可以通过
    SQL 访问，并且许多系统甚至对于底层编程也正在采用类似 SQL 的接口。


    SQL 不太可能再次成为未来数据库的唯一接口：宽列系统和文档数据库的独特需求表明，非 SQL 的惯用法将是必需的，尽管 Cassandra 的 CQL 和
    CouchBase 的 N1QL 确实展示了类 SQL 语言如何仍然是一个处理非关系格式数据的有用抽象。尽管如此，似乎越来越可能的是，大多数下一代数据库最终将支持某种形式的
    SQL 访问，即使只是通过像 Drill 这样的独立层来实现。


    ## 注意


    代码示例可在 [`https://github.com/gharriso/NextGenDBSamples`](https://github.com/gharriso/NextGenDBSamples)
    找到。


    # 12. 未来的数据库


    > 人脑拥有巨大的记忆存储。它使我们充满好奇心和创造力……而且大脑做了一件非常特别的事情。它发明了一个叫做“未来”的想法。——David Suzuki

    > 每一场革命都会有其反革命——这是革命真实存在的标志。——C. Wright Mills

    '
- fmt: 'This book is the story of how a revolution in database technology saw the
    “one size fits all” traditional relational `SQL` database give way to a multitude
    of special-purpose database technologies. In the past 11 chapters, we have reviewed
    the major categories of next-generation database systems and have taken a deep
    dive into some of the internal architectures of those systems.


    Most of the technologies we have reviewed are still evolving rapidly, and few
    would argue that we’ve reached an end state in the evolution of database systems.
    Can we extrapolate from the trends that we have reviewed in this book and the
    technology challenges we’ve observed to speculate on the next steps in database
    technology? Furthermore, is there any reason to think that any of the revolutionary
    changes we’ve reviewed here are moving along on the wrong track? Should we start
    a counterrevolution?


    In this chapter I argue that the current state of play—in which one must choose
    between multiple overlapping compromise architectures—should and will pass away.
    I believe that we will see an increasing convergence of today’s disparate technologies.
    The database of the future, in my opinion, will be one that can be configured
    to support all or most of the workloads that today require unique and separate
    database technologies.


    ## The Revolution Revisited


    As we discussed in Chapter [1](#A978-1-4842-1329-2_1_Chapter.html), the three
    major eras of database technology correspond to the three major eras of computer
    applications: mainframe, client-server, and modern web. It’s not surprising, therefore,
    that the story of the evolution of modern databases parallels the story of the
    development of the World Wide Web. The predominant drivers for the latest generation
    of database systems are the drivers that arose from the demands of Web 2.0, global
    e-commerce, Big Data, social networks, cloud computing, and—increasingly—the Internet
    of Things (`IoT`). These buzzwords represent more than simple marketing claims:
    they each demand and reflect significant changes in application architectures
    to which database technologies must respond. Today’s application architectures
    and database technologies are continuously challenged to meet the needs of applications
    that demand an unparalleled level of scale, availability, and throughput.


    The imperative represented by these challenges is irresistible: for most enterprises,
    Dig Data, social networks, mobile devices, and cloud storage represent key competitive
    challenges. The ability to leverage data to create competitive advantage is key
    to the survival of the modern business organization, as is the ability to deploy
    applications with global scope and with mobile and social context. It’s hard to
    imagine a successful modern business that did not have a strategy to exploit data
    or to engage with users via social networks and mobile channels. For some industries,
    the `IoT` represents a similar threat and opportunity: Internet-enabled devices
    stand to revolutionize manufacturing, health care, transportation, home automation,
    and many other industries.


    The shift in application architectures that has emerged from these demands has
    been conveniently summarized by the market-research company `IDC` and others as
    “the third platform.”


    Many of the key database variations we have reviewed in this book are optimized
    to satisfy one or more of the challenges presented by this third platform:


    *   `Hadoop` and `Spark` exist to provide a platform within which masses of semi-structured
    and unstructured data can be stored and analyzed.

    *   Nonrelational operational databases such as `Cassandra` and `MongoDB` exist
    to provide a platform for web applications that can support global scale and continuous
    availability, and which can rapidly evolve new features. Some, like `Cassandra`,
    appeal because of their ability to provide scalability and economies across a
    potentially global deployment. Others, like `MongoDB`, appeal because they allow
    more rapid iteration of application design.

    *   Graph databases such as `Neo4j` and Graph Compute Engines allow for the management
    of network data such as is found in social networks.


    However, within each of these domains we see continual demand for the key advantages
    provided by traditional `RDBMS` systems. In particular:


    *   `SQL` provides an interface for data query that has stood the test of time
    and that is familiar to millions of human beings and involves thousands of analytic
    tools.

    *   The relational model of data represents a theoretically sound foundation for
    unambiguous and accessible data models. The relational model continues to be the
    correct representation for most computer datasets, even if the physical implementation
    takes a different form.

    *   Transactions, potentially multi-object and `ACID`, continue to be mandatory
    in many circumstances for systems that strive to correctly represent all interactions
    with the system.


    ## Counterrevolutionaries


    It would be hard for anyone to argue that some sort of seismic shift in the database
    landscape has not occurred. `Hadoop`, `Spark`, `MongoDB`, `Cassandra`, and many
    other nonrelational systems today form an important and growing part of the organizational
    data architecture of many, if not most, Fortune 500 companies. It is, of course,
    possible to argue that all these new technologies are a mistake, that the relational
    model and the transactional `SQL` relational database represent a better solution
    and that eventually the market will “come to its senses” and return to the relational
    fold.


    While it seems unlikely to me that we would make a complete return to a database
    architecture that largely matured in the client-server era, it is I think fairly
    clear that most next-generation databases represent significant compromises. Next-generation
    databases of today do not represent a “unified field theory” of databases; quite
    the contrary. We still have a long way to go.


    A critic of nonrelational systems might fairly claim that the latest breed of
    databases suffer from the following weaknesses:'
  raw: 'This book is the story of how a revolution in database technology saw the
    “one size fits all” traditional relational SQL database give way to a multitude
    of special-purpose database technologies. In the past 11 chapters, we have reviewed
    the major categories of next-generation database systems and have taken a deep
    dive into some of the internal architectures of those systems.


    Most of the technologies we have reviewed are still evolving rapidly, and few
    would argue that we’ve reached an end state in the evolution of database systems.
    Can we extrapolate from the trends that we have reviewed in this book and the
    technology challenges we’ve observed to speculate on the next steps in database
    technology? Furthermore, is there any reason to think that any of the revolutionary
    changes we’ve reviewed here are moving along on the wrong track? Should we start
    a counterrevolution?


    In this chapter I argue that the current state of play—in which one must choose
    between multiple overlapping compromise architectures—should and will pass away.
    I believe that we will see an increasing convergence of today’s disparate technologies.
    The database of the future, in my opinion, will be one that can be configured
    to support all or most of the workloads that today require unique and separate
    database technologies.


    ## The Revolution Revisited


    As we discussed in Chapter [1](#A978-1-4842-1329-2_1_Chapter.html), the three
    major eras of database technology correspond to the three major eras of computer
    applications: mainframe, client-server, and modern web. It’s not surprising, therefore,
    that the story of the evolution of modern databases parallels the story of the
    development of the World Wide Web. The predominant drivers for the latest generation
    of database systems are the drivers that arose from the demands of Web 2.0, global
    e-commerce, Big Data, social networks, cloud computing, and—increasingly—the Internet
    of Things (IoT). These buzzwords represent more than simple marketing claims:
    they each demand and reflect significant changes in application architectures
    to which database technologies must respond. Today’s application architectures
    and database technologies are continuously challenged to meet the needs of applications
    that demand an unparalleled level of scale, availability, and throughput.


    The imperative represented by these challenges is irresistible: for most enterprises,
    Dig Data, social networks, mobile devices, and cloud storage represent key competitive
    challenges. The ability to leverage data to create competitive advantage is key
    to the survival of the modern business organization, as is the ability to deploy
    applications with global scope and with mobile and social context. It’s hard to
    imagine a successful modern business that did not have a strategy to exploit data
    or to engage with users via social networks and mobile channels. For some industries,
    the IoT represents a similar threat and opportunity: Internet-enabled devices
    stand to revolutionize manufacturing, health care, transportation, home automation,
    and many other industries.


    The shift in application architectures that has emerged from these demands has
    been conveniently summarized by the market-research company IDC and others as
    “the third platform.”


    Many of the key database variations we have reviewed in this book are optimized
    to satisfy one or more of the challenges presented by this third platform:


    *   Hadoop and Spark exist to provide a platform within which masses of semi-structured
    and unstructured data can be stored and analyzed.

    *   Nonrelational operational databases such as Cassandra and MongoDB exist to
    provide a platform for web applications that can support global scale and continuous
    availability, and which can rapidly evolve new features. Some, like Cassandra,
    appeal because of their ability to provide scalability and economies across a
    potentially global deployment. Others, like MongoDB, appeal because they allow
    more rapid iteration of application design.

    *   Graph databases such as Neo4j and Graph Compute Engines allow for the management
    of network data such as is found in social networks.


    However, within each of these domains we see continual demand for the key advantages
    provided by traditional RDBMS systems. In particular:


    *   SQL provides an interface for data query that has stood the test of time and
    that is familiar to millions of human beings and involves thousands of analytic
    tools.

    *   The relational model of data represents a theoretically sound foundation for
    unambiguous and accessible data models. The relational model continues to be the
    correct representation for most computer datasets, even if the physical implementation
    takes a different form.

    *   Transactions, potentially multi-object and ACID, continue to be mandatory
    in many circumstances for systems that strive to correctly represent all interactions
    with the system.


    ## Counterrevolutionaries


    It would be hard for anyone to argue that some sort of seismic shift in the database
    landscape has not occurred. Hadoop, Spark, MongoDB, Cassandra, and many other
    nonrelational systems today form an important and growing part of the organizational
    data architecture of many, if not most, Fortune 500 companies. It is, of course,
    possible to argue that all these new technologies are a mistake, that the relational
    model and the transactional SQL relational database represent a better solution
    and that eventually the market will “come to its senses” and return to the relational
    fold.


    While it seems unlikely to me that we would make a complete return to a database
    architecture that largely matured in the client-server era, it is I think fairly
    clear that most next-generation databases represent significant compromises. Next-generation
    databases of today do not represent a “unified field theory” of databases; quite
    the contrary. We still have a long way to go.


    A critic of nonrelational systems might fairly claim that the latest breed of
    databases suffer from the following weaknesses:'
  trans: '

    本书讲述了数据库技术领域的一场革命：曾经“一刀切”的传统关系型 `SQL` 数据库，如何让位于多种专用数据库技术。在过去的 11 个章节中，我们回顾了下一代数据库系统的主要类别，并深入探讨了其中一些系统的内部架构。


    我们所回顾的大部分技术仍在快速发展，很少有人会认为数据库系统的演进已经达到了最终状态。我们能否从本书所回顾的趋势以及我们观察到的技术挑战中进行推断，以预测数据库技术的下一步发展？此外，我们是否应该认为，我们在此讨论的任何革命性变革正走在错误的轨道上？我们是否需要发起一场反革命？


    在本章中，我认为当前这种必须在多个相互重叠、各有妥协的架构中做出选择的局面，应该也终将过去。我相信，我们将会看到当今这些迥异的技术日益趋同。未来的数据库，在我看来，将是一种可以配置为支持所有或大部分当前需要独特且独立数据库技术来处理的工作负载的系统。


    ## 回顾革命


    正如我们在第 1 章所讨论的，数据库技术的三大时代对应于计算机应用的三大时代：大型机、客户端-服务器和现代 Web。因此，现代数据库的演变历程与万维网的发展历程并行也就不足为奇了。最新一代数据库系统的主要驱动力，源于
    Web 2.0、全球电子商务、大数据、社交网络、云计算以及日益重要的物联网 (`IoT`) 的需求。这些流行词不仅仅是简单的营销口号：它们各自要求并反映了应用架构的重大变革，数据库技术必须对此做出响应。当今的应用架构和数据库技术不断面临挑战，以满足应用对无与伦比的规模、可用性和吞吐量的需求。


    这些挑战所代表的当务之急是不可抗拒的：对大多数企业而言，大数据、社交网络、移动设备和云存储代表了关键的竞争挑战。利用数据创造竞争优势的能力，是现代商业组织生存的关键；同样，部署具备全球范围、移动和社交语境的应用能力也至关重要。很难想象一个成功的现代企业，会没有利用数据或通过社交网络和移动渠道与用户互动的策略。对某些行业而言，`IoT`
    代表着类似的威胁和机遇：联网设备有望彻底改变制造业、医疗保健、交通运输、家庭自动化以及许多其他行业。


    由这些需求催生的应用架构转变，被市场研究公司 `IDC` 等机构方便地总结为“第三平台”。


    我们在本书中回顾的许多关键数据库变体，都针对满足这第三平台所带来的一项或多项挑战进行了优化：


    *   `Hadoop` 和 `Spark` 的存在是为了提供一个平台，用于存储和分析海量半结构化和非结构化数据。

    *   诸如 `Cassandra` 和 `MongoDB` 之类的非关系型操作数据库，其存在是为了为 Web 应用提供一个支持全球规模、持续可用性并能快速演进新功能的平台。其中一些，如
    `Cassandra`，因其能够为潜在的全球部署提供可扩展性和经济性而受到青睐。另一些，如 `MongoDB`，则因其允许更快速的应用设计迭代而具有吸引力。

    *   诸如 `Neo4j` 之类的图数据库和图计算引擎，可以管理社交网络中常见的网络数据。


    然而，在上述每一个领域内，我们都能看到对传统 `RDBMS` 系统所提供关键优势的持续需求。特别是：


    *   `SQL` 提供了一种数据查询接口，它经受住了时间的考验，为数百万人所熟悉，并涉及数千种分析工具。

    *   关系数据模型为清晰易懂的数据模型提供了一个理论上健全的基础。即使物理实现形式不同，关系模型仍然是大多数计算机数据集的正确表示方式。

    *   事务，可能是多对象的、符合 `ACID` 特性的事务，在许多情况下对于力求正确表示系统所有交互的系统来说，仍然是强制性的。


    ## 反革命者


    很难有人会否认数据库领域没有发生某种剧变。`Hadoop`、`Spark`、`MongoDB`、`Cassandra` 以及许多其他非关系型系统，如今构成了许多（如果不是大多数）财富
    500 强公司组织数据架构中重要且不断增长的部分。当然，也可以辩称所有这些新技术都是一个错误，关系模型和事务性的 `SQL` 关系型数据库代表了更好的解决方案，最终市场会“恢复理智”并回归关系型的怀抱。


    虽然我认为我们几乎不可能完全回归到一种主要在客户端-服务器时代成熟的数据库架构，但在我看来相当清楚的是，大多数下一代数据库都代表着重大的妥协。当今的下一代数据库并不代表数据库的“统一场论”；恰恰相反。我们仍有很长的路要走。


    一位对非关系型系统的批评者可以合理地指出，最新一代的数据库存在以下弱点：

    '
- fmt: '# 非关系型数据库的反思与未来


    *   A return of the navigational model. Many of the new breed of databases have
    reinstated the situation that existed in pre-relational systems, in which logical
    and physical representations of data are tightly coupled in an undesirable way.
    One of the great successes of the relational model was the separation of logical
    representation from physical implementation.

    *   Inconsistent to a fault. The inability in most nonrelational systems to perform
    a multi-object transaction, and the possibility of inconsistency and unpredictability
    in even single-object transactions, can lead to a variety of undesirable outcomes
    that were largely solved by the `ACID` transaction and multi-version consistency
    control (`MVCC`) patterns. Phantom reads, lost updates, and nondeterministic behaviors
    can all occur in systems in which the consistency model is relaxed.

    *   Unsuited to business intelligence. Systems like `HBase`, `Cassandra`, and
    `MongoDB` provide more capabilities to the programmer than to the business owner.
    Data in these systems is relatively isolated from normal business intelligence
    (`BI`) practices. The absence of a complete `SQL` layer that can access these
    systems isolates them from the broader enterprise.

    *   Too many compromises. There are a wide variety of specialized database solutions,
    and in some cases these specialized solutions will be an exact fit for an application’s
    requirements. But in too many cases the application will have to choose between
    two or more `NQR` (not quite right) database architectures.


    ## Have We Come Full Circle?


    It’s not unusual for relational advocates to claim that the nonrelational systems
    are a return to pre-relational architectures that were discarded decades ago.
    This is inaccurate in many respects, but in particular because pre-relational
    systems were nondistributed, whereas today’s nonrelational databases generally
    adopt a distributed database architecture. That alone makes today’s nonrelational
    systems fundamentally different from the pre-relational systems of the 1960s and
    ’70s.


    However, there is one respect in which many newer nonrelational systems resemble
    pre-relational databases: they entangle logical and physical representations of
    data. One of Edgar Codd’s key critiques of pre-relational systems such as `IDMS`
    and `IMS` was that they required the user to be aware of the underlying physical
    representation of data. The relational model decoupled these logical and physical
    representations and allowed users to see the data in a logically consistent representation,
    regardless of the underlying storage model. The normalized relational representation
    of data avoids any bias toward a particular access pattern or storage layout:
    it decouples logical representation of data from underlying physical representation.


    Many advocates of modern nonrelational systems explicitly reject this decoupling.
    They argue that by making all access patterns equal, normalization makes them
    all equally bad. But this assertion is dubious: it ignores the possibility of
    de-normalization as an optimization applied atop a relational model. It’s clear
    that the structure presented to the end user does not have to be the same as the
    structure on disk.


    Indeed, the motivation for abandoning the relational model was driven less by
    these access pattern concerns and more by a desire to align the databases’ representation
    of data with the object-oriented representation in application code. An additional
    motivation was to allow for rapidly mutating schemas: to avoid the usually lengthy
    process involved in making a change to a logical data model and propagating that
    change through to a production system.


    Was Codd wrong in 1970 to propose that the physical and logical representations
    of data should be separate? Almost certainly not. The ability to have a logical
    data model that represents an unambiguous and nonredundant view of the data remains
    desirable. Indeed, most nonrelational modeling courses encourage the user to start
    with some form of “logical” model.


    I argue, therefore, that the need for a high-level logical model of the data is
    still desirable and that to allow users to interact with the database using that
    model remains as valid a requirement as it was when the relational model was first
    proposed. However, modern applications need the ability to propagate at least
    minor changes to the data model without necessitating an unwieldy database change
    control process.


    ## An Embarrassment of Choice


    Ten years ago, choosing the correct database system for an application was fairly
    straightforward: choose the relational database vendor with which one had an existing
    relationship or which offered the best licensing deals. Technical considerations
    or price might lead to a choice of `Oracle` over `SQL Server`, or vice versa,
    but that the database would be an `RDBMS` was virtually a given. Today, choosing
    the best database system is a much more daunting task, often made more difficult
    by the contradictory claims of various venders and advocates. Most of the time,
    some form of relational technology will be the best choice. But for applications
    that may seek to break outside the `RDBMS` comfort zone and seek competitive advantage
    from unique features of new database technologies, the choice of database can
    be decisive.


    “Which is the best database to choose?” Often, there is no right answer to the
    question because each choice implies some form of compromise. An `RDBMS` may be
    superior in terms of query access and transactional capability, but fails to deliver
    the network partition tolerance required if the application grows. `Cassandra`
    may deliver the best cross-data-center availability, but may fail to integrate
    with a `BI` systems. And so on ...


    Figure [12-1](#A978-1-4842-1329-2_12_Chapter.html#Fig1) illustrates some of the
    decision points that confront someone trying to decide upon a database today.


    ![A978-1-4842-1329-2_12_Fig1_HTML.jpg](A978-1-4842-1329-2_12_Fig1_HTML.jpg)


    Figure 12-1. Decisions involved in choosing the correct database


    ## Can We have it All?


    I’ve become convinced that we can “have it all” within a single database offering.
    For instance, there is no architectural reason why a database system should not
    be able to offer a tunable consistency model that includes at one end strict multi-record
    `ACID` transactions and at the other end an eventual consistency style model.
    In a similar fashion, I believe we could combine the features of a relational
    model and the document store, initially by following the existing trend toward
    allowing `JSON` data types within relational tables.


    The resistance to this sort of convergence will likely be driven as much by market
    and competitive considerations as by technological obstacles. It may not be in
    the interests of the `RDBMS` incumbents nor the nonrelational upstarts to concede
    that a mixed model should prevail. And supporting such a mixed model may involve
    technical complexity that will be harder for the smaller and more recent market
    entrants.


    Nevertheless, this is what I believe would be the best outcome for the database
    industry as a whole. Rather than offering dozens of incompatible technologies
    that involve significant compromises, it would be better to offer a coherent database
    architecture that offers as configurable behaviors the features that outlined
    next. Let’s look at each area of convergence and consider what would be required
    to combine technologies into a single system.


    ## Consistency Models'
