  trans: '

    ### 二级索引


    二级索引使我们能够快速找到除主键或 `rowkey` 值之外、符合其他某些条件的行。


    二级索引在关系型系统中无处不在：能够遍历主键和外键关系是关系型系统的一个基本特性，如果只存在主键索引，这将是不切实际的。在关系型系统中，主键索引和二级索引通常以相同方式实现：最常见的是使用
    `B-tree` 索引，有时也使用 `位图` 索引。


    我们在第 6 章中讨论了列式数据库如何经常使用投影作为索引的替代方案：这种方法在列式系统中有效，因为查询通常跨大量行聚合数据，而不是查找符合特定条件的少量行。我们还在第
    5 章中讨论了图数据库如何使用无索引邻接性来执行高效的图遍历，而无需单独的索引结构。


    这两种解决方案都不适合非关系型操作型数据库系统。键值存储、BigTable 系统和文档数据库的底层设计假设数据通过特定的键值来检索，并且在许多情况下——尤其是在早期的键值系统中——按
    `rowkey` 值查找是查找行的唯一方式。


    然而，对于大多数应用来说，仅通过主键快速访问数据是不够的。因此，大多数非关系型数据库都提供某种形式的二级索引支持，或者至少提供“自建”二级索引的模式。


    #### 自建二级索引


    为键值存储创建二级索引在概念上相当简单。你创建一个表，其中键值是要索引的列或属性，该表包含主表的 `rowkey`。


    图 10-13 说明了该技术。`USERS` 表包含每个用户的唯一标识符（`rowkey`），但我们经常需要通过电子邮件地址检索用户。因此，我们创建一个单独的表，其中主键是用户的电子邮件地址，并包含源表的
    `rowkey`。


    ![A978-1-4842-1329-2_10_Fig13_HTML.jpg](img/A978-1-4842-1329-2_10_Fig13_HTML.jpg)


    图 10-13. 自建二级索引


    该主题的变体允许对非唯一值进行索引。例如，在像 `HBase` 这样的宽列存储中，一个索引条目可能由多个列组成，这些列指向具有共同值的行，如图 10-13
    中的“`COUNTRY`”索引所示。


    然而，上述自建方法存在一些显著问题：


    *   需要由应用代码来一致地维护基础表中的数据及其所有索引。应用代码中的错误或使用替代客户端对数据进行临时操作可能导致索引中数据缺失或不正确。

    *   理想情况下，修改基础表的操作和修改索引的操作应该是原子的：要么两者都成功，要么都不成功。然而，在非关系型数据库中，很少提供多对象事务。如果索引操作成功但基础表修改失败（或反之），则索引将不正确。

    *   最终一致性会引发类似问题：应用可能从索引中读取到尚未传播到基础表每个副本的条目（或反之）。

    *   索引表支持等值查找，但通常不支持范围操作，因为与 `B-tree` 结构不同，索引条目之间没有指向下一个逻辑条目的指针。


    自建索引并非完全不可行，但它给应用带来了沉重负担，实践中会导致不可靠和脆弱的实现。当数据库实现原生的二级索引方案时，这些问题大多可以得到缓解。二级索引的实现可以独立于应用代码，并且数据库引擎可以确保索引条目和基础表条目被一致地维护。


    #### 全局索引与本地索引


    分布式数据库给索引方案带来了额外的问题。如果索引条目使用常规机制进行分区——无论是通过对键值进行一致性哈希，还是使用键值作为分片键——那么基础表行的索引条目通常位于不同的节点上。因此，大多数查找通常会跨越两个节点，因此需要两次
    `IO` 操作。


    如果索引值是唯一的，那么常规的分片或哈希机制会将数据均匀分布在集群中。然而，如果键值是非唯一的，特别是如果值的分布存在显著倾斜，那么索引条目以及索引负载可能分布不均。例如，图
    10-13 中 `COUNTRY` 上的索引将导致最大国家（在我们的例子中是 `USA`）的索引条目集中在单个节点上。


    为避免这些问题，非关系型数据库中的二级索引通常实现为本地索引。每个节点维护自己的索引，该索引仅引用本地节点上保存的数据。依赖于索引的查询被发送到每个节点，节点通过其本地索引将任何匹配的数据返回给查询协调器，由协调器合并结果。


    图 10-14 说明了本地二级索引方法。数据库客户端请求特定非键值的数据（1）。查询协调器将这些请求发送到集群中的每个节点（2）。每个节点检查其本地索引以确定是否存在匹配值（3）。如果在索引中找到匹配值，则从中检索
    `rowkey`，并用于从基础表中检索数据（4）。每个节点将数据返回给查询协调器（5），协调器整合结果并将其返回给数据库客户端（6）。


    ![A978-1-4842-1329-2_10_Fig14_HTML.jpg](img/A978-1-4842-1329-2_10_Fig14_HTML.jpg)


    图 10-14. 本地二级索引

    '
- fmt: '## Secondary Indexing Implementations in NoSQL Databases


    Although most nonrelational databases implement local secondary indexes, the specific
    implementations vary significantly.


    -   `Cassandra` provides local secondary indexes. The implementation in `Cassandra
    Query Language (CQL)` uses syntax that is familiar to users of relational databases.
    However, internally the implementation involves column families on each node that
    associate indexed values with rowkeys in the base column family. Each index row
    is keyed on the indexed value and a wide column structure in the index row contains
    the rowkeys of matching base column family rows. The architecture is similar to
    the `COUNTRY` index example shown in Figure [10-13](#A978-1-4842-1329-2_10_Chapter.html#Fig13).

    -   `MongoDB` allows indexes to be created on nominated elements of documents
    within a collection. `MongoDB` indexes are traditional `B-tree` indexes similar
    to those found in relational systems and as illustrated in Figure [10-10](#A978-1-4842-1329-2_10_Chapter.html#Fig10).

    -   `Riak` is a pure key-value store. Since the values associated with keys in
    `Riak` are opaque to the database server, there is no schema element for `Riak`
    to index. However, `Riak` allows tags to be associated with specific objects,
    and local indexes on each node allow fast retrieval of matching tags. `Riak` architects
    now recommend using the built-in `Solr` integration discussed earlier in this
    chapter instead of this secondary indexing mechanism.

    -   `HBase` does not provide a native secondary index capability. If your `HBase`
    implementation requires secondary indexes, you are required to implement some
    form of DIY secondary indexing. However, `HBase` has a coprocessor feature that
    significantly improves the robustness of DIY indexes and reduces the overhead
    for the programmer. An `HBase` observer coprocessor acts like a database trigger
    in an `RDBMS`—it allows the programmer to specify code that will run when certain
    events occur in the database. Programmers can use observer coprocessors to maintain
    secondary indexes, thereby ensuring that the index is maintained automatically
    and without exception. Some third parties have provided libraries that further
    assist programmers who need to implement secondary indexes in `HBase`.


    ## Conclusion


    In this chapter we’ve reviewed some of the data model patterns implemented by
    nonrelational next-generation databases. `NoSQL` databases are often referred
    to as schema-less, but in reality schemas are more often flexible than nonexistent.


    `HBase` and `Cassandra` data models are based on the Google `BigTable` design,
    which implements a sparse distributed multidimensional map structure. Column names
    in `BigTable`-oriented tables are in reality closer to the keys in a `Java` or
    `.NET` map structure than to the columns in relational systems. Although `Cassandra`
    uses `BigTable`-oriented data structures internally, the `Cassandra` engineers
    have implemented a more relational-style interface on top of the `BigTable` structure:
    the `Cassandra Query Language`.


    Many nonrelational systems use the log-structured merge tree architecture, which
    can sustain higher write throughput than the traditional relational `B-tree` structures.


    The initial implementation of many nonrelational systems—those based on `BigTable`
    or `Dynamo` in particular—supported only primary key access. However, the ability
    to retrieve data based on some other key is an almost universal requirement, so
    most nonrelational systems have implemented some form of secondary indexing.


    # 11. Languages and Programming Interfaces


    > Any fool can write code that a computer can understand. Good programmers write
    code that humans can understand. —Martin Fowler As far as the customer is concerned,
    the interface is the product. —Jef Raskin


    Crucial to the dominance of the relational database was the almost universal adoption
    of the `SQL` language as the mechanism for querying and modifying data. `SQL`
    is not a perfect language, but it has demonstrated sufficient flexibility to meet
    the needs of both non-programming database users and professional database programmers.
    Programmers embed `SQL` in programming languages, while non-programmers use `SQL`
    either explicitly within a query tool or implicitly when a `BI` tool uses `SQL`
    under the hood to talk to the database. Prior to the introduction of `SQL`, most
    `IT` departments labored with a backlog of requests for reports; `SQL` allowed
    the business user to “self-serve” these requests.


    `SQL` remains the most significant database language. Not only does it remain
    the universal language for `RDBMS`, but it is also widely adopted in next-generation
    database systems of the `NewSQL` variety.


    However, even though `NoSQL` has been retrospectively amended to mean “Not Only
    SQL” rather than “Hell No SQL!,” `SQL` is not usually available for next-generation
    databases of the `NoSQL` variety. In this chapter, we look at how we can interact
    with these databases in the absence of `SQL`, and see how `SQL` is increasingly
    finding its way back into the world of nonrelational databases.


    Note


    The code examples in this chapter are intended only to provide a flavor of database
    programming languages [¹](#A978-1-4842-1329-2_11_Chapter.html#Sec20) —this chapter
    is not intended to serve as a tutorial or reference for any of the languages concerned.'
