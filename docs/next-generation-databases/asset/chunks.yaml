- fmt: '### The Economics of Disk


    The promise of SSD has led some to anticipate a day when all magnetic disks are
    replaced by SSD. While this day may come, in the near term the economics of storage
    and the economics of I/O are at odds: magnetic disk technology provides a more
    economical medium per unit of storage, while flash technology provides a more
    economical medium for delivering high I/O rates and low latencies. And although
    the cost of a solid state disk is dropping rapidly, so is the cost of a magnetic
    disk. An examination of the trend for the cost per gigabyte for SSD and HDD is
    shown in Figure [7-3](#A978-1-4842-1329-2_7_Chapter.html#Fig3).


    ![A978-1-4842-1329-2_7_Fig3_HTML.jpg](A978-1-4842-1329-2_7_Fig3_HTML.jpg)


    Figure 7-3. Trends in SSD and HDD storage costs (note logarithmic scale)


    While SSD continues to be an increasingly economic solution for small databases
    or for performance-critical systems, it is unlikely to become a universal solution
    for massive databases, especially for data that is infrequently accessed. We are,
    therefore, likely to see combinations of solid state disk, traditional hard drives,
    and memory providing the foundation for next-generation databases.


    ### SSD-Enabled Databases


    A couple of next-generation database systems have engineered architectures that
    are specifically designed to take advantage of the physics of SSD.


    Many traditional relational databases perform relatively poorly on SSD because
    critical IO has been isolated to sequential write operations for which hard disk
    drives perform well, but that represent the worst possible workload for SSD. When
    a transaction commits in an `ACID`-compliant relational database, the transaction
    record is usually written immediately to a sequential transaction log (called
    a redo log in some databases). IO to this transaction log might not improve when
    the log is moved to SSD because of lesser SSD write performance and the write
    amplification effect we discussed earlier. In this scenario, users may be disappointed
    with the performance improvement achieved when a write-intensive `RDBMS` is moved
    to SSD.


    Many nonrelational systems (`Cassandra`, for instance) utilize log-structured
    storage engines— often based on the log-structured merge tree (`LSM`) architecture—see
    [Chapter 10](#A978-1-4842-1329-2_10_Chapter.html) for details. These tend to avoid
    updating existing blocks and perform larger batched write operations, which are
    friendlier to solid state disk performance characteristics.


    `Aerospike` is a NoSQL database that attempts to provide a database architecture
    that can fully exploit the IO characteristics of flash SSD. `Aerospike` implements
    a log-structured file system in which updates are physically implemented by appending
    the new value to the file and marking the original data as invalid. The storage
    for the older values are recovered by a background process at a later time.


    `Aerospike` also implements an unusual approach in its use of main memory. Rather
    than using main memory as a cache to avoid physical disk IO, `Aerospike` uses
    main memory to store indexes to the data while keeping the data always on flash.
    This approach represents a recognition that, in a flash-based system, the “avoid
    IO at all costs” approach of traditional databases may be unnecessary.


    ## In-Memory Databases


    The solid state disk may have had a transformative impact on database performance,
    but it has resulted in only incremental changes for most database architectures.
    A more paradigm-shifting trend has been the increasing practicality of storing
    complete databases in main memory.


    The cost of memory and the amount of memory that can be stored on a server have
    both been moving exponentially since the earliest days of computing. Figure [7-4](#A978-1-4842-1329-2_7_Chapter.html#Fig4)
    illustrates these trends: both the cost of memory per unit storage and the amount
    of storage that can fit on a single memory chip have been increasing over many
    decades (note the logarithmic scale—the relatively straight lines indicate exponential
    trends).


    ![A978-1-4842-1329-2_7_Fig4_HTML.jpg](A978-1-4842-1329-2_7_Fig4_HTML.jpg)


    Figure 7-4. Trends for memory cost and capacity for the last 40 years (note logarithmic
    scale)


    The size of the average database—particularly in light of the Big Data phenomenon—has
    been growing exponentially as well. For many systems, database growth continues
    to outpace memory growth. But many other databases of more modest size can now
    comfortably be stored within the memory of a single server. And many more databases
    than that can reside within the memory capacity of a cluster.


    Traditional relational databases use memory to cache data stored on disk, and
    they generally show significant performance improvements as the amount of memory
    increases. But there are some database operations that simply must write to a
    persistent medium. In the traditional database architecture, `COMMIT` operations
    require a write to a transaction log on a persistent medium, and periodically
    the database writes “checkpoint” blocks in memory to disk. Taking full advantage
    of a large memory system requires an architecture that is aware the database is
    completely memory resident and that allows for the advantages of high-speed access
    without losing data in the event of a power failure.


    There are two changes to traditional database architecture an in-memory system
    should address:


    *   Cache-less architecture: Traditional disk-based databases almost invariably
    cache data in main memory to minimize disk IO. This is futile and counterproductive
    in an in-memory system: there is no point caching in memory what is already stored
    in memory!

    *   Alternative persistence model: Data in memory disappears when the power is
    turned off, so the database must apply some alternative mechanism for ensuring
    that no data loss occurs.


    In-memory databases generally use some combination of techniques to ensure they
    don’t lose data. These include:


    *   Replicating data to other members of a cluster.

    *   Writing complete database images (called snapshots or checkpoints) to disk
    files.

    *   Writing out transaction/operation records to an append-only disk file (called
    a transaction log or journal).'
