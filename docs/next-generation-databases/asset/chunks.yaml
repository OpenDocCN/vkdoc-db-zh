    foreign key relationships between sites and visits and people and visits.


    ![A978-1-4842-1329-2_2_Fig8_HTML.jpg](A978-1-4842-1329-2_2_Fig8_HTML.jpg)


    Figure 2-8.


    HBase data model compared to relational model


    In the HBase representation (3), each person’s information is held in a single
    row. That row contains columns for every website visited by that person. The column
    name represents the site name and the column value represents the number of visits.
    Because people visit thousands to hundreds of thousands of sites, there can be
    potentially thousands or hundreds of thousands of columns in a row. And while
    there are some sites that almost everyone visits—Google.com, for instance—rows
    only have columns corresponding to websites that they actually visited. So for
    instance, if you have never visited dell.com, then there will be no dell.com column
    in your row.


    The HBase data model and storage system is examined in more detail in [Chapter
    10](#A978-1-4842-1329-2_10_Chapter.html).


    ### Hive


    The pioneers of Hadoop realized fairly early that the full value of the platform
    could not be realized if only people capable of coding MapReduce programs could
    access the system. Non-programmers needed flexible, powerful, and accessible query
    tools to extract data from the Hadoop system. Even for programmers, the laborious
    and tedious process of coding MapReduce to perform repetitive reporting tasks
    seemed terribly inefficient. Two solutions to this problem were independently
    developed at Facebook and Yahoo!: Hive and Pig, respectively.


    Hive is usually thought of as “SQL for Hadoop,” although Hive provides a catalog
    for the Hadoop system, as well as a SQL processing layer. The Hive metadata service
    contains information about the structure of registered files in the HDFS file
    system. This metadata effectively “schematizes” these files, providing definitions
    of column names and data types. The Hive client or server (depending on the Hive
    configuration) accepts SQL-like commands called Hive Query Language (HQL). These
    commands are translated into Hadoop jobs that process the query and return the
    results to the user. Most of the time, Hive creates MapReduce programs that implement
    query operations such as joins, sorts, aggregation, and so on. However, recent
    versions of Hive can employ more modern YARN-based processing paradigms such as
    Tez, a programming model designed to speed up operations of certain data processing
    patterns; we’ll look more at Tez in [Chapter 11](#A978-1-4842-1329-2_11_Chapter.html).


    Figure [2-9](#A978-1-4842-1329-2_2_Chapter.html#Fig9) illustrates the Hive architecture.
    The Hive metastore maps HDFS files to Hive tables (1). A Hive client or server
    (depending on the installation mode) accepts HQL commands that perform SQL operations
    on those tables. Hive translates HQL to Hadoop code (3)—usually MapReduce. This
    code operates against the HDFS files (4) and returns query results to Hive (5).


    ![A978-1-4842-1329-2_2_Fig9_HTML.jpg](A978-1-4842-1329-2_2_Fig9_HTML.jpg)


    Figure 2-9.


    Hive architecture


    It’s hard to overstate the importance of Hive. Hive opened up Hadoop to anybody
    familiar with SQL, illustrated to the community at large that Hadoop could operate
    as a form of data warehouse, and set the stage for integration of Hadoop into
    Business Intelligence tools. However, by raising expectations that Hadoop could
    operate as a traditional database, Hive also contributed to some unrealistic expectations.
    SQL is generally used as a real-time query tool, but Hadoop’s batch orientation
    means that even the simplest HQL query cannot run in a real-time mode.


    The Hadoop community has attempted to deal with Hive performance issues in two
    ways. The predominant Hadoop vendor Cloudera has created an alternative proprietary
    SQL on the Hadoop framework called Impala, while others—including another major
    Hadoop vendor Hortonworks—have attempted to improve Hive’s performance through
    incremental changes and better integration with post-MapReduce frameworks such
    as YARN and Tez. Meanwhile, traditional database vendors such as Oracle and Teradata
    have attempted to provide SQL on Hadoop functionality through their existing SQL
    engines. We’ll spend some more time on SQL interfaces to Hadoop and NoSQL in [Chapter
    11](#A978-1-4842-1329-2_11_Chapter.html).


    ### Pig


    Facebook created Hive to empower analysts wanting to access data in Hadoop. Yahoo!,
    in response to similar demands, independently created another solution: Pig.


    Pig supports a procedural, high-level data flow language called Pig Latin . Like
    Hive, Pig Latin is compiled to MapReduce code. However, Pig is more of a scripting
    language than a SQL alternative. While it is possible to create Pig equivalents
    to virtually all Hive HQL queries, Pig is capable of expressing far more complex
    pipelines of operations than is HQL.


    Figure [2-10](#A978-1-4842-1329-2_2_Chapter.html#Fig10) compares a Pig Latin script
    with an equivalent Hive HQL statement. Note that the Pig script is a procedural
    representation—it explicitly specifies the sequence of events that must be undertaken
    in order to achieve the result. Like SQL, HQL is nonprocedural: it’s up to the
    Hive optimizer to determine the means of execution; the HQL only specifies the
    logical operations to be performed on the data.


    ![A978-1-4842-1329-2_2_Fig10_HTML.jpg](A978-1-4842-1329-2_2_Fig10_HTML.jpg)


    Figure 2-10.


    Pig Latin as compared with Hive HQL'
  trans: '

    ### HBase


    正如本章前面提到的，谷歌在 2003 年至 2006 年间发布了三篇关键论文，揭示了其平台的架构。`GFS`和`MapReduce`论文构成了核心`Hadoop`架构的基础。第三篇关于`BigTable`的论文，则成为了最早的正式`NoSQL`数据库系统之一——`HBase`——的基础。


    `HBase`使用`Hadoop HDFS`作为文件系统，这与大多数传统关系型数据库使用操作系统文件系统的方式相同。例如，在一个使用`MyISAM`选项的`MySQL`数据库中，每个表都表示为存储在文件系统上的一个文件。通过使用`Hadoop
    HDFS`作为其文件系统，`HBase`能够创建真正海量的表——其规模远超`MySQL`甚至`Oracle`等系统的可能极限。此外，`HDFS`的容错性为`HBase`表提供了自动冗余。正如我们在图
    2-6 中看到的，`HDFS`文件系统中的每个数据项默认被复制三次。由于`HDFS`提供了这种固有的冗余性，`HBase`无需存储数据的多个副本来防止数据丢失。


    虽然`HDFS`允许在`Hadoop`中存储任何结构的文件，但`HBase`确实对数据施加了结构。`HBase`对象的术语看起来相当熟悉——列、行、表、键。然而，`HBase`表与我们熟悉的关系表有很大不同。


    首先，在每个单元格中——即特定行的列值——通常会有多个版本的数据值。单元格内的每个数据版本都由一个时间戳标识。这为`HBase`表提供了一种时间上的“第三维度”。


    其次，`HBase`的列更类似于分布式`key : value`对的`Map`中的键值，而不是关系数据库表中固定且相对较少的列。每一行可以拥有大量的“稀疏”列。`HBase`表中的每一行看起来都可以由一组唯一的列构成。


    为了理解`HBase`数据模型的工作原理，请考虑图 2-8 所示的数据。我们首先看到原始数据（1）——一个包含用户、网站以及每个用户访问该网站次数的列表。关系型表示（2）涉及三张表——`sites`、`people`和`visits`——其中`sites`与`visits`、`people`与`visits`之间存在外键关系。


    ![A978-1-4842-1329-2_2_Fig8_HTML.jpg](img/A978-1-4842-1329-2_2_Fig8_HTML.jpg)


    图 2-8. HBase 数据模型与关系模型对比


    在`HBase`表示（3）中，每个人的信息都保存在单行中。该行包含了该人访问过的所有网站的列。列名代表网站名称，列值代表访问次数。由于人们会访问成千上万甚至数十万个网站，一行中可能存在成千上万甚至数十万个列。虽然有些网站几乎每个人都会访问——例如
    Google.com——但行中只包含与他们实际访问过的网站相对应的列。因此，例如，如果你从未访问过 dell.com，那么你的行中就不会有 dell.com
    列。


    `HBase`数据模型和存储系统将在第 10 章中更详细地探讨。


    ### Hive


    `Hadoop`的先驱们很早就意识到，如果只有能够编写`MapReduce`程序的人才能访问该系统，那么该平台的全部价值就无法实现。非程序员需要灵活、强大且易用的查询工具来从`Hadoop`系统中提取数据。即使对于程序员来说，为了执行重复的报告任务而费力且繁琐地编写`MapReduce`代码似乎也效率极低。Facebook
    和 Yahoo!分别独立开发了解决这个问题的两个方案：`Hive`和`Pig`。


    `Hive`通常被认为是“`Hadoop`的`SQL`”，尽管`Hive`除了提供`SQL`处理层外，还为`Hadoop`系统提供了一个目录服务。`Hive`元数据服务包含有关`HDFS`文件系统中已注册文件结构的信息。这些元数据有效地对这些文件进行了“模式化”，提供了列名和数据类型的定义。`Hive`客户端或服务器（取决于`Hive`配置）接受称为`Hive
    查询语言 (HQL)`的类`SQL`命令。这些命令被转换为处理查询并将结果返回给用户的`Hadoop`作业。大多数时候，`Hive`会创建`MapReduce`程序来实现连接、排序、聚合等查询操作。然而，最近版本的`Hive`可以采用更现代的基于`YARN`的处理范式，例如`Tez`（一种旨在加速某些数据处理模式操作的编程模型）；我们将在第
    11 章中更多地讨论`Tez`。


    图 2-9 说明了`Hive`的架构。`Hive`元存储将`HDFS`文件映射到`Hive`表（1）。`Hive`客户端或服务器（取决于安装模式）接受`HQL`命令，对这些表执行`SQL`操作。`Hive`将`HQL`转换为`Hadoop`代码（3）——通常是`MapReduce`。此代码对`HDFS`文件（4）进行操作，并将查询结果返回给`Hive`（5）。


    ![A978-1-4842-1329-2_2_Fig9_HTML.jpg](img/A978-1-4842-1329-2_2_Fig9_HTML.jpg)


    图 2-9. Hive 架构


    `Hive`的重要性难以言表。`Hive`向所有熟悉`SQL`的人敞开了`Hadoop`的大门，向整个社区展示了`Hadoop`可以作为一种数据仓库的形式运行，并为将`Hadoop`集成到商业智能工具中奠定了基础。然而，通过提高人们对`Hadoop`能像传统数据库一样运行的期望，`Hive`也导致了一些不切实际的期望。`SQL`通常被用作实时查询工具，但`Hadoop`的批处理特性意味着即使是最简单的`HQL`查询也无法以实时模式运行。


    `Hadoop`社区试图通过两种方式来处理`Hive`的性能问题。主要的`Hadoop`供应商 Cloudera 创建了一种替代性的专有`SQL on Hadoop`框架，称为`Impala`，而其他公司——包括另一家主要的`Hadoop`供应商
    Hortonworks——则试图通过增量改进以及更好地与`YARN`和`Tez`等后`MapReduce`框架集成来提高`Hive`的性能。与此同时，`Oracle`和`Teradata`等传统数据库供应商也试图通过其现有的`SQL`引擎提供`SQL
    on Hadoop`功能。我们将在第 11 章中花更多时间讨论`Hadoop`和`NoSQL`的`SQL`接口。


    ### Pig


    Facebook 创建`Hive`是为了让分析师能够访问`Hadoop`中的数据。Yahoo!为了应对类似的需求，独立创建了另一个解决方案：`Pig`。


    `Pig`支持一种称为`Pig Latin`的程序化、高级数据流语言。与`Hive`类似，`Pig Latin`被编译为`MapReduce`代码。然而，`Pig`更像是一种脚本语言，而非`SQL`的替代品。虽然可以创建出与几乎所有`Hive
    HQL`查询等效的`Pig`脚本，但`Pig`能够表达比`HQL`复杂得多的操作流水线。


    图 2-10 比较了一个`Pig Latin`脚本与一个等效的`Hive HQL`语句。请注意，`Pig`脚本是过程式的表示——它明确指定了为达成结果必须执行的事件序列。与`SQL`类似，`HQL`是非过程式的：由`Hive`优化器决定执行方式；`HQL`只指定要在数据上执行的逻辑操作。


    ![A978-1-4842-1329-2_2_Fig10_HTML.jpg](img/A978-1-4842-1329-2_2_Fig10_HTML.jpg)


    图 2-10. Pig Latin 与 Hive HQL 对比

