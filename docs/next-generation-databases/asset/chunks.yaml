  trans: '

    Oracle Database 12c 引入了全新的多租户架构，能够快速整合多个数据库并将其作为云服务进行管理。它还包含内存数据处理能力，可提供**突破性的分析性能**。


    我的看法：


    Oracle 可以称得上是第一个成功的、基于关系模型的商业数据库，并在大约 30 年的时间里一直主导着数据库市场。


    从技术地位来看，Oracle 总体上也引领着市场，开创了许多核心的 RDBMS 架构，包括行级锁、`MVCC` 和共享磁盘集群。


    Oracle 提供了 Hadoop 设备和一个 NoSQL 键值存储。在其核心 RDBMS 中，它实现了许多面向文档的数据库特性，包括一个带有 `REST`
    接口的 `JSON` 存储。


    ### 数据模型


    关系型，并支持对象类型（varrays、嵌套表等）以及内嵌的 `XML` 和 `JSON`


    ### 事务模型


    遵循 `ACID`，采用 `MVCC`


    ### 集群


    共享磁盘集群数据库（`RAC`）或分片


    ### API


    `SQL`，附带专有的 `PL/SQL` 存储过程语言


    ## Redis


    数据库名称：Redis


    许可/公司：`BSD` 许可证，由 Redis Labs 提供商业支持


    维基百科描述：


    Redis 是一个数据结构服务器。它是开源的、基于网络的、内存中的；它存储键值，并具有可选的持久性。


    厂商描述：


    Redis 是一个开源的（`BSD` 许可）、内存中的数据结构存储，用作数据库、缓存和消息代理。


    我的看法：


    Redis 是一个流行的轻量级内存键值存储。


    ### 数据模型


    键值


    ### 事务模型


    单服务器内严格一致


    ### 集群


    主从复制


    ### API


    提供 API，并有适用于大多数常用语言的驱动程序


    ## Riak


    数据库名称：Apache Riak


    许可/公司：Apache 开源项目，由 Basho Technologies 商业化


    维基百科描述：


    Riak 是一个分布式 NoSQL 键值数据存储，提供高可用性、容错性、操作简单性和可扩展性。Riak 实现了 Amazon `Dynamo` 论文的原则，并深受
    `CAP` 定理的影响。


    厂商描述：


    Riak 是一个分布式 NoSQL 数据库，具有高可用性、可扩展性和易于操作的特点。它自动将数据分布到集群中，以确保快速性能和容错性。


    我的看法：


    Riak 是对 `Dynamo` 键值存储概念的一个相当纯粹的实现，同时集成了 `Solr`、时间序列扩展以及一个对象云存储产品。Riak 被广泛采用，并且技术相当成熟。


    ### 数据模型


    键值


    ### 事务模型


    `Dynamo` 可调一致性


    ### 集群


    一致性哈希


    ### API


    `REST API`，并有适用于 Java、Ruby、Python 等的驱动程序


    ## SAP HANA


    数据库名称：Hana


    许可/公司：专有，由 `SAP` SE 生产


    维基百科描述：


    `SAP HANA` 是一个内存中、列式、关系型数据库管理系统，由 `SAP` SE 开发并销售。


    厂商描述：


    通过 `SAP HANA` 加速创新步伐——这是一个内存平台，它将一个符合 `ACID` 标准的数据库与高级数据处理、应用服务和灵活的数据集成服务相结合。


    我的看法：


    Hana 将列式或行式存储格式与内存技术相结合，运行在经过认证的硬件规范上，为 `OLTP` 或 `OLAP` 工作负载提供低延迟。


    ### 数据模型


    关系型


    ### 事务模型


    `ACID`


    ### 集群


    无共享分区


    ### API


    `SQL`


    ## TimesTen


    数据库名称：TimesTen


    许可/公司：Oracle 专有


    维基百科描述：


    TimesTen 是一个内存中的、关系型数据库管理系统，具有持久性和可恢复性。


    厂商描述：


    Oracle TimesTen 内存数据库（TimesTen）是一个功能齐全、针对内存优化的关系型数据库，具有持久性和可恢复性。


    我的看法：


    它是内存数据库类别的早期进入者，也是内存事务关系型架构的一个很好的例子。如今，它主要作为 Oracle 更广泛软件栈的一部分而具有重要意义。


    ### 数据模型


    关系型


    ### 事务模型


    `ACID`


    ### 集群


    无


    ### API


    `SQL`


    ## Vertica


    数据库名称：Vertica


    许可/公司：专有，由 `HP` 提供


    维基百科描述：


    基于集群的、列式的 Vertica 分析平台旨在管理大型、快速增长的数据量，并在用于数据仓库和其他查询密集型应用时提供极快的查询性能。


    厂商描述：


    `HP` Vertica 是最先进的 `SQL` 数据库分析组合，从最初的第一行代码开始构建，旨在满足最苛刻的大数据分析计划。


    我的看法：


    Vertica 是 Stonebraker 等人的开创性论文中概述的概念的一个相当忠实的实现，这些论文部分地开创了 `NewSQL` 类别。它与 `SAP
    Sybase IQ` 一起，代表了一个主要基于列式概念的数据库系统实例。


    ### 数据模型


    关系型


    ### 事务模型


    `ACID`


    ### 集群


    无共享


    ### API


    `SQL`


    ## VoltDB


    数据库名称：VoltDB


    许可/公司：专有，VoltDB Corp.


    维基百科描述：


    VoltDB 是一个由几位著名数据库系统研究员（包括图灵奖获得者 Michael Stonebraker）设计的内存数据库。它是一个符合 `ACID` 的
    `RDBMS`，采用无共享架构。


    厂商描述：


    内存性能，永不丢失数据。具有毫秒延迟的流分析。在横向扩展架构中的 `OLTP`。具有 `ACID` 保证的 `SQL` 和 `JSON`。


    我的看法：


    VoltDB 实现了一个比其他自称内存数据库更纯粹的内层架构，但在提交操作期间会执行磁盘 I/O。该架构的另一个显著特点是避免了在单个分区内使用闩锁和锁。


    ### 数据模型


    关系型，但当数据是层次化时，分区效果最佳


    ### 事务模型


    `ACID`


    ### 集群


    无共享


    ### API


    `SQL` 和 Java 存储过程

