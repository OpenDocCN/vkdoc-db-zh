    8-11 展示了向集群添加节点如何导致哈希键范围分布不均衡。


    ![A978-1-4842-1329-2_8_Fig11_HTML.jpg](img/A978-1-4842-1329-2_8_Fig11_HTML.jpg)


    图 8-11.

    向 Cassandra 集群添加节点（不使用虚拟节点）


    在 Cassandra、Riak 和许多其他基于 Dynamo 的系统中实现的**虚拟节点**为这个问题提供了解决方案。使用虚拟节点时，哈希范围是为相对大量的虚拟节点（通常每个物理节点
    256 个虚拟节点）计算的，然后这些虚拟节点被分配给物理节点。现在，当添加新节点时，可以将特定的虚拟节点重新分配给新节点，从而以最小的开销实现平衡配置。图
    8-12 说明了虚拟节点与物理节点之间的关系。


    ![A978-1-4842-1329-2_8_Fig12_HTML.jpg](img/A978-1-4842-1329-2_8_Fig12_HTML.jpg)


    图 8-12.

    使用虚拟节点在物理节点间分区数据


    虚拟节点还有其他一些优势。例如，更容易平衡由异构系统组成的集群，因为你可以为更强大的新机器分配更多虚拟节点，为性能较弱的旧机器分配更少的虚拟节点。此外，如果一个节点死亡，可以从更多物理机中重建它，从而更公平地分摊恢复开销。


    #### 保留顺序的分区器


    Cassandra 分区器决定了键如何在节点间分布。默认分区器使用上一节描述的一致性哈希。Cassandra 也支持保留顺序的分区器，它将数据作为实际的（例如，未哈希的）`rowkey`
    范围分布在集群的各个节点上。这样做的好处是将特定行范围的请求隔离到特定机器，但这可能导致集群不均衡，并可能产生热点，特别是如果键值是递增的。例如，如果键值是时间戳并且实现了保留顺序的分区器，那么所有新行都倾向于在集群的单个节点上创建。


    在早期版本的 Cassandra 中，可能需要使用保留顺序的分区器来优化无法通过其他方式满足的范围查询；然而，在引入二级索引之后，保留顺序的分区器主要是为了向后兼容而保留，Cassandra
    文档建议在新应用中不要使用它。


    ## 副本


    到目前为止，我们已经了解了 Cassandra 如何将数据项的初始副本分配给节点。一致性哈希算法也决定了数据项的副本存储位置。


    负责与特定 `rowkey` 值对应的哈希范围的节点称为**协调节点**。协调器负责确保写入所需数量的副本数据副本。数据必须写入的节点数量称为`复制因子`，这也是我们在第
    3 章首次遇到的 `NWR` 表示法中的 `N`。


    默认情况下，协调器会将数据副本写入环上的接下来 `N-1` 个节点。因此，如果`复制因子`是 3，协调器会将数据项的副本发送到环上的接下来两个节点。在此场景中，每个节点将复制来自环上前面两个节点的数据，并复制到环上的后面两个节点。这个简单的方案被称为`简单复制策略`。


    Cassandra 还允许你配置更复杂和高可用的方案。`网络拓扑感知复制策略`确保副本将被写入同一数据中心内其他机架的节点，或者可选地写入另一个数据中心的节点。图
    8-13 说明了这两种复制策略。


    ![A978-1-4842-1329-2_8_Fig13_HTML.jpg](img/A978-1-4842-1329-2_8_Fig13_HTML.jpg)


    图 8-13.

    Cassandra 中的复制策略


    ## 探测器


    Cassandra 使用**探测器**来帮助优化读写操作。可以配置多种探测器。


    *   `SimpleSnitch` 仅返回环上节点的列表。这对于我们在上一节讨论的`简单复制策略`已经足够。

    *   `RackInferringSnitch` 使用主机的 IP 地址来推断其机架和数据中心位置。此探测器支持`网络感知复制策略`。

    *   `PropertyFileSnitch` 使用配置文件中的数据而不是 IP 地址来确定数据中心和机架拓扑。


    此外，所有探测器都监控请求的读取延迟，并利用此数据构建统计模型，从而可以将请求路由到性能最佳的节点。


    存在专门的探测器，它们理解各种云平台（如 Amazon EC2）内部的网络拓扑。

