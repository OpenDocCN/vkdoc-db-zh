  trans: "\n## Riak\n\n现在，如果我们获取一个包含同源数据的字符串值，冲突解决器将被调用并解决这些冲突。在我们的例子中，我们使用了几乎最简单的对象类型——字符串，并采用了简单的解决逻辑：在生产应用中，对象类型很可能是应用自定义的复杂类，解决逻辑可能涉及非常复杂的逻辑来合并两个对象。\n\
    \n除了同源数据解决，Riak API 还允许处理对复杂数据类型的修改。应用代码无需提供要插入的新对象的完整副本，而只需指定一个要应用于现有对象的变更向量。例如，如果一个对象是好友列表，我们可以通过仅指定新好友的名称来添加新好友，而无需检索并重新插入所有现有好友。\n\
    \n### 定义更新值\n\n通过扩展 `UpdateValue` 超类，我们可以定义如何将更新值应用于 Riak 对象。在下面的示例中，`apply` 方法定义了更新将（在“\\\
    n”回车符之后）简单地追加到 Riak 对象。\n\n```java\npublic class MyRiakUpdater extends UpdateValue.Update<String>\
    \ {\n\n    private final String updatedString;\n\n    public MyRiakUpdater(String\
    \ updatedString) {\n        this.updatedString = updatedString;\n    }\n\n   \
    \ public String apply(String original) {\n        return original + \"\\n\" +\
    \ updatedString;\n    }\n}\n```\n\n### 调用更新器\n\n要调用更新器，我们从之前创建的更新器类创建一个新的对象实例，并使用\
    \ `withUpdate` 方法将其应用于原始版本。\n\n```java\nMyRiakUpdater myUpdatedData = new MyRiakUpdater(newData);\n\
    \nUpdateValue myUpdate = new UpdateValue.Builder(myLocation)\n    .withUpdate(myUpdatedData).build();\n\
    \nUpdateValue.Response updateResponse = myClient.execute(myUpdate);\n```\n\n这段代码将在首先解决同源数据（前提是我们已经注册了合适的冲突解决器）之后，将更新应用于\
    \ Riak 对象。\n\n## HBase\n\nHBase API 与我们在 Riak API 中看到的 put/get 模式有一些相似之处。然而，由于\
    \ HBase 表具有宽列结构，因此引入了一些额外的复杂性。\n\n### 使用 Shell 命令\n\nHBase 支持一个简单的 shell，允许访问基本的数据定义和操作命令。在这里，我们启动\
    \ HBase shell 并发出命令来创建一个名为 `ourfriends` 的表，该表有两个列族：`info` 和 `friends`：\n\n```shell\n\
    $ hbase shell\nhbase(main):003:0> create 'ourfriends', {NAME => 'info'}, {NAME\
    \ => 'friends'}\n0 row(s) in 1.3400 seconds\n```\n\n每个 put 命令填充行中的一个单元格，因此这四个命令填充了由行键‘guy’标识的行中的列：\n\
    \n```shell\nhbase(main):005:0> put 'ourfriends', 'guy','info:email','guy@gmail.com'\n\
    0 row(s) in 0.0900 seconds\n\nhbase(main):006:0> put 'ourfriends', 'guy','info:userid','9990'\n\
    0 row(s) in 0.0070 seconds\n\nhbase(main):007:0> put 'ourfriends', 'guy','friends:Jo','jo@gmail.com'\n\
    0 row(s) in 0.0050 seconds\n\nhbase(main):008:0> put 'ourfriends', 'guy','friends:John','john@gmail.com'\n\
    0 row(s) in 0.0040 seconds\n```\n\n`get` 命令获取特定行键的值，使我们能够看到刚刚输入的单元格值：\n\n```shell\n\
    hbase(main):018:0> get 'ourfriends','guy'\nCOLUMN                      CELL\n\
    \ friends:Jo                 timestamp=1444123707299, value=jo@gmail.com\n friends:John\
    \               timestamp=1444123707324, value=john@gmail.com\n info:email   \
    \              timestamp=1444123707214, value=guy@gmail.com\n info:userid    \
    \            timestamp=1444123707274, value=9990\n4 row(s) in 0.0390 seconds\n\
    ```\n\n请注意，这是一个宽列结构，其中列族 `friends` 中的列名代表好友的姓名。这就是第 10 章图 10-5 所示的数据结构。\n\n###\
    \ 连接 HBase 服务器\n\nShell 适用于简单的实验和数据验证，但 HBase 中的大部分实际工作都是在 Java 程序中完成的。在这里，我们看到了从\
    \ Java 程序连接到 HBase 服务器的简单代码：\n\n```java\nConfiguration config = HBaseConfiguration.create();\n\
    config.set(\"hbase.zookeeper.quorum\", myServer);\nconfig.set(\"hbase.zookeeper.property.clientport\"\
    , \"2181\");\nHBaseAdmin.checkHBaseAvailable(config);\nConnection connection =\
    \ ConnectionFactory.createConnection(config);\n```\n\n### 获取数据\n\n对于具有固定列结构的列族，例如我们示例中的\
    \ `info`，我们可以相当简单地检索数据：\n\n```java\n1. Table myTable = connection.getTable(TableName.valueOf(\"\
    ourfriends\"));\n2. byte[] myRowKey = Bytes.toBytes(\"guy\");\n3. byte[] myColFamily\
    \ = Bytes.toBytes(\"info\");\n4. byte[] myColName = Bytes.toBytes(\"email\");\n\
    5. Get myGet = new Get(myRowKey);\n6. Result myResult = myTable.get(myGet);\n\
    7. byte[] myBytes = myResult.getValue(myColFamily, myColName);\n8. String email\
    \ = Bytes.toString(myBytes);\n9. System.out.println(\"Email address=\" + email);\n\
    ```\n\n第 1 至 4 行指定了要检索的表、行键、列族和列名。第 5 和第 6 行检索指定行键的行，第 7 行为指定的列族和列名提取一个单元格值。第\
    \ 8 行将值从字节数组转换为字符串。这是 HBase API 中不太讨人喜欢的特性之一：你经常需要将数据与 HBase 原生字节数组进行来回转换。\n\n\
    对于动态列名，我们需要先检索每一行的列名，然后才能检索数据。`getFamilyMap` 方法从结果对象返回一个映射结构，该结构标识了特定行中的列名：\n\n\
    ```java\nNavigableMap<byte[], byte[]> myFamilyMap = myResult.getFamilyMap(myColFamily);\n\
    ```\n\n然后我们可以遍历列名，并使用标准的 `getValue` 调用来检索它们：\n\n```java\nfor (byte[] colNameBytes\
    \ : myFamilyMap.keySet()) {\n    // 获取列族中的列名\n    String colName = Bytes.toString(colNameBytes);\n\
    \    byte[] colValueBytes = myResult.getValue(myColFamily, colNameBytes);\n  \
    \  System.out.println(\"Column \" + colName + \"=\" + Bytes.toString(colValueBytes));\n\
    }\n```\n\n### 写入数据\n\nHBase 的 `put` 方法在形式上类似于 `get` 方法，它允许我们将一个新的列值放入一个单元格。请记住，正如第\
    \ 10 章所讨论的，HBase 单元格可能包含多个数据版本，由时间戳标识。因此，put 方法实际上是添加一个新值，而不是覆盖现有值。\n\n在这里，我们添加一个新的好友：\n\
    \n```java\nmyColFamily = Bytes.toBytes(\"friends\");\nbyte[] myNewColName = Bytes.toBytes(\"\
    paul\");\nbyte[] myNewColValue = Bytes.toBytes(\"paul@fmail.com\");\n\nPut myPut\
    \ = new Put(myRowKey);\nmyPut.addColumn(myColFamily, myNewColName, myNewColValue);\n\
    myTable.put(myPut);\n```\n\nHBase API 不需要像 Riak 那样包含同源数据解决的方法，因为 HBase 使用锁定和严格一致性来防止此类同源数据的产生。\n\
    \n### 其他功能\n\nHBase API 包括用于扫描行键范围的其他方法，这在行键包含某种自然分区值（例如客户 ID）或行键指示某种时间顺序时非常有用。此外，你可能还记得我们在第\
    \ 10 章的讨论，HBase 支持协处理器架构，允许在发生某些数据操作操作时调用代码。该架构提供了类似数据库触发器的能力，允许我们对输入值执行验证、维护二级索引或维护派生值。\n"
- fmt: "### MongoDB\n\nThe APIs we’ve seen in Riak and HBase are not overly complex\
    \ when compared to popular development frameworks like spring or J2EE. However,\
    \ for the casual user—especially one not proficient in programming—they are virtually\
    \ inaccessible. The languages require that you explicitly navigate to the desired\
    \ values and do not provide any direct support for complex queries.\n\nMongoDB\
    \ goes some of the way toward addressing these restrictions by providing a rich\
    \ query language implemented in JavaScript, and exposed through the MongoDB shell.\
    \ Collection objects within MongoDB include a `find()` method that allows fairly\
    \ complex queries to be constructed. Figure [11-1](#A978-1-4842-1329-2_11_Chapter.html#Fig1)\
    \ provides a comparison of a MongoDB query with an equivalent SQL statement.\n\
    \n![A978-1-4842-1329-2_11_Fig1_HTML.jpg](A978-1-4842-1329-2_11_Fig1_HTML.jpg)\n\
    Figure 11-1. Comparison of MongoDB JavaScript query and SQL\n\nNote: The example\
    \ data for MongoDB and Couchbase is based on a port of the MySQL “Sakila” sample\
    \ schema, which describes a database for a DVD rental business. DVD rental businesses\
    \ are largely gone now, but the sample database provides a schema familiar to\
    \ MySQL users. The converted database is available at [http://​bit.​ly/​1LwY9xl](http://bit.ly/1LwY9xl).\n\
    \nQuite complicated queries can be constructed using the `find()` method, but\
    \ for queries that want to aggregate across documents, we need to use the `aggregate()`\
    \ method. The `aggregate()` method implements a logical equivalent of the SQL\
    \ `GROUP BY` clause. Figure [11-2](#A978-1-4842-1329-2_11_Chapter.html#Fig2) compares\
    \ a SQL `GROUP BY` statement with its MongoDB equivalent.\n\n![A978-1-4842-1329-2_11_Fig2_HTML.jpg](A978-1-4842-1329-2_11_Fig2_HTML.jpg)\n\
    Figure 11-2. MongoDB aggregation framework compared with SQL\n\nThe JavaScript-based\
    \ MongoDB shell language is not directly embeddable within other programming languages.\
    \ Historically, MongoDB drivers for various languages implemented interfaces inspired\
    \ by the JavaScript interface, but with significant divergence across languages.\
    \ More recently, a cross-driver specification has been developed that improves\
    \ consistency among the driver implementations for various programming languages.\n\
    \nUsing Java as an example, here is some code that connects to a server and selects\
    \ the “test” collection within the NGDBDemo database:\n\n```java\nMongoClient\
    \ mongoClient = new MongoClient(mongoServer);\nMongoDatabase database = mongoClient.getDatabase(\"\
    NGDBDemo\");\nMongoCollection<Document> collection = database.getCollection(\"\
    test\");\n```\n\nThe following code creates and inserts a new document:\n\n```java\n\
    1.  Document people = new Document();              // A document for a person\n\
    2.  people.put(\"Name\", \"Guy\");\n3.  people.put(\"Email\", \"guy@gmail.com\"\
    );\n4.  BasicDBList friendList = new BasicDBList();    // List of friends\n5.\
    \  BasicDBObject friendDoc = new BasicDBObject(); // A single friend\n6.  friendDoc.put(\"\
    Name\", \"Jo\");\n7.  friendDoc.put(\"Email\", \"Jo@gmail.com\");\n8.  friendList.add(friendDoc);\
    \                     // Add the friend\n9.  friendDoc.clear();\n10. friendDoc.put(\"\
    Name\", \"John\");\n11. friendDoc.put(\"Email\", \"john@gmail.com\");\n12. friendList.add(friendDoc);\
    \                     // Add another friend\n13. people.put(\"Friends\", friendDoc);\n\
    14. collection.insertOne(people);\n```\n\nLine 1 creates an empty document. Lines\
    \ 2 and 3 add some values to the document. In lines 4 through 7, we create a `List`\
    \ structure that represents an array of subdocuments and inserts the first document\
    \ into that array. Lines 9 through 13 insert a second subdocument to the list.\
    \ Line 14 inserts the new document (which includes two embedded friend documents)\
    \ into MongoDB.\n\nThis programming pattern reflects the underlying structure\
    \ of JSON documents as described in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html):\
    \ JSON documents are composed of arbitrarily nested objects, values, and arrays.\
    \ The MongoDB interface requires that we build these programmatically, although\
    \ there are several utility classes available independently that allow Java objects\
    \ to be converted to and from JSON documents.\n\nCollection objects in the Java\
    \ driver support a `find()` method that, although not syntactically identical\
    \ with the JavaScript version, allows us to execute the same operations that we\
    \ can perform in the JavaScript shell:\n\n```java\nDocument myDoc = collection.find(eq(\"\
    Name\", \"Guy\")).first();\nSystem.out.println(myDoc.toJson());\n```\n\nThe API\
    \ provides scrollable cursors that allow us to navigate through a result set or\
    \ an entire collection. This example iterates through all the documents in a collection:\n\
    \n```java\nMongoCursor<Document> cursor = collection.find().iterator();\ntry {\n\
    \    while(cursor.hasNext()) {\n        System.out.println(cursor.next().toJson());\n\
    \    }\n} finally {\n    cursor.close();\n}\n```\n\nA more compact alternative\
    \ fetch loop could be framed like this:\n\n```java\nfor (Document cur : collection.find())\
    \ {\n    System.out.println(cur.toJson());\n}\n```"
  raw: '### MongoDB


    The APIs we’ve seen in Riak and HBase are not overly complex when compared to
    popular development frameworks like spring or J2EE. However, for the casual user—especially
    one not proficient in programming—they are virtually inaccessible. The languages
    require that you explicitly navigate to the desired values and do not provide
    any direct support for complex queries.


    MongoDB goes some of the way toward addressing these restrictions by providing
    a rich query language implemented in JavaScript, and exposed through the MongoDB
    shell. Collection objects within MongoDB include a `find()` method that allows
    fairly complex queries to be constructed. Figure [11-1](#A978-1-4842-1329-2_11_Chapter.html#Fig1)
    provides a comparison of a MongoDB query with an equivalent SQL statement.


    ![A978-1-4842-1329-2_11_Fig1_HTML.jpg](A978-1-4842-1329-2_11_Fig1_HTML.jpg)


    Figure 11-1.


    Comparison of MongoDB JavaScript query and SQL Note


    The example data for MongoDB and Couchbase is based on a port of the MySQL “Sakila”
    sample schema, which describes a database for a DVD rental business. DVD rental
    businesses are largely gone now, but the sample database provides a schema familiar
    to MySQL users. The converted database is available at [http://​bit.​ly/​1LwY9xl](http://bit.ly/1LwY9xl).


    Quite complicated queries can be constructed using the `find()` method, but for
    queries that want to aggregate across documents, we need to use the `aggregate()`
    method. The `aggregate()` method implements a logical equivalent of the SQL GROUP
    BY clause. Figure [11-2](#A978-1-4842-1329-2_11_Chapter.html#Fig2) compares a
    SQL GROUP BY statement with its MongoDB equivalent.


    ![A978-1-4842-1329-2_11_Fig2_HTML.jpg](A978-1-4842-1329-2_11_Fig2_HTML.jpg)


    Figure 11-2.


    MongoDB aggregation framework compared with SQL


    The JavaScript-based MongoDB shell language is not directly embeddable within
    other programming languages. Historically, MongoDB drivers for various languages
    implemented interfaces inspired by the JavaScript interface, but with significant
    divergence across languages. More recently, a cross-driver specification has been
    developed that improves consistency among the driver implementations for various
    programming languages.


    Using Java as an example, here is some code that connects to a server and selects
    the “test” collection within the NGDBDemo database:


    `MongoClient mongoClient =` `new` `MongoClient(mongoServer);`


    `MongoDatabase database = mongoClient.getDatabase("NGDBDemo");`


    `MongoCollection<Document> collection = database.getCollection("test");`


    The following code creates and inserts a new document:


    `1.  Document people =` `new` Document();              // A document for a person


    `2.  people.put("Name", "Guy");`


    `3.  people.put("Email", "guy@gmail.com");`


    `4.  BasicDBList friendList =` `new` BasicDBList();    // List of friends


    `5.  BasicDBObject friendDoc =` `new` BasicDBObject(); // A single friend


    `6.  friendDoc.put("Name", "Jo");`


    `7.  friendDoc.put("Email", "Jo@gmail.com");`


    `8.  friendList.add(friendDoc);                     // Add the friend`


    `9.  friendDoc.clear();`


    `10.  friendDoc.put("Name", "John");`


    `11.  friendDoc.put("Email", "john@gmail.com");`


    `12.  friendList.add(friendDoc);                    // Add another friend`


    `13.  people.put("Friends", friendDoc);`


    `14.  collection.insertOne(people);`


    Line 1 creates an empty document. Lines 2 and 3 add some values to the document.
    In lines 4 through 7, we create a List structure that represents an array of subdocuments
    and inserts the first document into that array. Lines 9 through 13 insert a second
    subdocument to the list. Line 14 inserts the new document (which includes two
    embedded friend documents) into MongoDB.


    This programming pattern reflects the underlying structure of JSON documents as
    described in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html): JSON documents
    are composed of arbitrarily nested objects, values, and arrays. The MongoDB interface
    requires that we build these programmatically, although there are several utility
    classes available independently that allow Java objects to be converted to and
    from JSON documents.


    Collection objects in the Java driver support a `find()` method that, although
    not syntactically identical with the JavaScript version, allows us to execute
    the same operations that we can perform in the JavaScript shell:


    `Document myDoc = collection.find(eq("Name", "Guy")).first();`


    `System.out.println(myDoc.toJson());`


    The API provides scrollable cursors that allow us to navigate through a result
    set or an entire collection. This example iterates through all the documents in
    a collection:


    `MongoCursor<Document> cursor = collection.find().iterator();`


    `try` `{`


    `while``(cursor.hasNext()) {`


    `System.out.println(cursor.next().toJson());`


    `}`


    `}`


    `finally` `{`


    `cursor.close();`


    `}`


    A more compact alternative fetch loop could be framed like this:


    `for` `(Document cur : collection.find()) {`


    `System.out.println(cur.toJson());`


    `}`'
  trans: "\n### MongoDB\n\n与 Spring 或 J2EE 等流行的开发框架相比，我们在 Riak 和 HBase 中看到的 API 并非过于复杂。然而，对于普通用户——尤其是编程不熟练的用户来说，它们几乎无法使用。这些语言要求你显式地导航到所需的值，并且不为复杂查询提供任何直接支持。\n\
    \nMongoDB 通过提供一种用 JavaScript 实现并通过 MongoDB shell 公开的丰富查询语言，在一定程度上解决了这些限制。MongoDB\
    \ 中的集合对象包含一个`find()`方法，该方法允许构建相当复杂的查询。图 11-1 比较了 MongoDB 查询与等效的 SQL 语句。\n\n![A978-1-4842-1329-2_11_Fig1_HTML.jpg](img/A978-1-4842-1329-2_11_Fig1_HTML.jpg)\n\
    图 11-1. MongoDB JavaScript 查询与 SQL 的比较\n\n注：MongoDB 和 Couchbase 的示例数据基于 MySQL“Sakila”示例模式的一个移植版本，该模式描述了一个\
    \ DVD 租赁业务的数据库。如今 DVD 租赁业务已基本消失，但该示例数据库为 MySQL 用户提供了一个熟悉的模式。转换后的数据库可在 [`​bit.​ly/​1LwY9xl`](http://bit.ly/1LwY9xl)\
    \ 获取。\n\n使用`find()`方法可以构建相当复杂的查询，但对于需要跨文档聚合的查询，我们需要使用`aggregate()`方法。`aggregate()`方法实现了与\
    \ SQL `GROUP BY`子句逻辑等效的功能。图 11-2 比较了 SQL `GROUP BY`语句与其 MongoDB 等效语句。\n\n![A978-1-4842-1329-2_11_Fig2_HTML.jpg](img/A978-1-4842-1329-2_11_Fig2_HTML.jpg)\n\
    图 11-2. MongoDB 聚合框架与 SQL 的比较\n\n基于 JavaScript 的 MongoDB shell 语言无法直接嵌入其他编程语言中。历史上，针对各种语言的\
    \ MongoDB 驱动程序实现了受 JavaScript 接口启发的接口，但在不同语言之间存在显著差异。最近，开发了一个跨驱动程序规范，该规范提高了各种编程语言驱动程序实现之间的一致性。\n\
    \n以 Java 为例，以下是一些连接到服务器并选择 NGDBDemo 数据库内“test”集合的代码：\n\n```java\nMongoClient mongoClient\
    \ = new MongoClient(mongoServer);\nMongoDatabase database = mongoClient.getDatabase(\"\
    NGDBDemo\");\nMongoCollection<Document> collection = database.getCollection(\"\
    test\");\n```\n\n以下代码创建并插入一个新文档：\n\n```java\n1.  Document people = new Document();\
    \              // 一个人的文档\n2.  people.put(\"Name\", \"Guy\");\n3.  people.put(\"\
    Email\", \"guy@gmail.com\");\n4.  BasicDBList friendList = new BasicDBList();\
    \    // 好友列表\n5.  BasicDBObject friendDoc = new BasicDBObject(); // 一个好友\n6. \
    \ friendDoc.put(\"Name\", \"Jo\");\n7.  friendDoc.put(\"Email\", \"Jo@gmail.com\"\
    );\n8.  friendList.add(friendDoc);                     // 添加该好友\n9.  friendDoc.clear();\n\
    10. friendDoc.put(\"Name\", \"John\");\n11. friendDoc.put(\"Email\", \"john@gmail.com\"\
    );\n12. friendList.add(friendDoc);                     // 添加另一个好友\n13. people.put(\"\
    Friends\", friendDoc);\n14. collection.insertOne(people);\n```\n\n第 1 行创建一个空文档。第\
    \ 2 和第 3 行向文档添加一些值。在第 4 至第 7 行，我们创建了一个表示子文档数组的`List`结构，并将第一个文档插入该数组。第 9 至第 13\
    \ 行将第二个子文档插入列表。第 14 行将新文档（其中包含两个嵌入的好友文档）插入 MongoDB。\n\n这种编程模式反映了第 10 章中描述的 JSON\
    \ 文档的基本结构：JSON 文档由任意嵌套的对象、值和数组组成。MongoDB 接口要求我们以编程方式构建这些结构，尽管有几种独立的实用工具类可用，允许在\
    \ Java 对象和 JSON 文档之间进行转换。\n\nJava 驱动程序中的集合对象支持一个`find()`方法，虽然语法上与 JavaScript 版本不完全相同，但它允许我们执行与在\
    \ JavaScript shell 中相同的 操作：\n\n```java\nDocument myDoc = collection.find(eq(\"\
    Name\", \"Guy\")).first();\nSystem.out.println(myDoc.toJson());\n```\n\n该 API\
    \ 提供了可滚动的游标，允许我们遍历结果集或整个集合。此示例遍历集合中的所有文档：\n\n```java\nMongoCursor<Document> cursor\
    \ = collection.find().iterator();\ntry {\n    while(cursor.hasNext()) {\n    \
    \    System.out.println(cursor.next().toJson());\n    }\n} finally {\n    cursor.close();\n\
    }\n```\n\n一个更紧凑的替代获取循环可以这样构建：\n\n```java\nfor (Document cur : collection.find())\
    \ {\n    System.out.println(cur.toJson());\n}\n```\n"
- fmt: "### Cassandra Query Language (CQL)\n\nCassandra’s underlying data structures\
    \ are based on Google’s BigTable model, which would lead us to expect an API syntactically\
    \ similar to that of the HBase API. Indeed, the early thrift-based Cassandra APIs\
    \ were easily as complex as the HBase programming API; arguably even more so since\
    \ Cassandra had implemented a “SuperColumn” structure that extended the range\
    \ of possible column family configurations, but which was hard to conceptualize\
    \ and program against.\n\nIn version 0.8, the Cassandra team made a decisive shift\
    \ from an API-centric interface to a language-based interface, inspired by SQL:\
    \ the Cassandra Query Language (CQL). CQL uses familiar SQL idioms for data definition,\
    \ manipulation, and query tasks, and is now the preferred method for interacting\
    \ with Cassandra databases from query tools or within programs.\n\n#### CQL as\
    \ an Abstraction and Interface\n\nCQL provides Cassandra with an interactive ad\
    \ hoc query capability through the `cqlsh` program. It also simplifies programming\
    \ tasks by allowing for more succinct and comprehensible data manipulation code,\
    \ which looks familiar to those who have coded in SQL-based interfaces such as\
    \ JDBC.\n\nBut perhaps most significantly and most controversially, Cassandra\
    \ CQL abstracts the underlying wide column BigTable-style data model in favor\
    \ of a more relational-like tabular scheme. We discussed this in detail in Chapter\
    \ [10](#A978-1-4842-1329-2_10_Chapter.html) and won’t repeat that discussion here:\
    \ see in particular, Figure [10-7](#A978-1-4842-1329-2_10_Chapter.html#Fig7) for\
    \ a comparison of the Cassandra CQL representation of data compared with the underlying\
    \ wide column structure.\n\nThe best—and maybe also the worst—thing about this\
    \ CQL abstraction is that users can interact with Cassandra without understanding\
    \ the nuances of the wide column data model. However, although you can write functional\
    \ Cassandra CQL without understanding the underlying Cassandra data model, the\
    \ best results will be attained if you do understand how the two relate.\n\n####\
    \ Wide Column Structure in CQL\n\nWide column structures in CQL are defined by\
    \ using composite primary keys, where the first part of the key defines the partitioning\
    \ (e.g., the rowkey), and the second part of the key defines the clustering columns.\
    \ Clustering column values become the dynamic column names in the wide column\
    \ family.\n\nThe CQL statements that follow—executed in the `cqlsh` shell—define\
    \ and populate a Cassandra table roughly equivalent to the HBase table we created\
    \ earlier in this chapter:\n\n```sql\ncqlsh:guy> CREATE TABLE friends\n   ...\
    \ (name text,\n   ...  friend_name text,\n   ...  friend_email text,\n   ... \
    \ PRIMARY KEY(name,friend_name));\n\ncqlsh:guy> INSERT INTO friends (name,friend_name,friend_email)\n\
    \   ... VALUES('Guy','Jo','Jo@gmail.com');\n\ncqlsh:guy> INSERT INTO friends (name,friend_name,friend_email)\n\
    \   ... VALUES('Guy','Chris','Chris@gmail.com');\n\ncqlsh:guy> INSERT INTO friends\
    \ (name,friend_name,friend_email)\n   ... VALUES('Guy','John','John@gmail.com');\n\
    ```\n\nFamiliar SQL-like constructs allow us to perform updates and deletes, create\
    \ indexes, or issue queries.\n\n#### Limitations and Rationale\n\nHowever, the\
    \ CQL `SELECT` statement has limited capabilities when compared to standard SQL:\
    \ in particular, joins and aggregate (`GROUP BY`) operations are not supported.\
    \ Furthermore, `WHERE` clauses and `ORDER BY` clauses are severely restricted.\
    \ Ordering and range queries are limited to clustering columns within a specific\
    \ partition key.\n\nThese limitations seem confusing if you think of CQL tables\
    \ as relational structures. But if you remember that the first part of the key\
    \ is actually a rowkey that is consistently hashed across the cluster, then the\
    \ limitation seems more reasonable. Cassandra is unable to effectively perform\
    \ a range scan across rowkey values that are hashed across the entire cluster.\
    \ Nor is it possible to access the partition columns without accessing a specific\
    \ row, since every row could have entirely distinct column values.\n\nSo this\
    \ `ORDER BY` clause cannot be supported:\n\n```sql\ncqlsh:guy> SELECT * FROM friends\
    \ ORDER BY name;\nSInvalidRequest: code=2200 [Invalid query] message=\"ORDER BY\
    \ is only supported when the partition key is restricted by an EQ or an IN.\"\n\
    ```\n\nBut this is legal:\n\n```sql\ncqlsh:guy> SELECT * FROM friends WHERE name\
    \ = 'Guy'\n   ... ORDER BY friend_name;\n\n name | friend_name | friend_email\n\
    ------+-------------+-----------------\n Guy |        Chris | Chris@gmail.com\n\
    \ Guy |           Jo |    Jo@gmail.com\n Guy |         John |  John@gmail.com\n\
    ```\n\nA similar restriction prevents range operations on the partition key:\n\
    \n```sql\ncqlsh:guy> SELECT * FROM friends WHERE name > 'Guy'  ;\nInvalidRequest:\
    \ code=2200 [Invalid query] message=\"Only EQ and IN relation are supported on\
    \ the partition key (unless you use the token() function)\"\n```\n\nBut allows\
    \ a range query on the clustering key, provided the partition key is also specified:\n\
    \n```sql\ncqlsh:guy> SELECT * FROM friends\n   ... WHERE name='Guy' AND friend_name\
    \ > 'Guy';\n\n name | friend_name | friend_email\n------+-------------+----------------\n\
    \ Guy |           Jo |   Jo@gmail.com\n Guy |         John | John@gmail.com\n\
    ```\n\n#### Using CQL in Java (JDBC-like) Applications\n\nCQL is used within Java\
    \ programs or other languages using a driver syntax that is similar to JDBC: CQL\
    \ statements are passed as strings to methods that submit the CQL to the server\
    \ and return result sets or return codes.\n\nThe following Java code connects\
    \ to a Cassandra server and specifies a keyspace (lines 1-3), submits a CQL query\
    \ (lines 5-6) and iterates through the results (lines 8-11):\n\n```java\n1.  String\
    \ myServer=args[0];\n2.  Cluster cluster = Cluster.builder().addContactPoint(myServer).build();\n\
    3.  Session myKeySpace = cluster.connect(\"guy\");\n4.\n5.  String cqlString =\
    \ \"SELECT * FROM friends where name='Guy'\";\n6.  ResultSet myResults = myKeySpace.execute(cqlString);\n\
    7.\n8.  for (Row row : myResults.all()) {\n9.        System.out.println(row.getString(0)\
    \ +\" \"+\n10.           row.getString(1) + \" \" + row.getString(2));\n11.  }\n\
    ```\n\nIf we don’t know the structure of the result set in advance, then there\
    \ is a metadata interface that allows us to extract column names and data types:\n\
    \n```java\nList<Definition> colDefs = myResults.getColumnDefinitions().asList();\n\
    System.out.println(\"Column count=\" + colDefs.size());\nSystem.out.println(\"\
    Column Names:\");\nfor (Definition colDef : colDefs) {\n   System.out.println(colDef.getName());\n\
    }\n```"
  raw: '### Cassandra Query Language (CQL)


    Cassandra’s underlying data structures are based on Google’s BigTable model, which
    would lead us to expect an API syntactically similar to that of the HBase API.
    Indeed, the early thrift-based Cassandra APIs were easily as complex as the HBase
    programming API; arguably even more so since Cassandra had implemented a “SuperColumn”
    structure that extended the range of possible column family configurations, but
    which was hard to conceptualize and program against.


    In version 0.8, the Cassandra team made a decisive shift from an API-centric interface
    to a language-based interface, inspired by SQL: the Cassandra Query Language (CQL).
    CQL uses familiar SQL idioms for data definition, manipulation, and query tasks,
    and is now the preferred method for interacting with Cassandra databases from
    query tools or within programs.


    CQL provides Cassandra with an interactive ad hoc query capability through the
    `cqlsh` program. It also simplifies programming tasks by allowing for more succinct
    and comprehensible data manipulation code, which looks familiar to those who have
    coded in SQL-based interfaces such as JDBC.


    But perhaps most significantly and most controversially, Cassandra CQL abstracts
    the underlying wide column BigTable-style data model in favor of a more relational-like
    tabular scheme. We discussed this in detail in in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html)
    and won’t repeat that discussion here: see in particular, Figure [10-7](#A978-1-4842-1329-2_10_Chapter.html#Fig7)
    for a comparison of the Cassandra CQL representation of data compared with the
    underlying wide column structure.


    The best—and maybe also the worst—thing about this CQL abstraction is that users
    can interact with Cassandra without understanding the nuances of the wide column
    data model. However, although you can write functional Cassandra CQL without understanding
    the underlying Cassandra data model, the best results will be attained if you
    do understand how the two relate.


    Wide column structures in CQL are defined by using composite primary keys, where
    the first part of the key defines the partitioning (e.g., the rowkey), and the
    second part of the key defines the clustering columns. Clustering column values
    become the dynamic column names in the wide column family.


    The CQL statements that follow—executed in the `cqlsh` shell—define and populate
    a Cassandra table roughly equivalent to the HBase table we created earlier in
    this chapter:


    `cqlsh:guy` `>` `CREATE TABLE` `friends`


    `...  (name text,`


    `...   friend_name text,`


    `...   friend_email text,`


    `...`   `PRIMARY KEY``(name,friend_name));`


    `cqlsh:guy``>`   `INSERT INTO` `friends (name,friend_name,friend_email)`


    `VALUES``(''Guy'',''Jo'',''Jo@gmail.com'');`


    `cqlsh:guy``>`   `INSERT INTO` `friends (name,friend_name,friend_email)`


    `VALUES``(''Guy'',''Chris'',''Chris@gmail.com'');`


    `cqlsh:guy``>`   `INSERT INTO` `friends (name,friend_name,friend_email)`


    `VALUES``(''Guy'',''John'',''John@gmail.com'');`


    Familiar SQL-like constructs allow us to perform updates and deletes, create indexes,
    or issue queries.


    However, the CQL SELECT statement has limited capabilities when compared to standard
    SQL: in particular, joins and aggregate (GROUP BY) operations are not supported.
    Furthermore, WHERE clauses and ORDER BY clauses are severely restricted. Ordering
    and range queries are limited to clustering columns within a specific partition
    key.


    These limitations seem confusing if you think of CQL tables as relational structures.
    But if you remember that the first part of the key is actually a rowkey that is
    consistently hashed across the cluster, then the limitation seems more reasonable.
    Cassandra is unable to effectively perform a range scan across rowkey values that
    are hashed across the entire cluster. Nor is it possible to access the partition
    columns without accessing a specific row, since every row could have entirely
    distinct column values.


    So this ORDER BY clause cannot be supported:


    `cqlsh:guy` `>` `SELECT` `*` `FROM` `friends` `ORDER BY` `name;`


    `SInvalidRequest` `: code=2200 [Invalid query] message="ORDER BY is only supported
    when the partition key is restricted by an EQ or an IN."`


    But this is legal:


    `cqlsh:guy` `>` `SELECT` `*` `FROM` `friends` `WHERE` `name = ''Guy''`


    `ORDER BY` `friend_name;`


    `name` `|` `friend_name` `|` `friend_email`


    `------+-------------+-----------------`


    `Guy |       Chris | Chris@gmail.com`


    `Guy |          Jo |    Jo@gmail.com`


    `Guy |        John |  John@gmail.com`


    A similar restriction prevents range operations on the partition key:


    `cqlsh:guy` `>` `SELECT` `*` `FROM` `friends` `WHERE` `name > ''Guy''  ;`


    `InvalidRequest` `: code=2200 [Invalid query] message="Only EQ and IN relation
    are supported on the partition key (unless you use the token() function)"`


    But allows a range query on the clustering key, provided the partition key is
    also specified:


    `cqlsh:guy` `>` `SELECT` `*` `FROM` `friends`


    `WHERE` `name=''Guy''` `AND` `friend_name > ''Guy'';`


    `name` `|` `friend_name` `|` `friend_email`


    `------+-------------+----------------`


    `Guy |          Jo |   Jo@gmail.com`


    `Guy |        John | John@gmail.com`


    CQL is used within Java programs or other languages using a driver syntax that
    is similar to JDBC: CQL statements are passed as strings to methods that submit
    the CQL to the server and return result sets or return codes.


    The following Java code connects to a Cassandra server and specifies a keyspace
    (lines 1-3), submits a CQL query (lines 5-6) and iterates through the results
    (lines 8-11):


    `1.  String myServer=args[0];`


    `2.  Cluster cluster = Cluster.builder().addContactPoint(myServer).build();`


    `3.  Session myKeySpace = cluster.connect("guy");`


    `4.`


    `5.  String cqlString = "SELECT * FROM friends where name=''Guy''";`


    `6.  ResultSet myResults = myKeySpace.execute(cqlString);`


    `7.`


    `8.` `for` (Row row : myResults.all()) {


    `9.        System.out.println(row.getString(0) +" "+`


    `10.  row.getString(1) + " " + row.getString(2));`


    `11.  }`


    If we don’t know the structure of the result set in advance, then there is a metadata
    interface that allows us to extract column names and data types:


    `List<Definition> colDefs = myResults.getColumnDefinitions().asList();`


    `System.out.println("Column count=" + colDefs.size());`


    `System.out.println("Column Names:");`


    `for` `(Definition colDef : colDefs) {`


    `System.out.println(colDef.getName());`


    `}`'
  trans: "### Cassandra 查询语言 (CQL)\n\nCassandra 的底层数据结构基于 Google 的 BigTable 模型，这让我们预期其\
    \ API 在语法上会与 HBase API 类似。确实，早期基于 Thrift 的 Cassandra API 复杂程度不亚于 HBase 编程 API；甚至可以说更复杂，因为\
    \ Cassandra 实现了一种“超级列”结构，扩展了可能的列族配置范围，但这使得其概念化和编程变得困难。\n\n在 0.8 版本中，Cassandra\
    \ 团队果断地从以 API 为中心的接口转向了受 SQL 启发的、基于语言的接口：Cassandra 查询语言 (CQL)。CQL 使用熟悉的 SQL 惯用语法来进行数据定义、操作和查询任务，现在它是通过查询工具或在程序中与\
    \ Cassandra 数据库交互的首选方法。\n\n#### CQL 作为抽象层与接口\n\nCQL 通过 `cqlsh` 程序为 Cassandra 提供了交互式的即席查询能力。它还通过允许更简洁、更易懂的数据操作代码来简化编程任务，这些代码对于那些曾在基于\
    \ SQL 的接口（如 JDBC）中编写过代码的人来说看起来很熟悉。\n\n但或许最重要也最具争议的是，Cassandra CQL 抽象了底层的宽列 BigTable\
    \ 风格数据模型，转而采用一种更类似关系的表格式方案。我们在第 10 章详细讨论过这一点，此处不再重复：特别是参见图 10-7，对比了 Cassandra\
    \ CQL 的数据表示与底层宽列结构。\n\n关于 CQL 抽象最好——也许也是最坏——的一点是，用户无需理解宽列数据模型的细微差别即可与 Cassandra\
    \ 交互。然而，尽管你可以在不理解底层 Cassandra 数据模型的情况下编写功能性的 Cassandra CQL，但如果理解了两者如何关联，将会获得最佳结果。\n\
    \n#### CQL 中的宽列结构\n\nCQL 中的宽列结构通过使用复合主键来定义，其中键的第一部分定义了分区（例如，rowkey），第二部分定义了聚簇列。聚簇列的值成为宽列族中的动态列名。\n\
    \n下面的 CQL 语句（在 `cqlsh` shell 中执行）定义并填充了一个 Cassandra 表，该表大致等同于我们在本章前面创建的 HBase\
    \ 表：\n\n```sql\ncqlsh:guy> CREATE TABLE friends\n   ... (name text,\n   ...  friend_name\
    \ text,\n   ...  friend_email text,\n   ...  PRIMARY KEY(name,friend_name));\n\
    \ncqlsh:guy> INSERT INTO friends (name,friend_name,friend_email)\n   ... VALUES('Guy','Jo','Jo@gmail.com');\n\
    \ncqlsh:guy> INSERT INTO friends (name,friend_name,friend_email)\n   ... VALUES('Guy','Chris','Chris@gmail.com');\n\
    \ncqlsh:guy> INSERT INTO friends (name,friend_name,friend_email)\n   ... VALUES('Guy','John','John@gmail.com');\n\
    ```\n\n熟悉的类 SQL 结构允许我们执行更新和删除、创建索引或发出查询。\n\n#### 局限性与设计原理\n\n然而，与标准 SQL 相比，CQL\
    \ 的 `SELECT` 语句功能有限：特别是，不支持连接（joins）和聚合（`GROUP BY`）操作。此外，`WHERE` 子句和 `ORDER BY`\
    \ 子句受到严重限制。排序和范围查询仅限于特定分区键内的聚簇列。\n\n如果你将 CQL 表视为关系结构，这些限制似乎令人困惑。但如果你记住键的第一部分实际上是一个在整个集群中被一致哈希的\
    \ rowkey，那么这个限制就显得更合理了。Cassandra 无法有效地对哈希分布在整个集群的 rowkey 值执行范围扫描。也不可能在不访问特定行的情况下访问分区列，因为每一行的列值都可能完全不同。\n\
    \n因此，不支持这个 `ORDER BY` 子句：\n\n```sql\ncqlsh:guy> SELECT * FROM friends ORDER BY\
    \ name;\nSInvalidRequest: code=2200 [Invalid query] message=\"ORDER BY is only\
    \ supported when the partition key is restricted by an EQ or an IN.\"\n```\n\n\
    但这个是合法的：\n\n```sql\ncqlsh:guy> SELECT * FROM friends WHERE name = 'Guy'\n   ...\
    \ ORDER BY friend_name;\n\n name | friend_name | friend_email\n------+-------------+-----------------\n\
    \ Guy |        Chris | Chris@gmail.com\n Guy |           Jo |    Jo@gmail.com\n\
    \ Guy |         John |  John@gmail.com\n```\n\n类似的限制阻止了对分区键进行范围操作：\n\n```sql\n\
    cqlsh:guy> SELECT * FROM friends WHERE name > 'Guy'  ;\nInvalidRequest: code=2200\
    \ [Invalid query] message=\"Only EQ and IN relation are supported on the partition\
    \ key (unless you use the token() function)\"\n```\n\n但允许在指定分区键的前提下对聚簇键进行范围查询：\n\
    \n```sql\ncqlsh:guy> SELECT * FROM friends\n   ... WHERE name='Guy' AND friend_name\
    \ > 'Guy';\n\n name | friend_name | friend_email\n------+-------------+----------------\n\
    \ Guy |           Jo |   Jo@gmail.com\n Guy |         John | John@gmail.com\n\
    ```\n\n#### 在 Java (JDBC 类) 应用程序中使用 CQL\n\nCQL 在 Java 程序或其他语言中通过类似于 JDBC 的驱动语法使用：CQL\
    \ 语句作为字符串传递给将 CQL 提交到服务器并返回结果集或返回码的方法。\n\n以下 Java 代码连接到一个 Cassandra 服务器并指定一个键空间（第\
    \ 1-3 行），提交一个 CQL 查询（第 5-6 行）并遍历结果（第 8-11 行）：\n\n```java\n1.  String myServer=args[0];\n\
    2.  Cluster cluster = Cluster.builder().addContactPoint(myServer).build();\n3.\
    \  Session myKeySpace = cluster.connect(\"guy\");\n4.\n5.  String cqlString =\
    \ \"SELECT * FROM friends where name='Guy'\";\n6.  ResultSet myResults = myKeySpace.execute(cqlString);\n\
    7.\n8.  for (Row row : myResults.all()) {\n9.        System.out.println(row.getString(0)\
    \ +\" \"+\n10.           row.getString(1) + \" \" + row.getString(2));\n11.  }\n\
    ```\n\n如果我们事先不知道结果集的结构，那么有一个元数据接口可以让我们提取列名和数据类型：\n\n```java\nList<Definition>\
    \ colDefs = myResults.getColumnDefinitions().asList();\nSystem.out.println(\"\
    Column count=\" + colDefs.size());\nSystem.out.println(\"Column Names:\");\nfor\
    \ (Definition colDef : colDefs) {\n   System.out.println(colDef.getName());\n\
    }\n```"
- fmt: "## MapReduce\n\n早期的 NoSQL 系统提供的 `put` 和 `get` 方法只支持逐记录处理，这给需要对数据执行哪怕简单分析的应用程序带来了沉重的编程负担。谷歌的\
    \ MapReduce 算法——首次发表于 2004 年——为在分布式系统上并行化计算提供了一个解决方案，并且它不仅被受谷歌技术栈启发的系统（如 Hadoop\
    \ 和 HBase），也被许多早期的 NoSQL 系统（如 CouchDB 和 MongoDB）广泛采用。\n\nMapReduce 的典型例子由 WordCount\
    \ ([https://wiki.apache.org/hadoop/WordCount](https://wiki.apache.org/hadoop/WordCount))\
    \ 程序提供，它代表了几乎最简单的 MapReduce 示例。我们在图 2-4 中展示了 WordCount 的图示表示。\n\n在 WordCount 示例中，map\
    \ 阶段使用分词器将输入分解为单词，然后为每个单词赋值 1：\n\n```\npublic static class Map\n    extends Mapper<LongWritable,\
    \ Text, Text, IntWritable> {\n    private final static IntWritable one = new IntWritable(1);\n\
    \    private Text word = new Text();\n\n    public void map(LongWritable key,\
    \ Text value, Context context)\n        throws IOException, InterruptedException\
    \ {\n        String line = value.toString();\n        StringTokenizer tokenizer\
    \ = new StringTokenizer(line);\n        while(tokenizer.hasMoreTokens()) {\n \
    \           word.set(tokenizer.nextToken());\n            context.write(word,\
    \ one);\n        }\n    }\n}\n```\n\nreducer 类接收这些名称:值对（其中值始终为 1），并计算每个单词的计数总和：\n\
    \n```\npublic static class Reduce\n    extends Reducer<Text, IntWritable, Text,\
    \ IntWritable> {\n    public void reduce(Text key, Iterable<IntWritable> values,\n\
    \        Context context)\n        throws IOException, InterruptedException {\n\
    \        int sum = 0;\n        for (IntWritable val : values) {\n            sum\
    \ += val.get();\n        }\n        context.write(key, new IntWritable(sum));\n\
    \    }\n}\n```\n\nMapReduce 作业由主代码调用，该代码定义输入输出类型及文件、指定 map 和 reducer 类并调用作业：\n\
    \n```\nJob job  = Job .getInstance(conf, \"wordcount\");\njob.setOutputKeyClass(Text.class);\n\
    job.setOutputValueClass(IntWritable.class);\njob.setMapperClass(Map.class);\n\
    job.setReducerClass(Reduce.class);\njob.setInputFormatClass(TextInputFormat.class);\n\
    job.setOutputFormatClass(TextOutputFormat.class);\nFileInputFormat.addInputPath(job,\
    \ new Path(args[0]));\nFileOutputFormat.setOutputPath(job, new Path(args[1]));\n\
    job.waitForCompletion(true);\n```\n\n在 Java 中编写 MapReduce 代码有些繁琐，并且涉及大量模板代码。许多替代的实现要简单得多。例如，这是使用\
    \ MongoDB 的 JavaScript MapReduce 框架实现的 WordCount 算法：\n\n```\ndb.films.mapReduce(\n\
    \    /* Map    */ function() {emit (this.Category,1);},\n    /* Reduce */ function(key,values)\
    \ {return Array.sum(values)} ,\n    { out: \"MovieRatings\"  }\n)\n```\n\n这段 JavaScript\
    \ 从 `films` 集合中读取数据，对每个电影的类别进行词频统计，结果输出到集合 \"MovieRatings\"：\n\n```\n> db.MovieRatings.find();\n\
    { \"_id\" : \"Action\", \"value\" : 64 }\n{ \"_id\" : \"Animation\", \"value\"\
    \ : 66 }\n{ \"_id\" : \"Children\", \"value\" : 60 }\n{ \"_id\" : \"Classics\"\
    , \"value\" : 57 }\n{ \"_id\" : \"Comedy\", \"value\" : 58 }\n```\n\nMapReduce\
    \ 是一种灵活的编程范式，能够适应广泛的数据处理算法。然而，对于给定问题，它很少是最高效的算法，并且通常不是对程序员来说最有效率的方法。因此，出现了许多提供替代编程和处理范式的框架。\n\
    \n## Pig\n\n人们很早就意识到，如果常见的操作需要精通复杂 MapReduce 编程的高级 Java 程序员，那么 Hadoop 的全部潜力就无法被释放。正如我们将在本章后面看到的，Facebook\
    \ 开发 Hive（最初的 SQL on Hadoop）是朝着解决这个问题迈出的重要一步。而在雅虎，Hadoop 团队认为 SQL 范式无法涵盖足够广泛的\
    \ MapReduce 编程任务类别。因此，雅虎着手创建一种既能最大化生产力，又能支持复杂过程化数据流的语言。其结果就是 Pig。\n\nPig 在表面上类似于\
    \ Perl 或 Python 等脚本语言，因为它提供灵活的语法和动态类型的变量。但 Pig 实际上实现了一种相当独特的编程范式；它最好被描述为一种数据流语言。Pig\
    \ 语句通常表示数据操作，大致类似于 SQL 中的各个操作符——加载 (`load`)、排序 (`sort`)、连接 (`join`)、分组 (`group`)、聚合\
    \ (`aggregate`) 等。通常，每个 Pig 语句接受一个或多个数据集作为输入，并返回一个数据集作为输出。例如，一个 Pig 语句可能接受两个数据集作为输入，并返回连接后的集合作为输出。用户可以通过基于\
    \ Java 的用户定义函数 (`UDF`) 机制添加自己的操作。\n\n对于熟悉 SQL 编程的人来说，在 Pig 中编程将编程模型完全颠倒。SQL 是一种非过程化语言：你指定你想要的数据，而不是概述要执行的事件序列。相比之下，\
    \ Pig 是显式过程化的：数据操作的精确序列在你的 Pig 代码中指定。对于 SQL 专家来说，它更像是 SQL 语句的执行计划，而不是 SQL 语句本身。\n\
    \nSQL 编译器和 Hive 的 HQL 编译器包含优化器，试图确定解决 SQL 请求的最有效方法。Pig 不太依赖此类优化器，因为执行计划是显式的。正如\
    \ Pig 专家们喜欢说的：“Pig 使用的是你头脑中的优化器。”\n\n以下是无处不在的词频统计在 Pig 中的实现：\n\n```\nfile= load\
    \ 'some file';\nb = foreach file generate flatten (TOKENIZE((chararray)$0)) as\
    \ word;\nc = group b by word;\nd = foreach c generate COUNT(b), group;\nstore\
    \ d into 'pig_wordcount';\n```\n\nPig 可用于执行复杂的工作流并提供类似于 SQL 的即席查询能力。例如，图 11-3\
    \ 所示的示例执行连接、过滤和聚合，以提供亚洲地区客户的摘要。图 11-3 也包含了一个可比的 SQL 语句。\n\n![A978-1-4842-1329-2_11_Fig3_HTML.jpg](A978-1-4842-1329-2_11_Fig3_HTML.jpg)\n\
    \n图 11-3.\n\nPig 与 SQL 对比\n\n尽管 Pig 能够表达几乎所有可以用 SQL 语法表达的数据查询，但它也能执行更复杂的数据流，而这些在关系数据库管理系统\
    \ (`RDBMS`) 中需要多个 SQL 语句与过程化代码串联起来才能完成。\n\n然而，尽管 Pig 比 SQL 更灵活，但它不是一种图灵完备的编程语言：它缺乏完整通用编程解决方案所需的控制结构。不过，Pig\
    \ 可以嵌入到 Python 和其他语言中。"
  raw: '### MapReduce


    The put and get methods provided by early NoSQL systems support only record-at-a-time
    processing and place a heavy programming burden on an application that needs to
    perform even simple analytics on the data. Google’s MapReduce algorithm—first
    published in 2004—provided a solution for parallelizing computation across a distributed
    system, and it has been widely adopted not just by systems inspired by the Google
    stack, such as Hadoop and HBase, but also by many early NoSQL systems, such as
    CouchDB and MongoDB.


    The canonical example of MapReduce is provided by the WordCount ([https://​wiki.​apache.​org/​hadoop/​WordCount](https://wiki.apache.org/hadoop/WordCount)
    ) program, which represents almost the simplest possible MapReduce example. We
    showed a diagrammatic representation of WordCount way back in Figure [2-4](#A978-1-4842-1329-2_2_Chapter.html#Fig4).


    In the WordCount example, the map phase uses a tokenizer to break up the input
    into words, then assigns a value of 1 to each word:


    `public static class` `Map`


    `extends` `Mapper<LongWritable, Text, Text, IntWritable> {`


    `private final static IntWritable one = new IntWritable(1);`


    `private Text word = new Text();`


    `public void` `map(LongWritable key, Text value, Context context)`


    `throws` `IOException, InterruptedException {`


    `String line = value.toString();`


    `StringTokenizer tokenizer =` `new` `StringTokenizer(line);`


    `while``(tokenizer.hasMoreTokens()) {`


    `word.set(tokenizer.nextToken());`


    `context.write(word, one);`


    `}`


    `}`


    `}`


    The reducer class takes these name:value pairs (where the value is always 1) and
    calculates the sum of counts for each word:


    `public static class` `Reduce`


    `extends` `Reducer<Text, IntWritable, Text, IntWritable> {`


    `public void` `reduce(Text key, Iterable<IntWritable> values,`


    `Context context)`


    `throws` `IOException, InterruptedException {`


    `int` `sum = 0;`


    `for` `(IntWritable val : values) {`


    `sum += val.get();`


    `}`


    `context.write(key, new IntWritable(sum));`


    `}`


    `}`


    The MapReduce job is invoked by mainline code that defines input and output types
    and files, specifies the map and reducer classes, and invokes the job:


    `Job job  = Job .getInstance(conf, "wordcount");`


    `job.setOutputKeyClass(Text.class);`


    `job.setOutputValueClass(IntWritable.class);`


    `job.setMapperClass(Map.class);`


    `job.setReducerClass(Reduce.class);`


    `job.setInputFormatClass(TextInputFormat.class);`


    `job.setOutputFormatClass(TextOutputFormat.class);`


    `FileInputFormat.addInputPath(job, new Path(args[0]));`


    `FileOutputFormat.setOutputPath(job, new Path(args[1]));`


    `job.waitForCompletion(true);`


    MapReduce coding in Java is somewhat cumbersome and involves a lot of boilerplate
    coding. Many alternative implementations are much simpler. For instance, here
    is the WordCount algorithm implemented in MongoDB’s JavaScript MapReduce framework:


    `db.films.mapReduce(`


    `/* Map    */` `function``() {emit (this.Category,1);},`


    `/* Reduce */` `function``(key,values) {``return` `Array.sum(values)} ,`


    `{ out: "MovieRatings"  }`


    `)`


    This JavaScript reads from the films collection, and does a word count on the
    categories of each film, which is output to the collection “MovieRatings”:


    `> db.MovieRatings.find();`


    `{ "_id" : "Action", "value" : 64 }`


    `{ "_id" : "Animation", "value" : 66 }`


    `{ "_id" : "Children", "value" : 60 }`


    `{ "_id" : "Classics", "value" : 57 }`


    `{ "_id" : "Comedy", "value" : 58 }`


    MapReduce is a flexible programming paradigm capable of being adapted to a wide
    range of data processing algorithms. However, it is rarely the most efficient
    algorithm for a given problem and is usually not the most programmer-efficient
    approach. Consequently, there have been many frameworks that provide alternative
    programming and processing paradigms.


    ### Pig


    It was early realized that the full potential of Hadoop could not be unlocked
    if commonplace operations required highly skilled Java programmers with experience
    in complex MapReduce programming. As we will see later in this chapter, at Facebook
    the development of Hive—the original SQL on Hadoop—was an important step toward
    finding a solution for this problem. At Yahoo! the Hadoop team felt that the SQL
    paradigm could not address a sufficiently broad category of MapReduce programming
    tasks. Yahoo! therefore set out to create a language that maximized productivity
    but still allowed for complex procedural data flows. The result was Pig.


    Pig superficially resembles scripting languages such as Perl or Python in that
    it offers flexible syntax and dynamically typed variables. But Pig actually implements
    a fairly unique programming paradigm; it is best described as a data flow language.
    Pig statements typically represent data operations roughly analogous to individual
    operators in SQL—load, sort, join, group, aggregate, and so on. Typically, each
    Pig statement accepts one or more datasets as inputs and returns a single dataset
    as an output. For instance, a Pig statement might accept two datasets as inputs
    and return the joined set as an output. Users can add their own operations through
    a Java-based user-defined function (UDF) facility.


    For those familiar with SQL programming, programming in Pig turns the programming
    model upside down. SQL is a nonprocedural language: you specify the data you want
    rather than outline the sequence of events to be executed. In contrast, Pig is
    explicitly procedural: the exact sequence of data operations is specified within
    your Pig code. For SQL gurus, it resembles more the execution plan of a SQL statement
    rather than the SQL statement itself.


    SQL compilers and Hive’s HQL compiler include optimizers that attempt to determine
    the most efficient way to resolve a SQL request. Pig is not heavily reliant on
    such an optimizer, since the execution plan is explicit. As the Pig gurus are
    fond of saying “Pig uses the optimizer between your ears.”


    Here is the ubiquitous word count implemented in Pig:


    `file=` `load` `''some file’;`


    `b =` `foreach` `file` `generate flatten` `(TOKENIZE((chararray)$0)) as word;`


    `c =` `group` `b` `by` `word;`


    `d =` `foreach` `c` `generate` `COUNT(b), group;`


    `store` `d` `into` `''pig_wordcount'';`


    Pig can be used to perform complex workflows and provide an ad hoc query capability
    similar to SQL. For instance, the example shown in Figure [11-3](#A978-1-4842-1329-2_11_Chapter.html#Fig3)
    performs joins, filters, and aggregations to provide a summary of customers in
    the Asian region. Figure [11-3](#A978-1-4842-1329-2_11_Chapter.html#Fig3) also
    includes a comparable SQL statement.


    ![A978-1-4842-1329-2_11_Fig3_HTML.jpg](A978-1-4842-1329-2_11_Fig3_HTML.jpg)


    Figure 11-3.


    Pig compared to SQL


    Although Pig is capable of expressing virtually any data query that can be expressed
    in SQL syntax, it is also capable of performing more complex data flows that would
    require multiple SQL statements chained together with procedural code in an RDBMS.


    Nevertheless, while Pig is more flexible than SQL, it is not a Turing complete
    programming language: it lacks the control structures required for a complete
    general-purpose programming solution. However, Pig can be embedded in Python and
    other languages.'
