- fmt: '# Data Warehousing Schemas


    At the time that Edgar Codd published his seminal paper on the relational database
    model, database workloads were dominated by record-based processing: so-called
    CRUD operations (Create, Read, Update, Delete) were the most time-critical ones,
    while report programs typically iterated through entire tables and were run in
    a background batch mode where query response time was not a critical issue. However,
    during the late 1980s and 1990s, an increasing number of relational databases
    were tasked with supporting analytic and decision support applications that often
    demanded interactive response times. These systems became known as data warehouses,
    and increasingly were operated parallel to the OLTP system that had generated
    the original data. The acronym OLAP (Online Analytic Processing) was coined by
    Edgar Codd to differentiate these workloads from those of OLTP systems.


    Separating OLTP and OLAP workloads was important for maintaining service-level
    response times for the OLTP systems: sudden IO intensive aggregate queries would
    generally cause an unacceptable response-time degradation in the OLTP system.
    But equally important, the OLAP system demanded a different schema from the OLTP
    system.


    Star schemas were developed to create data warehouses in which aggregate queries
    could execute quickly and which would provide a predictable schema for Business
    Intelligence (BI) tools. In a star schema, central large fact tables are associated
    with numerous smaller dimension tables. When the dimension tables implement a
    more complex set of foreign key relationships, then the schema is referred to
    as a snowflake schema.


    Figure 6-1 shows an example of a simplified star schema.


    ![A978-1-4842-1329-2_6_Fig1_HTML.jpg](A978-1-4842-1329-2_6_Fig1_HTML.jpg)


    Figure 6-1. Star schema


    Note: although star schemas are typically found in relational databases, they
    do not represent a fully normalized relational model of data. Both the dimension
    tables and the fact tables usually contain redundant information, or information
    depended only partly on the primary key. In some respects, widespread adoption
    of the star schema was a step away from full compliance with Codd’s relational
    model.


    Almost all data warehouses adopted some variation on the star schema paradigm,
    and almost all relational databases adopted indexing and SQL optimization schemes
    to accelerate queries against star schemas. These optimizations allowed relational
    data warehouses to serve as the foundation for management dashboards and popular
    BI products. However, despite these optimizations, star schema processing in data
    warehouses remained severely CPU and IO intensive. As data volumes grew and user
    demands for interactive response times continued, there was increasing discontent
    with traditional data warehousing performance.


    # The Columnar Alternative


    The idea that it might be better to store data in columnar format dates back to
    the 1970s, although commercial columnar databases did not appear until the mid-1990s.


    The essence of the columnar concept is that data for columns is grouped together
    on disk. Figure 6-2 compares columnar and row-oriented storage for some simple
    data: in a columnar database, values for a specific column become co-located in
    the same disk blocks, while in the row-oriented model, all columns for each row
    are co-located.


    ![A978-1-4842-1329-2_6_Fig2_HTML.jpg](A978-1-4842-1329-2_6_Fig2_HTML.jpg)


    Figure 6-2. Comparison of columnar and row-oriented storage


    There are two big advantages to the columnar architecture. First, in a columnar
    architecture, queries that seek to aggregate the values of specific columns are
    optimized, because all of the values to be aggregated exist within the same disk
    blocks. Figure 6-3 illustrates this phenomenon for our sample database; retrieving
    the sum of salaries from the row store must scan five blocks, while a single block
    access suffices in the column store.


    ![A978-1-4842-1329-2_6_Fig3_HTML.jpg](A978-1-4842-1329-2_6_Fig3_HTML.jpg)


    Figure 6-3. Aggregate operations in columnar stores require fewer IOs


    The exact IO and CPU optimizations delivered by a column architecture vary depending
    on workload, indexing, and schema design. In general, queries that work across
    multiple rows are significantly accelerated in a columnar database.


    ## Columnar Compression


    The second key advantage for the columnar architecture is compression. Compression
    algorithms work primarily by removing redundancy within data values. Data that
    is highly repetitious—especially if those repetitions are localized—achieve higher
    compression ratios than data with low repetition. Although the total amount of
    repetition is the same across the entire database, regardless of row or column
    orientation, compression schemes usually try to work on localized subsets of the
    data; the CPU overhead of compression is far lower if it can work on isolated
    blocks of data. Since in a columnar database the columns are stored together on
    disk, achieving a higher compression ratio is far less computationally expensive.


    Furthermore, in many cases a columnar database will store column data in a sorted
    order. In this case, very high compression ratios can be achieved simply by representing
    each column value as a “delta” from the preceding column value. The result is
    extremely high compression ratios achieved with very low computational overhead.


    ## Columnar Write Penalty


    The key disadvantage of the columnar architecture—and the reason it is a poor
    choice for OLTP databases—is the overhead it imposes on single row operations.
    In a columnar database, retrieving a single row involves assembling the row from
    each of the column stores for that table. Read overhead can be partly reduced
    by caching and multicolumn projections (storing multiple columns together on disk).
    However, when it comes to DML operations—particularly inserts—there is virtually
    no way to avoid having to modify all the columns for each row.


    Figure 6-4 illustrates the insert overhead for a column store on our simple example
    database. The row store need only perform a single IO to insert a new value, while
    the column store must update as many disk blocks as there are columns.


    ![A978-1-4842-1329-2_6_Fig4_HTML.jpg](A978-1-4842-1329-2_6_Fig4_HTML.jpg)


    Figure 6-4. Insert overhead for a column store


    In real-world row stores (e.g., traditional RDBMS), inserts require more than
    a single IO because of indexing overhead, and real-world column stores implement
    mitigating schemes to avoid the severe overhead during single-row modifications.
    However, the fundamental principle—that column stores perform poorly during single-row
    modifications—is valid.'
