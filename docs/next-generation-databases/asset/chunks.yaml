  trans: '# 5. 表格并非友好之选：图数据库


    > 谷歌曾试图衡量人们所思所想，最终自身成为了人们所思所想。Facebook 曾试图绘制社交图谱，最终自身成为了社交图谱。——乔治·戴森，《图灵的大教堂》

    > 无论何时有人给你一个问题，去思考图。——史蒂夫·耶格，《在谷歌找到那份工作》（博客文章）


    键值存储、文档数据库和关系型系统的拥护者们几乎在数据库设计的方方面面都存在分歧，但他们在一个观点上达成了一致：数据库是关于存储“事物”的信息，无论这些事物是由
    `JSON`、`表格`还是二进制值来表示。但有时，我们主要关注的是事物之间的关系，而非事物本身。这正是图数据库系统大放异彩之处。


    图结构对我们来说最熟悉的例子来自诸如 Facebook 这样的社交网络。在 Facebook 中，关于个人的信息固然重要，但正是人与人之间的网络——社交图谱——赋予了该平台独特的力量。类似的面向图的数据集也存在于网络拓扑、访问控制系统、医疗模型等领域。


    关系型数据库完全有能力通过使用 `外键` 和 `自连接` 来为这类网络建模。不幸的是，当处理非常庞大的图时，`RDBMS` 通常会遇到性能问题，而且 `SQL`
    缺乏一种能够有效处理图数据的表达性语法。


    到目前为止描述的 NoSQL 解决方案在处理图模型方面甚至比关系型数据库更差。在键值存储或文档数据库中，图结构可以存储在单个文档或对象中，但对象之间的关系并不是原生支持的（因为没有连接操作）。


    要高效处理一种以对象或实体间复杂关系网络为主要焦点的数据模型，需要一种不同类型的数据库：图数据库。


    ## 什么是图？


    与关系型数据库类似，但与许多非关系型系统不同，图数据库基于坚实的理论基础。图论是数学中一个历史悠久的分支，在医学、物理学、社会学以及计算机科学中有许多实际应用。


    图论定义了图的这些主要组成部分：


    *   顶点，或称“节点”，代表不同的对象。

    *   边，或称“关系”或“弧”，连接这些对象。

    *   节点和边都可以拥有属性。


    虽然在数学理论中最常用的是顶点和边这两个术语，但在本章中，我们将更多地使用“节点”和“关系”，因为这些术语能让语言更简洁明了。


    节点和关系都可以有属性。节点的属性与你可能在关系表或 `JSON` 文档中找到的属性相似。关系的属性可能包括关系的类型、强度或历史。


    图 5-1 展示了一个简单的图，包含四个节点（顶点）和三条关系（边）。


    ![A978-1-4842-1329-2_5_Fig1_HTML.jpg](img/A978-1-4842-1329-2_5_Fig1_HTML.jpg)


    图 5-1. 包含四个顶点（节点）和三条边（关系）的简单图


    图论提供了用于从图中定义或移除节点或关系，以及执行操作来查找相邻节点的数学符号。这些基本操作可用于执行图遍历——穿过图来探索网络。举一个熟悉的例子，Facebook
    有时会执行图遍历来查找你朋友的朋友。在图 5-1 所示的例子中，我们可能会执行图遍历来查找所有曾与基努·里维斯共同主演过电影的演员。


    ## 图的 RDBMS 模式


    在关系模型中表示图结构相对容易。例如，我们可以创建如图 5-2 所示的关系结构来表示图 5-1 所示的图。


    ![A978-1-4842-1329-2_5_Fig2_HTML.jpg](img/A978-1-4842-1329-2_5_Fig2_HTML.jpg)


    图 5-2. 表示我们示例图数据的关系模式


    虽然关系模型可以轻松地表示图模型中包含的数据，但在实践中我们面临两个显著问题：


    `SQL` 缺乏能够轻松执行图遍历的语法，尤其是那些深度未知或无界的遍历。例如，使用 `SQL` 查找你朋友的朋友还算容易，但要解决“分隔度”问题（通常用与凯文·贝肯相隔多少连接的例子来说明）就很困难了。

    当我们遍历图时，性能会迅速下降。每增加一级遍历，查询响应时间都会显著增加。


    例如，考虑找出所有曾与基努·里维斯合作过的演员所需的 `SQL`。它可能如图 5-3 所示。


    ![A978-1-4842-1329-2_5_Fig3_HTML.jpg](img/A978-1-4842-1329-2_5_Fig3_HTML.jpg)


    图 5-3. 执行一级图遍历的 SQL


    此 `SQL` 查询 `PEOPLE` 表以找到基努，然后查询 `ACTORS` 和 `MOVIES` 表以找到他主演的电影，接着再次查询 `ACTORS`
    和 `PEOPLE` 表以找到出演过那些电影的其他演员。像这样的五表连接尚可管理，但随着我们遍历得更深，每增加一次搜索深度，我们就必须再添加三个连接。此外，没有语法允许我们搜索到任意深度。因此，例如，如果我们想展开整个图，我们做不到，因为无法预先知道需要检查多少层级。


    `RDBMS` 中的性能也是一个潜在问题。假设创建了适当的索引，我们上面的示例查询将以可接受的开销执行。但每次连接都需要为每个演员和电影进行索引查找。每次索引查找都会增加开销，对于深度图遍历来说，性能通常是不可接受的。有时最好的解决方案是将表完整加载到应用程序代码中的映射结构中，并在内存中遍历图。然而，这假设应用程序代码中有足够的内存来缓存所有数据，但情况并非总是如此。


    由于键值存储不支持连接，它们提供的图遍历能力甚至比关系数据库更少。在纯粹的键值存储或文档数据库中，图遍历逻辑必须完全在应用程序代码中实现。'
- fmt: "# RDF and SPARQL\n\nThe Resource Description Framework (RDF) is a web standard\
    \ developed in the late 1990s for the modeling of web resources and the relationships\
    \ between them. It represents one of the earliest standards for representing and\
    \ processing graph data.\n\nInformation in RDF is expressed in triples, conceptually\
    \ of the form `entity: attribute :value;` for instance:\n\n`TheMatrix: is :Movie`\n\
    `Kenau: is :Person`\n`Kenau: starred in: TheMatrix`\n\nRDF was intended as a means\
    \ of creating a formal database of resources—particularly web services—on the\
    \ web together with the dependencies that these resources relied on.\n\nRDF graphs\
    \ can be stored in a variety of formats including XML, or even within tables inside\
    \ a relational database. However, native RDF databases—known as triplestores—have\
    \ been implemented. These include AllegroGraph, Ontotext GraphDB, StarDog, and\
    \ Oracle Spatial.\n\nRDF supports a query language SPARQL (a recursive acronym:\
    \ SPARQL Protocol and RDF Query Language), which is a SQL-like language for interrogating\
    \ RDF data. Figure [5-4](#A978-1-4842-1329-2_5_Chapter.html#Fig4) shows a SPARQL\
    \ query interrogating DBpedia (an RDF representation of selected Wikipedia data)\
    \ to find all objects that have Edgar Codd as a topic.\n\n![A978-1-4842-1329-2_5_Fig4_HTML.jpg](A978-1-4842-1329-2_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4. InterrogatingDbpedia using SPARQL\n\n# Property Graphs and Neo4j\n\
    \nWhile RDF is an important graph technology, the Property Graph model provides\
    \ a richer model for representing complex data by associating both nodes and relationships\
    \ with attributes.\n\nThe property graph model is the basis for Neo4j, which is\
    \ the most widely adopted graph database. Neo4J is a Java-based graph database\
    \ that can be easily embedded in any Java application or run as a standalone server.\
    \ Neo4j supports billions of nodes, ACID compliant transactions, and multiversion\
    \ consistency.\n\nNeo4j implements a declarative graph query language Cypher.\
    \ Cypher allows graphs to be queried using simple syntax somewhat comparable to\
    \ SQL or SPARQL, but particularly optimized for graph traversals.\n\nThe following\
    \ Cypher statements would create the graph structure shown in Figure [5-1](#A978-1-4842-1329-2_5_Chapter.html#Fig1)\
    \ within Neo4J:\n\n```cypher\nCREATE `(TheMatrix:Movie {title:'The Matrix', released:1999,`\n\
    \        `tagline:'Welcome to the Real World'})`\nCREATE `(JohnWick:Movie {title:'John\
    \ Wick', released:2014,`\n        `tagline:'Silliest Keanu movie ever'})`\nCREATE\
    \ `(Keanu:Person {name:'Keanu Reeves', born:1964})`\nCREATE `(AndyW:Person {name:'Andy\
    \ Wachowski', born:1967})`\nCREATE\n  `(Keanu)-[:ACTED_IN {roles:['Neo']}]->(TheMatrix),`\n\
    \  `(Keanu)-[:ACTED_IN {roles:['John Wick']}]->(JohnWick),`\n  `(AndyW)-[:DIRECTED]->(TheMatrix)`\n\
    ```\n\nThe following Cypher query retrieves information for a single node in the\
    \ graph:\n\n```\nneo4j-sh (?)$ `MATCH` `(kenau:Person {name:\"Keanu Reeves\"})`\n\
    >`              `RETURN` `kenau;`\n`+----------------------------------------+`\n\
    `| kenau                                  |`\n`+----------------------------------------+`\n\
    `| Node[1]{name:\"Keanu Reeves\",born:1964} |`\n`+----------------------------------------+`\n\
    ```\n\nThe `MATCH` clause is roughly equivalent to the `WHERE` clause in SQL and\
    \ the `RETURN` clause to a `SELECT` list.\n\n`MATCH` supports a syntax for traversing\
    \ relationships in the graph. For instance, the following query finds all the\
    \ actors who have ever acted in the same movie as Keanu Reeves:\n\n```\nneo4j-sh\
    \ (?)$ `MATCH` `(kenau:Person {name:\"Keanu Reeves\"})`\n              `-[:ACTED_IN]->(movie)<-[:ACTED_IN]-(coStar)`\n\
    \              `RETURN` `coStar.name;`\n`+----------------------+`\n`| coStar.name\
    \          |`\n`+----------------------+`\n`| \"Jack Nicholson\"     |`\n`| \"\
    Diane Keaton\"       |`\n`| \"Dina Meyer\"         |`\n`| \"Ice-T\"          \
    \    |`\n`| \"Takeshi Kitano\"     |`\n```\n\nIn the above example, we specified\
    \ the relationship type (`ACTED_IN`) and the node type (`movie`). We can also\
    \ specify a wildcard to match all relationship or node types and can specify the\
    \ depth of the traversal, as in the following query which matches all nodes within\
    \ two traversals from “Keanu Reeves.” This list will include all movies that he\
    \ has starred in, together with all co-stars and directors.\n\n```\nneo4j-sh (?)$\
    \ `MATCH` `(kenau:Person {name:\"Keanu Reeves\"})`\n              `-[*1..2]-(related)`\
    \ `RETURN` `distinct related;`\n`+------------------------------------------------------------------------`\n\
    `| related`\n`+------------------------------------------------------------------------`\n\
    `| Node[0]{title:\"The Matrix\",released:1999,`\n          `tagline:\"Welcome\
    \ to the Real World\"}`\n`| Node[7]{name:\"Joel Silver\",born:1952}`\n`| Node[5]{name:\"\
    Andy Wachowski\",born:1967}`\n`| Node[6]{name:\"Lana Wachowski\",born:1965}`\n\
    ```\n\nJust as SQL queries generate result sets that are structured as tables,\
    \ Cypher returns results that can themselves be graphs. For instance, in Figure\
    \ [5-5](#A978-1-4842-1329-2_5_Chapter.html#Fig5), we generate a graph showing\
    \ all nodes related to “Keanu Reeves” out to two levels.\n\n![A978-1-4842-1329-2_5_Fig5_HTML.jpg](A978-1-4842-1329-2_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5. Graph output from cypher query\n\n# Gremlin\n\nAlthough easy to\
    \ use, Cypher was until recently specific to Neo4J. Gremlin is an alternative\
    \ graph database query language that can be used with Neo4J and a variety of other\
    \ graph engines, including Titan (now part of the Datastax Cassandra distribution)\
    \ and OrientDB.\n\nCompared to Cypher’s nonprocedural SQL-like style, Gremlin\
    \ is a more procedurally oriented language. Using Gremlin, the programmer declares\
    \ the specific traversal operations to be performed—possibly in multiple statements.\n\
    \nFigure [5-6](#A978-1-4842-1329-2_5_Chapter.html#Fig6) illustrates the Gremlin\
    \ “toy” sample database. The database contains six vertices (nodes) which define\
    \ four people and two projects. Some people have created projects, and some people\
    \ know other people.\n\n![A978-1-4842-1329-2_5_Fig6_HTML.jpg](A978-1-4842-1329-2_5_Fig6_HTML.jpg)\n\
    \nFigure 5-6. Gremlin sample graph database\n\nIn Gremlin notation, `V` represents\
    \ the vertices/nodes while `E` represents edges/relationships:\n\n```\ngremlin>\
    \ `myGraph.V.map`\n==>{name=marko, age=29}\n==>{name=vadas, age=27}\n==>{name=lop,\
    \ lang=java}\n==>{name=josh, age=32}\n==>{name=ripple, lang=java}\n==>{name=peter,\
    \ age=35}\ngremlin> `myGraph.E`\n==>e[11][4-created->3]\n==>e[12][6-created->3]\n\
    ==>e[7][1-knows->2]\n==>e[8][1-knows->4]\n==>e[9][1-created->3]\n==>e[10][4-created->5]\n\
    ```\n\nThis command displays the people “known” by Marko:\n\n```\ngremlin> `marko=myGraph.v(1)`\n\
    ==>v[1]\ngremlin> `marko.out('knows').name`\n==>vadas\n==>josh\n```\n\nThis command\
    \ walks the tree to find the projects created by people whom Marko knows:\n\n\
    ```\ngremlin> `marko.out('knows').out('created').name`\n==>lop\n==>ripple\n```\n\
    \nIn late 2015, Neo technology announced an open-source version of the Cypher\
    \ language. Oracle and Databricks—the Spark company—and several other vendors\
    \ have announced support for this openCypher language. Given the popularity of\
    \ Neo4j and the arguably more accessible syntax offered by Cypher, it’s quite\
    \ possible that the motivation for Gremlin as an alternative language will be\
    \ diminished."
  raw: '## RDF and SPARQL


    The Resource Description Framework (RDF) is a web standard developed in the late
    1990s for the modeling of web resources and the relationships between them. It
    represents one of the earliest standards for representing and processing graph
    data.


    Information in RDF is expressed in triples, conceptually of the form `entity:
    attribute :value;` for instance:


    `TheMatrix: is :Movie`


    `Kenau: is :Person`


    `Kenau: starred in: TheMatrix`


    RDF was intended as a means of creating a formal database of resources—particularly
    web services—on the web together with the dependencies that these resources relied
    on.


    RDF graphs can be stored in a variety of formats including XML, or even within
    tables inside a relational database. However, native RDF databases—known as triplestores—have
    been implemented. These include AllegroGraph, Ontotext GraphDB, StarDog, and Oracle
    Spatial.


    RDF supports a query language SPARQL (a recursive acronym: SPARQL Protocol and
    RDF Query Language), which is a SQL-like language for interrogating RDF data.
    Figure [5-4](#A978-1-4842-1329-2_5_Chapter.html#Fig4) shows a SPARQL query interrogating
    DBpedia (an RDF representation of selected Wikipedia data) to find all objects
    that have Edgar Codd as a topic.


    ![A978-1-4842-1329-2_5_Fig4_HTML.jpg](A978-1-4842-1329-2_5_Fig4_HTML.jpg)


    Figure 5-4.


    InterrogatingDbpedia using SPARQL


    ## Property Graphs and Neo4j


    While RDF is an important graph technology, the Property Graph model provides
    a richer model for representing complex data by associating both nodes and relationships
    with attributes.


    The property graph model is the basis for Neo4j, which is the most widely adopted
    graph database. Neo4J is a Java-based graph database that can be easily embedded
    in any Java application or run as a standalone server. Neo4j supports billions
    of nodes, ACID compliant transactions, and multiversion consistency.


    Neo4j implements a declarative graph query language Cypher. Cypher allows graphs
    to be queried using simple syntax somewhat comparable to SQL or SPARQL, but particularly
    optimized for graph traversals.


    The following Cypher statements would create the graph structure shown in Figure
    [5-1](#A978-1-4842-1329-2_5_Chapter.html#Fig1) within Neo4J:


    `CREATE` `(TheMatrix:Movie {title:''The Matrix'', released:1999,`


            `tagline:''Welcome to the Real World''})`


    `CREATE` `(JohnWick:Movie {title:''John Wick'', released:2014,`


            `tagline:''Silliest Keanu movie ever''})`


    `CREATE` `(Keanu:Person {name:''Keanu Reeves'', born:1964})`


    `CREATE` `(AndyW:Person {name:''Andy Wachowski'', born:1967})`


    `CREATE`


      `(Keanu)-[:ACTED_IN {roles:[''Neo'']}]->(TheMatrix),`


      `(Keanu)-[:ACTED_IN {roles:[''John Wick'']}]->(JohnWick),`


      `(AndyW)-[:DIRECTED]->(TheMatrix)`


    The following Cypher query retrieves information for a single node in the graph:


    `neo4j-sh (?)$` `MATCH` `(kenau:Person {name:"Keanu Reeves"})`


    `>`             `RETURN` `kenau;`


    `+----------------------------------------+`


    `| kenau                                  |`


    `+----------------------------------------+`


    `| Node[1]{name:"Keanu Reeves",born:1964} |`


    `+----------------------------------------+`


    The MATCH clause is roughly equivalent to the WHERE clause in SQL and the RETURN
    clause to a SELECT list.


    MATCH supports a syntax for traversing relationships in the graph. For instance,
    the following query finds all the actors who have ever acted in the same movie
    as Keanu Reeves:


    `neo4j-sh (?)$` `MATCH` `(kenau:Person {name:"Keanu Reeves"})`


                     `-[:ACTED_IN]->(movie)<-[:ACTED_IN]-(coStar)`


                  `RETURN` `coStar.name;`


    `+----------------------+`


    `| coStar.name          |`


    `+----------------------+`


    `| "Jack Nicholson"     |`


    `| "Diane Keaton"       |`


    `| "Dina Meyer"         |`


    `| "Ice-T"              |`


    `| "Takeshi Kitano"     |`


    In the above example, we specified the relationship type (ACTED_IN) and the node
    type (movie). We can also specify a wildcard to match all relationship or node
    types and can specify the depth of the traversal, as in the following query which
    matches all nodes within two traversals from “Keanu Reeves.” This list will include
    all movies that he has starred in, together with all co-stars and directors.


    `neo4j-sh (?)$` `MATCH` `(kenau:Person {name:"Keanu Reeves"})`


                   `-[*1..2]-(related)` `RETURN` `distinct related;`


    `+------------------------------------------------------------------------`


    `| related`


    `+------------------------------------------------------------------------`


    `| Node[0]{title:"The Matrix",released:1999,`


              `tagline:"Welcome to the Real World"}`


    `| Node[7]{name:"Joel Silver",born:1952}`


    `| Node[5]{name:"Andy Wachowski",born:1967}`


    `| Node[6]{name:"Lana Wachowski",born:1965}`


    Just as SQL queries generate result sets that are structured as tables, Cypher
    returns results that can themselves be graphs. For instance, in Figure [5-5](#A978-1-4842-1329-2_5_Chapter.html#Fig5),
    we generate a graph showing all nodes related to “Keanu Reeves” out to two levels.


    ![A978-1-4842-1329-2_5_Fig5_HTML.jpg](A978-1-4842-1329-2_5_Fig5_HTML.jpg)


    Figure 5-5.


    Graph output from cypher query


    ## Gremlin


    Although easy to use, Cypher was until recently specific to Neo4J. Gremlin is
    an alternative graph database query language that can be used with Neo4J and a
    variety of other graph engines, including Titan (now part of the Datastax Cassandra
    distribution) and OrientDB.


    Compared to Cypher’s nonprocedural SQL-like style, Gremlin is a more procedurally
    oriented language. Using Gremlin, the programmer declares the specific traversal
    operations to be performed—possibly in multiple statements.


    Figure [5-6](#A978-1-4842-1329-2_5_Chapter.html#Fig6) illustrates the Gremlin
    “toy” sample database. The database contains six vertices (nodes) which define
    four people and two projects. Some people have created projects, and some people
    know other people.


    ![A978-1-4842-1329-2_5_Fig6_HTML.jpg](A978-1-4842-1329-2_5_Fig6_HTML.jpg)


    Figure 5-6.


    Gremlin sample graph database


    In Gremlin notation, V represents the vertices/nodes while E represents edges/relationships:


    `gremlin>` `myGraph.V.map`


    `==>{name=marko, age=29}`


    `==>{name=vadas, age=27}`


    `==>{name=lop, lang=java}`


    `==>{name=josh, age=32}`


    `==>{name=ripple, lang=java}`


    `==>{name=peter, age=35}`


    `gremlin>` `myGraph.E`


    `==>e[11][4-created->3]`


    `==>e[12][6-created->3]`


    `==>e[7][1-knows->2]`


    `==>e[8][1-knows->4]`


    `==>e[9][1-created->3]`


    `==>e[10][4-created->5]`


    This command displays the people “known” by Marko:


    `gremlin>` `marko=myGraph.v(1)`


    `==>v[1]`


    `gremlin>` `marko.out(''knows'').name`


    `==>vadas`


    `==>josh`


    This command walks the tree to find the projects created by people whom Marko
    knows:


    `gremlin>` `marko.out(''knows'').out(''created'').name`


    `==>lop`


    `==>ripple`


    In late 2015, Neo technology announced an open-source version of the Cypher language.
    Oracle and Databricks—the Spark company—and several other vendors have announced
    support for this openCypher language. Given the popularity of Neo4j and the arguably
    more accessible syntax offered by Cypher, it’s quite possible that the motivation
    for Gremlin as an alternative language will be diminished.'
  trans: "# RDF 与 SPARQL\n\n资源描述框架（RDF）是一种网络标准，于 1990 年代后期开发，用于对网络资源及其之间的关系进行建模。它代表了最早用于表示和处理图形数据的标准之一。\n\
    \nRDF 中的信息以三元组的形式表示，概念上形如 `实体：属性：值；` 例如：\n\n`TheMatrix: is :Movie`\n`Kenau: is\
    \ :Person`\n`Kenau: starred in: TheMatrix`\n\nRDF 旨在作为一种在万维网上为资源（特别是 Web 服务）及其所依赖的依赖关系创建正式数据库的方法。\n\
    \nRDF 图可以以多种格式存储，包括 XML，甚至可以存储在关系数据库的表中。然而，原生 RDF 数据库（称为三元组存储）也已被实现。这些包括 AllegroGraph、Ontotext\
    \ GraphDB、StarDog 和 Oracle Spatial。\n\nRDF 支持一种查询语言 SPARQL（一个递归首字母缩写词：SPARQL 协议和\
    \ RDF 查询语言），这是一种类似于 SQL 的语言，用于查询 RDF 数据。图 5-4 展示了一个 SPARQL 查询，它正在查询 DBpedia（维基百科部分数据的\
    \ RDF 表示）以查找所有以 Edgar Codd 为主题的条目。\n\n![A978-1-4842-1329-2_5_Fig4_HTML.jpg](img/A978-1-4842-1329-2_5_Fig4_HTML.jpg)\n\
    \n图 5-4. 使用 SPARQL 查询 DBpedia\n\n# 属性图与 Neo4j\n\n虽然 RDF 是一项重要的图技术，但属性图模型通过为节点和关系关联属性，提供了一个更丰富的模型来表示复杂数据。\n\
    \n属性图模型是 Neo4j 的基础，它是最广泛采用的图数据库。Neo4J 是一个基于 Java 的图数据库，可以轻松嵌入任何 Java 应用程序或作为独立服务器运行。Neo4j\
    \ 支持数十亿个节点、符合 ACID 的事务以及多版本一致性。\n\nNeo4j 实现了一种声明式图查询语言 Cypher。Cypher 允许使用类似于 SQL\
    \ 或 SPARQL 的简单语法来查询图，但特别针对图遍历进行了优化。\n\n以下 Cypher 语句将在 Neo4J 内部创建如图 5-1 所示的图形结构：\n\
    \n```cypher\nCREATE `(TheMatrix:Movie {title:'The Matrix', released:1999,`\n \
    \       `tagline:'Welcome to the Real World'})`\nCREATE `(JohnWick:Movie {title:'John\
    \ Wick', released:2014,`\n        `tagline:'Silliest Keanu movie ever'})`\nCREATE\
    \ `(Keanu:Person {name:'Keanu Reeves', born:1964})`\nCREATE `(AndyW:Person {name:'Andy\
    \ Wachowski', born:1967})`\nCREATE\n  `(Keanu)-[:ACTED_IN {roles:['Neo']}]->(TheMatrix),`\n\
    \  `(Keanu)-[:ACTED_IN {roles:['John Wick']}]->(JohnWick),`\n  `(AndyW)-[:DIRECTED]->(TheMatrix)`\n\
    ```\n\n以下 Cypher 查询检索图中单个节点的信息：\n\n```\nneo4j-sh (?)$ `MATCH` `(kenau:Person {name:\"\
    Keanu Reeves\"})`\n>`              `RETURN` `kenau;`\n`+----------------------------------------+`\n\
    `| kenau                                  |`\n`+----------------------------------------+`\n\
    `| Node[1]{name:\"Keanu Reeves\",born:1964} |`\n`+----------------------------------------+`\n\
    ```\n\n`MATCH`子句大致等同于 SQL 中的`WHERE`子句，而`RETURN`子句则等同于`SELECT`列表。\n\n`MATCH`支持一种用于遍历图中关系的语法。例如，以下查询查找所有曾与基努·里维斯在同一部电影中出演过的演员：\n\
    \n```\nneo4j-sh (?)$ `MATCH` `(kenau:Person {name:\"Keanu Reeves\"})`\n      \
    \        `-[:ACTED_IN]->(movie)<-[:ACTED_IN]-(coStar)`\n              `RETURN`\
    \ `coStar.name;`\n`+----------------------+`\n`| coStar.name          |`\n`+----------------------+`\n\
    `| \"Jack Nicholson\"     |`\n`| \"Diane Keaton\"       |`\n`| \"Dina Meyer\"\
    \         |`\n`| \"Ice-T\"              |`\n`| \"Takeshi Kitano\"     |`\n```\n\
    \n在上面的例子中，我们指定了关系类型（`ACTED_IN`）和节点类型（`movie`）。我们也可以指定通配符来匹配所有关系或节点类型，并且可以指定遍历的深度，如下面的查询所示，它匹配从“基努·里维斯”两步遍历范围内的所有节点。此列表将包括他出演的所有电影，以及所有联合主演和导演。\n\
    \n```\nneo4j-sh (?)$ `MATCH` `(kenau:Person {name:\"Keanu Reeves\"})`\n      \
    \        `-[*1..2]-(related)` `RETURN` `distinct related;`\n`+------------------------------------------------------------------------`\n\
    `| related`\n`+------------------------------------------------------------------------`\n\
    `| Node[0]{title:\"The Matrix\",released:1999,`\n          `tagline:\"Welcome\
    \ to the Real World\"}`\n`| Node[7]{name:\"Joel Silver\",born:1952}`\n`| Node[5]{name:\"\
    Andy Wachowski\",born:1967}`\n`| Node[6]{name:\"Lana Wachowski\",born:1965}`\n\
    ```\n\n正如 SQL 查询生成结构化为表格的结果集一样，Cypher 返回的结果本身也可以是图。例如，在图 5-5 中，我们生成了一个图，显示了与“基努·里维斯”相关的所有节点，向外延伸两级。\n\
    \n![A978-1-4842-1329-2_5_Fig5_HTML.jpg](img/A978-1-4842-1329-2_5_Fig5_HTML.jpg)\n\
    \n图 5-5. Cypher 查询的图输出\n\n# Gremlin\n\n虽然易于使用，但 Cypher 直到最近还仅限于 Neo4J。Gremlin\
    \ 是另一种图数据库查询语言，可以与 Neo4J 以及多种其他图引擎一起使用，包括 Titan（现为 Datastax Cassandra 发行版的一部分）和\
    \ OrientDB。\n\n与 Cypher 的非过程化、类似 SQL 的风格相比，Gremlin 是一种更面向过程的语言。使用 Gremlin，程序员声明要执行的具体遍历操作——可能使用多条语句。\n\
    \n图 5-6 展示了 Gremlin 的“示例”数据库。该数据库包含六个顶点（节点），定义了四个人和两个项目。有些人创建了项目，有些人认识其他人。\n\n\
    ![A978-1-4842-1329-2_5_Fig6_HTML.jpg](img/A978-1-4842-1329-2_5_Fig6_HTML.jpg)\n\
    \n图 5-6. Gremlin 示例图数据库\n\n在 Gremlin 表示法中，`V`代表顶点/节点，而`E`代表边/关系：\n\n```\ngremlin>\
    \ `myGraph.V.map`\n==>{name=marko, age=29}\n==>{name=vadas, age=27}\n==>{name=lop,\
    \ lang=java}\n==>{name=josh, age=32}\n==>{name=ripple, lang=java}\n==>{name=peter,\
    \ age=35}\ngremlin> `myGraph.E`\n==>e[11][4-created->3]\n==>e[12][6-created->3]\n\
    ==>e[7][1-knows->2]\n==>e[8][1-knows->4]\n==>e[9][1-created->3]\n==>e[10][4-created->5]\n\
    ```\n\n此命令显示 Marko“认识”的人：\n\n```\ngremlin> `marko=myGraph.v(1)`\n==>v[1]\ngremlin>\
    \ `marko.out('knows').name`\n==>vadas\n==>josh\n```\n\n此命令遍历树结构以查找 Marko 认识的人所创建的项目：\n\
    \n```\ngremlin> `marko.out('knows').out('created').name`\n==>lop\n==>ripple\n\
    ```\n\n2015 年末，Neo 技术公司宣布了 Cypher 语言的开源版本。Oracle 和 Databricks（Spark 公司）以及其他几家供应商已宣布支持这种\
    \ openCypher 语言。考虑到 Neo4j 的流行以及 Cypher 提供的可能更易上手的语法，Gremlin 作为替代语言的动机很可能会减弱。"
- fmt: '## Graph Database Internals


    Graph processing can be performed on databases irrespective of their internal
    storage format. The logical model of a graph database outlined at the beginning
    of the chapter can be implemented on almost any database system; indeed, relational
    systems can implement the logical relationships within a graph without compromise.
    However, as we discussed earlier, performance on relational systems—even with
    optimal indexing—degrades as the depth of the graph traversal increases. Enabling
    efficient real-time graph processing in practice requires a way to move through
    the graph structure without index lookups. This index-free navigation is referred
    to as `index-free adjacency`.


    For example, to implement a graph in a relational model such as we saw in Figure
    5-2, a join table is used to navigate between two rows—possibly in the same table—that
    represent adjacent nodes. Indexes allow the logical key value of the adjacent
    row to be translated to a physical address within the database. This physical
    address can then be quickly accessed. In a typical implementation, three or four
    logical IO operations are required to traverse the B-Tree index, and a further
    lookup to retrieve the value. These IO operations may be satisfied in cache memory,
    but usually some physical IO is required.


    As we discussed earlier, index lookups are typically adequate for shallow traversals,
    but they contribute to performance degradation as the traversals become deeper.
    The exact implementation varies depending on the type of database, but the need
    to create an index to facilitate a graph traversal is common to all nongraph databases.


    In a native graph database utilizing `index-free adjacency`, each node knows the
    physical location of all adjacent nodes. There is, therefore, no need to use indexes
    to efficiently navigate the graph, because each node “points” to all adjacent
    nodes.


    Not surprisingly, native graph databases massively outperform alternative implementations
    for graph traversal operations. However, the architecture presents challenges
    for distributing the graph across multiple servers. While a node can, of course,
    point to an adjacent node located on another machine, the overhead of routing
    the traversal across multiple machines eliminates the advantages of the graph
    database model, because inter-server communication is far more time consuming
    than local access. For this reason, many pure graph databases like `Neo4j` do
    not currently support a distributed deployment—the graph database can run on a
    single server only.


    ## Graph Compute Engines


    Graph-only databases excel at graph processing, of course, but they are rarely
    optimal for all the workloads in a typical application. Conversely, many applications—even
    if their predominant workloads are satisfied by a nongraph database technology—sometimes
    need to be able to perform efficient graph traversals.


    Furthermore, as we discussed previously, the pure graph model has difficulties
    coping with massive distributed datasets, because it is inefficient to perform
    graph based traversals across multiple physical machines.


    Graph compute engines provide a solution for databases that want to merge graph
    processing with other data models and for graph processing that needs to work
    across massive distributed datasets. A graph compute engine implements efficient
    graph processing algorithms and exposes graph APIs, but it does not assume or
    require that the data be stored in the `index free adjacency` graph format we
    discussed previously; the underlying datasets may be held in a relational database,
    a NoSQL system, or Hadoop. Graph compute engines don’t always offer the efficient
    real-time graph traversal offered by pure graph databases; instead, they tend
    to excel at batch operations that process all or large parts of the graph.


    Significant graph compute engines include:


    *   `Apache Giraph`: A graph processing system designed to run over Hadoop data
    using MapReduce.

    *   `GraphX`: A graph processing system that is part of the Berkeley Data Analytic
    Stack (BDAS), which includes Spark (see Chapter 7). It uses Spark as the foundation
    for graph processing just as Giraph uses MapReduce.

    *   `Titan`: A graph database that can be layered on top of Big Data storage engines,
    including Hbase and Cassandra. Datastax—the commercial vendor of Cassandra—acquired
    Auerlius, the commercial sponsor of Titan, in 2014.


    ## Conclusion


    Graph databases occupy a specific and important niche in database technology.
    Unlike advocates of key-value stores and document databases, the proponents of
    graph databases do not claim to be on a mission to replace the venerable RDBMS;
    rather, they correctly describe graph databases as an important alternative when
    the analysis of relationships between objects is of as much significance as the
    objects themselves.


    The logical model of a graph database is conceptually quite simple. Nodes (or
    “vertices”) are connected to each other by relationships (or “edges”). Both nodes
    and relationships may have properties—sets of `name : value` pairs.


    Languages such as `SPARQL`, `Cypher`, and `Gremlin` are optimized for graph traversal
    operations, offering a syntax that allows us to walk the graph without requiring
    the recursive joins necessitated by relational databases.


    Pure graph databases such as `Neo4J` store data in a format that is optimized
    for real-time graph processing, but that is not always suitable for other purposes.
    These databases store the data in a physical format that matches the logical relationships
    of the graph.


    Graph compute engines perform graph processing over data held in other formats,
    often in Hadoop but potentially in a relational format. A graph compute engine
    is typically optimized to perform batch processing over an entire graph, while
    a native graph database is optimized toward real-time graph processing.


    Modifying the physical organization of data to suit a particular processing workload
    is not unique to graph databases. As we will see in the next chapter, columnar
    databases turn the traditional physical organization of database storage on its
    side so as to optimize analytic workloads.


    ## 6. Column Databases


    > I wish I could find a witty quote about column databases —Guy Harrison, Next
    Generation Databases


    Those of us raised in Western cultures have been conditioned to think of data
    as arranged in rows. The way data is presented in ledgers, tables, spreadsheets,
    and even in the left to right, top to bottom organization of European languages
    has programmed us to visualize data in row format. It’s not surprising, therefore,
    that the first digital files were created with each record represented as a row.
    But no matter how convenient and familiar this format may be, it is not always
    the best way to organize data physically.


    When the first digital files were created, the data for each record was kept together
    in a way we think of as “row formatted.” The first databases that attempted to
    implement the relational model were created during a period in which OLTP processing—essentially,
    record at a time processing—was the most important type of database workload.
    This sort of workload is primarily record oriented, and the row-oriented physical
    structure of early digital files provided good performance.


    However, as we progressed beyond OLTP processing into the realm of data warehousing
    and analytic workloads, row-oriented physical organization became less ideal.
    In a data warehouse you rarely want to process all the columns of a single row,
