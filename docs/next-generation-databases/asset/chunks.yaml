    \ MapReduce 算法——首次发表于 2004 年——为在分布式系统上并行化计算提供了一个解决方案，并且它不仅被受谷歌技术栈启发的系统（如 Hadoop\
    \ 和 HBase），也被许多早期的 NoSQL 系统（如 CouchDB 和 MongoDB）广泛采用。\n\nMapReduce 的典型例子由词频统计\
    \ ([`wiki.apache.org/hadoop/WordCount`](https://wiki.apache.org/hadoop/WordCount))\
    \ 程序提供，它代表了几乎最简单的 MapReduce 示例。我们在图 2-4 中展示了词频统计的图示表示。\n\n在词频统计示例中，map 阶段使用分词器将输入分解为单词，然后为每个单词赋值\
    \ 1：\n\n```\npublic static class Map\n    extends Mapper<LongWritable, Text, Text,\
    \ IntWritable> {\n    private final static IntWritable one = new IntWritable(1);\n\
    \    private Text word = new Text();\n\n    public void map(LongWritable key,\
    \ Text value, Context context)\n        throws IOException, InterruptedException\
    \ {\n        String line = value.toString();\n        StringTokenizer tokenizer\
    \ = new StringTokenizer(line);\n        while(tokenizer.hasMoreTokens()) {\n \
    \           word.set(tokenizer.nextToken());\n            context.write(word,\
    \ one);\n        }\n    }\n}\n```\n\nreducer 类接收这些名称:值对（其中值始终为 1），并计算每个单词的计数总和：\n\
    \n```\npublic static class Reduce\n    extends Reducer<Text, IntWritable, Text,\
    \ IntWritable> {\n    public void reduce(Text key, Iterable<IntWritable> values,\n\
    \        Context context)\n        throws IOException, InterruptedException {\n\
    \        int sum = 0;\n        for (IntWritable val : values) {\n            sum\
    \ += val.get();\n        }\n        context.write(key, new IntWritable(sum));\n\
    \    }\n}\n```\n\nMapReduce 作业由主代码调用，该代码定义输入输出类型及文件、指定 map 和 reducer 类并调用作业：\n\
    \n```\nJob job  = Job .getInstance(conf, \"wordcount\");\njob.setOutputKeyClass(Text.class);\n\
    job.setOutputValueClass(IntWritable.class);\njob.setMapperClass(Map.class);\n\
    job.setReducerClass(Reduce.class);\njob.setInputFormatClass(TextInputFormat.class);\n\
    job.setOutputFormatClass(TextOutputFormat.class);\nFileInputFormat.addInputPath(job,\
    \ new Path(args[0]));\nFileOutputFormat.setOutputPath(job, new Path(args[1]));\n\
    job.waitForCompletion(true);\n```\n\n在 Java 中编写 MapReduce 代码有些繁琐，并且涉及大量模板代码。许多替代的实现要简单得多。例如，这是使用\
    \ MongoDB 的 JavaScript MapReduce 框架实现的词频统计算法：\n\n```\ndb.films.mapReduce(\n  \
    \  /* Map    */ function() {emit (this.Category,1);},\n    /* Reduce */ function(key,values)\
    \ {return Array.sum(values)} ,\n    { out: \"MovieRatings\"  }\n)\n```\n\n这段 JavaScript\
    \ 从 `films` 集合中读取数据，对每个电影的类别进行词频统计，结果输出到集合 \"MovieRatings\"：\n\n```\n> db.MovieRatings.find();\n\
    { \"_id\" : \"Action\", \"value\" : 64 }\n{ \"_id\" : \"Animation\", \"value\"\
    \ : 66 }\n{ \"_id\" : \"Children\", \"value\" : 60 }\n{ \"_id\" : \"Classics\"\
    , \"value\" : 57 }\n{ \"_id\" : \"Comedy\", \"value\" : 58 }\n```\n\nMapReduce\
    \ 是一种灵活的编程范式，能够适应广泛的数据处理算法。然而，对于给定问题，它很少是最高效的算法，并且通常不是对程序员来说最有效率的方法。因此，出现了许多提供替代编程和处理范式的框架。\n\
    \n## Pig\n\n人们很早就意识到，如果常见的操作需要精通复杂 MapReduce 编程的高级 Java 程序员，那么 Hadoop 的全部潜力就无法被释放。正如我们将在本章后面看到的，Facebook\
    \ 开发 Hive（最初的 SQL on Hadoop）是朝着解决这个问题迈出的重要一步。而在雅虎，Hadoop 团队认为 SQL 范式无法涵盖足够广泛的\
    \ MapReduce 编程任务类别。因此，雅虎着手创建一种既能最大化生产力，又能支持复杂过程化数据流的语言。其结果就是 Pig。\n\nPig 在表面上类似于\
    \ Perl 或 Python 等脚本语言，因为它提供灵活的语法和动态类型的变量。但 Pig 实际上实现了一种相当独特的编程范式；它最好被描述为一种数据流语言。Pig\
    \ 语句通常表示数据操作，大致类似于 SQL 中的各个操作符——加载 (`load`)、排序 (`sort`)、连接 (`join`)、分组 (`group`)、聚合\
    \ (`aggregate`) 等。通常，每个 Pig 语句接受一个或多个数据集作为输入，并返回一个数据集作为输出。例如，一个 Pig 语句可能接受两个数据集作为输入，并返回连接后的集合作为输出。用户可以通过基于\
    \ Java 的用户定义函数 (`UDF`) 机制添加自己的操作。\n\n对于熟悉 SQL 编程的人来说，在 Pig 中编程将编程模型完全颠倒。SQL 是一种非过程化语言：你指定你想要的数据，而不是概述要执行的事件序列。相比之下，Pig\
    \ 是显式过程化的：数据操作的精确序列在你的 Pig 代码中指定。对于 SQL 专家来说，它更像是 SQL 语句的执行计划，而不是 SQL 语句本身。\n\n\
    SQL 编译器和 Hive 的 HQL 编译器包含优化器，试图确定解决 SQL 请求的最有效方法。Pig 不太依赖此类优化器，因为执行计划是显式的。正如 Pig\
    \ 专家们喜欢说的：“Pig 使用的是你头脑中的优化器。”\n\n以下是无处不在的词频统计在 Pig 中的实现：\n\n```\nfile= load 'some\
    \ file';\nb = foreach file generate flatten (TOKENIZE((chararray)$0)) as word;\n\
    c = group b by word;\nd = foreach c generate COUNT(b), group;\nstore d into 'pig_wordcount';\n\
    ```\n\nPig 可用于执行复杂的工作流并提供类似于 SQL 的即席查询能力。例如，图 11-3 所示的示例执行连接、过滤和聚合，以提供亚洲地区客户的摘要。图\
    \ 11-3 也包含了一个可比的 SQL 语句。\n\n![A978-1-4842-1329-2_11_Fig3_HTML.jpg](img/A978-1-4842-1329-2_11_Fig3_HTML.jpg)\n\
    \n图 11-3.\n\nPig 与 SQL 对比\n\n尽管 Pig 能够表达几乎所有可以用 SQL 语法表达的数据查询，但它也能执行更复杂的数据流，而这些在关系数据库管理系统\
    \ (`RDBMS`) 中需要多个 SQL 语句与过程化代码串联起来才能完成。\n\n然而，尽管 Pig 比 SQL 更灵活，但它不是一种图灵完备的编程语言：它缺乏完整通用编程解决方案所需的控制结构。不过，Pig\
    \ 可以嵌入到 Python 和其他语言中。"
- fmt: '## Directed Acyclic Graphs


    Hadoop 1.0 was based on the MapReduce pattern. Complex programs could link multiple
    MapReduce steps to achieve their end result.


    It’s long been acknowledged that while MapReduce is a broadly applicable model
    that can support a wide range of job types, it is not the best model for all workloads.
    In particular, MapReduce has a very large startup cost, which means that even
    the simplest “Hello World” MapReduce job typically takes minutes rather than seconds;
    this alone makes MapReduce a poor choice for interactive workloads and low-latency
    operations.


    Hadoop 2.0 introduced the YARN framework, which allows Hadoop to run workloads
    based on other processing patterns—of which MapReduce is just one.


    The Apache Tez project (Tez is Hindi for “speed”) is one of a number of YARN-based
    initiatives that provide Hadoop with a processing framework supporting both the
    massive batch processing that characterizes traditional Hadoop workloads and low-latency
    operations that allow Hadoop to support a wider variety of solutions.


    Tez is based on a flexible processing paradigm known as directed acyclic graph
    (`DAG`). This intimidating term actually describes a familiar processing model.
    Anyone who has examined a SQL execution plan will have encountered a `DAG`. These
    graphs describe how a complex request is decomposed into multiple operations that
    are executed in a specific order and that can arbitrarily feed into each other.
    MapReduce itself is a `DAG`, but the MapReduce paradigm severely limits the types
    of graphs that can be constructed. Furthermore, MapReduce requires that each step
    in the graph be executed by a distinct set of processes, while Tez allows multiple
    steps in the graph to be executed by a single process, potentially on a specific
    node of the Hadoop cluster.


    ## Cascading


    Cascading is a popular open-source Java framework that abstracts Hadoop MapReduce
    or YARN-based processing primitives. In some respects, it resembles Pig in that
    it works with high-level data flows and transformations and spares the programmer
    the labor involved in constructing low-level parallelization classes. However,
    unlike Pig, Cascading is integrated within the Java language and is capable of
    creating solutions that are more modular and sophisticated.


    The Cascading programming model is based on sources, sinks, and pipes assembled
    in data flows. The programmer assembles these pipes to construct programs that
    are more sophisticated than MapReduce. These workflows represent the `DAG` discussed
    in the previous section.


    ## Spark


    We looked at the origins and architecture of the Spark project in Chapter [7](#A978-1-4842-1329-2_7_Chapter.html).
    Spark can be thought of as “memory-based Hadoop,” but in truth it offers more
    than just an in-memory speed boost. The Spark API operates at a higher level of
    abstraction than native YARN or MapReduce code, offering improvements in programmer
    productivity and execution speed.


    Sparks supports APIs in Python, Java, and other languages, but it is native to
    the Scala language, so our examples here will use the Scala API.


    Here, we load text files (in this case, from HDFS) into Spark Resilient Distributed
    Datasets (`RDDs`)


    ```

    val countries=sc.textFile("COUNTRIES")

    val customers=sc.textFile("CUSTOMERS")

    ```


    Spark `RDDs` are immutable: we can’t alter the contents of an `RDD`; rather, we
    perform operations that create new `RDDs`.


    The HDFS inputs are CSV files, so in our initial `RDDs` each line in the input
    file is represented as a single string. Here’s the first element in the `countries`
    `RDD`:


    ```

    scala> countries.first()

    res9: String = "52790,United States of America,Americas"

    ```


    In the next example, we use a `map` function to extract the key value from each
    of the CSV strings and create key-value pair `RDDs`.


    ```

    val countryRegions=countries.map(x=>(x.split(",")(0),x.split(",")(2)))

    val AsianCountries=countryRegions.filter(x=> x._2.contains("Asia") )

    // Country codes and country names

    val countryNames=countries.map(x=>(x.split(",")(0),x.split(",")(1)))

    ```


    The first `RDD` `countryRegions` contains all country codes and their associated
    regions. The second (`AsianCountries`) uses the `filter()` method to create a
    `RDD` containing only Asian countries. The third (`countryNames`) creates an `RDD`
    with country names keyed by country ID. Here’s the first element in the `countryNames`
    `RDD`:


    ```

    scala> countryNames.first()

    res12: (String, String) = (52790,United States of America)

    ```


    Aggregations can be created by performing `map` and `reduce` operations. The first
    line that follows uses `map` to emit a country name and the numeral 1 for each
    customer. The second line invokes a reducer that emits an `RDD` containing the
    counts of customers in each country:


    ```

    val custByCountry=customers.map(x=>(x.split(",")(3),1))

    val custByCountryCount=custByCountry.reduceByKey((x,y)=> x+y)

    ```


    In the next statement, we join the `RDD` containing customer counts by country
    ID with the list of Asian country IDs that we created earlier. Because we are
    using the default inner join method, this returns only customer counts for Asian
    regions.


    ```

    val AsiaCustCount=AsianCountries.join(custByCountryCount)

    ```


    The next join joins our `RDD` containing country names keyed by country code to
    the previous `RDD`. We now have an `RDD` that contains counts of customers by
    country name in the Asian region:


    ```

    val AsiaCustCountryNames=AsiaCustCount.join(countryNames)

    ```


    This Spark workflow is roughly equivalent to the Pig workflow shown in Figure
    [11-3](#A978-1-4842-1329-2_11_Chapter.html#Fig3). However, for massive datasets,
    the Spark job could be expected to complete in a fraction of the time, since every
    operation following the initial load from HDFS would complete in memory.


    ## The Return of SQL


    I don’t know about you, but as I created the examples in the chapter I was struck
    by the “Tower of Babel” impression created by the new generation of database languages.
    Say what you will about `SQL`, but for more than two decades database programmers
    have all been speaking the same language. As a result of the explosion of nonrelational
    systems, we’ve all been forced to speak different languages. And while some of
    these languages offer definite advantages for working with unstructured data or
    for parallelization of programming tasks, in many cases the level of abstraction
    has been reduced and the work for the programmer increased.


    So it’s not surprising that within just a few years after the enthusiasm for `NoSQL`,
    we’ve seen `SQL` return to almost every new database niche. `SQL` just has too
    many advantages: it’s a high-level abstraction that simplifies data access and
    manipulation, it’s a language in which literally millions of database users are
    conversant, and there are hundreds of popular business intelligence and analytic
    tools that use it under the hood as the means for getting at data.'
