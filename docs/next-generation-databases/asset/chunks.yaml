  trans: '## 本章小结


    在本章中，我们回顾了针对传统关系型数据库及几种非关系型系统的分布式数据库模式。关系型数据库架构诞生于大型、单体数据库服务器的时代，大多数关系型数据库至今仍以单实例方式运行。然而，无共享（shared-nothing）集群在海量并行数据仓库中已很常见，而
    Oracle 也拥有一款商业上成功的共享磁盘（shared-disk）集群 RDBMS。


    我们详细考察了三种分布式非关系型数据库系统。MongoDB 结合了分片和复制技术来实现分布式处理。HBase 利用 Hadoop 分布式文件系统的分布式文件系统，结合范围分区策略，实现了高度可扩展的解决方案。Cassandra
    则采用了 Amazon Dynamo 系统开创的一致性哈希方案，创建了一个对称的集群解决方案，无需主服务器。


    在分布式数据库中，通常会在集群内维护数据的多个副本。在下一章中，我们将了解这些数据库如何在这样的分布式系统中管理数据一致性。


    # 9. 一致性模型


    > 变要想产生任何真正的价值，就必须是持久且一致的。——托尼·罗宾斯，励志演讲家

    > 一致性与自然相悖，与生命相悖。唯一完全一致的人是死人。——奥尔德斯·赫胥黎


    推动非关系型数据库革命的最大因素之一，是希望摆脱严格 ACID 一致性的限制。人们普遍认为，新一代非关系型数据库仅提供弱一致性，或者最多是最终一致性，并且其底层一致性机制非常简单。这种看法是对非关系型数据库系统的根本误解。非关系型系统提供了一系列一致性保证，包括严格一致性，尽管是在单对象级别上。事实上，当我们失去了
    ACID 事务模型提供的严格且可预测的规则时，需要一些复杂的架构来平衡可接受的一致性程度。


    在缺乏 ACID 事务模型的情况下，出现了多种处理一致性的方法：包括相对熟悉的最终一致性概念以及各种可调节的一致性模型。许多非关系型数据库实际上对单个对象是严格一致的，即使它们不支持严格的多对象一致性。而且，尽管没有
    ACID 事务，但像 Cassandra 这样的系统支持一种更简单的轻量级事务模型。


    一致性模型对数据库并发性（多用户同时访问数据的能力）和可用性有着巨大影响。理解数据库系统如何处理一致性对于确定该数据库能否满足应用程序需求至关重要。


    ## 一致性的类型


    具有讽刺意味的是，“一致性”这个术语在数据库社区中的用法存在显著差异。一致性可能指以下任何一种含义：


    *   **与其他用户的一致**：如果两个用户同时查询数据库，他们会看到相同的数据吗？传统关系型系统通常会努力确保他们看到的数据一致，而非关系型数据库则通常采取更宽松的立场。

    *   **单个会话内的一致**：在单个数据库会话的上下文中，数据是否保持某种逻辑一致性？例如，如果我们修改了一行然后再次读取，我们会看到自己的更新吗？

    *   **单个请求内的一致**：单个请求返回的数据是否在内部是连贯的？例如，当我们读取关系表中的所有行时，通常保证我们看到的是该表在某个时间点的状态。我们开始查询后发生的对表的修改不包括在内。

    *   **与现实的一致**：数据是否与数据库试图反映的现实相符？例如，银行事务仅仅在事务结束时保持一致是不够的；它还必须正确反映实际的账户余额。以准确性为代价的一致性通常是不可接受的。


    ### ACID 与 MVCC


    关系型数据库通过两种主要的架构模式来满足一致性需求：ACID 事务和多版本并发控制（MVCC）。


    我们已经在本书中广泛讨论了 ACID 事务。回顾一下，ACID 事务应该是：


    *   **原子性**：事务是不可分割的——事务中的所有语句要么全部应用于数据库，要么都不应用。

    *   **一致性**：数据库在事务执行前后都保持一致状态。

    *   **隔离性**：虽然一个或多个用户可以同时执行多个事务，但一个事务不应该看到其他进行中的事务的影响。

    *   **持久性**：一旦事务保存到数据库（在 SQL 数据库中通过 `COMMIT` 命令），即使操作系统或硬件发生故障，其更改也应持久保存。


    **注意**


    即使是 Oracle 这样的关系型数据库，默认情况下也不实现 ACID 要求的严格事务隔离。完全隔离所有事务的开销通常太高。


    实现 ACID 一致性的最简单方法是使用锁。在基于锁的一致性中，如果一个会话正在读取某个项目，则其他会话不能修改它；如果一个会话正在修改某个项目，则其他会话不能读取它。然而，基于锁的一致性会导致不可接受的高争用和低并发性。


    为了在不进行过度锁定的情况下提供 ACID 一致性，关系型数据库系统几乎都采用了多版本并发控制（MVCC）模型。在该模型中，数据的多个副本被标记上时间戳或更改标识符，使数据库能够构建特定时间点的数据库快照。通过这种方式，MVCC
    在最大化并发性的同时，提供了事务隔离和一致性。


    例如，在 MVCC 中，如果一个数据库表在某个会话开始读取该表之后、完成读取之前发生了修改，数据库将使用表数据的先前版本来确保该会话看到一个一致的版本。MVCC
    还意味着在事务提交之前，其他会话看不到该事务的修改——其他会话看到的是数据的旧版本。这些数据的旧副本也用于回滚未成功完成的事务。


    图 9-1 说明了 MVCC 模型。一个数据库会话在时间 t1（1）发起一个事务。在时间 t2，该会话更新数据库表中的数据（2）；这导致创建了该数据的新版本（3）。大约在同一时间，第二个数据库会话查询数据库表，但由于第一个会话的事务尚未提交，他们看到的是数据的先前版本（4）。在第一个会话提交事务（5）之后，第二个数据库会话将从该数据的已修改版本进行读取（6）。


    ![A978-1-4842-1329-2_9_Fig1_HTML.jpg](img/A978-1-4842-1329-2_9_Fig1_HTML.jpg)


    图 9-1.


    多版本并发控制（MVCC）


    MVCC 的巨大优势是减少了锁开销。在图 9-1 所示的示例中，如果没有 MVCC，更新将会创建一个阻塞性锁，阻止第二个会话读取数据，直到事务完成。'
- fmt: '### Global Transaction Sequence Numbers


    MVCC can use transaction timestamps to determine which versions of data should
    be made visible to specific queries. However, most databases use a global transaction
    ID rather than an explicit timestamp. This is called the system change number
    (`SCN`) in Oracle and the transaction sequence number in Microsoft SQL Server.


    This sequence number is incremented whenever a transaction is initiated, and it
    is recorded in the structure of modified rows (or database blocks). When a query
    commences, it looks for rows that have a sequence number less than or equal to
    the value of the sequence number that was current when the query began. If the
    query encounters a row with a higher sequence number, it knows it must request
    an older version of that row.


    ### Two-phase Commit


    MVCC works in concert with the ACID transaction model to provide isolation between
    transactions running on a single system. Transactions that span databases in a
    distributed RDBMS are achieved using a two-phase-commit (`2PC`) protocol.


    The two phases of `2PC` are:


    *   Commit-request phase, in which the coordinator asks other nodes to prepare
    the transaction. Typically, the preparation phase involves locking the table rows
    concerned and applying changes without a commit.

    *   Commit phase, in which the coordinator signals all nodes to commit their transactions
    if the commit-request phase succeeded across all nodes. Alternatively, if any
    node experiences difficulties, a rollback request is sent to all nodes and the
    transaction fails.


    It’s possible for a problem to occur between the two phases, in which case the
    transaction may succeed on some nodes but not others; in this case, in-doubt transactions
    are created and need to be reconciled by the database administrator.


    ### Other Levels of Consistency


    The multi-table ACID transaction model is somewhat of a high-water mark in database
    consistency. While many next-generation databases continue to support ACID, none
    attempts to provide a higher level of transactional consistency, while many offer
    lower consistency guarantees.


    The first and most significant reduction in consistency is to limit its scope
    to a single operation or object. In an RDBMS, we can maintain consistency across
    multiple statements; for instance, we can delete a row in one table and insert
    a row in another table as an atomic operation. In most relational databases we
    can require that a set of queries accessing multiple tables return a consistent
    view of the data from the moment the query commenced. Almost no nonrelational
    systems support this level of multi-object consistency.


    Even within single-object operations, there are a variety of consistency levels
    that we can expect. In practice, the most significant levels of consistency are:


    *   Strict consistency: A read will always return the most recent data value.

    *   Causal consistency: Reads may not return the most recent value, but will not
    return values “out of sequence.” This implies that if one session created updates
    A, B, and C, another session should never see update C without also being able
    to see update B.

    *   Monotonic consistency: In this mode, a session will never see data revert
    to an earlier point in time. Once we read a data item, we will never see an earlier
    version of that data item.

    *   Read your own writes: This is a form of eventual consistency in which you
    are at least guaranteed to see any operations you executed.

    *   Eventual consistency: The system may be inconsistent at any point in time,
    but all individual operations will eventually be consistently applied. If all
    updates stop, then the system will eventually reach a consistent state.

    *   Weak consistency: The system makes no guarantee that the system will ever
    become consistent—if, for instance, a server fails, an update might be lost.


    In practice, nonrelational systems implement either strict or eventual consistency
    while RDBMS systems offer ACID consistency. Causal or monotonic consistency levels
    are not directly supported in most nonrelational systems.


    ## Consistency in MongoDB


    By default—in a single-server deployment—a MongoDB database provides strict single-document
    consistency. When a MongoDB document is being modified, it is locked against both
    reads and writes by other sessions.


    However, when MongoDB replica sets are implemented, it is possible to configure
    something closer to eventual consistency by allowing reads to complete against
    secondary servers that may contain out-of-date data.


    ### MongoDB Locking


    Consistency for individual documents is achieved in MongoDB by the use of locks.
    Locks are used to ensure that two writes do not attempt to modfy a document simultaneously,
    and also that a reader will not see an inconsistent view of the data.


    We saw earlier how a multi-version concurrency control (`MVCC`) algorithm can
    be used to allow readers to continue to read consistent versions of data concurrently
    with update activity. `MVCC` is widely used in relational databases because it
    avoids blocking readers—a reader will read a previous “version” of a data item,
    rather than being blocked by a lock when an update is occurring. MongoDB does
    not implement an `MVCC` system, and therefore readers are prevented from reading
    a document that is being updated.


    The granularity of MongoDB locks has changed during its history. In versions prior
    to MongoDB 2.0, a single global lock serialized all write activity, blocking all
    concurrent readers and writers of any document across the server for the duration
    of any write.


    Lock scope was increased to the database level in 2.2, and to the collection level
    in 2.8. In the MongoDB 3.0 release, locking is applied at the document level,
    providing the collection is stored using the `WiredTiger` storage engine. When
    document-level locking is in effect, an update to a document will only block readers
    or writers who wish to access the same document.


    Locking is a controversial topic in MongoDB; the original “global” lock and lack
    of `MVCC` compared poorly with the mechanisms familiar in relational databases.
    Now that lock scope is limited to the document level, these concerns have been
    significantly reduced.


    ### Replica Sets and Eventual Consistency


    In a single-server MongoDB configuration—and in the default multi-server scenario—MongoDB
    provides strict consistency. All reads are directed to the primary server, which
    will always have the latest version of a document.


    However, we saw in the previous chapter that we can configure the MongoDB read
    preference to allow reads from secondary servers, which might return stale data.
    Eventually all secondary servers should receive all updates, so this behavior
    can loosely be described as “eventually consistent.”'
