- fmt: '### HBase


    As mentioned earlier in the chapter, Google published three key papers revealing
    the architecture of their platform between 2003 and 2006. The `GFS` and `MapReduce`
    papers served as the basis for the core `Hadoop` architecture. The third paper—on
    `BigTable`—served as the basis for one of the first formal `NoSQL` database systems:
    `HBase`.


    `HBase` uses `Hadoop HDFS` as a file system in the same way that most traditional
    relational databases use the operating system file system. For instance, in a
    `MySQL` database using the `MyISAM` option, each table is represented as a file
    stored on the file system. By using `Hadoop HDFS` as its file system, `HBase`
    is able to create tables of truly massive size—way beyond the possible size for
    a system like `MySQL`, or even for `Oracle`. In addition, the fault tolerance
    of `HDFS` provides automatic redundancy for `HBase` tables. As we saw in Figure
    2-6, each data item in an `HDFS` file system is replicated (by default) three
    times. Since `HDFS` provides this inherent redundancy, `HBase` need not store
    multiple copies of data to protect against data loss.


    While `HDFS` allows a file of any structure to be stored within `Hadoop`, `HBase`
    does enforce structure on the data. The terminology of `HBase` objects seem pretty
    familiar—columns, rows, tables, keys. However, `HBase` tables vary significantly
    from the relational tables with which we are familiar.


    First, in each cell—a column value for a particular row—there will usually be
    multiple versions of a data value. Each version of data within a cell is identified
    by a timestamp. This provides `HBase` tables with a sort of temporal “third dimension.”


    Second, `HBase` columns are more like the key values in a distributed `Map` of
    `key : value` pairs than the fixed and relatively small number of columns found
    in a relational database table. Each row can have a huge number of “sparse” columns.
    Each row in an `HBase` table can appear to consist of a unique set of columns.


    To get a sense of how the `HBase` data model works, consider the data shown in
    Figure 2-8. First we see the raw data (1)—a list of users, websites, and the number
    of times each user visited the web site. The relational representation (2) involves
    three tables—`sites`, `people`, and `visits`—with foreign key relationships between
    `sites` and `visits` and `people` and `visits`.


    ![A978-1-4842-1329-2_2_Fig8_HTML.jpg](A978-1-4842-1329-2_2_Fig8_HTML.jpg)


    Figure 2-8. HBase data model compared to relational model


    In the `HBase` representation (3), each person’s information is held in a single
    row. That row contains columns for every website visited by that person. The column
    name represents the site name and the column value represents the number of visits.
    Because people visit thousands to hundreds of thousands of sites, there can be
    potentially thousands or hundreds of thousands of columns in a row. And while
    there are some sites that almost everyone visits—Google.com, for instance—rows
    only have columns corresponding to websites that they actually visited. So for
    instance, if you have never visited dell.com, then there will be no dell.com column
    in your row.


    The `HBase` data model and storage system is examined in more detail in [Chapter
    10](#A978-1-4842-1329-2_10_Chapter.html).


    ### Hive


    The pioneers of `Hadoop` realized fairly early that the full value of the platform
    could not be realized if only people capable of coding `MapReduce` programs could
    access the system. Non-programmers needed flexible, powerful, and accessible query
    tools to extract data from the `Hadoop` system. Even for programmers, the laborious
    and tedious process of coding `MapReduce` to perform repetitive reporting tasks
    seemed terribly inefficient. Two solutions to this problem were independently
    developed at Facebook and Yahoo!: `Hive` and `Pig`, respectively.


    `Hive` is usually thought of as “`SQL` for `Hadoop`,” although `Hive` provides
    a catalog for the `Hadoop` system, as well as an `SQL` processing layer. The `Hive`
    metadata service contains information about the structure of registered files
    in the `HDFS` file system. This metadata effectively “schematizes” these files,
    providing definitions of column names and data types. The `Hive` client or server
    (depending on the `Hive` configuration) accepts `SQL`-like commands called `Hive
    Query Language (HQL)`. These commands are translated into `Hadoop` jobs that process
    the query and return the results to the user. Most of the time, `Hive` creates
    `MapReduce` programs that implement query operations such as joins, sorts, aggregation,
    and so on. However, recent versions of `Hive` can employ more modern `YARN`-based
    processing paradigms such as `Tez`, a programming model designed to speed up operations
    of certain data processing patterns; we’ll look more at `Tez` in [Chapter 11](#A978-1-4842-1329-2_11_Chapter.html).


    Figure 2-9 illustrates the `Hive` architecture. The `Hive` metastore maps `HDFS`
    files to `Hive` tables (1). A `Hive` client or server (depending on the installation
    mode) accepts `HQL` commands that perform `SQL` operations on those tables. `Hive`
    translates `HQL` to `Hadoop` code (3)—usually `MapReduce`. This code operates
    against the `HDFS` files (4) and returns query results to `Hive` (5).


    ![A978-1-4842-1329-2_2_Fig9_HTML.jpg](A978-1-4842-1329-2_2_Fig9_HTML.jpg)


    Figure 2-9. Hive architecture


    It’s hard to overstate the importance of `Hive`. `Hive` opened up `Hadoop` to
    anybody familiar with `SQL`, illustrated to the community at large that `Hadoop`
    could operate as a form of data warehouse, and set the stage for integration of
    `Hadoop` into Business Intelligence tools. However, by raising expectations that
    `Hadoop` could operate as a traditional database, `Hive` also contributed to some
    unrealistic expectations. `SQL` is generally used as a real-time query tool, but
    `Hadoop`’s batch orientation means that even the simplest `HQL` query cannot run
    in a real-time mode.


    The `Hadoop` community has attempted to deal with `Hive` performance issues in
    two ways. The predominant `Hadoop` vendor Cloudera has created an alternative
    proprietary `SQL` on the `Hadoop` framework called `Impala`, while others—including
    another major `Hadoop` vendor Hortonworks—have attempted to improve `Hive`’s performance
    through incremental changes and better integration with post-`MapReduce` frameworks
    such as `YARN` and `Tez`. Meanwhile, traditional database vendors such as `Oracle`
    and `Teradata` have attempted to provide `SQL` on `Hadoop` functionality through
    their existing `SQL` engines. We’ll spend some more time on `SQL` interfaces to
    `Hadoop` and `NoSQL` in [Chapter 11](#A978-1-4842-1329-2_11_Chapter.html).


    ### Pig


    Facebook created `Hive` to empower analysts wanting to access data in `Hadoop`.
    Yahoo!, in response to similar demands, independently created another solution:
    `Pig`.


    `Pig` supports a procedural, high-level data flow language called `Pig Latin`.
    Like `Hive`, `Pig Latin` is compiled to `MapReduce` code. However, `Pig` is more
    of a scripting language than an `SQL` alternative. While it is possible to create
    `Pig` equivalents to virtually all `Hive HQL` queries, `Pig` is capable of expressing
    far more complex pipelines of operations than is `HQL`.


    Figure 2-10 compares a `Pig Latin` script with an equivalent `Hive HQL` statement.
    Note that the `Pig` script is a procedural representation—it explicitly specifies
    the sequence of events that must be undertaken in order to achieve the result.
    Like `SQL`, `HQL` is nonprocedural: it’s up to the `Hive` optimizer to determine
    the means of execution; the `HQL` only specifies the logical operations to be
    performed on the data.


    ![A978-1-4842-1329-2_2_Fig10_HTML.jpg](A978-1-4842-1329-2_2_Fig10_HTML.jpg)


    Figure 2-10. Pig Latin as compared with Hive HQL'
