  trans: '

    # 类似 Cassandra 的数据库


    像 `Cassandra` 这样基于 `Dynamo` 模型构建的数据库，已经提供了一种可调的一致性模型，允许管理员或开发者选择一致性与性能之间的权衡级别。基于
    `Dynamo` 的系统以其提供最终一致性而闻名，但它们同样能够提供严格的一致性——至少在单对象事务内是如此。`RDBMS` 系统也提供对隔离级别的控制——例如，提供保证可重复读取的级别。


    然而，像 `Cassandra` 这样基于 `Dynamo` 的系统目前无法提供多对象事务。与此同时，现有实现中的 `RDBMS` 一致性受到 `ACID`
    事务原则的影响，该原则要求数据库始终向所有用户提供一致的视图。


    正如我们在第 3 章所讨论的，最终一致性类系统的根本动机是能够经受住网络分区。如果分布式数据库被网络分区一分为二——即“脑裂”场景——数据库只能通过牺牲某种程度的严格一致性来维持可用性。


    在一个最终一致、可容忍网络分区的数据库中实现多行事务，无疑是一项重大的工程挑战，但并非显然不可能。这样的数据库将允许开发者或管理员在严格一致的 `ACID`
    事务与涉及多对象的最终一致事务之间进行选择（如图 12-2 所示）。


    ![A978-1-4842-1329-2_12_Fig2_HTML.jpg](img/A978-1-4842-1329-2_12_Fig2_HTML.jpg)


    图 12-2.


    一种可能的收敛一致性模型


    ## 模式


    虽然关系模型的纯粹主义者可能声称商业 `RDBMS` 系统并未实现纯粹的版本，但传统的 `RDBMS` 至少为数据建模过程定义了明确的规范。数据“规范化”从逻辑表示中消除了冗余和模糊性。总的来说，数据的关系型表示在为非程序员提供可理解的数据视图方面已被证明具有无价的价值，并且——与采用
    `SQL` 作为数据访问的通用语言一起——为商业智能和查询工具提供了可预测且易于访问的接口。


    对关系模型的异议至少源于两个原因：


    - 程序员希望有一个可以接受面向对象数据的数据存储，而无需经历从范式中解构和重构所带来的开销和复杂性。

    - 关系模型的生命周期在某种程度上代表了一个瀑布式过程，要求在项目开始时就全面定义模型，并且一旦部署到生产环境就难以更改。现代敏捷应用程序开发实践拒绝这种瀑布式方法，而支持期望设计变更的迭代开发。此外，现代
    Web 应用程序需要快速迭代新功能，以适应激烈的竞争环境。虽然现代 `RDBMS` 系统可以执行在线模式修改，但代码和模式变更的协调带来了应用程序故障的风险，通常需要仔细且耗时的变更控制程序。


    简而言之，现代应用程序需要灵活的模式，可以在必要时由更改的应用程序代码动态修改。


    然而，在这个大数据时代，一个可理解且无歧义的数据模型的需求甚至比关系模型早期更为重要。非关系型数据库无法轻松集成到组织的商业智能（`BI`）能力中；在最坏的情况下，它们包含的数据对
    `BI` 框架来说是完全不透明的。


    提供一个两全其美的解决方案似乎在某些现有数据库的能力范围内。一个允许在较高层次以相对稳定的范式表示数据，同时也允许存储动态变化数据的数据库，只需要关系表中的列能够存储任意复杂的结构——例如
    `JSON`——并且这些复杂结构得到集成到 `SQL` 中的高效查询机制的支持。


    正如我们将看到的，这样的混合能力已经存在。几乎所有数据库——关系型和非关系型——都在引入对 `JSON` 的支持。例如，`Riak`、`Cassandra`、`PostgresSQL`
    和 `Oracle` 都提供了用于索引、存储和检索 `JSON` 结构的具体机制。很快，将一个数据库描述为“文档”数据库将变得毫无意义，因为所有数据库都将提供对
    `JSON` 的强大支持。


    我确信关系模型的纯粹主义者会争辩说，这样的混合解决方案实际上是魔鬼的杰作，因为它损害了关系模型的理论基础。也许确实如此，一种允许原型设计和快速迭代数据模型同时保持关系纯粹性的关系实现将是受欢迎的。但目前我认为短期方向已经确定：我们将把
    `JSON` 嵌入到关系表中，以平衡灵活性与关系模型的优势。图 12-3 说明了未来数据库中模式元素可能融合的愿景。


    ![A978-1-4842-1329-2_12_Fig3_HTML.jpg](img/A978-1-4842-1329-2_12_Fig3_HTML.jpg)


    图 12-3.


    一种可能的收敛模式模型


    ## 数据库语言


    `Codd` 对关系数据库的定义并未指定 `SQL` 语言，一个形式上的关系数据库完全有可能使用其他语言。然而，随着时间的推移，单一跨平台数据访问语言的优势变得显而易见，整个行业团结在
    `SQL` 周围。


    “`NoSQL`”这个术语是不幸的，因为它暗示了对 `SQL` 语言的拒绝，而不是数据库技术变革核心中更根本的问题。然而，确实有很多情况下 `SQL` 与这些新系统不兼容或不合适，这些系统通常支持第
    11 章中描述的低级 `API` 的逐条记录处理。


    今天，`SQL` 已重新获得其作为数据库世界通用语的地位，并且似乎很清楚，大多数数据库都将允许 `SQL` 查询，无论是像 `Couchbase` 的 `N1QL`
    那样原生支持，还是通过像 `Apache Drill` 这样的 `SQL` 处理框架。即使对于那些不能原生支持全部 `SQL` 操作的数据库，我们也可以看到简化版的
    `SQL` 语法提高了可用性和程序员效率：例如，比较一下 `HBase` 提供的 `API` 与 `Apache Cassandra CQL` 提供的类似
    `SQL` 的接口（两者都在第 11 章中描述）。


    当前统一数据库面临的新兴挑战，与其说是为非关系系统提供 `SQL` 访问，不如说是允许对关系系统进行非 `SQL` 访问。虽然 `SQL` 语言可以满足广泛的数据查询需求，但它并不总是最合适的语言。特别是，有些数据科学问题可能需要更低级别的
    `API`，例如 `MapReduce`，或者更复杂的有向无环图（`DAG`）算法。我们还看到图遍历操作不能轻易用 `SQL` 指定，而可以用 `Gremlin`
    或 `Cypher` 等替代语法更轻松地表达。


    关系模型的一个正式原则是，不应允许绕过基于集合的查询语言（例如 `SQL`）。这在 `Codd` 的第 13 条规则（`nonsubversion`，非支配性）中有明确规定。然而，如果关系数据库希望在所有领域保持相关性，可能有必要放宽这条规则，或者在
    `SQL` 基础之上提供替代的处理 `API`。

