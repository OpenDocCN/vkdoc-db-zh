    # 10. Data Models and Storage


    > A model’s just an imitation of the real thing. — [Mae West](http://www.goodreads.com/author/show/259666.Mae_West)
    The ocean flows of online information are all streaming together, and the access
    tools are becoming absolutely critical. If you don’t index it, it doesn’t exist.
    It’s out there but you can’t find it, so it might as well not be there. — [Barbara
    Quint](http://www.goodreads.com/author/show/863738.Barbara_Quint)


