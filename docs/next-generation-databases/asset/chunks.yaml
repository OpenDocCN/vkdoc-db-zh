    for a column store on our simple example database. The row store need only perform
    a single IO to insert a new value, while the column store must update as many
    disk blocks as there are columns.


    ![A978-1-4842-1329-2_6_Fig4_HTML.jpg](A978-1-4842-1329-2_6_Fig4_HTML.jpg)


    Figure 6-4.


    Insert overhead for a column store


    In real-world row stores (e.g., traditional RDBMS), inserts require more than
    a single IO because of indexing overhead, and real-world column stores implement
    mitigating schemes to avoid the severe overhead during single-row modifications.
    However, the fundamental principle—that column stores perform poorly during single-row
    modifications—is valid.'
  trans: '

    # 数据仓库模式


    在 Edgar Codd 发表其关于关系数据库模型的开创性论文时，数据库工作负载主要由基于记录的处理所主导：即所谓的 CRUD 操作（创建、读取、更新、删除）是最为关键的，而报表程序通常遍历整个表，并在后台批处理模式下运行，查询响应时间并非关键问题。然而，在
    20 世纪 80 年代末和 90 年代，越来越多的关系型数据库被要求支持分析型和决策支持型应用，这些应用通常要求交互式的响应时间。这些系统被称为数据仓库，并且日益与生成原始数据的
    OLTP 系统并行运行。Edgar Codd 创造了缩写词 OLAP（在线分析处理）来区分这些工作负载与 OLTP 系统的工作负载。


    将 OLTP 和 OLAP 工作负载分离对于维护 OLTP 系统的服 务级别响应时间至关重要：突发的 I/O 密集型聚合查询通常会导致 OLTP 系统出现不可接受的响应时间下降。但同样重要的是，OLAP
    系统要求的模式与 OLTP 系统不同。


    开发星型模式是为了创建数据仓库，其中聚合查询可以快速执行，并为商业智能（BI）工具提供可预测的模式。在星型模式中，中央的大型事实表与众多较小的维度表相关联。当维度表实现了一组更复杂的外键关系时，则该模式被称为雪花模式。


    图 6-1 展示了一个简化的星型模式示例。


    ![A978-1-4842-1329-2_6_Fig1_HTML.jpg](img/A978-1-4842-1329-2_6_Fig1_HTML.jpg)


    图 6-1. 星型模式


    注意：虽然星型模式常见于关系型数据库中，但它们并不代表一个完全规范化的关系数据模型。维度表和事实表通常都包含冗余信息，或者仅部分依赖于主键的信息。在某些方面，星型模式的广泛采用是朝着不再完全遵循
    Codd 关系模型迈出的一步。


    几乎所有的数据仓库都采用了星型模式范式的某种变体，几乎所有的关系型数据库都采用了索引和 SQL 优化方案来加速针对星型模式的查询。这些优化使得关系型数据仓库能够作为管理仪表板和流行
    BI 产品的基础。然而，尽管有这些优化，数据仓库中的星型模式处理仍然是极其消耗 CPU 和 I/O 资源的。随着数据量的增长和用户对交互式响应时间需求的持续，对传统数据仓库性能的不满日益增加。


    # 列式替代方案


    将数据以列式格式存储可能更好的想法可以追溯到 20 世纪 70 年代，尽管商用列式数据库直到 20 世纪 90 年代中期才出现。


    列式概念的核心是列的数据在磁盘上分组存放。图 6-2 比较了一些简单数据的列式存储和行式存储：在列式数据库中，特定列的值位于相同的磁盘块中；而在行式模型中，每一行的所有列都位于一起。


    ![A978-1-4842-1329-2_6_Fig2_HTML.jpg](img/A978-1-4842-1329-2_6_Fig2_HTML.jpg)


    图 6-2. 列式存储与行式存储的比较


    列式架构有两个主要优势。首先，在列式架构中，旨在聚合特定列值的查询得到了优化，因为所有要聚合的值都存在于相同的磁盘块中。图 6-3 以我们的示例数据库说明了这一现象；从行存储中检索薪资总和必须扫描五个块，而在列存储中只需访问一个块就足够了。


    ![A978-1-4842-1329-2_6_Fig3_HTML.jpg](img/A978-1-4842-1329-2_6_Fig3_HTML.jpg)


    图 6-3. 列式存储中的聚合操作需要更少的 I/O


    列式架构所提供的确切 I/O 和 CPU 优化因工作负载、索引和模式设计而异。通常，在列式数据库中，跨多行工作的查询会得到显著加速。


    ## 列式压缩


    列式架构的第二个关键优势是压缩。压缩算法主要通过消除数据值内的冗余来工作。高度重复的数据——特别是当这些重复是局部集中时——比重复度低的数据能实现更高的压缩比。尽管无论采用行式还是列式存储，整个数据库中的总重复量是相同的，但压缩方案通常尝试在数据的局部子集上工作；如果压缩能在隔离的数据块上进行，其
    CPU 开销会低得多。由于在列式数据库中，列在磁盘上存储在一起，因此实现更高的压缩比所需的计算成本要低得多。


    此外，在许多情况下，列式数据库会以排序顺序存储列数据。在这种情况下，只需将每个列值表示为与前一个列值的“增量”，即可实现非常高的压缩比。其结果是以极低的计算开销实现极高的压缩比。


    ## 列式写入惩罚


    列式架构的关键缺点——也是它对于 OLTP 数据库而言是一个糟糕选择的原因——是其施加在单行操作上的开销。在列式数据库中，检索单行需要从该表的每个列存储中组装该行。读取开销可以通过缓存和多列投影（在磁盘上将多个列存储在一起）来部分减少。然而，当涉及
    DML 操作——尤其是插入时——几乎无法避免必须修改每一行的所有列。


    图 6-4 展示了在我们的简单示例数据库上，列存储插入操作的开销。行存储只需执行一次 I/O 即可插入一个新值，而列存储必须更新与列数一样多的磁盘块。


    ![A978-1-4842-1329-2_6_Fig4_HTML.jpg](img/A978-1-4842-1329-2_6_Fig4_HTML.jpg)


    图 6-4. 列存储的插入开销


    在实际的行存储（例如，传统的 RDBMS）中，由于索引开销，插入需要不止一次 I/O；而实际的列存储则实现了缓解方案，以避免单行修改期间的严重开销。然而，基本原则——列存储在单行修改时性能不佳——是成立的。

    '
- fmt: '## Sybase IQ, C-Store, and Vertica


    In the mid-1990s, Sybase—one of the top four relational database vendors of the
    day— acquired Expressway. Expressway had developed what was arguably the first
    significant commercial column-oriented database. Expressway technology became
    the basis of Sybase IQ (“Intelligent Query”), which became Sybase’s flagship data
    warehousing platform. However, although Sybase IQ gained significant traction
    during the succeeding decade, and despite its leading-edge technology, Sybase
    IQ failed to dominate the data warehousing market. Industry recognition of the
    significance of columnar technology remained low.


    In 2005, relational pioneer and Ingres inventor Mike Stonebraker and colleagues
    published a paper outlining a formal database system that they called `C-store`.
    [¹](#A978-1-4842-1329-2_6_Chapter.html#Sec10) `C-store` shared many characteristics
    with existing columnar systems, as well as having some significant innovations
    to improve write performance. Stonebraker’s paper included `TPC-H` benchmark results
    that demonstrated the `C-Store` architecture was able to outperform existing row-based
    `DBMS` for data warehousing workloads.


    Stonebraker formed a company Vertica —to build a commercial implementation of
    `C-Store`. Vertica was acquired by HP in 2011.


    Timing is everything, and while Sybase IQ had delivered a successful commercial
    columnar database almost a decade earlier, `C-Store` and Vertica arrived just
    as cracks were emerging in the “one size fits all” relational edifice. `C-Store`
    and Vertica became emblematic of a new wave of systems that—while not rejecting
    the relational model or `SQL`—departed significantly from the traditional `RDBMS`
    architecture. Vertica became the poster child for a “NewSQL” database.


    Subsequent to the release of the `C-Store` model, several other significant column-based
    systems entered the market, including InfoBright, VectorWise, and MonetDB. Columnar
    technology also became an important element within many significant commercial
    relational databases, including Oracle Exadata, Microsoft SQL Server, and SAP
    HANA. (We’ll look at Oracle’s implementation later in this chapter and at HANA
    in the next chapter.)


    ## Column Database Architectures


    As we noted earlier, insert and update overhead for single rows is a key weakness
    of a columnar architecture. Many data warehouses were bulk-loaded in daily batch
    jobs—a classic overnight `ETL` scenario. However, it became increasingly important
    for data warehouses to provide real-time “up-to-the-minute” information, which
    implied that the data warehouse should be able to accept a constant trickle feed
    of changes. The simplistic columnar architecture outlined above would be unable
    to cope with this constant stream of row-level modifications.


    To address this issue, columnar databases generally implement some form of write-optimized
    delta store (we’ll call this the `delta store` for short). This area of the database
    is optimized for frequent writes. You can think simplistically of the data in
    the `delta store` as being in a row format, although in practice the internal
    format might still be columnar or a row/column hybrid. Regardless of the internal
    format of the data, the `delta store` is generally memory resident, the data is
    generally uncompressed, and the store can accept high-frequency data modifications.


    Data in the `delta store` is periodically merged with the main columnar-oriented
    store. In Vertica, this process is referred to as the `Tuple Mover` and in Sybase
    IQ as the `RLV (Row Level Versioned) Store Merge`. The merge will occur periodically,
    or whenever the amount of data in the `delta store` exceeds a threshold. Prior
    to the merge, queries might have needed to access both the `delta store` and the
    column store in order to return complete and accurate results.


    `Figure 6-5` shows a generic columnar database architecture. The database contains
    a primary column store that contains highly compressed columnar data backed by
    disk storage. A smaller write-optimized `delta store` contains data that is minimally
    compressed, memory resident, and possibly row oriented.


    ![A978-1-4842-1329-2_6_Fig5_HTML.jpg](A978-1-4842-1329-2_6_Fig5_HTML.jpg)


    `Figure 6-5`. Write optimization in column store databases


    Large-scale bulk sequential loads—such as nightly `ETL` jobs—will generally be
    directed to the column store (1). Incremental inserts and updates will be directed
    to the write-optimized store (2). Queries may need to read from both stores in
    order to get complete and consistent results (3). Periodically, or as required,
    a process will shift data from the write-optimized store to the column store (4).


    ### Projections


    In the simplistic description of a columnar database earlier, we showed each column
    stored together. For queries that access only a single column, storing each column
    in its own region on disk may be sufficient, but in practice complex queries need
    to read combinations of column data. It therefore sometimes makes sense to store
    combinations of columns together on disk.


    To achieve this, columnar databases such as Vertica store tables physically as
    a series of `projections`, which contain combinations of columns that are frequently
    accessed together.


    For instance, in `Figure 6-6` we see a single logical table with three projections.
    In Vertica, each table has a default `superprojection` that includes all the columns
    in the table (1). Additional projections are created to support specific queries.
    In this case, a projection is created to support sales aggregated by customer
    (2) and another projection created for sales aggregated by region and product
    (3).


    ![A978-1-4842-1329-2_6_Fig6_HTML.jpg](A978-1-4842-1329-2_6_Fig6_HTML.jpg)


    `Figure 6-6`. Columnar database table with three projections


    In Vertica, projections may be sorted on one or more columns. This decreases processing
    time for sort and aggregate operations, and also increases compression efficiency.
    Vertica also supports `pre-join projections` that materialize columns from multiple
    tables based on a join criterion. `Pre-join projections` serve a similar function
    to `materialized views` that are created to support specific join operations in
    traditional relational systems.


    `Projections` may be created manually by the database administrator, on the fly
    by the query optimizer in response to a specific `SQL`, or in bulk based on historical
    workloads. Creating the correct set of projections is of critical importance to
    columnar store performance—roughly equivalent to the importance of correct indexing
    in a row store.


    Sybase IQ refers to its query optimization structures as “indexes”; however, these
    indexes bear more resemblance to Vertica projections than to `B-Tree` indexes
    in Oracle or SQL Server. Indeed, the Sybase IQ default index—which is automatically
    created on all columns during table creation—is called the `fast projection index`.
    Sybase also supports other indexing options based on traditional `bitmap` and
    `B-Tree` indexing schemes.'
