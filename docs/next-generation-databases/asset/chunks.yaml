- fmt: '### Transaction Models


    The relational model does not itself define the way in which the database handles
    concurrent data change requests. These changes—generally referred to as database
    transactions—raise issues for all database systems because of the need to ensure
    consistency and integrity of data.


    Jim Gray defined the most widely accepted transaction model in the late 1970s.
    As he put it, “A transaction is a transformation of state which has the properties
    of atomicity (all or nothing), durability (effects survive failures) and consistency
    (a correct transformation).” [³](#A978-1-4842-1329-2_1_Chapter.html#Sec19) This
    soon became popularized as `ACID` transactions: Atomic, Consistent, Independent,
    and Durable. An `ACID` transaction should be:


    *   Atomic: The transaction is indivisible—either all the statements in the transaction
    are applied to the database or none are.

    *   Consistent: The database remains in a consistent state before and after transaction
    execution.

    *   Isolated: While multiple transactions can be executed by one or more users
    simultaneously, one transaction should not see the effects of other in-progress
    transactions.

    *   Durable: Once a transaction is saved to the database (in `SQL` databases via
    the `COMMIT` command), its changes are expected to persist even if there is a
    failure of operating system or hardware.


    `ACID` transactions became the standard for all serious database implementations,
    but also became most strongly associated with the relational databases that were
    emerging at about the time of Gray’s paper.


    As we will see later, the restriction on scalability beyond a single data center
    implied by the `ACID` transaction model has been a key motivator for the development
    of new database architectures.


    ### The First Relational Databases


    Initial reaction to the relational model was somewhat lukewarm. Existing vendors
    including `IBM` were disinclined to accept Codd’s underlying assumption: that
    the databases of the day were based on a flawed foundation. Furthermore, many
    had sincere reservations about the ability of a system to deliver adequate performance
    if the data representation was not fine-tuned to the underlying access mechanisms.
    Would it be possible to create a high-performance database system that allowed
    data to be accessed in any way the user could possibly imagine?


    `IBM` did, however, initiate a research program to develop a prototype relational
    database system in 1974, called `System R`. `System R` demonstrated that relational
    databases could deliver adequate performance, and it pioneered the `SQL` language.
    (Codd had specified that the relational system should include a query language,
    but had not mandated a specific syntax.) Also during this period, Mike Stonebraker
    at Berkeley started work on a database system that eventually was called `INGRES`.
    `INGRES` was also relational, but it used a non-`SQL` query language called `QUEL`.


    At this point, Larry Ellison enters our story. Ellison was more entrepreneurial
    than academic by nature, though extremely technically sophisticated, having worked
    at `Amdahl`. Ellison was familiar both with Codd’s work and with `System R`, and
    he believed that relational databases represented the future of database technology.
    In 1977, Ellison founded the company that would eventually become `Oracle Corporation`
    and which would release the first commercially successful relational database
    system.


    ### Database Wars!


    It was during this period that minicomputers challenged and eventually ended the
    dominance of the mainframe computer. Compared with today’s computer hardware,
    the minicomputers of the late ’70s and early ’80s were hardly “mini”. But unlike
    mainframes, they required little or no specialized facilities, and they allowed
    mid-size companies for the first time to own their own computing infrastructure.
    These new hardware platforms ran new operating systems and created a demand for
    new databases that could run on these operating systems.


    By 1981, `IBM` had released a commercial relational database called `SQL/DS`,
    but since it only ran on `IBM` mainframe operating systems, it had no influence
    in the rapidly growing minicomputer market. Ellison’s `Oracle` database system
    was commercially released in 1979 and rapidly gained traction on the minicomputers
    provided by companies such as `Digital` and `Data General`. At the same time,
    the Berkeley `INGRES` project had given birth to the commercial relational database
    `Ingres`. `Oracle` and `Ingres` fought for dominance in the early minicomputer
    relational database market.


    By the mid-’80s, the benefits of the relational database—if not the nuances of
    relational theory—had become widely understood. Database buyers appreciated in
    particular that the `SQL` language, now adopted by all vendors including `Ingres`,
    provided massive productivity gains for report writing and analytic queries. Furthermore,
    a next generation of database development tools—known at the time as 4GLs—were
    becoming increasingly popular and these new tools typically worked best with relational
    database servers. Finally, minicomputers offered clear price/performance advantages
    over mainframes especially in the midmarket, and here the relational database
    was pretty much the only game in town.


    Indeed, relational databases became so dominant in terms of mindshare that the
    vendors of the older database systems became obliged to describe their offerings
    as also being relational. This prompted Codd to pen his famous 12 rules (actually
    13 rules, starting at rule 0) as a sort of acid test to distinguish legitimate
    relational databases from pretenders.


    During the succeeding decades many new database systems were introduced. These
    include `Sybase`, `Microsoft SQL Server`, `Informix`, `MySQL`, and `DB2`. While
    each of these systems attempts to differentiate by claiming superior performance,
    availability, functionality, or economy, they are virtually identical in their
    reliance on three key principles: Codd’s relational model, the `SQL` language,
    and the `ACID` transaction model.


    Note


    When we say `RDBMS`, we generally refer to a database that implements the relational
    data model, supports `ACID` transactions, and uses `SQL` for query and data manipulation.


    ### Client-server Computing


    By the late 1980s, the relational model had clearly achieved decisive victory
    in the battle for database mindshare. This mindshare dominance translated into
    market dominance during the shift to client-server computing.


    Minicomputers were in some respects “little mainframes”: in a minicomputer application,
    all processing occurred on the minicomputer itself, and the user interacted with
    the application through dumb “green screen” terminals. However, even as the minicomputer
    was becoming a mainstay of business computing, a new revolution in application
    architecture was emerging.


    The increasing prevalence of microcomputer platforms based on the `IBM PC` standard,
    and the emergence of graphical user interfaces such as `Microsoft Windows`, prompted
    a new application paradigm: client-server. In the client-server model, presentation
    logic was hosted on a `PC` terminal typically running `Microsoft Windows`. These
    `PC`-based client programs communicated with a database server typically running
    on a minicomputer. Application logic was often concentrated on the client side,
    but could also be located within the database server using the stored procedures—programs
    that ran inside the database.


    Client-server allowed for a richness of experience that was unparalleled in the
    green-screen era, and by the early ’90s, virtually all new applications aspired
    to the client-server architecture. Practically all client-development platforms
    assumed an `RDBMS` backend—indeed, usually assumed `SQL` as the vehicle for all
    requests between client and server.'
