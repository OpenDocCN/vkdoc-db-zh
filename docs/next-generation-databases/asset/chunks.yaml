    ## 2. 谷歌、大数据与 Hadoop


    > 信息是 21 世纪的石油，而分析是内燃机。——彼得·桑德加，高德纳研究，2011 年

    > 数据的创造正在爆炸性增长。伴随着所有的自拍和人们拒绝从云端删除的无用文件……。世界的数据存储容量将被超越……。数据短缺、数据配给、数据黑市……数据末日！——加文·贝尔森，HBO《硅谷》，2015
    年


    在计算史上，没有什么比大数据的概念更能提升数据处理、存储和分析的关注度了。自 20 世纪 80 年代以来，我们就认为自己是一个信息时代社会，但媒体和公众对数据在社会中的作用的关注集中度从未像过去几年这样高过——这要归功于大数据。


    大数据技术包括那些让我们能从数据中获取更多意义的技术——例如机器学习——以及那些允许我们以比以往更高的粒度存储更大量数据的技术。


    谷歌开创了许多这些大数据技术，它们以`Hadoop`的形式进入了更广泛的 IT 社区。在本章中，我们将回顾谷歌数据管理技术的历史、`Hadoop`的出现，以及其他用于海量非结构化数据存储的技术的发展。'
- fmt: '## The Big Data Revolution


    Big Data is a broad term with multiple, competing definitions. For this author,
    it suggests two complementary significant shifts in the role of data within computer
    science and society:


    *   More data: We now have the ability to store and process all data—machine generated,
    multimedia, social networking, and transactional data—in its original raw format
    and maintain this data potentially in perpetuity.

    *   To more effect: Advances in machine learning, predictive analytics, and collective
    intelligence allow more value to be generated from data than ever before.


    This is not a book about the Big Data revolution; there are enough of those already.
    However, we should spend a few pages articulating the significance of Big Data
    as a concept so as to put these technologies into context.


    Big Data often seems like a meaningless buzz phrase to older database professionals
    who have been experiencing exponential growth in database volumes since time immemorial.
    There has never been a moment in the history of database management systems when
    the increasing volume of data has not been remarkable.


    However, it is true that the nature of organizational data today is qualitatively
    different from that of the recent past. Some have referred to this paradigm shift
    as an “industrial revolution" in data, and indeed this term seems apt. Before
    the industrial revolution, all products were created essentially by hand, whereas
    after the industrial revolution, products were created in assembly lines that
    were in factories. In a similar way, before the industrial revolution of data,
    all data was generated “in house.” Now, data comes in from everywhere: customers,
    social networks, and sensors, as well as all the traditional sources, such as
    sales and internal operational systems.


    ### Cloud, Mobile, Social, and Big Data


    Most would agree that the three leading information technology trends over the
    last decade have been in cloud, mobile, and social media. These three megatrends
    have transformed our economy, our society, and our everyday lives. The evolution
    of online retail over the past 15 years provides perhaps the most familiar example
    of these trends in motion.


    The term cloud computing started to gain mindshare in 2008, but what we now call
    “The Cloud” was truly born in the e-commerce revolution of the late 1990s. The
    emergence of the Internet as a universal wide area network and the World Wide
    Web as a business-to-customer portal drove virtually all businesses “into the
    cloud” via the creation of web-based storefronts.


    For some industries—music and books, for instance—the Internet rapidly became
    a significant or even dominant sales channel. But across the wider retail landscape,
    physical storefronts (brick-and-mortar stores) continued to dominate consumer
    interactions. Although retailers were fully represented in the cloud, consumers
    had only a sporadic and shallow presence. For most consumers, Internet connectivity
    was limited to a shared home computer or a desktop at work. The consumer was only
    intermittently connected to the Internet and had no online identity.


    The emergence of social networks and smartphones occurred almost simultaneously.
    Smartphones allowed people to be online at all times, while social networks provided
    the motivation for frequent Internet engagement. Within a few years, the average
    consumer’s Internet interactions accelerated: people who had previously interacted
    with the Internet just a few times a day were now continually online, monitoring
    their professional and social engagements through email and social networks.


    Consumers now found it convenient to shop online whenever the impulse arose. Furthermore,
    retailers quickly discovered that they could leverage information from social
    networks and other Internet sources to target marketing campaigns and personalize
    engagement. Retailers themselves created social network presences that complemented
    their online stores and allowed the retailer to engage the consumer directly through
    the social network.


    The synergy between the online business and the social network—mediated and enabled
    by the always connected mobile Internet—has resulted in a seismic shift in the
    retail landscape. The key to the effectiveness of the new retail model is data:
    the social-mobile-cloud generates masses of data that can be used to refine and
    enhance the online experience. This positive feedback loop drives the Big Data
    solutions that can represent success or failure for the next generation of retail
    operations.


    Retail is a familiar example, but similar dynamics drive almost every other industry.
    In some cases the Internet of Things (IoT)—by hooking virtually every physical
    device that collects or consumes data into the Internet—plays the equivalent role
    as the smartphone in the retail context. New connected devices—Internet-enabled
    cars, wearable devices, home automation, and so on—propel the virtuous data cycle
    that generates and depends on data to drive competitive advantage. Figure 2-1
    illustrates this cycle.


    ![A978-1-4842-1329-2_2_Fig1_HTML.jpg](A978-1-4842-1329-2_2_Fig1_HTML.jpg)


    Figure 2-1. The virtuous cycle of big data


    ## Google: Pioneer of Big Data


    When Google was first created in 1996, the World Wide Web was already a network
    of unparalleled scale; indeed, it was that very large scale that made Google’s
    key innovation—PageRank—such a breakthrough. Existing search engines simply indexed
    on keywords within webpages. This was inadequate, given the sheer number of possible
    matches for any search term; the results were primarily weighted by the number
    of occurrences of the search term within a page, with no account for usefulness
    or popularity. PageRank allowed the relevance of a page to be weighted based on
    the number of links to that page, and it allowed Google to immediately provide
    a better search outcome than its competitors.


    PageRank is a great example of a data-driven algorithm that leverages the “wisdom
    of the crowd” (collective intelligence) and that can adapt intelligently as more
    data is available (machine learning). Google is, therefore, the first clear example
    of a company that succeeded on the web through what we now call data science.'
