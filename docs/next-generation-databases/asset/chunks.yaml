- fmt: '# Databases like Cassandra


    Databases like `Cassandra` that are built on the `Dynamo` model already provide
    a tunable consistency model that allows the administrator or developer to choose
    a level of consistency or performance trade-off. `Dynamo`-based systems are well
    known for providing eventual consistency, but they are equally capable of delivering
    strict consistency—at least within a single-object transaction. `RDBMS` systems
    also provide control over isolation levels—providing levels that guarantee repeatable
    reads, for instance.


    However, systems like `Cassandra` that are based on `Dynamo` cannot currently
    provide multi-object transactions. Meanwhile, `RDBMS` consistency in existing
    implementations is influenced by `ACID` transactional principles, which require
    that the database always present a consistent view to all users.


    As we discussed in Chapter [3](#A978-1-4842-1329-2_3_Chapter.html), the ultimate
    motivation for eventual consistency-type systems is the ability to survive network
    partitions. If a distributed database is split in two by a network partition—the
    “split brain” scenario—the database can only maintain availability if it sacrifices
    some level of strict consistency.


    Implementing multi-row transactions within an eventually consistent, network partition-tolerant
    database would undoubtedly be a significant engineering challenge, but it is not
    obviously impossible. Such a database would allow the developer or the administrator
    to choose between strictly consistent `ACID` and eventually consistent transactions
    that involve multiple objects (as shown in Figure [12-2](#A978-1-4842-1329-2_12_Chapter.html#Fig2)).


    ![A978-1-4842-1329-2_12_Fig2_HTML.jpg](A978-1-4842-1329-2_12_Fig2_HTML.jpg)


    Figure 12-2.


    A possible convergence of consistency models


    ## Schema


    While relational fundamentalists may claim that commercial `RDBMS` systems have
    not implemented a pure version of the relational model, the traditional `RDBMS`
    has at least defined a well-defined discipline on the data modeling process. Data
    “normalization” eliminates redundancy and ambiguity from the logical representation.
    By and large, the relational representation of data has proved invaluable in providing
    non-programmers with a comprehensible view of data and—together with the adoption
    of `SQL` as a common language for data access—has offered a predictable and accessible
    interface to business intelligence and query tools.


    Dissent with the relational model arose for at least two reasons:


    - Programmers desired a data store that could accept object-oriented data without
    the overhead and complexity involved in deconstructing and reconstructing from
    normal form.

    - The lifecycle of a relational model represented somewhat of a waterfall process,
    requiring that the model be comprehensively defined at the beginning of a project
    and was difficult to change once deployed to production. Modern agile application
    development practices reject this waterfall approach in favor of an iterative
    development in which change to design is expected. Furthermore, modern web applications
    need to iterate new features fast in order to adapt to intense competitive environments.
    While modern `RDBMS` systems can perform online schema modifications, the coordination
    of code and schema change creates risk of application failure and generally requires
    careful and time-consuming change control procedures.


    In short, modern applications require flexible schemas that could be modified
    if necessary on the fly by changed application code.


    However, the need for a comprehensible and unambiguous data model that can be
    used for business intelligence is even more important in this world of Big Data
    than it was in the early relational era. Nonrelational databases are unable to
    easily integrate into an organization’s business intelligence (`BI`) capability;
    in the worst case, the data they contain are completely opaque to `BI` frameworks.


    Providing a best-of-both-worlds solution seems within the capabilities of some
    existing databases. A database that allows data to be represented at a high level
    in a relatively stable normal form, but which also allows for the storage of dynamically
    mutating data, only requires that columns in a relational table be able to store
    arbitrarily complex structures—`JSON`, for instance—and that these complex structures
    be supported by efficient query mechanisms integrated into `SQL`.


    As we will see, such hybrid capabilities already exist. Virtually all databases—relational
    and nonrelational—are introducing support for `JSON`. For instance, `Riak`, `Cassandra`,
    `PostgresSQL`, and `Oracle` all provide specific mechanisms for indexing, storing,
    and retrieving `JSON` structures. It will soon be meaningless to describe a database
    as a “document” database, since all databases will provide strong support for
    `JSON`.


    I’m sure that relational purists will argue such a hybrid solution is, in fact,
    the work of the devil in that it compromises the theoretical basis of the relational
    model. Perhaps so, and a relational implementation that allowed prototyping and
    rapid iteration of data models while preserving relational purity would be welcome.
    But for now I believe the short-term direction is set: we’re going to embed `JSON`
    in relational tables to balance flexibility with the advantages of the relational
    model. Figure [12-3](#A978-1-4842-1329-2_12_Chapter.html#Fig3) illustrates a vision
    for the convergence of schema elements in a database of the future.


    ![A978-1-4842-1329-2_12_Fig3_HTML.jpg](A978-1-4842-1329-2_12_Fig3_HTML.jpg)


    Figure 12-3.


    A possible convergence of schema models


    ## Database Languages


    `Codd`’s definition of the relational database did not specify the `SQL` language,
    and it is perfectly possible for a formally relational database to use some other
    language. However over time the advantages of a single cross platform data access
    language became obvious and the industry united behind `SQL`.


    The term “`NoSQL`” is unfortunate in that it implies a rejection of the `SQL`
    language rather than the more fundamental issues that were at the core of the
    changes in database technology. However, it is true that in many cases `SQL` was
    incompatible or inappropriate for these new systems that often supported record-at-a-time
    processing using low-level `API`s described in Chapter [11](#A978-1-4842-1329-2_11_Chapter.html).


    Today, `SQL` has regained its status as the lingua franca of the database world,
    and it seems clear that most databases will allow for `SQL` queries, whether natively
    as in `Couchbase`’s `N1QL` or via a `SQL` processing framework such as `Apache
    Drill`. Even for databases that cannot natively support the full range of `SQL`
    operations, we can see that a reduced `SQL` syntax enhances usability and programmer
    efficiency: compare, for instance, the `API` presented by `HBase` with the `SQL`-like
    interface provided by `Apache Cassandra CQL` (both are described in Chapter [11](#A978-1-4842-1329-2_11_Chapter.html)).


    The emerging challenge to unify databases is not so much to provide `SQL` access
    to nonrelational systems as to allow non-`SQL` access to relational systems. While
    the `SQL` language can satisfy a broad variety of data queries, it is not always
    the most suitable language. In particular, there are data science problems that
    may call for a lower-level `API` such as `MapReduce` or a more complex directed
    acyclic graph (`DAG`) algorithm. We’ve also seen how graph traversal operations
    cannot easily be specified in `SQL`, and can be more easily expressed in an alternative
    syntax such as `Gremlin` or `Cypher`.


    It’s a formal principle of the relational model that one ought not to be able
    to bypass the set-based query language (e.g., `SQL`). This is specified in `Codd`’s
    13^(th) rule (`nonsubversion`). However, if the relational database is going to
    maintain relevance across all realms, it may be necessary to either relax this
    rule or provide alternative processing `API`s on top of a `SQL` foundation.'
