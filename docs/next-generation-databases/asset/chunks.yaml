- fmt: 'Consider a database that maintains a social network like Facebook: although
    the application is programmed to allow only you to modify your own posts or personal
    details, the reality is that the Facebook company actually has total control over
    your online data. The staff there can— if they wish—remove your posts, censor
    your posts, or even modify your posts if they really want to. In a blockchain-based
    database, you would retain total ownership of your posts and it would be impossible
    for any other entity to modify them.


    Applications based on blockchain have the potential to disrupt a wide range of
    social and economic activities. Transfers of money, property, management of global
    identity (passports, birth certificates), voting, permits, wills, health data,
    and a multitude of other transactional data could be regulated in the future by
    blockchains. The databases that currently maintain records of these types of transactions
    may become obsolete.


    Most database owners will probably want to maintain control of the data in the
    database, and therefore it’s unlikely that blockchain will completely transform
    database technology in the short term. However, it does seem likely that database
    systems will implement blockchain-based authentication and authorization protocols
    for specific application scenarios. Furthermore, it seems likely that formal database
    systems built on a blockchain foundation will soon emerge.


    ## Quantum Computing


    The origins of quantum physics date back over 100 years, with the recognition
    that energy consists of discrete packets, or quanta.


    By the 1930s, most of the mindboggling theories of quantum physics had been fully
    articulated. Individual photons of light appear to pass simultaneously through
    multiple slits in the famous twin-slit experiment, providing they are not observed.
    The photons are superimposed across multiple states. Attempts to measure the path
    of the photons causes them to collapse into a single state. Photons can be entangled,
    in which case the state of one photon may be inextricably linked with the state
    of an otherwise disconnected particle—what Albert Einstein called “spooky action
    at a distance.”


    As Niels Bohr famously said, “If quantum mechanics hasn’t profoundly shocked you,
    you haven’t understood it yet.” The conventional view of quantum physics is that
    multiple simultaneous probabilities do not resolve until perceived by a conscious
    observer. This Copenhagen interpretation serves as the basis for the famous `Schrödinger’s
    Cat` thought experiment, in which a cat is simultaneously dead and alive when
    unobserved in an elaborate quantum contraption. Some have conjectured that Schrödinger’s
    dog actually proposed this experiment. [¹](#A978-1-4842-1329-2_12_Chapter.html#Sec24)


    The undeniably mindboggling weirdness of various quantum interpretations does
    have significant implications for real-world technology: most modern electronics
    are enabled directly or indirectly by quantum theories, and this is especially
    true in computing, where the increasing density of silicon circuitry takes us
    ever closer to the “realm of the very small” where quantum effects dominate.


    Using quantum effects to create a new type of computer was popularized by physicist
    Richard Feynman back in the 1980s. The essential concept is to use subatomic particle
    behavior as the building blocks of computing. In essence, the logic gates and
    silicon-based building blocks of today’s physical computers would be replaced
    by mechanisms involving superimposition and entanglement at the subatomic level.


    Quantum computers promise to provide a mechanism for leapfrogging the limitations
    of silicon-based technology and raise the possibility of completely revolutionizing
    cryptography. The promise that quantum computers could break existing private/public
    key encryption schemes seems increasingly likely, while quantum key transmission
    already provides a tamper-proof mechanism for transmitting certificates over distances
    within a few hundreds of kilometers.


    If quantum computing realizes its theoretical potential, it would have enormous
    impact on all areas of computing—databases included. There are also some database-specific
    quantum computing proposals:


    *   Quantum transactions: Inspired by the concept of superimposition, it’s proposed
    that data in a database could be kept in a “quantum” state, effectively representing
    multiple possible outcomes. The multiple states collapse into an outcome when
    “observed.” For example, seat allocations in an aircraft could be represented
    as the sum of all possible seating arrangements, which “collapse” when final seat
    assignments are made; the collapse could be mediated by various seating preferences:
    requests to sit together or for aisle or window seats. This approach leverages
    quantum concepts but does not require a quantum computing infrastructure, though
    a quantum computer could enable such operations on a potentially massive scale.
    [²](#A978-1-4842-1329-2_12_Chapter.html#Sec24)

    *   Quantum search: A quantum computer could potentially provide an acceleration
    of search performance over a traditional database. A quantum computer could more
    rapidly execute a full-table scan and find matching rows for a complex non-indexed
    search term. [³](#A978-1-4842-1329-2_12_Chapter.html#Sec24) The improvement is
    unlikely to be decisive when traditional disk access is the limiting factor, but
    for in-memory databases, it’s possible that quantum database search may become
    a practical innovation.

    *   A quantum query language: The fundamental unit of processing in a classical
    (e.g., non-quantum) computer is the `bit`, which represents one of two binary
    states. In a quantum computer, the fundamental unit of processing is the `qubit`,
    which represents the superimposition of all possible states of a `bit`. To persistently
    store the information from a quantum computer would require a truly quantum-enabled
    database capable of executing logical operations using `qubit` logic rather than
    Boolean `bit` logic. Operations on such a database would require a new language
    that could represent quantum operations instead of the relational predicates of
    `SQL`. Such a language has been proposed: Quantum Query Language (`QQL`). [⁴](#A978-1-4842-1329-2_12_Chapter.html#Sec24)


    Promises of practical quantum computing have been made for several decades now,
    but to date practical applications have been notably absent. It’s quite possible
    that true quantum computing will turn out to be unobtainable or will prove to
    be impractical for mainstream applications. But if quantum computing achieves
    even some of its ambitions it will change the computing landscape dramatically,
    and databases will not be immune from the repercussions.


    ## Conclusion


    In this book I’ve tried to outline the market and technology forces that “broke”
    the decades-old dominance of the `RDBMS`. In Chapter [1](#A978-1-4842-1329-2_1_Chapter.html),
    I argued that there was no one-size-fits-all architecture that could meet all
    the needs of diverse modern applications. I still believe that to be true.


    I’d also like to reiterate that I believe the modern `RDBMS`—essentially a combination
    of relational model, `ACID` transactions, and the `SQL` language—represents an
    absolute triumph of software engineering. The `RDBMS` revolutionized computing,
    database management, and application development. I believe it is apparent that
    the `RDBMS` remains the best single choice for the widest variety of application
    workloads, and that it has and will continue to stand the test of time.'
  raw: 'Consider a database that maintains a social network like Facebook: although
    the application is programmed to allow only you to modify your own posts or personal
    details, the reality is that the Facebook company actually has total control over
    your online data. The staff there can— if they wish—remove your posts, censor
    your posts, or even modify your posts if they really want to. In a blockchain-based
    database, you would retain total ownership of your posts and it would be impossible
    for any other entity to modify them.


    Applications based on blockchain have the potential to disrupt a wide range of
    social and economic activities. Transfers of money, property, management of global
    identity (passports, birth certificates), voting, permits, wills, health data,
    and a multitude of other transactional data could be regulated in the future by
    blockchains. The databases that currently maintain records of these types of transactions
    may become obsolete.


    Most database owners will probably want to maintain control of the data in the
    database, and therefore it’s unlikely that blockchain will completely transform
    database technology in the short term. However, it does seem likely that database
    systems will implement blockchain-based authentication and authorization protocols
    for specific application scenarios. Furthermore, it seems likely that formal database
    systems built on a blockchain foundation will soon emerge.


    ### Quantum Computing


    The origins of quantum physics date back over 100 years, with the recognition
    that energy consists of discrete packets, or quanta.


    By the 1930s, most of the mindboggling theories of quantum physics had been fully
    articulated. Individual photons of light appear to pass simultaneously through
    multiple slits in the famous twin-slit experiment, providing they are not observed.
    The photons are superimposed across multiple states. Attempts to measure the path
    of the photons causes them to collapse into a single state. Photons can be entangled,
    in which case the state of one photon may be inextricably linked with the state
    of an otherwise disconnected particle—what Albert Einstein called “spooky action
    at a distance.”


    As Niels Bohr famously said, “If quantum mechanics hasn’t profoundly shocked you,
    you haven’t understood it yet.” The conventional view of quantum physics is that
    multiple simultaneous probabilities do not resolve until perceived by a conscious
    observer. This Copenhagen interpretation serves as the basis for the famous Schrödinger’s
    Cat thought experiment, in which a cat is simultaneously dead and alive when unobserved
    in an elaborate quantum contraption. Some have conjectured that Schrödinger’s
    dog actually proposed this experiment. [¹](#A978-1-4842-1329-2_12_Chapter.html#Sec24)


    The undeniably mindboggling weirdness of various quantum interpretations does
    have significant implications for real-world technology: most modern electronics
    are enabled directly or indirectly by quantum theories, and this is especially
    true in computing, where the increasing density of silicon circuitry takes us
    ever closer to the “realm of the very small” where quantum effects dominate.


    Using quantum effects to create a new type of computer was popularized by physicist
    Richard Feynman back in the 1980s. The essential concept is to use subatomic particle
    behavior as the building blocks of computing. In essence, the logic gates and
    silicon-based building blocks of today’s physical computers would be replaced
    by mechanisms involving superimposition and entanglement at the subatomic level.


    Quantum computers promise to provide a mechanism for leapfrogging the limitations
    of silicon-based technology and raise the possibility of completely revolutionizing
    cryptography. The promise that quantum computers could break existing private/public
    key encryption schemes seems increasingly likely, while quantum key transmission
    already provides a tamper-proof mechanism for transmitting certificates over distances
    within a few hundreds of kilometers.


    If quantum computing realizes its theoretical potential, it would have enormous
    impact on all areas of computing—databases included. There are also some database-specific
    quantum computing proposals:


    *   Quantum transactions: Inspired by the concept of superimposition, it’s proposed
    that data in a database could be kept in a “quantum” state, effectively representing
    multiple possible outcomes. The multiple states collapse into an outcome when
    “observed.” For example, seat allocations in an aircraft could be represented
    as the sum of all possible seating arrangements, which “collapse” when final seat
    assignments are made; the collapse could be mediated by various seating preferences:
    requests to sit together or for aisle or window seats. This approach leverages
    quantum concepts but does not require a quantum computing infrastructure, though
    a quantum computer could enable such operations on a potentially massive scale.
    [²](#A978-1-4842-1329-2_12_Chapter.html#Sec24)

    *   Quantum search: A quantum computer could potentially provide an acceleration
    of search performance over a traditional database. A quantum computer could more
    rapidly execute a full-table scan and find matching rows for a complex non-indexed
    search term. [³](#A978-1-4842-1329-2_12_Chapter.html#Sec24) The improvement is
    unlikely to be decisive when traditional disk access is the limiting factor, but
    for in-memory databases, it’s possible that quantum database search may become
    a practical innovation.

    *   A quantum query language: The fundamental unit of processing in a classical
    (e.g., non-quantum) computer is the bit, which represents one of two binary states.
    In a quantum computer, the fundamental unit of processing is the qubit, which
    represents the superimposition of all possible states of a bit. To persistently
    store the information from a quantum computer would require a truly quantum-enabled
    database capable of executing logical operations using qubit logic rather than
    Boolean bit logic. Operations on such a database would require a new language
    that could represent quantum operations instead of the relational predicates of
    SQL. Such a language has been proposed: Quantum Query Language (QQL). [⁴](#A978-1-4842-1329-2_12_Chapter.html#Sec24)


    Promises of practical quantum computing have been made for several decades now,
    but to date practical applications have been notably absent. It’s quite possible
    that true quantum computing will turn out to be unobtainable or will prove to
    be impractical for mainstream applications. But if quantum computing achieves
    even some of its ambitions it will change the computing landscape dramatically,
    and databases will not be immune from the repercussions.


    ## Conclusion


    In this book I’ve tried to outline the market and technology forces that “broke”
    the decades-old dominance of the RDBMS. In Chapter [1](#A978-1-4842-1329-2_1_Chapter.html),
    I argued that there was no one-size-fits-all architecture that could meet all
    the needs of diverse modern applications. I still believe that to be true.


    I’d also like to reiterate that I believe the modern RDBMS—essentially a combination
    of relational model, ACID transactions, and the SQL language—represents an absolute
    triumph of software engineering. The RDBMS revolutionized computing, database
    management, and application development. I believe it is apparent that the RDBMS
    remains the best single choice for the widest variety of application workloads,
    and that it has and will continue to stand the test of time.'
  trans: '

    试想一个维护着类似 Facebook 社交网络的数据库：尽管应用程序被设计为只允许你修改自己的帖子或个人详情，但现实情况是 Facebook 公司实际上完全控制着你的在线数据。那里的员工——如果他们愿意——可以删除你的帖子、审查你的帖子，甚至在他们真想这么做时修改你的帖子。而在基于区块链的数据库中，你将完全拥有自己帖子的所有权，任何其他实体都不可能修改它们。


    基于区块链的应用有潜力颠覆广泛的社交和经济活动。资金转移、财产、全球身份管理（护照、出生证明）、投票、许可证、遗嘱、健康数据以及海量的其他交易数据，未来都可能由区块链来监管。目前维护这些类型交易记录的数据库可能会变得过时。


    大多数数据库所有者可能希望保持对数据库中数据的控制权，因此区块链在短期内不太可能彻底改变数据库技术。然而，数据库系统确实很可能会针对特定的应用场景，实施基于区块链的身份验证和授权协议。此外，基于区块链基础构建的正式数据库系统似乎也即将出现。


    ## 量子计算


    量子物理学的起源可以追溯到 100 多年前，当时人们认识到能量是由离散的包或量子组成的。


    到 20 世纪 30 年代，量子物理学中大多数令人难以置信的理论已被充分阐明。在著名的双缝实验中，单个光子似乎同时通过多个缝隙，前提是没有被观测。这些光子处于多重状态的叠加态。试图测量光子的路径会导致它们坍缩成单一状态。光子可以发生纠缠，在这种情况下，一个光子的状态可能与另一个原本无关的粒子的状态有着不可分割的联系——这被阿尔伯特·爱因斯坦称为“幽灵般的超距作用”。


    正如尼尔斯·玻尔那句名言所说：“如果你没有对量子力学感到深刻震惊，那说明你还没理解它。”量子物理学的传统观点是，多重同时存在的概率直到被有意识的观察者感知时才会坍缩确定下来。这种哥本哈根诠释是著名的
    `薛定谔的猫` 思想实验的基础，在该实验中，一只猫在一个精巧的量子装置中，当未被观测时，会同时处于死和活的状态。有人推测其实是薛定谔的狗提出了这个实验。¹


    各种量子诠释所无可否认的、令人难以置信的怪异性，对现实世界技术确实有着重大影响：大多数现代电子产品都直接或间接地由量子理论赋能，在计算领域尤其如此，那里硅电路日益增长的密度使我们越来越接近量子效应占主导的“极小领域”。


    利用量子效应来创造一种新型计算机的想法，在 20 世纪 80 年代由物理学家理查德·费曼推广开来。其核心概念是使用亚原子粒子行为作为计算的构建基础。本质上，当今物理计算机的逻辑门和硅基构建模块，将被涉及亚原子层面叠加和纠缠的机制所取代。


    量子计算机有望提供一种机制，以跨越硅基技术的限制，并彻底革新密码学带来了可能。量子计算机能够破解现有私钥/公钥加密方案的预言似乎越来越可能成为现实，而量子密钥传输已经提供了一种防篡改机制，可在数百公里范围内传输证书。


    如果量子计算实现了其理论潜力，它将对计算的所有领域——包括数据库——产生巨大影响。也有一些针对数据库的特定量子计算提议：


    *   量子事务：受叠加概念的启发，有人提议数据库中的数据可以保持在一种“量子”状态，有效地表示多种可能的结果。当被“观测”时，这些多重状态会坍缩成一种结果。例如，飞机上的座位分配可以表示为所有可能座位安排的总和，当最终座位分配确定时，这种叠加会“坍缩”；坍缩可以通过各种座位偏好来调节：请求坐在一起，或要求靠过道或靠窗的座位。这种方法利用了量子概念，但不需要量子计算基础设施，尽管量子计算机可以在潜在的大规模上实现此类操作。²

    *   量子搜索：量子计算机有可能为传统数据库提供搜索性能的加速。量子计算机可以更快地执行全表扫描，为复杂的非索引搜索项找到匹配的行。³ 当传统磁盘访问是限制因素时，这种改进不太可能是决定性的，但对于内存数据库，量子数据库搜索有可能成为一项实用的创新。

    *   量子查询语言：在经典（即非量子）计算机中，处理的基本单位是 `比特`，它表示两种二进制状态之一。在量子计算机中，处理的基本单位是 `量子比特`，它表示一个
    `比特` 所有可能状态的叠加。要持久存储来自量子计算机的信息，将需要一个真正具备量子能力的数据库，能够使用 `量子比特` 逻辑而非布尔 `比特` 逻辑执行逻辑操作。对这样的数据库进行操作，将需要一种能够表示量子操作而非
    `SQL` 关系谓词的新语言。这样一种语言已被提出：量子查询语言（`QQL`）。⁴


    几十年来，关于实用量子计算的承诺不断，但迄今为止，实际应用明显缺席。真正的量子计算很可能最终被证明是无法实现的，或者对于主流应用来说不切实际。但是，即使量子计算只实现了其部分目标，它也将极大地改变计算格局，数据库也难以免受其影响。


    ## 结论


    在本书中，我试图概述那些“打破”了 `RDBMS` 数十年主导地位的市场和技术力量。在第 1 章中，我认为没有一种万能架构能够满足多样化现代应用的所有需求。我至今仍然相信这一点。


    我还想重申，我认为现代的 `RDBMS`——本质上是关系模型、`ACID` 事务和 `SQL` 语言的结合体——代表了软件工程的一项绝对胜利。`RDBMS`
    彻底改变了计算、数据库管理和应用开发。我相信显而易见的是，对于最广泛的应用工作负载而言，`RDBMS` 仍然是最佳单一选择，并且它已经并将继续经受住时间的考验。

    '
- fmt: 'That having been said, it is also clear that the RDBMS architecture that was
    established in the 1990s does not form a universal solution for the complete variety
    of applications being built today. Even if it could, it is clear that in the world
    we live in, developers, application architects, CTOs, and CIOs are increasingly
    looking to nonrelational alternatives. It behooves us as database professionals
    to understand the driving forces behind these nonrelational alternatives, to understand
    their architectures, and to be in a position to advise on, manage, and exploit
    these systems.


    As I have learned more about the technologies underpinning modern next-generation
    database architectures, I have come to believe that the Cambrian explosion of
    database diversity we’ve seen in the last 10 years would—or at least should—be
    followed by a period of convergence. There are too many choices confronting database
    users, and too many compromises required when selecting the best database for
    a given application workload. We shouldn’t have to sacrifice multi-row transactions
    in order to achieve network partition tolerance, nor should we have to throw out
    the relational baby with the bathwater when we want to allow an application to
    dynamically evolve schema elements. Thus, I hope for a future in which these choices
    become a matter of configuration within a single database architecture rather
    than a Hobson’s choice between multiple, not quite right systems.


    Clear signs of convergence are around us: the universal acceptance of JSON into
    relational systems, the widespread readoption of SQL as the standard language
    for database access, and the introduction of lightweight transactions into otherwise
    nontransactional systems.


    In this chapter I’ve tried to outline some of the options that an ideal database
    system should provide in order to reach this Nirvana. We are clearly many years
    away from being able to deliver such a converged system. But that doesn’t stop
    a database veteran from dreaming!


    I feel cautiously confident that convergence will be the dominant force shaping
    databases over the next few years. However, there are technologies on the horizon
    that could force paradigm shifts: quantum computing, blockchain, and universal
    memory, to mention a few.


    Despite the compromises, and the bewildering array of often incompatible or inconsistent
    technology models, it remains an exciting time to be a database professional.
    The period of relational dominance allowed us to hone our skills and master a
    coherent technology stack. Today’s challenge for the database professional is
    to understand the diversity of technologies that are available, to pick the best
    and most durable technologies for the job, and to optimize those technologies
    to the task at hand. Choosing and optimizing the right database enhances the capabilities
    and economies of the modern applications that—when put to the right purposes—help
    us build a more prosperous, benevolent, and integrated global community.


    ## Notes


    ```

    http://bit.ly/1jowDoC

    http://www.cs.cornell.edu/∼sudip/quantumdb.pdf

    http://arxiv.org/pdf/quant-ph/0301079v1.pdf

    http://arxiv.org/pdf/0705.4303v1.pdf

    ```


    # 13. Database Survey


    In this appendix I’ve provided a short description for the major database systems
    covered in this book.


    There are currently a huge number of database managements systems in use: The
    `DB-Engines` site (`http://db-engines.com/en/ranking`) ranks database systems
    according to their popularity using website references, search frequency, job
    postings, social network and `Stack Overflow` mentions. They track more than 250
    systems, of which more than 100 achieve a non-trivial score (a score greater than
    1.0 using their ranking scheme). Obviously I can’t include all of them here, and
    the choice of databases in this appendix—and within the book—represents nothing
    more than my subjective degree of interest in, and familiarity with, the various
    systems. Omission or inclusion shouldn’t be interpreted as representing endorsement
    or otherwise of the architecture or suitability for purpose of the system. Of
    the traditional relational vendors, I’ve included only `Oracle`; the coverage
    of their non-relational features in [Chapter 12](#A978-1-4842-1329-2_12_Chapter.html)
    argued for inclusion. However, many other relational vendors are implementing
    similar features (`JSON` integration, for instance).


    Although I’ve argued that the era of database proliferation is coming to an end,
    to be followed by an era of consolidation, nevertheless new database systems are
    being launched fairly frequently. Some of these might represent major innovations
    and prove to be game-changing. However, generally I have concentrated only on
    databases that have been in active use for at least a few years: experience suggests
    that many of the latest “revolutionary” new databases will fail to gain traction.


    The `db-engines.com` site provides an invaluable resource for tracking the relative
    popularity of databases. Their ranking system reflects more on Internet “chatter”
    than on revenues or enterprise adoption, but it does represent the single best
    resource for judging the relative level of mindshare for database systems.


    ## Aerospike


    Database Name: `Aerospike`


    License/Company: `AGPL` commercially distributed by Aerospike Corp.


    Wikipedia description:

    > Aerospike is a flash-optimized in-memory open-source NoSQL database and the
    name of the company that produces it.


    Vendor’s description:

    > High-performance NoSQL database delivering speed at scale.


    My take:

    `Aerospike` uses an architecture that assumes fast flash `SSD` as the persistence
    layer and uses memory to cache indexes only.


    Data model:

    Key-value


    Transactional model:

    Strictly consistent single-server transactions and eventually consistent across
    a cluster


    Clustering:

    Sharding and replication


    APIs:

    `Aerospike` query language (`AQL`) is a subset of `SQL` language and drivers for
    most common languages.


    ## Cassandra


    Database Name: `Apache Cassandra`


    License/Company: Open-source under `Apache` license

    `Datastax` provides an Enterprise edition


    Wikipedia description:

    > `Apache Cassandra` is an open-source distributed database management system
    designed to handle large amounts of data across many commodity servers, providing
    high availability with no single point of failure.


    Vendor’s description:

    > `Cassandra`’s masterless, shared-nothing architecture provides organizations
    with constant uptime for their transactional/operational database applications,
    as well as a flexible data model capable of storing today’s modern datatypes and
    operational simplicity for easy database management.


    My take:

    `Cassandra` was envisioned as a database system that could merge the best features
    from Google’s `BigTable` and Amazon’s `Dynamo`. `Cassandra` has achieved some
    of the most high-scale `NoSQL` implementations at sites like `Netflix`. `Cassandra`
    has implemented significant innovations beyond its `BigTable` and `Dynamo` influences
    and clearly stands as a leader in the `NoSQL` category.


    Data model:

    Based on the `BigTable` wide column model, but with a narrow column abstraction
    provided through the `Cassandra Query Language (CQL)` interface


    Transactional model:

    `Dynamo`-style tunable consistency together with a `Paxos`-based lightweight transaction
    capability


    Clustering:

    Consistent hashing


    APIs:

    `CQL`'
