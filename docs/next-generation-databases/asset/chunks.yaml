    11](#A978-1-4842-1329-2_11_Chapter.html).


    ![A978-1-4842-1329-2_4_Fig8_HTML.jpg](A978-1-4842-1329-2_4_Fig8_HTML.jpg)


    Figure 4-8.


    MongoDB JavaScript query and SQL equivalent


    MongoDB established a strong lead in the NoSQL database space by providing a developer-friendly
    ecosystem and architecture. Developers looking for a nonrelational alternative—typically
    to MySQL or Oracle—found it relatively easy to get started with MongoDB. Developer-led
    adoption of MongoDB was robust, and today MongoDB can claim to be the most widely
    used nonrelational database.


