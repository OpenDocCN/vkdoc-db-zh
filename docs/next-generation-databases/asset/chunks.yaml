- fmt: '### Object-oriented Programming and the OODBMS


    Shortly after the client-server revolution, another significant paradigm shift
    impacted mainstream application-development languages. In traditional “procedural”
    programming languages, data and logic were essentially separate. Procedures would
    load and manipulate data within their logic, but the procedure itself did not
    contain the data in any meaningful way. Object-oriented (OO) programming merged
    attributes and behaviors into a single object. So, for instance, an employee object
    might represent the structure of employee records as well as operations that can
    be performed on those records—changing salary, promoting, retiring, and so on.
    For our purposes, the two most relevant principles of object-oriented programming
    are:


    *   Encapsulation: An object class encapsulates both data and actions (methods)
    that may be performed on that data. Indeed, an object may restrict direct access
    to the underlying data, requiring that modifications to the data be possible only
    via an objects methods. For instance, an employee class might include a method
    to retrieve salary and another method to modify salary. The salary-modification
    method might include restrictions on minimum and maximum salaries, and the class
    might allow for no manipulation of salary outside of these methods.

    *   Inheritance: Object classes can inherit the characteristics of a parent class.
    The employee class might inherit all the properties of a people class (DOB, name,
    etc.) while adding properties and methods such as salary, employee date, and so
    on.


    Object-oriented programming represented a huge gain in programmer productivity,
    application reliability, and performance. Throughout the late ’80s and early ’90s,
    most programming languages converted to an object-oriented model, and many significant
    new languages— such as Java—emerged that were natively object-oriented.


    The object-oriented programming revolution set the stage for the first serious
    challenge to the relational database, which came along in the mid-1990s. Object-oriented
    developers were frustrated by what they saw as an impedance mismatch between the
    object-oriented representations of their data within their programs and the relational
    representation within the database. In an object-0riented program, all the details
    relevant to a logical unit of work would be stored within the one class or directly
    linked to that class. For instance, a customer object would contain all details
    about the customer, with links to objects that contained customer orders, which
    in turn had links to order line items. This representation was inherently nonrelational;
    indeed, the representation of data matched more closely to the network databases
    of the CODASYL era.


    When an object was stored into or retrieved from a relational database, multiple
    `SQL` operations would be required to convert from the object-0riented representation
    to the relational representation. This was cumbersome for the programmer and could
    lead to performance or reliability issues. Figure 1-5 illustrates the problem.


    ![A978-1-4842-1329-2_1_Fig5_HTML.jpg](A978-1-4842-1329-2_1_Fig5_HTML.jpg)


    Figure 1-5.


    Storing an object in an `RDBMS` requires multiple `SQL` operations


    Advocates of object-oriented programming began to see the relational database
    as a relic of the procedural past. This led to the rather infamous quote: “A relational
    database is like a garage that forces you to take your car apart and store the
    pieces in little drawers.”


    The rapid success of object-oriented programming led almost inevitably to the
    proposition that an `Object Oriented Database Management System (OODBMS)` was
    better suited to meet the demands of modern applications. An `OODBMS` would store
    program objects directly without normalization, and would allow applications to
    load and store their objects easily. The object-oriented database movement created
    a manifesto outlining the key arguments for and properties of `OODBMS`. [⁴](#A978-1-4842-1329-2_1_Chapter.html#Sec19)
    In implementation, `OODBMS` resembles the navigational model from the pre-relational
    era—pointers within one object (a customer, for instance) would allow navigation
    to related objects (such as orders).


    Advocacy for the `OODBMS` model grew during the mid-’90s, and to many it did seem
    natural that the `OODBMS` would be the logical successor to the `RDBMS`. The incumbent
    relational database vendors—at this point, primarily `Oracle`, `Informix`, `Sybase`,
    and `IBM`—rapidly scrambled to implement `OODBMS` features within their `RDBMS`.
    Meanwhile, some pure `OODBMS` systems were developed and gained initial traction.


    However, by the end of the decade, `OODBMS` systems had completely failed to gain
    market share. Mainstream database vendors such as `Oracle` and `Informix` had
    successfully implemented many `OODBMS` features, but even these features were
    rarely used. OO programmers became resigned to the use of `RDBMS` systems to persist
    objects, and the pain was somewhat alleviated by `Object-Relational Mapping (ORM)`
    frameworks that automated the most tedious aspects of the translation.


    There are competing and not necessarily contradictory explanations for the failure
    of the OO database. For my part, I felt the advocates of the `OODBMS` model were
    concentrating on only the advantages an `OODBMS` offered to the application developer,
    and ignoring the disadvantages the new model had for those who wished to consume
    information for business purposes. Databases don’t exist simply for the benefit
    of programmers; they represent significant assets that must be accessible to those
    who want to mine the information for decision making and business intelligence.
    By implementing a data model that could only be used by the programmer, and depriving
    the business user of a usable `SQL` interface, the `OODBMS` failed to gain support
    outside programming circles.


    However, as we shall see in Chapter 4, the motivations for an `OODBMS` heavily
    influenced some of today’s most popular nonrelational databases.


    ### The Relational Plateau


    Once the excitement over object-oriented databases had run its course, relational
    databases remained unchallenged until the latter half of the 2000s. In fact, for
    a period of roughly 10 years (1995–2005), no significant new databases were introduced:
    there were already enough `RDBMS` systems to saturate the market, and the stranglehold
    that the `RDBMS` model held on the market meant no nonrelational alternatives
    could emerge. Considering that this period essentially represents a time when
    the Internet grew from geeky curiosity to an all-pervasive global network, that
    no new database architectures emerged during this period is astonishing, and it
    is a testament to the power of the relational model.


    ## The Third Database Revolution


    By the middle of the 2000s, the relational database seemed completely entrenched.
    Looking forward from 2005, it seemed that although we would see continuing and
    significant innovation within the relational database systems of the day, there
    were no signs of any radical changes to come. But in fact, the era of complete
    relational database supremacy was just about to end.


    In particular, the difference in application architectures between the client-server
    era and the era of massive web-scale applications created pressures on the relational
    database that could not be relieved through incremental innovation.'
