    SQL, with non-SQL access possible to underlying storage engines


    ## Oracle RDBMS


    Database Name: Oracle database 12c


    License/Company: Oracle


    Wikipedia description:


    Oracle Database (commonly referred to as Oracle RDBMS or simply as Oracle) is
    an object-relational database management system produced and marketed by Oracle
    Corp.


    Vendor’s description:'
  trans: '

    ## CQL


    Cassandra 查询语言（CQL）是一种类 SQL 语言，提供数据查询和操作接口。CQL 抽象了底层的宽列数据模型，呈现一个更类似于关系型的表格式界面。


    ## CouchBase


    数据库名称：Couchbase


    许可证/公司：Apache 许可证，由 Couchbase 公司提供商业支持


    维基百科描述：


    Couchbase Server，原名 Membase，是一个开源、分布式（无共享架构）的 NoSQL 面向文档数据库，针对交互式应用进行了优化。


    供应商描述：


    Couchbase Server 是一个为性能、可扩展性和可用性而设计的分布式 NoSQL 数据库。它使开发人员能够更轻松、更快速地构建应用程序，通过结合
    SQL 的强大功能和 JSON 的灵活性。


    我的看法：


    当今的 Couchbase Server 同时源自兼容 Memcached 的 Membase 和开创性的 JSON 数据库 CouchDB。Couchbase
    Server 仍然同时支持键值对和文档范式。`N1QL`——一种用于文档的 SQL 语言——的引入，帮助 Couchbase 与其他领先的文档数据库`MongoDB`区分开来。


    数据模型：


    键值对和 JSON


    事务模型：


    单文档事务的强一致性


    集群：


    分片和复制


    API：


    基于 REST 的 API，提供 Java 和其他语言的驱动程序，以及用于处理文档的`SQL`语言`N1QL`。


    ## DynamoDB


    数据库名称：DynamoDB


    许可证/公司：亚马逊


    维基百科描述：


    Amazon DynamoDB 是亚马逊公司作为亚马逊网络服务组合一部分提供的完全托管的专有 NoSQL 数据库服务。


    供应商描述：


    Amazon DynamoDB 是一个快速且灵活的 NoSQL 数据库服务，适用于所有需要在任何规模下保持一致、个位数毫秒延迟的应用程序。它是一个完全托管的云数据库，支持文档和键值存储模型。


    我的看法：


    亚马逊发明了 Dynamo 模型并提供占主导地位的公共云平台，因此基于 Dynamo 模型提供云数据库是自然而然的事情。DynamoDB 提供高性能、几乎无限的扩展性和非常低的管理开销。然而，对亚马逊的锁定和相对较高的价格可能限制了其当前的市场采用率。


    数据模型：


    支持列表、映射和 JSON 文档的键值存储。支持二级索引。


    事务模型：


    默认为最终一致，但应用程序可以请求一致性读取


    集群：


    一致性哈希


    API：


    基于 REST 的 API，提供 Java、.NET 和 PHP 的驱动程序


    ## HBase


    数据库名称：Apache HBase


    许可证/公司：Apache 许可证，由 Cloudera、MapR、Hortonworks 等公司提供商业支持


    维基百科描述：


    HBase 是一个开源、非关系型、分布式数据库，仿照谷歌的 BigTable 并用 Java 编写。它作为 Apache 软件基金会的 Apache Hadoop
    项目的一部分开发，运行在`HDFS`（Hadoop 分布式文件系统）之上，为 Hadoop 提供类似 BigTable 的功能。


    供应商描述：


    HBase 是为 Apache Hadoop 构建的高性能、分布式数据存储。


    我的看法：


    HBase 通过与 Hadoop 平台的关联实现了早期的市场渗透和技术加速，并已在许多站点的大规模环境中得到验证。与 Hadoop `HDFS`的紧密集成有助于其实现非常高的可用性，并为大数据分析提供了内置的协同效应。


    数据模型：


    BigTable 宽列族


    事务模型：


    严格一致的单行事务


    集群：


    范围键被分区到区域中，主服务器跟踪此分区。在磁盘级别，HBase 使用`HDFS`进行分发和复制。


    API：


    REST 和 Thrift 接口，附带 Java 驱动程序


    ## MarkLogic


    数据库名称：MarkLogic


    许可证/公司：专有，MarkLogic 公司


    维基百科描述：


    MarkLogic 被认为是一种多模型 NoSQL 数据库，因为它能够存储、管理和搜索 JSON 和 XML 文档以及图数据（RDF 三元组）。


    供应商描述：


    MarkLogic 是一个新一代数据库，它采用灵活的数据模型构建，用于存储、管理和搜索当今的数据，同时不牺牲上一代关系数据库的数据弹性和一致性特性。


    我的看法：


    在我们现在称之为 NoSQL 数据库出现之前，MarkLogic 已经构建了一个功能强大且广泛采用的 XML 数据库。MarkLogic 最近增加了对 JSON
    的支持，现在定位为一个组织级的 NoSQL 数据库。


    数据模型：


    XML， RDF， JSON


    事务模型：


    严格一致


    集群：


    分片


    API：


    `XQuery`， `XSLT`， `SPARQL`， REST


    ## MongoDB


    数据库名称：MongoDB


    许可证/公司：GNU AGPL， Apache 许可的驱动程序。由 MongoDB 公司提供商业支持。


    维基百科描述：


    MongoDB（源自"巨大"一词）是一个跨平台的面向文档数据库。被归类为 NoSQL 数据库，MongoDB 摒弃了传统的基于表的关系数据库结构，转而采用具有动态模式的类
    JSON 文档（MongoDB 将格式称为`BSON`），这使得在某些类型的应用程序中集成数据更容易、更快捷。


    供应商描述：


    MongoDB 是一个开源的文档数据库，旨在便于开发和扩展。MongoDB 提供高性能、高可用性和自动扩展。


    我的看法：


    MongoDB 在 NoSQL 采用方面建立了强大的领先优势，这得益于其在 Web 开发人员中的流行，在该领域，该数据库已经取代`MySQL`成为基于现代开源框架构建的网站的默认选择。


    数据模型：


    JSON 文档


    事务模型：


    单文档事务默认严格一致


    集群：


    哈希或范围分片，带主节点


    API：


    JavaScript 查询 API，提供 Java、.NET、Python 和其他语言的驱动程序


    ## Neo4J


    数据库名称：Neo4J


    许可证/公司：GPL/AGPL，由 Neo Technology 公司提供商业支持


    维基百科描述：


    Neo4j 是一个用 Java 实现的开源图数据库，其他语言编写的软件可以通过`Cypher`查询语言通过事务性 HTTP 端点访问。


    供应商描述：


    Neo4j 是世界领先的图数据库。


    我的看法：


    Neo4J 代表了使用最广泛的属性图数据库。Neo4J 的`Cypher`编程语言的开源版本可能成为一个标准。


    数据模型：


    属性图


    事务模型：


    严格一致


    集群：


    主从复制


    API：


    `Cypher`图编程语言，提供大多数编程语言的驱动程序


    ## NuoDB


    数据库名称：NuoDB


    许可证/公司：专有，由 NuoDB 公司提供


    维基百科描述：


    NuoDB 是一种在云中工作的新 SQL 数据库。它既可以用于单供应商，也可以用于多供应商的云设置。


    供应商描述：


    NuoDB 革命性的持久分布式缓存（`DDC`）架构结合了传统关系数据库管理系统的强大功能——丰富的`ANSI SQL`支持、完整的`ACID`事务、用于安全、备份和管理的组织级工具——以及对跨多个数据中心弹性扩展和持续可用性的支持。


    我的看法：


    NuoDB 是构建符合`ACID`的分布式 SQL 数据库的一次重要尝试。它包含一个可调节的一致性模型和一个可插拔的存储引擎架构。


    数据模型：


    建立在可插拔存储层之上的关系模型，该存储层可能包含非关系引擎


    事务模型：


    具有可调节一致性级别的`ACID`，可能导致最终一致行为


    集群：


    专有集群模型


    API：


    `SQL`，可以对底层存储引擎进行非`SQL`访问


    ## Oracle RDBMS


    数据库名称：Oracle database 12c


    许可证/公司：甲骨文


    维基百科描述：


    Oracle 数据库（通常称为 Oracle RDBMS 或简称 Oracle）是由甲骨文公司生产和销售的对象关系数据库管理系统。


    供应商描述：

    '
- fmt: 'Oracle Database 12c introduces a new multi-tenant architecture that makes
    it easy to consolidate many databases quickly and manage them as a cloud service.
    Oracle Database 12c also includes in-memory data processing capabilities delivering
    breakthrough analytical performance.


    My take:


    Oracle can claim to be the first successful commercial database based on the relational
    model and for roughly 30 years has dominated the database market.


    From a technology position, Oracle has generally led the market as well, pioneering
    many core RDBMS architectures including row-level locking, `MVCC`, and shared-disk
    clustering.


    Oracle provides a Hadoop appliance and a NoSQL key-value store. Within the core
    RDBMS it has implemented many document-oriented database features, including a
    `JSON` store with a `REST` interface.


    ### Data model


    Relational with extensions for object types (varrays, nested tables, etc.) and
    embedded `XML` and `JSON`


    ### Transactional model


    `ACID` with `MVCC`


    ### Clustering


    Shared disk cluster database (`RAC`) or sharding


    ### APIs


    `SQL` with a proprietary `PL/SQL` stored procedure language


    ## Redis


    Database Name: Redis


    License/Company: `BSD` license, commercially supported by Redis Labs


    Wikipedia description:


    Redis is a data structure server. It is open-source, networked, in-memory; it
    stores keys with optional durability.


    Vendor’s description:


    Redis is an open-source (`BSD` licensed), in-memory data structure store, used
    as database, cache, and message broker.


    My take:


    Redis is a popular lightweight in-memory key-value store.


    ### Data model


    Key-value


    ### Transactional model


    Strictly consistent within a single server


    ### Clustering


    Master-slave replication


    ### APIs


    API with drivers for most commonly used languages


    ## Riak


    Database Name: Apache Riak


    License/Company: Apache open-source project, commercialized by Basho Technologies


    Wikipedia description:


    Riak is a distributed NoSQL key-value data store that offers high availability,
    fault tolerance, operational simplicity, and scalability. Riak implements the
    principles from Amazon’s `Dynamo` paper with heavy influence from the `CAP` theorem.


    Vendor’s description:


    Riak is a distributed NoSQL database that is highly available, scalable, and easy
    to operate. It automatically distributes data across the cluster to ensure fast
    performance and fault tolerance.


    My take:


    Riak is a fairly pure implementation of the `Dynamo` key-value store concept together
    with `Solr` integration, time series extensions, and an object cloud storage product.
    Riak has significant adoption and is technically sophisticated.


    ### Data model


    Key-value


    ### Transactional model


    `Dynamo` tunable consistency


    ### Clustering


    Consistent hashing


    ### APIs


    `REST API` with drivers for Java, Ruby, Python, etc.


    ## SAP HANA


    Database Name: Hana


    License/Company: Proprietary, produced by `SAP` SE


    Wikipedia description:


    `SAP HANA` is an in-memory, column-oriented, relational database management system
    developed and marketed by `SAP` SE.


    Vendor’s description:


    Accelerates the pace of innovation with `SAP HANA`—an in-memory platform that
    combines an `ACID`-compliant database with advanced data processing, application
    services, and flexible data integration services.


    My take:


    Hana combines columnar or row-oriented storage formats and in-memory technology
    on a certified hardware specification to provide low latencies for `OLTP` or `OLAP`
    workloads.


    ### Data model


    Relational


    ### Transactional model


    `ACID`


    ### Clustering


    Shared-nothing partitioning


    ### APIs


    `SQL`


    ## TimesTen


    Database Name: TimesTen


    License/Company: Proprietary to Oracle


    Wikipedia description:


    TimesTen is an in-memory, relational database management system with persistence
    and recoverability.


    Vendor’s description:


    Oracle TimesTen In-Memory Database (TimesTen) is a full-featured, memory-optimized,
    relational database with persistence and recoverability.


    My take:


    An early entrant to the in-memory database category and a good example of an in-memory
    transactional relational architecture. Mainly significant today as part of Oracle’s
    broader software stack.


    ### Data model


    Relational


    ### Transactional model


    `ACID`


    ### Clustering


    None


    ### APIs


    `SQL`


    ## Vertica


    Database Name: Vertica


    License/Company: Proprietary, provided by `HP`


    Wikipedia description:


    The cluster-based, column-oriented Vertica Analytics Platform is designed to manage
    large, fast-growing volumes of data and provide very fast query performance when
    used for data warehouses and other query-intensive applications.


    Vendor’s description:


    `HP` Vertica is the most advanced `SQL` database analytics portfolio built from
    the very first line of code to address the most demanding Big Data analytics initiatives.


    My take:


    Vertica is a fairly faithful implementation of the concepts outlined in Stonebraker
    et al.’s seminal papers, which partially launched the `NewSQL` category. Together
    with `SAP Sybase IQ`, it represents an example of a database system based primarily
    on the columnar concepts.


    ### Data model


    Relational


    ### Transactional model


    `ACID`


    ### Clustering


    Shared-nothing


    ### APIs


    `SQL`


    ## VoltDB


    Database Name: VoltDB


    License/Company: Proprietary, VoltDB Corp.


    Wikipedia description:


    VoltDB is an in-memory database designed by several well-known database system
    researchers, including A. M. Turing Award winner Michael Stonebraker. It is an
    `ACID`-compliant `RDBMS` that uses a shared-nothing architecture.


    Vendor’s description:


    In-memory performance, never loses data. Streaming analytics with millisecond
    latency. `OLTP` in a scale-out architecture. `SQL` and `JSON` with `ACID` guarantees.


    My take:


    VoltDB implements a purer in-memory architecture than other databases that describe
    themselves as in-memory, but performs disk IOs during commit operations. The architecture
    is also notable for avoiding latching and locking within a single partition.


    ### Data model


    Relational, but partitioning works best when data is hierarchical


    ### Transactional model


    `ACID`


    ### Clustering


    Shared-nothing


    ### APIs


    `SQL` and Java stored procedures'
