    ## 存储


    磁盘或其他持久化介质上的数据结构对数据库性能和经济性具有巨大影响。第 7 章讨论了在多层存储（内存、固态硬盘、磁盘、`HDFS`）中进行数据分层的必要性。我们在第
    6 章也看到，数据的列式表示如何能为分析型数据库带来显著改进。最后，第 10 章揭示了传统`RDBMS`中占据主导地位的`B 树`索引结构，对于写密集型工作负载而言，可能不如`Cassandra`和`HBase`的日志结构合并树架构。


    因此，如同我们技术决策树上的其他分叉一样，不存在一种适用于所有工作负载的唯一正确的存储布局。如今，我们通常必须选择原生支持最适合我们应用程序存储布局的数据库。


    当然，数据库底层的存储机制对应用程序是隐藏的：检索数据的访问方法必须反映数据的模式表示，但磁盘上的结构通常对应用程序是不透明的。此外，我们已经看到能够维护多个存储引擎的数据库：`MySQL`拥有可插拔存储引擎接口已超过
    10 年，`MongoDB`最近也宣布了支持多种替代存储引擎的可插拔存储架构。


    在诸如`Hana`的系统中，我们还能看到根据预期工作负载需求为特定表选择行式或列式存储的能力。


    这种可插拔——或至少是“可选择”——的存储引擎架构，似乎是未来数据库发展的正确方向。我相信，这些数据库应允许将表或集合管理为列式或行式，由`B 树`或日志结构合并树提供支持，驻留于内存或存储在磁盘上。在某些情况下，我们甚至可能希望将数据存储为原生图格式，以支持实时图遍历（尽管在大多数情况下，将图计算引擎层叠在限制较少的结构上已足够）。图
    12-5 展示了可插拔存储引擎的愿景。


    ![A978-1-4842-1329-2_12_Fig5_HTML.jpg](img/A978-1-4842-1329-2_12_Fig5_HTML.jpg)

    图 12-5.

    数据库存储的融合选项


    ## 融合数据库的愿景


    通过整合数据库技术各个方面的融合愿景，我得以勾勒出理想数据库管理系统的特征。关键要求可总结如下：


    > 理想的数据库架构应在单一系统内支持多种数据模型、语言、处理范式和存储格式。那些要求特定数据库功能的应用程序需求，应通过单一数据库管理系统内的配置选项或可插拔特性来解决，而非从不同的数据库架构中进行选择。


    具体而言，一个理想的数据库架构将：

