  trans: '### 千刀万剐的分片


    分片——与缓存和复制一起——可以说是将关系型数据库扩展至大规模网络应用的唯一途径。然而，分片的运营成本巨大。分片策略的缺点包括：


    *   **应用复杂度**：将 `SQL` 请求路由到正确的分片由应用代码负责。在一个静态分片的数据库中，这已经足够困难；然而，大多数大型网站都在增长过程中不断增加分片，这意味着必须实现一个动态路由层。这一层通常需要额外复杂的代码来维护
    `Memcached` 对象副本，并区分主数据库和只读副本。

    *   **残缺的 `SQL`**：在分片数据库中，无法执行跨分片的 `SQL` 语句。这通常意味着 `SQL` 语句仅限于行级访问。跨分片的连接无法实现，聚合的
    `GROUP BY` 操作也无法进行。这实际上意味着只有程序员才能查询整个数据库。

    *   **事务完整性丧失**：跨多个分片的 `ACID` 事务是不可能的——或者至少不切实际。理论上，在某些支持`两阶段提交 (2PC)`的数据库系统中可以实现跨数据库的事务——但在实践中，这会造成冲突解决的问题、可能产生瓶颈、对
    `MySQL` 存在问题，并且很少被实施。

    *   **运营复杂性**：跨分片的负载均衡变得极为棘手。添加新分片需要复杂的数据再平衡。更改数据库模式也需要在所有分片上进行滚动操作，从而导致模式出现暂时的不一致。简而言之，分片数据库需要大量的运营工作和管理员技能。


    关系型数据库供应商——特别是 `Oracle`——曾试图创建一种关系型数据库实现，旨在提供分片数据库的可扩展性，同时不牺牲 `ACID` 和关系特性，也避免运营上的麻烦。`Oracle`
    的 `真正应用集群 (RAC)` 是透明可扩展、符合 `ACID` 标准的、关系型集群的最重要范例。


    在 `Oracle RAC` 数据库中，每个数据库节点都处理位于共享存储设备上的数据。这种共享磁盘集群与无共享模型形成对比，后者被其他集群数据库采用，更适用于数据仓库工作负载。（我们将在第
    8 章更详细地比较共享磁盘和无共享架构。）


    在 `RAC` 中添加新的数据库节点无需进行任何数据再平衡，并且在这些数据库节点之间实现了一种分布式内存缓存。`Oracle RAC` 曾展现出巨大的前景，并且确实得到了广泛应用。然而，它作为
    `MySQL` 分片模型的替代方案却失败了，原因有三：第一，它过于昂贵。第二，它未能证明具备最大型网站所需的可扩展性水平。第三，人们逐渐认识到，没有任何符合
    `ACID` 的数据库能够满足世界上最大型网站的需求。这最后一点限制是一种“物理定律”般的约束，在后来被称为 `CAP` 定理中得到了阐述。


    ### CAP 定理


    2000 年，埃里克·布鲁尔概述了“`CAP`”猜想，后来在提供了数学证明后被确立为定理。`CAP` 定理指出，在一个分布式数据库系统中，你最多只能同时拥有以下三者中的两者：一致性、可用性和分区容忍性。一致性意味着数据库的每个用户在任何给定时刻对数据都有完全一致的视图。可用性意味着在发生故障时，数据库仍保持可操作状态。分区容忍性意味着在分布式系统的两个部分之间的网络发生故障时，数据库仍能维持运行。


    在 2000 年，分区容忍性的问题在某种程度上还是理论性的。大多数系统位于单一数据中心内，该数据中心内的冗余网络连接防止了任何分区的发生。如果该数据中心发生故障，或许会启动一个故障转移数据中心。然而，当时几乎没有真正的多数据中心应用。


    但随着 Web 系统扩展到全球范围并追求持续可用性，分区容忍性成为一个现实问题。考虑图 3-3 所示的分布式应用。在发生图中所示的网络分区时，系统有两个选择：要么向每个用户显示不同的数据视图，要么关闭其中一个分区并断开其中一个用户的连接。


    `![A978-1-4842-1329-2_3_Fig3_HTML.jpg](img/A978-1-4842-1329-2_3_Fig3_HTML.jpg)`


    `图 3-3.`


    `分布式数据库应用中的网络分区`


    `Oracle` 的 `RAC` 解决方案当然支持 `ACID` 事务模型，在网络分区时（在 `Oracle` 领域被称为“脑裂”场景）会选择一致性。其中一个分区会选择关闭。然而，在全球社交网络应用或世界范围的电子商务系统背景下，期望的解决方案是即使牺牲用户之间的某些一致性也要保持可用性。


    ### 最终一致性


    `CAP` 定理提供了一个严苛的选择：如果你希望系统不受网络分区干扰，就必须牺牲分区间严格的强一致性。


    然而，即使不考虑 `CAP` 定理，`ACID` 事务在大型分布式网站中也日益难以为继。这更多地与性能而非可用性有关。在任何高可用的数据库系统中，为了在节点故障时允许系统继续运行，必须维护每个数据元素的多个副本。在全球分布式系统中，将节点分布到世界各地以降低各地的延迟变得越来越可取。然而，为了确保强一致性，有必要确保数据库变更被同步且立即地传播到多个节点。当其中一个节点位于地球的另一端时，这会造成不可避免的延迟增加。


    对于银行来说，这种延迟代价是无法避免的。然而，对于包括社交网络和某些电子商务运营在内的许多网站来说，这种全球范围的同步一致性是不必要的。我在澳大利亚的朋友比我在美国的朋友早几秒钟看到我的推文，这无关紧要。只要两位朋友最终都能看到这条推文，我就很满意了。


    这种最终一致性的概念已成为许多 `NoSQL` 数据库的关键特性。这一概念最著名的是由亚马逊首席技术官维尔纳·沃格尔斯提出，并在亚马逊的 `Dynamo`
    键值存储中得以实现。'
- fmt: '## Amazon’s Dynamo


    Amazon had pioneered many of the web technologies used in early Web 2.0, particularly
    the use of the Perl language to glue together databases and web front ends. Early
    Amazon used Oracle databases as the primary repository for catalogs, customer
    details, and orders. The load placed on the Oracle database was tremendous, and
    several notable Amazon outages were associated with database failures.


    Amazon tried splitting the website into multiple functional areas, each of which
    could have its own dedicated database. They were also very early adopters of service-oriented
    architecture (SOA), in which logical services such as `get-product-details` would
    be resolved not by SQL queries but by web service calls. This abstracted the database
    from the application layer and allowed Amazon to experiment with alternative database
    technologies.


    In 2007, Amazon revealed details of an alternative nonrelational system that had
    been developed internally to address the requirements of their massive online
    website. This system—called `Dynamo`—was built with the following requirements
    in mind:


    *   Continuous availability: Even the shortest application outage was incredibly
    costly for Amazon. The data store simply had to remain available under all foreseeable
    circumstances.

    *   Network partition tolerant: As a global e-commerce vendor with customers and
    data centers all around the world, Amazon was most concerned that a network partition
    should not force a loss of availability, even if that loss of availability was
    isolated to a particular geography.

    *   No-loss conflict resolution: Another of Amazon’s key requirements was that
    no order or shopping cart update should ever be lost. So for instance, if the
    user added items to his or her shopping cart from two different computers, both
    items should show up in the final cart. Furthermore, there should be no circumstances
    under which someone was blocked from adding an item to his or her cart, which
    implied that there be no exclusive write locks on objects.

    *   Efficiency: The system needed to respond quickly, since it was well understood
    that even small delays in website response time resulted in a significant reduction
    in online sales. Online customers were notoriously fickle and impatient.

    *   Economy: This system needed to be able to run on commodity hardware.

    *   Incremental scalability: It should be possible to grow the system by adding
    servers in small increments without manual maintenance or downtime.


    Amazon was willing to compromise on a lot of features of existing databases in
    order to achieve these goals.


    Principally, the data store should relax consistency—within limits—if necessary
    in order to ensure availability. The phrase “within limits” is important here:
    the system should favor availability over consistency, but in a predictable, controllable,
    and manageable way. Also, the trade-off between consistency and availability should
    be configurable—the application should be able to choose what happens if there
    is a network partition, for instance.


    Additionally, the data store need only support primary key-based access and need
    not support a data model: the values retrieved by a key lookup would be unstructured
    binary objects. Unlike Google’s `BigTable`, which had the design goal of storing
    massive files, the assumption for `Dynamo` was that most objects would be small—under
    1 MB.


    `Dynamo`—and many of the systems that it inspired—explicitly attempted to achieve
    a different outcome in terms of `CAP theorem`. Rather than try to always achieve
    consistency at the expense of network partition tolerance, `Dynamo` would allow
    (though not require) consistency to be sacrificed instead. See Figure 3-4.


    ![A978-1-4842-1329-2_3_Fig4_HTML.jpg](A978-1-4842-1329-2_3_Fig4_HTML.jpg)


    Figure 3-4. `Dynamo` and `ACID RDBMS` mapped to `CAP theorem` limits


    `Dynamo` has served as an architectural model for quite a few nonrelational databases.
    (We’ll look into the gory details of `Dynamo` internals in Chapters 8 and 9.)
    Some of the key architectural characteristics of `Dynamo` include:


    *   Consistent hashing: Consistent hashing is a scheme that uses the hash value
    of the primary key to determine the nodes in the cluster responsible for that
    key and that allows nodes to be added or removed from the cluster with minimal
    rebalancing overhead. See below for more details.

    *   Tunable consistency: The application can specify trade-offs between consistency,
    read performance, and write performance. It’s possible in `Dynamo` to specify
    strong consistency, eventual consistency, or weak consistency. See below for more
    details.

    *   Data versioning: Since write operations will never be blocked, it is possible
    that there will be multiple versions of an object in the system. Sometimes these
    can be merged by the data store itself, but sometimes they will need to be resolved
    by the application or user. For instance, if the buyer updates his or her shopping
    cart from two computers, the resulting cart may have duplicate items that he or
    she may need to remove.


    There are lots of complex design features in the `Dynamo` system; many of these
    will be discussed in Chapters 8 and 9. However, it would be remiss to continue
    without at least a little bit of elaboration on two of the key features: `consistent
    hashing` and `tunable consistency`.


    ### Consistent Hashing


    When we hash a key value, we perform a mathematical computation on the key value
    and use that computed value to determine where to store the data. One reason to
    use hashing is so that we are able to evenly distribute the data across a certain
    number of slots. The most simple example is to use the modulo function, which
    returns the remainder of a division. If we want to hash any number into 10 buckets,
    we can use modulo 10; then key 27 would map to bucket 7, key 32 would map to bucket
    2, key 25 to bucket 5, and so on.


    Using this method, we could map keys evenly across 10 servers. When we want to
    determine which node should store a particular item, we would calculate its modulo
    and use the result to locate the node. In practice, hashing functions are more
    complex than a simple modulo function, and a good hash function always distributes
    the hash values evenly across nodes, regardless of any skew in key values.


    Hashing works great as a way of distributing data evenly across a fixed number
    of nodes. But we have a problem if we add or remove a node—we have to recalculate
    the hash values and redistribute all the data. For instance, if we wanted to add
    a new server in the modulo 10 example above, we would recalculate hashes using
    modulo 11 and then we would have to move almost every data item accordingly. Consistent
    hashing works by hashing key values and applying a consistent method for allocating
    those hashed values to specific nodes.


    By convention and possibly federal law, consistent hashing schemes are represented
    as rings— because the hash values “loop around” to 0. Figure 3-5 shows what happens
    when a node is added to an existing cluster. Only those keys currently mapped
    to the “neighbors” of the new node need remapping.


    ![A978-1-4842-1329-2_3_Fig5_HTML.jpg](A978-1-4842-1329-2_3_Fig5_HTML.jpg)


    Figure 3-5. Adding a new node to the consistent hashing scheme


    The remapping process when a new node is added is still an expensive operation,
    and in practice `Dynamo`-based databases often employ a “virtual nodes” workaround
    to further reduce the overhead. This mechanism is explained in detail in Chapter
    8.'
  raw: '## Amazon’s Dynamo


    Amazon had pioneered many of the web technologies used in early Web 2.0, particularly
    the use of the Perl language to glue together databases and web front ends. Early
    Amazon used Oracle databases as the primary repository for catalogs, customer
    details, and orders. The load placed on the Oracle database was tremendous, and
    several notable Amazon outages were associated with database failures.


    Amazon tried splitting the website into multiple functional areas, each of which
    could have its own dedicated database. They were also very early adopters of service-oriented
    architecture (SOA), in which logical services such as get-product-details would
    be resolved not by SQL queries but by web service calls. This abstracted the database
    from the application layer and allowed Amazon to experiment with alternative database
    technologies.


    In 2007, Amazon revealed details of an alternative nonrelational system that had
    been developed internally to address the requirements of their massive online
    website. [¹](#A978-1-4842-1329-2_3_Chapter.html#Sec13) This system—called Dynamo—was
    built with the following requirements in mind:


    *   Continuous availability: Even the shortest application outage was incredibly
    costly for Amazon. The data store simply had to remain available under all foreseeable
    circumstances.

    *   Network partition tolerant: As a global e-commerce vendor with customers and
    data centers all around the world, Amazon was most concerned that a network partition
    should not force a loss of availability, even if that loss of availability was
    isolated to a particular geography.

    *   No-loss conflict resolution: Another of Amazon’s key requirements was that
    no order or shopping cart update should ever be lost. So for instance, if the
    user added items to his or her shopping cart from two different computers, both
    items should show up in the final cart. Furthermore, there should be no circumstances
    under which someone was blocked from adding an item to his or her cart, which
    implied that there be no exclusive write locks on objects.

    *   Efficiency: The system needed to respond quickly, since it was well understood
    that even small delays in website response time resulted in a significant reduction
    in online sales. Online customers were notoriously fickle and impatient.

    *   Economy: This system needed to be able to run on commodity hardware.

    *   Incremental scalability: It should be possible to grow the system by adding
    servers in small increments without manual maintenance or downtime.


    Amazon was willing to compromise on a lot of features of existing databases in
    order to achieve these goals.


    Principally, the data store should relax consistency—within limits—if necessary
    in order to ensure availability. The phrase “within limits” is important here:
    the system should favor availability over consistency, but in a predictable, controllable,
    and manageable way. Also, the trade-off between consistency and availability should
    be configurable—the application should be able to choose what happens if there
    is a network partition, for instance.


    Additionally, the data store need only support primary key-based access and need
    not support a data model: the values retrieved by a key lookup would be unstructured
    binary objects. Unlike Google’s BigTable, which had the design goal of storing
    massive files, the assumption for Dynamo was that most objects would be small—under
    1 MB.


    Dynamo—and many of the systems that it inspired—explicitly attempted to achieve
    a different outcome in terms of CAP theorem. Rather than try to always achieve
    consistency at the expense of network partition tolerance, Dynamo would allow
    (though not require) consistency to be sacrificed instead. See Figure [3-4](#A978-1-4842-1329-2_3_Chapter.html#Fig4).


    ![A978-1-4842-1329-2_3_Fig4_HTML.jpg](A978-1-4842-1329-2_3_Fig4_HTML.jpg)


    Figure 3-4.


    Dynamo and ACID RDBMS mapped to CAP theorem limits


    Dynamo has served as an architectural model for quite a few nonrelational databases.
    (We’ll look into the gory details of Dynamo internals in [Chapters 8](#A978-1-4842-1329-2_8_Chapter.html)
    and [9](#A978-1-4842-1329-2_9_Chapter.html).) Some of the key architectural characteristics
    of Dynamo include:


    *   Consistent hashing: Consistent hashing is a scheme that uses the hash value
    of the primary key to determine the nodes in the cluster responsible for that
    key and that allows nodes to be added or removed from the cluster with minimal
    rebalancing overhead. See below for more details.

    *   Tunable consistency: The application can specify trade-offs between consistency,
    read performance, and write performance. It’s possible in Dynamo to specify strong
    consistency, eventual consistency, or weak consistency. See below for more details.

    *   Data versioning: Since write operations will never be blocked, it is possible
    that there will be multiple versions of an object in the system. Sometimes these
    can be merged by the data store itself, but sometimes they will need to be resolved
    by the application or user. For instance, if the buyer updates his or her shopping
    cart from two computers, the resulting cart may have duplicate items that he or
    she may need to remove.


    There are lots of complex design features in the Dynamo system; many of these
    will be discussed in [Chapters 8](#A978-1-4842-1329-2_8_Chapter.html) and [9](#A978-1-4842-1329-2_9_Chapter.html).
    However, it would be remiss to continue without at least a little bit of elaboration
    on two of the key features: consistent hashing and tunable consistency.


    ### Consistent Hashing


    When we hash a key value, we perform a mathematical computation on the key value
    and use that computed value to determine where to store the data. One reason to
    use hashing is so that we are able to evenly distribute the data across a certain
    number of slots. The most simple example is to use the modulo function, which
    returns the remainder of a division. If we want to hash any number into 10 buckets,
