    Probably the most common configuration is N > W > 1\. More than one write must
    complete, but not all nodes need to be updated immediately. Another common setting
    is W + R > N; this ensures that the latest value will always be included in a
    read operation, even if it is mixed in with “older” values. This is sometimes
    referred to as quorum assembly.


    Figure [3-6](#A978-1-4842-1329-2_3_Chapter.html#Fig6) shows examples of various
    NWR settings. Depending on the settings, Dynamo can trade off consistency, reliability,
    and performance.


    ![A978-1-4842-1329-2_3_Fig6_HTML.jpg](A978-1-4842-1329-2_3_Fig6_HTML.jpg)


    Figure 3-6.


    Tunable consistency in Dynamo


    ### Dynamo and the Key-value Store Family


    Systems that implement one of the primary characteristics of Dynamo—the idea of
    a binary value retrieved by primary key only—became generically known as key–value
    stores. Just as Google’s GFS and MapReduce papers became the blueprint for Hadoop,
    Amazon’s Dynamo paper became the blueprint for many key-value stores.


    Web developers who were struggling with the operational complexity entailed by
    sharding and other heroic database techniques had already started experimenting
    with various nonrelational designs. However, with the release of Amazon’s Dynamo
    paper, these developers had a proven architectural model to build on. The result
    was a relatively sudden burst of Dynamo-inspired systems in 2008–2009\. These
    systems were the first recognizable NoSQL databases.


    It’s true that not all key–value stores were based explicitly on the Dynamo model.
    However, the list of Dynamo-inspired systems is impressive, and it includes active
    databases such as Riak, LinkedIn’s Voldemort, Cassandra, and of course, Amazon’s
    own DynamoDB. Some of these systems, such as Riak and Voldemort, are more or less
    exact copies of the Dynamo architecture, while others use Dynamo in conjunction
    with other concepts. For instance, Apache’s Cassandra implements Dynamo’s consistent
    hashing and tunable consistency models, combined with a variation on the BigTable
    data model.


    Although Dynamo represents the most popular and well-articulated key-value store
    architecture, there are certainly key-value stores that owe little or nothing
    to the Dynamo design. These include systems such as Redis and Oracle NoSQL.


    ## Conclusion


    We’ve seen that the challenge of maintaining highly available global websites
    proved inconsistent with the ACID transaction model. Brewer’s CAP theorem—as well
    as practical experience—argue that a system cannot aspire to both strong consistency
    and global availability in the event of an imperfect network like the Internet.
    For most massive websites, continual availability may be more important than perfect
    consistency.


    Attempts to deploy relational databases on the scale required by the largest web
    properties involved the use of caching (Memcached, in particular), read-only replication,
    and sharding. This architectural pattern effectively broke both the relational
    and the ACID properties of the database: once a database has been sharded, ACID
    consistency and ad hoc SQL query access are lost. Nevertheless, the sharding solution
    has proved to be effective at sites such as Twitter and Facebook.


    Amazon—the pioneer of Internet retailers—abandoned the RDBMS as the core database
    in favor of an internally developed, nonrelational key-value store called Dynamo.
    Dynamo implements eventual consistency rather than strict consistency; updates
    to data are eventually guaranteed to be propagated throughout the system, but
    may not be seen by every user instantaneously.


    Dynamo has been a strong influence on the design of many other key-value stores,
    such as Riak and Cassandra, and is the basis for Amazon’s cloud-based database
    DynamoDB. Systems such as Dynamo enforce no structure on their payload. This makes
    them impenetrable to all but programmers. As we will see in the next chapter,
    another class of databases—the document databases—extend the key-value concept
    by requiring that values be structured in a self-describing format such as XML
    or JSON.


    ## Note


    [`http://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf`](http://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf)


    # 4. Document Databases


    > A relational database is like a garage that forces you to take your car apart
    and store the pieces in little drawers —Object-oriented data community, mid-1990s
    An Object database is like a closet which requires that you hang up your suit
    with tie, underwear, belt, socks and shoes all attached. —David Ensor, same period


    A document database is a nonrelational database that stores data as structured
    documents, usually in XML or JSON formats. The “document database” definition
    doesn’t imply anything specific beyond the document storage model: document databases
    are free to implement ACID transactions or other characteristics of a traditional
    RDBMS, though the dominant document databases provide relatively modest transactional
    support.


    JSON-based document databases flourished after the nonrelational breakout of 2008,
    for three main reasons. First, they address the conflict between object-oriented
    programming and the relational database model that had frustrated software developers,
    and that motivated much of the object-oriented database movement of the mid-1990s.
    Second, because the self-describing document formats could be interrogated independently
    of the program that had created them, they supported ad hoc query access to the
    database that was absent in pure key-value stores. Third, they aligned well with
    the dominant web-based programming paradigms, particularly the AJAX programming
    model.


    A document database, by allowing some form of data description without enforcing
    a schema, perhaps provides a happy medium between the rigid schema of the relational
    database and the completely schema-less key-value stores. Programmers remain free
    to change the data model as requirements shift within an application, but data
    consumers are still able to interrogate the data to determine its meaning.


    The alignment with web-development programming practices has resulted in JSON
    document databases—and the MongoDB database in particular—becoming the default
    choice for many web developers.


    Note


    Describing something as a document database only tells us that it stores data
    in XML or JSON format. The term does not define any specific transaction or clustering
    model.'
  trans: '# 4. 文档数据库


    > 关系型数据库就像一个车库，迫使你把汽车拆成零件，然后分门别类地存进小抽屉里。——面向对象数据社区，20 世纪 90 年代中期

    > 对象数据库就像一个衣橱，要求你把领带、内衣、皮带、袜子和鞋子全都挂在西装上一起收纳。——大卫·恩索，同一时期


    文档数据库是一种非关系型数据库，它将数据存储为结构化文档，通常采用 XML 或 JSON 格式。“文档数据库”这个定义本身，除了表明其文档存储模型之外，并不隐含任何特定的限制：文档数据库可以自由实现
    ACID 事务或其他传统关系型数据库管理系统的特性，不过主流的文档数据库提供的事务支持相对有限。


    基于 JSON 的文档数据库在 2008 年非关系型数据库爆发后蓬勃发展，主要有三个原因。首先，它们解决了面向对象编程与关系数据库模型之间的冲突，这种冲突曾令软件开发者感到沮丧，并且是
    20 世纪 90 年代中期面向对象数据库运动的重要驱动力。其次，因为自描述的文档格式可以独立于创建它们的程序进行查询，它们支持对数据库进行即席查询访问，这是纯键值存储所缺乏的。第三，它们与主流的基于
    Web 的编程范式，特别是 AJAX 编程模型，非常契合。


    文档数据库通过允许某种形式的数据描述而无需强制实施模式，或许在关系型数据库的严格模式与完全无模式的键值存储之间，提供了一个令人满意的折中方案。程序员仍然可以随着应用程序内部需求的变化而自由地更改数据模型，但数据使用者仍然能够查询数据以确定其含义。


    与 Web 开发编程实践的契合，使得 JSON 文档数据库——尤其是 MongoDB 数据库——成为许多 Web 开发者的默认选择。


    注意


    将某物描述为文档数据库，仅仅告诉我们它以 XML 或 JSON 格式存储数据。这个术语并未定义任何特定的事务或集群模型。


    ## 可调节的一致性


    Dynamo 允许应用程序选择应用于特定操作的一致性级别。`NWR` 表示法描述了 Dynamo 如何在一致性、读性能和写性能之间进行权衡：


    *   `N` 是数据库为每个数据项维护的副本数量。

    *   `W` 是在写入操作完成前必须写入的数据项副本数量。

    *   `R` 是应用程序在读取数据项时将访问的副本数量。


    当 `W = N` 时，Dynamo 在将控制权交还给应用程序之前，总是会写入每一个副本——这正是 ACID 数据库在实现同步复制时的做法。如果应用程序更关心写性能而不是读性能，那么它可以设置
    `W = 1`，`R = N`。这样，每次读取必须访问所有副本以确定哪个是正确的，但每次写入只需在返回控制权之前接触数据的一个副本（其他副本的写入会作为后台任务传播到所有副本）。


    最常见的配置可能是 `N > W > 1`。这意味着必须完成多于一次的写入，但并非所有节点都需要立即更新。另一个常见的设置是 `W + R > N`；这确保了最新的值总是会包含在读操作中，即使它混杂在“较旧”的值之中。这有时被称为**法定人数集合**。


    图 3-6 展示了各种 `NWR` 设置的示例。根据不同的设置，Dynamo 可以在一致性、可靠性和性能之间进行权衡。


    ![A978-1-4842-1329-2_3_Fig6_HTML.jpg](img/A978-1-4842-1329-2_3_Fig6_HTML.jpg)


    图 3-6.

    Dynamo 中的可调节一致性


    ## Dynamo 与键值存储家族


    实现了 Dynamo 主要特性之一——即通过主键检索二进制值的概念——的系统，被统称为**键值存储**。正如 Google 的 GFS 和 MapReduce
    论文成为 Hadoop 的蓝图一样，Amazon 的 Dynamo 论文也成为了许多键值存储的蓝图。


    那些正苦恼于分片和其他高难度数据库技术所带来的操作复杂性的 Web 开发者们，早已开始尝试各种非关系型设计。然而，随着 Amazon Dynamo 论文的发布，这些开发者们有了一个经过验证的架构模型可供构建。结果是在
    2008 至 2009 年间，涌现出了一批受 Dynamo 启发的系统。这些系统是第一批可识别的 NoSQL 数据库。


    诚然，并非所有的键值存储都明确基于 Dynamo 模型。然而，受 Dynamo 启发的系统名单令人印象深刻，其中包括活跃的数据库系统，如 `Riak`、领英的
    `Voldemort`、`Cassandra`，当然还有 Amazon 自己的 `DynamoDB`。其中一些系统，如 `Riak` 和 `Voldemort`，或多或少是
    Dynamo 架构的精确复制品，而另一些则将 Dynamo 与其他概念结合使用。例如，Apache 的 `Cassandra` 实现了 Dynamo 的一致性哈希和可调节一致性模型，并结合了
    BigTable 数据模型的变体。


    尽管 Dynamo 代表了最流行且阐述最清晰的键值存储架构，但也存在一些与 Dynamo 设计关系不大或无关的键值存储。这些系统包括 `Redis` 和 `Oracle
    NoSQL`。


    ## 结论


    我们已经看到，维护高可用性全球网站的挑战与 ACID 事务模型存在冲突。Brewer 的 CAP 定理以及实践经验表明，在一个像互联网这样不完善的网络中，一个系统无法同时追求强一致性和全局可用性。对于大多数大型网站而言，持续的可用性可能比完美的数据一致性更重要。


    尝试在最大型 Web 应用所需的规模上部署关系型数据库，涉及了使用缓存（尤其是 `Memcached`）、只读复制和分片等技术。这种架构模式实际上破坏了数据库的关系型特性和
    ACID 特性：一旦数据库被分片，ACID 一致性和即席 SQL 查询访问能力就丧失了。尽管如此，分片解决方案在 Twitter 和 Facebook 等网站上已被证明是有效的。


    互联网零售的先驱 Amazon 放弃了将 RDBMS 作为核心数据库，转而支持其内部开发的非关系型键值存储系统 `Dynamo`。`Dynamo` 实现的是**最终一致性**而非严格一致性；对数据的更新最终保证会在整个系统中传播，但可能不会即时被每个用户看到。


    `Dynamo` 对许多其他键值存储的设计产生了强大影响，例如 `Riak` 和 `Cassandra`，并且是 Amazon 基于云的数据库 `DynamoDB`
    的基础。像 `Dynamo` 这样的系统对其承载的数据不强制任何结构。这使得它们除了程序员之外，对其他人而言都难以理解和使用。正如我们将在下一章看到的，另一类数据库——文档数据库——扩展了键值的概念，要求值必须以
    XML 或 JSON 等自描述格式进行结构化。


    ## 注


    [`http://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf`](http://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf)'
- fmt: '## XML and XML Databases


    The first document databases were built around the XML document standard. XML
    databases are interesting to us primarily as the architectural precursors to the
    modern JSON document database; XML databases today represent a significant but
    small niche in the overall database market.


    `XML` (eXtensible Markup Language) arose as a result of the convergence of efforts
    to develop a generalized markup language as the successor to various specialized
    formats such as `SGML` and a realization that `HTML`—the foundation of Web 1.0—uncomfortably
    combined layout and data. `XML` was capable of representing almost any form of
    information and, together with `Cascading Style Sheets (CSS)` that controlled
    rendering, allowed second-generation websites to separate data and format.


    `XML` was widely used beyond these Web 2.0 use cases and became a standard format
    for many document types, eventually including word processing documents and spreadsheets.
    `XML` is also the basis for many data interchange protocols and, in particular,
    was a foundation for web service specifications such as `SOAP` (Simple Object
    Access Protocol).


    During the early 2000s, it was widely expected that most documents in an organization
    outside of a relational database would end up represented as `XML`. And while
    the momentum behind `XML` has slowed, today a huge variety of document types use
    `XML` under the hood.


    ### XML Tools and Standards


    `XML` is supported by a rich ecosystem that includes a variety of standards and
    tools to assist with authoring, validation, searching, and transforming `XML`
    documents. These include:


    *   `XPath`: A syntax for retrieving specific elements from an `XML` document.
    `XPath` provides a simple and convenient way to filter documents using wildcards
    and tag references.

    *   `XQuery`: A query language for interrogating `XML` documents. The related
    `XQuery Update` specification provides mechanisms for modifying a document. `XQuery`
    is sometimes referred to as “the `SQL` of `XML`.”

    *   `XML schema`: A special type of `XML` document that describes the elements
    that may be present in a specified class of `XML` documents. `XML schema` can
    be used to validate that a document is in the correct format, or to assist programs
    that wish to interrogate `XML` documents that conform to that format.

    *   `XSLT` (Extensible Stylesheet Language Transformations): A language for transforming
    `XML` documents into alternative formats, including non-`XML` formats such as
    `HTML`.

    *   `DOM` (Document Object Model): An object-oriented `API` that programs can
    use to interact with `XML`, `XHTML`, and similarly structured documents.


    As the “`SQL` for `XML`,” `XQuery` figures prominently in most `XML` database
    architectures. Figure [4-1](#A978-1-4842-1329-2_4_Chapter.html#Fig1) shows a simple
    `XQuery` statement that searches for documents with an `ADDRESS` element that
    includes the string “Berlin” within an embedded `CITY` element.


    ![A978-1-4842-1329-2_4_Fig1_HTML.jpg](A978-1-4842-1329-2_4_Fig1_HTML.jpg)

    Figure 4-1. Example of `XQuery`


    ### XML Databases


    The increasing volume of `XML` documents within organizations provided a motivation
    for some form of `XML` document management system—or native `XML` database.


    `XML` databases generally consist of a platform that implements the various `XML`
    standards such as `XQuery` and `XSLT`, and that provides services for the storage,
    indexing, security, and concurrent access of `XML` files. Figure [4-2](#A978-1-4842-1329-2_4_Chapter.html#Fig2)
    illustrates a simplified generic `XML` database architecture.


    ![A978-1-4842-1329-2_4_Fig2_HTML.jpg](A978-1-4842-1329-2_4_Fig2_HTML.jpg)

    Figure 4-2. Generic `XML` database architecture


    A variety of `XML` databases emerged during the first half of the 2000s, and they
    experienced a healthy uptake. However, they were not positioned as alternatives
    to the `RDBMS` but, rather, as a means of managing the `XML` document sprawl that
    had confronted many organizations.


    Two of the more significant `XML` databases include the open-source `XML` database
    `eXist` and the commercial `XML` database `MarkLogic`.


    ### XML Support in Relational Systems


    Relational database vendors all introduced `XML` support within their core offerings,
    typically allowing `XML` documents to be stored within `long/BLOB` columns within
    database tables and providing support for the various `XML` standards such as
    `DOM`, `XSLT`, and `XQuery`. In addition, `XML` support was added to the `ANSI
    SQL` definition (`SQL/XML`), allowing `XML` manipulation within standard `SQL`
    language statements. Support for these `SQL` extensions appears in `Oracle`, `Postgres`,
    `DB2`, `MySQL`, and `SQL Server`.


    ## JSON Document Databases


    `XML` has many advantages as a standard format for file-based documents and for
    data interchange. But it has a number of drawbacks as a storage format for serious
    database applications. `XML` is justifiably criticized as being wasteful of space
    and computationally expensive to process. `XML` tags are verbose and repetitious,
    typically increasing the amount of storage required by several factors. Partly
    as a result, the `XML` language format is relatively expensive to parse.


    `XML` has long been the predominant format for structured files, but for data
    interchange and for document databases themselves, a more recent format—`JavaScript
    Object Notation (JSON)`—promised greater benefits and has achieved far greater
    popularity than their `XML` predecessors.


    `JSON` document-based databases and `XML` document-based databases share many
    similarities, not the least of which is the superficial similarity between `XML`
    and `JSON` formats. However, each is designed to support quite dissimilar use
    cases and significantly different applications. `XML` databases typically are
    used as content-management systems; that is, organizing and maintaining collections
    of text files in `XML` format—academic papers, business documents, and so on.
    `JSON` document databases, on the other hand, mostly support web-based operational
    workloads—storing and modifying the dynamic content and transactional data at
    the core of modern web-based applications.


    **Note**

    `JSON` and `XML` are similar formats, but `XML` document databases and `JSON`
    document databases generally support dissimilar applications. `XML` document databases
    excel for content management systems, `JSON` document databases generally aim
    to support operational web applications.


    ### JSON and AJAX


    `JSON` was created by JavaScript pioneer Douglas Crockford as part of an attempt
    to build a framework for more dynamic and interactive web applications. `JSON`
    was deliberately intended as a more lightweight substitute for `XML`, and it became
    a significant alternative to `XML` in the `AJAX` programming model that drove
    a revolution in web applications during the mid-2000s.


    `AJAX` (Asynchronous JavaScript And `XML`) is a flexible programming pattern in
    which `JavaScript` on a web browser communicates with a back-end web server through
    asynchronous interchange of `XML` or `JSON` documents, rather than by the exchange
    of complete `HTML` pages. It was `AJAX` that enabled the rich and interactive
    experience provided by groundbreaking web applications such as `Google Maps` and
    `Gmail`.


    Although the “`X`” in `AJAX` refers to `XML`, `JSON` documents can also be used
    as the medium of interaction with the web server. Indeed, because of its tight
    integration with `JavaScript`, `JSON` increasingly became more popular than `XML`
    for data interchange. Within a few years of the introduction of the `AJAX` approach,
    all serious web developers became familiar with `JavaScript` programming and with
    the `JSON` model.


    Figure [4-3](#A978-1-4842-1329-2_4_Chapter.html#Fig3) compares the appearance
    of `JSON` and `XML` documents.


    ![A978-1-4842-1329-2_4_Fig3_HTML.jpg](A978-1-4842-1329-2_4_Fig3_HTML.jpg)

    Figure 4-3. Comparison of `XML` and `JSON` file formats'
