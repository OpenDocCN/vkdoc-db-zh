    not the least of which is the superficial similarity between XML and JSON formats.
    However, each is designed to support quite dissimilar use cases and significantly
    different applications. XML databases typically are used as content-management
    systems; that is, organizing and maintaining collections of text files in XML
    format—academic papers, business documents, and so on. JSON document databases,
    on the other hand, mostly support web-based operational workloads—storing and
    modifying the dynamic content and transactional data at the core of modern web-based
    applications.


    Note


    JSON and XML are similar formats, but XML document databases and JSON document
    databases generally support dissimilar applications. XML document databases excel
    for content management systems, JSON document databases generally aim to support
    operational web applications.


    ### JSON and AJAX


    JSON was created by JavaScript pioneer Douglas Crockford as part of an attempt
    to build a framework for more dynamic and interactive web applications. JSON was
    deliberately intended as a more lightweight substitute for XML, and it became
    a significant alternative to XML in the AJAX programming model that drove a revolution
    in web applications during the mid-2000s.


    AJAX (Asynchronous JavaScript And XML) is a flexible programming pattern in which
    JavaScript on a web browser communicates with a back-end web server through asynchronous
    interchange of XML or JSON documents, rather than by the exchange of complete
    HTML pages. It was AJAX that enabled the rich and interactive experience provided
    by groundbreaking web applications such as Google Maps and Gmail.


    Although the “X” in AJAX refers to XML, JSON documents can also be used as the
    medium of interaction with the web server. Indeed, because of its tight integration
    with JavaScript, JSON increasingly became more popular than XML for data interchange.
    Within a few years of the introduction of the AJAX approach, all serious web developers
    became familiar with JavaScript programming and with the JSON model.


    Figure [4-3](#A978-1-4842-1329-2_4_Chapter.html#Fig3) compares the appearance
    of JSON and XML documents.


    ![A978-1-4842-1329-2_4_Fig3_HTML.jpg](A978-1-4842-1329-2_4_Fig3_HTML.jpg)


    Figure 4-3.


    Comparison of XML and JSON file formats'
