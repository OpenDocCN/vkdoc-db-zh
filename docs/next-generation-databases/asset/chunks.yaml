- fmt: '## Google and Hadoop


    By 2005, Google was by far the biggest website in the world—and this had been
    true since a few years after Google first launched. When Google began, the relational
    database was already well established, but it was inadequate to deal with the
    volumes and velocity of the data confronting Google. The challenges that enterprises
    face with “big data” today are problems that Google first encountered almost 20
    years ago. Very early on, Google had to invent new hardware and software architectures
    to store and process the exponentially growing quantity of websites it needed
    to index.


    In 2003, Google revealed details of the distributed file system `GFS` that formed
    a foundation for its storage architecture, [⁵](#A978-1-4842-1329-2_1_Chapter.html#Sec19)
    and in 2004 it revealed details of the distributed parallel processing algorithm
    `MapReduce`, which was used to create World Wide Web indexes. [⁶](#A978-1-4842-1329-2_1_Chapter.html#Sec19)
    In 2006, Google revealed details about its `BigTable` distributed structured database.
    [⁷](#A978-1-4842-1329-2_1_Chapter.html#Sec19)


    These concepts, together with other technologies, many of which also came from
    Google, formed the basis for the Hadoop project, which matured within Yahoo! and
    which experienced rapid uptake from 2007 on. The Hadoop ecosystem more than anything
    else became a technology enabler for the Big Data ecosystem we’ll discuss in more
    detail in [Chapter 2](#A978-1-4842-1329-2_2_Chapter.html).


    ## The Rest of the Web


    While Google had an overall scale of operation and data volume way beyond that
    of any other web company, other websites had challenges of their own. Websites
    dedicated to online e-commerce—Amazon, for example—had a need for a transactional
    processing capability that could operate at massive scale. Early social networking
    sites such as MySpace and eventually Facebook faced similar challenges in scaling
    their infrastructure from thousands to millions of users.


    Again, even the most expensive commercial RDBMS such as Oracle could not provide
    sufficient scalability to meet the demands of these sites. Oracle’s scaled-out
    RDBMS architecture (`Oracle RAC`) attempted to provide a roadmap for limitless
    scalability, but it was economically unattractive and never seemed to offer the
    scale required at the leading edge.


    Many early websites attempted to scale open-source databases through a variety
    of do-it-yourself techniques. This involved utilizing distributed object cases
    such as `Memcached` to offload database load, database replication to spread database
    read activity, and eventually—when all else failed—“Sharding.”


    Sharding involves partitioning the data across multiple databases based on a key
    attribute, such as the customer identifier. For instance, in Twitter and Facebook,
    customer data is split up across a very large number of `MySQL` databases. Most
    data for a specific user ends up on the one database, so that operations for a
    specific customer are quick. It’s up to the application to work out the correct
    shard and to route requests appropriately.


    Sharding at sites like Facebook has allowed a `MySQL`-based system to scale up
    to massive levels, but the downsides of doing this are immense. Many relational
    operations and database-level `ACID` transactions are lost. It becomes impossible
    to perform joins or maintain transactional integrity across shards. The operational
    costs of sharding, together with the loss of relational features, made many seek
    alternatives to the RDBMS.


    Meanwhile, a similar dilemma within Amazon had resulted in development of an alternative
    model to strict `ACID` consistency within its homegrown data store. Amazon revealed
    details of this system, “Dynamo,” in 2008. [⁸](#A978-1-4842-1329-2_1_Chapter.html#Sec19)


    Amazon’s `Dynamo` model, together with innovations from web developers seeking
    a “webscale” database, led to the emergence of what came to be known as key-value
    databases. We’ll discuss these in more detail in [Chapter 3](#A978-1-4842-1329-2_3_Chapter.html).


    ## Cloud Computing


    The existence of applications and databases “in the cloud”—that is, accessed from
    the Internet—had been a persistent feature of the application landscape since
    the late 1990s. However, around 2008, cloud computing erupted somewhat abruptly
    as a major concern for large organizations and a huge opportunity for startups.


    For the previous 5 to 10 years, mainstream adoption of computer applications had
    shifted from rich desktop applications based on the client-server model to web-based
    applications whose data stores and application servers resided somewhere accessible
    via the Internet—“the cloud.” This created a real challenge for emerging companies
    that needed somehow to establish sufficient hosting for early adopters, as well
    as the ability to scale up rapidly should they experience the much-desired exponential
    growth.


    Between 2006 and 2008, Amazon rolled out Elastic Compute Cloud (`EC2`). `EC2`
    made available virtual machine images hosted on Amazon’s hardware infrastructure
    and accessible via the Internet. `EC2` could be used to host web applications,
    and computing power could be relatively rapidly added on demand. Amazon added
    other services such as storage (`S3`, `EBS`), Virtual Private Cloud (`VPC`), a
    `MapReduce` service (`EMR`), and so on. The entire platform was known as Amazon
    Web Services (`AWS`) and was the first practical implementation of an Infrastructure
    as a Service (`IaaS`) cloud. `AWS` became the inspiration for cloud computing
    offerings from Google, Microsoft, and others.


    For applications wishing to exploit the elastic scalability allowed by cloud computing
    platforms, existing relational databases were a poor fit. Oracle’s attempts to
    integrate grid computing into its architecture had met with only limited success
    and were economically and practically inadequate for these applications, which
    needed to be able to expand on demand. That demand for elastically scalable databases
    fueled the demand generated by web-based startups and accelerated the growth of
    key-value stores, often based on Amazon’s own `Dynamo` design. Indeed, Amazon
    offered nonrelational services in its cloud starting with `SimpleDB`, which eventually
    was replaced by `DynamoDB`.


    ## Document Databases


    Programmers continued to be unhappy with the impedance mismatch between object-oriented
    and relational models. Object relational mapping systems only relieved a small
    amount of the inconvenience that occurred when a complex object needed to be stored
    on a relational database in normal form.


    Starting about 2004, an increasing number of websites were able to offer a far
    richer interactive experience than had been the case previously. This was enabled
    by the programming style known as `AJAX` (Asynchronous JavaScript and XML) , in
    which JavaScript within the browser communicates directly with a backend by transferring
    `XML` messages. `XML` was soon superseded by JavaScript Object Notation (`JSON`),
    which is a self-describing format similar to `XML` but is more compact and tightly
    integrated into the JavaScript language.


    `JSON` became the de facto format for storing—serializing—objects to disk. Some
    websites started storing `JSON` documents directly into columns within relational
    tables. It was only a matter of time before someone decided to eliminate the relational
    middleman and create a database in which `JSON` could be directly stored. These
    became known as document databases.


    `CouchBase` and `MongoDB` are two popular `JSON`-oriented databases, though virtually
    all nonrelational databases—and most relational databases, as well—support `JSON`.
    Programmers like document databases for the same reasons they liked `OODBMS`:
    it relieves them of the laborious process of translating objects to relational
    format. We’ll look at document databases in some detail in [Chapter 4](#A978-1-4842-1329-2_4_Chapter.html).'
