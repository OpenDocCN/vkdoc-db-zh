    # JSON 数据库


    ## 概述


    以 Amazon Dynamo 为代表的键值存储数据库的兴起，加上 JSON 作为数据交换格式的日益普及，为 JSON 文档数据库的出现奠定了基础。


    并没有一个单一的规范或宣言来阐述基于 JSON 的文档数据库应具备哪些属性。要成为一个 JSON 文档数据库，你只需以 JSON 格式存储数据即可。


    ### 存储层级


    在 JSON 文档数据库中，存储的层级结构通常如下：


    *   `文档` 是基本存储单元，大致对应于关系数据库管理系统（RDBMS）中的一行。一个文档包含一个或多个键值对，还可以包含嵌套文档和数组。数组中也可以包含文档，从而形成复杂的层次结构。

    *   `集合` 或数据桶是一组具有某些共同用途的文档；这大致相当于关系型数据库中的表。集合中的文档不必是同类型，但通常一个集合中的文档代表某一共同类别的信息。


    ### 数据建模


    虽然从理论上讲，文档数据库可以像关系型系统中那样精确地实现第三范式模式，但文档数据库更通常采用较少的集合来建模数据，并用嵌套文档来表示主从关系。


    例如，考虑一个电影和演员的数据库。在关系数据模型中，我们会将演员和电影分别表示在不同的表中，并创建一个 `连接` 表来表明哪些演员出演了哪些电影，如图 4-4
    所示。


    ![A978-1-4842-1329-2_4_Fig4_HTML.jpg](img/A978-1-4842-1329-2_4_Fig4_HTML.jpg)


    图 4-4. 简单的关系型电影数据库


    在 JSON 文档数据库中，我们可以创建三个集合，其键值对应于关系模式中的列——但这样做会显得很不自然。文档数据库通常不提供 `连接` 操作，而且程序员通常希望
    JSON 结构能紧密映射到其代码的对象结构。因此，更自然的方式是如图 4-5 所示来表示这些数据。


    ![A978-1-4842-1329-2_4_Fig5_HTML.jpg](img/A978-1-4842-1329-2_4_Fig5_HTML.jpg)


    图 4-5. JSON 电影集合


    ## 文档数据库中的数据模型


    在图 4-5 中，“演员”作为数组嵌套在“电影”文档内。这种模式通常被称为文档嵌入。该设计模式的优点在于允许在一个操作中检索出一部电影及其所有演员，并且避免了在应用程序代码中执行连接操作。


    另一方面，这种方法会导致“演员”信息在多个文档中重复出现，在复杂的设计中，如果任何“演员”属性需要更改，这可能会导致问题，并可能引发不一致。一部电影中的演员数量相对较少，但在其他应用场景中，如果嵌套文档中的成员数量无限增长（因为单个
    JSON 文档的大小通常有上限——例如在 `MongoDB` 中是 `64MB`），也会出现问题。


    由于这些原因，数据库设计者可能会选择使用文档标识符来链接多个文档，这很像关系数据库通过外键关联行的方式。例如，在图 4-6 中，我们在“电影”文档中嵌入了一个演员
    ID 数组，可用于定位出演某部电影的演员。


    ![A978-1-4842-1329-2_4_Fig6_HTML.jpg](img/A978-1-4842-1329-2_4_Fig6_HTML.jpg)


    图 4-6. 在文档数据库中链接文档


    在图 4-7 中，我们看到文档链接的另一个例子。在这个例子中，设计采用了关系风格：一个链接文档将电影与演员关联起来。虽然这对文档数据库来说有些不自然，但对于某些工作负载，它可能在性能和可维护性之间提供最佳平衡。


    ![A978-1-4842-1329-2_4_Fig7_HTML.jpg](img/A978-1-4842-1329-2_4_Fig7_HTML.jpg)


    图 4-7. 文档链接可以类似于关系型第三范式


    文档数据库中的数据建模不如关系数据库那样确定性强：没有类似第三范式的东西来定义一个“正确”的模型。此外，关系数据库的建模主要由待存储数据的性质驱动，而在文档数据库中，要执行的查询的性质则重要得多。


    ## 早期的 JSON 数据库


    由 Damien Katz 创建的 `CouchDB` 是第一个著名的基于 JSON 的数据库系统。Damien Katz 曾参与开发 `Lotus Notes`——一个具有强大文档处理能力的协作系统。2005
    年，他决定创建一个更贴近 Web 开发和面向对象编程模型的数据库系统。其成果就是 `CouchDB`。


    最初，`CouchDB` 是用 `C++` 编写的，存储的是 `XML` 文档。大约在 2007 年，出现了新的架构，将 `JSON` 作为主要存储格式，包含一个
    JavaScript 命令和查询接口，以及一个用 `Erlang` 语言重写的核心引擎。


    随着其发展成熟，`CouchDB` 借鉴了其他曾启发键值存储和 `Hadoop` 的范式，包括 `MapReduce` 的 JavaScript 实现、`最终一致性`
    和多版本模型，以及基于哈希的集群/分片模型，以允许 `CouchDB` 跨节点扩展。


    `CouchDB` 于 2008 年成为 `Apache` 项目，并得到了 `IBM` 的支持。2009 年，成立了商业公司 `couch.io`（后来更名为
    `CouchOne`）来维护和推广该技术。


    ## MemBase 与 CouchBase


    当 2009 年对非关系数据库的兴趣爆发时，`CouchDB` 已经有多年的积极开发，并且似乎能很好地受益于围绕“`NoSQL`”日益增长的热度。


    `Membase` 是这一时期另一个获得显著采用的非关系系统。`Membase` 数据库为极受欢迎的 `Memcached` 框架（我们在第 3 章讨论过）提供了持久化变体。`Memcached`
    是一个分布式只读对象缓存，通常与 `MySQL` 一起部署以减轻数据库负载。对象分布在多个 `Memcached` 节点上，可以通过哈希键查找来定位。如果数据存在于
    `Memcached` 服务器中，就可以避免数据库读取。


    `Membase` 提供了一个兼容 `Memcached` 的解决方案，其中数据也可以被修改并持久化到磁盘。因此，对于那些已经投资于 `Memcached`
    技术的用户来说，`Membase` 特别有吸引力，它提供了将应用程序从 `Memcached`/`MySQL` 转换到 `Membase` 的可能性。`Membase`
    最初作为极具人气的 `Zynga` 在线游戏 `Farmville` 的底层数据库而闻名。


    与此同时，尽管 `CouchDB` 有许多技术成就，但 `CouchDB` 数据库和 `CouchOne` 公司似乎在建立商业生态位方面举步维艰；它缺乏一个可行的横向扩展架构。2011
    年初，宣布了 `Membase` 和 `CouchOne` 的合并。合并后的公司名为 `CouchBase`。`CouchBase` 将现有的 `CouchDB`
    代码捐赠给了 `Apache` 社区，并着手进行一项新的工作，以融合 `CouchDB` 和 `Membase` 的功能。在最终的 `Couchbase`
    服务器中，来自 `CouchDB` 的 JSON 引擎与来自 `Membase` 的兼容 `Memcached` 的键值层被合并在一起。


    `Couchbase` 继承了 `CouchDB` 用于创建查询和视图的 `MapReduce` 接口，但 `Couchbase 4.0` 引入了一个类似
    `SQL` 的文档访问层，称为 `N1QL`（非第一范式查询语言）。有关此内容以及其他类似 `SQL` 的 `NoSQL` 接口的更多详细信息，请参见第 11
    章。

