    2, key 25 to bucket 5, and so on.


    Using this method, we could map keys evenly across 10 servers. When we want to
    determine which node should store a particular item, we would calculate its modulo
    and use the result to locate the node. In practice, hashing functions are more
    complex than a simple modulo function, and a good hash function always distributes
    the hash values evenly across nodes, regardless of any skew in key values.


    Hashing works great as a way of distributing data evenly across a fixed number
    of nodes. But we have a problem if we add or remove a node—we have to recalculate
    the hash values and redistribute all the data. For instance, if we wanted to add
    a new server in the modulo 10 example above, we would recalculate hashes using
    modulo 11 and then we would have to move almost every data item accordingly. Consistent
    hashing works by hashing key values and applying a consistent method for allocating
    those hashed values to specific nodes.


    By convention and possibly federal law, consistent hashing schemes are represented
    as rings— because the hash values “loop around” to 0\. Figure [3-5](#A978-1-4842-1329-2_3_Chapter.html#Fig5)
    shows what happens when a node is added to an existing cluster. Only those keys
    currently mapped to the “neighbors” of the new node need remapping.


    ![A978-1-4842-1329-2_3_Fig5_HTML.jpg](A978-1-4842-1329-2_3_Fig5_HTML.jpg)


    Figure 3-5.


    Adding a new node to the consistent hashing scheme


    The remapping process when a new node is added is still an expensive operation,
    and in practice Dynamo-based databases often employ a “virtual nodes” workaround
    to further reduce the overhead. This mechanism is explained in detail in [Chapter
    8](#A978-1-4842-1329-2_8_Chapter.html).'
  trans: '## 亚马逊的 Dynamo


    亚马逊开创了许多早期 Web 2.0 时代使用的技术，特别是使用 Perl 语言来整合数据库与 Web 前端。早期的亚马逊使用 Oracle 数据库作为其商品目录、客户详细信息和订单的主要存储库。Oracle
    数据库承受的负载是巨大的，亚马逊几次著名的宕机事件都与数据库故障有关。


    亚马逊曾尝试将网站拆分为多个功能区域，每个区域可以拥有自己专用的数据库。他们也是面向服务架构（SOA）的早期采用者，在这种架构中，诸如`get-product-details`这样的逻辑服务不是通过
    SQL 查询解决，而是通过 Web 服务调用来完成。这使得数据库与应用层解耦，并允许亚马逊尝试替代的数据库技术。


    2007 年，亚马逊披露了一个内部开发的替代性非关系型系统的细节，该系统旨在满足其庞大在线网站的需求。这个被称为`Dynamo`的系统，其设计基于以下需求：


    *   持续可用性：即使是最短的应用宕机时间，对亚马逊来说也代价高昂。数据存储必须在所有可预见的情况下保持可用。

    *   网络分区容忍：作为一个在全球拥有客户和数据中心的全球电子商务供应商，亚马逊最关心的是网络分区不应导致可用性丧失，即使这种丧失仅限于特定地域。

    *   无损冲突解决：亚马逊的另一个关键需求是任何订单或购物车更新都不应丢失。例如，如果用户从两台不同的计算机向其购物车添加商品，这两件商品都应出现在最终的购物车中。此外，在任何情况下都不应有人被阻止向其购物车添加商品，这意味着对对象不能有排他的写锁。

    *   效率：系统需要快速响应，因为众所周知，即使网站响应时间的微小延迟也会导致在线销售额显著下降。在线顾客是出了名的善变和没耐心。

    *   经济性：该系统需要能够在通用硬件上运行。

    *   增量可扩展性：应该可以通过少量增量添加服务器来扩展系统，而无需手动维护或停机。


    为了达成这些目标，亚马逊愿意在现有数据库的许多特性上做出妥协。


    原则上，数据存储应在必要时放宽一致性（在一定限度内）以确保可用性。“在一定限度内”这个说法在这里很重要：系统应优先考虑可用性而非一致性，但要以一种可预测、可控和可管理的方式进行。此外，一致性和可用性之间的权衡应该是可配置的——例如，应用程序应该能够选择在发生网络分区时采取何种措施。


    此外，数据存储只需要支持基于主键的访问，无需支持数据模型：通过键查找检索到的值是未结构化的二进制对象。与设计目标为存储海量文件的 Google 的`BigTable`不同，`Dynamo`的假设是大多数对象都很小——小于
    1 MB。


    `Dynamo`——以及许多受其启发的系统——明确尝试在`CAP 定理`方面取得不同的结果。与其总是以牺牲网络分区容忍性为代价来达成一致性，`Dynamo`允许（尽管不强制要求）转而牺牲一致性。参见图
    3-4。


    ![A978-1-4842-1329-2_3_Fig4_HTML.jpg](img/A978-1-4842-1329-2_3_Fig4_HTML.jpg)


    图 3-4. `Dynamo`与`ACID RDBMS`在`CAP 定理`限制下的映射


    `Dynamo`已成为许多非关系型数据库的架构模型。（我们将在第 8 章和第 9 章深入探讨`Dynamo`的内部细节。）`Dynamo`的一些关键架构特性包括：


    *   一致性哈希：一致性哈希是一种方案，它使用主键的哈希值来确定集群中负责该键的节点，并允许以最小的再平衡开销向集群添加或移除节点。更多细节见下文。

    *   可调一致性：应用程序可以指定一致性、读性能和写性能之间的权衡。在`Dynamo`中，可以指定强一致性、最终一致性或弱一致性。更多细节见下文。

    *   数据版本控制：由于写操作永远不会被阻塞，系统中可能存在一个对象的多个版本。有时这些版本可以由数据存储本身合并，但有时需要由应用程序或用户来解决。例如，如果买家从两台计算机更新其购物车，结果购物车中可能有重复的物品，他可能需要将其移除。


    `Dynamo`系统中有许多复杂的设计特性；其中许多将在第 8 章和第 9 章讨论。然而，如果不稍微详细阐述两个关键特性——`一致性哈希`和`可调一致性`，那将是疏忽。


    ### 一致性哈希


    当我们对键值进行哈希时，我们会对键值执行数学计算，并使用该计算值来确定存储数据的位置。使用哈希的一个原因是我们能够将数据均匀分布在一定数量的槽位中。最简单的例子是使用取模函数，该函数返回除法的余数。如果我们想将任何数字哈希到
    10 个桶中，我们可以使用模 10；那么键 27 将映射到桶 7，键 32 将映射到桶 2，键 25 映射到桶 5，以此类推。


    使用这种方法，我们可以将键均匀映射到 10 台服务器上。当我们想确定哪个节点应该存储特定项时，我们会计算其模数并使用结果来定位节点。实际上，哈希函数比简单的取模函数更复杂，一个好的哈希函数总能将哈希值均匀地分布在节点上，无论键值有何种偏斜。


    哈希作为在固定数量节点上均匀分布数据的方法效果很好。但如果我们添加或移除一个节点，就会出现问题——我们必须重新计算所有哈希值并重新分配所有数据。例如，如果我们想在上面的模
    10 示例中添加一台新服务器，我们将使用模 11 重新计算哈希，然后我们必须相应地移动几乎每个数据项。一致性哈希的工作原理是对键值进行哈希，并应用一种一致的方法将这些哈希值分配到特定节点。


    按照惯例，也可能根据联邦法律，一致性哈希方案被表示为环——因为哈希值会“循环回到”0。图 3-5 显示了向现有集群添加一个节点时发生的情况。只有当前映射到新节点“邻居”的那些键需要重新映射。


    ![A978-1-4842-1329-2_3_Fig5_HTML.jpg](img/A978-1-4842-1329-2_3_Fig5_HTML.jpg)


    图 3-5. 向一致性哈希方案中添加一个新节点


    添加新节点时的重新映射过程仍然是一个开销很大的操作，在实践中，基于`Dynamo`的数据库通常采用“虚拟节点”的变通方法来进一步减少开销。该机制将在第 8
    章中详细解释。'
- fmt: '# 4. Document Databases


    > A relational database is like a garage that forces you to take your car apart
    and store the pieces in little drawers —Object-oriented data community, mid-1990s

    > An Object database is like a closet which requires that you hang up your suit
    with tie, underwear, belt, socks and shoes all attached. —David Ensor, same period


    A document database is a nonrelational database that stores data as structured
    documents, usually in XML or JSON formats. The "document database" definition
    doesn''t imply anything specific beyond the document storage model: document databases
    are free to implement ACID transactions or other characteristics of a traditional
    RDBMS, though the dominant document databases provide relatively modest transactional
    support.


    JSON-based document databases flourished after the nonrelational breakout of 2008,
    for three main reasons. First, they address the conflict between object-oriented
    programming and the relational database model that had frustrated software developers,
    and that motivated much of the object-oriented database movement of the mid-1990s.
    Second, because the self-describing document formats could be interrogated independently
    of the program that had created them, they supported ad hoc query access to the
    database that was absent in pure key-value stores. Third, they aligned well with
    the dominant web-based programming paradigms, particularly the AJAX programming
    model.


    A document database, by allowing some form of data description without enforcing
    a schema, perhaps provides a happy medium between the rigid schema of the relational
    database and the completely schema-less key-value stores. Programmers remain free
    to change the data model as requirements shift within an application, but data
    consumers are still able to interrogate the data to determine its meaning.


    The alignment with web-development programming practices has resulted in JSON
    document databases—and the MongoDB database in particular—becoming the default
    choice for many web developers.


    Note


    Describing something as a document database only tells us that it stores data
    in XML or JSON format. The term does not define any specific transaction or clustering
    model.


    ## Tunable Consistency


    Dynamo allows the application to choose the level of consistency applied to specific
    operations. `NWR` notation describes how Dynamo will trade off consistency, read
    performance, and write performance:


    *   `N` is the number of copies of each data item that the database will maintain.

    *   `W` is the number of copies of the data item that must be written before the
    write can complete.

    *   `R` is the number of copies that the application will access when reading
    the data item.


    When `W = N`, Dynamo will always write every copy before returning control to
    the application—this is what ACID databases do when implementing synchronous replication.
    If the application is more concerned about write performance than read performance,
    then it could set `W = 1`, `R = N`. Then each read must access all copies to determine
    which is correct, but each write only has to touch a single copy of the data before
    returning control (other writes propagate to all copies as a background task).


    Probably the most common configuration is `N > W > 1`. More than one write must
    complete, but not all nodes need to be updated immediately. Another common setting
    is `W + R > N`; this ensures that the latest value will always be included in
    a read operation, even if it is mixed in with "older" values. This is sometimes
    referred to as quorum assembly.


    Figure [3-6](#A978-1-4842-1329-2_3_Chapter.html#Fig6) shows examples of various
    `NWR` settings. Depending on the settings, Dynamo can trade off consistency, reliability,
    and performance.


    ![A978-1-4842-1329-2_3_Fig6_HTML.jpg](A978-1-4842-1329-2_3_Fig6_HTML.jpg)


    Figure 3-6.

    Tunable consistency in Dynamo


    ## Dynamo and the Key-value Store Family


    Systems that implement one of the primary characteristics of Dynamo—the idea of
    a binary value retrieved by primary key only—became generically known as key–value
    stores. Just as Google’s GFS and MapReduce papers became the blueprint for Hadoop,
    Amazon’s Dynamo paper became the blueprint for many key-value stores.


    Web developers who were struggling with the operational complexity entailed by
    sharding and other heroic database techniques had already started experimenting
    with various nonrelational designs. However, with the release of Amazon’s Dynamo
    paper, these developers had a proven architectural model to build on. The result
    was a relatively sudden burst of Dynamo-inspired systems in 2008–2009. These systems
    were the first recognizable NoSQL databases.


    It’s true that not all key–value stores were based explicitly on the Dynamo model.
    However, the list of Dynamo-inspired systems is impressive, and it includes active
    databases such as `Riak`, LinkedIn’s `Voldemort`, `Cassandra`, and of course,
    Amazon’s own `DynamoDB`. Some of these systems, such as `Riak` and `Voldemort`,
    are more or less exact copies of the Dynamo architecture, while others use Dynamo
    in conjunction with other concepts. For instance, Apache’s `Cassandra` implements
    Dynamo’s consistent hashing and tunable consistency models, combined with a variation
    on the BigTable data model.


    Although Dynamo represents the most popular and well-articulated key-value store
    architecture, there are certainly key-value stores that owe little or nothing
    to the Dynamo design. These include systems such as `Redis` and `Oracle NoSQL`.


    ## Conclusion


    We’ve seen that the challenge of maintaining highly available global websites
    proved inconsistent with the ACID transaction model. Brewer’s CAP theorem—as well
    as practical experience—argue that a system cannot aspire to both strong consistency
    and global availability in the event of an imperfect network like the Internet.
    For most massive websites, continual availability may be more important than perfect
    consistency.


    Attempts to deploy relational databases on the scale required by the largest web
    properties involved the use of caching (`Memcached`, in particular), read-only
    replication, and sharding. This architectural pattern effectively broke both the
    relational and the ACID properties of the database: once a database has been sharded,
    ACID consistency and ad hoc SQL query access are lost. Nevertheless, the sharding
    solution has proved to be effective at sites such as Twitter and Facebook.


    Amazon—the pioneer of Internet retailers—abandoned the RDBMS as the core database
    in favor of an internally developed, nonrelational key-value store called `Dynamo`.
    `Dynamo` implements eventual consistency rather than strict consistency; updates
    to data are eventually guaranteed to be propagated throughout the system, but
    may not be seen by every user instantaneously.


    `Dynamo` has been a strong influence on the design of many other key-value stores,
    such as `Riak` and `Cassandra`, and is the basis for Amazon’s cloud-based database
    `DynamoDB`. Systems such as `Dynamo` enforce no structure on their payload. This
    makes them impenetrable to all but programmers. As we will see in the next chapter,
    another class of databases—the document databases—extend the key-value concept
    by requiring that values be structured in a self-describing format such as XML
    or JSON.


    ## Note


    [`http://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf`](http://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf)'
