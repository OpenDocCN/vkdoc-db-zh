- fmt: '# Part I Next Generation Databases


    ## 1. Three Database Revolutions


    Electronic supplementary material The online version of this chapter (doi: [10.1007/978-1-4842-1329-2_1](http://dx.doi.org/10.1007/978-1-4842-1329-2_1))
    contains supplementary material, which is available to authorized users.


    > Fantasy. Lunacy. All revolutions are, until they happen, then they are historical
    inevitabilities. — [David Mitchell](http://www.goodreads.com/author/show/6538289.David_Mitchell),
    [Cloud Atlas](http://www.goodreads.com/work/quotes/1871423) We’re still in the
    first minutes of the first day of the Internet revolution. —Scott Cook


    This book is about a third revolution in database technology. The first revolution
    was driven by the emergence of the `electronic computer`, and the second revolution
    by the emergence of the `relational database`. The third revolution has resulted
    in an explosion of nonrelational database alternatives driven by the demands of
    modern applications that require global scope and continuous availability. In
    this chapter we’ll provide an overview of these three waves of database technologies
    and discuss the market and technology forces leading to today’s next generation
    databases.


    Figure [1-1](#A978-1-4842-1329-2_1_Chapter.html#Fig1) shows a simple timeline
    of major database releases.


    ![A978-1-4842-1329-2_1_Fig1_HTML.jpg](A978-1-4842-1329-2_1_Fig1_HTML.jpg)


    Figure 1-1. Timeline of major database releases and innovations


    Figure [1-1](#A978-1-4842-1329-2_1_Chapter.html#Fig1) illustrates three major
    eras in database technology. In the 20 years following the widespread adoption
    of `electronic computers`, a range of increasingly sophisticated database systems
    emerged. Shortly after the definition of the `relational model` in 1970, almost
    every significant database system shared a common architecture. The three pillars
    of this architecture were the `relational model`, `ACID` transactions, and the
    `SQL` language.


    However, starting around 2008, an explosion of new database systems occurred,
    and none of these adhered to the traditional relational implementations. These
    new database systems are the subject of this book, and this chapter will show
    how the preceding waves of database technologies led to this next generation of
    database systems.


    ### Early Database Systems


    Wikipedia defines a database as an “organized collection of data.” Although the
    term database entered our vocabulary only in the late 1960s, collecting and organizing
    data has been an integral factor in the development of human civilization and
    technology. Books—especially those with a strongly enforced structure such as
    dictionaries and encyclopedias—represent datasets in physical form. Libraries
    and other indexed archives of information represent preindustrial equivalents
    of modern database systems.


    We can also see the genesis of the digital database in the adoption of punched
    cards and other physical media that could store information in a form that could
    be processed mechanically. In the 19th century, loom cards were used to “program”
    fabric looms to generate complex fabric patterns, while tabulating machines used
    punched cards to produce census statistics, and player pianos used perforated
    paper strips that represented melodies. Figure [1-2](#A978-1-4842-1329-2_1_Chapter.html#Fig2)
    shows a `Hollerith` tabulating machine being used to process the U.S. census in
    1890.


    ![A978-1-4842-1329-2_1_Fig2_HTML.jpg](A978-1-4842-1329-2_1_Fig2_HTML.jpg)


    Figure 1-2. Tabulating machines and punched cards used to process 1890 U.S. census


    The emergence of `electronic computers` following the Second World War represented
    the first revolution in databases. Some early digital computers were created to
    perform purely mathematical functions—calculating ballistic tables, for instance.
    But equally as often they were intended to operate on and manipulate data, such
    as processing encrypted Axis military communications.


    Early “databases” used paper tape initially and eventually magnetic tape to store
    data sequentially. While it was possible to “fast forward” and “rewind” through
    these datasets, it was not until the emergence of the spinning magnetic disk in
    the mid-1950s that direct high-speed access to individual records became possible.
    Direct access allowed fast access to any item within a file of any size. The development
    of indexing methods such as `ISAM` (`Index Sequential Access Method`) made fast
    record-oriented access feasible and consequently allowed for the birth of the
    first `OLTP` (`On-line Transaction Processing`) computer systems.


    `ISAM` and similar indexing structures powered the first electronic databases.
    However, these were completely under the control of the application—there were
    databases but no `Database Management Systems` (`DBMS`).'
