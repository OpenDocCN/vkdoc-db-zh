    with, the various systems. Omission or inclusion shouldn’t be interpreted as representing
    endorsement or otherwise of the architecture or suitability for purpose of the
    system. Of the traditional relational vendors, I’ve included only Oracle; the
    coverage of their non-relational features in Chapter [12](#A978-1-4842-1329-2_12_Chapter.html)
    argued for inclusion. However, many other relational vendors are implementing
    similar features (JSON integration, for instance).


    Although I’ve argued that the era of database proliferation is coming to an end,
    to be followed by an era of consolidation, nevertheless new database systems are
    being launched fairly frequently. Some of these might represent major innovations
    and prove to be game-changing. However, generally I have concentrated only on
    databases that have been in active use for at least a few years: experience suggests
    that many of the latest “revolutionary” new databases will fail to gain traction.


    The db-engines.com site provides an invaluable resource for tracking the relative
    popularity of databases. Their ranking system reflects more on Internet “chatter”
    than on revenues or enterprise adoption, but it does represent the single best
    resource for judging the relative level of mindshare for database systems.


    ## Aerospike


    Database Name: Aerospike


    License/Company: AGPL commercially distributed by Aerospike Corp.


    Wikipedia description:


    Aerospike is a flash-optimized in-memory open-source NoSQL database and the name
    of the company that produces it.


    Vendor’s description:


    High-performance NoSQL database delivering speed at scale.


    My take:


    Aerospike uses an architecture that assumes fast flash SSD as the persistence
    layer and uses memory to cache indexes only.


    Data model:


    Key-value


    Transactional model:


    Strictly consistent single-server transactions and eventually consistent across
    a cluster


    Clustering:


    Sharding and replication


    APIs:


    Aerospike query language (AQL) is a subset of SQL language and drivers for most
    common languages.


    ## Cassandra


    Database Name: Apache Cassandra


    License/Company: Open-source under Apache license


    Datastax provides an Enterprise edition


    Wikipedia description:


    Apache Cassandra is an open-source distributed database management system designed
    to handle large amounts of data across many commodity servers, providing high
    availability with no single point of failure.


    Vendor’s description:


    Cassandra’s masterless, shared-nothing architecture provides organizations with
    constant uptime for their transactional/operational database applications, as
    well as a flexible data model capable of storing today’s modern datatypes and
    operational simplicity for easy database management.


    My take:


    Cassandra was envisioned as a database system that could merge the best features
    from Google’s BigTable and Amazon’s Dynamo. Cassandra has achieved some of the
    most high-scale NoSQL implementations at sites like Netflix. Cassandra has implemented
    significant innovations beyond its BigTable and Dynamo influences and clearly
    stands as a leader in the NoSQL category.


    Data model:


    Based on the BigTable wide column model, but with a narrow column abstraction
    provided through the Cassandra Query Language (CQL) interface


    Transactional model:


    Dynamo-style tunable consistency together with a Paxos-based lightweight transaction
    capability


    Clustering:


    Consistent hashing


