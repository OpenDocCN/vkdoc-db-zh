- fmt: '## HBase Consistency


    HBase provides strong consistency for individual rows: HBase clients cannot simultaneously
    modify a row in a way that would cause it to become inconsistent. This behavior
    is similar to what we see in relational systems that generally use row-level locking
    to prevent any simultaneous updates to a single row. However, the implementation
    is more complex in HBase because rows may contain thousands of columns in multiple
    column families, which may have distinct disk storage. During an update to any
    column or column family within a row, the entire row will be locked by the `RegionServer`
    to prevent a conflicting update to any other column.


    Read operations do not acquire locks and reads are not blocked by write operations.
    Instead, read operations use a form of multi-version concurrency control (`MVCC`),
    which we discussed earlier in this chapter. When read and write operations occur
    concurrently, the read will read a previous version of the row rather than the
    version being updated.


    HBase uses a variation on the `SCN` pattern that we discussed earlier to achieve
    `MVCC`. When a write commences, it increments a write number that is stored in
    the cell (e.g., specific column value within the row) being modified. When the
    read commences, it is assigned a read point number that corresponds to the highest
    completed write point. The read can then examine data items to ensure it does
    not read a cell whose write number suggests it was updated since the read began.


    ### Eventually Consistent Region Replicas


    In earlier versions of HBase, strong consistency for all reads was guaranteed—you
    were always certain to read the most recently written version of a row. However,
    with the introduction of region replicas, introduced in Chapter [8](#A978-1-4842-1329-2_8_Chapter.html),
    the possibility of a form of eventual consistency is presented.


    Region replicas were introduced in order to improve HBase availability. A failure
    of a `RegionServer` would never result in data loss, but it could create a minor
    interruption in performance while a new `RegionServer` was instantiated. Region
    replicas allow immediate failover to a backup `RegionServer`, which maintains
    a copy of the region data.


    By default, in HBase all reads are directed to the primary `RegionServer`, which
    results in strictly consistent behavior. However, if consistency for a read is
    configured for timeline consistency, then a read request will first be sent to
    the primary `RegionServer`, followed shortly by duplicate requests to the secondary
    `RegionServer`. The first server to return a result completes the request. Remember
    that the primary gets a head start in this contest, so if the primary is available
    it will usually be the first to return.


    The scheme is called timeline consistency because the secondary `RegionServer`
    always receives region updates in the same sequence as the primary. However, this
    architecture does not guarantee that a secondary `RegionServer` will have up-to-date
    information; and if there are multiple secondary `RegionServer`s, then it’s possible
    that reads will return writes out of order, since there may be race conditions
    occurring among the multiple secondary servers and the primary.


    Figure [9-2](#A978-1-4842-1329-2_9_Chapter.html#Fig2) illustrates `RegionServer`
    replica processing. An HBase client is issuing writes in sequential order to the
    master `RegionServer` (1). These are being replicated asynchronously to the secondary
    `RegionServer`s (2); at any given moment in time some of these replications may
    not yet have completed (3). If a client is using timeline consistency, then it
    may read data from the master, but if the master is unresponsive, it may read
    data from one of the secondary `RegionServer`s (4). Successive reads may return
    data from either of the secondaries or from the primary—so data can be returned
    in any sequence. The “timeline” nature of the consistency only applies to an individual
    secondary, not to the system as a whole.


    ![A978-1-4842-1329-2_9_Fig2_HTML.jpg](A978-1-4842-1329-2_9_Fig2_HTML.jpg)

    *Figure 9-2. HBase timeline consistency with `RegionServer` replicas*


    Note: Timeline consistency is not the default in HBase. By default, a client will
    read from the master `RegionServer`, in which case HBase will provide strong consistency.


    ## Cassandra Consistency


    Cassandra uses the Amazon Dynamo model of tunable consistency. This tunable consistency
    provides a variety of consistency levels, most of which can be specified at the
    level of individual requests.


    We touched on the Dynamo consistency model in Chapter [3](#A978-1-4842-1329-2_3_Chapter.html).
    At a high level, this model allows the following three variables to be configured
    independently to provide a variety of outcomes:


    *   `N` is the number of copies of each data item that the database will maintain.

    *   `W` is the number of copies of the data item that must be written before a
    write can return control to the application.

    *   `R` is the number of copies that the application will access when reading
    the data item.


    As we saw in Chapter [3](#A978-1-4842-1329-2_3_Chapter.html), these variables
    can be configured to allow for strong consistency, weak consistency, and to balance
    read and write performance.


    Cassandra follows the Dynamo model pretty closely, but has its own unique implementation.
    So while the following discussion should be broadly applicable to other Dynamo
    systems such as Riak or DynamoDB, the details are specific to Cassandra.


    ### Replication Factor


    The replication factor determines how many copies of the data will be maintained
    across multiple nodes. This is specified at the keyspace (roughly equivalent to
    a schema) level and is equivalent to the `N` in Dynamo `NRW` notation.


    As we saw in the previous chapter, various replication strategies can be established
    to ensure that replicas are distributed across multiple racks or data centers.


    ### Write Consistency


    Each write operation can specify a write consistency level. The write consistency
    level controls what must happen before Cassandra can complete a write request.
    Some of the more common levels are:


    *   `ALL`: The write must be propagated to all nodes. This results in very strong
    consistency, but should a node be unavailable, the write cannot complete.

    *   `ONE`|`TWO`|`THREE`: The write must be propagated to the specified number
    of nodes. A level of `ONE` maximizes write performance but possibly at the expense
    of consistency. Depending on the read consistency settings and replication factor,
    `TWO` and `THREE` may or may not provide stronger consistency guarantees.

    *   `QUORUM`: The write must complete to a quorum of replica nodes. A quorum requires
    the majority of replicas accept the write before the write operation completes.

    *   `EACH_QUORUM`: The write must complete to a quorum of replica nodes in each
    data center. So if there are two data centers with three replicas each, at least
    two replicas from each data center must complete the write request before the
    operation can complete.

    *   `LOCAL_QUORUM`: Requires that a quorum of replicas be written in the current
    data center only.

    *   `ANY`: The write will succeed providing it is written to any node, even if
    that node is not responsible for storing that particular data item. If no node
    directly responsible for storing a replicas of the data item can be reached, then
    a hinted handoff—described in detail later in this chapter—on any node will be
    sufficient to complete the write. This is an extremely low reliability setting,
    since by default hinted handoffs are deleted after three hours; the best you could
    say about this setting is that data might be written.


    Some additional write consistency levels are described in the section on lightweight
    transactions below.'
