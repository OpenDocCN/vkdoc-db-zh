- fmt: '# 数据库技术的未来：统一与颠覆


    *   `NuoDB` 是一个基于 SQL 的关系型系统，它使用事务的乐观异步传播来实现在分布式环境下的近 `ACID` 一致性。这种方法可能导致与严格 `ACID`
    一致性的轻微偏差：集群中的所有副本不会同时更新。与 `Dynamo` 系统的方式有些类似，用户可以调整所需的一致性级别。`NuoDB` 还将存储层与事务层分离，支持可插拔的存储引擎架构。

    *   `Splice Machine` 在一个由 `HBase` 管理的存储系统之上构建了一个关系兼容的 SQL 层。虽然其主要目标是利用 `HBase`
    的可扩展性来提供一个更具经济效益的可扩展 SQL 引擎，但它也支持混合数据访问，因为数据可以直接通过 `MapReduce` 或 `YARN` 从 `HBase`
    检索，也可以通过关系层的 SQL 进行访问。

    *   `Cassandra` 在其当前版本中增加了对 `JSON` 的强大支持，并且正在其商业版本中集成一个图形计算引擎。`Dynamo` 的可调一致性模型，加上
    `Cassandra` 的轻量级事务特性，覆盖了比其他非关系型竞争者更广泛的事务场景。然而，目前没有支持完整 SQL 或多对象 `ACID` 事务的路线图。

    *   `Apache Kudu` 旨在构建一个同等支持全表扫描和基于记录访问模式的非关系型系统。其技术方法涉及结合基于内存的行存储和基于磁盘的列式存储。其明确意图是弥合
    `HDFS` 在完整“表”扫描性能与 `HBase` 行级访问性能之间的差距。这本身并不能提供真正的混合解决方案，但与 `Apache Impala` 结合使用，可以提供一个支持
    SQL 的数据库，同时提供键值式访问和 `Hadoop` 兼容性。然而，目前尚无多行事务的计划。


    ## 颠覆性的数据库技术


    到目前为止，我描述的是一个数据库技术在最近出现分化之后，将朝着某种“统一模型”数据库方向融合的未来。


    推断现有技术是一项有用的消遣，而且通常是唯一可用的预测技术。然而，历史告诉我们，技术并不总是沿着现有轨迹发展。颠覆性技术会出现，它们带来的不连续性无法被推断，也无法总是被完全预见。


    颠覆性的新数据库技术可能即将出现，但同样可能的是，过去十年间数据库技术发生的巨大变化，已经代表了我们所能轻易接受的最大程度的变革。


    尽管如此，有一些计算技术趋势超越了数据库架构，并可能严重影响未来的数据库。


    ### 存储技术


    自从数字数据库诞生以来，速度经济和存储经济之间就一直存在强烈的冲突。提供最大存储经济效益（用于存储大量数据）的介质（磁盘、磁带）伴随着最慢的速度，因此对吞吐量和延迟的经济性最差。相反，提供最低延迟和最高吞吐量（内存、`SSD`）的介质，每单位存储成本最昂贵。


    正如在第 [7](#A978-1-4842-1329-2_7_Chapter.html) 章中所指出的，虽然 `SSD` 的每 `TB` 价格在稳步下降，但磁盘的每
    `TB` 价格也在下降。推断表明，`SSD` 在短期内不会显著便宜于磁盘用于大容量存储。即使 `SSD` 的价格与磁盘持平，内存与 `SSD` 之间的性价比差异仍然将是决定性的：内存的速度仍然比
    `SSD` 快许多数量级，但每 `TB` 的价格也昂贵许多数量级。


    只要这种经济差异持续存在，我们将被鼓励采用使用不同存储技术的数据库架构，以优化“慢速”数据的经济性和“快速”数据的经济性。像 `Hadoop` 这样的系统将继续优化每
    `TB` 的成本，而像 `HANA` 这样的系统将试图最小化提供高吞吐量或低延迟的成本。


    然而，如果出现一种技术，能同时为大规模存储和延迟提供可接受的经济效益，那么我们可能会看到数据库架构几乎立即的转变。这种通用内存将提供相当于 `RAM` 的访问速度，同时兼具磁盘的持久性、持久性和存储经济性。


    大多数技术专家认为，这种颠覆性的存储技术还需要几年时间才会出现，但鉴于持续的大量投资，我们最终很可能会创造出一种持久、快速且经济的存储介质，能够满足所有数据库工作负载的需求。当这种情况发生时，我们今天看到的许多数据库架构将失去其存在的关键理由。例如，如果持久存储（即磁盘）能像内存一样快，那么
    `Spark` 和 `Hadoop` 之间的差异就会变得微乎其微。


    一些重要的新存储技术即将出现，包括忆阻器和相变内存。然而，这些新技术似乎都不太可能立即实现通用内存的愿景。


    ### 区块链


    过去几年你如果没听说过比特币，那你一定是生活在岩石下。比特币是一种电子加密货币，在许多网络交易中可以像现金一样使用。在撰写本文时，大约有 1500 万个比特币在流通，每个交易价格约为
    360 美元，总价值约为 53 亿美元。


    比特币结合了点对点技术和公钥密码学。比特币的所有者可以使用私钥来主张所有权并授权交易；其他人可以使用公钥来验证交易。与其他点对点系统（如 `Bittorrent`）一样，没有中央服务器维护比特币交易；而是有一个名为区块链的分布式公共账本。


    加密货币的影响远超本文范围，但区块链概念对数据库技术有明确的影响。区块链取代了通常必须调解任何资金转移的可信第三方。不是由集中式数据库记录交易并对各方进行身份验证，区块链允许交易和身份通过区块链网络的共识进行验证；也就是说，每笔交易在达成之前，都通过基于公钥的身份验证由多个节点确认。


    比特币底层的区块链是公开的，但也可能存在私有（或许可）区块链，这些区块链是“仅限邀请”的。无论是私有还是公有，区块链可以说代表了一种新型的共享分布式数据库。与基于
    `Dynamo` 模型的系统一样，区块链中的数据在大量主机上冗余分布。然而，区块链代表了数据库中权限管理方式的完整范式转变。在现有的数据库系统中，数据库所有者对数据库中保存的数据拥有绝对控制权。然而，在区块链系统中，所有权由数据的创建者维护。'
  raw: '*   NuoDB is a SQL-based relational system that uses optimistic asynchronous
    propagation of transactions to achieve near-ACID consistency in a distributed
    context. Slight deviations from strict ACID consistency might result from this
    approach: not all replicas will be updated simultaneously across the cluster.
    In a manner somewhat similar to that of Dynamo systems, the user can tune the
    consistency levels required. NuoDB also separates the storage layer from the transactional
    layer, allowing for a pluggable storage engine architecture.

    *   Splice Machine layers a relationally compatible SQL layer over an HBase-managed
    storage system. Although its key objective is to leverage HBase scalability to
    provide a more economically scalable SQL engine, it does allow for hybrid data
    access because the data may be retrieved directly from HBase using MapReduce or
    YARN, as well as via SQL from the relational layer.

    *   Cassandra has added strong support for JSON in its current release and is
    also integrating a graph compute engine into its business organization edition.
    The Dynamo tunable consistency model, together with the Cassandra lightweight
    transaction feature, covers a broader range of transactional scenarios than other
    nonrelational competitors. However, there is no roadmap for full SQL or multi-object
    ACID transactions.

    *   Apache Kudu is an attempt to build a nonrelational system that equally supports
    full-scan and record-based access patterns. The technological approach involves
    combining in-memory row-based storage and disk-based columnar storage. The stated
    intent is to bridge the gap between HDFS performance for complete “table” scans
    and HBase row-level access. Of itself, this doesn’t provide a truly hybrid solution,
    but coupled with Apache Impala, it could provide a SQL-enabled database that also
    provides key-value style access and Hadoop compatibility. However, there is no
    plan as yet for multi-row transactions.


    ## Disruptive Database Technologies


    So far, I’ve described a future in which the recent divergence of database technologies
    is followed by a period of convergence toward some sort of “unified model” of
    databases.


    Extrapolating existing technologies is a useful pastime, and is often the only
    predictive technique available. However, history teaches us that technologies
    don’t always continue along an existing trajectory. Disruptive technologies emerge
    that create discontinuities that cannot be extrapolated and cannot always be fully
    anticipated.


    It’s possible that a disruptive new database technology is imminent, but it’s
    just as likely that the big changes in database technology that have occurred
    within the last decade represent as much change as we can easily accept.


    That said, there are a few computing technology trends that extend beyond database
    architecture and that may impinge heavily on the databases of the future.


    ### Storage Technologies


    Since the dawn of digital databases, there has been a strong conflict between
    the economies of speed and the economies of storage. The media that offer the
    greatest economies for storing large amounts of data (magnetic disk, tape) come
    with the slowest times and therefore the worst economies for throughput and latency.
    Conversely, the media that offer the lowest latencies and the highest throughput
    (memory, SSD) are the most expensive per unit of storage.


    As was pointed out in Chapter [7](#A978-1-4842-1329-2_7_Chapter.html), although
    the price per terabyte of SSDs is dropping steadily, so is the price per terabyte
    for magnetic disk. Extrapolation does not suggest that SSDs will be significantly
    cheaper than magnetic disk for bulk storage anytime soon. And even if SSDs matched
    magnetic disk prices, the price/performance difference between memory and SSD
    would still be decisive: memory remains many orders of magnitude faster than SSD,
    but also many orders of magnitude more expensive per terabyte.


    As long as these economic disparities continue, we will be encouraged to adopt
    database architectures that use different storage technologies to optimize the
    economies of B Data and the economies of “fast” data. Systems like Hadoop will
    continue to optimize cost per terabyte, while systems like HANA will attempt to
    minimize the cost of providing high throughput or low latency.


    However, should a technology arise that simultaneously provides acceptable economies
    for mass storage and latency, then we might see an almost immediate shift in database
    architectures. Such a universal memory would provide access speeds equivalent
    to RAM, together with the durability, persistence, and storage economies of disk.


    Most technologists believe that it will be some years before such a disruptive
    storage technology arises, though given the heavy and continuing investment, it
    seems likely that we will eventually create a persistent fast and economic storage
    medium that can meet the needs of all database workloads. When this happens, many
    of the database architectures we see today will have lost a key part of their
    rationale for existence. For instance, the difference between Spark and Hadoop
    would become minimal if persistent storage (a.k.a. disk) was as fast as memory.


    There are a number of significant new storage technologies on the horizon, including
    Memristors and Phase-change memory. However, none of these new technologies seems
    likely to imminently realize the ambitions of universal memory.


    ### Blockchain


    You would have to have been living under a rock for the past few years not to
    have heard of bitcoin. The bitcoin is an electronic cryptocurrency that can be
    used like cash in many web transactions. At the time of this writing, there are
    about 15 million bitcoins in circulation, trading at approximately $US 360 each,
    for a total value of about $US 5.3 billion.


    The bitcoin combines peer-to-peer technology and public key cryptography. The
    owner of a bitcoin can use a private key to assert ownership and authorize transactions;
    others can use the public key to validate the transaction. As in other peer-to-peer
    systems, such as Bittorrent, there is no central server that maintains bitcoin
    transactions; rather, there is a distributed public ledger called the blockchain.


    The implications of cryptocurrencies are way beyond our scope here, but there
    are definite repercussions for database technologies in the blockchain concept.
    Blockchain replaces the trusted third party that must normally mediate any transfer
    of funds. Rather than there being a centralized database that records transactions
    and authenticates each party, blockchain allows transactions and identities to
    be validated by consensus with the blockchain network; that is, each transaction
    is confirmed by public-key-based authentication from multiple nodes before being
    concluded.


    The blockchain underlying the bitcoin is public, but there can be private (or
    permissioned) blockchains that are “invitation only.” Whether private or public,
    blockchains arguably represent a new sort of shared distributed database. Like
    systems based on the Dynamo model, the data in the blockchain is distributed redundantly
    across a large number of hosts. However, the blockchain represents a complete
    paradigm shift in how permissions are managed within the database. In an existing
    database system, the database owner has absolute control over the data held in
    the database. However, in a blockchain system, ownership is maintained by the
    creator of the data.'
