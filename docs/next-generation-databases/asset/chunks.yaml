- fmt: '### Vector Clocks


    Cassandra uses timestamps to work out which is the “latest” transaction. If there
    are two conflicting modifications to a column value, the one with the highest
    timestamp will be considered the most recent and the most correct.


    Other Dynamo systems use a more complex mechanism known as a vector clock. The
    vector clock has the advantage of not requiring clock synchronization across all
    nodes, and helps us identify transactions that might be in conflict.


    Despite its name, the vector clock does not include any timestamps. Rather, it
    is composed of a set of counters. These counters are incremented when operations
    complete, in a way that’s similar to the traditional system change number pattern
    discussed earlier. The set contains one counter for each node in the cluster.
    Whenever an operation occurs on a node, that node will increment its own counter
    within its vector clock. Whenever a node transmits an operation to another node,
    it will include its vector clock within the request. The transmitted vector clock
    will include the highest counter for the transmitting node and the highest counters
    from other nodes that the transmitting node has ever seen.


    When a node receives possibly conflicting updates from other nodes, it can compare
    the vector clocks to determine the relative sequencing of the requests. There
    is a defined set of vector clock operations that can tell if:

    *   The two vector clocks come from nodes that are completely in sync.

    *   One node is out of date with respect of the other node.

    *   The clocks are concurrent in that each node has some information that is more
    up to date than the other node. In this case, we can’t choose which update is
    truly the more correct.


    Vector clocks are notoriously difficult to understand, though the underlying algorithm
    is really quite simple. Figure [9-4](#A978-1-4842-1329-2_9_Chapter.html#Fig4)
    shows an example of three vector clocks incrementing across three nodes. The algorithm
    is somewhat simplified to improve clarity.


    ![A978-1-4842-1329-2_9_Fig4_HTML.jpg](A978-1-4842-1329-2_9_Fig4_HTML.jpg)


    Figure 9-4. Vector clock example


    In Figure [9-4](#A978-1-4842-1329-2_9_Chapter.html#Fig4), the vector clocks start
    out set to 0 for all nodes (1). Updates to nodes from external clients cause the
    nodes to increment their own element of the vector clock (2). When these changes
    are propagated to other nodes, the receiving node updates its vector clock and
    merges the vector clocks from the other nodes (3). Event (H) occurs when node
    2 receives the vector clock (F) from node 1 and (G) from node 3 (4). Each of these
    vector clocks contains elements higher than the other; vector clock (F) has the
    higher value for node 1, while vector clock (G) has the higher value for node
    3. There is no way for node 2 to be sure which of the two vector clocks represents
    the most up-to-date data—each of the sending nodes “knows” something that the
    other node does not, and consequently it’s not clear which of the two nodes “knows”
    best.


    The vector clock in Figure [9-4](#A978-1-4842-1329-2_9_Chapter.html#Fig4) tells
    us that version (G) and version (F) are conflicting—each contains information
    from unique updates that could both contain important information. What, then,
    is the system to do? Here are some of the options:

    *   Revert to last write wins: Two updates are unlikely to have occurred at the
    exact same nanosecond, so one will have a higher timestamp value. We could decide
    that the highest timestamp “wins.”

    *   Keep both copies: This requires that the application or the user resolve the
    conflict.

    *   Merge the data: This is the approach taken by the original Dynamo, which managed
    Amazon’s shopping cart. If there are two conflicting shopping carts, they are
    merged and the worst that can happen (from Amazon’s point of view) is that you
    buy some things twice. Another merge can occur with things like counters; rather
    than having one counter increment overwrite another, we can deduce that both operations
    wanted to increment the counter and increment it twice. A special class of data
    types— conflict-free replicated data type (CRDT)—exists that allows these sorts
    of merges to be predefined.


    There are advocates for the vector clock and advocates for the timestamp system
    used in Cassandra. Neither party disputes the concrete implications of the two
    approaches; they differ on the desirability of the consequences. Last write wins
    represents a simpler model for the application developer and administrator, while
    vector clocks allow for conflicts to be identified but that must then be resolved.


    ### Lightweight Transactions


    Cassandra is a lockless architecture, which uses conflict resolution rather than
    locking to allow high availability and performance. However, sometimes operations
    need to atomically combine a read operation and a write operation. For instance,
    consider the scenario shown in Figure [9-5](#A978-1-4842-1329-2_9_Chapter.html#Fig5):
    a familiar transactional operation modifying two account balances. Two Cassandra
    sessions issue Cassandra Query Language (CQL) statements to retrieve the current
    balance of an account (1). Based on this information, the first session applies
    an interest payment (2) and momentarily afterwards the second session increases
    the balance to process a deposit (3). The second update overwrites the first update
    and the interest payment is lost.


    ![A978-1-4842-1329-2_9_Fig5_HTML.jpg](A978-1-4842-1329-2_9_Fig5_HTML.jpg)


    Figure 9-5. Lost update problem


    Of course, the lack of ACID transactions is one of the reasons Cassandra might
    not be suitable for this sort of banking application. However, it is common in
    almost all applications for some form of atomic operation to be required, and
    Cassandra offers lightweight transactions (LWT) to support these requirements.


    Cassandra transactions are called “lightweight” because they apply to only a single
    operation and support only a compare-and-set (CAS) pattern. A CAS operation is
    an atomic operation that checks a value, and if the value is as expected, sets
    another value.


    In Cassandra, the lightweight transactions are expressed in the Cassandra Query
    Language using the IF clause. Figure [9-6](#A978-1-4842-1329-2_9_Chapter.html#Fig6)
    illustrates how this could solve the lost update scenario that we encountered
    in Figure [9-5](#A978-1-4842-1329-2_9_Chapter.html#Fig5).


    As before, each session queries the current balance (1). The first session applies
    the interest payment, which succeeds because the balance specified in the `IF`
    clause is correct (2). However, the second transaction that attempts to add a
    $100 deposit fails because the balance has changed since the time it was first
    read (3). The new balance is returned in the failure message, allowing the session
    to retry the transaction successfully (4).


    ![A978-1-4842-1329-2_9_Fig6_HTML.jpg](A978-1-4842-1329-2_9_Fig6_HTML.jpg)


    Figure 9-6. Solving lost updates with lightweight transactions


    Those familiar with relational database transactions will recognize the scenario
    in Figure [9-6](#A978-1-4842-1329-2_9_Chapter.html#Fig6) as the optimistic locking
    pattern.


    Cassandra’s lightweight transactions use a quorum-based transaction protocol called
    Paxos. The Paxos protocol is notoriously difficult to describe and is complicated
    in implementation, but it resembles a form of the Two Phase Commit (2PC) protocol
    discussed earlier in the context of distributed relational database transactions.
    The key difference with Paxos is that it uses a quorum—that is, a majority—to
    determine success or failure rather than requiring that every node successfully
    apply the change.


    The modified Cassandra Paxos protocol works in four phases:'
