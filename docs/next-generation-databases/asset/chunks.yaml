  trans: '


    ## 谷歌与 Hadoop


    到 2005 年，谷歌已成为全球最大的网站——这一地位从谷歌成立几年后便已确立。当谷歌初创时，关系型数据库虽已成熟，但面对谷歌所需处理的数据规模和速度，它显得力不从心。如今企业面临的"大数据"挑战，谷歌在近
    20 年前就已首次遭遇。谷歌很早就不得不发明全新的软硬件架构，以存储和处理其需要索引的、呈指数级增长的网站数据。


    2003 年，谷歌披露了构成其存储架构基础的分布式文件系统`GFS`的细节⁵；2004 年，它又披露了用于创建万维网索引的分布式并行处理算法`MapReduce`的细节⁶。2006
    年，谷歌公开了其`BigTable`分布式结构化数据库的详情⁷。


    这些概念，连同许多同样源自谷歌的其他技术，构成了 Hadoop 项目的基础。Hadoop 在雅虎内部走向成熟，并从 2007 年开始被迅速广泛采用。Hadoop
    生态系统最为关键，它成为了我们将在第 2 章详细讨论的大数据生态系统的**技术使能者**。


    ## 其他互联网公司


    尽管谷歌的运营总体规模和数据量远超其他任何网络公司，但其他网站也有自己的挑战。专注于在线电子商务的网站——例如亚马逊——需要能够大规模运行的事务处理能力。早期的社交网站如
    MySpace，以及后来的 Facebook，在将其基础设施从支持数千用户扩展到数百万用户的过程中，也面临着类似的挑战。


    同样，即使是 Oracle 这样最昂贵的商业关系数据库管理系统，也无法提供足够的可扩展性来满足这些网站的需求。Oracle 的横向扩展 RDBMS 架构（`Oracle
    RAC`）试图为无限扩展提供路线图，但它在经济上缺乏吸引力，并且似乎从未能满足最前沿所需的规模。


    许多早期网站试图通过各种"自己动手"的技术来扩展开源数据库。这涉及利用`Memcached`等分布式对象缓存来减轻数据库负载，通过数据库复制来分散数据库读取活动，以及最终——当其他方法都失败时——采用"分片"。


    分片涉及根据一个键属性（例如客户标识符）将数据分区存储到多个数据库中。例如，在 Twitter 和 Facebook 中，客户数据被分散到数量庞大的`MySQL`数据库上。特定用户的大多数数据最终存储在一个数据库上，以便针对该客户的操作能快速完成。这需要应用程序来确定正确的分片并适当地路由请求。


    在 Facebook 等网站上采用分片，使得基于`MySQL`的系统能够扩展到巨大规模，但这样做的缺点也非常多。许多关系型操作和数据库级别的`ACID`事务丢失了。跨分片执行连接或维护事务完整性变得不可能。分片的运营成本，加上关系型特性的丧失，使得许多人开始寻求
    RDBMS 的替代方案。


    与此同时，亚马逊内部一个类似的困境，导致了在其自研数据存储中开发一种不同于严格`ACID`一致性的替代模型。亚马逊于 2008 年披露了这个名为"Dynamo"系统的细节⁸。


    亚马逊的`Dynamo`模型，加上寻求"网络规模"数据库的 Web 开发者的创新，共同催生了后来被称为键值数据库的类别。我们将在第 3 章更详细地讨论这些。


    ## 云计算


    应用程序和数据库"在云端"——即通过互联网访问——的存在，自 20 世纪 90 年代末以来一直是应用领域的一个持续特征。然而，大约在 2008 年，云计算有些突然地爆发，成为大型组织的重要关切和初创公司的巨大机遇。


    在之前的 5 到 10 年里，主流计算机应用已从基于客户端-服务器模型的丰富桌面应用，转向了数据存储和应用服务器位于可通过互联网访问的某处——"云端"——的基于
    Web 的应用。这给新兴公司带来了真正的挑战，它们需要设法为早期用户提供足够的托管能力，并能在经历梦寐以求的指数级增长时迅速扩展。


    2006 年至 2008 年间，亚马逊推出了弹性计算云（`EC2`）。`EC2`提供了托管在亚马逊硬件基础设施上、可通过互联网访问的虚拟机映像。`EC2`可用于托管
    Web 应用，并能按需相对快速地增加计算能力。亚马逊还增加了其他服务，如存储（`S3`、`EBS`）、虚拟私有云（`VPC`）、`MapReduce`服务（`EMR`）等。整个平台被称为亚马逊网络服务（`AWS`），是首个实用的基础设施即服务（`IaaS`）云。`AWS`成为了谷歌、微软等其他公司提供云计算服务的灵感来源。


    对于希望利用云计算平台所允许的弹性可扩展性的应用程序来说，现有的关系型数据库并不合适。Oracle 尝试将网格计算集成到其架构中，但只取得了有限的成功，并且对于这些需要按需扩展的应用程序来说，既不经济也不实用。这种对弹性可扩展数据库的需求，加上基于
    Web 的初创公司所产生的需求，加速了键值存储的增长，这些存储通常基于亚马逊自己的`Dynamo`设计。事实上，亚马逊在其云中提供了非关系型服务，从`SimpleDB`开始，后来被`DynamoDB`取代。


    ## 文档数据库


    程序员们始终对面向对象模型与关系模型之间的"阻抗不匹配"感到不满。对象关系映射系统只能轻微缓解当需要将复杂对象以范式存储在关系型数据库中时产生的不便。


    大约从 2004 年开始，越来越多的网站能够提供比以往丰富得多的交互体验。这得益于被称为`AJAX`（异步 JavaScript 和 XML）的编程风格，在这种风格中，浏览器内的
    JavaScript 通过传输`XML`消息直接与后端通信。`XML`很快被 JavaScript 对象表示法（`JSON`）所取代，这是一种类似`XML`的自描述格式，但更紧凑，并且与
    JavaScript 语言紧密结合。


    `JSON`成为了将对象存储（序列化）到磁盘的事实标准格式。一些网站开始将`JSON`文档直接存储到关系型表的列中。很快，就有人决定省去关系型中间层，创建一个可以直接存储`JSON`的数据库。这些数据库被称为文档数据库。


    `CouchBase`和`MongoDB`是两种流行的面向`JSON`的数据库，尽管几乎所有非关系型数据库——以及大多数关系型数据库——都支持`JSON`。程序员喜欢文档数据库的原因与他们喜欢`OODBMS`的原因相同：它免去了将对象转换为关系格式的繁琐过程。我们将在第
    4 章更详细地探讨文档数据库。


    '
- fmt: '### The “NewSQL”


    Neither the relational nor the ACID transaction model dictated the physical architecture
    for a relational database. However, partly because of a shared ancestry and partly
    because of the realities of the hardware of the day, most relational databases
    ended up being implemented in a very similar manner. The format of data on disk,
    the use of memory, the nature of locks, and so on varied only slightly among the
    major `RDBMS` implementations.


    In 2007, Michael Stonebraker, pioneer of the `Ingres` and `Postgres` database
    systems, led a research team that published the seminal paper “The End of an Architectural
    Era (It’s Time for a Complete Rewrite).” [⁹](#A978-1-4842-1329-2_1_Chapter.html#Sec19)
    This paper pointed out that the hardware assumptions that underlie the consensus
    relational architecture no longer applied, and that the variety of modern database
    workloads suggested a single architecture might not be optimal across all workloads.


    Stonebraker and his team proposed a number of variants on the existing `RDBMS`
    design, each of which was optimized for a specific application workload. Two of
    these designs became particularly significant (although to be fair, neither design
    was necessarily completely unprecedented). `H-Store` described a pure in-memory
    distributed database while `C-Store` specified a design for a columnar database.
    Both these designs were extremely influential in the years to come and are the
    first examples of what came to be known as `NewSQL` database systems—databases
    that retain key characteristics of the `RDBMS` but that diverge from the common
    architecture exhibited by traditional systems such as `Oracle` and `SQL Server`.
    We’ll examine these database types in [Chapters 6](#A978-1-4842-1329-2_6_Chapter.html)
    and [7](#A978-1-4842-1329-2_7_Chapter.html).


    ### The Nonrelational Explosion


    As we saw in Figure [1-1](#A978-1-4842-1329-2_1_Chapter.html#Fig1), a huge number
    of relational database systems emerged in the first half of the 2000s. In particular,
    a sort of “Cambrian explosion” occurred in the years 2008–2009: literally dozens
    of new database systems emerged in this short period. Many of these have fallen
    into disuse, but some—such as `MongoDB`, `Cassandra`, and `HBase`—have today captured
    significant market share.


    At first, these new breeds of database systems lacked a common name. “Distributed
    Non-Relational Database Management System” (`DNRDBMS`) was proposed, but clearly
    wasn’t going to capture anybody’s imagination. However, in late 2009, the term
    `NoSQL` quickly caught on as shorthand for any database system that broke with
    the traditional SQL database.


    In the opinion of many, `NoSQL` is an unfortunate term: it defines what a database
    is not rather than what it is, and it focuses attention on the presence or absence
    of the SQL language. Although it’s true that most nonrelational systems do not
    support SQL, actually it is variance from the strict transactional and relational
    data model that motivated most `NoSQL` database designs.


    By 2011, the term `NewSQL` became popularized as a means of describing this new
    breed of databases that, while not representing a complete break with the relational
    model, enhanced or significantly modified the fundamental principles—and this
    included columnar databases, discussed in [Chapter 6](#A978-1-4842-1329-2_6_Chapter.html),
    and in some of the in-memory databases discussed in [Chapter 7](#A978-1-4842-1329-2_7_Chapter.html).


    Finally, the term `Big Data` burst onto mainstream consciousness in early 2012.
    Although the term refers mostly to the new ways in which data is being leveraged
    to create value, we generally understand “`Big Data` solutions” as convenient
    shorthand for technologies that support large and unstructured datasets such as
    `Hadoop`.


    Note


    `NoSQL`, `NewSQL`, and `Big Data` are in many respects vaguely defined, overhyped,
    and overloaded terms. However, they represent the most widely understood phrases
    for referring to next-generation database technologies.


    Loosely speaking, `NoSQL` databases reject the constraints of the relational model,
    including strict consistency and schemas. `NewSQL` databases retain many features
    of the relational model but amend the underlying technology in significant ways.
    `Big Data` systems are generally oriented around technologies within the `Hadoop`
    ecosystem, increasingly including `Spark`.'
  raw: '### The “NewSQL”


    Neither the relational nor the ACID transaction model dictated the physical architecture
    for a relational database. However, partly because of a shared ancestry and partly
    because of the realities of the hardware of the day, most relational databases
    ended up being implemented in a very similar manner. The format of data on disk,
    the use of memory, the nature of locks, and so on varied only slightly among the
    major RDBMS implementations.


    In 2007, Michael Stonebraker, pioneer of the Ingres and Postgres database systems,
    led a research team that published the seminal paper “The End of an Architectural
    Era (It’s Time for a Complete Rewrite).” [⁹](#A978-1-4842-1329-2_1_Chapter.html#Sec19)
    This paper pointed out that the hardware assumptions that underlie the consensus
    relational architecture no longer applied, and that the variety of modern database
    workloads suggested a single architecture might not be optimal across all workloads.


    Stonebraker and his team proposed a number of variants on the existing RDBMS design,
    each of which was optimized for a specific application workload. Two of these
    designs became particularly significant (although to be fair, neither design was
    necessarily completely unprecedented). H-Store described a pure in-memory distributed
    database while C- Store specified a design for a columnar database. Both these
    designs were extremely influential in the years to come and are the first examples
    of what came to be known as NewSQL database systems—databases that retain key
    characteristics of the RDBMS but that diverge from the common architecture exhibited
    by traditional systems such as Oracle and SQL Server. We’ll examine these database
    types in [Chapters 6](#A978-1-4842-1329-2_6_Chapter.html) and [7](#A978-1-4842-1329-2_7_Chapter.html).


    ### The Nonrelational Explosion


    As we saw in Figure [1-1](#A978-1-4842-1329-2_1_Chapter.html#Fig1), a huge number
    of relational database systems emerged in the first half of the 2000s. In particular,
    a sort of “Cambrian explosion” occurred in the years 2008–2009: literally dozens
    of new database systems emerged in this short period. Many of these have fallen
    into disuse, but some—such as MongoDB, Cassandra, and HBase—have today captured
    significant market share.


    At first, these new breeds of database systems lacked a common name. “Distributed
    Non-Relational Database Management System” (DNRDBMS) was proposed, but clearly
    wasn’t going to capture anybody’s imagination. However, in late 2009, the term
    NoSQL quickly caught on as shorthand for any database system that broke with the
    traditional SQL database.


    In the opinion of many, NoSQL is an unfortunate term: it defines what a database
    is not rather than what it is, and it focuses attention on the presence or absence
    of the SQL language. Although it’s true that most nonrelational systems do not
    support SQL, actually it is variance from the strict transactional and relational
    data model that motivated most NoSQL database designs.


    By 2011, the term NewSQL became popularized as a means of describing this new
    breed of databases that, while not representing a complete break with the relational
    model, enhanced or significantly modified the fundamental principles—and this
    included columnar databases, discussed in [Chapter 6](#A978-1-4842-1329-2_6_Chapter.html),
    and in some of the in-memory databases discussed in [Chapter 7](#A978-1-4842-1329-2_7_Chapter.html).


    Finally, the term Big Data burst onto mainstream consciousness in early 2012\.
    Although the term refers mostly to the new ways in which data is being leveraged
    to create value, we generally understand “Big Data solutions” as convenient shorthand
    for technologies that support large and unstructured datasets such as Hadoop.


    Note


    NoSQL, NewSQL, and Big Data are in many respects vaguely defined, overhyped, and
    overloaded terms. However, they represent the most widely understood phrases for
    referring to next-generation database technologies.


    Loosely speaking, NoSQL databases reject the constraints of the relational model,
    including strict consistency and schemas. NewSQL databases retain many features
    of the relational model but amend the underlying technology in significant ways.
    Big Data systems are generally oriented around technologies within the Hadoop
    ecosystem, increasingly including Spark.'
  trans: '

    ### “NewSQL”


    关系模型或 ACID 事务模型并未规定关系型数据库的物理架构。然而，部分由于共同的历史渊源，部分由于当时硬件的现实条件，大多数关系型数据库最终以非常相似的方式实现。磁盘上的数据格式、内存的使用、锁的性质等，在各大`RDBMS`实现之间仅有细微差别。


    2007 年，`Ingres`和`Postgres`数据库系统的先驱 Michael Stonebraker 领导的一个研究团队发表了开创性论文《一个架构时代的终结（是时候进行全面重写了）》⁹。该论文指出，支撑主流关系型架构的硬件假设已不再适用，并且现代数据库工作负载的多样性表明，单一架构可能并非在所有负载下都是最优的。


    Stonebraker 及其团队提出了对现有`RDBMS`设计的若干变体，每种都针对特定的应用负载进行了优化。其中两种设计变得尤为重要（尽管公平地说，这两种设计并非完全是前所未有的）。`H-Store`描述了一种纯内存分布式数据库，而`C-Store`则指定了一种列式数据库的设计。这两种设计在随后的几年里都极具影响力，并且是后来被称为`NewSQL`数据库系统的首批范例——这类数据库保留了`RDBMS`的关键特性，但又不同于`Oracle`和`SQL
    Server`等传统系统所展示的常见架构。我们将在第 6 章和第 7 章中探讨这些数据库类型。


    ### 非关系型数据库的爆发


    正如我们在图 1-1 中所看到的，在 2000 年代上半叶涌现了大量关系型数据库系统。特别是，在 2008 年至 2009 年间发生了一种“寒武纪大爆发”：短短几年内出现了几十种新的数据库系统。其中许多现已废弃不用，但有些——如`MongoDB`、`Cassandra`和`HBase`——如今已占据了可观的市场份额。


    起初，这些新型数据库系统缺乏一个通用名称。有人提出了“分布式非关系型数据库管理系统”（`DNRDBMS`），但显然这无法激发人们的想象力。然而，在 2009
    年末，`NoSQL`这个术语迅速流行起来，作为任何与传统 SQL 数据库分道扬镳的数据库系统的简称。


    在许多人看来，`NoSQL`是一个不幸的术语：它定义了数据库“不是”什么，而非它“是”什么，并且它将注意力集中在了 SQL 语言的存在与否上。尽管大多数非关系型系统确实不支持
    SQL，但实际上，促使大多数`NoSQL`数据库设计的动机是偏离严格的事务型和关系型数据模型。


    到 2011 年，`NewSQL`这个术语开始流行，用以描述这一新型数据库：它们虽不代表与关系模型的完全决裂，但增强或从根本上修改了其基本原则——这包括在第
    6 章讨论的列式数据库，以及在第 7 章讨论的部分内存数据库。


    最后，`大数据`一词在 2012 年初进入了主流视野。虽然该术语主要指的是利用数据创造价值的新方式，但我们通常将“`大数据`解决方案”理解为支持大规模非结构化数据集（如`Hadoop`）的技术的便捷简称。


    **注意**


    `NoSQL`、`NewSQL`和`大数据`这些术语在许多方面定义模糊、被过度炒作且含义过载。然而，它们代表了指向下一代数据库技术的、最广为人知的说法。


    粗略地说，`NoSQL`数据库摒弃了关系模型的约束，包括严格一致性和模式。`NewSQL`数据库保留了关系模型的许多特性，但以显著方式改进了底层技术。`大数据`系统通常围绕`Hadoop`生态系统内的技术构建，越来越多地纳入`Spark`。

