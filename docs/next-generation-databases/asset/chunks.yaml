  trans: '### 共享无共享与共享磁盘


    分发数据库工作负载的复制模式能很好地将读活动分散到多个服务器上，但它无法分发事务性写负载，写操作仍然必须完全定向到主服务器。


    复制对于分发数据仓库工作负载的价值也有限。联机事务处理（OLTP）工作负载通常由大量短时请求组成。然而，在数据仓库环境中，工作负载通常由数量较少但数据密集型的查询构成。在高端数据库服务器中，这些海量查询由多个进程或线程执行，每个进程或线程可以利用独立的
    CPU 核心并受益于多个 I/O 通道。


    跨多个数据库服务器并行化查询需要新的方法。数据仓库供应商通过实现无共享集群数据库架构为这个问题提供了解决方案。与关系型世界中的许多概念一样，无共享思想最著名的是由**Michael
    Stonebraker**在 1980 年代概述。数据库服务器可以被分类为：


    *   **全共享**：在这种情况下，每个数据库进程共享相同的内存、CPU 和磁盘资源。共享内存意味着每个进程都在同一个服务器上，因此这种架构是单节点数据库架构。

    *   **共享磁盘**：在这种情况下，数据库进程可以存在于集群中的不同节点上，并可以访问其所在服务器的 CPU 和内存。然而，每个进程对磁盘设备拥有平等的访问权，这些设备在集群的所有节点之间共享。

    *   **无共享**：在这种情况下，集群中的每个节点不仅可以访问自己的内存和 CPU，还可以访问专用的磁盘设备及其自己的数据库子集。我们在本书中已经看到几个无共享架构的例子，包括第
    3 章中的分片 MySQL 设计和第 7 章中的 VoltDB 分区方案。


    无共享模型成为早期几个集群数据库系统（如 Teradata）的基础。它为数据仓库工作负载提供了一个有吸引力的模型，因为查询可以基于它们希望访问的数据轻松地在多个节点上并行化。对于一个希望最大化以读为中心的工作负载的系统来说，实现起来要容易得多。采用无共享模型的数据库通常自称为大规模并行处理（`MPP`）数据库。图
    8-3 展示了无共享模型。


    ![A978-1-4842-1329-2_8_Fig3_HTML.jpg](img/A978-1-4842-1329-2_8_Fig3_HTML.jpg)

    *图 8-3. 无共享数据库架构*


    无共享架构在事务场景中往往会失效，因为需要协调可能涉及多个节点上数据的事务。由于 ACID 事务是“要么全做，要么全不做”的，事务中的所有节点必须在事务执行上紧密协调。这种协调被称为两阶段提交，实现起来非常困难，并可能导致“状态不明”的事务结果和较差的事务性能。


    无共享架构的另一个缺点是，如果没有仔细分区，集群工作负载会变得不平衡。维护正确的分区成为一个主要的运维活动。当从集群中添加或移除节点时，需要进行昂贵的再平衡操作。


    共享磁盘架构在理论上允许更大、更弹性的可扩展性，并且它消除了再平衡操作的需要。它还提供了一种更经济的高可用性解决方案，因为没有节点对任何特定的数据集负有专属责任。在无共享架构中，节点故障会导致部分数据库不可用，而在共享磁盘架构中，剩余节点能够接管故障节点的责任。


    共享磁盘架构面临的挑战是需要跨节点协调缓存数据。如果没有内存缓存，所有操作的性能将下降到磁盘速度。但为了在所有节点上维护一致的数据视图，每个节点需要维护一致的缓存。维护这种缓存一致性会给节点间的网络带来压力，并且难以成功实现。


    迄今为止，在商业上唯一取得成功的共享磁盘关系数据库管理系统（RDBMS）是 Oracle 的真正应用集群（`RAC`）集群数据库。`RAC`是 Oracle
    的`Exadata`数据库一体机和云数据库产品的基础。图 8-4 展示了共享磁盘模型。


    ![A978-1-4842-1329-2_8_Fig4_HTML.jpg](img/A978-1-4842-1329-2_8_Fig4_HTML.jpg)

    *图 8-4. 共享磁盘数据库架构*


    ## 非关系型分布式数据库


    在分布式关系数据库中跨多个节点维护 ACID 事务完整性是一项重大挑战。然而，在非关系型数据库系统中，通常不提供 ACID 合规性。对于非关系型分布式数据库，以下考虑因素变得更加重要：


    *   **平衡可用性与一致性**：正如我们在第 3 章中所见，布鲁尔 CAP 定理认为，一个旨在扩展超出单一本地网络的分布式数据库，在发生网络分区时必须在可用性和一致性之间做出选择。一个符合
    ACID 的数据库必须优先考虑一致性，而非其他所有因素。然而，没有严格 ACID 合规性约束的非关系型数据库可以取得不同的平衡。

    *   **硬件经济性**：当系统扩展到数千或数十万个节点时，即使单个服务器的成本有微小差异也会迅速放大。因此，一个经济的数据库架构将更好地利用商品化硬件，以获得可用的最佳性价比。此外，可能需要能够处理服务器配置之间的差异，以便可以在不升级所有现有节点至最新硬件规格的情况下，将新硬件添加到数据库集群中。

    *   **弹性**：在一个庞大的数据库集群中，节点会不时发生故障。在发生这些故障时，不能有数据丢失、可用性中断，甚至可能不能有事务级别的失败。


    新一代数据库采用了三种主要的分布式数据库架构。这三种模型是：


    *   **传统分片架构的变体**，其中数据根据“分片键”的值被分段存储在各个节点上。

    *   **`Hadoop HDFS/HBase`模型的变体**，其中“全知主节点”根据负载和其他因素决定数据在集群中的位置。

    *   **`Amazon Dynamo`一致性哈希模型**，其中数据基于键值的可预测数学哈希分布在集群的各个节点上。


    为了确保在服务器故障时不丢失数据，复制可能内置于这些架构中，尽管复制策略各不相同。我们将在本章剩余部分研究这些方法各自的例子。我们使用`MongoDB`作为分片架构的例子，`HBase`作为全知主节点的例子，`Cassandra`作为`Dynamo`风格一致性哈希的例子。


    ## MongoDB 分片与复制


    `MongoDB`支持分片以提供横向扩展能力，支持复制以实现高可用性。尽管两者可以独立实现，但在生产场景中通常同时存在。'
- fmt: '### Sharding


    A high-level representation of the MongoDB sharding architecture is shown in Figure
    [8-5](#A978-1-4842-1329-2_8_Chapter.html#Fig5). Each shard is implemented by a
    distinct MongoDB database, which in most respects is unaware of its role in the
    broader sharded server (1). A separate MongoDB database—the config server (2)—contains
    the metadata that can be used to determine how data is distributed across shards.
    A router process (3) is responsible for routing requests to the appropriate shard
    server.


    ![A978-1-4842-1329-2_8_Fig5_HTML.jpg](A978-1-4842-1329-2_8_Fig5_HTML.jpg)


    Figure 8-5. MongoDB sharding architecture


    You may recall that in MongoDB, a `collection` is used to store multiple JSON
    documents that usually have some common attributes. To shard a collection, we
    choose a `shard key`, which is one or more indexed attributes that will be used
    to determine the distribution of documents across shards. The `B-tree` structure
    of the MongoDB index contains the information necessary to distribute keys evenly
    across shards.


    ### Sharding Mechanisms


    Distribution of data across shards can be either range based or hash based. In
    range-based partitioning, each shard is allocated a specific range of shard key
    values. MongoDB consults the distribution of key values in the index to ensure
    that each shard is allocated approximately the same number of keys. In hash-based
    sharding, the keys are distributed based on a hash function applied to the shard
    key.


    There are advantages and compromises involved in each scheme. Figure [8-6](#A978-1-4842-1329-2_8_Chapter.html#Fig6)
    illustrates the performance trade-offs inherent in range and hash sharding for
    inserts and range queries.


    ![A978-1-4842-1329-2_8_Fig6_HTML.jpg](A978-1-4842-1329-2_8_Fig6_HTML.jpg)


    Figure 8-6. Comparison of range and hash sharding in MongoDB


    Range-based partitioning allows for more efficient execution of queries that process
    ranges of values, since these queries can often be resolved by accessing a single
    shard. Hash-based sharding requires that range queries be resolved by accessing
    all shards. On the other hand, hash-based sharding is more likely to distribute
    “hot” documents (unfilled orders or recent posts, for instance) evenly across
    the cluster, thus balancing the load more effectively.


    However, when range partitioning is enabled and the shard key is continuously
    incrementing, the load tends to aggregate against only one of the shards, thus
    unbalancing the cluster. With hash-based partitioning new documents are distributed
    evenly across all members of the cluster. Furthermore, although MongoDB tries
    to distribute shard keys evenly across the cluster, it may be that there are hotspots
    within particular shard key ranges which again unbalance the load. Hash-based
    sharding is more likely to evenly distribute the load in this scenario.


    Tag-aware sharding allows the MongoDB administrator to fine-tune the distribution
    of documents to shards. By associating a shard with the tag, and associating a
    range of keys within a collection with the same tag, the administrator can explicitly
    determine the shard on which these documents will reside. This can be used to
    archive data to shards on cheaper, slower storage or to direct particular data
    to a specific data center or geography.


    ### Cluster Balancing


    When hash-based sharding is implemented, the number of documents in each shard
    tends to remain balanced in most scenarios. However, in a range-based sharding
    scenario, it is easy for the shards to become unbalanced, especially if the shard
    key is based on a continuously increasing value, such as an auto-incrementing
    primary key ID.


    For this reason, MongoDB will periodically assess the balance of shards across
    the cluster and perform rebalance operations, if needed. The unit of rebalance
    is the shard chunk. Shards consist of chunks—typically 64MB in size—that contain
    contiguous values of shard keys (or of hashed shard keys). If a shard is added
    or removed from the cluster, or if the balancer determines that a shard has become
    unbalanced, it can move chunks from one shard to another. The chunks themselves
    will be split if they grow too large.


    ### Replication


    Sharding is almost always combined with replication so as to ensure both availability
    and scalability in a production MongoDB deployment.


    In MongoDB, data can be replicated across machines by the means of replica sets.
    A replica set consists of a primary node together with two or more secondary nodes.
    The primary node accepts all write requests, which are propagated asynchronously
    to the secondary nodes.


    The primary node is determined by an election involving all available nodes. To
    be eligible to become primary, a node must be able to contact more than half of
    the replica set. This ensures that if a network partitions a replica set in two,
    only one of the partitions will attempt to establish a primary.


    The successful primary will be elected based on the number of nodes to which it
    is in contact, together with a `priority` value that may be assigned by the system
    administrator. Setting a priority of 0 to an instance prevents it from ever being
    elected as primary. In the event of a tie, the server with the most recent `optime`—the
    timestamp of the last operation—will be selected.


    The primary stores information about document changes in a collection within its
    local database, called the `oplog`. The primary will continuously attempt to apply
    these changes to secondary instances.


    Members within a replica set communicate frequently via `heartbeat` messages.
    If a primary finds it is unable to receive heartbeat messages from more than half
    of the secondaries, then it will renounce its primary status and a new election
    will be called. Figure [8-7](#A978-1-4842-1329-2_8_Chapter.html#Fig7) illustrates
    a three-member replica set and shows how a network partition leads to a change
    of primary.


    ![A978-1-4842-1329-2_8_Fig7_HTML.jpg](A978-1-4842-1329-2_8_Fig7_HTML.jpg)


    Figure 8-7. MongoDB replica set and primary failover


    `Arbiters` are special servers that can vote in the primary election, but that
    don’t hold data. For large databases, these arbiters can avoid the necessity of
    creating otherwise unnecessary extra servers to ensure that a quorum is available
    when electing a primary.


    ### Write Concern and Read Preference


    A MongoDB application has some control over the behavior of read and write operations,
    providing a degree of tunable consistency and availability.


    *   The `write concern` setting determines when MongoDB regards a write operation
    as having completed. By default, write operations complete once the primary has
    received the modification. This means that if the primary should fail irrecoverably,
    then data might be lost. To ensure that write operations have been propagated
    beyond the primary, the client can issue a blocking call, which will wait until
    the write has been received by all secondaries, a majority of secondaries, or
    a specified number of secondaries.

    *   The `read preference` determines where the client sends read requests. By
    default, all read requests are sent to the primary. However, the client driver
    can request that read requests be routed to the secondary if the primary is unavailable,
    or to secondaries, or to whichever server is “nearest.” The latter setting is
    intended to favor low latency over consistency.


    The default settings for read preference and write concern result in MongoDB behaving
    as a strictly consistent system: everybody will see the same version of a document.
    Allowing reads to be satisfied from a secondary node results in a more eventually
    consistent behavior, unless the write concern is configured to block writes until
    they reach secondary nodes.


    We’ll look more at MongoDB consistency in the next chapter.'
  raw: '### Sharding


    A high-level representation of the MongoDB sharding architecture is shown in Figure
    [8-5](#A978-1-4842-1329-2_8_Chapter.html#Fig5). Each shard is implemented by a
    distinct MongoDB database, which in most respects is unaware of its role in the
    broader sharded server (1). A separate MongoDB database—the config server (2)—contains
    the metadata that can be used to determine how data is distributed across shards.
    A router process (3) is responsible for routing requests to the appropriate shard
    server.


    ![A978-1-4842-1329-2_8_Fig5_HTML.jpg](A978-1-4842-1329-2_8_Fig5_HTML.jpg)


    Figure 8-5.


    MongoDB sharding architecture


    You may recall that in MongoDB, a collection is used to store multiple JSON documents
    that usually have some common attributes. To shard a collection, we choose a shard
    key, which is one or more indexed attributes that will be used to determine the
    distribution of documents across shards. The B-tree structure of the MongoDB index
    contains the information necessary to distribute keys evenly across shards.


    ### Sharding Mechanisms


    Distribution of data across shards can be either range based or hash based. In
    range-based partitioning, each shard is allocated a specific range of shard key
    values. MongoDB consults the distribution of key values in the index to ensure
    that each shard is allocated approximately the same number of keys. In hash-based
    sharding, the keys are distributed based on a hash function applied to the shard
    key.


    There are advantages and compromises involved in each scheme. Figure [8-6](#A978-1-4842-1329-2_8_Chapter.html#Fig6)
    illustrates the performance trade-offs inherent in range and hash sharding for
    inserts and range queries.


    ![A978-1-4842-1329-2_8_Fig6_HTML.jpg](A978-1-4842-1329-2_8_Fig6_HTML.jpg)


    Figure 8-6.


    Comparison of range and hash sharding in MongoDB


    Range-based partitioning allows for more efficient execution of queries that process
    ranges of values, since these queries can often be resolved by accessing a single
    shard. Hash-based sharding requires that range queries be resolved by accessing
    all shards. On the other hand, hash-based sharding is more likely to distribute
    “hot” documents (unfilled orders or recent posts, for instance) evenly across
    the cluster, thus balancing the load more effectively.


    However, when range partitioning is enabled and the shard key is continuously
    incrementing, the load tends to aggregate against only one of the shards, thus
    unbalancing the cluster. With hash-based partitioning new documents are distributed
    evenly across all members of the cluster. Furthermore, although MongoDB tries
    to distribute shard keys evenly across the cluster, it may be that there are hotspots
    within particular shard key ranges which again unbalance the load. Hash-based
    sharding is more likely to evenly distribute the load in this scenario.


    Tag-aware sharding allows the MongoDB administrator to fine-tune the distribution
    of documents to shards. By associating a shard with the tag, and associating a
    range of keys within a collection with the same tag, the administrator can explicitly
    determine the shard on which these documents will reside. This can be used to
    archive data to shards on cheaper, slower storage or to direct particular data
    to a specific data center or geography.


    ### Cluster Balancing


    When hash-based sharding is implemented, the number of documents in each shard
    tends to remain balanced in most scenarios. However, in a range-based sharding
    scenario, it is easy for the shards to become unbalanced, especially if the shard
    key is based on a continuously increasing value, such as an auto-incrementing
    primary key ID.


    For this reason, MongoDB will periodically assess the balance of shards across
    the cluster and perform rebalance operations, if needed. The unit of rebalance
    is the shard chunk. Shards consist of chunks—typically 64MB in size—that contain
    contiguous values of shard keys (or of hashed shard keys). If a shard is added
    or removed from the cluster, or if the balancer determines that a shard has become
    unbalanced, it can move chunks from one shard to another. The chunks themselves
    will be split if they grow too large.


    ### Replication


    Sharding is almost always combined with replication so as to ensure both availability
    and scalability in a production MongoDB deployment.


    In MongoDB, data can be replicated across machines by the means of replica sets.
    A replica set consists of a primary node together with two or more secondary nodes.
    The primary node accepts all write requests, which are propagated asynchronously
    to the secondary nodes.


    The primary node is determined by an election involving all available nodes. To
    be eligible to become primary, a node must be able to contact more than half of
    the replica set. This ensures that if a network partitions a replica set in two,
    only one of the partitions will attempt to establish a primary.


    The successful primary will be elected based on the number of nodes to which it
    is in contact, together with a priority value that may be assigned by the system
    administrator. Setting a priority of 0 to an instance prevents it from ever being
    elected as primary. In the event of a tie, the server with the most recent optime—the
    timestamp of the last operation—will be selected.


    The primary stores information about document changes in a collection within its
    local database, called the oplog. The primary will continuously attempt to apply
    these changes to secondary instances.


    Members within a replica set communicate frequently via heartbeat messages. If
    a primary finds it is unable to receive heartbeat messages from more than half
    of the secondaries, then it will renounce its primary status and a new election
    will be called. Figure [8-7](#A978-1-4842-1329-2_8_Chapter.html#Fig7) illustrates
    a three-member replica set and shows how a network partition leads to a change
    of primary.


    ![A978-1-4842-1329-2_8_Fig7_HTML.jpg](A978-1-4842-1329-2_8_Fig7_HTML.jpg)


    Figure 8-7.


    MongoDB replica set and primary failover


    Arbiters are special servers that can vote in the primary election, but that don’t
    hold data. For large databases, these arbiters can avoid the necessity of creating
    otherwise unnecessary extra servers to ensure that a quorum is available when
    electing a primary.


    ### Write Concern and Read Preference


    A MongoDB application has some control over the behavior of read and write operations,
    providing a degree of tunable consistency and availability.


    *   The write concern setting determines when MongoDB regards a write operation
    as having completed. By default, write operations complete once the primary has
    received the modification. This means that if the primary should fail irrecoverably,
    then data might be lost. To ensure that write operations have been propagated
    beyond the primary, the client can issue a blocking call, which will wait until
    the write has been received by all secondaries, a majority of secondaries, or
    a specified number of secondaries.

    *   The read preference determines where the client sends read requests. By default,
    all read requests are sent to the primary. However, the client driver can request
    that read requests be routed to the secondary if the primary is unavailable, or
    to secondaries, or to whichever server is “nearest.” The latter setting is intended
    to favor low latency over consistency.


    The default settings for read preference and write concern result in MongoDB behaving
    as a strictly consistent system: everybody will see the same version of a document.
    Allowing reads to be satisfied from a secondary node results in a more eventually
    consistent behavior, unless the write concern is configured to block writes until
    they reach secondary nodes.


    We’ll look more at MongoDB consistency in the next chapter.'
  trans: '### 分片


    MongoDB 分片架构的高层表示如图 8-5 所示。每个分片由一个独立的 MongoDB 数据库实现，该数据库在大多数方面并不知晓自己在更广泛的分片服务器中的角色
    (1)。一个独立的 MongoDB 数据库——配置服务器 (2)——包含可用于确定数据如何在各分片间分布的元数据。一个路由器进程 (3) 负责将请求路由到相应的分片服务器。


    ![A978-1-4842-1329-2_8_Fig5_HTML.jpg](img/A978-1-4842-1329-2_8_Fig5_HTML.jpg)


    图 8-5. MongoDB 分片架构


    您可能还记得，在 MongoDB 中，一个 `集合` 用于存储多个通常具有某些共同属性的 JSON 文档。要对一个集合进行分片，我们需要选择一个 `片键`，这是一个或多个索引属性，将用于确定文档在各分片间的分布。MongoDB
    索引的 `B-tree` 结构包含了将键均匀分布到各分片所需的信息。


    ### 分片机制


    数据在分片间的分布可以是基于范围的，也可以是基于哈希的。在基于范围的分区中，每个分片被分配一个特定的片键值范围。MongoDB 会查阅索引中的键值分布，以确保每个分片被分配大致相同数量的键。在基于哈希的分片中，键是基于应用于片键的哈希函数进行分布的。


    每种方案都有其优点和需要权衡之处。图 8-6 展示了对于插入和范围查询，范围分片与哈希分片固有的性能权衡。


    ![A978-1-4842-1329-2_8_Fig6_HTML.jpg](img/A978-1-4842-1329-2_8_Fig6_HTML.jpg)


    图 8-6. MongoDB 中范围分片与哈希分片的比较


    基于范围的分区使得处理值范围的查询执行效率更高，因为这些查询通常可以通过访问单个分片来解决。基于哈希的分片则要求范围查询通过访问所有分片来解决。另一方面，基于哈希的分片更可能将“热点”文档（例如，未完成的订单或最近的帖子）均匀分布在集群中，从而更有效地平衡负载。


    然而，当启用范围分区且片键持续递增时，负载往往只聚集在其中一个分片上，从而导致集群失衡。而使用基于哈希的分区，新文档会均匀分布在集群的所有成员中。此外，尽管
    MongoDB 试图将片键在集群中均匀分布，但在特定的片键范围内可能存在热点，这再次导致负载失衡。在这种情况下，基于哈希的分片更有可能均匀分配负载。


    标签感知分片允许 MongoDB 管理员微调文档到分片的分布。通过将一个分片与一个标签关联，并将集合内的一个键范围与同一个标签关联，管理员可以明确地确定这些文档将驻留的分片。这可用于将数据归档到更便宜、更慢的存储上的分片，或将特定数据定向到特定的数据中心或地理位置。


    ### 集群平衡


    当实施基于哈希的分片时，在大多数情况下，每个分片中的文档数量倾向于保持平衡。然而，在基于范围的分片场景中，分片很容易变得不平衡，特别是当片键基于一个持续增长的值时，例如自动递增的主键
    ID。


    因此，MongoDB 会定期评估集群中分片的平衡情况，并在需要时执行再平衡操作。再平衡的单位是分片块。分片由块组成——通常大小为 64MB——这些块包含连续的片键值（或哈希后的片键值）。如果向集群中添加或移除了分片，或者平衡器确定某个分片已变得不平衡，它便可以将块从一个分片移动到另一个分片。如果块变得太大，它们本身也会被拆分。


    ### 复制


    分片几乎总是与复制结合使用，以确保生产环境 MongoDB 部署的可用性和可扩展性。


    在 MongoDB 中，数据可以通过副本集在多台机器间复制。一个副本集由一个主节点以及两个或更多个从节点组成。主节点接受所有写请求，这些请求被异步传播到从节点。


    主节点由一个涉及所有可用节点的选举决定。要获得成为主节点的资格，一个节点必须能够联系到副本集中超过半数的节点。这确保了如果一个网络将副本集分割成两部分，只有一部分会尝试建立一个主节点。


    成功的候选节点将根据它联系到的节点数量以及一个可能由系统管理员分配的 `priority` 值来选出。将一个实例的优先级设置为 0 将阻止它被选为主节点。如果出现平票，将选择具有最近
    `optime`（最后一次操作的时间戳）的服务器。


    主节点在其本地数据库（称为 `oplog`）中存储有关集合文档更改的信息。主节点将不断尝试将这些更改应用到从实例。


    副本集内的成员通过 `heartbeat` 消息频繁通信。如果主节点发现它无法收到超过半数从节点的心跳消息，那么它将放弃其主节点状态，并将召集新的选举。图
    8-7 展示了一个三成员副本集，并说明网络分区如何导致主节点变更。


    ![A978-1-4842-1329-2_8_Fig7_HTML.jpg](img/A978-1-4842-1329-2_8_Fig7_HTML.jpg)


    图 8-7. MongoDB 副本集与主节点故障转移


    `Arbiters`（仲裁者）是特殊的服务器，可以在主节点选举中投票，但不保存数据。对于大型数据库，这些仲裁者可以避免创建原本不必要的额外服务器来确保在选举主节点时有法定人数可用。


    ### 写入关注与读取偏好


    MongoDB 应用程序可以在一定程度上控制读写操作的行为，提供可调的一致性和可用性。


    *   `write concern`（写入关注）设置决定了 MongoDB 何时认为一个写操作已完成。默认情况下，写操作在主节点接收到修改后即完成。这意味着，如果主节点发生不可恢复的故障，则可能会丢失数据。为确保写操作已传播到主节点之外，客户端可以发出一个阻塞调用，该调用将等待直到写操作被所有从节点、大多数从节点或指定数量的从节点接收。

    *   `read preference`（读取偏好）决定了客户端将读请求发送到哪里。默认情况下，所有读请求都发送到主节点。但是，客户端驱动可以请求在主节点不可用时，将读请求路由到从节点，或者路由到所有从节点，或者路由到“最近”的服务器。后一个设置旨在优先考虑低延迟而非一致性。


    读取偏好和写入关注的默认设置导致 MongoDB 表现为一个严格一致的系统：每个人都会看到文档的同一版本。允许从从节点满足读取请求会导致更趋于最终一致的行为，除非写入关注被配置为阻塞写操作直到它们到达从节点。


    我们将在下一章更详细地探讨 MongoDB 的一致性。'
- fmt: '## HBase


    HBase can be thought of both as the “Hadoop database” and as “open-source BigTable.”
    That is, we can describe HBase as a mechanism for providing random access database
    services on top of the Hadoop HDFS file system, or we can think of HBase as an
    open-source implementation of Google’s BigTable database that happens to use HDFS
    for data storage. Both of these descriptions are accurate: although HBase theoretically
    can be implemented on top of any distributed file system—or, indeed, even a nondistributed
    file system—it’s almost always implemented on top of Hadoop HDFS, and many of
    HBase’s architectural assumptions reflect this. On the other hand, HBase implements
    real-time random access database functionality, which is essentially distinct
    from the base capabilities of Hadoop.

    In the discussion that follows, we are going to concentrate on the HBase architecture
    as it is most commonly encountered: as implemented on top of HDFS. The implementation
    of HBase over HDFS creates a sort of hybrid, a mix of shared-nothing and shared-disk
    clustering patterns. On the one hand, every HBase node can access any element
    of data in the database because all data is accessible via HDFS. On the other
    hand, it is typical to co-locate HBase servers with HDFS DataNodes, which means
    that in practice each node tends to be responsible for an exclusive subset of
    data stored on local disk.

    In either case, HDFS provides the reliability guarantees for data on disk: the
    HBase architecture is not required to concern itself with write mirroring or disk
    failure management, because these are handled automatically by the underlying
    HDFS system.

    We introduced HDFS and Hadoop architecture in Chapter [2](#A978-1-4842-1329-2_2_Chapter.html);
    please refer to that chapter if you need a refresher. HDFS implements a distributed
    file system using disks that are directly attached to the servers—DataNodes—that
    constitute a Hadoop cluster. HDFS automatically manages redundancy of data: by
    default, data is replicated across three DataNodes, one of which (if possible)
    is located on a separate server rack.


    ### Tables, Regions, and RegionServers


    HBase implements a wide column store based on Google’s BigTable specification.
    We touched on that data model in Chapter [2](#A978-1-4842-1329-2_2_Chapter.html),
    and we’ll talk more about it in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html).
    For now, we can consider HBase tables as potentially massive tabular datasets
    that are implemented on disk by a variable number of HDFS files called `Hfiles`.

    All rows in an HBase table are identified by a unique `Row key`. A table of nontrivial
    size will be split into multiple horizontal partitions called `regions`. Each
    region consists of a contiguous, sorted range of key values. This resembles the
    MongoDB range-based sharding scheme we described earlier in this chapter.

    Read or write access to a region is controlled by a `RegionServer`. Each `RegionServer`
    normally runs on a dedicated host, and is typically co-located with the Hadoop
    `DataNode`.

    There will usually be more than one region in each `RegionServer`. As regions
    grow, they split into multiple regions based on configurable policies. Regions
    may also be split manually. We’ll discuss this more a little later in this chapter.

    Each HBase installation will include a Hadoop `Zookeeper` service that is implemented
    across multiple nodes. Hbase may share this `Zookeeper` ensemble with the rest
    of the Hadoop cluster or use a dedicated service.

    When an HBase client wishes to read or write to a specific key value, it will
    ask `Zookeeper` for the address of the `RegionServer` that controls the HBase
    catalog. This catalog consists of the tables `-ROOT-` and `.META.`, which identify
    the `RegionServers` that are responsible for specific key ranges. The client will
    then establish a connection with that `RegionServer` and request to read or write
    the key value concerned.

    The HBase master server performs a variety of housekeeping tasks. In particular,
    it controls the balancing of regions among `RegionServers`. If a `RegionServer`
    is added or removed, the master will organize for its regions to be relocated
    to other `RegionServers`.

    Figure [8-8](#A978-1-4842-1329-2_8_Chapter.html#Fig8) illustrates some of these
    architectural elements. An HBase client consults `Zookeeper` to determine the
    location of the HBase catalog tables (1), which can be then be interrogated to
    determine the location of the appropriate `RegionServer` (2). The client will
    then request to read or modify a key value from the appropriate `RegionServer`
    (3). The `RegionServer` reads or writes to the appropriate disk files, which are
    located on HDFS (4).

    ![A978-1-4842-1329-2_8_Fig8_HTML.jpg](A978-1-4842-1329-2_8_Fig8_HTML.jpg)

    Figure 8-8.

    HBase architecture


    ### Caching and Data Locality


    The `RegionServer` includes a block cache that can satisfy many reads from memory,
    and a `MemStore`, which writes in memory before being flushed to disk. However,
    to ensure durability of the writes, each `RegionServer` has a dedicated right
    ahead log (`WAL`), which journals all writes to HDFS. This architecture is an
    implementation of the log-structured merge tree (`LSM`) pattern that is more fully
    described in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html).

    The `RegionServer` can act as a generic HDFS client, communicating with the HDFS
    `NameNode` to perform read and write operations to files. In the most typical
    production deployment scenario, each `RegionServer` is located on a Hadoop `NameNode`,
    and as a result, region data will be co-located with the `RegionServer`, providing
    good data locality. This data locality will be disrupted by rebalance operations
    and `RegionServer` failovers, but compactions—which merge HDFS disk files as described
    in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html)—will restore data locality.

    Hadoop and HBase support a mode known as `short-circuit reads`, in which the `RegionServer`
    can read directly from local disk, bypassing the `NameNode`. This, of course,
    is only possible when the data is stored on a `DataNode` that also hosts the `RegionServer`.

    The three levels of data locality are shown in Figure [8-9](#A978-1-4842-1329-2_8_Chapter.html#Fig9).
    In the first configuration, the `RegionServer` and the `DataNode` are located
    on different servers and all reads and writes have to pass across the network.
    In the second configuration, the `RegionServer` and the `DataNode` are co-located
    and all reads and writes pass through the `DataNode`, but they are satisfied by
    the local disk. In the third scenario, `short-circuit reads` are configured and
    the `RegionServer` can read directly from the local disk.

    ![A978-1-4842-1329-2_8_Fig9_HTML.jpg](A978-1-4842-1329-2_8_Fig9_HTML.jpg)

    Figure 8-9.

    Data locality in HBase


    ### Rowkey Ordering


    The HBase region partitioning scheme requires that regions consist of contiguous
    ranges of rowkeys. This range-based partitioning has a significant impact on performance
    when the rowkey contains some form of monotonically incrementing value, such as
    a timestamp or a incrementing counter. In this event, all write operations will
    be directed to a specific region and hence to a single `RegionServer`. This can
    create a bottleneck on write throughput.

    HBase offers no internal mechanisms to mitigate this issue. It’s up to the application
    designer to construct a key that is either randomized—a hash of the timestamp,
    for instance—or is prefixed in some way with a more balanced attribute. In the
    HBase time series database `OpenTSDB`, the timestamp is prefixed by a metric identifier
    variable that has a large number of values. Data for a single metric will be located
    in a specific `RegionServer`, but data for a specific timestamp will be distributed
    across all the `RegionServers`.'
