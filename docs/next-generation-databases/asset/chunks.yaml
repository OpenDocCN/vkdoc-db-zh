    ### 数据关系模型回顾


    在深入探讨非关系型数据模型之前，让我们快速回顾一下关系型模型。该模型主导了上一代数据库系统，并且至今仍是应用最广泛的数据模型。关系型模型不仅是传统 `RDBMS`
    的基础，也是 `NewSQL` 类型数据库（例如 `Vertica` 和 `VoltDB`）的基础。我们早在第 1 章就概述过关系模型，当然，关系数据模型也有大量的文献支持。以下是一个简要总结。


    关系模型将值组织成元组（行）。多个元组用于构建关系（表）。行通过键值来标识，并且——至少在第三范式中——所有值都应仅通过完整的主键来定位。外键通过引用另一个表中的主键来定义表之间的关系。


    从关系模型中消除冗余的过程称为规范化。图 10-1 提供了一个非规范化和规范化数据的示例。


    ![A978-1-4842-1329-2_10_Fig1_HTML.jpg](img/A978-1-4842-1329-2_10_Fig1_HTML.jpg)

    图 10-1. 规范化的关系数据模型


    星型模式代表了一种在数据仓库中常见——实际上几乎总是存在——的数据建模模式。在星型模式中，一个大型的“事实”表包含详细的业务数据，并包含指向较小的、更静态的“维度”表的外键，这些维度表从业务角度对事实项进行分类，通常包括时间、产品、客户等。


    图 10-2 展示了一个星型模式的示例。核心的 `SALES` 事实表包含按不同时间段、产品和客户汇总的销售总额。每项汇总的细节和解释可以通过连接维度表 `TIMES`、`PRODUCTS`
    和 `CUSTOMERS` 来查找。


    ![A978-1-4842-1329-2_10_Fig2_HTML.jpg](img/A978-1-4842-1329-2_10_Fig2_HTML.jpg)

    图 10-2. 星型模式


    ### 键值存储


    与关系模型不同，键值存储中数据如何表示没有正式的定义。通常，键值存储会接受任何在特定大小限制内的二进制值作为键，并能够存储任何二进制数据作为值。在这方面，我们或许可以说键值存储是数据类型不可知的。然而，大多数键值存储为某些类型的数据提供了额外的支持。这种支持源于提供以下特性之一的愿望：


    *   二级索引。在纯粹的键值存储中，定位对象的唯一方式是通过其键。然而，大多数应用程序需要基于非键项进行查找。例如，我们可能希望定位某个地理区域内的所有用户、特定公司的所有订单等。

    *   冲突解决。提供最终一致性或 `Amazon Dynamo` 风格可调一致性的键值存储，可能会实现特殊的数据类型以促进冲突解决。


    基于 `Amazon` 的 `Dynamo` 规范构建的键值存储 `Riak` 就阐释了这两种模式。


    除了二进制对象，`Riak` 还允许将数据定义为以下类型之一：


    *   `Riak` 收敛复制数据类型 (`CRDT`)。这些数据类型将在下文详述，包括映射（maps）、集合（sets）和计数器（counters）。`Riak`
    可以解决这些数据类型上的冲突操作，无需应用程序或人工干预。

    *   文档类型，例如 `XML`、`JSON` 或 `Text`。

    *   自定义数据类型。


    `Riak` 包含 `Solr`，一个开源的文本搜索引擎。当 `Riak` 值被定义为内置数据类型之一，或被定义为提供了自定义搜索代码的自定义数据类型时，`Solr`
    会对该值建立索引并提供多种查找功能，包括精确匹配、正则表达式和范围搜索。


    对于 `JSON`、`XML` 和 `Riak` 映射，搜索可以限制在文档内的特定字段中。因此，例如，你可以搜索具有特定 `JSON` 属性特定值的文档。


    #### 收敛复制数据类型


    我们在第 9 章中简要介绍了收敛复制数据类型 (`CRDT`)。正如我们当时指出的，`Riak` 使用向量时钟来判断两次更新是否可能发生冲突。默认情况下，如果在检查两次冲突更新的向量时钟后，系统无法确定哪个更新是更正确的，那么
    `Riak` 将通过创建兄弟值来保留更新的两个版本，这些冲突必须由用户或应用程序解决。


    `CRDT` 允许合并两个冲突的更新，即使它们的向量时钟表明它们是并发的。`CRDT` 封装了确定性的规则，这些规则可用于合并冲突值，或确定两个冲突值中哪一个应该“胜出”并被传播。


    当 `CRDT` 值在节点之间传播时，它不仅包含对象的当前值，还包含已应用于该对象的操作历史。这段历史在某种程度上类似于 `Riak` 系统中伴随每次更新的向量时钟数据，但与向量时钟不同，它包含的信息专门与特定对象的历史相关。


    `CRDT` 合并最简单的例子涉及 `g-counter`（只增计数器）数据类型。这是一个单调递增的计数器，不能被递减（例如，你可以增加计数器，但不能减少其值）。


    你可能会认为，只需将所有节点上发生过的所有递增操作相加，就可以合并 `g-counter` 的更新，从而确定总计数值。然而，这种方法忽略了一些递增操作可能是其他递增操作的副本的可能性。为了避免这种重复计数，每个节点都维护一个从每个节点接收到的计数值的数组。在递增时，节点递增其在数组中的元素，然后将整个数组传输给其他节点。如果检测到更新之间的冲突（通过向量时钟机制），我们取每个版本中每个节点对应元素的最大值，然后将它们相加。


    最后一句话相当绕口，但它仍然比数学符号简单！希望逐步了解图 10-3 所示的例子能阐明这个过程。


    ![A978-1-4842-1329-2_10_Fig3_HTML.jpg](img/A978-1-4842-1329-2_10_Fig3_HTML.jpg)

    图 10-3. 收敛复制数据类型 g-counter


    *   在时间 `t0`，每个节点的计数器值为 `0`，计数器数组（每个节点对应一个元素）中的每个元素也设置为 `0`。

    *   大约在时间 `t1`，节点 `1` 收到计数器递增操作 `+1`，而节点 `2` 收到递增操作 `+2`。节点 `1` 和 `2` 将其计数值传输给节点
    `3`。

    *   大约在时间 `t2`，节点 `1` 收到递增 `+4` 和来自节点 `2` 的更新，而节点 `3` 收到递增 `+2`。此时每个节点的计数器值都不同：`7`
    (`5,0,2`)、`3` (`1,0,2`) 或 `4` (`0,0,4`)。

    *   大约在时间 `t3`，节点 `2` 收到来自节点 `1` 和节点 `3` 的更新。这些更新可能存在冲突，因此节点 `2` 必须合并这三个计数器数组。通过取每个数组中每个节点对应元素的最大值，节点
    `2` 得出计数器的正确值为 (`5,0,4`)，总和为 `9`。

    *   在时间 `t4`，节点 `2` 将计数器的正确值传播给其他节点，集群现在重新同步。


    学术界定义并实现了其他 `CRDT`，并在 `Riak` 或其他数据库中应用。例如：

    '
- fmt: '*   `PN-counter`类型允许计数器安全地递增和递减。它由两个`g-counter`实现，一个维护增量，另一个维护减量。

    *   `G-set`类型实现了一个可以添加元素但永不删除的对象集合。

    *   `2P-set`提供了一个既可以插入也可以移除元素的集合。但是，一个对象只能被移除一次。

    *   `LWW-set`允许多次插入和删除，对于冲突操作采用最后写入获胜策略。


    其他CRDT类型在支持的操作上提供了更大的灵活性，但类似于`LWW-set`类型，在冲突时会指定赢家和输家。赢家可能由时间戳决定，或通过比较元素所经历的相对操作次数决定，或由一些其他领域特定逻辑决定。


    ## Data Models in BigTable and HBase


    Google的BigTable论文发表于2006年，是HBase、Cassandra和其他几种数据库所使用的数据模型的基础。Google也在Google Cloud
    BigTable产品中提供BigTable存储服务。


    BigTable表具有以下特征：


    *   数据被组织成表——像关系型表一样——有列和行。

    *   表由单个`rowkey`索引和排序。

    *   一个表包括一个或多个列族，这些列族在表定义中命名和指定。

    *   列族由列组成。列名是动态的，可以在插入新值时动态创建新列。使用“列”这个术语有些误导：BigTable列族更准确地被描述为排序的多维映射，其中值由列名和时间戳标识。

    *   特定列族的数据在磁盘上一起存储。

    *   表是稀疏的：空列不占用空间。

    *   一个单元格（行和列的交点）可能包含数据元素的多个版本，由时间戳索引。


    ### Column Family Structure


    列族可以用于方便地对相关列进行分组，通过将经常一起访问的列在磁盘上共同定位来优化磁盘IO，或者创建一个可用于更复杂数据的多维结构。


    图[10-4](#A978-1-4842-1329-2_10_Chapter.html#Fig4)展示了一个简单的列族结构。行被分组到三个列族中，但每一行都有相同的列名。在这种配置中，该表类似于一个为性能原因在磁盘上进行了垂直分区的`关系表`。


    ![A978-1-4842-1329-2_10_Fig4_HTML.jpg](A978-1-4842-1329-2_10_Fig4_HTML.jpg)


    **图 10-4.**

    简单的列族结构


    当我们创建一个“宽”列族时，BigTable数据模型的独特性变得更加明显。在这种情况下，列名代表`name:value`对中的名称部分。任何给定的`rowkey`可以拥有任意集合的此类列，并且不同`rowkey`在列名方面不需要有任何共同性。


    图[10-5](#A978-1-4842-1329-2_10_Chapter.html#Fig5)展示了一个这样的宽列族。在`FRIENDS`列族中，我们有可变数量的列，每列对应一个特定的朋友。列的名称对应于朋友的姓名，而列的值是朋友的电子邮件。在此示例中，Guy和Joanna有一个共同的朋友John，因此他们共享该列。但是，代表不共享的朋友的其他列仅出现在需要的行中。


    ![A978-1-4842-1329-2_10_Fig5_HTML.jpg](A978-1-4842-1329-2_10_Fig5_HTML.jpg)


    **图 10-5.**

    宽列族结构


    BigTable/HBase列族被称为稀疏的，因为在给定行中不存在的列不消耗存储空间。实际上，BigTable列族本质上是一个由任意一组排序的`name:value`对组成的“映射”。


    ### Versions


    BigTable列族中的每个单元格可以存储一个值的多个版本，由时间戳索引。时间戳可以由应用程序指定或由服务器自动分配。值在单元格内按时间戳降序存储，因此默认情况下读取将检索最近的时间戳。读取操作可以指定时间戳范围或指定要返回的数据版本数。


    一个列族配置设置指定了将为每个值存储的最大版本数。在HBase中，默认的版本数是三。还有一个最小版本数，通常与生存时间设置相结合。`TTL`设置指示服务器删除早于特定秒数的值。最小版本数覆盖了`TTL`，因此通常无论数据年龄如何，至少会保留一个或多个副本。


    图[10-6](#A978-1-4842-1329-2_10_Chapter.html#Fig6)展示了带时间戳的多个值。对于所示的行，`info:loc`列只有一个值，但`readings:temp`列有五个值，可能对应于恒温器的最后五次读数。


    ![A978-1-4842-1329-2_10_Fig6_HTML.jpg](A978-1-4842-1329-2_10_Fig6_HTML.jpg)


    **图 10-6.**

    BigTable中单元格数据的多个版本


    BigTable数据库中的删除操作是通过创建墓碑标记来实现的，该标记表明小于给定时间戳的列或列族的所有版本都已被移除。默认情况下，删除使用当前时间戳，从而消除所有先前的行值。


    删除的元素会保留在磁盘上，直到发生压缩。我们将在本章后面讨论压缩。'
  raw: '*   The PN-counter type allows counters to increment and decrement safely.
    It is implemented as two g-counters, one which maintains increments and the other
    which maintains decrements.

    *   The G-set type implements a collection of objects to which you can add elements
    but never remove them.

    *   The 2P-set provides a collection to which elements can be removed as well
    as inserted. However, an object can be removed only once.

    *   The LWW-set allows multiple insertions and deletes, with a last-write-wins
    policy in the event of conflicting operations.


    Other CRDT types provide further flexibility in the operations they support, but
    in a manner similar to the LWW-set type, specify winners and losers in the event
    of conflict. The winner might be determined by timestamps or by comparing the
    relative number of operations to which the element has been subjected, or by some
    other domain-specific logic.


    ### Data Models in BigTable and HBase


    Google’s BigTable paper was published in 2006 and was the basis for the data model
    used in HBase, Cassandra, and several other databases. Google also makes BigTable
    storage available as a service in the Google Cloud BigTable product.


    BigTable tables have the following characteristics:


    *   Data is organized as tables that—like relational tables—have columns and rows.

    *   Tables are indexed and sorted by a single rowkey.

    *   A table includes one or more column families, which are named and specified
    in the table definition.

    *   Column families are composed of columns. Column names are dynamic, and new
    columns can be created dynamically upon insertion of a new value. Use of the term
    “column” is somewhat misleading: BigTable column families are more accurately
    described as sorted multidimensional maps, in which values are identified by column
    name and timestamp.

    *   Data for a specific column family is stored together on disk.

    *   Tables are sparse: empty columns do not take up space.

    *   A cell (intersection of row and column) may contain multiple versions of a
    data element, indexed by timestamp.


    #### Column Family Structure


    Column families can be used to group related columns for convenience, to optimize
    disk IO by co-locating columns that are frequently accessed together on disk,
    or to create a multidimensional structure that can be used for more complex data.


    Figure [10-4](#A978-1-4842-1329-2_10_Chapter.html#Fig4) illustrates a simple column
    family structure. Rows are grouped into three column families, but each row has
    identical column names. In this configuration, the table resembles a relational
    table that has been vertically partitioned on disk for performance reasons.


    ![A978-1-4842-1329-2_10_Fig4_HTML.jpg](A978-1-4842-1329-2_10_Fig4_HTML.jpg)


    Figure 10-4.


    Simple column family structure


    The uniqueness of the BigTable data model becomes more apparent when we create
    a “wide” column family. In this case, column names represent the name portion
    of a name:value pair. Any given row key may have any arbitrary collection of such
    columns, and there need be no commonality between rowkeys with respect of column
    names.


    Figure [10-5](#A978-1-4842-1329-2_10_Chapter.html#Fig5) illustrates such a wide
    column family. In the FRIENDS column family, we have a variable number of columns,
    each corresponding to a specific friend. The name of the column corresponds to
    the name of the friend, while the value of the column is the friend’s email. In
    this example, both Guy and Joanna have a common friend John, so each share that
    column. But other columns that represent friends who are not shared, and those
    columns appear only in the row required.


    ![A978-1-4842-1329-2_10_Fig5_HTML.jpg](A978-1-4842-1329-2_10_Fig5_HTML.jpg)


    Figure 10-5.


    Wide column family structure


    BigTable/HBase column families are described as sparse because no storage is consumed
    by columns that are absent in a given row. Indeed, a BigTable column family is
    essentially a “map” consisting of an arbitrary set of sorted name:value pairs.


    #### Versions


    Each cell in a BigTable column family can store multiple versions of a value,
    indexed by timestamp. Timestamps may be specified by the application or automatically
    assigned by the server. Values are stored within a cell in descending timestamp
    order, so by default a read will retrieve the most recent timestamp. A read operation
    can specify a timestamp range or specify the number of versions of data to return.


    A column family configuration setting specifies the maximum number of versions
    that will be stored for each value. In HBase, the default number of versions is
    three. There is also a minimum version count, which is typically combined with
    a time to live (TTL) setting. The TTL setting instructs the server to delete values
    that are older than a certain number of seconds. The minimum version count overrides
    the TTL, so typically at least one or more copies of the data will be kept regardless
    of age.


    Figure [10-6](#A978-1-4842-1329-2_10_Chapter.html#Fig6) illustrates multiple values
    with timestamps. For the row shown, the info:loc column has only a single value,
    but the readings:temp column has five values corresponding perhaps to the last
    five readings of a thermostat.


    ![A978-1-4842-1329-2_10_Fig6_HTML.jpg](A978-1-4842-1329-2_10_Fig6_HTML.jpg)


    Figure 10-6.


    Multiple versions of cell data in BigTable


    Deletes in a BigTable database are implemented by creating tombstone markers that
    indicate all versions of a column or column family less than a given timestamp
    have been removed. By default, a delete uses the current timestamp, thus eliminating
    all previous row values.


    Deleted elements persist on disk until a compaction occurs. We’ll discuss compaction
    later in this chapter.'
  trans: '

    *   `PN-counter`类型允许计数器安全地进行递增和递减操作。它由两个`g-counter`实现，一个维护增量操作，另一个维护减量操作。

    *   `G-set`类型实现了一个只能添加元素、永不删除的对象集合。

    *   `2P-set`提供了一个既可以插入也可以移除元素的集合。但是，一个对象只能被移除一次。

    *   `LWW-set`允许多次插入和删除，对于冲突操作采用最后写入获胜的策略。


    其他 CRDT 类型在支持的操作上提供了更大的灵活性，但类似于`LWW-set`类型，在冲突时会指定赢家和输家。赢家可能由时间戳决定，或通过比较元素所经历的相对操作次数决定，或由一些其他领域特定逻辑决定。


    ## BigTable 与 HBase 中的数据模型


    谷歌的 BigTable 论文发表于 2006 年，是 HBase、Cassandra 和其他几种数据库所使用的数据模型的基础。谷歌也在其 Google Cloud
    BigTable 产品中提供 BigTable 存储服务。


    BigTable 表具有以下特征：


    *   数据被组织成表——类似于关系型表——拥有列和行。

    *   表通过单个`rowkey`进行索引和排序。

    *   一个表包括一个或多个列族，这些列族在表定义中命名和指定。

    *   列族由列组成。列名是动态的，可以在插入新值时动态创建新列。使用“列”这个术语有些误导：BigTable 列族更准确地被描述为排序的多维映射，其中的值由列名和时间戳标识。

    *   特定列族的数据在磁盘上一起存储。

    *   表是稀疏的：空列不占用空间。

    *   一个单元格（行和列的交点）可能包含数据元素的多个版本，由时间戳索引。


    ### 列族结构


    列族可以用于方便地对相关列进行分组，通过将经常一起访问的列在磁盘上共同定位来优化磁盘 I/O，或者创建一个可用于更复杂数据的多维结构。


    图 10-4 展示了一个简单的列族结构。行被分组到三个列族中，但每一行都有相同的列名。在这种配置中，该表类似于一个为了性能原因在磁盘上进行了垂直分区的`关系表`。


    ![A978-1-4842-1329-2_10_Fig4_HTML.jpg](img/A978-1-4842-1329-2_10_Fig4_HTML.jpg)


    **图 10-4.**

    简单的列族结构


    当我们创建一个“宽”列族时，BigTable 数据模型的独特性变得更加明显。在这种情况下，列名代表`name:value`对中的名称部分。任何给定的`rowkey`可以拥有任意集合的此类列，并且不同的`rowkey`在列名方面不需要有任何共同性。


    图 10-5 展示了一个这样的宽列族。在`FRIENDS`列族中，我们有可变数量的列，每列对应一个特定的朋友。列的名称对应于朋友的姓名，而列的值是朋友的电子邮件。在此示例中，Guy
    和 Joanna 有一个共同的朋友 John，因此他们共享该列。但是，代表不共享的朋友的其他列仅出现在需要的行中。


    ![A978-1-4842-1329-2_10_Fig5_HTML.jpg](img/A978-1-4842-1329-2_10_Fig5_HTML.jpg)


    **图 10-5.**

    宽列族结构


    BigTable/HBase 列族被称为稀疏的，因为在给定行中不存在的列不消耗存储空间。实际上，BigTable 列族本质上是一个由任意一组排序的`name:value`对组成的“映射”。


    ### 版本


    BigTable 列族中的每个单元格可以存储一个值的多个版本，由时间戳索引。时间戳可以由应用程序指定或由服务器自动分配。值在单元格内按时间戳降序存储，因此默认情况下读取将检索最近的时间戳。读取操作可以指定时间戳范围或指定要返回的数据版本数。


    一个列族配置设置指定了将为每个值存储的最大版本数。在 HBase 中，默认的版本数是三。还有一个最小版本数，通常与生存时间设置相结合。`TTL`设置指示服务器删除早于特定秒数的值。最小版本数覆盖了`TTL`，因此通常无论数据年龄如何，至少会保留一个或多个副本。


    图 10-6 展示了带时间戳的多个值。对于所示的行，`info:loc`列只有一个值，但`readings:temp`列有五个值，可能对应于恒温器的最后五次读数。


    ![A978-1-4842-1329-2_10_Fig6_HTML.jpg](img/A978-1-4842-1329-2_10_Fig6_HTML.jpg)


    **图 10-6.**

    BigTable 中单元格数据的多个版本


    BigTable 数据库中的删除操作是通过创建墓碑标记来实现的，该标记表明小于给定时间戳的列或列族的所有版本都已被移除。默认情况下，删除使用当前时间戳，从而消除所有先前的行值。


    删除的元素会保留在磁盘上，直到发生压缩。我们将在本章后面讨论压缩。

