    # 13. 数据库概览


    在本附录中，我提供了本书涵盖的主要数据库系统的简要描述。


    目前有大量数据库管理系统在使用中：`DB-Engines` 网站 (`http://db-engines.com/en/ranking`) 根据网站引用、搜索频率、职位发布、社交网络和
    `Stack Overflow` 提及情况，对数据库系统进行流行度排名。他们追踪了超过 250 个系统，其中 100 多个获得了不俗的评分（按其排名方案，分数大于
    1.0）。显然，我无法在此囊括所有系统，本附录——以及本书中——所选择的数据库，仅代表我个人对这些系统的兴趣和熟悉程度。遗漏或包含不应被解读为对系统架构或其适用性的认可或否定。在传统的数据库供应商中，我只包含了`Oracle`；第
    12 章对其非关系特性的论述论证了将其纳入的理由。然而，许多其他关系型数据库供应商也在实现类似的功能（例如，`JSON`集成）。


    尽管我认为数据库泛滥的时代即将结束，随之而来的将是一个整合的时代，但新的数据库系统仍然在相当频繁地推出。其中一些可能代表了重大创新，并被证明是改变游戏规则的。不过，我通常只关注那些已经活跃使用了至少几年的数据库：经验表明，许多最新的“革命性”新数据库将无法获得足够的市场吸引力。


    `db-engines.com` 网站为追踪数据库的相对流行度提供了宝贵的资源。他们的排名系统更多地反映了互联网上的“热议度”，而非收入或企业采用情况，但它确实是评判数据库系统相对心智占有率的最佳单一资源。


    ## Aerospike


    数据库名称：`Aerospike`


    许可/公司：`AGPL` 许可，由 Aerospike Corp. 商业发行


    维基百科描述：

    > Aerospike 是一款针对闪存优化的内存开源 NoSQL 数据库，也是开发它的公司名称。


    供应商描述：

    > 提供规模速度的高性能 NoSQL 数据库。


    我的看法：

    `Aerospike` 采用一种假设快速闪存 `SSD` 作为持久层的架构，并仅使用内存来缓存索引。


    数据模型：

    键-值


    事务模型：

    严格一致的单服务器事务，集群内最终一致


    集群：

    分片与复制


    APIs：

    `Aerospike` 查询语言 (`AQL`) 是 `SQL` 语言的一个子集，并提供大多数常见语言的驱动程序。


    ## Cassandra


    数据库名称：`Apache Cassandra`


    许可/公司：基于 `Apache` 许可的开源软件

    `Datastax` 提供企业版


    维基百科描述：

    > `Apache Cassandra` 是一个开源的分布式数据库管理系统，旨在跨众多商用服务器处理海量数据，提供高可用性且无单点故障。


    供应商描述：

    > `Cassandra` 的无主、无共享架构为其事务型/操作型数据库应用程序提供了持续的正常运行时间，以及一个能够存储现代数据类型的灵活数据模型和易于数据库管理的操作简易性。


    我的看法：

    `Cassandra` 最初被设想为一个能够融合谷歌 `BigTable` 和亚马逊 `Dynamo` 最佳特性的数据库系统。`Cassandra` 已在像
    `Netflix` 这样的站点上实现了一些最高规模的 `NoSQL` 部署。`Cassandra` 在其 `BigTable` 和 `Dynamo` 的影响之上实现了重大创新，无疑是
    `NoSQL` 领域的领导者。


    数据模型：

    基于 `BigTable` 的宽列模型，但通过 `Cassandra 查询语言 (CQL)` 接口提供了窄列抽象。


    事务模型：

    `Dynamo` 风格的可调一致性，以及基于 `Paxos` 的轻量级事务能力。


    集群：

    一致性哈希


    APIs：

    `CQL`

