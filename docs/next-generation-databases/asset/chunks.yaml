    \ API——简单 Oracle 文档访问 (`SODA`)——直接访问。该 API 与 MongoDB 查询 API 非常相似。\n*   提供 Oracle\
    \ REST 数据服务 (`ORDS`)，它也提供了对关系表中数据的基于 REST 的接口。这为使用嵌入在 REST 调用中的 JSON 查询文档来检索表数据提供了非\
    \ SQL 的 API，类似于`SODA`支持的基于 JSON 的查询语言。\n*   增强了其图计算引擎。新的 Oracle 图功能将允许使用`OpenCypher`（由\
    \ Neo4j 首创的图语言）对存储在 RDBMS 或大数据一体机中的任何数据执行图分析。\n*   支持一种无共享的分片分布式数据库，它提供了一种替代的分布式数据库模型，与共享磁盘的\
    \ RAC 集群数据库架构相比，可以支持更具线性可扩展性的 OLTP 解决方案。\n\n让我们更详细地看看其中一些产品。\n\n### Oracle JSON\
    \ 支持\n\nOracle 允许将 JSON 文档存储在 Oracle `LOB`（长对象）或字符列中。Oracle 提供了一个检查约束，可用于确保这些列中的数据是有效的\
    \ JSON 文档：\n\n```\nCREATE TABLE ofilmes\n(\n  id              INTEGER PRIMARY\
    \ KEY,\n  json_document   BLOB\n  CONSTRAINT ensure_json CHECK (json_document\
    \ IS JSON)\n)\n```\n"
- fmt: "# Oracle JSON 与 REST 访问功能\n\nOracle 在其 SQL 方言中支持用于查询 JSON 文档的函数。具体包括：\n\n\
    *   `JSON_QUERY` 返回 JSON 文档的一部分；它使用类似于 XML 中 XPATH 的 JSON 路径表达式。\n*   `JSON_VALUE`\
    \ 类似于 `JSON_QUERY`，但返回 JSON 文档中的单个元素。\n*   `JSON_EXISTS` 确定特定元素是否存在于 JSON 文档中。\n\
    *   `JSON_TABLE` 将部分 JSON 投影为关系表。例如，`JSON_TABLE` 可用于将 JSON 文档的每个子元素投影为不同的虚拟行。\n\
    \n接下来的示例使用第 [11](#A978-1-4842-1329-2_11_Chapter.html) 章出现的“films” JSON 文档集合来说明\
    \ MongoDB 和 Couchbase 查询。为了唤起记忆，这些文档看起来像这样：\n```json\n{\n  \"Title\": \"ACE GOLDFINGER\"\
    ,\n  \"Category\": \"Horror\",\n  \"Description\": \"A Astounding Epistle of a\
    \ Database Administrator And a Explorer who must Find a Car in Ancient China\"\
    ,\n  \"Length\": \"48\",\n  \"Rating\": \"G\",\n  \"Actors\": [\n    {\n     \
    \ \"First name\": \"BOB\",\n      \"Last name\": \"FAWCETT\",\n      \"actorId\"\
    : 19\n    },\n    ... ...\n    {\n      \"First name\": \"CHRIS\",\n      \"Last\
    \ name\": \"DEPP\",\n      \"actorId\": 160\n    }\n  ]\n}\n```\n\n可以使用简单的点符号来展开\
    \ JSON 结构（例如 `o.json_document.Title`），而 `JSON_QUERY` 可以返回文档内选定路径的完整 JSON 结构。在此示例中，`JSON_QUERY`\
    \ 返回 actors 嵌套文档。\n```sql\nSQL> SELECT o.json_document.Title,\n  2         JSON_QUERY(json_document,\
    \ '$.Actors') actors\n  3    FROM \"ofilms\" o\n  4   WHERE id = 4\n  5  /\nTITLE\n\
    ------------------------------------------------------------\nACTORS\n------------------------------------------------------------\n\
    AFFAIR PREJUDICE\n[{\"First name\":\"JODIE\",\"Last name\":\"DEGENERES\",\"actorId\"\
    :41}\n,{\"First name\":\"SCARLETT\",\"Last name\":\"DAMON\",\"actorId\":81} ...\n\
    ```\n\n在关系上下文中，将嵌套 JSON 文档作为字符串返回没有帮助，因此这里我们可以使用 `JSON_TABLE` 为每个演员返回一行。以下是一个查询，返回电影标题以及电影中所有演员的姓名：\n\
    ```sql\nSQL> SELECT f.json_document.Title,a.*\n  2    FROM \"ofilms\" f,\n  3\
    \         JSON_TABLE(json_document,'$.Actors[*]'\n  4                    COLUMNS(\"\
    First\" PATH '$.\"First name\"',\n  5                            \"Last\" PATH\
    \ '$.\"Last name\"')) a\n  6   WHERE id=4;\n\nTITLE                First     \
    \      Last\n-------------------- --------------- ---------------\nAFFAIR PREJUDICE\
    \     JODIE           DEGENERES\nAFFAIR PREJUDICE     SCARLETT        DAMON\n\
    AFFAIR PREJUDICE     KENNETH         PESCI\nAFFAIR PREJUDICE     FAY         \
    \    WINSLET\nAFFAIR PREJUDICE     OPRAH           KILMER\n```\n\n该查询从单个电影文档中返回了五行，因为该文档的演员数组中有五位演员。`JSON_TABLE`\
    \ 大致相当于 N1QL 中的 `UNNEST` 子句或 Apache Drill 中的 `FLATTEN` 子句（两者均在第 [11](#A978-1-4842-1329-2_11_Chapter.html)\
    \ 章中讨论过）。\n\n### 通过 Oracle REST 访问 JSON\n\nJSON 文档和集合完全可以在不使用 SQL 的情况下，通过基于 REST\
    \ 的简单 Oracle 数据访问 (SODA) 协议创建、操作和检索。\n\n虽然可以在没有任何基于 SQL 的数据定义语言语句的情况下创建集合，但底层实现如我们在上一节所讨论的——会创建一个包含\
    \ LOB 的数据库表来存储 JSON 文档。\n\n无论集合是通过 REST API 还是通过 SQL 创建的，都可以使用 REST 调用来查询文档。例如，图\
    \ [12-6](#A978-1-4842-1329-2_12_Chapter.html#Fig6) 显示了一个检索 ID 为 4 的文档的 REST 命令：\n\
    ![A978-1-4842-1329-2_12_Fig6_HTML.jpg](A978-1-4842-1329-2_12_Fig6_HTML.jpg)\n\
    **图 12-6.** Oracle REST JSON 查询按 ID 获取行\n\nREST SODA 接口可用于执行 CRUD（创建、读取、更新、删除）操作。向“集合”添加“文档”会在表中创建新行。\n\
    \n该接口还支持一个查询机制，可用于检索符合任意过滤条件的文档。图 [12-7](#A978-1-4842-1329-2_12_Chapter.html#Fig7)\
    \ 说明了使用此接口的一个简单 REST 查询（使用可用于原型化 REST 调用的 Google Chrome “Postman” 扩展）。\n![A978-1-4842-1329-2_12_Fig7_HTML.jpg](A978-1-4842-1329-2_12_Fig7_HTML.jpg)\n\
    **图 12-7.** 简单的 SODA REST 查询\n\nJSON 文档过滤语法与 MongoDB 提供的语法极其相似。事实上，Oracle 开发人员有意为\
    \ MongoDB 和其他文档数据库用户提供熟悉的体验。\n\n图 [12-8](#A978-1-4842-1329-2_12_Chapter.html#Fig8)\
    \ 展示了一个更复杂的查询，我们搜索时长超过 60 分钟、评级为 G 的电影，并按长度降序排序。\n![A978-1-4842-1329-2_12_Fig8_HTML.jpg](A978-1-4842-1329-2_12_Fig8_HTML.jpg)\n\
    **图 12-8.** 复杂的 Oracle REST 查询\n\n### 对 Oracle 表的 REST 访问\n\nOracle REST 数据服务\
    \ API 也为关系表提供了 REST 接口。该机制与我们之前检查的 JSON SODA 接口几乎相同。\n\n在图 [12-9](#A978-1-4842-1329-2_12_Chapter.html#Fig9)\
    \ 中，我们看到一个 REST 查询从 Oracle `CUSTOMERS` 表中检索数据，在 HTTP 字符串中提供了一个简单的查询过滤器。\n![A978-1-4842-1329-2_12_Fig9_HTML.jpg](A978-1-4842-1329-2_12_Fig9_HTML.jpg)\n\
    **图 12-9.** 用于表查询的 Oracle REST 接口\n\n### Oracle Graph\n\nOracle 长期以来在其 Oracle\
    \ Spatial and Graph 选项中支持基于 RDF 的图功能。该选项基于第 [6](#A978-1-4842-1329-2_6_Chapter.html)\
    \ 章概述的 RDF W3C 标准。然而，尽管此功能提供了一些重要的图能力，但它不如 Neo4J 等流行属性图数据库所提供的功能全面。\n\n正如您可能从第\
    \ [6](#A978-1-4842-1329-2_6_Chapter.html) 章回忆起的，RDF 系统是三元组存储的一个例子，它表示节点之间相对简单的关系。相比之下，属性存储表示节点之间的关系，但也允许模型在节点和关系中存储重要信息（属性）。虽然\
    \ RDF 图为本体的开发和分布式数据源提供强大支持，但属性图通常对自定义应用程序开发更具吸引力，因为它们提供更丰富的数据模型。\n\nOracle 最近集成了一个属性图计算引擎，可以对保存在\
    \ Oracle RDBMS、Oracle 大数据 Hadoop 系统或 Oracle 自己的 NoSQL 系统中的任何数据执行图分析。该计算引擎支持 openCypher\
    \ 图语言。Cypher 是最流行的专用图数据库引擎 Neo4J 中实现的语言，openCypher 已作为该语言的开源版本提供。\n\nOracle 的实现并不代表原生图数据库存储引擎。正如您可能从第\
    \ [6](#A978-1-4842-1329-2_6_Chapter.html) 章回忆起的，原生图数据库必须实现无索引邻接，有效地在基础存储中实现图结构。相反，Oracle\
    \ 实现了一个图计算引擎，能够将各种格式的数据加载到内存中，在其中进行图分析。这种方法的好处是图分析可以应用于以任何现有格式保存的数据，前提是该格式可以作为图进行导航。许多现有的关系模式实际上确实实现了图关系。例如，一个典型的组织模式将有从员工到其经理的外键，这可以表示为一个图。\n\
    \n### Oracle Sharding"
  raw: 'Oracle supports functions within its SQL dialect that allow for JSON documents
    to be queried. Specifically:


    *   JSON_QUERY returns a portion of a JSON document; it uses JSON path expressions
    that are similar to XPATH for XML.

    *   JSON_VALUE is similar to JSON_QUERY, but returns a single element from a JSON
    document.

    *   JSON_EXISTS determines if a specific element exists in the JSON document.

    *   JSON_TABLE projects a portion of JSON as a relational table. For instance,
    JSON_TABLE can be used to project each subelement of a JSON document as a distinct
    virtual row.


    The example that follows uses the “films” JSON document collection that appeared
    in Chapter [11](#A978-1-4842-1329-2_11_Chapter.html) to illustrate MongoDB and
    Couchbase queries. To refresh your memory, these documents look something like
    this:


    `{`


    `"``Title``": "ACE GOLDFINGER",`


    `"``Category``": "Horror",`


    `"``Description``": "A Astounding Epistle of a Database Administrator And a Explorer
    who must Find a Car in Ancient China",`


    `"``Length``": "48",`


    `"``Rating``": "G",`


    `"Actors": [`


    `{`


    `"``First name``": "BOB",`


    `"``Last name``": "FAWCETT",`


    `"``actorId``": 19`


    `},`


    `... ...`


    `{`


    `"``First name``": "CHRIS",`


    `"``Last name``": "DEPP",`


    `"``actorId``": 160`


    `}`


    `]`


    `}`


    Simple dot notation can be used to expand the JSON structures (`o.json_document.Title`,
    in the example that follows), while JSON_QUERY can return a complete JSON structure
    for a selected path within the document. In this example, JSON_QUERY returns the
    actors nested document.


    `SQL` `>` `SELECT` `o.json_document.Title,`


    `2`         `JSON_QUERY``(json_document, ''$.Actors'') actors`


    `3`    `FROM``"ofilms" o`


    `4`   `WHERE``id = 4`


    `5  /`


    `TITLE`


    `------------------------------------------------------------`


    `ACTORS`


    `------------------------------------------------------------`


    `AFFAIR PREJUDICE`


    `[{"First name":"JODIE","Last name":"DEGENERES","actorId":41}`


    `,{"First name":"SCARLETT","Last name":"DAMON","actorId":81} ...`


    Returning a nested JSON document as a string isn’t helpful in a relational context,
    so this is where we could use JSON_TABLE to return a single row for each actor.
    Here is a query that returns the film title and the names of all the actors in
    the film:


    `SQL>` `SELECT` `f.json_document.Title,a.*`


    `2`    `FROM``"ofilms" f,`


    `3`          `JSON_TABLE``(json_document,''$.Actors[*]''`


    `4`                     `COLUMNS``("First"``PATH``''$."First name"'',`


    `5                              "Last"``PATH``''$."Last name"'')) a`


    `6`   `WHERE``id=4;`


    `TITLE                First           Last`


    `-------------------- --------------- ---------------`


    `AFFAIR PREJUDICE     JODIE           DEGENERES`


    `AFFAIR PREJUDICE     SCARLETT        DAMON`


    `AFFAIR PREJUDICE     KENNETH         PESCI`


    `AFFAIR PREJUDICE     FAY             WINSLET`


    `AFFAIR PREJUDICE     OPRAH           KILMER`


    The query returns five rows from the single film document because there are five
    actors within the actors array in that document. JSON_TABLE is roughly equivalent
    to the UNNEST clause in N1QL or the FLATTEN clause within Apache Drill (both discussed
    in Chapter [11](#A978-1-4842-1329-2_11_Chapter.html)).


    ### Accessing JSON via Oracle REST


    Jason documents and collections can be created, manipulated, and retrieved entirely
    without SQL, using the REST-based Simple Oracle Data Access (SODA) protocol.


    Although the collections can be created without any SQL-based data definition
    language statements, under the hood the implementation is as we discussed in the
    last section—a database table is created containing a LOB that stores the JSON
    documents.


    Regardless of whether the collection was created by the REST API or through SQL,
    the documents may be interrogated using REST calls. For instance, Figure [12-6](#A978-1-4842-1329-2_12_Chapter.html#Fig6)
    shows a REST command retrieving a document with an ID of 4:


    ![A978-1-4842-1329-2_12_Fig6_HTML.jpg](A978-1-4842-1329-2_12_Fig6_HTML.jpg)


    Figure 12-6.


    Oracle REST JSON query fetching a row by ID


    The REST SODA interface can be used to perform CRUD (Create, Read, Update, Delete)
    operations. Adding a “document” to a “collection” creates a new row in the table.


    The interface also supports a query mechanism that can be used to retrieve documents
    matching arbitrary filter criteria. Figure [12-7](#A978-1-4842-1329-2_12_Chapter.html#Fig7)
    illustrates a simple REST query using this interface (using the Google Chrome
    “Postman” extension that can be employed to prototype REST calls).


    ![A978-1-4842-1329-2_12_Fig7_HTML.jpg](A978-1-4842-1329-2_12_Fig7_HTML.jpg)


    Figure 12-7.


    Simple SODA REST query


    The JSON document filter syntax is extremely similar to that provided by MongoDB.
    Indeed, the Oracle developers intentionally set out to provide a familiar experience
    for users of MongoDB and other document databases.


    Figure [12-8](#A978-1-4842-1329-2_12_Chapter.html#Fig8) illustrates a more complex
    query in which we search for movies longer than 60 minutes with a G rating, sorted
    by descending length.


    ![A978-1-4842-1329-2_12_Fig8_HTML.jpg](A978-1-4842-1329-2_12_Fig8_HTML.jpg)


    Figure 12-8.


    Complex Oracle REST query


    ### REST Access to Oracle Tables


    The Oracle REST data services API provides a REST interface for relational tables
    as well. The mechanism is virtually identical to the JSON SODA interface we examined
    earlier.


    In Figure [12-9](#A978-1-4842-1329-2_12_Chapter.html#Fig9), we see a REST query
    retrieving data from the Oracle CUSTOMERS table, providing a simple query filter
    in the HTTP string.


    ![A978-1-4842-1329-2_12_Fig9_HTML.jpg](A978-1-4842-1329-2_12_Fig9_HTML.jpg)


    Figure 12-9.


    Oracle REST interface for table queries


    ### Oracle Graph


    Oracle has long supported an RDF-based graph capability within its Oracle Spatial
    and Graph option. This option was based on the RDF WC3 standard outlined in Chapter
    [6](#A978-1-4842-1329-2_6_Chapter.html). However, while this capability provided
    some significant graph capabilities, it fell short of the capabilities offered
    in popular property graph databases such as Neo4J.


    As you may recall from Chapter [6](#A978-1-4842-1329-2_6_Chapter.html), an RDF
    system is an example of a triple store, which represents relatively simple relationships
    between nodes. In contrast, a property store represents the relationship between
    nodes but also allows the model to store significant information (properties)
    within the nodes and the relationships. While RDF graphs provide strong support
    for the development of ontologies and support distributed data sources, property
    graphs are often more attractive for custom application development because they
    provide a richer data model.


    Oracle has recently integrated a property graph compute engine that can perform
    graph analytics on any data held in the Oracle RDBMS, the Oracle Big Data Hadoop
    system, or Oracle’s own NoSQL system. The compute engine supports the openCypher
    graph language. Cypher is the language implemented within Neo4J, the most popular
    dedicated graph database engine, and openCypher has been made available as an
    open-source version of that language.


    Oracle’s implementation does not represent a native graph database storage engine.
    As you may recall from Chapter [6](#A978-1-4842-1329-2_6_Chapter.html), a native
    graph database must implement index free adjacency, effectively implementing the
    graph structure in base storage. Rather, Oracle implements a graph compute engine
    capable of loading data from a variety of formats into memory, where it can be
    subjected to graph analytics. The advantage of this approach is that graph analytics
    can be applied to data held in any existing format, provided that format can be
    navigated as a graph. Many existing relational schemas do in fact implement graph
    relationships. For example, a typical organization schema will have foreign keys
    from employees to their managers, which can be represented as a graph.


    ### Oracle Sharding'
