  trans: '

    ## 大数据革命


    大数据是一个宽泛的术语，存在多种相互竞争的定义。对本书作者而言，它意味着数据在计算机科学和社会中的角色发生了两个相辅相成的重大转变：


    *   **数据量更多**：我们现在有能力以原始格式存储和处理所有数据——包括机器生成的数据、多媒体数据、社交网络数据和事务数据——并可能永久保存这些数据。

    *   **效果更显著**：机器学习、预测性分析和集体智能的进步使得我们能够从数据中生成比以往任何时候都更多的价值。


    本书并非讲述大数据革命的书；这类书已经够多了。然而，我们仍应花些篇幅阐明大数据作为一个概念的重要性，以便将这些技术置于合适的背景中理解。


    对于资深的数据库专业人士来说，大数据常常像是一个无意义的流行语，因为他们自古以来就经历着数据库容量的指数级增长。在数据库管理系统的历史中，数据量的增长从未不引人注目。


    然而，确实，当今组织数据的本质与不久前的过去相比，在性质上已有所不同。一些人将这种范式转变称为数据领域的“工业革命”，这个术语确实很贴切。在工业革命之前，所有产品基本上都是手工制作的；而在工业革命之后，产品则是在工厂的流水线上生产出来的。类似地，在数据工业革命之前，所有数据都是“内部生成”的。现在，数据从四面八方涌来：客户、社交网络、传感器，以及所有传统来源，如销售和内部运营系统。


    ### 云、移动、社交与大数据


    大多数人会同意，过去十年间三大主导的信息技术趋势是云、移动和社交媒体。这三大宏观趋势已经改变了我们的经济、社会和日常生活。过去 15 年在线零售的发展或许是这些趋势动态演变最熟悉的例证。


    “云计算”一词在 2008 年开始获得广泛关注，但我们现在所称的“云”真正诞生于 20 世纪 90 年代末的电子商务革命。互联网作为通用广域网的出现，以及万维网作为企业对客户门户的兴起，通过创建基于网络的店面，几乎将所有企业都“推上了云端”。


    对于某些行业——例如音乐和图书——互联网迅速成为一个重要的甚至是主导的销售渠道。但在更广泛的零售领域，实体店（砖瓦砂浆门店）仍然主导着消费者互动。尽管零售商在云端充分展现，但消费者在网上的存在是零星而浅层的。对大多数消费者来说，互联网连接仅限于家用共享电脑或工作场所的台式机。消费者只是间歇性地连接互联网，且没有在线身份。


    社交网络和智能手机的出现几乎同时发生。智能手机让人们可以随时随地上网，而社交网络则为频繁的互联网互动提供了动力。几年之内，普通消费者的互联网互动频率急剧加速：以前每天只上网几次的人现在持续在线，通过电子邮件和社交网络监控他们的职业和社交活动。


    消费者现在发现，只要购物冲动一来，随时在线购物都很方便。此外，零售商很快发现，他们可以利用来自社交网络和其他互联网来源的信息来精准投放营销活动并实现个性化互动。零售商自己也创建了社交网络页面，作为其在线商店的补充，并允许零售商通过社交网络直接与消费者互动。


    在线业务与社交网络之间的协同效应——由始终连接的移动互联网中介和促成——导致了零售格局的剧烈转变。新零售模式 effectiveness 的关键是数据：社交-移动-云产生了海量数据，可用于优化和增强在线体验。这种良性反馈循环驱动着大数据解决方案，而这些方案可能决定下一代零售运营的成败。


    零售业是一个熟悉的例子，但类似动态几乎驱动着所有其他行业。在某些情况下，物联网（IoT）——通过将几乎每一个收集或消耗数据的物理设备都连接到互联网上——扮演着与零售场景中智能手机同等的角色。新的联网设备——互联网汽车、可穿戴设备、家庭自动化等——推动着产生数据并依赖数据来获取竞争优势的良性数据循环。图
    2-1 说明了这个循环。


    ![A978-1-4842-1329-2_2_Fig1_HTML.jpg](img/A978-1-4842-1329-2_2_Fig1_HTML.jpg)


    图 2-1. 大数据的良性循环


    ## 谷歌：大数据的先驱


    当谷歌在 1996 年首次创建时，万维网已经是一个规模空前的网络；事实上，正是这种巨大的规模使得谷歌的关键创新——PageRank——成为一项突破。当时的搜索引擎只是根据网页内的关键词进行索引。鉴于任何搜索词都可能有海量匹配结果，这种方式并不足够；结果主要根据搜索词在页面中出现的次数进行加权，而不考虑其有用性或受欢迎程度。PageRank
    允许根据指向某个页面的链接数量来加权该页面的相关性，这使得谷歌能够立即提供比竞争对手更好的搜索结果。


    PageRank 是数据驱动算法的一个绝佳例子，它利用了“群体智慧”（集体智能），并且能够随着更多数据的可用而智能适应（机器学习）。因此，谷歌是第一个清晰的例子，证明了一家公司通过我们现在所称的数据科学在互联网上取得了成功。

    '
- fmt: '## Google硬件基础设施


    Google是展示如何通过智能利用海量数据来打造更优算法的典范。然而，就我们的目的而言，Google在数据架构方面的创新最具相关性。


    Google最初的硬件平台由典型的现成服务器集合组成，它们可能被放置在任何研究实验室的桌子下。然而，仅用了几年时间，Google就转向了在商业级数据中心中部署大量机架式服务器。随着Google的发展，它超越了即使是最庞大现有数据中心架构的容量限制。为了提供能够实现无限制指数级增长的硬件基础设施，其经济性和实用性要求Google创建一种新的硬件和软件架构。


    Google在设计其中心架构时遵循了一些关键原则。最重要的一点——并且在当时是独一无二的——Google致力于在海量商用服务器上实现大规模的并行化和分布式处理。Google也采取了“绝地武士自己造光剑”的态度：在Google的架构中几乎找不到任何第三方的，尤其是商业的软件。“自建”在Google看来优于“购买”。


    到2005年，Google不再将单个服务器视为计算的基本单元。相反，Google围绕`Google Modular Data Center`构建数据中心。`Modular
    Data Center`由集装箱组成，每个集装箱容纳约一千台定制的、运行`Linux`的`Intel`服务器。每个模块包括独立的电源和空调。数据中心容量的增加不是通过单独添加新服务器，而是通过添加新的包含1000台服务器的模块来实现的！图[2-2](#A978-1-4842-1329-2_2_Chapter.html#Fig2)展示了Google专利中描述的模块示意图。[¹](#A978-1-4842-1329-2_2_Chapter.html#Sec16)


    ![A978-1-4842-1329-2_2_Fig2_HTML.jpg](A978-1-4842-1329-2_2_Fig2_HTML.jpg)


    **图 2-2.**

    Google专利中描述的模块化数据中心


    当时，主流的数据处理架构是将其存储分离到由`EMC`等公司构建的专用存储服务器上。这些存储通过`Fibre Channel`（或类似协议）作为存储区域网络（`SAN`）提供给数据库或其他应用程序，或者通过`TCP/IP`作为网络附加存储（`NAS`）提供。Google摒弃了这些概念；在Google的架构中，存储将位于与提供计算能力的同一服务器内部直接连接的磁盘上。


    ### Google软件栈


    Google硬件架构有许多引人入胜的方面。然而，为了我们的目的，理解当时的Google架构由数十万台低成本服务器组成，每台服务器都有自己的直连存储，这就足够了。


    不言而喻，这种独特的硬件架构也需要独特的软件架构。当时可用的任何操作系统或数据库平台都无法在如此庞大的服务器数量上运行。因此，Google开发了三个主要的软件层作为Google平台的基础。它们是：


    *   Google文件系统（`GFS`）：一个分布式集群文件系统，允许将Google数据中心内的所有磁盘作为一个巨大的、分布式的、冗余的文件系统进行访问。

    *   `MapReduce`：一个分布式处理框架，用于在大量可能不可靠的服务器上并行化算法，并能够处理海量数据集。

    *   `BigTable`：一个非关系型数据库系统，使用`Google File System`进行存储。


    Google非常慷慨地在2003年[²](#A978-1-4842-1329-2_2_Chapter.html#Sec16)、2004年[³](#A978-1-4842-1329-2_2_Chapter.html#Sec16)和2006年[⁴](#A978-1-4842-1329-2_2_Chapter.html#Sec16)发布的一系列论文中揭示了这些组件的基本设计。这三项技术——连同其他实用程序和组件——共同构成了许多Google产品的基础。


    图[2-3](#A978-1-4842-1329-2_2_Chapter.html#Fig3)展示了该架构的一个高度简化表示。`GFS`抽象了构成Google模块化数据中心的服务器中包含的存储。`MapReduce`抽象了这些服务器中包含的处理能力，而`BigTable`允许使用`GFS`进行存储来存储海量数据集的结构化数据。


    ![A978-1-4842-1329-2_2_Fig3_HTML.jpg](A978-1-4842-1329-2_2_Fig3_HTML.jpg)


    **图 2-3.**

    Google软件架构


    ### 更多关于MapReduce


    `MapReduce`是一种用于通用数据密集型处理并行化的编程模型。`MapReduce`将处理分为两个阶段：一个映射阶段，其中数据被分解成可以由独立线程（可能运行在独立的机器上）处理的块；以及一个归约阶段，它将来自`mapper`的输出组合成最终结果。


    `MapReduce`的经典例子是单词计数程序，如图[2-4](#A978-1-4842-1329-2_2_Chapter.html#Fig4)所示。例如，假设我们希望统计某个输入文件中宠物类型的出现次数。我们在`map`阶段将数据分解成相等的块。然后数据被混洗成按宠物类型分组。最后，`reduce`阶段统计出现次数，以提供输入到输出的总计数。


    ![A978-1-4842-1329-2_2_Fig4_HTML.jpg](A978-1-4842-1329-2_2_Fig4_HTML.jpg)


    **图 2-4.**

    简单的MapReduce流水线


    如图[2-4](#A978-1-4842-1329-2_2_Chapter.html#Fig4)所示的简单`MapReduce`流水线很少见；更典型的情况是将多个`MapReduce`阶段链接在一起以实现更复杂的结果。例如，可能有多个需要以某种方式合并的输入文件，或者可能存在一些复杂的迭代处理以执行统计或机器学习分析。


    图[2-5](#A978-1-4842-1329-2_2_Chapter.html#Fig5)展示了一个更复杂的多阶段`MapReduce`流水线。在此示例中，一个包含访问各种产品网页信息的文件与一个包含产品详情（以获取产品类别）的文件连接，然后再与一个包含客户详情的文件连接，以确定客户的国家/地区。然后将这些连接的数据进行汇总，以提供一份关于产品类别、客户地理位置和页面访问量的报告。


    ![A978-1-4842-1329-2_2_Fig5_HTML.jpg](A978-1-4842-1329-2_2_Fig5_HTML.jpg)


    **图 2-5.**

    多阶段MapReduce


    `MapReduce`过程可以组装成任意复杂的流水线，能够解决非常广泛的数据处理问题。然而，在许多方面，`MapReduce`代表了一种暴力处理方法，并不总是最有效或最优雅的解决方案。也存在一类计算问题，`MapReduce`无法为其提供可扩展的解决方案。由于所有这些原因，`MapReduce`在Google内外都已被更复杂和专门的算法所扩展；我们将在[第11章](#A978-1-4842-1329-2_11_Chapter.html)中讨论其中的一些。然而，尽管替代处理模型日益普及，`MapReduce`仍然是一种默认且广泛适用的范式。


    ## Hadoop：开源的Google技术栈


    虽然上一节概述的技术构成了我们都使用过的Google产品的基础，但它们通常并不直接面向公众。然而，它们确实启发了`Hadoop`，它包含了所有这些重要技术的类似组件，并且作为一个开源的`Apache`项目可供所有人使用。


    没有其他单一技术比`Hadoop`对大数据的影响更大。`Hadoop`——通过提供一种经济可行的大规模非结构化数据存储和处理手段——使主流IT能够进行Google风格的大数据处理。'
  raw: '### Google Hardware


    Google serves as a prime example of how better algorithm were forged by intelligently
    harnessing massive datasets. However, for our purposes, it is Google’s innovations
    in data architecture that are most relevant.


    Google’s initial hardware platform consisted of the typical collection of off-the-shelf
    servers sitting under a desk that might have been found in any research lab. However,
    it took only a few years for Google to shift to masses of rack-mounted servers
    in commercial-grade data centers. As Google grew, it outstripped the capacity
    limits of even the most massive existing data center architectures. The economics
    and practicalities of delivering a hardware infrastructure capable of unbounded
    exponential growth required Google to create a new hardware and software architecture.


    Google committed to a number of key tenants when designing its data center architecture.
    Most significantly—and at the time, uniquely—Google committed to massively parallelizing
    and distributing processing across very large numbers of commodity servers. Google
    also adopted a “Jedis build their own lightsabers” attitude: very little third
    party— and virtually no commercial—software would be found in the Google architecture.
    “Build” was considered better than “buy” at Google.


    By 2005, Google no longer thought of individual servers as the fundamental unit
    of computing. Rather, Google constructed data centers around the Google Modular
    Data Center. The Modular Data Center comprises shipping containers that house
    about a thousand custom-designed Intel servers running Linux. Each module includes
    an independent power supply and air conditioning. Data center capacity is increased
    not by adding new servers individually but by adding new 1,000-server modules!
    Figure [2-2](#A978-1-4842-1329-2_2_Chapter.html#Fig2) shows a diagram of a module
    as described in Google’s patent. [¹](#A978-1-4842-1329-2_2_Chapter.html#Sec16)


    ![A978-1-4842-1329-2_2_Fig2_HTML.jpg](A978-1-4842-1329-2_2_Fig2_HTML.jpg)


    Figure 2-2.


    Google Modular Data Center as described in their patent


    At this time, the prevailing architecture for data processing was to separate
    its storage to dedicated storage servers built by companies such as EMC. This
    storage would be made available to databases or other applications via Fibre Channel
    (or similar protocol) as a storage area network (SAN) or across TCP/IP as network
    attached storage (NAS). Google rejected these concepts; in the Google architecture,
    storage would be on directly attached disks within the same servers as would be
    providing computing power.


    ### The Google Software Stack


    There are many fascinating aspects to Google’s hardware architecture. However,
    it’s enough for our purposes to understand that the Google architecture at that
    time comprised hundreds of thousands of low-cost servers, each of which had its
    own directly attached storage.


    It goes without saying that this unique hardware architecture required a unique
    software architecture as well. No operating system or database platform available
    at the time could come close to operating across such a huge number of servers.
    So, Google developed three major software layers to serve as the foundation for
    the Google platform. These were:


    *   Google File System (GFS): a distributed cluster file system that allows all
    of the disks within the Google data center to be accessed as one massive, distributed,
    redundant file system.

    *   MapReduce: a distributed processing framework for parallelizing algorithms
    across large numbers of potentially unreliable servers and being capable of dealing
    with massive datasets.

    *   BigTable: a nonrelational database system that uses the Google File System
    for storage.


    Google was generous enough to reveal the essential designs for each of these components
    in a series of papers released in 2003, [²](#A978-1-4842-1329-2_2_Chapter.html#Sec16)
    2004, [³](#A978-1-4842-1329-2_2_Chapter.html#Sec16) and 2006\. [⁴](#A978-1-4842-1329-2_2_Chapter.html#Sec16)
    These three technologies—together with other utilities and components—served as
    the foundation for many Google products.


    A high level, very simplified representation of the architecture is shown in Figure
    [2-3](#A978-1-4842-1329-2_2_Chapter.html#Fig3). GFS abstracts the storage contained
    in the servers that make up Google’s modular data centers. MapReduce abstracts
    the processing power contained within these servers, while BigTable allows for
    structured storage of massive datasets using GFS for storage.


    ![A978-1-4842-1329-2_2_Fig3_HTML.jpg](A978-1-4842-1329-2_2_Fig3_HTML.jpg)


    Figure 2-3.


    Google software architecture


    ### More about MapReduce


    MapReduce is a programming model for general-purpose parallelization of data-intensive
    processing. MapReduce divides the processing into two phases: a mapping phase,
    in which data is broken up into chunks that can be processed by separate threads—potentially
    running on separate machines; and a reduce phase, which combines the output from
    the mappers into the final result.


    The canonical example of MapReduce is the word-count program, shown in Figure
    [2-4](#A978-1-4842-1329-2_2_Chapter.html#Fig4). For example, suppose we wish to
    count the occurrences of pet types in some input file. We break the data into
    equal chunks in the map phase. The data is then shuffled into groups of pet types.
    Finally, the reduce phase counts the occurrences to provide a total that is fed
    into the output.


    ![A978-1-4842-1329-2_2_Fig4_HTML.jpg](A978-1-4842-1329-2_2_Fig4_HTML.jpg)


    Figure 2-4.


    Simple MapReduce pipeline


    Simple MapReduce pipelines as shown in Figure [2-4](#A978-1-4842-1329-2_2_Chapter.html#Fig4)
    are rare; it’s far more typical that multiple MapReduce phases are chained together
    to achieve more complex results. For instance, there might be multiple input files
    that need to be merged in some way, or there may be some complex iterative processing
    to perform a statistical or machine learning analysis.


    Figure [2-5](#A978-1-4842-1329-2_2_Chapter.html#Fig5) illustrates a more complex
    multistage MapReduce pipeline. In this example, a file containing information
    about visits to various product webpages is joined with a file containing product
    details—to obtain the product category—and then to a file containing customer
    details, so as to determine the customer’s country. This joined data is then aggregated
    to provide a report of product categories, customer geographies, and page visits.


    ![A978-1-4842-1329-2_2_Fig5_HTML.jpg](A978-1-4842-1329-2_2_Fig5_HTML.jpg)


    Figure 2-5.


    Multistage MapReduce


    MapReduce processes can be assembled into arbitrarily complex pipelines capable
    of solving a very wide range of data processing problems. However, in many respects,
    MapReduce represents a brute-force approach to processing, and is not always the
    most efficient or elegant solution. There also exist a category of computational
    problems for which MapReduce cannot offer scalable solutions. For all these reasons,
    MapReduce has been extended within and without Google by more sophisticated and
    specialized algorithms; we will look at some of these in [Chapter 11](#A978-1-4842-1329-2_11_Chapter.html)
    . However, despite the increasing prevalence of alternative processing models,
    MapReduce remains a default and widely applicable paradigm.


    ## Hadoop: Open-Source Google Stack


    While the technologies outlined in the previous section underlie Google products
    that we have all used, they are not generally directly exposed to the public.
    However, they did serve as the inspiration for Hadoop, which contains analogs
    for each of these important technologies and which is available to all as an open-source
    Apache project.


    No other single technology has had as great an influence on Big Data as Hadoop.
    Hadoop—by providing an economically viable means of mass unstructured data storage
    and processing— has bought Google-style Big Data processing within the reach of
    mainstream IT.'
  trans: '## Google 硬件基础设施


    Google 是展示如何通过智能利用海量数据来打造更优算法的典范。然而，就我们的目的而言，Google 在数据架构方面的创新最具相关性。


    Google 最初的硬件平台由典型的现成服务器集合组成，它们可能被放置在任何研究实验室的桌子下。然而，仅用了几年时间，Google 就转向了在商业级数据中心中部署大量机架式服务器。随着
    Google 的发展，它超越了即使是最庞大现有数据中心架构的容量限制。为了提供能够实现无限制指数级增长的硬件基础设施，其经济性和实用性要求 Google 创建一种新的硬件和软件架构。


    Google 在设计其中心架构时遵循了一些关键原则。最重要的一点——并且在当时是独一无二的——Google 致力于在海量商用服务器上实现大规模的并行化和分布式处理。Google
    也采取了“绝地武士自己造光剑”的态度：在 Google 的架构中几乎找不到任何第三方的，尤其是商业的软件。“自建”在 Google 看来优于“购买”。


    到 2005 年，Google 不再将单个服务器视为计算的基本单元。相反，Google 围绕`Google Modular Data Center`构建数据中心。`Modular
    Data Center`由集装箱组成，每个集装箱容纳约一千台定制的、运行`Linux`的`Intel`服务器。每个模块包括独立的电源和空调。数据中心容量的增加不是通过单独添加新服务器，而是通过添加新的包含
    1000 台服务器的模块来实现的！图 2-2 展示了 Google 专利中描述的模块示意图。¹


    ![A978-1-4842-1329-2_2_Fig2_HTML.jpg](img/A978-1-4842-1329-2_2_Fig2_HTML.jpg)


    **图 2-2.**

    Google 专利中描述的模块化数据中心


    当时，主流的数据处理架构是将其存储分离到由`EMC`等公司构建的专用存储服务器上。这些存储通过`Fibre Channel`（或类似协议）作为存储区域网络（`SAN`）提供给数据库或其他应用程序，或者通过`TCP/IP`作为网络附加存储（`NAS`）提供。Google
    摒弃了这些概念；在 Google 的架构中，存储将位于与提供计算能力的同一服务器内部直接连接的磁盘上。


    ### Google 软件栈


    Google 硬件架构有许多引人入胜的方面。然而，为了我们的目的，理解当时的 Google 架构由数十万台低成本服务器组成，每台服务器都有自己的直连存储，这就足够了。


    不言而喻，这种独特的硬件架构也需要独特的软件架构。当时可用的任何操作系统或数据库平台都无法在如此庞大的服务器数量上运行。因此，Google 开发了三个主要的软件层作为
    Google 平台的基础。它们是：


    *   Google 文件系统（`GFS`）：一个分布式集群文件系统，允许将 Google 数据中心内的所有磁盘作为一个巨大的、分布式的、冗余的文件系统进行访问。

    *   `MapReduce`：一个分布式处理框架，用于在大量可能不可靠的服务器上并行化算法，并能够处理海量数据集。

    *   `BigTable`：一个非关系型数据库系统，使用`Google File System`进行存储。


    Google 非常慷慨地在 2003 年²、2004 年³和 2006 年⁴发布的一系列论文中揭示了这些组件的基本设计。这三项技术——连同其他实用程序和组件——共同构成了许多
    Google 产品的基础。


    图 2-3 展示了该架构的一个高度简化表示。`GFS`抽象了构成 Google 模块化数据中心的服务器中包含的存储。`MapReduce`抽象了这些服务器中包含的处理能力，而`BigTable`允许使用`GFS`进行存储来存储海量数据集的结构化数据。


    ![A978-1-4842-1329-2_2_Fig3_HTML.jpg](img/A978-1-4842-1329-2_2_Fig3_HTML.jpg)


    **图 2-3.**

    Google 软件架构


    ### 更多关于 MapReduce


    `MapReduce`是一种用于通用数据密集型处理并行化的编程模型。`MapReduce`将处理分为两个阶段：一个映射阶段，其中数据被分解成可以由独立线程（可能运行在独立的机器上）处理的块；以及一个归约阶段，它将来自`mapper`的输出组合成最终结果。


    `MapReduce`的经典例子是单词计数程序，如图 2-4 所示。例如，假设我们希望统计某个输入文件中宠物类型的出现次数。我们在`map`阶段将数据分解成相等的块。然后数据被混洗成按宠物类型分组。最后，`reduce`阶段统计出现次数，以提供输入到输出的总计数。


    ![A978-1-4842-1329-2_2_Fig4_HTML.jpg](img/A978-1-4842-1329-2_2_Fig4_HTML.jpg)


    **图 2-4.**

    简单的 MapReduce 流水线


    如图 2-4 所示的简单`MapReduce`流水线很少见；更典型的情况是将多个`MapReduce`阶段链接在一起以实现更复杂的结果。例如，可能有多个需要以某种方式合并的输入文件，或者可能存在一些复杂的迭代处理以执行统计或机器学习分析。


    图 2-5 展示了一个更复杂的多阶段`MapReduce`流水线。在此示例中，一个包含访问各种产品网页信息的文件与一个包含产品详情（以获取产品类别）的文件连接，然后再与一个包含客户详情的文件连接，以确定客户的国家/地区。然后将这些连接的数据进行汇总，以提供一份关于产品类别、客户地理位置和页面访问量的报告。


    ![A978-1-4842-1329-2_2_Fig5_HTML.jpg](img/A978-1-4842-1329-2_2_Fig5_HTML.jpg)


    **图 2-5.**

    多阶段 MapReduce


    `MapReduce`过程可以组装成任意复杂的流水线，能够解决非常广泛的数据处理问题。然而，在许多方面，`MapReduce`代表了一种暴力处理方法，并不总是最有效或最优雅的解决方案。也存在一类计算问题，`MapReduce`无法为其提供可扩展的解决方案。由于所有这些原因，`MapReduce`在
    Google 内外都已被更复杂和专门的算法所扩展；我们将在第 11 章中讨论其中的一些。然而，尽管替代处理模型日益普及，`MapReduce`仍然是一种默认且广泛适用的范式。


    ## Hadoop：开源的 Google 技术栈


    虽然上一节概述的技术构成了我们都使用过的 Google 产品的基础，但它们通常并不直接面向公众。然而，它们确实启发了`Hadoop`，它包含了所有这些重要技术的类似组件，并且作为一个开源的`Apache`项目可供所有人使用。


    没有其他单一技术比`Hadoop`对大数据的影响更大。`Hadoop`——通过提供一种经济可行的大规模非结构化数据存储和处理手段——使主流 IT 能够进行
    Google 风格的大数据处理。'
- fmt: '## Hadoop''s Origins


    In 2004, Doug Cutting and Mike Cafarella were working on an open-source project
    to build a web search engine called Nutch, which would be on top of Apache Lucene.
    Lucene is a Java-based text indexing and searching library. The Nutch team aspired
    to use Lucene to build a scalable web search engine with the explicit intent of
    creating an open-source equivalent of the proprietary technologies used within
    Google.


    Initial versions of Nutch could not demonstrate the scalability required to index
    the entire web. When Google published the `GFS` and `MapReduce` papers in 2003
    and 2004, the Nutch team quickly realized that these offered a proven architectural
    foundation for solving Nutch''s scalability challenges.


    As the Nutch team implemented their `GFS` and `MapReduce` equivalents, it soon
    became obvious that these were applicable to a broad range of data processing
    challenges and that a dedicated project to exploit the technology was warranted.
    The resulting project was named Hadoop. Hadoop was made available for download
    in 2007, and became a top-level Apache project in 2008.


    Many open-source projects start small and grow slowly. Hadoop was the exact opposite.
    Yahoo! hired Cutting to work on improving Hadoop in 2006, with the objective of
    maturing Hadoop to the point that it could contribute to the Yahoo! platform.
    In early 2008, Yahoo! announced that a Hadoop cluster with over 5 petabytes of
    storage and more than 10,000 cores was generating the index that resolved Yahoo!''s
    web searches. As a result, before almost anybody outside the IT community had
    heard of Hadoop, it had already been proven on a massive scale.


    The other significant early adopter of Hadoop was Facebook. Facebook started experimenting
    with Hadoop in 2007, and by 2008 it had a cluster utilizing 2,500 CPU cores in
    production. Facebook''s initial implementation of Hadoop supplemented its Oracle-based
    data warehouse. By 2012, Facebook''s Hadoop cluster had exceeded 100 petabytes
    of disk, and it had completely overtaken Oracle as a data warehousing solution,
    as well as powering many core Facebook products.


    Hadoop has been adopted—at least in pilot form—by many of the Fortune 500 companies.
    As with all new technologies, some overhyping and subsequent disillusionment is
    to be expected. However, most organizations that are actively pursuing a Big Data
    solution use Hadoop in some form.


    The degree to which Hadoop has become the de facto solution for massive unstructured
    data storage and processing can be illustrated by the positions taken by the top
    three database vendors: Microsoft, Oracle, and IBM. By 2012, each of these giants
    had ceased to offer any form of Hadoop alternative and instead were offering Hadoop
    within its product portfolio.


    ## The Power of Hadoop


    Hadoop provides an economically attractive storage solution for Big Data, as well
    as a scalable processing model for analytic processing. Specifically, it has:


    *   An economical scalable storage model. As data volumes increase, so does the
    cost of storing that data online. Because Hadoop can run on commodity hardware
    that in turn utilizes commodity disks, the price point per terabyte is lower than
    that of almost any other technology.

    *   Massive scaleable `IO` capability. Because Hadoop uses a large number of commodity
    devices, the aggregate `IO` and network capacity is higher than that provided
    by dedicated storage arrays in which smaller numbers of larger disks are provided
    by even smaller numbers of processors. Furthermore, adding new servers to Hadoop
    adds storage, `IO`, `CPU`, and network capacity all at once, whereas adding disks
    to a storage array might simply exacerbate a network or `CPU` bottleneck within
    the array.

    *   Reliability: Data in Hadoop is stored redundantly in multiple servers and
    can be distributed across multiple computer racks. Failure of a server does not
    result in a loss of data; in fact, a Hadoop job will continue even if a server
    fails—the processing simply switches to another server.

    *   A scalable processing model: `MapReduce` represents a widely applicable and
    scalable distributed processing model. While `MapReduce` is not the most efficient
    implementation for all algorithms, it is capable of brute-forcing acceptable performance
    for almost all.

    *   Schema on read: Data can be loaded into Hadoop without having to be converted
    to a highly structured normalized format. This makes it easy for Hadoop to quickly
    ingest data from various forms. The imposition of structure can be delayed until
    the data is accessed; this is sometimes referred to as schema on read, as opposed
    to the schema on write mode of relational data warehouses.


    ## Hadoop''s Architecture


    Hadoop''s architecture roughly parallels that of Google. Google File System capabilities
    are provided by the Hadoop Distributed File System (`HDFS`), which allows all
    the disk storage in the cluster to be accessed using familiar file system idioms.


    There are currently two major iterations of Hadoop architecture. Hadoop 2.0 layers
    on top of the 1.0 architecture, so let''s consider each in turn.


    In Hadoop 1.0, the majority of servers in a Hadoop cluster function both as data
    nodes and as task trackers, which is to say that each server supplies both data
    storage and processing capacity (`CPU` and memory).


    Specialized nodes within the Hadoop 1.0 architecture are also defined. The job
    tracker node coordinates the scheduling of jobs run on the Hadoop cluster, while
    the name node is a sort of directory that provides the mapping from blocks on
    data nodes to files on `HDFS`. Every piece of data will usually be replicated
    across three nodes, which can be located on separate server racks to avoid any
    single point of failure. Figure [2-6](#A978-1-4842-1329-2_2_Chapter.html#Fig6)
    illustrates the Hadoop 1.0 architecture.


    ![A978-1-4842-1329-2_2_Fig6_HTML.jpg](A978-1-4842-1329-2_2_Fig6_HTML.jpg)


    Figure 2-6. Hadoop 1.0 architecture


    The Hadoop 1.0 architecture is powerful and easy to understand, but it is limited
    to `MapReduce` workloads and it provides limited flexibility with regard to scheduling
    and resource allocation. In the Hadoop 2.0 architecture, `YARN` (Yet Another Resource
    Negotiator or, recursively, `YARN` Application Resource Negotiator) improves scalability
    and flexibility by splitting the roles of the Task Tracker into two processes.
    A Resource Manager controls access to the clusters resources (memory, `CPU`, etc.)
    while the Application Manager (one per job) controls task execution.


    `YARN` provides much more than just improved scalability. `YARN` treats traditional
    `MapReduce` as just one of the possible frameworks that can run on the cluster,
    allowing Hadoop to run tasks based on more complex processing models, some of
    which we''ll discuss in [Chapter 11](#A978-1-4842-1329-2_11_Chapter.html).


    Figure [2-7](#A978-1-4842-1329-2_2_Chapter.html#Fig7) illustrates the resource
    allocation and application execution aspects of `YARN`. For example, a Hadoop
    client submits an application execution request to the Resource Manager (1). The
    Resource Manager coordinates with the various Node Managers to determine which
    nodes have available resource (2). The Resource Manager then creates an Application
    Manager (3) on an available node. The Application Manager coordinates tasks that
    run in Containers on the selected nodes (4). The Containers control the amount
    of `CPU` and memory resource the application task may use.


    ![A978-1-4842-1329-2_2_Fig7_HTML.jpg](A978-1-4842-1329-2_2_Fig7_HTML.jpg)


    Figure 2-7. Hadoop 2.0 `YARN` architecture'
  raw: '### Hadoop’s Origins


    In 2004, Doug Cutting and Mike Cafarella were working on an open-source project
    to build a web search engine called Nutch, which would be on top of Apache Lucene.
    Lucene is a Java-based text indexing and searching library. The Nutch team aspired
    to use Lucene to build a scalable web search engine with the explicit intent of
    creating an open-source equivalent of the proprietary technologies used within
    Google.


    Initial versions of Nutch could not demonstrate the scalability required to index
    the entire web. When Google published the GFS and MapReduce papers in 2003 and
    2004, the Nutch team quickly realized that these offered a proven architectural
    foundation for solving Nutch’s scalability challenges.


    As the Nutch team implemented their GFS and MapReduce equivalents, it soon became
    obvious that these were applicable to a broad range of data processing challenges
    and that a dedicated project to exploit the technology was warranted. The resulting
    project was named Hadoop. Hadoop was made available for download in 2007, and
    became a top-level Apache project in 2008.


    Many open-source projects start small and grow slowly. Hadoop was the exact opposite.
    Yahoo! hired Cutting to work on improving Hadoop in 2006, with the objective of
    maturing Hadoop to the point that it could contribute to the Yahoo! platform.
    In early 2008, Yahoo! announced that a Hadoop cluster with over 5 petabytes of
    storage and more than 10,000 cores was generating the index that resolved Yahoo!’s
    web searches. As a result, before almost anybody outside the IT community had
    heard of Hadoop, it had already been proven on a massive scale.


    The other significant early adopter of Hadoop was Facebook. Facebook started experimenting
    with Hadoop in 2007, and by 2008 it had a cluster utilizing 2,500 CPU cores in
    production. Facebook’s initial implementation of Hadoop supplemented its Oracle-based
    data warehouse. By 2012, Facebook`s Hadoop cluster had exceeded 100 petabytes
    of disk, and it had completely overtaken Oracle as a data warehousing solution,
    as well as powering many core Facebook products.


    Hadoop has been adopted—at least in pilot form—by many of the Fortune 500 companies.
    As with all new technologies, some overhyping and subsequent disillusionment is
    to be expected. However, most organizations that are actively pursuing a Big Data
    solution use Hadoop in some form.


    The degree to which Hadoop has become the de facto solution for massive unstructured
    data storage and processing can be illustrated by the positions taken by the top
    three database vendors: Microsoft, Oracle, and IBM. By 2012, each of these giants
    had ceased to offer any form of Hadoop alternative and instead were offering Hadoop
    within its product portfolio.


    ### The Power of Hadoop


    Hadoop provides an economically attractive storage solution for Big Data, as well
    as a scalable processing model for analytic processing. Specifically, it has:


    *   An economical scalable storage model. As data volumes increase, so does the
    cost of storing that data online. Because Hadoop can run on commodity hardware
    that in turn utilizes commodity disks, the price point per terabyte is lower than
    that of almost any other technology.

    *   Massive scaleable IO capability. Because Hadoop uses a large number of commodity
    devices, the aggregate IO and network capacity is higher than that provided by
    dedicated storage arrays in which smaller numbers of larger disks are provided
    by even smaller numbers of processors. Furthermore, adding new servers to Hadoop
    adds storage, IO, CPU, and network capacity all at once, whereas adding disks
    to a storage array might simply exacerbate a network or CPU bottleneck within
    the array.

    *   Reliability: Data in Hadoop is stored redundantly in multiple servers and
    can be distributed across multiple computer racks. Failure of a server does not
    result in a loss of data; in fact, a Hadoop job will continue even if a server
    fails—the processing simply switches to another server.

    *   A scalable processing model: MapReduce represents a widely applicable and
    scalable distributed processing model. While MapReduce is not the most efficient
    implementation for all algorithms, it is capable of brute-forcing acceptable performance
    for almost all.

    *   Schema on read: Data can be loaded into Hadoop without having to be converted
    to a highly structured normalized format. This makes it easy for Hadoop to quickly
    ingest data from various forms. The imposition of structure can be delayed until
    the data is accessed; this is sometimes referred to as schema on read, as opposed
    to the schema on write mode of relational data warehouses.


    ### Hadoop’s Architecture


    Hadoop’s architecture roughly parallels that of Google. Google File System capabilities
    are provided by the Hadoop Distributed File System (HDFS), which allows all the
    disk storage in the cluster to be accessed using familiar file system idioms.


    There are currently two major iterations of Hadoop architecture. Hadoop 2.0 layers
    on top of the 1.0 architecture, so let’s consider each in turn.


    In Hadoop 1.0, the majority of servers in a Hadoop cluster function both as data
    nodes and as task trackers, which is to say that each server supplies both data
    storage and processing capacity (CPU and memory).


    Specialized nodes within the Hadoop 1.0 architecture are also defined. The job
    tracker node coordinates the scheduling of jobs run on the Hadoop cluster, while
    the name node is a sort of directory that provides the mapping from blocks on
    data nodes to files on HDFS. Every piece of data will usually be replicated across
    three nodes, which can be located on separate server racks to avoid any single
    point of failure. Figure [2-6](#A978-1-4842-1329-2_2_Chapter.html#Fig6) illustrates
    the Hadoop 1.0 architecture.


    ![A978-1-4842-1329-2_2_Fig6_HTML.jpg](A978-1-4842-1329-2_2_Fig6_HTML.jpg)


    Figure 2-6.


    Hadoop 1.0 architecture


    The Hadoop 1.0 architecture is powerful and easy to understand, but it is limited
    to MapReduce workloads and it provides limited flexibility with regard to scheduling
    and resource allocation. In the Hadoop 2.0 architecture, YARN (Yet Another Resource
    Negotiator or, recursively, YARN Application Resource Negotiator) improves scalability
    and flexibility by splitting the roles of the Task Tracker into two processes.
    A Resource Manager controls access to the clusters resources (memory, CPU, etc.)
    while the Application Manager (one per job) controls task execution.


    YARN provides much more than just improved scalability. YARN treats traditional
    MapReduce as just one of the possible frameworks that can run on the cluster,
    allowing Hadoop to run tasks based on more complex processing models, some of
    which we’ll discuss in [Chapter 11](#A978-1-4842-1329-2_11_Chapter.html).


    Figure [2-7](#A978-1-4842-1329-2_2_Chapter.html#Fig7) illustrates the resource
    allocation and application execution aspects of YARN. For example, a Hadoop client
    submits an application execution request to the Resource Manager (1). The Resource
    Manager coordinates with the various Node Managers to determine which nodes have
    available resource (2). The Resource Manager then creates an Application Manager
    (3) on an available node. The Application Manager coordinates tasks that run in
    Containers on the selected nodes (4). The Containers control the amount of CPU
    and memory resource the application task may use.


    ![A978-1-4842-1329-2_2_Fig7_HTML.jpg](A978-1-4842-1329-2_2_Fig7_HTML.jpg)


    Figure 2-7.


    Hadoop 2.0 YARN architecture'
  trans: '

    ## Hadoop 的起源


    2004 年，Doug Cutting 和 Mike Cafarella 正在进行一个名为 Nutch 的开源项目，旨在构建一个基于 Apache Lucene
    的网络搜索引擎。Lucene 是一个基于 Java 的文本索引和搜索库。Nutch 团队渴望利用 Lucene 构建一个可扩展的网络搜索引擎，其明确目标是创建一个与
    Google 内部使用的专有技术相媲美的开源替代品。


    Nutch 的初始版本无法展示出索引整个互联网所需的可扩展性。当 Google 在 2003 年和 2004 年发布了关于 `GFS` 和 `MapReduce`
    的论文后，Nutch 团队很快意识到，这些论文为解决 Nutch 的可扩展性挑战提供了一个经过验证的架构基础。


    随着 Nutch 团队实现了他们自己的 `GFS` 和 `MapReduce` 等价系统，人们很快意识到这些技术适用于广泛的数据处理挑战，因此有必要成立一个专门的项目来推广这项技术。由此产生的项目被命名为
    Hadoop。Hadoop 于 2007 年开放下载，并于 2008 年成为 Apache 的顶级项目。


    许多开源项目都是从小处起步，缓慢成长。Hadoop 则恰恰相反。雅虎（Yahoo!）在 2006 年聘请了 Cutting 来改进 Hadoop，目标是让
    Hadoop 发展成熟，直至能够为雅虎的平台做出贡献。2008 年初，雅虎宣布其一个拥有超过 5PB 存储空间和 10,000 多个 CPU 核心的 Hadoop
    集群，正在生成用于解析雅虎网络搜索的索引。因此，在 IT 圈外几乎无人听闻 Hadoop 之前，它就已经在超大规模的环境中得到了验证。


    Hadoop 的另一个重要早期采用者是 Facebook。Facebook 于 2007 年开始试用 Hadoop，到 2008 年，其生产环境中已有一个使用
    2,500 个 CPU 核心的集群。Facebook 最初实施 Hadoop 是为了补充其基于 Oracle 的数据仓库。到 2012 年，Facebook
    的 Hadoop 集群磁盘容量已超过 100PB，它完全取代了 Oracle 作为数据仓库的解决方案，并为许多 Facebook 核心产品提供支持。


    许多财富 500 强公司都已采纳了 Hadoop——至少是在试点阶段。与所有新技术一样，预期会出现一些过度炒作以及随后的幻灭。然而，大多数积极寻求大数据解决方案的组织都在以某种形式使用
    Hadoop。


    Hadoop 事实上已成为海量非结构化数据存储和处理的解决方案，这一点可以从三大数据库厂商——微软、Oracle 和 IBM——所采取的立场中看出。到 2012
    年，这些巨头都已停止提供任何形式的 Hadoop 替代品，转而在其产品组合中提供 Hadoop。


    ## Hadoop 的力量


    Hadoop 为大数据提供了一种经济上具有吸引力的存储解决方案，同时也为分析处理提供了一种可扩展的处理模型。具体来说，它具备：


    *   一种经济的可扩展存储模型。随着数据量的增加，在线存储这些数据的成本也随之上升。因为 Hadoop 可以运行在采用通用硬盘的商用硬件上，所以每 TB
    的价格几乎低于任何其他技术。

    *   大规模的可扩展 `IO` 能力。由于 Hadoop 使用大量通用设备，其聚合 `IO` 和网络容量高于专用存储阵列所提供的能力，后者通常由数量更少、容量更大的磁盘和更少数量的处理器组成。此外，向
    Hadoop 添加新服务器会同时增加存储、`IO`、`CPU` 和网络容量，而向存储阵列添加磁盘则可能只是加剧阵列内部的网络或 `CPU` 瓶颈。

    *   可靠性：Hadoop 中的数据以冗余方式存储在多台服务器上，并且可以跨多个计算机机架分布。服务器故障不会导致数据丢失；事实上，即使某台服务器发生故障，Hadoop
    作业也会继续执行——处理过程会简单地切换到另一台服务器。

    *   一种可扩展的处理模型：`MapReduce` 代表了一种应用广泛且可扩展的分布式处理模型。虽然 `MapReduce` 并非所有算法的最高效实现，但它几乎能够以蛮力方式为所有算法提供可接受的性能。

    *   读时模式：数据可以在不转换为高度结构化范式格式的情况下加载到 Hadoop 中。这使得 Hadoop 能够轻松快速地摄入各种形式的数据。结构的施加可以延迟到访问数据时；这有时被称为读时模式，与关系型数据仓库的写时模式相对。


    ## Hadoop 的架构


    Hadoop 的架构大致与 Google 的架构相似。Google 文件系统（GFS）的功能由 Hadoop 分布式文件系统（`HDFS`）提供，它允许使用熟悉的文件系统习语来访问集群中的所有磁盘存储。


    目前 Hadoop 架构有两个主要迭代版本。Hadoop 2.0 建立在 1.0 架构之上，因此让我们依次考虑每一个。


    在 Hadoop 1.0 中，集群中的大多数服务器既充当数据节点，又充当任务追踪器，这意味着每台服务器既提供数据存储也提供处理能力（`CPU` 和内存）。


    Hadoop 1.0 架构中还定义了专用节点。作业追踪器节点负责协调在 Hadoop 集群上运行的作业调度，而名称节点则是一种目录，提供从数据节点上的数据块到
    `HDFS` 上文件的映射。每条数据通常会在三个节点上复制，这些节点可以位于不同的服务器机架上，以避免任何单点故障。图 2-6 展示了 Hadoop 1.0
    的架构。


    ![A978-1-4842-1329-2_2_Fig6_HTML.jpg](img/A978-1-4842-1329-2_2_Fig6_HTML.jpg)


    图 2-6. Hadoop 1.0 架构


    Hadoop 1.0 架构功能强大且易于理解，但它仅限于 `MapReduce` 工作负载，并且在调度和资源分配方面灵活性有限。在 Hadoop 2.0 架构中，`YARN`（Yet
    Another Resource Negotiator，或递归地称为 YARN Application Resource Negotiator）通过将任务追踪器的角色拆分为两个流程，提高了可扩展性和灵活性。资源管理器（Resource
    Manager）控制对集群资源（内存、`CPU` 等）的访问，而应用程序管理器（Application Manager）（每个作业一个）则控制任务的执行。


    `YARN` 提供的远不止是改进的可扩展性。`YARN` 将传统的 `MapReduce` 仅仅视为可以在集群上运行的众多可能框架之一，从而允许 Hadoop
    运行基于更复杂处理模型的任务，其中一些我们将在第 11 章中讨论。


    图 2-7 展示了 `YARN` 的资源分配和应用程序执行方面。例如，Hadoop 客户端向资源管理器提交应用程序执行请求 (1)。资源管理器与各个节点管理器（Node
    Managers）协调，以确定哪些节点有可用资源 (2)。然后，资源管理器在可用节点上创建一个应用程序管理器 (3)。应用程序管理器协调在选定节点上的容器（Containers）中运行的任务
    (4)。容器控制应用程序任务可以使用的 `CPU` 和内存量。


    ![A978-1-4842-1329-2_2_Fig7_HTML.jpg](img/A978-1-4842-1329-2_2_Fig7_HTML.jpg)


    图 2-7. Hadoop 2.0 `YARN` 架构

