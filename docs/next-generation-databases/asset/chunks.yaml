    ## 存储


    关系数据库模型的一个根本性创新在于逻辑数据表示与物理存储模型的分离。在关系模型出现之前，为了操作数据库，必须理解数据的物理存储方式。这种严格的分离使得数据的关系表示在一代计算机科学家中保持相对稳定，而底层的存储机制（如索引）已经历了重大创新。这种解耦最极端的例子可以在列式数据库领域看到。像
    Vertica 和 Sybase IQ 这样的列式数据库继续支持面向行的关系数据库模型，即使它们通过以列式格式存储数据而将数据“侧翻”过来。


    我们已经在第 6 章中探讨了列式系统的底层物理存储，因此这里不需要再研究那项特定的创新。然而，像 HBase 和 Cassandra 这样的现代非关系型数据库，其物理布局发生了根本性的转变。这就是从为随机访问优化的
    B 树存储结构，转向为顺序写入性能优化的**日志结构合并树**模式。


    ### 典型的关系型存储模型


    大多数关系型数据库都有类似的高级存储架构。


    图 10-9 展示了一个简化的关系数据库架构。数据库客户端通过向数据库进程发送 SQL 来与其交互 (1)。数据库进程最初从磁盘上的数据库文件中检索数据 (2)，并将数据存储在内存缓冲区中以优化后续访问
    (3)。如果数据被修改，则会在内存副本中进行更改 (4)。在事务提交时，数据库进程会写入事务日志 (5)，这确保了在系统故障的情况下事务不会丢失。内存中被修改的数据由一个“惰性”数据库写入进程异步写回到数据库文件。


    ![A978-1-4842-1329-2_10_Fig9_HTML.jpg](img/A978-1-4842-1329-2_10_Fig9_HTML.jpg)


    图 10-9.

    关系数据库存储架构


    图 10-9 所示的大部分架构也可以在非关系系统中找到。特别是，事务日志的等效组件几乎存在于任何事务型数据库系统中。


    另一种无处不在的 RDBMS 架构模式——至少在操作型数据库领域——是 B 树索引。B 树索引是一种允许对数据库系统中的元素进行随机访问的结构。


    图 10-10 展示了一个 B 树索引结构。B 树索引具有层次化的树状结构。树的顶部是头部块。此块包含指向任何给定键值范围对应的适当分支块的指针。分支块通常会指向更具体范围的适当叶块，或者对于较大的索引，指向另一个分支块。叶块包含键值列表以及匹配表数据的物理地址。


    ![A978-1-4842-1329-2_10_Fig10_HTML.jpg](img/A978-1-4842-1329-2_10_Fig10_HTML.jpg)


    图 10-10.

    B 树索引结构


    叶块包含指向前一个和后一个叶块的链接。这允许我们按升序或降序扫描索引，并使得可以使用索引来满足使用 `">"`、`"<"` 或 `"BETWEEN"` 运算符的范围查询。


    B 树索引提供可预测的性能，因为每个叶节点都处于相同的深度。索引中每增加一层，所能支持的键数量呈指数级增长，对于几乎所有的表，三次或四次 IO 就足以定位到任何行。


    然而，在更改数据时维护 B 树可能代价高昂。例如，考虑将键值为 `"NIVEN"` 的行插入到图 10-10 所示的表索引中。要插入该行，我们必须在 `L-O`
    块中添加一个新条目。如果叶块中没有空闲空间容纳新条目，则需要进行索引拆分。必须分配一个新块，并将现有块中的一半条目移动到新块中。此外，还需要在分支块中添加一个新条目（以指向新创建的叶块）。如果分支块中没有空闲空间，则分支块也必须进行拆分。


    这些索引拆分是昂贵的操作：必须分配新块，并将索引条目从一个块移动到另一个块，在拆分期间访问时间会受到影响。因此，尽管 B 树索引是一种高效的随机读取机制，但它对于写入密集型工作负载来说就不那么出色了。


    B 树结构固有的局限性，通过能够将磁盘写入主数据库文件的操作延迟这一点得到了一定程度的缓解：只要在提交时写入了事务日志条目，数据文件的修改（包括索引块）就可以在内存中执行并稍后写入磁盘。然而，在大量、密集的写入活动期间，空闲内存将被耗尽，吞吐量将受到数据库块磁盘
    IO 的限制。


    为了提供更好的写入密集型工作负载吞吐量，已经出现了一些对 B 树模式的重大改进：Couchbase 的 `HB+-Trie` 和 Tokutek 的 `fractal
    tree index` 都声称提供了更好的写入优化。


    然而，越来越多的数据库实现了一种从底层开始就为支持写入密集型工作负载而优化的存储架构：**日志结构合并树**。

    '
- fmt: '### Log-structured Merge Trees


    The log-structured merge (LSM) tree is a structure that seeks to optimize storage
    and support extremely high insert rates, while still supporting efficient random
    read access.


    The simplest possible LSM tree consists of two indexed “trees”:


    *   An in–memory tree, which is the recipient of all new record inserts. In Cassandra,
    this in-memory tree is referred to as the `MemTable` and in HBase as the `MemStore`.

    *   A number of on-disk trees, which represent copies of in-memory trees that
    have been flushed to disk. In Cassandra, this on-disk structure is referred to
    as the `SSTable` and in HBase as the `StoreTable`.


    The on-disk tree files are initially point-in-time copies of the in-memory tree,
    but are merged periodically to create larger consolidated stores. This merging
    process is called compaction.


    Note


    The log-structured merge tree is a very widely adopted architecture and is fundamental
    to BigTable, HBase, Cassandra, and other databases. However, naming conventions
    vary among implementations. For convenience, we use the Cassandra terminology
    by default, in which the in-memory tree is called a `MemTable` and the on-disk
    trees are called `SSTables`.


    The LSM architecture ensures that writes are always fast, since they operate at
    memory speed. The transfer to disk is also fast, since it occurs in append-only
    batches that allow for fast sequential writes. Reads occur either from the in-memory
    tree or from the disk tree; in either case, reads are facilitated by an index
    and are relatively swift.


    Of course, if the server failed while data was in the in-memory store, then it
    could be lost. For this reason database implementations of the LSM pattern include
    some form of transaction logging so that the changes can be recovered in the event
    of failure. This log file is roughly equivalent to a relational database transaction
    (redo) log. In Cassandra, it is called the `CommitLog` and in HBase, the Write-Ahead
    Log (`WAL`). These log entries can be discarded once the in-memory tree is flushed
    to disk.


    Figure 10-11 illustrates the log-structured merge tree architecture, using Cassandra
    terminology. Writes from database clients are first applied to the `CommitLog`
    (1) and then to the `MemTable` (2). Once the `MemTable` reaches a certain size,
    it is flushed to disk to create a new `SSTable` (3). Once the flush completes,
    `CommitLog` records may be purged (4). Periodically, multiple `SSTables` are merged
    (compacted) into larger `SSTables` (5).


    ![A978-1-4842-1329-2_10_Fig11_HTML.jpg](A978-1-4842-1329-2_10_Fig11_HTML.jpg)


    Figure 10-11.


    LSM architecture (Cassandra terminology)


    #### SSTables and Bloom Filters


    The on-disk portion of the LSM tree is an indexed structure. For instance, in
    Cassandra, each `SSTable` is associated with an index that contains all the rowkeys
    that exist in the `SSTable` and an offset to the location of the associated value
    within the file. However, there may be many `SSTables` on disk, and this creates
    a multiplier effect on index lookups, since we would theoretically have to examine
    every index for every `SSTable` in order to find our desired row.


    To avoid these multiple-index lookups, bloom filters are used to reduce the number
    of lookups that must be performed.


    Bloom filters are created by applying multiple hash functions to the key value.
    The outputs of the hash functions are used to set bits within the bloom filter
    structure. When looking up a key value within the bloom filter, we perform the
    same hash functions and see if the bits are set. If the bits are not set, then
    the search value must not be included within the table. However, if the bits are
    set, it may have been as a result of a value that happened to hash to the same
    values. The end result is an index that is typically reduced in size by 85 percent,
    but that provides false positives only 15 percent of the time.


    Bloom filters are compact enough to fit into memory and are very quick to navigate.
    However, to achieve this compression, bloom filters are “fuzzy” in the sense that
    they may return false positives. If you get a positive result from a bloom filter,
    it means only that the file may contain the value. However, the bloom filter will
    never incorrectly advise you that a value is not present. So if a bloom filter
    tells us that a key is not included in a specific `SSTable`, then we can safely
    omit that `SSTable` from our lookup.


    Figure 10-12 shows the read pattern for a log-structured merge tree using Cassandra
    terminology. A database request first reads from the `MemTable` (1). If the required
    value is not found, it will consult the bloom filters for the most recent `SSTable`
    (2). If the bloom filter indicates that no matching value is present, it will
    examine the next `SSTable` (3). If the bloom filter indicates a matching key value
    may be present in the `SSTable`, then the process will use the `SSTable` index
    (4) to search for the value within the `SSTable` (5). Once a matching value is
    found, no older `SSTables` need be examined.


    ![A978-1-4842-1329-2_10_Fig12_HTML.jpg](A978-1-4842-1329-2_10_Fig12_HTML.jpg)


    Figure 10-12.


    Log-structured merge tree reads (Cassandra terminology)


    #### Updates and Tombstones


    `SSTables` are immutable—that is, once the `MemTable` is flushed to disk and becomes
    an `SSTable`, no further modifications to the `SSTable` can be performed. If a
    value is modified repeatedly over a period of time, the modifications will build
    up across multiple `SSTables`. When retrieving a value, the system will read `SSTables`
    from the youngest to the oldest to find the most recent value of a column, or
    to build up a complete row. Therefore, to update a value we need only insert the
    new value, since the older values will not be examined when a newer version exists.


    Deletions are implemented by writing tombstone markers into the `MemTable`, which
    eventually propagates to `SSTables`. Once a tombstone marker for a row is encountered,
    the system stops examining older entries and reports “row not found” to the application.


    #### Compaction


    As `SSTables` multiply, read performance and storage degrade as the numbers of
    bloom filters, indexes, and obsolete values increase. So periodically the system
    will compact multiple `SSTables` into a single file. During compaction, rows that
    are fragmented across multiple `SSTables` are consolidated and deleted rows are
    removed.


    However, tombstones will remain in the system for a period of time to ensure that
    a delayed update to a row will not resurrect a row that should remain deleted.
    This can happen if a tombstone is removed while older updates to that row are
    still being propagated through the system. To avoid this possibility, default
    settings prevent tombstones from being deleted for over a week, while hinted handoffs
    (see Chapter 8) generally expire after only three hours. But in the event of these
    defaults being adjusted, or in the event of an unreasonably long network partition,
    it is conceivable that a row that has been deleted will be resurrected.'
