- fmt: '# JSON Databases


    ## 概述


    The emergence of key-value store databases such as Amazon’s Dynamo, together with
    the growing popularity of JSON as a data interchange format, set the stage for
    the emergence of the JSON document database.


    There is not a single specification or manifesto outlining the properties of a
    JSON-based document database. To be a JSON document database, all you need to
    do is store data in the JSON format.


    ### 存储层级


    In a JSON document database, the hierarchy of storage is typically as follows:


    *   A `document` is the basic unit of storage, corresponding approximately to
    a row in an RDBMS. A document comprises one or more key-value pairs, and may also
    contain nested documents and arrays. Arrays may also contain documents allowing
    for a complex hierarchical structure.

    *   A `collection` or data bucket is a set of documents sharing some common purpose;
    this is roughly equivalent to a relational table. The documents in a collection
    don’t have to be of the same type, though it is typical for documents in a collection
    to represent a common category of information.


    ### 数据建模


    While a document database could theoretically implement a third normal form schema
    exactly as it would be used within a relational system, document databases more
    typically model data in a smaller number of collections, with nested documents
    representing master-detail relationships.


    For instance, consider a database of movies and actors. In a relational data model,
    we would represent actors and films in separate tables, and create a `join` table
    that would indicate which actors appeared in which films, as shown in Figure 4-4.


    ![A978-1-4842-1329-2_4_Fig4_HTML.jpg](A978-1-4842-1329-2_4_Fig4_HTML.jpg)


    Figure 4-4. Simple Relational movie database


    In a JSON document database, we could create three collections with key-value
    pairs corresponding to the columns in a relational schema—but to do so would be
    unnatural. Document databases do not generally provide `join` operations, and
    programmers generally like to have the JSON structure map closely to the object
    structure of their code. So it would be more natural to represent this data as
    shown in Figure 4-5.


    ![A978-1-4842-1329-2_4_Fig5_HTML.jpg](A978-1-4842-1329-2_4_Fig5_HTML.jpg)


    Figure 4-5. JSON movie collection


    ## 文档数据库中的数据模型


    In Figure 4-5, “actors” are nested as an array within the “films” documents. This
    pattern is often referred to as document embedding. The design pattern has the
    advantage of allowing a film and all its actors to be retrieved in a single operation,
    and it avoids the need to perform joins within the application code.


    On the other hand, the approach results in “actors” being duplicated across multiple
    documents, and in a complex design this could lead to issues and possibly inconsistencies
    if any of the “actor” attributes need to be changed. The number of actors in a
    film is relatively small, but in other application scenarios, problems can also
    occur if the number of members in an embedded document increases without limit
    (because the size of a single JSON document is usually capped—`64MB` in `MongoDB`,
    for instance).


    For these reasons, a database designer might choose instead to link multiple documents
    using document identifiers, much in the way a relational database relates rows
    via foreign keys. For instance, in Figure 4-6, we embed an array of actor IDs
    into the “films” document, which can be used to locate the actors who appear in
    a film.


    ![A978-1-4842-1329-2_4_Fig6_HTML.jpg](A978-1-4842-1329-2_4_Fig6_HTML.jpg)


    Figure 4-6. Linking documents in a document database


    In Figure 4-7, we see another example of document linking. In this case, the design
    is in a relational style: a link document relates films to actors. Although this
    is somewhat an unnatural style for a document database, for some workloads it
    may provide the best balance between performance and maintainability.


    ![A978-1-4842-1329-2_4_Fig7_HTML.jpg](A978-1-4842-1329-2_4_Fig7_HTML.jpg)


    Figure 4-7. Document linking can resemble relational third normal form


    Data modeling in document databases is less deterministic than for relational
    databases: there is no equivalent of third normal form that defines a “correct”
    model. Furthermore, while modeling in a relational database is driven primarily
    by the nature of the data to be stored, in a document database the nature of the
    queries to be executed is far more significant.


    ## 早期的JSON数据库


    `CouchDB`, created by Damien Katz, was the first notable JSON-based database system.
    Damien Katz had worked on `Lotus Notes`, a collaboration system with strong document-handling
    capabilities. In 2005, he decided to create a database system more closely aligned
    with web development and object-oriented programming models. The result was `CouchDB`.


    Initially, `CouchDB` was written in `C++` and it stored `XML` documents. Around
    2007, a new architecture emerged that incorporated `JSON` as the primary storage
    format, a JavaScript command, and query interface and a core engine rewritten
    in the `Erlang` language.


    As it matured, `CouchDB` embraced other paradigms that had inspired key-value
    stores and `Hadoop`, including a JavaScript implementation of `MapReduce`, an
    `eventual consistency` and multiple versioning model, and a hash-based clustering/sharding
    model to allow `CouchDB` to scale across nodes.


    `CouchDB` became an `Apache` project in 2008 and was supported by `IBM`. In 2009,
    a commercial company `couch.io` (later `CouchOne`) was formed to maintain and
    promote the technology.


    ## MemBase 与 CouchBase


    When the interest in nonrelational databases exploded in 2009, `CouchDB` had already
    several years of active development and seemed well placed to benefit from the
    increasing buzz surrounding “`NoSQL`.”


    `Membase` was another nonrelational system experiencing significant uptake during
    this period. The `Membase` database provided a persistent variation on the extremely
    popular `Memcached` framework, which we discussed in Chapter 3. `Memcached` is
    a distributed read-only object cache that is commonly deployed in conjunction
    with `MySQL` to reduce database load. Objects are distributed across multiple
    `Memcached` nodes, and it can be located by a hash key lookup. If the data is
    in a `Memcached` server, a database read is avoided.


    `Membase` provided a `Memcached`-compatible solution in which data could also
    be modified and persisted to disk. `Membase` was therefore particularly attractive
    for those who had an existing investment in `Memcached` technology, offering the
    possibility that an application could be converted to `Membase` from `Memcached`/`MySQL`.
    `Membase` was initially well known as the database underlying `Zynga`’s incredibly
    popular `Farmville` online game.


    Meanwhile, despite `CouchDB`’s many technical achievements, the `CouchDB` database
    and the `CouchOne` company appeared to be struggling to establish a commercial
    niche; it lacked a viable scale-out architecture. In early 2011, a merger between
    `Membase` and `CouchOne` was announced. The resulting company was called `CouchBase`.
    `CouchBase` donated the existing `CouchDB` code to the `Apache` community, and
    it embarked on a new effort to merge the capabilities of `CouchDB` and `Membase`.
    In the resulting `Couchbase` server, the JSON engine from `CouchDB` was merged
    with the `Memcached`-compatible key-value layer from `Membase`.


    `Couchbase` inherited `CouchDB`’s `MapReduce` interface for creating queries and
    views, but `Couchbase 4.0` introduced a `SQL`-like layer for document access called
    `N1QL` (Non-first Normal Form Query Language). See Chapter 11 for more details
    on this and other `SQL`-like `NoSQL` interfaces.'
