  trans: '

    # Web 2.0 如何取胜


    最初的网络服务器提供对用 `HTML` 编写的超文本文档的访问。当时没有数据库系统参与，也无法进行任何业务或交易活动。


    早期想要提供某种形式用户交互的网站——例如 `Amazon.com`——使用了 `通用网关接口` (`CGI`)。`CGI` 允许 `HTTP` 请求调用脚本，而不是显示一个
    `HTML` 页面。早期的动态网页会调用用 `Perl` 语言编写的脚本，这些脚本会连接到数据库，并根据数据库内容动态生成 `HTML` 代码。这样，网站就能根据数据库中存储的数据展示目录，或者根据用户档案个性化页面。


    `CGI` 的方法逐渐被更优雅、更集成的框架（如 `Java` `J2EE` 和 `ASP.NET`）所取代，尽管大量基于 `PHP` 语言的网站仍然遵循
    `CGI` 模型。然而，无论使用何种框架，通用的模式都涉及一个网络应用服务器，用于显示从数据库内容动态生成的信息。


    在这种架构中，扩展 Web 层很容易。就像在客户端/服务器架构中，一个数据库可以对应多个客户端一样，你可以根据需要部署任意多的 Web 服务器与单个后端数据库通信。因此，Web
    服务器层的瓶颈只需通过添加更多 Web 服务器即可解决。


    然而，解决数据库层的瓶颈则不那么简单。尽管在二十一世纪初已有一些数据库集群解决方案，但通常难以通过这些方案实现线性扩展，并且没有一个方案曾展现出大型电子商务网站所需级别的扩展能力。


    在 Web 2.0 的早期阶段，解决数据库性能问题的方法就是购买更强大的数据库服务器。数据库服务器的能力逐年增强，存储服务器能为数据库提供巨大的 `IO`
    容量。因此，在最初的互联网泡沫期间，像 `EMC` 和 `Oracle` 这样的公司表现非常好，因为对于这些早期的 Web 2.0 公司来说，购买最强大的数据库服务器来支撑他们预期的极其乐观的增长曲线是合理的。


    有两个因素导致了这种向上扩展方案的放弃。首先，互联网泡沫破灭将财务现实带回考量，幸存下来的网络公司需要财务上谨慎的解决方案。企业希望一个能够从小规模起步并根据需要增长的方案。其次，随着
    Web 2.0 公司达到全球规模，他们发现即使是最庞大的集中式数据库服务器也无法满足需求。向上扩展的方式已经行不通了。


    此外，即使向上扩展方案能提供所需的容量，它仍然代表着一个潜在的单点故障，并且无法在全球市场提供均衡的响应时间。


    # 开源解决方案


    互联网泡沫破灭后，开源软件在 Web 2.0 运营中越来越受到重视。`Linux` 取代了专有的 `UNIX` 成为首选操作系统，`Apache` 网络服务器占据了主导地位。在此期间，`MySQL`
    超越 `Oracle`，成为网站开发的首选 `数据库管理系统` (`DBMS`)。


    `MySQL` 在当时，甚至现在，其可扩展性也远不如 `Oracle`；它通常在性能较低的硬件上运行，并且不太能利用多核处理器。然而，Web 开发者想出了一些技巧来让
    `MySQL` 发挥更大作用。


    首先，他们使用了一种叫做 `Memcached` 的技术来尽可能避免访问数据库。`Memcached` 是一个开源实用程序，提供分布式对象缓存。面向对象的语言可以将数据库信息的面向对象表示缓存在多台服务器上。通过从这些服务器而不是数据库读取，可以减少数据库上的负载。


    其次，Web 开发者利用了 `MySQL` 的复制功能。复制允许将一个数据库的更改复制到另一个数据库。读取请求可以被定向到这些副本数据库中的任何一个。然而，写入操作仍然必须发送到主数据库，因为主到主的复制是不可能的。但是，在典型的数据库应用——特别是
    Web 应用中——读取次数远远多于写入次数，因此读取复制策略是合理的。


    图 3-1 展示了从单一 Web 服务器和数据库服务器到多 Web 服务器、`Memcached` 服务器和只读数据库副本的转变。


    ![A978-1-4842-1329-2_3_Fig1_HTML.jpg](img/A978-1-4842-1329-2_3_Fig1_HTML.jpg)


    图 3-1.


    使用 `Memcached` 服务器和复制进行扩展


    `Memcached` 和读取复制显著提高了基于 `MySQL` 的 Web 应用程序的整体容量。然而，这两种技术都只能增加系统的读取能力。当系统在数据库写入活动上达到瓶颈时，就需要一个更激进的解决方案。


    # 分片


    分片允许将一个逻辑数据库分区到多个物理服务器上。


    在分片的应用中，最大的表被分区到多个数据库服务器上。每个分区被称为一个分片。这种分区基于一个 `键值`，例如用户 `ID`。在操作特定记录时，应用程序必须确定哪个分片将包含该数据，然后将
    `SQL` 发送到适当的服务器。分片是最大型网站采用的解决方案；`Facebook` 和 `Twitter` 是最著名的例子。在这两个网站上，特定于单个用户的数据都集中在特定节点上的
    `MySQL` 表中。


    图 3-2 展示了本章前面所示的 `Memcached` 和复制配置，并添加了分片。在这个例子中，有三个分片，为简单起见，分片按主键的首字母标记。因此，我们可以想象键为
    `GUY` 的行在分片 2 中，而键 `BOB` 则被分配到分片 1。在实践中，更可能对主键进行哈希处理，以确保键均匀分布到服务器。


    ![A978-1-4842-1329-2_3_Fig2_HTML.jpg](img/A978-1-4842-1329-2_3_Fig2_HTML.jpg)


    图 3-2.


    图 3-1 中的 `Memcached`/复制架构，添加了分片


    `Facebook` 使用的确切服务器数量一直在变化，且并非总是公开披露，但在 2011 年左右，他们确实透露其配置中使用了超过 4000 个 `MySQL`
    分片和 9000 台 `Memcached` 服务器。这种分片的 `MySQL` 配置支持每秒 14 亿次峰值读取、每秒 350 万行更改和每秒 810 万次物理
    `IO`。正如我们将看到的，分片涉及显著的操作复杂性和妥协，但它是一种经过验证的、可在大规模上实现数据处理的技术。


    分片概念简单，但实践中极其复杂。应用程序必须包含理解任何特定数据位置的逻辑，以及将请求路由到正确分片的逻辑。分片通常与快速增长相关联，因此这种路由需要是动态的。那些只能通过访问多个分片才能满足的请求，也需要复杂的编码，而在非分片的数据库上，单个
    `SQL` 语句可能就足够了。

