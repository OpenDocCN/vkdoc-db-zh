- fmt: '### Oracle 12c “in-Memory Database”


    `Oracle RDBMS version 12.1` introduced the “Oracle database in-memory” feature.
    This wording is potentially misleading, since the database as a whole is not held
    in memory. Rather, Oracle has implemented an `in-memory column store` to supplement
    its `disk-based row store`.


    Figure 7-9 illustrates the essential elements of the Oracle in-memory column store
    architecture. `OLTP` applications work with the database in the usual manner.
    Data is maintained in disk files (1), but cached in memory (2). An `OLTP` application
    primarily reads and writes from memory (3), but any committed transactions are
    written immediately to the transaction log on disk (4). When required or as configured,
    row data is loaded into a columnar representation for use by analytic applications
    (5). Any transactions that are committed once the data is loaded into columnar
    format are recorded in a journal (6), and analytic queries will consult the journal
    to determine if they need to read updated data from the row store (7) or possibly
    rebuild the columnar structure.


    ![A978-1-4842-1329-2_7_Fig9_HTML.jpg](A978-1-4842-1329-2_7_Fig9_HTML.jpg)


    Figure 7-9.


    Oracle 12c “in-memory” architecture


    ## Berkeley Analytics Data Stack and Spark


    If `SAP HANA` and `Oracle TimesTen` represent in-memory variations on the relational
    database theme, and if `Redis` represents an in-memory variation on the key-value
    store theme, then `Spark` represents an in-memory variation on the `Hadoop` theme.


    `Hadoop` became the de facto foundation for today’s Big Data stack by providing
    a flexible, scalable, and economic framework for processing massive amounts of
    structured, unstructured, and semi-structured data. The `Hadoop 1.0 MapReduce`
    algorithm represented a relatively simple but scalable approach to parallel processing.
    `MapReduce` is not the most elegant or sophisticated approach for all workloads,
    but it can be adapted to almost any problem, and it can usually scale through
    the brute-force application of many servers.


    However, it’s long been realized that `MapReduce`—particularly when working on
    disk-based storage—is not a sufficient solution for emerging Big Data analytic
    challenges. `MapReduce` excels at batch processing, but falls short in real-time
    scenarios. Even the simplest `MapReduce` task takes a significant ramp-up time,
    and for some machine-learning algorithms the execution time is simply inadequate.


    In 2011, the `AMPlab (Algorithms, Machines, and People)` was established at University
    of California, Berkeley, to attack the emerging challenges of advanced analytics
    and machine learning on Big Data. The resulting Berkeley Data Analysis Stack (`BDAS`)—and
    in particular the `Spark` processing engine—has shown rapid uptake.


    `BDAS` consists of a few core components:


    *   `Spark` is an in-memory, distributed, fault-tolerant processing framework.
    Implemented in the Java virtual-machine-compatible programming language `Scala`,
    it provides higher-level abstractions than `MapReduce` and thus improves developer
    productivity. As an in-memory solution, `Spark` excels at tasks that cause bottlenecks
    on disk IO in `MapReduce`. In particular, tasks that iterate repeatedly over a
    dataset—typical of many machine-learning workloads—show significant improvements.

    *   `Mesos` is a cluster management layer somewhat analogous to `Hadoop’s YARN`.
    However, `Mesos` is specifically intended to allow multiple frameworks, including
    `BDAS` and `Hadoop`, to share a cluster.

    *   `Tachyon` is a fault-tolerant, `Hadoop`-compatible, memory-centric distributed
    file system. The file system allows for disk storage of large datasets, but promotes
    aggressive caching to provide memory-level response times for frequently accessed
    data.


    Other `BDAS` components build on top of this core. `Spark SQL` provides a `Spark`-specific
    implementation of `SQL` for ad hoc queries, and there is also an active effort
    to allow `Hive`— the `SQL` implementation in the `Hadoop` stack—to generate `Spark`
    code.


    `Spark streaming` provides a stream-oriented processing paradigm using the `Spark`
    foundation, and `GraphX` delivers a graph computation engine build on `Spark`.
    `BDAS` also delivers machine-learning libraries at various levels of abstraction
    in the `MLBase` component.


    `Spark` is sometimes referred to as a successor to `Hadoop`, but in reality `Spark`
    and other elements of the `BDAS` were designed to work closely with `Hadoop HDFS`
    and `YARN`, and many `Spark` implementations use `HDFS` for persistent storage.
    Figure 7-10 shows how `Hadoop` elements such as `YARN` and `HDFS` interact with
    `Spark` and other elements of the `BDAS`.


    ![A978-1-4842-1329-2_7_Fig10_HTML.jpg](A978-1-4842-1329-2_7_Fig10_HTML.jpg)


    Figure 7-10.


    Spark, Hadoop, and the Berkeley Data Analytics Stack


    `Spark` is incorporated into many other data management stacks; it is a core part
    of the three major organizational distributions of `Hadoop` (`Cloudera`, `Hortonworks`,
    and `MapR`). `Spark` is also a component of the `Datastax` distribution of `Cassandra`.


    ### Spark Architecture


    In `Spark`, data is represented as `resilient distributed datasets (RDD)`. `RDDs`
    are collections of objects that can be partitioned across multiple nodes of the
    cluster. The partitioning and subsequent distribution of processing are handled
    automatically by the `Spark` framework.


    `RDDs` are described as immutable: `Spark` operations on `RDDs` return new `RDDs`,
    rather than modifying the original `RDD`. So, for instance, sorting an `RDD` creates
    a new `RDD` that contains the sorted data.


    The `Spark API` defines high-level methods that perform operations on `RDDs`.
    Operations such as joining, filtering, and aggregation, which would entail hundreds
    of lines of `Java` code in `MapReduce`, are expressed as simple method calls in
    `Spark`; the level of abstraction is similar to that found with `Hadoop’s Pig`
    scripting language.


    The data within an `RDD` can be simple types such as strings or any other `Java/Scala`
    object type. However, it’s common for the `RDD` to contain key-value pairs, and
    `Spark` provides specific data manipulation operations such as aggregation and
    joins that work only on key-value oriented `RDDs`.


    Under the hood, `Spark RDD` methods are implemented by `directed acyclic graph
    (DAG)` operations. `Directed acyclic graphs` provide a more sophisticated and
    efficient processing paradigm for data manipulation than `MapReduce`. We discuss
    `directed acyclic graph` operations in Chapter 11.


    Although `Spark` expects data to be processed in memory, `Spark` is capable of
    managing collections of data that won’t fit entirely into main memory. Depending
    on the configuration, `Spark` may page data to disk if the data volumes exceed
    memory capacity.


    `Spark` is not an `OLTP`-oriented system, so there is no need for the transaction
    log or journal that we’ve seen in other in-memory databases. However, `Spark`
    can read from or write to local or distributed file systems, and in particular
    it integrates with the standard `Hadoop` methods for working with `HDFS` or external
    data. `RDDs` may be represented on disk as text files or `JSON` documents.


    `Spark` can also access data held in any `JDBC`-compliant database (in practice,
    almost every relational system), as well as from `HBase` or `Cassandra`.


    Figure 7-11 illustrates some of the essential features of `Spark` processing.
    Data can be loaded into `resilient distributed datasets (RDD)` from external sources
    including relational databases (1) or a distributed file system such as `HDFS`
    (2). `Spark` provides high-level methods for operating on `RDDs` and which output
    new `RDDs`. These operations include joins (3) or aggregations (4). `Spark` data
    may be persisted to disk in a variety of formats (5).


    ![A978-1-4842-1329-2_7_Fig11_HTML.jpg](A978-1-4842-1329-2_7_Fig11_HTML.jpg)


    Figure 7-11.


    Elements of Spark processing'
