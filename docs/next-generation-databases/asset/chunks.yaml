    A possible convergence path for database languages


    ## Storage


    The structure of data on disk or other persistent media has an enormous effect
    on performance and the economics of the database. Chapter 7 discussed the need
    to be able to tier data in multiple storage layers (memory, SSD, disk, `HDFS`).
    We’ve also seen in Chapter 6 how the columnar representation of data can lead
    to significant improvements for analytical databases. Finally, we saw in Chapter
    10 how the `B-tree` indexing structures that dominated in the traditional `RDBMS`
    can be inferior for write-intensive workloads to the log-structured merge tree
    architectures of `Cassandra` and `HBase`.


    So, as with the other forks in our technology decision tree, there is no one correct
    storage layout that suits all workloads. Today, we generally have to pick the
    database that natively supports the storage layout that best suits our application.


    Of course, the underlying storage mechanism for a database is hidden from an application:
    the access methods to retrieve data must reflect the schematic representation
    of data, but the structure on disk is generally opaque to the application. Furthermore,
    we have already seen databases that can maintain multiple storage engines: `MySQL`
    has had a pluggable storage engine interface for over 10 years, and `MongoDB`
    has recently announced a pluggable storage architecture supporting a handful of
    alternative storage engines.


    We can also see in systems like `Hana` the ability to choose row-based or columnar
    storage for specific tables based on anticipated workload requirements.


    This pluggable—or at least “choose-able”—storage engine architecture seems to
    be the right direction for databases of the future. I believe these databases
    should allow tables or collections to be managed as columnar or row-based, supported
    by `B-trees` or log-structured merge trees, resident in memory or stored on disk.
    In some cases we may even wish to store data in a native graph format to support
    real-time graph traversal (although in most cases it will be sufficient to layer
    a graph compute engine over a less restrictive structure). Figure 12-5 illustrates
    a vision for pluggable storage engines.


    ![A978-1-4842-1329-2_12_Fig5_HTML.jpg](A978-1-4842-1329-2_12_Fig5_HTML.jpg)

    Figure 12-5.

    Convergence options for database storage


