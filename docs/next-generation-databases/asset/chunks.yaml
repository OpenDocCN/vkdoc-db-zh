    used to construct relations (tables). Rows are identified by key values and—at
    least in third normal form—all values will be locatable by the entire primary
    key and nothing else. Foreign keys define relationships between tables by referencing
    the primary keys in another table.


    The process of eliminating redundancy from a relational model is known as normalization.
