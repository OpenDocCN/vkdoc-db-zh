    # 3. Sharding, Amazon, and the Birth of NoSQL


    > Step 1 - Shard database. Step 2 - shoot yourself. —Twitter user @Dmitriy, 2009
    “Bob: So, how do I query the database? IT guy: It’s not a database. It’s a Key-Value
    store. . . . You write a distributed map-reduce function in Erlang. Bob: Did you
    just tell me to go **** myself? IT guy: I believe I did, Bob.” —Fault Tolerance
    cartoon, @jrecursive, 2009


    The last time we saw a major new brand of relational database was around 1995,
    with the first release of MySQL. In 1995, the World Wide Web in the United States
    was barely two years old—the Netscape browser had been released only the year
    before. In terms of computer systems, it was a different era.


    In the 10 years between 1995 and 2005, the Internet was transformed from a dial-up
    curiosity to arguably the most important communication system in our civilization,
    a foundation for international commerce, and soon to be a centerpiece of our social
    lives. Despite that, the database systems used in 2005 had the same names as those
    used in 1995\. Surveying the software landscape in 2005, you would be excused
    for thinking that there was nothing new under the database sun.


    Behind the scenes, however, the ability of the relational database to sustain
    the needs of web applications had been stretched to the breaking point. Out of
    this pressure arose a new breed of web-scale transactional database systems—what
    we now call NoSQL.


    ## Scaling Web 2.0


    The World Wide Web was initially conceived and implemented as a global collection
    of linked static documents. Indeed, the vast majority of the web still consists
    of read-only static content. Google developed many of the technologies introduced
    in the last chapter to provide an index and search capability across these documents.


    But to retailers and other businesses, the web promised to deliver much more than
    simply a place to store online catalogs and white papers. The idea of web-based
    retail outlets promised to revolutionize modern commerce. And although this concept
    of e-commerce resulted in the biggest boom and bust of our generation, the promise
    was eventually realized and today you can purchase virtually anything online.


    The World Wide Web of static pages is often referred to as Web 1.0, and the World
    Wide Web of dynamically created content with transactional capability is referred
    to as Web 2.0\. However, version 2.0 was not the result of a controlled architectural
    redevelopment; rather, it resulted from web developers scrambling to cope with
    ever-increasing demands for functionality, performance, and scale.'
  trans: '### Hadoop 生态系统


    `MapReduce`、`YARN` 和 `HDFS` 构成了 `Hadoop` 架构的基础。`HBase`、`Pig` 和 `Hive` 则建立在这些基础之上。`Hadoop`
    生态系统包括了一个不断扩展的工具和应用程序家族，它们要么构建在核心 `Hadoop` 之上，要么设计为与核心 `Hadoop` 协同工作。其中一些最重要的工具包括：


    *   `Flume`，一个用于将基于文件的数据加载到 `HDFS` 中的工具。

    *   `SQOOP`，一个用于与关系型数据库交换数据的工具，既可以将关系表导入到 `HDFS` 文件，也可以将 `HDFS` 文件导出到关系数据库。

    *   `Zookeeper`，它在集群内提供协调和同步服务。

    *   `Oozie`，一个工作流调度器，允许从底层作业（例如，在 `MapReduce` 应用程序之前运行一个 `Sqoop` 或 `Flume` 作业）构建复杂的工作流。

    *   `Hue`，一个简化 `Hadoop` 管理和开发任务的图形用户界面。


    此外，还有许多 `Apache` 和开源项目，虽然它们并非完全依赖于 `Hadoop`，但常常被集成到 `Hadoop` 实现中。这包括机器学习框架 `Mahout`、分布式流消息系统
    `Kafka` 以及其他许多重要的 `Apache` 项目。


    近年来，`Hadoop` 家族最重要的补充是 `Spark` 以及它所属的伯克利数据分析栈（`BDAS`）的其他组件。如果我们将 `Hadoop` 视为一个面向磁盘、用于运行
    `MapReduce` 风格程序的框架，那么 `Spark` 则代表了一个面向内存、用于运行类似工作负载的框架。我们将在第 7 章中更详细地探讨 `Spark`。


    ## 结论


    `Hadoop` 代表了自关系模型以来数据库架构最重要的变革之一。它提供了传统 `RDBMS` 无法企及的存储和处理经济性，并且提供了存储和处理非结构化及半结构化数据的能力，而这是
    `RDBMS` 没有真正解决方案的领域。比任何其他技术都更甚，`Hadoop` 理所当然地与大数据运动联系在一起。


    然而，虽然 `Hadoop` 提供了一个用于海量数据处理的框架，但它没有用于事务性和在线操作的框架。正如我们将在下一章看到的，前沿的网站不仅需要存储和批处理解决方案，还需要一个在线事务处理解决方案。这些需求催生了我们现在所称的
    `NoSQL`，而这将是下一章探讨的内容。


    ## 注释


    [`http://www.google.com/patents/US20100251629`](http://www.google.com/patents/US20100251629)
    [`http://research.google.com/archive/gfs.html`](http://research.google.com/archive/gfs.html)
    [`http://research.google.com/archive/mapreduce.html`](http://research.google.com/archive/mapreduce.html)
    [`http://research.google.com/archive/bigtable.html`](http://research.google.com/archive/bigtable.html)


    # 3. 分片、亚马逊与 NoSQL 的诞生


    > 第一步 - 分片数据库。第二步 - 搞死你自己。——推特用户 @Dmitriy，2009

    > “鲍勃：那么，我怎么查询数据库呢？

    > IT 技术员：这不是数据库。这是个键值存储……你得用 `Erlang` 写一个分布式的 `map-reduce` 函数。

    > 鲍勃：你刚才是不是让我滚蛋？

    > IT 技术员：我相信是的，鲍勃。”——Fault Tolerance 卡通，@jrecursive，2009


    我们上一次看到主要的、新型的关系数据库品牌是在 1995 年左右，即 `MySQL` 的首次发布。在 1995 年，美国的万维网才刚刚两岁——`Netscape`
    浏览器是在前一年才发布的。就计算机系统而言，那是一个不同的时代。


    在 1995 年到 2005 年这 10 年间，互联网从拨号上网的新奇事物转变为我们文明中最重要的通信系统之一，成为国际商业的基础，并很快成为我们社交生活的核心。尽管如此，2005
    年使用的数据库系统与 1995 年使用的名称相同。回顾 2005 年的软件格局，您可能会认为数据库领域并无新事，这情有可原。


    然而，在幕后，关系数据库支撑 Web 应用程序需求的能力已经被拉伸到了断裂点。在这种压力之下，诞生了一种新型的 Web 规模事务数据库系统——即我们现在所称的
    `NoSQL`。


    ## 扩展 Web 2.0


    万维网最初被构想并实现为一个链接的静态文档的全球集合。事实上，网络的绝大部分内容仍然是只读的静态内容。`Google` 开发了上一章介绍的许多技术，以便为这些文档提供索引和搜索能力。


    但对于零售商和其他企业来说，网络承诺提供的远不止是存储在线目录和白皮书的地方。基于网络的零售网点的概念有望彻底改变现代商业。尽管这种电子商务的概念导致了我们这代人最大的繁荣与萧条，但其承诺最终得以实现，今天你几乎可以在线购买任何东西。


    静态页面的万维网通常被称为 `Web 1.0`，而具有事务处理能力的动态生成内容的万维网则被称为 `Web 2.0`。然而，2.0 版本并非受控架构重建的结果；相反，它是由于网络开发者争相应对功能、性能和规模方面不断增长的需求而产生的。'
- fmt: '# How Web 2.0 was Won


    The first web servers provided accessed to hyperlink documents written in `HTML`.
    There were no database systems involved, and there was no ability to conduct business
    or any transactional activity.


    Early websites that wanted to provide some form of user interaction—`Amazon.com`,
    for instance—used the `Common Gateway Interface` (`CGI`). `CGI` allowed an `HTTP`
    request to invoke a script rather than display a `HTML` page. Early dynamic webpages
    would then invoke scripts written in the `Perl` language, which would connect
    to a database and generate `HTML` code on the fly based on database contents.
    In this way, a website could display a catalog based on data held within a database
    or could personalize a page based on a user’s profile.


    `CGI`-based approaches gave way to more elegant and cohesive frameworks such as
    `Java` `J2EE` and `ASP.NET`, though huge numbers of websites based on the `PHP`
    language still follow the `CGI` model. However, regardless of the framework employed,
    the common pattern entailed a web application server displaying information dynamically
    generated from database content.


    It’s easy to scale up the web layer in this architecture. Just as there can be
    many clients for every database in the client/server architecture, there can be
    as many web servers as you like communicating with a single back-end database.
    So a bottleneck in the web server layer can be fixed simply by adding more web
    servers.


    However, fixing bottlenecks at the database layer was not so simple. While there
    were a few database clustering solutions available at the beginning of the twenty-first
    century, it was generally difficult to achieve linear scalability with these solutions,
    and none had ever demonstrated scalability at the level required by the larger
    e-commerce sites.


    During the early stages of Web 2.0, the solution to database performance was simply
    to buy a more powerful database server. Database servers were getting more capable
    every year, and storage servers could provide databases with massive `IO` capacity.
    So during the initial Internet bubble, companies like `EMC` and `Oracle` did very
    well, because it made sense for these early Web 2.0 companies to buy the most
    powerful database possible and thereby sustain the absurdly optimistic growth
    curves they expected.


    Two factors led to the abandonment of this scale-up solution. First, the dot.com
    crash brought financial reality back into the equation, and the surviving web
    companies needed financially prudent solutions. Businesses wanted a solution that
    could start small and grow as required. Second, as Web 2.0 companies reached global
    scale, they found that even the most massive centralized database server could
    not meet their needs. Scaling up had run out of steam.


    Furthermore, even if the scale-up solution had delivered the capacity required,
    it still represented a potential single point of failure, and it could not provide
    equitable response time across a global market.


    # The Open-source Solution


    Following the dot.com crash, open-source software became increasingly valued within
    Web 2.0 operations. `Linux` supplanted proprietary `UNIX` as the operating system
    of choice, and the `Apache` web server became dominant. During this period, `MySQL`
    overtook `Oracle` as the `Database Management System` (`DBMS`) of choice for website
    development.


    `MySQL` was then and is still now far less scalable than `Oracle`; it generally
    runs on less powerful hardware and is less able to take advantage of multicore
    processors. However, Web developers came up with a couple of tricks to get `MySQL`
    to go further.


    First, they used a technology called `Memcached` to avoid database access as much
    is possible. `Memcached` is an open-source utility that provides a distributed
    object cache. Object-oriented languages could cache an object-oriented representation
    of database information across many servers. By reading from these servers rather
    than the database, the load on the database could be reduced.


    Second, web developers took advantage of `MySQL` replication. Replication allows
    changes to one database to be copied to another database. Read requests could
    be directed to any one of these replica databases. Write operations still had
    to go to the master database however, because master-to-master replication was
    not possible. However, in a typical database application—and particularly in web
    applications—reads significantly outnumber writes, so the read replication strategy
    makes sense.


    Figure [3-1](#A978-1-4842-1329-2_3_Chapter.html#Fig1) illustrates the transition
    from single web server and database server to multiple web servers, `Memcached`
    servers, and read-only database replicas.


    ![A978-1-4842-1329-2_3_Fig1_HTML.jpg](A978-1-4842-1329-2_3_Fig1_HTML.jpg)


    Figure 3-1.


    Scaling up with `Memcached` servers and replication


    `Memcached` and read replication increase the overall capacity of `MySQL`-based
    web applications dramatically. However, both these techniques can only increase
    the read capability of the system. When the system reaches a bottleneck on database
    write activity, a more dramatic solution is required.


    # Sharding


    Sharding allows a logical database to be partitioned across multiple physical
    servers.


    In a sharded application, the largest tables are partitioned across multiple database
    servers. Each partition is referred to as a shard. This partitioning is based
    on a `Key Value`, such as a user `ID`. When operating on a particular record,
    the application must determine which shard will contain the data and then send
    the `SQL` to the appropriate server. Sharding is a solution used at the largest
    websites; `Facebook` and `Twitter` are the most well-known examples. At both of
    these websites, data that is specific to an individual user is concentrated in
    `MySQL` tables on a specific node.


    Figure [3-2](#A978-1-4842-1329-2_3_Chapter.html#Fig2) illustrates the `Memcached`
    and replication configuration shown earlier in this chapter with sharding added.
    In this example, there are three shards, and for simplicity’s sake, the shards
    are labeled by first letter of the primary key. As a result, we might imagine
    that rows with the key `GUY` are in shard 2, while key `BOB` would be allocated
    to shard 1. In practice, it is more likely that the primary key would be hashed
    to ensure even distribution of keys to servers.


    ![A978-1-4842-1329-2_3_Fig2_HTML.jpg](A978-1-4842-1329-2_3_Fig2_HTML.jpg)


    Figure 3-2.


    `Memcached`/replication architecture from Figure [3-1](#A978-1-4842-1329-2_3_Chapter.html#Fig1),
    with sharding added


    The exact number of servers being used at `Facebook` is constantly changing and
    not always publicly disclosed, but in around 2011 they did reveal that they were
    using more than 4,000 shards of `MySQL` and 9,000 `Memcached` servers in their
    configuration. This sharded `MySQL` configuration supported 1.4 billion peak reads
    per second, 3.5 million row changes per second, and 8.1 million physical `IO`s
    per second. As we will see, sharding involves significant operational complexities
    and compromises, but it is a proven technique for achieving data processing on
    a massive scale.


    Sharding is simple in concept but incredibly complex in practice. The application
    must contain logic that understands the location of any particular piece of data
    and the logic to route requests to the correct shard. Sharding is usually associated
    with rapid growth, so this routing needs to be dynamic. Requests that can only
    be satisfied by accessing more than one shard thus need complex coding as well,
    whereas on a nonsharded database a single `SQL` statement might suffice.'
