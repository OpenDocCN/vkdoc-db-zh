- fmt: '### Death by a Thousand Shards


    Sharding—together with caching and replication—is arguably the only way to scale
    a relational database to massive web use. However, the operational costs of sharding
    are huge. Among the drawbacks of a sharding strategy are:


    *   Application complexity. It’s up to the application code to route `SQL` requests
    to the correct shard. In a statically sharded database, this would be hard enough;
    however, most massive websites are adding shards as they grow, which means that
    a dynamic routing layer must be implemented. This layer is often in addition to
    complex code being required to maintain `Memcached` object copies and to differentiate
    between the master database and read-only replicas.

    *   Crippled `SQL`. In a sharded database, it is not possible to issue a `SQL`
    statement that operates across shards. This usually means that `SQL` statements
    are limited to row-level access. Joins across shards cannot be implemented, nor
    can aggregate `GROUP BY` operations. This means, in effect, that only programmers
    can query the database as a whole.

    *   Loss of transactional integrity. `ACID` transactions against multiple shards
    are not possible—or at least not practical. It is possible in theory to implement
    transactions across databases in some database systems—those supporting `Two Phase
    Commit (2PC)`—but in practice this creates problems for conflict resolution, can
    create bottlenecks, has issues for `MySQL`, and is rarely implemented.

    *   Operational complexity. Load balancing across shards becomes extremely problematic.
    Adding new shards requires a complex rebalancing of data. Changing the database
    schema also requires a rolling operation across all the shards, resulting in transitory
    inconsistencies in the schema. In short, a sharded database entails a huge amount
    of operational effort and administrator skill.


    Relational database vendors—`Oracle`, in particular—tried to create a relational
    database implementation that could provide the scalability of a sharded database
    without the `ACID` and relational compromises or operational headaches. `Oracle`’s
    `Real Application Clusters (RAC)` is the most significant example of a transparently
    scalable, `ACID` compliant, relational cluster.


    In `Oracle RAC` databases, each database node works with data located on shared
    storage devices. This shared disk clustering is in contrast to the shared nothing
    model employed by other clustered databases, which are more suited to data warehousing
    workloads. (We’ll compare shared disk and shared nothing architectures in more
    detail in [Chapter 8](#A978-1-4842-1329-2_8_Chapter.html).)


    New database nodes in `RAC` can be added without any data rebalancing, and a sort
    of distributed memory cache is implemented across these database nodes. `Oracle
    RAC` showed a lot of promise, and indeed is widely implemented. However, it failed
    as an alternative to the `MySQL` sharded model, for three reasons: First, it was
    too expensive. Second, it failed to demonstrate the level of scalability required
    at the biggest websites. Third, it became apparent that no `ACID` compliant database
    could ever satisfy the needs of the world’s biggest websites. This last restriction
    was a sort of “laws of physics” constraint articulated in what has come to be
    known as `CAP` theorem.


    ### CAP Theorem


    In 2000, Eric Brewer outlined the “`CAP`” conjecture, which was later granted
    theorem status when a mathematical proof was provided. The `CAP` theorem says
    that in a distributed database system, you can have at most only two of Consistency,
    Availability, and Partition tolerance. Consistency means that every user of the
    database has an identical view of the data at any given instant. Availability
    means that in the event of a failure, the database remains operational. Partition
    tolerance means that the database can maintain operations in the event of the
    network’s failing between two segments of the distributed system.


    In 2000, the issue of partition tolerance was somewhat theoretical. Most systems
    resided in a single data center, and redundant network connectivity within that
    data center prevented any partition from ever occurring. If the data center failed,
    perhaps a failover data center would be bought online. However, there were almost
    no true multiple data center applications.


    But as web systems became global in scope and aspired to continual availability,
    partition tolerance became a real issue. Consider the distributed application
    shown in [Figure 3-3](#A978-1-4842-1329-2_3_Chapter.html#Fig3). In the event of
    the network partition shown, the system has two choices: either show each user
    a different view of the data, or shut down one of the partitions and disconnect
    one of the users.


    `![A978-1-4842-1329-2_3_Fig3_HTML.jpg](A978-1-4842-1329-2_3_Fig3_HTML.jpg)`


    `Figure 3-3.`


    `Network partition in a distributed database application`


    `Oracle`’s `RAC` solution, which of course supported the `ACID` transactional
    model, would choose consistency. In the event of a network partition—known in
    `Oracle` circles as the “split brain” scenario—one of the partitions would choose
    to shut down. However, in the context of a global social network application,
    or a worldwide e-commerce system, the desired solution is to maintain availability
    even if some consistency between users is sacrificed.


    ### Eventual Consistency


    `CAP` theorem provides a stark choice: if you want your system to be undisturbed
    by network partitions, you must sacrifice strict consistency between partitions.


    However, even without considerations of `CAP` theorem, `ACID` transactions were
    increasingly untenable in large-scale distributed websites. This relates more
    to performance than to availability. In any highly available database system,
    multiple copies of each data element must be maintained in order to allow the
    system to continue operating in the event of node failure. In a globally distributed
    system, it becomes increasingly desirable to distribute nodes around the world
    to reduce latency in various locations. To ensure strict consistency, though,
    it becomes necessary to ensure that a database change is propagated to multiple
    nodes synchronously and immediately. When one of those nodes is on the other side
    of the planet, this creates an unavoidable increase in latency.


    For banks, this sort of latency penalty is unavoidable. However, for many websites,
    including social networks and certain e-commerce operations, this worldwide synchronous
    consistency is unnecessary. It doesn’t matter if my friend in Australia can see
    my tweet a few seconds before my friend in America. As long as both friends can
    see the tweet eventually, I’m happy.


    This concept of eventual consistency has become a key characteristic of many `NoSQL`
    databases. The concept was most notably outlined by Werner Vogels, CTO of Amazon,
    and was implemented in Amazon’s `Dynamo` key-value store.'
