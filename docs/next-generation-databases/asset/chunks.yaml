    is not intended to serve as a tutorial or reference for any of the languages concerned.'
  trans: '## NoSQL 数据库中的二级索引实现


    尽管大多数非关系型数据库实现了本地二级索引，但具体实现方式差异显著。


    -   `Cassandra` 提供了本地二级索引。其在 `Cassandra 查询语言（CQL）` 中的实现使用了关系型数据库用户熟悉的语法。然而，在内部，其实现涉及每个节点上的列族，这些列族将索引值与基础列族中的行键关联起来。每个索引行以索引值为键，索引行中的宽列结构包含匹配的基础列族行的行键。其架构类似于图
    10-13 所示的 `COUNTRY` 索引示例。

    -   `MongoDB` 允许在集合内文档的指定元素上创建索引。`MongoDB` 索引是传统的 `B 树` 索引，类似于关系型系统中的索引，如图 10-10
    所示。

    -   `Riak` 是一个纯粹的键值存储。由于在 `Riak` 中与键关联的值对于数据库服务器是不透明的，`Riak` 没有可用于索引的纲要元素。然而，`Riak`
    允许为特定对象关联标签，并且每个节点上的本地索引允许快速检索匹配的标签。`Riak` 架构师现在建议使用本章前面讨论的内置 `Solr` 集成功能，而不是这种二级索引机制。

    -   `HBase` 不提供原生的二级索引能力。如果你的 `HBase` 实施需要二级索引，你必须实现某种形式的 DIY 二级索引。不过，`HBase`
    有一个协处理器特性，可以显著提高 DIY 索引的健壮性并降低程序员的开销。`HBase` 观察者协处理器的作用类似于 `RDBMS` 中的数据库触发器——它允许程序员指定当数据库中发生某些事件时运行的代码。程序员可以使用观察者协处理器来维护二级索引，从而确保索引能够自动且无误地维护。一些第三方提供了库来进一步协助需要在
    `HBase` 中实现二级索引的程序员。


    ## 结论


    在本章中，我们回顾了非关系型新一代数据库实现的一些数据模型模式。`NoSQL` 数据库常被称为无模式，但实际上，模式更常见的是灵活多变而非完全不存在。


    `HBase` 和 `Cassandra` 的数据模型基于谷歌的 `BigTable` 设计，该设计实现了一个稀疏的分布式多维映射结构。在面向 `BigTable`
    的表中，列名实际上更接近 `Java` 或 `.NET` 映射结构中的键，而非关系系统中的列。尽管 `Cassandra` 内部使用了面向 `BigTable`
    的数据结构，但 `Cassandra` 工程师在 `BigTable` 结构之上实现了一个更具关系风格的接口：`Cassandra 查询语言`。


    许多非关系型系统使用日志结构合并树架构，这种架构可以比传统的基于关系型 `B 树` 的结构承载更高的写入吞吐量。


    许多非关系型系统的初始实现——特别是那些基于 `BigTable` 或 `Dynamo` 的——仅支持主键访问。然而，基于其他键检索数据的能力几乎是一个普遍需求，因此大多数非关系型系统都实现了某种形式的二级索引。


    # 11. 语言与编程接口


    > 任何傻瓜都能写出计算机能理解的代码。优秀的程序员写出人类能理解的代码。 ——马丁·福勒

    > 对顾客而言，接口就是产品。 ——杰夫·拉斯金


    关系型数据库之所以能占据主导地位，一个关键因素是 `SQL` 语言作为查询和修改数据的机制得到了几乎普遍的采用。`SQL` 并非完美无缺，但它展现出了足够的灵活性，既能满足非程序员数据库用户的需求，也能满足专业数据库程序员的需求。程序员将
    `SQL` 嵌入到编程语言中，而非程序员则要么在查询工具中显式使用 `SQL`，要么在 `BI` 工具隐式使用 `SQL` 与数据库交互时（由后台自动处理）使用它。在
    `SQL` 出现之前，大多数 `IT` 部门都积压了大量的报告请求；`SQL` 使得业务用户可以“自助”满足这些请求。


    `SQL` 仍然是最重要的数据库语言。它不仅是 `RDBMS` 的通用语言，而且在 `NewSQL` 类型的新一代数据库系统中也被广泛采用。


    然而，尽管 `NoSQL` 的含义已被追溯修正为“不仅仅是 SQL”而非“绝对不要 SQL！”，但对于 `NoSQL` 类型的新一代数据库，通常并不提供 `SQL`
    支持。在本章中，我们将探讨在缺乏 `SQL` 的情况下如何与这些数据库交互，并观察 `SQL` 正如何日益回归到非关系型数据库的世界中。


    **注意**


    本章中的代码示例仅为提供数据库编程语言的概览¹——本章无意作为任何相关语言的教程或参考手册。'
- fmt: "## SQL\n\nSQL remains the most significant database programming language,\
    \ even within the scope of next-generation database systems. Hundreds of books\
    \ have been written on the topic of SQL (indeed, I’ve written a couple), and it\
    \ would be superfluous to provide a full review of the language here. However,\
    \ it is probably worth recapping the variations that exist within SQL implementations\
    \ today, as well as key ingredients of the SQL language.\n\nThe SQL language consists\
    \ of these major categories of statements:\n\n*   Data query language (DQL), represented\
    \ by the ubiquitous `SELECT` statement.\n*   Data manipulation language (DML),\
    \ which includes statements that modify data in the database, such as `UPDATE`,\
    \ `DELETE`, `INSERT`, and `MERGE`, together with transactional control statements\
    \ (`COMMIT`, `ROLLBACK`, `BEGIN TRANSACTION`) and—for the purposes of this discussion—data\
    \ control language (DCL) statements such as `GRANT`.\n*   Data definition language\
    \ (DDL), which includes statements that create or alter tables and other structures\
    \ (indexes, materialized views, etc.). DML also allows for the specification of\
    \ stored procedures and triggers. These statements are usually highly vendor specific,\
    \ since they incorporate support for proprietary programming languages (Oracle\
    \ PL/SQL, for instance) or for storage clauses that are unique to the database\
    \ in question.\n\nThe SQL language is the subject of several ANSI and ISO standard\
    \ specifications. Some of these standards are:\n\n*   SQL-89: The first major\
    \ standard to be widely adopted. This standard describes the core elements of\
    \ the SQL language as we know it today.\n*   SQL-92 (SQL2): Added the modern join\
    \ syntax, in which join conditions are fully qualified within the `FROM` clause,\
    \ and added a standard metadata interface that provides descriptions of objects\
    \ in the database and which is implemented by at least some vendors. SQL-92 introduced\
    \ the concept of an “entry-level” subset of the specification (which was very\
    \ similar to SQL-89).\n*   SQL:1999 (SQL3): An explosion on the moon propels the\
    \ moon into interstellar space. Whoops, sorry, that was Space: 1999. SQL:1999\
    \ was somewhat less interesting, introducing object-oriented relational database\
    \ features that almost nobody uses and a few minor language changes.\n*   SQL:2003:\
    \ Introduced analytic “window” functions—an important innovation for analytics—and\
    \ SQL/XML. It also finalized a specification for stored procedures.\n*   SQL:2006,\
    \ SQL:2008, SQL:2011: Miscellaneous refinements, such as `INSTEAD OF` triggers,\
    \ the `MERGE` statement, and temporal queries.\n\nIn my opinion, the various SQL\
    \ standards have become increasingly disconnected from real-world SQL language\
    \ implementations. It’s common to hear vendors describe their SQL support as “entry-level\
    \ SQL-92,” effectively claiming credit for adhering to the minimum level of a\
    \ 14-year-old specification.\n\nIn practice, you can expect an RDBMS to implement\
    \ everything in SQL-92 at least with respect to the `SELECT` statement and DML.\
    \ SQL:2003 windowing functions, which allow a calculation within a row to have\
    \ visibility into a “window” of adjacent rows, are widely implemented and are\
    \ probably the most significant single innovation introduced in the last 15 years\
    \ of the SQL language standards.\n\nDDL statements and stored procedure code will\
    \ generally not be compatible across databases. DDL statements such as `CREATE\
    \ TABLE` share a common syntax, but usually contain vendor-specific constructs\
    \ such as custom data types or proprietary storage clauses. While the ANSI stored\
    \ procedure syntax is implemented by DB2 and MySQL, Oracle and Microsoft SQL Server\
    \ implement a completely incompatible stored program language.\n\n## NoSQL APIs\n\
    \nDatabases that are described as NoSQL clearly have to provide a mechanism for\
    \ inserting, modifying, and retrieving data. Since most of these databases were\
    \ developed “by programmers for programmers,” they usually primarily provide low-level\
    \ APIs supported in a language such as Java.\n\n### Riak\n\nRiak is an open-source\
    \ implementation of the Amazon Dynamo model. It implements a pure key-value system:\
    \ objects in Riak are located through the object’s key and the object retrieved\
    \ by the key is a binary object whose contents are opaque to the database engine.\n\
    \nGiven the relatively simple interaction just described, we expect a fairly straightforward\
    \ API, and that is what we get. Let’s look at some Java code that inserts a value\
    \ into a Riak bucket:\n\n```java\n1. RiakClient myClient = RiakClient.newClient(myServer);\n\
    2. // Create the key, value and set the bucket\n3. String myKey = Long.toString(System.currentTimeMillis());\n\
    4. String myValue = myKey + \":\" + Thread.getAllStackTraces().toString();\n5.\
    \ Location myLocation = new Location(new Namespace(\"MyBucket\"), myKey);\n6.\
    \ StoreValue sv = new StoreValue.Builder(myValue).withLocation(myLocation)\n \
    \  .build();\n7. StoreValue.Response svResponse = myClient.execute(sv);\n8. System.out.println(\"\
    response=\"+svResponse);\n```\n\nIn lines 3 to 5, we define a key (set to the\
    \ current time in milliseconds), a value (a string representation of the current\
    \ stack trace), and the bucket (`\"MyBucket\"`) that will receive the value. Line\
    \ 6 prepares a `StoreValue` object—this object contains the key-value pair and\
    \ the bucket name that it will be associated with. We execute the `StoreValue`\
    \ in line 7, effectively adding the data to the database.\n\nThe `StoreValue`\
    \ object takes options that can control optional behaviors such as quorums. In\
    \ the example that follows, we specify that the write can complete as long as\
    \ at least one node completes the write IO (see Chapter 9 for a discussion of\
    \ quorums):\n\n```java\nsv = new StoreValue.Builder(Thread.getAllStackTraces()).\n\
    \   withLocation(myLocation).\n   withOption(StoreValue.Option.W,Quorum.oneQuorum()).build();\n\
    ```\n\nThis example also utilizes one of the cool features of the Riak API: if\
    \ we pass a Java object as our value, Riak will automatically convert it to a\
    \ JSON document.\n\nHere, we retrieve the data we just inserted. Note that we\
    \ use the same `Location` object (`MyLocation`) that we used for the insert:\n\
    \n```java\nFetchValue fv = new FetchValue.Builder(myLocation).build();\nFetchValue.Response\
    \ fvResp = myClient.execute(fv);\nString myFetchedData = fvResp.getValue(String.class);\n\
    System.out.println(\"value=\" + myFetchedData);\n```\n\nThe value returned is\
    \ a string containing a JSON representation of the stack trace object we inserted\
    \ earlier:\n\n```json\nvalue=\n{\"Thread[nioEventLoopGroup-2-8,10,main]\":\n[{\"\
    methodName\":\"poll0\",\"fileName\":null,\n\"lineNumber\":-2,\n\"className\":\"\
    sun.nio.ch.WindowsSelectorImpl$SubSelector\" ...\n```\n\nFor some applications,\
    \ this put/get programming model may be sufficient. However, there are significant\
    \ nuances to Riak programming that arise from the Dynamo consistency model. You\
    \ may remember from Chapters 8 and 9 that conflicting updates may result in siblings\
    \ that need to be resolved by the application. Riak provides interfaces you can\
    \ implement to automate the resolution of such conflicts.\n\nNext is a simplistic\
    \ conflict resolver class. This resolver will be invoked when siblings of type\
    \ `String` are detected. The class is passed a list of strings and returns the\
    \ “resolved” result. Any application code could be implemented here, but in my\
    \ example I’ve just returned the first string in the list.\n\n```java\npublic\
    \ class MyResolver implements ConflictResolver<String> {\n    public String resolve(List<String>\
    \ siblings) {\n        return (siblings.get(0) );\n    }\n}\n```\n\nThe conflict\
    \ resolver needs to be registered in order to become active:\n\n```java\nConflictResolverFactory\
    \ factory = ConflictResolverFactory.getInstance();\nfactory.registerConflictResolver(String.class,\
    \ new MyResolver());\n```"
  raw: '## SQL


    SQL remains the most significant database programming language, even within the
    scope of next-generation database systems. Hundreds of books have been written
    on the topic of SQL (indeed, I’ve written a couple), and it would be superfluous
    to provide a full review of the language here. However, it is probably worth recapping
    the variations that exist within SQL implementations today, as well as key ingredients
    of the SQL language.


    The SQL language consists of these major categories of statements:


    *   Data query language (DQL), represented by the ubiquitous SELECT statement.

    *   Data manipulation language (DML), which includes statements that modify data
    in the database, such as UPDATE, DELETE, INSERT, and MERGE, together with transactional
    control statements (COMMIT, ROLLBACK, BEGIN TRANSACTION) and—for the purposes
    of this discussion—data control language (DCL) statements such as GRANT.

    *   Data definition language (DDL), which includes statements that create or alter
    tables and other structures (indexes, materialized views, etc.). DML also allows
    for the specification of stored procedures and triggers. These statements are
    usually highly vendor specific, since they incorporate support for proprietary
    programming languages (Oracle PL/SQL, for instance) or for storage clauses that
    are unique to the database in question.


    The SQL language is the subject of several ANSI and ISO standard specifications.
    Some of these standards are:


    *   SQL-89: The first major standard to be widely adopted. This standard describes
    the core elements of the SQL language as we know it today.

    *   SQL-92 (SQL2): Added the modern join syntax, in which join conditions are
    fully qualified within the FROM clause, and added a standard metadata interface
    that provides descriptions of objects in the database and which is implemented
    by at least some vendors. SQL-92 introduced the concept of an “entry-level” subset
    of the specification (which was very similar to SQL-89).

    *   SQL:1999 (SQL3): An explosion on the moon propels the moon into interstellar
    space. Whoops, sorry, that was Space: 1999\. SQL:1999 was somewhat less interesting,
    introducing object-oriented relational database features that almost nobody uses
    and a few minor language changes.

    *   SQL:2003: Introduced analytic “window” functions—an important innovation for
    analytics—and SQL/XML. It also finalized a specification for stored procedures.

    *   SQL:2006, SQL:2008, SQL:2011: Miscellaneous refinements, such as INSTEAD OF
    triggers, the MERGE statement, and temporal queries.


    In my opinion, the various SQL standards have become increasingly disconnected
    from real-world SQL language implementations. It’s common to hear vendors describe
    their SQL support as “entry-level SQL-92,” effectively claiming credit for adhering
    to the minimum level of a 14-year-old specification.


    In practice, you can expect an RDBMS to implement everything in SQL-92 at least
    with respect to the SELECT statement and DML. SQL:2003 windowing functions, which
    allow a calculation within a row to have visibility into a “window” of adjacent
    rows, are widely implemented and are probably the most significant single innovation
    introduced in the last 15 years of the SQL language standards.


    DDL statements and stored procedure code will generally not be compatible across
    databases. DDL statements such as CREATE TABLE share a common syntax, but usually
    contain vendor-specific constructs such as custom data types or proprietary storage
    clauses. While the ANSI stored procedure syntax is implemented by DB2 and MySQL,
    Oracle and Microsoft SQL Server implement a completely incompatible stored program
    language.


    ## NoSQL APIs


    Databases that are described as NoSQL clearly have to provide a mechanism for
    inserting, modifying, and retrieving data. Since most of these databases were
    developed “by programmers for programmers,” they usually primarily provide low-level
    APIs supported in a language such as Java.


    ### Riak


    Riak is an open-source implementation of the Amazon Dynamo model. It implements
    a pure key-value system: objects in Riak are located through the object’s key
    and the object retrieved by the key is a binary object whose contents are opaque
    to the database engine.


    Given the relatively simple interaction just described, we expect a fairly straightforward
    API, and that is what we get. Let’s look at some Java code that inserts a value
    into a Riak bucket:


    `1\. RiakClient myClient = RiakClient.newClient(myServer);`


    `2\. // Create the key, value and set the bucket`


    `3\. String myKey = Long.toString(System.currentTimeMillis());`


    `4\. String myValue = myKey + ":" + Thread.getAllStackTraces().toString();`


    `5\. Location myLocation = new Location(new Namespace("MyBucket"), myKey);`


    `6\. StoreValue sv =` `new` StoreValue.Builder(myValue).withLocation(myLocation)


    `.build();`


    `7\. StoreValue.Response svResponse = myClient.execute(sv);`


    `8\. System.out.println("response="+svResponse);`


    In lines 3 to 5, we define a key (set to the current time in milliseconds), a
    value (a string representation of the current stack trace), and the bucket (“MyBucket”)
    that will receive the value. Line 6 prepares a `StoreValue` object—this object
    contains the key-value pair and the bucket name that it will be associated with.
    We execute the `StoreValue` in line 7, effectively adding the data to the database.


    The `StoreValue` object takes options that can control optional behaviors such
    as quorums. In the example that follows, we specify that the write can complete
    as long as at least one node completes the write IO (see Chapter [9](#A978-1-4842-1329-2_9_Chapter.html)
    for a discussion of quorums):


    `sv =` `new` StoreValue.Builder(Thread.getAllStackTraces()).


    `withLocation(myLocation).`


    `withOption(StoreValue.Option.W,Quorum.oneQuorum()).build();`


    This example also utilizes one of the cool features of the Riak API: if we pass
    a Java object as our value, Riak will automatically convert it to a JSON document.


    Here, we retrieve the data we just inserted. Note that we use the same `Location`
    object (MyLocation) that we used for the insert:


    `FetchValue fv =` `new` `FetchValue.Builder(myLocation).build();`


    `FetchValue.Response fvResp = myClient.execute(fv);`


    `String myFetchedData = fvResp.getValue(String.class);`


    `System.out.println("value=" + myFetchedData);`


    The value returned is a string containing a JSON representation of the stack trace
    object we inserted earlier:


    `value=`


    `{"Thread[nioEventLoopGroup-2-8,10,main]":`


    `[{"methodName":"poll0","fileName":null,`


    `"lineNumber":-2,`


    `"className":"sun.nio.ch.WindowsSelectorImpl$SubSelector" ...`


    For some applications, this put/get programming model may be sufficient. However,
    there are significant nuances to Riak programming that arise from the Dynamo consistency
    model. You may remember from [Chapters 8](#A978-1-4842-1329-2_8_Chapter.html)
    and [9](#A978-1-4842-1329-2_9_Chapter.html) that conflicting updates may result
    in siblings that need to be resolved by the application. Riak provides interfaces
    you can implement to automate the resolution of such conflicts.


    Next is a simplistic conflict resolver class. This resolver will be invoked when
    siblings of type `String` are detected. The class is passed a list of strings
    and returns the “resolved” result. Any application code could be implemented here,
    but in my example I’ve just returned the first string in the list.


    `public class` `MyResolver` `implements` `ConflictResolver<String> {`


    `public` `String resolve(List<String> siblings) {`


    `return` `(siblings.get(0) );`


    `}`


    `}`


    The conflict resolver needs to be registered in order to become active:


    `ConflictResolverFactory factory = ConflictResolverFactory.getInstance();`


    `factory.registerConflictResolver(String.class, new MyResolver());`'
  trans: "## SQL\n\n即使在下一代数据库系统的范围内，SQL 仍然是最重要的数据库编程语言。关于 SQL 主题的书籍已有数百本（实际上，我本人也写过几本），因此在这里对该语言进行全面回顾实属多余。不过，或许值得概述一下当今\
    \ SQL 实现中存在的各种变体，以及该语言的关键要素。\n\nSQL 语言主要包含以下几类语句：\n\n*   **数据查询语言（DQL）**，以无处不在的\
    \ `SELECT` 语句为代表。\n*   **数据操作语言（DML）**，包括修改数据库中数据的语句，例如 `UPDATE`、`DELETE`、`INSERT`\
    \ 和 `MERGE`，以及事务控制语句（`COMMIT`、`ROLLBACK`、`BEGIN TRANSACTION`），并且——为了本次讨论的目的——还包括数据控制语言（DCL）语句，如\
    \ `GRANT`。\n*   **数据定义语言（DDL）**，包括创建或修改表及其他结构（索引、物化视图等）的语句。DML 还允许指定存储过程和触发器。这些语句通常具有高度的供应商特定性，因为它们整合了对专有编程语言（例如\
    \ Oracle PL/SQL）或对特定数据库独有的存储子句的支持。\n\nSQL 语言是多个 ANSI 和 ISO 标准规范的主题。其中一些标准包括：\n\
    \n*   SQL-89：首个被广泛采用的主要标准。该标准描述了我们今天所知 SQL 语言的核心元素。\n*   SQL-92（SQL2）：增加了现代连接语法（连接条件在\
    \ `FROM` 子句中完整限定），并添加了标准元数据接口，用于提供数据库中对象的描述，该接口至少被部分供应商实现。SQL-92 引入了规范的“入门级”子集概念（该子集与\
    \ SQL-89 非常相似）。\n*   SQL:1999（SQL3）：一次月球爆炸将月球推入星际空间。哎呀，抱歉，那是《太空：1999》。SQL:1999\
    \ 则没那么有趣，它引入了几乎无人使用的面向对象关系数据库特性以及一些较小的语言变更。\n*   SQL:2003：引入了分析性“窗口”函数（对分析而言是一项重要创新）以及\
    \ SQL/XML。它还最终确定了存储过程的规范。\n*   SQL:2006、SQL:2008、SQL:2011：各种杂项改进，例如 `INSTEAD OF`\
    \ 触发器、`MERGE` 语句以及时态查询。\n\n在我看来，各种 SQL 标准与现实世界中的 SQL 语言实现已日益脱节。常听到供应商将其 SQL 支持描述为“符合入门级\
    \ SQL-92”，这实际上是声称自己遵循了一个 14 年前规范的最低要求。\n\n实际上，你可以预期一个 RDBMS 至少会实现 SQL-92 中关于 `SELECT`\
    \ 语句和 DML 的所有内容。SQL:2003 的窗口函数（允许一行内的计算能“看到”相邻行的一个“窗口”）已被广泛实现，这可能是过去 15 年 SQL\
    \ 语言标准中最重大的单一创新。\n\nDDL 语句和存储过程代码通常在不同数据库之间不兼容。像 `CREATE TABLE` 这样的 DDL 语句共享通用语法，但通常包含供应商特定的构造，例如自定义数据类型或专有存储子句。虽然\
    \ ANSI 存储过程语法被 DB2 和 MySQL 实现，但 Oracle 和 Microsoft SQL Server 实现的是完全不兼容的存储程序语言。\n\
    \n## NoSQL API\n\n被描述为 NoSQL 的数据库显然必须提供一种插入、修改和检索数据的机制。由于这些数据库大多是由程序员为程序员开发的，它们通常主要提供\
    \ Java 等语言支持的低级 API。\n\n### Riak\n\nRiak 是 Amazon Dynamo 模型的开源实现。它实现了一个纯粹的键值系统：Riak\
    \ 中的对象通过其键来定位，通过键检索到的对象是一个二进制对象，其内容对数据库引擎是不透明的。\n\n考虑到上述相对简单的交互方式，我们期望有一个相当直接的\
    \ API，而这正是我们得到的。让我们看一段向 Riak 桶中插入值的 Java 代码：\n\n```java\n1. RiakClient myClient\
    \ = RiakClient.newClient(myServer);\n2. // 创建键、值并设置桶\n3. String myKey = Long.toString(System.currentTimeMillis());\n\
    4. String myValue = myKey + \":\" + Thread.getAllStackTraces().toString();\n5.\
    \ Location myLocation = new Location(new Namespace(\"MyBucket\"), myKey);\n6.\
    \ StoreValue sv = new StoreValue.Builder(myValue).withLocation(myLocation)\n \
    \  .build();\n7. StoreValue.Response svResponse = myClient.execute(sv);\n8. System.out.println(\"\
    response=\"+svResponse);\n```\n\n在第 3 到 5 行，我们定义了一个键（设置为当前时间的毫秒数）、一个值（当前线程栈跟踪的字符串表示）以及将接收该值的桶（`\"\
    MyBucket\"`）。第 6 行准备了一个 `StoreValue` 对象——该对象包含键值对及其将关联的桶名。我们在第 7 行执行 `StoreValue`，有效地将数据添加到数据库中。\n\
    \n`StoreValue` 对象接受可控制可选行为的选项，例如仲裁。在下面的例子中，我们指定只要至少有一个节点完成写入 IO，写入即可完成（关于仲裁的讨论见第\
    \ 9 章）：\n\n```java\nsv = new StoreValue.Builder(Thread.getAllStackTraces()).\n\
    \   withLocation(myLocation).\n   withOption(StoreValue.Option.W,Quorum.oneQuorum()).build();\n\
    ```\n\n此示例还利用了 Riak API 的一个很酷的特性：如果我们传递一个 Java 对象作为值，Riak 会自动将其转换为 JSON 文档。\n\n\
    这里，我们检索刚刚插入的数据。请注意，我们使用了与插入时相同的 `Location` 对象（`MyLocation`）：\n\n```java\nFetchValue\
    \ fv = new FetchValue.Builder(myLocation).build();\nFetchValue.Response fvResp\
    \ = myClient.execute(fv);\nString myFetchedData = fvResp.getValue(String.class);\n\
    System.out.println(\"value=\" + myFetchedData);\n```\n\n返回的值是一个字符串，包含我们之前插入的栈跟踪对象的\
    \ JSON 表示：\n\n```json\nvalue=\n{\"Thread[nioEventLoopGroup-2-8,10,main]\":\n[{\"\
    methodName\":\"poll0\",\"fileName\":null,\n\"lineNumber\":-2,\n\"className\":\"\
    sun.nio.ch.WindowsSelectorImpl$SubSelector\" ...\n```\n\n对于某些应用程序，这种 put/get 编程模型可能足够了。然而，Riak\
    \ 编程存在一些重要的细微差别，这些差别源于 Dynamo 一致性模型。你可能还记得第 8 章和第 9 章，冲突的更新可能会产生需要应用程序解决的兄弟版本。Riak\
    \ 提供了你可以实现的接口来自动化解决此类冲突。\n\n接下来是一个简化的冲突解决器类。当检测到类型为 `String` 的兄弟版本时，将调用此解决器。该类接收一个字符串列表并返回“已解决”的结果。此处可以实现任何应用程序代码，但在我的示例中，我只是返回了列表中的第一个字符串。\n\
    \n```java\npublic class MyResolver implements ConflictResolver<String> {\n   \
    \ public String resolve(List<String> siblings) {\n        return (siblings.get(0)\
    \ );\n    }\n}\n```\n\n冲突解决器需要注册才能生效：\n\n```java\nConflictResolverFactory factory\
    \ = ConflictResolverFactory.getInstance();\nfactory.registerConflictResolver(String.class,\
    \ new MyResolver());\n```"
- fmt: "## Riak\n\nNow, if we fetch a string value that includes siblings, the conflict\
    \ resolver will be invoked and will resolve them. In our case, we used almost\
    \ the simplest object type—string—and used trivial resolution logic: in a production\
    \ application, the object types would likely be an application-defined complex\
    \ class, and the resolution might involve highly complex logic to merge the two\
    \ objects.\n\nAs well as resolving siblings, the Riak API allows for modifications\
    \ to complex data types to be handled. Application code need not provide a complete\
    \ copy of the new object to be inserted, but instead specify only a change vector\
    \ that is to be applied to an existing object. For instance, if an object were\
    \ a list of friends, we could add a new friend simply by specifying the new friend’s\
    \ name, without having to retrieve and reinsert all existing friends.\n\n### 定义更新值\n\
    \nBy extending the `UpdateValue` super class, we can define how an update value\
    \ is applied to a Riak object. In the example that follows, the `apply` method\
    \ defines that the update will simply be appended (after a “\\n” carriage return)\
    \ to the Riak object.\n\n```java\npublic class MyRiakUpdater extends UpdateValue.Update<String>\
    \ {\n\n    private final String updatedString;\n\n    public MyRiakUpdater(String\
    \ updatedString) {\n        this.updatedString = updatedString;\n    }\n\n   \
    \ public String apply(String original) {\n        return original + \"\\n\" +\
    \ updatedString;\n    }\n}\n```\n\n### 调用更新器\n\nTo invoke the updater, we create\
    \ a new object instance from the updater class we created earlier and apply it\
    \ to the original version using the `withUpdate` method.\n\n```java\nMyRiakUpdater\
    \ myUpdatedData = new MyRiakUpdater(newData);\n\nUpdateValue myUpdate = new UpdateValue.Builder(myLocation)\n\
    \    .withUpdate(myUpdatedData).build();\n\nUpdateValue.Response updateResponse\
    \ = myClient.execute(myUpdate);\n```\n\nThis code will apply the update to the\
    \ Riak object after first resolving siblings (providing we have registered an\
    \ appropriate conflict resolver).\n\n## HBase\n\nThe HBase API bears some resemblance\
    \ to the put/get pattern we saw in the Riak API. However, because HBase tables\
    \ have a wide column structure, some additional complexity is introduced.\n\n\
    ### 使用Shell命令\n\nHBase supports a simple shell that allows access to basic data\
    \ definition and manipulation commands. Here, we launch the HBase shell and issue\
    \ commands to create a table `ourfriends` with two column families: `info` and\
    \ `friends`:\n\n```shell\n$ hbase shell\nhbase(main):003:0> create 'ourfriends',\
    \ {NAME => 'info'}, {NAME => 'friends'}\n0 row(s) in 1.3400 seconds\n```\n\nEach\
    \ put command populates one cell within a row, so these four commands populate\
    \ columns in the row identified by rowkey ‘guy’:\n\n```shell\nhbase(main):005:0>\
    \ put 'ourfriends', 'guy','info:email','guy@gmail.com'\n0 row(s) in 0.0900 seconds\n\
    \nhbase(main):006:0> put 'ourfriends', 'guy','info:userid','9990'\n0 row(s) in\
    \ 0.0070 seconds\n\nhbase(main):007:0> put 'ourfriends', 'guy','friends:Jo','jo@gmail.com'\n\
    0 row(s) in 0.0050 seconds\n\nhbase(main):008:0> put 'ourfriends', 'guy','friends:John','john@gmail.com'\n\
    0 row(s) in 0.0040 seconds\n```\n\nThe `get` command pulls the values for the\
    \ specific rowkey, allowing us to see the cell values we just input:\n\n```shell\n\
    hbase(main):018:0> get 'ourfriends','guy'\nCOLUMN                      CELL\n\
    \ friends:Jo                 timestamp=1444123707299, value=jo@gmail.com\n friends:John\
    \               timestamp=1444123707324, value=john@gmail.com\n info:email   \
    \              timestamp=1444123707214, value=guy@gmail.com\n info:userid    \
    \            timestamp=1444123707274, value=9990\n4 row(s) in 0.0390 seconds\n\
    ```\n\nNote that this is a wide column structure, where the column names in the\
    \ column family `friends` represent the names of friends. This is the data structure\
    \ that was illustrated in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html), Figure\
    \ [10-5](#A978-1-4842-1329-2_10_Chapter.html#Fig5).\n\n### 连接HBase服务器\n\nThe shell\
    \ is suitable for simple experimentation and data validation, but most real work\
    \ in HBase is done within Java programs. Here, we see simple code to connect to\
    \ an HBase server from a Java program:\n\n```java\nConfiguration config = HBaseConfiguration.create();\n\
    config.set(\"hbase.zookeeper.quorum\", myServer);\nconfig.set(\"hbase.zookeeper.property.clientport\"\
    , \"2181\");\nHBaseAdmin.checkHBaseAvailable(config);\nConnection connection =\
    \ ConnectionFactory.createConnection(config);\n```\n\n### 获取数据\n\nFor column families\
    \ with a fixed column structure, such as `info` in our example, we can retrieve\
    \ the data fairly simply:\n\n```java\n1. Table myTable = connection.getTable(TableName.valueOf(\"\
    ourfriends\"));\n2. byte[] myRowKey = Bytes.toBytes(\"guy\");\n3. byte[] myColFamily\
    \ = Bytes.toBytes(\"info\");\n4. byte[] myColName = Bytes.toBytes(\"email\");\n\
    5. Get myGet = new Get(myRowKey);\n6. Result myResult = myTable.get(myGet);\n\
    7. byte[] myBytes = myResult.getValue(myColFamily, myColName);\n8. String email\
    \ = Bytes.toString(myBytes);\n9. System.out.println(\"Email address=\" + email);\n\
    ```\n\nLines 1 through 4 specify the table, rowkey, column family, and column\
    \ name to be retrieved. Lines 5 and 6 retrieve the row for the specified rowkey,\
    \ and line 7 extracts a cell value for the specified column family and column\
    \ name. Line 8 converts the value from a byte array to a string. This is one of\
    \ the less endearing features of the HBase API: you are constantly required to\
    \ convert data to and from HBase native byte arrays.\n\nFor dynamic column names,\
    \ we need to retrieve the names of the columns for each row before we can retrieve\
    \ the data. The `getFamilyMap` method returns a map structure from a result object\
    \ identifying the column names within a specific row:\n\n```java\nNavigableMap<byte[],\
    \ byte[]> myFamilyMap = myResult.getFamilyMap(myColFamily);\n```\n\nWe can then\
    \ iterate through the column names and use the standard `getValue` call to retrieve\
    \ them:\n\n```java\nfor (byte[] colNameBytes : myFamilyMap.keySet()) {\n    //\
    \ Get the name of the column in the column family\n    String colName = Bytes.toString(colNameBytes);\n\
    \    byte[] colValueBytes = myResult.getValue(myColFamily, colNameBytes);\n  \
    \  System.out.println(\"Column \" + colName + \"=\" + Bytes.toString(colValueBytes));\n\
    }\n```\n\n### 写入数据\n\nThe HBase `put` method is similar in form to the `get` method\
    \ and allows us to place a new column value into a cell. Remember as discussed\
    \ in Chapter [10](#A978-1-4842-1329-2_10_Chapter.html), HBase cells may contain\
    \ multiple versions of data, identified by timestamp. So the put method really\
    \ adds a new value rather than overwriting the existing value.\n\nHere, we add\
    \ a new friend:\n\n```java\nmyColFamily = Bytes.toBytes(\"friends\");\nbyte[]\
    \ myNewColName = Bytes.toBytes(\"paul\");\nbyte[] myNewColValue = Bytes.toBytes(\"\
    paul@fmail.com\");\n\nPut myPut = new Put(myRowKey);\nmyPut.addColumn(myColFamily,\
    \ myNewColName, myNewColValue);\nmyTable.put(myPut);\n```\n\nThe HBase API does\
    \ not need to include methods for sibling resolution as does Riak, since HBase\
    \ uses locking and strict consistency to prevent such siblings from ever being\
    \ created.\n\n### 其他功能\n\nThe HBase API includes additional methods for scanning\
    \ rowkey ranges, which can be useful when the rowkey includes some kind of natural\
    \ partitioning value, such as a customer ID, or where the rowkey indicates some\
    \ kind of temporal order. Also, you may recall from our discussion in Chapter\
    \ [10](#A978-1-4842-1329-2_10_Chapter.html) that HBase supports a coprocessor\
    \ architecture allowing code to be invoked when certain data manipulation operations\
    \ occur. This architecture provides a database trigger-like capability that allows\
    \ us to perform validation on input values, maintain secondary indexes, or maintain\
    \ derived values."
