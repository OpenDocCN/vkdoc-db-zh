- fmt: '### Apache Drill


    So far we have looked at SQL variants that are tightly coupled with their underlying
    technology. It’s true that technologies such as Hive can access data in HBase
    and Spark, as well as HDFS, but this speaks more to the integration of HDFS, HBase,
    and Spark than it does to some inherent heterogeneity of the Hive system.

    The Apache Drill framework aims to provide a SQL engine that can operate across
    multiple distributed data stores such as HDFS or Amazon S3, as well as NoSQL systems
    such as MongoDB and HBase. Drill’s architecture is based on Google’s Dremel system,
    which provides the foundation for the Google BigQuery product.

    Drill incorporates a distributed heterogeneous cost-based optimizer that can intelligently
    distribute data-access algorithms across multiple, disparate systems. This allows
    a SQL query to span Hadoop, MongoDB, Oracle, or other databases and—at least in
    theory—to do so in an efficient and optimal manner.

    Currently, Drill can query data from relational systems that have a JDBC or ODBC
    connector, from systems that are supported by Hive, from a variety of cloud-based
    distributed file systems (Amazon S3, Google Cloud Drive), and from MongoDB.


    Let’s look at the MongoDB support, since it allows us to see how Drill deals with
    nontabular data. Here, we use Drill to query our sample MongoDB collections.

    Simple queries are, of course, simple:

    ```

    0: jdbc:drill:zk=local> SELECT Title FROM films WHERE Rating=''G'' LIMIT 5;

    +--------------------+

    |       Title        |

    +--------------------+

    | ACE GOLDFINGER     |

    | AFFAIR PREJUDICE   |

    | AFRICAN EGG        |

    | ALAMO VIDEOTAPE    |

    | AMISTAD MIDSUMMER  |

    +--------------------+

    5 rows selected (1.365 seconds)

    ```


    We can drill into subdocuments using a notation that is similar to the N1QL array
    notation. So, here we retrieve data from the second document in the embedded actors
    array for the film West Lion using the array notation `Actors[2]:`

    ```

    0: jdbc:drill:zk=local> SELECT

    . . . . . . . . . . . >   `Actors[2].First name`, `Actors[2].Last name`

    . . . . . . . . . . . >   FROM films WHERE Title=''WEST LION'';

    +---------+-----------+

    | EXPR$0  |  EXPR$1   |

    +---------+-----------+

    | SEAN    | WILLIAMS  |

    +---------+-----------+

    ```


    The `FLATTEN` function returns one row for every document in an embedded array.
    It’s somewhat similar to the Hive `EXPLODE` function or the N1QL `UNNEST` clause.
    Note that each document is returned in JSON format; there doesn’t seem to be a
    way currently to schematize these results:

    ```

    0: jdbc:drill:zk=local> SELECT Title, FLATTEN(Actors)

    . . . . . . . . . . . >   FROM films WHERE Rating=''G'' LIMIT 5;

    +-----------------+---------------------------------------------------------

    |       Title     |                            EXPR$1

    +-----------------+---------------------------------------------------------

    | ACE GOLDFINGER  | {"First name":"BOB","Last name":"FAWCETT","actorId":19}

    | ACE GOLDFINGER  | {"First name":"MINNIE","Last name":"ZELLWEGER",

    | ACE GOLDFINGER  | {"First name":"SEAN","Last name":"GUINESS", "actorId":9

    | ACE GOLDFINGER  | {"First name":"CHRIS","Last name":"DEPP","actorId":160}

    | AFFAIR PREJUDICE| {"First name":"JODIE","Last name":"DEGENERES",

    +-----------------+---------------------------------------------------------

    5 rows selected (0.589 seconds)

    ```


    We can see that Drill has a basic ability to navigate complex JSON documents,
    and we can expect this capability to improve over time.

    Drill can also navigate wide column store structures in HBase. Let’s look at the
    data that we inserted into HBase earlier in this chapter, this time using Drill:

    ```

    0: jdbc:drill:zk=local>  SELECT * FROM friends;

    +---------+---------+------+

    | row_key | friends | info |

    +---------+---------+------+

    | [B@6fe2da0c | {"Jo":"am9AZ21haWwuY29t","John":"am9obkBnbWFpbC5jb20="} | {"email":"Z3V5QGdtYWlsLmNvbQ==","userid":"OTk5MA=="}
    |

    | [B@43be5d62 | {"John":"am9obkBnbWFpbC5jb20=","Guy":"Z3V5QGdtYWlsLmNvbQ==","Paul":"cGF1bEBnbWFpbC5jb20=","Ringo":"cmluZ29AZ21haWwuY29t"}
    | {"email":"am9AZ21haWwuY29t","userid":"OTk5MQ=="} |

    +---------+---------+------+

    2 rows selected (1.532 seconds)

    ```

    Not very friendly output! Initially, Drill returns HBase data without decoding
    the internal byte array structure and without flattening any of the maps that
    define our wide column family.

    However, we can use the `FLATTEN` function to extract one row for each column
    in our wide column family “friends”, `KVGEN` function to convert the map to columns,
    and the `CONVERT FROM` function to cast the byte arrays into Unicode characters:

    ```

    0: jdbc:drill:zk=local>

    WITH friend_details AS

    ( SELECT info, FLATTEN( KVGEN(friends)) AS friend_info FROM friends)

    SELECT CONVERT_FROM(friend_details.info.email,''UTF8'') AS email,

    CONVERT_FROM(friend_details.friend_info.`value`,''UTF8'')

    AS friend_email

    FROM friend_details;

    +----------------+------------------+

    |      email     |   friend_email   |

    +----------------+------------------+

    | guy@gmail.com  | jo@gmail.com     |

    | guy@gmail.com  | john@gmail.com   |

    | jo@gmail.com   | john@gmail.com   |

    | jo@gmail.com   | guy@gmail.com    |

    | jo@gmail.com   | paul@gmail.com   |

    | jo@gmail.com   | ringo@gmail.com  |

    +----------------+------------------+

    ```

    Drill shows an enormous amount of promise. A single SQL framework capable of navigating
    the variety of data structures presented by relational and nonrelational systems
    is just what we need to resolve the Tower of Babel problem presented by the vast
    array of languages and interfaces characterizing the next generation databases
    of today and the future.


    ### Other SQL on NoSQL


    There are a number of other notable SQL-on-NoSQL systems:

    * Presto is an open-source SQL engine similar in many respects to Drill that can
    query data in JDBC, Cassandra, Hive, Kafka, and other systems.

    * Many relational database vendors provide connectors that allow their SQL language
    to retrieve data from Hadoop or other systems. Examples include Oracle Big Data
    SQL, IBM BigSQL, and Terradata QueryGrid.

    * Apache Phoenix provides a SQL layer for HBase.

    * Dell Toad Data Point provides SQL access to a variety of nonrelational systems,
    including MongoDB, Cassandra, HBase, and DynamoDB. (Disclaimer: I lead the team
    at Dell that develops Toad.)


    ## Conclusion


    This chapter tried to give you a feel for the languages and APIs provided by next-generation
    database systems. In many cases, low-level programming APIs are all that is provided.
    However, the trend for the future seems clear: SQL is reasserting itself as the
    lingua franca of the database world. Virtually all new databases are becoming
    accessible by SQL, and many systems are adopting SQL-like interfaces even for
    low-level programming.

    It’s unlikely that SQL will again become the sole interface to databases of the
    future: the unique requirements of wide column systems and document databases
    suggest that non-SQL idioms will be required, although Cassandra CQL and CouchBase
    N1QL do show how a SQL-like language remains a useful abstraction for dealing
    with data that might not be in relational format. Nevertheless, it seems increasingly
    likely that most next-generation databases will eventually support some form of
    SQL access, even if only through an independent layer such as Drill.


    ## Note


    Code examples can be found at [`https://github.com/gharriso/NextGenDBSamples`](https://github.com/gharriso/NextGenDBSamples).


    # 12. Database of the Future


    > The human brain had a vast memory storage. It made us curious and very creative....
    And that brain did something very special. It invented an idea called “the future.”
    —David Suzuki Every revolution has its counterrevolution— that is a sign the revolution
    is for real. —C. Wright Mills'
  raw: '### Apache Drill


    So far we have looked at SQL variants that are tightly coupled with their underlying
    technology. It’s true that technologies such as Hive can access data in HBase
    and Spark, as well as HDFS, but this speaks more to the integration of HDFS, HBase,
    and Spark than it does to some inherent heterogeneity of the Hive system.


    The Apache Drill framework aims to provide a SQL engine that can operate across
    multiple distributed data stores such as HDFS or Amazon S3, as well as NoSQL systems
    such as MongoDB and HBase. Drill’s architecture is based on Google’s Dremel system,
    which provides the foundation for the Google BigQuery product.


    Drill incorporates a distributed heterogeneous cost-based optimizer that can intelligently
    distribute data-access algorithms across multiple, disparate systems. This allows
    a SQL query to span Hadoop, MongoDB, Oracle, or other databases and—at least in
    theory—to do so in an efficient and optimal manner.


    Currently, Drill can query data from relational systems that have a JDBC or ODBC
    connector, from systems that are supported by Hive, from a variety of cloud-based
    distributed file systems (Amazon S3, Google Cloud Drive), and from MongoDB.


    Let’s look at the MongoDB support, since it allows us to see how Drill deals with
    nontabular data. Here, we use Drill to query our sample MongoDB collections.


    Simple queries are, of course, simple:


    `0: jdbc:drill:zk=local>` `SELECT` `Title` `FROM` `films` `WHERE` `Rating=''G''`
    `LIMIT` `5;`


    `+--------------------+`


    `|       Title        |`


    `+--------------------+`


    `| ACE GOLDFINGER     |`


    `| AFFAIR PREJUDICE   |`


    `| AFRICAN EGG        |`


    `| ALAMO VIDEOTAPE    |`


    `| AMISTAD MIDSUMMER  |`


    `+--------------------+`


    `5 rows selected (1.365 seconds)`


    We can drill into subdocuments using a notation that is similar to the N1QL array
    notation. So, here we retrieve data from the second document in the embedded actors
    array for the film West Lion using the array notation `Actors[2]:`


    `0: jdbc:drill:zk=local>` `SELECT` `` Actors[2].`First name`, Actors[2].`Last
    name` ``


    `. . . . . . . . . . . >`   `FROM` `films` `WHERE` `Title=''WEST LION'';`


    `+---------+-----------+`


    `| EXPR$0  |  EXPR$1   |`


    `+---------+-----------+`


    `| SEAN    | WILLIAMS  |`


    `+---------+-----------+`


    The `FLATTEN` function returns one row for every document in an embedded array.
    It’s somewhat similar to the Hive `EXPLODE` function or the N1QL `UNNEST` clause.
    Note that each document is returned in JSON format; there doesn’t seem to be a
    way currently to schematize these results:


    `0: jdbc:drill:zk=local> SELECT Title, FLATTEN(Actors)`


    `. . . . . . . . . . . >   FROM films WHERE Rating=''G'' LIMIT 5;`


    `+-----------------+---------------------------------------------------------`


    `|       Title     |                            EXPR$1`


    `+-----------------+---------------------------------------------------------`


    `| ACE GOLDFINGER  | {"First name":"BOB","Last name":"FAWCETT","actorId":19}`


    `| ACE GOLDFINGER  | {"First name":"MINNIE","Last name":"ZELLWEGER",`


    `| ACE GOLDFINGER  | {"First name":"SEAN","Last name":"GUINESS", "actorId":9`


    `| ACE GOLDFINGER  | {"First name":"CHRIS","Last name":"DEPP","actorId":160}`


    `| AFFAIR PREJUDICE| {"First name":"JODIE","Last name":"DEGENERES",`


    `+-----------------+---------------------------------------------------------`


    `5 rows selected (0.589 seconds)`


    We can see that Drill has a basic ability to navigate complex JSON documents,
    and we can expect this capability to improve over time.


    Drill can also navigate wide column store structures in HBase. Let’s look at the
    data that we inserted into HBase earlier in this chapter, this time using Drill:


    `0: jdbc:drill:zk=local>`  `SELECT` `*` `FROM` `friends;`


    `+---------+---------+------+`


    `| row_key | friends | info |`


    `+---------+---------+------+`


    `| [B@6fe2da0c | {"Jo":"am9AZ21haWwuY29t","John":"am9obkBnbWFpbC5jb20="} | {"email":"Z3V5QGdtYWlsLmNvbQ==","userid":"OTk5MA=="}
    |`


    `| [B@43be5d62 | {"John":"am9obkBnbWFpbC5jb20=","Guy":"Z3V5QGdtYWlsLmNvbQ==","Paul":"cGF1bEBnbWFpbC5jb20=","Ringo":"cmluZ29AZ21haWwuY29t"}
    | {"email":"am9AZ21haWwuY29t","userid":"OTk5MQ=="} |`


    `+---------+---------+------+`


    `2 rows selected (1.532 seconds)`


    Not very friendly output! Initially, Drill returns HBase data without decoding
    the internal byte array structure and without flattening any of the maps that
    define our wide column family.


    However, we can use the `FLATTEN` function to extract one row for each column
    in our wide column family “friends”, `KVGEN` function to convert the map to columns,
    and the `CONVERT FROM` function to cast the byte arrays into Unicode characters:


    `0: jdbc:drill:zk=local>`


    `WITH` `friend_details` `AS`


    `(` `SELECT` `info,``FLATTEN` `(``KVGEN``(friends))``AS` `friend_info` `FROM`
    `friends)`


    `SELECT CONVERT` `_``FROM``(friend_details.info.email,''UTF8'')``AS` `email,`


    `CONVERT``_``FROM```(friend_details.friend_info.`value`,''UTF8'')``


    `AS` `friend_email`


    `FROM` `friend_details;`


    `+----------------+------------------+`


    `|     email      |   friend_email   |`


    `+----------------+------------------+`


    `| guy@gmail.com  | jo@gmail.com     |`


    `| guy@gmail.com  | john@gmail.com   |`


    `| jo@gmail.com   | john@gmail.com   |`


    `| jo@gmail.com   | guy@gmail.com    |`


    `| jo@gmail.com   | paul@gmail.com   |`


    `| jo@gmail.com   | ringo@gmail.com  |`


    `+----------------+------------------+`


    Drill shows an enormous amount of promise. A single SQL framework capable of navigating
