  trans: '## 结论


    预测磁盘在数据库系统中终结显然为时过早：磁盘在存储海量“冷数据”或“温数据”方面仍然提供最佳经济效益，在大数据时代，存储的经济性依然至关重要。然而，`固态硬盘`对于那些检索速度比长期存储成本更重要的数据集，则提供了更优的经济效益。所有重要的数据库系统都在适应`SSD`的独特物理特性。一些数据库从底层开始构建，以充分利用`SSD`的处理特性。


    随着内存价格下降，单台数据库服务器可容纳的内存容量增加，`内存架构`对于规模较小，或延迟与事务处理速度比大规模存储经济性更重要的数据库，变得愈发具有吸引力。当一个数据库无法装入单台服务器的内存时，`分布式内存系统`可能提供一个极具吸引力的高性能解决方案。


    我们已经看到`内存数据库`设计如何在各类数据库系统中兴起：关系型、键值型以及大数据型。混合设计的数量也在不断增加，例如 Oracle 的方案，试图将`内存`处理的优势与仅传统磁盘设备才能提供的存储经济性相结合。


    ## 注释


    一个架构时代的终结（是时候进行彻底重写了），`http://nms.csail.mit.edu/∼stavros/pubs/hstore.pdf`


    # 第二部分

    技术细节


    # 8. 分布式数据库模式


    > 将无法扮演的角色分配给队员的经理应受责备。——弗朗茨·舒伯特

    > 通信速度之快令人惊叹。同样真实的是，速度会加剧我们所知虚假信息的传播。——爱德华·R·默罗


    当应用程序需求超出数据库容量时，Web 应用程序的管理员传统上面临两种选择：通过提升单个服务器的性能进行纵向扩展，或通过增加更多服务器进行横向扩展。在关系数据库时代的大部分时间里，纵向扩展是更实际的选择。早期的关系数据库不提供集群选项，而单台服务器提供的
    CPU 和内存持续遵循摩尔定律呈指数级增长。因此，横向扩展既不实际也不必要。


    然而，随着数据库工作负载从防火墙后的客户端-服务器应用程序转向可能具有全球范围的 Web 应用程序，在单台服务器上支持工作负载和可用性要求变得越来越困难。此外，互联网应用程序常面临不可预测且大规模的工作负载增长：应用程序可能“突然爆红”，需求出现指数级增长。计算机硬件的经济甜点以及增长的需求日益鼓励采用服务器集群，而非单一、庞大的专有服务器。数据库的横向扩展解决方案变得势在必行。


    为了满足 Web 规模应用的需求，新一代分布式非关系型数据库应运而生。在本章中，我们将深入探讨这些分布式数据库系统的架构。


    ## 分布式关系数据库


    最初的数据库系统设计为在单台计算机上运行。事实上，在客户端-服务器革命之前，早期数据库应用程序的所有组件——包括所有应用程序代码——都驻留在单一系统上：大型机。


    在这种集中式模型中，所有程序代码都在服务器上运行，用户通过哑终端与应用程序代码通信（终端之所以“哑”，是因为它们不包含任何应用程序代码）。在客户端-服务器模型中，表示层和业务逻辑在工作站——通常是
    Windows PC——上实现，这些工作站与单一后端数据库服务器通信。在早期的互联网应用中，业务逻辑在一个或多个 Web 应用服务器上实现，而表示逻辑则在
    Web 浏览器和应用服务器之间共享，后者几乎总是与单一的数据库服务器通信。


    图 8-1 展示了这三种架构，显示了每种模式如何继续依赖单一的、庞大的数据库服务器。


    ![A978-1-4842-1329-2_8_Fig1_HTML.jpg](img/A978-1-4842-1329-2_8_Fig1_HTML.jpg)


    图 8-1. 大型机、客户端-服务器和早期 Web 架构都依赖单一的、庞大的数据库服务器


    ### 复制


    数据库复制最初被采用作为实现高可用性的一种手段。使用复制，数据库管理员可以配置一个备用数据库，以便在发生故障时接管主数据库。


    数据库复制通常利用大多数关系型数据库用于支持`ACID`事务的`事务日志`。我们在第 7 章`内存数据库`的背景下介绍了`事务日志`模式。当`ACID`兼容数据库中的事务提交时，事务记录会立即写入`事务日志`，以便在发生故障时得以保留。监控`事务日志`的复制进程可以将更改应用到备份数据库，从而创建一个副本。


    图 8-2 说明了基于日志的复制方法。数据库事务以异步“延迟”方式写入数据库文件(1)，但数据库事务在提交时立即写入`事务日志`(2)。复制进程监控`事务日志`，并在事务被写入时将其应用到只读的从属数据库(3)。复制通常是异步的，但在某些数据库中，提交可以延迟直到事务被复制到从属数据库。


    ![A978-1-4842-1329-2_8_Fig2_HTML.jpg](img/A978-1-4842-1329-2_8_Fig2_HTML.jpg)


    图 8-2. 基于日志的复制


    正如我们在第 3 章看到的，复制通常是将数据库负载分布到多台服务器的第一步。使用复制，读取负载可以以横向扩展的方式分布，尽管数据库事务仍然必须应用到主副本。'
- fmt: '### Shared Nothing and Shared Disk


    The replication pattern for distributing database workloads works well to distribute
    read activity across multiple servers, but it does not distribute transactional
    write loads, which still must be directed exclusively to the master server.


    Replication is also of limited value for distributing data warehousing workloads.
    An OLTP workload typically consists of large numbers of short-duration requests.
    However, in a data warehousing environment, the workload usually consists of smaller
    numbers of data-intensive queries. In high-end database servers, these massive
    queries are executed by multiple processes or threads, each of which can leverage
    a separate CPU core and take advantage of multiple IO channels.


    Parallelizing a query across multiple database servers requires a new approach.
    Data warehousing vendors provided a solution to this problem by implementing a
    shared-nothing clustered database architecture. Like so many concepts in the relational
    world, the shared-nothing idea was most notably outlined by Michael Stonebraker
    in the 1980s. A database server may be classified as:


    *   Shared-everything: In this case, every database process shares the same memory,
    CPU, and disk resources. Sharing memory implies that every process is on the same
    server and hence this architecture is a single-node database architecture.

    *   Shared-disk: In this case, database processes may exist on separate nodes
    in the cluster and have access to the CPU and memory of the server on which they
    reside. However, every process has equal access to disk devices, which are shared
    across all nodes of the cluster.

    *   Shared-nothing: In this case, each node in the cluster has access not only
    to its own memory and CPU but also to dedicated disk devices and its own subset
    of the database. We’ve seen several examples of shared-nothing architecture in
    this book already, including the sharded MySQL design in Chapter [3](#A978-1-4842-1329-2_3_Chapter.html)
    and the VoltDB partitioning scheme in Chapter [7](#A978-1-4842-1329-2_7_Chapter.html).


    The shared-nothing model became the basis for several early clustered database
    systems, such as Teradata. It provides an attractive model for data warehousing
    workloads because queries can easily be parallelized across the multiple nodes
    based on the data they wish to access. For a system that wishes to maximize read-centric
    workloads, it is significantly easier to implement. Databases implementing the
    shared-nothing model often refer to themselves as massively parallel processing
    (`MPP`) databases. Figure [8-3](#A978-1-4842-1329-2_8_Chapter.html#Fig3) illustrates
    the shared-nothing model.


    ![A978-1-4842-1329-2_8_Fig3_HTML.jpg](A978-1-4842-1329-2_8_Fig3_HTML.jpg)

    *Figure 8-3. Shared-nothing database architecture*


    The shared-nothing architecture tends to break down in transactional scenarios,
    because of the need to coordinate transactions that may touch data on multiple
    nodes. Since ACID transactions are “all or nothing,” it’s necessary for all nodes
    in the transaction to coordinate closely on transaction execution. This coordination,
    known as two-phase commit, is notoriously difficult to implement and may result
    in “in doubt” transactional outcomes and poor transactional performance.


    The other drawback of the shared-nothing architecture is that without careful
    partitioning, the cluster workload becomes unbalanced. Maintaining correct partitioning
    becomes a major operational activity. When nodes are added or removed from the
    cluster, expensive rebalancing is required.


    A shared-disk architecture theoretically allows for greater and more elastic scalability,
    and it removes the need for rebalancing operations. It also provides a more economical
    high-availability solution, since no node has exclusive responsibility for any
    particular set of data. In shared-nothing, a node failure results in a portion
    of the database being unavailable, while in shared-disk, the remaining nodes are
    able to take over responsibility for the failed node.


    The challenge for the shared-disk architecture is the need to coordinate cached
    data across nodes. Without an in-memory cache, performance for all operations
    will degrade to disk speed. But to maintain a consistent view of data across all
    nodes, each node needs to maintain a consistent cache. Maintaining this cache
    coherency puts a strain on the network between the nodes and is difficult to successfully
    implement.


    To date, the only surviving commercially successful shared-disk RDBMS is Oracle’s
    Real Application Clusters (`RAC`) cluster database. `RAC` is the basis for Oracle’s
    `Exadata` database machine and cloud database offerings. Figure [8-4](#A978-1-4842-1329-2_8_Chapter.html#Fig4)
    illustrates the shared-disk model.


    ![A978-1-4842-1329-2_8_Fig4_HTML.jpg](A978-1-4842-1329-2_8_Fig4_HTML.jpg)

    *Figure 8-4. Shared-disk database architecture*


    ## Nonrelational Distributed Databases


    Maintaining ACID transactional integrity across multiple nodes in a distributed
    relational database is a significant challenge. However, in nonrelational database
    systems, ACID compliance is often not provided. For nonrelational distributed
    databases, the following considerations become more significant:


    *   Balancing availability and consistency: As we saw in Chapter [3](#A978-1-4842-1329-2_3_Chapter.html),
    Brewer’s CAP theorem argues that a distributed database that aims to scale beyond
    a single local network must choose between availability and consistency in the
    event of a network partition. An ACID-compliant database is obliged to favor consistency
    over all other factors. However, a nonrelational database without the constraint
    of strict ACID compliance can strike a different balance.

    *   Hardware economics: Even small differences in the cost of individual servers
    multiply quickly when a system scales to thousands or hundreds of thousands of
    nodes. Therefore, an economical database architecture will better leverage commodity
    hardware so as to take advantage of the best price/performance ratios available.
    Furthermore, it may become necessary to be able to cope with disparities between
    server configurations, so that new hardware can be added to the database cluster
    without requiring all existing nodes to be upgraded to the latest hardware specification.

    *   Resilience: In a massive database cluster, nodes will fail from time to time.
    In the event of these failures, there can be no data loss, interruption to availability,
    or maybe even failure at the transaction level.


    There have been three broad categories of distributed database architecture adopted
    by next-generation databases. The three models are:


    *   Variations on traditional sharding architecture, in which data is segmented
    across nodes based on the value of a “shard key.”

    *   Variations on the `Hadoop HDFS/HBase` model, in which an “omniscient master”
    determines where data should be located in the cluster, based on load and other
    factors.

    *   The `Amazon Dynamo` consistent hashing model, in which data is distributed
    across nodes of the cluster based on predictable mathematical hashing of a key
    value.


    Replication may be inherent within each of these architectures in order to ensure
    that no data is lost in the event of a server failure, although the replication
    strategies vary. We look at examples of each of these approaches in the remainder
    of this chapter. We use `MongoDB` as an example of a sharding architecture, `HBase`
    as the example of an omniscient master, and `Cassandra` as an example of `Dynamo`-style
    consistent hashing.


    ## MongoDB Sharding and Replication


    `MongoDB` supports sharding to provide scale-out capabilities and replication
    for high availability. Although each can be implemented independently of the other,
    they are usually both present in a production scenario.'
  raw: '### Shared Nothing and Shared Disk


    The replication pattern for distributing database workloads works well to distribute
    read activity across multiple servers, but it does not distribute transactional
