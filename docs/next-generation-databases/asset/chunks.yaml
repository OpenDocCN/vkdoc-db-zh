  raw: '## Graph Database Internals


    Graph processing can be performed on databases irrespective of their internal
    storage format. The logical model of a graph database outlined at the beginning
    of the chapter can be implemented on almost any database system; indeed, relational
    systems can implement the logical relationships within a graph without compromise.
    However, as we discussed earlier, performance on relational systems—even with
    optimal indexing—degrades as the depth of the graph traversal increases. Enabling
    efficient real-time graph processing in practice requires a way to move through
    the graph structure without index lookups. This index-free navigation is referred
    to as index-free adjacency.


    For example, to implement a graph in a relational model such as we saw in Figure
    [5-2](#A978-1-4842-1329-2_5_Chapter.html#Fig2), a join table is used to navigate
    between two rows—possibly in the same table—that represent adjacent nodes. Indexes
    allow the logical key value of the adjacent row to be translated to a physical
    address within the database. This physical address can then be quickly accessed.
    In a typical implementation, three or four logical IO operations are required
    to traverse the B-Tree index, and a further lookup to retrieve the value. These
    IO operations may be satisfied in cache memory, but usually some physical IO is
    required.


    As we discussed earlier, index lookups are typically adequate for shallow traversals,
    but they contribute to performance degradation as the traversals become deeper.
    The exact implementation varies depending on the type of database, but the need
    to create an index to facilitate a graph traversal is common to all nongraph databases.


    In a native graph database utilizing index-free adjacency, each node knows the
    physical location of all adjacent nodes. There is, therefore, no need to use indexes
    to efficiently navigate the graph, because each node “points” to all adjacent
    nodes.


    Not surprisingly, native graph databases massively outperform alternative implementations
    for graph traversal operations. However, the architecture presents challenges
    for distributing the graph across multiple servers. While a node can, of course,
    point to an adjacent node located on another machine, the overhead of routing
    the traversal across multiple machines eliminates the advantages of the graph
    database model, because inter-server communication is far more time consuming
    than local access. For this reason, many pure graph databases like Neo4j do not
    currently support a distributed deployment—the graph database can run on a single
    server only.


    ## Graph Compute Engines


    Graph-only databases excel at graph processing, of course, but they are rarely
    optimal for all the workloads in a typical application. Conversely, many applications—even
    if their predominant workloads are satisfied by a nongraph database technology—sometimes
    need to be able to perform efficient graph traversals.


    Furthermore, as we discussed previously, the pure graph model has difficulties
    coping with massive distributed datasets, because it is inefficient to perform
    graph based traversals across multiple physical machines.


    Graph compute engines provide a solution for databases that want to merge graph
    processing with other data models and for graph processing that needs to work
    across massive distributed datasets. A graph compute engine implements efficient
    graph processing algorithms and exposes graph APIs, but it does not assume or
    require that the data be stored in the index free adjacency graph format we discussed
    previously; the underlying datasets may be held in a relational database, a NoSQL
    system, or Hadoop. Graph compute engines don’t always offer the efficient real-time
    graph traversal offered by pure graph databases; instead, they tend to excel at
    batch operations that process all or large parts of the graph.


    Significant graph compute engines include:


    *   Apache Giraph: A graph processing system designed to run over Hadoop data
    using MapReduce.

    *   GraphX: A graph processing system that is part of the Berkeley Data Analytic
    Stack (BDAS), which includes Spark (see [Chapter 7](#A978-1-4842-1329-2_7_Chapter.html)).
    It uses Spark as the foundation for graph processing just as Giraph uses MapReduce.

    *   Titan: A graph database that can be layered on top of Big Data storage engines,
    including Hbase and Cassandra. Datastax—the commercial vendor of Cassandra—acquired
    Auerlius, the commercial sponsor of Titan, in 2014.


    ## Conclusion


    Graph databases occupy a specific and important niche in database technology.
    Unlike advocates of key-value stores and document databases, the proponents of
    graph databases do not claim to be on a mission to replace the venerable RDBMS;
    rather, they correctly describe graph databases as an important alternative when
    the analysis of relationships between objects is of as much significance as the
    objects themselves.


    The logical model of a graph database is conceptually quite simple. Nodes (or
    “vertices”) are connected to each other by relationships (or “edges”). Both nodes
    and relationships may have properties—sets of name : value pairs.


    Languages such as SPARQL, Cypher, and Gremlin are optimized for graph traversal
    operations, offering a syntax that allows us to walk the graph without requiring
    the recursive joins necessitated by relational databases.


    Pure graph databases such as Neo4J store data in a format that is optimized for
    real-time graph processing, but that is not always suitable for other purposes.
    These databases store the data in a physical format that matches the logical relationships
    of the graph.


    Graph compute engines perform graph processing over data held in other formats,
    often in Hadoop but potentially in a relational format. A graph compute engine
    is typically optimized to perform batch processing over an entire graph, while
    a native graph database is optimized toward real-time graph processing.


    Modifying the physical organization of data to suit a particular processing workload
    is not unique to graph databases. As we will see in the next chapter, columnar
    databases turn the traditional physical organization of database storage on its
    side so as to optimize analytic workloads.


    # 6. Column Databases


    > I wish I could find a witty quote about column databases —Guy Harrison, Next
    Generation Databases


    Those of us raised in Western cultures have been conditioned to think of data
    as arranged in rows. The way data is presented in ledgers, tables, spreadsheets,
    and even in the left to right, top to bottom organization of European languages
    has programmed us to visualize data in row format. It’s not surprising, therefore,
    that the first digital files were created with each record represented as a row.
    But no matter how convenient and familiar this format may be, it is not always
    the best way to organize data physically.


    When the first digital files were created, the data for each record was kept together
    in a way we think of as “row formatted.” The first databases that attempted to
    implement the relational model were created during a period in which OLTP processing—essentially,
    record at a time processing—was the most important type of database workload.
    This sort of workload is primarily record oriented, and the row-oriented physical
    structure of early digital files provided good performance.


    However, as we progressed beyond OLTP processing into the realm of data warehousing
    and analytic workloads, row-oriented physical organization became less ideal.
    In a data warehouse you rarely want to process all the columns of a single row,
    but you often want to process the values of a single column across all rows. Column-oriented
    databases address this requirement by storing columns physically together on disk.'
  trans: '

    ## 图数据库内部原理


    图处理可以在各种数据库上执行，无论其内部存储格式如何。本章开头概述的图数据库逻辑模型几乎可以在任何数据库系统上实现；实际上，关系型系统可以在不妥协的情况下实现图中的逻辑关系。然而，正如我们之前讨论的，关系型系统上的性能——即使有最优索引——也会随着图遍历深度的增加而下降。要在实践中实现高效的实时图处理，需要一种能够无需索引查找即可遍历图结构的方式。这种无需索引的导航方式被称为
    `无索引邻接`。


    例如，要在关系模型（如图 5-2 所示）中实现一个图，需要使用一个连接表来在代表相邻节点的两行之间进行导航——这两行可能位于同一个表中。索引允许将相邻行的逻辑键值转换为数据库内的物理地址。然后可以快速访问此物理地址。在典型的实现中，遍历
    B-Tree 索引需要三到四次逻辑 IO 操作，以及进一步的查找以检索值。这些 IO 操作可能在缓存内存中得到满足，但通常需要一些物理 IO。


    正如我们之前讨论的，索引查找通常足以应对浅层遍历，但随着遍历深度增加，它们会导致性能下降。具体实现因数据库类型而异，但需要创建索引来促进图遍历是所有非图数据库的共同特点。


    在利用 `无索引邻接` 的原生图数据库中，每个节点都知道所有相邻节点的物理位置。因此，无需使用索引即可高效导航图，因为每个节点都“指向”所有相邻节点。


    毫不奇怪，对于图遍历操作，原生图数据库的性能远超其他实现方式。然而，这种架构在将图分布到多个服务器上时带来了挑战。虽然一个节点当然可以指向位于另一台机器上的相邻节点，但跨多台机器路由遍历的开销消除了图数据库模型的优势，因为服务器间通信远比本地访问耗时得多。因此，许多像
    `Neo4j` 这样的纯图数据库目前不支持分布式部署——图数据库只能在单台服务器上运行。


    ## 图计算引擎


    纯图数据库当然擅长图处理，但对于典型应用中的所有工作负载来说，它们很少是最优选择。相反，许多应用——即使其主要工作负载由非图数据库技术满足——有时也需要能够执行高效的图遍历。


    此外，正如我们之前讨论的，纯图模型难以处理大规模分布式数据集，因为跨多台物理机器执行基于图的遍历效率低下。


    图计算引擎为那些希望将图处理与其他数据模型合并的数据库，以及需要在大规模分布式数据集上进行图处理的场景提供了解决方案。图计算引擎实现了高效的图处理算法并提供了图
    API，但它并不假设或要求数据必须以我们之前讨论的 `无索引邻接` 图格式存储；底层数据集可以保存在关系数据库、NoSQL 系统或 Hadoop 中。图计算引擎并不总是提供纯图数据库所具备的高效实时图遍历；相反，它们往往擅长处理整个图或图大部分内容的批处理操作。


    重要的图计算引擎包括：


    *   `Apache Giraph`：一个设计用于在 Hadoop 数据上运行、使用 MapReduce 的图处理系统。

    *   `GraphX`：一个图处理系统，是伯克利数据分析栈的一部分，该栈包括 Spark（见第 7 章）。它使用 Spark 作为图处理的基础，就像 Giraph
    使用 MapReduce 一样。

    *   `Titan`：一个图数据库，可以构建在大数据存储引擎之上，包括 HBase 和 Cassandra。Cassandra 的商业供应商 Datastax
    于 2014 年收购了 Titan 的商业赞助商 Aurelius。


    ## 总结


    图数据库在数据库技术中占据了一个特定且重要的 niche。与键值存储和文档数据库的倡导者不同，图数据库的支持者并不声称要取代历史悠久的 RDBMS；相反，他们正确地将图数据库描述为一种重要的替代方案，当分析对象之间的关系与对象本身同等重要时。


    图数据库的逻辑模型在概念上相当简单。节点（或“顶点”）通过关系（或“边”）相互连接。节点和关系都可能具有属性——`名称:值` 对的集合。


    诸如 `SPARQL`、`Cypher` 和 `Gremlin` 等语言针对图遍历操作进行了优化，提供了一种语法，使我们能够在不需要关系型数据库所必需的递归连接的情况下遍历图。


    像 `Neo4j` 这样的纯图数据库以针对实时图处理优化的格式存储数据，但这种格式并不总是适合其他用途。这些数据库以匹配图逻辑关系的物理格式存储数据。


    图计算引擎对以其他格式保存的数据执行图处理，通常是在 Hadoop 中，但也可能以关系格式存储。图计算引擎通常针对对整个图执行批处理进行优化，而原生图数据库则针对实时图处理进行优化。


    修改数据的物理组织以适应特定处理工作负载并非图数据库独有。正如我们将在下一章看到的，列式数据库将传统的数据库存储物理组织方式进行了“侧转”，以优化分析工作负载。


    ## 6. 列数据库


    > 我真希望能找到一句关于列数据库的俏皮话 ——盖伊·哈里森，《下一代数据库》


    在西方文化中长大的我们，被训练成认为数据是按行排列的。数据在账簿、表格、电子表格中呈现的方式，甚至欧洲语言从左到右、从上到下的组织方式，都使我们习惯于以行格式可视化数据。因此，最早的数字文件将每条记录表示为一行，这并不奇怪。但无论这种格式多么方便和熟悉，它并不总是物理组织数据的最佳方式。


    当第一个数字文件被创建时，每条记录的数据以我们称之为“行格式”的方式存储在一起。首批尝试实现关系模型的数据库诞生于一个时期，当时 OLTP 处理——本质上是按记录处理——是最重要的数据库工作负载类型。这类工作负载主要是面向记录的，而早期数字文件的面向行的物理结构提供了良好的性能。


    然而，随着我们从 OLTP 处理进入数据仓库和分析工作负载领域，面向行的物理组织变得不那么理想。在数据仓库中，你很少想处理单行的所有列，但你经常想处理所有行中单列的值。面向列的数据库通过在磁盘上物理地将列存储在一起来满足这一要求。

