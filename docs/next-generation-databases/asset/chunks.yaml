- fmt: '## Conclusion: One Size Doesn’t Fit All


    The first database revolution arose as an inevitable consequence of the emergence
    of electronic digital computers. In some respect, the databases of the first wave
    were electronic analogs of pre-computer technologies such as punched cards and
    tabulating machines. Early attempts to add a layer of structure and consistency
    to these databases may have improved programmer efficiency and data consistency,
    but they left the data locked in systems to which only programmers held the keys.


    The second database revolution resulted from Edgar Codd’s realization that database
    systems would be well served if they were based on a solid, formal, and mathematical
    foundation; that the representation of data should be independent of the physical
    storage implementation; and that databases should support flexible query mechanisms
    that do not require sophisticated programming skills.


    The successful development of the modern relational database over such an extended
    time —more than 30 years of commercial dominance—represents a triumph of computer
    science and software engineering. Rarely has a software theoretical concept been
    so successfully and widely implemented as the relational database.


    The third database revolution is not based on a single architectural foundation.
    If anything, it rests on the proposition that a single database architecture cannot
    meet the challenges posed in our modern digital world. The existence of massive
    social networking applications with hundreds of millions of users and the emergence
    of Internet of Things (`IoT`) applications with potentially billions of machine
    inputs, strain the relational database—and particularly the `ACID` transaction
    model—to the breaking point. At the other end of the scale we have applications
    that must run on mobile and wearable devices with limited memory and computing
    power. And we are awash with data, much of which is of unpredictable structure
    for which rendering to relational form is untenable.


    The third wave of databases roughly corresponds to a third wave of computer applications.
    `IDC` and others often refer to this as “the third platform.” The first platform
    was the mainframe, which was supported by pre-relational database systems. The
    second platform, client-server and early web applications, was supported by relational
    databases. The third platform is characterized by applications that involve cloud
    deployment, mobile presence, social networking, and the Internet of Things. The
    third platform demands a third wave of database technologies that include but
    are not limited to relational systems. Figure [1-6](#A978-1-4842-1329-2_1_Chapter.html#Fig6)
    summarizes how the three platforms correspond to our three waves of database revolutions.


    ![A978-1-4842-1329-2_1_Fig6_HTML.jpg](A978-1-4842-1329-2_1_Fig6_HTML.jpg)

    *Figure 1-6. `IDC`’s “three platforms” model corresponds to three waves of database
    technology*


    It’s an exciting time to be working in the database industry. For a generation
    of software professionals (and most of my professional life), innovation in database
    technology occurred largely within the constraints of the `ACID`-compliant relational
    databases. Now that the hegemony of the `RDBMS` has been broken, we are free to
    design database systems whose only constraint is our imagination. It’s well known
    that failure drives innovation. Some of these new database system concepts might
    not survive the test of time; however, there seems little chance that a single
    model will dominate the immediate future as completely as had the relational model.
    Database professionals will need to choose the most appropriate technology for
    their circumstances with care; in many cases, relational technology will continue
    be the best fit—but not always.


    In the following chapters, we’ll look at each of the major categories of next-generation
    database systems. We’ll examine their ambitions, their architectures, and their
    ability to meet the challenges posed by modern application systems.


    ## Notes


    [`http://www.seas.upenn.edu/∼zives/03f/cis550/codd.pdf`](http://www.seas.upenn.edu/%7Ezives/03f/cis550/codd.pdf)

    William Kent, ["A Simple Guide to Five Normal Forms in Relational Database Theory,"](http://www.bkent.net/Doc/simple5.htm)
    1983.

    [`http://research.microsoft.com/en-us/um/people/gray/papers/theTransactionConcept.pdf`](http://research.microsoft.com/en-us/um/people/gray/papers/theTransactionConcept.pdf)

    [`https://www.cs.cmu.edu/∼clamen/OODBMS/Manifesto/`](https://www.cs.cmu.edu/%7Eclamen/OODBMS/Manifesto/)

    [`http://research.google.com/archive/gfs.html`](http://research.google.com/archive/gfs.html)

    [`http://research.google.com/archive/mapreduce.html`](http://research.google.com/archive/mapreduce.html)

    [`http://research.google.com/archive/bigtable.html`](http://research.google.com/archive/bigtable.html)

    [`http://queue.acm.org/detail.cfm?id=1466448`](http://queue.acm.org/detail.cfm?id=1466448)

    [`http://nms.csail.mit.edu/∼stavros/pubs/hstore.pdf`](http://nms.csail.mit.edu/%7Estavros/pubs/hstore.pdf)


    ## 2. Google, Big Data, and Hadoop


    > Information is the oil of the 21st century, and analytics is the combustion
    engine. —Peter Sondergaard, Gartner Research, 2011 Data creation is exploding.
    With all the selfies and useless files people refuse to delete on the cloud. .
    . . The world’s data storage capacity will be overtaken. . . . Data shortages,
    data rationing, data black markets . . . data-geddon! —Gavin Belson, HBOs Silicon
    Valley, 2015


    In the history of computing, nothing has raised the profile of data processing,
    storage, and analytics as much as the concept of Big Data. We have considered
    ourselves to be an information-age society since the 1980s, but the concentration
    of media and popular attention to the role of data in our society have never been
    greater than in the past few years–thanks to Big Data.


    Big Data technologies include those that allow us to derive more meaning from
    data–machine learning, for instance—and those that permit us to store greater
    volumes of data at higher granularity than ever before.


    Google pioneered many of these Big Data technologies, and they found their way
    into the broader IT community in the form of `Hadoop`. In this chapter we review
    the history of Google’s data management technologies, the emergence of `Hadoop`,
    and the development of other technologies for massive unstructured data storage.'
