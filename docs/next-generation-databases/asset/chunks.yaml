    Figure 7-5.


    TimesTen Architecture


    TimesTen is significant today primarily as part of Oracle’s enterprise solutions
    architecture. However, it does represent a good example of an early memory-based
    transactional relational database architecture.


    ### Redis


    While TimesTen is an attempt to build an RDBMS compatible in-memory database,
    Redis is at the opposite extreme: essentially an in-memory key-value store. Redis
    (Remote Dictionary Server) was originally envisaged as a simple in-memory system
    capable of sustaining very high transaction rates on underpowered systems, such
    as virtual machine images.


    Redis was created by Salvatore Sanfilippo in 2009\. VMware hired Sanfilippo and
    sponsored Redis development in 2010\. In 2013, Pivotal software—a Big Data spinoff
    from VMware’s parent company EMC—became the primary sponsor.


    Redis follows a familiar key-value store architecture in which keys point to objects.
    In Redis, objects consist mainly of strings and various types of collections of
    strings (lists, sorted lists, hash maps, etc.). Only primary key lookups are supported;
    Redis does not have a secondary indexing mechanism.


    Although Redis was designed to hold all data in memory, it is possible for Redis
    to operate on datasets larger than available memory by using its virtual memory
    feature. When this is enabled, Redis will “swap out” older key values to a disk
    file. Should the keys be needed they will be brought back into memory. This option
    obviously involves a significant performance overhead, since some key lookups
    will result in disk IO.


    Redis uses disk files for persistence:


    *   The Snapshot files store copies of the entire Redis system at a point in time.
    Snapshots can be created on demand or can be configured to occur at scheduled
    intervals or after a threshold of writes has been reached. A snapshot also occurs
    when the server is shut down.

    *   The Append Only File (AOF) keeps a journal of changes that can be used to
    “roll forward” the database from a snapshot in the event of a failure. Configuration
    options allow the user to configure writes to the AOF after every operation, at
    one-second intervals, or based on operating-system-determined flush intervals.


    In addition, Redis supports asynchronous master/slave replication. If performance
    is very critical and some data loss is acceptable, then a replica can be used
    as a backup database and the master configured with minimal disk-based persistence.
    However, there is no way to limit the amount of possible data loss; during high
    loads, the slave may fall significantly behind the master.


    Figure [7-6](#A978-1-4842-1329-2_7_Chapter.html#Fig6) illustrates these architectural
    components. The application interacts with Redis through primary key lookups that
    return “values”—strings, sets of strings, hashes of strings, and so on (1). The
    key values will almost always be in memory, though it is possible to configure
    Redis with a virtual memory system, in which case key values may have to be swapped
    in or out (2). Periodically, Redis may dump a copy of the entire memory space
    to disk (3). Additionally, Redis can be configured to write changes to an append-only
    journal file either at short intervals or after every operation (4). Finally,
    Redis may replicate the state of the master database asynchronously to slave Redis
    servers (5).


    ![A978-1-4842-1329-2_7_Fig6_HTML.jpg](A978-1-4842-1329-2_7_Fig6_HTML.jpg)


    Figure 7-6.


    Redis architecture


    Although Redis was designed from the ground up as in an in-memory database system,
    applications may have to wait for IO to complete under the following circumstances:


    *   If the Append Only File is configured to be written after every operation,
    then the application needs to wait for an IO to complete before a modification
    will return control.

    *   If Redis virtual memory is configured, then the application may need to wait
    for a key to be “swapped in” to memory.


    Redis is popular among developers as a simple, high-performance key-value store
    that performs well without expensive hardware. It lacks the sophistication of
    some other nonrelational systems such as MongoDB, but it works well on systems
    where the data will fit into main memory or as a caching layer in front of a disk-based
    database.'
  trans: '

    ### TimesTen


    TimesTen 是一款相对较早的内存数据库系统，其目标是支持类似于传统关系型系统的负载，但性能更优。TimesTen 成立于 1995 年，于 2005
    年被 Oracle 收购。Oracle 将其作为独立的内存数据库或作为补充传统基于磁盘的`Oracle RDBMS`的缓存数据库提供。


    #### 核心特点

    TimesTen 实现了一个相当熟悉的基于 SQL 的关系模型。在被 Oracle 收购后，它实现了`ANSI 标准 SQL`，但近年来的工作重点是使该数据库与
    Oracle 核心数据库兼容——甚至支持 Oracle 的存储过程语言`PL/SQL`。


    #### 持久化与事务

    在 TimesTen 数据库中，所有数据都驻留在内存中。持久化是通过将内存的周期性快照写入磁盘，以及在事务提交后写入基于磁盘的事务日志来实现的。


    在默认配置下，所有磁盘写入都是异步的：数据库操作通常不需要等待磁盘 IO 操作。但是，如果在事务提交和事务日志写入之间发生电源故障，则数据可能会丢失。这种行为不符合`ACID`，因为事务的持久性（`ACID`中的"D"）无法得到保证。但是，用户可以选择在提交操作期间配置对事务日志的同步写入。在这种情况下，数据库变得符合`ACID`，但某些数据库操作将需要等待磁盘
    IO。


    #### 架构图示

    图 7-5 展示了 TimesTen 的架构。当数据库启动时，所有数据从检查点文件加载到主内存中（1）。应用程序通过 SQL 请求与 TimesTen 交互，这些请求保证在主内存中找到所有相关数据（2）。按需或定期将数据库数据写入检查点文件（3）。应用程序提交会触发写入事务日志（4），不过默认情况下此写入是异步的，因此应用程序不需要等待磁盘。事务日志可用于在发生故障时恢复数据库（5）。


    ![A978-1-4842-1329-2_7_Fig5_HTML.jpg](img/A978-1-4842-1329-2_7_Fig5_HTML.jpg)


    图 7-5. TimesTen 架构


    #### 当前意义

    TimesTen 在当今的重要性主要体现在它是 Oracle 企业解决方案架构的一部分。然而，它确实代表了一个早期的基于内存的事务型关系数据库架构的良好示例。


    ### Redis


    #### 起源与发展

    TimesTen 是构建一个兼容`RDBMS`的内存数据库的尝试，而 Redis 则处于另一个极端：本质上是一个内存键值存储。`Redis`（远程字典服务器）最初被设想为一个简单的内存系统，能够在处理能力有限的系统（例如虚拟机镜像）上维持非常高的事务速率。


    Redis 由 Salvatore Sanfilippo 于 2009 年创建。VMware 在 2010 年雇佣了 Sanfilippo 并赞助 Redis
    的开发。2013 年，Pivotal 软件——从 VMware 母公司 EMC 分拆出来的大数据公司——成为了主要赞助商。


    #### 架构与特性

    Redis 遵循熟悉的键值存储架构，其中键指向对象。在 Redis 中，对象主要包括字符串和各种类型的字符串集合（列表、有序列表、哈希映射等）。仅支持主键查找；Redis
    没有二级索引机制。


    尽管 Redis 设计为将所有数据保存在内存中，但通过使用其虚拟内存功能，Redis 可以在数据集大于可用内存的情况下运行。启用此功能后，Redis 会将较旧的键值“换出”到磁盘文件。如果需要这些键，它们将被换回内存。此选项显然会带来显著的性能开销，因为某些键查找将导致磁盘
    IO。


    #### 持久化机制

    Redis 使用磁盘文件进行持久化：

    *   `快照`文件在某个时间点存储整个 Redis 系统的副本。可以按需创建快照，也可以配置为在达到计划间隔或写入阈值后发生。服务器关闭时也会进行一次快照。

    *   `仅追加文件 (AOF)`保留更改的日志，可用于在发生故障时从快照“向前滚动”数据库。配置选项允许用户配置在每次操作后、每秒间隔或基于操作系统决定的刷新间隔写入`AOF`。


    #### 复制功能

    此外，Redis 支持异步主/从复制。如果性能至关重要且可接受少量数据丢失，则可以使用副本作为备份数据库，并为主库配置最少的基于磁盘的持久化。但是，无法限制可能的数据丢失量；在高负载期间，从库可能会显著落后于主库。


    #### 架构图示

    图 7-6 展示了这些架构组件。应用程序通过主键查找与 Redis 交互，返回“值”——字符串、字符串集合、字符串哈希等（1）。键值几乎总是在内存中，尽管可以配置
    Redis 使用虚拟内存系统，在这种情况下键值可能需要被换入或换出（2）。Redis 可能会定期将整个内存空间的副本转储到磁盘（3）。此外，Redis 可以配置为将更改写入仅追加日志文件，无论是短时间间隔还是每次操作后（4）。最后，Redis
    可以将主数据库的状态异步复制到从 Redis 服务器（5）。


    ![A978-1-4842-1329-2_7_Fig6_HTML.jpg](img/A978-1-4842-1329-2_7_Fig6_HTML.jpg)


    图 7-6. Redis 架构


    #### 性能考量

    尽管 Redis 从头开始设计为内存数据库系统，但在以下情况下，应用程序可能需要等待 IO 完成：

    *   如果`仅追加文件`被配置为在每次操作后写入，那么应用程序需要在修改返回控制之前等待 IO 完成。

    *   如果配置了 Redis 虚拟内存，那么应用程序可能需要等待一个键被“换入”内存。


    #### 总结

    Redis 作为一种简单、高性能的键值存储，在开发人员中很受欢迎，它在无需昂贵硬件的情况下表现良好。它缺乏像`MongoDB`这样一些其他非关系型系统的复杂性，但在数据适合主内存的系统上，或作为基于磁盘的数据库前面的缓存层，它工作得很好。

