  trans: '

    # 对非关系型数据库的反思与未来


    *   **导航模型的回归**。许多新型数据库重新引入了前关系型系统中存在的状况，即数据的逻辑表示与物理表示以一种不可取的方式紧密耦合。关系模型的重大成功之一在于实现了逻辑表示与物理实现的**分离**。

    *   **不一致性到极致**。大多数非关系型系统无法执行多对象事务，即使在单对象事务中也可能出现不一致性和不可预测性，这可能导致一系列不良后果，而这些后果在很大程度上已通过
    `ACID` 事务和多版本一致性控制（`MVCC`）模式得以解决。在放宽一致性模型的系统中，都可能出现幻读、更新丢失和不确定行为等问题。

    *   **不适合商业智能**。像 `HBase`、`Cassandra` 和 `MongoDB` 这样的系统为程序员提供的功能多于为企业所有者提供的功能。这些系统中的数据与常规的商业智能（`BI`）实践相对隔离。缺乏一个能够访问这些系统的完整
    `SQL` 层，使它们与更广泛的企业环境隔绝。

    *   **妥协过多**。有各种各样的专用数据库解决方案，在某些情况下，这些专用方案可能完全符合应用程序的需求。但在太多情况下，应用程序不得不在两种或多种
    `NQR`（不太合适）的数据库架构之间做出选择。


    ## 我们是否绕回了起点？


    关系模型的支持者声称非关系型系统是回到了几十年前已被摒弃的前关系型架构，这并不罕见。这种说法在许多方面并不准确，特别是因为前关系型系统是非分布式的，而当今的非关系型数据库通常采用分布式数据库架构。仅这一点就使得当今的非关系型系统与
    20 世纪 60 年代和 70 年代的前关系型系统有着**根本的不同**。


    然而，许多新型非关系型系统在**一个方面**与前关系型数据库相似：它们将数据的逻辑表示和物理表示纠缠在一起。Edgar Codd 对 `IDMS` 和 `IMS`
    等前关系型系统的关键批评之一，就是它们要求用户了解数据的底层物理表示。关系模型解耦了这些逻辑和物理表示，允许用户以逻辑一致的视图查看数据，无论底层存储模型如何。数据的规范化关系表示避免了针对特定访问模式或存储布局的任何偏向：它将数据的逻辑表示与底层物理表示**解耦**。


    许多现代非关系型系统的倡导者明确**拒绝这种解耦**。他们认为，通过使所有访问模式平等，规范化使它们都同样糟糕。但这一论断是值得怀疑的：它忽略了在关系模型之上应用反规范化作为优化的可能性。很明显，呈现给最终用户的结构不必与磁盘上的结构相同。


    事实上，放弃关系模型的动机，较少源于这些访问模式方面的考虑，而更多源于希望将数据库的数据表示与应用程序代码中的面向对象表示**对齐**。另一个动机是允许模式快速变更：避免通常冗长的逻辑数据模型变更过程，以及将该变更传播到生产系统所需的漫长过程。


    Codd 在 1970 年提出数据的物理和逻辑表示应该分离，他错了吗？几乎肯定没有。拥有一个能够代表明确且无冗余的数据视图的逻辑数据模型仍然是可取的。事实上，大多数非关系型建模课程都鼓励用户从某种形式的“逻辑”模型开始。


    因此，我认为，**对高级别数据逻辑模型的需求仍然是可取的**，允许用户使用该模型与数据库交互，仍然像关系模型首次提出时一样是一个有效的要求。然而，现代应用程序需要能够传播至少是数据模型的微小变更，而无需启动一个笨重的数据库变更控制流程。


    ## 选择过剩的尴尬


    十年前，为应用程序选择正确的数据库系统相当简单：选择与其有现有合作关系或许可交易条件最佳的数据库供应商。技术考虑或价格可能导致在 `Oracle` 和 `SQL
    Server` 之间做出选择，但数据库是 `RDBMS` 几乎是既定事实。如今，选择最佳数据库系统是一项艰巨得多的任务，各种供应商和倡导者相互矛盾的说法往往使其变得更加困难。在大多数情况下，某种形式的关系技术将是最佳选择。但对于那些可能寻求突破
    `RDBMS` 舒适区，并希望从新数据库技术的独特功能中获得竞争优势的应用程序来说，数据库的选择可能是决定性的。


    “哪个是最好的数据库？” 通常，这个问题没有正确答案，因为每个选择都意味着某种形式的妥协。`RDBMS` 在查询访问和事务能力方面可能更胜一筹，但如果应用程序发展壮大，它可能无法提供所需的网络分区容忍度。`Cassandra`
    可能提供最佳的数据中心间可用性，但可能无法与 `BI` 系统集成。等等……


    图 12-1 展示了当今试图决定数据库的人所面临的一些决策点。


    ![A978-1-4842-1329-2_12_Fig1_HTML.jpg](img/A978-1-4842-1329-2_12_Fig1_HTML.jpg)


    图 12-1. 选择正确数据库所涉及的决策


    ## 我们能否兼得？


    我逐渐相信，我们可以在**单一数据库产品**中“兼得”。例如，从架构上讲，没有理由认为一个数据库系统不能提供一种可调的一致性模型，其一端是严格的多记录 `ACID`
    事务，另一端是最终一致性风格模型。同样地，我相信我们可以结合关系模型和文档存储的特性，最初可以遵循现有趋势，在关系表中允许 `JSON` 数据类型。


    对这种融合的阻力，很可能既源于市场和竞争考虑，也源于技术障碍。无论是 `RDBMS` 现有厂商还是非关系型新锐，承认混合模型应该占上风，可能都不符合它们的利益。而且，支持这种混合模型可能涉及技术复杂性，对于规模较小、进入市场较晚的企业来说将更加困难。


    尽管如此，我认为这将是整个数据库行业的最佳结果。与其提供数十种涉及重大妥协的不兼容技术，不如提供一个连贯的数据库架构，将接下来概述的功能作为可配置的行为提供。让我们看看每个融合领域，并考虑将这些技术结合到一个系统中需要什么。


    ## 一致性模型

