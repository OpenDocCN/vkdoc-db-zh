    Cassandra Query Language (CQL) is a SQL-like language that provides a data query
    and manipulation interface. CQL abstracts the underlying wide column data model,
    presenting a more relational-like tabular interface.


    ## CouchBase


    Database Name: Couchbase


    License/Company: Apache licensed, commercial support from Couchbase, Inc.


    Wikipedia description:


    Couchbase Server, originally known as Membase, is an open-source, distributed
    (shared-nothing architecture) NoSQL document-oriented database that is optimized
    for interactive applications.


    Vendor’s description:


    Couchbase Server is a distributed NoSQL database engineered for performance, scalability,
    and availability. It enables developers to build applications easier and faster
    by leveraging the power of SQL with the flexibility of JSON.


    My take:


    Today’s CouchBase Server is derived both from the Memcached-compatible Membase
    and the pioneering JSON database CouchDB. The CouchBase Server still supports
    both the key-value and document paradigms. The introduction of `N1QL`—a SQL language
    for documents—helps CouchBase differentiate from the other leading document database,
    `MongoDB`.


    Data model:


    Key-value and JSON


    Transactional model:


    Strict consistency for single-document transactions


    Clustering:


    Sharding and replication


    APIs:


    REST-based API with drivers for Java and other languages, and `N1QL`—a `SQL` language
    for working with documents


    ## DynamoDB


    Database Name: DynamoDB


    License/Company: Amazon


    Wikipedia description:


    Amazon DynamoDB is a fully managed proprietary NoSQL database service that is
    offered by Amazon.com as part of the Amazon Web Services portfolio.


    Vendor’s description:


    Amazon DynamoDB is a fast and flexible NoSQL database service for all applications
    that need consistent, single-digit millisecond latency at any scale. It is a fully
    managed cloud database and supports both document and key-value store models.


    My take:


    Amazon invented the Dynamo model and provides the dominant public cloud platform,
    so it’s natural that it provides a cloud-based database based on the Dynamo model.
    DynamoDB offers high performance, almost limitless scalability, and very low administrative
    overhead. However, the lock-in to Amazon and the relatively high price probably
    limit its current market adoption.


    Data model:


    Key-value store with support for lists and maps and JSON documents. Secondary
    index support.


    Transactional model:


    Eventually consistent by default, but applications can request consistent reads


    Clustering:


    Consistent hashing


    APIs:


    REST-based API with drivers for Java, .NET, and PHP


    ## HBase


    Database Name: Apache HBase


    License/Company: Apache license, commercially provided by Cloudera, MapR, Hortonworks,
    and others


    Wikipedia description:


    HBase is an open-source, nonrelational, distributed database modeled after Google’s
    BigTable and written in Java. It is developed as part of Apache Software Foundation’s
    Apache Hadoop project, and runs on top of `HDFS` (Hadoop Distributed Filesystem),
    providing BigTable-like capabilities for Hadoop.


    Vendor’s description:


    HBase is the high-performance, distributed data store built for Apache Hadoop.


    My take:


    HBase achieved early market penetration and technical acceleration through its
    association with the Hadoop platform, and has been proven at scale at many sites.
    The tight integration with Hadoop `HDFS` helps it achieve very high availability
    and provides a built-in synergy for Big Data analytics.


    Data model:


    BigTable wide column families


    Transactional model:


    Strictly consistent single-row transactions


    Clustering:


    Range keys are partitioned into regions and a master server keeps track of this
    partitioning. At the disk level, HBase uses `HDFS` for distribution and replication.


    APIs:


    REST and Thrift interfaces with Java driver


    ## MarkLogic


    Database Name: MarkLogic


    License/Company: Proprietary, MarkLogic Corp.


    Wikipedia description:


    MarkLogic is considered a multi-model NoSQL database for its ability to store,
    manage, and search JSON and XML documents and graph data (RDF triples).


    Vendor’s description:


    MarkLogic is a new-generation database that is built with a flexible data model
    to store, manage, and search today’s data without sacrificing any of the data
    resiliency and consistency features of last-generation relational databases.


    My take:


    MarkLogic had built a powerful and widely adopted XML database prior to the emergence
    of what we now call NoSQL databases. MarkLogic has recently added support for
    JSON and now positions as an organizational NoSQL database.


    Data model:


    XML, RDF, JSON


    Transactional model:


    Strictly consistent


    Clustering:


    Sharding


    APIs:


    `XQuery`, `XSTL`, `SPARQL`, REST


    ## MongoDB


    Database Name: MongoDB


    License/Company: GNU AGPL, Apache licensed drivers. Commercially supported by
    MongoDB, Inc.


    Wikipedia description:


    MongoDB (from humongous) is a cross-platform document-oriented database. Classified
    as a NoSQL database, MongoDB eschews the traditional table-based relational database
    structure in favor of JSON-like documents with dynamic schemas (MongoDB calls
    the format `BSON`), making the integration of data in certain types of applications
    easier and faster.


    Vendor’s description:


    MongoDB is an open-source, document database designed for ease of development
    and scaling. MongoDB provides high performance, high availability, and automatic
    scaling.


    My take:


    MongoDB has established a strong lead in NoSQL adoption, driven by its popularity
    with web developers, where the database has displaced `MySQL` as the default choice
    for websites built on modern open-source frameworks.


    Data model:


    JSON documents


    Transactional model:


    Strictly consistent by default for single-document transactions


    Clustering:


    Hash or range sharding with master nodes


    APIs:


    JavaScript query API and drivers for Java, .NET, Python, and other languages


    ## Neo4J


    Database Name: Neo4J


    License/Company: GPL/AGPL, commercially provided by Neo Technology


    Wikipedia description:


    Neo4j is an open-source graph database implemented in Java and accessible from
    software written in other languages using the `Cypher` query language through
    a transactional HTTP endpoint.


    Vendor’s description:


    Neo4j is the World’s Leading Graph Database.


    My take:


    Neo4J represents the most widely used property graph database. The open-source
    version of Neo4J’s `Cypher` programming language may become a standard.


    Data model:


    Property graph


    Transactional model:


    Strictly consistent


    Clustering:


    Master-slave replication


    APIs:


    `Cypher` graph programming language with drivers for most programming languages


    ## NuoDB


    Database Name: NuoDB


    License/Company: Proprietary, provided by NuoDB Corp.


    Wikipedia description:


    NuoDB is a NewSQL database that works in the cloud. It can work both for single-vendor
    and multi-vendor cloud setup.


    Vendor’s description:


    NuoDB’s revolutionary durable distributed cache (`DDC`) architecture combines
    the strengths of traditional RDBMSs—rich `ANSI SQL` support, full `ACID` transactions,
    organization-class tooling for security, backup, and administration—with support
    for elastic scalability and continuous availability across multiple data centers.


    My take:


    NuoDB is a significant attempt at building an `ACID`-compliant distributed SQL
    database. It includes a tunable consistency model and a pluggable storage engine
    architecture.


    Data model:


    Relational model layered on top of a pluggable storage layer that may include
    nonrelational engines


    Transactional model:


    `ACID` with tunable consistency levels that may result in eventually consistent
    behavior


    Clustering:


    Proprietary clustering model


    APIs:


    `SQL`, with non-`SQL` access possible to underlying storage engines


    ## Oracle RDBMS


    Database Name: Oracle database 12c


    License/Company: Oracle


    Wikipedia description:


    Oracle Database (commonly referred to as Oracle RDBMS or simply as Oracle) is
    an object-relational database management system produced and marketed by Oracle
    Corp.


