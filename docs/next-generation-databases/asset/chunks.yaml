    **图 12-6.** Oracle REST JSON 查询按 ID 获取行\n\nREST SODA 接口可用于执行 CRUD（创建、读取、更新、删除）操作。向“集合”添加“文档”会在表中创建新行。\n\
    \n该接口还支持一个查询机制，可用于检索符合任意过滤条件的文档。图 12-7 说明了使用此接口的一个简单 REST 查询（使用可用于原型化 REST 调用的\
    \ Google Chrome “Postman” 扩展）。\n![A978-1-4842-1329-2_12_Fig7_HTML.jpg](img/A978-1-4842-1329-2_12_Fig7_HTML.jpg)\n\
    **图 12-7.** 简单的 SODA REST 查询\n\nJSON 文档过滤语法与 MongoDB 提供的语法极其相似。事实上，Oracle 开发人员有意为\
    \ MongoDB 和其他文档数据库用户提供熟悉的体验。\n\n图 12-8 展示了一个更复杂的查询，我们搜索时长超过 60 分钟、评级为 G 的电影，并按长度降序排序。\n\
    ![A978-1-4842-1329-2_12_Fig8_HTML.jpg](img/A978-1-4842-1329-2_12_Fig8_HTML.jpg)\n\
    **图 12-8.** 复杂的 Oracle REST 查询\n\n### 对 Oracle 表的 REST 访问\n\nOracle REST 数据服务\
    \ API 也为关系表提供了 REST 接口。该机制与我们之前检查的 JSON SODA 接口几乎相同。\n\n在图 12-9 中，我们看到一个 REST\
    \ 查询从 Oracle `CUSTOMERS` 表中检索数据，在 HTTP 字符串中提供了一个简单的查询过滤器。\n![A978-1-4842-1329-2_12_Fig9_HTML.jpg](img/A978-1-4842-1329-2_12_Fig9_HTML.jpg)\n\
    **图 12-9.** 用于表查询的 Oracle REST 接口\n\n### Oracle Graph\n\nOracle 长期以来在其 Oracle\
    \ Spatial and Graph 选项中支持基于 RDF 的图功能。该选项基于第 6 章概述的 RDF W3C 标准。然而，尽管此功能提供了一些重要的图能力，但它不如\
    \ Neo4J 等流行属性图数据库所提供的功能全面。\n\n正如您可能从第 6 章回忆起的，RDF 系统是三元组存储的一个例子，它表示节点之间相对简单的关系。相比之下，属性存储表示节点之间的关系，但也允许模型在节点和关系中存储重要信息（属性）。虽然\
    \ RDF 图为本体的开发和分布式数据源提供强大支持，但属性图通常对自定义应用程序开发更具吸引力，因为它们提供更丰富的数据模型。\n\nOracle 最近集成了一个属性图计算引擎，可以对保存在\
    \ Oracle RDBMS、Oracle 大数据 Hadoop 系统或 Oracle 自己的 NoSQL 系统中的任何数据执行图分析。该计算引擎支持 openCypher\
    \ 图语言。Cypher 是最流行的专用图数据库引擎 Neo4J 中实现的语言，openCypher 已作为该语言的开源版本提供。\n\nOracle 的实现并不代表原生图数据库存储引擎。正如您可能从第\
    \ 6 章回忆起的，原生图数据库必须实现无索引邻接，有效地在基础存储中实现图结构。相反，Oracle 实现了一个图计算引擎，能够将各种格式的数据加载到内存中，在其中进行图分析。这种方法的好处是图分析可以应用于以任何现有格式保存的数据，前提是该格式可以作为图进行导航。许多现有的关系模式实际上确实实现了图关系。例如，一个典型的组织模式将有从员工到其经理的外键，这可以表示为一个图。\n\
    \n### Oracle Sharding\n"
- fmt: '# Oracle 分片


    Oracle 分片是 Oracle 数据库中一个相对较新的特性，于 2015 年底宣布。Oracle 长期以来一直提供分布式数据库集群能力。早在 20 世纪
    90 年代初，Oracle 就提供了 `Oracle Parallel Server`——一种共享磁盘集群数据库。这种数据库集群技术最终演变为 `Oracle
    Real Application Clusters (RAC)`，它被广泛采用，并代表了共享磁盘数据库集群模型最重要的实现。我们在第 8 章更详细地讨论了共享磁盘数据库集群。


    然而，`RAC` 的集群架构更适合数据仓库工作负载，而不是大规模可扩展的 `OLTP`。对于写入密集型工作负载，`RAC` 的大规模扩展变得有问题，因为维护内存中数据一致性视图的开销会导致私有数据库网络中出现过多的“
    chatter ”。因此，典型的 `RAC` 集群只有很少的节点——绝大多数少于 10 个。


    Oracle 分片选项允许将 `OLTP` 工作负载部署在多达 1,000 个独立的 Oracle 实例上，使用的架构类似于第 3 章回顾的 MySQL 自建分片，也与第
    8 章探讨的 MongoDB 分片架构非常相似。


    图 12-10 展示了 Oracle 分片架构的表示。协调器数据库 (1) 包含描述键如何在分片中分布的目录。每个分片由一个独立的 Oracle 数据库实例实现。包含分片键的查询可以直接发送到相关的数据库实例
    (3)；分片目录知道分片映射，并可以向应用程序提供适当的连接详细信息 (4)。未指定分片键或在多个分片上聚合的查询 (5) 由充当代理的协调器数据库调解。协调器数据库将查询发送到各个分片以检索必要的数据
    (6)，然后聚合或合并数据以返回适当的结果集。


    ![A978-1-4842-1329-2_12_Fig10_HTML.jpg](A978-1-4842-1329-2_12_Fig10_HTML.jpg)


    图 12-10. Oracle 分片


    Oracle 分片支持的分布方案类似于 Oracle 现有表分区产品支持的方案。数据可以通过哈希、分片键范围或分片键值列表跨分片进行分区。还有一种复合方案，其中数据主要按列表或范围分区，然后根据第二个分片键进行哈希。使用哈希分区时，Oracle
    可以通过随着数据量变化或节点添加到分片系统或从中移除而重新分发分片块来自动确定负载均衡。范围或列表分区需要用户进行分片均衡。


    每个分片可以使用 Oracle 复制技术 (`DataGuard` 或 `Goldengate`) 进行复制。副本可用于满足读取请求，但这可能要求应用程序显式地从副本而不是主副本请求数据。


    不符合分片键或相对较小的表可以在每个分片上复制，而不是跨整个集群分片。例如，`products` 表可能被复制到所有分片，而其他数据则通过客户 ID 进行分片。


    与所有分片方案一样，Oracle 分片打破了传统 `RDBMS` 提供的一些常规保证。虽然支持跨分片连接，但不能保证结果的时间点一致性。跨分片的事务仅在分片内是原子的——分布式事务没有两阶段提交。


    ### Oracle 作为混合数据库


    看到 Oracle 采用了明显旨在让 MongoDB 用户感到熟悉的 `JSON` 接口，并最终采用了承认无共享架构在某些工作负载上优越性的分布式数据库策略，这令人惊讶，甚至可能有点好笑。但对我而言，看到领先的
    `RDBMS` 供应商从替代方法中学习是令人鼓舞的。


    然而，Oracle 尚未尝试解决未来集成数据库面临的关键挑战之一：在网络可能出现分区时，平衡一致性和可用性。


    Oracle 的 `RAC` 集群数据库在网络分区的情况下明确选择一致性而非可用性：在“脑裂”场景中，Oracle `RAC` 集群中被隔离的实例将被驱逐或自愿关闭，而不是继续以不一致的状态运行。Oracle
    分片为在线系统提供了潜在的更好的解决方案——理论上，在网络分片期间，分片数据库的某些部分可能在每个分区中继续可用。然而，只有一部分选定的分片将在每个分区中可用，并且没有机制来协调不一致。此外，在分片模型中，事务完整性——即使整个数据库可用——也不能得到保证。例如，跨分片的事务或查询可能表现出不一致的行为。


    事务型关系数据库在网络分区面前保持可用性的一种模式，可能需要在 `ACID` `RDBMS` 系统中实现的事务行为与 `Dynamo` 风格的最终一致性之间进行某种合并。


    在 `RDBMS` 领域，Oracle 并非唯一采用 `JSON` 或对非关系范式感兴趣的公司。Oracle 的人们是真诚地试图将其旗舰数据库产品推向未来，还是仅仅试图削弱新兴竞争对手的势头，还有待观察。但很明显，大量的精力正投入到工程特性上，这些特性将
    `Oracle` `RDBMS` 从其传统的 `RDBMS` 根基上转移开。至少，其中一些特性暗示了融合数据库系统可能的行为方式。


    ## 其他融合数据库


    还有其他一些尝试融合关系和非关系模型的案例值得在此提及：'
  raw: 'Oracle sharding is a relatively new feature of the Oracle database, announced
    in late 2015\. Oracle has long provided a distributed database clustering capability.
    As far back as the early 1990s, Oracle was offering the Oracle Parallel Server—a
    shared-disk clustered database. This database clustering technology eventually
    evolved into Oracle Real Application Clusters (RAC), which was widely adopted
    and which represents the most significant implementation of the shared-disk database
    clustering model. We discussed shared-disk database clusters in more detail in
    Chapter [8](#A978-1-4842-1329-2_8_Chapter.html).


    However, the clustered architecture of RAC was more suited to data warehousing
    workloads than to massively scalable OLTP. Massive scaling of RAC becomes problematic
    with write-intensive workloads, as the overhead of maintaining a coherent view
    of data in memory leads to excessive “chatter” across the private database network.
    For this reason, typical RAC clusters have only a small number of nodes—the vast
    majority have fewer than 10.


    The Oracle sharding option allows an OLTP workload to be deployed across as many
    as 1,000 separate Oracle instances, using an architecture that is similar to the
    do-it-yourself sharding of MySQL, which was reviewed in Chapter [3](#A978-1-4842-1329-2_3_Chapter.html),
    and also quite similar to the MongoDB sharding architecture that was examined
    in Chapter [8](#A978-1-4842-1329-2_8_Chapter.html).


    Figure [12-10](#A978-1-4842-1329-2_12_Chapter.html#Fig10) shows a representation
    of the Oracle sharding architecture. The coordinator database (1) contains the
    catalog that describes how keys are distributed across shards. Each shard is implemented
    by a distinct Oracle database instance. Queries that include the shard key can
    be sent directly to the relevant database instance (3); the shard director is
    aware of the shard mappings and can provide the appropriate connection details
    to the application (4). Queries that do not specify the shard key or that are
    aggregating across multiple shards (5) are mediated by the coordinator database
    which acts as a proxy. The coordinator database sends queries to various shards
    to retrieve the necessary data (6) and then aggregates or merges the data to return
    the appropriate result set.


    ![A978-1-4842-1329-2_12_Fig10_HTML.jpg](A978-1-4842-1329-2_12_Fig10_HTML.jpg)


    Figure 12-10.


    Oracle sharding


    Oracle sharding supports distribution schemes similar to those supported by Oracle’s
    existing table partitioning offerings. Data may be partitioned across shards by
    a hash, shard key ranges, or lists of shard key values. There is also a composite
    scheme in which data is partitioned primarily by list or range, and then hashed
    against a second shard key. When hash partitioning is used, Oracle can determine
    the load balancing automatically by redistributing shard chunks as data volumes
    change or as nodes are added or removed from the sharded system. Range or list
    partitioning requires user balancing of shards.


    Each shard may be replicated using Oracle replication technologies (DataGuard
    or Goldengate). Replicas can be used to satisfy read requests, though this may
    require that the application explicitly request data from a replica rather than
    from the master.


    Tables that don’t conform to the shard key or that are relatively small can be
    duplicated on each shard rather than being sharded across the entire cluster.
    For instance, a products table might be duplicated across all shards, while other
    data is sharded by customer ID.


    As with all sharding schemes, Oracle sharding breaks some of the normal guarantees
    provided by a traditional RDBMS. While joins across shards are supported, there
    is no guarantee of point-in-time consistency in results. Transactions that span
    shards are atomic only within a shard—there is no two-phase commit for distributed
    transactions.


    ### Oracle as a Hybrid Database


    It’s surprising, and maybe even a little amusing, to see Oracle adopt a JSON interface
    that is clearly designed to be familiar to MongoDB users, and to finally adopt
    a distributed database strategy that admits the superiority of the shared-nothing
    architecture for certain workloads. But I for one find it encouraging to see the
    leading RDBMS vendor learn from alternative approaches.


    However, Oracle is yet to attempt to address one of the key challenges for an
    integrated database of the future: balancing consistency and availability in the
    face of possible network partitions.


    Oracle’s RAC clustered database explicitly chooses consistency over availability
    in the case of a network partition: in a “split brain” scenario, isolated instances
    in the Oracle RAC cluster will be evicted or voluntarily shut down rather than
    continue operating in an inconsistent state. Oracle sharding offers a potentially
    better solution for an online system—theoretically, during a network partition
    some parts of the sharded database may continue to be available in each partition.
    However, only a subset—selected shards—will be available to each partition, and
    there is no mechanism to reconcile inconsistencies. Furthermore, in the sharded
    model, transactional integrity—even when the entire database is available—is not
    guaranteed. Transactions or queries that span shards may exhibit inconsistent
    behavior, for instance.


    A mode in which a transactional relational database might maintain availability
    in the face of a network partition would require some sort of merger between the
    transactional behavior implemented in ACID RDBMS systems and Dynamo-style eventual
    consistency.


    Oracle is not alone in the RDBMS world in its adoption of JSON or interest in
    nonrelational paradigms. Whether the Oracle folks are sincerely attempting to
    move their flagship database product into the future or simply trying to take
    the wind out of the sails of upstart competitors remains to be seen. But it is
    clear that significant effort is going into engineering features that shift the
    Oracle RDBMS away from its traditional RDBMS roots. And if nothing else, some
    of these features are suggestive of how a converged database system might behave.


    ## Other Convergent Databases


    There are several other attempts to converge the relational and nonrelational
    models that are worth mentioning here:'
