- '# 5. 目录同步与虚拟化


  Oracle Internet Directory (OID)、Oracle Virtual Directory (OVD) 和目录集成平台 (DIP) 共同为
  Oracle 目录服务提供了整合用户管理和与其他应用程序集成的能力。这些概念已在前面的章节中介绍。本章将介绍使用 DIP 从 Active Directory
  将用户复制到 OID 实例中，为后续与 EBS 以及 Oracle 身份和访问管理器的集成做准备。

  ```



  ## 目录集成平台


  同步 OID 与 Active Directory 的关键在于 `DIP`。利用 Oracle `DIP`，IT 部门可以将轻量级目录访问协议 (`LDAP`)
  信息（源自包括 Active Directory、OpenLDAP 及其他 `LDAP` 或数据库存储在内的多个来源）复制到一个集中式目录中，该目录可与 Oracle
  产品及应用程序配合使用。


  数据同步通过配置文件完成，这些配置文件可在 `DIP` 系统中创建，用于映射和转换外部目录身份信息，以满足 Oracle 系统的要求。当 `DIP` 执行并查询
  `LDAP` 源以在 `OID` 中插入或修改数据时，便会使用这些配置文件。在接下来的章节中，您将看到一个基本的配置文件，用于将 `OID` 与单个 Active
  Directory 实例同步。`DIP` 可以支持多个配置文件和多个来源。如果您需要将不同的 Active Directory 组织单元 (`OUs`) 同步到
  `OID` 内不同的命名空间中，或者需要同步来自不同来源的用户，这将会很有帮助。


  ### 创建同步配置文件


  将使用 Fusion Middleware Control 界面来创建 `DIP` 配置文件。有关 Fusion Middleware Control 界面的更详细信息，请参见第
  8 章。导航至 `http://hostname:port/em` 即可打开 Fusion Middleware Control 的欢迎屏幕，如图 5-1 所示。


