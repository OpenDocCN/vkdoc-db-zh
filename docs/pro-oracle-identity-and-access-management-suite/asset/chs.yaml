  ## 总结


  在本章中，您了解了配置 `OIM` 服务器的必要步骤。在之前的章节中，您安装了必要的软件并创建了 `WebLogic` 域。在此基础上，您现在应该拥有一个可用于在
  `OID` 身份存储中创建和管理用户的 `OIM` 实例。您还为此安装进行了预配置，为将 `OIM` 与 `OAM` 集成做准备。此过程的下一步是开始这两款产品的实际集成。


  # 11. Oracle 身份与访问管理器集成


  在之前的章节中，您已安装了 `Oracle Internet Directory` (`OID`)、`Oracle Access Manager` (`OAM`)
  和 `Oracle Identity Manager` (`OIM`)，为集成做准备。此集成带来了若干好处，包括提高用户生产力、增强身份安全性以及减少因忘记密码或账户锁定而导致的帮助呼叫。


  使用集成环境的组织不仅能够利用 `OIM` 的用户配置和审计功能，还能将用户自助服务功能与 `OAM` 的单点登录 (`SSO`) 启用能力相结合。这两个主要组件的结合为可能需要管理其账户访问权限、密码或个人资料信息的用户创造了无缝界面。正如
  `SSO` 环境允许用户登录一次应用程序后，即可自动登录到他们可能需要的其他应用程序一样，此集成将身份管理器添加为受保护的资源。这通过在某些事件（如更改密码、忘记密码等）后自动登录用户，促进了用户自助服务。另一个功能是
  `OIM` 和 `OAM` 能够相互通信以确定用户状态，例如首次登录和账户过期。


  在本章结束时，您将拥有一个包含一个受保护资源或 URL 的集成环境。您的用户将能够通过登录屏幕，在 `SSO` 环境中使用首次登录、忘记密码和其他身份管理器功能。


  ## IdmConfigTool


  Oracle 提供了一个工具，可用于确保执行所有必要的配置以实现成功集成。有大量的配置参数需要设置或更新。正确运行此工具有助于在设置过程中减少麻烦，实现无缝集成。


  将新应用程序和资源添加到 `OAM` `SSO` 环境可以相对简单。对于大多数 Oracle 产品和应用程序，这涉及在 `WebLogic` 域中创建一个新的
  `Oracle Access Manager` 身份断言器并配置 `WebGate`。然而，对于 `OIM`，必须配置多个组件以确保两个组件之间的通信正常运行。幸运的是，Oracle
  提供了一个名为 `IdmConfigTool` 的工具。在之前的章节中，您已使用此工具预配置了身份存储。在本章中，它用于配置 `OAM`、`OIM` 和 `WLS`
  的集成。


  `IdmConfigTool` 可以协助集成身份管理器组件的任务。它还可用于验证配置参数并提取集成环境的配置参数，以协助故障排除或在其他环境中复制。它支持在单域和拆分域环境中集成身份管理器组件，支持
  `11g` 和 `10g` `WebGates`，以及多种身份存储类型，如 `OID` 和 `Oracle Unified Directory` (`OUD`)。


  尽管 `idmConfigTool` 提供了许多集成工具，但工具的正常运行取决于正确的环境管理。注意运行 `idmConfigTool` 的位置非常重要。在本书中，您在拆分域中设置了
  `OAM` 和 `OIM`。Oracle 文档提到您应始终从同一位置运行 `idmConfigTool`。但是，如果在拆分域中运行，则必须在 `OAM` 主目录位置运行特定于
  `OAM` 的命令，而特定于 `OIM` 的命令则从 `OIM` 主目录运行。


  由于本章涵盖 `OAM` 和 `OIM` 任务，因此每个部分都介绍了 `idmConfigTool` 的正确设置。


  ## 配置 Oracle 访问管理器


  在第 9 章中，您已经配置了 OAM 并为其与 OIM 的集成进行了预配置。您还在 OID 轻量目录访问协议 (LDAP) 存储中创建了必要的对象。这一切都是为了让
  OAM 启动并运行，并确保创建了正确的管理用户。您还将 OID 集成为 WebLogic 层的身份验证器。


  如前所述，此环境是一个拆分域，其中 OAM 和 OIM 安装在不同的 Middleware Home 和不同的 WebLogic 域中。因此，OAM 的配置将使用位于
  OAM 主目录中的 `idmConfigTool`。有关如何准备环境变量以使用此工具的详细信息，请参见表 11-1。


  表 11-1. `idmConfigTool` 的环境变量


  | `MW_HOME` | 将此设置为 OAM 中间件软件的安装目录；例如，`/home/oracle/IAMMiddleware/` |

  | --- | --- |

  | `JAVA_HOME` | 将此设置为 Java 安装目录；例如，`/home/oracle/java` |

  | `IDM_HOME` | 如果您在同一物理服务器上安装了 OID，请将其设置为 OID 安装目录；例如，`/home/oracle/OIDMiddleware`；如果
  OID 安装在单独的服务器上，请将其留空 |

  | `ORACLE_HOME` | 将此设置为 OAM 安装目录；例如，`/home/oracle/IAMMiddleware/Oracle_IAM` |


  `idmConfigTool.sh` 文件位于 `$ORACLE_HOME/idmtools/bin` 目录中。执行这些步骤时，应从该目录运行各个步骤。在此过程中，将创建并追加一个名为
