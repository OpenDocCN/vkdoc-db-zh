- "# 2. 安装前注意事项与先决条件\n\n## 容量规划\n\n在没有对当前环境进行适当分析并对未来进行一定规划的情况下，无法正确实施 Oracle 身份与访问管理套件或其部分组件，以在企业内提供应用程序安全。这将确保不仅满足当前需求，而且在未来随着更多用户和应用程序添加到环境中，性能也不会下降。本章为处于身份管理实施规划阶段的人员提供指导。\n\
  \n## Fusion Middleware\n\nOracle 身份与访问管理与其他 Fusion Middleware 产品和应用程序一样，依赖于`WebLogic\
  \ Server`（`WLS`）架构。作为 Fusion Middleware 架构的支柱，确保`WLS`环境正确配置至关重要。这始于恰当的规划和分析。在决定如何设置环境时，规划\
  \ WebLogic 环境涉及诸多方面，例如内存、硬件、灾难恢复等。下文将对此进行讨论。\n\n性能要求是重要的考虑因素之一。必须考虑应用程序用户对部署在实例上的应用程序期望何种服务级别。所涉及的应用程序是否高度依赖身份或其他数据，是否内存密集型，或者应用程序是否有特定的响应时间要求？还必须考虑环境预计将承受的负载。\n\
  \n### 评估容量需求\n\n`WLS`必须在满足最低要求的服务器上安装和配置。然而，满足最低要求并不总是能保证部署在其中的应用程序以最佳水平运行并提供系统用户所需的服务级别。在规划\
  \ WebLogic 实施时，应与应用程序规划人员或开发人员合作，以确定预期用户数、并发连接数、预期响应时间等。此外，收集有关应用程序本身的信息非常有帮助，包括事务时长、每秒事务数和应用程序复杂度。同时考虑应用程序架构，例如数据库连接和外部服务访问。这些都将是确定`WLS`所需硬件要求以及软件调优的有用输入。所有这些可能都需要安装一个测试环境，并根据这些数字进行负载测试。这种做法也可以为未来的调优工作提供一个可靠的基准。\n\
  \n### 硬件\n\n容量规划从计算硬件需求开始，并确保环境满足或超过这些需求。一个很好的起点是计划用于环境的软件附带的文档。`WLS`最低要求一个 1-GHz\
  \ CPU，但待安装组件的需求将决定整体系统要求。例如，一种分布式架构，其中`Oracle Access Manager`（`OAM`）和`Oracle Identity\
  \ Manager`（`OIM`）安装在一台主机上，而轻量级目录访问协议（`LDAP`）服务器安装在另一台上，则需要两台物理主机。`OAM`/`OIM`主机将需要六个或更多内核，而`LDAP`主机仅需两个。\n\
  \n### 内存\n\n`WLS`需要 8 GB 可用内存（4 GB 物理内存和 4 GB 交换空间）。这些代表了最低要求，并将根据托管服务器的数量以及部署在其中的软件而变化。重要的是要考虑服务器本身也有内存需求。可以通过为\
  \ Linux 操作系统（`OS`）分配 3 GB、为`WebLogic Admin Server`分配 3 GB、为每个托管服务器分配 3 GB（此数字将根据部署内容而变化）来确定一个起点。这将提供`WLS`硬件所需可用内存的初步估算。本章后续将提供关于内存的更详细讨论。\n\
  \n### 存储\n\n尽管`WLS`不需要大量的前期存储空间，但调整磁盘空间大小以允许增长很重要。同样，必须考虑将在 WebLogic 托管服务器内部署的所有软件的磁盘空间要求。`WLS`安装需要大约\
  \ 580 MB，另外需要 570 MB 用于 coherence。所需总空间大约为 1.2 GB。如前所述，考虑要部署的应用程序。例如，`Oracle Internet\
  \ Directory`（`OID`）、目录集成平台和目录服务管理器将需要额外大约 800 MB。\n\n### 网络\n\n主机上的网络负载和网络配置将对`WLS`实例的感知性能产生影响。Oracle\
  \ 建议将`WLS`安装在千兆网络上，并使用硬件负载均衡器。\n\n\n## 集群化\n\n增加物理或虚拟主机的 CPU 和内存将提升 WLS 环境的性能。这些改动同样会影响部署在受管服务器内的应用程序性能。然而，它们无法降低单个服务器的整体负载。增加服务器或采用集群能带来更大的性能提升。\n\
  \nWebLogic 环境的集群化包括增加一个或多个运行 WLS 的额外主机，并将应用程序部署在受管服务器上，或是在单个多处理器服务器上部署多个实例。然而，性能仍然会受限于物理服务器上的其他资源。跨多台服务器进行\
  \ WebLogic 集群化的额外好处包括，通过在物理服务器故障时提供故障转移支持来提高可用性。向 WLS 集群添加新的独立主机并进行负载均衡，会将负载分散到多个主机上。WebLogic\
  \ 将处理会话信息和集群成员监控，以确保数据连续性。一个配置得当的 WebLogic 集群在客户端应用看来就像一个单一实例。\n\n集群的负载均衡优势能将应用负载均匀地分布在多个主机上。这要求受管服务器部署在集群内的每个节点上。需要注意的是，集群内的每个\
  \ WebLogic 实例都管理着自己与数据库及底层服务的连接。这种能力进一步提升了整体环境的性能，因为每个节点都处理自己的一组应用请求。此外，可以向环境添加额外的集群成员而不影响用户，从而实现动态可扩展性。\n\
  \n集群带来的高可用性提升允许在节点丢失时实现故障转移冗余，因为 WebLogic 基础架构处理会话信息，并且应用状态集群可以提供自动故障转移能力。另外，如果需要，整个受管服务器可以迁移到另一个节点。\n\
  \n总之，确保一个成功的 WebLogic 环境需要考虑系统将要承担的基本负载。单台服务器必须至少具备 WLS 所需的最低 CPU 和内存，同时也必须拥有部署应用程序所需的要求。通过\
  \ WebLogic 集群功能，可以进一步提升性能和故障转移能力。这些特性将负载分散到多个主机上，每个主机分担一部分工作，并在一个或多个节点宕机时承担起额外负载。Oracle\
  \ 身份与访问管理套件的所有组件都需要 WebLogic 环境。本章后续将讨论整体环境的通用指南和注意事项，以帮助您建立一个高性能、高可用的系统。\n\n##\
  \ 企业部署拓扑\n\nOracle 身份与访问管理代表了 Oracle 基于最先进技术的全面身份管理套件，是同类产品中的佼佼者。它提高了用户生产力，同时提供了一个高度安全且易于适应的环境。为了支持涵盖性能、高可用性和可扩展性的广泛企业需求，Oracle\
  \ 身份与访问管理利用了 Fusion Middleware 架构。借助 Fusion Middleware，组织可以获得多种选择，从适用于开发环境的单节点，到位于不同地理位置数据中心以支持负载和最大灾难恢复的多节点集群。本节将讨论\
  \ Oracle 建议的各种拓扑结构，以及每种结构应被采用的原因及其能为企业带来的好处。\n\n### 单节点\n\n单节点架构描述了一个所有服务都在单一 WebLogic\
  \ 节点上运行的环境。虽然可能涉及多台物理或虚拟主机，但每台主机运行不同的组件，且不提供故障转移。例如，OID 可能只有一个实例运行在 Host_1 上。OAM\
  \ 可能运行在 Host_2 上。然而，在这种情况下，所有认证请求都会通过 Host_2 上的 OAM 路由。OAM 检查 Host_1 上的 OID。如果 Host_1\
  \ 或 Host_2 中的任何一个宕机，所有操作都将停止。这种拓扑不提供任何冗余。同时，它也不提供负载均衡。如果应用程序经历高负载，单台服务器必须处理增加的流量。正是由于这两个原因，单节点拓扑通常只适用于开发环境。\n\
  \n图 2-1 描述了单节点拓扑。应用环境的每一层都由一个单主机/单个 WLS 和两个受管服务器组成。如图 2-1 所示，没有冗余或负载均衡机制。此配置是最简单的实现，很可能在一天内即可完成配置。虽然这对于小型组织或不预期高负载的组织来说可能是可以接受的，但较大的组织通常需要比此架构提供的更高的容错能力和性能水平。\n\
  \n![A352855_1_En_2_Fig1_HTML.jpg](img/A352855_1_En_2_Fig1_HTML.jpg)\n\n图 2-1. 通用单节点拓扑\n\
  \n图 2-1 中的图像描述了一个包含身份与访问管理的单节点配置。应用环境的每一层都由单台服务器组成。请求被路由到带有 Access Manager WebGate\
  \ 的 Oracle HTTP 服务器。WebGate 确定请求的资源是否需要认证。如果用户尚未认证，请求会被路由到单一的 Access Manager 服务器，认证过程被移交给\
  \ LDAP 服务器。在企业内部，可以使用 Identity Manager 来维护用户存储库。\n\n总的来说，单节点拓扑对于可以容忍停机时间或没有高可用性要求的环境是适用的。例如，开发组可以使用它们来开发需要身份管理的应用程序。开发环境可以选择脱机而不影响普通用户群体。通过进行频繁备份并制定良好的恢复计划，如果用户数量较少或不需要\
  \ 24/7 可用性，小型组织或许可以通过运行单节点环境来节省一些成本。\n\n\n\n#### 本地高可用性\n\nOracle Fusion Middleware\
  \ 利用 WLS 的集群功能，使组织能够为冗余和更好性能而实施集群。前文已讨论过，集群环境提供可扩展性，可动态向环境中添加更多节点以适应增加的负载或为未来任务做规划。如果组织预计负载较高或业务增长，可以添加新节点，并且负载均衡可以确保负载在集群的所有成员之间均匀分布。\n\
  \n本地高可用性集群是位于单一数据中心或地理区域内的环境。它提供了冗余和负载均衡能力，是最基本的集群环境。但是，如果单一数据中心发生断电或灾难，将导致服务完全中断，直到环境重新启动或恢复为止。需要注意的是，环境可能由两个或更多\
  \ WLS 实例组成。图 2-2 展示了一个使用多个 Web 层和一个双节点应用层的典型负载均衡环境。\n\n![A352855_1_En_2_Fig2_HTML.jpg](img/A352855_1_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2. 通用单站点集群示意图\n\nFusion Middleware 环境中的集群对象也支持更高的可用性。集群的节点可以几乎无影响地添加或移除。例如，如果管理员注意到某个集群成员出现\
  \ I/O 或内存等问题，只要其他成员可用以接管负载，就可以将该成员下线进行处理。借助集群提供的冗余能力，发生故障的服务器进程可以自动故障转移至集群中的另一个成员。\n\
  \n当仅运行于单个节点的应用程序发生故障时，自动服务器迁移可能非常有用。在这种情况下，Fusion Middleware 允许将服务器配置为自动或手动迁移。如果\
  \ WebLogic 检测到服务故障，该单实例服务将自动迁移至另一个节点。这对于像 `JMS` 或 `JTA` 事务恢复系统这样只能在单一服务器上运行的服务尤其有价值。\n\
  \n本地高可用性集群通过提高性能和针对计划外停机提供冗余，并且还能通过以滚动方式应用系统补丁使组织受益。使用集群，组织可以在不关闭整个环境的情况下应用小型补丁。可以通过关闭单个节点或指示负载均衡器将其从可用服务器列表中移除，然后对其应用补丁，从而逐个节点进行修补。在该节点完成补丁后，可以重新启动并重新加入集群，然后可以处理下一个节点，而不会对用户群体产生不利影响。\n\
  \n这些单站点多节点集群非常适合需要解决性能问题并提供高可用级别的组织。这些环境通过使用负载均衡器将请求分配到多个服务器来处理负载。Fusion Middleware\
  \ 架构提供了从 Web 层到应用层的负载均衡以及从应用层到数据库层的负载均衡。这确保了最有能力处理请求的服务器来处理它们。然而，这取决于服务器进程的类型。\n\
  \n有状态的 Java 应用程序（如 `WebCenter` 或 `ADF`）利用 `WebLogic` 代理插件 `mod_wl_ohs` 来监控服务器状态，以及会话状态副本信息的位置。如果集群中的某个节点丢失，`WebLogic`\
  \ 代理插件会将请求路由到可用节点，并从副本恢复会话状态。无状态应用程序则依赖负载均衡器将请求路由到集群的可用成员。对于像基于 `C` 的组件这样的有状态应用程序，则不存在会话状态信息副本。负载均衡器保持会话粘性，如果服务器丢失，将路由到下一个可用节点。但是，由于没有可用的会话信息，用户将需要开始一个新的会话。\n\
  \n本地高可用性集群通过将负载分散到多个服务器成员，提供了高水平的性能和可靠性。它们还使企业能够在不影响其用户群体的情况下应用补丁和小型升级。通过 Fusion\
  \ Middleware 架构，从 Web 层到数据层都提供了高可用性和负载均衡。\n\n\n\n#### 灾难恢复与最高可用性\n\n尽管本地高可用性集群适用于许多组织，并提供高水平的性能和故障转移能力，但一些组织需要将负载分散到多个地理位置，并提供跨地理位置的故障转移。这可以在整个数据中心发生故障时，提供最高的可用性和最快的恢复速度。这种拓扑结构也可以用来为地理位置分散的用户提供更好的性能。这对组织来说是最昂贵的选项，因为它需要更多的硬件和多个数据中心站点，同时也增加了复杂性和管理难度。然而，对于需要\
  \ **99.999%** 正常运行时间、且对容量和性能有极高要求的组织来说，这是最终的解决方案。\n\n最高可用性是业务遍及全球的组织的必备要求。这些组织无法承受其系统宕机，或安全成为服务访问的瓶颈。这些公司内部的技术团队可能会选择将数据复制到多个数据中心。*主被动*\
  \ 环境允许更快的恢复。在主站点发生故障的情况下，所有流量都可以在故障转移过程中被导向备份站点。当主数据中心重新上线后，所有流量会被重新定向回它，并重新开始复制以确保备份站点的数据一致性。另一个选项是在多个数据中心间维护\
  \ *主主动* 集群。在这种情况下，所有流量会在所有数据中心的所有节点之间进行负载均衡。如果一个数据中心发生故障，负载均衡器会自动将流量导向剩余的服务器。\n\n\
  集群带来的额外好处是，可以将计算能力和任务分散到多个节点上。许多大型公司在全球范围内拥有海量的身份数据和用户。通过使用代理服务器并将数据分布到多个地理位置，组织可以减少网络流量和查询时间。例如，在纽约设立一个数据中心，存放北美地区的身份数据；在东京设立另一个数据中心，处理亚洲地区的身份数据，这样就实现了数据本地化，减少了亚洲国家请求的网络延迟。由于每个区域的数据源更小，查询时间也随之减少。对于用户群体可能没有广泛地理分布、但拥有大量数据的组织，可以使用同样的功能在多台服务器上处理数据子集，从而减少查询时间，同时通过在多个位置复制服务器来改善恢复时间和可靠性。这种环境的示例如图\
  \ 2-3 所示。\n\n![A352855_1_En_2_Fig3_HTML.jpg](img/A352855_1_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3.\n\n通用多数据中心最高可用性架构\n\n图 2-3 描绘了一个环境，其中应用程序架构的每一层都进行了集群化，并分布在多个地理位置。这相当于将本地高可用性集群配置复制到一个或多个地理上分离的数据中心。这样做提高了容错能力和性能。需要注意的是，图\
  \ 2-3 并未详细说明数据负载的分布。这些内容将在本章后面讨论，因为它们与 Oracle 身份和访问管理拓扑相关。\n\n#### 拓扑实现\n\n到目前为止，本章主要集中在\
  \ Fusion Middleware 环境的通用术语以及可以采取哪些措施来提高性能和可用性。身份和访问管理的各个组件利用这些拓扑结构为组织提供这些优势。接下来将讨论这些内容与身份和访问管理组件的关系。\n\
  \n这些建议基于 Oracle 企业部署指南。EDG 代表了 Oracle 工程师开发的建议架构，旨在提供最佳性能和可靠性。虽然它们没有给出具体的硬件或调优要求，但给出了环境应如何安装和配置的总体思路。在确定组织的总体需求时，应遵循这些总体指南。使用这些指南还将允许环境更加标准化，从而更容易添加新资源、进行故障排除以及让新管理员定位必要的组件。\n\
  \n\n\n### Oracle 目录服务\n\nOracle 统一目录 (`OUD`) 支持多级负载均衡和分布。最基本的形式是简单负载均衡。这种实现允许代理根据服务器状态和负载来确定哪个节点应处理请求。这会在一个或多个服务器之间均匀分配工作量，从而提供故障转移和性能提升，如图\
  \ 2-4 所示。\n\n![A352855_1_En_2_Fig4_HTML.jpg](img/A352855_1_En_2_Fig4_HTML.jpg)\n\
  图 2-4：Oracle 目录服务的简单复制以实现负载均衡。\n\n图 2-4 描述了一个简单负载均衡场景。`LDAP 服务器 1` 上的所有数据都被复制到 `LDAP\
  \ 服务器 2`。统一目录代理在两个 LDAP 服务器之间处理负载均衡，从而减轻单个服务器实例的整体负载。在这种情况下，可以通过代理配置负载均衡。使用 Oracle\
  \ 统一目录代理，可以将环境配置为按数据分布拆分工作负载。通过简单分布，数据被分区，因此每个服务器只存储整体数据的一部分。代理知道每个分区的内容，并将数据适当地路由到节点。\n\
  \n图 2-5 描述了一个环境，其中身份信息被拆分，使得字母表的前半部分位于 `LDAP 服务器 1`，后半部分位于 `LDAP 服务器 2`。这种分布通过根据所需数据拆分工作来减轻服务器工作负载。支持的分布算法包括数值、词典和\
  \ DN 模式。\n\n![A352855_1_En_2_Fig5_HTML.jpg](img/A352855_1_En_2_Fig5_HTML.jpg)\n\
  图 2-5：Oracle 目录服务的简单分布。\n\n在前面提到的简单复制和简单分布式架构的基础上，数据中心之间的故障转移实现了最大可用性和灾难恢复拓扑。在此架构中，负载不仅跨多个服务器拆分，而且跨数据中心复制。这提供了一个负载均衡的环境，当一个数据中心发生中断或饱和时，可以故障转移到另一个数据中心。图\
  \ 2-6 展示了一个这样的例子。\n\n![A352855_1_En_2_Fig6_HTML.jpg](img/A352855_1_En_2_Fig6_HTML.jpg)\n\
  图 2-6：带有副本节点的负载均衡站点。\n\n图 2-6 描述了一个环境，其中 LDAP 服务器在 `数据中心 1` 内复制，并且该环境被复制到 `数据中心\
  \ 2`。每个数据中心内部的负载均衡根据组织的需求进行配置。故障转移事件可以配置为在 `数据中心 1` 丢失时将请求路由到 `数据中心 2`。然而，另一个选项是为饱和事件配置故障转移。如果\
  \ `数据中心 1` 变得不堪重负，请求可以被发送到 `数据中心 2`，直到饱和度恢复到正常水平。\n\n前面的示例提供了基于每个服务器上复制数据的、数据中心内部服务器间的负载均衡。下一个选项涉及在单个数据中心内的服务器间对分布式数据进行负载均衡。对于缺乏辅助数据中心，但拥有庞大的身份数据需求且预期负载很重的组织来说，此选项将是理想的选择。如图\
  \ 2-7 所示，身份数据按字母顺序分布在两个 LDAP 服务器上，同时多个故障转移节点提供稳定性和负载均衡。\n\n![A352855_1_En_2_Fig7_HTML.jpg](img/A352855_1_En_2_Fig7_HTML.jpg)\n\
  图 2-7：负载均衡的分布式数据。\n\n在图 2-7 中，身份数据分布在两个服务器上，允许每个分区仅根据查询字符串提供服务。然后每个分区被复制到第二个实例以实现负载均衡。这种架构提供了极快的性能，因为请求会根据服务器包含的内容以及与其他服务器相比所承受的负载被定向到特定服务器。\n\
  \n尽管负载均衡的分布式架构提供了高水平的性能，并在服务器出现问题时提供了一定程度的冗余，但如果数据中心出现问题，它提供的故障转移能力有限。可用性和性能的终极方案结合了所有这些概念，创建了一个多数据中心的负载均衡分布式数据环境。图\
  \ 2-8 展示了跨多个故障转移站点的分布式架构。\n\n![A352855_1_En_2_Fig8_HTML.jpg](img/A352855_1_En_2_Fig8_HTML.jpg)\n\
  图 2-8：带有跨数据中心故障转移的负载均衡分布式数据。\n\n采用图 2-8 所描述的、带有跨数据中心故障转移的负载均衡分布式数据方案，`LDAP 服务器 A\
  \ 到 L` 在 `数据中心 1` 内复制。然后这些数据被复制到 `数据中心 2` 中的两个 `LDAP 服务器 A 到 L` 实例。这产生了一个负载均衡的身份数据分区，可以在发生中断时故障转移到另一个数据中心。和之前一样，通过允许每个服务器处理整体数据的一个子集，它减轻了单个服务器的负载。然后，通过为单个数据分区跨多个服务器拆分负载，提高了可靠性和性能。此外，可以为每个分区配置故障转移，以便根据状态或饱和度重定向请求。\n\
  \n### Oracle 访问管理器\n\n`OAM` 利用 `WLS` 集群功能来提供高可用性和性能可扩展性。这些功能依赖于从 Web 层到数据库层的适当设置。需要注意的是，为了获得更高的可用性和性能，在\
  \ `OHS` Web 服务器之前，应由负载均衡器处理所有 HTTP 请求，并为 HTTP 流量启用会话粘性。`OAM` 负载均衡和简单故障转移如图 2-9 所示。\n\
  \n![A352855_1_En_2_Fig9_HTML.jpg](img/A352855_1_En_2_Fig9_HTML.jpg)\n图 2-9：基本的 Oracle\
  \ 访问管理本地高可用性架构。\n\n在如图 2-9 所示的 Oracle 访问管理本地高可用性架构中，请求首先由负载均衡的 Web 层处理，该层由两个或多个带有\
  \ `mod_wl_ohs` 模块的 Oracle HTTP 服务器组成。`mod_wl_ohs` 模块使用一个名为 `mod_wl_ohs.conf` 的文件进行配置，该文件标识了\
  \ WebLogic 托管服务器的位置。如果 `OAM` 保护所请求的资源，则在 `OHS` 实例上配置的 `WebGate` 组件会收集必要的凭证并将其转发给\
  \ `OAM`。需要注意的是，应在负载均衡器上设置 HTTP 会话粘性，以确保后续用户请求被路由到正确的服务器。\n\n`OAM` 部署在一组 `WLS` 上，并使用标准的域、计算机和集群功能进行集群。与普通集群一样，`管理服务器`\
  \ 安装在两个 WebLogic 节点上。但是，它一次只在一台服务器上运行。`OAM 服务器 1` 和 `OAM 服务器 2` 部署在 `OAM 主机 1` 和\
  \ `OAM 主机 2` 上配置的机器上。由于两台机器属于同一个 WebLogic 域，因此它们可以由运行在 `OAM 主机 1` 上的单个 `管理服务器` 实例控制。\n\
  \n从 `OAM 服务器` 实例出发，身份验证查询通过负载均衡器发送到后端 LDAP 服务器。如前一节所述，LDAP 服务器可以是 `OVD`、`OID` 或\
  \ `OUD`。为了获得最佳性能和可用性，LDAP 服务器层应配置为负载均衡，如前一节所述。\n\n虽然 Oracle 访问管理的单个实例可以支持大量用户，同时仍能提供良好的性能，但多实例配置可以提供冗余以实现容错和恢复，以及负载均衡以提供更好的性能。\n\
  \n\n### Oracle Identity Manager\n\n与 `OAM` 类似，`OIM` 也依赖 `WebLogic` 架构来实现性能集群和高可用性。然而，由于其依赖于\
  \ Oracle 面向服务的架构（`SOA`），因此多了一层复杂性。此外，配置为使用 `RAC` 数据库的 `OIM` 集群，如果数据库发生故障，将要求用户重新提交他们的请求。为了提供高可用性和负载均衡以优化性能，`OIM`\
  \ 必须在从 Web 层到数据库和 LDAP 层的每一层都配置集群。图 2-10 展示了 Oracle Identity Management 的高可用性架构。\n\
  \n![A352855_1_En_2_Fig10_HTML.jpg](img/A352855_1_En_2_Fig10_HTML.jpg)\n\n图 2-10.\
  \ Oracle Identity Management 本地高可用性架构\n\n请注意图 2-10 的几个细节。\n\n*   `OIM Host 1` 和\
  \ `OIM Host 2` 上均已部署了 `OIM` 托管服务器。\n*   `OIM Host 1` 和 `OIM Host 2` 上均已部署了 `SOA`\
  \ 托管服务器。\n*   `管理服务器`可以安装在两个主机上，但一次只能在一个节点上运行。\n*   `RAC` 数据库在两个节点上均配置了 `Java 数据库连接\
  \ (JDBC)` 多数据源，以防数据库节点故障。\n*   为 `OIM` 和 `SOA` 配置的虚拟主机名允许在节点丢失时进行故障转移。\n\n将为 Oracle\
  \ Identity and Access Management 的各个组件使用这些架构结合起来，组织可以创建一个可扩展且高可用的环境。尽管每个部分仅展示了一个双节点集群，但它们可以扩展到包含更多节点，甚至可以扩展到包含多个数据中心。然而，扩展到其他数据中心以及提供数据复制和分区超出了本书的范围。讨论这些是为了让读者在实施环境之前考虑这些选项，因为需要特别考量。\n\
  \nOracle Identity and Access Management 的每个组件都在单独的章节中进行了介绍，因为每个组件都是一个构建块，可以根据组织需求的发展单独实施。尽管它们可以安装在完全独立的硬件或单一服务器上，但将它们安装在不同的\
  \ `WLS` 实例中将简化软件生命周期管理。\n\n根据需要分阶段实施，允许组织安装满足其需求的最低限度的软件。例如，如果组织的短期需求是一个用于集中管理或应用程序认证的身份存储库，则可以使用\
  \ `Oracle Directory Services`，而无需 `Identity Manager` 或 `Access Manager` 的额外开销。之后可以添加\
  \ `OAM` 以提供单点登录 (`SSO`)，随后可以实施 `OIM` 来完善技术栈，并提供对身份治理和完整身份生命周期管理的访问。\n\n将 Identity\
  \ and Access Management 的各个组件保持在独立的 `WebLogic` 环境中，简化了软件生命周期的管理。组织经常可能需要升级技术栈中的某一部分，例如\
  \ `Oracle Directory Services`，同时保持 `OIM` 和 `OAM` 在其当前版本。`WLS` 可能需要为 `OIM` 打补丁，但这个补丁可能会对\
  \ `OAM` 产生不利影响。在这些情况下，将每个组件放在独立的 `WLS` 主目录中，将确保可以执行和测试补丁与升级，而不会危及其他功能。\n\n在确定如何实施这些组件时，必须考虑所选方法的复杂性与可管理性之间的权衡。对于某些组织来说，在独立的\
  \ `WebLogic` 环境中安装每个组件可能看起来是最佳的综合选择，而其他组织可能会决定将 `OAM` 和 `OIM` 组合在同一个域中，同时分离 `Oracle\
  \ Directory Server` 是最好的。\n\n## 前提条件\n\n与任何软件一样，`Oracle Identity and Access Management\
  \ Suite` 也有其自身的一系列要求，必须满足这些要求才能成功实施。与 Oracle 的所有产品一样，Oracle 提供了一个经过认证的环境列表，包括 `操作系统`、Java\
  \ 运行时环境、应用服务器和 `CPU` 架构。满足这些认证将确保环境在基准水平上运行，并在需要时获得 Oracle 的适当支持。\n\n### 操作系统\n\n\
  `Fusion Middleware` 套件中的产品和应用程序可以部署在多种经过认证的 `操作系统` 上。每个组织运行其选择的操作系统都有不同的原因。因此，本书的范围不包括操作系统建议。在规划阶段确保\
  \ Oracle 对将要使用的操作系统进行认证非常重要。这些认证还将包括任何所需的补丁和软件包，以使安装成功。\n\n### Fusion Middleware\
  \ 硬件要求\n\n满足 Identity and Access Management 的系统要求首先要确保满足 `Fusion Middleware` 环境的硬件要求。这包括\
  \ `CPU`、内存、存储和网络配置。此处提供的信息代表了 Oracle 提供的最低要求，但在大多数情况下，超出这些最低要求将为增长提供空间，并能够处理应用程序负载的突然变化。\n\
  \n在其安装规划指南中，Oracle 提供了典型的 `CPU` 配置列表。对于 Identity and Access Management `11.1.2.x`，建议环境满足以下指导原则。每个组件的推荐架构如表\
  \ 2-1 所示。\n\n表 2-1. 推荐的 CPU 配置\n\n| 托管服务器 | 处理器 |\n| --- | --- |\n| Oracle Access\
  \ Manager | 6 个或更多 X Pentium 1.5 GHz 或更高 |\n| Oracle Directory Services | 2 个或更多\
  \ X Pentium 1.5 GHz 或更高 |\n| Oracle Identity Manager | 6 个或更多 X Pentium 1.5 GHz\
  \ 或更高 |\n\n一般来说，`Oracle Identity and Access Management` 产品要求最低内存可用性大于 4 GB。因此，必须使用\
  \ `64 位` `操作系统` 并安装在 `64 位` `CPU` 架构上。还应注意，`64 位` `CPU` 每秒能够执行的计算量比 `32 位` `CPU`\
  \ 更多。尽管在许多情况下，Oracle 提供其产品的 `32 位` 版本，但 `64 位` 处理能力及其支持的发展为性能和可扩展性带来了诸多改进。\n\n\n\
  ### WebLogic Server\n\n本节中的数字针对基本的`WLS`。通常，服务器需要 8 GB 物理内存和 16 GB 可用内存。随着托管服务器和身份与访问管理组件的部署，将需要额外的内存。内存要求的具体细节见表\
  \ 2-2。\n\n表 2-2. 按操作系统划分的 Fusion Middleware 最低内存要求\n\n| 操作系统 | 最低物理内存 | 最低可用内存 |\n\
  | --- | --- | --- |\n| UNIX | 8 GB | 16 GB |\n| Linux | 8 GB | 16 GB |\n| Windows\
  \ | 8 GB | 16 GB |\n\n在这种情况下，可用内存等于物理内存加上交换内存。然而，允许更多的可用内存由物理内存构成，将通过减少存储在磁盘上的交换内存的\
  \ I/O 来提高性能。此基线计算假设操作系统需要 4 GB，加上`WebLogic`和管理服务器需要 4 GB：\n\n```\n    4 GB of memory\
  \ for the OS\n+    4 GB of memory for WLS and the Admin Server\n_________________________________________________________\n\
  \    Total physical memory required\n```\n\nFusion Middleware 环境的存储要求可能会有很大差异。Oracle\
  \ 至少推荐 10 GB 的存储。应该考虑到日志记录和额外部署的软件会增加这个数字。安装完成并环境稳定后，降低任何已部署应用程序和托管服务器的日志记录级别配置可能是谨慎的做法。\n\
  \n### Oracle Directory Services\n\n建议将`OUD`安装在与 Oracle 身份和访问管理实例分开的主机上。这是为了将`LDAP`身份存储库放置在与数据库相同的内部网络层中。在之前展示的架构图中，您会注意到`LDAP`和数据库环境被放置在一个与应用程序中间件层分开的层中。因此，Oracle\
  \ 目录服务的内存要求将与 Oracle 身份和访问管理组件分开呈现。\n\n`OUD`是一个基于 Java 的`LDAP`目录服务器。因此，与其他 Fusion\
  \ Middleware 产品一样，它安装在受支持的应用服务器中。本节的要求是针对软件安装的，必须与 Fusion Middleware 的最低要求相结合。这将在后面展示。\n\
  \nOracle 推荐为`OUD`分配 2 GB 物理内存，以便在生产环境中以最佳水平运行。这是除了 Fusion Middleware 所需的 8 GB 之外的。可以配置`OUD`的\
  \ Java 虚拟机（`JVM`）以确保使用足够的内存而不会使服务器过载，这将在本书的安装部分讨论。整体内存要求的计算可以简单地如下进行：\n\n```\n \
  \   4 GB of memory for the OS\n+    4 GB of memory for WebLogic and the Administration\
  \ Server\n+    2 GB of memory for the OUD JVM\n___________________________________________________________\n\
  \    10 GB physical memory required for OUD\n```\n\n需要注意的是，`OUD`使用一个小数据库来存储`LDAP`条目。此数据库至少需要\
  \ 1 GB 的磁盘存储。根据日志配置或复制设置，这可能会增加到 30 到 40 GB。确保正确配置日志记录和轮转以防止存储问题非常重要。Oracle 还建议，通过调整内存大小使得整个数据库文件可以加载到内存中，可以提高性能。\n\
  \n### Oracle Identity and Access Manager\n\n尽管将`LDAP`存储库与身份和访问管理节点分开是个好主意，但在大多数情况下，Oracle\
  \ 身份和访问管理器可以安装在同一物理主机上。是否将其安装到单独的 Fusion Middleware 环境中取决于安装者。但是，内存要求将保持不变。\n\n\
  `OAM`的最低要求内存是 4 GB 物理内存和 8 GB 可用内存，而承载`OIM`的主机还必须考虑`SOA`。因此，`OIM`主机仅托管服务器就需要至少 8\
  \ GB 物理内存和 16 GB 可用内存。这是除了 Fusion Middleware 基础设施的最低要求（即 8 GB）之外的。将这些加在一起可以得到以下计算：\n\
  \n```\n    4 GB for the OS\n+    4 GB for WebLogic and the Administration Server\n\
  +    4 GB for OIM Managed Server\n+    4 GB for SOA Managed Server\n+    4 GB for\
  \ the OIM Administration Server\n____________________________________________________________\n\
  \    20 GB memory required for OIM\n```\n\n如果`OAM`与`OIM`安装在同一主机的同一个`WebLogic`实例中，则还需要额外的\
  \ 8 GB。在这 8 GB 中，4 GB 分配给`OAM`管理服务器，另外 4 GB 分配给访问管理器托管服务器。由于需要额外的 4 GB 用于另一个`WebLogic`实例，可能希望将`OAM`托管服务器安装在与`OIM`实例相同的域中。\n\
  \n#### 集群考虑因素\n\n在 Fusion Middleware 中，集群被定义为多个`WLS`协同工作以提高可靠性和性能。如前所述，只要资源足够，可以在单台机器上或在多台机器上向集群域添加更多实例。\n\
  \n在确定集群规划时，努力遵循最佳实践很重要。实现集群环境本质上会增加复杂性。不再是单个实例处理所有服务，而是增加了额外的实例，从而增加了对复杂会话处理、负载均衡、分布式处理和复制的需求。\n\
  \n##### 主机配置\n\n尽管 Oracle 推荐每两个`CPU`仅使用一个`WebLogic`实例，但仔细的规划和容量规划将确保环境能够处理预期的负载。Fusion\
  \ Middleware 环境和 Oracle 身份产品的线性可扩展性允许随着组织需求的增长而实现未来的增长。应该注意的是，物理服务器不需要配置相同的硬件。但是，每台服务器必须满足支持已部署应用程序所需的最低要求。也可以将集群托管服务器部署在不同的物理主机上。\n\
  \n例如，`Host_1`可能包含管理服务器、身份管理器和访问管理器，而`Host_2`仅包含身份管理器，访问管理器则部署在`Host_3`上。图 2-11 描绘了物理主机上身份管理组件的基本分布。\n\
  \n![A352855_1_En_2_Fig11_HTML.jpg](img/A352855_1_En_2_Fig11_HTML.jpg)\n\n图 2-11.\
  \ 在多台主机上分布身份管理器集群\n\n\n\n### 网络规划\n\n随着服务器数量的增加，集群环境对网络的需求也随之增长。根据组织的网络拓扑结构（例如 DMZ\
  \ | 应用层 或 DMZ | 应用层 | 数据层），防火墙和负载均衡器的数量也会变化。在每一层，都需要配置防火墙以允许适当的通信。在许多情况下，组织有两个主要的网络区域：公共区域/隔离区（DMZ）和一个内网或内部区域。为简单起见，本书将介绍这种双区域配置。\n\
  \n公共区域或隔离区通常包含 Web 服务器，它们为位于内网区域的应用提供前端代理。这有助于将内部应用区域与公共区域隔离，通过限制内部通信仅使用批准的协议和端口来保护资源。在隔离区内，负载均衡器负责在一个或多个\
  \ Web 服务器之间分配负载，而防火墙则用于限制通信。这提供了更严格的安全性、故障转移和性能优势。\n\n在内网区域中，应用服务器和数据库服务器向用户提供服务。这些服务通过隔离区中列出的代理和\
  \ Web 服务器进行访问。由于防火墙限制了访问，此区域内的服务器通常配置为仅在指定端口上通信。在某些情况下，例如数据库服务器，可能需要负载均衡器来处理故障转移和负载均衡任务。在其他情况下，使用配置了\
  \ WLS 模块的 Web 服务器即可处理负载均衡。负载均衡器也可用作安全套接层（SSL）端点，从而减轻底层服务器的加密处理负担。\n\n无论使用何种负载均衡技术，组织都应确保其能够提供以下功能：\n\
  \n*   监控 HTTP 和 HTTPS 流量。\n*   维护多个虚拟服务器名称和端口。\n*   检测服务器状态。\n*   在服务器故障时重新路由请求。\n\
  *   SSL 管理、加速、终止等。\n*   能够向 HTTP 请求处理程序添加 `WL-Proxy-SSL : true`。\n\n## 总结\n\n本章介绍了许多概念，从硬件要求到部署拓扑和安装前注意事项。本章并未提供关于\
  \ CPU 架构、操作系统和网络硬件等选项的具体建议，而是给出了通用指导原则。每个环境都有不同的要求。然而，所提供的信息应能使组织能够规划其部署策略。\n\n\
  在接下来的章节中，将演示一个双节点集群的安装。在某些情况下，可以在单台服务器上安装多个 Fusion Middleware 主目录和实例。本书将指明这些情况，并说明其背后的原因。\n\
  \n"
- '# 3. 用户和策略存储


  身份和访问管理系统围绕一个核心存储系统构建，该系统能够维护用户信息、角色、策略和凭据。这些存储系统也可用于存储有关网络资源、外设和应用程序的信息。大多数情况下，目录存储使用基于轻量目录访问协议（`LDAP`）的系统。其他存储方法包括数据库存储和文件存储。然而，`LDAP`
  提供了一个更广泛接受的标准，并且与更广泛的应用程序兼容。


  `LDAP` 定义了一种标准方法，用于访问有关身份数据、网络资源、外设，甚至加密证书和服务的信息。身份信息可以包含用户凭据、联系信息以及其他用于识别个人的相关数据。这些数据可以被电子邮件等应用程序用于电子邮件地址。或许最有用的功能是提供身份验证和角色定义的能力。应用程序可以使用目录和标准的
  `LDAP` 命令来确保用户能够访问系统，并且只能访问他们被授权使用的数据。


  ## 用户和策略存储概述


  存储在 `LDAP` 目录中的数据通常以有组织的方式构建，以便在浏览和查询信息时更易于访问。此外，这些对象符合定义的格式，包括必需和强制的属性。这些属性不仅有助于识别人或对象，还使应用程序能够查询符合特定条件的用户组。


  虽然 `LDAP` 并未定义存储什么数据或其结构如何，但它定义了数据的访问方式。基于 `LDAP` 的目录的优势在于，任何平台上运行的应用程序都可以访问它们。这些应用程序可以使用
  `TCP/IP`、`LDAP` 协议和 `HTTP` 来查询目录存储。因此，可以通过使用安全套接层（`SSL`）和传输层安全性（`TLS`）来提供额外的安全性。这通过提供实施安全性的标准方法，允许更快地开发应用程序。存在多种用于管理和浏览目录的查询工具。


  其他身份存储方法，例如基于文件的安全性和数据库用户存储，未提供标准的数据访问方法。这会导致应用程序开发效率低下，因为应用程序必须考虑到身份存储来开发，并且开发人员必须知道如何访问必要的信息。此外，当组织从传统系统迁移到新产品或新的开发工作时，这可能会导致兼容性问题。


  如前所述，用户信息（如凭据和联系数据）可以存储在 `LDAP` 目录中。数据通常以树状结构存储，使组织更容易。在大多数情况下，树的根部定义了组织或安全领域。基本可分辨名称（`DN`）可以设置为类似
  `dc=mycompany,dc=com` 的形式，其中 `DC` 代表域组件。这提供了一个有效的组织标识，同时足够高层，可以根据地区、业务部门或企业定义的其他分类来细分较低层级。目录树可能类似于图
  3-1。


  ![A352855_1_En_3_Fig1_HTML.jpg](img/A352855_1_En_3_Fig1_HTML.jpg)


  **图 3-1.** 按区域划分用户和组的 `LDAP` 目录结构示例（管理员可以使用组织单位，而不是使用 `CN` 或通用名称）


  ```

  dc=mycompany,dc=com

  ou=users

  ou=NorthAmerica

  ou=US

  ou=Canada

  ou =Mexico

  ou=Asia

  ou =Japan

  ou =China

  ou =Taiwan

  ```


  需要注意的是，这些都是示例。各个组织可能希望按地区、国家、业务部门或资源进行组织，如图 3-2 所示。


  ![A352855_1_En_3_Fig2_HTML.jpg](img/A352855_1_En_3_Fig2_HTML.jpg)


  **图 3-2.** 区域内用户和组的 `LDAP` 结构示例


  由于 `LDAP` 并未规定数据结构或粒度，公司在很大程度上可以自由地根据当前和未来的情况，以合理的方式创建目录结构。设计决策可能是基于分布式管理、未来数据分区计划或许多其他原因。


  用户和资源条目存储在这些分支中。大多数情况下，用户身份就是这样存储的。例如，用户 John Daily 可能在 mycompany 的美国分公司工作。在第一个示例中，该条目可以通过
  `cn=john.daily,ou=US,ou=NorthAmerica,ou=users,dc=mycompany,dc=com` 来唯一标识。这就是所谓的
  `DN`。通常使用基于名称的方法来分配 `DN`，例如 `john.daily`。然而，其他组织可能希望使用分配的标识符来创建用户账户，以简化名称更改或防止如果有第二个
  John Daily 加入公司时出现重复用户账户。




  如果各个条目不包含可用于识别用户的标准化信息，那么整理用户条目几乎没有用处。除了存储联系信息外，用户目录还可用于维护活动数据，例如上次登录时间或上次登录终端。这些数据可用于跟踪历史记录，在更高级的系统中，它还可通过向管理员或用户提示异常活动来识别可能的欺诈行为。与此同时，有关失败登录的信息可用于在尝试次数过多后锁定账户。为确保特定类型的每个条目都包含相同的可用数据，目录可以通过对象类进行配置。


  对象类用于定义每个条目必须配置的标准属性。这有助于强制要求必填字段和可选数据，以便在查询用户时，无论返回哪个用户，客户端都能确保检索到预期的结果。可以为各种类型的条目创建对象类，包括用户、网络资源、外设，甚至会议室。对象类的定义由管理员构建，可以简单到只需一两个必填字段，也可以包含子对象类以及必填和可选属性的组合。


  例如，对象类可以将一个 `person` 定义为需要 `Surname` 或 `sn`、`Common Name` 或 `cn`、`Given Name` 和
  `Date of Birth`。一个额外的对象类 `organizationPerson` 可能会被定义为包含 `manager`、`department`、`telephone
  number` 和 `office location` 等属性。还可以创建具有不同属性配置文件的更多对象类，例如一个名为 `user` 的类，它可能要求用于身份验证的属性，如
  `password` 或 `failedLoginAttempts`。目录中的条目可以使用一个或多个对象类来创建，并且可以定义目录树的整个分支，使得该分支中的所有条目都使用相同的对象类组合创建，从而确保北美组织单元内的所有用户都按照图
  3-3 所示的 `Person`、`OrganizationPerson` 和 `User` 属性创建。


  ![A352855_1_En_3_Fig3_HTML.jpg](img/A352855_1_En_3_Fig3_HTML.jpg)


  图 3-3.

  对象类和用户对象示例


  应用程序权限和对网络资源的访问授权可以在目录存储中定义。与用户身份类似，角色和权限通常也组织成目录结构。虽然可以单独为用户在应用程序或其他系统中授予权限，但在
  `LDAP` 目录中使用组可以提供为多个用户授予相同权限的能力。它还将用户到权限的映射和处理负担转移到了 `LDAP` 目录上。


  目录中的组可以由用户条目或其他组构成。存储在目录中后，应用程序可以使用标准的 `LDAP` 应用程序编程接口（`API`）命令，在授予访问请求资源之前验证用户的组成员资格。这些应用程序角色通常直接映射到应用程序内的权限。


  企业内多个目录的存在增加了管理工作量和成本。当一个组织维护一个网络用户目录、可能还有两三个应用程序目录，以及其他系统的专有身份目录时，每个目录都需要进行管理以跟上不断变化的局面。这需要为每个目录投入更多的人力资源时间。除了持续管理外，还需要进行设置和配置所需的时间，以及保持所有目录以最佳水平运行所需的计算能力和网络资源。


  由于管理多个目录所需的管理任务，各种身份存储变得不一致是非常常见的。在身份生命周期的设置、维护和移除过程中，确保用户账户在多个存储中创建可能变得非常繁琐。这导致了账户在一个目录中创建或删除但在其他目录中没有的可能性。因此，当新用户尝试访问他们尚未获得账户的资源时，速度会减慢。另一方面，这也带来了本应停用的用户仍然可以访问机密信息的可能性。


  如前所述，多个目录引发了许多安全问题，这些问题的发生是由于难以保持所有实例同步。除此之外，它还会导致数据不一致。随着目录的管理以及用户条目在多个位置被修改，条目属性可能会变得过时。结果，应用程序可能无法访问关于用户或权限的最新信息。


  ### Oracle Internet Directory


  Oracle Internet Directory (`OID`) 是 Oracle 基于数据库的、兼容 `LDAP` v3 的目录服务器。它不仅能够存储身份数据，还能与现有的其他数据存储进行同步。基于
  Oracle 数据库，`OID` 能够利用高级功能，在存储和备份层面提供高水平的安全性。`OID` 的可扩展性支持大量用户和事务，即使在多站点环境中也是如此。高可用性是组织关注的一个关键问题。`OID`
  提供了相关机制，帮助 IT 部门为其客户提供极高的可靠性。总体而言，`OID` 为组织提供了其可能需要的所有身份和策略存储选项。


  作为目录服务器，`OID` 围绕 `LDAP` v3 兼容性构建。这不仅确保了 Oracle 应用程序可以引用 `OID`，而且其他具有 `LDAP` 兼容性的第三方应用程序和服务也能够利用组织的投资。与
  Active Directory 等网络访问目录或特定于应用程序的目录不同，`OID` 是一个通用目录。通用目录遵循一个共同的标准，可以支持不同的应用程序。尽管
  Active Directory（一种网络）是 `LDAP` 标准的实现，但它专为网络操作系统（`OS`）定制，并包含网络身份验证和授权所需的属性。它是一个更专业的工具，可能更难以适应通用目的。因此，`OID`
  为公司提供了一个整合目录以使用 `OID` 的平台。



  ### 安全与数据隐私


  如果一个组织正在考虑使用 Oracle Identity Management，那么安全必然是其首要关注点之一。从客户端/提供者层一直到数据存储甚至备份层级，都应维持高水平的安全性。在客户端应用和认证层面，OID
  支持 `SSL`。`SSL` 确保数据在通过网络发送之前被加密。在此基础上，它提供了相应的机制来确认接收方是经过授权的，对数据进行解密，并确保消息的完整性。


  如前所述，以安全方式传输数据可确保消息不会被第三方截获和解读。一旦请求者接收到数据或将其写入磁盘，数据隐私方面的考量要求在这些层面也必须极其谨慎地保护数据。OID
  使用 Oracle 数据库作为其数据存储，因此能够利用先进的数据库功能来实现这一目标。


  Oracle 透明数据加密 (`TDE`) 为 OID 提供了一种加密在数据库内写入磁盘的数据的方法。当 OID 数据写入数据库时，配置了 `TDE` 的表空间确保数据在写入数据文件时即被加密。随后，当结果集返回给客户端时，数据会被解密。如果存储设备或备份丢失或被盗，加密技术可确保身份数据保持私密和安全。此加密层发生在数据库内部。拥有正确授权并使用已授权应用程序的用户可以正常查看数据，无需任何额外要求。然而，试图绕过应用程序直接从数据库文件读取数据的未经授权人员或进程，将只能看到加密数据。所有这些对应用程序都是透明的，这意味着
  OID 不需要任何额外的配置更改即可利用数据库内的此功能。图 3-4 描绘了一个 `TDE` 环境。


  ![A352855_1_En_3_Fig4_HTML.jpg](img/A352855_1_En_3_Fig4_HTML.jpg)

  图 3-4. 透明数据加密


  身份数据不仅需要防范入侵者的安全，有时还必须防范来自内部的威胁，这些威胁甚至可能包括拥有特权数据库账户的用户。不幸的是，大多数内部数据库账户（如 `sys` 或
  `system`）被许多人所知晓，例如数据库管理员 (`DBAs`)。这可能导致对关键数据的未授权访问，即使访问是无意的。Oracle Database Vault
  允许管理员有效地将数据库账户锁定在应用数据之外，同时仍允许这些账户执行数据库管理操作。因此，通过防止特权账户访问 OID 使用的私密身份数据，这提高了数据库层的安全性。


  即使不在数据库内使用 `TDE` 或 Data Vault，OID 也开箱即用地支持对敏感数据元素进行加密。敏感属性包括 `orclpasswordattribute`
  和 `orclrevpwd`。此类值在存储操作期间被加密，并在需要时被解密。如果 OID 内启用了数据隐私模式（这是默认模式），则使用 `AES256` 对这些值进行加密。


  ### 易用性与管理


  本书前面已经讨论过，安全不应成为应用程序性能或用户生产力的瓶颈。提高安全性不应需要复杂的界面或额外的资源来维护。OID 通过使用 Oracle 的 Fusion
  Middleware Control 界面和 Oracle Directory Service Manager (`ODSM`) 简化了管理任务和环境管理。结合这些图形用户界面
  (`GUI`) 和各种命令行选项，可以轻松地管理和监控 OID。这使得故障排除和持续维护更加简单，并使目录管理等日常操作更加直接。


  `ODSM` 界面是 Oracle 基于标准 Web 的 `GUI`，可用于管理 OID、Oracle Virtual Directory (`OVD`) 和
  Oracle Unified Directory (`OUD`)。该界面可被非管理员用户用作基本的 `LDAP` 浏览器，被管理用户用于管理属性、条目和目录对象，甚至用于管理配置条目。


  作为基本的 `LDAP` 浏览器`ODSM` 允许非管理用户能够查看和搜索其他用户。任何经过认证的用户（即存在并输入了有效凭据的用户）都可以浏览目录。组织无需开发自定义应用程序或投资昂贵的第三方产品，即可让其用户利用
  OID 搜索目录中其他用户的联系信息。需要注意的是，当非特权用户登录 `ODSM` 界面时，他或她将只能查看“数据浏览器”选项卡，而无法对目录进行任何更改。该用户的视图也将仅限于他或她被授权访问的数据。


  管理用户可以将 `ODSM` 用作管理工具。当超级用户账户 `cn=orcladmin` 或 `DirectoryAdminGroup` 的成员登录时，该用户将看到比普通认证用户更多的数据选项。管理用户可以浏览相同的数据，但可以选择创建和修改用户及组条目、管理策略（如密码策略），甚至创建新的对象类和对象类型。这些用户还能够管理系统配置条目。


  维护 OID 不仅仅是管理目录和跟踪 `LDAP` 条目。还需要持续监控系统性能、监控系统状态，并管理后台进程，例如目录集成平台 (`DIP`)。Fusion
  Middleware Control 界面是一个基于 Web 的工具，允许系统管理员执行这些操作。


  如果 OID 安装在 WebLogic 域中，`WLS` 提供对控制屏幕的访问。在 Fusion Middleware Control 提供的众多功能中，它允许管理员查看性能摘要、启动和停止环境、查看端口使用情况、获取大小调整建议、设置与其他
  `LDAP` 实例的同步和复制，以及管理安全。图 3-5 显示了 Fusion Middleware Control 摘要屏幕。使用此屏幕，管理员可以获得 OID
  状态的高级视图。


  ![A352855_1_En_3_Fig5_HTML.jpg](img/A352855_1_En_3_Fig5_HTML.jpg)

  图 3-5. Fusion Middleware Control 摘要屏幕


  管理员访问 WebLogic Fusion Middleware Control 屏幕后，可以深入查看各个部署和应用程序，如图 3-6 所示。在这些屏幕中，您不仅可以看到当前的统计数据和状态，还有可用于修改和维护环境的菜单。


  ![A352855_1_En_3_Fig6_HTML.jpg](img/A352855_1_En_3_Fig6_HTML.jpg)

  图 3-6. Oracle Internet Directory 摘要


  用于 OID 的另一个关键管理工具是 `ODSM`。从图 3-7 所示的工具中，管理员可以浏览、添加、编辑和删除各种目录属性，包括用户、组、策略和操作特性。


  ![A352855_1_En_3_Fig7_HTML.jpg](img/A352855_1_En_3_Fig7_HTML.jpg)

  图 3-7. Oracle Directory Services Manager




  ### 目录同步


  多年来，OID 一直是 Oracle 身份管理解决方案以及众多 Oracle 应用程序和融合中间件产品中应用安全的核心，这些产品在设计上都围绕 OID 进行身份验证和授权。正因如此，在那些已部署
  Oracle 产品的组织中，OID 已稳固地成为事实上的安全标准。然而，很少有组织愿意从他们的网络目录访问平台（如活动目录）迁移出来。对大多数组织而言，活动目录提供了高级别的网络安全。OID
  则允许进行定制，以用作应用或通用身份目录。其由 DIP 提供的同步功能，是关键能力，使组织能够保留在活动目录或其他第三方目录系统上的投资，同时利用 OID 的优势来支撑他们的应用程序。


  DIP 使组织能够保持 OID 与不同目录系统的同步。可以为 DIP 创建配置文件，以连接并复制身份数据到 OID。在此复制过程中，集成配置文件允许对身份数据进行转换，以匹配
  OID 环境或使用它的应用程序所需的结构和属性。DIP 可以根据组织在性能和目录规模方面的要求进行配置。或许组织拥有一个遍布全球的庞大用户群。重新组织数据结构可能是有意义的。使用
  DIP，OID 中的数据结构不一定需要与活动目录中存储的结构相匹配。DIP 支持将多个身份存储同步到单个 OID 实例。由于 OID 支持存储多个上下文，组织可以轻松地组织和来自每个存储的用户。图
  3-8 展示了一个示例，说明 DIP 如何将多个不同的目录源整合为一个单一的源。


  ![A352855_1_En_3_Fig8_HTML.jpg](img/A352855_1_En_3_Fig8_HTML.jpg)

  图 3-8. 目录集成平台可视化


  目录同步在出现不一致之前都是一项宝贵的资源。这些不一致最常源于在 OID 中编辑用户或组属性，而真实数据源可能是另一个目录系统，例如活动目录。一个常见的属性是用户密码。用户不希望为不同的系统和应用程序管理多个密码。要求他们这样做会导致安全性削弱，因为用户倾向于将密码写下来或使用更简单的密码。在
  OID 中更改一个从活动目录同步过来的用户密码，可能会导致不一致，从而可能阻止用户登录所需资源。OID 能够使用外部身份验证插件和外部密码过滤器来帮助防止这种情况发生。


  外部身份验证插件允许管理员配置 OID，将凭证验证移交给该用户的源目录。这样做，OID 不会为任何从源复制的用户维护用户密码。相反，用户属性会触发 OID 将凭证传递到源进行验证。因此，有效用户必须在
  OID 和源中都存在，但在 OID 中的密码更改不会影响身份验证，因为唯一有效的密码存储在源中。这样，真实数据源仍然是源目录，密码必须在源目录中更改。DIP 负责保持所有属性同步，而插件处理身份验证，从而提供了一个无需同步密码的、非常安全的环境。使用外部身份验证，如图
  3-9 所示，OID 将凭证验证移交给源目录。


  ![A352855_1_En_3_Fig9_HTML.jpg](img/A352855_1_En_3_Fig9_HTML.jpg)

  图 3-9. 外部身份验证插件


  外部密码过滤器也与 DIP 协同工作。但是，它不是将凭证验证移交给外部目录，而是使源密码能够同步到 OID。为确保围绕密码的数据隐私，在密码从源复制到 OID
  时使用了 SSL 通信。与 DIP 过程非常相似，密码过滤器会在源目录中进行密码更改时，将其复制到 OID。然而，需要注意的是，此过程可能导致数据不一致，因为在
  OID 中进行的密码更改将是有效的。如果之后用户在源中更改其密码，这将触发 OID 中的相同更改，可能会引起一些混淆。与移交凭证验证不同，可以将目录配置为同步密码，如图
  3-10 所示。


  ![A352855_1_En_3_Fig10_HTML.jpg](img/A352855_1_En_3_Fig10_HTML.jpg)

  图 3-10. Oracle Internet Directory 密码过滤器


  外部身份验证插件和外部密码过滤器与 DIP 协同工作，为组织提供了维护一个与企业目录系统保持同步的应用程序目录的能力。这带来了更高效的安全设置，因为管理员只需在企业目录中维护企业用户，就知道这些新增和更新会过滤到
  OID 实例中。


  ## Oracle 统一目录


  Oracle 在通过 OID 提供强大的 LDAP 目录方面拥有悠久的历史。最近，此产品已升级为包含 OUD，这是一个完全用 Java 实现的 LDAP 存储库，它提供了许多可扩展性选项，同时还包括同步、代理和虚拟化等功能。


  ## 架构


  OUD 是基于 Java EE 平台从头开始构建的。据 Oracle 称，这使他们能够利用使用 Java 虚拟机提供的内存管理能力和调优。对于数据存储，OUD
  利用了 Oracle 的 Berkeley Database Java Edition。这个面向对象的数据库提供了一个稳定的平台，非常适合于映射目录中的条目和属性。这种架构允许更少的
  I/O 延迟和与平台无关的备份及管理能力，从而在提高整体性能的同时，使整个系统对系统架构决策的依赖性大大降低。


  与 OID 非常相似，OUD 能够支持高可用性架构。OUD 在设计上将高可用性作为首要任务。它提供了在多个数据中心的多个节点上进行部署的能力，这不仅提供了本地故障转移，还提供了灾难恢复能力。此外，凭借
  OUD 的引用功能和透明重路由能力，中断可以立即故障转移到其他数据中心，从而提供 99.99%的正常运行时间。





  ### 可扩展性


  OUD 架构及其支持多节点和数据中心的能力提供了极高的可用性。结合高可用性，可扩展性使企业能够根据当前需求启动足够大的目录环境，而无需为未来的需求预留空间。Oracle
  声明 OUD 可以在商品服务器上扩展到数十亿用户。这是通过代理功能和将身份数据分布在部署在一系列服务器上的分区中实现的。分区的分布允许工作负载分散在多个服务器之间，从而减少了通常在数据中心仅能将负载平衡到一两个服务器的环境中所见的工作量和
  I/O 操作。


  为了为 OUD 的可扩展性增加最大价值，全局索引允许 OUD 将请求映射到正确的分发分区。OUD 可以利用数据分区将数据存储分散到多个节点，甚至多个数据中心。这不仅有助于分散工作负载，而且如果按区域完成，还可以用来减少网络延迟的影响。如果企业的用户遍布全国甚至全球，它很可能也在不同区域战略性地设有数据中心。利用
  OUD 分区数据的能力，可以将区域用户放置在最适合他们经常工作的区域的服务器上。全局索引使 OUD 能够跟踪条目的位置。如果一个节点收到请求，它会迅速被引导到正确的节点（无论其位置）以验证用户。此功能不仅可以帮助组织降低成本，还可以提高用户生产力。


  ### 复制


  与 OID 类似，OUD 提供了一种在多个节点之间复制数据的机制。此功能对于确保最高可用性至关重要。复制确保在身份存储库的一个节点上更新的数据被传播到集群的其他成员节点。延长的延迟或未正确复制的环境可能导致安全问题，因为用户可能能够访问他或她已被移除一段时间的资源，或者密码更改可能不会立即生效。OUD
  引入了高级复制。高级复制模型使用复制服务器来同步与其他目录服务器的数据更改。通过将复制工作转移到单独的服务器，同步更改的工作从目录服务器上卸载，允许它们将资源集中用于目录查询。为确保复制周围的安全，OUD
  复制服务确保客户端应用程序请求的身份数据仅在数据已复制到其他成员后才被释放。此外，通过防止敏感数据被复制到可能安全性较低的服务器，身份安全性得到提高。


  ### 可用性与可管理性


  与 OID 一样，OUD 使用 ODSM 和 Fusion Middleware Control 进行管理。由于这些内容先前已经讨论过，此处不再赘述。


  ## Oracle Virtual Directory


  大多数组织已经对多个身份存储进行了投资。这些包括他们的网络身份存储、特定于应用程序的身份存储，甚至可能包括特定于业务单元的 LDAP 目录。在许多情况下，各种数据存储包含相同的用户或相同数据的子集。这常常导致混淆，管理员试图管理用户组并了解各种存储的位置。将这些目录同步到中央存储库可能导致其他问题，例如增加的数据存储需求以及确保应用程序能够以预期的方式利用该存储库。引入
  OVD 就是为了这些问题。OVD 允许组织将其身份目录投资整合到一个集中式存储库中，而无需复制数据。


  OVD 被宣传为目录聚合工具。它为组织提供了访问正在使用的各种用户存储库的能力，而无需复制其中包含的数据。此外，OVD 提供数据转换服务，允许应用程序以期望或需要的格式接收数据。OVD
  甚至可以为非 LDAP 类型的源（如基于数据库或文件的身份存储）提供 LDAP 接口。


  ## 架构


  部署在 WLS 上，OVD 利用了许多 WLS 的优势。在 WLS 环境中，OVD 能够与凭证存储、审计和日志框架集成，并使用 Fusion Middleware
  Control 接口进行管理。


  OVD 由四个逻辑层或组件组成，它们协同工作以提供所有服务，例如数据聚合和转换。从第一层开始，OVD 提供了允许外部应用程序连接到它的监听器。下一层由验证请求有效性并确定使用哪个适配器来满足请求的进程组成。请求被传递到一个连接机制，该机制与各种适配器一起操作以检索数据和转换数据集。这些层协同工作，向应用程序提供看似单一数据源的内容。图
  3-11 显示了 OVD 的主要组件。


  `A352855_1_En_3_Fig11_HTML.jpg`


  图 3-11.


  Oracle Virtual Directory 组件


  适配器允许 OUD 连接到基础身份存储，无论是 LDAP 还是数据库存储库。提供了用于连接到 LDAP、数据库和本地存储的适配器。此外，可以配置自定义适配器来处理各种其他存储库。


  由于其架构，OVD 具有极强的容错能力。可以在单独的服务器甚至不同区域部署多个具有相同配置的 OVD 实例。无需复制数据或存储文件，也无需提供数据库高可用性选项。每个
  OVD 实例都使用自己的适配器连接到后端存储库，因此任何实例都可以根据负载平衡或中断来服务请求。此外，数据保证与源存储库一样新。


  除了能够跨多个服务器部署以提供自身的容错能力外，还可以配置 OVD 适配器以在源目录的多个实例之间分散负载。例如，如果有两个使用复制的 Active Directory
  实例，则可以配置 OVD 适配器引用两者，从而在其中一个实例发生故障时提供自动故障转移。




  ### 4. Oracle 目录服务的安装与配置


  Oracle 为轻量级目录访问协议（LDAP）数据存储提供了多种选择。Oracle Internet Directory (`OID`) 和 Oracle Unified
  Directory (`OUD`) 均提供存储功能，而 Oracle Virtual Directory (`OVD`) 则允许将多个不同的 LDAP 存储源呈现为一个单一来源。本章将介绍每个产品的安装与配置步骤。截至本文撰写时，Oracle
  E-Business Suite 已认证可用于 `OID`，但尚未认证 `OVD` 或 `OUD`。此处介绍所有三种产品的安装过程，作为未来参考指南。然而，在后续章节中，仅会使用
  `OID`。


  ## 安装前任务


  在开始实际的软件安装并将二进制文件部署到文件系统之前，必须注意有一些任务必须完成，以确保操作成功。应谨慎创建或完成这些任务，例如创建操作系统（OS）用户、设置内核参数以及授予适当的权限。这些事项将在本章后续部分进行介绍。


  ### 操作系统用户


  对于大多数 Oracle 应用程序的安装，应创建操作系统用户和组来执行安装和配置任务。创建操作系统组将允许其他操作系统用户执行与应用程序环境管理相关的特定任务。在
  Linux 环境中安装 Oracle 应用程序时，最常见的操作系统用户和组是 `oracle` 用户以及 `oinstall` 或 `dba` 组。


  要创建必要的 `oinstall` 和 `dba` 组，请以 `root` 用户身份执行以下命令：


  ```

  [root@clouddemolab home]# groupadd oinstall

  [root@clouddemolab home]# groupadd dba

  ```


  创建组后，创建 `oracle` 用户。


  ```

  [root@clouddemolab home]# useradd -g oinstall -G dba oracle

  ```


  注意


  `-g` 表示用户应添加到的主组。`-G` 表示任何附加组。


  要设置用户密码，请以 `root` 用户身份使用以下命令：


  ```

  [root@clouddemolab home]# passwd oracle

  ```


  ### 聚合


  `OVD` 并不存储其呈现的身份数据。相反，通过使用上一节提到的适配器，`OVD` 充当多个后端目录的代理。这降低了与复制和同步多个存储源相关的成本和管理工作量，同时利用了组织内已有的存储库。它还通过减少开发期间所花费的时间和精力来提高效率，因为无需构建新的目录或接口。


  大多数公司都有几个（如果不是几十个）不同的用户存储库。这些可能包括网络或企业目录、特定业务部门的目录、电子邮件、实现其自身目录的启用 `LDAP` 的应用程序，甚至是诸如
  `EBS` 或 `PeopleSoft` 之类的数据库源。在许多情况下，存储在一个源中的数据不易适配与其他应用程序协同工作，因此需要数据复制。通常，控制应用程序的各个业务部门有强制要求他们保留对其目录的控制权。无论出于何种原因必须维护多个数据存储，`OVD`
  都可以整合它们并提供那个单一访问点。


  为了促进身份存储信息的聚合，`OVD` 提供了转换或映射数据以匹配应用程序或后端数据存储预期格式的能力。这些映射以双向流进行。这允许将请求格式化为符合存储要求，同时返回的数据随后被转换为匹配客户端应用程序的要求。`OVD`
  还可以配置为重新映射属性名称和值。


  作为代理，`OVD` 系统地将每个传入请求路由到适当的适配器，使用的逻辑会检查 `DN` 模式、过滤器、属性和查询，以确定满足请求的最佳可用适配器。这减少了为获取结果而需要查询的适配器数量，优化了
  `OVD` 的性能，并允许配置更复杂的环境而不影响性能。


  ### 访问管理


  许多组织正在努力为其用户提供单点登录（`SSO`）功能。然而，如前所述，这些组织可能拥有多个用户存储库。前面提到，`OVD` 为客户端应用程序访问各种后端目录提供了一个统一的前端。访问管理系统也是如此。像
  `OAM` 这样的产品通常需要一个 `LDAP` 存储库来提供身份验证和授权服务。无论后端存储库如何，提供那个 `LDAP` 前端正是 `OVD` 设计的目的。


  `OVD` 为访问管理系统提供的另一个好处是一个抽象层。随着时间的推移，底层数据存储会发生变化。这些变化可能导致客户端应用程序或访问管理系统失败。通过将底层目录结构与客户端应用程序分离，`OVD`
  通过确保数据持续转换或翻译成所需的确切格式来保护它们免受变更影响。


  ## 总结


  本章介绍了构成 Oracle 目录服务的三个主要产品，它们为 Oracle 身份和访问管理提供了基础。`OID` 和 `OUD` 都提供用户管理和存储解决方案，并为客户端应用程序和服务公开
  `LDAP` 接口。`OVD` 帮助组织整合多个目录的管理，并为需要身份验证服务的应用程序提供一个统一的来源。本书的其余部分将集中介绍 `OUD` 的安装，因为
  Oracle 已表示该产品将是 Oracle 目录服务的发展方向。然而，当 `OVD` 提供额外功能或替代解决方案时，也会对其进行讨论。




  ### 操作系统配置


  在安装 Oracle Fusion Middleware 基础架构和 Oracle Identity Management 软件之前，确保操作系统满足最低要求和配置至关重要。以下列出了所需的内核参数、软件包以及需要进行的文件更改。


  需要设置以下内核参数：


  ```

  kernel.sem  256  32000  100  143

  kernel.shmmax 10737418240

  ```


  要设置这些参数，请编辑位于 `/etc` 目录下的 `sysctl.conf` 文件。


  ```

  [root@clouddemolab home]# vi /etc/sysctl.conf

  ```


  在该文件的相应部分添加或编辑以下行：


  ```

  # Controls the maximum number of shared memory segments, in pages

  kernel.shmall = 4294967296

  kernel.sem = 256 32000 100 142

  kernel.shmmax = 10737418240

  ```


  在 `sysctl.conf` 文件中设置这些值后，您必须激活这些设置并使用以下命令验证新值是否生效：


  ```

  [root@clouddemolab home]# /sbin/sysctl –p

  net.ipv4.ip_forward = 0

  net.ipv4.conf.default.rp_filter = 1

  net.ipv4.conf.default.accept_source_route = 0

  kernel.sysrq = 0

  kernel.core_uses_pid = 1

  net.ipv4.tcp_syncookies = 1

  net.bridge.bridge-nf-call-ip6tables = 0

  net.bridge.bridge-nf-call-iptables = 0

  net.bridge.bridge-nf-call-arptables = 0

  kernel.msgmnb = 65536

  kernel.msgmax = 65536

  kernel.shmmax = 68719476736

  kernel.shmall = 4294967296

  kernel.sem = 256 32000 100 142

  kernel.shmmax = 10737418240

  ```


  必须将打开文件限制设置为 4096 以支持该实例。为此，请编辑 `limits.conf` 文件。


  ```

  [root@clouddemolab home]# vi /etc/security/limits.conf

  ```


  如果环境要安装在 Oracle Linux 或 RedHat Linux 上，您还必须在 `/etc/security/limits.d/90-nproc.conf`
  中进行编辑。如果遗漏了此步骤，该文件中的值可能会覆盖 `limits.conf` 文件中的值。


  在上面列出的两个文件中，确保添加或编辑以下行：


  ```

  * soft nofile 4096

  * hard nofile 65536

  * soft nproc 2047

  * hard nproc 16384

  ```


  编辑此文件后，必须重启服务器以确保所有更改生效。


  ### 操作系统软件包


