  安装程序确认先决条件后，将要求您提供新的 Oracle Middleware Home 目录。如图 6-13 所示，需要指定一个 Middleware Home
  目录位置。您应仅将此软件安装在现有的 Middleware Home 内。此位置是 WebLogic 在此过程开始时安装的位置。


