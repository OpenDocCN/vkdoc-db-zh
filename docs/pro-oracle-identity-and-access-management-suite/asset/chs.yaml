  ## 本章小结


  本章介绍了 OID 的安装和初始配置。这为成功的身份管理实现奠定了基础。从这一点开始，您可以开始在 Oracle 的通用 LDAP 目录中管理应用程序用户和属性。应用程序，无论是
  Oracle 的还是第三方的，都可以连接到 OID 作为 LDAP 身份存储来验证用户凭证。数据库也可以使用该身份存储进行身份验证。尽管 OID 为基于身份的系统提供了基本的
  LDAP 身份验证和数据存储，但该环境仅维护对单个应用程序的单一身份验证。Oracle 访问管理器可以提供更好的用户体验，用户只需登录一次即可访问已纳入环境的应用程序。Oracle
  身份管理器将提供用户自助和服务管理服务。这些附加组件依赖于一个稳固的 LDAP 实现，并将在未来的章节中介绍。


