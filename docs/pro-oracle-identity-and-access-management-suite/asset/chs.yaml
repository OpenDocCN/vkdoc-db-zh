  ### Oracle Internet Directory 配置


  在本节中，您将在 WLS 环境中配置 OID 域。在继续之前，您应了解要使用的配置场景：


  *   在新建的 WebLogic 域中配置包含 Oracle Directory Integration Platform (DIP) 和 Oracle Directory
  Service Manager (ODSM) 的 OID。

  *   将使用 Fusion Middleware Control 和 WebLogic 管理控制台来管理 OID 环境。

  *   将使用目录集成平台 (DIP) 将 OID 与第三方 LDAP 源进行同步。

  *   将使用 ODSM 来管理 LDAP 目录实例。

  *   Oracle Fusion Middleware 环境内不存在其他 WebLogic 域。



  #### 配置类型


  还有其他一些场景，包括在新的域或现有域中安装 OID 和 OVD。出于本讨论的目的，我们假设这些是**新的域**。


