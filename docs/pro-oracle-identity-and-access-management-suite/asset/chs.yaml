  ## Access Manager 软件安装


  Oracle 软件安装使用 Universal Installer。该工具作为引导程序，确保正确的软件二进制文件被安装在正确的位置。`runInstaller`工具要求在运行时指定
  Java Runtime Environment。通过使用`–jreLoc`参数来完成此操作。


  在 Linux 中，按如下方式运行：


  ```

  [oracle@clouddemolab Disk1]$ ./runInstaller -jreLoc /home/oracle/jdk1.6.0.45/jre

  ```


  图 6-11 显示了 Oracle Universal Installer 的欢迎屏幕。文本中应能看到 Oracle Identity and Access Management
  的版本信息，本例中为`11.1.2.3`。如果这与您正在安装的版本不匹配，请找到正确的安装程序软件。上一节运行的 RCU 仅与`11.1.2.3`兼容。


  ![A352855_1_En_6_Fig11_HTML.jpg](img/A352855_1_En_6_Fig11_HTML.jpg)


  **图 6-11. 欢迎屏幕**


