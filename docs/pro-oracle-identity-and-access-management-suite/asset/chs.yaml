  并创建了域，你可以使用 OID 扩展该域，其步骤与此处介绍的非常相似。


  要开始配置域，请运行位于 `$ORACLE_HOME/bin` 目录下的 `config.sh` 文件。在此情况下，`ORACLE_HOME` 是 Oracle
  Identity Management 软件的安装位置，即 `/home/oracle/OIDMiddleware/Oracle_IDM1`。这一点很重要，因为
  Middleware 环境中的其他目录下也存在其他的 `config.sh` 文件。图 4-31 显示了要使用的配置文件的位置。


