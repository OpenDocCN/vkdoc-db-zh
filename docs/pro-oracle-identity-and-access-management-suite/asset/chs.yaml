  在本例中，将安装 OID 11.1.1.9。因此，将使用的 RCU 版本为 11.1.1.9。如前所述，OID 11.1.1.9 是经认证可与 Oracle E-Business
  Suite 一起使用的最新版本。


  下载所需的软件后，就可以开始创建仓库了。将下载的文件解压缩到一个暂存目录。本例中我们使用 `/home/oracle/stage/rcu`。解压后，将创建一个名为
