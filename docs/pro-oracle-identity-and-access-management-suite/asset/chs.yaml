  ## 验证安装


  完成 OID 的所有安装和配置任务后，验证环境非常重要。这涉及登录到各个组件并确保它们可运行。此时还建议您验证启动和停止脚本，并为管理设置受管服务器。


  在上一节中，您安装了 WLS 作为 OID、OVD、DIP 和 ODSM 的基础架构。这些组件应已自动启动。检查操作系统以查看为支持 OID 而启动的进程。


  打开控制台并以 oracle 用户身份登录到主机。使用之前创建的域名，使用 `ps` 命令检查从域目录运行的进程。有关此过程的视图，请参见图 4-46。


  ![A352855_1_En_4_Fig46_HTML.jpg](img/A352855_1_En_4_Fig46_HTML.jpg)

  *图 4-46. 验证 WLS 和 ODSM 的运行进程*


  这将提供有关 WLS 和受管服务器进程的信息。如果未返回任何信息，则需要启动环境。稍后将讨论此问题。


  Oracle 进程管理器和通知服务器 (`OPMN`) 控制实际的 OID 实例。`OPMN` 在域配置期间安装。虽然它是 OID 的进程管理器，但它不在 WLS
  内运行。它为 OID 环境提供启动和关闭功能以及监控和重启服务。在验证过程中，将使用 `opmnctl` 命令检查进程状态。


  在与之前相同的控制台中，将 `ORACLE_INSTANCE` 设置为在域配置步骤中创建 OID 实例的位置。这很可能在 `MIDDLEWARE_HOME` 目录内；例如，`/home/oracle/OIDMiddleware/asinst_1`。


  ```

  export ORACLE_INSTANCE=/home/oracle/OIDMiddleware/asinst_1

  ```


  `opmnctl` 命令位于 `$ORACLE_INSTANCE/bin` 目录中。`opmnctl` 命令可以接受许多命令，从基本状态检查到完全重启。


  您可以使用 `opmnctl` 帮助检索命令列表。


  ```

  [oracle@clouddemolab bin]$ ./opmnctl help

  ```


  ```

  [oracle@clouddemolab bin]$ ./opmnctl help

  用法：opmnctl [verbose] []  []

  verbose：如果可用，打印详细的执行信息。

  允许的 // 组合如下：


  scope    command     options

  -------  ---------   ---------

  start                         - 启动 opmn

  startall                      - 启动 opmn 及所有受管进程

  stopall                       - 停止 opmn 及所有受管进程

  shutdown                      - 关闭 opmn 及所有受管进程

  [] startproc   [= ..] - 启动 opmn 受管进程

  [] restartproc [= ..] - 重启 opmn 受管进程

  [] stopproc    [= ..] - 停止 opmn 受管进程

  [] reload                        - 触发 opmn 重新读取 opmn.xml

  [] status      []       - 获取受管进程状态

  [] metric      [= ..] - 获取受管进程的 DMS 度量指标

  [] dmsdump     []       - 获取 opmn 的 DMS 度量指标

  [] debug       [= ..] - 显示 opmn 服务器调试信息

  [] set         [= ..] - 设置 opmn 日志参数

  [] query       [=]    - 查询 opmn 日志参数

  launch      [= ..] - 启动已配置的目标进程

  phantom     [= ..] - 注册 phantom 进程

  ping        []     - Ping 本地 opmn

  validate    []      - 验证给定的 opmn xml 文件

  setlocale   []          - 设置或查询实例的区域设置

  help                          - 打印简要用法描述

  usage       []       - 打印详细用法描述

  createinstance                - 创建一个 Oracle 实例

  createcomponent               - 创建指定的组件

  deleteinstance                - 删除一个实例及其组件

  deletecomponent               - 删除指定的组件

  registerinstance              - 向管理服务器注册

  redeploy                      - 重新部署管理服务器应用程序

  unregisterinstance            - 取消向管理服务器的注册

  updateinstanceregistration    - 更新实例注册信息

  updatecomponentregistration   - 更新组件注册信息

  ```


  要检查 OID 进程，请使用基本的 `opmnctl status` 命令：


  ```

  [oracle@clouddemolab bin]$ ./opmnctl status

  实例中的进程：asinst_1

  ---------------------------------+--------------------+---------+---------

  ias-component                    | process-type       |     pid | status

  ---------------------------------+--------------------+---------+---------

