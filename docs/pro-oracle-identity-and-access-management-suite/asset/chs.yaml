  ## 总结


  本章是 OAM 安装过程的演练。在安装软件文件之后，向您展示了 OAM 域的配置。此时，所有必要的文件已复制完毕，文件系统已准备就绪。如果您的实施只需要 SSO，可以跳过下一章关于
  Identity Manager 安装的内容。


  # 7. Identity Manager 安装


  在前两章中，提供了安装和配置 Oracle Internet Directory (OID) 和 Oracle Access Manager (OAM) 的说明。这两个组件奠定了身份存储和单点登录
  (SSO) 的基础。Identity Manager 为环境添加了额外的元素，例如用户自助服务和治理，从而完成了端到端身份生命周期管理的实施。本章重点介绍 Oracle
  Identity Manager (OIM) 的安装和初始域配置。


  ## 预安装任务


  ### 操作系统用户


  对于大多数 Oracle 应用程序安装，应创建操作系统 (OS) 用户和组来执行安装和配置任务。创建 OS 组将允许其他 OS 用户执行与管理应用程序环境相关的特定任务。在
  Linux 环境中安装 Oracle 应用程序最常见的 OS 用户和组是 `oracle` 用户以及 `oinstall` 或 `dba` 组。


  要创建必要的 `oinstall` 和 `dba` 组，请以 root 目录执行以下命令：


  ```

  [root@clouddemolab home]# groupadd oinstall

  [root@clouddemolab home]# groupadd dba

  ```


  创建组后，创建 `oracle` 用户：


  ```

  [root@clouddemolab home]# useradd  -g oinstall -G dba oracle

  ```


  注意


  `-g` 表示用户应添加到的主组。`-G` 表示任何辅助组。


  要设置用户密码，请以 root 用户身份使用以下命令。


  ```

  [root@clouddemolab home]# passwd oracle

  ```


  ### 操作系统配置


  在安装 Oracle Fusion Middleware 基础架构和 Oracle Identity Management 软件之前，确保操作系统满足最低要求和配置非常重要。以下列出了所需的内核参数、软件包以及文件更改。


  需要设置以下内核参数：


  ```

  kernel.sem  256  32000  100  143

  kernel.shmmax 10737418240

  ```


  要设置这些参数，请编辑 `/etc` 目录中的 `sysctl.conf` 文件。


  ```

  [root@clouddemolab home]# vi /etc/sysctl.conf

  ```


  在文件的此部分添加或编辑以下行：


  ```

  '
- '# Controls the maximum number of shared memory segments, in pages

  kernel.shmall = 4294967296

  kernel.sem = 256 32000 100 142

  kernel.shmmax = 10737418240

  ```


  在 `sysctl.conf` 文件中设置这些值后，必须激活并验证是否显示新值，使用此命令：


  ```

  [root@clouddemolab home]# /sbin/sysctl –p

  net.ipv4.ip_forward = 0

  net.ipv4.conf.default.rp_filter = 1

  net.ipv4.conf.default.accept_source_route = 0

  kernel.sysrq = 0

  kernel.core_uses_pid = 1

  net.ipv4.tcp_syncookies = 1

  net.bridge.bridge-nf-call-ip6tables = 0

  net.bridge.bridge-nf-call-iptables = 0

  net.bridge.bridge-nf-call-arptables = 0

  kernel.msgmnb = 65536

  kernel.msgmax = 65536

  kernel.shmmax = 68719476736

  kernel.shmall = 4294967296

  kernel.sem = 256 32000 100 142

  kernel.shmmax = 10737418240

  ```


  打开文件限制必须设置为 4096 以支持实例。为此，请编辑 `limits.conf` 文件。


  ```

  [root@clouddemolab home]# vi /etc/security/limits.conf

  ```


  如果环境要安装在 Oracle Linux 或 RedHat Linux 上，则必须同时在 `/etc/security/limits.d/90-nproc.conf`
  中执行编辑。如果遗漏了此步骤，此文件中的值可能会覆盖 `limits.conf` 中的值。


  确保在这两个文件中添加或编辑以下行：


  ```

  * soft nofile 4096

  * hard nofile 65536

  * soft nproc 2047

  * hard nproc 16384

  ```


  编辑此文件后，必须重新启动服务器以确保所有更改生效。


  ### 操作系统软件包


  每个 Oracle 应用程序都有自己所需的一套软件包。根据您所使用的 Linux 版本，安装过程可能有所不同。在以下列表中，请注意某些软件包在 64 位操作系统上需要同时安装
  32 位和 64 位版本。如果这些软件包未安装，安装将无法正常完成。Oracle 安装程序会检查这些依赖项，并在安装过程中显示错误。


  ```

  binutils-2.20.51.0.2-5.28.el6

  compat-libcap1-1.10-1

  compat-libstdc++-33-3.2.3-69.el6 for x86_64

  compat-libstdc++-33-3.2.3-69.el6 for i686

  gcc-4.4.4-13.el6 gcc-c++-4.4.4-13.el6

  glibc-2.12-1.7.el6 for x86_64

  glibc-2.12-1.7.el6 for i686

  glibc-devel-2.12-1.7.el6 for i686

  libaio-0.3.107-10.el6

  libaio-devel-0.3.107-10.el6

  libgcc-4.4.4-13.el6

  libstdc++-4.4.4-13.el6 for x86_64

  libstdc++-4.4.4-13.el6 for i686

  libstdc++-devel-4.4.4-13.el6

  libXext for i686

  libXtst for i686

  libXext for x86_64

  libXtst for x86_64

  openmotif-2.2.3 for x86_64

  openmotif22-2.2.3 for x86_64

  redhat-lsb-core-4.0-7.el6 for x86_64

  sysstat-9.0.4-11.el6

  xorg-x11-utils*

  xorg-x11-apps*

  xorg-x11-xinit*

  xorg-x11-server-Xorg*

  xterm

  pdksh-5.2.14

  ```


  至此，操作系统应已为后续安装做好充分准备。在安装软件之前执行这些操作将确保安装过程顺利进行。大多数情况下，如果遗漏了任何项目，安装程序会提供详细的错误信息。如果在安装过程中出现错误，请停止安装并解决所有问题后再继续。


  ### 数据库准备


  与 OID 类似，安装 OIM 也需要创建特定的数据库对象。这包括在不同数据库模式中创建的一系列表、视图和包。此过程使用仓库创建实用程序完成。虽然数据库对象可以创建在
  OID 数据库内，但通常建议将 Oracle 标识与访问管理存储库创建在单独的实例中。这简化了数据库管理任务和未来维护。为防止安装问题，确保所使用的 RCU 版本与要安装的融合中间件产品版本相匹配至关重要。在域配置过程中发现版本不匹配将导致流程无法继续。解压下载文件并运行
  `<RCU_HOME>/rcu/bin` 目录中的 `rcu.sh`。您将首先看到如图 7-1 所示的“创建存储库”屏幕。


  ![A352855_1_En_7_Fig1_HTML.jpg](img/A352855_1_En_7_Fig1_HTML.jpg)

  图 7-1.


  创建或删除模式。


  由于这是首次安装 OIM，请在此屏幕上选择“创建”选项。这将以创建模式启动 RCU。


  选择创建模式后，您必须在如图 7-2 所示的屏幕上输入目标系统的数据库连接详细信息。您可以选择在与 OID 相同的数据库中创建身份管理器模式。但是，为了简化数据库管理，身份管理器模式通常安装在不同的数据库中。此实例可以与
  OAM 实例相同。


  ![A352855_1_En_7_Fig2_HTML.jpg](img/A352855_1_En_7_Fig2_HTML.jpg)

  图 7-2.


  数据库连接详细信息屏幕。


  注意：必须先运行 `$ORACLE_HOME/rdbms/admin/xaview.sql` 以启用 XA 事务视图和同义词，然后才能创建 OIM 模式。


  RCU 验证连接详细信息后，将提示您选择要安装在新存储库中的组件。此屏幕如图 7-3 所示。


  ![A352855_1_En_7_Fig3_HTML.jpg](img/A352855_1_En_7_Fig3_HTML.jpg)

  图 7-3.


  选择组件屏幕。


  在 RCU 的此步骤中，您必须选择要安装的组件。请注意，当您选择 OIM 组件时，其他必需项目将被预选。请不要取消选择这些项目，因为它们将在域配置步骤中进行验证。然后，RCU
  将验证数据库是否满足所选组件所需的先决条件，如图 7-4 所示。


  ![A352855_1_En_7_Fig4_HTML.jpg](img/A352855_1_En_7_Fig4_HTML.jpg)

  图 7-4.


  检查先决条件。


  每个融合中间件组件都有数据库要求，例如最大连接数或打开的进程数。RCU 将在创建数据库模式和对象之前检查这些先决条件。


  如果数据库满足最低要求，下一步是输入新数据库模式要使用的密码，如图 7-5 所示。


  ![A352855_1_En_7_Fig5_HTML.jpg](img/A352855_1_En_7_Fig5_HTML.jpg)

  图 7-5.


  模式密码屏幕。


  在此步骤中，指定您希望使用的密码值。您可以选择为所有模式使用相同的密码，也可以为每个模式使用不同的密码。请根据安全要求和易于管理性做出决定。


  图 7-6 显示了表空间复查屏幕，其中显示了将为选定的身份管理组件创建的新数据库表空间。您可以单击“下一步”继续，或选择自定义新表空间。


  ![A352855_1_En_7_Fig6_HTML.jpg](img/A352855_1_En_7_Fig6_HTML.jpg)

  图 7-6.


  表空间列表。


  在实际创建表空间之前，RCU 将向您显示其将执行操作的概要。图 7-7 显示了“概要”屏幕。您应注意记录这些信息，以便在将来与数据库管理员讨论与数据库相关的运行时问题时作为参考。


  ![A352855_1_En_7_Fig7_HTML.jpg](img/A352855_1_En_7_Fig7_HTML.jpg)

  图 7-7.


  创建概要屏幕。


  所有数据库对象创建完成后，您将看到“完成概要”屏幕，如图 7-8 所示。单击“关闭”以完成该过程。


  ![A352855_1_En_7_Fig8_HTML.jpg](img/A352855_1_En_7_Fig8_HTML.jpg)

  图 7-8.


  完成概要屏幕。


  至此，OIM 的存储库创建过程完成。身份管理器及其所需组件的必要数据库模式和对象已安装在目标数据库中。现在可以继续安装过程。


  ### 身份管理器软件安装


  在上一节中，您已完成创建 OIM 数据库模式和对象的步骤。以下部分讨论身份管理器软件的安装。此过程创建必要的文件系统结构并部署融合中间件产品所需的二进制文件。


  OIM 必须安装在 WLS 主目录中。在第 6 章中，介绍了在单独的 WLS 主目录中安装 OAM 的步骤。您可以选择将身份管理器软件安装在与访问管理器相同的目录中，也可以专门为其创建一个完全独立的主目录。通常将访问管理器和身份管理器部署在网络的不同层级或不同的物理主机上。如果您的环境需要这样做，请遵循第
  4 章中的 WLS 安装步骤。



  ### 面向服务的架构安装


  `OIM` 需要 Oracle 面向服务的架构 (`SOA`) 才能正常运行。此安装独立于 `OIM` 过程，但可以安装在相同的 `WebLogic` 主目录中。`SOA`
  安装完成后，您可以安装 `OIM` 并同时为两个产品配置域。这是这两个产品的推荐流程。


  与许多其他 Fusion Middleware 产品类似，`SOA` 安装工具通过运行 `runInstaller` 命令来启动 Oracle 通用安装程序。该程序位于安装介质的第
