  \n\n\n## 配置 Oracle Access Manager 身份存储\n\n随着 OID 扩展以支持 OAM，现在需要配置 OAM 以使用 OID 作为系统和默认用户存储。通过访问\
  \ URL `http://host:wls_console_port/oamconsole` 登录 AOM 管理控制台。图 9-7 显示了 OAM 管理控制台的一个示例。使用\
  \ `weblogic` 用户名和密码登录。在 OAM 系统和默认身份存储配置完成之前，新创建的管理员用户将无法使用。\n\n![A352855_1_En_9_Fig7_HTML.jpg](img/A352855_1_En_9_Fig7_HTML.jpg)\n\
  **图 9-7. OAM 管理控制台**\n\n管理控制台的登陆页面被划分为多个部分，以便于查找配置设置。顶部是主要配置类别：应用程序安全、联合、移动安全和配置。每个类别都有若干选项，允许你配置各种组件。首先，选择屏幕右上角的“配置”选项。配置菜单如图\
  \ 9-8 所示。\n\n![A352855_1_En_9_Fig8_HTML.jpg](img/A352855_1_En_9_Fig8_HTML.jpg)\n\
  **图 9-8. 配置菜单**\n\n完整的配置和管理超出了本书的范围。不过，本指南涵盖了完成整体集成所必需的部分。在配置菜单上，单击“用户身份存储”图标以查看当前配置。图\
  \ 9-9 显示了你在创建新存储之前将看到的“用户身份存储”屏幕。\n\n![A352855_1_En_9_Fig9_HTML.jpg](img/A352855_1_En_9_Fig9_HTML.jpg)\n\
  **图 9-9. 身份存储配置屏幕**\n\n首次访问“用户身份存储”屏幕时，你会看到访问管理器正在使用嵌入式 LDAP 作为 `用户身份存储`，并且它被设置为默认存储和系统存储。这里的嵌入式\
  \ LDAP 指的是 WLS 内置的。在本节中，你将创建一个名为 OID 的新身份存储，并将系统存储和默认存储更改为使用它。\n\n### 创建：用户身份存储\n\
  \n在如图 9-10 所示的“创建：用户身份存储”屏幕上，输入 OID 所需的连接详细信息。随后的表 9-2 列出了此阶段预期的值。\n\n**表 9-2. OID\
  \ 身份存储连接详细信息**\n\n| 存储名称         | 为新的身份存储指定一个将被使用的名称                          \
  \                                       |\n|------------------|------------------------------------------------------------------------------------------------------|\n\
  | 存储类型         | OID Oracle Internet Directory                                 \
  \                                       |\n| 绑定 DN          | `Cn=orcladmin`，或其他对用户和组搜索基础具有读取访问权限的用户\
  \                                         |\n| 密码             | 为“绑定 DN”中列出的用户设置的密码\
  \                                                                    |\n| 描述   \
  \          | （可选）                                                              \
  \                               |\n| 位置             | OID 的主机名和 LDAP 端口号       \
  \                                                                    |\n| 登录 ID\
  \ 属性     | `CN` 是默认值；如果你使用不同的属性，请在此处输入                                         \
  \          |\n| 用户密码属性     | `userPassword`                                    \
  \                                                   |\n| 用户搜索基础     | `Cn=Users,dc=mycompany,dc=com`；此值应与\
  \ `extendOAMPropertyFile` 中使用的用户搜索基础匹配            |\n| 组搜索基础       | `Cn=Groups,dc=mycompany,dc=com`；此值应与\
  \ `extendOAMPropertyFile` 中使用的组搜索基础匹配              |\n\n![A352855_1_En_9_Fig10_HTML.jpg](img/A352855_1_En_9_Fig10_HTML.jpg)\n\
  **图 9-10. 创建：用户身份存储屏幕**\n\n单击“测试连接”以确保你输入的详细信息正确，并且 OAM 能够连接到新的 LDAP 存储。在继续下一步之前，请确保你看到的结果与图\
  \ 9-11 相似。\n\n![A352855_1_En_9_Fig11_HTML.jpg](img/A352855_1_En_9_Fig11_HTML.jpg)\n\
  **图 9-11. 测试连接**\n\n### 设置默认存储和系统存储\n\n成功创建 LDAP 存储后，你必须将 OAM 系统存储和默认存储的值设置为新存储的名称。你将在图\
  \ 9-12 中看到一个示例。\n\n![A352855_1_En_9_Fig12_HTML.jpg](img/A352855_1_En_9_Fig12_HTML.jpg)\n\
  **图 9-12. 设置默认存储和系统存储**\n\n更新存储值时，你会看到一条弹出消息，告知你在应用更改之前必须完成一个步骤。页面上将出现一个名为“访问系统管理员”的新部分。在此部分中，你将添加在\
  \ `preconfigOAMProperties` 文件中创建的 `oamadmin` 用户和 `oamadministrators` 组。单击“添加按钮”并使用搜索屏幕查找用户和组。根据需要添加你的环境中可能需要的任何其他用户。添加用户后，单击“应用”。系统将要求你输入\
  \ `oamadmin` 用户名和密码，以验证新的用户存储是否正常工作。\n\n### 配置 LDAP 认证模块\n\n验证管理员用户并保存新配置后，你必须配置\
  \ LDAP 认证模块以使用新的身份存储。在退出管理控制台之前未完成此步骤可能会导致你无法再次登录 OAM 控制台。要继续，请选择屏幕顶部中心的“应用程序安全”选项，如图\
  \ 9-13 所示。\n\n![A352855_1_En_9_Fig13_HTML.jpg](img/A352855_1_En_9_Fig13_HTML.jpg)\n\
  **图 9-13. 应用程序安全菜单**\n\n在“应用程序安全”菜单上，在“访问管理器”下，单击“认证方案”链接。图 9-14 显示了 OAM 预配置的认证方案列表。\n\
  \n![A352855_1_En_9_Fig14_HTML.jpg](img/A352855_1_En_9_Fig14_HTML.jpg)\n**图 9-14.\
  \ 认证方案**\n\n在“搜索认证方案”屏幕上，单击“搜索”以显示当前可用的方案列表。单击列出的 `LDAPScheme` 以调出其配置。这将显示所使用的认证模块的名称。图\
  \ 9-15 显示了将使用的配置屏幕。\n\n![A352855_1_En_9_Fig15_HTML.jpg](img/A352855_1_En_9_Fig15_HTML.jpg)\n\
  **图 9-15. LDAPScheme 配置屏幕**\n\n在此情况下，`LDAPScheme` 被配置为使用 LDAP 认证模块。这是你需要更改的模块，以确保在使用外部\
  \ LDAP 存储（如 OID）配置的访问管理器中能够正常登录和访问。图 9-16 显示了“认证模块”选项卡上的结果集。\n\n![A352855_1_En_9_Fig16_HTML.jpg](img/A352855_1_En_9_Fig16_HTML.jpg)\n\
  **图 9-16. 认证模块**\n\n现在你已经知道了 LDAP 认证方案使用的认证模块的名称，返回到启动页面，并在“应用程序安全”屏幕上的“插件”下，单击“认证模块”链接。单击“搜索”以显示可用的模块，然后单击\
  \ LDAP 链接。这将调出所选模块的配置参数，如图 9-17 所示。\n\n![A352855_1_En_9_Fig17_HTML.jpg](img/A352855_1_En_9_Fig17_HTML.jpg)\n\
  **图 9-17. LDAP 认证模块配置**\n\n在配置屏幕上，对于“用户身份存储”，选择 `OIDStore`，即先前创建的身份存储的名称。单击“应用”以保存更改。你现在已经完成了\
  \ AOM 使用 OID 的配置，可以进入下一章配置 OIM 的下一步了。现在关闭浏览器并重新启动 OAM。重启后，请测试确保你可以使用你创建的 `oamadmin`\
  \ 用户登录到 `OAMConsole`。\n\n## 总结\n\n本章演示了配置 OAM 所需的步骤。它包括预配置 OID 模式，以包含将 OAM 与外部 LDAP\
  \ 提供程序集成所必需的容器、用户和组。尽管这些说明是针对 OID 的，但稍作修改后，类似的说明可用于大多数其他受支持的 LDAP 目录。无论是否为与 OIM\
  \ 集成而配置 OAM，此步骤都是必需的。它将确保用户和权限包含在集中式 LDAP 存储中，而不依赖于嵌入式 WebLogic 存储。\n\n\n\n# 10.\
  \ Oracle 身份管理配置\n\nOracle 身份管理器（OIM）提供了一个管理员可用的用户界面，用于创建和管理用户账户、设置角色、配置工作流等。它还可以与\
  \ Oracle 访问管理器（OAM）集成，提供用户自助界面，允许最终用户重置遗忘的密码、管理其个人资料信息以及设置安全验证问题。这一切共同为组织构建了一个完整的身份生命周期管理环境。\n\
  \n第 7 章介绍了为 OIM 配置新域的步骤。那仅仅设置了在 WebLogic Server 内运行 OIM 所必需的结构，并部署了必要的组件。本章将指导您完成运行身份管理器工具所需的实际配置。\n\
  \n## 预配置步骤\n\n创建新的 OIM 域后，在实际配置身份管理器服务器之前，必须完成几个步骤。首先通过升级 Oracle 平台安全服务（OPSS）模式开始预配置。\n\
  \nOracle 融合中间件补丁集助手将用于升级 OPSS。您可以在目录`/home/oracle/IDMMiddleware/oracle_common/bin/psa`中找到补丁集助手的可执行文件。这将启动一个图形用户界面（GUI）来引导您完成整个过程。图\
  \ 10-1 显示了补丁集助手。\n\n![A352855_1_En_10_Fig1_HTML.jpg](img/A352855_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1. 启动补丁集助手\n\n在“选择组件”屏幕上，选中 Oracle 平台安全服务复选框。\n\n补丁集助手将要求您确认已完成数据库备份，并且所使用的数据库版本经过融合中间件认证。如图\
  \ 10-2 所示。如果您尚未检查 Oracle 的认证矩阵，请立即检查。完成后，选中复选框，然后单击“下一步”。\n\n![A352855_1_En_10_Fig2_HTML.jpg](img/A352855_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2. 检查先决条件\n\n在 OPSS 模式屏幕上，您需要输入环境中数据库的连接详细信息。输入的字段和值如图 10-3 所示。\n\n![A352855_1_En_10_Fig3_HTML.jpg](img/A352855_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3. 连接详细信息\n\n有关字段说明及每个字段应输入的数据，请参见表 10-1。\n\n表 10-1. OPSS 模式升级连接详细信息\n\n\
  | 字段 | 值 |\n| --- | --- |\n| 数据库类型 | Oracle 数据库 |\n| 连接字符串 | 应按以下格式输入连接字符串：主机名:端口:服务名\
  \ |\n| DBA 用户名 | 此字段中输入的用户必须具有 sysdba 权限。按“sys as sysdba”格式输入 |\n| DBA 密码 | 上述输入用户的密码\
  \ |\n| 模式用户名 | 应为使用存储库创建实用程序（RCU）创建的 OPSS 模式名称 |\n| 模式密码 | 输入在 RCU 创建期间设置的密码 |\n\
  \n在实际升级 OPSS 模式之前，补丁集助手将验证数据库和模式对象，以确保它们满足要求。图 10-4 显示了验证过程。需要注意的是，如果 OPSS 已处于正确版本或不满足最低要求，此屏幕将告知您该情况。\n\
  \n![A352855_1_En_10_Fig4_HTML.jpg](img/A352855_1_En_10_Fig4_HTML.jpg)\n\n图 10-4.\
  \ 检查待升级的模式\n\n补丁集助手将检查模式并验证其升级状态，然后为您提供将要升级的环境摘要。在继续之前，请花时间查看图 10-5 所示的“升级摘要”屏幕。\n\
  \n![A352855_1_En_10_Fig5_HTML.jpg](img/A352855_1_En_10_Fig5_HTML.jpg)\n\n图 10-5.\
  \ 确认升级组件\n\n图 10-6 显示了补丁集助手的进度指示器。一旦显示 100%，您就可以单击“下一步”继续。\n\n![A352855_1_En_10_Fig6_HTML.jpg](img/A352855_1_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6. 升级进度\n\n在过程结束时，您将看到“升级成功”屏幕，如图 10-7 所示。如果遇到任何错误，请先解决它们，然后再继续。\n\n![A352855_1_En_10_Fig7_HTML.jpg](img/A352855_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7. 升级完成\n\n现在 OPSS 模式已成功升级，您可以继续下一步，即设置数据库安全存储。\n\n## 配置数据库安全存储\n\n升级 OPSS\
  \ 数据库模式后，您还必须为新的 OIM 实例配置数据库安全存储。Oracle 身份和访问管理仅支持数据库安全存储。因此，以下步骤将帮助您配置此存储。\n\n\
  在配置 OAM 时您已执行过相同的活动。如果在共享同一数据库的单个域中同时配置 OAM 和 OIM，您将需要遵循让 OIM 加入访问管理器数据库安全存储的步骤。但是，如果您已按照本书介绍的步骤操作，那么您是在拆分域中安装了\
  \ OAM 和 OIM。存储库对象也安装在单独的数据库中。这要求您为每个产品创建单独的安全存储。\n\n`configureSecurityStore.py`脚本位于\
  \ OIM 主目录下的`common/tools`中。要运行该脚本，您将使用 Middleware Home 目录下`oracle_common/common/tools`中的`wlst.sh`。\n\
  \n如前所述，如果您的 OIM 和 OAM 安装在同一个域中，并且您已经为访问管理器运行过此脚本，那么您需要使用`–m join`选项。但在本例中，您将使用`-m\
  \ create`选项在 OIM 数据库存储库中创建新的安全存储。\n\n要配置新的安全存储，请从`/home/oracle/IDMMiddleware/oracle_common/common/tools`运行以下命令。\n\
  \n```\n./ wlst.sh /home/oracle/IDMMiddleware/Oracle_IDM1/common/tools/configureSecurityStore.py\
  \ -d /home/oracle/IDMMiddleware/user_projects/idm_domain -c IAM -p Password123 -m\
  \ create\n```\n\n在此命令中，您需要指定`configureSecurityStore.py`文件的位置和 OIM 域的位置。指定`IAM`作为组件以及\
  \ OPSS 模式密码。\n\n\n\n## 为 OIM 预配置 OID 身份存储\n\n由于计划集成 OIM 和 OAM，您必须在 OIM 服务器中启用轻量级目录访问协议（LDAP）同步。在配置过程中会有一个步骤来启用\
  \ LDAP 同步。但是，为了准备该步骤，您必须在继续之前完成这些先决条件步骤。这将确保您的 LDAP 存储（即 OID）已准备好用作 OIM 的身份存储。这些说明适用于使用\
  \ OID。Oracle 支持其他 LDAP 存储，如 Oracle Unified Directory、Oracle Virtual Directory、Active\
  \ Directory 和 iPlanet/ODSEE，但这些超出了本书的范围。\n\n继续之前，请设置环境变量如下：\n\n```\nMW_HOME=/home/oracle/OIDMiddleware\n\
  ORACLE_INSTANCE=/home/oracle/OIDMiddleware/asinst_1\nORACLE_HOME=/home/oracle/OIDMiddleware/Oracle_IDM1\n\
  ```\n\n要将 OID 预配置为 OIM 的 LDAP 身份存储，首先创建一个名为 `oidContainers.ldif` 的文件，内容如下：\n\n```\n\
  dn: cn=oracleAccounts,dc=mycompany,dc=com\ncn: oracleAccounts\nobjectClass: top\n\
  objectClass: orclContainer\ndn: cn=Users,cn=oracleAccounts,dc=mycompany,dc=com\n\
  cn: Users\nobjectClass: top\nobjectClass: orclContainer\ndn: cn=Groups,cn=oracleAccounts,dc=mycompany,dc=com\n\
  cn: Groups\nobjectClass: top\nobjectClass: orclContainer\ndn: cn=Reserve,cn=orcleAccounts,dc=mycompany,dc=com\n\
  cn: Reserve\nobjectClass: top\nobjectClass: orclContainer\n```\n\n该文件包含创建 OIM 用于同步的新容器所需的信息。使用\
  \ `ldapadd` 命令在 OID 中创建这些容器。例如：\n\n```\nldapadd –h 10.0.70.229 –p  3060 –D cn=orcladmin\
  \ –w ****** –c –f oidContainers.ldif\n```\n\n在此示例中，`-h` 是 OID 服务器的主机名，`-p` 是 OID\
  \ 服务器的 LDAP 端口，`-D` 是 `cn=orcladmin`，`-w` 是 `oracladmin` 密码，`-f` 是 `oidContainers.ldif`\
  \ 文件的完整路径。\n\n`ldapadd` 命令位于 OID 的 `ORACLE_HOME/bin` 目录中。\n\n为启用 LDAP 同步创建容器后，您必须创建\
  \ Oracle Identity Manager 的 LDAP 同步过程所需的用户、组和 ACI。首先创建另一个名为 `oimAdmin.ldif` 的文件，内容如下。\n\
  \n```\ndn: cn=systemids,dc=mycompany,dc=com\nchangetype: add\nobjectclass: orclContainer\n\
  objectclass: top\ncn: systemids\ndn: cn=oimAdminUser,cn=systemids,dc=mycompany,dc=com\n\
  changetype: add\nobjectclass: top\nobjectclass: person\nobjectclass: organizationalPerson\n\
  objectclass: inetorgperson\nobjectclass: orclusers\nobjectclass: orcluserV2\nmail:\
  \ oimAdminUser\ngivenname: oimAdminUser\nsn: oimAdminUser\ncn: oimAdminUser\nuid:\
  \ oimAdminUser\nuserPassword: gundam1\ndn: cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com\n\
  changetype: add\nobjectclass: groupOfUniqueNames\nobjectclass: orclPrivilegeGroup\n\
  objectclass: top\ncn: oimAdminGroup\ndescription: OIM administrator role\nuniquemember:\
  \ cn=oimAdminUser,cn=systemids,dc=mycompany,dc=com\ndn: cn=oracleAccounts,dc=mycompany,dc=com\n\
  changetype: modify\norclaci: access to entry by group=\"cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com\"\
  \ (add,browse,delete) by * (none)\norclaci: access to attr=(*) by group=\"cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com\"\
  \ (read,search,write,compare) by * (none)\ndn: cn=changelog\nchangetype: modify\n\
  add: orclaci\norclaci: access to entry by group=\"cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com\"\
  \ (browse) by * (none)\norclaci: access to attr=(*) by group=\"cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com\"\
  \ (read,search,compare) by * (none)\n```\n\n使用此文件，您将使用同样位于 `ORACLE_HOME/bin` 目录中的\
  \ `ldapmodify` 命令将新对象导入 OID。\n\n```\nldapmodify -h 10.0.70.229 -p 3060 -d cn=orcladmin\
  \ -w gundam1 -c -v –f oidAdmin.ldif\n```\n\n通过执行以下命令验证此 `ldapmodify` 命令是否正常工作。两者都应返回无错误。\n\
  \n```\nldapsearch -h  -p  -D \"cn=orcladmin\"  -w gundam1-b \"dc=mycompany,dc=com\"\
  \ -sone \"objectclass=*\" orclaci\nldapsearch -h  -p  -D  \"cn=oimAdminUser,cn=systemids,dc=mycompany,dc=com\"\
  \ -w * -b  \"cn=changelog\" -s sub \"changenumber>=0\"\n```\n\n在此类需要集成 OAM 和 OIM\
  \ 的环境中，您必须通过扩展 OAM 模式来扩展 OID 以用于 OAM 和 OIM 集成。您需要使用 `ldapmodify` 脚本导入位于 OAM 主目录中的四个文件。\n\
  \n将您的工作目录移动到 `/home/oracle/IAMMiddleware/Oracle_IAM1/oam/server/oim-intg/ldif/oid/schema/oim-intg/ldif/oid/schema`。有四个文件：`OID_oblix_pwd_schema_add.ldif`、`OID_oblix_schema_add.ldif`、`OID_oim_pwd_schema_add.ldif`\
  \ 和 `OID_oblix_schema_index_add.ldif`。使用以下示例导入新的模式信息。\n\n```\nldapmodify -h 10.0.70.229\
  \ -p 3060 -D cn=orcladmin -w gundam1 -f OID_oblix_pwd_schema_add.ldif\nldapmodify\
  \ -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oblix_schema_add.ldif\n\
  ldapmodify -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oim_pwd_schema_add.ldif\n\
  ldapmodify -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oblix_schema_index_add.ldif\n\
  ```\n\n\n\n## 配置 Oracle Identity Manager 服务器\n\n至此，OID 已被设置为 OIM 的身份存储，您可以继续配置 Identity\
  \ Manager 服务器。在之前的章节中，您已在自己的 WebLogic Middleware Home 中创建了新的 OIM 域。该步骤配置了一个管理服务器、一个面向服务的架构\
  \ (SOA) 服务器和一个身份管理服务器。本节将在此基础上继续操作，为启动 OIM 做好准备。\n\n现在是时候启动 WebLogic 管理服务器和 SOA\
  \ 服务器了。在配置 Identity Manager 之前，这些服务必须正在运行。转到身份管理域目录 `/home/oracle/IDMMiddleware/user_projects/oim_domain`。执行命令\
  \ `startWeblogic.sh`。如果您希望该命令在后台启动，可以使用 `nohup` 执行命令，例如 `nohup ./startWeblogic.sh\
  \ > weblogic.out &`。这将把命令的输出重定向到文件 `weblogic.out`。为此，WLS 必须配置为以开发模式启动。如果服务器配置为以生产模式启动，那么您需要确保有一个\
  \ `boot.properties` 文件已就位。接下来启动 SOA。这可以通过在 `bin` 目录中执行 `./startManagedWebLogic.sh\
  \ soa_server1` 来完成。\n\n**注意**\n\n要在后台启动服务器，`boot.properties` 文件必须存在于安全目录中，或者服务器必须处于开发模式。\n\
  \n在 `<Domain Home/servers/<ServerName>/security` 目录中，创建一个名为 `boot.properties` 的文件，格式如下：\n\
  \n```\nusername=weblogic\npassword=\n```\n\n现在，WebLogic 管理服务器和 SOA 服务器已经启动，您可以继续配置\
  \ Identity Manager 服务器。\n\n导航到 `<Middleware_Home>/Oracle_IDM1/bin`，其中 `Middleware_Home`\
  \ 是您安装 OIM 的目录。在本例中，它是 `/home/oracle/IDMMiddleware`。在 `bin` 目录中，执行 `config.sh`：\n\
  \n```\n//bin/config.sh\n```\n\n**注意**\n\n此步骤仅运行此目录下的 `config.sh` 文件。`config.sh`\
  \ 可能在其他位置找到，但只有这个位置的文件会启动正确的图形用户界面。\n\n第一步是选择在此步骤中要配置的组件。必需组件是 OIM Server。OIM 设计控制台和\
  \ OIM 远程管理器只能安装在 Microsoft Windows 上，因此您不会在此处安装它们。如果您决定以后在单独的服务器上安装这些组件，可以之后进行。请如图\
  \ 10-8 所示进行选择。\n\n![A352855_1_En_10_Fig8_HTML.jpg](img/A352855_1_En_10_Fig8_HTML.jpg)\n\
  *图 10-8. 选择要配置的组件*\n\n选择要配置的组件后，该工具将询问有关 OIM 安装的数据库信息。您在安装软件时已创建了必要的存储库数据库对象。在这里，您将指定详细信息。图\
  \ 10-9 显示了数据库连接屏幕。\n\n![A352855_1_En_10_Fig9_HTML.jpg](img/A352855_1_En_10_Fig9_HTML.jpg)\n\
  *图 10-9. 数据库信息*\n\n连接字符串应以 `主机名:端口:SID` 的格式输入。在本例中，您有一个数据库实例。如果您使用的是 RAC 数据库，可以如下输入两个节点：`主机\
  \ 1:端口 1:实例名 1^主机 2:端口 2:实例名 2@<服务名>`。\n\nOIM 模式用户名是在本书前面 RCU 操作期间输入的模式名称。本例中，使用\
  \ `imdev_oim`。\n\nOIM 模式密码在下一行输入。您在 RCU 操作期间提供了此密码。\n\nMDS 连接字符串默认为与已输入的连接字符串值相同。如果您将\
  \ MDS 模式安装在其他数据库中，请选中 **为 MDS 模式选择其他数据库** 复选框，这样您就可以编辑此字段。\n\nMDS 模式用户名应包含在 RCU\
  \ 操作期间配置的用户名，本例中为 `imdev_mds`。\n\n\n## OIM 配置\n\nMDS Schema Password 应包含 `imdev_mds`\
  \ 的密码。\n\n在初始域创建步骤中，您已配置了一个用于容纳 OIM 的 WebLogic 域。您将 Administration Server 配置在端口\
  \ 27001 上。请输入 Administration Server 的 URL，包括端口，如图 10-10 所示。请注意，在这种情况下，您必须使用 T3 协议以\
  \ `t3://hostname:port` 的格式输入 URL。输入 WebLogic 用户名和密码，然后单击“下一步”继续。\n\n![A352855_1_En_10_Fig10_HTML.jpg](img/A352855_1_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10. WLS 信息\n\n下一步允许您配置有关新 OIM 服务器的详细信息。图 10-11 显示了收集新 OIM 管理员密码和密钥库密码的屏幕。请记录这些值，因为它们在后续过程中将是必需的。\n\
  \n![A352855_1_En_10_Fig11_HTML.jpg](img/A352855_1_En_10_Fig11_HTML.jpg)\n\n图 10-11.\
  \ OIM 服务器配置\n\nOIM Administrator Password 应设置为您能记住的值。OIM HTTP URL 是用于 Identity Manager\
  \ 的 URL。如果 OIM 服务器前面有 Oracle HTTP Server (OHS)，请在此处输入其 URL。如果您尚未安装 OHS 服务器，可以稍后更新此项。输入并确认密钥库密码。\n\
  \n选中“Enable OIM for Suite Integration”复选框。此环境将包含 OAM 和 OIM 集成。同步是必需的。在本章前面，已经介绍了此操作的前提步骤。如果您尚未完成这些步骤，请立即返回完成，然后再继续。\n\
  \n在 10 个步骤中的第 6 步，系统将提示您输入 OIM 要使用的 LDAP 身份存储。图 10-12 显示了 LDAP 服务器屏幕。\n\n![A352855_1_En_10_Fig12_HTML.jpg](img/A352855_1_En_10_Fig12_HTML.jpg)\n\
  \n图 10-12. 目录服务器配置\n\n在之前的步骤中，您已预先配置了此身份存储。在此示例中，您使用的是 OID。\n\n*   选择 OID 作为 Directory\
  \ Server Type。\n*   输入 Directory Server ID。这应该是唯一的。\n*   以 `ldap://hostname:ldapport`\
  \ 的格式输入 LDAP 服务器连接信息。\n*   输入 OIM 用于连接和执行操作的 Server User。这不应是 `cn=orcladmin` 用户。相反，在预配置步骤中，您创建了一个名为\
  \ `oimadminuser` 的用户。使用完整的可分辨名称输入：`cn=oimadminuser,cn=systemids,dc=mycompany,dc=com`。\n\
  *   Server Password 需要是您在预配置步骤中设置的密码。\n*   输入 Server SearchDN 作为包含用户和组容器的总体容器名称。\n\
  \n因为您选择了启用 LDAP 同步，配置工具将提醒您完成预配置步骤，如图 10-13 所示。如果您尚未完成，请返回本章的相应部分并立即完成步骤。\n\n![A352855_1_En_10_Fig13_HTML.jpg](img/A352855_1_En_10_Fig13_HTML.jpg)\n\
  \n图 10-13. 先决条件检查\n\n图 10-14 所示的“LDAP Server Continued”屏幕继续配置 LDAP 身份目录。\n\n![A352855_1_En_10_Fig14_HTML.jpg](img/A352855_1_En_10_Fig14_HTML.jpg)\n\
  \n图 10-14. LDAP 服务器信息\n\n在此屏幕上，您将输入与 OIM 将用于创建用户的用户和组容器相关的信息。\n\n*   LDAP RoleContainer\
  \ 是组容器。\n*   输入描述。\n*   LDAP UserContainer 是 OIM 将管理的所有用户的位置。\n*   输入描述。\n*   User\
  \ Reservation Container 是等待批准的新创建用户的暂存区。\n\n图 10-15 所示的“Configuration Summary”屏幕显示了已输入的配置参数的汇总。\n\
  \n![A352855_1_En_10_Fig15_HTML.jpg](img/A352855_1_En_10_Fig15_HTML.jpg)\n\n图 10-15.\
  \ 配置摘要屏幕\n\n确保列出了您选择配置的组件。这也是仔细检查您用于配置的值的机会。单击“配置”继续。\n\n您现已完成 OIM 配置。服务器现在应配置为具有\
  \ OID 身份存储并启用 LDAP 同步。图 10-16 显示了已完成的配置。\n\n![A352855_1_En_10_Fig16_HTML.jpg](img/A352855_1_En_10_Fig16_HTML.jpg)\n\
  \n图 10-16. 配置完成屏幕\n\n## 完成 LDAP 安装后配置\n\n在上一节中，您完成了 OIM 配置。在该步骤中，您选择了“Enable OIM\
  \ for Suite Integration”。这通知 OIM 您将使用 LDAP 同步，这对于 OAM 和 OIM 集成是必需的。在预配置期间，您运行了实用程序来为同步准备\
