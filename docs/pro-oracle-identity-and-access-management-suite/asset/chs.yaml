  \n需要设置以下内核参数：\n```\nkernel.sem  256  32000  100  143\nkernel.shmmax 10737418240\n\
  ```\n\n要设置这些参数，请编辑位于 `/etc` 目录下的 `sysctl.conf` 文件。\n```\n[root@clouddemolab home]#\
  \ vi /etc/sysctl.conf\n```\n\n在该文件的相应部分添加或编辑以下行：\n```\n"
- "# Controls the maximum number of shared memory segments, in pages\nkernel.shmall\
  \ = 4294967296\nkernel.sem = 256 32000 100 142\nkernel.shmmax = 10737418240\n```\n\
  \n在 `sysctl.conf` 文件中设置好这些值后，您必须激活并使用此命令验证新值是否生效：\n```\n[root@clouddemolab home]#\
  \ /sbin/sysctl –p\nnet.ipv4.ip_forward = 0\nnet.ipv4.conf.default.rp_filter = 1\n\
  net.ipv4.conf.default.accept_source_route = 0\nkernel.sysrq = 0\nkernel.core_uses_pid\
  \ = 1\nnet.ipv4.tcp_syncookies = 1\nnet.bridge.bridge-nf-call-ip6tables = 0\nnet.bridge.bridge-nf-call-iptables\
  \ = 0\nnet.bridge.bridge-nf-call-arptables = 0\nkernel.msgmnb = 65536\nkernel.msgmax\
  \ = 65536\nkernel.shmmax = 68719476736\nkernel.shmall = 4294967296\nkernel.sem =\
  \ 256 32000 100 142\nkernel.shmmax = 10737418240\n```\n\n打开文件限制必须设置为 4096 以支持实例。为此，请编辑\
  \ `limits.conf` 文件。\n```\n[root@clouddemolab home]# vi /etc/security/limits.conf\n\
  ```\n\n如果要在 Oracle Linux 或 RedHat Linux 上安装环境，还必须在 `/etc/security/limits.d/90-nproc.conf`\
  \ 中进行相同的编辑。如果忽略了这一步，该文件中的值可能会覆盖 `limits.conf` 文件中的值。\n\n在这两个文件中，确保添加或编辑以下行：\n```\n\
  * soft nofile 4096\n* hard nofile 65536\n* soft nproc 2047\n* hard nproc 16384\n\
  ```\n\n编辑此文件后，必须重启服务器以确保所有更改生效。\n\n通过确保在启动安装程序之前满足上述先决条件，大多数安装问题都可以解决或预防。\n\n##\
  \ 常见配置问题\n\n由于 Oracle 身份和访问管理套件有三个主要组件——Oracle Internet Directory (OID)、Oracle Access\
  \ Manager (OAM) 和 Oracle Identity Manager (OIM)——本节将分别介绍相关问题。\n\n### Oracle Internet\
  \ Directory\n\n作为 OIM 和 OAM 的后端目录，如果 OID 环境配置不当，整个堆栈后续必将出现问题。虽然在此阶段配置向导会执行大部分工作，但仍可能出现问题。表\
  \ 16-1 中列出的操作系统包足以满足 OID 安装需求，前述的内核参数也同样适用。正如 OAM 和 OIM 有 Java 版本范围要求一样，OID 版本对\
  \ Java 开发工具包 (JDK) 的版本和更新也非常敏感。对于 OID 11.1.1.9，请确保您使用的是 JDK 1.7 update 80。OID 可以安装在高于\
  \ update 80 的环境中，但需要仔细验证其兼容性。最常见的情况是，安装似乎运行正确。然而，在配置阶段，当域部署正在运行时，您可能会遇到问题。\n\n许多组织使用\
  \ Active Directory 环境作为其网络轻量目录访问协议 (LDAP)。通常的做法是建立一个目录集成平台 (DIP) 来保持 OID 环境与 Active\
  \ Directory 同步。有时，这种同步会要求将符合特定条件的用户添加到某个 OID 子树中，而其他用户则放入另一个子树。其他环境可能只想同步符合复杂规则集的\
  \ Active Directory 用户子集。OID 11.1.1.9 Directory 支持多组同步配置文件，每组都可以有自己的过滤规则集。然而，您可能会遇到复杂规则的问题。很多时候，这仅表现为用户未同步，并且当尝试在\
  \ EM 控制台中加载 DIP 配置文件时，控制台会挂起。此时您还会注意到服务器上的内存使用量激增。在需要类似 `searchfilter=(&(objectclass=user)(|(company=\
  \ BB*))(!(objectclass=computer))` 这样的规则的情况下，请在搜索筛选器周围添加双引号，使其格式如下：`searchfilter=\"\
  (&(objectclass=user)(|(company= BB*))(!(objectclass=computer)\"`。\n\n### Oracle\
  \ Access Manager\n\nOAM 为身份和访问管理环境处理单点登录 (SSO) 功能。在配置期间，可能会出现一些问题。本节涵盖了一些常见问题及解决方法。\n\
  \n**注意：** 在对 OAM 配置进行任何更改之前，备份一份 `DOMAIN_HOME/config/fmwconfig/oam_config.xml` 文件可能会很有用。\n\
  \n在 Access Manager 控制台中更改身份存储可能会有点棘手。然而，您可能正在更换身份存储，或将其迁移到新环境。在这些情况下，如果遵循一些准则，此活动可以轻松完成。首先，确保在您计划用\
  \ Access Manager 管理的新 LDAP 存储中创建一个或多个用户。理想情况下，您将保留一个名为 oamadmin 的用户和一组属于“管理员”组的用户。在图\
  \ 16-1 中，显示了带有多个身份存储的 OAM 管理控制台。每个存储中至少有一个配置为管理员的用户。创建一个新的身份存储并将其设置为“系统存储”将在此页面中生成一个新部分，您可以在其中选择用于管理实例的用户和组，如图\
  \ 16-2 所示。\n\n![A352855_1_En_16_Fig2_HTML.jpg](img/A352855_1_En_16_Fig2_HTML.jpg)\n\
  \n图 16-2. OAM 身份存储选择\n\n![A352855_1_En_16_Fig1_HTML.jpg](img/A352855_1_En_16_Fig1_HTML.jpg)\n\
  \n图 16-1. OAM 管理用户身份存储屏幕\n\n执行这些任务后，重要的是确保正在使用的 LDAP 身份验证模块或其他身份验证模块配置为使用新的身份存储。未能执行此步骤可能会导致您将来无法访问\
  \ OAM 控制台。有关此屏幕示例，请查看图 16-3。\n\n![A352855_1_En_16_Fig3_HTML.jpg](img/A352855_1_En_16_Fig3_HTML.jpg)\n\
  \n图 16-3. OAM 身份验证模块配置\n\n即使做了所有准备，此过程仍有可能出错。如果这种情况发生，并且在更改后您完全无法访问 OAM 管理控制台，还有最后一个希望。在\
  \ `DOMAIN_HOME/config/fmwconfig` 目录中，您会找到一个名为 `oam-config.xml` 的文件。关闭 OAM 并编辑此文件以更改身份存储位置或其他属性。重新启动\
  \ OAM 受管服务器后，一切应该恢复正常。\n\n**注意**\n\n\n\n# 对 `oam-config.xml` 文件的编辑\n\n如果您在进行更改前未关闭\
  \ OAM 服务器，那么对 `oam-config.xml` 文件的编辑将不会生效。同时，请确保递增文件开头的 `Version` 标签：`<Setting Name=\"\
  Version\" Type=\"xsd:integer\">247</Setting>`\n\n若要手动更改身份存储，请找到以下条目并将其编辑为与您的环境相匹配。请更新文件开头的\
  \ `version` 属性并重新启动 OAM。\n\n```\ndc=mycompany,dc=com\nfalse\nnone\n{AES}36AC17B83FF9C6D177B092FD352CB369\n\
  false\ndc=mycompany,dc=com\nfalse\n\ncn=orcladmin\nOID Store\n\nuid\ntrue\ntrue\n\
  \nOID\n\nuserPassword\nOID\n\nldap://ldap.mycompany.com:3060\nfollow\n\nOracleUserRoleAPI\n\
  \n```\n\n### Oracle Identity Manager\n\n就其本身而言，OIM 并不是一个难以安装和配置的产品。当将其与 OID 或其他身份存储配合使用时，配置非常简单明了。但在将\
  \ OIM 与诸如 OAM 的 SSO 产品集成时，可能会遇到一些困惑。此集成涉及多个步骤，并且在不同阶段都可能遇到问题。请花些时间并仔细遵循步骤，您应该能够成功。本节介绍一些常见问题。\n\
  \n## 安装与配置的复杂性\n\nOracle Identity Management 二进制文件的安装通常是一个顺利的过程。很少出错。如果出现问题，通常是由于前面提到的因素，例如缺少操作系统软件包或\
  \ JDK 版本不正确。话虽如此，OIM 的实际配置可能有点令人困惑。很多时候，屏幕上会滚动显示一整屏的消息，某个步骤看起来似乎已正确完成。然而，某个阶段未解决或遗漏的问题可能会在后续步骤中显现。\n\
  \n如前所述，与 OID 和 OAM 不同（它们各自有一个 `config.sh` 或 `config.bat` 文件），OIM 实际上需要两个配置文件。对于\
  \ OIM，您必须先运行位于 `<ORACLE_HOME>/common/bin` 目录下的 `config.sh` 文件来创建域。之后，您需要运行 `<ORACLE_HOME>/bin/config.sh`\
  \ 来实际配置 OIM。这对于熟悉 OID 或 OAM 环境但首次安装 OIM 的人来说可能会感到困惑。在错误的时间运行不正确的文件将导致无法指示实际问题的错误。\n\
  \n## 具体配置步骤\n\n关于配置工具，安装 OIM 所需的错误版本的面向服务体系结构（SOA）可能导致许多问题。仓库配置实用程序（RCU）所需的版本与实际的\
  \ OIM 版本不匹配，这进一步加剧了问题。OIM `11.1.2.3x` 需要 SOA `11.1.1.9`。SOA `11.1.1.9` 软件是与 OIM\
  \ 分开提供的下载项。没有对应的 OIM `11.1.2.3` RCU 可用。相反，您将使用 Fusion Middleware 的 `11.1.1.9` 版本。\n\
  \n使用带有 `–configOIM` 标签的 `idmConfigTool.sh` 配置身份存储时，可能会遇到与 `JMXCLIENTLIB` 变量相关的错误。在\
  \ Oracle 文档中，有一点不太清楚：即使您不安装 OIM Developer Console，也必须创建 `wlfullclient.jar` 文件。如果您正在配置\
  \ OAM 和 OIM 集成，则此文件必须存在。文档中，生成 `wlfullclient.jar` 文件的说明是在关于 Developer Console 的独立章节中给出的。虽然您无需将该文件复制到任何地方，但遗漏此步骤将导致运行\
  \ `idmConfigTool.sh` 文件时出错。\n\n要解决此问题，请生成 `wlfullclient.jar` 文件。如果您在将 OIM 和 OAM\
  \ 安装在同一服务器但不同的 WebLogic Server（WLS）实例中，请确保您从 OIM Home 而不是 OAM Home 运行 `idmConfigTool.sh`。这被称为分离域配置。其次，您可能需要修改您的\
  \ `CLASSPATH` 以指向 `wlfullclient.jar` 的位置，而不是 `JMXCLIENTLIB` 目录。\n\n\n\n偶尔需要更改或更新与身份存储的连接。这可能是由于架构变更或导致需要更改主机的\
  \ OID 丢失所致。如果你的环境配置与本书中的示例类似，则它使用的是 libOVD 连接器。可以更新此连接器以反映新的 OID 或 LDAP 目录主机及连接信息。有一个名为\
  \ `adapters.os_xml` 的文件位于 `<DOMAIN_HOME>/config/fmwconfig/ovd/oim` 目录中。在修改此文件之前，请确保管理服务器和\
  \ OIM 托管服务器已关闭。查找以下部分并根据需要更新，以反映新的 LDAP 主机。请注意，仅当新的身份存储类型和版本相同，并且连接器用户名和密码也相同时，才应使用此方法；例如，OID\
  \ 11.1.1.9。如果情况并非如此，你可以重新运行第 10 章中介绍的 LDAP 同步工具。\n\n## 总结\n\n在 Oracle 身份与访问管理套件的安装和配置过程中，有多个环节可能出现问题。安装后，你可能会遇到同步、认证和授权方面的问题。本章介绍了一些用于故障排除和解决常见问题的步骤，涵盖从安装问题到运行时和修改问题。\n\
