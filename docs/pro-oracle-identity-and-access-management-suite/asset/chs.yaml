  WebLogic 管理服务器端口。本例中为 `7001`。登录 Fusion Middleware Control 界面后，使用位于屏幕左侧的菜单结构，定位到位于“身份和访问”下的
  `DIP(11.1.2)` 实例。


  选择 `DIP(11.1.2)` 后，您将看到服务器进程的当前状态，如图 5-2 所示。请注意，执行摘要为空，因为尚无配置文件可供执行。此屏幕是一个快速参考。创建配置文件后，每个配置文件的摘要将显示在此部分。


