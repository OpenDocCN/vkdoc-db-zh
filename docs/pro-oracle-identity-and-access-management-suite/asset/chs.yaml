  ## 总结

  本章涵盖了在新的 WebLogic 域中安装 OIM 所需的步骤。如果从头开始操作，您已了解为元数据存储库创建必要数据库对象的步骤。本章还涵盖了 OIM 及其所需的
  Oracle SOA 安装的实际软件安装和新 WebLogic 域的创建。后续章节将涵盖 OIM 组件的配置以及它们之间的集成。


  # 8. Oracle HTTP Server 和 WebGate 的安装与配置

  至此，Oracle 身份与访问管理套件中所有必需的组件都已就位，这些组件将用于提供与 Oracle 产品和应用程序的单点登录（SSO）。包含身份管理器（Identity
  Manager）使得能够管理 Oracle Internet Directory（OID）轻量级目录访问协议（LDAP）用户存储中的用户。Oracle HTTP
  Server（OHS）和 Oracle Access Manager（OAM）WebGate 代表了 Oracle 应用程序和产品前端的 Web 服务器。从核心上讲，`OHS`是一个带有
  Oracle WebLogic 模块的 Apache Web 服务器。结合 `OAM` `WebGate` 软件，`OHS`成为了一个中心位置，负责处理传入请求、检查身份验证，并在
  `OAM` 完成其操作后，允许经过身份验证的用户访问所需资源。本章涵盖 Oracle HTTP Server 和 OAM Webgate 的安装与部署。


  ## 预安装任务

  ### 操作系统用户

  对于大多数 Oracle 应用程序的安装，应创建操作系统（OS）用户和组来执行安装和配置任务。创建 OS 组将允许其他 OS 用户执行与应用程序环境管理相关的特定任务。在
  Linux 环境中安装 Oracle 应用程序时，最常见的 OS 用户和组是 `oracle` 用户以及 `oinstall` 或 `dba` 组。


  要创建必要的 `oinstall` 和 `dba` 组，以 root 用户身份执行以下命令：


  ```

  [root@clouddemolab home]# groupadd oinstall

  [root@clouddemolab home]# groupadd osdba

  ```


  创建组后，创建 `oracle` 用户：


  ```

  [root@clouddemolab home]# useradd  -g oinstall -G osdba oracle

  ```


  **注意**

  `-g` 表示用户应加入的主要组。`-G` 表示任何次要组。


  要设置用户密码，请以 root 用户身份使用以下命令。


  ```

  [root@clouddemolab home]# passwd oracle

  ```


  ### 操作系统配置

  在安装 Oracle 融合中间件基础架构和 Oracle 身份管理软件之前，确保操作系统满足最低要求和配置至关重要。以下列出了所需的内核参数、软件包以及文件更改。


  需要设置以下内核参数：


  ```

  kernel.sem  256  32000  100  143

  kernel.shmmax 10737418240

  ```


  要设置这些参数，请编辑位于 `/etc` 目录下的 `sysctl.conf` 文件。


  ```

  [root@clouddemolab home]# vi /etc/sysctl.conf

  ```


  在此文件的部分中添加或编辑以下行：


  ```

  '
- "# Controls the maximum number of shared memory segments, in pages\nkernel.shmall\
  \ = 4294967296\nkernel.sem = 256 32000 100 142\nkernel.shmmax = 10737418240\n```\n\
  \n在 `sysctl.conf` 文件中设置这些值后，您必须激活并验证新值是否生效，使用此命令：\n\n```\n[root@clouddemolab home]#\
  \ /sbin/sysctl –p\nnet.ipv4.ip_forward = 0\nnet.ipv4.conf.default.rp_filter = 1\n\
  net.ipv4.conf.default.accept_source_route = 0\nkernel.sysrq = 0\nkernel.core_uses_pid\
  \ = 1\nnet.ipv4.tcp_syncookies = 1\nnet.bridge.bridge-nf-call-ip6tables = 0\nnet.bridge.bridge-nf-call-iptables\
  \ = 0\nnet.bridge.bridge-nf-call-arptables = 0\nkernel.msgmnb = 65536\nkernel.msgmax\
  \ = 65536\nkernel.shmmax = 68719476736\nkernel.shmall = 4294967296\nkernel.sem =\
  \ 256 32000 100 142\nkernel.shmmax = 10737418240\n```\n\n打开文件限制必须设置为 4096 以支持该实例。为此，编辑\
  \ `limits.conf` 文件。\n\n```\n[root@clouddemolab home]# vi /etc/security/limits.conf\n\
  ```\n\n如果环境要安装在 Oracle Linux 或 RedHat Linux 上，您还必须同时编辑 `/etc/security/limits.d/90-nproc.conf`\
  \ 文件。如果遗漏了这一步，该文件中的值可能会覆盖 `limits.conf` 文件中的值。\n\n在这两个文件中，确保添加或编辑了以下行：\n\n```\n\
  * soft nofile 4096\n* hard nofile 65536\n* soft nproc 2047\n* hard nproc 16384\n\
  ```\n\n编辑此文件后，必须重新启动服务器以确保所有更改生效。\n\n\n\n### 操作系统软件包\n\n每个 Oracle 应用程序都依赖于一组特定的软件包。根据您使用的\
  \ Linux 版本，安装过程可能会有所不同。在以下列表中，请注意，在 64 位操作系统上，某些软件包需要同时安装 32 位和 64 位版本。如果这些软件包未安装，安装将无法正确完成。Oracle\
  \ 安装程序会执行检查，并在安装过程中显示错误。\n\n```\nbinutils-2.20.51.0.2-5.28.el6\ncompat-libcap1-1.10-1\n\
  compat-libstdc++-33-3.2.3-69.el6 for x86_64\ncompat-libstdc++-33-3.2.3-69.el6 for\
  \ i686\ngcc-4.4.4-13.el6 gcc-c++-4.4.4-13.el6\nglibc-2.12-1.7.el6 for x86_64\nglibc-2.12-1.7.el6\
  \ for i686\nglibc-devel-2.12-1.7.el6 for i686\nlibaio-0.3.107-10.el6\nlibaio-devel-0.3.107-10.el6\n\
  libgcc-4.4.4-13.el6\nlibstdc++-4.4.4-13.el6 for x86_64\nlibstdc++-4.4.4-13.el6 for\
  \ i686\nlibstdc++-devel-4.4.4-13.el6\nlibXext for i686\nlibXtst for i686\nlibXext\
  \ for x86_64\nlibXtst for x86_64\nopenmotif-2.2.3 for x86_64\nopenmotif22-2.2.3\
  \ for x86_64\nredhat-lsb-core-4.0-7.el6 for x86_64\nsysstat-9.0.4-11.el6\nxorg-x11-utils*\n\
  xorg-x11-apps*\nxorg-x11-xinit*\nxorg-x11-server-Xorg*\nxterm\npdksh-5.2.14\n```\n\
  \n此时，操作系统应已完全准备好进行后续安装。在安装软件之前执行这些操作将确保安装过程顺利进行。在许多情况下，如果遗漏了任何步骤，安装程序会提供详细的错误消息。如果在安装过程中出现错误，请停止安装并在继续之前解决所有问题。\n\
  \n## Oracle HTTP Server 软件安装与配置\n\n`OHS` 软件的安装和配置非常直接。安装程序会引导您完成整个过程，并在最后配置服务器。因此，安装结束后，您应该能够通过访问指定的主机名和端口来测试服务器。\n\
  \n与 `Identity Management` 安装程序类似，它是通过在软件目录下运行命令来启动的。图 8-1 显示了 `Web Tier Installer`\
  \ 的欢迎页面。\n\n![A352855_1_En_8_Fig1_HTML.jpg](img/A352855_1_En_8_Fig1_HTML.jpg)\n\n\
  图 8-1.\n\n启动 Universal Installer\n\n```\nrunInstaller -jreLoc /home/oracle/jdk1.6.0_45/jre\n\
  ```\n\n在此阶段，请确保欢迎屏幕上显示了您计划安装的 `OHS` 版本。每个 `OHS` 版本都有其专属的安装程序。在安装 `OHS` 之前，您应检查 `Oracle`\
  \ 认证矩阵，以确保 `OAM WebGate` 版本兼容。\n\n`OHS` 是一个可以使用“安装并配置”选项的组件，如图 8-2 所示。这是执行此操作的最简单方法，因为它不需要在之后运行其他工具或手动修改配置文件。\n\
  \n![A352855_1_En_8_Fig2_HTML.jpg](img/A352855_1_En_8_Fig2_HTML.jpg)\n\n图 8-2.\n\n\
  安装并配置设置\n\n在本章开头，列出了操作系统先决条件。如果显示任何错误或警告，请在继续之前解决这些问题。安装程序将检查操作系统并通知您任何缺失的先决条件，如图\
  \ 8-3 所示。\n\n![A352855_1_En_8_Fig3_HTML.jpg](img/A352855_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3.\n\n先决条件检查屏幕\n\n`OHS` 可以安装在现有的 `WebLogic home directory` 中，也可以放置在新目录中。如果您计划在域中注册此\
  \ `OHS` 实例，则必须将该软件安装在该域的 `Middleware Home directory` 中。但是，将 `OHS` 安装在其独立的目录中而不将其与域注册也是完全可以接受的做法。虽然您可能会失去一些监控和管理功能，但大多数操作都可以通过命令行执行。如图\
  \ 8-4 所示，输入为 `Web Tier` 指定的新 `Middleware Home` 位置。\n\n![A352855_1_En_8_Fig4_HTML.jpg](img/A352855_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4.\n\nMiddleware Home 位置\n\n至少，您应该安装 `Oracle HTTP Server` 组件，如图 8-5 所示。如果您的环境中需要\
  \ `Web Cache`，请选择它。此处选中 `Oracle Web Cache` 复选框仅是为了展示配置屏幕。`Web Cache` 超出了本书的讨论范围。因为此\
  \ `OHS` 实例将独立于 `WebLogic` 域运行，所以“将选定组件与 `WebLogic` 域关联”复选框未被选中。\n\n![A352855_1_En_8_Fig5_HTML.jpg](img/A352855_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5.\n\n配置组件屏幕\n\n在“指定组件详细信息”屏幕上，您可以为每个组件指定实例主目录和名称。确保将它们设置为您容易记住的值。图 8-6 显示了“指定组件详细信息”屏幕的示例。\n\
  \n![A352855_1_En_8_Fig6_HTML.jpg](img/A352855_1_En_8_Fig6_HTML.jpg)\n\n图 8-6.\n\n\
  指定组件详细信息屏幕\n\n如果配置 `Web Cache`，则必须为管理员用户提供密码。在对 `Web Cache` 进行配置更改时需要此用户。请提供所需的信息，如图\
  \ 8-7 所示。\n\n![A352855_1_En_8_Fig7_HTML.jpg](img/A352855_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7.\n\nWeb Cache 管理员密码屏幕\n\n\n\nOHS 服务器的安装将默认使用端口 `7777`。如果您选择使用不同的端口，例如 `80`、`443`\
  \ 或两者都用，可以通过修改 `staticports.ini` 文件来完成配置。或者，您也可以稍后更新位于实例配置目录下的 `httpd.config` 文件。图\
  \ 8-8 展示了一个使用 `自动端口配置` 设置的安装过程。\n\n![A352855_1_En_8_Fig8_HTML.jpg](img/A352855_1_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8. 端口配置\n\n`安装概要` 屏幕，如图 8-9 所示，为您提供待安装组件的概览。点击 `安装` 继续。\n\n![A352855_1_En_8_Fig9_HTML.jpg](img/A352855_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9. 安装概要屏幕\n\n一般来说，此过程需要 `5` 到 `10` 分钟。`安装进度` 屏幕，如图 8-10 所示，将显示进度以及实际正在进行的流程。如果出现任何错误，请参考屏幕上显示的日志文件。\n\
  \n![A352855_1_En_8_Fig10_HTML.jpg](img/A352855_1_En_8_Fig10_HTML.jpg)\n\n图 8-10.\
  \ 安装进度屏幕\n\n安装程序完成安装后，它将立即开始基于先前屏幕上的输入来配置新创建的实例。每个步骤可能都需要一点时间。配置完成后，安装程序将启动 OHS\
  \ 进程。请监控图 8-11 所示的 `配置进度` 屏幕，如果有任何错误，请检查指定的日志文件。\n\n![A352855_1_En_8_Fig11_HTML.jpg](img/A352855_1_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11. 配置进度屏幕\n\n图 8-12 中的 `安装完成` 屏幕指示了新 Web 层的所有安装和配置详情。\n\n![A352855_1_En_8_Fig12_HTML.jpg](img/A352855_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12. 安装完成屏幕\n\n您已完成 OHS 的安装和配置，现在拥有一个可用的 Web 服务器，可作为各种应用程序的前端。通过 OHS，您会获得 Oracle\
  \ WebLogic 模块，该模块允许您配置各种位置由底层 WebLogic 应用服务器处理。`Mod_wl_ohs` 包含处理基于 WebLogic 应用程序的反向代理和集群故障转移所需的配置。本章下一节将介绍在\
  \ HTTP 服务器上安装和配置 OAM WebGate 的步骤。\n\n## Oracle Access Manager WebGate 安装与配置\n\n\
  允许 OAM 保护资源并处理 SSO（单点登录）的关键组件是 WebGate。当请求进入时，OAM WebGate 会评估请求并确定是否需要认证。如果请求的资源受保护，WebGate\
  \ 会将认证责任移交给 OAM。一旦 OAM 对用户进行了认证，它就会在浏览器中设置会话信息，WebGate 利用这些信息允许用户访问被允许的应用程序。\n\n\
  WebGate 安装过程与其他安装程序类似，首先是图 8-13 所示的欢迎屏幕。重要的是确保该版本与您已安装的 OAM 版本兼容。\n\n![A352855_1_En_8_Fig13_HTML.jpg](img/A352855_1_En_8_Fig13_HTML.jpg)\n\
  \n图 8-13. 安装开始\n\nOAM WebGate 的安装启动方式与其他 Oracle 应用程序的安装类似，使用通用安装程序。从下载的安装介质 `Disk1`\
  \ 中，执行：\n\n```\n./runInstaller.sh –jreLoc /home/oracle/jdk1.6.0_45/jre\n```\n\n\
  如果您在开始时花时间确保满足所有操作系统先决条件，此屏幕应正常完成所有检查。如果任何检查失败，请在此处解决问题后再继续。有关已完成的先决条件检查示例，请参见图\
  \ 8-14。\n\n![A352855_1_En_8_Fig14_HTML.jpg](img/A352855_1_En_8_Fig14_HTML.jpg)\n\
  \n图 8-14. 先决条件检查屏幕\n\nOracle WebGate 应安装在与 OHS 相同的 Middleware Home 位置内。如果这是在 WebLogic\
  \ Middleware Home 中完成的，请确保 WebGate 软件共享此主目录。列出的 `Oracle 主目录` 在该目录中应是唯一的，如图 8-15\
  \ 所示。\n\n![A352855_1_En_8_Fig15_HTML.jpg](img/A352855_1_En_8_Fig15_HTML.jpg)\n\n\
  图 8-15. 安装位置\n\n`安装概要` 屏幕，如图 8-16 所示，展示了待安装组件及其位置的摘要。请花时间确保一切看起来正确。\n\n![A352855_1_En_8_Fig16_HTML.jpg](img/A352855_1_En_8_Fig16_HTML.jpg)\n\
  \n图 8-16. 安装详情\n\n与本书中安装的其他产品一样，OHS 11g WebGate 安装程序提供了一个进度指示器，如图 8-17 所示。如果出现任何错误，您可以监控指示的安装日志。\n\
  \n![A352855_1_En_8_Fig17_HTML.jpg](img/A352855_1_En_8_Fig17_HTML.jpg)\n\n图 8-17.\
  \ 安装进度屏幕\n\n在安装阶段结束时，请记下图 8-18 所示完成屏幕上提供的详细信息。\n\n![A352855_1_En_8_Fig18_HTML.jpg](img/A352855_1_En_8_Fig18_HTML.jpg)\n\
  \n图 8-18. 安装完成屏幕\n\n至此，OAM WebGate 的安装完成。在下一节中，您将完成 WebGate 在 OHS 环境中的初始配置和部署。\n\
  \n\n\n## 配置与部署 Oracle WebGate\n\n既然 OHS 和 OAM WebGate 软件已安装完毕，是时候将 WebGate 部署到 OHS\
  \ 中了。执行此操作的工具位于 Oracle WebGate 主目录中。该目录是在安装过程中选定的。\n\n打开命令提示符，导航至以下目录：\n\n```\n\
  /webgate/ohs/tools/deployWebGate\n```\n\n工具 `deployWebGateInstance.sh` 需要两个参数：WebGate\
  \ 主目录和 WebGate 实例主目录。这两个参数分别通过 `–w` 和 `–oh` 参数指定。用 `–oh` 指定的 WebGate 主目录是 WebGate\
  \ 软件的安装目录。用 `–w` 指定的 WebGate 实例目录是 OHS 实例目录，在多数情况下，该目录位于 `Oracle_WT1/instances/instance1/config/OHS/ohs1`。\n\
  \n命令应类似于以下形式：\n\n```\n./deployWebGateInstance.sh –w /home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1\
  \ –oh /home/oracle/OHSMiddleware/Oracle_OAMWebGate11g\n```\n\n运行 `deployWebGateInstance.sh`\
  \ 工具会将所需的代理文件复制到 WebGate 实例目录中。你可以通过查看目录 `/home/oracle/Oracle_WT1/instances/instance1/config/OHS/ohs1`\
  \ 来验证这一点。你应该会看到一个 `webgate` 目录和一个 `webgate.conf` 文件。\n\n部署过程的下一步是修改所需的文件，以使 OHS\
  \ 能够识别 WebGate。\n\n为此，你必须首先通过运行以下命令确保 `LD_LIBRARY_PATH` 包含了 OHS 的 `lib` 文件夹：\n\n\
  ```\nexport LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/home/oracle/OHSMiddleware/Oracle_WT1/lib\n\
  ```\n\n接下来，移动到目录 `/home/oracle/OHSMiddleware/Oracle_OAMWebGate11g/webgate/ohs/tools/setup/InstallTools`。在此目录下，运行命令：\n\
  \n```\n./EditHttpConf –w  -oh \n```\n\n上述命令需要两个参数：WebGate 主目录和 WebGate 实例主目录。这两个参数分别通过\
  \ `–w` 和 `–oh` 参数指定。用 `–oh` 指定的 WebGate 主目录是 WebGate 软件的安装目录。用 `–w` 指定的 WebGate\
  \ 实例目录是 OHS 实例目录，在多数情况下，该目录位于 `Oracle_WT1/instances/instance1/config/OHS/ohs1`。\n\
  \n验证命令是否已做出适当的更改。检查 `/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/conf/OHS/ohs1`\
  \ 目录中的 `httpd.conf` 文件。它现在应该在文件末尾包含以下行：\n\n```\ninclude \"/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1/webgate.conf”\n\
  ```\n\n## 总结\n\n现在你已经拥有一个 OHS 和 OAM 11g WebGate 实例。你的 OHS 可以用作 Web 服务器来托管需要 OAM\
  \ 保护的应用程序。基础组件现已就位，可以实施 Oracle 标识与访问管理套件。接下来的几章将提供将所有部分整合在一起所需的信息。\n\n# 9. 配置 Oracle\
  \ Access Manager\n\n所有必需的组件现已安装完毕。你已经在独立的 Middleware Home 中为每个组件创建了一个域。这简化了未来的升级和维护。完成这组操作后，实际的组件需要被配置，并为实际的集成做好准备。配置过程包括根据你的环境设置组件。以下几页将讨论如何配置\
  \ OAM 以支持你环境中的单点登录 (SSO)。\n\n## 准备 Access Manager 使用 Oracle Internet Directory\n\
  \n默认情况下，OAM 被配置为同时使用 WebLogic 内置的轻量目录访问协议 (LDAP) 用户存储区作为系统存储区和默认存储区。强烈建议你在生产环境中配置\
  \ OAM 使用外部数据存储区。虽然你可能并非在设置生产环境，但建议你将开发或测试环境配置得与生产系统相似。因此，本章将演示如何配置 OAM 使用 Oracle\
  \ Internet Directory (OID) 作为其标识存储区。\n\n要使用 OID 作为标识存储区，第一步是配置 WebLogic 安全域以识别 OID。将浏览器指向\
  \ `http://host:port/console` 来打开 OAM WebLogic 域管理控制台。在本书中，OAM WebLogic Server 管理控制台配置的主机为\
  \ `10.0.70.229`，端口为 `17001`。如果你还记得前面的章节，OID 使用端口 `7001`，而 Oracle Identity Manager\
  \ (OIM) 使用 `27001`。图 9-1 显示了 WebLogic 管理控制台的安全域。\n\n![A352855_1_En_9_Fig1_HTML.jpg](img/A352855_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1. WebLogic Server 安全域\n\n登录到 OAM 域的管理控制台后，导航至“安全域” ➤ “myrealm”。屏幕将显示在域创建期间配置的默认安全域。它由\
  \ DefaultAuthenticator、IAMSuiteAgent 和 DefaultIdentityAsserter 组成。在此步骤中，你将添加一个身份验证器以支持\
  \ OID。单击“新建”以创建新的身份验证器。这将打开如图 9-2 所示的“创建新身份验证提供程序”屏幕。\n\n![A352855_1_En_9_Fig2_HTML.jpg](img/A352855_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2. 创建 OID 身份验证器\n\n在此屏幕上，为新身份验证器提供一个名称。在本例中，将其命名为 `OIDAuthenticator`，并在“类型”字段中选择\
  \ `OracleInternetDirectoryAuthenticator`。单击“确定”。\n\n图 9-3 显示了 WebLogic 身份验证提供程序的重新排序屏幕。\n\
  \n![A352855_1_En_9_Fig3_HTML.jpg](img/A352855_1_En_9_Fig3_HTML.jpg)\n\n图 9-3. 重新排序提供程序\n\
  \n创建新提供程序后，应将其设置为提供程序列表中的第一位。选中新 `OIDAuthenticator` 旁边的复选框，然后使用箭头将其移动到适当的位置。单击“确定”保存此步骤。然后，你可以继续设置图\
  \ 9-4 所示的“控制标志”属性。\n\n![A352855_1_En_9_Fig4_HTML.jpg](img/A352855_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4. 提供程序公共配置\n\n对提供程序重新排序后，必须配置 `OIDAuthenticator`。首先将控制标志设置为 `Sufficient`。这允许新创建的身份验证器提供身份验证服务，但不要求用户必须存在于\
  \ OID 用户存储区中才能访问资源。这是必要的，因为某些用户（例如 `weblogic`）可能不存在于 OID 中。完成 `OIDAuthenticator`\
  \ 的配置后，`DefaultAuthenticator` 上的控制标志也必须设置为 `Sufficient`。\n\n在如图 9-5 所示的“提供程序详细信息”选项卡上，输入新身份验证器的配置详细信息。在本例中，根据表\
  \ 9-1 中的值进行设置。\n\n表 9-1. OID 身份验证器参数\n\n| 参数 | 描述 |\n| :--- | :--- |\n| 主机 | 安装\
  \ OID 的主机 |\n| 端口 | OID LDAP 端口（OID 默认为 `3060`） |\n| 主体 | `cn=orcladmin` 或用于身份验证器的其他主体\
  \ |\n| 凭证 | 主体使用的密码 |\n| 用户基准 DN | `cn=users,dc=mycompany,dc=com` |\n| 组基准 DN |\
  \ `cn=groups,dc=mycompany,dc=com` |\n\n![A352855_1_En_9_Fig5_HTML.jpg](img/A352855_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5. 身份验证器详细信息\n\n\n\n根据需要自定义其他字段。在大多数情况下，默认值即可正常工作。点击“保存”继续。如前所述，需要将 `DefaultAuthenticator`\
  \ 的控制标志配置为 `Sufficient`。以图 9-6 所示的待更新字段为例。\n\n![A352855_1_En_9_Fig6_HTML.jpg](img/A352855_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6.\n默认验证器控制标志\n\n配置完 `OIDAuthenticator` 属性，并为 `OIDAuthenticator` 和 `DefaultAuthenticator`\
  \ 均设置好控制标志后，您需要重启 OAM 托管服务器和 WebLogic 管理服务器。请遵循本书前面介绍的步骤来重启所有进程。\n\n## 为 Oracle\
  \ Access Manager 预配置 OID\n\n随着 OAM 域配置好 OID 验证器，现在需要在 OAM 内配置身份存储。此配置确保 OAM 使用先前配置的\
  \ OID 实例。\n\n首次登录 `OAMConsole` 时，您需要使用 `weblogic` 用户，因为 OAM 当前使用的是默认验证器，且 `oamadmin`\
  \ 尚未获得 `OAMConsole` 的管理员访问权限。因此，流程的第一步是在 OID 中创建必要的用户和组，为集成做准备。\n\n打开命令提示符，将工作目录设置为\
  \ `<ORACLE_HOME>/idmtools/bin`，其中 `<ORACLE_HOME>` 是 OAM 的安装目录。本节所有 IDM 工具命令都将在此位置运行。\n\
  \n**注意**\nIDM 工具应始终从同一位置运行，以确保参数文件被正确更新。但是，在拆分域中（即 OIM 安装在单独的 WLS 主目录或独立服务器上），您需要在\
  \ OIM 主目录中运行 `–configOIM` 命令。\n\n在运行 `idmConfigTool.sh` 命令之前，必须确保环境变量已正确设置。若设置不当，将导致各种错误，且并非所有错误都会明确指出原因。请按如下方式设置环境变量：\n\
  \n```bash\nMW_HOME=/home/oracle/OAMMiddlewareHome\nJAVA_HOME=\nIDM_HOME=/home/oracle/OIDMiddlewareHome\n\
  ORACLE_HOME=/home/oracle/OAMMiddlewareHome/Oracle_IAM1\nIAM_ORACLE_HOME=/home/oracle/OAMMiddlewareHome/OracleIAM1\n\
  ```\n\n这些值应反映您特定环境中使用的安装目录。请注意，`MW_HOME` 和 `ORACLE_HOME` 与 Oracle Access Management\
  \ 安装相关。`IDM_HOME` 应指向 OID 安装目录。`IDM_HOME` 是一个可选参数，如果 OID 安装在单独的服务器上，可以省略。\n\n创建一个名为\
  \ `extendOAMPropertyFile` 的文件：\n\n```\nextendOAMPropertyFile\nIDSTORE_HOST: 10.0.70.229\n\
  IDSTORE_PORT: 3060\nIDSTORE_BINDDN: cn=orcladmin\nIDSTORE_USERNAMEATTRIBUTE: cn\n\
  IDSTORE_LOGINATTRIBUTE: uid\nIDSTORE_USERSEARCHBASE: cn=Users,dc=mycompany,dc=com\n\
  IDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com\nIDSTORE_SEARCHBASE: dc=mycompany,dc=com\n\
  IDSTORE_SYSTEMIDBASE: cn=systemids,dc=mycompany,dc=com\n```\n\n`extendOAMPropertyFile`\
  \ 中的值应设置如下：\n\n*   `IDSTORE_HOST`：应设置为 OID 实例的主机名，或负载均衡 OID 实例的虚拟主机名。\n*   `IDSTORE_PORT`：设置为\
  \ OID 实例的 LDAP 端口。\n*   `IDSTORE_BINDDN`：`cn=orcladmin`。工具将使用此值登录 OID。该用户应有权在 `usersearchbase`\
  \ 和 `groupsearchbase` 内创建用户和组。\n*   `IDSTORE_LOGINATTRIBUTE`：应设置为 LDAP 存储中包含登录名的属性。\n\
  *   `IDSTORE_USERSEARCHBASE`：将此属性设置为 ID 存储中存储用户的位置。\n*   `IDSTORE_GROUPSEARCHBASE`：将此属性设置为\
  \ ID 存储中存储组的位置。\n*   `IDSTORE_SEARCHBASE`：包含上述搜索基的父容器。\n*   `IDSTORE_SYSTEMIDBASE`：将存储身份管理套件所用系统\
  \ ID 的新容器。\n\n创建一个名为 `preConfigOAMProperties` 的文件，内容如下：\n\n```bash\nvi preconfigOAMPropertyFile\n\
  IDSTORE_HOST : 10.0.70.229\nIDSTORE_PORT : 3060\nIDSTORE_BINDDN : cn=orcladmin\n\
  IDSTORE_USERNAMEATTRIBUTE: cn\nIDSTORE_LOGINATTRIBUTE: uid\nIDSTORE_USERSEARCHBASE:\
  \ cn=Users,dc=mycompany,dc=com\nIDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com\n\
  IDSTORE_SEARCHBASE: dc=mycompany,dc=com\nIDSTORE_SYSTEMIDBASE: cn=systemids,dc=mycompany,dc=com\n\
  POLICYSTORE_SHARES_IDSTORE: true\nOAM11G_IDSTORE_ROLE_SECURITY_ADMIN:OAMAdministrators\n\
  IDSTORE_OAMSOFTWAREUSER:oamLDAP\nIDSTORE_OAMADMINUSER:oamadmin\n```\n\n此文件中输入的值应反映您环境中使用的值。\n\
  \n\n\n*   `IDSTORE_HOST`：应设置为 OID 实例的主机名，或负载均衡 OID 实例的虚拟主机名。\n*   `IDSTORE_PORT`：设置为\
  \ OID 实例的 LDAP 端口。\n*   `IDSTORE_BINDDN`：cn=orcladmin。此值将被工具用于登录 OID。该用户应有权在 usersearchbase\
  \ 和 groupsearchbase 内创建用户和组。\n*   `IDSTORE_LOGINATTRIBUTE`：应设置为 LDAP 存储中包含登录名的属性。\n\
  *   `IDSTORE_USERSEARCHBASE`：将此属性设置为 ID 存储中存储用户的位置。\n*   `IDSTORE_GROUPSEARCHBASE`：将此属性设置为\
  \ ID 存储中存储组的位置。\n*   `IDSTORE_SEARCHBASE`：包含前述 searchbase 的父容器。\n*   `IDSTORE_SYSTEMIDBASE`：将存储身份管理套件所用系统\
  \ ID 的新容器。\n*   `POLICYSTORE_SHARES_IDSTORE`：设置为 true。\n*   `OAM11G_IDSTORE_ROLE_SECURITY_ADMIN`：将包含\
  \ OAM 管理员的 LDAP 组的名称。\n*   `IDSTORE_OAMSOFTWAREUSER`：将被 OAM 进程使用的 OAM 用户。\n*   `IDSTORE_OAMADMINUSER`：将在\
  \ OAM 控制台中拥有管理员权限的新用户。\n\n现在可以运行`idmConfigTool.sh`命令，为 OAM 创建必要的容器、组和用户。请按如下方式运行该命令。\n\
  \n首先，扩展 LDAP 身份存储以进行 Access Manager 集成。\n\n```\n./idmConfigTool.sh –preConfigIDStore\
  \ input_file=extendOAMPropertyFile\n```\n\n输出应类似于以下内容：\n\n```\n[oracle@clouddemolab\
  \ bin]$ ./idmConfigTool.sh -preConfigIDStore input_file=extendOAMPropertyFile\n\
  Enter ID Store Bind DN Password :\nJan 5, 2016 1:14:42 PM oracle.ldap.util.LDIFLoader\
  \ loadOneLdifFile\nINFO: -> LOADING: /home/oracle/IAMMiddleware/Oracle_IAM1/idmtools/templates/oid/idm_idstore_groups_template.ldif\n\
  Jan 5, 2016 1:14:43 PM oracle.ldap.util.LDIFLoader loadOneLdifFile\nINFO: -> LOADING:\
  \ /home/oracle/IAMMiddleware/Oracle_IAM1/idmtools/templates/oid/idm_idstore_groups_acl_template.ldif\n\
  Jan 5, 2016 1:14:43 PM oracle.ldap.util.LDIFLoader loadOneLdifFile\nINFO: -> LOADING:\
  \  /home/oracle/IAMMiddleware/Oracle_IAM1/idmtools/templates/oid/idstore_tuning.ldif\n\
  Jan 5, 2016 1:14:43 PM oracle.ldap.util.LDIFLoader loadOneLdifFile\nINFO: -> LOADING:\
  \  /home/oracle/IAMMiddleware/Oracle_IAM1/idmtools/templates/oid/oid_schema_extn.ldif\n\
  Jan 5, 2016 1:14:50 PM oracle.ldap.util.LDIFLoader loadOneLdifFile\nINFO: -> LOADING:\
  \  /home/oracle/IAMMiddleware/Oracle_IAM1/../oracle_common/modules/oracle.ipf_11.1.1/scripts/ldap/OID_OracleSchema.ldif\n\
  Jan 5, 2016 1:15:01 PM oracle.ldap.util.LDIFLoader loadOneLdifFile\nINFO: -> LOADING:\
  \  /home/oracle/IAMMiddleware/Oracle_IAM1/idmtools/templates/oid/fa_pwdpolicy.ldif\n\
  The tool has completed its operation. Details have been logged to automation.log\n\
  ```\n\n如果报告任何错误，请检查`automation.log`文件并纠正错误，然后再继续。\n\nLDAP 身份存储预配置完成后，您需要运行创建的第二个文件来填充容器，如下一个示例所示。\n\
  \n```\n./idmConfigTool.sh –prepareIDStore mode=OAM input_file=preconfigOAMPropertyFile\n\
  ```\n\n运行此命令时，系统将提示您设置`oblixanonymous`、`oamLDAP`和`oamadmin`用户的密码。输出将类似于以下摘录。\n\n\
  ```\n[oracle@clouddemolab bin]$ ./idmConfigTool.sh -prepareIDStore mode=OAM input_file=preconfigOAMPropertyFile\n\
  Enter ID Store Bind DN Password :\n*** Creation of Oblix Anonymous User ***\nJan\
