  显示先决条件检查已成功完成。


  ![A352855_1_En_6_Fig12_HTML.jpg](img/A352855_1_En_6_Fig12_HTML.jpg)


  **图 6-12. 先决条件检查屏幕**


  如果在先决条件检查期间发现任何问题，则必须予以解决。这包括 OS 软件包和参数。


