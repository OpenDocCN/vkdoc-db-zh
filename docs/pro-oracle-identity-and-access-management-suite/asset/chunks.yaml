  trans: '

    此命令为交互式。尽管您可以在命令中提供参数值，但仍建议您以交互方式运行，并根据提示输入值，以防止以明文输入密码，并避免因拼写错误而导致执行问题。请参考表 15-3，根据提示输入脚本变量。


    表 15-3. AccessGate 部署参数


    | 脚本变量 | 描述 |

    | --- | --- |

    | `-dDeploymentName` | 输入一个可用于标识应用程序部署的值。此处，该值前缀为 `ebsauth_`，然后是所使用的 EBS 实例 `dev`。此值也将用作受
    WebGate 保护的上下文根。 |

    | `-DasadminUser` | 输入先前创建的、具有 UMX/APPS 模式连接权限的 EBS 用户。您应确保可以使用此用户在 EBS 中本地登录。
    |

    | `-DasadminPassword` | 这是运行脚本时的可选参数。出于安全原因，您可以选择不包含它。如果在命令中不包含它，命令运行时会提示您输入。
    |

    | `-DWebGateLogoutURL` | 此值应设置为先前创建的 `oacleanup.html` 文件的完整 URL。例如，应输入为 `http://10.0.70.229:7777/public/oacleanup.html`。请勿使用相对
    URL。 |

    | `-DOAMLogoutURL` | 输入 OAM 全局注销的完整 URL；例如，`http://10.0.70.229:7777/oam/server/logout`。
    |

    | `-DserverName` | 将此值设置为您在 WebLogic 环境中使用的部署服务器。在上一步中，您创建了一个受管服务器。作为最佳实践，请不要将任何内容部署到管理服务器。最好使用专用的受管服务器。此处使用
    `ebsag_server1`。 |

    | `-Dwlspwd` | 根据提示输入 weblogic 用户密码。尽管可以在命令中包含此密码，但最好不要在命令中包含明文密码。 |


    Oracle EBS AccessGate 应用程序现已部署在 OAM WLS 环境中。您还创建了支持该应用程序所需的必要数据源。该应用程序已配置为知道如何使用管理员用户连接到
    EBS。


    ### 验证 AccessGate 应用程序部署


    配置 Oracle EBS AccessGate 应用程序资源并将应用程序部署到受管服务器后，建议在继续之前验证其操作并检查是否存在任何错误配置。如果发现任何问题，此时是纠正它们的最佳时机。要验证应用程序设置，您可以使用位于
    `http://<hostname>:<adminserver_port>/console` 的 OAM WLS 管理控制台；例如，`http://10.0.70.229:17001/console`。


    登录 WLS 管理控制台后，导航到 Environment ➤ Servers，并确保新创建的 EBS AccessGate 受管服务器 `ebsag_server1`
    在指定端口上运行。


    接下来，检查为 EBS AccessGate 受管服务器创建的数据源。使用左侧菜单，转到 Services ➤ DataSources，并检查您在部署期间创建的数据源（例如
    `ebsAG_ds`）是否存在，并且是否定位到正确的受管服务器（例如 `ebsag_server1`）。单击数据源链接以查看设置。在“设置”视图中，使用“连接池”选项卡，根据部署参数中的指定，确保属性“用户”和“dbcFile”的值正确。您还应使用“监控”选项卡确保数据源已启用并正在运行。如果需要，您还可以在“监控”选项卡上使用“测试”实用程序来测试连接。


    验证受管服务器和数据源后，导航到 Deployments，并查找名为 `ebsauth_dev` 的 Oracle EBS AccessGate 应用程序。它应处于已部署、活动状态且运行状况正常。如果不是这种情况，请尝试停止并重新启动部署。检查
    WLS 日志中是否有任何可能指示配置问题的错误。


    如果所有组件都已启动并运行，您应该能够使用浏览器访问 AccessGate URL。导航到 `http://<hostname>:<EBSAccessGatePort>/<accessgatename>/ssologout_callback`；例如，`http://10.0.70.229:17043/ebsauth_dev/ssologout_callback`。如果成功，您将看到一个空白页面。如果收到任何错误页面，请检查服务器是否存在问题。


    ### 在 Oracle Access Manager 中配置资源


    配置好 AccessGate 应用程序后，就需要配置 OAM 和相应的 WebGate 来保护 EBS 应用程序 URL 了。为此，您将使用图 15-1 所示的
    OAM oamadmin 界面。使用浏览器登录 OAMConsole 后，导航到“应用程序安全启动板”并单击“应用程序域”以检索当前配置的域列表。您将使用本书前面创建的
    WebGate 域。在此域中，您将创建受 OAM 保护的新资源。


    ![A352855_1_En_15_Fig1_HTML.jpg](img/A352855_1_En_15_Fig1_HTML.jpg)


    图 15-1. Oracle Access Manager WebGate 配置


    新资源应配置如表 15-4 所示。


    表 15-4. EBS 集成的受保护和公共资源配置


    | 资源类型 | 主机标识符 | 资源 URL | 认证策略 | 授权策略 |

    | --- | --- | --- | --- | --- |

    | HTTP | WebGate | `/**` | 公共资源 | 公共资源 |

    | HTTP | WebGate | `/public/index.html` | 公共资源 | 公共资源 |

    | HTTP | WebGate | `/excluded/index/html` | 排除 | 排除 |

    | HTTP | WebGate | `/ebsauth_dev/` | 受保护资源 | 受保护资源 |

    | HTTP | WebGate | `/ebsauth_dev/…/*` | 受保护资源 | 受保护资源 |

    | HTTP | WebGate | `/ebsauth_dev/OAMLogin.jsp` | 公共资源 | 公共资源 |

    | HTTP | WebGate | `/ebsauth_dev/style/` | 公共资源 | 公共资源 |

    | HTTP | WebGate | `/ebsauth_dev/style/…/*` | 公共资源 | 公共资源 |

    | HTTP | WebGate | `/ebsauth_dev/ssologout.do` | 公共资源 | 公共资源 |

    | HTTP | WebGate | `/ebsauth_dev/ssologout_callback` | 公共资源 | 公共资源 |

    | HTTP | WebGate | `/oacleanup.html` | 公共资源 | 公共资源 |

    | HTTP | WebGate | `/cgi-bin/printenv` | 受保护资源 | 受保护资源 |

    '
- fmt: '## Redirect HTTP Server to WebLogic Server for EBS AccessGate


    You will recall, from the beginning of this chapter, that the HTTP server redirects
    requests to the AccessGate for authentication. This redirect must be configured
    at the OHS. The WebGate will act as a proxy for authentication requests for Oracle
    EBS resources. As such, the request will be processed by the Oracle EBS AccessGate
    application that is deployed on your WLS instance.


    Using a command prompt, locate the configuration directory for the OHS instance
    that was created in Chapter 9. This should be located at `/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1`.
    In this directory, you will locate the WLS module configuration file called `mod_wl_ohs.conf`.
    The `httpd.conf` file should, by default have the necessary include for this to
    be picked up during startup. Add the following lines to the `mod_wl_ohs.conf`
    file to include the EBS locations as shown.


    ```

    WebLogicHost 10.0.70.229

    WebLogicPort 17043


    SetHandler weblogic-handler

    ```


    This entry configures the OHS to redirect requests for EBS authentication to the
    managed server with the AccessGate deployment. Ensure the `WebLogicHost` and `WebLogicPort`
    point to the correct location for the installation. Restart OHS.


    You should now be able to access the Oracle ECBS AccessGate resource via your
    HTTP server and WebGate from your browser; for example, `http://10.0.70.229:7777/ebsauth_dev/ssologout_callback`.


    This URL was configured within the OAM Application Domain Resources under the
    Public Resource Policies. As such, you should not be prompted for authentication
    at this point. OHS is now configured to proxy the EBS AccessGate application deployment
    as the authentication service provider.


    ## Configure Centralized Logout


    You might recall that OAM acts as a credential collection agent and authenticates
    the user against the configured identity store, in this case OID. When a user
    logs in to a protected resource, OAM creates the required sessions and cookies
    necessary to ensure a seamless transition to other protected resources and provides
    the SSO environment. During the logout process, OAM cleans up its own session
    information. However, it does not clean up partner application sessions. Thus,
    a user might be logged out of OAM, but the Oracle EBS session cookies might remain
    until the browser is completely closed. The AccessGate software installation provides
    the files necessary to ensure the EBS session information is cleaned up during
    a logout operation for increased security. Configuring a centralized logout will
    ensure the cleanup is performed and EBS sessions are eliminated when a user logs
    out of the SSO application.


    ### Configure the Cleanup File for Logout


    When you extracted the EBS AccessGate zip file, you were provided a file called
    `oacleanup.html`. During the deployment, you copied this file to the `/public`
    subdirectory within the OHS `htdocs` directory. Locate the file and use a text
    editor to update the context root as needed to ensure the script is called properly.


    Find the following line within `oacleanup.html`:


    ```

    <SCRIPT language=JavaScript src="http://<CONTEXT_ROOT>/oacleanup.js"></SCRIPT>

    ```


    Update the entry by replacing `<CONTEXT_ROOT>` with the name of the resource configured
    in OAM. This should match the name of the managed server; for example,


    ```

    <SCRIPT language=JavaScript src="http://ebsauth_dev/oacleanup.js"></SCRIPT>

    ```


    ### Configure Additional Logout Callbacks


    Some environments might have multiple EBS AccessGate instances or additional applications
    for which you might wish to perform a session cleanup after logout. If this is
    the case, you can add a callback for each additional AccessGate or custom application
    as follows. Search the `oacleanup.html` file for the following line:


    ```

    function doLoad()

    ```


    Add the callback for additional applications.


    ```

    logoutHandler.addCallback(''//ssologout_callback'');

    logoutHandler.addCallback(''http://webgatehost2.example.com:7777/ /ssologout_callback'');

    ```


    During the logout process, this ensures that the AccessGate calls the cleanup
    process to destroy Oracle EBS sessions. The OAM centralized logout should also
    include the cleanup for other partner applications protected by the OAM configuration.


    In this example, the Oracle 11g WebGate has been used. As such, the 11g WebGate
    Logout Callback URL can be leveraged for a centralized logout process. Use the
    OAM Console Administration screens to set the URL for Logout Callback.


    In the OAM Administration Console, click the System Configuration tab. In the
    Access Manager section, click the SSO Agents node and then select OAM Agents.
    Click Search and select the SSO agent created previously. Figure 15-2 shows the
    configuration parameters that are used when setting up the SSO Agent Webgate.


    ![A352855_1_En_15_Fig2_HTML.jpg](A352855_1_En_15_Fig2_HTML.jpg)

    *Figure 15-2. Logout Callback URL configuration*


    Set the value of the Logout Callback URL to `http://<ebshost>.<domain>:<port>/OA_HTML/AppsLogout`.


    This concludes the configuration of the OAM and AccessGate centralized logout
    process.


    ## EBS Profile Configuration


    After configuring the Oracle EBS AccessGate application and OAM resources, it
    is necessary to set up the login profiles within the actual EBS environment. Set
    the Oracle EBS profile options in Table 15-5, or have the EBS administrator set
    them.


    *Table 15-5. EBS Profile Configuration Parameters*


    | Profile | Level | Value |

    | :--- | :--- | :--- |

    | Application Authenticate Agent (`APPS_AUTH_AGENT`) | Site | `http://<webgatehost>:<port>/ebsauth_dev/`
    |

    | Applications SSO Type (`APPS_SSO`) | Site | `SSWA w/SSO` |

    | Applications Single Sign On Hint Cookie (`APPS_SSO_HINT_COOKIE_NAME`) | Site
    | `<blank> (null)` This should be null; if there is a value such as `ORASSO_AUTH_HINT`,
    remove it. |


    Restart the applications services on your Oracle EBS middle tier, and then restart
    Oracle EBS AccessGate deployment WLS and managed servers.


    ## Test E-Business Suite Single Sign-On


    Now that all of the necessary components have been deployed and configured, and
    you have set up the Oracle EBS profiles for SSO, you can test the overall environment.
    Previously, you have set up a test URL for ensuring that the proper authentication
    mechanisms were in place. For this step, you will attempt to log in to the Oracle
    EBS system and subsequently log in to another protected resource. If everything
    is working, you should only be prompted one time for authentication within the
    browser session. Additional requests to protected resources should use the existing
    session information and cookies. On logout, all session information should be
    cleaned up and subsequent requests will be prompted for authentication. Use a
    browser to navigate to the EBS login.'
