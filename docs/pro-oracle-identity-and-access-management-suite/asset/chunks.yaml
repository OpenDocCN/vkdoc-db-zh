    ## 总结


    在本章中，我们介绍了集成Oracle EBS和OAM时存在的操作顺序和数据流。需要注意的是，要集成`OID`和`EBS`，需要`OAM`，因为这种集成利用了`EBS
    AccessGate`部署。本章提供了在支持单个`EBS`实例的单个节点上实例化单个`AccessGate`所需的步骤。这些步骤可以修改以支持集群环境，如果其中一个`AccessGate`托管服务器发生故障，则提供更高的可用性和容错能力。多个`AccessGate`部署也可用于支持多个`EBS`实例。


    # 16. 故障排除和常见问题


    你已经遵循了Oracle的文档来确保你的环境符合认证环境。你的操作系统（`OS`）是最新的，系统要求已满足。你运行安装软件，一切看起来都很顺利。突然，安装程序似乎挂起了。用Douglas
    Adams的话说，“不要惊慌”。


    考虑到必须安装、打补丁、配置然后集成以成功实施Oracle身份和访问管理套件的组件数量，你很可能会遇到问题。这些问题可能在安装和初始配置期间出现；也可能在你尝试将组件彼此集成或与其他应用程序集成时浮现。无论何时遇到问题，它们都可能令人沮丧，有时甚至找不到明显的解决方案。很多时候，只是漏掉了一个补丁或配置文件中一个简单的印刷错误。有些问题很容易解决，而另一些则可能需要大量的研究。本章的目的是提供一些常见问题及其解决方案的列表，以及实施者可能需要解决的几个罕见问题。这些内容来自多次安装的汇编和同事们的笔记。


    ## 安装问题


    本书开头介绍了构成Oracle身份和访问管理套件的各种组件。随后，介绍了使环境工作所需的主要组件的安装过程。尽管安装看起来相当直接，但遇到一些问题并不罕见。如果你在过程中陷得不深，重新启动安装软件可能很容易。然而，在这个阶段，你很可能会再次遇到同样的问题，除非你已采取措施解决根本问题。


    在安装阶段，你正在部署应用程序二进制文件。Oracle Universal Installer会检查你的`OS`以确保其满足最低规格。最常遇到的问题是在这个预检查期间发现的。理想情况下，你已经检查过确保安装了正确的`OS`包。然而，包列表很长，如果缺少任何一个，Oracle
    Universal Installer会指出来让你解决。如果你有`root`或`sudo`权限，这些问题可以很容易地解决。根据你选择的`OS`，你可以直接安装它们并继续。


    使用基于`UNIX`的系统时，你可以使用`yum`来安装缺失的包，或者下载缺失的包`rpm`文件并进行安装。请注意，这需要`sudo`或`root`权限。从`rpm`文件安装缺失的包可能是一个漫长的过程，因为你需要找到该包以及所有必需的包才能正确安装它们。大多数时候，像`yum`这样的包安装工具会执行所有所需包的下载和安装。缺失的`OS`包是最容易诊断和解决的问题之一。请参见表[16-1](#A352855_1_En_16_Chapter.html#Tab1)，了解本书涵盖的每个主要组件所需的包列表。根据你的环境，这些包可能需要安装在你所有的服务器上，或者只安装在特定的服务器上，具体取决于每个服务器上安装的组件。


