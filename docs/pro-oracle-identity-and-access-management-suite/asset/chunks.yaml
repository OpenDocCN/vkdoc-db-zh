    在安装期间或后续配置、运行时可能遇到的其他问题与操作系统环境及配置有关。以下信息将概述如何成功设置环境。


    需要设置以下内核参数：

    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    要设置这些参数，请编辑位于 `/etc` 目录下的 `sysctl.conf` 文件。

    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    在该文件的相应部分添加或编辑以下行：

    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    在 `sysctl.conf` 文件中设置好这些值后，您必须激活并使用此命令验证新值是否生效：

    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    打开文件限制必须设置为 4096 以支持实例。为此，请编辑 `limits.conf` 文件。

    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    如果要在 Oracle Linux 或 RedHat Linux 上安装环境，还必须在 `/etc/security/limits.d/90-nproc.conf`
    中进行相同的编辑。如果忽略了这一步，该文件中的值可能会覆盖 `limits.conf` 文件中的值。


    在这两个文件中，确保添加或编辑以下行：

    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    编辑此文件后，必须重启服务器以确保所有更改生效。


    通过确保在启动安装程序之前满足上述先决条件，大多数安装问题都可以解决或预防。


    ## 常见配置问题


    由于 Oracle 身份和访问管理套件有三个主要组件——Oracle Internet Directory (OID)、Oracle Access Manager
    (OAM) 和 Oracle Identity Manager (OIM)——本节将分别介绍相关问题。


    ### Oracle Internet Directory


    作为 OIM 和 OAM 的后端目录，如果 OID 环境配置不当，整个堆栈后续必将出现问题。虽然在此阶段配置向导会执行大部分工作，但仍可能出现问题。表 16-1
    中列出的操作系统包足以满足 OID 安装需求，前述的内核参数也同样适用。正如 OAM 和 OIM 有 Java 版本范围要求一样，OID 版本对 Java
    开发工具包 (JDK) 的版本和更新也非常敏感。对于 OID 11.1.1.9，请确保您使用的是 JDK 1.7 update 80。OID 可以安装在高于
    update 80 的环境中，但需要仔细验证其兼容性。最常见的情况是，安装似乎运行正确。然而，在配置阶段，当域部署正在运行时，您可能会遇到问题。


    许多组织使用 Active Directory 环境作为其网络轻量目录访问协议 (LDAP)。通常的做法是建立一个目录集成平台 (DIP) 来保持 OID
    环境与 Active Directory 同步。有时，这种同步会要求将符合特定条件的用户添加到某个 OID 子树中，而其他用户则放入另一个子树。其他环境可能只想同步符合复杂规则集的
    Active Directory 用户子集。OID 11.1.1.9 Directory 支持多组同步配置文件，每组都可以有自己的过滤规则集。然而，您可能会遇到复杂规则的问题。很多时候，这仅表现为用户未同步，并且当尝试在
    EM 控制台中加载 DIP 配置文件时，控制台会挂起。此时您还会注意到服务器上的内存使用量激增。在需要类似 `searchfilter=(&(objectclass=user)(|(company=
    BB*))(!(objectclass=computer))` 这样的规则的情况下，请在搜索筛选器周围添加双引号，使其格式如下：`searchfilter="(&(objectclass=user)(|(company=
    BB*))(!(objectclass=computer)"`。


    ### Oracle Access Manager


    OAM 为身份和访问管理环境处理单点登录 (SSO) 功能。在配置期间，可能会出现一些问题。本节涵盖了一些常见问题及解决方法。


    **注意：** 在对 OAM 配置进行任何更改之前，备份一份 `DOMAIN_HOME/config/fmwconfig/oam_config.xml` 文件可能会很有用。


    在 Access Manager 控制台中更改身份存储可能会有点棘手。然而，您可能正在更换身份存储，或将其迁移到新环境。在这些情况下，如果遵循一些准则，此活动可以轻松完成。首先，确保在您计划用
    Access Manager 管理的新 LDAP 存储中创建一个或多个用户。理想情况下，您将保留一个名为 oamadmin 的用户和一组属于“管理员”组的用户。在图
    16-1 中，显示了带有多个身份存储的 OAM 管理控制台。每个存储中至少有一个配置为管理员的用户。创建一个新的身份存储并将其设置为“系统存储”将在此页面中生成一个新部分，您可以在其中选择用于管理实例的用户和组，如图
    16-2 所示。


    ![A352855_1_En_16_Fig2_HTML.jpg](img/A352855_1_En_16_Fig2_HTML.jpg)


    图 16-2. OAM 身份存储选择


    ![A352855_1_En_16_Fig1_HTML.jpg](img/A352855_1_En_16_Fig1_HTML.jpg)


    图 16-1. OAM 管理用户身份存储屏幕


    执行这些任务后，重要的是确保正在使用的 LDAP 身份验证模块或其他身份验证模块配置为使用新的身份存储。未能执行此步骤可能会导致您将来无法访问 OAM 控制台。有关此屏幕示例，请查看图
    16-3。


    ![A352855_1_En_16_Fig3_HTML.jpg](img/A352855_1_En_16_Fig3_HTML.jpg)


    图 16-3. OAM 身份验证模块配置


    即使做了所有准备，此过程仍有可能出错。如果这种情况发生，并且在更改后您完全无法访问 OAM 管理控制台，还有最后一个希望。在 `DOMAIN_HOME/config/fmwconfig`
    目录中，您会找到一个名为 `oam-config.xml` 的文件。关闭 OAM 并编辑此文件以更改身份存储位置或其他属性。重新启动 OAM 受管服务器后，一切应该恢复正常。


