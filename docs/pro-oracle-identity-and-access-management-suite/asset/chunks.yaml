    Each Fusion Middleware application requires a Middleware Home location. In the
    case of OID and the Identity and Access Management environments, these will be
    separate for manageability. For OID, the Middleware Home will be called OIDMiddleware
    located at `/home/oracle/OIDMiddleware`. Subsequent to this screen will be a software
    update screen. You can choose to enter your e-mail address to be notified of updates
    or skip to the next step. See Figure [4-15](#A352855_1_En_4_Chapter.html#Fig15)
    for details.


    ![A352855_1_En_4_Fig15_HTML.jpg](A352855_1_En_4_Fig15_HTML.jpg)


    Figure 4-15.


    WebLogic Server Middleware Home configuration


    After choosing the ORACLE_HOME you intend to use, you will be presented with the
    screen shown in Figure [4-16](#A352855_1_En_4_Chapter.html#Fig16) on which you
    choose the installation type.


    ![A352855_1_En_4_Fig16_HTML.jpg](A352855_1_En_4_Fig16_HTML.jpg)


    Figure 4-16.


    Choosing an installation type


    This step allows you to select a typical or custom installation. A typical installation
