    如图 [8-9](#A352855_1_En_8_Chapter.html#Fig9) 所示的“安装摘要”屏幕为您提供了将要安装的组件的概览。点击“安装”继续。


    ![A352855_1_En_8_Fig9_HTML.jpg](A352855_1_En_8_Fig9_HTML.jpg)

    *图 8-9. 安装摘要屏幕*


    通常，此过程需要 5 到 10 分钟。如图 [8-10](#A352855_1_En_8_Chapter.html#Fig10) 所示的“安装进度”屏幕将显示进度以及正在发生的实际过程。如果出现任何错误，请参考屏幕上显示的日志文件。


    ![A352855_1_En_8_Fig10_HTML.jpg](A352855_1_En_8_Fig10_HTML.jpg)

    *图 8-10. 安装进度屏幕*


    安装程序完成安装后，将立即开始根据之前屏幕上的输入配置新创建的实例。每个步骤可能都需要一点时间。配置完成后，安装程序将启动 OHS 进程。监控图 [8-11](#A352855_1_En_8_Chapter.html#Fig11)
    所示的“配置进度”屏幕，如果出现任何错误，请检查指示的日志文件。


    ![A352855_1_En_8_Fig11_HTML.jpg](A352855_1_En_8_Fig11_HTML.jpg)

    *图 8-11. 配置进度屏幕*


    图 [8-12](#A352855_1_En_8_Chapter.html#Fig12) 中的“安装完成”屏幕指示了新 Web 层的所有安装和配置详细信息。


    ![A352855_1_En_8_Fig12_HTML.jpg](A352855_1_En_8_Fig12_HTML.jpg)

