    in Figure [4-11](#A352855_1_En_4_Chapter.html#Fig11).


    ![A352855_1_En_4_Fig11_HTML.jpg](A352855_1_En_4_Fig11_HTML.jpg)


    Figure 4-11.


    Repository creation configuration Summary screen


    Figure [4-12](#A352855_1_En_4_Chapter.html#Fig12) shows the Repository Creation
    Utility Completion Summary screen. At this point, all of the database schema objects
    have been created and populated with the necessary data required for OID. The
    next steps include installation of the WebLogic infrastructure and OID.


    ![A352855_1_En_4_Fig12_HTML.jpg](A352855_1_En_4_Fig12_HTML.jpg)


    Figure 4-12.


    RCU completed


    ## Fusion Middleware WebLogic Server


    Once the prerequisite tasks have been completed, installation of OID can begin
    with installing the Fusion Middleware WebLogic Server (WLS) . As of this writing,
    OID 11.1.1.9 is certified on WLS 10.3.6\. Although it might be possible to utilize
    a newer version of WLS for this environment, it is highly recommended that you
    follow the certification matrix provided by Oracle. This will ensure compatability
    and supportability if problems occur.


    The Fusion Middleware environment requires the use of a certified Java Development
    Kit (JDK). For the purposes of this discussion, JDK 1.6 Update 45 will be used.
    You can install multiple versions of the JDK on a single machine. However, it
    is important that the `JAVA_HOME` and `PATH` variables are updated to use the
    proper version during the installation and all management tasks. These can be
    done using the following commands, or these can be added to profile scripts to
    avoid retyping the commands.


    ```

    [oracle@clouddemolab ∼]$ export JAVA_HOME=/home/oracle/java/jdk1.6.0_45

    [oracle@clouddemolab ∼]$ export PATH=$JAVA_HOME/bin:$PATH

    ```


    WLS 11g (version 10.3.6) is currently the latest version of WLS certified with
    OID 11.1.1.9\. Therefore, this section covers the installation of this version.
    If installing WLS on a 64-bit system, use of the `wls10.3.6_generic.jar` file
    is required. To use this file execute the command as shown in Figure [4-13](#A352855_1_En_4_Chapter.html#Fig13).


