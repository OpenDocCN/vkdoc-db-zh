    ## Summary


    This chapter covered the installation and initial configuration of OID. This forms
    the foundation of a successful Identity Management implementation. From this point,
    you can start managing application users and attributes within Oracle’s generic
    LDAP directory. Applications, both Oracle and third party, can connect to OID
    to validate user credentials as an LDAP identity store. The identity store can
    also be used by databases for authentication. Although OID provides basic LDAP
    authentication and a data store for identity-based systems, the environment maintains
    only single authentication to single applications. Oracle Access Manager can provide
    a better user experience where users log in once and have access to applications
    that have been incorporated into the environment. Oracle Identity Manager will
    provide user self-service and management services. These additional components
    depend on a solid LDAP implementation and are presented in future chapters.


    # 5. Directory Synchronization and Virtualization


    Oracle Internet Directory (OID), Oracle Virtual Directory (OVD), and the Directory
    Integration Platform (DIP) provide Oracle Directory Services with the ability
    to consolidate user management and integrate with other applications. These concepts
    were presented in earlier chapters. This chapter covers using the DIP to replicate
    users into the OID instance from Active Directory in preparation for the rest
    of the integration with EBS and Oracle Identity and Access Manager.

