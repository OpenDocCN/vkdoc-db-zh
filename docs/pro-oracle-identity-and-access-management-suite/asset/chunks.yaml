    目录位置。您应仅将此软件安装在现有的 Middleware Home 内。此位置是 WebLogic 在此过程开始时安装的位置。


    ![A352855_1_En_6_Fig13_HTML.jpg](img/A352855_1_En_6_Fig13_HTML.jpg)


    **图 6-13. Oracle Middleware Home 选择屏幕**


