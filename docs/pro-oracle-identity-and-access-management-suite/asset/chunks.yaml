    ## 总结


    本章是 OAM 安装过程的演练。在安装软件文件之后，向您展示了 OAM 域的配置。此时，所有必要的文件已复制完毕，文件系统已准备就绪。如果您的实施只需要 SSO，可以跳过下一章关于
    Identity Manager 安装的内容。


    # 7. Identity Manager 安装


    在前两章中，提供了安装和配置 Oracle Internet Directory (OID) 和 Oracle Access Manager (OAM) 的说明。这两个组件奠定了身份存储和单点登录
    (SSO) 的基础。Identity Manager 为环境添加了额外的元素，例如用户自助服务和治理，从而完成了端到端身份生命周期管理的实施。本章重点介绍
    Oracle Identity Manager (OIM) 的安装和初始域配置。


    ## 预安装任务


    ### 操作系统用户


    对于大多数 Oracle 应用程序安装，应创建操作系统 (OS) 用户和组来执行安装和配置任务。创建 OS 组将允许其他 OS 用户执行与管理应用程序环境相关的特定任务。在
    Linux 环境中安装 Oracle 应用程序最常见的 OS 用户和组是 `oracle` 用户以及 `oinstall` 或 `dba` 组。


    要创建必要的 `oinstall` 和 `dba` 组，请以 root 目录执行以下命令：


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd dba

    ```


    创建组后，创建 `oracle` 用户：


    ```

    [root@clouddemolab home]# useradd  -g oinstall -G dba oracle

    ```


    注意


    `-g` 表示用户应添加到的主组。`-G` 表示任何辅助组。


    要设置用户密码，请以 root 用户身份使用以下命令。


    ```

    [root@clouddemolab home]# passwd oracle

    ```


    ### 操作系统配置


    在安装 Oracle Fusion Middleware 基础架构和 Oracle Identity Management 软件之前，确保操作系统满足最低要求和配置非常重要。以下列出了所需的内核参数、软件包以及文件更改。


    需要设置以下内核参数：


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    要设置这些参数，请编辑 `/etc` 目录中的 `sysctl.conf` 文件。


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    在文件的此部分添加或编辑以下行：


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    在 `sysctl.conf` 文件中设置这些值后，必须激活并验证是否显示新值，使用此命令：


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    打开文件限制必须设置为 4096 以支持实例。为此，请编辑 `limits.conf` 文件。


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    如果环境要安装在 Oracle Linux 或 RedHat Linux 上，则必须同时在 `/etc/security/limits.d/90-nproc.conf`
    中执行编辑。如果遗漏了此步骤，此文件中的值可能会覆盖 `limits.conf` 中的值。


    确保在这两个文件中添加或编辑以下行：


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    编辑此文件后，必须重新启动服务器以确保所有更改生效。'
- fmt: '### Operating System Packages


    Each Oracle application has its own set of required packages. Depending on the
    version of Linux you are using, the installation procedure might be different.
    In the following list, you should note that some packages require both 32-bit
    and 64-bit versions to be installed on a 64-bit OS. If these packages are not
    installed, the installation will not complete properly. The Oracle Installer will
    check these and display errors during the installation.


    ```

    binutils-2.20.51.0.2-5.28.el6

    compat-libcap1-1.10-1

    compat-libstdc++-33-3.2.3-69.el6 for x86_64

    compat-libstdc++-33-3.2.3-69.el6 for i686

    gcc-4.4.4-13.el6 gcc-c++-4.4.4-13.el6

    glibc-2.12-1.7.el6 for x86_64

    glibc-2.12-1.7.el6 for i686

    glibc-devel-2.12-1.7.el6 for i686

    libaio-0.3.107-10.el6

    libaio-devel-0.3.107-10.el6

    libgcc-4.4.4-13.el6

    libstdc++-4.4.4-13.el6 for x86_64

    libstdc++-4.4.4-13.el6 for i686

    libstdc++-devel-4.4.4-13.el6

    libXext for i686

    libXtst for i686

    libXext for x86_64

    libXtst for x86_64

    openmotif-2.2.3 for x86_64

    openmotif22-2.2.3 for x86_64

    redhat-lsb-core-4.0-7.el6 for x86_64

    sysstat-9.0.4-11.el6

    xorg-x11-utils*

    xorg-x11-apps*

    xorg-x11-xinit*

    xorg-x11-server-Xorg*

    xterm

    pdksh-5.2.14

    ```


    At this point in the procedure, the OS should be fully prepared for the installation
    to proceed. Performing these operations prior to installing the software will
    ensure a problem-free installation. In many cases, the installer will provide
    detailed messages if anything is missed. In the event of errors during the installation
    process, stop the installation and fix any problems problem before proceeding.


    ### Database Preparation


    Just like the OID, the installation of OIM requires specific database objects
    to be created. This includes a number of tables, views, and packages created in
    various database schemas. This is done using the Repository Creation Utility (RCU).
    Although the database objects can be created within the OID database, it is often
    recommended that the Oracle Identity and Access Management repository be created
    in a separate instance. This simplifies database administration tasks and future
    maintenance. To prevent issues with installation, it is important to ensure the
    RCU version used matches the version of the Fusion Middleware product to be installed.
    Mismatches found during the domain configuration will prevent the process from
    continuing. Unzip the download and run `rcu.sh` found in the `<RCU_HOME>/rcu/bin`
    directory. You will first see the Create Repository screen shown in Figure [7-1](#A352855_1_En_7_Chapter.html#Fig1).


    ![A352855_1_En_7_Fig1_HTML.jpg](A352855_1_En_7_Fig1_HTML.jpg)

    Figure 7-1.


    Create or Drop schema.


    Because this is the first time installing OIM, select the Create option on this
    screen. This will start the RCU in creation mode.


    After choosing to create the schemas, you must enter the database connection details
    for the target system on the screen shown in Figure [7-2](#A352855_1_En_7_Chapter.html#Fig2).
    You can choose to create the Identity Manager schema within the same database
    as the OID. However, to keep database administration simpler, the Identity Manager
    schema is often installed within a different database. This instance can be the
    same as the OAM.


    ![A352855_1_En_7_Fig2_HTML.jpg](A352855_1_En_7_Fig2_HTML.jpg)

    Figure 7-2.


    Database Connection Details screen.


    Note: `$ORACLE_HOME/rdbms/admin/xaview.sql` must be run to enable the XA transactions
    views and synonyms before the OIM schemas can be created.


    After the RCU verifies the connection details, it will prompt you to select the
    components to be installed within the new repository. This screen is shown in
    Figure [7-3](#A352855_1_En_7_Chapter.html#Fig3).


    ![A352855_1_En_7_Fig3_HTML.jpg](A352855_1_En_7_Fig3_HTML.jpg)

    Figure 7-3.


    Select Components screen.


    During this step of the RCU, you must select the components to be installed. Note
    that as you select the OIM component, other required items will be preselected.
    Do not deselect these, as they will be validated during the domain configuration
    step. The RCU will then validate that the database meets the prerequisites necessary
    for the components selected as seen in Figure [7-4](#A352855_1_En_7_Chapter.html#Fig4).


    ![A352855_1_En_7_Fig4_HTML.jpg](A352855_1_En_7_Fig4_HTML.jpg)

    Figure 7-4.


    Checking prerequisites.


    Each of the Fusion Middleware components has database requirements, such as maximum
    connections or open processes. The RCU will check these prerequisites prior to
    creating the database schemas and objects.


    Provided the database meets the minimum requirements, the next step is to enter
    passwords to be used by the new database schemas, as shown in Figure [7-5](#A352855_1_En_7_Chapter.html#Fig5).


    ![A352855_1_En_7_Fig5_HTML.jpg](A352855_1_En_7_Fig5_HTML.jpg)

    Figure 7-5.


    Schema Passwords screen.


    During this step, indicate the value you wish to use for the password. You can
    elect to use the same password for all schemas or use a different password for
    each. Make the decision based on security requirements and ease of management.


    Figure [7-6](#A352855_1_En_7_Chapter.html#Fig6) displays the tablespace review
    screen, which shows the new database tablespaces that will be created for the
    selected Identity Management components. You can click Next to continue or choose
    to customize the new tablespaces.


    ![A352855_1_En_7_Fig6_HTML.jpg](A352855_1_En_7_Fig6_HTML.jpg)

    Figure 7-6.


    Tablespace listing.


    Prior to the actual creation of the tablespaces, the RCU will present you with
    a summary of the actions it will take. Figure [7-7](#A352855_1_En_7_Chapter.html#Fig7)
    shows the Summary screen. You should make note of these for future reference when
    talking with your DBAs in case of runtime problems related to the database.


    ![A352855_1_En_7_Fig7_HTML.jpg](A352855_1_En_7_Fig7_HTML.jpg)

    Figure 7-7.


    Creation Summary screen.


    After all database objects have been created, you will be provided with the Completion
    Summary screen, shown in Figure [7-8](#A352855_1_En_7_Chapter.html#Fig8). Click
    Close to complete the process.


    ![A352855_1_En_7_Fig8_HTML.jpg](A352855_1_En_7_Fig8_HTML.jpg)

    Figure 7-8.


    Completion Summary screen.


    This completes the repository creation process for OIM. The necessary database
    schemas and objects for Identity Manager and its required components have been
    installed within the target database. It is now possible to continue with the
    installation process.


    ### Identity Manager Software Installation


    In the previous section, you were taken through the steps to create the OIM database
    schemas and objects. The following sections discuss the installation of the Identity
    Manager software. This process creates the necessary file system structure and
    lays down the binaries needed by the Fusion Middleware products presented.


    OIM must be installed within a WLS home. In Chapter [6](#A352855_1_En_6_Chapter.html),
    you were presented with the steps to install OAM in a separate WLS home. You can
    choose to install the Identity Manager software in the same home as Access Manager,
    or you can create a completely separate home specifically for it. It is common
    to separate Access Manager from Identity Manager on different tiers of the network,
    or on different physical hosts. If this is required for your environment, follow
    the WLS installation steps in Chapter [4](#A352855_1_En_4_Chapter.html).'
