    ### 将 HTTP 服务器重定向到 WebLogic 服务器以访问 EBS AccessGate


    正如本章开头所述，HTTP 服务器会将请求重定向到 AccessGate 进行认证。此重定向必须在 OHS 上配置。WebGate 将作为 Oracle EBS
    资源认证请求的代理。因此，该请求将由部署在您的 WLS 实例上的 Oracle EBS AccessGate 应用程序处理。


    使用命令提示符，找到第 9 章中创建的 OHS 实例的配置目录。该目录应位于 `/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1`。在此目录中，您将找到名为
    `mod_wl_ohs.conf` 的 WLS 模块配置文件。默认情况下，`httpd.conf` 文件应包含必要的 include 指令，以便在启动时加载此配置。将以下几行添加到
    `mod_wl_ohs.conf` 文件中，以包含 EBS 位置，如下所示。


    ```

    WebLogicHost 10.0.70.229

    WebLogicPort 17043


    SetHandler weblogic-handler

    ```


    此条目配置 OHS，将 EBS 认证请求重定向到部署了 AccessGate 的托管服务器。确保 `WebLogicHost` 和 `WebLogicPort`
    指向安装的正确位置。重启 OHS。


    现在，您应该能够通过浏览器从您的 HTTP 服务器和 WebGate 访问 Oracle ECBS AccessGate 资源；例如，[`http://10.0.70.229:7777/ebsauth_dev/ssologout_callback`](http://10.0.70.229:7777/ebsauth_dev/ssologout_callback)。


    此 URL 已在 OAM 应用程序域资源下的公共资源配置策略中配置。因此，此时不应提示您进行认证。OHS 现在已配置为代理 EBS AccessGate 应用程序部署作为认证服务提供者。


    ## 配置集中式登出


    您可能记得，OAM 充当凭据收集代理，并根据配置的身份存储（本例中为 OID）对用户进行认证。当用户登录到受保护资源时，OAM 会创建必要的会话和 Cookie，以确保无缝过渡到其他受保护资源，并提供
    SSO 环境。在登出过程中，OAM 会清理其自身的会话信息。然而，它不会清理合作伙伴应用程序的会话。因此，用户可能已从 OAM 登出，但 Oracle EBS
    会话 Cookie 可能仍然存在，直到浏览器完全关闭。AccessGate 软件安装提供了必要的文件，以确保在执行登出操作时清理 EBS 会话信息，从而增强安全性。配置集中式登出将确保在用户从
    SSO 应用程序登出时执行清理操作并消除 EBS 会话。


    ### 为登出配置清理文件


    当您解压 EBS AccessGate zip 文件时，其中包含一个名为 `oacleanup.html` 的文件。在部署过程中，您已将此文件复制到 OHS
    `htdocs` 目录下的 `/public` 子目录中。找到该文件并使用文本编辑器根据需要更新上下文根，以确保脚本被正确调用。


    在 `oacleanup.html` 中找到以下行：


    ```

    function doLoad()

    ```


    更新此条目，将 `<CONTEXT_ROOT>` 替换为在 OAM 中配置的资源名称。此名称应与托管服务器的名称匹配；例如，`//ssologout_callback`。


    ### 配置其他登出回调


    某些环境可能拥有多个 EBS AccessGate 实例或其他应用程序，您可能希望在登出后为其执行会话清理。如果是这种情况，您可以为每个额外的 AccessGate
    或自定义应用程序添加如下回调。在 `oacleanup.html` 文件中搜索以下行：


    ```

    function doLoad()

    ```


    为其他应用程序添加回调。


    ```

    logoutHandler.addCallback(''//ssologout_callback'');

    logoutHandler.addCallback(''http://webgatehost2.example.com:7777/ /ssologout_callback'');

    ```


    在登出过程中，这确保 AccessGate 调用清理过程以销毁 Oracle EBS 会话。OAM 集中式登出还应包括对 OAM 配置保护的其他合作伙伴应用程序的清理。


    在此示例中，使用了 Oracle 11g WebGate。因此，可以利用 11g WebGate 登出回调 URL 实现集中式登出过程。使用 OAM 控制台管理界面设置登出回调的
    URL。


    在 OAM 管理控制台中，单击“系统配置”选项卡。在“访问管理器”部分，单击“SSO 代理”节点，然后选择“OAM 代理”。单击“搜索”并选择先前创建的 SSO
    代理。图 15-2 显示了设置 SSO 代理 WebGate 时使用的配置参数。


    ![A352855_1_En_15_Fig2_HTML.jpg](img/A352855_1_En_15_Fig2_HTML.jpg)


    **图 15-2.** 登出回调 URL 配置


    将“登出回调 URL”的值设置为 `http://<ebshost>.<domain>:<port>/OA_HTML/AppsLogout`。


    至此，OAM 和 AccessGate 集中式登出过程的配置完成。


    ## EBS 配置文件配置


    配置完 Oracle EBS AccessGate 应用程序和 OAM 资源后，需要在实际的 EBS 环境中设置登录配置文件。设置表 15-5 中的 Oracle
    EBS 配置文件选项，或让 EBS 管理员进行设置。


    **表 15-5.** EBS 配置文件配置参数


    | 配置文件 | 级别 | 值 |

    | :--- | :--- | :--- |

    | 应用程序认证代理 (`APPS_AUTH_AGENT`) | 站点 | `http://<webgatehost>:<port>/ebsauth_dev/`
    |

    | 应用程序 SSO 类型 (`APPS_SSO`) | 站点 | `SSWA w/SSO` |

    | 应用程序单点登录提示 Cookie (`APPS_SSO_HINT_COOKIE_NAME`) | 站点 | `<空白> (null)`<br>此项应为空；如果存在诸如
    `ORASSO_AUTH_HINT` 的值，请将其移除。 |


    重启 Oracle EBS 中间层上的应用程序服务，然后重启部署了 Oracle EBS AccessGate 的 WLS 和托管服务器。


    ## 测试电子商务套件单点登录


    现在所有必要的组件都已部署和配置，并且您已为 SSO 设置了 Oracle EBS 配置文件，可以测试整个环境了。此前，您已设置了一个测试 URL 以确保正确的认证机制已就位。在此步骤中，您将尝试登录
    Oracle EBS 系统，随后登录另一个受保护资源。如果一切正常，在浏览器会话中您应仅被提示进行一次认证。对受保护资源的其他请求应使用现有的会话信息和 Cookie。在登出时，所有会话信息都应被清理，后续请求将被提示进行认证。使用浏览器导航至
    EBS 登录页面。

    '
- fmt: '# 16. Troubleshooting and Common Issues


    ## Summary


    按照本章开头描述的步骤，您应该会被重定向到 OAM 认证页面。使用一组存在于身份存储中的有效凭据登录。成功认证后，您应该会被重定向到您的 Oracle EBS
    主页。


    需要注意的是，只有在 EBS 中具有 `Local Login Allowed` 配置文件的用户才能使用 EBS 本地登录。这对管理用户和故障排除很有帮助。


    在本章中，为您介绍了集成 Oracle EBS 和 OAM 时存在的操作顺序和数据流。需要注意的是，要集成 OID 和 EBS，需要 OAM，因为此集成利用了
    EBS AccessGate 部署。本章提供了在支持单个 EBS 实例的单个节点上实例化单个 AccessGate 所需的步骤。这些步骤可以修改以支持集群环境，如果您的某个
    AccessGate 托管服务器发生故障，则可提供更高的可用性和容错能力。多个 AccessGate 部署也可用于支持多个 EBS 实例。


    您已遵循 Oracle 的文档以确保您的环境符合认证环境。您的操作系统 (OS) 是最新的，并且系统要求已满足。您运行安装软件，一切看起来都很顺利。突然，安装程序似乎挂起了。用
    Douglas Adams 的话说，“不要惊慌”。


    考虑到必须安装、打补丁、配置然后集成以成功实施 Oracle Identity and Access Management Suite 的组件数量，您有可能会遇到问题。这些问题可能在安装和初始配置期间出现；也可能在您尝试将组件彼此集成或与其他应用程序集成时浮现。无论您何时遇到问题，它们都可能令人沮丧，有时可能没有明显的解决方案。很多时候，可能遗漏了一个补丁或配置文件中存在一个简单的排版错误。有些问题很容易解决，而其他问题可能需要大量的研究。本章旨在提供一些常见问题和解决方案的列表，以及一些实施者可能需要解决的罕见问题。这些内容来源于多次安装的汇编和同事们的笔记。


    ## Installation Problems


    本书的开头向您介绍了构成 Oracle Identity and Access Management Suite 的各种组件。随后，介绍了使环境工作所需的每个主要组件的安装过程。尽管安装看起来相当简单，但遇到一些问题并不罕见。如果您在过程中走的还不太远，重新启动安装软件可能很容易。然而，在这个阶段，您很可能会再次遇到同样的问题，除非您已采取措施解决根本问题。


    在安装阶段，您正在放置应用程序二进制文件。Oracle Universal Installer 将检查您的操作系统以确保其满足最低规格。最常见的问题是在此预检查期间发现的。理想情况下，您已经检查过以确保安装了正确的操作系统软件包。然而，列表很长，如果缺少任何软件包，Oracle
    Universal Installer 会指出它们供您解决。如果您有 `root` 或 `sudo` 权限，这些问题可能很容易解决。根据您选择的操作系统，您可以安装它们然后继续。


    使用基于 UNIX 的系统，您可以使用 `yum` 安装缺少的软件包，或下载缺少的软件包 `rpm` 文件并进行安装。请注意，这需要 `sudo` 或 `root`
    权限。从 `rpm` 文件安装缺少的软件包可能是一个漫长的过程，因为您需要找到该软件包以及所有必需的软件包才能正确安装它们。大多数情况下，像 `yum` 这样的软件包安装工具会执行所有必需软件包的下载和安装。缺少的操作系统软件包是一些最容易诊断和解决的问题。请参见表
    16-1 以获取本书涵盖的每个主要组件所需软件包的列表。根据您的环境，这些软件包可能需要安装在所有服务器上，或仅安装在特定服务器上，具体取决于每个服务器上安装的组件。


