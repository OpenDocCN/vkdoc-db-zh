  trans: '## 配置 Oracle HTTP Server WebGate


    至此，您已完成集成环境中 OAM 和 OIM 的配置。OAM 为您的应用程序和受保护资源提供了 SSO 环境。在第 8 章中，您已安装并配置了 OHS 和
    Oracle WebGate 11g。OAM 与 WebGate 协同工作以保护资源，并执行身份验证和授权服务。随着 OIM 组件的加入，您必须为 OHS、WebGate
    和 OAM 配置必要的资源策略，以启用 SSO 和自动化流程。


    ### 修改 oim.conf 配置文件


    在 OAM 主目录中，`IAM_HOME/server/setup/templates` 路径下有一个名为 `oim.conf` 的文件。将此文件复制到您的
    OHS 配置目录，并根据您的安装信息修改其中的 OIM 部分。这将配置 HTTP 服务器托管的各个位置，使其受到 WebGate 的保护。该文件至少应包含以下条目。


    ```

    #Callback webservice for SOD


    SetHandler weblogic-handler

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

