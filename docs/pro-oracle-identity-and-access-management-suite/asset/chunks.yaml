- fmt: '#### 联合身份认证


    *   SAML-based federation: `SAML` 是一个行业标准的开放框架，允许共享安全信息。它提供了一种在跨多个域的应用程序之间传输信息的标准方法。它还可以用于链接单个用户在多个站点的账户。`SAML`
    协议提供可在多个安全框架内使用的标准安全令牌。`SAML` 还提供了一种表示安全令牌的标准方法，该令牌可以在业务流程或事务之间传递。这是通过使用 `XML`
    文档来实现的。

    *   OpenID-based federation: `OpenID` 允许任何网站利用身份验证标准，而无需开发自己的系统。它采用单个令牌，可供多个系统使用。`OAM`
    支持交换 `OpenID` 标识符以交换身份数据。这可以通过使用包含 `NameID` 和其他可选属性的令牌，或通过使用 `NameID` 格式（一个散列的用户属性）以及存储在数据存储中的生成值来完成。

    *   OAuth-based federation: 该技术支持委托授权。它是一项行业标准，旨在透明地将一个站点上的私有数据共享给另一个站点。`OAM`
    在其身份联合组件、移动和社交安全以及 `API` 网关（`APGs`）中支持 `OAuth`。通过这些组件，`OAM` 提供符合 `OAuth 2.0` 的令牌颁发、令牌验证和令牌吊销服务。


    #### 移动和社交访问


    随着当今组织对云和其他基于 `Web` 的应用程序的依赖日益加深，其客户和内部用户需要从包括移动设备在内的多个设备和位置进行访问。除了从移动设备访问企业资源外，许多组织还正在部署其用户群日常使用的应用程序的移动版本。Oracle
    通过 `OAM` 的移动和社交访问组件解决了这一日益增长的需求。


    Oracle 的移动和社交访问利用 `OAM` 的核心功能来保护应用程序。这些功能包括凭据收集器、身份验证和授权服务以及 `SSO`。移动和社交访问在设计上以安全为平台，与
    `OAM` 堆栈的自适应访问管理部分集成，以提供审计、设备指纹识别、风险分析和身份验证兼容性。


    移动和社交访问允许企业提供以下功能：


    *   符合 `OAuth 2.0` 的授权委托。

    *   基于浏览器和本机移动应用程序访问身份存储。

    *   与基于云的身份服务（如 `Google` 和 `Facebook`）进行交互。

    *   用于 `LDAP` 操作的 `REST` 接口，可用于用户配置文件服务。


    #### API 和 Web 服务安全


    `OAM` 提供了保护 `Web` 服务安全的能力，以支持行业对面向服务架构（`SOA`）日益增长的使用。如今，越来越多的组织正在暴露可以集成到其他地方使用的应用程序中的
    `Web` 服务。例如，一家公司可能希望在其公司内部网门户中包含一个股票市场应用程序。这些 `Web` 服务必须受到保护，以确保只有授权访问其功能，以免被滥用。`OAM`
    提供符合标准的功能，使用 `Web` 服务管理器（`WSM`）、安全令牌服务和 `APG` 组件来保护 `Web` 服务和应用程序编程接口（`APIs`）。


    `WSM` 使用 `WS-Security`、`SAML` 和 `OAuth` 等协议保护 `Fusion` 中间件产品和应用程序服务。`WSM` 允许企业通过定义策略、执行安全和监控事件来适应不断变化的安全环境。`OAAM`
    进一步增强了这些功能，以帮助组织识别可能的安全漏洞并分析风险，从而实时制定新的安全策略。`OAM` `WSM` 处理 `Web` 服务安全的所有方面，包括身份验证、授权、机密性和完整性，使用公钥基础设施来加密和解密传递的数据。


    `APG` 用于保护部署在云中或企业内部的服务和 `API` 的访问安全。为此，`APG` 能够评估流量以查找可能的威胁，有选择地限制可能包含威胁的请求，并主动扫描内容以查找格式错误的请求和病毒。该网关还允许企业集成
    `LDAP` 身份和策略存储（如 `OUD` 或 `Active Directory`）以执行身份验证和授权规则。


    安全令牌服务通过提供令牌生命周期服务（获取、验证和取消）来管理服务提供商和服务消费者之间的关系。该服务支持 `Web` 服务与 `API` 网关之间的信任、`SSO`
    环境，或者由安全令牌服务在客户端、令牌颁发机构和令牌消费者之间启用的身份传播。


    #### 云访问门户


    `OAM` 访问门户旨在简化对合作伙伴应用程序和与 `OAM` 集成的应用程序的访问。访问门户提供了一个跨平台界面，允许用户从任何设备访问 `OAM` 保护的资源。该门户使管理员能够自动将应用程序预配置到用户的账户中，并使他们能够为用户提供一个目录，供用户选择要包含在其个性化界面上的应用程序。此外，访问门户将允许用户在线更新其凭据，而无需联系管理员或服务台。


    门户上可以使用所有 `OAM` 支持的身份验证类型，从而最大化组织的投资并提高用户生产力。它还能够访问联合的合作伙伴应用程序并使用表单填充身份验证注入，这允许用户存储将用于软件即服务（`SaaS`）或
    `Web` 应用程序登录表单的凭据。访问门户为组织在企业内部部署 `SSO` 环境提供了框架，通过为用户提供访问其应用程序的中心位置来提高用户群的生产力。'
  raw: '*   SAML-based federation: SAML is an industry standard open framework that
    allows the sharing of security information. It provides a standard method of transferring
    information across applications spanning multiple domains. It can also be used
    to link accounts belonging to a single user in multiple sites. The SAML protocol
    provides standard security tokens that can be used within multiple security frameworks.
    SAML also provides a standard method of representing a security token that can
    be passed among business processes or transactions. This is facilitated using
    XML documents.

    *   OpenID-based federation: OpenID allows any web site to leverage an authentication
    standard without the need to develop its own system. It employs the use of a single
    token that can be used by multiple systems. OAM supports the exchange of an OpenID
    identifier to exchange identity data. This can be done using a token containing
    the NameID and other optional attributes or by using the NameID format, a hashed
    user attribute along with a generated value stored within the data store.

    *   OAuth-based federation: This technology supports delegated authorization.
    It is an industry standard designed to transparently share private data on one
    site to another site. OAM supports OAuth within its Identity Federation component,
    Mobile and Social Security, and the API Gateways (APGs). Through these components,
    OAM provides token issuance, token validation, and token revocation services that
    are compliant with OAuth 2.0.


    #### Mobile and Social Access


    As today’s organizations become more and more reliant on cloud and other web-based
    applications, their customers and internal users require access from multiple
    devices and locations including mobile devices. In addition to accessing enterprise
    resources from mobile devices, many organizations are deploying mobile versions
    of applications routinely used by their user base. Oracle has addressed this growing
    need with the Mobile and Social Access component of OAM.


    Oracle’s Mobile and Social Access leverages the core capabilities of OAM to secure
    applications. These include the credential collector, authentication and authorization
    services, and SSO. Designed with security as a platform in mind, Mobile and Social
    Access integrates with the Adaptive Access Management portion of the OAM stack
    to provide auditing, device fingerprinting, and risk analysis and authentication
    compatibility.


    Mobile and Social Access allows the enterprise to provide the following capabilities:


    *   OAuth 2.0-compliant authorization delegation.

    *   Browser-based and native mobile applications access to identity stores.

    *   Interaction with cloud-based identity services such as Google and Facebook.

    *   A REST interface for LDAP operations that can used for user profile services.


    #### API and Web Service Security


    OAM delivers the ability to secure web services to support the industry’s growing
    use of service-oriented architecture. Today more and more organizations are exposing
    web services that can be integrated into other applications in use elsewhere.
    For instance, a company might wish to include a stock market application in its
    own company intranet portal. These web services must be secured to ensure only
    authorized access to the functionality, lest they be misused. OAM offers standards-compliant
    functionality to protect web services and application programming interfaces (APIs)
    using the Web Services Manager (WSM), Secure Token Service, and APG components.


    WSM protects Fusion Middleware Product and Application services using protocols
    such as WS-Security, SAML, and OAuth. WSM allows the enterprise to adjust to the
    ever-changing security landscape by defining policies, enforcing security, and
    monitoring events. These capabilities are further augmented by OAAM to help the
    organization identify possible security breaches and analyze risk to develop new
    security policies in real time. OAM WSM handles all aspects of web service security
    including authentication, authorization, confidentiality, and integrity using
    public key infrastructure to encrypt and decrypt data being passed.


    The APG is used to secure access to services and APIs deployed in the cloud or
    within the enterprise. To do this, the APG is able to evaluate traffic for possible
    threats, selectively restrict requests that possibly contain threats, and actively
    scan content for malformed requests and viruses. The gateway also allows an enterprise
    to integrate LDAP identity and policy stores such as OUD or Active Directory to
    enforce authentication and authorization rules.


    The Secure Token Service manages the relationship between a service provider and
    the service consumer by providing the token life cycle services; acquisition,
    validation, and cancellation. This service supports a trust between the web service
    and the API gateway, an SSO environment, or identity propagation enabled by the
    Secure Token Service between the client, token-issuing authority, and the token
    consumer.


    #### Cloud Access Portal


    The OAM access portal is designed to simplify access to partner applications and
    applications integrated with OAM. The access portal provides a cross-platform
    interface that allows users to access OAM protected resources from any device.
    The portal affords administrators the ability to automatically provision applications
    to users’ accounts and gives them the ability to provide a catalog for users to
    select the applications to include on their personalized interfaces. In addition,
    the access portal will allow users to update their credentials online without
    the need to contact an administrator or help desk.


    All of the OAM supported authentication types can be employed on the portal, thus
    maximizing the organization’s investment and increasing user productivity. It
    is also able to provide access to federated partner applications and use form-fill
    authentication injection, which allows users to store credentials that will be
    used in software-as-a-service (SaaS) or web application login forms. The access
    portal provides the framework for organizations to deploy an SSO environment within
    the enterprise, increasing the productivity of their user base by giving them
    a central location to access their applications.'
