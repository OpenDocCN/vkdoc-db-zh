  trans: '### 数据库准备


    与 OID 类似，OAM 的安装也需要创建特定的数据库对象。这包括在各种数据库模式中创建多个表、视图和包。这是使用**Repository Creation
    Utility (RCU)** 完成的。虽然数据库对象可以在同一个数据库中创建，但通常建议将 Oracle 身份与访问管理存储库创建在一个单独的实例中。这简化了数据库管理任务和未来的维护。RCU
    的“创建存储库”屏幕如图 6-1 所示。请注意下载并运行与您正在安装的 Oracle 身份与访问管理版本指定的 RCU。解压下载文件并运行 `<RCU_HOME>/rcu/bin`
    目录下的 `rcu.sh`。


    ![A352855_1_En_6_Fig1_HTML.jpg](img/A352855_1_En_6_Fig1_HTML.jpg)


    图 6-1.

    创建新模式


    创建数据库存储库对象的过程与为 OID 所做的相同。启动 RCU 并选择“创建”。


    输入 Oracle 数据库详细信息。图 6-1 屏幕中的详细信息指向与 Oracle Directory Services 相同的数据库服务器。但是，数据库实例是专门为
    Oracle Identity and Access Manager 创建的，以使两个系统分离。图 6-2 显示了在屏幕上输入的数据库详细信息。


    ![A352855_1_En_6_Fig2_HTML.jpg](img/A352855_1_En_6_Fig2_HTML.jpg)


    图 6-2.

    输入数据库连接详细信息


    如图 6-3 所示，RCU 将检查以确保数据库满足最低先决条件。如果存在任何失败，必须在继续流程之前予以纠正。


    ![A352855_1_En_6_Fig3_HTML.jpg](img/A352855_1_En_6_Fig3_HTML.jpg)


    图 6-3.

    数据库预检查完成


    在 RCU 的“选择组件”屏幕上，选择 `Oracle Access Manager`，如图 6-4 所示。如果需要，将选择其他组件。这包括诸如 `Audit
    Services`、`Metadata Services` 和 `Oracle Platform Security Services` 等项目。请确保如果项目在选择过程中被添加，您不要取消选择它们。图
    6-4 显示了“选择组件”屏幕。


    ![A352855_1_En_6_Fig4_HTML.jpg](img/A352855_1_En_6_Fig4_HTML.jpg)


    图 6-4.

    组件选择


    RCU 检查目标数据库以确保其满足所选组件的必要要求。RCU 日志将显示遇到的任何错误，这些错误必须在继续之前解决。如图 6-5 所示，RCU 检查所选组件的先决条件。


    ![A352855_1_En_6_Fig5_HTML.jpg](img/A352855_1_En_6_Fig5_HTML.jpg)


    图 6-5.

    数据库先决条件检查


    RCU 验证先决条件后，您将被提示输入新数据库模式使用的密码，如图 6-6 所示。


    ![A352855_1_En_6_Fig6_HTML.jpg](img/A352855_1_En_6_Fig6_HTML.jpg)


    图 6-6.

    模式密码


    您可以将所有模式设置为使用相同的密码，也可以为每个组件设置不同的密码。尽管您的组织可能要求不同的密码，但通常使用相同的密码就足够了。


    “映射表空间”屏幕显示了将为每个组件创建的基本表空间。每个组件都会创建其他对象，可以通过单击屏幕右下角的“管理表空间”来显示它们。图 6-7 显示了为 OAM
    元数据存储库创建的表空间列表。


    ![A352855_1_En_6_Fig7_HTML.jpg](img/A352855_1_En_6_Fig7_HTML.jpg)


    图 6-7.

    表空间列表


    图 6-8 显示了一个可选屏幕，允许您自定义下一步中要创建的表空间的属性。


    ![A352855_1_En_6_Fig8_HTML.jpg](img/A352855_1_En_6_Fig8_HTML.jpg)


    图 6-8.

    `管理表空间` 屏幕


    除非与数据库管理员 (DBA) 紧密合作，否则应避免修改 RCU 期间提供的默认值。但是，您的 DBA 可能会有提高性能的建议或要求。


    图 6-9 展示了“摘要”屏幕。此屏幕让您有机会查看将根据您在先前屏幕上的输入创建的所有对象。如果任何内容看起来不合适，这是在数据库对象创建之前进行最后调整的最后机会。


    ![A352855_1_En_6_Fig9_HTML.jpg](img/A352855_1_En_6_Fig9_HTML.jpg)


    图 6-9.

    创建摘要屏幕


    当 RCU 创建元数据存储库所需的对象时，将显示一个进度屏幕，如图 6-10 所示。请允许此过程在不受中断的情况下完成。如果由于任何原因此过程停止，您应该重新启动
    RCU 以丢弃本次运行的所有组件，并从头开始重新创建。


    ![A352855_1_En_6_Fig10_HTML.jpg](img/A352855_1_En_6_Fig10_HTML.jpg)


    图 6-10.

    RCU 完成


    RCU 已完成，并且所有数据库模式对象都已创建以支持 OAM。现在数据库已准备就绪，可以安装 OAM 软件并配置域了。'
- fmt: '# Access Manager Software Installation


    Oracle软件安装使用Universal Installer。该工具作为引导程序，确保正确的软件二进制文件被安装在正确的位置。`runInstaller`工具要求在运行时指定Java
    Runtime Environment。通过使用`–jreLoc`参数来完成此操作。


    在Linux中，按如下方式运行：


    ```

    [oracle@clouddemolab Disk1]$ ./runInstaller -jreLoc /home/oracle/jdk1.6.0.45/jre

    ```


    图[6-11](#A352855_1_En_6_Chapter.html#Fig11)显示了Oracle Universal Installer的欢迎屏幕。文本中应能看到Oracle
    Identity and Access Management的版本信息，本例中为`11.1.2.3`。如果这与您正在安装的版本不匹配，请找到正确的安装程序软件。上一节运行的RCU仅与`11.1.2.3`兼容。


    ![A352855_1_En_6_Fig11_HTML.jpg](A352855_1_En_6_Fig11_HTML.jpg)


    **图 6-11. 欢迎屏幕**


    与其他Oracle产品一样，安装程序首先验证目标主机是否满足最低要求，以及所有必要的OS软件包是否已安装。详情请参阅本章开头的先决条件列表。图[6-12](#A352855_1_En_6_Chapter.html#Fig12)显示先决条件检查已成功完成。


    ![A352855_1_En_6_Fig12_HTML.jpg](A352855_1_En_6_Fig12_HTML.jpg)


    **图 6-12. 先决条件检查屏幕**


    如果在先决条件检查期间发现任何问题，则必须予以解决。这包括OS软件包和参数。


    ## 运行安装程序


    安装程序确认先决条件后，将要求您提供新的Oracle Middleware Home目录。如图[6-13](#A352855_1_En_6_Chapter.html#Fig13)所示，需要指定一个Middleware
    Home目录位置。您应仅将此软件安装在现有的Middleware Home内。此位置是WebLogic在此过程开始时安装的位置。


    ![A352855_1_En_6_Fig13_HTML.jpg](A352855_1_En_6_Fig13_HTML.jpg)


    **图 6-13. Oracle Middleware Home选择屏幕**


    OAM软件必须安装到现有的Fusion Middleware Home中。安装WLS会创建Fusion Middleware home。安装WLS的说明可以在第[4](#A352855_1_En_4_Chapter.html)章找到。按照这些说明，在名为`IAMMiddleware`的目录中创建一个home。这确保了OAM环境与OID中间件目录结构分离。


    Oracle Identity and Access Manager Installer仅用于安装Oracle Access Manager和Oracle
    Identity Manager。因此，它不会提示您选择要安装的组件。如图[6-14](#A352855_1_En_6_Chapter.html#Fig14)所示，您将看到计划安装内容的摘要。


    ![A352855_1_En_6_Fig14_HTML.jpg](A352855_1_En_6_Fig14_HTML.jpg)


    **图 6-14. 组件摘要**


    ## 先决条件检查


    在完成之前，Universal Installer将显示将安装到Middleware Home中的组件摘要。单击“Install”以放置二进制文件。


    图[6-15](#A352855_1_En_6_Chapter.html#Fig15)中显示的进度条在`proecss`完成时将显示为100%。请耐心等待，因为有时此进度条可能看起来没有移动。如果出现任何问题，请检查屏幕上显示位置的安装日志。


    ![A352855_1_En_6_Fig15_HTML.jpg](A352855_1_En_6_Fig15_HTML.jpg)


    **图 6-15. Oracle Access Manager安装完成**


    ## 选择Middleware Home


    完成后，安装程序将提供已安装组件的摘要和文件位置。请记录完成数据中显示的信息。此完成摘要的示例如图[6-16](#A352855_1_En_6_Chapter.html#Fig16)所示。


    ![A352855_1_En_6_Fig16_HTML.jpg](A352855_1_En_6_Fig16_HTML.jpg)


    **图 6-16. Oracle Identity and Access Management安装完成**


    ## 安装完成


    Oracle Identity and Access Management软件安装现已完成。如前所述，环境可以在拆分域或组合域中实施。在拆分域中，OAM安装在单独的Middleware
    Home中，甚至安装在单独的物理服务器上。组合域将两个组件放在同一个Middleware Home中。出于本书的目的，将使用拆分域。本章的其余部分将重点介绍创建OAM域。'
  raw: '## Access Manager Software Installation


    Oracle software installs using the Universal Installer. The tool works as a guide
    that walks through ensuring the proper software binaries are installed in the
    correct places. The runInstaller tool requires that the Java Runtime Environment
    be specified at runtime. Do this by using the `–jreLoc` parameter.


    In Linux this this is run as follows:


    ```

    [oracle@clouddemolab Disk1]$ ./runInstaller -jreLoc /home/oracle/jdk1.6.0.45/jre

    ```


    Figure [6-11](#A352855_1_En_6_Chapter.html#Fig11) shows the Welcome screen of
    the Oracle Universal Installer. The version information for Oracle Identity and
    Access Management should be seen in the text, in this case, 11.1.2.3\. If this
    does not match the version you are installing, find the correct installer software.
    The RCU run in the previous section is only compatible with 11.1.2.3.


    ![A352855_1_En_6_Fig11_HTML.jpg](A352855_1_En_6_Fig11_HTML.jpg)


    Figure 6-11.


    Welcome screen


    As with other Oracle products, the installer first verifies that the target host
    meets the minimum requirements and that all necessary OS packages are installed.
    See the prerequisites list at the beginning of this chapter for details. Figure
    [6-12](#A352855_1_En_6_Chapter.html#Fig12) shows the prerequisite checks successfully
    completed.


    ![A352855_1_En_6_Fig12_HTML.jpg](A352855_1_En_6_Fig12_HTML.jpg)


    Figure 6-12.


    Prerequisite Checks screen


    If any issues are discovered during the prerequisite checks, they must be addressed.
    This includes OS packages and parameters.


    After the installer has confirmed the prerequisites, you will be asked for the
    new Oracle Middleware Home directory. As seen in Figure [6-13](#A352855_1_En_6_Chapter.html#Fig13),
    a Middleware Home directory location is required. You should only install this
    software within an existing Middleware Home. This location is where WebLogic was
    installed at the start of this process.


    ![A352855_1_En_6_Fig13_HTML.jpg](A352855_1_En_6_Fig13_HTML.jpg)


    Figure 6-13.


    Oracle Middleware Home selection screen


    The OAM software must be installed into an existing Fusion Middleware Home. Installing
    WLS creates the Fusion Middleware home. Instructions to install WLS can be found
    in Chapter [4](#A352855_1_En_4_Chapter.html). Follow those instructions and create
    a home within a directory called `IAMMiddleware`. This ensures the OAM environment
    is separated from the OID middleware directory structure.


    The Oracle Identity and Access Manager Installer is only used to install Oracle
    Access Manager and Oracle Identity Manager. As such, it will not prompt you for
    the components to be installed. As seen in Figure [6-14](#A352855_1_En_6_Chapter.html#Fig14),
    you are provided with a summary of the planned installation.


    ![A352855_1_En_6_Fig14_HTML.jpg](A352855_1_En_6_Fig14_HTML.jpg)


    Figure 6-14.


    Summary of components


    Prior to the completion, the Universal Installer displays a summary of the components
    that wil be installed into the Middleware Home. Click Install to lay down the
    binaries.


    The progress bar shown in Figure [6-15](#A352855_1_En_6_Chapter.html#Fig15) will
    display 100 percent when the proecss is complete. Be patient, as there are times
    when this progress bar might not appear to be moving. Check the install log at
    the location shown on the screen if there are any issues.


    ![A352855_1_En_6_Fig15_HTML.jpg](A352855_1_En_6_Fig15_HTML.jpg)


    Figure 6-15.


    Oracle Access Manager installation completion


    On completion, the installer will provide a summary of the components installed
    and the location of the files. Make a note of the information shown in the completion
    data. An example of this completion summary is shown in Figure [6-16](#A352855_1_En_6_Chapter.html#Fig16).


    ![A352855_1_En_6_Fig16_HTML.jpg](A352855_1_En_6_Fig16_HTML.jpg)


    Figure 6-16.


    Oracle Identity and Access Management installation complete


    The Oracle Identity and Access Management software installation is now complete.
    As discussed previously, the environment can be implemented in a split or combined
    domain. In a split domain, OAM is installed in a separate Middleware Home or even
    a separate physical server. Combined domains place both components within the
    same Middleware Home. For the purposes of this book, a split domain will be used.
    The rest of this chapter focuses on creating the OAM domain.'
