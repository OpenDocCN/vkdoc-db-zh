    server. In a previous chapter, you installed the necessary software and created
    a WebLogic domain. Here, you built on that effort and now should have an OIM instance
    that can be used to create and manage users within the OID Identity Store. You
    also preconfigured this installation in preparation for integrating OIM with OAM.
