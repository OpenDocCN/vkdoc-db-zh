    # Introduction


    Many organizations plan for security throughout the product life cycle for each
    product installed within the environment. Most products provide some sort of user
    storage mechanism. These individual user stores can be used, and might be a viable
    solution for smaller environments with few implemented products. However, this
    can often lead to multiple identity stores, replication of data across business
    units, and management headaches in larger organizations. In addition, the use
    of individual user management functions can lead to users maintaining multiple
    usernames and passwords for all of the products they use. In the end, these users
    are going to use less secure passwords, or worse, write a list of usernames and
    passwords and place it under their keyboard.


    The solution is to implement a single source for identity data that all applications
    can leverage for authentication and authorization. The Lightweight Directory Access
    Protocol (`LDAP`) was designed to provide a standard way to look up information
    in an identity store. With `LDAP`, applications now have a standard way to authenticate
    and authorize users from external stores, provided it is compliant with the `LDAP`
    standard. Business units can now implement software that is `LDAP` compliant and
    access the central user store and no longer require users to maintain multiple
    accounts. Oracle Internet Directory (`OID`) is Oracle’s implementation of a generic
    `LDAP` directory. Other Oracle products such as E-Business Suite, WebCenter Content,
    and `OBIEE` are designed to work with `OID`. Being a generic `LDAP`-compliant
    directory, `OID` can be leveraged by other third-party applications as well.


    Oracle went a step further and introduced Oracle Access Manager (`OAM`) to provide
    single sign-on functionality. Now, instead of each application requiring a separate
    login request, they can be set up to utilize an existing browser token to authenticate,
    thus relieving the user from multiple credential entries. `OAM` supports the Security
    Assertion Markup Language (`SAML`), so it can be configured to provide authentication
    services to third-party cloud-based applications. This also means that Oracle
    cloud-based solutions such as Human Capital Management can be integrated with
    an organization’s `OAM` single sign-on environment.


    No implementation is complete without some sort of identity life cycle management.
    In the past, each application was responsible for its own identity store. This
    led to users having multiple accounts that had to be created and maintained for
    each application they accessed. When users on-boarded, it could take days to weeks
    to get access to everything they needed. Conversely, when a user left the organization,
    there was the possibility that his or her accounts might not be decommissioned
    in a timely manner, if at all. This posed a large security risk. Oracle Identity
    Management (`OIM`) was introduced to bring a new level of governance to enterprise-level
    identity life cycle management. `OIM` provides a central interface for the management
    of user identity data. It can connect to a standard `LDAP` directory, or by using
    Oracle Virtual Directory, it can manage data from multiple stores. The automation
    capabilities provided by `OIM` can reduce the amount of work required to on-board
    users and ensure access is removed when a user leaves the organization.


    The Oracle Identity and Access Management Suite combines the key elements discussed
    here to provide an end-to-end solution for user management. Although it should
    be simple to implement this, there are a variety of steps required to get everything
    working properly and efficiently. This book is intended to provide a guide to
    getting the Identity and Access Management Suite up and running in your environment.
    It demonstrates installation and configuration, along with some architectural
    discussions to help determine what is required in your environment.


    # Acknowledgments'
