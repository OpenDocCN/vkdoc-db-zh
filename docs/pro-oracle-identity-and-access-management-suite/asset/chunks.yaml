- fmt: '### Oracle Virtual Directory


    `OVD` provides a method of presenting multiple identity stores as a single source
    without the need for synchronization and replicating data. Presenting a single
    source enables enterprise applications to access identity data from multiple sources
    such as the database, `EBS`, `Active Directory`, and `OID`.


    Aggregation of multiple data sources allows the enterprise to leverage existing
    identity data across multiple sources without the need for replicating data or
    setting up complicated synchronization tasks. Because `OVD` presents multiple
    data sources without copying the underlying data, significant savings can be realized
    as storage costs are reduced.


    A key capability of `OVD` is its ability to transform identity data into application-specific
    views. Thus it can present non-LDAP data such as database or web services in the
    proper format required for the various applications in place in the enterprise.
    For example, `OVD` can be leveraged to present `Siebel Customer Master` data as
    an `LDAP` source for authentication of other applications. The translation capability
    not only allows multiple applications to view the data as needed, but it also
    allows the organizations to retain control over how they manage and share identity
    data within their own repositories.


    Not only can `OVD` present multiple data stores as a single source, it can support
    the concept of split profiles. For example, an enterprise might store all identity
    data in `Active Directory`. However, applications such as `EBS` might require
    additional metadata for authorization stored in `OID` or the human resources database.
    The `OVD` adapters will allow applications to view this data as a single entry.
    Figure [1-5](#A352855_1_En_1_Chapter.html#Fig5) shows a representation of multiple
    directory sources being consolidated with `OVD`. As this environment is virtual,
    it is all done without replication.


    ![A352855_1_En_1_Fig5_HTML.jpg](A352855_1_En_1_Fig5_HTML.jpg)


    Figure 1-5. Data flow between application and identity sources through `OVD`


    Built to be scalable and highly available, `OVD` can support the enterprise, no
    matter how large. Scaling for performance can be as simple as adding additional
    nodes to the cluster. This can be done in a central location or geographically.
    High availability is supported not only within the `OVD` environment, but it also
    supports load balancing and high availability of its data sources. Although this
    configuration allows a more streamlined environment with no data duplication,
    it can suffer from issues such as lost data if a user is removed from one source
    or orphaned accounts and groups.


    ## Oracle Identity and Access Management


    Most organizations require Identity Services such as an `LDAP` repository. Sometimes
    this is accomplished with a simple network directory such as Microsoft `Active
    Directory`. When considering application security, a more general-purpose directory
    is necessary. `OID`, `OVD`, and `OUD`, presented previously, can be used to provide
    this service. As more and more applications are introduced to the business, users
    can become inundated with authentication dialogs as they switch from one application
    to another.


    `OAM`, a component of the Identity and Access Management Suite, can be leveraged
    to provide `SSO` capabilities. This function can greatly reduce the number of
    times a user must authenticate during the day, thereby increasing productivity.
    This reduction can also be built on by incorporating external and third-party
    applications through federation.


    With `SSO` through `OAM` providing fewer authentication requests, it is important
    that application users keep secure passwords and accounts. Account management
    becomes a necessity as single accounts could have access to a multitude of systems
    and data. Oracle Identity Management is a key component of the Identity Management
    stack that provides user self-service, user management, and a high level of auditability.


    ### Oracle Access Manager


    Oracle Fusion Middleware applications and products have been designed to support
    Oracle Identity Manager (`OIM`) components such as `OID` and `OUD` for identity
    information. Furthermore, these resources can be protected using `OAM`. Oracle
    Access Manager leverages functionality such as session management, identity context,
    and risk analysis to provide authentication and authorization, policy administration
    and enforcement, and `SSO` capabilities to the application environment. `OAM`
    also provides additional functionality, most notably an `SSO` environment for
    organizations that employ multiple Oracle products and Identity Federation support
    to integrate third-party products compatible with Security Assertion Markup Language
    (`SAML`).


    The core of `OAM` is providing authentication and authorization services to an
    enterprise application. It also allows `SSO` capabilities within Oracle Fusion
    Middleware-based environments. Figure [1-6](#A352855_1_En_1_Chapter.html#Fig6)
    provides a high-level depiction of the `OAM` architecture. Access requests to
    protected resources are intercepted by a filter called a `WebGate` or a `mod_osso`
    instance, and sent to `OAM` for processing. `OAM` references configurable authentication
    and authorization policies to determine if the client access will be granted.
    After successful authentication, a cookie is set to ensure continued access to
    the requested resource as well as other resources within the `OAM` environment.


    ![A352855_1_En_1_Fig6_HTML.jpg](A352855_1_En_1_Fig6_HTML.jpg)


    Figure 1-6. Breakout of Oracle Access Manager components'
  raw: '### Oracle Virtual Directory


    OVD provides a method of presenting multiple identity stores as a single source
    without the need for synchronization and replicating data. Presenting a single
    source enables enterprise applications to access identity data from multiple sources
    such as the database, EBS, Active Directory, and OID.


    Aggregation of multiple data sources allows the enterprise to leverage existing
    identity data across multiple sources without the need for replicating data or
    setting up complicated synchronization tasks. Because OVD presents multiple data
    sources without copying the underlying data, significant savings can be realized
    as storage costs are reduced.


    A key capability of OVD is its ability to transform identity data into application-specific
    views. Thus it can present non-LDAP data such as database or web services in the
    proper format required for the various applications in place in the enterprise.
    For example, OVD can be leveraged to present Siebel Customer Master data as an
    LDAP source for authentication of other applications. The translation capability
    not only allows multiple applications to view the data as needed, but it also
    allows the organizations to retain control over how they manage and share identity
    data within their own repositories.


    Not only can OVD present multiple data stores as a single source, it can support
    the concept of split profiles. For example, an enterprise might store all identity
    data in Active Directory. However, applications such as EBS might require additional
    metadata for authorization stored in OID or the human resources database. The
    OVD adapters will allow applications to view this data as a single entry. Figure
    [1-5](#A352855_1_En_1_Chapter.html#Fig5) shows a representation of multiple directory
    sources being consolidated with OVD. As this environment is virtual, it is all
    done without replication.


    ![A352855_1_En_1_Fig5_HTML.jpg](A352855_1_En_1_Fig5_HTML.jpg)


    Figure 1-5.


    Data flow between application and identity sources through OVD


    Built to be scalable and highly available, OVD can support the enterprise, no
    matter how large. Scaling for performance can be as simple as adding additional
    nodes to the cluster. This can be done in a central location or geographically.
    High availability is supported not only within the OVD environment, but it also
    supports load balancing and high availability of its data sources. Although this
    configuration allows a more streamlined environment with no data duplication,
    it can suffer from issues such as lost data if a user is removed from one source
    or orphaned accounts and groups.


    ## Oracle Identity and Access Management


    Most organizations require Identity Services such as an LDAP repository. Sometimes
    this is accomplished with a simple network directory such as Microsoft Active
    Directory. When considering application security, a more general-purpose directory
    is necessary. OID, OVD, and OUD, presented previously, can be used to provide
    this service. As more and more applications are introduced to the business, users
    can become inundated with authentication dialogs as they switch from one application
    to another.


    OAM, a component of the Identity and Access Management Suite, can be leveraged
    to provide SSO capabilities. This function can greatly reduce the number of times
    a user must authenticate during the day, thereby increasing productivity. This
    reduction can also be built on by incorporating external and third-party applications
    through federation.


    With SSO through OAM providing fewer authentication requests, it is important
    that application users keep secure passwords and accounts. Account management
    becomes a necessity as single accounts could have access to a multitude of systems
    and data. Oracle Identity Management is a key component of the Identity Management
    stack that provides user self-service, user management, and a high level of auditability.


    ### Oracle Access Manager


    Oracle Fusion Middleware applications and products have been designed to support
    Oracle Identity Manager (OIM) components such as OID and OUD for identity information.
    Furthermore, these resources can be protected using OAM. Oracle Access Manager
    leverages functionality such as session management, identity context, and risk
    analysis to provide authentication and authorization, policy administration and
    enforcement, and SSO capabilities to the application environment. OAM also provides
    additional functionality, most notably an SSO environment for organizations that
    employ multiple Oracle products and Identity Federation support to integrate third-party
    products compatible with Security Assertion Markup Language (SAML).


    The core of OAM is providing authentication and authorization services to an enterprise
    application. It also allows SSO capabilities within Oracle Fusion Middleware-based
    environments. Figure [1-6](#A352855_1_En_1_Chapter.html#Fig6) provides a high-level
    depiction of the OAM architecture. Access requests to protected resources are
    intercepted by a filter called a WebGate or a mod_osso instance, and sent to OAM
    for processing. OAM references configurable authentication and authorization policies
    to determine if the client access will be granted. After successful authentication,
    a cookie is set to ensure continued access to the requested resource as well as
    other resources within the OAM environment.


    ![A352855_1_En_1_Fig6_HTML.jpg](A352855_1_En_1_Fig6_HTML.jpg)


    Figure 1-6.


    Breakout of Oracle Access Manager components'
  trans: '### Oracle Virtual Directory


    `OVD` 提供了一种方法，能够将多个身份存储呈现为**单一源**，而无需同步和复制数据。呈现为单一源使得企业应用程序能够从多个来源（如数据库、`EBS`、`Active
    Directory` 和 `OID`）访问身份数据。


    聚合多个数据源使企业能够利用跨多个源的现有身份数据，而无需复制数据或设置复杂的同步任务。由于 `OVD` 呈现多个数据源时**不复制底层数据**，因此可以显著节省成本，因为存储开销得以降低。


    `OVD` 的一项关键能力是能够将身份数据转换为**应用程序特定的视图**。因此，它可以将非 LDAP 数据（如数据库或 Web 服务）以各种企业应用程序所需的适当格式呈现。例如，`OVD`
    可用于将 `Siebel Customer Master` 数据作为 `LDAP` 源呈现，供其他应用程序进行身份验证。这种转换能力不仅允许多个应用程序按需查看数据，还使组织能够保留对其自身存储库中身份数据的管理和共享方式的控制权。


    `OVD` 不仅可以将多个数据存储呈现为单一源，还支持**拆分配置文件**的概念。例如，企业可能将所有身份数据存储在 `Active Directory`
    中。然而，像 `EBS` 这样的应用程序可能需要存储在 `OID` 或人力资源数据库中的额外元数据来进行授权。`OVD` 适配器将允许应用程序将这些数据视为单个条目来查看。图
    1-5 展示了通过 `OVD` 整合多个目录源的表示。由于此环境是虚拟化的，所有操作均无需复制即可完成。


    ![A352855_1_En_1_Fig5_HTML.jpg](img/A352855_1_En_1_Fig5_HTML.jpg)


    图 1-5. 通过 `OVD` 在应用程序和身份源之间进行的数据流


    `OVD` 设计为可扩展且高可用，无论企业规模多大，都能提供支持。性能扩展可以像向集群添加更多节点一样简单。这可以在中心位置或跨地域进行。高可用性不仅在 `OVD`
    环境内得到支持，还支持其数据源的负载均衡和高可用。尽管此配置允许一个更精简的环境且无数据重复，但如果用户从一个源中被移除，可能会出现数据丢失、孤立账户和组等问题。


    ## Oracle Identity and Access Management


    大多数组织需要身份服务，例如 `LDAP` 存储库。有时这可以通过简单的网络目录（如 Microsoft `Active Directory`）来实现。然而，在考虑应用程序安全性时，一个更通用的目录是必需的。前面介绍的
    `OID`、`OVD` 和 `OUD` 可用于提供此服务。随着越来越多的应用程序被引入业务，用户在不同应用程序之间切换时，可能会被身份验证对话框淹没。


    `OAM` 是身份与访问管理套件的一个组件，可用于提供 `SSO`（单点登录）功能。此功能可大大减少用户在一天中必须进行身份验证的次数，从而提高生产力。这种减少还可以通过联合方式集成外部和第三方应用程序来进一步扩展。


    通过 `OAM` 实现 `SSO` 减少了身份验证请求次数，但重要的是应用程序用户需保持安全的密码和账户。账户管理变得至关重要，因为单个账户可能访问大量系统和数据。Oracle
    Identity Management 是身份管理技术栈的关键组件，它提供用户自助服务、用户管理以及高水平的可审计性。


    ### Oracle Access Manager


    Oracle Fusion Middleware 应用程序和产品被设计为支持 Oracle Identity Manager (`OIM`) 组件（如 `OID`
    和 `OUD`）来获取身份信息。此外，这些资源可以使用 `OAM` 进行保护。Oracle Access Manager 利用会话管理、身份上下文和风险分析等功能，为应用程序环境提供身份验证和授权、策略管理与执行以及
    `SSO` 能力。`OAM` 还提供额外功能，最显著的是为采用多个 Oracle 产品的组织提供 `SSO` 环境，以及支持与安全断言标记语言 (`SAML`)
    兼容的第三方产品集成的身份联合支持。


    `OAM` 的核心是为企业应用程序提供身份验证和授权服务。它还允许在基于 Oracle Fusion Middleware 的环境内实现 `SSO` 功能。图
    1-6 提供了 `OAM` 架构的高级描述。对受保护资源的访问请求被一个称为 `WebGate` 或 `mod_osso` 实例的过滤器拦截，并发送到 `OAM`
    进行处理。`OAM` 参考可配置的身份验证和授权策略来确定是否授予客户端访问权限。成功身份验证后，会设置一个 Cookie 以确保持续访问所请求的资源以及
    `OAM` 环境内的其他资源。


    ![A352855_1_En_1_Fig6_HTML.jpg](img/A352855_1_En_1_Fig6_HTML.jpg)


    图 1-6. Oracle Access Manager 组件分解'
- fmt: '# Oracle Access Management


    ## Oracle Adaptive Access Management


    OAM不仅提供认证和授权服务；它还使组织能够在应用程序架构的多个层面（如Web层、数据层和应用层）提高安全意识和欺诈检测能力。Oracle Adaptive
    Access Manager (OAAM) 通过增加学习行为和检测可能欺诈活动的能力，增强了OAM认证机制的安全性。OAAM的实时和批处理风险分析组件用于通过模式、规则引擎、操作和交易分析来验证用户身份和活动的有效性。


    以下是OAAM的一些风险分析组件：


    *   `Device fingerprinting`：此功能收集用户交易期间用于连接的设备属性。这些属性用于识别可能的欺诈访问请求。

    *   `Behavioral profiling`：OAAM可以学习用户的正常行为、设备信息、位置和其他数据，以主动检测可能的滥用或安全漏洞。

    *   `Risk engine analytics`：此功能允许对事件、用户配置文件、设备指纹、地理位置和其他数据进行实时分析，以确定用户交互期间的风险级别。分析轨迹可以被审计，以确保采取了适当的措施。

    *   `Predictive analysis`：这促进了与Oracle Data Mining的集成，以提供基于历史数据的异常检测。这也可以用于基于分析数据做出变更决策，因为可以测试不同的模型。

    *   `Investigative forensics`：这可用于为审计和欺诈调查工作提供数据集。数据可以使用Business Intelligence
    Publisher进行定制，也可以使用开箱即用的模板。这些报告可以帮助安全调查员识别实例和可能相关的欺诈访问。

    *   `Universal risk snapshots`：这些用于备份、恢复和迁移现有的安全策略和配置。


    面向用户的防恶意软件和网络钓鱼攻击组件增强了OAAM分析功能，以提供端到端的解决方案。最终用户可能会看到虚拟认证设备、基于知识的认证问题和一次性密码机制，以防止未经授权的账户访问。


    Oracle Adaptive Access Management的面向用户组件包括以下内容：


    *   `Device fingerprinting`：这提供了OAAM收集有关用户设备元数据的能力。这些数据可能包括Cookie、硬件配置、地理位置和网络配置。这些数据用于检测用户行为的变化。

    *   `Knowledge-based authentication`：这通过要求用户回答安全问题来提供第二种形式的认证。

    *   `Answer logic`：此组件使OAAM能够检测基于知识的认证问题的根本正确答案，即使它们有小的打字错误。

    *   `One-time password`：此功能使用户能够通过短消息服务 (SMS) 或电子邮件接收一次性使用的密码，用于系统认证。

    *   `Self-service password management`：用户被授权使用自助服务创建和重置其凭证。


    ## Identity Federation


    随着公司转向基于云的服务或采用外部Web应用程序和其他跨域服务，能够使用相同凭证对这些服务进行认证的需求日益增长。身份联合通过消除传统上为应用程序可能存在于多个域中的不同环境所需的多组凭证，使组织能够简化用户访问管理。OAM支持与SAML、OpenID、表单填充和OAuth的联合。


    Oracle Access Manager身份联合的两个功能组件是服务提供者 (Service Provider) 和身份提供者 (Identity Provider)。身份提供者组件负责建立用户身份、过滤属性、断言身份信息和维护会话。服务提供者负责映射属性、链接身份并将身份信息传递给应用程序。


    在登录时，作为身份提供者，OAM首先对用户进行认证。如果用户会话已超时，身份提供者将确定用户是否需要重新认证。最后，身份提供者组件确定合作伙伴应用程序是否需要符合请求期间指定的级别或方案的质询。为此，OAM允许配置灵活的认证机制。身份联合使用联合认证方法和OAM认证方案映射来控制应如何对用户进行认证质询。


    在注销期间，Access Manager身份提供者服务提供者支持两种不同的流程，具体取决于注销的发起位置：从OAM或从联合合作伙伴应用程序。


    在OAM发起的注销期间：


    1.  用户通过OAM请求注销。

    2.  OAM结束Access Manager会话。

    3.  OAM指示各种WebGate实例删除用户的会话Cookie。

    4.  OAM联合服务执行注销操作，通过HTTP重定向用户或通过简单对象访问协议 (SOAP) 消息发送注销请求来导致合作伙伴应用程序注销。

    5.  OAM联合服务终止联合会话。


    如果注销是通过合作伙伴应用程序发起的：


    1.  合作伙伴应用程序将用户重定向到OAM联合服务。

    2.  联合服务将会话标记为注销。

    3.  用户被重定向到OAM进行注销。

    4.  OAM指示各种WebGate实例删除用户的会话Cookie。

    5.  OAM联合服务执行注销操作，通过HTTP重定向用户或通过SOAP消息发送注销请求来导致合作伙伴应用程序注销。

    6.  OAM联合服务终止联合会话。


    OAM内的身份联合的服务提供者组件与身份提供者协同工作，在联合环境中提供欺诈和风险感知。当身份提供者对用户进行认证时，可以触发服务提供者创建具有适当认证级别的会话，该级别通过联合认证方法映射。这些属性方法作为来自身份提供者的请求属性或映射到OAM会话中传入的断言属性名称是受支持的。


    Oracle Access Management Identity Federation支持多种联合技术，包括SAML、OpenID、OAuth、社交身份和表单填充。'
  raw: '#### Oracle Adaptive Access Management


    OAM does not only provide authentication and authorization services; it also enables
    the organization to increase security awareness and fraud detection across multiple
    levels of the organization’s application architecture such as the web, data, and
    application tiers. Oracle Adaptive Access Manager (OAAM ) strengthens the security
    of OAM’s authentication mechanisms by adding the ability to learn behaviors and
    detect possible fraudulent activities. The real-time and batch risk analysis component
    of OAAM serves to verify user identities and the validity of activities using
    patterns, rule engine, actions, and transaction analysis.


    The following are some of the risk analysis components of OAAM:


    *   Device fingerprinting: This functionality collects attributes of devices used
    to connect during a user’s transaction. These attributes are used to identify
    possible fraudulent access requests.

    *   Behavioral profiling: OAAM can learn users’ normal behavior, device information,
    locations, and other data to provide proactive detection of possible misuse or
    security breaks.

    *   Risk engine analytics: This feature allows the real-time analysis of events,
    user profiles, device fingerprints, geolocation, and other data to determine the
    level of risk during user interactions. The trail of analytics can be audited
    to ensure proper actions were taken.

    *   Predictive analysis: This facilitates the integration with Oracle Data Mining
    to provide anomaly detection based on historical data. This can also be used to
    base change decisions on analysis data as different models are tested.

    *   Investigative forensics: This can be used to provide sets of data for auditing
    and fraud investigation efforts. The data can be customized using Business Intelligence
    Publisher or out-of-the-box templates can be used. These reports can assist security
    investigators in identifying instances and possible related fraudulent access.

    *   Universal risk snapshots: These are used to back up, restore, and migrate
    existing security policies and configurations.


    User-facing components preventing malware and phishing attacks augment OAAM analysis
    functionality to provide an end-to-end solution. End users can be presented with
    virtual authentication devices, knowledge-based authentication questions, and
    one-time password mechanisms to prevent unauthorized account access.


    The user-facing components of Oracle Adaptive Access Management include the following:


    *   Device fingerprinting: This provides the ability of OAAM to collect metadata
    regarding users’ devices. This data may include cookies, hardware configurations,
    geolocation, and network configurations. This data is used to detect changes in
    user behavior.

    *   Knowledge-based authentication: This provides a secondary form of authentication
    by requiring the user to answer security questions.

    *   Answer logic: This component enables OAAM to detect fundamentally correct
    answers to knowledge-based authentication questions even if they have minor typographical
    errors.

    *   One-time password: This functionality makes it possible for users to receive
    a one-time use password via short message service (SMS) or e-mail to be used for
    authentication to systems.

    *   Self-service password management: Users are empowered to create and reset
    their credentials using self-service.


    #### Identity Federation


    As companies move toward cloud-based services or employ external web applications,
    and other cross-domain services, the need to be able to authenticate to these
    services using the same credentials grows. Identity Federation enables the organization
    to simplify management of user access by eliminating the multiple sets of credentials
    traditionally required for a disparate environment where applications might exist
    in multiple domains. OAM supports federation with SAML, OpenID, form-fill, and
    OAuth.


    The two functional components of Oracle Access Manager Identity Federation are
    the Service Provider and the Identity Provider. The Identity Provider component
    is responsible for establishing the users’ identity, filtering attributes, asserting
    the identity information, and maintaining sessions. The Service Provider takes
    care of mapping the attributes, linking the identities, and passing identity information
    to the applications.


    During login, as an Identity Provider, OAM first authenticates the user. If the
    user session has timed out, the Identity Provider will determine if the user needs
    to reauthenticate. Finally, the Identity Provider component determines if the
    partner application requires a challenge compatible with the level or scheme specified
    during the request. To support this, OAM allows the configuration of flexible
    authentication mechanisms. Identity Federation uses a federation authentication
    method and OAM Authentication Scheme mappings to control how the user should be
    challenged for authentication.


    During logout, the Access Manager Identity Federation service provider supports
    two different flows depending on where the logout was initiated: from OAM or from
    the federated partner application.


    During an OAM-initiated logout:


    1.  The user requests the logout via OAM.  

    2.  OAM ends the Access Manager session.  

    3.  OAM instructs the various WebGate instances to remove the user’s session cookies.
     

    4.  The OAM federation services performs a logout operation causing logout of
    partner applications by either redirecting the user with an HTTP redirect or by
    sending a logout request via Simple Object Access Protocol (SOAP) message.  

    5.  The OAM federation service terminates the federated session.


    If the logout is initiated via the partner application:


    1.  The partner application redirects the user to the OAM federation service.
     

    2.  The federation service marks the session for logout.  

    3.  The user is redirected to OAM for logout.  

    4.  OAM instructs the various WebGate instances to remove the user’s session cookies.
     

    5.  The OAM federation service performs a logout operation causing logout of partner
    applications by either redirecting the user with an HTTP redirect or by sending
    a logout request via SOAP message.  

    6.  The OAM federation service terminates the federated session.


    The Service Provider component of Identity Federation within OAM works in conjunction
    with the Identity Provider to deliver fraud and risk awareness in federated environments.
    When the Identity Provider authenticates the user, the Service Provider can be
    triggered to create a session with the appropriate authentication level as mapped
    with the federation authentication method. These attribute methods are supported
    as request attributes from the Identity Provider or mapping to an incoming assertion
    attribute name in the OAM session.


    Oracle Access Management Identity Federation supports multiple federation technologies,
    including SAML, OpenID, OAuth, Social Identity, and form-fill.'
