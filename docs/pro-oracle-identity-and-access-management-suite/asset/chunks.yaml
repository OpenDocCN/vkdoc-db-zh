    Web Cache`复选框仅是为了显示配置屏幕。Web Cache 超出了本书的范围。因为此 OHS 实例独立于 WebLogic 域，所以`Associate
    Selected Components with WebLogic Domain`复选框未被选中。


    ![A352855_1_En_8_Fig5_HTML.jpg](img/A352855_1_En_8_Fig5_HTML.jpg)


    图 8-5.


    配置组件屏幕


    在`Specify Component Details`屏幕上，您有机会为每个组件指定实例主目录和名称。确保将其设置为您能记住的内容。图`8-6`显示了`Specify
    Component Details`屏幕的示例。


    ![A352855_1_En_8_Fig6_HTML.jpg](img/A352855_1_En_8_Fig6_HTML.jpg)


    图 8-6.


    指定组件详细信息屏幕


