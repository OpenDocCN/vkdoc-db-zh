    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    SetHandler weblogic-handler

    WLCookieName oimjsessionid

    WeblogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    SetHandler weblogic-handler

    WeblogicHost 10.0.70.229

    WeblogicPort 14100


    SetHandler weblogic-handler

    WeblogicHost 10.0.70.229

    WeblogicPort 14100


    ```


    更新此文件后，停止并重新启动 OHS 以使更改生效。


    ### 配置 OAM 认证策略


    下一步是将 OIM 特定的资源添加到 OAM 认证策略中。您将使用 OAM 管理控制台来添加 OIM 特定的认证策略。


    通过在浏览器中导航到 `http://<oam-hostname>:<OAMWLSAdminPort>/oamconsole` 登录到 OAM 管理控制台。使用
    OAMAdmin 用户名和您之前设置的密码。访问管理的登录页面如图 11-1 所示。


    ![A352855_1_En_11_Fig1_HTML.jpg](img/A352855_1_En_11_Fig1_HTML.jpg)

    *图 11-1. Oracle Access Manager 管理控制台*


    注意：`<OAMWLSAdminPort>` 应设置为 WebLogic 管理服务器的端口号。即使 OAM 托管服务器未运行，您也可以访问 OAM 管理控制台。


    在此屏幕上，在“访问管理器”下，单击“应用程序域”链接。如图 11-2 所示的 OAM 应用程序域选项卡显示了开箱即用的现有域。请注意，IAM Suite
    和 Webgate 是为您创建的。


    ![A352855_1_En_11_Fig2_HTML.jpg](img/A352855_1_En_11_Fig2_HTML.jpg)

    *图 11-2. 搜索应用程序域屏幕*


    在“搜索应用程序域”屏幕上，单击“搜索”以显示已创建域的列表。您应该会看到在第 8 章中创建的原始域，以及本章前面使用 idmConfigTool 创建的
    IAM Suite 域。单击 IAM Suite 域进行编辑。IAM Suite 域编辑屏幕请参见图 11-3。


    ![A352855_1_En_11_Fig3_HTML.jpg](img/A352855_1_En_11_Fig3_HTML.jpg)

    *图 11-3. IAM Suite 域摘要*


    在第一页，您将看到有关 IAM Suite 域的摘要详细信息，如图 11-4 所示。单击“资源”选项卡以显示此域中的所有受保护资源。


    ![A352855_1_En_11_Fig4_HTML.jpg](img/A352855_1_En_11_Fig4_HTML.jpg)

    *图 11-4. IAM Suite 域资源*


    进入“资源”选项卡后，单击“搜索”以显示所有资源 URL 和配置。滚动直到找到 `/identity/**` 资源。单击它以编辑该资源。这将打开如图 11-5
    所示的编辑资源屏幕。


    ![A352855_1_En_11_Fig5_HTML.jpg](img/A352855_1_En_11_Fig5_HTML.jpg)

    *图 11-5. 编辑资源屏幕*


    在编辑资源屏幕上，将“保护级别”设置为“已排除”。确保“认证策略”和“授权策略”字段为空。单击“应用”。


    停留在此页面时，单击“复制”以创建新资源。将“资源 URL”设置为 `/provisioning-callback/**`。单击“应用”以保存更改。您现在已将
    OIM URL 设置为 OAM 环境中的资源。


    ## 总结


    在安装了 OIM 和 OAM 的软件组件后，有必要为集成配置每个层。在此过程的这一点上，您应该拥有一个允许您使用 OIM 实用程序创建用户的环境。使用新创建的用户，您可以登录并会立即提示您更改密码并设置密码提示问题。设置完此基本配置文件后，应直接将用户带到最初请求的资源。下一章将演示流程流以及测试集成的过程。'
- fmt: '# Oracle Identity Management and Identity Stores


    Many organizations have multiple identity stores to support various business units
    and processes. These identity stores might be in the form of `Lightweight Directory
    Access Protocol (LDAP)`-compatible directories, database tables, or other formats.
    In many cases, `Oracle Identity Manager (OIM)` can be used to manage these various
    directory formats using `Oracle Virtual Directory (OVD)`. Although this book concentrates
    on using `Oracle Internet Directory (OID)` as the primary identity store using
    LDAP synchronization, it is important to consider this configuration as a possible
    solution when your environment necessitates it. You might also find it useful
    to configure the LDAP synchronization to use `OVD` to start with and prepare the
    environment for multiple data stores.


    Most large companies have investments in a variety of user identity stores. They
    might use `Microsoft Active Directory` for their network LDAP user accounts and
    they might use other user directories for various applications. `OID` or `Oracle
    Unified Directory (OUD)` could be in place, providing support for applications
    such as `Oracle E-Business Suite` or `OBIEE`. Other business units might employ
    a file-based or `OpenLDAP`-based identity store to support other applications
    such as homegrown custom utilities. The result of this tends to include a single
    user possessing many accounts and passwords. Not only is this a problem for the
    user, but from a security standpoint, this could result in orphaned accounts and
    even malicious accounts that no one is aware of.


    ## Use Cases


    `OIM` provides solutions to help prevent these occurrences. It is possible for
    any LDAP-compatible application to use `IOD` using standard LDAP authentication
    calls and many third-party applications are able to leverage the `Security Assertion
    Markup Language (SAML)` assertion protocols used by `Oracle Access Manager (OAM)`.
    This only covers the authentication and authorization aspects of the enterprise
    tools. Managing these multiple identity stores can be challenging, as most stores
    have proprietary management tools and are unable to manage other brands or types
    of directories.


    In the past, `OID` provided the ability to synchronize with other LDAP directories,
    such as `Active Directory`, `ODSEE`, `OpenLDAP`, and others. Although this is
    a useful tool for providing application access to users from multiple stores,
    it does not address the management of the user accounts.


    `OVD` increases the level of consolidation of identity store management by presenting
    multiple disparate directories as a single source. This can be useful not only
    for providing a single LDAP interface for all of the existing applications, but
    also by acting as a single source for `OIM` to handle account governance.


    As discussed previously, `OIM` is an identity governance tool. As such, it provides
    the ability to manage user life cycle support from on-boarding to new permissions
    to off-boarding. One of the most common uses of the `OVD` and `OIM` combination
    might be the instance of combining `OID` users and `Microsoft Active Directory`
    users in a single source for management. When presented properly to `OIM`, both
    of these sources can be managed, ensuring a consistent handling of user accounts
    no matter how they were created.


    ## Topologies


    `Split profile` and `distinct user populations` are two main types of deployments
    when using `OVD` to present identity stores to the `OIM` environment. A split
    profile might be useful when user account information is stored in one location
    and the corresponding application user information is stored in other locations.
    In this case, the network identity directory might be `Active Directory`, whereas
    application-specific account information might exist in `OID` or `OUD`, or even
    another LDAP directory. The other deployment topology involves having multiple
    distinct user and group populations. This might be common in environments where
    external users are stored in an application identity store and internal employee
    users are managed in `Active Directory`. In this common configuration, the two
    sets of users must be managed through a single interface.


    ### Split Profiles


    Companies might choose to implement a split profile configuration if they have
    a single user population but the identity data is split between multiple identity
    stores. This could occur if the employee user accounts are stored in a network
    LDAP directory and one or more applications employ their own stores for account
    access. For example, `Active Directory` is used for network resource access and
    `OID` is used for access to `Oracle E-Business Suite (EBS)`. Although it might
    be possible to extend the `Active Directory` schema to include the `EBS` data,
    it is not always the best method for all organizations. `OID` is treated as a
    secondary or shadow identity store containing the necessary attributes. `OVD`
    merely serves to consolidate the user attributes for `OIM` to handle. However,
    the user population from `Active Directory` and `OID` in this case are the same.


    In a split profile environment each user repository serves a distinct role. `Active
    Directory`, or another enterprise directory, is responsible for storing the enterprise
    user accounts and groups, whereas `OID` manages the application user accounts
    and groups. In this case, `OID` is considered a “shadow” repository. Application
    roles and membership are handled by `OID` and managed by `OIM`. `Active Directory`
    handles enterprise or network users. It should be noted that in this configuration,
    `OIM` can be used to manage application-level security, however it will not be
    able to manage the enterprise-level accounts.


    When considering the implementation of split profiles for your environment, the
    following prerequisites should be met.


    *   `OID` should be configured as the identity store for `Oracle Fusion Middleware`
    products and applications. In other words, the users, groups, and permissions
    required for access to the applications must be stored within the `OID` store.
    This will become the shadow directory.

    *   The `OID` should have “referential integrity” turned off. This will ensure
    that groups created in `OID` can contain members that are not located within the
    same directory. The users contained within the groups might be part of the enterprise
    identity store.

    *   Login names and accounts must be unique across all identity stores, regardless
    of the number of stores.

    *   `Active Directory` or the enterprise identity store should contain user information
    but not the application attributes.


    Figure [12-1](#A352855_1_En_12_Chapter.html#Fig1) shows how the enterprise repository
    and the application identity store are combined to provide the Identity Management
    suite a single view of the user and group permissions. This combination provides
    the authentication credentials from the enterprise directory and the authorization
    context from the application directory.


    ![A352855_1_En_12_Fig1_HTML.jpg](A352855_1_En_12_Fig1_HTML.jpg)


    Figure 12-1.


    Split domain directory structure'
