    ![A352855_1_En_8_Fig18_HTML.jpg](img/A352855_1_En_8_Fig18_HTML.jpg)


    图 8-18. 安装完成屏幕


    至此，OAM WebGate 的安装完成。在下一节中，您将完成 WebGate 在 OHS 环境中的初始配置和部署。

