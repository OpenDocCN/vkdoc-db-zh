- fmt: '## Oracle Identity Manager


    随着组织规模扩大和用户在线访问资源日益增多，对更严格控制和直观管理工具的需求也随之增长。用户生产力的提升不能以牺牲企业安全和治理为代价。企业必须持续掌握谁拥有什么访问权限以及他们如何获得该权限，以便及时发现可能的滥用或欺诈行为。OIM
    构成了身份与访问管理套件产品的身份治理组件。


    必须严格控制用户身份生命周期，以确保用户在入职第一天就拥有正确的访问权限，并在他们角色变更或离职时根据需要及时撤销访问。此外，某些用户可能需要一些与其职位不寻常的访问权限。其中许多权限可以基于一套定义的规则授予，或由用户选择并经经理和管理员批准。然而，需要工具并实施严格的控制来确保正确的访问权限。


    OIM 是一种配置工具，它利用了前面讨论的身份存储和访问系统。Oracle 身份与访问管理套件的其他组件致力于存储或虚拟化身份信息，并在企业应用环境中提供身份验证和授权服务；而
    OIM 则简化了整个身份环境中的配置、生命周期、审计和对账服务。该组件完善了满足所有企业安全需求的单一身份管理平台。


    为实现提升用户生产力和效率的目标，OIM 提供了一套完整的功能，包括自助服务门户、配置和账户管理工作流、定制化和个性化。


    ### 自助服务


    OIM 的自助服务功能通过赋予单个用户管理其许多账户细节的能力来提升用户效率。这些功能包括重置和恢复丢失的密码、申请新权限以及注册账户。员工在丢失密码时不再需要提交服务台工单。用户可以通过回答预设的验证问题来请求密码重置。需要系统新权限或额外权限的用户可以使用自助服务门户进行申请，参考一个包含可能授权选项的目录。OIM
    还提供了允许新用户在系统中注册的功能，并根据管理员定义的规则集授予其必要的预设默认权限。


    ### 工作流


    在大多数组织中，用户根据部门或职位获得权限。围绕这些授权的规则可以在 OIM 中定义，并应用于新创建的用户。此外，当员工申请新权限时，由业务定义的复杂工作流可以在实际权限授予之前处理所需的审批矩阵。这些功能确保了最高级别的可审计性，以确定谁拥有什么访问权限、谁在何时授予了该权限。这些信息在调查可能的滥用行为或进行安全审计时都非常有用。


    ### 委派管理


    随着组织的成长，委派管理的需求变得显而易见。单一的 IT 组织可能没有足够的资源来处理公司的所有权限请求。OIM 提供了将管理任务分散给负责相关内容的各个业务部门的能力。通过使用高级安全配置，这也确保了委派管理仅授予所需的区域。例如，财务管理员应该只能访问财务组的权限，而无法授予对法律部门内容的访问权限。


    ### 审计


    鉴于 OIM 提供的所有灵活性，必须注意到频繁的安全审计变得多么有价值。OIM 包含一系列功能，使这些审计易于管理，同时提供立即可用的信息和服务。使用内置报告和门户可以让管理员和审计员快速概览或详细了解安全状态。此外，可以识别孤立或异常账户，以便采取必要的对账操作。


    ## 整体概览


    至此，您已经了解了 Oracle 身份与访问管理的各个主要组件。这些组件包括 Fusion Middleware 架构、目录服务、访问管理和身份管理。尽管这些产品中任何一个都无法单独提供组织可能需要的全部功能，但它们可以被视为构建完整企业级身份管理解决方案的基石，每个都提供自己的一套功能。因此，短期目标可能仅为
    Oracle 应用提供身份验证的组织，可以随着需求增长轻松扩展功能。在图 [1-7](#A352855_1_En_1_Chapter.html#Fig7)
    中，整体架构被呈现为一个单一单元。需要指出的是，这并不意味着所有组件都必须驻留在单台服务器上。


    ![A352855_1_En_1_Fig7_HTML.jpg](A352855_1_En_1_Fig7_HTML.jpg)


    图 1-7. Oracle 身份与访问管理概览


    图 [1-7](#A352855_1_En_1_Chapter.html#Fig7) 展示了 Oracle 身份与访问管理如何在整个应用层部署组件，以提供企业的端到端安全。从
    Web 层开始，`Access Manager WebGate` 拦截资源请求，并根据在 `Access Manager` 中定义的身份验证策略确定是否需要身份验证。如果需要，`Access
    Management` 服务器会基于后端的 `LDAP` 数据层对用户进行身份验证。此外，`Identity Management` 服务会跟踪身份活动，例如新用户配置、授权请求和其他治理任务。'
  raw: '### Oracle Identity Manager


    As organizations grow and their user base has access to more and more resources
    online, the need for stricter controls and intuitive management tools grows. User
    productivity cannot come at the cost of enterprise security and governance. Businesses
    must be continually aware of who has access to what and how they received that
    access to stay on top of possible misuse or fraud. OIM makes up the identity governance
    component of the Identity and Access Management Suite of products.


    The user identity life cycle must be tightly controlled to ensure users have the
    correct access on their first day and have that access revoked as needed when
    they change roles or leave the company. In addition, some users might require
    access that could be out of the ordinary for their job titles. Many of these roles
    can be granted based on a defined set of rules or selected by the user and approved
    by managers and administrators. However, tools are required and strict controls
    must be implemented to ensure correct access.


    OIM is a provisioning tool that leverages the identity stores and access systems
    discussed previously. Whereas the rest of the Oracle Identity and Access Management
    Suite is dedicated to storing or virtualizing identity information and providing
    authentication and authorization services within the enterprise application environment,
    OIM streamlines the provisioning, life cycle, auditing and reconciliation services
    of the overall identity environment. This component completes the single identity
    management platform addressing all of the enterprise security needs.


    To accomplish the task of improving user productivity and efficiency, OIM provides
    a full feature set, including self-service portals, provisioning and account management
    workflows, customization, and personalization.


    #### Self-Service


    The self-service features of OIM promote user efficiency by affording individual
    users the ability to manage many of their account details. These include the ability
    to reset and recover lost passwords, request new permissions, and register their
    accounts. No longer will employees need to open a help desk ticket when they have
    lost a password. Instead users can request a password reset by answering predetermined
    challenge questions. Users requiring new or additional permissions to systems
    can request them using the self-service portal referencing a catalog of possible
    authorization options. OIM also provides functionality that allows new users to
    register in the system and be granted the necessary predetermined default permission
    according to administrator-defined rule sets.


    #### Workflows


    In most organizations, users are granted permissions based on department or job
    title. The rules surrounding these grants can be defined in OIM and applied to
    new users as they are created. Furthermore, as employees request new permissions,
    complex workflows defined by the business can handle the approval matrices required
    before the actual grants are provided. These features ensure a maximum level of
    auditability to determine who has access to what and who granted the permission
    and when. All of this is very useful information when investigating possible misuse
    or performing security audits.


    #### Delegated Administration


    As organizations grow, the need to delegate administration becomes apparent. A
    single IT organization might not have the resources to handle all permission requests
    for a company. OIM provides the ability to spread administration tasks to the
    individual business units responsible for the content. Through the use of advanced
    security configurations, this also ensures that delegated administration is granted
    only to those areas needed. For instance, the finance administrators should only
    have access to the finance group of permissions and not be able to grant access
    to the legal department content.


    #### Auditing


    With all of the flexibility OIM provides, it is important to note how valuable
    frequent security audits become. OIM includes a host of features that make these
    audits manageable while providing readily usable information and services. The
    use of built-in reports and portals can give administrators and auditors a quick
    glance or detailed information about the state of security. Furthermore, orphaned
    or rogue accounts can be identified so that the required actions to reconcile
    the accounts can be taken.


    ## Putting It All Together


    Thus far, you have been presented with each of the major components of Oracle
    Identity and Access Management. These include the Fusion Middleware architecture,
    Directory Services, Access Management, and Identity Management. Although none
    of these products alone will provide everything an organization might need, these
    can be thought of as the building blocks of a full enterprise-level identity management
    solution, each providing its own set of functionality. As such, organizations
    whose short-term goal might be just providing authentication to Oracle applications
    can easily expand the functionality as requirements grow. In Figure [1-7](#A352855_1_En_1_Chapter.html#Fig7),
    the overall architecture is presented as a single unit. It should be noted that
    this does not imply that all components must reside on a single server.


    ![A352855_1_En_1_Fig7_HTML.jpg](A352855_1_En_1_Fig7_HTML.jpg)


    Figure 1-7.


    Oracle Identity and Access Management overview


    Figure [1-7](#A352855_1_En_1_Chapter.html#Fig7) shows how Oracle Identity and
    Access Management implements components throughout the application tiers to provide
    end-to-end security for the enterprise. Starting at the web tier, the Access Manager
    WebGate intercepts resource requests and determines whether or not authentication
    is required based on the authentication policies defined in Access Manager. If
    required, the Access Management server authenticates the user based on the background
    LDAP data tier. In addition, the Identity Management services track identity activities
    such as new user provisioning, authorization requests, and other governance tasks.'
