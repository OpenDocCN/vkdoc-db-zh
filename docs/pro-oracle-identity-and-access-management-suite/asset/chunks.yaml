    required, the Access Management server authenticates the user based on the background
    LDAP data tier. In addition, the Identity Management services track identity activities
    such as new user provisioning, authorization requests, and other governance tasks.'
  trans: '

    ### Oracle 身份管理器


    随着组织的发展和其用户群能够在线访问越来越多的资源，对更严格控制和直观管理工具的需求也随之增长。用户生产力不能以牺牲企业安全和治理为代价。企业必须持续了解谁拥有对什么的访问权限以及他们如何获得该访问权限，以便及时发现可能的滥用或欺诈行为。OIM
    构成了身份与访问管理套件产品中的身份治理组件。


    必须对用户身份生命周期进行严格控制，以确保用户在入职第一天就拥有正确的访问权限，并在他们改变角色或离开公司时根据需要撤销该访问权限。此外，一些用户可能需要访问对其职位而言不寻常的资源。许多此类权限可以基于一套既定的规则授予，或由用户选择并经经理和管理员批准。然而，需要工具并实施严格的控制以确保正确的访问。


    OIM 是一个供应工具，它利用了前面讨论的身份存储和访问系统。Oracle 身份与访问管理套件的其他部分致力于在企业应用环境中存储或虚拟化身份信息并提供认证和授权服务，而
    OIM 则优化了整个身份环境的供应、生命周期、审计和对账服务。这个组件完善了满足所有企业安全需求的单一身份管理平台。


    为了实现提高用户生产力和效率的任务，OIM 提供了一整套功能，包括自助服务门户、供应和账户管理工作流、定制化和个性化。


    #### 自助服务


    OIM 的自助服务功能通过赋予个人用户管理其许多账户详情的能力来提升用户效率。这些功能包括重置和找回丢失的密码、申请新权限以及注册他们的账户。员工在丢失密码时不再需要提交服务台工单。相反，用户可以通过回答预设的验证问题来请求密码重置。需要系统新权限或额外权限的用户可以使用自助服务门户进行申请，参考一个可能的授权选项目录。OIM
    还提供允许新用户在系统中注册并根据管理员定义的规则集获得必要的预设默认权限的功能。


    #### 工作流


    在大多数组织中，用户根据部门或职位被授予权限。围绕这些授予的规则可以在 OIM 中定义，并在创建新用户时应用。此外，当员工申请新权限时，由业务定义的复杂工作流可以处理实际授予权限之前所需的审批矩阵。这些功能确保了最高水平的可审计性，以确定谁拥有对什么的访问权限、谁以及何时授予了该权限。所有这些在调查可能的滥用或进行安全审计时都是非常有用的信息。


    #### 委派管理


    随着组织的成长，委派管理的需求变得明显。一个单一的 IT 组织可能没有足够的资源来处理公司的所有权限请求。OIM 提供了将管理任务分散到负责相关内容的各个业务部门的能力。通过使用高级安全配置，这也确保了委派管理只授予那些需要的领域。例如，财务管理员应该只拥有对财务组权限的访问权限，而不能授予对法务部门内容的访问权限。


    #### 审计


    尽管 OIM 提供了极大的灵活性，但重要的是要注意频繁的安全审计变得多么有价值。OIM 包含一系列功能，使这些审计易于管理，同时提供可立即使用的信息和服务。使用内置报告和门户可以让管理员和审计员快速浏览或详细了解安全状态。此外，可以识别孤立或异常账户，以便采取所需的操作来对账这些账户。


    ### 总结


    至此，我们已经介绍了 Oracle 身份与访问管理的各个主要组件。这些包括融合中间件架构、目录服务、访问管理和身份管理。尽管这些产品中没有任何一个能单独提供组织可能需要的一切，但可以将它们视为完整的企业级身份管理解决方案的构建块，每个都提供其自己的一套功能。因此，短期目标可能只是为
    Oracle 应用提供身份验证的组织，可以轻松地随着需求的增长扩展功能。在图 1-7 中，整体架构被呈现为一个单一单元。需要指出的是，这并不意味着所有组件都必须驻留在单个服务器上。


    ![A352855_1_En_1_Fig7_HTML.jpg](img/A352855_1_En_1_Fig7_HTML.jpg)


    图 1-7. Oracle 身份与访问管理概览


    图 1-7 展示了 Oracle 身份与访问管理如何在整个应用层实施组件，为企业提供端到端的安全防护。从 Web 层开始，访问管理器 WebGate 拦截资源请求，并根据访问管理器中定义的身份验证策略确定是否需要身份验证。如果需要，访问管理服务器会基于后台的
    LDAP 数据层对用户进行身份验证。此外，身份管理服务跟踪身份活动，如新用户供应、授权请求和其他治理任务。

    '
- fmt: '# 1. Oracle身份与访问管理概述


    ## 摘要


    Oracle身份与访问管理满足了企业内对高度安全、可审计且可靠的身份管理需求。其组件协同工作，形成了一种平台化身份管理方法，从而降低了随着时间和需求增长可能需采用多个供应商和产品构建的许多场景中的复杂性。图1-8展示了Oracle身份与访问管理套件各组件之间如何共享数据。考虑到许多组织是按需构建安全系统，Oracle确保身份与访问组件是模块化的。这允许公司先安装所需的基础目录服务，之后再添加访问控制、单点登录（SSO）和治理能力。


    ![A352855_1_En_1_Fig8_HTML.jpg](A352855_1_En_1_Fig8_HTML.jpg)


    **图 1-8. Oracle身份与访问管理技术**


    如图1-8所示，Oracle身份与访问管理套件提供了处理组织所有安全相关需求所需的服务。访问管理提供诸如`Access Manager`、`Identity
    Federation`和`Secure Token Services`等功能，通过允许应用程序共享会话信息并提供单点登录能力，从而提高用户生产力和应用程序可访问性，减少用户必须输入凭据的次数。身份治理使组织能够自动化许多先前手动的用户配置任务，并缩短员工入职时的上岗时间。在治理框架内，`Identity
    Manager`通过允许用户执行自己的密码管理并根据定义的规则集处理访问请求，减少了支持电话。通过运行定期的安全审计和核对任务，风险也得以降低。平台安全服务允许组织为开发者提供连接和引用安全信息的标准方法。所有这些功能都使用目录服务来存储和访问身份数据。Oracle目录服务包括一个基于Java的身份存储`OUD`和一个基于数据库的`OID`。这两者都可用于存储应用程序身份数据，并可与现有的企业`LDAP`身份存储同步。`OVD`允许组织整合现有的身份存储，而无需复制数据，并为多个应用程序提供单一的身份数据访问点。


    # 2. 安装前考虑因素与先决条件


    ## 容量规划


    要成功地在企业中实施Oracle身份与访问管理套件或其部分组件以提供应用安全保障，离不开对当前环境的正确分析以及对未来的适当规划。这将确保不仅能满足即时需求，并且在将来添加更多用户和应用程序时，性能也不会下降。本章节为那些处于身份管理实施规划阶段的人员提供指导。


    ### Fusion Middleware


    Oracle身份与访问管理与其他`Fusion Middleware`产品和应用一样，依赖于`WebLogic Server`架构。作为`Fusion Middleware`架构的核心，确保`WLS`环境得到正确配置至关重要。这始于恰当的规划与分析。在决定如何设置环境（如内存、硬件、灾难恢复等）时，规划`WebLogic`环境涉及多个方面。下文将对此进行讨论。


    性能要求是一个重要的考虑点。必须考虑应用程序用户对部署在实例上的应用将期望何种服务级别。所讨论的应用是否严重依赖于身份或其他数据、是否内存密集型、或者应用是否有特定的响应时间要求？同时还需考虑环境将要承受的预期负载。


    #### 评估容量要求


    `WLS`必须在满足最低要求的服务器上安装和配置。然而，满足最低要求并不总能保证部署在该环境中的应用程序能以最佳水平运行并提供系统用户所需的服务级别。在规划`WebLogic`实施时，应与应用规划人员或开发者合作，确定预期用户数量、并发连接数、期望响应时间等。此外，收集有关应用程序本身的信息非常有帮助，包括事务耗时、每秒事务数以及应用复杂度。还需考虑应用架构，例如数据库连接和外部服务访问。所有这些都将成为确定`WLS`所需硬件要求以及软件调优的有用输入。所有这些可能需要安装一个测试环境，并根据这些数字进行负载测试。这种做法也能为未来的调优工作提供一个可靠的基准。


    #### 硬件


    容量规划始于计算硬件需求，并确保环境达到或超过这些要求。一个很好的起点是计划用于该环境的软件所附带的文档。`WLS`最低要求一颗`1-GHz CPU`，但待安装组件的具体要求将决定整个系统的要求。例如，在一种分布式架构中，`Oracle
    Access Manager`和`Oracle Identity Manager`安装在一台主机上，而轻量级目录访问协议服务器安装在另一台上，则需要两台物理主机。`OAM/OIM`主机将需要六个或更多核心，而`LDAP`主机仅需要两个。


    #### 内存


    `WLS`需要`8 GB`可用内存（`4 GB`物理内存和`4 GB`交换空间）。这些代表了最低要求，具体数值会根据托管服务器数量及部署在其中的软件而变化。必须考虑服务器本身的内存需求。可以通过为`Linux`操作系统分配`3
    GB`、为`WebLogic Admin Server`分配`3 GB`、以及为每个托管服务器分配`3 GB`（此数字将根据部署内容而变化）来确定一个起点。这将为`WLS`硬件所需的可用内存提供一个初步估算。本章后续将提供关于内存更详细的讨论。


    #### 存储


    尽管`WLS`不需要大量前期存储，但规划磁盘空间以允许增长是重要的。同样，必须考虑将在`WebLogic`托管服务器内部署的所有软件的磁盘空间要求。`WLS`安装大约需要`580
    MB`，额外需要`570 MB`用于`coherence`。总空间需求约为`1.2 GB`。如前所述，需考虑要部署的应用程序。例如，`Oracle Internet
    Directory`、目录集成平台和目录服务管理器将需要额外大约`800 MB`。


    #### 网络


    主机上的网络负载和网络配置将对`WLS`实例的感知性能产生影响。Oracle建议在千兆网络上安装`WLS`并使用硬件负载均衡器。'
  raw: '## Summary


    Oracle Identity and Access Management fills the need for highly secure, auditable,
    and reliable identity management within the enterprise. The components work together,
    forming a platform approach to identity management and thus reducing the complexity
    found in many situations that might have been built using multiple vendors and
    products as time and requirements increased. Figure [1-8](#A352855_1_En_1_Chapter.html#Fig8)
    displays how data is shared between components of the Oracle Identity and Access
    Management Suite. With the knowledge that many organizations build security systems
    on an as-needed basis, Oracle ensured that the Identity and Access components
    are modularized. This allows companies to install the basic directory services
    needed and add access, SSO, and governance capabilities at a later date.


    ![A352855_1_En_1_Fig8_HTML.jpg](A352855_1_En_1_Fig8_HTML.jpg)


    Figure 1-8.


    Oracle Identity and Access Management technologies


    As shown in Figure [1-8](#A352855_1_En_1_Chapter.html#Fig8), the Oracle Identity
    and Access Management Suite provides the services needed to handle all of an organization’s
    needs pertaining to security. Access Management provides functionality such as
    Access Manager, Identity Federation, and Secure Token Services, increasing user
    productivity and application accessibility by allowing applications to share session
    information and provide SSO capabilities, thus reducing the number of times a
    user must enter his or her credentials. Identity Governance affords the organization
    the ability to automate many previously manual user-provisioning tasks and decreases
    time-to-work during employee on-boarding. Within the governance framework, Identity
    Manager reduces support calls by allowing users to perform their own password
    management and processing access requests based on a defined set of rules. Risk
    is also reduced with the ability to run periodic security audits and reconciliation
    tasks. Platform Security Services allows the organization to provide developers
    with standard methodologies to connect to and reference security information.
    All of this functionality uses Directory Services to store and access identity
    data. Oracle Directory Services consists of a Java-based identity store, OUD and
    the database-based OID. Both of these can be used to store application identity
    data and can be synchronized with existing enterprise LDAP identity stores. OVD
    allows organizations to consolidate existing identity stores without the need
    to copy data and provide a single point of identity data access to multiple applications.


    # 2. Preinstallation Considerations and Prerequisites


    ## Capacity Planning


    Implementing Oracle Identity and Access Management Suite or a part of the package
    to provide application security within an enterprise cannot be properly executed
    without proper analysis of the current environment and some planning for the future.
    This will ensure that not only the immediate requirements are met, but also that
    performance will not recede in the future as more users and applications are added
    to the environment. This chapter provides guidance for those in the planning phases
    of an Identity Management implementation


    ### Fusion Middleware


    Oracle Identity and Access Management, like other Fusion Middleware products and
    applications, relies on the WebLogic Server (WLS) architecture. As the backbone
    of the Fusion Middleware architecture, it is important to ensure that the WLS
    environment is properly configured. This starts with proper planning and analysis.
    There are a number of aspects to planning the WebLogic environment while deciding
    how to set up the environment such as memory, hardware, disaster recovery, and
    so on. These are discussed in what follows.


    Performance requirements are an important point of consideration. One must consider
    what level of service the application users will expect for the applications deployed
    on the instance. Are the applications in question heavily dependent on identity
    or other data, are they memory intensive, or does the application have a specific
    response time requirement? Thought must also be given to the expected load the
    environment is going to experience.


    #### Assessing Capacity Requirements


    WLS must be installed and configured on a server that meets the minimum requirements.
    However, meeting the minimum requirements does not always guarantee that the applications
    deployed in the environment will perform at their optimum level and provide the
    level of service required by users of the system. While planning for a WebLogic
    implementation, one should work with the application planners or the developers
    to determine the number of expected users, number of concurrent connections, expected
    response times, and so on. Furthermore, it is quite helpful to gather information
    about the application itself, including transaction timing, transactions per second,
    and the application complexity. Also consider the application architecture, such
    as database connections and external service access. These will all be useful
    inputs in determining the necessary hardware requirements as well as software
    tuning for WLS. All of this might require installing a test environment and load
    testing it with these numbers in mind. This practice can also provide a solid
    benchmark to be used in future tuning endeavors.


    #### Hardware


    Capacity planning starts with calculating hardware requirements and ensuring the
    environment meets or exceeds these. A good place to start is the documentation
    included with the software that is planned for the environment. WLS requires a
    minimum of one 1-GHz CPU, but the requirements for the components to be installed
    will dictate the overall system requirements. For example, a distributed architecture
    where Oracle Access Manager (OAM) and Oracle Identity Manager (OIM) are installed
    on one host and the Lightweight Directory Access Protocol (LDAP) server is installed
    on another requires two physical hosts. The OAM/OIM host will require six or more
    cores, whereas the LDAP host requires only two.


    #### Memory


    WLS requires 8 GB available memory (4 GB physical and 4 GB swap). These represent
    the minimum requirements and will change depending on the number of managed servers
    and the software deployed in each. It is important to consider that the server
    itself has memory requirements as well. One can determine a starting point by
    allotting 3 GB for the Linux operating system (OS), 3 GB for the WebLogic Admin
    Server, and 3 GB for each managed server (this number will change based on what
    is deployed). This will provide an initial estimate of the required available
    memory for the WLS hardware. Further detailed discussion on memory is provided
    later in this chapter


    #### Storage


    Although WLS does not require a large amount of up-front storage, it is important
    to size the disk space to allow for growth. Again, one must consider the disk
    space requirements for all software that will be deployed within the WebLogic
    managed servers. The WLS installation requires approximately 580 MB and an additional
    570 MB for coherence. The total space required is approximately 1.2 GB. As mentioned,
    consider the applications to be deployed. For example Oracle Internet Directory
    (OID) and the Directory Integration Platform and Directory Services Manager will
    require approximately an additional 800 MB.


    #### Networking


    Network load and network configurations on the host will have an impact on the
    perceived performance of the WLS instance. Oracle recommends WLS be installed
    on a gigabit network and the use of hardware load balancers.'
