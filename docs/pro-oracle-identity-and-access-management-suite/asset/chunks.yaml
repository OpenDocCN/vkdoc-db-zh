    Help desk users, on the other hand, are usually granted many more permissions.
    Their access could include the ability to create and decommission accounts. The
    organization may set up access policies that allow employees to request new permissions,
    and managers can use the workflow to approve or grant those permissions. OIM provides
    the framework for the enterprise to set up simple and complex rules governing
    identity data management.


    ### Sample Access Policy Configuration


    If a management tool is difficult to configure or use, the end product could suffer.
    With identity information, this can result in poor security. OIM ensures configuration
    of access policies is performed in a standard, easy-to-use manner. Figure [13-1](#A352855_1_En_13_Chapter.html#Fig1)
    displays the Identity Manager management screen. On this screen you can manage
    users, roles, password policies, administration roles, and so on. In the case
    of access policies, you will be navigating to the Administration Roles. These
    roles are used to control which users in the LDAP store can perform certain operations.


    ![A352855_1_En_13_Fig1_HTML.jpg](A352855_1_En_13_Fig1_HTML.jpg)


    Figure 13-1.


    Oracle Identity Manager management screen


    Figure [13-2](#A352855_1_En_13_Chapter.html#Fig2) displays the default list of
    Oracle Identity Manager administration roles provided out of the box. These can
    be added to and disabled as needed in your environment. At creation none of these
    roles has members. It is left up to the administrator to determine what groups
    of users should receive the ability to manage accounts. It should be noted that
    these are, in effect, templates that can be used to grant permissions to various
    users and control what data users can see and modify.


    ![A352855_1_En_13_Fig2_HTML.jpg](A352855_1_En_13_Fig2_HTML.jpg)


    Figure 13-2.


    Administration roles


    Editing a role is fairly simple. You are provided with a series of tabs that allow
    you to edit the basic information, capabilities, membership rules, and the organizations
    for which it applies. Figure [13-3](#A352855_1_En_13_Chapter.html#Fig3) displays
    the tabs available for a given role.


    ![A352855_1_En_13_Fig3_HTML.jpg](A352855_1_En_13_Fig3_HTML.jpg)


    Figure 13-3.


    Role management


    In this example, you will be viewing the OrclOIMUserHelpDesk role. This can be
    provided to help desk staff to allow them to manage user accounts, reset passwords,
    unlock accounts, and grant roles to other users.


    The Capabilities tab, shown in Figure [13-4](#A352855_1_En_13_Chapter.html#Fig4),
    displays a list of the abilities that a user assigned the HelpDesk role will be
    able to perform. In this case, a help desk user will be able to create, update,
    delete, and otherwise modify user accounts that fall within the scope of control
    to be discussed later in this section. If for some reason this list of capabilities
    is not in accordance with the requirements of the organization, an administrator
    can create a new custom access policy with only the capabilities to match their
    environment. If custom policies are needed, the default policies should be left
    alone and new policies created. This will ensure that the original configuration
    is left as is in case of issues.


    ![A352855_1_En_13_Fig4_HTML.jpg](A352855_1_En_13_Fig4_HTML.jpg)


    Figure 13-4.


    Role capabilities


    Once the access policy is defined and the capabilities configured, the administrator
    must determine who in the system will be granted the new access. Standard access,
    such as searching and viewing user information, might be granted to all users.
    However, the ability to edit accounts might only be granted to a select few. Determining
    user membership is simple enough: You have options to add users directly to the
    role or create rules governing membership.


    In the example shown in Figure [13-5](#A352855_1_En_13_Chapter.html#Fig5), the
    administrator has created a rule that only users that begin with the text HPDSK
    will be granted the HelpDesk role. In this case, it could be that the help desk
    employees work for a contractor or are created with the prefix indicating the
    department for which they work. This rule could easily be modified to be based
    on other LDAP attributes such as department or employee type. An example of configuring
    a rule-based membership query is shown in Figure [13-6](#A352855_1_En_13_Chapter.html#Fig6).


    ![A352855_1_En_13_Fig6_HTML.jpg](A352855_1_En_13_Fig6_HTML.jpg)


    Figure 13-6.


    Rule-based role membership query


    ![A352855_1_En_13_Fig5_HTML.jpg](A352855_1_En_13_Fig5_HTML.jpg)


    Figure 13-5.


    Role membership


    Access policies are often granted a scope of control. This is used to define user
    populations that the role can be used to control. For instance, a requirement
    might be that the customer support group can only manage external customer accounts,
    whereas the help desk can only handle internal employee accounts. The Scope of
    Control tab can be used to specify these rules. It should be noted that if the
    organization has requirements such as these, additional roles might need to be
    created for each of the subgroups. In Figure [13-7](#A352855_1_En_13_Chapter.html#Fig7),
    you can see that the scope of control for the help desk has been set to include
    the default user types included in a base OIM installation. If your organization
    has additional types, include them as needed. In this example, you can see that
    the help desk can manage Requests as well as users within the Top and default
    Xellerate organizations. Including the suborganizations will ensure that the control
    is inherited to any child organizations.


    ![A352855_1_En_13_Fig7_HTML.jpg](A352855_1_En_13_Fig7_HTML.jpg)


    Figure 13-7.


    Scope of control


    Earlier in this chapter, you were presented with an example of setting up the
    Helpdesk administration role. This policy allows users granted this role via the
    rule configured to manage users within the scope of control. A user might be granted
    multiple roles. One thing to keep in mind is that the roles will stack, meaning
    users will receive the permissions of each role granted to them. However, they
    will remain restrictive. This means that if an access right is specifically restricted
    in one role but granted in another, the user will not be granted that permission.'
  trans: '## 访问策略


    大多数组织拥有不同的用户群体。例如，经理可能有权为其员工授予权限，服务台员工可能能够解锁或重置用户密码，而用户管理员则可以创建、修改和停用用户账户。尽管 `OIM`
    为各类用户提供了相当大的灵活性，但必须将此功能谨慎地分配给合适的用户，以确保整个系统的安全性。访问策略通过允许将角色分配给单个用户、用户组或符合特定条件的用户，来提供这种安全性。这些选项对于构建一个可管理的设置来说至关重要。


    访问策略定义了用户在系统内拥有的权限。外部客户用户可能能够注册其账户并管理诸如密码和个人信息等属性。然而，企业可能决定不允许外部用户在未致电服务台的情况下解锁其账户。另一方面，服务台用户通常被授予更多的权限。他们的访问权限可能包括创建和停用账户的能力。组织可以设置访问策略，允许员工申请新权限，经理可以使用工作流来批准或授予这些权限。`OIM`
    为企业提供了一个框架，用于设置管理身份数据的简单和复杂的规则。


    ### 访问策略配置示例


    如果管理工具难以配置或使用，最终产品可能会受到影响。对于身份信息，这可能导致安全性差。`OIM` 确保以标准化、易于使用的方式执行访问策略的配置。图 13-1
    显示了 Identity Manager 的管理界面。在这个界面上，您可以管理用户、角色、密码策略、管理角色等。对于访问策略，您将导航到“管理角色”。这些角色用于控制
    `LDAP` 存储中的哪些用户可以执行某些操作。


    ![`A352855_1_En_13_Fig1_HTML.jpg`](img/A352855_1_En_13_Fig1_HTML.jpg)


    图 13-1. `Oracle Identity Manager` 管理界面


    图 13-2 显示了开箱即用的 `Oracle Identity Manager` 管理角色的默认列表。这些可以根据您的环境需要进行添加和禁用。创建时，这些角色都没有成员。这由管理员来决定哪些用户组应该获得管理账户的权限。需要注意的是，这些实际上是模板，可用于向各种用户授予权限，并控制用户可以查看和修改的数据。


    ![`A352855_1_En_13_Fig2_HTML.jpg`](img/A352855_1_En_13_Fig2_HTML.jpg)


    图 13-2. 管理角色


    ### 编辑角色相当简单


    编辑角色相当简单。系统提供了一系列选项卡，允许您编辑基本信息、能力、成员规则以及适用的组织。图 13-3 显示了给定角色可用的选项卡。


    ![`A352855_1_En_13_Fig3_HTML.jpg`](img/A352855_1_En_13_Fig3_HTML.jpg)


    图 13-3. 角色管理


    在此示例中，您将查看 `OrclOIMUserHelpDesk` 角色。该角色可以提供给服务台人员，允许他们管理用户账户、重置密码、解锁账户以及向其他用户授予角色。


    “能力”选项卡如图 13-4 所示，显示了分配了 `HelpDesk` 角色的用户将能够执行的操作列表。在这种情况下，服务台用户将能够创建、更新、删除和以其他方式修改在其控制范围内的用户账户（该范围将在本节后面讨论）。如果出于某些原因，此能力列表不符合组织的要求，管理员可以创建一个新的自定义访问策略，仅包含与其环境匹配的能力。如果需要自定义策略，应保留默认策略不变，并创建新的策略。这将确保在出现问题时，原始配置保持不变。


    ![`A352855_1_En_13_Fig4_HTML.jpg`](img/A352855_1_En_13_Fig4_HTML.jpg)


    图 13-4. 角色能力


    一旦访问策略被定义并且能力被配置，管理员必须确定系统中的谁将被授予新的访问权限。标准访问权限，例如搜索和查看用户信息，可能会授予所有用户。然而，编辑账户的能力可能只授予少数精选人员。确定用户成员资格很简单：您可以选择直接将用户添加到角色，或创建管理成员资格的规则。


    在图 13-5 所示的示例中，管理员创建了一条规则，只有以文本 `HPDSK` 开头的用户才会被授予 `HelpDesk` 角色。在这种情况下，可能服务台员工为承包商工作，或创建时带有表示其所属部门的前缀。此规则可以轻松修改为基于其他
    `LDAP` 属性，例如部门或员工类型。图 13-6 展示了一个基于规则的成员资格查询配置示例。


    ![`A352855_1_En_13_Fig6_HTML.jpg`](img/A352855_1_En_13_Fig6_HTML.jpg)


    图 13-6. 基于规则的角色成员资格查询


    ![`A352855_1_En_13_Fig5_HTML.jpg`](img/A352855_1_En_13_Fig5_HTML.jpg)


    图 13-5. 角色成员资格


    ### 访问策略通常被授予一个控制范围


    访问策略通常被授予一个控制范围。这用于定义该角色可用于控制的用户群体。例如，一项要求可能是客户支持组只能管理外部客户账户，而服务台只能处理内部员工账户。“控制范围”选项卡可用于指定这些规则。需要注意的是，如果组织有此类要求，可能需要为每个子组创建额外的角色。在图
    13-7 中，您可以看到服务台的控制范围已设置为包括基本 `OIM` 安装中包含的默认用户类型。如果您的组织有其他类型，请根据需要包括它们。在此示例中，您可以看到服务台可以管理
    `Requests` 以及 `Top` 和默认 `Xellerate` 组织内的用户。包括子组织将确保控制权继承到任何子组织。


    ![`A352855_1_En_13_Fig7_HTML.jpg`](img/A352855_1_En_13_Fig7_HTML.jpg)


    图 13-7. 控制范围


    ### 本章前面介绍了设置 Helpdesk 管理角色的示例


    本章前面介绍了设置 `Helpdesk` 管理角色的示例。该策略允许通过配置的规则授予此角色的用户管理控制范围内的用户。一个用户可能会被授予多个角色。需要记住的一点是，角色的效果会叠加，这意味着用户将获得授予他们的每个角色的权限。然而，它们仍然是限制性的。这意味着，如果某个访问权限在一个角色中被明确限制，但在另一个角色中被授予，用户将不会获得该权限。'
- fmt: "## Password Policies\n\nRequiring your users to maintain `OID` provides the\
    \ ability to control password policies to a point. `OIM` adds functionality to\
    \ truly customize your organization’s password management behavior.\n\nMost organizations\
    \ set up policies that require user passwords to conform to a set of rules. These\
    \ might include rules such as minimum number of characters, upper- and lowercase\
    \ characters, special characters, and so on. Combinations of rules such as these\
    \ increase password complexity. The more complex a password is, the tougher it\
    \ is for an intruder to guess or brute force crack it.\n\nUsing the Oracle Identity\
    \ Manager management screen shown in Figure [13-8](#A352855_1_En_13_Chapter.html#Fig8),\
    \ you can create and maintain password policies for the organization by clicking\
    \ `Policies` and selecting `Password Policies`.\n\n![A352855_1_En_13_Fig8_HTML.jpg](A352855_1_En_13_Fig8_HTML.jpg)\n\
    \nFigure 13-8. Identity Manager management screen\n\nAfter clicking `Manage Password\
    \ Policies`, you are presented with a list of the available password policies.\
    \ You can create new policies or use the default. After creating the password\
    \ policies, you must assign the policy to the proper user populations. `OIM` provides\
    \ the ability to assign different password rules to different user groups based\
    \ on requirements. For instance, human resources employees might be required to\
    \ maintain a higher level of password complexity due to the sensitive personal\
    \ data to which they have access. The list shown in Figure [13-9](#A352855_1_En_13_Chapter.html#Fig9)\
    \ displays the default password policy created for `OIM` users and an example\
    \ password policy. Although you can modify this password policy, it is recommended\
    \ that you create your own.\n\n![A352855_1_En_13_Fig9_HTML.jpg](A352855_1_En_13_Fig9_HTML.jpg)\n\
    \nFigure 13-9. Password Policies list\n\nFrom Figure [13-9](#A352855_1_En_13_Chapter.html#Fig9),\
    \ where the password policies are listed, you can select one and edit it to customize\
    \ it for your own requirements. Figure [13-10](#A352855_1_En_13_Chapter.html#Fig10)\
    \ shows all of the options that can be utilized when creating your policy.\n\n\
    ![A352855_1_En_13_Fig10_HTML.jpg](A352855_1_En_13_Fig10_HTML.jpg)\n\nFigure 13-10.\
    \ Password policy configuration screen\n\nWhen creating the password policy, it\
    \ is important to note the sections of the screen.\n\n*   The first section defines\
    \ the basic rules of a password.\n    *   `Minimum Length`: This specifies the\
    \ number of characters a password must be to pass the complexity rules.\n    *\
    \   `Minimum Password Age (Days)`: This number defines the number of days a user\
    \ must have the password before changing it again. Use the number `0` to allow\
    \ password changes on the same day.\n    *   `Warn After (Days)`: This is the\
    \ number of days before the system will send out a reminder notification to the\
    \ user that his or her password will expire. This is usually sent three to five\
    \ days prior to the expiration.\n    *   `Disallow Past Passwords`: Enter a number\
    \ to exclude the user from reusing previous passwords. This is often set to disallow\
    \ the previous five passwords.\n    *   `Expires After (Days)`: This number determines\
    \ the maximum age of a password before the user is forced to change it.\n*   The\
    \ second section, `Complex Password`, can be used to use a preconfigured password\
    \ complexity rule. It includes the following rules:\n    *   The password must\
    \ be at least six characters long.\n    *   The password must meet three of these\
    \ five rules:\n        *   Must contain uppercase characters.\n        *   Must\
    \ contain numeric characters.\n        *   Must contain lowercase characters.\n\
    \        *   Must contain special characters (`!@#$%^&*`).\n        *   Must contain\
    \ Unicode characters.\n    *   Must not contain the user’s login name, first name,\
    \ or last name.\n\n**Note**: It should be noted that the minimum number of characters\
    \ listed in the default `Complex Password` selection is actually based on the\
    \ number of characters defined in the first section of the screen. If you entered\
    \ `10` characters in that section, the `Complex Password` rule selection will\
    \ actually require `10` characters, not six as indicated.\n\nThe third section\
    \ of this configuration page, `Custom Policy`, allows a full customization of\
    \ the preceding Complex Rules. It should be noted that you can only use `Custom\
    \ Policy` or `Complex Password` for a single password policy. Here you are able\
    \ to precisely define the rules you wish to enforce. You could require five uppercase\
    \ characters and three special characters or more numeric characters. This section\
    \ provides you with full control of the complexity rules. However, keep in mind\
    \ that if the password policy is too restrictive, it could result in users writing\
    \ down passwords.\n\nThe final section of the page is `Challenge Options`. This\
    \ section is used to configure `OIM` to allow users to answer one or more challenge\
    \ questions in case they forget their password or lock their account. This option\
    \ could help reduce help desk calls dramatically by allowing users to manage their\
    \ own locked and forgotten passwords.\n\nClick the `Enable Challenge Policy Support`\
    \ check box and the configuration options will appear. Here you can configure\
    \ the system with custom questions that suit your organization’s requirements.\
    \ You could also allow the users to type in their own questions and answers. After\
    \ defining the questions, you will also have the options to require users to input\
    \ unique answers, define the number of characters an answer might be, or both.\
    \ To further customize this system, you can enter as many questions as you wish,\
    \ but allow the user to choose and answer a minimum number defined in the total\
    \ questions to be answered.\n\n## Summary\n\nThe use of policies within `OIM`\
    \ can encompass user permissions and passwords. This allows administrators to\
    \ configure a secure identity management system while also minimizing the amount\
    \ of day-to-day management that must be performed. Access policies can be used\
    \ to control what functions users are permitted to use based on job title, role\
    \ grants, group membership, and so on. Furthermore these can be used to provide\
    \ granular access to groups of users. Password policies can help maintain a secure\
    \ system by ensuring that the user population is leveraging secure complex passwords.\n\
    \n## 14. Oracle Identity Manager Forms and Customization\n\nIn the previous chapters,\
    \ you have seen that Oracle Identity Manager (`OIM`) provides a wide variety of\
    \ tools that the organization can provide to its users, allowing them to be more\
    \ or less self-sufficient. The use of these tools can eliminate help desk calls\
    \ and allow faster, more efficient processing of permission requests and on- and\
    \ off-boarding tasks. These also provide a higher level of security by removing\
    \ the number of people that must process a request and removing steps in the processes\
    \ managing accounts. These benefits can be a boon to many organizations, as they\
    \ can see money saved and increased security. However, out of the box, the many\
    \ forms available might not meet the look and feel or functionality needs of every\
    \ organization.\n\nOracle has provided multiple methods of tailoring `OIM` to\
    \ the individual organization. `OIM` allows a significant amount of customization.\
    \ These customizations can range from simple logo and color changes, to localization\
    \ of prompts, to full custom forms and reports. Depending on the individual requirements\
    \ of an organization, the level of customization will change. In many cases, color\
    \ changes, logo changes, and page layouts will suffice. Occasionally, the creation\
    \ of custom forms might be required and can be created using the forms creation\
    \ utility. There are some cases where an entire custom application or full customization\
    \ is required and can leverage the `OIM` application programming interface (`API`)\
    \ to create. Using the `API` to create a custom application is outside the scope\
    \ of this book. However, this chapter covers customization and using the forms\
    \ creation utility."
