    \ 至少推荐 10 GB 的存储。应该考虑到日志记录和额外部署的软件会增加这个数字。安装完成并环境稳定后，降低任何已部署应用程序和托管服务器的日志记录级别配置可能是谨慎的做法。\n\
    \n## Oracle Directory Services\n\n建议将`OUD`安装在与 Oracle 身份和访问管理实例分开的主机上。这是为了将`LDAP`身份存储库放置在与数据库相同的内部网络层中。在之前展示的架构图中，您会注意到`LDAP`和数据库环境被放置在一个与应用程序中间件层分开的层中。因此，Oracle\
    \ 目录服务的内存要求将与 Oracle 身份和访问管理组件分开呈现。\n\n`OUD`是一个基于 Java 的`LDAP`目录服务器。因此，与其他 Fusion\
    \ Middleware 产品一样，它安装在受支持的应用服务器中。本节的要求是针对软件安装的，必须与 Fusion Middleware 的最低要求相结合。这将在后面展示。\n\
    \nOracle 推荐为`OUD`分配 2 GB 物理内存，以便在生产环境中以最佳水平运行。这是除了 Fusion Middleware 所需的 8 GB\
    \ 之外的。可以配置`OUD`的 Java 虚拟机（`JVM`）以确保使用足够的内存而不会使服务器过载，这将在本书的安装部分讨论。整体内存要求的计算可以简单地如下进行：\n\
    \n```\n    4 GB of memory for the OS\n+    4 GB of memory for WebLogic and the\
    \ Administration Server\n+    2 GB of memory for the OUD JVM\n___________________________________________________________\n\
    \    10 GB physical memory required for OUD\n```\n\n需要注意的是，`OUD`使用一个小数据库来存储`LDAP`条目。此数据库至少需要\
    \ 1 GB 的磁盘存储。根据日志配置或复制设置，这可能会增加到 30 到 40 GB。确保正确配置日志记录和轮转以防止存储问题非常重要。Oracle 还建议，通过调整内存大小使得整个数据库文件可以加载到内存中，可以提高性能。\n\
    \n## Oracle Identity and Access Manager\n\n尽管将`LDAP`存储库与身份和访问管理节点分开是个好主意，但在大多数情况下，Oracle\
