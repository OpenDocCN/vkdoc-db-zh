    to continue.


    ![A352855_1_En_8_Fig9_HTML.jpg](A352855_1_En_8_Fig9_HTML.jpg)


    Figure 8-9.


    Installation Summary screen


    In general, this process takes between 5 and 10 mimutes. The Installation Progress
    screen, shown in Figure [8-10](#A352855_1_En_8_Chapter.html#Fig10), will display
    the progress along with the actual processes that are taking place. If there are
    any errors, refer to the log file displayed on screen.


    ![A352855_1_En_8_Fig10_HTML.jpg](A352855_1_En_8_Fig10_HTML.jpg)


    Figure 8-10.


    Installation Progress screen


    Immediately after the installer finishes installing, it will move into configuring
    the new instance created based on the inputs on the previous screens. Each step
    might take a little time. After the configuration is complete, the installer will
    start the OHS processes. Monitor the Configuration Progress screen shown in Figure
    [8-11](#A352855_1_En_8_Chapter.html#Fig11) and check the indicated log file if
    there are any errors.


    ![A352855_1_En_8_Fig11_HTML.jpg](A352855_1_En_8_Fig11_HTML.jpg)


    Figure 8-11.


    Configuration Progress screen


    The Installation Complete screen in Figure [8-12](#A352855_1_En_8_Chapter.html#Fig12)
    indicates all of the installation and configuration details for the new Web Tier.


    ![A352855_1_En_8_Fig12_HTML.jpg](A352855_1_En_8_Fig12_HTML.jpg)


    Figure 8-12.


    Installation Complete screen


    You have completed the installation and configuration of OHS and now have a working
    web server that can be used as a front end for your various applications. With
    OHS, you receive the Oracle WebLogic Module, which allows you to configure various
    locations to be handled by underlying WebLogic application servers. Mod_wl_ohs
    contains the necessary configurations to handle the reverse proxy and cluster
    failover for WebLogic-based applications. The next section of this chapter presents
    the steps to install and configure OAM WebGate on the HTTP server.


    ## Oracle Access Manager WebGate Installation and Configuration


    The key component that allows OAM to protect resources and handle SSO, is the
    WebGate. When a request comes in, OAM WebGate evaluates the request and determines
    if authentication is required. In the case that the requested resource is protected,
    the WebGate will hand off authentication responsibility to OAM. Once OAM has authenticated
    the user, it sets up session information within the browser that is utilized by
    the WebGate to allow the user access to the allowed applications.


    The WebGate installation process starts like other installers, with the Welcome
    screen shown in Figure [8-13](#A352855_1_En_8_Chapter.html#Fig13). It is important
    to ensure the version is compatible with the OAM version you have installed.


    ![A352855_1_En_8_Fig13_HTML.jpg](A352855_1_En_8_Fig13_HTML.jpg)


    Figure 8-13.


    Installation begins


    The OAM WebGate installation is started much the same way other Oracle applications
    are installed, using the Universal Installer. From the downloaded installation
    media, Disk1, execute:


    ```

    ./runInstaller.sh –jreLoc /home/oracle/jdk1.6.0_45/jre

    ```


    If you took the time at the beginning to ensure all OS prerequisites were met,
    this screen should complete with all checks normal. If any check is failed, take
    this time to correct the issue before proceeding. See Figure [8-14](#A352855_1_En_8_Chapter.html#Fig14)
    for an example of a completed prerequisite check.


    ![A352855_1_En_8_Fig14_HTML.jpg](A352855_1_En_8_Fig14_HTML.jpg)


    Figure 8-14.


    Prerequisite Checks screen


    The Oracle WebGate should be installed within the same Middleware Home location
    as OHS. If this was done within a WebLogic Middleware Home, ensure the WebGate
    software shares this home. The Oracle Home Directory listed should be unique within
    the directory, as shown in Figure [8-15](#A352855_1_En_8_Chapter.html#Fig15).


    ![A352855_1_En_8_Fig15_HTML.jpg](A352855_1_En_8_Fig15_HTML.jpg)


    Figure 8-15.


    Installation location


    The Installation Summary screen, shown in Figure [8-16](#A352855_1_En_8_Chapter.html#Fig16),
    presents a summary of the components to be installed and their locations. Take
    time to ensure that everything looks correct.


    ![A352855_1_En_8_Fig16_HTML.jpg](A352855_1_En_8_Fig16_HTML.jpg)


    Figure 8-16.


    Installation details


    As with the other products installed within this book, the OHS 11g WebGate installer
    provides a progress indicator shown in Figure [8-17](#A352855_1_En_8_Chapter.html#Fig17).
    You can monitor the installation log indicated if there are any errors.


    ![A352855_1_En_8_Fig17_HTML.jpg](A352855_1_En_8_Fig17_HTML.jpg)


    Figure 8-17.


    Installation Progress screen


    At the end of the installation phase, make note of the details provided on the
    completion screen shown in Figure [8-18](#A352855_1_En_8_Chapter.html#Fig18).


    ![A352855_1_En_8_Fig18_HTML.jpg](A352855_1_En_8_Fig18_HTML.jpg)


    Figure 8-18.


    Installation Complete screen


    This completes this installation of OAM WebGate. In the next section, you will
    progress through the initial configuration and deployment of the WebGate within
    the OHS environment.'
  trans: '# Oracle HTTP Server 安装与配置


    默认情况下，安装将使用端口 `7777` 作为 OHS 服务器端口。如果您希望使用不同的端口，例如 `80`、`443` 或两者，可以通过修改 `staticports.ini`
    文件来配置。或者，您也可以在安装后更新位于实例配置目录中的 `httpd.config` 文件。图 8-8 展示了使用“自动端口配置”设置的安装过程。


    ![A352855_1_En_8_Fig8_HTML.jpg](img/A352855_1_En_8_Fig8_HTML.jpg)

    *图 8-8. 端口配置*


    如图 8-9 所示的“安装摘要”屏幕为您提供将要安装的组件概览。点击“安装”继续。


    ![A352855_1_En_8_Fig9_HTML.jpg](img/A352855_1_En_8_Fig9_HTML.jpg)

    *图 8-9. 安装摘要屏幕*


    通常，此过程需要 5 到 10 分钟。如图 8-10 所示的“安装进度”屏幕将显示进度以及实际进行的过程。如果出现任何错误，请参考屏幕上显示的日志文件。


    ![A352855_1_En_8_Fig10_HTML.jpg](img/A352855_1_En_8_Fig10_HTML.jpg)

    *图 8-10. 安装进度屏幕*


    安装程序完成安装后，将立即开始根据先前屏幕上的输入配置新创建的实例。每个步骤可能都需要一点时间。配置完成后，安装程序将启动 OHS 进程。请监控图 8-11
    所示的“配置进度”屏幕，如果出现任何错误，请检查指示的日志文件。


    ![A352855_1_En_8_Fig11_HTML.jpg](img/A352855_1_En_8_Fig11_HTML.jpg)

    *图 8-11. 配置进度屏幕*


    图 8-12 中的“安装完成”屏幕指示了新 Web 层的所有安装和配置详细信息。


    ![A352855_1_En_8_Fig12_HTML.jpg](img/A352855_1_En_8_Fig12_HTML.jpg)

    *图 8-12. 安装完成屏幕*


    您已完成 OHS 的安装和配置，现在拥有一个可用作您各种应用程序前端的 Web 服务器。通过 OHS，您将获得 Oracle WebLogic 模块，该模块允许您配置各种位置，由底层
    WebLogic 应用服务器处理。`Mod_wl_ohs` 包含处理基于 WebLogic 的应用程序的反向代理和集群故障转移所需的配置。本章下一节将介绍在
    HTTP 服务器上安装和配置 OAM WebGate 的步骤。


    ## Oracle Access Manager WebGate 安装与配置


    允许 OAM 保护资源和处理 SSO 的关键组件是 WebGate。当请求进入时，OAM WebGate 会评估请求并确定是否需要认证。如果请求的资源受保护，WebGate
    将把认证责任移交给 OAM。一旦 OAM 对用户进行了认证，它会在浏览器中设置会话信息，WebGate 利用这些信息允许用户访问被授权的应用程序。


    WebGate 安装过程与其他安装程序类似，从图 8-13 所示的“欢迎”屏幕开始。重要的是要确保版本与您已安装的 OAM 版本兼容。


    ![A352855_1_En_8_Fig13_HTML.jpg](img/A352855_1_En_8_Fig13_HTML.jpg)

    *图 8-13. 安装开始*


    OAM WebGate 安装的启动方式与其他 Oracle 应用程序的安装非常相似，使用 Universal Installer。从下载的安装介质 `Disk1`
    中，执行：

    ```

    ./runInstaller.sh –jreLoc /home/oracle/jdk1.6.0_45/jre

    ```

    如果您在开始时已花时间确保满足所有操作系统先决条件，此屏幕应能正常完成所有检查。如果任何检查失败，请在继续前花时间纠正问题。有关已完成的先决条件检查示例，请参见图
    8-14。


    ![A352855_1_En_8_Fig14_HTML.jpg](img/A352855_1_En_8_Fig14_HTML.jpg)

    *图 8-14. 先决条件检查屏幕*


    Oracle WebGate 应安装在与 OHS 相同的 Middleware Home 位置中。如果这是在 WebLogic Middleware Home
    中完成的，请确保 WebGate 软件共享此主目录。列出的 Oracle Home Directory 在该目录中应该是唯一的，如图 8-15 所示。


    ![A352855_1_En_8_Fig15_HTML.jpg](img/A352855_1_En_8_Fig15_HTML.jpg)

    *图 8-15. 安装位置*


    如图 8-16 所示的“安装摘要”屏幕展示了要安装的组件及其位置的摘要。请花时间确保一切看起来正确。


    ![A352855_1_En_8_Fig16_HTML.jpg](img/A352855_1_En_8_Fig16_HTML.jpg)

    *图 8-16. 安装详细信息*


    与本书中安装的其他产品一样，OHS 11g WebGate 安装程序提供了一个进度指示器，如图 8-17 所示。如果出现任何错误，您可以监控指示的安装日志。


    ![A352855_1_En_8_Fig17_HTML.jpg](img/A352855_1_En_8_Fig17_HTML.jpg)

    *图 8-17. 安装进度屏幕*


    在安装阶段结束时，请记下图 8-18 所示完成屏幕上提供的详细信息。


    ![A352855_1_En_8_Fig18_HTML.jpg](img/A352855_1_En_8_Fig18_HTML.jpg)

    *图 8-18. 安装完成屏幕*


    这完成了 OAM WebGate 的安装。在下一节中，您将开始进行 WebGate 在 OHS 环境中的初始配置和部署。'
- fmt: "## Configure and Deploy Oracle WebGate\n\nNow that the `OHS` and `OAM WebGate`\
    \ software has been installed, it is time to deploy the `WebGate` into `OHS`.\
    \ The tools to do this are located within the `Oracle WebGate` home directory.\
    \ This is the directory chosen during the installation.\n\nUsing a command prompt,\
    \ navigate to the directory:\n```\n/webgate/ohs/tools/deployWebGate\n```\n\nThe\
    \ tool `deployWebGateInstance.sh` requires two parameters: `WebGate Home` and\
    \ `WebGate Instance Home`. These are specified with the `–w` and `–oh` parameters.\
    \ `WebGate Home`, specified with the `–oh`, is the installation directory for\
    \ the `WebGate` software. The `WebGate` instance directory, specified with `–w`,\
    \ is the `OHS` instance directory, which, in many cases, is located in the `Oracle_WT1/instances/instance1/config/OHS/ohs1`\
    \ directory.\n\nThe command should look like this:\n```\n./deployWebGateInstance.sh\
    \ –w /home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1\
    \ –oh /home/oracle/OHSMiddleware/Oracle_OAMWebGate11g\n```\n\nRunning the `deployWebGateInstance.sh`\
    \ tool copies the required agent files to the `WebGate` instance directory. You\
    \ can verify this by looking in the directory `/home/oracle/Oracle_WT1/instances/instance1/config/OHS/ohs1`.\
    \ You should see a `webgate` directory and a `webgate.conf` file.\n\nThe next\
    \ step in the deployment process is to modify the files required to make `OHS`\
    \ aware of the `WebGate`.\n\nTo do this, you must first ensure the `LD_LIBRARY_PATH`\
    \ includes the `OHS` `lib` folder by running:\n```\nexport LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/home/oracle/OHSMiddleware/Oracle_WT1/lib\n\
    ```\n\nNext move to the directory `/home/oracle/OHSMiddleware/Oracle_OAMWebGate11g/webgate/ohs/tools/setup/InstallTools`.\
    \ From this directory, run the command:\n```\n./EditHttpConf –w  -oh \n```\n\n\
    The preceding command requires two parameters: `WebGate Home` and `WebGate Instance\
    \ Home`. These are specified with the `–w` and `–oh` parameters. `WebGate Home`,\
    \ specified with the `–oh`, is the installation directory for the `WebGate` software.\
    \ The `WebGate` instance directory, specified with `–w`, is the `OHS` instance\
    \ directory, which, in many cases, is located in the `Oracle_WT1/instances/instance1/config/OHS/ohs1`\
    \ directory.\n\nVerify that the command made the appropriate changes. Look within\
    \ the `/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/conf/OHS/ohs1`\
    \ directory for the `httpd.conf` file. It should now include the following line\
    \ at the end of the file:\n```\ninclude \"/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1/webgate.conf”\n\
    ```\n\n## Summary\n\nYou now have an `OHS` and `OAM 11g WebGate` instance. Your\
    \ `OHS` can be used as a web server to host applications that must be protected\
    \ by `OAM`. The foundation components are now in place to implement the `Oracle\
    \ Identity and Access Management Suite`. The next few chapters provide the information\
    \ necessary to stitch them all together.\n\n## 9. Configuring Oracle Access Manager\n\
    \nAll required components have now been installed. You have created a domain for\
    \ each of the components in separate `Middleware Homes`. This simplifies future\
    \ upgrades and maintenance. After completing this set of operations, the actual\
    \ components need to be configured and prepared for the actual integrations. The\
    \ configuration process consists of setting up the components relative to your\
    \ environment. The following pages discuss how to configure `OAM` to support single\
    \ sign-on (`SSO`) in your environment.\n\n### Preparing Access Manager to Use\
    \ Oracle Internet Directory\n\n`OAM`, by default, is configured to utilize the\
    \ `WebLogic` built-in Lightweight Directory Access Protocol (`LDAP`) user store\
    \ for both the system and default store. It is highly recommended that you configure\
    \ `OAM` to use an external data store in production environments. Although you\
    \ might not be setting up a production environment, it is recommended that you\
    \ configure your development or test environments similar to your production system.\
    \ As such, this chapter demonstrates how to configure `OAM` to use `Oracle Internet\
    \ Directory (OID)` as its identity store.\n\nTo use `OID` as the identity store,\
    \ the first step is to configure the `WebLogic` security realm to recognize `OID`.\
    \ Open the `OAM WebLogic` domain Administration Console by pointing your browser\
    \ to `http://host:port/console`. In this book, the `OAM WebLogic Server` Administration\
    \ Console is configured for `Host 10.0.70.229 Port 17001`. If you recall from\
    \ previous chapters, `OID` uses `Port 7001` and `Oracle Identity Manager (OIM)`,\
    \ `27001`. Figure 9-1 shows the `WebLogic` Administration Console Security Realm.\n\
    \n![A352855_1_En_9_Fig1_HTML.jpg](A352855_1_En_9_Fig1_HTML.jpg)\n*Figure 9-1.\
    \ WebLogic Server Security Realm*\n\nOnce logged into the Administration Console\
    \ for the `OAM` domain, navigate to Security Realms ➤ `myrealm`. The screen displays\
    \ the default security realm configured during the domain creation. It consists\
    \ of the `DefaultAuthenticator`, `IAMSuiteAgent`, and the `DefaultIdentityAsserter`.\
    \ In this step, you will be adding an authenticator to support `OID`. Click `New`\
    \ to create the new authenticator. This will open the Create a New Authentication\
    \ Provider screen shown in Figure 9-2.\n\n![A352855_1_En_9_Fig2_HTML.jpg](A352855_1_En_9_Fig2_HTML.jpg)\n\
    *Figure 9-2. Create OID authenticator*\n\nOn this screen, provide a name for the\
    \ new authenticator. In this case, name it `OIDAuthenticator` and select `OracleInternetDirectoryAuthenticator`\
    \ in the `Type` field. Click `OK`.\n\nFigure 9-3 shows the reordering screen for\
    \ the `WebLogic` authentication providers.\n\n![A352855_1_En_9_Fig3_HTML.jpg](A352855_1_En_9_Fig3_HTML.jpg)\n\
    *Figure 9-3. Reorder providers*\n\nAfter creating the new provider, it should\
    \ be set to be first in the list of providers. Select the box next to the new\
    \ `OIDAuthenticator` and use the arrows to move it up to the appropriate position.\
    \ Click `OK` to save this step. You can then move on to setting the `Control Flag`\
    \ attribute shown in Figure 9-4.\n\n![A352855_1_En_9_Fig4_HTML.jpg](A352855_1_En_9_Fig4_HTML.jpg)\n\
    *Figure 9-4. Provider common configuration*\n\nAfter reordering the providers,\
    \ you must configure the `OIDAuthenticator`. First set the control flag to `Sufficient`.\
    \ This allows the newly created authenticator to provide authentication services,\
    \ but not require that a user exist within the `OID` user store to access resources.\
    \ This is necessary, as some users, such as `weblogic`, might not exist in `OID`.\
    \ After finishing the configuration of `OIDAuthenticator`, the control flag on\
    \ the `DefaultAuthenticator` must also be set to `Sufficient`.\n\nOn the `Provider\
    \ Details` tab, shown in Figure 9-5, enter the configuration details of the new\
    \ authenticator. In this case, set the values according to the values in Table\
    \ 9-1.\n\n*Table 9-1. OID Authenticator Parameters*\n\n| Host | Host where OID\
    \ is installed |\n| --- | --- |\n| Port | OID LDAP port (OID defaults to 3060)\
    \ |\n| Principal | cn=orcladmin or other principal to be used for the authenticator\
    \ |\n| Credential | Password used by the principal |\n| User Base DN | cn=users,dc=mycompany,dc=com\
    \ |\n| Group Base DN | cn=groups,dc=mycompany,dc=com |\n\n![A352855_1_En_9_Fig5_HTML.jpg](A352855_1_En_9_Fig5_HTML.jpg)\n\
    *Figure 9-5. Authenticator details*"
