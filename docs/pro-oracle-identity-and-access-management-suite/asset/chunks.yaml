  trans: '

    ### 复制制品文件


    在本章前面部分，您已经下载了 AccessGate 文件并创建了安装目录。当时您已看到下载的 zip 文件中包含的文件。在这里，您需要将这些文件复制到已创建的安装目录内的正确位置。


    首先，将 `samplecleanup.html` 从 `$MW_HOME/appsutil/accessgate/ebsAG/sample` 目录复制到
    OHS 安装目录内 htdocs 位置下创建的 `/public` 目录中。按照如下方式将文件重命名为 `oacleanup.html`：


    ```

    cp $MW_HOME/appsutil/accessgate/ebsAG/sample/samplecleanup.html

    /instances/instance1/config/OHS/ohs1/htdocs/public/oacleanup.html

    ```


    将文件复制到正确目录后，使用 Web 浏览器访问它。导航至 [`http://10.0.70.229:7777/public/oacleanup.html`](http://10.0.70.229:7777/public/oacleanup.html)。


    由于此页面不是受 OAM 保护的资源，因此您应该能够直接访问它而无需提示登录信息。但是，此页面将显示为空。此 URL 将在后续步骤中使用，届时您将部署实际的
    WebGate 并配置一个集中注销页面。


    接下来，您需要将 `fndext.jar` 文件复制到 OAM 的 `lib` 目录。执行以下命令来完成此操作。


    ```

    cp $MW_HOME/appsutil/accessgate/ebsAG/fndext.jar $MW_HOME/user_projects/domains/OAMDomain/lib

    ```


    重启 OAM 托管服务器和管理服务器，以加载您复制到 `lib` 目录的新 `fndext.jar` 文件。


    ### 在 EBS 中生成 DBC 文件


    EBS 使用数据库连接文件来为 AccessGate 创建连接池，以便连接到 EBS。在本节中，您将使用 EBS AdminDesktop 实用程序来生成所需的
    DBC 文件。


    设置环境变量，并确保 `JAVA_HOME` 指向 OAM 实例的 JAVA 目录。使用以下命令为您的实例生成 DBC 文件。


    ```

    java oracle.apps.fnd.security.AdminDesktop apps/ CREATE NODE_NAME=10.0.70.229
    DBC=$FND_SECURE/ebsAG.dbc

    ```


    在上面的命令中，`NODE_NAME` 是 OAM 实例所在的主机名。为了在具有多个 EBS AccessGate 的环境中更容易参考，可以将 DBC 文件命名为与
    AccessGate 和 EBS 实例相关的内容。将生成的文件复制到 OAM 服务器上 EBS AccessGate 的安装目录下，在本例中为 `<MW_HOME>/appsutil/accessgate/ebsAG`。


    ### 将 EBS AccessGate 主机添加到外部表列表


    在部署 EBS AccessGate 期间，定义了一个 Java 数据库连接（JDBC）连接。默认情况下，EBS 数据库不允许来自外部机器的通信。为了允许此通信，托管
    OAM AccessGate 的 WLS 必须在 EBS 数据库中注册为受信任的机器。为此，您将使用 EBS Java 开发工具包（JDK）。


    出于安全目的，Oracle 建议使用互联网协议（IP）地址限制来防止未经授权的访问。通过将 EBS AccessGate 主机名添加到 EBS 配置文件中，您可以设置适当的限制。在用户级别将
    `FND_SERVER_DESKTOP_USER` 配置文件设置为包含 AccessGate 的主机名列表。需要注意的是，此值可以接受以逗号分隔的外部机器列表。如果未执行此步骤，用户尝试认证时可能会导致用户名/密码无效的错误。


    ### 使用 txkEBSAuth.xml 部署 AccessGate


    您已配置了设置 AccessGate 所需的组件。作为这些步骤的一部分，您已暂存软件、注册了 AccessGate 主机、配置了 AccessGate 集群和托管服务器，并设置了中间件主目录结构。现在是时候使用
    WLST 实用程序部署 AccessGate 应用程序了。


    开始之前，确保环境变量设置正确非常重要。未能正确设置可能会导致配置问题。您可以运行位于 `$DOMAIN_HOME/bin` 目录中的 `setDomainEnv.sh`
    来执行此步骤：


    ```

    . ./setDomainEnv.sh

    ```


    您也可以手动设置环境变量：


    ```

    export MW_HOME=/home/oracle/OAMMiddleware

    export DOMAIN_HOME=$MW_HOME/user_projects/domains/oam_domain

    ```


    接下来，使用位于 WLS 主目录中的 `setWLSEnv.sh` 设置 WLST 环境。


    ```

    . $MW_HOME/wlserver_10.3/server/bin/setWLSEnv.sh

    ```


    切换到您在上一步中安装 Oracle EBS AccessGate 的目录；例如：


    ```

    cd $MW_HOME/appsutil/accessgate/ebsAG

    ```


    部署 EBS AccessGate 要求您为托管服务器创建一个数据源。执行此步骤会使用 ANT 和前面讨论的 `txkEBSAuth.xml` 模板。此文件位于
    AccessGate 安装目录中。运行以下命令时，请注意它可能需要相当长的时间才能完成。请让进程运行而不中断。最后，您将看到一条完成消息。


    ```

    ant -f txkEBSAuth.xml createDataSource \

    -Dwlshosturl=10.0.70.229:17001 \

    -DdataSourceName=EBS_DS \

    -DdataSourceJNDIName=jndi/EBS_DS \

    -DasadminUser=OAM_EBS_USER \

    -DdbcFile=$MW_HOME/appsutil/accessgate/ebsAG/ebsAG.dbc \

    -DserverName=ebsAG_server1 \

    -DdeploymentName=ebsauth_dev \

    -DfndauthWarFile=$MW_HOME/appsutil/accessgate/ebsAG/fndauth.war \

    -DplanPath=$MW_HOME/appsutil/accessgate/ebsAG/plan/Plan.xml \

    -DSSOServerRelease=11 \

    -DSSOServerURL=http://10.0.70.229:14100 \

    -DWebgateLogoutURL=http://10.0.70.229:7777/public/oacleanup.html

    构建成功：38 分 29 秒

    ```


    该命令将保存在实例主目录中。完整路径和文件名为：


    ```

    $MW_HOME/appsutil/accessgate/EBS_DB/createDS.sh.

    ```


    创建数据源后，您将使用 WLS 管理控制台将数据源定向到环境中适当的托管服务器。使用浏览器导航到 OAM WebLogic 管理控制台。访问 [`http://10.0.70.229:17001/console`](http://10.0.70.229:17001/console)，并使用
    weblogic 用户登录。


    进入 WebLogic 管理控制台后，导航到“服务”➤“数据源”。选择名为 `EBS_DS` 的新数据源。单击“目标”选项卡，并选择之前创建的新 `ebsAG`
    托管服务器。完成后，单击“保存”以完成配置。此步骤无需重启。


    确保数据源已配置并定向到正确的托管服务器后，您就可以在 WLS 上部署 AccessGate 应用程序了。再次，您将使用 ANT 来执行此步骤；例如：


    ```

    ant -f txkEBSAuth.xml deployApplication \

    -Dwlshosturl=10.0.70.229:17001 \

    -DdataSourceName=EBS_DS \

    -DdataSourceJNDIName=jndi/EBS_DS \

    -DasadminUser=OAM_EBS_USER \

    -DdbcFile=$MW_HOME/appsutil/accessgate/ebsAG/ebsAG.dbc \

    -DserverName=ebsag_server1 \

    -DdeploymentName=ebsauth_dev \

    -DfndauthWarFile=$MW_HOME/appsutil/accessgate/ebsAG/fndauth.war \

    -DplanPath=$MW_HOME/appsutil/accessgate/ebsAG/plan/Plan.xml \

    -DSSOServerRelease=11 \

    -DSSOServerURL=http://10.0.70.229:14100 \

    -DWebgateLogoutURL=http://10.0.70.229:7777/public/oacleanup.html

    ```

    '
- fmt: 'This command is interactive. Although you can provide the values inside the
    command, it is recommended that you run it interactively and enter the values
    as prompted to prevent entering the password in clear text and prevent typographical
    errors that could cause implementation issues. Use Table 15-3 as a reference to
    enter the script variables as prompted.


    ## AccessGate Deployment Parameters


    | Script Variable | Description |

    | --- | --- |

    | `-dDeploymentName` | Enter a value that can be used to identify the application
    deployment. In this case, the value is prepended with `ebsauth_` then has the
    EBS instance being used, `dev`. This value will also be used as the context root
    to be protected by the WebGate. |

    | `-DasadminUser` | Enter the EBS user created previously with the UMX/APPS schema
    connect permission. You should ensure that you can log in locally with this user
    in EBS. |

    | `-DasadminPassword` | This is an optional parameter when running the script.
    For security reasons, you might decide not to include it. If you do not include
    it in the command, you will be prompted for it when the command is run. |

    | `-DWebGateLogoutURL` | This value should be set to the complete URL to the `oacleanup.html`
    file created earlier. For example, this should be entered as [`http://10.0.70.229:7777/public/oacleanup.html`](http://10.0.70.229:7777/public/oacleanup.html).
    Do not use a relative URL. |

    | `-DOAMLogoutURL` | Enter the complete URL for the OAM global logout; for example,
    [`http://10.0.70.229:7777/oam/server/logout`](http://10.0.70.229:7777/oam/server/logout).
    |

    | `-DserverName` | Set this value to the deployment server you are using within
    the WebLogic environment. In the previous step, you created a managed server.
    As a best practice, do not deploy anything to the Admin Server. It is best to
    use a dedicated managed server. In this case use `ebsag_server1`. |

    | `-Dwlspwd` | Enter the weblogic user password when prompted. Although you can
    include this in the command, it is best to not include the clear text password
    in the command. |


    The Oracle EBS AccessGate application has now been deployed within the OAM WLS
    environment. You have also created the necessary data sources to support the application.
    The application has been configured to know how to connect to EBS using the admin
    user.


    ### Validate the AccessGate Application Deployment


    After configuring the Oracle EBS AccessGate application resources and deploying
    the application to the managed server, it is recommended that you validate the
    operation and check for any misconfigurations before continuing. If you see any
    problems, this is the time to correct them. To verify the application settings,
    you can use the OAM WLS Administration Console located at `http://<hostname>:<adminserver_port>/console`;
    for example, [`http://10.0.70.229:17001/console`](http://10.0.70.229:17001/console).


    Once logged into the WLS Administration Console, navigate to Environment ➤ Servers,
    and ensure the newly created EBS AccessGate managed server `ebsag_server1` is
    running on the specified port.


    Next, check the data source created for the EBS AccessGate managed server. Using
    the left side menu, go to Services ➤ DataSources, and check that the DataSource
    that you created during deployment (e.g., `ebsAG_ds`) exists, and is targeted
    to the correct managed server (e.g., `ebsag_server1`). Click the data source link
    to review the settings. Within the Settings view, use the Connection Pool tab
    to ensure the values for Properties user and dbcFile are correct according to
    those specified in the deployment parameters. You should also ensure that the
    data source is enabled and running using the Monitoring tab. If desired, on the
    Monitoring tab, you can also use the Testing utility to test the connection.


    After validating the managed server and data source, navigate to Deployments,
    and look for the Oracle EBS AccessGate application named `ebsauth_dev`. It should
    be deployed, in Active state, and OK health. If this is not the case, try to stop
    and start the deployment. Check the WLS logs for any errors that might indicate
    a configuration issue.


    If all of the components are up and running, you should be able to access the
    AccessGate URL using a browser. Navigate to `http://<hostname>:<EBSAccessGatePort>/<accessgatename>/ssologout_callback`;
    for example, [`http://10.0.70.229:17043/ebsauth_dev/ssologout_callback`](http://10.0.70.229:17043/ebsauth_dev/ssologout_callback).
    If successful, you will see an empty page. Check the server for issues if you
    receive any error pages.


    ### Configure Resources in Oracle Access Manager


    After configuring the AccessGate application, it is time to configure OAM and
    the appropriate WebGates to protect the EBS application URLs. For this you will
    use the OAM `oamadmin` screens shown in Figure 15-1. After using a browser to
    log in to the `OAMConsole`, navigate to the Application Security Launch Pad and
    click Application Domains to retrieve the list of domains currently configured.
    You will use the WebGate domain created earlier in this book. Within this domain,
    you will create new resources to be protected by OAM.


    ![A352855_1_En_15_Fig1_HTML.jpg](A352855_1_En_15_Fig1_HTML.jpg)

    *Figure 15-1. Oracle Access Manager WebGate configuration*


    The new resources should be configured as shown in Table 15-4.


    ## Protected and Public Resources for EBS Integration


    | Resource Type | Host Identifier | Resource URL | Authentication Policy | Authorization
    Policy |

    | --- | --- | --- | --- | --- |

    | HTTP | WebGate | `/**` | Public Resource | Public Resource |

    | HTTP | WebGate | `/public/index.html` | Public Resource | Public Resource |

    | HTTP | WebGate | `/excluded/index/html` | Excluded | Excluded |

    | HTTP | WebGate | `/ebsauth_dev/` | Protected Resource | Protected Resource |

    | HTTP | WebGate | `/ebsauth_dev/…/*` | Protected Resource | Protected Resource
    |

    | HTTP | WebGate | `/ebsauth_dev/OAMLogin.jsp` | Public Resource | Public Resource
    |

    | HTTP | WebGate | `/ebsauth_dev/style/` | Public Resource | Public Resource |

    | HTTP | WebGate | `/ebsauth_dev/style/…/*` | Public Resource | Public Resource
    |

    | HTTP | WebGate | `/ebsauth_dev/ssologout.do` | Public Resource | Public Resource
    |

    | HTTP | WebGate | `/ebsauth_dev/ssologout_callback` | Public Resource | Public
    Resource |

    | HTTP | WebGate | `/oacleanup.html` | Public Resource | Public Resource |

    | HTTP | WebGate | `/cgi-bin/printenv` | Protected Resource | Protected Resource
    |'
  raw: 'This command is interactive. Although you can provide the values inside the
    command, it is recommended that you run it interactively and enter the values
    as prompted to prevent entering the password in clear text and prevent typographical
    errors that could cause implementation issues. Use Table [15-3](#A352855_1_En_15_Chapter.html#Tab3)
    as a reference to enter the script variables as prompted.


    Table 15-3.


    AccessGate Deployment Parameters


    | Script Variable | Description |

    | --- | --- |

    | `-dDeploymentName` | Enter a value that can be used to identify the application
    deployment. In this case, the value is prepended with `ebsauth_` then has the
    EBS instance being used, `dev`. This value will also be used as the context root
    to be protected by the WebGate. |

    | `-DasadminUser` | Enter the EBS user created previously with the UMX/APPS schema
    connect permission. You should ensure that you can log in locally with this user
    in EBS. |

    | `-DasadminPassword` | This is an optional parameter when running the script.
    For security reasons, you might decide not to include it. If you do not include
    it in the command, you will be prompted for it when the command is run. |

    | `-DWebGateLogoutURL` | This value should be set to the complete URL to the `oacleanup.html`
    file created earlier. For example, this should be entered as [`http://10.0.70.229:7777/public/oacleanup.html`](http://10.0.70.229:7777/public/oacleanup.html)
    . Do not use a relative URL. |

    | `-DOAMLogoutURL` | Enter the complete URL for the OAM global logout; for example,
    [`http://10.0.70.229:7777/oam/server/logout`](http://10.0.70.229:7777/oam/server/logout)
    . |

    | `-DserverName` | Set this value to the deployment server you are using within
    the WebLogic environment. In the previous step, you created a managed server.
    As a best practice, do not deploy anything to the Admin Server. It is best to
    use a dedicated managed server. In this case use `ebsag_server1`. |

    | `-Dwlspwd` | Enter the weblogic user password when prompted. Although you can
    include this in the command, it is best to not include the clear text password
    in the command. |


    The Oracle EBS AccessGate application has now been deployed within the OAM WLS
    environment. You have also created the necessary data sources to support the application.
    The application has been configured to know how to connect to EBS using the admin
    user.


    ### Validate the AccessGate Application Deployment


    After configuring the Oracle EBS AccessGate application resources and deploying
