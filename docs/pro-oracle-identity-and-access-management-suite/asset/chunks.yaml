    ## Preconfiguring OID for Oracle Access Manager


    With the OAM domain configured with the OID Authenticator, it is time to configure
    the identity store within OAM. This configuration ensures that OAM uses the instance
    of OID configured previously.


    When logging into the `OAMConsole` for the first time, you will need to use the
    `weblogic` user, as OAM is using the default authenticator and `oamadmin` does
    not yet have administrator access to the `OAMConsole`. As such, the first step
    in the process is to create the necessary users and groups in OID in preparation
    of the integration.


    From a command prompt, set your working directory to `<ORACLE_HOME>/idmtools/bin`,
    where `<ORACLE_HOME>` is the installation directory for OAM. You will run all
    of the IDM Tool commands for this section from this location.


    Note


    The IDM Tool should always be run from the same location to ensure the parameter
    files are updated properly. However, in a split domain, where OIM is installed
    in a separate WLS home or on a separate server, you run the `–configOIM` command
    in the OIM home.


    Prior to running the `idmConfigTool.sh` command, you must ensure that the environment
    variables are set properly. Failure to do so will result in a variety of errors,
    not all of which will point to the cause. Set the environment variables as follows:


    ```

    MW_HOME=/home/oracle/OAMMiddlewareHome

    JAVA_HOME=

    IDM_HOME=/home/oracle/OIDMiddlewareHome

    ORACLE_HOME=/home/oracle/OAMMiddlewareHome/Oracle_IAM1

    IAM_ORACLE_HOME=/home/oracle/OAMMiddlewareHome/OracleIAM1

    ```


    These values should reflect the installation directories used in your specific
    environment. Notice that the `MW_HOME` and `ORACLE_HOME` pertain to the Oracle
    Access Management installation. `IDM_HOME` should refer to the OID installation.
    `IDM_HOME` is an optional parameter and can be left out if OID is installed on
    a separate server.


    Create a file called `extendOAMPropertyFile`:


    ```

    extendOAMPropertyFile

    IDSTORE_HOST: 10.0.70.229

    IDSTORE_PORT: 3060

    IDSTORE_BINDDN: cn=orcladmin

    IDSTORE_USERNAMEATTRIBUTE: cn

    IDSTORE_LOGINATTRIBUTE: uid

    IDSTORE_USERSEARCHBASE: cn=Users,dc=mycompany,dc=com

    IDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com

    IDSTORE_SEARCHBASE: dc=mycompany,dc=com

    IDSTORE_SYSTEMIDBASE: cn=systemids,dc=mycompany,dc=com

    ```


    The values in the `extendOAMPropertyFile` should be set as follows:


    *   `IDSTORE_HOST`: This should be set to the hostname of the OID instance, or
    the virtual hostname of a load balanced OID instance.

    *   `IDSTORE_PORT`: Set this to the LDAP port of the OID instance.

    *   `IDSTORE_BINDDN`: `cn=orcladmin`. This value will be used by the tool to log
    in to OID. This user should have access to create users and groups within the
    `usersearchbase` and `groupsearchbase`.

    *   `IDSTORE_LOGINATTRIBUTE`: This should be set to the attribute within the LDAP
    store that contains the login name.

    *   `IDSTORE_USERSEARCHBASE`: Set this attribute to the location within the ID
    store where users are stored.

    *   `IDSTORE_GROUPSEARCHBASE`: Set this attribute to the location within the ID
    store where groups are stored.

    *   `IDSTORE_SEARCHBASE`: Parent container that contains the previously mentioned
    searchbase.

    *   `IDSTORE_SYSTEMIDBASE`: New container that will store system IDs to be used
    by the Identity Management suite.


    Create a file called `preConfigOAMProperties` with the following content:


    ```

    vi preconfigOAMPropertyFile

    IDSTORE_HOST : 10.0.70.229

    IDSTORE_PORT : 3060

    IDSTORE_BINDDN : cn=orcladmin

    IDSTORE_USERNAMEATTRIBUTE: cn

    IDSTORE_LOGINATTRIBUTE: uid

    IDSTORE_USERSEARCHBASE: cn=Users,dc=mycompany,dc=com

    IDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com

    IDSTORE_SEARCHBASE: dc=mycompany,dc=com

    IDSTORE_SYSTEMIDBASE: cn=systemids,dc=mycompany,dc=com

    POLICYSTORE_SHARES_IDSTORE: true

    OAM11G_IDSTORE_ROLE_SECURITY_ADMIN:OAMAdministrators

    IDSTORE_OAMSOFTWAREUSER:oamLDAP

    IDSTORE_OAMADMINUSER:oamadmin

    ```


    The values entered in this file should reflect the values used in your environment.'
