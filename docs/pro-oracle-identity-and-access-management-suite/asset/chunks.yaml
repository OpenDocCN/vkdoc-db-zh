  trans: '

    # 存储库创建实用程序（RCU）与 WebLogic 服务器安装


    在输入数据库参数以告知 `RCU` 使用哪个数据库后，该工具将执行初步检查，以确保其满足最低要求。如果遇到任何错误，请在继续安装前予以纠正。图 4-6 所示的屏幕允许您选择要创建的组件。


    ![A352855_1_En_4_Fig6_HTML.jpg](img/A352855_1_En_4_Fig6_HTML.jpg)


    图 4-6. 模式选择屏幕


    在“选择组件”屏幕上，您可以选择计划安装的融合中间件组件。虽然可以在同一数据库中安装多个组件，但常见的做法是将身份管理组件与 `WebCenter Content`
    或面向服务的架构（`SOA`）等其他应用程序分开。在本例中，仅 `OID` 模式 `Oracle Directory Services` 将安装在此数据库上。这样做是为了方便管理和维护。数据库的修补和升级将仅限于
    `OID` 数据库，管理员无需担心影响身份与访问管理器应用程序。您将看到如图 4-7 所示的确认屏幕。


    ![A352855_1_En_4_Fig7_HTML.jpg](img/A352855_1_En_4_Fig7_HTML.jpg)


    图 4-7. 预检查完成说明


    对于大多数融合中间件产品，数据库可以存储模式的多个实例，因此在上一个屏幕截图中有创建前缀的选项。但是，每个数据库只允许一个 `OID` 实例。如“模式选择”屏幕所示，`ODS`
    模式没有添加前缀。


    选择组件后，`RCU` 将检查数据库以确保唯一性并符合先决条件。


    必须为 `RCU` 创建的模式设置密码，如图 4-8 所示。您可以为所有模式使用相同的密码，或为每个模式使用不同的密码。某些环境可能出于安全考虑要求使用不同的密码。


    ![A352855_1_En_4_Fig8_HTML.jpg](img/A352855_1_En_4_Fig8_HTML.jpg)


    图 4-8. 设置模式密码


    图 4-9 显示了数据库先决条件摘要以及 `RCU` 将执行的操作。


    ![A352855_1_En_4_Fig9_HTML.jpg](img/A352855_1_En_4_Fig9_HTML.jpg)


    图 4-9. 创建必要的数据库对象


    表空间映射屏幕显示了要安装的每个组件以及将要创建的表空间。单击“其他表空间”按钮会显示更详细的列表。如图 4-10 所示，此屏幕仅提供信息，无需输入。


    ![A352855_1_En_4_Fig10_HTML.jpg](img/A352855_1_En_4_Fig10_HTML.jpg)


    图 4-10. 表空间映射


    在此屏幕上单击“下一步”后，将显示输入摘要，让您有机会在创建任何内容之前检查配置，如图 4-11 所示。


    ![A352855_1_En_4_Fig11_HTML.jpg](img/A352855_1_En_4_Fig11_HTML.jpg)


    图 4-11. 存储库创建配置摘要屏幕


    图 4-12 显示了“存储库创建实用程序完成摘要”屏幕。此时，所有数据库模式对象均已创建，并填充了 `OID` 所需的必要数据。后续步骤包括安装 `WebLogic`
    基础架构和 `OID`。


    ![A352855_1_En_4_Fig12_HTML.jpg](img/A352855_1_En_4_Fig12_HTML.jpg)


    图 4-12. `RCU` 完成


    ## 融合中间件 WebLogic 服务器


    一旦先决任务完成，就可以开始安装融合中间件 `WebLogic Server` (`WLS`) 以进行 `OID` 的安装。截至本文撰写时，`OID 11.1.1.9`
    已在 `WLS 10.3.6` 上获得认证。虽然可能可以在此环境中使用更新版本的 `WLS`，但强烈建议您遵循 Oracle 提供的认证矩阵。这将确保兼容性和在出现问题时的支持性。


    融合中间件环境要求使用经过认证的 Java 开发工具包（`JDK`）。出于本次讨论的目的，将使用 `JDK 1.6 Update 45`。您可以在单台机器上安装多个版本的
    `JDK`。但是，重要的是在安装和所有管理任务期间更新 `JAVA_HOME` 和 `PATH` 变量以使用正确的版本。这些可以通过以下命令完成，也可以将这些命令添加到配置文件脚本中以避免重复输入。


    ```

    [oracle@clouddemolab ∼]$ export JAVA_HOME=/home/oracle/java/jdk1.6.0_45

    [oracle@clouddemolab ∼]$ export PATH=$JAVA_HOME/bin:$PATH

    ```


    `WLS 11g`（版本 `10.3.6`）是目前与 `OID 11.1.1.9` 认证的最新 `WLS` 版本。因此，本节将介绍此版本的安装。如果在 64
    位系统上安装 `WLS`，需要使用 `wls10.3.6_generic.jar` 文件。要使用此文件，请执行如图 4-13 所示的命令。


    ![A352855_1_En_4_Fig13_HTML.jpg](img/A352855_1_En_4_Fig13_HTML.jpg)


    图 4-13. 开始 WebLogic 服务器安装


    几乎每个 Oracle 软件安装程序都从欢迎屏幕开始，如图 4-14 所示；`WLS` 也不例外。


    ![A352855_1_En_4_Fig14_HTML.jpg](img/A352855_1_En_4_Fig14_HTML.jpg)


    图 4-14. WebLogic 服务器安装欢迎屏幕


    第一个需要输入的内容是新的中间件主目录的位置。每个融合中间件应用程序都需要一个 `Middleware Home` 位置。对于 `OID` 和身份与访问管理环境，出于可管理性考虑，这些位置将是分开的。对于
    `OID`，`Middleware Home` 将被命名为 `OIDMiddleware`，位于 `/home/oracle/OIDMiddleware`。此屏幕之后将是软件更新屏幕。您可以选择输入您的电子邮件地址以接收更新通知，或跳转到下一步。详情请参见图
    4-15。


    ![A352855_1_En_4_Fig15_HTML.jpg](img/A352855_1_En_4_Fig15_HTML.jpg)


    图 4-15. WebLogic 服务器中间件主目录配置


    选择要使用的 `ORACLE_HOME` 后，您将看到如图 4-16 所示的屏幕，在该屏幕上选择安装类型。


    ![A352855_1_En_4_Fig16_HTML.jpg](img/A352855_1_En_4_Fig16_HTML.jpg)


    图 4-16. 选择安装类型


    此步骤允许您选择典型或自定义安装。典型安装将安装以下组件：


    *   核心应用服务器。

    *   管理控制台。

    *   配置向导和升级实用程序。

    *   Web 2.0 HTTP 发布-订阅服务器。

    *   `WebLogic SCA`。

    *   `WebLogic JDBC` 驱动程序。

    *   第三方 `JDBC` 驱动程序。

    *   `WebLogic Server` 客户端。

    *   `WebLogic Web Server` 插件。

    *   `UDDI` 和 `XQuery` 支持。

    *   评估数据库。

    *   Oracle `Coherence`。


    如果安装不需要其中任何一项，请选择“自定义”并取消选择不需要的项，例如“评估数据库”。


    一旦选择了安装类型并选择了要安装的组件，将显示如图 4-17 所示的“JDK 选择”屏幕。


    ![A352855_1_En_4_Fig17_HTML.jpg](img/A352855_1_En_4_Fig17_HTML.jpg)


    图 4-17. 选择要使用的 JDK 版本


    如果主机上安装了多个 `JDK`，它们将在安装程序的此步骤中列出。但是，如果在运行 `wls1036_generic.jar` 文件时指定了 `JDK`，那么列出的将是该
    `JDK`。

    '
- fmt: '## WebLogic Server Installation


    ![A352855_1_En_4_Fig18_HTML.jpg](A352855_1_En_4_Fig18_HTML.jpg)


    Figure 4-18. WLS server and coherence installation locations


    The Installation Summary screen, shown in Figure [4-19](#A352855_1_En_4_Chapter.html#Fig19),
    displays a confirmation of all the WLS components that will be installed. Use
    this to review and make any changes. Note that this installation is set to install
    all components except the Evaluation Database.


    ![A352855_1_En_4_Fig19_HTML.jpg](A352855_1_En_4_Fig19_HTML.jpg)


    Figure 4-19. Installation Summary screen


    At the end of the WLS installation, the Installation Complete screen is displayed,
    as shown in Figure [4-20](#A352855_1_En_4_Chapter.html#Fig20). You are presented
    with the Run Quickstart check box. In this scenario, clear this check box. The
    domain configuration will be performed after installing OID into this Middleware
    Home.


    ![A352855_1_En_4_Fig20_HTML.jpg](A352855_1_En_4_Fig20_HTML.jpg)


    Figure 4-20. WebLogic Server Installation Complete screen


    You have now installed the binaries required for the OID Middleware Home. The
    OID application files will be installed into this environment.


    ## Oracle Internet Directory Installation


    Before running the Oracle Installer, it is important to ensure that the proper
    JDK is selected. Just like installing WLS, set the `JAVA_HOME` directory and ensure
    the `PATH` environment variable includes the `JAVA_HOME/bin` directory.


    Run the installer for the Identity Management 11.1.1.9 to install OID as shown
    in Figure [4-21](#A352855_1_En_4_Chapter.html#Fig21).


    ![A352855_1_En_4_Fig21_HTML.jpg](A352855_1_En_4_Fig21_HTML.jpg)


    Figure 4-21. Directory structure for the Identity Management 11.1.1.9 installation
    software


    After downloading the Identity Management 11.1.1.9 software from Oracle, unzip
    the files in a directory called `idm11.1.1.9`. This creates the `Disk1` through
    `Disk5` directories containing all the installation utilities. Within the `Disk1`
    directory, run the file `runInstaller`. This will open the screen shown in Figure
    [4-22](#A352855_1_En_4_Chapter.html#Fig22).


    ![A352855_1_En_4_Fig22_HTML.jpg](A352855_1_En_4_Fig22_HTML.jpg)


    Figure 4-22. Installation steps listed


    At this point, you can search for updates on Oracle’s Support site. However, this
    is not required. Figure [4-23](#A352855_1_En_4_Chapter.html#Fig23) shows the screen
    on which you can search for updates if you choose.


    ![A352855_1_En_4_Fig23_HTML.jpg](A352855_1_En_4_Fig23_HTML.jpg)


    Figure 4-23. Install Software Updates screen


    In this section, the plan is to lay down the binaries. Do not install and configure,
    as this will be completed in a later step. As shown in Figure [4-24](#A352855_1_En_4_Chapter.html#Fig24),
    select the Install Software – Do Not Configure option before continuing.


    ![A352855_1_En_4_Fig24_HTML.jpg](A352855_1_En_4_Fig24_HTML.jpg)


    Figure 4-24. Select Installation Type screen


    The system is checked for required packages and to ensure it meets the minimum
    requirements. If any of these checks result in errors, they must be corrected
    before continuing. Warnings should be corrected. Although warnings might not cause
    installation errors, they could result in future problems. Figure [4-25](#A352855_1_En_4_Chapter.html#Fig25)
    shows that all prerequisite checks have completed properly.


    ![A352855_1_En_4_Fig25_HTML.jpg](A352855_1_En_4_Fig25_HTML.jpg)


    Figure 4-25. OID Installation Prerequisite Checks screen


    The OID environment will create the Oracle Home structure within the chosen Middleware
    Home. In this case, the Oracle Home will be located in the `/home/oracle/OIDMiddleware/`
    directory and be called `Oracle_IDM1`. Figure [4-26](#A352855_1_En_4_Chapter.html#Fig26)
    displays the new Oracle Middleware Home.


    ![A352855_1_En_4_Fig26_HTML.jpg](A352855_1_En_4_Fig26_HTML.jpg)


    Figure 4-26. Choose a Middleware Home and Oracle Home location


    The Specify Security Updates screen allows you to enter your e-mail address and
    be notified of future updates needed by the system. You can continue without filling
    this information in, but be sure to periodically check Oracle Support for necessary
    updates to your environments. See Figure [4-27](#A352855_1_En_4_Chapter.html#Fig27)
    for details on this step.


    ![A352855_1_En_4_Fig27_HTML.jpg](A352855_1_En_4_Fig27_HTML.jpg)


    Figure 4-27. Security Updates opt in selection


    There are not many steps that require input during the installation of Oracle
    Identity Management. Figure [4-28](#A352855_1_En_4_Chapter.html#Fig28) shows the
    summary screen.


    ![A352855_1_En_4_Fig28_HTML.jpg](A352855_1_En_4_Fig28_HTML.jpg)


    Figure 4-28. Installation Summary screen


    After you click Install on the Installation Summary screen, the Universal Installer
    begins copying files and creating the filesystem. The choices you made during
    the initial steps provide instruction to the Universal Installer during this phase.
    Figure [4-29](#A352855_1_En_4_Chapter.html#Fig29) shows the Installation Progress
    screen, which shows a continuous progress bar.


    ![A352855_1_En_4_Fig29_HTML.jpg](A352855_1_En_4_Fig29_HTML.jpg)


    Figure 4-29. Installation Progress screen


    After the installation completes, there are two scripts that need to be run as
    the host `ROOT` user. Log in to a terminal window as the root user and run the
    specified scripts. The screen shown in Figure [4-30](#A352855_1_En_4_Chapter.html#Fig30)
    indicates the necessary scripts. Log in to the server as `Root` to run these.


    ![A352855_1_En_4_Fig30_HTML.jpg](A352855_1_En_4_Fig30_HTML.jpg)


    Figure 4-30. Root scripts


    ```

    [root@clouddemolab ∼]# cd /home/oracle/OIDMiddleware/

    [root@clouddemolab OIDMiddleware]# cd Oracle_IDM1/

    [root@clouddemolab Oracle_IDM1]# ./oracleRoot.sh

    [root@clouddemolab Oracle_IDM1]#

    ```


    Before configuring the domain for OID, you should decide if this environment is
    to be clustered. If your environment is planned with redundancy in mind, repeat
    the previous steps for installing the WLS and OID software on any additional hosts
    to be included. The RCU should also be run to create the Oracle Directory Services
    schema in another database for the additional servers.


    ## Oracle Internet Directory Configuration


    In this section, you will be configuring the OID domain within the WLS environment.
    Before proceeding, you should have an understanding of the configuration scenario
    to be used:


    * OID with Oracle Directory Integration Platform (DIP) and Oracle Directory Service
    Manager (ODSM) in a new WebLogic domain.

    * Fusion Middleware Control and the WebLogic Administration Console will be used
    to manage the OID environment.

    * Directory Integration Platform (DIP) will be utilized to synchronize OID with
    third-party LDAP sources.

    * ODSM will be used to manage the LDAP Directory instance.

    * No other WebLogic domain exists within the Oracle Fusion Middleware environment.'
