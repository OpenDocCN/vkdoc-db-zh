    性能要求是一个重要的考虑点。必须考虑应用程序用户对部署在实例上的应用将期望何种服务级别。所讨论的应用是否严重依赖于身份或其他数据、是否内存密集型、或者应用是否有特定的响应时间要求？同时还需考虑环境将要承受的预期负载。


    #### 评估容量要求


    `WLS`必须在满足最低要求的服务器上安装和配置。然而，满足最低要求并不总能保证部署在该环境中的应用程序能以最佳水平运行并提供系统用户所需的服务级别。在规划`WebLogic`实施时，应与应用规划人员或开发者合作，确定预期用户数量、并发连接数、期望响应时间等。此外，收集有关应用程序本身的信息非常有帮助，包括事务耗时、每秒事务数以及应用复杂度。还需考虑应用架构，例如数据库连接和外部服务访问。所有这些都将成为确定`WLS`所需硬件要求以及软件调优的有用输入。所有这些可能需要安装一个测试环境，并根据这些数字进行负载测试。这种做法也能为未来的调优工作提供一个可靠的基准。


    #### 硬件


    容量规划始于计算硬件需求，并确保环境达到或超过这些要求。一个很好的起点是计划用于该环境的软件所附带的文档。`WLS`最低要求一颗`1-GHz CPU`，但待安装组件的具体要求将决定整个系统的要求。例如，在一种分布式架构中，`Oracle
    Access Manager`和`Oracle Identity Manager`安装在一台主机上，而轻量级目录访问协议服务器安装在另一台上，则需要两台物理主机。`OAM/OIM`主机将需要六个或更多核心，而`LDAP`主机仅需要两个。


    #### 内存


    `WLS`需要`8 GB`可用内存（`4 GB`物理内存和`4 GB`交换空间）。这些代表了最低要求，具体数值会根据托管服务器数量及部署在其中的软件而变化。必须考虑服务器本身的内存需求。可以通过为`Linux`操作系统分配`3
    GB`、为`WebLogic Admin Server`分配`3 GB`、以及为每个托管服务器分配`3 GB`（此数字将根据部署内容而变化）来确定一个起点。这将为`WLS`硬件所需的可用内存提供一个初步估算。本章后续将提供关于内存更详细的讨论。


    #### 存储


    尽管`WLS`不需要大量前期存储，但规划磁盘空间以允许增长是重要的。同样，必须考虑将在`WebLogic`托管服务器内部署的所有软件的磁盘空间要求。`WLS`安装大约需要`580
    MB`，额外需要`570 MB`用于`coherence`。总空间需求约为`1.2 GB`。如前所述，需考虑要部署的应用程序。例如，`Oracle Internet
    Directory`、目录集成平台和目录服务管理器将需要额外大约`800 MB`。


    #### 网络


    主机上的网络负载和网络配置将对`WLS`实例的感知性能产生影响。Oracle 建议在千兆网络上安装`WLS`并使用硬件负载均衡器。'
- fmt: '#### Clustering


    Increasing CPU and memory on the physical or virtual host will result in improvements
    within the `WLS` environment. These changes will also have an effect on the performance
    of the applications deployed within the `managed servers`. However, they do nothing
    to reduce the overall load on the individual server. Adding servers or clustering
    can result in greater performance improvements.


    Clustering `WebLogic` environments consists of adding one or more additional hosts
    that run `WLS` and deploying applications within `managed servers` or multiple
    instances on a single multiprocessor server. However the performance would still
    be limited to the other resources on the physical server. An added benefit of
    clustering `WebLogic` environments across multiple servers includes increasing
    availability by providing failover support in the event of loss of a physical
    server. Adding a new separate host to a `WLS` cluster and load balancing the system
    will split the load among the multiple hosts. `WebLogic` will handle session information
    and cluster member monitoring to ensure data continuity. A properly configured
    `WebLogic` cluster will appear as a single instance to client applications.


    The load balancing benefit of clustering evenly distributes application load across
    multiple hosts. This requires that the `managed servers` be deployed on every
    node within the cluster. It should be noted that each `WebLogic` instance within
    the cluster manages its own connections to database and underlying services. This
    capability further increases the performance of the overall environment, as each
    node handles its own set of application requests. Furthermore, additional cluster
    members can be added to the environment without affecting users, allowing for
    dynamic scalability.


    The high availability improvement made by clustering allows for failover redundancy
    in case a node is lost because the `WebLogic` infrastructure handles session information
    and application state clusters can provide automatic failover capabilities. In
    addition, entire `managed servers` can be migrated to another node if needed.


    In summary, ensuring a successful `WebLogic` environment requires considering
    the basic load that will be placed on the system in general. The single server
    must have at least the minimum required CPU and memory for `WLS`, but must also
    possess the requirements for the applications to be deployed. Further performance
    and failover capabilities can be seen with `WebLogic` clustering functionality.
    These features spread the load across multiple hosts, each handling a share of
    the work and taking up slack in the case of loss of one or more nodes. All of
    the components of the Oracle Identity and Access Management Suite require a `WebLogic`
    environment. General guidelines and considerations for the overall environment
    are discussed later in this chapter to assist with setting up a high-performance,
    highly available system.


    ## Enterprise Deployment Topologies


    Oracle Identity and Access Management represents Oracle’s best of class offering
    of a comprehensive identity management suite based on state-of-the-art Oracle
    technologies. It increases user productivity while also providing a highly secure
    and easily adaptable environment. To support a wide variety of enterprise requirements
    covering performance, high availability, and scalability, Oracle Identity and
    Access Management leverages the Fusion Middleware architecture. With Fusion Middleware,
    the organization is provided with a number of options from single nodes that would
    be suitable for development environments to multiple-node clusters located in
    separate datacenters geographically located to support load and maximum disaster
    recovery. This section discusses the various Oracle suggested topologies along
    with some reasons why each should be used and how they can benefit the enterprise.


    ### Single Node


    Single node architecture describes an environment where all services run on a
    single `WebLogic` node. Although there might be more than one physical or virtual
    host involved, each host is running different components and no failover is provided.
    For instance `OID` would have only one instance running on `Host_1`. `OAM` might
    be running on `Host_2`. However, in this case all authentication requests would
    be routed through `OAM` on `Host_2`. `OAM` checks `OID` on `Host_1`. If either
    `Host_1` or `Host_2` goes down, all operations would halt. This topology does
    not provide any redundancy. At the same time, it provides no load balancing either.
    If the applications experience heavy loads, the single servers are required to
    handle the increased traffic. It is for these two reasons that single node topologies
    are usually only suitable for development environments.


    Figure [2-1](#A352855_1_En_2_Chapter.html#Fig1) describes the single node topology.
    Each level of the application environment consists of a single host/single `WLS`
    with two `managed servers`. As can be seen in Figure [2-1](#A352855_1_En_2_Chapter.html#Fig1),
    no redundancy or load balancing is in place. This configuration is the simplest
    implementation and can likely be configured within a single day. Although this
    might be acceptable for a small organization, or one that does not anticipate
    high loads, a larger organization would normally require a higher fault tolerance
    and level of performance than provided by this architecture.


    ![A352855_1_En_2_Fig1_HTML.jpg](A352855_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.

    Generic single node topology


    The image in Figure [2-1](#A352855_1_En_2_Chapter.html#Fig1) describes a single
    node configuration with Identity and Access Management. Each level of the application
    environment consists of a single server. Requests are routed to the `Oracle HTTP
    server` with `Access Manager WebGate`. The `WebGate` determines if authentication
    is required for the requested resource. If the user has not yet authenticated,
    the request is routed to the single `Access Manager` server and authentication
    is handed off to the `LDAP server`. Within the enterprise, `Identity Manager`
    can be used to maintain the user repository.


    In general, single node topologies work fine for environments with a tolerance
    for downtime or high availability requirements. For instance, development groups
    can use these to work on applications that require identity management. Development
    environments have the option to be taken offline without affecting the general
    user populations. By making frequent backups and having a good recovery plan in
    place, smaller organizations might be able to save some cost by running a single
    node environment if their user population is small or they do not require 24/7
    availability.'
