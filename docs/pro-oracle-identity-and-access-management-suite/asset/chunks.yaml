- fmt: '## Configuring Oracle Access Manager Identity Store


    With OID extended to support OAM, it is now time to configure OAM to use OID as
    the System and Default user stores. Log in to the AOM Administration Console by
    navigating to the URL `http://host:wls_console_port/oamconsole`. An example of
    the OAM Administration Console is shown in Figure [9-7](#A352855_1_En_9_Chapter.html#Fig7).
    Log in using the `weblogic` user and password. Until the OAM system and default
    identity stores are configured, the newly created admin user will be unusable.


    ![A352855_1_En_9_Fig7_HTML.jpg](A352855_1_En_9_Fig7_HTML.jpg)

    **Figure 9-7. OAM Administration Console**


    The Administration Console landing page is split into sections that make it easier
    to find configuration settings. Along the top are the main configuration categories:
    Application Security, Federation, Mobile Security, and Configuration. Each has
    several options that allow you to configure the various components. To begin,
    select the Configuration option at the top right corner of the screen. The Configuration
    menu is shown in Figure [9-8](#A352855_1_En_9_Chapter.html#Fig8).


    ![A352855_1_En_9_Fig8_HTML.jpg](A352855_1_En_9_Fig8_HTML.jpg)

    **Figure 9-8. Configuration menu**


    Complete configuration and administration is outside the scope of this book. However,
    this guide covers the parts necessary to complete the overall integration. On
    the Configuration menu, click the User Identity Stores icon to view the current
    configuration. Figure [9-9](#A352855_1_En_9_Chapter.html#Fig9) displays the User
    Identity Stores screen as you will see it before creating a new store.


    ![A352855_1_En_9_Fig9_HTML.jpg](A352855_1_En_9_Fig9_HTML.jpg)

    **Figure 9-9. Identity Store configuration screen**


    The first time you visit the User Identity Stores screen, you will see that Access
    Manager is using the Embedded LDAP as the `UserIdentityStore`, and that it is
    set as the Default and System Stores. The Embedded LDAP is referring to the WLS
    built in. In this section, you are creating a new identity store called OID and
    changing the System and Default stores to use it.


    ### Create: User Identity Store


    On the Create: User Identity Store screen, shown in Figure [9-10](#A352855_1_En_9_Chapter.html#Fig10),
    enter the necessary connection details for OID. The list that follows in Table
    [9-2](#A352855_1_En_9_Chapter.html#Tab2) displays the values expected during this
    stage.


    **Table 9-2. OID Identity Store Connection Details**


    | Store Name | Give the new identity store a name that will be used |

    | Store Type | OID Oracle Internet Directory |

    | Bind DN | `Cn=orcladmin`, or other user that has read access to the user and
    group searchbases |

    | Password | Password set for the user listed in Bind DN |

    | Description | (Optional) |

    | Location | Hostname and LDAP port number for OID |

    | Login ID Attribute | `CN` is the default value; if you are using a different
    attribute, enter it here |

    | User Password Attribute | `userPassword` |

    | User Search Base | `Cn=Users,dc=mycompany,dc=com`; this value should match the
    user searchbase that was used in the `extendOAMPropertyFile` |

    | Group Search Base | `Cn=Groups,dc=mycompany,dc=com`; this value should match
    the group searchbase that was used in the `extendOAMPropertyFile` |


    ![A352855_1_En_9_Fig10_HTML.jpg](A352855_1_En_9_Fig10_HTML.jpg)

    **Figure 9-10. Create: User Identity Store screen**


    Click Test Connection to ensure that the details you have entered are correct
    and that OAM can connect to the new LDAP store. Ensure that you see a result similar
    to Figure [9-11](#A352855_1_En_9_Chapter.html#Fig11) before continuing to the
    next step.


    ![A352855_1_En_9_Fig11_HTML.jpg](A352855_1_En_9_Fig11_HTML.jpg)

    **Figure 9-11. Test connection**


    ### Set Default and System Stores


    After successful creation of the LDAP store, you must set the OAM System and Default
    store values to the name of the new store. You will see an example of this in
    Figure [9-12](#A352855_1_En_9_Chapter.html#Fig12).


    ![A352855_1_En_9_Fig12_HTML.jpg](A352855_1_En_9_Fig12_HTML.jpg)

    **Figure 9-12. Set Default and System stores**


    When you update the store values, you will see a pop-up message informing you
    that there is a step that must be completed before you apply the changes. A new
    section called Access System Administrators will show up on the page. In this
    section, you will add the `oamadmin` user and `oamadministrators` group created
    in the `preconfigOAMProperties` file. Click Add Button and use the search screen
    to find the user and group. Add any additional users that might be required in
    your environment. After you have added the users, click Apply. You will be asked
    for the `oamadmin` username and password to validate that the new user store works
    properly.


    ### Configure LDAP Authentication Module


    After validation of the administration user, and after the new configuration is
    saved, you must configure the LDAP Authentication Module to use the new Identity
    Store. Failure to complete this step before exiting the Administration Console
    can prevent you from logging into the OAM console again. To continue, select the
    Application Security option at the top center of the screen as seen in Figure
    [9-13](#A352855_1_En_9_Chapter.html#Fig13).


    ![A352855_1_En_9_Fig13_HTML.jpg](A352855_1_En_9_Fig13_HTML.jpg)

    **Figure 9-13. Application Security menu**


    On the Application Security menu, under Access Manager, click the Authentication
    Schemes link . Figure [9-14](#A352855_1_En_9_Chapter.html#Fig14) shows a list
    of the authentication schemes that come preconfigured with OAM.


    ![A352855_1_En_9_Fig14_HTML.jpg](A352855_1_En_9_Fig14_HTML.jpg)

    **Figure 9-14. Authentication schemes**


    On the Search Authentication Schemes screen, click Search to display a list of
    the currently available schemes. Click the `LDAPScheme` listed to bring up the
    configuration. This will show the name of the Authentication Module used. Figure
    [9-15](#A352855_1_En_9_Chapter.html#Fig15) shows the configuration screen that
    will be used.


    ![A352855_1_En_9_Fig15_HTML.jpg](A352855_1_En_9_Fig15_HTML.jpg)

    **Figure 9-15. LDAPScheme configuration screen**


    In this case, the `LDAPScheme` is configured to use the LDAP Authentication Module.
    This is the module you will need to change to ensure proper login and access within
    Access Manager configured with an external LDAP store such as OID. Figure [9-16](#A352855_1_En_9_Chapter.html#Fig16)
    shows the result set on the Authentication Modules tab.


    ![A352855_1_En_9_Fig16_HTML.jpg](A352855_1_En_9_Fig16_HTML.jpg)

    **Figure 9-16. Authentication modules**


    Now that you have the name of the authentication module used by the LDAP Authentication
    Scheme, return to the launch page and click the Authentication Modules link under
    Plugins on the Application Security screen. Click Search to display the available
    modules and click the LDAP link. This will bring up the configuration parameters
    for the selected module as seen in Figure [9-17](#A352855_1_En_9_Chapter.html#Fig17).


    ![A352855_1_En_9_Fig17_HTML.jpg](A352855_1_En_9_Fig17_HTML.jpg)

    **Figure 9-17. LDAP Authentication module configuration**


    On the configuration screen, for the User Identity Store, select `OIDStore`, the
    name of the Identity Store created previously. Click Apply to save the changes.
    You have now finished configuring AOM to use OID and are ready to proceed to the
    next step of configuring OIM in the next chapter. For now close the browsers and
    restart OAM. Once restarted, test to ensure you can log into the `OAMConsole`
    as the `oamadmin` user you created.


    ## Summary


    This chapter demonstrated the steps required to configure OAM. It included preconfiguring
    the OID schema to include the necessary containers, users, and groups necessary
    to integrate OAM with an external LDAP provider. Although these instructions were
    specific to OID, similar instructions can be used with most other supported LDAP
    directories with some modification. This step is required whether configuring
    OAM for integration with OIM or not. It will ensure that the user and permissions
    will be contained in the centralized LDAP store and not depend on the embedded
    WebLogic store.'
