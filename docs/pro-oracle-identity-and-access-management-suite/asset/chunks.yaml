    development, as the application must be developed with the identity store in mind
    and the developers must know how to access the necessary information. Furthermore,
    this can cause incompatibilities as organizations migrate from legacy systems
    to new products or development efforts.


    As discussed previously, user information such as credentials and contact data
    can be stored within an LDAP directory. The data is normally stored in a tree-like
    structure that makes organization easier. In most cases, the base of the tree
    defines the organization or security realm. The base distinguished name (DN) can
    be set to something like `dc=mycompany,dc=com`, with DC standing for domain component.
    This provides a valid organization identification while being high level enough
    to break down the lower levels by region or business unit or other breakout defined
    by the enterprise. A directory tree could look something like Figure [3-1](#A352855_1_En_3_Chapter.html#Fig1).


    ![A352855_1_En_3_Fig1_HTML.jpg](A352855_1_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    Example LDAP directory structure users and groups by region (instead of using
    CN or common name, administrators could use organizational unit)


    ```

    dc=mycompany,dc=com

    ou=users

    ou=NorthAmerica

    ou=US

    ou=Canada

    ou =Mexico

    ou=Asia

    ou =Japan

    ou =China

    ou =Taiwan

    ```


    It should be noted that these are examples. Individual organizations might wish
    to organize by region, country, business unit, or resource, as shown in Figure
    [3-2](#A352855_1_En_3_Chapter.html#Fig2).


    ![A352855_1_En_3_Fig2_HTML.jpg](A352855_1_En_3_Fig2_HTML.jpg)


    Figure 3-2.


    Example LDAP structure for users and groups within region


    Because LDAP does not dictate how the data is structured or the granularity, companies
    are, for the most part, free to create the directory structure in a way that makes
    sense given their current and future situations. Design decisions might be made
    according to distributed administration or future plans of data partitioning or
    a host of other reasons.


    User and resource entries are stored within these branches. For the most part,
    this is how user identities are stored. For instance, user John Daily might work
    for mycompany in the United States. In the first example, the entry could be uniquely
    identified by `cn=john.daily,ou=US,ou=NorthAmerica,ou=users,dc=mycompany,dc=com`.
    This is what is known as a DN. It is common to use a name-based approach to assigning
    a DN such as `john.daily`. However, other organizations might wish to create user
    accounts using an assigned identifier to simplify name changes or preventing duplicate
    user accounts if a second John Daily were to join the company.'
  trans: '

    # 网络规划


    随着服务器数量的增加，集群环境对网络的需求也随之增长。根据组织的网络拓扑结构（例如 DMZ | 应用层 或 DMZ | 应用层 | 数据层），防火墙和负载均衡器的数量也会变化。在每一层，都需要配置防火墙以允许适当的通信。在许多情况下，组织有两个主要的网络区域：公共区域/隔离区（DMZ）和一个内网或内部区域。为简单起见，本书将介绍这种双区域配置。


    公共区域或隔离区通常包含 Web 服务器，它们为位于内网区域的应用提供前端代理。这有助于将内部应用区域与公共区域隔离，通过限制内部通信仅使用批准的协议和端口来保护资源。在隔离区内，负载均衡器负责在一个或多个
    Web 服务器之间分配负载，而防火墙则用于限制通信。这提供了更严格的安全性、故障转移和性能优势。


    在内网区域中，应用服务器和数据库服务器向用户提供服务。这些服务通过隔离区中列出的代理和 Web 服务器进行访问。由于防火墙限制了访问，此区域内的服务器通常配置为仅在指定端口上通信。在某些情况下，例如数据库服务器，可能需要负载均衡器来处理故障转移和负载均衡任务。在其他情况下，使用配置了
    WLS 模块的 Web 服务器即可处理负载均衡。负载均衡器也可用作安全套接层（SSL）端点，从而减轻底层服务器的加密处理负担。


    无论使用何种负载均衡技术，组织都应确保其能够提供以下功能：


    *   监控 HTTP 和 HTTPS 流量。

    *   维护多个虚拟服务器名称和端口。

    *   检测服务器状态。

    *   在服务器故障时重新路由请求。

    *   SSL 管理、加速、终止等。

    *   能够向 HTTP 请求处理程序添加 `WL-Proxy-SSL : true`。


    ## 总结


    本章介绍了许多概念，从硬件要求到部署拓扑和安装前注意事项。本章并未提供关于 CPU 架构、操作系统和网络硬件等选项的具体建议，而是给出了通用指导原则。每个环境都有不同的要求。然而，所提供的信息应能使组织能够规划其部署策略。


    在接下来的章节中，将演示一个双节点集群的安装。在某些情况下，可以在单台服务器上安装多个 Fusion Middleware 主目录和实例。本书将指明这些情况，并说明其背后的原因。


    # 3. 用户和策略存储


    身份和访问管理系统围绕一个核心存储系统构建，该系统能够维护用户信息、角色、策略和凭据。这些存储系统也可用于存储有关网络资源、外设和应用程序的信息。大多数情况下，目录存储使用基于轻量目录访问协议（`LDAP`）的系统。其他存储方法包括数据库存储和文件存储。然而，`LDAP`
    提供了一个更广泛接受的标准，并且与更广泛的应用程序兼容。


    `LDAP` 定义了一种标准方法，用于访问有关身份数据、网络资源、外设，甚至加密证书和服务的信息。身份信息可以包含用户凭据、联系信息以及其他用于识别个人的相关数据。这些数据可以被电子邮件等应用程序用于电子邮件地址。或许最有用的功能是提供身份验证和角色定义的能力。应用程序可以使用目录和标准的
    `LDAP` 命令来确保用户能够访问系统，并且只能访问他们被授权使用的数据。


    ## 用户和策略存储概述


    存储在 `LDAP` 目录中的数据通常以有组织的方式构建，以便在浏览和查询信息时更易于访问。此外，这些对象符合定义的格式，包括必需和强制的属性。这些属性不仅有助于识别人或对象，还使应用程序能够查询符合特定条件的用户组。


    虽然 `LDAP` 并未定义存储什么数据或其结构如何，但它定义了数据的访问方式。基于 `LDAP` 的目录的优势在于，任何平台上运行的应用程序都可以访问它们。这些应用程序可以使用
    `TCP/IP`、`LDAP` 协议和 `HTTP` 来查询目录存储。因此，可以通过使用安全套接层（`SSL`）和传输层安全性（`TLS`）来提供额外的安全性。这通过提供实施安全性的标准方法，允许更快地开发应用程序。存在多种用于管理和浏览目录的查询工具。


    其他身份存储方法，例如基于文件的安全性和数据库用户存储，未提供标准的数据访问方法。这会导致应用程序开发效率低下，因为应用程序必须考虑到身份存储来开发，并且开发人员必须知道如何访问必要的信息。此外，当组织从传统系统迁移到新产品或新的开发工作时，这可能会导致兼容性问题。


    如前所述，用户信息（如凭据和联系数据）可以存储在 `LDAP` 目录中。数据通常以树状结构存储，使组织更容易。在大多数情况下，树的根部定义了组织或安全领域。基本可分辨名称（`DN`）可以设置为类似
    `dc=mycompany,dc=com` 的形式，其中 `DC` 代表域组件。这提供了一个有效的组织标识，同时足够高层，可以根据地区、业务部门或企业定义的其他分类来细分较低层级。目录树可能类似于图
    3-1。


    ![A352855_1_En_3_Fig1_HTML.jpg](img/A352855_1_En_3_Fig1_HTML.jpg)


    **图 3-1.** 按区域划分用户和组的 `LDAP` 目录结构示例（管理员可以使用组织单位，而不是使用 `CN` 或通用名称）


    ```

    dc=mycompany,dc=com

    ou=users

    ou=NorthAmerica

    ou=US

    ou=Canada

    ou =Mexico

    ou=Asia

    ou =Japan

    ou =China

    ou =Taiwan

    ```


    需要注意的是，这些都是示例。各个组织可能希望按地区、国家、业务部门或资源进行组织，如图 3-2 所示。


    ![A352855_1_En_3_Fig2_HTML.jpg](img/A352855_1_En_3_Fig2_HTML.jpg)


    **图 3-2.** 区域内用户和组的 `LDAP` 结构示例


    由于 `LDAP` 并未规定数据结构或粒度，公司在很大程度上可以自由地根据当前和未来的情况，以合理的方式创建目录结构。设计决策可能是基于分布式管理、未来数据分区计划或许多其他原因。


    用户和资源条目存储在这些分支中。大多数情况下，用户身份就是这样存储的。例如，用户 John Daily 可能在 mycompany 的美国分公司工作。在第一个示例中，该条目可以通过
    `cn=john.daily,ou=US,ou=NorthAmerica,ou=users,dc=mycompany,dc=com` 来唯一标识。这就是所谓的
    `DN`。通常使用基于名称的方法来分配 `DN`，例如 `john.daily`。然而，其他组织可能希望使用分配的标识符来创建用户账户，以简化名称更改或防止如果有第二个
    John Daily 加入公司时出现重复用户账户。

