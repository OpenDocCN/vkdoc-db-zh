  trans: '

    ## 目录集成平台


    同步 OID 与 Active Directory 的关键在于 `DIP`。利用 Oracle `DIP`，IT 部门可以将轻量级目录访问协议 (`LDAP`)
    信息（源自包括 Active Directory、OpenLDAP 及其他 `LDAP` 或数据库存储在内的多个来源）复制到一个集中式目录中，该目录可与 Oracle
    产品及应用程序配合使用。


    数据同步通过配置文件完成，这些配置文件可在 `DIP` 系统中创建，用于映射和转换外部目录身份信息，以满足 Oracle 系统的要求。当 `DIP` 执行并查询
    `LDAP` 源以在 `OID` 中插入或修改数据时，便会使用这些配置文件。在接下来的章节中，您将看到一个基本的配置文件，用于将 `OID` 与单个 Active
    Directory 实例同步。`DIP` 可以支持多个配置文件和多个来源。如果您需要将不同的 Active Directory 组织单元 (`OUs`) 同步到
    `OID` 内不同的命名空间中，或者需要同步来自不同来源的用户，这将会很有帮助。


    ### 创建同步配置文件


    将使用 Fusion Middleware Control 界面来创建 `DIP` 配置文件。有关 Fusion Middleware Control 界面的更详细信息，请参见第
    8 章。导航至 `http://hostname:port/em` 即可打开 Fusion Middleware Control 的欢迎屏幕，如图 5-1
    所示。


    ![A352855_1_En_5_Fig1_HTML.jpg](img/A352855_1_En_5_Fig1_HTML.jpg)


    图 5-1.

    Fusion Middleware Control 登录屏幕


    可以通过浏览器访问 `OID` Fusion Middleware Control，导航至 `http://<host>:<port>/em`。使用的端口应为域配置期间选择的
    WebLogic 管理服务器端口。本例中为 `7001`。登录 Fusion Middleware Control 界面后，使用位于屏幕左侧的菜单结构，定位到位于“身份和访问”下的
    `DIP(11.1.2)` 实例。


    选择 `DIP(11.1.2)` 后，您将看到服务器进程的当前状态，如图 5-2 所示。请注意，执行摘要为空，因为尚无配置文件可供执行。此屏幕是一个快速参考。创建配置文件后，每个配置文件的摘要将显示在此部分。


    ![A352855_1_En_5_Fig2_HTML.jpg](img/A352855_1_En_5_Fig2_HTML.jpg)


    图 5-2.

    目录集成平台主页屏幕


    在 `DIP` 主页屏幕上，使用 `DIP` 服务器下拉菜单导航到 管理 ➤ 同步配置文件。同步配置文件不同于配置配置文件。后者将在本书后面介绍 `EBS`
    集成时讨论。图 5-3 描绘了状态屏幕和菜单选项。


    ![A352855_1_En_5_Fig3_HTML.jpg](img/A352855_1_En_5_Fig3_HTML.jpg)


    图 5-3.

    选择同步配置文件


    在“管理同步配置文件”页面上（如图 5-4 所示），列出了所有现有配置文件。从这里，您可以根据需要创建、删除和编辑配置文件。启用的配置文件是那些当前正由 `DIP`
    调度程序执行的配置文件。它们各自按照为它们配置的间隔运行。


    ![A352855_1_En_5_Fig4_HTML.jpg](img/A352855_1_En_5_Fig4_HTML.jpg)


    图 5-4.

    管理同步配置文件屏幕


    随 `DIP` 安装的 `OID` 包含许多预配置的配置文件，用于支持目录源，如 Active Directory、IBM Tivoli、Sun Directory
    Server 和 Novell eDirectory，以及数据库和 `LDIF` 源。这些是包含常见属性映射的基本模板。组织的个别需求将决定这些配置文件需要多少定制。然而，它们是一个良好的起点，可以避免从头开始创建。请注意，除了所包含模板之外的其他目录源将需要完全自定义的配置文件。


    由于这是系统中的第一个配置文件，请在窗口中选择 `创建`。系统将提示您输入有关配置文件类型和源服务器配置的信息。请务必在开始此过程前准备好源服务器信息。您需要主机、端口以及目录中至少具有读取权限的帐户。


    创建同步配置文件的第一步是提供名称和有关源身份存储的连接详细信息。创建屏幕如图 5-5 所示。


    ![A352855_1_En_5_Fig5_HTML.jpg](img/A352855_1_En_5_Fig5_HTML.jpg)


    图 5-5.

    连接详细信息

    '
- fmt: '# 配置同步配置文件


    为正在创建的配置文件提供一个名称。如果计划为一个给定目录只使用一个配置文件，可以使用像 `AD2OID` 这样通用的名称。但是，如果预计同一来源会有多个配置文件，则可能希望提供更具体的名称，例如
    `AD_Region2OID`。此示例可用于当组织要求将不同 Active Directory 组织单位中的用户放置在不同的 OID 命名空间中或区别处理的情况。良好的命名约定有助于管理员轻松管理配置文件。


    为配置文件提供名称后，输入先前收集的源目录连接详细信息。由于此示例是一个 Active Directory 服务器，因此类型选择为 Active Directory
    (MS)。确保为配置文件选择正确的服务器类型，以便 DIP 能够相应地创建配置文件模板。必须输入源目录的主机和端口，并提供一个用户名/密码对，该账户至少对要同步的用户和组具有读取权限。此账户无权访问的任何信息都将不会被同步。这可能导致
    OID 中数据缺失。


    对于从 Active Directory 到 OID 的单向同步，只需读取访问权限。配置此类同步后，Active Directory 中的更改将被写入 OID。但是，不会写回任何内容到
    Active Directory。这将保持 Active Directory 作为环境中所有用户的真实来源。OID 则充当应用程序身份存储。请注意，DIP
    配置文件不会将密码从 Active Directory 同步到 OID。密码处理由外部身份验证插件或 Active Directory 密码过滤器执行。这些选项将在本章后面讨论。


    ## 属性映射


    正确同步两个不同的身份存储要求源对象属性正确映射到目标。例如，Active Directory 可能使用像 `SAMAccountName` 这样的属性进行用户登录，而
    OID 实例可能使用 `UID`。这必须在 DIP 配置文件中予以考虑。图 5-6 显示了映射屏幕。


    ![A352855_1_En_5_Fig6_HTML.jpg](A352855_1_En_5_Fig6_HTML.jpg)


    图 5-6. 同步配置文件映射


    输入源目录连接详细信息并通过连接测试后，就该配置映射详细信息了。“配置文件映射”页面提供了“源容器/目标规则”、“排除规则”和“属性映射规则”的输入项。这些部分均可配置以满足组织的需求。


    ### 域映射规则


    在“域映射规则”部分，可以配置一个或多个源容器及其在 OID 中的映射位置。如果源目录结构由多个域或容器组成，而这些域或容器又需要映射到不同的 OID 容器中，这将非常有用。这里需要注意，在单个配置文件中设置的排除和映射规则将应用于此“域映射规则”部分中定义的所有容器。如果每个容器需要不同的排除或映射规则，则应考虑创建多个配置文件来处理每个容器。


    在许多情况下，组织在源目录中有一个必须映射到 OID 中单个域的域。在这种情况下，图 5-6 显示源容器为基本判别名 (DN)，目标容器为 OID 域主用户容器。出于本示例的目的，此映射已足够。


    需要注意的是，DIP 主要同步新账户和对现有账户的修改。然而，每个目录源处理对象删除的方式不同，需要特别注意以确保从源中删除的对象也从目标目录中删除。这可能包括诸如授予同步账户域管理员权限等步骤，以便它可以正确查看已删除账户的墓碑记录，或授予对存储已删除或已停用账户的域单位的权限。请参阅源目录文档或咨询管理员以确定需要采取的措施。


    ### 属性映射规则设置


    属性映射规则允许您指定如何将条目从源转换为目标。Oracle 后端目录必须是源或目标。转换条目时，有三种类型的映射规则：域规则、属性规则和协调规则。这些映射规则允许您指定
    DN 映射、属性级映射和协调规则。如图 5-7 所示。


    ![A352855_1_En_5_Fig7_HTML.jpg](A352855_1_En_5_Fig7_HTML.jpg)


    图 5-7. 属性映射规则设置


    创建属性映射规则时，源 `ObjectClass` 和 `Attribute` 会直接映射或经过转换以填充目标属性。在创建映射规则时，请牢记一些注意事项。OID
    中所有必填字段都应基于源目录中的必填字段。如果构建转换，请确保映射中使用的元素在源中已填充。如果未填充，输入到 OID 的数据可能格式错误。如果源包含二进制值，则必须指定属性类型为二进制。


    图 5-8 显示了从 Active Directory 同步 OID 时使用的属性映射规则示例。虽然可以手动创建这些规则，但当使用开箱即用的模板时，规则是预创建的，仅当您的环境使用额外属性或有特殊需求时才需要修改。


    ![A352855_1_En_5_Fig8_HTML.jpg](A352855_1_En_5_Fig8_HTML.jpg)


    图 5-8. DIP 映射规则


    编辑映射规则的示例如图 5-9 所示。一个常用的映射规则是将源 `userPrincipalName` 和 `sAMAccountname` 转换为可用于填充
    OID 中 `orclSAMAccountname` 字段的格式，规则如下：


    ```

    toupper(truncl(userPrincipalName,''@''))+"$"+sAMAccountname

    ```


    ![A352855_1_En_5_Fig9_HTML.jpg](A352855_1_En_5_Fig9_HTML.jpg)


    图 5-9. 编辑映射规则


    需要注意的是，您的环境可能有不同的要求。


    ## 过滤规则


    过滤规则可用于减少同步对象的数量。您可以使用这些规则排除 Active Directory 组织单位或不符合特定条件的对象。“过滤”选项卡如图 5-10 所示。


    ![A352855_1_En_5_Fig10_HTML.jpg](A352855_1_En_5_Fig10_HTML.jpg)


    图 5-10. 过滤规则


    复杂过滤器应括在双引号中。在某些版本的 OID 中，测试未加引号的复杂过滤器会导致此屏幕锁定，并最终导致 OID 实例崩溃。复杂过滤器是指任何具有多个条件并使用
    `AND` 和 `OR` 等运算符的过滤器。


    ## 高级选项


    图 5-11 显示了新 DIP 配置文件的高级设置。“高级”选项卡允许您设置运行同步配置文件的计划间隔并更新平台的其他属性。“最后更改编号”字段可以更新以重新运行最近的更改。但是，在更新该值之前应仔细考虑。


    ![A352855_1_En_5_Fig11_HTML.jpg](A352855_1_En_5_Fig11_HTML.jpg)


    图 5-11. 高级选项'
  raw: 'Provide a name for the profile you are creating. If you plan to have only
    one profile for a given directory, it can be something generic such as `AD2OID`.
    However, if you anticipate having multiple profiles for the same source, you might
    wish to provide a more specific name such as `AD_Region2OID`. This example could
    be used if your organization requires users in different Active Directory OUs
    to be placed in different OID namespaces or handled differently. A good naming
    convention can help administrators easily manage profiles.


    After providing a name for the profile, enter the connection details gathered
    previously for the source directory. Because this example is an Active Directory
    server, the Active Directory (MS) option is selected for type. Ensure that you
    select the proper server type for your profile so that the DIP can create the
    profile template accordingly. You must enter host and port for the source directory
    and provide a username/password pair for an account that has, at least, read access
    on the users and groups to be synchronized. Any information that this account
    does not have access to will not be synchronized. This could lead to missing data
    in OID.


    For a one-way synchronization from Active Directory to OID, read access is all
    that is required. When this type of synchronization is configured, changes in
    Active Directory are written to OID. However, nothing is written back to Active
    Directory. This maintains Active Directory as the source of truth for all users
    in the environment. OID serves as the application identity store. Note that the
    DIP profiles do not synchronize passwords from Active Directory to OID. Password
    handling is performed either by the external authentication plug-in or the Active
    Directory password filter. These options are discussed later in this chapter.


    Properly synchronizing two disparate identity stores requires that the source
    object attributes be correctly mapped to the destination. For example, Active
    Directory might use an attribute such as `SAMAccountName` for user login whereas
    the OID instance might use `UID`. This must be accounted for in the DIP profile.
    Figure [5-6](#A352855_1_En_5_Chapter.html#Fig6) displays the mapping screen.


    ![A352855_1_En_5_Fig6_HTML.jpg](A352855_1_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    Synchronization profile mapping


    After the source directory connection details are entered and pass the connection
    test, it is time to configure the mapping details. The Profile Mapping page provides
    inputs for Source Container/Destination Rules, Exclusion Rules, and Attribute
    Mapping Rules. Each of these sections are configurable to meet the requirements
    of the organization.


    In the Domain Mapping Rules section, you are able to configure one or more source
    containers, and where they map to within OID. This is extremely useful if the
    source directory structure consists of multiple domains or containers that are
    destined for different OID containers. It should be noted here that the exclusion
    and mapping rules set forth in a single profile will apply to all of the containers
    defined in this Domain Mapping Rules section. If different exclusions or mapping
    rules are required for each container, you should consider creating multiple profiles
    to handle each container.


    In many cases, organizations have a single domain within the source directory
    that must be mapped to a single domain in OID. In this case, Figure [5-6](#A352855_1_En_5_Chapter.html#Fig6)
    shows the source container being the base distinguished name (DN) and the destination
    container is the OID domain primary users container. For the purposes of this
    example, this mapping is sufficient.


    It should be noted that the DIP primarily synchronizes new accounts and modification
    to existing accounts. However, each directory source handles object deletion differently
    and special care is required to ensure that objects deleted from the source are
    deleted from the destination directory. This might include steps such as granting
    the synchronization account domain admin privileges so that it can properly view
    the tombstone records of deleted accounts, or granting permissions to the domain
    units storing deleted or inactivated accounts. Refer to the source directory documentation
    or administrator to determine what is needed.


    Attribute mapping rules allow you to specify how to convert entries from the source
    to the destination. The Oracle back-end directory must either be the source or
    the destination. When converting the entries, there are three types of mapping
    rules: domain rules, attribute rules, and reconciliation rules. These mapping
    rules allow you to specify DN mapping, attribute-level mapping, and reconciliation
    rules. This is shown in Figure [5-7](#A352855_1_En_5_Chapter.html#Fig7).


    ![A352855_1_En_5_Fig7_HTML.jpg](A352855_1_En_5_Fig7_HTML.jpg)


    Figure 5-7.


    Attribute Mapping Rules settings


    When creating attribute mapping rules, the source `ObjectClass` and `Attribute`
    are mapped either directly or transformed to populate destination attributes.
    It is important that you keep some considerations in mind during the creation
    of the mapping rules. All fields that are required in OID should be based on a
    required field in the source directory. If building a transformation, ensure that
    the elements used in the mapping are populated in the source. If they are not,
    the data entered into OID could be malformed. If the source contains binary values,
    then it is important to specify the attribute type as binary.


    Figure [5-8](#A352855_1_En_5_Chapter.html#Fig8) displays an example of attribute
    mapping rules used when synchronizing OID from Active Directory. Although you
    can create these manually, when using one of the out-of-the-box templates, the
    rules are precreated and only need modification if your environment uses additional
    attributes or has one-off requirements.


    ![A352855_1_En_5_Fig8_HTML.jpg](A352855_1_En_5_Fig8_HTML.jpg)


    Figure 5-8.


    DIP mapping rules


    An example of editing a mapping rule is presented in Figure [5-9](#A352855_1_En_5_Chapter.html#Fig9).
    An often used mapping rule is a rule to transform the source `userPrincipalName`
    and `sAMAccountname` into a format that can be used to populate the `orclSAMAccountname`
    field in OID using the following rule:


    ```

    toupper(truncl(userPrincipalName,''@''))+"$"+sAMAccountname

    ```


    ![A352855_1_En_5_Fig9_HTML.jpg](A352855_1_En_5_Fig9_HTML.jpg)


    Figure 5-9.


    Editing a mapping rule


    It should be noted that your environment might have different requirements.


    Filtering rules can be used to reduce the population of synchronized objects.
    You can use the rules to exclude Active Directory OUs or objects that do not meet
    certain criteria. The Filtering tab is shown in Figure [5-10](#A352855_1_En_5_Chapter.html#Fig10).


    ![A352855_1_En_5_Fig10_HTML.jpg](A352855_1_En_5_Fig10_HTML.jpg)


    Figure 5-10.


    Filtering rules


    Complex filters should be enclosed in double quotes. In some versions of OID,
    testing a complex filter not enclosed in quotes will cause this screen to lock
    up and the OID instance will eventually crash. A complex filter is any filter
    that has more than one single criteria and uses operators such as AND and OR.


    Figure [5-11](#A352855_1_En_5_Chapter.html#Fig11) shows the advanced settings
    for the new DIP profile. This Advancced tab allows you to set the scheduling interval
    for running the synchronization profile and update other attributes of the platform.
    The Last Change Number field can be updated to rerun recent changes. However,
    careful consideration should be given before updating the value.


    ![A352855_1_En_5_Fig11_HTML.jpg](A352855_1_En_5_Fig11_HTML.jpg)


    Figure 5-11.


    Advanced options'
  trans: '

    # 配置同步配置文件


    为正在创建的配置文件提供一个名称。如果计划为一个给定目录只使用一个配置文件，可以使用像 `AD2OID` 这样通用的名称。但是，如果预计同一来源会有多个配置文件，则可能希望提供更具体的名称，例如
    `AD_Region2OID`。此示例可用于当组织要求将不同 Active Directory 组织单位中的用户放置在不同的 OID 命名空间中或区别处理的情况。良好的命名约定有助于管理员轻松管理配置文件。


    为配置文件提供名称后，输入先前收集的源目录连接详细信息。由于此示例是一个 Active Directory 服务器，因此类型选择为 Active Directory
    (MS)。确保为配置文件选择正确的服务器类型，以便身份合成器能够相应地创建配置文件模板。必须输入源目录的主机和端口，并提供一个用户名/密码对，该账户至少对要同步的用户和组具有读取权限。此账户无权访问的任何信息都将不会被同步。这可能导致
    OID 中数据缺失。


    对于从 Active Directory 到 OID 的单向同步，只需读取访问权限。配置此类同步后，Active Directory 中的更改将被写入 OID。但是，不会写回任何内容到
    Active Directory。这将保持 Active Directory 作为环境中所有用户的真实来源。OID 则充当应用程序身份存储。请注意，身份合成器配置文件不会将密码从
    Active Directory 同步到 OID。密码处理由外部身份验证插件或 Active Directory 密码过滤器执行。这些选项将在本章后面讨论。


    ## 属性映射


    正确同步两个不同的身份存储要求源对象属性正确映射到目标。例如，Active Directory 可能使用像 `SAMAccountName` 这样的属性进行用户登录，而
    OID 实例可能使用 `UID`。这必须在身份合成器配置文件中予以考虑。图 5-6 显示了映射屏幕。


    ![A352855_1_En_5_Fig6_HTML.jpg](img/A352855_1_En_5_Fig6_HTML.jpg)


    图 5-6. 同步配置文件映射


    输入源目录连接详细信息并通过连接测试后，就该配置映射详细信息了。“配置文件映射”页面提供了“源容器/目标规则”、“排除规则”和“属性映射规则”的输入项。这些部分均可配置以满足组织的需求。


    ### 域映射规则


    在“域映射规则”部分，可以配置一个或多个源容器及其在 OID 中的映射位置。如果源目录结构由多个域或容器组成，而这些域或容器又需要映射到不同的 OID 容器中，这将非常有用。这里需要注意，在单个配置文件中设置的排除和映射规则将应用于此“域映射规则”部分中定义的所有容器。如果每个容器需要不同的排除或映射规则，则应考虑创建多个配置文件来处理每个容器。


    在许多情况下，组织在源目录中有一个必须映射到 OID 中单个域的域。在这种情况下，图 5-6 显示源容器为基本判别名 (DN)，目标容器为 OID 域主用户容器。出于本示例的目的，此映射已足够。


    需要注意的是，身份合成器主要同步新账户和对现有账户的修改。然而，每个目录源处理对象删除的方式不同，需要特别注意以确保从源中删除的对象也从目标目录中删除。这可能包括诸如授予同步账户域管理员权限等步骤，以便它可以正确查看已删除账户的墓碑记录，或授予对存储已删除或已停用账户的域单位的权限。请参阅源目录文档或咨询管理员以确定需要采取的措施。


    ### 属性映射规则设置


    属性映射规则允许您指定如何将条目从源转换为目标。Oracle 后端目录必须是源或目标。转换条目时，有三种类型的映射规则：域规则、属性规则和协调规则。这些映射规则允许您指定
    DN 映射、属性级映射和协调规则。如图 5-7 所示。


    ![A352855_1_En_5_Fig7_HTML.jpg](img/A352855_1_En_5_Fig7_HTML.jpg)


    图 5-7. 属性映射规则设置


    创建属性映射规则时，源 `ObjectClass` 和 `Attribute` 会直接映射或经过转换以填充目标属性。在创建映射规则时，请牢记一些注意事项。OID
    中所有必填字段都应基于源目录中的必填字段。如果构建转换，请确保映射中使用的元素在源中已填充。如果未填充，输入到 OID 的数据可能格式错误。如果源包含二进制值，则必须指定属性类型为二进制。


    图 5-8 显示了从 Active Directory 同步 OID 时使用的属性映射规则示例。虽然可以手动创建这些规则，但当使用开箱即用的模板时，规则是预创建的，仅当您的环境使用额外属性或有特殊需求时才需要修改。


    ![A352855_1_En_5_Fig8_HTML.jpg](img/A352855_1_En_5_Fig8_HTML.jpg)


    图 5-8. 身份合成器映射规则


    编辑映射规则的示例如图 5-9 所示。一个常用的映射规则是将源 `userPrincipalName` 和 `sAMAccountname` 转换为可用于填充
    OID 中 `orclSAMAccountname` 字段的格式，规则如下：


    ```

    toupper(truncl(userPrincipalName,''@''))+"$"+sAMAccountname

    ```


    ![A352855_1_En_5_Fig9_HTML.jpg](img/A352855_1_En_5_Fig9_HTML.jpg)


    图 5-9. 编辑映射规则


    需要注意的是，您的环境可能有不同的要求。


    ## 过滤规则


    过滤规则可用于减少同步对象的数量。您可以使用这些规则排除 Active Directory 组织单位或不符合特定条件的对象。“过滤”选项卡如图 5-10 所示。


    ![A352855_1_En_5_Fig10_HTML.jpg](img/A352855_1_En_5_Fig10_HTML.jpg)


    图 5-10. 过滤规则


    复杂过滤器应括在双引号中。在某些版本的 OID 中，测试未加引号的复杂过滤器会导致此屏幕锁定，并最终导致 OID 实例崩溃。复杂过滤器是指任何具有多个条件并使用
    `AND` 和 `OR` 等运算符的过滤器。


    ## 高级选项


    图 5-11 显示了新身份合成器配置文件的高级设置。“高级”选项卡允许您设置运行同步配置文件的计划间隔并更新平台的其他属性。“最后更改编号”字段可以更新以重新运行最近的更改。但是，在更新该值之前应仔细考虑。


    ![A352855_1_En_5_Fig11_HTML.jpg](img/A352855_1_En_5_Fig11_HTML.jpg)


    图 5-11. 高级选项

    '
- fmt: '## 创建与管理同步配置文件


    创建配置文件后，它将列在图 [5-12](#A352855_1_En_5_Chapter.html#Fig12) 所示的“管理同步配置文件”屏幕上。您可以根据需要在此处启用、禁用、编辑、删除和测试您的配置文件。作为管理员，您可以根据需求创建任意多的配置文件。编辑配置文件将使您返回到之前呈现的页面。


    ![A352855_1_En_5_Fig12_HTML.jpg](A352855_1_En_5_Fig12_HTML.jpg)


    **图 5-12.** 创建的同步配置文件


    建议在启用配置文件之前对其进行测试。只有禁用的配置文件才能使用 `DIP Tester` 进行测试。还应注意，只有从 `LDAP` 源到 `LDAP` 目标的配置文件才能使用此方法进行测试。要测试配置文件，请首先确保其已禁用，然后单击
    `DIP Tester` 按钮。在第一个测试屏幕上，您可以转储配置文件并查看在创建步骤中创建的映射。单击 `Launch Tester` 按钮。


    `DIP Tester` 提供两种测试选项：基本和高级。基本测试将使用预配置的设置运行测试。它将运行并记录消息到 `Fusion Middleware Control`。如果您正在排查同步错误或查找失败的同步，这可能很有用。高级模式允许您配置测试设置，例如要搜索的
    `Change Number` 以及同步源目录中的特定更改。


    > **注意**

    >

    > 尽管可以使用 `manageSyncProfiles` 实用程序创建和管理同步配置文件，但建议您使用 `Fusion Middleware Control`。


    ## 启动目标目录数据


    创建同步配置文件后，在启用之前，请使用 `syncProfileBootstrap` 实用程序立即使用源目录中的数据填充目标目录。


    要使用 `syncProfileBootstrap`，首先请确保 `WLS_HOME` 和 `ORACLE_HOME` 环境变量设置为正确的值。`WLS_HOME`
    应设置为 `<Middleware Directory>/wls10.3.6`。`ORACLE_HOME` 应设置为您安装 `OID` 的目录。这通常是 `<Middleware
    Directory>/Oracle_OID`。您还应准备好 `WebLogic Admin Server` 主机和端口以及 `WLS` 密码。


    > **提示**

    >

    > 允许 `DIP` 进程执行初始填充可能需要大量时间。建议您使用 `syncProfileBootstrap` 实用程序。


    `syncProfileBootstrap` 实用程序位于 `$ORACLE_HOME/bin` 目录中。可以按如下方式运行：


    ```

    syncProfileBootstrap -h HOST -p PORT -D wlsuser {-file FILENAME |-profile -PROFILE_NAME}
    [-ssl -keystorePath PATH_TO_KEYSTORE -keystoreType TYPE] [-loadParallelism INTEGER]
    [-loadRetry INTEGER][-help]

    [oracle@clouddemolab OIDMiddleware]$ export ORACLE_HOME=/home/oracle/OIDMiddleware/Oracle_IDM1

    [oracle@clouddemolab bin]$ export WL_HOME=/home/oracle/OIDMiddleware/wlserver_10.3/

    ./syncProfileBootstrap -h localhost -p 7005 -D weblogic -pf AD2OID -lp 5

    [oracle@clouddemolab bin]$ ./syncProfileBootstrap -h localhost –p 7005 –D weblogic
    –pf AD2OID –lp 5

    [Weblogic user password]

    Connection parameters intialized.

    Connecting at localhost:7005, with userid "weblogic"..

    Connected successfully

    The bootstrap operation completed, the operation results are:

    entries read in bootstrap operation: 433

    entries filtered in bootstrap operation: 0

    entries ignored in bootstrap operation: 0

    Entries processed in bootstap operation: 346

    Entries failed in bootstrap operation: 87

    ```


    > **注意**

    >

    > 如果您从中加载数据的源目录包含大量条目，最快且最简单的目标目录启动方法是使用 `LDIF` 文件。在这种情况下，不建议使用集成配置文件进行启动，因为在读取和写入源目录和目标目录之间时可能会发生连接错误。如果
    `DN` 包含特殊字符，在使用集成配置文件启动时可能无法正确转义，此时也建议使用 `LDIF` 文件。


    ## 启用配置文件与查看状态


    目录启动后，您可以启用配置文件并允许 `OID` 与源 `Active Directory` 中的值进行同步。返回到 `Fusion Middleware
    Control` 屏幕并启用同步配置文件，如图 [5-13](#A352855_1_En_5_Chapter.html#Fig13) 所示。


    ![A352855_1_En_5_Fig13_HTML.jpg](A352855_1_En_5_Fig13_HTML.jpg)


    **图 5-13.** 启用同步配置文件


    一旦配置文件被启用，您就可以在图 [5-14](#A352855_1_En_5_Chapter.html#Fig14) 所示的 `DIP` 服务器主屏幕上查看同步配置文件的统计信息和状态。一目了然，您将看到更改数、错误数、跳过对象数、最后完成日期和上次运行状态。要查看更深入的信息，您可以查看日志消息。


    ![A352855_1_En_5_Fig14_HTML.jpg](A352855_1_En_5_Fig14_HTML.jpg)


    **图 5-14.** DIP 状态


    ## 故障排除与配置调整


    在同步过程中，单个对象可能导致进程停止。默认情况下，如果遇到错误，`DIP` 将不会继续。您可以检查 `DIP` 日志以查看导致同步停止的对象。此日志屏幕如图
    [5-15](#A352855_1_En_5_Chapter.html#Fig15) 所示。


    ![A352855_1_En_5_Fig15_HTML.jpg](A352855_1_En_5_Fig15_HTML.jpg)


    **图 5-15.** 同步配置文件日志消息


    很多时候，错误是由缺少必填属性引起的。在识别问题后，可能只需在源 `Active Directory` 帐户中修复问题即可。


    其他时候，问题可能看起来更复杂。可能创建了一个新的 `Active Directory OU` 并填充了用户。`DIP` 同步可能会尝试在创建新 `OU`
    之前创建用户，这将导致错误。


    您可以配置 `DIP` 以跳过错误并继续，防止整个过程失败。在刚才介绍的后一个例子中，这可以允许 `OU` 被创建，下一次同步将获取错过的对象。图 [5-16](#A352855_1_En_5_Chapter.html#Fig16)
    所示的“高级”选项卡可用于调整特定配置文件的 `DIP` 选项。


    ![A352855_1_En_5_Fig16_HTML.jpg](A352855_1_En_5_Fig16_HTML.jpg)


    **图 5-16.** 设置“跳过错误以同步下一个更改”参数


    另一个故障排除选项是编辑配置文件排除规则。此选项允许您配置同步以在对象不符合特定条件时跳过它们。如果您的环境包含许多您不希望同步的 `LDAP` 对象，您可能会发现此功能很有用。使用图
    [5-17](#A352855_1_En_5_Chapter.html#Fig17) 所示的“映射”选项卡添加或编辑排除规则。


    ![A352855_1_En_5_Fig17_HTML.jpg](A352855_1_En_5_Fig17_HTML.jpg)


    **图 5-17.** 编辑域排除规则和筛选


    如果 `DIP` 服务器已关闭，或者您需要运行同步以捕获因错误而错过的信息，您可能需要使用更早的更改编号运行该过程。选择“编辑并保留”复选框并更新“最后更改编号”字段。这样做将允许
    `DIP` 进程运行自输入的新“最后更改编号”以来的所有更改。您需要查询源目录以获取您希望返回到的更改编号。同样，可以使用“高级”选项卡来完成此操作。图 [5-18](#A352855_1_En_5_Chapter.html#Fig18)
    显示了修改此字段所必需的“编辑并保留”复选框。


    ![A352855_1_En_5_Fig18_HTML.jpg](A352855_1_En_5_Fig18_HTML.jpg)


    **图 5-18.** 编辑同步配置文件


    ## 总结


    在本章结束时，您应该拥有一个完全同步的 `OID`。根据配置的属性映射规则，此目录中存储的数据应与您的 `Active Directory` 源匹配。使用本章内容，您应该能够编辑用户属性映射并对配置文件进行故障排除。'
  raw: 'After you create a profile, it will be listed on the Manage Synchronization
    Profiles screen seen in Figure [5-12](#A352855_1_En_5_Chapter.html#Fig12). Here
    you can enable, disable, edit, delete, and test your profiles as needed. As an
    administrator, you can create as many profiles as necessary for your requirements.
    Editing a profile will return you to the pages previously presented.


    ![A352855_1_En_5_Fig12_HTML.jpg](A352855_1_En_5_Fig12_HTML.jpg)


    Figure 5-12.


    Synchronization profile created


    It is recommended that you test a profile prior to enabling it. Only disabled
    profiles can be tested using the DIP Tester. It should also be noted that only
    LDAP source to LDAP destination profiles can be tested using this method. To test
    a profile, first ensure it is disabled and click the DIP Tester button. On the
    first test screen, you can dump the profile and see the mappings created during
    the creation step. Click the Launch Tester button.


    The DIP Tester provides two options for testing; Basic and Advanced. Basic will
    run the test using preconfigured settings. It will run and log messages to the
    Fusion Middleware Control. This can be useful if you are troubleshooting a synchronization
    error or looking for a failed synchronization. The Advanced mode allows you to
    configure the test settings such as Change Number to search for and synchronize
    a specific change in the source directory.


    Note


    Although it is possible to create and manage synchronization profiles using the
    `manageSyncProfiles` utility, it is recommended that you use the Fusion Middleware
    Control.


    After creating a synchronization profile and prior to enabling it, use the `syncProfileBootstrap`
    utility to immediately populate the destination directory with data from the source.


    To use `syncProfileBootstrap`, first make sure that the `WLS_HOME` and `ORACLE_HOME`
    environment variables are set to the proper values. `WLS_HOME` should be set to
    the `<Middleware Directory>/wls10.3.6\. ORACLE_HOME` should be set to the directory
    where you installed OID. This is typically `<Middleware Directory>/Oracle_OID`.
    You should also be prepared with the WebLogic Admin Server host and port along
    with the WLS password.


    Tip


    Allowing the DIP process to perform the initial population can take a large amount
    of time. It is recommended that you use the `syncProfileBootstrap` utility.


    The `syncProfileBootstrap` utility is located in the `$ORACLE_HOME/bin` directory.
    It can be run as follows:


    ```

    syncProfileBootstrap -h HOST -p PORT -D wlsuser {-file FILENAME |-profile -PROFILE_NAME}
    [-ssl -keystorePath PATH_TO_KEYSTORE -keystoreType TYPE] [-loadParallelism INTEGER]
    [-loadRetry INTEGER][-help]

    [oracle@clouddemolab OIDMiddleware]$ export ORACLE_HOME=/home/oracle/OIDMiddleware/Oracle_IDM1

    [oracle@clouddemolab bin]$ export WL_HOME=/home/oracle/OIDMiddleware/wlserver_10.3/

    ./syncProfileBootstrap -h localhost -p 7005 -D weblogic -pf AD2OID -lp 5

    [oracle@clouddemolab bin]$ ./syncProfileBootstrap -h localhost –p 7005 –D weblogic
    –pf AD2OID –lp 5

    [Weblogic user password]

    Connection parameters intialized.

    Connecting at localhost:7005, with userid "weblogic"..

    Connected successfully

    The bootstrap operation completed, the operation results are:

    entries read in bootstrap operation: 433

    entries filtered in bootstrap operation: 0

    entries ignored in bootstrap operation: 0

    Entries processed in bootstap operation: 346

    Entries failed in bootstrap operation: 87

    ```


    Note


    If the source directory from which you are loading data contains a large number
    of entries, the quickest and easiest method to bootstrap the target directory
    is by using an LDIF file. Bootstrapping with an integration profile is not recommended
    in this case because connection errors could occur when reading and writing between
    the source and target directories. Using an LDIF file is also recommended if the
    DNs contain special characters, which might not be escaped properly when bootstrapping
    with an integration profile.


    After the directory has been bootstrapped, you can enable the profile and allow
    OID to be synchronized with values from the source Active Directory. Return to
    the Fusion Middleware Control screens and enable the synchronization profile as
    shown in Figure [5-13](#A352855_1_En_5_Chapter.html#Fig13).


    ![A352855_1_En_5_Fig13_HTML.jpg](A352855_1_En_5_Fig13_HTML.jpg)


    Figure 5-13.


    Enabling a synchronization profile


    Once a profile has been enabled, you are able to view the statistics and status
    of the synchronization profile on the DIP server home screen shown in Figure [5-14](#A352855_1_En_5_Chapter.html#Fig14).
    At a glance, you will see the number of changes, number of errors, number of skipped
    objects, last completed date, and the last run status. To view more in-depth information,
    you can view log messages.


    ![A352855_1_En_5_Fig14_HTML.jpg](A352855_1_En_5_Fig14_HTML.jpg)


    Figure 5-14.


    DIP status


    During the synchronization process, it is possible that a single object can cause
    the process to stop. By default, DIP will not continue if it encounters an error.
    You can check the DIP logs to view the object that caused the synchronization
    to stop. This log screen is shown in Figure [5-15](#A352855_1_En_5_Chapter.html#Fig15).


    ![A352855_1_En_5_Fig15_HTML.jpg](A352855_1_En_5_Fig15_HTML.jpg)


    Figure 5-15.


    Synchronization profile log messages


    Many times, errors are caused by missing mandatory attributes. After identifying
    the problem, it might be as simple as fixing the problem in the source Active
    Directory account.


    Other times, the problem might seem more complex. It is possible that a new Active
    Directory OU was created and populated with users. The DIP synchronization might
    try to create the users prior to the new OU, which will result in an error.


    You can configure DIP to skip errors and continue to prevent the overall process
    from failing. In the latter example just presented, this can allow the OU to get
    created and the next synchronization will pick up the missed objects. The Advanced
    tab shown in Figure [5-16](#A352855_1_En_5_Chapter.html#Fig16) can be used to
    tweak DIP options for a particular profile.


    ![A352855_1_En_5_Fig16_HTML.jpg](A352855_1_En_5_Fig16_HTML.jpg)


    Figure 5-16.


    Setting the Skip Error To Sync Next Change parameter


    Another troubleshooting option is to edit the profile exclusion rules. This option
    allows you to configure the synchronization to skip objects if they do not meet
    a certain criteria. You might find this useful if your environment contains a
    number of LDAP objects that you do not wish to synchronize. Use the Mapping tab
    shown in Figure [5-17](#A352855_1_En_5_Chapter.html#Fig17) to add or edit exclusion
    rules.


    ![A352855_1_En_5_Fig17_HTML.jpg](A352855_1_En_5_Fig17_HTML.jpg)


    Figure 5-17.


    Edit domain exclusion rules and filtering


    If the DIP server has been down or you need to run the sync to catch information
    that was missed due to error, you might need to run the process with an earlier
    change number. Select the Edit and Persist check box and update the Last Change
    Number field. Doing this will allow the DIP process to run all changes since the
    new Last Change Number entered. You will need to query the source directory to
    get the change number to which you wish to return. Again the Advanced tab can
    be used for this. Figure [5-18](#A352855_1_En_5_Chapter.html#Fig18) shows the
    Edit and Persist check box necessary for modifying this field.


    ![A352855_1_En_5_Fig18_HTML.jpg](A352855_1_En_5_Fig18_HTML.jpg)


    Figure 5-18.


    Editing synchronization profile


    At the end of this chapter, you should have a fully synchronized OID. The data
    stored in this directory should match your Active Directory source according to
    the attribute mapping rules configured. Using this chapter, you should be able
    to edit user attribute mappings and troubleshoot profiles.'
  trans: '

    ## 创建与管理同步配置文件


    创建配置文件后，它将列在图 5-12 所示的“管理同步配置文件”屏幕上。您可以根据需要在此处启用、禁用、编辑、删除和测试您的配置文件。作为管理员，您可以根据需求创建任意多的配置文件。编辑配置文件将使您返回到之前呈现的页面。


    ![A352855_1_En_5_Fig12_HTML.jpg](img/A352855_1_En_5_Fig12_HTML.jpg)


    **图 5-12.** 创建的同步配置文件


    建议在启用配置文件之前对其进行测试。只有禁用的配置文件才能使用 `DIP Tester` 进行测试。还应注意，只有从 `LDAP` 源到 `LDAP` 目标的配置文件才能使用此方法进行测试。要测试配置文件，请首先确保其已禁用，然后单击
    `DIP Tester` 按钮。在第一个测试屏幕上，您可以转储配置文件并查看在创建步骤中创建的映射。单击 `Launch Tester` 按钮。


    `DIP Tester` 提供两种测试选项：基本和高级。基本测试将使用预配置的设置运行测试。它将运行并记录消息到 `Fusion Middleware Control`。如果您正在排查同步错误或查找失败的同步，这可能很有用。高级模式允许您配置测试设置，例如要搜索的
    `Change Number` 以及同步源目录中的特定更改。


    > **注意**

    >

    > 尽管可以使用 `manageSyncProfiles` 实用程序创建和管理同步配置文件，但建议您使用 `Fusion Middleware Control`。


    ## 启动目标目录数据


    创建同步配置文件后，在启用之前，请使用 `syncProfileBootstrap` 实用程序立即使用源目录中的数据填充目标目录。


    要使用 `syncProfileBootstrap`，首先请确保 `WLS_HOME` 和 `ORACLE_HOME` 环境变量设置为正确的值。`WLS_HOME`
    应设置为 `<Middleware Directory>/wls10.3.6`。`ORACLE_HOME` 应设置为您安装 `OID` 的目录。这通常是 `<Middleware
    Directory>/Oracle_OID`。您还应准备好 `WebLogic Admin Server` 主机和端口以及 `WLS` 密码。


    > **提示**

    >

    > 允许 `DIP` 进程执行初始填充可能需要大量时间。建议您使用 `syncProfileBootstrap` 实用程序。


    `syncProfileBootstrap` 实用程序位于 `$ORACLE_HOME/bin` 目录中。可以按如下方式运行：


    ```

    syncProfileBootstrap -h HOST -p PORT -D wlsuser {-file FILENAME |-profile -PROFILE_NAME}
    [-ssl -keystorePath PATH_TO_KEYSTORE -keystoreType TYPE] [-loadParallelism INTEGER]
    [-loadRetry INTEGER][-help]

    [oracle@clouddemolab OIDMiddleware]$ export ORACLE_HOME=/home/oracle/OIDMiddleware/Oracle_IDM1

    [oracle@clouddemolab bin]$ export WL_HOME=/home/oracle/OIDMiddleware/wlserver_10.3/

    ./syncProfileBootstrap -h localhost -p 7005 -D weblogic -pf AD2OID -lp 5

    [oracle@clouddemolab bin]$ ./syncProfileBootstrap -h localhost –p 7005 –D weblogic
    –pf AD2OID –lp 5

    [Weblogic user password]

    Connection parameters intialized.

    Connecting at localhost:7005, with userid "weblogic"..

    Connected successfully

    The bootstrap operation completed, the operation results are:

    entries read in bootstrap operation: 433

    entries filtered in bootstrap operation: 0

    entries ignored in bootstrap operation: 0

    Entries processed in bootstap operation: 346

    Entries failed in bootstrap operation: 87

    ```


    > **注意**

    >

    > 如果您从中加载数据的源目录包含大量条目，最快且最简单的目标目录启动方法是使用 `LDIF` 文件。在这种情况下，不建议使用集成配置文件进行启动，因为在读取和写入源目录和目标目录之间时可能会发生连接错误。如果
    `DN` 包含特殊字符，在使用集成配置文件启动时可能无法正确转义，此时也建议使用 `LDIF` 文件。


    ## 启用配置文件与查看状态


    目录启动后，您可以启用配置文件并允许 `OID` 与源 `Active Directory` 中的值进行同步。返回到 `Fusion Middleware
    Control` 屏幕并启用同步配置文件，如图 5-13 所示。


    ![A352855_1_En_5_Fig13_HTML.jpg](img/A352855_1_En_5_Fig13_HTML.jpg)


    **图 5-13.** 启用同步配置文件


    一旦配置文件被启用，您就可以在图 5-14 所示的 `DIP` 服务器主屏幕上查看同步配置文件的统计信息和状态。一目了然，您将看到更改数、错误数、跳过对象数、最后完成日期和上次运行状态。要查看更深入的信息，您可以查看日志消息。


    ![A352855_1_En_5_Fig14_HTML.jpg](img/A352855_1_En_5_Fig14_HTML.jpg)


    **图 5-14.** DIP 状态


    ## 故障排除与配置调整


    在同步过程中，单个对象可能导致进程停止。默认情况下，如果遇到错误，`DIP` 将不会继续。您可以检查 `DIP` 日志以查看导致同步停止的对象。此日志屏幕如图
    5-15 所示。


    ![A352855_1_En_5_Fig15_HTML.jpg](img/A352855_1_En_5_Fig15_HTML.jpg)


    **图 5-15.** 同步配置文件日志消息


    很多时候，错误是由缺少必填属性引起的。在识别问题后，可能只需在源 `Active Directory` 帐户中修复问题即可。


    其他时候，问题可能看起来更复杂。可能创建了一个新的 `Active Directory OU` 并填充了用户。`DIP` 同步可能会尝试在创建新 `OU`
    之前创建用户，这将导致错误。


    您可以配置 `DIP` 以跳过错误并继续，防止整个过程失败。在刚才介绍的后一个例子中，这可以允许 `OU` 被创建，下一次同步将获取错过的对象。图 5-16
    所示的“高级”选项卡可用于调整特定配置文件的 `DIP` 选项。


    ![A352855_1_En_5_Fig16_HTML.jpg](img/A352855_1_En_5_Fig16_HTML.jpg)


    **图 5-16.** 设置“跳过错误以同步下一个更改”参数


    另一个故障排除选项是编辑配置文件排除规则。此选项允许您配置同步以在对象不符合特定条件时跳过它们。如果您的环境包含许多您不希望同步的 `LDAP` 对象，您可能会发现此功能很有用。使用图
    5-17 所示的“映射”选项卡添加或编辑排除规则。


    ![A352855_1_En_5_Fig17_HTML.jpg](img/A352855_1_En_5_Fig17_HTML.jpg)


    **图 5-17.** 编辑域排除规则和筛选


    如果 `DIP` 服务器已关闭，或者您需要运行同步以捕获因错误而错过的信息，您可能需要使用更早的更改编号运行该过程。选择“编辑并保留”复选框并更新“最后更改编号”字段。这样做将允许
    `DIP` 进程运行自输入的新“最后更改编号”以来的所有更改。您需要查询源目录以获取您希望返回到的更改编号。同样，可以使用“高级”选项卡来完成此操作。图 5-18
    显示了修改此字段所必需的“编辑并保留”复选框。


    ![A352855_1_En_5_Fig18_HTML.jpg](img/A352855_1_En_5_Fig18_HTML.jpg)


    **图 5-18.** 编辑同步配置文件


    ## 总结


    在本章结束时，您应该拥有一个完全同步的 `OID`。根据配置的属性映射规则，此目录中存储的数据应与您的 `Active Directory` 源匹配。使用本章内容，您应该能够编辑用户属性映射并对配置文件进行故障排除。

    '
- fmt: '# 6. Oracle Access Manager Installation


    ## Summary


    Many organizations have a need to keep identity directories in sync with each
    other. Perhaps OID is used as the application authentication directory and Active
    Directory is used by the network for authentication. Users must be in both places
    to access network resources and their requred applications. The DIP provides a
    mechanism to replicate data stored in one source to be replicated to the other.
    Although this could be accomplished manually, the DIP is an automated process
    that is provided by Oracle. Using the information in this chapter will assist
    you in creating the necessary components to keep disparate identity stores synchronized.


    Oracle Internet Directory (OID) has been installed, and is populated with users
    from Active Directory. You have configured a synchronization process to ensure
    account information changes in Active Directory are populated to OID. The benefit
    to this is that all applications that use OID for authentication and role information
    continually have the latest user information. Fusion Middleware applications and
    other Lightweight Directory Access Protocol (LDAP) compatible applications can
    be configured to authenticate using OID. However, many organizations wish to build
    on this capability by providing a single sign-on (SSO) environment. Oracle introduced
    Oracle Access Manager (OAM) to give organizations exactly this ability. This chapter
    covers how to install the OAM tools in preparation for implementing SSO for the
    EBS and WebCenter environments.


    In a previous chapter, OID was installed and configured. If OID is not already
    present in your environment, or has not been validated, refer to Chapter 4 for
    instructions.


    ## Preinstallation Tasks


    ### Operating System Users


    For most Oracle application installs, operating system (OS) users and groups should
    be created to perform the installation and configuration tasks. Creating OS groups
    will allow other OS users to perform certain tasks related to the management of
    the application environment. The most common OS users and groups related to installing
    Oracle applications in Linux environments are the `oracle` user and `oinstall`
    or `dba` groups.


    To create the necessary `oinstall` and `dba` groups, perform the following commands
    as the root directory:


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd osdba

    ```


    After the groups are created, create the `oracle` user.


    ```

    [root@clouddemolab home]# useradd  -g oinstall -G osdba oracle

    ```


    Note


    -g indicates the primary group to which the user should be added. -G indicates
    any secondary groups.


    To set the password for the user, use the following command as the root user:


    ```

    [root@clouddemolab home]# passwd oracle

    ```


    ### Operating System Configuration


    Prior to installing the Oracle Fusion Middleware infrastructure and Oracle Identity
    Management software, it is important to ensure the OS meets the minimum requirements
    and configuration. The following presents the kernel parameters and packages and
    the file changes that are required.


    The following kernel parameters need to be set:


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    To set these parameters, edit the `sysctl.conf` file located in the `/etc` directory.


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    Add or edit the following lines in this section of the file:


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    After setting these values in the `sysctl.conf` file, you must activate and verify
    the new values are shown using this command:


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    The open file limits must be set to 4096 to support the instance. To do so, edit
    the `limits.conf` file:


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    If the environment is to be installed on Oracle Linux or RedHat Linux, you must
    perform the edit in `/etc/security/limits.d/90-nproc.conf` as well. If this is
    missed, the values in this file could override the values in the `limits.conf`
    file.


    In both of the files listed, ensure the following lines are added or edited:


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    After editing this file, the server must be rebooted to ensure all the changes
    take effect.


    ### Operating System Packages


    Each Oracle application has its own set of required packages. Depending on the
    version of Linux you are using, the installation procedure might be different.
    In the following list, you should note that some packages require both 32-bit
    and 64-bit versions to be installed on a 64-bit OS . If these packages are not
    installed, the installation will not complete properly. The Oracle Installer will
    check these and display errors during the installation.


    ```

    binutils-2.20.51.0.2-5.28.el6

    compat-libcap1-1.10-1

    compat-libstdc++-33-3.2.3-69.el6 for x86_64

    compat-libstdc++-33-3.2.3-69.el6 for i686

    gcc-4.4.4-13.el6 gcc-c++-4.4.4-13.el6

    glibc-2.12-1.7.el6 for x86_64

    glibc-2.12-1.7.el6 for i686

    glibc-devel-2.12-1.7.el6 for i686

    libaio-0.3.107-10.el6

    libaio-devel-0.3.107-10.el6

    libgcc-4.4.4-13.el6

    libstdc++-4.4.4-13.el6 for x86_64

    libstdc++-4.4.4-13.el6 for i686

    libstdc++-devel-4.4.4-13.el6

    libXext for i686

    libXtst for i686

    libXext for x86_64

    libXtst for x86_64

    openmotif-2.2.3 for x86_64

    openmotif22-2.2.3 for x86_64

    redhat-lsb-core-4.0-7.el6 for x86_64

    sysstat-9.0.4-11.el6

    xorg-x11-utils*

    xorg-x11-apps*

    xorg-x11-xinit*

    xorg-x11-server-Xorg*

    xterm

    pdksh-5.2.14

    ```


    At this point in the procedure, the OS should be fully prepared for the installation
    to proceed. Performing the preceding operations prior to installing the software
    will ensure a problem-free installation. In many cases, the installer will provide
    detailed messages if anything was missed. In the event of errors during the installation
    process, stop the installation and fix any problems before proceeding.'
