    \ deployment as the authentication service provider.\n\n## Configure Centralized\
    \ Logout\n\nYou might recall that OAM acts as a credential collection agent and\
    \ authenticates the user against the configured identity store, in this case OID.\
    \ When a user logs in to a protected resource, OAM creates the required sessions\
    \ and cookies necessary to ensure a seamless transition to other protected resources\
    \ and provides the SSO environment. During the logout process, OAM cleans up its\
    \ own session information. However, it does not clean up partner application sessions.\
    \ Thus, a user might be logged out of OAM, but the Oracle EBS session cookies\
    \ might remain until the browser is completely closed. The AccessGate software\
    \ installation provides the files necessary to ensure the EBS session information\
    \ is cleaned up during a logout operation for increased security. Configuring\
    \ a centralized logout will ensure the cleanup is performed and EBS sessions are\
    \ eliminated when a user logs out of the SSO application.\n\n### Configure the\
    \ Cleanup File for Logout\n\nWhen you extracted the EBS AccessGate zip file, you\
    \ were provided a file called `oacleanup.html`. During the deployment, you copied\
    \ this file to the `/public` subdirectory within the OHS `htdocs` directory. Locate\
    \ the file and use a text editor to update the context root as needed to ensure\
    \ the script is called properly.\n\nFind the following line within `oacleanup.html`:\n\
    \n```\n\nUpdate the entry by replacing `<CONTEXT_ROOT>`\nwith the name of the\
    \ resource configured in OAM. This should match the\nname of the managed server;\
    \ for example,\n\n```\n\nConfigure Additional Logout Callbacks\n\nSome environments\
    \ might have multiple EBS AccessGate instances or\nadditional applications for\
    \ which you might wish to perform a session\ncleanup after logout. If this is\
    \ the case, you can add a callback for\neach additional AccessGate or custom application\
    \ as follows. Search the\n`oacleanup.html`\nfile for the following line:\n\n```\n\
    function doLoad()\n```\n\nAdd the callback for additional applications.\n\n```\n\
    logoutHandler.addCallback('//ssologout_callback');\nlogoutHandler.addCallback('http://webgatehost2.example.com:7777/\
    \ /ssologout_callback');\n```\n\nDuring the logout process, this ensures that\
    \ the AccessGate calls the\ncleanup process to destroy Oracle EBS sessions. The\
    \ OAM centralized\nlogout should also include the cleanup for other partner applications\n\
    protected by the OAM configuration.\n\nIn this example, the Oracle 11g WebGate\
    \ has been used. As such, the 11g\nWebGate Logout Callback URL can be leveraged\
    \ for a centralized logout\nprocess. Use the OAM Console Administration screens\
    \ to set the URL for\nLogout Callback.\n\nIn the OAM Administration Console, click\
    \ the System Configuration tab.\nIn the Access Manager section, click the SSO\
    \ Agents node and then select\nOAM Agents. Click Search and select the SSO agent\
    \ created previously.\nFigure [15-2](#A352855_1_En_15_Chapter.html#Fig2) shows\
    \ the\nconfiguration parameters that are used when setting up the SSO Agent\n\
    Webgate.\n\n![A352855_1_En_15_Fig2_HTML.jpg](A352855_1_En_15_Fig2_HTML.jpg)\n\n\
    Figure 15-2.\n\nLogout Callback URL configuration\n\nSet the value of the Logout\
    \ Callback URL to `http://<ebshost>.<domain>:<port>/OA_HTML/AppsLogout`.\n\nThis\
    \ concludes the configuration of the OAM and AccessGate centralized\nlogout process.\n\
    \nEBS Profile Configuration\n\nAfter configuring the Oracle EBS AccessGate application\
    \ and OAM\nresources, it is necessary to set up the login profiles within the\n\
    actual EBS environment. Set the Oracle EBS profile options in Table\n[15-5](#A352855_1_En_15_Chapter.html#Tab5),\
    \ or have the\nEBS administrator set them.\n\nTable 15-5.\n\nEBS Profile Configuration\
    \ Parameters\n\nProfile\n |\n  Level\n |\n  Value\n |\n\n| --- | --- | --- | ---\
    \ | --- | --- | --- |\n\nApplication Authenticate Agent (APPS_AUTH_AGENT)\n |\n\
    \  Site\n |\n  `http://<webgatehost>:<port>/ebsauth_dev/`\n |\n\nApplications\
    \ SSO Type (APPS_SSO)\n |\n  Site\n |\n  `SSWA w/SSO`\n |\n\nApplications Single\
    \ Sign On Hint Cookie (APPS_SSO_HINT_COOKIE_NAME)\n |\n  Site\n |\n  `<blank>\
    \ (null)`\n\nThis should be null; if there is a value such as `ORASSO_AUTH_HINT`,\n\
    remove it.\n |\n\nRestart the applications services on your Oracle EBS middle\
    \ tier, and\nthen restart Oracle EBS AccessGate deployment WLS and managed servers.\n\
    \nTest E-Business Suite Single Sign-On\n\nNow that all of the necessary components\
    \ have been deployed and\nconfigured, and you have set up the Oracle EBS profiles\
    \ for SSO, you can\ntest the overall environment. Previously, you have set up\
    \ a test URL for\nensuring that the proper authentication mechanisms were in place.\
    \ For\nthis step, you will attempt to log in to the Oracle EBS system and\nsubsequently\
    \ log in to another protected resource. If everything is\nworking, you should\
    \ only be prompted one time for authentication within\nthe browser session. Additional\
    \ requests to protected resources should\nuse the existing session information\
    \ and cookies. On logout, all session\ninformation should be cleaned up and subsequent\
    \ requests will be\nprompted for authentication. Use a browser to navigate to\
    \ the EBS login."
