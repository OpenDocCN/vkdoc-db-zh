  trans: '## 面向服务的架构安装


    OIM 需要 Oracle 面向服务的架构（SOA）才能正常运行。此安装独立于 OIM 进程，但可以安装在同一个 WebLogic 主目录中。SOA 安装完成后，您可以同时安装
    OIM 并为这两个产品配置域。这是针对这两个产品的推荐流程。


    与许多其他 Fusion Middleware 产品类似，SOA 安装工具是通过 `runInstaller` 命令来启动 Oracle 通用安装程序的。该工具位于安装介质的
    Disk 1 上。运行该工具时，您必须指明 Java 运行时环境（JRE）的位置。具体操作如图 7-9 所示。


    ![A352855_1_En_7_Fig9_HTML.jpg](img/A352855_1_En_7_Fig9_HTML.jpg)

    图 7-9. 启动通用安装程序


    ```

    runInstaller -jreLoc /home/oracle/jdk1.6.0_45/jre

    ```


    OIM 需要 SOA 11.1.1.9。将使用此工具安装此版本。启动屏幕会显示与计划安装相关的信息，并提醒运行 RCU。与通用安装程序的其他版本类似，Oracle
    会检查操作系统以确保其满足最低要求。已完成的先决条件检查如图 7-10 所示。


    ![A352855_1_En_7_Fig10_HTML.jpg](img/A352855_1_En_7_Fig10_HTML.jpg)

    图 7-10. 先决条件检查屏幕


    与 OAM 一样，SOA 也有自己的一套必需的操作系统软件包、内核参数、内存和存储空间要求。在继续安装之前，必须满足这些要求。尽管其中许多要求与访问管理器（Access
    Manager）的安装相同，但查阅本章开头部分查看这些要求仍然很重要。


    ### 注意


    先决条件失败项将在通用安装程序屏幕上以红色 X 显示。您可以以 root 身份登录并打开终端窗口来纠正任何问题，然后重试先决条件检查，直到所有问题都得到解决。


    在下一步中，您必须为此安装选择中间件主目录（Middleware Home）位置。由于此环境为每个访问管理器和身份管理器（Identity Manager）分别配备了独立的
    WLS，因此将 SOA 安装在正确的中间件主目录中至关重要。在此情况下，身份管理器将安装在 `IDMMiddleware` 目录中。更多详情请参见图 7-11。


    ![A352855_1_En_7_Fig11_HTML.jpg](img/A352855_1_En_7_Fig11_HTML.jpg)

    图 7-11. 指定安装位置屏幕


    Oracle SOA 可以安装在 WLS 或 WebSphere 服务器上。本书侧重于 WLS 安装类型。如图 7-12 所示，选择 WebLogic 服务器，然后继续下一步。


    ![A352855_1_En_7_Fig12_HTML.jpg](img/A352855_1_En_7_Fig12_HTML.jpg)

    图 7-12. 选择应用服务器类型


    图 7-13 所示的安装摘要屏幕，显示了在安装程序各屏幕中所做选择的摘要。确认选择后，点击“安装”开始安装。


    ![A352855_1_En_7_Fig13_HTML.jpg](img/A352855_1_En_7_Fig13_HTML.jpg)

    图 7-13. 安装摘要屏幕


    实际安装过程可能需要大约 10 分钟。图 7-14 所示的进度屏幕会让您了解当前状态。如果进度似乎暂停了一会儿，请不要惊慌。


    ![A352855_1_En_7_Fig14_HTML.jpg](img/A352855_1_En_7_Fig14_HTML.jpg)

    图 7-14. 安装进度屏幕


    安装程序完成必要文件的复制和文件系统的创建后，将显示图 7-15 所示的安装完成屏幕。此屏幕包含与您的新环境直接相关的详细信息。记下内容以备将来参考可能很有用。此时，您可以点击“完成”并退出安装程序。


    ![A352855_1_En_7_Fig15_HTML.jpg](img/A352855_1_En_7_Fig15_HTML.jpg)

    图 7-15. 安装完成屏幕


    至此，所需的 Oracle SOA 套件实例已安装完成。在配置 OIM 域时，配置向导将设置 SOA 的必要组件。如您所记得的，此 SOA 实例与身份管理器安装在同一个中间件主目录中。下一节将介绍
    OIM 安装。


    ## 身份管理器安装


    WLS 和 SOA 软件已经安装完毕。现在是安装身份管理器软件的时候了。同样，此过程是使用安装介质 Disk 1 上的 `runInstaller` 脚本启动的。与
    SOA 安装一样，您必须指明 Java 运行时环境（JRE）的位置，安装程序才能正常运行。图 7-16 显示了通用安装程序。


    ![A352855_1_En_7_Fig16_HTML.jpg](img/A352855_1_En_7_Fig16_HTML.jpg)

    图 7-16. 安装欢迎屏幕


    ```

    ./runInstaller.sh -jreLoc /home/oracle/jdk1.6.0_45/jre

    ```


    第一个屏幕显示有关要安装的软件的重要信息。确保显示的版本符合您的要求以及先前运行的 RCU 版本。


    与 OAM 一样，OIM 也有自己的一套必需的操作系统软件包、内核参数、内存和存储空间要求。在继续安装之前，必须满足这些要求。如图 7-17 所示，安装程序在允许进程继续之前会检查这些内容。尽管其中许多要求与
    OAM 安装相同，但查阅本章开头部分查看这些要求仍然很重要。


    ![A352855_1_En_7_Fig17_HTML.jpg](img/A352855_1_En_7_Fig17_HTML.jpg)

    图 7-17. 先决条件检查屏幕


    在“指定安装位置”屏幕上，您必须选择一个中间件主目录来存放安装文件。图 7-18 提供了关于此入口点的详细信息。此位置必须是已安装 WLS 的目录。由于此物理主机托管了两个
    WLS 实例，请确保选择当前未用于 OAM 的位置。选择的主目录应与您上一步为 SOA 选择的位置相同。


    ![A352855_1_En_7_Fig18_HTML.jpg](img/A352855_1_En_7_Fig18_HTML.jpg)

    图 7-18. 指定安装位置屏幕


    此时，通用安装程序将开始将文件复制到新位置。图 7-19 所示的进度屏幕将显示当前操作和进度。


    ![A352855_1_En_7_Fig19_HTML.jpg](img/A352855_1_En_7_Fig19_HTML.jpg)

    图 7-19. 安装进度屏幕


    软件文件的实际安装通常在大约 10 分钟内完成。在此期间，您可以在进度屏幕上看到实际操作，该屏幕还会显示安装日志文件的位置。您可以监控此日志以查看是否有任何错误。完成后，您可以关闭安装程序，因为所有安装操作都已完成。在接下来的章节中，您将配置
    OIM 域。'
- fmt: '## Configure Identity Manager Domain


    After the necessary software components have been installed, you can continue
    to configure the WebLogic domain to support OIM. This process is started by running
    the `` `config` `` script located in the `` `IDM_HOME/common/bin` `` directory.
    It is important to note that you are only configuring the WebLogic domain at this
    time. OIM will not be ready to run.


    To avoid confusion for the rest of this chapter, the following conventions are
    used. `` `MIDDLEWARE_HOME` `` is the base directory where WLS was installed. ``
    `IDM_HOME` `` is the directory within the WLS installation where OIM is installed.
    This is usually a directory called `` `Oracle_IDM1` ``. Figure [7-20](#A352855_1_En_7_Chapter.html#Fig20)
    shows the Configuration Wizard.


    ![A352855_1_En_7_Fig20_HTML.jpg](A352855_1_En_7_Fig20_HTML.jpg)


    Figure 7-20. Create a new WebLogic domain


    **Note**

    There are multiple instances of the `` `config.sh` `` script that can be found
    within the Middleware Home subdirectories. It is very important to run the correct
    version found within `` `<MIDDLEWARE_HOME/Oracle_IDM1/common/bin.` ``


    Because this is the first time a domain is being created within the WLS environment,
    choose `` `Create a New WebLogic Domain` ``.


    During the next step of the process, select the OIM component. As seen in Figure
    [7-21](#A352855_1_En_7_Chapter.html#Fig21), this list is based on the software
    found within the WebLogic Home directory. You will notice that Oracle SOA Suite
    is automatically selected. If SOA Suite is not found within the WLS Home, you
    will be shown an error indicating this. Before continuing, ensure that any missing
    software is installed.


    ![A352855_1_En_7_Fig21_HTML.jpg](A352855_1_En_7_Fig21_HTML.jpg)


    Figure 7-21. Select domain components


    During the configuration, you are prompted for the name of the domain you wish
    to create. You can keep the default name of `` `"base_domain"` `` or you can name
    it something that makes sense in your environment. See Figure [7-22](#A352855_1_En_7_Chapter.html#Fig22)
    for an example. In some cases, it might be desirable to locate the associated
    files separate from the Middleware Home directory. This is often done for clustered
    environments that require shared storage across the physical hosts.


    ![A352855_1_En_7_Fig22_HTML.jpg](A352855_1_En_7_Fig22_HTML.jpg)


    Figure 7-22. Enter domain name and location


    The user password for `` `weblogic` `` should be set to something standard for
    your environment. This password will be used for starting and stopping managed
    servers as well as logging into the WebLogic Admin Console and Fusion Middleware
    Control. Figure [7-23](#A352855_1_En_7_Chapter.html#Fig23) shows what the password
    configuration screen looks like.


    ![A352855_1_En_7_Fig23_HTML.jpg](A352855_1_En_7_Fig23_HTML.jpg)


    Figure 7-23. Administrator password


    The `` `Startup Mode` `` determines how the managed servers are started. In ``
    `Development Mode` ``, the managed servers can be started and stopped from the
    command line without a password. Also configuration changes can be made and activated
    within the WebLogic Console without locking the environment. Configuring the ``
    `Startup Mode` `` to `` `Production Mode` `` locks the environment down to ensure
    no changes are made without locking the console for edits. Command-line tools
    will also require a password. These choices are shown in Figure [7-24](#A352855_1_En_7_Chapter.html#Fig24).


    ![A352855_1_En_7_Fig24_HTML.jpg](A352855_1_En_7_Fig24_HTML.jpg)


    Figure 7-24. Server Start Mode


    **Note**

    Locking the Administration Console prevents multiple administrators from making
    changes and overwriting each other.


    After the Java database connectivity (JDBC ) connection details are entered, the
    information is validated by the configuration tool. Any errors will be shown.
    If a schema was not able to be validated, revisit the previous step to ensure
    the schema name and details are correct. If the database schema does not exist,
    rerun the RCU to create it. Figure [7-25](#A352855_1_En_7_Chapter.html#Fig25)
    shows a completed database check.


    ![A352855_1_En_7_Fig25_HTML.jpg](A352855_1_En_7_Fig25_HTML.jpg)


    Figure 7-25. Database schema check


    As discussed in the AOM installation chapter, the example used in this book utilizes
    a split domain. As such, each component (OID, OAM, and OIM) will have its own
    Administration server. As shown in Figure [7-26](#A352855_1_En_7_Chapter.html#Fig26),
    select `` `Administration Server` ``, `` `Managed Servers` ``, `` `Clusters` ``
    and `` `Machines` ``.


    ![A352855_1_En_7_Fig26_HTML.jpg](A352855_1_En_7_Fig26_HTML.jpg)


    Figure 7-26. Select Optional Configuration screen


    The default port for the Administration server is `` `7001` ``, which was used
    in the previous chapter for the Access Manager Administration listen port. Using
    a standard port convention will help eliminate confusion or forgotten ports. For
    this exercise, use Port `` `7101` `` as seen in Figure [7-27](#A352855_1_En_7_Chapter.html#Fig27).
    Subsequently, if more WLS instances are installed, use Ports `` `7201` ``, ``
    `7301` ``, and so on.


    ![A352855_1_En_7_Fig27_HTML.jpg](A352855_1_En_7_Fig27_HTML.jpg)


    Figure 7-27. Configure the Administration Server screen


    In this environment, Access Manager and Identity Manager are installed in separate
    Oracle Middleware Homes. This means that each one consists of WLS, Administration
    server, and managed servers. As discussed previously, this was done for ease of
    future maintenance such as patches and upgrades. It also allows the separation
    of these tiers to different physical hosts at a later time if required. Because
    these will be running on the same physical host but within separate WLS, each
    Administration server will require its own listen port.


    The managed servers will be prepopulated with the standard ports used by the installation.
    If desired, you can change the ports or populate a Secure Sockets Layer (SSL)
    listen port. In many cases, it is sufficient to allow the HTTP server or load
    balancer to perform the SSL endpoint duties, thus providing some performance gain
    by offloading the encryption duties to the external device. For ease of troubleshooting
    and future maintenance, leave the ports as defaults, seen in Figure [7-28](#A352855_1_En_7_Chapter.html#Fig28).


    ![A352855_1_En_7_Fig28_HTML.jpg](A352855_1_En_7_Fig28_HTML.jpg)


    Figure 7-28. Configure Managed Servers screen


    During the course of this book, clustering is not a concern. However, to facilitate
    the creation of clusters later, the cluster configuration information is entered
    here, as shown in Figure [7-29](#A352855_1_En_7_Chapter.html#Fig29). As such,
    the WebLogic domain will be preconfigured with the clusters in place. In effect,
    this step creates a single node cluster that can be later expanded to include
    multiple machines and instances.


    ![A352855_1_En_7_Fig29_HTML.jpg](A352855_1_En_7_Fig29_HTML.jpg)


    Figure 7-29. Configure Clusters screen


    Assign the managed servers to the desired cluster, as shown in Figure [7-30](#A352855_1_En_7_Chapter.html#Fig30).
    Note that it is possible to create a single cluster and assign all of the managed
    servers to it. However, for simplification of administrative tasks, each will
    be assigned to its own cluster within WebLogic.


    ![A352855_1_En_7_Fig30_HTML.jpg](A352855_1_En_7_Fig30_HTML.jpg)


    Figure 7-30. Assign Servers to Clusters screen


    It should be noted at this point that if you only have a single node in your cluster,
    you might see errors in the managed server logs related to waiting for communication
    with other members of the cluster. These can be ignored and will go away after
    adding additional members to the cluster.'
  raw: '## Configure Identity Manager Domain


