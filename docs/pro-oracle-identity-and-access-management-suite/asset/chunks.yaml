  trans: '

    ## 将 HTTP 服务器重定向到 WebLogic 服务器以访问 EBS AccessGate


    您可能还记得，本章开头提到 HTTP 服务器会将请求重定向到 AccessGate 进行身份验证。此重定向必须在 OHS 上配置。WebGate 将作为代理，处理对
    Oracle EBS 资源的身份验证请求。因此，请求将由部署在您的 WLS 实例上的 Oracle EBS AccessGate 应用程序处理。


    打开命令提示符，找到第 9 章创建的 OHS 实例的配置目录。该目录应位于 `/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1`。在此目录中，您将找到名为
    `mod_wl_ohs.conf` 的 WLS 模块配置文件。默认情况下，`httpd.conf` 文件应已包含必要的 include 指令，以便在启动时加载此配置。将以下几行添加到
    `mod_wl_ohs.conf` 文件中，以包含 EBS 位置配置，如下所示。


    ```

    WebLogicHost 10.0.70.229

    WebLogicPort 17043


    SetHandler weblogic-handler

    ```


    此条目配置 OHS，将 EBS 身份验证请求重定向到部署了 AccessGate 的托管服务器。确保 `WebLogicHost` 和 `WebLogicPort`
    指向安装的正确位置。然后重启 OHS。


    现在，您应该能够通过浏览器，经由您的 HTTP 服务器和 WebGate 访问 Oracle ECBS AccessGate 资源；例如，访问 `http://10.0.70.229:7777/ebsauth_dev/ssologout_callback`。


    此 URL 已在公共资源策略下的 OAM 应用程序域资源中配置。因此，此时您不应被提示进行身份验证。OHS 现在已配置为将 EBS AccessGate 应用程序部署代理为身份验证服务提供商。


    ## 配置集中式注销


    您可能还记得，OAM 充当凭据收集代理，并根据配置的身份存储（本例中为 OID）对用户进行身份验证。当用户登录受保护资源时，OAM 会创建必要的会话和 Cookie，以确保无缝过渡到其他受保护资源，并提供
    SSO 环境。在注销过程中，OAM 会清理自己的会话信息。但是，它不会清理合作伙伴应用程序的会话。因此，用户可能已从 OAM 注销，但 Oracle EBS
    会话 Cookie 可能仍然存在，直到浏览器完全关闭。AccessGate 软件安装提供了必要的文件，以确保在注销操作期间清理 EBS 会话信息，从而提高安全性。配置集中式注销将确保在用户注销
    SSO 应用程序时执行清理并消除 EBS 会话。


    ### 配置用于注销的清理文件


    当您解压 EBS AccessGate zip 文件时，其中包含一个名为 `oacleanup.html` 的文件。在部署过程中，您已将此文件复制到 OHS
    `htdocs` 目录下的 `/public` 子目录中。找到该文件并使用文本编辑器根据需要更新上下文根，以确保脚本被正确调用。


    在 `oacleanup.html` 中找到以下行：


    ```

    <SCRIPT language=JavaScript src="http://<CONTEXT_ROOT>/oacleanup.js"></SCRIPT>

    ```


    通过将 `<CONTEXT_ROOT>` 替换为在 OAM 中配置的资源名称来更新此条目。这应与托管服务器的名称匹配；例如，


    ```

    <SCRIPT language=JavaScript src="http://ebsauth_dev/oacleanup.js"></SCRIPT>

    ```


    ### 配置额外的注销回调


    某些环境可能有多个 EBS AccessGate 实例，或者您可能希望在注销后为其他应用程序执行会话清理。如果是这种情况，您可以为每个额外的 AccessGate
    或自定义应用程序添加回调，如下所示。在 `oacleanup.html` 文件中搜索以下行：


    ```

    function doLoad()

    ```


    为其他应用程序添加回调。


    ```

    logoutHandler.addCallback(''//ssologout_callback'');

    logoutHandler.addCallback(''http://webgatehost2.example.com:7777/ /ssologout_callback'');

    ```


    在注销过程中，这确保 AccessGate 调用清理过程以销毁 Oracle EBS 会话。OAM 集中式注销也应包括为 OAM 配置保护的其他合作伙伴应用程序执行清理。


    在此示例中，使用了 Oracle 11g WebGate。因此，可以利用 11g WebGate 注销回调 URL 实现集中式注销流程。使用 OAM 控制台管理屏幕设置注销回调
    URL。


    在 OAM 管理控制台中，单击“系统配置”选项卡。在“访问管理器”部分，单击“SSO 代理”节点，然后选择“OAM 代理”。单击“搜索”并选择先前创建的 SSO
    代理。图 15-2 显示了设置 SSO 代理 Webgate 时使用的配置参数。


    ![A352855_1_En_15_Fig2_HTML.jpg](img/A352855_1_En_15_Fig2_HTML.jpg)

    *图 15-2. 注销回调 URL 配置*


    将注销回调 URL 的值设置为 `http://<ebshost>.<domain>:<port>/OA_HTML/AppsLogout`。


    至此，OAM 和 AccessGate 集中式注销流程的配置完成。


    ## EBS 配置文件配置


    配置 Oracle EBS AccessGate 应用程序和 OAM 资源后，需要在实际的 EBS 环境中设置登录配置文件。设置表 15-5 中的 Oracle
    EBS 配置文件选项，或让 EBS 管理员进行设置。


    *表 15-5. EBS 配置文件配置参数*


    | 配置文件 | 级别 | 值 |

    | :--- | :--- | :--- |

    | 应用程序身份验证代理 (`APPS_AUTH_AGENT`) | 站点 | `http://<webgatehost>:<port>/ebsauth_dev/`
    |

    | 应用程序 SSO 类型 (`APPS_SSO`) | 站点 | `SSWA w/SSO` |

    | 应用程序单点登录提示 Cookie (`APPS_SSO_HINT_COOKIE_NAME`) | 站点 | `<空白> (null)` 此值应为空；如果存在类似
    `ORASSO_AUTH_HINT` 的值，请将其移除。 |


    重启 Oracle EBS 中间层的应用程序服务，然后重启部署了 Oracle EBS AccessGate 的 WLS 和托管服务器。


    ## 测试电子商务套件单点登录


    现在所有必要的组件都已部署和配置，并且您已为 SSO 设置了 Oracle EBS 配置文件，您可以测试整个环境。此前，您已设置了一个测试 URL 以确保身份验证机制正常。对于此步骤，您将尝试登录
    Oracle EBS 系统，然后登录另一个受保护资源。如果一切正常，在浏览器会话中应该只会被提示进行一次身份验证。对其他受保护资源的后续请求应使用现有的会话信息和
