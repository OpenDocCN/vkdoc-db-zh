- fmt: '# 编辑 OAM 配置文件与 OIM 安装配置


    ## 对 `oam-config.xml` 文件的编辑


    对 `oam-config.xml` 文件的编辑在 OAM 服务器关闭前不会生效。同时，请确保递增文件开头的 `Version` 标签：`<Setting
    Name="Version" Type="xsd:integer">247</Setting>`。


    ## 手动更改身份存储


    要手动更改身份存储，请找到以下条目并根据你的环境进行编辑。更新文件开头的 `version` 属性并重启 OAM。


    ```

    dc=mycompany,dc=com

    false

    none

    {AES}36AC17B83FF9C6D177B092FD352CB369

    false

    dc=mycompany,dc=com

    false


    cn=orcladmin

    OID Store


    uid

    true

    true


    OID


    userPassword

    OID


    ldap://ldap.mycompany.com:3060

    follow


    OracleUserRoleAPI

    ```


    ## Oracle Identity Manager (OIM)


    就其本身而言，OIM 并不是一个难以安装和配置的产品。当与 OID 或其他身份存储一起使用时，配置非常直接。在将 OIM 与 OAM 等 SSO 产品集成时，可能会遇到一些困惑。此集成涉及多个步骤，并且在不同阶段都可能遇到问题。请花时间仔细遵循步骤，你应该就能成功。本节涵盖了一些常见问题。


    Oracle Identity Management 二进制文件的安装通常是一个顺利的操作。很少出问题。如果出错，通常是由于之前提到的项目，如缺少操作系统包或
    JDK 版本不正确。话虽如此，OIM 的实际配置可能有点令人困惑。很多时候，屏幕上会滚动过大量信息，某个步骤可能看起来正常完成了。然而，一个阶段未解决或遗漏的问题可能会在后续步骤中显现出来。


    如前所述，与 OID 和 OAM 不同（它们分别只有一个 `config.sh` 或 `config.bat` 文件），OIM 实际上需要两个配置文件。对于
    OIM，你必须先运行位于 `<ORACLE_HOME>/common/bin` 目录下的 `config.sh` 文件来创建域。之后，你将运行 `<ORACLE_HOME>/bin/config.sh`
    来实际配置 OIM。对于熟悉 OID 或 OAM 环境但首次安装 OIM 的人来说，这可能会造成混淆。在不正确的时间运行错误的文件将导致无法指示实际问题的错误。


    关于配置工具，安装 OIM 所需的错误版本的服务导向架构（SOA）会导致许多问题。更复杂的是，OIM 所需的存储库配置实用程序（RCU）版本与实际 OIM
    版本不匹配。OIM 11.1.2.3x 需要 SOA 11.1.1.9。SOA 11.1.1.9 软件作为与 OIM 分开的下载项提供。没有 OIM 11.1.2.3
    RCU 可用。相反，你将使用 Fusion Middleware 11.1.1.9 版本。


    使用带有 `–configOIM` 标签的 `idmConfigTool.sh` 配置身份存储时，可能会遇到与 `JMXCLIENTLIB` 变量相关的错误。在
    Oracle 文档中，有一点不太清楚：即使你没有安装 OIM 开发者控制台，也必须创建 `wlfullclient.jar` 文件。如果你正在配置 OAM
    和 OIM 集成，此文件必须存在。文档中，生成 `wlfullclient.jar` 文件的说明被放在一个关于开发者控制台的单独章节中。虽然你不需要将文件复制到任何地方，但遗漏此步骤将导致运行
    `idmConfigTool.sh` 文件时出错。要解决此问题，请生成 `wlfullclient.jar` 文件。如果你在同一个服务器上但不同的 WebLogic
    Server (WLS) 实例中安装 OIM 和 OAM，请确保从 OIM Home 而不是 OAM Home 运行 `idmConfigTool.sh`。这被称为拆分域配置。其次，你可能需要修改你的
    `CLASSPATH` 以指向 `wlfullclient.jar` 的位置，而不是 `JMXCLIENTLIB` 目录。'
