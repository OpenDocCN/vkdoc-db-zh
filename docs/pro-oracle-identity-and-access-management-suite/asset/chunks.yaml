    \ libOVD 连接器。此连接器可以更新，以反映新的 OID 或 LDAP 目录主机及连接信息。在 `<DOMAIN_HOME>/config/fmwconfig/ovd/oim`\
    \ 目录下有一个名为 `adapters.os_xml` 的文件。在修改此文件之前，请确保管理服务器和 OIM 托管服务器已关闭。查找以下部分，并根据需要更新以反映新的\
    \ LDAP 主机。请注意，仅当新的身份存储类型和版本相同，且连接器用户和密码保持不变时，才应使用此方法；例如，OID 11.1.1.9。如果不是这种情况，你可以重新运行第\
