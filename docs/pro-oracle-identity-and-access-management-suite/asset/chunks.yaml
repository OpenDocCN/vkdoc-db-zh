    on the instance. Are the applications in question heavily dependent on identity
    or other data, are they memory intensive, or does the application have a specific
    response time requirement? Thought must also be given to the expected load the
    environment is going to experience.


    #### Assessing Capacity Requirements


    WLS must be installed and configured on a server that meets the minimum requirements.
    However, meeting the minimum requirements does not always guarantee that the applications
    deployed in the environment will perform at their optimum level and provide the
    level of service required by users of the system. While planning for a WebLogic
    implementation, one should work with the application planners or the developers
    to determine the number of expected users, number of concurrent connections, expected
    response times, and so on. Furthermore, it is quite helpful to gather information
    about the application itself, including transaction timing, transactions per second,
    and the application complexity. Also consider the application architecture, such
    as database connections and external service access. These will all be useful
    inputs in determining the necessary hardware requirements as well as software
    tuning for WLS. All of this might require installing a test environment and load
    testing it with these numbers in mind. This practice can also provide a solid
    benchmark to be used in future tuning endeavors.


    #### Hardware


    Capacity planning starts with calculating hardware requirements and ensuring the
    environment meets or exceeds these. A good place to start is the documentation
    included with the software that is planned for the environment. WLS requires a
    minimum of one 1-GHz CPU, but the requirements for the components to be installed
    will dictate the overall system requirements. For example, a distributed architecture
    where Oracle Access Manager (OAM) and Oracle Identity Manager (OIM) are installed
    on one host and the Lightweight Directory Access Protocol (LDAP) server is installed
    on another requires two physical hosts. The OAM/OIM host will require six or more
    cores, whereas the LDAP host requires only two.


    #### Memory


    WLS requires 8 GB available memory (4 GB physical and 4 GB swap). These represent
    the minimum requirements and will change depending on the number of managed servers
    and the software deployed in each. It is important to consider that the server
    itself has memory requirements as well. One can determine a starting point by
    allotting 3 GB for the Linux operating system (OS), 3 GB for the WebLogic Admin
    Server, and 3 GB for each managed server (this number will change based on what
    is deployed). This will provide an initial estimate of the required available
    memory for the WLS hardware. Further detailed discussion on memory is provided
    later in this chapter


    #### Storage


    Although WLS does not require a large amount of up-front storage, it is important
    to size the disk space to allow for growth. Again, one must consider the disk
    space requirements for all software that will be deployed within the WebLogic
    managed servers. The WLS installation requires approximately 580 MB and an additional
    570 MB for coherence. The total space required is approximately 1.2 GB. As mentioned,
    consider the applications to be deployed. For example Oracle Internet Directory
    (OID) and the Directory Integration Platform and Directory Services Manager will
    require approximately an additional 800 MB.


    #### Networking


    Network load and network configurations on the host will have an impact on the
    perceived performance of the WLS instance. Oracle recommends WLS be installed
    on a gigabit network and the use of hardware load balancers.'
  trans: '# 概述


    Oracle 身份与访问管理满足了企业内对高度安全、可审计且可靠的身份管理的需求。各组件协同工作，形成了一种平台化的身份管理方法，从而降低了在许多场景下的复杂性——这些场景可能随着时间推移和需求增长，原本需要集成多家供应商和多个产品。图
    1-8 展示了 Oracle 身份与访问管理套件各组件之间如何共享数据。考虑到许多组织是按需构建安全系统，Oracle 确保了身份与访问组件是模块化的。这允许公司先安装所需的基础目录服务，之后再添加访问管理、单点登录（SSO）和治理能力。


    ![A352855_1_En_1_Fig8_HTML.jpg](img/A352855_1_En_1_Fig8_HTML.jpg)


    图 1-8. Oracle 身份与访问管理技术


    如图 1-8 所示，Oracle 身份与访问管理套件提供了处理组织所有安全相关需求所需的服务。访问管理提供了诸如`Access Manager`、`Identity
    Federation`和`Secure Token Services`等功能，通过允许应用程序共享会话信息并提供单点登录（SSO）能力，从而提高用户生产力和应用程序可访问性，减少了用户必须输入其凭据的次数。身份治理使组织能够自动化许多先前手动的用户配置任务，并缩短了员工入职时的上手时间。在治理框架内，`Identity
    Manager`通过允许用户进行自己的密码管理，并基于一套定义好的规则处理访问请求，从而减少了支持电话。通过运行定期的安全审计和对账任务，也降低了风险。平台安全服务允许组织为开发者提供连接和引用安全信息的标准方法。所有这些功能都使用目录服务来存储和访问身份数据。Oracle
    目录服务由一个基于 Java 的身份存储`OUD`和一个基于数据库的`OID`组成。这两者都可用于存储应用程序身份数据，并能与现有的企业 LDAP 身份存储进行同步。`OVD`允许组织整合现有的身份存储，而无需复制数据，并为多个应用程序提供单一的身份数据访问点。


    # 2. 安装前注意事项与先决条件


    ## 容量规划


    在没有对当前环境进行适当分析并对未来进行一定规划的情况下，无法正确实施 Oracle 身份与访问管理套件或其部分组件，以在企业内提供应用程序安全。这将确保不仅满足当前需求，而且在未来随着更多用户和应用程序添加到环境中，性能也不会下降。本章为处于身份管理实施规划阶段的人员提供指导。


    ## Fusion Middleware


    Oracle 身份与访问管理与其他 Fusion Middleware 产品和应用程序一样，依赖于`WebLogic Server`（`WLS`）架构。作为
    Fusion Middleware 架构的支柱，确保`WLS`环境正确配置至关重要。这始于恰当的规划和分析。在决定如何设置环境时，规划 WebLogic 环境涉及诸多方面，例如内存、硬件、灾难恢复等。下文将对此进行讨论。


    性能要求是重要的考虑因素之一。必须考虑应用程序用户对部署在实例上的应用程序期望何种服务级别。所涉及的应用程序是否高度依赖身份或其他数据，是否内存密集型，或者应用程序是否有特定的响应时间要求？还必须考虑环境预计将承受的负载。


    ### 评估容量需求


    `WLS`必须在满足最低要求的服务器上安装和配置。然而，满足最低要求并不总是能保证部署在其中的应用程序以最佳水平运行并提供系统用户所需的服务级别。在规划 WebLogic
    实施时，应与应用程序规划人员或开发人员合作，以确定预期用户数、并发连接数、预期响应时间等。此外，收集有关应用程序本身的信息非常有帮助，包括事务时长、每秒事务数和应用程序复杂度。同时考虑应用程序架构，例如数据库连接和外部服务访问。这些都将是确定`WLS`所需硬件要求以及软件调优的有用输入。所有这些可能都需要安装一个测试环境，并根据这些数字进行负载测试。这种做法也可以为未来的调优工作提供一个可靠的基准。


    ### 硬件


    容量规划从计算硬件需求开始，并确保环境满足或超过这些需求。一个很好的起点是计划用于环境的软件附带的文档。`WLS`最低要求一个 1-GHz CPU，但待安装组件的需求将决定整体系统要求。例如，一种分布式架构，其中`Oracle
    Access Manager`（`OAM`）和`Oracle Identity Manager`（`OIM`）安装在一台主机上，而轻量级目录访问协议（`LDAP`）服务器安装在另一台上，则需要两台物理主机。`OAM`/`OIM`主机将需要六个或更多内核，而`LDAP`主机仅需两个。


    ### 内存


    `WLS`需要 8 GB 可用内存（4 GB 物理内存和 4 GB 交换空间）。这些代表了最低要求，并将根据托管服务器的数量以及部署在其中的软件而变化。重要的是要考虑服务器本身也有内存需求。可以通过为
    Linux 操作系统（`OS`）分配 3 GB、为`WebLogic Admin Server`分配 3 GB、为每个托管服务器分配 3 GB（此数字将根据部署内容而变化）来确定一个起点。这将提供`WLS`硬件所需可用内存的初步估算。本章后续将提供关于内存的更详细讨论。


    ### 存储


    尽管`WLS`不需要大量的前期存储空间，但调整磁盘空间大小以允许增长很重要。同样，必须考虑将在 WebLogic 托管服务器内部署的所有软件的磁盘空间要求。`WLS`安装需要大约
    580 MB，另外需要 570 MB 用于 coherence。所需总空间大约为 1.2 GB。如前所述，考虑要部署的应用程序。例如，`Oracle Internet
    Directory`（`OID`）、目录集成平台和目录服务管理器将需要额外大约 800 MB。


    ### 网络


    主机上的网络负载和网络配置将对`WLS`实例的感知性能产生影响。Oracle 建议将`WLS`安装在千兆网络上，并使用硬件负载均衡器。'
- fmt: '# Clustering


    增加物理或虚拟主机的CPU和内存将提升WLS环境的性能。这些改动同样会影响部署在受管服务器内的应用程序性能。然而，它们无法降低单个服务器的整体负载。增加服务器或采用集群能带来更大的性能提升。


    WebLogic环境的集群化包括增加一个或多个运行WLS的额外主机，并将应用程序部署在受管服务器上，或是在单个多处理器服务器上部署多个实例。然而，性能仍然会受限于物理服务器上的其他资源。跨多台服务器进行WebLogic集群化的额外好处包括，通过在物理服务器故障时提供故障转移支持来提高可用性。向WLS集群添加新的独立主机并进行负载均衡，会将负载分散到多个主机上。WebLogic将处理会话信息和集群成员监控，以确保数据连续性。一个配置得当的WebLogic集群在客户端应用看来就像一个单一实例。


    集群的负载均衡优势能将应用负载均匀地分布在多个主机上。这要求受管服务器部署在集群内的每个节点上。需要注意的是，集群内的每个WebLogic实例都管理着自己与数据库及底层服务的连接。这种能力进一步提升了整体环境的性能，因为每个节点都处理自己的一组应用请求。此外，可以向环境添加额外的集群成员而不影响用户，从而实现动态可扩展性。


    集群带来的高可用性提升允许在节点丢失时实现故障转移冗余，因为WebLogic基础架构处理会话信息，并且应用状态集群可以提供自动故障转移能力。另外，如果需要，整个受管服务器可以迁移到另一个节点。


    总之，确保一个成功的WebLogic环境需要考虑系统将要承担的基本负载。单台服务器必须至少具备WLS所需的最低CPU和内存，同时也必须拥有部署应用程序所需的要求。通过WebLogic集群功能，可以进一步提升性能和故障转移能力。这些特性将负载分散到多个主机上，每个主机分担一部分工作，并在一个或多个节点宕机时承担起额外负载。Oracle身份与访问管理套件的所有组件都需要WebLogic环境。本章后续将讨论整体环境的通用指南和注意事项，以帮助您建立一个高性能、高可用的系统。


    # 企业部署拓扑


    Oracle身份与访问管理代表了Oracle基于最先进技术的全面身份管理套件，是同类产品中的佼佼者。它提高了用户生产力，同时提供了一个高度安全且易于适应的环境。为了支持涵盖性能、高可用性和可扩展性的广泛企业需求，Oracle身份与访问管理利用了Fusion
    Middleware架构。借助Fusion Middleware，组织可以获得多种选择，从适用于开发环境的单节点，到位于不同地理位置数据中心以支持负载和最大灾难恢复的多节点集群。本节将讨论Oracle建议的各种拓扑结构，以及每种结构应被采用的原因及其能为企业带来的好处。


    ## 单节点


    单节点架构描述了一个所有服务都在单一WebLogic节点上运行的环境。虽然可能涉及多台物理或虚拟主机，但每台主机运行不同的组件，且不提供故障转移。例如，OID可能只有一个实例运行在Host_1上。OAM可能运行在Host_2上。然而，在这种情况下，所有认证请求都会通过Host_2上的OAM路由。OAM检查Host_1上的OID。如果Host_1或Host_2中的任何一个宕机，所有操作都将停止。这种拓扑不提供任何冗余。同时，它也不提供负载均衡。如果应用程序经历高负载，单台服务器必须处理增加的流量。正是由于这两个原因，单节点拓扑通常只适用于开发环境。


    图[2-1](#A352855_1_En_2_Chapter.html#Fig1)描述了单节点拓扑。应用环境的每一层都由一个单主机/单个WLS和两个受管服务器组成。如图[2-1](#A352855_1_En_2_Chapter.html#Fig1)所示，没有冗余或负载均衡机制。此配置是最简单的实现，很可能在一天内即可完成配置。虽然这对于小型组织或不预期高负载的组织来说可能是可以接受的，但较大的组织通常需要比此架构提供的更高的容错能力和性能水平。


    ![A352855_1_En_2_Fig1_HTML.jpg](A352855_1_En_2_Fig1_HTML.jpg)


    图2-1. 通用单节点拓扑


    图[2-1](#A352855_1_En_2_Chapter.html#Fig1)中的图像描述了一个包含身份与访问管理的单节点配置。应用环境的每一层都由单台服务器组成。请求被路由到带有Access
    Manager WebGate的Oracle HTTP服务器。WebGate确定请求的资源是否需要认证。如果用户尚未认证，请求会被路由到单一的Access
    Manager服务器，认证过程被移交给LDAP服务器。在企业内部，可以使用Identity Manager来维护用户存储库。


    总的来说，单节点拓扑对于可以容忍停机时间或没有高可用性要求的环境是适用的。例如，开发组可以使用它们来开发需要身份管理的应用程序。开发环境可以选择脱机而不影响普通用户群体。通过进行频繁备份并制定良好的恢复计划，如果用户数量较少或不需要24/7可用性，小型组织或许可以通过运行单节点环境来节省一些成本。'
  raw: '#### Clustering


    Increasing CPU and memory on the physical or virtual host will result in improvements
    within the WLS environment. These changes will also have an effect on the performance
    of the applications deployed within the managed servers. However, they do nothing
    to reduce the overall load on the individual server. Adding servers or clustering
    can result in greater performance improvements.


    Clustering WebLogic environments consists of adding one or more additional hosts
    that run WLS and deploying applications within managed servers or multiple instances
    on a single multiprocessor server. However the performance would still be limited
    to the other resources on the physical server. An added benefit of clustering
    WebLogic environments across multiple servers includes increasing availability
    by providing failover support in the event of loss of a physical server. Adding
    a new separate host to a WLS cluster and load balancing the system will split
    the load among the multiple hosts. WebLogic will handle session information and
    cluster member monitoring to ensure data continuity. A properly configured WebLogic
    cluster will appear as a single instance to client applications.


    The load balancing benefit of clustering evenly distributes application load across
    multiple hosts. This requires that the managed servers be deployed on every node
    within the cluster. It should be noted that each WebLogic instance within the
    cluster manages its own connections to database and underlying services. This
    capability further increases the performance of the overall environment, as each
    node handles its own set of application requests. Furthermore, additional cluster
    members can be added to the environment without affecting users, allowing for
    dynamic scalability.


    The high availability improvement made by clustering allows for failover redundancy
    in case a node is lost because the WebLogic infrastructure handles session information
    and application state clusters can provide automatic failover capabilities. In
    addition, entire managed servers can be migrated to another node if needed.


    In summary, ensuring a successful WebLogic environment requires considering the
    basic load that will be placed on the system in general. The single server must
    have at least the minimum required CPU and memory for WLS, but must also possess
    the requirements for the applications to be deployed. Further performance and
    failover capabilities can be seen with WebLogic clustering functionality. These
    features spread the load across multiple hosts, each handling a share of the work
    and taking up slack in the case of loss of one or more nodes. All of the components
    of the Oracle Identity and Access Management Suite require a WebLogic environment.
    General guidelines and considerations for the overall environment are discussed
    later in this chapter to assist with setting up a high-performance, highly available
    system.


    ## Enterprise Deployment Topologies


    Oracle Identity and Access Management represents Oracle’s best of class offering
    of a comprehensive identity management suite based on state-of-the-art Oracle
    technologies. It increases user productivity while also providing a highly secure
    and easily adaptable environment. To support a wide variety of enterprise requirements
    covering performance, high availability, and scalability, Oracle Identity and
    Access Management leverages the Fusion Middleware architecture. With Fusion Middleware,
    the organization is provided with a number of options from single nodes that would
    be suitable for development environments to multiple-node clusters located in
    separate datacenters geographically located to support load and maximum disaster
    recovery. This section discusses the various Oracle suggested topologies along
    with some reasons why each should be used and how they can benefit the enterprise.


    ### Single Node


    Single node architecture describes an environment where all services run on a
    single WebLogic node. Although there might be more than one physical or virtual
    host involved, each host is running different components and no failover is provided.
    For instance OID would have only one instance running on Host_1\. OAM might be
    running on Host_2\. However, in this case all authentication requests would be
    routed through OAM on Host_2\. OAM checks OID on Host_1\. If either Host_1 or
    Host_2 goes down, all operations would halt. This topology does not provide any
    redundancy. At the same time, it provides no load balancing either. If the applications
    experience heavy loads, the single servers are required to handle the increased
    traffic. It is for these two reasons that single node topologies are usually only
    suitable for development environments.


    Figure [2-1](#A352855_1_En_2_Chapter.html#Fig1) describes the single node topology.
    Each level of the application environment consists of a single host/single WLS
    with two managed servers. As can be seen in Figure [2-1](#A352855_1_En_2_Chapter.html#Fig1),
    no redundancy or load balancing is in place. This configuration is the simplest
    implementation and can likely be configured within a single day. Although this
    might be acceptable for a small organization, or one that does not anticipate
    high loads, a larger organization would normally require a higher fault tolerance
    and level of performance than provided by this architecture.


    ![A352855_1_En_2_Fig1_HTML.jpg](A352855_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    Generic single node topology


    The image in Figure [2-1](#A352855_1_En_2_Chapter.html#Fig1) describes a single
    node configuration with Identity and Access Management. Each level of the application
    environment consists of a single server. Requests are routed to the Oracle HTTP
    server with Access Manager WebGate. The WebGate determines if authentication is
    required for the requested resource. If the user has not yet authenticated, the
    request is routed to the single Access Manager server and authentication is handed
    off to the LDAP server. Within the enterprise, Identity Manager can be used to
    maintain the user repository.


    In general, single node topologies work fine for environments with a tolerance
    for downtime or high availability requirements. For instance, development groups
    can use these to work on applications that require identity management. Development
    environments have the option to be taken offline without affecting the general
    user populations. By making frequent backups and having a good recovery plan in
    place, smaller organizations might be able to save some cost by running a single
    node environment if their user population is small or they do not require 24/7
    availability.'
