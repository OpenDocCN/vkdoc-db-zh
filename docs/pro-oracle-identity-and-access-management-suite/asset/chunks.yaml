    ### 复制


    与 OID 类似，OUD 提供了一种在多个节点间复制数据的机制。此功能对于确保最大可用性至关重要。复制确保在一个节点上更新的身份存储库数据传播到集群的其他成员节点。延迟过长或未正确复制的环境可能导致安全问题，因为用户可能能够访问已将其移除一段时间的资源，或者密码更改可能不会立即生效。OUD
    引入了高级复制。高级复制模型使用复制服务器来与其他目录服务器同步数据更改。通过将复制工作转移到单独的服务器，同步更改的工作从目录服务器上卸载，允许它们将资源集中用于目录查询。为确保复制的安全性，OUD
    复制服务确保客户端应用程序请求的身份数据仅在数据已复制到其他成员后才会发布。此外，通过防止敏感数据被复制到可能不太安全的服务器上，增强了身份安全性。


    ### 可用性与可管理性


    与 OID 一样，OUD 使用 `ODSM` 和 `Fusion Middleware Control` 进行管理。由于之前已经讨论过这些，此处不再赘述。


    ## Oracle Virtual Directory


    大多数组织已经在多个身份存储上进行了投资。这包括他们的网络身份存储、特定于应用程序的身份存储，甚至可能是特定于业务部门的 `LDAP` 目录。在许多情况下，各种数据存储包含相同的用户或相同数据的子集。这常常导致混乱，管理员试图管理用户组并知道各种存储的位置。将这些目录同步到中央存储库可能会导致其他问题，例如增加的数据存储需求以及确保应用程序能够以预期的方式利用存储。引入
    `OVD` 是为了解决这些问题。`OVD` 允许组织将其身份目录投资整合到一个集中式存储中，而无需复制数据。


    `OVD` 被宣传为一个目录聚合工具。它使组织能够访问正在使用的各种用户存储库，而无需复制其中包含的数据。此外，`OVD` 提供数据转换服务，允许应用程序以预期或要求的格式接收数据。`OVD`
    甚至可以为非 `LDAP` 类型的源（例如基于数据库或文件的身份存储）提供 `LDAP` 接口。


    ### 架构


    部署在 `WLS` 上，`OVD` 利用了 `WLS` 的许多优势。在 `WLS` 环境中，`OVD` 能够与凭证存储、审计和日志框架集成，并可以使用 `Fusion
    Middleware Control` 接口进行管理。


    `OVD` 由四个协同工作的逻辑层或组件组成，以提供所有服务，例如数据聚合和转换。从第一层开始，`OVD` 提供了允许外部应用程序连接到它的监听器。下一层由验证请求有效性并确定使用哪个适配器来满足请求的进程组成。请求被传递给一个连接机制，该机制与各种适配器一起操作以检索数据并转换数据集。这些层共同工作，为应用程序提供看似单一数据源的效果。图
    3-11 显示了 `OVD` 的主要组件。


    ```

    ![A352855_1_En_3_Fig11_HTML.jpg](img/A352855_1_En_3_Fig11_HTML.jpg)

    ```


    **图 3-11.**

    Oracle Virtual Directory 组件


    适配器允许 `OVD` 连接到底层身份存储，无论它们是 `LDAP` 还是数据库存储库。提供了用于连接到 `LDAP`、数据库和本地存储的适配器。此外，可以配置自定义适配器来处理各种其他存储库。


    由于其架构，`OVD` 具有极强的容错能力。可以在不同的服务器上甚至在不同区域部署多个具有相同配置的 `OVD` 实例。无需复制数据或存储文件，也无需提供数据库高可用性选项。每个
    `OVD` 实例都使用自己的适配器连接到后端存储库，因此基于负载均衡或故障，任何一个实例都可以处理请求。此外，保证数据与源存储库一样新。


    除了能够跨多个服务器部署以提供自身的容错能力外，还可以配置 `OVD` 适配器以将负载分散到源目录的多个实例上。例如，如果有两个使用复制的 `Active
    Directory` 实例，可以配置 `OVD` 适配器引用这两个实例，从而在一个实例发生故障时提供自动故障转移。'
- fmt: '## Aggregation


    OVD does not store the identity data that it presents. Instead, through the use
    of the adapters mentioned in the previous section, `OVD` serves as a proxy for
    multiple back-end directories. This reduces the costs and administration effort
    associated with replicating and synchronizing multiple stores while leveraging
    the repositories already in use within the organization. It also improves efficiency
    by decreasing the time and effort taken during development as new directories
    or interfaces do not need to be built.


    Most companies have a couple, if not several different user repositories. These
    might consist of the network or enterprise directory, business-unit-specific directories,
    e-mail, `LDAP`-enabled applications that implement their own directory, and even
    database sources such as `EBS` or `PeopleSoft`. In many of these cases, the data
    stored in one source cannot easily be adapted to work with the other applications,
    necessitating the replication of data. Often the individual business units that
    control the applications have requirements that mandate they retain control of
    their directories. For whatever reasons multiple data stores must be maintained,
    `OVD` can consolidate them and provide that single point.


    To facilitate the aggregation of identity store information, `OVD` provides the
    ability to transform or map data to formats expected by the application or the
    back-end data store. These mappings occur in a bidirectional flow. This allows
    the request to be formatted to match the store requirements while the returned
    data is then transformed to match the client application requirements. `OVD` can
    also be configured to remap attribute names and values.


    Acting as a proxy, `OVD` systematically routes each incoming request to the proper
    adapter using logic that examines the `DN` pattern, filters, attributes, and queries
    to determine the best possible adapters to use to satisfy the request. This reduces
    the number of adapters queried for the result, tunes `OVD` for performance, and
    allows the configuration of more complex environments without affecting performance.


    ## Access Management


    Many organizations are working toward providing their users with single sign-on
    (`SSO`) capabilities. However, as discussed, these organizations could have multiple
    user repositories. It was mentioned earlier that `OVD` provides a single front
    end for client applications to access various back-end directories. The same goes
    for access management systems. Products like `OAM` most times require an `LDAP`
    repository to provide authentication and authorization services. Providing that
    `LDAP` front end no matter what the back-end repositories look like is what `OVD`
    was designed to do.


    Another benefit `OVD` provides to access management systems is an abstraction
    layer. Over time, changes to the underlying data stores occur. These changes can
    cause client applications or access management systems to fail. By separating
    the underlying directory structures from the client applications, `OVD` protects
    them from changes by ensuring data continues to be transformed or translated into
    the correct format required.


    ## Summary


    This chapter presented the three main products that make up Oracle Directory Services,
    providing the foundation of Oracle Identity and Access Management. `OID` and `OUD`
    both provide user management and storage solutions and expose an `LDAP` interface
    for client applications and services. `OVD` helps organizations to consolidate
    management of multiple directories and provide a single source for applications
    that require authentication services. The rest of this book concentrates on the
    installation of `OUD` as Oracle has indicated the product will be the direction
    of Oracle Directory Services. However, when `OVD` provides additional functionality
    or an alternative solution, it is also discussed.


    # 4. Oracle Directory Services Installation and Configuration


    Oracle offers multiple options for Lightweight Directory Access Protocol (`LDAP`)
    data storage. Oracle Internet Directory (`OID`) and Oracle Unified Directory (`OUD`)
    both provide storage, and Oracle Virtual Directory (`OVD`) allows multiple disparate
    `LDAP` stores to be presented as a single source. This chapter presents the installation
    and configuration steps for each product. At the time of this writing, Oracle
    E-Business Suite is certified for use with `OID` and not `OVD` or `OUD`. The installation
    process for all three products is presented as a guide for future reference. However,
    in later chapters, only `OID` is used.


    ## Preinstallation Tasks


    Prior to beginning the actual software installation and laying down binaries on
    the file system, it should be noted that there are some tasks that must be completed
    to ensure a successful operation. Care should be taken to create or complete these
    tasks such as populating operating system (`OS`) users, setting kernel parameters,
    and granting the proper permissions. These items are covered in the subsequent
    sections of this chapter.


    ### Operating System Users


    For most Oracle application installs, `OS` users and groups should be created
    to perform the installation and configuration tasks. Creating `OS` groups will
    allow other `OS` users to perform certain tasks related to the management of the
    application environment. The most common `OS` users and groups related to installing
    Oracle applications in Linux environments are the `` `oracle` `` user and `` `oinstall`
    `` or `` `dba` `` groups.


    To create the necessary `` `oinstall` `` and `` `dba` `` groups perform the following
    commands as the `root` directory:


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd dba

    ```


    After the groups are created, create the `` `oracle` `` user.


    ```

    [root@clouddemolab home]# useradd -g oinstall -G dba oracle

    ```


    Note


    `` `-g` `` indicates the primary group to which the user should be added. `` `-G`
    `` indicates any secondary groups.


    To set the password for the user, use the following command as the `root` user:


    ```

    [root@clouddemolab home]# passwd oracle

    ```'
