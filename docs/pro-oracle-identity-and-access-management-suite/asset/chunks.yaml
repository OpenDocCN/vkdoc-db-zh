    # Oracle Identity Manager


    By itself, OIM is not a difficult product to install and configure. When using
    it with OID or another identity store, the configuration is very straightforward.
    Some confusion can be encountered when integrating OIM with an SSO product such
    as OAM. There are several steps involved with this integration, and issues can
    be encountered at various stages. Take your time and follow the steps carefully,
    and you should be successful. This section covers some of the commonly faced issues.


    ## Installation and Configuration Complexity


    Installation of the Oracle Identity Management binaries is usually a smooth operation.
    Very few things go wrong. If they do, they are usually due to the previously mentioned
    items like missing OS packages or incorrect JDK versions. That said, the actual
    configuration of OIM can be a little confusing. Many times, a screen full of messages
    can scroll by and a step might seem to complete properly. Unresolved or missed
    problems at one stage can manifest in later steps, however.


    As mentioned previously, unlike OID and OAM, where there is a single `config.sh`
    or `config.bat` file, there are actually two required for OIM. For OIM, you must
    run the `config.sh` file located in the `<ORACLE_HOME>/common/bin` directory to
    create the domain. Later, you will run `<ORACLE_HOME>/bin/config.sh` to actually
    configure OIM. This could be confusing to someone familiar with OID or OAM environments
    installing OIM for the first time. Running the incorrect file at the wrong time
    will result in errors that do not indicate the actual problem.


    ## Specific Configuration Steps


    On the subject of the configuration tool, installing the incorrect version of
    Service-Oriented Architecture (SOA) required for OIM can cause many issues. This
    is further compounded by the fact that the Repository Configuration Utility (RCU)
    version required for OIM does not match the actual OIM version. OIM `11.1.2.3x`
    requires SOA `11.1.1.9`. The SOA `11.1.1.9` software is available as a separate
    download from OIM. There is no OIM `11.1.2.3` RCU available. Instead, you will
    use the Fusion Middleware `11.1.1.9` version.


    When configuring the identity store using `idmConfigTool.sh` with the `–configOIM`
    tag, it is possible to encounter an error regarding the `JMXCLIENTLIB` variable.
    In the Oracle documentation, it is a little unclear that you must create the `wlfullclient.jar`
    file even if you are not installing the OIM Developer Console. This file must
    be present if you are configuring an OAM and OIM integration. In the documentation,
    instructions for generating the `wlfullclient.jar` file are presented within a
    separate section regarding the Developer Console. Although you do not need to
    copy the file anywhere, missing this step will lead to an error when running the
    `idmConfigTool.sh` file.


    To resolve this issue, generate the `wlfullclient.jar` file. If you are installing
    OIM and OAM on the same server, but in different WebLogic Server (WLS) instances,
    make sure you run `idmConfigTool.sh` from the OIM Home, not the OAM Home. This
    is known as a split domain configuration. Second, you might need to modify your
    `CLASSPATH` to point to the location of the `wlfullclient.jar` instead of the
    `JMXCLIENTLIB` directory.'
