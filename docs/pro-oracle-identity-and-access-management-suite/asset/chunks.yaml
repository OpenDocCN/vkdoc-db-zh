    # 7. Identity Manager 安装


    在前两章中，提供了安装和配置 Oracle Internet Directory (OID) 和 Oracle Access Manager (OAM) 的说明。这两个组件奠定了身份存储和单点登录
    (SSO) 的基础。Identity Manager 为环境添加了额外的元素，例如用户自助服务和治理，从而完成了端到端身份生命周期管理的实施。本章重点介绍
    Oracle Identity Manager (OIM) 的安装和初始域配置。


    ## 预安装任务


    ### 操作系统用户


    对于大多数 Oracle 应用程序安装，应创建操作系统 (OS) 用户和组来执行安装和配置任务。创建 OS 组将允许其他 OS 用户执行与管理应用程序环境相关的特定任务。在
    Linux 环境中安装 Oracle 应用程序最常见的 OS 用户和组是 `oracle` 用户以及 `oinstall` 或 `dba` 组。


    要创建必要的 `oinstall` 和 `dba` 组，请以 root 目录执行以下命令：


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd dba

    ```


    创建组后，创建 `oracle` 用户：


    ```

    [root@clouddemolab home]# useradd  -g oinstall -G dba oracle

    ```


    注意


    `-g` 表示用户应添加到的主组。`-G` 表示任何辅助组。


    要设置用户密码，请以 root 用户身份使用以下命令。


    ```

    [root@clouddemolab home]# passwd oracle

    ```


    ### 操作系统配置


    在安装 Oracle Fusion Middleware 基础架构和 Oracle Identity Management 软件之前，确保操作系统满足最低要求和配置非常重要。以下列出了所需的内核参数、软件包以及文件更改。


    需要设置以下内核参数：


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    要设置这些参数，请编辑 `/etc` 目录中的 `sysctl.conf` 文件。


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    在文件的此部分添加或编辑以下行：


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    在 `sysctl.conf` 文件中设置这些值后，必须激活并验证是否显示新值，使用此命令：


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    打开文件限制必须设置为 4096 以支持实例。为此，请编辑 `limits.conf` 文件。


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    如果环境要安装在 Oracle Linux 或 RedHat Linux 上，则必须同时在 `/etc/security/limits.d/90-nproc.conf`
    中执行编辑。如果遗漏了此步骤，此文件中的值可能会覆盖 `limits.conf` 中的值。


    确保在这两个文件中添加或编辑以下行：


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    编辑此文件后，必须重新启动服务器以确保所有更改生效。'
  raw: '![A352855_1_En_6_Fig28_HTML.jpg](A352855_1_En_6_Fig28_HTML.jpg)


    Figure 6-28.


    Assign managed servers to clusters


    Managed servers can be assigned to the clusters defined on the previous screens.
    Depending on the products deployed within the given environment, you might wish
    to spread the managed servers across different clusters. These can be reassigned
    later using the Administration Console.


    Machines define a host that manages processes within managed servers. You can
    create multiple machines on a given host or spread machines across multiple hosts.
    Figure [6-29](#A352855_1_En_6_Chapter.html#Fig29) displays the Configure Machines
    screen.


    ![A352855_1_En_6_Fig29_HTML.jpg](A352855_1_En_6_Fig29_HTML.jpg)


    Figure 6-29.


    Machine configuration


    It is important that a UNIX machine is created if the host is Linux or UNIX based.
    The machine configuration tells the WebLogic environment how to contact the node
    manager to control the managed servers.


    After the machine(s) have been configured, it is time to assign the managed servers
    to be created to the proper machines, as shown in Figure [6-30](#A352855_1_En_6_Chapter.html#Fig30).
    Usually, in a clustered environment, multiple machines exist, each with one node
    of the managed servers. This is what enables a single Administration Server to
    contact and control managed servers on different hosts or within different Middleware
    Homes


    ![A352855_1_En_6_Fig30_HTML.jpg](A352855_1_En_6_Fig30_HTML.jpg)


    Figure 6-30.


    Assigning managed servers to machines


    The Configuration Summary screen, displayed in Figure [6-31](#A352855_1_En_6_Chapter.html#Fig31),
    provides a last look at all of the configuration parameters prior to performing
    the configuration. If anything at this point looks incorrect, go back and make
    any necessary fixes before continuing.


    ![A352855_1_En_6_Fig31_HTML.jpg](A352855_1_En_6_Fig31_HTML.jpg)


    Figure 6-31.


    Configuration Summary screen


    After inspecting the Configuration Summary screen, click Create to start the configuration
    process. Figure [6-32](#A352855_1_En_6_Chapter.html#Fig32) shows the completed
    configuration.


    ![A352855_1_En_6_Fig32_HTML.jpg](A352855_1_En_6_Fig32_HTML.jpg)


    Figure 6-32.


    Domain configuration complete


    The OAM domain configuration is complete. Before starting it, there are several
    more required steps. The next chapter covers the installation and configuration
    of the Identity Manager components. Subsequently, the overall Identity and Access
    Manager environment is configured to work together.


    ## Summary


    This chapter was a walk-through of the installation of OAM. After the installation
    of the software files, you were shown the configuration of the OAM domain. At
    this point, all of the necessary files have been copied and the file system is
    ready. If your implementation only requires SSO, you can skip the next chapter
    on Identity Manager installation.


    # 7. Identity Manager Installation


    In the previous two chapters, you were provided with the instructions for installing
    and configuring Oracle Internet Directory (OID) and Oracle Access Manager (OAM).
    These two components set the foundation of Identity Storage and single sign–on
    (SSO). Identity Manager adds additional elements such as user self-service and
    governance to the environment, thereby completing the end-to-end identity life
    cycle management implementation. This chapter focuses on the installation and
    initial domain configuration of Oracle Identity Manager (OIM).


    ## Preinstallation Tasks


    ### Operating System Users


    For most Oracle application installs, operating system (OS) users and groups should
    be created to perform the installation and configuration tasks. Creating OS groups
    will allow other OS users to perform certain tasks related to the management of
    the application environment. The most common OS users and groups related to installing
    Oracle applications in Linux environments are the `oracle` user and `oinstall`
    or `dba` groups.


    To create the necessary `oinstall` and `dba` groups, perform the following commands
    as the root directory:


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd dba

    ```


    After the groups are created, create the `oracle` user:


    ```

    [root@clouddemolab home]# useradd  -g oinstall -G dba oracle

    ```


    Note


    -g indicates the primary group to which the user should be added. -G indicates
    any secondary groups.


    To set the password for the user, utilize the following command as the root user.


    ```

    [root@clouddemolab home]# passwd oracle

    ```


    ### Operating System Configuration


    Prior to installing the Oracle Fusion Middleware infrastructure and Oracle Identity
    Management software, it is important to ensure the OS meets the minimum requirements
    and configuration. The following presents the kernel parameters and packages and
    the file changes that are required.


    The following kernel parameters need to be set:


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    To set these parameters, edit the `sysctl.conf` file located in the `/etc` directory.


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    Add or edit the following lines in this section of the file:


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    After setting these values in the `sysctl.conf` file, you must activate and verify
    the new values are shown using this command:


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    The open file limits must be set to 4096 to support the instance. To do so, edit
    the `limits.conf` file.


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    If the environment is to be installed on Oracle Linux or RedHat Linux, you must
    perform the edit in `/etc/security/limits.d/90-nproc.conf` as well. If this is
    missed, the values in this file could override the values in the `limits.conf`
    file.


    In both of these files, ensure the following lines are added or edited:


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    After editing this file, the server must be rebooted to ensure all the changes
    take effect.'
