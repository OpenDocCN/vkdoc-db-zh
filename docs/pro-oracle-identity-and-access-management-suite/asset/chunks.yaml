  trans: '

    ## 配置身份管理器域


    必要的软件组件安装完成后，您可以继续配置 WebLogic 域以支持 OIM。此过程通过运行位于 `IDM_HOME/common/bin` 目录中的 `config`
    脚本启动。需要注意的是，此时您只是在配置 WebLogic 域，OIM 还未准备好运行。


    ### 基本约定


    为避免本章后续内容产生混淆，将使用以下约定。`MIDDLEWARE_HOME` 是安装 WLS 的基目录。`IDM_HOME` 是 WLS 安装目录中安装
    OIM 的目录，通常是一个名为 `Oracle_IDM1` 的目录。图 7-20 显示了配置向导。


    ![A352855_1_En_7_Fig20_HTML.jpg](img/A352855_1_En_7_Fig20_HTML.jpg)


    图 7-20.


    ### 创建新的 WebLogic 域


    创建一个新的 WebLogic 域。

    注意。

    在 Middleware Home 子目录中可以找到多个 `config.sh` 脚本实例。运行位于 `<MIDDLEWARE_HOME/Oracle_IDM1/common/bin`
    中的正确版本至关重要。


    由于这是首次在 WLS 环境中创建域，请选择“创建新的 WebLogic 域”。


    ### 选择域组件


    在此过程的下一步，选择 OIM 组件。如图 7-21 所示，此列表基于 WebLogic Home 目录中找到的软件。您会注意到 Oracle SOA Suite
    已被自动选中。如果在 WLS Home 中找不到 SOA Suite，系统将显示错误提示。在继续之前，请确保已安装任何缺失的软件。


    ![A352855_1_En_7_Fig21_HTML.jpg](img/A352855_1_En_7_Fig21_HTML.jpg)


    图 7-21.


    选择域组件。


    ### 输入域名和位置


    在配置过程中，系统会提示您输入要创建的域的名称。您可以保留默认名称 “base_domain”，也可以将其命名为在您的环境中更有意义的名称。示例请参见图 7-22。在某些情况下，可能需要将相关文件定位在
    Middleware Home 目录之外。这通常在需要跨物理主机共享存储的集群环境中进行。


    ![A352855_1_En_7_Fig22_HTML.jpg](img/A352855_1_En_7_Fig22_HTML.jpg)


    图 7-22.


    输入域名和位置。


    ### 管理员密码


    `weblogic` 的用户密码应设置为您环境中的标准密码。此密码将用于启动和停止受管服务器，以及登录 WebLogic 管理控制台和 Fusion Middleware
    Control。图 7-23 显示了密码配置屏幕的样子。


    ![A352855_1_En_7_Fig23_HTML.jpg](img/A352855_1_En_7_Fig23_HTML.jpg)


    图 7-23.


    管理员密码。


    ### 服务器启动模式


    启动模式决定了受管服务器的启动方式。在开发模式下，受管服务器可以从命令行启动和停止而无需密码。此外，可以在 WebLogic 控制台中进行配置更改并激活，而无需锁定环境。将启动模式配置为生产模式会锁定环境，以确保在未锁定控制台进行编辑的情况下无法进行任何更改。命令行工具也需要密码。这些选项如图
    7-24 所示。


    ![A352855_1_En_7_Fig24_HTML.jpg](img/A352855_1_En_7_Fig24_HTML.jpg)


    图 7-24.


    服务器启动模式。

    注意。

    锁定管理控制台可防止多个管理员进行更改并相互覆盖。


    ### 数据库模式检查


    输入 Java 数据库连接 (JDBC) 详细信息后，配置工具将验证这些信息。将显示任何错误。如果某个模式无法验证，请返回上一步以确保模式名称和详细信息正确。如果数据库模式不存在，请重新运行
    RCU 来创建它。图 7-25 显示了已完成的数据库检查。


    ![A352855_1_En_7_Fig25_HTML.jpg](img/A352855_1_En_7_Fig25_HTML.jpg)


    图 7-25.


    数据库模式检查。


    ### 选择可选配置


    如 AOM 安装章节所述，本书使用的示例采用了分离域。因此，每个组件（OID、OAM 和 OIM）都将拥有自己的管理服务器。如图 7-26 所示，选择“管理服务器”、“受管服务器”、“集群”和“计算机”。


    ![A352855_1_En_7_Fig26_HTML.jpg](img/A352855_1_En_7_Fig26_HTML.jpg)


    图 7-26.


    选择可选配置屏幕。


    ### 配置管理服务器


    管理服务器的默认端口是 7001，上一章中访问管理器管理侦听端口使用的就是这个端口。使用标准端口约定有助于消除混淆或遗忘端口。在本练习中，使用端口 7101，如图
    7-27 所示。随后，如果安装更多 WLS 实例，请使用端口 7201、7301 等。


    ![A352855_1_En_7_Fig27_HTML.jpg](img/A352855_1_En_7_Fig27_HTML.jpg)


    图 7-27.


    配置管理服务器屏幕。


    ### 配置受管服务器


    在此环境中，访问管理器和身份管理器安装在不同的 Oracle Middleware Homes 中。这意味着每个都由 WLS、管理服务器和受管服务器组成。如前所述，这样做是为了便于未来的维护，例如打补丁和升级。如果需要，它还允许在以后将这些层分离到不同的物理主机上。由于它们将在同一物理主机上但位于不同的
    WLS 中运行，因此每个管理服务器都需要自己的侦听端口。


    受管服务器将预填充安装使用的标准端口。如果需要，您可以更改端口或填充安全套接字层 (SSL) 侦听端口。在许多情况下，允许 HTTP 服务器或负载均衡器执行
    SSL 端点职责就足够了，从而通过将加密职责卸载到外部设备来获得一些性能提升。为了便于故障排除和未来维护，请将端口保留为默认值，如图 7-28 所示。


    ![A352855_1_En_7_Fig28_HTML.jpg](img/A352855_1_En_7_Fig28_HTML.jpg)


    图 7-28.


    配置受管服务器屏幕。


    ### 配置集群


    在本书的整个过程中，集群不是关注点。但是，为了便于以后创建集群，集群配置信息在此处输入，如图 7-29 所示。因此，WebLogic 域将预先配置好集群。实际上，此步骤创建了一个单节点集群，以后可以扩展以包含多台计算机和实例。


    ![A352855_1_En_7_Fig29_HTML.jpg](img/A352855_1_En_7_Fig29_HTML.jpg)


    图 7-29.


    配置集群屏幕。


    ### 将服务器分配给集群


    将受管服务器分配给所需的集群，如图 7-30 所示。请注意，可以创建单个集群并将所有受管服务器分配给它。但是，为了简化管理任务，每个受管服务器将在 WebLogic
    中分配到其自己的集群。


    ![A352855_1_En_7_Fig30_HTML.jpg](img/A352855_1_En_7_Fig30_HTML.jpg)


    图 7-30.


    将服务器分配给集群屏幕。


    此时应该注意，如果集群中只有一个节点，您可能会在受管服务器日志中看到与等待集群其他成员通信相关的错误。这些错误可以忽略，并且在向集群添加其他成员后会消失。

