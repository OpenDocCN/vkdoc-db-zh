- fmt: '# Configure Oracle Access Manager


    在第 9 章中，您配置了 OAM 并为其与 OIM 的集成进行了预配置。您还在 OID 轻量级目录访问协议（LDAP）存储中创建了必要的对象。这一切都是为了启动和运行
    OAM 并确保创建了正确的管理用户。您还在 WebLogic 层将 OID 集成为验证器。


    如前所述，此环境是一个拆分域，其中 OAM 和 OIM 安装在不同的 Middleware Home 和不同的 WebLogic 域中。因此，OAM 的配置将使用位于
    OAM 主目录中的 `idmConfigTool`。有关如何准备环境变量以使用此工具的详细信息，请参见表 11-1。


    ## 表 11-1. `idmConfigTool` 的环境变量


    | `MW_HOME` | 将其设置为 OAM 中间件软件的安装目录；例如，`/home/oracle/IAMMiddleware/` |

    | `JAVA_HOME` | 将其设置为 Java 安装目录；例如，`/home/oracle/java` |

    | `IDM_HOME` | 如果您在同一物理服务器上安装了 OID，请将其设置为 OID 安装目录；例如，`/home/oracle/OIDMiddleware`；如果
    OID 安装在单独的服务器上，请将其保留为空 |

    | `ORACLE_HOME` | 将其设置为 OAM 安装目录；例如，`/home/oracle/IAMMiddleware/Oracle_IAM` |


    `idmConfigTool.sh` 文件位于 `$ORACLE_HOME/idmtools/bin` 目录中。执行这些步骤时，应从此目录运行各个步骤。在此过程中，将创建并追加一个名为
    `automation.log` 的文件。


    要启动该过程，请创建一个名为 `OAMConfigPropertyFile` 的文件。此文件将包含用于为 OAM 和 OIM 集成配置 OAM 的相关信息。该文件应包含有关您配置的以下信息。相应地更新值：


    ```

    vi OAMConfigPropertyFile

    WLSHOST: 10.0.70.229

    WLSPORT: 17001

    WLSADMIN: weblogic

    WLSPASSWD: weblogic11

    ADMIN_SERVER_USER_PASSWORD: weblogic1

    IDSTORE_HOST: 10.0.70.229

    IDSTORE_PORT: 3060

    IDSTORE_BINDDN: cn=orcladmin

    IDSTORE_USERNAMEATTRIBUTE: cn

    IDSTORE_LOGINATTRIBUTE: uid

    IDSTORE_USERSEARCHBASE: cn=Users,dc=mycompany,dc=com

    IDSTORE_SEARCHBASE: dc=mycompany,dc=com

    IDSTORE_SYSTEMIDBASE: cn=systemids,dc=mycompany,dc=com

    IDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com

    IDSTORE_OAMSOFTWAREUSER: oamLDAP

    IDSTORE_OAMADMINUSER: oamadmin

    IDSTORE_DIRECTORYTYPE: OID

    POLICYSTORE_SHARES_IDSTORE: true

    PRIMARY_OAM_SERVERS: 10.0.70.229:5575

    WEBGATE_TYPE: ohsWebgate11g

    ACCESS_GATE_ID: Webgate_IDM

    OAM11G_IDM_DOMAIN_OHS_HOST:10.0.70.229

    OAM11G_IDM_DOMAIN_OHS_PORT:7777

    OAM11G_IDM_DOMAIN_OHS_PROTOCOL:http

    OAM11G_WG_DENY_ON_NOT_PROTECTED: false

    OAM11G_IMPERSONATION_FLAG: false

    OAM_TRANSFER_MODE: open

    OAM11G_OAM_SERVER_TRANSFER_MODE:open

    OAM11G_IDM_DOMAIN_LOGOUT_URLS: /console/jsp/common/logout.jsp,/em/targetauth/emaslogout.jsp,/oamsso/logout.html,/cgi-bin/logout.pl

    OAM11G_OIM_WEBGATE_PASSWD: gundam1

    OAM11G_SERVER_LOGIN_ATTRIBUTE: uid

    COOKIE_DOMAIN: .centroid.com

    OAM11G_IDSTORE_NAME: OIDIdentityStore

    OAM11G_IDSTORE_ROLE_SECURITY_ADMIN: OAMAdministrators

    OAM11G_SSO_ONLY_FLAG: false

    OAM11G_OIM_INTEGRATION_REQ: true

    OAM11G_SERVER_LBR_HOST:10.0.70.229

    OAM11G_SERVER_LBR_PORT:7777

    OAM11G_SERVER_LBR_PROTOCOL:http

    COOKIE_EXPIRY_INTERVAL: 120

    OAM11G_OIM_OHS_URL:http://10.0.70.229:7777/

    SPLIT_DOMAIN: false

    ```


    在此文件中，应如表 11-2 所示设置值。


    ## 表 11-2. `OAMConfigPropertyFile` 参数值


    | `WLSHost` | 安装 OAM 的服务器的主机名 |

    | `WLSPort` | OAM WebLogic 管理服务器的监听端口 |

    | `WLSADMIN` | OAM WebLogic 管理员用户名 `<weblogic>` |

    | `WLSPASSWD` | OAM WebLogic 管理员密码 |

    | `ADMIN_SERVER_USER_PASSWORD` | OAM 管理员密码 |

    | `IDSTORE_HOST` | 安装了 OID 的服务器的主机名 |

    | `IDSTORE_PORT` | OID 的 LDAP 端口 |

    | `IDSTORE_BINDDN` | 身份存储管理员用户的完全限定用户名 |

    | `IDSTORE_USERNAMEATTRIBUTE` | 指示包含用户用户名的身份存储属性；例如，`cn` |

    | `IDSTORE_LOGINATTRIBUTE` | 输入包含用户登录名的属性 |

    | `IDSTORE_USERSEARCHBASE` | 此值指示身份存储中 OAM 应开始搜索用户的位置；例如，`cn=users,dc=mycompany,dc=com`
    |

    | `IDSTORE_SEARCHBASE` | 使用身份存储的顶层；例如，`dc=mycompany,dc=com` |

    | `IDSTORE_SYSTEMIDBASE` | 输入身份存储中管理员或系统帐户的位置 |

    | `IDSTORE_GROUPSEARCHBASE` | 身份存储中组的位置 |

    | `IDSTORE_OAMSOFTWAREUSER` | 这应该是 OAM 用于连接到身份存储的用户名；例如，`oamLDAP` |

    | `IDSTORE_OAMADMINUSER` | OAM 将用于修改身份存储条目的用户的用户名 |

    | `IDSTORE_DIRECTORYTYPE` | 指示用作身份存储的服务器类型；例如，OID、AD、OpenLDAP |

    | `POLICYSTORE_SHARES_IDSTORE` | 如果 OAM 策略存储在与身份存储相同的位置，请将此值设置为 `true` |

    | `PRIMARY_OAM_SERVERS` | 列出 OAM 主机名 |

    | `WEBGATE_TYPE` | 输入 WebGate 的类型：`ohsWebgate11g` 或 `ohsWebGate10g` |

    | `ACCESS_GATE_ID` | 输入在 OAM 配置中用作 WebGate 的名称 |

    | `OAM11G_IDM_DOMAIN_OHS_HOST` | 安装 Oracle HTTP Server (OHS) 的主机名 |

    | `OAM11G_IDM_DOMAIN_OHS_PORT` | OHS 正在监听的端口 |

    | `OAM11G_IDM_DOMAIN_OHS_PROTOCOL` | 指示此 OHS 是否为安全套接字层 (SSL)；例如，`http` 或 `https`
    |

    | `OAM11G_WG_DENY_ON_NOT_PROTECTED` | 将此设置为 `true` 可使所有未在 OAM 中另行配置的 URL 模式拒绝访问
    |

    | `OAM11G_IMPERSONATION_FLAG` | 指示 OAM 是否应允许模拟；这在融合应用程序环境中很有用 |

    | `OAM_TRANSFER_MODE` | 配置 OAM 的通信模式；有效值为 `Open` 和 `Simple` |

    | `OAM11G_OAM_SERVER_TRANSFER_MODE` | 指示 OAM 将支持的通信类型；请注意，这应与 `OAM_Transfer_Mode`
    匹配 |

    | `OAM11G_IDM_DOMAIN_LOGOUT_URLS` | 配置将用于注销操作的 URL |

    | `OAM11G_OIM_WEBGATE_PASSWD` | 输入 WebGate 的密码 |

    | `OAM11G_SERVER_LOGIN_ATTRIBUTE` | 配置用于用户登录的属性名称 |

    | `COOKIE_DOMAIN` | 指示 cookie 有效的域名称 |

    | `OAM11G_IDSTORE_NAME` | 输入系统身份存储的名称 |

    | `OAM11G_IDSTORE_ROLE_SECURITY_ADMIN` | 输入身份存储中包含管理用户的组或角色的名称 |

    | `OAM11G_SSO_ONLY_FLAG` | 将此设置为 `true` 仅提供身份验证功能；设置为 `false` 将配置 OAM 同时执行授权检查
    |

    | `OAM11G_OIM_INTEGRATION_REQ` | 输入 `true` 以指示将集成 OIM 和 OAM |

    | `OAM11G_SERVER_LBR_HOST` | 提供 OAM 位置的负载均衡器 URL |

    | `OAM11G_SERVER_LBR_PORT` | 提供负载均衡器端口 |

    | `OAM11G_SERVER_LBR_PROTOCOL` | 指示 URL 是否为 SSL |

    | `COOKIE_EXPIRY_INTERVAL` | 设置此值 |

    | `OAM11G_OIM_OHS_URL` | 如果 OAM 和 OIM 前置有 OHS，请提供 URL |

    | `SPLIT_DOMAIN` | 如果 OAM 和 OIM 安装在不同的 WebLogic 服务器中，请将此设置为 `true` |'
  raw: '## Configure Oracle Access Manager


    In Chapter [9](#A352855_1_En_9_Chapter.html), you configured OAM and preconfigured
    it for integration with OIM. You also created the necessary objects in the OID
    Lightweight Directory Access Protocol (LDAP) store. This was all to get OAM up
    and running and ensure the proper administrative users were created. You also
    integrated OID as an authenticator at the WebLogic layer.


    As stated earlier, this environment is a split domain where OAM and OIM are installed
    in separate Middleware Homes and in separate WebLogic domains. As such, the configuration
    of OAM will use the idmConfigTool located in the OAM home directory. See Table
    [11-1](#A352855_1_En_11_Chapter.html#Tab1) for details on how to prepare your
    environment variables to use this tool.


    Table 11-1.


    Environment Variables for the idmConfigTool


    | `MW_HOME` | Set this to the installation directory of the OAM middleware software;
    for example, `/home/oracle/IAMMiddleware/` |

    | `JAVA_HOME` | Set this to the Java installation directory; for example, `/home/oracle/java`
    |

    | `IDM_HOME` | If you have installed OID on the same physical server, set this
    to the OID installation directory; for example, `/home/oracle/OIDMiddleware`;
    if OID is installed on a separate server, leave this null |

    | `ORACLE_HOME` | Set this to the OAM installation directory; for example, `/home/oracle/IAMMiddleware/Oracle_IAM`
    |


    The `idmConfigTool.sh` file is located in the `$ORACLE_HOME/idmtools/bin` directory.
    When performing these steps, the various steps should be run from this directory.
    During the process, a file called `automation.log` will be created and appended.


    To start the process, create a file called `OAMConfigPropertyFile`. This will
    contain the pertinent information to configure OAM for the OAM and OIM integration.
    The file should contain the following information about your configuration. Update
    the values accordingly:


    ```

    vi OAMConfigPropertyFile

    WLSHOST: 10.0.70.229

    WLSPORT: 17001

    WLSADMIN: weblogic

    WLSPASSWD: weblogic11

    ADMIN_SERVER_USER_PASSWORD: weblogic1

    IDSTORE_HOST: 10.0.70.229

    IDSTORE_PORT: 3060

    IDSTORE_BINDDN: cn=orcladmin

    IDSTORE_USERNAMEATTRIBUTE: cn

    IDSTORE_LOGINATTRIBUTE: uid

    IDSTORE_USERSEARCHBASE: cn=Users,dc=mycompany,dc=com

    IDSTORE_SEARCHBASE: dc=mycompany,dc=com

    IDSTORE_SYSTEMIDBASE: cn=systemids,dc=mycompany,dc=com

    IDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com

    IDSTORE_OAMSOFTWAREUSER: oamLDAP

    IDSTORE_OAMADMINUSER: oamadmin

    IDSTORE_DIRECTORYTYPE: OID

    POLICYSTORE_SHARES_IDSTORE: true

    PRIMARY_OAM_SERVERS: 10.0.70.229:5575

    WEBGATE_TYPE: ohsWebgate11g

    ACCESS_GATE_ID: Webgate_IDM

    OAM11G_IDM_DOMAIN_OHS_HOST:10.0.70.229

    OAM11G_IDM_DOMAIN_OHS_PORT:7777

    OAM11G_IDM_DOMAIN_OHS_PROTOCOL:http

    OAM11G_WG_DENY_ON_NOT_PROTECTED: false

    OAM11G_IMPERSONATION_FLAG: false

    OAM_TRANSFER_MODE: open

    OAM11G_OAM_SERVER_TRANSFER_MODE:open

    OAM11G_IDM_DOMAIN_LOGOUT_URLS: /console/jsp/common/logout.jsp,/em/targetauth/emaslogout.jsp,/oamsso/logout.html,/cgi-bin/logout.pl

    OAM11G_OIM_WEBGATE_PASSWD: gundam1

    OAM11G_SERVER_LOGIN_ATTRIBUTE: uid

    COOKIE_DOMAIN: .centroid.com

    OAM11G_IDSTORE_NAME: OIDIdentityStore

    OAM11G_IDSTORE_ROLE_SECURITY_ADMIN: OAMAdministrators

    OAM11G_SSO_ONLY_FLAG: false

    OAM11G_OIM_INTEGRATION_REQ: true

    OAM11G_SERVER_LBR_HOST:10.0.70.229

    OAM11G_SERVER_LBR_PORT:7777

    OAM11G_SERVER_LBR_PROTOCOL:http

    COOKIE_EXPIRY_INTERVAL: 120

    OAM11G_OIM_OHS_URL:http://10.0.70.229:7777/

    SPLIT_DOMAIN: false

    ```


    In this file, the values should be set as seen in Table [11-2](#A352855_1_En_11_Chapter.html#Tab2).


    Table 11-2.


    `OAMConfigPropertyFile` Parameter Values


    | `WLSHost` | Hostname of the server where OAM is installed |

    | `WLSPort` | OAM WebLogic Administration Server listen port |

    | `WLSADMIN` | OAM WebLogic administrator username <weblogic> |

    | `WLSPASSWD` | OAM WebLogic administrator password |

    | `ADMIN_SERVER_USER_PASSWORD` | OAM administrator password |

    | `IDSTORE_HOST` | Hostname of the server with OID installed |

    | `IDSTORE_PORT` | LDAP port of the OID |

    | `IDSTORE_BINDDN` | Fully qualified username of the Identity Store administrator
    user |

    | `IDSTORE_USERNAMEATTRIBUTE` | Indicates the Identity Store attribute that contains
    a user’s username; for example, cn |

    | `IDSTORE_LOGINATTRIBUTE` | Enter the attribute that contains user’s login name
    |

    | `IDSTORE_USERSEARCHBASE` | This value indicates where within the Identity Store
    OAM should start its search for users; for example, `cn=users,dc=mycompany,dc=com`
    |

    | `IDSTORE_SEARCHBASE` | Use the top level of the Identity Store; for example,
    `dc=mycompany, dc=com` |

    | `IDSTORE_SYSTEMIDBASE` | Enter the location of adminsitrative or system accounts
    within the Identity Store |

    | `IDSTORE_GROUPSEARCHBASE` | Location of groups within the Identity Store |

    | `IDSTORE_OAMSOFTWAREUSER` | This should be the name of the user OAM will use
    to connect to the Identity Store; for example, `oamLDAP` |

    | `IDSTORE_OAMADMINUSER` | The username of the user OAM will modify Identity Store
    entries with |

    | `IDSTORE_DIRECTORYTYPE` | Indicate the type of server used as the identity store;
    for example, OID, AD, OpenLDAP |

    | `POLICYSTORE_SHARES_IDSTORE` | Set this value to true if OAM policies are stored
    in the same store as the Identity Store |

    | `PRIMARY_OAM_SERVERS` | List the OAM hostnames |

    | `WEBGATE_TYPE` | Enter the type of WebGate: ohsWebgate11g or ohsWebGate10g |

    | `ACCESS_GATE_ID` | Enter the name to use as the WebGate in the OAM configuration
    |

    | `OAM11G_IDM_DOMAIN_OHS_HOST` | Hostname where Oracle HTTP Server (OHS) is installed
    |

    | `OAM11G_IDM_DOMAIN_OHS_PORT` | Port OHS is listening on |

    | `OAM11G_IDM_DOMAIN_OHS_PROTOCOL` | Indicate whether this OHS is Secure Sockets
    Layer (SSL) or not; for example, http or https |

    | `OAM11G_WG_DENY_ON_NOT_PROTECTED` | Set this to true to make all URL patterns
    deny access if they are not otherwise configured in OAM |

    | `OAM11G_IMPERSONATION_FLAG` | Indicate whether OAM should allow impersonation;
    this is useful in fusion application environments |

    | `OAM_TRANSFER_MODE` | Configure the communication mode of OAM; valid values
    are Open and Simple |

    | `OAM11G_OAM_SERVER_TRANSFER_MODE` | Indicate what type of communication OAM
    will support; note that this should match the `OAM_Transfer_Mode` |

    | `OAM11G_IDM_DOMAIN_LOGOUT_URLS` | Configure the URL that will be used for Logout
    operations |

    | `OAM11G_OIM_WEBGATE_PASSWD` | Enter the password for the WebGate |

    | `OAM11G_SERVER_LOGIN_ATTRIBUTE` | Configure the name of the attribute to be
    used for user login |

    | `COOKIE_DOMAIN` | Indicate the name of the domain where the cookie will be valid
    |

    | `OAM11G_IDSTORE_NAME` | Enter the name of the system Identity Store |

    | `OAM11G_IDSTORE_ROLE_SECURITY_ADMIN` | Enter the name of the group or role within
    the Identity Store that contains the adminsitration users |

    | `OAM11G_SSO_ONLY_FLAG` | Set this to true to provide Authentication functions
    only; setting this to false will configure OAM to perform Authorization checks
    as well |

    | `OAM11G_OIM_INTEGRATION_REQ` | Enter true to indicate that OIM and OAM will
    be integrated |

    | `OAM11G_SERVER_LBR_HOST` | Provide the load balancer URL for the OAM location
    |

    | `OAM11G_SERVER_LBR_PORT` | Provide the load balancer port |

    | `OAM11G_SERVER_LBR_PROTOCOL` | Indicate whether the URL is SSL or not |

    | `COOKIE_EXPIRY_INTERVAL` | Set this |

    | `OAM11G_OIM_OHS_URL` | If OAM and OIM are fronted by an OHS, provide the URL
    |

    | `SPLIT_DOMAIN` | Set this to true if OAM and OIM are installed in separate WebLogic
    servers |'
  trans: '# 配置 Oracle 访问管理器


    在第 9 章中，您配置了 OAM 并为其与 OIM 的集成进行了预配置。您还在 OID 轻量级目录访问协议（LDAP）存储中创建了必要的对象。这一切都是为了启动和运行
    OAM 并确保创建了正确的管理用户。您还在 WebLogic 层将 OID 集成为验证器。


    如前所述，此环境是一个拆分域，其中 OAM 和 OIM 安装在不同的 Middleware Home 和不同的 WebLogic 域中。因此，OAM 的配置将使用位于
    OAM 主目录中的 `idmConfigTool`。有关如何准备环境变量以使用此工具的详细信息，请参见表 11-1。


    ## 表 11-1. `idmConfigTool` 的环境变量


    | `MW_HOME` | 将其设置为 OAM 中间件软件的安装目录；例如，`/home/oracle/IAMMiddleware/` |

    | `JAVA_HOME` | 将其设置为 Java 安装目录；例如，`/home/oracle/java` |

    | `IDM_HOME` | 如果您在同一物理服务器上安装了 OID，请将其设置为 OID 安装目录；例如，`/home/oracle/OIDMiddleware`；如果
    OID 安装在单独的服务器上，请将其保留为空 |

    | `ORACLE_HOME` | 将其设置为 OAM 安装目录；例如，`/home/oracle/IAMMiddleware/Oracle_IAM` |


    `idmConfigTool.sh` 文件位于 `$ORACLE_HOME/idmtools/bin` 目录中。执行这些步骤时，应从此目录运行各个步骤。在此过程中，将创建并追加一个名为
    `automation.log` 的文件。


    要启动该过程，请创建一个名为 `OAMConfigPropertyFile` 的文件。此文件将包含用于为 OAM 和 OIM 集成配置 OAM 的相关信息。该文件应包含有关您配置的以下信息。相应地更新值：


    ```

    vi OAMConfigPropertyFile

    WLSHOST: 10.0.70.229

    WLSPORT: 17001

    WLSADMIN: weblogic

    WLSPASSWD: weblogic11

    ADMIN_SERVER_USER_PASSWORD: weblogic1

    IDSTORE_HOST: 10.0.70.229

    IDSTORE_PORT: 3060

    IDSTORE_BINDDN: cn=orcladmin

    IDSTORE_USERNAMEATTRIBUTE: cn

    IDSTORE_LOGINATTRIBUTE: uid

    IDSTORE_USERSEARCHBASE: cn=Users,dc=mycompany,dc=com

    IDSTORE_SEARCHBASE: dc=mycompany,dc=com

    IDSTORE_SYSTEMIDBASE: cn=systemids,dc=mycompany,dc=com

    IDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com

    IDSTORE_OAMSOFTWAREUSER: oamLDAP

    IDSTORE_OAMADMINUSER: oamadmin

    IDSTORE_DIRECTORYTYPE: OID

    POLICYSTORE_SHARES_IDSTORE: true

    PRIMARY_OAM_SERVERS: 10.0.70.229:5575

    WEBGATE_TYPE: ohsWebgate11g

    ACCESS_GATE_ID: Webgate_IDM

    OAM11G_IDM_DOMAIN_OHS_HOST:10.0.70.229

    OAM11G_IDM_DOMAIN_OHS_PORT:7777

    OAM11G_IDM_DOMAIN_OHS_PROTOCOL:http

    OAM11G_WG_DENY_ON_NOT_PROTECTED: false

    OAM11G_IMPERSONATION_FLAG: false

    OAM_TRANSFER_MODE: open

    OAM11G_OAM_SERVER_TRANSFER_MODE:open

    OAM11G_IDM_DOMAIN_LOGOUT_URLS: /console/jsp/common/logout.jsp,/em/targetauth/emaslogout.jsp,/oamsso/logout.html,/cgi-bin/logout.pl

    OAM11G_OIM_WEBGATE_PASSWD: gundam1

    OAM11G_SERVER_LOGIN_ATTRIBUTE: uid

    COOKIE_DOMAIN: .centroid.com

    OAM11G_IDSTORE_NAME: OIDIdentityStore

    OAM11G_IDSTORE_ROLE_SECURITY_ADMIN: OAMAdministrators

    OAM11G_SSO_ONLY_FLAG: false

    OAM11G_OIM_INTEGRATION_REQ: true

    OAM11G_SERVER_LBR_HOST:10.0.70.229

    OAM11G_SERVER_LBR_PORT:7777

    OAM11G_SERVER_LBR_PROTOCOL:http

    COOKIE_EXPIRY_INTERVAL: 120

    OAM11G_OIM_OHS_URL:http://10.0.70.229:7777/

    SPLIT_DOMAIN: false

    ```


    在此文件中，应如表 11-2 所示设置值。


    ## 表 11-2. `OAMConfigPropertyFile` 参数值


    | `WLSHost` | 安装 OAM 的服务器的主机名 |

    | `WLSPort` | OAM WebLogic 管理服务器的监听端口 |

    | `WLSADMIN` | OAM WebLogic 管理员用户名 `<weblogic>` |

    | `WLSPASSWD` | OAM WebLogic 管理员密码 |

    | `ADMIN_SERVER_USER_PASSWORD` | OAM 管理员密码 |

    | `IDSTORE_HOST` | 安装了 OID 的服务器的主机名 |

    | `IDSTORE_PORT` | OID 的 LDAP 端口 |

    | `IDSTORE_BINDDN` | 身份存储管理员用户的完全限定用户名 |

    | `IDSTORE_USERNAMEATTRIBUTE` | 指示包含用户用户名的身份存储属性；例如，`cn` |

    | `IDSTORE_LOGINATTRIBUTE` | 输入包含用户登录名的属性 |

    | `IDSTORE_USERSEARCHBASE` | 此值指示身份存储中 OAM 应开始搜索用户的位置；例如，`cn=users,dc=mycompany,dc=com`
    |

    | `IDSTORE_SEARCHBASE` | 使用身份存储的顶层；例如，`dc=mycompany,dc=com` |

    | `IDSTORE_SYSTEMIDBASE` | 输入身份存储中管理员或系统帐户的位置 |

    | `IDSTORE_GROUPSEARCHBASE` | 身份存储中组的位置 |

    | `IDSTORE_OAMSOFTWAREUSER` | 这应该是 OAM 用于连接到身份存储的用户名；例如，`oamLDAP` |

    | `IDSTORE_OAMADMINUSER` | OAM 将用于修改身份存储条目的用户的用户名 |

    | `IDSTORE_DIRECTORYTYPE` | 指示用作身份存储的服务器类型；例如，OID、AD、OpenLDAP |

    | `POLICYSTORE_SHARES_IDSTORE` | 如果 OAM 策略存储在与身份存储相同的位置，请将此值设置为 `true` |

    | `PRIMARY_OAM_SERVERS` | 列出 OAM 主机名 |

    | `WEBGATE_TYPE` | 输入 WebGate 的类型：`ohsWebgate11g` 或 `ohsWebGate10g` |

    | `ACCESS_GATE_ID` | 输入在 OAM 配置中用作 WebGate 的名称 |

    | `OAM11G_IDM_DOMAIN_OHS_HOST` | 安装 Oracle HTTP Server (OHS) 的主机名 |

    | `OAM11G_IDM_DOMAIN_OHS_PORT` | OHS 正在监听的端口 |

    | `OAM11G_IDM_DOMAIN_OHS_PROTOCOL` | 指示此 OHS 是否为安全套接字层 (SSL)；例如，`http` 或 `https`
    |

    | `OAM11G_WG_DENY_ON_NOT_PROTECTED` | 将此设置为 `true` 可使所有未在 OAM 中另行配置的 URL 模式拒绝访问
    |

    | `OAM11G_IMPERSONATION_FLAG` | 指示 OAM 是否应允许模拟；这在融合应用程序环境中很有用 |

    | `OAM_TRANSFER_MODE` | 配置 OAM 的通信模式；有效值为 `Open` 和 `Simple` |

    | `OAM11G_OAM_SERVER_TRANSFER_MODE` | 指示 OAM 将支持的通信类型；请注意，这应与 `OAM_Transfer_Mode`
    匹配 |

    | `OAM11G_IDM_DOMAIN_LOGOUT_URLS` | 配置将用于注销操作的 URL |

    | `OAM11G_OIM_WEBGATE_PASSWD` | 输入 WebGate 的密码 |

    | `OAM11G_SERVER_LOGIN_ATTRIBUTE` | 配置用于用户登录的属性名称 |

    | `COOKIE_DOMAIN` | 指示 cookie 有效的域名称 |

    | `OAM11G_IDSTORE_NAME` | 输入系统身份存储的名称 |

    | `OAM11G_IDSTORE_ROLE_SECURITY_ADMIN` | 输入身份存储中包含管理用户的组或角色的名称 |

    | `OAM11G_SSO_ONLY_FLAG` | 将此设置为 `true` 仅提供身份验证功能；设置为 `false` 将配置 OAM 同时执行授权检查
    |

    | `OAM11G_OIM_INTEGRATION_REQ` | 输入 `true` 以指示将集成 OIM 和 OAM |

    | `OAM11G_SERVER_LBR_HOST` | 提供 OAM 位置的负载均衡器 URL |

    | `OAM11G_SERVER_LBR_PORT` | 提供负载均衡器端口 |

    | `OAM11G_SERVER_LBR_PROTOCOL` | 指示 URL 是否为 SSL |

    | `COOKIE_EXPIRY_INTERVAL` | 设置此值 |

    | `OAM11G_OIM_OHS_URL` | 如果 OAM 和 OIM 前置有 OHS，请提供 URL |

    | `SPLIT_DOMAIN` | 如果 OAM 和 OIM 安装在不同的 WebLogic 服务器中，请将此设置为 `true` |'
- fmt: '# 配置 OAM 集成


    创建文件后，你现在可以使用 `–configOAM` 选项运行 `idmConfigTool` 来为集成设置 OAM。运行此步骤将配置 OAM 身份存储并注册必要的认证策略。系统将提示你配置
    OAM 软件用户、OAM 管理员用户和 OAM WebLogic 用户的密码。如果没有报告错误，请重启 OAM 环境，包括 OAM 受管服务器和管理服务器。输出应与下面类似。你还应该检查
    `Automation.log` 文件是否有任何错误。


    ```

    [oracle@clouddemolab bin]$ ./idmConfigTool.sh  -configOAM input_file=OAMConfigPropertyFile

    Enter ID Store Bind DN Password :

    Enter User Password for IDSTORE_PWD_OAMSOFTWAREUSER:

    Confirm User Password for IDSTORE_PWD_OAMSOFTWAREUSER:

    Enter User Password for IDSTORE_PWD_OAMADMINUSER:

    Confirm User Password for IDSTORE_PWD_OAMADMINUSER:

    ^[[BConnecting to t3://10.0.70.229:17001

