- fmt: '# OHS 安装与配置


    默认情况下，安装将使用端口 `7777` 作为 OHS 服务器端口。如果您选择使用不同的端口，例如 `80`、`443` 或两者，可以通过修改 `staticports.ini`
    文件来完成配置。或者，您也可以在之后更新位于实例配置目录中的 `httpd.config` 文件。图 [8-8](#A352855_1_En_8_Chapter.html#Fig8)
    展示了使用“自动端口配置”设置的安装过程。


    ![A352855_1_En_8_Fig8_HTML.jpg](A352855_1_En_8_Fig8_HTML.jpg)

