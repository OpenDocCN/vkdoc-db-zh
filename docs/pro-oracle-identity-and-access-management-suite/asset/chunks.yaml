    您已完成 OHS 的安装和配置，现在拥有一个可用作您各种应用程序前端的 Web 服务器。通过 OHS，您将获得 Oracle WebLogic 模块，该模块允许您配置各种位置由底层
    WebLogic 应用服务器处理。`Mod_wl_ohs` 包含处理基于 WebLogic 的应用程序的反向代理和集群故障转移所需的配置。本章下一节将介绍在
    HTTP 服务器上安装和配置 OAM WebGate 的步骤。


    ## Oracle Access Manager WebGate 安装与配置


    允许 OAM 保护资源和处理 SSO 的关键组件是 WebGate。当请求进入时，OAM WebGate 评估请求并确定是否需要认证。如果请求的资源受保护，WebGate
    将把认证责任移交给 OAM。一旦 OAM 对用户进行了认证，它会在浏览器中设置会话信息，WebGate 利用这些信息允许用户访问被允许的应用程序。


    WebGate 安装过程与其他安装程序类似，从图 [8-13](#A352855_1_En_8_Chapter.html#Fig13) 所示的“欢迎”屏幕开始。重要的是要确保版本与您已安装的
    OAM 版本兼容。


    ![A352855_1_En_8_Fig13_HTML.jpg](A352855_1_En_8_Fig13_HTML.jpg)

    *图 8-13. 安装开始*


    OAM WebGate 安装的启动方式与其他 Oracle 应用程序的安装非常相似，使用 Universal Installer。从下载的安装介质 `Disk1`
    中，执行：

    ```

    ./runInstaller.sh –jreLoc /home/oracle/jdk1.6.0_45/jre

    ```

    如果您在开始时花时间确保满足所有操作系统先决条件，此屏幕应正常完成所有检查。如果任何检查失败，请在继续之前花时间纠正问题。有关已完成的先决条件检查示例，请参见图
    [8-14](#A352855_1_En_8_Chapter.html#Fig14)。


    ![A352855_1_En_8_Fig14_HTML.jpg](A352855_1_En_8_Fig14_HTML.jpg)

    *图 8-14. 先决条件检查屏幕*


    Oracle WebGate 应安装在与 OHS 相同的 Middleware Home 位置中。如果这是在 WebLogic Middleware Home
    中完成的，请确保 WebGate 软件共享此主目录。列出的 Oracle Home Directory 在该目录中应该是唯一的，如图 [8-15](#A352855_1_En_8_Chapter.html#Fig15)
    所示。


    ![A352855_1_En_8_Fig15_HTML.jpg](A352855_1_En_8_Fig15_HTML.jpg)

    *图 8-15. 安装位置*


    如图 [8-16](#A352855_1_En_8_Chapter.html#Fig16) 所示的“安装摘要”屏幕展示了要安装的组件及其位置的摘要。请花时间确保一切看起来正确。


    ![A352855_1_En_8_Fig16_HTML.jpg](A352855_1_En_8_Fig16_HTML.jpg)

    *图 8-16. 安装详细信息*


    与本书中安装的其他产品一样，OHS 11g WebGate 安装程序提供了一个进度指示器，如图 [8-17](#A352855_1_En_8_Chapter.html#Fig17)
    所示。如果出现任何错误，您可以监控指示的安装日志。


    ![A352855_1_En_8_Fig17_HTML.jpg](A352855_1_En_8_Fig17_HTML.jpg)

    *图 8-17. 安装进度屏幕*


    在安装阶段结束时，请记下图 [8-18](#A352855_1_En_8_Chapter.html#Fig18) 所示完成屏幕上提供的详细信息。


    ![A352855_1_En_8_Fig18_HTML.jpg](A352855_1_En_8_Fig18_HTML.jpg)

    *图 8-18. 安装完成屏幕*


    这完成了 OAM WebGate 的安装。在下一节中，您将进行在 OHS 环境中 WebGate 的初始配置和部署。'
