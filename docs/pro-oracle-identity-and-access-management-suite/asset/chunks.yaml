    的说明可以在第 4 章找到。按照这些说明，在名为`IAMMiddleware`的目录中创建一个 home。这确保了 OAM 环境与 OID 中间件目录结构分离。


    Oracle Identity and Access Manager Installer 仅用于安装 Oracle Access Manager 和 Oracle
    Identity Manager。因此，它不会提示您选择要安装的组件。如图 6-14 所示，您将看到计划安装内容的摘要。


    ![A352855_1_En_6_Fig14_HTML.jpg](img/A352855_1_En_6_Fig14_HTML.jpg)


    **图 6-14. 组件摘要**


    ## 先决条件检查


