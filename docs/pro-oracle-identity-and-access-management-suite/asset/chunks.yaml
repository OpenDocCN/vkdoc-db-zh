    # Oracle 身份管理器 (Oracle Identity Manager)


    与 `OAM` 类似，`OIM` 也依赖 `WebLogic` 架构来实现性能集群和高可用性。然而，由于其依赖 Oracle 面向服务的架构 (`SOA`)，因此多了一层复杂性。此外，配置为使用
    `RAC 数据库` 的 `OIM` 集群，如果在数据库层面发生故障，将要求用户重新提交其请求。为了提供高可用性和负载均衡以提升性能，`OIM` 必须配置为从
    Web 层到数据库和 `LDAP` 层的每一级都实现集群。图 2-10 展示了 Oracle 身份管理的高可用性架构。


    ![A352855_1_En_2_Fig10_HTML.jpg](img/A352855_1_En_2_Fig10_HTML.jpg)


    图 2-10. Oracle 身份管理本地高可用性架构


    图 2-10 有几个细节需要注意。


    *   一个 `OIM` 托管服务器已部署在 `OIM 主机 1` 和 `OIM 主机 2` 上。

    *   一个 `SOA` 托管服务器已部署在 `OIM 主机 1` 和 `OIM 主机 2` 上。

    *   `管理服务器` 可以安装在两台主机上，但一次只能在一个节点上运行。

    *   `RAC 数据库` 在两个节点上都配置了 Java 数据库连接 (`JDBC`) 多数据源，以防范数据库节点故障。

    *   为 `OIM` 和 `SOA` 配置的虚拟主机名允许在节点丢失时进行故障转移。


    通过将这些架构应用于 Oracle 身份与访问管理的各个组件，组织可以创建一个可扩展且高可用的环境。虽然图示仅展示了一个双节点集群，但它们可以扩展以包含更多节点，甚至可以扩展到包含多个数据中心。然而，扩展到额外数据中心并提供数据复制和分区超出了本书的讨论范围。讨论这些是为了让读者在实施环境前考虑这些选项，因为这需要特别考量。


    Oracle 身份与访问管理的每个组件都在单独的章节中进行了介绍，因为每个都是一个构建块，可以根据组织需求的增长单独实施。虽然它们可以安装在完全独立的硬件或单台服务器上，但将它们安装在独立的
    `WLS`（WebLogic Server）中将简化软件生命周期管理。


    根据需要分阶段实施，允许组织安装满足其需求的最基础软件。例如，如果组织的短期需求是一个用于集中管理或应用程序身份验证的身份存储库，那么可以只利用 `Oracle
    目录服务`，而无需增加 `身份管理器` 或 `访问管理器` 的开销。随后可以添加 `OAM` 以提供单点登录 (`SSO`)，之后再实施 `OIM` 来完成整个技术栈，并提供对身份治理和完整身份生命周期管理的访问。


    将身份与访问管理的各个组件保留在独立的 `WebLogic` 环境中，可以简化软件生命周期的管理。很多时候，组织可能需要升级技术栈中的某一部分，例如 `Oracle
    目录服务`，而保持 `OIM` 和 `OAM` 为当前版本。`WLS` 可能需要为 `OIM` 打补丁，但这个补丁可能会对 `OAM` 产生不利影响。在这些情况下，将每个组件保持在独立的
    `WLS 主目录` 中，将确保补丁和升级可以在不影响其他功能的情况下执行和测试。


    在决定如何实施这些组件时，必须权衡所选方法的复杂性和可管理性。对于某些组织来说，在独立的 `WebLogic` 环境中安装每个组件可能是最佳的总体选择；而另一些组织可能决定将
    `OAM` 和 `OIM` 组合在同一个域中，同时将 `Oracle 目录服务器` 分离出来是最佳方案。


    ## 先决条件


    与任何软件一样，Oracle 身份与访问管理套件也有自己的一系列要求，必须满足这些要求才能成功实施。与 Oracle 所有产品一样，Oracle 提供了经过认证的环境列表，包括
    `操作系统`、`Java` 运行时环境、应用程序服务器和 `CPU` 架构。满足这些认证将确保环境在基准水平上运行，并在需要时获得 Oracle 的适当支持。


    ### 操作系统


    `中间件融合` (`Fusion Middleware`) 套件的产品和应用程序可以部署在多种经过认证的 `操作系统` 上。每个组织运行其选择的 `操作系统`
    都有不同的原因。因此，本书的范围不包括 `操作系统` 建议。在规划阶段确保 Oracle 认证了将使用的 `操作系统` 非常重要。这些认证还将包括为确保安装成功所需的任何补丁和软件包。


    ### 中间件融合硬件要求


    满足身份与访问管理的系统要求首先要确保满足 `中间件融合` 环境的硬件要求。这包括 `CPU`、内存、存储和网络配置。这里提供的信息代表了 Oracle 提供的最低要求，但在大多数情况下，超出这些最低要求将为增长提供空间，并能应对应用程序负载的突然变化。


    在其安装规划指南中，Oracle 提供了典型的 `CPU` 配置列表。对于身份与访问管理 `11.1.2.x`，建议环境满足以下准则。每个组件的推荐架构见表
    2-1。


    表 2-1. 推荐的 CPU 配置


    | 托管服务器 | 处理器 |

    | --- | --- |

    | Oracle 访问管理器 | 6 个或更多 X Pentium 1.5 GHz 或更高 |

    | Oracle 目录服务 | 2 个或更多 X Pentium 1.5 GHz 或更高 |

    | Oracle 身份管理器 | 6 个或更多 X Pentium 1.5 GHz 或更高 |


    一般来说，Oracle 身份与访问管理产品要求最低可用内存大于 4 GB。因此，必须使用 64 位 `操作系统` 并安装在 64 位 `CPU` 架构上。还应注意的是，64
    位 `CPU` 每秒能够执行的计算比 32 位 `CPU` 更多。尽管在许多情况下，Oracle 提供了其产品的 32 位版本，但 64 位处理能力和支持的增长为性能和可扩展性带来了许多改进。

