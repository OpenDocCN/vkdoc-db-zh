  trans: '

    ### 操作系统配置


    在安装 Oracle Fusion Middleware 基础架构和 Oracle Identity Management 软件之前，确保操作系统满足最低要求和配置至关重要。以下列出了所需的内核参数、软件包以及需要进行的文件更改。


    需要设置以下内核参数：


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    要设置这些参数，请编辑位于 `/etc` 目录下的 `sysctl.conf` 文件。


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    在该文件的相应部分添加或编辑以下行：


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    在 `sysctl.conf` 文件中设置这些值后，您必须激活这些设置并使用以下命令验证新值是否生效：


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    必须将打开文件限制设置为 4096 以支持该实例。为此，请编辑 `limits.conf` 文件。


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    如果环境要安装在 Oracle Linux 或 RedHat Linux 上，您还必须在 `/etc/security/limits.d/90-nproc.conf`
    中进行编辑。如果遗漏了此步骤，该文件中的值可能会覆盖 `limits.conf` 文件中的值。


    在上面列出的两个文件中，确保添加或编辑以下行：


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    编辑此文件后，必须重启服务器以确保所有更改生效。


    ### 操作系统软件包


    每个 Oracle 应用程序都有自己的一套必需软件包。根据您使用的 Linux 版本，安装过程可能有所不同。在下面的列表中，请注意，某些软件包需要在 64
    位操作系统上同时安装 32 位和 64 位版本。如果这些软件包未安装，安装将无法正常完成。Oracle 安装程序会检查这些软件包，并在安装过程中显示错误。


    ```

    binutils-2.20.51.0.2-5.28.el6

    compat-libcap1-1.10-1

    compat-libstdc++-33-3.2.3-69.el6 for x86_64

    compat-libstdc++-33-3.2.3-69.el6 for i686

    gcc-4.4.4-13.el6

    gcc-c++-4.4.4-13.el6 glibc-2.12-1.7.el6 for x86_64 glibc-2.12-1.7.el6 for i686
    glibc-devel-2.12-1.7.el6 for i686 libaio-0.3.107-10.el6 libaio-devel-0.3.107-10.el6
    libgcc-4.4.4-13.el6 libstdc++-4.4.4-13.el6 for x86_64 libstdc++-4.4.4-13.el6 for
    i686 libstdc++-devel-4.4.4-13.el6 libXext for i686 libXtst for i686 libXext for
    x86_64 libXtst for x86_64 openmotif-2.2.3 for x86_64 openmotif22-2.2.3 for x86_64
    redhat-lsb-core-4.0-7.el6 for x86_64 sysstat-9.0.4-11.el6 xorg-x11-utils* xorg-x11-apps*
    xorg-x11-xinit* xorg-x11-server-Xorg* xterm

    ```


    在此流程的这一点上，操作系统应已完全准备好，可以继续进行安装。在安装软件之前执行这些操作将确保安装过程顺利进行。在许多情况下，如果遗漏了任何内容，安装程序会提供详细的信息。如果在安装过程中出现错误，请停止安装并解决问题后再继续。


    ### 数据库准备


    在开始安装之前，请准备所需的数据库模式。这是使用 Oracle 的仓库创建实用程序完成的。RCU 软件可以从与 Identity Management 软件相同的位置下载。确保
    RCU 的版本与要安装的 Fusion Middleware 软件的版本完全相同，这一点非常重要。


    在本例中，将安装 OID 11.1.1.9。因此，将使用的 RCU 版本为 11.1.1.9。如前所述，OID 11.1.1.9 是经认证可与 Oracle
    E-Business Suite 一起使用的最新版本。


    下载所需的软件后，就可以开始创建仓库了。将下载的文件解压缩到一个暂存目录。本例中我们使用 `/home/oracle/stage/rcu`。解压后，将创建一个名为
    `rcuHome` 的目录。运行位于 `rcuHome/bin` 中的 `rcu` 文件，如图 4-1 所示。


    ![A352855_1_En_4_Fig1_HTML.jpg](img/A352855_1_En_4_Fig1_HTML.jpg)


    图 4-1.


    仓库创建实用程序


    在运行 RCU 之前，数据库初始化参数 `open_cursors` 应至少设置为 500。默认值通常为 300。要更改此参数，请从 SQL*Plus 命令提示符执行以下命令：


    ```

    alter system set open_cursors = 1000 scope = both;

    ```


    RCU 的第一个页面是欢迎屏幕。清除“下次跳过此页面”复选框可以在后续运行 RCU 时跳过欢迎屏幕。如图 4-2 所示。


    ![A352855_1_En_4_Fig2_HTML.jpg](img/A352855_1_En_4_Fig2_HTML.jpg)


    图 4-2.


    仓库创建实用程序欢迎屏幕


    图 4-3 显示了 RCU 中的第一个决策点。在此处，您可以选择创建新的元数据存储库或删除现有的存储库。


    ![A352855_1_En_4_Fig3_HTML.jpg](img/A352855_1_En_4_Fig3_HTML.jpg)


    图 4-3.


    仓库创建实用程序：将组件模式创建到数据库选择中


    RCU 可用于创建所需的数据库模式或根据需要删除模式。该工具可以多次运行。因此，如果遗漏了某个模式或错误地创建了某个模式，可以重新运行 RCU 来创建遗漏的对象或删除整个模式。应注意确保要删除的模式当前未在使用中。在决定创建或删除存储库后，RCU
    将提示您输入数据库连接详细信息，如图 4-4 所示。


    ![A352855_1_En_4_Fig4_HTML.jpg](img/A352855_1_En_4_Fig4_HTML.jpg)


    图 4-4.


    数据库配置参数


    需要注意的是，RCU 不支持可插拔数据库或容器数据库。如有疑问，请与您的数据库管理员讨论。


    一旦选择了创建或删除操作，RCU 工具将提示输入数据库连接信息。您的 DBA 可以提供这些信息。在本例中，数据库实际上与 Identity Management
    环境运行在同一台主机上。虽然在资源充足的主机上这是可能的，并且将支持开发实例，但在生产环境中，建议将数据库和 Fusion Middleware 组件运行在不同的主机上。将完成先决条件检查，如图
    4-5 所示。


    ![A352855_1_En_4_Fig5_HTML.jpg](img/A352855_1_En_4_Fig5_HTML.jpg)


    图 4-5.


    RCU 数据库先决条件检查


    RCU 应使用具有 SYSDBA 权限的 SYS 帐户。但是，如果无法实现这一点，可以将 RCU 配置为生成模式创建脚本，这些脚本可以提供给 DBA。

    '
- fmt: '# Repository Creation Utility (RCU) and WebLogic Server Installation


    After inputting the database parameters to inform the `RCU` which database to
    use, the tool will perform a precursory check to ensure it meets the minimum requirements.
    If any errors are encountered, correct them before continuing with the installation.
    The screen shown in Figure [4-6](#A352855_1_En_4_Chapter.html#Fig6) allows you
    to choose the components you wish to create.


    ![A352855_1_En_4_Fig6_HTML.jpg](A352855_1_En_4_Fig6_HTML.jpg)


    Figure 4-6. Schema selection screen


    On the Select Components screen, you can select the Fusion Middleware components
    you plan to install. Although multiple components can be installed within the
    same database, it is a common practice to separate Identity Management components
    from other applications such as `WebCenter Content` or system-oriented architecture
    (`SOA`). In this case, only the `OID` schema `Oracle Directory Services` will
    be installed on this database. This is done for convenience for management and
    maintenance. Patches and upgrades for the database will be isolated to the `OID`
    database, and the administrators will not need to worry about affecting the Identity
    and Access Manager applications. You will be shown the confirmation screen seen
    in Figure [4-7](#A352855_1_En_4_Chapter.html#Fig7).


    ![A352855_1_En_4_Fig7_HTML.jpg](A352855_1_En_4_Fig7_HTML.jpg)


    Figure 4-7. Precheck completed Note


    For most Fusion Middleware products, the database can store multiple instances
    of the schemas, thus the option to create a prefix in the previous screenshot.
    However, only one instance of `OID` is allowed per database. As seen on the Schema
    Selection screen, no prefix is added to the `ODS` schema.


    After the component selection is made, the `RCU` will check the database to ensure
    uniqueness and compliance with prerequisites.


    A password must be set for the schemas to be created by the `RCU`, as shown in
    Figure [4-8](#A352855_1_En_4_Chapter.html#Fig8). You can use the same password
    for all schemas, or different passwords for each. Some environments might require
    different passwords due to security concerns.


    ![A352855_1_En_4_Fig8_HTML.jpg](A352855_1_En_4_Fig8_HTML.jpg)


    Figure 4-8. Set schema passwords


    Figure [4-9](#A352855_1_En_4_Chapter.html#Fig9) displays a summary of the database
    prerequisite and actions the `RCU` will follow.


    ![A352855_1_En_4_Fig9_HTML.jpg](A352855_1_En_4_Fig9_HTML.jpg)


    Figure 4-9. Creation of necessary database objects


    The tablespace mapping screen displays each component to be installed and the
    tablespaces that will be created. Clicking the Additional Tablespaces button displays
    a more detailed list. This screen, shown in Figure [4-10](#A352855_1_En_4_Chapter.html#Fig10),
    is informational and requires no input.


    ![A352855_1_En_4_Fig10_HTML.jpg](A352855_1_En_4_Fig10_HTML.jpg)


    Figure 4-10. Tablespace mapping


    After clicking Next on this screen, a summary of the inputs is displayed, providing
    you with a chance to review the configuration before anything is created, as shown
    in Figure [4-11](#A352855_1_En_4_Chapter.html#Fig11).


    ![A352855_1_En_4_Fig11_HTML.jpg](A352855_1_En_4_Fig11_HTML.jpg)


    Figure 4-11. Repository creation configuration Summary screen


    Figure [4-12](#A352855_1_En_4_Chapter.html#Fig12) shows the Repository Creation
    Utility Completion Summary screen. At this point, all of the database schema objects
    have been created and populated with the necessary data required for `OID`. The
    next steps include installation of the `WebLogic` infrastructure and `OID`.


    ![A352855_1_En_4_Fig12_HTML.jpg](A352855_1_En_4_Fig12_HTML.jpg)


    Figure 4-12. `RCU` completed


    ## Fusion Middleware WebLogic Server


    Once the prerequisite tasks have been completed, installation of `OID` can begin
    with installing the Fusion Middleware `WebLogic Server` (`WLS`). As of this writing,
    `OID 11.1.1.9` is certified on `WLS 10.3.6`. Although it might be possible to
    utilize a newer version of `WLS` for this environment, it is highly recommended
    that you follow the certification matrix provided by Oracle. This will ensure
    compatibility and supportability if problems occur.


    The Fusion Middleware environment requires the use of a certified Java Development
    Kit (`JDK`). For the purposes of this discussion, `JDK 1.6 Update 45` will be
    used. You can install multiple versions of the `JDK` on a single machine. However,
    it is important that the `JAVA_HOME` and `PATH` variables are updated to use the
    proper version during the installation and all management tasks. These can be
    done using the following commands, or these can be added to profile scripts to
    avoid retyping the commands.


    ```

    [oracle@clouddemolab ∼]$ export JAVA_HOME=/home/oracle/java/jdk1.6.0_45

    [oracle@clouddemolab ∼]$ export PATH=$JAVA_HOME/bin:$PATH

    ```


    `WLS 11g` (version `10.3.6`) is currently the latest version of `WLS` certified
    with `OID 11.1.1.9`. Therefore, this section covers the installation of this version.
    If installing `WLS` on a 64-bit system, use of the `wls10.3.6_generic.jar` file
    is required. To use this file execute the command as shown in Figure [4-13](#A352855_1_En_4_Chapter.html#Fig13).


    ![A352855_1_En_4_Fig13_HTML.jpg](A352855_1_En_4_Fig13_HTML.jpg)


    Figure 4-13. Starting the WebLogic Server installation


    Just about every Oracle software installer starts with a Welcome screen, as shown
    in Figure [4-14](#A352855_1_En_4_Chapter.html#Fig14); `WLS` is no different.


    ![A352855_1_En_4_Fig14_HTML.jpg](A352855_1_En_4_Fig14_HTML.jpg)


    Figure 4-14. WebLogic Server installation Welcome screen


    The first input required is the location of the new Middleware home directory.
    Each Fusion Middleware application requires a `Middleware Home` location. In the
    case of `OID` and the Identity and Access Management environments, these will
    be separate for manageability. For `OID`, the `Middleware Home` will be called
    `OIDMiddleware` located at `/home/oracle/OIDMiddleware`. Subsequent to this screen
    will be a software update screen. You can choose to enter your e-mail address
    to be notified of updates or skip to the next step. See Figure [4-15](#A352855_1_En_4_Chapter.html#Fig15)
    for details.


    ![A352855_1_En_4_Fig15_HTML.jpg](A352855_1_En_4_Fig15_HTML.jpg)


    Figure 4-15. WebLogic Server Middleware Home configuration


    After choosing the `ORACLE_HOME` you intend to use, you will be presented with
    the screen shown in Figure [4-16](#A352855_1_En_4_Chapter.html#Fig16) on which
    you choose the installation type.


    ![A352855_1_En_4_Fig16_HTML.jpg](A352855_1_En_4_Fig16_HTML.jpg)


    Figure 4-16. Choosing an installation type


    This step allows you to select a typical or custom installation. A typical installation
    installs the following components:


    *   Core Application Server.

    *   Administration Console.

    *   Configuration Wizard and Upgrade Utilities.

    *   Web 2.0 HTTP Pub-Sub Server.

    *   `WebLogic SCA`.

    *   `WebLogic JDBC Drivers`.

    *   Third Party `JDBC` Drivers.

    *   `WebLogic Server Clients`.

    *   `WebLogic Web Server Plug-ins`.

    *   `UDDI` and `XQuery` Support.

    *   Evaluation Database.

    *   Oracle `Coherence`.


    If any of these are not required for the installation, choose Custom and deselect
    the items not needed, such as the Evaluation Database.


    Once an installation type is chosen and you have selected the components you wish
    to install, the JDK Selection screen, shown in Figure [4-17](#A352855_1_En_4_Chapter.html#Fig17),
    displays.


    ![A352855_1_En_4_Fig17_HTML.jpg](A352855_1_En_4_Fig17_HTML.jpg)


    Figure 4-17. Select the JDK version to be used


    If multiple `JDKs` are installed on the host, they will be listed in the installer
    at this step. However, if a `JDK` was specified when running the `wls1036_generic.jar`
    file, this is the `JDK` that will be listed.'
