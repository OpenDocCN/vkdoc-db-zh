    ## Oracle Internet Directory


    Oracle Internet Directory (OID) represents Oracle’s database-based LDAP v3 compatible
    directory server. It is capable of storing identity data but also synchronizing
    with other existing data stores. Based on the Oracle database, OID is able to
    leverage advanced features to provide high levels of security even at the storage
    and backup level. Scalability of OID allows for large numbers of users, and transactions
    even in multisite environments. High availability is a key concern among organizations.
    OID provides mechanisms that assist IT departments to give their customers very
    high reliability. Overall OID affords an organization all of the identity and
    policy storage options it might need.


    As a directory server, OID is built around LDAP v3 compatibility. This ensures
    that not only Oracle applications reference OID, but other third-party applications
    and services with LDAP compatibility are able to leverage an organization’s investment.
    Unlike network access directories such as Active Directory or application-specific
    directories, OID is a general-purpose directory. General-purpose directories adhere
    to a common standard that can support disparate applications. Although Active
    Directory, a network, is an implementation of the LDAP standard, it is specialized
    for the network operating system (OS) and contains attributes required for network
    authentication and authorization. It is a more specialized tool and might be more
    difficult to adapt to a generic purpose. For this reason, OID provides a platform
    for companies to consolidate directories to use OID.'
  trans: '# 组织和管理用于用户身份的目录


    如果各个用户条目不具备可用于识别用户的标准化信息，那么组织用户条目将几乎毫无用处。除了存储联系信息外，用户目录还可用于维护活动数据，例如上次登录时间或上次登录终端。这些数据可用于跟踪历史记录；在更高级的系统中，它可以通过向管理员或用户警示偏离正常活动的行为来识别可能的欺诈行为。此外，有关失败登录的信息可用于在尝试次数过多后锁定账户。为确保特定类型的每个条目都包含相同的可用数据，可以使用对象类来配置目录。


    ## 对象类和属性定义


    对象类用于定义必须为每个条目配置的标准属性。这有助于强制实施必填字段和可选数据，以便在查询用户时，无论返回哪个用户，客户端都能确信会检索到预期的结果。可以为各种类型的条目创建对象类，包括用户、网络资源、外围设备，甚至会议室。对象类的定义由管理员构建，可以简单到一两个必填字段，也可以包括子对象类以及必填和可选属性的组合。


    例如，对象类可以将一个 `person` 定义为需要姓氏或 `sn`、通用名或 `cn`、给定名和出生日期。可以定义另一个对象类 `organizationPerson`，包含属性
    `manager`、`department`、`telephone number` 和 `office location`。还可以创建具有不同属性配置文件的更多对象类，例如一个名为
    `user` 的类，它可能需要用于身份验证的属性，如 `password` 或 `failedLoginAttempts`。目录中的条目可以使用一个或多个对象类创建，并且可以定义目录树的整个分支，使得该分支内的所有条目都使用相同的对象类组合创建，从而确保北美组织单位内的所有用户都使用图
    3-3 所示的 `Person`、`OrganizationPerson` 和 `User` 属性创建。


    ![A352855_1_En_3_Fig3_HTML.jpg](img/A352855_1_En_3_Fig3_HTML.jpg)

    *图 3-3. 对象类和用户对象示例*


    ## 应用程序权限和组管理


    应用程序权限和对网络资源的授权可以在目录存储中定义。与用户身份类似，角色和权限通常也被组织成目录结构。虽然可以单独为用户授予应用程序或其他系统内的权限，但在
    `LDAP` 目录中使用组可以提供为许多用户授予相同权限的能力。它还将用户到权限的映射和处理开销转移给了 `LDAP` 目录。


    目录中的组可以由用户条目或其他组构成。存储在目录中后，应用程序可以利用标准的 `LDAP` 应用程序编程接口 (`API`) 命令，在授予对请求资源的访问权限之前验证用户的组成员资格。这些应用程序角色通常直接映射到应用程序内的权限。


    ## 多目录的挑战


    企业内存在多个目录会增加管理工作的难度和成本。当一个组织维护一个网络用户目录，可能还有两三个应用程序目录，以及其他系统的专有身份目录时，每个目录都需要进行管理以应对不断变化的环境。这需要为每个目录投入更多的人力资源时间。除了持续管理外，还有设置和配置所需的时间，以及保持所有目录以最佳水平运行所需的计算能力和网络资源。


    由于管理多个目录所需的管理任务，各种身份存储变得不一致的情况非常普遍。在身份生命周期（设置、维护和移除）中，确保用户账户在多个存储中被创建会变得非常繁琐。这导致了账户在一个目录中创建或删除，但在其他目录中没有同步的可能性。结果，这会拖慢新用户的访问速度，因为他们试图访问尚未获得账户的资源。另一方面，这也开启了已应停用的用户仍能访问机密信息的可能性。


    如前所述，多个目录引发了许多安全问题，这些问题可能由于难以保持所有实例同步而发生。除此之外，它还导致数据不一致。随着目录的管理以及用户条目在多个位置被修改，条目属性可能会过时。结果，应用程序可能无法访问关于用户或权限的最新信息。


    # Oracle Internet Directory


    Oracle Internet Directory (`OID`) 是 Oracle 基于数据库的、兼容 `LDAP v3` 的目录服务器。它不仅能够存储身份数据，还能与现有的其他数据存储进行同步。基于
    Oracle 数据库，`OID` 能够利用高级特性，即使在存储备份层面也能提供高级别的安全性。`OID` 的可扩展性使其能够处理大量用户和事务，即使是在多站点环境中。高可用性是组织关注的一个关键问题。`OID`
    提供的机制有助于 IT 部门为其客户提供极高的可靠性。总体而言，`OID` 为组织提供了其可能需要的所有身份和策略存储选项。


    作为目录服务器，`OID` 围绕 `LDAP v3` 兼容性构建。这不仅确保 Oracle 应用程序可以引用 `OID`，而且其他具有 `LDAP` 兼容性的第三方应用程序和服务也能够利用组织的投资。与
    Active Directory 等网络访问目录或特定于应用程序的目录不同，`OID` 是一个通用目录。通用目录遵循一个可以支持不同应用程序的通用标准。虽然
    Active Directory 是一个网络，是 `LDAP` 标准的实现，但它专为网络操作系统 (`OS`) 定制，包含网络身份验证和授权所需的属性。它是一个更专业的工具，可能更难以适应通用目的。因此，`OID`
    为公司提供了一个整合目录以使用 `OID` 的平台。'
- fmt: '### Security and Data Privacy


    If an organization is considering Oracle Identity Management, security is high
    on their priorities. A high level of security should be maintained starting at
    the client/provider layer all the way down to the data storage and even backup
    levels. From the client application and authentication levels, OID supports SSL.
    SSL ensures that data is encrypted before it is sent over the network. From there,
    it provides the mechanism to determine that the recipient is authorized, decrypts
    the data, and ensures the integrity of the message.


    Transmitting data in a secured manner as previously discussed ensures that the
    message cannot be intercepted and interpreted by a third party. Once it is received
    by the requestor or written to disk, data privacy concerns dictate the utmost
    care over securing the data even at these levels. Using the Oracle database as
    its data store, OID is able to leverage advanced database functionality to achieve
    this.


    #### Oracle Transparent Data Encryption (TDE)


    Oracle transparent data encryption (TDE) affords OID a method of encrypting data
    written to disk within the database. As OID data is written to the database, tablespaces
    configured with TDE ensure that the data is encrypted as it is written to the
    data files. The data is then decrypted as it is returned in result sets to the
    client. If the storage device or backup is lost or stolen, the encryption ensures
    the identity data remains private and secure. This layer of encryption occurs
    within the database. Users of authorized applications and with the correct authorization
    can view the data normally, with no added requirements. However, an unauthorized
    person or process attempting to bypass the applications and read data directly
    from the database files would only see encrypted data. All of this is transparent
    to the applications, meaning OID does not require any additional configuration
    changes to leverage the functionality within the database. Figure [3-4](#A352855_1_En_3_Chapter.html#Fig4)
    is a depiction of a TDE environment.


    ![A352855_1_En_3_Fig4_HTML.jpg](A352855_1_En_3_Fig4_HTML.jpg)


    Figure 3-4. Transparent data encryption


    Identity data not only requires security from intruders, but also occasionally
    must be protected from internal threats that could even include users of privileged
    database accounts. Unfortunately, most internal database accounts such as sys
    or system are known to a number of people, such as the database administrators
    (DBAs). This can lead to unauthorized access to key pieces of data, even if the
    access was unintentional. Oracle Database Vault allows administrators to effectively
    lock database accounts out of application data while still allowing those accounts
    to perform database management actions. Thus this increases security at the database
    layer by preventing privileged accounts from accessing private identity data used
    by OID.


    Even outside of using TDE or Data Vault within the database, OID supports encryption
    of sensitive data elements out of the box. Sensitive attributes include `orclpasswordattribute`
    and the `orclrevpwd`. Values such as these are encrypted during storage operations
    and decrypted as needed. These are encrypted using AES256 if the Data Privacy
    mode is enabled within OID, which is the default mode.


    ### Usability and Administration


    Earlier in this book, it was discussed that security should not be a bottleneck
    in application performance or user productivity. Increased security should not
    require complicated interfaces or additional resources to maintain. OID simplifies
    administration tasks and environment management through the use of Oracle’s Fusion
    Middleware Control interface and Oracle Directory Service Manager (ODSM). Using
    these graphical user interfaces (GUIs) along with a wide variety of command-line
    options, OID can be easily managed and monitored. This makes troubleshooting and
    ongoing maintenance simpler, as well as making day-to-day operations such as directory
    management more straightforward.


    #### ODSM Interface


    The ODSM interface is Oracle’s standard web-based GUI that can be used to manage
    OID, Oracle Virtual Directory (OVD), and Oracle Unified Directory (OUD). The interface
    can be used as a basic LDAP browser for nonadministrator users, managing attributes,
    entries, and directory objects by administration users, and even managing configuration
    entries.


    As a basic LDAP browser, ODSM allows nonadministration users the ability to view
    and search for other users. Any authenticated user, that is a user who exists
    and enters valid credentials, can browse the directory. Organizations do not need
    to develop custom applications or invest in expensive third-party products to
    allow their users to utilize OID to search for contact information on other users
    within the directory. It should be noted that when a nonprivileged user logs into
    the ODSM interface, he or she would only be able to view the Data Browser tab
    and not make any changes to the directory. This user’s view will also be limited
    to only data he or she is authorized to access.


    Administrative users can use ODSM as an administration tool. When the superuser
    account `cn=orcladmin` or a member of the `DirectoryAdminGroup` logs in, that
    user is presented with more data options than a normal authenticated user. Administrative
    users can browse the same data, but have the option of creating and modifying
    user and group entries, managing policies such as password policies, or even creating
    new object classes and new object types. These users are also able to manage system
    configuration entries.


    Maintaining OID requires more than just managing the directory and keeping up
    with LDAP entries. There is a continual need to monitor the system for performance,
    monitor system status, and manage background processes such as the Directory Integration
    Platform (DIP ). The Fusion Middleware Control interface is a web-based tool that
    allows system administrators to do just that.


    #### Fusion Middleware Control Interface


    If OID was installed within a WebLogic domain, WLS provides access to the control
    screens. Among the many functions Fusion Middleware Control provides, it allows
    administrators to view performance summaries, start and stop the environment,
    view port usage, get sizing recommendations, set up synchronization and replication
    with other LDAP instances, and manage security. The Fusion Middleware Control
    summary screen is displayed in Figure [3-5](#A352855_1_En_3_Chapter.html#Fig5).
    Using this screen, administrators can gain a high-level view of the status of
    OID.


    ![A352855_1_En_3_Fig5_HTML.jpg](A352855_1_En_3_Fig5_HTML.jpg)


    Figure 3-5. Fusion Middleware Control summary screen


    Once an administrator has accessed the WebLogic Fusion Middlware Control screens,
    he or she can drill down into individual deployments and applications, as shown
    in Figure [3-6](#A352855_1_En_3_Chapter.html#Fig6). In these screens, not only
    can you see the current statistics and status, but there are also menus that will
    allow modification and maintenance of the environment.


    ![A352855_1_En_3_Fig6_HTML.jpg](A352855_1_En_3_Fig6_HTML.jpg)


    Figure 3-6. Oracle Internet Directory summary


    Another key administration tool used for OID is the ODSM. From this tool, shown
    in Figure [3-7](#A352855_1_En_3_Chapter.html#Fig7), administrators can browse,
    add, edit, and delete various directory attributes including users, groups, policies,
    and operational traits.


    ![A352855_1_En_3_Fig7_HTML.jpg](A352855_1_En_3_Fig7_HTML.jpg)


    Figure 3-7. Oracle Directory Services Manager'
  raw: '### Security and Data Privacy


    If an organization is considering Oracle Identity Management, security is high
    on their priorities. A high level of security should be maintained starting at
    the client/provider layer all the way down to the data storage and even backup
    levels. From the client application and authentication levels, OID supports SSL.
    SSL ensures that data is encrypted before it is sent over the network. From there,
    it provides the mechanism to determine that the recipient is authorized, decrypts
    the data, and ensures the integrity of the message.


    Transmitting data in a secured manner as previously discussed ensures that the
    message cannot be intercepted and interpreted by a third party. Once it is received
    by the requestor or written to disk, data privacy concerns dictate the utmost
    care over securing the data even at these levels. Using the Oracle database as
    its data store, OID is able to leverage advanced database functionality to achieve
    this.


    Oracle transparent data encryption (TDE) affords OID a method of encrypting data
    written to disk within the database. As OID data is written to the database, tablespaces
    configured with TDE ensure that the data is encrypted as it is written to the
    data files. The data is then decrypted as it is returned in result sets to the
    client. If the storage device or backup is lost or stolen, the encryption ensures
    the identity data remains private and secure. This layer of encryption occurs
    within the database. Users of authorized applications and with the correct authorization
    can view the data normally, with no added requirements. However, an unauthorized
    person or process attempting to bypass the applications and read data directly
    from the database files would only see encrypted data. All of this is transparent
    to the applications, meaning OID does not require any additional configuration
    changes to leverage the functionality within the database. Figure [3-4](#A352855_1_En_3_Chapter.html#Fig4)
    is a depiction of a TDE environment.


    ![A352855_1_En_3_Fig4_HTML.jpg](A352855_1_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    Transparent data encryption


    Identity data not only requires security from intruders, but also occasionally
    must be protected from internal threats that could even include users of privileged
    database accounts. Unfortunately, most internal database accounts such as sys
    or system are known to a number of people, such as the database administrators
    (DBAs). This can lead to unauthorized access to key pieces of data, even if the
    access was unintentional. Oracle Database Vault allows administrators to effectively
    lock database accounts out of application data while still allowing those accounts
    to perform database management actions. Thus this increases security at the database
    layer by preventing privileged accounts from accessing private identity data used
    by OID.


    Even outside of using TDE or Data Vault within the database, OID supports encryption
    of sensitive data elements out of the box. Sensitive attributes include `orclpasswordattribute`
    and the `orclrevpwd`. Values such as these are encrypted during storage operations
    and decrypted as needed. These are encrypted using AES256 if the Data Privacy
    mode is enabled within OID, which is the default mode.


    ### Usability and Administration


    Earlier in this book, it was discussed that security should not be a bottleneck
    in application performance or user productivity. Increased security should not
    require complicated interfaces or additional resources to maintain. OID simplifies
    administration tasks and environment management through the use of Oracle’s Fusion
    Middleware Control interface and Oracle Directory Service Manager (ODSM). Using
    these graphical user interfaces (GUIs) along with a wide variety of command-line
    options, OID can be easily managed and monitored. This makes troubleshooting and
    ongoing maintenance simpler, as well as making day-to-day operations such as directory
    management more straightforward.


    The ODSM interface is Oracle’s standard web-based GUI that can be used to manage
    OID, Oracle Virtual Directory (OVD), and Oracle Unified Directory (OUD). The interface
    can be used as a basic LDAP browser for nonadministrator users, managing attributes,
    entries, and directory objects by administration users, and even managing configuration
    entries.


    As a basic LDAP browser, ODSM allows nonadministration users the ability to view
    and search for other users. Any authenticated user, that is a user who exists
    and enters valid credentials, can browse the directory. Organizations do not need
    to develop custom applications or invest in expensive third-party products to
    allow their users to utilize OID to search for contact information on other users
    within the directory. It should be noted that when a nonprivileged user logs into
    the ODSM interface, he or she would only be able to view the Data Browser tab
    and not make any changes to the directory. This user’s view will also be limited
    to only data he or she is authorized to access.


    Administrative users can use ODSM as an administration tool. When the superuser
    account `cn=orcladmin` or a member of the `DirectoryAdminGroup` logs in, that
    user is presented with more data options than a normal authenticated user. Administrative
    users can browse the same data, but have the option of creating and modifying
    user and group entries, managing policies such as password policies, or even creating
    new object classes and new object types. These users are also able to manage system
    configuration entries.


    Maintaining OID requires more than just managing the directory and keeping up
    with LDAP entries. There is a continual need to monitor the system for performance,
    monitor system status, and manage background processes such as the Directory Integration
    Platform (DIP ). The Fusion Middleware Control interface is a web-based tool that
    allows system administrators to do just that.


    If OID was installed within a WebLogic domain, WLS provides access to the control
    screens. Among the many functions Fusion Middleware Control provides, it allows
    administrators to view performance summaries, start and stop the environment,
    view port usage, get sizing recommendations, set up synchronization and replication
    with other LDAP instances, and manage security. The Fusion Middleware Control
    summary screen is displayed in Figure [3-5](#A352855_1_En_3_Chapter.html#Fig5).
    Using this screen, administrators can gain a high-level view of the status of
    OID.


    ![A352855_1_En_3_Fig5_HTML.jpg](A352855_1_En_3_Fig5_HTML.jpg)


    Figure 3-5.


    Fusion Middleware Control summary screen


    Once an administrator has accessed the WebLogic Fusion Middlware Control screens,
    he or she can drill down into individual deployments and applications, as shown
    in Figure [3-6](#A352855_1_En_3_Chapter.html#Fig6). In these screens, not only
    can you see the current statistics and status, but there are also menus that will
    allow modification and maintenance of the environment.


    ![A352855_1_En_3_Fig6_HTML.jpg](A352855_1_En_3_Fig6_HTML.jpg)


    Figure 3-6.


    Oracle Internet Directory summary


    Another key administration tool used for OID is the ODSM. From this tool, shown
    in Figure [3-7](#A352855_1_En_3_Chapter.html#Fig7), administrators can browse,
    add, edit, and delete various directory attributes including users, groups, policies,
    and operational traits.


    ![A352855_1_En_3_Fig7_HTML.jpg](A352855_1_En_3_Fig7_HTML.jpg)


    Figure 3-7.


    Oracle Directory Services Manager'
  trans: '### 安全性与数据隐私


    如果一个组织正在考虑采用 Oracle Identity Management，安全性将是其首要关注点之一。从客户端/提供程序层一直到底层的数据存储乃至备份级别，都应维持高度的安全防护。从客户端应用和认证层面来看，OID
    支持 SSL。SSL 确保数据在通过网络发送前被加密。在此基础上，它提供了验证接收方是否被授权、解密数据以及确保消息完整性的机制。


    如前所述，以安全方式传输数据可确保消息不会被第三方截获和解读。一旦数据被请求者接收或写入磁盘，数据隐私方面的考虑要求即便在这些层面也必须极其谨慎地保护数据。利用
    Oracle 数据库作为其数据存储，OID 能够利用先进的数据库功能来实现这一目标。


    #### Oracle 透明数据加密 (TDE)


    Oracle 透明数据加密 (TDE) 为 OID 提供了一种对写入数据库磁盘的数据进行加密的方法。当 OID 数据被写入数据库时，配置了 TDE 的表空间可确保数据在写入数据文件时即被加密。随后，当结果集返回给客户端时，数据会被解密。如果存储设备或备份丢失或被盗，加密可确保身份数据保持私密和安全。此加密层在数据库内部进行。经过授权的应用程序用户且拥有正确权限者，可以正常查看数据，无需任何额外操作。然而，试图绕过应用程序直接从数据库文件读取数据的未经授权人员或进程，则只能看到加密数据。所有这些对应用程序都是透明的，这意味着
    OID 无需进行任何额外的配置更改即可利用数据库内的此功能。图 3-4 描绘了一个 TDE 环境。


    ![A352855_1_En_3_Fig4_HTML.jpg](img/A352855_1_En_3_Fig4_HTML.jpg)


    图 3-4. 透明数据加密


    身份数据不仅需要防范入侵者，有时还必须防范可能包括拥有特权的数据库账户用户在内的内部威胁。不幸的是，大多数内部数据库账户（如 sys 或 system）为多人所知，例如数据库管理员
    (DBA)。这可能导致对关键数据的未授权访问，即使这种访问是无意的。Oracle Database Vault 允许管理员有效地将数据库账户锁定在应用程序数据之外，同时仍允许这些账户执行数据库管理操作。因此，通过防止特权账户访问
    OID 使用的私有身份数据，这在数据库层面增强了安全性。


    即使不使用数据库内的 TDE 或 Data Vault，OID 也开箱即用地支持对敏感数据元素进行加密。敏感属性包括 `orclpasswordattribute`
    和 `orclrevpwd`。此类值在存储操作期间被加密，并在需要时解密。如果在 OID 内启用了数据隐私模式（这是默认模式），这些值将使用 AES256
    进行加密。


    ### 易用性与管理


    本书前文已讨论过，安全性不应成为应用程序性能或用户生产力的瓶颈。增强的安全性不应需要复杂的界面或额外的维护资源。OID 通过使用 Oracle 的 Fusion
    Middleware Control 界面和 Oracle Directory Service Manager (ODSM)，简化了管理任务和环境管理。借助这些图形用户界面
    (GUI) 以及多种命令行选项，可以轻松地管理和监控 OID。这使得故障排除和日常维护更为简单，同时也使目录管理等日常操作更加直接。


    #### ODSM 界面


    ODSM 界面是 Oracle 标准的基于 Web 的 GUI，可用于管理 OID、Oracle Virtual Directory (OVD) 和 Oracle
    Unified Directory (OUD)。该界面可供非管理员用户作为基本的 LDAP 浏览器使用，供管理用户管理属性、条目和目录对象，甚至可以管理配置条目。


    作为基本的 LDAP 浏览器，ODSM 允许非管理用户查看和搜索其他用户。任何经过认证的用户（即存在并输入有效凭证的用户）都可以浏览目录。组织无需开发定制应用程序或投资购买昂贵的第三方产品，即可让其用户利用
    OID 在目录中搜索其他用户的联系信息。需要注意的是，当非特权用户登录 ODSM 界面时，他或她只能查看“数据浏览器”选项卡，而不能对目录进行任何更改。该用户的视图也将仅限于其有权访问的数据。


    管理用户可以将 ODSM 用作管理工具。当超级用户账户 `cn=orcladmin` 或 `DirectoryAdminGroup` 的成员登录时，该用户会看到比普通认证用户更多的数据选项。管理用户可以浏览相同的数据，但可以选择创建和修改用户及组条目、管理策略（如密码策略），甚至创建新的对象类和新的对象类型。这些用户还能够管理系统配置条目。


    维护 OID 不仅仅是管理目录和跟上 LDAP 条目。还需要持续监控系统性能、监控系统状态，并管理后台进程，如目录集成平台 (DIP)。Fusion Middleware
    Control 界面是一个基于 Web 的工具，系统管理员可通过它完成这些任务。


    #### Fusion Middleware Control 界面


    如果 OID 安装在 WebLogic 域中，WLS 会提供对控制屏幕的访问。在 Fusion Middleware Control 提供的众多功能中，它允许管理员查看性能摘要、启动和停止环境、查看端口使用情况、获取规模调整建议、设置与其他
    LDAP 实例的同步和复制，以及管理安全。图 3-5 显示了 Fusion Middleware Control 摘要屏幕。使用此屏幕，管理员可以获得 OID
    状态的高层视图。


    ![A352855_1_En_3_Fig5_HTML.jpg](img/A352855_1_En_3_Fig5_HTML.jpg)


    图 3-5. Fusion Middleware Control 摘要屏幕


    管理员访问 WebLogic Fusion Middleware Control 屏幕后，可以深入查看各个部署和应用程序，如图 3-6 所示。在这些屏幕中，不仅可以查看当前的统计数据和状态，还有菜单允许修改和维护环境。


    ![A352855_1_En_3_Fig6_HTML.jpg](img/A352855_1_En_3_Fig6_HTML.jpg)


    图 3-6. Oracle Internet Directory 摘要


    另一个用于 OID 的关键管理工具是 ODSM。通过如图 3-7 所示的此工具，管理员可以浏览、添加、编辑和删除各种目录属性，包括用户、组、策略和操作特性。


    ![A352855_1_En_3_Fig7_HTML.jpg](img/A352855_1_En_3_Fig7_HTML.jpg)


    图 3-7. Oracle Directory Services Manager'
- fmt: '### 目录同步


    多年来，OID一直是Oracle身份管理解决方案以及众多Oracle应用程序和融合中间件产品中应用安全的核心，这些产品设计之初就围绕OID进行认证和授权。因此，在已实施Oracle产品的组织中，它已成为事实上的安全标准。然而，很少有组织愿意从Active
    Directory等网络目录访问平台迁移。对大多数人来说，Active Directory提供了高级别的网络安全。OID则允许进行定制，以用作应用或通用身份目录。其由DIP提供的同步功能，是使组织能够保留对Active
    Directory或其他第三方目录系统投资的关键能力，同时利用OID的优势服务于其应用程序。


    DIP使组织能够保持OID与不同目录系统之间的同步。可以为DIP创建配置文件，以连接并将身份数据复制到OID。在此复制过程中，集成配置文件允许转换身份数据，以匹配OID环境或使用它的应用程序所需的结构和属性。DIP可以根据组织在性能和目录大小方面的要求进行配置。也许组织拥有一个遍布全球的庞大用户基础，重组数据结构可能更有意义。使用DIP，OID中的数据结构不一定需要与Active
    Directory中存储的结构相匹配。DIP支持将多个身份存储同步到单个OID实例。由于OID支持存储多个上下文，组织可以轻松地组织和来自每个存储的用户。图[3-8](#A352855_1_En_3_Chapter.html#Fig8)展示了DIP如何将多个不同的目录源整合到单一源中的一个示例。


    ![A352855_1_En_3_Fig8_HTML.jpg](A352855_1_En_3_Fig8_HTML.jpg)


    **图 3-8.**

    目录集成平台的可视化


    目录同步是一项宝贵的资源，直到出现不一致。这些不一致通常源于在OID中编辑用户或组属性，而真实数据源可能是另一个目录系统，如Active Directory。一个常见的属性是用户密码。用户不想为不同的系统和应用程序管理多个密码。要求他们这样做会导致安全性削弱，因为用户倾向于写下密码或使用更简单的密码。在OID中为从Active
    Directory同步过来的用户更改密码可能导致不一致，从而可能阻止用户登录所需资源。OID能够使用外部认证插件和外部密码过滤器来帮助防止这种情况发生。


    外部认证插件允许管理员配置OID，将凭据验证移交给给定用户的源目录。这样做，OID不会为任何从源复制的用户维护用户密码。相反，用户属性会触发OID将凭据传递给源进行验证。因此，有效用户必须在OID和源中都存在，但OID中的密码更改不会影响认证，因为唯一有效的密码存储在源中。这样，真实数据源仍然是源目录，密码必须在那里更改。DIP负责保持所有属性同步，而插件处理认证，提供了一个非常安全的环境而无需同步密码。使用外部认证，如图[3-9](#A352855_1_En_3_Chapter.html#Fig9)所示，OID将凭据验证移交给源目录。


    ![A352855_1_En_3_Fig9_HTML.jpg](A352855_1_En_3_Fig9_HTML.jpg)


    **图 3-9.**

    外部认证插件


    外部密码过滤器也与DIP协同工作。然而，它不是将凭据验证移交给外部目录，而是将源密码同步到OID。为确保密码相关的数据隐私，在从源复制密码到OID时使用SSL通信。与DIP过程非常相似，密码过滤器将源目录中发生的密码更改复制到OID。但应注意，此过程可能导致数据不一致，因为在OID中进行的密码更改将是有效的。如果后来用户在源中更改其密码，这将触发OID中的相同更改，可能会造成一些混淆。不是移交凭据验证，目录可以被配置为同步密码，如图[3-10](#A352855_1_En_3_Chapter.html#Fig10)所示。


    ![A352855_1_En_3_Fig10_HTML.jpg](A352855_1_En_3_Fig10_HTML.jpg)


    **图 3-10.**

    Oracle Internet Directory 密码过滤器


    外部认证插件和外部密码过滤器与DIP协同工作，为组织提供了维护与企业目录系统保持同步的应用目录的能力。这带来了更高效的安全部署，因为管理员只需在企业目录中维护企业用户，知道这些新增和更新会自动传播到OID实例。


    ## Oracle 统一目录


    Oracle在通过OID提供强大的LDAP目录方面有着悠久的历史。最近，此产品已升级为包含OUD，这是一个完全用Java实现的LDAP存储库，提供了许多可扩展性选项，同时还包括同步、代理和虚拟化等功能。


    ### 架构


    OUD从头开始基于Java EE平台构建。据Oracle称，这使他们能够利用Java虚拟机提供的内存管理能力和调优功能。对于数据存储，OUD使用Oracle的Berkeley
    Database Java Edition。这个面向对象的数据库提供了一个稳定的平台，非常适合映射目录中的条目和属性。这种架构减少了I/O延迟，并提供了独立于平台的备份和管理能力，从而在提高整体性能的同时，使整个系统更少依赖于企业架构决策。


    与OID非常相似，OUD能够构建高可用性架构。OUD在设计时将高可用性作为首要任务。它提供了在多个数据中心的多个节点上部署的能力，不仅支持本地故障转移，还支持灾难恢复。此外，借助OUD的引用功能和透明重路由能力，故障可以立即故障转移到其他数据中心，从而提供99.99%的正常运行时间。'
  raw: '### Directory Synchronization


    For years, OID has been at the core of Oracle’s Identity Management solutions
    and application security within the plethora of Oracle applications and Fusion
    Middleware products that have been designed around the use of OID for authentication
    and authorization. Because of this, it is firmly rooted as the de facto standard
    of security within organizations that have implemented Oracle products. However,
    few organizations wish to change from their network directory access platforms
    such as Active Directory. For most, Active Directory provides a high level of
    network security. OID allows the customization needed for use as an application
    or general-purpose identity directory. Its synchronization functionality provided
    by the DIP, is the key capability that allows organizations to keep their investment
    in Active Directory or other third-party directory systems while leveraging the
    strengths of OID for their applications.


    The DIP enables the organization to keep OID synchronized with disparate directory
    systems. Profiles can be created for the DIP to connect to and copy the identity
    data to OID. During this copy, the integration profiles allow the identity data
    to be transformed to match the structure and attributes necessary for the OID
    environment or applications using it. DIP can be configured in ways that match
    the organization’s requirements in both performance and directory size. Perhaps
    the organization has a very large user base spread around the world. It might
    make sense to reorganize the data structure. Using DIP, the data structure in
    OID does not necessarily need to match that stored in Active Directory. The DIP
    supports the synchronization of multiple identity stores into one single OID instance.
    Because OID supports the storage of multiple contexts, the organization can easily
    organize and manage users coming from each of the stores. Figure [3-8](#A352855_1_En_3_Chapter.html#Fig8)
    shows an example of how the DIP can bring multiple disparate directory sources
    together into a single source.


    ![A352855_1_En_3_Fig8_HTML.jpg](A352855_1_En_3_Fig8_HTML.jpg)


    Figure 3-8.


    Visualizing the Directory Integration Platform


    Directory synchronization is a valuable resource until inconsistencies are created.
    These most often come from editing user or group attributes in OID while the source
    of truth might be another directory system such as Active Directory. A common
    attribute is the user password. Users do not want to manage multiple passwords
    for different systems and applications. Requiring them to do so leads to weakened
    security as users tend to write their passwords down or use easier passwords.
    Changing a password for a user in OID that was synchronized from Active Directory
    can cause inconsistencies that might prevent the user from logging into required
    resources. OID has the ability to use external authentication plug-ins and external
    password filters to help prevent this from happening.


    The external authentication plug-in allows administrators to configure OID to
    hand off credential verification to the source directory for the given user. Doing
    this, OID does not maintain the user password for any user that was copied from
    the source. Instead, user attributes trigger OID to pass the credentials to the
    source for validation. As such, the valid user must exist in both OID and the
    source, but password changes in OID will not affect authentication, as the only
    valid password is stored in the source. Thus, the source of truth remains the
    source directory, and passwords must be changed there. The DIP handles keeping
    all attributes synchronized and the plug-in handles authentication, providing
    a very secure environment without synchronizing passwords. Using external authentication,
    as shown in Figure [3-9](#A352855_1_En_3_Chapter.html#Fig9), OID hands off the
    credential validation to the source directory.


    ![A352855_1_En_3_Fig9_HTML.jpg](A352855_1_En_3_Fig9_HTML.jpg)


    Figure 3-9.


    External authentication plug-in


    The external password filter works in conjunction with the DIP as well. However,
    instead of handing off the credential validation to an external directory, the
    password filter enables the synchronization of the source password to OID. To
    ensure data privacy surrounding the passwords, SSL communication is used when
    the password is copied from the source to OID. Much like the DIP process, the
    password filter copies password changes to OID as they are made in the source
    directory. It should be noted, however, that this process can lead to data inconsistencies
    as password changes made in OID will be valid. If later, the user changes his
    or her password in the source, this will trigger the same change in OID and some
    confusion could occur. Instead of handing off credential validation, the directories
    can be configured to synchronize the passwords as shown in Figure [3-10](#A352855_1_En_3_Chapter.html#Fig10).


    ![A352855_1_En_3_Fig10_HTML.jpg](A352855_1_En_3_Fig10_HTML.jpg)


    Figure 3-10.


    Oracle Internet Directory password filter


    Both the external authentication plug-in and external password filter working
    with the DIP provide the organization the ability to maintain an application directory
    that is kept up to date with the enterprise directory system. This leads to a
    more efficient security setup as administrators only have to maintain enterprise
    users within the enterprise directory, knowing those additions and updates will
    filter their way to the OID instance.


    ## Oracle Unified Directory


    Oracle has a long-standing history of providing a strong LDAP directory with OID.
    Recently, this offering has been upgraded to include OUD , a fully Java-implemented
    LDAP repository that provides many options for scalability while also providing
    features including synchronization, proxy, and virtualization.


    ### Architecture


    OUD is built from the ground up based on the Java EE platform. According to Oracle,
    this allowed them to leverage the memory management capabilities and tuning provided
    by using the Java virtual machine (JVM). For data storage, OUD utilizes the Berkeley
    Database Java Edition from Oracle. This object-oriented database provides a stable
    platform that is well suited for mapping entries and attributes within the directory.
    This architecture allows for less I/O latency and platform-independent backup
    and management capabilities, thus increasing overall performance while making
    the whole system much less dependent on enterprise architecture decisions.


    Much like OID, OUD is very capable of highly available architectures. OUD was
    designed with high availability as a top priority. It provides the ability to
    be deployed on multiple nodes in multiple datacenters affording not only local
    failover, but also disaster recovery. Furthermore, with OUD’s referral functionality
    and transparent rerouting ability, outages can be instantly failed over to other
    datacenters, thus providing 99.99 percent uptime.'
  trans: '

    ### 目录同步


    多年来，OID 一直是 Oracle 身份管理解决方案以及众多 Oracle 应用程序和融合中间件产品的安全应用核心，这些产品在设计之初就围绕 OID 进行认证和授权。因此，在已部署
    Oracle 产品的组织中，它已成为事实上的安全标准。然而，很少有组织愿意从 Active Directory 等网络目录访问平台迁移。对大多数人来说，Active
    Directory 提供了高级别的网络安全，而 OID 则允许进行定制，以用作应用或通用身份目录。其由 DIP 提供的同步功能，是使组织能够保留对 Active
    Directory 或其他第三方目录系统投资的关键，同时利用 OID 的优势服务于其应用程序。


    DIP 使组织能够保持 OID 与不同目录系统之间的同步。可以为 DIP 创建配置文件，以连接并将身份数据复制到 OID。在此复制过程中，集成配置文件允许转换身份数据，以匹配
    OID 环境或使用它的应用程序所需的结构和属性。DIP 可以根据组织在性能和目录大小方面的要求进行配置。也许组织拥有一个遍布全球的庞大用户基础，此时重组数据结构可能更有意义。使用
    DIP，OID 中的数据结构不一定需要与 Active Directory 中存储的结构相匹配。DIP 支持将多个身份存储同步到单个 OID 实例。由于 OID
    支持存储多个上下文，组织可以轻松地组织来自每个存储的用户。图 3-8 展示了 DIP 如何将多个不同的目录源整合到单一源中的一个示例。


    ![A352855_1_En_3_Fig8_HTML.jpg](img/A352855_1_En_3_Fig8_HTML.jpg)


    **图 3-8.**

    目录集成平台可视化


    目录同步是一项宝贵的资源，直到出现数据不一致。这些不一致通常源于在 OID 中编辑用户或组属性，而真实数据源可能是另一个目录系统，如 Active Directory。一个常见的属性是用户密码。用户不想为不同的系统和应用程序管理多个密码。要求他们这样做会导致安全性削弱，因为用户倾向于写下密码或使用更简单的密码。在
    OID 中为从 Active Directory 同步过来的用户更改密码可能导致不一致，从而可能阻止用户登录所需资源。OID 能够使用外部认证插件和外部密码过滤器来帮助防止这种情况发生。


    外部认证插件允许管理员配置 OID，将凭据验证移交给给定用户的源目录。这样做，OID 不会为任何从源复制的用户维护用户密码。相反，用户属性会触发 OID 将凭据传递给源进行验证。因此，有效用户必须在
    OID 和源中都存在，但 OID 中的密码更改不会影响认证，因为唯一有效的密码存储在源中。这样，真实数据源仍然是源目录，密码必须在那里更改。DIP 负责保持所有属性同步，而插件处理认证，提供了一个非常安全的环境而无需同步密码。使用外部认证，如图
    3-9 所示，OID 将凭据验证移交给源目录。


    ![A352855_1_En_3_Fig9_HTML.jpg](img/A352855_1_En_3_Fig9_HTML.jpg)


    **图 3-9.**

    外部认证插件


    外部密码过滤器也与 DIP 协同工作。然而，它不是将凭据验证移交给外部目录，而是将源密码同步到 OID。为确保密码相关的数据隐私，在从源复制密码到 OID
    时使用 SSL 通信。与 DIP 过程非常相似，密码过滤器将源目录中发生的密码更改复制到 OID。但应注意，此过程可能导致数据不一致，因为在 OID 中进行的密码更改将是有效的。如果后来用户在源中更改其密码，这将触发
    OID 中的相同更改，可能会造成一些混淆。因此，目录可以被配置为同步密码而非移交凭据验证，如图 3-10 所示。


    ![A352855_1_En_3_Fig10_HTML.jpg](img/A352855_1_En_3_Fig10_HTML.jpg)


    **图 3-10.**

    Oracle Internet Directory 密码过滤器


    外部认证插件和外部密码过滤器与 DIP 协同工作，为组织提供了维护与企业目录系统保持同步的应用目录的能力。这带来了更高效的安全部署，因为管理员只需在企业目录中维护企业用户，知道这些新增和更新会自动传播到
    OID 实例。


    ## Oracle 统一目录


    Oracle 在通过 OID 提供强大的 LDAP 目录方面有着悠久的历史。最近，此产品已升级为包含 OUD，这是一个完全用 Java 实现的 LDAP 存储库，提供了许多可扩展性选项，同时还包括同步、代理和虚拟化等功能。


    ### 架构


    OUD 从头开始基于 Java EE 平台构建。据 Oracle 称，这使他们能够利用 Java 虚拟机提供的内存管理能力和调优功能。对于数据存储，OUD
    使用 Oracle 的 Berkeley Database Java Edition。这个面向对象的数据库提供了一个稳定的平台，非常适合映射目录中的条目和属性。这种架构减少了
    I/O 延迟，并提供了独立于平台的备份和管理能力，从而在提高整体性能的同时，使整个系统更少依赖于企业架构决策。


    与 OID 非常相似，OUD 能够构建高可用性架构。OUD 在设计时将高可用性作为首要任务。它提供了在多个数据中心的多个节点上部署的能力，不仅支持本地故障转移，还支持灾难恢复。此外，借助
    OUD 的引用功能和透明重路由能力，故障可以立即转移到其他数据中心，从而提供 99.99%的正常运行时间。

