    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    The open file limits must be set to 4096 to support the instance. To do so, edit
    the `limits.conf` file:


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    If the environment is to be installed on Oracle Linux or RedHat Linux, you must
    perform the edit in `/etc/security/limits.d/90-nproc.conf` as well. If this is
    missed, the values in this file could override the values in the `limits.conf`
    file.


    In both of the files listed, ensure the following lines are added or edited:


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    After editing this file, the server must be rebooted to ensure all the changes
    take effect.


    ### Operating System Packages


    Each Oracle application has its own set of required packages. Depending on the
    version of Linux you are using, the installation procedure might be different.
    In the following list, you should note that some packages require both 32-bit
    and 64-bit versions to be installed on a 64-bit OS . If these packages are not
    installed, the installation will not complete properly. The Oracle Installer will
    check these and display errors during the installation.


    ```

    binutils-2.20.51.0.2-5.28.el6

    compat-libcap1-1.10-1

    compat-libstdc++-33-3.2.3-69.el6 for x86_64

    compat-libstdc++-33-3.2.3-69.el6 for i686

    gcc-4.4.4-13.el6 gcc-c++-4.4.4-13.el6

    glibc-2.12-1.7.el6 for x86_64

    glibc-2.12-1.7.el6 for i686

    glibc-devel-2.12-1.7.el6 for i686

    libaio-0.3.107-10.el6

    libaio-devel-0.3.107-10.el6

    libgcc-4.4.4-13.el6

    libstdc++-4.4.4-13.el6 for x86_64

    libstdc++-4.4.4-13.el6 for i686

    libstdc++-devel-4.4.4-13.el6

    libXext for i686

    libXtst for i686

    libXext for x86_64

    libXtst for x86_64

    openmotif-2.2.3 for x86_64

    openmotif22-2.2.3 for x86_64

    redhat-lsb-core-4.0-7.el6 for x86_64

    sysstat-9.0.4-11.el6

    xorg-x11-utils*

    xorg-x11-apps*

    xorg-x11-xinit*

    xorg-x11-server-Xorg*

    xterm

    pdksh-5.2.14

    ```


    At this point in the procedure, the OS should be fully prepared for the installation
    to proceed. Performing the preceding operations prior to installing the software
    will ensure a problem-free installation. In many cases, the installer will provide
    detailed messages if anything was missed. In the event of errors during the installation
    process, stop the installation and fix any problems before proceeding.'
  trans: '

    # 6. Oracle 访问管理器安装


    ## 摘要


    许多组织需要保持身份目录之间的同步。可能 OID 被用作应用程序的身份验证目录，而 Active Directory 被网络用于身份验证。用户必须同时存在于这两个地方才能访问网络资源和他们所需的应用程序。DIP
    提供了一种机制，将存储在一个源中的数据复制到另一个源。虽然这可以手动完成，但 DIP 是 Oracle 提供的一个自动化流程。利用本章的信息将帮助您创建必要的组件，以保持不同身份存储的同步。


    Oracle 互联网目录（OID）已经安装，并已填充了来自 Active Directory 的用户。您已经配置了一个同步过程，以确保 Active Directory
    中的账户信息变更能够填充到 OID。这样做的好处是，所有使用 OID 进行身份验证和角色信息的应用程序都能持续拥有最新的用户信息。融合中间件应用程序和其他轻量级目录访问协议（LDAP）兼容的应用程序可以配置为使用
    OID 进行身份验证。然而，许多组织希望通过提供单点登录（SSO）环境来增强此功能。Oracle 引入了 Oracle 访问管理器（OAM），正是赋予组织这种能力。本章介绍如何安装
    OAM 工具，为 EBS 和 WebCenter 环境实现 SSO 做准备。


    在之前的章节中，OID 已经安装并配置完毕。如果您的环境中尚未存在 OID，或者尚未经过验证，请参阅第 4 章的说明。


    ## 预安装任务


    ### 操作系统用户


    对于大多数 Oracle 应用程序安装，应创建操作系统（OS）用户和组来执行安装和配置任务。创建 OS 组将允许其他 OS 用户执行与管理应用程序环境相关的特定任务。在
    Linux 环境中安装 Oracle 应用程序时，最常见的 OS 用户和组是`oracle`用户以及`oinstall`或`dba`组。


    要创建必要的`oinstall`和`dba`组，请以 root 目录身份执行以下命令：


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd osdba

    ```


    组创建完成后，创建`oracle`用户。


    ```

    [root@clouddemolab home]# useradd  -g oinstall -G osdba oracle

    ```


    注意


    -g 表示用户应添加到的主组。-G 表示任何附加组。


    要为用户设置密码，请以 root 用户身份使用以下命令：


    ```

    [root@clouddemolab home]# passwd oracle

    ```


    ### 操作系统配置


    在安装 Oracle 融合中间件基础设施和 Oracle 身份管理软件之前，确保操作系统满足最低要求和配置非常重要。以下列出了所需的内核参数、软件包以及文件更改。


    需要设置以下内核参数：


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    要设置这些参数，请编辑`/etc`目录中的`sysctl.conf`文件。


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    在文件的此部分中添加或编辑以下行：


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    在`sysctl.conf`文件中设置这些值后，您必须激活并验证新值是否已显示，使用以下命令：


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    打开文件限制必须设置为 4096 以支持该实例。为此，编辑`limits.conf`文件：


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    如果环境要安装在 Oracle Linux 或 RedHat Linux 上，您还必须在`/etc/security/limits.d/90-nproc.conf`中进行编辑。如果遗漏了此步骤，该文件中的值可能会覆盖`limits.conf`文件中的值。


    在列出的两个文件中，确保添加或编辑了以下行：


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    编辑此文件后，必须重新启动服务器以确保所有更改生效。


    ### 操作系统软件包


    每个 Oracle 应用程序都有自己的一套必需软件包。根据您使用的 Linux 版本，安装过程可能有所不同。在以下列表中，请注意某些软件包需要在 64 位操作系统上同时安装
    32 位和 64 位版本。如果这些软件包未安装，安装将无法正确完成。Oracle 安装程序会检查这些，并在安装过程中显示错误。


    ```

    binutils-2.20.51.0.2-5.28.el6

    compat-libcap1-1.10-1

    compat-libstdc++-33-3.2.3-69.el6 for x86_64

    compat-libstdc++-33-3.2.3-69.el6 for i686

    gcc-4.4.4-13.el6 gcc-c++-4.4.4-13.el6

    glibc-2.12-1.7.el6 for x86_64

    glibc-2.12-1.7.el6 for i686

    glibc-devel-2.12-1.7.el6 for i686

    libaio-0.3.107-10.el6

    libaio-devel-0.3.107-10.el6

    libgcc-4.4.4-13.el6

    libstdc++-4.4.4-13.el6 for x86_64

    libstdc++-4.4.4-13.el6 for i686

    libstdc++-devel-4.4.4-13.el6

    libXext for i686

    libXtst for i686

    libXext for x86_64

    libXtst for x86_64

    openmotif-2.2.3 for x86_64

    openmotif22-2.2.3 for x86_64

    redhat-lsb-core-4.0-7.el6 for x86_64

    sysstat-9.0.4-11.el6

    xorg-x11-utils*

    xorg-x11-apps*

    xorg-x11-xinit*

    xorg-x11-server-Xorg*

    xterm

    pdksh-5.2.14

    ```


    至此，操作系统应已完全准备好，可以开始安装。在安装软件之前执行上述操作将确保安装过程顺利进行。在许多情况下，如果有任何遗漏，安装程序会提供详细的消息。如果在安装过程中出现错误，请停止安装，并在继续之前解决任何问题。

    '
- fmt: '### Database Preparation


    Just like OID, the installation of OAM requires specific database objects to be
    created. This includes a number of tables, views, and packages created in various
    database schemas. This is done using the Repository Creation Utility (RCU). Although
    the database objects can be created within the same database, it is often recommended
    that the Oracle Identity and Access Management repository be created in a separate
    instance. This simplifies database administration tasks and future maintenance.
    The RCU Create Repository screen is shown in Figure [6-1](#A352855_1_En_6_Chapter.html#Fig1).
    Take care to download and run the RCU that is designated for the version of Oracle
    Identity and Access Management you are installing. Unzip the download and run
    the `rcu.sh` found in the `<RCU_HOME>/rcu/bin` directory.


    ![A352855_1_En_6_Fig1_HTML.jpg](A352855_1_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    Create new schema


    The same process is undertaken to create the database repository objects as for
    OID. The RCU is started and Create is selected.


    Oracle database details are entered. The details in the screen in Figure [6-1](#A352855_1_En_6_Chapter.html#Fig1)
    point to the same database server as Oracle Directory Services. However, the database
    instance was created specifically for Oracle Identity and Access Manager to keep
    the two systems separated. Figure [6-2](#A352855_1_En_6_Chapter.html#Fig2) shows
    the database details entered on screen.


    ![A352855_1_En_6_Fig2_HTML.jpg](A352855_1_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    Enter database connection details


    As shown in Figure [6-3](#A352855_1_En_6_Chapter.html#Fig3), the RCU will check
    to ensure the database meets the minimum prerequisites. If there are any failures,
    these must be corrected before moving forward in the process.


    ![A352855_1_En_6_Fig3_HTML.jpg](A352855_1_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Database prechecks completed


    On the Select Components screen of the RCU, select `Oracle Access Manager`, as
    shown in Figure [6-4](#A352855_1_En_6_Chapter.html#Fig4). Additional components
    will be selected if they are required. This includes items like `Audit Services`,
    `Metadata Services`, and `Oracle Platform Security Services`. Ensure that you
    do not deselect items if they are added during the selection process. Figure [6-4](#A352855_1_En_6_Chapter.html#Fig4)
    shows Select Components screen.


    ![A352855_1_En_6_Fig4_HTML.jpg](A352855_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    Component selection


    The RCU checks the target database to ensure that it meets the necessary requirements
    for the components chosen. The RCU log will display any errors that were encountered
    and that must be resolved prior to continuing. As shown in Figure [6-5](#A352855_1_En_6_Chapter.html#Fig5),
    the RCU checks the prerequisites for the selected components.


    ![A352855_1_En_6_Fig5_HTML.jpg](A352855_1_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    Database prerequisite checking


    After the RCU verifies the prerequisites, you will be prompted for a password
    to be used by the new database schemas, as shown in Figure [6-6](#A352855_1_En_6_Chapter.html#Fig6).


    ![A352855_1_En_6_Fig6_HTML.jpg](A352855_1_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    Schema passwords


    You can set all of the schemas to use the same password or set different passwords
    for each component. Although your organization might require different passwords,
    it is often sufficient to use the same password.


    The `Map Tablespaces` screen displays the basic tablespaces to be created for
    each of the components. Each component creates additional objects, and they can
    be displayed by clicking `Manage Tablespaces` in the lower right corner of the
    screen. Figure [6-7](#A352855_1_En_6_Chapter.html#Fig7) shows the list of tablespaces
    created for the OAM metadata repository.


    ![A352855_1_En_6_Fig7_HTML.jpg](A352855_1_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    Tablespace list


    Figure [6-8](#A352855_1_En_6_Chapter.html#Fig8) shows the optional screen that
    allows you to customize the properties of the tablespaces to be created in the
    next step.


    ![A352855_1_En_6_Fig8_HTML.jpg](A352855_1_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    `Manage Tablespaces` screen


    Unless working closely with a database administrator (DBA), you should avoid modifying
    the default values provided during the RCU. However, your DBAs might have suggestions
    or requirements to improve performance.


    Figure [6-9](#A352855_1_En_6_Chapter.html#Fig9) provides a look at the Summary
    screen. This screen gives you a chance to see all of the objects that will be
    created based on your inputs on previous screens. If anything looks out of place,
    this is a last chance to make any tweaks before the database objects are created.


    ![A352855_1_En_6_Fig9_HTML.jpg](A352855_1_En_6_Fig9_HTML.jpg)


    Figure 6-9.


    Creation Summary screen


    As the RCU creates the objects required for the metadata repository, a progress
    screen, shown in Figure [6-10](#A352855_1_En_6_Chapter.html#Fig10), is displayed.
    Allow this process to complete without interuption. If, for any reason, this process
    is stopped, you should restart the RCU to drop all components from this run and
    restart the creation from scratch.


    ![A352855_1_En_6_Fig10_HTML.jpg](A352855_1_En_6_Fig10_HTML.jpg)


    Figure 6-10.


    RCU completion


    The RCU has completed and all of the database schema objects have been created
    to support OAM. Now that the database has been prepared, the OAM software can
    be installed, and the domain configured.'
