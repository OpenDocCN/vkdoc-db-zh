- fmt: "#### WebLogic Server\n\n本节中的数字是针对基本的 `WLS`。通常情况下，服务器需要 8 GB 物理内存和 16 GB 可用内存。随着托管服务器和身份与访问管理组件的部署，将需要额外的内存。内存要求的具体细节见表\
    \ [2-2](#A352855_1_En_2_Chapter.html#Tab2)。\n\n表 2-2.\n按操作系统划分的 Fusion Middleware\
    \ 最低内存要求\n\n| Operating System | Minimum Physical Memory | Minimum Available Memory\
    \ |\n| --- | --- | --- |\n| UNIX | 8 GB | 16 GB |\n| Linux | 8 GB | 16 GB |\n\
    | Windows | 8 GB | 16 GB |\n\n在这种情况下，可用内存等于物理内存加上交换空间内存。然而，允许更多的可用内存由物理内存构成，将通过减少对存储在磁盘上的交换空间内存的\
    \ I/O 来提高性能。此基准是假设需要 4 GB 用于操作系统，加上 4 GB 用于 `WebLogic` 和管理服务器计算得出的：\n\n```\n \
    \   4 GB of memory for the OS\n+    4 GB of memory for WLS and the Admin Server\n\
    _________________________________________________________\n    Total physical\
    \ memory required\n```\n\nFusion Middleware 环境的存储要求可能差异很大。Oracle 至少建议 10 GB 存储空间。应当考虑到日志记录和额外部署的软件会增加这个数字。安装完成且环境稳定后，降低任何已部署应用程序和托管服务器的日志级别配置可能是谨慎的做法。\n\
    \n#### Oracle Directory Services\n\n建议将 `OUD` 安装在与 Oracle 身份和访问管理实例分开的主机上。这是为了将\
    \ `LDAP` 身份存储库置于与数据库相同的内部网络层中。在之前显示的体系结构图中，您会注意到 `LDAP` 和数据库环境被放置在一个与应用中间件层分开的层中。因此，Oracle\
    \ 目录服务的内存要求将与 Oracle 身份和访问管理组件分开介绍。\n\n`OUD` 是一个基于 `Java` 的 `LDAP` 目录服务器。因此，与其他\
    \ Fusion Middleware 产品一样，它安装在受支持的应用服务器内。本节中的要求是针对软件安装的，必须与 Fusion Middleware 的最低要求相结合。这将在后面展示。\n\
    \nOracle 建议为 `OUD` 在生产环境中以最佳水平运行提供 2 GB 物理内存。这是在 Fusion Middleware 所需的 8 GB 之外的。`OUD`\
    \ 的 `Java` 虚拟机 (`JVM`) 可以进行配置以确保使用足够的内存而不会使服务器过载，这将在本书的安装部分讨论。计算总体内存要求可以简单地按如下方式进行：\n\
    \n```\n    4 GB of memory for the OS\n+    4 GB of memory for WebLogic and the\
    \ Administration Server\n+    2 GB of memory for the OUD JVM\n___________________________________________________________\n\
    \    10 GB physical memory required for OUD\n```\n\n需要注意的是，`OUD` 使用一个小数据库来存储 `LDAP`\
    \ 条目。该数据库至少需要 1 GB 磁盘存储空间。根据日志配置或复制情况，这可以增加到 30 到 40 GB。确保日志配置和轮换设置正确以防止存储问题非常重要。Oracle\
    \ 还建议，通过调整内存大小，使得整个数据库文件可以加载到内存中，可以提高性能。\n\n#### Oracle Identity and Access Manager\n\
    \n尽管将 `LDAP` 存储库与身份和访问管理节点分开是一个好主意，但在大多数情况下，Oracle Identity and Access Manager\
    \ 可以安装在相同的物理主机上。是否将它们安装到单独的 Fusion Middleware 环境中取决于安装者。然而，内存要求将保持不变。\n\n`OAM`\
    \ 的最低要求内存是 4 GB 物理内存和 8 GB 可用内存，而服务 `OIM` 的主机还必须考虑 `SOA`。因此，`OIM` 主机仅托管服务器就需要至少\
    \ 8 GB 物理内存和 16 GB 可用内存。这是在 Fusion Middleware 基础设施所需的最低要求（即 8 GB）之外的。将它们相加可以得到以下计算：\n\
    \n```\n    4 GB for the OS\n+    4 GB for WebLogic and the Administration Server\n\
    +    4 GB for OIM Managed Server\n+    4 GB for SOA Managed Server\n+    4 GB\
    \ for the OIM Administration Server\n____________________________________________________________\n\
    \    20 GB memory required for OIM\n```\n\n如果 `OAM` 与 `OIM` 在同一个 `WebLogic` 实例中安装在同一主机上，则将需要额外的\
    \ 8 GB。在这 8 GB 中，4 GB 分配给 `OAM` 管理服务器，另外 4 GB 分配给访问管理器托管服务器。由于额外的 `WebLogic` 实例需要\
    \ 4 GB，因此可能希望将 `OAM` 托管服务器安装在与 `OIM` 实例相同的域中。\n\n### Clustering Considerations\n\
    \n在 Fusion Middleware 中，集群被定义为多个 `WLS` 协同工作以提高可靠性和性能。如前所述，只要资源足够，可以在单台机器上或在多台机器上向集群域添加更多实例。\n\
    \n在确定集群规划时，努力遵循最佳实践很重要。实施集群环境本质上增加了复杂性。不是由单个实例处理所有服务，而是添加了额外的实例，从而增加了对复杂会话处理、负载均衡、分布式处理和复制的需求。\n\
    \n#### Host Configurations\n\n虽然 Oracle 建议每两个 `CPU` 只运行一个 `WebLogic` 实例，但仔细的规划和容量规划将确保环境能够处理预期的负载。Fusion\
    \ Middleware 环境和 Oracle 身份产品的线性可扩展性允许随着组织需求的增长而实现未来的增长。需要注意的是，物理服务器不需要配置相同的硬件。然而，每台服务器必须满足支持已部署应用程序所需的最低要求。也可以将集群托管服务器部署在不同的物理主机上。\n\
    \n例如，`Host_1` 可能包含管理服务器、身份管理器和访问管理器，而 `Host_2` 仅包含身份管理器，访问管理器则部署在 `Host_3` 上。图\
    \ [2-11](#A352855_1_En_2_Chapter.html#Fig11) 描绘了物理主机上身份管理组件的基本分布。\n\n![A352855_1_En_2_Fig11_HTML.jpg](A352855_1_En_2_Fig11_HTML.jpg)\n\
    图 2-11.\n在多个主机上分发身份管理器集群"
  raw: '#### WebLogic Server


    The numbers in this section are for the basic WLS . In general, the server requires
    8 GB physical memory and 16 GB available memory. Additional memory will be required
    as managed servers and Identity and Access Management components are deployed.
    The specifics of memory requirements are shown in Table [2-2](#A352855_1_En_2_Chapter.html#Tab2).


    Table 2-2.


    Fusion Middleware Minimum Memory Requirements by Operating System


    | Operating System | Minimum Physical Memory | Minimum Available Memory |

    | --- | --- | --- |

    | UNIX | 8 GB | 16 GB |

    | Linux | 8 GB | 16 GB |

    | Windows | 8 GB | 16 GB |


    In this case, available memory is equal to the physical memory plus swap memory.
    However, allowing more of the available memory to consist of physical memory will
    improve performance by reducing the I/O to swap memory stored on disk. This baseline
    is calculated assuming 4 GB is required for the OS plus 4 GB for WebLogic and
    the Administration Server:


        4 GB of memory for the OS


    +    4 GB of memory for WLS and the Admin Server


    _________________________________________________________


        Total physical memory required


    Storage requirements for the Fusion Middleware environment can vary significantly.
    At a minimum, 10 GB of storage is recommended by Oracle. It should be considered
    that logging and additional deployed software can increase this number. After
    installation and the environment has been stabilized, it might be prudent to reduce
    the log level configuration for any deployed applications and managed servers.


    #### Oracle Directory Services


    It is recommended that OUD be installed on a separate host from the Oracle Identity
    and Access Management instances. This is suggested to place the LDAP identity
    repository in the same internal network tier as the database. In the architecture
    diagrams shown previously, you will note that the LDAP and database environments
    are placed in a tier separate from the application middle tiers. For this reason,
    the memory requirements for Oracle Directory Services will be presented separately
    from the Oracle Identity and Access Management components.


    OUD is a Java-based LDAP directory server. As such, like other Fusion Middleware
    products, it installs within a supported application server. The requirements
    in this section are for the software install and must be combined with the minimum
    requirements for Fusion Middleware. This is shown later.


    Oracle recommends 2 GB physical memory for OUD to run at optimal levels in a production
    environment. This is in addition to the 8 GB required for Fusion Middleware. The
    Java Virtual Machine (JVM) for OUD can be configured to ensure sufficient memory
    is used without overloading the server and will be discussed during the installation
    section of this book. Calculating the overall memory requirements can be done
    simply as follows:


        4 GB of memory for the OS


    +    4 GB of memory for WebLogic and the Administration Server


    +    2 GB of memory for the OUD JVM


    ___________________________________________________________


        10 GB physical memory required for OUD


    It is important to note that OUD uses a small database for the LDAP entries. This
    database requires a minimum of 1 GB of disk storage. Depending on the log configuration
    or replication, this can increase up to 30 to 40 GB. It is important to ensure
    that the log configuration and rotation are configured properly to prevent storage
    issues. Oracle also recommends that performance can be improved by sizing memory
    such that the entirety of the database files can be loaded into memory.


    #### Oracle Identity and Access Manager


    Although it is a good idea to keep the LDAP repository separated from the Identity
    and Access Management nodes, in most cases, Oracle Identity and Access Manager
    can be installed on the same physical hosts. Whether or not to install these into
    separate Fusion Middleware environments is up to the installers. However, the
    memory requirements will remain the same.


    The minimum required memory for OAM is 4 GB physical and 8 GB available, and the
    host(s) serving OIM must also consider SOA. Thus the OIM host requires a minimum
    of 8 GB physical and 16 GB available just for the managed servers. This is in
    addition to the minimum required for the Fusion Middleware infrastructure, or
    8 GB. Adding these together can give you the following calculation:


        4 GB for the OS


    +    4 GB for WebLogic and the Administration Server


    +    4 GB for OIM Managed Server


    +    4 GB for SOA Managed Server


    +    4 GB for the OIM Administration Server


    ____________________________________________________________


        20 GB memory required for OIM


    If OAM is installed on the same host within the same WebLogic instance as OIM,
    an additional 8 GB will be required. Of the 8 GB, 4 GB is allocated to the OAM
    Administration Server and another 4 GB to the Access Manager Managed Server. Due
    to the required 4 GB for an additional WebLogic instance, it might be desired
    to install the OAM Managed Server within the same domain as the OIM instance.


    ### Clustering Considerations


    Within Fusion Middleware, clusters are defined as multiple WLSs working together
    to increase reliability and performance. As discussed previously, adding more
    instances to a clustered domain can be done on a single machine, provided enough
    resources are available, or multiple machines.


    When determining clustering plans, it is important to strive to adhere to best
    practices. Implementing a clustered environment inherently increases complexity.
    Instead of single instances handling all services, additional instances are added,
    thus increasing the need for complex session handling, load balancing, distributed
    processing, and replication.


    #### Host Configurations


    Although Oracle recommends only one WebLogic instance per two CPUs, careful planning
    and capacity planning will ensure that the environment is able to handle the expected
    load. The linear scalability of the Fusion Middleware environment and Oracle’s
    identity products allows for future growth as the organization’s needs grow. It
    should be noted that the physical servers do not need to be configured with the
    same hardware. However, each server must meet the minimum requirements needed
    to support the deployed applications. It is also possible to deploy the clustered
    manage servers on different physical hosts.


    For example Host_1 might contain the Admin Server, Identity Manager, and Access
    Manager, whereas Host_2 contains only Identity Manager, and Access Manager is
    deployed on Host_3\. Depicted in Figure [2-11](#A352855_1_En_2_Chapter.html#Fig11)
    is a basic breakout of identity management components on physical hosts.


    ![A352855_1_En_2_Fig11_HTML.jpg](A352855_1_En_2_Fig11_HTML.jpg)


    Figure 2-11.


    Distribution of Identity Manager clusters on multiple hosts'
  trans: "#### WebLogic Server\n\n本节中的数字针对的是基础的 `WLS`。通常，服务器需要 8 GB 物理内存和 16 GB 可用内存。随着托管服务器和身份与访问管理组件的部署，将需要额外的内存。内存要求的具体细节见表\
    \ 2-2。\n\n表 2-2.\n按操作系统划分的 Fusion Middleware 最低内存要求\n\n| 操作系统 | 最小物理内存 | 最小可用内存\
    \ |\n| --- | --- | --- |\n| UNIX | 8 GB | 16 GB |\n| Linux | 8 GB | 16 GB |\n\
    | Windows | 8 GB | 16 GB |\n\n在此上下文中，可用内存等于物理内存加上交换空间内存。然而，增加可用内存中物理内存的占比，可以通过减少对磁盘上交换空间内存的\
    \ I/O 来提升性能。此基准是假设需要 4 GB 用于操作系统，加上 4 GB 用于 `WebLogic` 和管理服务器而计算得出的：\n\n```\n\
    \    4 GB of memory for the OS\n+    4 GB of memory for WLS and the Admin Server\n\
    _________________________________________________________\n    Total physical\
    \ memory required\n```\n\nFusion Middleware 环境的存储要求可能差异很大。Oracle 至少建议 10 GB 存储空间。应当考虑到日志记录和额外部署的软件会增加此数值。安装完成且环境稳定后，降低任何已部署应用程序和托管服务器的日志级别配置，可能是谨慎的做法。\n\
    \n#### Oracle Directory Services\n\n建议将 `OUD` 安装在与 Oracle 身份和访问管理实例分开的主机上。这是为了将\
    \ `LDAP` 身份存储库置于与数据库相同的内部网络层中。在之前显示的体系结构图中，您会注意到 `LDAP` 和数据库环境被放置在一个与应用中间件层分开的层中。因此，Oracle\
    \ 目录服务的内存要求将与 Oracle 身份和访问管理组件分开介绍。\n\n`OUD` 是一个基于 `Java` 的 `LDAP` 目录服务器。因此，与其他\
    \ Fusion Middleware 产品一样，它安装在受支持的应用服务器内。本节中的要求是针对软件本身的，必须与 Fusion Middleware 的最低要求相结合。这将在后面展示。\n\
    \nOracle 建议为 `OUD` 在生产环境中以最佳水平运行提供 2 GB 物理内存。这是在 Fusion Middleware 所需的 8 GB 之外的。`OUD`\
    \ 的 `Java` 虚拟机 (`JVM`) 可以进行配置，以确保使用足够的内存而不会使服务器过载，这将在本书的安装部分讨论。计算总体内存要求可以简单地按如下方式进行：\n\
    \n```\n    4 GB of memory for the OS\n+    4 GB of memory for WebLogic and the\
    \ Administration Server\n+    2 GB of memory for the OUD JVM\n___________________________________________________________\n\
    \    10 GB physical memory required for OUD\n```\n\n需要注意的是，`OUD` 使用一个小数据库来存储 `LDAP`\
    \ 条目。该数据库至少需要 1 GB 磁盘存储空间。根据日志配置或复制情况，这可以增加到 30 到 40 GB。确保日志配置和轮换设置正确，以防止存储问题，这一点非常重要。Oracle\
    \ 还建议，通过调整内存大小，使得整个数据库文件可以加载到内存中，可以提高性能。\n\n#### Oracle Identity and Access Manager\n\
    \n尽管将 `LDAP` 存储库与身份和访问管理节点分开是一个好主意，但在大多数情况下，Oracle Identity and Access Manager\
    \ 可以安装在相同的物理主机上。是否将它们安装到单独的 Fusion Middleware 环境中取决于安装者。然而，内存要求将保持不变。\n\n`OAM`\
    \ 的最低要求内存是 4 GB 物理内存和 8 GB 可用内存，而承载 `OIM` 服务的主机还必须考虑 `SOA`。因此，仅托管 `OIM` 服务器就需要至少\
    \ 8 GB 物理内存和 16 GB 可用内存。这是在 Fusion Middleware 基础设施所需的最低要求（即 8 GB）之外的。将它们相加可以得到以下计算：\n\
    \n```\n    4 GB for the OS\n+    4 GB for WebLogic and the Administration Server\n\
    +    4 GB for OIM Managed Server\n+    4 GB for SOA Managed Server\n+    4 GB\
    \ for the OIM Administration Server\n____________________________________________________________\n\
    \    20 GB memory required for OIM\n```\n\n如果 `OAM` 与 `OIM` 在同一个 `WebLogic` 实例中安装在同一主机上，则将需要额外的\
    \ 8 GB。在这 8 GB 中，4 GB 分配给 `OAM` 管理服务器，另外 4 GB 分配给访问管理器托管服务器。由于额外的 `WebLogic` 实例需要\
    \ 4 GB，因此可能希望将 `OAM` 托管服务器安装在与 `OIM` 实例相同的域中。\n\n### 集群注意事项\n\n在 Fusion Middleware\
    \ 中，集群被定义为多个 `WLS` 协同工作以提高可靠性和性能。如前所述，只要资源足够，可以在单台机器上或在多台机器上向集群域添加更多实例。\n\n在确定集群规划时，努力遵循最佳实践很重要。实施集群环境本质上增加了复杂性。服务不再由单个实例处理，而是添加了额外的实例，从而增加了对复杂会话处理、负载均衡、分布式处理和复制的需求。\n\
    \n#### 主机配置\n\n虽然 Oracle 建议每两个 `CPU` 只运行一个 `WebLogic` 实例，但仔细的规划和容量规划将确保环境能够处理预期的负载。Fusion\
    \ Middleware 环境和 Oracle 身份产品的线性可扩展性允许随着组织需求的增长而实现未来的增长。需要注意的是，物理服务器不需要配置相同的硬件。然而，每台服务器必须满足支持已部署应用程序所需的最低要求。也可以将集群托管服务器部署在不同的物理主机上。\n\
    \n例如，`Host_1` 可能包含管理服务器、身份管理器和访问管理器，而 `Host_2` 仅包含身份管理器，访问管理器则部署在 `Host_3` 上。图\
    \ 2-11 描绘了物理主机上身份管理组件的基本分布。\n\n![A352855_1_En_2_Fig11_HTML.jpg](img/A352855_1_En_2_Fig11_HTML.jpg)\n\
    图 2-11.\n在多个主机上分发身份管理器集群"
- fmt: '### Network Planning


    Network requirements increase for clustered environments as the number of servers
    grows. Depending on the organization’s network topology (DMZ | Application Tier
    or DMZ | Application Tier | Data Tier, etc.), the number of firewalls and load
    balancers will change. At each level, firewalls will need to be configured to
    allow appropriate communication. In many cases, organizations have two main network
    zones: public zone/DMZ and an intranet or internal zone. For simplicity, this
    two-zone configuration is presented in this book.


    The public zone or DMZ normally contains web servers that provide a front-end
    proxy to applications located in the intranet zone. This serves to separate the
    internal application zone from the public and protect resources by restricting
    internal communication to only approved protocols and ports. Within the DMZ, load
    balancers do the job of splitting the load between one or more web servers and
    firewalls serve to restrict communication. This provides tighter security, failover,
    and performance benefits.


    Within the intranet zone, application servers and database servers provide services
    to the users. These are accessed via the proxy and web servers enlisted in the
    DMZ. Because the firewalls restrict access, the servers within this zone are usually
    configured to communicate only on designated ports. In some cases such as database
    servers, a load balancer might be required to handle failover and load balancing
    tasks. In other cases, the use of web servers configured with the WLS module can
    handle load balancing. Load balancers can also be used as a Secure Sockets Layer
    (SSL) endpoint, thus unloading the encryption handling from the underlying servers.


    Whatever load balancing technology is used, the organization should ensure that
    it is capable of providing the following functionality:


    - Monitoring HTTP and HTTPS traffic.

    - Maintaining multiple virtual server names and ports.

    - Detection of server status.

    - Rerouting of requests in case of server outages.

    - SSL management, acceleration, termination, and so on.

    - Ability to add `WL-Proxy-SSL : true` to the `HTTP Request Handler`.


    ## Summary


    This chapter presented a number of concepts from hardware requirements to deployment
    topologies and preinstallation considerations. Instead of providing recommendations
    for options such as CPU architecture, OSs, and network hardware, this was presented
    in general guidelines. Each environment will have different requirements. However,
    the information provided should give an organization the ability to plan its deployment
    strategy.


    In the chapters that follow, an installation with two node clusters is demonstrated.
    In some cases, multiple Fusion Middleware homes and instances could be installed
    on a single server. These are identified, along with the reasoning behind them.


    # 3. User and Policy Stores


    Identity and access management systems are built around a core storage system
    capable of maintaining user information, roles, policies, and credentials. These
    storage systems can also be used to store information regarding network resources,
    peripherals, and applications. Most often directory stores use Lightweight Directory
    Access Protocol (LDAP)-based systems. Other storage methods include database stores
    and file stores. LDAP, however, provides a more widely accepted standard and compatibility
    with a wider group of applications.


    LDAP defines a standard method of accessing information regarding identity data,
    network resources, peripherals, and even encryption certificates and services.
    The identity information can contain user credentials, contact information, and
    other pertinent data used to identify individuals. This data can be used by applications
    such as e-mail for e-mail addresses. Perhaps the most useful function is the ability
    to provide authentication and role definition. Applications can use directories
    and standard LDAP commands to ensure that users have access to systems and only
    the data they are authorized to use.


    ## User and Policy Store Overview


    Data stored within LDAP directories is often structured in an organized fashion
    providing easier access when browsing and querying information. Furthermore, the
    objects conform to defined formats including required and mandatory attributes.
    These attributes not only help identify a person or object, but also afford applications
    the ability to query for groups of users fitting certain criteria.


    Although the LDAP does not define what data is stored or how it is structured,
    it does define how the data is accessed. LDAP-based directories have the advantage
    of being accessible to applications running on any platform. These applications
    can query the directory store using TCP/IP, LDAP protocols, and HTTP. As such,
    additional security can be afforded through the use of Secure Sockets Layer (SSL)
    and Transport Layer Security (TLS). This allows for faster development of applications
    by providing standard methods of implementing security. Multiple query tools exist
    for administration and browsing directories.


    Other identity storage methods such as file-based security and database user stores
    do not provide a standard method of data access. This leads to inefficient application
    development, as the application must be developed with the identity store in mind
    and the developers must know how to access the necessary information. Furthermore,
    this can cause incompatibilities as organizations migrate from legacy systems
    to new products or development efforts.


    As discussed previously, user information such as credentials and contact data
    can be stored within an LDAP directory. The data is normally stored in a tree-like
    structure that makes organization easier. In most cases, the base of the tree
    defines the organization or security realm. The base distinguished name (DN) can
    be set to something like `dc=mycompany,dc=com`, with `DC` standing for domain
    component. This provides a valid organization identification while being high
    level enough to break down the lower levels by region or business unit or other
    breakout defined by the enterprise. A directory tree could look something like
    Figure 3-1.


    ![A352855_1_En_3_Fig1_HTML.jpg](A352855_1_En_3_Fig1_HTML.jpg)


    Figure 3-1.

    Example LDAP directory structure users and groups by region (instead of using
    CN or common name, administrators could use organizational unit)


    ```

    dc=mycompany,dc=com

    ou=users

    ou=NorthAmerica

    ou=US

    ou=Canada

    ou=Mexico

    ou=Asia

    ou=Japan

    ou=China

    ou=Taiwan

    ```


    It should be noted that these are examples. Individual organizations might wish
    to organize by region, country, business unit, or resource, as shown in Figure
    3-2.


    ![A352855_1_En_3_Fig2_HTML.jpg](A352855_1_En_3_Fig2_HTML.jpg)


    Figure 3-2.

    Example LDAP structure for users and groups within region


    Because LDAP does not dictate how the data is structured or the granularity, companies
    are, for the most part, free to create the directory structure in a way that makes
    sense given their current and future situations. Design decisions might be made
    according to distributed administration or future plans of data partitioning or
    a host of other reasons.


    User and resource entries are stored within these branches. For the most part,
    this is how user identities are stored. For instance, user John Daily might work
    for mycompany in the United States. In the first example, the entry could be uniquely
    identified by `cn=john.daily,ou=US,ou=NorthAmerica,ou=users,dc=mycompany,dc=com`.
    This is what is known as a DN. It is common to use a name-based approach to assigning
    a DN such as `john.daily`. However, other organizations might wish to create user
    accounts using an assigned identifier to simplify name changes or preventing duplicate
    user accounts if a second John Daily were to join the company.'
