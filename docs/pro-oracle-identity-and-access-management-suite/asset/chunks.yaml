  trans: '

    ### 灾难恢复与最高可用性


    虽然本地高可用集群适用于许多组织，并能提供高水平的性能和故障转移能力，但有些组织需要跨多个地理区域分散负载并提供故障转移。这在遭遇整个数据中心损失时，可提供最高的可用性和最快的恢复速度。这种拓扑结构也可用于为地理上分散的用户群体提供更好的性能。这对组织来说是成本最高的方案，因为它需要更多的硬件和多个数据中心场地，同时也增加了复杂性和管理难度。然而，对于需要
    `99.999`% 正常运行时间且有极高容量和性能要求的组织而言，考虑到它所带来的益处，这仍是终极解决方案。


    对于在全球开展业务的组织而言，最高可用性是一项必要要求。这些组织无法承受其系统宕机或安全成为服务访问的瓶颈。这些公司内部的 IT 团队可能会选择将数据复制到多个数据中心。**主备环境**允许更快的恢复。如果主站点丢失，在故障转移过程中，所有流量都可被定向到备用站点。当主数据中心重新上线后，所有流量会被重定向回主站点，并重新开始复制以确保备用站点数据一致。另一种选择是在数据中心之间维护一个**双活集群**。在这种情况下，所有流量会在所有数据中心的所有节点之间进行负载均衡。如果一个数据中心丢失，负载均衡器会自动将流量导向剩余的服务器。


    集群还带来了一个额外好处，即可将计算能力和任务分散到多个节点上。许多大型公司在全球拥有海量的身份数据和用户。通过使用代理服务器并将数据分布在多个地理位置，组织可以减少网络流量和查询时间。例如，在纽约设立一个数据中心，存储北美地区的身份数据；同时在东京设立另一个数据中心，处理亚洲地区的身份数据，这样就能将数据本地化，从而降低亚洲国家请求的网络延迟。由于每个区域的数据源更小，查询时间也随之减少。对于用户群体地理分布不广但拥有大量数据的组织，同样的功能可用于在多台服务器上处理数据子集，从而减少查询时间，同时通过跨多个位置复制服务器来改善恢复时间和可靠性。这种环境的一个示例见图
    `2-3`。


    ![A352855_1_En_2_Fig3_HTML.jpg](img/A352855_1_En_2_Fig3_HTML.jpg)


    图 `2-3`. 通用多数据中心最高可用性架构


    图 `2-3` 描绘了一个环境，其中应用架构的每一层都是集群化并分布于多个地理位置。这将本地高可用集群配置复制到一个或多个地理上分离的数据中心。这样做提高了容错能力和性能。需要注意的是，图
    `2-3` 未详细说明数据负载的分布。这些内容将在本章后续部分，结合 Oracle 身份与访问管理拓扑进行讨论。


    ### 拓扑实现


    到目前为止，本章主要集中在 `Fusion Middleware` 环境的通用术语以及可以采取哪些措施来提高性能和可用性上。身份与访问管理的各个组件利用这些拓扑结构为组织提供这些益处。以下将结合身份与访问管理的组件来讨论这些内容。


    这些建议基于 Oracle 企业部署指南 (`EDG`)。`EDG` 代表了由 Oracle 工程师开发的、旨在提供最佳性能和可靠性的建议架构。虽然它们没有给出具体的硬件或调优要求，但提供了关于应如何安装和配置环境的总体思路。在确定组织的整体需求时，应遵循这些总体指导原则。使用这些指南也将有助于建立更标准化的环境，从而更易于添加新资源、进行故障排查，以及让新管理员更容易定位必要的组件。

    '
- fmt: '## Oracle Directory Services


    Oracle Unified Directory (`OUD`) supports multiple levels of load balancing and
    distribution. The most basic form is simple load balancing. This implementation
    allows for a proxy to determine which node should handle requests based on server
    status and load. This evenly divides the workload between one or more servers,
    thus providing failover and increased performance as shown in Figure [2-4](#A352855_1_En_2_Chapter.html#Fig4).


    ![`A352855_1_En_2_Fig4_HTML.jpg`](A352855_1_En_2_Fig4_HTML.jpg)


    Figure 2-4.


    Oracle Directory Services simple replication for load balancing


    Figure [2-4](#A352855_1_En_2_Chapter.html#Fig4) describes a simple load balancing
    scenario. All data on `LDAP Server 1` is replicated to `LDAP Server 2`. The Unified
    Directory Proxy handles load balancing between the two LDAP servers, thus reducing
    overall load on a single server instance. Load balancing, in this case, can be
    configured with a proxy. Using the Oracle Unified Directory Proxy, the environment
    can be configured to split the workload by data distribution. With a simple distribution,
    data is partitioned so that only part of the overall data is stored on each server.
    The proxy is aware of the contents of each partition and routes data to the nodes
    as appropriate.


    Figure [2-5](#A352855_1_En_2_Chapter.html#Fig5) describes an environment where
    identity information is split so that half of the alphabet resides on `LDAP Server
    1` and the other half resides on `LDAP Server 2`. This distribution unloads the
    server workloads by splitting the work according to what data is required. The
    distribution algorithms supported include numeric, lexico, and `dn` pattern.


    ![`A352855_1_En_2_Fig5_HTML.jpg`](A352855_1_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    Oracle Directory Services simple distribution


    Building on the previously mentioned simple replication and simple distributed
    architectures, the failover between datacenters implements the maximum availability
    and disaster recovery topologies. In this architecture, the load is not just split
    across multiple servers, but also replicated across datacenters. This provides
    a load-balanced environment in one datacenter that can be failed over to another
    datacenter in case of outage or saturation. In Figure [2-6](#A352855_1_En_2_Chapter.html#Fig6),
    one such example is presented.


    ![`A352855_1_En_2_Fig6_HTML.jpg`](A352855_1_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    Load balanced site with replica nodes


    Figure [2-6](#A352855_1_En_2_Chapter.html#Fig6) depicts an environment where the
    LDAP servers are replicated within `Datacenter 1` and that environment is replicated
    to `Datacenter 2`. The load balancing within each datacenter is configured based
    on the needs of the organization. The failover event can be configured to route
    requests to `Datacenter 2` in case of loss of `Datacenter 1`. However, another
    option is to configure the failover for saturation events. In case `Datacenter
    1` becomes overwhelmed, requests can be sent to `Datacenter 2` until the saturation
    goes back to normal levels.


    The previous example provides load balancing between servers within each datacenter
    based on replicated data on each server. The next option involves load balancing
    distributed data between servers in a single datacenter. This option would be
    ideal for organizations that lack secondary datacenters, but have very large identity
    data needs and expect heavy loads. As seen in Figure [2-7](#A352855_1_En_2_Chapter.html#Fig7),
    identity data is split across two LDAP servers alphabetically while multiple failover
    nodes provide stability and load balancing.


    ![`A352855_1_En_2_Fig7_HTML.jpg`](A352855_1_En_2_Fig7_HTML.jpg)


    Figure 2-7.


    Load balanced distributed data


    In Figure [2-7](#A352855_1_En_2_Chapter.html#Fig7), identity data is distributed
    across two servers, allowing each partition to serve only requests based on the
    query string. Each partition is then replicated to a second instance to allow
    for load balancing. This architecture provides extremely fast performance as requests
    are directed to servers based on what it contains and the load placed on it compared
    to the others.


    Although a load balanced distributed architecture provides a high level of performance
    and some redundancy in case of server issues, it provides little failover if a
    there is a problem at the datacenter. The ultimate in availability and performance
    combines all of these concepts to create a multiple datacenter load balanced distributed
    data environment. Figure [2-8](#A352855_1_En_2_Chapter.html#Fig8) demonstrates
    the distributed architecture across multiple failover sites.


    ![`A352855_1_En_2_Fig8_HTML.jpg`](A352855_1_En_2_Fig8_HTML.jpg)


    Figure 2-8.


    Load balanced distributed data with failover between datacenters


    With the load balanced distributed data with failover between datacenters described
    in Figure [2-8](#A352855_1_En_2_Chapter.html#Fig8), `LDAP Server A to L` is replicated
    within `Datacenter 1`. This data is then replicated to the two instances of `LDAP
    Server A to L` in `Datacenter 2`. This produces a load-balanced partition of identity
    data that can fail over to another datacenter in the event of an outage. As before,
    this reduces the load on individual servers by allowing each to handle a subset
    of the overall data. It then increases the reliability and performance by splitting
    the load for an individual data partition across multiple servers. Furthermore,
    the failover for each partition can be configured to redirect requests based on
    status or saturation.


    ## Oracle Access Manager


    `OAM` utilizes the `WLS` clustering capabilities to provide high availability
    and performance scalability. These features depend on proper setup from the web
    tier to the database tier. It should be noted that for higher availability and
    performance, a load balancer should handle all HTTP requests with session stickiness
    for HTTP traffic prior to the `OHS` web servers. `OAM` load balancing and simple
    failover is presented in Figure [2-9](#A352855_1_En_2_Chapter.html#Fig9).


    ![`A352855_1_En_2_Fig9_HTML.jpg`](A352855_1_En_2_Fig9_HTML.jpg)


    Figure 2-9.


    Basic Oracle Access management local high availability architecture


    In the Oracle Access Management local high availability architecture shown in
    Figure [2-9](#A352855_1_En_2_Chapter.html#Fig9), requests are first handled by
    the load balanced web tier consisting of two or more Oracle HTTP servers with
    the `mod_wl_ohs` module. The `mod_wl_ohs` module is configured using a file called
    `mod_wl_ohs.conf`, which identifies the location of WebLogic managed servers.
    If `OAM` protects the requested resource, the `WebGate` component configured on
    the `OHS` instance collects the necessary credentials and forwards them to `OAM`.
    It should be noted that HTTP session stickiness should be set at the load balancer
    to ensure that subsequent user requests are routed to the proper server.


    `OAM` is deployed on a set of `WLS`s and clustered using the standard domain,
    machine, and cluster capabilities. As per a normal cluster, the `Admin Server`
    is installed on both WebLogic nodes. However, it only runs on one server at a
    time. `OAM Server 1` and `OAM Server 2` are deployed on machines configured on
    `OAM Host 1` and `OAM Host 2`. Because both machines are part of the same WebLogic
    domain, they can be controlled by the single `Admin Server` instance running on
    `OAM Host 1`.


    From the `OAM Server` instances, authentication queries are sent to the back-end
    LDAP server through a load balancer. As discussed in the previous section, the
    LDAP server can be `OVD`, `OID`, or `OUD`. For the best performance and availability,
    the LDAP server tier should be configured for load balancing as presented in the
    previous section.


    Although a single instance of Oracle Access Management can support a large number
    of users while still providing decent performance, a multiple instance configuration
    can provide redundancy to provide fault tolerance and recovery as well as load
    balancing to provide better performance.'
  raw: '#### Oracle Directory Services


    Oracle Unified Directory (OUD ) supports multiple levels of load balancing and
    distribution. The most basic form is simple load balancing. This implementation
    allows for a proxy to determine which node should handle requests based on server
    status and load. This evenly divides the workload between one or more servers,
    thus providing failover and increased performance as shown in Figure [2-4](#A352855_1_En_2_Chapter.html#Fig4).


    ![A352855_1_En_2_Fig4_HTML.jpg](A352855_1_En_2_Fig4_HTML.jpg)


    Figure 2-4.


    Oracle Directory Services simple replication for load balancing


    Figure [2-4](#A352855_1_En_2_Chapter.html#Fig4) describes a simple load balancing
    scenario. All data on LDAP Server 1 is replicated to LDAP Server 2\. The Unified
    Directory Proxy handles load balancing between the two LDAP servers, thus reducing
    overall load on a single server instance. Load balancing, in this case, can be
    configured with a proxy. Using the Oracle Unified Directory Proxy, the environment
    can be configured to split the workload by data distribution. With a simple distribution,
    data is partitioned so that only part of the overall data is stored on each server.
    The proxy is aware of the contents of each partition and routes data to the nodes
    as appropriate.


    Figure [2-5](#A352855_1_En_2_Chapter.html#Fig5) describes an environment where
    identity information is split so that half of the alphabet resides on LDAP Server
    1 and the other half resides on LDAP Server 2\. This distribution unloads the
    server workloads by splitting the work according to what data is required. The
    distribution algorithms supported include numeric, lexico, and dn pattern.


    ![A352855_1_En_2_Fig5_HTML.jpg](A352855_1_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    Oracle Directory Services simple distribution


    Building on the previously mentioned simple replication and simple distributed
    architectures, the failover between datacenters implements the maximum availability
    and disaster recovery topologies. In this architecture, the load is not just split
    across multiple servers, but also replicated across datacenters. This provides
    a load-balanced environment in one datacenter that can be failed over to another
    datacenter in case of outage or saturation. In Figure [2-6](#A352855_1_En_2_Chapter.html#Fig6),
    one such example is presented.


    ![A352855_1_En_2_Fig6_HTML.jpg](A352855_1_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    Load balanced site with replica nodes


    Figure [2-6](#A352855_1_En_2_Chapter.html#Fig6) depicts an environment where the
    LDAP servers are replicated within Datacenter 1 and that environment is replicated
    to Datacenter 2\. The load balancing within each datacenter is configured based
    on the needs of the organization. The failover event can be configured to route
    requests to Datacenter 2 in case of loss of Datacenter 1\. However, another option
    is to configure the failover for saturation events. In case Datacenter 1 becomes
    overwhelmed, requests can be sent to Datacenter 2 until the saturation goes back
    to normal levels.


    The previous example provides load balancing between servers within each datacenter
    based on replicated data on each server. The next option involves load balancing
    distributed data between servers in a single datacenter. This option would be
    ideal for organizations that lack secondary datacenters, but have very large identity
    data needs and expect heavy loads. As seen in Figure [2-7](#A352855_1_En_2_Chapter.html#Fig7),
    identity data is split across two LDAP servers alphabetically while multiple failover
    nodes provide stability and load balancing.


    ![A352855_1_En_2_Fig7_HTML.jpg](A352855_1_En_2_Fig7_HTML.jpg)


    Figure 2-7.


    Load balanced distributed data


    In Figure [2-7](#A352855_1_En_2_Chapter.html#Fig7), identity data is distributed
    across two servers, allowing each partition to serve only requests based on the
    query string. Each partition is then replicated to a second instance to allow
    for load balancing. This architecture provides extremely fast performance as requests
    are directed to servers based on what it contains and the load placed on it compared
    to the others.


    Although a load balanced distributed architecture provides a high level of performance
    and some redundancy in case of server issues, it provides little failover if a
    there is a problem at the datacenter. The ultimate in availability and performance
    combines all of these concepts to create a multiple datacenter load balanced distributed
    data environment. Figure [2-8](#A352855_1_En_2_Chapter.html#Fig8) demonstrates
    the distributed architecture across multiple failover sites.


    ![A352855_1_En_2_Fig8_HTML.jpg](A352855_1_En_2_Fig8_HTML.jpg)


    Figure 2-8.


    Load balanced distributed data with failover between datacenters


    With the load balanced distributed data with failover between datacenters described
    in Figure [2-8](#A352855_1_En_2_Chapter.html#Fig8), LDAP Server A to L is replicated
    within Datacenter 1\. This data is then replicated to the two instances of LDAP
    Server A to L in Datacenter 2\. This produces a load-balanced partition of identity
    data that can fail over to another datacenter in the event of an outage. As before,
    this reduces the load on individual servers by allowing each to handle a subset
    of the overall data. It then increases the reliability and performance by splitting
    the load for an individual data partition across multiple servers. Furthermore,
    the failover for each partition can be configured to redirect requests based on
    status or saturation.


    #### Oracle Access Manager


    OAM utilizes the WLS clustering capabilities to provide high availability and
    performance scalability. These features depend on proper setup from the web tier
    to the database tier. It should be noted that for higher availability and performance,
    a load balancer should handle all HTTP requests with session stickiness for HTTP
    traffic prior to the OHS web servers. OAM load balancing and simple failover is
    presented in Figure [2-9](#A352855_1_En_2_Chapter.html#Fig9).


    ![A352855_1_En_2_Fig9_HTML.jpg](A352855_1_En_2_Fig9_HTML.jpg)


    Figure 2-9.


    Basic Oracle Access management local high availability architecture


    In the Oracle Access Management local high availability architecture shown in
    Figure [2-9](#A352855_1_En_2_Chapter.html#Fig9), requests are first handled by
    the load balanced web tier consisting of two or more Oracle HTTP servers with
    the mod_wl_ohs module. The mod_wl_ohs module is configured using a file called
    mod_wl_ohs.conf, which identifies the location of WebLogic managed servers. If
    OAM protects the requested resource, the WebGate component configured on the OHS
    instance collects the necessary credentials and forwards them to OAM. It should
    be noted that HTTP session stickiness should be set at the load balancer to ensure
    that subsequent user requests are routed to the proper server.


    OAM is deployed on a set of WLSs and clustered using the standard domain, machine,
    and cluster capabilities. As per a normal cluster, the Admin Server is installed
    on both WebLogic nodes. However, it only runs on one server at a time. OAM Server
    1 and OAM Server 2 are deployed on machines configured on OAM Host 1 and OAM Host
    2\. Because both machines are part of the same WebLogic domain, they can be controlled
    by the single Admin Server instance running on OAM Host 1.


    From the OAM Server instances, authentication queries are sent to the back-end
    LDAP server through a load balancer. As discussed in the previous section, the
    LDAP server can be OVD, OID, or OUD. For the best performance and availability,
    the LDAP server tier should be configured for load balancing as presented in the
    previous section.


    Although a single instance of Oracle Access Management can support a large number
    of users while still providing decent performance, a multiple instance configuration
    can provide redundancy to provide fault tolerance and recovery as well as load
    balancing to provide better performance.'
  trans: '## Oracle 目录服务


    Oracle 统一目录 (`OUD`) 支持多层级的负载均衡和分发。最基本的形式是简单负载均衡。这种实现方式允许代理根据服务器状态和负载来确定哪个节点应处理请求。这将在一个或多个服务器之间平均分配工作负载，从而提供故障转移和性能提升，如图
    2-4 所示。


    ![`A352855_1_En_2_Fig4_HTML.jpg`](img/A352855_1_En_2_Fig4_HTML.jpg)


    图 2-4.


    用于负载均衡的 Oracle 目录服务简单复制


    图 2-4 描述了一个简单的负载均衡场景。`LDAP 服务器 1`上的所有数据都被复制到`LDAP 服务器 2`。统一目录代理处理两个 LDAP 服务器之间的负载均衡，从而降低了单个服务器实例的整体负载。在这种情况下，负载均衡可以通过代理进行配置。使用
    Oracle 统一目录代理，可以将环境配置为按数据分发来拆分工作负载。通过简单分发，数据被分区，使得每个服务器仅存储整体数据的一部分。代理知晓每个分区的内容，并将数据适当地路由到节点。


    图 2-5 描述了一个环境，其中身份信息被拆分，使得字母表的前半部分驻留在`LDAP 服务器 1`，后半部分驻留在`LDAP 服务器 2`。这种分发通过根据所需数据拆分工作来卸载服务器工作负载。支持的分发算法包括数字、词典和`dn`模式。


    ![`A352855_1_En_2_Fig5_HTML.jpg`](img/A352855_1_En_2_Fig5_HTML.jpg)


    图 2-5.


    Oracle 目录服务简单分发


    在前述简单复制和简单分发架构的基础上，数据中心间的故障转移实现了最高可用性和灾难恢复拓扑。在此架构中，负载不仅跨多个服务器拆分，还在数据中心之间复制。这在一个数据中心内提供了负载均衡的环境，在发生中断或饱和时可以故障转移到另一个数据中心。图
    2-6 展示了一个这样的例子。


    ![`A352855_1_En_2_Fig6_HTML.jpg`](img/A352855_1_En_2_Fig6_HTML.jpg)


    图 2-6.


    具有副本节点的负载均衡站点


    图 2-6 描绘了一个环境，其中 LDAP 服务器在`数据中心 1`内复制，并且该环境被复制到`数据中心 2`。每个数据中心内的负载均衡根据组织的需求进行配置。故障转移事件可以配置为在`数据中心
    1`丢失时将请求路由到`数据中心 2`。然而，另一个选项是为饱和事件配置故障转移。如果`数据中心 1`变得不堪重负，请求可以被发送到`数据中心 2`，直到饱和度恢复到正常水平。


    前面的例子提供了基于每个服务器上复制数据的数据中心内各服务器之间的负载均衡。下一个选项涉及在单个数据中心内对服务器间的分发数据进行负载均衡。此选项非常适合没有辅助数据中心，但具有非常大的身份数据需求并预期负载很重的组织。如图
    2-7 所示，身份数据按字母顺序拆分到两个 LDAP 服务器，同时多个故障转移节点提供稳定性和负载均衡。


    ![`A352855_1_En_2_Fig7_HTML.jpg`](img/A352855_1_En_2_Fig7_HTML.jpg)


    图 2-7.


    负载均衡的分发数据


    在图 2-7 中，身份数据分布在两台服务器上，允许每个分区仅服务于基于查询字符串的请求。然后每个分区被复制到第二个实例以实现负载均衡。这种架构提供了极快的性能，因为请求是根据服务器包含的内容以及与其他服务器相比所承受的负载来定向到服务器的。


    尽管负载均衡的分发架构提供了高水平的性能和在服务器问题发生时的一些冗余，但如果数据中心出现问题，它提供的故障转移能力有限。最高级别的可用性和性能将所有这些概念结合起来，创建了一个多数据中心负载均衡分发数据环境。图
    2-8 展示了跨多个故障转移站点的分发架构。


    ![`A352855_1_En_2_Fig8_HTML.jpg`](img/A352855_1_En_2_Fig8_HTML.jpg)


    图 2-8.


    具有数据中心间故障转移的负载均衡分发数据


    使用图 2-8 描述的具有数据中心间故障转移的负载均衡分发数据，`LDAP 服务器 A 到 L`在`数据中心 1`内复制。然后这些数据被复制到`数据中心 2`中两个`LDAP
    服务器 A 到 L`实例。这产生了一个负载均衡的身份数据分区，在发生中断时可以故障转移到另一个数据中心。如前所述，这通过允许每个服务器处理总体数据的一个子集来降低各个服务器的负载。然后，通过为单个数据分区跨多个服务器拆分负载来提高可靠性和性能。此外，可以为每个分区配置故障转移，以根据状态或饱和度重定向请求。


    ## Oracle 访问管理器


    `OAM`利用`WLS`集群功能来提供高可用性和性能可扩展性。这些功能依赖于从 Web 层到数据库层的正确设置。需要注意的是，为了更高的可用性和性能，负载均衡器应在`OHS`
    Web 服务器之前处理所有具有 HTTP 流量会话保持性的 HTTP 请求。`OAM`负载均衡和简单故障转移如图 2-9 所示。


    ![`A352855_1_En_2_Fig9_HTML.jpg`](img/A352855_1_En_2_Fig9_HTML.jpg)


    图 2-9.


    基本 Oracle 访问管理本地高可用架构


    如图 2-9 所示的 Oracle 访问管理本地高可用架构中，请求首先由负载均衡的 Web 层处理，该层由两个或多个带有`mod_wl_ohs`模块的 Oracle
    HTTP 服务器组成。`mod_wl_ohs`模块使用名为`mod_wl_ohs.conf`的文件进行配置，该文件标识了 WebLogic 受管服务器的位置。如果`OAM`保护请求的资源，配置在`OHS`实例上的`WebGate`组件会收集必要的凭证并将其转发给`OAM`。需要注意的是，应在负载均衡器上设置
    HTTP 会话保持性，以确保后续用户请求被路由到正确的服务器。


    `OAM`部署在一组`WLS`上，并使用标准域、计算机和集群功能进行集群。根据常规集群，`管理服务器`安装在两个 WebLogic 节点上。但是，它一次只在一台服务器上运行。`OAM
    服务器 1`和`OAM 服务器 2`部署在`OAM 主机 1`和`OAM 主机 2`上配置的机器上。因为两台机器属于同一个 WebLogic 域，所以它们可以由运行在`OAM
    主机 1`上的单个`管理服务器`实例控制。


    从`OAM 服务器`实例，身份验证查询通过负载均衡器发送到后端 LDAP 服务器。如前一节所述，LDAP 服务器可以是`OVD`、`OID`或`OUD`。为了获得最佳性能和可用性，LDAP
    服务器层应配置为如前一节所述的负载均衡。


    虽然单个 Oracle 访问管理实例可以支持大量用户，同时仍能提供良好的性能，但多实例配置可以提供冗余以实现容错和恢复，以及负载均衡以提供更好的性能。'
- fmt: '# Oracle Identity Manager


    Much like `OAM`, `OIM` relies on the `WebLogic` architecture for performance clusters
    and high availability. However, due to its reliance on Oracle service-oriented
    architecture (`SOA`), there is one more level of complexity. In addition `OIM`
    clusters configured to use a `RAC database` will require users to resubmit their
    requests if a failure at the database occurs. To provide high availability and
    load balancing for performance, `OIM` must be configured for clustering at every
    level from the web tier to the database and `LDAP` tiers. Figure [2-10](#A352855_1_En_2_Chapter.html#Fig10)
    shows the Oracle Identity Management high availability architecture.


    ![A352855_1_En_2_Fig10_HTML.jpg](A352855_1_En_2_Fig10_HTML.jpg)


    Figure 2-10. Oracle Identity Management local high availability architecture


    A few details of Figure [2-10](#A352855_1_En_2_Chapter.html#Fig10) should be noted.


    *   An `OIM` managed server has been deployed on both `OIM Host 1` and `OIM Host
    2`.

    *   An `SOA` managed server has been deployed on both `OIM Host 1` and `OIM Host
    2`.

    *   The `Admin Server` can be installed on both hosts. However, it can run on
    one node at a time.

    *   The `RAC database` is configured with a Java Database Connectivity (`JDBC`)
    multidata source on both nodes to protect against database node failure.

    *   The virtual host names configured for `OIM` and `SOA` allow for failover in
    case of loss of a node.


    Using these architectures for each of the components of Oracle Identity and Access
    Management combined, the organization can create a scalable and highly available
    environment. Although each presents only a two-node cluster, they can be expanded
    to include more nodes and even extended to include multiple datacenters. Expansion
    to additional datacenters and providing data replication and partitioning, however,
    is outside of the scope of this book. They were discussed to allow the reader
    to consider these options prior to implementing the environment, as special consideration
    will be needed.


    Each of the Oracle Identity and Access Management components was presented in
    a separate section, as each is a building block that can be implemented separately
    as the organization requirements grow. Although they can be installed on completely
    separate hardware or on single servers, installing them in separate `WLSs` will
    simplify software life cycles.


    Implementation in phases as required allows the organization to install the minimum
    software to meet its needs. For instance, if the organization’s short-term necessity
    is an identity repository to centralize management or application authentication,
    `Oracle Directory Services` can be utilized without the added overhead of `Identity
    Manager` or `Access Manager`. `OAM` can be added later to provide single sign-on
    (`SSO`), and later `OIM` can be implemented to complete the stack and provide
    access to the identity governance and full identity life cycle management.


    Keeping the various components of Identity and Access Management in separate `WebLogic`
    environments simplifies the management of the software life cycle. There will
    be many times that the organization might need to upgrade one piece of the stack,
    such as `Oracle Directory Services`, while leaving `OIM` and `OAM` at their current
    versions. `WLS` might require a patch for `OIM`, although this patch could have
    adverse affects on `OAM`. In these cases, keeping each component in a separate
    `WLS home` will ensure that patches and upgrades can be performed and tested without
    risking the other functionality.


    When determining how to implement these components, one must consider the complexity
    versus manageability of the chosen methodology. For some organizations, it might
    seem that installing each component within a separate `WebLogic` environment would
    be the best overall choice, other organizations might decide that combining `OAM`
    and `OIM` in the same domain while separating `Oracle Directory Server` is the
    best.


    ## Prerequisites


    As with any software, the Oracle Identity and Access Management Suite has its
    own set of requirements that must be met before a successful implementation can
    be performed. As with all of their products, Oracle provides a list of certified
    environments including `OSs`, `Java` runtime environments, application servers,
    and `CPU` architectures. Meeting these certifications will ensure that the environment
    performs at a baseline level and proper support if needed from Oracle.


    ### Operating Systems


    The `Fusion Middleware` suite of products and applications can be deployed on
    a number of certified `OSs`. Each organization has different reasons for running
    its chosen `OS`. Therefore, the scope of this book does not include `OS` recommendations.
    It is important during the planning phases to ensure that Oracle certifies the
    `OS` to be used. These certifications will also include any required patches and
    packages to make installation successful.


    ### Fusion Middleware Hardware Requirements


    Meeting the system requirements for Identity and Access Management begins with
    ensuring the hardware requirements for the `Fusion Middleware` environment are
    met. This includes `CPU`, memory, storage and network configurations. The information
    presented here represents the minimum requirements as provided by Oracle, but
    in most cases exceeding these minimums will provide room for growth and the ability
    to handle sudden changes in application load.


    In its installation planning guides, Oracle provides a list of typical `CPU` configurations.
    For Identity and Access Management `11.1.2.x`, it is recommended that the environments
    meet the following guidelines. The recommended architecture for each component
    is shown in Table [2-1](#A352855_1_En_2_Chapter.html#Tab1).


    Table 2-1. Recommended CPU Configurations


    | Managed Server | Processor |

    | --- | --- |

    | Oracle Access Manager | 6 or more X Pentium 1.5 GHz or better |

    | Oracle Directory Services | 2 or more X Pentium 1.5 GHz or better |

    | Oracle Identity Manager | 6 or more X Pentium 1.5 GHz or better |


    In general, the Oracle Identity and Access Management products require a minimum
    memory availability greater than 4 GB. As such, 64-bit `OSs` must be used and
    installed on 64-bit `CPU` architectures. It should also be noted that 64-bit `CPUs`
    are capable of performing more calculations per second than 32-bit `CPUs`. Although
    in many cases, Oracle provides 32-bit versions of their products, the growth of
    64-bit processing power and support affords many improvements in performance and
    scalability.'
  raw: '#### Oracle Identity Manager


    Much like OAM, OIM relies on the WebLogic architecture for performance clusters
    and high availability. However, due to its reliance on Oracle service-oriented
    architecture (SOA), there is one more level of complexity. In addition OIM clusters
    configured to use a RAC database will require users to resubmit their requests
    if a failure at the database occurs. To provide high availability and load balancing
    for performance, OIM must be configured for clustering at every level from the
    web tier to the database and LDAP tiers. Figure [2-10](#A352855_1_En_2_Chapter.html#Fig10)
    shows the Oracle Identity Management high availability architecture.


    ![A352855_1_En_2_Fig10_HTML.jpg](A352855_1_En_2_Fig10_HTML.jpg)


    Figure 2-10.


    Oracle Identity Management local high availability architecture


    A few details of Figure [2-10](#A352855_1_En_2_Chapter.html#Fig10) should be noted.


    *   An OIM managed server has been deployed on both OIM Host 1 and OIM Host 2.

    *   An SOA managed server has been deployed on both OIM Host 1 and OIM Host 2.

    *   The Admin Server can be installed on both hosts. However, it can run on one
    node at a time.

    *   The RAC database is configured with a Java Database Connectivity (JDBC) multidata
    source on both nodes to protect against database node failure.

    *   The virtual host names configured for OIM and SOA allow for failover in case
    of loss of a node.


    Using these architectures for each of the components of Oracle Identity and Access
    Management combined, the organization can create a scalable and highly available
    environment. Although each presents only a two-node cluster, they can be expanded
    to include more nodes and even extended to include multiple datacenters. Expansion
    to additional datacenters and providing data replication and partitioning, however,
    is outside of the scope of this book. They were discussed to allow the reader
    to consider these options prior to implementing the environment, as special consideration
    will be needed.


    Each of the Oracle Identity and Access Management components was presented in
    a separate section, as each is a building block that can be implemented separately
    as the organization requirements grow. Although they can be installed on completely
    separate hardware or on single servers, installing them in separate WLSs will
    simplify software life cycles.


    Implementation in phases as required allows the organization to install the minimum
    software to meet its needs. For instance, if the organization’s short-term necessity
    is an identity repository to centralize management or application authentication,
    Oracle Directory Services can be utilized without the added overhead of Identity
    Manager or Access Manager. OAM can be added later to provide single sign-on (SSO),
    and later OIM can be implemented to complete the stack and provide access to the
    identity governance and full identity life cycle management.


    Keeping the various components of Identity and Access Management in separate WebLogic
    environments simplifies the management of the software life cycle. There will
    be many times that the organization might need to upgrade one piece of the stack,
    such as Oracle Directory Services, while leaving OIM and OAM at their current
    versions. WLS might require a patch for OIM, although this patch could have adverse
    affects on OAM. In these cases, keeping each component in a separate WLS home
    will ensure that patches and upgrades can be performed and tested without risking
    the other functionality.


    When determining how to implement these components, one must consider the complexity
    versus manageability of the chosen methodology. For some organizations, it might
    seem that installing each component within a separate WebLogic environment would
    be the best overall choice, other organizations might decide that combining OAM
    and OIM in the same domain while separating Oracle Directory Server is the best.


    ## Prerequisites


    As with any software, the Oracle Identity and Access Management Suite has its
    own set of requirements that must be met before a successful implementation can
    be performed. As with all of their products, Oracle provides a list of certified
    environments including OSs, Java runtime environments, application servers, and
    CPU architectures. Meeting these certifications will ensure that the environment
    performs at a baseline level and proper support if needed from Oracle.


    ### Operating Systems


    The Fusion Middleware suite of products and applications can be deployed on a
    number of certified OSs. Each organization has different reasons for running its
    chosen OS. Therefore, the scope of this book does not include OS recommendations.
    It is important during the planning phases to ensure that Oracle certifies the
    OS to be used. These certifications will also include any required patches and
    packages to make installation successful.


    ### Fusion Middleware Hardware Requirements


    Meeting the system requirements for Identity and Access Management begins with
    ensuring the hardware requirements for the Fusion Middleware environment are met.
    This includes CPU, memory, storage and network configurations. The information
    presented here represents the minimum requirements as provided by Oracle, but
    in most cases exceeding these minimums will provide room for growth and the ability
    to handle sudden changes in application load.


    In its installation planning guides, Oracle provides a list of typical CPU configurations.
    For Identity and Access Management 11.1.2.x, it is recommended that the environments
    meet the following guidelines. The recommended architecture for each component
    is shown in Table [2-1](#A352855_1_En_2_Chapter.html#Tab1).


    Table 2-1.


    Recommended CPU Configurations


    | Managed Server | Processor |

    | --- | --- |

    | Oracle Access Manager | 6 or more X Pentium 1.5 GHz or better |

    | Oracle Directory Services | 2 or more X Pentium 1.5 GHz or better |

    | Oracle Identity Manager | 6 or more X Pentium 1.5 GHz or better |


    In general, the Oracle Identity and Access Management products require a minimum
    memory availability greater than 4 GB. As such, 64-bit OSs must be used and installed
    on 64-bit CPU architectures. It should also be noted that 64-bit CPUs are capable
    of performing more calculations per second than 32-bit CPUs. Although in many
    cases, Oracle provides 32-bit versions of their products, the growth of 64-bit
    processing power and support affords many improvements in performance and scalability.'
