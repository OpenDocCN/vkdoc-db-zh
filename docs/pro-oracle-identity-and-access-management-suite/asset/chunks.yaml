  trans: '# 配置 Oracle Virtual Directory 领域及管理员密码


    账户 `cn=orcladmin` 是用于 OID 的标准管理账户。请为此账户设置密码，并**妥善保管**。没有它，您将无法执行某些管理功能。


    注意：可以运行一个脚本来重置 `orcladmin` 密码。要运行此脚本，您必须知道 Oracle 目录服务模式连接信息。该实用程序名为 `oidpasswd`，位于
    `$ORACLE_INSTANCE/bin` 目录中。


    在开始安装过程之前，已使用 RCU 创建了必要的模式对象。在此步骤中，请使用以下格式指定数据库的位置：`host:port:servicename`。Oracle
    目录服务模式名称将已预填充；请输入在 RCU 过程中指定的密码。如果之前未运行 RCU，请在此时选择“创建模式”。图 4-38 展示了“指定模式数据库”屏幕。


    ![A352855_1_En_4_Fig38_HTML.jpg](img/A352855_1_En_4_Fig38_HTML.jpg)

    *图 4-38. 选择数据库信息*


    与配置 OVD 信息的步骤非常相似，输入相同的数据。这些信息将被 OID 配置所使用。请注意，OID 和 OVD 是两个不同的产品。图 4-39 显示了新的
    OID 设置的开始。


    ![A352855_1_En_4_Fig39_HTML.jpg](img/A352855_1_En_4_Fig39_HTML.jpg)

