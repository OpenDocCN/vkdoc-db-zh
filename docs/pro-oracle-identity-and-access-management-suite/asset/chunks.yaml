    of these as they pertain to the components of Identity and Access Management.


    These recommendations are based on the Oracle Enterprise Deployment Guides (EDGs).
    EDGs represent suggested architectures that were developed by Oracle engineers
    to provide optimal performance and reliability. Although these do not give specific
    hardware or tuning requirements, they do give a general idea of how the environments
    should be installed and configured. These overall guidelines should be followed
    when determining the overall needs of the organization. Using these will also
    allow for a more standard environment, making it easier for new resources to be
    added, easier troubleshooting, and easier for new administrators to locate necessary
    components.'
