    ![A352855_1_En_4_Fig9_HTML.jpg](A352855_1_En_4_Fig9_HTML.jpg)


    Figure 4-9.


    Creation of necessary database objects


    The tablespace mapping screen displays each component to be installed and the
    tablespaces that will be created. Clicking the Additional Tablespaces button displays
    a more detailed list. This screen, shown in Figure [4-10](#A352855_1_En_4_Chapter.html#Fig10),
    is informational and requires no input.


    ![A352855_1_En_4_Fig10_HTML.jpg](A352855_1_En_4_Fig10_HTML.jpg)


    Figure 4-10.


    Tablespace mapping


    After clicking Next on this screen, a summary of the inputs is displayed, providing
