- fmt: '# Creating the Access Manager Domain


    ## 运行配置脚本


    After the installation of the OAM, a new domain can be configured. This is accomplished
    by running the `config.sh` script located in the `IDM_HOME/common/bin` directory.
    It should be noted that there are multiple locations of `config.sh`. To configure
    the OAM domain, the specified configuration script must be used.


    This is run from the `<MIDDLEWARE_HOM>/Oracle_IDM1/common/bin` directory.


    ```

    [oracle@clouddemolab bin]$ pwd

    /home/oracle/IAMMiddleware/Oracle_IDM1/common/bin

    [oracle@clouddemolab bin]$ ./config.sh

    ```


    ## 选择配置类型和组件


    Running the configuration utility from the `ORACLE_HOME/common/bin` directory
    will launch the Access Manager domain configuration wizard. You will first be
    welcomed by the screen shown in Figure [6-17](#A352855_1_En_6_Chapter.html#Fig17).


    ![A352855_1_En_6_Fig17_HTML.jpg](A352855_1_En_6_Fig17_HTML.jpg)

    *Figure 6-17. Welcome screen to create a new domain*


    Fusion Middleware software is deployed within a domain in the WLS environment.
    To start, select the `Create a New WebLogic Domain` option.


    After selecting the configuration type, you will be presented with a list of Identity
    Management components that can be configured within the new domain. This selection
    screen is shown in Figure [6-18](#A352855_1_En_6_Chapter.html#Fig18). The domain
    configuration process involves selecting the software components that will be
    deployed into the domain as it is created. This list is based on the software
    installed during the previous step. During the selection process, required components
    are preselected as needed. For this step, Oracle Access Management and Mobile
    Security Suite 11.1.2.3.0 is selected, and the Oracle Enterprise Manager component
    is also preselected.


    ![A352855_1_En_6_Fig18_HTML.jpg](A352855_1_En_6_Fig18_HTML.jpg)

    *Figure 6-18. Select components for the domain*


    ## 指定域位置和管理用户


    During this step, you provide a name for the domain and specify the file system
    location. Depending on the file system requirements and high availability, these
    files might need to be deployed in different locations. These are discussed in
    the high availability section of this book. Figure [6-19](#A352855_1_En_6_Chapter.html#Fig19)
    shows an example of this step.


    ![A352855_1_En_6_Fig19_HTML.jpg](A352855_1_En_6_Fig19_HTML.jpg)

    *Figure 6-19. Specifying a domain location*


    Provide a password for the `weblogic` user, as shown in Figure [6-20](#A352855_1_En_6_Chapter.html#Fig20).
    Although you can specify a different username at this stage, it is common to use
    `weblogic`. At a later time you can create other users who will have access to
    the administration utilities. The `weblogic` user password should be set to something
    standard for your environment. This password will be used for starting and stopping
    managed servers as well as logging into the WebLogic Admin Console and Fusion
    Middleware Control.


    ![A352855_1_En_6_Fig20_HTML.jpg](A352855_1_En_6_Fig20_HTML.jpg)

    *Figure 6-20. Set administration user password*


    ## 配置域启动模式


    Figure [6-21](#A352855_1_En_6_Chapter.html#Fig21) shows the `Start Mode` selection
    screen.


    ![A352855_1_En_6_Fig21_HTML.jpg](A352855_1_En_6_Fig21_HTML.jpg)

    *Figure 6-21. Domain Startup Mode configuration*


    The Startup Mode determines how the managed servers are started. In Development
    Mode, the managed servers can be started and stopped from the command line without
    a password. Also configuration changes can be made and activated within the WebLogic
    Console without locking the environment. Configuring the Startup Mode to Production
    Mode locks the environment down to ensure no changes are made without locking
    the console for edits. Command-line tools will also require a password.


    **Note:** Locking the Administration Console prevents multiple administrators
    from making changes and overwriting each other.


    ## 配置JDBC数据库连接


    The database connection screen, shown in Figure [6-22](#A352855_1_En_6_Chapter.html#Fig22),
    requires the entry of database connection details for each of the components to
    be configured in the WebLogic domain. The database schemas displayed are prepopulated
    and should have been created using the RCU.


    ![A352855_1_En_6_Fig22_HTML.jpg](A352855_1_En_6_Fig22_HTML.jpg)

    *Figure 6-22. Configure JDBC database connections*


    Enter the database details such as host, port and service name. The password for
    each of the schemas must be entered. This step creates the Java database connectivity
    (JDBC) data sources within the WebLogic domain.


    **Note:** Selecting the check box next to all of the schemas on this screen will
    allow the entries to be duplicated without being required to enter the data multiple
    times.


    After the JDBC connection details are entered, the information is validated by
    the configuration tool. Any errors will be shown. If a schema was not able to
    be validated, revisit the previous step to ensure the schema name and details
    are correct. If the database schema does not exist, rerun the RCU to create it.
    Figure [6-23](#A352855_1_En_6_Chapter.html#Fig23) displays the database repository
    verification completed.


    ![A352855_1_En_6_Fig23_HTML.jpg](A352855_1_En_6_Fig23_HTML.jpg)

    *Figure 6-23. Checking the schemas*


    ## 选择可选配置


    For the purposes of this chapter, you will be creating the Administration Server,
    Managed Servers, Clusters and Machines, as shown in Figure [6-24](#A352855_1_En_6_Chapter.html#Fig24).
    If at this point your environment requires Deployments and Services or the RDBMS
    Security Store, select them now. The items selected on this screen dictate the
    following screens. Only those required by the selections will be seen.


    ![A352855_1_En_6_Fig24_HTML.jpg](A352855_1_En_6_Fig24_HTML.jpg)

    *Figure 6-24. Optional configurations*


    ## 配置管理服务器


    In the following steps, the Administration Server, Managed Servers, Clusters and
    Machines will be configured. Figure [6-25](#A352855_1_En_6_Chapter.html#Fig25)
    shows the Configure the Administration Server screen.


    ![A352855_1_En_6_Fig25_HTML.jpg](A352855_1_En_6_Fig25_HTML.jpg)

    *Figure 6-25. Administration Server configuration*


    One Administration Server per domain can be running at a time. Using the configuration
    tool, one Administration Server can be specified. In clustered environments, a
    backup Administration Server can be configured on the secondary nodes in case
    the primary is lost. During this step, ensure the port specified is available
    on the physical host.


    ## 配置受管服务器


    After entering the Adminstration Server details, you will be presented with the
    Configure Managed Servers screen seen in Figure [6-26](#A352855_1_En_6_Chapter.html#Fig26).
    The managed servers will be prepopulated based on the components selected earlier.


    ![A352855_1_En_6_Fig26_HTML.jpg](A352855_1_En_6_Fig26_HTML.jpg)

    *Figure 6-26. Managed servers configuration*


    During the domain configuration, the selected products will be deployed in managed
    servers. Figure [6-26](#A352855_1_En_6_Chapter.html#Fig26) displays the managed
    servers to be created. You should ensure the ports entered on this screen are
    available.


    ## 配置集群


    If you are planning to install multiple instances of OAM to provide the environment
    with failover or load balancing capabilities, the Configure Clusters screen shown
    in Figure [6-27](#A352855_1_En_6_Chapter.html#Fig27) allows this configuration.


    ![A352855_1_En_6_Fig27_HTML.jpg](A352855_1_En_6_Fig27_HTML.jpg)

    *Figure 6-27. Cluster configuration*


    Clustering allows multiple instances of applications to be deployed and work together
    to provide a highly available environment or better performance. The Configure
    Clusters screen permits the configuration tool to define a cluster during this
    stage. Go ahead and configure the OAM cluster. Clusters can be created later using
    the Administration Console.


    ## 将受管服务器分配到集群


    After designating the names of the cluster(s), you will need to assign managed
    servers to each of the clusters as seen in Figure [6-28](#A352855_1_En_6_Chapter.html#Fig28).'
  raw: '## Creating the Access Manager Domain


    After the installation of the OAM, a new domain can be configured. This is accomplished
    by running the `config.sh` script located in the `IDM_HOME/common/bin` directory.
    It should be noted that there are multiple locations of `config.sh`. To configure
    the OAM domain, the specified configuration script must be used.


    This is run from the `<MIDDLEWARE_HOM>/Oracle_IDM1/common/bin` directory.


    ```

    [oracle@clouddemolab bin]$ pwd

    /home/oracle/IAMMiddleware/Oracle_IDM1/common/bin

    [oracle@clouddemolab bin]$ ./config.sh

    ```


    Running the configuration utility from the `ORACLE_HOME/common/bin` directory
    will launch the Access Manager domain configuration wizard. You will first be
    welcomed by the screen shown in Figure [6-17](#A352855_1_En_6_Chapter.html#Fig17).


    ![A352855_1_En_6_Fig17_HTML.jpg](A352855_1_En_6_Fig17_HTML.jpg)


    Figure 6-17.


    Welcome screen to create a new domain


    Fusion Middleware software is deployed within a domain in the WLS environment.
    To start, select the Create a New WebLogic Domain option.


    After selecting the configuration type, you will be presented with a list of Identity
    Management components that can be configured within the new domain. This selection
    screen is shown in Figure [6-18](#A352855_1_En_6_Chapter.html#Fig18). The domain
    configuration process involves selecting the software components that will be
    deployed into the domain as it is created. This list is based on the software
    installed during the previous step. During the selection process, required components
    are preselected as needed. For this step, Oracle Access Management and Mobile
    Security Suite 11.1.2.3.0 is selected, and the Oracle Enterprise Manager component
    is also preselected.


    ![A352855_1_En_6_Fig18_HTML.jpg](A352855_1_En_6_Fig18_HTML.jpg)


    Figure 6-18.


    Select components for the domain


    During this step, you provide a name for the domain and specify the file system
    location. Depending on the file system requirements and high availability, these
    files might need to be deployed in different locations. These are discussed in
    the high availability section of this book. Figure [6-19](#A352855_1_En_6_Chapter.html#Fig19)
    shows an example of this step.


    ![A352855_1_En_6_Fig19_HTML.jpg](A352855_1_En_6_Fig19_HTML.jpg)


    Figure 6-19.


    Specifying a domain location


    Provide a password for the weblogic user, as shown in Figure [6-20](#A352855_1_En_6_Chapter.html#Fig20).
    Although you can specify a different username at this stage, it is common to use
    weblogic. At a later time you can create other users who will have access to the
    administration utilities. The weblogic user password should be set to something
    standard for your environment. This password will be used for starting and stopping
    managed servers as well as logging into the WebLogic Admin Console and Fusion
    Middleware Control.


    ![A352855_1_En_6_Fig20_HTML.jpg](A352855_1_En_6_Fig20_HTML.jpg)


    Figure 6-20.


    Set administration user password


    Figure [6-21](#A352855_1_En_6_Chapter.html#Fig21) shows the Start Mode selection
    screen.


    ![A352855_1_En_6_Fig21_HTML.jpg](A352855_1_En_6_Fig21_HTML.jpg)


    Figure 6-21.


    Domain Startup Mode configuration


    The Startup Mode determines how the managed servers are started. In Development
    Mode, the managed servers can be started and stopped from the command line without
    a password. Also configuration changes can be made and activated within the WebLogic
    Console without locking the environment. Configuring the Startup Mode to Production
    Mode locks the environment down to ensure no changes are made without locking
    the console for edits. Command-line tools will also require a password.


    Note


    Locking the Administration Console prevents multiple administrators from making
    changes and overwriting each other.


    The database connection screen, shown in Figure [6-22](#A352855_1_En_6_Chapter.html#Fig22),
    requires the entry of database connection details for each of the components to
    be configured in the WebLogic domain. The database schemas displayed are prepopulated
    and should have been created using the RCU.


    ![A352855_1_En_6_Fig22_HTML.jpg](A352855_1_En_6_Fig22_HTML.jpg)


    Figure 6-22.


    Configure JDBC database connections


    Enter the database details such as host, port and service name. The password for
    each of the schemas must be entered. This step creates the Java database connectivity
    (JDBC) data sources within the WebLogic domain.


    Note


    Selecting the check box next to all of the schemas on this screen will allow the
    entries to be duplicated without being required to enter the data multiple times.


    After the JDBC connection details are entered, the information is validated by
    the configuration tool. Any errors will be shown. If a schema was not able to
    be validated, revisit the previous step to ensure the schema name and details
    are correct. If the database schema does not exist, rerun the RCU to create it.
    Figure [6-23](#A352855_1_En_6_Chapter.html#Fig23) displays the database repository
    verification completed.


    ![A352855_1_En_6_Fig23_HTML.jpg](A352855_1_En_6_Fig23_HTML.jpg)


    Figure 6-23.


    Checking the schemas


    For the purposes of this chapter, you will be creating the Administration Server,
    Managed Servers, Clusters and Machines, as shown in Figure [6-24](#A352855_1_En_6_Chapter.html#Fig24).
    If at this point your environment requires Deployments and Services or the RDBMS
    Security Store, select them now. The items selected on this screen dictate the
    following screens. Only those required by the selections will be seen.


