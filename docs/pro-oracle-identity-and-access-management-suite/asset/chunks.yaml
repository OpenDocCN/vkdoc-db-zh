    \ provides you with full control of the complexity rules. However, keep in mind\
    \ that if the password policy is too restrictive, it could result in users writing\
    \ down passwords.\n\nThe final section of the page is Challenge Options. This\
    \ section is used to configure OIM to allow users to answer one or more challenge\
    \ questions in case they forget their password or lock their account. This option\
    \ could help reduce help desk calls dramatically by allowing users to manage their\
    \ own locked and forgotten passwords.\n\nClick the Enable Challenge Policy Support\
    \ check box and the configuration options will appear. Here you can configure\
    \ the system with custom questions that suit your organization’s requirements.\
    \ You could also the users to type in their own questions and answers. After defining\
    \ the questions, you will also have the options to require users to input unique\
    \ answers, define the number of characters an answer might be, or both. To further\
    \ customize this system, you can enter as many questions as you wish, but allow\
    \ the user to choose and answer a minimum number defined in the total questions\
    \ to be answered.\n\n## Summary\n\nThe use of policies within OIM can encompass\
    \ user permissions and passwords. This allows administrators to configure a secure\
    \ identity management system while also minimizing the amount of day-to-day management\
    \ that must be performed. Access policies can be used to control what functions\
    \ users are permitted to use based on job title, role grants, group membership,\
    \ and so on. Furthermore these can be used to provide granular access to groups\
    \ of users. Password policies can help maintain a secure system by ensuring that\
    \ the user population is leveraging secure complex passwords.\n\n# 14. Oracle\
    \ Identity Manager Forms and Customization\n\nIn the previous chapters, you have\
    \ seen that Oracle Identity Manager (OIM) provides a wide variety of tools that\
    \ the organization can provide to its users, allowing them to be more or less\
    \ self-sufficient. The use of these tools can eliminate help desk calls and allow\
    \ faster, more efficient processing of permission requests and on- and off-boarding\
    \ tasks. These also provide a higher level of security by removing the number\
    \ of people that must process a request and removing steps in the processes managing\
    \ accounts. These benefits can be a boon to many organizations, as they can see\
    \ money saved and increased security. However, out of the box, the many forms\
    \ available might not meet the look and feel or functionality needs of every organization.\n\
    \nOracle has provided multiple methods of tailoring OIM to the individual organization.\
    \ OIM allows a significant amount of customization. These customizations can range\
    \ from simple logo and color changes, to localization of prompts, to full custom\
    \ forms and reports. Depending on the individual requirements of an organization,\
    \ the level of customization will change. In many cases, color changes, logo changes,\
    \ and page layouts will suffice. Occasionally, the creation of custom forms might\
    \ be required and can be created using the forms creation utility. There are some\
    \ cases where an entire custom application or full customization is required and\
    \ can leverage the OIM application programming interface (API) to create. Using\
    \ the API to create a custom application is outside the scope of this book. However,\
    \ this chapter covers customization and using the forms creation utility."
  trans: "## 密码策略\n\n要求您的用户维护 `OID` 能在一定程度上提供控制密码策略的能力。`OIM` 增加了功能，可真正定制您组织的密码管理行为。\n\
    \n大多数组织会设置策略，要求用户密码符合一组规则。这些规则可能包括诸如最小字符数、大小写字母、特殊字符等。诸如此类的规则组合增加了密码的复杂性。密码越复杂，入侵者就越难猜测或暴力破解。\n\
    \n使用如图 13-8 所示的 Oracle Identity Manager 管理界面，您可以通过点击 `Policies` 并选择 `Password\
    \ Policies` 来为组织创建和维护密码策略。\n\n![A352855_1_En_13_Fig8_HTML.jpg](img/A352855_1_En_13_Fig8_HTML.jpg)\n\
    \n图 13-8. Identity Manager 管理界面\n\n点击 `Manage Password Policies` 后，您将看到可用密码策略的列表。您可以创建新策略或使用默认策略。创建密码策略后，您必须将策略分配给适当的用户群体。`OIM`\
    \ 能够根据要求为不同的用户组分配不同的密码规则。例如，人力资源员工可能需要维护更高水平的密码复杂性，因为他们能访问敏感的个人数据。图 13-9 所示的列表显示了为\
    \ `OIM` 用户创建的默认密码策略和一个示例密码策略。虽然您可以修改此密码策略，但建议您创建自己的策略。\n\n![A352855_1_En_13_Fig9_HTML.jpg](img/A352855_1_En_13_Fig9_HTML.jpg)\n\
    \n图 13-9. 密码策略列表\n\n从图 13-9 列出密码策略的地方，您可以选择一个并进行编辑，以根据自己的要求进行定制。图 13-10 显示了创建策略时可以使用的所有选项。\n\
    \n![A352855_1_En_13_Fig10_HTML.jpg](img/A352855_1_En_13_Fig10_HTML.jpg)\n\n图 13-10.\
    \ 密码策略配置界面\n\n创建密码策略时，注意界面的各个部分非常重要。\n\n*   第一部分定义了密码的基本规则。\n    *   `Minimum\
    \ Length`：指定密码必须达到的字符数才能通过复杂性规则。\n    *   `Minimum Password Age (Days)`：此数字定义了用户在更改密码前必须使用该密码的天数。使用数字\
    \ `0` 允许在同一天更改密码。\n    *   `Warn After (Days)`：这是系统向用户发送密码即将过期提醒通知前的天数。通常在到期前三到五天发送。\n\
    \    *   `Disallow Past Passwords`：输入一个数字以禁止用户重复使用以前的密码。通常设置为禁止前五个密码。\n    * \
    \  `Expires After (Days)`：此数字确定密码在用户被迫更改前的最大有效期。\n*   第二部分 `Complex Password`\
    \ 可用于使用预配置的密码复杂性规则。它包括以下规则：\n    *   密码长度必须至少为六个字符。\n    *   密码必须满足以下五条规则中的三条：\n\
    \        *   必须包含大写字母。\n        *   必须包含数字字符。\n        *   必须包含小写字母。\n       \
    \ *   必须包含特殊字符 (`!@#$%^&*`)。\n        *   必须包含 Unicode 字符。\n    *   不能包含用户的登录名、名字或姓氏。\n\
    \n**注意**：应该指出的是，默认 `Complex Password` 选择中列出的最小字符数实际上基于界面第一部分定义的字符数。如果您在该部分输入了\
    \ `10` 个字符，那么 `Complex Password` 规则选择实际上将要求 `10` 个字符，而不是所示的六个。\n\n此配置页面的第三部分 `Custom\
    \ Policy` 允许对前面的复杂规则进行完全定制。需要注意的是，对于单个密码策略，您只能使用 `Custom Policy` 或 `Complex Password`。在这里，您可以精确定义要强制执行的规则。您可以要求五个大写字母和三个特殊字符，或更多的数字字符。此部分让您完全控制复杂性规则。但是，请记住，如果密码策略限制性太强，可能会导致用户写下密码。\n\
    \n页面的最后一部分是 `Challenge Options`。此部分用于配置 `OIM`，以允许用户在忘记密码或锁定账户时回答一个或多个验证问题。此选项可以通过允许用户管理自己的锁定和遗忘密码，显著减少帮助台呼叫。\n\
    \n勾选 `Enable Challenge Policy Support` 复选框后，配置选项将出现。在这里，您可以配置适合您组织要求的自定义问题。您还可以允许用户输入自己的问题和答案。定义问题后，您还可以选择要求用户输入唯一的答案、定义答案可能的字符数，或两者兼有。要进一步定制此系统，您可以输入任意多个问题，但允许用户选择并回答总数中定义的最小数量问题。\n\
    \n## 小结\n\n在 `OIM` 中使用策略可以涵盖用户权限和密码。这允许管理员在配置安全的身份数管理系统的同时，也最小化必须执行的日常管理工作量。访问策略可用于根据职位、角色授予、组成员资格等来控制用户被允许使用的功能。此外，这些策略可用于为用户组提供细粒度的访问权限。密码策略可以通过确保用户群体使用安全、复杂的密码来帮助维护安全的系统。\n\
    \n## 14. Oracle Identity Manager 表单与定制\n\n在之前的章节中，您已经看到 Oracle Identity Manager\
    \ (`OIM`) 提供了多种工具，组织可以提供给其用户，使他们或多或少能够自给自足。使用这些工具可以消除帮助台呼叫，并允许更快、更高效地处理权限请求以及入职和离职任务。这些工具还通过减少处理请求所需的人数以及简化管理账户的流程步骤，提供了更高级别的安全性。这些好处对许多组织来说是一个福音，因为他们可以看到节省资金和增强安全性。然而，开箱即用，许多可用的表单可能无法满足每个组织的外观、感觉或功能需求。\n\
    \nOracle 提供了多种方法来为各个组织定制 `OIM`。`OIM` 允许进行大量的定制。这些定制的范围可以从简单的徽标和颜色更改、提示的本地化，到完全自定义的表单和报告。根据组织的特定要求，定制级别会有所不同。在许多情况下，颜色更改、徽标更改和页面布局就足够了。偶尔，可能需要创建自定义表单，可以使用表单创建工具来创建。在某些情况下，需要整个自定义应用程序或完全定制，可以利用\
    \ `OIM` 应用程序编程接口 (`API`) 来创建。使用 `API` 创建自定义应用程序超出了本书的范围。但是，本章涵盖了定制和使用表单创建工具。"
- fmt: '## Basic Customization


    Customization of OIM falls under a few different levels of complexity. At the
    most basic, OIM allows administrators to change things like the background colors,
    logos, and visual components of the various pages. Most of these changes will
    affect all pages due to how they are performed. The most basic modifications involve
    changing files such as Cascading Style Sheets (`CSS`) or replacing image files.


    `CSS` have been used in web development for a long time. These files allow the
    designer to define items such as fonts, colors, backgrounds, and so on, one time
    for the project instead of trying to keep track of them on each page in a deployment.


    Figure [14-1](#A352855_1_En_14_Chapter.html#Fig1) displays the OIM Identity Self
    Service home page. Using a browser tool such as `HTTPFox` or `Google Chrome` that
    enables you to view the elements of a web page will allow you to determine the
    `CSS` files, elements, and properties used throughout the page. This information
    will be key to making changes to the OIM application pages.


    ![A352855_1_En_14_Fig1_HTML.jpg](A352855_1_En_14_Fig1_HTML.jpg)

    Figure 14-1. OIM Identity Self Service page inspecting an element


    ### User Interface Customizations


    In its simplest form, customizing the out-of-the-box user interface (UI) can be
    performed using the online form editing tools and OIM’s concept of sandboxes.
    A sandbox allows editors to make changes to the forms in the current instance
    without affecting other editors or current users. The changes made in an individual
    sandbox are limited to that sandbox instance. The changes will be written in line
    with the live system on publishing the sandbox. Figure [14-2](#A352855_1_En_14_Chapter.html#Fig2)
    displays the Oracle Identity Manager home page with the `Sandboxes` link at the
    top. Note that you must be logged into the system as a user with edit or administrative
    permissions to see this link. You can also access this link via the `sysadmin
    console` pages.


    ![A352855_1_En_14_Fig2_HTML.jpg](A352855_1_En_14_Fig2_HTML.jpg)

    Figure 14-2. Creating a sandbox


    Clicking the `Sandboxes` link available to administrators will bring up a screen
    that displays the currently available sandboxes and their status, as shown in
    Figure [14-3](#A352855_1_En_14_Chapter.html#Fig3). On this screen, you can activate
    a current sandbox, publish an individual one, create a new sandbox, or delete
    an existing one. Click the `Manage Sandboxes` tab to view the existing sandboxes.
    This screen will show the status along with who last modified it. If the sandbox
    is active, a green light will appear in the `Active` column.


    ![A352855_1_En_14_Fig3_HTML.jpg](A352855_1_En_14_Fig3_HTML.jpg)

    Figure 14-3. Current sandboxes


    To create a new sandbox, click the `Create Sandbox` link. You will be presented
    with the `Create Sandbox` dialog box shown in Figure [14-4](#A352855_1_En_14_Chapter.html#Fig4).
    Provide the new sandbox a name and description. If you would like to immediately
    start to work on customizations, select the `Activate Sandbox` check box. This
    will create the new environment and activate it.


    ![A352855_1_En_14_Fig4_HTML.jpg](A352855_1_En_14_Fig4_HTML.jpg)

    Figure 14-4. Create Sandbox dialog box


    After creating a new sandbox, you will see it has been activated at the top of
    the screen. Next to the `Sandboxes` link, the name of the currently selected sandbox
    will appear, as shown in Figure [14-5](#A352855_1_En_14_Chapter.html#Fig5). To
    customize the page or other pages, click the `Customize` link.


    ![A352855_1_En_14_Fig5_HTML.jpg](A352855_1_En_14_Fig5_HTML.jpg)

    Figure 14-5. Active sandbox


    Once in a sandbox, you will be able to make a number of changes. It is important
    to be familiar with the various views. By default you will be presented with `Add
    Content` view, depicted in Figure [14-6](#A352855_1_En_14_Chapter.html#Fig6).
    This view of the editor will allow you to enter data into the form. This functionality
    is useful when dealing with multistep forms. In OIM, there are a number of forms
    that require multiple UI steps, such as the Forgot Password page. You can use
    the `Add Content` view to enter data and move to the next page in the process.


    ![A352855_1_En_14_Fig6_HTML.jpg](A352855_1_En_14_Fig6_HTML.jpg)

    Figure 14-6. Sandbox customization `Add Content` view


    After entering required data or data you wish to process using the `Add Content`
    screen, you can switch to the `Structure` view as shown in Figure [14-7](#A352855_1_En_14_Chapter.html#Fig7).
    This screen displays both the overall page as well as a tree structure view of
    the page components. Each of the listed components on the right side of the screen
    represents an item or an area on the page displayed on the left. Clicking on a
    page item within the left side of the screen selects the corresponding element
    in the structure on the right. Using this interface can greatly assist finding
    the area or element you wish to edit or add to. You can use the structure list
    on the right to select the element directly.


    ![A352855_1_En_14_Fig7_HTML.jpg](A352855_1_En_14_Fig7_HTML.jpg)

    Figure 14-7. Sandbox customization `Structure` view'
