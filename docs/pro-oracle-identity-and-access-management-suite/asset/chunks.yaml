  trans: '### Oracle Identity Manager


    与 `OAM` 类似，`OIM` 也依赖 `WebLogic` 架构来实现性能集群和高可用性。然而，由于其依赖于 Oracle 面向服务的架构（`SOA`），因此多了一层复杂性。此外，配置为使用
    `RAC` 数据库的 `OIM` 集群，如果数据库发生故障，将要求用户重新提交他们的请求。为了提供高可用性和负载均衡以优化性能，`OIM` 必须在从 Web
    层到数据库和 LDAP 层的每一层都配置集群。图 2-10 展示了 Oracle Identity Management 的高可用性架构。


    ![A352855_1_En_2_Fig10_HTML.jpg](img/A352855_1_En_2_Fig10_HTML.jpg)


    图 2-10. Oracle Identity Management 本地高可用性架构


    请注意图 2-10 的几个细节。


    *   `OIM Host 1` 和 `OIM Host 2` 上均已部署了 `OIM` 托管服务器。

    *   `OIM Host 1` 和 `OIM Host 2` 上均已部署了 `SOA` 托管服务器。

    *   `管理服务器`可以安装在两个主机上，但一次只能在一个节点上运行。

    *   `RAC` 数据库在两个节点上均配置了 `Java 数据库连接 (JDBC)` 多数据源，以防数据库节点故障。

    *   为 `OIM` 和 `SOA` 配置的虚拟主机名允许在节点丢失时进行故障转移。


    将为 Oracle Identity and Access Management 的各个组件使用这些架构结合起来，组织可以创建一个可扩展且高可用的环境。尽管每个部分仅展示了一个双节点集群，但它们可以扩展到包含更多节点，甚至可以扩展到包含多个数据中心。然而，扩展到其他数据中心以及提供数据复制和分区超出了本书的范围。讨论这些是为了让读者在实施环境之前考虑这些选项，因为需要特别考量。


    Oracle Identity and Access Management 的每个组件都在单独的章节中进行了介绍，因为每个组件都是一个构建块，可以根据组织需求的发展单独实施。尽管它们可以安装在完全独立的硬件或单一服务器上，但将它们安装在不同的
    `WLS` 实例中将简化软件生命周期管理。


    根据需要分阶段实施，允许组织安装满足其需求的最低限度的软件。例如，如果组织的短期需求是一个用于集中管理或应用程序认证的身份存储库，则可以使用 `Oracle
    Directory Services`，而无需 `Identity Manager` 或 `Access Manager` 的额外开销。之后可以添加 `OAM`
    以提供单点登录 (`SSO`)，随后可以实施 `OIM` 来完善技术栈，并提供对身份治理和完整身份生命周期管理的访问。


    将 Identity and Access Management 的各个组件保持在独立的 `WebLogic` 环境中，简化了软件生命周期的管理。组织经常可能需要升级技术栈中的某一部分，例如
    `Oracle Directory Services`，同时保持 `OIM` 和 `OAM` 在其当前版本。`WLS` 可能需要为 `OIM` 打补丁，但这个补丁可能会对
    `OAM` 产生不利影响。在这些情况下，将每个组件放在独立的 `WLS` 主目录中，将确保可以执行和测试补丁与升级，而不会危及其他功能。


    在确定如何实施这些组件时，必须考虑所选方法的复杂性与可管理性之间的权衡。对于某些组织来说，在独立的 `WebLogic` 环境中安装每个组件可能看起来是最佳的综合选择，而其他组织可能会决定将
    `OAM` 和 `OIM` 组合在同一个域中，同时分离 `Oracle Directory Server` 是最好的。


    ## 前提条件


    与任何软件一样，`Oracle Identity and Access Management Suite` 也有其自身的一系列要求，必须满足这些要求才能成功实施。与
    Oracle 的所有产品一样，Oracle 提供了一个经过认证的环境列表，包括 `操作系统`、Java 运行时环境、应用服务器和 `CPU` 架构。满足这些认证将确保环境在基准水平上运行，并在需要时获得
    Oracle 的适当支持。


    ### 操作系统


    `Fusion Middleware` 套件中的产品和应用程序可以部署在多种经过认证的 `操作系统` 上。每个组织运行其选择的操作系统都有不同的原因。因此，本书的范围不包括操作系统建议。在规划阶段确保
    Oracle 对将要使用的操作系统进行认证非常重要。这些认证还将包括任何所需的补丁和软件包，以使安装成功。


    ### Fusion Middleware 硬件要求


    满足 Identity and Access Management 的系统要求首先要确保满足 `Fusion Middleware` 环境的硬件要求。这包括
    `CPU`、内存、存储和网络配置。此处提供的信息代表了 Oracle 提供的最低要求，但在大多数情况下，超出这些最低要求将为增长提供空间，并能够处理应用程序负载的突然变化。


    在其安装规划指南中，Oracle 提供了典型的 `CPU` 配置列表。对于 Identity and Access Management `11.1.2.x`，建议环境满足以下指导原则。每个组件的推荐架构如表
    2-1 所示。


    表 2-1. 推荐的 CPU 配置


    | 托管服务器 | 处理器 |

    | --- | --- |

    | Oracle Access Manager | 6 个或更多 X Pentium 1.5 GHz 或更高 |

    | Oracle Directory Services | 2 个或更多 X Pentium 1.5 GHz 或更高 |

    | Oracle Identity Manager | 6 个或更多 X Pentium 1.5 GHz 或更高 |


    一般来说，`Oracle Identity and Access Management` 产品要求最低内存可用性大于 4 GB。因此，必须使用 `64 位`
    `操作系统` 并安装在 `64 位` `CPU` 架构上。还应注意，`64 位` `CPU` 每秒能够执行的计算量比 `32 位` `CPU` 更多。尽管在许多情况下，Oracle
    提供其产品的 `32 位` 版本，但 `64 位` 处理能力及其支持的发展为性能和可扩展性带来了诸多改进。'
- fmt: "## WebLogic Server\n\n本节中的数字针对基本的`WLS`。通常，服务器需要 8 GB 物理内存和 16 GB 可用内存。随着托管服务器和身份与访问管理组件的部署，将需要额外的内存。内存要求的具体细节见表[2-2](#A352855_1_En_2_Chapter.html#Tab2)。\n\
    \n表 2-2. 按操作系统划分的 Fusion Middleware 最低内存要求\n\n| 操作系统 | 最低物理内存 | 最低可用内存 |\n| ---\
    \ | --- | --- |\n| UNIX | 8 GB | 16 GB |\n| Linux | 8 GB | 16 GB |\n| Windows\
    \ | 8 GB | 16 GB |\n\n在这种情况下，可用内存等于物理内存加上交换内存。然而，允许更多的可用内存由物理内存构成，将通过减少存储在磁盘上的交换内存的\
    \ I/O 来提高性能。此基线计算假设操作系统需要 4 GB，加上`WebLogic`和管理服务器需要 4 GB：\n\n```\n    4 GB of\
    \ memory for the OS\n+    4 GB of memory for WLS and the Admin Server\n_________________________________________________________\n\
    \    Total physical memory required\n```\n\nFusion Middleware 环境的存储要求可能会有很大差异。Oracle\
    \ 至少推荐 10 GB 的存储。应该考虑到日志记录和额外部署的软件会增加这个数字。安装完成并环境稳定后，降低任何已部署应用程序和托管服务器的日志记录级别配置可能是谨慎的做法。\n\
    \n## Oracle Directory Services\n\n建议将`OUD`安装在与 Oracle 身份和访问管理实例分开的主机上。这是为了将`LDAP`身份存储库放置在与数据库相同的内部网络层中。在之前展示的架构图中，您会注意到`LDAP`和数据库环境被放置在一个与应用程序中间件层分开的层中。因此，Oracle\
    \ 目录服务的内存要求将与 Oracle 身份和访问管理组件分开呈现。\n\n`OUD`是一个基于 Java 的`LDAP`目录服务器。因此，与其他 Fusion\
    \ Middleware 产品一样，它安装在受支持的应用服务器中。本节的要求是针对软件安装的，必须与 Fusion Middleware 的最低要求相结合。这将在后面展示。\n\
    \nOracle 推荐为`OUD`分配 2 GB 物理内存，以便在生产环境中以最佳水平运行。这是除了 Fusion Middleware 所需的 8 GB\
    \ 之外的。可以配置`OUD`的 Java 虚拟机（`JVM`）以确保使用足够的内存而不会使服务器过载，这将在本书的安装部分讨论。整体内存要求的计算可以简单地如下进行：\n\
    \n```\n    4 GB of memory for the OS\n+    4 GB of memory for WebLogic and the\
    \ Administration Server\n+    2 GB of memory for the OUD JVM\n___________________________________________________________\n\
    \    10 GB physical memory required for OUD\n```\n\n需要注意的是，`OUD`使用一个小数据库来存储`LDAP`条目。此数据库至少需要\
    \ 1 GB 的磁盘存储。根据日志配置或复制设置，这可能会增加到 30 到 40 GB。确保正确配置日志记录和轮转以防止存储问题非常重要。Oracle 还建议，通过调整内存大小使得整个数据库文件可以加载到内存中，可以提高性能。\n\
    \n## Oracle Identity and Access Manager\n\n尽管将`LDAP`存储库与身份和访问管理节点分开是个好主意，但在大多数情况下，Oracle\
    \ 身份和访问管理器可以安装在同一物理主机上。是否将其安装到单独的 Fusion Middleware 环境中取决于安装者。但是，内存要求将保持不变。\n\n\
    `OAM`的最低要求内存是 4 GB 物理内存和 8 GB 可用内存，而承载`OIM`的主机还必须考虑`SOA`。因此，`OIM`主机仅托管服务器就需要至少\
    \ 8 GB 物理内存和 16 GB 可用内存。这是除了 Fusion Middleware 基础设施的最低要求（即 8 GB）之外的。将这些加在一起可以得到以下计算：\n\
    \n```\n    4 GB for the OS\n+    4 GB for WebLogic and the Administration Server\n\
    +    4 GB for OIM Managed Server\n+    4 GB for SOA Managed Server\n+    4 GB\
    \ for the OIM Administration Server\n____________________________________________________________\n\
    \    20 GB memory required for OIM\n```\n\n如果`OAM`与`OIM`安装在同一主机的同一个`WebLogic`实例中，则还需要额外的\
    \ 8 GB。在这 8 GB 中，4 GB 分配给`OAM`管理服务器，另外 4 GB 分配给访问管理器托管服务器。由于需要额外的 4 GB 用于另一个`WebLogic`实例，可能希望将`OAM`托管服务器安装在与`OIM`实例相同的域中。\n\
    \n### 集群考虑因素\n\n在 Fusion Middleware 中，集群被定义为多个`WLS`协同工作以提高可靠性和性能。如前所述，只要资源足够，可以在单台机器上或在多台机器上向集群域添加更多实例。\n\
    \n在确定集群规划时，努力遵循最佳实践很重要。实现集群环境本质上会增加复杂性。不再是单个实例处理所有服务，而是增加了额外的实例，从而增加了对复杂会话处理、负载均衡、分布式处理和复制的需求。\n\
    \n#### 主机配置\n\n尽管 Oracle 推荐每两个`CPU`仅使用一个`WebLogic`实例，但仔细的规划和容量规划将确保环境能够处理预期的负载。Fusion\
    \ Middleware 环境和 Oracle 身份产品的线性可扩展性允许随着组织需求的增长而实现未来的增长。应该注意的是，物理服务器不需要配置相同的硬件。但是，每台服务器必须满足支持已部署应用程序所需的最低要求。也可以将集群托管服务器部署在不同的物理主机上。\n\
    \n例如，`Host_1`可能包含管理服务器、身份管理器和访问管理器，而`Host_2`仅包含身份管理器，访问管理器则部署在`Host_3`上。图[2-11](#A352855_1_En_2_Chapter.html#Fig11)描绘了物理主机上身份管理组件的基本分布。\n\
    \n![A352855_1_En_2_Fig11_HTML.jpg](A352855_1_En_2_Fig11_HTML.jpg)\n\n图 2-11. 在多台主机上分布身份管理器集群"
  raw: '#### WebLogic Server


    The numbers in this section are for the basic WLS . In general, the server requires
    8 GB physical memory and 16 GB available memory. Additional memory will be required
    as managed servers and Identity and Access Management components are deployed.
    The specifics of memory requirements are shown in Table [2-2](#A352855_1_En_2_Chapter.html#Tab2).


    Table 2-2.


    Fusion Middleware Minimum Memory Requirements by Operating System


    | Operating System | Minimum Physical Memory | Minimum Available Memory |

    | --- | --- | --- |

    | UNIX | 8 GB | 16 GB |

    | Linux | 8 GB | 16 GB |

    | Windows | 8 GB | 16 GB |


    In this case, available memory is equal to the physical memory plus swap memory.
    However, allowing more of the available memory to consist of physical memory will
    improve performance by reducing the I/O to swap memory stored on disk. This baseline
    is calculated assuming 4 GB is required for the OS plus 4 GB for WebLogic and
    the Administration Server:


        4 GB of memory for the OS


    +    4 GB of memory for WLS and the Admin Server


    _________________________________________________________


        Total physical memory required


    Storage requirements for the Fusion Middleware environment can vary significantly.
    At a minimum, 10 GB of storage is recommended by Oracle. It should be considered
    that logging and additional deployed software can increase this number. After
    installation and the environment has been stabilized, it might be prudent to reduce
    the log level configuration for any deployed applications and managed servers.


    #### Oracle Directory Services


    It is recommended that OUD be installed on a separate host from the Oracle Identity
    and Access Management instances. This is suggested to place the LDAP identity
    repository in the same internal network tier as the database. In the architecture
    diagrams shown previously, you will note that the LDAP and database environments
    are placed in a tier separate from the application middle tiers. For this reason,
    the memory requirements for Oracle Directory Services will be presented separately
    from the Oracle Identity and Access Management components.


    OUD is a Java-based LDAP directory server. As such, like other Fusion Middleware
    products, it installs within a supported application server. The requirements
    in this section are for the software install and must be combined with the minimum
    requirements for Fusion Middleware. This is shown later.


    Oracle recommends 2 GB physical memory for OUD to run at optimal levels in a production
    environment. This is in addition to the 8 GB required for Fusion Middleware. The
    Java Virtual Machine (JVM) for OUD can be configured to ensure sufficient memory
    is used without overloading the server and will be discussed during the installation
    section of this book. Calculating the overall memory requirements can be done
    simply as follows:


        4 GB of memory for the OS


    +    4 GB of memory for WebLogic and the Administration Server


    +    2 GB of memory for the OUD JVM


    ___________________________________________________________


        10 GB physical memory required for OUD


    It is important to note that OUD uses a small database for the LDAP entries. This
    database requires a minimum of 1 GB of disk storage. Depending on the log configuration
    or replication, this can increase up to 30 to 40 GB. It is important to ensure
    that the log configuration and rotation are configured properly to prevent storage
    issues. Oracle also recommends that performance can be improved by sizing memory
    such that the entirety of the database files can be loaded into memory.


    #### Oracle Identity and Access Manager


    Although it is a good idea to keep the LDAP repository separated from the Identity
    and Access Management nodes, in most cases, Oracle Identity and Access Manager
    can be installed on the same physical hosts. Whether or not to install these into
    separate Fusion Middleware environments is up to the installers. However, the
    memory requirements will remain the same.


    The minimum required memory for OAM is 4 GB physical and 8 GB available, and the
    host(s) serving OIM must also consider SOA. Thus the OIM host requires a minimum
    of 8 GB physical and 16 GB available just for the managed servers. This is in
    addition to the minimum required for the Fusion Middleware infrastructure, or
    8 GB. Adding these together can give you the following calculation:


        4 GB for the OS


    +    4 GB for WebLogic and the Administration Server


    +    4 GB for OIM Managed Server


    +    4 GB for SOA Managed Server


    +    4 GB for the OIM Administration Server


    ____________________________________________________________


        20 GB memory required for OIM


    If OAM is installed on the same host within the same WebLogic instance as OIM,
    an additional 8 GB will be required. Of the 8 GB, 4 GB is allocated to the OAM
    Administration Server and another 4 GB to the Access Manager Managed Server. Due
    to the required 4 GB for an additional WebLogic instance, it might be desired
    to install the OAM Managed Server within the same domain as the OIM instance.


    ### Clustering Considerations


    Within Fusion Middleware, clusters are defined as multiple WLSs working together
    to increase reliability and performance. As discussed previously, adding more
    instances to a clustered domain can be done on a single machine, provided enough
    resources are available, or multiple machines.


    When determining clustering plans, it is important to strive to adhere to best
    practices. Implementing a clustered environment inherently increases complexity.
    Instead of single instances handling all services, additional instances are added,
    thus increasing the need for complex session handling, load balancing, distributed
    processing, and replication.


    #### Host Configurations


    Although Oracle recommends only one WebLogic instance per two CPUs, careful planning
    and capacity planning will ensure that the environment is able to handle the expected
    load. The linear scalability of the Fusion Middleware environment and Oracle’s
    identity products allows for future growth as the organization’s needs grow. It
    should be noted that the physical servers do not need to be configured with the
    same hardware. However, each server must meet the minimum requirements needed
    to support the deployed applications. It is also possible to deploy the clustered
    manage servers on different physical hosts.


    For example Host_1 might contain the Admin Server, Identity Manager, and Access
    Manager, whereas Host_2 contains only Identity Manager, and Access Manager is
    deployed on Host_3\. Depicted in Figure [2-11](#A352855_1_En_2_Chapter.html#Fig11)
    is a basic breakout of identity management components on physical hosts.


    ![A352855_1_En_2_Fig11_HTML.jpg](A352855_1_En_2_Fig11_HTML.jpg)


    Figure 2-11.


    Distribution of Identity Manager clusters on multiple hosts'
  trans: "\n## WebLogic Server\n\n本节中的数字针对基本的`WLS`。通常，服务器需要 8 GB 物理内存和 16 GB 可用内存。随着托管服务器和身份与访问管理组件的部署，将需要额外的内存。内存要求的具体细节见表\
