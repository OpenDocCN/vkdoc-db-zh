    ## 完成 LDAP 安装后配置


    在上一节中，您完成了 OIM 配置。在该步骤中，您选择了“Enable OIM for Suite Integration”。这通知 OIM 您将使用 LDAP
    同步，这对于 OAM 和 OIM 集成是必需的。在预配置期间，您运行了实用程序来为同步准备 OID。现在是运行安装后任务以使其完成的时候了。


    在继续之前，请确保为 `ldapconfigpostsetup` 实用程序正确设置了环境变量。必须按如下方式设置：


    *   `APP_SERVER=weblogic`

    *   `JAVA_HOME=/home/oracle/java/jdk1.6.0_45 MW_HOME=/home/oracle/IDMMiddleware`

    *   `OIM_ORACLE_HOME=/home/oracle/IDMMiddleware/Oracle_IDM1`

    *   `WL_HOME=/home/oracle/IDMMiddleware/wlserver_10.3`

    *   `DOMAIN_HOME=/home/oracle/IDMMiddleware/user_projects/domains/idm_domain`


    在目录 `/home/oracle/IDMMiddleware/Oracle_IDM1/server/ldap_config_util` 中，您将找到一个名为
    `ldapconfig.props` 的文件。备份此文件并按如下所示进行编辑：


    ```

    # OIMServer Type, Valid values can be WLS, JBOSS, WAS

    # e.g.: OIMServerType=WLS

    OIMServerType=WLS

    # OIM Provider URL

    # if OIMServerType is WAS then

    #    OIMProviderURL=corbaloc:iiop:OIMServerBootStrapHost:OIMServerBootStrapPort

    #    hint:look for the OIM server bootStrapPort number in WAS admin console

    #    e.g.: corbaloc:iiop:hostName:2809

    # else OIMServerType is WLS then

    #      OIMProviderURL=t3://localhost:ManagedServerPort

    #      e.g.: OIMProviderURL=t3://localhost:14000

    OIMProviderURL=t3://10.0.70.229:14000

    # LDAP/OVD Server URL

    # If OVD server is selected during OIM installation, then provide

    # value for LDAPURL.

    # LDAPURL=ldap://:

    # e.g.: LDAPURL=ldap://OVDserver.us.oracle.com:6501

    #

    # If not, leave LDAPURL empty

    # e.g.: LDAPURL=

    LDAPURL=

    # If OVD server is selected during OIM installation, then provide

    # Admin user name to connect to LDAP/OVD Server

    # e.g.: LDAPAdminUsername=cn=oimAdminUser,cn=systemids,dc=us,dc=oracle,dc=com

    #

    # If not, leave LDAPAdminUsername empty

    # e.g.: LDAPAdminUsername=

    LDAPAdminUsername=

    # If OVD server is NOT selected during OIM installation, then provide

    # LIBOVD_PATH_PARAM=

    # e.g.: #LIBOVD_PATH_PARAM=/scratch/suramesh/Oracle/Middleware/user_projects/domains/base_domain/config/fmwconfig/ovd/oim

    LIBOVD_PATH_PARAM=

    # This is for FA C9, MT scenario where last changenumber from the standby

    # server is to be updated to the incremental recon. jobs, to be picked up,

    # once the primary/secondary replicated server comes up.

    # If the change number is not passed through this parameter, then logic is to

    # query the OVD and retrieve the same.

    ChangeLogNumber=

    ```


    对文件进行以下更改并保存：


    *   `OIMServerType=WLS`

    *   将 LDAP URL 留空，因为您未使用 Oracle Virtual Directory (OVD)。

    *   将 `LDAPAdminUsername` 留空，因为您未使用 OVD。

    *   将 `LIBOVD_PATH_PARAM` 留空，因为您未使用 OVD。


    接下来，您将运行命令 `LDAPConfigPostSetup.sh`，为其提供 `ldap_config_util` 的目录。


    ```

    [oracle@clouddemolab ldap_config_util]$ ./LDAPConfigPostSetup.sh /home/oracle/IDMMiddleware/Oracle_IDM1/server/ldap_config_util

    ```


    此命令的输出应类似于以下内容。'
  raw: 'MDS Schema Password should contain the password for `imdev_mds`.


    During the initial domain creation step, you configured a WebLogic domain to house
    OIM. You configured the Administration Server on Port 27001\. Enter the URL for
    the Administration Server, including port as seen in Figure [10-10](#A352855_1_En_10_Chapter.html#Fig10).
    Note that in this case you must enter the URL using the T3 protocol in the format
    t3://hostname:port. Enter the WebLogic username and password and click Next to
    continue.


    ![A352855_1_En_10_Fig10_HTML.jpg](A352855_1_En_10_Fig10_HTML.jpg)


    Figure 10-10.


    WLS information


    The next step allows you to configure the details around the new OIM server. Figure
    [10-11](#A352855_1_En_10_Chapter.html#Fig11) shows the screen that collects the
    new OIM administrator password and keystore passwords. Make note of these values,
    as they will be necessary later in the process.


    ![A352855_1_En_10_Fig11_HTML.jpg](A352855_1_En_10_Fig11_HTML.jpg)


    Figure 10-11.


    OIM Server configuration


    OIM Adminstrator Password should be set to something you will remember. The OIM
    HTTP URL is the URL that will be used for Identity Manager. If you have an Oracle
    HTTP Server (OHS) server in front of the OIM server, enter the URL for it here.
    You can update this later if you have not yet installed an OHS server. Enter and
    confirm a Keystore Password.


    Select the Enable OIM for Suite Integration check box. This environment will include
    OAM and OIM integration. Synchronization is required. Earlier in the chapter,
    the prerequisite steps for this were presented. If you have not yet completed
    those steps, go do them now before proceeding.


    On Step 6 of 10, you will be prompted for the LDAP identity store to be used by
    OIM. Figure [10-12](#A352855_1_En_10_Chapter.html#Fig12) shows the LDAP Server
    screen.


    ![A352855_1_En_10_Fig12_HTML.jpg](A352855_1_En_10_Fig12_HTML.jpg)


    Figure 10-12.


    Directory Server configuration


    In an earlier step, you preconfigured this identity store. In this example, you
    are using OID.


    *   Choose OID as the Directory Server Type.

    *   Enter a Directory Server ID. This should be unique.

    *   Enter the LDAP Server connection information in the format `ldap://hostname:ldapport.`

    *   Enter the Server User to be used by OIM to connect and perform operations.
    This should not be the `cn=orcladmin` user. Instead, in the preconfiguration steps,
    you created a user called `oimadminuser`. Enter it using the full distinguished
    name: `cn=oimadminuser,cn=systemids,dc=mycompany,dc=com`.

    *   Server Password is expecting the password you set during the preconfiguration
    step.

    *   Enter the Server SearchDN as the overall container name that contains the
    user and group containers.


    Because you have selected to enable LDAP synchronization, the configuration tool
    will remind you to complete the preconfiguration steps as seen in Figure [10-13](#A352855_1_En_10_Chapter.html#Fig13).
    If you have not done this, return to that section of this chapter and complete
    the steps now.


    ![A352855_1_En_10_Fig13_HTML.jpg](A352855_1_En_10_Fig13_HTML.jpg)


    Figure 10-13.


    Prerequisite check


    The LDAP Server Continued screen shown in Figure [10-14](#A352855_1_En_10_Chapter.html#Fig14)
    continues the configuration of the LDAP identity directory.


    ![A352855_1_En_10_Fig14_HTML.jpg](A352855_1_En_10_Fig14_HTML.jpg)


    Figure 10-14.


    LDAP Server information


    On this screen, you will enter the information pertaining to the user and group
    containers OIM will use to create users.


    *   LDAP RoleContainer is the group container.

    *   Enter a description.

    *   LDAP UserContainer is the location for all users OIM will manage.

    *   Enter a description.

    *   User Reservation Container is the holding place for newly created users waiting
    for approval.


    The Configuration Summary screen shown in Figure [10-15](#A352855_1_En_10_Chapter.html#Fig15)
    displays a consolidation of the configuration parameters that have been entered.


    ![A352855_1_En_10_Fig15_HTML.jpg](A352855_1_En_10_Fig15_HTML.jpg)


    Figure 10-15.


    Configuration Summary screen


    Ensure that the components you have chosen to configure are listed. This is also
    a chance to double-check the values you have used for the configuration. Click
    Configure to continue.


    You have now completed the OIM configuration. The server should now be configured
    with an OID identity store and LDAP synchronization enabled. Figure [10-16](#A352855_1_En_10_Chapter.html#Fig16)
    shows the completed configuration.


    ![A352855_1_En_10_Fig16_HTML.jpg](A352855_1_En_10_Fig16_HTML.jpg)


    Figure 10-16.


    Configuration Complete screen


    ## Complete LDAP Postinstallation


    In the previous section, you completed the OIM configuration. During that step,
    you selected Enable OIM for Suite Integration. This informs OIM that you will
    be using LDAP synchronization, which is required for an OAM and OIM integration.
    During the preconfiguration, you ran utilities to prepare OID for synchronization.
    It is now time to run the postinstallation tasks to make it complete.


    Before proceeding, ensure your environment variables are set up properly for the
    `ldapconfigpostsetup` utility. These must be set up as follows.


    *   `APP_SERVER=weblogic`

    *   `JAVA_HOME=/home/oracle/java/jdk1.6.0_45 MW_HOME=/home/oracle/IDMMiddleware`

    *   `OIM_ORACLE_HOME=/home/oracle/IDMMiddleware/Oracle_IDM1`

    *   `WL_HOME=/home/oracle/IDMMiddleware/wlserver_10.3`

    *   `DOMAIN_HOME=/home/oracle/IDMMiddleware/user_projects/domains/idm_domain`


    In the directory `/home/oracle/IDMMiddleware/Oracle_IDM1/server/ldap_config_util`,
    you will find a file called `ldapconfig.props`. Make a backup copy of this file
    and edit it as follows.


    ```

    # OIMServer Type, Valid values can be WLS, JBOSS, WAS

    # e.g.: OIMServerType=WLS

    OIMServerType=WLS

    # OIM Provider URL

    # if OIMServerType is WAS then

    #    OIMProviderURL=corbaloc:iiop:OIMServerBootStrapHost:OIMServerBootStrapPort

    #    hint:look for the OIM server bootStrapPort number in WAS admin console

    #    e.g.: corbaloc:iiop:hostName:2809

    # else OIMServerType is WLS then

    #      OIMProviderURL=t3://localhost:ManagedServerPort

    #      e.g.: OIMProviderURL=t3://localhost:14000

    OIMProviderURL=t3://10.0.70.229:14000

    # LDAP/OVD Server URL

    # If OVD server is selected during OIM installation, then provide

    # value for LDAPURL.

    # LDAPURL=ldap://:

    # e.g.: LDAPURL=ldap://OVDserver.us.oracle.com:6501

    #

    # If not, leave LDAPURL empty

    # e.g.: LDAPURL=

    LDAPURL=

    # If OVD server is selected during OIM installation, then provide

    # Admin user name to connect to LDAP/OVD Server

    # e.g.: LDAPAdminUsername=cn=oimAdminUser,cn=systemids,dc=us,dc=oracle,dc=com

    #

    # If not, leave LDAPAdminUsername empty

    # e.g.: LDAPAdminUsername=

    LDAPAdminUsername=

    # If OVD server is NOT selected during OIM installation, then provide

    # LIBOVD_PATH_PARAM=

    # e.g.: #LIBOVD_PATH_PARAM=/scratch/suramesh/Oracle/Middleware/user_projects/domains/base_domain/config/fmwconfig/ovd/oim

    LIBOVD_PATH_PARAM=

    # This is for FA C9, MT scenario where last changenumber from the standby

    # server is to be updated to the incremental recon. jobs, to be picked up,

    # once the primary/secondary replicated server comes up.

    # If the change number is not passed through this parameter, then logic is to

    # query the OVD and retrieve the same.

    ChangeLogNumber=

    ```


    Make these changes to the file and save the changes:


    *   `OIMServerType=WLS`

    *   Leave the LDAP URL empty as you are not using Oracle Virtual Directory (OVD)
    .

    *   Leave the LDAPUsername empty as you are not using OVD.

    *   Leave the LIBOVD_PATH_PARAM empty as you are not using OVD.


    You will next run the command `LDAPConfigPostSetup.sh`, providing it with the
    directory of the `ldap_config_util`.


    ```

    [oracle@clouddemolab ldap_config_util]$ ./LDAPConfigPostSetup.sh /home/oracle/IDMMiddleware/Oracle_IDM1/server/ldap_config_util

    ```


    The output of this command should be similar to the following.'
