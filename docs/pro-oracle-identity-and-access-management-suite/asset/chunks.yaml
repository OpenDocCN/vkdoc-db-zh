    # Oracle 身份与访问管理套件概述


    Oracle 融合中间件产品部署在 WebLogic Server 架构中。WebLogic Server 提供了一个可扩展的环境，使企业能够部署和管理 Oracle
    产品及 Java 应用程序，并具备访问数据库和消息服务的能力。WebLogic Server 作为应用服务器层运行。WebLogic 提供的能力包括集群、高可用性、可管理性、监控、安全以及数据库集成。


    Oracle 身份与访问管理套件由多个组件组成，每个组件都有其特定的用途。这些组件包括目录服务、访问管理或单点登录、身份管理、自助服务门户，以及配置、治理和报告服务。


    本章将介绍 Oracle 融合中间件 WebLogic Server 环境以及配置 Oracle 身份与访问管理套件所涉及的主要组件。同时，您还将获得对本书其余部分相关的
    Oracle 身份管理组件的描述。


    ## WebLogic Server


    Oracle 的 WebLogic Server (WLS) 是一个完全符合 J2EE 标准的应用服务器，它将支持 Oracle 身份与访问管理套件组件。此环境提供了部署自定义应用程序以及
    Oracle 融合中间件产品（如企业内容管理和 Oracle 身份与访问管理）所需的必要组件。由于 WebLogic Server 是一个应用服务器，用户能够通过
    Web 浏览器使用部署的应用程序端口，或通过充当反向代理的 HTTP 服务器来访问这些应用程序。


    为了提供企业级服务，WebLogic Server 支持多项环境特性。


    *   编程模型：WLS 支持 Java EE 部署环境、Web 服务支持、Java 消息服务、可扩展标记语言能力、Java 数据库连接资源以及其他组件。

    *   高可用性：通过使用 WebLogic 集群将工作负载分布到多个服务器上，以及检测和管理过载状况的能力来实现高可用性。持久化存储和存储转发服务允许临时存储
    JMS 消息并在跨集群分布的服务之间传递它们。

    *   安全性：WLS 提供了一个内置的轻量目录访问协议 2.0 身份存储，可用于管理对部署在服务器上的服务的访问。除此之外，WLS 可以配置为针对多种不同的外部数据存储（如
    Oracle Internet Directory、Active Directory 等）进行身份验证。此外，WLS 框架允许集成身份断言器，例如 Oracle
    访问管理器。

    *   诊断框架：提供收集和分析服务器上运行进程的运行时数据的能力。这可用于诊断问题和调整以获得更好的性能。


    针对 Oracle 身份与访问管理环境，本书将讨论如何使用以下组件。


    *   管理服务器提供了一个图形用户界面，用于管理部署的所有组件。每个 WLS 域都有一个管理服务器，可以在任何 WebLogic 主机上运行。管理服务器管理域、集群、受管服务器、数据源、安全设置和应用程序部署的配置数据。

    *   域是 WLS 内服务器资源的逻辑管理单元。环境的所有方面都包含在一个域中，包括受管服务器、数据库源、消息服务、应用程序部署、计算机和集群。

    *   计算机代表托管受管服务器的物理主机。一个管理服务器可以管理多台计算机。管理服务器与每台计算机的节点管理器通信，以执行每个受管服务器的启动和停止操作。如果需要，单个物理主机可以配置多个计算机，监听不同的端口。

    *   WebLogic 集群由一个或多个协同工作的 WLS 实例组成，提供高可用性和横向扩展环境的能力。

    *   受管服务器是一个逻辑上的 WLS 构造，应用程序可以部署在其上。

    *   数据源是在 WLS 内配置的 JDBC 连接，供部署在各个受管服务器中的应用程序使用。将数据源定位到特定的受管服务器可使其仅对那些指定的服务器可用。

    *   安全域定义了保护应用程序资源的身份验证提供者和断言器。安全组、用户和策略都可以在 WebLogic 安全域中定义。


    ## Oracle 目录服务


    Oracle 目录服务构成了 Oracle 身份与访问管理的核心。它由多个选项组成，目录服务提供了身份和策略存储、目录同步以及虚拟化功能，可供企业使用的各种应用程序利用。这些选项包括：


    *   Oracle Internet Directory：基于数据库的完全兼容 LDAP-V3 的身份目录。

    *   Oracle Unified Directory：基于 Java 的符合 LDAP-V3 标准的身份目录。

    *   Oracle Virtual Directory：目录集成，支持管理多个源而无需数据复制。

    '
- fmt: '### Oracle Internet Directory


    `OID`是一个完全符合`LDAP-V3`标准的目录，使用`Oracle Database`作为存储。这使得`OID`能够利用数据库特性，如`Real Application
    Clusters`和`Multimaster Replication`，结合`OID`集群和`Fusion Middleware`架构，以提供高可用和可扩展的环境。`Oracle
    Directory Services Manager`为维护`OID`中的用户、安全组、对象类、属性和策略提供了一个标准的前端。图[1-1](#A352855_1_En_1_Chapter.html#Fig1)展示了使用`Real
    Application Clusters Database`环境的`OID`或`OVD`的基本高可用性环境。


    ![A352855_1_En_1_Fig1_HTML.jpg](A352855_1_En_1_Fig1_HTML.jpg)


    图 1-1. 基础本地高可用配置


    `OID`通过存储多个上下文的能力，允许存储不同的身份数据。这使得可能存储在多个来源的数据可以在单个实例中进行管理。例如，如果企业已经实施了多个`Active
    Directory Lightweight Directory Service`实例来管理各种启用了`LDAP`的应用程序中的用户，则可以利用`OID`为所有应用程序提供单一的`LDAP`源。


    使用`Oracle database`作为数据存储库，`OID`能够利用`Transparent Data Encryption`和`Database Vault`等特性，在操作的每一层提供安全性。利用这些数据库特性的能力通过允许数据库处理数据存储和备份安全，从而分离了安全职责。


    `OID`提供了同步企业内使用的其他目录的能力。如图[1-2](#A352855_1_En_1_Chapter.html#Fig2)所示的`Directory
    Integration Platform`，允许管理员为`Active Directory`、`Sun eDirectory`、`OpenLDAP`等创建和维护同步配置文件。这使得企业能够整合用户存储库，并使用标准化的通用`LDAP`目录提供应用安全性。


    ![A352855_1_En_1_Fig2_HTML.jpg](A352855_1_En_1_Fig2_HTML.jpg)


    图 1-2. 目录集成平台


    除了通过复制数据并转换其格式以适应`OID`存储需求来整合多个不同的身份存储之外，`OID`还能够在`OID`节点之间执行数据复制，以提供高可用性和性能可扩展性。


    使用`OID`，组织面临着多种复制概念。完全复制涉及将整个目录传播到其他`IOD`节点，而不是仅将结构的指定部分发送到其他节点。对于复制的传输层，`OID`支持`LDAP`复制和`Database
    Advanced Replication`。前者依赖`LDAP`协议将数据从一个`OID`实例传输到另一个实例，而`Oracle Database Advanced
    Replication`则要求数据库在数据库实例之间复制数据。最后一个概念是复制方向。`OID`支持单主、多主和扇出复制。顾名思义，单主可以被视为从主节点到所有其他节点的单向复制。多主允许从任何节点进行的更改复制到其他节点。扇出是前两种方向的一种组合，其中一个主节点复制到其他节点，然后这些子节点可以向其他节点复制完整或部分数据。


    虽然`OID`历史悠久，并且目前与`OIM`和`OAM`等其他`Oracle Identity Management`组件以及`Fusion Middleware`产品和应用程序兼容，但`Oracle`已表示目录服务的未来方向是`OUD`。


    ### Oracle Unified Directory


    `OUD`代表`Oracle`发布了业界首个基于`Java`、符合`LDAP-V3`和`Directory Services Markup Language
    (DSML) v2`标准的目录服务，它将存储、代理、同步和虚拟化结合在单个平台中。`OUD`在商用级硬件和灵活的部署架构上，提供了高水平的性能、弹性可扩展性和高可用性。在提供这种级别的服务的同时，`OUD`能够保持高级别的安全性和监控。


    `OUD`的架构支持全局索引，增强了其弹性可扩展性。此特性允许管理员添加服务器；`OUD`将根据需要处理将新请求路由到新服务器和存储。这消除了构建新环境和迁移大量数据的需要。索引的另一个好处是，规模需求可以按需解决。管理员不再需要确定当前的容量需求并估计未来几年的增长。条目也可以分布在多个目录存储实例中。图[1-3](#A352855_1_En_1_Chapter.html#Fig3)展示了一个分布在多个节点并集群以提供故障转移保护的环境。


    ![A352855_1_En_1_Fig3_HTML.jpg](A352855_1_En_1_Fig3_HTML.jpg)


    图 1-3. 分布式架构


    为了在支持高可用性的同时提升高性能，`OUD`分离了目录服务和复制服务的任务。如前所述，`OUD`允许跨多个数据中心分布服务器。为了支持这一点，`OUD`引入了如图[1-4](#A352855_1_En_1_Chapter.html#Fig4)所示的复制服务器。这些是专用于在整个环境中复制数据的服务器，将客户端请求处理留给目录服务器。


    ![A352855_1_En_1_Fig4_HTML.jpg](A352855_1_En_1_Fig4_HTML.jpg)


    图 1-4. Oracle Unified Directory 复制


    在图[1-4](#A352855_1_En_1_Chapter.html#Fig4)描述的`OUD`复制过程中，每个`OUD`服务器连接到一个复制服务器。然后它向该服务器发送和接收所有更改。复制服务器将接收到的更改通知给环境中的所有其他复制服务器。`OUD`复制服务器将这些更改传达给与其连接的`OUD`服务器。由发起更改的`OUD`服务器分配的一个更改号标识该更改，并被复制服务器用来确保更改传播到其他`OUD`服务器。此更改号也存储在一个持久化存储中，该存储用于向可能已从复制服务器断开的`OUD`服务器提供更改。如果更改同时发生在两个`OUD`服务器上并导致冲突，每个`OUD`服务器将重放更改，直到所有冲突都得到解决。


    复制服务器管理与`OUD`服务器的连接，并监听来自其他复制服务器的更改。这些更改被传播到与其连接的目录服务器。当为复制配置`OUD`服务器时，这些复制服务器会自动创建。因此，它们可以运行在同一台`Java`虚拟机（`JVM`）或主机上。为了节省资源，可以将`OUD`服务器配置为同时执行目录和复制服务器功能。然而，对于大型环境，`Oracle`建议将这些功能分离到不同的服务器上。


    与`OID`类似，可以使用`Directory Integration Platform`从第三方`LDAP`存储库复制身份数据，为应用程序身份验证提供中央数据存储库。需要注意的是，这与前面为`OID`介绍的功能相同。因此，它生成的是必须维护的身份数据副本。一些组织可能不希望管理多份`LDAP`数据副本。这正是`OVD`所解决的问题。'
  raw: '### Oracle Internet Directory


    OID is a fully LDAP-V3 compliant directory using the Oracle Database for storage.
    This allows OID to leverage database features such as Real Application Clusters
    and Multimaster Replication in conjunction with OID clusters and the Fusion Middleware
    architecture to provide a highly available and scalable environment. The Oracle
    Directory Services Manager provides a standard front end for the maintenance of
    users, security groups, object classes, attributes, and policies within the OID.
    Figure [1-1](#A352855_1_En_1_Chapter.html#Fig1) presents a basic high-availability
    environment of OID or OVD using a Real Application Clusters Database environment.


    ![A352855_1_En_1_Fig1_HTML.jpg](A352855_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    Basic local high availability configuration


    OID allows the storage of disparate identity data through the ability to store
    multiple contexts. This allows data that might be stored in multiple sources to
    be managed in a single instance. For example, if the enterprise has implemented
    multiple Active Directory Lightweight Directory Service instances to manage users
    in various LDAP enabled applications, OID can be leveraged to provide a single
    LDAP source for all applications.


    Using an Oracle database for the data repository, OID is able to leverage features
    such as Transparent Data Encryption and Database Vault to provide security at
    every level of operation. The ability to leverage these database features separates
    security duties by allowing the database to handle the data store and backup security.


    OID provides the ability to synchronize other directories in use within the enterprise.
    The Directory Integration Platform, shown in Figure [1-2](#A352855_1_En_1_Chapter.html#Fig2),
    allows administrators to create and maintain synchronization profiles for Active
    Directory, Sun eDirectory, OpenLDAP, and others. This enables the enterprise to
    consolidate user repositories and provide application security with a standardized
    general-purpose LDAP directory.


    ![A352855_1_En_1_Fig2_HTML.jpg](A352855_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    Directory Integration Platform


    In addition to integrating multiple disparate identity stores by copying data
    and transforming it to match the needs within the OID store, OID is also able
    to perform replication of data between OID nodes to provide high availability
    and scalability for performance.


    With OID, the organization is presented with multiple replication concepts. Full
    replication involves propagating the entire directory to other IOD nodes instead
    of sending only a specified portion of the structure to other nodes. For the transport
    layer of replication, OID supports both LDAP replication and Database Advanced
    Replication. The former relies on the LDAP protocol to convey data from one OID
    instance to another, whereas Oracle Database Advanced Replication requires the
    database to replicate the data between database instances. The last concept to
    be presented is the replication direction. OID supports single master, multimaster,
    and fan-out replication. As the names suggest, single master can be thought of
    as replication from a master node to all other nodes in one direction. Multimaster
    allows changes from any node to be replicated to the others. Fan-out is a sort
    of combination of the two previous directions, where a master node replicates
    out to other nodes and those child nodes can then replicate either full or partial
    data to other nodes.


    Although OID has a long-standing history and is currently compatible with other
    Oracle Identity Management components such as OIM and OAM, along with Fusion Middleware
    products and applications, Oracle has indicated that the future direction of Directory
    Services is OUD.


    ### Oracle Unified Directory


    OUD represents Oracle’s release of the industry’s first Java-based, LDAP-V3 and
    Directory Services Markup Language (DSML) v2 compliant directory service that
    combines storage, proxy, synchronization, and virtualization in a single platform.
    OUD provides a high level of performance and elastic scalability and high availability
    using commodity-level hardware and flexible deployment architectures. While providing
    this level of service, OUD is able to maintain high levels of security and monitoring.


    OUD’s architecture allows for global indexing, increasing its elastic scalability.
    This feature allows administrators to add servers; OUD will handle routing of
    new requests to the new servers and storage as needed. This eliminates the need
    for building new environments and migrating large amounts of data. Another benefit
    of this indexing is that sizing needs can be addressed on an as-needed basis.
    No longer do administrators need to determine the current size requirements and
    estimate growth over the next few years. Entries can also be distributed across
    multiple directory storage instances. Figure [1-3](#A352855_1_En_1_Chapter.html#Fig3)
    shows an environment that has been distributed across mulitple nodes as well as
    clustered to provide failover protection.


    ![A352855_1_En_1_Fig3_HTML.jpg](A352855_1_En_1_Fig3_HTML.jpg)


    Figure 1-3.


    Distributed architecture


    To support high availability while also promoting high performance, OUD separates
    the tasks of directory services and replication services. As discussed previously,
    OUD allows the distribution of servers across multiple data centers. To support
    this, OUD introduces replication servers shown in Figure [1-4](#A352855_1_En_1_Chapter.html#Fig4).
    These are servers dedicated to replicating data across the entire environment,
    leaving client request handling to the directory servers.


    ![A352855_1_En_1_Fig4_HTML.jpg](A352855_1_En_1_Fig4_HTML.jpg)


    Figure 1-4.


    Oracle Unified Directory replication


    During the OUD replication described in Figure [1-4](#A352855_1_En_1_Chapter.html#Fig4),
    each OUD server connects to one replication server. It then sends and receives
    all changes to that server. The replication servers communicate changes received
    to all the other replication servers in the environment. The OUD replication servers
    communicate these changes to the OUD servers connected to them. A change number
    assigned by the OUD server that initiates the change identifies the change and
    is used by the replication servers to ensure that changes are populated to the
    other OUD servers. This change number is also stored in a persistent store that
    is used to populate changes to OUD servers that might have been disconnected from
    the replication servers. If changes occur on both OUD servers at the same time
    and cause conflicts, each OUD server will replay the changes until all conflicts
    are resolved.


    The replication server manages connections to the OUD servers and listens for
    changes from other replication servers. These changes are populated to the directory
    servers connected to it. These replication servers are created automatically when
    an OUD server is configured for replication. As such, these can run on the same
    Java virtual machine (JVM) or host. To save resources, an OUD server can be configured
    to perform both directory and replication server functions. However, for larger
    environments, Oracle recommends these functions be separated to different servers.


    Much like OID, the Directory Integration Platform can be used to copy identity
    data from third-party LDAP repositories to provide a central data store for application
    authentication. It should be noted that this is the same functionality presented
    earlier for OID. As such, it is producing a copy of identity data that must be
    maintained. Some organizations might not wish to manage multiple copies of LDAP
    data. This is addressed with OVD.'
