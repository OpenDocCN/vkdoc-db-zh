  trans: '

    ## 基础定制


    OIM 的定制工作分为几个不同的复杂级别。在最基础的层面，OIM 允许管理员更改诸如背景颜色、徽标以及各种页面的视觉组件等内容。由于其实现方式，这些更改大多会影响所有页面。最基本的修改涉及更改级联样式表（`CSS`）等文件或替换图像文件。


    `CSS` 在网页开发中已使用很长时间。这些文件允许设计者为项目一次性定义字体、颜色、背景等元素，而无需在部署中为每个页面单独跟踪它们。


    图 14-1 展示了 OIM 身份自助服务主页。使用诸如 `HTTPFox` 或 `Google Chrome` 这类能够查看网页元素的浏览器工具，你将能够确定整个页面所使用的
    `CSS` 文件、元素和属性。这些信息将是更改 OIM 应用程序页面的关键。


    ![A352855_1_En_14_Fig1_HTML.jpg](img/A352855_1_En_14_Fig1_HTML.jpg)

    图 14-1. OIM 身份自助服务页面——检查元素


    ### 用户界面定制


    最简单的自定义开箱即用的用户界面（UI）的方式，是使用在线表单编辑工具和 OIM 的沙盒概念。沙盒允许编辑者对当前实例中的表单进行更改，而不影响其他编辑者或当前用户。在单个沙盒中进行的更改仅限于该沙盒实例。当发布沙盒时，这些更改将与实时系统同步写入。图
    14-2 显示了 Oracle 身份管理器主页，其顶部有 `Sandboxes`（沙盒）链接。请注意，你必须以具有编辑或管理权限的用户身份登录系统才能看到此链接。你也可以通过
    `sysadmin console`（系统管理控制台）页面访问此链接。


    ![A352855_1_En_14_Fig2_HTML.jpg](img/A352855_1_En_14_Fig2_HTML.jpg)

    图 14-2. 创建沙盒


    点击管理员可用的 `Sandboxes` 链接，将弹出一个屏幕，显示当前可用的沙盒及其状态，如图 14-3 所示。在此屏幕上，你可以激活一个当前沙盒、发布某个沙盒、创建新沙盒或删除现有沙盒。点击
    `Manage Sandboxes`（管理沙盒）选项卡可查看现有沙盒。此屏幕将显示状态以及最后修改者。如果沙盒处于活动状态，`Active`（活动）列中将显示一个绿灯。


    ![A352855_1_En_14_Fig3_HTML.jpg](img/A352855_1_En_14_Fig3_HTML.jpg)

    图 14-3. 当前沙盒


    要创建新沙盒，请点击 `Create Sandbox`（创建沙盒）链接。你将看到如图 14-4 所示的 `Create Sandbox`（创建沙盒）对话框。为新沙盒提供名称和描述。如果你想立即开始进行自定义，请选中
    `Activate Sandbox`（激活沙盒）复选框。这将创建新环境并激活它。


    ![A352855_1_En_14_Fig4_HTML.jpg](img/A352855_1_En_14_Fig4_HTML.jpg)

    图 14-4. 创建沙盒对话框


    创建新沙盒后，你将在屏幕顶部看到它已被激活。在 `Sandboxes` 链接旁边，将显示当前选定沙盒的名称，如图 14-5 所示。要自定义当前页面或其他页面，请点击
    `Customize`（自定义）链接。


    ![A352855_1_En_14_Fig5_HTML.jpg](img/A352855_1_En_14_Fig5_HTML.jpg)

    图 14-5. 活动沙盒


    进入沙盒后，你将能够进行多项更改。熟悉各种视图非常重要。默认情况下，你将看到 `Add Content`（添加内容）视图，如图 14-6 所示。编辑器的此视图允许你向表单中输入数据。此功能在处理多步骤表单时非常有用。在
    OIM 中，有许多表单需要多个 UI 步骤，例如“忘记密码”页面。你可以使用 `Add Content` 视图输入数据并转到流程中的下一页。


    ![A352855_1_En_14_Fig6_HTML.jpg](img/A352855_1_En_14_Fig6_HTML.jpg)

    图 14-6. 沙盒自定义 `Add Content` 视图


    在通过 `Add Content` 屏幕输入所需数据或你希望处理的数据后，可以切换到如图 14-7 所示的 `Structure`（结构）视图。此屏幕既显示整个页面，也显示页面组件的树状结构视图。屏幕右侧列出的每个组件都代表左侧显示页面上的一个项目或区域。点击屏幕左侧的页面项目会在右侧结构中选择相应的元素。使用此界面可以极大地帮助你找到希望编辑或添加内容的区域或元素。你可以直接使用右侧的结构列表来选择元素。


    ![A352855_1_En_14_Fig7_HTML.jpg](img/A352855_1_En_14_Fig7_HTML.jpg)

    图 14-7. 沙盒自定义 `Structure` 视图

