    xorg-x11-apps*

    xorg-x11-xinit*

    xorg-x11-server-Xorg*

    xterm

    pdksh-5.2.14

    ```


    至此，在安装流程中，操作系统应已完全准备好，可以继续进行安装。在安装软件之前执行这些操作，将确保安装过程顺利无误。在多数情况下，如果遗漏了任何内容，安装程序会提供详细的错误信息。如果在安装过程中出现错误，请停止安装，并在继续之前修复所有问题。


    ## 数据库准备


    与 OID 类似，OIM 的安装也需要创建特定的数据库对象。这包括在多个数据库模式中创建的一系列表、视图和程序包。这是通过使用**仓库创建实用程序** (Repository
    Creation Utility，RCU) 完成的。虽然可以在 OID 数据库内创建这些数据库对象，但通常建议将 Oracle 身份和访问管理仓库创建在单独的实例中。这样可以简化数据库管理任务和未来的维护工作。为防止安装出现问题，确保所使用的
    RCU 版本与要安装的 Fusion Middleware 产品版本相匹配至关重要。在域配置期间发现不匹配将导致进程无法继续。解压下载的文件，并运行 `<RCU_HOME>/rcu/bin`
    目录中的 `rcu.sh`。您将首先看到如图 7-1 所示的“创建仓库”屏幕。


    ![A352855_1_En_7_Fig1_HTML.jpg](img/A352855_1_En_7_Fig1_HTML.jpg)


    图 7-1. 创建或删除方案


    由于这是首次安装 OIM，请在此屏幕上选择“创建”选项。这将启动 RCU 的创建模式。


    选择创建方案后，您必须在如图 7-2 所示的屏幕上输入目标系统的数据库连接详细信息。您可以选择在与 OID 相同的数据库中创建身份管理器方案。然而，为了保持数据库管理更简单，身份管理器方案通常安装在不同的数据库中。此实例可以与
    OAM 相同。


    ![A352855_1_En_7_Fig2_HTML.jpg](img/A352855_1_En_7_Fig2_HTML.jpg)


    图 7-2. “数据库连接详细信息”屏幕


    **注意：** 在创建 OIM 方案之前，必须运行 `$ORACLE_HOME/rdbms/admin/xaview.sql` 来启用 XA 事务视图和同义词。


    RCU 验证连接详细信息后，会提示您选择要在新仓库中安装的组件。此屏幕如图 7-3 所示。


    ![A352855_1_En_7_Fig3_HTML.jpg](img/A352855_1_En_7_Fig3_HTML.jpg)


    图 7-3. “选择组件”屏幕


    在此 RCU 步骤中，您必须选择要安装的组件。请注意，在选择 OIM 组件时，其他必需项将被预选。**不要取消选择这些项**，因为它们将在域配置步骤中进行验证。然后，RCU
    将验证数据库是否满足所选组件的先决条件，如图 7-4 所示。


    ![A352855_1_En_7_Fig4_HTML.jpg](img/A352855_1_En_7_Fig4_HTML.jpg)


    图 7-4. 检查先决条件


    每个 Fusion Middleware 组件都有数据库要求，例如最大连接数或打开的进程数。RCU 将在创建数据库方案和对象之前检查这些先决条件。


    如果数据库满足最低要求，下一步是输入新数据库方案要使用的密码，如图 7-5 所示。


    ![A352855_1_En_7_Fig5_HTML.jpg](img/A352855_1_En_7_Fig5_HTML.jpg)


    图 7-5. “方案密码”屏幕


    在此步骤中，指定您希望使用的密码值。您可以选择为所有方案使用相同的密码，也可以为每个方案使用不同的密码。请根据安全要求和易管理性做出决定。


    图 7-6 显示了表空间复查屏幕，其中显示了将为选定的身份管理组件创建的新数据库表空间。您可以单击“下一步”继续，或选择自定义新表空间。


    ![A352855_1_En_7_Fig6_HTML.jpg](img/A352855_1_En_7_Fig6_HTML.jpg)


    图 7-6. 表空间列表


    在实际创建表空间之前，RCU 将向您显示它将执行的操作的摘要。图 7-7 显示了“摘要”屏幕。您应记录这些信息，以备将来与 DBA 讨论与数据库相关的运行时问题时参考。


    ![A352855_1_En_7_Fig7_HTML.jpg](img/A352855_1_En_7_Fig7_HTML.jpg)


    图 7-7. “创建摘要”屏幕


    所有数据库对象创建完成后，系统将提供“完成摘要”屏幕，如图 7-8 所示。单击“关闭”完成该过程。


    ![A352855_1_En_7_Fig8_HTML.jpg](img/A352855_1_En_7_Fig8_HTML.jpg)


    图 7-8. “完成摘要”屏幕


    至此，OIM 的仓库创建过程已完成。身份管理器及其所需组件的必要数据库方案和对象已安装在目标数据库中。现在可以继续安装过程。


    ### 身份管理器软件安装


    在上一节中，您了解了创建 OIM 数据库方案和对象的步骤。以下部分将讨论身份管理器软件的安装。此过程会创建必要的文件系统结构，并部署 Fusion Middleware
    产品所需的二进制文件。


    OIM 必须安装在 WLS 主目录中。在第 6 章中，介绍了在单独的 WLS 主目录中安装 OAM 的步骤。您可以选择将身份管理器软件安装在与访问管理器相同的主目录中，也可以创建一个完全独立的主目录专门用于它。通常将访问管理器和身份管理器分离在网络的不同层级或不同的物理主机上。如果您的环境需要这样做，请遵循第
    4 章中的 WLS 安装步骤。'
- fmt: '## Service-Oriented Architecture Installation


    OIM requires Oracle Service-Oriented Architecture (SOA) to run properly. This
    installation is separate from the OIM process, but can be installed within the
    same WebLogic home. After the SOA installation, you can install OIM and configure
    the domain for both products at the same time. This is the recommended process
    for the two products.


    Just like many other Fusion Middleware products, the SOA installation tool is
    started using the `runInstaller` command to start the Oracle Universal Installer.
    This is found on Disk 1 of the installation media. When running the tool, you
    must indicate the location of the Java Runtime Environment. This is done as shown
    in Figure [7-9](#A352855_1_En_7_Chapter.html#Fig9).


    ![A352855_1_En_7_Fig9_HTML.jpg](A352855_1_En_7_Fig9_HTML.jpg)

    Figure 7-9. Starting the Universal Installer


    ```

    runInstaller -jreLoc /home/oracle/jdk1.6.0_45/jre

    ```


    OIM requires SOA 11.1.1.9. This version will be installed using this tool. The
    starting screen displays information pertinent to the planned installation and
    a reminder to run the RCU. Much like other iterations of the Universal Installer,
    Oracle checks the OS to ensure it meets the minimum requirements. A completed
    prerequisite check is shown in Figure [7-10](#A352855_1_En_7_Chapter.html#Fig10).


    ![A352855_1_En_7_Fig10_HTML.jpg](A352855_1_En_7_Fig10_HTML.jpg)

    Figure 7-10. Prerequisite Checks screen


    As with OAM, SOA has its own set of required OS packages, kernel parameters, memory,
    and storage allowances. These must be met prior to continuing with the installation.
    Although many of these are the same as the Access Manager installation, it is
    important to visit the beginning of this chapter to view them.


    ### Note


    Prerequisite failures will be shown with a red X on the Universal Installer screen.
    You can open a terminal window logged in as root to correct any problems and retry
    the prerequisite checks until all issues have been resolved.


    In the next step, you must select the Middleware Home location for this installation.
    Because this environment consists of separate WLS for each Access Manager and
    Identity Manager, it is important to install SOA in the correct Middleware Home.
    In this case, Identity Manager will be installed in the `IDMMiddleware` directory.
    See Figure [7-11](#A352855_1_En_7_Chapter.html#Fig11) for more details.


    ![A352855_1_En_7_Fig11_HTML.jpg](A352855_1_En_7_Fig11_HTML.jpg)

    Figure 7-11. Specify Installation Location screen


    Oracle SOA can be installed on either WLS or WebSphere server. This book focuses
    on the WLS installation types. Select WebLogic Server, as shown in Figure [7-12](#A352855_1_En_7_Chapter.html#Fig12),
    and continue to the next step.


    ![A352855_1_En_7_Fig12_HTML.jpg](A352855_1_En_7_Fig12_HTML.jpg)

    Figure 7-12. Selecting the application server type


    The Installatio Summary screen, shown in Figure [7-13](#A352855_1_En_7_Chapter.html#Fig13),
    displays a summary of the selections made during the installer screens. Confirm
    the selections and click Install to start the installation.


    ![A352855_1_En_7_Fig13_HTML.jpg](A352855_1_En_7_Fig13_HTML.jpg)

    Figure 7-13. Installation Summary screen


    The actual installation can take about 10 minutes. The progress screen, shown
    in Figure [7-14](#A352855_1_En_7_Chapter.html#Fig14), will keep you apprised of
    the current status. Do not panic if the progress seems to stall for a while.


    ![A352855_1_En_7_Fig14_HTML.jpg](A352855_1_En_7_Fig14_HTML.jpg)

    Figure 7-14. Installation Progress screen


    After the installer has completed copying the necessary files and creating the
    file system, the Installation Complete screen shown in Figure [7-15](#A352855_1_En_7_Chapter.html#Fig15),
    will be displayed. This screen contains details directly related to your new environment.
    It might be useful to take note of the contents for future reference. At this
    point, you can click Finish and exit the installer.


    ![A352855_1_En_7_Fig15_HTML.jpg](A352855_1_En_7_Fig15_HTML.jpg)

    Figure 7-15. Installation Complete screen


    Now the required Oracle SOA suite instance has been installed. When configuring
    the OIM domain, the Configuration Wizard will set up the necessary components
    of SOA. As you will recall, this SOA instance is installed in the same Middleware
    Home as the Identity Manager. The next section covers IOM installation.


    ## Identity Manager Installation


    The WLS and SOA software has been installed. It is now time to install the Identity
    Manager software. Again, this process is started using the `runInstaller` script
    found on Disk 1 of the installation media. Just like the SOA installation, you
    must indicate the Java Runtime Environment location for the installer to run properly.
    Figure [7-16](#A352855_1_En_7_Chapter.html#Fig16) shows the Universal Installer.


    ![A352855_1_En_7_Fig16_HTML.jpg](A352855_1_En_7_Fig16_HTML.jpg)

    Figure 7-16. Installation Welcome screen


    ```

    ./runInstaller.sh -jreLoc /home/oracle/jdk1.6.0_45/jre

    ```


    The first screen displays important information about the software to be installed.
    Ensure the version displayed matches your requirements and the version of the
    RCU previously run.


    As with OAM, OIM has its own set of required OS packages, kernel parameters, memory,
    and storage allowances. These must be met prior to continuing with the installation.
    As seen in Figure [7-17](#A352855_1_En_7_Chapter.html#Fig17), the Installer will
    check these before allowing the process to continue. Although many of these are
    the same as for the OAM installation, it is important to visit the beginning of
    this chapter to view them.


    ![A352855_1_En_7_Fig17_HTML.jpg](A352855_1_En_7_Fig17_HTML.jpg)

    Figure 7-17. Prerequisite Checks screen


    On the Specify Installation Location screen, you must select a Middleware Home
    to house the installation. Figure [7-18](#A352855_1_En_7_Chapter.html#Fig18) provides
    details on this entry point. This location must be a directory that has WLS installed.
    Because this physical host houses two instances of WLS, make sure to select the
    location that is not currently used for OAM. The selected home should be the same
    as you chose in the previous step for SOA.


    ![A352855_1_En_7_Fig18_HTML.jpg](A352855_1_En_7_Fig18_HTML.jpg)

    Figure 7-18. Specify Installation Location screen


    At this point the Universal Installer will begin copying files to their new locations.
    A progress screen such as the one shown in Figure [7-19](#A352855_1_En_7_Chapter.html#Fig19)
    will show the current operation and progress.


    ![A352855_1_En_7_Fig19_HTML.jpg](A352855_1_En_7_Fig19_HTML.jpg)

    Figure 7-19. Installation Progress screen


    The actual installation of the software files usually finishes in about 10 minutes.
    During this time you can see the actual operations on the progress screen, which
    also shows the location of the installation log file. You can monitor this log
    for any errors. Once completed, you can close the installer, as all installation
    operations are complete. In the next sections, you will be configuring the OIM
    domain.'
