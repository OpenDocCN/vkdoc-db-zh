  trans: '## 操作系统包


    每个 Oracle 应用程序都有自己的一套必需软件包。根据您所使用的 Linux 版本，安装过程可能有所不同。在下面的列表中，请注意，有些软件包需要在 64
    位操作系统上同时安装 32 位和 64 位版本。如果这些软件包未安装，安装将无法正常完成。Oracle 安装程序会检查这些包，并在安装过程中显示错误。


    ```

    binutils-2.20.51.0.2-5.28.el6

    compat-libcap1-1.10-1

    compat-libstdc++-33-3.2.3-69.el6 for x86_64

    compat-libstdc++-33-3.2.3-69.el6 for i686

