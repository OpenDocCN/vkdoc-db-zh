    A progress screen such as the one shown in Figure [7-19](#A352855_1_En_7_Chapter.html#Fig19)
    will show the current operation and progress.


    ![A352855_1_En_7_Fig19_HTML.jpg](A352855_1_En_7_Fig19_HTML.jpg)


    Figure 7-19.


    Installation Progress screen


    The actual installation of the software files usually finishes in about 10 minutes.
    During this time you can see the actual operations on the progress screen, which
    also shows the location of the installation log file. You can monitor this log
    for any errors. Once completed, you can close the installer, as all installation
    operations are complete. In the next sections, you will be configuring the OIM
    domain.'
  trans: '

    ### 面向服务的架构安装


    `OIM` 需要 Oracle 面向服务的架构 (`SOA`) 才能正常运行。此安装独立于 `OIM` 过程，但可以安装在相同的 `WebLogic` 主目录中。`SOA`
    安装完成后，您可以安装 `OIM` 并同时为两个产品配置域。这是这两个产品的推荐流程。


    与许多其他 Fusion Middleware 产品类似，`SOA` 安装工具通过运行 `runInstaller` 命令来启动 Oracle 通用安装程序。该程序位于安装介质的第
    1 张光盘上。运行该工具时，您必须指明 Java 运行时环境的位置。具体操作如图 7-9 所示。


    ![A352855_1_En_7_Fig9_HTML.jpg](img/A352855_1_En_7_Fig9_HTML.jpg)


    图 7-9. 启动通用安装程序


    ```

    runInstaller -jreLoc /home/oracle/jdk1.6.0_45/jre

    ```


    `OIM` 需要 `SOA 11.1.1.9`。将使用此工具安装此版本。初始屏幕会显示与计划安装相关的信息以及运行 `RCU` 的提醒。与其他版本的通用安装程序非常相似，Oracle
    会检查 `OS` 以确保其满足最低要求。图 7-10 显示了一个已完成的先决条件检查。


    ![A352855_1_En_7_Fig10_HTML.jpg](img/A352855_1_En_7_Fig10_HTML.jpg)


    图 7-10. 先决条件检查屏幕


    与 `OAM` 一样，`SOA` 也有自己的一套必需的 `OS` 软件包、内核参数、内存和存储要求。在继续安装之前，必须满足这些条件。尽管其中许多要求与访问管理器的安装相同，但请务必查阅本章开头部分以查看它们。


    注意：先决条件失败将在通用安装程序屏幕上以红色 `X` 显示。您可以打开一个以 `root` 身份登录的终端窗口来纠正任何问题，然后重试先决条件检查，直到所有问题都得到解决。


    在下一步中，您必须为此安装选择中间件主目录位置。由于此环境为访问管理器和身份管理器分别配置了独立的 `WLS`，因此将 `SOA` 安装在正确的中间件主目录中至关重要。在本例中，身份管理器将安装在
    `IDMMiddleware` 目录中。更多详情请参见图 7-11。


    ![A352855_1_En_7_Fig11_HTML.jpg](img/A352855_1_En_7_Fig11_HTML.jpg)


    图 7-11. 指定安装位置屏幕


    Oracle `SOA` 可以安装在 `WLS` 或 `WebSphere` 服务器上。本书重点介绍 `WLS` 安装类型。选择 `WebLogic Server`，如图
    7-12 所示，然后继续下一步。


    ![A352855_1_En_7_Fig12_HTML.jpg](img/A352855_1_En_7_Fig12_HTML.jpg)


    图 7-12. 选择应用程序服务器类型


    安装摘要屏幕（如图 7-13 所示）显示了在安装程序屏幕中所做的选择摘要。确认选择后，点击 `安装` 开始安装。


    ![A352855_1_En_7_Fig13_HTML.jpg](img/A352855_1_En_7_Fig13_HTML.jpg)


    图 7-13. 安装摘要屏幕


    实际安装可能需要大约 10 分钟。进度屏幕（如图 7-14 所示）将让您了解当前状态。如果进度似乎停滞了一会儿，请不要惊慌。


    ![A352855_1_En_7_Fig14_HTML.jpg](img/A352855_1_En_7_Fig14_HTML.jpg)


    图 7-14. 安装进度屏幕


    在安装程序完成复制必要文件并创建文件系统后，将显示图 7-15 所示的安装完成屏幕。此屏幕包含与您的新环境直接相关的详细信息。记录这些内容以备将来参考可能会很有用。此时，您可以点击
    `完成` 并退出安装程序。


    ![A352855_1_En_7_Fig15_HTML.jpg](img/A352855_1_En_7_Fig15_HTML.jpg)


    图 7-15. 安装完成屏幕


    至此，所需的 Oracle `SOA` 套件实例已安装完毕。在配置 `OIM` 域时，配置向导将设置 `SOA` 的必要组件。如您所记得的，此 `SOA`
    实例与身份管理器安装在同一个中间件主目录中。下一节将介绍 `IOM` 安装。


    ### 身份管理器安装


    `WLS` 和 `SOA` 软件已安装完毕。现在是安装身份管理器软件的时候了。同样，此过程通过运行安装介质第 1 张光盘上的 `runInstaller`
    脚本启动。与 `SOA` 安装一样，您必须指明 Java 运行时环境的位置，安装程序才能正常运行。图 7-16 显示了通用安装程序。


    ![A352855_1_En_7_Fig16_HTML.jpg](img/A352855_1_En_7_Fig16_HTML.jpg)


    图 7-16. 安装欢迎屏幕


    ```

    ./runInstaller.sh -jreLoc /home/oracle/jdk1.6.0_45/jre

    ```


    第一个屏幕显示了有关要安装软件的重要信息。确保显示的版本符合您的要求以及先前运行的 `RCU` 的版本。


    与 `OAM` 一样，`OIM` 也有自己的一套必需的 `OS` 软件包、内核参数、内存和存储要求。在继续安装之前，必须满足这些条件。如图 7-17 所示，安装程序将在允许流程继续之前检查这些条件。尽管其中许多要求与
    `OAM` 安装相同，但请务必查阅本章开头部分以查看它们。


    ![A352855_1_En_7_Fig17_HTML.jpg](img/A352855_1_En_7_Fig17_HTML.jpg)


    图 7-17. 先决条件检查屏幕


    在“指定安装位置”屏幕上，您必须选择一个中间件主目录来存放安装文件。图 7-18 提供了此入口点的详细信息。此位置必须是一个已安装 `WLS` 的目录。由于此物理主机托管了两个
    `WLS` 实例，请确保选择当前未用于 `OAM` 的位置。所选主目录应与您在上一步为 `SOA` 选择的相同。


    ![A352855_1_En_7_Fig18_HTML.jpg](img/A352855_1_En_7_Fig18_HTML.jpg)


    图 7-18. 指定安装位置屏幕


    此时，通用安装程序将开始将文件复制到新位置。图 7-19 所示的进度屏幕将显示当前操作和进度。


    ![A352855_1_En_7_Fig19_HTML.jpg](img/A352855_1_En_7_Fig19_HTML.jpg)


    图 7-19. 安装进度屏幕


    软件文件的实际安装通常在大约 10 分钟内完成。在此期间，您可以在进度屏幕上看到实际操作，该屏幕还显示了安装日志文件的位置。您可以监视此日志以查找任何错误。完成后，您可以关闭安装程序，因为所有安装操作都已完成。在接下来的几节中，您将配置
    `OIM` 域。

    '
- fmt: '## Configure Identity Manager Domain


    After the necessary software components have been installed, you can continue
    to configure the WebLogic domain to support OIM. This process is started by running
    the `config` script located in the `IDM_HOME/common/bin` directory. It is important
    to note that you are only configuring the WebLogic domain at this time. OIM will
    not be ready to run.


    ### Basic Conventions


    To avoid confusion for the rest of this chapter, the following conventions are
    used. `MIDDLEWARE_HOME` is the base directory where WLS was installed. `IDM_HOME`
    is the directory within the WLS installation where OIM is installed. This is usually
    a directory called `Oracle_IDM1`. Figure 7-20 shows the Configuration Wizard.


    ![A352855_1_En_7_Fig20_HTML.jpg](A352855_1_En_7_Fig20_HTML.jpg)


    Figure 7-20.


    ### Create a New WebLogic Domain


    Create a new WebLogic domain Note.

    There are multiple instances of the `config.sh` script that can be found within
    the Middleware Home subdirectories. It is very important to run the correct version
    found within `<MIDDLEWARE_HOME/Oracle_IDM1/common/bin`.


    Because this is the first time a domain is being created within the WLS environment,
    choose Create a New WebLogic Domain.


    ### Select Domain Components


    During the next step of the process, select the OIM component. As seen in Figure
    7-21, this list is based on the software found within the WebLogic Home directory.
    You will notice that Oracle SOA Suite is automatically selected. If SOA Suite
    is not found within the WLS Home, you will be shown an error indicating this.
    Before continuing, ensure that any missing software is installed.


    ![A352855_1_En_7_Fig21_HTML.jpg](A352855_1_En_7_Fig21_HTML.jpg)


    Figure 7-21.


    Select domain components.


    ### Enter Domain Name and Location


    During the configuration, you are prompted for the name of the domain you wish
    to create. You can keep the default name of “base_domain” or you can name it something
    that makes sense in your environment. See Figure 7-22 for an example. In some
    cases, it might be desirable to locate the associated files separate from the
    Middleware Home directory. This is often done for clustered environments that
    require shared storage across the physical hosts.


    ![A352855_1_En_7_Fig22_HTML.jpg](A352855_1_En_7_Fig22_HTML.jpg)


    Figure 7-22.


    Enter domain name and location.


    ### Administrator Password


    The user password for `weblogic` should be set to something standard for your
    environment. This password will be used for starting and stopping managed servers
    as well as logging into the WebLogic Admin Console and Fusion Middleware Control.
    Figure 7-23 shows what the password configuration screen looks like.


    ![A352855_1_En_7_Fig23_HTML.jpg](A352855_1_En_7_Fig23_HTML.jpg)


    Figure 7-23.


    Administrator password.


    ### Server Start Mode


    The Startup Mode determines how the managed servers are started. In Development
    Mode, the managed servers can be started and stopped from the command line without
    a password. Also configuration changes can be made and activated within the WebLogic
    Console without locking the environment. Configuring the Startup Mode to Production
    Mode locks the environment down to ensure no changes are made without locking
    the console for edits. Command-line tools will also require a password. These
    choices are shown in Figure 7-24.


    ![A352855_1_En_7_Fig24_HTML.jpg](A352855_1_En_7_Fig24_HTML.jpg)


    Figure 7-24.


    Server Start Mode Note.

    Locking the Administration Console prevents multiple administrators from making
    changes and overwriting each other.


    ### Database Schema Check


    After the Java database connectivity (JDBC) connection details are entered, the
    information is validated by the configuration tool. Any errors will be shown.
    If a schema was not able to be validated, revisit the previous step to ensure
    the schema name and details are correct. If the database schema does not exist,
    rerun the RCU to create it. Figure 7-25 shows a completed database check.


    ![A352855_1_En_7_Fig25_HTML.jpg](A352855_1_En_7_Fig25_HTML.jpg)


    Figure 7-25.


    Database schema check.


    ### Select Optional Configuration


    As discussed in the AOM installation chapter, the example used in this book utilizes
    a split domain. As such, each component (OID, OAM, and OIM) will have its own
    Administration server. As shown in Figure 7-26, select Administration Server,
    Managed Servers, Clusters and Machines.


    ![A352855_1_En_7_Fig26_HTML.jpg](A352855_1_En_7_Fig26_HTML.jpg)


    Figure 7-26.


    Select Optional Configuration screen.


    ### Configure the Administration Server


    The default port for the Administration server is 7001, which was used in the
    previous chapter for the Access Manager Administration listen port. Using a standard
    port convention will help eliminate confusion or forgotten ports. For this exercise,
    use Port 7101 as seen in Figure 7-27. Subsequently, if more WLS instances are
    installed, use Ports 7201, 7301, and so on.


    ![A352855_1_En_7_Fig27_HTML.jpg](A352855_1_En_7_Fig27_HTML.jpg)


    Figure 7-27.


    Configure the Administration Server screen.


    ### Configure Managed Servers


    In this environment, Access Manager and Identity Manager are installed in separate
    Oracle Middleware Homes. This means that each one consists of WLS, Administration
    server, and managed servers. As discussed previously, this was done for ease of
    future maintenance such as patches and upgrades. It also allows the separation
    of these tiers to different physical hosts at a later time if required. Because
    these will be running on the same physical host but within separate WLS, each
    Administration server will require its own listen port.


    The managed servers will be prepopulated with the standard ports used by the installation.
    If desired, you can change the ports or populate a Secure Sockets Layer (SSL)
    listen port. In many cases, it is sufficient to allow the HTTP server or load
    balancer to perform the SSL endpoint duties, thus providing some performance gain
    by offloading the encryption duties to the external device. For ease of troubleshooting
    and future maintenance, leave the ports as defaults, seen in Figure 7-28.


    ![A352855_1_En_7_Fig28_HTML.jpg](A352855_1_En_7_Fig28_HTML.jpg)


    Figure 7-28.


    Configure Managed Servers screen.


    ### Configure Clusters


    During the course of this book, clustering is not a concern. However, to facilitate
    the creation of clusters later, the cluster configuration information is entered
    here, as shown in Figure 7-29. As such, the WebLogic domain will be preconfigured
    with the clusters in place. In effect, this step creates a single node cluster
    that can be later expanded to include multiple machines and instances.


    ![A352855_1_En_7_Fig29_HTML.jpg](A352855_1_En_7_Fig29_HTML.jpg)


    Figure 7-29.


    Configure Clusters screen.


    ### Assign Servers to Clusters


    Assign the managed servers to the desired cluster, as shown in Figure 7-30. Note
    that it is possible to create a single cluster and assign all of the managed servers
    to it. However, for simplification of administrative tasks, each will be assigned
    to its own cluster within WebLogic.


    ![A352855_1_En_7_Fig30_HTML.jpg](A352855_1_En_7_Fig30_HTML.jpg)


    Figure 7-30.


    Assign Servers to Clusters screen.


    It should be noted at this point that if you only have a single node in your cluster,
    you might see errors in the managed server logs related to waiting for communication
    with other members of the cluster. These can be ignored and will go away after
    adding additional members to the cluster.'
