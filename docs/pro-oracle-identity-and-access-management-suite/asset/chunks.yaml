  trans: '

    ## 配置身份管理器域


    在安装必要的软件组件后，您可以继续配置 WebLogic 域以支持 OIM。此过程通过运行位于 `` `IDM_HOME/common/bin` `` 目录下的
    `` `config` `` 脚本启动。需要注意的是，此时您仅配置 WebLogic 域。OIM 此时尚未准备好运行。


    为避免本章后续内容产生混淆，将使用以下约定。`` `MIDDLEWARE_HOME` `` 是安装 WLS 的基础目录。`` `IDM_HOME` `` 是
    WLS 安装中安装 OIM 的目录。这通常是一个名为 `` `Oracle_IDM1` `` 的目录。图 7-20 显示了配置向导。


    ![A352855_1_En_7_Fig20_HTML.jpg](img/A352855_1_En_7_Fig20_HTML.jpg)


    图 7-20. 创建新的 WebLogic 域


    **注意**

    在 Middleware Home 子目录中可以找到多个 `` `config.sh` `` 脚本实例。运行位于 `` `<MIDDLEWARE_HOME/Oracle_IDM1/common/bin.`
    `` 中的正确版本至关重要。


    由于这是首次在 WLS 环境中创建域，请选择 `` `Create a New WebLogic Domain` ``（创建新的 WebLogic 域）。


    在此过程的下一步，选择 OIM 组件。如图 7-21 所示，此列表基于 WebLogic Home 目录中找到的软件。您会注意到 Oracle SOA Suite
    已被自动选中。如果在 WLS Home 中未找到 SOA Suite，系统将显示错误提示。在继续之前，请确保已安装任何缺失的软件。


    ![A352855_1_En_7_Fig21_HTML.jpg](img/A352855_1_En_7_Fig21_HTML.jpg)


    图 7-21. 选择域组件


    在配置过程中，系统会提示您输入希望创建的域的名称。您可以保留默认名称 `` `"base_domain"` ``，也可以将其命名为在您的环境中更有意义的名称。示例参见图
    7-22。在某些情况下，可能希望将相关文件存放在 Middleware Home 目录之外。这通常在需要跨物理主机共享存储的集群环境中进行。


    ![A352855_1_En_7_Fig22_HTML.jpg](img/A352855_1_En_7_Fig22_HTML.jpg)


    图 7-22. 输入域名和位置


    `` `weblogic` `` 的用户密码应设置为您环境中的标准密码。此密码将用于启动和停止受管服务器，以及登录 WebLogic 管理控制台和 Fusion
    Middleware Control。图 7-23 显示了密码配置屏幕的样子。


    ![A352855_1_En_7_Fig23_HTML.jpg](img/A352855_1_En_7_Fig23_HTML.jpg)


    图 7-23. 管理员密码


    `` `Startup Mode` ``（启动模式）决定了受管服务器的启动方式。在 `` `Development Mode` ``（开发模式）下，受管服务器可以从命令行启动和停止，无需密码。此外，可以在
    WebLogic 控制台中进行配置更改和激活，而无需锁定环境。将 `` `Startup Mode` `` 配置为 `` `Production Mode`
    ``（生产模式）会锁定环境，以确保在未锁定控制台进行编辑的情况下无法进行任何更改。命令行工具也将需要密码。这些选项如图 7-24 所示。


    ![A352855_1_En_7_Fig24_HTML.jpg](img/A352855_1_En_7_Fig24_HTML.jpg)


    图 7-24. 服务器启动模式


    **注意**

    锁定管理控制台可防止多个管理员进行更改并相互覆盖。


    输入 Java 数据库连接（JDBC）详细信息后，配置工具会验证该信息。任何错误都将显示出来。如果无法验证某个模式，请返回上一步以确保模式名称和详细信息正确。如果数据库模式不存在，请重新运行
    RCU 以创建它。图 7-25 显示了一个已完成的数据库检查。


    ![A352855_1_En_7_Fig25_HTML.jpg](img/A352855_1_En_7_Fig25_HTML.jpg)


    图 7-25. 数据库模式检查


    正如 AOM 安装章节所讨论的，本书中使用的示例采用拆分域。因此，每个组件（OID、OAM 和 OIM）都将拥有自己的管理服务器。如图 7-26 所示，选择
    `` `Administration Server` ``（管理服务器）、`` `Managed Servers` ``（受管服务器）、`` `Clusters`
    ``（集群）和 `` `Machines` ``（计算机）。


    ![A352855_1_En_7_Fig26_HTML.jpg](img/A352855_1_En_7_Fig26_HTML.jpg)


    图 7-26. 选择可选配置屏幕


    管理服务器的默认端口是 `` `7001` ``，该端口在上一章中用于访问管理器的管理侦听端口。使用标准端口约定将有助于消除混淆或遗忘端口。对于本练习，使用端口
    `` `7101` ``，如图 7-27 所示。随后，如果安装更多 WLS 实例，则使用端口 `` `7201` ``、`` `7301` `` 等。


    ![A352855_1_En_7_Fig27_HTML.jpg](img/A352855_1_En_7_Fig27_HTML.jpg)


    图 7-27. 配置管理服务器屏幕


    在此环境中，访问管理器和身份管理器安装在独立的 Oracle Middleware Homes 中。这意味着每个都包含 WLS、管理服务器和受管服务器。如前所述，这样做是为了便于未来的维护，例如打补丁和升级。如果需要，它也允许在以后将这些层分离到不同的物理主机上。由于它们将在同一物理主机上运行，但位于独立的
    WLS 中，因此每个管理服务器都需要自己的侦听端口。


    受管服务器将预填充安装使用的标准端口。如果需要，您可以更改端口或填充安全套接字层（SSL）侦听端口。在许多情况下，允许 HTTP 服务器或负载均衡器执行 SSL
    端点职责就足够了，从而通过将加密职责卸载到外部设备来获得一定的性能提升。为了便于故障排除和未来维护，请保留默认端口，如图 7-28 所示。


    ![A352855_1_En_7_Fig28_HTML.jpg](img/A352855_1_En_7_Fig28_HTML.jpg)


    图 7-28. 配置受管服务器屏幕


    在本书的过程中，集群不是关注点。但是，为便于以后创建集群，在此处输入集群配置信息，如图 7-29 所示。因此，WebLogic 域将预先配置好集群。实际上，此步骤创建了一个单节点集群，以后可以扩展以包含多台计算机和实例。


    ![A352855_1_En_7_Fig29_HTML.jpg](img/A352855_1_En_7_Fig29_HTML.jpg)


    图 7-29. 配置集群屏幕


    将受管服务器分配到所需的集群，如图 7-30 所示。请注意，可以创建单个集群并将所有受管服务器分配给它。但是，为简化管理任务，每个受管服务器都将被分配到其在
    WebLogic 中的独立集群。


    ![A352855_1_En_7_Fig30_HTML.jpg](img/A352855_1_En_7_Fig30_HTML.jpg)


    图 7-30. 将服务器分配到集群屏幕


    此时应当注意，如果您的集群中只有一个节点，您可能会在受管服务器日志中看到与等待集群其他成员通信相关的错误。这些错误可以忽略，并在向集群添加其他成员后消失。

