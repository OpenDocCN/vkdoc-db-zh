    *图 6-28. 将受管服务器分配到集群*


    受管服务器可以分配到前面屏幕上定义的集群中。根据在给定环境中部署的产品，您可能希望将受管服务器分散到不同的集群中。这些分配关系以后可以使用管理控制台重新分配。


    机器定义了一个管理受管服务器内进程的主机。您可以在给定的主机上创建多台机器，或者将机器分布在多个主机上。图 6-29 显示了“配置机器”屏幕。


    ![A352855_1_En_6_Fig29_HTML.jpg](img/A352855_1_En_6_Fig29_HTML.jpg)

    *图 6-29. 机器配置*


    如果主机基于 Linux 或 UNIX，则必须创建 UNIX 机器。机器配置会告知 WebLogic 环境如何联系节点管理器以控制受管服务器。


    机器配置完成后，需要将要创建的受管服务器分配到相应的机器上，如图 6-30 所示。通常，在集群环境中，会存在多台机器，每台机器上运行受管服务器的一个节点。这使得单个管理服务器能够联系并控制位于不同主机或不同
    Middleware Home 中的受管服务器。


    ![A352855_1_En_6_Fig30_HTML.jpg](img/A352855_1_En_6_Fig30_HTML.jpg)

    *图 6-30. 将受管服务器分配到机器*


    如图 6-31 所示的“配置摘要”屏幕，提供了在执行配置之前对所有配置参数的最后检查机会。如果此时有任何内容看起来不正确，请返回并进行必要的修正，然后再继续。


    ![A352855_1_En_6_Fig31_HTML.jpg](img/A352855_1_En_6_Fig31_HTML.jpg)

    *图 6-31. 配置摘要屏幕*


    检查完配置摘要屏幕后，单击“创建”以启动配置过程。图 6-32 显示了已完成的配置。


    ![A352855_1_En_6_Fig32_HTML.jpg](img/A352855_1_En_6_Fig32_HTML.jpg)

    *图 6-32. 域配置完成*


    OAM 域配置已完成。在启动之前，还有几个必需的步骤。下一章将介绍 Identity Manager 组件的安装和配置。随后，将配置整个身份和访问管理器环境以协同工作。


    ## 总结


    本章介绍了 OAM 的安装过程。在安装软件文件之后，向您展示了 OAM 域的配置。至此，所有必要的文件都已复制，文件系统已准备就绪。如果您的实施只需要 SSO，则可以跳过下一章关于
    Identity Manager 安装的内容。


    # 7. Identity Manager 安装


    在前两章中，提供了安装和配置 Oracle Internet Directory (OID) 和 Oracle Access Manager (OAM) 的说明。这两个组件奠定了身份存储和单点登录
    (SSO) 的基础。Identity Manager 为环境添加了额外的元素，例如用户自助服务和治理，从而完成了端到端的身份生命周期管理实施。本章重点介绍
    Oracle Identity Manager (OIM) 的安装和初始域配置。


    ## 预安装任务


    ### 操作系统用户


    对于大多数 Oracle 应用程序安装，应创建操作系统 (OS) 用户和组来执行安装和配置任务。创建 OS 组将允许其他 OS 用户执行与管理应用程序环境相关的某些任务。在
    Linux 环境中安装 Oracle 应用程序时，最常见的 OS 用户和组是 `oracle` 用户以及 `oinstall` 或 `dba` 组。


    要创建必要的 `oinstall` 和 `dba` 组，请以 root 目录执行以下命令：


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd dba

    ```


    创建组后，创建 `oracle` 用户：


    ```

    [root@clouddemolab home]# useradd  -g oinstall -G dba oracle

    ```


    **注意**

    `-g` 表示用户应添加到的主要组。`-G` 表示任何次要组。


    要设置用户密码，请以 root 用户身份使用以下命令。


    ```

    [root@clouddemolab home]# passwd oracle

    ```


    ### 操作系统配置


    在安装 Oracle Fusion Middleware 基础架构和 Oracle Identity Management 软件之前，确保 OS 满足最低要求和配置非常重要。以下列出了所需的内核参数、软件包以及文件更改。


    需要设置以下内核参数：


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    要设置这些参数，请编辑位于 `/etc` 目录下的 `sysctl.conf` 文件。


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    在该文件的此部分添加或编辑以下行：


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    在 `sysctl.conf` 文件中设置这些值后，必须使用以下命令激活并验证是否显示新值：


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    打开文件限制必须设置为 4096 以支持实例。为此，请编辑 `limits.conf` 文件。


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    如果环境要安装在 Oracle Linux 或 RedHat Linux 上，还必须编辑 `/etc/security/limits.d/90-nproc.conf`。如果忽略了这一点，此文件中的值可能会覆盖
    `limits.conf` 文件中的值。


    确保在这两个文件中添加或编辑了以下行：


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    编辑此文件后，必须重新启动服务器以确保所有更改生效。

