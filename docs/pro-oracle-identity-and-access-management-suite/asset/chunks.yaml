    # Oracle Identity Manager


    就其本身而言，OIM 并不是一个难以安装和配置的产品。当将其与 OID 或其他身份存储配合使用时，配置非常简单明了。但在将 OIM 与诸如 OAM 的 SSO
    产品集成时，可能会遇到一些困惑。此集成涉及多个步骤，并且在不同阶段都可能遇到问题。请花些时间并仔细遵循步骤，您应该能够成功。本节介绍一些常见问题。


    ## 安装与配置的复杂性


    Oracle Identity Management 二进制文件的安装通常是一个顺利的过程。很少出错。如果出现问题，通常是由于前面提到的因素，例如缺少操作系统软件包或
    JDK 版本不正确。话虽如此，OIM 的实际配置可能有点令人困惑。很多时候，屏幕上会滚动显示一整屏的消息，某个步骤看起来似乎已正确完成。然而，某个阶段未解决或遗漏的问题可能会在后续步骤中显现。


    如前所述，与 OID 和 OAM 不同（它们各自有一个 `config.sh` 或 `config.bat` 文件），OIM 实际上需要两个配置文件。对于
    OIM，您必须先运行位于 `<ORACLE_HOME>/common/bin` 目录下的 `config.sh` 文件来创建域。之后，您需要运行 `<ORACLE_HOME>/bin/config.sh`
    来实际配置 OIM。这对于熟悉 OID 或 OAM 环境但首次安装 OIM 的人来说可能会感到困惑。在错误的时间运行不正确的文件将导致无法指示实际问题的错误。


    ## 具体配置步骤


    关于配置工具，安装 OIM 所需的错误版本的面向服务体系结构（SOA）可能导致许多问题。仓库配置实用程序（RCU）所需的版本与实际的 OIM 版本不匹配，这进一步加剧了问题。OIM
    `11.1.2.3x` 需要 SOA `11.1.1.9`。SOA `11.1.1.9` 软件是与 OIM 分开提供的下载项。没有对应的 OIM `11.1.2.3`
    RCU 可用。相反，您将使用 Fusion Middleware 的 `11.1.1.9` 版本。


    使用带有 `–configOIM` 标签的 `idmConfigTool.sh` 配置身份存储时，可能会遇到与 `JMXCLIENTLIB` 变量相关的错误。在
    Oracle 文档中，有一点不太清楚：即使您不安装 OIM Developer Console，也必须创建 `wlfullclient.jar` 文件。如果您正在配置
    OAM 和 OIM 集成，则此文件必须存在。文档中，生成 `wlfullclient.jar` 文件的说明是在关于 Developer Console 的独立章节中给出的。虽然您无需将该文件复制到任何地方，但遗漏此步骤将导致运行
    `idmConfigTool.sh` 文件时出错。


    要解决此问题，请生成 `wlfullclient.jar` 文件。如果您在将 OIM 和 OAM 安装在同一服务器但不同的 WebLogic Server（WLS）实例中，请确保您从
    OIM Home 而不是 OAM Home 运行 `idmConfigTool.sh`。这被称为分离域配置。其次，您可能需要修改您的 `CLASSPATH`
    以指向 `wlfullclient.jar` 的位置，而不是 `JMXCLIENTLIB` 目录。

