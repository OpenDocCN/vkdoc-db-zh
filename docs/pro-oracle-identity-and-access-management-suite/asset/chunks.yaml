    显示了 LDAP 服务器屏幕。


    ![A352855_1_En_10_Fig12_HTML.jpg](A352855_1_En_10_Fig12_HTML.jpg)


    图 10-12. 目录服务器配置


    在之前的步骤中，您已预先配置了此身份存储。在此示例中，您使用的是 OID。


    *   选择 OID 作为 Directory Server Type。

    *   输入 Directory Server ID。这应该是唯一的。

    *   以 `ldap://hostname:ldapport` 的格式输入 LDAP 服务器连接信息。

    *   输入 OIM 用于连接和执行操作的 Server User。这不应是 `cn=orcladmin` 用户。相反，在预配置步骤中，您创建了一个名为 `oimadminuser`
    的用户。使用完整的可分辨名称输入：`cn=oimadminuser,cn=systemids,dc=mycompany,dc=com`。

    *   Server Password 需要是您在预配置步骤中设置的密码。

    *   输入 Server SearchDN 作为包含用户和组容器的总体容器名称。


