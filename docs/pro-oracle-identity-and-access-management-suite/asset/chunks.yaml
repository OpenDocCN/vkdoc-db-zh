  trans: '#### 集群


    在物理或虚拟主机上增加 CPU 和内存将提升`WLS`环境内的性能。这些更改同样会影响部署在`受管服务器`中的应用程序的性能。然而，它们无法降低单个服务器的整体负载。增加服务器或构建集群可以带来更大的性能提升。


    构建`WebLogic`集群环境包括添加一个或多个运行`WLS`的额外主机，并将应用程序部署到`受管服务器`中，或者部署在单个多处理器服务器的多个实例上。不过，性能仍然会受到物理服务器上其他资源的限制。跨多个服务器构建`WebLogic`集群环境的一个额外好处是，通过在物理服务器故障时提供故障转移支持来提高可用性。向`WLS`集群添加一个新的独立主机并对系统进行负载均衡，将会把负载分散到多个主机上。`WebLogic`将处理会话信息和集群成员监控，以确保数据的连续性。一个正确配置的`WebLogic`集群对于客户端应用程序而言，将呈现为一个单一实例。


    集群的负载均衡优势在于，它能将应用程序负载均匀地分布到多个主机上。这要求`受管服务器`部署在集群内的每个节点上。需要注意的是，集群中的每个`WebLogic`实例都管理着自身与数据库及底层服务的连接。此功能进一步提升了整体环境的性能，因为每个节点都处理自己的一组应用程序请求。此外，可以在不影响用户的情况下向环境添加额外的集群成员，从而实现动态可扩展性。


    集群带来的高可用性改进，使得在节点因故障丢失时能够实现故障转移冗余，因为`WebLogic`基础设施处理会话信息和应用程序状态，集群可以提供自动故障转移能力。此外，如果需要，整个`受管服务器`可以迁移到另一个节点。


    总之，确保一个成功的`WebLogic`环境需要考虑系统整体将承受的基本负载。单台服务器必须至少具备`WLS`所需的最低 CPU 和内存要求，同时也必须满足待部署应用程序的要求。通过`WebLogic`集群功能，可以进一步获得性能提升和故障转移能力。这些特性将负载分散到多个主机上，每个主机处理一部分工作，并在一个或多个节点丢失时承担起额外的负载。Oracle
    身份与访问管理套件的所有组件都要求一个`WebLogic`环境。本章后续将讨论有关整体环境的一般性指南和注意事项，以帮助建立一个高性能、高可用的系统。


    ## 企业部署拓扑


    Oracle 身份与访问管理代表了 Oracle 基于最前沿 Oracle 技术构建的全面身份管理套件的最佳实践方案。它在提高用户生产力的同时，也提供了一个高度安全且易于适应的环境。为支持涵盖性能、高可用性和可扩展性在内的广泛企业需求，Oracle
    身份与访问管理利用了融合中间件架构。借助融合中间件，组织可以获得多种选择，从适用于开发环境的单节点，到位于不同地理区域数据中心、用以支持负载和最大灾难恢复能力的多节点集群。本节将讨论
    Oracle 建议的各种拓扑结构，包括每种结构的使用原因及其能为企业带来的益处。


    ### 单节点


    单节点架构描述了一种所有服务都在单个`WebLogic`节点上运行的环境。虽然可能涉及多个物理或虚拟主机，但每台主机运行不同的组件，且不提供故障转移。例如，`OID`可能只在`Host_1`上运行一个实例。`OAM`可能运行在`Host_2`上。然而，在这种情况下，所有认证请求都将通过`Host_2`上的`OAM`进行路由。`OAM`会检查`Host_1`上的`OID`。如果`Host_1`或`Host_2`中任何一台主机宕机，所有操作都将停止。这种拓扑不提供任何冗余。同时，它也不提供负载均衡。如果应用程序负载过重，单台服务器将不得不处理增加的流量。正是由于这两个原因，单节点拓扑通常只适用于开发环境。


    图 2-1 描述了单节点拓扑。应用环境的每一层都由一个主机/单个`WLS`构成，包含两个`受管服务器`。如图 2-1 所示，没有冗余或负载均衡机制。这种配置是最简单的实现方式，很可能在一天之内就能配置完成。虽然这对于小型组织或不预期高负载的组织来说可能是可以接受的，但较大的组织通常需要比此架构提供的更高容错能力和性能水平。


    ![A352855_1_En_2_Fig1_HTML.jpg](img/A352855_1_En_2_Fig1_HTML.jpg)


    图 2-1.

    通用单节点拓扑


    图 2-1 中的图片描述了包含身份与访问管理的单节点配置。应用环境的每一层由单个服务器构成。请求被路由到带有`Access Manager WebGate`的`Oracle
    HTTP 服务器`。`WebGate`确定请求的资源是否需要认证。如果用户尚未认证，请求将被路由到单一的`Access Manager`服务器，认证过程将移交给`LDAP
    服务器`。在企业内部，可以使用`Identity Manager`来维护用户存储库。


    总的来说，单节点拓扑适用于能够容忍停机时间或没有高可用性要求的环境。例如，开发团队可以使用它们来开发需要身份管理的应用程序。开发环境可以选择离线，而不影响普通用户群体。通过进行定期备份并制定良好的恢复计划，如果用户群体较小或不需要
    7x24 小时可用性，较小的组织或许可以通过运行单节点环境来节省一些成本。'
- fmt: '### Local High Availability


    Oracle Fusion Middleware 利用 WLS 的集群功能，使组织能够为冗余和更好的性能实现集群。前面已经讨论过，集群环境提供了可扩展性，因为可以动态地向环境中添加更多节点以应对增加的负载或为未来任务做准备。如果组织预期负载增加或业务增长，可以添加新节点，并且负载均衡可以确保负载均匀分布在集群的所有成员中。


    本地高可用性集群是位于单个数据中心或地理位置内的环境。这提供了冗余和负载均衡能力，是基础的集群环境。然而，单个数据中心的电力故障或灾难将导致服务完全中断，直到环境重新启动或恢复。需要注意的是，环境可以由两个或更多
    WLS 实例组成。一个使用多个 Web 层和一个双节点应用层的典型负载均衡环境如图 [2-2](#A352855_1_En_2_Chapter.html#Fig2)
    所示。


    ![A352855_1_En_2_Fig2_HTML.jpg](A352855_1_En_2_Fig2_HTML.jpg)


    图 2-2。


    通用单站点集群图


    Fusion Middleware 环境中的集群对象也允许实现更高的可用性。集群的节点可以在对用户几乎没有影响的情况下添加或移除。例如，如果管理员注意到某个集群成员出现
    I/O 或内存问题等问题，并且有其他成员可用以承担负载，则可以将该成员离线以解决问题。借助集群提供的冗余，发生故障的服务器进程可以自动故障转移到集群的另一个成员。


    自动服务器迁移在仅运行在一个节点上的应用程序失败时非常有用。在这种情况下，Fusion Middleware 允许将服务器配置为自动或手动迁移。如果 WebLogic
    检测到服务故障，单例服务将自动迁移到另一个节点。这对于诸如 `JMS` 或 `JTA` 事务恢复系统之类的服务特别有价值，这些服务只能在一个服务器上运行。


    本地高可用性集群可针对计划外停机提供改进的性能和冗余，并且它们还可以通过允许以滚动方式应用系统补丁使组织受益。使用集群，组织可以在不关闭整个环境的情况下应用小型补丁。可以通过关闭单个节点或指示负载均衡器将其从可用服务器中移除，然后应用补丁来逐个修补节点。在该节点上的补丁完成后，可以重新启动它并重新加入集群，然后可以继续处理下一个节点，而不会对用户群体产生不利影响。


    这些单站点多节点集群非常适合需要解决性能问题并提供高可用性的组织。环境通过使用负载均衡器将请求分配到多个服务器来处理负载。Fusion Middleware
    架构提供了从 Web 层到应用层的负载均衡以及从应用层到数据库层的负载均衡。这确保了最有能力处理请求的服务器来处理它们。然而，这取决于服务器进程的类型。


    有状态的 Java 应用程序（如 `WebCenter` 或 `ADF`）利用 `WebLogic` 代理插件 `mod_wl_ohs` 来监控服务器状态以及会话状态副本信息的位置。如果集群中的某个节点丢失，`WebLogic`
    代理插件会将请求路由到可用节点，并从副本恢复会话的状态。无状态应用程序依赖负载均衡器将请求路由到集群的可用成员。对于 `C` 语言组件等有状态应用程序，不存在会话状态信息副本。负载均衡器保持会话粘性，如果服务器丢失，将路由到下一个可用节点。但是，由于没有会话信息可用，用户将需要开始一个新的会话。


    本地高可用性集群通过在多个服务器成员之间分散负载，提供了高水平的性能和可靠性。它们还使企业能够应用补丁和小规模升级，而不会对其用户群体产生不利影响。通过 Fusion
    Middleware 架构，从 Web 层到数据层都提供了高可用性和负载均衡。'
  raw: '### Local High Availability


    Oracle Fusion Middleware leverages WLS’s cluster capabilities to allow organizations
    to implement clusters for redundancy and better performance. It was discussed
    earlier that a clustered environment provides scalability in that more nodes can
    be dynamically added to the environment to adjust to increased loads or to plan
    for future tasks. If an organization anticipates a higher load or growth, new
    nodes can be added and load balancing can ensure that the load is spread evenly
    across all members of the cluster.


    A local high availability cluster is an environment located within a single datacenter
    or geographic location. This provides redundancy and load balancing capabilities
    and is the basic clustered environment. However, a power loss or disaster at the
    single datacenter will result in complete loss of service until the environment
    can be restarted or recovered. It should be noted that the environment could consist
    of two or more WLS. A typical load-balanced environment using multiple web tiers
    and a two-node application tier is shown in Figure [2-2](#A352855_1_En_2_Chapter.html#Fig2).


    ![A352855_1_En_2_Fig2_HTML.jpg](A352855_1_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    Generic single-site cluster diagram


    Clustering objects within the Fusion Middleware environment also allows for higher
    availability. Nodes of the cluster can be added or removed with little to no impact
    for the users. For instance, if administrators notice that one cluster member
    is experiencing problems such as I/O or memory issues, that member can be brought
    offline to address the issue as long as there are other members available to take
    up the load. With the redundancy provided by clustering, server processes that
    fail can be automatically failed over to another member of the cluster.


    Automatic server migration can be useful in instances where an application that
    is running on only one node fails. In this case, Fusion Middleware allows the
    server to be configured for automatic or manual migration. If WebLogic detects
    a failure of the service, the singleton service will be automatically migrated
    to another node. This is particularly valuable for services such as the JMS or
    JTA transaction recovery system, which can only run on one server.


    Local high availability clusters provide for improved performance and redundancy
    against unplanned outages, and they can also benefit the organization by allowing
    for the application of system patches in a rolling fashion. Using clusters, organizations
    can apply minor patches without shutting down the entire environment. Nodes can
    be patched one at a time by shutting down a single node or directing the load
    balancer to remove it from the available servers and applying the patch. After
    the patch on that node is completed, it can be started back up and rejoin the
    cluster, and the next node can be completed without adversely affecting the user
    population.


    These single-site multiple node clusters are perfect for organizations that need
    to address performance and provide a high level of availability. The environments
    handle loads by using a load balancer to split requests across multiple servers.
    The Fusion Middleware architecture provides web tier to application tier load
    balancing and application tier to database tier load balancing. This ensures that
    the server that is most able to process requests handles them. However, this is
    dependent on the type of server process.


    Stateful Java applications such as WebCenter or ADF utilize the WebLogic proxy
    plug-in mod_wl_ohs to monitor server status, and the location of the session state
    replica information. In the event that a node is lost from the cluster, the WebLogic
    proxy plug-in will route requests to the available node and recover the session’s
    state from the replica. Stateless applications rely on the load balancer to route
    requests to the available members of the cluster. In the case of stateful applications
    such as C-based components, no session state information replica exists. The load
    balancer preserves session stickiness and in the event of loss of a server, will
    route to the next available node. However, because no session information is available,
    the user will be required to begin a new session.


    Local high availability clusters provide a high level of performance and reliability
    by spreading load across multiple server members. They also afford the enterprise
    the ability to apply patches and minor upgrades without adversely affecting their
    user populations. Through the Fusion Middleware architecture, high availability
    and load balancing are provided from the web tier through the data tiers.'
  trans: '### 本地高可用性


    Oracle Fusion Middleware 利用 WLS 的集群功能，使组织能够为冗余和更好的性能实现集群。正如之前所讨论的，集群环境提供了可扩展性，因为可以动态地向环境中添加更多节点，以应对增加的负载或为未来任务做准备。如果组织预期负载增加或业务增长，可以添加新节点，并且负载均衡可以确保负载均匀分布在集群的所有成员中。


    本地高可用性集群是位于单个数据中心或地理位置内的环境。这提供了冗余和负载均衡能力，是基础的集群环境。然而，单个数据中心的电力故障或灾难将导致服务完全中断，直到环境重新启动或恢复。需要注意的是，环境可以由两个或更多
    WLS 实例组成。一个使用多个 Web 层和一个双节点应用层的典型负载均衡环境如图 2-2 所示。


    ![A352855_1_En_2_Fig2_HTML.jpg](img/A352855_1_En_2_Fig2_HTML.jpg)


    图 2-2。


    通用单站点集群图


    Fusion Middleware 环境中的集群对象也允许实现更高的可用性。集群的节点可以在对用户几乎没有影响的情况下添加或移除。例如，如果管理员注意到某个集群成员出现
    I/O 或内存问题等问题，并且有其他成员可用以承担负载，则可以将该成员离线以解决问题。借助集群提供的冗余，发生故障的服务器进程可以自动故障转移到集群的另一个成员。


    自动服务器迁移在仅运行在一个节点上的应用程序失败时非常有用。在这种情况下，Fusion Middleware 允许将服务器配置为自动或手动迁移。如果 WebLogic
    检测到服务故障，单例服务将自动迁移到另一个节点。这对于诸如 `JMS` 或 `JTA` 事务恢复系统之类的服务特别有价值，这些服务只能在一个服务器上运行。


    本地高可用性集群可针对计划外停机提供改进的性能和冗余，并且它们还可以通过允许以滚动方式应用系统补丁使组织受益。使用集群，组织可以在不关闭整个环境的情况下应用小型补丁。可以通过关闭单个节点或指示负载均衡器将其从可用服务器中移除，然后应用补丁来逐个修补节点。在该节点上的补丁完成后，可以重新启动它并重新加入集群，然后可以继续处理下一个节点，而不会对用户群体产生不利影响。


    这些单站点多节点集群非常适合需要解决性能问题并提供高可用性的组织。环境通过使用负载均衡器将请求分配到多个服务器来处理负载。Fusion Middleware
    架构提供了从 Web 层到应用层的负载均衡以及从应用层到数据库层的负载均衡。这确保了最有能力处理请求的服务器来处理它们。然而，这取决于服务器进程的类型。


    有状态的 Java 应用程序（如 `WebCenter` 或 `ADF`）利用 `WebLogic` 代理插件 `mod_wl_ohs` 来监控服务器状态以及会话状态副本信息的位置。如果集群中的某个节点丢失，`WebLogic`
    代理插件会将请求路由到可用节点，并从副本恢复会话的状态。无状态应用程序依赖负载均衡器将请求路由到集群的可用成员。对于 `C` 语言组件等有状态应用程序，不存在会话状态信息副本。负载均衡器保持会话粘性，如果服务器丢失，将路由到下一个可用节点。但是，由于没有会话信息可用，用户将需要开始一个新的会话。


    本地高可用性集群通过在多个服务器成员之间分散负载，提供了高水平的性能和可靠性。它们还使企业能够应用补丁和小规模升级，而不会对其用户群体产生不利影响。通过 Fusion
    Middleware 架构，从 Web 层到数据层都提供了高可用性和负载均衡。'
- fmt: '### Disaster Recovery and Maximum Availability


    Although local high availability clusters are suitable for many organizations
    and provide a high level of performance and failover capability, some organizations
    require spreading load and providing failover across multiple geographical locations.
    This provides the greatest availability and fastest recovery in the event of loss
    of an entire datacenter. This topology can also be leveraged to provide better
    performance to geographically diverse user populations. This represents the most
    costly option to organizations, as it requires more hardware and multiple datacenter
    sites. It also increases the complexity and management. However, for the benefits
    provided to an organization that requires `99.999` percent uptime and has very
    high capacity and performance requirements, this is the ultimate solution.


    Maximum availability is a requirement for organizations that do business around
    the world. These organizations cannot afford for their systems to go down or for
    security to be a bottleneck to service access. The information technology teams
    within these companies might choose to replicate data to multiple datacenters.
    An active–passive environment allows faster recovery. In case the primary site
    is lost, all traffic could be directed to the backup site during a failover process.
    When the primary datacenter is brought back online, all traffic is redirected
    to it, and replication begins again to ensure the backup site is consistent. Another
    option is to maintain an active–active cluster across datacenters. In this case,
    all traffic is load-balanced across all nodes in all datacenters. If a datacenter
    is lost, the load balancers automatically direct traffic to the remaining servers.


    Clusters allow the added benefit of spreading computing power and tasks across
    multiple nodes. Many large corporations have huge amounts of identity data and
    users around the world. With the use of proxy servers and distributing data across
    multiple geographical locations, organizations can reduce network traffic and
    query times. For instance, locating a datacenter in New York and populating it
    with identity data for the North American region, while in Tokyo another datacenter
    handles identity data for the Asian region localizes data, reducing network latency
    for requests in Asian countries. Because the data source is smaller in each region,
    query times are also reduced. For organizations that might not have a geographically
    dispersed user population, but do have a large amount of data, this same functionality
    can be used to handle subsets of data on multiple servers, thus reducing the query
    time, while replicating the servers across multiple locations improve recovery
    time and reliability. An example of this environment is shown in Figure `2-3`.


    ![A352855_1_En_2_Fig3_HTML.jpg](A352855_1_En_2_Fig3_HTML.jpg)


    Figure `2-3`. Generic multiple datacenter maximum availability architecture


    Figure `2-3` depicts an environment where every level of the application architecture
    is clustered and distributed across multiple geographic locations. This replicates
    the local high availability cluster configuration to one or more geographically
    separate datacenters. Doing so increases fault tolerance and performance. It should
    be noted that Figure `2-3` does not go into detail about distributing data loads.
    These are discussed later in this chapter as they pertain to the Oracle Identity
    and Access Management topologies.


    ### Topology Implementations


    Up to this point this chapter has concentrated on generic terms of the `Fusion
    Middleware` environment and what can be done to increase performance and availability.
    The individual components of Identity and Access Management leverage these topologies
    to provide these benefits to the organizations. The following is a discussion
    of these as they pertain to the components of Identity and Access Management.


    These recommendations are based on the Oracle Enterprise Deployment Guides (`EDGs`).
    `EDGs` represent suggested architectures that were developed by Oracle engineers
    to provide optimal performance and reliability. Although these do not give specific
    hardware or tuning requirements, they do give a general idea of how the environments
    should be installed and configured. These overall guidelines should be followed
    when determining the overall needs of the organization. Using these will also
    allow for a more standard environment, making it easier for new resources to be
    added, easier troubleshooting, and easier for new administrators to locate necessary
    components.'
