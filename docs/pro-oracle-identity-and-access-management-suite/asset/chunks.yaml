    ## 本章小结


    本章介绍了 OID 的安装和初始配置。这为成功的身份管理实现奠定了基础。从这一点开始，您可以开始在 Oracle 的通用 LDAP 目录中管理应用程序用户和属性。应用程序，无论是
    Oracle 的还是第三方的，都可以连接到 OID 作为 LDAP 身份存储来验证用户凭证。数据库也可以使用该身份存储进行身份验证。尽管 OID 为基于身份的系统提供了基本的
    LDAP 身份验证和数据存储，但该环境仅维护对单个应用程序的单一身份验证。Oracle 访问管理器可以提供更好的用户体验，用户只需登录一次即可访问已纳入环境的应用程序。Oracle
    身份管理器将提供用户自助和服务管理服务。这些附加组件依赖于一个稳固的 LDAP 实现，并将在未来的章节中介绍。


    # 5. 目录同步与虚拟化


    Oracle Internet Directory (OID)、Oracle Virtual Directory (OVD) 和目录集成平台 (DIP) 共同为
    Oracle 目录服务提供了整合用户管理和与其他应用程序集成的能力。这些概念已在前面的章节中介绍。本章将介绍使用 DIP 从 Active Directory
    将用户复制到 OID 实例中，为后续与 EBS 以及 Oracle 身份和访问管理器的集成做准备。

    ```'
- fmt: '## The Directory Integration Platform


    The key to synchronizing OID and Active Directory is the `DIP`. The use of Oracle
    `DIP` enables IT departments to replicate Lightweight Directory Access Protocol
    (`LDAP`) information from multiple sources including Active Directory, OpenLDAP,
    and other `LDAP` or database stores into a centralized directory that can be used
    in conjunction with Oracle products and applications.


    Data synchronization is accomplished using profiles that can be created in the
    `DIP` system to map and transform external directory identity information to match
    the requirements of the Oracle systems. These profiles are used when the `DIP`
    executes and queries `LDAP` sources to insert or modify data in `OID`. In the
    following sections, you are presented with a basic profile to synchronize `OID`
    with a single Active Directory instance. `DIP` can support multiple profiles and
    multiple sources. This can be helpful if you are required to synchronize different
    Active Directory organizational units (`OUs`) into different namespaces within
    `OID` or need to synchronize users from varying sources.


    ### Creating a Synchronization Profile


    The Fusion Middleware Control interface will be used to create the `DIP` Profile.
    More detailed information regarding the Fusion Middleware Control interface is
    presented in Chapter [8](#A352855_1_En_8_Chapter.html). Navigating to `http://hostname:port/em`
    opens the Fusion Middleware Control welcome screen shown in Figure [5-1](#A352855_1_En_5_Chapter.html#Fig1).


    ![A352855_1_En_5_Fig1_HTML.jpg](A352855_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.

    Fusion Middleware Control login screen


    The `OID` Fusion Middleware Control can be accessed using a browser and navigating
    to `http://<host>:<port>/em`. The port used should be the WebLogic Admin Server
    port selected during the domain configuration. In this case, it is `7001`. After
    logging in to the Fusion Middleware Control interface, use the menu structure
    located on the left side of the screen to locate the `DIP(11.1.2)` instance located
    under Identity and Access.


    After selecting `DIP(11.1.2)`, you are presented with the current status of the
    server processes as shown in Figure [5-2](#A352855_1_En_5_Chapter.html#Fig2).
    Note that the execution summary is blank because there is not yet a profile to
    be executed. This screen is a quick reference. After profile(s) have been created,
    the summary of each will be displayed in this section.


    ![A352855_1_En_5_Fig2_HTML.jpg](A352855_1_En_5_Fig2_HTML.jpg)


    Figure 5-2.

    Directory Integration Platform home screen


    On the `DIP` home screen, use the `DIP` Server drop-down menu to navigate to Administration
    ➤ Synchronization Profiles. Synchronization profiles are different from provisioning
    profiles. The latter are discussed later in this book when `EBS` integration is
    presented. Figure [5-3](#A352855_1_En_5_Chapter.html#Fig3) depicts the status
    screen and menu options.


    ![A352855_1_En_5_Fig3_HTML.jpg](A352855_1_En_5_Fig3_HTML.jpg)


    Figure 5-3.

    Select Synchronization Profiles


    On the Manage Synchronization Profiles page, shown in Figure [5-4](#A352855_1_En_5_Chapter.html#Fig4),
    all existing profiles are listed. From here, you can create, delete, and edit
    profiles as needed. Enabled profiles are those that are currently being executed
    by the `DIP` scheduler. They each run at the interval configured for them.


    ![A352855_1_En_5_Fig4_HTML.jpg](A352855_1_En_5_Fig4_HTML.jpg)


    Figure 5-4.

    Manage Synchronization Profiles screen


    `OID` with the `DIP` installs with a number of preconfigured profiles to support
    directory sources such as Active Directory, IBM Tivoli, Sun Directory Server,
    and Novell eDirectory, as well as database and `LDIF` sources. These are basic
    templates that include common attribute mappings. The individual needs of the
    organization will dictate how much customization these profiles will require.
    However, they are a good starting point to avoid creating something from scratch.
    Note that directory sources other than the included templates will require a completely
    custom profile.


    Because this is the first profile in the system, select `Create` in the window.
    You will be prompted for information regarding the type of profile and source
    server configuration. Be sure to have the source server information available
    before starting this process. You will need the host, port, and an account with
    at least read access in the directory.


    The first step in creating a synchronization profile is to provide a name and
    connection details regarding the source identity store. The creation screen is
    shown in Figure [5-5](#A352855_1_En_5_Chapter.html#Fig5).


    ![A352855_1_En_5_Fig5_HTML.jpg](A352855_1_En_5_Fig5_HTML.jpg)


    Figure 5-5.

    Connection details'
