    图 4-47. 服务器管理控制台屏幕


    此屏幕提供托管服务器的总体状态，但深入查看每个服务器可以提供一些配置详细信息，包括端口、机器信息、JDK 信息等。有关托管服务器配置的更详细视图，请参见图
    `4-48`。


