    | `-instpass` | This should be set to the same as the OID Adminstrator password.
    |

    | `-provisiontype` | This value can be set to values 1, 2, 3, or 4\. In this case
    set the value to 4 for Bi-Directional – No Creation Provisioning. Other values
    are: 1. Bi-Directional Provisioning: This is the default value. 2. In-Bound Provisioning:
    EBS to OID. 3. Out-Bound Provisioning: OID to EBS. 4. Bi-Directional, No Provisioning
    |


    After completing this step, the EBS middle tier services must be restarted.


    ### Create EBS Connection User


    After registering the EBS home with OAM and registering EBS with OID, it is time
    to create the required local EBS users for connection to OID. The new EBS user
    should be created with the UMS/Apps schema permissions. Once you have created
    this user, use the EBS Local Login to log in and reset the new user’s password.
    Validate that the user can connect to EBS and has the proper role: UMX|Apps Schema
    Connect.


    ## Configure EBS AccessGate


    Because Oracle EBS uses a number of cookies and session information, configuration
    of the EBS AccessGate requires that it be installed within the same domain as
    the middle-tier servers used by EBS itself. In the example, the `.example.com`
    cookie domain was created. Ensure that the AccessGate is installed using the same
    information necessary for your environment.


    ### Create Managed Servers for AccessGate


    During the configuration of OAM, the WebLogic Server (WLS) domain was created
    for OAM. As such, you can use the same WLS and domain for the new AccessGate.
    After logging into the OAM WLS Administration Console, navigate to Environment
    ➤ Clusters, and create a new cluster. Assign the cluster a name appropriate to
    your environment. In this case, the name `ebsAG_cluster` is used. Use the following
    values to configure the cluster parameters.


    *   Messaging mode: Unicast.

    *   Unicast broadcast channel: Leave blank.

    *   Multicast Address: Use the default value.

    *   Multicast Port: Use the default value.


    Once the new cluster has been created, it is time to configure the managed servers.
    Navigate to Environment ➤ Servers. On the list of existing managed servers, click
    New. Populate the fields with the following values:


    *   Server Name: ebsAG_server1

    *   Server Listen Host: <OAM host name>

    *   Server Listen Port: 17043 or other open post

    *   Cluster: Choose the cluster name created in the previous step.


    After creating the managed server, edit the new server and assign it to an existing
    machine.


    Note


    When creating this in a clustered environment, make sure you create two managed
    servers and assign each to the appropriate machine within the cluster.'
  trans: '

    ### 准备 EBS 访问网关文件


    下载 Oracle EBS 访问网关文件（位于补丁 `13704814`）后，将其解压缩到 `$MW_HOME/appsutil/accessgate/{instance}`。例如：


    ```

    mkdir -p $MW_HOME/appsutil/accessgate/ebsAG

    cd $MW_HOME/appsutil/accessgate/ebsAG

    unzip [location to patch 13704814]/p13704814_R12_GENERIC.zip

    ```


    访问网关的 ZIP 文件包含配置 EBS 访问网关所需的文件。这些文件将在后续的配置步骤中被引用。


    *   `fndauth.war`：这是 Oracle EBS 访问网关应用程序，将在下一步创建的受管服务器中部署。

    *   `fndext.jar`：此文件包含启用应用程序服务器与 EBS 数据库之间通信所需的 Java 库。

    *   `txkEBSAuth.xml`：这是一个 ANT 脚本，用于帮助自动化部署 Oracle 访问网关。

    *   `fndauth_deployment_plan.tmp`：这是部署自动化工具中使用的模板文件。

    *   `LogConfig.properties`：此文件可作为设置日志记录的示例。

    *   `samplecleanup.html`：这是一个示例 HTML 文件，用于在 EBS 注销后清理会话信息。


    ### 创建 EBS 访问网关安装目录


    Oracle EBS 访问网关必须安装在 Middleware Home 目录内。在命令行中，于 `$MW_HOME/appsutil/accessgate/ebsAG`
    为访问网关创建一个目录。如果您为访问网关使用了不同的实例名称，请将 `ebsAG` 替换为该名称。接下来，将访问网关文件复制到新的实例目录。本例中的 `MW_HOME`
    目录是安装了 OAM 的中间件安装目录。


    ### 准备 EBS 和 OID


    在开始集成过程之前，您应确保 EBS 和 Oracle 身份与访问管理环境都已应用必要的补丁和更新。请咨询 Oracle 支持以规划和实施所需的兼容性更新。


    #### 将 EBS 主目录注册到 OAM


    将 EBS 与 OAM 集成的第一步是将 EBS 主目录注册到 OAM。这必须在尝试集成 OID 之前完成。每个 EBS 部署只需注册实例一次。即使在 EBS
    的多节点实例中也是如此。


    **注意**


    在尝试与 OID 集成之前，您必须先将 EBS 主目录注册到 OAM。


    首先，运行位于 `EBS FND_HOME` 目录中的 `txkrun.pl` 脚本。


    ```

    $FND_TOP/bin/txkrun.pl -script=SetSSOReg -registerinstance=yes -infradbhost=10.0.70.221
    -ldapport=3060 -ldapportssl=3131 -ldaphost=10.0.70.229 -oidadminuserpass=*****
    -appspass=*****

    ```


    在此命令中，按照表 15-1 所述设置参数。


    **表 15-1. SSO 注册参数**


    | 参数 | 描述 |

    | --- | --- |

    | `-script` | `SetSSOReg` 设置 `txkrun.pl` 脚本以运行 EBS 实例与 OID 的注册过程。 |

    | `-registerinstance` | 将此值设置为 yes 以确保注册 EBS 实例。 |

    | `-infradbhost` | 此参数应设置为 OID 数据库主机名。请注意，这与 EBS 数据库不同。 |

    | `-ldapport` | 将此值设置为非安全套接字层（SSL）轻量目录访问协议（LDAP）端口。 |

    | `-ldapportssl` | 将此值设置为 OID 的 SSL LDAP 端口。 |

    | `-ldaphost` | 将此值设置为运行 OID 的服务器的主机名。 |

    | `-oidadminuserpass` | 在此处输入 orcladmin 密码。 |

    | `-appspass` | 输入 EBS apps 数据库管理员（DBA）密码。 |


    #### 将 EBS 注册到 OID


    成功完成将 EBS 实例注册到 OAM 后，您可以继续将 EBS 和 OAM 注册。为此，您将运行与上一步相同的 `txkrun.pl`。


    ```

    $FND_TOP/bin/txkrun.pl -script=SetSSOReg -registeroid=yes -ldaphost=10.0.70.229
    -ldapport=3060 -oidadminuserpass=***** -appspass=***** -instpass=***** -provisiontype=4

    ```


    表 15-2 显示了此脚本设置的参数。


    **表 15-2. OAM 注册参数**


    | 参数 | 描述 |

    | --- | --- |

    | `-script` | `SetSSOReg` 设置 `txkrun.pl` 脚本以运行 EBS 实例与 OID 的注册过程。 |

    | `-registeroid` | 将此标志设置为 yes 以将 EBS 注册到 OID。 |

    | `-ldaphost` | 将此值设置为 OID 主机名。如果您使用负载均衡器，则应设置为实际主机名，而不是 VIP。 |

    | `-ldapport` | 将此值设置为 OID 实例使用的 LDAP 端口。 |

    | `-oidadminuserpass` | 此值应设置为 orcladmin 密码或其他管理员密码。 |

    | `-appspass` | 将此值设置为 Apps DBA 密码。 |

    | `-instpass` | 此值应设置为与 OID 管理员密码相同。 |

    | `-provisiontype` | 此值可设置为 1、2、3 或 4。本例中设置为 4 表示双向——无创建配置。其他值为：1. 双向配置：此为默认值。
    2. 入站配置：EBS 到 OID。 3. 出站配置：OID 到 EBS。 4. 双向，无配置 |


    完成此步骤后，必须重新启动 EBS 中间层服务。


    #### 创建 EBS 连接用户


    将 EBS 主目录注册到 OAM 并将 EBS 注册到 OID 后，就可以为连接到 OID 创建所需的本地 EBS 用户。新 EBS 用户应使用 UMS/Apps
    模式权限创建。创建此用户后，使用 EBS 本地登录名登录并重置新用户的密码。验证该用户是否可以连接到 EBS 并拥有正确的角色：UMX|Apps Schema
    Connect。


    ### 配置 EBS 访问网关


    由于 Oracle EBS 使用了许多 Cookie 和会话信息，因此 EBS 访问网关的配置要求它安装在 EBS 本身使用的中间层服务器所在的同一域中。在示例中，创建了
    `.example.com` Cookie 域。确保访问网关的安装使用了适用于您环境的相同信息。


    #### 为访问网关创建受管服务器


    在配置 OAM 期间，已为 OAM 创建了 WebLogic 服务器（WLS）域。因此，您可以将同一个 WLS 和域用于新的访问网关。登录 OAM WLS
    管理控制台后，导航到 “环境” ➤ “集群”，并创建一个新集群。为集群分配一个适合您环境的名称。本例中使用名称 `ebsAG_cluster`。使用以下值配置集群参数。


    *   消息传递模式：单播。

    *   单播广播通道：留空。

    *   多播地址：使用默认值。

    *   多播端口：使用默认值。


    创建新集群后，就该配置受管服务器了。导航到 “环境” ➤ “服务器”。在现有受管服务器列表中，单击 “新建”。用以下值填充字段：


    *   服务器名称：`ebsAG_server1`

    *   服务器侦听主机：`<OAM 主机名>`

    *   服务器侦听端口：`17043` 或其他开放端口

    *   集群：选择上一步创建的集群名称。


    创建受管服务器后，编辑新服务器并将其分配给现有计算机。


    **注意**


    在集群环境中创建此配置时，请确保创建两个受管服务器，并将每个服务器分配给集群内的相应计算机。'
- fmt: '### Copy Artifact Files


    Earlier in this chapter, you downloaded the AccessGate files and created the installation
    directory. You were presented with the files that are included in the downloaded
    zip file. Here, you will copy the files into the proper locations within the installation
    directory created.


    First, copy `samplecleanup.html` from the `$MW_HOME/appsutil/accessgate/ebsAG/sample`
    directory to the `/public` directory created within the htdocs location within
    the OHS installation. Rename the file `oacleanup.html` as follows:


    ```

    cp $MW_HOME/appsutil/accessgate/ebsAG/sample/samplecleanup.html /instances/instance1/config/OHS/ohs1/htdocs/public/oacleanup.html

    ```


    After the file has been copied to the proper directory, access it using a web
    browser. Navigate to [`http://10.0.70.229:7777/public/oacleanup.html`](http://10.0.70.229:7777/public/oacleanup.html).


    Because this page is not an OAM protected resource, you should be able to access
    it without being prompted for login information. However, this page will appear
    empty. This URL is used in the upcoming steps where you will deploy the actual
    WebGate and configure a centralized logout page.


    Next you will copy the `fndext.jar` file to the OAM `lib` directory. Perform the
    following commands to complete this.


    ```

    cp $MW_HOME/appsutil/accessgate/ebsAG/fndext.jar $MW_HOME/user_projects/domains/OAMDomain/lib

    ```


    Restart the OAM managed servers and Administration Server to pick up the new `fndext.jar`
    file you copied to the `lib` directory.


    ### Generate DBC File in EBS


    EBS uses a Database Connection (DBC) file to create a connection pool for the
    AccessGate to use for connecting to EBS. In this section, you use the EBS AdminDesktop
    utility to generate the required DBC file .


    Set up the environment variables and ensure that `JAVA_HOME` is set to the OAM
    instance JAVA directory. Use the following command to generate the DBC file for
    your instance.


    ```

    java oracle.apps.fnd.security.AdminDesktop apps/ CREATE NODE_NAME=10.0.70.229
    DBC=$FND_SECURE/ebsAG.dbc

    ```


    In the preceding command, the `NODE_NAME` is the host of the OAM instance. For
    easier reference in environments with multiple EBS AccessGates, name the DBC file
    something related to the AccessGate and EBS instance. Copy the generated file
    to the OAM server under the directory where EBS AccessGate was installed, in this
    case `<MW_HOME>/appsutil/accessgate/ebsAG`.


    ### Add EBS AccessGate Host to List of External Tables


    During the deployment of the EBS AccessGate, a Java database connectivity (JDBC)
    connection was defined. By default, the EBS database does not allow communication
    from an external machine. To allow this, the WLS hosting the OAM AccessGate must
    be registered within the EBS database as a trusted machine. To do this, you will
    use the EBS Java Development Kit (JDK).


    For security purposes, Oracle recommends Internet Protocol (IP) address restriction
    to prevent unauthorized access. By adding the EBS AccessGate hostname to the EBS
    profile, you can set up the proper restrictions. Set the `FND_SERVER_DESKTOP_USER`
    profile at the User level to the list of hostnames that contain the AccessGate.
    It should be noted that this value can accept a comma-separated list of external
    machines. Failure to perform this step could lead to invalid username/password
    errors when users attempt to authenticate.


    ### Use txkEBSAuth.xml to Deploy AccessGate


    You have configured the necessary components to set up the AccessGate. As part
    of those steps, you staged the software, registered the AccessGate host, configured
    an AccessGate cluster and managed servers, and set up the Middleware Home directory
    structure. It is now time to deploy the AccessGate application using the WLST
    utility.


    Before starting, it is important to ensure the environment variables are set correctly.
    Failure to do this can cause configuration issues. You can run `setDomainEnv.sh`
    located in the `$DOMAIN_HOME/bin` directory to perform this step:


    ```

    . ./setDomainEnv.sh

    ```


    You can also set the environment variables manually:


    ```

    export MW_HOME=/home/oracle/OAMMiddleware

    export DOMAIN_HOME=$MW_HOME/user_projects/domains/oam_domain

    ```


    Next set up the WLST environment using `setWLSEnv.sh` located in the WLS home
    directory.


    ```

    . $MW_HOME/wlserver_10.3/server/bin/setWLSEnv.sh

    ```


    Change to the directory where you installed Oracle EBS AccessGate in the previous
    step; for example:


    ```

    cd $MW_HOME/appsutil/accessgate/ebsAG

    ```


    Deploying the EBS AccessGate requires that you create a data source for the managed
    server to use. Performing this step utilizes ANT and the `txkEBSAuth.xml` template
    discussed earlier. This file is located in the AccessGate installation directory.
    When running the following command, it should be noted that it could take a significant
    amount of time to complete. Let the process run without interruption. At the end,
    you will see a completion message.


    ```

    ant -f txkEBSAuth.xml createDataSource \

    -Dwlshosturl=10.0.70.229:17001 \

    -DdataSourceName=EBS_DS \

    -DdataSourceJNDIName=jndi/EBS_DS \

    -DasadminUser=OAM_EBS_USER \

    -DdbcFile=$MW_HOME/appsutil/accessgate/ebsAG/ebsAG.dbc \

    -DserverName=ebsAG_server1 \

    -DdeploymentName=ebsauth_dev \

    -DfndauthWarFile=$MW_HOME/appsutil/accessgate/ebsAG/fndauth.war \

    -DplanPath=$MW_HOME/appsutil/accessgate/ebsAG/plan/Plan.xml \

    -DSSOServerRelease=11 \

    -DSSOServerURL=http://10.0.70.229:14100 \

    -DWebgateLogoutURL=http://10.0.70.229:7777/public/oacleanup.html

    Build Successful: 38 minutes, 29 seconds

    ```


    The command will be saved within the instance home. The full path and filename
    are:


    ```

    $MW_HOME/appsutil/accessgate/EBS_DB/createDS.sh.

    ```


    Once the data source has been created, you will use the WLS Administration Console
    to target the data source to the proper managed servers within the environment.
    Use a browser to navigate to the OAM WebLogic Admin Console. Go to [`http://10.0.70.229:17001/console`](http://10.0.70.229:17001/console),
    and log in using the `weblogic` user.


    Once in the WebLogic Admin Console, navigate to Services ➤ Data Sources. Select
    the new data source called `EBS_DS`. Click the Targets tab and select the new
    `ebsAG` managed server created previously. Once done, click Save to finalize the
    configuration. No restarts should be necessary at this step.


    After ensuring the data source has been configured and targeted to the proper
    managed server, you can deploy the AccessGate application on WLS. Again, you will
    use ANT to perform this step; for example:


    ```

    ant -f txkEBSAuth.xml deployApplication \

    -Dwlshosturl=10.0.70.229:17001 \

    -DdataSourceName=EBS_DS \

    -DdataSourceJNDIName=jndi/EBS_DS \

    -DasadminUser=OAM_EBS_USER \

    -DdbcFile=$MW_HOME/appsutil/accessgate/ebsAG/ebsAG.dbc \

    -DserverName=ebsag_server1 \

    -DdeploymentName=ebsauth_dev \

    -DfndauthWarFile=$MW_HOME/appsutil/accessgate/ebsAG/fndauth.war \

    -DplanPath=$MW_HOME/appsutil/accessgate/ebsAG/plan/Plan.xml \

    -DSSOServerRelease=11 \

    -DSSOServerURL=http://10.0.70.229:14100 \

    -DWebgateLogoutURL=http://10.0.70.229:7777/public/oacleanup.html

    ```'
