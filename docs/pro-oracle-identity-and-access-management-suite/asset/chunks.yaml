    Other issues that might be encountered during installation or even later in the
    process during configuration or runtime are related to the OS environment and
    configuration. The following information will provide an overview of setting up
    the environment for success.


    The following kernel parameters need to be set:

    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    To set these parameters, edit the `sysctl.conf` file located in the `/etc` directory.

    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    Add or edit the following lines in this section of the file:

    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    After setting these values in the `sysctl.conf` file, you must activate and verify
    the new values are shown using this command:

    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    The open file limits must be set to 4096 to support the instance. To do so, edit
    the `limits.conf` file.

    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    If the environment is to be installed on Oracle Linux or RedHat Linux, you must
    perform the edit in `/etc/security/limits.d/90-nproc.conf` as well. If this is
    missed, the values in this file might override the values in the `limits.conf`
    file.


    In both of these files, ensure the following lines are added or edited:

    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    After editing this file, the server must be rebooted to ensure all the changes
    take effect.


    Most installation issues can be resolved or prevented by ensuring the aforementioned
    prerequisites are met prior to starting the installer.


    ## Common Configuration Issues


    Because there are three main components of the Oracle Identity and Access Management
    Suite—Oracle Internet Directory (OID), Oracle Access Manager (OAM), and Oracle
    Identity Manager (OIM)—this section covers related issues separately.


    ### Oracle Internet Directory


    As the back-end directory for OIM and OAM, if the OID environment is not configured
    properly, the rest of the stack is guaranteed to have problems. Although the configuration
    wizard performs most of the work during this stage, there can still be issues.
    The OS packages listed in Table [16-1](#A352855_1_En_16_Chapter.html#Tab1) will
    suffice for an OID installation, as will the previously mentioned kernel parameters.
    Just as OAM and OIM have Java version ranges, OID versions are quite sensitive
    to Java Development Kit (JDK) versions and updates. For OID 11.1.1.9, ensure that
    you are using JDK 1.7 update 80. OID can be installed in an environment higher
    than update 80, but careful verification of the compatibility will be required.
    Most commonly, the installation will appear to run correctly. However, during
    the configuration stage, you might run into issues while the deployment of the
    domain is running.


    Many organizations use an Active Directory environment as their network Lightweight
    Directory Access Protocol (LDAP). It is common practice to set up a Directory
    Integration Platform (DIP) to keep the OID environment in sync with Active Directory.
    Sometimes this synchronization will require users that meet certain criteria to
    be added to one OID subtree, whereas others will be put into another tree. Other
    environments might only want to synchronize a subset of Active Directory users
    that meet a complex set of rules. The OID 11.1.1.9 Directory supports multiple
    sets of synchronization profiles and each can have its own set of filtering rules.
    However, you could run into issues with complex rules. Many times this will only
    be apparent because users are not synchronizing, and when trying to load the DIP
    profile in the EM console, the console will hang. You will notice a spike in memory
    on the server at this time as well. In a case where a rule such as `searchfilter=(&(objectclass=user)(|(company=
    BB*))(!(objectclass=computer))` is needed, add double quotes around the search
    filter so it will be in the following format: `searchfilter="(&(objectclass=user)(|(company=
    BB*))(!(objectclass=computer)"`.


    ### Oracle Access Manager


    OAM handles the single sign-on (SSO) functionality for the Identity and Access
    Management environment. During configuration, a few issues can arise. This section
    covers a few common issues and resolutions.


    **Note:** Prior to making any changes to the OAM configuration, you might find
    it useful to make a backup copy of the `DOMAIN_HOME/config/fmwconfig/oam_config.xml`
    file.


    Changing identity stores can be a little tricky within the Access Manager console.
    However, you might be changing out your identity store, or migrating it to a new
    environment. In these cases, if you follow a couple guidelines, this activity
    can be carried out with little hassle. First ensure that you create a user or
    users within the new LDAP store that you plan to manage with the Access Manager
    administration. Ideally you will keep a user called oamadmin and a group of users
    in the Administrators group. In Figure [16-1](#A352855_1_En_16_Chapter.html#Fig1),
    the OAM Administration Console is shown with multiple identity stores. Each of
    these contains at least one user configured as an administrator. Creating a new
    identity store and setting it up as the System Store will spawn a new section
    to this page where you will be able to select the users and groups to administer
    the instance, as shown in Figure [16-2](#A352855_1_En_16_Chapter.html#Fig2).


    ![A352855_1_En_16_Fig2_HTML.jpg](A352855_1_En_16_Fig2_HTML.jpg)


    Figure 16-2. OAM identity store selection


    ![A352855_1_En_16_Fig1_HTML.jpg](A352855_1_En_16_Fig1_HTML.jpg)


    Figure 16-1. OAM administration User Identity Stores screen


    After performing these tasks, it is important to ensure that the LDAP Authentication
    module or other Authentication module in use is configured to use the new identity
    store. Failure to perform this step could prevent you from accessing the OAM Console
    in the future. Check Figure [16-3](#A352855_1_En_16_Chapter.html#Fig3) for this
    screen example.


    ![A352855_1_En_16_Fig3_HTML.jpg](A352855_1_En_16_Fig3_HTML.jpg)


    Figure 16-3. OAM Authentication module configuration


    Even with all the preparation in the world it is possible that something could
    go wrong with this process. If this happens and you are completely unable to access
    the OAM Administration Console after making changes, there is one last hope. Within
    the `DOMAIN_HOME/config/fmwconfig` directory, you will find a file called `oam-config.xml`.
    Shut down OAM and edit this file to change the identity store location or other
    properties. Restart the OAM managed server, and things should be back to normal.


