  trans: '# Oracle 身份管理与身份存储


    许多组织拥有多个身份存储，以支持不同的业务单元和流程。这些身份存储可能以`轻量目录访问协议 (LDAP)`兼容的目录、数据库表或其他格式存在。在许多情况下，`Oracle
    身份管理器 (OIM)` 可以借助`Oracle 虚拟目录 (OVD)` 来管理这些不同的目录格式。尽管本书主要关注使用`Oracle 互联网目录 (OID)`作为主要身份存储并通过
    LDAP 同步，但在环境需要时，考虑将此配置作为一种可能的解决方案是很重要的。您可能还会发现，配置 LDAP 同步从一开始就使用`OVD`，并为多数据存储环境做好准备，是很有用的。


    大多数大型公司都在各种用户身份存储上有投入。他们可能使用`Microsoft Active Directory`作为其网络 LDAP 用户账户，同时使用其他用户目录服务于各种应用程序。`OID`或`Oracle
    统一目录 (OUD)`可能已就位，为诸如`Oracle 电子商务套件`或`OBIEE`等应用程序提供支持。其他业务单元可能采用基于文件或`OpenLDAP`的身份存储来支持其他应用程序，例如内部开发的定制工具。这往往导致的结果是，单个用户拥有许多账户和密码。这不仅对用户是个问题，而且从安全角度来看，这可能导致无人知晓的孤立账户，甚至是恶意账户。


    ## 用例


    `OIM`提供了解决方案来帮助防止这些情况的发生。任何 LDAP 兼容的应用程序都可以通过标准 LDAP 认证调用使用`IOD`，并且许多第三方应用程序能够利用`Oracle
    访问管理器 (OAM)`所使用的`安全断言标记语言 (SAML)`断言协议。这仅涵盖了企业工具的认证和授权方面。管理这些多个身份存储可能具有挑战性，因为大多数存储都有专有的管理工具，无法管理其他品牌或类型的目录。


    过去，`OID`提供了与其他 LDAP 目录（如`Active Directory`、`ODSEE`、`OpenLDAP`等）同步的能力。虽然这是一个有用的工具，可为用户提供来自多个存储的应用程序访问，但它并未解决用户账户的管理问题。


    `OVD`通过将多个不同的目录呈现为单一来源，提高了身份存储管理的整合级别。这不仅对于为所有现有应用程序提供单一 LDAP 接口非常有用，而且可以通过充当`OIM`处理账户治理的单一来源来发挥作用。


    如前所述，`OIM`是一种身份治理工具。因此，它提供了管理用户从入职、新权限授予到离职的全生命周期支持的能力。`OVD`和`OIM`组合最常见的用途之一可能是将`OID`用户和`Microsoft
    Active Directory`用户合并到单一来源进行管理。当正确呈现给`OIM`时，这两个来源都可以被管理，确保无论用户账户如何创建，其处理方式都是一致的。


    ## 拓扑结构


    使用`OVD`向`OIM`环境呈现身份存储时，主要的两种部署类型是`分割配置文件`和`不同的用户群体`。当用户账户信息存储在一个位置，而相应的应用程序用户信息存储在其他位置时，分割配置文件可能很有用。在这种情况下，网络身份目录可能是`Active
    Directory`，而特定于应用程序的账户信息可能存在于`OID`或`OUD`中，甚至存在于另一个 LDAP 目录中。另一种部署拓扑涉及拥有多组不同的用户和组群体。这在外部用户存储在应用程序身份存储中而内部员工用户在`Active
    Directory`中管理的环境中很常见。在这种常见配置中，这两组用户必须通过单一界面进行管理。


    ### 分割配置文件


    如果公司拥有单一用户群体，但身份数据分散在多个身份存储中，他们可能会选择实施分割配置文件配置。如果员工用户账户存储在网络 LDAP 目录中，并且一个或多个应用程序使用自己的存储进行账户访问，就可能出现这种情况。例如，`Active
    Directory`用于网络资源访问，而`OID`用于访问`Oracle 电子商务套件 (EBS)`。虽然扩展`Active Directory`模式以包含`EBS`数据是可能的，但这并非对所有组织都是最佳方法。`OID`被视为包含必要属性的次要或影子身份存储。`OVD`仅仅服务于整合用户属性以供`OIM`处理。然而，在这种情况下，来自`Active
    Directory`和`OID`的用户群体是相同的。


    在分割配置文件环境中，每个用户存储库承担着不同的角色。`Active Directory`或另一个企业目录负责存储企业用户账户和组，而`OID`管理应用程序用户账户和组。在这种情况下，`OID`被认为是一个“影子”存储库。应用程序角色和成员资格由`OID`处理并由`OIM`管理。`Active
    Directory`处理企业级或网络用户。应该注意的是，在这种配置中，`OIM`可用于管理应用程序级别的安全，但它将无法管理企业级别的账户。


    在考虑为您的环境实施分割配置文件时，应满足以下先决条件。


    *   `OID`应配置为`Oracle 融合中间件`产品和应用程序的身份存储。换句话说，访问应用程序所需的用户、组和权限必须存储在`OID`存储中。这将成为影子目录。

    *   `OID`应关闭“参照完整性”。这将确保在`OID`中创建的组可以包含不在同一目录中的成员。组中包含的用户可能是企业身份存储的一部分。

    *   登录名和账户在所有身份存储中必须是唯一的，无论存储数量多少。

    *   `Active Directory`或企业身份存储应包含用户信息，但不包含应用程序属性。


    图 12-1 展示了企业存储库和应用程序身份存储如何组合，为身份管理套件提供用户和组权限的单一视图。这种组合提供了来自企业目录的认证凭据和来自应用程序目录的授权上下文。


    ![A352855_1_En_12_Fig1_HTML.jpg](img/A352855_1_En_12_Fig1_HTML.jpg)


    图 12-1.

    分割域目录结构'
- fmt: '### Distinct User and Group Populations


    A growing number of organizations have resources available to the public as well
    as private content available only to employees. In this situation, it is not always
    possible to include all users, external and internal, in the company network `LDAP`
    directory. Most enterprise deployments dictate that these two sets of users are
    stored separately and not in a system that provides network access. Although other
    `LDAP` directories could be involved, one example has `OID` containing all external
    users, and internal users are created and maintained in `Active Directory`. This
    is a very common architecture, but the application security might still require
    that all users are stored together in a general-use directory that allows for
    storage of application-level attributes.


    `OIM` provides a couple different solutions for this architecture. The use of
    `OVD` allows multiple user identity stores to appear and be managed as a single
    store for applications and services and the Directory Integration Platform (`DIP`)
    allows the synchronization of multiple `LDAP` repositories into a single `OID`
    instance.


    When deciding to implement multiple directories within a distinct user population
    within an `OIM` environment, a couple considerations should be kept in mind. First,
    user populations exist in multiple directories, meaning the environment might
    have a set of external users stored in `OID` and enterprise users stored within
    `Active Directory`.


    ## Identity Stores and Oracle Access Manager


    `OAM` requires an identity store to process authentication requests. An `LDAP`-compliant
    ID store should be used for this requirement. Although `OAM` can be configured
    to use a variety of different directories, including `Active Directory` and the
    `WebLogic` built-in `LDAP`, it is suggested that you use `OID`, `OVD`, or `OUD`.
    This will ensure maximum compatibility across the applications most often used
    within an Oracle single sign-on (`SSO`) environment.


    When configuring `OAM`, you should first configure the security realm within the
    `WebLogic Admin Console`. Performing this step will ensure that you are able to
    use any user login specified as an administrator to log in to the `WebLogic Administration
    Console` as well as the `OAM Administration Console` later. This is especially
    helpful in preventing shared administrative accounts as well as lost or forgotten
    `WebLogic` user passwords.


    Steps for setting up the `OID` as an identity provider within the `WebLogic` security
    realm for `OAM` were presented in Chapter 9. There, you were instructed on how
    to create a single data store within `OAM`. It should be noted that `Access Manager`
    supports multiple identity stores. Keep in mind that only one store can be used
    as the default store or the system store.


    **Note**

    When setting the `System Store`, you must specify users and or groups to grant
    administration privileges. When you apply the changes, you will be prompted to
    enter a username and password of a user that is within the groups. You must also
    set the `LDAP Authentication Module` to use the `Default Store`. Failure to do
    so could lock the administration users out of the `Admin Console`.


    Within the `OAM` Identity Store configuration, the `Default Store` is used as
    the search location for user information during authentication requests. It is
    also leveraged for `Identity Federation` and the `Security Token Service`. When
    configuring `OAM Federated Partner Applications`, the Identity Store can be specified.
    If multiple stores are configured in `OAM`, the administrator can choose the appropriate
    store. This could be useful if a partner application is in use by only a small
    group within the enterprise and it uses its own `LDAP` repository. If no Identity
    Store is specified during this configuration, `OAM` will use `Default Store` for
    authentication.


    The `System Store` is leveraged when a user attempts to log in to the administration
    tools. This store must contain all users that are designated as administrators.
    When setting this up, you should specify the same `LDAP` store that was used as
    the identity provider within the `OAM WebLogic Security Realm`. Doing this will
    ensure that the administration users are able to log in with their proper permissions
    and that administration groups and roles are properly leveraged. Figure 12-2 shows
    the ability to set both `System` and `Default` identity stores.


    ![A352855_1_En_12_Fig2_HTML.jpg](A352855_1_En_12_Fig2_HTML.jpg)

    Figure 12-2. Default and System identity stores


    **Note**

    If you mistakenly set the `System Store` or `Default Store` and lock the administration
    users out of the `Administration Console`, you can undo the change using `wlst`:


    ```bash

    Run $ORACLE_HOME/common/bin/wlst.sh

    ```


    ```python

    wls:/offline> connect("t3://:", "weblogic", "")

    wls:/base_domain/serverConfig> displayUserIdentityStore(''UserIdentityStore1'')

    wls:/base_domain/serverConfig> editUserIdentityStore(name="UserIdentityStore1",isPrimary="true",isSystem="true")

    ```


    When `OAM` is integrated with `OIM`, it should be noted that a shared identity
    store will be created within `OAM`. This will coincide with the `LDAP` repository
    that was configured to synchronize with `OIM`. In many cases, this will be the
    proper identity store to be used for an `Access Manager` environment. However,
    in some environments, it might be desirable to use different stores for different
    federation applications or authentication modules. Figure 12-3 displays an example
    of an `OAM` environment in which there are multiple available identity stores.
    You will note that there is the `Embedded_LDAP`, which is configured as the same
    store information used in the `WebLogic` security realm. The `OID Identity Store`
    shown is an overall `OID` configuration. In this example, the `Base DN` is configured
    as the top-level container of the `OID` directory. As mentioned previously, the
    `OIMIDStore` was created during the integration of `OIM` and `OAM`. In many cases,
    this might be the entire `LDAP` store or a subset of users.


    ![A352855_1_En_12_Fig3_HTML.jpg](A352855_1_En_12_Fig3_HTML.jpg)

    Figure 12-3. Oracle Access Manager identity stores


    ## Summary


    The `OIM` and `OAM` suite of applications can be configured to use various combinations
    of identity stores. Although the environment could be configured using `OVD` to
    present a single interface for managing multiple disparate stores, using directory
    synchronization profiles can leverage simpler configurations. Furthermore, the
    existence of multiple stores can be used to provide authentication services depending
    on the applications integrated into the `SSO` environment. This chapter served
    as a description of some of the possibilities.


    # 13. Identity Manager Policy Administration


    Oracle Identity Manager (`OIM`) serves a large number of functions for managing
    an organization’s identity data. By providing a wide variety of tools to assist
    administrators, managers, help desk staff, and end users in maintaining a consistent
    and auditable identity, `OIM` has become a key tool within the enterprise. `OIM`
    policies such as password policies, access policies, and approval policies can
    assist organizations as they push toward increasing efficiency while maintaining
    tight security. Using the `OIM` policies, the system can be configured to allow
    many combinations of user privileges, including the ability to self-register,
    request new permissions, manage other users, and grant new privileges.'
  raw: '### Distinct User and Group Populations


    A growing number of organizations have resources available to the public as well
    as private content available only to employees. In this situation, it is not always
    possible to include all users, external and internal, in the company network LDAP
    directory. Most enterprise deployments dictate that these two sets of users are
    stored separately and not in a system that provides network access. Although other
    LDAP directories could be involved, one example has OID containing all external
    users, and internal users are created and maintained in Active Directory. This
    is a very common architecture, but the application security might still require
    that all users are stored together in a general-use directory that allows for
    storage of application-level attributes.


    OIM provides a couple different solutions for this architecture. The use of OVD
    allows multiple user identity stores to appear and be managed as a single store
    for applications and services and the Directory Integration Platform (DIP) allows
    the synchronization of multiple LDAP repositories into a single OID instance.


    When deciding to implement multiple directories within a distinct user population
    within an OIM environment, a couple considerations should be kept in mind. First,
    user populations exist in multiple directories, meaning the environment might
    have a set of external users stored in OID and enterprise users stored within
    Active Directory.


    ## Identity Stores and Oracle Access Manager


    OAM requires an identity store to process authentication requests. An LDAP-compliant
    ID store should be used for this requirement. Although OAM can be configured to
    use a variety of different directories, including Active Directory and the WebLogic
    built-in LDAP, it is suggested that you use OID, OVD, or OUD. This will ensure
    maximum compatibility across the applications most often used within an Oracle
    single sign-on (SSO) environment.


    When configuring OAM, you should first configure the security realm within the
    WebLogic Admin Console. Performing this step will ensure that you are able to
    use any user login specified as an administrator to log in to the WebLogic Administration
    Console as well as the OAM Administration Console later. This is especially helpful
    in preventing shared administrative accounts as well as lost or forgotten WebLogic
    user passwords.


    Steps for setting up the OID as an identity provider within the WebLogic security
    realm for OAM were presented in Chapter [9](#A352855_1_En_9_Chapter.html). There,
    you were instructed on how to create a single data store within OAM. It should
    be noted that Access Manager supports multiple identity stores. Keep in mind that
    only one store can be used as the default store or the system store.


    Note


    When setting the System Store, you must specify users and or groups to grant administration
    privileges. When you apply the changes, you will be prompted to enter a username
    and password of a user that is within the groups. You must also set the LDAP Authentication
    Module to use the Default Store. Failure to do so could lock the administration
    users out of the Admin Console.


    Within the OAM Identity Store configuration, the Default Store is used as the
    search location for user information during authentication requests. It is also
    leveraged for Identity Federation and the Security Token Service. When configuring
    OAM Federated Partner Applications, the Identity Store can be specified. If multiple
    stores are configured in OAM, the administrator can choose the appropriate store.
    This could be useful if a partner application is in use by only a small group
    within the enterprise and it uses its own LDAP repository. If no Identity Store
    is specified during this configuration, OAM will use Default Store for authentication.


    The System Store is leveraged when a user attempts to log in to the administration
    tools. This store must contain all users that are designated as administrators.
    When setting this up, you should specify the same LDAP store that was used as
    the identity provider within the OAM WebLogic Security Realm. Doing this will
    ensure that the administration users are able to log in with their proper permissions
    and that administration groups and roles are properly leveraged. Figure [12-2](#A352855_1_En_12_Chapter.html#Fig2)
    shows the ability to set both System and Default identity stores.


    ![A352855_1_En_12_Fig2_HTML.jpg](A352855_1_En_12_Fig2_HTML.jpg)


    Figure 12-2.


    Default and System identity stores Note


    If you mistakenly set the System Store or Default Store and lock the administration
    users out of the Administration Console, you can undo the change using wlst:


    ```

    Run $ORACLE_HOME/common/bin/wlst.sh

    ```


    ```

    wls:/offline> connect(“t3://:”, “weblogic”, “”)

    wls:/base_domain/serverConfig> displayUserIdentityStore(''UserIdentityStore1'')

    wls:/base_domain/serverConfig> editUserIdentityStore(name="UserIdentityStore1",isPrimary="true",isSystem="true")

    ```


    When OAM is integrated with OIM, it should be noted that a shared identity store
    will be created within OAM. This will coincide with the LDAP repository that was
    configured to synchronize with OIM. In many cases, this will be the proper identity
    store to be used for an Access Manager environment. However, in some environments,
    it might be desirable to use different stores for different federation applications
    or authentication modules. Figure [12-3](#A352855_1_En_12_Chapter.html#Fig3) displays
    an example of an OAM environment in which there are multiple available identity
    stores. You will note that there is the Embedded_LDAP, which is configured as
    the same store information used in the WebLogic security realm. The OID Identity
    Store shown is an overall OID configuration. In this example, the Base DN is configured
    as the top-level container of the OID directory. As mentioned previously, the
    OIMIDStore was created during the integration of OIM and OAM. In many cases, this
    might be the entire LDAP store or a subset of users.


    ![A352855_1_En_12_Fig3_HTML.jpg](A352855_1_En_12_Fig3_HTML.jpg)


    Figure 12-3.


    Oracle Access Manager identity stores


    ## Summary


    The OIM and OAM suite of applications can be configured to use various combinations
    of identity stores. Although the environment could be configured using OVD to
    present a single interface for managing multiple disparate stores, using directory
    synchronization profiles can leverage simpler configurations. Furthermore, the
    existence of multiple stores can be used to provide authentication services depending
    on the applications integrated into the SSO environment. This chapter served as
    a description of some of the possibilities.


    # 13. Identity Manager Policy Administration


    Oracle Identity Manager (OIM) serves a large number of functions for managing
    an organization’s identity data. By providing a wide variety of tools to assist
    administrators, managers, help desk staff, and end users in maintaining a consistent
    and auditable identity, OIM has become a key tool within the enterprise. OIM policies
    such as password policies, access policies, and approval policies can assist organizations
    as they push toward increasing efficiency while maintaining tight security. Using
    the OIM policies, the system can be configured to allow many combinations of user
    privileges, including the ability to self-register, request new permissions, manage
    other users, and grant new privileges.'
  trans: '

    ### 区分用户与群体


    越来越多的组织既有面向公众的资源，也有仅供员工访问的私有内容。在这种情况下，要将所有用户（包括外部和内部用户）都纳入公司的网络 `LDAP` 目录并不总是可行。大多数企业部署要求将这两类用户分开存储，而不是放在提供网络访问的系统中。虽然可能涉及其他
    `LDAP` 目录，但一个常见的例子是将外部用户存储在 `OID` 中，而内部用户在 `Active Directory` 中创建和维护。这是一种非常常见的架构，但应用程序安全可能仍然要求所有用户存储在一个通用的目录中，以便存储应用层级的属性。


    `OIM` 为这种架构提供了几种不同的解决方案。使用 `OVD` 可以让多个用户身份存储呈现为一个单一存储供应用程序和服务管理，而目录集成平台 (`DIP`)
    则可以将多个 `LDAP` 存储库同步到一个 `OID` 实例中。


    在决定于 `OIM` 环境中的特定用户群体内部实施多个目录时，应考虑几点。首先，用户群体存在于多个目录中，意味着环境可能将一组外部用户存储在 `OID` 中，而企业用户存储在
    `Active Directory` 中。


    ## 身份存储与 Oracle 访问管理器


    `OAM` 需要一个身份存储来处理身份验证请求。为此应使用符合 `LDAP` 标准的身份存储。虽然 `OAM` 可以配置使用多种不同的目录，包括 `Active
    Directory` 和 `WebLogic` 内置的 `LDAP`，但建议使用 `OID`、`OVD` 或 `OUD`。这将确保在 Oracle 单点登录
    (`SSO`) 环境中最常用的应用程序之间获得最大的兼容性。


    配置 `OAM` 时，应首先在 `WebLogic 管理控制台`中配置安全领域。执行此步骤将确保您能够使用指定为管理员的任何用户登录来登录 `WebLogic
    管理控制台` 以及随后的 `OAM 管理控制台`。这对于防止共享管理账户以及丢失或遗忘 `WebLogic` 用户密码特别有帮助。


    第 9 章介绍了在 `WebLogic` 安全领域内将 `OID` 设置为 `OAM` 身份提供者的步骤。在那里，您被指导如何在 `OAM` 中创建单个数据存储。需要注意的是，访问管理器支持多个身份存储。请记住，只有一个存储可以用作默认存储或系统存储。


    **注意**

    设置 `系统存储` 时，您必须指定用户和/或组来授予管理权限。应用更改时，系统将提示您输入属于这些组的用户的用户名和密码。您还必须将 `LDAP 身份验证模块`
    设置为使用 `默认存储`。未能这样做可能会将管理员用户锁定在 `管理控制台`之外。


    在 `OAM` 身份存储配置中，`默认存储` 在身份验证请求期间被用作用户信息的搜索位置。它也用于 `身份联合` 和 `安全令牌服务`。配置 `OAM 联合伙伴应用程序`
    时，可以指定身份存储。如果在 `OAM` 中配置了多个存储，管理员可以选择合适的存储。如果一个伙伴应用程序仅由企业内一小部分人使用，并且它使用自己的 `LDAP`
    存储库，这可能会很有用。如果在此配置期间未指定身份存储，`OAM` 将使用 `默认存储` 进行身份验证。


    `系统存储` 在用户尝试登录管理工具时被使用。此存储必须包含所有被指定为管理员的用户。设置时，您应指定与在 `OAM WebLogic 安全领域` 中用作身份提供者相同的
    `LDAP` 存储。这样做将确保管理员用户能够以其适当的权限登录，并且管理组和角色能够得到正确利用。图 12-2 显示了设置 `系统` 和 `默认` 身份存储的功能。


    ![A352855_1_En_12_Fig2_HTML.jpg](img/A352855_1_En_12_Fig2_HTML.jpg)

    图 12-2. 默认和系统身份存储


    **注意**

    如果错误地设置了 `系统存储` 或 `默认存储`，并将管理员用户锁定在 `管理控制台`之外，您可以使用 `wlst` 撤销更改：


    ```bash

    Run $ORACLE_HOME/common/bin/wlst.sh

    ```


    ```python

    wls:/offline> connect("t3://:", "weblogic", "")

    wls:/base_domain/serverConfig> displayUserIdentityStore(''UserIdentityStore1'')

    wls:/base_domain/serverConfig> editUserIdentityStore(name="UserIdentityStore1",isPrimary="true",isSystem="true")

    ```


    当 `OAM` 与 `OIM` 集成时，应注意会在 `OIM` 中创建一个共享的身份存储。这将与配置为与 `OIM` 同步的 `LDAP` 存储库一致。在许多情况下，这将是
    `访问管理器` 环境中使用的合适的身份存储。然而，在某些环境中，可能需要为不同的联合应用程序或身份验证模块使用不同的存储。图 12-3 展示了一个 `OAM`
    环境的示例，其中有多个可用的身份存储。您会注意到有一个 `Embedded_LDAP`，其配置与 `WebLogic` 安全领域中使用的存储信息相同。所示的
    `OID 身份存储` 是一个整体的 `OID` 配置。在此示例中，`基础 DN` 被配置为 `OID` 目录的顶级容器。如前所述，`OIMIDStore`
    是在 `OIM` 和 `OAM` 集成期间创建的。在许多情况下，这可能是整个 `LDAP` 存储或用户的一个子集。


    ![A352855_1_En_12_Fig3_HTML.jpg](img/A352855_1_En_12_Fig3_HTML.jpg)

    图 12-3. Oracle 访问管理器身份存储


    ## 总结


    `OIM` 和 `OAM` 应用程序套件可以配置为使用各种身份存储组合。虽然环境可以使用 `OVD` 来呈现一个管理多个不同存储的单一接口，但使用目录同步配置文件可以利用更简单的配置。此外，多个存储的存在可以根据集成到
    `SSO` 环境中的应用程序来提供身份验证服务。本章描述了其中的一些可能性。


    # 13. 身份管理器策略管理


    Oracle 身份管理器 (`OIM`) 在管理组织的身份数据方面承担了大量功能。通过提供多种工具来协助管理员、经理、服务台人员和最终用户维护一致且可审计的身份，`OIM`
    已成为企业中的关键工具。`OIM` 策略，如密码策略、访问策略和审批策略，可以帮助组织在推进效率提升的同时保持严密的安全。使用 `OIM` 策略，可以配置系统以允许许多用户权限组合，包括自我注册、请求新权限、管理其他用户以及授予权限的能力。

    '
- fmt: '## Access Policies


    Most organizations have differing user populations. For instance, managers might
    have the ability to grant permissions to their employees, help desk employees
    might be able to unlock or reset user passwords, and user administrators can create,
    modify, and decommission user accounts. Although `OIM` allows significant flexibility
    to various user types, this functionality must be carefully allocated to the proper
    users to ensure proper security in the overall system. Access policies provide
    this security by allowing roles to be assigned to individual users, groups of
    users, or users who match a certain criteria. These options are invaluable in
    making a manageable setup.


    Access policies define what permissions a user has within the system. External
    customer users may be able to register their account and manage attributes such
    as passwords and personal information. However, the enterprise might decide not
    to allow external users to unlock their account without calling the help desk.
    Help desk users, on the other hand, are usually granted many more permissions.
    Their access could include the ability to create and decommission accounts. The
    organization may set up access policies that allow employees to request new permissions,
    and managers can use the workflow to approve or grant those permissions. `OIM`
    provides the framework for the enterprise to set up simple and complex rules governing
    identity data management.


    ### Sample Access Policy Configuration


    If a management tool is difficult to configure or use, the end product could suffer.
    With identity information, this can result in poor security. `OIM` ensures configuration
    of access policies is performed in a standard, easy-to-use manner. Figure [13-1](#A352855_1_En_13_Chapter.html#Fig1)
    displays the Identity Manager management screen. On this screen you can manage
    users, roles, password policies, administration roles, and so on. In the case
    of access policies, you will be navigating to the Administration Roles. These
    roles are used to control which users in the `LDAP` store can perform certain
    operations.


    ![`A352855_1_En_13_Fig1_HTML.jpg`](A352855_1_En_13_Fig1_HTML.jpg)


    Figure 13-1. `Oracle Identity Manager` management screen


    Figure [13-2](#A352855_1_En_13_Chapter.html#Fig2) displays the default list of
    `Oracle Identity Manager` administration roles provided out of the box. These
    can be added to and disabled as needed in your environment. At creation none of
    these roles has members. It is left up to the administrator to determine what
    groups of users should receive the ability to manage accounts. It should be noted
    that these are, in effect, templates that can be used to grant permissions to
    various users and control what data users can see and modify.


    ![`A352855_1_En_13_Fig2_HTML.jpg`](A352855_1_En_13_Fig2_HTML.jpg)


    Figure 13-2. Administration roles


    ### Editing a role is fairly simple


    Editing a role is fairly simple. You are provided with a series of tabs that allow
    you to edit the basic information, capabilities, membership rules, and the organizations
    for which it applies. Figure [13-3](#A352855_1_En_13_Chapter.html#Fig3) displays
    the tabs available for a given role.


    ![`A352855_1_En_13_Fig3_HTML.jpg`](A352855_1_En_13_Fig3_HTML.jpg)


    Figure 13-3. Role management


    In this example, you will be viewing the `OrclOIMUserHelpDesk` role. This can
    be provided to help desk staff to allow them to manage user accounts, reset passwords,
    unlock accounts, and grant roles to other users.


    The Capabilities tab, shown in Figure [13-4](#A352855_1_En_13_Chapter.html#Fig4),
    displays a list of the abilities that a user assigned the `HelpDesk` role will
    be able to perform. In this case, a help desk user will be able to create, update,
    delete, and otherwise modify user accounts that fall within the scope of control
    to be discussed later in this section. If for some reason this list of capabilities
    is not in accordance with the requirements of the organization, an administrator
    can create a new custom access policy with only the capabilities to match their
    environment. If custom policies are needed, the default policies should be left
    alone and new policies created. This will ensure that the original configuration
    is left as is in case of issues.


    ![`A352855_1_En_13_Fig4_HTML.jpg`](A352855_1_En_13_Fig4_HTML.jpg)


    Figure 13-4. Role capabilities


    Once the access policy is defined and the capabilities configured, the administrator
    must determine who in the system will be granted the new access. Standard access,
    such as searching and viewing user information, might be granted to all users.
    However, the ability to edit accounts might only be granted to a select few. Determining
    user membership is simple enough: You have options to add users directly to the
    role or create rules governing membership.


    In the example shown in Figure [13-5](#A352855_1_En_13_Chapter.html#Fig5), the
    administrator has created a rule that only users that begin with the text `HPDSK`
    will be granted the `HelpDesk` role. In this case, it could be that the help desk
    employees work for a contractor or are created with the prefix indicating the
    department for which they work. This rule could easily be modified to be based
    on other `LDAP` attributes such as department or employee type. An example of
    configuring a rule-based membership query is shown in Figure [13-6](#A352855_1_En_13_Chapter.html#Fig6).


    ![`A352855_1_En_13_Fig6_HTML.jpg`](A352855_1_En_13_Fig6_HTML.jpg)


    Figure 13-6. Rule-based role membership query


    ![`A352855_1_En_13_Fig5_HTML.jpg`](A352855_1_En_13_Fig5_HTML.jpg)


    Figure 13-5. Role membership


    ### Access policies are often granted a scope of control


    Access policies are often granted a scope of control. This is used to define user
    populations that the role can be used to control. For instance, a requirement
    might be that the customer support group can only manage external customer accounts,
    whereas the help desk can only handle internal employee accounts. The Scope of
    Control tab can be used to specify these rules. It should be noted that if the
    organization has requirements such as these, additional roles might need to be
    created for each of the subgroups. In Figure [13-7](#A352855_1_En_13_Chapter.html#Fig7),
    you can see that the scope of control for the help desk has been set to include
    the default user types included in a base `OIM` installation. If your organization
    has additional types, include them as needed. In this example, you can see that
    the help desk can manage `Requests` as well as users within the `Top` and default
    `Xellerate` organizations. Including the suborganizations will ensure that the
    control is inherited to any child organizations.


    ![`A352855_1_En_13_Fig7_HTML.jpg`](A352855_1_En_13_Fig7_HTML.jpg)


    Figure 13-7. Scope of control


    ### Earlier in this chapter, you were presented with an example of setting up
    the Helpdesk administration role


    Earlier in this chapter, you were presented with an example of setting up the
    `Helpdesk` administration role. This policy allows users granted this role via
    the rule configured to manage users within the scope of control. A user might
    be granted multiple roles. One thing to keep in mind is that the roles will stack,
    meaning users will receive the permissions of each role granted to them. However,
    they will remain restrictive. This means that if an access right is specifically
    restricted in one role but granted in another, the user will not be granted that
    permission.'
