    ## 本章总结


    本章介绍了 OID 的安装和初始配置。这为成功的身份管理实施奠定了基础。从这一点开始，您可以开始在 Oracle 的通用 LDAP 目录中管理应用程序用户和属性。应用程序（无论是
    Oracle 还是第三方应用程序）都可以连接到 OID 以验证用户凭据，作为 LDAP 身份存储。数据库也可以使用该身份存储进行身份验证。尽管 OID 提供基本的
    LDAP 身份验证和基于身份的系统数据存储，但该环境仅维护对单个应用程序的单一身份验证。Oracle 访问管理器可以提供更好的用户体验，用户只需登录一次即可访问已纳入环境的应用程序。Oracle
    身份管理器将提供用户自助服务和管理服务。这些附加组件依赖于可靠的 LDAP 实现，并将在后续章节中介绍。


    # 5. 目录同步与虚拟化


    Oracle Internet Directory (OID)、Oracle Virtual Directory (OVD) 和 Directory Integration
    Platform (DIP) 为 Oracle 目录服务提供了整合用户管理和与其他应用程序集成的能力。这些概念已在前面的章节中介绍过。本章介绍使用 DIP
    从 Active Directory 复制用户到 OID 实例，为与 EBS 和 Oracle 身份与访问管理器的其余集成做准备。'
