    ### 总结


    `OIM` 提供了大量表单，有助于简化人员流动率高的环境，或者组织希望将权力交给用户以处理请求和重置密码的环境。这种自动化和丰富的自助应用程序表单可以大大减少服务台呼叫和管理员协助的次数。然而，开箱即用的用户界面可能无法满足所有组织的需求。因此，Oracle
    提供了一个易于使用的 `沙盒` 类型表单编辑器，允许对活动实例进行更改，而无需担心未经测试的更改会影响用户。系统允许开发人员在 `沙盒` 中进行更改并测试这些更改。只有当
    `沙盒` 实际发布时，更改才会进入实时系统。本章演示了两种常见的用户界面更改类型。


    # 15. 将访问管理器与电子商务套件集成


    许多组织在 Oracle 电子商务套件 (`EBS`) 以及辅助应用程序和产品（如 Oracle WebCenter Content and Imaging、Oracle
    Business Intelligence 和面向服务的架构 (`SOA`) 套件）方面进行了投资。为了在保持高安全性的同时提高用户生产力，Oracle 访问管理器
    (`OAM`) 提供了单点登录 (`SSO`) 功能，将这些产品绑定在一起，使用户在一天中从一个应用程序切换到另一个应用程序时无需重复登录。


    ## 架构


    Oracle `EBS` 旨在与充当其身份存储的 Oracle Internet Directory (`OID`) 集成。此配置允许使用 `OAM` 来提供
    `SSO` 功能。`EBS` 管理员会知道，该套件本身以 `FND_USER 表` 的形式拥有自己的用户存储。在 `SSO` 环境中，`EBS` 用户通过基于工作流的业务事件系统引发的事件与
    `OID` 同步。


    `OAM` 使用称为 `AccessGates` 的代理与 `EBS` 集成。这些代理，连同前面讨论的访问管理器 `WebGates`，用于提供从登录到应用程序的无缝过渡。


    在集成的 `OAM` `EBS` 环境中会发生一系列操作流程。当 `HTTP 服务器` 收到一个 `EBS` 请求时，`OAM WebGate` 会拦截该请求并将其路由到
    `OAM`。收到请求后，`OAM` 会确定资源是否受保护以及所需的认证和授权级别。尽管 `OAM` 提供凭据收集功能，但它会将凭据移交给 `OID` 进行认证。整个过程详述如下：


    1.  用户尝试使用浏览器访问某个 Oracle `EBS` 资源，并被重定向到 `EBS AccessGate`。

    2.  `AccessGate` 由带有 `WebGate` 的 Oracle `HTTP 服务器` (`OHS`) 保护。

    3.  `HTTP 服务器` 和 `WebGate` 检查是否存在已认证的会话。如果会话存在，则允许用户访问 `EBS`。如果不存在会话，则将请求路由到 `OAM`。

    4.  `OAM` 执行凭据收集。

    5.  `OAM` 针对身份存储验证提交的用户凭据。

    6.  `OAM` 将用户信息提供给 Oracle `EBS AccessGate`。

    7.  `EBS AccessGate` 将用户信息和请求提交给 `EBS` 数据库。

    8.  Oracle `EBS` 数据库检查 `EBS` 中是否存在与身份存储用户关联的用户。

    9.  如果未找到关联的 `OID` 用户，则将用户重定向到 `EBS` 关联页面以关联其 Oracle `EBS` 用户名。

    10. 返回最初请求的资源，并附带一个有效的已认证 Oracle `EBS` 用户会话。

