- fmt: '# 1. Oracle Identity and Access Management Suite Overview


    Oracle Fusion Middleware products are deployed within WebLogic Server architectures.
    WebLogic Server provides a scalable environment, allowing the enterprise to deploy
    and manage Oracle products and Java applications with the ability to access database
    and messaging services. WebLogic Server operates as the application server tier.
    The capabilities delivered by WebLogic include clustering, high availability,
    manageability, monitoring, security, and database integration.


    The Oracle Identity and Access Management Suite consists of multiple components,
    each serving a very specific purpose. These components consist of directory services,
    access management or single sign-on (SSO), identity management, and self-service
    portals, as well as provisioning, governance, and reporting services.


    This chapter provides an introduction to the Oracle Fusion Middleware WebLogic
    Server environment and the major components involved in configuring the Oracle
    Identity and Access Management Suite. You will also be presented with a description
    of the Oracle Identity Management components relevant to the rest of the book.


    ## WebLogic Server


    Oracle’s WebLogic Server (WLS) is a fully J2EE-compliant application server that
    will support the Oracle Identity and Access Management Suite components. This
    environment provides the components necessary for the deployment of custom applications
    as well as Oracle Fusion Middleware Products like Enterprise Content Management
    and Oracle Identity and Access Management. As WebLogic Server is an application
    server, users are able to access these applications via a web browser using the
    deployed application ports or through an HTTP server serving as a reverse proxy.


    To provide enterprise-level service, WebLogic Server supports a number of environmental
    features.


    *   **Programming models:** WLS supports a Java EE deployment environment, web
    services support, Java Messaging, Extensible Markup Language (XML) capabilities,
    Java Database Connectivity (JDBC) connection resources, and other components.

    *   **High availability:** This is supported using WebLogic Clusters to distribute
    work across multiple servers and the ability to detect overload and manage overload
    conditions. The persistent store and store-and-forward services allow the ability
    to temporarily store JMS messages and deliver them across services distributed
    across the cluster.

    *   **Security:** WLS provides a built-in Lightweight Directory Access Protocol
    (LDAP) 2.0 identity store that can be used to manage access to services deployed
    on the server. Beyond this, WLS can be configured to authenticate against a number
    of different external data stores such as Oracle Internet Directory, Active Directory,
    and so on. Furthermore the WLS framework allows the integration of identity asserters
    such as Oracle Access Manager (OAM).

    *   **Diagnostic framework:** Affords the ability to collect and analyze runtime
    data about the processes running on the server. This can be used to diagnose issues
    and tune for better performance.


    For the purposes of the Oracle Identity and Access Management environment, this
    book discusses how to use the following components.


    *   **The administration server** provides a graphical user interface (GUI) for
    managing all components of the deployment. Each WLS domain has one administration
    server that can be run on any of the WebLogic hosts. The administration server
    manages the configuration data for the domain, clusters, managed servers, data
    sources, security settings, and application deployments.

    *   **A domain** is a logical unit of management for server resources within the
    WLS. All aspects of the environment are contained within a domain, including the
    managed servers, database sources, messaging services, application deployments,
    machines, and clusters.

    *   **Machines** represent a physical host that houses managed servers. A single
    administration server can manage multiple machines. The administration server
    communicates with each machine’s node manager for start and stop operations of
    each managed server. A single physical host can have multiple machines configured
    listening on different ports if necessary.

    *   **WebLogic Clusters** consist of one or more WLS instances that work together,
    providing high availability and the ability to scale the environments laterally.

    *   **A managed server** is a logical WLS construct where applications can be
    deployed.

    *   **Data sources** are JDBC connections configured within the WLS to be used
    by applications deployed within the various managed servers. Targeting a data
    source at specific managed servers makes it available to only those specified.

    *   **Security realms** define authentication providers and asserters that protect
    the application resources. Security groups, users, and policies can all be defined
    within the WebLogic security realms.


    ## Oracle Directory Services


    Oracle Directory Services makes up the core of Oracle Identity and Access Management.
    Consisting of multiple options, Directory Services provides identity and policy
    storage, directory synchronization, and virtualization functionality that can
    be leveraged by various applications in use by the enterprise. These options include
    the following:


    *   **Oracle Internet Directory (OID):** Database-based fully LDAP-V3 compatible
    identity directory.

    *   **Oracle Unified Directory (OUD):** Java-based LDAP-V3 compliant identity
    directory.

    *   **Oracle Virtual Directory (OVD):** Directory integration that enables management
    of multiple sources without the need for data replication.'
