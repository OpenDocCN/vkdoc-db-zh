    进一步增强了这些功能，以帮助组织识别可能的安全漏洞并分析风险，从而实时制定新的安全策略。`OAM` `WSM` 处理 `Web` 服务安全的所有方面，包括身份验证、授权、机密性和完整性，使用公钥基础设施来加密和解密传递的数据。


    `APG` 用于保护部署在云中或企业内部的服务和 `API` 的访问安全。为此，`APG` 能够评估流量以查找可能的威胁，有选择地限制可能包含威胁的请求，并主动扫描内容以查找格式错误的请求和病毒。该网关还允许企业集成
