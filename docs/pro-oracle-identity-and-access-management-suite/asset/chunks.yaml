  trans: '

    ## 配置 Oracle Identity Manager 服务器


    至此，OID 已被设置为 OIM 的身份存储，您可以继续配置 Identity Manager 服务器。在之前的章节中，您已在自己的 WebLogic Middleware
    Home 中创建了新的 OIM 域。该步骤配置了一个管理服务器、一个面向服务的架构 (SOA) 服务器和一个身份管理服务器。本节将在此基础上继续操作，为启动
    OIM 做好准备。


    现在是时候启动 WebLogic 管理服务器和 SOA 服务器了。在配置 Identity Manager 之前，这些服务必须正在运行。转到身份管理域目录
    `/home/oracle/IDMMiddleware/user_projects/oim_domain`。执行命令 `startWeblogic.sh`。如果您希望该命令在后台启动，可以使用
    `nohup` 执行命令，例如 `nohup ./startWeblogic.sh > weblogic.out &`。这将把命令的输出重定向到文件 `weblogic.out`。为此，WLS
    必须配置为以开发模式启动。如果服务器配置为以生产模式启动，那么您需要确保有一个 `boot.properties` 文件已就位。接下来启动 SOA。这可以通过在
    `bin` 目录中执行 `./startManagedWebLogic.sh soa_server1` 来完成。


    **注意**


    要在后台启动服务器，`boot.properties` 文件必须存在于安全目录中，或者服务器必须处于开发模式。


    在 `<Domain Home/servers/<ServerName>/security` 目录中，创建一个名为 `boot.properties` 的文件，格式如下：


    ```

    username=weblogic

    password=

    ```


    现在，WebLogic 管理服务器和 SOA 服务器已经启动，您可以继续配置 Identity Manager 服务器。


    导航到 `<Middleware_Home>/Oracle_IDM1/bin`，其中 `Middleware_Home` 是您安装 OIM 的目录。在本例中，它是
    `/home/oracle/IDMMiddleware`。在 `bin` 目录中，执行 `config.sh`：


    ```

    //bin/config.sh

    ```


    **注意**


