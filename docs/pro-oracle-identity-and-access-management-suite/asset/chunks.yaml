    Figure 10-4.


    Checking the schema to be upgraded


    The Patch Set Assistant will check the schema and validate its upgrade status,
    then provide you with a summary of the environment it will upgrade. Take this
    time to review the Upgrade Summary screen shown in Figure [10-5](#A352855_1_En_10_Chapter.html#Fig5)
    before continuing.


    ![A352855_1_En_10_Fig5_HTML.jpg](A352855_1_En_10_Fig5_HTML.jpg)


    Figure 10-5.


