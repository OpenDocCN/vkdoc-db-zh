    # 4. Oracle Directory Services Installation and Configuration


    Oracle offers multiple options for Lightweight Directory Access Protocol (LDAP)
    data storage. Oracle Internet Directory (OID) and Oracle Unified Directory (OUD)
    both provide storage, and Oracle Virtual Directory (OVD) allows multiple disparate
    LDAP stores to be presented as a single source. This chapter presents the installation
    and configuration steps for each product. At the time of this writing, Oracle
    E-Business Suite is certified for use with OID and not OVD or OUD. The installation
    process for all three products is presented as a guide for future reference. However,
    in later chapters, only OID is used.


    ## Preinstallation Tasks


    Prior to beginning the actual software installation and laying down binaries on
    the file system, it should be noted that there are some tasks that must be completed
    to ensure a successful operation. Care should be taken to create or complete these
    tasks such as populating operating system (OS) users, setting kernel parameters,
    and granting the proper permissions. These items are covered in the subsequent
    sections of this chapter.


    ### Operating System Users


    For most Oracle application installs, OS users and groups should be created to
    perform the installation and configuration tasks. Creating OS groups will allow
    other OS users to perform certain tasks related to the management of the application
    environment. The most common OS users and groups related to installing Oracle
    applications in Linux environments are the `oracle` user and `oinstall` or `dba`
    groups.


    To create the necessary `oinstall` and `dba` groups perform the following commands
    as the root directory:


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd dba

    ```


    After the groups are created, create the `oracle` user.


    ```

    [root@clouddemolab home]# useradd -g oinstall -G dba oracle

    ```


    Note


    -g indicates the primary group to which the user should be added. -G indicates
    any secondary groups.


    To set the password for the user, use the following command as the root user:


    ```

    [root@clouddemolab home]# passwd oracle

    ```'
  trans: '## 聚合


    Oracle 虚拟目录并不存储其呈现的身份数据。相反，通过使用前一节中提到的适配器，`OVD`充当了多个后端目录的代理。这减少了与复制和同步多个存储相关的成本和管理工作量，同时利用了组织内已在使用的存储库。它还通过减少开发所需的时间和精力来提高效率，因为无需构建新的目录或接口。


    大多数公司都有若干个（如果不是多个的话）不同的用户存储库。这些可能包括网络或企业目录、特定于业务部门的目录、电子邮件、实现其自身目录的`LDAP`启用应用程序，甚至像`EBS`或`PeopleSoft`这样的数据库源。在许多情况下，存储在一个源中的数据不易适配与其他应用程序协同工作，这就需要进行数据复制。通常，控制这些应用程序的各个业务部门有要求，规定他们必须保留对其目录的控制权。无论出于何种原因需要维护多个数据存储，`OVD`都可以整合它们并提供那个单一访问点。


    为了便于聚合身份存储信息，`OVD`提供了转换或映射数据到应用程序或后端数据存储预期格式的能力。这些映射以双向流进行。这允许将请求格式化以匹配存储要求，同时返回的数据随后被转换以匹配客户端应用程序的要求。`OVD`也可以配置为重新映射属性名称和值。


    作为代理，`OVD`系统地将每个传入的请求路由到正确的适配器，其逻辑是检查`DN`模式、过滤器、属性和查询，以确定满足请求的最佳可能适配器。这减少了为结果而查询的适配器数量，优化了`OVD`的性能，并允许配置更复杂的环境而不影响性能。


    ## 访问管理


    许多组织正在努力为其用户提供单点登录（`SSO`）能力。然而，如前所述，这些组织可能拥有多个用户存储库。之前提到，`OVD`为客户端应用程序访问各种后端目录提供了单一前端。访问管理系统也是如此。像`OAM`这样的产品大多数时候都需要一个`LDAP`存储库来提供身份验证和授权服务。无论后端存储库如何，都提供那个`LDAP`前端，这正是`OVD`的设计目的。


    `OVD`为访问管理系统提供的另一个好处是抽象层。随着时间的推移，底层数据存储会发生变化。这些变化可能导致客户端应用程序或访问管理系统失败。通过将底层目录结构与客户端应用程序分离，`OVD`通过确保数据继续被转换或翻译成所需的正确格式来保护它们免受变更影响。


    ## 总结


    本章介绍了构成 Oracle 目录服务的三个主要产品，它们构成了 Oracle 身份和访问管理的基础。`OID`和`OUD`都提供用户管理和存储解决方案，并向客户端应用程序和服务暴露`LDAP`接口。`OVD`帮助组织整合多个目录的管理，并为需要身份验证服务的应用程序提供单一来源。本书的其余部分将集中介绍`OUD`的安装，因为
    Oracle 已指明该产品将是 Oracle 目录服务的发展方向。然而，当`OVD`提供额外功能或替代解决方案时，也会对其进行讨论。


    # 4. Oracle 目录服务安装与配置


    Oracle 为轻量目录访问协议（`LDAP`）数据存储提供了多种选项。Oracle Internet Directory（`OID`）和 Oracle Unified
    Directory（`OUD`）都提供存储功能，而 Oracle Virtual Directory（`OVD`）则允许多个不同的`LDAP`存储呈现为单一来源。本章介绍每个产品的安装和配置步骤。在撰写本文时，Oracle
    电子商务套件认证可用于`OID`，而非`OVD`或`OUD`。所有三个产品的安装过程均作为未来参考的指南提供。但是，在后面的章节中，仅使用`OID`。


    ## 预安装任务


    在开始实际的软件安装并将二进制文件放置到文件系统之前，需要注意有一些必须完成的任务以确保操作成功。应仔细创建或完成这些任务，例如填充操作系统（`OS`）用户、设置内核参数以及授予适当的权限。这些项目将在本章后续部分中介绍。


    ### 操作系统用户


    对于大多数 Oracle 应用程序安装，应创建`OS`用户和组来执行安装和配置任务。创建`OS`组将允许其他`OS`用户执行与应用程序环境管理相关的特定任务。在
    Linux 环境中安装 Oracle 应用程序时，最常见的`OS`用户和组是 `` `oracle` `` 用户以及 `` `oinstall` `` 或
    `` `dba` `` 组。


    要创建必要的 `` `oinstall` `` 和 `` `dba` `` 组，以`root`用户身份执行以下命令：


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd dba

    ```


    组创建完成后，创建 `` `oracle` `` 用户。


    ```

    [root@clouddemolab home]# useradd -g oinstall -G dba oracle

    ```


    注意


    `` `-g` `` 表示用户应添加到的主组。 `` `-G` `` 表示任何附加组。


    要设置用户的密码，请以`root`用户身份使用以下命令：


    ```

    [root@clouddemolab home]# passwd oracle

    ```'
- fmt: '### Operating System Configuration


    Prior to installing the Oracle Fusion Middleware infrastructure and Oracle Identity
    Management software, it is important to ensure the OS meets the minimum requirements
    and configuration. The following presents the kernel parameters and packages and
    the file changes that are required.


    The following kernel parameters need to be set:


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    To set these parameters, edit the `sysctl.conf` file located in the `/etc` directory.


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    Add or edit the following lines in this section of the file:


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    After setting these values in the `sysctl.conf` file, you must activate and verify
    the new values are shown using this command:


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    The open file limits must be set to 4096 to support the instance. To do so, edit
    the `limits.conf` file.


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    If the environment is to be installed on Oracle Linux or RedHat Linux, you must
    perform the edit in `/etc/security/limits.d/90-nproc.conf` as well. If this is
    missed, the values in this file might override the values in the `limits.conf`
    file.


    In both of the files just listed, ensure the following lines are added or edited:


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    After editing this file, the server must be rebooted to ensure all the changes
    take effect.


    ### Operating System Packages


    Each Oracle application has its own set of required packages. Depending on the
    version of Linux you are using, the installation procedure might be different.
    In the following list, you should note that some packages require both 32-bit
    and 64-bit versions to be installed on a 64-bit OS. If these packages are not
    installed, the installation will not complete properly. The Oracle Installer will
    check these and display errors during the installation.


    ```

    binutils-2.20.51.0.2-5.28.el6

    compat-libcap1-1.10-1

    compat-libstdc++-33-3.2.3-69.el6 for x86_64

    compat-libstdc++-33-3.2.3-69.el6 for i686

    gcc-4.4.4-13.el6

    gcc-c++-4.4.4-13.el6 glibc-2.12-1.7.el6 for x86_64 glibc-2.12-1.7.el6 for i686
    glibc-devel-2.12-1.7.el6 for i686 libaio-0.3.107-10.el6 libaio-devel-0.3.107-10.el6
    libgcc-4.4.4-13.el6 libstdc++-4.4.4-13.el6 for x86_64 libstdc++-4.4.4-13.el6 for
    i686 libstdc++-devel-4.4.4-13.el6 libXext for i686 libXtst for i686 libXext for
    x86_64 libXtst for x86_64 openmotif-2.2.3 for x86_64 openmotif22-2.2.3 for x86_64
    redhat-lsb-core-4.0-7.el6 for x86_64 sysstat-9.0.4-11.el6 xorg-x11-utils* xorg-x11-apps*
    xorg-x11-xinit* xorg-x11-server-Xorg* xterm

    ```


    At this point in the procedure, the OS should be fully prepared for the installation
    to proceed. Performing these operations prior to installing the software will
    ensure a problem-free installation. In many cases, the installer will provide
    detailed messages if anything was missed. In the event of errors during the installation
    process, stop the installation and fix the problems before proceeding.


    ### Database Preparation


    Before beginning the installation, prepare the required database schemas. This
    is done using Oracle’s Repository Creation Utility (RCU). The RCU software is
    available for download from the same location as the Identity Management software.
    It is very important to ensure that the version of the RCU is exactly the same
    as the version of the Fusion Middleware software to be installed.


    In this case, OID 11.1.1.9 will be installed. Therefore, the RCU version used
    will be 11.1.1.9. As discussed previously, OID 11.1.1.9 is the latest version
    certified for use with Oracle E-Business Suite.


    After downloading the required software, it is time to begin the repository creation.
    Unzip the downloaded file to a stage directory. In this case we use `/home/oracle/stage/rcu`.
    Once unzipped, a directory called `rcuHome` will be created. Run the `rcu` file
    located in `rcuHome/bin` as shown in Figure [4-1](#A352855_1_En_4_Chapter.html#Fig1).


    ![A352855_1_En_4_Fig1_HTML.jpg](A352855_1_En_4_Fig1_HTML.jpg)

    Figure 4-1. Repository Creation Utility


    Prior to running the RCU, the Database Initialization Parameter, `open_cursors`
    should be set to at least 500. The default is usually 300. To change this parameter,
    perform the following command from an SQLPlus prompt:


    ```

    alter system set open_cursors = 1000 scope = both;

    ```


    The first page of the RCU is a Welcome screen. Clear the Skip this Page Next Time
    check box to skip the Welcome screen on subsequent runs of the RCU. This is shown
    in Figure [4-2](#A352855_1_En_4_Chapter.html#Fig2).


    ![A352855_1_En_4_Fig2_HTML.jpg](A352855_1_En_4_Fig2_HTML.jpg)

    Figure 4-2. Repository Creation Utility Welcome screen


    Figure [4-3](#A352855_1_En_4_Chapter.html#Fig3) displays the first decision point
    in the RCU. At this point you are provided with the option of creating a new metadata
    repository or deleting an existing one.


    ![A352855_1_En_4_Fig3_HTML.jpg](A352855_1_En_4_Fig3_HTML.jpg)

    Figure 4-3. Repository Creation Utility: Create component schemas into a database
    selection


    The RCU can be used to create the required database schemas or drop schemas as
    needed. The tool can be run multiple times. Therefore, if a schema was missed
    or created mistakenly, the RCU can be rerun to create the missed objects or delete
    entire schemas. Caution should be taken to ensure that the schemas to be deleted
    are not currently in use. After deciding to create or drop a repository, the RCU
    will prompt you for the database connection, details as shown in Figure [4-4](#A352855_1_En_4_Chapter.html#Fig4).


    ![A352855_1_En_4_Fig4_HTML.jpg](A352855_1_En_4_Fig4_HTML.jpg)

    Figure 4-4. Database configuration parameters


    It should be noted that the RCU will not support pluggable databases or container
    databases. If in doubt, discuss this with your database administrator (DBA).


    Once the Create or Drop operation is chosen, the RCU tool will prompt for the
    database connections. Your DBA can provide this information. In this case, the
    database is actually running on the same host as the Identity Management environment.
    Although this is possible on a host with enough resources and will support a development
    instance, it is recommended that the database and Fusion Middleware components
    be run on separate hosts in production environments. A prerequisite check will
    be completed as shown in Figure [4-5](#A352855_1_En_4_Chapter.html#Fig5).


    ![A352855_1_En_4_Fig5_HTML.jpg](A352855_1_En_4_Fig5_HTML.jpg)

    Figure 4-5. RCU database prerequisite check Note


    The RCU should use the `SYS` account with `SYSDBA` privileges. However, if this
    is not possible, the RCU can be configured to generate the schema creation scripts
    that can be provided to the DBA.'
  raw: '### Operating System Configuration


    Prior to installing the Oracle Fusion Middleware infrastructure and Oracle Identity
    Management software, it is important to ensure the OS meets the minimum requirements
    and configuration. The following presents the kernel parameters and packages and
    the file changes that are required.


    The following kernel parameters need to be set:


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    To set these parameters, edit the `sysctl.conf` file located in the `/etc` directory.


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    Add or edit the following lines in this section of the file:


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    After setting these values in the `sysctl.conf` file, you must activate and verify
    the new values are shown using this command:


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    The open file limits must be set to 4096 to support the instance. To do so, edit
    the `limits.conf` file.


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    If the environment is to be installed on Oracle Linux or RedHat Linux, you must
    perform the edit in `/etc/security/limits.d/90-nproc.conf` as well. If this is
    missed, the values in this file might override the values in the `limits.conf`
    file.


    In both of the files just listed, ensure the following lines are added or edited:


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    After editing this file, the server must be rebooted to ensure all the changes
    take effect.


    ### Operating System Packages


    Each Oracle application has its own set of required packages . Depending on the
    version of Linux you are using, the installation procedure might be different.
    In the following list, you should note that some packages require both 32-bit
    and 64-bit versions to be installed on a 64-bit OS. If these packages are not
    installed, the installation will not complete properly. The Oracle Installer will
    check these and display errors during the installation.


    ```

    binutils-2.20.51.0.2-5.28.el6

    compat-libcap1-1.10-1

    compat-libstdc++-33-3.2.3-69.el6 for x86_64

    compat-libstdc++-33-3.2.3-69.el6 for i686

    gcc-4.4.4-13.el6

    gcc-c++-4.4.4-13.el6 glibc-2.12-1.7.el6 for x86_64 glibc-2.12-1.7.el6 for i686
    glibc-devel-2.12-1.7.el6 for i686 libaio-0.3.107-10.el6 libaio-devel-0.3.107-10.el6
    libgcc-4.4.4-13.el6 libstdc++-4.4.4-13.el6 for x86_64 libstdc++-4.4.4-13.el6 for
    i686 libstdc++-devel-4.4.4-13.el6 libXext for i686 libXtst for i686 libXext for
    x86_64 libXtst for x86_64 openmotif-2.2.3 for x86_64 openmotif22-2.2.3 for x86_64
    redhat-lsb-core-4.0-7.el6 for x86_64 sysstat-9.0.4-11.el6 xorg-x11-utils* xorg-x11-apps*
    xorg-x11-xinit* xorg-x11-server-Xorg* xterm

    ```


    At this point in the procedure, the OS should be fully prepared for the installation
    to proceed. Performing these operations prior to installing the software will
    ensure a problem-free installation. In many cases, the installer will provide
    detailed messages if anything was missed. In the event of errors during the installation
    process, stop the installation and fix the problems before proceeding.


    ### Database Preparation


    Before beginning the installation, prepare the required database schemas. This
