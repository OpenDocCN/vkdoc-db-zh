    objectClass: top

    objectClass: orclContainer

    dn: cn=Users,cn=oracleAccounts,dc=mycompany,dc=com

    cn: Users

    objectClass: top

    objectClass: orclContainer

    dn: cn=Groups,cn=oracleAccounts,dc=mycompany,dc=com

    cn: Groups

    objectClass: top

