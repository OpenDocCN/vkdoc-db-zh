    ## 引言


    许多组织会为其环境中安装的每款产品规划贯穿其整个产品生命周期的安全策略。大多数产品都提供了某种用户存储机制。这些独立的用户存储可以被使用，对于仅部署了少量产品的小型环境来说，或许是一个可行的解决方案。然而，在大型组织中，这常常会导致多个身份存储、跨业务单元的数据复制以及管理上的难题。此外，使用独立的用户管理功能可能导致用户需要为其使用的所有产品维护多个用户名和密码。最终，这些用户可能会使用安全性较低的密码，更糟的是，将用户名和密码列表写下来放在键盘下面。


    解决方案是实施一个单一的身份数据源，供所有应用程序用于认证和授权。轻量级目录访问协议（`LDAP`）被设计为在身份存储中查找信息的标准化方式。借助 `LDAP`，应用程序现在有了标准的方式来从外部存储认证和授权用户，前提是这些外部存储符合
    `LDAP` 标准。业务单元现在可以实施符合 `LDAP` 标准的软件，并访问中央用户存储，不再需要用户维护多个账户。Oracle Internet Directory（`OID`）是
    Oracle 对通用 `LDAP` 目录的实现。其他 Oracle 产品，如电子商务套件（E-Business Suite）、WebCenter Content
    和 `OBIEE`，都被设计为与 `OID` 协同工作。作为一个通用的、符合 `LDAP` 标准的目录，`OID` 也可以被其他第三方应用程序所利用。


    Oracle 更进一步，推出了 Oracle Access Manager（`OAM`）以提供单点登录功能。现在，每个应用程序不再需要单独的登录请求，它们可以被设置为利用现有的浏览器令牌进行身份验证，从而让用户免于多次输入凭证。`OAM`
    支持安全断言标记语言（`SAML`），因此可以配置为向第三方的云端应用程序提供认证服务。这也意味着 Oracle 的云端解决方案（如人力资本管理）可以与组织的
    `OAM` 单点登录环境集成。


    任何身份管理的实施都离不开某种形式的身份生命周期管理。过去，每个应用程序负责管理自己的身份存储。这导致用户需要为他们访问的每个应用程序创建和维护多个账户。当用户入职时，可能需要数天甚至数周才能获得所需的一切访问权限。相反，当用户离开组织时，其账户可能无法及时停用，甚至根本未被停用。这构成了巨大的安全风险。Oracle
    Identity Management（`OIM`）的引入为企业级的身份生命周期管理带来了新的治理水平。`OIM` 提供了一个用于管理用户身份数据的中央接口。它可以连接到标准的
    `LDAP` 目录，或者通过使用 Oracle Virtual Directory，它可以管理来自多个存储的数据。`OIM` 提供的自动化能力可以减少用户入职所需的工作量，并确保在用户离开组织时访问权限被移除。


    Oracle 身份与访问管理套件结合了这里讨论的关键要素，为用户提供了一个端到端的管理解决方案。尽管实施起来应该很简单，但要让一切正常高效地运行，还需要执行各种步骤。本书旨在为您提供在您的环境中启动并运行身份与访问管理套件的指南。它演示了安装和配置过程，并包含一些架构讨论，以帮助确定您的环境中需要什么。


    ## 致谢

