    you can use the OAM WLS Administration Console located at `http://<hostname>:<adminserver_port>/console`;
    for example, [`http://10.0.70.229:17001/console`](http://10.0.70.229:17001/console)
    .


    Once logged into the WLS Administration Console, navigate to Environment ➤ Servers,
    and ensure the newly created EBS AccessGate managed server `ebsag_server1` is
