  trans: "\n## 配置与部署 Oracle WebGate\n\n既然 `OHS` 和 `OAM WebGate` 软件已经安装完毕，现在是将 `WebGate`\
    \ 部署到 `OHS` 中的时候了。完成此操作的工具位于 `Oracle WebGate` 主目录中。该目录是在安装过程中选择的。\n\n使用命令提示符，导航至以下目录：\n\
    ```\n/webgate/ohs/tools/deployWebGate\n```\n\n`deployWebGateInstance.sh` 工具需要两个参数：`WebGate\
    \ 主目录` 和 `WebGate 实例主目录`。这些参数通过 `–w` 和 `–oh` 选项来指定。`WebGate 主目录`（由 `–oh` 指定）是\
    \ `WebGate` 软件的安装目录。`WebGate` 实例目录（由 `–w` 指定）是 `OHS` 实例目录，在许多情况下，该目录位于 `Oracle_WT1/instances/instance1/config/OHS/ohs1`\
    \ 目录下。\n\n命令应类似于：\n```\n./deployWebGateInstance.sh –w /home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1\
    \ –oh /home/oracle/OHSMiddleware/Oracle_OAMWebGate11g\n```\n\n运行 `deployWebGateInstance.sh`\
    \ 工具会将所需的代理文件复制到 `WebGate` 实例目录。你可以通过查看目录 `/home/oracle/Oracle_WT1/instances/instance1/config/OHS/ohs1`\
    \ 来验证这一点。你应该能看到一个 `webgate` 目录和一个 `webgate.conf` 文件。\n\n部署过程的下一步是修改所需的文件，以使 `OHS`\
    \ 能够识别 `WebGate`。\n\n为此，你必须首先通过运行以下命令确保 `LD_LIBRARY_PATH` 包含了 `OHS` 的 `lib` 文件夹：\n\
    ```\nexport LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/home/oracle/OHSMiddleware/Oracle_WT1/lib\n\
    ```\n\n接下来，切换到目录 `/home/oracle/OHSMiddleware/Oracle_OAMWebGate11g/webgate/ohs/tools/setup/InstallTools`。从该目录运行命令：\n\
    ```\n./EditHttpConf –w  -oh \n```\n\n前面的命令需要两个参数：`WebGate 主目录` 和 `WebGate 实例主目录`。这些参数通过\
    \ `–w` 和 `–oh` 选项来指定。`WebGate 主目录`（由 `–oh` 指定）是 `WebGate` 软件的安装目录。`WebGate` 实例目录（由\
    \ `–w` 指定）是 `OHS` 实例目录，在许多情况下，该目录位于 `Oracle_WT1/instances/instance1/config/OHS/ohs1`\
    \ 目录下。\n\n验证命令是否做出了适当的更改。在 `/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/conf/OHS/ohs1`\
    \ 目录中查找 `httpd.conf` 文件。它现在应该在文件末尾包含以下行：\n```\ninclude \"/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1/webgate.conf”\n\
    ```\n\n## 总结\n\n现在你已经拥有一个 `OHS` 和一个 `OAM 11g WebGate` 实例。你的 `OHS` 可用作 Web 服务器来托管需要受\
    \ `OAM` 保护的应用程序。基础组件现已就位，可以实施 `Oracle 标识和访问管理套件`。接下来的几章将提供将它们全部整合在一起所需的信息。\n\n\
    ## 9. 配置 Oracle 访问管理器\n\n所有必需的组件现已安装完毕。你已经在独立的 `中间件主目录` 中为每个组件创建了一个域。这简化了未来的升级和维护。完成这组操作后，实际的组件需要进行配置并为实际的集成做好准备。配置过程包括根据你的环境设置组件。接下来的几页将讨论如何在你的环境中配置\
    \ `OAM` 以支持单点登录 (`SSO`)。\n\n### 准备访问管理器以使用 Oracle Internet Directory\n\n默认情况下，`OAM`\
    \ 被配置为使用 `WebLogic` 内置的轻量级目录访问协议 (`LDAP`) 用户存储区，作为系统存储区和默认存储区。强烈建议你在生产环境中配置 `OAM`\
    \ 使用外部数据存储区。虽然你可能不是在设置生产环境，但建议将你的开发或测试环境配置得与生产系统类似。因此，本章将演示如何配置 `OAM` 使用 `Oracle\
    \ Internet Directory (OID)` 作为其身份存储区。\n\n要使用 `OID` 作为身份存储区，第一步是配置 `WebLogic` 安全域以识别\
    \ `OID`。将浏览器指向 `http://host:port/console` 来打开 `OAM WebLogic` 域的管理控制台。在本书中，`OAM\
    \ WebLogic Server` 管理控制台配置为 `Host 10.0.70.229 Port 17001`。如果你还记得前面的章节，`OID` 使用\
    \ `Port 7001`，而 `Oracle Identity Manager (OIM)` 使用 `27001`。图 9-1 显示了 `WebLogic`\
    \ 管理控制台的安全域。\n\n![A352855_1_En_9_Fig1_HTML.jpg](img/A352855_1_En_9_Fig1_HTML.jpg)\n\
    *图 9-1. WebLogic Server 安全域*\n\n登录到 `OAM` 域的管理控制台后，导航到 安全域 ➤ `myrealm`。屏幕显示在域创建期间配置的默认安全域。它由\
    \ `DefaultAuthenticator`、`IAMSuiteAgent` 和 `DefaultIdentityAsserter` 组成。在此步骤中，你将添加一个验证提供程序以支持\
    \ `OID`。单击 `新建` 以创建新的验证提供程序。这将打开“创建新身份验证提供程序”屏幕，如图 9-2 所示。\n\n![A352855_1_En_9_Fig2_HTML.jpg](img/A352855_1_En_9_Fig2_HTML.jpg)\n\
    *图 9-2. 创建 OID 身份验证器*\n\n在此屏幕上，为新的身份验证器提供一个名称。本例中，将其命名为 `OIDAuthenticator`，并在\
    \ `类型` 字段中选择 `OracleInternetDirectoryAuthenticator`。单击 `确定`。\n\n图 9-3 显示了 `WebLogic`\
    \ 身份验证提供程序的重新排序屏幕。\n\n![A352855_1_En_9_Fig3_HTML.jpg](img/A352855_1_En_9_Fig3_HTML.jpg)\n\
    *图 9-3. 重新排序提供程序*\n\n创建新的提供程序后，应将其设置为提供程序列表中的第一位。选择新的 `OIDAuthenticator` 旁边的复选框，并使用箭头将其上移到适当的位置。单击\
    \ `确定` 保存此步骤。然后，你可以继续设置如图 9-4 所示的 `控制标志` 属性。\n\n![A352855_1_En_9_Fig4_HTML.jpg](img/A352855_1_En_9_Fig4_HTML.jpg)\n\
    *图 9-4. 提供程序通用配置*\n\n重新排序提供程序后，你必须配置 `OIDAuthenticator`。首先将控制标志设置为 `Sufficient`。这允许新创建的身份验证器提供身份验证服务，但不要求用户必须存在于\
    \ `OID` 用户存储区中才能访问资源。这是必要的，因为某些用户（例如 `weblogic`）可能不存在于 `OID` 中。完成 `OIDAuthenticator`\
