    you are presented with the properties of the new item. In this dialog box, use
    the Value field to enter the text you wish to add. Note that this field will accept
    HTML. Because the OIM pages use CSS, the HTML will inherit the styling defined
    for the rest of the application. In Figure [14-11](#A352855_1_En_14_Chapter.html#Fig11),
    the new HTML field has been populated. It should be noted that if you wish to
    override the standard Identity Manager CSS, you can use the Style tab to enter
    customized style information.


    ![A352855_1_En_14_Fig11_HTML.jpg](A352855_1_En_14_Fig11_HTML.jpg)


    Figure 14-11.


    New content properties


    At this point you have changed out the logo and added a text field to the My Information
    page. If you recall, customizations are all completed within an individual sandbox.
    The changes created up to this point are only visible when your sandbox is active,
    and only to the user making the edits. Users of the system still see the standard
    pages without edits or the previously published edits. Clicking the Publish Sandbox
    option will merge the changes made into the main line of the application. This
    functionality is useful for testing and making changes to the UI without affecting
    current users.


    ## Summary


    OIM provides a significant number of forms that can help streamline environments
    with high turnover, or where organizations wish to put power into their users’
    hands to handle requests and reset their passwords. This automation and plethora
    of self-service application forms can greatly reduce the number of help desk calls
    and administrator assistance. However, the out-of-the-box UI might not meet the
    requirements of all organizations. As such, Oracle has provided an easy to use
    sandbox type form editor that allows changes to be made to a live instance without
    the fear of affecting users with an untested change. The system allows developers
    to make changes in the sandbox and test those changes. Only when the sandbox is
    actually published will the changes go into the live system. This chapter demonstrated
    two types of commonly made changes to the UI.


    # 15. Integrating Access Manager with E-Business Suite


    A large number of organizations have an investment in Oracle E-Business Suite
    (EBS) along with auxiliary applications and products such as Oracle WebCenter
    Content and Imaging, Oracle Business Intelligence, and Service-Oriented Architecture
    (SOA) Suite. In an effort to increase user productivity while maintaining a high
    level of security, Oracle Access Manager (OAM) enables single sign-on (SSO) capabilities,
    tying these products together so that users are not prompted to log in throughout
    the day as they move from one application to another.


    ## Architecture


    Oracle EBS has been designed to integrate with Oracle Internet Directory (OID)
    serving as its identity store. This configuration allows the use of OAM to provide
    SSO capabilities. EBS administrators will be aware that the suite houses its own
    user store in the form of the FND_USER table. In an SSO environment, the EBS users
    are synchronized with OID by events raised by the workflow-based Business Event
    System.


    OAM uses agents called AccessGates to integrate with EBS. These, along with Access
    Manager WebGates, discussed earlier, are used to provide a seamless transition
    from log in to application.


    There is a flow of operations that occurs within an OAM integrated EBS environment.
    As the HTTP server receives an EBS request, the OAM WebGate intercepts the request
    and routes it to OAM. On receipt of the request, OAM determines if the resource
    is protected and the level of authentication and authorization required. Although
    OAM provides the credential collection, it hands off the credentials to OID for
    authentication. The overall process is detailed as follows:


    1.  A user attempts to access one of the Oracle EBS resources using a browser
    and is redirected to the EBS AccessGate.  

    2.  The AccessGate is protected by Oracle HTTP Server (OHS) with WebGate.  

    3.  The HTTP server and WebGate check for an existing authenticated session. If
    a session exists, the user is allowed to access EBS. If no session exists, the
    request is routed to OAM.  

    4.  OAM performs credential collection.  

    5.  OAM validates the submitted user credentials against the identity store.  

    6.  OAM provides the user information to the Oracle EBS AccessGate.  

    7.  The EBS AccessGate submits the user information and request to the EBS database.
     

    8.  The Oracle EBS database checks for a user in EBS that is linked to the identity
    store user.  

    9.  If no linked OID user is found, the user is redirected to the EBS linking
    page to associate his or her Oracle EBS username.  

    10.  The originally requested resource is returned with a valid authenticated
    Oracle EBS user session.'
