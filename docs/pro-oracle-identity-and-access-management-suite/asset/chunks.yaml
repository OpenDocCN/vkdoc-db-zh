    user status such as first-time logins and expired accounts.


    At the end of this chapter, you will have an integrated environment with one protected
    resource or URL. From the login screen, your users will be able to use the First
    Time Login, Forgot Password, and other Identity Manager functionalities in an
    SSO environment.


    ## IdmConfigTool


    Oracle has provided a tool that can be used to ensure that all of the necessary
    configurations are performed for a successful integration. There are a great number
    of configuration parameters that must be set or updated. Running this tool correctly
    ensures a seamless integration with fewer hassles during setup.


    Adding new applications and resources into the OAM SSO environment can be relatively
    simple. In the case of most Oracle products and applications, this involves creating
    a new Oracle Access Manager Identity Asserter in the WebLogic domain and configuring
    the WebGate. In the case of OIM, however, there are a number of components that
    must be configured to ensure the communication between the two components is performing
    properly. Luckily Oracle has provided a tool called IDMConfigTool . In the previous
    chapters, you used this tool to preconfigure the Identity Store. In this chapter,
    it is used to configure the integration of OAM, OIM, and WLS.


    The IdmConfigTool can assist with the tasks of integrating Identity Manager components.
    It can also be used to validate the configuration parameters and extract configuration
    parameters of an integrated environment to assist with troubleshooting or replication
    in another environment. It supports integration of the Identity Manager components
    in single and split domain environments, 11g and 10g WebGates, and multiple identity
    store types such as OID and Oracle Unified Directory (OUD) .


    Although idmConfigTool provides a number of tools for integration, the proper
    functioning of the tool depends on correct environment management. It is important
    to note where you run the idmConfigTool. In this book, you have set up OAM and
    OIM in a split domain. The Oracle documentation mentions that you should always
    run the idmConfigTool from the same location. However, if running in a split domain,
    you must run the OAM-specific commands in the OAM home location, whereas OIM-specific
    commands are run from the OIM home.


    Because this chapter covers both OAM and OIM tasks, the proper setup for idmConfigTool
    is covered in each section.'
