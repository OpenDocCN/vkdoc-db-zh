  trans: '

    一旦选择了某个项目或区域，您可以右键单击并选择 `Edit`。这将打开图 14-8 所示的屏幕。在此示例中，选择了品牌标识。在这里，您可以更改徽标以包含您的公司或品牌徽标文件。在图
    14-8 中，显示了代表徽标的 `CommandImageLink` 项目的属性。在此屏幕上，您可以输入文件的新值或更改其他属性。需要注意的是，使用此方法更改徽标时，相对
    URL 将不起作用。如果您未使用直接的 URL 值，该字段中使用的值将默认为 `/identity/` 上下文根。如果您不希望在其他地方（例如在 Web 服务器内）托管徽标，可以将您的徽标放入自助服务应用程序
    jar 文件中并重新部署该文件。但是，许多组织决定在其内容服务器或其他图像托管服务上托管其网站的图像。


    ![A352855_1_En_14_Fig8_HTML.jpg](img/A352855_1_En_14_Fig8_HTML.jpg)


    图 14-8. 编辑徽标图像


    更改徽标、线条或其他视觉元素后，您可能希望添加新元素，例如提示文本或新字段。与更改视觉元素非常相似，您必须首先找到要修改的区域或区域。这可以使用右侧的结构窗格或左侧的内容区域来完成。请注意，当您在页面上选择区域或项目时，右侧将选择相应的结构元素。根据您希望添加元素的位置，应找到父容器并在那里添加它。您可以使用容器编辑器重新排序项目。图
    14-9 显示了选中面板的结构窗格。在此示例中，要添加的新元素是一些帮助文本，用于指导用户更改其密码。这将被添加到包含密码字段的面板表单布局中。


    ![A352855_1_En_14_Fig9_HTML.jpg](img/A352855_1_En_14_Fig9_HTML.jpg)


    图 14-9. 添加新元素


    选择要添加新元素的容器后，使用主菜单上的加号调出“添加内容”对话框。在此对话框中，您可以从各种页面组件中进行选择。如果您计划创建数据元素，可以使用数据组件。点击任何可用组件上的
    `Open` 链接将显示可以添加的各个组件。在此情况下，您正在添加一个文本框，它可以包含 HTML 标记以向用户显示一些信息。在图 14-10 中，“添加内容”对话框显示了可以添加的各种组件的列表。展开
    `Web Components` 并选择 `Text Box`。


    ![A352855_1_En_14_Fig10_HTML.jpg](img/A352855_1_En_14_Fig10_HTML.jpg)


    图 14-10. “添加内容”对话框


    选择位置和要添加到页面的内容类型后，将显示新项目的属性。在此对话框中，使用 `Value` 字段输入您希望添加的文本。请注意，此字段将接受 HTML。由于
    OIM 页面使用 CSS，HTML 将继承为应用程序其余部分定义的样式。在图 14-11 中，新的 HTML 字段已填充。需要注意的是，如果您希望覆盖标准的
    Identity Manager CSS，可以使用 `Style` 选项卡输入自定义样式信息。


    ![A352855_1_En_14_Fig11_HTML.jpg](img/A352855_1_En_14_Fig11_HTML.jpg)


    图 14-11. 新内容属性


    至此，您已更换了徽标并向“我的信息”页面添加了一个文本字段。如果您还记得，自定义都是在单独的沙盒中完成的。到目前为止创建的更改仅在您的沙盒处于活动状态时可见，并且仅对进行编辑的用户可见。系统的其他用户仍然看到未编辑或先前已发布的标准页面。点击
    `Publish Sandbox` 选项会将所做的更改合并到应用程序的主线中。此功能对于测试和更改 UI 非常有用，而不会影响当前用户。


    ## 总结


    OIM 提供了大量表单，有助于简化人员流动率高的环境，或希望赋予用户处理请求和重置密码权限的组织。这种自动化和大量的自助服务应用程序表单可以大大减少帮助台呼叫和管理员协助的次数。但是，开箱即用的
    UI 可能无法满足所有组织的要求。因此，Oracle 提供了一种易于使用的沙盒式表单编辑器，允许对活动实例进行更改，而不必担心未经测试的更改会影响用户。系统允许开发人员在沙盒中进行更改并测试这些更改。只有当沙盒实际发布时，更改才会进入实时系统。本章演示了两种常见的
    UI 更改类型。


    # 15. 将访问管理器与电子商务套件集成


    许多组织在 Oracle 电子商务套件 (EBS) 以及 Oracle WebCenter Content 和 Imaging、Oracle Business
    Intelligence 和面向服务的架构 (SOA) Suite 等辅助应用程序和产品上进行了投资。为了在保持高安全性的同时提高用户生产力，Oracle
    访问管理器 (OAM) 提供了单点登录 (SSO) 功能，将这些产品绑定在一起，这样用户在一天中从一个应用程序切换到另一个应用程序时，就不会被反复要求登录。


    ## 架构


    Oracle EBS 设计为与充当其身份存储的 Oracle Internet Directory (OID) 集成。此配置允许使用 OAM 提供 SSO
    功能。EBS 管理员会知道，该套件以 `FND_USER` 表的形式拥有自己的用户存储。在 SSO 环境中，EBS 用户通过基于工作流的业务事件系统引发的事件与
    OID 同步。


    OAM 使用称为 `AccessGates` 的代理与 EBS 集成。这些代理，连同前面讨论的访问管理器 `WebGates`，用于提供从登录到应用程序的无缝过渡。


    在 OAM 集成的 EBS 环境中会发生一系列操作流程。当 HTTP 服务器接收到 EBS 请求时，OAM `WebGate` 会拦截该请求并将其路由到 OAM。收到请求后，OAM
    会确定资源是否受保护以及所需的身份验证和授权级别。尽管 OAM 提供凭据收集，但它会将凭据移交给 OID 进行身份验证。整个过程详述如下：


    ```

    1.  用户尝试使用浏览器访问 Oracle EBS 资源之一，并被重定向到 EBS AccessGate。

    2.  AccessGate 由带有 WebGate 的 Oracle HTTP Server (OHS) 保护。

    3.  HTTP 服务器和 WebGate 检查是否存在已验证的会话。如果会话存在，则允许用户访问 EBS。如果会话不存在，请求将被路由到 OAM。

    4.  OAM 执行凭据收集。

    5.  OAM 根据身份存储验证提交的用户凭据。

    6.  OAM 将用户信息提供给 Oracle EBS AccessGate。

    7.  EBS AccessGate 将用户信息和请求提交给 EBS 数据库。

    8.  Oracle EBS 数据库检查 E 中是否存在与身份存储用户关联的用户。

    9.  如果未找到关联的 OID 用户，则将用户重定向到 EBS 链接页面以关联其 Oracle EBS 用户名。

    10. 原始请求的资源随有效的已验证 Oracle EBS 用户会话一起返回。

    ```

    '
- fmt: '### 准备 EBS AccessGate 文件


    下载 Oracle EBS AccessGate 文件（包含在补丁 `13704814` 中）后，将它们解压到`$MW_HOME/appsutil/accessgate/{instance}`目录下。例如：


    ```

    mkdir -p $MW_HOME/appsutil/accessgate/ebsAG

    cd $MW_HOME/appsutil/accessgate/ebsAG

    unzip [location to patch 13704814]/p13704814_R12_GENERIC.zip

    ```


    AccessGate 压缩文件包含为 EBS 配置 AccessGate 所需的文件。这些文件将在后续配置步骤中被引用。


    *   `fndauth.war`：这是 Oracle EBS AccessGate 应用程序，将部署在下一步骤中创建的受管服务器内。

    *   `fndext.jar`：此文件包含启用应用服务器与 EBS 数据库之间通信所需的 Java 库。

    *   `txkEBSAuth.xml`：这是一个 ANT 脚本，用于帮助自动化部署 Oracle AccessGate。

    *   `fndauth_deployment_plan.tmp`：这是一个模板文件，用于部署自动化工具。

    *   `LogConfig.properties`：此文件可用作设置日志记录的示例。

    *   `samplecleanup.html`：这是一个示例 HTML 文件，用于在 EBS 注销后清理会话信息。


    ### 创建 EBS AccessGate 安装目录


    Oracle EBS AccessGate 必须安装在 Middleware Home 目录内。从命令行，在`$MW_HOME/appsutil/accessgate/ebsAG`处为
    AccessGate 创建一个目录。如果您为 AccessGate 使用了不同的实例名称，请将 `ebsAG` 替换为该名称。接下来，将 AccessGate
    文件复制到新的实例目录。本例中，`MW_HOME` 目录是指安装了 OAM 的 Middleware 安装目录。


    ## 准备 EBS 和 OID


    在开始集成过程之前，您应确保在 EBS 和 Oracle 身份与访问管理环境中都已应用了必要的补丁和更新。请咨询 Oracle 支持以规划并实施所需的兼容性更新。


    ### 将 EBS 主目录注册到 OAM


    将 EBS 与 OAM 集成的第一步是将 EBS 主目录注册到 OAM。这必须在尝试集成 OID 之前完成。每个 EBS 部署只需注册实例一次。即使在 EBS
    的多节点实例中也是如此。


    注意：在尝试与 OID 集成之前，您必须先将 EBS 主目录注册到 OAM。


    首先，运行位于`EBS FND_HOME`目录中的`txkrun.pl`脚本。


    ```

    $FND_TOP/bin/txkrun.pl -script=SetSSOReg -registerinstance=yes -infradbhost=10.0.70.221
    -ldapport=3060 -ldapportssl=3131 -ldaphost=10.0.70.229 -oidadminuserpass=*****
    -appspass=*****

    ```


    在此命令中，按照表 [15-1](#A352855_1_En_15_Chapter.html#Tab1) 所述设置参数。


    表 15-1. SSO 注册参数


    | 参数 | 描述 |

    | --- | --- |

    | `-script` | `SetSSOReg` 设置 `txkrun.pl` 脚本来运行 EBS 实例与 OID 的注册过程。 |

    | `-registerinstance` | 将此设置为 `yes` 以确保注册 EBS 实例。 |

    | `-infradbhost` | 此参数应设置为 OID 数据库主机名。请注意，这与 EBS 数据库不同。 |

    | `-ldapport` | 将此设置为非安全套接字层（SSL）轻量级目录访问协议（LDAP）端口。 |

    | `-ldapportssl` | 将此设置为 OID 的 SSL LDAP 端口。 |

    | `-ldaphost` | 将此设置为运行 OID 的服务器的主机名。 |

    | `-oidadminuserpass` | 在此输入 `orcladmin` 密码。 |

    | `-appspass` | 在此输入 EBS 应用程序数据库管理员（DBA）密码。 |


    ### 将 EBS 注册到 OID


    成功将 EBS 实例注册到 OAM 后，您可以继续注册 EBS 和 OAM。为此，您将运行与上一步相同的 `txkrun.pl`。


    ```

    $FND_TOP/bin/txkrun.pl -script=SetSSOReg -registeroid=yes -ldaphost=10.0.70.229
    -ldapport=3060 -oidadminuserpass=***** -appspass=***** -instpass=***** -provisiontype=4

    ```


    表 [15-2](#A352855_1_En_15_Chapter.html#Tab2) 显示了此脚本设置的参数。


    表 15-2. OAM 注册参数


    | 参数 | 描述 |

    | --- | --- |

    | `-script` | `SetSSOReg` 设置 `txkrun.pl` 脚本来运行 EBS 实例与 OID 的注册过程。 |

    | `-registeroid` | 将此标志设置为 `yes` 以注册 EBS 到 OID。 |

    | `-ldaphost` | 将此设置为 OID 主机名。如果您使用负载均衡器，应设置为实际主机名，而不是 VIP。 |

    | `-ldapport` | 将此设置为 OID 实例使用的 LDAP 端口。 |

    | `-oidadminuserpass` | 此应设置为 `orcladmin` 密码或其他管理密码。 |

    | `-appspass` | 将此设置为应用程序 DBA 密码。 |

    | `-instpass` | 此应设置为与 OID 管理员密码相同的密码。 |

    | `-provisiontype` | 此值可以设置为 1、2、3 或 4。本例中设置为 4，表示双向 – 无创建 provisioning。其他值为：1.
    双向 Provisioning：这是默认值。2. 入站 Provisioning：EBS 到 OID。3. 出站 Provisioning：OID 到 EBS。4.
    双向，无 Provisioning。 |


    完成此步骤后，必须重启 EBS 中间层服务。


    ### 创建 EBS 连接用户


    将 EBS 主目录注册到 OAM 并将 EBS 注册到 OID 后，现在可以为连接到 OID 创建所需的本地 EBS 用户。新 EBS 用户应使用 UMS/Apps
    模式权限创建。创建此用户后，使用 EBS 本地登录名登录并重置新用户的密码。验证该用户可以连接到 EBS 并具有正确的角色：`UMX|Apps Schema
    Connect`。


    ## 配置 EBS AccessGate


    由于 Oracle EBS 使用了大量的 cookie 和会话信息，EBS AccessGate 的配置要求其安装在与 EBS 本身使用的中间层服务器相同的域中。在本例中，创建了`.example.com`
    cookie 域。确保使用对您的环境必要的相同信息来安装 AccessGate。


    ### 为 AccessGate 创建受管服务器


    在配置 OAM 期间，已为 OAM 创建了 WebLogic Server (WLS) 域。因此，您可以为新的 AccessGate 使用相同的 WLS 和域。登录到
    OAM WLS 管理控制台后，导航到 Environment > Clusters，然后创建一个新集群。为集群分配适合您环境的名称。本例中使用名称`ebsAG_cluster`。使用以下值配置集群参数。


    *   消息传递模式：单播 (Unicast)。

    *   单播广播通道：留空。

    *   多播地址：使用默认值。

    *   多播端口：使用默认值。


    创建新集群后，就可以配置受管服务器。导航到 Environment > Servers。在现有受管服务器列表中，单击 New。使用以下值填充字段：


    *   服务器名称：`ebsAG_server1`

    *   服务器侦听主机：`<OAM 主机名>`

    *   服务器侦听端口：`17043` 或其他开放端口

    *   集群：选择上一步创建的集群名称。


    创建受管服务器后，编辑新服务器并将其分配给现有的计算机。


    注意：在集群环境中创建此配置时，请确保创建两个受管服务器，并将每个服务器分配到集群中相应的计算机上。'
  raw: '### Prepare EBS AccessGate Files


    After downloading the Oracle EBS AccessGate files , available in Patch 13704814,
    unzip them to `$MW_HOME/appsutil/accessgate/{instance}`. For example:


    ```

    mkdir -p $MW_HOME/appsutil/accessgate/ebsAG

    cd $MW_HOME/appsutil/accessgate/ebsAG

    unzip [location to patch 13704814]/p13704814_R12_GENERIC.zip

    ```


    The AccessGate zip file contains the required files for configuring the AccessGate
    for EBS. These files will be referenced later in the configuration steps.


    *   `fndauth.war`: This is the Oracle EBS AccessGate application that will be
    deployed within the managed server created in the next steps.

    *   fndext.jar: This file contains Java libraries required to enable communication
    between application servers and the EBS database.

    *   txkEBSAuth.xml: This is an ANT script that is used to help automate the deployment
    of Oracle AccessGate.

    *   fndauth_deployment_plan.tmp: This is a template file used in the deployment
    automation tool.

    *   LogConfig.properties: This file can be used as an example for setting up logging.

    *   samplecleanup.html: This is an example HTML file used to clean up session
    information after an EBS logout.


    ### Create EBS AccessGate Installation Directory


    The Oracle EBS AccesGate must be installed within the Middleware Home directory.
    From the command line, create a directory for AccessGate at `$MW_HOME/appsutil/accessgate/ebsAG`.
    If you used a different instance name for your AccessGate, replace `ebsAG` with
    that name. Next, copy AccessGate files to new instance directory. The `MW_HOME`
    directory, in this case, is the Middleware installation where OAM is installed.


    ## Prepare EBS and OID


    Prior to beginning the integration process, you should ensure that the necessary
    patches and updates are applied on both the EBS and Oracle Identity and Access
    Management environments. Check with Oracle support to plan and implement the required
    compatible updates.


    ### Register EBS Home with OAM


    The first step of integrating EBS with OAM is to register the EBS home with OAM.
    This must occur prior to attempting to integrate OID. Registering the instance
    is only required to occur once per EBS deployment. This is true even within multiple-node
    instances of EBS.


    Note


    You must register the EBS Home with OAM before attempting to integrate with OID.


    To begin, run the `txkrun.pl` script located within the `EBS FND_HOME` directory.


    ```

    $FND_TOP/bin/txkrun.pl -script=SetSSOReg -registerinstance=yes -infradbhost=10.0.70.221
    -ldapport=3060 -ldapportssl=3131 -ldaphost=10.0.70.229 -oidadminuserpass=*****
    -appspass=*****

    ```


    In this command, set the parameters as described in Table [15-1](#A352855_1_En_15_Chapter.html#Tab1).


    Table 15-1.


    SSO Registration Parameters


    | Parameter | Description |

    | --- | --- |

    | `-script` | SetSSOReg sets up the `txkrun.pl` script to run the register process
    for EBS instance with OID. |

    | `-registerinstance` | Set this to yes to ensure the EBS instance is registered.
    |

    | `-infradbhost` | This parameter should be set to the OID database host name.
    Note that this is not the same as the EBS database. |

    | `-ldapport` | Set this to the non-Secure Sockets Layer (SSL) Lightweight Directory
    Access Protocol (LDAP) port. |

    | `-ldapportssl` | Set this to the SSL LDAP port of OID. |

    | `-ldaphost` | Set this to the hostname of the server on which OID is running.
    |

    | `-oidadminuserpass` | Enter the orcladmin password here. |

    | `-appspass` | Enter the EBS apps database administrator (DBA) password. |


    ### Register EBS with OID


    After successful completion of registering the EBS instance with OAM , you can
    continue with registering EBS and OAM. To do this, you will run the same `txkrun.pl`
    as in the previous step.


    $FND_TOP/bin/txkrun.pl -script=SetSSOReg -registeroid=yes -ldaphost=10.0.70.229
    -ldapport=3060 -oidadminuserpass=***** -appspass=***** -instpass=***** -provisiontype=4


    Table [15-2](#A352855_1_En_15_Chapter.html#Tab2) shows the parameters set by this
    script.


    Table 15-2.


    OAM Registration Parameters


    | Parameter | Description |

    | --- | --- |

    | `-script` | SetSSOReg sets up the `txkrun.pl` script to run the register process
    for EBS instance with OID. |

    | `-registeroid` | Set this flag to yes to register EBS with OID. |

    | `-ldaphost` | Set this to the OID hostname. This should be set to the actual
    hostname, not a VIP if you are using a load balancer |

    | `-ldapport` | Set this to the LDAP port used by the OID instance. |

    | `-oidadminuserpass` | This should be set to the orcladmin password or other
    administrative password. |

    | `-appspass` | Set this to the Apps DBA password. |

    | `-instpass` | This should be set to the same as the OID Adminstrator password.
    |

    | `-provisiontype` | This value can be set to values 1, 2, 3, or 4\. In this case
    set the value to 4 for Bi-Directional – No Creation Provisioning. Other values
    are: 1. Bi-Directional Provisioning: This is the default value. 2. In-Bound Provisioning:
    EBS to OID. 3. Out-Bound Provisioning: OID to EBS. 4. Bi-Directional, No Provisioning
    |


    After completing this step, the EBS middle tier services must be restarted.


    ### Create EBS Connection User


    After registering the EBS home with OAM and registering EBS with OID, it is time
    to create the required local EBS users for connection to OID. The new EBS user
    should be created with the UMS/Apps schema permissions. Once you have created
    this user, use the EBS Local Login to log in and reset the new user’s password.
    Validate that the user can connect to EBS and has the proper role: UMX|Apps Schema
    Connect.


    ## Configure EBS AccessGate


    Because Oracle EBS uses a number of cookies and session information, configuration
    of the EBS AccessGate requires that it be installed within the same domain as
    the middle-tier servers used by EBS itself. In the example, the `.example.com`
    cookie domain was created. Ensure that the AccessGate is installed using the same
    information necessary for your environment.


    ### Create Managed Servers for AccessGate


    During the configuration of OAM, the WebLogic Server (WLS) domain was created
    for OAM. As such, you can use the same WLS and domain for the new AccessGate.
    After logging into the OAM WLS Administration Console, navigate to Environment
    ➤ Clusters, and create a new cluster. Assign the cluster a name appropriate to
    your environment. In this case, the name `ebsAG_cluster` is used. Use the following
    values to configure the cluster parameters.


    *   Messaging mode: Unicast.

    *   Unicast broadcast channel: Leave blank.

    *   Multicast Address: Use the default value.

    *   Multicast Port: Use the default value.


    Once the new cluster has been created, it is time to configure the managed servers.
    Navigate to Environment ➤ Servers. On the list of existing managed servers, click
    New. Populate the fields with the following values:


    *   Server Name: ebsAG_server1

    *   Server Listen Host: <OAM host name>

    *   Server Listen Port: 17043 or other open post

    *   Cluster: Choose the cluster name created in the previous step.


    After creating the managed server, edit the new server and assign it to an existing
    machine.


    Note


    When creating this in a clustered environment, make sure you create two managed
    servers and assign each to the appropriate machine within the cluster.'
