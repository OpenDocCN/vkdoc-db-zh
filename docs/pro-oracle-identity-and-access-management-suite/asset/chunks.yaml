    ## 本章摘要


    在本章中，我们介绍了配置 OIM 服务器的必要步骤。在之前的章节中，您安装了必要的软件并创建了一个 WebLogic 域。在此基础上，您现在应该拥有一个可用于在
    OID 身份存储中创建和管理用户的 OIM 实例。您还为此安装进行了预配置，为将 OIM 与 OAM 集成做准备。此过程的下一步将是开始这两个产品的实际集成。


    # 11. Oracle 身份与访问管理器集成


    在之前的章节中，您安装了 Oracle Internet Directory (OID)、Oracle Access Manager (OAM) 和 Oracle
    Identity Manager (OIM)，为集成做准备。此集成提供了多项优势，包括提高用户生产力、增强身份安全性，以及减少因忘记密码或账户锁定而产生的帮助请求。


    使用集成环境的组织不仅能够利用 OIM 的用户配置和审计功能，还能将用户自助服务功能与 OAM 的单点登录 (SSO) 功能相结合。这两个主要组件的结合为需要管理其账户访问权限、密码或个人资料信息的用户创造了无缝的界面。正如
    SSO 环境允许用户登录一次应用程序后，自动登录到他们可能需要的其他应用程序一样，此集成将身份管理器添加为受保护的资源。这通过在某些事件（如更改密码、忘记密码等）后自动登录用户，从而促进了用户自助服务。另一个特性是
    OIM 和 OAM 能够通信以确定用户状态，例如首次登录和账户过期。


    在本章结束时，您将拥有一个包含一个受保护资源或 URL 的集成环境。从登录屏幕，您的用户将能够在 SSO 环境中使用首次登录、忘记密码和其他身份管理器功能。


    ## IdmConfigTool


    Oracle 提供了一个工具，可用于确保为成功集成执行所有必要的配置。有大量的配置参数必须设置或更新。正确运行此工具可确保在设置过程中实现无缝集成，减少麻烦。


    将新的应用程序和资源添加到 OAM SSO 环境可能相对简单。对于大多数 Oracle 产品和应用程序，这涉及在 WebLogic 域中创建一个新的 Oracle
    Access Manager Identity Asserter 并配置 WebGate。然而，对于 OIM，必须配置许多组件以确保两个组件之间的通信正常进行。幸运的是，Oracle
    提供了一个名为 `IDMConfigTool` 的工具。在之前的章节中，您使用此工具预配置了身份存储。在本章中，它用于配置 OAM、OIM 和 WLS 的集成。


    `IdmConfigTool` 可以协助完成集成身份管理器组件的任务。它还可用于验证配置参数，并从集成环境中提取配置参数，以协助进行故障排除或在另一环境中进行复制。它支持在单域和拆分域环境、11g
    和 10g WebGate 中集成身份管理器组件，并支持多种身份存储类型，如 OID 和 Oracle Unified Directory (OUD)。


    虽然 `idmConfigTool` 提供了多种集成工具，但其正常运行取决于正确的环境管理。重要的是要注意您在哪里运行 `idmConfigTool`。在本书中，您在拆分域中设置了
    OAM 和 OIM。Oracle 文档提到您应该始终从同一位置运行 `idmConfigTool`。但是，如果在拆分域中运行，您必须在 OAM 主目录位置运行
    OAM 特定命令，而 OIM 特定命令则从 OIM 主目录运行。


    由于本章涵盖 OAM 和 OIM 任务，因此每个部分都介绍了 `idmConfigTool` 的正确设置。

