    # 8. Oracle HTTP Server 与 WebGate 的安装和配置


    至此，提供与 Oracle 产品和应用程序单点登录 (SSO) 所需的所有 Oracle Identity and Access Management Suite
    组件都已就绪。Identity Manager 的加入提供了管理 Oracle Internet Directory (OID) 轻量目录访问协议 (LDAP)
    用户存储中用户的能力。Oracle HTTP Server (OHS) 和 Oracle Access Manager (OAM) WebGate 代表了
    Oracle 应用程序和产品的 Web 服务器前端。从核心上讲，OHS 是一个带有 Oracle WebLogic 模块的 Apache Web 服务器。结合
    OAM WebGate 软件，OHS 成为了一个中心位置，负责处理传入请求、检查认证，并在 OAM 执行其操作后，允许经过认证的用户访问所需资源。本章涵盖
    Oracle HTTP Server 和 OAM Webgate 的安装与部署。


    ## 安装前任务


    ### 操作系统用户


    对于大多数 Oracle 应用程序安装，应创建操作系统 (OS) 用户和组来执行安装和配置任务。创建 OS 组将允许其他 OS 用户执行与管理应用程序环境相关的特定任务。在
    Linux 环境中安装 Oracle 应用程序时，最常见的 OS 用户和组是 `oracle` 用户以及 `oinstall` 或 `dba` 组。


    要创建必要的 `oinstall` 和 `dba` 组，请以 root 用户身份执行以下命令：


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd osdba

    ```


    组创建完成后，创建 `oracle` 用户：


    ```

    [root@clouddemolab home]# useradd  -g oinstall -G osdba oracle

    ```


    注意


    -g 表示用户应添加到的主组。-G 表示任何次要组。


    要设置用户密码，请以 root 用户身份使用以下命令。


    ```

    [root@clouddemolab home]# passwd oracle

    ```


    ### 操作系统配置


    在安装 Oracle Fusion Middleware 基础设施和 Oracle Identity Management 软件之前，确保操作系统满足最低要求和配置非常重要。以下列出了所需的内核参数、软件包以及文件更改。


    需要设置以下内核参数：


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    要设置这些参数，请编辑位于 `/etc` 目录下的 `sysctl.conf` 文件。


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    在该文件的此部分中添加或编辑以下行：


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    在 `sysctl.conf` 文件中设置这些值后，必须激活并使用以下命令验证新值是否显示：


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    必须将打开文件限制设置为 4096 以支持该实例。为此，请编辑 `limits.conf` 文件。


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    如果环境要安装在 Oracle Linux 或 RedHat Linux 上，还必须在 `/etc/security/limits.d/90-nproc.conf`
    中进行编辑。如果遗漏了这一点，此文件中的值可能会覆盖 `limits.conf` 文件中的值。


    在这两个文件中，确保添加或编辑了以下行：


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    编辑此文件后，必须重新启动服务器以确保所有更改生效。


    如前一章所述，机器提供 WebLogic 管理服务器与服务器进程通信所需的状态和生命周期事件信息。对于任何基于 UNIX 的操作系统，使用 `Unix Machine`
    类型至关重要。这确保了在管理服务器执行操作时，任何必要的环境设置都能得到正确配置。集群可以包含一台或多台机器，而机器可以包含一个或多个受管服务器。图 7-31
    展示了一个新的 Unix Machine。


    ![A352855_1_En_7_Fig31_HTML.jpg](img/A352855_1_En_7_Fig31_HTML.jpg)


    图 7-31.


    配置机器屏幕


    将受管服务器分配给上一步创建的机器。在图 7-32 中，您将看到所有新的受管服务器都已分配给在上一步中创建的单个 `Unix_Machine`。您可以选择创建多台机器，并将不同的组件分配给不同的机器。如果您有多个集群成员，每台机器可以驻留在单独的集群中。


    ![A352855_1_En_7_Fig32_HTML.jpg](img/A352855_1_En_7_Fig32_HTML.jpg)


    图 7-32.


    将服务器分配给机器屏幕


    将受管服务器分配给机器后，您将看到一个汇总，显示您输入的所有信息。此配置摘要屏幕（如图 7-33 所示）提供了您即将启动的配置的最后检视机会。请查看此摘要以确保文件位置、名称和配置参数看起来正确。单击“创建”以开始创建新的
    WebLogic 域。


    ![A352855_1_En_7_Fig33_HTML.jpg](img/A352855_1_En_7_Fig31_HTML.jpg)


    图 7-33.


    配置摘要屏幕


    在域创建过程中，会创建许多文件并启动各种进程。可以在配置向导的“创建域”屏幕上查看此过程的进度，如图 7-34 所示。将显示一个配置日志。请让此过程不间断运行直至完成。如果出现任何错误，请检查指示的日志。


    ![A352855_1_En_7_Fig34_HTML.jpg](img/A352855_1_En_7_Fig34_HTML.jpg)


    图 7-34.


    配置进度


    域配置完成后，单击“完成”退出工具。如果您一直按照流程操作至此，您将已安装 OID、OAM 和 OIM。每个组件都驻留在自己的 WebLogic 域中，并由自己的
    WebLogic 服务器控制。这有助于简化管理流程，并便于未来的升级和打补丁。还应注意，在某些情况下，您的网络基础架构可能要求将组件分隔在不同的网络区域中。请参阅本书的架构章节以获取更多信息。


    ## 总结


    本章旨在介绍在新的 WebLogic 域中安装 OIM 所需的步骤。如果从头开始操作，您已经了解了为元数据存储库创建必要数据库对象的步骤。本章还介绍了 OIM
    和必需的 Oracle SOA 安装的实际软件安装以及新 WebLogic 域的创建。后续章节将介绍 OIM 组件的配置以及它们之间的集成。

