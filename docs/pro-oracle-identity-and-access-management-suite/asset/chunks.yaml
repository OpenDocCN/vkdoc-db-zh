- fmt: '# Oracle Internet Directory 安装与配置


    ![A352855_1_En_4_Fig18_HTML.jpg](A352855_1_En_4_Fig18_HTML.jpg)

    *图 4-18. WLS 服务器与 Coherence 安装位置*


    安装摘要屏幕（如图 [4-19](#A352855_1_En_4_Chapter.html#Fig19) 所示）确认了所有将要安装的 WLS 组件。使用此屏幕进行复查并进行任何更改。请注意，此安装设置为安装除评估数据库之外的所有组件。


    ![A352855_1_En_4_Fig19_HTML.jpg](A352855_1_En_4_Fig19_HTML.jpg)

    *图 4-19. 安装摘要屏幕*


    WLS 安装结束时，将显示安装完成屏幕，如图 [4-20](#A352855_1_En_4_Chapter.html#Fig20) 所示。界面中会呈现“运行快速启动”复选框。在此场景中，请清除此复选框。域配置将在之后将
    OID 安装到此 Middleware Home 中时进行。


    ![A352855_1_En_4_Fig20_HTML.jpg](A352855_1_En_4_Fig20_HTML.jpg)

    *图 4-20. WebLogic Server 安装完成屏幕*


    至此，您已安装了 OID Middleware Home 所需的二进制文件。OID 应用程序文件将被安装到此环境中。


    ## Oracle Internet Directory 安装


    在运行 Oracle 安装程序之前，确保选择正确的 JDK 至关重要。与安装 WLS 类似，设置 `JAVA_HOME` 目录，并确保 `PATH` 环境变量包含
    `JAVA_HOME/bin` 目录。


    运行 Identity Management 11.1.1.9 的安装程序以安装 OID，如图 [4-21](#A352855_1_En_4_Chapter.html#Fig21)
    所示。


    ![A352855_1_En_4_Fig21_HTML.jpg](A352855_1_En_4_Fig21_HTML.jpg)

    *图 4-21. Identity Management 11.1.1.9 安装软件的目录结构*


    从 Oracle 下载 Identity Management 11.1.1.9 软件后，在名为 `idm11.1.1.9` 的目录中解压文件。这将创建包含所有安装实用程序的
    `Disk1` 到 `Disk5` 目录。在 `Disk1` 目录中，运行文件 `runInstaller`。这将打开如图 [4-22](#A352855_1_En_4_Chapter.html#Fig22)
    所示的屏幕。


    ![A352855_1_En_4_Fig22_HTML.jpg](A352855_1_En_4_Fig22_HTML.jpg)

    *图 4-22. 列出的安装步骤*


    此时，您可以从 Oracle 的支持站点搜索更新。但此操作不是必需的。图 [4-23](#A352855_1_En_4_Chapter.html#Fig23)
    显示了您可以选择搜索更新的屏幕。


    ![A352855_1_En_4_Fig23_HTML.jpg](A352855_1_En_4_Fig23_HTML.jpg)

    *图 4-23. 安装软件更新屏幕*


    本节的计划是安装二进制文件。不要进行安装和配置，因为这将在后续步骤中完成。如图 [4-24](#A352855_1_En_4_Chapter.html#Fig24)
    所示，在继续之前选择“安装软件 - 不配置”选项。


    ![A352855_1_En_4_Fig24_HTML.jpg](A352855_1_En_4_Fig24_HTML.jpg)

    *图 4-24. 选择安装类型屏幕*


    系统会检查所需的软件包并确保满足最低要求。如果任何检查导致错误，则必须在继续之前进行修正。警告应予以纠正。虽然警告可能不会导致安装错误，但它们可能导致未来出现问题。图
    [4-25](#A352855_1_En_4_Chapter.html#Fig25) 显示所有先决条件检查已正确完成。


    ![A352855_1_En_4_Fig25_HTML.jpg](A352855_1_En_4_Fig25_HTML.jpg)

    *图 4-25. OID 安装先决条件检查屏幕*


    OID 环境将在所选的 Middleware Home 中创建 Oracle Home 结构。在本例中，Oracle Home 将位于 `/home/oracle/OIDMiddleware/`
    目录中，并命名为 `Oracle_IDM1`。图 [4-26](#A352855_1_En_4_Chapter.html#Fig26) 显示了新的 Oracle
    Middleware Home。


    ![A352855_1_En_4_Fig26_HTML.jpg](A352855_1_En_4_Fig26_HTML.jpg)

    *图 4-26. 选择 Middleware Home 和 Oracle Home 位置*


    “指定安全更新”屏幕允许您输入电子邮件地址，以便在系统需要未来更新时接收通知。您可以选择不填写此信息而继续，但请务必定期检查 Oracle 支持以获取环境所需的更新。有关此步骤的详细信息，请参见图
    [4-27](#A352855_1_En_4_Chapter.html#Fig27)。


    ![A352855_1_En_4_Fig27_HTML.jpg](A352855_1_En_4_Fig27_HTML.jpg)

    *图 4-27. 安全更新选择加入选项*


    在安装 Oracle Identity Management 期间，需要输入的步骤并不多。图 [4-28](#A352855_1_En_4_Chapter.html#Fig28)
    显示了摘要屏幕。


    ![A352855_1_En_4_Fig28_HTML.jpg](A352855_1_En_4_Fig28_HTML.jpg)

    *图 4-28. 安装摘要屏幕*


    在安装摘要屏幕上单击“安装”后，Universal Installer 开始复制文件并创建文件系统。您在初始步骤中做出的选择为此阶段的 Universal
    Installer 提供了指导。图 [4-29](#A352855_1_En_4_Chapter.html#Fig29) 显示了安装进度屏幕，其中包含一个连续的进度条。


    ![A352855_1_En_4_Fig29_HTML.jpg](A352855_1_En_4_Fig29_HTML.jpg)

    *图 4-29. 安装进度屏幕*


    安装完成后，有两个脚本需要以主机 `ROOT` 用户身份运行。以 root 用户身份登录终端窗口并运行指定的脚本。图 [4-30](#A352855_1_En_4_Chapter.html#Fig30)
    所示的屏幕指出了必要的脚本。以 `Root` 身份登录服务器来运行这些脚本。


    ![A352855_1_En_4_Fig30_HTML.jpg](A352855_1_En_4_Fig30_HTML.jpg)

    *图 4-30. Root 脚本*


    ```

    [root@clouddemolab ∼]# cd /home/oracle/OIDMiddleware/

    [root@clouddemolab OIDMiddleware]# cd Oracle_IDM1/

    [root@clouddemolab Oracle_IDM1]# ./oracleRoot.sh

    [root@clouddemolab Oracle_IDM1]#

    ```


    在为 OID 配置域之前，您应决定此环境是否要进行集群。如果您的环境计划考虑冗余，请在任何其他要包含的主机上重复前面的步骤来安装 WLS 和 OID 软件。还应运行
    RCU 以在另一个数据库中为其他服务器创建 Oracle Directory Services 模式。


    ## Oracle Internet Directory 配置


    在本节中，您将在 WLS 环境中配置 OID 域。在继续之前，您应了解要使用的配置场景：


    *   在新的 WebLogic 域中配置带有 Oracle Directory Integration Platform (DIP) 和 Oracle Directory
    Service Manager (ODSM) 的 OID。

    *   将使用 Fusion Middleware Control 和 WebLogic 管理控制台来管理 OID 环境。

    *   将使用 Directory Integration Platform (DIP) 将 OID 与第三方 LDAP 源同步。

    *   将使用 ODSM 管理 LDAP 目录实例。

    *   Oracle Fusion Middleware 环境中不存在其他 WebLogic 域。'
  raw: '![A352855_1_En_4_Fig18_HTML.jpg](A352855_1_En_4_Fig18_HTML.jpg)


    Figure 4-18.


    WLS server and coherence installation locations


    The Installation Summary screen, shown in Figure [4-19](#A352855_1_En_4_Chapter.html#Fig19),
    displays a confirmation of all the WLS components that will be installed. Use
    this to review and make any changes. Note that this installation is set to install
    all components except the Evaluation Database.


    ![A352855_1_En_4_Fig19_HTML.jpg](A352855_1_En_4_Fig19_HTML.jpg)


    Figure 4-19.


    Installation Summary screen


    At the end of the WLS installation, the Installation Complete screen is displayed,
    as shown in Figure [4-20](#A352855_1_En_4_Chapter.html#Fig20). You are presented
    with the Run Quickstart check box. In this scenario, clear this check box. The
    domain configuration will be performed after installing OID into this Middleware
    Home.


    ![A352855_1_En_4_Fig20_HTML.jpg](A352855_1_En_4_Fig20_HTML.jpg)


    Figure 4-20.


    WebLogic Server Installation Complete screen


    You have now installed the binaries required for the OID Middleware Home. The
    OID application files will be installed into this environment.


    ## Oracle Internet Directory Installation


    Before running the Oracle Installer, it is important to ensure that the proper
    JDK is selected. Just like installing WLS, set the `JAVA_HOME` directory and ensure
    the `PATH` environment variable includes the `JAVA_HOME/bin` directory.


    Run the installer for the Identity Management 11.1.1.9 to install OID as shown
    in Figure [4-21](#A352855_1_En_4_Chapter.html#Fig21).


    ![A352855_1_En_4_Fig21_HTML.jpg](A352855_1_En_4_Fig21_HTML.jpg)


    Figure 4-21.


    Directory structure for the Identity Management 11.1.1.9 installation software


    After downloading the Identity Management 11.1.1.9 software from Oracle, unzip
    the files in a directory called `idm11.1.1.9`. This creates the `Disk1` through
    `Disk5` directories containing all the installation utilities. Within the `Disk1`
    directory, run the file `runInstaller`. This will open the screen shown in Figure
    [4-22](#A352855_1_En_4_Chapter.html#Fig22).


    ![A352855_1_En_4_Fig22_HTML.jpg](A352855_1_En_4_Fig22_HTML.jpg)


    Figure 4-22.


    Installation steps listed


    At this point, you can search for updates on Oracle’s Support site. However, this
    is not required. Figure [4-23](#A352855_1_En_4_Chapter.html#Fig23) shows the screen
    on which you can search for updates if you choose.


    ![A352855_1_En_4_Fig23_HTML.jpg](A352855_1_En_4_Fig23_HTML.jpg)


    Figure 4-23.


    Install Software Updates screen


    In this section, the plan is to lay down the binaries. Do not install and configure,
    as this will be completed in a later step. As shown in Figure [4-24](#A352855_1_En_4_Chapter.html#Fig24),
    select the Install Software – Do Not Configure option before continuing.


    ![A352855_1_En_4_Fig24_HTML.jpg](A352855_1_En_4_Fig24_HTML.jpg)


    Figure 4-24.


    Select Installation Type screen


    The system is checked for required packages and to ensure it meets the minimum
    requirements. If any of these checks result in errors, they must be corrected
    before continuing. Warnings should be corrected. Although warnings might not cause
    installation errors, they could result in future problems. Figure [4-25](#A352855_1_En_4_Chapter.html#Fig25)
    shows that all prerequisite checks have completed properly.


    ![A352855_1_En_4_Fig25_HTML.jpg](A352855_1_En_4_Fig25_HTML.jpg)


    Figure 4-25.


    OID Installation Prerequisite Checks screen


    The OID environment will create the Oracle Home structure within the chosen Middleware
    Home. In this case, the Oracle Home will be located in the `/home/oracle/OIDMiddleware/`
    directory and be called `Oracle_IDM1`. Figure [4-26](#A352855_1_En_4_Chapter.html#Fig26)
    displays the new Oracle Middleware Home.


    ![A352855_1_En_4_Fig26_HTML.jpg](A352855_1_En_4_Fig26_HTML.jpg)


    Figure 4-26.


    Choose a Middleware Home and Oracle Home location


    The Specify Security Updates screen allows you to enter your e-mail address and
    be notified of future updates needed by the system. You can continue without filling
    this information in, but be sure to periodically check Oracle Support for necessary
    updates to your environments. See Figure [4-27](#A352855_1_En_4_Chapter.html#Fig27)
    for details on this step.


    ![A352855_1_En_4_Fig27_HTML.jpg](A352855_1_En_4_Fig27_HTML.jpg)


    Figure 4-27.


    Security Updates opt in selection


    There are not many steps that require input during the installation of Oracle
    Identity Management. Figure [4-28](#A352855_1_En_4_Chapter.html#Fig28) shows the
    summary screen.


    ![A352855_1_En_4_Fig28_HTML.jpg](A352855_1_En_4_Fig28_HTML.jpg)


    Figure 4-28.


    Installation Summary screen


    After you click Install on the Installation Summary screen, the Universal Installer
    begins copying files and creating the filesystem. The choices you made during
    the initial steps provide instruction to the Universal Installer during this phase.
    Figure [4-29](#A352855_1_En_4_Chapter.html#Fig29) shows the Installation Progress
    screen, which shows a continuous progress bar.


    ![A352855_1_En_4_Fig29_HTML.jpg](A352855_1_En_4_Fig29_HTML.jpg)


    Figure 4-29.


    Installation Progress screen


    After the installation completes, there are two scripts that need to be run as
    the host `ROOT` user. Log in to a terminal window as the root user and run the
    specified scripts. The screen shown in Figure [4-30](#A352855_1_En_4_Chapter.html#Fig30)
    indicates the necessary scripts. Log in to the server as `Root` to run these.


    ![A352855_1_En_4_Fig30_HTML.jpg](A352855_1_En_4_Fig30_HTML.jpg)


    Figure 4-30.


    Root scripts


    ```

    [root@clouddemolab ∼]# cd /home/oracle/OIDMiddleware/

    [root@clouddemolab OIDMiddleware]# cd Oracle_IDM1/

    [root@clouddemolab Oracle_IDM1]# ./oracleRoot.sh

    [root@clouddemolab Oracle_IDM1]#

    ```


    Before configuring the domain for OID, you should decide if this environment is
    to be clustered. If your environment is planned with redundancy in mind, repeat
    the previous steps for installing the WLS and OID software on any additional hosts
    to be included. The RCU should also be run to create the Oracle Directory Services
    schema in another database for the additional servers.


    ## Oracle Internet Directory Configuration


    In this section, you will be configuring the OID domain within the WLS environment.
    Before proceeding, you should have an understanding of the configuration scenario
    to be used:


    *   OID with Oracle Directory Integration Platform (DIP) and Oracle Directory
    Service Manager (ODSM) in a new WebLogic domain.

    *   Fusion Middleware Control and the WebLogic Administration Console will be
    used to manage the OID environment.

    *   Directory Integration Platform (DIP) will be utilized to synchronize OID with
    third-party LDAP sources.

    *   ODSM will be used to manage the LDAP Directory instance.

    *   No other WebLogic domain exists within the Oracle Fusion Middleware environment.'
  trans: '# Oracle Internet Directory 安装与配置


    ![A352855_1_En_4_Fig18_HTML.jpg](img/A352855_1_En_4_Fig18_HTML.jpg)

    *图 4-18. WLS 服务器与 Coherence 安装位置*


    安装摘要屏幕（如图 4-19 所示）确认了所有将要安装的 WLS 组件。使用此屏幕进行复查并进行任何更改。请注意，此安装设置为安装除评估数据库之外的所有组件。


    ![A352855_1_En_4_Fig19_HTML.jpg](img/A352855_1_En_4_Fig19_HTML.jpg)

    *图 4-19. 安装摘要屏幕*


    WLS 安装结束时，将显示安装完成屏幕，如图 4-20 所示。界面中会呈现“运行快速启动”复选框。在此场景中，请清除此复选框。域配置将在之后将 OID 安装到此
    Middleware Home 中时进行。


    ![A352855_1_En_4_Fig20_HTML.jpg](img/A352855_1_En_4_Fig20_HTML.jpg)

    *图 4-20. WebLogic Server 安装完成屏幕*


    至此，您已安装了 OID Middleware Home 所需的二进制文件。OID 应用程序文件将被安装到此环境中。


    ## Oracle Internet Directory 安装


    在运行 Oracle 安装程序之前，确保选择正确的 JDK 至关重要。与安装 WLS 类似，设置 `JAVA_HOME` 目录，并确保 `PATH` 环境变量包含
    `JAVA_HOME/bin` 目录。


    运行 Identity Management 11.1.1.9 的安装程序以安装 OID，如图 4-21 所示。


    ![A352855_1_En_4_Fig21_HTML.jpg](img/A352855_1_En_4_Fig21_HTML.jpg)

    *图 4-21. Identity Management 11.1.1.9 安装软件的目录结构*


    从 Oracle 下载 Identity Management 11.1.1.9 软件后，在名为 `idm11.1.1.9` 的目录中解压文件。这将创建包含所有安装实用程序的
    `Disk1` 到 `Disk5` 目录。在 `Disk1` 目录中，运行文件 `runInstaller`。这将打开如图 4-22 所示的屏幕。


    ![A352855_1_En_4_Fig22_HTML.jpg](img/A352855_1_En_4_Fig22_HTML.jpg)

    *图 4-22. 列出的安装步骤*


    此时，您可以从 Oracle 的支持站点搜索更新。但此操作不是必需的。图 4-23 显示了您可以选择搜索更新的屏幕。


    ![A352855_1_En_4_Fig23_HTML.jpg](img/A352855_1_En_4_Fig23_HTML.jpg)

    *图 4-23. 安装软件更新屏幕*


    本节的计划是安装二进制文件。不要进行安装和配置，因为这将在后续步骤中完成。如图 4-24 所示，在继续之前选择“安装软件 - 不配置”选项。


    ![A352855_1_En_4_Fig24_HTML.jpg](img/A352855_1_En_4_Fig24_HTML.jpg)

    *图 4-24. 选择安装类型屏幕*


    系统会检查所需的软件包并确保满足最低要求。如果任何检查导致错误，则必须在继续之前进行修正。警告应予以纠正。虽然警告可能不会导致安装错误，但它们可能导致未来出现问题。图
    4-25 显示所有先决条件检查已正确完成。


    ![A352855_1_En_4_Fig25_HTML.jpg](img/A352855_1_En_4_Fig25_HTML.jpg)

    *图 4-25. OID 安装先决条件检查屏幕*


    OID 环境将在所选的 Middleware Home 中创建 Oracle Home 结构。在本例中，Oracle Home 将位于 `/home/oracle/OIDMiddleware/`
    目录中，并命名为 `Oracle_IDM1`。图 4-26 显示了新的 Oracle Middleware Home。


    ![A352855_1_En_4_Fig26_HTML.jpg](img/A352855_1_En_4_Fig26_HTML.jpg)

    *图 4-26. 选择 Middleware Home 和 Oracle Home 位置*


    “指定安全更新”屏幕允许您输入电子邮件地址，以便在系统需要未来更新时接收通知。您可以选择不填写此信息而继续，但请务必定期检查 Oracle 支持以获取环境所需的更新。有关此步骤的详细信息，请参见图
    4-27。


    ![A352855_1_En_4_Fig27_HTML.jpg](img/A352855_1_En_4_Fig27_HTML.jpg)

    *图 4-27. 安全更新选择加入选项*


    在安装 Oracle Identity Management 期间，需要输入的步骤并不多。图 4-28 显示了摘要屏幕。


    ![A352855_1_En_4_Fig28_HTML.jpg](img/A352855_1_En_4_Fig28_HTML.jpg)

    *图 4-28. 安装摘要屏幕*


    在安装摘要屏幕上单击“安装”后，Universal Installer 开始复制文件并创建文件系统。您在初始步骤中做出的选择为此阶段的 Universal
    Installer 提供了指导。图 4-29 显示了安装进度屏幕，其中包含一个连续的进度条。


    ![A352855_1_En_4_Fig29_HTML.jpg](img/A352855_1_En_4_Fig29_HTML.jpg)

    *图 4-29. 安装进度屏幕*


    安装完成后，有两个脚本需要以主机 `ROOT` 用户身份运行。以 root 用户身份登录终端窗口并运行指定的脚本。图 4-30 所示的屏幕指出了必要的脚本。以
    `Root` 身份登录服务器来运行这些脚本。


    ![A352855_1_En_4_Fig30_HTML.jpg](img/A352855_1_En_4_Fig30_HTML.jpg)

    *图 4-30. Root 脚本*


    ```

    [root@clouddemolab ∼]# cd /home/oracle/OIDMiddleware/

    [root@clouddemolab OIDMiddleware]# cd Oracle_IDM1/

    [root@clouddemolab Oracle_IDM1]# ./oracleRoot.sh

    [root@clouddemolab Oracle_IDM1]#

    ```


    在为 OID 配置域之前，您应决定此环境是否要进行集群。如果您的环境计划考虑冗余，请在任何其他要包含的主机上重复前面的步骤来安装 WLS 和 OID 软件。还应运行
    RCU 以在另一个数据库中为其他服务器创建 Oracle Directory Services 模式。


    ## Oracle Internet Directory 配置


    在本节中，您将在 WLS 环境中配置 OID 域。在继续之前，您应了解要使用的配置场景：


    *   在新的 WebLogic 域中配置带有 Oracle Directory Integration Platform (DIP) 和 Oracle Directory
    Service Manager (ODSM) 的 OID。

    *   将使用 Fusion Middleware Control 和 WebLogic 管理控制台来管理 OID 环境。

    *   将使用 Directory Integration Platform (DIP) 将 OID 与第三方 LDAP 源同步。

    *   将使用 ODSM 管理 LDAP 目录实例。

    *   Oracle Fusion Middleware 环境中不存在其他 WebLogic 域。'
- fmt: '## Configuration Type


    There a number of other scenarios that include installing OID and OVD within a
    new domain or existing domains. For the purposes of this discussion, it is assumed
    that these are new domains.


    Prior to beginning this step, WLS and Oracle Identity Management software should
    have been installed but not yet configured. If a Quickstart was run after installing
    WebLogic and the domain was created, you can extend that domain with OID, which
    is very similar to the steps presented here.


    ### 开始配置


    To begin the domain configuration, run the `config.sh` file located in the `$ORACLE_HOME/bin`
    directory. In this case, `ORACLE_HOME` is the location where the Oracle Identity
    Management software was installed, `/home/oracle/OIDMiddleware/Oracle_IDM1`. This
    is important, as there are other `config.sh` files located in other directories
    found in the Middleware environment. Figure [4-31](#A352855_1_En_4_Chapter.html#Fig31)
    shows the location of the configuration file to be used.


    ![A352855_1_En_4_Fig31_HTML.jpg](A352855_1_En_4_Fig31_HTML.jpg)

    Figure 4-31. Configuration of new WebLogic domain for Oracle Internet Directory


    ### 欢迎屏幕


    Just as before, the first screen you are presented with after starting the Configuration
    file is the Welcome screen, shown in Figure [4-32](#A352855_1_En_4_Chapter.html#Fig32).
    No action is necessary here. Just click Next to begin configuring OID.


    ![A352855_1_En_4_Fig32_HTML.jpg](A352855_1_En_4_Fig32_HTML.jpg)

    Figure 4-32. Domain configuration steps


    ### 选择域类型


    The screen shown in Figure [4-33](#A352855_1_En_4_Chapter.html#Fig33) allows you
    to choose whether to create a new domain, extend an existing one, or expand a
    cluster. Because this is a new installation, choose Create New Domain. If you
    ran the Quickstart earlier in the process, select Extend Existing Domain.


    ![A352855_1_En_4_Fig33_HTML.jpg](A352855_1_En_4_Fig33_HTML.jpg)

    Figure 4-33. Create a new domain


    ### 输入管理员信息


    Enter the name of the administration user, normally `weblogic`, and the desired
    password and the name you wish to use for the domain.


    ### 配置新域详情


    Because you are creating a new OID domain, you will be prompted for the details
    of the new domain. Figure [4-34](#A352855_1_En_4_Chapter.html#Fig34) shows the
    screen where you can enter values for the domain location, OID instance name,
    and instance location. It should be noted that you can create new OID instances
    at a later time.


    ![A352855_1_En_4_Fig34_HTML.jpg](A352855_1_En_4_Fig34_HTML.jpg)

    Figure 4-34. Configure the instance location and WebLogic Home directories


    ### 选择组件


    On the Configure Components screen, shown in Figure [4-35](#A352855_1_En_4_Chapter.html#Fig35),
    choose the Identity Management components you wish to deploy.


    ![A352855_1_En_4_Fig35_HTML.jpg](A352855_1_En_4_Fig35_HTML.jpg)

    Figure 4-35. Component selection for the new domain


    In this case, OID, OVD, and the DIP will all be installed in the Identity Management
    domain. As selections are made, the tool will automatically select any of the
    required components necessary to support the installation. It is recommended that
    you not change any of the preselected components.


    ### 配置端口


    After instructing the configuration tool where to install the new OID domain,
    you will have the option to configure the ports OID will use, as shown in Figure
    [4-36](#A352855_1_En_4_Chapter.html#Fig36).


    ![A352855_1_En_4_Fig36_HTML.jpg](A352855_1_En_4_Fig36_HTML.jpg)

    Figure 4-36. Port configuration


    It is possible to use the default ports on a new installation. If any of the ports
    are already in use, create a `staticports.ini` file and specify its location on
    this screen.


    Note

    There is a sample `staticports.ini` file located in the installation media. It
    is located in `Disk1/stage/Response`. You can copy this file and edit it as necessary
    to specify the ports to be used during the installation.


    ### 配置OVD（如果选择）


    If you have chosen to use OVD in addition to OID, the OVD information screen shown
    in Figure [4-37](#A352855_1_En_4_Chapter.html#Fig37) prompts you for the required
    information.


    ![A352855_1_En_4_Fig37_HTML.jpg](A352855_1_En_4_Fig37_HTML.jpg)

    Figure 4-37.'
