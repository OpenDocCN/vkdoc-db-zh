  trans: '## WebLogic Server 安装


    ![A352855_1_En_4_Fig18_HTML.jpg](img/A352855_1_En_4_Fig18_HTML.jpg)


    图 4-18. WLS 服务器和 Coherence 安装位置


    安装摘要屏幕（如图 4-19 所示）会显示所有将要安装的 WLS 组件的确认信息。请使用此屏幕进行复查并做出任何更改。请注意，此安装设置将安装除评估数据库之外的所有组件。


    ![A352855_1_En_4_Fig19_HTML.jpg](img/A352855_1_En_4_Fig19_HTML.jpg)


    图 4-19. 安装摘要屏幕


    在 WLS 安装结束时，会显示安装完成屏幕，如图 4-20 所示。您将看到“运行快速启动”复选框。在此场景中，请清除此复选框。将在把 OID 安装到此中间件主目录之后再执行域配置。


    ![A352855_1_En_4_Fig20_HTML.jpg](img/A352855_1_En_4_Fig20_HTML.jpg)


    图 4-20. WebLogic Server 安装完成屏幕


    至此，您已安装 OID 中间件主目录所需的二进制文件。OID 应用程序文件将安装到此环境中。


    ## Oracle Internet Directory 安装


    在运行 Oracle 安装程序之前，确保选择了正确的 JDK 非常重要。与安装 WLS 类似，设置 `JAVA_HOME` 目录，并确保 `PATH` 环境变量包含
    `JAVA_HOME/bin` 目录。


    运行 Identity Management 11.1.1.9 的安装程序以安装 OID，如图 4-21 所示。


    ![A352855_1_En_4_Fig21_HTML.jpg](img/A352855_1_En_4_Fig21_HTML.jpg)


    图 4-21. Identity Management 11.1.1.9 安装软件的目录结构


    从 Oracle 下载 Identity Management 11.1.1.9 软件后，将文件解压缩到名为 `idm11.1.1.9` 的目录中。这将创建
    `Disk1` 到 `Disk5` 目录，其中包含所有安装实用程序。在 `Disk1` 目录中，运行文件 `runInstaller`。这将打开如图 4-22
    所示的屏幕。


    ![A352855_1_En_4_Fig22_HTML.jpg](img/A352855_1_En_4_Fig22_HTML.jpg)


    图 4-22. 列出的安装步骤


    此时，您可以搜索 Oracle 支持站点上的更新。但是，这不是必需的。图 4-23 显示了如果您选择，可以搜索更新的屏幕。


    ![A352855_1_En_4_Fig23_HTML.jpg](img/A352855_1_En_4_Fig23_HTML.jpg)


    图 4-23. 安装软件更新屏幕


    在本节中，计划仅部署二进制文件。请勿安装和配置，因为这将在后面的步骤中完成。如图 4-24 所示，在继续之前选择“安装软件 – 不配置”选项。


    ![A352855_1_En_4_Fig24_HTML.jpg](img/A352855_1_En_4_Fig24_HTML.jpg)


    图 4-24. 选择安装类型屏幕


    系统会检查所需的软件包并确保满足最低要求。如果这些检查中的任何一项出现错误，必须在继续之前予以纠正。警告应予以纠正。虽然警告可能不会导致安装错误，但它们可能会在未来引发问题。图
    4-25 显示所有先决条件检查已正确完成。


    ![A352855_1_En_4_Fig25_HTML.jpg](img/A352855_1_En_4_Fig25_HTML.jpg)


    图 4-25. OID 安装先决条件检查屏幕


    OID 环境将在所选的中间件主目录中创建 Oracle 主目录结构。在本例中，Oracle 主目录将位于 `/home/oracle/OIDMiddleware/`
    目录中，并命名为 `Oracle_IDM1`。图 4-26 显示了新的 Oracle 中间件主目录。


    ![A352855_1_En_4_Fig26_HTML.jpg](img/A352855_1_En_4_Fig26_HTML.jpg)


    图 4-26. 选择中间件主目录和 Oracle 主目录位置


    “指定安全更新”屏幕允许您输入您的电子邮件地址，以便在系统需要未来更新时接收通知。您可以不填写此信息而继续，但请务必定期检查 Oracle 支持，以获取环境所需的更新。有关此步骤的详细信息，请参见图
    4-27。


    ![A352855_1_En_4_Fig27_HTML.jpg](img/A352855_1_En_4_Fig27_HTML.jpg)


    图 4-27. 安全更新选择加入


    在安装 Oracle Identity Management 期间，需要输入的步骤并不多。图 4-28 显示了摘要屏幕。


    ![A352855_1_En_4_Fig28_HTML.jpg](img/A352855_1_En_4_Fig28_HTML.jpg)


    图 4-28. 安装摘要屏幕


    您在“安装摘要”屏幕上单击“安装”后，通用安装程序开始复制文件并创建文件系统。您在初始步骤中所做的选择为此阶段的通用安装程序提供了指导。图 4-29 显示了安装进度屏幕，其中显示了一个连续的进度条。


    ![A352855_1_En_4_Fig29_HTML.jpg](img/A352855_1_En_4_Fig29_HTML.jpg)


    图 4-29. 安装进度屏幕


    安装完成后，需要以主机 `ROOT` 用户身份运行两个脚本。以 root 用户身份登录终端窗口并运行指定的脚本。如图 4-30 所示的屏幕指示了必要的脚本。以
    `Root` 身份登录服务器以运行这些脚本。


    ![A352855_1_En_4_Fig30_HTML.jpg](img/A352855_1_En_4_Fig30_HTML.jpg)


    图 4-30. Root 脚本


    ```

    [root@clouddemolab ∼]# cd /home/oracle/OIDMiddleware/

    [root@clouddemolab OIDMiddleware]# cd Oracle_IDM1/

    [root@clouddemolab Oracle_IDM1]# ./oracleRoot.sh

    [root@clouddemolab Oracle_IDM1]#

    ```


    在为 OID 配置域之前，您应决定此环境是否要设置为集群。如果您的环境规划考虑了冗余，请在要包含的任何其他主机上重复先前安装 WLS 和 OID 软件的步骤。还应运行
    RCU 在另一个数据库中为额外的服务器创建 Oracle Directory Services 模式。


    ## Oracle Internet Directory 配置


    在本节中，您将在 WLS 环境中配置 OID 域。在继续之前，您应了解要使用的配置场景：


    *   在新建的 WebLogic 域中配置包含 Oracle Directory Integration Platform (DIP) 和 Oracle
    Directory Service Manager (ODSM) 的 OID。

    *   将使用 Fusion Middleware Control 和 WebLogic 管理控制台来管理 OID 环境。

    *   将使用目录集成平台 (DIP) 将 OID 与第三方 LDAP 源进行同步。

    *   将使用 ODSM 来管理 LDAP 目录实例。

    *   Oracle Fusion Middleware 环境内不存在其他 WebLogic 域。'
- fmt: '### Configuration Type


    There a number of other scenarios that include installing OID and OVD within a
    new domain or existing domains. For the purposes of this discussion, it is assumed
    that these are new domains.


    Prior to beginning this step, WLS and Oracle Identity Management software should
    have been installed but not yet configured. If a Quickstart was run after installing
    WebLogic and the domain was created, you can extend that domain with OID, which
    is very similar to the steps presented here.


    To begin the domain configuration, run the `config.sh` file located in the `$ORACLE_HOME/bin`
    directory. In this case, `ORACLE_HOME` is the location where the Oracle Identity
    Management software was installed, `/home/oracle/OIDMiddleware/Oracle_IDM1`. This
    is important, as there are other `config.sh` files located in other directories
    found in the Middleware environment. Figure [4-31](#A352855_1_En_4_Chapter.html#Fig31)
    shows the location of the configuration file to be used.


    ![A352855_1_En_4_Fig31_HTML.jpg](A352855_1_En_4_Fig31_HTML.jpg)

    Figure 4-31. Configuration of new WebLogic domain for Oracle Internet Directory


    Just as before, the first screen you are presented with after starting the Configuration
    file is the Welcome screen, shown in Figure [4-32](#A352855_1_En_4_Chapter.html#Fig32).
    No action is necessary here. Just click Next to begin configuring OID.


    ![A352855_1_En_4_Fig32_HTML.jpg](A352855_1_En_4_Fig32_HTML.jpg)

    Figure 4-32. Domain configuration steps


    The screen shown in Figure [4-33](#A352855_1_En_4_Chapter.html#Fig33) allows you
    to choose whether to create a new domain, extend an existing one, or expand a
    cluster. Because this is a new installation, choose Create New Domain. If you
    ran the Quickstart earlier in the process, select Extend Existing Domain.


    ![A352855_1_En_4_Fig33_HTML.jpg](A352855_1_En_4_Fig33_HTML.jpg)

    Figure 4-33. Create a new domain


    Enter the name of the administration user, normally `weblogic`, and the desired
    password and the name you wish to use for the domain.


    Because you are creating a new OID domain, you will be prompted for the details
    of the new domain. Figure [4-34](#A352855_1_En_4_Chapter.html#Fig34) shows the
    screen where you can enter values for the domain location, OID instance name,
    and instance location. It should be noted that you can create new OID instances
    at a later time.


    ![A352855_1_En_4_Fig34_HTML.jpg](A352855_1_En_4_Fig34_HTML.jpg)

    Figure 4-34. Configure the instance location and WebLogic Home directories


    On the Configure Components screen, shown in Figure [4-35](#A352855_1_En_4_Chapter.html#Fig35),
    choose the Identity Management components you wish to deploy.


    ![A352855_1_En_4_Fig35_HTML.jpg](A352855_1_En_4_Fig35_HTML.jpg)

    Figure 4-35. Component selection for the new domain


    In this case, OID, OVD, and the DIP will all be installed in the Identity Management
    domain. As selections are made, the tool will automatically select any of the
    required components necessary to support the installation. It is recommended that
    you not change any of the preselected components.


    After instructing the configuration tool where to install the new OID domain,
    you will have the option to configure the ports OID will use, as shown in Figure
    [4-36](#A352855_1_En_4_Chapter.html#Fig36).


    ![A352855_1_En_4_Fig36_HTML.jpg](A352855_1_En_4_Fig36_HTML.jpg)

    Figure 4-36. Port configuration


    It is possible to use the default ports on a new installation. If any of the ports
    are already in use, create a `staticports.ini` file and specify its location on
    this screen.


    > **Note**

    >

    > There is a sample `staticports.ini` file located in the installation media.
    It is located in `Disk1/stage/Response`. You can copy this file and edit it as
    necessary to specify the ports to be used during the installation.


    If you have chosen to use OVD in addition to OID, the OVD information screen shown
    in Figure [4-37](#A352855_1_En_4_Chapter.html#Fig37) prompts you for the required
    information.


    ![A352855_1_En_4_Fig37_HTML.jpg](A352855_1_En_4_Fig37_HTML.jpg)

    Figure 4-37.'
