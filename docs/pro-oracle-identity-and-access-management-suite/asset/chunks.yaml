  trans: '

    ## 配置 Oracle Identity Manager 服务器


    至此，`OID` 已配置为 `OIM` 的身份存储，可以继续配置 Identity Manager 服务器。在之前的章节中，您已在独立的 WebLogic
    Middleware Home 中创建了新的 `OIM` 域。该步骤配置了管理服务器、面向服务的架构（`SOA`）服务器和 Identity Management
    服务器。本节将在此基础上继续，为启动 `OIM` 做准备。


    是时候启动 WebLogic 管理服务器和 `SOA` 服务器了。在配置 Identity Manager 之前，这些服务必须正在运行。切换到 Identity
    Management 域目录 `/home/oracle/IDMMiddleware/user_projects/oim_domain`。执行命令 `startWeblogic.sh`。如果您希望此进程在后台启动，可以使用
    `nohup` 执行该命令，例如 `nohup ./startWeblogic.sh > weblogic.out &`。这将把命令的输出重定向到文件 `weblogic.out`。要实现此操作，`WLS`
    必须配置为以开发模式启动。如果服务器配置为生产模式启动，则您需要确保 `boot.properties` 文件已就位。接下来启动 `SOA`。这可以通过在
    `bin` 目录中执行 `./startManagedWebLogic.sh soa_server1` 来完成。


    **注意**


    要在后台启动服务器，必须在安全目录中存在 `boot.properties` 文件，或者服务器必须处于开发模式。


    在 `<Domain Home>/servers/<ServerName>/security` 目录中，创建一个名为 `boot.properties` 的文件，格式如下：


    ```

    username=weblogic

    password=<your_password>

    ```


    现在，WebLogic 管理服务器和 `SOA` 服务器已启动，您可以继续配置 Identity Manager 服务器。


    导航到 `<Middleware_Home>/Oracle_IDM1/bin`，其中 `Middleware_Home` 是您安装 `OIM` 的目录。在本例中，它是
    `/home/oracle/IDMMiddleware`。在 `bin` 目录中，执行 `config.sh`：


    ```

    ./config.sh

    ```


    **注意**


    此步骤仅运行此目录中的 `config.sh` 文件。其他位置可能也存在 `config.sh` 文件，但只有这个会启动正确的 GUI。


    第一步是选择在此步骤中要配置的组件。必需的组件是 `OIM` 服务器。`OIM` 设计控制台和 `OIM` 远程管理器只能安装在 Microsoft Windows
    上，因此您不会在此处安装它们。如果您决定稍后在单独的服务器上安装它们，可以进行安装。请如图 10-8 所示进行选择。


    ![A352855_1_En_10_Fig8_HTML.jpg](img/A352855_1_En_10_Fig8_HTML.jpg)


    图 10-8. 选择要配置的组件


    选择要配置的组件后，工具将询问有关 `OIM` 安装的数据库信息。您在安装软件时已创建了必要的存储库数据库对象。这里您将指定详细信息。图 10-9 显示了数据库连接屏幕。


    ![A352855_1_En_10_Fig9_HTML.jpg](img/A352855_1_En_10_Fig9_HTML.jpg)


    图 10-9. 数据库信息


    连接字符串应按 `hostname:port:sid` 格式输入。在本例中，您有一个数据库实例。如果您使用的是 `RAC` 数据库，可以按如下方式输入两个节点：`host1:port1:instancename1^host2:port2:instancename2@<ServiceName>`。


    `OIM` 模式用户名是本书前面 `RCU` 操作期间输入的模式名称。本例中，使用 `imdev_oim`。


    `OIM` 模式密码在下一行输入。您在 `RCU` 操作期间提供了此密码。


    `MDS` 连接字符串默认与已输入的连接字符串值相同。如果您将 `MDS` 模式安装在不同的数据库中，请选中“为 `MDS` 模式选择不同的数据库”复选框，您将能够编辑此字段。


    `MDS` 模式用户名应包含 `RCU` 操作期间配置的用户名，本例中为 `imdev_mds`。

    '
- fmt: '## OIM 服务器配置


    MDS Schema Password 应包含 `imdev_mds` 的密码。


    在初始域创建步骤中，您已配置了一个用于承载 OIM 的 WebLogic 域。您将 Administration Server 配置在端口 27001 上。请输入
    Administration Server 的 URL，包括端口，如图 [10-10](#A352855_1_En_10_Chapter.html#Fig10)
    所示。请注意，在此情况下，您必须使用 T3 协议以 `t3://hostname:port` 的格式输入 URL。输入 WebLogic 用户名和密码，然后单击“下一步”继续。


    ![A352855_1_En_10_Fig10_HTML.jpg](A352855_1_En_10_Fig10_HTML.jpg)

    *图 10-10. WLS 信息*


    下一步允许您配置新的 OIM 服务器的详细信息。图 [10-11](#A352855_1_En_10_Chapter.html#Fig11) 显示了收集新的
    OIM 管理员密码和密钥库密码的屏幕。请记下这些值，因为它们在后续过程中是必需的。


    ![A352855_1_En_10_Fig11_HTML.jpg](A352855_1_En_10_Fig11_HTML.jpg)

    *图 10-11. OIM 服务器配置*


    OIM Administrator Password 应设置为您能记住的密码。OIM HTTP URL 是将用于 Identity Manager 的 URL。如果您在
    OIM 服务器前部署了 Oracle HTTP Server (OHS)，请在此处输入其 URL。如果您尚未安装 OHS 服务器，可以稍后更新此设置。输入并确认一个
    Keystore Password。


    选中“Enable OIM for Suite Integration”复选框。此环境将包含 OAM 和 OIM 集成。同步是必需的。本章前面已介绍了此操作的先决条件步骤。如果您尚未完成这些步骤，请立即返回完成后再继续。


    在 10 个步骤中的第 6 步，系统将提示您输入 OIM 使用的 LDAP 身份存储。图 [10-12](#A352855_1_En_10_Chapter.html#Fig12)
    显示了 LDAP 服务器屏幕。


    ![A352855_1_En_10_Fig12_HTML.jpg](A352855_1_En_10_Fig12_HTML.jpg)

    *图 10-12. 目录服务器配置*


    在之前的步骤中，您已预配置了此身份存储。在此示例中，您使用的是 OID。


    *   选择 OID 作为 Directory Server Type。

    *   输入一个 Directory Server ID。这应该是唯一的。

    *   以 `ldap://hostname:ldapport.` 的格式输入 LDAP 服务器连接信息。

    *   输入 OIM 将用于连接和执行操作的 Server User。这不应是 `cn=orcladmin` 用户。相反，在预配置步骤中，您创建了一个名为
    `oimadminuser` 的用户。请使用完整专有名称输入它：`cn=oimadminuser,cn=systemids,dc=mycompany,dc=com`。

    *   Server Password 期望您在预配置步骤中设置的密码。

    *   输入 Server SearchDN 作为包含用户和组容器的顶层容器名称。


    由于您选择了启用 LDAP 同步，配置工具将提醒您完成预配置步骤，如图 [10-13](#A352855_1_En_10_Chapter.html#Fig13)
    所示。如果您尚未完成，请返回本章相应部分并立即完成步骤。


    ![A352855_1_En_10_Fig13_HTML.jpg](A352855_1_En_10_Fig13_HTML.jpg)

    *图 10-13. 先决条件检查*


    图 [10-14](#A352855_1_En_10_Chapter.html#Fig14) 所示的 LDAP Server Continued 屏幕继续配置
    LDAP 身份目录。


    ![A352855_1_En_10_Fig14_HTML.jpg](A352855_1_En_10_Fig14_HTML.jpg)

    *图 10-14. LDAP 服务器信息*


    在此屏幕上，您将输入有关 OIM 将用于创建用户的用户和组容器的信息。


    *   LDAP RoleContainer 是组容器。

    *   输入描述。

    *   LDAP UserContainer 是 OIM 将管理的所有用户的位置。

    *   输入描述。

    *   User Reservation Container 是等待批准的新创建用户的临时存放区。


    图 [10-15](#A352855_1_En_10_Chapter.html#Fig15) 所示的 Configuration Summary 屏幕显示了已输入的配置参数的汇总。


    ![A352855_1_En_10_Fig15_HTML.jpg](A352855_1_En_10_Fig15_HTML.jpg)

    *图 10-15. 配置摘要屏幕*


    确保列出了您选择配置的组件。这也是再次检查您用于配置的值的机会。单击“Configure”继续。


    您现已完成 OIM 配置。服务器现在应配置为具有 OID 身份存储并启用了 LDAP 同步。图 [10-16](#A352855_1_En_10_Chapter.html#Fig16)
    显示了已完成的配置。


    ![A352855_1_En_10_Fig16_HTML.jpg](A352855_1_En_10_Fig16_HTML.jpg)

    *图 10-16. 配置完成屏幕*


    ## 完成 LDAP 安装后配置


    在上一节中，您完成了 OIM 配置。在该步骤中，您选择了“Enable OIM for Suite Integration”。这告知 OIM 您将使用 LDAP
    同步，这是 OAM 和 OIM 集成所必需的。在预配置期间，您运行了实用程序来准备 OID 以进行同步。现在是运行安装后任务以使其完成的时候了。


    在继续之前，请确保您的环境变量已为 `ldapconfigpostsetup` 实用程序正确设置。必须如下设置：


    *   `APP_SERVER=weblogic`

    *   `JAVA_HOME=/home/oracle/java/jdk1.6.0_45`

    *   `MW_HOME=/home/oracle/IDMMiddleware`

    *   `OIM_ORACLE_HOME=/home/oracle/IDMMiddleware/Oracle_IDM1`

    *   `WL_HOME=/home/oracle/IDMMiddleware/wlserver_10.3`

    *   `DOMAIN_HOME=/home/oracle/IDMMiddleware/user_projects/domains/idm_domain`


    在目录 `/home/oracle/IDMMiddleware/Oracle_IDM1/server/ldap_config_util` 中，您将找到一个名为
    `ldapconfig.props` 的文件。为此文件创建一个备份副本，并按如下所示进行编辑：


    ```

    # OIMServer Type, Valid values can be WLS, JBOSS, WAS

    # e.g.: OIMServerType=WLS

    OIMServerType=WLS

    # OIM Provider URL

    # if OIMServerType is WAS then

    #    OIMProviderURL=corbaloc:iiop:OIMServerBootStrapHost:OIMServerBootStrapPort

    #    hint:look for the OIM server bootStrapPort number in WAS admin console

    #    e.g.: corbaloc:iiop:hostName:2809

    # else OIMServerType is WLS then

    #      OIMProviderURL=t3://localhost:ManagedServerPort

    #      e.g.: OIMProviderURL=t3://localhost:14000

    OIMProviderURL=t3://10.0.70.229:14000

    # LDAP/OVD Server URL

    # If OVD server is selected during OIM installation, then provide

    # value for LDAPURL.

    # LDAPURL=ldap://:

    # e.g.: LDAPURL=ldap://OVDserver.us.oracle.com:6501

    #

    # If not, leave LDAPURL empty

    # e.g.: LDAPURL=

    LDAPURL=

    # If OVD server is selected during OIM installation, then provide

    # Admin user name to connect to LDAP/OVD Server

    # e.g.: LDAPAdminUsername=cn=oimAdminUser,cn=systemids,dc=us,dc=oracle,dc=com

    #

    # If not, leave LDAPAdminUsername empty

    # e.g.: LDAPAdminUsername=

    LDAPAdminUsername=

    # If OVD server is NOT selected during OIM installation, then provide

    # LIBOVD_PATH_PARAM=

    # e.g.: #LIBOVD_PATH_PARAM=/scratch/suramesh/Oracle/Middleware/user_projects/domains/base_domain/config/fmwconfig/ovd/oim

    LIBOVD_PATH_PARAM=

    # This is for FA C9, MT scenario where last changenumber from the standby

    # server is to be updated to the incremental recon. jobs, to be picked up,

    # once the primary/secondary replicated server comes up.

    # If the change number is not passed through this parameter, then logic is to

    # query the OVD and retrieve the same.

    ChangeLogNumber=

    ```


    对文件进行以下更改并保存：


    *   `OIMServerType=WLS`

    *   将 LDAP URL 留空，因为您未使用 Oracle Virtual Directory (OVD)。

    *   将 LDAPUsername 留空，因为您未使用 OVD。

    *   将 LIBOVD_PATH_PARAM 留空，因为您未使用 OVD。


