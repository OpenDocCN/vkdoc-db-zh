  trans: '

    ## 为 OIM 预配置 OID 身份存储


    由于计划包含集成 OIM 和 OAM，因此必须在 OIM 服务器内启用轻量目录访问协议 (LDAP) 同步。在配置过程中将会有一步启用 LDAP 同步。但是，为该步骤做准备，必须在继续之前完成先决条件步骤。这确保您的
    LDAP 存储，即 OID，将准备好用作 OIM 身份存储。这些说明适用于使用 OID。Oracle 支持其他 LDAP 存储，例如 Oracle Unified
    Directory、Oracle Virtual Directory、Active Directory 和 iPlanet/ODSEE，但这些不在本书讨论范围内。


    继续之前，按如下方式设置环境变量：


    ```bash

    MW_HOME=/home/oracle/OIDMiddleware

    ORACLE_INSTANCE=/home/oracle/OIDMiddleware/asinst_1

    ORACLE_HOME=/home/oracle/OIDMiddleware/Oracle_IDM1

    ```


    要将 OID 预配置为 OIM 的 LDAP 身份存储，首先创建一个名为 `oidContainers.ldif` 的文件，内容如下：


    ```ldif

    dn: cn=oracleAccounts,dc=mycompany,dc=com

    cn: oracleAccounts

    objectClass: top

    objectClass: orclContainer

    dn: cn=Users,cn=oracleAccounts,dc=mycompany,dc=com

    cn: Users

    objectClass: top

    objectClass: orclContainer

    dn: cn=Groups,cn=oracleAccounts,dc=mycompany,dc=com

    cn: Groups

    objectClass: top

    objectClass: orclContainer

    dn: cn=Reserve,cn=orcleAccounts,dc=mycompany,dc=com

    cn: Reserve

    objectClass: top

    objectClass: orclContainer

    ```


    此文件包含创建 OIM 用于同步的新容器所需的信息。使用 `ldapadd` 命令在 OID 中创建这些容器。例如：


    ```bash

    ldapadd –h 10.0.70.229 –p  3060 –D cn=orcladmin –w ****** –c –f oidContainers.ldif

    ```


    在此示例中，`-h` 是 OID 服务器的主机名，`-p` 是 OID 服务器的 LDAP 端口，`-D` 是 `cn=orcladmin`，`-w` 是
    oracladmin 的密码，`-f` 是 `oidContainers.ldif` 文件的完整路径。


    `ldapadd` 命令位于 OID 的 `ORACLE_HOME/bin` 目录中。


    创建用于启用 LDAP 同步的容器后，必须创建 Oracle Identity Manager 的 LDAP 同步过程所需的用户、组和 ACI。首先创建另一个名为
    `oimAdmin.ldif` 的文件，内容如下。


    ```ldif

    dn: cn=systemids,dc=mycompany,dc=com

    changetype: add

    objectclass: orclContainer

    objectclass: top

    cn: systemids

    dn: cn=oimAdminUser,cn=systemids,dc=mycompany,dc=com

    changetype: add

    objectclass: top

    objectclass: person

    objectclass: organizationalPerson

    objectclass: inetorgperson

    objectclass: orclusers

    objectclass: orcluserV2

    mail: oimAdminUser

    givenname: oimAdminUser

    sn: oimAdminUser

    cn: oimAdminUser

    uid: oimAdminUser

    userPassword: gundam1

    dn: cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com

    changetype: add

    objectclass: groupOfUniqueNames

    objectclass: orclPrivilegeGroup

    objectclass: top

    cn: oimAdminGroup

