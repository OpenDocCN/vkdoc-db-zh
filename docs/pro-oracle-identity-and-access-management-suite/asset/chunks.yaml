  trans: '## 访问策略


    大多数组织拥有不同的用户群体。例如，经理可能有权为其员工授予权限，服务台员工可能能够解锁或重置用户密码，而用户管理员则可以创建、修改和停用用户账户。尽管 `OIM`
    为各种用户类型提供了极大的灵活性，但必须将这些功能谨慎地分配给适当的用户，以确保整个系统的安全性。访问策略通过允许将角色分配给单个用户、用户组或符合特定条件的用户来实现这种安全性。这些选项对于建立一个易于管理的设置至关重要。


    访问策略定义了用户在系统内拥有的权限。外部客户用户或许能够注册其账户并管理诸如密码和个人信息等属性。然而，企业可能决定不允许外部用户在未致电服务台的情况下解锁其账户。另一方面，服务台用户通常被授予更多的权限。他们的访问权限可能包括创建和停用账户的能力。组织可以设置访问策略，允许员工请求新的权限，而经理可以使用工作流来批准或授予这些权限。`OIM`
    提供了框架，让企业能够建立用于管理身份数据的简单或复杂规则。


    ### 访问策略配置示例


    如果管理工具难以配置或使用，最终产品可能会受到影响。对于身份信息而言，这可能导致安全性薄弱。`OIM` 确保访问策略的配置以标准、易于使用的方式进行。图 13-1
    展示了 Identity Manager 的管理界面。在此界面上，您可以管理用户、角色、密码策略、管理角色等。就访问策略而言，您将导航到“管理角色”。这些角色用于控制
    `LDAP` 存储中哪些用户可以执行某些操作。


    ![A352855_1_En_13_Fig1_HTML.jpg](img/A352855_1_En_13_Fig1_HTML.jpg)

    *图 13-1. Oracle Identity Manager 管理界面*


    图 13-2 展示了开箱即用的 Oracle Identity Manager 管理角色默认列表。您可以根据需要添加和禁用这些角色。创建时，这些角色都没有成员。这取决于管理员来确定哪些用户组应该获得管理账户的能力。需要注意的是，这些实际上是可用于向各种用户授予权限并控制用户可以查看和修改哪些数据的模板。


    ![A352855_1_En_13_Fig2_HTML.jpg](img/A352855_1_En_13_Fig2_HTML.jpg)

    *图 13-2. 管理角色*


    编辑角色相当简单。系统提供了一系列选项卡，允许您编辑基本信息、功能、成员资格规则以及其适用的组织。图 13-3 展示了给定角色的可用选项卡。


    ![A352855_1_En_13_Fig3_HTML.jpg](img/A352855_1_En_13_Fig3_HTML.jpg)

    *图 13-3. 角色管理*


    在此示例中，您将查看 `OrclOIMUserHelpDesk` 角色。此角色可以提供给服务台人员，允许他们管理用户账户、重置密码、解锁账户以及向其他用户授予角色。


    图 13-4 所示的“功能”选项卡显示了分配 `HelpDesk` 角色的用户将能够执行的能力列表。在此案例中，服务台用户将能够创建、更新、删除以及以其他方式修改其控制范围内的用户账户（该范围将在本节后面讨论）。如果出于某种原因，此功能列表不符合组织的要求，管理员可以创建一个新的自定义访问策略，仅包含与其环境相匹配的功能。如果需要自定义策略，应保留默认策略并创建新策略。这将确保在出现问题时，原始配置保持不变。


    ![A352855_1_En_13_Fig4_HTML.jpg](img/A352855_1_En_13_Fig4_HTML.jpg)

    *图 13-4. 角色功能*


    一旦定义了访问策略并配置了功能，管理员必须确定系统中谁将被授予新的访问权限。标准访问权限，例如搜索和查看用户信息，可能会授予所有用户。但是，编辑账户的能力可能只授予少数精选人员。确定用户成员资格非常简单：您可以选择直接将用户添加到角色，或创建管理成员资格的规则。


    在图 13-5 所示的示例中，管理员创建了一个规则，只有用户名以文本 `HPDSK` 开头的用户才会被授予 `HelpDesk` 角色。在这种情况下，可能是服务台员工为承包商工作，或者其创建时带有表示所属部门的前缀。此规则可以轻松修改为基于其他
    `LDAP` 属性，例如部门或员工类型。图 13-6 展示了配置基于规则的成员资格查询的示例。


    ![A352855_1_En_13_Fig6_HTML.jpg](img/A352855_1_En_13_Fig6_HTML.jpg)

    *图 13-6. 基于规则的角色成员资格查询*


    ![A352855_1_En_13_Fig5_HTML.jpg](img/A352855_1_En_13_Fig5_HTML.jpg)

    *图 13-5. 角色成员资格*


    访问策略通常被授予一个控制范围。这用于定义该角色可用于控制的用户群体。例如，一项要求可能是客户支持组只能管理外部客户账户，而服务台只能处理内部员工账户。“控制范围”选项卡可用于指定这些规则。需要注意的是，如果组织有此类要求，可能需要为每个子组创建额外的角色。在图
    13-7 中，您可以看到服务台的控制范围已设置为包含基础 `OIM` 安装中包含的默认用户类型。如果您的组织有其他类型，请根据需要包含它们。在此示例中，您可以看到服务台可以管理
    `请求` 以及 `Top` 和默认 `Xellerate` 组织内的用户。包含子组织将确保控制权限被继承到任何子组织。


    ![A352855_1_En_13_Fig7_HTML.jpg](img/A352855_1_En_13_Fig7_HTML.jpg)

    *图 13-7. 控制范围*


    本章前面，您看到了一个设置 `Helpdesk` 管理角色的示例。此策略允许通过配置的规则授予此角色的用户管理其控制范围内的用户。一个用户可能被授予多个角色。需要记住的一点是，角色权限会叠加，这意味着用户将获得授予他们的每个角色的权限。然而，权限仍然是限制性的。这意味着，如果某个访问权限在一个角色中被明确限制，但在另一个角色中被授予，则用户将不会获得该权限。'
- fmt: "## Password Policies\n\n要求用户维护 OID 提供了在一定程度上控制密码策略的能力。OIM 添加了功能，以真正定制您组织的密码管理行为。\n\
    \n大多数组织都设置了策略，要求用户密码符合一组规则。这些规则可能包括最小字符数、大小写字符、特殊字符等。此类规则的组合增加了密码复杂性。密码越复杂，攻击者猜测或暴力破解它的难度就越大。\n\
    \n使用图 [13-8](#A352855_1_En_13_Chapter.html#Fig8) 所示的 Oracle Identity Manager 管理屏幕，您可以通过单击\
    \ `Policies` 并选择 `Password Policies` 来为组织创建和维护密码策略。\n\n![A352855_1_En_13_Fig8_HTML.jpg](A352855_1_En_13_Fig8_HTML.jpg)\n\
    \n图 13-8. Identity Manager 管理屏幕\n\n单击 `Manage Password Policies` 后，您将看到可用密码策略的列表。您可以创建新策略或使用默认策略。创建密码策略后，必须将该策略分配给适当的用户群体。OIM\
    \ 提供了根据需求为不同用户组分配不同密码规则的能力。例如，由于人力资源员工可以访问敏感的个人数据，他们可能需要维护更高水平的密码复杂性。图 [13-9](#A352855_1_En_13_Chapter.html#Fig9)\
    \ 所示的列表显示了为 OIM 用户创建的默认密码策略以及一个示例密码策略。虽然您可以修改此密码策略，但建议您创建自己的策略。\n\n![A352855_1_En_13_Fig9_HTML.jpg](A352855_1_En_13_Fig9_HTML.jpg)\n\
    \n图 13-9. 密码策略列表\n\n从图 [13-9](#A352855_1_En_13_Chapter.html#Fig9)（密码策略列表）中，您可以选择一个策略并进行编辑，以根据自己的要求进行定制。图\
    \ [13-10](#A352855_1_En_13_Chapter.html#Fig10) 显示了创建策略时可以使用的所有选项。\n\n![A352855_1_En_13_Fig10_HTML.jpg](A352855_1_En_13_Fig10_HTML.jpg)\n\
    \n图 13-10. 密码策略配置屏幕\n\n创建密码策略时，注意屏幕的各个部分非常重要。\n\n*   第一部分定义了密码的基本规则。\n    *  \
    \ `Minimum Length`：指定密码必须达到的字符数才能通过复杂性规则。\n    *   `Minimum Password Age (Days)`：定义用户必须使用密码多少天后才能再次更改它。使用数字\
    \ 0 允许在同一天更改密码。\n    *   `Warn After (Days)`：这是在系统向用户发送其密码即将过期的提醒通知之前的天数。通常在到期前三到五天发送。\n\
    \    *   `Disallow Past Passwords`：输入一个数字以禁止用户重复使用以前的密码。通常设置为禁止使用前五个密码。\n    *\
    \   `Expires After (Days)`：此数字确定密码在强制用户更改之前的最大有效期限。\n*   第二部分 `Complex Password`，可用于使用预配置的密码复杂性规则。它包括以下规则：\n\
    \    *   密码长度必须至少为六个字符。\n    *   密码必须满足以下五条规则中的三条：\n        *   必须包含大写字符。\n  \
    \      *   必须包含数字字符。\n        *   必须包含小写字符。\n        *   必须包含特殊字符（`!@#$%^&*`）。\n\
    \        *   必须包含 Unicode 字符。\n        *   不能包含用户的登录名、名字或姓氏。\n\n注意\n\n应当指出，默认\
    \ `Complex Password` 选择中列出的最小字符数实际上是基于屏幕第一部分中定义的字符数。如果您在该部分输入了 10 个字符，则 `Complex\
    \ Password` 规则选择实际上将要求 10 个字符，而不是所示的六个。\n\n此配置页面的第三部分 `Custom Policy`，允许对前述复杂规则进行完全定制。需要注意的是，对于单个密码策略，您只能使用\
    \ `Custom Policy` 或 `Complex Password`。在这里，您可以精确定义希望强制执行的规则。例如，可以要求五个大写字符和三个特殊字符，或者更多的数字字符。本节为您提供了对复杂性规则的完全控制。但是，请记住，如果密码策略限制性太强，可能会导致用户写下密码。\n\
    \n页面的最后部分是 `Challenge Options`。此部分用于配置 OIM，以允许用户在忘记密码或锁定帐户时回答一个或多个挑战问题。此选项可以通过允许用户自己管理锁定和忘记的密码，显著减少帮助台呼叫。\n\
    \n单击 `Enable Challenge Policy Support` 复选框后，配置选项将会出现。在这里，您可以配置适合您组织要求的自定义问题。您还可以允许用户输入自己的问题和答案。定义问题后，您还可以选择要求用户提供唯一的答案、定义答案的字符数，或两者兼有。为了进一步定制此系统，您可以根据需要输入任意多个问题，但允许用户在需要回答的总问题数中，选择并回答一个最小数量。\n\
    \n## Summary\n\n在 OIM 中使用策略可以涵盖用户权限和密码。这使得管理员能够配置安全的身份管理系统，同时最小化必须执行的日常管理量。访问策略可用于根据职位、角色授予、组成员身份等来控制用户被允许使用的功能。此外，这些策略可用于为用户组提供细粒度的访问权限。密码策略可以通过确保用户群体使用安全的复杂密码来帮助维护系统安全。\n\
    \n# 14. Oracle Identity Manager Forms and Customization\n\n在前面的章节中，您已经看到 Oracle\
    \ Identity Manager (OIM) 提供了各种各样的工具，组织可以提供给其用户，使他们或多或少能够自给自足。使用这些工具可以消除帮助台呼叫，并允许更快、更高效地处理权限请求以及入职和离职任务。这些还通过减少必须处理请求的人员数量以及减少管理帐户流程中的步骤，提供了更高级别的安全性。这些好处对许多组织来说可能是福音，因为他们可以看到节省资金和增强安全性。然而，开箱即用，许多可用的表单可能无法满足每个组织的外观、感觉或功能需求。\n\
    \nOracle 提供了多种方法来为单个组织定制 OIM。OIM 允许进行大量的定制。这些定制的范围可以从简单的徽标和颜色更改，到提示的本地化，再到完全自定义的表单和报告。根据组织的个人需求，定制的级别会有所不同。在许多情况下，颜色更改、徽标更改和页面布局就足够了。偶尔，可能需要创建自定义表单，可以使用表单创建实用程序来创建。在某些情况下，需要整个自定义应用程序或完全定制，并可以利用\
    \ OIM 应用程序编程接口 (API) 来创建。使用 API 创建自定义应用程序超出了本书的范围。但是，本章涵盖了定制和使用表单创建实用程序。"
  raw: "## Password Policies\n\nRequiring your users to maintain OID provides the\
    \ ability to control password policies to a point. OIM adds functionality to truly\
    \ customize your organization’s password management behavior.\n\nMost organizations\
    \ set up policies that require user passwords to conform to a set of rules. These\
    \ might include rules such as minimum number of characters, upper- and lowercase\
    \ characters, special characters, and so on. Combinations of rules such as these\
    \ increase password complexity. The more complex a password is, the tougher it\
    \ is for an intruder to guess or brute force crack it.\n\nUsing the Oracle Identity\
    \ Manager management screen shown in Figure [13-8](#A352855_1_En_13_Chapter.html#Fig8),\
    \ you can create and maintain password policies for the organization by clicking\
    \ Policies and selecting Password Policies.\n\n![A352855_1_En_13_Fig8_HTML.jpg](A352855_1_En_13_Fig8_HTML.jpg)\n\
    \nFigure 13-8.\n\nIdentity Managermanagement screen\n\nAfter clicking Manage Password\
    \ Policies, you are presented with a list of the available password policies.\
    \ You can create new policies or use the default. After creating the password\
    \ policies, you must assign the policy to the proper user populations. OIM provides\
    \ the ability to assign different password rules to different user groups based\
    \ on requirements. For instance, human resources employees might be required to\
    \ maintain a higher level of password complexity due to the sensitive personal\
    \ data to which they have access. The list shown in Figure [13-9](#A352855_1_En_13_Chapter.html#Fig9)\
    \ displays the default password policy created for OIM users and an example password\
    \ policy. Although you can modify this password policy, it is recommended that\
    \ you create your own.\n\n![A352855_1_En_13_Fig9_HTML.jpg](A352855_1_En_13_Fig9_HTML.jpg)\n\
    \nFigure 13-9.\n\nPassword Policies list\n\nFrom Figure [13-9](#A352855_1_En_13_Chapter.html#Fig9),\
    \ where the password policies are listed, you can select one and edit it to customize\
    \ it for your own requirements. Figure [13-10](#A352855_1_En_13_Chapter.html#Fig10)\
    \ shows all of the options that can be utilized when creating your policy.\n\n\
    ![A352855_1_En_13_Fig10_HTML.jpg](A352855_1_En_13_Fig10_HTML.jpg)\n\nFigure 13-10.\n\
    \nPassword policy configuration screen\n\nWhen creating the password policy, it\
    \ is important to note the sections of the screen.\n\n*   The first section defines\
    \ the basic rules of a password.\n    *   Minimum Length: This specifies the number\
    \ of characters a password must be to pass the complexity rules.\n    *   Minimum\
    \ Password Age (Days): This number defines the number of days a user must have\
    \ the password before changing it again. Use the number 0 to allow password changes\
    \ on the same day.\n    *   Warn After (Days): This is the number of days before\
    \ the system will send out a reminder notification to the user that his or her\
    \ password will expire. This is usually sent three to five days prior to the expiration.\n\
    \    *   Disallow Past Passwords: Enter a number to exclude the user from reusing\
    \ previous passwords. This is often set to disallow the previous five passwords.\n\
    \    *   Expires After (Days): This number determines the maximum age of a password\
    \ before the user is forced to change it.\n*   The second section, Complex Password,\
    \ can be used to use a preconfigured password complexity rule. It includes the\
    \ following rules:\n    *   The password must be at least six characters long.\n\
    \    *   The password must meet three of these five rules:\n    *   Must contain\
    \ uppercase characters.\n    *   Must contain numeric characters.\n    *   Must\
    \ contain lowercase characters.\n    *   Must contain special characters (!@#$%^&*).\n\
    \    *   Must contain Unicode characters.\n    *   Must not contain the user’s\
    \ login name, first name, or last name.\n\nNote\n\nIt should be noted that the\
    \ minimum number of characters listed in the default Complex Password selection\
    \ is actually based on the number of characters defined in the first section of\
    \ the screen. If you entered 10 characters in that section, the Complex Password\
    \ rule selection will actually require 10 characters, not six as indicated.\n\n\
    The third section of this configuration page, Custom Policy, allows a full customization\
    \ of the preceding Complex Rules. It should be noted that you can only use Custom\
    \ Policy or Complex Password for a single password policy. Here you are able to\
    \ precisely define the rules you wish to enforce. You could require five uppercase\
    \ characters and three special characters or more numeric characters. This section\
    \ provides you with full control of the complexity rules. However, keep in mind\
    \ that if the password policy is too restrictive, it could result in users writing\
    \ down passwords.\n\nThe final section of the page is Challenge Options. This\
    \ section is used to configure OIM to allow users to answer one or more challenge\
    \ questions in case they forget their password or lock their account. This option\
    \ could help reduce help desk calls dramatically by allowing users to manage their\
    \ own locked and forgotten passwords.\n\nClick the Enable Challenge Policy Support\
    \ check box and the configuration options will appear. Here you can configure\
    \ the system with custom questions that suit your organization’s requirements.\
    \ You could also the users to type in their own questions and answers. After defining\
    \ the questions, you will also have the options to require users to input unique\
    \ answers, define the number of characters an answer might be, or both. To further\
    \ customize this system, you can enter as many questions as you wish, but allow\
    \ the user to choose and answer a minimum number defined in the total questions\
    \ to be answered.\n\n## Summary\n\nThe use of policies within OIM can encompass\
    \ user permissions and passwords. This allows administrators to configure a secure\
    \ identity management system while also minimizing the amount of day-to-day management\
    \ that must be performed. Access policies can be used to control what functions\
    \ users are permitted to use based on job title, role grants, group membership,\
    \ and so on. Furthermore these can be used to provide granular access to groups\
    \ of users. Password policies can help maintain a secure system by ensuring that\
    \ the user population is leveraging secure complex passwords.\n\n# 14. Oracle\
    \ Identity Manager Forms and Customization\n\nIn the previous chapters, you have\
    \ seen that Oracle Identity Manager (OIM) provides a wide variety of tools that\
    \ the organization can provide to its users, allowing them to be more or less\
    \ self-sufficient. The use of these tools can eliminate help desk calls and allow\
    \ faster, more efficient processing of permission requests and on- and off-boarding\
    \ tasks. These also provide a higher level of security by removing the number\
    \ of people that must process a request and removing steps in the processes managing\
    \ accounts. These benefits can be a boon to many organizations, as they can see\
    \ money saved and increased security. However, out of the box, the many forms\
    \ available might not meet the look and feel or functionality needs of every organization.\n\
    \nOracle has provided multiple methods of tailoring OIM to the individual organization.\
    \ OIM allows a significant amount of customization. These customizations can range\
    \ from simple logo and color changes, to localization of prompts, to full custom\
    \ forms and reports. Depending on the individual requirements of an organization,\
    \ the level of customization will change. In many cases, color changes, logo changes,\
    \ and page layouts will suffice. Occasionally, the creation of custom forms might\
    \ be required and can be created using the forms creation utility. There are some\
    \ cases where an entire custom application or full customization is required and\
    \ can leverage the OIM application programming interface (API) to create. Using\
    \ the API to create a custom application is outside the scope of this book. However,\
    \ this chapter covers customization and using the forms creation utility."
