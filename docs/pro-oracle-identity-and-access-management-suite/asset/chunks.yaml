    ## Oracle 身份与访问管理


    大多数组织需要身份服务，例如 LDAP 存储库。有时这通过简单的网络目录（如 Microsoft Active Directory）实现。在考虑应用程序安全性时，需要更通用的目录。之前介绍的
    OID、OVD 和 OUD 可用于提供此服务。随着越来越多的应用程序引入业务，用户在切换应用程序时可能会被身份验证对话框淹没。


    OAM 是身份和访问管理套件的一个组件，可用于提供 SSO 功能。此功能可以大大减少用户一天中必须进行身份验证的次数，从而提高生产力。通过结合外部和第三方应用程序的联合身份验证，可以进一步构建这种减少。


    通过 OAM 提供 SSO 减少了身份验证请求，因此应用程序用户保持安全的密码和账户变得很重要。账户管理成为必需，因为单个账户可能访问大量系统和数据。Oracle
    Identity Management 是身份管理堆栈的关键组成部分，提供用户自助服务、用户管理和高级别的可审计性。


    ### Oracle 访问管理器


    Oracle Fusion Middleware 应用程序和产品被设计为支持 Oracle Identity Manager (OIM) 组件，如 OID
    和 OUD 以获取身份信息。此外，这些资源可以使用 OAM 进行保护。Oracle Access Manager 利用会话管理、身份上下文和风险分析等功能，向应用程序环境提供身份验证和授权、策略管理与执行以及
    SSO 功能。OAM 还提供附加功能，最显著的是为采用多个 Oracle 产品的组织提供 SSO 环境，以及支持与安全断言标记语言 (SAML) 兼容的第三方产品的身份联合。


    OAM 的核心是向企业应用程序提供身份验证和授权服务。它还允许在基于 Oracle Fusion Middleware 的环境中实现 SSO 功能。图 1-6
    提供了 OAM 架构的高级描述。对受保护资源的访问请求由称为 WebGate 或 mod_osso 实例的过滤器拦截，并发送到 OAM 进行处理。OAM 引用可配置的身份验证和授权策略，以确定是否授予客户端访问权限。成功身份验证后，设置一个
    Cookie 以确保持续访问所请求的资源以及 OAM 环境中的其他资源。


    ![A352855_1_En_1_Fig6_HTML.jpg](img/A352855_1_En_1_Fig6_HTML.jpg)


    图 1-6.

    Oracle 访问管理器组件分解

    '
- fmt: '# Oracle Adaptive Access Management


    OAM 不仅提供认证和授权服务，还使组织能够在多个层面（如 Web、数据和应用程序层）提高安全意识和欺诈检测能力。Oracle Adaptive Access
    Manager (OAAM) 通过增加学习行为和检测潜在欺诈活动的能力，加强了 OAM 认证机制的安全性。OAAM 的实时和批处理风险分析组件用于使用模式、规则引擎、操作和交易分析来验证用户身份和活动的有效性。


    以下是 OAAM 的一些风险分析组件：


    *   设备指纹识别：此功能收集用户交易过程中所用连接设备的属性。这些属性用于识别可能的欺诈访问请求。

    *   行为分析：OAAM 可以学习用户的正常行为、设备信息、位置和其他数据，以便主动检测可能的滥用或安全漏洞。

    *   风险引擎分析：此功能允许对事件、用户档案、设备指纹、地理位置和其他数据进行实时分析，以确定用户交互期间的风险水平。分析轨迹可以被审计，以确保采取了适当的措施。

    *   预测分析：这有助于与 Oracle Data Mining 集成，以基于历史数据提供异常检测。在测试不同模型时，也可以将此功能用于基于分析数据做出变更决策。

    *   调查取证：此功能可用于为审计和欺诈调查工作提供数据集。可以使用 Oracle Business Intelligence Publisher 自定义数据，也可以使用开箱即用的模板。这些报告可以帮助安全调查人员识别实例和可能相关的欺诈访问。

    *   通用风险快照：用于备份、恢复和迁移现有安全策略与配置。


    面向用户、用于防范恶意软件和网络钓鱼攻击的组件增强了 OAAM 的分析功能，以提供端到端的解决方案。可以向最终用户提供虚拟认证设备、基于知识的认证问题和一次性密码机制，以防止未经授权的账户访问。


    Oracle Adaptive Access Management 的面向用户组件包括：


    *   设备指纹识别：提供了 OAAM 收集用户设备元数据的能力。这些数据可能包括 Cookie、硬件配置、地理位置和网络配置。此数据用于检测用户行为的变化。

    *   基于知识的认证：通过要求用户回答安全问题，提供次要的认证形式。

    *   答案逻辑：即使存在小的拼写错误，此组件也能使 OAAM 检测到基于知识的认证问题的根本正确答案。

    *   一次性密码：此功能使用户能够通过短信或电子邮件接收一次性使用的密码，用于系统认证。

    *   自助密码管理：用户可以使用自助服务创建和重置其凭据。


    # Identity Federation


    随着公司转向基于云的服务或采用外部 Web 应用程序和其他跨域服务，能够使用相同凭据对这些服务进行认证的需求日益增长。身份联合通过消除传统上为存在于多个域中的应用程序（分散环境）所需的多组凭据，使组织能够简化用户访问管理。OAM
    支持与 SAML、OpenID、表单填充和 OAuth 的联合。


    Oracle Access Manager 身份联合的两个功能组件是服务提供者 (Service Provider) 和身份提供者 (Identity Provider)。身份提供者组件负责建立用户身份、过滤属性、断言身份信息和维护会话。服务提供者负责映射属性、链接身份并将身份信息传递给应用程序。


    在登录期间，作为身份提供者，OAM 首先对用户进行认证。如果用户会话已超时，身份提供者将确定用户是否需要重新认证。最后，身份提供者组件确定合作应用程序是否需要与请求期间指定的级别或方案兼容的质询。为了支持这一点，OAM
    允许配置灵活的认证机制。身份联合使用联合认证方法和 OAM 认证方案映射来控制应如何对用户进行认证质询。


    在注销期间，Access Manager 身份联合服务提供者支持两种不同的流程，具体取决于注销发起的位置：来自 OAM 或来自联合合作应用程序。


    在 OAM 发起的注销期间：


    1.  用户通过 OAM 请求注销。

    2.  OAM 结束 Access Manager 会话。

    3.  OAM 指示各个 WebGate 实例删除用户的会话 Cookie。

    4.  OAM 联合服务执行注销操作，通过 HTTP 重定向用户或通过简单对象访问协议发送注销请求，导致合作应用程序注销。

    5.  OAM 联合服务终止联合会话。


    如果注销是通过合作应用程序发起的：


    1.  合作应用程序将用户重定向到 OAM 联合服务。

    2.  联合服务将会话标记为注销。

    3.  用户被重定向到 OAM 进行注销。

    4.  OAM 指示各个 WebGate 实例删除用户的会话 Cookie。

    5.  OAM 联合服务执行注销操作，通过 HTTP 重定向用户或通过简单对象访问协议发送注销请求，导致合作应用程序注销。

    6.  OAM 联合服务终止联合会话。


    OAM 内身份联合的服务提供者组件与身份提供者协同工作，以在联合环境中提供欺诈和风险感知。当身份提供者对用户进行认证时，可以触发服务提供者以适当的认证级别创建会话，该级别与联合认证方法映射。这些属性方法作为来自身份提供者的请求属性或映射到
    OAM 会话中传入的断言属性名。


    Oracle Access Management 身份联合支持多种联合技术，包括 SAML、OpenID、OAuth、社交身份和表单填充。'
  raw: '#### Oracle Adaptive Access Management


    OAM does not only provide authentication and authorization services; it also enables
    the organization to increase security awareness and fraud detection across multiple
    levels of the organization’s application architecture such as the web, data, and
    application tiers. Oracle Adaptive Access Manager (OAAM ) strengthens the security
    of OAM’s authentication mechanisms by adding the ability to learn behaviors and
    detect possible fraudulent activities. The real-time and batch risk analysis component
    of OAAM serves to verify user identities and the validity of activities using
    patterns, rule engine, actions, and transaction analysis.


    The following are some of the risk analysis components of OAAM:


    *   Device fingerprinting: This functionality collects attributes of devices used
    to connect during a user’s transaction. These attributes are used to identify
    possible fraudulent access requests.

    *   Behavioral profiling: OAAM can learn users’ normal behavior, device information,
    locations, and other data to provide proactive detection of possible misuse or
    security breaks.

    *   Risk engine analytics: This feature allows the real-time analysis of events,
    user profiles, device fingerprints, geolocation, and other data to determine the
    level of risk during user interactions. The trail of analytics can be audited
    to ensure proper actions were taken.

    *   Predictive analysis: This facilitates the integration with Oracle Data Mining
    to provide anomaly detection based on historical data. This can also be used to
    base change decisions on analysis data as different models are tested.

    *   Investigative forensics: This can be used to provide sets of data for auditing
    and fraud investigation efforts. The data can be customized using Business Intelligence
    Publisher or out-of-the-box templates can be used. These reports can assist security
    investigators in identifying instances and possible related fraudulent access.

    *   Universal risk snapshots: These are used to back up, restore, and migrate
    existing security policies and configurations.


    User-facing components preventing malware and phishing attacks augment OAAM analysis
    functionality to provide an end-to-end solution. End users can be presented with
    virtual authentication devices, knowledge-based authentication questions, and
    one-time password mechanisms to prevent unauthorized account access.


    The user-facing components of Oracle Adaptive Access Management include the following:


    *   Device fingerprinting: This provides the ability of OAAM to collect metadata
    regarding users’ devices. This data may include cookies, hardware configurations,
    geolocation, and network configurations. This data is used to detect changes in
    user behavior.

    *   Knowledge-based authentication: This provides a secondary form of authentication
    by requiring the user to answer security questions.

    *   Answer logic: This component enables OAAM to detect fundamentally correct
    answers to knowledge-based authentication questions even if they have minor typographical
    errors.

    *   One-time password: This functionality makes it possible for users to receive
    a one-time use password via short message service (SMS) or e-mail to be used for
    authentication to systems.

    *   Self-service password management: Users are empowered to create and reset
    their credentials using self-service.


    #### Identity Federation


    As companies move toward cloud-based services or employ external web applications,
    and other cross-domain services, the need to be able to authenticate to these
    services using the same credentials grows. Identity Federation enables the organization
    to simplify management of user access by eliminating the multiple sets of credentials
    traditionally required for a disparate environment where applications might exist
    in multiple domains. OAM supports federation with SAML, OpenID, form-fill, and
    OAuth.


    The two functional components of Oracle Access Manager Identity Federation are
    the Service Provider and the Identity Provider. The Identity Provider component
    is responsible for establishing the users’ identity, filtering attributes, asserting
    the identity information, and maintaining sessions. The Service Provider takes
    care of mapping the attributes, linking the identities, and passing identity information
    to the applications.


    During login, as an Identity Provider, OAM first authenticates the user. If the
    user session has timed out, the Identity Provider will determine if the user needs
    to reauthenticate. Finally, the Identity Provider component determines if the
    partner application requires a challenge compatible with the level or scheme specified
    during the request. To support this, OAM allows the configuration of flexible
    authentication mechanisms. Identity Federation uses a federation authentication
    method and OAM Authentication Scheme mappings to control how the user should be
    challenged for authentication.


    During logout, the Access Manager Identity Federation service provider supports
    two different flows depending on where the logout was initiated: from OAM or from
    the federated partner application.


    During an OAM-initiated logout:


    1.  The user requests the logout via OAM.  

    2.  OAM ends the Access Manager session.  

    3.  OAM instructs the various WebGate instances to remove the user’s session cookies.
     

    4.  The OAM federation services performs a logout operation causing logout of
    partner applications by either redirecting the user with an HTTP redirect or by
    sending a logout request via Simple Object Access Protocol (SOAP) message.  

    5.  The OAM federation service terminates the federated session.


    If the logout is initiated via the partner application:


    1.  The partner application redirects the user to the OAM federation service.
     

    2.  The federation service marks the session for logout.  

    3.  The user is redirected to OAM for logout.  

    4.  OAM instructs the various WebGate instances to remove the user’s session cookies.
     

    5.  The OAM federation service performs a logout operation causing logout of partner
    applications by either redirecting the user with an HTTP redirect or by sending
    a logout request via SOAP message.  

    6.  The OAM federation service terminates the federated session.


    The Service Provider component of Identity Federation within OAM works in conjunction
    with the Identity Provider to deliver fraud and risk awareness in federated environments.
    When the Identity Provider authenticates the user, the Service Provider can be
    triggered to create a session with the appropriate authentication level as mapped
    with the federation authentication method. These attribute methods are supported
    as request attributes from the Identity Provider or mapping to an incoming assertion
    attribute name in the OAM session.


    Oracle Access Management Identity Federation supports multiple federation technologies,
    including SAML, OpenID, OAuth, Social Identity, and form-fill.'
