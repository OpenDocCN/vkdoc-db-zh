  trans: '

    ## 配置 Oracle Access Manager 身份存储


    随着 OID 扩展以支持 OAM，现在需要配置 OAM 以使用 OID 作为系统和默认用户存储。通过访问 URL `http://host:wls_console_port/oamconsole`
    登录 AOM 管理控制台。图 9-7 显示了 OAM 管理控制台的一个示例。使用 `weblogic` 用户名和密码登录。在 OAM 系统和默认身份存储配置完成之前，新创建的管理员用户将无法使用。


    ![A352855_1_En_9_Fig7_HTML.jpg](img/A352855_1_En_9_Fig7_HTML.jpg)

    **图 9-7. OAM 管理控制台**


    管理控制台的登陆页面被划分为多个部分，以便于查找配置设置。顶部是主要配置类别：应用程序安全、联合、移动安全和配置。每个类别都有若干选项，允许你配置各种组件。首先，选择屏幕右上角的“配置”选项。配置菜单如图
    9-8 所示。


    ![A352855_1_En_9_Fig8_HTML.jpg](img/A352855_1_En_9_Fig8_HTML.jpg)

    **图 9-8. 配置菜单**


    完整的配置和管理超出了本书的范围。不过，本指南涵盖了完成整体集成所必需的部分。在配置菜单上，单击“用户身份存储”图标以查看当前配置。图 9-9 显示了你在创建新存储之前将看到的“用户身份存储”屏幕。


    ![A352855_1_En_9_Fig9_HTML.jpg](img/A352855_1_En_9_Fig9_HTML.jpg)

    **图 9-9. 身份存储配置屏幕**


    首次访问“用户身份存储”屏幕时，你会看到访问管理器正在使用嵌入式 LDAP 作为 `用户身份存储`，并且它被设置为默认存储和系统存储。这里的嵌入式 LDAP
    指的是 WLS 内置的。在本节中，你将创建一个名为 OID 的新身份存储，并将系统存储和默认存储更改为使用它。


    ### 创建：用户身份存储


    在如图 9-10 所示的“创建：用户身份存储”屏幕上，输入 OID 所需的连接详细信息。随后的表 9-2 列出了此阶段预期的值。


    **表 9-2. OID 身份存储连接详细信息**


    | 存储名称         | 为新的身份存储指定一个将被使用的名称                                                                 |

    |------------------|------------------------------------------------------------------------------------------------------|

    | 存储类型         | OID Oracle Internet Directory                                                                        |

    | 绑定 DN          | `Cn=orcladmin`，或其他对用户和组搜索基础具有读取访问权限的用户                                         |

    | 密码             | 为“绑定 DN”中列出的用户设置的密码                                                                    |

    | 描述             | （可选）                                                                                             |

    | 位置             | OID 的主机名和 LDAP 端口号                                                                           |

    | 登录 ID 属性     | `CN` 是默认值；如果你使用不同的属性，请在此处输入                                                   |

    | 用户密码属性     | `userPassword`                                                                                       |

    | 用户搜索基础     | `Cn=Users,dc=mycompany,dc=com`；此值应与 `extendOAMPropertyFile` 中使用的用户搜索基础匹配            |

    | 组搜索基础       | `Cn=Groups,dc=mycompany,dc=com`；此值应与 `extendOAMPropertyFile` 中使用的组搜索基础匹配              |


    ![A352855_1_En_9_Fig10_HTML.jpg](img/A352855_1_En_9_Fig10_HTML.jpg)

    **图 9-10. 创建：用户身份存储屏幕**


    单击“测试连接”以确保你输入的详细信息正确，并且 OAM 能够连接到新的 LDAP 存储。在继续下一步之前，请确保你看到的结果与图 9-11 相似。


    ![A352855_1_En_9_Fig11_HTML.jpg](img/A352855_1_En_9_Fig11_HTML.jpg)

    **图 9-11. 测试连接**


    ### 设置默认存储和系统存储


    成功创建 LDAP 存储后，你必须将 OAM 系统存储和默认存储的值设置为新存储的名称。你将在图 9-12 中看到一个示例。


    ![A352855_1_En_9_Fig12_HTML.jpg](img/A352855_1_En_9_Fig12_HTML.jpg)

    **图 9-12. 设置默认存储和系统存储**


    更新存储值时，你会看到一条弹出消息，告知你在应用更改之前必须完成一个步骤。页面上将出现一个名为“访问系统管理员”的新部分。在此部分中，你将添加在 `preconfigOAMProperties`
    文件中创建的 `oamadmin` 用户和 `oamadministrators` 组。单击“添加按钮”并使用搜索屏幕查找用户和组。根据需要添加你的环境中可能需要的任何其他用户。添加用户后，单击“应用”。系统将要求你输入
    `oamadmin` 用户名和密码，以验证新的用户存储是否正常工作。


    ### 配置 LDAP 认证模块


    验证管理员用户并保存新配置后，你必须配置 LDAP 认证模块以使用新的身份存储。在退出管理控制台之前未完成此步骤可能会导致你无法再次登录 OAM 控制台。要继续，请选择屏幕顶部中心的“应用程序安全”选项，如图
    9-13 所示。


    ![A352855_1_En_9_Fig13_HTML.jpg](img/A352855_1_En_9_Fig13_HTML.jpg)

    **图 9-13. 应用程序安全菜单**


    在“应用程序安全”菜单上，在“访问管理器”下，单击“认证方案”链接。图 9-14 显示了 OAM 预配置的认证方案列表。


    ![A352855_1_En_9_Fig14_HTML.jpg](img/A352855_1_En_9_Fig14_HTML.jpg)

    **图 9-14. 认证方案**


    在“搜索认证方案”屏幕上，单击“搜索”以显示当前可用的方案列表。单击列出的 `LDAPScheme` 以调出其配置。这将显示所使用的认证模块的名称。图 9-15
    显示了将使用的配置屏幕。


    ![A352855_1_En_9_Fig15_HTML.jpg](img/A352855_1_En_9_Fig15_HTML.jpg)

    **图 9-15. LDAPScheme 配置屏幕**


    在此情况下，`LDAPScheme` 被配置为使用 LDAP 认证模块。这是你需要更改的模块，以确保在使用外部 LDAP 存储（如 OID）配置的访问管理器中能够正常登录和访问。图
    9-16 显示了“认证模块”选项卡上的结果集。


    ![A352855_1_En_9_Fig16_HTML.jpg](img/A352855_1_En_9_Fig16_HTML.jpg)

    **图 9-16. 认证模块**


    现在你已经知道了 LDAP 认证方案使用的认证模块的名称，返回到启动页面，并在“应用程序安全”屏幕上的“插件”下，单击“认证模块”链接。单击“搜索”以显示可用的模块，然后单击
    LDAP 链接。这将调出所选模块的配置参数，如图 9-17 所示。


    ![A352855_1_En_9_Fig17_HTML.jpg](img/A352855_1_En_9_Fig17_HTML.jpg)

    **图 9-17. LDAP 认证模块配置**


    在配置屏幕上，对于“用户身份存储”，选择 `OIDStore`，即先前创建的身份存储的名称。单击“应用”以保存更改。你现在已经完成了 AOM 使用 OID
    的配置，可以进入下一章配置 OIM 的下一步了。现在关闭浏览器并重新启动 OAM。重启后，请测试确保你可以使用你创建的 `oamadmin` 用户登录到 `OAMConsole`。


    ## 总结


    本章演示了配置 OAM 所需的步骤。它包括预配置 OID 模式，以包含将 OAM 与外部 LDAP 提供程序集成所必需的容器、用户和组。尽管这些说明是针对
    OID 的，但稍作修改后，类似的说明可用于大多数其他受支持的 LDAP 目录。无论是否为与 OIM 集成而配置 OAM，此步骤都是必需的。它将确保用户和权限包含在集中式
    LDAP 存储中，而不依赖于嵌入式 WebLogic 存储。

    '
- fmt: '# 10. Oracle Identity Management Configuration


    Oracle Identity Manager (OIM) provides a user interface that can be used by administrators
    to create and manage user accounts, set up roles, configure workflows, and more.
    It can also be integrated with Oracle Access Manager (OAM) to provide user self-service
    screens that will allow end users to reset forgotten passwords, manage their profile
    information, and set up challenge questions. This all results in a complete identity
    life cycle management environment for the organization.


    Chapter [7](#A352855_1_En_7_Chapter.html) presented the steps to configure a new
    domain for OIM. That only set up the structures necessary to run OIM within a
    WebLogic Server, and deployed the necessary components. This chapter guides you
    through the actual configuration required to run the Identity Manager tools.


    ## Preconfiguration Steps


    After creating the new OIM domain, there are a few steps that must be completed
    prior to actually configuring the Identity Manager server. Begin the preconfiguration
    by upgrading the Oracle Platform Security Services (OPSS) Schema.


    The Oracle Fusion Middleware Patch Set Assistant will be used to upgrade the OPSS.
    You can find the Patch Set Assistant executable in the directory `/home/oracle/IDMMiddleware/oracle_common/bin/psa`.
    This will launch a graphical user interface (GUI) to walk you through the process.
    Figure [10-1](#A352855_1_En_10_Chapter.html#Fig1) shows the Patch Set Assistant.


    ![A352855_1_En_10_Fig1_HTML.jpg](A352855_1_En_10_Fig1_HTML.jpg)


    Figure 10-1. Starting the Patch Set Assistant


    On the Select Component screen, select the Oracle Platform Security Services check
    box.


    The Patch Set Assistant will ask you to verify that you have completed a database
    backup and that the database version being used is certified with Fusion Middleware.
    This is shown in Figure [10-2](#A352855_1_En_10_Chapter.html#Fig2). If you have
    not already checked Oracle’s certification matrix, do so now. Once completed,
    select the check boxes, and click Next.


    ![A352855_1_En_10_Fig2_HTML.jpg](A352855_1_En_10_Fig2_HTML.jpg)


    Figure 10-2. Check prerequisites


    On the OPSS Schema screen, you will need to enter the connection details for the
    database in your environment. The fields and values entered are shown in Figure
    [10-3](#A352855_1_En_10_Chapter.html#Fig3).


    ![A352855_1_En_10_Fig3_HTML.jpg](A352855_1_En_10_Fig3_HTML.jpg)


    Figure 10-3. Connection details


    For a description of the fields and the data that should be entered in each, see
    Table [10-1](#A352855_1_En_10_Chapter.html#Tab1).


    Table 10-1. OPSS Schema Upgrade Connection Details


    | Database Type | Oracle Database |

    | --- | --- |

    | Connect String | The connect string should be entered in the following format:
    hostname:port:servicename |

    | DBA User Name | The user entered in this field must have sysdba privileges.
    Enter it in the format “sys as sysdba” |

    | DBA Password | Password for the user entered above |

    | Schema User Name | This should be the OPSS schema name created with the Repository
    Creation Utility (RCU) |

    | Schema Password | Enter the password set during the RCU creation |


    Prior to actually upgrading the OPSS Schema, the Patch Set Assistant will validate
    the database and schema objects to ensure that they meet the requirements. Figure
    [10-4](#A352855_1_En_10_Chapter.html#Fig4) shows the validation. It should be
    noted that if the OPSS is already at the proper version or if it does not meet
    the minimum, this screen will inform you of that condition.


    ![A352855_1_En_10_Fig4_HTML.jpg](A352855_1_En_10_Fig4_HTML.jpg)


    Figure 10-4. Checking the schema to be upgraded


    The Patch Set Assistant will check the schema and validate its upgrade status,
    then provide you with a summary of the environment it will upgrade. Take this
    time to review the Upgrade Summary screen shown in Figure [10-5](#A352855_1_En_10_Chapter.html#Fig5)
    before continuing.


    ![A352855_1_En_10_Fig5_HTML.jpg](A352855_1_En_10_Fig5_HTML.jpg)


    Figure 10-5. Confirm upgrade components


    Figure [10-6](#A352855_1_En_10_Chapter.html#Fig6) shows the Patch Set Assistant
    progress indicator. Once this shows 100 percent, you can click Next to continue.


    ![A352855_1_En_10_Fig6_HTML.jpg](A352855_1_En_10_Fig6_HTML.jpg)


    Figure 10-6. Upgrade progress


    At the end of the process, you will be presented with the Upgrade Success screen,
    shown in Figure [10-7](#A352855_1_En_10_Chapter.html#Fig7). If any errors were
    encountered, address them now before proceeding.


    ![A352855_1_En_10_Fig7_HTML.jpg](A352855_1_En_10_Fig7_HTML.jpg)


    Figure 10-7. Upgrade complete


    Now that the OPSS Schema has been successfully upgraded, you can continue to the
    next step in the process, which involves setting up the Database Security Store.


    ## Configure the Database Security Store


    After upgrading the OPSS database schema, you must also configure the Database
    Security Store for the new OIM instance. Oracle Identity and Access Management
    only supports a Database Security Store. As such, the following steps help you
    configure this store.


    You performed this same activity while configuring OAM. If configuring OAM and
    OIM in a single domain sharing the same database, you would need to follow steps
    that would have OIM join the Access Manager Database Security Store. However,
    if you have followed the steps presented in this book, you installed OAM and OIM
    in a split domain. The repository objects were installed in separate databases
    as well. This requires you to create a separate security store for each product.


    The `configureSecurityStore.py` script is located in the OIM home directory under
    `common/tools`. To run the script you will use `wlst.sh` found under the Middleware
    Home directory under `oracle_common/common/tools`.


    As mentioned earlier, if you have both OIM and OAM installed in a single domain,
    and you have already run this for Access Manager, you will need to use the `–m
    join` option. However in this case, you will be using the `-m create` option to
    create the new security store in the OIM database repository.


    To configure the new security store, run the following command from `/home/oracle/IDMMiddleware/oracle_common/common/tools`.


    ```

    ./ wlst.sh /home/oracle/IDMMiddleware/Oracle_IDM1/common/tools/configureSecurityStore.py
    -d /home/oracle/IDMMiddleware/user_projects/idm_domain -c IAM -p Password123 -m
    create

    ```


    In this command, you need to specify the location of the `configureSecurityStore.py`
    file and the location of the OIM domain. Specify `IAM` as the component and the
    OPSS schema password.'
