- fmt: '## Integrate OIM and OAM


    Much like you did to configure OAM for integration, you will be using the `idmConfigTool.sh`
    command to perform the integration of OIM and OAM. This involves creating a property
    file and using it to run `idmConfigTool.sh –configOIM`.


    Prior to running the `idmConfigTool.sh` command, you must ensure that the environment
    variables are set properly. Failure to do so will result in a variety of errors,
    not all of which will point to the cause. Set the environment variables as follows:


    ```

    MW_HOME=/home/oracle/OIMMiddlewareHome

    JAVA_HOME=

    IDM_HOME=/home/oracle/OIDMiddlewareHome

    ORACLE_HOME=/home/oracle/OIMMiddlewareHome/Oracle_OIM1

    IAM_ORACLE_HOME=/home/oracle/OIMMiddlewareHome/Oracle_OIM1

    ```


    Create a property file called `OIMConfigPropertyFile` with these contents:


    ```

    LOGINURI: /${app.context}/adfAuthentication

    LOGOUTURI: /oamsso/logout.html

    AUTOLOGINURI: None

    ACCESS_SERVER_HOST: 10.0.70.229

    ACCESS_SERVER_PORT: 5575

    ACCESS_GATE_ID: Webgate_IDM

    COOKIE_DOMAIN: .centroid.com

    COOKIE_EXPIRY_INTERVAL: 120

    OAM_TRANSFER_MODE: SIMPLE

    WEBGATE_TYPE: ohsWebgate11g

    OAM_SERVER_VERSION: 11g

    OAM11G_WLS_ADMIN_HOST: 10.0.70.229

    OAM11G_WLS_ADMIN_PORT: 17001

    OAM11G_WLS_ADMIN_USER: weblogic

    SSO_ENABLED_FLAG: true

    IDSTORE_PORT: 3060

    IDSTORE_HOST: 10.0.70.229

    IDSTORE_DIRECTORYTYPE: OID

    IDSTORE_ADMIN_USER: cn=oamLDAP,cn=systemids,dc=mycompany,dc=com

    IDSTORE_LOGINATTRIBUTE: uid

    IDSTORE_USERSEARCHBASE: cn=Users,dc=mycompany,dc=com

    IDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com

    IDSTORE_WLSADMINUSER: weblogic_idm

    MDS_DB_URL: jdbc:oracle:thin:@10.0.70.229:1521:IDM1

    MDS_DB_SCHEMA_USERNAME: dev_mds

    WLSHOST: 10.0.70.229

    WLSPORT: 27001

    WLSADMIN: weblogic

    DOMAIN_NAME: idm_domain

    OIM_MANAGED_SERVER_NAME: oim_server1

    DOMAIN_LOCATION: /home/oracle/IDMMiddleware/user_projects/idm_domain

    ```


    The values of each of the parameters in this file should be populated with information
    specific to your environment. Refer to Table [11-4](#A352855_1_En_11_Chapter.html#Tab4)
    for a description of the values.


    Table 11-4. `OIMConfigPropertyFile` Parameter Values


    | `LOGINURI` | This value is taken from the original file; do not modify |

    | `LOGOUTURI` | You can leave this as the default; however, if you have a custom
    logout page that conforms to the requirements, enter the URL here |

    | `AUTOLOGINURI` | Set this to none |

    | `ACCESS_SERVER_HOST` | Enter the name of the host where OAM is installed |

    | `ACCESS_SERVER_PORT` | Enter the Oracle Access Management Port 5575. |

    | `ACCESS_GATE_ID` | Enter the name of the Oracle Access Gate created in the previous
    step |

    | `COOKIE_DOMAIN` | Enter the name of the domain in which the cookie is valid
    |

    | `COOKIE_EXPIRY_INTERVAL` | Enter the number of minutes the cookie is good for
    |

    | `OAM_TRANSFER_MODE` | Enter the same value for communication mode as the previous
    step; for example, open or simple |

    | `WEBGATE_TYPE` | Indicate the WebGate version being used; valid values are ohsWebGate11g
    and ohsWebGate10g |

    | `OAM_SERVER_VERSION` | Enter 11g as the version of the Access Server |

    | `OAM11G_WLS_ADMIN_HOST` | Enter the hostname where OAM’s WebLogic Server Administration
    Server is installed |

    | `OAM11G_WLS_ADMIN_PORT` | Enter the port the Administration Server listens on
    |

    | `OAM11G_WLS_ADMIN_USER` | Enter WebLogic |

    | `SSO_ENABLED_FLAG` | Enter whether SSO is to be enabled; for example, true |

    | `IDSTORE_PORT` | Enter the port where OID or other LDAP server is listening;
    this should match the location of the Identity Store |

    | `IDSTORE_HOST` | Enter the hostname of where OID or other LDAP server is installed
    |

    | `IDSTORE_DIRECTORYTYPE` | Enter the type of LDAP server being used; for example,
    OID |

    | `IDSTORE_ADMIN_USER` | Enter the username OIM should use to connect to the Identity
    Store; for example, `cn=oimldap,cn=systemids,dc=mycompany,dc=com` |

    | `IDSTORE_LOGINATTRIBUTE` | Specify the Identity Store attribute that is used
    for login names |

    | `IDSTORE_USERSEARCHBASE` | Specify the top level of the Identity Store where
    OIM should search for users |

    | `IDSTORE_GROUPSEARCHBASE` | Specify the location where OIM should look for groups
    |

    | `IDSTORE_WLSADMINUSER` | Enter weblogic |

    | `MDS_DB_URL` | Enter the Metadata database connect information; it should be
    in the format `jdbc:oracle:thin:@hostname:port:servicename` |

    | `MDS_DB_SCHEMA_USERNAME` | Enter the username to be used to connect to the metadata
    repository database schema |

    | `WLSHOST` | Enter the hostname where OIM is installed |

    | `WLSPORT` | Enter the administration port of the OIM WebLogic environment |

    | `WLSADMIN` | Enter the username for WebLogic administration |

    | `DOMAIN_NAME` | Enter the name of the WebLogic domain where the OIM managed
    server is installed |

    | `OIM_MANAGED_SERVER_NAME` | Enter the name of the managed server used by OIM
    |

    | `DOMAIN_LOCATION` | Enter the complete filesystem path to the domain files |


    With the file created, you can now run the `idmConfigTool` with the `–configOIM`
    option to set OAM up for integration. When run, this step will configure the OIM
    Identity Store and set the necessary system MBeans. You will be prompted to enter
    passwords for the SSO Access Gate, Identity Manager MDS database schema, ID Store
    password, and Admin Server password. You will also need to supply passwords for
    the `ssoKeyStore.jks` and SSO Global passphrase. If no errors are reported, restart
    the OIM environment, including the OIM managed server, SOA managed server and
    Administration Server. You should check the `Automation.log` file for any errors.'
  raw: '## Integrate OIM and OAM


    Much like you did to configure OAM for integration, you will be using the `idmConfigTool.sh`
    command to perform the integration of OIM and OAM. This involves creating a property
    file and using it to run `idmConfigTool.sh –configOIM`.


    Prior to running the `idmConfigTool.sh` command, you must ensure that the environment
    variables are set properly. Failure to do so will result in a variety of errors,
    not all of which will point to the cause. Set the environment variables as follows:


    ```

    MW_HOME=/home/oracle/OIMMiddlewareHome

    JAVA_HOME=

    IDM_HOME=/home/oracle/OIDMiddlewareHome

    ORACLE_HOME=/home/oracle/OIMMiddlewareHome/Oracle_OIM1

    IAM_ORACLE_HOME=/home/oracle/OIMMiddlewareHome/Oracle_OIM1

    ```


    Create a property file called `OIMConfigPropertyFile` with these contents:


    ```

