- fmt: '# Network Planning


    Network requirements increase for clustered environments as the number of servers
    grows. Depending on the organization’s network topology (DMZ | Application Tier
    or DMZ | Application Tier | Data Tier, etc.), the number of firewalls and load
    balancers will change. At each level, firewalls will need to be configured to
    allow appropriate communication. In many cases, organizations have two main network
    zones: public zone/DMZ and an intranet or internal zone. For simplicity, this
    two-zone configuration is presented in this book.


    The public zone or DMZ normally contains web servers that provide a front-end
    proxy to applications located in the intranet zone. This serves to separate the
    internal application zone from the public and protect resources by restricting
    internal communication to only approved protocols and ports. Within the DMZ, load
    balancers do the job of splitting the load between one or more web servers and
    firewalls serve to restrict communication. This provides tighter security, failover,
    and performance benefits.


    Within the intranet zone, application servers and database servers provide services
    to the users. These are accessed via the proxy and web servers enlisted in the
    DMZ. Because the firewalls restrict access, the servers within this zone are usually
    configured to communicate only on designated ports. In some cases such as database
    servers, a load balancer might be required to handle failover and load balancing
    tasks. In other cases, the use of web servers configured with the WLS module can
    handle load balancing. Load balancers can also be used as a Secure Sockets Layer
    (SSL) endpoint, thus unloading the encryption handling from the underlying servers.


    Whatever load balancing technology is used, the organization should ensure that
    it is capable of providing the following functionality:


    *   Monitoring HTTP and HTTPS traffic.

    *   Maintaining multiple virtual server names and ports.

    *   Detection of server status.

    *   Rerouting of requests in case of server outages.

    *   SSL management, acceleration, termination, and so on.

    *   Ability to add `WL-Proxy-SSL : true` to the HTTP Request Handler.


    ## Summary


    This chapter presented a number of concepts from hardware requirements to deployment
    topologies and preinstallation considerations. Instead of providing recommendations
    for options such as CPU architecture, OSs, and network hardware, this was presented
    in general guidelines. Each environment will have different requirements. However,
    the information provided should give an organization the ability to plan its deployment
    strategy.


    In the chapters that follow, an installation with two node clusters is demonstrated.
    In some cases, multiple Fusion Middleware homes and instances could be installed
    on a single server. These are identified, along with the reasoning behind them.


    # 3. User and Policy Stores


    Identity and access management systems are built around a core storage system
    capable of maintaining user information, roles, policies, and credentials. These
    storage systems can also be used to store information regarding network resources,
    peripherals, and applications. Most often directory stores use Lightweight Directory
    Access Protocol (`LDAP`)-based systems. Other storage methods include database
    stores and file stores. `LDAP`, however, provides a more widely accepted standard
    and compatibility with a wider group of applications.


    `LDAP` defines a standard method of accessing information regarding identity data,
    network resources, peripherals, and even encryption certificates and services.
    The identity information can contain user credentials, contact information, and
    other pertinent data used to identify individuals. This data can be used by applications
    such as e-mail for e-mail addresses. Perhaps the most useful function is the ability
    to provide authentication and role definition. Applications can use directories
    and standard `LDAP` commands to ensure that users have access to systems and only
    the data they are authorized to use.


    ## User and Policy Store Overview


    Data stored within `LDAP` directories is often structured in an organized fashion
    providing easier access when browsing and querying information. Furthermore, the
    objects conform to defined formats including required and mandatory attributes.
    These attributes not only help identify a person or object, but also afford applications
    the ability to query for groups of users fitting certain criteria.


    Although the `LDAP` does not define what data is stored or how it is structured,
    it does define how the data is accessed. `LDAP`-based directories have the advantage
    of being accessible to applications running on any platform. These applications
    can query the directory store using `TCP/IP`, `LDAP` protocols, and `HTTP`. As
    such, additional security can be afforded through the use of Secure Sockets Layer
    (`SSL`) and Transport Layer Security (`TLS`). This allows for faster development
    of applications by providing standard methods of implementing security. Multiple
    query tools exist for administration and browsing directories.


    Other identity storage methods such as file-based security and database user stores
    do not provide a standard method of data access. This leads to inefficient application
    development, as the application must be developed with the identity store in mind
    and the developers must know how to access the necessary information. Furthermore,
    this can cause incompatibilities as organizations migrate from legacy systems
    to new products or development efforts.


    As discussed previously, user information such as credentials and contact data
    can be stored within an `LDAP` directory. The data is normally stored in a tree-like
    structure that makes organization easier. In most cases, the base of the tree
    defines the organization or security realm. The base distinguished name (`DN`)
    can be set to something like `dc=mycompany,dc=com`, with `DC` standing for domain
    component. This provides a valid organization identification while being high
    level enough to break down the lower levels by region or business unit or other
    breakout defined by the enterprise. A directory tree could look something like
    Figure 3-1.


    ![A352855_1_En_3_Fig1_HTML.jpg](A352855_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1.** Example `LDAP` directory structure users and groups by region
    (instead of using `CN` or common name, administrators could use organizational
    unit)


    ```

    dc=mycompany,dc=com

    ou=users

    ou=NorthAmerica

    ou=US

    ou=Canada

    ou =Mexico

    ou=Asia

    ou =Japan

    ou =China

    ou =Taiwan

    ```


    It should be noted that these are examples. Individual organizations might wish
    to organize by region, country, business unit, or resource, as shown in Figure
    3-2.


    ![A352855_1_En_3_Fig2_HTML.jpg](A352855_1_En_3_Fig2_HTML.jpg)


    **Figure 3-2.** Example `LDAP` structure for users and groups within region


    Because `LDAP` does not dictate how the data is structured or the granularity,
    companies are, for the most part, free to create the directory structure in a
    way that makes sense given their current and future situations. Design decisions
    might be made according to distributed administration or future plans of data
    partitioning or a host of other reasons.


    User and resource entries are stored within these branches. For the most part,
    this is how user identities are stored. For instance, user John Daily might work
    for mycompany in the United States. In the first example, the entry could be uniquely
    identified by `cn=john.daily,ou=US,ou=NorthAmerica,ou=users,dc=mycompany,dc=com`.
    This is what is known as a `DN`. It is common to use a name-based approach to
    assigning a `DN` such as `john.daily`. However, other organizations might wish
    to create user accounts using an assigned identifier to simplify name changes
    or preventing duplicate user accounts if a second John Daily were to join the
    company.'
