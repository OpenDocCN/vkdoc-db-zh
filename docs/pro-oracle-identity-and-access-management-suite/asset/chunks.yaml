    # 集群化


    增加物理或虚拟主机的 CPU 和内存将提升 WLS 环境的性能。这些改动同样会影响部署在受管服务器内的应用程序性能。然而，它们无法降低单个服务器的整体负载。增加服务器或采用集群能带来更大的性能提升。


    WebLogic 环境的集群化包括增加一个或多个运行 WLS 的额外主机，并将应用程序部署在受管服务器上，或是在单个多处理器服务器上部署多个实例。然而，性能仍然会受限于物理服务器上的其他资源。跨多台服务器进行
