- fmt: 'Organizing user entries would have little use if the individual entries did
    not possess standard information that could be used to identify the users. Beyond
    storing contact information, user directories can also be used to maintain activity
    data such as last logon time, or last logon terminal. This data can be used to
    track history and in more advanced systems it can be used to identify possible
    fraud by alerting administrators or the user of deviations from normal activity.
    Along with this, information regarding failed logins can be utilized to lock accounts
    after too many attempts. To ensure that every entry of a certain type contains
    the same usable data, directories can be configured with object classes.


    Object classes are used to define the standard attributes that must be configured
    for each entry. This can help enforce mandatory fields and optional data so that
    when querying a user, the client can be sure it will retrieve the same expected
    results no matter what user is returned. Object classes can be created for various
    types of entries including users, network resources, peripherals, and even meeting
    rooms. The definition of object classes is built by administrators and can be
    as simple as one or two mandatory fields, or it can include subobject classes
    and a combination of mandatory and optional attributes.


    For example, object classes could define a `person` as requiring a `Surname` or
    `sn,` `Common Name` or `cn,` `Given Name`, and `Date of Birth`. An additional
    object class `organizationPerson` might be defined with the attributes `manager`,
    `department`, `telephone number`, and `office location`. More object classes can
    be created with different attribute profiles such as one called `user`, which
    might require attributes that are used for authentication such as `password` or
    `failedLoginAttempts`. Entries within the directory can be created with one or
    more object classes and entire branches of the directory tree can be defined such
    that all entries within the branch are created with the same combination of object
    classes, thus ensuring that all users within the North America OU are created
    with the `Person`, `OrganizationPerson`, and `User` attributes shown in Figure
    [3-3](#A352855_1_En_3_Chapter.html#Fig3).


    ![A352855_1_En_3_Fig3_HTML.jpg](A352855_1_En_3_Fig3_HTML.jpg)


    Figure 3-3.


    Example of object classes and a user object


    Application permissions and authorization to network resources can be defined
    within a directory store. Much like user identities, roles and permissions are
    often organized into a directory structure. Although it is possible to grant users
    permissions within applications or other systems individually, the use of groups
    within an `LDAP` directory can provide the ability to grant many users the same
    permission. It also offloads the storage of users to permission mapping and processing
    to the `LDAP` directory.


    Groups within the directory can be made up of user entries or other groups. Stored
    in the directory, applications can utilize standard `LDAP` application programming
    interface (`API`) commands to validate users’ group membership before granting
    access to the requested resources. These application roles are normally mapped
    directly to permissions within an application.


    The occurrence of multiple directories within the enterprise increases administration
    efforts and costs. When an organization maintains a network user directory and
    perhaps two or three application directories along with proprietary identity directories
    for other systems, each needs to be managed to stay on top of the constantly changing
    landscape. This requires more human resource time for each of the directories.
    In addition to the ongoing management, there is the time required for setup and
    configuration as well as the computing power and network resources necessary to
    keep them all running at their optimum level.


    With the administration tasks required to manage multiple directories, it is very
    common for the various identity stores to become inconsistent. During the identity
    life cycle, setup, maintenance, and removal, ensuring user accounts are created
    across multiple stores can become very cumbersome. This leads to the possibility
    of accounts being created or removed from one directory but not others. As a result,
    it slows down new users when they attempt to access resources for which they have
    not yet received an account. On the other side of the scale, it opens the possibility
    that users who should have been deactivated still have access to confidential
    information.


    As discussed earlier, multiple directories open up a number of security issues
    that can occur due to the difficulty in keeping all the instances synchronized.
    On top of this, it leads to data inconsistency. As directories are managed and
    user entries are modified across multiple locations, the entry attributes can
    become outdated. As a result applications might not have access to the most current
    information regarding the users or permissions.


    ## Oracle Internet Directory


    Oracle Internet Directory (`OID`) represents Oracle’s database-based `LDAP` v3
    compatible directory server. It is capable of storing identity data but also synchronizing
    with other existing data stores. Based on the Oracle database, `OID` is able to
    leverage advanced features to provide high levels of security even at the storage
    and backup level. Scalability of `OID` allows for large numbers of users, and
    transactions even in multisite environments. High availability is a key concern
    among organizations. `OID` provides mechanisms that assist IT departments to give
    their customers very high reliability. Overall `OID` affords an organization all
    of the identity and policy storage options it might need.


    As a directory server, `OID` is built around `LDAP` v3 compatibility. This ensures
    that not only Oracle applications reference `OID`, but other third-party applications
    and services with `LDAP` compatibility are able to leverage an organization’s
    investment. Unlike network access directories such as Active Directory or application-specific
    directories, `OID` is a general-purpose directory. General-purpose directories
    adhere to a common standard that can support disparate applications. Although
    Active Directory, a network, is an implementation of the `LDAP` standard, it is
    specialized for the network operating system (`OS`) and contains attributes required
    for network authentication and authorization. It is a more specialized tool and
    might be more difficult to adapt to a generic purpose. For this reason, `OID`
    provides a platform for companies to consolidate directories to use `OID`.'
