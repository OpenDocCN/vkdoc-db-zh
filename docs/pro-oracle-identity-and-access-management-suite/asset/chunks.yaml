  trans: '


    ## 基本定制


    OIM 的定制涉及几个不同复杂度的层面。最基本的是，OIM 允许管理员更改背景颜色、徽标以及各个页面的视觉组件等内容。由于其执行方式，这些更改中的大多数将影响所有页面。最基本的修改涉及更改诸如层叠样式表（`CSS`）文件或替换图像文件等操作。


    `CSS` 在 Web 开发中已经使用了很长时间。这些文件允许设计者一次性为项目定义诸如字体、颜色、背景等项目，而不是在部署中的每个页面上分别跟踪它们。


    图 14-1 展示了 OIM 身份自服务主页。使用诸如 `HTTPFox` 或 `Google Chrome` 这类能够查看网页元素的浏览器工具，将使您能够确定整个页面所使用的
    `CSS` 文件、元素和属性。这些信息将是更改 OIM 应用程序页面的关键。


    ![A352855_1_En_14_Fig1_HTML.jpg](img/A352855_1_En_14_Fig1_HTML.jpg)

    图 14-1. 正在检查元素的 OIM 身份自服务页面


    ### 用户界面定制


    在其最简单的形式中，定制开箱即用的用户界面（`UI`）可以使用在线表单编辑工具和 OIM 的沙盒概念来完成。沙盒允许编辑者在当前实例中对表单进行更改，而不会影响其他编辑者或当前用户。在单个沙盒中进行的更改仅限于该沙盒实例。发布沙盒时，这些更改将与实时系统同步写入。图
    14-2 显示了带有顶部 `Sandboxes` 链接的 Oracle 身份管理器主页。请注意，您必须以具有编辑或管理权限的用户身份登录系统才能看到此链接。您也可以通过
    `sysadmin console` 页面访问此链接。


    ![A352855_1_En_14_Fig2_HTML.jpg](img/A352855_1_En_14_Fig2_HTML.jpg)

    图 14-2. 创建沙盒


    点击管理员可用的 `Sandboxes` 链接将弹出一个屏幕，显示当前可用的沙盒及其状态，如图 14-3 所示。在此屏幕上，您可以激活当前沙盒、发布单个沙盒、创建新沙盒或删除现有沙盒。点击
    `Manage Sandboxes` 选项卡可查看现有沙盒。此屏幕将显示状态以及最后修改者。如果沙盒处于活动状态，`Active` 列中将出现一个绿灯。


    ![A352855_1_En_14_Fig3_HTML.jpg](img/A352855_1_En_14_Fig3_HTML.jpg)

    图 14-3. 当前沙盒


    要创建新沙盒，请点击 `Create Sandbox` 链接。您将看到如图 14-4 所示的 `Create Sandbox` 对话框。为新的沙盒提供名称和描述。如果您想立即开始进行定制工作，请选中
    `Activate Sandbox` 复选框。这将创建新环境并激活它。


    ![A352855_1_En_14_Fig4_HTML.jpg](img/A352855_1_En_14_Fig4_HTML.jpg)

    图 14-4. 创建沙盒对话框


    创建新沙盒后，您将在屏幕顶部看到它已被激活。在 `Sandboxes` 链接旁边，将出现当前选定沙盒的名称，如图 14-5 所示。要自定义该页面或其他页面，请点击
    `Customize` 链接。


    ![A352855_1_En_14_Fig5_HTML.jpg](img/A352855_1_En_14_Fig5_HTML.jpg)

    图 14-5. 活动沙盒


    进入沙盒后，您将能够进行多项更改。熟悉各种视图非常重要。默认情况下，您将看到如图 14-6 所示的 `Add Content` 视图。此编辑器视图允许您在表单中输入数据。在处理多步骤表单时，此功能非常有用。在
    OIM 中，有许多表单需要多个 `UI` 步骤，例如“忘记密码”页面。您可以使用 `Add Content` 视图输入数据并转到流程中的下一个页面。


    ![A352855_1_En_14_Fig6_HTML.jpg](img/A352855_1_En_14_Fig6_HTML.jpg)

    图 14-6. 沙盒定制的添加内容视图


    通过 `Add Content` 屏幕输入所需数据或您希望处理的数据后，您可以切换到如图 14-7 所示的 `Structure` 视图。此屏幕显示整体页面以及页面组件的树状结构视图。右侧列出的每个组件代表左侧显示页面上的一个项目或区域。点击屏幕左侧的页面项目会在右侧的结构中选中相应的元素。使用此界面可以极大地帮助您找到希望编辑或添加的区域或元素。您可以直接使用右侧的结构列表来选择元素。


    ![A352855_1_En_14_Fig7_HTML.jpg](img/A352855_1_En_14_Fig7_HTML.jpg)

    图 14-7. 沙盒定制的结构视图


    '
- fmt: '## Editing UI Elements in OIM


    Once you have selected an item or area, you can right-click and select `Edit`.
    This opens the screen seen in Figure [14-8](#A352855_1_En_14_Chapter.html#Fig8).
    In this example, the branding logo was selected. Here you can make a change to
    the logo to include your company or brand logo file. In Figure [14-8](#A352855_1_En_14_Chapter.html#Fig8),
    the properties of the `CommandImageLink` item that represents the logo are shown.
    On this screen, you can enter a new value for the file or change other properties.
    It should be noted that when changing the logo using this method, relative URLs
    will not work. The value used in the field will default to the `/identity/ context
    root` if you do not use a direct URL value. If you do not wish to host a logo
    elsewhere in your environment such as within the web server, you can put your
    logo within the self-service application `jar file` and redeploy the file. However,
    many organizations decide to host images for their web sites on a content server
    or other image hosting service.


    ![A352855_1_En_14_Fig8_HTML.jpg](A352855_1_En_14_Fig8_HTML.jpg)


    Figure 14-8. Edit logo image


    After changing items like the logo, lines, or other visual elements, you might
    wish to add new elements such as hint text or new fields. Much like changing visual
    elements, you must first locate the region or area you wish to modify. This can
    be done using the structural pane on the right side or the content area on the
    left. Note that as you select areas or items on the page, the corresponding structural
    element will be selected on the right. Depending on where you wish to add the
    element, you should find the parent container and add it there. You can use the
    container editor to reorder the items. Figure [14-9](#A352855_1_En_14_Chapter.html#Fig9)
    displays the structural pane with a panel selected. In this example, the new element
    to be added is some help text displayed to guide the user through changing their
    password. This will be added to the panel form layout that contains the password
    fields.


    ![A352855_1_En_14_Fig9_HTML.jpg](A352855_1_En_14_Fig9_HTML.jpg)


    Figure 14-9. Adding a new element


    After selecting the container in which to add the new element, use the plus on
    the main menu to bring up the `Add Content` dialog. Within this dialog box, you
    can choose from various page components. If you are planning to create data elements,
    you can use the `Data Components`. Clicking the `Open` link on any available component
    will display the individual components that can be added. In this case, you are
    adding a text box that can contain `HTML` markup to display some information for
    the user. In Figure [14-10](#A352855_1_En_14_Chapter.html#Fig10), the `Add Content`
    dialog box shows a list of the various components that can be added. Expand `Web
    Components` and select `Text Box`.


    ![A352855_1_En_14_Fig10_HTML.jpg](A352855_1_En_14_Fig10_HTML.jpg)


    Figure 14-10. Add Content dialog box


    After selecting the location and the type of content to be added to the page,
    you are presented with the properties of the new item. In this dialog box, use
    the `Value` field to enter the text you wish to add. Note that this field will
    accept `HTML`. Because the `OIM` pages use `CSS`, the `HTML` will inherit the
    styling defined for the rest of the application. In Figure [14-11](#A352855_1_En_14_Chapter.html#Fig11),
    the new `HTML` field has been populated. It should be noted that if you wish to
    override the standard `Identity Manager` `CSS`, you can use the `Style` tab to
    enter customized style information.


    ![A352855_1_En_14_Fig11_HTML.jpg](A352855_1_En_14_Fig11_HTML.jpg)


    Figure 14-11. New content properties


    At this point you have changed out the logo and added a text field to the `My
    Information` page. If you recall, customizations are all completed within an individual
    `sandbox`. The changes created up to this point are only visible when your `sandbox`
    is active, and only to the user making the edits. Users of the system still see
    the standard pages without edits or the previously published edits. Clicking the
    `Publish Sandbox` option will merge the changes made into the main line of the
    application. This functionality is useful for testing and making changes to the
    UI without affecting current users.


    ### Summary


    `OIM` provides a significant number of forms that can help streamline environments
    with high turnover, or where organizations wish to put power into their users’
    hands to handle requests and reset their passwords. This automation and plethora
    of self-service application forms can greatly reduce the number of help desk calls
    and administrator assistance. However, the out-of-the-box UI might not meet the
    requirements of all organizations. As such, Oracle has provided an easy to use
    `sandbox` type form editor that allows changes to be made to a live instance without
    the fear of affecting users with an untested change. The system allows developers
    to make changes in the `sandbox` and test those changes. Only when the `sandbox`
    is actually published will the changes go into the live system. This chapter demonstrated
    two types of commonly made changes to the UI.


    # 15. Integrating Access Manager with E-Business Suite


    A large number of organizations have an investment in Oracle E-Business Suite
    (`EBS`) along with auxiliary applications and products such as Oracle WebCenter
    Content and Imaging, Oracle Business Intelligence, and Service-Oriented Architecture
    (`SOA`) Suite. In an effort to increase user productivity while maintaining a
    high level of security, Oracle Access Manager (`OAM`) enables single sign-on (`SSO`)
    capabilities, tying these products together so that users are not prompted to
    log in throughout the day as they move from one application to another.


    ## Architecture


    Oracle `EBS` has been designed to integrate with Oracle Internet Directory (`OID`)
    serving as its identity store. This configuration allows the use of `OAM` to provide
    `SSO` capabilities. `EBS` administrators will be aware that the suite houses its
    own user store in the form of the `FND_USER table`. In an `SSO` environment, the
    `EBS` users are synchronized with `OID` by events raised by the workflow-based
    Business Event System.


    `OAM` uses agents called `AccessGates` to integrate with `EBS`. These, along with
    Access Manager `WebGates`, discussed earlier, are used to provide a seamless transition
    from log in to application.


    There is a flow of operations that occurs within an `OAM` integrated `EBS` environment.
    As the `HTTP server` receives an `EBS` request, the `OAM WebGate` intercepts the
    request and routes it to `OAM`. On receipt of the request, `OAM` determines if
    the resource is protected and the level of authentication and authorization required.
    Although `OAM` provides the credential collection, it hands off the credentials
    to `OID` for authentication. The overall process is detailed as follows:


    1.  A user attempts to access one of the Oracle `EBS` resources using a browser
    and is redirected to the `EBS AccessGate`.

    2.  The `AccessGate` is protected by Oracle `HTTP Server` (`OHS`) with `WebGate`.

    3.  The `HTTP server` and `WebGate` check for an existing authenticated session.
    If a session exists, the user is allowed to access `EBS`. If no session exists,
    the request is routed to `OAM`.

    4.  `OAM` performs credential collection.

    5.  `OAM` validates the submitted user credentials against the identity store.

    6.  `OAM` provides the user information to the Oracle `EBS AccessGate`.

    7.  The `EBS AccessGate` submits the user information and request to the `EBS`
    database.

    8.  The Oracle `EBS` database checks for a user in `EBS` that is linked to the
    identity store user.

    9.  If no linked `OID` user is found, the user is redirected to the `EBS` linking
    page to associate his or her Oracle `EBS` username.

    10. The originally requested resource is returned with a valid authenticated Oracle
    `EBS` user session.'
