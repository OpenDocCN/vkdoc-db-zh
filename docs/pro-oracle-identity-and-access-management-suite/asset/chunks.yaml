    Figure [10-6](#A352855_1_En_10_Chapter.html#Fig6) shows the Patch Set Assistant
    progress indicator. Once this shows 100 percent, you can click Next to continue.


    ![A352855_1_En_10_Fig6_HTML.jpg](A352855_1_En_10_Fig6_HTML.jpg)


    Figure 10-6.


    Upgrade progress


    At the end of the process, you will be presented with the Upgrade Success screen,
    shown in Figure [10-7](#A352855_1_En_10_Chapter.html#Fig7). If any errors were
    encountered, address them now before proceeding.


    ![A352855_1_En_10_Fig7_HTML.jpg](A352855_1_En_10_Fig7_HTML.jpg)


    Figure 10-7.


    Upgrade complete


    Now that the OPSS Schema has been successfully upgraded, you can continue to the
    next step in the process, which involves setting up the Database Security Store
    .


    ## Configure the Database Security Store


    After upgrading the OPSS database schema, you must also configure the Database
    Security Store for the new OIM instance. Oracle Identity and Access Management
    only supports a Database Security Store. As such, the following steps help you
    configure this store.


    You performed this same activity while configuring OAM . If configuring OAM and
    OIM in a single domain sharing the same database, you would need to follow steps
    that would have OIM join the Access Manager Database Security Store. However,
    if you have followed the steps presented in this book, you installed OAM and OIM
    in a split domain. The repository objects were installed in separate databases
    as well. This requires you to create a separate security store for each product.


    The `configureSecurityStore.py` script is located in the OIM home directory under
    `common/tools`. To run the script you will use `wlst.sh` found under the Middleware
    Home directory under `oracle_common/common/tools`.


    As mentioned earlier, if you have both OIM and OAM installed in a single domain,
    and you have already run this for Access Manager, you will need to use the `–m
    join` option. However in this case, you will be using the `-m create` option to
    create the new security store in the OIM database repository.


    To configure the new security store, run the following command from `/home/oracle/IDMMiddleware/oracle_common/common/tools`.


    ```

    ./ wlst.sh /home/oracle/IDMMiddleware/Oracle_IDM1/common/tools/configureSecurityStore.py
    -d /home/oracle/IDMMiddleware/user_projects/idm_domain -c IAM -p Password123 -m
    create

    ```


    In this command, you need to specify the location of the `configureSecurityStore.py`
    file and the location of the OIM domain. Specify IAM as the component and the
    OPSS schema password.'
  trans: '# 10. Oracle 身份管理配置


    Oracle 身份管理器（OIM）提供了一个用户界面，管理员可以使用它来创建和管理用户账户、设置角色、配置工作流等。它还可以与 Oracle 访问管理器（OAM）集成，以提供用户自助服务界面，允许最终用户重置忘记的密码、管理其个人信息并设置安全提示问题。这一切都为组织构建了一个完整的身份生命周期管理环境。


    第 7 章介绍了为 OIM 配置新域的步骤。那仅仅设置了在 WebLogic Server 中运行 OIM 所必需的结构，并部署了必要的组件。本章将指导您完成运行身份管理器工具所需的实际配置。


    ## 预配置步骤


    创建新的 OIM 域后，在实际配置身份管理器服务器之前，还必须完成几个步骤。首先通过升级 Oracle 平台安全服务（OPSS）模式来开始预配置。


    将使用 Oracle Fusion Middleware 补丁集助手来升级 OPSS。您可以在目录 `/home/oracle/IDMMiddleware/oracle_common/bin/psa`
    中找到补丁集助手的可执行文件。这将启动一个图形用户界面（GUI）来引导您完成该过程。图 10-1 显示了补丁集助手。


    ![A352855_1_En_10_Fig1_HTML.jpg](img/A352855_1_En_10_Fig1_HTML.jpg)


    图 10-1. 启动补丁集助手


    在“选择组件”屏幕上，选中 Oracle Platform Security Services 复选框。


    补丁集助手将要求您确认已完成数据库备份，并且所使用的数据库版本已通过 Fusion Middleware 认证。如图 10-2 所示。如果您尚未检查 Oracle
    的认证矩阵，请立即检查。完成后，选中复选框，然后单击“下一步”。


    ![A352855_1_En_10_Fig2_HTML.jpg](img/A352855_1_En_10_Fig2_HTML.jpg)


    图 10-2. 检查先决条件


    在 OPSS 模式屏幕上，您需要输入环境中数据库的连接详细信息。输入的字段和值如图 10-3 所示。


    ![A352855_1_En_10_Fig3_HTML.jpg](img/A352855_1_En_10_Fig3_HTML.jpg)


    图 10-3. 连接详细信息


    有关字段的描述以及每个字段应输入的数据，请参见表 10-1。


    表 10-1. OPSS 模式升级连接详细信息


    | `数据库类型` | Oracle Database |

    | --- | --- |

    | `连接字符串` | 连接字符串应按以下格式输入： hostname:port:servicename |

    | `DBA 用户名` | 此字段中输入的用户必须具有 sysdba 权限。按“sys as sysdba”格式输入 |

    | `DBA 密码` | 上述用户的密码 |

    | `模式用户名` | 这应该是使用存储库创建实用程序（RCU）创建的 OPSS 模式名称 |

    | `模式密码` | 输入在 RCU 创建期间设置的密码 |


    在实际升级 OPSS 模式之前，补丁集助手将验证数据库和模式对象，以确保它们满足要求。图 10-4 显示了验证过程。需要注意的是，如果 OPSS 已经是正确版本，或者不满足最低要求，此屏幕会告知您该情况。


    ![A352855_1_En_10_Fig4_HTML.jpg](img/A352855_1_En_10_Fig4_HTML.jpg)


    图 10-4. 检查要升级的模式


    补丁集助手将检查模式并验证其升级状态，然后为您提供将要升级的环境摘要。请花时间查看图 10-5 所示的“升级摘要”屏幕，然后再继续。


    ![A352855_1_En_10_Fig5_HTML.jpg](img/A352855_1_En_10_Fig5_HTML.jpg)


    图 10-5. 确认升级组件


    图 10-6 显示了补丁集助手的进度指示器。一旦显示 100%，您可以单击“下一步”继续。


    ![A352855_1_En_10_Fig6_HTML.jpg](img/A352855_1_En_10_Fig6_HTML.jpg)


    图 10-6. 升级进度


    在过程结束时，您将看到“升级成功”屏幕，如图 10-7 所示。如果遇到任何错误，请在继续之前解决它们。


    ![A352855_1_En_10_Fig7_HTML.jpg](img/A352855_1_En_10_Fig7_HTML.jpg)


    图 10-7. 升级完成


    现在 OPSS 模式已成功升级，您可以继续下一步，即设置数据库安全存储。


    ## 配置数据库安全存储


    升级 OPSS 数据库模式后，您还必须为新的 OIM 实例配置数据库安全存储。Oracle 身份与访问管理仅支持数据库安全存储。因此，以下步骤将帮助您配置此存储。


    您在配置 OAM 时已执行过相同的活动。如果在共享同一数据库的单一域中配置 OAM 和 OIM，您将需要遵循一些步骤，使 OIM 加入访问管理器数据库安全存储。但是，如果您遵循了本书介绍的步骤，则是在分离的域中安装了
    OAM 和 OIM。存储库对象也安装在单独的数据库中。这要求您为每个产品创建单独的安全存储。


    `configureSecurityStore.py` 脚本位于 OIM 主目录下的 `common/tools` 中。要运行该脚本，您需要使用位于 Middleware
    Home 目录下 `oracle_common/common/tools` 中的 `wlst.sh`。


    如前所述，如果您在单一域中安装了 OIM 和 OAM，并且已经为访问管理器运行过此操作，那么您将需要使用 `–m join` 选项。但在本例中，您将使用 `-m
    create` 选项在 OIM 数据库存储库中创建新的安全存储。


    要配置新的安全存储，请从 `/home/oracle/IDMMiddleware/oracle_common/common/tools` 运行以下命令。


    ```

    ./ wlst.sh /home/oracle/IDMMiddleware/Oracle_IDM1/common/tools/configureSecurityStore.py
    -d /home/oracle/IDMMiddleware/user_projects/idm_domain -c IAM -p Password123 -m
    create

    ```


    在此命令中，您需要指定 `configureSecurityStore.py` 文件的位置以及 OIM 域的位置。将 IAM 指定为组件，并输入 OPSS
    模式密码。'
- fmt: '## Preconfigure OID Identity Store for OIM


    Because the plan consists of integrating OIM and OAM, you must enable Lightweight
    Directory Access Protocol (LDAP) sync within the OIM server. There will be a step
    during the configuration to enable the LDAP sync. However, to prepare for that
    step, you must complete the prerequisite steps prior to continuing. This ensures
    your LDAP Store, OID, will be ready to be used as the OIM identity store. These
    instructions apply to using OID. Oracle supports other LDAP stores such as Oracle
    Unified Directory, Oracle Virtual Directory, Active Directory and iPlanet/ODSEE,
    but those are outside the scope of this book.


    Before continuing, set the environment variables as follows:


    ```bash

    MW_HOME=/home/oracle/OIDMiddleware

    ORACLE_INSTANCE=/home/oracle/OIDMiddleware/asinst_1

    ORACLE_HOME=/home/oracle/OIDMiddleware/Oracle_IDM1

    ```


    To preconfigure OID as the LDAP identity store for OIM, begin by creating a file
    called `oidContainers.ldif` with the following content:


    ```ldif

    dn: cn=oracleAccounts,dc=mycompany,dc=com

    cn: oracleAccounts

    objectClass: top

    objectClass: orclContainer

    dn: cn=Users,cn=oracleAccounts,dc=mycompany,dc=com

    cn: Users

    objectClass: top

    objectClass: orclContainer

    dn: cn=Groups,cn=oracleAccounts,dc=mycompany,dc=com

    cn: Groups

    objectClass: top

    objectClass: orclContainer

    dn: cn=Reserve,cn=orcleAccounts,dc=mycompany,dc=com

    cn: Reserve

    objectClass: top

    objectClass: orclContainer

    ```


    This file contains the information needed to create new containers for OIM to
    use for synchronization. Create the containers in OID using the `ldapadd` command.
    For example:


    ```bash

    ldapadd –h 10.0.70.229 –p  3060 –D cn=orcladmin –w ****** –c –f oidContainers.ldif

    ```


    In this example, `-h` is the hostname of the OID server, `-p` is the LDAP port
    of the OID server, `-D` is `cn=orcladmin`, `-w` is the oracladmin password, and
    `-f` is the full path to the `oidContainers.ldif` file.


    The `ldapadd` command is found within the `ORACLE_HOME/bin` directory for OID.


    After creating the containers for enabling LDAP synchronization, you must create
    the users, groups, and ACIs required by Oracle Identity Manager’s LDAP synchronization
    process. Begin by creating another file called `oimAdmin.ldif` with the following
    content.


    ```ldif

    dn: cn=systemids,dc=mycompany,dc=com

    changetype: add

    objectclass: orclContainer

    objectclass: top

    cn: systemids

    dn: cn=oimAdminUser,cn=systemids,dc=mycompany,dc=com

    changetype: add

    objectclass: top

    objectclass: person

    objectclass: organizationalPerson

    objectclass: inetorgperson

    objectclass: orclusers

    objectclass: orcluserV2

    mail: oimAdminUser

    givenname: oimAdminUser

    sn: oimAdminUser

    cn: oimAdminUser

    uid: oimAdminUser

    userPassword: gundam1

    dn: cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com

    changetype: add

    objectclass: groupOfUniqueNames

    objectclass: orclPrivilegeGroup

    objectclass: top

    cn: oimAdminGroup

    description: OIM administrator role

    uniquemember: cn=oimAdminUser,cn=systemids,dc=mycompany,dc=com

    dn: cn=oracleAccounts,dc=mycompany,dc=com

    changetype: modify

    orclaci: access to entry by group="cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com"
    (add,browse,delete) by * (none)

    orclaci: access to attr=(*) by group="cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com"
    (read,search,write,compare) by * (none)

    dn: cn=changelog

    changetype: modify

    add: orclaci

    orclaci: access to entry by group="cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com"
    (browse) by * (none)

    orclaci: access to attr=(*) by group="cn=oimAdminGroup,cn=systemids,dc=mycompany,dc=com"
    (read,search,compare) by * (none)

    ```


    With this file created, you will import the new objects into OID using the `ldapmodify`
    command also located in the `ORACLE_HOME/bin` directory.


    ```bash

    ldapmodify -h 10.0.70.229 -p 3060 -d cn=orcladmin -w gundam1 -c -v –f oidAdmin.ldif

    ```


    Validate that this `ldapmodify` command worked properly by performing the following
    commands. They should both return no errors.


    ```bash

    ldapsearch -h  -p  -D "cn=orcladmin"  -w gundam1-b "dc=mycompany,dc=com" -sone
    "objectclass=*" orclaci

    ldapsearch -h  -p  -D  "cn=oimAdminUser,cn=systemids,dc=mycompany,dc=com" -w *
    -b  "cn=changelog" -s sub "changenumber>=0"

    ```


    In environments such as this, where OAM and OIM are to be integrated, you must
    extend OID for OAM and OIM integration by extending the OAM schema. You will need
    to use the `ldapmodify` script to import four files located in the OAM home directory.


    Move your working directory to `/home/oracle/IAMMiddleware/Oracle_IAM1/oam/server/oim-intg/ldif/oid/schema/oim-intg/ldif/oid/schema`.
    There are four files: `OID_oblix_pwd_schema_add.ldif`, `OID_oblix_schema_add.ldif`,
    `OID_oim_pwd_schema_add.ldif`, and `OID_oblix_schema_index_add.ldif`. Use the
    following examples to import the new schema information.


    ```bash

    ldapmodify -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oblix_pwd_schema_add.ldif

    ldapmodify -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oblix_schema_add.ldif

    ldapmodify -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oim_pwd_schema_add.ldif

    ldapmodify -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oblix_schema_index_add.ldif

    ```'
