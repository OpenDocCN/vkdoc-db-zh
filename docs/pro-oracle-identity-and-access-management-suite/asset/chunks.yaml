    OIM 管理员密码和密钥库密码的屏幕。请记录这些值，因为它们在后续过程中将是必需的。


    ![A352855_1_En_10_Fig11_HTML.jpg](A352855_1_En_10_Fig11_HTML.jpg)


    图 10-11. OIM 服务器配置


    OIM Administrator Password 应设置为您能记住的值。OIM HTTP URL 是用于 Identity Manager 的 URL。如果
    OIM 服务器前面有 Oracle HTTP Server (OHS)，请在此处输入其 URL。如果您尚未安装 OHS 服务器，可以稍后更新此项。输入并确认密钥库密码。


    选中“Enable OIM for Suite Integration”复选框。此环境将包含 OAM 和 OIM 集成。同步是必需的。在本章前面，已经介绍了此操作的前提步骤。如果您尚未完成这些步骤，请立即返回完成，然后再继续。


