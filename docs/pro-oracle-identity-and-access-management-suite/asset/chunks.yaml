    在此类需要集成 OAM 和 OIM 的环境中，您必须通过扩展 OAM 模式来扩展 OID 以用于 OAM 和 OIM 集成。您需要使用 `ldapmodify`
    脚本导入位于 OAM 主目录中的四个文件。


    将您的工作目录移动到 `/home/oracle/IAMMiddleware/Oracle_IAM1/oam/server/oim-intg/ldif/oid/schema/oim-intg/ldif/oid/schema`。有四个文件：`OID_oblix_pwd_schema_add.ldif`、`OID_oblix_schema_add.ldif`、`OID_oim_pwd_schema_add.ldif`
    和 `OID_oblix_schema_index_add.ldif`。使用以下示例导入新的模式信息。


    ```

    ldapmodify -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oblix_pwd_schema_add.ldif

    ldapmodify -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oblix_schema_add.ldif

    ldapmodify -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oim_pwd_schema_add.ldif

    ldapmodify -h 10.0.70.229 -p 3060 -D cn=orcladmin -w gundam1 -f OID_oblix_schema_index_add.ldif

    ```

    '
- fmt: '## Configure Oracle Identity Manager Server


    At this point OID has been set up to be used as the Identity Store for OIM, and
    you can move on to configuring the Identity Manager Server. In a previous chapter,
    you created the new OIM domain in its own WebLogic Middleware Home. That step
    configured an Administration Server, Service-Oriented Architecture (SOA) Server,
    and Identity Management Server. This continues where that left off and prepares
    OIM to be started.


    It is time to start the WebLogic Administration Server and SOA Server. These must
    be running before configuring Identity Manager. Move to the Identity Management
    domain directory `/home/oracle/IDMMiddleware/user_projects/oim_domain`. Execute
    the command `startWeblogic.sh`. If you wish to have this start in the background,
    you can execute the command using `nohup`, such as `nohup ./startWeblogic.sh >
    weblogic.out &`. This will direct the output of the command to the file `weblogic.out`.
    To do this, WLS must be configured to start in Development mode. If the server
    is configured to start in Production mode, then you will need to ensure there
    is a `boot.properties` file in place. Next start SOA. This can be accomplished
    by executing `./startManagedWebLogic.sh soa_server1` in the `bin` directory.


    **Note**


    To start servers in the background, either the file `boot.properties` must be
    present in the security directory, or the server must be in Development mode.


    Create a file called `boot.properties` formatted as follows in the `<Domain Home/servers/<ServerName>/security`
    directory.


    ```

    username=weblogic

    password=

    ```


    Now that the WebLogic Administration Server and SOA Servers are started, you can
    continue configuring the Identity Manager Server.


    Navigate to `<Middleware_Home>/Oracle_IDM1/bin`, where `Middleware_Home` is the
    directory in which you installed OIM. In the case of this example, it is `/home/oracle/IDMMiddleware`.
    In the `bin` directory, execute `config.sh`:


    ```

    //bin/config.sh

    ```


    **Note**


    Only run the `config.sh` file located in this directory for this step. There are
    other locations where `config.sh` might be found. Only this one will launch the
    correct GUI.


    The first step is to select the components to be configured during this step.
    The required component is OIM Server. OIM Design Console and OIM Remote Manager
    can only be installed on Microsoft Windows and as such, you will not be installing
    them here. If you decide at a later time to install these on a separate server,
    you may do so. Make your selection as shown in Figure 10-8.


    ![A352855_1_En_10_Fig8_HTML.jpg](A352855_1_En_10_Fig8_HTML.jpg)

    *Figure 10-8. Select components to configure*


    After selecting the component to configure, the tool will ask for database information
    regarding the OIM installation. You created the necessary repository database
    objects when installing the software. Here you will specify the details. Figure
    10-9 shows the database connection screen.


    ![A352855_1_En_10_Fig9_HTML.jpg](A352855_1_En_10_Fig9_HTML.jpg)

    *Figure 10-9. Database information*


    Connect String should be entered in the format `hostname:port:sid`. In the case
    of this example, you have a single database instance. If you are using a RAC database,
    you can enter both nodes as follows: `host1:port1:instancename1^host2:port2:instancename2@<ServiceName.`


    OIM Schema User Name is the schema name entered during the RCU operation earlier
    in the book. In this case, use `imdev_oim`.


    OIM Schema Password is entered in the next line. You provided this password during
    the RCU operation.


    MDS Connect String will default to the same as the Connect String value already
    entered. If you installed the MDS schema in a different database, select the **Select
    different database for MDS Schema** check box and you will be able to edit this
    field.


    MDS Schema User Name should contain the username configured during the RCU operation,
    `imdev_mds` in this case.'
