- fmt: "## Configure and Deploy Oracle WebGate\n\nNow that the OHS and OAM WebGate\
    \ software has been installed, it is time to deploy the WebGate into OHS. The\
    \ tools to do this are located within the Oracle WebGate home directory. This\
    \ is the directory chosen during the installation.\n\nUsing a command prompt,\
    \ navigate to the directory\n\n```\n/webgate/ohs/tools/deployWebGate\n```\n\n\
    The tool `deployWebGateInstance.sh` requires two parameters: WebGate Home and\
    \ WebGate Instance Home. These are specified with the `–w` and `–oh` parameters.\
    \ WebGate Home, specified with the `–oh`, is the installation directory for the\
    \ WebGate software. The WebGate instance directory, specified with `–w`, is the\
    \ OHS instance directory, which, in many cases, is located in the `Oracle_WT1/instances/instance1/config/OHS/ohs1`\
    \ directory.\n\nThe command should look like this:\n\n```\n./deployWebGateInstance.sh\
    \ –w /home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1\
    \ –oh /home/oracle/OHSMiddleware/Oracle_OAMWebGate11g\n```\n\nRunning the `deployWebGateInstance.sh`\
    \ tool copies the required agent files to the WebGate instance directory. You\
    \ can verify this by looking in the directory `/home/oracle/Oracle_WT1/instances/instance1/config/OHS/ohs1`.\
    \ You should see a `webgate` directory and a `webgate.conf` file.\n\nThe next\
    \ step in the deployment process is to modify the files required to make OHS aware\
    \ of the WebGate.\n\nTo do this, you must first ensure the `LD_LIBRARY_PATH` includes\
    \ the OHS `lib` folder by running\n\n```\nexport LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/home/oracle/OHSMiddleware/Oracle_WT1/lib\n\
    ```\n\nNext move to the directory `/home/oracle/OHSMiddleware/Oracle_OAMWebGate11g/webgate/ohs/tools/setup/InstallTools`.\
    \ From this directory, run the command\n\n```\n./EditHttpConf –w  -oh \n```\n\n\
    The preceding command requires two parameters: WebGate Home and WebGate Instance\
    \ Home. These are specified with the `–w` and `–oh` parameters. WebGate Home,\
    \ specified with the `–oh`, is the installation directory for the WebGate software.\
    \ The WebGate instance directory, specified with `–w`, is the OHS instance directory,\
    \ which, in many cases, is located in the `Oracle_WT1/instances/instance1/config/OHS/ohs1`\
    \ directory.\n\nVerify that the command made the appropriate changes. Look within\
    \ the `/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/conf/OHS/ohs1`\
    \ directory for the `httpd.conf` file. It should now include the following line\
    \ at the end of the file:\n\n```\ninclude \"/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1/webgate.conf”\n\
    ```\n\n## Summary\n\nYou now have an OHS and OAM 11g WebGate instance. Your OHS\
    \ can be used as a web server to host applications that must be protected by OAM.\
    \ The foundation components are now in place to implement the Oracle Identity\
    \ and Access Management Suite. The next few chapters provide the information necessary\
    \ to stitch them all together.\n\n# 9. Configuring Oracle Access Manager\n\nAll\
    \ required components have now been installed. You have created a domain for each\
    \ of the components in separate Middleware Homes. This simplifies future upgrades\
    \ and maintenance. After completing this set of operations, the actual components\
    \ need to be configured and prepared for the actual integrations. The configuration\
    \ process consists of setting up the components relative to your environment.\
    \ The following pages discuss how to configure OAM to support single sign-on (SSO)\
    \ in your environment.\n\n## Preparing Access Manager to Use Oracle Internet Directory\n\
    \nOAM, by default, is configured to utilize the WebLogic built-in Lightweight\
    \ Directory Access Protocol (LDAP) user store for both the system and default\
    \ store. It is highly recommended that you configure OAM to use an external data\
    \ store in production environments. Although you might not be setting up a production\
    \ environment, it is recommended that you configure your development or test environments\
    \ similar to your production system. As such, this chapter demonstrates how to\
    \ configure OAM to use Oracle Internet Directory (OID) as its identity store.\n\
    \nTo use OID as the identity store, the first step is to configure the WebLogic\
    \ security realm to recognize OID. Open the OAM WebLogic domain Administration\
    \ Console by pointing your browser to `http://host:port/console`. In this book,\
    \ the OAM WebLogic Server Administration Console is configured for Host `10.0.70.229`\
    \ Port `17001`. If you recall from previous chapters, OID uses Port `7001` and\
    \ Oracle Identity Manager (OIM), `27001`. Figure [9-1](#A352855_1_En_9_Chapter.html#Fig1)\
    \ shows the WebLogic Administration Console Security Realm.\n\n![A352855_1_En_9_Fig1_HTML.jpg](A352855_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1. WebLogic Server Security Realm\n\nOnce logged into the Administration\
    \ Console for the OAM domain, navigate to Security Realms ➤ myrealm. The screen\
    \ displays the default security realm configured during the domain creation. It\
    \ consists of the DefaultAuthenticator, IAMSuiteAgent, and the DefaultIdentityAsserter.\
    \ In this step, you will be adding an authenticator to support OID. Click New\
    \ to create the new authenticator. This will open the Create a New Authentication\
    \ Provider screen shown in Figure [9-2](#A352855_1_En_9_Chapter.html#Fig2).\n\n\
    ![A352855_1_En_9_Fig2_HTML.jpg](A352855_1_En_9_Fig2_HTML.jpg)\n\nFigure 9-2. Create\
    \ OID authenticator\n\nOn this screen, provide a name for the new authenticator.\
    \ In this case, name it `OIDAuthenticator` and select `OracleInternetDirectoryAuthenticator`\
    \ in the Type field. Click OK.\n\nFigure [9-3](#A352855_1_En_9_Chapter.html#Fig3)\
    \ shows the reordering screen for the WebLogic authentication providers.\n\n![A352855_1_En_9_Fig3_HTML.jpg](A352855_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3. Reorder providers\n\nAfter creating the new provider, it should\
    \ be set to be first in the list of providers. Select the box next to the new\
    \ `OIDAuthenticator` and use the arrows to move it up to the appropriate position.\
    \ Click OK to save this step. You can then move on to setting the Control Flag\
    \ attribute shown in Figure [9-4](#A352855_1_En_9_Chapter.html#Fig4).\n\n![A352855_1_En_9_Fig4_HTML.jpg](A352855_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4. Provider common configuration\n\nAfter reordering the providers,\
    \ you must configure the `OIDAuthenticator`. First set the control flag to `Sufficient`.\
    \ This allows the newly created authenticator to provide authentication services,\
    \ but not require that a user exist within the OID user store to access resources.\
    \ This is necessary, as some users, such as `weblogic`, might not exist in OID.\
    \ After finishing the configuration of `OIDAuthenticator`, the control flag on\
    \ the `DefaultAuthenticator` must also be set to `Sufficient`.\n\nOn the Provider\
    \ Details tab, shown in Figure [9-5](#A352855_1_En_9_Chapter.html#Fig5), enter\
    \ the configuration details of the new authenticator. In this case, set the values\
    \ according to the values in Table [9-1](#A352855_1_En_9_Chapter.html#Tab1).\n\
    \nTable 9-1. OID Authenticator Parameters\n\n| Host | Host where OID is installed\
    \ |\n| Port | OID LDAP port (OID defaults to `3060`) |\n| Principal | `cn=orcladmin`\
    \ or other principal to be used for the authenticator |\n| Credential | Password\
    \ used by the principal |\n| User Base DN | `cn=users,dc=mycompany,dc=com` |\n\
    | Group Base DN | `cn=groups,dc=mycompany,dc=com` |\n\n![A352855_1_En_9_Fig5_HTML.jpg](A352855_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5. Authenticator details"
  raw: "## Configure and Deploy Oracle WebGate\n\nNow that the OHS and OAM WebGate\
    \ software has been installed, it is time to deploy the WebGate into OHS. The\
    \ tools to do this are located within the Oracle WebGate home directory. This\
    \ is the directory chosen during the installation.\n\nUsing a command prompt,\
    \ navigate to the directory\n\n```\n/webgate/ohs/tools/deployWebGate\n```\n\n\
    The tool `deployWebGateInstance.sh` requires two parameters: WebGate Home and\
    \ WebGate Instance Home. These are specified with the `–w` and `–oh` parameters.\
    \ WebGate Home, specified with the `–oh`, is the installation directory for the\
    \ WebGate software. The WebGate instance directory, specified with `–w`, is the\
    \ OHS instance directory, which, in many cases, is located in the `Oracle_WT1/instances/instance1/config/OHS/ohs1`\
    \ directory.\n\nThe command should look like this:\n\n```\n./deployWebGateInstance.sh\
    \ –w /home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1\
    \ –oh /home/oracle/OHSMiddleware/Oracle_OAMWebGate11g\n```\n\nRunning the `deployWebGateInstance.sh`\
    \ tool copies the required agent files to the WebGate instance directory. You\
    \ can verify this by looking in the directory `/home/oracle/Oracle_WT1/instances/instance1/config/OHS/ohs1`.\
    \ You should see a `webgate` directory and a `webgate.conf` file.\n\nThe next\
    \ step in the deployment process is to modify the files required to make OHS aware\
    \ of the WebGate.\n\nTo do this, you must first ensure the `LD_LIBRARY_PATH` includes\
    \ the OHS `lib` folder by running\n\n```\nexport LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/home/oracle/OHSMiddleware/Oracle_WT1/lib\n\
    ```\n\nNext move to the directory `/home/oracle/OHSMiddleware/Oracle_OAMWebGate11g/webgate/ohs/tools/setup/InstallTools`.\
    \ From this directory, run the command\n\n```\n./EditHttpConf –w  -oh \n```\n\n\
    The preceding command requires two parameters: WebGate Home and WebGate Instance\
    \ Home. These are specified with the `–w` and `–oh` parameters. WebGate Home,\
    \ specified with the `–oh`, is the installation directory for the WebGate software.\
    \ The WebGate instance directory, specified with `–w`, is the OHS instance directory,\
    \ which, in many cases, is located in the `Oracle_WT1/instances/instance1/config/OHS/ohs1`\
    \ directory.\n\nVerify that the command made the appropriate changes. Look within\
    \ the `/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/conf/OHS/ohs1`\
    \ directory for the `httpd.conf` file. It should now include the following line\
    \ at the end of the file:\n\n```\ninclude \"/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1/webgate.conf”\n\
    ```\n\n## Summary\n\nYou now have an OHS and OAM 11g WebGate instance. Your OHS\
    \ can be used as a web server to host applications that must be protected by OAM.\
    \ The foundation components are now in place to implement the Oracle Identity\
    \ and Access Management Suite. The next few chapters provide the information necessary\
    \ to stitch them all together.\n\n# 9. Configuring Oracle Access Manager\n\nAll\
    \ required components have now been installed. You have created a domain for each\
    \ of the components in separate Middleware Homes. This simplifies future upgrades\
    \ and maintenance. After completing this set of operations, the actual components\
    \ need to be configured and prepared for the actual integrations. The configuration\
    \ process consists of setting up the components relative to your environment.\
    \ The following pages discuss how to configure OAM to support single sign-on (SSO)\
    \ in your environment.\n\n## Preparing Access Manager to Use Oracle Internet Directory\n\
    \nOAM , by default, is configured to utilize the WebLogic built-in Lightweight\
    \ Directory Access Protocol (LDAP) user store for both the system and default\
    \ store. It is highly recommended that you configure OAM to use an external data\
    \ store in production environments. Although you might not be setting up a production\
    \ environment, it is recommended that you configure your development or test environments\
    \ similar to your production system. As such, this chapter demonstrates how to\
    \ configure OAM to use Oracle Internet Directory (OID) as its identity store.\n\
    \nTo use OID as the identity store, the first step is to configure the WebLogic\
    \ security realm to recognize OID. Open the OAM WebLogic domain Administration\
    \ Console by pointing your browser to `http://host:port/console`. In this book,\
    \ the OAM WebLogic Server Administration Console is configured for Host 10.0.70.229\
    \ Port 17001\\. If you recall from previous chapters, OID uses Port 7001 and Oracle\
    \ Identity Manager (OIM), 27001. Figure [9-1](#A352855_1_En_9_Chapter.html#Fig1)\
    \ shows the WebLogic Administration Console Security Realm.\n\n![A352855_1_En_9_Fig1_HTML.jpg](A352855_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1.\n\nWebLogic Server Security Realm\n\nOnce logged into the Administration\
    \ Console for the OAM domain, navigate to Security Realms ➤ myrealm. The screen\
    \ displays the default security realm configured during the domain creation. It\
    \ consists of the DefaultAuthenticator, IAMSuiteAgent, and the DefaultIdentityAsserter.\
    \ In this step, you will be adding an authenticator to support OID. Click New\
    \ to create the new authenticator . This will open the Create a New Authentication\
    \ Provider screen shown in Figure [9-2](#A352855_1_En_9_Chapter.html#Fig2).\n\n\
    ![A352855_1_En_9_Fig2_HTML.jpg](A352855_1_En_9_Fig2_HTML.jpg)\n\nFigure 9-2.\n\
    \nCreate OID authenticator\n\nOn this screen, provide a name for the new authenticator.\
    \ In this case, name it OIDAuthenticator and select OracleInternetDirectoryAuthenticator\
    \ in the Type field. Click OK.\n\nFigure [9-3](#A352855_1_En_9_Chapter.html#Fig3)\
    \ shows the reordering screen for the WebLogic authentication providers.\n\n![A352855_1_En_9_Fig3_HTML.jpg](A352855_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3.\n\nReorder providers\n\nAfter creating the new provider, it should\
    \ be set to be first in the list of providers. Select the box next to the new\
    \ OIDAuthenticator and use the arrows to move it up to the appropriate position.\
    \ Click OK to save this step. You can then move on to setting the Control Flag\
    \ attribute shown in Figure [9-4](#A352855_1_En_9_Chapter.html#Fig4).\n\n![A352855_1_En_9_Fig4_HTML.jpg](A352855_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4.\n\nProvider common configuration\n\nAfter reordering the providers,\
    \ you must configure the OIDAuthenticator. First set the control flag to Sufficient.\
    \ This allows the newly created authenticator to provide authentication services,\
    \ but not require that a user exist within the OID user store to access resources.\
    \ This is necessary, as some users, such as weblogic, might not exist in OID.\
    \ After finishing the configuration of OIDAuthenticator, the control flag on the\
    \ DefaultAuthenticator must also be set to Sufficient.\n\nOn the Provider Details\
    \ tab, shown in Figure [9-5](#A352855_1_En_9_Chapter.html#Fig5), enter the configuration\
    \ details of the new authenticator. In this case, set the values according to\
    \ the values in Table [9-1](#A352855_1_En_9_Chapter.html#Tab1).\n\nTable 9-1.\n\
    \nOID Authenticator Parameters\n\n| Host | Host where OID is installed |\n| Port\
    \ | OID LDAP port (OID defaults to 3060) |\n| Principal | cn=orcladmin or other\
    \ principal to be used for the authenticator |\n| Credential | Password used by\
    \ the principal |\n| User Base DN | cn=users,dc=mycompany,dc=com |\n| Group Base\
    \ DN | cn=groups,dc=mycompany,dc=com |\n\n![A352855_1_En_9_Fig5_HTML.jpg](A352855_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5.\n\nAuthenticator details"
  trans: "\n## 配置与部署 Oracle WebGate\n\n既然 OHS 和 OAM WebGate 软件已安装完毕，是时候将 WebGate 部署到\
    \ OHS 中了。执行此操作的工具位于 Oracle WebGate 主目录中。该目录是在安装过程中选定的。\n\n打开命令提示符，导航至以下目录：\n\n\
    ```\n/webgate/ohs/tools/deployWebGate\n```\n\n工具 `deployWebGateInstance.sh` 需要两个参数：WebGate\
    \ 主目录和 WebGate 实例主目录。这两个参数分别通过 `–w` 和 `–oh` 参数指定。用 `–oh` 指定的 WebGate 主目录是 WebGate\
    \ 软件的安装目录。用 `–w` 指定的 WebGate 实例目录是 OHS 实例目录，在多数情况下，该目录位于 `Oracle_WT1/instances/instance1/config/OHS/ohs1`。\n\
    \n命令应类似于以下形式：\n\n```\n./deployWebGateInstance.sh –w /home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1\
    \ –oh /home/oracle/OHSMiddleware/Oracle_OAMWebGate11g\n```\n\n运行 `deployWebGateInstance.sh`\
    \ 工具会将所需的代理文件复制到 WebGate 实例目录中。你可以通过查看目录 `/home/oracle/Oracle_WT1/instances/instance1/config/OHS/ohs1`\
    \ 来验证这一点。你应该会看到一个 `webgate` 目录和一个 `webgate.conf` 文件。\n\n部署过程的下一步是修改所需的文件，以使 OHS\
    \ 能够识别 WebGate。\n\n为此，你必须首先通过运行以下命令确保 `LD_LIBRARY_PATH` 包含了 OHS 的 `lib` 文件夹：\n\
    \n```\nexport LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/home/oracle/OHSMiddleware/Oracle_WT1/lib\n\
    ```\n\n接下来，移动到目录 `/home/oracle/OHSMiddleware/Oracle_OAMWebGate11g/webgate/ohs/tools/setup/InstallTools`。在此目录下，运行命令：\n\
    \n```\n./EditHttpConf –w  -oh \n```\n\n上述命令需要两个参数：WebGate 主目录和 WebGate 实例主目录。这两个参数分别通过\
    \ `–w` 和 `–oh` 参数指定。用 `–oh` 指定的 WebGate 主目录是 WebGate 软件的安装目录。用 `–w` 指定的 WebGate\
    \ 实例目录是 OHS 实例目录，在多数情况下，该目录位于 `Oracle_WT1/instances/instance1/config/OHS/ohs1`。\n\
    \n验证命令是否已做出适当的更改。检查 `/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/conf/OHS/ohs1`\
    \ 目录中的 `httpd.conf` 文件。它现在应该在文件末尾包含以下行：\n\n```\ninclude \"/home/oracle/OHSMiddleware/Oracle_WT1/instances/instance1/config/OHS/ohs1/webgate.conf”\n\
    ```\n\n## 总结\n\n现在你已经拥有一个 OHS 和 OAM 11g WebGate 实例。你的 OHS 可以用作 Web 服务器来托管需要 OAM\
    \ 保护的应用程序。基础组件现已就位，可以实施 Oracle 标识与访问管理套件。接下来的几章将提供将所有部分整合在一起所需的信息。\n\n# 9. 配置\
    \ Oracle Access Manager\n\n所有必需的组件现已安装完毕。你已经在独立的 Middleware Home 中为每个组件创建了一个域。这简化了未来的升级和维护。完成这组操作后，实际的组件需要被配置，并为实际的集成做好准备。配置过程包括根据你的环境设置组件。以下几页将讨论如何配置\
    \ OAM 以支持你环境中的单点登录 (SSO)。\n\n## 准备 Access Manager 使用 Oracle Internet Directory\n\
    \n默认情况下，OAM 被配置为同时使用 WebLogic 内置的轻量目录访问协议 (LDAP) 用户存储区作为系统存储区和默认存储区。强烈建议你在生产环境中配置\
    \ OAM 使用外部数据存储区。虽然你可能并非在设置生产环境，但建议你将开发或测试环境配置得与生产系统相似。因此，本章将演示如何配置 OAM 使用 Oracle\
    \ Internet Directory (OID) 作为其标识存储区。\n\n要使用 OID 作为标识存储区，第一步是配置 WebLogic 安全域以识别\
    \ OID。将浏览器指向 `http://host:port/console` 来打开 OAM WebLogic 域管理控制台。在本书中，OAM WebLogic\
    \ Server 管理控制台配置的主机为 `10.0.70.229`，端口为 `17001`。如果你还记得前面的章节，OID 使用端口 `7001`，而 Oracle\
    \ Identity Manager (OIM) 使用 `27001`。图 9-1 显示了 WebLogic 管理控制台的安全域。\n\n![A352855_1_En_9_Fig1_HTML.jpg](img/A352855_1_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1. WebLogic Server 安全域\n\n登录到 OAM 域的管理控制台后，导航至“安全域” ➤ “myrealm”。屏幕将显示在域创建期间配置的默认安全域。它由\
    \ DefaultAuthenticator、IAMSuiteAgent 和 DefaultIdentityAsserter 组成。在此步骤中，你将添加一个身份验证器以支持\
    \ OID。单击“新建”以创建新的身份验证器。这将打开如图 9-2 所示的“创建新身份验证提供程序”屏幕。\n\n![A352855_1_En_9_Fig2_HTML.jpg](img/A352855_1_En_9_Fig2_HTML.jpg)\n\
    \n图 9-2. 创建 OID 身份验证器\n\n在此屏幕上，为新身份验证器提供一个名称。在本例中，将其命名为 `OIDAuthenticator`，并在“类型”字段中选择\
    \ `OracleInternetDirectoryAuthenticator`。单击“确定”。\n\n图 9-3 显示了 WebLogic 身份验证提供程序的重新排序屏幕。\n\
    \n![A352855_1_En_9_Fig3_HTML.jpg](img/A352855_1_En_9_Fig3_HTML.jpg)\n\n图 9-3.\
    \ 重新排序提供程序\n\n创建新提供程序后，应将其设置为提供程序列表中的第一位。选中新 `OIDAuthenticator` 旁边的复选框，然后使用箭头将其移动到适当的位置。单击“确定”保存此步骤。然后，你可以继续设置图\
    \ 9-4 所示的“控制标志”属性。\n\n![A352855_1_En_9_Fig4_HTML.jpg](img/A352855_1_En_9_Fig4_HTML.jpg)\n\
    \n图 9-4. 提供程序公共配置\n\n对提供程序重新排序后，必须配置 `OIDAuthenticator`。首先将控制标志设置为 `Sufficient`。这允许新创建的身份验证器提供身份验证服务，但不要求用户必须存在于\
    \ OID 用户存储区中才能访问资源。这是必要的，因为某些用户（例如 `weblogic`）可能不存在于 OID 中。完成 `OIDAuthenticator`\
    \ 的配置后，`DefaultAuthenticator` 上的控制标志也必须设置为 `Sufficient`。\n\n在如图 9-5 所示的“提供程序详细信息”选项卡上，输入新身份验证器的配置详细信息。在本例中，根据表\
    \ 9-1 中的值进行设置。\n\n表 9-1. OID 身份验证器参数\n\n| 参数 | 描述 |\n| :--- | :--- |\n| 主机 | 安装\
    \ OID 的主机 |\n| 端口 | OID LDAP 端口（OID 默认为 `3060`） |\n| 主体 | `cn=orcladmin` 或用于身份验证器的其他主体\
    \ |\n| 凭证 | 主体使用的密码 |\n| 用户基准 DN | `cn=users,dc=mycompany,dc=com` |\n| 组基准 DN\
    \ | `cn=groups,dc=mycompany,dc=com` |\n\n![A352855_1_En_9_Fig5_HTML.jpg](img/A352855_1_En_9_Fig5_HTML.jpg)\n\
    \n图 9-5. 身份验证器详细信息\n"
- fmt: 'Customize the other fields as needed. In most cases, the default values will
    work. Click Save to continue. As mentioned earlier, you will need to configure
    the `DefaultAuthenticator` control flag to `Sufficient`. Use Figure [9-6](#A352855_1_En_9_Chapter.html#Fig6)
    as an example of the field to be updated.


    ![A352855_1_En_9_Fig6_HTML.jpg](A352855_1_En_9_Fig6_HTML.jpg)


    Figure 9-6.

    Default authenticator control flag


    After configuring the `OIDAuthenticator` properties and setting the control flag
    for both `OIDAuthenticator` and `DefaultAuthenticator`, you will need to restart
    the OAM Managed Server and the WebLogic Administration Server. Follow the steps
    presented earlier in this book to restart all processes.


    ## Preconfiguring OID for Oracle Access Manager


    With the OAM domain configured with the OID Authenticator, it is time to configure
    the identity store within OAM. This configuration ensures that OAM uses the instance
    of OID configured previously.


    When logging into the `OAMConsole` for the first time, you will need to use the
    `weblogic` user, as OAM is using the default authenticator and `oamadmin` does
    not yet have administrator access to the `OAMConsole`. As such, the first step
    in the process is to create the necessary users and groups in OID in preparation
    of the integration.


    From a command prompt, set your working directory to `<ORACLE_HOME>/idmtools/bin`,
    where `<ORACLE_HOME>` is the installation directory for OAM. You will run all
    of the IDM Tool commands for this section from this location.


    **Note**

    The IDM Tool should always be run from the same location to ensure the parameter
    files are updated properly. However, in a split domain, where OIM is installed
    in a separate WLS home or on a separate server, you run the `–configOIM` command
    in the OIM home.


    Prior to running the `idmConfigTool.sh` command, you must ensure that the environment
    variables are set properly. Failure to do so will result in a variety of errors,
    not all of which will point to the cause. Set the environment variables as follows:


    ```bash

    MW_HOME=/home/oracle/OAMMiddlewareHome

    JAVA_HOME=

    IDM_HOME=/home/oracle/OIDMiddlewareHome

    ORACLE_HOME=/home/oracle/OAMMiddlewareHome/Oracle_IAM1

    IAM_ORACLE_HOME=/home/oracle/OAMMiddlewareHome/OracleIAM1

    ```


    These values should reflect the installation directories used in your specific
    environment. Notice that the `MW_HOME` and `ORACLE_HOME` pertain to the Oracle
    Access Management installation. `IDM_HOME` should refer to the OID installation.
    `IDM_HOME` is an optional parameter and can be left out if OID is installed on
    a separate server.


    Create a file called `extendOAMPropertyFile`:


    ```

    extendOAMPropertyFile

    IDSTORE_HOST: 10.0.70.229

    IDSTORE_PORT: 3060

    IDSTORE_BINDDN: cn=orcladmin

    IDSTORE_USERNAMEATTRIBUTE: cn

    IDSTORE_LOGINATTRIBUTE: uid

    IDSTORE_USERSEARCHBASE: cn=Users,dc=mycompany,dc=com

    IDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com

    IDSTORE_SEARCHBASE: dc=mycompany,dc=com

    IDSTORE_SYSTEMIDBASE: cn=systemids,dc=mycompany,dc=com

    ```


    The values in the `extendOAMPropertyFile` should be set as follows:


    *   `IDSTORE_HOST`: This should be set to the hostname of the OID instance, or
    the virtual hostname of a load balanced OID instance.

    *   `IDSTORE_PORT`: Set this to the LDAP port of the OID instance.

    *   `IDSTORE_BINDDN`: `cn=orcladmin`. This value will be used by the tool to log
    in to OID. This user should have access to create users and groups within the
    `usersearchbase` and `groupsearchbase`.

    *   `IDSTORE_LOGINATTRIBUTE`: This should be set to the attribute within the LDAP
    store that contains the login name.

    *   `IDSTORE_USERSEARCHBASE`: Set this attribute to the location within the ID
    store where users are stored.

    *   `IDSTORE_GROUPSEARCHBASE`: Set this attribute to the location within the ID
    store where groups are stored.

    *   `IDSTORE_SEARCHBASE`: Parent container that contains the previously mentioned
    searchbase.

    *   `IDSTORE_SYSTEMIDBASE`: New container that will store system IDs to be used
    by the Identity Management suite.


    Create a file called `preConfigOAMProperties` with the following content:


    ```bash

    vi preconfigOAMPropertyFile

    IDSTORE_HOST : 10.0.70.229

    IDSTORE_PORT : 3060

    IDSTORE_BINDDN : cn=orcladmin

    IDSTORE_USERNAMEATTRIBUTE: cn

    IDSTORE_LOGINATTRIBUTE: uid

    IDSTORE_USERSEARCHBASE: cn=Users,dc=mycompany,dc=com

    IDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com

    IDSTORE_SEARCHBASE: dc=mycompany,dc=com

    IDSTORE_SYSTEMIDBASE: cn=systemids,dc=mycompany,dc=com

    POLICYSTORE_SHARES_IDSTORE: true

    OAM11G_IDSTORE_ROLE_SECURITY_ADMIN:OAMAdministrators

    IDSTORE_OAMSOFTWAREUSER:oamLDAP

    IDSTORE_OAMADMINUSER:oamadmin

    ```


    The values entered in this file should reflect the values used in your environment.'
