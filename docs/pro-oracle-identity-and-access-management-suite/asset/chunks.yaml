    ## Oracle HTTP Server 软件安装与配置


    OHS 软件的安装和配置非常简单。安装程序会引导您完成安装，并在过程结束时配置服务器。因此，安装结束后，您应该能够通过导航到指定的主机名和端口来测试服务器。


    与 Identity Management 安装软件非常相似，它通过运行命令从软件位置启动。图`[8-1](#A352855_1_En_8_Chapter.html#Fig1)`显示了
    Web Tier 安装程序的欢迎页面。


    ![A352855_1_En_8_Fig1_HTML.jpg](A352855_1_En_8_Fig1_HTML.jpg)


    图 8-1.


    启动 Universal Installer


    ```

    runInstaller -jreLoc /home/oracle/jdk1.6.0_45/jre

    ```


    在此阶段，请确保您计划安装的 OHS 版本显示在欢迎屏幕上。每个 OHS 版本都有自己的安装程序。在安装 OHS 之前，您应该检查 Oracle 认证矩阵，以确保
    OAM WebGate 版本兼容。


    OHS 是一个可以使用`Install and Configure option`的组件，如图`[8-2](#A352855_1_En_8_Chapter.html#Fig2)`所示。这是执行此操作的最简单方法，因为它不需要运行其他工具或在以后修改配置文件。


    ![A352855_1_En_8_Fig2_HTML.jpg](A352855_1_En_8_Fig2_HTML.jpg)


    图 8-2.


    安装和配置设置


    在本章开头，列出了操作系统先决条件。如果显示任何错误或警告，请在继续之前更正它们。安装程序将检查操作系统，并通知您任何缺失的先决条件，如图`[8-3](#A352855_1_En_8_Chapter.html#Fig3)`所示。


    ![A352855_1_En_8_Fig3_HTML.jpg](A352855_1_En_8_Fig3_HTML.jpg)


    图 8-3.


    先决条件检查屏幕


    OHS 可以安装在现有的 WebLogic 主目录中，也可以放置在新目录中。如果您计划在域中注册此 OHS 实例，则必须在该域的`Middleware Home
    directory`中安装软件。但是，将 OHS 安装在自己的目录中，并且不向域注册是完全可以接受的。虽然您可能会失去一些监控和管理能力，但大多数操作都可以通过命令行执行。如图`[8-4](#A352855_1_En_8_Chapter.html#Fig4)`所示，输入为
    Web Tier 指定的新`Middleware Home`的位置。


    ![A352855_1_En_8_Fig4_HTML.jpg](A352855_1_En_8_Fig4_HTML.jpg)


    图 8-4.


    Middleware Home 位置


    至少，您应该安装 Oracle HTTP Server 组件，如图`[8-5](#A352855_1_En_8_Chapter.html#Fig5)`所示。如果您的环境需要`Web
    Cache`，请选择它。此处选中`Oracle Web Cache`复选框仅是为了显示配置屏幕。Web Cache 超出了本书的范围。因为此 OHS 实例独立于
    WebLogic 域，所以`Associate Selected Components with WebLogic Domain`复选框未被选中。


    ![A352855_1_En_8_Fig5_HTML.jpg](A352855_1_En_8_Fig5_HTML.jpg)


    图 8-5.


    配置组件屏幕


    在`Specify Component Details`屏幕上，您有机会为每个组件指定实例主目录和名称。确保将其设置为您能记住的内容。图`[8-6](#A352855_1_En_8_Chapter.html#Fig6)`显示了`Specify
    Component Details`屏幕的示例。


    ![A352855_1_En_8_Fig6_HTML.jpg](A352855_1_En_8_Fig6_HTML.jpg)


