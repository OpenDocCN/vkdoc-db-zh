    process, stop the installation and fix any problems before proceeding.


    ## Oracle HTTP Server Software Installation and Configuration


    The OHS software installation and configuration is very straightforward. The installer
    guides you through the installation and configures the server at the end of the
    process. As such, at the end of the installation, you should be able to test the
    server by navigating to the hostname and port specified.


    Much like the Identity Management installation software, this is started from
    the software location by running the command. Figure [8-1](#A352855_1_En_8_Chapter.html#Fig1)
    shows the Welcome page for the Web Tier Installer .


    ![A352855_1_En_8_Fig1_HTML.jpg](A352855_1_En_8_Fig1_HTML.jpg)


    Figure 8-1.


    Starting the Universal Installer


    ```

    runInstaller -jreLoc /home/oracle/jdk1.6.0_45/jre

    ```


    At this stage, ensure that the version of OHS you plan to install is displayed
    on the Welcome screen. Each version of OHS has its own installer. Prior to installing
    OHS, you should check the Oracle certification matrices to ensure that the OAM
    WebGate version is compatible.


    OHS is a component that can used the Install and Configure option as seen in Figure
    [8-2](#A352855_1_En_8_Chapter.html#Fig2). This is the simplest method of performing
    this operation as it does not require running additional tools or modifying configuration
    files at a later time.


    ![A352855_1_En_8_Fig2_HTML.jpg](A352855_1_En_8_Fig2_HTML.jpg)


    Figure 8-2.


    Install and configure setting


    In the beginning of this chapter, the OS prerequisites were listed. If any errors
    or warnings are displayed, correct them before moving forward. The installer will
    check the OS and inform you of any missing prerequisites, as displayed in Figure
    [8-3](#A352855_1_En_8_Chapter.html#Fig3).


    ![A352855_1_En_8_Fig3_HTML.jpg](A352855_1_En_8_Fig3_HTML.jpg)


    Figure 8-3.


    Prerequisite Checks screen


    OHS can be installed within an existing WebLogic home directory, or placed in
    a new directory. If you plan to register this OHS instance within a domain, you
    must install the software within the Middleware Home directory of said domain.
    However, it is completely acceptable to install OHS in its own directory, and
    not register it with a domain. Although you might lose some monitoring and administrative
    abilities, most operations can be performed via the command line. As shown in
    Figure [8-4](#A352855_1_En_8_Chapter.html#Fig4), enter the location of the new
    Middleware Home designated for the Web Tier.


    ![A352855_1_En_8_Fig4_HTML.jpg](A352855_1_En_8_Fig4_HTML.jpg)


    Figure 8-4.


    Middleware Home location


    At a minimum, you should install the Oracle HTTP Server component, shown in Figure
    [8-5](#A352855_1_En_8_Chapter.html#Fig5). If you require Web Cache in your environment,
    select it. The Oracle Web Cache check box is selected here solely to display the
    configuration screens. Web Cache is outside of the scope of this book. Because
    this OHS instance will be independent of a WebLogic domain, the Associate Selected
    Components with WebLogic Domain check box has been left unselected.


    ![A352855_1_En_8_Fig5_HTML.jpg](A352855_1_En_8_Fig5_HTML.jpg)


    Figure 8-5.


    Configure Components screen


    On the Specify Component Details screen, you are afforded the opportunity to specify
    the instance home directories and names for each component. Ensure these are set
    to something you can remember. Figure [8-6](#A352855_1_En_8_Chapter.html#Fig6)
    shows an example of the Specify Component Details screen.


    ![A352855_1_En_8_Fig6_HTML.jpg](A352855_1_En_8_Fig6_HTML.jpg)


    Figure 8-6.


    Specify Component Details screen


    If configuring Web Cache, you must provide a password for the administrative user.
    This user is necessary when making configuration changes to Web Cache. Provide
    the requested information, as shown in Figure [8-7](#A352855_1_En_8_Chapter.html#Fig7).


    ![A352855_1_En_8_Fig7_HTML.jpg](A352855_1_En_8_Fig7_HTML.jpg)


    Figure 8-7.


    Web Cache Administrator Password screen'
