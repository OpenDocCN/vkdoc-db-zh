    COOKIE_EXPIRY_INTERVAL: 120

    OAM_TRANSFER_MODE: SIMPLE

    WEBGATE_TYPE: ohsWebgate11g

    OAM_SERVER_VERSION: 11g

    OAM11G_WLS_ADMIN_HOST: 10.0.70.229

    OAM11G_WLS_ADMIN_PORT: 17001

    OAM11G_WLS_ADMIN_USER: weblogic

    SSO_ENABLED_FLAG: true

    IDSTORE_PORT: 3060

    IDSTORE_HOST: 10.0.70.229

    IDSTORE_DIRECTORYTYPE: OID

    IDSTORE_ADMIN_USER: cn=oamLDAP,cn=systemids,dc=mycompany,dc=com

    IDSTORE_LOGINATTRIBUTE: uid

    IDSTORE_USERSEARCHBASE: cn=Users,dc=mycompany,dc=com

    IDSTORE_GROUPSEARCHBASE: cn=Groups,dc=mycompany,dc=com

    IDSTORE_WLSADMINUSER: weblogic_idm

    MDS_DB_URL: jdbc:oracle:thin:@10.0.70.229:1521:IDM1

    MDS_DB_SCHEMA_USERNAME: dev_mds

    WLSHOST: 10.0.70.229

    WLSPORT: 27001

    WLSADMIN: weblogic

    DOMAIN_NAME: idm_domain

    OIM_MANAGED_SERVER_NAME: oim_server1

    DOMAIN_LOCATION: /home/oracle/IDMMiddleware/user_projects/idm_domain

    ```


    此文件中每个参数的值都应填充您环境中特定的信息。有关值的说明，请参阅表 11-4。


    ## 表 11-4. `OIMConfigPropertyFile` 参数值


    | 参数 | 说明 |

    | --- | --- |

    | `LOGINURI` | 此值取自原始文件；请勿修改 |

    | `LOGOUTURI` | 您可以保留默认值；但是，如果您有符合要求的自定义注销页面，请在此处输入 URL |

    | `AUTOLOGINURI` | 将此值设为 none |

    | `ACCESS_SERVER_HOST` | 输入安装了 OAM 的主机名 |

    | `ACCESS_SERVER_PORT` | 输入 Oracle Access Management 端口 5575 |

    | `ACCESS_GATE_ID` | 输入上一步中创建的 Oracle Access Gate 的名称 |

    | `COOKIE_DOMAIN` | 输入 cookie 有效的域名 |

    | `COOKIE_EXPIRY_INTERVAL` | 输入 cookie 有效的分钟数 |

    | `OAM_TRANSFER_MODE` | 输入与上一步相同的通信模式值；例如，open 或 simple |

    | `WEBGATE_TYPE` | 指示所使用的 WebGate 版本；有效值为 ohsWebGate11g 和 ohsWebGate10g |

    | `OAM_SERVER_VERSION` | 输入 Access Server 的版本号 `11g` |

    | `OAM11G_WLS_ADMIN_HOST` | 输入安装了 OAM 的 WebLogic Server 管理服务器的主机名 |

    | `OAM11G_WLS_ADMIN_PORT` | 输入管理服务器侦听的端口 |

    | `OAM11G_WLS_ADMIN_USER` | 输入 WebLogic |

    | `SSO_ENABLED_FLAG` | 输入是否要启用 SSO；例如，true |

    | `IDSTORE_PORT` | 输入 OID 或其他 LDAP 服务器正在侦听的端口；这应与身份存储的位置匹配 |

    | `IDSTORE_HOST` | 输入安装了 OID 或其他 LDAP 服务器的主机名 |

    | `IDSTORE_DIRECTORYTYPE` | 输入所使用的 LDAP 服务器类型；例如，OID |

    | `IDSTORE_ADMIN_USER` | 输入 OIM 应使用来连接身份存储的用户名；例如，`cn=oimldap,cn=systemids,dc=mycompany,dc=com`
    |

    | `IDSTORE_LOGINATTRIBUTE` | 指定用于登录名的身份存储属性 |

    | `IDSTORE_USERSEARCHBASE` | 指定 OIM 应在其中搜索用户的顶级身份存储位置 |

    | `IDSTORE_GROUPSEARCHBASE` | 指定 OIM 应在其中查找组的位置 |

    | `IDSTORE_WLSADMIN_USER` | 输入 weblogic |

    | `MDS_DB_URL` | 输入元数据数据库连接信息；格式应为 `jdbc:oracle:thin:@hostname:port:servicename`
    |

    | `MDS_DB_SCHEMA_USERNAME` | 输入用于连接元数据存储库数据库模式的用户名 |

    | `WLSHOST` | 输入安装了 OIM 的主机名 |

    | `WLSPORT` | 输入 OIM WebLogic 环境的管理端口 |

    | `WLSADMIN` | 输入用于 WebLogic 管理的用户名 |

    | `DOMAIN_NAME` | 输入安装了 OIM 受管服务器的 WebLogic 域的名称 |

    | `OIM_MANAGED_SERVER_NAME` | 输入 OIM 使用的受管服务器的名称 |

    | `DOMAIN_LOCATION` | 输入域文件的完整文件系统路径 |


    文件创建完成后，您现在可以使用 `–configOIM` 选项运行 `idmConfigTool` 以设置 OAM 进行集成。运行此步骤时，将配置 OIM
    身份存储并设置必要的系统 MBean。系统将提示您输入 SSO Access Gate、Identity Manager MDS 数据库模式、ID 存储密码和管理服务器密码。您还需要为
    `ssoKeyStore.jks` 和 SSO 全局密码短语提供密码。如果没有报告错误，请重新启动 OIM 环境，包括 OIM 受管服务器、SOA 受管服务器和管理服务器。您应检查
    `Automation.log` 文件是否有任何错误。'
- fmt: '## Configure Oracle HTTP Server WebGate


    At this point, you have configured OAM and OIM in an integrated environment. OAM
    provides an SSO environment for your applications and protected resources. In
    Chapter [8](#A352855_1_En_8_Chapter.html), you installed and configured OHS and
    Oracle WebGate 11g. OAM and WebGate work in sync to protect resources and perform
    authentication and authorization services. With the addition of the OIM components,
    you must configure the OHS, WebGate, and OAM with the resource policies necessary
    to enable SSO and the automatic process flows.


    ### 修改 oim.conf 配置文件


    Within the OAM home directory, there is a file located in `IAM_HOME/server/setup/templates`,
    called `oim.conf`. Copy this file to your OHS configuration directory and modify
    it with the OIM information that pertains to your installation. This will configure
    the various locations that the HTTP server hosts to be protected by the WebGate.
    At a minimum, this file should contain the following entries.


    ```

    #Callback webservice for SOD


    SetHandler weblogic-handler

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    #oim self and advanced admin webapp consoles(canonic webapp)


    SetHandler weblogic-handler

    WLCookieName    oimjsessionid

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    #xlWebApp - Legacy 9.x webapp (struts based)


    SetHandler weblogic-handler

    WLCookieName    oimjsessionid

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    #Nexaweb WebApp - used for workflow designer and DM


    SetHandler weblogic-handler

    WLCookieName    oimjsessionid

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    #used for identity.


    SetHandler weblogic-handler

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    #used for sysadmin.


    SetHandler weblogic-handler

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    #used for provisioning-callback.


    SetHandler weblogic-handler

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    #used for FA Callback service.


    SetHandler weblogic-handler

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    # OIM Callback webservice for SOA. SOA calls end up at this OIM webservice


    SetHandler weblogic-handler

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    #spml dsml profile


    SetHandler weblogic-handler

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    #spml xsd profile


    SetHandler weblogic-handler

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    # Fusion role-sod


    SetHandler weblogic-handler

    WebLogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    SetHandler weblogic-handler

    WLCookieName oimjsessionid

    WeblogicHost 10.0.70.229

    WeblogicPort 14000

    WLLogFile "${ORACLE_INSTANCE}/diagnostics/logs/mod_wl/oim_component.log"


    SetHandler weblogic-handler

    WeblogicHost 10.0.70.229

    WeblogicPort 14100


    SetHandler weblogic-handler

    WeblogicHost 10.0.70.229

    WeblogicPort 14100


    ```


    After updating this file, stop and restart the OHS to pick up the changes.


    ### 配置 OAM 认证策略


    The next step will be to add OIM-specific resources to the OAM authentication
    policies. You will use the OAM Adminstration Console to add OIM-specific authentication
    policies.


    Log in to the OAM Administration Console by navigating a browser to `http://<oam-hostname>:<OAMWLSAdminPort>/oamconsole`.
    Use the OAMAdmin username and the password you set earlier. The Access Management
    landing page is shown in Figure [11-1](#A352855_1_En_11_Chapter.html#Fig1).


    ![A352855_1_En_11_Fig1_HTML.jpg](A352855_1_En_11_Fig1_HTML.jpg)

    *Figure 11-1. Oracle Access Manager Administration Console*


    Note: `<OAMWLSAdminPort>` should be set to the WebLogic Administration Server
    port number. You can access the OAM Administration Console even when the OAM managed
    server is not running.


    On this screen, under Access Manager, click the Application Domains link. The
    OAM Application Domain tab shown in Figure [11-2](#A352855_1_En_11_Chapter.html#Fig2)
    shows the existing domains that are created out of the box. Notice that IAM Suite
    and Webgate were created for you.


    ![A352855_1_En_11_Fig2_HTML.jpg](A352855_1_En_11_Fig2_HTML.jpg)

    *Figure 11-2. Search Application Domains screen*


    On the Search Application Domains screen, click Search to display a list of the
    domains created. You should see the original domain created in Chapter [8](#A352855_1_En_8_Chapter.html)
    and the IAM Suite domain created using the idmConfigTool earlier in this chapter.
    Click the IAM Suite domain to edit it. See Figure [11-3](#A352855_1_En_11_Chapter.html#Fig3)
    for the IAM Suite domain edit screen.


    ![A352855_1_En_11_Fig3_HTML.jpg](A352855_1_En_11_Fig3_HTML.jpg)

    *Figure 11-3. IAM Suite domain summary*


    On the first page you are shown the Summary details regarding the IAM Suite domain,
    as depicted in Figure [11-4](#A352855_1_En_11_Chapter.html#Fig4). Click the Resources
    tab to display all of the protected resources in this domain.


    ![A352855_1_En_11_Fig4_HTML.jpg](A352855_1_En_11_Fig4_HTML.jpg)

    *Figure 11-4. IAM Suite domain resources*


    Once on the Resources tab, click Search to display all of the resource URLs and
    configurations. Scroll until you find the `/identity/**` resource. Click it to
    edit the resource. This opens the edit resource screen shown in Figure [11-5](#A352855_1_En_11_Chapter.html#Fig5).


    ![A352855_1_En_11_Fig5_HTML.jpg](A352855_1_En_11_Fig5_HTML.jpg)

    *Figure 11-5. Edit resource screen*


    On the edit resource screen, set Protection Level to Excluded. Ensure that the
    Authentication Policy and the Authorization Policy fields are empty. Click Apply.


    While on this page, click Duplicate to create a new resource. Set the Resource
    URL to `/provisioning-callback/**`. Click Apply to save the changes. You have
    now set up the OIM URLs as resources within the OAM environment.


    ## Summary


    After the installation of the software components of OIM and OAM, it was necessary
    to configure each tier for the integration. At this point in the process, you
    should have an environment that allows you to create users using the OIM utility.
    With the newly created user, you can log in and are prompted immediately to change
    the password and set up challenge questions. After setting up this basic profile,
    the user should be taken directly to the originally requested resource. In the
    next chapter, the process flow is demonstrated, along with a process for testing
    the integration.'
