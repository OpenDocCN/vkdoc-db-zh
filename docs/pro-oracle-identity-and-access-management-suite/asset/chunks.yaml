    正确同步两个不同的身份存储要求将源对象属性正确映射到目标。例如，Active Directory 可能使用 `SAMAccountName` 这样的属性进行用户登录，而
    OID 实例可能使用 `UID`。这必须在 DIP 配置文件中加以考虑。图 5-6 显示了映射屏幕。


    ![A352855_1_En_5_Fig6_HTML.jpg](img/A352855_1_En_5_Fig6_HTML.jpg)


    **图 5-6. 同步配置文件映射**


    输入源目录连接详细信息并通过连接测试后，就需要配置映射详细信息。配置文件映射页面提供了源容器/目标规则、排除规则和属性映射规则的输入项。这些部分中的每一个都是可配置的，以满足组织的需求。


    在域映射规则部分，可以配置一个或多个源容器，以及它们在 OID 中的映射位置。如果源目录结构由多个域或容器组成，且这些容器要映射到不同的 OID 容器，这将非常有用。这里需要注意的是，在单个配置文件中设置的排除和映射规则将应用于本域映射规则部分中定义的所有容器。如果每个容器需要不同的排除或映射规则，应考虑创建多个配置文件来处理每个容器。


    在许多情况下，组织在源目录中只有一个域，需要映射到 OID 中的单个域。在这种情况下，图 5-6 显示源容器是基础判别名 (DN)，目标容器是 OID 域主用户容器。出于此示例的目的，此映射已足够。


    需要注意的是，DIP 主要同步新账户和对现有账户的修改。然而，每个目录源处理对象删除的方式不同，需要特别注意以确保从源中删除的对象也从目标目录中删除。这可能包括一些步骤，例如授予同步账户域管理员权限，以便它能正确查看已删除账户的墓碑记录，或授予对存储已删除或已停用账户的域单元的权限。请参考源目录文档或管理员以确定需要什么。


    属性映射规则允许指定如何将条目从源转换到目标。Oracle 后端目录必须是源或目标。转换条目时，有三种类型的映射规则：域规则、属性规则和协调规则。这些映射规则允许指定
    DN 映射、属性级映射和协调规则。如图 5-7 所示。


    ![A352855_1_En_5_Fig7_HTML.jpg](img/A352855_1_En_5_Fig7_HTML.jpg)


    **图 5-7. 属性映射规则设置**


    创建属性映射规则时，源 `ObjectClass` 和 `Attribute` 被直接映射或经过转换以填充目标属性。在创建映射规则时，牢记一些注意事项很重要。OID
    中所有必填字段都应基于源目录中的必填字段。如果构建转换，请确保映射中使用的元素在源中已填充。如果未填充，输入到 OID 的数据可能格式错误。如果源包含二进制值，则必须将属性类型指定为二进制。


    图 5-8 显示了一个在从 Active Directory 同步 OID 时使用的属性映射规则示例。虽然可以手动创建这些规则，但当使用开箱即用的模板时，规则是预先创建好的，只有在环境使用额外属性或有特殊需求时才需要修改。


    ![A352855_1_En_5_Fig8_HTML.jpg](img/A352855_1_En_5_Fig8_HTML.jpg)


    **图 5-8. DIP 映射规则**


    图 5-9 展示了一个编辑映射规则的示例。一个常用的映射规则是将源 `userPrincipalName` 和 `sAMAccountname` 转换为可用于填充
    OID 中 `orclSAMAccountname` 字段的格式，使用以下规则：


    ```

    toupper(truncl(userPrincipalName,''@''))+"$"+sAMAccountname

    ```


    ![A352855_1_En_5_Fig9_HTML.jpg](img/A352855_1_En_5_Fig9_HTML.jpg)


    **图 5-9. 编辑映射规则**


    需要注意的是，您的环境可能有不同的需求。


    过滤规则可用于减少同步对象的数量。您可以使用这些规则排除 Active Directory OU 或不符合特定条件的对象。过滤器选项卡如图 5-10 所示。


    ![A352855_1_En_5_Fig10_HTML.jpg](img/A352855_1_En_5_Fig10_HTML.jpg)


    **图 5-10. 过滤规则**


    复杂的过滤器应该用双引号括起来。在某些版本的 OID 中，测试未用引号括起来的复杂过滤器将导致此屏幕锁定，并最终导致 OID 实例崩溃。复杂过滤器是指任何具有多个单一条件并使用
    AND 和 OR 等运算符的过滤器。


    图 5-11 显示了新 DIP 配置文件的高级设置。此高级选项卡允许设置运行同步配置文件的调度间隔以及更新平台的其他属性。可以更新上次更改编号字段以重新运行最近的更改。但是，在更新该值之前应仔细考虑。


    ![A352855_1_En_5_Fig11_HTML.jpg](img/A352855_1_En_5_Fig11_HTML.jpg)


    **图 5-11. 高级选项**

    '
- fmt: '

    在创建配置文件后，它将被列在“管理同步配置文件”屏幕上，如图 5-12 所示。在这里，你可以根据需要启用、禁用、编辑、删除和测试你的配置文件。作为管理员，你可以根据需求创建任意多的配置文件。编辑配置文件将带你回到之前展示过的页面。


    ![A352855_1_En_5_Fig12_HTML.jpg](A352855_1_En_5_Fig12_HTML.jpg)


    图 5-12. 已创建的同步配置文件


    建议你在启用配置文件之前先对其进行测试。只有禁用的配置文件才能使用 DIP 测试器进行测试。还应注意，只有从 LDAP 源到 LDAP 目标的配置文件才能用此方法测试。要测试配置文件，请先确保它是禁用的，然后单击
    DIP 测试器按钮。在第一个测试屏幕上，你可以转储配置文件并查看创建步骤中建立的映射。单击启动测试器按钮。


    DIP 测试器提供两种测试选项：基本和高级。基本选项将使用预配置的设置运行测试。它会在 Fusion Middleware Control 中运行并记录消息。如果你正在排查同步错误或寻找失败的同步，这会很有用。高级模式允许你配置测试设置，例如要搜索的更改号，以同步源目录中的特定更改。


    注意

    虽然可以使用 `manageSyncProfiles` 实用程序创建和管理同步配置文件，但建议你使用 Fusion Middleware Control。


    创建同步配置文件并准备启用它之后，使用 `syncProfileBootstrap` 实用程序立即将源目录中的数据填充到目标目录。


    要使用 `syncProfileBootstrap`，首先确保 `WLS_HOME` 和 `ORACLE_HOME` 环境变量设置为正确的值。`WLS_HOME`
    应设置为 `<Middleware Directory>/wls10.3.6`。`ORACLE_HOME` 应设置为安装 OID 的目录，通常是 `<Middleware
    Directory>/Oracle_OID`。你还应该准备好 WebLogic 管理服务器的主机名和端口以及 WLS 密码。


    提示

    允许 DIP 进程执行初始填充可能需要大量时间。建议使用 `syncProfileBootstrap` 实用程序。


    `syncProfileBootstrap` 实用程序位于 `$ORACLE_HOME/bin` 目录中。可以按如下方式运行：


    ```

    syncProfileBootstrap -h HOST -p PORT -D wlsuser {-file FILENAME |-profile -PROFILE_NAME}
    [-ssl -keystorePath PATH_TO_KEYSTORE -keystoreType TYPE] [-loadParallelism INTEGER]
    [-loadRetry INTEGER][-help]

    [oracle@clouddemolab OIDMiddleware]$ export ORACLE_HOME=/home/oracle/OIDMiddleware/Oracle_IDM1

    [oracle@clouddemolab bin]$ export WL_HOME=/home/oracle/OIDMiddleware/wlserver_10.3/

    ./syncProfileBootstrap -h localhost -p 7005 -D weblogic -pf AD2OID -lp 5

    [oracle@clouddemolab bin]$ ./syncProfileBootstrap -h localhost –p 7005 –D weblogic
    –pf AD2OID –lp 5

    [Weblogic user password]

    Connection parameters intialized.

    Connecting at localhost:7005, with userid "weblogic"..

    Connected successfully

    The bootstrap operation completed, the operation results are:

    entries read in bootstrap operation: 433

    entries filtered in bootstrap operation: 0

    entries ignored in bootstrap operation: 0

    Entries processed in bootstap operation: 346

    Entries failed in bootstrap operation: 87

    ```


    注意

    如果你要加载数据的源目录包含大量条目，最快最简单的方法是使用 LDIF 文件引导目标目录。在这种情况下，不建议使用集成配置文件进行引导，因为在读写源目录和目标目录时可能会发生连接错误。如果
    DN 包含特殊字符，在使用集成配置文件引导时可能无法正确转义，此时也建议使用 LDIF 文件。


    目录引导完成后，你可以启用配置文件，并允许 OID 与来自源 Active Directory 的值进行同步。返回到 Fusion Middleware Control
    屏幕，如图 5-13 所示启用同步配置文件。


    ![A352855_1_En_5_Fig13_HTML.jpg](A352855_1_En_5_Fig13_HTML.jpg)


    图 5-13. 启用同步配置文件


    配置文件启用后，你可以在如图 5-14 所示的 DIP 服务器主屏幕上查看同步配置文件的统计信息和状态。一目了然，你将看到更改数、错误数、跳过对象数、上次完成日期和上次运行状态。要查看更多详细信息，可以查看日志消息。


    ![A352855_1_En_5_Fig14_HTML.jpg](A352855_1_En_5_Fig14_HTML.jpg)


    图 5-14. DIP 状态


    在同步过程中，单个对象可能导致进程停止。默认情况下，如果遇到错误，DIP 将不会继续。你可以检查 DIP 日志以查看导致同步停止的对象。此日志屏幕如图 5-15
    所示。


    ![A352855_1_En_5_Fig15_HTML.jpg](A352855_1_En_5_Fig15_HTML.jpg)


    图 5-15. 同步配置文件日志消息


    很多时候，错误是由缺少必填属性引起的。识别问题后，可能只需在源 Active Directory 账户中修复问题即可。


    在其他时候，问题可能看起来更复杂。例如，可能创建了一个新的 Active Directory OU 并填充了用户。DIP 同步可能会尝试在新 OU 之前创建用户，这将导致错误。


    你可以将 DIP 配置为跳过错误并继续，以防止整个进程失败。在刚刚展示的后一个例子中，这可以允许 OU 被创建，而下一次同步将拾取遗漏的对象。如图 5-16
    所示的“高级”选项卡可用于为特定配置文件调整 DIP 选项。


    ![A352855_1_En_5_Fig16_HTML.jpg](A352855_1_En_5_Fig16_HTML.jpg)


    图 5-16. 设置“跳过错误以同步下一次更改”参数


    另一个故障排除选项是编辑配置文件排除规则。此选项允许你配置同步，如果对象不符合特定条件则跳过它们。如果你的环境中包含许多不希望同步的 LDAP 对象，你可能会发现此功能很有用。使用如图
    5-17 所示的“映射”选项卡添加或编辑排除规则。


    ![A352855_1_En_5_Fig17_HTML.jpg](A352855_1_En_5_Fig17_HTML.jpg)


    图 5-17. 编辑域排除规则和过滤


    如果 DIP 服务器已关闭，或者你需要运行同步以捕获因错误而错过的信息，则可能需要使用较早的更改号运行该进程。选中“编辑并持久化”复选框并更新“上次更改号”字段。这样做将允许
    DIP 进程运行自输入的新“上次更改号”以来的所有更改。你需要查询源目录以获取你希望返回到的更改号。同样，可以使用“高级”选项卡来完成此操作。图 5-18
    显示了修改此字段所需的“编辑并持久化”复选框。


    ![A352855_1_En_5_Fig18_HTML.jpg](A352855_1_En_5_Fig18_HTML.jpg)


    图 5-18. 编辑同步配置文件


    在本章结束时，你应该拥有一个完全同步的 OID。根据配置的属性映射规则，此目录中存储的数据应与你的 Active Directory 源匹配。通过本章，你应该能够编辑用户属性映射并排除配置文件故障。

    '
  raw: 'After you create a profile, it will be listed on the Manage Synchronization
    Profiles screen seen in Figure [5-12](#A352855_1_En_5_Chapter.html#Fig12). Here
    you can enable, disable, edit, delete, and test your profiles as needed. As an
    administrator, you can create as many profiles as necessary for your requirements.
    Editing a profile will return you to the pages previously presented.


    ![A352855_1_En_5_Fig12_HTML.jpg](A352855_1_En_5_Fig12_HTML.jpg)


    Figure 5-12.


    Synchronization profile created


    It is recommended that you test a profile prior to enabling it. Only disabled
    profiles can be tested using the DIP Tester. It should also be noted that only
    LDAP source to LDAP destination profiles can be tested using this method. To test
    a profile, first ensure it is disabled and click the DIP Tester button. On the
    first test screen, you can dump the profile and see the mappings created during
    the creation step. Click the Launch Tester button.


    The DIP Tester provides two options for testing; Basic and Advanced. Basic will
    run the test using preconfigured settings. It will run and log messages to the
    Fusion Middleware Control. This can be useful if you are troubleshooting a synchronization
    error or looking for a failed synchronization. The Advanced mode allows you to
    configure the test settings such as Change Number to search for and synchronize
    a specific change in the source directory.


    Note


    Although it is possible to create and manage synchronization profiles using the
    `manageSyncProfiles` utility, it is recommended that you use the Fusion Middleware
    Control.


    After creating a synchronization profile and prior to enabling it, use the `syncProfileBootstrap`
    utility to immediately populate the destination directory with data from the source.


    To use `syncProfileBootstrap`, first make sure that the `WLS_HOME` and `ORACLE_HOME`
    environment variables are set to the proper values. `WLS_HOME` should be set to
    the `<Middleware Directory>/wls10.3.6\. ORACLE_HOME` should be set to the directory
    where you installed OID. This is typically `<Middleware Directory>/Oracle_OID`.
    You should also be prepared with the WebLogic Admin Server host and port along
    with the WLS password.


    Tip


    Allowing the DIP process to perform the initial population can take a large amount
    of time. It is recommended that you use the `syncProfileBootstrap` utility.


    The `syncProfileBootstrap` utility is located in the `$ORACLE_HOME/bin` directory.
    It can be run as follows:


    ```

    syncProfileBootstrap -h HOST -p PORT -D wlsuser {-file FILENAME |-profile -PROFILE_NAME}
    [-ssl -keystorePath PATH_TO_KEYSTORE -keystoreType TYPE] [-loadParallelism INTEGER]
    [-loadRetry INTEGER][-help]

    [oracle@clouddemolab OIDMiddleware]$ export ORACLE_HOME=/home/oracle/OIDMiddleware/Oracle_IDM1

    [oracle@clouddemolab bin]$ export WL_HOME=/home/oracle/OIDMiddleware/wlserver_10.3/

    ./syncProfileBootstrap -h localhost -p 7005 -D weblogic -pf AD2OID -lp 5

    [oracle@clouddemolab bin]$ ./syncProfileBootstrap -h localhost –p 7005 –D weblogic
    –pf AD2OID –lp 5

    [Weblogic user password]

    Connection parameters intialized.

    Connecting at localhost:7005, with userid "weblogic"..

    Connected successfully

    The bootstrap operation completed, the operation results are:

    entries read in bootstrap operation: 433

    entries filtered in bootstrap operation: 0

    entries ignored in bootstrap operation: 0

    Entries processed in bootstap operation: 346

    Entries failed in bootstrap operation: 87

    ```


    Note


    If the source directory from which you are loading data contains a large number
    of entries, the quickest and easiest method to bootstrap the target directory
    is by using an LDIF file. Bootstrapping with an integration profile is not recommended
    in this case because connection errors could occur when reading and writing between
    the source and target directories. Using an LDIF file is also recommended if the
    DNs contain special characters, which might not be escaped properly when bootstrapping
    with an integration profile.


    After the directory has been bootstrapped, you can enable the profile and allow
    OID to be synchronized with values from the source Active Directory. Return to
    the Fusion Middleware Control screens and enable the synchronization profile as
    shown in Figure [5-13](#A352855_1_En_5_Chapter.html#Fig13).


    ![A352855_1_En_5_Fig13_HTML.jpg](A352855_1_En_5_Fig13_HTML.jpg)


    Figure 5-13.


    Enabling a synchronization profile


    Once a profile has been enabled, you are able to view the statistics and status
    of the synchronization profile on the DIP server home screen shown in Figure [5-14](#A352855_1_En_5_Chapter.html#Fig14).
    At a glance, you will see the number of changes, number of errors, number of skipped
    objects, last completed date, and the last run status. To view more in-depth information,
    you can view log messages.


    ![A352855_1_En_5_Fig14_HTML.jpg](A352855_1_En_5_Fig14_HTML.jpg)


    Figure 5-14.


    DIP status


    During the synchronization process, it is possible that a single object can cause
    the process to stop. By default, DIP will not continue if it encounters an error.
    You can check the DIP logs to view the object that caused the synchronization
    to stop. This log screen is shown in Figure [5-15](#A352855_1_En_5_Chapter.html#Fig15).


    ![A352855_1_En_5_Fig15_HTML.jpg](A352855_1_En_5_Fig15_HTML.jpg)


    Figure 5-15.


    Synchronization profile log messages


    Many times, errors are caused by missing mandatory attributes. After identifying
    the problem, it might be as simple as fixing the problem in the source Active
    Directory account.


    Other times, the problem might seem more complex. It is possible that a new Active
    Directory OU was created and populated with users. The DIP synchronization might
    try to create the users prior to the new OU, which will result in an error.


    You can configure DIP to skip errors and continue to prevent the overall process
    from failing. In the latter example just presented, this can allow the OU to get
    created and the next synchronization will pick up the missed objects. The Advanced
    tab shown in Figure [5-16](#A352855_1_En_5_Chapter.html#Fig16) can be used to
    tweak DIP options for a particular profile.


    ![A352855_1_En_5_Fig16_HTML.jpg](A352855_1_En_5_Fig16_HTML.jpg)


    Figure 5-16.


    Setting the Skip Error To Sync Next Change parameter


    Another troubleshooting option is to edit the profile exclusion rules. This option
    allows you to configure the synchronization to skip objects if they do not meet
    a certain criteria. You might find this useful if your environment contains a
    number of LDAP objects that you do not wish to synchronize. Use the Mapping tab
    shown in Figure [5-17](#A352855_1_En_5_Chapter.html#Fig17) to add or edit exclusion
    rules.


    ![A352855_1_En_5_Fig17_HTML.jpg](A352855_1_En_5_Fig17_HTML.jpg)


    Figure 5-17.


    Edit domain exclusion rules and filtering


    If the DIP server has been down or you need to run the sync to catch information
    that was missed due to error, you might need to run the process with an earlier
    change number. Select the Edit and Persist check box and update the Last Change
    Number field. Doing this will allow the DIP process to run all changes since the
    new Last Change Number entered. You will need to query the source directory to
    get the change number to which you wish to return. Again the Advanced tab can
    be used for this. Figure [5-18](#A352855_1_En_5_Chapter.html#Fig18) shows the
    Edit and Persist check box necessary for modifying this field.


    ![A352855_1_En_5_Fig18_HTML.jpg](A352855_1_En_5_Fig18_HTML.jpg)


    Figure 5-18.


    Editing synchronization profile


    At the end of this chapter, you should have a fully synchronized OID. The data
    stored in this directory should match your Active Directory source according to
    the attribute mapping rules configured. Using this chapter, you should be able
    to edit user attribute mappings and troubleshoot profiles.'
  trans: '在创建配置文件后，它将被列在“管理同步配置文件”屏幕上，如图 5-12 所示。在这里，你可以根据需要启用、禁用、编辑、删除和测试你的配置文件。作为管理员，你可以根据需求创建任意多的配置文件。编辑配置文件将带你回到之前展示过的页面。


