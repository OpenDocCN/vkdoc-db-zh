    You have completed the installation and configuration of OHS and now have a working
    web server that can be used as a front end for your various applications. With
    OHS, you receive the Oracle WebLogic Module, which allows you to configure various
    locations to be handled by underlying WebLogic application servers. `Mod_wl_ohs`
    contains the necessary configurations to handle the reverse proxy and cluster
    failover for WebLogic-based applications. The next section of this chapter presents
    the steps to install and configure OAM WebGate on the HTTP server.


    ## Oracle Access Manager WebGate Installation and Configuration


    The key component that allows OAM to protect resources and handle SSO, is the
    WebGate. When a request comes in, OAM WebGate evaluates the request and determines
    if authentication is required. In the case that the requested resource is protected,
    the WebGate will hand off authentication responsibility to OAM. Once OAM has authenticated
    the user, it sets up session information within the browser that is utilized by
    the WebGate to allow the user access to the allowed applications.


    The WebGate installation process starts like other installers, with the Welcome
    screen shown in Figure [8-13](#A352855_1_En_8_Chapter.html#Fig13). It is important
    to ensure the version is compatible with the OAM version you have installed.


    ![A352855_1_En_8_Fig13_HTML.jpg](A352855_1_En_8_Fig13_HTML.jpg)


    Figure 8-13. Installation begins


    The OAM WebGate installation is started much the same way other Oracle applications
    are installed, using the Universal Installer. From the downloaded installation
    media, `Disk1`, execute:


    ```

    ./runInstaller.sh –jreLoc /home/oracle/jdk1.6.0_45/jre

    ```


    If you took the time at the beginning to ensure all OS prerequisites were met,
    this screen should complete with all checks normal. If any check is failed, take
    this time to correct the issue before proceeding. See Figure [8-14](#A352855_1_En_8_Chapter.html#Fig14)
    for an example of a completed prerequisite check.


    ![A352855_1_En_8_Fig14_HTML.jpg](A352855_1_En_8_Fig14_HTML.jpg)


    Figure 8-14. Prerequisite Checks screen


    The Oracle WebGate should be installed within the same Middleware Home location
    as OHS. If this was done within a WebLogic Middleware Home, ensure the WebGate
    software shares this home. The `Oracle Home Directory` listed should be unique
    within the directory, as shown in Figure [8-15](#A352855_1_En_8_Chapter.html#Fig15).


    ![A352855_1_En_8_Fig15_HTML.jpg](A352855_1_En_8_Fig15_HTML.jpg)


    Figure 8-15. Installation location


    The `Installation Summary` screen, shown in Figure [8-16](#A352855_1_En_8_Chapter.html#Fig16),
    presents a summary of the components to be installed and their locations. Take
    time to ensure that everything looks correct.


    ![A352855_1_En_8_Fig16_HTML.jpg](A352855_1_En_8_Fig16_HTML.jpg)


    Figure 8-16. Installation details


    As with the other products installed within this book, the OHS 11g WebGate installer
    provides a progress indicator shown in Figure [8-17](#A352855_1_En_8_Chapter.html#Fig17).
    You can monitor the installation log indicated if there are any errors.


    ![A352855_1_En_8_Fig17_HTML.jpg](A352855_1_En_8_Fig17_HTML.jpg)


    Figure 8-17. Installation Progress screen


    At the end of the installation phase, make note of the details provided on the
    completion screen shown in Figure [8-18](#A352855_1_En_8_Chapter.html#Fig18).


    ![A352855_1_En_8_Fig18_HTML.jpg](A352855_1_En_8_Fig18_HTML.jpg)


    Figure 8-18. Installation Complete screen


    This completes this installation of OAM WebGate. In the next section, you will
    progress through the initial configuration and deployment of the WebGate within
    the OHS environment.'
