- fmt: '### Scalability


    OUD 的架构及其支持多个节点和数据中心的能力提供了极高的可用性。结合高可用性，可扩展性使企业能够根据当前需求启动足够大的目录，而无需为未来的需求预留环境空间。Oracle
    声称 OUD 可以在商用服务器上扩展到数十亿用户。这是通过代理功能和跨部署在一系列服务器上的分区分发身份数据来实现的。分区的分发允许工作负载分散在多个服务器之间，从而减少了在仅能跨数据中心一两台服务器平衡负载的环境中通常出现的工作量和
    I/O 操作。


    为了给 OUD 的可扩展性增加最大价值，全局索引允许 OUD 将请求映射到正确的分发分区。OUD 可以使用数据分发将数据存储分散到多个节点，甚至跨多个数据中心。这不仅对分散工作负载非常有用，而且如果按区域进行，还可以利用它来减少网络延迟的影响。如果企业的用户遍布全国甚至全球，它很可能在不同区域战略性地设有数据中心。使用
    OUD 的分区数据能力允许将区域用户放置在最适合其常规工作区域的服务器上。全局索引使 OUD 能够跟踪条目的位置。如果一个节点收到请求，它会快速转到正确的节点（无论其位置）以验证用户。此功能不仅可以帮助组织降低成本，还可以提高用户生产力。


    ### Replication


    与 OID 类似，OUD 提供了一种在多个节点间复制数据的机制。此功能对于确保最大可用性至关重要。复制确保在一个节点上更新的身份存储库数据传播到集群的其他成员节点。延迟过长或未正确复制的环境可能导致安全问题，因为用户可能能够访问已将其移除一段时间的资源，或者密码更改可能不会立即生效。OUD
    引入了高级复制。高级复制模型使用复制服务器来与其他目录服务器同步数据更改。通过将复制工作转移到单独的服务器，同步更改的工作从目录服务器上卸载，允许它们将资源集中用于目录查询。为确保复制的安全性，OUD
    复制服务确保客户端应用程序请求的身份数据仅在数据已复制到其他成员后才会发布。此外，通过防止敏感数据被复制到可能不太安全的服务器上，增强了身份安全性。


    ### Usability and Manageability


    与 OID 一样，OUD 使用 `ODSM` 和 `Fusion Middleware Control` 进行管理。由于之前已经讨论过这些，此处不再赘述。


    ## Oracle Virtual Directory


    大多数组织已经在多个身份存储上进行了投资。这包括他们的网络身份存储、特定于应用程序的身份存储，甚至可能是特定于业务部门的 `LDAP` 目录。在许多情况下，各种数据存储包含相同的用户或相同数据的子集。这常常导致混乱，管理员试图管理用户组并知道各种存储的位置。将这些目录同步到中央存储库可能会导致其他问题，例如增加的数据存储需求以及确保应用程序能够以预期的方式利用存储。引入
    `OVD` 是为了解决这些问题。`OVD` 允许组织将其身份目录投资整合到一个集中式存储中，而无需复制数据。


    `OVD` 被宣传为一个目录聚合工具。它使组织能够访问正在使用的各种用户存储库，而无需复制其中包含的数据。此外，`OVD` 提供数据转换服务，允许应用程序以预期或要求的格式接收数据。`OVD`
    甚至可以为非 `LDAP` 类型的源（例如基于数据库或文件的身份存储）提供 `LDAP` 接口。


    ### Architecture


    部署在 `WLS` 上，`OVD` 利用了 `WLS` 的许多优势。在 `WLS` 环境中，`OVD` 能够与凭证存储、审计和日志框架集成，并可以使用 `Fusion
    Middleware Control` 接口进行管理。


    `OVD` 由四个协同工作的逻辑层或组件组成，以提供所有服务，例如数据聚合和转换。从第一层开始，`OVD` 提供了允许外部应用程序连接到它的监听器。下一层由验证请求有效性并确定使用哪个适配器来满足请求的进程组成。请求被传递给一个连接机制，该机制与各种适配器一起操作以检索数据并转换数据集。这些层共同工作，为应用程序提供看似单一数据源的效果。图
    [3-11](#A352855_1_En_3_Chapter.html#Fig11) 显示了 `OVD` 的主要组件。


    ```

    ![A352855_1_En_3_Fig11_HTML.jpg](A352855_1_En_3_Fig11_HTML.jpg)

    ```


    **图 3-11.**

    Oracle Virtual Directory 组件


    适配器允许 `OVD` 连接到底层身份存储，无论它们是 `LDAP` 还是数据库存储库。提供了用于连接到 `LDAP`、数据库和本地存储的适配器。此外，可以配置自定义适配器来处理各种其他存储库。


    由于其架构，`OVD` 具有极强的容错能力。可以在不同的服务器上甚至在不同区域部署多个具有相同配置的 `OVD` 实例。无需复制数据或存储文件，也无需提供数据库高可用性选项。每个
    `OVD` 实例都使用自己的适配器连接到后端存储库，因此基于负载均衡或故障，任何一个实例都可以处理请求。此外，保证数据与源存储库一样新。


    除了能够跨多个服务器部署以提供自身的容错能力外，还可以配置 `OVD` 适配器以将负载分散到源目录的多个实例上。例如，如果有两个使用复制的 `Active
    Directory` 实例，可以配置 `OVD` 适配器引用这两个实例，从而在一个实例发生故障时提供自动故障转移。'
  raw: '### Scalability


    Extremely high availability is provided by the OUD architecture and its ability
    to support multiple nodes and datacenters. Coupled with high availability, scalability
    provides the enterprise the ability to start the directory large enough to support
    its current requirements without the need to size the environment to support future
    needs as well. Oracle states that OUD can be scaled to billions of users on commodity
    servers. This is achieved through the proxy capabilities and distributing the
    identity data across partitions deployed on a series of servers. Distribution
    of partitions allows the work to be spread among multiple servers, thus reducing
    the workload and I/O operations typically seen in environments where the load
    can only be balanced across one or two servers in a datacenter.


    To add the greatest value to the scalability of OUD, global indexing allows OUD
    to map requests to the correct distribution partition. Data partitioning can be
    used by OUD to spread data storage across multiple nodes even in multiple datacenters.
    This can be very useful in not just spreading the workload, but done regionally,
    it can be leveraged to reduce the effects of network latency. If an enterprise
    has users spread around the country or even the globe, it is likely it also has
    datacenters strategically located in different regions. Using OUD’s ability to
    partition data permits regional users to be placed on servers that best suit the
    region in which they regularly work. The Global Index enables OUD to keep track
    of where entries are located. If a node receives a request, it is quickly referred
    to the proper node, no matter its location, to validate the user. This capability
    can help organizations not only lower costs, but also increase user productivity.


    ### Replication


    Like OID, OUD provides a mechanism to replicate data across multiple nodes. This
    capability is essential to ensuring maximum availability. Replication ensures
    that data updated on one node of the identity repository is propagated to the
    other member nodes of the cluster. Extended latency or environments not properly
    replicated can lead to security concerns, as a user might be able to access resources
    from which he or she has been removed for a period of time, or password changes
    might not take effect right away. OUD introduces advanced replication. The advanced
    replication model uses replication servers to synchronize data changes with other
    directory servers. By moving the replication work to separate servers, the work
    of synchronizing changes is offloaded from the directory servers, allowing them
    to utilize resources focused on directory queries. To ensure security around replication,
    OUD replication services ensure that identity data requested by a client application
    is only released after the data has been replicated to other members. Furthermore,
    identity security is increased by preventing sensitive data from being replicated
    to servers that could be less secure.


    ### Usability and Manageability


    Just like OID, OUD is managed using ODSM and Fusion Middleware Control. Because
    these were discussed earlier, the discussion is not rehashed here.


    ## Oracle Virtual Directory


    Most organizations already have investments in multiple identity stores. These
    include their network identity store, application-specific identity stores, and
    perhaps even business-unit-specific LDAP directories. In many cases, the various
    data stores contain the same users or subsets of the same data. This often leads
    to confusion, with administrators trying to manage the groups of users and knowing
    where the various stores are located. Synchronizing these directories into a central
    repository can lead to other issues such as increased data storage requirements
    and ensuring the applications are able to leverage the store in a way that is
    expected. OVD was introduced to resolve these issues. OVD allows organizations
    to consolidate their identity directory investments into a centralized store without
    the need to copy data.


    OVD is billed as a directory aggregation tool. It provides organizations with
    the ability to access the various user repositories in use without the need to
    replicate the data contained within them. In addition, OVD provides data transformation
    services to allow applications to receive data in the format expected or required.
    OVD can even provide an LDAP interface from non-LDAP type sources such as database
    or file-based identity stores.


    ### Architecture


    Deployed on WLS, OVD leverages many of the WLS benefits. Within the WLS environment,
    OVD is able to integrate with the credential store, audit, and logging frameworks
    as well as be managed using the Fusion Middleware Control interface.


    OVD consists of four logical layers or components that work together to provide
    all of the services, such as data aggregation and transformation. Starting at
    the first layer, OVD provides listeners that allow external applications to connect
    to it. The next layer consists of processes that verify the validity of requests
    and determine which adapter to use to satisfy the request. The request is passed
    to a joining mechanism that operates with the various adapters to retrieve the
    data and transform data set. These layers work together in providing what appears
    to be a single data source to applications. Figure [3-11](#A352855_1_En_3_Chapter.html#Fig11)
    shows the main components of OVD.


    ![A352855_1_En_3_Fig11_HTML.jpg](A352855_1_En_3_Fig11_HTML.jpg)


    Figure 3-11.


    Oracle Virtual Directory components


    Adapters allow OVD to connect to the underlying identity stores whether they be
    LDAP or database repositories. Adapters are provided to connect to LDAP, database,
    and local stores. In addition, custom adapters can be configured to handle a variety
    of other repositories.


    OVD, because of its architecture, is extremely fault tolerant. Multiple instances
    of OVD can be deployed on separate servers or even in different regions with the
    same configuration. There is no need to replicate data or storage files and no
    need to provide database high availability options. Each instance of OVD connects
    to the back-end repositories using its own adapters, so any of the instances can
    serve requests based on load balancing or outages. Furthermore, the data is guaranteed
    to be as current as the source repository.


    Along with its ability to be deployed across multiple servers to provide its own
    fault tolerance, OVD adapters can be configured to spread loads across multiple
    instances of the source directory. For instance, if there are two Active Directory
    instances using replication, the OVD adapter can be configured to reference both,
    thereby providing automatic failover if one of the instances fails.'
  trans: '### 可扩展性


