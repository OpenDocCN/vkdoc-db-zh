- fmt: 'As discussed in the previous chapter, machines provide the information necessary
    for the WebLogic Administration server to communicate with the server processes
    for status and life cycle events. It is important that any UNIX-based OS use the
    the Unix Machine type. This ensures that any necessary environment settings are
    properly configured when the Administration server executes its operations. Clusters
    can contain one or more machines, and machines can include one or more managed
    servers. Figure [7-31](#A352855_1_En_7_Chapter.html#Fig31) shows a new Unix Machine.


    ![A352855_1_En_7_Fig31_HTML.jpg](A352855_1_En_7_Fig31_HTML.jpg)

    Figure 7-31. Configure Machines screen


    Assign the managed servers to the machine created in the previous step. In Figure
    [7-32](#A352855_1_En_7_Chapter.html#Fig32), you will see that all the new managed
    servers are assigned to the single `Unix_Machine` created in the previous step.
    You can choose to create multiple machines and assign different components to
    different machines. If you have multiple cluster members, each machine can reside
    on a separate cluster.


    ![A352855_1_En_7_Fig32_HTML.jpg](A352855_1_En_7_Fig32_HTML.jpg)

    Figure 7-32. Assign Servers to Machines screen


    After assigning the managed servers to machines, you will be presented with a
    summary of all of the inputs you have entered. This Configuration Summary screen,
    shown in Figure [7-33](#A352855_1_En_7_Chapter.html#Fig33), provides a last look
    at the configuration you are about to launch. Review this to ensure that the file
    locations, names, and configuration parameters look correct. Click `Create` to
    start the new WebLogic domain creation.


    ![A352855_1_En_7_Fig33_HTML.jpg](A352855_1_En_7_Fig33_HTML.jpg)

    Figure 7-33. Configuration Summary screen


    During domain creation, a number of files are created and various processes are
    started. The progress of this can be seen on the Creating Domain screen of the
    Configuration Wizard, as seen in Figure [7-34](#A352855_1_En_7_Chapter.html#Fig34).
    A configuration log will be displayed. Let this run uninterrupted until complete.
    If there are any errors, check the indicated log.


    ![A352855_1_En_7_Fig34_HTML.jpg](A352855_1_En_7_Fig34_HTML.jpg)

    Figure 7-34. Configuration progress


    Once the domain configuration is complete, click `Done` to exit the tool. If you
    have followed the process up to this point, you will have installed OID, OAM,
    and OIM. Each component resides within its own WebLogic domain and is controlled
    by its own WebLogic server. This serves to simplify the management processes and
    facilitate future upgrades and patches. It should also be noted that in some cases,
    your network infrastructure might require the components to be separated in different
    network zones. Visit the architecture sections of this book for more information.


    ## Summary

    This chapter served to cover the steps required to install OIM in a new WebLogic
    domain. If followed from the beginning, you were presented with the steps for
    creating the necessary database objects required for the metadata repository.
    The chapter also covered the actual software installation and creation of a new
    WebLogic domain for both OIM and the required Oracle SOA installation. Future
    chapters cover the configuration of OIM components and the integration with each
    other.


    # 8. Oracle HTTP Server and WebGate Installation and Configuration

    At this point, all of the required components of Oracle Identity and Access Management
    Suite that will be needed to provide single sign-on (SSO) with Oracle products
    and applications. The inclusion of Identity Manager provides the ability to manage
    users within the Oracle Internet Directory (OID) Lightweight Directory Access
    Protocol (LDAP) user store. Oracle HTTP Server (OHS) and the Oracle Access Manager
    (OAM) WebGate represent the web server front end for Oracle applications and products.
    At its core `OHS` is an Apache web server with Oracle’s WebLogic module. Combined
    with the `OAM` `WebGate` software, `OHS` becomes a central location that handles
    incoming requests, checks for authentication, and allows authenticated users to
    access the required resources after `OAM` performs its operations. This chapter
    covers the installation and deployment of Oracle HTTP Server and the OAM Webgate.


    ## Preinstallation Tasks

    ### Operating System Users

    For most Oracle application installs, operating system (OS) users and groups should
    be created to perform the installation and configuration tasks. Creating OS groups
    will allow other OS users to perform certain tasks related to the management of
    the application environment. The most common OS users and groups related to installing
    Oracle applications in Linux environments are the `oracle` user and `oinstall`
    or `dba` groups.


    To create the necessary `oinstall` and `dba` groups, perform the following commands
    as the root directory:


    ```

    [root@clouddemolab home]# groupadd oinstall

    [root@clouddemolab home]# groupadd osdba

    ```


    After the groups are created, create the `oracle` user:


    ```

    [root@clouddemolab home]# useradd  -g oinstall -G osdba oracle

    ```


    **Note**

    `-g` indicates the primary group to which the user should be added. `-G` indicates
    any secondary groups.


    To set the password for the user, utilize the following command as the root user.


    ```

    [root@clouddemolab home]# passwd oracle

    ```


    ### Operating System Configuration

    Prior to installing the Oracle Fusion Middleware infrastructure and Oracle Identity
    Management software, it is important to ensure the OS meets the minimum requirements
    and configuration . The following presents the kernel parameters and packages
    and the file changes that are required.


    The following kernel parameters need to be set:


    ```

    kernel.sem  256  32000  100  143

    kernel.shmmax 10737418240

    ```


    To set these parameters, edit the `sysctl.conf` file located in the `/etc` directory.


    ```

    [root@clouddemolab home]# vi /etc/sysctl.conf

    ```


    Add or edit the following lines in this section of the file:


    ```

    # Controls the maximum number of shared memory segments, in pages

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    After setting these values in the `sysctl.conf` file, you must activate and verify
    the new values are shown using this command:


    ```

    [root@clouddemolab home]# /sbin/sysctl –p

    net.ipv4.ip_forward = 0

    net.ipv4.conf.default.rp_filter = 1

    net.ipv4.conf.default.accept_source_route = 0

    kernel.sysrq = 0

    kernel.core_uses_pid = 1

    net.ipv4.tcp_syncookies = 1

    net.bridge.bridge-nf-call-ip6tables = 0

    net.bridge.bridge-nf-call-iptables = 0

    net.bridge.bridge-nf-call-arptables = 0

    kernel.msgmnb = 65536

    kernel.msgmax = 65536

    kernel.shmmax = 68719476736

    kernel.shmall = 4294967296

    kernel.sem = 256 32000 100 142

    kernel.shmmax = 10737418240

    ```


    The open file limits must be set to 4096 to support the instance. To do so, edit
    the `limits.conf` file.


    ```

    [root@clouddemolab home]# vi /etc/security/limits.conf

    ```


    If the environment is to be installed on Oracle Linux or RedHat Linux, you must
    perform the edit in `/etc/security/limits.d/90-nproc.conf` as well. If this is
    missed, the values in this file could override the values in the `limits.conf`
    file.


    In both of these files, ensure the following lines are added or edited:


    ```

    * soft nofile 4096

    * hard nofile 65536

    * soft nproc 2047

    * hard nproc 16384

    ```


    After editing this file, the server must be rebooted to ensure all the changes
    take effect.'
