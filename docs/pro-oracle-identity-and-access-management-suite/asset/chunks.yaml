  trans: '

    ### 数据库准备


    与 OID 类似，OAM 的安装也需要创建特定的数据库对象。这包括在多个数据库模式中创建一系列表、视图和包。此操作使用存储库创建实用程序完成。尽管数据库对象可以在同一个数据库中创建，但通常建议将
    Oracle 身份和访问管理存储库创建在单独的实例中。这简化了数据库管理任务和未来的维护工作。RCU 创建存储库屏幕如图 6-1 所示。请注意下载并运行与你安装的
    Oracle 身份和访问管理版本指定的 RCU。解压下载文件并运行位于 `<RCU_HOME>/rcu/bin` 目录中的 `rcu.sh`。


    ![A352855_1_En_6_Fig1_HTML.jpg](img/A352855_1_En_6_Fig1_HTML.jpg)


    图 6-1. 创建新模式


    创建数据库存储库对象的过程与为 OID 执行的过程相同。启动 RCU 并选择“创建”。


    输入 Oracle 数据库详细信息。图 6-1 中屏幕上的详细信息指向与 Oracle 目录服务相同的数据库服务器。但是，数据库实例是专门为 Oracle
    身份和访问管理器创建的，以保持两个系统分离。图 6-2 显示了输入的数据库详细信息。


    ![A352855_1_En_6_Fig2_HTML.jpg](img/A352855_1_En_6_Fig2_HTML.jpg)


    图 6-2. 输入数据库连接详细信息


    如图 6-3 所示，RCU 将检查以确保数据库满足最低先决条件。如果存在任何失败项，必须在继续流程之前予以纠正。


    ![A352855_1_En_6_Fig3_HTML.jpg](img/A352855_1_En_6_Fig3_HTML.jpg)


    图 6-3. 数据库预检完成


    在 RCU 的“选择组件”屏幕上，选择 `Oracle Access Manager`，如图 6-4 所示。如果需要，将选择其他组件。这包括审计服务、元数据服务和
    Oracle 平台安全服务等项目。确保在选择过程中添加的项目不要取消选择。图 6-4 显示了“选择组件”屏幕。


    ![A352855_1_En_6_Fig4_HTML.jpg](img/A352855_1_En_6_Fig4_HTML.jpg)


    图 6-4. 组件选择


    RCU 检查目标数据库，以确保其满足所选组件的必要要求。RCU 日志将显示遇到的任何错误，这些错误必须在继续之前解决。如图 6-5 所示，RCU 检查所选组件的先决条件。


    ![A352855_1_En_6_Fig5_HTML.jpg](img/A352855_1_En_6_Fig5_HTML.jpg)


    图 6-5. 数据库先决条件检查


    RCU 验证先决条件后，系统将提示你输入新数据库模式使用的密码，如图 6-6 所示。


    ![A352855_1_En_6_Fig6_HTML.jpg](img/A352855_1_En_6_Fig6_HTML.jpg)


    图 6-6. 模式密码


    你可以设置所有模式使用相同的密码，或为每个组件设置不同的密码。尽管你的组织可能要求不同的密码，但使用相同的密码通常就足够了。


    “映射表空间”屏幕显示了为每个组件创建的基本表空间。每个组件会创建额外的对象，可以通过单击屏幕右下角的“管理表空间”来显示它们。图 6-7 显示了为 OAM
    元数据存储库创建的表空间列表。


    ![A352855_1_En_6_Fig7_HTML.jpg](img/A352855_1_En_6_Fig7_HTML.jpg)


    图 6-7. 表空间列表


    图 6-8 显示了可选屏幕，允许你在下一步中自定义要创建的表空间的属性。


    ![A352855_1_En_6_Fig8_HTML.jpg](img/A352855_1_En_6_Fig8_HTML.jpg)


    图 6-8. 管理表空间屏幕


    除非与数据库管理员密切合作，否则应避免修改 RCU 期间提供的默认值。但是，你的 DBA 可能会有建议或要求来提高性能。


    图 6-9 展示了“摘要”屏幕。此屏幕让你有机会查看根据你在先前屏幕上的输入将创建的所有对象。如果发现任何不合适的地方，这是在创建数据库对象之前进行最后调整的机会。


    ![A352855_1_En_6_Fig9_HTML.jpg](img/A352855_1_En_6_Fig9_HTML.jpg)


    图 6-9. 创建摘要屏幕


    当 RCU 创建元数据存储库所需的对象时，会显示进度屏幕，如图 6-10 所示。请让此过程完成而不要中断。如果由于任何原因此过程停止，你应该重新启动 RCU
    以丢弃此次运行的所有组件，并从头重新开始创建。


    ![A352855_1_En_6_Fig10_HTML.jpg](img/A352855_1_En_6_Fig10_HTML.jpg)


    图 6-10. RCU 完成


    RCU 已完成，并且所有数据库模式对象均已创建以支持 OAM。数据库准备好后，即可安装 OAM 软件并配置域。

    '
- fmt: '## Access Manager Software Installation


    Oracle software installs using the Universal Installer. The tool works as a guide
    that walks through ensuring the proper software binaries are installed in the
    correct places. The `runInstaller` tool requires that the Java Runtime Environment
    be specified at runtime. Do this by using the `–jreLoc` parameter.


    In Linux this this is run as follows:


    ```bash

    [oracle@clouddemolab Disk1]$ ./runInstaller -jreLoc /home/oracle/jdk1.6.0.45/jre

    ```


    ### Figure 6-11: Welcome Screen


    The Welcome screen of the Oracle Universal Installer is shown in the following
    figure. The version information for Oracle Identity and Access Management should
    be seen in the text, in this case, `11.1.2.3`. If this does not match the version
    you are installing, find the correct installer software. The RCU run in the previous
    section is only compatible with `11.1.2.3`.


    ![A352855_1_En_6_Fig11_HTML.jpg](A352855_1_En_6_Fig11_HTML.jpg)


    ### Figure 6-12: Prerequisite Checks


    As with other Oracle products, the installer first verifies that the target host
    meets the minimum requirements and that all necessary OS packages are installed.
    See the prerequisites list at the beginning of this chapter for details. The following
    figure shows the prerequisite checks successfully completed.


    ![A352855_1_En_6_Fig12_HTML.jpg](A352855_1_En_6_Fig12_HTML.jpg)


    If any issues are discovered during the prerequisite checks, they must be addressed.
    This includes OS packages and parameters.


    After the installer has confirmed the prerequisites, you will be asked for the
    new Oracle Middleware Home directory. A Middleware Home directory location is
    required. You should only install this software within an existing Middleware
    Home. This location is where WebLogic was installed at the start of this process.


    ### Figure 6-13: Oracle Middleware Home Selection


    The OAM software must be installed into an existing Fusion Middleware Home. Installing
    WLS creates the Fusion Middleware home. Instructions to install WLS can be found
    in Chapter 4. Follow those instructions and create a home within a directory called
    `IAMMiddleware`. This ensures the OAM environment is separated from the OID middleware
    directory structure.


    ![A352855_1_En_6_Fig13_HTML.jpg](A352855_1_En_6_Fig13_HTML.jpg)


    ### Figure 6-14: Summary of Components


    The Oracle Identity and Access Manager Installer is only used to install Oracle
    Access Manager and Oracle Identity Manager. As such, it will not prompt you for
    the components to be installed. You are provided with a summary of the planned
    installation.


    ![A352855_1_En_6_Fig14_HTML.jpg](A352855_1_En_6_Fig14_HTML.jpg)


    Prior to the completion, the Universal Installer displays a summary of the components
    that will be installed into the Middleware Home. Click **Install** to lay down
    the binaries.


    ### Figure 6-15: Installation Progress


    The progress bar will display 100 percent when the process is complete. Be patient,
    as there are times when this progress bar might not appear to be moving. Check
    the install log at the location shown on the screen if there are any issues.


    ![A352855_1_En_6_Fig15_HTML.jpg](A352855_1_En_6_Fig15_HTML.jpg)


    ### Figure 6-16: Installation Complete


    On completion, the installer will provide a summary of the components installed
    and the location of the files. Make a note of the information shown in the completion
    data.


    ![A352855_1_En_6_Fig16_HTML.jpg](A352855_1_En_6_Fig16_HTML.jpg)


    The Oracle Identity and Access Management software installation is now complete.
    As discussed previously, the environment can be implemented in a split or combined
    domain. In a split domain, OAM is installed in a separate Middleware Home or even
    a separate physical server. Combined domains place both components within the
    same Middleware Home. For the purposes of this book, a split domain will be used.
    The rest of this chapter focuses on creating the OAM domain.'
