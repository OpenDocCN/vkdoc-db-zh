- fmt: '# 配置同步配置文件


    为正在创建的配置文件提供一个名称。如果计划为一个目录只使用一个通用配置文件，可以使用诸如 `AD2OID` 这样的通用名称。但是，如果预计同一个源会有多个配置文件，可能需要提供更具体的名称，例如
    `AD_Region2OID`。此示例可用于组织要求不同 Active Directory OU 中的用户被放置在不同的 OID 命名空间或进行不同处理的情况。良好的命名约定可以帮助管理员轻松管理配置文件。


    为配置文件提供名称后，输入先前收集的源目录连接详细信息。由于此示例是 Active Directory 服务器，因此类型选择 Active Directory
    (MS)。确保为配置文件选择正确的服务器类型，以便 DIP 能相应地创建配置文件模板。必须输入源目录的主机和端口，并提供一个具有至少对要同步的用户和组的读取权限的账户的用户名/密码对。此账户无权访问的任何信息都将不会被同步，这可能导致
    OID 中数据缺失。


    对于从 Active Directory 到 OID 的单向同步，只需要读取权限。配置此类同步时，Active Directory 中的更改会被写入 OID。但是，不会有任何内容写回
    Active Directory。这将 Active Directory 维护为环境中所有用户的真实来源。OID 充当应用程序身份存储。请注意，DIP 配置文件不会将密码从
    Active Directory 同步到 OID。密码处理由外部身份验证插件或 Active Directory 密码过滤器执行。这些选项将在本章后面讨论。


    正确同步两个不同的身份存储要求将源对象属性正确映射到目标。例如，Active Directory 可能使用 `SAMAccountName` 这样的属性进行用户登录，而
    OID 实例可能使用 `UID`。这必须在 DIP 配置文件中加以考虑。图 5-6 显示了映射屏幕。


    ![A352855_1_En_5_Fig6_HTML.jpg](A352855_1_En_5_Fig6_HTML.jpg)


    **图 5-6. 同步配置文件映射**


    输入源目录连接详细信息并通过连接测试后，就需要配置映射详细信息。配置文件映射页面提供了源容器/目标规则、排除规则和属性映射规则的输入项。这些部分中的每一个都是可配置的，以满足组织的需求。


    在域映射规则部分，可以配置一个或多个源容器，以及它们在 OID 中的映射位置。如果源目录结构由多个域或容器组成，且这些容器要映射到不同的 OID 容器，这将非常有用。这里需要注意的是，在单个配置文件中设置的排除和映射规则将应用于本域映射规则部分中定义的所有容器。如果每个容器需要不同的排除或映射规则，应考虑创建多个配置文件来处理每个容器。


    在许多情况下，组织在源目录中只有一个域，需要映射到 OID 中的单个域。在这种情况下，图 5-6 显示源容器是基础判别名 (DN)，目标容器是 OID 域主用户容器。出于此示例的目的，此映射已足够。


    需要注意的是，DIP 主要同步新账户和对现有账户的修改。然而，每个目录源处理对象删除的方式不同，需要特别注意以确保从源中删除的对象也从目标目录中删除。这可能包括一些步骤，例如授予同步账户域管理员权限，以便它能正确查看已删除账户的墓碑记录，或授予对存储已删除或已停用账户的域单元的权限。请参考源目录文档或管理员以确定需要什么。


    属性映射规则允许指定如何将条目从源转换到目标。Oracle 后端目录必须是源或目标。转换条目时，有三种类型的映射规则：域规则、属性规则和协调规则。这些映射规则允许指定
    DN 映射、属性级映射和协调规则。如图 5-7 所示。


    ![A352855_1_En_5_Fig7_HTML.jpg](A352855_1_En_5_Fig7_HTML.jpg)


    **图 5-7. 属性映射规则设置**


    创建属性映射规则时，源 `ObjectClass` 和 `Attribute` 被直接映射或经过转换以填充目标属性。在创建映射规则时，牢记一些注意事项很重要。OID
    中所有必填字段都应基于源目录中的必填字段。如果构建转换，请确保映射中使用的元素在源中已填充。如果未填充，输入到 OID 的数据可能格式错误。如果源包含二进制值，则必须将属性类型指定为二进制。


    图 5-8 显示了一个在从 Active Directory 同步 OID 时使用的属性映射规则示例。虽然可以手动创建这些规则，但当使用开箱即用的模板时，规则是预先创建好的，只有在环境使用额外属性或有特殊需求时才需要修改。


    ![A352855_1_En_5_Fig8_HTML.jpg](A352855_1_En_5_Fig8_HTML.jpg)


    **图 5-8. DIP 映射规则**


    图 5-9 展示了一个编辑映射规则的示例。一个常用的映射规则是将源 `userPrincipalName` 和 `sAMAccountname` 转换为可用于填充
    OID 中 `orclSAMAccountname` 字段的格式，使用以下规则：


    ```

    toupper(truncl(userPrincipalName,''@''))+"$"+sAMAccountname

    ```


    ![A352855_1_En_5_Fig9_HTML.jpg](A352855_1_En_5_Fig9_HTML.jpg)


    **图 5-9. 编辑映射规则**


    需要注意的是，您的环境可能有不同的需求。


    过滤规则可用于减少同步对象的数量。您可以使用这些规则排除 Active Directory OU 或不符合特定条件的对象。过滤器选项卡如图 5-10 所示。


    ![A352855_1_En_5_Fig10_HTML.jpg](A352855_1_En_5_Fig10_HTML.jpg)


    **图 5-10. 过滤规则**


    复杂的过滤器应该用双引号括起来。在某些版本的 OID 中，测试未用引号括起来的复杂过滤器将导致此屏幕锁定，并最终导致 OID 实例崩溃。复杂过滤器是指任何具有多个单一条件并使用
    AND 和 OR 等运算符的过滤器。


    图 5-11 显示了新 DIP 配置文件的高级设置。此高级选项卡允许设置运行同步配置文件的调度间隔以及更新平台的其他属性。可以更新上次更改编号字段以重新运行最近的更改。但是，在更新该值之前应仔细考虑。


    ![A352855_1_En_5_Fig11_HTML.jpg](A352855_1_En_5_Fig11_HTML.jpg)


    **图 5-11. 高级选项**'
  raw: 'Provide a name for the profile you are creating. If you plan to have only
    one profile for a given directory, it can be something generic such as `AD2OID`.
    However, if you anticipate having multiple profiles for the same source, you might
    wish to provide a more specific name such as `AD_Region2OID`. This example could
    be used if your organization requires users in different Active Directory OUs
    to be placed in different OID namespaces or handled differently. A good naming
    convention can help administrators easily manage profiles.


    After providing a name for the profile, enter the connection details gathered
    previously for the source directory. Because this example is an Active Directory
    server, the Active Directory (MS) option is selected for type. Ensure that you
    select the proper server type for your profile so that the DIP can create the
    profile template accordingly. You must enter host and port for the source directory
    and provide a username/password pair for an account that has, at least, read access
    on the users and groups to be synchronized. Any information that this account
    does not have access to will not be synchronized. This could lead to missing data
    in OID.


    For a one-way synchronization from Active Directory to OID, read access is all
    that is required. When this type of synchronization is configured, changes in
    Active Directory are written to OID. However, nothing is written back to Active
    Directory. This maintains Active Directory as the source of truth for all users
    in the environment. OID serves as the application identity store. Note that the
    DIP profiles do not synchronize passwords from Active Directory to OID. Password
    handling is performed either by the external authentication plug-in or the Active
    Directory password filter. These options are discussed later in this chapter.


    Properly synchronizing two disparate identity stores requires that the source
    object attributes be correctly mapped to the destination. For example, Active
    Directory might use an attribute such as `SAMAccountName` for user login whereas
    the OID instance might use `UID`. This must be accounted for in the DIP profile.
    Figure [5-6](#A352855_1_En_5_Chapter.html#Fig6) displays the mapping screen.


    ![A352855_1_En_5_Fig6_HTML.jpg](A352855_1_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    Synchronization profile mapping


    After the source directory connection details are entered and pass the connection
    test, it is time to configure the mapping details. The Profile Mapping page provides
    inputs for Source Container/Destination Rules, Exclusion Rules, and Attribute
    Mapping Rules. Each of these sections are configurable to meet the requirements
    of the organization.


    In the Domain Mapping Rules section, you are able to configure one or more source
    containers, and where they map to within OID. This is extremely useful if the
    source directory structure consists of multiple domains or containers that are
    destined for different OID containers. It should be noted here that the exclusion
    and mapping rules set forth in a single profile will apply to all of the containers
    defined in this Domain Mapping Rules section. If different exclusions or mapping
    rules are required for each container, you should consider creating multiple profiles
    to handle each container.


    In many cases, organizations have a single domain within the source directory
    that must be mapped to a single domain in OID. In this case, Figure [5-6](#A352855_1_En_5_Chapter.html#Fig6)
    shows the source container being the base distinguished name (DN) and the destination
    container is the OID domain primary users container. For the purposes of this
    example, this mapping is sufficient.


    It should be noted that the DIP primarily synchronizes new accounts and modification
    to existing accounts. However, each directory source handles object deletion differently
    and special care is required to ensure that objects deleted from the source are
    deleted from the destination directory. This might include steps such as granting
    the synchronization account domain admin privileges so that it can properly view
    the tombstone records of deleted accounts, or granting permissions to the domain
    units storing deleted or inactivated accounts. Refer to the source directory documentation
    or administrator to determine what is needed.


    Attribute mapping rules allow you to specify how to convert entries from the source
    to the destination. The Oracle back-end directory must either be the source or
    the destination. When converting the entries, there are three types of mapping
    rules: domain rules, attribute rules, and reconciliation rules. These mapping
    rules allow you to specify DN mapping, attribute-level mapping, and reconciliation
    rules. This is shown in Figure [5-7](#A352855_1_En_5_Chapter.html#Fig7).


    ![A352855_1_En_5_Fig7_HTML.jpg](A352855_1_En_5_Fig7_HTML.jpg)


    Figure 5-7.


    Attribute Mapping Rules settings


    When creating attribute mapping rules, the source `ObjectClass` and `Attribute`
    are mapped either directly or transformed to populate destination attributes.
    It is important that you keep some considerations in mind during the creation
    of the mapping rules. All fields that are required in OID should be based on a
    required field in the source directory. If building a transformation, ensure that
    the elements used in the mapping are populated in the source. If they are not,
    the data entered into OID could be malformed. If the source contains binary values,
    then it is important to specify the attribute type as binary.


    Figure [5-8](#A352855_1_En_5_Chapter.html#Fig8) displays an example of attribute
    mapping rules used when synchronizing OID from Active Directory. Although you
    can create these manually, when using one of the out-of-the-box templates, the
    rules are precreated and only need modification if your environment uses additional
    attributes or has one-off requirements.


    ![A352855_1_En_5_Fig8_HTML.jpg](A352855_1_En_5_Fig8_HTML.jpg)


    Figure 5-8.


    DIP mapping rules


    An example of editing a mapping rule is presented in Figure [5-9](#A352855_1_En_5_Chapter.html#Fig9).
    An often used mapping rule is a rule to transform the source `userPrincipalName`
    and `sAMAccountname` into a format that can be used to populate the `orclSAMAccountname`
    field in OID using the following rule:


    ```

    toupper(truncl(userPrincipalName,''@''))+"$"+sAMAccountname

    ```


    ![A352855_1_En_5_Fig9_HTML.jpg](A352855_1_En_5_Fig9_HTML.jpg)


    Figure 5-9.


    Editing a mapping rule


    It should be noted that your environment might have different requirements.


    Filtering rules can be used to reduce the population of synchronized objects.
    You can use the rules to exclude Active Directory OUs or objects that do not meet
    certain criteria. The Filtering tab is shown in Figure [5-10](#A352855_1_En_5_Chapter.html#Fig10).


    ![A352855_1_En_5_Fig10_HTML.jpg](A352855_1_En_5_Fig10_HTML.jpg)


    Figure 5-10.


    Filtering rules


    Complex filters should be enclosed in double quotes. In some versions of OID,
    testing a complex filter not enclosed in quotes will cause this screen to lock
    up and the OID instance will eventually crash. A complex filter is any filter
    that has more than one single criteria and uses operators such as AND and OR.


    Figure [5-11](#A352855_1_En_5_Chapter.html#Fig11) shows the advanced settings
    for the new DIP profile. This Advancced tab allows you to set the scheduling interval
    for running the synchronization profile and update other attributes of the platform.
    The Last Change Number field can be updated to rerun recent changes. However,
    careful consideration should be given before updating the value.


    ![A352855_1_En_5_Fig11_HTML.jpg](A352855_1_En_5_Fig11_HTML.jpg)


    Figure 5-11.


    Advanced options'
