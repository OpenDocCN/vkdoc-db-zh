  raw: "```\nhttp://.:/OA_HTML/AppsLogin\n```\n\nAccording to the steps described\
    \ at the beginning of this chapter, you\nshould be redirected to the OAM authentication\
    \ page. Using a set of\nvalid credentials that exist in the identity store, log\
    \ in. After\nsuccessful authentication, you should be redirected to your Oracle\
    \ EBS\nhome page.\n\nIt should be noted that only users who have the Local Login\
    \ Allowed\nprofile within EBS will be able to log in using the EBS Local Login.\n\
    This is helpful for administrative users and troubleshooting.\n\nSummary\n\nIn\
    \ this chapter, you were presented with the order of operations and\ndata flow\
    \ that exists when you integrate Oracle EBS and OAM. It should\nbe noted that\
    \ to integrate OID and EBS, OAM is required, as this\nintegration utilizes the\
    \ EBS AccessGate deployment. This chapter\nprovided the steps required to instantiate\
    \ a single AccessGate on a\nsingle node supporting a single EBS instance. These\
    \ steps can be\nmodified to support a clustered environment, providing higher\n\
    availability and fault tolerance if one of your AccessGate managed\nservers happen\
    \ to go down. Multiple AccessGate deployments can also be\nused to support multiple\
    \ EBS instances.\n\n16. Troubleshooting and Common\nIssues\n\nYou have followed\
    \ Oracle’s documentation to ensure that your environment\nmeets a certified environment.\
    \ Your operating system (OS) is up to date\nand the system requirements have been\
    \ met. You run the installation\nsoftware and things are looking good. All of\
    \ a sudden the installer\nseems to hang. In the words of Douglas Adams, “Don’t\
    \ panic.”\n\nConsidering the number of components that must be installed, patched,\n\
    configured, and then integrated to make a successful implementation of\nthe Oracle\
    \ Identity and Access Management Suite, there is a chance that\nyou will run into\
    \ issues. These issues might crop up during installation\nand initial configuration;\
    \ they could also come to the surface while you\nare attempting to integrate the\
    \ components with each other or with other\napplications. No matter when you run\
    \ into issues, they can be\nfrustrating and sometimes no solution will be apparent.\
    \ Many times there\nis a patch that was missed or a simple typographical error\
    \ in a\nconfiguration file. Some issues are an easy fix, whereas others could\n\
    require significant research. The aim of this chapter is to provide a\nlist of\
    \ some common issues and resolutions as well as a few uncommon\nproblems that\
    \ an implementer might need to resolve. These come from a\ncompilation of many\
    \ installations and notes from colleagues.\n\nInstallation Problems\n\nThe beginning\
    \ of this book introduced you to the various components that\nmake up Oracle’s\
    \ Identity and Access Management Suite. Following that,\nyou were presented with\
    \ the installation procedure for each of the main\ncomponents to make the environment\
    \ work. Although installation might\nseem fairly straightforward, it is not uncommon\
    \ to run into a few\nissues. If you are not too far into the process, it can be\
    \ easy enough\nto restart the installation software. However, at this stage, you\
    \ are\nlikely to run into the problem again unless you have taken steps to\nresolve\
    \ the underlying issue.\n\nDuring the installation stage, you are laying down\
    \ the application\nbinaries. The Oracle Universal Installer will check your OS\
    \ to ensure\nthat it meets the minimum specifications. The most commonly encountered\n\
    issues are found during this precheck. Ideally you have already checked\nto make\
    \ sure you have the proper OS packages installed. However, there\nis a large list\
    \ and if any are missing, the Oracle Universal Installer\nwill point them out\
    \ for you to resolve. If you have root or sudo access,\nthese issues can be easy\
    \ to resolve. Dependent on your chosen OS, you\ncan just install them and continue.\n\
    \nUsing UNIX-based systems, you can either use yum to install a missing\npackage\
    \ or download the missing package rpm files and install. Note that\nthis will\
    \ require either sudo or root access. Installing missing\npackages from rpm files\
    \ can be a lengthy process, as you will need to\nfind the package and all required\
    \ packages to install them properly.\nMost times a package installation tool such\
    \ as yum will perform the\ndownload and installation of all required packages.\
    \ Missing OS packages\nare some of the easiest problems to diagnose and resolve.\
    \ See Table\n[16-1](#A352855_1_En_16_Chapter.html#Tab1) for a list of\nthe required\
    \ packages for each of the main components covered in this\nbook. Depending on\
    \ your environment, these packages might need to be\ninstalled on all of your\
    \ servers, or only select servers, depending on\nthe components installed on each.\n\
