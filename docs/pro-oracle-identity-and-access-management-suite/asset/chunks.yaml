  trans: '

    ### 配置类型


    还有其他一些场景，包括在新的域或现有域中安装 OID 和 OVD。出于本讨论的目的，我们假设这些是**新的域**。


    在此步骤开始前，WLS 和 Oracle Identity Management 软件应该已经安装但尚未配置。如果在安装 WebLogic 后运行过 Quickstart
    并创建了域，你可以使用 OID 扩展该域，其步骤与此处介绍的非常相似。


    要开始配置域，请运行位于 `$ORACLE_HOME/bin` 目录下的 `config.sh` 文件。在此情况下，`ORACLE_HOME` 是 Oracle
    Identity Management 软件的安装位置，即 `/home/oracle/OIDMiddleware/Oracle_IDM1`。这一点很重要，因为
    Middleware 环境中的其他目录下也存在其他的 `config.sh` 文件。图 4-31 显示了要使用的配置文件的位置。


    ![A352855_1_En_4_Fig31_HTML.jpg](img/A352855_1_En_4_Fig31_HTML.jpg)

    图 4-31. 为 Oracle Internet Directory 配置新的 WebLogic 域


    和之前一样，启动配置文件后看到的第一个屏幕是欢迎屏幕，如图 4-32 所示。此处无需操作。只需单击“下一步”开始配置 OID。


    ![A352855_1_En_4_Fig32_HTML.jpg](img/A352855_1_En_4_Fig32_HTML.jpg)

    图 4-32. 域配置步骤


    图 4-33 所示的屏幕允许你选择是创建新域、扩展现有域还是扩展集群。因为这是一个新安装，请选择“创建新域”。如果你在此过程的前期运行过 Quickstart，请选择“扩展现有域”。


    ![A352855_1_En_4_Fig33_HTML.jpg](img/A352855_1_En_4_Fig33_HTML.jpg)

    图 4-33. 创建新域


    输入管理用户的名称（通常是 `weblogic`）、所需的密码以及你希望用于该域的名称。


    由于你正在创建一个新的 OID 域，系统将提示你输入新域的详细信息。图 4-34 显示了你可以输入域位置、OID 实例名称和实例位置的屏幕。需要注意的是，你可以在以后创建新的
    OID 实例。


    ![A352855_1_En_4_Fig34_HTML.jpg](img/A352855_1_En_4_Fig34_HTML.jpg)

    图 4-34. 配置实例位置和 WebLogic Home 目录


    在“配置组件”屏幕上，如图 4-35 所示，选择你希望部署的身份管理组件。


    ![A352855_1_En_4_Fig35_HTML.jpg](img/A352855_1_En_4_Fig35_HTML.jpg)

    图 4-35. 为新域选择组件


    在此情况下，OID、OVD 和 DIP 都将被安装到身份管理域中。进行选择时，工具将自动选择支持安装所需的任何必选组件。建议你不要更改任何预先选中的组件。


    在指示配置工具新 OID 域的安装位置后，你将可以选择配置 OID 将使用的端口，如图 4-36 所示。


    ![A352855_1_En_4_Fig36_HTML.jpg](img/A352855_1_En_4_Fig36_HTML.jpg)

    图 4-36. 端口配置


    在新安装中可以使用默认端口。如果任何端口已被占用，请创建一个 `staticports.ini` 文件，并在此屏幕上指定其位置。


    > **注意**

    >

    > 安装介质中提供了一个 `staticports.ini` 示例文件。它位于 `Disk1/stage/Response` 目录下。你可以复制此文件并根据需要进行编辑，以指定安装过程中要使用的端口。


    如果你选择在 OID 之外还使用 OVD，图 4-37 所示的 OVD 信息屏幕会提示你输入所需信息。


    ![A352855_1_En_4_Fig37_HTML.jpg](img/A352855_1_En_4_Fig37_HTML.jpg)

    图 4-37.

    '
- fmt: '# Configure the Oracle Virtual Directory realm and administrator password


    The account `cn=orcladmin` is the standard administration account used for OID.
    Set the password for this, and keep close track of it. Without it, you will be
    unable to perform some management functions.


    Note: There is a script that can be run to reset the `orcladmin` password. To
    run it, you must know the Oracle Directory Services schema connection information.
    The utility is called `oidpasswd` and it is located within the `$ORACLE_INSTANCE/bin`
    directory.


    Before starting the installation process, the RCU was used to create the necessary
    schema objects. In this step, specify the location of the database using the following
    format: `host:port:servicename`. The Oracle Directory Services schema name will
    already be populated; enter the password specified during the RCU process. If
    the RCU was not run in the previous step, select Create Schema at this time. Figure
    [4-38](#A352855_1_En_4_Chapter.html#Fig38) shows the Specify Schema Database screen.


    ![A352855_1_En_4_Fig38_HTML.jpg](A352855_1_En_4_Fig38_HTML.jpg)

    *Figure 4-38. Select database information*


    Much like the step to configure the OVD information, enter the same data. This
    information will be used by the OID configuration. Note that OID and OVD are two
    different products. Figure [4-39](#A352855_1_En_4_Chapter.html#Fig39) shows the
    start of the new OID setup.


    ![A352855_1_En_4_Fig39_HTML.jpg](A352855_1_En_4_Fig39_HTML.jpg)

    *Figure 4-39. Specify the Oracle Internet Directory Realm information*


    The domain configuration will prompt for Oracle Identity Federation information.
    This will be used to generate signing and encryption keystores as seen in Figure
    [4-40](#A352855_1_En_4_Chapter.html#Fig40).


    ![A352855_1_En_4_Fig40_HTML.jpg](A352855_1_En_4_Fig40_HTML.jpg)

    *Figure 4-40. Oracle Identity Federation configuration*


    The default values can be left at this stage. These determine how Identity Management
    stores session information and how it retrieved its data. These values can be
    changed postinstallation if needed. See Figure [4-41](#A352855_1_En_4_Chapter.html#Fig41)
    for the default values.


    ![A352855_1_En_4_Fig41_HTML.jpg](A352855_1_En_4_Fig41_HTML.jpg)

    *Figure 4-41. Configure the Identity Federation attributes*


    After reviewing the data provided, click Continue to create the Oracle Identity
    Management domain. Note that this process can take significant time to complete.
    An example of this can be seen in Figure [4-42](#A352855_1_En_4_Chapter.html#Fig42).


    ![A352855_1_En_4_Fig42_HTML.jpg](A352855_1_En_4_Fig42_HTML.jpg)

    *Figure 4-42. Summary of configuration information*


    At this point, you have entered all the instructions needed by the configuration
    utility to create the new OID and OVD domains. Figure [4-43](#A352855_1_En_4_Chapter.html#Fig43)
    shows the Configuration Progress screen. This process can be quite time consuming.
    Some steps can seem like they have hung, whereas others will be quite fast. Ensure
    that each step runs properly before continuing. Check the logs indicated on this
    screen if there are any issues reported.


    ![A352855_1_En_4_Fig43_HTML.jpg](A352855_1_En_4_Fig43_HTML.jpg)

    *Figure 4-43. Domain creation completed*


    Once the configuration is complete, you will be presented with a summary screen
    that displays many important data points, including port numbers, administration
    URLs, and directory locations. Figure [4-44](#A352855_1_En_4_Chapter.html#Fig44)
    shows the configuration summary after all steps have completed.


    ![A352855_1_En_4_Fig44_HTML.jpg](A352855_1_En_4_Fig44_HTML.jpg)

    *Figure 4-44. Important information regarding the domain configuration*


    Figure [4-45](#A352855_1_En_4_Chapter.html#Fig45) displays a closer look at the
    Installation Complete screen that shows the result of all of the configuration
    parameters.


    ![A352855_1_En_4_Fig45_HTML.jpg](A352855_1_En_4_Fig45_HTML.jpg)

    *Figure 4-45. Pertinent information about the new OID domain*


    It is important to record this information. However, you will be able to view
    this later using the Administration Console or the Fusion Middleware Control tools.
    These URLs and ports can be used to manage the environment.


    ## Verifying the Installation


    After all the installation and configuration tasks for OID, it is important to
    verify the environment. Doing so involves logging into the various components
    and ensuring they are operational. At this time it is also suggested that you
    verify start and stop scripts and set up the managed servers for administration.


    In the previous section, you installed WLS as the infrastructure for OID, OVD,
    DIP and ODSM. The components should have started automatically. Check the OS to
    view the processes that were started to support OID.


    Open a console and log into the host machine as the oracle user. Using the name
    of the domain created previously, use the command `ps` to check for processes
    running from the domain directory. See Figure [4-46](#A352855_1_En_4_Chapter.html#Fig46)
    for a look at this process.


    ![A352855_1_En_4_Fig46_HTML.jpg](A352855_1_En_4_Fig46_HTML.jpg)

    *Figure 4-46. Verify running processes for WLS and ODSM*


    This will provide information regarding WLS, and managed server processes. If
    this does not return any information, the environment will need to be started.
    This is discussed later.


    Oracle Process Manager and Notification Server (`OPMN`) controls the actual OID
    instance. `OPMN` is installed during the domain configuration. Although it is
    the process manager for OID, it does not run within WLS. It provides startup and
    shutdown functionality as well as monitoring and restart services to the OID environment.
    During the validation process, it will be used to check the process status with
    the `opmnctl` command.


    Within the same console as before, set the `ORACLE_INSTANCE` to the location in
    which the OID instance was created during the domain configuration step. This
    is likely within the `MIDDLEWARE_HOME` directory; for example, `/home/oracle/OIDMiddleware/asinst_1`.


    ```

    export ORACLE_INSTANCE=/home/oracle/OIDMiddleware/asinst_1

    ```


    The `opmnctl` command is located within the `$ORACLE_INSTANCE/bin` directory.
    The `opmnctl` command can accept a number of commands from basic status checks
    to complete restarts.


    You can retrieve a list of commands using `opmnctl` help.


    ```

    [oracle@clouddemolab bin]$ ./opmnctl help

    ```'
