- fmt: 'Throughout my career, I have had the chance to work with some of the best
    in the industry. These people helped put me on a path that led me to where I am
    now. There are people like my friend Jim Osborn, whose knowledge and experience
    helped me get through a number of projects, and his willingness to teach topics
    instilled the same willingness in me. The various project managers at Centroid
    (Ann, Carrie, Frank, Rob) with whom I have worked transformed my lackluster documentation
    skills into the ability to coherently convey complex project aspects. There are
    the owners of Centroid, who treat their employees like family. Scott Morrell and
    Paresh Patel, in particular, have mentored me and provided a work environment
    that encourages innovation and opportunity for professional growth. Jim Brull
    and Eric Reed have been there to show that the company is willing to let me mold
    my skills in ways that are mutually beneficial. I cannot forget to mention Ajay
    Arora, who has helped build my confidence as a leader and provided valued advice
    and technical knowledge many times.


    Outside of work, there are the many friends and family who have been around throughout
    my life and provided encouragement and a sounding board when I needed it. Special
    thanks go to Mike Gale and Neland North, who have known me throughout my career
    and helped guide me from being a new Airman to now, almost 20 years later. They
    are still trying to help me figure out this thing called life. I will see you
    guys on the river and on the bike trail. If I did not mention your name here,
    the omission was not intentional. There are just far too many people to thank
    and acknowledge in a single book. Thank you all.'
