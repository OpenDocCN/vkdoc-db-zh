    \n![9781484202395_Fig07-11.jpg](img/9781484202395_Fig07-11.jpg)\n\n图 7-11. 在软件库文件夹\
    \ `CLI Target Script` 中添加、编辑和删除脚本的选项\n\n![Image](img/sq.jpg) **提示**：所有签入软件库的实体必须具有唯一的名称。如果您添加的脚本与软件库中已有的脚本同名，系统会要求您在添加前对其进行重命名。\n\
    \n现在，`CLI Target Script` 在库中可见，并可供软件库使用。\n\n## 构建报告定义库\n\n可以构建软件库文件夹，从而创建一个可供存储库使用的库，而不是每次都编写新脚本或让脚本驻留在不同的主机或工作站上。\n\
    \n请像规划其他实体一样，仔细规划这个库。创建一个独立的库文件夹位置，并考虑此类型配置所需的空间分配。规划来自其他功能的实体，例如度量扩展、软件安装和应用程序构建，这些在完成复合报告时将成为报告定义的一部分。\n\
    \n## 使用 CLI 调用的 OEM 作业\n\n企业作业是 EM 环境的支柱。它们在幕后运行我们作为 Enterprise Manager 12c Cloud\
    \ Control 的一部分每天使用的许多功能。管理员拥有从命令行运行 EM 作业的附加能力。一旦收集了需求并熟悉了它们，设置通过 `emcli` 运行的作业是一个简单的过程。使用\
    \ EM CLI 中 `create_job` 动词的 `help` 函数，我们可以收集需求：\n\n```\n$ emcli help create_job\n\
    emcli create_job\n     -name=<job_name>\n     -type=<job_type>\n     -input_file=\"\
    property_file:<filename>\"\nDescription:\n Create and schedule a job.\n\nOptions:\n\
    \     -name: Optional parameter. The name may be specified in the input file instead.\n\
    \     -type: Optional parameter. The type may be specified in the input file instead.\n\
    \     -input_file: Required parameter. <filename> must be provided to load the\
    \ properties for\n                    creating and scheduling the job.\n\nA template\
    \ property file for the job_type can be obtained using EMCLI verb \"describe_job_type\"\
    .\n Another job of the same job type could also be used to generate the property\
    \ file using EMCLI verb \n\"describe_job\".\n Please make sure that the property\
    \ file is accessible to the EMCLI client for reading.\n\nSample:\n Create and\
    \ schedule a job with name MYJOB1 and of job type MyJobType1 with property file\
    \ present at \nlocation /tmp/myjob1_prop.txt\n     emcli create_job -name=MYJOB1\
    \ -job_type=MyJobType1 -\ninput_file=\"property_file:/tmp/myjob1_prop.txt\"\n\
    ```\n\n### 创建作业\n\n必须执行以下步骤来创建作业。在我们的示例中，我们将首先对六个现有代理的主机执行升级，然后删除那些之前的代理。\n\n\
    **升级步骤：**\n1.  检查有哪些代理可用于升级。\n2.  输入并使用文件列出这些代理，并使用该文件作为我们作业的一部分。\n3.  升级代理。\n\
    4.  升级完成后检查进程状态。\n\n**移除旧代理步骤：**\n1.  检查升级后可以清理哪些现有的代理安装。\n2.  使用 EM CLI 卸载旧的代理安装。\n\
    3.  使用 EM CLI 主机命令删除每个旧的代理主目录。\n\n### 步骤 1：升级代理\n\n列出我们将作为 EM 作业一部分升级的代理：\n\n\
    ```\n>emcli get_upgradable_agents > /u01/app/scripts/upg_agents.txt\n\norcl2:3872\
    \ 12.1.0.2.0 12.1.0.3.0 Linux x86-64\n /u01/app/oracle/Agent12c/core/12.1.0.2.0\n\
    orcl1:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/Agent12c/core/12.1.0.2.0\n\
    \n>vi /u01/app/scripts/upg_agents.txt\n移除版本信息和平台信息。剩下的应该是代理主机和端口：\norcl2:3872\n\
    orcl1:3872\n...\n```\n\n使用此文件创建一个 EM 作业来升级代理，并确保 `stage_location` 目录值有至少 2 GB\
    \ 的空间：\n\n```\n>emcli upgrade_agents -input_file=\"agents_file:/u01/app/scripts/upg_agents.txt\"\
    \ -job_\nname=\"UPG_021814_AGENTS\" -stage_location=/u01/app/jobs\nThe agent list\
    \ size is 6\n\nUpgradable Agents\n\nAgent Installed Version Version After Upgrade\
    \ Platform Oracle Home\n----- ----------------- --------------------- --------\
    \ ----\norcl2:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.2.0\n\
    orcl1:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.2.0\n\
    \nYou can run the the root.sh from the EM CLI to each of the hosts that have been\
    \ granted root/sudo \nprivileges (one more reason to be offered this access via\
    \ the EM12c environment). If the preferred \ncredentials do NOT have root access,\
    \ then you will need to run it manually via the EM CLI or from \neach of the agent\
    \ targets to complete the installations.\n\nAgent Reason\n----- ------\norcl1:3872\
    \ Preferred Privileged Credential for Oracle Home of Agent : Not Set | Privilege\
    \ Delegation \nfor Host : Not Set\n\nOnce the agent has been upgraded, you will\
    \ see the following message so you can check the status of \nthe job quickly from\
    \ within the console:\n\nAgent Upgrade Job submitted for Upgradable Agents shown\
    \ above. Use emcli get_agent_upgrade_status \ncommand or goto EM CONSOLE -> Set\
    \ Up -> Manage Cloud Control -> Upgrade Agents -> Agent Upgrade \nResults to see\
    \ job status\nJob Name : UPG_021814_AGENTS\n>emcli get_agent_upgrade_status -job_name=UPG_021814_AGENTS\n\
    \nShowing for each agent in the job UPG_021814_AGENTS\n\nAgent Status Started\
    \ Ended\n----- ------ ------- -----\norcl2:3872 Running 2014-02-18 15:32:58 MST\
    \ -\norcl1:3872 Running 2014-02-18 15:32:58 MST –\n...\n```\n\n如果发生任何失败，您需要通过控制台进行检查（这是最简单的访问方式），或者查询\
    \ EM 存储库。在此示例中，我们将查看高级状态：\n\n```\n>emcli get_agent_upgrade_status -job_name=UPG_021814_AGENTS\n\
    \nShowing for each agent in the job UPG_021814_AGENTS\n\nAgent Status Started\
    \ Ended\n----- ------ ------- -----\norcl2:3872 Success 2014-02-18 15:32:08 MST\
    \ 2014-02-18 15:53:22 MST\n...\n```\n\n我们现在可以使用此信息为下一步创建输入文件，以移除我们不再需要在 EM12c\
    \ 环境中的所有代理安装：\n\n```\n>emcli get_signoff_agents -output_file=\"/u01/app/work/signoff_021814.txt\"\
    \n```\n\n上述命令将输出到一个文件，该文件可用于下一步：\n\n```\nAgents available for Sign-off\n\nAgent\
    \ Installed Version Platform Oracle Home\n\n----- ----------------- -------- -----------\n\
    \norcl2:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\
    \norcl1:3872 12.1.0.3.0 Linux x86-64 /u02/oracle/agent12cR2/core/12.1.0.3.0\n\n\
    orcl3:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\n\
    orcl4:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\
    ```"
- fmt: "To view output of file:\n\n```\n>cat /u01/app/oracle/work/signoff_agents.txt\n\
    \norcl2:3872\norcl1:3872\norcl3:3872\norcl4:3872\nemrp2:3872\norcl6:3872\n```\n\
    \nStep 2: Remove Old Agents\n\nOur second example will clean up agents now that\
    \ we’ve upgraded all of them. Remove agents by using a match string in the search\
    \ via an EM CLI `signoff_agents` command:\n\n```\n>emcli signoff_agents -agents=\"\
    oradba%\" -job_name=CLEANUP_12cR2_AGNTS\n\nAgents available for Sign-off\n\nAgent\
    \ Installed Version Platform Oracle Home\n\n----- ----------------- -------- -----------\n\
    \norcl2:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\
    \norcl1:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\
    \nAgent Sign-off Job Submitted for the above agents. Use emcli get_signoff_status\
    \ or goto EM CONSOLE \n-> Set Up -> Manage Cloud Control -> Upgrade Agents ->\
    \ Post Agent Upgrade Tasks -> Sign-off Agent \nResults to see job status\nJob\
    \ Name : CLEANUP_12CR2_AGNTS\n```\n\nOnce all jobs have been verified as completed,\
    \ a second check should be performed to note that the sign-off status has been\
    \ received on each of the agents in question:\n\n```\n>emcli get_signoff_status\n\
    \nShowing for each job\n\nJob Name Status Total Agents Started Ended\n\n--------\
    \ ------ ------------ ------- -----\n\nCLEANUP_12CR2_AGNTS Success 2 2013-11-21\
    \ 17:08:30 CST\n2013-11-21 17:08:44 CST\n```\n\nNote that the sign-off doesn't\
    \ remove the old agent home. We will now do this through an EM CLI `host` command\
    \ once logged in:\n\n```\n>emcli execute_hostcmd –cmd=”rm -rf /u01/oracle/agent12c/core/12.1.0.2.0”\
    \ -targets=\"remote-host:host\"\n```\n\nThis command will remove the previous,\
    \ unused directory home from each host it is run against.\n\nThe goal of these\
    \ examples is to show you very simple commands that performed several usually\
    \ manual steps, thus easing the demands on the administrator. Anyone who reads\
    \ through the actual steps that were required to be performed by the DBA on six\
    \ servers, including verifying success and then removing the previous installation,\
    \ will realize the power behind the EM CLI job-submission option.\n\nExport/Import\
    \ Capabilities for Information Publisher Reports\n\nBI Publisher (BIP) now comes\
    \ standard as an integrated part of Release 4 (12.1.0.4). With this change, Information\
    \ Publisher Reports (IP Reports) are still supported, but migration to BIP is\
    \ recommended.\n\nAny report requires significant development time, and the ability\
    \ to export and import it through the EM CLI is incredibly beneficial; this is\
    \ no different than for your existing IP Reports. For this example, we will first\
    \ list then export an IP Report named “Exadata Summary Report”:\n\n```\n>emcli\
    \ get_reports –owner=\"KPOTVIN\"\n```\n\nFrom the list of reports owned by “KPOTVIN,”\
    \ we can choose one named `EXADATA_SUMMARY_REPORT` and export it:\n\n```\n>emcli\
    \ export_report -title=\"Exadata Summary Report\" -owner=\"KPOTVIN\" -output_file=\"\
    $OMS_HOME/reports/exadata_summary.xml\"\n```\n\nThis report will now be found\
    \ in the `$OMS_HOME/reports` directory, and the file will be named `exadata_summary`\
    \ for easy identification.\n\nTo then import this report, the following is done:\n\
    \n```\n>emcli import_report -files=\"$OMS_HOME/reports/exadata_summary.xml\"\n\
    ```\n\nExporting a BIP report is currently performed via the console and by exporting\
    \ the files to local files.\n\nStore Definition Library in Software Library\n\n\
    Storing definition files in the software library makes complete sense. No one\
    \ wants to continue to create and retain multiple copies of the same definition\
    \ file (a.k.a. response file). By implementing a software library, there is less\
    \ concern about version control as this can be managed as part of the feature.\n\
    \nCreating a definition file is a simple process:\n\n```\n>emcli get_procedures\
    \ -type=DBPROV \n```\n\nThis will create a list of all provisioning procedures\
    \ that can then be used to create a definition file; this will be used with a\
    \ deployment or provisioning verb call. This definition file contains all targets\
    \ and procedural steps. To use it as a “shortcut” versus writing out all of the\
    \ tasks (like a response file eliminates similar work for a database configuration\
    \ assistant [dbca] silent run) saves time and extra effort.\n\nYou can “describe”\
    \ or list out the commands and information to an output file with the following\
    \ command:\n\n```\n>emcli describe_procedure_input -procedure=B35E10B1F427B4EEE040578CD78179DC\
    \ > newoutputfile.properties\n```\n\nThis command will create a file named “newoutputfile.properties”\
    \ in the software library directory based on the procedure GUID listed in the\
    \ command.\n\nYou can then open the file with VI or another editor, make whatever\
    \ changes required for targets and so forth, and save it; next, upload it back\
    \ into the software library:\n\n```\n>emcli save_procedure_input –name=Prov_db12cR1_temp\
    \ -procedure=\"DB12cR1 Template\" -owner=\"KPOTVIN\"\n-input_file=data:$OMS_HOME/sw_files/newoutputfile.properties\n\
    ```\n\nThe file is now uploaded to the software library and can be downloaded\
    \ for future use, or can simply be used as is.\n\nOracle Extensibility Exchange\n\
    \nOracle’s Extensibility Exchange is a cloud repository (library) to which Oracle\
    \ and partners have contributed scripts, plug-ins, and other Enterprise Manager\
    \ entities for download. The Extensibility Exchange can be accessed via a web\
    \ browser at the following link ([Figure 7-12](#9781484202395_Ch07.xhtml#Fig12)):\
    \ `http://www.oracle.com/goto/emextensibility`.\n\n![9781484202395_Fig07-12.jpg](Images/9781484202395_Fig07-12.jpg)\n\
    \n[Figure 7-12](#9781484202395_Ch07.xhtml#_Fig12). Main page for Oracle’s Extensibility\
    \ Exchange, version 2.0\n\nThe benefit of having the Extensibility Exchange is\
    \ similar to that of having a provisioning library, just on a global scale. It\
    \ allows EM12c professionals to share their knowledge and expertise with the rest\
    \ of the OEM community. It offers solutions to those in the community, saving\
    \ them time and resources that would have been otherwise wasted recreating code\
    \ that others have already spent valuable time originating.\n\nThe desire to reuse\
    \ Enterprise Manager entities, such as scripts, plugins, and patch plans, quickly\
    \ became apparent, and there were requests for this functionality from a number\
    \ of power users. No one likes to reinvent the wheel, and with the Extensibility\
    \ Exchange the EM12c software library is taken to the next level. The source of\
    \ available entities is no longer local to the EM12c repository, but is now available\
    \ to anyone with browser access; contributions from the power users throughout\
    \ the Oracle community are also available.\n\nThe future of the Extensibility\
    \ Exchange is wide open with the release of version 2.0 in June 2014\\. As Enterprise\
    \ Manager’s features are enhanced, new offloading and export features are discovered,\
    \ along with new scripting methods. As we do more and more within the EM CLI,\
    \ we plan on seeing more Jython and JSON scripts that will encompass most of what\
    \ we now do with the database environment. However, with the move to mobile, who\
    \ knows what will be dreamed up with ADF (Application Development Forms) and APEX,\
    \ all supported within EM12c and scripted as part of deployment through the EM\
    \ CLI. Soon it won’t just be plug-ins and scripts, but possibly full suites of\
    \ monitoring entities that are available through the Extensibility Exchange.\n\
    \nTo gain a better understanding of the features, we can log into the Extensibility\
    \ Exchange via a web browser. The header on the page offers the user great information\
    \ on upcoming Enterprise Manager training and informational events ([Figure 7-13](#9781484202395_Ch07.xhtml#Fig13)).\
    \ There is also a link if one wants to proceed to the site to gain more information\
    \ or register for an event.\n\n![9781484202395_Fig07-13.jpg](Images/9781484202395_Fig07-13.jpg)"
