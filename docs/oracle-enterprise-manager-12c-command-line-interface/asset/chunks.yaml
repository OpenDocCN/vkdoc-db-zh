    \         FRAMES              POWER               TUPLES\nCOERCIONS          \
    \ FUNCTIONS           PRECEDENCE          TYPEOBJECTS\nCOMPARISON          IDENTIFIERS\
    \         PRINTING            TYPES\nCOMPLEX             IMPORTING           PRIVATENAMES\
    \        UNARY\nCONDITIONAL         INTEGER             RETURNING           UNICODE\n\
    CONTEXTMANAGERS     LISTLITERALS        SCOPING\nCONVERSIONS         LISTS   \
    \            SEQUENCEMETHODS1\n\nhelp> STRINGS\nString literals\n***************\n\
    \nString literals are described by the following lexical definitions:\n\nstringliteral\
    \   ::= stringprefix\n   stringprefix    ::= \"r\" | \"u\" | \"ur\" | \"R\" |\
    \ \"U\" | \"UR\" | \"Ur\" | \"uR\"\n   shortstring     ::= \"'\" shortstringitem*\
    \ \"'\" | '\"' shortstringitem* '\"'\n...\n\n:q\n\nhelp> <CTRL-D>\nYou are now\
    \ leaving help and returning to the Python interpreter.\nIf you want to ask for\
    \ help on a particular object directly from the\ninterpreter, you can type \"\
    help(object)\". Executing \"help('string')\"\nhas the same effect as typing a\
    \ particular string at the help> prompt.\n>>>\n```\n\n## EM CLI 中的 `help` 函数\n\
    \n`help`函数在 EM CLI 中也非常有用。开发者投入了大量时间确保程序本身包含了这些信息。与 Python 不同，输入`help()`不会进入另一个命令行；它只是简单地打印出一个按类别排序和分组的动词列表。\n\
    \n然后，可以在`help`函数中指定具体的动词，以获取关于该动词的更详细信息。例如，在 EM CLI 中输入`help('list_active_sessions')`将打印出关于`list_active_sessions()`函数的详细信息。\n\
    \n## Python 对象\n\nPython 中的对象是一个可以保存数据的实体，在大多数情况下，可以通过改变对象内部包含的数据或改变对象本身的属性来进行操作。Python\
    \ 对象的内容和复杂性取决于对象类型。例如，如果你需要一个只包含单个数字的对象，你会使用`number`对象。如果你需要一个包含多个键/值对的对象，你会使用`dictionary`对象。对象的生命周期始于它被创建或被赋值，结束于它被显式销毁或\
    \ Python 会话结束。本节列出了最常见的对象类型，并展示了如何创建和使用它们的示例。\n\n### 数字和字符串\n\n`number`对象是一个包含单个整数值的实体。`string`对象是一个包含单个字符串值的实体。这些类型的对象是可变的，这意味着在对象的生命周期内，其值可以在任何时候被更改或替换。这些无疑是\
    \ Python 中最常用的对象。\n\n“Hello World!”示例介绍了 Python 中最基本的对象：字符串。字符串在 Python 中无处不在，大多数其他对象都是由数字和字符串组成的。字符串可以包含数字，但数字不能包含字符串。\n\
    \n下面这个示例展示了如何通过将字符串赋值给变量来创建一个简单的字符串对象：\n\n```\n>>> mystring = 'Here is my string'\n\
    >>> type(mystring)\n<type 'str'>\n```\n\n我可以通过将数字赋值给变量来创建一个数字对象。`int`代表整数：\n\n\
    ```\n>>> mynumber = 12345\n>>> type(mynumber)\n<type 'int'>\n```\n\n数字和字符串是不同类型的对象。尝试将字符串值与数字值连接会导致错误：\n\
    \n```\n>>> mystring + mynumber\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nTypeError: Can't convert 'int' object to str implicitly\n\
    ```\n\n### 列表\n\n列表是在一个对象中存储一组带索引的值的常用方式。一个简单的列表被赋值给对象的方式与字符串被赋值给对象的方式类似，不同之处在于该对象现在是一个列表对象，而不是字符串对象。这在\
    \ Python 中不像在其他语言中那么重要，但理解这种差异是好的，因为它可能对程序的行为产生影响。\n\n这个示例展示了一个包含单个值的列表对象。赋值给列表的值被括号包裹。如果没有括号，这将是一个简单的字符串对象。参见：\n\
    \n```\n>>> mylist = ['one']\n>>> print(mylist)\n['one']\n>>> type(mylist)\n<type\
    \ 'list'>\n>>> mystring = 'one'\n>>> type(mystring)\n<type 'str'>\n```\n\n####\
    \ 简单列表\n\n一个只有一个值的列表可能有用，但列表的目的是能够在单个对象中分配多个列表值。这些值被称为*元素*。在前面的例子中，值`one`被分配为`mylist`对象中的第一个元素。\n\
    \n这个示例创建了一个名为`mylist`的列表，包含五个成员。打印列表会按照它被创建时的样子显示。五个元素被打印在一对开闭括号内。括号告诉我们这是一个列表，而不是字符串或任何其他类型的对象。索引为\
    \ 2 的元素实际上是列表中的第三个元素，因为索引号从 0 开始。\n\n列表的强大之处在于可以以多种方式操作各个元素。例如，可以通过指定其索引号从列表中查询任何元素。列表的索引从零开始，所以列表的第一个元素被赋予数字零：\n\
    \n```\n>>> mylist = ['one', 'two', 'three', 'four', 'five']\n>>> print(mylist)\n\
    ['one', 'two', 'three', 'four', 'five']\n>>> type(mylist)\n<type 'list'>\n>>>\
    \ print(mylist[2])\nthree\n```\n\n列表是可变的，这意味着它可以在创建后被操作。它可以被延长或缩短，元素也可以被更改。这个示例展示了`mylist`对象被追加了值`6`。该对象中的元素数量从五个增加到六个：\n\
    \n```\n>>> mylist.append('six')\n>>> print(mylist)\n['one', 'two', 'three', 'four',\
    \ 'five', 'six']\n>>> print(len(mylist))\n6\n```\n\n前一个示例中使用的`len()`函数显示了列表中的元素数量。像许多函数一样，`len()`可以用于列表、字符串和所有其他对象类型。\n"
- fmt: "# Lists in EM CLI\n\nThe next example shows how to further manipulate a list\
    \ by extracting and deleting the last element of `myshortlist`. The first command\
    \ in this example does three things. The `pop()` function extracts and then deletes\
    \ from `mylist` the last element, creates the `myshortlist` list object, and assigns\
    \ to it the “popped” element. If the `pop()` function weren’t preceded by an object\
    \ assignment, it would simply print the element:\n\n```python\n>>> myshortlist\
    \ = mylist.pop()\n>>> print(myshortlist)\nsix\n>>> print(mylist)\n['one', 'two',\
    \ 'three', 'four', 'five']\n```\n\nLists play a critical role in EM CLI. The output\
    \ of the functions in EM CLI may produce a list with hundreds or even thousands\
    \ of elements, and those elements may be composed of strings, numbers, or other\
    \ objects. The lists in EM CLI work in exactly the same way that they do in the\
    \ previous examples.\n\nUnderstanding everything about the following example is\
    \ not important right now, but it is important to note that the `list()` function\
    \ is one of the most-used functions in EM CLI and always returns a list object.\
    \ This list has 29 elements that can be “popped” off one at a time and assigned\
    \ to another object:\n\n```python\nemcli>mytargs = list(resource='Targets').out()['data']\n\
    emcli>type(mytargs)\n<type 'list'>\nemcli>len(mytargs)\n\nemcli>myshorttargs =\
    \ mytargs.pop()\nemcli>print(myshorttargs)\n{'TYPE_DISPLAY_NAME': 'Oracle WebLogic\
    \ Server', 'TYPE_QUA...\n```\n\nThe output of the `list()` EM CLI function is\
    \ a list of target information.\n\n# Strings and Lists\n\nThis section will show\
    \ how to accomplish the common task of finding a running Oracle database listener\
    \ in Linux by using the Linux `ps` and `grep` commands. The first part of the\
    \ example will show how to produce the process information. The second part of\
    \ the example will show how to parse the output of the `ps` command using various\
    \ Linux utilities, followed by the use of Python to accomplish the same task.\n\
    \n[Listing 6-1](#9781484202395_Ch06.xhtml#list1) shows a detailed listing of an\
    \ Oracle database listener background process. The `ps -ef` command lists all\
    \ of the running processes on the server, which are piped into `grep` to limit\
    \ the output to just the listener processes.\n\n## Listing 6-1. Find the Oracle\
    \ database listener process in Linux\n\n```bash\n[oracle@server ]$ ps -ef | grep\
    \ [t]nslsnr\noracle    1723     1  0 16:21 ?        00:00:01 \n/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
    \ LISTENER -inherit\n```\n\nThe combination of `ps` and `grep` shows that a single\
    \ listener is running and shows the full command in the eighth column of the output.\
    \ The listener command actually includes two spaces, so to us it looks like the\
    \ command spans the eighth, ninth, and tenth space-delimited columns. The `awk`\
    \ command parses this information quite well, as shown in [Listing 6-2](#9781484202395_Ch06.xhtml#list2).\n\
    \n## Listing 6-2. Use `awk` to parse the process detail\n\n```bash\n[oracle@server\
    \ ]$ ps -ef | grep [t]nslsnr | awk '{print $8,$9,$10}'\n/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
    \ LISTENER -inherit\n```\n\n[Listing 6-3](#9781484202395_Ch06.xhtml#list3) shows\
    \ that Python would treat the output from the `ps` command as an object made up\
    \ of pieces. The delimiter used in the previous example is one or more spaces.\
    \ We can parse the same command using Python instead of `awk`.\n\n## Listing 6-3.\
    \ Use Python to parse the process detail\n\n```python\n>>> psout = 'oracle 1723\
    \  1  0 16:21 ? 00:00:01 /u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr LISTENER\
    \ -inherit'\n>>> type(psout)\n<type 'str'>\n>>> psoutlist = psout.split()\n>>>\
    \ type(psoutlist)\n<type 'list'>\n>>> psoutlist[7:]\n['/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr',\
    \ 'LISTENER', '-inherit']\n>>> ' '.join(psoutlist[7:])\n'/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
    \ LISTENER -inherit'\n>>> psoutstring = ' '.join(psoutlist[7:])\n>>> psoutstring\n\
    '/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr LISTENER -inherit'\n```\n\
    \n`psoutlist = psout.split()` breaks apart the string into a list made up of string\
    \ elements based on a delimiter of whitespace and assigns it to the `psoutlist`\
    \ list object. `psoutlist[7:]` prints a subset of the `psoutlist` list object\
    \ from the eighth (remember that a list index starts at 0) to the final element.\
    \ `psoutstring = ' '.join(psoutlist[7:])` joins the subset of elements back into\
    \ a string delimited by a single space and assigns it to the `psoutstring` string\
    \ object. What really makes Python shine is that this can all be done in one command,\
    \ as shown in [Listing 6-4](#9781484202395_Ch06.xhtml#list4).\n\n## Listing 6-4.\
    \ Combine the commands from [Listing 6-3](#9781484202395_Ch06.xhtml#list3) into\
    \ a single command\n\n```python\n>>> ' '.join('oracle 1723 1  0 16:21 ? 00:00:01\
    \ /u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr LISTENER -inherit'.split()[7:])\n\
    '/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr LISTENER -inherit'\n```\n\
    \n[Listing 6-3](#9781484202395_Ch06.xhtml#list3) populates the `psout` variable\
    \ directly with the output from the `ps` command. The process of capturing the\
    \ output of the `ps` command could also be done directly from within Python, as\
    \ shown in [Listing 6-3a](#9781484202395_Ch06.xhtml#list3a).\n\n## Listing 6-3a.\
    \ Capture the `ps` command output using the Python subprocess module\n\n```python\n\
    >>> import subprocess\n>>> mycommand = ['ps', '-ef']\n>>> psoutput = subprocess.Popen(mycommand,\
    \ stdout=subprocess.PIPE).communicate()[0].split('\\n')\n>>> for i in psoutput:\n\
    ...     if 'tnslsnr' in i:\n...         psout = i\n```\n\nLists are a useful way\
    \ of grouping strings and numbers together in Python, but sometimes a more complex\
    \ object is required. Sometimes an index of single elements is not enough and\
    \ we need a way of grouping keys and values together. This is especially true\
    \ when working with EM CLI, where arrays are common and often complex. This is\
    \ where Python dictionary objects come in.\n\n# Dictionaries\n\nAn equally important\
    \ object type to understand in Python, and especially in EM CLI, is the “dictionary.”\
    \ Similar to Java’s “hashtable,” Perl’s “hash” objects, and PL/SQL’s “associative\
    \ arrays,” dictionaries are made up of a collection of key/value pairs. In other\
    \ words, each element of the dictionary will be made up of one key and one value.\
    \ The value can then be extracted by specifying its corresponding key. The syntax\
    \ for calling a value is similar to that of calling a value in a list, but a key\
    \ is specified instead of an index value. [Listing 6-5](#9781484202395_Ch06.xhtml#list5)\
    \ calls the value belonging to the key labeled `'second'`.\n\n## Listing 6-5.\
    \ Call a value from a dictionary by specifying the key to which it belongs\n\n\
    ```python\nemcli>mydic = {'first': 'one', 'second': 'two', 'third': 'three', 'fourth':\
    \ 'four', 'fifth': 'five'}\nemcli>mydic['second']\n'two'\n```\n\nDictionaries\
    \ use keys instead of a numerical index. JSON is represented as a dictionary object\
    \ in Python since JSON is little more than an efficient key/value object. This\
    \ can be shown clearly in EM CLI, as seen in [Listing 6-6](#9781484202395_Ch06.xhtml#list6).\n\
    \n## Listing 6-6. Use the `list()` function in EM CLI to show a JSON dictionary\n\
    \n```python\nemcli>set_client_property('EMCLI_OUTPUT_TYPE', 'JSON')\nemcli>list(resource='Targets').isJson()\n\
    True\nemcli>type(list(resource='Targets').out())\n<type 'dict'>\nemcli>list(resource='Targets').out()\n\
    {'exceedsMaxRows': False, 'columnHeaders': ['TARGET_NAM...\n```\n\nMost EM CLI\
    \ functions include an `isJson` function, which returns a boolean result indicating\
    \ whether the result set will be JSON or not. This command indicates that the\
    \ result set will return JSON instead of text.\n\nBy default, the interactive\
    \ mode of EM CLI is text mode. The first command changes that behavior so that\
    \ all result sets are returned as JSON."
