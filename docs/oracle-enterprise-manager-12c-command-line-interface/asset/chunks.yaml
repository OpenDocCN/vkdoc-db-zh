    # 您可以使用 read 语句来补充失败逻辑，以提示输入数据库名称。\n# --------------------------------------------------------------------------------------------------\n\
    \nif [ ${#1} -gt 0 ]; then\n   thisSID=${1}\n   SetDBUserCredential\nelse\n  \
    \ echo \"命令行上未设置数据库名称\"\n   echo \"  语法：  SetDBUserCredential [数据库名称]\"\n   exit\
    \ 1\nfi\n}\n```\n\n## 与函数相关的 Shell 脚本\n\n本节中的脚本调用或依赖于前面描述的函数。在每种情况下，函数库都会被加载，评估来自命令行的输入值，并设置函数所需的关键输入参数。这些脚本的简洁性值得注意。所有“严肃的”逻辑都存在于函数库中，因此创建新脚本时，可以将调试范围限制在新代码上。\n\
    \n### 示例脚本：`emcli_start_blackout.ksh`\n\n```shell\n#!/bin/ksh\n# 此脚本为 Korn shell\
    \ 编写。您必须调整 'read' 语句以用于 Bash\n#\n# ==============================================================================\n\
    #   文件：              emcli_start_blackout.ksh\n#   目的：       创建并启动一个 OEM 黑名单\n\
    #   参数：  数据库名称\n# ==============================================================================\n\
    # 输入您的 OEM 脚本存储库路径\nFUNCTION_LIB=<您的共享脚本目录>/emcli_functions.lib\n\n# WORKFILE\
    \ 是函数库清理的几个文件名变量之一\nexport WORKFILE=/tmp/create_em_blackout_$PPID.lst\n\n# --------------------------------------------------------------------------------------------------\n\
    #  运行时过程\n# --------------------------------------------------------------------------------------------------\n\
    # 源化函数库\n. ${FUNCTION_LIB}\n\n# 验证是否在命令行上传递了 SID\nif [ ${#1} -eq 0 ]; then\n \
    \  if tty -s; then\n      read thisSID? \"请提供数据库名称：\"\n  else\n      echo \"命令行上未提供数据库名称\"\
    \n      ExitCleanly\n   fi\n   read thisSID?\"输入要监控的数据库名称：  \"\nelse\n   thisSID=`print\
    \ $@ | awk '{print$NF}' | tr '[A-Z]' '[a-z]'`\nfi\n\nBO_NAME=scripted_blackout_${thisSID}\n\
    \nCleanUpFiles\nCreateBlackout\nExitCleanly\n```\n\n### 示例脚本：`emcli_stop_blackout.ksh`\n\
    \n```shell\n#!/bin/ksh\n# ==============================================================================\n\
    #   文件：             emcli_stop_blackout.ksh\n#   目的：      停止并删除一个已命名的 OEM 黑名单\n\
    #   参数：  数据库名称\n# ==============================================================================\n\
    # 输入您的 OEM 脚本存储库路径\nFUNCTION_LIB=<您的共享脚本目录>/emcli_functions.lib\n\n# WORKFILE\
    \ 是函数库清理的几个文件名变量之一\nexport WORKFILE=/tmp/create_em_blackout_$PPID.lst\n\n# --------------------------------------------------------------------------------------------------\n\
    #  运行时过程\n# --------------------------------------------------------------------------------------------------\n\
    # 源化函数库\n. ${FUNCTION_LIB}\n```"
