    EndBlackout\nExitCleanly\n```\n\n## Section 2: EM CLI and Veritas Cluster Server\n\
    \nVeritas Cluster Servers (VCS)[¹](#9781484202395_Ch08.xhtml#Fn1) are robust fail-over\
    \ mechanisms deployed as an alternative to RAC One-Node. With VCS, critical resources\
    \ like database instances are identified and monitored. If a failure is noticed,\
    \ VCS will unmount drives containing the binaries and database files, remount\
    \ them on the other node of a cluster, and restart the services.\n\nOEM agents\
    \ must be installed on a static drive on each host within the cluster. They never\
    \ fail-over with the VCS resource group because they are strictly associated with\
    \ a single host. This poses a problem with VCS fail overs. How do you keep track\
    \ of the targets when the database, its Oracle home, and all of its files move\
    \ to another host?\n\n![Image](Images/sq.jpg) **Tip** Many consider it a best\
    \ practice on VCS to install the agents on the virtual hostname. Refer to “How\
    \ to Install 12c Agent on Virtual Hostname / Virtual IP Address?” (Doc ID 1469995.1)\
    \ for details.\n\nThe EM CLI `relocate_targets` verb transfers responsibility\
    \ for target tracking to another agent when the targets are relocated by the VCS.\
    \ This section describes how that process works before showing you the shell script\
    \ itself.\n\n### Program Logic\n\nThis script gathers data from the environment\
    \ and decides which targets are moving and which agents are affected. This script’s\
    \ scalability and flexibility come from queries of three systems: the VCS cluster,\
    \ the OEM repository, and the EM agent. Note that syntax is slightly different\
    \ for relocating responsibility between agents for database and listener targets.\
    \ We’ll generate a separate set of workfiles for generating the EM CLI argfile\
    \ that actually performs the work.\n\n### Veritas Cluster Server\n\nVCS clusters\
    \ are organized into groups that drill down to the individual database and listener\
    \ targets. The hosts in the cluster are at the highest level. VCS heartbeats monitor\
    \ one or more critical resources on the active node and when necessary relocate\
    \ all the members[²](#9781484202395_Ch08.xhtml#Fn2) of a group from the current\
    \ ONLINE node to the other node that is currently OFFLINE. We’ll use this knowledge\
    \ to determine the host and agent names we need to manage.\n\nSince EM agents\
    \ can only monitor targets that run from the same host (or Oracle cluster), we\
    \ need to carefully determine which targets are related to the VCS group being\
    \ failed-over. Those database and listener targets are the only targets eligible\
    \ for relocation through EM CLI. We’ll use a second set of VCS query results to\
    \ decide which EM targets need to be relocated.\n\nFor example, let’s say you\
    \ have two Oracle installations, each with their own Oracle base filesystem. Each\
    \ base, or home, contains all the files required to support its own targets, of\
    \ course, and many databases and listeners may use those homes. They are all members\
    \ of one fail-over group. Let’s say the groups are named QUAL and TEST.\n\n* \
    \  The QUAL group has one database named `alexis_q` with a listener named `LSNRQ`.\n\
    *   TEST group has three databases, `alexis_t1`, `alexis_t2`, and `alexis_t3`,\
    \ and a shared listener named `LSNRT`.\n*   `Alexis_q` database is identified\
    \ as the critical resource for the QUAL cluster group.\n*   All three databases\
    \ in the TEST cluster group are identified as “critical resources” in the TEST\
    \ cluster group.\n\nIf VCS does not receive a response back from its heartbeat\
    \ against the `alexis_q`, all the resources in the QUAL cluster group will fail-over\
    \ to the other node.\n\nIf any of three databases in the TEST node becomes unresponsive,\
    \ everything on that node, including the healthy databases, will be restarted\
    \ by VCS on the other node.\n\nA VCS relocation often takes only a moment or two\
    \ while the healthy members of the resource group (other databases sharing the\
    \ binaries and any related listeners) are brought down, filesystems are unmounted\
    \ and then re-mounted, and finally all the resources are brought up. Manual intervention\
    \ is not required.\n\n### Oracle Enterprise Manager\n\nDatabases and listeners\
    \ on either host may have been ignored, dropped, or simply never discovered in\
    \ Enterprise Manager, so there’s nothing to change in OEM. We’ll check both the\
    \ EM repository and the local agent to decide which targets need to be relocated.[³](#9781484202395_Ch08.xhtml#Fn3)\n\
    \nIn this example, only databases `alexis_q` and `alexis_t1` are configured for\
    \ monitoring in OEM. The EM agent knows about all of them, of course, but OEM\
    \ monitoring and metrics collection only apply to the first two and their respective\
    \ listeners. As far as OEM is concerned, we can ignore the other two databases\
    \ completely. After the relocation is complete, the agent on the new node will\
    \ discover `alexis_t2` and `alexis_t3` as part of its own host discovery. The\
    \ agent on the other node also performs regular searches for new targets, so it\
    \ will essentially forget about the unmonitored databases. The EM CLI command\
    \ will transfer its knowledge about the history, metric collections, and preferred\
    \ credentials for `alexis_q` and `alexis_t1`. That knowledge transfer is the purpose\
    \ of this exercise, after all.\n\n### Implementation\n\nThe `emcli_relocate_target_vcs.ksh`\
    \ script is executed without command-line input parameters by VCS after all the\
    \ other fail-over tasks are complete, including restarting the databases and listeners:\n\
    \n```shell\n# Sample Script: emcli_relocate_target_vcs.ksh\n\n#!/bin/sh\n# ==============================================================================\n\
    #  File:            emcli_relocate_target_vcs.sh\n#  Purpose:     Relocate OEM\
    \ agent for monitored VCS targets\n#  Parameters: VCS group name required\n# \
    \ Note:           Must be run as part of  VCS startup to run after fail-over\n\
    #                      to the secondary host\n# ==============================================================================\n\
    # Environment tests\n# --------------------------------------------------------------------------------------------------\n\
    if [ ${#1} -eq 0 ]; then\n   echo \"You must pass the VCS cluster name on the\
    \ command line\\n\\n\"\n   exit 1\nfi\n\nexport VCSBIN=< Set to the bin directory\
    \ for your VRTSvcs executables >\n\nif [ ! -d ${VCSBIN} ]; then\n   echo  \"Could\
    \ not locate the Veritas executables in ${VCSBIN}\"\n   export VCSBIN=\"\"\n \
    \  exit 1\nfi\n\n# --------------------------------------------------------------------------------------------------\n\
    # Variables section\n# --------------------------------------------------------------------------------------------------\n\
    SCRIPTNAME=`basename ${0}`\nLOCAL_HOST=`hostname | cut -d\".\" -f1`\n\n# --------------------------------------------------------------------------------------------------\n\
    # Set the ORACLE_HOME to the agent's base directory\n# EM agent installs with\
    \ its own jdk, so reference it in this script\n# --------------------------------------------------------------------------------------------------\n\
    export ORACLE_HOME=/u01/oracle/product/agent12c\nexport EMCTL_HOME=${ORACLE_HOME}/agent_inst/bin\n\
    export JAVA_HOME=${ORACLE_HOME}/core/12.1.0.3.0/jdk/bin\n# --------------------------------------------------------------------------------------------------\n\
    # The settings shown assume EM CLI binaries reside in the agent O/H\n# --------------------------------------------------------------------------------------------------\n\
    \nexport EMCLI_HOME=${ORACLE_HOME}/emcli\n\n# Set paths to match the values set\
    \ above\n```"
