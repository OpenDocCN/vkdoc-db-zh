    ## 总结\n\n`EM CLI` 允许你从命令行执行许多管理任务，甚至可以在桌面上完成。本章描述的简单技术非常适合于 Shell 脚本编写和进一步的自动化，这将在下一章中进行描述。\n\
    \n---\n\n¹你的环境中存在多种目标类型。在安装过程中，`EM` 代理会发现主机上的目标，并将它们与特定的目标类型关联起来。会为识别的每种目标类型创建一个新的\
    \ `Oracle Home` 并安装相应的插件。每种目标类型的标签是固定的，每个目标仅与一种目标类型相关联。\n\n# 第 5 章\n\n![image](img/frontdot.jpg)\n\
    \n## 通过 Shell 脚本实现自动化\n\n正如我们在前一章所发现的，`EM CLI` 提供了完成复杂任务的更快捷方式，而这些任务通常通过 `OEM`\
    \ 控制台进行管理。`EM CLI` 的强大之处在于将 `EM CLI` 与经典的 Shell 脚本技术相结合。本章中的示例是为 `Unix/Linux`\
    \ 环境编写的，但由于 `EM CLI` 是一个 `Java` 应用程序，此处显示的 `CLI` 语法在其他环境中同样有效。\n\n本章从 `CLI` 脚本基础开始，然后通过几个示例演示该技术的应用。在每个示例中，为了确保说明清晰，我们移除了那些使脚本稳健运行的常见维护命令。由于这些技术适用于任何脚本解决方案，我们在处理任何\
    \ `OEM` 解决方案之前，将先列出一些基本的脚本编写准则。\n\n本章中的所有示例均使用基础的 `bash` Shell 脚本编写，因其普及性和清晰性。可以使用\
    \ `Perl` 或其他语言来提升脚本性能，但在本章中加入这些内容可能会掩盖所演示技术的基础知识。\n\n本章首先介绍一些 Shell 脚本编写的基础知识，进而发展到构建和应用\
    \ Shell 函数。在此过程中，我们将了解如何创建和控制 `OEM` 黑屏、管理用户账户以及处理更大的数据集。最后，我们将看一下使用 `getopts`\
    \ 的一些高级 Shell 脚本编写技术。\n\n### Shell 脚本编写最佳实践\n\n任何有 Shell 脚本编写经验的人，无论是针对 `Windows`、`Linux`\
    \ 还是任何其他 `Unix` 变体，都有自己偏好的技术。希望你环境中的脚本呈现一致的外观和感觉，使其易于阅读和维护。编写任何程序的最佳实践，无论使用何种\
    \ Shell 或操作系统，都由 `Unix` 的创造者提出，并在 Eric S. Raymond 所著的 *The Art of Unix Programming*\
    \ 中有所记载。这些准则为我们执行的任何编程奠定了非常清晰的基础。该书的免费在线副本可在 `https://archive.org/details/ost-computer-science-the_art_of_unix_programming`\
    \ 获取。\n\n#### 日志记录\n\n谜团应该放在你的床头柜上，而不是在你的 `Enterprise Manager` 环境中。任何 `Unix` 程序的输出都应在运行时提供有用的、完整的、简洁的屏幕输出以及详尽的日志文件。日志文件是通过重定向\
    \ Shell 输出创建的。\n\n#### 重定向\n\n`Echo` 语句将其标准输出定向到屏幕。这种类型的输出是 `Unix` 操作系统最早的功能之一，它使得创建日志文件成为脚本的简单扩展。可以使用一个或两个尖括号（也称为尖括号或角括号）重定向输出，通常指向右侧。一个简单的\
    \ `echo` 语句将标准输出发送到屏幕。\n\n```bash\necho \"Hello world\"\nHello world\n```\n\n\
    你可以使用向右的尖括号将相同的输出直接重定向到文件：\n\n```bash\necho \"Hello world\"> myFile.lst\ncat myFile.lst\n\
    Hello world\n```\n\n单个右尖括号创建一个新文件，而双右尖括号则将输出追加到文件末尾。\n\n```bash\necho \"Shell\
    \ scripting makes me hungry\">> myFile.lst\necho \"What about you?\">> myFile.lst\n\
    cat myFile.lst\nHello world\nShell scripting makes me hungry\nWhat about you?\n\
    ```\n\n健壮的 Shell 脚本既编写用于无人值守的计划活动（例如 `cron`），也编写用于交互式执行以进行调试和一次性使用。“通过管道输出到 `tee`”可以在控制台提供即时反馈，同时将标准输出写入文件，如下所示：\n\
    \n```bash\necho \"Hello world\"| tee myFile.lst\nHello world\ncat myFile.lst\n\
    Hello world\n```\n\n通过在你的 `tee` 语句后添加 `-a` 来追加到文件：\n\n```bash\necho \"Shell scripting\
    \ makes me hungry\"| tee -a myFile.lst\necho \"What about you?\"| tee -a myFile.lst\n\
    ```\n\n#### 错误处理\n\n即使是最简单的 `Unix` 程序也期望你的程序能让机器完成工作。编写不当的脚本会基于现有安装和配置做出假设（可能还经过测试）。正如你所知，在我们的行业中，没有什么是不变的，所以要为意外情况编程。\n\
    \n没有什么比一个程序在发现一个本可以由脚本轻松处理的问题时却失败退出更令人沮丧的了。例如，如果你的脚本需要一个用于日志或临时存储的特定目录，那么脚本应该创建这些目录并设置程序所需的适当权限：\n\
    \n```bash\nif [ ! -d /tmp/staging ]; then\n        mkdir -p /tmp/staging\n   \
    \     chmod 770 /tmp/staging\nfi\n```\n\n程序挂起是另一个领域，你的程序应该预见失败并在问题发生之前测试问题情况。例如，空文件可能导致你的脚本挂起，因此在\
    \ `grep` 文件输出之前，你应该检查文件是否确实存在：\n\n```bash\nif [ -f myFile.lst ]; then\n  cat myFile.lst\
    \ | grep \"Hello World\"\nelse\n  echo \"File myFile.lst is missing!\"\n  exit\
    \ 1\nfi\n```\n\n在 *The Art of Unix Programming* 中还有其他一些相关的脚本编写准则。我们刚才考虑的例子代表了本章为了简洁和清晰而省略的编程基础类型。\n\
    \n### 密码与 Shell 脚本\n"
- fmt: "在所有关于Shell编程的准则和建议中，一直有一条铁律：永远不要将密码硬编码到你的脚本中——这会成为维护和安全的噩梦。你需要自行开发管理密码文件的方法。选择哪种方式——是开发内部的Java解决方案，应用从网上找到的技术，依赖代码混淆和隐藏文件，还是使用其他巧妙的技巧——取决于你自己。本书范围之外，无法提供具体解决方案。\n\
    \n本章的剩余部分，每当脚本中需要密码时，都将使用名为`${SECRET_PASSWORD}`的变量。\n\n## 从Shell脚本调用EM CLI\n\n\
    像`SQL*Plus`这样的命令行工具在Shell脚本内部的子Shell中运行，通常包裹在以开始和结束`EOF`标签标记的“Here Document”中，如下例所示：\n\
    \n```\nsqlplus / as sysdba <<EOF\n  SELECT sysdate FROM dual;\n  exit\nEOF\n\n\
    SYSDATE\n\n03-AUG-14\n```\n\n你可以在此处找到关于此过程的更多信息：`http://www.tldp.org/LDP/abs/html/here-docs.html`。\n\
    \n每个EM CLI命令都是独立执行的，因此在你的Shell脚本中调用时不需要子Shell。取而代之的是，当需要一起执行一系列相关的CLI命令时，你应该使用Shell脚本函数。\n\
    \n## Shell脚本函数\n\nShell函数的语法非常简单。只需遵循以下步骤：\n\n1.  使用`function`关键字，后跟函数名和一个左花括号。花括号是`{\
    \ }`，而方括号是这些角括号：`[ ]`。\n2.  包含要执行的Shell命令。\n3.  添加一个右花括号。\n\n在下面的示例中，将几个目录的内容复制到备份目标位置。为每个目录重复编写创建文件列表和移动文件所需的代码是可行的。相反，重复性的任务由同一个代码块执行，该代码块通过函数名`CopyFiles`调用。可以添加常见的补充任务，例如压缩和`chmod`文件，以便进行单点编辑。\n\
    \n变量，如`${SOURCE_DIR}`、`${TARGET_DIR}`和`${WORKFILE}`，在运行时传递给函数。从属变量，如`${SOURCE_FILE}`和`${TARGET_FILE}`，在运行时为每个目录填充：\n\
    \n```\n# ----------------------------------------------------\n# Functions\n#\
    \ ----------------------------------------------------\nfunction CopyFiles {\n\
    cd $SOURCE_DIR\n\nls -l | grep -i $ORACLE_SID      >$WORKFILE\n\nfor thisFILE\
    \ in `cat $WORKFILE`; do\n   SOURCE_FILE=$SOURCE_DIR/$thisFILE\n   TARGET_FILE=$TARGET_DIR/$thisFILE\n\
    \   cp -f $SOURCE_FILE $TARGET_FILE\ndone\n\nrm -f $WORKFILE\n}\n\n# ----------------------------------------------------\n\
    # Run-time Procedure\n# ----------------------------------------------------\n\
    SOURCE_DIR=/gold_scripts/rman\nTARGET_DIR=/test_scripts/rman\n   CopyFiles\n\n\
    SOURCE_DIR=/gold_scripts/security\nTARGET_DIR=/test_scripts/security\n   CopyFiles\n\
    ```\n\n正如我们在上一章看到的，每个EM CLI会话都以两个命令开始——`login`和`sync`。在脚本中启动会话时也应遵循同样的做法。你可以每次脚本启动CLI会话时重复相同的序列，像这样：\n\
    \n```\nemcli login -username=\"SYSMAN\"-password=${\nemcli sync\n```\n\n由于这两个命令总是一起执行，它们构成了一个简单Shell脚本函数的基础，如下所示。我们将在本章后面看一些更复杂的函数。\n\
    \n```\nfunction EmcliLogin {\n        emcli login -username=\"SYSMAN\" -password=\"\
    ${SECRET_PASSWORD}\"\n        emcli sync\n}\n```\n\n### GetTargetName函数\n\n在上一章中，我们解释了如何使用`get_targets`动词来确定OEM目标的确切名称。由于Shell脚本是为了处理边缘情况（如目录缺失）而构建的，任何目标操作脚本都应验证以下内容：\n\
    \n1.  目标存在于OEM中。\n2.  在你的CLI命令中使用了目标的确切名称。\n\n通过给它一个名称并将命令包裹在花括号中，将`get_targets`动词构建成一个函数。在此示例中，`${INPUT_VAL}`的值由调用脚本传入函数：\n\
    \n```\nfunction GetTargetName {\nif [ `emcli get_targets | grep ${INPUT_VAL}%\"\
    | grep oracle_database\" |  wc -l` -gt 0 ];\nthen\n        thisTARGET=`emcli get_targets\
    \ –format –name=\"name:csv\"| grep -i ${INPUT_VAL} | grep oracle_database | cut\
    \ -d, -f4`\n        echo \"Target name is ${thisTARGET}\"\nelse\n        echo\
    \ \"No matching targets found\"\nfi\n}\n```\n\n在此示例中，我们设置了一个名为`${thisTARGET}`的变量，用于存储OEM已知的Oracle数据库`acme_qa`的确切目标名称。在运行时，目标名称将通过命令行或通过额外的脚本（例如，处理目标列表）传递。这里概述的步骤将在后面详细说明。\n\
    \n1.  首先确定是否存在匹配的目标。\n2.  如果存在，将变量`${thisTARGET}`设置为匹配项并宣布成功。记录和交互式用户通信对于故障排除Shell脚本至关重要。只要在运行时有新信息可用，就共享状态。\n\
    3.  如果不存在，要大声且礼貌地失败。Unix编程的核心规则之一是程序应尽早且尽可能大声地失败。Shell脚本也不例外。\n\n过滤和解析以确定最终的变量字符串遵循此序列：\n\
    \n1.  获取名称中带有`oracle%`的所有类型目标的列表。\n2.  在该列表中`grep`匹配`acme_qa`的目标。\n3.  在那个更短的列表中`grep`\
    \ `oracle_databases`。\n4.  通过逗号分隔符截取列表并返回第四个值。\n\n步骤1：列出名称中包含“oracle%”的所有目标\n\n\
    ```\nStatus ID,Status,Target Type,Target Name\n1,Up,oracle_emd,acme_dev:3872\n\
    1,Up,oracle_emd,acme_qa:2480\n1,Up,oracle_emd,acme_prod:3872\n1,Up,oracle_database,amce_dev\n\
    1,Up,oracle_database,acme_qa\n1,Up,oracle_database,acme_prod\n1,Up,oracle_listener,lsnracmedev\n\
    1,Up,oracle_listener,lsnracmeqa\n1,Up,oracle_listener,lsnracmeprod\n```\n\n步骤2：过滤该列表以查找包含acme_qa的字符串\n\
    \n```\n1,Up,oracle_database,acme_qa\n1,Up,oracle_listener,lsnracmeqa\n```\n\n\
    步骤3：仅列出数据库\n\n```\n1,Up,oracle_database,acme_qa\n```\n\n步骤4：返回逗号分隔符后的第四个字符串\n\n\
    ```\nacme_qa\n```\n\n确保在脚本执行期间通过名称调用函数：\n\n```\nread INPUT_VAL?\"Enter the database\
    \ to be managed:\"\nGetTargetName\n```\n\n## 使用EM CLI管理黑屏\n\nEnterprise Manager最常见的用途是为目标停机事件或超出你设定限制的度量发送通知。你通过为单个目标或目标组创建黑屏来在计划停机期间控制这些警报。创建黑屏需要许多设置，而EM控制台提供了一种方便、美观的方法来实现。\n\
    \nEM CLI提供了一种在你的Shell脚本内部创建、停止和删除黑屏的方法。控制台中发现的所有相同选项都可以通过EM CLI配置，因为它在幕后调用了相同的Java代码。\n\
    \n你必须为EM CLI的`create_blackout`动词提供三个值。\n\n*   通过`-name`传递的黑屏唯一名称。\n*   通过`-add_targets`参数指定的要包含在黑屏中的目标。\n\
    *   作为`-schedule`参数输入的有关开始和结束时间的计划信息。\n\n`-reason`变量不是EM CLI必需的，但应包含在内，以使OEM管理员更容易评估正在运行、已计划和已停止的黑屏。请保持礼貌。\n\
    \n创建简单黑屏的语法相当直接：\n\n```\n> emcli create blackout -name=\"sample_blackout\"\\\n\
    -add_targets=\"oracla:oracle_database\"\\\n-schedule=\"duration::360 ...\"\n-reason=\"\
    Blackout demonstration using emcli\"\n```\n\n### Name参数"
  raw: "Among all the guidelines and suggestions for shell programming there has always\
    \ been one hard and fast rule: Never hard-code passwords into your scripts—it\
    \ can become a maintenance and security nightmare. It is up to you to develop\
    \ a method for managing your password files. The choice is yours whether you develop\
    \ an in-house Java solution, apply a technique you found on the web, depend on\
    \ obfuscation and hidden files, or use some other bit of cleverness. It is beyond\
    \ the scope of this book to suggest solutions.\n\nThe remainder of this chapter\
    \ will use the variable named `${SECRET_PASSWORD}` whenever a password is required\
    \ in the script.\n\nCalling EM CLI from a Shell Script\n\nCommand-line utilities\
    \ like SQL*Plus run in a subshell inside of shell scripts, wrapped in “Here Documents”\
    \ that are typically shown as opening and closing EOF tags, like this example\
    \ shows:\n\n```\nsqlplus / as sysdba <<EOF\n  SELECT sysdate FROM dual;\n  exit\n\
    EOF\n\nSYSDATE\n\n03-AUG-14\n```\n\nYou can find more information about this process\
    \ at `http://www.tldp.org/LDP/abs/html/here-docs.html`\n\nEach EM CLI command\
    \ runs on a stand-alone statement, so a subshell is not required when called by\
    \ your shell script. In its place, you should use shell script functions when\
    \ a series of related CLI commands needs to be executed together.\n\nShell Script\
    \ Functions\n\nShell function syntax is quite simple. Just follow these steps:\n\
    \n1.  Using the `keyword` function, give the function a name followed by an opening\
    \ brace. Braces are the curly brackets { }, and brackets are these angular objects:\
    \ [ ].\n2.  Include the shell commands to be executed.\n3.  Add a closing brace.\n\
    \nIn the following example, the contents of several directories are copied to\
    \ a backup destination. The code for creating the file list and the actions required\
    \ to move the files could be repeated for each directory. Instead, the recurring\
    \ tasks are performed by the same block of code, which is called by the function\
    \ name `CopyFiles`. Common supplemental tasks, such as compressing and chmodding\
    \ the files, can be added so as to function for single-source editing.\n\nVariables,\
    \ such as `SOURCE_DIR`, `TARGET_DIR`, and `WORKFILE`, are passed to the function\
    \ at run-time. Dependent variables, such as `SOURCE_FILE` and `TARGET_FILE`, are\
    \ populated at run-time for each directory:\n\n```\n# ----------------------------------------------------\n\
    # Functions\n# ----------------------------------------------------\nfunction\
    \ CopyFiles {\ncd $SOURCE_DIR\n\nls -l | grep -i $ORACLE_SID      >$WORKFILE\n\
    \nfor thisFILE in `cat $WORKFILE`; do\n   SOURCE_FILE=$SOURCE_DIR/$thisFILE\n\
    \   TARGET_FILE=$TARGET_DIR/$thisFILE\n   cp -f $SOURCE_FILE $TARGET_FILE\ndone\n\
    \nrm -f $WORKFILE\n}\n\n# ----------------------------------------------------\n\
    # Run-time Procedure\n# ----------------------------------------------------\n\
    SOURCE_DIR=/gold_scripts/rman\nTARGET_DIR=/test_scripts/rman\n   CopyFiles\n\n\
    SOURCE_DIR=/gold_scripts/security\nTARGET_DIR=/test_scripts/security\n   CopyFiles\n\
    ```\n\nAs we saw in the last chapter, each EM CLI session begins with two commands—login\
    \ and sync. This same practice should be followed when starting a session in a\
    \ script. You could repeat the same sequence each time your script starts a CLI\
    \ session, like this:\n\n```\nemcli login -username=\"SYSMAN\"-password=${\nemcli\
    \ sync\n```\n\nSince these two commands always execute together, they form the\
    \ basis for a simple shell script function, seen below. We’ll look at some more-complex\
    \ functions later in the chapter.\n\n```\nfunction EmcliLogin {\n        emcli\
    \ login -username=\"SYSMAN\" -password=\"${SECRET_PASSWORD}\"\n        emcli sync\n\
    }\n```\n\nGetTargetName Function\n\nIn the previous chapter we explained how the\
    \ `get_targets` verb can be used to determine the exact name of an OEM target.\
    \ Since shell scripts are built to handle edge cases, like missing directories,\
    \ any target-manipulation script should verify the following:\n\n1.  The target\
    \ exists in OEM.\n2.  You use the exact name of the target in your CLI command.\n\
    \nBuild the `get_targets` verb into a function by giving it a name and wrapping\
    \ the commands in braces. In this example the value for `INPUT_VAL` is passed\
    \ into the function by the calling script:\n\n```\nfunction GetTargetName {\n\
    if [ `emcli get_targets | grep ${INPUT_VAL}%\"| grep oracle_database\" |  wc -l`\
    \ -gt 0 ];\nthen\n        thisTARGET=`emcli get_targets –format –name=\"name:csv\"\
    | grep -i ${INPUT_VAL} | grep oracle_database | cut -d, -f4`\n        echo \"\
    Target name is ${thisTARGET}\"\nelse\n        echo \"No matching targets found\"\
    \nfi\n}\n```\n\nIn this example, we set a variable named `thisTARGET` for the\
    \ exact target name known to OEM for the Oracle database `acme_qa`. At run-time,\
    \ the target name will be passed from the command line or through additional scripting\
    \ (working through a list of targets, for instance). The steps outlined here are\
    \ explained in detail later.\n\n1.  Determine first whether a matching target\
    \ exists.\n2.  If it does exist, set the variable `thisTARGET` to match and announce\
    \ your success. Logging and interactive user communication are essential to troubleshooting\
    \ shell scripts. Share the status whenever new information is available at run-time.\n\
    3.  If it does not exist, fail loudly and politely. One of the core Unix programming\
    \ rules is that programs should fail as early as possible and loudly as possible.\
    \ Shell scripts are no exception.\n\nFiltering and parsing to determine the final\
    \ variable string runs through this sequence:\n\n1.  Get a list of all targets\
    \ of a type with `oracle%` in the name.\n2.  Grep that list for targets matching\
    \ `acme_qa`.\n3.  Grep that shorter list for `oracle_databases`.\n4.  Cut the\
    \ list by delimiting on the comma and returning the fourth value.\n\nStep 1: List\
    \ of all targets with “oracle%” in their name\n\n```\nStatus ID,Status,Target\
    \ Type,Target Name\n1,Up,oracle_emd,acme_dev:3872\n1,Up,oracle_emd,acme_qa:2480\n\
    1,Up,oracle_emd,acme_prod:3872\n1,Up,oracle_database,amce_dev\n1,Up,oracle_database,acme_qa\n\
    1,Up,oracle_database,acme_prod\n1,Up,oracle_listener,lsnracmedev\n1,Up,oracle_listener,lsnracmeqa\n\
    1,Up,oracle_listener,lsnracmeprod\n```\n\nStep 2: Filter that list for strings\
    \ containing acme_qa\n\n```\n1,Up,oracle_database,acme_qa\n1,Up,oracle_listener,lsnracmeqa\n\
    ```\n\nStep 3: Just list the database\n\n```\n1,Up,oracle_database,acme_qa\n```\n\
    \nStep 4: Return the fourth string after a comma delimiter\n\n```\nacme_qa\n```\n\
    \nBe sure to call the function by name during script execution:\n\n```\nread INPUT_VAL?\"\
    Enter the database to be managed:\"\nGetTargetName\n```\n\nManaging Blackouts\
    \ with EM CLI\n\nThe most common use of Enterprise Manager is to send notifications\
    \ for target down events or metrics that fall outside limits you’ve set. You control\
    \ those alerts during planned outages by creating blackouts for individual targets\
    \ or groups of targets. There are a number of settings required to create a blackout,\
    \ and the EM console provides a handy, attractive means to do it.\n\nEM CLI provides\
    \ a means of creating, stopping, and deleting blackouts inside your shell scripts.\
    \ All of the same options found in the console are configurable through EM CLI,\
    \ since it exercises the same Java code behind the scenes.\n\nYou must provide\
    \ three values for the EM CLI`create_blackout` verb.\n\n*   Unique name for each\
    \ blackout passed as `-name`\n*   Targets to include in the blackout, used in\
    \ `-add_targets` argument\n*   Schedule information about start and end times,input\
    \ as `-schedule` argument\n\nThe`-reason` variableis not required by EM CLI but\
    \ should be included to make it easier for OEM administrators to assess running,\
    \ scheduled, and stopped blackouts. Be courteous.\n\nThe syntax to create a simple\
    \ blackout is fairly straightforward:\n\n```\n> emcli create blackout -name=\"\
    sample_blackout\"\\\n-add_targets=\"oracla:oracle_database\"\\\n-schedule=\"duration::360\
    \ ...\"\n-reason=\"Blackout demonstration using emcli\"\n```\n\nName Argument"
  trans: "\n在所有关于 Shell 编程的准则和建议中，一直有一条铁律：永远不要将密码硬编码到你的脚本中——这会成为维护和安全的噩梦。你需要自行开发管理密码文件的方法。选择哪种方式——是开发内部的\
    \ Java 解决方案，应用从网上找到的技术，依赖代码混淆和隐藏文件，还是使用其他巧妙的技巧——取决于你自己。本书范围之外，无法提供具体解决方案。\n\n\
    本章的剩余部分，每当脚本中需要密码时，都将使用名为`${SECRET_PASSWORD}`的变量。\n\n## 从 Shell 脚本调用 EM CLI\n\n\
    像`SQL*Plus`这样的命令行工具在 Shell 脚本内部的子 Shell 中运行，通常包裹在以开始和结束`EOF`标签标记的“Here Document”中，如下例所示：\n\
    \n```\nsqlplus / as sysdba <<EOF\n  SELECT sysdate FROM dual;\n  exit\nEOF\n\n\
    SYSDATE\n\n03-AUG-14\n```\n\n你可以在此处找到关于此过程的更多信息：`http://www.tldp.org/LDP/abs/html/here-docs.html`。\n\
    \n每个 EM CLI 命令都是独立执行的，因此在你的 Shell 脚本中调用时不需要子 Shell。取而代之的是，当需要一起执行一系列相关的 CLI 命令时，你应该使用\
    \ Shell 脚本函数。\n\n## Shell 脚本函数\n\nShell 函数的语法非常简单。只需遵循以下步骤：\n\n1.  使用`function`关键字，后跟函数名和一个左花括号。花括号是`{\
    \ }`，而方括号是这些角括号：`[ ]`。\n2.  包含要执行的 Shell 命令。\n3.  添加一个右花括号。\n\n在下面的示例中，将几个目录的内容复制到备份目标位置。为每个目录重复编写创建文件列表和移动文件所需的代码是可行的。相反，重复性的任务由同一个代码块执行，该代码块通过函数名`CopyFiles`调用。可以添加常见的补充任务，例如压缩和`chmod`文件，以便进行单点编辑。\n\
    \n变量，如`${SOURCE_DIR}`、`${TARGET_DIR}`和`${WORKFILE}`，在运行时传递给函数。从属变量，如`${SOURCE_FILE}`和`${TARGET_FILE}`，在运行时为每个目录填充：\n\
    \n```\n# ----------------------------------------------------\n# Functions\n#\
    \ ----------------------------------------------------\nfunction CopyFiles {\n\
    cd $SOURCE_DIR\n\nls -l | grep -i $ORACLE_SID      >$WORKFILE\n\nfor thisFILE\
    \ in `cat $WORKFILE`; do\n   SOURCE_FILE=$SOURCE_DIR/$thisFILE\n   TARGET_FILE=$TARGET_DIR/$thisFILE\n\
    \   cp -f $SOURCE_FILE $TARGET_FILE\ndone\n\nrm -f $WORKFILE\n}\n\n# ----------------------------------------------------\n\
    # Run-time Procedure\n# ----------------------------------------------------\n\
    SOURCE_DIR=/gold_scripts/rman\nTARGET_DIR=/test_scripts/rman\n   CopyFiles\n\n\
    SOURCE_DIR=/gold_scripts/security\nTARGET_DIR=/test_scripts/security\n   CopyFiles\n\
    ```\n\n正如我们在上一章看到的，每个 EM CLI 会话都以两个命令开始——`login`和`sync`。在脚本中启动会话时也应遵循同样的做法。你可以每次脚本启动\
    \ CLI 会话时重复相同的序列，像这样：\n\n```\nemcli login -username=\"SYSMAN\"-password=${\nemcli\
    \ sync\n```\n\n由于这两个命令总是一起执行，它们构成了一个简单 Shell 脚本函数的基础，如下所示。我们将在本章后面看一些更复杂的函数。\n\
    \n```\nfunction EmcliLogin {\n        emcli login -username=\"SYSMAN\" -password=\"\
    ${SECRET_PASSWORD}\"\n        emcli sync\n}\n```\n\n### GetTargetName 函数\n\n在上一章中，我们解释了如何使用`get_targets`动词来确定\
    \ OEM 目标的确切名称。由于 Shell 脚本是为了处理边缘情况（如目录缺失）而构建的，任何目标操作脚本都应验证以下内容：\n\n1.  目标存在于 OEM\
    \ 中。\n2.  在你的 CLI 命令中使用了目标的确切名称。\n\n通过给它一个名称并将命令包裹在花括号中，将`get_targets`动词构建成一个函数。在此示例中，`${INPUT_VAL}`的值由调用脚本传入函数：\n\
    \n```\nfunction GetTargetName {\nif [ `emcli get_targets | grep ${INPUT_VAL}%\"\
    | grep oracle_database\" |  wc -l` -gt 0 ];\nthen\n        thisTARGET=`emcli get_targets\
    \ –format –name=\"name:csv\"| grep -i ${INPUT_VAL} | grep oracle_database | cut\
    \ -d, -f4`\n        echo \"Target name is ${thisTARGET}\"\nelse\n        echo\
    \ \"No matching targets found\"\nfi\n}\n```\n\n在此示例中，我们设置了一个名为`${thisTARGET}`的变量，用于存储\
    \ OEM 已知的 Oracle 数据库`acme_qa`的确切目标名称。在运行时，目标名称将通过命令行或通过额外的脚本（例如，处理目标列表）传递。这里概述的步骤将在后面详细说明。\n\
    \n1.  首先确定是否存在匹配的目标。\n2.  如果存在，将变量`${thisTARGET}`设置为匹配项并宣布成功。记录和交互式用户通信对于故障排除\
    \ Shell 脚本至关重要。只要在运行时有新信息可用，就共享状态。\n3.  如果不存在，要大声且礼貌地失败。Unix 编程的核心规则之一是程序应尽早且尽可能大声地失败。Shell\
    \ 脚本也不例外。\n\n过滤和解析以确定最终的变量字符串遵循此序列：\n\n1.  获取名称中带有`oracle%`的所有类型目标的列表。\n2.  在该列表中`grep`匹配`acme_qa`的目标。\n\
    3.  在那个更短的列表中`grep` `oracle_databases`。\n4.  通过逗号分隔符截取列表并返回第四个值。\n\n步骤 1：列出名称中包含“oracle%”的所有目标\n\
    \n```\nStatus ID,Status,Target Type,Target Name\n1,Up,oracle_emd,acme_dev:3872\n\
    1,Up,oracle_emd,acme_qa:2480\n1,Up,oracle_emd,acme_prod:3872\n1,Up,oracle_database,amce_dev\n\
    1,Up,oracle_database,acme_qa\n1,Up,oracle_database,acme_prod\n1,Up,oracle_listener,lsnracmedev\n\
    1,Up,oracle_listener,lsnracmeqa\n1,Up,oracle_listener,lsnracmeprod\n```\n\n步骤\
    \ 2：过滤该列表以查找包含 acme_qa 的字符串\n\n```\n1,Up,oracle_database,acme_qa\n1,Up,oracle_listener,lsnracmeqa\n\
    ```\n\n步骤 3：仅列出数据库\n\n```\n1,Up,oracle_database,acme_qa\n```\n\n步骤 4：返回逗号分隔符后的第四个字符串\n\
    \n```\nacme_qa\n```\n\n确保在脚本执行期间通过名称调用函数：\n\n```\nread INPUT_VAL?\"Enter the database\
    \ to be managed:\"\nGetTargetName\n```\n\n## 使用 EM CLI 管理黑屏\n\nEnterprise Manager\
    \ 最常见的用途是为目标停机事件或超出你设定限制的度量发送通知。你通过为单个目标或目标组创建黑屏来在计划停机期间控制这些警报。创建黑屏需要许多设置，而 EM\
    \ 控制台提供了一种方便、美观的方法来实现。\n\nEM CLI 提供了一种在你的 Shell 脚本内部创建、停止和删除黑屏的方法。控制台中发现的所有相同选项都可以通过\
    \ EM CLI 配置，因为它在幕后调用了相同的 Java 代码。\n\n你必须为 EM CLI 的`create_blackout`动词提供三个值。\n\n\
    *   通过`-name`传递的黑屏唯一名称。\n*   通过`-add_targets`参数指定的要包含在黑屏中的目标。\n*   作为`-schedule`参数输入的有关开始和结束时间的计划信息。\n\
    \n`-reason`变量不是 EM CLI 必需的，但应包含在内，以使 OEM 管理员更容易评估正在运行、已计划和已停止的黑屏。请保持礼貌。\n\n创建简单黑屏的语法相当直接：\n\
    \n```\n> emcli create blackout -name=\"sample_blackout\"\\\n-add_targets=\"oracla:oracle_database\"\
    \\\n-schedule=\"duration::360 ...\"\n-reason=\"Blackout demonstration using emcli\"\
    \n```\n\n### Name 参数\n"
- fmt: "# 计划停用（Blackout）\n\n你可以将任何内容作为停用（blackout）的名称。停用名称在创建时被应用，同时在停止和删除停用时也会用到。始终使用描述性名称是良好的实践，例如\
    \ `scripted_blackout_$SID` 或类似的、一致的命名标准。随着我们处理这些示例，你将开始看到一致性如何影响解决方案的设计。\n\n##\
    \ 添加目标参数\n\n目标必须通过目标名称和目标类型来标识。例如：\n\n- `oracla:oracle_database`\n- `demohost:host`\n\
    - `lsnroracla:oracle_listener`\n\n## 计划参数\n\n每个计划参数在命令行接受两个必填值和几个可选值，类似于控制台中的灵活性：\n\
    \n```\nfrequency:once\nrequires => duration or end_time\noptional => start_time,\
    \ tzinfo, tzoffset\n\nfrequency:interval\nrequires => duration, repeat\noptional\
    \ => start_time, end_time, tzinfo, tzoffset\n\nfrequency:weekly\nrequires => duration,\
    \ days\noptional => start_time, end_time, tzinfo, tzoffset\n\nfrequency:monthly\n\
    requires => duration, days\noptional => start_time, end_time, tzinfo, tzoffset\n\
    \nfrequency:yearly\nrequires => duration, days, months\noptional => start_time,\
    \ end_time, tzinfo, tzoffset\n```\n\n## 计划停用的一个健壮解决方案\n\n作者的环境中包含一些应用程序培训数据库，这些数据库每晚都会从冷备份中刷新。当然，一旦这些目标被添加到\
    \ OEM，他就开始在夜间收到由这些计划中断引起的寻呼通知。你可以想象他的反应。\n\n- 最简单的解决方案是在控制台中按计划将这些目标整夜停用。\n- 如果需要在白天运行此刷新怎么办？\n\
    - 你真的希望这些目标在夜间不被监控吗？\n- 如果刷新失败怎么办？培训师通常不是耐心的客户，尤其是一房间闲置的学员正在等待他们的实验。\n\n这里有一个涉及\
    \ Shell 函数、EM CLI 及其相关运行时脚本的解决方案。我们将首先看看在不使用 Shell 函数的情况下通常如何完成此过程，然后我们将把脚本转换为可移植、可扩展的函数。\n\
    \n## 使用 Shell 脚本创建和停止停用\n\n可以通过一系列 CLI 动词创建停用，以执行以下步骤来测试、执行然后验证停用状态：\n\n1.  确定目标是否已处于停用状态。\n\
    2.  如果停用已存在，则停止并删除它（以便为你的新停用获得完整持续时间）。\n3.  创建并启动新的停用。\n4.  通过将其值回显到屏幕以及日志文件中来验证停用是否已启动。\n\
    \n这些步骤在此简化脚本中进行了说明。你的真实脚本应测试数据库名称是否作为 `$1` 值在命令行传递，然后根据运行时条件提示或失败。例如，如果脚本是由活动用户执行的，它应提示输入数据库名称，否则它将失败并将原因回显到日志文件。\n\
    \n```shell\n#!/bin/ti\n# =====================================================\n\
    #  File:        create_blackout.sh\n#  Purpose:     Create and initiate an OEM\
    \ blackout\n#  Parameters:  Blackout name as BO_NAME\n# =====================================================\n\
    export BO_NAME=${1}_scripted_blackout\n\necho  \"\\n\\nCreating blackout named\
    \ '${BO_NAME}' ...\\n\"\n\nif [ `emcli get_blackouts | grep ${BO_NAME} | wc -l`\
    \ -gt 0 ]; then\n        $ECHO \"\\n\\nFound an existing blackout named ${BO_NAME}\"\
    \n        $ECHO \"That blackout will be stopped and deleted prior to starting\
    \ the new one\\n\\n\"\n        emcli stop_blackout -name=\"${BO_NAME}\"\n    \
    \    emcli delete_blackout -name=\"${BO_NAME}\"\nfi\n\nemcli create_blackout\n\
    -name=\"${BO_NAME}\"\n        -add_targets=\"${thisTARGET}:oracle_database\"\n\
    -schedule=\"duration::360\"\n-reason=\"Scripted blackout for maintenance or refresh\"\
    \n\nsleep 5\n\necho \"\\n\\nGetting blackout information for '${BO_NAME}' ...\\\
    n\\n\"\nemcli get_blackout_details -name=\"${BO_NAME}\"\n```\n\n在这个简短的脚本中，有几件事需要注意：\n\
    \n- 每个停用名称必须是唯一的，因此此脚本要求部分名称在命令行传递。在此示例中，我们传递了 SID。\n- 用户沟通在任何时候都很重要，因此要完整且简洁。你的\
    \ `echo` 语句在运行时很有用，在日志文件中也是必不可少的。\n- 此计划停用最多运行六小时（`duration:360`），因此你需要删除同名的现有停用以获得完整的六小时。\n\
    - 请注意，`stop_blackout` 和 `delete_blackout` 动词仅将停用名称作为其唯一输入值。你必须先停止停用才能删除它。\n- 停用状态的测试对于运行时日志文件很重要。\n\
    \n在实践中，这表现为 crontab 中的一系列包装条目，如下所示：\n\n```\n25 19 * * * /scripts/oem/create_blackout.sh\
    \ gold\n30 19 * * * /scripts/refresh/restore_training.sh gold\n30 20 * * * /scripts/oem/end_blackout.sh\
    \ gold\n```\n\n当你启动停用时，你也应该计划停止它。当然，脚本对的这一边更简单，因为要做的事情少得多：\n\n```shell\n#!/bin/sh\n\
    # =====================================================\n#  File:        end_blackout.sh\n\
    #  Purpose:     End an OEM blackout\n#  Parameters:  Blackout name as BO_NAME\n\
    # =====================================================\nexport BO_NAME=${1}_scripted_blackout\n\
    echo  \"\\n\\nStopping blackout named '${BO_NAME}' ...\\n\"\nif [ `emcli get_blackouts\
    \ | grep ${BO_NAME} | wc -l` -gt 0 ]; then\n        $ECHO \"\\n\\nFound an existing\
    \ blackout named ${BO_NAME}\"\n        emcli stop_blackout -name=\"${BO_NAME}\"\
    \n        emcli delete_blackout -name=\"${BO_NAME}\"\nfi\n```\n\n## 创建和使用函数库\n\
    \n前面的示例假设刷新一切顺利，并且 OEM 在一小时后恢复监控。当然，即使没有 `end_blackout.sh`，停用也会在启动后六小时结束。为什么不在这项工作完成后立即关闭停用呢？\n\
    \n将此活动转换为中心库中的 Shell 函数，允许你在 `restore_training.sh` 脚本内部启动和停止停用，如下所示：\n\n```shell\n\
    #!/bin/sh\n# =====================================================\n#  File: \
    \       restore_training.sh\n#  Purpose:     Refresh database from a cold backup\
    \ copy of datafiles\n#  Parameters:  Database name as ORASID\n# =====================================================\n\
    # Source the OEM function library\n. /script/oem/emcli_functions.lib\n\nexport\
    \ BO_NAME=database_refresh_${ORASID}\n\nCreateBlackout\n\n< Existing your in-house\
    \ database restoration commands >\n\nEndBlackout\n```\n\n只需要一个 cron 条目（或 OEM 计划作业），因为你已将所有三个脚本的工作包装在一个包装器中。\n\
    \n此示例中引用的函数库包含函数 `CreateBlackout` 和 `EndBlackout`。函数库只是一个不可执行的文本文件，存储在每台服务器的中心位置，最好通过\
    \ NFS 挂载或类似的共享文件系统。\n\n此代码段仅包含与此示例相关的两个函数。[第 8 章](../Text/9781484202395_Ch08.xhtml)\
    \ 包含一个完整函数库的示例。你的生产 CLI 函数库可以包含许多其他函数，除了这两个。请注意，函数的内容与我们在单独的 Shell 脚本中使用的代码相同。它们只是被记录为函数。\n\
    \n```shell\n# =====================================================\n#  File:\
    \     emcli_functions.lib\n#  Purpose:  Shared function library for EM CLI scripts\n\
    #  Note :    Source this library to load its contents into memory\n# =====================================================\n\
    function CreateBlackout {\necho \"\\n\\nCreating blackout named '${BO_NAME}' ...\\\
    n\"\n```"
  raw: "You may pass anything as the name of a blackout. The blackout name is applied\
    \ when you create the blackout, but it’s also used when it’s time to stop and\
    \ delete the blackout. It’s always a good practice to use a descriptive name like\
    \ `scripted_blackout_$SID` or a similar, consistent naming standard. As we work\
    \ through the examples, you’ll begin to see how consistency affects your solution’s\
    \ design.\n\nAdd Targets Argument\n\nTargets must be identified by target name\
    \ and target type. For example:\n\n*   oracla:oracle_database\n*   demohost:host\n\
    *   lsnroracla:oracle_listener\n\nSchedule Argument\n\nEach schedule argument\
    \ accepts two required and several optional values at the command line, similar\
    \ to the flexibility found in the console:\n\n```\n frequency:once\n\nrequires\
    \ => duration or end_time\noptional => start_time, tzinfo, tzoffset\n\nfrequency:interval\n\
    \nrequires => duration, repeat\n\noptional => start_time, end_time, tzinfo, tzoffset\n\
    \nfrequency:weekly\nrequires => duration, days\noptional => start_time, end_time,\
    \ tzinfo, tzoffset\nfrequency:monthly\nrequires => duration, days\noptional =>\
    \ start_time, end_time, tzinfo, tzoffset\nfrequency:yearly\nrequires => duration,\
    \ days, months\noptional => start_time, end_time, tzinfo, tzoffset\n```\n\nA Robust\
    \ Solution for Scheduled Blackouts\n\nThe author’s environment contains a handful\
    \ of application training databases that get refreshed from a cold backup nightly.\
    \ Of course, as soon as these targets were added to OEM he started getting pager\
    \ notifications at night caused by these planned outages. You can imagine his\
    \ reaction.\n\n*   The simplest solution is to blackout these targets all night\
    \ on a schedule in the console.\n*   What if you need to run this refresh during\
    \ the day?\n*   Do you really want these targets to be unmonitored overnight?\n\
    *   What if the refresh failed? Trainers are not typically patient customers,\
    \ particularly with a roomful of idle trainees waiting for their lab.\n\nHere’s\
    \ a solution that involves shell functions, EM CLI, and their related run-time\
    \ scripts. We’ll start by taking a look at how the process would typically be\
    \ done without shell functions, and then we will convert the script into portable,\
    \ scalable functions.\n\nCreate and Stop Blackouts Using Shell Scripts\n\nBlackouts\
    \ can be created through a series of CLI verbs to perform the following steps\
    \ to test, execute, and then verify the blackout status.\n\n1.  Determine whether\
    \ the target is already under blackout.\n2.  If a blackout already exists, stop\
    \ and delete it (to get the full duration of your new blackout).\n3.  Create and\
    \ start a new blackout.\n4.  Verify that the blackout is started by echoing its\
    \ values to the screen and also to the log file.\n\nThese steps are illustrated\
    \ in this simplified script. Your real script would test whether the database\
    \ name was passed as the `$1` value at the command line and would then prompt\
    \ or fail based on run-time conditions. For instance, if the script is being executed\
    \ by a live user, it should prompt for the database name, otherwise it will fail\
    \ and echo the cause to the logfile.\n\n```\n#!/bin/ti\n# =====================================================\n\
    #  File:        create_blackout.sh\n#  Purpose:     Create and initiate an OEM\
    \ blackout\n#  Parameters:  Blackout name as BO_NAME\n# =====================================================\n\
    export BO_NAME=${1}_scripted_blackout\n\necho  \"\\n\\nCreating blackout named\
    \ '${BO_NAME}' ...\\n\"\n\nif [ `emcli get_blackouts | grep ${BO_NAME} | wc -l`\
    \ -gt 0 ]; then\n        $ECHO \"\\n\\nFound an existing blackout named ${BO_NAME}\"\
    \n        $ECHO \"That blackout will be stopped and deleted prior to starting\
    \ the new one\\n\\n\"\n        emcli stop_blackout -name=\"${BO_NAME}\"\n    \
    \    emcli delete_blackout -name=\"${BO_NAME}\"\nfi\n\nemcli create_blackout\n\
    -name=\"${BO_NAME}\"\n        -add_targets=\"${thisTARGET}:oracle_database\"\n\
    -schedule=\"duration::360\"\n-reason=\"Scripted blackout for maintenance or refresh\"\
    \n\nsleep 5\n\necho \"\\n\\nGetting blackout information for '${BO_NAME}' ...\\\
    n\\n\"\nemcli get_blackout_details -name=\"${BO_NAME}\"\n```\n\nThere are several\
    \ things to notice in this short script:\n\n*   Each blackout name must be unique,\
    \ so this script requires some portion of the name to be passed at the command\
    \ line. In this example we pass the SID.\n*   User communication is important\
    \ anytime, so be complete and be concise. Your echo’s statements are useful at\
    \ run-time and essential in the log file.\n*   This planned blackout will run\
    \ six hours (`duration:360`) maximum, so you want to delete an existing blackout\
    \ of the same name to get all six hours.\n*   Notice that the `stop_blackout`\
    \ and `delete_blackout` verbs take the blackout name as their only input value.\
    \ You must stop a blackout before you can delete it.\n*   The test for blackout\
    \ status is important for the run-time log file.\n\nIn practice, this appears\
    \ as a series of wrap-around entries in the crontab, like this:\n\n```\n25 19\
    \ * * * /scripts/oem/create_blackout.sh gold\n30 19 * * * /scripts/refresh/restore_training.sh\
    \ gold\n30 20 * * * /scripts/oem/end_blackout.sh gold\n```\n\nWhen you start a\
    \ blackout you should also plan on stopping it. This side of the scripted pair\
    \ is simpler, of course, because there is a lot less to do:\n\n```\n#!/bin/sh\n\
    # =====================================================\n#  File:        end_blackout.sh\n\
    #  Purpose:     End an OEM blackout\n#  Parameters:  Blackout name as BO_NAME\n\
    # =====================================================\nexport BO_NAME=${1}_scripted_blackout\n\
    echo  \"\\n\\nStopping blackout named '${BO_NAME}' ...\\n\"\nif [ `emcli get_blackouts\
    \ | grep ${BO_NAME} | wc -l` -gt 0 ]; then\n        $ECHO \"\\n\\nFound an existing\
    \ blackout named ${BO_NAME}\"\n        emcli stop_blackout -name=\"${BO_NAME}\"\
    \n        emcli delete_blackout -name=\"${BO_NAME}\"\nfi\n```\n\nCreating and\
    \ Using a Function Library\n\nThe previous example assumes that everything goes\
    \ well with the refresh and that OEM resumes monitoring after an hour. Of course,\
    \ the blackout will end six hours after it starts, even without `end_blackout.sh`.\
    \ Why not turn off the blackout right after the work is done?\n\nConverting this\
    \ activity to shell functions in a central library allows you to start and stop\
    \ the blackout inside the `restore_training.sh` script, as shown here:\n\n```\n\
    #!/bin/sh\n# =====================================================\n#  File: \
    \       restore_training.sh\n#  Purpose:     Refresh database from a cold backup\
    \ copy of datafiles\n#  Parameters:  Database name as ORASID\n# =====================================================\n\
    # Source the OEM function library\n. /script/oem/emcli_functions.lib\n\nexport\
    \ BO_NAME=database_refresh_${ORASID}\n\nCreateBlackout\n\n< Existing your in-house\
    \ database restoration commands >\n\nEndBlackout\n```\n\nOnly one cron entry (or\
    \ OEM scheduled job) is required because you’ve wrapped the work of all three\
    \ scripts into one wrapper.\n\nThe function library sourced in this example contains\
    \ the functions `CreateBlackout` and `EndBlackout`. The function library is simply\
    \ a non-executable text file stored in a central location on each server, preferably\
    \ through NFS mounts or a similar shared file system.\n\nThis snippet only contains\
    \ the two functions relevant to this example. [Chapter 8](../Text/9781484202395_Ch08.xhtml)\
    \ contains an example of a complete function library. Your production CLI function\
    \ library can contain many others, in addition to these two. Notice that the contents\
    \ of the functions are identical to the code we used in the separate shell scripts.\
    \ They’re just recorded as functions.\n\n```\n# =====================================================\n\
    #  File:     emcli_functions.lib\n#  Purpose:  Shared function library for EM\
    \ CLI scripts\n#  Note :    Source this library to load its contents into memory\n\
    # =====================================================\nfunction CreateBlackout\
    \ {\necho \"\\n\\nCreating blackout named '${BO_NAME}' ...\\n\""
  trans: "\n# 计划停用（Blackout）\n\n你可以将任何内容用作停用（blackout）的名称。停用名称在创建时被应用，同时在停止和删除停用时也会用到。始终使用描述性名称是良好的实践，例如\
    \ `scripted_blackout_$SID` 或类似的、一致的命名标准。随着我们处理这些示例，你将开始看到一致性如何影响解决方案的设计。\n\n##\
    \ 添加目标参数\n\n目标必须通过目标名称和目标类型来标识。例如：\n\n- `oracla:oracle_database`\n- `demohost:host`\n\
    - `lsnroracla:oracle_listener`\n\n## 计划参数\n\n每个计划参数在命令行接受两个必填值和几个可选值，类似于控制台中的灵活性：\n\
    \n```\nfrequency:once\nrequires => duration or end_time\noptional => start_time,\
    \ tzinfo, tzoffset\n\nfrequency:interval\nrequires => duration, repeat\noptional\
    \ => start_time, end_time, tzinfo, tzoffset\n\nfrequency:weekly\nrequires => duration,\
    \ days\noptional => start_time, end_time, tzinfo, tzoffset\n\nfrequency:monthly\n\
    requires => duration, days\noptional => start_time, end_time, tzinfo, tzoffset\n\
    \nfrequency:yearly\nrequires => duration, days, months\noptional => start_time,\
    \ end_time, tzinfo, tzoffset\n```\n\n## 计划停用的一个健壮解决方案\n\n作者的环境中包含一些应用程序培训数据库，这些数据库每晚都会从冷备份中刷新。当然，一旦这些目标被添加到\
    \ OEM，他就开始在夜间收到由这些计划中断引起的寻呼通知。你可以想象他的反应。\n\n- 最简单的解决方案是在控制台中按计划将这些目标整夜停用。\n- 如果需要在白天运行此刷新怎么办？\n\
    - 你真的希望这些目标在夜间不被监控吗？\n- 如果刷新失败怎么办？培训师通常不是耐心的客户，尤其是一房间闲置的学员正在等待他们的实验。\n\n这里有一个涉及\
    \ Shell 函数、EM CLI 及其相关运行时脚本的解决方案。我们将首先看看在不使用 Shell 函数的情况下通常如何完成此过程，然后我们将把脚本转换为可移植、可扩展的函数。\n\
    \n## 使用 Shell 脚本创建和停止停用\n\n可以通过一系列 CLI 动词创建停用，以执行以下步骤来测试、执行然后验证停用状态：\n\n1.  确定目标是否已处于停用状态。\n\
    2.  如果停用已存在，则停止并删除它（以便为你的新停用获得完整持续时间）。\n3.  创建并启动新的停用。\n4.  通过将其值回显到屏幕以及日志文件中来验证停用是否已启动。\n\
    \n这些步骤在此简化脚本中进行了说明。你的真实脚本应测试数据库名称是否作为 `$1` 值在命令行传递，然后根据运行时条件提示或失败。例如，如果脚本是由活动用户执行的，它应提示输入数据库名称，否则它将失败并将原因回显到日志文件。\n\
    \n```shell\n#!/bin/ti\n# =====================================================\n\
    #  File:        create_blackout.sh\n#  Purpose:     Create and initiate an OEM\
    \ blackout\n#  Parameters:  Blackout name as BO_NAME\n# =====================================================\n\
    export BO_NAME=${1}_scripted_blackout\n\necho  \"\\n\\nCreating blackout named\
    \ '${BO_NAME}' ...\\n\"\n\nif [ `emcli get_blackouts | grep ${BO_NAME} | wc -l`\
    \ -gt 0 ]; then\n        $ECHO \"\\n\\nFound an existing blackout named ${BO_NAME}\"\
    \n        $ECHO \"That blackout will be stopped and deleted prior to starting\
    \ the new one\\n\\n\"\n        emcli stop_blackout -name=\"${BO_NAME}\"\n    \
    \    emcli delete_blackout -name=\"${BO_NAME}\"\nfi\n\nemcli create_blackout\n\
    -name=\"${BO_NAME}\"\n        -add_targets=\"${thisTARGET}:oracle_database\"\n\
    -schedule=\"duration::360\"\n-reason=\"Scripted blackout for maintenance or refresh\"\
    \n\nsleep 5\n\necho \"\\n\\nGetting blackout information for '${BO_NAME}' ...\\\
    n\\n\"\nemcli get_blackout_details -name=\"${BO_NAME}\"\n```\n\n在这个简短的脚本中，有几件事需要注意：\n\
    \n- 每个停用名称必须是唯一的，因此此脚本要求部分名称在命令行传递。在此示例中，我们传递了 SID。\n- 用户沟通在任何时候都很重要，因此要完整且简洁。你的\
    \ `echo` 语句在运行时很有用，在日志文件中也是必不可少的。\n- 此计划停用最多运行六小时（`duration:360`），因此你需要删除同名的现有停用以获得完整的六小时。\n\
