    \n清单 6-11. `update Props.py` 创建了 `updateProps( )` 类\n\nimport emcli\nimport re\n\
    import operator\n\nclass updateProps():\n    def __init__(self, agentfilter='.*',\
    \ typefilter='.*',\n                 namefilter='.*', propdict={}):\n        self.targs\
    \ = []\n        self.reloadtargs = True\n        self.props(propdict)\n      \
    \  self.__loadtargobjects()\n        self.filt(agentfilter=agentfilter, typefilter=typefilter,\n\
    \                  namefilter=namefilter)\n    def __loadtargobjects(self):\n\
    \        if self.reloadtargs == True:\n            self.reloadtargs = False\n\
    \            self.fulltargs = \\\n              emcli.list(resource='Targets').out()['data']\n\
    \            self.targprops = \\\n              emcli.list(resource='TargetProperties'\n\
    \                        ).out()['data']\n    def props(self, propdict):\n   \
    \     assert isinstance(propdict, dict), \\\n               'propdict parameter\
    \ must be ' + \\\n               'a dictionary of ' + \\\n              '{\"property_name\"\
    :\"property_value\"}'\n        self.propdict = propdict\n    def filt(self, agentfilter='.*',\
    \ typefilter='.*',\n             namefilter='.*',\n             sort=('TARGET_TYPE','TARGET_NAME'),\
    \ show=False):\n        self.targs = []\n        __agentcompfilt = re.compile(agentfilter)\n\
    \        __typecompfilt = re.compile(typefilter)\n        __namecompfilt = re.compile(namefilter)\n\
    \        self.__loadtargobjects()\n        for __inttarg in self.fulltargs:\n\
    \            if __typecompfilt.search(__inttarg['TARGET_TYPE']) \\\n         \
    \      and __namecompfilt.search(\n                   __inttarg['TARGET_NAME'])\
    \ \\\n               and (__inttarg['EMD_URL'] == None or \\\n               __agentcompfilt.search(__inttarg['EMD_URL'])):\n\
    \                self.targs.append(__inttarg)\n        __myoperator = operator\n\
    \        for __myop in sort:\n            __myoperator = operator.itemgetter(__myop)\n\
    \        self.targssort = sorted(self.targs, key=__myoperator)\n        if show\
    \ == True:\n            self.show()\n    def show(self):\n        print('%-5s%-40s%s'\
    \ % (\n              ' ', 'TARGET_TYPE'.ljust(40, '.'),\n              'TARGET_NAME'))\n\
    \        print('%-15s%-30s%s\\n%s\\n' % (\n              ' ', 'PROPERTY_NAME'.ljust(30,\
    \ '.'),\n              'PROPERTY_VALUE', '=' * 80))\n        for __inttarg in\
    \ self.targssort:\n            print('%-5s%-40s%s' % (\n                  ' ',\
    \ __inttarg['TARGET_TYPE'].ljust(40, '.'),\n                  __inttarg['TARGET_NAME']))\n\
    \            self.__showprops(__inttarg['TARGET_GUID'])\n            print('')\n\
    \    def __showprops(self, guid):\n        self.__loadtargobjects()\n        for\
    \ __inttargprops in self.targprops:\n            __intpropname = \\\n        \
    \      __inttargprops['PROPERTY_NAME'].split('_')\n            if __inttargprops['TARGET_GUID']\
    \ == guid and \\\n               __intpropname[0:2] == ['orcl', 'gtp']:\n    \
    \            print('%-15s%-30s%s' %\n                      (' ', ' '.join(__intpropname[2:]).ljust(\n\
    \                       30, '.'),\n                       __inttargprops['PROPERTY_VALUE']))\n\
    \    def setprops(self, show=False):\n        assert len(self.propdict) > 0, \\\
    \n               'The propdict parameter must contain ' + \\\n               'at\
    \ least one property. Use the ' + \\\n               'props() function to modify.'\n\
    \        self.reloadtargs = True\n        __delim = '@#&@#&&'\n        __subseparator\
    \ = 'property_records=' + __delim\n        for __inttarg in self.targs:\n    \
    \        for __propkey, __propvalue \\\n                in self.propdict.items():\n\
    \                __property_records = __inttarg['TARGET_NAME'] + \\\n        \
    \          __delim + __inttarg['TARGET_TYPE'] + \\\n                  __delim\
    \ + __propkey + __delim + __propvalue\n                print('Target: ' + __inttarg['TARGET_NAME']\
    \ +\n                      ' (' + __inttarg['TARGET_TYPE'] +\n               \
    \       ')\\n\\tProperty: '\n                      + __propkey + '\\n\\tValue:\
    \ ' +\n                      __propvalue + '\\n')\n                emcli.set_target_property_value(\n\
    \                  subseparator=__subseparator,\n                  property_records=__property_records)\n\
    \        if show == True:\n            self.show()\n"
- fmt: "## 使用 updateProps 类更新目标属性\n\n一旦有了包含代码的文件，我们就可以使用此代码来更新 Enterprise Manager\
    \ 目标的属性。启动一个 EM CLI 会话并登录到 OMS。\n\n### 使用 updateProps() 类\n\n[Listing 6-12](#9781484202395_Ch06.xhtml#list12)\
    \ 展示了如何使用 `updateProps()` 类来更新一些 EM CLI 目标的属性。该类所做的事情与上一节中的命令完全相同，但你会注意到所需的代码量要少得多。\n\
    \n**Listing 6-12**：导入并使用 **updateProps()** 类来更改目标属性\n\n```\nemcli>import updateProps\n\
    emcli>myinst = updateProps.updateProps()\nemcli>myinst.props({'LifeCycle Status':'Development'})\n\
    emcli>myinst.filt(namefilter='^em12cr3.example.com$', typefilter='host')\nemcli>myinst.show()\n\
    \     TARGET_TYPE.............................TARGET_NAME\n               PROPERTY_NAME.................PROPERTY_VALUE\n\
    ================================================================================\n\
    \nhost....................................em12cr3.example.com\n              \
    \ target version................6.4.0.0.0\n               os............................Linux\n\
    \               platform......................x86_64\n\nemcli>myinst.setprops(show=True)\n\
    Target: em12cr3.example.com (host)\n        Property: LifeCycle Status\n     \
    \   Value: Development\n\nTARGET_TYPE.............................TARGET_NAME\n\
    \               PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
    \nhost....................................em12cr3.example.com\n              \
    \ target version................6.4.0.0.0\n               os............................Linux\n\
    \               platform......................x86_64\n               lifecycle\
    \ status..............Development\n```\n\n[Listing 6-12](#9781484202395_Ch06.xhtml#list12)\
    \ 中的示例仅更新了一个目标的一个属性。`updateProps()` 类能够为任意数量的目标更新任意数量的属性。[Listing 6-13](#9781484202395_Ch06.xhtml#list13)\
    \ 扩展了之前的示例，更新了同一个目标的更多属性。\n\n**Listing 6-13**：扩展要更新的属性\n\n```\nemcli>myinst.props({'LifeCycle\
    \ Status':'Development', 'Location':'COLO', 'Comment':'Test EM'})\nemcli>myinst.setprops(show=True)\n\
    Target: em12cr3.example.com (host)\n        Property: Location\n        Value:\
    \ COLO\n\nTarget: em12cr3.example.com (host)\n        Property: LifeCycle Status\n\
    \        Value: Development\n\nTarget: em12cr3.example.com (host)\n        Property:\
    \ Comment\n        Value: Test EM\n\nTARGET_TYPE.............................TARGET_NAME\n\
    \               PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
    \nhost....................................em12cr3.example.com\n              \
    \ target version................6.4.0.0.0\n               os............................Linux\n\
    \               platform......................x86_64\n               location......................COLO\n\
    \               comment.......................Test EM\n               lifecycle\
    \ status..............Development\n```\n\n我们没有更改目标过滤器。我们对 `myinst` 实例所做的唯一更改是要更新的属性。`myinst.props()`\
    \ 函数更改了要应用于目标的属性。输出显示，同一个目标的三个不同属性被更新了。\n\n假设我们希望将相同的三个属性应用于更多目标，但我们只想将它们应用于 Enterprise\
    \ Manager OMS 服务器的主机和代理目标。我们将保持属性不变，但会更新目标过滤器以包含额外的目标类型 `oracle_emd`，如 [Listing\
    \ 6-14](#9781484202395_Ch06.xhtml#list14) 所示。\n\n**Listing 6-14**：更改目标类型以包含代理目标\n\
    \n```\nemcli>myinst.filt(namefilter='^em12cr3.example.com.*$', typefilter='host|oracle_emd')\n\
    emcli>myinst.show()\n     TARGET_TYPE.............................TARGET_NAME\n\
    \               PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
    \nhost....................................em12cr3.example.com\n              \
    \ target version................6.4.0.0.0\n               os............................Linux\n\
    \               platform......................x86_64\n               location......................COLO\n\
    \               comment.......................Test EM\n               lifecycle\
    \ status..............Development\n\noracle_emd..............................em12cr3.example.com:3872\n\
    \               os............................Linux\n               platform......................x86_64\n\
    \               target version................12.1.0.3.0\nemcli>myinst.setprops(show=True)\n\
    Target: em12cr3.example.com (host)\n        Property: Location\n        Value:\
    \ COLO\n\nTarget: em12cr3.example.com (host)\n        Property: LifeCycle Status\n\
    \        Value: Development\n\nTarget: em12cr3.example.com (host)\n        Property:\
    \ Comment\n        Value: Test EM\n\nTarget: em12cr3.example.com:3872 (oracle_emd)\n\
    \        Property: Location\n        Value: COLO\n\nTarget: em12cr3.example.com:3872\
    \ (oracle_emd)\n        Property: LifeCycle Status\n        Value: Development\n\
    \nTarget: em12cr3.example.com:3872 (oracle_emd)\n        Property: Comment\n \
    \       Value: Test EM\n\nTARGET_TYPE.............................TARGET_NAME\n\
    \               PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
    \nhost....................................em12cr3.example.com\n              \
    \ target version................6.4.0.0.0\n               os............................Linux\n\
    \               platform......................x86_64\n               location......................COLO\n\
    \               comment.......................Test EM\n               lifecycle\
    \ status..............Development\n\noracle_emd..............................em12cr3.example.com:3872\n\
    \               os............................Linux\n               platform......................x86_64\n\
    \               lifecycle status..............Development\n               location......................COLO\n\
    \               comment.......................Test EM\n               target version................12.1.0.3.0\n\
    ```\n\n`updateProps()` 的功能非常广泛，可以如你所愿地精细或宽泛。关于如何使用它的更详细描述可以在[第 8 章](../Text/9781484202395_Ch08.xhtml)中找到。充分利用\
    \ `updateProps()` 类的最佳方式是理解代码本身。\n\n### 理解代码\n\n现在我们已经看到了代码本身及其工作原理概述，我们将分析代码以了解幕后发生的事情。理解代码不仅有助于你利用其所有功能，还能让你根据自己的喜好和需求对其进行定制。\n\
    \n首先要注意的是，类声明之后的所有内容都至少缩进四个空格。这意味着类声明之后的所有代码都是类的一部分。类内部是函数声明，每个函数下方是属于该函数的代码。让我们将其分解成更小的部分，以便准确理解代码在做什么以及为什么使用类提供了显著的优势。"
  raw: "Once there is a file containing the code, we can use this code to update the\
    \ properties of Enterprise Manager targets. Start a session of EM CLI and establish\
    \ a login to the OMS.\n\nUsing the updateProps( ) Class\n\n[Listing 6-12](#9781484202395_Ch06.xhtml#list12)\
    \ shows an example of how to use the `updateProps()` class to update the properties\
    \ of some EM CLI targets. The class is doing exactly what the commands did in\
    \ the previous section, but you will notice how much less code is required.\n\n\
    [Listing 6-12](#9781484202395_Ch06.xhtml#_list12). Import and use the **updateProps(\
    \ )**  class to change target properties\n\n```\nemcli>import updateProps\nemcli>myinst\
    \ = updateProps.updateProps()\nemcli>myinst.props({'LifeCycle Status':'Development'})\n\
    emcli>myinst.filt(namefilter='^em12cr3.example.com$', typefilter='host')\nemcli>myinst.show()\n\
    \     TARGET_TYPE.............................TARGET_NAME\n               PROPERTY_NAME.................PROPERTY_VALUE\n\
    ================================================================================\n\
    \nhost....................................em12cr3.example.com\n              \
    \ target version................6.4.0.0.0\n               os............................Linux\n\
    \               platform......................x86_64\n\nemcli>myinst.setprops(show=True)\n\
    Target: em12cr3.example.com (host)\n        Property: LifeCycle Status\n     \
    \   Value: Development\n\nTARGET_TYPE.............................TARGET_NAME\n\
    \               PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
    \nhost....................................em12cr3.example.com\n              \
    \ target version................6.4.0.0.0\n               os............................Linux\n\
    \               platform......................x86_64\n               lifecycle\
    \ status..............Development\n```\n\nThe example in [Listing 6-12](#9781484202395_Ch06.xhtml#list12)\
    \ updated one property for one target. The `updateProps()` class is capable of\
    \ updating any number of properties for any number of targets. [Listing 6-13](#9781484202395_Ch06.xhtml#list13)\
    \ expands on the previous example by updating additional properties of the same\
    \ target.\n\n[Listing 6-13](#9781484202395_Ch06.xhtml#_list13). Expand the properties\
    \ to be updated\n\n```\nemcli>myinst.props({'LifeCycle Status':'Development',\
    \ 'Location':'COLO', 'Comment':'Test EM'})\nemcli>myinst.setprops(show=True)\n\
    Target: em12cr3.example.com (host)\n        Property: Location\n        Value:\
    \ COLO\n\nTarget: em12cr3.example.com (host)\n        Property: LifeCycle Status\n\
    \        Value: Development\n\nTarget: em12cr3.example.com (host)\n        Property:\
    \ Comment\n        Value: Test EM\n\nTARGET_TYPE.............................TARGET_NAME\n\
    \               PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
    \nhost....................................em12cr3.example.com\n              \
    \ target version................6.4.0.0.0\n               os............................Linux\n\
    \               platform......................x86_64\n               location......................COLO\n\
    \               comment.......................Test EM\n               lifecycle\
    \ status..............Development\n```\n\nWe did not change the target filter.\
    \ The only things we changed about the `myinst` instance were the properties to\
    \ be updated. The `myinst.props()` function changed the properties to be applied\
    \ to the targets. The output showed that three different properties for the same\
    \ target were updated.\n\nLet’s assume that we want the same three properties\
    \ applied to additional targets but the only targets we want them applied to are\
    \ the host and agent targets of the Enterprise Manager OMS server. We will leave\
    \ the properties alone, but we’ll update the target filter to include the additional\
    \ target type of  `oracle_emd`, as shown in [Listing 6-14](#9781484202395_Ch06.xhtml#list14).\n\
    \n[Listing 6-14](#9781484202395_Ch06.xhtml#_list14). Change the target type to\
    \ include the agent target\n\n```\nemcli>myinst.filt(namefilter='^em12cr3.example.com.*$',\
    \ typefilter='host|oracle_emd')\nemcli>myinst.show()\n     TARGET_TYPE.............................TARGET_NAME\n\
    \               PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
    \nhost....................................em12cr3.example.com\n              \
    \ target version................6.4.0.0.0\n               os............................Linux\n\
    \               platform......................x86_64\n               location......................COLO\n\
    \               comment.......................Test EM\n               lifecycle\
    \ status..............Development\n\noracle_emd..............................em12cr3.example.com:3872\n\
    \               os............................Linux\n               platform......................x86_64\n\
    \               target version................12.1.0.3.0\nemcli>myinst.setprops(show=True)\n\
    Target: em12cr3.example.com (host)\n        Property: Location\n        Value:\
    \ COLO\n\nTarget: em12cr3.example.com (host)\n        Property: LifeCycle Status\n\
    \        Value: Development\n\nTarget: em12cr3.example.com (host)\n        Property:\
    \ Comment\n        Value: Test EM\n\nTarget: em12cr3.example.com:3872 (oracle_emd)\n\
    \        Property: Location\n        Value: COLO\n\nTarget: em12cr3.example.com:3872\
    \ (oracle_emd)\n        Property: LifeCycle Status\n        Value: Development\n\
    \nTarget: em12cr3.example.com:3872 (oracle_emd)\n        Property: Comment\n \
    \       Value: Test EM\n\nTARGET_TYPE.............................TARGET_NAME\n\
    \               PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
    \nhost....................................em12cr3.example.com\n              \
    \ target version................6.4.0.0.0\n               os............................Linux\n\
    \               platform......................x86_64\n               location......................COLO\n\
    \               comment.......................Test EM\n               lifecycle\
    \ status..............Development\n\noracle_emd..............................em12cr3.example.com:3872\n\
    \               os............................Linux\n               platform......................x86_64\n\
    \               lifecycle status..............Development\n               location......................COLO\n\
    \               comment.......................Test EM\n               target version................12.1.0.3.0\n\
    ```\n\nThe functionality of the `updateProps()` is extensive and can be as granular\
    \ or as broad as you would like. A more detailed description of how to use it\
    \ can be found in [Chapter 8](../Text/9781484202395_Ch08.xhtml). The best way\
    \ to fully exploit the `updateProps()` class is to understand the code itself.\n\
    \nUnderstanding the Code\n\nNow that we’ve seen the code itself as well as an\
    \ overview of how it works, we’ll analyze the code to understand what is going\
    \ on behind the scenes. Understanding the code will not only help you exploit\
    \ all of its functionality, it will also allow you to customize it to your tastes\
    \ and needs.\n\nThe first thing to notice is that everything after the class declaration\
    \ is indented by at least four spaces. This means that all of the code after the\
    \ class declaration is part of the class. Within the class are function declarations,\
    \ and beneath each function is the code that belongs to that function. Let’s break\
    \ this down into smaller pieces so as to understand what exactly the code is doing\
    \ and why using a class offers significant advantages."
