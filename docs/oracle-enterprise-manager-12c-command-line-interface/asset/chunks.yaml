  trans: "\n# `__init__()` 函数\n\n清单 6-15 中展示的第一个函数名为 `__init__()`。这是一个保留的函数名，在类被调用时会自动执行。`self`\
    \ 这个词是对从类创建的实例的引用。当实例变量或对象（以 `self.` 开头）被创建时，它是一个被分配给该实例并在该实例的生命周期内存在的变量或对象。当\
    \ `myinst` 实例从 `updateProps()` 创建时，列表对象 `targs` 和布尔变量 `reloadtargs` 也随之被创建。在大多数情况下，实例变量和对象可以被视为实例的一部分。\n\
    \n清单 6-15. `__init__()` 是 `updateProps()` 类的初始化函数\n\n```python\ndef __init__(self,\
    \ agentfilter='.*', typefilter='.*',\n             namefilter='.*', propdict={}):\n\
    \    self.targs = []\n    self.reloadtargs = True\n    self.props(propdict)\n\
    \    self.__loadtargobjects()\n    self.filt(agentfilter=agentfilter, typefilter=typefilter,\n\
    \              namefilter=namefilter)\n```\n\n在清单 6-16 中，我们通过创建类的实例（执行类）并将该执行结果赋值给一个变量，来创建\
    \ `updateProps()` 类的一个实例对象。然后，我们可以打印出 `reloadtargs` 实例变量。请注意，没有括号的词是 `class`，而带括号的同一个词是一个实例。\n\
    \n清单 6-16. 从类创建一个实例\n\n```python\nemcli>import updateProps\nemcli>myinst = updateProps.updateProps()\n\
    emcli>print(myinst.reloadtargs)\nFalse\nemcli>type(updateProps.updateProps)\n\
    <type 'classobj'>\nemcli>type(updateProps.updateProps())\n<type 'instance'>\n\
    emcli>type(myinst)\n<type 'instance'>\n```\n\n`__init__` 函数的最后四行调用了 `props`、`__loadtargobjects`\
    \ 和 `filt` 函数。`props` 函数用于设置属性键和值，`__loadtargobjects` 函数用于缓存目标信息，而 `filt` 函数允许我们过滤分配给该实例的目标。这些函数都在类中进一步定义。创建实例会在处理命令之前解析整个类，因此类内函数的顺序并不重要。\n\
    \n# `__loadtargobjects()` 函数\n\n查询目标信息是一个相当耗时的过程，可能需要一到二十秒的时间来运行。如清单 6-17 所示，`__loadtargobjects`\
    \ 函数是一个性能调优函数，它使类的执行更高效。它仅通过被 `__init__` 函数调用，在创建实例时查询和加载目标信息，并且仅当 `self.reloadtargs`\
    \ 设置为 `True` 时才这样做。\n\n清单 6-17. `updateProps()` 类的 `__loadtargobjects()` 在必要时重新加载\
    \ EM 目标\n\n```python\ndef __loadtargobjects(self):\n    if self.reloadtargs ==\
    \ True:\n        self.reloadtargs = False\n        self.fulltargs = \\\n     \
    \     emcli.list(resource='Targets').out()['data']\n        self.targprops = \\\
    \n          emcli.list(resource='TargetProperties'\n                    ).out()['data']\n\
    ```\n\n# `props()` 函数\n\n清单 6-18 中展示的 `props()` 函数设置或修改 `propdict` 变量，该变量保存着用于设置目标属性的键值字典。这被转换为一个函数，而不是直接设置参数，主要是因为它可以被多次调用，并且包含了用于错误检查的\
    \ `assert` 语句。\n\n清单 6-18. `updateProps()` 类的 `props()` 函数更新 `propdict` 属性字典\n\
    \n```python\ndef props(self, propdict):\n    assert isinstance(propdict, dict),\
    \ \\\n           'propdict parameter must be ' + \\\n           'a dictionary\
    \ of ' + \\\n           '{\"property_name\":\"property_value\"}'\n    self.propdict\
    \ = propdict\n```\n\n# `filt()` 函数\n\n清单 6-19 展示了 `filt()` 函数，它定义了将为此实例应用已定义属性的目标范围。即使在过滤器应用之后，也可以对其进行查询或更改。前三个参数（`agentfilter`、`typefilter`\
    \ 和 `namefilter`）被编译为正则表达式，以便为此实例包含或排除目标。如果在调用 `filt()` 函数时未定义这些参数，则它们被隐式定义为包含所有目标。`sort`\
    \ 参数定义了如何对过滤后的目标进行排序，最后，`show` 参数决定了是否将过滤后的目标列表输出打印到屏幕。\n\n清单 6-19. `updateProps()`\
    \ 类的 `filt()` 函数创建并管理过滤后的目标列表\n\n```python\ndef filt(self, agentfilter='.*', typefilter='.*',\n\
    \         namefilter='.*',\n         sort=('TARGET_TYPE','TARGET_NAME'), show=False):\n\
    \    self.targs = []\n    __agentcompfilt = re.compile(agentfilter)\n    __typecompfilt\
    \ = re.compile(typefilter)\n    __namecompfilt = re.compile(namefilter)\n    self.__loadtargobjects()\n\
    \    for __inttarg in self.fulltargs:\n        if __typecompfilt.search(__inttarg['TARGET_TYPE'])\
    \ \\\n           and __namecompfilt.search(\n               __inttarg['TARGET_NAME'])\
    \ \\\n           and (__inttarg['EMD_URL'] == None or \\\n           __agentcompfilt.search(__inttarg['EMD_URL'])):\n\
    \            self.targs.append(__inttarg)\n    __myoperator = operator\n    for\
    \ __myop in sort:\n        __myoperator = operator.itemgetter(__myop)\n    self.targssort\
    \ = sorted(self.targs, key=__myoperator)\n    if show == True:\n        self.show()\n\
    ```\n\n`self.targs = []` 定义或清空一个列表用于存储过滤后的目标。接下来的三行为前三个过滤参数编译正则表达式。`self.__loadtargobjects()`\
    \ 调用 `__loadtargobjects()` 函数重新加载完整的目标列表。`for __inttarg in self.fulltargs:` 循环及其嵌套的\
    \ `if` 语句根据过滤参数创建过滤后的目标列表。`__myoperator = operator` 及其后的三行定义了排序键并对过滤后的目标列表进行排序。最后，可以将过滤并排序后的列表打印到屏幕。\n\
    \n除非为 `myinst` 实例定义的目标属性应应用于所有目标，否则需要调用 `filt` 函数。当实例创建时，目标列表也随之创建，并包含 Enterprise\
    \ Manager 中定义的所有目标。`targs` 实例列表对象显示了当前为该实例定义的目标数量，如清单 6-20 所示。\n\n清单 6-20. 当创建\
    \ `updateProps()` 的实例时，它包含所有目标\n\n```python\nemcli>len(myinst.targs)\n\n```\n\n\
    如果修改此实例的过滤列表，`targs` 对象的长度将反映此变化，如清单 6-21 所示。\n\n清单 6-21. 使用 `filt()` 函数精简实例目标\n\
    \n```python\nemcli>myinst.filt(namefilter='^orcl.*\\.example\\.com')\nemcli>len(myinst.targs)\n\
    \n```\n\n目标列表的过滤也可以在实例创建期间进行，如清单 6-22 所示。\n\n清单 6-22. 在实例创建过程中精简实例目标\n\n```python\n\
    emcli>myinst = updateProps.updateProps(namefilter='^orcl.*\\.example\\.com')\n\
    emcli>len(myinst.targs)\n\n```\n"
- fmt: "We probably wouldn’t want to make target property changes without first knowing\
    \ the target names and the currently defined properties for those targets. The\
    \ `show()` function in [Listing 6-23](#9781484202395_Ch06.xhtml#list23) allows\
    \ us to see this information, printed in a format that is easier to read than\
    \ JSON or a Python dictionary.\n\n[Listing 6-23](#9781484202395_Ch06.xhtml#_list23).\
    \ The `show()` function of the `updateProps()` class previews the instance target\
    \ list along with their currently allocated properties\n\n```\ndef show(self):\n\
    \    print('%-5s%-40s%s' % (\n          ' ', 'TARGET_TYPE'.ljust(40, '.'),\n \
    \         'TARGET_NAME'))\n    print('%-15s%-30s%s\\n%s\\n' % (\n          ' ',\
    \ 'PROPERTY_NAME'.ljust(30, '.'),\n          'PROPERTY_VALUE', '=' * 80))\n  \
    \  for __inttarg in self.targssort:\n        print('%-5s%-40s%s' % (\n       \
    \       ' ', __inttarg['TARGET_TYPE'].ljust(40, '.'),\n              __inttarg['TARGET_NAME']))\n\
    \        self.__showprops(__inttarg['TARGET_GUID'])\n        print('')\n```\n\n\
    The `__showprops()` function shown in [Listing 6-24](#9781484202395_Ch06.xhtml#list24)\
    \ is called from the `show()` function in a recursive manner to retrieve each\
    \ target property defined for a target. In other words, the `__showprops()` function\
    \ is called once for each target defined for the instance, and the properties\
    \ defined for the target are stored with it as child records.\n\n[Listing 6-24](#9781484202395_Ch06.xhtml#_list24).\
    \ The `__showprops()` function of the `updateProps()` class is called to retrieve\
    \ the properties for each target defined in the instance\n\n```\ndef __showprops(self,\
    \ guid):\n    self.__loadtargobjects()\n    for __inttargprops in self.targprops:\n\
    \        __intpropname = \\\n          __inttargprops['PROPERTY_NAME'].split('_')\n\
    \        if __inttargprops['TARGET_GUID'] == guid and \\\n           __intpropname[0:2]\
    \ == ['orcl', 'gtp']:\n            print('%-15s%-30s%s' %\n                  ('\
    \ ', ' '.join(__intpropname[2:]).ljust(\n                   30, '.'),\n      \
    \             __inttargprops['PROPERTY_VALUE']))\n```\n\nFinally, [Listing 6-25](#9781484202395_Ch06.xhtml#list25)\
    \ shows the `setprops()` function, which is called to make the magic happen. At\
    \ the point that this function is called, the filtered target list has already\
    \ been defined and the `propdict` dictionary variable is populated with the property\
    \ name–value pairs that will be set for the filtered target list.\n\n[Listing\
    \ 6-25](#9781484202395_Ch06.xhtml#_list25). The `setprops()` function of the `updateProps()`\
    \ class is called to apply the properties updates\n\n```\ndef setprops(self, show=False):\n\
    \    assert len(self.propdict) > 0, \\\n           'The propdict parameter must\
    \ contain ' + \\\n           'at least one property. Use the ' + \\\n        \
    \   'props() function to modify.'\n    self.reloadtargs = True\n    __delim =\
    \ '@#&@#&&'\n    __subseparator = 'property_records=' + __delim\n    for __inttarg\
    \ in self.targs:\n        for __propkey, __propvalue \\\n            in self.propdict.items():\n\
    \            __property_records = __inttarg['TARGET_NAME'] + \\\n            \
    \  __delim + __inttarg['TARGET_TYPE'] + \\\n              __delim + __propkey\
    \ + __delim + __propvalue\n            print('Target: ' + __inttarg['TARGET_NAME']\
    \ +\n                  ' (' + __inttarg['TARGET_TYPE'] +\n                  ')\\\
    n\\tProperty: '\n                  + __propkey + '\\n\\tValue: ' +\n         \
    \         __propvalue + '\\n')\n            emcli.set_target_property_value(\n\
    \              subseparator=__subseparator,\n              property_records=__property_records)\n\
    \    if show == True:\n        self.show()\n```\n\nThe `assert` statement does\
    \ some error checking to make sure that there is at least one property name–value\
    \ pair in the `propdict` variable to set on the target list. `self.reloadtargs\
    \ = True` tells the instance that the target and properties information should\
    \ be freshly queried from the database after the new target properties have been\
    \ set. `__delim = '@#&@#&&'` is a set of characters that should never be found\
    \ in a target or property name and is used as the delimiter in the `emcli.set_target_property_value()`\
    \ function. `__subseparator = 'property_records=' + __delim` is also used for\
    \ formatting.\n\nThe first `for` loop iterates through the filtered target list.\
    \ The second `for` loop iterates through the `propdict` variable. Inside the second\
    \ nested for loop is the `emcli.set_target_property_value()` function, which actually\
    \ sets the properties on each target. This `set_target_property_value()` function\
    \ is executed once for each property per target, so the total number of executions\
    \ of this function will be the number of records in the filtered target list multiplied\
    \ by the number of property name–value pairs in `propdict`. As each property is\
    \ set, a result is printed to the screen.\n\nUsing a class in Python requires\
    \ a little extra time and effort up front, but it is well worth it. The code you\
    \ work so hard to create is scalable, extensible, and reusable. You can reuse\
    \ code from any classes you create and do not have to worry about testing them\
    \ again.\n\n## Summary\n\nEnterprise Manager is truly a powerful tool. Having\
    \ a firm grasp of the functions of the graphical interface are essential to using\
    \ it effectively. EM CLI greatly enhances the ability to take advantage of all\
    \ of the powerful features of EM. EM CLI isn’t the easiest thing to learn, but\
    \ having the ability to script and automate activities through it offers a clear\
    \ advantage for the administrator.\n\nPython is a powerful programming language\
    \ whose maturity has been tested over the last 20-plus years. EM CLI is written\
    \ in Jython, the Java implementation of Python. Jython allows the administrator\
    \ to increase their EM effectiveness by taking advantage of the power and agility\
    \ of Python alongside EM CLI.\n\nThe learning curve of any command-line tool is\
    \ high, but the Python language and EM CLI are quite intuitive. If you get stuck\
    \ on syntax or functionality, help is plentiful and easy to come by. This chapter\
    \ gives examples that were created out of necessity in real-world production environments\
    \ where it wasn’t feasible to do these tasks through the GUI.\n\nThe real-world\
    \ environments you, the reader, will face may differ from those here, but the\
    \ principals and much of the code demonstrated in this chapter can be used to\
    \ create effective and efficient solutions for the Enterprise administrator.\n\
    \n# CHAPTER 7\n\n![image](Images/frontdot.jpg)\n\n## Using the Software Library\
    \ and Oracle Extensibility Exchange\n\n### The OEM Software Library\n\nCreating\
    \ a software library ensures that all provisioning, patching, and scripting entities\
    \ are stored in a location available to the OEM repository; this conserves resources\
    \ and costs for the IT infrastructure. The concept appears simple enough, but\
    \ often you enter an IT organization and find that there are multiple sources\
    \ for installation media, patch locations, and so on. Having a central software\
    \ library that is configured within the EM12c environment and sized appropriately\
    \ (100 GB minimum for small environments, 250 GB minimum for extensive and HA/MAA\
    \ [High Availability/Maximum Availability Architecture] environments) ensures\
    \ that provisioning, patching, and scripting can be supported for the life of\
    \ the OEM system.\n\nThe added benefit to a central library for software is the\
    \ reduction of repeating tasks, such as downloading software or recreating valuable\
    \ scripts, deployment procedures, and other Enterprise Manager entities.\n\nSoftware\
    \ Library"
