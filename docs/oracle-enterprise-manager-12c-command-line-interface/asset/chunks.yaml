    Once the setup is complete and a valid Enterprise Manager has been authenticated,
    EM CLI will be ready to carry out tasks against EM. Setup is often where problems
    can be found, especially during the initial setup. For example, you may not know
    that the port used by EM is blocked between the server on which EM CLI was installed
    and the OMS. The setup process will reveal this fact. Once a connection has been
    established with a successful login, the EM CLI setup process is complete.


    Communication


    A number of tasks can be accomplished with either EM CLI or EMCTL. The choice
    of which tool to use will depend on a number of factors, such as which tool is
    available to use or which is more efficient for a particular task. The method
    in which the tool will interface with Enterprise Manager may be an additional
    factor to consider.


    EM CLI


    EM CLI is a client of the Oracle Management Server (OMS) just as SQL*plus is a
    client of the database. The Enterprise Manager OMS installation includes an installation
    of EM CLI. The EM CLI executable is located in the OMS home directory, `<OMS_HOME>/bin/emctl`.
    EM CLI communicates with the OMS using HTML through the same port and URL that
    is used to access the Enterprise Manager graphical interface.


    A network trace run on the port used for HTTP communication between EM CLI and
    Enterprise Manager would show that all of the requests from EM CLI are `GET` and
    `POST` requests via HTTP. These are the same requests that come from the GUI console
    when establishing a logon.


    The way EM CLI interfaces with Enterprise Manager allows it to connect from any
    location where a network connection can be established to the IP and port of the
    OMS, which gives EM CLI a distinct advantage over EMCTL in cases where the commands
    need to be run from a server other than the one hosting the OMS agent.


    EMCTL


    EMCTL communicates directly with the agent with which it is installed. EMCTL will
    only communicate with its own agent, even when other agents are running on the
    same server.


    ![Image](Images/sq.jpg) **Note**  There is also an EMCTL interface that controls
    and communicates directly with the OMS and it has a completely different set of
    commands.


    The `emctl` command located in `<AGENT_BASE>/agent_inst/bin` is a shell or batch
    script that sets environment variables and executes the `<AGENT_HOME>/bin/emctl`
    command with the parameters fed to the first command. The `<AGENT_HOME>/bin/emctl`
    is also a shell or batch script that sets environment variables as well as sources
    a number of other files. It then executes a perl script with the parameters fed
    to the first command. This perl script sources a number of other perl scripts
    and either reads existing state files or interacts directly with the java agent
    process for a result.


    Because EMCTL interacts directly with the java agent process, it is not considered
    a client. This also means that the agent cannot be remotely controlled using EMCTL.


    EMCTL versus EM CLI


    When to use EMCTL versus EM CLI is largely based on preference and environment
    limitations. For example, both commands can control blackouts in Enterprise Manager.
    In one environment, there may be a limitation on installing the EM CLI remotely
    or locally because of the Java version it requires or the port access it needs,
    making EMCTL the better option. In another environment, there may be a restriction
    on shell access on an agent server, making EM CLI the better option. Understanding
    the architecture differences between EMCTL and EM CLI will help with the decision
    of using one versus the other in different circumstances.


    The syntax of EM CLI is relatively straightforward; `emcli` followed by a verb,
    followed by mandatory and optional parameters. The syntax of EMCTL is not as easy
    to understand and does not follow a strict format.


    For most commands the format is as follows: `emctl` followed by a verb, followed
    by `agent`. For some configuration commands the format is: `emctl` followed by
    `config agent`, followed by a verb such as `listtargets` or `secure`. Generally,
    the easiest way to figure out the syntax of the EMCTL command you want to execute
    is to look up the documentation online or to print out the help text by executing
    the `emctl` command without any arguments. The help text will print to the screen.


    This help text can be made searchable by redirecting it to a file that can be
    opened and searched or by piping the output to a searchable line reader such as
    `less`:


    ```

    emctl > help.txt; vim help.txt

    emctl | less

    ```


    Now that we’ve reviewed a number of important concepts and definitions, let’s
    look at some real-world examples that can be used to accomplish many of the most
    common tasks for which one might use EM CLI.


    The first task, Login, is one that must be done for each session of EM CLI, regardless
    of which mode is used. The other tasks are examples of using EM CLI when the GUI
    is not a suitable option, such as within scheduled scripts or when working with
    large numbers of targets.


    Task: Establish a Login


    There is little useful functionality of EM CLI without having a connection to
    an OMS. Creating that connection is usually the first step of using the interface.
    How to establish a connection depends on the mode being used.


    When using command-line mode, a login will not need to be established if the `-autologin`
    parameter was specified during setup, since this parameter indicates that the
    credentials used during the install of EM CLI are stored in the installation files
    and are used for every command automatically. A login is established using the
    `login` verb. The login verb must be followed by the `-username` parameter and
    can optionally be followed by the `-password` parameter.


    It is inadvisable to include the password on the command line because of the security
    implications of exposed passwords. If the password is not included as a parameter,
    EM CLI will prompt the user for a password, and the characters entered will not
    be echoed to the screen, nor will the password be exposed when looking at the
    running processes using the `ps` command. If the `-autologin` parameter was not
    specified during setup, a login session will prompt for a password:


    ```

    [oracle ~]$ emcli login -username=sysman

    Enter password :


    Login successful

    ```


    In the case of running EM CLI in scripting or interactive mode, the login information
    must be explicitly given for each script execution and at the beginning of each
    interactive session. These two modes do not use the credentials established during
    setup, even if the `-autologin` parameter was used.'
