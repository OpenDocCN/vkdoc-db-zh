    \      FILES               NUMBERS             SUBSCRIPTS\nCALLABLEMETHODS   \
    \  FLOAT               OBJECTS             TRACEBACKS\nCALLS               FORMATTING\
    \          OPERATORS           TRUTHVALUE\nCLASSES             FRAMEOBJECTS  \
    \      PACKAGES            TUPLELITERALS\nCODEOBJECTS         FRAMES         \
    \     POWER               TUPLES\nCOERCIONS           FUNCTIONS           PRECEDENCE\
    \          TYPEOBJECTS\nCOMPARISON          IDENTIFIERS         PRINTING     \
    \       TYPES\nCOMPLEX             IMPORTING           PRIVATENAMES        UNARY\n\
