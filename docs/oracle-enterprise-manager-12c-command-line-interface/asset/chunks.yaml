    \ OFF\nexit\nEOF\n\nemcli login -user=sysman -pass=${CONSOLE_PWD}\nemcli -argfile\
    \ ${ARGFILE01}\nemcli -argfile ${ARGFILE02}\nemcli -argfile ${ARGFILE03}\n```\n\
    \n## 更改 EM 管理员引用\n\n正如我们在上一节中提到的，您通过 OEM 创建的所有信息都存储在存储库数据库中。OEM 帐户的用户数据存储在 `sysman.mgmt_created_users`\
    \ 表中。当然，您绝不应直接更改存储库中的数据，但您可以将其用作参考数据。\n\n通过 EM 控制台更新单个管理员是简单直接的。但是，如果部门名称更改或一组管理员更换了地点怎么办？\n\
    \n您可以创建一个简短的脚本，通过将部门 200 中的所有员工列表收集到一个假脱机文件中，然后遍历假脱机文件中的每一行，为每个员工创建 `modify_user`\
    \ 语句，从而在部门 200 中的所有人都被分配到部门 500 时更改引用。该脚本由 SQL 和 EM CLI 命令组合而成。目前没有 CLI 动词可以直接收集此信息，因此我们将从存储库中提取它。\n\
    \n为了清晰起见，已删除了提示用户输入时典型的许多错误检查例程：用户提供答案了吗？输入的部门编号是大写还是小写？它们是有效数字吗？可扩展且可靠的脚本必须始终包含这些验证。\n\
    \n```\n#!/bin/bash\n# ===============================================================\n\
    #  File:        change_admin_depts.sh\n#  Purpose:     Change department number\
    \ references for EM admins\n#  Parameters:  None\n# ===============================================================\n\
    read OLD_DEPT?\"Enter the old department number:  \"\nread NEW_DEPT?\"Now enter\
    \ the new department number: \"\n\nsqlplus <Connect String><<EOF\nSET echo OFF\n\
    SET heading OFF feedback OFF page 999\nspool old_department.lst\nSELECT user_name\n\
    FROM     sysman.mgmt_created_users\nWHERE  department = '${OLD_DEPT}';\nspool\
    \ off\nexit\nEOF\n\ntouch myARGFILE.lst\n\nfor thisUSER in `cat old_department.lst`;\
    \ do\n        echo \"modify_user -name=\"${thisUSER}\"-department=\"${NEW_DEPT}\"\
    >>myARGILE.lst\ndone\n\nemcli argfile myARGFILE.lst\n\necho \"\\n\\nDepartment\
    \ settings after the change:\\n\"\nsqlplus <Connect String><<EOF\nSET echo OFF\n\
    SET heading ON pages 999\nSELECT user_name,\n       department\nFROM   sysman.mgmt_created_users\n\
    ORDER BY user_name;\nexit\nEOF\n[ old_department.lst ] && rm –f old.department.lst\n\
    [ myARGFILE.lst ] && rm –f myARGFILE.lst\n```\n\n最后两个步骤清理了运行时创建的临时文件。每个 shell\
    \ 脚本都应该自行清理。上面的语法检查文件是否存在，并在找到时将其删除。您也可以选择构建一个简单的 `if` 语句。\n\n## Shell Getopts\
    \ 命令\n\n除了 `getopts`（复数）外，Linux 还有 `getopt`（单数）命令。本讨论是关于 `getopts` 的。这是一个 shell\
    \ 实用程序，而不是 EM CLI 动词。前面的示例提示用户输入两个部门编号，这对于交互式脚本是可以的，但对于计划作业则不可扩展。您可以在命令行使用位置参数，如下所示：\n\
    \n```\nif [ $1 ]; then\nexport OLD_DEPT=${1}\nelse\nread OLD_DEPT?\"Enter the\
    \ old department number:  \"\nfi\n\nif [ $2 ]; then\n        export NEW_DEPT=${1}\n\
    else\nread NEW_DEPT?\"Enter the new department number:  \"\nfi\n\nif [[ ${OLD_DEPT}\
    \ == ${NEW_DEPT} ]]; then\n        echo \"The values for the old and new departments\
    \ are the same\"\n        < Error handling >\nfi\n```\n\n这种方法依赖于用户输入以正确的顺序呈现。在当前示例中，第一个输入值对应于旧部门，第二个对应于新部门。但是，如果它们顺序不对怎么办？`getopts`\
    \ 命令允许您使用输入标志来避免此问题。\n"
- fmt: "# 第六章 高级脚本编写\n\n## 概述\n\n命令行界面（如 `EM CLI`）的一大优势在于能够一次性自动化执行多条命令。本章将深入探讨 `Python`\
    \ 与 `EM CLI` 的结合，即所谓的交互式和脚本模式。\n\n本章第一部分回顾了 `Python`、`Jython` 和 `JSON` 的历史渊源。要在\
    \ `EM CLI` 中利用 `Python` 的功能，需要对编程和 `Python` 语法有基本的了解。本章将通过示例介绍 `Python`，即使是首次使用者也能在\
    \ `EM CLI` 中高效地运用它。\n\n最后，一个详细的示例将展示如何使用 `Python` 类对象，借助 `EM CLI` 的功能一次性修改多个目标的属性。这是一项在图形用户界面中非常繁琐的常见任务，必须理解并学会在\
    \ `EM CLI` 中使用。\n\n## 命令行输入的处理\n\n命令行输入由脚本中的 `case` 语句进行评估，以决定如何处理标志（flag）值。它们被输入到命令行的顺序是无关紧要的。`OPTARG`\
    \ 是 `getopts` 传递的值的名称。让我们看看其工作原理。对于命令行中的这个条目，将通过名为 `OPTARG` 的 `getopts` 输出返回一个字符串。\n\
    \n```bash\n./change_admin_depts.sh –a 500 –b 750\n\nwhile getopts a:b: OptValue;\
    \ do\n  case $OptValue in\n    a) export OLD_DEPT=${OPTARG};;\n    b) export NEW_DEPT=${OPTARG};;\n\
    \    *) echo \"No values were provided for old and new departments\";;\n  esac\n\
    done\n```\n\n这个示例测试了一个名为 `OptValue` 的临时变量是否与预期的字符匹配，并做出相应的响应。命令行中识别为 `-a` 或 `-b`\
    \ 的每一个值都对应一个新部门或旧部门的编号。\n\n```bash\necho $OLD_DEPT\n\necho $NEW_DEPT\n```\n\n\
    在 `getopts` 语句中，后跟冒号 “`:`” 的字符标识表示该标志后将跟随一个字符串。没有冒号的 `OptValue` 则不会接受字符串，可用于在脚本中发出特定流程的信号。\n\
    \n在下面的示例中，如果在命令行接收到 `-t` 标志，则会执行一个名为 `RunTestFunctions` 的函数：\n\n```bash\nchange_admin_depts.sh\
    \ -a 747 -b 757 -t\n```\n\n脚本按顺序处理这些请求：\n\n```bash\nwhile getopts a:b:t OptValue;\
    \ do\n  case $OptValue in\n    a) export OLD_DEPT=${OPTARG};;\n    b) export NEW_DEPT=${OPTARG};;\n\
    \    t) export TestOnly=\"True\";;\n    *) echo \"No values were provided for\
    \ old and new departments\";;\n  esac\ndone\n\nif [ $TestOnly == True ]; then\n\
    \    RunTestFunctions\nfi\n```\n\n这种方法灵活性随着可处理的值的数量而增长。例如，`ChangeAdminDepts` 函数中的逻辑可以调整来处理你可以用\
    \ `modify_user` 动词设置的其他值，比如业务线（line of business）和位置（location）。`getopts` 标志可用于决定应用哪些函数。参见以下示例：\n\
    \n```bash\nwhile getopts a:b:c:d:e:f:t OptValue; do\n  case $OptValue in\n   \
    \ a) export OLD_DEPT=${OPTARG};;\n    b) export NEW_DEPT=${OPTARG};;\n    c) export\
    \ OLD_LOB=${OPTARG};;\n    d) export NEW_LOB=${OPTARG};;\n    e) export OLD_LOCATION=${OPTARG};;\n\
    \    f) export NEW_LOCATION=${OPTARG};;\n    t) export TestOnly=\"True\";;\n \
    \   *) echo \"No values were provided for old and new departments\";;\n  esac\n\
    done\n\nif [ ${#OLD_DEPT} -gt 0 ]; then\n    if [ ${#NEW_DEPT} -gt 0 ]; then\n\
    \        ChangeAdminDepts\n    else\n        echo \"Error: You provided the old\
    \ department but\"\n        echo \"the value for the new department is missing.\"\
    \n        echo \"Please run this script again and provide\"\n        echo \"both\
    \ values when prompted\"\n        exit 1\n    fi\nfi\n```\n\n## 使用参数文件更新目标属性\n\
    \n`OEM` 属性为目标（targets）和管理员提供了另一个数据点。例如，为主机和数据库目标设置 `Department` 属性对于过滤报告可能很有用，或者你可以使用一个属性将目标映射到管理员。`Lifecycle\
    \ Status` 属性可用于过滤正常运行时间报告。你懂的。这是在 `Groups` 等内置 `OEM` 结构之外的另一个参考点。\n\n尽管它们很有用，但为\
    \ `OEM` 目标设置属性相当不便。当你发现一个新主机或配置到一个新数据库的连接时，控制台不会提示你输入 `LifeCycle Status`、`Department`、`Location`\
    \ 或任何其他可直接分配给目标的属性。\n\n因此，你的某些目标在这些字段中可能没有当前或准确的值。这里有一个查询使用字符串逻辑从主机名推导 `LifeCycle\
    \ Status`。在这个例子中，生产主机被命名为 `oraprod01`、`oraprod02` 等。测试和开发主机也遵循相同的通用命名标准。注意：像这样的命名标准会给黑客发出一个信号：“不要在那个开发/测试服务器上浪费时间——我所有的生产数据都在这里！”\
    \ 这只是一个例子。\n\n`set_target_property_value` 动词允许你为单个目标设置单个属性。你有更好的事情要做，因此我们将通过将该查询的结果加载到\
    \ `SQL` 缓存文件中，将这些动词字符串拉入一个参数文件，如下所示：\n\n```bash\nsqlplus -S ${SYSMAN_CONNECT}\
    \ <<EOF\nSET ECHO OFF\nSET FEEDBACK OFF HEADING OFF LINES 250 PAGES 999\nSPOOL\
    \ ${ARGFILE01}\nSELECT\n        CASE SUBSTR ( host_name, 0, 6 )\n           WHEN\
    \ 'oraprod' THEN\n            DECODE ( property_value, 'Production', NULL, 'set\
    \ target_property_value -property_records=\"' || target_name ||':oracle_database:LifeCycle\
    \ Status:Production\"' )\n           WHEN 'oratest' THEN\n            DECODE (\
    \ property_value,'Test', NULL,'set_target_property_value -property_records=\"\
    ' || target_name ||':oracle_database:LifeCycle Status:Test\"' )\n           WHEN\
    \ 'oradevl' THEN\n             DECODE ( property_value,'Development', NULL,'set_target_property_value\
    \ -property_records=\"' || target_name ||':oracle_database:LifeCycle Status:Development\"\
    ' )\n        ELSE 'Not defined'\n        END  AS corrective_action\nFROM    sysman.gc\\\
    $target_properties a,\n        sysman.gc\\$target b\nWHERE   a.target_guid = b.target_guid\n\
    \ AND    b.target_type = 'oracle_database'\n AND    a.property_name = 'orcl_gtp_lifecycle_status';\n\
    SPOOL OFF\nEOF\n\nif [ `cat ${ARGFILE01} | wc -l` -gt 0 ]; then\n    emcli login\
    \ -user=sysman -pass=${CONSOLE_PWD} 2>/dev/null\n    emcli argfile ${ARGFILE01}\n\
    \    emcli logout\nfi\n```\n\n## 总结\n\n`EM CLI` 支持控制台内可用的许多技术，并允许你在可移植的 `shell`\
    \ 脚本或 `OEM` 作业中管理和操作目标数据。本章重点介绍了原生的 `shell` 脚本，但一个更快、更灵活的 `jython` 脚本技术随着 12.1.0.3\
    \ 版本发布。接下来的章节将展示如何利用该功能。\n\n高级 `jython` 脚本的可用性不应使你放弃基础的 `shell` 脚本编写。`shell` 脚本无需额外的安装或配置即可运行。它们还有一个优势，即几乎所有管理员都对它很熟悉。\n\
    \n## Python 的历史\n\n`Python` 由 `Guido van Rossum` 在 1980 年代末期创建，起源于一种名为 `ABC` 的解释型语言。当时，`van\
    \ Rossum` 正在使用 `ABC`，他喜欢其语法但想改变一些功能。在 1989 年的圣诞节假期期间，`van Rossum` 设计了后来被称为 `Python`\
    \ 的语言。`Python` 于 1991 年正式发布，当时 `van Rossum` 在阿姆斯特丹一家名为 `Stichting Mathematisch\
    \ Centrum` 的公司工作。\n\n`Python` 的名字并非来源于危险的爬行动物，而是来源于英国 `BBC` 的流行喜剧系列《*Monty Python’s\
    \ Flying Circus*》。`van Rossum` 是该剧的粉丝，并需要一个适合该语言的名字。"
  raw: "Command-line input is evaluated by a case statement in your script that determines\
    \ how flag values are to be handled. The order they were entered on the command\
    \ line is irrelevant. `OPTARG` is the name of the value passed by `getopts`. Let’s\
    \ look at how that works. For this entry on the command line, a string will be\
    \ returned via the `getopts` output named `OPTARG`.\n\n```\n./change_admin_depts.sh\
    \ –a 500 –b 750\n\nwhile getopts a:b: OptValue; do\n  case $OptValue in\n    a)\
    \ export OLD_DEPT=${OPTARG};;\n    b) export NEW_DEPT=${OPTARG};;\n    *) echo\
    \ \"No values were provided for old and new departments\";;\n  esac\ndone\n```\n\
    \nThis example tested a temporary variable named `OptValue` against expected characters\
    \ and responded accordingly. Each value identified as an `-a` or `-b` on the command\
    \ line set corresponds to a value for a new or old department number.\n\n```\n\
    echo $OLD_DEPT\n\necho $NEW_DEPT\n\n```\n\nValues identified by a character followed\
    \ by a colon “`:`” in the `getopts` statement indicate that the flag will be followed\
    \ by a string. An `OptValue` without a colon won’t accept a string and can be\
    \ used to signal a particular process in your script.\n\nIn the example below,\
    \ if the `-t` flag is received on the command line, a function named `RunTestFunctions`\
    \ is executed:\n\n```\nchange_admin_depts.sh -a 747 -b 757 -t\n```\n\nThe script\
    \ handles each of these requests in order:\n\n```\nwhile getopts a:b:t OptValue;\
    \ do\n  case $OptValue in\n    a) export OLD_DEPT=${OPTARG};;\n    b) export NEW_DEPT=${OPTARG};;\n\
    \    t) export TestOnly=\"True\"\n    *) echo \"No values were provided for old\
    \ and new departments\";;\n  esac\ndone\n\nif [ $TestOnly == True ]; then\nRunTestFunctions\n\
    fi\n```\n\nThe flexibility of this approach grows with the number of values you\
    \ can handle. For instance, the logic in the `ChangeAdminDepts` function could\
    \ be adapted to process the other values you can set with the `modify_user` verb,\
    \ like line of business and location. The `getopts` flags could be used to determine\
    \ which of those functions to apply. See the example below:\n\n```\nwhile getopts\
    \ a:b:t OptValue; do\n  case $OptValue in\n    a) export OLD_DEPT=${OPTARG};;\n\
    \    b) export NEW_DEPT=${OPTARG};;\n    c) export OLD_LOB=${OPTARG};;\n    d)\
    \ export NEW_LOB=${OPTARG};;\n    e) export OLD_LOCATION=${OPTARG};;\n    f) export\
    \ NEW_LOCATION=${OPTARG};;\n    t) export TestOnly=\"True\"\n    *) echo \"No\
    \ values were provided for old and new departments\";;\n  esac\ndone\n\nif [ ${#OLD_DEPT}\
    \ -gt 0 ]; then\n        if [ ${#NEW_DEPT} -gt 0 ]; then\nChangeAdminDepts\nelse\n\
    \        echo \"Error: You provided the old department but\"\n        echo \"\
    the value for the new department is missing.\"\n        echo \"Please run this\
    \ script again and provide\"\n     echo \"both values when prompted\"\n      \
    \  exit 1\nfi\nfi\n```\n\nUpdating Target Properties Using Argfile\n\nOEM properties\
    \ provide another data point for targets and administrators. For instance, setting\
    \ the `Department` property for host and database targets could be useful for\
    \ filtered reports, or you could use a property to map targets to administrators.\
    \ The `Lifecycle Status` property can be used to filter up-time reports. You get\
    \ the idea. It’s another reference point outside of built-in OEM structures like\
    \ Groups.\n\nDespite their usefulness, it’s fairly inconvenient to set properties\
    \ for an OEM target. When you discover a new host or configure a connection to\
    \ a new database, you aren’t prompted for `LifeCycle Status`, `Department`, `Location`,\
    \ or any of the other properties that are directly assignable to a target in the\
    \ console.\n\nAs a result, some of your targets may not have current or accurate\
    \ values in those fields. Here’s a query that uses string logic to derive `LifeCycle\
    \ Status` from the host name. In this example, production hosts are named `oraprod01`,\
    \ `oraprod02`, etc. Test and development hosts enjoy the same common naming standards.\
    \ Note: Naming standards like this flash a signal to hackers saying “Don’t waste\
    \ your time on that dev/test server—all my production data is over here!” This\
    \ is just an example.\n\nThe`set_target_property_value` verb allows you to set\
    \ a single property for a single target. You have better things to do, so we’ll\
    \ pull those verb strings into an argfile by loading the results of that query\
    \ into a SQL spool file, like this:\n\n```\nsqlplus -S ${SYSMAN_CONNECT} <<EOF\
    \ SET ECHO OFF\nSET FEEDBACK OFF HEADING OFF LINES 250 PAGES 999\nSPOOL ${ARGFILE01}\n\
    SELECT\n        CASE SUBSTR ( host_name, 0, 6 )\n           WHEN 'oraprod' THEN\n\
    \            DECODE ( property_value, 'Production', NULL, 'set target_property_value\
    \ -property_records=\"' || target_name ||':oracle_database:LifeCycle Status:Production\"\
    ' )\n           WHEN 'oratest' THEN\n            DECODE ( property_value,'Test',\
    \ NULL,'set_target_property_value -property_records=\"' || target_name ||':oracle_database:LifeCycle\
    \ Status:Test\"' )\n           WHEN 'oradevl' THEN\n             DECODE ( property_value,'Development',\
    \ NULL,'set_target_property_value -property_records=\"' || target_name ||':oracle_database:LifeCycle\
    \ Status:Development\"' )\n        ELSE ''Not defined'\n        END  AS corrective_action\n\
    FROM    sysman.gc$target_properties a,\n        sysman.gc$target b\nWHERE   a.target_guid\
    \ = b.target_guid\n AND    b.target_type = 'oracle_database'\n AND    a.property_name\
    \ = 'orcl_gtp_lifecycle_status';\n\nSPOOL OFF\nEOF\n\nif [ `cat ${ARGFILE01} |\
    \ wc -l` -gt 0 ]; then\n    emcli login -user=sysman -pass=${CONSOLE_PWD} 2>/dev/null\n\
    \    emcli argfile ${ARGFILE01}\n    emcli logout\n\nfi\n```\n\nSummary\n\nEM\
    \ CLI supports many of the techniques available within the console and allows\
    \ you to manage and manipulate target data within portable shell scripts or OEM\
    \ jobs. This chapter focused on native shell scripts, but a faster, more flexible\
    \ technique for script with jython was released with release 12.1.0.3\\. The following\
    \ chapter shows you how to leverage that capability.\n\nThe availability of advanced\
    \ scripting with jython shouldn’t dissuade you from fundamental shell scripting.\
    \ Shell scripts run without additional installations or configurations. They also\
    \ have the advantage of being familiar to nearly all administrators.\n\nCHAPTER\
    \ 6\n\n![image](Images/frontdot.jpg)\n\nAdvanced Scripting\n\nMuch of the power\
    \ of a command-line interface like EM CLI is the ability to automate the execution\
    \ of multiple commands at a time. This chapter dives deep into the marriage of\
    \ Python and EM CLI in what is known as interactive and scripting mode.\n\nThe\
    \ first part of the chapter reviews some of the history of where Python, Jython,\
    \ and JSON came from. Being able to take advantage of Python functionality in\
    \ EM CLI requires a basic understanding of programming and Python syntax. An introduction\
    \ to Python in this chapter, including examples, will allow even the first-time\
    \ Python user to tackle Python efficiently in EM CLI.\n\nFinally, a detailed example\
    \ will feature the use of a Python class object to take advantage of EM CLI functionality\
    \ to modify the properties of multiple targets at a time. This is a common task\
    \ that is tedious in the graphical user interface and is necessary to understand\
    \ and use in EM CLI.\n\nHistory of Python\n\nPython was created in the late 1980s\
    \ by Guido van Rossum and originated from an interpreted language called ABC.\
    \ At the time, van Rossum was working with ABC and liked the syntax but wanted\
    \ to change some of the functionality. During the Christmas holidays of 1989,\
    \ van Rossum designed the language that would later be called Python. Python was\
    \ officially released in 1991 while van Rossum worked for a company called Stichting\
    \ Mathematisch Centrum in Amsterdam.\n\nPython did not get its name from the dangerous\
    \ reptile, but rather from the popular British BBC comedy series, *Monty Python’s\
    \ Flying Circus*. Van Rossum was a fan of the show and needed a name that was\
    \ fitting for the language."
