- fmt: '# WebLogic 服务器配置要求与概览


    The WebLogic server must be made available to and synchronized with the `Enterprise
    Manager Command-Line Interface (EM CLI)` in order to offer the latest plug-ins,
    management packs, and full access to the Enterprise Manager Cloud environment.


    ## Requirements


    In order to understand the requirements before the `EM CLI` installation on your
    `OMS` proceeds, ensure that the `WebLogic Domain Provisioning Profile` is created
    in such a way that the software library has the `Middleware Home` that belongs
    to the domain archived and stored as part of the WebLogic domain.


    ## Creating the WebLogic Domain Provisioning Profile


    There are three components that make up the provisioning profile:


    *   a middleware home

    *   the binaries used by the WebLogic server components

    *   the domain configuration for the provisioning profile


    If you simply have an administrator or super administrator log in to the `EM12c`
    environment, it will not be sufficient to complete the `WLS` domain provisioning
    profile. To complete this task, you must have the following:


    *   Host credentials for the `WLS` and any other host involved in the provisioning
    setup. These credentials were required during the initial `OEM` installation.

    *   All targets must have `Java Required Files (JRF)` enabled, which is discovered
    and monitored by `Enterprise Manager`.


    Log in to the `Enterprise Manager Cloud Console` as a super user and click on
    `Enterprise`, `Provisioning and Patching`, and then `Software Library`, as shown
    in [Figure 2-1](#9781484202395_Ch02.xhtml#Fig1).


    ![9781484202395_Fig02-01.jpg](Images/9781484202395_Fig02-01.jpg)


    [Figure 2-1](#9781484202395_Ch02.xhtml#_Fig1). Accessing the software library
    within the `EM12c` console


    Once you enter the `software library`, you will need to create a folder in which
    to store the profile ([Figure 2-2](#9781484202395_Ch02.xhtml#Fig2)).


    ![9781484202395_Fig02-02.jpg](Images/9781484202395_Fig02-02.jpg)


    [Figure 2-2](#9781484202395_Ch02.xhtml#_Fig2). Creating a new folder within the
    software library for provisioning, patching, or installations


    The `Software Library` already has a pre-determined set of sub-directories available.
    For our example, we will create a new directory named `Profile_Home`, give a defined
    description, and save it to a newly defined `Networks` sub-directory ([Figure
    2-3](#9781484202395_Ch02.xhtml#Fig3)).


    ![9781484202395_Fig02-03.jpg](Images/9781484202395_Fig02-03.jpg)


    [Figure 2-3](#9781484202395_Ch02.xhtml#_Fig3). Creation and details for the `Profile_Home`
    folder to be used for the WebLogic `EM CLI` installation


    Once satisfied with the entries, click `OK`. You will be shown that the directory
    was created successfully as well as the location of the new sub-directory off
    the software library directory tree ([Figure 2-4](#9781484202395_Ch02.xhtml#Fig4)).


    ![9781484202395_Fig02-04.jpg](Images/9781484202395_Fig02-04.jpg)


    [Figure 2-4](#9781484202395_Ch02.xhtml#_Fig4). Confirmation of successful folder
    creation in the software library within the `Networks` directory


    You will be returned to the software library main menu. Once more, click `Actions`,
    `Create Entity`, and then `Component` ([Figure 2-5](#9781484202395_Ch02.xhtml#Fig5)).


    ![9781484202395_Fig02-05.jpg](Images/9781484202395_Fig02-05.jpg)


    [Figure 2-5](#9781484202395_Ch02.xhtml#_Fig5). The `Actions` menu, displaying
    expanded options to access the component-creation action in the software library


    The component wizard will take you through the steps to create the actual profile.
    A dropdown menu will show on the screen; choose the final option, `WebLogic Domain
    Provisioning Profile` ([Figure 2-6](#9781484202395_Ch02.xhtml#Fig6)).


    ![9781484202395_Fig02-06.jpg](Images/9781484202395_Fig02-06.jpg)


    [Figure 2-6](#9781484202395_Ch02.xhtml#_Fig6). Creating an entity for a `WebLogic
    Domain Provisioning Profile` within the `EM12c` console


    Once the profile subtype has been chosen, click on the `Continue` button.


    **Note:** Don’t be concerned if it takes a bit of time before the next step in
    the process returns to the screen. There is a delay at the `Continue` step.


    Once the wizard arrives at the details page for the component, enter in the following
    ([Figure 2-7](#9781484202395_Ch02.xhtml#Fig7)):


    *   Name

    *   Description

    *   Other attributes (these settings can also be set on the home page for your
    WebLogic server)


    ![9781484202395_Fig02-07.jpg](Images/9781484202395_Fig02-07.jpg)


    [Figure 2-7](#9781484202395_Ch02.xhtml#_Fig7). Filling out description and values
    for a new `WebLogic Domain Provisioning Profile`


    Don’t add any file attachments or any other information, but simply click `Next`.
    You will then be asked about selecting a WebLogic service. Before choosing one,
    ensure that the box is checked for “Include the binaries for the Middleware Home
    in the profile to be created.” This is essential for the profile to be created
    correctly.


    Click on the magnifying glass next to “No WebLogic Domain Selected.” A pop-up
    will show available WebLogic domains ([Figure 2-8](#9781484202395_Ch02.xhtml#Fig8)).


    ![9781484202395_Fig02-08.jpg](Images/9781484202395_Fig02-08.jpg)


    [Figure 2-8](#9781484202395_Ch02.xhtml#_Fig8). Selecting a target to add to the
    WebLogic domain in the `EM12c` console


    You can simplify the search, but most environments have only a few WebLogic servers.
    Choose the one that you wish to use from the list and click `Select`.


    The `Configure` page will require you to review the data you’ve chosen so far
    ([Figure 2-9](#9781484202395_Ch02.xhtml#Fig9)). Correctly set a working directory
    that exists and has at least 200 MB of free space for work files. If you set the
    working directory incorrectly or if there is not enough space, the job will fail,
    which will leave profile components to be cleaned up and recreated from the beginning
    of this step. This also is in no way your final storage location for your profile,
    and all working files will be cleaned up after processing.


    ![9781484202395_Fig02-09.jpg](Images/9781484202395_Fig02-09.jpg)


    [Figure 2-9](#9781484202395_Ch02.xhtml#_Fig9). Configuring the provisioning profile
    for the WebLogic domain to be used with the software library setup


    Ensure the credentials are set properly, creating new ones if necessary, but hopefully
    by this time you will have created preferred credentials, as is best practice.


    Once you have verified that the information on the `Configure` page of the wizard
    is correct, click `Next`.


    If you are satisfied with the information on the `Review` page (no upload of any
    files is required, so don’t be alarmed when it shows that there aren’t any files
    at this time in the bottom section), click `Save and Upload`.


    A job will now be submitted for the task, and you will receive confirmation ([Figure
    2-10](#9781484202395_Ch02.xhtml#Fig10)).


    ![9781484202395_Fig02-10.jpg](Images/9781484202395_Fig02-10.jpg)


    [Figure 2-10](#9781484202395_Ch02.xhtml#_Fig10). Confirmation of job submittal
    for the `WebLogic Domain Provisioning Profile` creation


    As the job is managed by the `Enterprise Manager Job Service`, you can now click
    on `Enterprise`, `Jobs`, and `Job Activity` to monitor the job like any other
    job submitted through this feature ([Figure 2-11](#9781484202395_Ch02.xhtml#Fig11)).


    ![9781484202395_Fig02-11.jpg](Images/9781484202395_Fig02-11.jpg)


    [Figure 2-11](#9781484202395_Ch02.xhtml#_Fig11). Monitoring the provisioning profile
    job within the `Job Activity` view in the `EM12c` console


    You may need to refresh the console view as the job is running and then again
    after the job has completed. You may need to change the `Activity` view status
    to `All` or `Successful` in order to view the completed job. The job takes a significant
    amount of time, but you can see the job directory on the server within the working
    directory in which you choose to place the working files (for this example, I
    chose to create a temp folder in `/u01/home/oracle/`, as shown in [Figure 2-12](#9781484202395_Ch02.xhtml#Fig12)).'
  raw: 'The WebLogic server must be made available to and synchronized with the Enterprise
    Manager Command-Line Interface (EM CLI) in order to offer the latest plug-ins,
    management packs, and full access to the Enterprise Manager Cloud environment.


    Requirements


    In order to understand the requirements before the EM CLI installation on your
    OMS proceeds, ensure that the WebLogic Domain Provisioning Profile is created
    in such a way that the software library has the Middleware Home that belongs to
    the domain archived and stored as part of the WebLogic domain.


    Creating the WebLogic Domain Provisioning Profile


    There are three components that make up the provisioning profile:


    *   a middleware home

    *   the binaries used by the WebLogic server components

    *   the domain configuration for the provisioning profile


    If you simply have an administrator or super administrator log in to the EM12c
    environment, it will not be sufficient to complete the WLS domain provisioning
    profile. To complete this task, you must have the following:


    *   Host credentials for the WLS and any other host involved in the provisioning
    setup. These credentials were required during the initial OEM installation.

    *   All targets must have Java Required Files (JRF) enabled, which is discovered
    and monitored by Enterprise ManagerEnsure.


    Log in to the Enterprise Manager Cloud Console as a super user and click on Enterprise,
    Provisioning and Patching, and then Software Library, as shown in [Figure 2-1](#9781484202395_Ch02.xhtml#Fig1).


    ![9781484202395_Fig02-01.jpg](Images/9781484202395_Fig02-01.jpg)


    [Figure 2-1](#9781484202395_Ch02.xhtml#_Fig1). Accessing the software library
    within the EM12c console


    Once you enter the software library, you will need to create a folder in which
    to store the profile ([Figure 2-2](#9781484202395_Ch02.xhtml#Fig2)).


    ![9781484202395_Fig02-02.jpg](Images/9781484202395_Fig02-02.jpg)


    [Figure 2-2](#9781484202395_Ch02.xhtml#_Fig2). Creating a new folder within the
    software library for provisioning, patching, or installations


    The Software Library already has a pre-determined set of sub-directories available.
    For our example, we will create a new directory named Profile_Home, give a defined
    description, and save it to a newly defined Networks sub-directory ([Figure 2-3](#9781484202395_Ch02.xhtml#Fig3)).


    ![9781484202395_Fig02-03.jpg](Images/9781484202395_Fig02-03.jpg)


    [Figure 2-3](#9781484202395_Ch02.xhtml#_Fig3). Creation and details for the Profile_Home
    folder to be used for the WebLogic EM CLI installation


    Once satisfied with the entries, click OK. You will be shown that the directory
    was created successfully as well as the location of the new sub-directory off
    the software library directory tree ([Figure 2-4](#9781484202395_Ch02.xhtml#Fig4)).


    ![9781484202395_Fig02-04.jpg](Images/9781484202395_Fig02-04.jpg)


    [Figure 2-4](#9781484202395_Ch02.xhtml#_Fig4). Confirmation of successful folder
    creation in the software library within the Networks directory


    You will be returned to the software library main menu. Once more, click Actions,
    Create Entity, and then Component ([Figure 2-5](#9781484202395_Ch02.xhtml#Fig5)).


    ![9781484202395_Fig02-05.jpg](Images/9781484202395_Fig02-05.jpg)


    [Figure 2-5](#9781484202395_Ch02.xhtml#_Fig5). The Actions menu, displaying expanded
    options to access the component-creation action in the software library


    The component wizard will take you through the steps to create the actual profile.
    A dropdown menu will show on the screen; choose the final option, WebLogic Domain
    Provisioning Profile ([Figure 2-6](#9781484202395_Ch02.xhtml#Fig6)).


    ![9781484202395_Fig02-06.jpg](Images/9781484202395_Fig02-06.jpg)


    [Figure 2-6](#9781484202395_Ch02.xhtml#_Fig6). Creating an entity for a WebLogic
    Domain Provisioning Profile within the EM12c console


    Once the profile subtype has been chosen, click on the Continue button.


    ![Image](Images/sq.jpg) **Note**  Don’t be concerned if it takes a bit of time
    before the next step in the process returns to the screen. There is a delay at
    the Continue step.


    Once the wizard arrives at the details page for the component, enter in the following
    ([Figure 2-7](#9781484202395_Ch02.xhtml#Fig7)):


    *   Name

    *   Description

    *   Other attributes (these settings can also be set on the home page for your
    WebLogic server)


    ![9781484202395_Fig02-07.jpg](Images/9781484202395_Fig02-07.jpg)


    [Figure 2-7](#9781484202395_Ch02.xhtml#_Fig7). Filling out description and values
    for a new WebLogic Domain Provisioning Profile


    Don’t add any file attachments or any other information, but simply click Next.
    You will then be asked about selecting a WebLogic service. Before choosing one,
    ensure that the box is checked for “Include the binaries for the Middleware Home
    in the profile to be created.” This is essential for the profile to be created
    correctly.


    Click on the magnifying glass next to “No WebLogic Domain Selected.” A pop-up
    will show available WebLogic domains ([Figure 2-8](#9781484202395_Ch02.xhtml#Fig8)).


    ![9781484202395_Fig02-08.jpg](Images/9781484202395_Fig02-08.jpg)


    [Figure 2-8](#9781484202395_Ch02.xhtml#_Fig8). Selecting a target to add to the
    WebLogic domain in the EM12c console


    You can simplify the search, but most environments have only a few WebLogic servers.
    Choose the one that you wish to use from the list and click Select.


    The Configure page will require you to review the data you’ve chosen so far ([Figure
    2-9](#9781484202395_Ch02.xhtml#Fig9)). Correctly set a working directory that
    exists and has at least 200 MB of free space for work files. If you set the working
    directory incorrectly or if there is not enough space, the job will fail, which
    will leave profile components to be cleaned up and recreated from the beginning
    of this step. This also is in no way your final storage location for your profile,
    and all working files will be cleaned up after processing.


    ![9781484202395_Fig02-09.jpg](Images/9781484202395_Fig02-09.jpg)


    [Figure 2-9](#9781484202395_Ch02.xhtml#_Fig9). Configuring the provisioning profile
    for the WebLogic domain to be used with the software library setup


    Ensure the credentials are set properly, creating new ones if necessary, but hopefully
    by this time you will have created preferred credentials, as is best practice.


    Once you have verified that the information on the Configure page of the wizard
    is correct, click Next.


    If you are satisfied with the information on the Review page (no upload of any
    files is required, so don’t be alarmed when it shows that there aren’t any files
    at this time in the bottom section), click Save and Upload.


    A job will now be submitted for the task, and you will receive confirmation ([Figure
    2-10](#9781484202395_Ch02.xhtml#Fig10)).


    ![9781484202395_Fig02-10.jpg](Images/9781484202395_Fig02-10.jpg)


    [Figure 2-10](#9781484202395_Ch02.xhtml#_Fig10). Confirmation of job submittal
    for the WebLogic Domain Provisioning Profile creation


    As the job is managed by the Enterprise Manager Job Service, you can now click
    on Enterprise, Jobs, and Job Activity to monitor the job like any other job submitted
    through this feature ([Figure 2-11](#9781484202395_Ch02.xhtml#Fig11)).


    ![9781484202395_Fig02-11.jpg](Images/9781484202395_Fig02-11.jpg)


    [Figure 2-11](#9781484202395_Ch02.xhtml#_Fig11). Monitoring the provisioning profile
    job within the Job Activity view in the EM12c console


    You may need to refresh the console view as the job is running and then again
    after the job has completed. You may need to change the Activity view status to
    All or Successful in order to view the completed job. The job takes a significant
    amount of time, but you can see the job directory on the server within the working
    directory in which you choose to place the working files (for this example, I
    chose to create a temp folder in /u01/home/oracle/, as shown in [Figure 2-12](#9781484202395_Ch02.xhtml#Fig12)).'
  trans: '# WebLogic 服务器配置要求与概览


    为了提供最新的插件、管理包以及对 Enterprise Manager 云环境的完全访问，必须使 WebLogic 服务器对`企业管理器命令行界面 (EM
    CLI)`可用并与其同步。


    ## 要求


    为了在`OMS`上安装`EM CLI`之前了解相关要求，请确保`WebLogic 域配置配置文件`的创建方式满足：软件库中存档并存储了属于该域的`中间件主目录`，作为
    WebLogic 域的一部分。


    ## 创建 WebLogic 域配置配置文件


    配置配置文件由三个组件组成：


    *   一个中间件主目录

    *   WebLogic 服务器组件使用的二进制文件

    *   配置配置文件的域配置


    如果只是让管理员或超级管理员登录到`EM12c`环境，是不足以完成`WLS`域配置配置文件的。要完成此任务，您必须具备以下条件：


    *   `WLS`以及参与配置设置的任何其他主机的主机凭据。这些凭据是初始安装`OEM`时所必需的。

    *   所有目标必须启用`Java 必需文件 (JRF)`，这些文件由`Enterprise Manager`发现和监控。


    以超级用户身份登录到`Enterprise Manager Cloud Console`，然后依次单击`Enterprise`（企业）、`Provisioning
    and Patching`（配置与修补）和`Software Library`（软件库），如图 2-1 所示。


    ![9781484202395_Fig02-01.jpg](img/9781484202395_Fig02-01.jpg)


    图 2-1. 在`EM12c`控制台中访问软件库


    进入`软件库`后，您需要创建一个文件夹来存储配置文件（图 2-2）。


    ![9781484202395_Fig02-02.jpg](img/9781484202395_Fig02-02.jpg)


    图 2-2. 在软件库中创建用于配置、修补或安装的新文件夹


    `软件库`已有一组预定的子目录可用。在我们的示例中，我们将创建一个名为`Profile_Home`的新目录，为其添加明确的描述，并将其保存到新定义的`Networks`子目录中（图
    2-3）。


    ![9781484202395_Fig02-03.jpg](img/9781484202395_Fig02-03.jpg)


    图 2-3. 创建将用于 WebLogic`EM CLI`安装的`Profile_Home`文件夹及其详细信息


    对条目满意后，单击`确定`。系统将显示目录创建成功，以及软件库目录树中新子目录的位置（图 2-4）。


    ![9781484202395_Fig02-04.jpg](img/9781484202395_Fig02-04.jpg)


    图 2-4. 确认在软件库的`Networks`目录中成功创建文件夹


    您将返回到软件库主菜单。再次单击`操作`、`创建实体`，然后单击`组件`（图 2-5）。


    ![9781484202395_Fig02-05.jpg](img/9781484202395_Fig02-05.jpg)


    图 2-5. `操作`菜单，显示了用于在软件库中访问组件创建操作的展开选项


    组件向导将引导您完成创建实际配置文件的步骤。屏幕上将显示一个下拉菜单；选择最后一个选项`WebLogic 域配置配置文件`（图 2-6）。


    ![9781484202395_Fig02-06.jpg](img/9781484202395_Fig02-06.jpg)


    图 2-6. 在`EM12c`控制台中为`WebLogic 域配置配置文件`创建实体


    选择配置文件子类型后，单击`继续`按钮。


    **注意：** 请不要担心，如果下一步操作返回屏幕需要一些时间。在`继续`步骤会有一个延迟。


    当向导到达组件的详细信息页面时，输入以下内容（图 2-7）：


    *   名称

    *   描述

    *   其他属性（这些设置也可以在 WebLogic 服务器的主页上设置）


    ![9781484202395_Fig02-07.jpg](img/9781484202395_Fig02-07.jpg)


    图 2-7. 为新的`WebLogic 域配置配置文件`填写描述和值


    不要添加任何文件附件或其他信息，只需单击`下一步`。然后，系统将要求您选择一个 WebLogic 服务。在选择之前，请确保选中“将要创建的配置文件的中间件主目录的二进制文件包含在内”复选框。这对于正确创建配置文件至关重要。


    单击“未选择 WebLogic 域”旁边的放大镜。将弹出一个显示可用 WebLogic 域的窗口（图 2-8）。


    ![9781484202395_Fig02-08.jpg](img/9781484202395_Fig02-08.jpg)


    图 2-8. 在`EM12c`控制台中选择要添加到 WebLogic 域的目标


    您可以简化搜索，但大多数环境只有少数几个 WebLogic 服务器。从列表中选择您希望使用的服务器，然后单击`选择`。


    `配置`页面将要求您复查到目前为止选择的数据（图 2-9）。正确设置一个存在的工作目录，该目录至少要有 200 MB 的可用空间用于工作文件。如果工作目录设置不正确或空间不足，作业将失败，这将导致需要清理配置文件组件并从此步骤开始重新创建。这也绝对不是配置文件的最终存储位置，所有工作文件将在处理后被清理。


    ![9781484202395_Fig02-09.jpg](img/9781484202395_Fig02-09.jpg)


    图 2-9. 为将用于软件库设置的 WebLogic 域配置配置文件


    确保凭据设置正确，如果必要则创建新凭据，但希望到此时您已按照最佳实践创建了首选凭据。


    确认向导`配置`页面上的信息正确后，单击`下一步`。


    如果您对`复查`页面上的信息满意（此时无需上传任何文件，所以当底部部分显示没有任何文件时请不要担心），请单击`保存并上传`。


    现在将为该任务提交一个作业，您将收到确认信息（图 2-10）。


    ![9781484202395_Fig02-10.jpg](img/9781484202395_Fig02-10.jpg)


    图 2-10. 确认`WebLogic 域配置配置文件`创建作业已提交


    由于该作业由`Enterprise Manager 作业服务`管理，您现在可以依次单击`Enterprise`、`作业`和`作业活动`，像监控通过此功能提交的任何其他作业一样监控该作业（图
    2-11）。


    ![9781484202395_Fig02-11.jpg](img/9781484202395_Fig02-11.jpg)


    图 2-11. 在`EM12c`控制台的`作业活动`视图中监控配置配置文件作业


    在作业运行时以及作业完成后，您可能需要刷新控制台视图。您可能需要将`活动`视图状态更改为`全部`或`成功`才能查看已完成的作业。该作业需要相当长的时间，但您可以在服务器上您选择放置工作文件的工作目录中看到作业目录（在此示例中，我选择在`/u01/home/oracle/`中创建一个临时文件夹，如图
    2-12 所示）。'
- fmt: "![9781484202395_Fig02-12.jpg](Images/9781484202395_Fig02-12.jpg)\n\n## Figure\
    \ 2-12. Viewing the job status from the command line via the working files that\
    \ were created as part of the job\n\nOnce the job has completed you can verify\
    \ that it has done so successfully in one of three ways:\n\n*   Check the Job\
    \ Activity Details to ensure all steps were completed successfully.\n*   Click\
    \ on Enterprise, Patching and Provisioning, then on Middleware and check that\
    \ the profile you just created is listed.\n*   Click on Enterprise, Patching and\
    \ Provisioning, then on Software Library. If you expand the Networks folder into\
    \ its sub-directories, you will be able to see each of the three components that\
    \ made up the profile, and they all should show a successful status.\n\n## Filtering\
    \ Out Fusion Middleware\n\nWith the provisioning profile out of the way, you can\
    \ now reduce the number of procedures in your onscreen list by filtering out Fusion\
    \ Middleware. This is done by creating a new properties file template for a Fusion\
    \ Middleware Provisioning Procedure (`FMWPROV`) procedure by the corresponding\
    \ Global Universal Identifier (`GUID`). The `FMWPROV` procedure is submitted to\
    \ completion using the updated properties file.\n\n### Obtaining the GUID and\
    \ Creating the Properties File\n\nTo capture the `GUID` for the deployment procedure,\
    \ the `emcli` command is as follows:\n\n```\n> emcli get_procedures | grep FMWPROV\n\
    ```\n\nYour result will be the following:\n\n```\n<proc_guid>, <procedure_type>,\
    \ <display_name>, <version>, <parent_name>\n```\n\nOutput appears like:\n\n```\n\
    > emcli get_procedures | grep FMWPROV\nF5143FC2A0D94E37E043BB76F00ADE34 FMW Provisioning\
    \ FMWPROV_DP Provision Middleware 5.0 ORACLE\n```\n\nUsing the `GUID` above, prepare\
    \ the properties file template:\n\n```\n> emcli describe_procedure_input -procedure=F5143FC2A0D94E37E043BB76F00ADE34\
    \ >FMVtmp.properties\n> A properties file with the name FMVtmp.properties is created\n\
    ```\n\nOnce the file is created, open the file with `vi` and update it with those\
    \ properties required to complete the necessary data for the `FMV` provisioning\
    \ (seen in red in [Figure 2-13](#9781484202395_Ch02.xhtml#Fig13); will need to\
    \ be updated with the values for your environment):\n\n![9781484202395_Fig02-13.jpg](Images/9781484202395_Fig02-13.jpg)\n\
    \n## Figure 2-13. Example of filled-out properties file to be used in fulfilling\
    \ request for procedure calls with EM CLI\n\nSave the updated template file and\
    \ submit the procedure to complete the provisioning:\n\n```\n> emcli submit_procedure\
    \ -input_file=data:FMVtmp.properties -procedure= F5143FC2A0D94E37E043BB76F00ADE34\n\
    ```\n\n### Scaling a Middleware Deployment\n\nOne of the biggest strengths of\
    \ provisioning is scalability. `EM12c` offers the opportunity to increase the\
    \ cluster’s capacity with additional server instances. The option to scale a managed\
    \ server up and out—using `EM CLI` commands along with the `SCALEUP` procedure\
    \ and the instance `GUID`—is required in order to create the input properties\
    \ file for the procedure. Once the properties file is updated, the `SCALEUP` procedure\
    \ can be submitted:\n\n```\n> emcli get_procedures | grep SCALEUP\nB95E01B1F145B5EEE050634DC8854DC,\
    \ FMW Provisioning, SCALEUP DP, Scale up/Scale out Middleware, 2.0, ORACLE\n```\n\
    \nOnce this information is returned, you can use the `GUID` information to create\
    \ the properties file. This process must be submitted at least once for the target\
    \ `GUID` to create the properties file or an error will occur:\n\n```\n> emcli\
    \ get_instance_data –instance= B95E01B1F145B5EEE050634DC8854DC > instancetmp.properties\n\
    A properties file with the name instancetmp.properties is created.\n```\n\nOpen\
    \ the properties file in an editor and enter the updated information, then save.\
    \ Once updates are completed, you must submit the procedure:\n\n```\n> emcli submit_procedure\
    \ –input_file: instancetmp.properties –procedure=B95E01B1F145B5EEE050634DC8854DC\n\
    ```\n\nThis will complete the process of submitting the procedure to scale up\
    \ a middleware deployment.\n\n## Jython\n\nPython has been around for quite a\
    \ while and will continue to grow in popularity as a relatively easy and robust\
    \ development language. But what is “Jython”?\n\n`Jython`, by the simplest definition,\
    \ is the `Java` implementation of the `Python` language. Like `Python`, the syntax\
    \ is simple to learn, self-formatted, and does not require compilation (like `Perl`)\
    \ before the code can be used.\n\nBeginning with `EM12c Release 3`, the `EM CLI`\
    \ includes an embedded `Jython` interpreter. The function calls, also known as\
    \ verbs, are executed with their corresponding key-value pairs or parameters presented\
    \ as verb arguments. The purpose and use of verbs is explained later in this book.\n\
    \nIf utilizing interactive mode, the interpreter opens a shell where simpler commands\
    \ are issued, rather than shell-scripting mode where the interpreter accepts a\
    \ scripted list of commands to process as a program, or rather than when simply\
    \ exercising `EM CLI` at the command prompt. The advantage, of course, is that\
    \ end-users can apply the power of `EM CLI` without being concerned about syntax\
    \ and key-value pairs.\n\nYou can connect to any target in the `Enterprise Manager`\
    \ environment via stateless communication and a security layer in the `OMS` so\
    \ as to utilize `Jython` with `EM CLI`. There is a simple and generic list function\
    \ within the `Enterprise Manager` resources, as well as an ability to run user-defined\
    \ `SQL` queries to access published repository views.\n\nTo execute a script written\
    \ in `Jython`, the command can be as simple as executing it from the command line\
    \ interactively, much as you would a `SQL` script:\n\n```\n> emcli @test_python_scrpt.py\n\
    ```\n\nTo run in interactive mode, you would need to start the `EM CLI` program:\n\
    \n```\n> emcli <enter>\nemcli>\n```\n\nThe `Jython`-based scripting environment\
    \ allows interactive processing and a simple scripting mode with a standardized\
    \ format using `JSON`. `JSON` stands for `Java Script Object Notation`. `JSON`\
    \ format is also fairly simple. It requires only the representative data for collections\
    \ of names and value pairs. These pairs are then housed within arrays, maps, or\
    \ lists to ensure manageability.\n\nSimilar to `XML`, `JSON` corresponds to how\
    \ both developers and environment systems read data, but it doesn’t have the metadata\
    \ overhead that is required for `XML`, referred to as elements and attribute names.\n\
    \n## Supported Java Versions\n\n`EM CLI` requires proper `Java` version support,\
    \ which is also a requirement for advanced scripting with `Jython`, so knowledge\
    \ of `Java` versions is important. The copy of `EM CLI` installed on your `OMS`\
    \ during standard product installation relies on the `JAVA_HOME` already in place\
    \ for `OEM`.\n\n`EM CLI` on other locations (such as your desktop) must have the\
    \ `JAVA_HOME` set, and it requires `Java` version `1.6.0.43` or greater.\n\nIf\
    \ using `Jython`, `Java` must be installed and set before installing the `EM CLI`\
    \ advanced kit (`emcliadvancedkit.jar`). `Windows 8` and `8.1` will experience\
    \ errors unless `Java` version `1.7.0.17` is present. Compatibility matrices are\
    \ available at `My Oracle Support`.\n\n> **Tip**  Windows servers will often recommend\
    \ uninstalling older versions of `Java` once new ones are in place. To avoid registry\
    \ issues, ensure that:\n> *   no other `ORACLE_HOME` is utilizing the `Java` version\
    \ in its path, and\n> *   the older version of `Java` is uninstalled *before*\
    \ installing the newer version to prevent any impact to the new installation.\n\
    \n## Path and Environment Variables\n\nTo execute `EM CLI` verbs, no matter if\
    \ they are `Python` or otherwise, you will need a connection to the `OMS`. This\
    \ will require environment variables to be set (also known as client properties)\
    \ as part of the `EM CLI` scripting environment. You can inspect all possible\
    \ client properties by utilizing the help option in the `EM CLI`:\n\n```\n> emcli>help('client_properties')\n\
    \        EMCLI_OMS_URL\n        EMCLI_USERNAME\n        EMCLI_AUTOLOGIN\n    \
    \    EMCLI_TRUSTALL\n        EMCLI_VERBJAR_DIR\n        EMCLI_CERT_LOC\n     \
    \   EMCLI_LOG_LOC\n        EMCLI_LOG_LEVEL\n        EMCLI_OUTPUT_TYPE(status())\n\
    ```"
  raw: "![9781484202395_Fig02-12.jpg](Images/9781484202395_Fig02-12.jpg)\n\n[Figure\
    \ 2-12](#9781484202395_Ch02.xhtml#_Fig12). Viewing the job status from the command\
    \ line via the working files that were created as part of the job\n\nOnce the\
    \ job has completed you can verify that it has done so successfully in one of\
    \ three ways:\n\n*   Check the Job Activity Details to ensure all steps were completed\
    \ successfully.\n*   Click on Enterprise, Patching and Provisioning, then on Middleware\
    \ and check that the profile you just created is listed.\n*   Click on Enterprise,\
    \ Patching and Provisioning, then on Software Library. If you expand the Networks\
    \ folder into its sub-directories, you will be able to see each of the three components\
    \ that made up the profile, and they all should show a successful status.\n\n\
    Filtering Out Fusion Middleware\n\nWith the provisioning profile out of the way,\
    \ you can now reduce the number of procedures in your onscreen list by filtering\
    \ out Fusion Middleware. This is done by creating a new properties file template\
    \ for a Fusion Middleware Provisioning Procedure (FMWPROV) procedure by the corresponding\
    \ Global Universal Identifier (GUID). The FMWPROV procedure is submitted to completion\
    \ using the updated properties file.\n\nTo capture the GUID for the deployment\
    \ procedure, the `emcli` command is as follows:\n\n```\n> emcli get_procedures\
    \ | grep FMWPROV\n```\n\nYour result will be the following:\n\n```\n<proc_guid>,\
    \ <procedure_type>, <display_name>, <version>, <parent_name>\n```\n\nOutput appears\
    \ like:\n\n```\n> emcli get_procedures | grep FMWPROV\nF5143FC2A0D94E37E043BB76F00ADE34\
    \ FMW Provisioning FMWPROV_DP Provision Middleware 5.0 ORACLE\n```\n\nUsing the\
    \ GUID above, prepare the properties file template:\n\n```\n> emcli describe_procedure_input\
    \ -procedure=F5143FC2A0D94E37E043BB76F00ADE34 >FMVtmp.properties\n> A properties\
    \ file with the name FMVtmp.properties is created\n```\n\nOnce the file is created,\
    \ open the file with vi and update it with those properties required to complete\
    \ the necessary data for the FMV provisioning (seen in red in [Figure 2-13](#9781484202395_Ch02.xhtml#Fig13);\
    \ will need to be updated with the values for your environment):\n\n![9781484202395_Fig02-13.jpg](Images/9781484202395_Fig02-13.jpg)\n\
    \n[Figure 2-13](#9781484202395_Ch02.xhtml#_Fig13). Example of filled-out properties\
    \ file to be used in fulfilling request for procedure calls with EM CLI\n\nSave\
    \ the updated template file and submit the procedure to complete the provisioning:\n\
    \n```\n> emcli submit_procedure -input_file=data:FMVtmp.properties -procedure=\
    \ F5143FC2A0D94E37E043BB76F00ADE34\n```\n\nOne of the biggest strengths of provisioning\
    \ is scalability. EM12c offers the opportunity to increase the cluster’s capacity\
    \ with additional server instances. The option to scale a managed server up and\
    \ out`—`using EM CLI commands along with the SCALEUP procedure and the instance\
    \ GUID`—`is required in order to create the input properties file for the procedure.\
    \ Once the properties file is updated, the SCALEUP procedure can be submitted:\n\
    \n```\n> emcli get_procedures | grep SCALEUP\nB95E01B1F145B5EEE050634DC8854DC,\
    \ FMW Provisioning, SCALEUP DP, Scale up/Scale out Middleware, 2.0, ORACLE\n```\n\
    \nOnce this information is returned, you can use the GUID information to create\
    \ the properties file. This process must be submitted at least once for the target\
    \ GUID to create the properties file or an error will occur:\n\n```\n> emcli get_instance_data\
    \ –instance= B95E01B1F145B5EEE050634DC8854DC > instancetmp.properties\nA properties\
    \ file with the name instancetmp.properties is created.\n```\n\nOpen the properties\
    \ file in an editor and enter the updated information, then save. Once updates\
    \ are completed, you must submit the procedure:\n\n```\n> emcli submit_procedure\
    \ –input_file: instancetmp.properties –procedure=B95E01B1F145B5EEE050634DC8854DC\n\
    ```\n\nThis will complete the process of submitting the procedure to scale up\
    \ a middleware deployment.\n\nJython\n\nPython has been around for quite a while\
    \ and will continue to grow in popularity as a relatively easy and robust development\
    \ language. But what is “Jython”?\n\nJython, by the simplest definition, is the\
    \ Java implementation of the Python language. Like Python, the syntax is simple\
    \ to learn, self-formatted, and does not require compilation (like Perl) before\
    \ the code can be used.\n\nBeginning with EM12c Release 3, the EM CLI includes\
    \ an embedded Jython interpreter. The function calls, also known as verbs, are\
    \ executed with their corresponding key-value pairs or parameters presented as\
    \ verb arguments. The purpose and use of verbs is explained later in this book.\n\
    \nIf utilizing interactive mode, the interpreter opens a shell where simpler commands\
    \ are issued, rather than shell-scripting mode where the interpreter accepts a\
    \ scripted list of commands to process as a program, or rather than when simply\
    \ exercising EM CLI at the command prompt. The advantage, of course, is that end-users\
    \ can apply the power of EM CLI without being concerned about syntax and key-value\
    \ pairs.\n\nYou can connect to any target in the Enterprise Manager environment\
    \ via stateless communication and a security layer in the OMS so as to utilize\
    \ Jython with EM CLI. There is a simple and generic list function within the Enterprise\
    \ Manager resources, as well as an ability to run user-defined SQL queries to\
    \ access published repository views.\n\nTo execute a script written in Jython,\
    \ the command can be as simple as executing it from the command line interactively,\
    \ much as you would a SQL script:\n\n```\n> emcli @test_python_scrpt.py\n```\n\
    \nTo run in interactive mode, you would need to start the EM CLI program:\n\n\
    ```\n> emcli <enter>\nemcli>\n```\n\nThe Jython-based scripting environment allows\
    \ interactive processing and a simple scripting mode with a standardized format\
    \ using JSON. JSON stands for Java Script Object Notation**.** JSON format is\
    \ also fairly simple. It requires only the representative data for collections\
    \ of names and value pairs. These pairs are then housed within arrays, maps, or\
    \ lists to ensure manageability.\n\nSimilar to XML, JSON corresponds to how both\
    \ developers and environment systems read data, but it doesn’t have the metadata\
    \ overhead that is required for XML, referred to as elements and attribute names.\n\
    \nSupported Java Versions\n\nEM CLI requires proper Java version support, which\
    \ is also a requirement for advanced scripting with Jython, so knowledge of Java\
    \ versions is important. The copy of EM CLI installed on your OMS during standard\
    \ product installation relies on the JAVA_HOME already in place for OEM.\n\nEM\
    \ CLI on other locations (such as your desktop) must have the JAVA_HOME set, and\
    \ it requires Java version 1.6.0.43 or greater.\n\nIf using Jython, Java must\
    \ be installed and set before installing the EM CLI advanced kit (emcliadvancedkit.jar).\
    \ Windows 8 and 8.1 will experience errors unless Java version 1.7.0.17 is present.\
    \ Compatibility matrices are available at My Oracle Support.\n\n![Image](Images/sq.jpg) **Tip**  Windows\
    \ servers will often recommend uninstalling older versions of Java once new ones\
    \ are in place. To avoid registry issues, ensure that:\n\n*   no other ORACLE_HOME\
    \ is utilizing the Java version in its path, and\n*   the older version of Java\
    \ is uninstalled *before* installing the newer version to prevent any impact to\
    \ the new installation.\n\nPath and Environment Variables\n\nTo execute EM CLI\
    \ verbs, no matter if they are Python or otherwise, you will need a connection\
    \ to the OMS. This will require environment variables to be set (also known as\
    \ client properties) as part of the EM CLI scripting environment. You can inspect\
    \ all possible client properties by utilizing the help option in the EM CLI:\n\
    \n```\n> emcli>help('client_properties')\n        EMCLI_OMS_URL\n        EMCLI_USERNAME\n\
    \        EMCLI_AUTOLOGIN\n        EMCLI_TRUSTALL\n        EMCLI_VERBJAR_DIR\n\
    \        EMCLI_CERT_LOC\n        EMCLI_LOG_LOC\n        EMCLI_LOG_LEVEL\n    \
    \    EMCLI_OUTPUT_TYPE(status())\n```"
  trans: "\n![9781484202395_Fig02-12.jpg](img/9781484202395_Fig02-12.jpg)\n\n## 图\
    \ 2-12. 通过作为作业一部分创建的工作文件，从命令行查看作业状态\n\n作业完成后，你可以通过以下三种方式之一验证其是否已成功完成：\n\n*   检查作业活动详情，确保所有步骤均已成功完成。\n\
    *   依次点击“企业”、“修补与置备”，然后点击“中间件”，检查你刚创建的配置文件是否已列出。\n*   依次点击“企业”、“修补与置备”，然后点击“软件库”。如果将“网络”文件夹展开到其子目录，你将能看到构成该配置文件的三个组件，它们都应显示成功状态。\n\
    \n## 过滤掉 Fusion Middleware\n\n配置文件置备完成后，你现在可以通过过滤掉 Fusion Middleware 来减少屏幕上显示的进程列表数量。这是通过为\
    \ Fusion Middleware 置备进程 (`FMWPROV`) 创建一个新的属性文件模板来实现的，该模板通过相应的全局通用标识符 (`GUID`)\
    \ 进行标识。使用更新后的属性文件提交 `FMWPROV` 进程直至完成。\n\n### 获取 GUID 并创建属性文件\n\n要捕获部署进程的 `GUID`，可使用如下\
    \ `emcli` 命令：\n\n```\n> emcli get_procedures | grep FMWPROV\n```\n\n你的结果将是以下格式：\n\
    \n```\n<proc_guid>, <procedure_type>, <display_name>, <version>, <parent_name>\n\
    ```\n\n输出示例如下：\n\n```\n> emcli get_procedures | grep FMWPROV\nF5143FC2A0D94E37E043BB76F00ADE34\
    \ FMW Provisioning FMWPROV_DP Provision Middleware 5.0 ORACLE\n```\n\n使用上面的 `GUID`，准备属性文件模板：\n\
    \n```\n> emcli describe_procedure_input -procedure=F5143FC2A0D94E37E043BB76F00ADE34\
    \ >FMVtmp.properties\n> 一个名为 FMVtmp.properties 的属性文件被创建\n```\n\n文件创建后，使用 `vi`\
    \ 打开该文件，并使用完成 `FMV` 置备所需的必要数据属性进行更新（在图 2-13 中以红色显示；需要替换为你环境的具体值）：\n\n![9781484202395_Fig02-13.jpg](img/9781484202395_Fig02-13.jpg)\n\
    \n## 图 2-13. 用于通过 EM CLI 满足进程调用请求的已填写属性文件示例\n\n保存更新后的模板文件，并提交进程以完成置备：\n\n```\n\
    > emcli submit_procedure -input_file=data:FMVtmp.properties -procedure= F5143FC2A0D94E37E043BB76F00ADE34\n\
    ```\n\n### 扩展中间件部署\n\n置备的主要优势之一是其可扩展性。`EM12c` 提供了通过增加服务器实例来提高集群容量的机会。需要使用 `EM\
    \ CLI` 命令、`SCALEUP` 进程以及实例 `GUID` 来纵向和横向扩展受管服务器，才能创建该进程的输入属性文件。属性文件更新后，即可提交 `SCALEUP`\
    \ 进程：\n\n```\n> emcli get_procedures | grep SCALEUP\nB95E01B1F145B5EEE050634DC8854DC,\
    \ FMW Provisioning, SCALEUP DP, Scale up/Scale out Middleware, 2.0, ORACLE\n```\n\
    \n获取到此信息后，你可以使用 `GUID` 信息创建属性文件。此过程必须针对目标 `GUID` 至少提交一次以创建属性文件，否则会发生错误：\n\n```\n\
    > emcli get_instance_data –instance= B95E01B1F145B5EEE050634DC8854DC > instancetmp.properties\n\
    一个名为 instancetmp.properties 的属性文件被创建。\n```\n\n在编辑器中打开属性文件，输入更新后的信息，然后保存。更新完成后，你必须提交该进程：\n\
    \n```\n> emcli submit_procedure –input_file: instancetmp.properties –procedure=B95E01B1F145B5EEE050634DC8854DC\n\
    ```\n\n这将完成提交进程以扩展中间件部署的过程。\n\n## Jython\n\nPython 已存在相当长一段时间，并将继续作为一种相对易用且功能强大的开发语言而日益普及。但什么是“Jython”？\n\
    \n`Jython`，最简单的定义是，`Python` 语言的 `Java` 实现。与 `Python` 一样，其语法简单易学，具有自我格式化能力，并且（像\
    \ `Perl` 一样）在代码使用前不需要编译。\n\n从 `EM12c 第 3 版` 开始，`EM CLI` 包含了一个嵌入式的 `Jython` 解释器。函数调用（也称为动词）通过其对应的键值对或作为动词参数呈现的参数来执行。动词的目的和用法将在本书后面解释。\n\
    \n如果使用交互模式，解释器会打开一个用于发出更简单命令的 shell，而不是采用 shell 脚本模式（即解释器接受一个命令脚本列表作为程序来处理），也不是简单地以命令行方式使用\
    \ `EM CLI`。其优势当然在于，最终用户无需关心语法和键值对，即可运用 `EM CLI` 的强大功能。\n\n你可以通过 `OMS` 中的无状态通信和安全层，连接到\
    \ `Enterprise Manager` 环境中的任何目标，从而将 `Jython` 与 `EM CLI` 结合使用。`Enterprise Manager`\
    \ 资源中有一个简单通用的列表功能，以及运行用户定义的 `SQL` 查询以访问已发布存储库视图的能力。\n\n要执行用 `Jython` 编写的脚本，命令可以很简单，就像从命令行交互式执行一样，类似于执行\
    \ `SQL` 脚本：\n\n```\n> emcli @test_python_scrpt.py\n```\n\n要在交互模式下运行，你需要启动 `EM\
    \ CLI` 程序：\n\n```\n> emcli <enter>\nemcli>\n```\n\n基于 `Jython` 的脚本环境允许交互式处理和一种使用\
    \ `JSON` 的标准化格式的简单脚本模式。`JSON` 代表 `JavaScript 对象表示法`。`JSON` 格式也相当简单，它只需要名称和值对集合的表示数据。然后，这些对被置于数组、映射或列表中以确保可管理性。\n\
    \n类似于 `XML`，`JSON` 符合开发者和环境系统读取数据的方式，但它没有 `XML` 所需的元数据开销（称为元素和属性名称）。\n\n## 支持的\
    \ Java 版本\n\n`EM CLI` 需要适当的 `Java` 版本支持，这也是使用 `Jython` 进行高级脚本编写的要求，因此了解 `Java`\
    \ 版本非常重要。在标准产品安装过程中安装到你的 `OMS` 上的 `EM CLI` 副本依赖于已为 `OEM` 设置的 `JAVA_HOME`。\n\n\
    位于其他位置（例如你的桌面）的 `EM CLI` 必须设置 `JAVA_HOME`，并且它需要 `Java` 版本 `1.6.0.43` 或更高版本。\n\n\
    如果使用 `Jython`，则必须在安装 `EM CLI` 高级套件 (`emcliadvancedkit.jar`) 之前安装并设置 `Java`。除非存在\
    \ `Java` 版本 `1.7.0.17`，否则 `Windows 8` 和 `8.1` 会出现错误。兼容性矩阵可在 `My Oracle Support`\
    \ 上获取。\n\n> **提示**  Windows 服务器通常建议在安装新版本的 `Java` 后卸载旧版本。为避免注册表问题，请确保：\n> *  \
    \ 没有其他 `ORACLE_HOME` 在其路径中使用该 `Java` 版本，并且\n> *   在安装新版本 *之前* 卸载旧版本的 `Java`，以防止对新安装产生任何影响。\n\
    \n## 路径和环境变量\n\n要执行 `EM CLI` 动词，无论它们是 `Python` 编写还是其他形式，你都需要连接到 `OMS`。这将需要设置环境变量（也称为客户端属性）作为\
    \ `EM CLI` 脚本环境的一部分。你可以利用 `EM CLI` 中的帮助选项检查所有可能的客户端属性：\n\n```\n> emcli>help('client_properties')\n\
    \        EMCLI_OMS_URL\n        EMCLI_USERNAME\n        EMCLI_AUTOLOGIN\n    \
    \    EMCLI_TRUSTALL\n        EMCLI_VERBJAR_DIR\n        EMCLI_CERT_LOC\n     \
    \   EMCLI_LOG_LOC\n        EMCLI_LOG_LEVEL\n        EMCLI_OUTPUT_TYPE(status())\n\
    ```\n"
- fmt: '# Client or Remote Target Installation


    There are various reasons for installing the EM CLI on a remote target. You must
    decide if there is a significant need to do so or if a task that needs to be run
    from the remote target can be accomplished with an `emctl` command instead.


    ## Reasons for Consideration


    Here are two reasons for not installing the EM CLI on a remote target or client:


    1.  **Security**: The EM CLI will be configured to access the OMS, and the security
    risk of doing so should be justified. Any person using the EM CLI on the remote
    target or client will still be required to log in as they would from the OMS installation
    of the EM CLI, but this does pose an added security risk versus a solely OMS-installed
    configuration.

    2.  **Efficiency**: Enterprise Manager Control (`EMCTL`) command can accomplish
    several of the same tasks as EM CLI at the command line, such as issuing a remote
    blackout of a target and so forth. In those cases, there is no need to go through
    a full remote installation and configuration of EM CLI. `EMCTL` uses the existing
    EM agent to perform those tasks, using its standard connections without the need
    for additional passwords or authentication tokens.


    ## Installation Overview


    Now we will review the steps to follow when you have a justified reason to proceed
    with a remote target or client installation of the EM CLI. Desktop installation
    of the EM CLI client is also accomplished with this procedure.


    Downloading and deploying the EM CLI client to remote hosts requires only a few
    steps. The actual EM CLI installation was completed automatically on the OMS host,
    so only remote client installations are required to be done manually. There are
    two kits that come as part of the EM CLI client — the EM CLI standard kit and
    the EM CLI scripting kit. If you wish to use the scripting method outside of the
    OMS host, then both kits are required for the remote installation. The scripting
    kit includes the Jython interpreter, so a secondary interpreter is not required
    for Jython scripting.


    This section will focus solely on the standard kit, while the next section will
    enhance the installation technique by focusing on the advanced (both standard
    and scripting) kit.


    ## Prerequisites


    Before installing, you must meet the following requirements on any client or remote
    target:


    *   EM12c Cloud Control Framework

    *   Java Version 1.6x or higher

    *   Operating System Linux, Sun, HPUX, AIX, or Windows.


    ## Downloading the Kit


    Once these requirements have been met, you must download the kit(s) from one of
    two places. The first is through the EM12c console by clicking on `Setup` > `Command
    Line Interface`, then choosing `Download the EM CLI Standard Kit to your Workstation`.
    Choose a location to which to save the download.


    You can also download it from the OMS Host using the URL link:


    ```

    https://<OMS_HOST>:<port>/em/<swlib_directory>/emcli/kit/emclikit.jar

    ```


    Once you have completed the download of the `emclikit.jar` file, copy it via SCP/FTP
    or other transport utility to the remote server.


    ## Setting Up the Environment


    Upon completing the transfer of the `.jar` file, as with any kit installation,
    ensure your `JAVA_HOME` is set. Depending on your operating system, this may require
    one of the following:


    Unix:


    ```

    > setenv JAVA_HOME /usr/local/packages/j2sdk

    > setenv PATH $JAVA_HOME/bin:$PATH

    > echo $JAVA_HOME

    > echo $PATH

    ```


    Linux:


    ```

    > export JAVA_HOME /usr/bin/jdk6/jre

    > export PATH $JAVA_HOME/bin:$PATH

    > echo $JAVA_HOME $PATH

    ```


    Windows:


    ```

    > set JAVA_HOME D:\progra~1\java\jre

    > echo %JAVA_HOME%

    ```


    ![Image](Images/sq.jpg) `Note` The path will be set in the server’s environment
    variable.


    Then check the Java path as follows:


    Unix/Linux:


    ```

    > which java

    ```


    Windows:


    ```

    C:\users: where java

    ```


    ## Installation Command


    Once the `JAVA_HOME` is verified, the EM CLI standard kit can be quickly installed
    by executing the following command, replacing the `emcli_install_dir` with the
    associated directory in which you wish to install the EM CLI:


    ```

    > $JAVA_HOME/bin/java -jar emclikit.jar -install_dir=<em_cli_home_dir>

    ```


    For Windows, the process is adjusted to take changes for environment variables
    into consideration.'
