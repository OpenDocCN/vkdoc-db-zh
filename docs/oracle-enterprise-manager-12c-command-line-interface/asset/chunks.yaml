  trans: "\n## EMCTL 或 EM CLI\n\nEnterprise Manager 控制实用程序，即 EMCTL，随每个 OEM 代理一起安装，用于手动启动和停止\
    \ OEM 代理以及管理远程主机上的本地功能。\n\nEM CTL 可以像 EM CLI 一样用于启动和停止（但不能删除）OEM 黑屏，但有一个关键优势：EM\
    \ CTL 已经安装和配置好。如果您选择 EM CLI 作为使用 shell 脚本管理远程主机黑屏的工具，则必须在每台主机上手动安装和配置 EM CLI 客户端。EM\
    \ CLI 客户端是 Java 程序的静态安装。客户端软件安装会通过 OEM 本身报告，但不受其管理。如果您的环境中的远程主机数量众多，且您将功能限制为黑屏维护和其他它可管理的任务，那么\
    \ EM CTL 可能是更好的解决方案。第 2 章 中介绍的安装过程提供了一种执行该安装的脚本化方法。\n\n使用 EM CTL 管理黑屏与用于 EM CLI\
    \ 的技术非常相似，并且同样适用于相同的脚本应用程序。\n\n其语法很简单：\n\n```\nemctl start blackout <blackout\
    \ name><target names>\nemctl start blackout <blackout name>  -nodelevel\nemctl\
    \ stop blackout <blackout name>\nemctl status blackout <blackout name>\n```\n\n\
    `nodelevel` 标志会使节点上的所有目标进入黑屏状态，非常适合打补丁活动。\n\n持续时间由 `–d` 标志指定，可以设置为天和小时的组合，如下所示：\n\
    \n```\nemctl start blackout WeekendBlackout  -nodelevel –d 2 12:00\n```\n\n在此示例中，可以将开发节点上所有目标的黑屏计划为在星期五下午\
    \ 6:00 开始，并将持续到星期一早上 6:00（两天十二小时）。\n\n## 使用 EM CLI 管理 OEM 管理员\n\n控制台提供了一种清晰、便捷的方法来管理\
    \ OEM 管理员帐户，但其灵活性使得创建多个帐户时，需要点击所有屏幕，变得非常不便。根据作者统计，在控制台中创建一个新的管理员至少需要 17 次鼠标点击！EM\
    \ CLI 将 OEM 代码库固有的灵活性与命令行界面的简洁性相结合。\n\n控制台中定义的所有选项都可以使用下面显示的标志作为选项在 EM CLI 中授予。要创建一个管理员，您只需为帐户指定名称和密码：\n\
    \n```\nemcli create_user -name=\"SuzyQueue\"-password=\"oracle\"\n```\n\n如果您正在阅读\
    \ Apress 出版的书籍，就不会忽略用户安全性，因此您会希望使用 `-expired=\"true\"` 标志使用户的新密码过期，如下所示：\n\n```\n\
    emcli create_user \\\n  -name=\"SuzyQueue\"\\\n  -password=\"oracle\"\\\n  -expired=\"\
    true\"\n```\n\n其他可选参数允许您执行 OEM 控制台中可用的用户授权，而无需点击流程。\n\n### 角色管理\n\nEnterprise\
    \ Manager 管理员和用户实际上是存储库数据库中的数据库用户帐户。请避免通过 SQL*Plus 授予角色权限的诱惑，因为 OEM 可能会在帐户管理中执行其他操作。\n\
    \n您可以在创建用户时通过添加 `-roles` 参数来添加角色授权：\n\n```\nemcli create_user \\\n  -name=\"SuzyQueue\"\
    \\\n  -password=\"oracle\"\\\n  -roles=\"em_all_administrator\"\n```\n\n您也可以通过\
    \ `grant_roles` 或 `revoke_roles` 动词修改用户：\n\n```\nemcli grant_roles \\\n  -name=\"\
    SuzyQueue\"\\\n-roles=\"em_all_viewer\"\n\nemcli revoke_roles \\\n  -name=\"SuzyQueue\"\
    \\\n  -roles=\"em_all_operator\"\n```\n\n### 使用 Argfile 进行批处理\n\nEM CLI 有一个名为\
    \ `argfile` 的批处理动词，与许多其他 Oracle 参数文件类似，它允许您通过提供一个包含要应用的输入值的文本文件的完全限定路径，在单次 EM\
    \ CLI 执行中执行多个命令。\n\n例如，让我们在 `/tmp/create_several_users.lst` 文件中加载一些用于创建几个用户的 CLI\
    \ 命令：\n\n```\ntouch /tmp/create_several_users.lst\nfor thisADMIN in Sugar Magnolia\
    \ Blossom Blooming, do\n    echo \"create_user -name=${thisADMIN} -password=oracle\
    \ -expired=true\";\ndone\n\ncat /tmp/create_several_users.lst\ncreate_user -name=\"\
    Sugar\"-password=\"oracle\"-expired=\"true\"\ncreate_user -name=\"Magnolia\"-password=\"\
    oracle\"-expired=\"true\"\ncreate_user -name=\"Blossom\"-password=\"oracle\"-expired=\"\
    true\"\ncreate_user -name=\"Blooming\"-password=\"oracle\"-expired=\"true\"\n\n\
    emcli login -username=SYSMAN -password=\"${SECRET_PASSWORD}\"\nemcli sync\nemcli\
    \ argfile \"/tmp/create_several_users.lst\"\n```\n\n使用 argfile 的优点如下：\n\n*   EM\
    \ CLI 实用程序在 argfile 之外被调用，因此动词是串行处理的，无需重新启动 EM CLI。\n*   Argfile 是一个文本文件，您选择的后缀对执行完全没有影响。该示例使用\
    \ `lst` 后缀，但您也可以使用 `cli` 或 `cmd`。\n*   您必须完全限定 argfile 的路径。\n*   此示例不包括文件清理，但我相信您的脚本会包含。\n\
    \n正如您可能猜测的那样，这种方法非常高效，并且 argfile 执行通常运行非常快，因为通过 CLI 实用程序对 OMS 只有一次调用。\n\n### 从文本文件填充\
    \ Argfile\n\n手动创建和编辑 argfile 并非不可能，但有时（总是？）脚本化解决方案更容易且不易出错。例如，如果您收到一个请求，要求为应用组的几个成员提供\
    \ OEM 访问权限，并附带以下 CSV 文件，该怎么办？\n\n![Image](img/sq.jpg) 注意：为清晰起见，本图中包含了反斜杠。请将每个完整字符串放在一行。\n\
    \n如果函数库已经创建，您可以自由地在所有脚本中使用这些相同的函数，甚至在命令行中也可以。例如，假设您需要对特定服务器上的数据库设置黑屏以进行操作系统补丁。在命令行中，您将\
    \ source 函数库，然后根据需要调用函数。文件通过键入一个句点、一个空格和文件名来 source。例如，当您登录到 Unix/Linux 服务器时，您的用户配置文件将\
    \ source `.bashrc` 和 `.bash_profile`（如果 Bash 是您选择的 shell），以将您的环境变量加载到内存中。当您键入\
    \ `env` 命令时，它将反映这些值。Source 其他文件，如函数库，会将新文件中的路径、值、函数或别名加载到内存中，以补充或替换已有的环境变量：\n\n\
    ```\n. /script/oem/emcli_functions.lib\nfor thisSID in suzie, sally, betty, veronica;\
    \ do\n    BO_NAME=os_patch_blackout_${thisSID}\n    echo \"Starting the blackout\
    \ for ${thisSID}\"\n    CreateBlackout ${BO_NAME}\ndone\n```\n\n当工作完成后，您将使用类似的过程进行反向操作：\n\
    \n```\n. /script/oem/emcli_functions.lib\nfor thisSID in suzie, sally, betty,\
    \ veronica; do\n    BO_NAME=os_patch_blackout_${thisSID}\n    EndBlackout ${BO_NAME}\n\
    done\n```\n\n除了简化您的运行时环境（无论是在命令行中还是在脚本中）之外，您还可以确信函数库中的代码已在其他用例中经过测试。函数库还消除了命令输入错误和步骤遗漏的机会。\n\
    \n```\nif [ `emcli get_blackouts | grep ${BO_NAME} | wc -l` -gt 0 ]; then\necho\
    \ \"\\n\\nFound an existing blackout named ${BO_NAME}\"\n        echo \"That blackout\
    \ will be stopped and deleted prior to starting the new one\\n\\n\"\n        emcli\
    \ stop_blackout -name=\"${BO_NAME}\"\n        emcli delete_blackout -name=\"${BO_NAME}\"\
    \nfi\n\nemcli create_blackout -name=\"${BO_NAME}\"\n -add_targets=${thisTARGET}:oracle_database\n\
    \ -schedule=\"duration::360;tzinfo:specified;tzregion:America/Los_Angeles\"\n\
    \ -reason=\"Scripted blackout for maintenance or refresh\"\n}\n\nfunction EndBlackout\
    \ {\n\necho \"\\n\\nStopping blackout '${BO_NAME}' ...\\n\"\nemcli stop_blackout\
    \ -name=\"${BO_NAME}\"\n\necho \"\\n\\nDeleting blackout '${BO_NAME}' ...\\n\"\
    \nemcli delete_blackout -name=\"${BO_NAME}\"\n}\n```\n"
- fmt: "# 使用 EM CLI 进行高级管理\n\n## 准备参数文件\n\n```\ncat manage_request.txt\nlogin,name,department,email\
    \ e123450,\"Jerry\",A100,jerry@samplecorp.com\ne123451,\"Bobby\",A100,bobby@samplecorp.dom\n\
    e123452,\"Phil\",A100,phil@samplecorp.dom\ne123449,\"Robert\",A100,roberth@samplecorp.dom\n\
    e123499,\"Ron\",A100,ronpig@samplecorp.dom\ne123460,\"Bill\",A110,bill@samplecorp.dom\n\
    e123461,\"Mickey\",A110,mickey@samplecorp.dom\ne123491,\"Keith\",A120,keith@samplecorp.dom\n\
    e123492,\"Donna\",A120,donnaj@samplecorp.dom\ne123460,\"Brent\",A120,brent@samplecorp.dom\n\
    ```\n\nWe’ll redirect output from a loop statement to create the argfile, like\
    \ this:\n\n```\ntouch /tmp/user_builder_argfile.lst\n\nfor thisENTRY in `cat manage_request.txt`;\
    \ do\n  LOGIN=`echo ${thisENTRY} | cut -d, -f1`\n  NAME=`echo ${thisENTRY} | cut\
    \ -d, -f2`\n  DEPT=`echo ${thisENTRY} | cut -d, -f3`\n  EMAIL=`echo ${thisENTRY}\
    \ | cut -d, -f4`\necho \"delete_user -name=${NAME} \\n >>/tmp/user_builder_argfile.lst\n\
    echo \"create_user -name=${NAME} \\\n\\t -password=oracle -expired=true \\\n \
    \    \\t -desc=${NAME} \\\n     \\t -department=${DEPT} \\\n     \\t -email=${EMAIL}\
    \ \\\n     \\t -roles=\"EM_USER \\n\"\n>>/tmp/user_builder_argfile.lst\ndone\n\
    echo \"\\n\\nArgfile has been created\\n\"\ncat /tmp/user_builder_argfile.lst\n\
    ```\n\nWe end up with an argfile that looks like this:\n\n```\ndelete_user -name=e123450\n\
    create_user -name=e123450 -password=oracle -expired=true \\\n-desc=Jerry -department=A100\
    \ -email=jerry@samplecorp.com-roles=EM_USER\ndelete_user -name=e123451\ncreate_user\
    \ -name=e123451 -password=oracle -expired=true \\\n-desc=Bobby -department=A100\
    \ -email=bobby@samplecorp.com-roles=EM_USER\n. . .\n```\n\nAt run-time we’ll see\
    \ this:\n\n```\n>emcli argfile /tmp/user_builder_argfile.lst\n>User \"e123450\"\
    deleted successfully\n>User \"e123450\"created successfully\n>User \"e123451\"\
    deleted successfully\n>User \"e123451\"created successfully\n...\n```\n\nIt’s\
    \ fast and efficient because all of the commands are issued to the OMS in one\
    \ CLI session, reducing the overhead of sending each command to the OMS for processing\
    \ as a separate transaction.\n\n## 在 OMS 实例间克隆 OEM 角色和用户\n\n沙盒 OEM 服务器是精心设计的 OEM\
    \ 环境的一部分，但如果没有 EM CLI，将 EM 安全数据从一个存储库复制到另一个可能很困难。本示例结合使用 `SQL*Plus` 和 `EM CLI`\
    \ 从现有环境中收集数据，然后在沙盒中快速、完整地重现它。\n\n首先，我们将针对现有 OEM 存储库数据库中的 `SYSMAN` 模式执行查询，创建三个假脱机文件。这些假脱机文件将成为我们用于构建角色、用户和权限的\
    \ EM CLI 参数文件。\n\n存储库数据库中的 `SYSMAN` 模式包含 OEM 收集或设置的所有信息。当 EM 代理将其最新指标上传到管理服务器时，这些值会发布到\
    \ `SYSMAN` 模式中的表中。每当您在控制台中请求页面时，它都是从 `SYSMAN` 中的数据填充的。\n\n```\n#!/bin/bash# =====================================================\n\
    #  File:        clone_em_users.sh\n#  Purpose:     Copy OEM roles and user account\
    \ between instances\n#  Parameters : None\n# =====================================================\n\
    ARGFILE01=/tmp/argfile_create_roles.txt\nARGFILE02=/tmp/argfile_create_users.txt\n\
    ARGFILE03=/tmp/argfile_grant_roles.txt\n\nsqlplus -S ${SYSMAN_CONNECT} <<EOF 1>/dev/null\n\
    SET ECHO OFF\nSET FEEDBACK OFF HEADING OFF LINES 250 PAGES 999\n\nSPOOL ${ARGFILE01}\n\
    \nSELECT 'create_role -name=\"' || role_name || '\" -description=\"' || description\
    \ || '\"'\nFROM     sysman.gc_roles\nWHERE  role_type= '1';\n\nSPOOL OFF\n\nSPOOL\
    \ ${ARGFILE02}\n\nSELECT   'create_user -name=\"' || user_name || '\" -description=\"\
    ' || user_description || '\" -password='||oracle||\n\"  -expired=\"||true||'\"\
    '\nFROM    sysman.gc_users\nWHERE  user_name NOT IN ('SYSMAN')\nORDER BY user_name;\n\
    \nSPOOL OFF\n\nSPOOL ${ARGFILE03}\n\nSELECT 'grant_roles -name=\"' || user_name\
    \ || '\" -roles=\"' || role_name || '\"'\nFROM     sysman.gc_user_roles;\n\nSPOOL\
    \ OFF\nexit\nEOF\n\nemcli login -user=sysman -pass=${CONSOLE_PWD}\nemcli -argfile\
    \ ${ARGFILE01}\nemcli -argfile ${ARGFILE02}\nemcli -argfile ${ARGFILE03}\n```\n\
    \n## 更改 EM 管理员引用\n\n正如我们在上一节中提到的，您通过 OEM 创建的所有信息都存储在存储库数据库中。OEM 帐户的用户数据存储在 `sysman.mgmt_created_users`\
    \ 表中。当然，您绝不应直接更改存储库中的数据，但您可以将其用作参考数据。\n\n通过 EM 控制台更新单个管理员是简单直接的。但是，如果部门名称更改或一组管理员更换了地点怎么办？\n\
    \n您可以创建一个简短的脚本，通过将部门 200 中的所有员工列表收集到一个假脱机文件中，然后遍历假脱机文件中的每一行，为每个员工创建 `modify_user`\
    \ 语句，从而在部门 200 中的所有人都被分配到部门 500 时更改引用。该脚本由 SQL 和 EM CLI 命令组合而成。目前没有 CLI 动词可以直接收集此信息，因此我们将从存储库中提取它。\n\
    \n为了清晰起见，已删除了提示用户输入时典型的许多错误检查例程：用户提供答案了吗？输入的部门编号是大写还是小写？它们是有效数字吗？可扩展且可靠的脚本必须始终包含这些验证。\n\
    \n```\n#!/bin/bash\n# ===============================================================\n\
    #  File:        change_admin_depts.sh\n#  Purpose:     Change department number\
    \ references for EM admins\n#  Parameters:  None\n# ===============================================================\n\
    read OLD_DEPT?\"Enter the old department number:  \"\nread NEW_DEPT?\"Now enter\
    \ the new department number: \"\n\nsqlplus <Connect String><<EOF\nSET echo OFF\n\
    SET heading OFF feedback OFF page 999\nspool old_department.lst\nSELECT user_name\n\
    FROM     sysman.mgmt_created_users\nWHERE  department = '${OLD_DEPT}';\nspool\
    \ off\nexit\nEOF\n\ntouch myARGFILE.lst\n\nfor thisUSER in `cat old_department.lst`;\
    \ do\n        echo \"modify_user -name=\"${thisUSER}\"-department=\"${NEW_DEPT}\"\
    >>myARGILE.lst\ndone\n\nemcli argfile myARGFILE.lst\n\necho \"\\n\\nDepartment\
    \ settings after the change:\\n\"\nsqlplus <Connect String><<EOF\nSET echo OFF\n\
    SET heading ON pages 999\nSELECT user_name,\n       department\nFROM   sysman.mgmt_created_users\n\
    ORDER BY user_name;\nexit\nEOF\n[ old_department.lst ] && rm –f old.department.lst\n\
    [ myARGFILE.lst ] && rm –f myARGFILE.lst\n```\n\n最后两个步骤清理了运行时创建的临时文件。每个 shell\
    \ 脚本都应该自行清理。上面的语法检查文件是否存在，并在找到时将其删除。您也可以选择构建一个简单的 `if` 语句。\n\n## Shell Getopts\
    \ 命令\n\n除了 `getopts`（复数）外，Linux 还有 `getopt`（单数）命令。本讨论是关于 `getopts` 的。这是一个 shell\
    \ 实用程序，而不是 EM CLI 动词。前面的示例提示用户输入两个部门编号，这对于交互式脚本是可以的，但对于计划作业则不可扩展。您可以在命令行使用位置参数，如下所示：\n\
    \n```\nif [ $1 ]; then\nexport OLD_DEPT=${1}\nelse\nread OLD_DEPT?\"Enter the\
    \ old department number:  \"\nfi\n\nif [ $2 ]; then\n        export NEW_DEPT=${1}\n\
    else\nread NEW_DEPT?\"Enter the new department number:  \"\nfi\n\nif [[ ${OLD_DEPT}\
    \ == ${NEW_DEPT} ]]; then\n        echo \"The values for the old and new departments\
    \ are the same\"\n        < Error handling >\nfi\n```\n\n这种方法依赖于用户输入以正确的顺序呈现。在当前示例中，第一个输入值对应于旧部门，第二个对应于新部门。但是，如果它们顺序不对怎么办？`getopts`\
    \ 命令允许您使用输入标志来避免此问题。"
