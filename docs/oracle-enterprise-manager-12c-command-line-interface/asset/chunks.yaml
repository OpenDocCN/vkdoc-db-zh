    Registration Password:\nThe Resecure operation is in progress for the Agent: acme_qa:3872\n\
    The Agent \"acme_qa:3872\" has been resecured successfully.\n```\n\nThe `agent_resync`\
    \ verb kicks off a job in the repository database to update the status of a blocked\
    \ agent. An agent is placed in blocked status when the repository contains conflicting\
    \ data from the agent upload. This typically happens after unscheduled issues\
    \ affect the agent connection to the OMS. As a result, standard output isn’t informative\
    \ at the command line. While you can click through to the job in the console to\
    \ track the progress, there is no matching option in EM CLI.\n\n```\nemcli resyncAgent\
    \ -agent=acme_qa:3872\nResync job RESYNC_20140422135854 successfully submitted\n\
    ```\n\nEM CLI can also be used to provide detailed information about an agent,\
    \ either listing all of its properties or drilling down to a specific property,\
    \ as shown below.\n\n```\nemcli get_agent_properties -agent_name=acme_qa:3872\n\
    Name                        Value\nagentVersion                12.1.0.3.0\nagentTZRegion\
    \               America/Los_Angeles\nemdRoot                     /opt/oracle/agent12c/core/12.1.0.3.0\n\
    agentStateDir               /opt/oracle/agent12c/agent_inst\nperlBin         \
    \            /opt/oracle/agent12c/core/12.1.0.3.0/perl/bin\nscriptsDir       \
    \           /opt/oracle/agent12c/core/12.1.0.3.0/sysman/admin/ scripts\nEMD_URL\
    \                     https://acme_qa:3872/emd/main/\nREPOSITORY_URL         \
    \     https://myoms.com:4903/empbs/upload\nEMAGENT_PERL_TRACE_LEVEL    INFO\n\
    UploadInterval              15\nTotal Properties :          10\n\nemcli get_agent_property\
    \ -agent_name=acme_qa:3872 -name=agentTZRegion\nProperty Name: agentTZRegion\n\
    Property Value: America/Los_Angeles\n```\n\nDeleting EM Targets with EM CLI\n\n\
    The `delete_targets` verb can be used to remove individual targets or a group\
    \ of related targets. It may seem simpler to select targets individually from\
    \ the console and press the Delete Target button. That’s usually true, but we’ve\
    \ found that under some conditions it’s possible to end up with orphaned targets,\
    \ like an `oracle_dbsys` target type left behind when all its fellow members were\
    \ deleted. Besides, if you have an EM CLI client installed on your desktop you\
    \ can remove the target without logging into the console!\n\nLet’s first look\
    \ at an example of removing an individual target. Let’s say that database bertha\
    \ was finally retired, and so was the related listener  LSNRBERTHA. Both of them\
    \ belong to an `oracle_dbsys` target type.[¹](#9781484202395_Ch04.xhtml#Fn1)\n\
    \nFind Exact Target Names\n\nThe console derives target names and target types\
    \ from session information, so target deletion within the console is sure to use\
    \ the exact name and target type for both of these targets. To find those values,\
    \ we’ll use the `get_targets` verb and a simple grep to distinguish the targets\
    \ we’re interested in.\n\n```\n> emcli get_targets | grep -i bertha\n1       Up\
    \               oracle_database    bertha\n1       Up               oracle_dbsys\
    \         bertha_sys\n1       Up               oracle_listener       LSNRBERTHA_oemdemo.com\n\
    ```\n\nDelete the Target\n\nThe database and listener both belong to the database\
    \ system bertha_sys, so all three can be deleted with one command:\n\n```\n> emcli\
    \ delete_target –type = \"oracle_db_sys\" –name=\"bertha_sys\" –delete_members\n\
    \  Target \"bertha_sys:oracle_dbsys\" deleted successfully\n```\n\nYou can also\
    \ delete individual members, like this:\n\n```\n> emcli delete_target –type =\
    \ \"oracle_listener\" –name=\"LSNRBERTHA\"\n  Target \"LSNRBERTHA:oracle_listener\"\
    \ deleted successfully\n```\n\nHow to Remove an Enterprise Manager Agent with\
    \ One Command\n\nRemoving an EM agent from Enterprise Manager requires removal\
    \ of all the targets managed by that agent and all of their metrics. In the console,\
    \ this requires multiple deletion actions in roughly reverse order of their discovery.\
    \ For instance, when you first deploy an agent to a host, the agent and host become\
    \ the first and second targets known. Then you discover and promote other targets\
    \ residing on the host."
  trans: "\n*   `Pretty` 格式将列标题与结果集数据对齐。\n*   `Script` 格式在标题和结果列的值之间用空格分隔。此格式与 `awk`\
    \ 编程语言配合使用效果极佳。\n*   `Csv` 格式，顾名思义，使用逗号分隔值，以便在电子表格中解析或使用 Shell 的 `cut` 命令处理。\n\
    \n假设您想使用以下命令为 `eamz` 数据库设置 OEM 凭据：\n```\nemcli set_credential -target_type=oracle_database\
    \ -target_name=\"eamz\" \\\n                     -credential_set=DBCredsNormal\
    \ \\\n                     -columns=\"username:dbsnmp;password:Super_S3cret;role:Normal\"\
    \n```\n您的命令会失败，因为 OEM 找不到匹配的目标名称。图 4-1 说明了不同的样式。\n```\nemcli get_targets -targets=\"\
    oracle_database\" -format=\"name:csv\" | grep -i eamz\n```\n![9781484202395_Fig04-01.jpg](img/9781484202395_Fig04-01.jpg)\n\
    图 4-1. 输出样式示例\n\n我们将在本章及下一章中探讨应用此命令的几个示例。\n\n## 代理管理\n\n在桌面上安装 EM CLI 客户端的功能使您无需打开浏览器即可执行\
    \ EM CLI 命令——无需使用控制台或登录到管理服务器主机。这种灵活性使您能够通过众多与代理相关的 EM CLI 命令之一快速控制 OEM 代理。\n\n\
    如前所述，您可以使用 `get_targets` 命令通过将 `get_targets` 结果按目标类型 `oracle_emd` 过滤来查找任何代理的具体名称。这对于代理尤为重要，因为代理名称包含主机名和端口号。\n\
    ```\n> emcli  get_targets –targets=\"oracle_emd\"  –name=\"name:csv\"\nStatus\
    \ ID,Status,Target Type,Target Name\n1,Up,oracle_emd,acme_dev:2480\n1,Up,oracle_emd,acme_qa:3872\n\
    1,Up,oracle_emd,acme_prod:3872\n```\n`targets` 变量也接受包含目标名称和目标类型的成对值，例如：–targets=“acme_qa:oracle_database”\n\
    \n所有通过 OEM 控制台可用的代理管理任务也都可以通过 EM CLI 命令完成。请注意，在以下示例中，每种情况都需要提供 OEM 代理二进制文件所有者/主机用户的密码。\n\
    ```\nemcli stop_agent  -agent=acme_qa:3872 -host_username=oracle\nHost User password:\n\
    The Shut Down operation is in progress for the Agent: acme_qa:3872\nThe Agent\
    \ \"acme_qa:3872\" has been stopped successfully.\n\nemcli start_agent  -agent=acme_qa:3872\
    \ -host_username=oracle\nHost User password:\nThe Start Up operation is in progress\
    \ for the Agent: acme_qa:3872\nThe Agent \"acme_qa:3872\" has been started successfully.\n\
    \nemcli restart_agent  -agent=acme_qa:3872 -host_username=oracle\nHost User password:\n\
    The Restart operation is in progress for the Agent: acme_qa:3872\nThe Agent \"\
    acme_qa:3872\" has been restarted successfully.\n```\n代理有时会在打补丁后或由于中断而与 OMS 不同步，因此需要更新其注册信息，甚至需要代理同步才能允许上传。实现此目的的最简单方法是\
    \ `resecure` 代理以理顺连接。如果您的环境不需要安全的代理，您可以使用与 `secure_agent` 命令相同的语法执行 `unsecure_agent`\
    \ 命令来移除安全关系。\n\n注意，代理可执行文件所有者的密码和 OMS 注册密码都是必需的。\n```\nemcli secure_agent  -agent=acme_qa:3872\
    \ -host_username=oracle\nHost User password:\nRegistration Password:\nThe Secure\
    \ operation is in progress for the Agent: acme_qa:3872\nThe Agent \"acme_qa:3872\"\
    \ has been secured successfully.\n\nemcli resecure_agent  -agent=acme_qa:3872\
    \ -host_username=oracle\nHost User password:\nRegistration Password:\nThe Resecure\
    \ operation is in progress for the Agent: acme_qa:3872\nThe Agent \"acme_qa:3872\"\
    \ has been resecured successfully.\n```\n`agent_resync` 命令会在存储库数据库中启动一个作业，以更新被阻止代理的状态。当存储库包含来自代理上传的冲突数据时，代理会被置于阻止状态。这通常在计划外问题影响代理与\
    \ OMS 的连接后发生。因此，命令行的标准输出信息量不足。虽然您可以点击控制台中的作业来跟踪进度，但 EM CLI 中没有匹配的选项。\n```\nemcli\
    \ resyncAgent -agent=acme_qa:3872\nResync job RESYNC_20140422135854 successfully\
    \ submitted\n```\nEM CLI 还可用于提供有关代理的详细信息，可以列出其所有属性，也可以深入查看特定属性，如下所示。\n```\nemcli\
    \ get_agent_properties -agent_name=acme_qa:3872\nName                        Value\n\
    agentVersion                12.1.0.3.0\nagentTZRegion               America/Los_Angeles\n\
    emdRoot                     /opt/oracle/agent12c/core/12.1.0.3.0\nagentStateDir\
    \               /opt/oracle/agent12c/agent_inst\nperlBin                     /opt/oracle/agent12c/core/12.1.0.3.0/perl/bin\n\
    scriptsDir                  /opt/oracle/agent12c/core/12.1.0.3.0/sysman/admin/\
    \ scripts\nEMD_URL                     https://acme_qa:3872/emd/main/\nREPOSITORY_URL\
    \              https://myoms.com:4903/empbs/upload\nEMAGENT_PERL_TRACE_LEVEL \
    \   INFO\nUploadInterval              15\nTotal Properties :          10\n\nemcli\
    \ get_agent_property -agent_name=acme_qa:3872 -name=agentTZRegion\nProperty Name:\
    \ agentTZRegion\nProperty Value: America/Los_Angeles\n```\n\n## 使用 EM CLI 删除 EM\
    \ 目标\n\n`delete_targets` 命令可用于移除单个目标或一组相关目标。从控制台单独选择目标并按下 `删除目标` 按钮似乎更简单。这通常是正确的，但我们发现，在某些情况下，最终可能会留下孤立目标，例如当其所有同类成员都被删除后遗留的\
    \ `oracle_dbsys` 目标类型。此外，如果您在桌面上安装了 EM CLI 客户端，则无需登录控制台即可删除目标！\n\n### 查找确切的目标名称\n\
    \n控制台从会话信息派生目标名称和目标类型，因此在控制台内删除目标时，会确保使用这两个目标的精确名称和类型。要找到这些值，我们将使用 `get_targets`\
    \ 命令和一个简单的 `grep` 来区分我们感兴趣的目标。\n```\n> emcli get_targets | grep -i bertha\n1 \
    \      Up               oracle_database    bertha\n1       Up               oracle_dbsys\
    \         bertha_sys\n1       Up               oracle_listener       LSNRBERTHA_oemdemo.com\n\
    ```\n\n### 删除目标\n\n数据库和监听器都属于数据库系统 `bertha_sys`，因此可以使用一条命令删除所有三者：\n```\n> emcli\
    \ delete_target –type = \"oracle_db_sys\" –name=\"bertha_sys\" –delete_members\n\
    \  Target \"bertha_sys:oracle_dbsys\" deleted successfully\n```\n您也可以像这样删除单个成员：\n\
    ```\n> emcli delete_target –type = \"oracle_listener\" –name=\"LSNRBERTHA\"\n\
    \  Target \"LSNRBERTHA:oracle_listener\" deleted successfully\n```\n\n## 如何用一条命令移除\
    \ Enterprise Manager 代理\n\n从 Enterprise Manager 中移除 EM 代理需要移除该代理管理的所有目标及其所有指标。在控制台中，这需要按其发现的大致相反顺序执行多个删除操作。例如，当您首次将代理部署到主机时，代理和主机会成为已知的第一和第二个目标。然后，您会发现并提升驻留在该主机上的其他目标。\n"
- fmt: "## 监视目标的删除与代理管理\n\n监视目标的删除顺序与发现顺序相反，以便能正确地从存储库数据库中删除参考数据。目标删除必须从已发现/提升的目标开始，然后是主机，最后是代理。\n\
    \n如果你使用 `-delete_monitored_targets` 标志，`delete_targets` 动词可以在一个命令中移除代理及其所有监视目标。\n\
    \n```\n> emcli delete_target -name=\"<Agent Name>\"\n  -type=\"oracle_emd\"\n\
    \  -delete_monitored_targets\n  -async;\n```\n\n![Image](Images/sq.jpg) **注意**\
    \ 删除前必须先停止代理。\n\n删除代理目标类型的过程与移除其他目标类型非常相似。由于代理名称由主机名和代理端口号组成，我们将先运行 `get_targets`。\n\
    \n```\n> emcli get_targets | grep -i demohost01\n1       Up               host\
    \                     demohost01\n1       Up               oracle_emd        \
    \  demohost01:3872\n\n> emcli delete_target -name=\"demohost01:3872\" -type=\"\
    oracle_emd\" -delete_monitored_targets -async;\nTarget \"LSNRBERTHA:oracle_listener\"\
    \ deleted successfully\n```\n\n代理的完全移除涉及管理服务器（OMS）和远程主机上的操作。参见 [表 4-1](#9781484202395_Ch04.xhtml#Tab1)。\n\
    \n[表 4-1](#9781484202395_Ch04.xhtml#_Tab1). 代理移除任务\n\n| 位置 | 操作 | 示例 |\n| ---\
    \ | --- | --- |\n| 远程主机 | 从代理获取目标名称 | `> emctl status agent &#124; grep \"<Agent\
    \ URL>\"` |\n| 远程主机 | 使用 `emcli` 或 `emctl` 停止代理。你也可以使用本章前面描述的 `emcli stop_agent`\
    \ 动词从 CLI 会话中关闭它。由于完整的代理移除任务包括在远程主机上的 OUI 会话，因此在此情况下执行 `emctl` 命令更简单 | `> emctl\
    \ stop agent` |\n| OMS | 删除目标 | `> emcli delete_target -name=\"<Agent Name>\"\
    ``-type=\"oracle_emd\"``-delete_monitored_targets``-async;` |\n| 远程主机 | 卸载插件和\
    \ sbin 二进制文件。OUI Oracle 主目录移除与 OEM 中目标创建的关系相同。代理主目录是首先创建的，必须作为单独步骤最后删除。 | `cd\
    \ $AGENT_BASE/core/<agent release>/oui/bin``./runInstaller -deinstall –remove_all_files`\
    \ |\n| 远程主机 | 使用 `including_files` 选项卸载代理软件 | |\n\n## 将目标转移到另一个 EM 代理\n\n变化总是会发生。也许你决定将数据库移动到不同的主机，或者你想更改包含\
    \ EM 代理二进制文件的目录。你可以删除并重新发现目标，但这样会丢失其指标历史记录。\n\n你可以使用 `relocate_targets` 动词保留该历史记录，并将特定目标的指标收集和停机责任重新分配给另一个\
    \ EM 代理。\n\n### 工作原理\n\n每个 EM 代理都有自己的 `targets.xml` 文件，位于 `$AGENT_BASE/agent_inst/sysman/emd`。`relocate_targets`\
    \ 动词会更新源主机和目标主机上的这些 XML 文件，并更新存储库中的关系。\n\n代理及其监视的目标必须位于同一主机上。这意味着你不能使用 `relocate_targets`\
    \ 通过不同主机上的代理来监视数据库。此技术仅限于将目标移动到同一主机上的 EM 代理，或执行迁移到另一台服务器的任务。让我们看一个例子。\n\n要将 goldfish\
    \ 数据库及其侦听器从 alice 服务器移动到 buster：\n\n```\nemcli relocate_targets\n  -src_agent=\"\
    alice:3872\"\n  -dest_agent=\"buster:3872\"\n  -target_name=\"goldfish\"\n  -target_type=\"\
    oracle_database\"\n  -copy_from_src\n\nemcli relocate_targets\n  -src_agent=\"\
    alice:3872\"\n  -dest_agent=\"buster:3872\"\n  -target_name=\"lsnrgoldfish\"\n\
    \  -target_type=\"oracle_listener\"\n```\n\n对于此传输，你将使用以下值：\n\n*   `src_agent`=\
    \ alice:3872        （当前代理名称）\n*   `dest_agent`= buster:3872  （目标代理名称）\n*   `target_name`=\
    \ goldfish      （要移动的目标名称）\n*   `target_type`= 该目标的 EM 类型\n\n数据库目标还包括 `copy_from_src`\
    \ 标志以保留其历史记录。每个 EM CLI 命令只能重新定位一个目标。\n\n### OMS 介导的目标\n\n不要对 RAC 数据库或任何类型的 Oracle\
    \ 集群使用 `relocate_targets` 动词。你的管理服务器了解使用 Oracle 软件的集群对象之间的关系，并将自动在集群主机之间调解代理职责。如果你手动将集群目标重新定位到另一个集群中的另一个代理，则存在破坏\
    \ OEM 在集群成员之间关联的风险。\n\n你可以查询存储库数据库以确定哪些目标是 OMS 介导的，如下所示：\n\n```\nSELECT   entity_type,\n\
    \         entity_name,\n         host_name\nFROM     sysman.em_manageable_entities\n\
    WHERE    manage_status =2-- Managed\nAND      promote_status =3-- Promoted\nAND\
    \      monitoring_mode =1-- OMS mediated\nORDERBY  entity_type,entity_name, host_name;\n\
    \nENTITY_TYPE                ENTITY_NAME                            HOST_NAME\n\
    -------------------------  -------------------------------------  --------------------\n\
    cluster                    clust01                                cluster01b.com\n\
    cluster                    clust01                                cluster01b.com\n\
    rac_database               apple                                  cluster01b.com\n\
    rac_database               betty                                  cluster01a.com\n\
    rac_database               jack                                   cluster01b.com\n\
    weblogic_domain            /EMGC_GCDomain/GCDom                   myoms.com\n\
    weblogic_domain            /Farm01_IDMDomain/ID                   myoms.com\n\
    weblogic_domain            /Farm02_IDMDomain/ID                   myoms.com\n\
    ```\n\n## 管理 OEM 管理员\n\n控制台提供了一种清晰、便捷的方法来管理 OEM 管理员帐户，但其灵活性使得创建多个帐户变得非常麻烦，因为需要点击所有屏幕。EM\
    \ CLI 将 OEM 代码库固有的灵活性与命令行界面的简单性相结合。\n\n控制台中定义的所有选项都可以使用下面显示的标志作为 EM CLI 中的选项授予权限。要创建管理员，你只需给帐户一个名称和密码。\n\
    \n```\nemcli create_user -name=\"SuzyQueue\" -password=\"oracle\"\n```\n\n如果你在阅读\
    \ Apress 的书籍，那么你不会忽视用户安全性，因此你会希望使用 `-expired=\"true\"` 标志使用户的新密码过期，如下所示：\n\n```\n\
    emcli create_user -name=\"SuzyQueue\" -password=\"oracle\" -expired=\"true\"\n\
    ```\n\n其他可选参数允许你执行 OEM 控制台中的大多数用户授权操作，而无需点击流程。EM CLI 和 OMS 服务器使用相同的代码库，因此这不足为奇。\n\
    \n### 角色管理\n\n企业管理器管理员和用户作为数据库用户帐户存储在存储库数据库中。避免通过 SQL*Plus 授予角色权限的诱惑，因为 OEM 的内部安全管理可能正在执行其他操作。\n\
    \n你可以通过添加 `-roles` 参数在创建用户时添加角色授权：\n\n```\nemcli create_user -name=\"SuzyQueue\"\
    \ -password=\"oracle\" \\\n                                    -roles=\"em_all_administrator\"\
    \n```\n\n你也可以通过 `grant_roles` 或 `revoke_roles` 动词修改用户：\n\n```\nemcli grant_roles\
    \ -name=\"SuzyQueue\" -roles=\"em_all_viewer\"\n\nemcli revoke_roles -name=\"\
    SuzyQueue\" -roles=\"em_all_operator\"\n```\n\n我们将在下一章中探讨如何使用 shell 脚本构建一组管理员。\n\
    \n### 跟踪管理服务器登录\n\n有时你可能想知道谁登录了你的管理服务器。`list_active_sessions` 动词通过传递 `–details`\
    \ 标志提供该信息及其详细信息，如下所示：\n\n```\nemcli list_active_sessions -details\n```"
  raw: "Monitored targets are removed in the reverse order of discovery so that referential\
    \ data can be removed properly from the repository database. Target removal must\
    \ start with the discovered/promoted targets, then the host, and finally the agent.\n\
    \nThe `delete_targets` verb removes the agent and its monitored targets in just\
    \ one command if you use the `delete_monitored_targets` flag.\n\n```\n> emcli\
    \ delete_target -name=\"<Agent Name>\"\n  -type=\"oracle_emd\"\n  -delete_monitored_targets\n\
    \  -async;\n```\n\n![Image](Images/sq.jpg) **Note**  The agent must be stopped\
    \ prior to deletion.\n\nThe process for deleting the agent target type is very\
    \ similar to that for removing other target types. Since agent names consist of\
    \ the host name and agent port number, we’ll run `get_targets` first.\n\n```\n\
    > emcli get_targets | grep -i demohost01\n1       Up               host      \
    \               demohost01\n1       Up               oracle_emd          demohost01:3872\n\
    \n> emcli delete_target -name=\"demohost01:3872\" -type=\"oracle_emd\" -delete_monitored_targets\
    \ -async;\nTarget \"LSNRBERTHA:oracle_listener\" deleted successfully\n```\n\n\
    Complete removal of the agent involves activities on the management server (OMS)\
    \ as well as work on the remote host. See [Table 4-1](#9781484202395_Ch04.xhtml#Tab1).\n\
    \n[Table 4-1](#9781484202395_Ch04.xhtml#_Tab1). Agent Removal Tasks\n\n| Location\
    \ | Action | Example |\n| --- | --- | --- |\n| Remote host | Get the target name\
    \ from the agent | `> emctl status agent &#124; grep \"<Agent URL>\"` |\n| Remote\
    \ host | Stop the agent with `emcli` or `emctl`.You could also use `emcli stop_agent`\
    \ verb described earlier in this chapter to shut it down from a CLI session. Since\
    \ the complete agent-removal task includes on OUI session on the remote host,\
    \ as in this case it is simpler to execute the `emctl` command | `> emctl stop\
    \ agent` |\n| OMS | Delete the target | `> emcli delete_target -name=\"<Agent\
    \ Name>\"``-type=\"oracle_emd\"``-delete_monitored_targets``-async;` |\n| Remote\
    \ host | Uninstall plugin and sbin binaries.OUI Oracle home removal carries the\
    \ same relationships as target creation inside OEM. The agent home was created\
    \ first and must be deleted last in a separate step. | `cd $AGENT_BASE/core/<agent\
    \ release>/oui/bin``./runInstaller -deinstall –remove_all_files` |\n| Remote host\
    \ | Uninstall the agent software with the `including_files` option |   |\n\nTransferring\
    \ Targets to Another EM Agent\n\nChanges happen. Perhaps you’ve decided to move\
    \ a database to a different host or you want to change the directory containing\
    \ your EM agent binaries. You could drop and rediscover the targets, but you’d\
    \ lose their metric history.\n\nYou can retain that history and reassign metric\
    \ collection and blackout responsibility for specific targets to another EM agent\
    \ using the `relocate_targets` verb.\n\nHow It Works\n\nEach EM agent has its\
    \ own targets.xml file located in $AGENT_BASE/agent_inst/sysman/emd. The `relocate_targets`\
    \ verb updates those XML files on the source and destination hosts and also updates\
    \ the relationships in the repository.\n\nThe agent and the targets it monitors\
    \ must reside on the same host. That means that you can’t use `relocate_targets`\
    \ to monitor databases through an agent on a different host. This technique is\
    \ limited to moving targets to an EM agent on the same host or to performing a\
    \ migration task to another server. Let’s look at an example.\n\nTo move goldfish\
    \ database and its listener from the alice server to buster:\n\n```\nemcli relocate_targets\n\
    \  -src_agent=\"alice:3872\"\n  -dest_agent=\"buster:3872\"\n  -target_name=\"\
    goldfish\"\n  -target_type=\"oracle_database\"\n  -copy_from_src\n\nemcli relocate_targets\n\
    \  -src_agent=\"alice:3872\"\n  -dest_agent=\"buster:3872\"\n  -target_name=\"\
    lsnrgoldfish\"\n  -target_type=\"oracle_listener\"\n```\n\nFor the transfer you’d\
    \ use these values:\n\n*   `src_agent`= alice:3872        (current agent name)\n\
    *   `dest_agent`= buster:3872  (destination agent name)\n*   `target_name`= goldfish      (name\
    \ of the target to move)\n*   `target_type`= EM types for that target\n\nDatabase\
    \ targets also include the `copy_from_src flag` in order to retain their history.\
    \ You can only relocate one target per EM CLI command.\n\nOMS-Mediated Targets\n\
    \nDo not use the `relocate targets` verb with RAC databases or Oracle clusters\
    \ of any type. Your management server knows about the relationships between clustered\
    \ objects that use Oracle software and will mediate agent responsibilities automatically\
    \ across the clustered hosts. If you manually relocate a clustered target to another\
    \ agent in another cluster you run the risk of corrupting OEM’s associations between\
    \ the cluster members.\n\nYou can query the repository database to determine which\
    \ targets are OMS mediated as follows:\n\n```\nSELECT   entity_type,\n       \
    \  entity_name,\n         host_name\nFROM     sysman.em_manageable_entities\n\
    WHERE    manage_status =2-- Managed\nAND      promote_status =3-- Promoted\nAND\
    \      monitoring_mode =1-- OMS mediated\nORDERBY  entity_type,entity_name, host_name;\n\
    \nENTITY_TYPE                ENTITY_NAME                            HOST_NAME\n\
    -------------------------  -------------------------------------  --------------------\n\
    cluster                    clust01                                cluster01b.com\n\
    cluster                    clust01                                cluster01b.com\n\
    rac_database               apple                                  cluster01b.com\n\
    rac_database               betty                                  cluster01a.com\n\
    rac_database               jack                                   cluster01b.com\n\
    weblogic_domain            /EMGC_GCDomain/GCDom                   myoms.com\n\
    weblogic_domain            /Farm01_IDMDomain/ID                   myoms.com\n\
    weblogic_domain            /Farm02_IDMDomain/ID                   myoms.com\n\
    ```\n\nManaging OEM Administrators\n\nThe console provides a clear, convenient\
    \ method for managing OEM administrator accounts, but its flexibility makes it\
    \ tremendously inconvenient for creating multiple accounts as you click through\
    \ all the screens. EM CLI combines the flexibility inherent in the OEM codebase\
    \ with the simplicity of the command-line interface.\n\nAll of the options defined\
    \ in the console can be granted as options in EM CLI using the flags shown below.\
    \ To create an administrator you only need to give the account a name and password.\n\
    \n```\nemcli create_user -name=\"SuzyQueue\" -password=\"oracle\"\n```\n\nYou\
    \ wouldn’t be reading a book from Apress if you were one to ignore user security,\
    \ so you’ll want to expire the user’s new password with the `-expired=\"true\"\
    ` flag, like this:\n\n```\nemcli create_user -name=\"SuzyQueue\" -password=\"\
    oracle\" -expired=\"true\"\n```\n\nOther optional parameters allow you to perform\
    \ most of the user grants available in the OEM console but without the click-stream.\
    \ Both EM CLI and the OMS server use the same codebase, so this should come as\
    \ no surprise.\n\nRole Management\n\nEnterprise Manager administrators and users\
    \ are stored as database user accounts in the repository database. Resist the\
    \ temptation to grant role privileges through SQL*Plus, since there may be other\
    \ actions being performed by OEM’s internal security management.\n\nYou can add\
    \ role grants while creating the user by adding the `-roles` parameter:\n\n```\n\
    emcli create_user -name=\"SuzyQueue\" -password=\"oracle\" \\\n              \
    \                      -roles=\"em_all_administrator\"\n```\n\nYou can also modify\
    \ the user through the `grant_roles` or `revoke_roles` verbs:\n\n```\nemcli grant_roles\
    \ -name=\"SuzyQueue\" -roles=\"em_all_viewer\"\n\nemcli revoke_roles -name=\"\
    SuzyQueue\" -roles=\"em_all_operator\"\n```\n\nWe’ll discover how to build out\
    \ a set of administrators using shell scripts in the next chapter.\n\nTracking\
    \ Management Server Login\n\nOccasionally you may want to know who is logged in\
    \ to your management servers. The `list_active_sessions` verb provides that information\
    \ with details if you pass the `–details` flag, like this:\n\n```\nemcli list_active_sessions\
    \ -details"
  trans: "\n## 监视目标的删除与代理管理\n\n监视目标的删除顺序与发现顺序相反，以便能正确地从存储库数据库中删除参考数据。目标删除必须从已发现/提升的目标开始，然后是主机，最后是代理。\n\
    \n如果你使用 `-delete_monitored_targets` 标志，`delete_targets` 动词可以在一个命令中移除代理及其所有监视目标。\n\
    \n```\n> emcli delete_target -name=\"<Agent Name>\"\n  -type=\"oracle_emd\"\n\
    \  -delete_monitored_targets\n  -async;\n```\n\n![Image](img/sq.jpg) **注意** 删除前必须先停止代理。\n\
    \n删除代理目标类型的过程与移除其他目标类型非常相似。由于代理名称由主机名和代理端口号组成，我们将先运行 `get_targets`。\n\n```\n>\
    \ emcli get_targets | grep -i demohost01\n1       Up               host      \
    \               demohost01\n1       Up               oracle_emd          demohost01:3872\n\
    \n> emcli delete_target -name=\"demohost01:3872\" -type=\"oracle_emd\" -delete_monitored_targets\
    \ -async;\nTarget \"LSNRBERTHA:oracle_listener\" deleted successfully\n```\n\n\
    代理的完全移除涉及管理服务器（OMS）和远程主机上的操作。参见 表 4-1。\n\n表 4-1. 代理移除任务\n\n| 位置 | 操作 | 示例 |\n\
    | --- | --- | --- |\n| 远程主机 | 从代理获取目标名称 | `> emctl status agent | grep \"<Agent\
    \ URL>\"` |\n| 远程主机 | 使用 `emcli` 或 `emctl` 停止代理。你也可以使用本章前面描述的 `emcli stop_agent`\
    \ 动词从 CLI 会话中关闭它。由于完整的代理移除任务包括在远程主机上的 OUI 会话，因此在此情况下执行 `emctl` 命令更简单 | `> emctl\
    \ stop agent` |\n| OMS | 删除目标 | `> emcli delete_target -name=\"<Agent Name>\"\
    ``-type=\"oracle_emd\"``-delete_monitored_targets``-async;` |\n| 远程主机 | 卸载插件和\
    \ sbin 二进制文件。OUI Oracle 主目录移除与 OEM 中目标创建的关系相同。代理主目录是首先创建的，必须作为单独步骤最后删除。 | `cd\
    \ $AGENT_BASE/core/<agent release>/oui/bin``./runInstaller -deinstall –remove_all_files`\
    \ |\n| 远程主机 | 使用 `including_files` 选项卸载代理软件 | |\n\n## 将目标转移到另一个 EM 代理\n\n变化总是会发生。也许你决定将数据库移动到不同的主机，或者你想更改包含\
    \ EM 代理二进制文件的目录。你可以删除并重新发现目标，但这样会丢失其指标历史记录。\n\n你可以使用 `relocate_targets` 动词保留该历史记录，并将特定目标的指标收集和停机责任重新分配给另一个\
    \ EM 代理。\n\n### 工作原理\n\n每个 EM 代理都有自己的 `targets.xml` 文件，位于 `$AGENT_BASE/agent_inst/sysman/emd`。`relocate_targets`\
    \ 动词会更新源主机和目标主机上的这些 XML 文件，并更新存储库中的关系。\n\n代理及其监视的目标必须位于同一主机上。这意味着你不能使用 `relocate_targets`\
    \ 通过不同主机上的代理来监视数据库。此技术仅限于将目标移动到同一主机上的 EM 代理，或执行迁移到另一台服务器的任务。让我们看一个例子。\n\n要将 goldfish\
    \ 数据库及其侦听器从 alice 服务器移动到 buster：\n\n```\nemcli relocate_targets\n  -src_agent=\"\
    alice:3872\"\n  -dest_agent=\"buster:3872\"\n  -target_name=\"goldfish\"\n  -target_type=\"\
    oracle_database\"\n  -copy_from_src\n\nemcli relocate_targets\n  -src_agent=\"\
    alice:3872\"\n  -dest_agent=\"buster:3872\"\n  -target_name=\"lsnrgoldfish\"\n\
    \  -target_type=\"oracle_listener\"\n```\n\n对于此传输，你将使用以下值：\n\n*   `src_agent`=\
    \ alice:3872        （当前代理名称）\n*   `dest_agent`= buster:3872  （目标代理名称）\n*   `target_name`=\
    \ goldfish      （要移动的目标名称）\n*   `target_type`= 该目标的 EM 类型\n\n数据库目标还包括 `copy_from_src`\
    \ 标志以保留其历史记录。每个 EM CLI 命令只能重新定位一个目标。\n\n### OMS 介导的目标\n\n不要对 RAC 数据库或任何类型的 Oracle\
    \ 集群使用 `relocate_targets` 动词。你的管理服务器了解使用 Oracle 软件的集群对象之间的关系，并将自动在集群主机之间调解代理职责。如果你手动将集群目标重新定位到另一个集群中的另一个代理，则存在破坏\
    \ OEM 在集群成员之间关联的风险。\n\n你可以查询存储库数据库以确定哪些目标是 OMS 介导的，如下所示：\n\n```\nSELECT   entity_type,\n\
    \         entity_name,\n         host_name\nFROM     sysman.em_manageable_entities\n\
    WHERE    manage_status =2-- Managed\nAND      promote_status =3-- Promoted\nAND\
    \      monitoring_mode =1-- OMS mediated\nORDERBY  entity_type,entity_name, host_name;\n\
    \nENTITY_TYPE                ENTITY_NAME                            HOST_NAME\n\
    -------------------------  -------------------------------------  --------------------\n\
    cluster                    clust01                                cluster01b.com\n\
    cluster                    clust01                                cluster01b.com\n\
    rac_database               apple                                  cluster01b.com\n\
    rac_database               betty                                  cluster01a.com\n\
    rac_database               jack                                   cluster01b.com\n\
    weblogic_domain            /EMGC_GCDomain/GCDom                   myoms.com\n\
    weblogic_domain            /Farm01_IDMDomain/ID                   myoms.com\n\
    weblogic_domain            /Farm02_IDMDomain/ID                   myoms.com\n\
    ```\n\n## 管理 OEM 管理员\n\n控制台提供了一种清晰、便捷的方法来管理 OEM 管理员帐户，但其灵活性使得创建多个帐户变得非常麻烦，因为需要点击所有屏幕。EM\
    \ CLI 将 OEM 代码库固有的灵活性与命令行界面的简单性相结合。\n\n控制台中定义的所有选项都可以使用下面显示的标志作为 EM CLI 中的选项授予权限。要创建管理员，你只需给帐户一个名称和密码。\n\
    \n```\nemcli create_user -name=\"SuzyQueue\" -password=\"oracle\"\n```\n\n如果你在阅读\
    \ Apress 的书籍，那么你不会忽视用户安全性，因此你会希望使用 `-expired=\"true\"` 标志使用户的新密码过期，如下所示：\n\n```\n\
    emcli create_user -name=\"SuzyQueue\" -password=\"oracle\" -expired=\"true\"\n\
    ```\n\n其他可选参数允许你执行 OEM 控制台中的大多数用户授权操作，而无需点击流程。EM CLI 和 OMS 服务器使用相同的代码库，因此这不足为奇。\n\
    \n### 角色管理\n\n企业管理器管理员和用户作为数据库用户帐户存储在存储库数据库中。避免通过 SQL*Plus 授予角色权限的诱惑，因为 OEM 的内部安全管理可能正在执行其他操作。\n\
    \n你可以通过添加 `-roles` 参数在创建用户时添加角色授权：\n\n```\nemcli create_user -name=\"SuzyQueue\"\
    \ -password=\"oracle\" \\\n                                    -roles=\"em_all_administrator\"\
    \n```\n\n你也可以通过 `grant_roles` 或 `revoke_roles` 动词修改用户：\n\n```\nemcli grant_roles\
    \ -name=\"SuzyQueue\" -roles=\"em_all_viewer\"\n\nemcli revoke_roles -name=\"\
    SuzyQueue\" -roles=\"em_all_operator\"\n```\n\n我们将在下一章中探讨如何使用 shell 脚本构建一组管理员。\n\
    \n### 跟踪管理服务器登录\n\n有时你可能想知道谁登录了你的管理服务器。`list_active_sessions` 动词通过传递 `–details`\
    \ 标志提供该信息及其详细信息，如下所示：\n\n```\nemcli list_active_sessions -details\n```\n"
