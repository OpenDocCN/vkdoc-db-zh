    # About the Authors


    ![9781484202395_unFM-01.jpg](Images/9781484202395_unFM-01.jpg)


    **Kellyn Pot’Vin- Gorman** is an Oak Table Network Member. She was an Oracle ACE
    Director until joining Oracle as the Consulting Member for the Strategic Customer
    Program, a specialized group of Enterprise Manager specialists. She specializes
    in environment optimization tuning, automation, and creating systems that are
    robust and at the Enterprise level. Kellyn works almost exclusively on mult-TB-size
    databases, including Exadata and solid-state disk solutions and is known for her
    extensive work with both the Enterprise Manager 12c and its command-line interface.
    Her blog, `http://dbakevlar.com`, along with her social media activity under her
    handle, `DBAKevlar`, is well respected for its insight and content. She is the
    co-author of a number of technical books, hosts webinars for ODTUG, OTN, and All
    Things Oracle, and has presented at Oracle Open World, HotSos, Collaborate, and
    KSCOPE, along with numerous other U.S. and European conferences. Kellyn is a strong
    advocate for Women in Technology (WIT), citing both education on topics such as
    stereotypes and the presentation of early opportunities as being part of the path
    to overcoming challenges.


    ![9781484202395_unFM-02.jpg](Images/9781484202395_unFM-02.jpg)


    **Seth Miller** is an Oracle ACE and has been working with Oracle technologies
    since 2005. He has worked as a DBA in a number of industries, including health
    care, medical device manufacturing, and environmental science, and he now works
    as a consultant and an Oracle University Certified Instructor. Seth is a strong
    advocate for Oracle products and the Oracle community, serving as the IOUG Director
    of Volunteer Engagement, serving as the Vice President of the Twin Cities Oracle
    Users Group, engaging in social media conversations concerning Oracle technology,
    and participating in discussions on the Oracle-L mailing list. Seth is a regular
    speaker at the IOUG Collaborate and Oracle OpenWorld conferences, as well as a
    host of webinars for OTN. His blog, `http://sethmiller.org`, features posts related
    to Oracle and other technology. Enterprise Manager has found a special place in
    Seth’s heart as a means of lightening the load of the IT administrator, while
    at the same time empowering them.


    ![99781484202395_unFM-03.jpg](Images/9781484202395_unFM-03.jpg)


    **Ray Smith** is an Oracle ACE and a dedicated IOUG volunteer. He currently serves
    as the Executive Editor of the *SELECT Journal* and Best Practices booklet, along
    with the best job at IOUG—New Speaker Mentor for the COLLABORATE Conference. He
    is a regular speaker at COLLABORATE, Oracle Open World, and at regional user groups.
    Ray’s blog, `http://oramanageability.wordpress.com`, is dedicated to explaining
    the ins and outs of Oracle Enterprise Manager. He recently established the Northwest
    Oracle User Group ‘Women in Technology’ scholarship at Portland State University.
    He is a proud member of the Oracle Enterprise Manager Customer Advisory Board
    and is an unapologetic advocate for OEM.


    # About the Technical Reviewers


    ![9781484202395_unFM-04.jpg](Images/9781484202395_unFM-04.jpg)


    Oracle ACE Director and Electrical Engineer **Hans Forbrich** has been using Oracle
    technologies since 1984. During the 1990s, Hans gained considerable experience
    working with, and for, Oracle in the telecommunications industry across North
    America. He left Oracle at the end of 2002 to start Forbrich Consulting Ltd.,
    a private company specializing in leveraging Oracle licenses through intelligent
    architecture, administration, and training. In his practice, Hans has used the
    Oracle Enterprise Manager family of products, which he has done since their inception
    in the early Oracle 8 time frame.


    Hans has been happily married for over 30 years and has three adult children.
    In his “spare” time, Hans enjoys the arts with his wife, Susanne, and is a member
    of the Edmonton Opera Chorus.


