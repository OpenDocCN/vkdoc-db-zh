  trans: "\n## EM CLI 安全架构与关键功能\n\nEM CLI 的安全架构构建于 Enterprise Manager 12c 环境的架构之上，正如我们上面所讨论的，它通常是首要的安全关注点。通过\
    \ EM CLI 访问 Enterprise Manager 的单点入口是第二个关注点。您将通过 EM CLI 与之交互的远程目标的凭据是第三级访问权限，更需要关注，因为这些目标很可能包含您数据库环境的生产目标。\n\
    \n### EM CLI 设置的安全模式\n\n在讨论第二级安全时，我们将阐述 EM CLI 中安全模式的含义。安全模式 EM CLI 是默认的安装模式，它不会在本地磁盘或日志文件中存储任何\
    \ Enterprise Manager 或 SSO 密码。\n\n默认情况下，EM CLI 登录在达到设定的不活动时间点后会自动超时，用户必须在尝试通过\
    \ EM CLI 发出任何其他命令之前重新登录。\n\n如果您希望将 EM CLI 安置设置为在重新发出动词时自动登录，并要求显式注销 EM CLI，请执行以下命令：\n\
    \n```\n> emcli setup –noautologin\n```\n\n### HTTPS 受信证书\n\n设置 HTTPS 受信证书首先需要快速检查以确认尚未完成。这可以通过以下同步后的\
    \ EM CLI 状态命令来实现，如图 2-17 所示：\n\n```\n> emcli status\n```\n\n![9781484202395_Fig02-17.jpg](img/9781484202395_Fig02-17.jpg)\n\
    \n图 2-17. 从 EM CLI 发出状态调用以查看有关 Enterprise Manager 命令行界面和 https 状态的信息\n\n检查 EM\
    \ URL 值，查看连接是否已在使用安全的 HTTPS URL。如果尚未使用，可以通过 EM CLI 动词调用进行配置：\n\n```\n> emcli setup\
    \ –url=\"http[s]://host:port/em\" –username=\"<username>” [-trustall] [-novalidate]\n\
    ```\n\n系统将要求您提供 `SYSMAN` 密码以完成对 EM 控制台的此安全级别配置更改。输入密码并按回车键以完成设置。运行 `emcli status`\
    \ 动词调用将显示 `EMURL` 的更新值，或者可以使用 `emcli setup` 调用来查看它（图 2-18）。\n\n![9781484202395_Fig02-18.jpg](img/9781484202395_Fig02-18.jpg)\n\
    \n图 2-18. 发出 `setup` 命令以验证 EM CLI 和 Enterprise Manager 控制台所用 EM URL 的安全 https\
    \ 连接\n\n### Release 4 中的重要动词\n\n与 EM12c 的每个版本一样，Release 4 也包含了重大的增强和新动词的引入。Release\
    \ 4 (12.1.0.4) 也不例外，并且有更新的补丁来完成该版本，因为其他产品线的动词依赖项也同时发布了。\n\n#### 金质代理更新动词\n\n“金质代理”动词是那些在补丁中发布而非初始\
    \ Release 4 一部分的动词组之一。它们列在初始的 EM CLI 发布文档和帮助文件中，但实际上直到补丁发布后才可用。参见以下列表：\n\n*  \
    \ `get_agent_update_status`: 显示使用金质映像的所有代理更新结果\n*   `get_not_updatable_agents`:\
    \ 显示无法作为金质映像一部分进行更新的代理\n*   `get_updatable_agents`: 显示给定金质代理映像名称或金质映像系列中可更新的代理\n\
    \n#### BI 发布报表动词\n\nRelease 4 将 BI Publisher 作为安装的一部分包含在内。紧凑型安装现在仅约 300 MB 大小，只需几个\
    \ EM CLI 命令即可授予 Enterprise Manager 用户访问权限和功能：\n\n*   `grant_bipublisher_roles`:\
    \ 授予对 BI Publisher 目录和功能的访问权限\n*   `revoke_bipublisher_roles`: 撤销对 BI Publisher\
    \ 目录和功能的访问权限\n\n#### 云服务动词\n\n随着 Release 4 的发布，云产品得到了显著改进，能够从命令行管理云请求、用户和服务实例数据对于简化云服务的任务管理至关重要：\n\
    \n*   `cancel_cloud_service_requests`: 取消云请求。应提供用户或名称选项\n*   `delete_cloud_service_instances`:\
    \ 根据指定的过滤器删除云服务实例\n*   `delete_cloud_user_objects`: 删除云用户对象，包括云服务实例和请求\n*   `get_cloud_service_instances`:\
    \ 检索云服务实例列表。如果未指定选项，将打印所有实例。\n*   `get_cloud_service_requests`: 检索云请求列表。如果未应用过滤器，将打印所有请求。\n\
    *   `get_cloud_user_objects`: 检索云用户对象列表，包括云服务实例和请求。如果未使用用户选项，将打印所有对象。\n\n####\
    \ 其他动词\n\nRelease 4 对维护间隔（blackouts）进行了重大更改，其中之一是允许在控制台和命令行内进行追溯性维护间隔：\n\n*  \
    \ `create_rbk`: 在给定目标上创建追溯性维护间隔并更新其可用性。使用此 `emcli` 命令需要先在 UI 中启用追溯性维护间隔功能。\n*\
    \   孤儿目标一直是困扰一段时间的问题。新增的合规性增强动词解决了这个问题：\n    *   `fix_compliance_state`: 通过删除对已删除目标的引用来修复合规状态。\n\
    *   以下动词用于支持 WebLogic 环境中的复杂复合目标。设计一个专门用于修改这些目标的动词至关重要：\n    *   `modify_monitoring_agent`:\
    \ 此动词可用于更改配置为监控 WebLogic 域中目标的代理。\n\n#### Fusion Middleware 配置动词\n\nFusion Middleware\
    \ 新增了多个动词并进行了增强，以帮助管理 WebLogic 功能并从命令行构建更多选项：\n\n*   `create_fmw_domain_profile`:\
    \ 从 WebLogic 域创建 Fusion Middleware 配置文件\n*   `create_fmw_home_profile`: 从 Oracle\
    \ 主目录创建 Fusion Middleware 配置文件\n*   `create_inst_media_profile`: 从安装介质创建 Fusion\
    \ Middleware 配置文件\n\n#### 作业动词\n\nEM 作业服务进行了多项增强。这些增强功能使我们能够将作业从一个 EM12c Release\
    \ 2 OMS 导出并导入到相同版本或更高版本的环境中。为了提供更好的作业管理选项，Oracle 还在 Release 4 中通过 EM CLI 添加了更高级的作业控制：\n\
    \n*   `export_jobs`: 导出 EM 中所有匹配的作业定义，包括纠正措施。系统作业和嵌套作业被排除。\n*   `import_jobs`:\
    \ 将所有作业定义（包括来自 zip 文件的纠正措施）导入 EM。创建库作业。EM CLI 登录用户被设置为库作业所有者。\n*   `job_input_file`:\
    \ 在属性文件中指定作业动词的部分或全部属性。在命令行设置的属性会覆盖文件中的值。\n*   `resume_job`: 恢复与过滤条件匹配的一个或一组作业。\n\
    *   `suspend_job`: 挂起与过滤条件匹配的一个或一组作业。\n\n#### 目标数据动词\n"
- fmt: "# CHAPTER 3\n\n## Summary\n\nFor most readers, verb procedural calls have\
    \ been the largest consumer of `EM CLI` work. Being familiar with the significant\
    \ verb changes in `12.1.0.4` is crucial, but for the remainder of the book, we\
    \ are going to build out your knowledge with the goal of scripting within the\
    \ Enterprise Manager Command-Line Interface.\n\n## Terminology and Basics\n\n\
    ![image](Images/frontdot.jpg)\n\n`EM CLI` can seem overwhelming at first, as with\
    \ any command-line utility. But like anything else in technology, the more one\
    \ understands how something works, the more useful and the easier it will be to\
    \ work with.\n\nThere is too much information in `EM CLI` to memorize even a small\
    \ part of it. Documention is as critical as the tool itself. Understanding the\
    \ terminology that the documentation, built-in manuals, and the tool itself use\
    \ will allow you to quickly find what you need by asking the right questions.\
    \ For example, if you are looking for the command to create a user, you need to\
    \ know you are searching for a verb, not a parameter or a variable.\n\nOnce one\
    \ understands `EM CLI`’s terminology, a basic understanding of its functionality\
    \ allows one to immediately get started with basic tasks, and that is where the\
    \ real learning begins. This chapter introduces the basics of `EM CLI` first by\
    \ explaining how it works with Enterprise Manager and then by providing a number\
    \ of detailed examples.\n\n### Terminology: Verbs\n\n`EM CLI` functionality uses\
    \ *verbs* to perform actions. A verb is a task or action in the form of a user\
    \ command that exposes Enterprise Manager functionality. Understanding verbs and\
    \ how they are used to accomplish tasks is essential to fully utilizing `EM CLI`.\n\
    \nVerbs can include one or more parameters. The mode being used determines what\
    \ those parameters look like. For example, when using `EM CLI` in command-line\
    \ mode, the parameters are positional arguments that follow the verb. Each argument\
    \ is preceded by a dash and followed by an equal sign. The argument may then be\
    \ assigned a value, which is usually enclosed with quotation marks.\n\nSome of\
    \ the parameters are required and some are optional. The documentation identifies\
    \ optional arguments by enclosing them in brackets. For example, the `clear_privilege_delegation_setting`\
    \ verb has one required argument and two optional arguments ([Listing 3-1](#9781484202395_Ch03.xhtml#list1)).\n\
    \n**[Listing 3-1](#9781484202395_Ch03.xhtml#_list1). Required and optional parameters\
    \ for the clear_privilege_delegation_setting verb**\n```\nemcli clear_privilege_delegation_setting\n\
    \        -host_names=\"name1;name2;...\"\n        [-input_file=\"FILE:file_path\"\
    ]\n        [-force=\"yes/no\"]\n```\n\nAs of version `12.1.0.3`, there are `362`\
    \ verbs. To more easily help you find and manage verbs, they are grouped into\
    \ `58` categories. The categories represent logical functionality. For example,\
    \ if you were looking for verbs related to patching, you would find them in the\
    \ *Patch Verbs* category. If you were looking for verbs related to blackouts,\
    \ you would look in the *Blackout Verbs* category.\n\nThe verbs are named in a\
    \ way that leaves little doubt as to what they do. Some of the names are short,\
    \ such as `login` and `start_agent`, and some very long, such as `update_monitoring_creds_from_agent`\
    \ and `list_target_privilege_delegation_settings`. This nomenclature has the benefit\
    \ of making it relatively easy to remember verbs as well as making it easy to\
    \ look up a verb based on its functionality.\n\n### Modes\n\n`EM CLI` is invoked\
    \ in one of three different modes. The mode is the method of using `EM CLI`. The\
    \ decision to use one mode over another depends on the purpose and scope of the\
    \ task.\n\n#### Command-line\n\nPrior to version `12.1.0.3`, `EM CLI` operated\
    \ in just one mode—command-line. In command-line mode, `EM CLI` executes one verb\
    \ per invocation of the `emcli` executable. There is no subshell or programming\
    \ interface for `EM CLI` in command-line mode. Any scripting of `EM CLI` needs\
    \ to be done with a shell that can call individual `EM CLI` commands and process\
    \ the output.\n\n#### Interactive\n\nWith the release of version `12.1.0.3`, `EM\
    \ CLI` now includes the classic command-line mode as well as interactive and scripting\
    \ modes. Interactive mode allows `EM CLI` to be invoked as a subshell of whatever\
    \ terminal is being used. When `EM CLI` is running in interactive mode, the prompt\
    \ changes to a custom Python prompt:\n```\ncd $OMS_HOME/bin\n./emcli\nemcli>\n\
    ```\n\n#### Scripting\n\nScripting mode does not have a subshell or a prompt.\
    \ In fact, it is very similar to command-line mode, except that its invocation\
    \ allows as its first parameter a script written in the Python-compatible programming\
    \ language. This script is then executed as if the commands were typed into interactive\
    \ mode. `EM CLI` in scripting mode is invoked one time but unlike while in command-line\
    \ mode, the full functionality of the Python programming language can be used\
    \ to do everything for which a shell is required in command-line mode. In addition,\
    \ scripting mode invokes `EM CLI` in its native form, which makes things like\
    \ parsing the output of commands much easier and more efficient, especially with\
    \ the use of JSON.\n\n### Help!\n\n`EM CLI` has built-in help functionality. Getting\
    \ a general list of available verbs for command-line mode is as simple as executing\
    \ `EM CLI` with the verb `help`. Be prepared for a large amount of data if you\
    \ are not qualifying the command with additional parameters. If you need additional\
    \ information on a particular verb, add the verb as the second parameter.\n\n\
    To use `help` in interactive mode, the help functionality is called by using a\
    \ Python function called `help()`. The `help()` function requires only one parameter—the\
    \ help topic. The help topic can be a verb function as well as certain verb function\
    \ parameters. Be aware that there are help topics included in interactive mode\
    \ that don’t exist in command-line mode. For example, the command-line mode uses\
    \ setup files to hold `EM CLI` properties, but interactive and scripting modes\
    \ do not. The properties are set each time interactive or scripting modes are\
    \ invoked. We can use the `help()` function to view which parameters to use to\
    \ set properties, as shown in [Listing 3-2](#9781484202395_Ch03.xhtml#list2).\n\
    \n**[Listing 3-2](#9781484202395_Ch03.xhtml#_list2). Client properties help page**\n\
    ```\nemcli>help('client_properties')\nEMCLI_OMS_URL             : OMS URL To connect\
    \ to.\nEMCLI_USERNAME            : OMS Username.\nEMCLI_AUTOLOGIN           :\
    \ Possible values are true,false. Default is false.\nEMCLI_TRUSTALL          \
    \  : Possible values are true,false. Default is false.\nEMCLI_VERBJAR_DIR    \
    \     : Location of bindings directory.\nEMCLI_CERT_LOC            : Location\
    \ of a valid certificate file.\nEMCLI_LOG_LOC             : Directory where log\
    \ files will be stored.\nEMCLI_LOG_LEVEL           : Possible values are ALL,INFO,FINE,FINER,WARN,SEVERE.\
    \ Default is SEVERE.\nEMCLI_OUTPUT_TYPE         : Possible values are json, JSON,\
    \ text, TEXT. Default is json in script mode and text in interactive mode.\n```\n\
    \n---\n\n*   `create_assoc`: Creates target association instances\n*   `delete_assoc`:\
    \ Deletes target association instances\n*   `list_allowed_pairs`: Lists allowed\
    \ association types for the specified source and destination target types\n* \
    \  `list_assoc`: Lists associations between the specified source and destination\
    \ targets\n*   `manage_agent_partnership`: Overrides Enterprise Manager’s default\
    \ behavior of automatically assigning partner agents to other agents. A partner\
    \ agent is an agent that, in addition to its other functions, is assigned to another\
    \ agent as its “partner” in order to remotely monitor the availability of that\
    \ agent and its host. This verb is not meant to be commonly used. It is provided\
    \ to support special circumstances where an administrator might want to explicitly\
    \ assign agent partnerships or exclude agents from being partners, or exclude\
    \ agents from being remotely monitored by other agents."
