    Login Time: `2014-04-24 12:07:52.335728`\n\n## Summary\n\n`EM CLI` allows you\
    \ to perform many administrative tasks from the command line and even on your\
    \ desktop. The simple techniques described in this chapter lend themselves handily\
    \ to shell scripting and further automation, as described in the following chapter.\n\
    \n---\n\n[¹](#9781484202395_Ch04.xhtml#_Fn1)There are several target types in\
    \ your environment. During its installation, the `EM` agent discovers the targets\
    \ on the host and associates them with specific target types. A new `Oracle Home`\
    \ is created and the appropriate plug-in is installed for each target type identified.\
    \ The labels of each target type are fixed, and each target is associated with\
    \ one and only one target type.\n\n# CHAPTER 5\n\n![image](Images/frontdot.jpg)\n\
    \n## Automation Through Shell Scripts\n\nAs we discovered in the previous chapter,\
    \ `EM CLI` provides faster means of accomplishing complicated tasks that are ordinarily\
    \ managed through the `OEM` console. The strength of `EM CLI` is leveraged by\
    \ combining `EM CLI` with classic shell-scripting techniques. The examples in\
    \ this chapter are written for use in a `Unix/Linux` environment but, because\
    \ `EM CLI` is a `Java` application, the `CLI` syntax shown here will work just\
    \ as well in other environments.\n\nThis chapter begins with `CLI` scripting fundamentals\
    \ and then works through several examples demonstrating application of the technique.\
    \ In each example, we’ve removed the common housekeeping commands that make scripts\
    \ robust in order to ensure our illustrations are clear. Since those techniques\
    \ apply to any scripted solution, we’ll lay out some fundamental scripting guidelines\
    \ before tackling any `OEM` solutions.\n\nAll the examples in this chapter are\
    \ written using fundamental `bash` shell scripts due to their ubiquity and clarity.\
    \ `Perl` or other languages can be applied to improve script performance, but\
    \ adding that element to this chapter could mask the basics of the techniques\
    \ being demonstrated.\n\nThis chapter begins by laying out some shell-scripting\
    \ fundamentals and advances to building and applying shell functions. Along the\
    \ way we’ll take a look at how to create and control `OEM` blackouts, manage user\
    \ accounts, and work with larger data sets. Finally, we’ll take a look at some\
    \ advanced shell-scripting techniques using `getopts`.\n\n### Best Practices for\
    \ Shell Scripting\n\nEveryone with experience in shell scripting, whether for\
    \ `Windows`, `Linux`, or any other `Unix` variant, has their own preferred techniques.\
    \ Hopefully, the scripts in your environment present a consistent look and feel\
    \ that makes it easy to read and easy to maintain. Best practices for writing\
    \ any program, regardless of shell or operating system, were laid out by the creators\
    \ of `Unix` and documented in *The Art of Unix Programming* by Eric S. Raymond.\
    \ Those guidelines provide a very clear foundation for any programming we perform.\
    \ A free online copy of the book is available at `https://archive.org/details/ost-computer-science-the_art_of_unix_programming`.\n\
    \n#### Logging\n\nMysteries belong on your night stand and not in your `Enterprise\
    \ Manager` environment. Output for any `Unix` program should provide useful, complete,\
    \ and concise screen output at run-time along with thorough log files. Log files\
    \ are created through the redirection of the shell output.\n\n#### Redirection\n\
    \n`Echo` statements direct their standard output to the screen. This type of output\
    \ was one of the earliest capabilities for the `Unix` operating system and makes\
    \ log-file creation a simple extension of the scripts. One can redirect output\
    \ using either one or two elbows (also referred to as chevrons or angle brackets),\
    \ typically pointed to the right. A simple `echo` statement sends standard output\
    \ to the screen.\n\n```bash\necho \"Hello world\"\nHello world\n```\n\nYou can\
    \ redirect that same output directly to a file with a right elbow:\n\n```bash\n\
    echo \"Hello world\"> myFile.lst\ncat myFile.lst\nHello world\n```\n\nSingle right\
    \ elbows create a new file, while double right elbows append output to a file.\n\
    \n```bash\necho \"Shell scripting makes me hungry\">> myFile.lst\necho \"What\
    \ about you?\">> myFile.lst\ncat myFile.lst\nHello world\nShell scripting makes\
    \ me hungry\nWhat about you?\n```\n\nRobust shell scripts are written both for\
    \ unattended scheduled activities (`cron`, for instance) and for interactive execution\
    \ for debugging and one-off use. “Piping to a `tee`” allows immediate feedback\
    \ at the console and also writes standard output to a file, like this:\n\n```bash\n\
    echo \"Hello world\"| tee myFile.lst\nHello world\ncat myFile.lst\nHello world\n\
    ```\n\nAppend to files by tacking `-a` onto your `tee` statement:\n\n```bash\n\
    echo \"Shell scripting makes me hungry\"| tee -a myFile.lst\necho \"What about\
    \ you?\"| tee -a myFile.lst\n```\n\n#### Error Handling\n\nEven the simplest `Unix`\
    \ program expects that your program will make the machine do the work. Poorly\
    \ written scripts make assumptions based on, and perhaps tested against, existing\
    \ installations and configurations. As you well know, nothing stays the same in\
    \ our business, so program for the unexpected.\n\nNothing is as frustrating as\
    \ a program that fails-out when it discovers a problem that it could easily be\
    \ handled by the script. For instance, if your script requires a specific directory\
    \ for logs or staging then the script should create those directories and set\
    \ the proper permissions required by your program:\n\n```bash\nif [ ! -d /tmp/staging\
    \ ]; then\n        mkdir -p /tmp/staging\n        chmod 770 /tmp/staging\nfi\n\
    ```\n\nHung program execution is another area in which your program should anticipate\
    \ failures and test for problem situations before they happen. For example, empty\
    \ files can cause your script to hang, so before `grep`ping file output, you should\
    \ check to see that the file truly exists:\n\n```bash\nif [ -f myFile.lst ]; then\n\
    \  cat myFile.lst | grep \"Hello World\"\nelse\n  echo \"File myFile.lst is missing!\"\
    \n  exit 1\nfi\n```\n\nThere are several other relevant scripting guidelines in\
    \ *The Art of Unix Programming*. The examples we just considered are representative\
    \ of the types of programming fundamentals omitted from this chapter in the interest\
    \ of brevity and clarity.\n\n### Passwords and Shell Scripts"
