- fmt: "A simple script can be created to establish a connection and can be used in\
    \ both interactive and scripting modes. The login script needs to specify the\
    \ URL by which to connect, the SSL authentication method, and a login credential.\
    \ Both of these modes expect a Python script ([Listing 3-8](#9781484202395_Ch03.xhtml#list8)).\n\
    \n### Creating a Login Script\n\n[Listing 3-8](#9781484202395_Ch03.xhtml#_list8).\
    \ Login script to be used in interactive and scripting modes\n\n```\nfrom emcli\
    \ import *\n\nset_client_property('EMCLI_OMS_URL', 'https://oem.example.com:7802/em')\n\
    set_client_property('EMCLI_TRUSTALL', 'true')\n\nmyLogin(username='sysman')\n\n\
    myLogin()\n```\n\nPlacing this text in a file with an extension of `.py` makes\
    \ it a module that can be imported into `EM CLI`. For example, the script can\
    \ be called `login.py` and placed in the `/home/oracle/scripts` directory. However,\
    \ `EM CLI` will not necessarily be able to find the script, because this path\
    \ is not in the default `Jython` path. Explicitly defining the `Jython` search\
    \ path will guarantee that any scripts within that search path can be imported\
    \ by `EM CLI`. The `JYTHONPATH` variable can be supplemented with the additional\
    \ directory:\n\n```\nexport JYTHONPATH=$JYTHONPATH:/home/oracle/scripts\n```\n\
    \nSimilar to how the `EM CLI` `Jython` module was imported into the script with\
    \ the command `from emcli import *`, the login script can be imported into either\
    \ the interactive or scripting modes.\n\n### Establishing a Logon in Interactive\
    \ Mode\n\nTo establish a login in interactive mode, we can simply import the module.\
    \ We will then be prompted to enter the password for the user specified in the\
    \ script. [Listing 3-9](#9781484202395_Ch03.xhtml#list9) shows an example of using\
    \ the login script in interactive mode.\n\n[Listing 3-9](#9781484202395_Ch03.xhtml#_list9).\
    \ Establishing a logon in interactive mode using the login module\n\n```\n[oracle\
    \ ~]$ emcli\nOracle Enterprise Manager 12c EMCLI with Scripting option Version\
    \ 12.1.0.3.0.\nCopyright (c) 1996, 2013 Oracle Corporation and/or its affiliates.\
    \ All rights reserved.\n\nType help() for help and exit() to get out.\n\nemcli>import\
    \ login\nEnter password :  *********\n\nemcli>\n```\n\n### Establishing a Logon\
    \ in Scripting Mode\n\nTo establish a login in scripting mode, import the module\
    \ from within the script being executed. For example, the following script prints\
    \ the total count of Enterprise Manager targets using an `EM CLI` function. But\
    \ first it needs to establish a login by importing the `login` module, as shown\
    \ in [Listing 3-10](#9781484202395_Ch03.xhtml#list10):\n\n[Listing 3-10](#9781484202395_Ch03.xhtml#_list10).\
    \ Establishing a login in scripting mode using the login module\n\n```\nimport\
    \ emcli\nimport login\n\nmytargets = str(len(emcli.get_targets().out()['data']))\n\
    \nprint(mytargets)\n```\n\n## Task: Get a List of Targets\n\nViewing and manipulating\
    \ Enterprise Manager targets are the most common uses of `EM CLI`. Regardless\
    \ of which you are doing, the first step is to retrieve the target information.\n\
    \n### Retrieving All Target Information\n\nThe `get_targets` verb or function\
    \ retrieves a target list along with a number of other columns of information.\
    \ Neither the verb nor function requires parameters to retrieve the full list\
    \ of information, as shown in [Listing 3-11](#9781484202395_Ch03.xhtml#list11).\n\
    \n[Listing 3-11](#9781484202395_Ch03.xhtml#_list11). Retrieve the target information\
    \ using command-line mode\n\n```\n[oracle ~]$ emcli login -username=sysman\nEnter\
    \ password :\n\nLogin successful\n\n[oracle ~]$ emcli get_targets\nStatus  Status\
    \     Target Type     Target Name            ID\n1       Up         host     \
    \       oem.example.com\n1       Up         oracle_emd      oem.example.com:3872\n\
    -9      n/a        oracle_home     common12c1_20_oem\n```\n\n### Filtering the\
    \ Retrieved Targets\n\nThe targets that are retrieved can be filtered by specifying\
    \ a semi-colon-delimited list of target names and target types, which should be\
    \ separated by a colon. There should be no white space anywhere within the target\
    \ list filter. [Listing 3-12](#9781484202395_Ch03.xhtml#list12) shows an example\
    \ of creating a filter with two targets.\n\n[Listing 3-12](#9781484202395_Ch03.xhtml#_list12).\
    \ Limit the targets retrieved by `get_targets` using the `targets` parameter\n\
    \n```\n[oracle ~]$ emcli get_targets \\\n   -targets='oem.example.com:host;oms12c1_3_oem:oracle_home'\n\
    Status  Status     Target Type     Target Name            ID\n1       Up     \
    \    host            oem.example.com\n-9      n/a        oracle_home     oms12c1_3_oem\n\
    ```\n\n### Using Wildcards in the Filter\n\nThe `targets` parameter can use wild\
    \ cards anywhere within the target name or target type values, and multiple wild\
    \ cards can be used for either value, as shown in [Listing 3-13](#9781484202395_Ch03.xhtml#list13).\n\
    \n[Listing 3-13](#9781484202395_Ch03.xhtml#_list13). Use wildcards in the `targets`\
    \ parameter\n\n```\n[oracle ~]$ emcli get_targets \\\n   -targets='oem%:host;oms12c1_%_oem:%oracle%'\n\
    Status  Status     Target Type      Target Name           ID\n1       Up     \
    \    host             oem.example.com\n-9      n/a        oracle_home      oms12c1_3_oem\n\
    ```\n\n### Using `get_targets` in Interactive and Scripting Modes\n\nPython functions\
    \ require a specific format: `function name, followed by an opening parenthesis,\
    \ followed by a comma-delimited list of parameters and their values, followed\
    \ by a closing parenthesis`.\n\nFollowing is an example of a typical python function:\n\
    \n```\nfunction_name(parameter1=value1, parameter2=value2)\n```\n\nSince the `EM\
    \ CLI` verbs in interactive and scripting modes are actually Python functions,\
    \ they will need to follow this format as well.\n\nCalling a function without\
    \ additional parameters only requires the verb and a pair of parentheses. [Listing\
    \ 3-14](#9781484202395_Ch03.xhtml#list14) shows the results of using the `get_targets`\
    \ function in interactive mode without parameters while [Listing 3-15](#9781484202395_Ch03.xhtml#list15)\
    \ shows the same function in scripting mode with the `targets` parameter.\n\n\
    [Listing 3-14](#9781484202395_Ch03.xhtml#_list14). Call the `get_targets()` function\
    \ in interactive mode without parameters\n\n```\n[oracle ~]$ emcli\nOracle Enterprise\
    \ Manager 12c EMCLI with Scripting option Version 12.1.0.3.0.\nCopyright (c) 1996,\
    \ 2013 Oracle Corporation and/or its affiliates. All rights reserved.\n\nType\
    \ help() for help and exit() to get out.\n\nemcli>import login\nEnter password\
    \ :  *********\n\nemcli>get_targets()\nStatus  Status     Target Type      Target\
    \ Name\n          ID\n1       Up         host             oem.example.com\n1 \
    \      Up         oracle_emd       oem.example.com:3872\n-9      n/a        oracle_home\
    \      common12c1_20_oem\n```\n\n[Listing 3-15](#9781484202395_Ch03.xhtml#_list15).\
    \ Call the `get_targets()` function in scripting mode with the `targets` parameter\n\
    \n```\n[oracle ~]$ cat targets2.py\nimport emcli\nimport login\n\nmytargets =\
    \ emcli.get_targets \\\n    (targets='oraoem1%:%;oms12c1_%_oraoem1:%oracle%')\
    \ \\\n    .out()['data']\n\nfor targ in mytargets:\n    print('Target: ' + targ['Target\
    \ Name'])\n\n[oracle ~]$ emcli @targets2.py\nTarget: oraoem1.example.com\nTarget:\
    \ oraoem1.example.com:3872\nTarget: oms12c1_3_oraoem1\n```\n\n## Task: Using Blackouts\n\
    \nAttempting to schedule blackouts to coincide with maintenance tasks on a target\
    \ host can produce false-positive alerts. This can happen when a blackout finishes\
    \ prior to a maintenance activity or when a maintenance activity starts prior\
    \ to a blackout. Both of these scenarios can be avoided by having the maintenance\
    \ job itself start and stop the blackout.\n\nBoth `EMCTL` and `EM CLI` are capable\
    \ of creating, deleting, starting, and stopping blackouts. However, `EMCTL` is\
    \ only capable of managing blackouts for the targets local to the agent host from\
    \ which it is executed, and `EMCTL` commands will only work if the agent is running.\
    \ The limitations of setting blackouts with `EMCTL` are restrictive and prone\
    \ to error. It is recommended to use `EM CLI` to set blackouts from maintenance\
    \ jobs."
