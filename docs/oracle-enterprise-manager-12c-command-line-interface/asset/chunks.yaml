    \ == ${LOCAL_HOST} ]; then\n   echo \"\\n\\n${HAGROUP} 组位于集群的另一端\"\n   echo \"\
    此脚本必须在活动节点 ${ONLINE_NODE} 上运行\\n\\n\\n\"\n   ExitDirty\nFi\n```\n\n# 获取两个节点的 `OEM`\
    \ 代理名称（包括端口）\n# 代理总是安装在静态文件系统上，从不进行故障切换。\n```bash\nNEW_EMD=`$EMCLI get_targets\
    \ | grep ${ONLINE_NODE}  | grep oracle_emd |  awk '{print $NF }'`\nOLD_EMD=`$EMCLI\
    \ get_targets | grep ${OFFLINE_NODE} | grep oracle_emd |  awk '{print $NF }'`\n\
    ```\n\n# 此字符串将在构建 `emcli` 脚本时多次使用\n```bash\nEMCLI_AGENT_STRING=`echo \"-src_agent=\\\
    \"${OLD_EMD}\\\" -dest_agent=\\\"${NEW_EMD}\\\"\"`\n```"
- fmt: "```markdown\n# Create and distill lists of OEM targets\n\nNot all targets\
    \ are managed by OEM, so we need to get a list from the repository that we'll\
    \ compare with the list from VCS.\n\n```bash\necho \"\\n\\nOEM names for the host\
    \ targets related to this change:\"\necho \"  Host after relocation         ${NEW_EMD}\"\
    \necho \"  Local host name               ${OLD_EMD}\"\n```\n\n## 获取并展示 OEM 管理的目标列表\n\
    \n```bash\n$EMCLI get_targets | grep oracle_database | awk '{print $NF}' | sort\
    \ -fu >${EMCLI_DATABASES}\necho \"\\n\\nDatabase targets managed through OEM:\"\
    \nthisFILE=${EMCLI_DATABASES}\nListNicely\n\n$EMCLI get_targets | grep oracle_listener\
    \ | awk '{print $NF}' | sort -fu >${EMCLI_LISTENERS}\necho \"\\n\\nListener targets\
    \ managed through OEM:\"\nthisFILE=${EMCLI_LISTENERS}\nListNicely\n```\n\n## 获取本地\
    \ EM Agent 已知的目标列表\n\nNow we'll do the same thing for targets known to the local\
    \ EM agent. This list may include targets ignored or unpromoted in the repository,\
    \ so we'll treat the agent list as a better choice. If the local agent has no\
    \ targets we'll use the full list from the repository.\n\n```bash\n$EMCTL config\
    \ agent listtargets | grep oracle_database | cut -d\"[\" -f2 | cut -d, -f1 | sort\
    \ -fu >${EMCTL_DATABASES}\necho \"\\n\\nLocal database targets currently associated\
    \ with ${NEW_EMD}:\"\nthisFILE=${EMCTL_DATABASES}\nListNicely\n\n$EMCTL config\
    \ agent listtargets | grep oracle_listener | cut -d\"[\" -f2 | cut -d, -f1 | sort\
    \ -fu >${EMCTL_LISTENERS}\necho \"\\n\\nLocal listener targets currently associated\
    \ with ${NEW_EMD}:\"\nthisFILE=${EMCTL_LISTENERS}\nListNicely\n```\n\n## 用本地 Agent\
    \ 列表覆盖仓库列表（如果存在）\n\nThe longer list from the repository was created in case the\
    \ local agent did not contain any targets. We'll replace the OMR list with the\
    \ targets known to the local agent if any exist.\n\n```bash\nif [ `cat ${EMCTL_DATABASES}\
    \ | wc -l` -gt 0 ]; then\n   cat /dev/null                            >${OEM_DATABASES}\n\
    \   for thisTARGET in `cat ${EMCLI_DATABASES}`; do\n      if [ `cat ${EMCTL_DATABASES}\
    \ | grep -i ${thisTARGET} | wc -l` -eq 0 ]; then\n         echo \"${thisTARGET}\"\
    \              >>${OEM_DATABASES}\n      fi\n   done\nelse\n   mv -f ${EMCLI_DATABASES}\
    \ ${OEM_DATABASES}\nfi\n\n# Same process happens for the listeners\nif [ `cat\
    \ ${EMCTL_LISTENERS} | wc -l` -gt 0 ]; then\n   cat /dev/null                \
    \            >${OEM_LISTENERS}\n   for thisTARGET in `cat ${EMCLI_LISTENERS}`;\
    \ do\n      if [ `cat ${EMCTL_LISTENERS} | grep -i ${thisTARGET} | wc -l` -eq\
    \ 0 ]; then\n         echo \"${thisTARGET}\"              >>${OEM_LISTENERS}\n\
    \      fi\n   done\nelse\n   mv -f ${EMCLI_LISTENERS} ${OEM_LISTENERS}\nfi\n```\n\
    \n## 对比 OEM 目标列表与 Veritas 成员并构建 emcli 脚本\n\n```bash\nif [ `cat ${VCS_DATABASES}\
    \ | wc -l` -gt 0 ]; then\n   cat /dev/null                            >${MOVING_DATABASES}\n\
    \   for thisITEM in `cat ${VCS_DATABASES}`; do\n      cat ${OEM_DATABASES} | grep\
    \ -i ${thisITEM} >>${MOVING_DATABASES}\n   done\nfi\n\ncat /dev/null         \
    \                   >${EMCLI_SCRIPT}\n\nif [ `cat ${MOVING_DATABASES} | wc -l`\
    \ -gt 0 ]; then\n   echo \"\\n\\nThese database targets will be relocated\"\n\
    \   thisFILE=${MOVING_DATABASES}\n   ListNicely\n   for thisITEM in `cat ${MOVING_DATABASES}`;\
    \ do\n      EMCLI_TARGET_STRING=`echo \"-target_name=\\\"${thisITEM}\\\" -target_type=\\\
    \"oracle_database\\\"\"`\n      echo \"set_standby_agent ${EMCLI_AGENT_STRING}\
    \ ${EMCLI_TARGET_STRING}\"  >>${EMCLI_SCRIPT}\n      echo \"relocate_targets \
    \ ${EMCLI_AGENT_STRING} ${EMCLI_TARGET_STRING} -copy_from_src -force=yes\" >>${EMCLI_SCRIPT}\n\
    \   done\nelse\n   echo \"\\n\\nNo database targets need to be migrated to ${NEW_EMD}\"\
    \nfi\n\nif [ `cat ${VCS_LISTENERS} | wc -l` -gt 0 ]; then\n   cat /dev/null  \
    \                          >${MOVING_LISTENERS}\n   for thisITEM in `cat ${VCS_LISTENERS}\
    \ | sed 's/lsnr//'`; do\n      cat ${OEM_LISTENERS} | grep -i ${thisITEM} >>${MOVING_LISTENERS}\n\
    \   done\nelse\n   echo \"\\n\\nVCS has no listeners associated with ${HAGROUP}\
    \ group\"\nfi\n\nif [ `cat ${MOVING_LISTENERS} | wc -l` -gt 0 ]; then\n   echo\
    \ \"\\n\\nThese listener targets will be relocated to ${NEW_EMD}\"\n   thisFILE=${MOVING_LISTENERS}\n\
    \   ListNicely\n   for thisITEM in `cat ${MOVING_LISTENERS}`; do\n      EMCLI_TARGET_STRING=`echo\
    \ \"-target_name=\\\"${thisITEM}\\\" -target_type=\\\"oracle_listener\\\"\"`\n\
    \      echo \"set_standby_agent ${EMCLI_AGENT_STRING} ${EMCLI_TARGET_STRING}\"\
    \ >>${EMCLI_SCRIPT}\n      echo \"relocate_targets  ${EMCLI_AGENT_STRING} ${EMCLI_TARGET_STRING}\
    \ -copy_from_src\" >>${EMCLI_SCRIPT}\n   done\nelse\n   echo \"\\n\\nNo listener\
    \ targets need to be migrated to ${NEW_EMD}\"\nfi\n\nsleep 10\n```\n\n## 显示并执行\
    \ emcli 脚本\n\n```bash\nif [ `cat ${EMCLI_SCRIPT} | wc -l` -gt 0 ]; then\n   echo\
    \ \"\\n\\nEMCLI script\"\n   cat ${EMCLI_SCRIPT}\n   echo \"\\n\\nEMCLI execution\
    \ results\"\n   $EMCLI argfile ${EMCLI_SCRIPT}\nfi\n\necho \"\\n\\nThese targets\
    \ are now tracked by the local OEM agent:\\n\"\n$EMCTL config agent listtargets\
    \ | grep -v \"Cloud\" | grep -v \"reserved.\" | sort -fu\necho \"\\n\\n\\n\"\n\
    \nExitCleanly\n```\n\n# Section 3: Essential Server-Management Scripts\n\nThe\
    \ shell scripts in this section contain various uses of `EM CLI`, including backing\
    \ up all configuration files on your OMS server and then controlling the amount\
    \ of space consumed by OMS log files.\n\nOracle has been very good about providing\
    \ these services for files they deem critical. These scripts take care of all\
    \ the rest.\n\n## Configuration Backup Script\n\nOEM backs up key OMS configuration\
    \ files to the repository database. This script performs a file-level backup for\
    \ those files (and several others). One should use the same shared filesystem\
    \ used by the Software Library as the site of those backups.\n\nThis script only\
    \ creates new backups when it determines that the source file has different content\
    \ than its backup copy. If a difference exists, the old backup is renamed with\
    \ a `.old` suffix. This provides you with another troubleshooting tool that can\
    \ be particularly helpful after OMS patching. You can use file creation dates\
    \ to determine which configuration files changed and then run a quick `diff` command\
    \ to find out how they changed:\n\n```ksh\nSample Script: backup_oms_configs.ksh\n\
    #!/bin/ksh\n\n#===============================================================================\n\
    #  Script name  : backup_oms_configs.ksh\n#  Calling args : None\n#  Purpose \
    \     :   Backup key OMS configuration files\n#===============================================================================\n\
    # Independent variables\n#===============================================================================\n\
    export OMS_HOME=<Set your OMS home directory here>\nexport BACKUP_DIR=<Set backup\
    \ destination directory here>\n```"
