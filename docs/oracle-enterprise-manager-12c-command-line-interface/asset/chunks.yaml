    \    *) echo \"No values were provided for old and new departments\";;\n  esac\n\
    done\n```\n\n这个示例测试了一个名为 `OptValue` 的临时变量是否与预期的字符匹配，并做出相应的响应。命令行中识别为 `-a` 或 `-b`\
    \ 的每一个值都对应一个新部门或旧部门的编号。\n\n```bash\necho $OLD_DEPT\n\necho $NEW_DEPT\n```\n\n\
    在 `getopts` 语句中，后跟冒号 “`:`” 的字符标识表示该标志后将跟随一个字符串。没有冒号的 `OptValue` 则不会接受字符串，可用于在脚本中发出特定流程的信号。\n\
    \n在下面的示例中，如果在命令行接收到 `-t` 标志，则会执行一个名为 `RunTestFunctions` 的函数：\n\n```bash\nchange_admin_depts.sh\
    \ -a 747 -b 757 -t\n```\n\n脚本按顺序处理这些请求：\n\n```bash\nwhile getopts a:b:t OptValue;\
    \ do\n  case $OptValue in\n    a) export OLD_DEPT=${OPTARG};;\n    b) export NEW_DEPT=${OPTARG};;\n\
    \    t) export TestOnly=\"True\";;\n    *) echo \"No values were provided for\
    \ old and new departments\";;\n  esac\ndone\n\nif [ $TestOnly == True ]; then\n\
    \    RunTestFunctions\nfi\n```\n\n这种方法灵活性随着可处理的值的数量而增长。例如，`ChangeAdminDepts` 函数中的逻辑可以调整来处理你可以用\
    \ `modify_user` 动词设置的其他值，比如业务线（line of business）和位置（location）。`getopts` 标志可用于决定应用哪些函数。参见以下示例：\n\
    \n```bash\nwhile getopts a:b:c:d:e:f:t OptValue; do\n  case $OptValue in\n   \
    \ a) export OLD_DEPT=${OPTARG};;\n    b) export NEW_DEPT=${OPTARG};;\n    c) export\
    \ OLD_LOB=${OPTARG};;\n    d) export NEW_LOB=${OPTARG};;\n    e) export OLD_LOCATION=${OPTARG};;\n\
    \    f) export NEW_LOCATION=${OPTARG};;\n    t) export TestOnly=\"True\";;\n \
    \   *) echo \"No values were provided for old and new departments\";;\n  esac\n\
    done\n\nif [ ${#OLD_DEPT} -gt 0 ]; then\n    if [ ${#NEW_DEPT} -gt 0 ]; then\n\
    \        ChangeAdminDepts\n    else\n        echo \"Error: You provided the old\
    \ department but\"\n        echo \"the value for the new department is missing.\"\
    \n        echo \"Please run this script again and provide\"\n        echo \"both\
    \ values when prompted\"\n        exit 1\n    fi\nfi\n```\n\n## 使用参数文件更新目标属性\n\
    \n`OEM` 属性为目标（targets）和管理员提供了另一个数据点。例如，为主机和数据库目标设置 `Department` 属性对于过滤报告可能很有用，或者你可以使用一个属性将目标映射到管理员。`Lifecycle\
    \ Status` 属性可用于过滤正常运行时间报告。你懂的。这是在 `Groups` 等内置 `OEM` 结构之外的另一个参考点。\n\n尽管它们很有用，但为\
    \ `OEM` 目标设置属性相当不便。当你发现一个新主机或配置到一个新数据库的连接时，控制台不会提示你输入 `LifeCycle Status`、`Department`、`Location`\
    \ 或任何其他可直接分配给目标的属性。\n\n因此，你的某些目标在这些字段中可能没有当前或准确的值。这里有一个查询使用字符串逻辑从主机名推导 `LifeCycle\
    \ Status`。在这个例子中，生产主机被命名为 `oraprod01`、`oraprod02` 等。测试和开发主机也遵循相同的通用命名标准。注意：像这样的命名标准会给黑客发出一个信号：“不要在那个开发/测试服务器上浪费时间——我所有的生产数据都在这里！”\
    \ 这只是一个例子。\n\n`set_target_property_value` 动词允许你为单个目标设置单个属性。你有更好的事情要做，因此我们将通过将该查询的结果加载到\
    \ `SQL` 缓存文件中，将这些动词字符串拉入一个参数文件，如下所示：\n\n```bash\nsqlplus -S ${SYSMAN_CONNECT}\
    \ <<EOF\nSET ECHO OFF\nSET FEEDBACK OFF HEADING OFF LINES 250 PAGES 999\nSPOOL\
    \ ${ARGFILE01}\nSELECT\n        CASE SUBSTR ( host_name, 0, 6 )\n           WHEN\
    \ 'oraprod' THEN\n            DECODE ( property_value, 'Production', NULL, 'set\
    \ target_property_value -property_records=\"' || target_name ||':oracle_database:LifeCycle\
    \ Status:Production\"' )\n           WHEN 'oratest' THEN\n            DECODE (\
    \ property_value,'Test', NULL,'set_target_property_value -property_records=\"\
    ' || target_name ||':oracle_database:LifeCycle Status:Test\"' )\n           WHEN\
    \ 'oradevl' THEN\n             DECODE ( property_value,'Development', NULL,'set_target_property_value\
    \ -property_records=\"' || target_name ||':oracle_database:LifeCycle Status:Development\"\
    ' )\n        ELSE 'Not defined'\n        END  AS corrective_action\nFROM    sysman.gc\\\
    $target_properties a,\n        sysman.gc\\$target b\nWHERE   a.target_guid = b.target_guid\n\
    \ AND    b.target_type = 'oracle_database'\n AND    a.property_name = 'orcl_gtp_lifecycle_status';\n\
    SPOOL OFF\nEOF\n\nif [ `cat ${ARGFILE01} | wc -l` -gt 0 ]; then\n    emcli login\
    \ -user=sysman -pass=${CONSOLE_PWD} 2>/dev/null\n    emcli argfile ${ARGFILE01}\n\
    \    emcli logout\nfi\n```\n\n## 总结\n\n`EM CLI` 支持控制台内可用的许多技术，并允许你在可移植的 `shell`\
    \ 脚本或 `OEM` 作业中管理和操作目标数据。本章重点介绍了原生的 `shell` 脚本，但一个更快、更灵活的 `jython` 脚本技术随着 12.1.0.3\
    \ 版本发布。接下来的章节将展示如何利用该功能。\n\n高级 `jython` 脚本的可用性不应使你放弃基础的 `shell` 脚本编写。`shell` 脚本无需额外的安装或配置即可运行。它们还有一个优势，即几乎所有管理员都对它很熟悉。\n\
    \n## Python 的历史\n\n`Python` 由 `Guido van Rossum` 在 1980 年代末期创建，起源于一种名为 `ABC` 的解释型语言。当时，`van\
    \ Rossum` 正在使用 `ABC`，他喜欢其语法但想改变一些功能。在 1989 年的圣诞节假期期间，`van Rossum` 设计了后来被称为 `Python`\
    \ 的语言。`Python` 于 1991 年正式发布，当时 `van Rossum` 在阿姆斯特丹一家名为 `Stichting Mathematisch\
    \ Centrum` 的公司工作。\n\n`Python` 的名字并非来源于危险的爬行动物，而是来源于英国 `BBC` 的流行喜剧系列《*Monty Python’s\
    \ Flying Circus*》。`van Rossum` 是该剧的粉丝，并需要一个适合该语言的名字。\n"
- fmt: '# Python、Jython 与 EM CLI 入门指南


    Van Rossum 继续扮演着核心角色，并被任命为 Python 的终身仁慈独裁者（Benevolent Dictator for Life， BDFL）。这个称谓是为
    Van Rossum 创造的，但已成为开源软件中一个常见的描述，指其创建者仍是社区内争议或争论的最终决策者。


    Python 是一种编程语言，但由于代码在运行时编译，它也可以被视为一种脚本语言。这两者之间并不总是有明确的界限，而且各自的定义也随着时间而变化。通常，编程语言必须先编译才能运行，而脚本则从一组命令运行，可以是交互式的，也可以是从文件运行的。既然
    Python 能同时做到这两者，那么对于“Python 是编程语言还是脚本语言？”这个问题的回答就是“是的！”。


    ## Jython


    Jython 是用 Java 实现的 Python 版本。Jython 最初创建于 1997 年底，旨在用 Java 替换 Python 的“C”实现，以处理
    Python 程序访问的性能密集型代码。了解如何用 Java 编程虽然对使用 Jython 有帮助，但并非先决条件。事实上，即使对 Java 一无所知，也可以使用
    Jython。然而，在使用 Jython 时，很可能会遇到 Java 代码，因为 Jython 程序除了使用 Python 模块外，还会使用 Java 类。


    企业管理器命令行界面（Enterprise Manager Command-Line Interface）几乎完全用 Java 和 Jython 编写。从
    OMS 下载 EM CLI 是一个 JAR 文件，需要 Java 可执行文件来安装。当以交互模式使用 EM CLI 时，命令行界面就是 Jython。


    本章的剩余部分将互换地引用 Python 和 Jython。这是因为大多数用户从 Python 开始，随后学习 Jython，或者在使用 Jython 时只使用
    Python 语言（不使用 Java）。互联网和书籍中有大量关于 Python 的信息和教程，因此建议在查找语法、示例等时搜索“Python”而不是“Jython”。


    如果你曾经使用过 Oracle 的任何中间件产品，你很可能已经接触过 Jython。WebLogic 应用服务器脚本工具（也称为“`wlst`”）也使用 Jython。


    ## JSON


    EM CLI 命令的输出将以两种方式之一显示。标准的表格或列式格式称为“文本”（`text`）模式。在达到某个临界点之前，文本模式通常是数据最可读的形式。例如，一个有五列的表在文本模式下显示良好，但一个由
    20 列组成的表则非常难以阅读或解析。文本模式是 EM CLI 交互模式的默认显示模式。


    替代文本模式显示命令输出的另一种方式是 JavaScript 对象表示法，通常称为 JSON。JSON 最初源自 JavaScript，此后已成为数据交换的通用工具。几乎每种编程和脚本语言不仅使用和理解
    JSON，而且对其有大量内置功能支持。


    JSON 是 EM CLI “脚本”（`scripting`）模式下存储和显示命令输出的默认方法，该模式专为处理 EM CLI 命令和输出而构建。预计在 EM
    CLI 脚本中处理的命令所接收的数据将以某种方式被操作。


    ## 入门


    Python 为易用性和简洁性而构建。因此，对于新手来说，学习该语言的基本功能并使用它来完成任务并不困难。DBA 在学习 Python 方面往往具有优势，因为他们具有使用
    PL/SQL、Java、Shell 脚本、各种命令行界面的经验以及分析倾向。


    也许 Python 最显著的特点是使用缩进来表示块结构。Python 不使用开始和结束语句来包围一个流程控制块（例如 `if` 语句），而是使用四个空格来缩进属于该块的代码行。因此，在第一个未缩进的行之上的行就结束了该块。块的第一行后面总是跟着一个冒号。


    ```python

    >>> for VAR in myLoop:

    ...     do this command

    >>> this line does not belong in the loop

    ```


    Python 和 Jython（以及 EM CLI 和 WLST）都有一个交互式界面，其中在脚本中执行的任何命令都可以被编写或复制并执行，以实时查看结果。大多数
    Linux 主机都安装了 Python。要调用交互式界面，只需键入 `python`：


    ```shell

    [root@server ~]# which python

    /usr/bin/python

    [root@server ~]# python

    Python 2.6.6 (r266:84292, Jul 10 2013, 06:42:56)

    [GCC 4.4.7 20120313 (Red Hat 4.4.7-3)] on linux2

    Type "help", "copyright", "credits" or "license" for more information.

    >>>print("this is the interactive Python prompt")

    this is the interactive Python prompt

    >>>exit()

    ```


    ## Hello World!


    “`Hello World!`” 是任何编程或脚本语言最常见的入门介绍。以下示例使用三行代码演示了 Python 中五个重要的概念，这些概念几乎在每个脚本中都会用到。注意每一行中没有多余的文本或命令。


    ```python

    >>> myvar = ''Hello World!''

    >>> if myvar:

    ...     print(myvar)

    ...

    Hello World!

    ```


    第一行展示了如何为变量赋值。变量在被赋值之前不需要被创建。这两个步骤是一次性完成的。赋给 `myvar` 的值是一个字符串值，因此该变量是一个字符串变量。


    第二行开始一个 `if` 代码块。该块表示：“如果变量 `myvar` 存在并且已为其赋值，则继续执行此块中的下一行”。代码块的起始行总是以冒号结束。


    第三行打印 `myvar` 变量的值，后跟一个新行。`print` 函数总是在打印的字符串末尾包含一个换行符。


    第四行需要一个回车来表示代码块已结束。在脚本中并非如此，代码块后的空行不是必需的。


    第五行显示了代码块命令的输出。这表明 `myvar` 变量确实存在并且已被赋值，因此执行了代码块中的那一行，这通过 `print` 函数的成功执行得到了证明。


    ## 查找帮助


    互联网上有大量关于 Python 的信息。一个简单的互联网搜索就能返回足够多的结果，让你回忆起一个被遗忘的命令。但是，Python 做得更好。一套完整的帮助功能可以直接从命令行获得。


    通过调用 `help()` 函数可以了解如何使用 Python 内部帮助的基本语法，该函数将用户带入 Python 内的另一个命令行界面，在该界面中可以输入几乎任何在
    Python 中找到的关键词（包括“`help`”）以提供易于理解的信息：


    ```python

    >>> help()


    Welcome to Python 2.6!  This is the online help utility.


    If this is your first time using Python, you should definitely check out

    the tutorial on the Internet at http://docs.python.org/tutorial/.


    Enter the name of any module, keyword, or topic to get help on writing

    Python programs and using Python modules.  To quit this help utility and

    return to the interpreter, just type "quit".


    To get a list of available modules, keywords, or topics, type "modules",

    "keywords", or "topics".  Each module also comes with a one-line summary

    of what it does; to list the modules whose summaries contain a given word

    such as "spam", type "modules spam".


    help>

    ```'
  raw: 'Van Rossum continues to have a central role and has been named Python’s Benevolent
    Dictator for Life (BDFL). This term was coined for van Rossum but has become a
    common description for open-source software that has retained its creator as the
    final decision maker for disputes or arguments within the community.


    Python is a programming language, but because the code is compiled at runtime,
    it can also be considered a scripting language. There is not always a clear delineation
    between the two, and the definition of each has changed over time. Generally,
    programming languages must be compiled before they can be run and scripts are
    run from a set of commands, either interactively or from a file. Since Python
    can do either and both at the same time, the answer to the question “Is Python
    a programming or a scripting language?” is “Yes!”


    Jython


    Jython is an implementation of Python written in Java. Jython was initially created
    in late 1997 to replace the “C” implementation of Python with Java for performance-intensive
    code accessed by Python programs. Knowing how to code in Java, while beneficial
    to working with Jython, is not a prerequisite. In fact, one can use Jython with
    no knowledge of Java whatsoever. However, when using Jython it is likely one will
    come across Java code, as Jython programs use Java classes in addition to Python
    modules.


    The Enterprise Manager Command-Line Interface is written almost entirely in Java
    and Jython. The download of EM CLI from the OMS is a JAR file that requires the
    Java executable to install. When EM CLI is used in interactive mode, the command-line
    interface is Jython.


    The rest of this chapter will refer to Python and Jython interchangeably. This
    is because most users start out with Python and subsequently learn Jython, or
    use only Python language (no Java) when using Jython. There is a great deal of
    information and tutorials for Python on the Internet and in books, so it is advised
    to search “Python” instead of “Jython” when looking up syntax, examples, and so
    forth.


    If you’ve ever used any of Oracle’s middleware products, you have likely already
    come across Jython. WebLogic Application Server''s Scripting Tool (also known
    as “wlst”) also uses Jython.


    JSON


    The output of EM CLI commands will be displayed in one of two ways. The standard
    tabular or columnar format is known as “text” mode. The text mode is generally
    the most readable form of the data up to a certain point. For example, a table
    with five columns displays well in text mode, but a table made up of 20 columns
    is very difficult to read or parse. Text mode is the default mode of display for
    EM CLI interactive mode.


    An alternative to text mode for displaying command output is JavaScript Object
    Notation, commonly known as JSON. JSON was originally derived from JavaScript
    and has since become a universal tool for data interchange. Nearly every programming
    and scripting language not only uses and understands JSON, but also has a vast
    array of built-in functionality for it.


    JSON is the default method of storing and displaying command output for the “scripting”
    mode of EM CLI, which was built for processing EM CLI commands and output. It
    is expected that the data received from the commands processed in an EM CLI script
    will be manipulated in some way.


    Getting Started


    Python was built for ease of use and brevity. For those reasons, it is not difficult
    for a novice to learn the basic functionality of the language and to use it to
    accomplish tasks. DBAs often have an advantage when it comes to learning Python
    because of their experience with PL/SQL, Java, shell scripting, various command-line
    interfaces, and analytical tendencies.


    Perhaps Python’s most noticeable feature is the use of indentation for block structure.
    Instead of using open and close statements to enclose a block of flow control,
    such as `if` statements, Python uses four spaces to indent lines of code that
    belong to a block. Therefore, the line above the first line not indented ends
    the block. The first line of the block is always followed by a colon.


    ```

    >>> for VAR in myLoop:

    ...     do this command

    >>> this line does not belong in the loop

    ```


    Both Python and Jython (as well as EM CLI and WLST) have an interactive interface
    in which any command executed in a script can be written or copied and executed
    to see the results in real time. Most Linux hosts will have Python installed.
    To invoke the interactive interface, simply type `python`:


    ```

    [root@server ~]# which python

    /usr/bin/python

    [root@server ~]# python

    Python 2.6.6 (r266:84292, Jul 10 2013, 06:42:56)

    [GCC 4.4.7 20120313 (Red Hat 4.4.7-3)] on linux2

    Type "help", "copyright", "credits" or "license" for more information.

    >>>print("this is the interactive Python prompt")

    this is the interactive Python prompt

    >>>exit()

    ```


    Hello World!


    “Hello World!” is the most common introduction to any programming or scripting
    language. The following example uses three lines of code to demonstrate five important
    concepts in Python that will be used in nearly every script. Notice the lack of
    extraneous text or commands in each line.


    ```

    >>> myvar = ''Hello World!''

    >>> if myvar:

    ...     print(myvar)

    ...

    Hello World!

    ```


    The first line shows how to assign a value to a variable. The variable does not
    need to be created before being assigned a variable. Both steps are done at once.
    The value assigned to `myvar` is a string value, making the variable a string
    variable.


    The second line starts an `if` block. The block says, “If the variable `myvar`
    exists and has a value assigned to it, proceed to the next line in this block.”
    The opening line of code blocks always ends with a colon.


    The third line prints the value of the `myvar` variable, followed by a new line.
    The `print` function always includes a newline character at the end of the printed
    string.


    The fourth line requires a carriage return to indicate the code block is finished.
    This is not the case in a script, where blank lines after code blocks are not
    necessary.


    The fifth line shows the output of the code-block commands. This would indicate
    that the `myvar` variable did indeed exist and had a value assigned to it, so
    the line within the code block was executed, evidenced by the success of the `print`
    function.


    Finding Help


    There is myriad information available on the Internet regarding Python. A simple
    Internet search will return more than enough results to refresh one’s memory about
    a forgotten command. But, Python does one better. A full suite of help is available
    right from the command line.


    Basic syntax on how to use the internal help in Python can be read by calling
    the `help()` function, which puts the user into another command-line interface
    within Python where almost any keyword (including “help”) found anywhere in Python
    can be entered to provide easy-to-understand information:


    ```

    >>> help()


    Welcome to Python 2.6!  This is the online help utility.


    If this is your first time using Python, you should definitely check out

    the tutorial on the Internet at http://docs.python.org/tutorial/.


    Enter the name of any module, keyword, or topic to get help on writing

    Python programs and using Python modules.  To quit this help utility and

    return to the interpreter, just type "quit".


    To get a list of available modules, keywords, or topics, type "modules",

    "keywords", or "topics".  Each module also comes with a one-line summary

    of what it does; to list the modules whose summaries contain a given word

    such as "spam", type "modules spam".


    help>

    ```'
