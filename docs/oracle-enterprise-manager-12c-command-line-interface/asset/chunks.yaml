  trans: "`status()` 将列出所有客户端属性的值。可以使用 `set_client_property(属性名, 值)` 和 `get_client_property(属性名)`\
    \ 来设置和获取客户端属性。\n\n## 理解错误代码\n\n在使用 EM CLI 时，您可能会遇到多种错误代码。这些错误代码所提供的信息对于确定错误原因至关重要。下面显示的是最常见的一些错误代码；它们几乎总是有简单的解决方法。\n\
    \n命令行模式要求在执行任何命令之前必须先建立登录会话。在安全环境中以及默认情况下，登录会话将在 45 分钟后过期。当在命令行模式下，未建立有效登录会话却执行了有效命令时，系统会抛出一个退出代码为\
    \ 255 的错误。要继续操作，需要使用 `login` 动词建立一个有效会话，如 清单 3-3 所示。\n\n清单 3-3. 命令行模式下的登录错误消息和退出代码\n\
    ```\n[oracle oms]$ emcli get_targets\nError: Session expired. Run emcli login\
    \ to establish a session.\n[oracle oms]$ echo $?\n```\n\n交互模式和脚本模式要求在每次执行脚本或建立交互会话时都必须包含连接参数。如果未指定连接\
    \ URL，则会抛出一个错误，其中包含有关如何建立连接的详细信息，如 清单 3-4 所示。\n\n清单 3-4. 交互模式和脚本模式下的设置错误\n```\n\
    emcli>get_targets()\nError: EM URL is not set. Do set_client_property('EMCLI_OMS_URL',\
    \ '<value>')\nOr set it as environment variable.\n\n[oracle ~]$ emcli @test.py\n\
    Traceback (most recent call last):\n  File \"test.py\", line 1, in <module>\n\
    \    get_targets()\n  File \"<string>\", line 41, in get_targets\nemcli.exception.VerbExecutionError:\
    \ Error: EM URL is not set. Do set_client_property('EMCLI_OMS_URL', '<value>')\n\
    Or set it as environment variable.\n``\n\n错误可能由无数原因引起。EM CLI 的开发人员在使错误消息描述性强且实用方面做得非常出色。当您遇到错误时，请仔细阅读描述，以了解导致错误的问题是什么。如有疑问，请在文档或互联网上搜索该错误。很可能，其他人已经发现并修复了该错误的原因。\n\
    \n## 语法\n\nEM CLI 程序可以三种不同的模式使用。它们是命令行模式、交互模式和脚本模式。在 12.1.0.2 版本之前，只有命令行模式。交互模式和脚本模式在\
    \ 12.1.0.3 版本中可用，同时提供了一个使用 Jython 的公开编程接口。\n\n标准的命令行模式自 Grid Control 10g 以来变化不大。除了少数例外，用于早期\
    \ EM CLI 版本的脚本在最新版本或 12c 中仍可继续使用。命令行语法是 `emcli` 命令，后跟一个动词，再后跟零个或多个动词选项或参数，如下例所示：\n\
    ```\nemcli create_group -name=my_group -add_targets=\"mymachine.example.com:hostname\"\
    \n```\n\n交互模式和脚本模式均使用 Jython 编程语言。交互模式是通过执行不带任何参数的 `emcli` 命令创建的单用户交互会话。\n\n标准的\
    \ Linux Shell 命令在交互式 Shell 中不起作用。EM CLI 的交互模式可以使用 `exit()` 命令或在 Linux 中输入 `ctrl-d`\
    \ 或在 Windows 中输入 `ctrl-z` 来关闭。\n\n交互模式的语法与标准命令行模式不同。一旦建立了交互模式 Shell，就不再需要使用 `emcli`\
    \ 命令。执行 EM CLI 命令是通过直接将动词放入 Shell 并将动词选项括在括号内来完成的。与命令行模式不同，动词选项前不加短横线，而是在后面跟有其他选项时前加逗号。以下展示了交互模式下带有\
    \ `name` 和 `add_targets` 选项的 `create_group` 函数：\n```\nemcli> create_group(name=my_group,\
    \ add_targets=\"mymachine.example.com:hostname\")\n```\n\n脚本模式使用与交互模式相同的命令语法，但不需要\
    \ Jython Shell。所有要执行的 EM CLI 命令都将格式化为上述交互 Shell 命令的形式，并放入脚本中，同时包含任何其他要加入的 Python\
    \ 代码。该脚本通过在 `emcli` 命令后跟一个 `@` 符号和脚本名称来非交互式执行：\n```\n[oracle ~]$ emcli @my_script.py\n\
    ```\n\n## 设置\n\nEM CLI 包含在每个 OMS 安装中，并设置为自动连接到该 OMS。可以使用 `setup` 动词确认设置配置。在命令行模式下运行该命令显示\
    \ EM CLI 配置为使用 `SYSMAN` 用户连接到 `https://oem.example.com:7802/em`，如 清单 3-5 所示。\n\
    \n清单 3-5. 命令行模式下 EM CLI 设置的输出\n```\n[oracle ~]$ emcli status\nOracle Enterprise\
    \ Manager 12c EMCLI 12.1.0.3.0.\nCopyright (c) 1996, 2013 Oracle Corporation and/or\
    \ its affiliates. All rights reserved.\n\nInstance Home          : /u01/app/oracle/product/12.1.0/gc_inst/em/EMGC_OMS1/sysman/emcli/setup/.emcli\n\
    Verb Jars Home         : null\nStatus                 : Configured\nEMCLI Home\
    \             : /u01/app/oracle/product/12.1.0/mw_1/oms/bin\nEMCLI Version   \
    \       : 12.1.0.3.0\nJava Home              : /u01/app/oracle/product/12.1.0/mw_1/jdk16/jdk/jre\n\
    Java Version           : 1.6.0_43\nLog file               : /u01/app/oracle/product/12.1.0/gc_inst/em/EMGC_OMS1/sysman/emcli/setup/.emcli/.emcli.log\n\
    EM URL                 : https://oem.example.com:7802/em\nEM user            \
    \    : SYSMAN\nAuto login             : false\nTrust all certificates : true\n\
    ```\n\n在 OMS 服务器以外的系统上安装 EM CLI 后，必须先对其进行显式配置，它才能与 Enterprise Manager 安装配合使用。对尚未配置的\
    \ EM CLI 安装执行 `setup` 命令会返回错误，如 清单 3-6 所示。\n\n清单 3-6. 尚未设置的 EM CLI 安装\n```\n[oracle\
    \ ~]$ emcli setup\nOracle Enterprise Manager 12c 3.\nCopyright (c) 1996, 2013\
    \ Oracle Corporation and/or its affiliates. All rights reserved.\n\nNo current\
    \ OMS\n```\n\n配置通过 `setup` 动词后跟多个参数来完成。`url` 参数与在浏览器中登录 Enterprise Manager 所使用的地址相同。`dir`\
    \ 参数指定安装客户端的目录。`username` 参数指示客户端将用于连接的用户名。`noautologin` 参数决定在建立 EM CLI 会话之前需要提供用户名和密码才能访问\
    \ OMS。`trustall` 参数表示将自动信任 OMS 上的证书。以下 EM CLI 设置命令中的 `dir` 参数使用 Shell 扩展来表示安装目录是当前工作目录：\n\
    ```\n[oracle ~]$ emcli -url=https://<hostname of grid server>:1159/em -dir=$(pwd)\
    \ \n-username=<username> -noautologin -trustall\n```"
- fmt: '# EM CLI 和 EMCTL 使用指南


    在交互模式下运行 `setup` 命令会显示 URL 和用户均未定义。这是因为无论是在交互模式还是脚本模式下，这些参数都需要每次都进行设置，如 [清单 3-7](#9781484202395_Ch03.xhtml#list7)
    所示。


    [清单 3-7](#9781484202395_Ch03.xhtml#_list7). 在交互模式下执行 `setup` 函数


    ```

    emcli>status()

    Oracle Enterprise Manager 12c EMCLI with Scripting option Version 12.1.0.3.0.

