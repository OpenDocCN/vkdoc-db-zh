    and scripting) kit.


    Before installing, you must meet the following requirements on any client or remote
    target:


    *   EM12c Cloud Control Framework

    *   Java Version 1.6x or higher

    *   Operating System Linux, Sun, HPUX, AIX, or Windows.


    Once these requirements have been met, you must download the kit(s) from one of
    two places. The first it through the EM12c console by clicking on Setup, Command
    Line Interface, then choosing “Download the EM CLI Standard Kit to your Workstation.”
    Choose a location to which to save the download.


    You can also download it from the OMS Host using the URL link:


    ```

    https://<OMS_HOST>:<port>/em/<swlib_directory>/emcli/kit/emclikit.jar

    ```


    Once you have completed the download of the emclikit.jar file, copy it via SCP/FTP
    or other transport utility to the remote server.


    Upon completing the transfer of the .jar file, as with any kit installation, ensure
    your JAVA_HOME is set. Depending on your operating system, this may require one
    of the following:


    Unix:


    ```

    > setenv JAVA_HOME /usr/local/packages/j2sdk

    > setenv PATH $JAVA_HOME/bin:$PATH

    > echo $JAVA_HOME

    > echo $PATH

    ```


    Linux:


    ```

    > export JAVA_HOME /usr/bin/jdk6/jre

    > export PATH $JAVA_HOME/bin:$PATH

    > echo $JAVA_HOME $PATH

    ```


    Windows:


    ```

    > set JAVA_HOME D:\progra~1\java\jre

    > echo %JAVA_HOME%

    ```


    ![Image](Images/sq.jpg) **Note**  The path will be set in the server’s environment
    variable.


    Then check the Java path as follows:


    Unix/Linux:


    ```

    > which java

    ```


    Windows:


    ```

    C:\users: where java

    ```


    Once the JAVA_HOME is verified, the EM CLI standard kit can be quickly installed
    by executing the following command, replacing the `emcli_install_dir` with the
    associated directory in which you wish to install the EM CLI:


    ```

    > $JAVA_HOME/bin/java -jar emclikit.jar -install_dir=<em_cli_home_dir>

    ```


    For Windows, the process is adjusted to take changes for environment variables
    into consideration:'
  trans: '# 客户端或远程目标安装


    在远程目标上安装 EM CLI 有多种原因。您必须判断是否存在这样做的显著必要性，或者是否可以通过使用 `emctl` 命令来完成需要在远程目标上运行的任务。


    ## 考虑原因


    以下是在远程目标或客户端上不安装 EM CLI 的两个原因：


    1.  **安全性**：EM CLI 将被配置为访问 OMS，因此这样做的安全风险需要被充分评估。任何在远程目标或客户端上使用 EM CLI 的用户，仍然需要像从
    OMS 安装的 EM CLI 那样登录，但这确实比纯 OMS 安装的配置增加了额外的安全风险。

    2.  **效率**：Enterprise Manager Control (`EMCTL`) 命令可以在命令行完成与 EM CLI 相同的多项任务，例如发出对目标的远程停机维护等。在这些情况下，无需进行完整的
    EM CLI 远程安装和配置。`EMCTL` 使用现有的 EM agent 来执行这些任务，利用其标准连接，无需额外的密码或认证令牌。


    ## 安装概述


    现在，我们将回顾当您有合理理由需要进行 EM CLI 的远程目标或客户端安装时应遵循的步骤。EM CLI 客户端的桌面安装也通过此过程完成。


    下载和部署 EM CLI 客户端到远程主机只需几个步骤。实际的 EM CLI 安装已在 OMS 主机上自动完成，因此只需要手动进行远程客户端安装。EM CLI
    客户端包含两个套件——EM CLI 标准套件和 EM CLI 脚本套件。如果您希望在 OMS 主机之外使用脚本方法，那么远程安装则需要同时安装这两个套件。脚本套件包含了
    Jython 解释器，因此进行 Jython 脚本编写时无需额外的解释器。


    本节将仅关注标准套件，而下一节将通过关注高级（包含标准和脚本）套件来增强安装技术。


    ## 先决条件


    在安装之前，您必须在任何客户端或远程目标上满足以下要求：


    *   EM12c Cloud Control Framework

    *   Java 版本 1.6x 或更高

    *   操作系统为 Linux、Sun、HPUX、AIX 或 Windows。


    ## 下载套件


    满足这些要求后，您必须从两个位置之一下载套件。第一种是通过 EM12c 控制台，点击 `设置` > `命令行界面`，然后选择 `将 EM CLI 标准套件下载到您的工作站`。选择一个位置来保存下载的文件。


    您也可以使用 URL 链接从 OMS 主机下载：


    ```

    https://<OMS_HOST>:<port>/em/<swlib_directory>/emcli/kit/emclikit.jar

    ```


    完成 `emclikit.jar` 文件的下载后，通过 SCP/FTP 或其他传输工具将其复制到远程服务器。


    ## 设置环境


    传输完 `.jar` 文件后，与任何套件安装一样，请确保您的 `JAVA_HOME` 已设置。根据您的操作系统，可能需要以下设置之一：


    Unix:


    ```

    > setenv JAVA_HOME /usr/local/packages/j2sdk

    > setenv PATH $JAVA_HOME/bin:$PATH

    > echo $JAVA_HOME

    > echo $PATH

    ```


    Linux:


    ```

    > export JAVA_HOME /usr/bin/jdk6/jre

    > export PATH $JAVA_HOME/bin:$PATH

    > echo $JAVA_HOME $PATH

    ```


    Windows:


    ```

    > set JAVA_HOME D:\progra~1\java\jre

    > echo %JAVA_HOME%

    ```


    ![Image](img/sq.jpg) `注意` 路径将在服务器的环境变量中设置。


    然后按如下方式检查 Java 路径：


    Unix/Linux:


    ```

    > which java

    ```


    Windows:


    ```

    C:\users: where java

    ```


    ## 安装命令


    一旦确认了 `JAVA_HOME`，即可通过执行以下命令快速安装 EM CLI 标准套件，将 `emcli_install_dir` 替换为您希望安装 EM
    CLI 的相关目录：


    ```

    > $JAVA_HOME/bin/java -jar emclikit.jar -install_dir=<em_cli_home_dir>

    ```


    对于 Windows 系统，该过程会进行调整以考虑环境变量的变化。'
- fmt: "```\n%JAVA_HOME%\\bin\\java -jar emclikit.jar -install_dir=<em_cli_home_dir>\n\
    ```\n\n安装完成后，将返回以下消息：\n\n```\nThe EM CLI client is installed in <emcli_client_install_dir>\n\
    ```\n\n这将验证安装是否完成。您需要查看日志并确保安装过程中没有错误；同时检查所有功能是否已启用。如果您使用单点登录（SSO）或其他高级安全功能，请确保已采取相应步骤以包含与\
    \ EM CLI 的同步。\n\n### EM CLI Advanced Kit\n\n与标准工具包一样，EM CLI 高级工具包也可以从 EM12c 控制台下载。登录到企业环境后，依次单击\
    \ Setup（设置）> Command Line Interface（命令行界面）（[图 2-14](#9781484202395_Ch02.xhtml#Fig14)）。\n\
    \n![9781484202395_Fig02-14.jpg](Images/9781484202395_Fig02-14.jpg)\n\n[图 2-14](#9781484202395_Ch02.xhtml#_Fig14).\
    \ 从 Enterprise Manager 控制台访问 EM CLI\n\n进入 EM CLI 安装向导后，您将看到如 [图 2-15](#9781484202395_Ch02.xhtml#Fig15)\
    \ 所示的选择。\n\n![9781484202395_Fig02-15.jpg](Images/9781484202395_Fig02-15.jpg)\n\
    \n[图 2-15](#9781484202395_Ch02.xhtml#_Fig15). 从 Enterprise Manager 控制台进行 EM CLI\
    \ 安装的安装要求\n\n页面右侧的说明清晰地定义了下载工具包以及成功完成安装所需的先决条件步骤。\n\n### 通过 OMS 安装 EMCLI\n\n最后的安装选项是通过\
    \ OMS 执行。您需要先将 EM CLI 工具包下载到远程主机或您的工作站。请注意，下载链接是显示页面中的第一个项目符号选项：“Download the\
    \ EM CLI with scripting options to your workstation（下载带脚本选项的 EM CLI 到您的工作站）”。\n\
    \n单击此链接开始下载过程。由于这是一个 Java 文件，您可能会收到类似以下警告（[图 2-16](#9781484202395_Ch02.xhtml#Fig16)）：\n\
    \n![9781484202395_Fig02-16.jpg](Images/9781484202395_Fig02-16.jpg)\n\n[图 2-16](#9781484202395_Ch02.xhtml#_Fig16).\
    \ 下载用于工作站安装 EM CLI 所需的 .jar 文件时的警告\n\n您也可以通过以下 URL 直接下载文件：\n\n```\nhttp://<EM_HOST>:<port>/em/<public_sw_lib>/emcli/kit/emcliadvancedkit.jar\n\
    ```\n\n完成后，请确保已通过 SCP/FTP 或其他文件传输实用程序将文件复制到新主机。如果高级工具包将用于本地 OMS 主机，则可以继续执行安装步骤。\n\
    \n确保您已正确设置 `JAVA_HOME` 并且它已包含在环境路径中，这在标准工具包安装步骤中已介绍。\n\n![Image](Images/sq.jpg)\
    \ `Note` 如果这是用于 Windows 主机安装，请在环境变量中设置 `JAVA_HOME`，而不是在会话级别设置。Oracle 安装通常会调用可能不会继承会话级别变量的辅助会话，这可能导致这些辅助进程失败。\n\
    \n使用以下命令执行安装步骤，将 `emcli_install_dir` 替换为与安装路径关联的目录：\n\n```\n> java –jar emcliadvancedkit.jar\
    \ client –install_dir=<emcli_install_dir>\n```\n\n如前所述，成功安装后将返回以下消息：\n\n```\n\
    The EM CLI client is installed in <emcli_install_dir>\n```\n\n### 安装后配置\n\n对于任何工具包，无论是安装在主机还是远程主机上，安装完成后都应执行与\
    \ OMS 的同步。\n\n在同步之前，您首先需要将 EM CLI 客户端或远程主机信息配置到现有 OMS 中。\n\n切换到 EM CLI 主目录并使用本地配置信息设置本地用户。您可以通过输入以下命令轻松收集关于\
    \ `setup` 动词的信息：\n\n```\n> emcli help setup\n```\n\n设置本地用户需要以下命令语法：\n\n**标准工具包**\n\
    \n```\n> emcli setup –url=http://<local_host_name>:<port>/em –username=em_user\n\
    ```\n\n**高级（脚本）工具包**\n\n```\n> emcli setup –url=http://<local_host_name>:<port>/em\
    \ –username=em_user -trustall\n> emcli login –username=sysman\n```\n\n设置完成后，需要将其与\
    \ OMS 同步：\n\n```\n> emcli help sync\n```\n\n### 补丁与升级\n\n尽管补丁和升级最初可能看起来不属于安装的一部分，但它们是安装过程中非常重要的一个方面。考虑到我们强调在安装后立即应用所有捆绑补丁的重要性，在安装过程中包含对这些补丁的检查，正说明了这一步在任何\
    \ OEM 环境安装中的重要性。\n\n#### 使用 EM CLI 客户端打补丁\n\n通过命令行界面利用部署过程执行打补丁，其功能完整性不亚于通过 Enterprise\
    \ Manager 控制台执行。打补丁是与一个属性文件结合执行的，该文件包含简化命令的输入信息，并提供 EM CLI 完成补丁过程所需的信息。请记住，EM\
    \ CLI 不是像每个主机上的常规 EM 代理那样的代理；它是作为客户端软件安装的实用程序。\n\n要从头开始创建属性文件，您需要了解如何以及何时使用以下步骤之一创建：\n\
    \n*   从现有过程的模板创建\n*   使用通过控制台创建的、当前状态的属性文件\n*   重用先前执行中保存的属性文件\n\n**从模板创建属性文件**\n\
    \n使用现有过程 GUID，只需几个命令即可构建一个模板，并为您要执行的新过程插入值。\n\n然后执行 EM CLI 命令以获取有关可用过程模板的信息。在下面的示例中，我们将拉取补丁模板示例：\n\
    \n```\n./emcli get_procedures -type=PatchOracleSoftware\nCF9D698E8D3843B9E043200B14ACB8B3,\
    \ PatchOracleSoftware, CLONE_PATCH_SIDB, Clone and Patch Oracle \nDatabase, 12.2,\
    \ ORACLE\nCF9D698E8D4743B9E043200B14ACB8B3, PatchOracleSoftware, PATCH_ALL_NODES_CLUSTER_ASM,\
    \ Patch Oracle \nCluster ASM - All Nodes, 12.2, ORACLE\n```\n\n返回的第一条信息是我们需要的过程\
    \ GUID，然后我们可以从中创建属性文件以供使用：\n\n```\n./emcli describe_procedure_input -procedure=CF9D698E8D3843B9E043200B14ACB8B3\
    \ \n> Patch_template.properties\nVerifying parameters ...\n```\n\n现在您的模板文件已创建：\n\
    \n```\n-rw-r--r-- 1 oracle dba   65950 Jan 27 19:12 Patch_template.properties\n\
    ```\n\n**为远程客户端安装打补丁**\n\n如果您已将 EM CLI 客户端部署到目标服务器，则可以通过在 EM CLI 设置过程中将其在 OMS\
    \ 中注册来轻松跟踪它们。跟踪信息保留在 OMS 中，记录所有需要打补丁的 EM CLI 客户端安装二进制文件。它还会识别需要更新密码或需要使用 OMS 存储库中的新动词进行同步的\
    \ EM CLI 安装。客户端软件安装不是 OEM 中的目标，因此不受 EM 代理的跟踪或监控。\n\n### EM 安全框架\n\n鉴于 EM CLI 的强大功能，安全性始终是任何人心中的首要考虑。命令行可以访问整个受监控环境，因此这个问题被包含在这里也就不足为奇了。\n\
    \n按照任何 Oracle 安全实践的标准，建议作为安全实践的一部分对服务器进行加固——移除服务和直接访问属于 Oracle 的操作系统级别文件。\n\n\
    基本的安全设计要求我们从所有受监控目标一直到 Enterprise Manager 组件进行全面审视，但有一些白皮书可以解决 EM CLI 之外的安全问题；在本节中，我们将重点介绍命令行和\
    \ Enterprise Manager 的安全性。\n\n### EM CLI 中的安全性\n```"
  raw: "```\n%JAVA_HOME%\\bin\\java -jar emclikit.jar -install_dir=<em_cli_home_dir>\n\
    ```\n\nOnce complete, the following message will be returned:\n\n```\nThe EM CLI\
    \ client is installed in <emcli_client_install_dir>\n```\n\nThis will verify that\
    \ the installation is complete. You will need to review the logs and ensure that\
    \ there were no errors in the installation; also check that all functionality\
    \ is enabled. If you use Single Sign-on (SSO) or other advanced security, ensure\
    \ that there are steps taken to include synchronization with the EM CLI.\n\nEM\
    \ CLI Advanced Kit\n\nAs with the standard kit, the EM CLI advanced kit can be\
    \ downloaded from the EM12c console. Once logged in to the Enterprise Environment,\
    \ click on Setup, then on Command Line Interface ([Figure 2-14](#9781484202395_Ch02.xhtml#Fig14)).\n\
    \n![9781484202395_Fig02-14.jpg](Images/9781484202395_Fig02-14.jpg)\n\n[Figure\
    \ 2-14](#9781484202395_Ch02.xhtml#_Fig14). Accessing the EM CLI from the Enterprise\
    \ Manager console\n\nOnce you’ve entered the EM CLI installation wizard, you will\
    \ see the choices shown in [Figure 2-15](#9781484202395_Ch02.xhtml#Fig15).\n\n\
    ![9781484202395_Fig02-15.jpg](Images/9781484202395_Fig02-15.jpg)\n\n[Figure 2-15](#9781484202395_Ch02.xhtml#_Fig15).\
    \ Installation requirements for the EM CLI installation from the Enterprise Manager\
    \ console\n\nThe instructions on the right-hand side of the page give clear and\
    \ defined steps on how to download the kit and which pre-requisites are required\
    \ to complete the installation successfully.\n\nEMCLI Installation via the OMS\n\
    \nThe last option for installation is performed through the OMS. You will initially\
    \ download the EM CLI kit to the remote host or your workstation. Note that the\
    \ download link is the first bulleted option in the display page, “Download the\
    \ EM CLI with scripting options to your workstation.”\n\nClick on this link to\
    \ start the download process. As this is a Java file, you may receive the following\
    \ or similar warning ([Figure 2-16](#9781484202395_Ch02.xhtml#Fig16)):\n\n![9781484202395_Fig02-16.jpg](Images/9781484202395_Fig02-16.jpg)\n\
    \n[Figure 2-16](#9781484202395_Ch02.xhtml#_Fig16). Warning when downloading the\
    \ .jar file required for a workstation download of the EM CLI installation\n\n\
    You can also download the file directly via this URL:\n\n```\nhttp://<EM_HOST>:<port>/em/<public_sw_lib>/emcli/kit/emcliadvancedkit.jar\n\
    ```\n\nOnce this is complete, ensure you’ve copied the file to the new host via\
    \ SCP/FTP or another file transfer utility. If the advanced kit is to be used\
    \ on the local OMS host, then proceed with the installation step.\n\nEnsure that\
    \ you’ve set your JAVA_HOME properly and that it’s part of your environment path,\
    \ which we covered in the standard kit installation steps.\n\n![Image](Images/sq.jpg) **Note**  If\
    \ this is for a Windows host installation, set the JAVA_HOME in the environment\
    \ variables and not at the ­session level. Oracle installs invariably call secondary\
    \ sessions that may not carry over the session-level variables, which can cause\
    \ a failure in those secondary processes.\n\nExecute the installation step with\
    \ the following command, replacing `emcli_install_dir` with the directory associated\
    \ with the installation path:\n\n```\n> java –jar emcliadvancedkit.jar client\
    \ –install_dir=<emcli_install_dir>\n```\n\nAs before, the following message will\
    \ return upon successful installation:\n\n```\nThe EM CLI client is installed\
    \ in <emcli_install_dir>\n```\n\nPost-Installation\n\nOnce the installation is\
    \ complete for any kit, on host or remote host, synchronization with the OMS should\
    \ be performed.\n\nYou first need to configure the EM CLI client or remote host\
    \ information with the existing OMS before synchronizing with it.\n\nChange over\
    \ to the EM CLI home directory and set up a local user with local configuration\
    \ information. You can easily collect information on the `setup` verb by typing\
    \ in the following command:\n\n```\n> emcli help setup\n```\n\nSetting up a local\
    \ user requires the following command syntax:\n\nStandard Kit:\n\n```\n> emcli\
    \ setup –url=http://<local_host_name>:<port>/em –username=em_user\n```\n\nAdvanced\
    \ (Scripting) Kit\n\n```\n> emcli setup –url=http://<local_host_name>:<port>/em\
    \ –username=em_user -trustall\n> emcli login –username=sysman\n```\n\nOnce set\
    \ up, you need to synchronize it with the OMS:\n\n```\n> emcli help sync\n```\n\
    \nPatching and Upgrades\n\nAlthough patching and upgrades may not first appear\
    \ to be part of installation, they are a very important aspect of it. Considering\
    \ that we stress the importance of applying any and all bundle patches upon installation,\
    \ the inclusion of checking for these during the installation process should relay\
    \ how important this step is in the installation of any OEM environment.\n\nPatching\
    \ with the EM CLI Clients\n\nPatching can be performed by utilizing deployment\
    \ procedures from the command-line interface as completely as it can be performed\
    \ via the Enterprise Manager console. Patching is performed in conjunction with\
    \ a properties file, which includes the inputs to ease commands and offers the\
    \ information the EM CLI requires to complete the patching process. It’s important\
    \ to remember that EM CLI is not an agent like the regular EM agent on each host;\
    \ it is a utility that installs as client software.\n\nTo create a properties\
    \ file from scratch, you need to know how and when to create one, using one of\
    \ the following steps:\n\n*   from a template from an existing procedure\n*  \
    \ using a properties file in its current state, created via the console\n*   re-using\
    \ a saved properties file from a previous execution\n\nCreating a Properties File\
    \ from a Template\n\nUsing an existing procedure GUID, a template can be built\
    \ with just a few commands and values inserted for the new procedure that you\
    \ want to execute.\n\nThen perform the execution of the EM CLI command to pull\
    \ info about the procedure templates available. For our example below, we are\
    \ going to pull patching template examples:\n\n```\n./emcli get_procedures -type=PatchOracleSoftware\n\
    CF9D698E8D3843B9E043200B14ACB8B3, PatchOracleSoftware, CLONE_PATCH_SIDB, Clone\
    \ and Patch Oracle \nDatabase, 12.2, ORACLE\nCF9D698E8D4743B9E043200B14ACB8B3,\
    \ PatchOracleSoftware, PATCH_ALL_NODES_CLUSTER_ASM, Patch Oracle \nCluster ASM\
    \ - All Nodes, 12.2, ORACLE\n```\n\nThe first information returned is the procedure\
    \ GUID that we require to then create our properties file from which to work:\n\
    \n```\n./emcli describe_procedure_input -procedure=CF9D698E8D3843B9E043200B14ACB8B3\
    \ \n> Patch_template.properties\nVerifying parameters ...\n```\n\nAnd your template\
    \ file is now created:\n\n```\n-rw-r--r-- 1 oracle dba   65950 Jan 27 19:12 Patch_template.properties\n\
    ```\n\nPatching Remote Client Installations\n\nIf you have EM CLI clients deployed\
    \ to target servers, it is simple to track them by registering them with the OMS\
    \ as part of the EM CLI setup. Tracking information is retained in the OMS on\
    \ all EM CLI client installation binaries that require patching. It will also\
    \ identify EM CLI installations that need to be updated with new passwords or\
    \ synced with new verbs from the OMS repository. Client software installations\
    \ are not targets in OEM, so they are not tracked or monitored by the EM agents.\n\
    \nEM Security Framework\n\nSecurity is always on the top of anyone’s mind given\
    \ the power behind the EM CLI. The command line has access to the entire monitored\
    \ environment, so it’s no surprise that this topic is included here.\n\nAs is\
    \ standard with any Oracle security practice, hardening of servers`—`removing\
    \ services and access to direct OS-level files that are part of Oracle`—`is recommended\
    \ as part of a security exercise.\n\nBasic security design requires that we look\
    \ from all monitored targets up through the Enterprise Manager components, but\
    \ there are white papers to address concerns outside of the EM CLI; we will focus\
    \ on the command line and Enterprise Manager in this section.\n\nSecurity in the\
    \ EM CLI"
  trans: "\n```\n%JAVA_HOME%\\bin\\java -jar emclikit.jar -install_dir=<em_cli_home_dir>\n\
    ```\n安装完成后，将返回以下消息：\n```\nThe EM CLI client is installed in <emcli_client_install_dir>\n\
    ```\n这将验证安装是否完成。您需要查看日志并确保安装过程中没有错误；同时检查所有功能是否已启用。如果您使用单点登录（SSO）或其他高级安全功能，请确保已采取相应步骤以包含与\
    \ EM CLI 的同步。\n\n### EM CLI 高级工具包\n\n与标准工具包一样，EM CLI 高级工具包也可以从 EM12c 控制台下载。登录到企业环境后，依次单击\
    \ Setup（设置）> Command Line Interface（命令行界面）（图 2-14）。\n\n![9781484202395_Fig02-14.jpg](img/9781484202395_Fig02-14.jpg)\n\
    \n图 2-14. 从 Enterprise Manager 控制台访问 EM CLI\n\n进入 EM CLI 安装向导后，您将看到如 图 2-15 所示的选择。\n\
    \n![9781484202395_Fig02-15.jpg](img/9781484202395_Fig02-15.jpg)\n\n图 2-15. 从 Enterprise\
    \ Manager 控制台进行 EM CLI 安装的安装要求\n\n页面右侧的说明清晰地定义了下载工具包以及成功完成安装所需的先决条件步骤。\n\n###\
    \ 通过 OMS 安装 EMCLI\n\n最后的安装选项是通过 OMS 执行。您需要先将 EM CLI 工具包下载到远程主机或您的工作站。请注意，下载链接是显示页面中的第一个项目符号选项：“Download\
    \ the EM CLI with scripting options to your workstation（下载带脚本选项的 EM CLI 到您的工作站）”。\n\
    \n单击此链接开始下载过程。由于这是一个 Java 文件，您可能会收到类似以下警告（图 2-16）：\n\n![9781484202395_Fig02-16.jpg](img/9781484202395_Fig02-16.jpg)\n\
    \n图 2-16. 下载用于工作站安装 EM CLI 所需的 .jar 文件时的警告\n\n您也可以通过以下 URL 直接下载文件：\n```\nhttp://<EM_HOST>:<port>/em/<public_sw_lib>/emcli/kit/emcliadvancedkit.jar\n\
    ```\n完成后，请确保已通过 SCP/FTP 或其他文件传输实用程序将文件复制到新主机。如果高级工具包将用于本地 OMS 主机，则可以继续执行安装步骤。\n\
    \n确保您已正确设置 `JAVA_HOME` 并且它已包含在环境路径中，这在标准工具包安装步骤中已介绍。\n\n![Image](img/sq.jpg) `Note`\
    \ 如果这是用于 Windows 主机安装，请在环境变量中设置 `JAVA_HOME`，而不是在会话级别设置。Oracle 安装通常会调用可能不会继承会话级别变量的辅助会话，这可能导致这些辅助进程失败。\n\
    \n使用以下命令执行安装步骤，将 `emcli_install_dir` 替换为与安装路径关联的目录：\n```\n> java –jar emcliadvancedkit.jar\
    \ client –install_dir=<emcli_install_dir>\n```\n如前所述，成功安装后将返回以下消息：\n```\nThe EM\
    \ CLI client is installed in <emcli_install_dir>\n```\n\n### 安装后配置\n\n对于任何工具包，无论是安装在主机还是远程主机上，安装完成后都应执行与\
    \ OMS 的同步。\n\n在同步之前，您首先需要将 EM CLI 客户端或远程主机信息配置到现有 OMS 中。\n\n切换到 EM CLI 主目录并使用本地配置信息设置本地用户。您可以通过输入以下命令轻松收集关于\
    \ `setup` 动词的信息：\n```\n> emcli help setup\n```\n设置本地用户需要以下命令语法：\n\n**标准工具包**\n\
    ```\n> emcli setup –url=http://<local_host_name>:<port>/em –username=em_user\n\
    ```\n**高级（脚本）工具包**\n```\n> emcli setup –url=http://<local_host_name>:<port>/em\
    \ –username=em_user -trustall\n> emcli login –username=sysman\n```\n设置完成后，需要将其与\
    \ OMS 同步：\n```\n> emcli help sync\n```\n\n### 补丁与升级\n\n尽管补丁和升级最初可能看起来不属于安装的一部分，但它们是安装过程中非常重要的一个方面。考虑到我们强调在安装后立即应用所有捆绑补丁的重要性，在安装过程中包含对这些补丁的检查，正说明了这一步在任何\
    \ OEM 环境安装中的重要性。\n\n#### 使用 EM CLI 客户端打补丁\n\n通过命令行界面利用部署过程执行打补丁，其功能完整性不亚于通过 Enterprise\
    \ Manager 控制台执行。打补丁是与一个属性文件结合执行的，该文件包含简化命令的输入信息，并提供 EM CLI 完成补丁过程所需的信息。请记住，EM\
    \ CLI 不是像每个主机上的常规 EM 代理那样的代理；它是作为客户端软件安装的实用程序。\n\n要从头开始创建属性文件，您需要了解如何以及何时使用以下步骤之一创建：\n\
    \n*   从现有过程的模板创建\n*   使用通过控制台创建的、当前状态的属性文件\n*   重用先前执行中保存的属性文件\n\n**从模板创建属性文件**\n\
    \n使用现有过程 GUID，只需几个命令即可构建一个模板，并为您要执行的新过程插入值。\n\n然后执行 EM CLI 命令以获取有关可用过程模板的信息。在下面的示例中，我们将拉取补丁模板示例：\n\
    ```\n./emcli get_procedures -type=PatchOracleSoftware\nCF9D698E8D3843B9E043200B14ACB8B3,\
    \ PatchOracleSoftware, CLONE_PATCH_SIDB, Clone and Patch Oracle \nDatabase, 12.2,\
    \ ORACLE\nCF9D698E8D4743B9E043200B14ACB8B3, PatchOracleSoftware, PATCH_ALL_NODES_CLUSTER_ASM,\
    \ Patch Oracle \nCluster ASM - All Nodes, 12.2, ORACLE\n```\n返回的第一条信息是我们需要的过程\
    \ GUID，然后我们可以从中创建属性文件以供使用：\n```\n./emcli describe_procedure_input -procedure=CF9D698E8D3843B9E043200B14ACB8B3\
    \ \n> Patch_template.properties\nVerifying parameters ...\n```\n现在您的模板文件已创建：\n\
    ```\n-rw-r--r-- 1 oracle dba   65950 Jan 27 19:12 Patch_template.properties\n\
    ```\n\n**为远程客户端安装打补丁**\n\n如果您已将 EM CLI 客户端部署到目标服务器，则可以通过在 EM CLI 设置过程中将其在 OMS\
    \ 中注册来轻松跟踪它们。跟踪信息保留在 OMS 中，记录所有需要打补丁的 EM CLI 客户端安装二进制文件。它还会识别需要更新密码或需要使用 OMS 存储库中的新动词进行同步的\
    \ EM CLI 安装。客户端软件安装不是 OEM 中的目标，因此不受 EM 代理的跟踪或监控。\n\n### EM 安全框架\n\n鉴于 EM CLI 的强大功能，安全性始终是任何人心中的首要考虑。命令行可以访问整个受监控环境，因此这个问题被包含在这里也就不足为奇了。\n\
    \n按照任何 Oracle 安全实践的标准，建议作为安全实践的一部分对服务器进行加固——移除服务和直接访问属于 Oracle 的操作系统级别文件。\n\n\
    基本的安全设计要求我们从所有受监控目标一直到 Enterprise Manager 组件进行全面审视，但有一些白皮书可以解决 EM CLI 之外的安全问题；在本节中，我们将重点介绍命令行和\
    \ Enterprise Manager 的安全性。\n\n### EM CLI 中的安全性\n"
- fmt: "## EM CLI 安全架构与关键功能\n\nEM CLI 的安全架构构建于 Enterprise Manager 12c 环境的架构之上，正如我们上面所讨论的，它通常是首要的安全关注点。通过\
    \ EM CLI 访问 Enterprise Manager 的单点入口是第二个关注点。您将通过 EM CLI 与之交互的远程目标的凭据是第三级访问权限，更需要关注，因为这些目标很可能包含您数据库环境的生产目标。\n\
    \n### EM CLI 设置的安全模式\n\n在讨论第二级安全时，我们将阐述 EM CLI 中安全模式的含义。安全模式 EM CLI 是默认的安装模式，它不会在本地磁盘或日志文件中存储任何\
    \ Enterprise Manager 或 SSO 密码。\n\n默认情况下，EM CLI 登录在达到设定的不活动时间点后会自动超时，用户必须在尝试通过\
    \ EM CLI 发出任何其他命令之前重新登录。\n\n如果您希望将 EM CLI 安置设置为在重新发出动词时自动登录，并要求显式注销 EM CLI，请执行以下命令：\n\
    \n```\n> emcli setup –noautologin\n```\n\n### HTTPS 受信证书\n\n设置 HTTPS 受信证书首先需要快速检查以确认尚未完成。这可以通过以下同步后的\
    \ EM CLI 状态命令来实现，如图 [2-17](#9781484202395_Ch02.xhtml#Fig17) 所示：\n\n```\n> emcli\
    \ status\n```\n\n![9781484202395_Fig02-17.jpg](Images/9781484202395_Fig02-17.jpg)\n\
    \n图 [2-17](#9781484202395_Ch02.xhtml#_Fig17). 从 EM CLI 发出状态调用以查看有关 Enterprise\
    \ Manager 命令行界面和 https 状态的信息\n\n检查 EM URL 值，查看连接是否已在使用安全的 HTTPS URL。如果尚未使用，可以通过\
    \ EM CLI 动词调用进行配置：\n\n```\n> emcli setup –url=\"http[s]://host:port/em\" –username=\"\
    <username>” [-trustall] [-novalidate]\n```\n\n系统将要求您提供 `SYSMAN` 密码以完成对 EM 控制台的此安全级别配置更改。输入密码并按回车键以完成设置。运行\
    \ `emcli status` 动词调用将显示 `EMURL` 的更新值，或者可以使用 `emcli setup` 调用来查看它（图 [2-18](#9781484202395_Ch02.xhtml#Fig18)）。\n\
    \n![9781484202395_Fig02-18.jpg](Images/9781484202395_Fig02-18.jpg)\n\n图 [2-18](#9781484202395_Ch02.xhtml#_Fig18).\
    \ 发出 `setup` 命令以验证 EM CLI 和 Enterprise Manager 控制台所用 EM URL 的安全 https 连接\n\n###\
    \ Release 4 中的重要动词\n\n与 EM12c 的每个版本一样，Release 4 也包含了重大的增强和新动词的引入。Release 4 (12.1.0.4)\
    \ 也不例外，并且有更新的补丁来完成该版本，因为其他产品线的动词依赖项也同时发布了。\n\n#### 金质代理更新动词\n\n“金质代理”动词是那些在补丁中发布而非初始\
    \ Release 4 一部分的动词组之一。它们列在初始的 EM CLI 发布文档和帮助文件中，但实际上直到补丁发布后才可用。参见以下列表：\n\n*  \
    \ `get_agent_update_status`: 显示使用金质映像的所有代理更新结果\n*   `get_not_updatable_agents`:\
    \ 显示无法作为金质映像一部分进行更新的代理\n*   `get_updatable_agents`: 显示给定金质代理映像名称或金质映像系列中可更新的代理\n\
    \n#### BI 发布报表动词\n\nRelease 4 将 BI Publisher 作为安装的一部分包含在内。紧凑型安装现在仅约 300 MB 大小，只需几个\
    \ EM CLI 命令即可授予 Enterprise Manager 用户访问权限和功能：\n\n*   `grant_bipublisher_roles`:\
    \ 授予对 BI Publisher 目录和功能的访问权限\n*   `revoke_bipublisher_roles`: 撤销对 BI Publisher\
    \ 目录和功能的访问权限\n\n#### 云服务动词\n\n随着 Release 4 的发布，云产品得到了显著改进，能够从命令行管理云请求、用户和服务实例数据对于简化云服务的任务管理至关重要：\n\
    \n*   `cancel_cloud_service_requests`: 取消云请求。应提供用户或名称选项\n*   `delete_cloud_service_instances`:\
    \ 根据指定的过滤器删除云服务实例\n*   `delete_cloud_user_objects`: 删除云用户对象，包括云服务实例和请求\n*   `get_cloud_service_instances`:\
    \ 检索云服务实例列表。如果未指定选项，将打印所有实例。\n*   `get_cloud_service_requests`: 检索云请求列表。如果未应用过滤器，将打印所有请求。\n\
    *   `get_cloud_user_objects`: 检索云用户对象列表，包括云服务实例和请求。如果未使用用户选项，将打印所有对象。\n\n####\
    \ 其他动词\n\nRelease 4 对维护间隔（blackouts）进行了重大更改，其中之一是允许在控制台和命令行内进行追溯性维护间隔：\n\n*  \
    \ `create_rbk`: 在给定目标上创建追溯性维护间隔并更新其可用性。使用此 `emcli` 命令需要先在 UI 中启用追溯性维护间隔功能。\n*\
    \   孤儿目标一直是困扰一段时间的问题。新增的合规性增强动词解决了这个问题：\n    *   `fix_compliance_state`: 通过删除对已删除目标的引用来修复合规状态。\n\
    *   以下动词用于支持 WebLogic 环境中的复杂复合目标。设计一个专门用于修改这些目标的动词至关重要：\n    *   `modify_monitoring_agent`:\
    \ 此动词可用于更改配置为监控 WebLogic 域中目标的代理。\n\n#### Fusion Middleware 配置动词\n\nFusion Middleware\
    \ 新增了多个动词并进行了增强，以帮助管理 WebLogic 功能并从命令行构建更多选项：\n\n*   `create_fmw_domain_profile`:\
    \ 从 WebLogic 域创建 Fusion Middleware 配置文件\n*   `create_fmw_home_profile`: 从 Oracle\
    \ 主目录创建 Fusion Middleware 配置文件\n*   `create_inst_media_profile`: 从安装介质创建 Fusion\
    \ Middleware 配置文件\n\n#### 作业动词\n\nEM 作业服务进行了多项增强。这些增强功能使我们能够将作业从一个 EM12c Release\
    \ 2 OMS 导出并导入到相同版本或更高版本的环境中。为了提供更好的作业管理选项，Oracle 还在 Release 4 中通过 EM CLI 添加了更高级的作业控制：\n\
    \n*   `export_jobs`: 导出 EM 中所有匹配的作业定义，包括纠正措施。系统作业和嵌套作业被排除。\n*   `import_jobs`:\
    \ 将所有作业定义（包括来自 zip 文件的纠正措施）导入 EM。创建库作业。EM CLI 登录用户被设置为库作业所有者。\n*   `job_input_file`:\
    \ 在属性文件中指定作业动词的部分或全部属性。在命令行设置的属性会覆盖文件中的值。\n*   `resume_job`: 恢复与过滤条件匹配的一个或一组作业。\n\
    *   `suspend_job`: 挂起与过滤条件匹配的一个或一组作业。\n\n#### 目标数据动词"
  raw: 'The security architecture for the EM CLI is built around the architecture
    in the Enterprise Manager 12c environment and is often the first point of security
    concerns, as we’ve discussed above. The single point of access to the Enterprise
    Manager via the EM CLI is the second concern. The credentials to the remote targets
    that you will be interacting with via the EM CLI are the third level of access
    and are of even more concern, as these targets most likely include the production
    targets of your database environment.


    Secure Mode for EM CLI Setup


    Looking at the second level of security, we will discuss what secure mode means
    in the EM CLI. Secure mode EM CLI, which is the installation mode by default,
    does not store any Enterprise Manager or SSO passwords on local disk or in logs
    and files.


    By default, the EM CLI login automatically times out after reaching a set point
    for inactivity, and the user must log in again before attempting to issue any
    other commands via the EM CLI.


    If you wish to set up the EM CLI installation to log in automatically upon re-issue
    of a verb and demand an explicit logout of the EM CLI, execute the following command:


    ```

    > emcli setup –noautologin

    ```


    HTTPS Trusted Certificate


    Setting up HTTPS trusted certificates first requires a quick check to verify it
    hasn’t already been done. This can be achieved with an EM CLI status after the
    following sync, as shown in [Figure 2-17](#9781484202395_Ch02.xhtml#Fig17):


    ```

    > emcli status

    ```


    ![9781484202395_Fig02-17.jpg](Images/9781484202395_Fig02-17.jpg)


    [Figure 2-17](#9781484202395_Ch02.xhtml#_Fig17). Issuing the status call from
    the EM CLI to view information about the Enterprise Manager Command-Line Interface
    and https status


    Check the EM URL value to see if a secure HTTPS URL is already being used for
    the connection. If not, this can be configured with an EM CLI verb call:


    ```

    > emcli setup –url="http[s]://host:port/em" –username="<username>” [-trustall]
    [-novalidate]

    ```


    You will be asked to provide the SYSMAN password to complete this security-level
    configuration change to the EM console. Enter the password and press Return to
    complete the setup. Running the `emcli status` verb call will show the updated
    value for the EMURL, or one can use the `emcli setup` call to view it ([Figure
    2-18](#9781484202395_Ch02.xhtml#Fig18)).


    ![9781484202395_Fig02-18.jpg](Images/9781484202395_Fig02-18.jpg)


    [Figure 2-18](#9781484202395_Ch02.xhtml#_Fig18). Issuing the `setup` command to
    verify a secure https connection for the EM URL used by the EM CLI and Enterprise
    Manager console


    Verbs of Great Value in Release 4


    As with each of the EM12c releases, there have been great enhancements and the
    introduction of new verbs to be used with the EM CLI. Release 4 (12.1.0.4) was
    no different, and there were updated patches to complete the release, as dependencies
    for the verbs from other product lines were released as well.


    Gold Agent Update Verbs


    The “gold agent” verbs were one of those verb groups that were released in a patch
    versus being part of the initial Release 4\. They were listed with the initial
    EM CLI release documentation and help file, but were not actually available until
    the patch. See here:


    *   `get_agent_update_status`: Shows all agent update results using a gold image

    *   `get_not_updatable_agents`: Shows agents that can’t be updated as part of
    a gold image

    *   `get_updatable_agents`: Shows updatable agents for a given gold agent image
    name or part of a gold image series


    BI Publisher Reports Verbs


    Release 4 included BI Publisher as part of the installation. The compact install,
    which is now only approximately 300 MB in size, required only a few EM CLI commands
    to grant access and features to an Enterprise Manager user:


    *   `grant_bipublisher_roles`: Grants access to the BI Publisher catalog and features

    *   `revoke_bipublisher_roles`: Revokes access to the BI Publisher catalog and
    features


    Cloud Service Verbs


    Cloud offerings improved significantly with Release 4, and the ability to manage
    cloud requests, users, and service-instance data from the command line was essential
    to simplifying task management for cloud services:


    *   `cancel_cloud_service_requests`: Cancel the cloud requests. Either user or
    names option should be provided

    *   `delete_cloud_service_instances`: Deletes the cloud service instances based
    on the specified filter

    *   `delete_cloud_user_objects`: Deletes cloud user objects, including cloud service
    instances and requests

    *   `get_cloud_service_instances`: Retrieves the list of cloud service instances.
    All instances will be printed if no option is specified.

    *   `get_cloud_service_requests`: Retrieves the list of cloud requests. All requests
    will be printed if no filter is applied.

    *   `get_cloud_user_objects`: Retrieves the list of cloud user objects, including
    cloud service instances and requests. All objects will be printed if user option
    is not used.


    Miscellaneous Verbs


    There were significant changes to blackouts in Release 4, one of which was to
    allow for retroactive blackouts within the console, as well as within the command
    line:


    *   `create_rbk`: Creates retroactive blackout on given targets and updates their
    availability. The retroactive blackout feature needs to be enabled from the UI
    for using this `emcli` command.

    *   Orphan targets have been an issue for a while. Having the new compliance-enhancement
    verb addresses this problem:

    *   `fix_compliance_state`: Fix compliance state by removing references in deleted
    targets.

    *   The following verb is to support the complex composite targets in WebLogic
    environments. Having a specific verb designed to modify these targets is essential:

    *   `modify_monitoring_agent`: This verb can be used to change the agents that
    are configured to monitor targets in a WebLogic domain.


    Fusion Middleware Provisioning Verbs


    Fusion Middleware has a number of verb additions and enhancements to help manage
    WebLogic features and build out more options from the command line:


    *   `create_fmw_domain_profile`: Creates a Fusion Middleware Provisioning Profile
    from a WebLogic domain

    *   `create_fmw_home_profile`: Creates a Fusion Middleware Provisioning Profile
    from an Oracle home

    *   `create_inst_media_profile`: Creates a Fusion Middleware Provisioning Profile
    from installation media


    Job Verbs


    There were a number of enhancements to the EM Job Service. These enhancements
    enable us to export and import jobs from one EM12c Release 2 OMS to a same version
    or higher environment. For better job management options, Oracle has also added
    more-advanced job control from the EM CLI with Release 4:


    *   `export_jobs`: Exports all matching job definitions in EM, including corrective
    actions. System jobs and nested jobs are excluded.

    *   `import_jobs`: Imports all job definitions in to EM, including corrective
    actions from zip files. Library jobs are created. EM CLI logged-in user is set
    as the library job owner.

    *   `job_input_file`: Specifies some or all properties for the job verb in a property
    file. Properties set on the command line override values set in the file.

    *   `resume_job`: Resumes a job or a set of jobs matching the filter criteria.

    *   `suspend_job`: Suspends a job or a set of jobs matching the filter criteria.


