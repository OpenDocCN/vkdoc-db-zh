    reserved.


    Verb Jars Home (EMCLI_VERBJAR_DIR)      : /u01/app/oracle/product/12.1.0/mw_1/oms/bin/bindings/default/.emcli

    EMCLI Home (EMCLI_INSTALL_HOME)         : /u01/app/oracle/product/12.1.0/mw_1/oms/bin

    EMCLI Version                           : 12.1.0.3.0

    Java Home                               : /u01/app/oracle/product/12.1.0/mw_1/jdk16/jdk/jre

    Java Version                            : 1.6.0_43

    Log file (EMCLI_LOG_LOC)                : CONSOLE

    Log level (EMCLI_LOG_LEVEL)             : SEVERE

    EM URL (EMCLI_OMS_URL)                  : NOT SET

    EM user (EMCLI_USERNAME)                : NOT SET

    Auto login (EMCLI_AUTOLOGIN)            : false

    Trust all certificates (EMCLI_TRUSTALL) : false

    ```


    一旦设置完成并且有效的 Enterprise Manager 通过身份验证，EM CLI 就可以准备执行针对 EM 的任务。设置通常是发现问题的地方，尤其是在初始设置期间。例如，您可能不知道在安装
    EM CLI 的服务器与 OMS 之间，EM 使用的端口被阻止了。设置过程将揭示这一事实。一旦建立了成功的登录连接，EM CLI 的设置过程就完成了。


    ## 通信方式


    许多任务可以使用 EM CLI 或 EMCTL 来完成。选择使用哪种工具将取决于多种因素，例如哪种工具可用，或者哪种工具对特定任务更高效。工具与 Enterprise
    Manager 接口的方式可能是另一个需要考虑的因素。


    ### EM CLI


    EM CLI 是 Oracle Management Server (OMS) 的客户端，就像 SQL*plus 是数据库的客户端一样。Enterprise
    Manager OMS 安装包含 EM CLI 的安装。EM CLI 可执行文件位于 OMS 主目录中，即 `<OMS_HOME>/bin/emctl`。EM
    CLI 使用 HTML 与 OMS 通信，使用与访问 Enterprise Manager 图形界面相同的端口和 URL。


    在用于 EM CLI 和 Enterprise Manager 之间 HTTP 通信的端口上运行网络跟踪，会显示来自 EM CLI 的所有请求都是通过 HTTP
    的 `GET` 和 `POST` 请求。这些请求与通过 GUI 控制台建立登录时发出的请求相同。


    EM CLI 与 Enterprise Manager 接口的方式允许它从任何能够建立到 OMS IP 和端口的网络连接的位置进行连接，这使得在需要从托管
    OMS 代理以外的服务器运行命令的情况下，EM CLI 相比 EMCTL 具有明显优势。


    ### EMCTL


    EMCTL 与其安装的代理直接通信。EMCTL 只会与其自身的代理通信，即使同一服务器上运行着其他代理。


    ![Image](Images/sq.jpg) `Note` 还有一个 EMCTL 接口可以直接控制和与 OMS 通信，它有一组完全不同的命令。


    位于 `<AGENT_BASE>/agent_inst/bin` 的 `emctl` 命令是一个 shell 或批处理脚本，用于设置环境变量，并将传递给第一个命令的参数执行
    `<AGENT_HOME>/bin/emctl` 命令。`<AGENT_HOME>/bin/emctl` 也是一个 shell 或批处理脚本，用于设置环境变量以及源引许多其他文件。然后它使用传递给第一个命令的参数执行一个
    perl 脚本。这个 perl 脚本会源引许多其他 perl 脚本，并读取现有的状态文件或直接与 java 代理进程交互以获取结果。


    因为 EMCTL 直接与 java 代理进程交互，所以它不被视为客户端。这也意味着无法使用 EMCTL 远程控制代理。


    ### EMCTL 与 EM CLI 的比较


    何时使用 EMCTL 还是 EM CLI 主要基于偏好和环境限制。例如，两条命令都可以控制 Enterprise Manager 中的维护窗口。在一个环境中，由于需要的
    Java 版本或需要的端口访问，可能会限制远程或本地安装 EM CLI，这使得 EMCTL 成为更好的选择。在另一个环境中，可能对代理服务器上的 shell
    访问有限制，这使得 EM CLI 成为更好的选择。了解 EMCTL 和 EM CLI 之间的架构差异将有助于在不同情况下决定使用哪一个。


    EM CLI 的语法相对简单；`emcli` 后跟一个动词，然后是必需和可选的参数。EMCTL 的语法不那么容易理解，并且不遵循严格的格式。


    对于大多数命令，格式如下：`emctl` 后跟一个动词，然后是 `agent`。对于某些配置命令，格式是：`emctl` 后跟 `config agent`，然后是一个动词，如
    `listtargets` 或 `secure`。通常，找出要执行的 EMCTL 命令语法的最简单方法是在线查阅文档，或者通过不带任何参数执行 `emctl`
    命令来打印帮助文本。帮助文本将打印到屏幕上。


    可以通过将帮助文本重定向到可以打开和搜索的文件，或者通过将输出通过管道传输到可搜索的行读取器（如 `less`）来使此帮助文本可搜索：


    ```

    emctl > help.txt; vim help.txt

    emctl | less

    ```


    既然我们已经回顾了许多重要的概念和定义，现在让我们看一些真实世界的示例，这些示例可用于完成许多人可能使用 EM CLI 来完成的最常见任务。


    第一个任务，登录，是每个 EM CLI 会话都必须完成的，无论使用哪种模式。其他任务是在 GUI 不合适时使用 EM CLI 的示例，例如在计划脚本中或处理大量目标时。


    ## 任务：建立登录


    如果没有与 OMS 的连接，EM CLI 几乎没有有用的功能。创建该连接通常是使用该接口的第一步。如何建立连接取决于所使用的模式。


    当使用命令行模式时，如果在设置期间指定了 `-autologin` 参数，则不需要建立登录，因为此参数指示在 EM CLI 安装期间使用的凭据存储在安装文件中，并自动用于每个命令。使用
    `login` 动词建立登录。`login` 动词后必须跟 `-username` 参数，并可选择性地跟 `-password` 参数。


    不建议在命令行上包含密码，因为存在暴露密码的安全隐患。如果参数中未包含密码，EM CLI 将提示用户输入密码，并且输入的字符不会回显到屏幕上，在使用 `ps`
    命令查看正在运行的进程时密码也不会暴露。如果在设置期间未指定 `-autologin` 参数，登录会话将提示输入密码：


    ```

    [oracle ~]$ emcli login -username=sysman

    Enter password :


    Login successful

    ```


    在以脚本或交互模式运行 EM CLI 的情况下，每次脚本执行时以及每个交互会话开始时都必须明确提供登录信息。即使使用了 `-autologin` 参数，这两种模式也不会使用在设置期间建立的凭据。'
