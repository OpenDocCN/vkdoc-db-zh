    \ Since we may want to add to or change this list of properties in the future,\
    \ we’ll put these into a dictionary as keys and values:\n\n```\nemcli>myprops\
    \ = {'LifeCycle Status':'Development', 'Location':'COLO'}\n```\n\nWe want to make\
    \ sure we choose the correct targets for this update, so we will use regular expressions\
    \ to filter the target names. Using regular expressions within Jython requires\
    \ that we import another module:\n\n```\nemcli>import re\n```\n\nNow we can create\
    \ the regular expression that we will use to filter the target names. This filter\
    \ will be applied to each target name to determine if the target properties will\
    \ be applied to that target:\n\n```\nemcli>filtermatch = '^TEST_'\nemcli>myreg\
    \ = re.compile(filtermatch)\n```"
  trans: "\n第四行调用了 `list` 函数的 `out` 子函数。这个 `out` 函数要么将调用它的函数的输出打印到屏幕，要么将其传递给另一个对象。在此例中，`list`\
    \ 函数正在返回有关 EM 目标的信息，而 `type` 函数告诉我们这个输出是以字典对象的形式返回的。\n\n第六行显示了实际输出的一个非常小的部分，表明它包含在花括号内。花括号表明这是一个字典。请注意，其中一个值是一个列表，而不是字符串。字典值可以是任何其他对象类型，包括另一个字典。\n\
    \n## 登录脚本\n\n使用 EM CLI 的交互模式或脚本模式时，必须在 EM CLI 和 OMS 之间建立连接。这是一个可重复的过程，因此最佳实践是准备一个脚本，在每次调用脚本或登录\
    \ EM CLI 交互模式时都能调用它。\n\n下面描述了登录脚本，并附有对各个部分的注释。完整的脚本在分析之后列出。\n\n首先需要导入 EM CLI 的类和函数：\n\
    \n```python\nfrom emcli import *\n```\n\n也可以直接导入：\n\n```python\nimport emcli\n\
    ```\n\n但是，在这种情况下，每次调用 EM CLI 函数都需要加上模块名 `emcli` 作为限定符。\n\n下一步是确定要连接的 OMS：\n\n\
    ```python\nset_client_property('EMCLI_OMS_URL', 'https://em12cr3.example.com:7802/em')\n\
    ```\n\n接下来，需要指定一个有效的 SSL 证书文件以向 OMS 进行身份验证，或者指定信任任何呈现的证书：\n\n```python\nset_client_property('EMCLI_CERT_LOC',\
    \ '/path/to/cert.file')\n```\n\n或者\n\n```python\nset_client_property('EMCLI_TRUSTALL',\
    \ 'true')\n```\n\n可选地，你可以指定命令返回的格式：“JSON” 或 “TEXT”。除非有特定的文本输出需求，否则 JSON 是最通用且易于操作的格式。然而，它也更难阅读：\n\
    \n```python\nset_client_property('EMCLI_OUTPUT_TYPE', 'JSON')\n```\n\n或者\n\n```python\n\
    set_client_property('EMCLI_OUTPUT_TYPE', 'TEXT')\n```\n\n最后，指定要以哪个用户身份登录，并可选地提供该用户的密码。如果未指定密码，系统将提示你输入：\n\
    \n```python\nprint(login(username='sysman', password='foobar'))\n```\n\n完整的脚本如清单\
    \ 6-7 所示。\n\n清单 6-7. `start.py` 登录脚本\n\n```python\nfrom emcli import *\nset_client_property('EMCLI_OMS_URL',\
    \ 'https://em12cr3.example.com:7802/em')\nset_client_property('EMCLI_TRUSTALL',\
    \ 'true')\nset_client_property('EMCLI_OUTPUT_TYPE', 'JSON')\nprint(login(username='sysman',\
    \ password='foobar'))\n```\n\n尽管可以从包含登录脚本的同一目录启动 EM CLI，但如果该目录不在 Jython 的搜索路径中，Jython\
    \ 将无法看到它。清单 6-8 显示了如果你尝试导入的 `start.py` 文件不在 Jython 搜索路径中时会收到的错误消息。\n\n清单 6-8.\
    \ `start.py` 不在 Jython 搜索路径中\n\n```\nemcli>import start\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nImportError: No module\
    \ named start\n```\n\n`JYTHONPATH` 环境变量告诉 Jython 在哪些附加目录中搜索要导入的模块。在执行 `emcli`\
    \ 之前设置此变量。在清单 6-9 中，`start` 模块现在可以成功导入，无论是直接从交互模式命令行还是在脚本模式的脚本中。\n\n清单 6-9. 成功执行\
    \ `start.py` 脚本\n\n```\n[oracle@server ]$ export JYTHONPATH=/home/oracle/scripts\n\
    [oracle@server ]$ emcli\nemcli>import start\nLogin successful\n```\n\n如果你不习惯在脚本中包含密码（你确实不应该），并且只为登录函数指定\
    \ `username` 参数，系统将提示你输入密码：\n\n```\nEnter password :  **********\n```\n\n清单 6-10\
    \ 展示了一种替代的身份验证方法，它既能保证密码不包含在脚本中的安全性，又不需要每次调用脚本时都输入密码。此示例中的密码将包含在 `.secret` 文件中，该文件的权限应设置为仅允许调用\
    \ EM CLI 的操作系统用户读取。\n\n清单 6-10. 使用从外部文件读取密码的 `start.py` 登录脚本\n\n```python\nfrom\
    \ emcli import *\nset_client_property('EMCLI_OMS_URL', 'https://em12cr3.example.com:7802/em')\n\
    set_client_property('EMCLI_TRUSTALL', 'true')\nset_client_property('EMCLI_OUTPUT_TYPE',\
    \ 'JSON')\nf = open('/home/oracle/.secret','r')\npwd = f.read()\nprint(login(username='sysman',\
    \ password=pwd))\n```\n\n每次在脚本模式或交互模式下调用 EM CLI 时，都需要执行 `start.py` 脚本中包含的步骤，这就是为什么将登录过程编写为脚本很重要。任何直接调用的脚本都应在执行任何其他操作之前调用\
    \ `import start` 命令。\n\n## 使用 EM CLI 的 Python 脚本设置目标属性\n\nEM CLI 包含一个用于更改目标属性的函数。如果需要更新少量目标的属性，只需为每个目标执行\
    \ `set_target_property_value()` 函数即可。当需要更新数十甚至数百个目标的属性时，为每个目标执行该函数效率低下。幸运的是，使用\
    \ EM CLI，我们可以利用 Python 的完整脚本功能。\n\n可以使用 `for` 循环遍历任何对象，并对这些对象的每个部分执行任何任务。例如，在添加目标后添加或更新目标属性是很常见的。在\
    \ GUI 中为多个目标（超过几个）更改目标属性的任何任务都是繁琐且耗时的。在 EM CLI 中有不止一种方法可以完成此任务，但所有这些方法都比 GUI 提供的方法更简单、更高效。\n\
    \n出于演示目的，我们将使用交互模式，但所有这些命令在脚本模式下同样有效：\n\n```\nemcli>import start\nEnter password\
    \ :  **********\nLogin successful\n```\n\n创建一个包含所有目标的对象。暂时不用担心过滤掉目标。这部分将在脚本的后面完成：\n\
    \n```\nemcli>myobj = get_targets().out()['data']\nemcli>len(myobj)\n```\n\n在此例中，我知道我的仓库中有\
    \ `29` 个目标。我们想要将刚添加的、前缀为 `TEST_` 的目标的 `Lifecycle Status` 和 `Location` 属性分别更新为\
    \ `Development` 和 `COLO`。由于我们将来可能需要添加或更改此属性列表，因此我们将把这些作为键和值放入一个字典中：\n\n```\nemcli>myprops\
    \ = {'LifeCycle Status':'Development', 'Location':'COLO'}\n```\n\n我们希望确保为此更新选择了正确的目标，因此我们将使用正则表达式来筛选目标名称。在\
    \ Jython 中使用正则表达式需要我们导入另一个模块：\n\n```\nemcli>import re\n```\n\n现在我们可以创建用于筛选目标名称的正则表达式。此筛选器将应用于每个目标名称，以确定是否将目标属性应用于该目标：\n\
    \n```\nemcli>filtermatch = '^TEST_'\nemcli>myreg = re.compile(filtermatch)\n```\n"
- fmt: "Create a `for` loop to iterate through the targets. When writing programs\
    \ like this, it is a good idea to write a little code and then test, especially\
    \ when just getting started. Once the loop is created, we’ll run it with a simple\
    \ `print` command to make sure we are iterating through the appropriate information.\n\
    \nMake sure the lines shown in the example preceded by three dots are indented\
    \ properly. An indentation in Python is four spaces:\n\n```python\nemcli>for targ\
    \ in myobj:\n...    print(targ['Target Name'])\n```\n\nThis shows us that we are\
    \ able to see all of the target names in our repository. Now we can apply the\
    \ filter so we are only seeing the targets that start with `TEST_`:\n\n```python\n\
    emcli>for targ in myobj:\n...    if myreg.search(targ['Target Name']):\n...  \
    \      print(targ['Target Name'] + \\\n...              '  -  ' + targ['Target\
    \ Type'])\n```\n\nNow we are seeing just the targets we want to modify. Let’s\
    \ add in the command to change the properties. However, instead of running the\
    \ commands blindly, we’ll just print the command that the loop would have run\
    \ to make sure the commands are what we want without actually affecting the targets:\n\
    \n```python\nemcli>for targ in myobj:\n...    if myreg.search(targ['Target Name']):\n\
    ...        mycommand = 'set_target_property_value(' + \\\n...                \
    \    'property_records=\"' + \\\n...                    targ['Target Name'] +\
    \ ':' + \\\n...                    targ['Target Type'] + \\\n...             \
    \       ':LifeCycle Status:Development\")'\n...        print(mycommand)\nset_target_property_value(property_records=\"\
    TEST_em12cr3.example.com:host:LifeCycle \nStatus:Development\")\nset_target_property_value(property_records=\"\
    TEST_em12cr3.example.com:3872:oracle_emd:LifeCycle \nStatus:Development\")\n```\n\
    \nThe `set_target_property_value()` function commands are printed to the screen.\
    \ These commands can then be copied and pasted within the same EM CLI session:\n\
    \n```bash\nemcli>set_target_property_value(property_records=\"TEST_em12cr3.example.com:host:LifeCycle\
    \ \nStatus:Development\")\nProperties updated successfully\n```\n\nHowever, a\
    \ problem pops up immediately if we try to run the command for an agent target:\n\
    \n```bash\nemcli>set_target_property_value(property_records=\"TEST_em12cr3.example.com:3872:oracle_emd:LifeCycle\
    \ \nStatus:Development\")\nSyntax Error: Invalid value for parameter \"INVALID_RECORD_ERR\"\
    : \n\"em12cr3.example.com:3872:oracle_emd:LifeCycle Status:Development\"\n```\n\
    \nThe target name `TEST_em12cr3.example.com:3872` contains the default delimiter,\
    \ the colon character, which means we need to include another parameter in the\
    \ `set_target_property_value()` function to change the delimiter. The `subseparator`\
    \ parameter will change the character that separates the different parts of the\
    \ `property_records` parameter from a colon to an `@` sign. Notice the addition\
    \ of the `mysubsep` and `myproprecs` variables:\n\n```python\nemcli>for targ in\
    \ myobj:\n...    if myreg.search(targ['Target Name']):\n...        mysubsep =\
    \ 'property_records=@'\n...        myproprecs = targ['Target Name'] + \\\n...\
    \                     '@' + targ['Target Type'] + \\\n...                    \
    \ '@LifeCycle Status@Development'\n...        mycommand = 'set_target_property_value('\
    \ + \\\n...                    'subseparator=\"' + \\\n...                   \
    \ mysubsep + '\", property_records=\"' + \\\n...                    myproprecs\
    \ + '\")'\n...        print(mycommand)\nset_target_property_value(subseparator=\"\
    property_records=@\", property_records=\" TEST_em12cr3.\n                    \
    \                    example.com@host@LifeCycle Status@Development\")\nset_target_property_value(subseparator=\"\
    property_records=@\", property_records=\" TEST_em12cr3.\n                    \
    \                    example.com:3872@oracle_emd@LifeCycle Status@Development\"\
    )\n```\n\nThe commands are again printed to the screen. The properties for the\
    \ `TEST_em12cr3.example.com` target have already been updated, so only the command\
    \ to change the `TEST_em12cr3.example.com:3872` target needs to be copied and\
    \ pasted:\n\n```bash\nemcli>set_target_property_value(subseparator=\"property_records=@\"\
    , property_records=\"TEST_em12cr3.example.com:3872@oracle_emd@LifeCycle Status@Development\"\
    )\nProperties updated successfully\n```\n\nThe example we just looked at hardcodes\
    \ the properties. This will work fine if the properties never change, but at the\
    \ beginning of this exercise we created the `myprops` dictionary so we could easily\
    \ change the property keys and values:\n\n```python\nemcli>myprops = {'LifeCycle\
    \ Status':'Development', 'Location':'COLO'}\n```\n\nNow let’s change the code\
    \ we just created to take advantage of this variable. We’ll continue to use the\
    \ debugging mode we included in the code to print the commands to screen and then\
    \ add a nested `for` loop inside the existing `for` loop; we’ll then iterate through\
    \ the items of the `myprops` dictionary. There is also an additional change here\
    \ by adding the `mydelim` variable. By now you should be noticing a pattern; the\
    \ more you parameterize, the easier your code is to read, change, troubleshoot,\
    \ etc. Now if we decided to change the `subseparator` from an `@` sign to something\
    \ else, we would change it in one place, not four:\n\n```python\nemcli>for targ\
    \ in myobj:\n...    if myreg.search(targ['Target Name']):\n...        mydelim\
    \ = '@'\n...        mysubsep = 'property_records=' + mydelim\n...        myproprecs\
    \ = targ['Target Name'] + \\\n...                     mydelim + targ['Target Type']\
    \ + mydelim\n...        for propkey, propvalue in myprops.items():\n...      \
    \      myproprecprops = propkey + mydelim + propvalue\n...            mycommand\
    \ = 'set_target_property_value(' + \\\n...                        'subseparator=\"\
    ' + \\\n...                        mysubsep + '\", property_records=\"' + \\\n\
    ...                        myproprecs + \\\n...                        myproprecprops\
    \ + '\")'\n...            print(mycommand)\n```\n\nThese commands should work\
    \ great for copy and paste, but we want to automate it further to skip the copy\
    \ and paste and run the commands automatically in the code. However, when problems\
    \ arise later, we don’t want to lose the ability to look at this verbose output\
    \ again, so we’ll leave the debug in place and supplement it with the ability\
    \ to choose whether we want to see the command printed to the screen or have it\
    \ be run automatically by the script.\n\nAdding a `debug` variable at the beginning\
    \ of the script and checking for the value of that variable within the script\
    \ is an easy way to enable or disable a “testing” mode. By default the `debug`\
    \ variable will be false unless it is assigned a value, in which case it becomes\
    \ true:\n\n```python\nemcli>debug = ''\nemcli>if debug:\n...     print('True')\n\
    ... else:\n...     print('False')\n...\nFalse\nemcli>debug = 'Yes'\nemcli>if debug:\n\
    ...     print('True')\n... else:\n...     print('False')\n...\nTrue\n```\n\nNow\
    \ we can add this logic into the script and use it to decide whether we are debugging\
    \ the script or executing it normally. There is also a line of output for normal\
    \ execution mode that prints out some basic information about what the commands\
    \ are doing:"
