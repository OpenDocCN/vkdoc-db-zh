  trans: "# 第 3 章\n\n## 概要\n\n对大多数读者而言，使用动词调用是 `EM CLI` 工作中最主要的部分。熟悉 `12.1.0.4` 版本中的重大动词变更至关重要，但在本书的剩余章节中，我们将围绕在企业管理器命令行界面中进行脚本编写的这一目标，来构建你的知识体系。\n\
    \n## 术语与基础\n\n![image](img/frontdot.jpg)\n\n像任何命令行工具一样，`EM CLI` 初看起来可能让人望而生畏。但如同技术领域的其他事物一样，人们对某样东西的工作原理理解得越透彻，它就越有用，使用起来也越容易。\n\
    \n`EM CLI` 的信息量太大，即使只是其中一小部分也难以全部记住。文档与工具本身同等重要。理解文档、内置手册以及工具本身所使用的术语，能够让你通过提出正确的问题来快速找到所需内容。例如，如果你要寻找创建用户的命令，你需要知道你是在寻找一个**动词**，而不是参数或变量。\n\
    \n一旦理解了 `EM CLI` 的术语，对其功能有基本的了解，就能立即开始执行基本任务，而真正的学习也由此开始。本章首先通过解释 `EM CLI` 与企业管理器的协作方式，然后提供一系列详细示例，来介绍其基础知识。\n\
    \n### 术语：动词\n\n`EM CLI` 的功能使用**动词**来执行操作。动词是以用户命令形式呈现的任务或操作，它暴露了企业管理器的功能。理解动词及其如何用于完成任务，对于充分利用\
    \ `EM CLI` 至关重要。\n\n动词可以包含一个或多个参数。所使用的**模式**决定了这些参数的形式。例如，在**命令行模式**下使用 `EM CLI`\
    \ 时，参数是跟在动词后面的**位置参数**。每个参数前都有一个短横线，后跟一个等号。随后可以为该参数赋值，值通常用引号括起来。\n\n有些参数是必需的，有些是可选的。文档通过将可选参数放在方括号中来标识它们。例如，`clear_privilege_delegation_setting`\
    \ 动词有一个必需参数和两个可选参数（清单 3-1）。\n\n**清单 3-1. clear_privilege_delegation_setting 动词的必需和可选参数**\n\
    ```\nemcli clear_privilege_delegation_setting\n        -host_names=\"name1;name2;...\"\
    \n        [-input_file=\"FILE:file_path\"]\n        [-force=\"yes/no\"]\n```\n\
    \n截至 `12.1.0.3` 版本，共有 `362` 个动词。为了更方便地帮助你查找和管理动词，它们被分为 `58` 个类别。这些类别代表了逻辑功能。例如，如果你要查找与修补相关的动词，你会在\
    \ *修补动词* 类别中找到它们。如果要查找与黑屏（blackouts）相关的动词，你会在 *黑屏动词* 类别中查找。\n\n动词的命名方式使其功能一目了然。有些名称很短，如\
    \ `login` 和 `start_agent`；有些则非常长，如 `update_monitoring_creds_from_agent` 和 `list_target_privilege_delegation_settings`。这种命名法的好处在于，它使得动词相对容易记忆，并且便于根据功能来查找动词。\n\
    \n### 模式\n\n`EM CLI` 可以通过三种不同模式之一调用。模式是使用 `EM CLI` 的方法。选择哪种模式取决于任务的目的和范围。\n\n\
    #### 命令行模式\n\n在 `12.1.0.3` 版本之前，`EM CLI` 仅在一种模式下运行——命令行模式。在命令行模式下，每次调用 `emcli`\
    \ 可执行文件，`EM CLI` 只执行一个动词。命令行模式下的 `EM CLI` 没有子 shell 或编程接口。任何 `EM CLI` 的脚本编写都需要通过能够调用单个\
    \ `EM CLI` 命令并处理其输出的 shell 来完成。\n\n#### 交互模式\n\n随着 `12.1.0.3` 版本的发布，`EM CLI` 现在包含了经典的命令行模式以及交互模式和脚本模式。交互模式允许将\
    \ `EM CLI` 作为所使用任何终端的子 shell 调用。当 `EM CLI` 在交互模式下运行时，提示符会更改为自定义的 Python 提示符：\n\
    ```\ncd $OMS_HOME/bin\n./emcli\nemcli>\n```\n\n#### 脚本模式\n\n脚本模式没有子 shell 或提示符。实际上，它与命令行模式非常相似，区别在于其调用允许第一个参数是一个用\
    \ Python 兼容编程语言编写的脚本。然后，该脚本会被执行，就如同命令被输入到交互模式一样。脚本模式下的 `EM CLI` 只调用一次，但与命令行模式不同的是，Python\
    \ 编程语言的全部功能都可以用来完成在命令行模式中需要 shell 来完成的一切工作。此外，脚本模式以原生形式调用 `EM CLI`，这使得解析命令输出等工作变得更加容易和高效，尤其是在使用\
    \ JSON 时。\n\n### 帮助！\n\n`EM CLI` 具有内置的帮助功能。获取命令行模式下可用动词的概览列表，只需使用动词 `help` 执行\
    \ `EM CLI` 即可。如果你没有使用额外的参数来限定命令，请准备好接收大量数据。如果你需要关于某个特定动词的更多信息，请将该动词作为第二个参数添加。\n\
    \n要在交互模式下使用 `help`，需要调用一个名为 `help()` 的 Python 函数。`help()` 函数只需要一个参数——帮助主题。帮助主题可以是一个动词函数，也可以是某些动词函数的参数。请注意，交互模式中包含的一些帮助主题在命令行模式中并不存在。例如，命令行模式使用设置文件来保存\
    \ `EM CLI` 属性，但交互模式和脚本模式则不使用。每次调用交互或脚本模式时，属性都会被设置。我们可以使用 `help()` 函数来查看设置属性时应使用哪些参数，如\
    \ 清单 3-2 所示。\n\n**清单 3-2. 客户端属性帮助页面**\n```\nemcli>help('client_properties')\n\
    EMCLI_OMS_URL             : 要连接到的 OMS URL。\nEMCLI_USERNAME            : OMS 用户名。\n\
    EMCLI_AUTOLOGIN           : 可能的值为 true, false。默认为 false。\nEMCLI_TRUSTALL     \
    \       : 可能的值为 true, false。默认为 false。\nEMCLI_VERBJAR_DIR         : 绑定目录的位置。\n\
    EMCLI_CERT_LOC            : 有效证书文件的位置。\nEMCLI_LOG_LOC             : 日志文件存储的目录。\n\
    EMCLI_LOG_LEVEL           : 可能的值为 ALL, INFO, FINE, FINER, WARN, SEVERE。默认为 SEVERE。\n\
    EMCLI_OUTPUT_TYPE         : 可能的值为 json, JSON, text, TEXT。脚本模式下默认为 json，交互模式下默认为\
    \ text。\n```\n\n---\n\n*   `create_assoc`: 创建目标关联实例\n*   `delete_assoc`: 删除目标关联实例\n\
    *   `list_allowed_pairs`: 列出指定源和目标目标类型所允许的关联类型\n*   `list_assoc`: 列出指定源目标和目标目标之间的关联\n\
    *   `manage_agent_partnership`: 覆盖企业管理器自动将伙伴代理分配给其他代理的默认行为。伙伴代理是指，除了其其他功能外，还被分配给另一个代理作为其“伙伴”的代理，以便远程监控该代理及其主机的可用性。此动词并非设计为常用。它是为了支持特殊情况而提供的，例如管理员可能希望明确分配代理伙伴关系，或排除某些代理成为伙伴，或排除某些代理被其他代理远程监控。"
- fmt: "`status()` will list values of all the client properties. `set_client_property(propertyname,\
    \ value)` and `get_client_property(propertyname)` can be used to set and get a\
    \ client property.\n\n## Understanding Error Codes\n\nThere are a number of error\
    \ codes that you might see when using EM CLI. The information provided in these\
    \ error codes is critical to determining what caused the error. The error codes\
    \ shown below are some of those that are seen most often; they almost always have\
    \ an easy fix.\n\nCommand-line mode requires a login session to be established\
    \ before any commands can be executed. In secure environments and by default,\
    \ the login session will expire after 45 minutes. When a valid command is executed\
    \ without an established login session when in command-line mode, an error is\
    \ thrown with an exit code of 255. In order to proceed, a valid session will need\
    \ to be established by using the `login` verb, as shown in [Listing 3-3](#9781484202395_Ch03.xhtml#list3).\n\
    \nListing 3-3. Login error message and exit code in command-line mode\n```\n[oracle\
    \ oms]$ emcli get_targets\nError: Session expired. Run emcli login to establish\
    \ a session.\n[oracle oms]$ echo $?\n```\n\nInteractive and scripting modes require\
    \ that the connection parameters be included each time a script is executed or\
    \ an interactive session is established. If the connection URL has not been specified,\
    \ an error will be thrown with details on how to establish the connection, as\
    \ shown in [Listing 3-4](#9781484202395_Ch03.xhtml#list4).\n\nListing 3-4. Settings\
    \ error in interactive and scripting modes\n```\nemcli>get_targets()\nError: EM\
    \ URL is not set. Do set_client_property('EMCLI_OMS_URL', '<value>')\nOr set it\
    \ as environment variable.\n\n[oracle ~]$ emcli @test.py\nTraceback (most recent\
    \ call last):\n  File \"test.py\", line 1, in <module>\n    get_targets()\n  File\
    \ \"<string>\", line 41, in get_targets\nemcli.exception.VerbExecutionError: Error:\
    \ EM URL is not set. Do set_client_property('EMCLI_OMS_URL', '<value>')\nOr set\
    \ it as environment variable.\n```\n\nErrors can be caused by myriad reasons.\
    \ The EM CLI developers have done an excellent job of making the error messages\
    \ descriptive and useful. When you encounter errors, read the description thoroughly\
    \ in order to understand what issue caused it. When in doubt, search for the error\
    \ in the documentation or on the Internet. Chances are, someone else has already\
    \ found and fixed the cause of the error.\n\n## Syntax\n\nThe EM CLI program can\
    \ be used in three different modes. These are command-line mode, interactive mode,\
    \ and scripting mode. Up until version 12.1.0.2, there was only the command-line\
    \ mode. The interactive and scripting modes became available in version 12.1.0.3,\
    \ along with an exposed programming interface that uses Jython.\n\nThe standard\
    \ command-line mode hasn’t changed much since Grid Control 10g. With few exceptions,\
    \ scripts used with previous versions of EM CLI will continue to work with the\
    \ latest version or 12c. The command-line syntax is the `emcli` command, followed\
    \ by one verb, followed by zero or more verb options or parameters, as shown in\
    \ this example:\n```\nemcli create_group -name=my_group -add_targets=\"mymachine.example.com:hostname\"\
    \n```\n\nThe interactive and scripting modes both use the Jython programming language.\
    \ The interactive mode is a single-user interactive session created by executing\
    \ the `emcli` command without any parameters.\n\nStandard Linux shell commands\
    \ will not work in the interactive shell. The interactive mode of EM CLI can be\
    \ closed using the command `exit()` or by typing `ctrl-d` in Linux or `ctrl-z`\
    \ in Windows.\n\nInteractive mode syntax differs from that of the standard command-line\
    \ mode. Once an interactive mode shell has been established, it is no longer necessary\
    \ to use the `emcli` command. Executing an EM CLI command is done by putting a\
    \ verb into the shell directly and enclosing the verb options within parentheses.\
    \ The verb options are not preceded by a dash like they are in command-line mode,\
    \ but rather are preceded by a comma when followed by other options. The following\
    \ shows the `create_group` function in interactive mode with the `name` and `add_targets`\
    \ options:\n```\nemcli> create_group(name=my_group, add_targets=\"mymachine.example.com:hostname\"\
    )\n```\n\nScripting mode uses the same command syntax as the interactive mode\
    \ but does not require the Jython shell. All of the EM CLI commands to be executed\
    \ would be formatted like the interactive shell command above and put into a script,\
    \ along with any other Python code to be included. The script is executed non-interactively\
    \ by following the `emcli` command with an `@` symbol and the name of the script:\n\
    ```\n[oracle ~]$ emcli @my_script.py\n```\n\n## Setup\n\nEM CLI is included in\
    \ every OMS installation and is set up to connect to that OMS automatically. The\
    \ setup configuration can be confirmed with the `setup` verb. Running the command\
    \ in command-line mode shows that EM CLI is configured to connect to `https://oem.example.com:7802/em`\
    \ with the `SYSMAN` user, as shown in [Listing 3-5](#9781484202395_Ch03.xhtml#list5).\n\
    \nListing 3-5. Output of EM CLI setup in command-line mode\n```\n[oracle ~]$ emcli\
    \ status\nOracle Enterprise Manager 12c EMCLI 12.1.0.3.0.\nCopyright (c) 1996,\
    \ 2013 Oracle Corporation and/or its affiliates. All rights reserved.\n\nInstance\
    \ Home          : /u01/app/oracle/product/12.1.0/gc_inst/em/EMGC_OMS1/sysman/emcli/setup/.emcli\n\
    Verb Jars Home         : null\nStatus                 : Configured\nEMCLI Home\
    \             : /u01/app/oracle/product/12.1.0/mw_1/oms/bin\nEMCLI Version   \
    \       : 12.1.0.3.0\nJava Home              : /u01/app/oracle/product/12.1.0/mw_1/jdk16/jdk/jre\n\
    Java Version           : 1.6.0_43\nLog file               : /u01/app/oracle/product/12.1.0/gc_inst/em/EMGC_OMS1/sysman/emcli/setup/.emcli/.emcli.log\n\
    EM URL                 : https://oem.example.com:7802/em\nEM user            \
    \    : SYSMAN\nAuto login             : false\nTrust all certificates : true\n\
    ```\n\nAfter installing EM CLI on a system other than the OMS server, it must\
    \ be explicitly configured before it will function with an Enterprise Manager\
    \ installation. Executing the `setup` command against an EM CLI installation that\
    \ has not yet been configured returns an error, as shown in [Listing 3-6](#9781484202395_Ch03.xhtml#list6).\n\
    \nListing 3-6. An EM CLI installation that has not yet been set up\n```\n[oracle\
    \ ~]$ emcli setup\nOracle Enterprise Manager 12c 3.\nCopyright (c) 1996, 2013\
    \ Oracle Corporation and/or its affiliates. All rights reserved.\n\nNo current\
    \ OMS\n```\n\nThe configuration is done with the `setup` verb followed by a number\
    \ of parameters. The `url` parameter is the same as the address used in the browser\
    \ to login to Enterprise Manager. The `dir` parameter specifies the directory\
    \ in which to install the client. The `username` parameter indicates which username\
    \ the client will use for connecting. The `noautologin` parameter determines that\
    \ a user name and password will need to be provided in order to gain access to\
    \ the OMS before an EM CLI session can be established. The `trustall` parameter\
    \ indicates that certificates on the OMS will be trusted automatically. The following\
    \ `dir` parameter in the EM CLI setup command is using shell expansion to indicate\
    \ that the installation directory is the current working directory:\n```\n[oracle\
    \ ~]$ emcli -url=https://<hostname of grid server>:1159/em -dir=$(pwd) \n-username=<username>\
    \ -noautologin -trustall\n```"
