- fmt: "# 使用EM CLI管理Oracle Enterprise Manager 12c软件库\n\n## 创建软件库位置\n\n可以使用`emcli add_swlib_storage_location`命令创建新的共享文件系统。\n\
    ```\nemcli add_swlib_storage_location\n        -name=\"WIN_UPLOAD\"\n        -path=\"\
    F:\\sw_lib \"\n```\n此操作将创建一个新的OMS共享文件系统，其使用方式与通过控制台创建的任何文件系统相同。\n\n可以通过以下EM CLI命令创建代理共享文件系统：\n\
    ```\nemcli add_swlib_storage_location\n        -name=\"Agent_WIN_UPLOAD\"\n  \
    \      -path=\"F:\\swlib\"\n        -type=\"OmsAgent\"\n        -host=\"orcl.us.acme.com\"\
    \n        -credential_name=\"MyOrclCreds\"\n        -credential_owner=\"ORCL_USER\"\
    \n```\n这个共享代理文件系统现已就绪，它将利用`EM12c`环境中已设置的现有凭证，并使用共享卷目录路径`/u01/swlib`。\n\n第三种选择是引用文件位置。仅当文件存储在软件库外部时才使用此选项，并将从该引用位置进行部署。\n\
    \n## 在软件库中创建文件夹\n\n最佳实践建议在Enterprise Manager软件库中创建一个独立的文件夹来存放脚本或其他杂项实体。从`EM12c`控制台执行此操作很简单。\n\
    \n从控制台依次点击 `Enterprise`，`Provisioning and Patching`，然后点击 `Software Library`，如图[Figure\
    \ 7-4](#9781484202395_Ch07.xhtml#Fig4)所示。\n\n![9781484202395_Fig07-04.jpg](Images/9781484202395_Fig07-04.jpg)\n\
    *[Figure 7-4](#9781484202395_Ch07.xhtml#_Fig4). 在EM12c中访问软件库*\n\n在软件库中，已经存在许多文件夹，但应该创建一个新文件夹来存放脚本。右键点击\
    \ `Software Library`（目录中的顶层），然后点击 `Create Folder`（[Figure 7-5](#9781484202395_Ch07.xhtml#Fig5)）。\n\
    \n![9781484202395_Fig07-05.jpg](Images/9781484202395_Fig07-05.jpg)\n*[Figure 7-5](#9781484202395_Ch07.xhtml#_Fig5).\
    \ 在EM12c软件库中创建文件夹*\n\n屏幕[Figure 7-6](#9781484202395_Ch07.xhtml#Fig6)弹出，允许您输入与文件夹相关的信息。\n\
    \n![9781484202395_Fig07-06.jpg](Images/9781484202395_Fig07-06.jpg)\n*[Figure 7-6](#9781484202395_Ch07.xhtml#_Fig6).\
    \ 在软件库中创建文件夹的信息条目*\n\n输入一个明确定义文件夹用途的名称，并添加一个描述以帮助任何阅读该文件夹属性的人。确认您希望在软件库的父目录中创建该文件夹，满意后点击`OK`。\n\
    \n返回到软件库的主页，新文件夹现在将出现在下拉列表中（[Figure 7-7](#9781484202395_Ch07.xhtml#Fig7)）：\n\n\
    ![9781484202395_Fig07-07.jpg](Images/9781484202395_Fig07-07.jpg)\n*[Figure 7-7](#9781484202395_Ch07.xhtml#_Fig7).\
    \ 刚在软件库中为命令行脚本创建的新文件夹*\n\n此文件夹将用于在软件库中存放`EM CLI`脚本，从而轻松地将它们与其他存储实体区分开来。\n\n##\
    \ 将脚本添加到软件库\n\n从上一节创建的文件夹加载脚本是在软件库内的相同区域执行的。首先，高亮显示已创建的`CLI_Scripts`文件夹，然后依次点击`Actions`、`Create\
    \ Entity`，最后点击`Component`（[Figure 7-8](#9781484202395_Ch07.xhtml#Fig8)）。\n\n![9781484202395_Fig07-08.jpg](Images/9781484202395_Fig07-08.jpg)\n\
    *[Figure 7-8](#9781484202395_Ch07.xhtml#_Fig8). 将脚本添加到软件库（即创建实体）*\n\n脚本将被构建为一个可以从软件库部署的单一组件。如果多个脚本是单个部署过程的一部分，可以将它们存储在一个组件中。\n\
    \n您可以选择将文件上传到库中或引用文件（一个引用）。对于此处的示例，目标是签入一个脚本。它将被存储为一个单一的通用组件（即实体）。\n\n选择将要上传到的软件库位置。在我们的示例中，我们将使用默认的上传共享位置。逻辑位置将是控制台内的`CLI_Scripts`文件夹。"
  raw: "```\nemcli add_swlib_storage_location\n        -name=\"WIN_UPLOAD\"\n    \
    \    -path=\"F:\\sw_lib \"\n```\n\nThis will create a new OMS shared file system\
    \ that can be used just the same as any created from the console.\n\nAn agent\
    \ shared file system can be created via the EM CLI with the following command:\n\
    \n```\nemcli add_swlib_storage_location\n        -name=\"Agent_WIN_UPLOAD\"\n\
    \        -path=\"F:\\swlib\"\n        -type=\"OmsAgent\"\n        -host=\"orcl.us.acme.com\"\
    \n        -credential_name=\"MyOrclCreds\"\n        -credential_owner=\"ORCL_USER\"\
    \n```\n\nThis shared agent file system is now ready and will utilize existing\
    \ credentials set up in the EM12c environment as well as use a shared volume directory\
    \ path of `/u01/swlib`.\n\nThe third option is a referenced file location. This\
    \ is used only if the file is stored outside the software library and will be\
    \ deployed from this referenced location.\n\nChecking In Entities\n\nBest practice\
    \ recommends creating a standalone folder within the Enterprise Manager software\
    \ library to house scripts or other miscellaneous entities. This is a simple task\
    \ when performed from the EM12c console.\n\nFrom the console, click on Enterprise,\
    \ Provisioning and Patching, and then Software Library, as shown in [Figure 7-4](#9781484202395_Ch07.xhtml#Fig4).\n\
    \n![9781484202395_Fig07-04.jpg](Images/9781484202395_Fig07-04.jpg)\n\n[Figure\
    \ 7-4](#9781484202395_Ch07.xhtml#_Fig4). Accessing the software library in EM12c\n\
    \nIn the software library, a number of folders are already present, but a new\
    \ one should be created to house scripts. Right click on Software Library (the\
    \ top tier in the directory) and click on Create Folder ([Figure 7-5](#9781484202395_Ch07.xhtml#Fig5)).\n\
    \n![9781484202395_Fig07-05.jpg](Images/9781484202395_Fig07-05.jpg)\n\n[Figure\
    \ 7-5](#9781484202395_Ch07.xhtml#_Fig5). Creating a folder in the EM12c software\
    \ library\n\nThe screen in [Figure 7-6](#9781484202395_Ch07.xhtml#Fig6) comes\
    \ up and allows you to enter information pertaining to the folder.\n\n![9781484202395_Fig07-06.jpg](Images/9781484202395_Fig07-06.jpg)\n\
    \n[Figure 7-6](#9781484202395_Ch07.xhtml#_Fig6). Information entries about a folder\
    \ to be created in the software library\n\nEnter a name that clearly defines the\
    \ use for the folder and add a description that will assist anyone who reads the\
    \ folder’s properties. Verify that you want to create the folder in the parent\
    \ directory of the software library and, once satisfied, click OK.\n\nReturning\
    \ to the main page of the software library, the new folder will now be present\
    \ in the dropdown ([Figure 7-7](#9781484202395_Ch07.xhtml#Fig7)):\n\n![9781484202395_Fig07-07.jpg](Images/9781484202395_Fig07-07.jpg)\n\
    \n[Figure 7-7](#9781484202395_Ch07.xhtml#_Fig7). The new folder just created for\
    \ command-line scripts in the software library\n\nThis is the folder that will\
    \ be used to house the EM CLI scripts in the software library, making it simple\
    \ to distinguish them from other stored entities.\n\nAdding Scripts to the Software\
    \ Library\n\nLoading scripts from the folder created in the last section is performed\
    \ from the same area within the software library. First, highlight the CLI_Scripts\
    \ folder that was created, then click on Actions, Create Entity, and then Component\
    \ ([Figure 7-8](#9781484202395_Ch07.xhtml#Fig8)).\n\n![9781484202395_Fig07-08.jpg](Images/9781484202395_Fig07-08.jpg)\n\
    \n[Figure 7-8](#9781484202395_Ch07.xhtml#_Fig8). Adding scripting to the software\
    \ library, a.k.a., creating entities\n\nThe script is going to be built out as\
    \ a single component that can be deployed from the software library. Multiple\
    \ scripts can be stored within one component if they are part of a single deployment\
    \ process.\n\nYou have the choice to upload files into the library or to refer\
    \ to files (a reference). For the example here, the goal is to check in a script.\
    \ It will be stored as a single, generic component (a.k.a. entity).\n\nChoose\
    \ the software library location that will be uploaded to. In our example, we will\
    \ use the default shared location for uploading. The logical location will be\
    \ our CLI_Scripts folder within the console."
