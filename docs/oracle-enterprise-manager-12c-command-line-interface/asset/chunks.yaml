  trans: "\n本节中几乎所有脚本都需要在命令行输入一个或多个变量，通常就是目标名称。命令行传递的变量会按其出现的顺序在脚本主体中引用。可执行文件表示为 `$0`，其后的第一个字符串是\
    \ `$1`，依此类推。例如，可以使用类似这样的条目：\n\n```\n./oem_target_blackout.sh orcla\n```\n\n此例将变量\
    \ `$0` 解释为脚本名 `oem_target_blackout.sh`，将 `$1` 解释为数据库名。脚本中的逻辑应验证所需的命令行输入非空，或者退出时给出明确的错误陈述，告知用户或日志文件出了什么问题。在示例脚本中，你会看到这种技术的几个应用实例。\n\
    \n## 存活性证据\n\n你开发的每个 Shell 脚本都应能够在命令行上直接执行以测试单次运行，同时也应无需任何修改就能通过 Cron 等调度器执行。要避免使用同一脚本的两个版本来支持这两种操作模式。随着环境复杂性的增加，这可能演变成维护的噩梦。相反，应通过检查调用脚本的会话性质来测试是否存在活跃的用户会话。在运行时，每个活跃用户连接都会在\
    \ `/dev` 目录下为每个终端会话创建一个文件系统条目。TTY 是 **电传会话** 的旧称——即你的终端会话。当然，通过 Cron 执行的脚本不是从终端调用的，因此与那些执行没有关联的\
    \ `/dev/tty`。\n\n使用 `if` 语句测试 TTY 会话的存在，并相应地设置运行时变量。例如，如果你的脚本要求在命令行上传递数据库名，那么对于有人值守的会话和\
    \ cron/计划执行的会话，对缺失输入的处理方式会有所不同：\n\n```\nif [ ${1} -eq 0 ]; then\n  if tty -s;\
    \ then\n      read -p \"Please provide the name of the database: \" thisSID\n\
    \  else\n      echo \"The database name was not provided on the command line\"\
    \  >>runtime.log\n      exit\n   fi\nfi\n```\n\n为了清晰起见，示例脚本中移除了这类会话检查。\n\n## 示例函数库\n\
    \n本函数库被本节剩余部分中的许多 Shell 脚本引入。它也可以在终端会话中引入以便立即使用，或引入到任何其他 Shell 脚本中使用。\n\n```\n\
    Sample Script: emcli_functions.lib\n#!/bin/sh\n#/* vim: set filetype=sh : */\n\
    # ==============================================================================\n\
    #  文件:          emcli_functions.lib\n#  目的:   用于常见 emcli 任务的 Shell 脚本函数\n#  文件权限:\
    \ 此文件被引入但从不直接执行\n#  Echo 语句: 为此脚本示例移除了 echo 语句的格式化，以保持逻辑清晰。请善待你的\n#          \
    \                   用户，在你自己的副本中自由添加空格\n# ==============================================================================\n\
    # SysmanPassword 变量仅在一处用于调用你的专有密码加密解决方案，\n# 或在一处记录 SYSMAN 密码以供你的脚本和本库中的函数使用。\n\
    # 强烈建议你实施更安全的解决方案，例如通过 Java 或其他工具进行加密/解密\n# ------------------------------------------------------------------------------\n\
    \nSysmanPassword=Sup3r_S3cr3t_PASSWORD\n\n# ==============================================================================\n\
    #  通用函数\n# ==============================================================================\n\
    \nfunction CleanUpFiles {\n# --------------------------------------------------------------------------------------------------\n\
    # CleanUpFiles 在每个脚本开始时被调用，以确保移除旧的临时工作文件副本，从而全新开始\n# CleanUpFiles 也会被 ExitCleanly\
    \ 函数调用，以在脚本执行完成后清理\n# --------------------------------------------------------------------------------------------------\n\
    # 文件\n# ..............................................................................\n\
    \n[ $WORKFILE ] && rm -f ${WORKFILE}\n[ $WORKFILE01 ] && rm -f ${WORKFILE01}\n\
    [ $WORKFILE02 ] && rm -f ${WORKFILE02}\n}\n\nfunction ExitCleanly {\n# --------------------------------------------------------------------------------------------------\n\
    # ExitCleanly 在脚本被指示退出时调用，无论脚本是成功还是失败结束。\n# 干净的服务器是快乐的服务器\n# --------------------------------------------------------------------------------------------------\n\
    \necho \"Ending emcli session ...\"\nemcli logout\nCleanUpFiles\necho \"\"\nexit\
    \ 0\n}\n\nfunction GetAgentNames {\n# --------------------------------------------------------------------------------------------------\n\
    # 如 echo 语句所示，GetAgentNames 可用于列出 OEM 已知的所有\n# oracle_emd 目标类型的目标\n# --------------------------------------------------------------------------------------------------\n\
    \nemcli login -user=sysman -pass=\"${SysmanPassword}\"\necho \"Getting the names\
    \ of all EM agents from OMS ...\"\nemcli get_targets | grep oracle_emd | sort\
    \ -u | awk '{ print $4 }'\n}\n\nfunction GetTargetName {\n# --------------------------------------------------------------------------------------------------\n\
    # 任何脚本或函数都应使用此函数来查找\n# 数据库的确切名称。如果数据库不为 OEM 所知，它会返回一条\n# 清晰的失败消息。\n# 你可以轻松调整 GetTargetName\
    \ 来查找主机或代理名称\n# --------------------------------------------------------------------------------------------------\n\
    # 调用脚本必须将数据库名作为变量 thisSID 传递\n# --------------------------------------------------------------------------------------------------\n\
    \nemcli login -user=sysman -pass=\"${SysmanPassword}\"\necho \"Getting the exact\
    \ target name for $thisSID from OMS ...\"\nif [ `emcli get_targets -targets=\"\
    oracle_database\" | grep -i ${thisSID} | wc -l` -gt 0 ]; then\n   thisTARGET=`emcli\
    \ get_targets -targets=\"oracle_database\" -format=\"name:csv\" \\\n         \
    \     | grep -i ${thisSID} | cut -d, -f4`\n   echo \"\\t${thisTARGET}\"\nelse\n\
    \   echo \"Sorry, ${thisSID} database is not in the OEM repository\"\n   ExitCleanly\n\
    fi\n}\n\n# ==============================================================================\n\
    #  维护期函数\n# ==============================================================================\n\
    \nfunction CreateBlackout {\n# --------------------------------------------------------------------------------------------------\n\
    # 此函数在第 5 章中作为在数据库目标上创建为期六小时的维护期的方法进行了说明。\n# 请为你的环境调整时区。\n# 考虑为主机或 oracle_sys\
    \ 目标编写类似的函数\n# --------------------------------------------------------------------------------------------------\n\
    # 调用脚本必须提供一个维护期名称作为 BO_NAME，以及\n# 数据库目标名称作为 thisSID\n# --------------------------------------------------------------------------------------------------\n\
    \nGetTargetName\n\necho \"Creating blackout named '${BO_NAME}' ...\"\n\nif [ `emcli\
    \ get_blackouts | grep ${BO_NAME} | wc -l` -gt 0 ]; then\n   echo \"Found an existing\
    \ blackout named ${BO_NAME}\"\n   echo \"That blackout will be stopped and deleted\
    \ prior to starting the new one\"\n   emcli stop_blackout -name=\"${BO_NAME}\"\
    \n   emcli delete_blackout -name=\"${BO_NAME}\"\nfi\n```"
- fmt: "# EMCLI 函数库与示例脚本\n\n## 创建黑名单\n\n```shell\nemcli create_blackout -name=\"${BO_NAME}\"\
    \ \\\n   -add_targets=${thisTARGET:oracle_database \\\n   -schedule=\"duration::360;tzinfo:specified;tzregion:America/Los_Angeles\"\
    \ \\\n   -reason=\"Scripted blackout for maintenance or refresh\"\n\nsleep 5\n\
    \necho \"Getting blackout information for '${BO_NAME}' ...\"\nemcli get_blackout_details\
    \ -name=\"${BO_NAME}\"\n}\n```\n\n## 停止黑名单\n\n```shell\nfunction EndBlackout {\n\
    \n# --------------------------------------------------------------------------------------------------\n\
    # This function was illustrated in Chapter 5 as a method of stopping and deleting\n\
    # an OEM blackout.\n# --------------------------------------------------------------------------------------------------\n\
    # Calling script must provide a name for the blackout as BO_NAME\n# --------------------------------------------------------------------------------------------------\n\
    \nGetTargetName\n\necho \"Stopping blackout '${BO_NAME}' ...\"\nemcli stop_blackout\
    \ -name=\"${BO_NAME}\"\n\necho \"Deleting blackout '${BO_NAME}' ...\"\nemcli delete_blackout\
    \ -name=\"${BO_NAME}\"\n}\n```\n\n## 代理同步\n\n### 重新同步不可达的代理\n\n```shell\nfunction\
    \ ResyncUnreachableAgents {\n\n# --------------------------------------------------------------------------------------------------\n\
    # This function requires no input values to resync all agents found to be in\n\
    # an Unreachable state.\n#\n# Underlying conditions may exist that prevent an\
    \ individual agent from\n# being resync'd, so check agent status after executing\
    \ this function.\n# Only one attempt will be made to resync each agent to prevent\
    \ an infinite\n# loop when problem agents are encountered\n#\n# This function\
    \ and SecureAllAgents are written for execution from the command\n# line by sourcing\
    \ this library file and then calling the function by name\n#\n#   Examples:\n\
    #      . emcli_functions.lib\n#      ResyncUnreachableAgents\n#\n#      . emcli_functions.lib\n\
    #      SecureAllAgents\n# --------------------------------------------------------------------------------------------------\n\
    \nWORKFILE01=/tmp/oem_resyncagents.tmp\n\nCleanUpFiles\n\nemcli login -user=sysman\
    \ -pass=\"${SysmanPassword}\"\n\necho \"Getting the target name for unreachable\
    \ agents ...\"\nif [ `emcli get_targets -targets=\"oracle_emd\" | grep Unreach\
    \ | awk '{ print $5 }' | wc -l` -gt 0 ]; then\n   echo \"Creating a list of agents\
    \ in an Unreachable state\"\n   emcli get_targets -targets=\"oracle_emd\" | grep\
    \ Unreachable | awk '{ print $5 }' >${WORKFILE01}\n   if [ `cat ${WORKFILE01}\
    \ | wc -l` -gt 0 ]; then\n      for thisAGENT in `cat ${WORKFILE01}`; do\n   \
    \      echo \"Attempting to resync ${thisAGENT}\"\n         echo \"This will take\
    \ quite a while, so please be patient\"\n         emcli resyncAgent -agent=\"\
    ${thisAGENT}\"\n      done\n   else\n      echo \"There are currently no unreachable\
    \ agents\"\n   fi\nelse\n   echo \"There are currently no unreachable agents\"\
    \nfi\n\nExitCleanly\n}\n```\n\n### 保护所有代理\n\n```shell\nfunction SecureAllAgents\
    \ {\n\n# --------------------------------------------------------------------------------------------------\n\
    # As the name suggests, this function will secure all your agents using the\n\
    # preferred credentials for their host.\n# --------------------------------------------------------------------------------------------------\n\
    \nWORKFILE01=/tmp/oem_secure_agents.tmp\n\nCleanUpFiles\n\nemcli login -user=sysman\
    \ -pass=\"${SysmanPassword}\"\n\nemcli get_targets | grep oracle_emd | sort -u\
    \ | awk '{ print $4 }' >${WORKFILE01}\n\nemcli secure_agents -agt_names_file=${WORKFILE01}\
    \ -use_pref_creds\n\nExitCleanly\n}\n```\n\n## 用户账户凭据\n\n### 设置数据库用户凭据\n\n```shell\n\
    function SetDBUserCredential {\n\n# --------------------------------------------------------------------------------------------------\n\
    # This function will set the normal database preferred credentials to use the\n\
    # SYSMAN password defined at the top of this file.\n# --------------------------------------------------------------------------------------------------\n\
    # Calling script must provide the database name as thisSID\n# --------------------------------------------------------------------------------------------------\n\
    \nemcli set_credential \\\n      -target_type=oracle_database \\\n      -target_name=${thisSID}\
    \ \\\n      -credential_set=DBCredsNormal \\\n      -columns=\"username:dbsnmp;password:${SysmanPassword};role:Normal\"\
    \n}\n```\n\n### 设置用户凭据\n\n```shell\nfunction SetUserCredential {\n# --------------------------------------------------------------------------------------------------\n\
    # This function will execute the SetDBUserCredential from the command line\n#\
    \ --------------------------------------------------------------------------------------------------\n\
    # You could supplement the failure logic with a read statement to prompt\n# for\
    \ the database name\n# --------------------------------------------------------------------------------------------------\n\
    \nif [ ${#1} -gt 0 ]; then\n   thisSID=${1}\n   SetDBUserCredential\nelse\n  \
    \ echo \"The database name was not set on the command line\"\n   echo \"  syntax:\
    \  SetDBUserCredential [database name]\"\n   exit 1\nfi\n}\n```\n\n## 与函数相关的Shell脚本\n\
    \n本节中的脚本调用或依赖于前面描述的函数。在每种情况下，函数库都会被加载，评估来自命令行的输入值，并设置函数所需的关键输入参数。这些脚本的简洁性值得注意。所有“严肃的”逻辑都存在于函数库中，因此创建新脚本时，可以将调试范围限制在新代码上。\n\
    \n### 示例脚本：`emcli_start_blackout.ksh`\n\n```shell\n#!/bin/ksh\n# Thus script is\
    \ written for Korn shell. You must adapt the 'read' statements to use Bash\n#\n\
    # ==============================================================================\n\
    #   File:              emcli_start_blackout.ksh\n#   Purpose:       Create and\
    \ initiate an OEM blackout\n#   Parameters:  Database name\n# ==============================================================================\n\
    # Enter the path to your shell script repository for OEM\nFUNCTION_LIB=< Your\
    \ shared script directory>/emcli_functions.lib\n\n# WORKFILE is one of several\
    \ file name variables cleaned up by the function library\nexport WORKFILE=/tmp/create_em_blackout_$PPID.lst\n\
    \n# --------------------------------------------------------------------------------------------------\n\
    #  Run-time Procedure\n# --------------------------------------------------------------------------------------------------\n\
    # Source the function library\n. ${FUNCTION_LIB}\n\n# Verify that SID was passed\
    \ on command line\nif [ ${#1} -eq 0 ]; then\n   if tty -s; then\n      read thisSID?\
    \ \"Please provide the name of the database: \"\n  else\n      echo \"The database\
    \ name was not provided on the command line\"\n      ExitCleanly\n   fi\n   read\
    \ thisSID?\"Enter the name of the database to be monitored:  \"\nelse\n   thisSID=`print\
    \ $@ | awk '{print$NF}' | tr '[A-Z]' '[a-z]'`\nfi\n\nBO_NAME=scripted_blackout_${thisSID}\n\
    \nCleanUpFiles\nCreateBlackout\nExitCleanly\n```\n\n### 示例脚本：`emcli_stop_blackout.ksh`\n\
    \n```shell\n#!/bin/ksh\n# ==============================================================================\n\
    #   File:             emcli_stop_blackout.ksh\n#   Purpose:      Stop and delete\
    \ a named OEM blackout\n#   Parameters:  Database name\n# ==============================================================================\n\
    # Enter the path to your shell script repository  for OEM\nFUNCTION_LIB=< Your\
    \ shared script directory>/emcli_functions.lib\n\n# WORKFILE is one of several\
    \ file name variables cleaned up by the function library\nexport WORKFILE=/tmp/create_em_blackout_$PPID.lst\n\
    \n# --------------------------------------------------------------------------------------------------\n\
    #  Run-time Procedure\n# --------------------------------------------------------------------------------------------------\n\
    # Source the function library\n. ${FUNCTION_LIB}\n```"
