    ```\n\n# 第 3 节：必要的服务器管理脚本\n\n本节中的 Shell 脚本包含了 `EM CLI` 的各种用法，包括备份 OMS 服务器上的所有配置文件，以及控制\
    \ OMS 日志文件占用的空间量。\n\n对于他们认为关键的文件，Oracle 在提供这些服务方面一直做得很好。这些脚本负责处理所有其余部分。\n\n##\
    \ 配置备份脚本\n\nOEM 将关键的 OMS 配置文件备份到仓库数据库。此脚本对这些文件（以及其他几个文件）执行文件级备份。应使用与软件库相同的共享文件系统作为这些备份的存放位置。\n\
    \n此脚本仅在确定源文件与其备份副本内容不同时，才会创建新备份。如果存在差异，旧备份将被重命名为 `.old` 后缀。这为您提供了另一个故障排除工具，在 OMS\
    \ 打补丁后尤其有用。您可以使用文件创建日期来确定哪些配置文件发生了更改，然后运行快速的 `diff` 命令来找出它们的变化方式：\n\n```ksh\n\
    示例脚本: backup_oms_configs.ksh\n#!/bin/ksh\n\n#===============================================================================\n\
    #  脚本名称  : backup_oms_configs.ksh\n#  调用参数 : 无\n#  目的      :   备份关键的 OMS 配置文件\n\
    #===============================================================================\n\
    # 独立变量\n#===============================================================================\n\
    export OMS_HOME=<在此设置您的 OMS 主目录>\nexport BACKUP_DIR=<在此设置备份目标目录>\n```\n"
