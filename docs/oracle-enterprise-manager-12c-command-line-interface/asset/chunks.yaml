- fmt: "No one likes an error message, but when they pop up in `EM CLI`, they are\
    \ descriptive and usually easy to read and interpret. The syntax of errors in\
    \ many products can be tricky, especially with all of the different tools administrators\
    \ have to switch between on a daily basis. The error syntax in `EM CLI` is intuitive\
    \ and simple when compared to many of those other tools.\n\n`EM CLI` will already\
    \ be fully configured and ready to use on each installed `OMS`. It is also easy\
    \ to download, install, and set up on any other machine that is capable of running\
    \ `Java`. The method of communication between the `EM CLI` client and the `OMS`\
    \ is almost identical to the communication that takes place between the browser\
    \ and the `OMS`. Both are highly secure and use standard, mature technologies.\n\
    \nHowever, `EMCTL` is not going away any time soon. Despite the fact that `EMCTL`\
    \ and `EM CLI` can do some of the same things, they are vastly different in their\
    \ purposes and functionality. Try not to make the mistake of dismissing `EMCTL`\
    \ as futile because of the robustness of `EM CLI`. You will need them both for\
    \ different tasks.\n\nThe examples in this chapter show just a small sliver of\
    \ what `EM CLI` can do, but chances are, you already have in mind a few scenarios\
    \ where `EM CLI` can solve a problem that the `GUI` and other command-line tools\
    \ cannot. The examples here are some of the most obvious ways to use `EM CLI`.\
    \ There are multiple ways and tools by which to solve most problems in Enterprise\
    \ Manager. The examples shown in this book will never claim to be the “right”\
    \ way to do something. Use the information found here to come up with your own\
    \ “right” way.\n\n## CHAPTER 4\n![image](Images/frontdot.jpg)\n\n## Working at\
    \ the Command Line\n\n`EM CLI` is ideally suited for shell scripts, but it also\
    \ simplifies tasks that are ordinarily performed in the console. For instance,\
    \ removing an `EM` agent and its related targets through the console can be quite\
    \ trying. With `EM CLI`, you issue a one-line command and the same tasks execute\
    \ quickly and completely from the command line.\n\nThis chapter will introduce\
    \ you to some of the basics of `EM CLI` at the command line and then illustrate\
    \ several ways you can apply `EM CLI` to administering your environment more quickly—without\
    \ all the mouse clicks required to perform the same tasks in the console.\n\n\
    We often associate the term “command line” with `Unix`, and that’s applicable\
    \ here too, but do remember that since `EM CLI` is a `Java` application it can\
    \ be run on any platform. `EM CLI` runs the same whether you’re logged into a\
    \ server or executing the commands from your desktop.\n\n### Start an EM CLI Session\n\
    \nAlthough each `CLI` command is run on a separate line, when logging into `EM\
    \ CLI` a single session is established for all subsequent statements. The `login`\
    \ verb establishes a connection to the `OMS` server and validates the user before\
    \ any work starts. You may either enter your password on the command line (not\
    \ recommended for interactive sessions) or wait to be prompted for the password\
    \ during the login process.\n\nThe `sync` command ensures that your run-time execution\
    \ uses the current verb definitions available in the management server’s software\
    \ library. This is particularly important after you’ve patched or upgraded your\
    \ `OMS`.\n\n```\nemcli login -username=\"SYSMAN\"\nemcli sync\n```\n\n### CLI\
    \ References\n\nOracle document #E17786.12 contains a catalog of the `EM CLI`\
    \ verbs available with the release of `OEM 12.1.0.4`. Check with Oracle at `http://docs.oracle.com/cd/E24628_01/em.121/e17786.pdf`\
    \ to make sure you have the latest version.\n\nHelp is also available online through\
    \ `EM CLI` itself. The current listing of verbs known to your `OMS` software library\
    \ is available at the command line.\n\n```\nemcli help\n\n> emcli help\n\nSummary\
    \ of commands:   argfile    -- Execute emcli verbs from a file\n    help     \
    \  -- Get help for emcli verbs (Usage: emcli help [verb_name])\n    login    \
    \  -- Login to the EM Management Server (OMS)\n    logout     -- Logout from the\
    \ EM Management Server\n    setup      -- Setup emcli to work with an EM Management\
    \ Server\n    status     -- List emcli configuration details\n    sync       --\
    \ Synchronize with the EM Management Server\n    version    -- List emcli verb\
    \ versions or the emcli client version\n\nAdd Host Verbs\n    continue_add_host\
    \             -- Continue a failed Add Host session\n    get_add_host_status \
    \          -- Displays the latest status of an Add Host session.\n    list_add_host_platforms\
    \       -- Lists the platforms on which the Add Host operation can be performed.\n\
    \    list_add_host_sessions        -- Lists all the Add Host sessions.\n    retry_add_host\
    \                -- Retry a failed Add Host session\n    submit_add_host     \
    \          -- Submits an Add Host session.\n\nAgent Administration Verbs\n   \
    \ get_agent_properties     -- Displays details of all properties of an agent\n\
    \    get_agent_property       -- Displays the value of specific property of an\
    \ agent\n    resecure_agent           -- Resecure an agent\n    restart_agent\
    \            -- Restart an agent\n    secure_agent             -- Secure an agent\n\
    \    set_agent_property       -- Modify specific property of an agent\n    start_agent\
    \              -- Start an agent\n    stop_agent               -- Shut down an\
    \ agent\n    unsecure_agent           -- Unsecure an agent\n...\n```\n\nAdd the\
    \ name of a verb to the `help` command for specific guidance on that verb. The\
    \ example below shows the help result for the `sync` verb.\n\n```\n> emcli help\
    \ sync\n  emcli sync\n\nDescription:\nSynchronize the emcli client with the OMS.\n\
    \nAfter synchronization, all verbs and associated online help\n    available to\
    \ that OMS become available at the emcli client.\n    Synchronization automatically\
    \ happens during a call to a setup.\n  Options:\n    -url\n        The URL of\
    \ the EM (OMS).\n        Both http and https protocols are supported\n       \
    \ (https is recommended for security reasons).\n    -username\n        The EM\
    \ username to be used by all subsequent emcli commands\n        when contacting\
    \ the OMS.\n    -password\n        The EM user's password.\n        If this option\
    \ is not specified, the user is prompted\n        for the password interactively.\n\
    \        Providing a password on the command line is insecure and\n        should\
    \ be avoided.\n    -trustall\n        Automatically accept any server certificate\
    \ from the OMS,\n        which results in lower security.\n        Also indicates\
    \ that the setup directory is local and trusted.\n```\n\n### The get_targets Verb\n\
    \n`EM CLI` verbs fall into three broad categories: `EM` queries, `OEM` administrative\
    \ actions, and target manipulations. Verbs use a very specific syntax, so the\
    \ names of targets being passed to `EM CLI` must match the object’s name in `OEM`’s\
    \ dictionary.\n\nThe `get_targets` verb can be used to verify the target name\
    \ prior to its use in any administrative or maintenance task. For instance, let’s\
    \ say you want to create a blackout for database `orcl1` on host `myhostx` and\
    \ that you promote discovered database and listener targets through the automated\
    \ process. The database target in `OEM` may have been added as `sidc_myhostx`,\
    \ by its `RAC` instance name, or perhaps by its global name. Sometimes it may\
    \ even appear as its service name or `SID`. This variability can occur when you\
    \ use target promotion through Auto Discovery Results. You should set target names\
    \ manually when you add targets, using the guided discovery process to ensure\
    \ consistency across your enterprise.\n\n### Output Formats\n\n`EM CLI` has three\
    \ preconfigured output formats for query results. User-defined formats are also\
    \ supported."
