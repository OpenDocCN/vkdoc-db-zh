    \ | longstring)\n   stringprefix    ::= \"r\" | \"u\" | \"ur\" | \"R\" | \"U\"\
    \ | \"UR\" | \"Ur\" | \"uR\"\n   shortstring     ::= \"'\" shortstringitem* \"\
    '\" | '\"' shortstringitem* '\"'\n...\n\n:q\n\nhelp> <CTRL-D>\nYou are now leaving\
    \ help and returning to the Python interpreter.\nIf you want to ask for help on\
    \ a particular object directly from the\ninterpreter, you can type \"help(object)\"\
    . Executing \"help('string')\"\nhas the same effect as typing a particular string\
    \ at the help> prompt.\n>>>\n```\n\n## EM CLI 中的 `help` 函数\n\n`help`函数在EM CLI中也非常有用。开发者投入了大量时间确保程序本身包含了这些信息。与Python不同，输入`help()`不会进入另一个命令行；它只是简单地打印出一个按类别排序和分组的动词列表。\n\
    \n然后，可以在`help`函数中指定具体的动词，以获取关于该动词的更详细信息。例如，在EM CLI中输入`help('list_active_sessions')`将打印出关于`list_active_sessions()`函数的详细信息。\n\
    \n## Python 对象\n\nPython中的对象是一个可以保存数据的实体，在大多数情况下，可以通过改变对象内部包含的数据或改变对象本身的属性来进行操作。Python对象的内容和复杂性取决于对象类型。例如，如果你需要一个只包含单个数字的对象，你会使用`number`对象。如果你需要一个包含多个键/值对的对象，你会使用`dictionary`对象。对象的生命周期始于它被创建或被赋值，结束于它被显式销毁或Python会话结束。本节列出了最常见的对象类型，并展示了如何创建和使用它们的示例。\n\
    \n### 数字和字符串\n\n`number`对象是一个包含单个整数值的实体。`string`对象是一个包含单个字符串值的实体。这些类型的对象是可变的，这意味着在对象的生命周期内，其值可以在任何时候被更改或替换。这些无疑是Python中最常用的对象。\n\
    \n“Hello World!”示例介绍了Python中最基本的对象：字符串。字符串在Python中无处不在，大多数其他对象都是由数字和字符串组成的。字符串可以包含数字，但数字不能包含字符串。\n\
    \n下面这个示例展示了如何通过将字符串赋值给变量来创建一个简单的字符串对象：\n\n```\n>>> mystring = 'Here is my string'\n\
    >>> type(mystring)\n<type 'str'>\n```\n\n我可以通过将数字赋值给变量来创建一个数字对象。`int`代表整数：\n\n\
    ```\n>>> mynumber = 12345\n>>> type(mynumber)\n<type 'int'>\n```\n\n数字和字符串是不同类型的对象。尝试将字符串值与数字值连接会导致错误：\n\
    \n```\n>>> mystring + mynumber\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nTypeError: Can't convert 'int' object to str implicitly\n\
    ```\n\n### 列表\n\n列表是在一个对象中存储一组带索引的值的常用方式。一个简单的列表被赋值给对象的方式与字符串被赋值给对象的方式类似，不同之处在于该对象现在是一个列表对象，而不是字符串对象。这在Python中不像在其他语言中那么重要，但理解这种差异是好的，因为它可能对程序的行为产生影响。\n\
    \n这个示例展示了一个包含单个值的列表对象。赋值给列表的值被括号包裹。如果没有括号，这将是一个简单的字符串对象。参见：\n\n```\n>>> mylist\
    \ = ['one']\n>>> print(mylist)\n['one']\n>>> type(mylist)\n<type 'list'>\n>>>\
    \ mystring = 'one'\n>>> type(mystring)\n<type 'str'>\n```\n\n#### 简单列表\n\n一个只有一个值的列表可能有用，但列表的目的是能够在单个对象中分配多个列表值。这些值被称为*元素*。在前面的例子中，值`one`被分配为`mylist`对象中的第一个元素。\n\
    \n这个示例创建了一个名为`mylist`的列表，包含五个成员。打印列表会按照它被创建时的样子显示。五个元素被打印在一对开闭括号内。括号告诉我们这是一个列表，而不是字符串或任何其他类型的对象。索引为2的元素实际上是列表中的第三个元素，因为索引号从0开始。\n\
    \n列表的强大之处在于可以以多种方式操作各个元素。例如，可以通过指定其索引号从列表中查询任何元素。列表的索引从零开始，所以列表的第一个元素被赋予数字零：\n\
    \n```\n>>> mylist = ['one', 'two', 'three', 'four', 'five']\n>>> print(mylist)\n\
    ['one', 'two', 'three', 'four', 'five']\n>>> type(mylist)\n<type 'list'>\n>>>\
    \ print(mylist[2])\nthree\n```\n\n列表是可变的，这意味着它可以在创建后被操作。它可以被延长或缩短，元素也可以被更改。这个示例展示了`mylist`对象被追加了值`6`。该对象中的元素数量从五个增加到六个：\n\
    \n```\n>>> mylist.append('six')\n>>> print(mylist)\n['one', 'two', 'three', 'four',\
    \ 'five', 'six']\n>>> print(len(mylist))\n6\n```\n\n前一个示例中使用的`len()`函数显示了列表中的元素数量。像许多函数一样，`len()`可以用于列表、字符串和所有其他对象类型。"
