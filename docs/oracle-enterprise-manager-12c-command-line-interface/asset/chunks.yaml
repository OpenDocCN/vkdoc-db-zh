- fmt: "## EMCTL or EM CLI\n\nEnterprise Manager control utility, or EMCTL, is installed\
    \ with each OEM agent and is used to manually start and stop OEM agents and to\
    \ manage local functionality at the remote host.\n\nEMCTL can be used to start\
    \ and stop (but not delete) OEM blackouts just like EM CLI, but with one key advantage:\
    \ EMCTL is already installed and configured. If you choose EM CLI as your blackout-management\
    \ tool for a remote host using shell scripts, you must manually install and configure\
    \ the EM CLI client on each host. EM CLI client is a static installation of a\
    \ Java program. The client software installations are reported but not managed\
    \ through OEM itself. The number of remote hosts in your environment might make\
    \ EMCTL the better solution if you are limiting the functionality to blackout\
    \ maintenance and other tasks that it can manage. The installation process covered\
    \ in [Chapter 2](../Text/9781484202395_Ch02.xhtml) provides a scripted means of\
    \ performing that installation.\n\nManaging blackouts with EMCTL is very similar\
    \ to the techniques used for EM CLI and lends itself to the same scripting applications.\n\
    \nThe syntax is straightforward:\n\n```\nemctl start blackout <blackout name><target\
    \ names>\nemctl start blackout <blackout name>  -nodelevel\nemctl stop blackout\
    \ <blackout name>\nemctl status blackout <blackout name>\n```\n\nThe `nodelevel`\
    \ flag blacks out all targets on the node and works well for patching activities.\n\
    \nDurations are specified by a `–d` flag and may be set for a combination of days\
    \ and hours like this:\n\n```\nemctl start blackout WeekendBlackout  -nodelevel\
    \ –d 2 12:00\n```\n\nIn this example, a blackout for all targets on a development\
    \ node could be scheduled to start at 6:00 PM on a Friday and would run up to\
    \ 6:00 AM on Monday (two days and twelve hours).\n\n## Managing OEM Administrators\
    \ with EM CLI\n\nThe console provides a clear, convenient method for managing\
    \ OEM administrator accounts, but its flexibility makes it tremendously inconvenient\
    \ for creating multiple accounts as you click through all the screens. By the\
    \ author’s count, creating a new administrator in the console requires at least\
    \ 17 mouse clicks!  EM CLI combines the flexibility inherent in the OEM code base\
    \ with the simplicity of the command-line interface.\n\nAll of the options defined\
    \ in the console can be granted as options in EM CLI using the flags shown below.\
    \ To create an administrator you only need to give the account a name and password:\n\
    \n```\nemcli create_user -name=\"SuzyQueue\"-password=\"oracle\"\n```\n\nYou wouldn’t\
    \ be reading a book from Apress if you ignored user security, so you’ll want to\
    \ expire the user’s new password with the `-expired=\"true\"` flag, like this:\n\
    \n```\nemcli create_user \\\n  -name=\"SuzyQueue\"\\\n  -password=\"oracle\"\\\
    \n  -expired=\"true\"\n```\n\nThe other optional parameters allow you to perform\
    \ the user grants available in the OEM console but without the click-stream.\n\
    \n### Role Management\n\nEnterprise Manager administrators and users are actually\
    \ database user accounts in the repository database. Resist the temptation to\
    \ grant role privileges through SQL*Plus, since there may be other actions performed\
    \ by OEM in account management.\n\nYou can add role grants while creating the\
    \ user by adding the `-roles` parameter:\n\n```\nemcli create_user \\\n  -name=\"\
    SuzyQueue\"\\\n  -password=\"oracle\"\\\n  -roles=\"em_all_administrator\"\n```\n\
    \nYou can also modify the user through the `grant_roles` or `revoke_roles` verbs:\n\
    \n```\nemcli grant_roles \\\n  -name=\"SuzyQueue\"\\\n-roles=\"em_all_viewer\"\
    \n\nemcli revoke_roles \\\n  -name=\"SuzyQueue\"\\\n  -roles=\"em_all_operator\"\
    \n```\n\n### Batch Processing with Argfile\n\nEM CLI has a batch-processing verb\
    \ named `argfile` that, like many other Oracle parfiles, allows you to execute\
    \ multiple commands in a single EM CLI execution by providing a fully qualified\
    \ path in the text file containing the input values to be applied.\n\nFor example,\
    \ let’s load up a text called `/tmp/create_several_users.lst` with the CLI required\
    \ to create a few users:\n\n```\ntouch /tmp/create_several_users.lst\nfor thisADMIN\
    \ in Sugar Magnolia Blossom Blooming, do\n    echo \"create_user -name=${thisADMIN}\
    \ -password=oracle -expired=true\";\ndone\n\ncat /tmp/create_several_users.lst\n\
    create_user -name=\"Sugar\"-password=\"oracle\"-expired=\"true\"\ncreate_user\
    \ -name=\"Magnolia\"-password=\"oracle\"-expired=\"true\"\ncreate_user -name=\"\
    Blossom\"-password=\"oracle\"-expired=\"true\"\ncreate_user -name=\"Blooming\"\
    -password=\"oracle\"-expired=\"true\"\n\nemcli login -username=SYSMAN -password=\"\
    ${SECRET_PASSWORD}\"\nemcli sync\nemcli argfile \"/tmp/create_several_users.lst\"\
    \n```\n\nThe following are advantages of using an argfile:\n\n*   The EM CLI utility\
    \ is invoked outside the argfile, so verbs are processed serially without restarting\
    \ EM CLI.\n*   An argfile is a text file, and your choice of suffix has no bearing\
    \ at all on execution. The example has an `lst` suffix but you could just as easily\
    \ use `cli` or `cmd`.\n*   You must fully qualify the path to the argfile.\n*\
    \   This example does not include file cleanup, but I’m sure your script will.\n\
    \nAs you might suspect, this method is quite efficient, and argfile executions\
    \ typically run very fast since there is a single call to the OMS through the\
    \ CLI utility.\n\n### Populating an Argfile from a Text File\n\nCreating and editing\
    \ an argfile by hand isn’t out of the question, but sometimes (always?) a scripted\
    \ solution is easier and less error prone. For instance, what if you received\
    \ a request to provide OEM access to several members of an application group with\
    \ the following CSV file attached?\n\n![Image](Images/sq.jpg) Note: Backslashes\
    \ are included for clarity in this illustration. Put each complete string on one\
    \ line.\n\nIf the library is created, you’re free to leverage these same functions\
    \ across all of your scripts, even at the command line. For instance, let’s say\
    \ you need to blackout the databases on a particular server for operating system\
    \ patches. At the command, you’d source the function library and then call the\
    \ functions as needed. Files are sourced by typing a period, a space, and then\
    \ the file name. For instance, when you log into a Unix/Linux server, your user\
    \ profile will source the `.bashrc` and `.bash_profile` (if Bash is your shell\
    \ of choice) to load your environment variables into memory. When you type the\
    \ `env` command, it will reflect those values. Sourcing other files, like a function\
    \ library, loads paths, values, functions, or aliases from the new file into memory\
    \ to supplement or replace the environment variables already in place:\n\n```\n\
    . /script/oem/emcli_functions.lib\nfor thisSID in suzie, sally, betty, veronica;\
    \ do\n    BO_NAME=os_patch_blackout_${thisSID}\n    echo \"Starting the blackout\
    \ for ${thisSID}\"\n    CreateBlackout ${BO_NAME}\ndone\n```\n\nYou’d reverse\
    \ this using a similar process when the work is done:\n\n```\n. /script/oem/emcli_functions.lib\n\
    for thisSID in suzie, sally, betty, veronica; do\n    BO_NAME=os_patch_blackout_${thisSID}\n\
    \    EndBlackout ${BO_NAME}\ndone\n```\n\nIn addition to the simplicity of your\
    \ run-time environment, either at the command line or in a script, you can be\
    \ assured that the code in the function library has been tested in other use cases.\
    \ The function library also removes opportunities for mistyped commands and forgotten\
    \ steps.\n\n```\nif [ `emcli get_blackouts | grep ${BO_NAME} | wc -l` -gt 0 ];\
    \ then\necho \"\\n\\nFound an existing blackout named ${BO_NAME}\"\n        echo\
    \ \"That blackout will be stopped and deleted prior to starting the new one\\\
    n\\n\"\n        emcli stop_blackout -name=\"${BO_NAME}\"\n        emcli delete_blackout\
    \ -name=\"${BO_NAME}\"\nfi\n\nemcli create_blackout -name=\"${BO_NAME}\"\n -add_targets=${thisTARGET}:oracle_database\n\
    \ -schedule=\"duration::360;tzinfo:specified;tzregion:America/Los_Angeles\"\n\
    \ -reason=\"Scripted blackout for maintenance or refresh\"\n}\n\nfunction EndBlackout\
    \ {\n\necho \"\\n\\nStopping blackout '${BO_NAME}' ...\\n\"\nemcli stop_blackout\
    \ -name=\"${BO_NAME}\"\n\necho \"\\n\\nDeleting blackout '${BO_NAME}' ...\\n\"\
    \nemcli delete_blackout -name=\"${BO_NAME}\"\n}\n```"
