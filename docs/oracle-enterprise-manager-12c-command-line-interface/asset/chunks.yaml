    \ Synchronize with the EM Management Server\n    version    -- List emcli verb\
    \ versions or the emcli client version\n\nAdd Host Verbs\n    continue_add_host\
    \             -- Continue a failed Add Host session\n    get_add_host_status \
    \          -- Displays the latest status of an Add Host session.\n    list_add_host_platforms\
    \       -- Lists the platforms on which the Add Host operation can be performed.\n\
    \    list_add_host_sessions        -- Lists all the Add Host sessions.\n    retry_add_host\
    \                -- Retry a failed Add Host session\n    submit_add_host     \
    \          -- Submits an Add Host session.\n\nAgent Administration Verbs\n   \
    \ get_agent_properties     -- Displays details of all properties of an agent\n\
    \    get_agent_property       -- Displays the value of specific property of an\
    \ agent\n    resecure_agent           -- Resecure an agent\n    restart_agent\
    \            -- Restart an agent\n    secure_agent             -- Secure an agent\n\
    \    set_agent_property       -- Modify specific property of an agent\n    start_agent\
    \              -- Start an agent\n    stop_agent               -- Shut down an\
    \ agent\n    unsecure_agent           -- Unsecure an agent\n...\n\nAdd the name\
    \ of a verb to the help command for specific guidance on that verb. The example\
    \ below shows the help result for the sync verb.\n\n> emcli help sync\n  emcli\
    \ sync\n\nDescription:\nSynchronize the emcli client with the OMS.\n\nAfter synchronization,\
    \ all verbs and associated online help\n    available to that OMS become available\
    \ at the emcli client.\n    Synchronization automatically happens during a call\
    \ to a setup.\n  Options:\n    -url\n        The URL of the EM (OMS).\n      \
    \  Both http and https protocols are supported\n        (https is recommended\
    \ for security reasons).\n    -username\n        The EM username to be used by\
    \ all subsequent emcli commands\n        when contacting the OMS.\n    -password\n\
    \        The EM user's password.\n        If this option is not specified, the\
    \ user is prompted\n        for the password interactively.\n        Providing\
    \ a password on the command line is insecure and\n        should be avoided.\n\
    \    -trustall\n        Automatically accept any server certificate from the OMS,\n\
    \        which results in lower security.\n        Also indicates that the setup\
    \ directory is local and trusted.\n```\n\nThe get_targets Verb\n\nEM CLI verbs\
    \ fall into three broad categories: EM queries, OEM administrative actions, and\
    \ target manipulations. Verbs use a very specific syntax, so the names of targets\
    \ being passed to EM CLI must match the object’s name in OEM’s dictionary.\n\n\
    The `get_targets` verb can be used to verify the target name prior to its use\
    \ in any administrative or maintenance task. For instance, let’s say you want\
    \ to create a blackout for database `orcl1` on host `myhostx` and that you promote\
    \ discovered database and listener targets through the automated process. The\
    \ database target in OEM may have been added as `sidc_myhostx`, by its RAC instance\
    \ name, or perhaps by its global name. Sometimes it may even appear as its service\
    \ name or SID. This variability can occur when you use target promotion through\
    \ Auto Discovery Results. You should set target names manually when you add targets,\
    \ using the guided discovery process to ensure consistency across your enterprise.\n\
    \nOutput Formats\n\nEM CLI has three preconfigured output formats for query results.\
    \ User-defined formats are also supported."
  trans: "\n没有人喜欢看到错误信息，但当它们在 `EM CLI` 中出现时，通常描述性强，易于阅读和理解。许多产品的错误语法可能很棘手，尤其是管理员每天需要在各种不同工具之间切换的情况下。与许多其他工具相比，`EM\
    \ CLI` 中的错误语法直观且简单。\n\n`EM CLI` 在每个已安装的 `OMS` 上都已完全配置好并可随时使用。它也易于下载、安装和设置在任何其他能够运行\
    \ `Java` 的机器上。`EM CLI` 客户端与 `OMS` 之间的通信方式几乎与浏览器和 `OMS` 之间的通信完全相同。两者都高度安全，并使用标准、成熟的技术。\n\
    \n然而，`EMCTL` 不会在短期内消失。尽管 `EMCTL` 和 `EM CLI` 可以执行一些相同的功能，但它们在目的和功能上大相径庭。请不要因为 `EM\
    \ CLI` 功能强大就错误地认为 `EM CTL` 无用。针对不同的任务，你将两者都需要。\n\n本章中的示例仅展示了 `EM CLI` 功能的冰山一角，但很可能，你心中已经想到了一些场景，在这些场景中，`EM\
    \ CLI` 可以解决 `GUI` 和其他命令行工具无法解决的问题。这里的示例是使用 `EM CLI` 最显而易见的几种方式。在 Enterprise Manager\
    \ 中，有多种方法和工具可以解决大多数问题。本书中展示的示例绝不会声称是做某事的“正确”方式。请利用这里的信息，找出你自己的“正确”方式。\n\n## 第\
    \ 4 章\n![image](img/frontdot.jpg)\n\n## 在命令行工作\n\n`EM CLI` 非常适合 shell 脚本，但它也简化了通常在控制台中执行的任务。例如，通过控制台移除一个\
    \ `EM` 代理及其相关目标可能相当费力。使用 `EM CLI`，你只需发出一条单行命令，相同的任务就能快速、完整地从命令行执行完毕。\n\n本章将向你介绍\
    \ `EM CLI` 在命令行的一些基础知识，然后说明几种你可以应用 `EM CLI` 来更快速地管理环境的方法——无需像在控制台中执行相同任务那样进行大量的鼠标点击。\n\
    \n我们常常将“命令行”这个术语与 `Unix` 联系起来，这在这里也适用，但请记住，由于 `EM CLI` 是一个 `Java` 应用程序，它可以在任何平台上运行。无论你是登录到服务器还是从桌面执行命令，`EM\
    \ CLI` 的运行方式都是一样的。\n\n### 启动一个 EM CLI 会话\n\n虽然每个 `CLI` 命令都在单独的行上运行，但在登录 `EM CLI`\
    \ 时，会为所有后续语句建立一个单一的会话。`login` 动词在开始任何工作之前，会与 `OMS` 服务器建立连接并验证用户。你可以在命令行上输入密码（不推荐用于交互式会话），也可以等待在登录过程中提示输入密码。\n\
    \n`sync` 命令确保你的运行时执行使用的是管理服务器软件库中当前可用的动词定义。这在你对 `OMS` 打补丁或升级后尤为重要。\n\n```\nemcli\
    \ login -username=\"SYSMAN\"\nemcli sync\n```\n\n### CLI 参考\n\nOracle 文档 #E17786.12\
    \ 包含了 `OEM 12.1.0.4` 版本发布时可用的 `EM CLI` 动词目录。请访问 Oracle 网站 `http://docs.oracle.com/cd/E24628_01/em.121/e17786.pdf`\
    \ 以确保你拥有最新版本。\n\n通过 `EM CLI` 本身也可以在线获取帮助。你的 `OMS` 软件库中已知的当前动词列表可在命令行中获取。\n\n```\n\
    emcli help\n\n> emcli help\n\n命令摘要:\n    argfile    -- 从文件执行 emcli 动词\n    help\
    \       -- 获取 emcli 动词的帮助（用法: emcli help [动词名称]）\n    login      -- 登录到 EM 管理服务器\
    \ (OMS)\n    logout     -- 从 EM 管理服务器注销\n    setup      -- 设置 emcli 以与 EM 管理服务器一起工作\n\
    \    status     -- 列出 emcli 配置详细信息\n    sync       -- 与 EM 管理服务器同步\n    version\
    \    -- 列出 emcli 动词版本或 emcli 客户端版本\n\n添加主机动词\n    continue_add_host          \
    \   -- 继续失败的“添加主机”会话\n    get_add_host_status           -- 显示“添加主机”会话的最新状态。\n\
    \    list_add_host_platforms       -- 列出可以执行“添加主机”操作的平台。\n    list_add_host_sessions\
    \        -- 列出所有“添加主机”会话。\n    retry_add_host                -- 重试失败的“添加主机”会话\n\
    \    submit_add_host               -- 提交一个“添加主机”会话。\n\n代理管理动词\n    get_agent_properties\
    \     -- 显示代理的所有属性详细信息\n    get_agent_property       -- 显示代理特定属性的值\n    resecure_agent\
    \           -- 重新保护一个代理\n    restart_agent            -- 重启一个代理\n    secure_agent\
    \             -- 保护一个代理\n    set_agent_property       -- 修改代理的特定属性\n    start_agent\
    \              -- 启动一个代理\n    stop_agent               -- 关闭一个代理\n    unsecure_agent\
    \           -- 取消保护一个代理\n...\n```\n\n将动词名称添加到 `help` 命令后，可获取该动词的具体指导。下面的示例显示了\
    \ `sync` 动词的帮助结果。\n\n```\n> emcli help sync\n  emcli sync\n\n描述:\n将 emcli 客户端与\
    \ OMS 同步。\n\n同步后，该 OMS 可用的所有动词及相关在线帮助\n    在 emcli 客户端都变得可用。在调用 setup 时会自动发生同步。\n\
    \  选项:\n    -url\n        EM (OMS) 的 URL。\n        支持 http 和 https 协议\n      \
    \  （出于安全原因，建议使用 https）。\n    -username\n        所有后续 emcli 命令在联系 OMS 时\n     \
    \   将使用的 EM 用户名。\n    -password\n        EM 用户的密码。\n        如果未指定此选项，系统会交互提示\n\
    \        用户输入密码。\n        在命令行上提供密码是不安全的，\n        应避免这样做。\n    -trustall\n  \
    \      自动接受来自 OMS 的任何服务器证书，\n        这会导致安全性降低。\n        同时指示设置目录是本地且受信任的。\n```\n\
    \n### get_targets 动词\n\n`EM CLI` 动词大致分为三类：`EM` 查询、`OEM` 管理操作和目标操作。动词使用非常具体的语法，因此传递给\
    \ `EM CLI` 的目标名称必须与 `OEM` 字典中的对象名称匹配。\n\n`get_targets` 动词可用于在将目标名称用于任何管理或维护任务之前验证其名称。例如，假设你想为主机\
    \ `myhostx` 上的数据库 `orcl1` 创建一个停用时间，并且你是通过自动化过程提升已发现的数据库和监听器目标。`OEM` 中的数据库目标可能被添加为\
    \ `sidc_myhostx`（按其 `RAC` 实例名），或其全局名称。有时它甚至可能显示为服务名或 `SID`。当你通过“自动发现结果”使用目标提升时，可能会出现这种可变性。你应该在添加目标时手动设置目标名称，使用引导发现过程以确保整个企业内的一致性。\n\
    \n### 输出格式\n\n`EM CLI` 为查询结果预配置了三种输出格式。也支持用户自定义格式。\n"
- fmt: "*   `Pretty` format aligns the column headings with the result-set data.\n\
    *   `Script` format separates the values in the heading and results columns with\
    \ a space. This format works very well with the `awk` programming language.\n\
    *   `Csv` format, as the name suggest, separates the values with a comma for parsing\
    \ in a spreadsheet or with the shell’s `cut` command.\n\nLet’s say you want to\
    \ set the OEM credentials for the `eamz` database using this command:\n\n```\n\
    emcli set_credential -target_type=oracle_database -target_name=\"eamz\" \\\n \
    \                    -credential_set=DBCredsNormal \\\n                     -columns=\"\
    username:dbsnmp;password:Super_S3cret;role:Normal\"\n```\n\nYour command would\
    \ fail because OEM can’t find a matching target name. [Figure 4-1](#9781484202395_Ch04.xhtml#Fig1)\
    \ illustrates the different styles.\n\n```\nemcli get_targets -targets=\"oracle_database\"\
    \ -format=\"name:csv\" | grep -i eamz\n```\n\n![9781484202395_Fig04-01.jpg](Images/9781484202395_Fig04-01.jpg)\n\
    \n[Figure 4-1](#9781484202395_Ch04.xhtml#_Fig1). Output style samples\n\nWe’ll\
    \ explore several examples of applying this verb later in this chapter as well\
    \ as in the next.\n\n## Agent Administration\n\nThe ability to install the EM\
    \ CLI client on your desktop allows you to execute an EM CLI command without opening\
    \ a browser—no need to use the console or log into the management server host.\
    \ This flexibility allows you to quickly control the OEM agents using one of the\
    \ many EM CLI verbs related to them.\n\nAs we saw earlier, you can use the `get_targets`\
    \ verb to find the specific name of any agent by filtering the `get_targets` results\
    \ for target type `oracle_emd`. This is particularly important for agents, since\
    \ the agent name contains the host name and port number.\n\n```\n> emcli  get_targets\
    \ –targets=\"oracle_emd\"  –name=\"name:csv\"\nStatus ID,Status,Target Type,Target\
    \ Name\n1,Up,oracle_emd,acme_dev:2480\n1,Up,oracle_emd,acme_qa:3872\n1,Up,oracle_emd,acme_prod:3872\n\
    ```\n\nThe `targets` variable also accepts paired values that include the target\
    \ name and target type, like this: –targets=“acme_qa:oracle_database”\n\nAll of\
    \ the agent-management tasks available through the OEM console are also available\
    \ as EM CLI verbs. Notice in these examples that the password is required for\
    \ the OEM agent binary owner/host user in every case.\n\n```\nemcli stop_agent\
    \  -agent=acme_qa:3872 -host_username=oracle\nHost User password:\nThe Shut Down\
    \ operation is in progress for the Agent: acme_qa:3872\nThe Agent \"acme_qa:3872\"\
    \ has been stopped successfully.\n\nemcli start_agent  -agent=acme_qa:3872 -host_username=oracle\n\
    Host User password:\nThe Start Up operation is in progress for the Agent: acme_qa:3872\n\
    The Agent \"acme_qa:3872\" has been started successfully.\n\nemcli restart_agent\
    \  -agent=acme_qa:3872 -host_username=oracle\nHost User password:\nThe Restart\
    \ operation is in progress for the Agent: acme_qa:3872\nThe Agent \"acme_qa:3872\"\
    \ has been restarted successfully.\n```\n\nAgents sometimes fall out of sync with\
    \ the OMS after patching or as a result of an outage and thus require an update\
    \ to their registration information or even an agent synchronization in order\
    \ to permit uploads. The easiest way to achieve this is to `resecure` the agent\
    \ to straighten out the connection. If your environment does not require secured\
    \ agents, you can remove the secure relationship by executing the `unsecure_agent`\
    \ verb with identical syntax to the `secure_agent` verb.\n\nNotice that the password\
    \ for the owner of the agent executable and the OMS registration password are\
    \ both required.\n\n```\nemcli secure_agent  -agent=acme_qa:3872 -host_username=oracle\n\
    Host User password:\nRegistration Password:\nThe Secure operation is in progress\
    \ for the Agent: acme_qa:3872\nThe Agent \"acme_qa:3872\" has been secured successfully.\n\
    \nemcli resecure_agent  -agent=acme_qa:3872 -host_username=oracle\nHost User password:\n\
    Registration Password:\nThe Resecure operation is in progress for the Agent: acme_qa:3872\n\
    The Agent \"acme_qa:3872\" has been resecured successfully.\n```\n\nThe `agent_resync`\
    \ verb kicks off a job in the repository database to update the status of a blocked\
    \ agent. An agent is placed in blocked status when the repository contains conflicting\
    \ data from the agent upload. This typically happens after unscheduled issues\
    \ affect the agent connection to the OMS. As a result, standard output isn’t informative\
    \ at the command line. While you can click through to the job in the console to\
    \ track the progress, there is no matching option in EM CLI.\n\n```\nemcli resyncAgent\
    \ -agent=acme_qa:3872\nResync job RESYNC_20140422135854 successfully submitted\n\
    ```\n\nEM CLI can also be used to provide detailed information about an agent,\
    \ either listing all of its properties or drilling down to a specific property,\
    \ as shown below.\n\n```\nemcli get_agent_properties -agent_name=acme_qa:3872\n\
    Name                        Value\nagentVersion                12.1.0.3.0\nagentTZRegion\
    \               America/Los_Angeles\nemdRoot                     /opt/oracle/agent12c/core/12.1.0.3.0\n\
    agentStateDir               /opt/oracle/agent12c/agent_inst\nperlBin         \
    \            /opt/oracle/agent12c/core/12.1.0.3.0/perl/bin\nscriptsDir       \
    \           /opt/oracle/agent12c/core/12.1.0.3.0/sysman/admin/ scripts\nEMD_URL\
    \                     https://acme_qa:3872/emd/main/\nREPOSITORY_URL         \
    \     https://myoms.com:4903/empbs/upload\nEMAGENT_PERL_TRACE_LEVEL    INFO\n\
    UploadInterval              15\nTotal Properties :          10\n\nemcli get_agent_property\
    \ -agent_name=acme_qa:3872 -name=agentTZRegion\nProperty Name: agentTZRegion\n\
    Property Value: America/Los_Angeles\n```\n\n## Deleting EM Targets with EM CLI\n\
    \nThe `delete_targets` verb can be used to remove individual targets or a group\
    \ of related targets. It may seem simpler to select targets individually from\
    \ the console and press the `Delete Target` button. That’s usually true, but we’ve\
    \ found that under some conditions it’s possible to end up with orphaned targets,\
    \ like an `oracle_dbsys` target type left behind when all its fellow members were\
    \ deleted. Besides, if you have an EM CLI client installed on your desktop you\
    \ can remove the target without logging into the console!\n\n### Find Exact Target\
    \ Names\n\nThe console derives target names and target types from session information,\
    \ so target deletion within the console is sure to use the exact name and target\
    \ type for both of these targets. To find those values, we’ll use the `get_targets`\
    \ verb and a simple `grep` to distinguish the targets we’re interested in.\n\n\
    ```\n> emcli get_targets | grep -i bertha\n1       Up               oracle_database\
    \    bertha\n1       Up               oracle_dbsys         bertha_sys\n1     \
    \  Up               oracle_listener       LSNRBERTHA_oemdemo.com\n```\n\n### Delete\
    \ the Target\n\nThe database and listener both belong to the database system `bertha_sys`,\
    \ so all three can be deleted with one command:\n\n```\n> emcli delete_target\
    \ –type = \"oracle_db_sys\" –name=\"bertha_sys\" –delete_members\n  Target \"\
    bertha_sys:oracle_dbsys\" deleted successfully\n```\n\nYou can also delete individual\
    \ members, like this:\n\n```\n> emcli delete_target –type = \"oracle_listener\"\
    \ –name=\"LSNRBERTHA\"\n  Target \"LSNRBERTHA:oracle_listener\" deleted successfully\n\
    ```\n\n## How to Remove an Enterprise Manager Agent with One Command\n\nRemoving\
    \ an EM agent from Enterprise Manager requires removal of all the targets managed\
    \ by that agent and all of their metrics. In the console, this requires multiple\
    \ deletion actions in roughly reverse order of their discovery. For instance,\
    \ when you first deploy an agent to a host, the agent and host become the first\
    \ and second targets known. Then you discover and promote other targets residing\
    \ on the host."
