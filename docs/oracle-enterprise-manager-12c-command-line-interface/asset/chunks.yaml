- fmt: "# Python 帮助系统与基础对象\n\n## 使用 Python 帮助系统\n\n例如，如果我需要了解字符串的相关知识，可以在`help>`命令行中输入`string`，然后我就可以阅读关于Python中字符串多种用法的说明。一个更简单的方法是输入`topics`来查找主题。该命令会打印出可用主题的列表，包括`STRINGS`。输入`STRINGS`会展示一篇关于Python字符串的易懂文章。输入字母`q`将退出文章，输入`<CTRL-D>`将退出帮助命令行：\n\
    \n```\nhelp> topics\n\nHere is a list of available topics.  Enter any topic name\
    \ to get more help.\n\nASSERTION           DEBUGGING           LITERALS      \
