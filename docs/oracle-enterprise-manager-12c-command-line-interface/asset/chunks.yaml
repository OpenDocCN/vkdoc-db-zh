    \ is able to add targets with much more flexibility than EM.\n\nWhich parameters\
    \ need to be specified greatly depends on the target type being added. For example,\
    \ when adding a database, the properties parameter needs to include:\n\n*   SID\n\
    *   Port\n*   OracleHome\n*   MachineName\n\nThe credentials for a database are\
    \ almost always going to be for the “dbsnmp” user unless they are for a standby\
    \ database that is not open and therefore requires a privileged password file\
    \ account. [Listing 3-22](#9781484202395_Ch03.xhtml#list22) shows an example of\
    \ adding a target through EM CLI command-line mode.\n\n[Listing 3-22](#9781484202395_Ch03.xhtml#_list22).\
    \ Add the “orcl” single-instance database target\n\n```\n[oracle ~]$ emcli add_target\
    \ -name='ORCL_DB' \\\n-type='oracle_database' -host='oradb1.example.com' \\\n\
    -properties='SID:orcl;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;\n\
    MachineName:oradb1-vip.example.com' \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\n\
    Target \"ORCL_DB:oracle_database\" added successfully\n```\n\nIf we want to add\
    \ an RAC database target, the individual instances of the cluster need to be added\
    \ first, as shown in [Listings 3-23](#9781484202395_Ch03.xhtml#list23) and [3-24](#9781484202395_Ch03.xhtml#list24).\n\
    \n[Listing 3-23](#9781484202395_Ch03.xhtml#_list23). Add RAC database node one\n\
    \n```\n[oracle ~]$ emcli add_target -name='ORCL1_ORCL_RACCLUSTER'\\\n-type='oracle_database'\
    \ -host='oradb1.example.com' \\\n-properties='SID:orclrac1;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;\n\
    MachineName:oradb1-vip.example.com' \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\n\
    Target \"ORCL1_ORCL_RACCLUSTER:oracle_database\" added successfully\n```\n\n[Listing\
    \ 3-24](#9781484202395_Ch03.xhtml#_list24). Add RAC database node two\n\n```\n\
    [oracle ~]$ emcli add_target -name='ORCL2_ORCL_RACCLUSTER'\\\n-type='oracle_database'\
    \ -host='oradb2.example.com' \\\n-properties='SID:orclrac2;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;\n\
    MachineName:oradb2-vip.example.com' \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\n\
    Target \"ORCL2_ORCL_RACCLUSTER:oracle_database\" added successfully\n```"
  trans: "\n通常，维护活动不需要使用脚本模式，因为大多数维护脚本都在 shell 脚本中运行。`create_blackout` 命令动词需要四个参数：`name`、`add_targets`、`schedule`\
    \ 和 `reason`。作业由 `name` 参数标识，这意味着它必须在 EM 中所有其他作业中是唯一的。清单 3-16 展示了一个使用 EM CLI 命令行模式设置名为\
    \ “Blackout1” 的维护窗口的示例，该窗口针对 “`em12cr3.example.com`” 主机。此维护窗口不会重复，将持续三小时或直到被停止。设置此维护窗口的原因是\
    \ “Testing”。\n\n清单 3-16. 为 “`em12cr3.example.com`” 主机设置名为 “Blackout1” 的维护窗口\n\n\
    ```\n[oracle ~]$ emcli create_blackout -name='Blackout1' \\\n-add_targets='em12cr3.example.com:host'\
    \ \\\n-schedule='frequency:once;duration:3' \\\n-reason='Testing'\n```\n\n`get_blackouts`\
    \ 命令动词将显示当前定义的所有维护窗口的详细信息，如清单 3-17 所示。\n\n清单 3-17. 列出所有维护窗口\n\n```\n[oracle ~]$\
    \ emcli get_blackouts\nName       Created By  Status     Status ID  Next Start\
    \            Duration  Reason   Frequency  \nBlackout1  SYSMAN      Scheduled\
    \  0          2435-07-24  17:17:56  03:00     Testing  once  \nRepeat Start Time\
    \            End Time             Previous  End  TZ Region        TZ Offset\n\
    none   2000-07-24  17:17:56  2000-07-24  20:17:56  none          America/Chicago\
    \  +00:00\n```\n\n下面的示例使用 `noheader` 和 `script` 参数来更改 `get_blackouts` 的输出，使其易于解析。将输出通过管道传递给\
    \ `cut` 命令只显示第一个字段，即维护窗口名称字段。\n\n```\n[oracle ~]$ emcli get_blackouts -noheader\
    \ -script | cut -f1\nBlackout1\n```\n\n可以使用 `get_blackout_details` 命令动词查询维护窗口作业的详细信息。输出包含标题，并以制表符分隔。如果输出行的长度超过屏幕宽度，它们会换行显示，如清单\
    \ 3-18 所示。\n\n清单 3-18. 列出 “Blackout1” 维护窗口的详细信息\n\n```\n[oracle ~]$ emcli get_blackout_details\
    \ -name='Blackout1'\nStatus   Status ID  Run Jobs  Next Start            Duration\
    \  Reason   Frequency  Repeat  Days\nStarted  4          no        2014-04-12\
    \  13:37:28  03:00     Testing  once       none    none\nMonths Start Time   \
    \         End Time              TZ Region        TZ Offset\nnone   2014-04-12\
    \  13:37:28  2014-04-12  16:37:28  America/Chicago  +00:00\n```\n\n上面的格式难以阅读，更难以解析。相反，可以将输出更改为逗号分隔格式，移除标题，并将输出限制为我们需要的列，如清单\
    \ 3-19 所示。\n\n清单 3-19. 以更易于解析的格式列出 “Blackout1” 维护窗口的详细信息\n\n```\n[oracle ~]$ emcli\
    \ get_blackout_details \\\n-name='Blackout1' -noheader -format=\"name:csv\"\n\
    Started,4,no,2014-04-12 13:37:28,03:00,Testing,once,none,none,none,2014-04-12\
    \ 13:37:28,2014-04-12 16:37:28,America/Chicago,+00:00\n```\n\n一旦输出可以被解析，我们就可以通过将命令添加到\
    \ shell 脚本来测试我们寻找的值，创建 “Blackout1” 目标，如清单 3-20 所示。\n\n清单 3-20. 在脚本中创建维护窗口并测试退出值\n\
    \n```\nemcli create_blackout -name='Blackout1' -add_targets='em12cr3.example.com:host'\
    \ -schedule='frequency:once;duration:3' -reason='Testing'\n\nMYSTATUS=$(emcli\
    \ get_blackout_details -name='Blackout1' \\\n-noheader -format='name:csv' | cut\
    \ -d ',' -f 1)\n\nif [ \"$MYSTATUS\" <> \"Started\" ]; then\necho 'Blackout not\
    \ started'\n        exit 1\nfi\n\n<维护脚本>\n```\n\n在脚本中使用上述方法，您会注意到多次运行后，它有时会失败，有时会成功。这种行为发生是因为\
    \ `create_blackout` EM CLI 命令动词创建作业但不启动作业。作业由另一个进程启动，因此在检查作业状态的 `if` 语句执行时，维护窗口有可能尚未启动，从而导致脚本失败。一种解决方案是使用额外的\
    \ shell 脚本，该脚本要么等待作业启动后再继续执行脚本的其余部分，要么因为作业在 “Scheduled” 模式下停留时间过长而失败，如清单 3-21\
    \ 所示。\n\n清单 3-21. 添加额外的 shell 脚本以使事件顺序执行\n\n```\nMYSTATUS='Scheduled'\nSTATCOUNT=6\n\
    \nwhile [ \"$MYSTATUS\" == \"Scheduled\" ]; do\n        if [ $STATCOUNT -lt 1\
    \ ]; then\n            echo \"Blackout1 stuck in scheduled status\"\n        \
    \        exit 1\n        fi\n\n        let STATCOUNT-=1\n        sleep 5\n   \
    \     MYSTATUS=$(emcli get_blackout_details -name='Blackout1' \\\n           \
    \     -noheader -format='name:csv' | cut -d ',' -f 1)\ndone\n\nif [ \"$MYSTATUS\"\
    \ != \"Started\" ]; then\n        echo 'Blackout Blackout1 not started'\n    \
    \    exit 1\nfi\n\n<维护脚本>\n```\n\n维护完成后，同一个脚本可以使用 EM CLI 命令来关闭和删除维护窗口：\n\n```\n\
    emcli stop_blackout -name='Blackout1'\nemcli delete_blackout -name='Blackout1'\n\
    ```\n\n## 任务：创建目标\n\n如果 EM 不能自动发现目标，添加目标可能会很痛苦。特别是当目标使用非默认设置时，这有时会使代理难以检测到它们。幸运的是，EM\
    \ CLI 能够比 EM 更灵活地添加目标。\n\n需要指定哪些参数在很大程度上取决于要添加的目标类型。例如，添加数据库时，`properties` 参数需要包括：\n\
    \n*   `SID`\n*   `Port`\n*   `OracleHome`\n*   `MachineName`\n\n数据库的凭据几乎总是针对 “dbsnmp”\
    \ 用户，除非是针对未打开的备用数据库，因此需要一个特权密码文件帐户。清单 3-22 展示了一个通过 EM CLI 命令行模式添加目标的示例。\n\n清单\
    \ 3-22. 添加 “orcl” 单实例数据库目标\n\n```\n[oracle ~]$ emcli add_target -name='ORCL_DB'\
    \ \\\n-type='oracle_database' -host='oradb1.example.com' \\\n-properties='SID:orcl;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;MachineName:oradb1-vip.example.com'\
    \ \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\nTarget \"\
    ORCL_DB:oracle_database\" added successfully\n```\n\n如果我们想添加一个 RAC 数据库目标，需要首先添加集群的各个实例，如清单\
    \ 3-23 和 3-24 所示。\n\n清单 3-23. 添加 RAC 数据库节点一\n\n```\n[oracle ~]$ emcli add_target\
    \ -name='ORCL1_ORCL_RACCLUSTER' \\\n-type='oracle_database' -host='oradb1.example.com'\
    \ \\\n-properties='SID:orclrac1;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;MachineName:oradb1-vip.example.com'\
    \ \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\nTarget \"\
    ORCL1_ORCL_RACCLUSTER:oracle_database\" added successfully\n```\n\n清单 3-24. 添加\
    \ RAC 数据库节点二\n\n```\n[oracle ~]$ emcli add_target -name='ORCL2_ORCL_RACCLUSTER'\
    \ \\\n-type='oracle_database' -host='oradb2.example.com' \\\n-properties='SID:orclrac2;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;MachineName:oradb2-vip.example.com'\
    \ \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\nTarget \"\
    ORCL2_ORCL_RACCLUSTER:oracle_database\" added successfully\n```\n"
- fmt: '# 添加数据库集群目标与EM CLI作业管理


    ## 添加数据库集群目标


    添加实例后，可以通过指定实例作为`EM CLI`命令属性的一部分来添加数据库集群目标。这些实例随后会与数据库集群目标关联。


    ![Image](Images/sq.jpg) **注意**  由于我们正在添加集群目标，因此在添加数据库集群目标之前，必须已存在集群目标，如[Listing
    3-25](#9781484202395_Ch03.xhtml#list25)所示。


    [Listing 3-25](#9781484202395_Ch03.xhtml#_list25). 添加RAC数据库集群，关联之前的两个数据库实例


    ```

    [oracle ~]$ emcli add_target -name=''ORCL_RACCLUSTER'' \

    -host=''oradb1.example.com'' -monitor_mode=''1'' \

    -type=''rac_database'' -properties=''ServiceName:orclrac;ClusterName:oradb-cluster''
    \

    -instances=''ORCL1_ORCL_RACCLUSTER:oracle_database;ORCL2_ORCL_RACCLUSTER:oracle_database''

    Target "ORCL_RACCLUSTER:rac_database" added successfully

    ```


    ## 使用EM CLI添加目标


    可以使用`EM CLI`添加几乎任何目标类型。EM中的自动发现工具将准确检测大多数目标，从而轻松提升这些目标。当环境具有自定义配置导致自动发现机制不可靠时，手动添加目标是唯一选择。在某些环境中，编写添加目标的脚本可用于在不同版本之间迁移或复制环境。在这些情况下，使用`EM
    CLI`添加目标成为必需。


    `add_target`动词接受十几个参数；可以使用`EM CLI`的帮助功能快速参考。在线文档提供了更详细的描述。如果命令帮助不够用，请参考以下链接：


    `http://docs.oracle.com/cd/E24628_01/em.121/e17786/cli_verb_ref.htm#CACHFHCA`


    My Oracle Support（MOS）也有数十篇关于特定用例和`EM CLI`示例的文章。MOS说明1448276.1和1543773.1提供了有关使用`EM
    CLI`添加目标的特定信息。


    ## 任务：操作作业


    作业在EM中非常重要。在默认安装中，已经创建并运行了许多作业。许多管理员使用EM强大的作业调度和执行功能来处理关键的企业任务。


    这些功能可以在GUI和`EM CLI`中得到充分利用。例如，GUI在作业库中有一个名为“Create Like”的按钮，允许将一个作业的设置复制到另一个作业，以减少两个类似作业所需的输入量。此功能对于只有个别设置不同的一批作业非常适用。


    但是，如果需要创建数十个或数百个类似的作业怎么办？或者需要将一批作业从一个EM安装复制到另一个？`EM CLI`的导出作业到文本文件，然后从同一文件或修改版文件导入作业的功能，使得任何规模的作业操作成为可能。


    例如，一个执行`uname -a`操作系统命令的简单作业可以导出到文件。可以更改命令和作业名称为`uname`并使用不同的标志。然后，可以使用包含新变量的修改后文本文件创建新作业，如[Listing
    3-26](#9781484202395_Ch03.xhtml#list26)所示。


    [Listing 3-26](#9781484202395_Ch03.xhtml#_list26). 描述`UNAME_A_OMS`作业


    ```

    [oracle ~]$ emcli describe_job -name=''UNAME_A_OMS''


    # Current status of the job is EXPIRED.

    name=UNAME_A_OMS

    type=OSCommand

    owner=SYSMAN


    target_list=oraoem1.example.com:host


    # Credential Usage: defaultHostCred

    # Description:

    cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


    # Description: (Optional) Comma separated list of parameters to the command.

    variable.args=/bin/uname -a


    # Description: (Optional) Command to run on the target.

    variable.command=%job_default_shell%


    schedule.frequency=IMMEDIATE

    ```


    此命令的输出可用作属性文件来创建新作业。


    ## 通过属性文件创建作业


    1.  将文本复制到文件中并根据需要修改变量（[Listing 3-27](#9781484202395_Ch03.xhtml#list27)）。

    2.  为了省去一步，可以使用shell功能将标准输出重定向到文件。

    3.  将刚创建的文件复制为新文件，并在标准文本编辑器中打开该新文件（[Listing 3-27](#9781484202395_Ch03.xhtml#list27)）。

    4.  更改新文件中的作业名称和命令以反映新作业（更改以粗体显示；[Listing 3-28](#9781484202395_Ch03.xhtml#list28)）。


    [Listing 3-27](#9781484202395_Ch03.xhtml#_list27). 创建`uname_a_oms.job`作业属性文件并复制


    ```

    [oracle ~]$ emcli describe_job -name=''UNAME_A_OMS'' > uname_a_oms.job

    [oracle ~]$ cp uname_a_oms.job uname_r_oms.job

    ```


    [Listing 3-28](#9781484202395_Ch03.xhtml#_list28). 创建`uname_r_oms.job`作业属性文件


    ```

    [oracle ~]$ cat uname_r_oms.job


    # Current status of the job is EXPIRED.

    name=UNAME_R_OMS

    type=OSCommand

    owner=SYSMAN


    target_list=oraoem1.example.com:host


    # Credential Usage: defaultHostCred

    # Description:

    cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


    # Description: (Optional) Comma separated list of parameters to the command.

    variable.args=/bin/uname -r


    # Description: (Optional) Command to run on the target.

    variable.command=%job_default_shell%


    schedule.frequency=IMMEDIATE

    ```


    创建新作业，指定新的属性文件作为输入文件，如下所示：


    ```

    [oracle ~]$ emcli create_job -input_file=''property_file:uname_r_oms.job''

    Creation of job "UNAME_R_OMS" was successful.

    ```


    现在`UNAME_R_OMS`作业是一个活动作业。可以通过指定`describe_library_job`动词使用相同的过程在库中创建作业。


    ## 创建库作业


    ```

    [oracle ~]$ emcli describe_library_job -name=''UNAME_A''> uname_a.job

    [oracle ~]$ cp uname_a.job uname_r.job

    ```


    编辑`uname_r.job`文件。[Listing 3-29](#9781484202395_Ch03.xhtml#list29)显示了脚本内容，并使用`create_library_job`动词从脚本创建库作业。


    [Listing 3-29](#9781484202395_Ch03.xhtml#_list29). 创建`uname_a.job`和`uname_r.job`库作业属性文件


    ```

    [oracle ~]$ cat uname_r.job


    # Current status of the job is ACTIVE.

    name=UNAME_R

    type=OSCommand

    owner=SYSMAN

    kind=library


    # Credential Usage: defaultHostCred

    # Description:

    cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


    # Description: (Optional) Comma separated list of parameters to the command.

    variable.args=/bin/uname -r


    # Description: (Optional) Command to run on the target.

    variable.command=%job_default_shell%


    schedule.frequency=IMMEDIATE


    [oracle ~]$ emcli create_library_job -input_file=''property_file:uname_r.job''

    Creation of library job "UNAME_R" was successful.

    ```


    导出作业使用户能够轻松复制作业（包括活动和库作业），以及以通用格式保留该作业的外部备份。此备份可以作为将作业恢复到另一系统、构建副本或测试系统以及在必要时生成审计记录的方法。


    ## 总结


    对于不经常使用EM CLI的人来说，其术语可能令人困惑。动词（Verbs）定义了您想用EM CLI执行的功能。进行更改的“方式”称为模式（Modes）。命令行模式也称为经典模式，一次执行一个命令。交互和脚本模式使用Python语法，并且可以额外使用该强大编程语言的成熟功能。


    鉴于其规模和复杂性，任何人都不可能记住有关EM CLI的所有内容。即使是最先进的用户也需要定期参考文档。幸运的是，EM CLI提供了丰富的帮助功能。从在线找到的优秀文档到命令行和交互模式本身包含的手册页，所需的所有信息都易于获取。'
  raw: 'Once the instances are added, the database cluster target can be added, specifying
    the instances as part of the properties of the EM CLI command. These instances
    then become associated with the database cluster target.


    ![Image](Images/sq.jpg) **Note**  Because we are adding a cluster target, a Cluster
    ware target must already exist before adding database cluster targets, as shown
    in [Listing 3-25](#9781484202395_Ch03.xhtml#list25).


    [Listing 3-25](#9781484202395_Ch03.xhtml#_list25). Add RAC database cluster, associating
    the two previous database instances


    ```

    [oracle ~]$ emcli add_target -name=''ORCL_RACCLUSTER'' \

    -host=''oradb1.example.com'' -monitor_mode=''1'' \

    -type=''rac_database'' -properties=''ServiceName:orclrac;ClusterName:oradb-cluster''
    \

    -instances=''ORCL1_ORCL_RACCLUSTER:oracle_database;ORCL2_ORCL_RACCLUSTER:oracle_database''

    Target "ORCL_RACCLUSTER:rac_database" added successfully

    ```


    One can use EM CLI to add almost any target type. The auto-discovery tool in EM
    will accurately detect most targets, making it easy to promote those targets.
    When an environment has customized configurations that make the auto-discovery
    mechanism unreliable, adding targets manually is the only option. In some environments,
    scripting the process of adding targets can be used to migrate between versions
    or to replicate an environment. In these circumestances, using EM CLI to add targets
    becomes a necessity.


    The `add_target` verb accepts over a dozen parameters; use the help functionality
    of EM CLI for a quick reference. The online documentation provides a much more
    detailed description. Use the following reference if the command help isn’t enough:


    `http://docs.oracle.com/cd/E24628_01/em.121/e17786/cli_verb_ref.htm#CACHFHCA``.`


    My Oracle Support (MOS) also has dozens of articles on specific use cases and
    examples for EM CLI. MOS notes 1448276.1 and1543773.1 offer specific information
    on using EM CLI to add targets.


    Task: Manipulating Jobs


    Jobs are very important in EM. There are a number of jobs that are already created
    and running in a default installation. Many administrators use EM’s robust job
    scheduling and execution capabilities for their critical enterprise tasks.


    These capabilities can be fully exploited in both the GUI and EM CLI. For example,
    the GUI has a button called “Create Like” in the jobs library that allows one
    to replicate the settings from one job to another in order to reduce the amount
    of input necessary for two similar jobs. This functionality works great for a
    few jobs that look exactly alike except for one or two changes.


    But what if you need to create dozens or hundreds of jobs that are similar? Or
    you need to replicate a number of jobs from one EM installation to another? EM
    CLI’s functionality of exporting jobs to a text file and then importing jobs from
    the same file or a modified version of that file makes job manipulation at any
    scale possible.


    For example, a simple job that executes the `uname -a` OS command can be exported
    to a file. The command and job name can be changed to `uname` with a different
    flag. Then, the modified text file with the new variables can be used to create
    a new job, as shown in [Listing 3-26](#9781484202395_Ch03.xhtml#list26).


    [Listing 3-26](#9781484202395_Ch03.xhtml#_list26). Describe the UNAME_A_OMS job


    ```

    [oracle ~]$ emcli describe_job -name=''UNAME_A_OMS''


    # Current status of the job is EXPIRED.

    name=UNAME_A_OMS

    type=OSCommand

    owner=SYSMAN


    target_list=oraoem1.example.com:host


    # Credential Usage: defaultHostCred

    # Description:

    cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


    # Description: (Optional) Comma separated list of parameters to the command.

    variable.args=/bin/uname -a


    # Description: (Optional) Command to run on the target.

    variable.command=%job_default_shell%


    schedule.frequency=IMMEDIATE

    ```


    The output from this command can be used as a property file to create a new job.


    1.  Copy the text into a file and modify the variables as necessary ([Listing
    3-27](#9781484202395_Ch03.xhtml#list27)).

    2.  To save a step, use the shell capabilities to redirect standard output to
    a file.

    3.  Copy the file just created to a new file and open that new file in a standard
    text editor ([Listing 3-27](#9781484202395_Ch03.xhtml#list27)).

    4.  Change the job name and command in the new file to reflect the new job (changes
    are shown in bold; [Listing 3-28](#9781484202395_Ch03.xhtml#list28)).


    [Listing 3-27](#9781484202395_Ch03.xhtml#_list27). Create the `uname_a_oms.job`
    job properties file and make a copy


    ```

    [oracle ~]$ emcli describe_job -name=''UNAME_A_OMS'' > uname_a_oms.job

    [oracle ~]$ cp uname_a_oms.job uname_r_oms.job

    ```


    [Listing 3-28](#9781484202395_Ch03.xhtml#_list28). Create the `uname_r_oms.job`
    job properties file


    ```

    [oracle ~]$ cat uname_r_oms.job


    # Current status of the job is EXPIRED.

    name=UNAME_R_OMS

    type=OSCommand

    owner=SYSMAN


    target_list=oraoem1.example.com:host


    # Credential Usage: defaultHostCred

    # Description:

    cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


    # Description: (Optional) Comma separated list of parameters to the command.

    variable.args=/bin/uname -r


    # Description: (Optional) Command to run on the target.

    variable.command=%job_default_shell%


    schedule.frequency=IMMEDIATE

    ```


    Create the new job, specifying the new properties file as the input file, as shown
    here:


    ```

    [oracle ~]$ emcli create_job -input_file=''property_file:uname_r_oms.job''

    Creation of job "UNAME_R_OMS" was successful.

    ```


    The `UNAME_R_OMS` job is now an active job. The same process can be used to create
    a job in the library by specifying the `describe_library_job` verb:


    ```

    [oracle ~]$ emcli describe_library_job -name=''UNAME_A''> uname_a.job

    [oracle ~]$ cp uname_a.job uname_r.job

    ```


    Edit the `uname_r.job` file. [Listing 3-29](#9781484202395_Ch03.xhtml#list29)
    shows the contents of the script and uses the `create_library_job` verb to create
    the library job from the script.


    [Listing 3-29](#9781484202395_Ch03.xhtml#_list29). Create the `uname_a.job` and
    `uname_r.job` library job properties files


    ```

    [oracle ~]$ cat uname_r.job


    # Current status of the job is ACTIVE.

    name=UNAME_R

    type=OSCommand

    owner=SYSMAN

    kind=library


    # Credential Usage: defaultHostCred

    # Description:

    cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


    # Description: (Optional) Comma separated list of parameters to the command.

    variable.args=/bin/uname -r


    # Description: (Optional) Command to run on the target.

    variable.command=%job_default_shell%


    schedule.frequency=IMMEDIATE


    [oracle ~]$ emcli create_library_job -input_file=''property_file:uname_r.job''

    Creation of library job "UNAME_R" was successful.

    ```


    Exporting jobs gives one the ability to easily duplicate jobs (both active and
    library), as well as to keep an external backup of that job in a generic format.
    This backup can serve as a method of restoring the job to another system, building
    a duplicate or test system, and producing an audit record if necessary.


    Summary


    The terminology of EM CLI can be confusing for someone who is not a regular user.
    Verbs define the functionality of what you want to do with EM CLI. The “flavors”
    of how you make changes with EM CLI are known as modes. Command-line mode is also
    known as classic mode, where one command is executed at a time. Interactive and
    scripting modes use Python syntax and can additionally use the mature functionality
    of that powerful programming language.


    Given its size and complexity, it is impossible for someone to memorize everything
    about EM CLI. Even the most advanced user will need the assistance of documentation
    on a regular basis. Fortunately, EM CLI is loaded with help. From the excellent
    documentation found online to the manual pages contained within the command-line
    and interactive modes of the tool itself, all of the information one needs is
    easily and readily available.'
  trans: '

    # 添加数据库集群目标与 EM CLI 作业管理


    ## 添加数据库集群目标


    添加实例后，可以通过指定实例作为 `EM CLI` 命令属性的一部分来添加数据库集群目标。这些实例随后会与数据库集群目标关联。


    ![Image](img/sq.jpg) **注意** 由于我们正在添加集群目标，因此在添加数据库集群目标之前，必须已存在集群目标，如 Listing 3-25
    所示。


    Listing 3-25. 添加 RAC 数据库集群，关联之前的两个数据库实例


    ```

    [oracle ~]$ emcli add_target -name=''ORCL_RACCLUSTER'' \

    -host=''oradb1.example.com'' -monitor_mode=''1'' \

    -type=''rac_database'' -properties=''ServiceName:orclrac;ClusterName:oradb-cluster''
    \

    -instances=''ORCL1_ORCL_RACCLUSTER:oracle_database;ORCL2_ORCL_RACCLUSTER:oracle_database''

    Target "ORCL_RACCLUSTER:rac_database" added successfully

    ```


    ## 使用 EM CLI 添加目标


    可以使用 `EM CLI` 添加几乎任何目标类型。EM 中的自动发现工具将准确检测大多数目标，从而轻松提升这些目标。当环境具有自定义配置导致自动发现机制不可靠时，手动添加目标是唯一选择。在某些环境中，编写添加目标的脚本可用于在不同版本之间迁移或复制环境。在这些情况下，使用
    `EM CLI` 添加目标成为必需。


    `add_target` 动词接受十几个参数；可以使用 `EM CLI` 的帮助功能快速参考。在线文档提供了更详细的描述。如果命令帮助不够用，请参考以下链接：


    `http://docs.oracle.com/cd/E24628_01/em.121/e17786/cli_verb_ref.htm#CACHFHCA`


    My Oracle Support（MOS）也有数十篇关于特定用例和 `EM CLI` 示例的文章。MOS 说明 1448276.1 和 1543773.1
    提供了有关使用 `EM CLI` 添加目标的特定信息。


    ## 任务：操作作业


    作业在 EM 中非常重要。在默认安装中，已经创建并运行了许多作业。许多管理员使用 EM 强大的作业调度和执行功能来处理关键的企业任务。


    这些功能可以在 GUI 和 `EM CLI` 中得到充分利用。例如，GUI 在作业库中有一个名为“Create Like”的按钮，允许将一个作业的设置复制到另一个作业，以减少两个类似作业所需的输入量。此功能对于只有个别设置不同的一批作业非常适用。


    但是，如果需要创建数十个或数百个类似的作业怎么办？或者需要将一批作业从一个 EM 安装复制到另一个？`EM CLI` 的导出作业到文本文件，然后从同一文件或修改版文件导入作业的功能，使得任何规模的作业操作成为可能。


    例如，一个执行 `uname -a` 操作系统命令的简单作业可以导出到文件。可以更改命令和作业名称为 `uname` 并使用不同的标志。然后，可以使用包含新变量的修改后文本文件创建新作业，如
    Listing 3-26 所示。


    Listing 3-26. 描述 `UNAME_A_OMS` 作业


    ```

    [oracle ~]$ emcli describe_job -name=''UNAME_A_OMS''


    # Current status of the job is EXPIRED.

    name=UNAME_A_OMS

    type=OSCommand

    owner=SYSMAN


    target_list=oraoem1.example.com:host


    # Credential Usage: defaultHostCred

    # Description:

    cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


    # Description: (Optional) Comma separated list of parameters to the command.

    variable.args=/bin/uname -a


    # Description: (Optional) Command to run on the target.

    variable.command=%job_default_shell%


    schedule.frequency=IMMEDIATE

    ```


    此命令的输出可用作属性文件来创建新作业。


    ## 通过属性文件创建作业


    1.  将文本复制到文件中并根据需要修改变量（Listing 3-27）。

    2.  为了省去一步，可以使用 shell 功能将标准输出重定向到文件。

    3.  将刚创建的文件复制为新文件，并在标准文本编辑器中打开该新文件（Listing 3-27）。

    4.  更改新文件中的作业名称和命令以反映新作业（更改以粗体显示；Listing 3-28）。


    Listing 3-27. 创建 `uname_a_oms.job` 作业属性文件并复制


    ```

    [oracle ~]$ emcli describe_job -name=''UNAME_A_OMS'' > uname_a_oms.job

    [oracle ~]$ cp uname_a_oms.job uname_r_oms.job

    ```


    Listing 3-28. 创建 `uname_r_oms.job` 作业属性文件


    ```

    [oracle ~]$ cat uname_r_oms.job


    # Current status of the job is EXPIRED.

    name=UNAME_R_OMS

    type=OSCommand

    owner=SYSMAN


    target_list=oraoem1.example.com:host


    # Credential Usage: defaultHostCred

    # Description:

    cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


    # Description: (Optional) Comma separated list of parameters to the command.

    variable.args=/bin/uname -r


    # Description: (Optional) Command to run on the target.

    variable.command=%job_default_shell%


    schedule.frequency=IMMEDIATE

    ```


    创建新作业，指定新的属性文件作为输入文件，如下所示：


    ```

    [oracle ~]$ emcli create_job -input_file=''property_file:uname_r_oms.job''

    Creation of job "UNAME_R_OMS" was successful.

    ```


    现在 `UNAME_R_OMS` 作业是一个活动作业。可以通过指定 `describe_library_job` 动词使用相同的过程在库中创建作业。


    ## 创建库作业


    ```

    [oracle ~]$ emcli describe_library_job -name=''UNAME_A''> uname_a.job

    [oracle ~]$ cp uname_a.job uname_r.job

    ```


    编辑 `uname_r.job` 文件。Listing 3-29 显示了脚本内容，并使用 `create_library_job` 动词从脚本创建库作业。


    Listing 3-29. 创建 `uname_a.job` 和 `uname_r.job` 库作业属性文件


    ```

    [oracle ~]$ cat uname_r.job


    # Current status of the job is ACTIVE.

    name=UNAME_R

    type=OSCommand

    owner=SYSMAN

    kind=library


    # Credential Usage: defaultHostCred

    # Description:

    cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


    # Description: (Optional) Comma separated list of parameters to the command.

    variable.args=/bin/uname -r


    # Description: (Optional) Command to run on the target.

    variable.command=%job_default_shell%


    schedule.frequency=IMMEDIATE


    [oracle ~]$ emcli create_library_job -input_file=''property_file:uname_r.job''

    Creation of library job "UNAME_R" was successful.

    ```


    导出作业使用户能够轻松复制作业（包括活动和库作业），以及以通用格式保留该作业的外部备份。此备份可以作为将作业恢复到另一系统、构建副本或测试系统以及在必要时生成审计记录的方法。


    ## 总结


    对于不经常使用 EM CLI 的人来说，其术语可能令人困惑。动词（Verbs）定义了您想用 EM CLI 执行的功能。进行更改的“方式”称为模式（Modes）。命令行模式也称为经典模式，一次执行一个命令。交互和脚本模式使用
    Python 语法，并且可以额外使用该强大编程语言的成熟功能。


    鉴于其规模和复杂性，任何人都不可能记住有关 EM CLI 的所有内容。即使是最先进的用户也需要定期参考文档。幸运的是，EM CLI 提供了丰富的帮助功能。从在线找到的优秀文档到命令行和交互模式本身包含的手册页，所需的所有信息都易于获取。

