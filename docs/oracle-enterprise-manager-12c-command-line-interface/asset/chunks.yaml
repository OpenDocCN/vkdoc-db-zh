    \ capacity to always make me want to be a better technologist.\n\nMy wife, Valerie,\
    \ makes my life better every day. Her encouragement for this project was essential\
    \ to its completion. I’d also like to thank the tremendous Oracle employees responsible\
    \ for making OEM the fine tool that it is. Werner De Gruyter, Ana McCollum, Adeesh\
    \ Fulay, and Maureen Byrne have all shown a genuine interest in improving OEM\
    \ through user feedback and understanding. Their insights brought all of this\
    \ into focus.\n\nCHAPTER 1\n\n![image](Images/frontdot.jpg)\n\nArchitecture\n\n\
    Oracle Enterprise Manager 12c provides a scalable and reliable central repository,\
    \ a console, and services for managing your all of your Oracle products. Users\
    \ typically interact with OEM through the OEM console, which has a rich intuitive\
    \ graphical interface.\n\nThe Enterprise Manager Command-Line Interface (EM CLI)\
    \ provides access to OEM system functionality outside of the console. Interactive\
    \ EM CLI tasks can replace lengthy click-streams in defining EM administrator\
    \ accounts and roles, as one example of its usefulness. EM CLI interactive commands\
    \ can be used in shell scripts or can be CLI invoked through CLI’s own scripting\
    \ mode in Jython.\n\nThis book explores different ways you can apply these techniques\
    \ to simplify and automate tasks in your Oracle environment.\n\nEnterprise Manager\
    \ Framework\n\nThe Oracle Enterprise Manager application runs as a JEE application\
    \ in a WebLogic Server J2EE domain on a WebLogic server. This combination is known\
    \ as the Oracle Management Server, or OMS.\n\nJava processes running on the OMS\
    \ gather and process XML file uploads that come from EM agents on your remote\
    \ hosts. That information is posted to a repository database, where it is stored\
    \ in the SYSMAN schema.\n\nWhen you view a page on your OEM console, the data\
    \ is assembled from the repository database for presentation. In the same way,\
    \ commands that you issue from the console are processed through the OMS to update\
    \ repository information (metric collection or notifications, for instance) or\
    \ manipulate managed targets either through a call to the EM agent or through\
    \ an authenticated connection to a remote database or host.\n\nEach command issued\
    \ by the console executes a Java program. The console solicits and assembles data\
    \ as well as the input commands required for those routines to execute. Much of\
    \ the manipulative and query code base can be accessed through EM CLI.\n\nThe\
    \ EM CLI program is itself a lightweight Java program that performs the same activities\
    \ as the console pages but runs an immediate execution of OMS modules using values\
    \ passed as command-line inputs; it is often employed in shell scripts or Jython\
    \ programs.\n\nEM CLI Verbs\n\nInterface commands are referred to as *verbs*.\
    \ Each verb performs a single task and either succeeds with reasonable feedback\
    \ or comes back with a quick and obvious failure message.\n\nMany verbs require\
    \ input values on the command line. As with a PL/SQL package, your input must\
    \ be passed to the OMS using very specific syntax. The values are always preceded\
    \ by a filter keyword, and most input requires your strings to be wrapped in double-quotes.\n\
    \n![Image](Images/sq.jpg) **Note**  The authors’ experiences using quotation marks\
    \ have been mixed. They are recommended, but often aren’t required. We’ll use\
    \ them for clarity in our examples. You may find that you don’t always need them,\
    \ or that you prefer not to use them.\n\nUse the `get_targets` verb to display\
    \ or capture a list of the targets in your environment, as follows:\n\n```\nemcli\
    \ get_targets\n```\n\nTo find only Oracle database targets you’d filter your request\
    \ with the `targets` keyword:\n\n```\nemcli get_targets -targets=\"oracle_database\"\
    \n```\n\nNumerous examples throughout this book demonstrate how verbs and input\
    \ values are applied. A catalog of EM CLI verbs and their syntax is available\
    \ in Oracle Support document E17786-x. Be aware that some verbs are tied to management\
    \ packs that require licensing fees. You can also find online help at the command-line\
    \ that lists all of the verbs available and their intended use. For example:\n\
    \n```\nemcli help\nSummary of commands:\n\nargfile    -- Execute emcli verbs from\
    \ a file\n    help       -- Get help for emcli verbs (Usage: emcli help [verb_name])\n\
    \    login      -- Login to the EM Management Server (OMS)\n    logout     --\
    \ Logout from the EM Management Server\n    setup      -- Setup emcli to work\
    \ with an EM Management Server\n    status     -- List emcli configuration details\n\
    \    sync       -- Synchronize with the EM Management Server\n    version    --\
    \ List emcli verb versions or the emcli client version\n\nAdd Host Verbs\n   \
    \ continue_add_host             -- Continue a failed Add Host session\n    get_add_host_status\
    \           -- Displays the latest status of an Add Host session.\n    list_add_host_platforms\
    \       -- Lists the platforms on which the Add Host operation can be performed.\n\
    \    list_add_host_sessions        -- Lists all the Add Host sessions.\n    retry_add_host\
    \                -- Retry a failed Add Host session\n    submit_add_host     \
    \          -- Submits an Add Host session.\n...\n```\n\nThe `help` verb can be\
    \ filtered with specific verbs to display detailed usage instructions:\n\n```\n\
    emcli help get_targets\n  emcli get_targets\n        [-targets=\"[name1:]type1;[name2:]type2;...\"\
    ]\n        [-alerts]\n        [-noheader]\n        [-script | -format=\n     \
    \                      [name:<pretty|script|csv>];\n                         \
    \  [column_separator:\"column_sep_string\"];\n                           [row_separator:\"\
    row_sep_string\"];\n        ]\n        [-config_search=\"Configuration Search\
    \ UI Name\"]\n        [-unmanaged]\n\nDescription:\n    Obtain status and alert\
    \ information for targets.\n\nOptions:\n    -targets=name:type\n        Name or\
    \ type can be either a full value or a pattern match\n        using \"%\". Also,\
    \ name is optional, so the type may be\n        specified alone.\n     -config_search=\"\
    Configuration Search UI Name\"\n         Search UI Name should be the display\
    \ name of the configuration search.\n     -alerts\n        Shows the count of\
    \ critical and warning alerts for each target.\n    -noheader\n        Display\
    \ tabular output without column headers.\n    -script\n        This option is\
    \ equivalent to -format=\"name:script\".\n    -format\n        Format specification\
    \ (default is -format=\"name:pretty\").\n        -format=\"name:pretty\" prints\
    \ the output table\n            in a readable format but is not intended to be\
    \ parsed by scripts.\n        -format=\"name:script\" sets the default column\
    \ separator\n            to a tab and the default row separator to a newline.\n\
    \            The column and row separator strings may be specified\n         \
    \   to change these defaults.\n        -format=\"name:csv\" sets the column separator\
    \ to a comma\n            and the row separator to a newline.\n    -unmanaged\n\
    \        Get unmanaged targets (no status or alert information)"
  trans: "**莎拉·布莱登** 是一位经验丰富的技术专家，在基于 Oracle 和 UNIX 的应用程序领域拥有超过二十年的经验。自 1996 年起担任\
    \ Oracle 数据库管理员（DBA），莎拉使用过从 7.1 版开始的所有 Oracle 版本，并且是 Oracle 认证大师。她在 7x24 小时环境的系统设计与支持、Oracle\
    \ RAC 部署以及 Oracle 数据库的安全与审计考虑方面拥有广泛的经验。\n\n此前，莎拉曾是贝莱德（Blackrock）的高级 Oracle 专家，该公司是全球最大的金融服务公司，管理着超过\
