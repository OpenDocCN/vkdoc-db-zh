    \ `PrepareBackupDir` 命令准备目录。\n\n| 文件名 |\n| :--- |\n| `orion-web.xml` |\n| `web.xml`\
    \ |\n\n使用 `BackupConfigFile` 命令备份上述文件。\n\n## 路径 `sysman/j2ee/application-deployments/Oc4jDcmServlet`\n\
    \n使用 `PrepareBackupDir` 命令准备目录。\n\n| 文件名 |\n| :--- |\n| `orion-application.xml`\
    \ |\n| `orion-web.xml` |\n\n使用 `BackupConfigFile` 命令备份上述文件。\n\n## 路径 `sysman/webapps/emd/online_help`\n\
    \n使用 `PrepareBackupDir` 命令准备目录。\n\n| 文件名 |\n| :--- |\n| `ohwconfig.xml` |\n\n\
    使用 `BackupConfigFile` 命令备份该文件。\n\n## 路径 `uix`\n\n使用 `PrepareBackupDir` 命令准备目录。\n\
    \n| 文件名 |\n| :--- |\n| `uix.conf` |\n\n使用 `BackupConfigFile` 命令备份该文件。\n\n## 路径\
    \ `wcs/config`\n\n使用 `PrepareBackupDir` 命令准备目录。\n\n| 文件名 |\n| :--- |\n| `wcs_httpd.conf`\
    \ |\n\n使用 `BackupConfigFile` 命令备份该文件。\n\n## 路径 `webcache`\n\n使用 `PrepareBackupDir`\
    \ 命令准备目录。\n\n| 文件名 |\n| :--- |\n| `internal.xml` |\n\n使用 `BackupConfigFile` 命令备份该文件。\n\
    \n---\n\n执行 `DashedBreak` 命令。\n\n```bash\necho \"\\nBackup directories and contents\
    \ after processing\\n\\n\"\nls -lARp ${BACKUP_DIR} | grep -v \"^total\" \n```\n\
    \n# 临时文件清理脚本\n\nOracle Management Server 为其每个组件生成日志，从 WebLogic 服务器到主机上的 EM 代理。预设的轮转和文件清理机制在存在时非常有用，但并非所有文件都受此管理。保持服务器整洁需要由你负责。\n\
    \n此脚本遍历 OMS 服务器上的日志目录。评估每个文件的空闲时间，然后删除较旧的文件：\n\n```ksh\n#!/bin/ksh\n#===============================================================================\n\
    #  Script name  : log_blaster_oms.ksh\n#  Calling args : None\n#  Purpose    \
    \  : Clean up logs files for OMS\n#                       References come from\
    \ MOS Note 1445743.1\n#===============================================================================\n\
    #  Independent variables\n#=================================================================\n\
    # Set these variables to your local directory settings\n# The EM_INSTANCE_HOME\
    \ is typically MIDDLEWARE_HOME/gc_inst\nEM_INSTANCE_HOME=\n\nWORKFILE=/tmp/logblaster_oms_workfile1.lst\n\
    \n#=================================================================\n#  Functions\n\
    # =================================================================\n\nfunction\
    \ CleanUpFiles {\n# --------------------------------------------------------------------------------------------------\n\
    \n[ $WORKFILE ] && rm -f ${WORKFILE}\n}\n\nfunction TrimThisFile {\n# --------------------------------------------------------------------------------------------------\n\
    if [ -d ${thisDIR} ]; then\n   if [ `find ${thisDIR} -name ${thisFILE} | wc -l`\
    \ -gt 0 ]; then\n      NEW_FILE=${thisDIR}/${thisFILE}\n      OLD_FILE=${thisDIR}/${thisFILE}_old\n\
    \      LAST_DATE=`tail -1 ${NEW_FILE} | awk '{ print $1,$2,$3 }'`\n      echo\
    \ \"\\nTrimming ${NEW_FILE}\"\n      echo \"Entries older than ${LAST_DATE} will\
    \ be removed\\n\"\n      mv -f ${NEW_FILE} ${OLD_FILE}\n      cat ${OLD_FILE}\
    \ | grep \"${LAST_DATE}\" >${NEW_FILE}\n         if [ `cat ${NEW_FILE} | wc -l`\
    \ -gt 0 ]; then\n            rm -f ${OLD_FILE}\n         else\n            mv\
    \ -f ${OLD_FILE} ${NEW_FILE}\n      fi\n   fi\n   echo \"\\n\\n\"\nelse\n   echo\
    \ \"\\nDirectory ${thisDIR} not found\\n\\n\"\nfi\n}\n\nfunction SweepThese {\n\
    # --------------------------------------------------------------------------------------------------\n\
    if [ -d ${thisDIR} ]; then\n   find ${thisDIR} -name ${thisFILE} -mtime +${thisAGE}\
    \ >${WORKFILE}\n   if [ `cat ${WORKFILE} | wc -l` -gt 0 ]; then\n      echo \"\
    \\nCleaning up ${thisDIR} directory\"\n      for thisTRASH in `cat ${WORKFILE}`;\
    \ do\n         echo\"\\tRemoving ${thisTRASH}\"\n         rm -f ${thisTRASH}\n\
    \      done\n   else\n      echo \"\\nNo files over ${thisAGE} days old matching\"\
    \n      echo \"${thisDIR}/${thisFILE}\"\n   fi\n   echo \"\\n\\n\"\nelse\n   echo\
    \ \"\\nDirectory ${thisDIR} not found\\n\\n\"\nfi\n}\n\n# --------------------------------------------------------------------------------------------------\n\
    #  Run-time procedure\n# --------------------------------------------------------------------------------------------------\n\
    \nCleanUpFiles\n\n# --------------------------------------------------------------------------------------------------\n\
    # The webtier directory name is pulled from the environment\n# Typically the value\
    \ discovered  OMS1, but it may be different\n# --------------------------------------------------------------------------------------------------\n\
    \nWEBTIERn=`ls ${EM_INSTANCE_HOME} | grep WebTier`\n\nOHSn=`ls ${EM_INSTANCE_HOME}/${WEBTIERn}/diagnostics/logs/OHS\
    \ | grep ohs`\n\n# --------------------------------------------------------------------------------------------------\n\
    # Retention for this directory is set for seven days through thisAGE variable\n\
    # --------------------------------------------------------------------------------------------------\n\
    \nthisDIR=${EM_INSTANCE_HOME}/${WEBTIERn}/diagnostics/logs/OHS/${OHSn}\n   thisAGE=7\n\
    \nthisFILE=\"em_upload_http_access_log.*\"\n   SweepThese\n\nthisFILE=\"em_upload_https_access_log.*\"\
    \n   SweepThese\n\nthisFILE=\"access_log.*\"\n   SweepThese\n\nthisFILE=\"ohs*.log\"\
    \n   SweepThese\n\nthisFILE=\"console~OHS*.log*\"\n   SweepThese\n\nthisFILE=\"\
    mod_wl_ohs.log\"\n   TrimThisFile\n\n# --------------------------------------------------------------------------------------------------\n\
    \nDOMAIN_SERVERS_DIR=${EM_INSTANCE_HOME}/user_projects/domains/GCDomain/servers\n\
    \nthisDIR=${DOMAIN_SERVERS_DIR}/EMGC_ADMINSERVER/logs\n   thisAGE=7\n\nthisFILE=\"\
    GCDomain.log*\"\n   SweepThese\n\nthisFILE=\"EMGC_ADMINSERVER.out*\"\n   SweepThese\n\
    \nthisFILE=\"EMGC_ADMINSERVER.log*\"\n   SweepThese\n\nthisFILE=\"EMGC_ADMINSERVER-diagnostic-*.log\"\
    \n   SweepThese\n\nthisFILE=\"access.log*\"\n   SweepThese\n\n# --------------------------------------------------------------------------------------------------\n\
    \nEMGC_OMSn=`ls ${DOMAIN_SERVERS_DIR} | grep OMS`\n\nthisDIR=${DOMAIN_SERVERS_DIR}/${EMGC_OMSn}/logs\n\
    \   thisAGE=7\n\nthisFILE=\"EMGC_OMS*.out*\"\n   SweepThese\n\nfor eachDIR in\
    \ `ls -1 /oraoms/exportconfig`; do\n   thisDIR=/oraoms/exportconfig/${eachDIR}\n\
    \   thisFILE=\"opf_ADMIN_*.bka\"\n   SweepThese\nDone\n\nCleanUpFiles\nexit 0\n\
    ```\n\n# 第 4 节：EM CLI 脚本与交互式脚本\n\nEnterprise Manager 第 3 版包含标准的仅命令行版本的 EM CLI\
    \ 以及带有强大脚本选项的版本（有时称为高级套件）。后者可以下载并安装在任何受支持的客户端操作系统上，或直接在服务器上使用。EM CLI 与 Oracle\
    \ Management Server (OMS) 之间的连接方法相同，与 EM CLI 的安装位置无关。高级套件的安装说明在[第 2 章](../Text/9781484202395_Ch02.xhtml)中介绍。\n\
    \nEM CLI 的脚本选项同时指脚本模式和交互模式。在这两种模式下，EM CLI 都期望脚本内容或在交互模式下输入的命令符合 Python 语法。要在交互模式下从\
    \ EM CLI 连接到 Enterprise Manager，请输入命令 `login(username='sysman', password='foobar')`。此命令是对一个\
    \ Python 函数的调用。"
