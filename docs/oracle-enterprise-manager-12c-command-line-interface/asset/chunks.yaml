    CONTEXTMANAGERS     LISTLITERALS        SCOPING\nCONVERSIONS         LISTS   \
    \            SEQUENCEMETHODS1\n\nhelp> STRINGS\nString literals\n***************\n\
    \nString literals are described by the following lexical definitions:\n\nstringliteral\
    \   ::= [stringprefix](shortstring | longstring)\n   stringprefix    ::= \"r\"\
    \ | \"u\" | \"ur\" | \"R\" | \"U\" | \"UR\" | \"Ur\" | \"uR\"\n   shortstring\
    \     ::= \"'\" shortstringitem* \"'\" | '\"' shortstringitem* '\"'\n...\n\n:q\n\
    \nhelp> <CTRL-D>\nYou are now leaving help and returning to the Python interpreter.\n\
    If you want to ask for help on a particular object directly from the\ninterpreter,\
    \ you can type \"help(object)\". Executing \"help('string')\"\nhas the same effect\
    \ as typing a particular string at the help> prompt.\n>>>\n```\n\nThe `help` function\
    \ is also very useful in EM CLI. The developers spent a lot of time making sure\
    \ information is contained within the program. Unlike Python, typing `help()`\
    \ does not drop into another command line; it simply prints out a list of verbs,\
    \ sorted and grouped by category.\n\nThe individual verbs can then be specified\
    \ in the `help` function for more detailed information on that verb. For example,\
    \ typing `help('list_active_sessions')` in EM CLI would print out detailed information\
    \ on the `list_active_sessions()` function.\n\nPython Objects\n\nAn object in\
    \ Python is an entity that can hold data and, in most cases, be manipulated by\
    \ changing the data contained within the object or by changing the attributes\
    \ of the object itself. The content and complexity of a Python object depends\
    \ on the object type. For example, if you need an object with just a single digit,\
    \ you would use a `number` object. If you need a multiple key/value object, you\
    \ would use a `dictionary` object. The life of an object begins when it is created\
    \ or assigned a value and ends when it is explicitly destroyed or when the Python\
    \ session ends. This section lists the most common object types and shows examples\
    \ of how to create and use them.\n\nNumbers and Strings\n\nA `number` object is\
    \ an entity that contains a single integer value. A `string` object is an entity\
    \ that contains a single string value. These types of objects are mutable, which\
    \ means the assigned value can be changed or replaced at any point during the\
    \ life of the object. These are by far the most commonly used objects in Python.\n\
    \nThe “Hello World!” example introduced the most basic object in Python: the string.\
    \ Strings are used everywhere in Python, and most other objects are made up of\
    \ numbers and strings. Strings can include numbers, but numbers cannot include\
    \ strings.\n\nThis example shows how to create a simple string object by assigning\
    \ a string to a variable:\n\n```\n>>> mystring = 'Here is my string'\n>>> type(mystring)\n\
    <type 'str'>\n```\n\nI can create a number object by assigning a number to a variable.\
    \ `int` stands for integer:\n\n```\n>>> mynumber = 12345\n>>> type(mynumber)\n\
    <type 'int'>\n```\n\nNumbers and strings are different types of objects. Trying\
    \ to join a string value to a number value results in error:\n\n```\n>>> mystring\
    \ + mynumber\nTraceback (most recent call last):\n  File \"<stdin>\", line 1,\
    \ in <module>\nTypeError: Can't convert 'int' object to str implicitly\n```\n\n\
    Lists\n\nLists are a common way to store an indexed group of values within an\
    \ object. A simple list is assigned to an object in a similar way to how a string\
    \ is assigned to an object, the difference being that the object is now a list\
    \ object, not a string object. The significance of this is not as great in Python\
    \ as in other languages, but it is a good idea to have an understanding that there\
    \ is a difference that can potentially have an impact on the behavior of a program.\n\
    \nThis example shows a list object with a single value. The values assigned to\
    \ a list are encapsulated by brackets. Without the brackets this would be a simple\
    \ string object. See here:\n\n```\n>>> mylist = ['one']\n>>> print(mylist)\n['one']\n\
    >>> type(mylist)\n<type 'list'>\n>>> mystring = 'one'\n>>> type(mystring)\n<type\
    \ 'str'>\n```\n\nSimple Lists\n\nA list with a single value can be useful, but\
    \ the purpose of lists is to be able to assign multiple list values within a single\
    \ object. These values are referred to as *elements*. In the previous example,\
    \ a value of `one` was assigned as the first element in the `mylist` object.\n\
    \nThis example creates a list called `mylist` with five members. Printing the\
    \ list displays it exactly how it was created. The five elements are printed within\
    \ an opening and closing bracket. The brackets are what tell us that this is a\
    \ list and not a string or any other type of object. A list index of 2 is actually\
    \ the third element in the list since the index numbers start at 0.\n\nThe power\
    \ of lists comes from the plethora of ways that the individual elements can be\
    \ manipulated. For example, any element can be queried from a list by specifying\
    \ its index number. The index of a list starts at zero, so the first element of\
    \ a list is assigned the number zero:\n\n```\n>>> mylist = ['one', 'two', 'three',\
    \ 'four', 'five']\n>>> print(mylist)\n['one', 'two', 'three', 'four', 'five']\n\
    >>> type(mylist)\n<type 'list'>\n>>> print(mylist[2])\nthree\n```\n\nA list is\
    \ mutable, which means it can be manipulated after it has been created. It can\
    \ be lengthened or shortened, and the elements can be changed. This example shows\
    \ the `mylist` object being appended with the value of `6`. The number of elements\
    \ in this object goes from five to six:\n\n```\n>>> mylist.append('six')\n>>>\
    \ print(mylist)\n['one', 'two', 'three', 'four', 'five', 'six']\n>>> print(len(mylist))\n\
    \n```\n\nThe `len()` function used in the previous example displays the number\
    \ of elements in the list. Like many functions, `len()` can be used on lists,\
    \ strings, and all other object types."
