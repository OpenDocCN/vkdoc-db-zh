  trans: "\n可以创建一个简单的脚本来建立连接，并在交互模式和脚本模式下使用。登录脚本需要指定用于连接的 URL、SSL 身份验证方式以及登录凭据。这两种模式都需要一个\
    \ Python 脚本（参见清单 3-8）。\n\n### 创建登录脚本\n\n清单 3-8. 用于交互模式和脚本模式的登录脚本\n\n```\nfrom\
    \ emcli import *\n\nset_client_property('EMCLI_OMS_URL', 'https://oem.example.com:7802/em')\n\
    set_client_property('EMCLI_TRUSTALL', 'true')\n\nmyLogin(username='sysman')\n\n\
    myLogin()\n```\n\n将此文本放入扩展名为`.py`的文件中，即可使其成为一个可以导入到`EM CLI`中的模块。例如，该脚本可以命名为`login.py`，并放置在`/home/oracle/scripts`目录下。然而，`EM\
    \ CLI`不一定能找到该脚本，因为此路径不在默认的`Jython`路径中。明确定义`Jython`搜索路径可以确保`EM CLI`能够导入该搜索路径内的任何脚本。可以通过补充`JYTHONPATH`变量来添加额外的目录：\n\
    \n```\nexport JYTHONPATH=$JYTHONPATH:/home/oracle/scripts\n```\n\n类似于使用命令`from\
    \ emcli import *`将`EM CLI`的`Jython`模块导入到脚本中一样，登录脚本也可以被导入到交互模式或脚本模式中。\n\n### 在交互模式下建立登录\n\
    \n要在交互模式下建立登录，我们可以直接导入模块。然后，系统将提示我们输入脚本中指定用户的密码。清单 3-9 展示了在交互模式下使用登录脚本的示例。\n\n\
    清单 3-9. 使用登录模块在交互模式下建立登录\n\n```\n[oracle ~]$ emcli\nOracle Enterprise Manager\
    \ 12c EMCLI with Scripting option Version 12.1.0.3.0.\nCopyright (c) 1996, 2013\
    \ Oracle Corporation and/or its affiliates. All rights reserved.\n\nType help()\
    \ for help and exit() to get out.\n\nemcli>import login\nEnter password :  *********\n\
    \nemcli>\n```\n\n### 在脚本模式下建立登录\n\n要在脚本模式下建立登录，需要从正在执行的脚本内部导入模块。例如，以下脚本使用`EM CLI`函数打印企业管理器目标的总数。但首先，它需要通过导入`login`模块来建立登录，如清单\
    \ 3-10 所示：\n\n清单 3-10. 使用登录模块在脚本模式下建立登录\n\n```\nimport emcli\nimport login\n\n\
    mytargets = str(len(emcli.get_targets().out()['data']))\n\nprint(mytargets)\n\
    ```\n\n## 任务：获取目标列表\n\n查看和操作企业管理器目标是`EM CLI`最常见的用途。无论执行哪种操作，第一步都是检索目标信息。\n\n###\
    \ 检索所有目标信息\n\n`get_targets`动词或函数用于检索目标列表以及许多其他列的信息。检索完整信息列表时，该动词和函数都不需要参数，如清单\
    \ 3-11 所示。\n\n清单 3-11. 使用命令行模式检索目标信息\n\n```\n[oracle ~]$ emcli login -username=sysman\n\
    Enter password :\n\nLogin successful\n\n[oracle ~]$ emcli get_targets\nStatus\
    \  Status     Target Type     Target Name            ID\n1       Up         host\
    \            oem.example.com\n1       Up         oracle_emd      oem.example.com:3872\n\
    -9      n/a        oracle_home     common12c1_20_oem\n```\n\n### 筛选检索到的目标\n\n\
    可以通过指定以分号分隔的目标名称和目标类型列表（两者之间用冒号分隔）来筛选检索到的目标。目标列表筛选器中任何位置都不应有空格。清单 3-12 展示了创建包含两个目标的筛选器的示例。\n\
    \n清单 3-12. 使用`targets`参数限制`get_targets`检索的目标\n\n```\n[oracle ~]$ emcli get_targets\
    \ \\\n   -targets='oem.example.com:host;oms12c1_3_oem:oracle_home'\nStatus  Status\
    \     Target Type     Target Name            ID\n1       Up         host     \
    \       oem.example.com\n-9      n/a        oracle_home     oms12c1_3_oem\n```\n\
    \n### 在筛选器中使用通配符\n\n`targets`参数可以在目标名称或目标类型值中的任何位置使用通配符，并且对于任一值都可以使用多个通配符，如清单\
    \ 3-13 所示。\n\n清单 3-13. 在`targets`参数中使用通配符\n\n```\n[oracle ~]$ emcli get_targets\
    \ \\\n   -targets='oem%:host;oms12c1_%_oem:%oracle%'\nStatus  Status     Target\
    \ Type      Target Name           ID\n1       Up         host             oem.example.com\n\
    -9      n/a        oracle_home      oms12c1_3_oem\n```\n\n### 在交互和脚本模式下使用`get_targets`\n\
    \nPython 函数需要特定的格式：`函数名，后跟左括号，然后是逗号分隔的参数及其值列表，最后是右括号`。\n\n以下是典型 Python 函数的示例：\n\
    \n```\nfunction_name(parameter1=value1, parameter2=value2)\n```\n\n由于交互模式和脚本模式中的`EM\
    \ CLI`动词实际上是 Python 函数，因此它们也需要遵循此格式。\n\n调用没有额外参数的函数只需要动词和一对括号。清单 3-14 展示了在交互模式下不带参数使用`get_targets`函数的结果，而清单\
    \ 3-15 展示了在脚本模式下带`targets`参数的同一函数。\n\n清单 3-14. 在交互模式下不带参数调用`get_targets()`函数\n\
    \n```\n[oracle ~]$ emcli\nOracle Enterprise Manager 12c EMCLI with Scripting option\
    \ Version 12.1.0.3.0.\nCopyright (c) 1996, 2013 Oracle Corporation and/or its\
    \ affiliates. All rights reserved.\n\nType help() for help and exit() to get out.\n\
    \nemcli>import login\nEnter password :  *********\n\nemcli>get_targets()\nStatus\
    \  Status     Target Type      Target Name\n          ID\n1       Up         host\
    \             oem.example.com\n1       Up         oracle_emd       oem.example.com:3872\n\
    -9      n/a        oracle_home      common12c1_20_oem\n```\n\n清单 3-15. 在脚本模式下带`targets`参数调用`get_targets()`函数\n\
    \n```\n[oracle ~]$ cat targets2.py\nimport emcli\nimport login\n\nmytargets =\
    \ emcli.get_targets \\\n    (targets='oraoem1%:%;oms12c1_%_oraoem1:%oracle%')\
    \ \\\n    .out()['data']\n\nfor targ in mytargets:\n    print('Target: ' + targ['Target\
    \ Name'])\n\n[oracle ~]$ emcli @targets2.py\nTarget: oraoem1.example.com\nTarget:\
    \ oraoem1.example.com:3872\nTarget: oms12c1_3_oraoem1\n```\n\n## 任务：使用停机维护\n\n\
    尝试安排停机维护时间以配合目标主机上的维护任务可能会导致误报警。当停机维护在维护活动开始前结束，或者维护活动在停机维护开始前启动时，就可能发生这种情况。通过让维护作业本身启动和停止停机维护，可以避免这两种情况。\n\
    \n`EMCTL`和`EM CLI`都能够创建、删除、启动和停止停机维护。然而，`EMCTL`只能管理执行它的代理主机本地的目标的停机维护，并且只有在代理运行时`EMCTL`命令才有效。使用`EMCTL`设置停机维护的限制性很强且容易出错。建议使用`EM\
    \ CLI`从维护作业中设置停机维护。\n"
- fmt: "It is usually not necessary to use scripting mode for blackout activities\
    \ since most maintenance scripts run in a shell script. The `create_blackout`\
    \ verb requires four arguments: `name`, `add_targets`, `schedule` and `reason`.\
    \ The job is identified by the `name` parameter, which means it must be unique\
    \ to all other jobs in EM. [Listing 3-16](#9781484202395_Ch03.xhtml#list16) shows\
    \ an example of using EM CLI in command-line mode to set a blackout called “Blackout1”\
    \ for the “`em12cr3.example.com`” host. This blackout will not repeat and will\
    \ last for three hours or until it is stopped. The reason the blackout has been\
    \ set is for “Testing.”\n\n[Listing 3-16](#9781484202395_Ch03.xhtml#_list16).\
    \ Set a blackout called “Blackout1” for the “`em12cr3.example.com`” host\n\n```\n\
    [oracle ~]$ emcli create_blackout -name='Blackout1' \\\n-add_targets='em12cr3.example.com:host'\
    \ \\\n-schedule='frequency:once;duration:3' \\\n-reason='Testing'\n```\n\nThe\
    \ `get_blackouts` verb will show the details of all of the blackouts that are\
    \ currently defined, as shown in [Listing 3-17](#9781484202395_Ch03.xhtml#list17).\n\
    \n[Listing 3-17](#9781484202395_Ch03.xhtml#_list17). List all blackouts\n\n```\n\
    [oracle ~]$ emcli get_blackouts\nName       Created By  Status     Status ID \
    \ Next Start            Duration  Reason   Frequency  \nBlackout1  SYSMAN    \
    \  Scheduled  0          2435-07-24  17:17:56  03:00     Testing  once  \nRepeat\
    \ Start Time            End Time             Previous  End  TZ Region        TZ\
    \ Offset\nnone   2000-07-24  17:17:56  2000-07-24  20:17:56  none          America/Chicago\
    \  +00:00\n```\n\nThe following example uses the `noheader` and `script` parameters\
    \ to change the output of `get_blackouts` to be easily parsed. Piping the output\
    \ to the `cut` command displays only the first field, which is the blackout name\
    \ field.\n\n```\n[oracle ~]$ emcli get_blackouts -noheader -script | cut -f1\n\
    Blackout1\n```\n\nThe blackout job details can be queried with the `get_blackout_details`\
    \ verb. The output includes a header and is tab delimited. If the output lines\
    \ are longer than the screen width, they are wrapped to the next line, as shown\
    \ in [Listing 3-18](#9781484202395_Ch03.xhtml#list18).\n\n[Listing 3-18](#9781484202395_Ch03.xhtml#_list18).\
    \ List the details of the “Blackout1” blackout\n\n```\n[oracle ~]$ emcli get_blackout_details\
    \ -name='Blackout1'\nStatus   Status ID  Run Jobs  Next Start            Duration\
    \  Reason   Frequency  Repeat  Days\nStarted  4          no        2014-04-12\
    \  13:37:28  03:00     Testing  once       none    none\nMonths Start Time   \
    \         End Time              TZ Region        TZ Offset\nnone   2014-04-12\
    \  13:37:28  2014-04-12  16:37:28  America/Chicago  +00:00\n```\n\nThe format\
    \ above is hard to read and even harder to parse. Instead, the output could be\
    \ changed to a comma-delimited format, the header removed, and the output limited\
    \ only to the columns we need, as shown in [Listing 3-19](#9781484202395_Ch03.xhtml#list19).\n\
    \n[Listing 3-19](#9781484202395_Ch03.xhtml#_list19). List the details of the “Blackout1”\
    \ blackout in a format that is easier to parse\n\n```\n[oracle ~]$ emcli get_blackout_details\
    \ \\\n-name='Blackout1' -noheader -format=\"name:csv\"\nStarted,4,no,2014-04-12\
    \ 13:37:28,03:00,Testing,once,none,none,none,2014-04-12 13:37:28,2014-04-12 16:37:28,America/Chicago,+00:00\n\
    ```\n\nOnce the output can be parsed, we can just test for the value we are looking\
    \ for by adding the commands to a shell script, creating the “Blackout1” target,\
    \ as shown in [Listing 3-20](#9781484202395_Ch03.xhtml#list20).\n\n[Listing 3-20](#9781484202395_Ch03.xhtml#_list20).\
    \ Create a blackout in a script and test the exit value\n\n```\nemcli create_blackout\
    \ -name='Blackout1' -add_targets='em12cr3.example.com:host' -schedule='frequency:once;duration:3'\
    \ -reason='Testing'\n\nMYSTATUS=$(emcli get_blackout_details -name='Blackout1'\
    \ \\\n-noheader -format='name:csv' | cut -d ',' -f 1)\n\nif [ \"$MYSTATUS\" <>\
    \ \"Started\" ]; then\necho 'Blackout not started'\n        exit 1\nfi\n\n<Maintenance\
    \ Script>\n```\n\nBy using the above in your scripts, you would notice that after\
    \ multiple runs it would sometimes fail and sometimes succeed. This behavior happens\
    \ because the `create_blackout` EM CLI verb creates but does not start the job.\
    \ The job is started by another process, so there is a chance that the blackout\
    \ has not started by the time the `if` statement that checks the status of the\
    \ job has executed, and thus the script will fail. A solution is to use additional\
    \ shell scripting, which will either wait for the job to start before proceeding\
    \ to the rest of the script or will fail because the job stayed in “Scheduled”\
    \ mode for too long, as shown in [Listing 3-21](#9781484202395_Ch03.xhtml#list21).\n\
    \n[Listing 3-21](#9781484202395_Ch03.xhtml#_list21). Additional shell scripting\
    \ added to make events sequential\n\n```\nMYSTATUS='Scheduled'\nSTATCOUNT=6\n\n\
    while [ \"$MYSTATUS\" == \"Scheduled\" ]; do\n        if [ $STATCOUNT -lt 1 ];\
    \ then\n            echo \"Blackout1 stuck in scheduled status\"\n           \
    \     exit 1\n        fi\n\n        let STATCOUNT-=1\n        sleep 5\n      \
    \  MYSTATUS=$(emcli get_blackout_details -name='Blackout1' \\\n              \
    \  -noheader -format='name:csv' | cut -d ',' -f 1)\ndone\n\nif [ \"$MYSTATUS\"\
    \ != \"Started\" ]; then\n        echo 'Blackout Blackout1 not started'\n    \
    \    exit 1\nfi\n\n<Maintenance Script>\n```\n\nWhen maintenance is completed,\
    \ the same script can use EM CLI commands to both close and delete the blackout:\n\
    \n```\nemcli stop_blackout -name='Blackout1'\nemcli delete_blackout -name='Blackout1'\n\
    ```\n\n## Task: Create Targets\n\nAdding targets can be painful if EM doesn’t\
    \ auto-discover them. This is especially true if the targets are using non-default\
    \ settings, which sometimes make them hard for the agent to detect. Fortunately,\
    \ EM CLI is able to add targets with much more flexibility than EM.\n\nWhich parameters\
    \ need to be specified greatly depends on the target type being added. For example,\
    \ when adding a database, the `properties` parameter needs to include:\n\n*  \
    \ `SID`\n*   `Port`\n*   `OracleHome`\n*   `MachineName`\n\nThe credentials for\
    \ a database are almost always going to be for the “dbsnmp” user unless they are\
    \ for a standby database that is not open and therefore requires a privileged\
    \ password file account. [Listing 3-22](#9781484202395_Ch03.xhtml#list22) shows\
    \ an example of adding a target through EM CLI command-line mode.\n\n[Listing\
    \ 3-22](#9781484202395_Ch03.xhtml#_list22). Add the “orcl” single-instance database\
    \ target\n\n```\n[oracle ~]$ emcli add_target -name='ORCL_DB' \\\n-type='oracle_database'\
    \ -host='oradb1.example.com' \\\n-properties='SID:orcl;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;MachineName:oradb1-vip.example.com'\
    \ \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\nTarget \"\
    ORCL_DB:oracle_database\" added successfully\n```\n\nIf we want to add an RAC\
    \ database target, the individual instances of the cluster need to be added first,\
    \ as shown in [Listings 3-23](#9781484202395_Ch03.xhtml#list23) and [3-24](#9781484202395_Ch03.xhtml#list24).\n\
    \n[Listing 3-23](#9781484202395_Ch03.xhtml#_list23). Add RAC database node one\n\
    \n```\n[oracle ~]$ emcli add_target -name='ORCL1_ORCL_RACCLUSTER' \\\n-type='oracle_database'\
    \ -host='oradb1.example.com' \\\n-properties='SID:orclrac1;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;MachineName:oradb1-vip.example.com'\
    \ \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\nTarget \"\
    ORCL1_ORCL_RACCLUSTER:oracle_database\" added successfully\n```\n\n[Listing 3-24](#9781484202395_Ch03.xhtml#_list24).\
    \ Add RAC database node two\n\n```\n[oracle ~]$ emcli add_target -name='ORCL2_ORCL_RACCLUSTER'\
    \ \\\n-type='oracle_database' -host='oradb2.example.com' \\\n-properties='SID:orclrac2;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;MachineName:oradb2-vip.example.com'\
    \ \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\nTarget \"\
    ORCL2_ORCL_RACCLUSTER:oracle_database\" added successfully\n```"
