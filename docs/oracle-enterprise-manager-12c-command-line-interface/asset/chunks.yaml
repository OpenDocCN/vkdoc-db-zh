    deleted successfully\n>User \"e123451\"created successfully\n...\n```\n\nIt’s\
    \ fast and efficient because all of the commands are issued to the OMS in one\
    \ CLI session, reducing the overhead of sending each command to the OMS for processing\
    \ as a separate transaction.\n\nCloning OEM Roles and Users Between OMS Instances\n\
    \nSandbox OEM servers are part of a well-designed OEM environment, but copying\
    \ EM security data from one repository to another can be difficult without EM\
    \ CLI. This example combines SQL*Plus and EM CLI to gather data from the existing\
    \ environment and then reproduce it in the sandbox quickly and completely.\n\n\
    First, we’ll create three spool files from queries against the SYSMAN schema in\
    \ the existing OEM repository database. Those spool files will become the EM CLI\
    \ argfiles we’ll use to build the roles, users, and grants.\n\nThe SYSMAN schema\
    \ in the repository database contains all the information gathered or set by OEM.\
    \ When the EM agents upload their latest metrics to the management server, the\
    \ values are posted to tables in the SYSMAN schema. Whenever you request a page\
    \ in the console it is populated from data in SYSMAN.\n\n```\n#!/bin/bash# =====================================================\n\
    #  File:        clone_em_users.sh\n#  Purpose:     Copy OEM roles and user account\
    \ between instances\n#  Parameters : None\n# =====================================================\n\
    ARGFILE01=/tmp/argfile_create_roles.txt\nARGFILE02=/tmp/argfile_create_users.txt\n\
    ARGFILE03=/tmp/argfile_grant_roles.txt\n\nsqlplus -S ${SYSMAN_CONNECT} <<EOF 1>/dev/null\n\
    SET ECHO OFF\nSET FEEDBACK OFF HEADING OFF LINES 250 PAGES 999\n\nSPOOL ${ARGFILE01}\n\
    \nSELECT 'create_role -name=\"' || role_name || '\" -description=\"' || description\
    \ || '\"'\nFROM     sysman.gc_roles\nWHERE  role_type= '1';\n\nSPOOL OFF\n\nSPOOL\
    \ ${ARGFILE02}\n\nSELECT   'create_user -name=\"' || user_name || '\" -description=\"\
    ' || user_description || '\" -password='||oracle||\n\"  -expired=\"||true||'\"\
    '\nFROM    sysman.gc_users\nWHERE  user_name NOT IN ('SYSMAN')\nORDER BY user_name;\n\
    \nSPOOL OFF\n\nSPOOL ${ARGFILE03}\n\nSELECT 'grant_roles -name=\"' || user_name\
    \ || '\" -roles=\"' || role_name || '\"'\nFROM     sysman.gc_user_roles;\n\nSPOOL\
    \ OFF\nexit\nEOF\n\nemcli login -user=sysman -pass=${CONSOLE_PWD}\nemcli -argfile\
    \ ${ARGFILE01}\nemcli -argfile ${ARGFILE02}\nemcli -argfile ${ARGFILE03}\n```\n\
    \nChanging EM Administrator References\n\nAs we mentioned in the previous section,\
    \ all of the information you create through OEM is stored in the repository database.\
    \ User data for OEM accounts is stored in the `sysman.mgmt_created_users` table.\
    \ You should never directly change data in the repository, of course, but you\
    \ may use it as reference data.\n\nUpdating an individual administrator is simple\
    \ and straightforward through the EM console. However, what if the name of department\
    \ changed or a group of administrators changed locations?\n\nYou could create\
    \ a short script to change the references when everyone in department 200 gets\
    \ assigned to department 500 by gathering a list of employees in department 200\
    \ into a spool file and then rolling through each line in the spool file to create\
    \ `modify_user` statements for each one. The script consists of a combination\
    \ of SQL and EM CLI commands. Right now there are no CLI verbs to gather this\
    \ information directly, so we’ll pull it from the repository.\n\nMany of the error-checking\
    \ routines typical when prompting for user input have been removed for clarity:\
    \ Did the user provide answers? Were the department numbers entered in upper or\
    \ lower case? Are they valid numbers? Scalable and reliable scripts must always\
    \ include those verifications.\n\n```\n#!/bin/bash\n# ===============================================================\n\
    #  File:        change_admin_depts.sh\n#  Purpose:     Change department number\
    \ references for EM admins\n#  Parameters:  None\n# ===============================================================\n\
    read OLD_DEPT?\"Enter the old department number:  \"\nread NEW_DEPT?\"Now enter\
    \ the new department number: \"\n\nsqlplus <Connect String><<EOF\nSET echo OFF\n\
    SET heading OFF feedback OFF page 999\nspool old_department.lst\nSELECT user_name\n\
    FROM     sysman.mgmt_created_users\nWHERE  department = '${OLD_DEPT}';\nspool\
    \ off\nexit\nEOF\n\ntouch myARGFILE.lst\n\nfor thisUSER in `cat old_department.lst`;\
    \ do\n        echo \"modify_user -name=\"${thisUSER}\"-department=\"${NEW_DEPT}\"\
    >>myARGILE.lst\ndone\n\nemcli argfile myARGFILE.lst\n\necho \"\\n\\nDepartment\
    \ settings after the change:\\n\"\nsqlplus <Connect String><<EOF\nSET echo OFF\n\
    SET heading ON pages 999\nSELECT user_name,\n       department\nFROM   sysman.mgmt_created_users\n\
    ORDER BY user_name;\nexit\nEOF\n[ old_department.lst ] && rm –f old.department.lst\n\
    [ myARGFILE.lst ] && rm –f myARGFILE.lst\n```\n\nThe last two steps clean up the\
    \ temporary files created at run-time. Every shell script should clean up after\
    \ itself. The syntax above checks for the existence of the file and removes it\
    \ when one is found. You could also build a simple `if` statement if you choose.\n\
    \nShell Getopts Command\n\nIn addition to `getopts` (plural), Linux has a `getopt`\
    \ (singular) command. This discussion is about `getopts`. This is a shell utility,\
    \ not an EM CLI verb. The previous example prompted the user for two department\
    \ numbers, which is fine for interactive scripts but isn’t scalable for scheduled\
    \ jobs. You could use positional parameters at the command line, like this:\n\n\
    ```\nif [ $1 ]; then\nexport OLD_DEPT=${1}\nelse\nread OLD_DEPT?\"Enter the old\
    \ department number:  \"\nfi\n\nif [ $2 ]; then\n        export NEW_DEPT=${1}\n\
    else\nread NEW_DEPT?\"Enter the new department number:  \"\nfi\n\nif [[ ${OLD_DEPT}\
    \ == ${NEW_DEPT} ]]; then\n        echo \"The values for the old and new departments\
    \ are the same\"\n        < Error handling >\nfi\n```\n\nThis approach relies\
    \ on user inputs being presented in the correct order. In the current example,\
    \ the first input value corresponds to the old department and the second to the\
    \ new department. What if they aren’t in the right order, however? The `getopts`\
    \ command allows you to use input flags to avoid this problem."
