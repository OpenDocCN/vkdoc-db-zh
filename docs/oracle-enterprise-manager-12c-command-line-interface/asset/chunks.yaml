- fmt: "Nearly all of the scripts in this section require one or more input variables\
    \ at the command line, often simply the target name. Variables passed at the command\
    \ line are represented in the body of the script in the order they appear on the\
    \ command line. The executable file is represented as `$0`, the first string after\
    \ that is `$1`, and so forth. For example, you could have an entry like this:\n\
    \n```\n./oem_target_blackout.sh orcla\n```\n\nThis example translates variable\
    \ `$0` as the script name for `oem_target_blackout.sh` and `$1` for the database\
    \ name. The logic within the scripts should verify that required command-line\
    \ inputs are not null or that they exit with a clear error statement telling the\
    \ user or the log file what went wrong. You’ll see several examples of this technique\
    \ in the sample scripts.\n\n## Evidence of Life\n\nEvery shell script you develop\
    \ should be executable at the command line for testing one-off runs, and should\
    \ also be executable through a scheduler like Cron without any modification. Resist\
    \ the temptation to use two versions of the same script to enable both modes of\
    \ operation. This can turn into a maintenance nightmare as the complexity of your\
    \ environment grows. Instead, test for a live user session by looking at the nature\
    \ of the session that is calling the script. At run-time, a file system entry\
    \ for each terminal session will be made in the `/dev` directory for each live\
    \ user connection. TTY is an old term for **T**ele**t**ype Session—your terminal\
    \ session. Cronned executions aren’t called from a terminal, of course, so there\
    \ is no `/dev/tty` associated with those executions.\n\nTest for the existence\
    \ of a TTY session with an `if` statement and set your runtime variables accordingly.\
    \ For instance, if your script requires that the database name be passed on the\
    \ command line, you will respond to missing inputs differently for an attended\
    \ session than you would for a cronned/scheduled session:\n\n```\nif [ ${1} -eq\
    \ 0 ]; then\n  if tty -s; then\n      read -p \"Please provide the name of the\
    \ database: \" thisSID\n  else\n      echo \"The database name was not provided\
    \ on the command line\"  >>runtime.log\n      exit\n   fi\nfi\n```\n\nThis type\
    \ of session checking was removed from the example scripts for clarity.\n\n##\
    \ Sample Function Library\n\nThis function library is sourced by many of the shell\
    \ scripts found in the remainder of this section. It can also be sourced for immediate\
    \ use in a terminal session, or sourced for use in any other shell script.\n\n\
    ```\nSample Script: emcli_functions.lib\n#!/bin/sh\n#/* vim: set filetype=sh :\
    \ */\n# ==============================================================================\n\
    #  File:          emcli_functions.lib\n#  Purpose:   Shell script functions for\
    \ common emcli tasks\n#  File permission: This file is sourced and never executed\n\
    #  Echo statements: Formatting for echoed statements has been removed for this\n\
    #                              scripting sample to keep the logic clear. Be kind\
    \ to your\n#                             users and add white space liberally in\
    \ your own copy\n# ==============================================================================\n\
    # The SysmanPassword variable is used in a single place to call your proprietary\n\
    # password encryption solution, or in a single location to record the SYSMAN\n\
    # password for use in your scripts and within the functions in this library.\n\
    # It is strongly recommended that you implement a more secure solution such as\
    \ encryption/decryption\n# through Java or another tool\n# ------------------------------------------------------------------------------\n\
    \nSysmanPassword=Sup3r_S3cr3t_PASSWORD\n\n# ==============================================================================\n\
    #  General Functions\n# ==============================================================================\n\
    \nfunction CleanUpFiles {\n# --------------------------------------------------------------------------------------------------\n\
    # CleanUpFiles is called at the beginning of every script to ensure that older\n\
    # copies of temporary workfiles are removed to start fresh\n# CleanUpFiles is\
    \ also called by the ExitCleanly function to clean up the\n# --------------------------------------------------------------------------------------------------\n\
    # files when script execution is complete\n# ..............................................................................\n\
    \n[ $WORKFILE ] && rm -f ${WORKFILE}\n[ $WORKFILE01 ] && rm -f ${WORKFILE01}\n\
    [ $WORKFILE02 ] && rm -f ${WORKFILE02}\n}\n\nfunction ExitCleanly {\n# --------------------------------------------------------------------------------------------------\n\
    # ExitCleanly is called whenever a script is instructed to exit, whether the\n\
    # script ended in success or failure. A clean server is a happy server\n# --------------------------------------------------------------------------------------------------\n\
    \necho \"Ending emcli session ...\"\nemcli logout\nCleanUpFiles\necho \"\"\nexit\
    \ 0\n}\n\nfunction GetAgentNames {\n# --------------------------------------------------------------------------------------------------\n\
    # As it says in the echo statement, GetAgentNames can be used to list all\n# targets\
    \ of the oracle_emd target type known to OEM\n# --------------------------------------------------------------------------------------------------\n\
    \nemcli login -user=sysman -pass=\"${SysmanPassword}\"\necho \"Getting the names\
    \ of all EM agents from OMS ...\"\nemcli get_targets | grep oracle_emd | sort\
    \ -u | awk '{ print $4 }'\n}\n\nfunction GetTargetName {\n# --------------------------------------------------------------------------------------------------\n\
    # This function should be used by any script or function to find\n# the exact\
    \ of a database. If the database isn't known to OEM it returns a\n# clear failure\
    \ message.\n# You could easily adapt GetTargetName to find host or agent names\n\
    # --------------------------------------------------------------------------------------------------\n\
    # Calling script must pass the database name as variable thisSID\n# --------------------------------------------------------------------------------------------------\n\
    \nemcli login -user=sysman -pass=\"${SysmanPassword}\"\necho \"Getting the exact\
    \ target name for $thisSID from OMS ...\"\nif [ `emcli get_targets -targets=\"\
    oracle_database\" | grep -i ${thisSID} | wc -l` -gt 0 ]; then\n   thisTARGET=`emcli\
    \ get_targets -targets=\"oracle_database\" -format=\"name:csv\" \\\n         \
    \     | grep -i ${thisSID} | cut -d, -f4`\n   echo \"\\t${thisTARGET}\"\nelse\n\
    \   echo \"Sorry, ${thisSID} database is not in the OEM repository\"\n   ExitCleanly\n\
    fi\n}\n\n# ==============================================================================\n\
    #  Blackout Functions\n# ==============================================================================\n\
    \nfunction CreateBlackout {\n# --------------------------------------------------------------------------------------------------\n\
    # This function was illustrated in Chapter 5 as a method of creating a six-hour\n\
    # long blackout on a database target. Adapt the timezone for your environment.\n\
    # Consider writing a similar function of entire hosts or an oracle_sys target\n\
    # --------------------------------------------------------------------------------------------------\n\
    # Calling script must provide a name for the blackout as BO_NAME and the\n# database\
    \ target name as thisSID\n# --------------------------------------------------------------------------------------------------\n\
    \nGetTargetName\n\necho \"Creating blackout named '${BO_NAME}' ...\"\n\nif [ `emcli\
    \ get_blackouts | grep ${BO_NAME} | wc -l` -gt 0 ]; then\n   echo \"Found an existing\
    \ blackout named ${BO_NAME}\"\n   echo \"That blackout will be stopped and deleted\
    \ prior to starting the new one\"\n   emcli stop_blackout -name=\"${BO_NAME}\"\
    \n   emcli delete_blackout -name=\"${BO_NAME}\"\nfi\n```"
