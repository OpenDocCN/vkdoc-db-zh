  trans: "\n我们可能不会在首先了解目标名称及其当前定义属性之前，就贸然更改目标属性。清单 6-23 中的 `show()` 函数允许我们查看这些信息，并以一种比\
    \ JSON 或 Python 字典更易读的格式进行打印。\n\n清单 6-23。`updateProps()` 类的 `show()` 函数可预览实例目标列表及其当前已分配的属性\n\
    \n```\ndef show(self):\n    print('%-5s%-40s%s' % (\n          ' ', 'TARGET_TYPE'.ljust(40,\
    \ '.'),\n          'TARGET_NAME'))\n    print('%-15s%-30s%s\\n%s\\n' % (\n   \
    \       ' ', 'PROPERTY_NAME'.ljust(30, '.'),\n          'PROPERTY_VALUE', '='\
    \ * 80))\n    for __inttarg in self.targssort:\n        print('%-5s%-40s%s' %\
    \ (\n              ' ', __inttarg['TARGET_TYPE'].ljust(40, '.'),\n           \
    \   __inttarg['TARGET_NAME']))\n        self.__showprops(__inttarg['TARGET_GUID'])\n\
    \        print('')\n```\n\n清单 6-24 中展示的 `__showprops()` 函数从 `show()` 函数中以递归方式调用，以检索为目标定义的每个属性。换句话说，`__showprops()`\
    \ 函数为实例定义的每个目标调用一次，而为目标定义的属性则作为子记录与其一起存储。\n\n清单 6-24。调用 `updateProps()` 类的 `__showprops()`\
    \ 函数以检索实例中定义的每个目标的属性\n\n```\ndef __showprops(self, guid):\n    self.__loadtargobjects()\n\
    \    for __inttargprops in self.targprops:\n        __intpropname = \\\n     \
    \     __inttargprops['PROPERTY_NAME'].split('_')\n        if __inttargprops['TARGET_GUID']\
    \ == guid and \\\n           __intpropname[0:2] == ['orcl', 'gtp']:\n        \
    \    print('%-15s%-30s%s' %\n                  (' ', ' '.join(__intpropname[2:]).ljust(\n\
    \                   30, '.'),\n                   __inttargprops['PROPERTY_VALUE']))\n\
    ```\n\n最后，清单 6-25 展示了 `setprops()` 函数，调用此函数来实现神奇的效果。在调用此函数时，过滤后的目标列表已经定义完成，并且\
    \ `propdict` 字典变量也已填充了将为过滤后目标列表设置的属性名称-值对。\n\n清单 6-25。调用 `updateProps()` 类的 `setprops()`\
    \ 函数以应用属性更新\n\n```\ndef setprops(self, show=False):\n    assert len(self.propdict)\
    \ > 0, \\\n           'The propdict parameter must contain ' + \\\n          \
    \ 'at least one property. Use the ' + \\\n           'props() function to modify.'\n\
    \    self.reloadtargs = True\n    __delim = '@#&@#&&'\n    __subseparator = 'property_records='\
    \ + __delim\n    for __inttarg in self.targs:\n        for __propkey, __propvalue\
    \ \\\n            in self.propdict.items():\n            __property_records =\
    \ __inttarg['TARGET_NAME'] + \\\n              __delim + __inttarg['TARGET_TYPE']\
    \ + \\\n              __delim + __propkey + __delim + __propvalue\n          \
    \  print('Target: ' + __inttarg['TARGET_NAME'] +\n                  ' (' + __inttarg['TARGET_TYPE']\
    \ +\n                  ')\\n\\tProperty: '\n                  + __propkey + '\\\
    n\\tValue: ' +\n                  __propvalue + '\\n')\n            emcli.set_target_property_value(\n\
    \              subseparator=__subseparator,\n              property_records=__property_records)\n\
    \    if show == True:\n        self.show()\n```\n\n`assert` 语句执行一些错误检查，以确保 `propdict`\
    \ 变量中至少有一个要设置到目标列表上的属性名称-值对。`self.reloadtargs = True` 通知实例，在设置新的目标属性后，应从数据库中重新查询目标和属性信息。`__delim\
    \ = '@#&@#&&'` 是一组不应出现在目标或属性名称中的字符，在 `emcli.set_target_property_value()` 函数中用作分隔符。`__subseparator\
    \ = 'property_records=' + __delim` 也用于格式化。\n\n第一个 `for` 循环遍历过滤后的目标列表。第二个 `for`\
    \ 循环遍历 `propdict` 变体。在第二个嵌套的 `for` 循环内部是 `emcli.set_target_property_value()` 函数，该函数实际在每个目标上设置属性。此\
    \ `set_target_property_value()` 函数针对每个目标的每个属性执行一次，因此该函数的总执行次数将是过滤后目标列表中的记录数乘以\
    \ `propdict` 中的属性名称-值对的数量。随着每个属性被设置，结果会打印到屏幕上。\n\n在 Python 中使用类需要前期投入一点额外的时间和精力，但这是非常值得的。你辛苦创建的代码是可扩展、可扩展和可重用的。你可以重用从任何创建的类中得到的代码，而不必担心需要再次测试它们。\n\
    \n## 总结\n\nEnterprise Manager 确实是一个强大的工具。牢固掌握其图形界面的功能对于有效使用它至关重要。EM CLI 极大地增强了利用\
    \ EM 所有强大功能的能力。EM CLI 并非最容易学习的工具，但能够通过它编写脚本和自动化活动，为管理员提供了明显的优势。\n\nPython 是一种强大的编程语言，其成熟度在过去\
    \ 20 多年中得到了验证。EM CLI 是用 Jython 编写的，它是 Python 的 Java 实现。Jython 允许管理员通过结合 Python\
    \ 的强大功能和灵活性以及 EM CLI，来提高他们的 EM 效率。\n\n任何命令行工具的学习曲线都很高，但 Python 语言和 EM CLI 都相当直观。如果你在语法或功能上遇到困难，有大量且易于获得的帮助。本章给出的示例是在真实生产环境中因实际需要而创建的，因为在那些环境中通过\
    \ GUI 执行这些任务是不可行的。\n\n作为读者，你将面临的真实环境可能与此处的不同，但本章演示的原则和大部分代码都可以用来为 Enterprise 管理员创建有效且高效的解决方案。\n\
    \n# 第 7 章\n\n![image](img/frontdot.jpg)\n\n## 使用软件库和 Oracle 可扩展性交换中心\n\n### OEM\
    \ 软件库\n\n创建软件库可确保所有置备、打补丁和脚本编写实体都存储在 OEM 仓库可用的位置；这为 IT 基础架构节省了资源和成本。这个概念看起来足够简单，但通常当你进入一个\
    \ IT 组织时，会发现安装介质、补丁位置等有多个来源。拥有一个在 EM12c 环境中配置且大小合适（小型环境至少 100 GB，大型和 HA/MAA [高可用性/最高可用性架构]\
    \ 环境至少 250 GB）的中央软件库，可确保在 OEM 系统的生命周期内支持置备、打补丁和脚本编写。\n\n中央软件库的额外好处是减少了重复性任务，例如下载软件或重新创建有价值的脚本、部署过程和其他\
    \ Enterprise Manager 实体。\n\n软件库\n"
- fmt: 'EM12c 提供了一个有价值的功能：`OEM` 软件库。在您能够使用和管理员软件库之前，必须配置共享存储位置。这需要一个可引用的存储库，该存储库位于共享文件存储中，可以是
    `OMS` 共享文件系统，也可以是 `OMS` 所在主机上的 `OMS` 代理文件位置。


    在规划软件库存储设计时，请考虑 `OMS` 环境设计。如果存在多个 `OMS` 实例，那么共享或挂载路径将是最佳选择。根据决策不同，软件库存储的配置会略有差异。


    ## 设置软件库存储


    可以通过两种路径实现此设置：从“配置（`Setup`）”菜单中的“置备和修补（`Provisioning and Patching`）”选项，或者从左侧选项“云控制（`Cloud
    Control`）”。无需云控制插件，即可在 `EM12c` 控制台中访问图 7-1 所示的界面，方法是点击 `Setup`、`Provisioning and
    Patching`，然后点击 `Software Library`。


    ![`Images/9781484202395_Fig07-01.jpg`](Images/9781484202395_Fig07-01.jpg)


    **图 7-1** 访问软件库的“设置（`Setup`）”菜单下拉列表


    进入此向导后，您可以选择查看 `OMS` 共享文件系统或 `OMS` 代理文件系统。截至 12.1.0.3 版本，`Oracle` 建议如果要在代理主机之间共享脚本，应优先选择后者。但在图
    7-1 的示例中，我们将使用 `OMS` 共享文件系统作为脚本存储库。


    请确保选择的任何位置作为软件库存储位置时，有足够的空间容纳所有当前和未来的实体，包括未来的补丁和安装，以缓解管理挑战。本章前面提供了软件库大小调整的最低指南；在选择位置时请牢记这些指南，以免以后需要辅助存储库。


    您可以根据 `OMS` 配置的需要添加任意多个文件位置和引用文件位置（图 7-2）。引用文件位置指的是位于代理主机上的文件，并且通过软件库是只读位置。


    ![`Images/9781484202395_Fig07-02.jpg`](Images/9781484202395_Fig07-02.jpg)


    **图 7-2** `EM12c` 软件库界面，显示现有的 `OMS` 共享文件系统


    对于多 `OMS` 环境，您应该在非本地的共享文件系统中配置软件库，以便任何 `OMS` 环境都可以访问它。


    对于 `OMS` 代理文件系统，代理只需要能够访问 `OMS` 主机。此配置需要在设置代理文件系统之前设置命名或首选凭据以确保成功。在设置 `OMS` 代理文件系统时有一个选项可以创建首选凭据，但在某些
    `Release 2` 版本中报告了失败。因此，我建议在尝试代理文件系统设置之前配置好首选凭据。


    在软件库配置界面中点击“添加（`Add`）”按钮后，将出现图 7-3 所示的屏幕：


    ![`Images/9781484202395_Fig07-03.jpg`](Images/9781484202395_Fig07-03.jpg)


    **图 7-3** 创建一个用于软件库的共享文件系统


    可以为任何 `OMS` 文件系统位置提供一个别名，然后输入共享文件系统的路径。图 7-3 显示了一个 `Windows OMS` 主机；路径显示的是驱动器盘符分配，而不是我们在
    `Unix/Linux` 环境中会使用的卷标条目。一旦对提供的信息满意，管理员点击“确定（`OK`）”，共享文件系统即被创建。


    要使用 `EM CLI` 创建一个新的软件库位置，您可以执行以下操作：'
  raw: 'EM12c offers a valuable feature: the OEM software library. The shared storage
    location must be configured before you’re able to utilize and administer the software
    library. This requires a repository that can be referenced and is located in shared
    file storage, either an OMS shared file system or an OMS agent file location on
    the host where the OMS resides.


    When planning the design of the software library storage, consider the OMS environment
    design. If multiple OMS instances exist, then a shared or mounted path would be
    the best option. Depending on the decision, the configuration will be slightly
    different for the software library storage setup.


    Setting Up Software Library Storage


    There are two paths by which this can be achieved, either from the Setup menu
    for Provisioning and Patching or from the left option, Cloud Control. The interface
    shown in [Figure 7-1](#9781484202395_Ch07.xhtml#Fig1) can be accessed in the EM12c
    console without the Cloud Control plugin by clicking on Setup, Provisioning and
    Patching, then on Software Library.


    ![9781484202395_Fig07-01.jpg](Images/9781484202395_Fig07-01.jpg)


    [Figure 7-1](#9781484202395_Ch07.xhtml#_Fig1). The Setup menu dropdown to access
    the software library


    Once in this wizard, you have the option to view either OMS shared file systems
    or OMS agent file systems. As of 12.1.0.3, Oracle recommends that if scripts are
    to be shared among agent hosts the latter is preferable, but for our example in
    [Figure 7-1](#9781484202395_Ch07.xhtml#Fig1), we are going to use an OMS shared
    file system for the script repository.


    Ensure that any location chosen to become a software library storage location
    has enough space to retain all current and future entities, including future patches
    and installations to ease management challenges. Minimum guidelines for sizing
    the software library were offered earlier in this chapter; keep these in mind
    as you choose the location so that a secondary repository isn’t required later
    on.


    You can add as many file locations and referenced file locations as required for
    your OMS configuration ([Figure 7-2](#9781484202395_Ch07.xhtml#Fig2)). Referenced
    file locations refer to files located on agent hosts and are a read-only location
    via the software library.


    ![9781484202395_Fig07-02.jpg](Images/9781484202395_Fig07-02.jpg)


    [Figure 7-2](#9781484202395_Ch07.xhtml#_Fig2). The EM12c software library interface,
    displaying an existing OMS shared file system


    For multiple OMS environments, you should configure the software library in a
    non-local shared file system so it will be accessible to any of the OMS environments.


    For the OMS agent file system, the agent simply requires access to the OMS host.
    This configuration requires a named or preferred credential setup prior to setup
    of the agent file system to ensure success. There is an option to create the preferred
    credential at the time of the OMS agent file system setup, but failure has been
    reported in some Release 2 versions. For this reason, I recommend having the preferred
    credentials configured before attempting the agent file system setup.


    Once you have clicked the Add button in the software library configuration interface,
    the screen in [Figure 7-3](#9781484202395_Ch07.xhtml#Fig3) will appear:


    ![9781484202395_Fig07-03.jpg](Images/9781484202395_Fig07-03.jpg)


    [Figure 7-3](#9781484202395_Ch07.xhtml#_Fig3). Creating a shared file system to
    be used with the software library


    An alias can be provided for any OMS file system for the location, and then the
    path for the shared file system is entered. [Figure 7-3](#9781484202395_Ch07.xhtml#Fig3)
    shows a Windows OMS host; the path is showing a drive letter assignment as opposed
    to a volume entry that we would use on a Unix/Linux environment. Once satisfied
    with the information provided, the administrator clicks OK and the shared file
    system is created.


    To create a new software library location with the EM CLI, you can perform the
    following:'
