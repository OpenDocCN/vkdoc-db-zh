  trans: "要查看文件输出：\n\n```\n>cat /u01/app/oracle/work/signoff_agents.txt\n\norcl2:3872\n\
    orcl1:3872\norcl3:3872\norcl4:3872\nemrp2:3872\norcl6:3872\n```\n\n步骤 2：移除旧代理\n\
    \n我们的第二个示例将清理所有已升级的代理。通过使用 EM CLI 的 `signoff_agents` 命令并在搜索中指定匹配字符串来移除代理：\n\n\
    ```\n>emcli signoff_agents -agents=\"oradba%\" -job_name=CLEANUP_12cR2_AGNTS\n\
    \n可用于签出的代理\n\n代理 已安装版本 平台 Oracle 主目录\n\n----- ----------------- -------- -----------\n\
    \norcl2:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\
    \norcl1:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\
    \n已为上述代理提交代理签出作业。使用 emcli get_signoff_status 或前往 EM 控制台 -> 设置 -> 管理云控制 -> 升级代理\
    \ -> 代理升级后任务 -> 签出代理结果以查看作业状态\n作业名称 : CLEANUP_12CR2_AGNTS\n```\n\n一旦所有作业都验证为已完成，应进行第二次检查，以确认相关每个代理都已收到签出状态：\n\
    \n```\n>emcli get_signoff_status\n\n显示每个作业的状态\n\n作业名称 状态 总代理数 开始时间 结束时间\n\n--------\
    \ ------ ------------ ------- -----\n\nCLEANUP_12CR2_AGNTS 成功 2 2013-11-21 17:08:30\
    \ CST\n2013-11-21 17:08:44 CST\n```\n\n请注意，签出操作并不会删除旧的代理主目录。我们现在将通过一个 EM CLI `host`\
    \ 命令在登录后执行此操作：\n\n```\n>emcli execute_hostcmd –cmd=”rm -rf /u01/oracle/agent12c/core/12.1.0.2.0”\
    \ -targets=\"remote-host:host\"\n```\n\n此命令将从其运行的每个主机中删除先前未使用的目录主目录。\n\n这些示例旨在向您展示一些非常简单的命令，它们完成了通常需要手动执行的多个步骤，从而减轻了管理员的负担。任何仔细阅读了\
    \ DBA 在六台服务器上必须执行的实际步骤（包括验证成功然后移除先前安装）的人，都会意识到 EM CLI 作业提交选项背后蕴含的强大能力。\n\n信息出版商报告的导出/导入功能\n\
    \nBI Publisher (BIP) 现在作为第 4 版 (12.1.0.4) 的集成部分成为标准配置。随着这一变化，信息出版商报告 (IP 报告) 仍然受支持，但建议迁移到\
    \ BIP。\n\n任何报告都需要大量的开发时间，而能够通过 EM CLI 导出和导入它非常有益；这对于您现有的 IP 报告来说也不例外。在此示例中，我们将首先列出然后导出一个名为\
    \ “Exadata Summary Report” 的 IP 报告：\n\n```\n>emcli get_reports –owner=\"KPOTVIN\"\
    \n```\n\n从 “KPOTVIN” 拥有的报告列表中，我们可以选择一个名为 `EXADATA_SUMMARY_REPORT` 的报告并导出它：\n\n\
    ```\n>emcli export_report -title=\"Exadata Summary Report\" -owner=\"KPOTVIN\"\
    \ -output_file=\"$OMS_HOME/reports/exadata_summary.xml\"\n```\n\n此报告现在将位于 `$OMS_HOME/reports`\
    \ 目录中，文件将被命名为 `exadata_summary` 以便于识别。\n\n然后要导入此报告，执行以下操作：\n\n```\n>emcli import_report\
    \ -files=\"$OMS_HOME/reports/exadata_summary.xml\"\n```\n\n导出 BIP 报告目前通过控制台执行，并将文件导出到本地文件。\n\
    \n在软件库中存储定义库\n\n将定义文件存储在软件库中非常合理。没有人愿意继续创建和保留同一定义文件（又称响应文件）的多个副本。通过实施软件库，可以更少担心版本控制，因为这可以作为该功能的一部分进行管理。\n\
    \n创建定义文件是一个简单的过程：\n\n```\n>emcli get_procedures -type=DBPROV \n```\n\n这将创建一个所有配置过程的列表，然后可用于创建定义文件；这将与部署或配置动词调用一起使用。此定义文件包含所有目标和过程步骤。与编写所有任务（就像响应文件消除了数据库配置助理\
    \ (dbca) 静默运行的类似工作）相比，将其用作“快捷方式”可以节省时间和额外精力。\n\n您可以使用以下命令“描述”或列出命令和信息到输出文件：\n\n\
    ```\n>emcli describe_procedure_input -procedure=B35E10B1F427B4EEE040578CD78179DC\
    \ > newoutputfile.properties\n```\n\n此命令将基于命令中列出的过程 GUID，在软件库目录中创建一个名为 “newoutputfile.properties”\
    \ 的文件。\n\n然后您可以使用 VI 或其他编辑器打开该文件，根据需要更改目标等信息并保存；接着，将其上传回软件库：\n\n```\n>emcli save_procedure_input\
    \ –name=Prov_db12cR1_temp -procedure=\"DB12cR1 Template\" -owner=\"KPOTVIN\"\n\
    -input_file=data:$OMS_HOME/sw_files/newoutputfile.properties\n```\n\n该文件现已上传到软件库，可以下载以供将来使用，或者可以直接使用。\n\
    \nOracle 可扩展性交换中心\n\nOracle 的可扩展性交换中心是一个云存储库（库），Oracle 和合作伙伴已向其贡献了脚本、插件和其他 Enterprise\
    \ Manager 实体以供下载。可通过以下链接 (图 7-12) 通过 Web 浏览器访问可扩展性交换中心：`http://www.oracle.com/goto/emextensibility`。\n\
    \n![9781484202395_Fig07-12.jpg](img/9781484202395_Fig07-12.jpg)\n\n图 7-12。Oracle\
    \ 可扩展性交换中心 2.0 版的主页\n\n拥有可扩展性交换中心的好处类似于拥有配置库，只是范围是全球性的。它允许 EM12c 专业人员与 OEM 社区的其他人分享他们的知识和专长。它为社区中的人们提供了解决方案，为他们节省了原本会浪费在重新创建他人已花费宝贵时间原创的代码上的时间和资源。\n\
    \n重用 Enterprise Manager 实体（例如脚本、插件和补丁计划）的愿望很快变得明显，并且许多高级用户请求此功能。没有人喜欢重新发明轮子，借助可扩展性交换中心，EM12c\
    \ 软件库被提升到了一个新的水平。可用实体的来源不再局限于 EM12c 存储库本地，而是现在任何有浏览器访问权限的人都可以获得；来自整个 Oracle 社区高级用户的贡献也同样可用。\n\
    \n随着 2014 年 6 月 2.0 版本的发布，可扩展性交换中心的未来前景广阔。随着 Enterprise Manager 功能的增强，新的卸载和导出功能以及新的脚本编写方法不断被发现。随着我们在\
    \ EM CLI 中实现的功能越来越多，我们计划看到更多的 Jython 和 JSON 脚本，这些脚本将涵盖我们现在在数据库环境中所做的大部分工作。然而，随着向移动设备的转移，谁知道会利用\
    \ ADF（应用程序开发表格）和 APEX 想出什么，所有这些都在 EM12c 中得到支持，并作为部署的一部分通过 EM CLI 编写脚本。很快，不仅会有插件和脚本，还可能有完整的监控实体套件通过可扩展性交换中心提供。\n\
    \n为了更好地理解这些功能，我们可以通过 Web 浏览器登录可扩展性交换中心。页面标题为用户提供了有关即将举行的 Enterprise Manager 培训和信息活动的丰富信息\
    \ (图 7-13)。还有一个链接，如果用户想继续访问该站点以获取更多信息或注册活动。\n\n![9781484202395_Fig07-13.jpg](img/9781484202395_Fig07-13.jpg)"
- fmt: '# Extensibility Exchange Overview


    ![9781484202395_Fig07-14.jpg](Images/9781484202395_Fig07-14.jpg)


    [Figure 7-13](#9781484202395_Ch07.xhtml#_Fig13). Header page with event information
    and top categories on the Extensibility Exchange website


    Categories, ordered by popularity and number of entities, are shown in [Figure
    7-14](#9781484202395_Ch07.xhtml#Fig14) in the event header.


    ## Search and Recent Updates


    ![9781484202395_Fig07-15.jpg](Images/9781484202395_Fig07-15.jpg)


    [Figure 7-14](#9781484202395_Ch07.xhtml#_Fig14). Search bar and recent updates
    list of plug-ins and entities created by both Oracle and partners on the Extensibility
    Exchange website


    The search option is both helpful and easy to use. Simply type in a keyword and
    it goes to work to find all entities in the Exchange that have that term in its
    title.


    Instead of doing a search, you can scroll to the bottom of the page to peruse
    the recently updated extensions in the library by Oracle, by partners, and/or
    by `tags`, as shown in [Figure 7-15](#9781484202395_Ch07.xhtml#Fig15). Tags are
    search words that can be used to offer a link button that will take you quickly
    to all entities or plug-ins that meet that `tagged` search.


    ## Tagged Searches


    ![9781484202395_Fig07-16.jpg](Images/9781484202395_Fig07-16.jpg)


    [Figure 7-15](#9781484202395_Ch07.xhtml#_Fig15). Tagged searches on the Extensibility
    Exchange website, along with entity counts for each tagged search term


    In [Figure 7-16](#9781484202395_Ch07.xhtml#Fig16), we are going to do a simple
    search for `fusion`.


    ## Performing a Search


    ![9781484202395_Fig07-17.jpg](Images/9781484202395_Fig07-17.jpg)


    [Figure 7-16](#9781484202395_Ch07.xhtml#_Fig16). Search bar view for the Extensibility
    Exchange, along with quick search results in response to keyword entry


    As you can see, the keyword `fusion` shows results immediately. For our example,
    we’ll choose `Oracle Fusion Applications`.


    This takes us to the page for the entities that match our search ([Figure 7-17](#9781484202395_Ch07.xhtml#Fig17)),
    and we can then chose from the dropdown.


    ## Plug-in Details Page


    ![9781484202395_Fig07-18.jpg](Images/9781484202395_Fig07-18.jpg)


    [Figure 7-17](#9781484202395_Ch07.xhtml#_Fig17). Secondary search page from keyword
    entries that shows list of available plug-ins (i.e., “entities”) to view or download


    By clicking on the first of the extensions found in a search, we are taken to
    the content details for the Fusion ION Accelerator plug-in ([Figure 7-18](#9781484202395_Ch07.xhtml#Fig18)).


    [Figure 7-18](#9781484202395_Ch07.xhtml#_Fig18). View of access page for the Fusion
    ION Accelorator plug-in, which displays documentation, download, reporting, and
    bookmark links


    Notice that you can read the full documentation on the plug-in (`Explore Plug-in`),
    download it, report a problem if one is experienced with the plug-in, or bookmark
    it for later reference via a web browser.


    For the future enhancement of the site, also remember to come back and rate the
    plug-in if you do end up downloading it. It’s very valuable to other users of
    the Extensibility Exchange to receive feedback.


    If you choose to download a plug-in and it’s from Oracle, it will take you to
    Oracle or to the partner’s page to access the download options.


    ## Classic View


    Now, if you are more comfortable with the previous version of Extensibility Exchange,
    you do have the option to click on the `Classic` tab at the top of the page, which
    will revert it to the previous iteration of this great website. It’s common to
    need time to become accustomed to a new application user interface, so I recommend
    you use the new interface for a while before choosing to revert.


    ## Development Resources


    If your environment possesses metric extensions, plug-ins, and other valuable
    additions to your EM12c environment and you’d like to learn how to contribute
    them to the Exchange Extensibility repository, there is a `Development Resources`
    page to explain how. This page includes downloads for kits, guides, white papers,
    and screenwatches, all of which help simplify the process of developing and submitting
    entities.


    ## Contribute


    Once you have completed proper development of an entity to submit to the Extensibility
    Exchange, the form on the `Contribute` tab must be filled out. Once this is completed,
    click `Create`. Oracle will proceed to validate your contribution and then add
    it to the Extensibility Exchange catalog.


    ## At a Glance


    The last tab is extremely important, despite its placement on the Exchange Extensibility
    page. This `At a Glance` page ([Figure 7-19](#9781484202395_Ch07.xhtml#Fig19))
    gives a quick view of which plug-in offers what functionality.


    ![9781484202395_Fig07-19.jpg](Images/9781484202395_Fig07-19.jpg)


    [Figure 7-19](#9781484202395_Ch07.xhtml#_Fig19). The “At a Glance” tab and the
    impressive comparison feature for plug-ins


    It also offers a great search feature, including filters and comparison options
    for the different plug-ins ([Figure 7-20](#9781484202395_Ch07.xhtml#Fig20)).


    ![9781484202395_Fig07-20.jpg](Images/9781484202395_Fig07-20.jpg)


    [Figure 7-20](#9781484202395_Ch07.xhtml#_Fig20). Distinct search results and comparisons
    of “EMC” plug-ins, displaying which plug-ins have out-of-the-box reports included


    In this figure we perform a quick search for EMC plug-ins, and two provide `out-of-the-box`
    reports, so if this is a requirement of the plug-in you need, this page would
    quickly pinpoint you to the desired entities.


    ## Summary


    The software library is your own internal repository for entities used by the
    EM12c environment. The ability to also have a global software library in the Extensibility
    Exchange offers the Enterprise Manager the ability to share entities that they
    would have previously had to design themselves.


    In this chapter, we discussed why you are required to have the software library
    configured before you’re able to use many of the features of the EM12c console,
    including provisioning and `EM CLI` scripting features. We demonstrate how to
    configure some more-advanced features and how they benefit your day-to-day demands.


    We also go into the powerful Extensibility Exchange website. This is Oracle’s
    library of entities that allow Oracle, Oracle partners, and power users just like
    you to develop, test, ensure quality of, and then share entities with the Oracle
    community to the benefit of everyone. Providing everyone a one-stop location to
    view, try out, and then review plug-ins, metric extensions, and future entities
    is an incredible way the Oracle community can share its wealth of skills in the
    industry with each other.


    # CHAPTER 8: Sample EM CLI Scripts


    ![image](Images/frontdot.jpg)


    Throughout this book we’ve shown you how to use `EM CLI` to manage your OEM environment,
    including using the command line, `Jython` scripting option, which uses `JSON`
    and `Jython`.


    This chapter contains some sample scripts for you to adapt to your environment.


    *   Section 1: Function Library and Shell Scripts

    *   Section 2: `EM CLI` and Veritas Cluster Services

    *   Section 3: Essential OMS Server-Management Scripts

    *   Section 4: `EM CLI` Scripting and Interactive Scripts


    ## Section 1: Function Library and Shell Scripts


    [Chapter 5](../Text/9781484202395_Ch05.xhtml) explored various ways you could
    apply `EM CLI` with shell scripts. This section expands on those solutions and
    provides you with sample scripts you can use in your environment.


    The samples in this chapter have been edited for clarity, mostly by removing formatting
    options for `echo` statements and redirections to log files. Two of the most important
    things you must provide in your scripts are clear instructions for attended online
    use and complete log files for unattended execution through `Cron` or another
    job scheduler like `OEM`.


    ### Command-Line Inputs


    The use of validated input values provides scalability and ease of use. Before
    you deploy your scripts, consider adding and testing this important capability.'
