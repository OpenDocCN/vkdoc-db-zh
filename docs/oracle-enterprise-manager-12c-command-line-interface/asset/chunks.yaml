- fmt: "# EM CLI 使用指南与示例\n\n## 输出列\n`Status ID` `Status` `Target Type` `Target Name`\
    \ `Critical` `Warning`\n\n## 示例\n\n```\nemcli get_targets\n```\n显示所有目标。`Critical`\
    \ 和 `Warning` 列不显示。\n\n```\nemcli get_targets\n          -alerts\n```\n显示所有目标。`Critical`\
    \ 和 `Warning` 列显示。\n\n```\nemcli get_targets\n          -targets=\"oracle_database\"\
    \n```\n显示所有 `oracle_database` 目标。\n\n```\nemcli get_targets\n          -targets=\"\
    %oracle%\"\n```\n显示所有类型包含字符串 `\"oracle\"` 的目标。\n\n```\nemcli get_targets\n   \
    \       -targets=\"database%:%oracle%\"\n```\n显示所有名称以 `\"database\"` 开头且类型包含 `\"\
    oracle\"` 的目标。\n\n```\nemcli get_targets\n          -targets=\"database3:oracle_database\"\
    \n          -alerts\n```\n显示名为 `\"database3\"` 的 Oracle 数据库的状态和告警信息。\n\n```\n\
    emcli get_targets\n          -config_search=\"Search File Systems on Hosts\"\n\
    \          -targets=\"oracle%:host\"\n          -alerts\n```\n显示来自名为 `\"Search\
    \ File Systems on Hosts\"` 的配置搜索结果中，名称以 `\"oracle\"` 开头且类型为 `\"host\"` 的目标的状态和告警信息。\n\
    \n```\nemcli get_targets\n          -targets=\"host\"\n          -unmanaged\n\
    ```\n显示未受管的主机目标的名称和类型信息。\n\n## EM CLI 客户端软件\n\n管理服务器上的基本 OEM 安装会预配置一个作为 `OMS Oracle\
    \ Home` 一部分的 EM CLI 客户端。在[第 2 章](../Text/9781484202395_Ch02.xhtml)中，我们将向您展示如何将该客户端升级到\
    \ EM CLI 高级套件。\n\nEM CLI 的部分优势源于其灵活性。除了在 OMS 服务器上安装客户端外，您还可以在非 OMS 主机甚至桌面上安装 EM\
    \ CLI 客户端。\n\n安装 EM CLI 客户端包括下载并提取一个安装 `jar` 文件以安装二进制文件，然后使用连接信息配置客户端以连接到您的 OMS\
    \ 服务器。该 `jar` 文件及其使用安装程序可通过 OEM 控制台中的 `Setup > Command-Line Interface` 获取。请按照该网页上的说明将\
    \ EM CLI 安装到您的工作站。\n\n## EM CLI 与 EMCTL\n\n一些 EM CLI 功能可以通过代理控制实用程序 `EMCTL` 来执行。您的技术选择取决于多种因素的组合。\n\
    \n*   当通过远程主机上的 shell 脚本调用时，EM CLI 客户端必须手动安装并维护在远程主机上。控制台会显示远程 CLI 客户端安装列表，但您仍然必须手动更新客户端软件。\n\
    *   远程主机上的 EM CLI 配置需要用于与 OMS 服务器交互的连接信息。当此信息更改时，您必须访问每个 EM CLI 安装。\n*   `EMCTL`\
    \ 命令特定于特定代理所知的目标，因此在命令行上传递的命令通常要简单得多。\n*   您必须登录到远程主机才能执行 `EMCTL` 命令。EM CLI 允许您远程执行许多\
    \ `EMCTL` 等效命令，以避免前往服务器。这在一次会话中管理多个服务器时特别有用。\n\n我们建议您刚开始使用或如果您的安装规模较小时使用 `EMCTL`。`EMCTL`\
    \ 中的命令往往更简单，事先的设置也更简单。然而，从长远来看，使用 EM CLI 所投入的“时间成本”是值得的。那些需要支持大型基础设施的人会发现自己倾向于使用\
    \ EM CLI。\n\n## 代理启动与停止\n\n`EM` 代理可以从 `OEM` 控制台内部、通过 `EM CLI`，当然也可以通过 `EMCTL`\
    \ 来启动和停止。由于 `EMCTL` 命令是针对单个代理执行的，因此命令通常非常简单：\n\n```\nemctl start agent\n\nemctl\
    \ stop agent\n```\n\n类似的功能可以从管理服务器、您的桌面或任何安装了 EM CLI 客户端的主机执行。可移植性带来了复杂性，因为您不仅需要指定要控制的代理，还需要指定要使用的凭据。\n\
    \n您可以指定主机用户名、命名凭据或凭据集。当您传递用户名时，还必须提供密码。在纯交互模式下，可以提示您输入密码，但在 shell 脚本中使用此技术可能会将密码暴露给其他操作系统用户。使用\
    \ OEM 命名凭据可以避免此问题：\n\n```\nemcli start_agent –agent_name=\"dbservera:3872\" –host_username=\"\
    oracle\" –host_pwd=\"Souper_53cre3t\"\nemcli start_agent –agent_name=\"dbservera:3872\"\
    \ –credential_name=\"oraprod\"\nemcli start_agent –agent_name=\"dbservera:3872\"\
    \ –credential_setname=\"HostCreds\"\n```\n\n停止命令需要相同的条件值；例如：\n\n```\nemcli stop_agent\
    \ –agent_name=\"dbservera:3872\" –host_username=\"oracle\"\n```\n\n我们将在[第 4 章](../Text/9781484202395_Ch04.xhtml)中更深入地探讨其中一些选项。\n\
    \n## 集中管理\n\n也许您已决定在物理服务器迁移期间或操作系统修补期间关闭部分 EM 代理。您可以使用 `emcli get_targets` 命令快速构建类型为\
    \ `oracle_emd` 的受影响代理列表，并将该列表转换为两个 CLI 参数文件（argfiles）——一个用于停止代理，另一个用于启动它们。\n\n\
    ![Image](Images/sq.jpg) **注意** 参数文件用于批量处理 CLI 命令。它们在[第 5 章](../Text/9781484202395_Ch05.xhtml)中有更详细的讨论。\n\
    \n以下是一个使用参数文件的示例：\n\n```\ntouch argfile_stop.lst\ntouch argfile_start.lst\nemcli\
    \ get_targets | grep oracle_emd > workfile.lst\nfor thisAGENT in `cat workfile.lst`;\
    \ do\n          echo \"start_agent –agent_name=${thisAGENT} –credential_name=oraprod\"\
    \ > argfile_start.lst\n          echo \"stop_agent –agent_name=${thisAGENT} –credential_name=oraprod\"\
    \ > argfile_stop.lst\ndone\n\nemcli login –user=\"SYSMAN\"\nemcli sync\nemcli\
    \ argfile ./argfile_stop.lst\nlogout\n```\n\n## 访问控制\n\n较大的 Oracle 环境可能在 OEM 管理员和常规\
    \ DBA 员工之间存在职责分离，或者您的安全规则可能使得难以访问服务器进行例行维护。在这些情况下，运行 CLI 命令或通过控制台管理上下线是有意义的。\n\
    \n## 安全保护\n\n在 OEM 控制台中，每当您请求执行危险任务时，系统都会提示您进行确认。EM CLI 没有相同的功能。当您给出命令时，您的任务会按照您的请求精确执行，因此在删除或修改目标时要格外小心。尽管如此，许多人更喜欢命令行，因为它操作直接，没有多余的反馈。只需小心即可。\n\
    \n# 第 2 章\n\n![image](Images/frontdot.jpg)\n\n## 安全框架、安装与 EM12c 第 4 版\n\n既然您已经了解了\
    \ Enterprise Manager 架构，您可能想了解更多关于 Oracle Management Service (OMS) 主机的高级安装方法或远程安装。您还需要了解与\
    \ 12.1.0.4（也称为 EM12c 第 4 版）相关的新动词（verbs），这些内容都将在本章中涵盖。\n\n## EM CLI 与 WebLogic\
    \ 安装\n\nEnterprise Manager 作为 WebLogic 服务器 (WLS) 上的一个域运行。没有 WebLogic 提供的中层架构，云生命周期解决方案就无法存在。`WLS`\
    \ 处理业务逻辑，同时与 Web 服务和其他远程处理通信，以确保前端事务从开始到结束都能完成。\n\n曾经，`OMS` 需要单独安装 `WLS`。尽管它目前是\
    \ EM12c 安装过程中的一个自动化步骤，但理解如何手动执行此操作对于管理员来说很有价值，尤其是在向前发展过程中管理和维护环境时。"
  raw: "Output columns:\n      Status ID  Status  Target Type  Target Name  Critical\
    \  Warning\n\nExamples:\n    emcli get_targets\n      Shows all targets. Critical\
    \ and Warning columns are not shown.\n\nemcli get_targets\n          -alerts\n\
    \      Shows all targets. Critical and Warning columns are shown.\n\nemcli get_targets\n\
    \          -targets=\"oracle_database\"\n      Shows all \"oracle_database\" targets.\n\
    \nemcli get_targets\n          -targets=\"%oracle%\"\n      Shows all targets\
    \ whose type contains the string \"oracle\".\n\nemcli get_targets\n          -targets=\"\
    database%:%oracle%\"\n      Shows all targets whose name starts with \"database\"\
    \ and type\n      contains \"oracle\".\n\nemcli get_targets\n          -targets=\"\
    database3:oracle_database\"\n          -alerts\n      Shows status and alert information\
    \ on the Oracle database named\n      \"database3\".\n\nemcli get_targets\n  \
    \        -config_search=\"Search File Systems on Hosts\"\n          -targets=\"\
    oracle%:host\"\n          -alerts\n      Shows status and alert information of\
    \ the resulting targets from\n      configuration search named \"Search File Systems\
    \ on Hosts\" and targets\n      whose name starts with \"oracle\" and of type\
    \ \"host\".\n\nemcli get_targets\n          -targets=\"host\"\n          -unmanaged\n\
    \      Shows name and type information for unmanaged host targets.\n```\n\nEM\
    \ CLI Client Software\n\nThe basic OEM installation on a management server preconfigures\
    \ an EM CLI client as part of OMS Oracle Home. In [Chapter 2](../Text/9781484202395_Ch02.xhtml)\
    \ we’ll show you how to upgrade that client to the EM CLI Advanced Kit.\n\nPart\
    \ of EM CLI’s strength comes from its flexibility. In addition to the client installation\
    \ on the OMS server, you can install the EM CLI client on a non-OMS host or even\
    \ on your desktop.\n\nInstalling the EM CLI client consists of downloading and\
    \ extracting an installation jar file in order to install the binaries, and then\
    \ configuring the client with connection information for your OMS server. The\
    \ jar file and installation for its use are available through the OEM console\
    \ under *Setup > Command-Line Interface*. Follow the instructions on that web\
    \ page to install the EM CLI to your workstation.\n\nEM CLI and EMCTL\n\nSeveral\
    \ EM CLI functions can be performed through the Agent Control utility EMCTL. Your\
    \ choice of technique depends on a combination of factors.\n\n*   EM CLI client\
    \ must be manually installed and maintained on the remote host when called by\
    \ shell scripts on the remote host. The console displays a listing of remote CLI\
    \ client installations, but you still have to manually update the client software.\n\
    *   EM CLI configuration on a remote host requires connection information for\
    \ interaction with the OMS server. When this information changes, you must visit\
    \ each EM CLI installation.\n*   EMCTL commands are specific to the targets known\
    \ to a specific agent, so the commands passed on the command line are typically\
    \ much simpler.\n*   You must be logged in on the remote host to execute an EMCTL\
    \ command. EM CLI allows you to perform many EMCTL-equivalent commands remotely\
    \ in order to avoid a trip to the server. This can be particularly helpful when\
    \ managing a number of servers in one session.\n\nWe recommend using EMCTL when\
    \ you’re just getting started or if your installation is small. Commands in EMCTL\
    \ tend to be simpler, and the setup ahead of time is also simpler. The “investment”\
    \ in time to get set up using EM CLI however, becomes worthwhile at scale. Those\
    \ with large infrastructures to support will find themselves tending toward using\
    \ EM CLI.\n\nAgent Start and Stop\n\nEM agents can be started and stopped from\
    \ inside the OEM console, through EM CLI, and of course by EMCTL. Since EMCTL\
    \ commands are performed for a single agent, the commands tend to be quite simple:\n\
    \n```\nemctl start agent\n\nemctl stop agent\n```\n\nSimilar functionality can\
    \ be performed from the management server, your desktop, or any host with the\
    \ EM CLI client installed. Portability comes with complexity since you have to\
    \ identify not only the agent to be controlled, but also the credentials to be\
    \ used.\n\nYou can specify a host user, a named credential, or a credential set.\
    \ When you pass the username you also have to provide a password. In a purely\
    \ interactive mode you can be prompted for the password, but using this technique\
    \ in a shell script may expose the password to other operating system users. Using\
    \ OEM named credentials avoids this issue:\n\n```\nemcli start_agent –agent_name=\"\
    dbservera:3872\" –host_username=\"oracle\" –host_pwd=\"Souper_53cre3t\"\nemcli\
    \ start_agent –agent_name=\"dbservera:3872\" –credential_name=\"oraprod\"\nemcli\
    \ start_agent –agent_name=\"dbservera:3872\" –credential_setname=\"HostCreds\"\
    \n```\n\nThe stop commands require the same conditional values; for instance:\n\
    \n```\nemcli stop_agent –agent_name=\"dbservera:3872\" –host_username=\"oracle\"\
    \n```\n\nWe’ll explore some of these options in greater depth in [Chapter 4](../Text/9781484202395_Ch04.xhtml).\n\
    \nCentralization\n\nPerhaps you’ve decided to shut down some of your EM agents\
    \ during a physical server move or perhaps during operating system patching. You\
    \ can quickly build a list of the affected agents with `EM CLI get_targets` for\
    \ `oracle_emd` types and turn that list into two CLI argfiles—one to stop the\
    \ agents and another to start them.\n\n![Image](Images/sq.jpg) **Note**  Argfiles\
    \ are used to process batches of CLI commands. They are discussed in more detail\
    \ in [Chapter 5](../Text/9781484202395_Ch05.xhtml).\n\nFollowing is an example\
    \ putting argfiles to use:\n\n```\ntouch argfile_stop.lst\ntouch argfile_start.lst\n\
    emcli get_targets | grep oracle_emd > workfile.lst\nfor thisAGENT in `cat workfile.lst`;\
    \ do\n          echo \"start_agent –agent_name=${thisAGENT} –credential_name=oraprod\"\
    \ > argfile_start.lst\n          echo \"stop_agent –agent_name=${thisAGENT} –credential_name=oraprod\"\
    \ > argfile_stop.lst\ndone\n\nemcli login –user=\"SYSMAN\"\nemcli sync\nemcli\
    \ argfile ./argfile_stop.lst\nlogout\n```\n\nAccess\n\nLarger Oracle environments\
    \ may have a separation of duties between the OEM administrator and regular DBA\
    \ staff, or perhaps your security rules make it difficult to visit servers for\
    \ routine maintenance. In those cases, running the CLI commands or managing up/down\
    \ through the console makes sense.\n\nSafety Net\n\nYou are prompted for a confirmation\
    \ any time you ask to perform a dangerous task in the OEM console. EM CLI doesn’t\
    \ have the same functionality. When you give a command your task is executed exactly\
    \ as you requested, so be mindful when deleting or modifying targets. Despite\
    \ this, many people prefer the command line for its direct actions without excess\
    \ feedback. Just be careful.\n\nCHAPTER 2\n\n![image](Images/frontdot.jpg)\n\n\
    Installation and Security Framework and EM12c Release 4\n\nNow that you understand\
    \ the Enterprise Manager architecture, you may want to understand more-advanced\
    \ installation methods for the Oracle Management Service (OMS) host or for a remote\
    \ installation. You’ll also want to be up to date on the latest verbs that come\
    \ into play with 12.1.0.4, also known as EM12c Release 4, which is all covered\
    \ in this chapter.\n\nEM CLI and WebLogic Installation\n\nEnterprise Manager runs\
    \ as a domain on a WebLogic server (WLS). The cloud life-cycle solution couldn’t\
    \ exist without the middle-tier architecture provided by WebLogic. WLS handles\
    \ the business logic along with communicating with web services and other remote\
    \ processing to ensure front-end transactions are completed from beginning to\
    \ end.\n\nThere was a time when the OMS required a separate installation of the\
    \ WLS. Although it’s currently an automated step in the installation of EM12c,\
    \ comprehending how to perform this manually is valuable to the administrator,\
    \ especially going forward when administering and managing the environment."
  trans: "\n# EM CLI 使用指南与示例\n\n## 输出列\n`Status ID` `Status` `Target Type` `Target\
    \ Name` `Critical` `Warning`\n\n## 示例\n\n```\nemcli get_targets\n```\n显示所有目标。`Critical`\
    \ 和 `Warning` 列不显示。\n\n```\nemcli get_targets\n          -alerts\n```\n显示所有目标。`Critical`\
    \ 和 `Warning` 列显示。\n\n```\nemcli get_targets\n          -targets=\"oracle_database\"\
    \n```\n显示所有 `oracle_database` 目标。\n\n```\nemcli get_targets\n          -targets=\"\
    %oracle%\"\n```\n显示所有类型包含字符串 `\"oracle\"` 的目标。\n\n```\nemcli get_targets\n   \
    \       -targets=\"database%:%oracle%\"\n```\n显示所有名称以 `\"database\"` 开头且类型包含 `\"\
    oracle\"` 的目标。\n\n```\nemcli get_targets\n          -targets=\"database3:oracle_database\"\
    \n          -alerts\n```\n显示名为 `\"database3\"` 的 Oracle 数据库的状态和告警信息。\n\n```\n\
    emcli get_targets\n          -config_search=\"Search File Systems on Hosts\"\n\
    \          -targets=\"oracle%:host\"\n          -alerts\n```\n显示来自名为 `\"Search\
    \ File Systems on Hosts\"` 的配置搜索结果中，名称以 `\"oracle\"` 开头且类型为 `\"host\"` 的目标的状态和告警信息。\n\
    \n```\nemcli get_targets\n          -targets=\"host\"\n          -unmanaged\n\
    ```\n显示未受管的主机目标的名称和类型信息。\n\n## EM CLI 客户端软件\n\n管理服务器上的基本 OEM 安装会预配置一个作为 `OMS Oracle\
    \ Home` 一部分的 EM CLI 客户端。在第 2 章中，我们将向您展示如何将该客户端升级到 EM CLI 高级套件。\n\nEM CLI 的部分优势源于其灵活性。除了在\
    \ OMS 服务器上安装客户端外，您还可以在非 OMS 主机甚至桌面上安装 EM CLI 客户端。\n\n安装 EM CLI 客户端包括下载并提取一个安装\
    \ `jar` 文件以安装二进制文件，然后使用连接信息配置客户端以连接到您的 OMS 服务器。该 `jar` 文件及其使用安装程序可通过 OEM 控制台中的\
    \ `Setup > Command-Line Interface` 获取。请按照该网页上的说明将 EM CLI 安装到您的工作站。\n\n## EM CLI\
    \ 与 EMCTL\n\n一些 EM CLI 功能可以通过代理控制实用程序 `EMCTL` 来执行。您的技术选择取决于多种因素的组合。\n\n*   当通过远程主机上的\
    \ shell 脚本调用时，EM CLI 客户端必须手动安装并维护在远程主机上。控制台会显示远程 CLI 客户端安装列表，但您仍然必须手动更新客户端软件。\n\
    *   远程主机上的 EM CLI 配置需要用于与 OMS 服务器交互的连接信息。当此信息更改时，您必须访问每个 EM CLI 安装。\n*   `EMCTL`\
    \ 命令特定于特定代理所知的目标，因此在命令行上传递的命令通常要简单得多。\n*   您必须登录到远程主机才能执行 `EMCTL` 命令。EM CLI 允许您远程执行许多\
    \ `EMCTL` 等效命令，以避免前往服务器。这在一次会话中管理多个服务器时特别有用。\n\n我们建议您刚开始使用或如果您的安装规模较小时使用 `EMCTL`。`EMCTL`\
    \ 中的命令往往更简单，事先的设置也更简单。然而，从长远来看，使用 EM CLI 所投入的“时间成本”是值得的。那些需要支持大型基础设施的人会发现自己倾向于使用\
    \ EM CLI。\n\n## 代理启动与停止\n\n`EM` 代理可以从 `OEM` 控制台内部、通过 `EM CLI`，当然也可以通过 `EMCTL`\
    \ 来启动和停止。由于 `EMCTL` 命令是针对单个代理执行的，因此命令通常非常简单：\n\n```\nemctl start agent\n\nemctl\
    \ stop agent\n```\n\n类似的功能可以从管理服务器、您的桌面或任何安装了 EM CLI 客户端的主机执行。可移植性带来了复杂性，因为您不仅需要指定要控制的代理，还需要指定要使用的凭据。\n\
    \n您可以指定主机用户名、命名凭据或凭据集。当您传递用户名时，还必须提供密码。在纯交互模式下，可以提示您输入密码，但在 shell 脚本中使用此技术可能会将密码暴露给其他操作系统用户。使用\
    \ OEM 命名凭据可以避免此问题：\n\n```\nemcli start_agent –agent_name=\"dbservera:3872\" –host_username=\"\
    oracle\" –host_pwd=\"Souper_53cre3t\"\nemcli start_agent –agent_name=\"dbservera:3872\"\
    \ –credential_name=\"oraprod\"\nemcli start_agent –agent_name=\"dbservera:3872\"\
    \ –credential_setname=\"HostCreds\"\n```\n\n停止命令需要相同的条件值；例如：\n\n```\nemcli stop_agent\
    \ –agent_name=\"dbservera:3872\" –host_username=\"oracle\"\n```\n\n我们将在第 4 章中更深入地探讨其中一些选项。\n\
    \n## 集中管理\n\n也许您已决定在物理服务器迁移期间或操作系统修补期间关闭部分 EM 代理。您可以使用 `emcli get_targets` 命令快速构建类型为\
    \ `oracle_emd` 的受影响代理列表，并将该列表转换为两个 CLI 参数文件（argfiles）——一个用于停止代理，另一个用于启动它们。\n\n\
    ![Image](img/sq.jpg) **注意** 参数文件用于批量处理 CLI 命令。它们在第 5 章中有更详细的讨论。\n\n以下是一个使用参数文件的示例：\n\
    \n```\ntouch argfile_stop.lst\ntouch argfile_start.lst\nemcli get_targets | grep\
    \ oracle_emd > workfile.lst\nfor thisAGENT in `cat workfile.lst`; do\n       \
    \   echo \"start_agent –agent_name=${thisAGENT} –credential_name=oraprod\" > argfile_start.lst\n\
    \          echo \"stop_agent –agent_name=${thisAGENT} –credential_name=oraprod\"\
    \ > argfile_stop.lst\ndone\n\nemcli login –user=\"SYSMAN\"\nemcli sync\nemcli\
    \ argfile ./argfile_stop.lst\nlogout\n```\n\n## 访问控制\n\n较大的 Oracle 环境可能在 OEM 管理员和常规\
    \ DBA 员工之间存在职责分离，或者您的安全规则可能使得难以访问服务器进行例行维护。在这些情况下，运行 CLI 命令或通过控制台管理上下线是有意义的。\n\
    \n## 安全保护\n\n在 OEM 控制台中，每当您请求执行危险任务时，系统都会提示您进行确认。EM CLI 没有相同的功能。当您给出命令时，您的任务会按照您的请求精确执行，因此在删除或修改目标时要格外小心。尽管如此，许多人更喜欢命令行，因为它操作直接，没有多余的反馈。只需小心即可。\n\
    \n# 第 2 章\n\n![image](img/frontdot.jpg)\n\n## 安全框架、安装与 EM12c 第 4 版\n\n既然您已经了解了\
    \ Enterprise Manager 架构，您可能想了解更多关于 Oracle Management Service (OMS) 主机的高级安装方法或远程安装。您还需要了解与\
    \ 12.1.0.4（也称为 EM12c 第 4 版）相关的新动词（verbs），这些内容都将在本章中涵盖。\n\n## EM CLI 与 WebLogic\
