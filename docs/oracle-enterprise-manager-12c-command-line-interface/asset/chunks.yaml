    企业管理器命令行界面（Enterprise Manager Command-Line Interface）几乎完全用 Java 和 Jython 编写。从
    OMS 下载 EM CLI 是一个 JAR 文件，需要 Java 可执行文件来安装。当以交互模式使用 EM CLI 时，命令行界面就是 Jython。


    本章的剩余部分将互换地引用 Python 和 Jython。这是因为大多数用户从 Python 开始，随后学习 Jython，或者在使用 Jython 时只使用
    Python 语言（不使用 Java）。互联网和书籍中有大量关于 Python 的信息和教程，因此建议在查找语法、示例等时搜索“Python”而不是“Jython”。


    如果你曾经使用过 Oracle 的任何中间件产品，你很可能已经接触过 Jython。WebLogic 应用服务器脚本工具（也称为“`wlst`”）也使用 Jython。


    ## JSON


    EM CLI 命令的输出将以两种方式之一显示。标准的表格或列式格式称为“文本”（`text`）模式。在达到某个临界点之前，文本模式通常是数据最可读的形式。例如，一个有五列的表在文本模式下显示良好，但一个由
    20 列组成的表则非常难以阅读或解析。文本模式是 EM CLI 交互模式的默认显示模式。


    替代文本模式显示命令输出的另一种方式是 JavaScript 对象表示法，通常称为 JSON。JSON 最初源自 JavaScript，此后已成为数据交换的通用工具。几乎每种编程和脚本语言不仅使用和理解
    JSON，而且对其有大量内置功能支持。


    JSON 是 EM CLI “脚本”（`scripting`）模式下存储和显示命令输出的默认方法，该模式专为处理 EM CLI 命令和输出而构建。预计在 EM
    CLI 脚本中处理的命令所接收的数据将以某种方式被操作。


    ## 入门


    Python 为易用性和简洁性而构建。因此，对于新手来说，学习该语言的基本功能并使用它来完成任务并不困难。DBA 在学习 Python 方面往往具有优势，因为他们具有使用
    PL/SQL、Java、Shell 脚本、各种命令行界面的经验以及分析倾向。


    也许 Python 最显著的特点是使用缩进来表示块结构。Python 不使用开始和结束语句来包围一个流程控制块（例如 `if` 语句），而是使用四个空格来缩进属于该块的代码行。因此，在第一个未缩进的行之上的行就结束了该块。块的第一行后面总是跟着一个冒号。


    ```python

    >>> for VAR in myLoop:

    ...     do this command

    >>> this line does not belong in the loop

    ```


    Python 和 Jython（以及 EM CLI 和 WLST）都有一个交互式界面，其中在脚本中执行的任何命令都可以被编写或复制并执行，以实时查看结果。大多数
    Linux 主机都安装了 Python。要调用交互式界面，只需键入 `python`：


    ```shell

    [root@server ~]# which python

    /usr/bin/python

    [root@server ~]# python

    Python 2.6.6 (r266:84292, Jul 10 2013, 06:42:56)

    [GCC 4.4.7 20120313 (Red Hat 4.4.7-3)] on linux2

    Type "help", "copyright", "credits" or "license" for more information.

    >>>print("this is the interactive Python prompt")

    this is the interactive Python prompt

    >>>exit()

    ```


    ## Hello World!


    “`Hello World!`” 是任何编程或脚本语言最常见的入门介绍。以下示例使用三行代码演示了 Python 中五个重要的概念，这些概念几乎在每个脚本中都会用到。注意每一行中没有多余的文本或命令。


    ```python

    >>> myvar = ''Hello World!''

    >>> if myvar:

    ...     print(myvar)

    ...

    Hello World!

    ```


    第一行展示了如何为变量赋值。变量在被赋值之前不需要被创建。这两个步骤是一次性完成的。赋给 `myvar` 的值是一个字符串值，因此该变量是一个字符串变量。


    第二行开始一个 `if` 代码块。该块表示：“如果变量 `myvar` 存在并且已为其赋值，则继续执行此块中的下一行”。代码块的起始行总是以冒号结束。


    第三行打印 `myvar` 变量的值，后跟一个新行。`print` 函数总是在打印的字符串末尾包含一个换行符。


    第四行需要一个回车来表示代码块已结束。在脚本中并非如此，代码块后的空行不是必需的。


    第五行显示了代码块命令的输出。这表明 `myvar` 变量确实存在并且已被赋值，因此执行了代码块中的那一行，这通过 `print` 函数的成功执行得到了证明。


    ## 查找帮助


    互联网上有大量关于 Python 的信息。一个简单的互联网搜索就能返回足够多的结果，让你回忆起一个被遗忘的命令。但是，Python 做得更好。一套完整的帮助功能可以直接从命令行获得。


    通过调用 `help()` 函数可以了解如何使用 Python 内部帮助的基本语法，该函数将用户带入 Python 内的另一个命令行界面，在该界面中可以输入几乎任何在
    Python 中找到的关键词（包括“`help`”）以提供易于理解的信息：


    ```python

    >>> help()


    Welcome to Python 2.6!  This is the online help utility.


    If this is your first time using Python, you should definitely check out

    the tutorial on the Internet at http://docs.python.org/tutorial/.


    Enter the name of any module, keyword, or topic to get help on writing

    Python programs and using Python modules.  To quit this help utility and

    return to the interpreter, just type "quit".


    To get a list of available modules, keywords, or topics, type "modules",

    "keywords", or "topics".  Each module also comes with a one-line summary

    of what it does; to list the modules whose summaries contain a given word

    such as "spam", type "modules spam".


    help>

    ```

