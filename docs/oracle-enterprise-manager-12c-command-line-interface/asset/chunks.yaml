    \ ${BACKUP_DIR} | grep -v \"^total\" \n```\n\n# 临时文件清理脚本\n\nOracle Management\
    \ Server 为其每个组件生成日志，从 WebLogic 服务器到主机上的 EM 代理。预设的轮转和文件清理机制在存在时非常有用，但并非所有文件都受此管理。保持服务器整洁需要由你负责。\n\
    \n此脚本遍历 OMS 服务器上的日志目录。评估每个文件的空闲时间，然后删除较旧的文件：\n\n```ksh\n#!/bin/ksh\n#===============================================================================\n\
    #  脚本名称  : log_blaster_oms.ksh\n#  调用参数 : 无\n#  目的      : 清理 OMS 的日志文件\n#    \
    \                   参考来源 MOS Note 1445743.1\n#===============================================================================\n\
    #  独立变量\n#=================================================================\n\
    # 将这些变量设置为你的本地目录设置\n# EM_INSTANCE_HOME 通常是 MIDDLEWARE_HOME/gc_inst\nEM_INSTANCE_HOME=\n\
    \nWORKFILE=/tmp/logblaster_oms_workfile1.lst\n\n#=================================================================\n\
    #  函数\n# =================================================================\n\n\
    function CleanUpFiles {\n# --------------------------------------------------------------------------------------------------\n\
    \n[ $WORKFILE ] && rm -f ${WORKFILE}\n}\n\nfunction TrimThisFile {\n# --------------------------------------------------------------------------------------------------\n\
    if [ -d ${thisDIR} ]; then\n   if [ `find ${thisDIR} -name ${thisFILE} | wc -l`\
    \ -gt 0 ]; then\n      NEW_FILE=${thisDIR}/${thisFILE}\n      OLD_FILE=${thisDIR}/${thisFILE}_old\n\
    \      LAST_DATE=`tail -1 ${NEW_FILE} | awk '{ print $1,$2,$3 }'`\n      echo\
    \ \"\\n 正在截断 ${NEW_FILE}\"\n      echo \"早于 ${LAST_DATE} 的条目将被移除\\n\"\n      mv\
    \ -f ${NEW_FILE} ${OLD_FILE}\n      cat ${OLD_FILE} | grep \"${LAST_DATE}\" >${NEW_FILE}\n\
    \         if [ `cat ${NEW_FILE} | wc -l` -gt 0 ]; then\n            rm -f ${OLD_FILE}\n\
    \         else\n            mv -f ${OLD_FILE} ${NEW_FILE}\n      fi\n   fi\n \
    \  echo \"\\n\\n\"\nelse\n   echo \"\\n 未找到目录 ${thisDIR}\\n\\n\"\nfi\n}\n\nfunction\
    \ SweepThese {\n# --------------------------------------------------------------------------------------------------\n\
    if [ -d ${thisDIR} ]; then\n   find ${thisDIR} -name ${thisFILE} -mtime +${thisAGE}\
    \ >${WORKFILE}\n   if [ `cat ${WORKFILE} | wc -l` -gt 0 ]; then\n      echo \"\
    \\n 清理 ${thisDIR} 目录\"\n      for thisTRASH in `cat ${WORKFILE}`; do\n       \
    \  echo\"\\t 移除 ${thisTRASH}\"\n         rm -f ${thisTRASH}\n      done\n   else\n\
    \      echo \"\\n 没有匹配 ${thisDIR}/${thisFILE} 的\"\n      echo \"超过 ${thisAGE}\
    \ 天的文件\"\n   fi\n   echo \"\\n\\n\"\nelse\n   echo \"\\n 未找到目录 ${thisDIR}\\n\\\
    n\"\nfi\n}\n\n# --------------------------------------------------------------------------------------------------\n\
    #  运行时过程\n# --------------------------------------------------------------------------------------------------\n\
    \nCleanUpFiles\n\n# --------------------------------------------------------------------------------------------------\n\
    # webtier 目录名从环境中获取\n# 通常发现的值是 OMS1，但也可能不同\n# --------------------------------------------------------------------------------------------------\n\
    \nWEBTIERn=`ls ${EM_INSTANCE_HOME} | grep WebTier`\n\nOHSn=`ls ${EM_INSTANCE_HOME}/${WEBTIERn}/diagnostics/logs/OHS\
    \ | grep ohs`\n\n# --------------------------------------------------------------------------------------------------\n\
    # 此目录的保留期通过 thisAGE 变量设置为七天\n# --------------------------------------------------------------------------------------------------\n\
    \nthisDIR=${EM_INSTANCE_HOME}/${WEBTIERn}/diagnostics/logs/OHS/${OHSn}\n   thisAGE=7\n\
    \nthisFILE=\"em_upload_http_access_log.*\"\n   SweepThese\n\nthisFILE=\"em_upload_https_access_log.*\"\
    \n   SweepThese\n\nthisFILE=\"access_log.*\"\n   SweepThese\n\nthisFILE=\"ohs*.log\"\
    \n   SweepThese\n\nthisFILE=\"console~OHS*.log*\"\n   SweepThese\n\nthisFILE=\"\
    mod_wl_ohs.log\"\n   TrimThisFile\n\n# --------------------------------------------------------------------------------------------------\n\
    \nDOMAIN_SERVERS_DIR=${EM_INSTANCE_HOME}/user_projects/domains/GCDomain/servers\n\
    \nthisDIR=${DOMAIN_SERVERS_DIR}/EMGC_ADMINSERVER/logs\n   thisAGE=7\n\nthisFILE=\"\
    GCDomain.log*\"\n   SweepThese\n\nthisFILE=\"EMGC_ADMINSERVER.out*\"\n   SweepThese\n\
    \nthisFILE=\"EMGC_ADMINSERVER.log*\"\n   SweepThese\n\nthisFILE=\"EMGC_ADMINSERVER-diagnostic-*.log\"\
    \n   SweepThese\n\nthisFILE=\"access.log*\"\n   SweepThese\n\n# --------------------------------------------------------------------------------------------------\n\
    \nEMGC_OMSn=`ls ${DOMAIN_SERVERS_DIR} | grep OMS`\n\nthisDIR=${DOMAIN_SERVERS_DIR}/${EMGC_OMSn}/logs\n\
    \   thisAGE=7\n\nthisFILE=\"EMGC_OMS*.out*\"\n   SweepThese\n\nfor eachDIR in\
    \ `ls -1 /oraoms/exportconfig`; do\n   thisDIR=/oraoms/exportconfig/${eachDIR}\n\
    \   thisFILE=\"opf_ADMIN_*.bka\"\n   SweepThese\nDone\n\nCleanUpFiles\nexit 0\n\
    ```\n\n# 第 4 节：EM CLI 脚本与交互式脚本\n\nEnterprise Manager 第 3 版包含标准的仅命令行版本的 EM CLI\
    \ 以及带有强大脚本选项的版本（有时称为高级套件）。后者可以下载并安装在任何受支持的客户端操作系统上，或直接在服务器上使用。EM CLI 与 Oracle\
    \ Management Server (OMS) 之间的连接方法相同，与 EM CLI 的安装位置无关。高级套件的安装说明在第 2 章中介绍。\n\nEM\
    \ CLI 的脚本选项同时指脚本模式和交互模式。在这两种模式下，EM CLI 都期望脚本内容或在交互模式下输入的命令符合 Python 语法。要在交互模式下从\
    \ EM CLI 连接到 Enterprise Manager，请输入命令 `login(username='sysman', password='foobar')`。此命令是对一个\
    \ Python 函数的调用。\n"
- fmt: "The samples in this section are the same code examples used in [Chapter 6](../Text/9781484202395_Ch06.xhtml)\
    \ and are all written in the Python programming language. While the samples in\
    \ the previous section used the operating system shell for all of their scripting\
    \ functionality (i.e., variables, `for` loops, `if then else`, etc.), the samples\
    \ in this section will use EM CLI and its Jython shell for everything. Because\
    \ these samples don’t rely on any shell scripting functionality, they can be used\
    \ on any platform supported by EM CLI.\n\n### Simple Logon Script (`start.py`)\n\
    \nThe code sample below can be copied directly into a text file. It is used to\
    \ set some important session properties and to establish a secure connection between\
    \ the EM CLI client and the OMS to which it is connecting. Before using this script,\
    \ the variables `myurl`, `myuser`, and `mypass` will need to be updated for your\
    \ environment:\n\n```\nfrom emcli import *\n\nmyurl = 'https://em12cr3.example.com:7802/em'\n\
    mytrustall = 'TRUE'\nmyoutput = 'JSON'\nmyuser = 'sysman'\nmypass = 'foobar'\n\
    \nset_client_property('EMCLI_OMS_URL', myurl)\nset_client_property('EMCLI_TRUSTALL',\
    \ mytrustall)\nset_client_property('EMCLI_OUTPUT_TYPE', myoutput)\nprint(login(username=myuser,\
    \ password=mypass))\n```\n\nThe `start.py` script can be used in both scripting\
    \ and interactive modes. In scripting mode, the script could be executed directly\
    \ from EM CLI using the command `emcli @start.py`. The result would either succeed\
    \ or fail in establishing a connection between EM CLI and an OMS. Using this script\
    \ alone would not be very useful unless you just wanted to see the confirmation\
    \ that the connection can be made.\n\n`start.py` is commonly called from other\
    \ scripts, or when in interactive mode, from the EM CLI Jython command-line interface\
    \ (not to be confused with command-line mode). Calling `start.py` from another\
    \ script is done by importing the script as a module.\n\nFor example, a script\
    \ called `sync.py` is called in scripting mode with the command `emcli @sync.py`.\
    \ Before the commands can be executed, a connection must be established between\
    \ EM CLI and an OMS. If the `start.py` script is in a directory that is included\
    \ in `JYTHONPATH`, the logon script can be called as the first command with `import\
    \ start`.\n\n**Note:** `JYTHONPATH` is a shell environment variable that will\
    \ be used by EM CLI to establish all of the directories to be searched when importing\
    \ modules. To add a directory, supplement the variable according to the shell\
    \ standards, similar to how a directory would be added to the `PATH` environment\
    \ variable.\n\nAn alternative would be to execute the `start.py` in scripting\
    \ mode using the command `emcli @start.py` and then call the `sync.py` (`import\
    \ sync`) script as the last line in `start.py`. This method would assume that\
    \ `sync.py` is located within the searchable path of the `JYTHONPATH` environment\
    \ variable.\n\nWhen using interactive mode, the `start.py` script must be in the\
    \ searchable path of `JYTHONPATH` and be called with `import start`. The logon\
    \ is now established for the life of the current interactive session or until\
    \ the logon is implicitly (expired timeout) or explicitly (using the `logout()`\
    \ function) dissolved.\n\nMany Enterprise environments discourage or do not allow\
    \ scripts to contain credential passwords. The `start.py` script can be slightly\
    \ modified to take advantage of Python’s capability to read external files, as\
    \ shown in the next example.\n\n### Secure Logon Script (`secureStart.py`)\n\n\
    `start.py` has a major flaw when it comes to security, as it contains a credential\
    \ password. `secureStart.py`, however, has the same capability as `start.py` to\
    \ establish a connection between EM CLI and an OMS, without revealing the credential\
    \ password in the script. The script instead opens a file from the filesystem\
    \ that contains the password and reads the password into a variable. It then uses\
    \ the contents of this variable as the credential password in the `login()` function.\n\
    \n`secureStart.py` is used in the same way as `start.py`. However, there are additional\
    \ requirements. The first requirement is to create a file on a filesystem accessible\
    \ from EM CLI that contains only the credential password in plain text. Secure\
    \ this file with permissions appropriate for your environment. In addition to\
    \ updating the `myurl` and the `myuser` script variables to match your environment,\
    \ the `mypassloc` script variable needs to be changed to the full path location\
    \ of the file containing the credential password. Take a look at the following:\n\
    \n```\nfrom emcli import *\n\nmyurl = 'https://em12cr3.example.com:7802/em'\n\
    mytrustall = 'TRUE'\nmyoutput = 'JSON'\nmyuser = 'sysman'\nmypassloc = '/home/oracle/.secret'\n\
    \nset_client_property('EMCLI_OMS_URL', myurl)\nset_client_property('EMCLI_TRUSTALL',\
    \ mytrustall)\nset_client_property('EMCLI_OUTPUT_TYPE', myoutput)\n\nmyfile =\
    \ open(mypassloc,'r')\nmypass = myfile.read()\n\nprint(login(username=myuser,\
    \ password=mypass))\n```\n\nThe logon scripts only establish a connection between\
    \ EM CLI and an OMS. They do not have any effect on the Enterprise Manager targets.\
    \ The remaining samples in this section demonstrate how to manipulate targets\
    \ using interactive or scripting modes.\n\n### Update Target Properties Commands\
    \ (`updatePropsFunc.py`)\n\nThe `updatePropsFunc.py` script contains the commands\
    \ needed to update the properties of Enterprise Manager targets. These commands\
    \ can be copied individually into an EM CLI interactive session after establishing\
    \ a logon. The full sample can also be put into a script and executed directly\
    \ (a logon will need to be established first) with EM CLI in scripting mode using\
    \ the command `emcli @updatePropsFunc.py`. This sample includes comments (lines\
    \ beginning with the hash character) about the script commands that should be\
    \ included when copying to a script. In EM CLI (as well as in Python and Jython),\
    \ any line beginning with a hash character is ignored.\n\n**Note:** View the logon\
    \ samples at the beginning of this section for information on how to establish\
    \ a logon in scripting or interactive mode.\n\n```\nfrom emcli import *\nimport\
    \ re\n\n# Regular expression applied to target name to filter target list\n# '.*'\
    \ includes all targets\n# '^orcl' includes all targets that begin with 'orcl'\n\
    # '^em12cr3\\.example\\.com$' includes target\n#        with the exact name 'em12cr3.example.com'\n\
    myfiltermatch = '.*'\n\n# Dictionary object containing the property names and\
    \ values\n#        to be applied to the target list\nmyprops = {'LifeCycle Status':'Development',\
    \ 'Location':'COLO'}\n\n# When debug is enabled, commands will be printed but\
    \ not executed\ndebug = True\n\n# Delimiter should be something that will not\
    \ appear\n#        in any target name\nmydelim = '@'\nmysubsep = 'property_records='\
    \ + mydelim\n\n# Compile the target name filter\nmyreg = re.compile(myfiltermatch)\n\
    \n# Retrieve the full target list from the OMS\nmyobj = get_targets().out()['data']\n\
    \n# Loop through the full target list\nfor targ in myobj:\n    # If the target\
    \ name filter applies...\n    if myreg.search(targ['Target Name']):\n        myproprecs\
    \ = targ['Target Name'] + mydelim + \\\n                     targ['Target Type']\
    \ + mydelim\n\n        # Loop through the target properties dictionary\n     \
    \   #         for each target\n        for propkey, propvalue in myprops.items():\n\
    \            myproprecprops = propkey + mydelim + propvalue\n\n            # If\
    \ debug is True, print the command to screen\n            #           without\
    \ executing\n            if debug:\n                mycommand = 'set_target_property_value('\
    \ + \\\n                            'subseparator=\"' + mysubsep + \\\n      \
    \                      '\", property_records=\"' + \\\n                      \
    \      myproprecs + \\\n                            myproprecprops + '\")'\n \
    \               print(mycommand)\n```"
