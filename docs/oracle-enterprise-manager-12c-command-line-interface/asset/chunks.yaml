    \ status..............Development\n\noracle_emd..............................em12cr3.example.com:3872\n\
    \               os............................Linux\n               platform......................x86_64\n\
    \               lifecycle status..............Development\n               location......................COLO\n\
    \               comment.......................Test EM\n               target version................12.1.0.3.0\n\
    ```\n\n`updateProps()` 的功能非常广泛，可以如你所愿地精细或宽泛。关于如何使用它的更详细描述可以在第 8 章中找到。充分利用 `updateProps()`\
    \ 类的最佳方式是理解代码本身。\n\n### 理解代码\n\n现在我们已经看到了代码本身及其工作原理概述，我们将分析代码以了解幕后发生的事情。理解代码不仅有助于你利用其所有功能，还能让你根据自己的喜好和需求对其进行定制。\n\
    \n首先要注意的是，类声明之后的所有内容都至少缩进四个空格。这意味着类声明之后的所有代码都是类的一部分。类内部是函数声明，每个函数下方是属于该函数的代码。让我们将其分解成更小的部分，以便准确理解代码在做什么以及为什么使用类提供了显著的优势。"
- fmt: "# The `__init__()` Function\n\nThe first function shown in [Listing 6-15](#9781484202395_Ch06.xhtml#list15)\
    \ is called `__init__()`. This is a reserved function name that will automatically\
    \ be executed when the class is called. The word `self` is a reference to the\
    \ instance created from the class. When an instance variable or object (preceded\
    \ by `self.`) is created, it is a variable or object assigned to the instance\
    \ for the life of that instance. When the `myinst` instance is created from `updateProps()`,\
    \ the list object `targs` and boolean variable `reloadtargs` are created as well.\
    \ Instance variables and objects can be viewed as part of the instance in most\
    \ cases.\n\nListing 6-15. `__init__()` is the initial function of the `updateProps()`\
    \ class\n\n```python\ndef __init__(self, agentfilter='.*', typefilter='.*',\n\
    \             namefilter='.*', propdict={}):\n    self.targs = []\n    self.reloadtargs\
    \ = True\n    self.props(propdict)\n    self.__loadtargobjects()\n    self.filt(agentfilter=agentfilter,\
    \ typefilter=typefilter,\n              namefilter=namefilter)\n```\n\nIn [Listing\
    \ 6-16](#9781484202395_Ch06.xhtml#list16), we create an instance object of the\
    \ `updateProps()` class by creating an instance of (executing) the class and assigning\
    \ that execution to a variable. Then we can print out the `reloadtargs` instance\
    \ variable. Notice that the word without parentheses is a `class` and the same\
    \ word with parentheses is an instance.\n\nListing 6-16. Create an instance from\
    \ the class\n\n```python\nemcli>import updateProps\nemcli>myinst = updateProps.updateProps()\n\
    emcli>print(myinst.reloadtargs)\nFalse\nemcli>type(updateProps.updateProps)\n\
    <type 'classobj'>\nemcli>type(updateProps.updateProps())\n<type 'instance'>\n\
    emcli>type(myinst)\n<type 'instance'>\n```\n\nThe last four lines of the `__init__`\
    \ function call the `props`, `__loadtargobjects`, and `filt` functions. The `props`\
    \ function, which sets the property keys and values, the `__loadtargobjects` function,\
    \ which caches the target information, and the `filt` function, which allows us\
    \ to filter the targets assigned to the instance, are defined further down in\
    \ the class. Creating an instance parses the entire class before processing commands,\
    \ so the ordering of functions within a class is not important.\n\n# The `__loadtargobjects()`\
    \ Function\n\nThe querying of the target information is a fairly expensive process\
    \ and can take between one and twenty seconds to run. The `__loadtargobjects`\
    \ function, as shown in [Listing 6-17](#9781484202395_Ch06.xhtml#list17), is a\
    \ performance-tuning function that makes the execution of the class more efficient.\
    \ It only queries and loads the target information on the creation of the instance\
    \ by being called within the `__init__` function, and then only when `self.reloadtargs`\
    \ is set to `True`.\n\nListing 6-17. The `__loadtargobjects()` of the `updateProps()`\
    \ class reloads the EM targets when necessary\n\n```python\ndef __loadtargobjects(self):\n\
    \    if self.reloadtargs == True:\n        self.reloadtargs = False\n        self.fulltargs\
    \ = \\\n          emcli.list(resource='Targets').out()['data']\n        self.targprops\
    \ = \\\n          emcli.list(resource='TargetProperties'\n                   \
    \ ).out()['data']\n```\n\n# The `props()` Function\n\nThe `props()` function shown\
    \ in [Listing 6-18](#9781484202395_Ch06.xhtml#list18) sets or modifies the `propdict`\
    \ variable, which holds the key value dictionary that is used to set the target\
    \ properties. This was turned into a function rather than just setting the parameter\
    \ directly, mainly because it can be called multiple times and includes the `assert`\
    \ statement for error checking.\n\nListing 6-18. The `props()` function of the\
    \ `updateProps()` class updates the `propdict` properties dictionary\n\n```python\n\
    def props(self, propdict):\n    assert isinstance(propdict, dict), \\\n      \
    \     'propdict parameter must be ' + \\\n           'a dictionary of ' + \\\n\
    \           '{\"property_name\":\"property_value\"}'\n    self.propdict = propdict\n\
    ```\n\n# The `filt()` Function\n\n[Listing 6-19](#9781484202395_Ch06.xhtml#list19)\
    \ shows the `filt()` function, which defines the scope of targets to which the\
    \ defined properties will be applied for this instance. Even after the filter\
    \ is applied, it can be queried or changed. The first three parameters (`agentfilter`,\
    \ `typefilter`, and `namefilter`) are compiled as regular expressions so as to\
    \ include or exclude targets for this instance. If the parameters are not defined\
    \ when the `filt()` function is called, they are defined implicitly to include\
    \ all targets. The `sort` parameter defines how the filtered targets should be\
    \ sorted, and, finally, the `show` parameter determines if the output of the filtered\
    \ target list will be printed to screen.\n\nListing 6-19. The `filt()` function\
    \ of the `updateProps()` class creates and manages the filtered list of targets\n\
    \n```python\ndef filt(self, agentfilter='.*', typefilter='.*',\n         namefilter='.*',\n\
    \         sort=('TARGET_TYPE','TARGET_NAME'), show=False):\n    self.targs = []\n\
    \    __agentcompfilt = re.compile(agentfilter)\n    __typecompfilt = re.compile(typefilter)\n\
    \    __namecompfilt = re.compile(namefilter)\n    self.__loadtargobjects()\n \
    \   for __inttarg in self.fulltargs:\n        if __typecompfilt.search(__inttarg['TARGET_TYPE'])\
    \ \\\n           and __namecompfilt.search(\n               __inttarg['TARGET_NAME'])\
    \ \\\n           and (__inttarg['EMD_URL'] == None or \\\n           __agentcompfilt.search(__inttarg['EMD_URL'])):\n\
    \            self.targs.append(__inttarg)\n    __myoperator = operator\n    for\
    \ __myop in sort:\n        __myoperator = operator.itemgetter(__myop)\n    self.targssort\
    \ = sorted(self.targs, key=__myoperator)\n    if show == True:\n        self.show()\n\
    ```\n\n`self.targs = []` defines or clears a list to store the filtered targets.\
    \ The next three lines compile the regular expressions for the first three filter\
    \ parameters. `self.__loadtargobjects()` calls the `__loadtargobjects()` function\
    \ to reload the full target list. The `for __inttarg in self.fulltargs:` loop\
    \ and its nested `if` statement create the filtered target list based on the filter\
    \ parameters. The `__myoperator = operator` and the following three lines define\
    \ the sort key and sort the filtered target list. Finally, the filtered, sorted\
    \ list can be printed to screen.\n\nUnless the target properties defined for the\
    \ `myinst` instance should be applied to all of the targets, the `filt` function\
    \ needs to be called. When the instance is created, the target list is created\
    \ as well and includes every target defined in Enterprise Manager. The `targs`\
    \ instance list object shows the number of targets currently defined for the instance,\
    \ as shown in [Listing 6-20](#9781484202395_Ch06.xhtml#list20).\n\nListing 6-20.\
    \ When an instance of `updateProps()` is created, it includes all targets\n\n\
    ```python\nemcli>len(myinst.targs)\n\n```\n\nIf this instance filtered list is\
    \ modified, the length of the `targs` object will reflect the change, as shown\
    \ in [Listing 6-21](#9781484202395_Ch06.xhtml#list21).\n\nListing 6-21. The instance\
    \ targets are pared down with the `filt()` function\n\n```python\nemcli>myinst.filt(namefilter='^orcl.*\\\
    .example\\.com')\nemcli>len(myinst.targs)\n\n```\n\nThe filtering of the target\
    \ list could also take place during instance creation, as shown in [Listing 6-22](#9781484202395_Ch06.xhtml#list22).\n\
    \nListing 6-22. The instance targets are pared down as part of the instance creation\n\
    \n```python\nemcli>myinst = updateProps.updateProps(namefilter='^orcl.*\\.example\\\
    .com')\nemcli>len(myinst.targs)\n\n```"
