    \ Oracle 社区，他们总能让我渴望成为一名更好的技术专家，其能力令人惊叹。\n\n我的妻子瓦莱丽（Valerie）让我的生活每天都变得更好。她对这个项目的鼓励对于项目的完成至关重要。我还要感谢那些出色的\
    \ Oracle 员工，他们使 OEM 成为了一个优秀的工具。维尔纳·德格鲁特（Werner De Gruyter）、安娜·麦科勒姆（Ana McCollum）、阿迪什·弗莱（Adeesh\
    \ Fulay）和莫琳·伯恩（Maureen Byrne）都通过用户反馈和理解，表现出对改进 OEM 的真正兴趣。他们的见解使这一切变得清晰。\n\n# 第一章\n\
    \n![image](img/frontdot.jpg)\n\n## 架构\n\nOracle Enterprise Manager 12c 提供了一个可扩展且可靠的中央存储库、一个控制台以及用于管理所有\
    \ Oracle 产品的服务。用户通常通过 OEM 控制台与 OEM 交互，该控制台具有丰富的直观图形界面。\n\nEnterprise Manager 命令行界面\
    \ (EM CLI) 提供了在控制台之外访问 OEM 系统功能的途径。例如，作为其有用性的一个例证，交互式 EM CLI 任务可以取代定义 EM 管理员账户和角色时冗长的点击流。EM\
    \ CLI 交互命令可以在 shell 脚本中使用，或者通过 CLI 自身的 Jython 脚本模式进行 CLI 调用。\n\n本书探讨了您可以应用这些技术来简化和自动化\
    \ Oracle 环境中的任务的不同方式。\n\n### 企业管理器框架\n\nOracle Enterprise Manager 应用程序作为 JEE 应用程序，在\
    \ WebLogic 服务器上的 WebLogic Server J2EE 域中运行。这种组合被称为 Oracle Management Server，或\
    \ OMS。\n\n在 OMS 上运行的 Java 进程收集并处理来自您远程主机上的 EM 代理的 XML 文件上传。该信息被发布到存储库数据库，并存储在\
    \ SYSMAN 模式中。\n\n当您在 OEM 控制台上查看页面时，数据是从存储库数据库中组装以供呈现的。同样，您从控制台发出的命令通过 OMS 进行处理，以更新存储库信息（例如，指标收集或通知），或通过调用\
    \ EM 代理或通过到远程数据库或主机的经过身份验证的连接来操纵受管目标。\n\n控制台发出的每个命令都会执行一个 Java 程序。控制台不仅征集和组装数据，还提供这些例程执行所需的输入命令。大部分操作和查询代码库都可以通过\
    \ EM CLI 访问。\n\nEM CLI 程序本身是一个轻量级的 Java 程序，它执行与控制台页面相同的活动，但使用作为命令行输入传递的值立即执行 OMS\
    \ 模块；它通常用于 shell 脚本或 Jython 程序中。\n\n### EM CLI 动词\n\n接口命令被称为 `动词`。每个动词执行单个任务，并以合理的反馈成功返回，或者返回快速且明显的失败消息。\n\
    \n许多动词需要在命令行上提供输入值。与 PL/SQL 包类似，您的输入必须使用非常特定的语法传递给 OMS。这些值前面总是一个过滤器关键字，并且大多数输入要求您的字符串用双引号括起来。\n\
    \n![Image](img/sq.jpg) `注意` 作者们对引号的使用经验不一。推荐使用，但通常不是必需的。为了清晰起见，我们将在示例中使用它们。您可能会发现并不总是需要它们，或者您更倾向于不使用它们。\n\
    \n使用 `get_targets` 动词显示或捕获环境中目标的列表，如下所示：\n\n```\nemcli get_targets\n```\n\n要仅查找\
    \ Oracle 数据库目标，您需要使用 `targets` 关键字过滤请求：\n\n```\nemcli get_targets -targets=\"\
    oracle_database\"\n```\n\n本书中的众多示例展示了动词和输入值如何应用。EM CLI 动词及其语法的目录可在 Oracle 支持文档\
    \ E17786-x 中找到。请注意，有些动词与需要许可费的管理包相关联。您还可以在命令行上找到在线帮助，列出所有可用的动词及其预期用途。例如：\n\n```\n\
    emcli help\nSummary of commands:\n\nargfile    -- Execute emcli verbs from a file\n\
    \    help       -- Get help for emcli verbs (Usage: emcli help [verb_name])\n\
    \    login      -- Login to the EM Management Server (OMS)\n    logout     --\
    \ Logout from the EM Management Server\n    setup      -- Setup emcli to work\
    \ with an EM Management Server\n    status     -- List emcli configuration details\n\
    \    sync       -- Synchronize with the EM Management Server\n    version    --\
    \ List emcli verb versions or the emcli client version\n\nAdd Host Verbs\n   \
    \ continue_add_host             -- Continue a failed Add Host session\n    get_add_host_status\
    \           -- Displays the latest status of an Add Host session.\n    list_add_host_platforms\
    \       -- Lists the platforms on which the Add Host operation can be performed.\n\
