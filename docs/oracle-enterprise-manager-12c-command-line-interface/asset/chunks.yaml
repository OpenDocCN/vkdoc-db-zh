  trans: "\n本节中的示例与第 6 章中使用的代码示例相同，且全部使用 Python 编程语言编写。上一节的示例使用操作系统 Shell 来实现所有脚本功能（例如变量、`for`循环、`if\
    \ then else`等），而本节中的示例将全部使用 EM CLI 及其 Jython Shell 来实现。由于这些示例不依赖于任何 Shell 脚本功能，它们可以在\
    \ EM CLI 支持的任何平台上使用。\n\n### 简单登录脚本 (`start.py`)\n\n下面的代码示例可以直接复制到文本文件中。它用于设置一些重要的会话属性，并在\
    \ EM CLI 客户端与其连接的 OMS 之间建立安全连接。在使用此脚本前，需要根据您的环境更新变量 `myurl`、`myuser` 和 `mypass`：\n\
    \n```\nfrom emcli import *\n\nmyurl = 'https://em12cr3.example.com:7802/em'\n\
    mytrustall = 'TRUE'\nmyoutput = 'JSON'\nmyuser = 'sysman'\nmypass = 'foobar'\n\
    \nset_client_property('EMCLI_OMS_URL', myurl)\nset_client_property('EMCLI_TRUSTALL',\
    \ mytrustall)\nset_client_property('EMCLI_OUTPUT_TYPE', myoutput)\nprint(login(username=myuser,\
    \ password=mypass))\n```\n\n`start.py` 脚本可以在脚本模式和交互模式下使用。在脚本模式下，可以直接使用命令 `emcli\
    \ @start.py` 从 EM CLI 执行该脚本。结果将是成功或失败地在 EM CLI 与 OMS 之间建立连接。除非您只是想确认连接可以建立，否则单独使用此脚本可能用处不大。\n\
    \n`start.py` 通常被其他脚本调用，或者在交互模式下，从 EM CLI Jython 命令行界面调用（不要与命令行模式混淆）。从另一个脚本调用 `start.py`\
    \ 是通过将脚本作为模块导入来完成的。\n\n例如，一个名为 `sync.py` 的脚本在脚本模式下使用命令 `emcli @sync.py` 调用。在执行命令之前，必须先建立\
    \ EM CLI 与 OMS 之间的连接。如果 `start.py` 脚本位于 `JYTHONPATH` 包含的目录中，则可以使用 `import start`\
    \ 作为第一个命令来调用该登录脚本。\n\n**注意：** `JYTHONPATH` 是一个 Shell 环境变量，EM CLI 将使用它来确定导入模块时要搜索的所有目录。要添加一个目录，请根据\
    \ Shell 标准补充该变量，类似于将目录添加到 `PATH` 环境变量的方式。\n\n另一种方法是使用命令 `emcli @start.py` 在脚本模式下执行\
    \ `start.py`，然后在 `start.py` 的最后一行调用 `sync.py` (`import sync`) 脚本。此方法假定 `sync.py`\
    \ 位于 `JYTHONPATH` 环境变量的可搜索路径中。\n\n当使用交互模式时，`start.py` 脚本必须位于 `JYTHONPATH` 的可搜索路径中，并通过\
    \ `import start` 调用。登录现在将为当前交互会话的生命周期建立，直到登录被隐式（超时过期）或显式（使用 `logout()` 函数）解除。\n\
    \n许多企业环境不鼓励或不允许脚本包含凭据密码。可以对 `start.py` 脚本稍作修改，以利用 Python 读取外部文件的功能，如下一个示例所示。\n\
    \n### 安全登录脚本 (`secureStart.py`)\n\n`start.py` 在安全性方面有一个主要缺陷，因为它包含凭据密码。然而，`secureStart.py`\
    \ 与 `start.py` 具有相同的能力，可以在不泄露脚本中凭据密码的情况下，在 EM CLI 与 OMS 之间建立连接。该脚本改为打开文件系统中的一个文件，该文件包含密码，并将密码读入一个变量。然后，它在\
    \ `login()` 函数中使用此变量的内容作为凭据密码。\n\n`secureStart.py` 的使用方法与 `start.py` 相同。但是，有额外的要求。第一个要求是在\
    \ EM CLI 可访问的文件系统上创建一个仅包含明文凭据密码的文件。请根据您的环境使用适当的权限保护此文件。除了更新脚本变量 `myurl` 和 `myuser`\
    \ 以匹配您的环境外，还需要将脚本变量 `mypassloc` 更改为包含凭据密码的文件的完整路径位置。请看以下示例：\n\n```\nfrom emcli\
    \ import *\n\nmyurl = 'https://em12cr3.example.com:7802/em'\nmytrustall = 'TRUE'\n\
    myoutput = 'JSON'\nmyuser = 'sysman'\nmypassloc = '/home/oracle/.secret'\n\nset_client_property('EMCLI_OMS_URL',\
    \ myurl)\nset_client_property('EMCLI_TRUSTALL', mytrustall)\nset_client_property('EMCLI_OUTPUT_TYPE',\
    \ myoutput)\n\nmyfile = open(mypassloc,'r')\nmypass = myfile.read()\n\nprint(login(username=myuser,\
