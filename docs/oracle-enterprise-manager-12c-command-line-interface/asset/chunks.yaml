    \ 7-4 所示。\n\n![9781484202395_Fig07-04.jpg](img/9781484202395_Fig07-04.jpg)\n*图\
    \ 7-4. 在 EM12c 中访问软件库*\n\n在软件库中，已经存在许多文件夹，但应该创建一个新文件夹来存放脚本。右键点击 `Software Library`（目录中的顶层），然后点击\
    \ `Create Folder`（图 7-5）。\n\n![9781484202395_Fig07-05.jpg](img/9781484202395_Fig07-05.jpg)\n\
    *图 7-5. 在 EM12c 软件库中创建文件夹*\n\n屏幕图 7-6 弹出，允许您输入与文件夹相关的信息。\n\n![9781484202395_Fig07-06.jpg](img/9781484202395_Fig07-06.jpg)\n\
    *图 7-6. 在软件库中创建文件夹的信息条目*\n\n输入一个明确定义文件夹用途的名称，并添加一个描述以帮助任何阅读该文件夹属性的人。确认您希望在软件库的父目录中创建该文件夹，满意后点击`OK`。\n\
    \n返回到软件库的主页，新文件夹现在将出现在下拉列表中（图 7-7）：\n\n![9781484202395_Fig07-07.jpg](img/9781484202395_Fig07-07.jpg)\n\
    *图 7-7. 刚在软件库中为命令行脚本创建的新文件夹*\n\n此文件夹将用于在软件库中存放`EM CLI`脚本，从而轻松地将它们与其他存储实体区分开来。\n\
    \n## 将脚本添加到软件库\n\n从上一节创建的文件夹加载脚本是在软件库内的相同区域执行的。首先，高亮显示已创建的`CLI_Scripts`文件夹，然后依次点击`Actions`、`Create\
    \ Entity`，最后点击`Component`（图 7-8）。\n\n![9781484202395_Fig07-08.jpg](img/9781484202395_Fig07-08.jpg)\n\
    *图 7-8. 将脚本添加到软件库（即创建实体）*\n\n脚本将被构建为一个可以从软件库部署的单一组件。如果多个脚本是单个部署过程的一部分，可以将它们存储在一个组件中。\n\
    \n您可以选择将文件上传到库中或引用文件（一个引用）。对于此处的示例，目标是签入一个脚本。它将被存储为一个单一的通用组件（即实体）。\n\n选择将要上传到的软件库位置。在我们的示例中，我们将使用默认的上传共享位置。逻辑位置将是控制台内的`CLI_Scripts`文件夹。"
- fmt: "# Enterprise Manager 12c Cloud Control中的软件库与CLI作业操作\n\n![9781484202395_Fig07-09.jpg](Images/9781484202395_Fig07-09.jpg)\n\
    \n图 7-9. 如何在软件库中创建通用组件并选择文件\n\n点击“确定”，系统会提示第二个窗口，您可以在其中提供有关即将添加到软件库的实体（即脚本）的信息（[图\
    \ 7-10](#9781484202395_Ch07.xhtml#Fig10)）。\n\n![9781484202395_Fig07-10.jpg](Images/9781484202395_Fig07-10.jpg)\n\
    \n[图 7-10](#9781484202395_Ch07.xhtml#_Fig10). 为要上传到软件库的脚本输入描述性数据和路径信息\n\n点击“下一步”添加脚本。我们上传的是一个简单的脚本，它以美观的视图列出目标（[图\
    \ 7-11](#9781484202395_Ch07.xhtml#Fig11)）。点击“添加”按钮，浏览到脚本（它可以位于本地工作站上），然后点击“确定”。点击“保存”，因为我们不需要添加任何其他配置信息，至此脚本上传到软件库的操作即告完成。\n\
    \n![9781484202395_Fig07-11.jpg](Images/9781484202395_Fig07-11.jpg)\n\n[图 7-11](#9781484202395_Ch07.xhtml#_Fig11).\
    \ 在软件库文件夹 `CLI Target Script` 中添加、编辑和删除脚本的选项\n\n![Image](Images/sq.jpg) **提示**：所有签入软件库的实体必须具有唯一的名称。如果您添加的脚本与软件库中已有的脚本同名，系统会要求您在添加前对其进行重命名。\n\
    \n现在，`CLI Target Script` 在库中可见，并可供软件库使用。\n\n## 构建报告定义库\n\n可以构建软件库文件夹，从而创建一个可供存储库使用的库，而不是每次都编写新脚本或让脚本驻留在不同的主机或工作站上。\n\
    \n请像规划其他实体一样，仔细规划这个库。创建一个独立的库文件夹位置，并考虑此类型配置所需的空间分配。规划来自其他功能的实体，例如度量扩展、软件安装和应用程序构建，这些在完成复合报告时将成为报告定义的一部分。\n\
    \n## 使用CLI调用的OEM作业\n\n企业作业是 EM 环境的支柱。它们在幕后运行我们作为 Enterprise Manager 12c Cloud\
    \ Control 的一部分每天使用的许多功能。管理员拥有从命令行运行 EM 作业的附加能力。一旦收集了需求并熟悉了它们，设置通过 `emcli` 运行的作业是一个简单的过程。使用\
    \ EM CLI 中 `create_job` 动词的 `help` 函数，我们可以收集需求：\n\n```\n$ emcli help create_job\n\
    emcli create_job\n     -name=<job_name>\n     -type=<job_type>\n     -input_file=\"\
    property_file:<filename>\"\nDescription:\n Create and schedule a job.\n\nOptions:\n\
    \     -name: Optional parameter. The name may be specified in the input file instead.\n\
    \     -type: Optional parameter. The type may be specified in the input file instead.\n\
    \     -input_file: Required parameter. <filename> must be provided to load the\
    \ properties for\n                    creating and scheduling the job.\n\nA template\
    \ property file for the job_type can be obtained using EMCLI verb \"describe_job_type\"\
    .\n Another job of the same job type could also be used to generate the property\
    \ file using EMCLI verb \n\"describe_job\".\n Please make sure that the property\
    \ file is accessible to the EMCLI client for reading.\n\nSample:\n Create and\
    \ schedule a job with name MYJOB1 and of job type MyJobType1 with property file\
    \ present at \nlocation /tmp/myjob1_prop.txt\n     emcli create_job -name=MYJOB1\
    \ -job_type=MyJobType1 -\ninput_file=\"property_file:/tmp/myjob1_prop.txt\"\n\
    ```\n\n### 创建作业\n\n必须执行以下步骤来创建作业。在我们的示例中，我们将首先对六个现有代理的主机执行升级，然后删除那些之前的代理。\n\n\
    **升级步骤：**\n1.  检查有哪些代理可用于升级。\n2.  输入并使用文件列出这些代理，并使用该文件作为我们作业的一部分。\n3.  升级代理。\n\
    4.  升级完成后检查进程状态。\n\n**移除旧代理步骤：**\n1.  检查升级后可以清理哪些现有的代理安装。\n2.  使用 EM CLI 卸载旧的代理安装。\n\
    3.  使用 EM CLI 主机命令删除每个旧的代理主目录。\n\n### 步骤1：升级代理\n\n列出我们将作为 EM 作业一部分升级的代理：\n\n```\n\
    >emcli get_upgradable_agents > /u01/app/scripts/upg_agents.txt\n\norcl2:3872 12.1.0.2.0\
    \ 12.1.0.3.0 Linux x86-64\n /u01/app/oracle/Agent12c/core/12.1.0.2.0\norcl1:3872\
    \ 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/Agent12c/core/12.1.0.2.0\n\
    \n>vi /u01/app/scripts/upg_agents.txt\n移除版本信息和平台信息。剩下的应该是代理主机和端口：\norcl2:3872\n\
    orcl1:3872\n...\n```\n\n使用此文件创建一个 EM 作业来升级代理，并确保 `stage_location` 目录值有至少 2 GB\
    \ 的空间：\n\n```\n>emcli upgrade_agents -input_file=\"agents_file:/u01/app/scripts/upg_agents.txt\"\
    \ -job_\nname=\"UPG_021814_AGENTS\" -stage_location=/u01/app/jobs\nThe agent list\
    \ size is 6\n\nUpgradable Agents\n\nAgent Installed Version Version After Upgrade\
    \ Platform Oracle Home\n----- ----------------- --------------------- --------\
    \ ----\norcl2:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.2.0\n\
    orcl1:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.2.0\n\
    \nYou can run the the root.sh from the EM CLI to each of the hosts that have been\
    \ granted root/sudo \nprivileges (one more reason to be offered this access via\
    \ the EM12c environment). If the preferred \ncredentials do NOT have root access,\
    \ then you will need to run it manually via the EM CLI or from \neach of the agent\
    \ targets to complete the installations.\n\nAgent Reason\n----- ------\norcl1:3872\
    \ Preferred Privileged Credential for Oracle Home of Agent : Not Set | Privilege\
    \ Delegation \nfor Host : Not Set\n\nOnce the agent has been upgraded, you will\
    \ see the following message so you can check the status of \nthe job quickly from\
    \ within the console:\n\nAgent Upgrade Job submitted for Upgradable Agents shown\
    \ above. Use emcli get_agent_upgrade_status \ncommand or goto EM CONSOLE -> Set\
    \ Up -> Manage Cloud Control -> Upgrade Agents -> Agent Upgrade \nResults to see\
    \ job status\nJob Name : UPG_021814_AGENTS\n>emcli get_agent_upgrade_status -job_name=UPG_021814_AGENTS\n\
    \nShowing for each agent in the job UPG_021814_AGENTS\n\nAgent Status Started\
    \ Ended\n----- ------ ------- -----\norcl2:3872 Running 2014-02-18 15:32:58 MST\
    \ -\norcl1:3872 Running 2014-02-18 15:32:58 MST –\n...\n```\n\n如果发生任何失败，您需要通过控制台进行检查（这是最简单的访问方式），或者查询\
    \ EM 存储库。在此示例中，我们将查看高级状态：\n\n```\n>emcli get_agent_upgrade_status -job_name=UPG_021814_AGENTS\n\
    \nShowing for each agent in the job UPG_021814_AGENTS\n\nAgent Status Started\
    \ Ended\n----- ------ ------- -----\norcl2:3872 Success 2014-02-18 15:32:08 MST\
    \ 2014-02-18 15:53:22 MST\n...\n```\n\n我们现在可以使用此信息为下一步创建输入文件，以移除我们不再需要在 EM12c\
    \ 环境中的所有代理安装：\n\n```\n>emcli get_signoff_agents -output_file=\"/u01/app/work/signoff_021814.txt\"\
    \n```\n\n上述命令将输出到一个文件，该文件可用于下一步：\n\n```\nAgents available for Sign-off\n\nAgent\
    \ Installed Version Platform Oracle Home\n\n----- ----------------- -------- -----------\n\
    \norcl2:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\
    \norcl1:3872 12.1.0.3.0 Linux x86-64 /u02/oracle/agent12cR2/core/12.1.0.3.0\n\n\
    orcl3:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\n\
    orcl4:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\
    ```"
  raw: "![9781484202395_Fig07-09.jpg](Images/9781484202395_Fig07-09.jpg)\n\nFigure\
    \ 7-9\\. How to create generic components and select files in the software library\n\
    \nClick on OK and you’ll be prompted with a second window where you can provide\
    \ information about the entity (i.e., script) you are about to add to the software\
    \ library ([Figure 7-10](#9781484202395_Ch07.xhtml#Fig10)).\n\n![9781484202395_Fig07-10.jpg](Images/9781484202395_Fig07-10.jpg)\n\
    \n[Figure 7-10](#9781484202395_Ch07.xhtml#_Fig10). Entering descriptive data and\
    \ path information about scripts to be uploaded to the software library\n\nClick\
    \ on Next to add the script. The script we are uploading is a simple one that\
    \ lists out targets in an aesthetically appealing view ([Figure 7-11](#9781484202395_Ch07.xhtml#Fig11)).\
    \ Click on the Add button, browse to the script (it can be local on the workstation),\
    \ and click OK. Click Save, as we don’t need to add any other provisioning information,\
    \ and the upload of the script to the software library is complete.\n\n![9781484202395_Fig07-11.jpg](Images/9781484202395_Fig07-11.jpg)\n\
    \n[Figure 7-11](#9781484202395_Ch07.xhtml#_Fig11). Options for adding, editing,\
    \ and deleting scripts from the software library folder CLI Target Script\n\n\
    ![Image](Images/sq.jpg) **Tip**  All entities checked into the software library\
    \ must have a unique name. If you are adding a script that has the same name as\
    \ one that already exists in the software library, it will ask you to rename it\
    \ before adding it.\n\nThe CLI Target Script is now visible in the library and\
    \ available to the software library.\n\nBuilding a Report Definition Library\n\
    \nThe software library folders can be built out to then create a library available\
    \ to the repository, rather than writing new scripts each time or having scripts\
    \ housed on different hosts or workstations.\n\nPlan out the library carefully,\
    \ just as you did for the other entities. Create a separate library folder location\
    \ and consider the space allocation required for this type of provisioning. Plan\
    \ for entities from other features, such as metric extensions, software installations,\
    \ and application builds that will need to be part of a report definition when\
    \ completing a composite report.\n\nOEM Jobs Using CLI Calls\n\nEnterprise jobs\
    \ are the backbone of the EM environment. They run everything behind the scenes\
    \ for many of the features that we use every day as part of Enterprise Manager\
    \ 12c Cloud Control. The administrator has the added capability to run EM jobs\
    \ from the command line. Setting up jobs to run from the EM CLI is a simple process\
    \ once one gathers requirements and becomes familiar with them. Using the `help`\
    \ function for the `create_job` verb in the EM CLI, we can gather the requirements:\n\
    \n```\n$ emcli help create_job\nemcli create_job\n     -name=<job_name>\n    \
    \ -type=<job_type>\n     -input_file=\"property_file:<filename>\"\nDescription:\n\
    \ Create and schedule a job.\n\nOptions:\n     -name: Optional parameter. The\
    \ name may be specified in the input file instead.\n     -type: Optional parameter.\
    \ The type may be specified in the input file instead.\n     -input_file: Required\
    \ parameter. <filename> must be provided to load the properties for\n        \
    \            creating and scheduling the job.\n\nA template property file for\
    \ the job_type can be obtained using EMCLI verb \"describe_job_type\".\n Another\
    \ job of the same job type could also be used to generate the property file using\
    \ EMCLI verb \n\"describe_job\".\n Please make sure that the property file is\
    \ accessible to the EMCLI client for reading.\n\nSample:\n Create and schedule\
    \ a job with name MYJOB1 and of job type MyJobType1 with property file present\
    \ at \nlocation /tmp/myjob1_prop.txt\n     emcli create_job -name=MYJOB1 -job_type=MyJobType1\
    \ -\ninput_file=\"property_file:/tmp/myjob1_prop.txt\"\n```\n\nCreate a Job\n\n\
    The following steps must be performed to create a job. In our example, we will\
    \ first perform upgrades to six existing agents’ hosts and then remove those previous\
    \ agents.\n\nTo upgrade:\n\n1.  Check to see what agents are available for upgrades.\n\
    2.  Input and use file to list those agents and use said file as part of our job.\n\
    3.  Upgrade the agents.\n4.  Check the status of the process once upgrade is completed.\n\
    \nTo remove previous agents:\n\n1.  Check on what existing agents’ installations\
    \ can be cleaned up after the upgrade.\n2.  Use EM CLI to uninstall the old agent\
    \ installation.\n3.  Use an EM CLI host command to remove each of the old agent\
    \ home directories.\n\nStep 1: Upgrade Agents\n\nList out the agents that we’ll\
    \ be upgrading as part of the EM job:\n\n```\n>emcli get_upgradable_agents > /u01/app/scripts/upg_agents.txt\n\
    \norcl2:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64\n /u01/app/oracle/Agent12c/core/12.1.0.2.0\n\
    orcl1:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/Agent12c/core/12.1.0.2.0\n\
    \n>vi /u01/app/scripts/upg_agents.txt\nRemove the version information and the\
    \ platform. You should be left with is the agent host and port:\norcl2:3872\n\
    orcl1:3872\n...\n```\n\nUse this file to create an EM job that upgrades the agents\
    \ and ensures the `stage_location` direction value has at least 2 GB of space:\n\
    \n```\n>emcli upgrade_agents -input_file=\"agents_file:/u01/app/scripts/upg_agents.txt\"\
    \ -job_\nname=\"UPG_021814_AGENTS\" -stage_location=/u01/app/jobs\nThe agent list\
    \ size is 6\n\nUpgradable Agents\n\nAgent Installed Version Version After Upgrade\
    \ Platform Oracle Home\n----- ----------------- --------------------- --------\
    \ ----\norcl2:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.2.0\n\
    orcl1:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.2.0\n\
    \nYou can run the the root.sh from the EM CLI to each of the hosts that have been\
    \ granted root/sudo \nprivileges (one more reason to be offered this access via\
    \ the EM12c environment). If the preferred \ncredentials do NOT have root access,\
    \ then you will need to run it manually via the EM CLI or from \neach of the agent\
    \ targets to complete the installations.\n\nAgent Reason\n----- ------\norcl1:3872\
    \ Preferred Privileged Credential for Oracle Home of Agent : Not Set | Privilege\
    \ Delegation \nfor Host : Not Set\n\nOnce the agent has been upgraded, you will\
    \ see the following message so you can check the status of \nthe job quickly from\
    \ within the console:\n\nAgent Upgrade Job submitted for Upgradable Agents shown\
    \ above. Use emcli get_agent_upgrade_status \ncommand or goto EM CONSOLE -> Set\
    \ Up -> Manage Cloud Control -> Upgrade Agents -> Agent Upgrade \nResults to see\
    \ job status\nJob Name : UPG_021814_AGENTS\n>emcli get_agent_upgrade_status -job_name=UPG_021814_AGENTS\n\
    \nShowing for each agent in the job UPG_021814_AGENTS\n\nAgent Status Started\
    \ Ended\n----- ------ ------- -----\norcl2:3872 Running 2014-02-18 15:32:58 MST\
    \ -\norcl1:3872 Running 2014-02-18 15:32:58 MST –\n...\n```\n\nIf any failures\
    \ occurred, you will want to check those via the console for the easiest access,\
    \ or you will need to query the EM repository. For this example, we will look\
    \ at the high-level status:\n\n```\n>emcli get_agent_upgrade_status -job_name=UPG_021814_AGENTS\n\
    \nShowing for each agent in the job UPG_021814_AGENTS\n\nAgent Status Started\
    \ Ended\n----- ------ ------- -----\norcl2:3872 Success 2014-02-18 15:32:08 MST\
    \ 2014-02-18 15:53:22 MST\n...\n```\n\nWe can now use this information to create\
    \ the input file for the next step of removing all of the agents’ installations\
    \ we no longer want in our EM12c environment:\n\n```\n>emcli get_signoff_agents\
    \ -output_file=\"/u01/app/work/signoff_021814.txt\"\n```\n\nThe previous command\
    \ will send to an output file that can be used for the next step:\n\n```\nAgents\
    \ available for Sign-off\n\nAgent Installed Version Platform Oracle Home\n\n-----\
    \ ----------------- -------- -----------\n\norcl2:3872 12.1.0.3.0 Linux x86-64\
    \ /u01/app/oracle/agent12c/core/12.1.0.3.0\n\norcl1:3872 12.1.0.3.0 Linux x86-64\
    \ /u02/oracle/agent12cR2/core/12.1.0.3.0\n\norcl3:3872 12.1.0.3.0 Linux x86-64\
    \ /u01/app/oracle/agent12c/core/12.1.0.3.0\n\norcl4:3872 12.1.0.3.0 Linux x86-64\
    \ /u01/app/oracle/agent12c/core/12.1.0.3.0"
  trans: "# Enterprise Manager 12c Cloud Control 中的软件库与 CLI 作业操作\n\n![9781484202395_Fig07-09.jpg](img/9781484202395_Fig07-09.jpg)\n\
