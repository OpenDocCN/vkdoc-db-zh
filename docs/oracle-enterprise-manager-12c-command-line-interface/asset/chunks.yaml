    \   mkdir ${STAGE_DIR}\nfi\n\nchmod 770 ${STAGE_DIR}\n}\n```\n\n## BackupConfigFile\n\
    ```bash\nfunction BackupConfigFile {\n\nsourceFILE=${SOURCE_DIR}/${FILENAME}\n\
    stageFILE=${TARGET_DIR}/staging/${FILENAME}\ntargetFILE=${TARGET_DIR}/${FILENAME}\n\
    oldFILE=${targetFILE}.old\noldZIP=${oldFILE}.zip\n\nDashedBreak\n\nif [ -f ${sourceFILE}\
    \ ]; then\n   if [ -f ${targetFILE} ]; then\n      echo \"\\nBacking up ${sourceFILE}\\\
    n\"\n      cp -f ${sourceFILE} ${stageFILE}\n      if [ `diff ${stageFILE} ${targetFILE}\
    \ | wc -l` -gt 1 ]; then\n         echo \"\\n\\tExisting backup file will be renamed\
    \ and gzipped\\n\"\n            if [ -f ${targetFILE} ]; then\n              \
    \ ## Get rid of older copies of both files\n               [ $oldZIP ] && rm -f\
    \ ${oldZIP}\n               [ $oldFILE ] && rm -f ${oldFILE}\n               ##\
