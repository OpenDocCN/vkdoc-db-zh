  trans: "\n# EM CLI 中的列表\n\n下一个示例展示了如何通过提取并删除 `myshortlist` 的最后一个元素来进一步操作列表。此示例中的第一条命令完成了三件事：`pop()`\
    \ 函数从 `mylist` 中提取并删除最后一个元素，创建 `myshortlist` 列表对象，并将“弹出”的元素赋给它。如果 `pop()` 函数前没有对象赋值，它只会简单地打印该元素：\n\
    \n```python\n>>> myshortlist = mylist.pop()\n>>> print(myshortlist)\nsix\n>>>\
    \ print(mylist)\n['one', 'two', 'three', 'four', 'five']\n```\n\n列表在 EM CLI 中扮演着关键角色。EM\
    \ CLI 中函数的输出可能会产生一个包含数百甚至数千个元素的列表，这些元素可以由字符串、数字或其他对象组成。EM CLI 中的列表工作方式与前面示例中的完全相同。\n\
    \n理解以下示例的所有内容目前并不重要，但需要注意的是，`list()` 函数是 EM CLI 中最常用的函数之一，并且总是返回一个列表对象。该列表有 29\
    \ 个元素，可以逐个“弹出”并赋给另一个对象：\n\n```python\nemcli>mytargs = list(resource='Targets').out()['data']\n\
    emcli>type(mytargs)\n<type 'list'>\nemcli>len(mytargs)\n\nemcli>myshorttargs =\
    \ mytargs.pop()\nemcli>print(myshorttargs)\n{'TYPE_DISPLAY_NAME': 'Oracle WebLogic\
    \ Server', 'TYPE_QUA...\n```\n\n`list()` EM CLI 函数的输出是一个目标信息的列表。\n\n# 字符串与列表\n\
    \n本节将展示如何通过 Linux 的 `ps` 和 `grep` 命令，在 Linux 系统中完成查找正在运行的 Oracle 数据库监听器这一常见任务。示例的第一部分将展示如何生成进程信息。第二部分将展示如何使用各种\
    \ Linux 工具解析 `ps` 命令的输出，随后使用 Python 完成相同的任务。\n\n清单 6-1 展示了一个 Oracle 数据库监听器后台进程的详细列表。`ps\
    \ -ef` 命令列出服务器上所有正在运行的进程，这些进程通过管道传递给 `grep`，以将输出限制为仅监听器进程。\n\n## 清单 6-1. 在 Linux\
    \ 中查找 Oracle 数据库监听器进程\n\n```bash\n[oracle@server ]$ ps -ef | grep [t]nslsnr\n\
    oracle    1723     1  0 16:21 ?        00:00:01 \n/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
    \ LISTENER -inherit\n```\n\n`ps` 和 `grep` 的组合显示有一个监听器正在运行，并在输出的第八列显示了完整的命令。监听器命令实际上包含两个空格，因此对我们来说，该命令看起来跨越了第八、第九和第十个以空格分隔的列。`awk`\
    \ 命令可以很好地解析这些信息，如清单 6-2 所示。\n\n## 清单 6-2. 使用 `awk` 解析进程详细信息\n\n```bash\n[oracle@server\
    \ ]$ ps -ef | grep [t]nslsnr | awk '{print $8,$9,$10}'\n/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
    \ LISTENER -inherit\n```\n\n清单 6-3 展示了 Python 会将 `ps` 命令的输出视为由多个部分组成的对象。前一个示例中使用的分隔符是一个或多个空格。我们可以使用\
    \ Python 而不是 `awk` 来解析相同的命令。\n\n## 清单 6-3. 使用 Python 解析进程详细信息\n\n```python\n>>>\
    \ psout = 'oracle 1723  1  0 16:21 ? 00:00:01 /u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
    \ LISTENER -inherit'\n>>> type(psout)\n<type 'str'>\n>>> psoutlist = psout.split()\n\
    >>> type(psoutlist)\n<type 'list'>\n>>> psoutlist[7:]\n['/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr',\
    \ 'LISTENER', '-inherit']\n>>> ' '.join(psoutlist[7:])\n'/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
    \ LISTENER -inherit'\n>>> psoutstring = ' '.join(psoutlist[7:])\n>>> psoutstring\n\
    '/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr LISTENER -inherit'\n```\n\
    \n`psoutlist = psout.split()` 根据空白符分隔符将字符串拆分为一个由字符串元素组成的列表，并将其赋给 `psoutlist` 列表对象。`psoutlist[7:]`\
    \ 打印 `psoutlist` 列表对象从第八个（记住列表索引从 0 开始）到最后一个元素的子集。`psoutstring = ' '.join(psoutlist[7:])`\
    \ 将元素子集重新连接成一个以单个空格分隔的字符串，并将其赋给 `psoutstring` 字符串对象。真正让 Python 大放异彩的是，这一切都可以通过一条命令完成，如清单\
    \ 6-4 所示。\n\n## 清单 6-4. 将清单 6-3 中的命令合并为单条命令\n\n```python\n>>> ' '.join('oracle\
    \ 1723 1  0 16:21 ? 00:00:01 /u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
    \ LISTENER -inherit'.split()[7:])\n'/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
    \ LISTENER -inherit'\n```\n\n清单 6-3 直接将 `ps` 命令的输出填充到 `psout` 变量中。捕获 `ps` 命令输出的过程也可以直接在\
    \ Python 内部完成，如清单 6-3a 所示。\n\n## 清单 6-3a. 使用 Python subprocess 模块捕获 `ps` 命令输出\n\
    \n```python\n>>> import subprocess\n>>> mycommand = ['ps', '-ef']\n>>> psoutput\
    \ = subprocess.Popen(mycommand, stdout=subprocess.PIPE).communicate()[0].split('\\\
    n')\n>>> for i in psoutput:\n...     if 'tnslsnr' in i:\n...         psout = i\n\
    ```\n\n列表是将字符串和数字分组在一起的有用方式，但有时需要更复杂的对象。有时单个元素的索引并不足够，我们需要一种将键和值组合在一起的方法。这在使用\
    \ EM CLI 时尤其如此，其中数组很常见且通常很复杂。这就是 Python 字典对象的用武之地。\n\n# 字典\n\n在 Python 中，尤其是在\
    \ EM CLI 中，另一个同样重要的对象类型是“字典”。类似于 Java 的“哈希表”、Perl 的“哈希”对象和 PL/SQL 的“关联数组”，字典由键/值对的集合组成。换句话说，字典的每个元素将由一个键和一个值组成。然后可以通过指定其对应的键来提取该值。调用值的语法类似于在列表中调用值，但指定的是键而不是索引值。清单\
    \ 6-5 调用属于标记为 `'second'` 的键的值。\n\n## 清单 6-5. 通过指定所属键来从字典调用值\n\n```python\nemcli>mydic\
    \ = {'first': 'one', 'second': 'two', 'third': 'three', 'fourth': 'four', 'fifth':\
    \ 'five'}\nemcli>mydic['second']\n'two'\n```\n\n字典使用键而不是数字索引。JSON 在 Python 中表示为字典对象，因为\
    \ JSON 本质上就是一个高效的键/值对象。这在 EM CLI 中可以清楚地看到，如清单 6-6 所示。\n\n## 清单 6-6. 在 EM CLI 中使用\
    \ `list()` 函数展示 JSON 字典\n\n```python\nemcli>set_client_property('EMCLI_OUTPUT_TYPE',\
    \ 'JSON')\nemcli>list(resource='Targets').isJson()\nTrue\nemcli>type(list(resource='Targets').out())\n\
    <type 'dict'>\nemcli>list(resource='Targets').out()\n{'exceedsMaxRows': False,\
    \ 'columnHeaders': ['TARGET_NAM...\n```\n\n大多数 EM CLI 函数包含一个 `isJson` 函数，该函数返回一个布尔值结果，指示结果集是否为\
    \ JSON。此命令表明结果集将返回 JSON 而不是文本。\n\n默认情况下，EM CLI 的交互模式是文本模式。第一条命令更改了该行为，以便所有结果集都以\
    \ JSON 形式返回。\n"
- fmt: "The fourth line calls the `out` sub-function of the `list` function. This\
    \ `out` function either prints to the screen or feeds to another object the output\
    \ of the function that is calling it. In this case, the `list` function is returning\
    \ information about the EM targets, and the `type` function is telling us that\
    \ this output is being returned as a dictionary object.\n\nThe sixth line shows\
    \ a very small part of the actual output, showing that it is contained within\
    \ curly braces. The curly braces are what indicate that this object is a dictionary.\
    \ Notice that one of the values is a list rather than a string. A dictionary value\
    \ can be any other object type, including another dictionary.\n\n## Logon Script\n\
    \nIt is necessary when using either interactive or scripting modes of EM CLI to\
    \ establish a connection between EM CLI and the OMS. This is a repeatable procedure,\
    \ so it is a good practice to have a script in place that can be called each time\
    \ one calls a script or logs into EM CLI interactive mode.\n\nThe logon script\
    \ is described below with comments regarding the various parts of it. The complete\
    \ script is listed after the analysis.\n\nThe EM CLI classes and functions need\
    \ to be imported first:\n\n```python\nfrom emcli import *\n```\n\nThis could also\
    \ be done using a direct import:\n\n```python\nimport emcli\n```\n\nHowever, in\
    \ this case each call to an EM CLI function would need to be qualified with the\
    \ module name `emcli`.\n\nThe next step is to identify an OMS in which to connect:\n\
    \n```python\nset_client_property('EMCLI_OMS_URL', 'https://em12cr3.example.com:7802/em')\n\
    ```\n\nFollowing that one needs either to identify a valid SSL certificate file\
    \ by which to authenticate with the OMS or to specify that you trust any certificate\
    \ presented:\n\n```python\nset_client_property('EMCLI_CERT_LOC', '/path/to/cert.file')\n\
    ```\n\nor\n\n```python\nset_client_property('EMCLI_TRUSTALL', 'true')\n```\n\n\
    Optionally, you can specify which format you would like the commands to return:\
    \ \"JSON\" or \"TEXT.\" Unless there is a specific need for text output, JSON\
    \ is the most versatile and easy to manipulate. However, it is also much more\
    \ difficult to read:\n\n```python\nset_client_property('EMCLI_OUTPUT_TYPE', 'JSON')\n\
    ```\n\nor\n\n```python\nset_client_property('EMCLI_OUTPUT_TYPE', 'TEXT')\n```\n\
    \nFinally, specify with which user you would like to log in and, optionally, that\
    \ user’s password. If the password is not specified, you will be prompted for\
    \ it.:\n\n```python\nprint(login(username='sysman', password='foobar'))\n```\n\
    \nThe complete script is show in [Listing 6-7](#9781484202395_Ch06.xhtml#list7).\n\
    \n[Listing 6-7](#9781484202395_Ch06.xhtml#_list7). `start.py` logon script\n\n\
    ```python\nfrom emcli import *\nset_client_property('EMCLI_OMS_URL', 'https://em12cr3.example.com:7802/em')\n\
    set_client_property('EMCLI_TRUSTALL', 'true')\nset_client_property('EMCLI_OUTPUT_TYPE',\
    \ 'JSON')\nprint(login(username='sysman', password='foobar'))\n```\n\nAlthough\
    \ EM CLI may be started from the same directory that contains the logon script,\
    \ Jython will not see it unless the directory is within its search path. [Listing\
    \ 6-8](#9781484202395_Ch06.xhtml#list8) shows the error message you would receive\
    \ if the `start.py` file you are trying to import isn’t in the Jython search path.\n\
    \n[Listing 6-8](#9781484202395_Ch06.xhtml#_list8). `start.py` not in the Jython\
    \ search path\n\n```\nemcli>import start\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nImportError: No module named start\n\
    ```\n\nThe `JYTHONPATH` environment variable tells Jython the additional directories\
    \ in which to search for modules to be imported. Set this variable before executing\
    \ `emcli`. In [Listing 6-9](#9781484202395_Ch06.xhtml#list9), the `start` module\
    \ can now be successfully imported, either directly from the interactive mode\
    \ command line or within a script in scripting mode.\n\n[Listing 6-9](#9781484202395_Ch06.xhtml#_list9).\
    \ Successful execution of the `start.py` script\n\n```\n[oracle@server ]$ export\
    \ JYTHONPATH=/home/oracle/scripts\n[oracle@server ]$ emcli\nemcli>import start\n\
    Login successful\n```\n\nIf you are not comfortable with including your password\
    \ in the script (you shouldn’t be) and only specify the `username` parameter with\
    \ the login function, you will be prompted for the password:\n\n```\nEnter password\
    \ :  **********\n```\n\n[Listing 6-10](#9781484202395_Ch06.xhtml#list10) shows\
    \ an alternative method of authenticating that affords one the security of not\
    \ including the password in the script while at the same time not requiring one\
    \ to enter the password every time the script is invoked. The password in this\
    \ example would be contained in the `.secret` file, which should have permissions\
    \ set such that it can be read only by the operating system user invoking EM CLI.\n\
    \n[Listing 6-10](#9781484202395_Ch06.xhtml#_list10). `start.py` logon script using\
    \ a password read from an external file\n\n```python\nfrom emcli import *\nset_client_property('EMCLI_OMS_URL',\
    \ 'https://em12cr3.example.com:7802/em')\nset_client_property('EMCLI_TRUSTALL',\
    \ 'true')\nset_client_property('EMCLI_OUTPUT_TYPE', 'JSON')\nf = open('/home/oracle/.secret','r')\n\
    pwd = f.read()\nprint(login(username='sysman', password=pwd))\n```\n\nThe steps\
    \ included in the `start.py` script need to be executed every time EM CLI is invoked\
    \ in scripted or interactive mode, which is why it is important to script the\
    \ login process. Any script called directly should invoke the `import start` command\
    \ before doing anything else.\n\n## Python Scripting with EM CLI to Set Target\
    \ Properties\n\nEM CLI includes a function to change the properties of a target.\
    \ If the properties of a small number of targets need to be updated, it is easy\
    \ to simply execute the `set_target_property_value()` function for each of those\
    \ targets. When the need arises to update the properties of tens or even hundreds\
    \ of targets, executing the function for each target is not efficient. Fortunately,\
    \ with EM CLI we can take advantage of the full scripting functionality of Python.\n\
    \nA `for` loop can be used to iterate through any object and perform any task\
    \ on each one of those object pieces. For example, it is common to add or update\
    \ target properties after a target has been added. Any task involving changing\
    \ target properties for more than a couple of targets in the GUI is tedious and\
    \ time-consuming. There is more than one way to accomplish this task within EM\
    \ CLI, but all of them are easier and more efficient than the GUI can offer.\n\
    \nFor demonstration purposes, we’ll use the interactive mode, but all of these\
    \ commands will also work in scripting mode:\n\n```\nemcli>import start\nEnter\
    \ password :  **********\nLogin successful\n```\n\nCreate an object containing\
    \ all of the targets. Don’t worry about filtering out targets yet. That part will\
    \ be done further down in the script:\n\n```\nemcli>myobj = get_targets().out()['data']\n\
    emcli>len(myobj)\n```\n\nIn this case, I know I have `29` targets in my repository.\
    \ We want to update the `Lifecycle Status` and `Location` properties of the targets\
    \ we just added that have the prefix of `TEST_` with `Development` and `COLO`,\
    \ respectively. Since we may want to add to or change this list of properties\
    \ in the future, we’ll put these into a dictionary as keys and values:\n\n```\n\
    emcli>myprops = {'LifeCycle Status':'Development', 'Location':'COLO'}\n```\n\n\
    We want to make sure we choose the correct targets for this update, so we will\
    \ use regular expressions to filter the target names. Using regular expressions\
    \ within Jython requires that we import another module:\n\n```\nemcli>import re\n\
    ```\n\nNow we can create the regular expression that we will use to filter the\
    \ target names. This filter will be applied to each target name to determine if\
    \ the target properties will be applied to that target:\n\n```\nemcli>filtermatch\
    \ = '^TEST_'\nemcli>myreg = re.compile(filtermatch)\n```"
