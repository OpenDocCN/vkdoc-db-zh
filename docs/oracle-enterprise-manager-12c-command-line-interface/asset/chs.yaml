  \nFILENAME=targets.xml\n   BackupConfigFile\n```\n\n\n\n# 备份目录与配置文件\n\n## 路径 `sysman/j2ee/applications/Oc4jDcmServlet/META-INF`\n\
  \n使用 `PrepareBackupDir` 命令准备目录。\n\n| 文件名 |\n| :--- |\n| `application.xml` |\n| `orion-application.xml`\
  \ |\n| `jazn-data.xml` |\n| `principals.xml` |\n\n使用 `BackupConfigFile` 命令备份上述文件。\n\
  \n## 路径 `sysman/j2ee/applications/Oc4jDcmServlet/Oc4jDcmServlet/WEB-INF`\n\n使用 `PrepareBackupDir`\
  \ 命令准备目录。\n\n| 文件名 |\n| :--- |\n| `orion-web.xml` |\n| `web.xml` |\n\n使用 `BackupConfigFile`\
  \ 命令备份上述文件。\n\n## 路径 `sysman/j2ee/application-deployments/Oc4jDcmServlet`\n\n使用\
  \ `PrepareBackupDir` 命令准备目录。\n\n| 文件名 |\n| :--- |\n| `orion-application.xml` |\n\
  | `orion-web.xml` |\n\n使用 `BackupConfigFile` 命令备份上述文件。\n\n## 路径 `sysman/webapps/emd/online_help`\n\
  \n使用 `PrepareBackupDir` 命令准备目录。\n\n| 文件名 |\n| :--- |\n| `ohwconfig.xml` |\n\n使用\
  \ `BackupConfigFile` 命令备份该文件。\n\n## 路径 `uix`\n\n使用 `PrepareBackupDir` 命令准备目录。\n\n\
  | 文件名 |\n| :--- |\n| `uix.conf` |\n\n使用 `BackupConfigFile` 命令备份该文件。\n\n## 路径 `wcs/config`\n\
  \n使用 `PrepareBackupDir` 命令准备目录。\n\n| 文件名 |\n| :--- |\n| `wcs_httpd.conf` |\n\n使用\
  \ `BackupConfigFile` 命令备份该文件。\n\n## 路径 `webcache`\n\n使用 `PrepareBackupDir` 命令准备目录。\n\
  \n| 文件名 |\n| :--- |\n| `internal.xml` |\n\n使用 `BackupConfigFile` 命令备份该文件。\n\n---\n\
  \n执行 `DashedBreak` 命令。\n\n```bash\necho \"\\n 处理后备份目录及其内容\\n\\n\"\nls -lARp ${BACKUP_DIR}\
  \ | grep -v \"^total\" \n```\n\n## 临时文件清理脚本\n\nOracle Management Server 为其每个组件生成日志，从\
  \ WebLogic 服务器到主机上的 EM 代理。预设的轮转和文件清理机制在存在时非常有用，但并非所有文件都受此管理。保持服务器整洁需要由你负责。\n\n此脚本遍历\
  \ OMS 服务器上的日志目录。评估每个文件的空闲时间，然后删除较旧的文件：\n\n```ksh\n#!/bin/ksh\n#===============================================================================\n"
- '#  脚本名称  : log_blaster_oms.ksh

  '
- '#  调用参数 : 无

  '
- '#  目的      : 清理 OMS 的日志文件

  '
- '#                       参考来源 MOS Note 1445743.1

  #===============================================================================

  '
- '#  独立变量

  #=================================================================

  '
- '# 将这些变量设置为你的本地目录设置

  '
- '# EM_INSTANCE_HOME 通常是 MIDDLEWARE_HOME/gc_inst

  EM_INSTANCE_HOME=


  WORKFILE=/tmp/logblaster_oms_workfile1.lst


  #=================================================================

  ## 函数

  '
- '# =================================================================


  function CleanUpFiles {

  '
- '# --------------------------------------------------------------------------------------------------


  [ $WORKFILE ] && rm -f ${WORKFILE}

  }


  function TrimThisFile {

  '
- "# --------------------------------------------------------------------------------------------------\n\
  if [ -d ${thisDIR} ]; then\n   if [ `find ${thisDIR} -name ${thisFILE} | wc -l`\
  \ -gt 0 ]; then\n      NEW_FILE=${thisDIR}/${thisFILE}\n      OLD_FILE=${thisDIR}/${thisFILE}_old\n\
  \      LAST_DATE=`tail -1 ${NEW_FILE} | awk '{ print $1,$2,$3 }'`\n      echo \"\
  \\n 正在截断 ${NEW_FILE}\"\n      echo \"早于 ${LAST_DATE} 的条目将被移除\\n\"\n      mv -f ${NEW_FILE}\
  \ ${OLD_FILE}\n      cat ${OLD_FILE} | grep \"${LAST_DATE}\" >${NEW_FILE}\n    \
  \     if [ `cat ${NEW_FILE} | wc -l` -gt 0 ]; then\n            rm -f ${OLD_FILE}\n\
  \         else\n            mv -f ${OLD_FILE} ${NEW_FILE}\n      fi\n   fi\n   echo\
  \ \"\\n\\n\"\nelse\n   echo \"\\n 未找到目录 ${thisDIR}\\n\\n\"\nfi\n}\n\nfunction SweepThese\
  \ {\n"
- "# --------------------------------------------------------------------------------------------------\n\
  if [ -d ${thisDIR} ]; then\n   find ${thisDIR} -name ${thisFILE} -mtime +${thisAGE}\
  \ >${WORKFILE}\n   if [ `cat ${WORKFILE} | wc -l` -gt 0 ]; then\n      echo \"\\\
  n 清理 ${thisDIR} 目录\"\n      for thisTRASH in `cat ${WORKFILE}`; do\n         echo\"\
  \\t 移除 ${thisTRASH}\"\n         rm -f ${thisTRASH}\n      done\n   else\n      echo\
  \ \"\\n 没有匹配 ${thisDIR}/${thisFILE} 的\"\n      echo \"超过 ${thisAGE} 天的文件\"\n   fi\n\
  \   echo \"\\n\\n\"\nelse\n   echo \"\\n 未找到目录 ${thisDIR}\\n\\n\"\nfi\n}\n\n"
- '# --------------------------------------------------------------------------------------------------

  ## 运行时过程

  '
- '# --------------------------------------------------------------------------------------------------


  CleanUpFiles


  '
- '# --------------------------------------------------------------------------------------------------

  '
- '# webtier 目录名从环境中获取

  '
- '# 通常发现的值是 OMS1，但也可能不同

  '
- '# --------------------------------------------------------------------------------------------------


  WEBTIERn=`ls ${EM_INSTANCE_HOME} | grep WebTier`


  OHSn=`ls ${EM_INSTANCE_HOME}/${WEBTIERn}/diagnostics/logs/OHS | grep ohs`


  '
- '# --------------------------------------------------------------------------------------------------

  '
- '# 此目录的保留期通过 thisAGE 变量设置为七天

  '
- "# --------------------------------------------------------------------------------------------------\n\
  \nthisDIR=${EM_INSTANCE_HOME}/${WEBTIERn}/diagnostics/logs/OHS/${OHSn}\n   thisAGE=7\n\
  \nthisFILE=\"em_upload_http_access_log.*\"\n   SweepThese\n\nthisFILE=\"em_upload_https_access_log.*\"\
  \n   SweepThese\n\nthisFILE=\"access_log.*\"\n   SweepThese\n\nthisFILE=\"ohs*.log\"\
  \n   SweepThese\n\nthisFILE=\"console~OHS*.log*\"\n   SweepThese\n\nthisFILE=\"\
  mod_wl_ohs.log\"\n   TrimThisFile\n\n"
- "# --------------------------------------------------------------------------------------------------\n\
  \nDOMAIN_SERVERS_DIR=${EM_INSTANCE_HOME}/user_projects/domains/GCDomain/servers\n\
  \nthisDIR=${DOMAIN_SERVERS_DIR}/EMGC_ADMINSERVER/logs\n   thisAGE=7\n\nthisFILE=\"\
  GCDomain.log*\"\n   SweepThese\n\nthisFILE=\"EMGC_ADMINSERVER.out*\"\n   SweepThese\n\
  \nthisFILE=\"EMGC_ADMINSERVER.log*\"\n   SweepThese\n\nthisFILE=\"EMGC_ADMINSERVER-diagnostic-*.log\"\
  \n   SweepThese\n\nthisFILE=\"access.log*\"\n   SweepThese\n\n"
- "# --------------------------------------------------------------------------------------------------\n\
  \nEMGC_OMSn=`ls ${DOMAIN_SERVERS_DIR} | grep OMS`\n\nthisDIR=${DOMAIN_SERVERS_DIR}/${EMGC_OMSn}/logs\n\
  \   thisAGE=7\n\nthisFILE=\"EMGC_OMS*.out*\"\n   SweepThese\n\nfor eachDIR in `ls\
  \ -1 /oraoms/exportconfig`; do\n   thisDIR=/oraoms/exportconfig/${eachDIR}\n   thisFILE=\"\
  opf_ADMIN_*.bka\"\n   SweepThese\nDone\n\nCleanUpFiles\nexit 0\n```\n\n# 第 4 节：EM\
  \ CLI 脚本与交互式脚本\n\nEnterprise Manager 第 3 版包含标准的仅命令行版本的 EM CLI 以及带有强大脚本选项的版本（有时称为高级套件）。后者可以下载并安装在任何受支持的客户端操作系统上，或直接在服务器上使用。EM\
  \ CLI 与 Oracle Management Server (OMS) 之间的连接方法相同，与 EM CLI 的安装位置无关。高级套件的安装说明在第 2\
  \ 章中介绍。\n\nEM CLI 的脚本选项同时指脚本模式和交互模式。在这两种模式下，EM CLI 都期望脚本内容或在交互模式下输入的命令符合 Python\
  \ 语法。要在交互模式下从 EM CLI 连接到 Enterprise Manager，请输入命令 `login(username='sysman', password='foobar')`。此命令是对一个\
  \ Python 函数的调用。\n\n\n\n本节中的示例与第 6 章中使用的代码示例相同，且全部使用 Python 编程语言编写。上一节的示例使用操作系统 Shell\
  \ 来实现所有脚本功能（例如变量、`for`循环、`if then else`等），而本节中的示例将全部使用 EM CLI 及其 Jython Shell 来实现。由于这些示例不依赖于任何\
  \ Shell 脚本功能，它们可以在 EM CLI 支持的任何平台上使用。\n\n### 简单登录脚本 (`start.py`)\n\n下面的代码示例可以直接复制到文本文件中。它用于设置一些重要的会话属性，并在\
  \ EM CLI 客户端与其连接的 OMS 之间建立安全连接。在使用此脚本前，需要根据您的环境更新变量 `myurl`、`myuser` 和 `mypass`：\n\
  \n```\nfrom emcli import *\n\nmyurl = 'https://em12cr3.example.com:7802/em'\nmytrustall\
  \ = 'TRUE'\nmyoutput = 'JSON'\nmyuser = 'sysman'\nmypass = 'foobar'\n\nset_client_property('EMCLI_OMS_URL',\
  \ myurl)\nset_client_property('EMCLI_TRUSTALL', mytrustall)\nset_client_property('EMCLI_OUTPUT_TYPE',\
  \ myoutput)\nprint(login(username=myuser, password=mypass))\n```\n\n`start.py` 脚本可以在脚本模式和交互模式下使用。在脚本模式下，可以直接使用命令\
  \ `emcli @start.py` 从 EM CLI 执行该脚本。结果将是成功或失败地在 EM CLI 与 OMS 之间建立连接。除非您只是想确认连接可以建立，否则单独使用此脚本可能用处不大。\n\
  \n`start.py` 通常被其他脚本调用，或者在交互模式下，从 EM CLI Jython 命令行界面调用（不要与命令行模式混淆）。从另一个脚本调用 `start.py`\
  \ 是通过将脚本作为模块导入来完成的。\n\n例如，一个名为 `sync.py` 的脚本在脚本模式下使用命令 `emcli @sync.py` 调用。在执行命令之前，必须先建立\
  \ EM CLI 与 OMS 之间的连接。如果 `start.py` 脚本位于 `JYTHONPATH` 包含的目录中，则可以使用 `import start`\
  \ 作为第一个命令来调用该登录脚本。\n\n**注意：** `JYTHONPATH` 是一个 Shell 环境变量，EM CLI 将使用它来确定导入模块时要搜索的所有目录。要添加一个目录，请根据\
  \ Shell 标准补充该变量，类似于将目录添加到 `PATH` 环境变量的方式。\n\n另一种方法是使用命令 `emcli @start.py` 在脚本模式下执行\
  \ `start.py`，然后在 `start.py` 的最后一行调用 `sync.py` (`import sync`) 脚本。此方法假定 `sync.py`\
  \ 位于 `JYTHONPATH` 环境变量的可搜索路径中。\n\n当使用交互模式时，`start.py` 脚本必须位于 `JYTHONPATH` 的可搜索路径中，并通过\
  \ `import start` 调用。登录现在将为当前交互会话的生命周期建立，直到登录被隐式（超时过期）或显式（使用 `logout()` 函数）解除。\n\n\
  许多企业环境不鼓励或不允许脚本包含凭据密码。可以对 `start.py` 脚本稍作修改，以利用 Python 读取外部文件的功能，如下一个示例所示。\n\n###\
  \ 安全登录脚本 (`secureStart.py`)\n\n`start.py` 在安全性方面有一个主要缺陷，因为它包含凭据密码。然而，`secureStart.py`\
  \ 与 `start.py` 具有相同的能力，可以在不泄露脚本中凭据密码的情况下，在 EM CLI 与 OMS 之间建立连接。该脚本改为打开文件系统中的一个文件，该文件包含密码，并将密码读入一个变量。然后，它在\
  \ `login()` 函数中使用此变量的内容作为凭据密码。\n\n`secureStart.py` 的使用方法与 `start.py` 相同。但是，有额外的要求。第一个要求是在\
  \ EM CLI 可访问的文件系统上创建一个仅包含明文凭据密码的文件。请根据您的环境使用适当的权限保护此文件。除了更新脚本变量 `myurl` 和 `myuser`\
  \ 以匹配您的环境外，还需要将脚本变量 `mypassloc` 更改为包含凭据密码的文件的完整路径位置。请看以下示例：\n\n```\nfrom emcli import\
  \ *\n\nmyurl = 'https://em12cr3.example.com:7802/em'\nmytrustall = 'TRUE'\nmyoutput\
  \ = 'JSON'\nmyuser = 'sysman'\nmypassloc = '/home/oracle/.secret'\n\nset_client_property('EMCLI_OMS_URL',\
  \ myurl)\nset_client_property('EMCLI_TRUSTALL', mytrustall)\nset_client_property('EMCLI_OUTPUT_TYPE',\
  \ myoutput)\n\nmyfile = open(mypassloc,'r')\nmypass = myfile.read()\n\nprint(login(username=myuser,\
  \ password=mypass))\n```\n\n登录脚本仅建立 EM CLI 与 OMS 之间的连接。它们对 Enterprise Manager 目标没有任何影响。本节剩余的示例将演示如何使用交互模式或脚本模式操作目标。\n\
  \n### 更新目标属性命令 (`updatePropsFunc.py`)\n\n`updatePropsFunc.py` 脚本包含更新 Enterprise\
  \ Manager 目标属性所需的命令。这些命令可以在建立登录后，逐个复制到 EM CLI 交互会话中。完整的示例也可以放入脚本中，并使用命令 `emcli @updatePropsFunc.py`\
  \ 直接在脚本模式下执行（需要先建立登录）。此示例包含注释（以井号字符开头的行），说明了复制到脚本时应包含的脚本命令。在 EM CLI（以及 Python 和\
  \ Jython）中，任何以井号字符开头的行都会被忽略。\n\n**注意：** 请参阅本节开头的登录示例，了解如何在脚本模式或交互模式下建立登录。\n\n```\n\
  from emcli import *\nimport re\n\n"
- '# 应用于目标名称的正则表达式，用于筛选目标列表

  '
- '# ''.*'' 包含所有目标

  '
- '# ''^orcl'' 包含所有以''orcl''开头的目标

  '
- '# ''^em12cr3\.example\.com$'' 包含名称

  '
- '#        精确为''em12cr3.example.com''的目标

  myfiltermatch = ''.*''


  '
- '# 包含要应用于目标列表的属性名称和值的

  '
- '#        字典对象

  myprops = {''LifeCycle Status'':''Development'', ''Location'':''COLO''}


  '
- '# 启用调试时，命令将被打印但不会执行

  debug = True


  '
- '# 分隔符应使用不会出现在任何目标名称中的字符

  mydelim = ''@''

  mysubsep = ''property_records='' + mydelim


  '
- '# 编译目标名称筛选器

  myreg = re.compile(myfiltermatch)


  '
- '# 从 OMS 检索完整的目标列表

  myobj = get_targets().out()[''data'']


  '
- "# 循环遍历完整的目标列表\nfor targ in myobj:\n    # 如果目标名称筛选器适用...\n    if myreg.search(targ['Target\
  \ Name']):\n        myproprecs = targ['Target Name'] + mydelim + \\\n          \
  \           targ['Target Type'] + mydelim\n\n        # 对于每个目标，循环遍历\n        #  \
  \       目标属性字典\n        for propkey, propvalue in myprops.items():\n           \
  \ myproprecprops = propkey + mydelim + propvalue\n\n            # 如果 debug 为 True，则将命令打印到屏幕\n\
  \            #           而不执行\n            if debug:\n                mycommand\
  \ = 'set_target_property_value(' + \\\n                            'subseparator=\"\
  ' + mysubsep + \\\n                            '\", property_records=\"' + \\\n\
  \                            myproprecs + \\\n                            myproprecprops\
  \ + '\")'\n                print(mycommand)\n```\n\n\n```python\n"
- '# 如果 debug 不为 True，则打印消息

  '
- "#         并执行命令\nelse:\n    print('Target: ' + targ['Target Name'] + \\\n     \
  \     ' (' + targ['Target Type'] + \\\n          ')\\n\\tProperty: ' + propkey +\
  \ \\\n          '\\n\\tValue:    ' + propvalue)\n    set_target_property_value(\n\
  \        subseparator=mysubsep,\n        property_records=myproprecs + myproprecprops)\n\
  ```\n\n## 更新目标属性类 (`updateProps.py`)\n\n`updateProps.py` 脚本包含几条 `import` 语句和一个类定义。该脚本不包含任何直接执行的命令。因此，直接执行此脚本（即\
  \ `emcli @updateProps.py`）并无用处。正确的用法是，在交互模式下，将此脚本作为一个模块与登录脚本一起导入，然后使用该类及其函数来执行命令。在脚本模式下，将创建一个执行脚本，其中包含使用该类及其函数的命令。`updateProps.py`\
  \ 的导入语句以及登录脚本的导入语句应出现在任何命令执行之前。\n\n为了演示这一点，请创建一个名为 `changeTargProps.py` 的脚本。此脚本将用于使用\
  \ `updateProps()` 类来更改目标属性。此示例中的环境要求执行脚本中不包含凭证密码；因此，将使用 `secureStart.py` 登录脚本来建立登录。`changeTargProps.py`\
  \ 的前两行将是导入语句：\n\n```\nimport secureStart\nimport updateProps\n```\n\n在脚本执行至此点时，EM\
  \ CLI 与 OMS 之间应已成功登录，并且 `updateProps()` 类应已导入。脚本中的其余命令使用类函数来更新目标的属性：\n\n```\n"
- '# 创建类的一个实例。

  myinst = updateProps.updateProps()


  '
- '# 设置要应用的单个属性。

  myinst.props({''LifeCycle Status'':''Development''})


  '
- '# 仅包含名称完全为 em12cr3.example.com 的主机目标。

  myinst.filt(namefilter=''^em12cr3\.example\.com$'', typefilter=''^host$'', show=True)


  '
- '# 将当前定义的目标列表更新到当前定义的属性。

  myinst.setprops(show=True)

  ```


  现在，可以使用命令 `emcli @changeTargProps.py` 在脚本模式下调用这个完整的脚本。该脚本会将 Enterprise Manager 中
  `em12cr3.example.com` 主机目标的生命周期状态属性更新为 `Development`。将示例中的命令复制到 EM CLI 交互式会话中会产生相同的效果。


  `updateProps()` 的功能可以根据情况需要简单或复杂。下面的示例展示了使用 `updateProps()` 的其他方法。每个示例的功能通过注释进行了解释。将注释与命令一起包含，允许它们与命令一起复制到脚本中：


  ```

