- "# 因此我们将它们收集到不同的目标列表中以进行处理\nVCS_DATABASES=/tmp/RelocateTargetDatabases_VCS.lst\n\
  VCS_LISTENERS=/tmp/RelocateTargetListeners_VCS.lst\n\nEMCLI_DATABASES=/tmp/RelocateTargetDatabases_EMCLI.lst\n\
