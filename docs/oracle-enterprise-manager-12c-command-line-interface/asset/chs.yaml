  \ -type Oracle  | grep ${HAGROUP} | awk '{ print $1 }' >${VCS_DATABASES}\nsudo ${VCSBIN}/hares\
  \ -display -type Netlsnr | grep ${HAGROUP} | awk '{ print $1 }' >${VCS_LISTENERS}\n\
