- "# 第一章\n\n![image](img/frontdot.jpg)\n\n## 架构\n\nOracle Enterprise Manager 12c 提供了一个可扩展且可靠的中央存储库、一个控制台以及用于管理所有\
  \ Oracle 产品的服务。用户通常通过 OEM 控制台与 OEM 交互，该控制台具有丰富的直观图形界面。\n\nEnterprise Manager 命令行界面\
  \ (EM CLI) 提供了在控制台之外访问 OEM 系统功能的途径。例如，作为其有用性的一个例证，交互式 EM CLI 任务可以取代定义 EM 管理员账户和角色时冗长的点击流。EM\
  \ CLI 交互命令可以在 shell 脚本中使用，或者通过 CLI 自身的 Jython 脚本模式进行 CLI 调用。\n\n本书探讨了您可以应用这些技术来简化和自动化\
  \ Oracle 环境中的任务的不同方式。\n\n### 企业管理器框架\n\nOracle Enterprise Manager 应用程序作为 JEE 应用程序，在\
  \ WebLogic 服务器上的 WebLogic Server J2EE 域中运行。这种组合被称为 Oracle Management Server，或 OMS。\n\
  \n在 OMS 上运行的 Java 进程收集并处理来自您远程主机上的 EM 代理的 XML 文件上传。该信息被发布到存储库数据库，并存储在 SYSMAN 模式中。\n\
  \n当您在 OEM 控制台上查看页面时，数据是从存储库数据库中组装以供呈现的。同样，您从控制台发出的命令通过 OMS 进行处理，以更新存储库信息（例如，指标收集或通知），或通过调用\
  \ EM 代理或通过到远程数据库或主机的经过身份验证的连接来操纵受管目标。\n\n控制台发出的每个命令都会执行一个 Java 程序。控制台不仅征集和组装数据，还提供这些例程执行所需的输入命令。大部分操作和查询代码库都可以通过\
  \ EM CLI 访问。\n\nEM CLI 程序本身是一个轻量级的 Java 程序，它执行与控制台页面相同的活动，但使用作为命令行输入传递的值立即执行 OMS\
  \ 模块；它通常用于 shell 脚本或 Jython 程序中。\n\n### EM CLI 动词\n\n接口命令被称为 `动词`。每个动词执行单个任务，并以合理的反馈成功返回，或者返回快速且明显的失败消息。\n\
  \n许多动词需要在命令行上提供输入值。与 PL/SQL 包类似，您的输入必须使用非常特定的语法传递给 OMS。这些值前面总是一个过滤器关键字，并且大多数输入要求您的字符串用双引号括起来。\n\
  \n![Image](img/sq.jpg) `注意` 作者们对引号的使用经验不一。推荐使用，但通常不是必需的。为了清晰起见，我们将在示例中使用它们。您可能会发现并不总是需要它们，或者您更倾向于不使用它们。\n\
  \n使用 `get_targets` 动词显示或捕获环境中目标的列表，如下所示：\n\n```\nemcli get_targets\n```\n\n要仅查找\
  \ Oracle 数据库目标，您需要使用 `targets` 关键字过滤请求：\n\n```\nemcli get_targets -targets=\"oracle_database\"\
  \n```\n\n本书中的众多示例展示了动词和输入值如何应用。EM CLI 动词及其语法的目录可在 Oracle 支持文档 E17786-x 中找到。请注意，有些动词与需要许可费的管理包相关联。您还可以在命令行上找到在线帮助，列出所有可用的动词及其预期用途。例如：\n\
  \n```\nemcli help\nSummary of commands:\n\nargfile    -- Execute emcli verbs from\
  \ a file\n    help       -- Get help for emcli verbs (Usage: emcli help [verb_name])\n\
  \    login      -- Login to the EM Management Server (OMS)\n    logout     -- Logout\
  \ from the EM Management Server\n    setup      -- Setup emcli to work with an EM\
  \ Management Server\n    status     -- List emcli configuration details\n    sync\
  \       -- Synchronize with the EM Management Server\n    version    -- List emcli\
  \ verb versions or the emcli client version\n\nAdd Host Verbs\n    continue_add_host\
  \             -- Continue a failed Add Host session\n    get_add_host_status   \
  \        -- Displays the latest status of an Add Host session.\n    list_add_host_platforms\
  \       -- Lists the platforms on which the Add Host operation can be performed.\n\
  \    list_add_host_sessions        -- Lists all the Add Host sessions.\n    retry_add_host\
  \                -- Retry a failed Add Host session\n    submit_add_host       \
  \        -- Submits an Add Host session.\n...\n```\n\n`help` 动词可以用特定动词过滤以显示详细的使用说明：\n\
  \n```\nemcli help get_targets\n  emcli get_targets\n        [-targets=\"[name1:]type1;[name2:]type2;...\"\
  ]\n        [-alerts]\n        [-noheader]\n        [-script | -format=\n       \
  \                    [name:<pretty|script|csv>];\n                           [column_separator:\"\
  column_sep_string\"];\n                           [row_separator:\"row_sep_string\"\
  ];\n        ]\n        [-config_search=\"Configuration Search UI Name\"]\n     \
  \   [-unmanaged]\n\nDescription:\n    Obtain status and alert information for targets.\n\
  \nOptions:\n    -targets=name:type\n        Name or type can be either a full value\
  \ or a pattern match\n        using \"%\". Also, name is optional, so the type may\
  \ be\n        specified alone.\n     -config_search=\"Configuration Search UI Name\"\
  \n         Search UI Name should be the display name of the configuration search.\n\
  \     -alerts\n        Shows the count of critical and warning alerts for each target.\n\
  \    -noheader\n        Display tabular output without column headers.\n    -script\n\
  \        This option is equivalent to -format=\"name:script\".\n    -format\n  \
  \      Format specification (default is -format=\"name:pretty\").\n        -format=\"\
  name:pretty\" prints the output table\n            in a readable format but is not\
  \ intended to be parsed by scripts.\n        -format=\"name:script\" sets the default\
  \ column separator\n            to a tab and the default row separator to a newline.\n\
  \            The column and row separator strings may be specified\n           \
  \ to change these defaults.\n        -format=\"name:csv\" sets the column separator\
  \ to a comma\n            and the row separator to a newline.\n    -unmanaged\n\
  \        Get unmanaged targets (no status or alert information)\n```\n\n\n"
- "# EM CLI 使用指南与示例\n\n## 输出列\n`Status ID` `Status` `Target Type` `Target Name` `Critical`\
  \ `Warning`\n\n## 示例\n\n```\nemcli get_targets\n```\n显示所有目标。`Critical` 和 `Warning`\
  \ 列不显示。\n\n```\nemcli get_targets\n          -alerts\n```\n显示所有目标。`Critical` 和 `Warning`\
  \ 列显示。\n\n```\nemcli get_targets\n          -targets=\"oracle_database\"\n```\n\
  显示所有 `oracle_database` 目标。\n\n```\nemcli get_targets\n          -targets=\"%oracle%\"\
  \n```\n显示所有类型包含字符串 `\"oracle\"` 的目标。\n\n```\nemcli get_targets\n          -targets=\"\
  database%:%oracle%\"\n```\n显示所有名称以 `\"database\"` 开头且类型包含 `\"oracle\"` 的目标。\n\n\
  ```\nemcli get_targets\n          -targets=\"database3:oracle_database\"\n     \
  \     -alerts\n```\n显示名为 `\"database3\"` 的 Oracle 数据库的状态和告警信息。\n\n```\nemcli get_targets\n\
  \          -config_search=\"Search File Systems on Hosts\"\n          -targets=\"\
  oracle%:host\"\n          -alerts\n```\n显示来自名为 `\"Search File Systems on Hosts\"\
  ` 的配置搜索结果中，名称以 `\"oracle\"` 开头且类型为 `\"host\"` 的目标的状态和告警信息。\n\n```\nemcli get_targets\n\
  \          -targets=\"host\"\n          -unmanaged\n```\n显示未受管的主机目标的名称和类型信息。\n\n\
  ## EM CLI 客户端软件\n\n管理服务器上的基本 OEM 安装会预配置一个作为 `OMS Oracle Home` 一部分的 EM CLI 客户端。在第\
  \ 2 章中，我们将向您展示如何将该客户端升级到 EM CLI 高级套件。\n\nEM CLI 的部分优势源于其灵活性。除了在 OMS 服务器上安装客户端外，您还可以在非\
  \ OMS 主机甚至桌面上安装 EM CLI 客户端。\n\n安装 EM CLI 客户端包括下载并提取一个安装 `jar` 文件以安装二进制文件，然后使用连接信息配置客户端以连接到您的\
  \ OMS 服务器。该 `jar` 文件及其使用安装程序可通过 OEM 控制台中的 `Setup > Command-Line Interface` 获取。请按照该网页上的说明将\
  \ EM CLI 安装到您的工作站。\n\n## EM CLI 与 EMCTL\n\n一些 EM CLI 功能可以通过代理控制实用程序 `EMCTL` 来执行。您的技术选择取决于多种因素的组合。\n\
  \n*   当通过远程主机上的 shell 脚本调用时，EM CLI 客户端必须手动安装并维护在远程主机上。控制台会显示远程 CLI 客户端安装列表，但您仍然必须手动更新客户端软件。\n\
  *   远程主机上的 EM CLI 配置需要用于与 OMS 服务器交互的连接信息。当此信息更改时，您必须访问每个 EM CLI 安装。\n*   `EMCTL`\
  \ 命令特定于特定代理所知的目标，因此在命令行上传递的命令通常要简单得多。\n*   您必须登录到远程主机才能执行 `EMCTL` 命令。EM CLI 允许您远程执行许多\
  \ `EMCTL` 等效命令，以避免前往服务器。这在一次会话中管理多个服务器时特别有用。\n\n我们建议您刚开始使用或如果您的安装规模较小时使用 `EMCTL`。`EMCTL`\
  \ 中的命令往往更简单，事先的设置也更简单。然而，从长远来看，使用 EM CLI 所投入的“时间成本”是值得的。那些需要支持大型基础设施的人会发现自己倾向于使用\
  \ EM CLI。\n\n## 代理启动与停止\n\n`EM` 代理可以从 `OEM` 控制台内部、通过 `EM CLI`，当然也可以通过 `EMCTL` 来启动和停止。由于\
  \ `EMCTL` 命令是针对单个代理执行的，因此命令通常非常简单：\n\n```\nemctl start agent\n\nemctl stop agent\n\
  ```\n\n类似的功能可以从管理服务器、您的桌面或任何安装了 EM CLI 客户端的主机执行。可移植性带来了复杂性，因为您不仅需要指定要控制的代理，还需要指定要使用的凭据。\n\
  \n您可以指定主机用户名、命名凭据或凭据集。当您传递用户名时，还必须提供密码。在纯交互模式下，可以提示您输入密码，但在 shell 脚本中使用此技术可能会将密码暴露给其他操作系统用户。使用\
  \ OEM 命名凭据可以避免此问题：\n\n```\nemcli start_agent –agent_name=\"dbservera:3872\" –host_username=\"\
  oracle\" –host_pwd=\"Souper_53cre3t\"\nemcli start_agent –agent_name=\"dbservera:3872\"\
  \ –credential_name=\"oraprod\"\nemcli start_agent –agent_name=\"dbservera:3872\"\
  \ –credential_setname=\"HostCreds\"\n```\n\n停止命令需要相同的条件值；例如：\n\n```\nemcli stop_agent\
  \ –agent_name=\"dbservera:3872\" –host_username=\"oracle\"\n```\n\n我们将在第 4 章中更深入地探讨其中一些选项。\n\
  \n## 集中管理\n\n也许您已决定在物理服务器迁移期间或操作系统修补期间关闭部分 EM 代理。您可以使用 `emcli get_targets` 命令快速构建类型为\
  \ `oracle_emd` 的受影响代理列表，并将该列表转换为两个 CLI 参数文件（argfiles）——一个用于停止代理，另一个用于启动它们。\n\n![Image](img/sq.jpg)\
  \ **注意** 参数文件用于批量处理 CLI 命令。它们在第 5 章中有更详细的讨论。\n\n以下是一个使用参数文件的示例：\n\n```\ntouch argfile_stop.lst\n\
  touch argfile_start.lst\nemcli get_targets | grep oracle_emd > workfile.lst\nfor\
  \ thisAGENT in `cat workfile.lst`; do\n          echo \"start_agent –agent_name=${thisAGENT}\
  \ –credential_name=oraprod\" > argfile_start.lst\n          echo \"stop_agent –agent_name=${thisAGENT}\
  \ –credential_name=oraprod\" > argfile_stop.lst\ndone\n\nemcli login –user=\"SYSMAN\"\
  \nemcli sync\nemcli argfile ./argfile_stop.lst\nlogout\n```\n\n## 访问控制\n\n较大的 Oracle\
  \ 环境可能在 OEM 管理员和常规 DBA 员工之间存在职责分离，或者您的安全规则可能使得难以访问服务器进行例行维护。在这些情况下，运行 CLI 命令或通过控制台管理上下线是有意义的。\n\
  \n## 安全保护\n\n在 OEM 控制台中，每当您请求执行危险任务时，系统都会提示您进行确认。EM CLI 没有相同的功能。当您给出命令时，您的任务会按照您的请求精确执行，因此在删除或修改目标时要格外小心。尽管如此，许多人更喜欢命令行，因为它操作直接，没有多余的反馈。只需小心即可。\n\
  \n"
- '# 第 2 章


  ![image](img/frontdot.jpg)


  ## 安全框架、安装与 EM12c 第 4 版


  既然您已经了解了 Enterprise Manager 架构，您可能想了解更多关于 Oracle Management Service (OMS) 主机的高级安装方法或远程安装。您还需要了解与
  12.1.0.4（也称为 EM12c 第 4 版）相关的新动词（verbs），这些内容都将在本章中涵盖。


  ## EM CLI 与 WebLogic 安装


  Enterprise Manager 作为 WebLogic 服务器 (WLS) 上的一个域运行。没有 WebLogic 提供的中层架构，云生命周期解决方案就无法存在。`WLS`
  处理业务逻辑，同时与 Web 服务和其他远程处理通信，以确保前端事务从开始到结束都能完成。


  曾经，`OMS` 需要单独安装 `WLS`。尽管它目前是 EM12c 安装过程中的一个自动化步骤，但理解如何手动执行此操作对于管理员来说很有价值，尤其是在向前发展过程中管理和维护环境时。



  '
- "# WebLogic 服务器配置要求与概览\n\n为了提供最新的插件、管理包以及对 Enterprise Manager 云环境的完全访问，必须使 WebLogic\
  \ 服务器对`企业管理器命令行界面 (EM CLI)`可用并与其同步。\n\n### 要求\n\n为了在`OMS`上安装`EM CLI`之前了解相关要求，请确保`WebLogic\
  \ 域配置配置文件`的创建方式满足：软件库中存档并存储了属于该域的`中间件主目录`，作为 WebLogic 域的一部分。\n\n## 创建 WebLogic 域配置配置文件\n\
  \n配置配置文件由三个组件组成：\n\n*   一个中间件主目录\n*   WebLogic 服务器组件使用的二进制文件\n*   配置配置文件的域配置\n\n\
  如果只是让管理员或超级管理员登录到`EM12c`环境，是不足以完成`WLS`域配置配置文件的。要完成此任务，您必须具备以下条件：\n\n*   `WLS`以及参与配置设置的任何其他主机的主机凭据。这些凭据是初始安装`OEM`时所必需的。\n\
  *   所有目标必须启用`Java 必需文件 (JRF)`，这些文件由`Enterprise Manager`发现和监控。\n\n以超级用户身份登录到`Enterprise\
  \ Manager Cloud Console`，然后依次单击`Enterprise`（企业）、`Provisioning and Patching`（配置与修补）和`Software\
  \ Library`（软件库），如图 2-1 所示。\n\n![9781484202395_Fig02-01.jpg](img/9781484202395_Fig02-01.jpg)\n\
  \n图 2-1. 在`EM12c`控制台中访问软件库\n\n进入`软件库`后，您需要创建一个文件夹来存储配置文件（图 2-2）。\n\n![9781484202395_Fig02-02.jpg](img/9781484202395_Fig02-02.jpg)\n\
  \n图 2-2. 在软件库中创建用于配置、修补或安装的新文件夹\n\n`软件库`已有一组预定的子目录可用。在我们的示例中，我们将创建一个名为`Profile_Home`的新目录，为其添加明确的描述，并将其保存到新定义的`Networks`子目录中（图\
  \ 2-3）。\n\n![9781484202395_Fig02-03.jpg](img/9781484202395_Fig02-03.jpg)\n\n图 2-3.\
  \ 创建将用于 WebLogic`EM CLI`安装的`Profile_Home`文件夹及其详细信息\n\n对条目满意后，单击`确定`。系统将显示目录创建成功，以及软件库目录树中新子目录的位置（图\
  \ 2-4）。\n\n![9781484202395_Fig02-04.jpg](img/9781484202395_Fig02-04.jpg)\n\n图 2-4.\
  \ 确认在软件库的`Networks`目录中成功创建文件夹\n\n您将返回到软件库主菜单。再次单击`操作`、`创建实体`，然后单击`组件`（图 2-5）。\n\n\
  ![9781484202395_Fig02-05.jpg](img/9781484202395_Fig02-05.jpg)\n\n图 2-5. `操作`菜单，显示了用于在软件库中访问组件创建操作的展开选项\n\
  \n组件向导将引导您完成创建实际配置文件的步骤。屏幕上将显示一个下拉菜单；选择最后一个选项`WebLogic 域配置配置文件`（图 2-6）。\n\n![9781484202395_Fig02-06.jpg](img/9781484202395_Fig02-06.jpg)\n\
  \n图 2-6. 在`EM12c`控制台中为`WebLogic 域配置配置文件`创建实体\n\n选择配置文件子类型后，单击`继续`按钮。\n\n**注意：**\
  \ 请不要担心，如果下一步操作返回屏幕需要一些时间。在`继续`步骤会有一个延迟。\n\n当向导到达组件的详细信息页面时，输入以下内容（图 2-7）：\n\n*\
  \   名称\n*   描述\n*   其他属性（这些设置也可以在 WebLogic 服务器的主页上设置）\n\n![9781484202395_Fig02-07.jpg](img/9781484202395_Fig02-07.jpg)\n\
  \n图 2-7. 为新的`WebLogic 域配置配置文件`填写描述和值\n\n不要添加任何文件附件或其他信息，只需单击`下一步`。然后，系统将要求您选择一个\
  \ WebLogic 服务。在选择之前，请确保选中“将要创建的配置文件的中间件主目录的二进制文件包含在内”复选框。这对于正确创建配置文件至关重要。\n\n单击“未选择\
  \ WebLogic 域”旁边的放大镜。将弹出一个显示可用 WebLogic 域的窗口（图 2-8）。\n\n![9781484202395_Fig02-08.jpg](img/9781484202395_Fig02-08.jpg)\n\
  \n图 2-8. 在`EM12c`控制台中选择要添加到 WebLogic 域的目标\n\n您可以简化搜索，但大多数环境只有少数几个 WebLogic 服务器。从列表中选择您希望使用的服务器，然后单击`选择`。\n\
  \n`配置`页面将要求您复查到目前为止选择的数据（图 2-9）。正确设置一个存在的工作目录，该目录至少要有 200 MB 的可用空间用于工作文件。如果工作目录设置不正确或空间不足，作业将失败，这将导致需要清理配置文件组件并从此步骤开始重新创建。这也绝对不是配置文件的最终存储位置，所有工作文件将在处理后被清理。\n\
  \n![9781484202395_Fig02-09.jpg](img/9781484202395_Fig02-09.jpg)\n\n图 2-9. 为将用于软件库设置的\
  \ WebLogic 域配置配置文件\n\n确保凭据设置正确，如果必要则创建新凭据，但希望到此时您已按照最佳实践创建了首选凭据。\n\n确认向导`配置`页面上的信息正确后，单击`下一步`。\n\
  \n如果您对`复查`页面上的信息满意（此时无需上传任何文件，所以当底部部分显示没有任何文件时请不要担心），请单击`保存并上传`。\n\n现在将为该任务提交一个作业，您将收到确认信息（图\
  \ 2-10）。\n\n![9781484202395_Fig02-10.jpg](img/9781484202395_Fig02-10.jpg)\n\n图 2-10.\
  \ 确认`WebLogic 域配置配置文件`创建作业已提交\n\n由于该作业由`Enterprise Manager 作业服务`管理，您现在可以依次单击`Enterprise`、`作业`和`作业活动`，像监控通过此功能提交的任何其他作业一样监控该作业（图\
  \ 2-11）。\n\n![9781484202395_Fig02-11.jpg](img/9781484202395_Fig02-11.jpg)\n\n图 2-11.\
  \ 在`EM12c`控制台的`作业活动`视图中监控配置配置文件作业\n\n在作业运行时以及作业完成后，您可能需要刷新控制台视图。您可能需要将`活动`视图状态更改为`全部`或`成功`才能查看已完成的作业。该作业需要相当长的时间，但您可以在服务器上您选择放置工作文件的工作目录中看到作业目录（在此示例中，我选择在`/u01/home/oracle/`中创建一个临时文件夹，如图\
  \ 2-12 所示）。\n\n\n![9781484202395_Fig02-12.jpg](img/9781484202395_Fig02-12.jpg)\n\
  \n## 图 2-12. 通过作为作业一部分创建的工作文件，从命令行查看作业状态\n\n作业完成后，你可以通过以下三种方式之一验证其是否已成功完成：\n\n*\
  \   检查作业活动详情，确保所有步骤均已成功完成。\n*   依次点击“企业”、“修补与置备”，然后点击“中间件”，检查你刚创建的配置文件是否已列出。\n*\
  \   依次点击“企业”、“修补与置备”，然后点击“软件库”。如果将“网络”文件夹展开到其子目录，你将能看到构成该配置文件的三个组件，它们都应显示成功状态。\n\
  \n## 过滤掉 Fusion Middleware\n\n配置文件置备完成后，你现在可以通过过滤掉 Fusion Middleware 来减少屏幕上显示的进程列表数量。这是通过为\
  \ Fusion Middleware 置备进程 (`FMWPROV`) 创建一个新的属性文件模板来实现的，该模板通过相应的全局通用标识符 (`GUID`) 进行标识。使用更新后的属性文件提交\
  \ `FMWPROV` 进程直至完成。\n\n### 获取 GUID 并创建属性文件\n\n要捕获部署进程的 `GUID`，可使用如下 `emcli` 命令：\n\
  \n```\n> emcli get_procedures | grep FMWPROV\n```\n\n你的结果将是以下格式：\n\n```\n<proc_guid>,\
  \ <procedure_type>, <display_name>, <version>, <parent_name>\n```\n\n输出示例如下：\n\n\
  ```\n> emcli get_procedures | grep FMWPROV\nF5143FC2A0D94E37E043BB76F00ADE34 FMW\
  \ Provisioning FMWPROV_DP Provision Middleware 5.0 ORACLE\n```\n\n使用上面的 `GUID`，准备属性文件模板：\n\
  \n```\n> emcli describe_procedure_input -procedure=F5143FC2A0D94E37E043BB76F00ADE34\
  \ >FMVtmp.properties\n> 一个名为 FMVtmp.properties 的属性文件被创建\n```\n\n文件创建后，使用 `vi` 打开该文件，并使用完成\
  \ `FMV` 置备所需的必要数据属性进行更新（在图 2-13 中以红色显示；需要替换为你环境的具体值）：\n\n![9781484202395_Fig02-13.jpg](img/9781484202395_Fig02-13.jpg)\n\
  \n## 图 2-13. 用于通过 EM CLI 满足进程调用请求的已填写属性文件示例\n\n保存更新后的模板文件，并提交进程以完成置备：\n\n```\n>\
  \ emcli submit_procedure -input_file=data:FMVtmp.properties -procedure= F5143FC2A0D94E37E043BB76F00ADE34\n\
  ```\n\n### 扩展中间件部署\n\n置备的主要优势之一是其可扩展性。`EM12c` 提供了通过增加服务器实例来提高集群容量的机会。需要使用 `EM CLI`\
  \ 命令、`SCALEUP` 进程以及实例 `GUID` 来纵向和横向扩展受管服务器，才能创建该进程的输入属性文件。属性文件更新后，即可提交 `SCALEUP`\
  \ 进程：\n\n```\n> emcli get_procedures | grep SCALEUP\nB95E01B1F145B5EEE050634DC8854DC,\
  \ FMW Provisioning, SCALEUP DP, Scale up/Scale out Middleware, 2.0, ORACLE\n```\n\
  \n获取到此信息后，你可以使用 `GUID` 信息创建属性文件。此过程必须针对目标 `GUID` 至少提交一次以创建属性文件，否则会发生错误：\n\n```\n\
  > emcli get_instance_data –instance= B95E01B1F145B5EEE050634DC8854DC > instancetmp.properties\n\
  一个名为 instancetmp.properties 的属性文件被创建。\n```\n\n在编辑器中打开属性文件，输入更新后的信息，然后保存。更新完成后，你必须提交该进程：\n\
  \n```\n> emcli submit_procedure –input_file: instancetmp.properties –procedure=B95E01B1F145B5EEE050634DC8854DC\n\
  ```\n\n这将完成提交进程以扩展中间件部署的过程。\n\n## Jython\n\nPython 已存在相当长一段时间，并将继续作为一种相对易用且功能强大的开发语言而日益普及。但什么是“Jython”？\n\
  \n`Jython`，最简单的定义是，`Python` 语言的 `Java` 实现。与 `Python` 一样，其语法简单易学，具有自我格式化能力，并且（像 `Perl`\
  \ 一样）在代码使用前不需要编译。\n\n从 `EM12c 第 3 版` 开始，`EM CLI` 包含了一个嵌入式的 `Jython` 解释器。函数调用（也称为动词）通过其对应的键值对或作为动词参数呈现的参数来执行。动词的目的和用法将在本书后面解释。\n\
  \n如果使用交互模式，解释器会打开一个用于发出更简单命令的 shell，而不是采用 shell 脚本模式（即解释器接受一个命令脚本列表作为程序来处理），也不是简单地以命令行方式使用\
  \ `EM CLI`。其优势当然在于，最终用户无需关心语法和键值对，即可运用 `EM CLI` 的强大功能。\n\n你可以通过 `OMS` 中的无状态通信和安全层，连接到\
  \ `Enterprise Manager` 环境中的任何目标，从而将 `Jython` 与 `EM CLI` 结合使用。`Enterprise Manager`\
  \ 资源中有一个简单通用的列表功能，以及运行用户定义的 `SQL` 查询以访问已发布存储库视图的能力。\n\n要执行用 `Jython` 编写的脚本，命令可以很简单，就像从命令行交互式执行一样，类似于执行\
  \ `SQL` 脚本：\n\n```\n> emcli @test_python_scrpt.py\n```\n\n要在交互模式下运行，你需要启动 `EM CLI`\
  \ 程序：\n\n```\n> emcli <enter>\nemcli>\n```\n\n基于 `Jython` 的脚本环境允许交互式处理和一种使用 `JSON`\
  \ 的标准化格式的简单脚本模式。`JSON` 代表 `JavaScript 对象表示法`。`JSON` 格式也相当简单，它只需要名称和值对集合的表示数据。然后，这些对被置于数组、映射或列表中以确保可管理性。\n\
  \n类似于 `XML`，`JSON` 符合开发者和环境系统读取数据的方式，但它没有 `XML` 所需的元数据开销（称为元素和属性名称）。\n\n## 支持的 Java\
  \ 版本\n\n`EM CLI` 需要适当的 `Java` 版本支持，这也是使用 `Jython` 进行高级脚本编写的要求，因此了解 `Java` 版本非常重要。在标准产品安装过程中安装到你的\
  \ `OMS` 上的 `EM CLI` 副本依赖于已为 `OEM` 设置的 `JAVA_HOME`。\n\n位于其他位置（例如你的桌面）的 `EM CLI` 必须设置\
  \ `JAVA_HOME`，并且它需要 `Java` 版本 `1.6.0.43` 或更高版本。\n\n如果使用 `Jython`，则必须在安装 `EM CLI`\
  \ 高级套件 (`emcliadvancedkit.jar`) 之前安装并设置 `Java`。除非存在 `Java` 版本 `1.7.0.17`，否则 `Windows\
  \ 8` 和 `8.1` 会出现错误。兼容性矩阵可在 `My Oracle Support` 上获取。\n\n> **提示**  Windows 服务器通常建议在安装新版本的\
  \ `Java` 后卸载旧版本。为避免注册表问题，请确保：\n> *   没有其他 `ORACLE_HOME` 在其路径中使用该 `Java` 版本，并且\n\
  > *   在安装新版本 *之前* 卸载旧版本的 `Java`，以防止对新安装产生任何影响。\n\n## 路径和环境变量\n\n要执行 `EM CLI` 动词，无论它们是\
  \ `Python` 编写还是其他形式，你都需要连接到 `OMS`。这将需要设置环境变量（也称为客户端属性）作为 `EM CLI` 脚本环境的一部分。你可以利用\
  \ `EM CLI` 中的帮助选项检查所有可能的客户端属性：\n\n```\n> emcli>help('client_properties')\n     \
  \   EMCLI_OMS_URL\n        EMCLI_USERNAME\n        EMCLI_AUTOLOGIN\n        EMCLI_TRUSTALL\n\
  \        EMCLI_VERBJAR_DIR\n        EMCLI_CERT_LOC\n        EMCLI_LOG_LOC\n    \
  \    EMCLI_LOG_LEVEL\n        EMCLI_OUTPUT_TYPE(status())\n```\n\n\n"
- "# 客户端或远程目标安装\n\n在远程目标上安装 EM CLI 有多种原因。您必须判断是否存在这样做的显著必要性，或者是否可以通过使用 `emctl` 命令来完成需要在远程目标上运行的任务。\n\
  \n## 考虑原因\n\n以下是在远程目标或客户端上不安装 EM CLI 的两个原因：\n\n1.  **安全性**：EM CLI 将被配置为访问 OMS，因此这样做的安全风险需要被充分评估。任何在远程目标或客户端上使用\
  \ EM CLI 的用户，仍然需要像从 OMS 安装的 EM CLI 那样登录，但这确实比纯 OMS 安装的配置增加了额外的安全风险。\n2.  **效率**：Enterprise\
  \ Manager Control (`EMCTL`) 命令可以在命令行完成与 EM CLI 相同的多项任务，例如发出对目标的远程停机维护等。在这些情况下，无需进行完整的\
  \ EM CLI 远程安装和配置。`EMCTL` 使用现有的 EM agent 来执行这些任务，利用其标准连接，无需额外的密码或认证令牌。\n\n## 安装概述\n\
  \n现在，我们将回顾当您有合理理由需要进行 EM CLI 的远程目标或客户端安装时应遵循的步骤。EM CLI 客户端的桌面安装也通过此过程完成。\n\n下载和部署\
  \ EM CLI 客户端到远程主机只需几个步骤。实际的 EM CLI 安装已在 OMS 主机上自动完成，因此只需要手动进行远程客户端安装。EM CLI 客户端包含两个套件——EM\
  \ CLI 标准套件和 EM CLI 脚本套件。如果您希望在 OMS 主机之外使用脚本方法，那么远程安装则需要同时安装这两个套件。脚本套件包含了 Jython\
  \ 解释器，因此进行 Jython 脚本编写时无需额外的解释器。\n\n本节将仅关注标准套件，而下一节将通过关注高级（包含标准和脚本）套件来增强安装技术。\n\n\
  ## 先决条件\n\n在安装之前，您必须在任何客户端或远程目标上满足以下要求：\n\n*   EM12c Cloud Control Framework\n*\
  \   Java 版本 1.6x 或更高\n*   操作系统为 Linux、Sun、HPUX、AIX 或 Windows。\n\n## 下载套件\n\n满足这些要求后，您必须从两个位置之一下载套件。第一种是通过\
  \ EM12c 控制台，点击 `设置` > `命令行界面`，然后选择 `将 EM CLI 标准套件下载到您的工作站`。选择一个位置来保存下载的文件。\n\n您也可以使用\
  \ URL 链接从 OMS 主机下载：\n\n```\nhttps://<OMS_HOST>:<port>/em/<swlib_directory>/emcli/kit/emclikit.jar\n\
  ```\n\n完成 `emclikit.jar` 文件的下载后，通过 SCP/FTP 或其他传输工具将其复制到远程服务器。\n\n## 设置环境\n\n传输完\
  \ `.jar` 文件后，与任何套件安装一样，请确保您的 `JAVA_HOME` 已设置。根据您的操作系统，可能需要以下设置之一：\n\nUnix:\n\n```\n\
  > setenv JAVA_HOME /usr/local/packages/j2sdk\n> setenv PATH $JAVA_HOME/bin:$PATH\n\
  > echo $JAVA_HOME\n> echo $PATH\n```\n\nLinux:\n\n```\n> export JAVA_HOME /usr/bin/jdk6/jre\n\
  > export PATH $JAVA_HOME/bin:$PATH\n> echo $JAVA_HOME $PATH\n```\n\nWindows:\n\n\
  ```\n> set JAVA_HOME D:\\progra~1\\java\\jre\n> echo %JAVA_HOME%\n```\n\n![Image](img/sq.jpg)\
  \ `注意` 路径将在服务器的环境变量中设置。\n\n然后按如下方式检查 Java 路径：\n\nUnix/Linux:\n\n```\n> which java\n\
  ```\n\nWindows:\n\n```\nC:\\users: where java\n```\n\n## 安装命令\n\n一旦确认了 `JAVA_HOME`，即可通过执行以下命令快速安装\
  \ EM CLI 标准套件，将 `emcli_install_dir` 替换为您希望安装 EM CLI 的相关目录：\n\n```\n> $JAVA_HOME/bin/java\
  \ -jar emclikit.jar -install_dir=<em_cli_home_dir>\n```\n\n对于 Windows 系统，该过程会进行调整以考虑环境变量的变化。\n\
  \n\n```\n%JAVA_HOME%\\bin\\java -jar emclikit.jar -install_dir=<em_cli_home_dir>\n\
  ```\n安装完成后，将返回以下消息：\n```\nThe EM CLI client is installed in <emcli_client_install_dir>\n\
  ```\n这将验证安装是否完成。您需要查看日志并确保安装过程中没有错误；同时检查所有功能是否已启用。如果您使用单点登录（SSO）或其他高级安全功能，请确保已采取相应步骤以包含与\
  \ EM CLI 的同步。\n\n### EM CLI 高级工具包\n\n与标准工具包一样，EM CLI 高级工具包也可以从 EM12c 控制台下载。登录到企业环境后，依次单击\
  \ Setup（设置）> Command Line Interface（命令行界面）（图 2-14）。\n\n![9781484202395_Fig02-14.jpg](img/9781484202395_Fig02-14.jpg)\n\
  \n图 2-14. 从 Enterprise Manager 控制台访问 EM CLI\n\n进入 EM CLI 安装向导后，您将看到如 图 2-15 所示的选择。\n\
  \n![9781484202395_Fig02-15.jpg](img/9781484202395_Fig02-15.jpg)\n\n图 2-15. 从 Enterprise\
  \ Manager 控制台进行 EM CLI 安装的安装要求\n\n页面右侧的说明清晰地定义了下载工具包以及成功完成安装所需的先决条件步骤。\n\n### 通过\
  \ OMS 安装 EMCLI\n\n最后的安装选项是通过 OMS 执行。您需要先将 EM CLI 工具包下载到远程主机或您的工作站。请注意，下载链接是显示页面中的第一个项目符号选项：“Download\
  \ the EM CLI with scripting options to your workstation（下载带脚本选项的 EM CLI 到您的工作站）”。\n\
  \n单击此链接开始下载过程。由于这是一个 Java 文件，您可能会收到类似以下警告（图 2-16）：\n\n![9781484202395_Fig02-16.jpg](img/9781484202395_Fig02-16.jpg)\n\
  \n图 2-16. 下载用于工作站安装 EM CLI 所需的 .jar 文件时的警告\n\n您也可以通过以下 URL 直接下载文件：\n```\nhttp://<EM_HOST>:<port>/em/<public_sw_lib>/emcli/kit/emcliadvancedkit.jar\n\
  ```\n完成后，请确保已通过 SCP/FTP 或其他文件传输实用程序将文件复制到新主机。如果高级工具包将用于本地 OMS 主机，则可以继续执行安装步骤。\n\n\
  确保您已正确设置 `JAVA_HOME` 并且它已包含在环境路径中，这在标准工具包安装步骤中已介绍。\n\n![Image](img/sq.jpg) `Note`\
  \ 如果这是用于 Windows 主机安装，请在环境变量中设置 `JAVA_HOME`，而不是在会话级别设置。Oracle 安装通常会调用可能不会继承会话级别变量的辅助会话，这可能导致这些辅助进程失败。\n\
  \n使用以下命令执行安装步骤，将 `emcli_install_dir` 替换为与安装路径关联的目录：\n```\n> java –jar emcliadvancedkit.jar\
  \ client –install_dir=<emcli_install_dir>\n```\n如前所述，成功安装后将返回以下消息：\n```\nThe EM\
  \ CLI client is installed in <emcli_install_dir>\n```\n\n### 安装后配置\n\n对于任何工具包，无论是安装在主机还是远程主机上，安装完成后都应执行与\
  \ OMS 的同步。\n\n在同步之前，您首先需要将 EM CLI 客户端或远程主机信息配置到现有 OMS 中。\n\n切换到 EM CLI 主目录并使用本地配置信息设置本地用户。您可以通过输入以下命令轻松收集关于\
  \ `setup` 动词的信息：\n```\n> emcli help setup\n```\n设置本地用户需要以下命令语法：\n\n**标准工具包**\n```\n\
  > emcli setup –url=http://<local_host_name>:<port>/em –username=em_user\n```\n**高级（脚本）工具包**\n\
  ```\n> emcli setup –url=http://<local_host_name>:<port>/em –username=em_user -trustall\n\
  > emcli login –username=sysman\n```\n设置完成后，需要将其与 OMS 同步：\n```\n> emcli help sync\n\
  ```\n\n### 补丁与升级\n\n尽管补丁和升级最初可能看起来不属于安装的一部分，但它们是安装过程中非常重要的一个方面。考虑到我们强调在安装后立即应用所有捆绑补丁的重要性，在安装过程中包含对这些补丁的检查，正说明了这一步在任何\
  \ OEM 环境安装中的重要性。\n\n#### 使用 EM CLI 客户端打补丁\n\n通过命令行界面利用部署过程执行打补丁，其功能完整性不亚于通过 Enterprise\
  \ Manager 控制台执行。打补丁是与一个属性文件结合执行的，该文件包含简化命令的输入信息，并提供 EM CLI 完成补丁过程所需的信息。请记住，EM CLI\
  \ 不是像每个主机上的常规 EM 代理那样的代理；它是作为客户端软件安装的实用程序。\n\n要从头开始创建属性文件，您需要了解如何以及何时使用以下步骤之一创建：\n\
  \n*   从现有过程的模板创建\n*   使用通过控制台创建的、当前状态的属性文件\n*   重用先前执行中保存的属性文件\n\n**从模板创建属性文件**\n\
  \n使用现有过程 GUID，只需几个命令即可构建一个模板，并为您要执行的新过程插入值。\n\n然后执行 EM CLI 命令以获取有关可用过程模板的信息。在下面的示例中，我们将拉取补丁模板示例：\n\
  ```\n./emcli get_procedures -type=PatchOracleSoftware\nCF9D698E8D3843B9E043200B14ACB8B3,\
  \ PatchOracleSoftware, CLONE_PATCH_SIDB, Clone and Patch Oracle \nDatabase, 12.2,\
  \ ORACLE\nCF9D698E8D4743B9E043200B14ACB8B3, PatchOracleSoftware, PATCH_ALL_NODES_CLUSTER_ASM,\
  \ Patch Oracle \nCluster ASM - All Nodes, 12.2, ORACLE\n```\n返回的第一条信息是我们需要的过程 GUID，然后我们可以从中创建属性文件以供使用：\n\
  ```\n./emcli describe_procedure_input -procedure=CF9D698E8D3843B9E043200B14ACB8B3\
  \ \n> Patch_template.properties\nVerifying parameters ...\n```\n现在您的模板文件已创建：\n```\n\
  -rw-r--r-- 1 oracle dba   65950 Jan 27 19:12 Patch_template.properties\n```\n\n\
  **为远程客户端安装打补丁**\n\n如果您已将 EM CLI 客户端部署到目标服务器，则可以通过在 EM CLI 设置过程中将其在 OMS 中注册来轻松跟踪它们。跟踪信息保留在\
  \ OMS 中，记录所有需要打补丁的 EM CLI 客户端安装二进制文件。它还会识别需要更新密码或需要使用 OMS 存储库中的新动词进行同步的 EM CLI 安装。客户端软件安装不是\
  \ OEM 中的目标，因此不受 EM 代理的跟踪或监控。\n\n### EM 安全框架\n\n鉴于 EM CLI 的强大功能，安全性始终是任何人心中的首要考虑。命令行可以访问整个受监控环境，因此这个问题被包含在这里也就不足为奇了。\n\
  \n按照任何 Oracle 安全实践的标准，建议作为安全实践的一部分对服务器进行加固——移除服务和直接访问属于 Oracle 的操作系统级别文件。\n\n基本的安全设计要求我们从所有受监控目标一直到\
  \ Enterprise Manager 组件进行全面审视，但有一些白皮书可以解决 EM CLI 之外的安全问题；在本节中，我们将重点介绍命令行和 Enterprise\
  \ Manager 的安全性。\n\n### EM CLI 中的安全性\n\n\n\n## EM CLI 安全架构与关键功能\n\nEM CLI 的安全架构构建于\
  \ Enterprise Manager 12c 环境的架构之上，正如我们上面所讨论的，它通常是首要的安全关注点。通过 EM CLI 访问 Enterprise\
  \ Manager 的单点入口是第二个关注点。您将通过 EM CLI 与之交互的远程目标的凭据是第三级访问权限，更需要关注，因为这些目标很可能包含您数据库环境的生产目标。\n\
  \n### EM CLI 设置的安全模式\n\n在讨论第二级安全时，我们将阐述 EM CLI 中安全模式的含义。安全模式 EM CLI 是默认的安装模式，它不会在本地磁盘或日志文件中存储任何\
  \ Enterprise Manager 或 SSO 密码。\n\n默认情况下，EM CLI 登录在达到设定的不活动时间点后会自动超时，用户必须在尝试通过 EM\
  \ CLI 发出任何其他命令之前重新登录。\n\n如果您希望将 EM CLI 安置设置为在重新发出动词时自动登录，并要求显式注销 EM CLI，请执行以下命令：\n\
  \n```\n> emcli setup –noautologin\n```\n\n### HTTPS 受信证书\n\n设置 HTTPS 受信证书首先需要快速检查以确认尚未完成。这可以通过以下同步后的\
  \ EM CLI 状态命令来实现，如图 2-17 所示：\n\n```\n> emcli status\n```\n\n![9781484202395_Fig02-17.jpg](img/9781484202395_Fig02-17.jpg)\n\
  \n图 2-17. 从 EM CLI 发出状态调用以查看有关 Enterprise Manager 命令行界面和 https 状态的信息\n\n检查 EM URL\
  \ 值，查看连接是否已在使用安全的 HTTPS URL。如果尚未使用，可以通过 EM CLI 动词调用进行配置：\n\n```\n> emcli setup –url=\"\
  http[s]://host:port/em\" –username=\"<username>” [-trustall] [-novalidate]\n```\n\
  \n系统将要求您提供 `SYSMAN` 密码以完成对 EM 控制台的此安全级别配置更改。输入密码并按回车键以完成设置。运行 `emcli status` 动词调用将显示\
  \ `EMURL` 的更新值，或者可以使用 `emcli setup` 调用来查看它（图 2-18）。\n\n![9781484202395_Fig02-18.jpg](img/9781484202395_Fig02-18.jpg)\n\
  \n图 2-18. 发出 `setup` 命令以验证 EM CLI 和 Enterprise Manager 控制台所用 EM URL 的安全 https 连接\n\
  \n### Release 4 中的重要动词\n\n与 EM12c 的每个版本一样，Release 4 也包含了重大的增强和新动词的引入。Release 4 (12.1.0.4)\
  \ 也不例外，并且有更新的补丁来完成该版本，因为其他产品线的动词依赖项也同时发布了。\n\n#### 金质代理更新动词\n\n“金质代理”动词是那些在补丁中发布而非初始\
  \ Release 4 一部分的动词组之一。它们列在初始的 EM CLI 发布文档和帮助文件中，但实际上直到补丁发布后才可用。参见以下列表：\n\n*   `get_agent_update_status`:\
  \ 显示使用金质映像的所有代理更新结果\n*   `get_not_updatable_agents`: 显示无法作为金质映像一部分进行更新的代理\n*   `get_updatable_agents`:\
  \ 显示给定金质代理映像名称或金质映像系列中可更新的代理\n\n#### BI 发布报表动词\n\nRelease 4 将 BI Publisher 作为安装的一部分包含在内。紧凑型安装现在仅约\
  \ 300 MB 大小，只需几个 EM CLI 命令即可授予 Enterprise Manager 用户访问权限和功能：\n\n*   `grant_bipublisher_roles`:\
  \ 授予对 BI Publisher 目录和功能的访问权限\n*   `revoke_bipublisher_roles`: 撤销对 BI Publisher\
  \ 目录和功能的访问权限\n\n#### 云服务动词\n\n随着 Release 4 的发布，云产品得到了显著改进，能够从命令行管理云请求、用户和服务实例数据对于简化云服务的任务管理至关重要：\n\
  \n*   `cancel_cloud_service_requests`: 取消云请求。应提供用户或名称选项\n*   `delete_cloud_service_instances`:\
  \ 根据指定的过滤器删除云服务实例\n*   `delete_cloud_user_objects`: 删除云用户对象，包括云服务实例和请求\n*   `get_cloud_service_instances`:\
  \ 检索云服务实例列表。如果未指定选项，将打印所有实例。\n*   `get_cloud_service_requests`: 检索云请求列表。如果未应用过滤器，将打印所有请求。\n\
  *   `get_cloud_user_objects`: 检索云用户对象列表，包括云服务实例和请求。如果未使用用户选项，将打印所有对象。\n\n#### 其他动词\n\
  \nRelease 4 对维护间隔（blackouts）进行了重大更改，其中之一是允许在控制台和命令行内进行追溯性维护间隔：\n\n*   `create_rbk`:\
  \ 在给定目标上创建追溯性维护间隔并更新其可用性。使用此 `emcli` 命令需要先在 UI 中启用追溯性维护间隔功能。\n*   孤儿目标一直是困扰一段时间的问题。新增的合规性增强动词解决了这个问题：\n\
  \    *   `fix_compliance_state`: 通过删除对已删除目标的引用来修复合规状态。\n*   以下动词用于支持 WebLogic 环境中的复杂复合目标。设计一个专门用于修改这些目标的动词至关重要：\n\
  \    *   `modify_monitoring_agent`: 此动词可用于更改配置为监控 WebLogic 域中目标的代理。\n\n#### Fusion\
  \ Middleware 配置动词\n\nFusion Middleware 新增了多个动词并进行了增强，以帮助管理 WebLogic 功能并从命令行构建更多选项：\n\
  \n*   `create_fmw_domain_profile`: 从 WebLogic 域创建 Fusion Middleware 配置文件\n*   `create_fmw_home_profile`:\
  \ 从 Oracle 主目录创建 Fusion Middleware 配置文件\n*   `create_inst_media_profile`: 从安装介质创建\
  \ Fusion Middleware 配置文件\n\n#### 作业动词\n\nEM 作业服务进行了多项增强。这些增强功能使我们能够将作业从一个 EM12c\
  \ Release 2 OMS 导出并导入到相同版本或更高版本的环境中。为了提供更好的作业管理选项，Oracle 还在 Release 4 中通过 EM CLI\
  \ 添加了更高级的作业控制：\n\n*   `export_jobs`: 导出 EM 中所有匹配的作业定义，包括纠正措施。系统作业和嵌套作业被排除。\n*  \
  \ `import_jobs`: 将所有作业定义（包括来自 zip 文件的纠正措施）导入 EM。创建库作业。EM CLI 登录用户被设置为库作业所有者。\n*\
  \   `job_input_file`: 在属性文件中指定作业动词的部分或全部属性。在命令行设置的属性会覆盖文件中的值。\n*   `resume_job`:\
  \ 恢复与过滤条件匹配的一个或一组作业。\n*   `suspend_job`: 挂起与过滤条件匹配的一个或一组作业。\n\n#### 目标数据动词\n\n\n"
- "# 第 3 章\n\n## 概要\n\n对大多数读者而言，使用动词调用是 `EM CLI` 工作中最主要的部分。熟悉 `12.1.0.4` 版本中的重大动词变更至关重要，但在本书的剩余章节中，我们将围绕在企业管理器命令行界面中进行脚本编写的这一目标，来构建你的知识体系。\n\
  \n## 术语与基础\n\n![image](img/frontdot.jpg)\n\n像任何命令行工具一样，`EM CLI` 初看起来可能让人望而生畏。但如同技术领域的其他事物一样，人们对某样东西的工作原理理解得越透彻，它就越有用，使用起来也越容易。\n\
  \n`EM CLI` 的信息量太大，即使只是其中一小部分也难以全部记住。文档与工具本身同等重要。理解文档、内置手册以及工具本身所使用的术语，能够让你通过提出正确的问题来快速找到所需内容。例如，如果你要寻找创建用户的命令，你需要知道你是在寻找一个**动词**，而不是参数或变量。\n\
  \n一旦理解了 `EM CLI` 的术语，对其功能有基本的了解，就能立即开始执行基本任务，而真正的学习也由此开始。本章首先通过解释 `EM CLI` 与企业管理器的协作方式，然后提供一系列详细示例，来介绍其基础知识。\n\
  \n### 术语：动词\n\n`EM CLI` 的功能使用**动词**来执行操作。动词是以用户命令形式呈现的任务或操作，它暴露了企业管理器的功能。理解动词及其如何用于完成任务，对于充分利用\
  \ `EM CLI` 至关重要。\n\n动词可以包含一个或多个参数。所使用的**模式**决定了这些参数的形式。例如，在**命令行模式**下使用 `EM CLI`\
  \ 时，参数是跟在动词后面的**位置参数**。每个参数前都有一个短横线，后跟一个等号。随后可以为该参数赋值，值通常用引号括起来。\n\n有些参数是必需的，有些是可选的。文档通过将可选参数放在方括号中来标识它们。例如，`clear_privilege_delegation_setting`\
  \ 动词有一个必需参数和两个可选参数（清单 3-1）。\n\n**清单 3-1. clear_privilege_delegation_setting 动词的必需和可选参数**\n\
  ```\nemcli clear_privilege_delegation_setting\n        -host_names=\"name1;name2;...\"\
  \n        [-input_file=\"FILE:file_path\"]\n        [-force=\"yes/no\"]\n```\n\n\
  截至 `12.1.0.3` 版本，共有 `362` 个动词。为了更方便地帮助你查找和管理动词，它们被分为 `58` 个类别。这些类别代表了逻辑功能。例如，如果你要查找与修补相关的动词，你会在\
  \ *修补动词* 类别中找到它们。如果要查找与黑屏（blackouts）相关的动词，你会在 *黑屏动词* 类别中查找。\n\n动词的命名方式使其功能一目了然。有些名称很短，如\
  \ `login` 和 `start_agent`；有些则非常长，如 `update_monitoring_creds_from_agent` 和 `list_target_privilege_delegation_settings`。这种命名法的好处在于，它使得动词相对容易记忆，并且便于根据功能来查找动词。\n\
  \n## 模式\n\n`EM CLI` 可以通过三种不同模式之一调用。模式是使用 `EM CLI` 的方法。选择哪种模式取决于任务的目的和范围。\n\n####\
  \ 命令行模式\n\n在 `12.1.0.3` 版本之前，`EM CLI` 仅在一种模式下运行——命令行模式。在命令行模式下，每次调用 `emcli` 可执行文件，`EM\
  \ CLI` 只执行一个动词。命令行模式下的 `EM CLI` 没有子 shell 或编程接口。任何 `EM CLI` 的脚本编写都需要通过能够调用单个 `EM\
  \ CLI` 命令并处理其输出的 shell 来完成。\n\n#### 交互模式\n\n随着 `12.1.0.3` 版本的发布，`EM CLI` 现在包含了经典的命令行模式以及交互模式和脚本模式。交互模式允许将\
  \ `EM CLI` 作为所使用任何终端的子 shell 调用。当 `EM CLI` 在交互模式下运行时，提示符会更改为自定义的 Python 提示符：\n```\n\
  cd $OMS_HOME/bin\n./emcli\nemcli>\n```\n\n#### 脚本模式\n\n脚本模式没有子 shell 或提示符。实际上，它与命令行模式非常相似，区别在于其调用允许第一个参数是一个用\
  \ Python 兼容编程语言编写的脚本。然后，该脚本会被执行，就如同命令被输入到交互模式一样。脚本模式下的 `EM CLI` 只调用一次，但与命令行模式不同的是，Python\
  \ 编程语言的全部功能都可以用来完成在命令行模式中需要 shell 来完成的一切工作。此外，脚本模式以原生形式调用 `EM CLI`，这使得解析命令输出等工作变得更加容易和高效，尤其是在使用\
  \ JSON 时。\n\n### 帮助！\n\n`EM CLI` 具有内置的帮助功能。获取命令行模式下可用动词的概览列表，只需使用动词 `help` 执行 `EM\
  \ CLI` 即可。如果你没有使用额外的参数来限定命令，请准备好接收大量数据。如果你需要关于某个特定动词的更多信息，请将该动词作为第二个参数添加。\n\n要在交互模式下使用\
  \ `help`，需要调用一个名为 `help()` 的 Python 函数。`help()` 函数只需要一个参数——帮助主题。帮助主题可以是一个动词函数，也可以是某些动词函数的参数。请注意，交互模式中包含的一些帮助主题在命令行模式中并不存在。例如，命令行模式使用设置文件来保存\
  \ `EM CLI` 属性，但交互模式和脚本模式则不使用。每次调用交互或脚本模式时，属性都会被设置。我们可以使用 `help()` 函数来查看设置属性时应使用哪些参数，如\
  \ 清单 3-2 所示。\n\n**清单 3-2. 客户端属性帮助页面**\n```\nemcli>help('client_properties')\nEMCLI_OMS_URL\
  \             : 要连接到的 OMS URL。\nEMCLI_USERNAME            : OMS 用户名。\nEMCLI_AUTOLOGIN\
  \           : 可能的值为 true, false。默认为 false。\nEMCLI_TRUSTALL            : 可能的值为 true,\
  \ false。默认为 false。\nEMCLI_VERBJAR_DIR         : 绑定目录的位置。\nEMCLI_CERT_LOC       \
  \     : 有效证书文件的位置。\nEMCLI_LOG_LOC             : 日志文件存储的目录。\nEMCLI_LOG_LEVEL    \
  \       : 可能的值为 ALL, INFO, FINE, FINER, WARN, SEVERE。默认为 SEVERE。\nEMCLI_OUTPUT_TYPE\
  \         : 可能的值为 json, JSON, text, TEXT。脚本模式下默认为 json，交互模式下默认为 text。\n```\n\n---\n\
  \n*   `create_assoc`: 创建目标关联实例\n*   `delete_assoc`: 删除目标关联实例\n*   `list_allowed_pairs`:\
  \ 列出指定源和目标目标类型所允许的关联类型\n*   `list_assoc`: 列出指定源目标和目标目标之间的关联\n*   `manage_agent_partnership`:\
  \ 覆盖企业管理器自动将伙伴代理分配给其他代理的默认行为。伙伴代理是指，除了其其他功能外，还被分配给另一个代理作为其“伙伴”的代理，以便远程监控该代理及其主机的可用性。此动词并非设计为常用。它是为了支持特殊情况而提供的，例如管理员可能希望明确分配代理伙伴关系，或排除某些代理成为伙伴，或排除某些代理被其他代理远程监控。\n\
  \n`status()` 将列出所有客户端属性的值。可以使用 `set_client_property(属性名, 值)` 和 `get_client_property(属性名)`\
  \ 来设置和获取客户端属性。\n\n## 理解错误代码\n\n在使用 EM CLI 时，您可能会遇到多种错误代码。这些错误代码所提供的信息对于确定错误原因至关重要。下面显示的是最常见的一些错误代码；它们几乎总是有简单的解决方法。\n\
  \n命令行模式要求在执行任何命令之前必须先建立登录会话。在安全环境中以及默认情况下，登录会话将在 45 分钟后过期。当在命令行模式下，未建立有效登录会话却执行了有效命令时，系统会抛出一个退出代码为\
  \ 255 的错误。要继续操作，需要使用 `login` 动词建立一个有效会话，如 清单 3-3 所示。\n\n清单 3-3. 命令行模式下的登录错误消息和退出代码\n\
  ```\n[oracle oms]$ emcli get_targets\nError: Session expired. Run emcli login to\
  \ establish a session.\n[oracle oms]$ echo $?\n```\n\n交互模式和脚本模式要求在每次执行脚本或建立交互会话时都必须包含连接参数。如果未指定连接\
  \ URL，则会抛出一个错误，其中包含有关如何建立连接的详细信息，如 清单 3-4 所示。\n\n清单 3-4. 交互模式和脚本模式下的设置错误\n```\n\
  emcli>get_targets()\nError: EM URL is not set. Do set_client_property('EMCLI_OMS_URL',\
  \ '<value>')\nOr set it as environment variable.\n\n[oracle ~]$ emcli @test.py\n\
  Traceback (most recent call last):\n  File \"test.py\", line 1, in <module>\n  \
  \  get_targets()\n  File \"<string>\", line 41, in get_targets\nemcli.exception.VerbExecutionError:\
  \ Error: EM URL is not set. Do set_client_property('EMCLI_OMS_URL', '<value>')\n\
  Or set it as environment variable.\n``\n\n错误可能由无数原因引起。EM CLI 的开发人员在使错误消息描述性强且实用方面做得非常出色。当您遇到错误时，请仔细阅读描述，以了解导致错误的问题是什么。如有疑问，请在文档或互联网上搜索该错误。很可能，其他人已经发现并修复了该错误的原因。\n\
  \n## 语法\n\nEM CLI 程序可以三种不同的模式使用。它们是命令行模式、交互模式和脚本模式。在 12.1.0.2 版本之前，只有命令行模式。交互模式和脚本模式在\
  \ 12.1.0.3 版本中可用，同时提供了一个使用 Jython 的公开编程接口。\n\n标准的命令行模式自 Grid Control 10g 以来变化不大。除了少数例外，用于早期\
  \ EM CLI 版本的脚本在最新版本或 12c 中仍可继续使用。命令行语法是 `emcli` 命令，后跟一个动词，再后跟零个或多个动词选项或参数，如下例所示：\n\
  ```\nemcli create_group -name=my_group -add_targets=\"mymachine.example.com:hostname\"\
  \n```\n\n交互模式和脚本模式均使用 Jython 编程语言。交互模式是通过执行不带任何参数的 `emcli` 命令创建的单用户交互会话。\n\n标准的\
  \ Linux Shell 命令在交互式 Shell 中不起作用。EM CLI 的交互模式可以使用 `exit()` 命令或在 Linux 中输入 `ctrl-d`\
  \ 或在 Windows 中输入 `ctrl-z` 来关闭。\n\n交互模式的语法与标准命令行模式不同。一旦建立了交互模式 Shell，就不再需要使用 `emcli`\
  \ 命令。执行 EM CLI 命令是通过直接将动词放入 Shell 并将动词选项括在括号内来完成的。与命令行模式不同，动词选项前不加短横线，而是在后面跟有其他选项时前加逗号。以下展示了交互模式下带有\
  \ `name` 和 `add_targets` 选项的 `create_group` 函数：\n```\nemcli> create_group(name=my_group,\
  \ add_targets=\"mymachine.example.com:hostname\")\n```\n\n脚本模式使用与交互模式相同的命令语法，但不需要\
  \ Jython Shell。所有要执行的 EM CLI 命令都将格式化为上述交互 Shell 命令的形式，并放入脚本中，同时包含任何其他要加入的 Python\
  \ 代码。该脚本通过在 `emcli` 命令后跟一个 `@` 符号和脚本名称来非交互式执行：\n```\n[oracle ~]$ emcli @my_script.py\n\
  ```\n\n## 设置\n\nEM CLI 包含在每个 OMS 安装中，并设置为自动连接到该 OMS。可以使用 `setup` 动词确认设置配置。在命令行模式下运行该命令显示\
  \ EM CLI 配置为使用 `SYSMAN` 用户连接到 `https://oem.example.com:7802/em`，如 清单 3-5 所示。\n\n\
  清单 3-5. 命令行模式下 EM CLI 设置的输出\n```\n[oracle ~]$ emcli status\nOracle Enterprise Manager\
  \ 12c EMCLI 12.1.0.3.0.\nCopyright (c) 1996, 2013 Oracle Corporation and/or its\
  \ affiliates. All rights reserved.\n\nInstance Home          : /u01/app/oracle/product/12.1.0/gc_inst/em/EMGC_OMS1/sysman/emcli/setup/.emcli\n\
  Verb Jars Home         : null\nStatus                 : Configured\nEMCLI Home \
  \            : /u01/app/oracle/product/12.1.0/mw_1/oms/bin\nEMCLI Version      \
  \    : 12.1.0.3.0\nJava Home              : /u01/app/oracle/product/12.1.0/mw_1/jdk16/jdk/jre\n\
  Java Version           : 1.6.0_43\nLog file               : /u01/app/oracle/product/12.1.0/gc_inst/em/EMGC_OMS1/sysman/emcli/setup/.emcli/.emcli.log\n\
  EM URL                 : https://oem.example.com:7802/em\nEM user              \
  \  : SYSMAN\nAuto login             : false\nTrust all certificates : true\n```\n\
  \n在 OMS 服务器以外的系统上安装 EM CLI 后，必须先对其进行显式配置，它才能与 Enterprise Manager 安装配合使用。对尚未配置的 EM\
  \ CLI 安装执行 `setup` 命令会返回错误，如 清单 3-6 所示。\n\n清单 3-6. 尚未设置的 EM CLI 安装\n```\n[oracle\
  \ ~]$ emcli setup\nOracle Enterprise Manager 12c 3.\nCopyright (c) 1996, 2013 Oracle\
  \ Corporation and/or its affiliates. All rights reserved.\n\nNo current OMS\n```\n\
  \n配置通过 `setup` 动词后跟多个参数来完成。`url` 参数与在浏览器中登录 Enterprise Manager 所使用的地址相同。`dir` 参数指定安装客户端的目录。`username`\
  \ 参数指示客户端将用于连接的用户名。`noautologin` 参数决定在建立 EM CLI 会话之前需要提供用户名和密码才能访问 OMS。`trustall`\
  \ 参数表示将自动信任 OMS 上的证书。以下 EM CLI 设置命令中的 `dir` 参数使用 Shell 扩展来表示安装目录是当前工作目录：\n```\n\
  [oracle ~]$ emcli -url=https://<hostname of grid server>:1159/em -dir=$(pwd) \n\
  -username=<username> -noautologin -trustall\n```\n\n\n# EM CLI 和 EMCTL 使用指南\n\n\
  在交互模式下运行 `setup` 命令将显示 URL 和用户均未定义。这是因为无论是在交互模式还是脚本模式下，这些参数都需要每次都进行设置，如 清单 3-7 所示。\n\
  \n清单 3-7. 在交互模式下执行 `setup` 函数\n\n```\nemcli>status()\nOracle Enterprise Manager\
  \ 12c EMCLI with Scripting option Version 12.1.0.3.0.\nCopyright (c) 1996, 2013\
  \ Oracle Corporation and/or its affiliates. All rights reserved.\n\nVerb Jars Home\
  \ (EMCLI_VERBJAR_DIR)      : /u01/app/oracle/product/12.1.0/mw_1/oms/bin/bindings/default/.emcli\n\
  EMCLI Home (EMCLI_INSTALL_HOME)         : /u01/app/oracle/product/12.1.0/mw_1/oms/bin\n\
  EMCLI Version                           : 12.1.0.3.0\nJava Home                \
  \               : /u01/app/oracle/product/12.1.0/mw_1/jdk16/jdk/jre\nJava Version\
  \                            : 1.6.0_43\nLog file (EMCLI_LOG_LOC)              \
  \  : CONSOLE\nLog level (EMCLI_LOG_LEVEL)             : SEVERE\nEM URL (EMCLI_OMS_URL)\
  \                  : NOT SET\nEM user (EMCLI_USERNAME)                : NOT SET\n\
  Auto login (EMCLI_AUTOLOGIN)            : false\nTrust all certificates (EMCLI_TRUSTALL)\
  \ : false\n```\n\n一旦设置完成并且通过身份验证连接到有效的 Enterprise Manager，EM CLI 就可以准备执行针对 EM 的任务。设置过程通常是发现问题的环节，尤其是在初始配置期间。例如，您可能不知道在安装\
  \ EM CLI 的服务器与 OMS 之间，EM 使用的端口被防火墙阻止了。设置过程将揭示这一事实。一旦建立了成功的登录连接，EM CLI 的设置过程就完成了。\n\
  \n## 通信方式\n\n许多任务可以使用 EM CLI 或 EM CTL 来完成。选择使用哪种工具将取决于多种因素，例如哪种工具可用，或者哪种工具对特定任务更高效。工具与\
  \ Enterprise Manager 接口的方式也可能是另一个需要考虑的因素。\n\n### EM CLI\n\nEM CLI 是 Oracle Management\
  \ Server (OMS) 的客户端，就像 SQL*Plus 是数据库的客户端一样。Enterprise Manager OMS 安装包含 EM CLI 的安装。EM\
  \ CLI 可执行文件位于 OMS 主目录中，即 `<OMS_HOME>/bin/emctl`。EM CLI 使用 HTML 与 OMS 通信，使用与访问 Enterprise\
  \ Manager 图形界面相同的端口和 URL。\n\n在用于 EM CLI 和 Enterprise Manager 之间 HTTP 通信的端口上运行网络跟踪，会显示来自\
  \ EM CLI 的所有请求都是通过 HTTP 的 `GET` 和 `POST` 请求。这些请求与通过 GUI 控制台建立登录时发出的请求相同。\n\nEM CLI\
  \ 与 Enterprise Manager 接口的方式允许它从任何能够建立到 OMS IP 和端口的网络连接的位置进行连接，这使得在需要从托管 OMS 代理以外的服务器运行命令的情况下，EM\
  \ CLI 相比 EM CTL 具有明显优势。\n\n### EM CTL\n\nEM CTL 与其安装的代理直接通信。EM CTL 只会与其自身的代理通信，即使同一服务器上运行着其他代理。\n\
  \n![Image](img/sq.jpg) `Note` 还有一个 EM CTL 接口可以直接控制和与 OMS 通信，它有一组完全不同的命令。\n\n位于 `<AGENT_BASE>/agent_inst/bin`\
  \ 的 `emctl` 命令是一个 shell 或批处理脚本，用于设置环境变量，并将传递给第一个命令的参数执行 `<AGENT_HOME>/bin/emctl`\
  \ 命令。`<AGENT_HOME>/bin/emctl` 也是一个 shell 或批处理脚本，用于设置环境变量并来源许多其他文件。然后它使用传递给第一个命令的参数执行一个\
  \ perl 脚本。这个 perl 脚本会来源许多其他 perl 脚本，并读取现有的状态文件或直接与 java 代理进程交互以获取结果。\n\n因为 EM CTL\
  \ 直接与 java 代理进程交互，所以它不被视为客户端。这也意味着无法使用 EM CTL 远程控制代理。\n\n### EM CTL 与 EM CLI 的比较\n\
  \n何时使用 EM CTL 还是 EM CLI 主要基于偏好和环境限制。例如，两条命令都可以控制 Enterprise Manager 中的维护窗口。在一个环境中，由于需要的\
  \ Java 版本或需要的端口访问，可能会限制远程或本地安装 EM CLI，这使得 EM CTL 成为更好的选择。在另一个环境中，可能对代理服务器上的 shell\
  \ 访问有限制，这使得 EM CLI 成为更好的选择。了解 EM CTL 和 EM CLI 之间的架构差异将有助于在不同情况下决定使用哪一个。\n\nEM CLI\
  \ 的语法相对简单；`emcli` 后跟一个动词，然后是必需和可选的参数。EM CTL 的语法不那么容易理解，并且不遵循严格的格式。\n\n对于大多数命令，格式如下：`emctl`\
  \ 后跟一个动词，然后是 `agent`。对于某些配置命令，格式是：`emctl` 后跟 `config agent`，然后是一个动词，如 `listtargets`\
  \ 或 `secure`。通常，找出要执行的 EM CTL 命令语法的最简单方法是在线查阅文档，或者通过不带任何参数执行 `emctl` 命令来打印帮助文本。帮助文本将打印到屏幕上。\n\
  \n可以通过将帮助文本重定向到可以打开和搜索的文件，或者通过将输出通过管道传输到可搜索的行读取器（如 `less`）来使此帮助文本可搜索：\n\n```\nemctl\
  \ > help.txt; vim help.txt\nemctl | less\n```\n\n既然我们已经回顾了许多重要的概念和定义，现在让我们看一些真实世界的示例，这些示例可用于完成许多人可能使用\
  \ EM CLI 来完成的最常见任务。\n\n第一个任务，登录，是每个 EM CLI 会话都必须完成的，无论使用哪种模式。其他任务是在 GUI 不合适时使用 EM\
  \ CLI 的示例，例如在计划脚本中或处理大量目标时。\n\n## 任务：建立登录\n\n如果没有与 OMS 的连接，EM CLI 几乎没有有用的功能。创建该连接通常是使用该接口的第一步。如何建立连接取决于所使用的模式。\n\
  \n当使用命令行模式时，如果在设置期间指定了 `-autologin` 参数，则不需要建立登录，因为此参数指示在 EM CLI 安装期间使用的凭据存储在安装文件中，并自动用于每个命令。使用\
  \ `login` 动词建立登录。`login` 动词后必须跟 `-username` 参数，并可选择性地跟 `-password` 参数。\n\n不建议在命令行上包含密码，因为存在暴露密码的安全隐患。如果参数中未包含密码，EM\
  \ CLI 将提示用户输入密码，并且输入的字符不会回显到屏幕上，在使用 `ps` 命令查看正在运行的进程时密码也不会暴露。如果在设置期间未指定 `-autologin`\
  \ 参数，登录会话将提示输入密码：\n\n```\n[oracle ~]$ emcli login -username=sysman\nEnter password\
  \ :\n\nLogin successful\n```\n\n在以脚本或交互模式运行 EM CLI 的情况下，每次脚本执行时以及每个交互会话开始时都必须明确提供登录信息。即使使用了\
  \ `-autologin` 参数，这两种模式也不会使用在设置期间建立的凭据。\n\n\n\n可以创建一个简单的脚本来建立连接，并在交互模式和脚本模式下使用。登录脚本需要指定用于连接的\
  \ URL、SSL 身份验证方式以及登录凭据。这两种模式都需要一个 Python 脚本（参见清单 3-8）。\n\n### 创建登录脚本\n\n清单 3-8.\
  \ 用于交互模式和脚本模式的登录脚本\n\n```\nfrom emcli import *\n\nset_client_property('EMCLI_OMS_URL',\
  \ 'https://oem.example.com:7802/em')\nset_client_property('EMCLI_TRUSTALL', 'true')\n\
  \nmyLogin(username='sysman')\n\nmyLogin()\n```\n\n将此文本放入扩展名为`.py`的文件中，即可使其成为一个可以导入到`EM\
  \ CLI`中的模块。例如，该脚本可以命名为`login.py`，并放置在`/home/oracle/scripts`目录下。然而，`EM CLI`不一定能找到该脚本，因为此路径不在默认的`Jython`路径中。明确定义`Jython`搜索路径可以确保`EM\
  \ CLI`能够导入该搜索路径内的任何脚本。可以通过补充`JYTHONPATH`变量来添加额外的目录：\n\n```\nexport JYTHONPATH=$JYTHONPATH:/home/oracle/scripts\n\
  ```\n\n类似于使用命令`from emcli import *`将`EM CLI`的`Jython`模块导入到脚本中一样，登录脚本也可以被导入到交互模式或脚本模式中。\n\
  \n### 在交互模式下建立登录\n\n要在交互模式下建立登录，我们可以直接导入模块。然后，系统将提示我们输入脚本中指定用户的密码。清单 3-9 展示了在交互模式下使用登录脚本的示例。\n\
  \n清单 3-9. 使用登录模块在交互模式下建立登录\n\n```\n[oracle ~]$ emcli\nOracle Enterprise Manager\
  \ 12c EMCLI with Scripting option Version 12.1.0.3.0.\nCopyright (c) 1996, 2013\
  \ Oracle Corporation and/or its affiliates. All rights reserved.\n\nType help()\
  \ for help and exit() to get out.\n\nemcli>import login\nEnter password :  *********\n\
  \nemcli>\n```\n\n### 在脚本模式下建立登录\n\n要在脚本模式下建立登录，需要从正在执行的脚本内部导入模块。例如，以下脚本使用`EM CLI`函数打印企业管理器目标的总数。但首先，它需要通过导入`login`模块来建立登录，如清单\
  \ 3-10 所示：\n\n清单 3-10. 使用登录模块在脚本模式下建立登录\n\n```\nimport emcli\nimport login\n\nmytargets\
  \ = str(len(emcli.get_targets().out()['data']))\n\nprint(mytargets)\n```\n\n## 任务：获取目标列表\n\
  \n查看和操作企业管理器目标是`EM CLI`最常见的用途。无论执行哪种操作，第一步都是检索目标信息。\n\n### 检索所有目标信息\n\n`get_targets`动词或函数用于检索目标列表以及许多其他列的信息。检索完整信息列表时，该动词和函数都不需要参数，如清单\
  \ 3-11 所示。\n\n清单 3-11. 使用命令行模式检索目标信息\n\n```\n[oracle ~]$ emcli login -username=sysman\n\
  Enter password :\n\nLogin successful\n\n[oracle ~]$ emcli get_targets\nStatus  Status\
  \     Target Type     Target Name            ID\n1       Up         host       \
  \     oem.example.com\n1       Up         oracle_emd      oem.example.com:3872\n\
  -9      n/a        oracle_home     common12c1_20_oem\n```\n\n### 筛选检索到的目标\n\n可以通过指定以分号分隔的目标名称和目标类型列表（两者之间用冒号分隔）来筛选检索到的目标。目标列表筛选器中任何位置都不应有空格。清单\
  \ 3-12 展示了创建包含两个目标的筛选器的示例。\n\n清单 3-12. 使用`targets`参数限制`get_targets`检索的目标\n\n```\n\
  [oracle ~]$ emcli get_targets \\\n   -targets='oem.example.com:host;oms12c1_3_oem:oracle_home'\n\
  Status  Status     Target Type     Target Name            ID\n1       Up       \
  \  host            oem.example.com\n-9      n/a        oracle_home     oms12c1_3_oem\n\
  ```\n\n### 在筛选器中使用通配符\n\n`targets`参数可以在目标名称或目标类型值中的任何位置使用通配符，并且对于任一值都可以使用多个通配符，如清单\
  \ 3-13 所示。\n\n清单 3-13. 在`targets`参数中使用通配符\n\n```\n[oracle ~]$ emcli get_targets\
  \ \\\n   -targets='oem%:host;oms12c1_%_oem:%oracle%'\nStatus  Status     Target\
  \ Type      Target Name           ID\n1       Up         host             oem.example.com\n\
  -9      n/a        oracle_home      oms12c1_3_oem\n```\n\n### 在交互和脚本模式下使用`get_targets`\n\
  \nPython 函数需要特定的格式：`函数名，后跟左括号，然后是逗号分隔的参数及其值列表，最后是右括号`。\n\n以下是典型 Python 函数的示例：\n\n\
  ```\nfunction_name(parameter1=value1, parameter2=value2)\n```\n\n由于交互模式和脚本模式中的`EM\
  \ CLI`动词实际上是 Python 函数，因此它们也需要遵循此格式。\n\n调用没有额外参数的函数只需要动词和一对括号。清单 3-14 展示了在交互模式下不带参数使用`get_targets`函数的结果，而清单\
  \ 3-15 展示了在脚本模式下带`targets`参数的同一函数。\n\n清单 3-14. 在交互模式下不带参数调用`get_targets()`函数\n\n\
  ```\n[oracle ~]$ emcli\nOracle Enterprise Manager 12c EMCLI with Scripting option\
  \ Version 12.1.0.3.0.\nCopyright (c) 1996, 2013 Oracle Corporation and/or its affiliates.\
  \ All rights reserved.\n\nType help() for help and exit() to get out.\n\nemcli>import\
  \ login\nEnter password :  *********\n\nemcli>get_targets()\nStatus  Status    \
  \ Target Type      Target Name\n          ID\n1       Up         host          \
  \   oem.example.com\n1       Up         oracle_emd       oem.example.com:3872\n\
  -9      n/a        oracle_home      common12c1_20_oem\n```\n\n清单 3-15. 在脚本模式下带`targets`参数调用`get_targets()`函数\n\
  \n```\n[oracle ~]$ cat targets2.py\nimport emcli\nimport login\n\nmytargets = emcli.get_targets\
  \ \\\n    (targets='oraoem1%:%;oms12c1_%_oraoem1:%oracle%') \\\n    .out()['data']\n\
  \nfor targ in mytargets:\n    print('Target: ' + targ['Target Name'])\n\n[oracle\
  \ ~]$ emcli @targets2.py\nTarget: oraoem1.example.com\nTarget: oraoem1.example.com:3872\n\
  Target: oms12c1_3_oraoem1\n```\n\n## 任务：使用停机维护\n\n尝试安排停机维护时间以配合目标主机上的维护任务可能会导致误报警。当停机维护在维护活动开始前结束，或者维护活动在停机维护开始前启动时，就可能发生这种情况。通过让维护作业本身启动和停止停机维护，可以避免这两种情况。\n\
  \n`EMCTL`和`EM CLI`都能够创建、删除、启动和停止停机维护。然而，`EMCTL`只能管理执行它的代理主机本地的目标的停机维护，并且只有在代理运行时`EMCTL`命令才有效。使用`EMCTL`设置停机维护的限制性很强且容易出错。建议使用`EM\
  \ CLI`从维护作业中设置停机维护。\n\n\n\n通常，维护活动不需要使用脚本模式，因为大多数维护脚本都在 shell 脚本中运行。`create_blackout`\
  \ 命令动词需要四个参数：`name`、`add_targets`、`schedule` 和 `reason`。作业由 `name` 参数标识，这意味着它必须在\
  \ EM 中所有其他作业中是唯一的。清单 3-16 展示了一个使用 EM CLI 命令行模式设置名为 “Blackout1” 的维护窗口的示例，该窗口针对 “`em12cr3.example.com`”\
  \ 主机。此维护窗口不会重复，将持续三小时或直到被停止。设置此维护窗口的原因是 “Testing”。\n\n清单 3-16. 为 “`em12cr3.example.com`”\
  \ 主机设置名为 “Blackout1” 的维护窗口\n\n```\n[oracle ~]$ emcli create_blackout -name='Blackout1'\
  \ \\\n-add_targets='em12cr3.example.com:host' \\\n-schedule='frequency:once;duration:3'\
  \ \\\n-reason='Testing'\n```\n\n`get_blackouts` 命令动词将显示当前定义的所有维护窗口的详细信息，如清单 3-17\
  \ 所示。\n\n清单 3-17. 列出所有维护窗口\n\n```\n[oracle ~]$ emcli get_blackouts\nName       Created\
  \ By  Status     Status ID  Next Start            Duration  Reason   Frequency \
  \ \nBlackout1  SYSMAN      Scheduled  0          2435-07-24  17:17:56  03:00   \
  \  Testing  once  \nRepeat Start Time            End Time             Previous \
  \ End  TZ Region        TZ Offset\nnone   2000-07-24  17:17:56  2000-07-24  20:17:56\
  \  none          America/Chicago  +00:00\n```\n\n下面的示例使用 `noheader` 和 `script` 参数来更改\
  \ `get_blackouts` 的输出，使其易于解析。将输出通过管道传递给 `cut` 命令只显示第一个字段，即维护窗口名称字段。\n\n```\n[oracle\
  \ ~]$ emcli get_blackouts -noheader -script | cut -f1\nBlackout1\n```\n\n可以使用 `get_blackout_details`\
  \ 命令动词查询维护窗口作业的详细信息。输出包含标题，并以制表符分隔。如果输出行的长度超过屏幕宽度，它们会换行显示，如清单 3-18 所示。\n\n清单 3-18.\
  \ 列出 “Blackout1” 维护窗口的详细信息\n\n```\n[oracle ~]$ emcli get_blackout_details -name='Blackout1'\n\
  Status   Status ID  Run Jobs  Next Start            Duration  Reason   Frequency\
  \  Repeat  Days\nStarted  4          no        2014-04-12  13:37:28  03:00     Testing\
  \  once       none    none\nMonths Start Time            End Time              TZ\
  \ Region        TZ Offset\nnone   2014-04-12  13:37:28  2014-04-12  16:37:28  America/Chicago\
  \  +00:00\n```\n\n上面的格式难以阅读，更难以解析。相反，可以将输出更改为逗号分隔格式，移除标题，并将输出限制为我们需要的列，如清单 3-19\
  \ 所示。\n\n清单 3-19. 以更易于解析的格式列出 “Blackout1” 维护窗口的详细信息\n\n```\n[oracle ~]$ emcli get_blackout_details\
  \ \\\n-name='Blackout1' -noheader -format=\"name:csv\"\nStarted,4,no,2014-04-12\
  \ 13:37:28,03:00,Testing,once,none,none,none,2014-04-12 13:37:28,2014-04-12 16:37:28,America/Chicago,+00:00\n\
  ```\n\n一旦输出可以被解析，我们就可以通过将命令添加到 shell 脚本来测试我们寻找的值，创建 “Blackout1” 目标，如清单 3-20 所示。\n\
  \n清单 3-20. 在脚本中创建维护窗口并测试退出值\n\n```\nemcli create_blackout -name='Blackout1' -add_targets='em12cr3.example.com:host'\
  \ -schedule='frequency:once;duration:3' -reason='Testing'\n\nMYSTATUS=$(emcli get_blackout_details\
  \ -name='Blackout1' \\\n-noheader -format='name:csv' | cut -d ',' -f 1)\n\nif [\
  \ \"$MYSTATUS\" <> \"Started\" ]; then\necho 'Blackout not started'\n        exit\
  \ 1\nfi\n\n<维护脚本>\n```\n\n在脚本中使用上述方法，您会注意到多次运行后，它有时会失败，有时会成功。这种行为发生是因为 `create_blackout`\
  \ EM CLI 命令动词创建作业但不启动作业。作业由另一个进程启动，因此在检查作业状态的 `if` 语句执行时，维护窗口有可能尚未启动，从而导致脚本失败。一种解决方案是使用额外的\
  \ shell 脚本，该脚本要么等待作业启动后再继续执行脚本的其余部分，要么因为作业在 “Scheduled” 模式下停留时间过长而失败，如清单 3-21 所示。\n\
  \n清单 3-21. 添加额外的 shell 脚本以使事件顺序执行\n\n```\nMYSTATUS='Scheduled'\nSTATCOUNT=6\n\n\
  while [ \"$MYSTATUS\" == \"Scheduled\" ]; do\n        if [ $STATCOUNT -lt 1 ]; then\n\
  \            echo \"Blackout1 stuck in scheduled status\"\n                exit\
  \ 1\n        fi\n\n        let STATCOUNT-=1\n        sleep 5\n        MYSTATUS=$(emcli\
  \ get_blackout_details -name='Blackout1' \\\n                -noheader -format='name:csv'\
  \ | cut -d ',' -f 1)\ndone\n\nif [ \"$MYSTATUS\" != \"Started\" ]; then\n      \
  \  echo 'Blackout Blackout1 not started'\n        exit 1\nfi\n\n<维护脚本>\n```\n\n\
  维护完成后，同一个脚本可以使用 EM CLI 命令来关闭和删除维护窗口：\n\n```\nemcli stop_blackout -name='Blackout1'\n\
  emcli delete_blackout -name='Blackout1'\n```\n\n## 任务：创建目标\n\n如果 EM 不能自动发现目标，添加目标可能会很痛苦。特别是当目标使用非默认设置时，这有时会使代理难以检测到它们。幸运的是，EM\
  \ CLI 能够比 EM 更灵活地添加目标。\n\n需要指定哪些参数在很大程度上取决于要添加的目标类型。例如，添加数据库时，`properties` 参数需要包括：\n\
  \n*   `SID`\n*   `Port`\n*   `OracleHome`\n*   `MachineName`\n\n数据库的凭据几乎总是针对 “dbsnmp”\
  \ 用户，除非是针对未打开的备用数据库，因此需要一个特权密码文件帐户。清单 3-22 展示了一个通过 EM CLI 命令行模式添加目标的示例。\n\n清单 3-22.\
  \ 添加 “orcl” 单实例数据库目标\n\n```\n[oracle ~]$ emcli add_target -name='ORCL_DB' \\\n-type='oracle_database'\
  \ -host='oradb1.example.com' \\\n-properties='SID:orcl;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;MachineName:oradb1-vip.example.com'\
  \ \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\nTarget \"\
  ORCL_DB:oracle_database\" added successfully\n```\n\n如果我们想添加一个 RAC 数据库目标，需要首先添加集群的各个实例，如清单\
  \ 3-23 和 3-24 所示。\n\n清单 3-23. 添加 RAC 数据库节点一\n\n```\n[oracle ~]$ emcli add_target\
  \ -name='ORCL1_ORCL_RACCLUSTER' \\\n-type='oracle_database' -host='oradb1.example.com'\
  \ \\\n-properties='SID:orclrac1;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;MachineName:oradb1-vip.example.com'\
  \ \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\nTarget \"\
  ORCL1_ORCL_RACCLUSTER:oracle_database\" added successfully\n```\n\n清单 3-24. 添加 RAC\
  \ 数据库节点二\n\n```\n[oracle ~]$ emcli add_target -name='ORCL2_ORCL_RACCLUSTER' \\\n\
  -type='oracle_database' -host='oradb2.example.com' \\\n-properties='SID:orclrac2;Port:1521;OracleHome:/u01/app/oracle/product/12.1.0/dbhome_1;MachineName:oradb2-vip.example.com'\
  \ \\\n-credentials='Role:NORMAL;UserName:DBSNMP;password:<password>'\nTarget \"\
  ORCL2_ORCL_RACCLUSTER:oracle_database\" added successfully\n```\n\n\n\n# 添加数据库集群目标与\
  \ EM CLI 作业管理\n\n## 添加数据库集群目标\n\n添加实例后，可以通过指定实例作为 `EM CLI` 命令属性的一部分来添加数据库集群目标。这些实例随后会与数据库集群目标关联。\n\
  \n![Image](img/sq.jpg) **注意** 由于我们正在添加集群目标，因此在添加数据库集群目标之前，必须已存在集群目标，如 Listing 3-25\
  \ 所示。\n\nListing 3-25. 添加 RAC 数据库集群，关联之前的两个数据库实例\n\n```\n[oracle ~]$ emcli add_target\
  \ -name='ORCL_RACCLUSTER' \\\n-host='oradb1.example.com' -monitor_mode='1' \\\n\
  -type='rac_database' -properties='ServiceName:orclrac;ClusterName:oradb-cluster'\
  \ \\\n-instances='ORCL1_ORCL_RACCLUSTER:oracle_database;ORCL2_ORCL_RACCLUSTER:oracle_database'\n\
  Target \"ORCL_RACCLUSTER:rac_database\" added successfully\n```\n\n## 使用 EM CLI\
  \ 添加目标\n\n可以使用 `EM CLI` 添加几乎任何目标类型。EM 中的自动发现工具将准确检测大多数目标，从而轻松提升这些目标。当环境具有自定义配置导致自动发现机制不可靠时，手动添加目标是唯一选择。在某些环境中，编写添加目标的脚本可用于在不同版本之间迁移或复制环境。在这些情况下，使用\
  \ `EM CLI` 添加目标成为必需。\n\n`add_target` 动词接受十几个参数；可以使用 `EM CLI` 的帮助功能快速参考。在线文档提供了更详细的描述。如果命令帮助不够用，请参考以下链接：\n\
  \n`http://docs.oracle.com/cd/E24628_01/em.121/e17786/cli_verb_ref.htm#CACHFHCA`\n\
  \nMy Oracle Support（MOS）也有数十篇关于特定用例和 `EM CLI` 示例的文章。MOS 说明 1448276.1 和 1543773.1\
  \ 提供了有关使用 `EM CLI` 添加目标的特定信息。\n\n## 任务：操作作业\n\n作业在 EM 中非常重要。在默认安装中，已经创建并运行了许多作业。许多管理员使用\
  \ EM 强大的作业调度和执行功能来处理关键的企业任务。\n\n这些功能可以在 GUI 和 `EM CLI` 中得到充分利用。例如，GUI 在作业库中有一个名为“Create\
  \ Like”的按钮，允许将一个作业的设置复制到另一个作业，以减少两个类似作业所需的输入量。此功能对于只有个别设置不同的一批作业非常适用。\n\n但是，如果需要创建数十个或数百个类似的作业怎么办？或者需要将一批作业从一个\
  \ EM 安装复制到另一个？`EM CLI` 的导出作业到文本文件，然后从同一文件或修改版文件导入作业的功能，使得任何规模的作业操作成为可能。\n\n例如，一个执行\
  \ `uname -a` 操作系统命令的简单作业可以导出到文件。可以更改命令和作业名称为 `uname` 并使用不同的标志。然后，可以使用包含新变量的修改后文本文件创建新作业，如\
  \ Listing 3-26 所示。\n\nListing 3-26. 描述 `UNAME_A_OMS` 作业\n\n```\n[oracle ~]$ emcli\
  \ describe_job -name='UNAME_A_OMS'\n\n"
- '# Current status of the job is EXPIRED.

  name=UNAME_A_OMS

  type=OSCommand

  owner=SYSMAN


  target_list=oraoem1.example.com:host


  '
- '# Credential Usage: defaultHostCred

  '
- '# Description:

  cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


  '
- '# Description: (Optional) Comma separated list of parameters to the command.

  variable.args=/bin/uname -a


  '
- '# Description: (Optional) Command to run on the target.

  variable.command=%job_default_shell%


  schedule.frequency=IMMEDIATE

  ```


  此命令的输出可用作属性文件来创建新作业。


  ## 通过属性文件创建作业


  1.  将文本复制到文件中并根据需要修改变量（Listing 3-27）。

  2.  为了省去一步，可以使用 shell 功能将标准输出重定向到文件。

  3.  将刚创建的文件复制为新文件，并在标准文本编辑器中打开该新文件（Listing 3-27）。

  4.  更改新文件中的作业名称和命令以反映新作业（更改以粗体显示；Listing 3-28）。


  Listing 3-27. 创建 `uname_a_oms.job` 作业属性文件并复制


  ```

  [oracle ~]$ emcli describe_job -name=''UNAME_A_OMS'' > uname_a_oms.job

  [oracle ~]$ cp uname_a_oms.job uname_r_oms.job

  ```


  Listing 3-28. 创建 `uname_r_oms.job` 作业属性文件


  ```

  [oracle ~]$ cat uname_r_oms.job


  '
- '# Current status of the job is EXPIRED.

  name=UNAME_R_OMS

  type=OSCommand

  owner=SYSMAN


  target_list=oraoem1.example.com:host


  '
- '# Credential Usage: defaultHostCred

  '
- '# Description:

  cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


  '
- '# Description: (Optional) Comma separated list of parameters to the command.

  variable.args=/bin/uname -r


  '
- '# Description: (Optional) Command to run on the target.

  variable.command=%job_default_shell%


  schedule.frequency=IMMEDIATE

  ```


  创建新作业，指定新的属性文件作为输入文件，如下所示：


  ```

  [oracle ~]$ emcli create_job -input_file=''property_file:uname_r_oms.job''

  Creation of job "UNAME_R_OMS" was successful.

  ```


  现在 `UNAME_R_OMS` 作业是一个活动作业。可以通过指定 `describe_library_job` 动词使用相同的过程在库中创建作业。


  ## 创建库作业


  ```

  [oracle ~]$ emcli describe_library_job -name=''UNAME_A''> uname_a.job

  [oracle ~]$ cp uname_a.job uname_r.job

  ```


  编辑 `uname_r.job` 文件。Listing 3-29 显示了脚本内容，并使用 `create_library_job` 动词从脚本创建库作业。


  Listing 3-29. 创建 `uname_a.job` 和 `uname_r.job` 库作业属性文件


  ```

  [oracle ~]$ cat uname_r.job


  '
- '# Current status of the job is ACTIVE.

  name=UNAME_R

  type=OSCommand

  owner=SYSMAN

  kind=library


  '
- '# Credential Usage: defaultHostCred

  '
- '# Description:

  cred.defaultHostCred.<all_targets>:host=SET:HostCredsNormal


  '
- '# Description: (Optional) Comma separated list of parameters to the command.

  variable.args=/bin/uname -r


  '
- "# Description: (Optional) Command to run on the target.\nvariable.command=%job_default_shell%\n\
  \nschedule.frequency=IMMEDIATE\n\n[oracle ~]$ emcli create_library_job -input_file='property_file:uname_r.job'\n\
  Creation of library job \"UNAME_R\" was successful.\n```\n\n导出作业使用户能够轻松复制作业（包括活动和库作业），以及以通用格式保留该作业的外部备份。此备份可以作为将作业恢复到另一系统、构建副本或测试系统以及在必要时生成审计记录的方法。\n\
  \n## 总结\n\n对于不经常使用 EM CLI 的人来说，其术语可能令人困惑。动词（Verbs）定义了您想用 EM CLI 执行的功能。进行更改的“方式”称为模式（Modes）。命令行模式也称为经典模式，一次执行一个命令。交互和脚本模式使用\
  \ Python 语法，并且可以额外使用该强大编程语言的成熟功能。\n\n鉴于其规模和复杂性，任何人都不可能记住有关 EM CLI 的所有内容。即使是最先进的用户也需要定期参考文档。幸运的是，EM\
  \ CLI 提供了丰富的帮助功能。从在线找到的优秀文档到命令行和交互模式本身包含的手册页，所需的所有信息都易于获取。\n\n\n\n没有人喜欢看到错误信息，但当它们在\
  \ `EM CLI` 中出现时，通常描述性强，易于阅读和理解。许多产品的错误语法可能很棘手，尤其是管理员每天需要在各种不同工具之间切换的情况下。与许多其他工具相比，`EM\
  \ CLI` 中的错误语法直观且简单。\n\n`EM CLI` 在每个已安装的 `OMS` 上都已完全配置好并可随时使用。它也易于下载、安装和设置在任何其他能够运行\
  \ `Java` 的机器上。`EM CLI` 客户端与 `OMS` 之间的通信方式几乎与浏览器和 `OMS` 之间的通信完全相同。两者都高度安全，并使用标准、成熟的技术。\n\
  \n然而，`EMCTL` 不会在短期内消失。尽管 `EMCTL` 和 `EM CLI` 可以执行一些相同的功能，但它们在目的和功能上大相径庭。请不要因为 `EM\
  \ CLI` 功能强大就错误地认为 `EM CTL` 无用。针对不同的任务，你将两者都需要。\n\n本章中的示例仅展示了 `EM CLI` 功能的冰山一角，但很可能，你心中已经想到了一些场景，在这些场景中，`EM\
  \ CLI` 可以解决 `GUI` 和其他命令行工具无法解决的问题。这里的示例是使用 `EM CLI` 最显而易见的几种方式。在 Enterprise Manager\
  \ 中，有多种方法和工具可以解决大多数问题。本书中展示的示例绝不会声称是做某事的“正确”方式。请利用这里的信息，找出你自己的“正确”方式。\n\n## 第 4\
  \ 章\n![image](img/frontdot.jpg)\n\n## 在命令行工作\n\n`EM CLI` 非常适合 shell 脚本，但它也简化了通常在控制台中执行的任务。例如，通过控制台移除一个\
  \ `EM` 代理及其相关目标可能相当费力。使用 `EM CLI`，你只需发出一条单行命令，相同的任务就能快速、完整地从命令行执行完毕。\n\n本章将向你介绍\
  \ `EM CLI` 在命令行的一些基础知识，然后说明几种你可以应用 `EM CLI` 来更快速地管理环境的方法——无需像在控制台中执行相同任务那样进行大量的鼠标点击。\n\
  \n我们常常将“命令行”这个术语与 `Unix` 联系起来，这在这里也适用，但请记住，由于 `EM CLI` 是一个 `Java` 应用程序，它可以在任何平台上运行。无论你是登录到服务器还是从桌面执行命令，`EM\
  \ CLI` 的运行方式都是一样的。\n\n### 启动一个 EM CLI 会话\n\n虽然每个 `CLI` 命令都在单独的行上运行，但在登录 `EM CLI`\
  \ 时，会为所有后续语句建立一个单一的会话。`login` 动词在开始任何工作之前，会与 `OMS` 服务器建立连接并验证用户。你可以在命令行上输入密码（不推荐用于交互式会话），也可以等待在登录过程中提示输入密码。\n\
  \n`sync` 命令确保你的运行时执行使用的是管理服务器软件库中当前可用的动词定义。这在你对 `OMS` 打补丁或升级后尤为重要。\n\n```\nemcli\
  \ login -username=\"SYSMAN\"\nemcli sync\n```\n\n### CLI 参考\n\nOracle 文档 #E17786.12\
  \ 包含了 `OEM 12.1.0.4` 版本发布时可用的 `EM CLI` 动词目录。请访问 Oracle 网站 `http://docs.oracle.com/cd/E24628_01/em.121/e17786.pdf`\
  \ 以确保你拥有最新版本。\n\n通过 `EM CLI` 本身也可以在线获取帮助。你的 `OMS` 软件库中已知的当前动词列表可在命令行中获取。\n\n```\n\
  emcli help\n\n> emcli help\n\n命令摘要:\n    argfile    -- 从文件执行 emcli 动词\n    help\
  \       -- 获取 emcli 动词的帮助（用法: emcli help [动词名称]）\n    login      -- 登录到 EM 管理服务器\
  \ (OMS)\n    logout     -- 从 EM 管理服务器注销\n    setup      -- 设置 emcli 以与 EM 管理服务器一起工作\n\
  \    status     -- 列出 emcli 配置详细信息\n    sync       -- 与 EM 管理服务器同步\n    version\
  \    -- 列出 emcli 动词版本或 emcli 客户端版本\n\n添加主机动词\n    continue_add_host            \
  \ -- 继续失败的“添加主机”会话\n    get_add_host_status           -- 显示“添加主机”会话的最新状态。\n    list_add_host_platforms\
  \       -- 列出可以执行“添加主机”操作的平台。\n    list_add_host_sessions        -- 列出所有“添加主机”会话。\n\
  \    retry_add_host                -- 重试失败的“添加主机”会话\n    submit_add_host       \
  \        -- 提交一个“添加主机”会话。\n\n代理管理动词\n    get_agent_properties     -- 显示代理的所有属性详细信息\n\
  \    get_agent_property       -- 显示代理特定属性的值\n    resecure_agent           -- 重新保护一个代理\n\
  \    restart_agent            -- 重启一个代理\n    secure_agent             -- 保护一个代理\n\
  \    set_agent_property       -- 修改代理的特定属性\n    start_agent              -- 启动一个代理\n\
  \    stop_agent               -- 关闭一个代理\n    unsecure_agent           -- 取消保护一个代理\n\
  ...\n```\n\n将动词名称添加到 `help` 命令后，可获取该动词的具体指导。下面的示例显示了 `sync` 动词的帮助结果。\n\n```\n> emcli\
  \ help sync\n  emcli sync\n\n描述:\n将 emcli 客户端与 OMS 同步。\n\n同步后，该 OMS 可用的所有动词及相关在线帮助\n\
  \    在 emcli 客户端都变得可用。在调用 setup 时会自动发生同步。\n  选项:\n    -url\n        EM (OMS) 的 URL。\n\
  \        支持 http 和 https 协议\n        （出于安全原因，建议使用 https）。\n    -username\n     \
  \   所有后续 emcli 命令在联系 OMS 时\n        将使用的 EM 用户名。\n    -password\n        EM 用户的密码。\n\
  \        如果未指定此选项，系统会交互提示\n        用户输入密码。\n        在命令行上提供密码是不安全的，\n        应避免这样做。\n\
  \    -trustall\n        自动接受来自 OMS 的任何服务器证书，\n        这会导致安全性降低。\n        同时指示设置目录是本地且受信任的。\n\
  ```\n\n### get_targets 动词\n\n`EM CLI` 动词大致分为三类：`EM` 查询、`OEM` 管理操作和目标操作。动词使用非常具体的语法，因此传递给\
  \ `EM CLI` 的目标名称必须与 `OEM` 字典中的对象名称匹配。\n\n`get_targets` 动词可用于在将目标名称用于任何管理或维护任务之前验证其名称。例如，假设你想为主机\
  \ `myhostx` 上的数据库 `orcl1` 创建一个停用时间，并且你是通过自动化过程提升已发现的数据库和监听器目标。`OEM` 中的数据库目标可能被添加为\
  \ `sidc_myhostx`（按其 `RAC` 实例名），或其全局名称。有时它甚至可能显示为服务名或 `SID`。当你通过“自动发现结果”使用目标提升时，可能会出现这种可变性。你应该在添加目标时手动设置目标名称，使用引导发现过程以确保整个企业内的一致性。\n\
  \n### 输出格式\n\n`EM CLI` 为查询结果预配置了三种输出格式。也支持用户自定义格式。\n\n\n\n*   `Pretty` 格式将列标题与结果集数据对齐。\n\
  *   `Script` 格式在标题和结果列的值之间用空格分隔。此格式与 `awk` 编程语言配合使用效果极佳。\n*   `Csv` 格式，顾名思义，使用逗号分隔值，以便在电子表格中解析或使用\
  \ Shell 的 `cut` 命令处理。\n\n假设您想使用以下命令为 `eamz` 数据库设置 OEM 凭据：\n```\nemcli set_credential\
  \ -target_type=oracle_database -target_name=\"eamz\" \\\n                     -credential_set=DBCredsNormal\
  \ \\\n                     -columns=\"username:dbsnmp;password:Super_S3cret;role:Normal\"\
  \n```\n您的命令会失败，因为 OEM 找不到匹配的目标名称。图 4-1 说明了不同的样式。\n```\nemcli get_targets -targets=\"\
  oracle_database\" -format=\"name:csv\" | grep -i eamz\n```\n![9781484202395_Fig04-01.jpg](img/9781484202395_Fig04-01.jpg)\n\
  图 4-1. 输出样式示例\n\n我们将在本章及下一章中探讨应用此命令的几个示例。\n\n## 代理管理\n\n在桌面上安装 EM CLI 客户端的功能使您无需打开浏览器即可执行\
  \ EM CLI 命令——无需使用控制台或登录到管理服务器主机。这种灵活性使您能够通过众多与代理相关的 EM CLI 命令之一快速控制 OEM 代理。\n\n\
  如前所述，您可以使用 `get_targets` 命令通过将 `get_targets` 结果按目标类型 `oracle_emd` 过滤来查找任何代理的具体名称。这对于代理尤为重要，因为代理名称包含主机名和端口号。\n\
  ```\n> emcli  get_targets –targets=\"oracle_emd\"  –name=\"name:csv\"\nStatus ID,Status,Target\
  \ Type,Target Name\n1,Up,oracle_emd,acme_dev:2480\n1,Up,oracle_emd,acme_qa:3872\n\
  1,Up,oracle_emd,acme_prod:3872\n```\n`targets` 变量也接受包含目标名称和目标类型的成对值，例如：–targets=“acme_qa:oracle_database”\n\
  \n所有通过 OEM 控制台可用的代理管理任务也都可以通过 EM CLI 命令完成。请注意，在以下示例中，每种情况都需要提供 OEM 代理二进制文件所有者/主机用户的密码。\n\
  ```\nemcli stop_agent  -agent=acme_qa:3872 -host_username=oracle\nHost User password:\n\
  The Shut Down operation is in progress for the Agent: acme_qa:3872\nThe Agent \"\
  acme_qa:3872\" has been stopped successfully.\n\nemcli start_agent  -agent=acme_qa:3872\
  \ -host_username=oracle\nHost User password:\nThe Start Up operation is in progress\
  \ for the Agent: acme_qa:3872\nThe Agent \"acme_qa:3872\" has been started successfully.\n\
  \nemcli restart_agent  -agent=acme_qa:3872 -host_username=oracle\nHost User password:\n\
  The Restart operation is in progress for the Agent: acme_qa:3872\nThe Agent \"acme_qa:3872\"\
  \ has been restarted successfully.\n```\n代理有时会在打补丁后或由于中断而与 OMS 不同步，因此需要更新其注册信息，甚至需要代理同步才能允许上传。实现此目的的最简单方法是\
  \ `resecure` 代理以理顺连接。如果您的环境不需要安全的代理，您可以使用与 `secure_agent` 命令相同的语法执行 `unsecure_agent`\
  \ 命令来移除安全关系。\n\n注意，代理可执行文件所有者的密码和 OMS 注册密码都是必需的。\n```\nemcli secure_agent  -agent=acme_qa:3872\
  \ -host_username=oracle\nHost User password:\nRegistration Password:\nThe Secure\
  \ operation is in progress for the Agent: acme_qa:3872\nThe Agent \"acme_qa:3872\"\
  \ has been secured successfully.\n\nemcli resecure_agent  -agent=acme_qa:3872 -host_username=oracle\n\
  Host User password:\nRegistration Password:\nThe Resecure operation is in progress\
  \ for the Agent: acme_qa:3872\nThe Agent \"acme_qa:3872\" has been resecured successfully.\n\
  ```\n`agent_resync` 命令会在存储库数据库中启动一个作业，以更新被阻止代理的状态。当存储库包含来自代理上传的冲突数据时，代理会被置于阻止状态。这通常在计划外问题影响代理与\
  \ OMS 的连接后发生。因此，命令行的标准输出信息量不足。虽然您可以点击控制台中的作业来跟踪进度，但 EM CLI 中没有匹配的选项。\n```\nemcli\
  \ resyncAgent -agent=acme_qa:3872\nResync job RESYNC_20140422135854 successfully\
  \ submitted\n```\nEM CLI 还可用于提供有关代理的详细信息，可以列出其所有属性，也可以深入查看特定属性，如下所示。\n```\nemcli\
  \ get_agent_properties -agent_name=acme_qa:3872\nName                        Value\n\
  agentVersion                12.1.0.3.0\nagentTZRegion               America/Los_Angeles\n\
  emdRoot                     /opt/oracle/agent12c/core/12.1.0.3.0\nagentStateDir\
  \               /opt/oracle/agent12c/agent_inst\nperlBin                     /opt/oracle/agent12c/core/12.1.0.3.0/perl/bin\n\
  scriptsDir                  /opt/oracle/agent12c/core/12.1.0.3.0/sysman/admin/ scripts\n\
  EMD_URL                     https://acme_qa:3872/emd/main/\nREPOSITORY_URL     \
  \         https://myoms.com:4903/empbs/upload\nEMAGENT_PERL_TRACE_LEVEL    INFO\n\
  UploadInterval              15\nTotal Properties :          10\n\nemcli get_agent_property\
  \ -agent_name=acme_qa:3872 -name=agentTZRegion\nProperty Name: agentTZRegion\nProperty\
  \ Value: America/Los_Angeles\n```\n\n## 使用 EM CLI 删除 EM 目标\n\n`delete_targets` 命令可用于移除单个目标或一组相关目标。从控制台单独选择目标并按下\
  \ `删除目标` 按钮似乎更简单。这通常是正确的，但我们发现，在某些情况下，最终可能会留下孤立目标，例如当其所有同类成员都被删除后遗留的 `oracle_dbsys`\
  \ 目标类型。此外，如果您在桌面上安装了 EM CLI 客户端，则无需登录控制台即可删除目标！\n\n### 查找确切的目标名称\n\n控制台从会话信息派生目标名称和目标类型，因此在控制台内删除目标时，会确保使用这两个目标的精确名称和类型。要找到这些值，我们将使用\
  \ `get_targets` 命令和一个简单的 `grep` 来区分我们感兴趣的目标。\n```\n> emcli get_targets | grep -i\
  \ bertha\n1       Up               oracle_database    bertha\n1       Up       \
  \        oracle_dbsys         bertha_sys\n1       Up               oracle_listener\
  \       LSNRBERTHA_oemdemo.com\n```\n\n### 删除目标\n\n数据库和监听器都属于数据库系统 `bertha_sys`，因此可以使用一条命令删除所有三者：\n\
  ```\n> emcli delete_target –type = \"oracle_db_sys\" –name=\"bertha_sys\" –delete_members\n\
  \  Target \"bertha_sys:oracle_dbsys\" deleted successfully\n```\n您也可以像这样删除单个成员：\n\
  ```\n> emcli delete_target –type = \"oracle_listener\" –name=\"LSNRBERTHA\"\n  Target\
  \ \"LSNRBERTHA:oracle_listener\" deleted successfully\n```\n\n## 如何用一条命令移除 Enterprise\
  \ Manager 代理\n\n从 Enterprise Manager 中移除 EM 代理需要移除该代理管理的所有目标及其所有指标。在控制台中，这需要按其发现的大致相反顺序执行多个删除操作。例如，当您首次将代理部署到主机时，代理和主机会成为已知的第一和第二个目标。然后，您会发现并提升驻留在该主机上的其他目标。\n\
  \n\n\n## 监视目标的删除与代理管理\n\n监视目标的删除顺序与发现顺序相反，以便能正确地从存储库数据库中删除参考数据。目标删除必须从已发现/提升的目标开始，然后是主机，最后是代理。\n\
  \n如果你使用 `-delete_monitored_targets` 标志，`delete_targets` 动词可以在一个命令中移除代理及其所有监视目标。\n\
  \n```\n> emcli delete_target -name=\"<Agent Name>\"\n  -type=\"oracle_emd\"\n  -delete_monitored_targets\n\
  \  -async;\n```\n\n![Image](img/sq.jpg) **注意** 删除前必须先停止代理。\n\n删除代理目标类型的过程与移除其他目标类型非常相似。由于代理名称由主机名和代理端口号组成，我们将先运行\
  \ `get_targets`。\n\n```\n> emcli get_targets | grep -i demohost01\n1       Up  \
  \             host                     demohost01\n1       Up               oracle_emd\
  \          demohost01:3872\n\n> emcli delete_target -name=\"demohost01:3872\" -type=\"\
  oracle_emd\" -delete_monitored_targets -async;\nTarget \"LSNRBERTHA:oracle_listener\"\
  \ deleted successfully\n```\n\n代理的完全移除涉及管理服务器（OMS）和远程主机上的操作。参见 表 4-1。\n\n表 4-1.\
  \ 代理移除任务\n\n| 位置 | 操作 | 示例 |\n| --- | --- | --- |\n| 远程主机 | 从代理获取目标名称 | `> emctl\
  \ status agent | grep \"<Agent URL>\"` |\n| 远程主机 | 使用 `emcli` 或 `emctl` 停止代理。你也可以使用本章前面描述的\
  \ `emcli stop_agent` 动词从 CLI 会话中关闭它。由于完整的代理移除任务包括在远程主机上的 OUI 会话，因此在此情况下执行 `emctl`\
  \ 命令更简单 | `> emctl stop agent` |\n| OMS | 删除目标 | `> emcli delete_target -name=\"\
  <Agent Name>\"``-type=\"oracle_emd\"``-delete_monitored_targets``-async;` |\n| 远程主机\
  \ | 卸载插件和 sbin 二进制文件。OUI Oracle 主目录移除与 OEM 中目标创建的关系相同。代理主目录是首先创建的，必须作为单独步骤最后删除。\
  \ | `cd $AGENT_BASE/core/<agent release>/oui/bin``./runInstaller -deinstall –remove_all_files`\
  \ |\n| 远程主机 | 使用 `including_files` 选项卸载代理软件 | |\n\n## 将目标转移到另一个 EM 代理\n\n变化总是会发生。也许你决定将数据库移动到不同的主机，或者你想更改包含\
  \ EM 代理二进制文件的目录。你可以删除并重新发现目标，但这样会丢失其指标历史记录。\n\n你可以使用 `relocate_targets` 动词保留该历史记录，并将特定目标的指标收集和停机责任重新分配给另一个\
  \ EM 代理。\n\n### 工作原理\n\n每个 EM 代理都有自己的 `targets.xml` 文件，位于 `$AGENT_BASE/agent_inst/sysman/emd`。`relocate_targets`\
  \ 动词会更新源主机和目标主机上的这些 XML 文件，并更新存储库中的关系。\n\n代理及其监视的目标必须位于同一主机上。这意味着你不能使用 `relocate_targets`\
  \ 通过不同主机上的代理来监视数据库。此技术仅限于将目标移动到同一主机上的 EM 代理，或执行迁移到另一台服务器的任务。让我们看一个例子。\n\n要将 goldfish\
  \ 数据库及其侦听器从 alice 服务器移动到 buster：\n\n```\nemcli relocate_targets\n  -src_agent=\"\
  alice:3872\"\n  -dest_agent=\"buster:3872\"\n  -target_name=\"goldfish\"\n  -target_type=\"\
  oracle_database\"\n  -copy_from_src\n\nemcli relocate_targets\n  -src_agent=\"alice:3872\"\
  \n  -dest_agent=\"buster:3872\"\n  -target_name=\"lsnrgoldfish\"\n  -target_type=\"\
  oracle_listener\"\n```\n\n对于此传输，你将使用以下值：\n\n*   `src_agent`= alice:3872        （当前代理名称）\n\
  *   `dest_agent`= buster:3872  （目标代理名称）\n*   `target_name`= goldfish      （要移动的目标名称）\n\
  *   `target_type`= 该目标的 EM 类型\n\n数据库目标还包括 `copy_from_src` 标志以保留其历史记录。每个 EM CLI 命令只能重新定位一个目标。\n\
  \n### OMS 介导的目标\n\n不要对 RAC 数据库或任何类型的 Oracle 集群使用 `relocate_targets` 动词。你的管理服务器了解使用\
  \ Oracle 软件的集群对象之间的关系，并将自动在集群主机之间调解代理职责。如果你手动将集群目标重新定位到另一个集群中的另一个代理，则存在破坏 OEM 在集群成员之间关联的风险。\n\
  \n你可以查询存储库数据库以确定哪些目标是 OMS 介导的，如下所示：\n\n```\nSELECT   entity_type,\n         entity_name,\n\
  \         host_name\nFROM     sysman.em_manageable_entities\nWHERE    manage_status\
  \ =2-- Managed\nAND      promote_status =3-- Promoted\nAND      monitoring_mode\
  \ =1-- OMS mediated\nORDERBY  entity_type,entity_name, host_name;\n\nENTITY_TYPE\
  \                ENTITY_NAME                            HOST_NAME\n-------------------------\
  \  -------------------------------------  --------------------\ncluster        \
  \            clust01                                cluster01b.com\ncluster    \
  \                clust01                                cluster01b.com\nrac_database\
  \               apple                                  cluster01b.com\nrac_database\
  \               betty                                  cluster01a.com\nrac_database\
  \               jack                                   cluster01b.com\nweblogic_domain\
  \            /EMGC_GCDomain/GCDom                   myoms.com\nweblogic_domain \
  \           /Farm01_IDMDomain/ID                   myoms.com\nweblogic_domain  \
  \          /Farm02_IDMDomain/ID                   myoms.com\n```\n\n## 管理 OEM 管理员\n\
  \n控制台提供了一种清晰、便捷的方法来管理 OEM 管理员帐户，但其灵活性使得创建多个帐户变得非常麻烦，因为需要点击所有屏幕。EM CLI 将 OEM 代码库固有的灵活性与命令行界面的简单性相结合。\n\
  \n控制台中定义的所有选项都可以使用下面显示的标志作为 EM CLI 中的选项授予权限。要创建管理员，你只需给帐户一个名称和密码。\n\n```\nemcli\
  \ create_user -name=\"SuzyQueue\" -password=\"oracle\"\n```\n\n如果你在阅读 Apress 的书籍，那么你不会忽视用户安全性，因此你会希望使用\
  \ `-expired=\"true\"` 标志使用户的新密码过期，如下所示：\n\n```\nemcli create_user -name=\"SuzyQueue\"\
  \ -password=\"oracle\" -expired=\"true\"\n```\n\n其他可选参数允许你执行 OEM 控制台中的大多数用户授权操作，而无需点击流程。EM\
  \ CLI 和 OMS 服务器使用相同的代码库，因此这不足为奇。\n\n### 角色管理\n\n企业管理器管理员和用户作为数据库用户帐户存储在存储库数据库中。避免通过\
  \ SQL*Plus 授予角色权限的诱惑，因为 OEM 的内部安全管理可能正在执行其他操作。\n\n你可以通过添加 `-roles` 参数在创建用户时添加角色授权：\n\
  \n```\nemcli create_user -name=\"SuzyQueue\" -password=\"oracle\" \\\n         \
  \                           -roles=\"em_all_administrator\"\n```\n\n你也可以通过 `grant_roles`\
  \ 或 `revoke_roles` 动词修改用户：\n\n```\nemcli grant_roles -name=\"SuzyQueue\" -roles=\"\
  em_all_viewer\"\n\nemcli revoke_roles -name=\"SuzyQueue\" -roles=\"em_all_operator\"\
  \n```\n\n我们将在下一章中探讨如何使用 shell 脚本构建一组管理员。\n\n### 跟踪管理服务器登录\n\n有时你可能想知道谁登录了你的管理服务器。`list_active_sessions`\
  \ 动词通过传递 `–details` 标志提供该信息及其详细信息，如下所示：\n\n```\nemcli list_active_sessions -details\n\
  ```\n\n\n\nOMS 名称: `myoms.com:4889_Management_Service`\n管理员: `SYSMAN`\n登录自: `Browser@123.45.6.234`\n\
  会话: `F7CA6D7DE88B0917E04312E7510A9E54`\n登录时间: `2014-04-24 06:46:53.876687`\n\nOMS\
  \ 名称: `myoms.com:4889_Management_Service`\n管理员: `BOBBY`\n登录自: `Browser@SAMPLEPC.com`\n\
  会话: `F7CD5C7EE0A961C7E04312E7510A8A71`\n登录时间: `2014-04-24 11:05:24.199258`\n\nOMS\
  \ 名称: `myoms.com:4889_Management_Service`\n管理员: `PHIL`\n登录自: `Browser@123.45.6.228`\n\
  会话: `F7CECDD6335543E3E04312E7510AA25C`\n登录时间: `2014-04-24 11:13:20.567234`\n\nOMS\
  \ 名称: `myoms.com:4889_Management_Service`\n管理员: `SYSMAN`\n登录自: `Browser@123.45.6.234`\n\
  会话: `F7CF52CA3BE1692FE04312E7510A7494`\n登录时间: `2014-04-24 11:50:31.152683`\n\nOMS\
  \ 名称: `myoms.com:4889_Management_Service`\n管理员: `SYSMAN`\n登录自: `EMCLI@123.45.6.231`\n\
  会话: `F7CF52CA3BE3692FE04312E7510A7494`\n登录时间: `2014-04-24 11:55:52.482938`\n\nOMS\
  \ 名称: `myoms.com:4889_Management_Service`\n管理员: `SYSMAN`\n登录自: `Browser@123.45.6.231`\n\
  会话: `F7CF52CA3BE5692FE04312E7510A7494`\n登录时间: `2014-04-24 12:07:52.335728`\n\n##\
  \ 总结\n\n`EM CLI` 允许你从命令行执行许多管理任务，甚至可以在桌面上完成。本章描述的简单技术非常适合于 Shell 脚本编写和进一步的自动化，这将在下一章中进行描述。\n\
  \n---\n\n¹你的环境中存在多种目标类型。在安装过程中，`EM` 代理会发现主机上的目标，并将它们与特定的目标类型关联起来。会为识别的每种目标类型创建一个新的\
  \ `Oracle Home` 并安装相应的插件。每种目标类型的标签是固定的，每个目标仅与一种目标类型相关联。\n\n# 第 5 章\n\n![image](img/frontdot.jpg)\n\
  \n## 通过 Shell 脚本实现自动化\n\n正如我们在前一章所发现的，`EM CLI` 提供了完成复杂任务的更快捷方式，而这些任务通常通过 `OEM` 控制台进行管理。`EM\
  \ CLI` 的强大之处在于将 `EM CLI` 与经典的 Shell 脚本技术相结合。本章中的示例是为 `Unix/Linux` 环境编写的，但由于 `EM\
  \ CLI` 是一个 `Java` 应用程序，此处显示的 `CLI` 语法在其他环境中同样有效。\n\n本章从 `CLI` 脚本基础开始，然后通过几个示例演示该技术的应用。在每个示例中，为了确保说明清晰，我们移除了那些使脚本稳健运行的常见维护命令。由于这些技术适用于任何脚本解决方案，我们在处理任何\
  \ `OEM` 解决方案之前，将先列出一些基本的脚本编写准则。\n\n本章中的所有示例均使用基础的 `bash` Shell 脚本编写，因其普及性和清晰性。可以使用\
  \ `Perl` 或其他语言来提升脚本性能，但在本章中加入这些内容可能会掩盖所演示技术的基础知识。\n\n本章首先介绍一些 Shell 脚本编写的基础知识，进而发展到构建和应用\
  \ Shell 函数。在此过程中，我们将了解如何创建和控制 `OEM` 黑屏、管理用户账户以及处理更大的数据集。最后，我们将看一下使用 `getopts` 的一些高级\
  \ Shell 脚本编写技术。\n\n### Shell 脚本编写最佳实践\n\n任何有 Shell 脚本编写经验的人，无论是针对 `Windows`、`Linux`\
  \ 还是任何其他 `Unix` 变体，都有自己偏好的技术。希望你环境中的脚本呈现一致的外观和感觉，使其易于阅读和维护。编写任何程序的最佳实践，无论使用何种 Shell\
  \ 或操作系统，都由 `Unix` 的创造者提出，并在 Eric S. Raymond 所著的 *The Art of Unix Programming* 中有所记载。这些准则为我们执行的任何编程奠定了非常清晰的基础。该书的免费在线副本可在\
  \ `https://archive.org/details/ost-computer-science-the_art_of_unix_programming`\
  \ 获取。\n\n#### 日志记录\n\n谜团应该放在你的床头柜上，而不是在你的 `Enterprise Manager` 环境中。任何 `Unix` 程序的输出都应在运行时提供有用的、完整的、简洁的屏幕输出以及详尽的日志文件。日志文件是通过重定向\
  \ Shell 输出创建的。\n\n#### 重定向\n\n`Echo` 语句将其标准输出定向到屏幕。这种类型的输出是 `Unix` 操作系统最早的功能之一，它使得创建日志文件成为脚本的简单扩展。可以使用一个或两个尖括号（也称为尖括号或角括号）重定向输出，通常指向右侧。一个简单的\
  \ `echo` 语句将标准输出发送到屏幕。\n\n```bash\necho \"Hello world\"\nHello world\n```\n\n你可以使用向右的尖括号将相同的输出直接重定向到文件：\n\
  \n```bash\necho \"Hello world\"> myFile.lst\ncat myFile.lst\nHello world\n```\n\n\
  单个右尖括号创建一个新文件，而双右尖括号则将输出追加到文件末尾。\n\n```bash\necho \"Shell scripting makes me hungry\"\
  >> myFile.lst\necho \"What about you?\">> myFile.lst\ncat myFile.lst\nHello world\n\
  Shell scripting makes me hungry\nWhat about you?\n```\n\n健壮的 Shell 脚本既编写用于无人值守的计划活动（例如\
  \ `cron`），也编写用于交互式执行以进行调试和一次性使用。“通过管道输出到 `tee`”可以在控制台提供即时反馈，同时将标准输出写入文件，如下所示：\n\n\
  ```bash\necho \"Hello world\"| tee myFile.lst\nHello world\ncat myFile.lst\nHello\
  \ world\n```\n\n通过在你的 `tee` 语句后添加 `-a` 来追加到文件：\n\n```bash\necho \"Shell scripting\
  \ makes me hungry\"| tee -a myFile.lst\necho \"What about you?\"| tee -a myFile.lst\n\
  ```\n\n#### 错误处理\n\n即使是最简单的 `Unix` 程序也期望你的程序能让机器完成工作。编写不当的脚本会基于现有安装和配置做出假设（可能还经过测试）。正如你所知，在我们的行业中，没有什么是不变的，所以要为意外情况编程。\n\
  \n没有什么比一个程序在发现一个本可以由脚本轻松处理的问题时却失败退出更令人沮丧的了。例如，如果你的脚本需要一个用于日志或临时存储的特定目录，那么脚本应该创建这些目录并设置程序所需的适当权限：\n\
  \n```bash\nif [ ! -d /tmp/staging ]; then\n        mkdir -p /tmp/staging\n     \
  \   chmod 770 /tmp/staging\nfi\n```\n\n程序挂起是另一个领域，你的程序应该预见失败并在问题发生之前测试问题情况。例如，空文件可能导致你的脚本挂起，因此在\
  \ `grep` 文件输出之前，你应该检查文件是否确实存在：\n\n```bash\nif [ -f myFile.lst ]; then\n  cat myFile.lst\
  \ | grep \"Hello World\"\nelse\n  echo \"File myFile.lst is missing!\"\n  exit 1\n\
  fi\n```\n\n在 *The Art of Unix Programming* 中还有其他一些相关的脚本编写准则。我们刚才考虑的例子代表了本章为了简洁和清晰而省略的编程基础类型。\n\
  \n### 密码与 Shell 脚本\n\n\n\n在所有关于 Shell 编程的准则和建议中，一直有一条铁律：永远不要将密码硬编码到你的脚本中——这会成为维护和安全的噩梦。你需要自行开发管理密码文件的方法。选择哪种方式——是开发内部的\
  \ Java 解决方案，应用从网上找到的技术，依赖代码混淆和隐藏文件，还是使用其他巧妙的技巧——取决于你自己。本书范围之外，无法提供具体解决方案。\n\n本章的剩余部分，每当脚本中需要密码时，都将使用名为`${SECRET_PASSWORD}`的变量。\n\
  \n## 从 Shell 脚本调用 EM CLI\n\n像`SQL*Plus`这样的命令行工具在 Shell 脚本内部的子 Shell 中运行，通常包裹在以开始和结束`EOF`标签标记的“Here\
  \ Document”中，如下例所示：\n\n```\nsqlplus / as sysdba <<EOF\n  SELECT sysdate FROM dual;\n\
  \  exit\nEOF\n\nSYSDATE\n\n03-AUG-14\n```\n\n你可以在此处找到关于此过程的更多信息：`http://www.tldp.org/LDP/abs/html/here-docs.html`。\n\
  \n每个 EM CLI 命令都是独立执行的，因此在你的 Shell 脚本中调用时不需要子 Shell。取而代之的是，当需要一起执行一系列相关的 CLI 命令时，你应该使用\
  \ Shell 脚本函数。\n\n## Shell 脚本函数\n\nShell 函数的语法非常简单。只需遵循以下步骤：\n\n1.  使用`function`关键字，后跟函数名和一个左花括号。花括号是`{\
  \ }`，而方括号是这些角括号：`[ ]`。\n2.  包含要执行的 Shell 命令。\n3.  添加一个右花括号。\n\n在下面的示例中，将几个目录的内容复制到备份目标位置。为每个目录重复编写创建文件列表和移动文件所需的代码是可行的。相反，重复性的任务由同一个代码块执行，该代码块通过函数名`CopyFiles`调用。可以添加常见的补充任务，例如压缩和`chmod`文件，以便进行单点编辑。\n\
  \n变量，如`${SOURCE_DIR}`、`${TARGET_DIR}`和`${WORKFILE}`，在运行时传递给函数。从属变量，如`${SOURCE_FILE}`和`${TARGET_FILE}`，在运行时为每个目录填充：\n\
  \n```\n"
- '# ----------------------------------------------------

  '
- '# Functions

  '
- "# ----------------------------------------------------\nfunction CopyFiles {\n\
  cd $SOURCE_DIR\n\nls -l | grep -i $ORACLE_SID      >$WORKFILE\n\nfor thisFILE in\
  \ `cat $WORKFILE`; do\n   SOURCE_FILE=$SOURCE_DIR/$thisFILE\n   TARGET_FILE=$TARGET_DIR/$thisFILE\n\
  \   cp -f $SOURCE_FILE $TARGET_FILE\ndone\n\nrm -f $WORKFILE\n}\n\n"
- '# ----------------------------------------------------

  '
- '# Run-time Procedure

  '
- "# ----------------------------------------------------\nSOURCE_DIR=/gold_scripts/rman\n\
  TARGET_DIR=/test_scripts/rman\n   CopyFiles\n\nSOURCE_DIR=/gold_scripts/security\n\
  TARGET_DIR=/test_scripts/security\n   CopyFiles\n```\n\n正如我们在上一章看到的，每个 EM CLI 会话都以两个命令开始——`login`和`sync`。在脚本中启动会话时也应遵循同样的做法。你可以每次脚本启动\
  \ CLI 会话时重复相同的序列，像这样：\n\n```\nemcli login -username=\"SYSMAN\"-password=${\nemcli\
  \ sync\n```\n\n由于这两个命令总是一起执行，它们构成了一个简单 Shell 脚本函数的基础，如下所示。我们将在本章后面看一些更复杂的函数。\n\n\
  ```\nfunction EmcliLogin {\n        emcli login -username=\"SYSMAN\" -password=\"\
  ${SECRET_PASSWORD}\"\n        emcli sync\n}\n```\n\n### GetTargetName 函数\n\n在上一章中，我们解释了如何使用`get_targets`动词来确定\
  \ OEM 目标的确切名称。由于 Shell 脚本是为了处理边缘情况（如目录缺失）而构建的，任何目标操作脚本都应验证以下内容：\n\n1.  目标存在于 OEM\
  \ 中。\n2.  在你的 CLI 命令中使用了目标的确切名称。\n\n通过给它一个名称并将命令包裹在花括号中，将`get_targets`动词构建成一个函数。在此示例中，`${INPUT_VAL}`的值由调用脚本传入函数：\n\
  \n```\nfunction GetTargetName {\nif [ `emcli get_targets | grep ${INPUT_VAL}%\"\
  | grep oracle_database\" |  wc -l` -gt 0 ];\nthen\n        thisTARGET=`emcli get_targets\
  \ –format –name=\"name:csv\"| grep -i ${INPUT_VAL} | grep oracle_database | cut\
  \ -d, -f4`\n        echo \"Target name is ${thisTARGET}\"\nelse\n        echo \"\
  No matching targets found\"\nfi\n}\n```\n\n在此示例中，我们设置了一个名为`${thisTARGET}`的变量，用于存储\
  \ OEM 已知的 Oracle 数据库`acme_qa`的确切目标名称。在运行时，目标名称将通过命令行或通过额外的脚本（例如，处理目标列表）传递。这里概述的步骤将在后面详细说明。\n\
  \n1.  首先确定是否存在匹配的目标。\n2.  如果存在，将变量`${thisTARGET}`设置为匹配项并宣布成功。记录和交互式用户通信对于故障排除 Shell\
  \ 脚本至关重要。只要在运行时有新信息可用，就共享状态。\n3.  如果不存在，要大声且礼貌地失败。Unix 编程的核心规则之一是程序应尽早且尽可能大声地失败。Shell\
  \ 脚本也不例外。\n\n过滤和解析以确定最终的变量字符串遵循此序列：\n\n1.  获取名称中带有`oracle%`的所有类型目标的列表。\n2.  在该列表中`grep`匹配`acme_qa`的目标。\n\
  3.  在那个更短的列表中`grep` `oracle_databases`。\n4.  通过逗号分隔符截取列表并返回第四个值。\n\n步骤 1：列出名称中包含“oracle%”的所有目标\n\
  \n```\nStatus ID,Status,Target Type,Target Name\n1,Up,oracle_emd,acme_dev:3872\n\
  1,Up,oracle_emd,acme_qa:2480\n1,Up,oracle_emd,acme_prod:3872\n1,Up,oracle_database,amce_dev\n\
  1,Up,oracle_database,acme_qa\n1,Up,oracle_database,acme_prod\n1,Up,oracle_listener,lsnracmedev\n\
  1,Up,oracle_listener,lsnracmeqa\n1,Up,oracle_listener,lsnracmeprod\n```\n\n步骤 2：过滤该列表以查找包含\
  \ acme_qa 的字符串\n\n```\n1,Up,oracle_database,acme_qa\n1,Up,oracle_listener,lsnracmeqa\n\
  ```\n\n步骤 3：仅列出数据库\n\n```\n1,Up,oracle_database,acme_qa\n```\n\n步骤 4：返回逗号分隔符后的第四个字符串\n\
  \n```\nacme_qa\n```\n\n确保在脚本执行期间通过名称调用函数：\n\n```\nread INPUT_VAL?\"Enter the database\
  \ to be managed:\"\nGetTargetName\n```\n\n## 使用 EM CLI 管理黑屏\n\nEnterprise Manager\
  \ 最常见的用途是为目标停机事件或超出你设定限制的度量发送通知。你通过为单个目标或目标组创建黑屏来在计划停机期间控制这些警报。创建黑屏需要许多设置，而 EM 控制台提供了一种方便、美观的方法来实现。\n\
  \nEM CLI 提供了一种在你的 Shell 脚本内部创建、停止和删除黑屏的方法。控制台中发现的所有相同选项都可以通过 EM CLI 配置，因为它在幕后调用了相同的\
  \ Java 代码。\n\n你必须为 EM CLI 的`create_blackout`动词提供三个值。\n\n*   通过`-name`传递的黑屏唯一名称。\n\
  *   通过`-add_targets`参数指定的要包含在黑屏中的目标。\n*   作为`-schedule`参数输入的有关开始和结束时间的计划信息。\n\n\
  `-reason`变量不是 EM CLI 必需的，但应包含在内，以使 OEM 管理员更容易评估正在运行、已计划和已停止的黑屏。请保持礼貌。\n\n创建简单黑屏的语法相当直接：\n\
  \n```\n> emcli create blackout -name=\"sample_blackout\"\\\n-add_targets=\"oracla:oracle_database\"\
  \\\n-schedule=\"duration::360 ...\"\n-reason=\"Blackout demonstration using emcli\"\
  \n```\n\n### Name 参数\n\n\n\n# 计划停用（Blackout）\n\n你可以将任何内容用作停用（blackout）的名称。停用名称在创建时被应用，同时在停止和删除停用时也会用到。始终使用描述性名称是良好的实践，例如\
  \ `scripted_blackout_$SID` 或类似的、一致的命名标准。随着我们处理这些示例，你将开始看到一致性如何影响解决方案的设计。\n\n## 添加目标参数\n\
  \n目标必须通过目标名称和目标类型来标识。例如：\n\n- `oracla:oracle_database`\n- `demohost:host`\n- `lsnroracla:oracle_listener`\n\
  \n## 计划参数\n\n每个计划参数在命令行接受两个必填值和几个可选值，类似于控制台中的灵活性：\n\n```\nfrequency:once\nrequires\
  \ => duration or end_time\noptional => start_time, tzinfo, tzoffset\n\nfrequency:interval\n\
  requires => duration, repeat\noptional => start_time, end_time, tzinfo, tzoffset\n\
  \nfrequency:weekly\nrequires => duration, days\noptional => start_time, end_time,\
  \ tzinfo, tzoffset\n\nfrequency:monthly\nrequires => duration, days\noptional =>\
  \ start_time, end_time, tzinfo, tzoffset\n\nfrequency:yearly\nrequires => duration,\
  \ days, months\noptional => start_time, end_time, tzinfo, tzoffset\n```\n\n## 计划停用的一个健壮解决方案\n\
  \n作者的环境中包含一些应用程序培训数据库，这些数据库每晚都会从冷备份中刷新。当然，一旦这些目标被添加到 OEM，他就开始在夜间收到由这些计划中断引起的寻呼通知。你可以想象他的反应。\n\
  \n- 最简单的解决方案是在控制台中按计划将这些目标整夜停用。\n- 如果需要在白天运行此刷新怎么办？\n- 你真的希望这些目标在夜间不被监控吗？\n- 如果刷新失败怎么办？培训师通常不是耐心的客户，尤其是一房间闲置的学员正在等待他们的实验。\n\
  \n这里有一个涉及 Shell 函数、EM CLI 及其相关运行时脚本的解决方案。我们将首先看看在不使用 Shell 函数的情况下通常如何完成此过程，然后我们将把脚本转换为可移植、可扩展的函数。\n\
  \n## 使用 Shell 脚本创建和停止停用\n\n可以通过一系列 CLI 动词创建停用，以执行以下步骤来测试、执行然后验证停用状态：\n\n1.  确定目标是否已处于停用状态。\n\
  2.  如果停用已存在，则停止并删除它（以便为你的新停用获得完整持续时间）。\n3.  创建并启动新的停用。\n4.  通过将其值回显到屏幕以及日志文件中来验证停用是否已启动。\n\
  \n这些步骤在此简化脚本中进行了说明。你的真实脚本应测试数据库名称是否作为 `$1` 值在命令行传递，然后根据运行时条件提示或失败。例如，如果脚本是由活动用户执行的，它应提示输入数据库名称，否则它将失败并将原因回显到日志文件。\n\
  \n```shell\n#!/bin/ti\n"
- '# =====================================================

  '
- '#  File:        create_blackout.sh

  '
- '#  Purpose:     Create and initiate an OEM blackout

  '
- '#  Parameters:  Blackout name as BO_NAME

  '
- "# =====================================================\nexport BO_NAME=${1}_scripted_blackout\n\
  \necho  \"\\n\\nCreating blackout named '${BO_NAME}' ...\\n\"\n\nif [ `emcli get_blackouts\
  \ | grep ${BO_NAME} | wc -l` -gt 0 ]; then\n        $ECHO \"\\n\\nFound an existing\
  \ blackout named ${BO_NAME}\"\n        $ECHO \"That blackout will be stopped and\
  \ deleted prior to starting the new one\\n\\n\"\n        emcli stop_blackout -name=\"\
  ${BO_NAME}\"\n        emcli delete_blackout -name=\"${BO_NAME}\"\nfi\n\nemcli create_blackout\n\
  -name=\"${BO_NAME}\"\n        -add_targets=\"${thisTARGET}:oracle_database\"\n-schedule=\"\
  duration::360\"\n-reason=\"Scripted blackout for maintenance or refresh\"\n\nsleep\
  \ 5\n\necho \"\\n\\nGetting blackout information for '${BO_NAME}' ...\\n\\n\"\n\
  emcli get_blackout_details -name=\"${BO_NAME}\"\n```\n\n在这个简短的脚本中，有几件事需要注意：\n\n\
  - 每个停用名称必须是唯一的，因此此脚本要求部分名称在命令行传递。在此示例中，我们传递了 SID。\n- 用户沟通在任何时候都很重要，因此要完整且简洁。你的 `echo`\
  \ 语句在运行时很有用，在日志文件中也是必不可少的。\n- 此计划停用最多运行六小时（`duration:360`），因此你需要删除同名的现有停用以获得完整的六小时。\n\
  - 请注意，`stop_blackout` 和 `delete_blackout` 动词仅将停用名称作为其唯一输入值。你必须先停止停用才能删除它。\n- 停用状态的测试对于运行时日志文件很重要。\n\
  \n在实践中，这表现为 crontab 中的一系列包装条目，如下所示：\n\n```\n25 19 * * * /scripts/oem/create_blackout.sh\
  \ gold\n30 19 * * * /scripts/refresh/restore_training.sh gold\n30 20 * * * /scripts/oem/end_blackout.sh\
  \ gold\n```\n\n当你启动停用时，你也应该计划停止它。当然，脚本对的这一边更简单，因为要做的事情少得多：\n\n```shell\n#!/bin/sh\n"
- '# =====================================================

  '
- '#  File:        end_blackout.sh

  '
- '#  Purpose:     End an OEM blackout

  '
- '#  Parameters:  Blackout name as BO_NAME

  '
- "# =====================================================\nexport BO_NAME=${1}_scripted_blackout\n\
  echo  \"\\n\\nStopping blackout named '${BO_NAME}' ...\\n\"\nif [ `emcli get_blackouts\
  \ | grep ${BO_NAME} | wc -l` -gt 0 ]; then\n        $ECHO \"\\n\\nFound an existing\
  \ blackout named ${BO_NAME}\"\n        emcli stop_blackout -name=\"${BO_NAME}\"\n\
  \        emcli delete_blackout -name=\"${BO_NAME}\"\nfi\n```\n\n## 创建和使用函数库\n\n\
  前面的示例假设刷新一切顺利，并且 OEM 在一小时后恢复监控。当然，即使没有 `end_blackout.sh`，停用也会在启动后六小时结束。为什么不在这项工作完成后立即关闭停用呢？\n\
  \n将此活动转换为中心库中的 Shell 函数，允许你在 `restore_training.sh` 脚本内部启动和停止停用，如下所示：\n\n```shell\n\
  #!/bin/sh\n"
- '# =====================================================

  '
- '#  File:        restore_training.sh

  '
- '#  Purpose:     Refresh database from a cold backup copy of datafiles

  '
- '#  Parameters:  Database name as ORASID

  '
- '# =====================================================

  '
- '# Source the OEM function library

  . /script/oem/emcli_functions.lib


  export BO_NAME=database_refresh_${ORASID}


  CreateBlackout


  < Existing your in-house database restoration commands >


  EndBlackout

  ```


  只需要一个 cron 条目（或 OEM 计划作业），因为你已将所有三个脚本的工作包装在一个包装器中。


  此示例中引用的函数库包含函数 `CreateBlackout` 和 `EndBlackout`。函数库只是一个不可执行的文本文件，存储在每台服务器的中心位置，最好通过
  NFS 挂载或类似的共享文件系统。


  此代码段仅包含与此示例相关的两个函数。第 8 章 包含一个完整函数库的示例。你的生产 CLI 函数库可以包含许多其他函数，除了这两个。请注意，函数的内容与我们在单独的
  Shell 脚本中使用的代码相同。它们只是被记录为函数。


  ```shell

  '
- '# =====================================================

  '
- '#  File:     emcli_functions.lib

  '
- '#  Purpose:  Shared function library for EM CLI scripts

  '
- '#  Note :    Source this library to load its contents into memory

  '
- "# =====================================================\nfunction CreateBlackout\
  \ {\necho \"\\n\\nCreating blackout named '${BO_NAME}' ...\\n\"\n```\n\n\n\n## EMCTL\
  \ 或 EM CLI\n\nEnterprise Manager 控制实用程序，即 EMCTL，随每个 OEM 代理一起安装，用于手动启动和停止 OEM 代理以及管理远程主机上的本地功能。\n\
  \nEM CTL 可以像 EM CLI 一样用于启动和停止（但不能删除）OEM 黑屏，但有一个关键优势：EM CTL 已经安装和配置好。如果您选择 EM CLI\
  \ 作为使用 shell 脚本管理远程主机黑屏的工具，则必须在每台主机上手动安装和配置 EM CLI 客户端。EM CLI 客户端是 Java 程序的静态安装。客户端软件安装会通过\
  \ OEM 本身报告，但不受其管理。如果您的环境中的远程主机数量众多，且您将功能限制为黑屏维护和其他它可管理的任务，那么 EM CTL 可能是更好的解决方案。第\
  \ 2 章 中介绍的安装过程提供了一种执行该安装的脚本化方法。\n\n使用 EM CTL 管理黑屏与用于 EM CLI 的技术非常相似，并且同样适用于相同的脚本应用程序。\n\
  \n其语法很简单：\n\n```\nemctl start blackout <blackout name><target names>\nemctl start\
  \ blackout <blackout name>  -nodelevel\nemctl stop blackout <blackout name>\nemctl\
  \ status blackout <blackout name>\n```\n\n`nodelevel` 标志会使节点上的所有目标进入黑屏状态，非常适合打补丁活动。\n\
  \n持续时间由 `–d` 标志指定，可以设置为天和小时的组合，如下所示：\n\n```\nemctl start blackout WeekendBlackout\
  \  -nodelevel –d 2 12:00\n```\n\n在此示例中，可以将开发节点上所有目标的黑屏计划为在星期五下午 6:00 开始，并将持续到星期一早上\
  \ 6:00（两天十二小时）。\n\n## 使用 EM CLI 管理 OEM 管理员\n\n控制台提供了一种清晰、便捷的方法来管理 OEM 管理员帐户，但其灵活性使得创建多个帐户时，需要点击所有屏幕，变得非常不便。根据作者统计，在控制台中创建一个新的管理员至少需要\
  \ 17 次鼠标点击！EM CLI 将 OEM 代码库固有的灵活性与命令行界面的简洁性相结合。\n\n控制台中定义的所有选项都可以使用下面显示的标志作为选项在\
  \ EM CLI 中授予。要创建一个管理员，您只需为帐户指定名称和密码：\n\n```\nemcli create_user -name=\"SuzyQueue\"\
  -password=\"oracle\"\n```\n\n如果您正在阅读 Apress 出版的书籍，就不会忽略用户安全性，因此您会希望使用 `-expired=\"\
  true\"` 标志使用户的新密码过期，如下所示：\n\n```\nemcli create_user \\\n  -name=\"SuzyQueue\"\\\n\
  \  -password=\"oracle\"\\\n  -expired=\"true\"\n```\n\n其他可选参数允许您执行 OEM 控制台中可用的用户授权，而无需点击流程。\n\
  \n### 角色管理\n\nEnterprise Manager 管理员和用户实际上是存储库数据库中的数据库用户帐户。请避免通过 SQL*Plus 授予角色权限的诱惑，因为\
  \ OEM 可能会在帐户管理中执行其他操作。\n\n您可以在创建用户时通过添加 `-roles` 参数来添加角色授权：\n\n```\nemcli create_user\
  \ \\\n  -name=\"SuzyQueue\"\\\n  -password=\"oracle\"\\\n  -roles=\"em_all_administrator\"\
  \n```\n\n您也可以通过 `grant_roles` 或 `revoke_roles` 动词修改用户：\n\n```\nemcli grant_roles\
  \ \\\n  -name=\"SuzyQueue\"\\\n-roles=\"em_all_viewer\"\n\nemcli revoke_roles \\\
  \n  -name=\"SuzyQueue\"\\\n  -roles=\"em_all_operator\"\n```\n\n### 使用 Argfile 进行批处理\n\
  \nEM CLI 有一个名为 `argfile` 的批处理动词，与许多其他 Oracle 参数文件类似，它允许您通过提供一个包含要应用的输入值的文本文件的完全限定路径，在单次\
  \ EM CLI 执行中执行多个命令。\n\n例如，让我们在 `/tmp/create_several_users.lst` 文件中加载一些用于创建几个用户的\
  \ CLI 命令：\n\n```\ntouch /tmp/create_several_users.lst\nfor thisADMIN in Sugar Magnolia\
  \ Blossom Blooming, do\n    echo \"create_user -name=${thisADMIN} -password=oracle\
  \ -expired=true\";\ndone\n\ncat /tmp/create_several_users.lst\ncreate_user -name=\"\
  Sugar\"-password=\"oracle\"-expired=\"true\"\ncreate_user -name=\"Magnolia\"-password=\"\
  oracle\"-expired=\"true\"\ncreate_user -name=\"Blossom\"-password=\"oracle\"-expired=\"\
  true\"\ncreate_user -name=\"Blooming\"-password=\"oracle\"-expired=\"true\"\n\n\
  emcli login -username=SYSMAN -password=\"${SECRET_PASSWORD}\"\nemcli sync\nemcli\
  \ argfile \"/tmp/create_several_users.lst\"\n```\n\n使用 argfile 的优点如下：\n\n*   EM\
  \ CLI 实用程序在 argfile 之外被调用，因此动词是串行处理的，无需重新启动 EM CLI。\n*   Argfile 是一个文本文件，您选择的后缀对执行完全没有影响。该示例使用\
  \ `lst` 后缀，但您也可以使用 `cli` 或 `cmd`。\n*   您必须完全限定 argfile 的路径。\n*   此示例不包括文件清理，但我相信您的脚本会包含。\n\
  \n正如您可能猜测的那样，这种方法非常高效，并且 argfile 执行通常运行非常快，因为通过 CLI 实用程序对 OMS 只有一次调用。\n\n### 从文本文件填充\
  \ Argfile\n\n手动创建和编辑 argfile 并非不可能，但有时（总是？）脚本化解决方案更容易且不易出错。例如，如果您收到一个请求，要求为应用组的几个成员提供\
  \ OEM 访问权限，并附带以下 CSV 文件，该怎么办？\n\n![Image](img/sq.jpg) 注意：为清晰起见，本图中包含了反斜杠。请将每个完整字符串放在一行。\n\
  \n如果函数库已经创建，您可以自由地在所有脚本中使用这些相同的函数，甚至在命令行中也可以。例如，假设您需要对特定服务器上的数据库设置黑屏以进行操作系统补丁。在命令行中，您将\
  \ source 函数库，然后根据需要调用函数。文件通过键入一个句点、一个空格和文件名来 source。例如，当您登录到 Unix/Linux 服务器时，您的用户配置文件将\
  \ source `.bashrc` 和 `.bash_profile`（如果 Bash 是您选择的 shell），以将您的环境变量加载到内存中。当您键入 `env`\
  \ 命令时，它将反映这些值。Source 其他文件，如函数库，会将新文件中的路径、值、函数或别名加载到内存中，以补充或替换已有的环境变量：\n\n```\n.\
  \ /script/oem/emcli_functions.lib\nfor thisSID in suzie, sally, betty, veronica;\
  \ do\n    BO_NAME=os_patch_blackout_${thisSID}\n    echo \"Starting the blackout\
  \ for ${thisSID}\"\n    CreateBlackout ${BO_NAME}\ndone\n```\n\n当工作完成后，您将使用类似的过程进行反向操作：\n\
  \n```\n. /script/oem/emcli_functions.lib\nfor thisSID in suzie, sally, betty, veronica;\
  \ do\n    BO_NAME=os_patch_blackout_${thisSID}\n    EndBlackout ${BO_NAME}\ndone\n\
  ```\n\n除了简化您的运行时环境（无论是在命令行中还是在脚本中）之外，您还可以确信函数库中的代码已在其他用例中经过测试。函数库还消除了命令输入错误和步骤遗漏的机会。\n\
  \n```\nif [ `emcli get_blackouts | grep ${BO_NAME} | wc -l` -gt 0 ]; then\necho\
  \ \"\\n\\nFound an existing blackout named ${BO_NAME}\"\n        echo \"That blackout\
  \ will be stopped and deleted prior to starting the new one\\n\\n\"\n        emcli\
  \ stop_blackout -name=\"${BO_NAME}\"\n        emcli delete_blackout -name=\"${BO_NAME}\"\
  \nfi\n\nemcli create_blackout -name=\"${BO_NAME}\"\n -add_targets=${thisTARGET}:oracle_database\n\
  \ -schedule=\"duration::360;tzinfo:specified;tzregion:America/Los_Angeles\"\n -reason=\"\
  Scripted blackout for maintenance or refresh\"\n}\n\nfunction EndBlackout {\n\n\
  echo \"\\n\\nStopping blackout '${BO_NAME}' ...\\n\"\nemcli stop_blackout -name=\"\
  ${BO_NAME}\"\n\necho \"\\n\\nDeleting blackout '${BO_NAME}' ...\\n\"\nemcli delete_blackout\
  \ -name=\"${BO_NAME}\"\n}\n```\n\n\n\n# 使用 EM CLI 进行高级管理\n\n## 准备参数文件\n\n```\ncat\
  \ manage_request.txt\nlogin,name,department,email e123450,\"Jerry\",A100,jerry@samplecorp.com\n\
  e123451,\"Bobby\",A100,bobby@samplecorp.dom\ne123452,\"Phil\",A100,phil@samplecorp.dom\n\
  e123449,\"Robert\",A100,roberth@samplecorp.dom\ne123499,\"Ron\",A100,ronpig@samplecorp.dom\n\
  e123460,\"Bill\",A110,bill@samplecorp.dom\ne123461,\"Mickey\",A110,mickey@samplecorp.dom\n\
  e123491,\"Keith\",A120,keith@samplecorp.dom\ne123492,\"Donna\",A120,donnaj@samplecorp.dom\n\
  e123460,\"Brent\",A120,brent@samplecorp.dom\n```\n\n我们将通过重定向循环语句的输出来创建参数文件，如下所示：\n\
  \n```\ntouch /tmp/user_builder_argfile.lst\n\nfor thisENTRY in `cat manage_request.txt`;\
  \ do\n  LOGIN=`echo ${thisENTRY} | cut -d, -f1`\n  NAME=`echo ${thisENTRY} | cut\
  \ -d, -f2`\n  DEPT=`echo ${thisENTRY} | cut -d, -f3`\n  EMAIL=`echo ${thisENTRY}\
  \ | cut -d, -f4`\necho \"delete_user -name=${NAME} \\n >>/tmp/user_builder_argfile.lst\n\
  echo \"create_user -name=${NAME} \\\n\\t -password=oracle -expired=true \\\n   \
  \  \\t -desc=${NAME} \\\n     \\t -department=${DEPT} \\\n     \\t -email=${EMAIL}\
  \ \\\n     \\t -roles=\"EM_USER \\n\"\n>>/tmp/user_builder_argfile.lst\ndone\necho\
  \ \"\\n\\nArgfile has been created\\n\"\ncat /tmp/user_builder_argfile.lst\n```\n\
  \n最终我们得到的参数文件内容如下所示：\n\n```\ndelete_user -name=e123450\ncreate_user -name=e123450\
  \ -password=oracle -expired=true \\\n-desc=Jerry -department=A100 -email=jerry@samplecorp.com-roles=EM_USER\n\
  delete_user -name=e123451\ncreate_user -name=e123451 -password=oracle -expired=true\
  \ \\\n-desc=Bobby -department=A100 -email=bobby@samplecorp.com-roles=EM_USER\n.\
  \ . .\n```\n\n在运行时，我们将看到如下输出：\n\n```\n>emcli argfile /tmp/user_builder_argfile.lst\n\
  >User \"e123450\"deleted successfully\n>User \"e123450\"created successfully\n>User\
  \ \"e123451\"deleted successfully\n>User \"e123451\"created successfully\n...\n\
  ```\n\n这种方法快速高效，因为所有命令都在一个 CLI 会话中发送给 OMS，避免了将每条命令作为单独的事务发送给 OMS 处理的开销。\n\n## 在\
  \ OMS 实例间克隆 OEM 角色和用户\n\n沙盒 OEM 服务器是精心设计的 OEM 环境的一部分，但如果没有 EM CLI，将 EM 安全数据从一个存储库复制到另一个可能很困难。本示例结合使用\
  \ `SQL*Plus` 和 `EM CLI` 从现有环境中收集数据，然后在沙盒中快速、完整地重现它。\n\n首先，我们将针对现有 OEM 存储库数据库中的 `SYSMAN`\
  \ 模式执行查询，创建三个假脱机文件。这些假脱机文件将成为我们用于构建角色、用户和权限的 EM CLI 参数文件。\n\n存储库数据库中的 `SYSMAN` 模式包含\
  \ OEM 收集或设置的所有信息。当 EM 代理将其最新指标上传到管理服务器时，这些值会发布到 `SYSMAN` 模式中的表中。每当您在控制台中请求页面时，它都是从\
  \ `SYSMAN` 中的数据填充的。\n\n```\n#!/bin/bash# =====================================================\n"
- '#  File:        clone_em_users.sh

  '
- '#  Purpose:     Copy OEM roles and user account between instances

  '
- '#  Parameters : None

  '
- '# =====================================================

  ARGFILE01=/tmp/argfile_create_roles.txt

  ARGFILE02=/tmp/argfile_create_users.txt

  ARGFILE03=/tmp/argfile_grant_roles.txt


  sqlplus -S ${SYSMAN_CONNECT} <<EOF 1>/dev/null

  SET ECHO OFF

  SET FEEDBACK OFF HEADING OFF LINES 250 PAGES 999


  SPOOL ${ARGFILE01}


  SELECT ''create_role -name="'' || role_name || ''" -description="'' || description
  || ''"''

  FROM     sysman.gc_roles

  WHERE  role_type= ''1'';


  SPOOL OFF


  SPOOL ${ARGFILE02}


  SELECT   ''create_user -name="'' || user_name || ''" -description="'' || user_description
  || ''" -password=''||oracle||

  "  -expired="||true||''"''

  FROM    sysman.gc_users

  WHERE  user_name NOT IN (''SYSMAN'')

  ORDER BY user_name;


  SPOOL OFF


  SPOOL ${ARGFILE03}


  SELECT ''grant_roles -name="'' || user_name || ''" -roles="'' || role_name || ''"''

  FROM     sysman.gc_user_roles;


  SPOOL OFF

  exit

  EOF


  emcli login -user=sysman -pass=${CONSOLE_PWD}

  emcli -argfile ${ARGFILE01}

  emcli -argfile ${ARGFILE02}

  emcli -argfile ${ARGFILE03}

  ```


  ## 更改 EM 管理员引用


  正如我们在上一节中提到的，您通过 OEM 创建的所有信息都存储在存储库数据库中。OEM 帐户的用户数据存储在 `sysman.mgmt_created_users`
  表中。当然，您绝不应直接更改存储库中的数据，但您可以将其用作参考数据。


  通过 EM 控制台更新单个管理员是简单直接的。但是，如果部门名称更改或一组管理员更换了地点怎么办？


  您可以创建一个简短的脚本，通过将部门 200 中的所有员工列表收集到一个假脱机文件中，然后遍历假脱机文件中的每一行，为每个员工创建 `modify_user`
  语句，从而在部门 200 中的所有人都被分配到部门 500 时更改引用。该脚本由 SQL 和 EM CLI 命令组合而成。目前没有 CLI 动词可以直接收集此信息，因此我们将从存储库中提取它。


  为了清晰起见，已删除了提示用户输入时典型的许多错误检查例程：用户提供答案了吗？输入的部门编号是大写还是小写？它们是有效数字吗？可扩展且可靠的脚本必须始终包含这些验证。


  ```

  #!/bin/bash

  '
- '# ===============================================================

  '
- '#  File:        change_admin_depts.sh

  '
- '#  Purpose:     Change department number references for EM admins

  '
- '#  Parameters:  None

  '
- "# ===============================================================\nread OLD_DEPT?\"\
  Enter the old department number:  \"\nread NEW_DEPT?\"Now enter the new department\
  \ number: \"\n\nsqlplus <Connect String><<EOF\nSET echo OFF\nSET heading OFF feedback\
  \ OFF page 999\nspool old_department.lst\nSELECT user_name\nFROM     sysman.mgmt_created_users\n\
  WHERE  department = '${OLD_DEPT}';\nspool off\nexit\nEOF\n\ntouch myARGFILE.lst\n\
  \nfor thisUSER in `cat old_department.lst`; do\n        echo \"modify_user -name=\"\
  ${thisUSER}\"-department=\"${NEW_DEPT}\">>myARGILE.lst\ndone\n\nemcli argfile myARGFILE.lst\n\
  \necho \"\\n\\nDepartment settings after the change:\\n\"\nsqlplus <Connect String><<EOF\n\
  SET echo OFF\nSET heading ON pages 999\nSELECT user_name,\n       department\nFROM\
  \   sysman.mgmt_created_users\nORDER BY user_name;\nexit\nEOF\n[ old_department.lst\
  \ ] && rm –f old.department.lst\n[ myARGFILE.lst ] && rm –f myARGFILE.lst\n```\n\
  \n最后两个步骤清理了运行时创建的临时文件。每个 shell 脚本都应该自行清理。上面的语法检查文件是否存在，并在找到时将其删除。您也可以选择构建一个简单的 `if`\
  \ 语句。\n\n## Shell Getopts 命令\n\n除了 `getopts`（复数）外，Linux 还有 `getopt`（单数）命令。本讨论是关于\
  \ `getopts` 的。这是一个 shell 实用程序，而不是 EM CLI 动词。前面的示例提示用户输入两个部门编号，这对于交互式脚本是可以的，但对于计划作业则不可扩展。您可以在命令行使用位置参数，如下所示：\n\
  \n```\nif [ $1 ]; then\nexport OLD_DEPT=${1}\nelse\nread OLD_DEPT?\"Enter the old\
  \ department number:  \"\nfi\n\nif [ $2 ]; then\n        export NEW_DEPT=${1}\n\
  else\nread NEW_DEPT?\"Enter the new department number:  \"\nfi\n\nif [[ ${OLD_DEPT}\
  \ == ${NEW_DEPT} ]]; then\n        echo \"The values for the old and new departments\
  \ are the same\"\n        < Error handling >\nfi\n```\n\n这种方法依赖于用户输入以正确的顺序呈现。在当前示例中，第一个输入值对应于旧部门，第二个对应于新部门。但是，如果它们顺序不对怎么办？`getopts`\
  \ 命令允许您使用输入标志来避免此问题。\n\n\n\n# 第六章 高级脚本编写\n\n### 概述\n\n命令行界面（如 `EM CLI`）的一大优势在于能够一次性自动化执行多条命令。本章将深入探讨\
  \ `Python` 与 `EM CLI` 的结合，即所谓的交互式和脚本模式。\n\n本章第一部分回顾了 `Python`、`Jython` 和 `JSON`\
  \ 的历史渊源。要在 `EM CLI` 中利用 `Python` 的功能，需要对编程和 `Python` 语法有基本的了解。本章将通过示例介绍 `Python`，即使是首次使用者也能在\
  \ `EM CLI` 中高效地运用它。\n\n最后，一个详细的示例将展示如何使用 `Python` 类对象，借助 `EM CLI` 的功能一次性修改多个目标的属性。这是一项在图形用户界面中非常繁琐的常见任务，必须理解并学会在\
  \ `EM CLI` 中使用。\n\n## 命令行输入的处理\n\n命令行输入由脚本中的 `case` 语句进行评估，以决定如何处理标志（flag）值。它们被输入到命令行的顺序是无关紧要的。`OPTARG`\
  \ 是 `getopts` 传递的值的名称。让我们看看其工作原理。对于命令行中的这个条目，将通过名为 `OPTARG` 的 `getopts` 输出返回一个字符串。\n\
  \n```bash\n./change_admin_depts.sh –a 500 –b 750\n\nwhile getopts a:b: OptValue;\
  \ do\n  case $OptValue in\n    a) export OLD_DEPT=${OPTARG};;\n    b) export NEW_DEPT=${OPTARG};;\n\
  \    *) echo \"No values were provided for old and new departments\";;\n  esac\n\
  done\n```\n\n这个示例测试了一个名为 `OptValue` 的临时变量是否与预期的字符匹配，并做出相应的响应。命令行中识别为 `-a` 或 `-b`\
  \ 的每一个值都对应一个新部门或旧部门的编号。\n\n```bash\necho $OLD_DEPT\n\necho $NEW_DEPT\n```\n\n在 `getopts`\
  \ 语句中，后跟冒号 “`:`” 的字符标识表示该标志后将跟随一个字符串。没有冒号的 `OptValue` 则不会接受字符串，可用于在脚本中发出特定流程的信号。\n\
  \n在下面的示例中，如果在命令行接收到 `-t` 标志，则会执行一个名为 `RunTestFunctions` 的函数：\n\n```bash\nchange_admin_depts.sh\
  \ -a 747 -b 757 -t\n```\n\n脚本按顺序处理这些请求：\n\n```bash\nwhile getopts a:b:t OptValue;\
  \ do\n  case $OptValue in\n    a) export OLD_DEPT=${OPTARG};;\n    b) export NEW_DEPT=${OPTARG};;\n\
  \    t) export TestOnly=\"True\";;\n    *) echo \"No values were provided for old\
  \ and new departments\";;\n  esac\ndone\n\nif [ $TestOnly == True ]; then\n    RunTestFunctions\n\
  fi\n```\n\n这种方法灵活性随着可处理的值的数量而增长。例如，`ChangeAdminDepts` 函数中的逻辑可以调整来处理你可以用 `modify_user`\
  \ 动词设置的其他值，比如业务线（line of business）和位置（location）。`getopts` 标志可用于决定应用哪些函数。参见以下示例：\n\
  \n```bash\nwhile getopts a:b:c:d:e:f:t OptValue; do\n  case $OptValue in\n    a)\
  \ export OLD_DEPT=${OPTARG};;\n    b) export NEW_DEPT=${OPTARG};;\n    c) export\
  \ OLD_LOB=${OPTARG};;\n    d) export NEW_LOB=${OPTARG};;\n    e) export OLD_LOCATION=${OPTARG};;\n\
  \    f) export NEW_LOCATION=${OPTARG};;\n    t) export TestOnly=\"True\";;\n   \
  \ *) echo \"No values were provided for old and new departments\";;\n  esac\ndone\n\
  \nif [ ${#OLD_DEPT} -gt 0 ]; then\n    if [ ${#NEW_DEPT} -gt 0 ]; then\n       \
  \ ChangeAdminDepts\n    else\n        echo \"Error: You provided the old department\
  \ but\"\n        echo \"the value for the new department is missing.\"\n       \
  \ echo \"Please run this script again and provide\"\n        echo \"both values\
  \ when prompted\"\n        exit 1\n    fi\nfi\n```\n\n## 使用参数文件更新目标属性\n\n`OEM` 属性为目标（targets）和管理员提供了另一个数据点。例如，为主机和数据库目标设置\
  \ `Department` 属性对于过滤报告可能很有用，或者你可以使用一个属性将目标映射到管理员。`Lifecycle Status` 属性可用于过滤正常运行时间报告。你懂的。这是在\
  \ `Groups` 等内置 `OEM` 结构之外的另一个参考点。\n\n尽管它们很有用，但为 `OEM` 目标设置属性相当不便。当你发现一个新主机或配置到一个新数据库的连接时，控制台不会提示你输入\
  \ `LifeCycle Status`、`Department`、`Location` 或任何其他可直接分配给目标的属性。\n\n因此，你的某些目标在这些字段中可能没有当前或准确的值。这里有一个查询使用字符串逻辑从主机名推导\
  \ `LifeCycle Status`。在这个例子中，生产主机被命名为 `oraprod01`、`oraprod02` 等。测试和开发主机也遵循相同的通用命名标准。注意：像这样的命名标准会给黑客发出一个信号：“不要在那个开发/测试服务器上浪费时间——我所有的生产数据都在这里！”\
  \ 这只是一个例子。\n\n`set_target_property_value` 动词允许你为单个目标设置单个属性。你有更好的事情要做，因此我们将通过将该查询的结果加载到\
  \ `SQL` 缓存文件中，将这些动词字符串拉入一个参数文件，如下所示：\n\n```bash\nsqlplus -S ${SYSMAN_CONNECT} <<EOF\n\
  SET ECHO OFF\nSET FEEDBACK OFF HEADING OFF LINES 250 PAGES 999\nSPOOL ${ARGFILE01}\n\
  SELECT\n        CASE SUBSTR ( host_name, 0, 6 )\n           WHEN 'oraprod' THEN\n\
  \            DECODE ( property_value, 'Production', NULL, 'set target_property_value\
  \ -property_records=\"' || target_name ||':oracle_database:LifeCycle Status:Production\"\
  ' )\n           WHEN 'oratest' THEN\n            DECODE ( property_value,'Test',\
  \ NULL,'set_target_property_value -property_records=\"' || target_name ||':oracle_database:LifeCycle\
  \ Status:Test\"' )\n           WHEN 'oradevl' THEN\n             DECODE ( property_value,'Development',\
  \ NULL,'set_target_property_value -property_records=\"' || target_name ||':oracle_database:LifeCycle\
  \ Status:Development\"' )\n        ELSE 'Not defined'\n        END  AS corrective_action\n\
  FROM    sysman.gc\\$target_properties a,\n        sysman.gc\\$target b\nWHERE  \
  \ a.target_guid = b.target_guid\n AND    b.target_type = 'oracle_database'\n AND\
  \    a.property_name = 'orcl_gtp_lifecycle_status';\nSPOOL OFF\nEOF\n\nif [ `cat\
  \ ${ARGFILE01} | wc -l` -gt 0 ]; then\n    emcli login -user=sysman -pass=${CONSOLE_PWD}\
  \ 2>/dev/null\n    emcli argfile ${ARGFILE01}\n    emcli logout\nfi\n```\n\n## 总结\n\
  \n`EM CLI` 支持控制台内可用的许多技术，并允许你在可移植的 `shell` 脚本或 `OEM` 作业中管理和操作目标数据。本章重点介绍了原生的 `shell`\
  \ 脚本，但一个更快、更灵活的 `jython` 脚本技术随着 12.1.0.3 版本发布。接下来的章节将展示如何利用该功能。\n\n高级 `jython` 脚本的可用性不应使你放弃基础的\
  \ `shell` 脚本编写。`shell` 脚本无需额外的安装或配置即可运行。它们还有一个优势，即几乎所有管理员都对它很熟悉。\n\n## Python 的历史\n\
  \n`Python` 由 `Guido van Rossum` 在 1980 年代末期创建，起源于一种名为 `ABC` 的解释型语言。当时，`van Rossum`\
  \ 正在使用 `ABC`，他喜欢其语法但想改变一些功能。在 1989 年的圣诞节假期期间，`van Rossum` 设计了后来被称为 `Python` 的语言。`Python`\
  \ 于 1991 年正式发布，当时 `van Rossum` 在阿姆斯特丹一家名为 `Stichting Mathematisch Centrum` 的公司工作。\n\
  \n`Python` 的名字并非来源于危险的爬行动物，而是来源于英国 `BBC` 的流行喜剧系列《*Monty Python’s Flying Circus*》。`van\
  \ Rossum` 是该剧的粉丝，并需要一个适合该语言的名字。\n\n\n\n# Python、Jython 与 EM CLI 入门指南\n\n范罗苏姆继续扮演着核心角色，并被任命为\
  \ Python 的终身仁慈独裁者（Benevolent Dictator for Life， BDFL）。这个称谓是为范罗苏姆创造的，但已成为开源软件中一个常见的描述，指其创建者仍是社区内争议或争论的最终决策者。\n\
  \nPython 是一种编程语言，但由于代码在运行时编译，它也可以被视为一种脚本语言。这两者之间并不总是有明确的界限，而且各自的定义也随着时间而变化。通常，编程语言必须先编译才能运行，而脚本则从一组命令运行，可以是交互式的，也可以是从文件运行的。既然\
  \ Python 能同时做到这两者，那么对于“Python 是编程语言还是脚本语言？”这个问题的回答就是“是的！”。\n\n## Jython\n\nJython\
  \ 是用 Java 实现的 Python 版本。Jython 最初创建于 1997 年底，旨在用 Java 替换 Python 的“C”实现，以处理 Python\
  \ 程序访问的性能密集型代码。了解如何用 Java 编程虽然对使用 Jython 有帮助，但并非先决条件。事实上，即使对 Java 一无所知，也可以使用 Jython。然而，在使用\
  \ Jython 时，很可能会遇到 Java 代码，因为 Jython 程序除了使用 Python 模块外，还会使用 Java 类。\n\n企业管理器命令行界面（Enterprise\
  \ Manager Command-Line Interface）几乎完全用 Java 和 Jython 编写。从 OMS 下载 EM CLI 是一个 JAR\
  \ 文件，需要 Java 可执行文件来安装。当以交互模式使用 EM CLI 时，命令行界面就是 Jython。\n\n本章的剩余部分将互换地引用 Python\
  \ 和 Jython。这是因为大多数用户从 Python 开始，随后学习 Jython，或者在使用 Jython 时只使用 Python 语言（不使用 Java）。互联网和书籍中有大量关于\
  \ Python 的信息和教程，因此建议在查找语法、示例等时搜索“Python”而不是“Jython”。\n\n如果你曾经使用过 Oracle 的任何中间件产品，你很可能已经接触过\
  \ Jython。WebLogic 应用服务器脚本工具（也称为“`wlst`”）也使用 Jython。\n\n## JSON\n\nEM CLI 命令的输出将以两种方式之一显示。标准的表格或列式格式称为“文本”（`text`）模式。在达到某个临界点之前，文本模式通常是数据最可读的形式。例如，一个有五列的表在文本模式下显示良好，但一个由\
  \ 20 列组成的表则非常难以阅读或解析。文本模式是 EM CLI 交互模式的默认显示模式。\n\n替代文本模式显示命令输出的另一种方式是 JavaScript\
  \ 对象表示法，通常称为 JSON。JSON 最初源自 JavaScript，此后已成为数据交换的通用工具。几乎每种编程和脚本语言不仅使用和理解 JSON，而且对其有大量内置功能支持。\n\
  \nJSON 是 EM CLI “脚本”（`scripting`）模式下存储和显示命令输出的默认方法，该模式专为处理 EM CLI 命令和输出而构建。预计在 EM\
  \ CLI 脚本中处理的命令所接收的数据将以某种方式被操作。\n\n## 入门\n\nPython 为易用性和简洁性而构建。因此，对于新手来说，学习该语言的基本功能并使用它来完成任务并不困难。DBA\
  \ 在学习 Python 方面往往具有优势，因为他们具有使用 PL/SQL、Java、Shell 脚本、各种命令行界面的经验以及分析倾向。\n\n也许 Python\
  \ 最显著的特点是使用缩进来表示块结构。Python 不使用开始和结束语句来包围一个流程控制块（例如 `if` 语句），而是使用四个空格来缩进属于该块的代码行。因此，在第一个未缩进的行之上的行就结束了该块。块的第一行后面总是跟着一个冒号。\n\
  \n```python\n>>> for VAR in myLoop:\n...     do this command\n>>> this line does\
  \ not belong in the loop\n```\n\nPython 和 Jython（以及 EM CLI 和 WLST）都有一个交互式界面，其中在脚本中执行的任何命令都可以被编写或复制并执行，以实时查看结果。大多数\
  \ Linux 主机都安装了 Python。要调用交互式界面，只需键入 `python`：\n\n```shell\n[root@server ~]# which\
  \ python\n/usr/bin/python\n[root@server ~]# python\nPython 2.6.6 (r266:84292, Jul\
  \ 10 2013, 06:42:56)\n[GCC 4.4.7 20120313 (Red Hat 4.4.7-3)] on linux2\nType \"\
  help\", \"copyright\", \"credits\" or \"license\" for more information.\n>>>print(\"\
  this is the interactive Python prompt\")\nthis is the interactive Python prompt\n\
  >>>exit()\n```\n\n## Hello World!\n\n“`Hello World!`” 是任何编程或脚本语言最常见的入门介绍。以下示例使用三行代码演示了\
  \ Python 中五个重要的概念，这些概念几乎在每个脚本中都会用到。注意每一行中没有多余的文本或命令。\n\n```python\n>>> myvar = 'Hello\
  \ World!'\n>>> if myvar:\n...     print(myvar)\n...\nHello World!\n```\n\n第一行展示了如何为变量赋值。变量在被赋值之前不需要被创建。这两个步骤是一次性完成的。赋给\
  \ `myvar` 的值是一个字符串值，因此该变量是一个字符串变量。\n\n第二行开始一个 `if` 代码块。该块表示：“如果变量 `myvar` 存在并且已为其赋值，则继续执行此块中的下一行”。代码块的起始行总是以冒号结束。\n\
  \n第三行打印 `myvar` 变量的值，后跟一个新行。`print` 函数总是在打印的字符串末尾包含一个换行符。\n\n第四行需要一个回车来表示代码块已结束。在脚本中并非如此，代码块后的空行不是必需的。\n\
  \n第五行显示了代码块命令的输出。这表明 `myvar` 变量确实存在并且已被赋值，因此执行了代码块中的那一行，这通过 `print` 函数的成功执行得到了证明。\n\
  \n## 查找帮助\n\n互联网上有大量关于 Python 的信息。一个简单的互联网搜索就能返回足够多的结果，让你回忆起一个被遗忘的命令。但是，Python 做得更好。一套完整的帮助功能可以直接从命令行获得。\n\
  \n通过调用 `help()` 函数可以了解如何使用 Python 内部帮助的基本语法，该函数将用户带入 Python 内的另一个命令行界面，在该界面中可以输入几乎任何在\
  \ Python 中找到的关键词（包括“`help`”）以提供易于理解的信息：\n\n```python\n>>> help()\n\nWelcome to Python\
  \ 2.6!  This is the online help utility.\n\nIf this is your first time using Python,\
  \ you should definitely check out\nthe tutorial on the Internet at http://docs.python.org/tutorial/.\n\
  \nEnter the name of any module, keyword, or topic to get help on writing\nPython\
  \ programs and using Python modules.  To quit this help utility and\nreturn to the\
  \ interpreter, just type \"quit\".\n\nTo get a list of available modules, keywords,\
  \ or topics, type \"modules\",\n\"keywords\", or \"topics\".  Each module also comes\
  \ with a one-line summary\nof what it does; to list the modules whose summaries\
  \ contain a given word\nsuch as \"spam\", type \"modules spam\".\n\nhelp>\n```\n\
  \n\n\n# Python 帮助系统与基础对象\n\n## 使用 Python 帮助系统\n\n例如，如果我需要了解字符串的相关知识，可以在`help>`命令行中输入`string`，然后我就可以阅读关于\
  \ Python 中字符串多种用法的说明。一个更简单的方法是输入`topics`来查找主题。该命令会打印出可用主题的列表，包括`STRINGS`。输入`STRINGS`会展示一篇关于\
  \ Python 字符串的易懂文章。输入字母`q`将退出文章，输入`<CTRL-D>`将退出帮助命令行：\n\n```\nhelp> topics\n\nHere\
  \ is a list of available topics.  Enter any topic name to get more help.\n\nASSERTION\
  \           DEBUGGING           LITERALS            SEQUENCEMETHODS2\nASSIGNMENT\
  \          DELETION            LOOPING             SEQUENCES\nATTRIBUTEMETHODS \
  \   DICTIONARIES        MAPPINGMETHODS      SHIFTING\nATTRIBUTES          DICTIONARYLITERALS\
  \  MAPPINGS            SLICINGS\nAUGMENTEDASSIGNMENT DYNAMICFEATURES     METHODS\
  \             SPECIALATTRIBUTES\nBACKQUOTES          ELLIPSIS            MODULES\
  \             SPECIALIDENTIFIERS\nBASICMETHODS        EXCEPTIONS          NAMESPACES\
  \          SPECIALMETHODS\nBINARY              EXECUTION           NONE        \
  \        STRINGMETHODS\nBITWISE             EXPRESSIONS         NUMBERMETHODS  \
  \     STRINGS\nBOOLEAN             FILES               NUMBERS             SUBSCRIPTS\n\
  CALLABLEMETHODS     FLOAT               OBJECTS             TRACEBACKS\nCALLS  \
  \             FORMATTING          OPERATORS           TRUTHVALUE\nCLASSES      \
  \       FRAMEOBJECTS        PACKAGES            TUPLELITERALS\nCODEOBJECTS     \
  \    FRAMES              POWER               TUPLES\nCOERCIONS           FUNCTIONS\
  \           PRECEDENCE          TYPEOBJECTS\nCOMPARISON          IDENTIFIERS   \
  \      PRINTING            TYPES\nCOMPLEX             IMPORTING           PRIVATENAMES\
  \        UNARY\nCONDITIONAL         INTEGER             RETURNING           UNICODE\n\
  CONTEXTMANAGERS     LISTLITERALS        SCOPING\nCONVERSIONS         LISTS     \
  \          SEQUENCEMETHODS1\n\nhelp> STRINGS\nString literals\n***************\n\
  \nString literals are described by the following lexical definitions:\n\nstringliteral\
  \   ::= stringprefix\n   stringprefix    ::= \"r\" | \"u\" | \"ur\" | \"R\" | \"\
  U\" | \"UR\" | \"Ur\" | \"uR\"\n   shortstring     ::= \"'\" shortstringitem* \"\
  '\" | '\"' shortstringitem* '\"'\n...\n\n:q\n\nhelp> <CTRL-D>\nYou are now leaving\
  \ help and returning to the Python interpreter.\nIf you want to ask for help on\
  \ a particular object directly from the\ninterpreter, you can type \"help(object)\"\
  . Executing \"help('string')\"\nhas the same effect as typing a particular string\
  \ at the help> prompt.\n>>>\n```\n\n## EM CLI 中的 `help` 函数\n\n`help`函数在 EM CLI 中也非常有用。开发者投入了大量时间确保程序本身包含了这些信息。与\
  \ Python 不同，输入`help()`不会进入另一个命令行；它只是简单地打印出一个按类别排序和分组的动词列表。\n\n然后，可以在`help`函数中指定具体的动词，以获取关于该动词的更详细信息。例如，在\
  \ EM CLI 中输入`help('list_active_sessions')`将打印出关于`list_active_sessions()`函数的详细信息。\n\
  \n## Python 对象\n\nPython 中的对象是一个可以保存数据的实体，在大多数情况下，可以通过改变对象内部包含的数据或改变对象本身的属性来进行操作。Python\
  \ 对象的内容和复杂性取决于对象类型。例如，如果你需要一个只包含单个数字的对象，你会使用`number`对象。如果你需要一个包含多个键/值对的对象，你会使用`dictionary`对象。对象的生命周期始于它被创建或被赋值，结束于它被显式销毁或\
  \ Python 会话结束。本节列出了最常见的对象类型，并展示了如何创建和使用它们的示例。\n\n#### 数字和字符串\n\n`number`对象是一个包含单个整数值的实体。`string`对象是一个包含单个字符串值的实体。这些类型的对象是可变的，这意味着在对象的生命周期内，其值可以在任何时候被更改或替换。这些无疑是\
  \ Python 中最常用的对象。\n\n“Hello World!”示例介绍了 Python 中最基本的对象：字符串。字符串在 Python 中无处不在，大多数其他对象都是由数字和字符串组成的。字符串可以包含数字，但数字不能包含字符串。\n\
  \n下面这个示例展示了如何通过将字符串赋值给变量来创建一个简单的字符串对象：\n\n```\n>>> mystring = 'Here is my string'\n\
  >>> type(mystring)\n<type 'str'>\n```\n\n我可以通过将数字赋值给变量来创建一个数字对象。`int`代表整数：\n\n```\n\
  >>> mynumber = 12345\n>>> type(mynumber)\n<type 'int'>\n```\n\n数字和字符串是不同类型的对象。尝试将字符串值与数字值连接会导致错误：\n\
  \n```\n>>> mystring + mynumber\nTraceback (most recent call last):\n  File \"<stdin>\"\
  , line 1, in <module>\nTypeError: Can't convert 'int' object to str implicitly\n\
  ```\n\n#### 列表\n\n列表是在一个对象中存储一组带索引的值的常用方式。一个简单的列表被赋值给对象的方式与字符串被赋值给对象的方式类似，不同之处在于该对象现在是一个列表对象，而不是字符串对象。这在\
  \ Python 中不像在其他语言中那么重要，但理解这种差异是好的，因为它可能对程序的行为产生影响。\n\n这个示例展示了一个包含单个值的列表对象。赋值给列表的值被括号包裹。如果没有括号，这将是一个简单的字符串对象。参见：\n\
  \n```\n>>> mylist = ['one']\n>>> print(mylist)\n['one']\n>>> type(mylist)\n<type\
  \ 'list'>\n>>> mystring = 'one'\n>>> type(mystring)\n<type 'str'>\n```\n\n#### 简单列表\n\
  \n一个只有一个值的列表可能有用，但列表的目的是能够在单个对象中分配多个列表值。这些值被称为*元素*。在前面的例子中，值`one`被分配为`mylist`对象中的第一个元素。\n\
  \n这个示例创建了一个名为`mylist`的列表，包含五个成员。打印列表会按照它被创建时的样子显示。五个元素被打印在一对开闭括号内。括号告诉我们这是一个列表，而不是字符串或任何其他类型的对象。索引为\
  \ 2 的元素实际上是列表中的第三个元素，因为索引号从 0 开始。\n\n列表的强大之处在于可以以多种方式操作各个元素。例如，可以通过指定其索引号从列表中查询任何元素。列表的索引从零开始，所以列表的第一个元素被赋予数字零：\n\
  \n```\n>>> mylist = ['one', 'two', 'three', 'four', 'five']\n>>> print(mylist)\n\
  ['one', 'two', 'three', 'four', 'five']\n>>> type(mylist)\n<type 'list'>\n>>> print(mylist[2])\n\
  three\n```\n\n列表是可变的，这意味着它可以在创建后被操作。它可以被延长或缩短，元素也可以被更改。这个示例展示了`mylist`对象被追加了值`6`。该对象中的元素数量从五个增加到六个：\n\
  \n```\n>>> mylist.append('six')\n>>> print(mylist)\n['one', 'two', 'three', 'four',\
  \ 'five', 'six']\n>>> print(len(mylist))\n6\n```\n\n前一个示例中使用的`len()`函数显示了列表中的元素数量。像许多函数一样，`len()`可以用于列表、字符串和所有其他对象类型。\n\
  \n\n\n# EM CLI 中的列表\n\n下一个示例展示了如何通过提取并删除 `myshortlist` 的最后一个元素来进一步操作列表。此示例中的第一条命令完成了三件事：`pop()`\
  \ 函数从 `mylist` 中提取并删除最后一个元素，创建 `myshortlist` 列表对象，并将“弹出”的元素赋给它。如果 `pop()` 函数前没有对象赋值，它只会简单地打印该元素：\n\
  \n```python\n>>> myshortlist = mylist.pop()\n>>> print(myshortlist)\nsix\n>>> print(mylist)\n\
  ['one', 'two', 'three', 'four', 'five']\n```\n\n列表在 EM CLI 中扮演着关键角色。EM CLI 中函数的输出可能会产生一个包含数百甚至数千个元素的列表，这些元素可以由字符串、数字或其他对象组成。EM\
  \ CLI 中的列表工作方式与前面示例中的完全相同。\n\n理解以下示例的所有内容目前并不重要，但需要注意的是，`list()` 函数是 EM CLI 中最常用的函数之一，并且总是返回一个列表对象。该列表有\
  \ 29 个元素，可以逐个“弹出”并赋给另一个对象：\n\n```python\nemcli>mytargs = list(resource='Targets').out()['data']\n\
  emcli>type(mytargs)\n<type 'list'>\nemcli>len(mytargs)\n\nemcli>myshorttargs = mytargs.pop()\n\
  emcli>print(myshorttargs)\n{'TYPE_DISPLAY_NAME': 'Oracle WebLogic Server', 'TYPE_QUA...\n\
  ```\n\n`list()` EM CLI 函数的输出是一个目标信息的列表。\n\n# 字符串与列表\n\n本节将展示如何通过 Linux 的 `ps` 和\
  \ `grep` 命令，在 Linux 系统中完成查找正在运行的 Oracle 数据库监听器这一常见任务。示例的第一部分将展示如何生成进程信息。第二部分将展示如何使用各种\
  \ Linux 工具解析 `ps` 命令的输出，随后使用 Python 完成相同的任务。\n\n清单 6-1 展示了一个 Oracle 数据库监听器后台进程的详细列表。`ps\
  \ -ef` 命令列出服务器上所有正在运行的进程，这些进程通过管道传递给 `grep`，以将输出限制为仅监听器进程。\n\n## 清单 6-1. 在 Linux\
  \ 中查找 Oracle 数据库监听器进程\n\n```bash\n[oracle@server ]$ ps -ef | grep [t]nslsnr\noracle\
  \    1723     1  0 16:21 ?        00:00:01 \n/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
  \ LISTENER -inherit\n```\n\n`ps` 和 `grep` 的组合显示有一个监听器正在运行，并在输出的第八列显示了完整的命令。监听器命令实际上包含两个空格，因此对我们来说，该命令看起来跨越了第八、第九和第十个以空格分隔的列。`awk`\
  \ 命令可以很好地解析这些信息，如清单 6-2 所示。\n\n## 清单 6-2. 使用 `awk` 解析进程详细信息\n\n```bash\n[oracle@server\
  \ ]$ ps -ef | grep [t]nslsnr | awk '{print $8,$9,$10}'\n/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
  \ LISTENER -inherit\n```\n\n清单 6-3 展示了 Python 会将 `ps` 命令的输出视为由多个部分组成的对象。前一个示例中使用的分隔符是一个或多个空格。我们可以使用\
  \ Python 而不是 `awk` 来解析相同的命令。\n\n## 清单 6-3. 使用 Python 解析进程详细信息\n\n```python\n>>>\
  \ psout = 'oracle 1723  1  0 16:21 ? 00:00:01 /u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
  \ LISTENER -inherit'\n>>> type(psout)\n<type 'str'>\n>>> psoutlist = psout.split()\n\
  >>> type(psoutlist)\n<type 'list'>\n>>> psoutlist[7:]\n['/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr',\
  \ 'LISTENER', '-inherit']\n>>> ' '.join(psoutlist[7:])\n'/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr\
  \ LISTENER -inherit'\n>>> psoutstring = ' '.join(psoutlist[7:])\n>>> psoutstring\n\
  '/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr LISTENER -inherit'\n```\n\n\
  `psoutlist = psout.split()` 根据空白符分隔符将字符串拆分为一个由字符串元素组成的列表，并将其赋给 `psoutlist` 列表对象。`psoutlist[7:]`\
  \ 打印 `psoutlist` 列表对象从第八个（记住列表索引从 0 开始）到最后一个元素的子集。`psoutstring = ' '.join(psoutlist[7:])`\
  \ 将元素子集重新连接成一个以单个空格分隔的字符串，并将其赋给 `psoutstring` 字符串对象。真正让 Python 大放异彩的是，这一切都可以通过一条命令完成，如清单\
  \ 6-4 所示。\n\n## 清单 6-4. 将清单 6-3 中的命令合并为单条命令\n\n```python\n>>> ' '.join('oracle 1723\
  \ 1  0 16:21 ? 00:00:01 /u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr LISTENER\
  \ -inherit'.split()[7:])\n'/u01/app/oracle/product/12.1.0/dbhome_1/bin/tnslsnr LISTENER\
  \ -inherit'\n```\n\n清单 6-3 直接将 `ps` 命令的输出填充到 `psout` 变量中。捕获 `ps` 命令输出的过程也可以直接在 Python\
  \ 内部完成，如清单 6-3a 所示。\n\n## 清单 6-3a. 使用 Python subprocess 模块捕获 `ps` 命令输出\n\n```python\n\
  >>> import subprocess\n>>> mycommand = ['ps', '-ef']\n>>> psoutput = subprocess.Popen(mycommand,\
  \ stdout=subprocess.PIPE).communicate()[0].split('\\n')\n>>> for i in psoutput:\n\
  ...     if 'tnslsnr' in i:\n...         psout = i\n```\n\n列表是将字符串和数字分组在一起的有用方式，但有时需要更复杂的对象。有时单个元素的索引并不足够，我们需要一种将键和值组合在一起的方法。这在使用\
  \ EM CLI 时尤其如此，其中数组很常见且通常很复杂。这就是 Python 字典对象的用武之地。\n\n#### 字典\n\n在 Python 中，尤其是在\
  \ EM CLI 中，另一个同样重要的对象类型是“字典”。类似于 Java 的“哈希表”、Perl 的“哈希”对象和 PL/SQL 的“关联数组”，字典由键/值对的集合组成。换句话说，字典的每个元素将由一个键和一个值组成。然后可以通过指定其对应的键来提取该值。调用值的语法类似于在列表中调用值，但指定的是键而不是索引值。清单\
  \ 6-5 调用属于标记为 `'second'` 的键的值。\n\n## 清单 6-5. 通过指定所属键来从字典调用值\n\n```python\nemcli>mydic\
  \ = {'first': 'one', 'second': 'two', 'third': 'three', 'fourth': 'four', 'fifth':\
  \ 'five'}\nemcli>mydic['second']\n'two'\n```\n\n字典使用键而不是数字索引。JSON 在 Python 中表示为字典对象，因为\
  \ JSON 本质上就是一个高效的键/值对象。这在 EM CLI 中可以清楚地看到，如清单 6-6 所示。\n\n## 清单 6-6. 在 EM CLI 中使用\
  \ `list()` 函数展示 JSON 字典\n\n```python\nemcli>set_client_property('EMCLI_OUTPUT_TYPE',\
  \ 'JSON')\nemcli>list(resource='Targets').isJson()\nTrue\nemcli>type(list(resource='Targets').out())\n\
  <type 'dict'>\nemcli>list(resource='Targets').out()\n{'exceedsMaxRows': False, 'columnHeaders':\
  \ ['TARGET_NAM...\n```\n\n大多数 EM CLI 函数包含一个 `isJson` 函数，该函数返回一个布尔值结果，指示结果集是否为 JSON。此命令表明结果集将返回\
  \ JSON 而不是文本。\n\n默认情况下，EM CLI 的交互模式是文本模式。第一条命令更改了该行为，以便所有结果集都以 JSON 形式返回。\n\n\n\n\
  第四行调用了 `list` 函数的 `out` 子函数。这个 `out` 函数要么将调用它的函数的输出打印到屏幕，要么将其传递给另一个对象。在此例中，`list`\
  \ 函数正在返回有关 EM 目标的信息，而 `type` 函数告诉我们这个输出是以字典对象的形式返回的。\n\n第六行显示了实际输出的一个非常小的部分，表明它包含在花括号内。花括号表明这是一个字典。请注意，其中一个值是一个列表，而不是字符串。字典值可以是任何其他对象类型，包括另一个字典。\n\
  \n### 登录脚本\n\n使用 EM CLI 的交互模式或脚本模式时，必须在 EM CLI 和 OMS 之间建立连接。这是一个可重复的过程，因此最佳实践是准备一个脚本，在每次调用脚本或登录\
  \ EM CLI 交互模式时都能调用它。\n\n下面描述了登录脚本，并附有对各个部分的注释。完整的脚本在分析之后列出。\n\n首先需要导入 EM CLI 的类和函数：\n\
  \n```python\nfrom emcli import *\n```\n\n也可以直接导入：\n\n```python\nimport emcli\n```\n\
  \n但是，在这种情况下，每次调用 EM CLI 函数都需要加上模块名 `emcli` 作为限定符。\n\n下一步是确定要连接的 OMS：\n\n```python\n\
  set_client_property('EMCLI_OMS_URL', 'https://em12cr3.example.com:7802/em')\n```\n\
  \n接下来，需要指定一个有效的 SSL 证书文件以向 OMS 进行身份验证，或者指定信任任何呈现的证书：\n\n```python\nset_client_property('EMCLI_CERT_LOC',\
  \ '/path/to/cert.file')\n```\n\n或者\n\n```python\nset_client_property('EMCLI_TRUSTALL',\
  \ 'true')\n```\n\n可选地，你可以指定命令返回的格式：“JSON” 或 “TEXT”。除非有特定的文本输出需求，否则 JSON 是最通用且易于操作的格式。然而，它也更难阅读：\n\
  \n```python\nset_client_property('EMCLI_OUTPUT_TYPE', 'JSON')\n```\n\n或者\n\n```python\n\
  set_client_property('EMCLI_OUTPUT_TYPE', 'TEXT')\n```\n\n最后，指定要以哪个用户身份登录，并可选地提供该用户的密码。如果未指定密码，系统将提示你输入：\n\
  \n```python\nprint(login(username='sysman', password='foobar'))\n```\n\n完整的脚本如清单\
  \ 6-7 所示。\n\n清单 6-7. `start.py` 登录脚本\n\n```python\nfrom emcli import *\nset_client_property('EMCLI_OMS_URL',\
  \ 'https://em12cr3.example.com:7802/em')\nset_client_property('EMCLI_TRUSTALL',\
  \ 'true')\nset_client_property('EMCLI_OUTPUT_TYPE', 'JSON')\nprint(login(username='sysman',\
  \ password='foobar'))\n```\n\n尽管可以从包含登录脚本的同一目录启动 EM CLI，但如果该目录不在 Jython 的搜索路径中，Jython\
  \ 将无法看到它。清单 6-8 显示了如果你尝试导入的 `start.py` 文件不在 Jython 搜索路径中时会收到的错误消息。\n\n清单 6-8. `start.py`\
  \ 不在 Jython 搜索路径中\n\n```\nemcli>import start\nTraceback (most recent call last):\n\
  \  File \"<stdin>\", line 1, in <module>\nImportError: No module named start\n```\n\
  \n`JYTHONPATH` 环境变量告诉 Jython 在哪些附加目录中搜索要导入的模块。在执行 `emcli` 之前设置此变量。在清单 6-9 中，`start`\
  \ 模块现在可以成功导入，无论是直接从交互模式命令行还是在脚本模式的脚本中。\n\n清单 6-9. 成功执行 `start.py` 脚本\n\n```\n[oracle@server\
  \ ]$ export JYTHONPATH=/home/oracle/scripts\n[oracle@server ]$ emcli\nemcli>import\
  \ start\nLogin successful\n```\n\n如果你不习惯在脚本中包含密码（你确实不应该），并且只为登录函数指定 `username` 参数，系统将提示你输入密码：\n\
  \n```\nEnter password :  **********\n```\n\n清单 6-10 展示了一种替代的身份验证方法，它既能保证密码不包含在脚本中的安全性，又不需要每次调用脚本时都输入密码。此示例中的密码将包含在\
  \ `.secret` 文件中，该文件的权限应设置为仅允许调用 EM CLI 的操作系统用户读取。\n\n清单 6-10. 使用从外部文件读取密码的 `start.py`\
  \ 登录脚本\n\n```python\nfrom emcli import *\nset_client_property('EMCLI_OMS_URL', 'https://em12cr3.example.com:7802/em')\n\
  set_client_property('EMCLI_TRUSTALL', 'true')\nset_client_property('EMCLI_OUTPUT_TYPE',\
  \ 'JSON')\nf = open('/home/oracle/.secret','r')\npwd = f.read()\nprint(login(username='sysman',\
  \ password=pwd))\n```\n\n每次在脚本模式或交互模式下调用 EM CLI 时，都需要执行 `start.py` 脚本中包含的步骤，这就是为什么将登录过程编写为脚本很重要。任何直接调用的脚本都应在执行任何其他操作之前调用\
  \ `import start` 命令。\n\n## 使用 EM CLI 的 Python 脚本设置目标属性\n\nEM CLI 包含一个用于更改目标属性的函数。如果需要更新少量目标的属性，只需为每个目标执行\
  \ `set_target_property_value()` 函数即可。当需要更新数十甚至数百个目标的属性时，为每个目标执行该函数效率低下。幸运的是，使用 EM\
  \ CLI，我们可以利用 Python 的完整脚本功能。\n\n可以使用 `for` 循环遍历任何对象，并对这些对象的每个部分执行任何任务。例如，在添加目标后添加或更新目标属性是很常见的。在\
  \ GUI 中为多个目标（超过几个）更改目标属性的任何任务都是繁琐且耗时的。在 EM CLI 中有不止一种方法可以完成此任务，但所有这些方法都比 GUI 提供的方法更简单、更高效。\n\
  \n出于演示目的，我们将使用交互模式，但所有这些命令在脚本模式下同样有效：\n\n```\nemcli>import start\nEnter password\
  \ :  **********\nLogin successful\n```\n\n创建一个包含所有目标的对象。暂时不用担心过滤掉目标。这部分将在脚本的后面完成：\n\
  \n```\nemcli>myobj = get_targets().out()['data']\nemcli>len(myobj)\n```\n\n在此例中，我知道我的仓库中有\
  \ `29` 个目标。我们想要将刚添加的、前缀为 `TEST_` 的目标的 `Lifecycle Status` 和 `Location` 属性分别更新为 `Development`\
  \ 和 `COLO`。由于我们将来可能需要添加或更改此属性列表，因此我们将把这些作为键和值放入一个字典中：\n\n```\nemcli>myprops = {'LifeCycle\
  \ Status':'Development', 'Location':'COLO'}\n```\n\n我们希望确保为此更新选择了正确的目标，因此我们将使用正则表达式来筛选目标名称。在\
  \ Jython 中使用正则表达式需要我们导入另一个模块：\n\n```\nemcli>import re\n```\n\n现在我们可以创建用于筛选目标名称的正则表达式。此筛选器将应用于每个目标名称，以确定是否将目标属性应用于该目标：\n\
  \n```\nemcli>filtermatch = '^TEST_'\nemcli>myreg = re.compile(filtermatch)\n```\n\
  \n\n\n创建一个 `for` 循环来遍历这些目标。在编写此类程序时，最好写一点代码就进行测试，尤其是在刚开始的时候。一旦循环创建完成，我们将运行一个简单的\
  \ `print` 命令，以确保我们正在遍历正确的信息。\n\n请确保示例中以三个点（...）开头的行已正确缩进。在 Python 中，一个缩进级别代表四个空格：\n\
  \n```python\nemcli>for targ in myobj:\n...    print(targ['Target Name'])\n```\n\n\
  这显示我们能够看到存储库中的所有目标名称。现在我们可以应用过滤器，以便只查看以 `TEST_` 开头的目标：\n\n```python\nemcli>for targ\
  \ in myobj:\n...    if myreg.search(targ['Target Name']):\n...        print(targ['Target\
  \ Name'] + \\\n...              '  -  ' + targ['Target Type'])\n```\n\n现在，我们只看到了想要修改的目标。让我们添加命令来更改属性。但是，为了不盲目地运行命令，我们将只打印循环本应执行的命令，以确保这些命令是我们想要的，而不会实际影响目标：\n\
  \n```python\nemcli>for targ in myobj:\n...    if myreg.search(targ['Target Name']):\n\
  ...        mycommand = 'set_target_property_value(' + \\\n...                  \
  \  'property_records=\"' + \\\n...                    targ['Target Name'] + ':'\
  \ + \\\n...                    targ['Target Type'] + \\\n...                   \
  \ ':LifeCycle Status:Development\")'\n...        print(mycommand)\nset_target_property_value(property_records=\"\
  TEST_em12cr3.example.com:host:LifeCycle \nStatus:Development\")\nset_target_property_value(property_records=\"\
  TEST_em12cr3.example.com:3872:oracle_emd:LifeCycle \nStatus:Development\")\n```\n\
  \n`set_target_property_value()` 函数命令被打印到屏幕上。然后可以将这些命令复制并粘贴到同一个 EM CLI 会话中执行：\n\n\
  ```bash\nemcli>set_target_property_value(property_records=\"TEST_em12cr3.example.com:host:LifeCycle\
  \ \nStatus:Development\")\nProperties updated successfully\n```\n\n然而，如果我们尝试为代理目标运行该命令，会立即出现一个问题：\n\
  \n```bash\nemcli>set_target_property_value(property_records=\"TEST_em12cr3.example.com:3872:oracle_emd:LifeCycle\
  \ \nStatus:Development\")\nSyntax Error: Invalid value for parameter \"INVALID_RECORD_ERR\"\
  : \n\"em12cr3.example.com:3872:oracle_emd:LifeCycle Status:Development\"\n```\n\n\
  目标名称 `TEST_em12cr3.example.com:3872` 包含默认分隔符冒号字符，这意味着我们需要在 `set_target_property_value()`\
  \ 函数中包含另一个参数来更改分隔符。`subseparator` 参数会将分隔 `property_records` 参数不同部分的字符从冒号更改为 `@`\
  \ 符号。请注意新增的 `mysubsep` 和 `myproprecs` 变量：\n\n```python\nemcli>for targ in myobj:\n\
  ...    if myreg.search(targ['Target Name']):\n...        mysubsep = 'property_records=@'\n\
  ...        myproprecs = targ['Target Name'] + \\\n...                     '@' +\
  \ targ['Target Type'] + \\\n...                     '@LifeCycle Status@Development'\n\
  ...        mycommand = 'set_target_property_value(' + \\\n...                  \
  \  'subseparator=\"' + \\\n...                    mysubsep + '\", property_records=\"\
  ' + \\\n...                    myproprecs + '\")'\n...        print(mycommand)\n\
  set_target_property_value(subseparator=\"property_records=@\", property_records=\"\
  \ TEST_em12cr3.\n                                        example.com@host@LifeCycle\
  \ Status@Development\")\nset_target_property_value(subseparator=\"property_records=@\"\
  , property_records=\" TEST_em12cr3.\n                                        example.com:3872@oracle_emd@LifeCycle\
  \ Status@Development\")\n```\n\n命令再次被打印到屏幕上。`TEST_em12cr3.example.com` 目标的属性已经更新过了，因此只需要复制并粘贴用于更改\
  \ `TEST_em12cr3.example.com:3872` 目标的命令：\n\n```bash\nemcli>set_target_property_value(subseparator=\"\
  property_records=@\", property_records=\"TEST_em12cr3.example.com:3872@oracle_emd@LifeCycle\
  \ Status@Development\")\nProperties updated successfully\n```\n\n我们刚刚查看的示例将属性**硬编码**了。如果属性永不改变，这没问题，但在这个练习的开始，我们创建了\
  \ `myprops` 字典，以便我们可以轻松更改属性键和值：\n\n```python\nemcli>myprops = {'LifeCycle Status':'Development',\
  \ 'Location':'COLO'}\n```\n\n现在让我们修改刚刚编写的代码，以利用这个变量。我们将继续使用代码中包含的调试模式，将命令打印到屏幕上，然后在现有的\
  \ `for` 循环内添加一个嵌套的 `for` 循环；我们将遍历 `myprops` 字典的条目。这里还有一个额外的更改，即添加了 `mydelim` 变量。到现在你应该注意到一个模式了；你参数化的越多，你的代码就越容易阅读、更改、排除故障等。现在，如果我们决定将\
  \ `subseparator` 从 `@` 符号更改为其他符号，我们只需在一个地方更改，而不是四个地方：\n\n```python\nemcli>for targ\
  \ in myobj:\n...    if myreg.search(targ['Target Name']):\n...        mydelim =\
  \ '@'\n...        mysubsep = 'property_records=' + mydelim\n...        myproprecs\
  \ = targ['Target Name'] + \\\n...                     mydelim + targ['Target Type']\
  \ + mydelim\n...        for propkey, propvalue in myprops.items():\n...        \
  \    myproprecprops = propkey + mydelim + propvalue\n...            mycommand =\
  \ 'set_target_property_value(' + \\\n...                        'subseparator=\"\
  ' + \\\n...                        mysubsep + '\", property_records=\"' + \\\n...\
  \                        myproprecs + \\\n...                        myproprecprops\
  \ + '\")'\n...            print(mycommand)\n```\n\n这些命令非常适合复制和粘贴，但我们希望进一步自动化，跳过复制粘贴步骤，让命令在代码中自动运行。然而，当以后出现问题时，我们不想失去再次查看这个详细输出的能力，因此我们将保留调试功能，并补充一个选择功能，让我们决定是想看到命令打印到屏幕上，还是让脚本自动运行它们。\n\
  \n在脚本开头添加一个 `debug` 变量，并在脚本内检查该变量的值，是启用或禁用“测试”模式的简单方法。默认情况下，`debug` 变量为假（false），除非为其赋值，在这种情况下它变为真（true）：\n\
  \n```python\nemcli>debug = ''\nemcli>if debug:\n...     print('True')\n... else:\n\
  ...     print('False')\n...\nFalse\nemcli>debug = 'Yes'\nemcli>if debug:\n...  \
  \   print('True')\n... else:\n...     print('False')\n...\nTrue\n```\n\n现在我们可以将这个逻辑添加到脚本中，并用它来决定我们是在调试脚本还是正常执行它。在正常执行模式下，还有一行输出用于打印有关命令正在做什么的一些基本信息：\n\
  \n\n\nemcli>debug = ''\nemcli>for targ in myobj:\n...     if myreg.search(targ['Target\
  \ Name']):\n...        mydelim = '@'\n...        mysubsep = 'property_records='\
  \ + mydelim\n...        myproprecs = targ['Target Name'] + mydelim + \\\n...   \
  \                  targ['Target Type'] + mydelim\n...        for propkey, propvalue\
  \ in myprops.items():\n...            myproprecprops = propkey + mydelim + propvalue\n\
  ...            if debug:\n...                mycommand = 'set_target_property_value('\
  \ + \\\n...                            'subseparator=\"' + mysubsep + \\\n...  \
  \                          '\", property_records=\"' + \\\n...                 \
  \           myproprecs + \\\n...                            myproprecprops + '\"\
  )'\n...                print(mycommand)\n...            else:\n...             \
  \   print('Target: ' + targ['Target Name'] + \\\n...                      ' (' +\
  \ targ['Target Type'] + \\\n...                      ')\\n\\tProperty: ' + propkey\
  \ + \\\n...                      '\\n\\tValue:    ' + propvalue)\n...          \
  \      set_target_property_value(\n...                subseparator=mysubsep,\n...\
  \                property_records=myproprecs + myproprecprops)\n...\nTarget: TEST_em12cr3.example.com\
  \ (host)\n        Property: Location\n        Value:    COLO\nProperties updated\
  \ successfully\n\nTarget: TEST_em12cr3.example.com (host)\n        Property: LifeCycle\
  \ Status\n        Value:    Development\nProperties updated successfully\n\n这个函数让事情变得相当简单，我们可以轻松地更改属性或目标列表筛选器。使用\
  \ `debug` 变量，我们可以打印出命令而不是执行它们。然而，我们可以通过将所有这些命令移动到一个类中来进一步简化更新目标属性的过程。此外，我们将添加更多功能以使其更加健壮且更不易出错。\n\
  \n## 使用 EM CLI 设置目标属性的 Python 类\n\n创建一个 Python “类” 允许我们将代码“打包”成一个单一的单元，其中属于该类的所有代码都知晓并可以使用该类中的所有其他代码。从一个类中，可以创建一个“实例”。实例在\
  \ Python 中是一个对象，对该实例任何部分的更改在其整个生命周期内都是持久有效的。清单 6-11 展示了 `updateProps.py` 脚本的完整文本，其中包含了\
  \ `updateProps()` 类。为获得最佳效果，请在文件系统上创建一个名为 `updateProps.py` 的文件，并将代码的完整文本粘贴进去：\n\n\
  清单 6-11. `update Props.py` 创建了 `updateProps( )` 类\n\nimport emcli\nimport re\nimport\
  \ operator\n\nclass updateProps():\n    def __init__(self, agentfilter='.*', typefilter='.*',\n\
  \                 namefilter='.*', propdict={}):\n        self.targs = []\n    \
  \    self.reloadtargs = True\n        self.props(propdict)\n        self.__loadtargobjects()\n\
  \        self.filt(agentfilter=agentfilter, typefilter=typefilter,\n           \
  \       namefilter=namefilter)\n    def __loadtargobjects(self):\n        if self.reloadtargs\
  \ == True:\n            self.reloadtargs = False\n            self.fulltargs = \\\
  \n              emcli.list(resource='Targets').out()['data']\n            self.targprops\
  \ = \\\n              emcli.list(resource='TargetProperties'\n                 \
  \       ).out()['data']\n    def props(self, propdict):\n        assert isinstance(propdict,\
  \ dict), \\\n               'propdict parameter must be ' + \\\n               'a\
  \ dictionary of ' + \\\n              '{\"property_name\":\"property_value\"}'\n\
  \        self.propdict = propdict\n    def filt(self, agentfilter='.*', typefilter='.*',\n\
  \             namefilter='.*',\n             sort=('TARGET_TYPE','TARGET_NAME'),\
  \ show=False):\n        self.targs = []\n        __agentcompfilt = re.compile(agentfilter)\n\
  \        __typecompfilt = re.compile(typefilter)\n        __namecompfilt = re.compile(namefilter)\n\
  \        self.__loadtargobjects()\n        for __inttarg in self.fulltargs:\n  \
  \          if __typecompfilt.search(__inttarg['TARGET_TYPE']) \\\n             \
  \  and __namecompfilt.search(\n                   __inttarg['TARGET_NAME']) \\\n\
  \               and (__inttarg['EMD_URL'] == None or \\\n               __agentcompfilt.search(__inttarg['EMD_URL'])):\n\
  \                self.targs.append(__inttarg)\n        __myoperator = operator\n\
  \        for __myop in sort:\n            __myoperator = operator.itemgetter(__myop)\n\
  \        self.targssort = sorted(self.targs, key=__myoperator)\n        if show\
  \ == True:\n            self.show()\n    def show(self):\n        print('%-5s%-40s%s'\
  \ % (\n              ' ', 'TARGET_TYPE'.ljust(40, '.'),\n              'TARGET_NAME'))\n\
  \        print('%-15s%-30s%s\\n%s\\n' % (\n              ' ', 'PROPERTY_NAME'.ljust(30,\
  \ '.'),\n              'PROPERTY_VALUE', '=' * 80))\n        for __inttarg in self.targssort:\n\
  \            print('%-5s%-40s%s' % (\n                  ' ', __inttarg['TARGET_TYPE'].ljust(40,\
  \ '.'),\n                  __inttarg['TARGET_NAME']))\n            self.__showprops(__inttarg['TARGET_GUID'])\n\
  \            print('')\n    def __showprops(self, guid):\n        self.__loadtargobjects()\n\
  \        for __inttargprops in self.targprops:\n            __intpropname = \\\n\
  \              __inttargprops['PROPERTY_NAME'].split('_')\n            if __inttargprops['TARGET_GUID']\
  \ == guid and \\\n               __intpropname[0:2] == ['orcl', 'gtp']:\n      \
  \          print('%-15s%-30s%s' %\n                      (' ', ' '.join(__intpropname[2:]).ljust(\n\
  \                       30, '.'),\n                       __inttargprops['PROPERTY_VALUE']))\n\
  \    def setprops(self, show=False):\n        assert len(self.propdict) > 0, \\\n\
  \               'The propdict parameter must contain ' + \\\n               'at\
  \ least one property. Use the ' + \\\n               'props() function to modify.'\n\
  \        self.reloadtargs = True\n        __delim = '@#&@#&&'\n        __subseparator\
  \ = 'property_records=' + __delim\n        for __inttarg in self.targs:\n      \
  \      for __propkey, __propvalue \\\n                in self.propdict.items():\n\
  \                __property_records = __inttarg['TARGET_NAME'] + \\\n          \
  \        __delim + __inttarg['TARGET_TYPE'] + \\\n                  __delim + __propkey\
  \ + __delim + __propvalue\n                print('Target: ' + __inttarg['TARGET_NAME']\
  \ +\n                      ' (' + __inttarg['TARGET_TYPE'] +\n                 \
  \     ')\\n\\tProperty: '\n                      + __propkey + '\\n\\tValue: ' +\n\
  \                      __propvalue + '\\n')\n                emcli.set_target_property_value(\n\
  \                  subseparator=__subseparator,\n                  property_records=__property_records)\n\
  \        if show == True:\n            self.show()\n\n\n## 使用 updateProps 类更新目标属性\n\
  \n一旦有了包含代码的文件，我们就可以使用此代码来更新企业管理器目标的属性。启动一个 EM CLI 会话并登录到 OMS。\n\n### 使用 updateProps()\
  \ 类\n\nListing 6-12 展示了如何使用 `updateProps()` 类来更新一些 EM CLI 目标的属性。该类所做的事情与上一节中的命令完全相同，但你会注意到所需的代码量要少得多。\n\
  \n**Listing 6-12**：导入并使用 **updateProps()** 类来更改目标属性\n\n```\nemcli>import updateProps\n\
  emcli>myinst = updateProps.updateProps()\nemcli>myinst.props({'LifeCycle Status':'Development'})\n\
  emcli>myinst.filt(namefilter='^em12cr3.example.com$', typefilter='host')\nemcli>myinst.show()\n\
  \     TARGET_TYPE.............................TARGET_NAME\n               PROPERTY_NAME.................PROPERTY_VALUE\n\
  ================================================================================\n\
  \nhost....................................em12cr3.example.com\n               target\
  \ version................6.4.0.0.0\n               os............................Linux\n\
  \               platform......................x86_64\n\nemcli>myinst.setprops(show=True)\n\
  Target: em12cr3.example.com (host)\n        Property: LifeCycle Status\n       \
  \ Value: Development\n\nTARGET_TYPE.............................TARGET_NAME\n  \
  \             PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
  \nhost....................................em12cr3.example.com\n               target\
  \ version................6.4.0.0.0\n               os............................Linux\n\
  \               platform......................x86_64\n               lifecycle status..............Development\n\
  ```\n\nListing 6-12 中的示例仅更新了一个目标的一个属性。`updateProps()` 类能够为任意数量的目标更新任意数量的属性。Listing\
  \ 6-13 扩展了之前的示例，更新了同一个目标的更多属性。\n\n**Listing 6-13**：扩展要更新的属性\n\n```\nemcli>myinst.props({'LifeCycle\
  \ Status':'Development', 'Location':'COLO', 'Comment':'Test EM'})\nemcli>myinst.setprops(show=True)\n\
  Target: em12cr3.example.com (host)\n        Property: Location\n        Value: COLO\n\
  \nTarget: em12cr3.example.com (host)\n        Property: LifeCycle Status\n     \
  \   Value: Development\n\nTarget: em12cr3.example.com (host)\n        Property:\
  \ Comment\n        Value: Test EM\n\nTARGET_TYPE.............................TARGET_NAME\n\
  \               PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
  \nhost....................................em12cr3.example.com\n               target\
  \ version................6.4.0.0.0\n               os............................Linux\n\
  \               platform......................x86_64\n               location......................COLO\n\
  \               comment.......................Test EM\n               lifecycle\
  \ status..............Development\n```\n\n我们没有更改目标过滤器。我们对 `myinst` 实例所做的唯一更改是要更新的属性。`myinst.props()`\
  \ 函数更改了要应用于目标的属性。输出显示，同一个目标的三个不同属性被更新了。\n\n假设我们希望将相同的三个属性应用于更多目标，但我们只想将它们应用于企业管理器\
  \ OMS 服务器的主机和代理目标。我们将保持属性不变，但会更新目标过滤器以包含额外的目标类型 `oracle_emd`，如 Listing 6-14 所示。\n\
  \n**Listing 6-14**：更改目标类型以包含代理目标\n\n```\nemcli>myinst.filt(namefilter='^em12cr3.example.com.*$',\
  \ typefilter='host|oracle_emd')\nemcli>myinst.show()\n     TARGET_TYPE.............................TARGET_NAME\n\
  \               PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
  \nhost....................................em12cr3.example.com\n               target\
  \ version................6.4.0.0.0\n               os............................Linux\n\
  \               platform......................x86_64\n               location......................COLO\n\
  \               comment.......................Test EM\n               lifecycle\
  \ status..............Development\n\noracle_emd..............................em12cr3.example.com:3872\n\
  \               os............................Linux\n               platform......................x86_64\n\
  \               target version................12.1.0.3.0\nemcli>myinst.setprops(show=True)\n\
  Target: em12cr3.example.com (host)\n        Property: Location\n        Value: COLO\n\
  \nTarget: em12cr3.example.com (host)\n        Property: LifeCycle Status\n     \
  \   Value: Development\n\nTarget: em12cr3.example.com (host)\n        Property:\
  \ Comment\n        Value: Test EM\n\nTarget: em12cr3.example.com:3872 (oracle_emd)\n\
  \        Property: Location\n        Value: COLO\n\nTarget: em12cr3.example.com:3872\
  \ (oracle_emd)\n        Property: LifeCycle Status\n        Value: Development\n\
  \nTarget: em12cr3.example.com:3872 (oracle_emd)\n        Property: Comment\n   \
  \     Value: Test EM\n\nTARGET_TYPE.............................TARGET_NAME\n  \
  \             PROPERTY_NAME.................PROPERTY_VALUE\n================================================================================\n\
  \nhost....................................em12cr3.example.com\n               target\
  \ version................6.4.0.0.0\n               os............................Linux\n\
  \               platform......................x86_64\n               location......................COLO\n\
  \               comment.......................Test EM\n               lifecycle\
  \ status..............Development\n\noracle_emd..............................em12cr3.example.com:3872\n\
  \               os............................Linux\n               platform......................x86_64\n\
  \               lifecycle status..............Development\n               location......................COLO\n\
  \               comment.......................Test EM\n               target version................12.1.0.3.0\n\
  ```\n\n`updateProps()` 的功能非常广泛，可以如你所愿地精细或宽泛。关于如何使用它的更详细描述可以在第 8 章中找到。充分利用 `updateProps()`\
  \ 类的最佳方式是理解代码本身。\n\n### 理解代码\n\n现在我们已经看到了代码本身及其工作原理概述，我们将分析代码以了解幕后发生的事情。理解代码不仅有助于你利用其所有功能，还能让你根据自己的喜好和需求对其进行定制。\n\
  \n首先要注意的是，类声明之后的所有内容都至少缩进四个空格。这意味着类声明之后的所有代码都是类的一部分。类内部是函数声明，每个函数下方是属于该函数的代码。让我们将其分解成更小的部分，以便准确理解代码在做什么以及为什么使用类提供了显著的优势。\n\
  \n\n#### `__init__()` 函数\n\n清单 6-15 中展示的第一个函数名为 `__init__()`。这是一个保留的函数名，在类被调用时会自动执行。`self`\
  \ 这个词是对从类创建的实例的引用。当实例变量或对象（以 `self.` 开头）被创建时，它是一个被分配给该实例并在该实例的生命周期内存在的变量或对象。当 `myinst`\
  \ 实例从 `updateProps()` 创建时，列表对象 `targs` 和布尔变量 `reloadtargs` 也随之被创建。在大多数情况下，实例变量和对象可以被视为实例的一部分。\n\
  \n清单 6-15. `__init__()` 是 `updateProps()` 类的初始化函数\n\n```python\ndef __init__(self,\
  \ agentfilter='.*', typefilter='.*',\n             namefilter='.*', propdict={}):\n\
  \    self.targs = []\n    self.reloadtargs = True\n    self.props(propdict)\n  \
  \  self.__loadtargobjects()\n    self.filt(agentfilter=agentfilter, typefilter=typefilter,\n\
  \              namefilter=namefilter)\n```\n\n在清单 6-16 中，我们通过创建类的实例（执行类）并将该执行结果赋值给一个变量，来创建\
  \ `updateProps()` 类的一个实例对象。然后，我们可以打印出 `reloadtargs` 实例变量。请注意，没有括号的词是 `class`，而带括号的同一个词是一个实例。\n\
  \n清单 6-16. 从类创建一个实例\n\n```python\nemcli>import updateProps\nemcli>myinst = updateProps.updateProps()\n\
  emcli>print(myinst.reloadtargs)\nFalse\nemcli>type(updateProps.updateProps)\n<type\
  \ 'classobj'>\nemcli>type(updateProps.updateProps())\n<type 'instance'>\nemcli>type(myinst)\n\
  <type 'instance'>\n```\n\n`__init__` 函数的最后四行调用了 `props`、`__loadtargobjects` 和 `filt`\
  \ 函数。`props` 函数用于设置属性键和值，`__loadtargobjects` 函数用于缓存目标信息，而 `filt` 函数允许我们过滤分配给该实例的目标。这些函数都在类中进一步定义。创建实例会在处理命令之前解析整个类，因此类内函数的顺序并不重要。\n\
  \n#### `__loadtargobjects()` 函数\n\n查询目标信息是一个相当耗时的过程，可能需要一到二十秒的时间来运行。如清单 6-17 所示，`__loadtargobjects`\
  \ 函数是一个性能调优函数，它使类的执行更高效。它仅通过被 `__init__` 函数调用，在创建实例时查询和加载目标信息，并且仅当 `self.reloadtargs`\
  \ 设置为 `True` 时才这样做。\n\n清单 6-17. `updateProps()` 类的 `__loadtargobjects()` 在必要时重新加载\
  \ EM 目标\n\n```python\ndef __loadtargobjects(self):\n    if self.reloadtargs == True:\n\
  \        self.reloadtargs = False\n        self.fulltargs = \\\n          emcli.list(resource='Targets').out()['data']\n\
  \        self.targprops = \\\n          emcli.list(resource='TargetProperties'\n\
  \                    ).out()['data']\n```\n\n#### `props()` 函数\n\n清单 6-18 中展示的 `props()`\
  \ 函数设置或修改 `propdict` 变量，该变量保存着用于设置目标属性的键值字典。这被转换为一个函数，而不是直接设置参数，主要是因为它可以被多次调用，并且包含了用于错误检查的\
  \ `assert` 语句。\n\n清单 6-18. `updateProps()` 类的 `props()` 函数更新 `propdict` 属性字典\n\n\
  ```python\ndef props(self, propdict):\n    assert isinstance(propdict, dict), \\\
  \n           'propdict parameter must be ' + \\\n           'a dictionary of ' +\
  \ \\\n           '{\"property_name\":\"property_value\"}'\n    self.propdict = propdict\n\
  ```\n\n#### `filt()` 函数\n\n清单 6-19 展示了 `filt()` 函数，它定义了将为此实例应用已定义属性的目标范围。即使在过滤器应用之后，也可以对其进行查询或更改。前三个参数（`agentfilter`、`typefilter`\
  \ 和 `namefilter`）被编译为正则表达式，以便为此实例包含或排除目标。如果在调用 `filt()` 函数时未定义这些参数，则它们被隐式定义为包含所有目标。`sort`\
  \ 参数定义了如何对过滤后的目标进行排序，最后，`show` 参数决定了是否将过滤后的目标列表输出打印到屏幕。\n\n清单 6-19. `updateProps()`\
  \ 类的 `filt()` 函数创建并管理过滤后的目标列表\n\n```python\ndef filt(self, agentfilter='.*', typefilter='.*',\n\
  \         namefilter='.*',\n         sort=('TARGET_TYPE','TARGET_NAME'), show=False):\n\
  \    self.targs = []\n    __agentcompfilt = re.compile(agentfilter)\n    __typecompfilt\
  \ = re.compile(typefilter)\n    __namecompfilt = re.compile(namefilter)\n    self.__loadtargobjects()\n\
  \    for __inttarg in self.fulltargs:\n        if __typecompfilt.search(__inttarg['TARGET_TYPE'])\
  \ \\\n           and __namecompfilt.search(\n               __inttarg['TARGET_NAME'])\
  \ \\\n           and (__inttarg['EMD_URL'] == None or \\\n           __agentcompfilt.search(__inttarg['EMD_URL'])):\n\
  \            self.targs.append(__inttarg)\n    __myoperator = operator\n    for\
  \ __myop in sort:\n        __myoperator = operator.itemgetter(__myop)\n    self.targssort\
  \ = sorted(self.targs, key=__myoperator)\n    if show == True:\n        self.show()\n\
  ```\n\n`self.targs = []` 定义或清空一个列表用于存储过滤后的目标。接下来的三行为前三个过滤参数编译正则表达式。`self.__loadtargobjects()`\
  \ 调用 `__loadtargobjects()` 函数重新加载完整的目标列表。`for __inttarg in self.fulltargs:` 循环及其嵌套的\
  \ `if` 语句根据过滤参数创建过滤后的目标列表。`__myoperator = operator` 及其后的三行定义了排序键并对过滤后的目标列表进行排序。最后，可以将过滤并排序后的列表打印到屏幕。\n\
  \n除非为 `myinst` 实例定义的目标属性应应用于所有目标，否则需要调用 `filt` 函数。当实例创建时，目标列表也随之创建，并包含 Enterprise\
  \ Manager 中定义的所有目标。`targs` 实例列表对象显示了当前为该实例定义的目标数量，如清单 6-20 所示。\n\n清单 6-20. 当创建 `updateProps()`\
  \ 的实例时，它包含所有目标\n\n```python\nemcli>len(myinst.targs)\n\n```\n\n如果修改此实例的过滤列表，`targs`\
  \ 对象的长度将反映此变化，如清单 6-21 所示。\n\n清单 6-21. 使用 `filt()` 函数精简实例目标\n\n```python\nemcli>myinst.filt(namefilter='^orcl.*\\\
  .example\\.com')\nemcli>len(myinst.targs)\n\n```\n\n目标列表的过滤也可以在实例创建期间进行，如清单 6-22\
  \ 所示。\n\n清单 6-22. 在实例创建过程中精简实例目标\n\n```python\nemcli>myinst = updateProps.updateProps(namefilter='^orcl.*\\\
  .example\\.com')\nemcli>len(myinst.targs)\n\n```\n\n\n\n我们可能不会在首先了解目标名称及其当前定义属性之前，就贸然更改目标属性。清单\
  \ 6-23 中的 `show()` 函数允许我们查看这些信息，并以一种比 JSON 或 Python 字典更易读的格式进行打印。\n\n清单 6-23。`updateProps()`\
  \ 类的 `show()` 函数可预览实例目标列表及其当前已分配的属性\n\n```\ndef show(self):\n    print('%-5s%-40s%s'\
  \ % (\n          ' ', 'TARGET_TYPE'.ljust(40, '.'),\n          'TARGET_NAME'))\n\
  \    print('%-15s%-30s%s\\n%s\\n' % (\n          ' ', 'PROPERTY_NAME'.ljust(30,\
  \ '.'),\n          'PROPERTY_VALUE', '=' * 80))\n    for __inttarg in self.targssort:\n\
  \        print('%-5s%-40s%s' % (\n              ' ', __inttarg['TARGET_TYPE'].ljust(40,\
  \ '.'),\n              __inttarg['TARGET_NAME']))\n        self.__showprops(__inttarg['TARGET_GUID'])\n\
  \        print('')\n```\n\n清单 6-24 中展示的 `__showprops()` 函数从 `show()` 函数中以递归方式调用，以检索为目标定义的每个属性。换句话说，`__showprops()`\
  \ 函数为实例定义的每个目标调用一次，而为目标定义的属性则作为子记录与其一起存储。\n\n清单 6-24。调用 `updateProps()` 类的 `__showprops()`\
  \ 函数以检索实例中定义的每个目标的属性\n\n```\ndef __showprops(self, guid):\n    self.__loadtargobjects()\n\
  \    for __inttargprops in self.targprops:\n        __intpropname = \\\n       \
  \   __inttargprops['PROPERTY_NAME'].split('_')\n        if __inttargprops['TARGET_GUID']\
  \ == guid and \\\n           __intpropname[0:2] == ['orcl', 'gtp']:\n          \
  \  print('%-15s%-30s%s' %\n                  (' ', ' '.join(__intpropname[2:]).ljust(\n\
  \                   30, '.'),\n                   __inttargprops['PROPERTY_VALUE']))\n\
  ```\n\n最后，清单 6-25 展示了 `setprops()` 函数，调用此函数来实现神奇的效果。在调用此函数时，过滤后的目标列表已经定义完成，并且 `propdict`\
  \ 字典变量也已填充了将为过滤后目标列表设置的属性名称-值对。\n\n清单 6-25。调用 `updateProps()` 类的 `setprops()` 函数以应用属性更新\n\
  \n```\ndef setprops(self, show=False):\n    assert len(self.propdict) > 0, \\\n\
  \           'The propdict parameter must contain ' + \\\n           'at least one\
  \ property. Use the ' + \\\n           'props() function to modify.'\n    self.reloadtargs\
  \ = True\n    __delim = '@#&@#&&'\n    __subseparator = 'property_records=' + __delim\n\
  \    for __inttarg in self.targs:\n        for __propkey, __propvalue \\\n     \
  \       in self.propdict.items():\n            __property_records = __inttarg['TARGET_NAME']\
  \ + \\\n              __delim + __inttarg['TARGET_TYPE'] + \\\n              __delim\
  \ + __propkey + __delim + __propvalue\n            print('Target: ' + __inttarg['TARGET_NAME']\
  \ +\n                  ' (' + __inttarg['TARGET_TYPE'] +\n                  ')\\\
  n\\tProperty: '\n                  + __propkey + '\\n\\tValue: ' +\n           \
  \       __propvalue + '\\n')\n            emcli.set_target_property_value(\n   \
  \           subseparator=__subseparator,\n              property_records=__property_records)\n\
  \    if show == True:\n        self.show()\n```\n\n`assert` 语句执行一些错误检查，以确保 `propdict`\
  \ 变量中至少有一个要设置到目标列表上的属性名称-值对。`self.reloadtargs = True` 通知实例，在设置新的目标属性后，应从数据库中重新查询目标和属性信息。`__delim\
  \ = '@#&@#&&'` 是一组不应出现在目标或属性名称中的字符，在 `emcli.set_target_property_value()` 函数中用作分隔符。`__subseparator\
  \ = 'property_records=' + __delim` 也用于格式化。\n\n第一个 `for` 循环遍历过滤后的目标列表。第二个 `for` 循环遍历\
  \ `propdict` 变体。在第二个嵌套的 `for` 循环内部是 `emcli.set_target_property_value()` 函数，该函数实际在每个目标上设置属性。此\
  \ `set_target_property_value()` 函数针对每个目标的每个属性执行一次，因此该函数的总执行次数将是过滤后目标列表中的记录数乘以 `propdict`\
  \ 中的属性名称-值对的数量。随着每个属性被设置，结果会打印到屏幕上。\n\n在 Python 中使用类需要前期投入一点额外的时间和精力，但这是非常值得的。你辛苦创建的代码是可扩展、可扩展和可重用的。你可以重用从任何创建的类中得到的代码，而不必担心需要再次测试它们。\n\
  \n## 总结\n\nEnterprise Manager 确实是一个强大的工具。牢固掌握其图形界面的功能对于有效使用它至关重要。EM CLI 极大地增强了利用\
  \ EM 所有强大功能的能力。EM CLI 并非最容易学习的工具，但能够通过它编写脚本和自动化活动，为管理员提供了明显的优势。\n\nPython 是一种强大的编程语言，其成熟度在过去\
  \ 20 多年中得到了验证。EM CLI 是用 Jython 编写的，它是 Python 的 Java 实现。Jython 允许管理员通过结合 Python 的强大功能和灵活性以及\
  \ EM CLI，来提高他们的 EM 效率。\n\n任何命令行工具的学习曲线都很高，但 Python 语言和 EM CLI 都相当直观。如果你在语法或功能上遇到困难，有大量且易于获得的帮助。本章给出的示例是在真实生产环境中因实际需要而创建的，因为在那些环境中通过\
  \ GUI 执行这些任务是不可行的。\n\n作为读者，你将面临的真实环境可能与此处的不同，但本章演示的原则和大部分代码都可以用来为 Enterprise 管理员创建有效且高效的解决方案。\n\
  \n# 第 7 章\n\n![image](img/frontdot.jpg)\n\n## 使用软件库和 Oracle 可扩展性交换中心\n\n### OEM\
  \ 软件库\n\n创建软件库可确保所有置备、打补丁和脚本编写实体都存储在 OEM 仓库可用的位置；这为 IT 基础架构节省了资源和成本。这个概念看起来足够简单，但通常当你进入一个\
  \ IT 组织时，会发现安装介质、补丁位置等有多个来源。拥有一个在 EM12c 环境中配置且大小合适（小型环境至少 100 GB，大型和 HA/MAA [高可用性/最高可用性架构]\
  \ 环境至少 250 GB）的中央软件库，可确保在 OEM 系统的生命周期内支持置备、打补丁和脚本编写。\n\n中央软件库的额外好处是减少了重复性任务，例如下载软件或重新创建有价值的脚本、部署过程和其他\
  \ Enterprise Manager 实体。\n\n软件库\n\n\n\nEM12c 提供了一个有价值的功能：`OEM` 软件库。在您能够使用和管理软件库之前，必须配置共享存储位置。这需要一个可引用的存储库，该存储库位于共享文件存储中，可以是\
  \ `OMS` 共享文件系统，也可以是 `OMS` 所在主机上的 `OMS` 代理文件位置。\n\n在规划软件库存储设计时，请考虑 `OMS` 环境设计。如果存在多个\
  \ `OMS` 实例，那么使用共享或挂载路径将是最佳选择。根据决策不同，软件库存储的配置会略有差异。\n\n## 设置软件库存储\n\n可以通过两种路径实现此设置：从“配置（`Setup`）”菜单中的“置备和修补（`Provisioning\
  \ and Patching`）”选项，或者从左侧导航的“云控制（`Cloud Control`）”选项。无需云控制插件，即可在 `EM12c` 控制台中访问图\
  \ 7-1 所示的界面，方法是依次点击 `Setup`、`Provisioning and Patching`，然后点击 `Software Library`。\n\
  \n![`Images/9781484202395_Fig07-01.jpg`](img/9781484202395_Fig07-01.jpg)\n\n**图\
  \ 7-1** 访问软件库的“设置（`Setup`）”菜单下拉列表\n\n进入此向导后，您可以选择查看 `OMS` 共享文件系统或 `OMS` 代理文件系统。截至\
  \ 12.1.0.3 版本，`Oracle` 建议如果要在代理主机之间共享脚本，应优先选择后者。但在图 7-1 的示例中，我们将使用 `OMS` 共享文件系统作为脚本存储库。\n\
  \n请确保选择的任何位置作为软件库存储位置时，都有足够的空间容纳所有当前和未来的实体，包括未来的补丁和安装，以缓解管理挑战。本章前面提供了软件库大小调整的最低指南；在选择位置时请牢记这些指南，以免以后需要辅助存储库。\n\
  \n您可以根据 `OMS` 配置的需要添加任意多个文件位置和引用文件位置（图 7-2）。引用文件位置指的是位于代理主机上的文件，并且通过软件库是只读位置。\n\n\
  ![`Images/9781484202395_Fig07-02.jpg`](img/9781484202395_Fig07-02.jpg)\n\n**图 7-2**\
  \ `EM12c` 软件库界面，显示现有的 `OMS` 共享文件系统\n\n对于多 `OMS` 环境，您应该在非本地的共享文件系统中配置软件库，以便任何 `OMS`\
  \ 环境都可以访问它。\n\n对于 `OMS` 代理文件系统，代理只需要能够访问 `OMS` 主机。此配置需要在设置代理文件系统之前配置命名或首选凭据以确保成功。在设置\
  \ `OMS` 代理文件系统时有一个选项可以创建首选凭据，但在某些 `Release 2` 版本中报告了失败。因此，我建议在尝试代理文件系统设置之前配置好首选凭据。\n\
  \n在软件库配置界面中点击“添加（`Add`）”按钮后，将出现图 7-3 所示的屏幕：\n\n![`Images/9781484202395_Fig07-03.jpg`](img/9781484202395_Fig07-03.jpg)\n\
  \n**图 7-3** 创建一个用于软件库的共享文件系统\n\n可以为任何 `OMS` 文件系统位置提供一个别名，然后输入共享文件系统的路径。图 7-3 显示了一个\
  \ `Windows OMS` 主机；路径显示的是驱动器盘符分配，而不是我们在 `Unix/Linux` 环境中会使用的卷标条目。一旦对提供的信息满意，管理员点击“确定（`OK`）”，共享文件系统即被创建。\n\
  \n要使用 `EM CLI` 创建一个新的软件库位置，您可以执行以下操作：\n\n\n# 使用 EM CLI 管理 Oracle Enterprise Manager\
  \ 12c 软件库\n\n## 创建软件库位置\n\n可以使用`emcli add_swlib_storage_location`命令创建新的共享文件系统。\n\
  ```\nemcli add_swlib_storage_location\n        -name=\"WIN_UPLOAD\"\n        -path=\"\
  F:\\sw_lib \"\n```\n此操作将创建一个新的 OMS 共享文件系统，其使用方式与通过控制台创建的任何文件系统相同。\n\n可以通过以下 EM CLI\
  \ 命令创建代理共享文件系统：\n```\nemcli add_swlib_storage_location\n        -name=\"Agent_WIN_UPLOAD\"\
  \n        -path=\"F:\\swlib\"\n        -type=\"OmsAgent\"\n        -host=\"orcl.us.acme.com\"\
  \n        -credential_name=\"MyOrclCreds\"\n        -credential_owner=\"ORCL_USER\"\
  \n```\n这个共享代理文件系统现已就绪，它将利用`EM12c`环境中已设置的现有凭证，并使用共享卷目录路径`/u01/swlib`。\n\n第三种选择是引用文件位置。仅当文件存储在软件库外部时才使用此选项，并将从该引用位置进行部署。\n\
  \n## 在软件库中创建文件夹\n\n最佳实践建议在 Enterprise Manager 软件库中创建一个独立的文件夹来存放脚本或其他杂项实体。从`EM12c`控制台执行此操作很简单。\n\
  \n从控制台依次点击 `Enterprise`、`Provisioning and Patching`，然后点击 `Software Library`，如图图\
  \ 7-4 所示。\n\n![9781484202395_Fig07-04.jpg](img/9781484202395_Fig07-04.jpg)\n*图 7-4.\
  \ 在 EM12c 中访问软件库*\n\n在软件库中，已经存在许多文件夹，但应该创建一个新文件夹来存放脚本。右键点击 `Software Library`（目录中的顶层），然后点击\
  \ `Create Folder`（图 7-5）。\n\n![9781484202395_Fig07-05.jpg](img/9781484202395_Fig07-05.jpg)\n\
  *图 7-5. 在 EM12c 软件库中创建文件夹*\n\n屏幕图 7-6 弹出，允许您输入与文件夹相关的信息。\n\n![9781484202395_Fig07-06.jpg](img/9781484202395_Fig07-06.jpg)\n\
  *图 7-6. 在软件库中创建文件夹的信息条目*\n\n输入一个明确定义文件夹用途的名称，并添加一个描述以帮助任何阅读该文件夹属性的人。确认您希望在软件库的父目录中创建该文件夹，满意后点击`OK`。\n\
  \n返回到软件库的主页，新文件夹现在将出现在下拉列表中（图 7-7）：\n\n![9781484202395_Fig07-07.jpg](img/9781484202395_Fig07-07.jpg)\n\
  *图 7-7. 刚在软件库中为命令行脚本创建的新文件夹*\n\n此文件夹将用于在软件库中存放`EM CLI`脚本，从而轻松地将它们与其他存储实体区分开来。\n\n\
  ## 将脚本添加到软件库\n\n从上一节创建的文件夹加载脚本是在软件库内的相同区域执行的。首先，高亮显示已创建的`CLI_Scripts`文件夹，然后依次点击`Actions`、`Create\
  \ Entity`，最后点击`Component`（图 7-8）。\n\n![9781484202395_Fig07-08.jpg](img/9781484202395_Fig07-08.jpg)\n\
  *图 7-8. 将脚本添加到软件库（即创建实体）*\n\n脚本将被构建为一个可以从软件库部署的单一组件。如果多个脚本是单个部署过程的一部分，可以将它们存储在一个组件中。\n\
  \n您可以选择将文件上传到库中或引用文件（一个引用）。对于此处的示例，目标是签入一个脚本。它将被存储为一个单一的通用组件（即实体）。\n\n选择将要上传到的软件库位置。在我们的示例中，我们将使用默认的上传共享位置。逻辑位置将是控制台内的`CLI_Scripts`文件夹。\n\
  \n# Enterprise Manager 12c Cloud Control 中的软件库与 CLI 作业操作\n\n![9781484202395_Fig07-09.jpg](img/9781484202395_Fig07-09.jpg)\n\
  \n图 7-9. 如何在软件库中创建通用组件并选择文件\n\n点击“确定”，系统会提示第二个窗口，您可以在其中提供有关即将添加到软件库的实体（即脚本）的信息（图\
  \ 7-10）。\n\n![9781484202395_Fig07-10.jpg](img/9781484202395_Fig07-10.jpg)\n\n图 7-10.\
  \ 为要上传到软件库的脚本输入描述性数据和路径信息\n\n点击“下一步”添加脚本。我们上传的是一个简单的脚本，它以美观的视图列出目标（图 7-11）。点击“添加”按钮，浏览到脚本（它可以位于本地工作站上），然后点击“确定”。点击“保存”，因为我们不需要添加任何其他配置信息，至此脚本上传到软件库的操作即告完成。\n\
  \n![9781484202395_Fig07-11.jpg](img/9781484202395_Fig07-11.jpg)\n\n图 7-11. 在软件库文件夹\
  \ `CLI Target Script` 中添加、编辑和删除脚本的选项\n\n![Image](img/sq.jpg) **提示**：所有签入软件库的实体必须具有唯一的名称。如果您添加的脚本与软件库中已有的脚本同名，系统会要求您在添加前对其进行重命名。\n\
  \n现在，`CLI Target Script` 在库中可见，并可供软件库使用。\n\n## 构建报告定义库\n\n可以构建软件库文件夹，从而创建一个可供存储库使用的库，而不是每次都编写新脚本或让脚本驻留在不同的主机或工作站上。\n\
  \n请像规划其他实体一样，仔细规划这个库。创建一个独立的库文件夹位置，并考虑此类型配置所需的空间分配。规划来自其他功能的实体，例如度量扩展、软件安装和应用程序构建，这些在完成复合报告时将成为报告定义的一部分。\n\
  \n## 使用 CLI 调用的 OEM 作业\n\n企业作业是 EM 环境的支柱。它们在幕后运行我们作为 Enterprise Manager 12c Cloud\
  \ Control 的一部分每天使用的许多功能。管理员拥有从命令行运行 EM 作业的附加能力。一旦收集了需求并熟悉了它们，设置通过 `emcli` 运行的作业是一个简单的过程。使用\
  \ EM CLI 中 `create_job` 动词的 `help` 函数，我们可以收集需求：\n\n```\n$ emcli help create_job\n\
  emcli create_job\n     -name=<job_name>\n     -type=<job_type>\n     -input_file=\"\
  property_file:<filename>\"\nDescription:\n Create and schedule a job.\n\nOptions:\n\
  \     -name: Optional parameter. The name may be specified in the input file instead.\n\
  \     -type: Optional parameter. The type may be specified in the input file instead.\n\
  \     -input_file: Required parameter. <filename> must be provided to load the properties\
  \ for\n                    creating and scheduling the job.\n\nA template property\
  \ file for the job_type can be obtained using EMCLI verb \"describe_job_type\".\n\
  \ Another job of the same job type could also be used to generate the property file\
  \ using EMCLI verb \n\"describe_job\".\n Please make sure that the property file\
  \ is accessible to the EMCLI client for reading.\n\nSample:\n Create and schedule\
  \ a job with name MYJOB1 and of job type MyJobType1 with property file present at\
  \ \nlocation /tmp/myjob1_prop.txt\n     emcli create_job -name=MYJOB1 -job_type=MyJobType1\
  \ -\ninput_file=\"property_file:/tmp/myjob1_prop.txt\"\n```\n\n### 创建作业\n\n必须执行以下步骤来创建作业。在我们的示例中，我们将首先对六个现有代理的主机执行升级，然后删除那些之前的代理。\n\
  \n**升级步骤：**\n1.  检查有哪些代理可用于升级。\n2.  输入并使用文件列出这些代理，并使用该文件作为我们作业的一部分。\n3.  升级代理。\n\
  4.  升级完成后检查进程状态。\n\n**移除旧代理步骤：**\n1.  检查升级后可以清理哪些现有的代理安装。\n2.  使用 EM CLI 卸载旧的代理安装。\n\
  3.  使用 EM CLI 主机命令删除每个旧的代理主目录。\n\n### 步骤 1：升级代理\n\n列出我们将作为 EM 作业一部分升级的代理：\n\n```\n\
  >emcli get_upgradable_agents > /u01/app/scripts/upg_agents.txt\n\norcl2:3872 12.1.0.2.0\
  \ 12.1.0.3.0 Linux x86-64\n /u01/app/oracle/Agent12c/core/12.1.0.2.0\norcl1:3872\
  \ 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/Agent12c/core/12.1.0.2.0\n\n\
  >vi /u01/app/scripts/upg_agents.txt\n移除版本信息和平台信息。剩下的应该是代理主机和端口：\norcl2:3872\norcl1:3872\n\
  ...\n```\n\n使用此文件创建一个 EM 作业来升级代理，并确保 `stage_location` 目录值有至少 2 GB 的空间：\n\n```\n\
  >emcli upgrade_agents -input_file=\"agents_file:/u01/app/scripts/upg_agents.txt\"\
  \ -job_\nname=\"UPG_021814_AGENTS\" -stage_location=/u01/app/jobs\nThe agent list\
  \ size is 6\n\nUpgradable Agents\n\nAgent Installed Version Version After Upgrade\
  \ Platform Oracle Home\n----- ----------------- --------------------- -------- ----\n\
  orcl2:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.2.0\n\
  orcl1:3872 12.1.0.2.0 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.2.0\n\
  \nYou can run the the root.sh from the EM CLI to each of the hosts that have been\
  \ granted root/sudo \nprivileges (one more reason to be offered this access via\
  \ the EM12c environment). If the preferred \ncredentials do NOT have root access,\
  \ then you will need to run it manually via the EM CLI or from \neach of the agent\
  \ targets to complete the installations.\n\nAgent Reason\n----- ------\norcl1:3872\
  \ Preferred Privileged Credential for Oracle Home of Agent : Not Set | Privilege\
  \ Delegation \nfor Host : Not Set\n\nOnce the agent has been upgraded, you will\
  \ see the following message so you can check the status of \nthe job quickly from\
  \ within the console:\n\nAgent Upgrade Job submitted for Upgradable Agents shown\
  \ above. Use emcli get_agent_upgrade_status \ncommand or goto EM CONSOLE -> Set\
  \ Up -> Manage Cloud Control -> Upgrade Agents -> Agent Upgrade \nResults to see\
  \ job status\nJob Name : UPG_021814_AGENTS\n>emcli get_agent_upgrade_status -job_name=UPG_021814_AGENTS\n\
  \nShowing for each agent in the job UPG_021814_AGENTS\n\nAgent Status Started Ended\n\
  ----- ------ ------- -----\norcl2:3872 Running 2014-02-18 15:32:58 MST -\norcl1:3872\
  \ Running 2014-02-18 15:32:58 MST –\n...\n```\n\n如果发生任何失败，您需要通过控制台进行检查（这是最简单的访问方式），或者查询\
  \ EM 存储库。在此示例中，我们将查看高级状态：\n\n```\n>emcli get_agent_upgrade_status -job_name=UPG_021814_AGENTS\n\
  \nShowing for each agent in the job UPG_021814_AGENTS\n\nAgent Status Started Ended\n\
  ----- ------ ------- -----\norcl2:3872 Success 2014-02-18 15:32:08 MST 2014-02-18\
  \ 15:53:22 MST\n...\n```\n\n我们现在可以使用此信息为下一步创建输入文件，以移除我们不再需要在 EM12c 环境中的所有代理安装：\n\
  \n```\n>emcli get_signoff_agents -output_file=\"/u01/app/work/signoff_021814.txt\"\
  \n```\n\n上述命令将输出到一个文件，该文件可用于下一步：\n\n```\nAgents available for Sign-off\n\nAgent\
  \ Installed Version Platform Oracle Home\n\n----- ----------------- -------- -----------\n\
  \norcl2:3872 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\n\
  orcl1:3872 12.1.0.3.0 Linux x86-64 /u02/oracle/agent12cR2/core/12.1.0.3.0\n\norcl3:3872\
  \ 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n\norcl4:3872\
  \ 12.1.0.3.0 Linux x86-64 /u01/app/oracle/agent12c/core/12.1.0.3.0\n```\n\n要查看文件输出：\n\
  \n```\n>cat /u01/app/oracle/work/signoff_agents.txt\n\norcl2:3872\norcl1:3872\n\
  orcl3:3872\norcl4:3872\nemrp2:3872\norcl6:3872\n```\n\n步骤 2：移除旧代理\n\n我们的第二个示例将清理所有已升级的代理。通过使用\
  \ EM CLI 的 `signoff_agents` 命令并在搜索中指定匹配字符串来移除代理：\n\n```\n>emcli signoff_agents -agents=\"\
  oradba%\" -job_name=CLEANUP_12cR2_AGNTS\n\n可用于签出的代理\n\n代理 已安装版本 平台 Oracle 主目录\n\n\
  ----- ----------------- -------- -----------\n\norcl2:3872 12.1.0.3.0 Linux x86-64\
  \ /u01/app/oracle/agent12c/core/12.1.0.3.0\n\norcl1:3872 12.1.0.3.0 Linux x86-64\
  \ /u01/app/oracle/agent12c/core/12.1.0.3.0\n\n已为上述代理提交代理签出作业。使用 emcli get_signoff_status\
  \ 或前往 EM 控制台 -> 设置 -> 管理云控制 -> 升级代理 -> 代理升级后任务 -> 签出代理结果以查看作业状态\n作业名称 : CLEANUP_12CR2_AGNTS\n\
  ```\n\n一旦所有作业都验证为已完成，应进行第二次检查，以确认相关每个代理都已收到签出状态：\n\n```\n>emcli get_signoff_status\n\
  \n显示每个作业的状态\n\n作业名称 状态 总代理数 开始时间 结束时间\n\n-------- ------ ------------ ------- -----\n\
  \nCLEANUP_12CR2_AGNTS 成功 2 2013-11-21 17:08:30 CST\n2013-11-21 17:08:44 CST\n```\n\
  \n请注意，签出操作并不会删除旧的代理主目录。我们现在将通过一个 EM CLI `host` 命令在登录后执行此操作：\n\n```\n>emcli execute_hostcmd\
  \ –cmd=”rm -rf /u01/oracle/agent12c/core/12.1.0.2.0” -targets=\"remote-host:host\"\
  \n```\n\n此命令将从其运行的每个主机中删除先前未使用的目录主目录。\n\n这些示例旨在向您展示一些非常简单的命令，它们完成了通常需要手动执行的多个步骤，从而减轻了管理员的负担。任何仔细阅读了\
  \ DBA 在六台服务器上必须执行的实际步骤（包括验证成功然后移除先前安装）的人，都会意识到 EM CLI 作业提交选项背后蕴含的强大能力。\n\n信息出版商报告的导出/导入功能\n\
  \nBI Publisher (BIP) 现在作为第 4 版 (12.1.0.4) 的集成部分成为标准配置。随着这一变化，信息出版商报告 (IP 报告) 仍然受支持，但建议迁移到\
  \ BIP。\n\n任何报告都需要大量的开发时间，而能够通过 EM CLI 导出和导入它非常有益；这对于您现有的 IP 报告来说也不例外。在此示例中，我们将首先列出然后导出一个名为\
  \ “Exadata Summary Report” 的 IP 报告：\n\n```\n>emcli get_reports –owner=\"KPOTVIN\"\
  \n```\n\n从 “KPOTVIN” 拥有的报告列表中，我们可以选择一个名为 `EXADATA_SUMMARY_REPORT` 的报告并导出它：\n\n```\n\
  >emcli export_report -title=\"Exadata Summary Report\" -owner=\"KPOTVIN\" -output_file=\"\
  $OMS_HOME/reports/exadata_summary.xml\"\n```\n\n此报告现在将位于 `$OMS_HOME/reports` 目录中，文件将被命名为\
  \ `exadata_summary` 以便于识别。\n\n然后要导入此报告，执行以下操作：\n\n```\n>emcli import_report -files=\"\
  $OMS_HOME/reports/exadata_summary.xml\"\n```\n\n导出 BIP 报告目前通过控制台执行，并将文件导出到本地文件。\n\
  \n在软件库中存储定义库\n\n将定义文件存储在软件库中非常合理。没有人愿意继续创建和保留同一定义文件（又称响应文件）的多个副本。通过实施软件库，可以更少担心版本控制，因为这可以作为该功能的一部分进行管理。\n\
  \n创建定义文件是一个简单的过程：\n\n```\n>emcli get_procedures -type=DBPROV \n```\n\n这将创建一个所有配置过程的列表，然后可用于创建定义文件；这将与部署或配置动词调用一起使用。此定义文件包含所有目标和过程步骤。与编写所有任务（就像响应文件消除了数据库配置助理\
  \ (dbca) 静默运行的类似工作）相比，将其用作“快捷方式”可以节省时间和额外精力。\n\n您可以使用以下命令“描述”或列出命令和信息到输出文件：\n\n\
  ```\n>emcli describe_procedure_input -procedure=B35E10B1F427B4EEE040578CD78179DC\
  \ > newoutputfile.properties\n```\n\n此命令将基于命令中列出的过程 GUID，在软件库目录中创建一个名为 “newoutputfile.properties”\
  \ 的文件。\n\n然后您可以使用 VI 或其他编辑器打开该文件，根据需要更改目标等信息并保存；接着，将其上传回软件库：\n\n```\n>emcli save_procedure_input\
  \ –name=Prov_db12cR1_temp -procedure=\"DB12cR1 Template\" -owner=\"KPOTVIN\"\n-input_file=data:$OMS_HOME/sw_files/newoutputfile.properties\n\
  ```\n\n该文件现已上传到软件库，可以下载以供将来使用，或者可以直接使用。\n\nOracle 可扩展性交换中心\n\nOracle 的可扩展性交换中心是一个云存储库（库），Oracle\
  \ 和合作伙伴已向其贡献了脚本、插件和其他 Enterprise Manager 实体以供下载。可通过以下链接 (图 7-12) 通过 Web 浏览器访问可扩展性交换中心：`http://www.oracle.com/goto/emextensibility`。\n\
  \n![9781484202395_Fig07-12.jpg](img/9781484202395_Fig07-12.jpg)\n\n图 7-12。Oracle\
  \ 可扩展性交换中心 2.0 版的主页\n\n拥有可扩展性交换中心的好处类似于拥有配置库，只是范围是全球性的。它允许 EM12c 专业人员与 OEM 社区的其他人分享他们的知识和专长。它为社区中的人们提供了解决方案，为他们节省了原本会浪费在重新创建他人已花费宝贵时间原创的代码上的时间和资源。\n\
  \n重用 Enterprise Manager 实体（例如脚本、插件和补丁计划）的愿望很快变得明显，并且许多高级用户请求此功能。没有人喜欢重新发明轮子，借助可扩展性交换中心，EM12c\
  \ 软件库被提升到了一个新的水平。可用实体的来源不再局限于 EM12c 存储库本地，而是现在任何有浏览器访问权限的人都可以获得；来自整个 Oracle 社区高级用户的贡献也同样可用。\n\
  \n随着 2014 年 6 月 2.0 版本的发布，可扩展性交换中心的未来前景广阔。随着 Enterprise Manager 功能的增强，新的卸载和导出功能以及新的脚本编写方法不断被发现。随着我们在\
  \ EM CLI 中实现的功能越来越多，我们计划看到更多的 Jython 和 JSON 脚本，这些脚本将涵盖我们现在在数据库环境中所做的大部分工作。然而，随着向移动设备的转移，谁知道会利用\
  \ ADF（应用程序开发表格）和 APEX 想出什么，所有这些都在 EM12c 中得到支持，并作为部署的一部分通过 EM CLI 编写脚本。很快，不仅会有插件和脚本，还可能有完整的监控实体套件通过可扩展性交换中心提供。\n\
  \n为了更好地理解这些功能，我们可以通过 Web 浏览器登录可扩展性交换中心。页面标题为用户提供了有关即将举行的 Enterprise Manager 培训和信息活动的丰富信息\
  \ (图 7-13)。还有一个链接，如果用户想继续访问该站点以获取更多信息或注册活动。\n\n![9781484202395_Fig07-13.jpg](img/9781484202395_Fig07-13.jpg)\n\
  \n\n# 扩展性交换平台概述\n\n![9781484202395_Fig07-14.jpg](img/9781484202395_Fig07-14.jpg)\n\
  \n图 7-13。展示事件信息和扩展性交换平台网站上热门类别的页头页面\n\n按受欢迎程度和实体数量排序的类别显示在事件页头的图 7-14 中。\n\n## 搜索与最近更新\n\
  \n![9781484202395_Fig07-15.jpg](img/9781484202395_Fig07-15.jpg)\n\n图 7-14。扩展性交换平台网站上由\
  \ Oracle 及合作伙伴创建的插件和实体的搜索栏及最近更新列表\n\n搜索选项既实用又易于使用。只需输入一个关键词，它就会开始查找交换平台中标题包含该词条的所有实体。\n\
  \n如果您不想搜索，可以滚动到页面底部，按 Oracle、按合作伙伴和/或按 `标签` 浏览库中最近更新的扩展，如图 7-15 所示。标签是可用于提供链接按钮的搜索词，该按钮将快速带您找到所有符合该\
  \ `标签化` 搜索条件的实体或插件。\n\n## 标签化搜索\n\n![9781484202395_Fig07-16.jpg](img/9781484202395_Fig07-16.jpg)\n\
  \n图 7-15。扩展性交换平台网站上的标签化搜索，以及每个标签搜索词对应的实体计数\n\n在图 7-16 中，我们将对 `fusion` 进行一次简单的搜索。\n\
  \n## 执行搜索\n\n![9781484202395_Fig07-17.jpg](img/9781484202395_Fig07-17.jpg)\n\n图\
  \ 7-16。扩展性交换平台的搜索栏视图，以及响应关键词输入的快速搜索结果\n\n如您所见，关键词 `fusion` 立即显示了结果。以我们的示例为例，我们将选择\
  \ `Oracle Fusion Applications`。\n\n这将带我们到匹配搜索结果的实体页面（图 7-17），然后我们可以从下拉列表中选择。\n\n\
  ## 插件详情页面\n\n![9781484202395_Fig07-18.jpg](img/9781484202395_Fig07-18.jpg)\n\n图\
  \ 7-17。基于关键词输入的二级搜索页面，显示可供查看或下载的可用插件（即“实体”）列表\n\n通过点击搜索中找到的第一个扩展，我们进入 Fusion ION\
  \ Accelerator 插件的内容详情页面（图 7-18）。\n\n图 7-18。Fusion ION Accelerator 插件的访问页面视图，显示文档、下载、报告和书签链接\n\
  \n请注意，您可以阅读该插件的完整文档 (`Explore Plug-in`)，下载它，如果遇到插件问题可以进行报告，或者通过网络浏览器将其添加书签以便日后参考。\n\
  \n为了网站未来的改进，如果您最终下载了该插件，请记得回来为其评分。收到反馈对于扩展性交换平台的其他用户非常有价值。\n\n如果您选择下载一个插件，并且它来自\
  \ Oracle，系统会将您带到 Oracle 或合作伙伴的页面以访问下载选项。\n\n### 经典视图\n\n现在，如果您更习惯扩展性交换平台的先前版本，您可以选择点击页面顶部的\
  \ `Classic` 标签页，这将恢复到该优秀网站的先前版本。习惯新的应用程序用户界面通常需要时间，因此我建议您先使用新界面一段时间，然后再选择切换回去。\n\
  \n## 开发资源\n\n如果您的环境拥有度量扩展、插件以及对您的 EM12c 环境有价值的其他附加组件，并且您想了解如何将它们贡献到 Exchange Extensibility\
  \ 存储库，有一个 `开发资源` 页面会解释如何操作。此页面包括工具包、指南、白皮书和屏幕录像的下载，所有这些都有助于简化开发和提交实体的过程。\n\n## 贡献\n\
  \n一旦您完成了要提交到扩展性交换平台的实体的正确开发，必须填写 `Contribute` 标签页上的表单。填写完成后，点击 `Create`。Oracle 将继续验证您的贡献，然后将其添加到扩展性交换平台目录。\n\
  \n## 概览\n\n最后一个标签页极其重要，尽管它位于 Exchange Extensibility 页面上的位置如此。这个 `概览` 页面（图 7-19）可以快速查看哪个插件提供了什么功能。\n\
  \n![9781484202395_Fig07-19.jpg](img/9781484202395_Fig07-19.jpg)\n\n图 7-19。“概览”标签页以及令人印象深刻的插件比较功能\n\
  \n它还提供了出色的搜索功能，包括针对不同插件的过滤器和比较选项（图 7-20）。\n\n![9781484202395_Fig07-20.jpg](img/9781484202395_Fig07-20.jpg)\n\
  \n图 7-20。EMC 插件的清晰搜索结果和比较，显示哪些插件包含开箱即用的报告\n\n在此图中，我们对 EMC 插件进行了快速搜索，有两个插件提供了 `开箱即用`\
  \ 的报告，因此，如果这是您需要的插件的一项要求，此页面将快速为您定位到所需的实体。\n\n## 总结\n\n软件库是您用于 EM12c 环境的实体的内部存储库。在扩展性交换平台中拥有一个全局软件库，使\
  \ Enterprise Manager 能够共享他们以前必须自行设计的实体。\n\n在本章中，我们讨论了为什么在能够使用 EM12c 控制台的许多功能（包括置备和\
  \ `EM CLI` 脚本功能）之前，您必须配置软件库。我们演示了如何配置一些更高级的功能，以及它们如何满足您的日常需求。\n\n我们还介绍了强大的扩展性交换平台网站。这是\
  \ Oracle 的实体库，允许 Oracle、Oracle 合作伙伴以及像您这样的高级用户开发、测试、确保质量，然后与 Oracle 社区共享实体，使所有人受益。为每个人提供一个一站式的位置来查看、试用和评价插件、度量扩展以及未来的实体，这是\
  \ Oracle 社区在行业内相互分享丰富技能的一种绝佳方式。\n\n# 第 8 章：EM CLI 脚本示例\n\n![image](img/frontdot.jpg)\n\
  \n在整本书中，我们向您展示了如何使用 `EM CLI` 管理您的 OEM 环境，包括使用命令行、`Jython` 脚本选项（该选项使用 `JSON` 和 `Jython`）。\n\
  \n本章包含一些示例脚本供您适配到您的环境中。\n\n*   第 1 节：函数库和 Shell 脚本\n*   第 2 节：`EM CLI` 和 Veritas\
  \ Cluster Services\n*   第 3 节：基本 OMS 服务器管理脚本\n*   第 4 节：`EM CLI` 脚本和交互式脚本\n\n##\
  \ 第 1 节：函数库和 Shell 脚本\n\n第 5 章探讨了您可以将 `EM CLI` 与 shell 脚本结合使用的各种方式。本节扩展了这些解决方案，并为您提供了可在环境中使用的示例脚本。\n\
  \n本章中的示例已为清晰起见进行了编辑，主要是通过移除 `echo` 语句的格式选项和重定向到日志文件。您在脚本中必须提供的两个最重要的事项是：用于有监控的在线使用的清晰说明，以及用于通过\
  \ `Cron` 或 `OEM` 等其他作业调度器进行无人值守执行的完整日志文件。\n\n### 命令行输入\n\n使用经过验证的输入值可提供可扩展性和易用性。在部署脚本之前，请考虑添加并测试这一重要功能。\n\
  \n\n\n本节中几乎所有脚本都需要在命令行输入一个或多个变量，通常就是目标名称。命令行传递的变量会按其出现的顺序在脚本主体中引用。可执行文件表示为 `$0`，其后的第一个字符串是\
  \ `$1`，依此类推。例如，可以使用类似这样的条目：\n\n```\n./oem_target_blackout.sh orcla\n```\n\n此例将变量\
  \ `$0` 解释为脚本名 `oem_target_blackout.sh`，将 `$1` 解释为数据库名。脚本中的逻辑应验证所需的命令行输入非空，或者退出时给出明确的错误陈述，告知用户或日志文件出了什么问题。在示例脚本中，你会看到这种技术的几个应用实例。\n\
  \n## 存活性证据\n\n你开发的每个 Shell 脚本都应能够在命令行上直接执行以测试单次运行，同时也应无需任何修改就能通过 Cron 等调度器执行。要避免使用同一脚本的两个版本来支持这两种操作模式。随着环境复杂性的增加，这可能演变成维护的噩梦。相反，应通过检查调用脚本的会话性质来测试是否存在活跃的用户会话。在运行时，每个活跃用户连接都会在\
  \ `/dev` 目录下为每个终端会话创建一个文件系统条目。TTY 是 **电传会话** 的旧称——即你的终端会话。当然，通过 Cron 执行的脚本不是从终端调用的，因此与那些执行没有关联的\
  \ `/dev/tty`。\n\n使用 `if` 语句测试 TTY 会话的存在，并相应地设置运行时变量。例如，如果你的脚本要求在命令行上传递数据库名，那么对于有人值守的会话和\
  \ cron/计划执行的会话，对缺失输入的处理方式会有所不同：\n\n```\nif [ ${1} -eq 0 ]; then\n  if tty -s; then\n\
  \      read -p \"Please provide the name of the database: \" thisSID\n  else\n \
  \     echo \"The database name was not provided on the command line\"  >>runtime.log\n\
  \      exit\n   fi\nfi\n```\n\n为了清晰起见，示例脚本中移除了这类会话检查。\n\n## 示例函数库\n\n本函数库被本节剩余部分中的许多\
