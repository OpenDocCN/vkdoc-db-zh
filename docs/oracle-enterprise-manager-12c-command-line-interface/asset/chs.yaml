- "# 此字符串将在构建 `emcli` 脚本时多次使用\n```bash\nEMCLI_AGENT_STRING=`echo \"-src_agent=\\\"\
  ${OLD_EMD}\\\" -dest_agent=\\\"${NEW_EMD}\\\"\"`\n```\n\n\n```markdown\n# 创建并精炼\
  \ OEM 目标列表\n\n并非所有目标都由 OEM 管理，因此我们需要从仓库获取一个列表，并将其与来自 VCS 的列表进行比较。\n\n```bash\necho\
  \ \"\\n\\n 与此更改相关的主机目标的 OEM 名称:\"\necho \"  重定位后的主机         ${NEW_EMD}\"\necho \"\
  \  本地主机名               ${OLD_EMD}\"\n```\n\n## 获取并展示 OEM 管理的目标列表\n\n```bash\n$EMCLI\
  \ get_targets | grep oracle_database | awk '{print $NF}' | sort -fu >${EMCLI_DATABASES}\n\
  echo \"\\n\\n 通过 OEM 管理的数据库目标:\"\nthisFILE=${EMCLI_DATABASES}\nListNicely\n\n$EMCLI\
  \ get_targets | grep oracle_listener | awk '{print $NF}' | sort -fu >${EMCLI_LISTENERS}\n\
  echo \"\\n\\n 通过 OEM 管理的监听器目标:\"\nthisFILE=${EMCLI_LISTENERS}\nListNicely\n```\n\
  \n## 获取本地 EM Agent 已知的目标列表\n\n现在，我们将对本地 EM Agent 已知的目标执行相同的操作。此列表可能包含仓库中被忽略或未提升的目标，因此我们将把\
  \ Agent 列表视为更佳选择。如果本地 Agent 没有任何目标，我们将使用来自仓库的完整列表。\n\n```bash\n$EMCTL config agent\
  \ listtargets | grep oracle_database | cut -d\"[\" -f2 | cut -d, -f1 | sort -fu\
  \ >${EMCTL_DATABASES}\necho \"\\n\\n 当前与 ${NEW_EMD} 关联的本地数据库目标:\"\nthisFILE=${EMCTL_DATABASES}\n\
  ListNicely\n\n$EMCTL config agent listtargets | grep oracle_listener | cut -d\"\
  [\" -f2 | cut -d, -f1 | sort -fu >${EMCTL_LISTENERS}\necho \"\\n\\n 当前与 ${NEW_EMD}\
  \ 关联的本地监听器目标:\"\nthisFILE=${EMCTL_LISTENERS}\nListNicely\n```\n\n## 用本地 Agent 列表覆盖仓库列表（如果存在）\n\
  \n创建仓库中的较长列表是为了防止本地 Agent 不包含任何目标。如果存在任何已知于本地 Agent 的目标，我们将用它们替换 OMR 列表。\n\n```bash\n\
  if [ `cat ${EMCTL_DATABASES} | wc -l` -gt 0 ]; then\n   cat /dev/null          \
  \                  >${OEM_DATABASES}\n   for thisTARGET in `cat ${EMCLI_DATABASES}`;\
  \ do\n      if [ `cat ${EMCTL_DATABASES} | grep -i ${thisTARGET} | wc -l` -eq 0\
  \ ]; then\n         echo \"${thisTARGET}\"              >>${OEM_DATABASES}\n   \
  \   fi\n   done\nelse\n   mv -f ${EMCLI_DATABASES} ${OEM_DATABASES}\nfi\n\n"
- "# 监听器执行相同的过程\nif [ `cat ${EMCTL_LISTENERS} | wc -l` -gt 0 ]; then\n   cat /dev/null\
  \                            >${OEM_LISTENERS}\n   for thisTARGET in `cat ${EMCLI_LISTENERS}`;\
  \ do\n      if [ `cat ${EMCTL_LISTENERS} | grep -i ${thisTARGET} | wc -l` -eq 0\
  \ ]; then\n         echo \"${thisTARGET}\"              >>${OEM_LISTENERS}\n   \
  \   fi\n   done\nelse\n   mv -f ${EMCLI_LISTENERS} ${OEM_LISTENERS}\nfi\n```\n\n\
  ## 对比 OEM 目标列表与 Veritas 成员并构建 emcli 脚本\n\n```bash\nif [ `cat ${VCS_DATABASES} |\
  \ wc -l` -gt 0 ]; then\n   cat /dev/null                            >${MOVING_DATABASES}\n\
  \   for thisITEM in `cat ${VCS_DATABASES}`; do\n      cat ${OEM_DATABASES} | grep\
  \ -i ${thisITEM} >>${MOVING_DATABASES}\n   done\nfi\n\ncat /dev/null           \
  \                 >${EMCLI_SCRIPT}\n\nif [ `cat ${MOVING_DATABASES} | wc -l` -gt\
  \ 0 ]; then\n   echo \"\\n\\n 以下数据库目标将被重定位\"\n   thisFILE=${MOVING_DATABASES}\n\
  \   ListNicely\n   for thisITEM in `cat ${MOVING_DATABASES}`; do\n      EMCLI_TARGET_STRING=`echo\
  \ \"-target_name=\\\"${thisITEM}\\\" -target_type=\\\"oracle_database\\\"\"`\n \
  \     echo \"set_standby_agent ${EMCLI_AGENT_STRING} ${EMCLI_TARGET_STRING}\"  >>${EMCLI_SCRIPT}\n\
  \      echo \"relocate_targets  ${EMCLI_AGENT_STRING} ${EMCLI_TARGET_STRING} -copy_from_src\
  \ -force=yes\" >>${EMCLI_SCRIPT}\n   done\nelse\n   echo \"\\n\\n 没有数据库目标需要迁移到 ${NEW_EMD}\"\
  \nfi\n\nif [ `cat ${VCS_LISTENERS} | wc -l` -gt 0 ]; then\n   cat /dev/null    \
  \                        >${MOVING_LISTENERS}\n   for thisITEM in `cat ${VCS_LISTENERS}\
  \ | sed 's/lsnr//'`; do\n      cat ${OEM_LISTENERS} | grep -i ${thisITEM} >>${MOVING_LISTENERS}\n\
  \   done\nelse\n   echo \"\\n\\nVCS 没有与 ${HAGROUP} 组关联的监听器\"\nfi\n\nif [ `cat ${MOVING_LISTENERS}\
  \ | wc -l` -gt 0 ]; then\n   echo \"\\n\\n 以下监听器目标将被重定位到 ${NEW_EMD}\"\n   thisFILE=${MOVING_LISTENERS}\n\
  \   ListNicely\n   for thisITEM in `cat ${MOVING_LISTENERS}`; do\n      EMCLI_TARGET_STRING=`echo\
  \ \"-target_name=\\\"${thisITEM}\\\" -target_type=\\\"oracle_listener\\\"\"`\n \
  \     echo \"set_standby_agent ${EMCLI_AGENT_STRING} ${EMCLI_TARGET_STRING}\" >>${EMCLI_SCRIPT}\n\
  \      echo \"relocate_targets  ${EMCLI_AGENT_STRING} ${EMCLI_TARGET_STRING} -copy_from_src\"\
  \ >>${EMCLI_SCRIPT}\n   done\nelse\n   echo \"\\n\\n 没有监听器目标需要迁移到 ${NEW_EMD}\"\n\
  fi\n\nsleep 10\n```\n\n## 显示并执行 emcli 脚本\n\n```bash\nif [ `cat ${EMCLI_SCRIPT} |\
  \ wc -l` -gt 0 ]; then\n   echo \"\\n\\nEMCLI 脚本\"\n   cat ${EMCLI_SCRIPT}\n   echo\
  \ \"\\n\\nEMCLI 执行结果\"\n   $EMCLI argfile ${EMCLI_SCRIPT}\nfi\n\necho \"\\n\\n 以下目标现在由本地\
  \ OEM Agent 追踪:\\n\"\n$EMCTL config agent listtargets | grep -v \"Cloud\" | grep\
  \ -v \"reserved.\" | sort -fu\necho \"\\n\\n\\n\"\n\nExitCleanly\n```\n\n## 第 3\
  \ 节：必要的服务器管理脚本\n\n本节中的 Shell 脚本包含了 `EM CLI` 的各种用法，包括备份 OMS 服务器上的所有配置文件，以及控制 OMS\
  \ 日志文件占用的空间量。\n\n对于他们认为关键的文件，Oracle 在提供这些服务方面一直做得很好。这些脚本负责处理所有其余部分。\n\n## 配置备份脚本\n\
  \nOEM 将关键的 OMS 配置文件备份到仓库数据库。此脚本对这些文件（以及其他几个文件）执行文件级备份。应使用与软件库相同的共享文件系统作为这些备份的存放位置。\n\
  \n此脚本仅在确定源文件与其备份副本内容不同时，才会创建新备份。如果存在差异，旧备份将被重命名为 `.old` 后缀。这为您提供了另一个故障排除工具，在 OMS\
  \ 打补丁后尤其有用。您可以使用文件创建日期来确定哪些配置文件发生了更改，然后运行快速的 `diff` 命令来找出它们的变化方式：\n\n```ksh\n示例脚本:\
  \ backup_oms_configs.ksh\n#!/bin/ksh\n\n#===============================================================================\n"
- '#  脚本名称  : backup_oms_configs.ksh

  '
- '#  调用参数 : 无

  '
- '#  目的      :   备份关键的 OMS 配置文件

  #===============================================================================

  '
- "# 独立变量\n#===============================================================================\n\
  export OMS_HOME=<在此设置您的 OMS 主目录>\nexport BACKUP_DIR=<在此设置备份目标目录>\n```\n\n\n\n##\
  \ 函数\n\n## DashedBreak\n```bash\nfunction DashedBreak {\necho \"\\n--------------------------------------------------------------------------------\\\
  n\"\n}\n```\n\n## PrepareBackupDir\n```bash\nfunction PrepareBackupDir {\n\nSOURCE_DIR=${OMS_HOME}/${DIRNAME}\n\
  TARGET_DIR=${BACKUP_DIR}/${DIRNAME}\nSTAGE_DIR=${TARGET_DIR}/staging\nif [ -d ${TARGET_DIR}\
  \ ]; then\n   echo \"\\n\\nFound directory ${TARGET_DIR}\\n\\n\"\nelse\n   echo\
  \ \"\\n\\nCreating directory ${TARGET_DIR}\\n\\n\"\n   mkdir -p ${TARGET_DIR}\n\
  fi\n\nchmod 770 ${TARGET_DIR}\n\nif [ ! -d ${STAGE_DIR} ]; then\n   mkdir ${STAGE_DIR}\n\
  fi\n\nchmod 770 ${STAGE_DIR}\n}\n```\n\n## BackupConfigFile\n```bash\nfunction BackupConfigFile\
  \ {\n\nsourceFILE=${SOURCE_DIR}/${FILENAME}\nstageFILE=${TARGET_DIR}/staging/${FILENAME}\n\
  targetFILE=${TARGET_DIR}/${FILENAME}\noldFILE=${targetFILE}.old\noldZIP=${oldFILE}.zip\n\
  \nDashedBreak\n\nif [ -f ${sourceFILE} ]; then\n   if [ -f ${targetFILE} ]; then\n\
  \      echo \"\\nBacking up ${sourceFILE}\\n\"\n      cp -f ${sourceFILE} ${stageFILE}\n\
  \      if [ `diff ${stageFILE} ${targetFILE} | wc -l` -gt 1 ]; then\n         echo\
  \ \"\\n\\tExisting backup file will be renamed and gzipped\\n\"\n            if\
  \ [ -f ${targetFILE} ]; then\n               ## 删除这两个文件的旧副本\n               [ $oldZIP\
  \ ] && rm -f ${oldZIP}\n               [ $oldFILE ] && rm -f ${oldFILE}\n      \
  \         ## 重命名最新的备份副本并使用 gzip 压缩\n               echo \"\\tRenaming the existing\
  \ backup file\\n\"\n               mv ${targetFILE} ${oldFILE}\n               echo\
  \ \"\\tGzipping that copy\\n\"\n               gzip -f ${oldFILE} --fast\n     \
  \          chmod 600 ${oldZIP}\n            fi\n         echo \"\\nBacking up ${sourceFILE}\\\
  n\"\n         mv ${stageFILE} ${targetFILE}\n         chmod 640 ${targetFILE}\n\
  \         echo \"\\n\\tNew backup file moved into place\\n\"\n      else\n     \
  \    echo \"\\n\\tThe current copy of ${FILENAME} is identical to the backup copy\\\
  n\"\n         rm -f ${stageFILE}\n      fi\n   else\n      echo \"\\n\\tMaking a\
  \ copy of ${sourceFILE}\\n\"\n      cp ${sourceFILE} ${targetFILE}\n   fi\n   echo\
  \ \"\\n\\t${sourceFILE} does not exist on this server\\n\\n\"\nfi\n\nchmod 640 ${targetFILE}\n\
  \necho \"\\n\\tFinished\\n\\n\"\n}\n```\n\n# 运行时流程\n\n```bash\necho \"\\nBackup\
  \ directories and contents before processing\\n\\n\"\nls -lARp ${BACKUP_DIR} | grep\
  \ -v \"^total\"\n\nDashedBreak\n\n"
