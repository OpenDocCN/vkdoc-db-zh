  \ PNO , QTY }\n    { SNO , PNO , QTY } → { SNO }\n    { SNO , PNO , QTY } → { PNO\
  \ }\n    { SNO , PNO , QTY } → { QTY }\n    { SNO , PNO , QTY } → { }\n    { SNO\
  \ , PNO }       → { SNO , PNO , QTY }\n    { SNO , PNO }       → { SNO , PNO }\n\
  \    { SNO , PNO }       → { SNO , QTY }\n    { SNO , PNO }       → { PNO , QTY\
  \ }\n    { SNO , PNO }       → { SNO }\n    { SNO , PNO }       → { PNO }\n    {\
  \ SNO , PNO }       → { QTY }\n    { SNO , PNO }       → { }\n    { SNO , QTY }\
  \       → { SNO , QTY }\n    { SNO , QTY }       → { SNO }\n    { SNO , QTY }  \
