  \n    ```\n    { SNO , PNO } → { SNO , PNO , QTY }\n    { SNO , PNO } → { SNO ,\
  \ PNO }\n    { SNO , PNO } → { SNO , QTY }\n    { SNO , PNO } → { PNO , QTY }\n\
