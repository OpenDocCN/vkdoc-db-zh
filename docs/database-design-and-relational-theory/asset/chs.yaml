  \n关系模型本身起源于科德的两篇里程碑式论文：\n\n*   E. F. 科德：“大型数据库中存储关系的可推导性、冗余性与一致性”，IBM 研究报告 RJ599\
  \ (1969 年 8 月 19 日) 及其他出处\n\n*   E. F. 科德：“大型共享数据库的关系数据模型”，`ACM 通信 13`，第 6 期 (1970\
  \ 年 6 月) 及其他出处\n\n其中第一篇论文并未直接讨论设计本身。然而，第二篇论文中有一个标题为“范式”的章节，包含了如下引人入胜的评述：\n\n*  \
  \ 进一步的规范化操作是可能的。本文不讨论这些操作。\n\n这些评述出现在一个展示如何消除关系值属性或 `RVAs`（参见第 12 章练习 12.8 的答案）的示例之后。*注：*\
  \ 所讨论的“进一步操作”——实际上只有一种——即 `Tutorial D` 中所称的 `UNGROUP`。参见第 4 章练习 4.14 的答案。\n\n* \
  \  设计理论本身始于科德在以下论文中引入 `FDs`、`2NF` 和 `3NF`：\n    *   E.F. 科德：“数据库关系模型的进一步规范化”，载于\
  \ Randall J. Rustin 编，`数据库系统：库朗计算机科学研讨会系列 6` (Prentice Hall, 1972)\n\n这里有两个简要评论：首先，论文标题具有误导性——进一步的规范化并非对关系模型本身进行的操作，而是对\
  \ `relvars`（关系变量），或者更准确地说是对 `relvar` 设计进行的操作。（套用我在第 1 章练习 1.1 答案中的话，关系模型本身并不关心 `relvars`\
  \ 处于何种范式，只要这些 `relvars` 确实是 `relvars`——即关系变量——而不是其他东西即可）。其次，该论文中部分材料的早期版本可见于科德的另外两篇更早的论文。第一篇是：\n\
  \n*   E.F. 科德：“关系模型的第二和第三范式”，IBM 内部备忘录 (1970 年 10 月 6 日)\n\n第二篇是：\n\n*   E.F. 科德：“规范化数据库结构：简要教程”，1971\
  \ 年 ACM SIGFIDET 数据描述、访问与控制研讨会论文集，加州圣地亚哥，(1971 年 11 月 11 日-12 日)^(²⁸⁷)\n\n希斯定理（当时尚未冠以此名）在这篇论文的同一研讨会上提出。^(²⁸⁸)\
  \ 参见：\n\n*   I. J. 希斯：“关系数据库中不可接受的文件操作”，1971 年 ACM SIGFIDET 数据描述、访问与控制研讨会论文集，加州圣地亚哥\
  \ (1971 年 11 月 11 日-12 日)\n\n`BCNF` 在以下论文中被定义（尽管文中称之为“第三”范式的“改进版”）：\n\n*   E. F.\
  \ 科德：“关系数据库系统的最新研究”，IFIP 大会论文集，瑞典斯德哥尔摩 (North-Holland, 1974) 及其他出处\n\n同一届 IFIP 大会也首次展示了阿姆斯特朗关于\
  \ `FDs` 的公理：\n\n*   W. W. 阿姆斯特朗：“数据库关系的依赖结构”，IFIP 大会论文集，瑞典斯德哥尔摩 (North-Holland,\
