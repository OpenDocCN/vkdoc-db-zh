- fmt: 'As you can see, now the design is definitely bad; to be specific, the tuples
    for parts P2 and P3 now appear in both relvars in Figure [16-3](#489629_2_En_16_Chapter.xhtml#Fig3)
    (in other words, there’s now some redundancy). What’s more, those tuples *must*
    appear in both relvars! For suppose, contrariwise, that (say) the tuple for part
    P2 appeared in `HP` and not in `LP`. Then, noting that `LP` contains no tuple
    for part P2, we could legitimately conclude from `The Closed World Assumption`—see
    Chapter [2](#489629_2_En_2_Chapter.xhtml)—that it’s not the case that part P2
    weighs 17.0 pounds. But then we see from `HP` that part P2 in fact does weigh
    17.0 pounds, and the database is thus inconsistent (it contains a contradiction).
    *Note:* Inconsistency in a database is highly undesirable, of course. In fact,
    I’ll show in Appendix [B](#489629_2_En_19_Chapter.xhtml) that you can never trust
    the results you get from an inconsistent database; indeed, you can get *absolutely
    any result whatsoever*—even results that effectively imply nonsensical things
    like 1 = 0—from such a database!


    Now, the problem with the design of Figure [16-3](#489629_2_En_16_Chapter.xhtml#Fig3)
    is easy to see: The predicates for `LP` and `HP` “overlap,” in the sense that
    the very same tuple *t* can satisfy both of them. What’s more, as we’ve seen,
    if *t* is such a tuple, and if at some given time tuple *t* represents a “true
    fact,” then, in accordance with `The Closed World Assumption`, tuple *t* must
    necessarily appear in both relvars at the time in question (whence the redundancy,
    of course). In fact, we have another EQD on our hands:


    ```

    CONSTRAINT ... ( LP WHERE WEIGHT = 17.0 ) =

    ( HP WHERE WEIGHT = 17.0 ) ;

    ```


    To say it again, the problem in the example is that we’ve allowed two relvars
    to have overlapping predicates. Clearly, then, the principle we’re looking for
    is going to say something along the lines of: Don’t do that! Let’s try and state
    the matter a little more precisely:


    *   **Definition (*****The Principle of Orthogonal Design*****,** **first attempt):**
    If relvars `R1` and `R2` are distinct, then there must not exist a tuple with
    the property that it appears in `R1` if and only if it appears in `R2`.^([^(209)](#fn209))


    The term *orthogonal* here derives from the fact that what the principle effectively
    says is that relvars should be independent of one another—which they won’t be,
    if their meanings overlap in the foregoing sense. *Note:* In what follows, I’ll
    often abbreviate `The Principle of Orthogonality` to just `the orthogonality principle`,
    or sometimes just to `orthogonality`.


    As elsewhere in this book, I might be accused of practicing a tiny deception in
    the foregoing. Take another look at Figure [16-3](#489629_2_En_16_Chapter.xhtml#Fig3);
    in particular, take a look at the tuple for part P2\. That tuple appears in both
    `LP` and `HP` because it represents a true instantiation of the predicate for
    `LP` *and* a true instantiation of the predicate for `HP`. Or does it? The instantiations
    of those predicates for part P2 are actually as follows:


    *   `LP`: *Part P2 is named Bolt, has color Green and weight 17.0 pounds (which
    is less than or equal to 17.0 pounds), and is stored in city Paris.*


    *   `HP`: *Part P2 is named Bolt, has color Green and weight 17.0 pounds (which
    is greater than or equal to 17.0 pounds), and is stored in city Paris.*


    These two propositions aren’t the same! Of course, they’re certainly *equivalent*—but
    in order to recognize that equivalence, we need to know that `17.0 ≤ 17.0` and
    `17.0 ≥ 17.0` are both true, and then we need to apply a little logical reasoning.
    (The point is, what’s obvious to us as human beings isn’t necessarily obvious
    to a machine, and for completeness I really ought to have spelled out the missing
    steps in my argument.).


    Now, adherence to the orthogonality principle in the light vs. heavy parts example
    would certainly avoid the redundancies illustrated in Figure [16-3](#489629_2_En_16_Chapter.xhtml#Fig3).
    Note, however, that the principle as stated applies only to relvars like `LP`
    and `HP` that have the very same heading, because of course it’s impossible for
    the very same tuple to appear in two different relvars if the relvars in question
    have different headings. Thus, you might be thinking the orthogonality principle
    isn’t much use, because it’s probably unusual in practice to have two relvars
    in the same database with the same heading.^([^(210)](#fn210)) And if that were
    all there was to it, then I would probably agree with you; I mean, in that case
    life would be fairly simple and this chapter could stop right here (it might not
    even be worth dignifying such a very obvious rule with the rather grand label
    “principle”). But, of course, there’s quite a lot more to be said on the matter.
    In order to explore the possibilities further, I first need to take a closer look
    at the relationship between tuples and propositions.'
