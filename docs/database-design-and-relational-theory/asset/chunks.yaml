  trans: "\n（换句话说，令 `R1` 与 `R` 恒等。）现在令 `c1` 和 `c2` 都为限制条件 `WEIGHT = 17.0`。那么等式依赖（`R1`\
    \ WHERE `c1`）=（`R2` WHERE `c2`）显然成立，因此该设计违反了正交性。\n\n*注意：* 正如此例所示，只要 `c1` 和 `c2`\
    \ 并非恒假，就必然存在某些元组，当它们代表“真实事实”时，将必然同时出现在 `R1` 和 `R2` 中——本质上，这正是我们希望禁止的情况。（相比之下，如果\
    \ `c1` 和 `c2` 中任一为恒假，则对应的限制——`R1` WHERE `c1` 或 `R2` WHERE `c2`（视情况而定）——将为空，因此也就不会且不可能发生任何正交性违反。）\n\
    \n- 该原则的第二版本涵盖了第一版本，因为我们可以使 `R1` 与 `R` 相同——实际上是通过使重命名操作成为“空操作”来实现，如前一要点项所示。（正如我之前指出的，原则的先前版本确实假设所讨论的关系变量具有相同的标题。然而，正如本节的讨论所表明的，我们不能只关注那种简单情况。）当然，第二版本也解决了\
    \ SP 与 PS 的问题——实际上是通过将 `c1` 和 `c2` 分别简单地设为 TRUE。\n- 回忆第 6 章可知，在逻辑学中，恒假的事物（例如，布尔表达式\
    \ `WEIGHT >= 17.0 AND WEIGHT < 17.0`）被称为*矛盾*。因此，要求 `c1` 和 `c2` 不恒假可以这样表述：`c1`\
    \ 和 `c2` 都不是逻辑意义上的矛盾。\n\n## 重访第一个示例\n\n现在让我们回到最初的驱动示例，其中关系变量 `S` 被垂直分解为它在 `{SNO,\
    \ SNAME, CITY}` 和 `{SNO, STATUS, CITY}` 上的投影 `SNC` 和 `STC`。^(²¹⁵^(#fn215)) （当然，涉及轻型与重型零件的示例是水平分解。）现在观察，虽然\
    \ `SNC` 和 `STC` 的度数相同，但任何给定的元组都不可能同时出现在两者中：`SNC` 中的元组具有 `SNAME` 属性，而 `STC` 中的元组则具有\
    \ `STATUS` 属性。此外，我们无法简单地通过重命名（例如）`SNC` 中的 `SNAME` 属性为 `STATUS` 来生成一个与 `STC` 标题相同的关系变量，因为\
    \ `SNC` 中的 `SNAME` 类型为 `CHAR`，而 `STC` 中的 `STATUS` 类型为 `INTEGER`。（重命名属性改变的是*名称*，而非类型。）由此可见，我们定义正交性原则的第二次尝试仍然不充分；实际上，在当前情况下，它根本不再适用。\n\
    \n现在回顾前述设计的问题：元组 (`s`, `c`) 出现在 `SNC` 在 `{SNO, CITY}` 上的投影中，当且仅当完全相同的元组 (`s`,\
    \ `c`) 出现在 `STC` 在 `{SNO, CITY}` 上的投影中。也就是说，下列等式依赖（EQD）成立：\n\n```\nCONSTRAINT\
    \ ... SNC { SNO , CITY } = STC { SNO , CITY } ;\n```\n\n让我们暂时忽略属性重命名的问题，因为它与本例无关。那么，关于上述等式依赖的关键点在于，它并非在不同的数据库关系变量之间成立，而是在*同一*数据库关系变量的不同*投影*之间成立：具体而言，这些投影源于数据库关系变量\
    \ `S` 的垂直分解。但情况当然不一定如此——我的意思是，`SNC` 和 `STC` 本可以独立定义，作为两个完全不同的关系变量，而从未存在过一个（在设计者心中）等于它们连接的关系变量\
    \ `S`。它们甚至可能不是独立的关系变量本身，而是两个这样的不同关系变量的投影。所有这些引出了定义正交性原则的第三次尝试：\n\n- **定义（正交性设计原则，第三次尝试）**：设关系变量\
    \ `R1` 和 `R2` 是相异的。那么：\n  1. 不能存在一个相对于 `R1`^(²¹⁶^(#fn216)) 不可约的连接依赖 `{X1,...,Xn}`，使得\n\
    \  2. 存在某个 `Xi`（1 <= `i` <= `n`）以及作用于 `R1` 在 `Xi` 上投影（记作 `R1X`）的一个可能为空的属性重命名集，该重命名将\
    \ `R1X` 映射为 `R1Y`，使得\n  3. `R1Y` 与 `R2` 的标题的某个子集 `Y` 具有相同的标题，且\n  4. 下列等式依赖成立：\n\
    \     ```\n     R1Y = R2Y\n     ```\n     （其中 `R2Y` 是 `R2` 在 `Y` 上的投影）。\n\n现在，这一切看起来相当复杂，但基本上只是说明：`R1`\
    \ 的任何无损分解中的任何投影，都不能与 `R2` 的任何投影信息等价。确实，正如你可能看出的，定义中的大部分复杂性（如果有的话）源于需要处理重命名问题。下面这个稍简单的定义版本忽略了该复杂性，可能有助于更清晰地阐明要点：\n\
    \n- **定义（正交性设计原则，第三次尝试，忽略重命名）**：设关系变量 `R1` 和 `R2` 是相异的。那么：\n  1. 不能存在一个相对于 `R1`\
    \ 不可约的连接依赖 `{X1,...,Xn}`，使得\n  2. 存在某个 `Xi`（1 <= `i` <= `n`）与 `R2` 的标题的某个子集 `Y`\
    \ 相同，使得\n  3. 下列等式依赖成立：\n     ```\n     R1Y = R2Y\n     ```\n     （其中 `R1Y` 和\
    \ `R2Y` 分别是 `R1` 和 `R2` 在 `Y` 上的投影）。\n\n现在观察，遵循此第三版本的原则解决了我们驱动示例中的问题，即关系变量 `S`\
    \ 被分解为其在 `{SNO, SNAME, CITY}` 和 `{SNO, STATUS, CITY}` 上的投影 `SNC` 和 `STC`。假设该分解已完成。那么：\n"
- fmt: '1.  The database now contains two distinct relvars, `SNC` and `STC`.


    2.  Thanks to Heath’s Theorem together with the fact that the FD `{SNO} → {SNAME}`
    holds in relvar `SNC`, the JD `☼{{SNO,SNAME},{SNO,CITY}}` holds in—in fact, is
    irreducible with respect to—that relvar `SNC`.


    3.  Thus, the projection of relvar `SNC` on `{SNO,CITY}` is part of a valid nonloss
    decomposition of `SNC`. But an equality dependency holds between that projection
    and the projection of `STC` on those same attributes. Thus, the design violates
    the orthogonality principle as just articulated (the “third attempt”).


    I now observe that this third version of the orthogonality principle lets me take
    care of a piece of unfinished business from Chapter [11](#489629_2_En_11_Chapter.xhtml).
    As you might recall, I pointed out in that chapter that the following JD held
    in relvar `S`, and in fact was irreducible with respect to that relvar:


    ```

    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS , SNAME } }

    ```


    But I also said that decomposing relvar `S` on the basis of this JD wouldn’t be
    a good idea (and Exercise 11.4 asked why not). Well, we can see now that if that
    decomposition is done:


    1.  The database now contains two distinct relvars—I’ll call them `SNC` and `CTN`—with
    headings `{SNO,SNAME,CITY}` and `{CITY,STATUS,SNAME}`, respectively.


    2.  Thanks to Heath’s Theorem together with the fact that the FD `{CITY} → {STATUS}`
    holds in `CTN`—at least, recall that it did as far as Chapter [11](#489629_2_En_11_Chapter.xhtml)
    was concerned—the JD `☼{{CITY,STATUS},{CITY,SNAME}}` holds in, and in fact is
    irreducible with respect to, that relvar `CTN`.


    3.  Thus, the projection of relvar `CTN` on `{CITY,SNAME}` is part of a valid
    nonloss decomposition of `CTN`. But an equality dependency holds between that
    projection and the projection of `SNC` on those same attributes. In other words,
    the design violates the orthogonality principle once again.


    The net of the example is this: Doing a nonloss decomposition on the basis of
    a “bad” JD is contraindicated by virtue of The Principle of Orthogonal Design.
    (The JD in the example is “bad” because attribute `SNAME` could be dropped from
    the `{CITY,STATUS,SNAME}` component without significant loss.) What’s more, one
    consequence of abiding by the orthogonality principle is that the third of the
    normalization principles as given at the beginning of the chapter—viz., that every
    projection should be needed in the reconstruction process—will automatically be
    satisfied (and so there’s a logical connection, of a kind, between orthogonality
    and normalization after all).


    ## The Second Example Revisited


    Unfortunately, the third version of the orthogonality principle as given in the
    previous section is still missing something, and revisiting the light vs. heavy
    parts example shows what it is: It’s missing that business about restrictions.
    (In that example, the equality dependency wasn’t between database relvars as such,
    nor between projections of such relvars, but rather between certain restrictions
    of such relvars.) In other words, the third version of the principle failed to
    subsume the second version. By contrast, the following formulation takes care
    of both the restriction issue and the projection issue:


    **Definition (The Principle of Orthogonal Design, fourth attempt):** Let relvars
    `R1` and `R2` be distinct. Then:


    1.  There must not exist a JD `☼{X1,...,Xn}` that’s irreducible with respect to
    `R1` such that


    2.  There exists some `Xi` (1 ≤ `i` ≤ `n`) and some possibly empty set of attribute
    renamings on the projection, `R1X` say, of `R1` on `Xi` that maps `R1X` into `R1Y`,
    say, such that


    3.  `R1Y` has the same heading as some subset `Y` of the heading of `R2`, such
    that


    4.  There exist restriction conditions `c1` and `c2`, neither of which is identically
    false, such that


    5.  The following equality dependency holds:


    ```

    ( R1Y WHERE c1 ) = ( R2Y WHERE c2 )

    ```


    (where `R2Y` is the projection of `R2` on `Y`).


    ## The Final Version (?)


    Believe it or not, there’s still a problem … Consider a version of the suppliers
    relvar—I’ll call it `SCC`—with attributes `SNO`, `CITYA`, and `CITYB`. Let `SCC`
    be subject to the constraint that for any given supplier, the `CITYA` and `CITYB`
    values are identical. *Result:* Redundancy! Of course, this is a crazy design,
    but it’s a possible one, and it would be nice to extend the orthogonality principle
    to take care of (i.e., prohibit) such designs also. And the following final (?)
    formulation should do the trick (I’ll leave it as an exercise for you to figure
    out exactly how):


    **Definition (The Principle of Orthogonal Design, “final” version):** Let `R1`
    and `R2` be relvars (not necessarily distinct). Then:


    1.  There must not exist a JD `☼{X1,...,Xn}` that’s irreducible with respect to
    `R1` such that


    2.  There exists some `Xi` (1 ≤ `i` ≤ `n`) and some possibly empty set of attribute
    renamings on the projection, `R1X` say, of `R1` on `Xi` that maps `R1X` into `R1Y`,
    say, such that


    3.  `R1Y` has the same heading as some subset `Y` (distinct from `Xi`, if `R1`
    and `R2` are one and the same) of the heading of `R2`, such that


    4.  There exist restriction conditions `c1` and `c2`, neither of which is identically
    false, such that


    5.  The following equality dependency holds:


    ```

    ( R1Y WHERE c1 ) = ( R2Y WHERE c2 )

    ```


    (where `R2Y` is the projection of `R2` on `Y`).


    This version of the principle subsumes all previous versions.'
