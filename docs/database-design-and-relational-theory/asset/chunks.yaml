  trans: "# 博伊斯-科德范式\n\n正如我之前提到的，博伊斯-科德范式（BCNF）是针对函数依赖（FDs）的范式——但现在我可以精确地定义它：\n\n\
    *   **定义（博伊斯-科德范式）：** 当且仅当对于关系变量 `R` 中成立的每一个非平凡函数依赖 `X` → `Y`，以下条件成立时，该关系变量才符合博伊斯-科德范式（BCNF）：\n\
    \    1.  `X` 是一个超键。\n\n由此产生的一些要点：\n\n*   根据定义可知，在一个符合 BCNF 的关系变量中，唯一成立的函数依赖要么是平凡的（显然，我们无法消除这些），要么是源自超键的函数依赖（这些我们同样无法消除）。或者，正如一些人喜欢说的那样：*每个事实都是关于键、整个键、且仅关于键的事实*——尽管我必须立刻补充一点，这种非正式的描述虽然直观上很吸引人，但其实并不准确，因为它（除其他假设外）假设了只有一个键。\n\
    *   该定义并未提及第二范式（2NF）或第三范式（3NF）。然而请注意，通过去掉条件 (b)（“`Y` 是子键”），可以从 3NF 的定义推导出 BCNF\
    \ 的定义。由此可知，BCNF 蕴含着 3NF——也就是说，如果一个关系变量符合 BCNF，那么它必然也符合 3NF。\n\n作为一个符合 3NF 但不符合\
    \ BCNF 的关系变量示例，考虑一个修订版的发货关系变量——我们称之为 `SNP`——它增加了一个属性 `SNAME`，代表相应供应商的名称。同时假设供应商名称必然是唯一的（即，任何时候都没有两个供应商拥有相同的名称）。以下是一些示例元组：\n\
    \n![../images/489629_2_En_4_Chapter/489629_2_En_4_Figb_HTML.jpg](img/489629_2_En_4_Figb_HTML.jpg)\n\
    \n我们再次观察到一些冗余：每个供应商 `S1` 的元组都告诉我们 `S1` 的名字是 `Smith`，每个供应商 `S2` 的元组都告诉我们 `S2` 的名字是\
    \ `Jones`，等等；同样地，每个 `Smith` 的元组都告诉我们 `Smith` 的供应商编号是 `S1`，每个 `Jones` 的元组都告诉我们\
    \ `Jones` 的供应商编号是 `S2`，等等。而且该关系变量不符合 BCNF。首先，它有两个键：`{SNO,PNO}` 和 `{SNAME,PNO}`^(⁶²)。其次，标题的每一个子集——特别是子集\
    \ `{QTY}`——当然都函数依赖于这两个键。然而第三，函数依赖 `{SNO}` → `{SNAME}` 和 `{SNAME}` → `{SNO}` 也成立；这些函数依赖肯定不是平凡的，也不是源自超键的箭头，因此该关系变量不符合\
    \ BCNF（尽管它符合 3NF）。\n\n最后，我相信你知道，规范化的规则是：如果关系变量 `R` 不符合 BCNF，那么就将其分解为符合 BCNF 的投影。对于关系变量\
    \ `SNP`，以下两种分解中的任何一种都能满足这个目标：\n\n*   投影到 `{SNO,SNAME}` 和 `{SNO,PNO,QTY}` 上\n*\
    \   投影到 `{SNO,SNAME}` 和 `{SNAME,PNO,QTY}` 上\n\n我现在可以解释为什么 BCNF 是个例外，可以这么说，它没有被简单地称为“第\
    \ n 范式”（其中 *n* 是某个数字）。引用科德首次描述这一新范式的论文^(⁶³)：\n\n*   最近，博伊斯和科德提出了以下定义：一个[关系变量]\
    \ `R` 符合第三范式，当且仅当它符合第一范式，并且对于 `R` 的每一个属性集合 `C`，如果任何不在 `C` 中的属性函数依赖于 `C`，那么 `R`\
    \ 中的所有属性都函数依赖于 `C` [*换句话说，`C` 是一个超键*]。\n\n所以，科德在这里给出的是他认为的关于*第三*范式的“新改进版”定义。但问题是，这个新定义比旧定义更严格（过去和现在都是如此）；也就是说，任何根据新定义符合\
    \ 3NF 的关系变量，根据旧定义也必然符合 3NF，但反之则不成立——一个关系变量可能根据旧定义符合 3NF，但根据新定义却不符合（上面讨论的关系变量 `SNP`\
    \ 就是一个例子）。因此，那个“新改进版”定义真正定义的是一个新的、更强的范式，因此需要一个自己独特的名称。然而，当这一点被充分认识到时，法金已经定义了他所谓的第四范式，所以*那个*名字就不可用了^(⁶⁴)。因此就有了这个异常的名称*博伊斯-科德范式*。\n\
    \n## 练习\n\n1.  在关系变量 `SP` 中成立的函数依赖有多少个？哪些是平凡的？哪些是不可约的？\n2.  函数依赖的概念依赖于元组相等的概念，这是真的吗？\n\
    3.  从你自己的工作环境中给出例子：(a) 一个不符合 2NF 的关系变量；(b) 一个符合 3NF 但不符合 2NF 的关系变量；(c) 一个符合 BCNF\
    \ 但不符合 3NF 的关系变量。\n4.  证明本章正文中给出的两个 2NF 定义在逻辑上是等价的。\n5.  如果一个关系变量不符合 2NF，那么它一定有一个复合键，这是真的吗？\n\
    6.  每个二元关系变量都符合 BCNF，这是真的吗？\n7.  （*同练习 1.4*）每个“全键”关系变量都符合 BCNF，这是真的吗？\n8.  编写\
    \ `Tutorial D` 的 `CONSTRAINT` 语句，以表达函数依赖对 `{SNO}` → `{SNAME}` 和 `{SNAME}` → `{SNO}`\
    \ 在关系变量 `SNP` 中成立的事实（参见“博伊斯-科德范式”一节）。\n    *注意：* 这是任何章节中第一个要求你用 `Tutorial D` 给出答案的练习。当然，我意识到你可能并不完全熟悉这门语言；因此，在所有此类练习中——例如，下面的练习\
    \ 4.14 和 4.15——请尽力而为。我确实认为至少尝试一下这些问题是值得的。\n9.  设 `R` 是一个度数为 *n* 的关系变量。在 `R` 中可能成立的函数依赖（包括平凡和非平凡的）的最大数量是多少？它最多可以有多少个键？\n\
    10. 鉴于函数依赖 `X` → `Y` 中的 `X` 和 `Y` 都是属性集合，如果其中任何一个集合为空会发生什么？\n11. 你能想到一种情况，其中拥有一个带有关系值属性（RVA）的基本关系变量确实是合理的吗？\n\
    12. 近年来，业界关于*XML 数据库*的可能性有很多讨论。但 XML 文档本质上是层次结构的；那么你认为正文中对层次结构的批评是否适用于 XML 数据库？（嗯，是的，正如我在本章前面的脚注\
    \ 4 中指出的那样。那么你得出什么结论？）\n13. 在第 1 章中，我说过我会在关系的表格化图片中用双下划线标出主键属性。然而，在那时，我还没有恰当地讨论关系和关系变量之间的区别，而现在我们知道键通常适用于关系变量，而不是关系。但是，从那以后我们已经看到了几个表示关系本身的表格化图片（我指的是那些不仅仅是某个关系变量样本值的关系）——例如，参见图\
    \ 4-1 有三个例子^(⁶⁵)——而且我肯定在这些图片中使用了双下划线约定。那么，现在我们可以对这个约定说些什么呢？\n14. 针对图 4-1 所示的关系，给出以下查询的\
    \ `Tutorial D` 表述：\n    1.  获取由供应商 `S2` 供应的零件的零件号。\n    ```\n    ( SNO S2 ) {\
    \ PNO }\n    ```\n    2.  获取供应零件 `P2` 的供应商的供应商号。\n    ```\n    ( PNO P2 ) { SNO\
    \ }\n    ```\n15. 假设我们需要更新数据库以表明供应商 `S2` 以 500 的数量供应零件 `P5`。针对以下设计给出所需更新的 `Tutorial\
    \ D` 表述：(a) 图 1-1 的非 RVA 设计，(b) 图 4-1 的 RVA 设计。\n16. 给定图 4-1 所示的 RVA 设计，请尽可能精确地陈述相应的关系变量谓词。"
- fmt: "# 17. Here are some definitions of 1NF from the technical literature. In view\
    \ of the discussion of such matters in the body of the present chapter, do you\
    \ have any comments on them?\n\n### Definitions of First Normal Form\n\n*   **First\
    \ normal form** (1NF) … states that the domain of an attribute must include only\
    \ *atomic* (simple, indivisible) *values* and that the value of any attribute\
    \ in a tuple must be a *single value* from the domain of that attribute … 1NF\
    \ disallows having a set of values, a tuple of values, or a combination of both\
    \ as an attribute value for a *single tuple …* 1NF disallows “relations within\
    \ relations” or “relations as attribute values within tuples” … the only attribute\
    \ values permitted by 1NF are single **atomic** (or **indivisible**) values (Ramez\
    \ Elmasri and Shamkant B. Navathe, *Fundamentals of Database Systems*, 4th edition,\
    \ Addison-Wesley, 2004)\n\n*   A relation is in **first normal form** if every\
    \ field contains only atomic values, that is, no lists or sets (Raghu Ramakrishnan\
    \ and Johannes Gehrke, *Database Management Systems*, 3rd edition, McGraw-Hill,\
    \ 2003)\n\n*   *First normal form* is simply the condition that every component\
    \ of every tuple is an atomic value (Hector Garcia-Molina, Jeffrey D. Ullman,\
    \ and Jennifer Widom, *Database Systems: The Complete Book*, Prentice Hall, 2002)\n\
    \n*   A domain is **atomic** if elements of the domain are considered to be indivisible\
    \ units … we say that a relation schema *R* is in **first normal form** (1NF)\
    \ if the domains of all attributes of *R* are atomic (Abraham Silberschatz, Henry\
    \ F. Korth, and S. Sudarshan, *Database System Concepts*, 4th edition, McGraw-Hill,\
    \ 2002)\n\n*   A relation is said to be in **first normal form** (abbreviated\
    \ 1NF) if and only if it satisfies the condition that it contains scalar values\
    \ only (C. J. Date, *An Introduction to Database Systems*, 6th edition, Addison-Wesley,\
    \ 1995)\n\n## Answers\n\n1.  The complete set of FDs—what’s known, formally, as\
    \ the *closure* (see Chapter [7](#489629_2_En_7_Chapter.xhtml)), though it has\
    \ nothing to do with the closure property of the relational algebra—for relvar\
    \ `SP` contains a total of 31 distinct FDs, as follows:\n\n    ```\n    { SNO\
    \ , PNO , QTY } → { SNO , PNO , QTY }\n    { SNO , PNO , QTY } → { SNO , PNO }\n\
    \    { SNO , PNO , QTY } → { SNO , QTY }\n    { SNO , PNO , QTY } → { PNO , QTY\
    \ }\n    { SNO , PNO , QTY } → { SNO }\n    { SNO , PNO , QTY } → { PNO }\n  \
    \  { SNO , PNO , QTY } → { QTY }\n    { SNO , PNO , QTY } → { }\n    { SNO , PNO\
    \ }       → { SNO , PNO , QTY }\n    { SNO , PNO }       → { SNO , PNO }\n   \
    \ { SNO , PNO }       → { SNO , QTY }\n    { SNO , PNO }       → { PNO , QTY }\n\
    \    { SNO , PNO }       → { SNO }\n    { SNO , PNO }       → { PNO }\n    { SNO\
    \ , PNO }       → { QTY }\n    { SNO , PNO }       → { }\n    { SNO , QTY }  \
    \     → { SNO , QTY }\n    { SNO , QTY }       → { SNO }\n    { SNO , QTY }  \
    \     → { QTY }\n    { SNO , QTY }       → { }\n    { PNO , QTY }       → { PNO\
    \ , QTY }\n    { PNO , QTY }       → { PNO }\n    { PNO , QTY }       → { QTY\
    \ }\n    { PNO , QTY }       → { }\n    { SNO }             → { SNO }\n    { SNO\
    \ }             → { }\n    { PNO }             → { PNO }\n    { PNO }        \
    \     → { }\n    { QTY }             → { QTY }\n    { QTY }             → { }\n\
    \    { }                 → { }\n    ```\n\n    Of these, the only ones that aren’t\
    \ trivial are the following four:\n\n    ```\n    { SNO , PNO } → { SNO , PNO\
    \ , QTY }\n    { SNO , PNO } → { SNO , QTY }\n    { SNO , PNO } → { PNO , QTY\
    \ }\n    { SNO , PNO } → { QTY }\n    ```\n\n    And the only ones that are irreducible\
    \ are the following eleven:\n\n    ```\n    { SNO , PNO } → { SNO , PNO , QTY\
    \ }\n    { SNO , PNO } → { SNO , PNO }\n    { SNO , PNO } → { SNO , QTY }\n  \
    \  { SNO , PNO } → { PNO , QTY }\n    { SNO , PNO } → { QTY }\n    { SNO , QTY\
    \ } → { SNO , QTY }\n    { PNO , QTY } → { PNO , QTY }\n    { SNO }       → {\
    \ SNO }\n    { PNO }       → { PNO }\n    { QTY }       → { QTY }\n    { }   \
    \        → { }\n    ```\n\n2.  Yes, it is (“whenever two tuples agree on *X*,\
    \ they also agree on *Y*” implies an equality comparison between the projections\
    \ of the tuples in question on the attributes of *X* and *Y*, respectively, and\
    \ those two projections in turn are themselves tuples). *Note:* See the answer\
    \ to Exercise 2.10 in Chapter [2](#489629_2_En_2_Chapter.xhtml) regarding the\
    \ notion of tuple equality in general.\n\n3.  *No answer provided.*\n\n4.  First\
    \ of all, here again are the two definitions, numbered for purposes of subsequent\
    \ reference:\n    1.  Relvar *R* is in 2NF if and only if, for every key *K* of\
    \ *R* and every nonkey attribute *A* of *R*, the FD *K* → {*A*} is irreducible.\n\
    \    2.  Relvar *R* is in 2NF if and only if, for every nontrivial FD *X* → *Y*\
    \ that holds in *R*, at least one of the following is true: (a) *X* is a superkey;\
    \ (b) *Y* is a subkey; (c) *X* is not a subkey.\n\n    Let *R* not be in 2NF by\
    \ Definition 1. Then there exists an FD—nontrivial by definition—*K* → {*A*},\
    \ where *K* is a key of *R* and *A* is a nonkey attribute of *R*, that holds in\
    \ *R* and is reducible. Since it’s reducible, the (also nontrivial) FD *X* → {*A*}\
    \ holds in *R* for some proper subkey *X* (*X* ⊂ *K*). Thus, denoting {*A*} by\
    \ *Y*, we have a nontrivial FD *X* → *Y* that holds in *R* such that *X* isn’t\
    \ a superkey, *Y* isn’t a subkey, and *X* is a subkey. So R isn’t in 2NF by Definition\
    \ 2. So, loosely, Definition 2 implies Definition 1.^(66)\n\n    Now let *R* not\
    \ be in 2NF by Definition 2. Then there exists a nontrivial FD *X* → *Y* (*F*,\
    \ say) that holds in *R*, such that *X* isn’t a superkey, *Y* isn’t a subkey,\
    \ and *X* is a subkey. But if *X* is a subkey and not a superkey, it must be a\
    \ *proper* subkey of some key *K*. Now there are two cases to consider:\n    1.\
    \  *Y* contains a nonkey attribute *A*. In this case *K* → {*A*} holds in *R*\
    \ but is reducible, and so *R* isn’t in 2NF by Definition 1; so, again loosely,\
    \ Definition 1 implies Definition 2."
  raw: "17.  Here are some definitions of 1NF from the technical literature. In view\
    \ of the discussion of such matters in the body of the present chapter, do you\
    \ have any comments on them?\n    *   **First normal form** (1NF) … states that\
    \ the domain of an attribute must include only *atomic* (simple, indivisible)\
    \ *values* and that the value of any attribute in a tuple must be a *single value*\
    \ from the domain of that attribute … 1NF disallows having a set of values, a\
    \ tuple of values, or a combination of both as an attribute value for a *single\
    \ tuple …* 1NF disallows “relations within relations” or “relations as attribute\
    \ values within tuples” … the only attribute values permitted by 1NF are single\
    \ **atomic** (or **indivisible**) values (Ramez Elmasri and Shamkant B. Navathe,\
    \ *Fundamentals of Database Systems*, 4th edition, Addison-Wesley, 2004)\n\n*\
    \   A relation is in **first normal form** if every field contains only atomic\
    \ values, that is, no lists or sets (Raghu Ramakrishnan and Johannes Gehrke, *Database\
    \ Management Systems*, 3rd edition, McGraw-Hill, 2003)\n\n*   *First normal form*\
    \ is simply the condition that every component of every tuple is an atomic value\
    \ (Hector Garcia-Molina, Jeffrey D. Ullman, and Jennifer Widom, *Database Systems:\
    \ The Complete Book*, Prentice Hall, 2002)\n\n*   A domain is **atomic** if elements\
    \ of the domain are considered to be indivisible units … we say that a relation\
    \ schema *R* is in **first normal form** (1NF) if the domains of all attributes\
    \ of *R* are atomic (Abraham Silberschatz, Henry F. Korth, and S. Sudarshan, *Database\
    \ System Concepts*, 4th edition, McGraw-Hill, 2002)\n\n*   A relation is said\
    \ to be in **first normal form** (abbreviated 1NF) if and only if it satisfies\
    \ the condition that it contains scalar values only (C. J. Date, *An Introduction\
    \ to Database Systems*, 6th edition, Addison-Wesley, 1995)\n\n## Answers\n\n1.\
    \  The complete set of FDs—what’s known, formally, as the *closure* (see Chapter\
    \ [7](#489629_2_En_7_Chapter.xhtml)), though it has nothing to do with the closure\
    \ property of the relational algebra—for relvar SP contains a total of 31 distinct\
    \ FDs, as follows:\n\n```\n    { SNO , PNO , QTY } → { SNO , PNO , QTY }\n   \
    \ { SNO , PNO , QTY } → { SNO , PNO }\n    { SNO , PNO , QTY } → { SNO , QTY }\n\
    \    { SNO , PNO , QTY } → { PNO , QTY }\n    { SNO , PNO , QTY } → { SNO }\n\
    \    { SNO , PNO , QTY } → { PNO }\n    { SNO , PNO , QTY } → { QTY }\n    { SNO\
    \ , PNO , QTY } → { }\n    { SNO , PNO }       → { SNO , PNO , QTY }\n    { SNO\
    \ , PNO }       → { SNO , PNO }\n    { SNO , PNO }       → { SNO , QTY }\n   \
    \ { SNO , PNO }       → { PNO , QTY }\n    { SNO , PNO }       → { SNO }\n   \
    \ { SNO , PNO }       → { PNO }\n    { SNO , PNO }       → { QTY }\n    { SNO\
    \ , PNO }       → { }\n    { SNO , QTY }       → { SNO , QTY }\n    { SNO , QTY\
    \ }       → { SNO }\n    { SNO , QTY }       → { QTY }\n    { SNO , QTY }    \
    \   → { }\n    { PNO , QTY }       → { PNO , QTY }\n    { PNO , QTY }       →\
    \ { PNO }\n    { PNO , QTY }       → { QTY }\n    { PNO , QTY }       → { }\n\
    \    { SNO }             → { SNO }\n    { SNO }             → { }\n    { PNO }\
    \             → { PNO }\n    { PNO }             → { }\n    { QTY }          \
    \   → { QTY }\n    { QTY }             → { }\n    { }                 → { }\n\
    \    ```\n\nOf these, the only ones that aren’t trivial are the following four:\n\
    \n```\n    { SNO , PNO } → { SNO , PNO , QTY }\n    { SNO , PNO } → { SNO , QTY\
    \ }\n    { SNO , PNO } → { PNO , QTY }\n    { SNO , PNO } → { QTY }\n    ```\n\
    \nAnd the only ones that are irreducible are the following eleven:\n\n```\n  \
    \  { SNO , PNO } → { SNO , PNO , QTY }\n    { SNO , PNO } → { SNO , PNO }\n  \
    \  { SNO , PNO } → { SNO , QTY }\n    { SNO , PNO } → { PNO , QTY }\n    { SNO\
    \ , PNO } → { QTY }\n    { SNO , QTY } → { SNO , QTY }\n    { PNO , QTY } → {\
    \ PNO , QTY }\n    { SNO }       → { SNO }\n    { PNO }       → { PNO }\n    {\
    \ QTY }       → { QTY }\n    { }           → { }\n    ```\n\n2.  Yes, it is (“whenever\
    \ two tuples agree on *X*, they also agree on *Y*” implies an equality comparison\
    \ between the projections of the tuples in question on the attributes of *X* and\
    \ *Y*, respectively, and those two projections in turn are themselves tuples).\
    \ *Note:* See the answer to Exercise 2.10 in Chapter [2](#489629_2_En_2_Chapter.xhtml)\
    \ regarding the notion of tuple equality in general.\n\n3.  *No answer provided.*\n\
    \n4.  First of all, here again are the two definitions, numbered for purposes\
    \ of subsequent reference:\n    1.  Relvar *R* is in 2NF if and only if, for every\
    \ key *K* of *R* and every nonkey attribute *A* of *R*, the FD *K* → {*A*} is\
    \ irreducible.\n\n2.  Relvar *R* is in 2NF if and only if, for every nontrivial\
    \ FD *X* → *Y* that holds in *R*, at least one of the following is true: (a) *X*\
    \ is a superkey; (b) *Y* is a subkey; (c) *X* is not a subkey.\n\nLet *R* not\
    \ be in 2NF by Definition 1\\. Then there exists an FD—nontrivial by definition—*K*\
    \ → {*A*}, where *K* is a key of *R* and *A* is a nonkey attribute of *R*, that\
    \ holds in *R* and is reducible. Since it’s reducible, the (also nontrivial) FD\
    \ *X* → {*A*} holds in *R* for some proper subkey *X* (*X* ⊂ *K*). Thus, denoting\
    \ {*A*} by *Y*, we have a nontrivial FD *X* → *Y* that holds in *R* such that\
    \ *X* isn’t a superkey, *Y* isn’t a subkey, and *X* is a subkey. So R isn’t in\
    \ 2NF by Definition 2\\. So, loosely, Definition 2 implies Definition 1.^([^(66)](#fn66))\n\
    \nNow let *R* not be in 2NF by Definition 2\\. Then there exists a nontrivial\
    \ FD *X* → *Y* (*F*, say) that holds in *R*, such that *X* isn’t a superkey, *Y*\
    \ isn’t a subkey, and *X* is a subkey. But if *X* is a subkey and not a superkey,\
    \ it must be a *proper* subkey of some key *K*. Now there are two cases to consider:\n\
    \    1.  *Y* contains a nonkey attribute *A*. In this case *K* → {*A*} holds in\
    \ *R* but is reducible, and so *R* isn’t in 2NF by Definition 1; so, again loosely,\
    \ Definition 1 implies Definition 2."
  trans: "\n# 17. 以下是技术文献中对 1NF 的一些定义。鉴于本章正文中对这些问题的讨论，您对此有何评论？\n\n### 第一范式的定义\n\n\
    *   **第一范式**（1NF）……规定属性的域必须只包含*原子*（简单、不可分割的）*值*，并且任何元组中任何属性的值必须是该属性域中的一个*单值*……1NF\
    \ 不允许将一组值、一个值元组或两者的组合作为*单个元组*的属性值……1NF 不允许“关系中的关系”或“作为元组中属性值的关系”……1NF 允许的唯一属性值是单个**原子**（或**不可分割**）的值（Ramez\
    \ Elmasri 和 Shamkant B. Navathe，《数据库系统基础》，第 4 版，Addison-Wesley，2004 年）\n\n*  \
    \ 如果一个关系中的每个字段只包含原子值，即没有列表或集合，则该关系处于**第一范式**（Raghu Ramakrishnan 和 Johannes Gehrke，《数据库管理系统》，第\
    \ 3 版，McGraw-Hill，2003 年）\n\n*   *第一范式* 就是这样一个条件：每个元组的每个分量都是一个原子值（Hector Garcia-Molina,\
    \ Jeffrey D. Ullman, 和 Jennifer Widom，《数据库系统：全书》，Prentice Hall，2002 年）\n\n*  \
    \ 如果一个域的元素被认为是不可分割的单位，则该域是**原子的**……如果关系模式 *R* 的所有属性的域都是原子的，我们称该关系模式 *R* 处于**第一范式**（1NF）（Abraham\
    \ Silberschatz, Henry F. Korth, 和 S. Sudarshan，《数据库系统概念》，第 4 版，McGraw-Hill，2002\
    \ 年）\n\n*   当且仅当一个关系满足其仅包含标量值这一条件时，才称该关系处于**第一范式**（缩写为 1NF）（C. J. Date，《数据库系统导论》，第\
    \ 6 版，Addison-Wesley，1995 年）\n\n## 答案\n\n1.  关系变量 `SP` 的完整函数依赖集——形式上称为*闭包*（参见第\
    \ 7 章），尽管它与关系代数的闭包性质无关——总共包含 31 个不同的 FD，如下所示：\n\n    ```\n    { SNO , PNO , QTY\
