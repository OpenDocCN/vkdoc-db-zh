  trans: '

    ### 我们的选择


    在 Fagin、Darwen 和我完成了我们关于 `ETNF` 的主体工作之后，我们的注意力被引向 Millist Vincent 的一篇论文，^(¹⁷²)
    特别是注意到我们最初的名字“无冗余范式”（`RFNF`）已经被 Vincent 用来指代别的东西。既然这个名字已被占用，我们当然必须另选一个，最终我们选择了“基本元组范式”（`ETNF`）。以下是我们做出此选择的理由。令
    `R` 为一个关系变量（relvar），`r` 为 `R` 的一个值，`t` 为 `r` 中的一个元组。那么我们定义 `t` 在 `r` 中是*部分*还是*完全*冗余的，如下所示：


    *   **定义（部分冗余元组）：** 当且仅当存在一个 `FD` `X → Y` 在 `R` 中成立，并且存在一个 `r` 中的元组 `t′`（`t ≠
    t′`）使得 `t{X} = t′{X}` 时，元组 `t` 在 `r` 中是部分冗余的。

    *   **定义（完全冗余元组）：** 当且仅当存在一个 `r` 中的元组集合 `s`（`t ∉ s`），使得根据 `R` 的某个 `JD`，`s` 中的元组迫使
    `t` 出现在 `r` 中时，元组 `t` 在 `r` 中是完全冗余的。


    然后我们继续定义，当且仅当 `t` 在 `r` 中是部分冗余或完全冗余时，`t` 在 `r` 中是冗余的。现在，这一点应该立即显而易见：

    1.  存在这样的 `r` 和 `t`，且 `t` 在 `r` 中是部分冗余的，当且仅当 `R` 是 `FD` 冗余的。

    2.  存在这样的 `r` 和 `t`，且 `t` 在 `r` 中是完全冗余的，当且仅当 `R` 是 `JD` 冗余的。^(¹⁷³)


    因此，将*基本*视为*冗余*的反义词，我们定义 (a) 当且仅当 `t` 在 `r` 中不是冗余的时，`t` 在 `r` 中是基本的；以及 (b) 当且仅当
    `R` 的每一个合法值关系 `r` 中的每一个元组在上述意义上都是基本的时，`R` 处于 `ETNF` 范式中。^(¹⁷⁴)


    ## 无冗余范式


    现在我来谈谈 Vincent 的 `RFNF`。考虑我们常用的供应商关系变量 `S`，其属性为 `SNO`、`SNAME`、`STATUS` 和 `CITY`；唯一键是
    `{SNO}`；显式的 `FD {CITY} → {STATUS}`。一个示例值如图 13-2 所示（基本上只是第 3 章图 3-1 的重复）：


    ![../images/489629_2_En_13_Chapter/489629_2_En_13_Fig2_HTML.jpg](img/489629_2_En_13_Fig2_HTML.jpg)


    图 13-2 供应商关系变量 — 示例值


    现在，图中供应商 `S1` 的元组所在城市为 `London`，状态为 `20`。因此，同样城市为 `London` 的供应商 `S4` 的元组的状态*必须*是
    `20`，否则将违反 `FD {CITY} → {STATUS}`。因此，在某种意义上，状态值 `20` 在供应商 `S4` 的元组中的出现是冗余的，因为它不可能是其他任何值——它是整个关系中其他地方出现的值的逻辑结果，并由这些值完全确定。


    上述例子为以下直观上颇具吸引力的定义（归功于 Vincent，但此处已做大量转述）提供了动机：


    *   **定义（根据 Vincent 的冗余）：** 令关系 `r` 是关系变量 `R` 的一个值，`t` 是 `r` 中的一个元组，`v` 是 `t`
    中的一个属性值。那么，`v` 在 `t` 中的此次出现在 `r` 中是冗余的，并且 `R` 受制于冗余，当且仅当将 `v` 的这次出现替换为 `v′`（`v′
    ≠ v`）的一次出现，同时保持其他一切不变，会导致 `R` 的某个依赖^(¹⁷⁵) 被违反。


    换句话说，如果所讨论的属性值出现*必须*是 `v` 而不能是其他任何值，那么 Vincent 的这种冗余就存在。顺便注意，一个包含部分冗余元组（根据我们的定义）的关系，无疑会表现出
    Vincent 的这种冗余。


    尽管我说过上述定义在直观上很有吸引力（我也确实这么认为），但我应该指出，至少在一个方面它也有点奇怪。再次考虑图 13-2 的例子，其中供应商 `S4` 的元组必须具有状态值
    `20`，因为供应商 `S1` 的元组状态值是 `20`。现在请注意，反向论证同样成立：供应商 `S1` 的元组必须具有状态值 `20`，因为供应商 `S4`
    的元组状态值是 `20`！现在，说这两个 `20` *都*是冗余的（是吗？）肯定没有意义——但如果我们按字面意思理解定义，它就是这么说的。因此，在我看来，这个定义稍显薄弱，可以稍加收紧。如果你有兴趣，我将此留作练习，由你来提出这样一个更精确的定义。


    无论如何，让我们约定将这样定义的冗余称为“按 Vincent 定义的冗余”。然后我们可以定义一个新的范式，如下所示：


    *   **定义（无冗余范式）：** 当且仅当关系变量 `R` 不受制于按 Vincent 定义的冗余时，它处于无冗余范式（`RFNF`）。^(¹⁷⁶)


    现在，我希望显而易见的是，一个不处于 `4NF` 的关系变量，按照上述定义，也不处于 `RFNF`。^(¹⁷⁷) 但是，一个处于 `ETNF` 的关系变量呢？那么，请再次考虑前一节（关于
    `ETNF`）中的关系变量 `SPJ′` 的例子。如你所忆，该关系变量既不受 `FD` 冗余之苦，也不受 `JD` 冗余之苦，因此处于 `ETNF`（尽管不在
    `5NF` 中）。现在，我们在前面那一节中看到，如果该关系变量包含以下三个元组：


    ```

    t1  :  s1  p1  j2

    t2  :  s1  p2  j1

    t3  :  s2  p1  j1

    ```


    ——那么以下元组也必须出现：


    ```

    t4  :  s1  p1  j1

    ```


    但是 `{SNO,PNO}` 是一个键；因此可以推出 (a) 元组 `t1` 和 `t4`，由于它们具有相同的键值，实际上是同一个元组，因此 (b) `j1
    = j2`。然而，现在请注意，`t1` 中的 `j2` 必须等于 `j1` 这一事实本身就意味着该关系变量受制于按 Vincent 定义的冗余！^(¹⁷⁸)
    由此可见，`RFNF` 和 `ETNF` 在逻辑上是不同的；事实上，`RFNF` 比 `ETNF` 更强，其含义是，一个关系变量可以处于 `ETNF`——因此按我们的定义是无冗余的——而不处于
    `RFNF`，但反之则不然。事实上，`ETNF` 论文证明了以下更强的结果：


    *   **定理：** `5NF ⇒ RFNF ⇒ ETNF ⇒ 4NF`，而所有反向蕴涵均不成立。


    因此，请注意，`ETNF` 严格介于 `4NF` 和 `RFNF` 之间。Vincent 还证明了以下有用的结果：


    *   **定理：** 当且仅当关系变量 `R` 处于 `BCNF`，并且对于在 `R` 中成立的每一个 `JD` `J`，其超键于 `R` 的那些分量的并集等于
    `R` 的标题时，`R` 处于 `RFNF`。


    Vincent 在这里实际做的是：他定义关系变量 `R` 处于另一种他称之为键完备范式（`KCNF`）的范式中，当且仅当它满足所述条件（即，当且仅当 `R`
    处于 `BCNF`，并且对于在 `R` 中成立的每一个 `JD` `J`，其超键于 `R` 的那些分量的并集等于 `R` 的标题）。然后他继续证明 `KCNF`
    和 `RFNF` 实际上是一回事。换句话说，他最初的 `RFNF` 定义是一个语义定义，而他的 `KCNF` 定义——实际上就是上述定理——是一个操作性或语法的定义。

