    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figa_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figa_HTML.jpg)'
  trans: '

    还有另一个新的操作符，`UNPACK`，它可以说是“反其道而行之”；也就是说，给定如图 14-1 所示（或如图 14-2 所示）的关系作为输入，它会产生一个关系，其中的`DURING`值都是尽可能小的区间（换句话说，它们是*单元区间*）。例如，将以下表达式应用于图
    14-1 所示的关系：


    ```sql

    UNPACK S_DURING ON ( DURING )

    ```


    —会产生如下图 14-3 所示的结果。该结果是图 14-1 所示关系的*解包形式*（也是图 14-2 所示关系的解包形式，我希望这应该是显而易见的）。


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig3_HTML.jpg](img/489629_2_En_14_Fig3_HTML.jpg)


    图 14-3：图 14-1 和图 14-2 中关系的解包形式


    图 14-3 所示的关系在信息上等价于图 14-1 和图 14-2 中的每一个关系。更重要的是，和图 14-2 中的关系一样，它没有冗余问题（尽管和图 14-1
    中的关系一样，它确实明显存在冗余表述的问题）。


    现在，根据我目前所说的，你可能会认为，要避免那些冗余和冗余表述的问题，我们只需要确保关系变量始终保持为打包形式即可。(¹⁹⁴) 然而，不幸的是，打包形式虽然是解决方案的一部分，但不足以完全解决问题，下面的例子说明了原因。考虑图
    14-4，它显示了一个名为`SCT_DURING`的关系变量的样本值，其谓词如下：*供应商`SNO`在整个区间`DURING`内都位于城市`CITY`并具有状态`STATUS`。*


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig4_HTML.jpg](img/489629_2_En_14_Fig4_HTML.jpg)


    图 14-4：关系变量 `SCT_DURING` — 样本值


    现在我们假设（与前面章节相反）函数依赖 `{CITY} -> {STATUS}` 不再成立。那么关系变量 `SCT_DURING` 处于 `BCNF`——唯一键是
    `{SNO, DURING}`，并且唯一成立的函数依赖是该键所蕴含的依赖。（事实上，虽然我不打算证明，但该关系变量也处于 `5NF`。）然而，图 14-4
    中的样本值明显同时表现出冗余和冗余表述。因此，这个例子的第一个教训是：经典理解的无损分解——即基于经典投影和经典连接的无损分解——对于避免这些问题毫无帮助。我们需要别的方法。


    而且，正如我已经说过的，打包形式本身也不能解决问题。图 14-5 显示了图 14-4 中关系的打包形式——如你所见，该关系虽然没有冗余问题，但仍然存在冗余表述。（当然，图
    14-4 和图 14-5 中的关系在信息上是等价的。）


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig5_HTML.jpg](img/489629_2_En_14_Fig5_HTML.jpg)


    图 14-5：图 14-4 中关系的打包形式


    所以打包形式不是解决方案（至少，不是完整的解决方案）；重申一下，我们需要别的方法。为了看清这个“别的方法”可能是什么，请注意，图 14-4 中的冗余和冗余表述，以及图
    14-5 中的冗余表述，实际上都源于一个事实：任何给定元组中的`DURING`值并不单独适用于该元组中的`CITY`和`STATUS`值，而是适用于这些`CITY`和`STATUS`值的组合。但正如该例子清楚表明的，一个给定供应商的城市和状态随时间独立变化；因此，我们肯定需要做的是将原始关系拆分为两个独立的关系，一个用于供应商城市，一个用于供应商状态值，每个关系都有自己的`DURING`属性。我们可以通过以下步骤实现这个拆分——首先，在`DURING`上解包原始关系；其次，分别对该解包形式在`{SNO,
    CITY, DURING}`和`{SNO, STATUS, DURING}`上进行投影；最后，在`DURING`上打包这两个投影。给定图 14-4 的样本`SCT_DURING`值，图
    14-6 显示了此过程产生的关系——如你所见，这些关系既不表现冗余，也不表现冗余表述：


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig6_HTML.jpg](img/489629_2_En_14_Fig6_HTML.jpg)


    图 14-6：关系变量 `SC_DURING` 和 `ST_DURING` — 样本值


    此外，如图标题所示，这两个关系可以被视为两个关系变量`SC_DURING`和`ST_DURING`的样本值，我认为，将它们作为原始关系变量`SCT_DURING`的替代是合理且可取的。


    现在，这个例子中涉及的一系列步骤——解包、投影、再次打包——在实践中需要如此频繁地使用，以至于定义一个适当的简写似乎是个好主意。因此，这里定义了一个操作符（实际上是经典投影的广义形式），出于应该很快就会明了的原因，我们称之为`U_projection`：


    **定义 (`U_projection`):** 令 *r* 为一个关系，令 *r* 的属性 *A* 为区间值，令 *X* 为包含 *A* 的 *r* 的标题的一个子集。那么表达式
    `USING (A) : r{X}` 表示 *r* 在 *X* 上关于 *A* 的 `U_projection`，并被定义为以下操作的简写：


    ```sql

    PACK

    ( ( UNPACK r ON ( A ) ) { X } )

    ON ( A )

    ```


    换句话说，`U_projection`的工作方式是：首先如指示那样解包输入关系，然后对该解包的中间结果进行常规投影，最后（重新）打包该投影的结果以获得最终的打包结果。这里有几个例子：


    ```sql

    USING ( DURING ) : SCT_DURING { SNO , CITY , DURING }

    USING ( DURING ) : SCT_DURING { SNO , STATUS , DURING }

    ```


    给定图 14-4 中关系变量`SCT_DURING`的样本值，这两个表达式会产生图 14-6 所示的关系。*练习：* 如果你还没有做，请验证这一说法。


    那么，我建议的是，用两个“U_projection”关系变量`SC_DURING`和`ST_DURING`来替代原始的关系变量`SCT_DURING`。然而，要使这种替换有效，它显然必须是无损的。现在，如果我们对图
    14-6 中所示的两个`U_projections`进行常规连接（连接将基于属性`SNO`和`DURING`），我们显然无法得到图 14-4 或图 14-5
    所示的关系。事实上，我们只会得到以下结果：


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figa_HTML.jpg](img/489629_2_En_14_Figa_HTML.jpg)

    '
