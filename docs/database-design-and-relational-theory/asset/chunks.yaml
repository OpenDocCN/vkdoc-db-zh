  trans: "## 精炼定义\n\n> 注意：我刻意将这个篇幅稍长的章节几乎留到了本章最后。\n\n考虑发货关系变量 `SP`，其谓词为*供应商 `SNO`\
    \ 以数量 `QTY` 供应零件 `PNO`*。再考虑图 1-1（见第 1 章）中所示作为该关系变量值的那个关系。观察以下几点：\n\n1.  该关系中的两个元组是\
    \ (`S1`,`P5`,`100`) 和 (`S1`,`S6`,`100`)。\n2.  这两个元组都包含 (`S1`,`100`) 作为一个子元组。\n\
    \n这两个子元组出现的含义是什么？在 (`S1`,`P5`,`100`) 中的出现意味着（我为此命题编号——注意它确实是一个命题——以便将来引用）：\n\n\
    1.  *供应商 `S1` 以数量 `100` 供应某些零件。*\n\n而在 (`S1`,`P6`,`100`) 中的出现含义完全相同！那么，我们这里是否面临数据库包含某个（子）元组的两个不同出现，却代表完全相同命题的情况？换句话说，根据我在本章引言中给出的定义，数据库是否包含某种冗余？\n\
    \n在我尝试回答这个问题之前，我想给出一个更简单的说明来阐述同一点。再次参考图 1-1，考虑图中所示供应商 `S1` 的六个发货 (`SP`) 元组。显然，这些元组都包含度数为一的子元组\
    \ (`S1`)。而这六个子元组的出现都意味着同一件事：\n\n2.  *供应商 `S1` 以某个数量供应某些零件。*\n\n我们甚至可以进一步推进这个论证，考虑*每个*\
    \ `SP` 元组——实际上，无论其具有什么属性，每个可能的元组——总是将 0-元组作为一个子元组。因此，在图 1-1 的发货关系中，该子元组有十二个“出现”（如果你明白我的意思！），它们都代表以下命题：\n\
    \n3.  *某个供应商以某个数量供应某些零件。*\n\n那么，我们这里是否存在冗余？注意，命题 1-3 都涉及某种*存在量化*。以下是这些命题稍微更正式的版本，其中该量化被明确并突出显示：\n\
    \n1.  ***存在某个零件 `PNO` 使得*** *供应商 `S1` 以数量 `100` 供应零件 `PNO`。*\n2.  ***存在某个零件 `PNO`\
    \ 使得存在某个数量 `QTY`*** *使得供应商 `S1` 以数量 `QTY` 供应零件 `PNO`。*\n3.  ***存在某个供应商 `SNO` 使得存在某个零件\
    \ `PNO` 使得存在某个数量 `QTY`*** *使得供应商 `SNO` 以数量 `QTY` 供应零件 `PNO`。*\n\n在这些命题中，第三个中的\
    \ `SNO`、第二个和第三个中的 `QTY`，以及所有三个中的 `PNO` 不是参数——当然不是，因为命题从不包含参数！——而是逻辑学家所称的*绑定变量*，因为它们都被短语*存在某个……使得*“存在量化”。^(²⁴⁷)\
    \ *注意：* 如果你不熟悉这些概念（即绑定变量和存在量化），可以在*《SQL 与关系理论》* 中找到教程式的处理。不过，我认为即使你事先对此类问题一无所知，当前的讨论也应易于理解。\n\
    \n与上述情况相反，底层关系变量 `SP` 中的元组所代表的命题不涉及任何存在量词。这是因为它们都只是关系变量谓词的实例化（即，它们都是通过为该谓词的参数替换参数而获得的），而该谓词本身（如下所示）也不涉及此类量词：\n\
    \n*   *供应商 `SNO` 以数量 `QTY` 供应零件 `PNO`。*\n\n总结到目前为止的内容，似乎适用以下观察结果：\n\n1.  所谓的*给定*命题——由给定关系变量中的元组表示的命题——是无量词的。\n\
    \n    > 说这类“给定命题”总是无量词的可能不完全正确；例如，考虑一个具有属性 `WEIGHT` 和 `HEIGHT` 以及谓词*某个人具有重量 `WEIGHT`\
    \ 和身高 `HEIGHT`* 的关系变量。然而，我们可以通过一个称为*斯柯伦化*（以逻辑学家 T. A. Skolem 命名）的过程，有效地消除这种情况下的量词。在该例子中，该过程涉及将原始谓词替换为形式如*人\
    \ `p` 具有重量 `WEIGHT` 和身高 `HEIGHT`* 的谓词（其中 `p` 表示某个未知的人）。后一个谓词是无量词的。\n\n2.  相比之下，*派生*命题——至少，对应于通过对给定关系变量中的元组进行投影所获得的元组的派生命题——确实涉及至少一个存在量词，可能还不止一个。\n\
    \n现在，我们当然不想认为我们通常的发货关系变量 `SP` 本质上是冗余的。因此，看起来我们可能想说的是类似于以下内容：\n\n*   （*警告：暂定！*）如果同一个命题被表示了两次，但该命题是存在量化的，那么这种重复不计为冗余。\n\
    \n但是等等——供应商关系变量 `S` 及其函数依赖 `{CITY} → {STATUS}`（我现在想再次假设它成立）呢？一个与前述完全类似的论证似乎表明，例如，在图\
    \ 1-1 所示的两个供应商元组中作为子元组出现的元组 (`London`,`20`)，代表了命题：\n\n*   ***存在某个供应商 `SNO` 使得存在某个名称\
    \ `SNAME`*** *使得供应商 `SNO` 的名称为 `SNAME`，状态为 `20`，并且位于城市 `London`。*\n\n显然，这个命题是存在量化的；然而它被表示了两次，而我们*确实*希望这种重复计为冗余。（我们知道，具有函数依赖\
    \ `{CITY} → {STATUS}` 的关系变量 `S` 不在 `BCNF` 中。）那么，这是怎么回事呢？\n\n和常见的情况一样，我相信这个问题的答案可以通过更仔细地考察谓词来找到。首先，回顾第\
    \ 14 章，一个谓词是*简单*的当且仅当它不涉及连接词，如果它由一组通过 `AND` 连接的其他谓词组成，则是*合取*的（为当前目的，我将假设那些其他谓词都是简单的）。^(²⁴⁸)\
    \ 现在，关系变量 `SP` 的谓词*供应商 `SNO` 以数量 `QTY` 供应零件 `PNO`* 在前述意义上是简单的。相比之下，关系变量 `S` 的谓词是合取的——它可以分解为一组简单谓词。通过以下稍微生硬但实际上更符合逻辑的形式陈述该谓词，我可以使后一事实更显而易见：\n\
    \n*   *供应商 `SNO` 的名称为 `SNAME`* **且**\n*   *供应商 `SNO` 位于城市 `CITY`* **且**\n*   *城市\
    \ `CITY` 具有状态 `STATUS`。*\n\n从这个版本的谓词，可以清楚地看出：\n\n1.  关系变量 `S` 受到非平凡、不可约的 JD ☼{`SN`,`SC`,`CT`}\
    \ 的约束，其中名称 `SN`、`SC` 和 `CT` 分别表示表头 {`SNO`,`SNAME`}、{`SNO`,`CITY`} 和 {`CITY`,`STATUS`}。（相比之下，在关系变量\
    \ `SP` 中成立的唯一 JD 是平凡的，并且 `SP` 处于 `6NF`。重复一遍，关系变量 `S` 甚至不在 `BCNF` 中。）\n2.  因此，关系变量\
    \ `S` 可以根据该 JD 进行无损分解。相应投影的谓词如下：\n    *   `SN`: *供应商 `SNO` 的名称为 `SNAME`。*\n  \
    \  *   `SC`: *供应商 `SNO` 位于城市 `CITY`。*\n    *   `CT`: *城市 `CITY` 具有状态 `STATUS`。*\n\
    \n这些谓词不涉及存在量化，因此相应的命题也不涉及。^(²⁴⁹)"
- fmt: '### Relvar S 中的元组与冗余


    Relvar S 确实包含对应于 SN、SC 和 CT 的子元组；然而，对应于 SN 和 SC 的子元组从不重复，因为 `{SNO}` 是一个键。相比之下，对应于
    CT 的子元组至少是可能重复的（如我们从图 `[1-1](#489629_2_En_1_Chapter.xhtml#Fig1)` 所知），并且这种重复确实构成了冗余。


    在进行了上述所有动机性说明之后，我提出以下作为数据库表现出冗余的所谓“最终”定义：


    1.  如果存在一个符合 *D* 的数据库值（即 *D* 中提及的关联变量的一组值）*DB*，使得

    2.  在 *DB* 内存在某个特定的、表示 *p* 的元组或元组组合的出现（无论是显式还是隐式），并且

    3.  在 *DB* 内存在另一个不同的、也表示 *p* 的元组或元组组合的出现（无论是显式还是隐式），那么

    4.  *DB* 包含冗余，并且 *D* 允许冗余。


    *   **定义（数据库中的冗余，“最终”详细版本）：** 令 *D* 为一个数据库设计，且令命题 *p* 既是简单的又是非量化的。那么：


    当然，上述定义也可以更简洁地表述如下：


    *   **定义（数据库中的冗余，“最终”简洁版本）：** 令 *D* 为一个数据库设计；令 *DB* 为一个符合 *D* 的数据库值（即 *D* 中提及的关联变量的一组值）；并令
    *p* 为一个简单的非量化命题。如果 *DB* 包含 *p* 的两个或更多不同的表示（无论是隐式还是显式），则 *DB* 包含冗余，并且 *D* 允许冗余。


    需要特别注意的是，根据此定义，即使数据库完全符合**正交设计原则**和所有规范化原则，它仍然可能表现出冗余。然而，请注意，该定义仍然说的是 *如果*——而非**当且仅当**——某个条件成立，**那么**就存在冗余；我很想将那个
    *如果* 替换为**当且仅当**，但我目前还没有十足的把握。暂时还没有。


    尽管如此，让我们考虑本章前面章节中的示例 1 到 12，看看上述定义对这些示例具体有何影响。*请仔细注意：* 在以下分析中，未加修饰的术语 *命题* 应理解为一个简单的、非存在量化的命题，除非上下文要求另有解释。（然而，为了强调，我经常仍然使用更明确的术语
    *简单的非量化命题*。）


    ### 示例 1 和 2

    这两个示例都表现出冗余，因为简单的非量化命题 *旧金山，加利福尼亚州是邮政编码 94100 对应的城市* 被表示了两次。


    ### 示例 3

    假设两个不同的元组都包含 DATE 值 "Friday, January 18th, 2019"；那么数据库显然表现出冗余，因为简单的非量化命题 *2019
    年 1 月 18 日是星期五* 被显式地表示了两次。事实上，即使该 DATE 值只出现一次，也存在冗余！原因在于，即使在那时，命题 *2019 年 1 月
    18 日是星期五* 也是被显式和隐式地同时表示。显而易见；隐式表示是值的一部分，即星期几（示例中为星期五），可以从值的其余部分（示例中为 2019 年 1
    月 18 日）计算出来这一事实的结果。^([^(250)](#fn250))


    ### 示例 4

    此示例中不存在冗余。


    ### 示例 5

    令员工 *e* 在关联变量 `EMP` 中表示，并且令 *e* 的 `JOB` 值为 "Programmer"（因此员工 *e* 也在关联变量 `PGMR`
    中表示）。正如前面指出的，简单的非量化命题 *员工 e 是一名程序员* 显然（显式地！）以两种不同的方式表示。


    ### 示例 6

    对于不具备全部三个属性（即名称、状态和城市）的供应商 *s*，此示例本质上类似于示例 4，参见该示例。对于拥有全部三个属性的供应商 *s*，我们可以说该供应商的
    `E`-关联变量元组是冗余的——**如果**我们接受该 `E`-关联变量的谓词形式为 *SNO 是供应商*，而 `P`-关联变量的谓词形式为 *SNO 是供应商*
    ***并且*** *...*（等等），这意味着被多次表示的非量化命题是 *S1 是供应商*、*S2 是供应商* 等等。也许有争议。你怎么看？


