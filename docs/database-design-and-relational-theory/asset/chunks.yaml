  trans: '

    ## 设计理论的地位


    正如我在前言中所述，当使用术语*设计*时，我指的是逻辑设计，而非物理设计。逻辑设计关注的是用户视角下的数据库形态（通俗地说，指的是存在哪些`关系变量`以及这些`关系变量`上适用哪些约束）；相反，物理设计关注的是给定的逻辑设计如何映射到物理存储。^(¹²)
    而术语*设计理论*特指逻辑设计，而非物理设计——关键在于，物理设计必然依赖于目标 DBMS 的某些方面（尤其是性能方面），而逻辑设计是，或者说应该是，独立于特定
    DBMS 的。因此，在本书中，未加限定的术语*设计*应被理解为特指逻辑设计，除非上下文另有要求。


    现在，设计理论本身并不是关系模型的一部分；相反，它是一个构建在关系模型之上的独立理论。（将其视为广义关系理论的一部分是合适的，但要重申，它本身并不是关系模型的一部分。）因此，像进一步规范化这样的设计概念，其本身是基于更基础的概念——例如，关系代数中的`投影`和`连接`运算符——而这些概念*确实*是关系模型的一部分。（尽管如此，当然也可以认为设计理论在某种意义上是关系模型的一个*逻辑推论*。换句话说，我认为，如果总体上同意关系模型，却不同意基于它的设计理论，这是不一致的。）


    逻辑设计的总体目标是实现一个满足以下条件的设计：(a) 硬件独立，原因显而易见；(b) 操作系统和 DBMS 独立，同样原因显而易见；最后，也许有点争议性的是，(c)
    *应用*独立（换句话说，我们主要关心数据是什么，而不是数据将如何被使用）。这种意义上的应用独立性之所以可取，有一个非常好的理由：通常——也许总是——在设计时，并非所有数据将被投入的用途都已确定；因此，我们希望一个设计是健壮的，即它不会因为出现了原始设计时未曾预料到的应用需求而失效。请注意，这种情况的一个重要结果是，我们（或至少不应该）对因物理性能原因而做出设计折衷感兴趣。设计理论总体而言，特别是具体的数据库设计，绝不应该仅仅由性能考虑所驱动。


    回到设计理论本身。正如我们将看到的，该理论包含许多形式化定理，这些定理为设计者提供了可遵循的实用指导原则。因此，如果你是一名设计者，你需要熟悉这些定理。让我赶紧补充一下，我的意思不是你需要知道如何证明这些定理（尽管证明通常相当简单）；我的意思是，你需要知道这些定理阐述了什么——即，你需要知道其结论——并且你需要准备好应用这些结论。这就是定理的优点：一旦有人证明了它们，那么它们的结论就可以在任何人需要时随时使用。


    现在，有时人们声称——并非完全没有道理——所有设计理论真正所做的就是*增强你的直觉*。我这么说是什么意思呢？嗯，考虑供应商-零件数据库。该数据库最“显而易见”的设计就是图
    1-1 所示的那个；我的意思是，很“明显”需要三个`关系变量`，属性`STATUS`属于关系变量`S`，属性`COLOR`属于关系变量`P`，属性`QTY`属于关系变量`SP`，等等。但为什么这些恰恰是显而易见的呢？嗯，假设我们尝试一种不同的设计；例如，假设我们将`STATUS`属性从关系变量`S`中移出，放入关系变量`SP`中（当然，直觉上这是它错误的位置，因为状态是供应商的属性，而不是发货的属性）。下页的图
    1-2 显示了这个修改后的发货关系变量（为避免混淆，我将其称为`STP`）的一个示例值：^(¹³)


    ![../images/489629_2_En_1_Chapter/489629_2_En_1_Fig2_HTML.jpg](img/489629_2_En_1_Fig2_HTML.jpg)


    图 1-2


    关系变量 `STP` — 示例值


    看一眼图就足以说明这个设计的问题所在：它是*冗余*的，意思是供应商`S1`的每一行都告诉我们`S1`的状态是`20`，供应商`S2`的每一行都告诉我们`S2`的状态是`30`，依此类推。^(¹⁴)
    而设计理论告诉我们，不以“显而易见”的方式设计数据库会导致这种冗余，并且（尽管可能是隐含地）也告诉我们这种冗余的后果会是什么。换句话说，设计理论主要——虽然不是全部——是关于减少冗余的，我们将会看到。（顺便提一句，我注意到部分由于这些原因，该理论被描述为——也许有点刻薄——*一个提供反面例子的好来源*。）


    现在，如果设计理论真的只是增强你的直觉，那么它可能会（并且确实曾经）受到这样的批评：它实际上都只是常识罢了。作为例子，再次考虑关系变量`STP`。正如我所说，这个关系变量显然是糟糕设计；冗余是明显的，后果也是明显的，任何有能力的人类设计者都会“自然而然地”避免这样的设计，即使该设计者对设计理论没有任何明确的知识。但这里的“自然而然”是什么意思呢？那个选择更“自然”（也更好）设计的人类设计者，应用了什么原则呢？


    答案是：他们应用的恰恰是设计理论所论述的原则（例如，规范化原则）。换句话说，有能力的设计师大脑中已经存在这些原则，即使他们从未正式学习过它们，也无法准确地叫出名字或清晰地阐述它们。所以是的，这些原则是常识——但它们是*形式化的*常识。（常识也许很常见，但要确切说出它是什么并不总是容易的！）设计理论所做的，是以*精确的方式*阐明某些常识的组成部分。在我看来，这才是该理论真正的成就——或者至少是真正的成就之一：它将某些常识性原则形式化，从而为将这些原则机械化（即将它们纳入计算机化的设计工具）打开了可能性。该理论的批评者常常忽略了这一点；他们正确地声称这些想法大多只是常识，但他们似乎没有意识到，以精确而正式的方式阐明常识的含义，这本身就是一项重大成就。

    '
- fmt: '# 对常识与设计的反思


    作为对前述内容的补充，我注意到常识可能并不总是那么普遍。以下摘自罗伯特·R·布朗^([^(15)](#fn15))论文的片段（经轻微编辑）说明了这一点。布朗首先给出了一个“简化的实际例子”——这是他的原话——涉及一个员工文件（包含员工号、员工姓名、电话号码、部门号和经理姓名等字段）和一个部门文件（包含部门号、部门名称、经理姓名和经理电话号码等字段），其中一切都具有直观上显而易见的含义。然后他继续道：


    *   这个例子所基于的实际数据库有更多的文件和字段，以及更多的冗余。当被问及如此设计的原因时，设计师引用了性能和连接操作的困难。尽管在例子中冗余对您来说应该很清楚，但在设计文档中并不那么明显。在文件和字段更多的大型数据库中，如果不进行广泛的信息分析，不与用户组织的专家进行深入的讨论，是不可能发现这些重复的。


    顺便提一下，我非常喜欢另一段引文——事实上，我曾将其用作《SQL与关系理论》一书的题词——它支持了我关于从业人员确实需要了解其领域理论基础的主张。这段话出自列奥纳多·达·芬奇之口（因此距今约有500年了！），内容如下（我添加了粗体）：


    *   那些沉迷于实践而忽视理论的人，就像一个没有舵和罗盘就进入一艘船的船长，永远无法确定自己要去哪里。**实践应始终基于扎实的理论知识。**


    ## 本书的目标


    如果您和我一样，您可能在文献和现场演示等场合遇到过许多设计理论术语——例如*投影-连接范式*、*追踪*、*连接依赖*、*FD保持*等——我相信您时不时会疑惑这些术语到底是什么意思。因此，我在本书中的一个目标就是解释这些术语：仔细准确地定义它们，解释其相关性和适用性，并总体上消除它们可能看似笼罩的神秘感。如果我能成功实现这个目标，我将在很大程度上解释清楚设计理论是什么以及为什么它很重要（事实上，本书的一个可能替代标题很可能是《数据库设计理论：它是什么以及你为何应该关心》）。总的来说，我的目标是为数据库专业人员提供一个轻松的设计理论入门。更具体地说，我想做的是：


    *   从您可能不熟悉的角度，回顾您应该已经熟悉的设计方面

    *   深入探讨您可能尚不熟悉的方面

    *   对所有相关概念提供清晰准确的解释和定义（附大量示例）

    *   *不*在已经广泛理解的材料上花费过多时间，例如第二和第三范式（2NF和3NF）^([^(16)](#fn16))


    尽管如此，我也应该说明，数据库设计并不是我最喜欢的科目。原因在于，该科目的大部分内容仍然有些……嗯，主观。正如我之前所说，设计理论是数据库设计的科学基础。但遗憾的是，有许多设计问题理论根本没有涉及（至少目前还没有）。因此，虽然我将在本书中描述的形式化原则代表了设计的科学部分，但其他部分，正如我在别处所说，仍然更像是一种艺术努力。实际上，本书传达的一个信息正是我们需要在这个领域引入更多科学（参见第[17](#489629_2_En_17_Chapter.xhtml)章）。


    为了更积极地看待问题，我想请大家注意以下内容。设计理论至少部分涉及捕捉数据的含义，正如科德本人曾经就此概念所说：^([^(17)](#fn17))


    *   [以某种相当正式的方式]捕捉数据含义的任务是永无止境的……然而，这个目标极其重要，因为*即使微小的成功也能为数据库设计领域带来理解和秩序*。


    事实上，我要进一步说：如果你的设计违反了任何已知的科学原理，那么，正如我在别处（在稍有不同的语境中）所写，你唯一可以肯定的就是事情会出错。尽管可能很难确切说出什么会出错，也很难说事情会以严重还是轻微的方式出错，但你*知道*——这是必然的——事情一定会出错。理论很重要。


    ## 结语


    这本书在写作过程中不断扩展；事实证明，尽管上一节的一些评论语调略显消极，但确实有相当多的好材料需要涵盖。更重要的是，这些材料是*递进式的*。因此，虽然前几章可能看起来进展相当缓慢，但我认为您会发现后续节奏会加快。部分原因在于需要引入大量的术语和概念；这些想法本身并不难，但它们可能看起来有点让人应接不暇，至少在您熟悉术语之前是这样。因此，至少在本书的某些关键部分，我会将材料呈现两次——首先是从非正式的角度，然后是从更正式的角度。（正如伯特兰·罗素曾令人难忘地说道：*写作要么可读，要么精确，但两者不可兼得。*
    我正试图两者兼得。）


    谈到伯特兰·罗素，似乎非常适合用他著作中的另一段精彩引语来结束本章：^([^(18)](#fn18))


    *   我被指责有改变观点的习惯……我本人对此[习惯]毫不羞愧。1900年时已活跃的物理学家，谁会梦想夸耀自己在过去的半个世纪里观点没有改变？……我所珍视并努力追求的那种哲学是科学的，其意义在于存在一些可以获取的明确知识，并且新的发现可以使任何公正的心灵不可避免地承认过去的错误。对于我所说的，无论是早期还是晚期，我并不声称拥有神学家们对其信条所宣称的那种真理。我最多只声称，当时表达的观点在那时是明智的……如果后续研究表明它需要修改，我一点也不会惊讶。[这些观点并非]意在作为教条式的宣言，而只是我那时为促进清晰准确的思考所能做的最好努力。清晰，始终是我的目标。


    我曾在别处引用过这段摘录——特别是我的书《数据库系统导论》（第8版，Addison-Wesley，2004年）的序言中。我提到后一本书是因为它包含了对本书中更深入涵盖的部分材料的教程式处理。但世界已经进步；我本人对理论的理解，我希望，比写那本早期书时要好得多，而且那本书中的某些处理方面，坦率地说，我现在想要修改。早期处理的一个问题是，我试图通过采用一个虚构的说法——即每个关系变量只有一个键，然后可以无害地将其视为主键——来使材料更易于接受。但这个简化假设的后果是，我给出的一些定义（例如2NF和3NF）不够完全准确。这种情况导致了社区中一定程度的困惑——我坦率承认部分是我的过错，但部分也是由于人们断章取义地理解了这些定义。'
  raw: 'As a kind of postscript to the foregoing, I note that common sense might not
    always be that common anyway. The following lightly edited extract from a paper
    by Robert R. Brown^([^(15)](#fn15)) illustrates the point. Brown begins by giving
    “a simplified real example”—his words—involving an employee file (with fields
    for employee number, employee name, phone number, department number, and manager
    name) and a department file (with fields for department number, department name,
    manager name, and manager’s phone number), where everything has the intuitively
    obvious meaning. Then he continues:


    *   The actual database on which this example is based had many more files and
    fields and much more redundancy. When the designer was asked his reasons for such
    a design, he cited performance and the difficulty of doing joins. Even though
    the redundancy should be clear to you in my example, it was not that evident in
    the design documentation. In large databases with many more files and fields,
    it is impossible to find the duplications without doing extensive information
    analysis and without having extended discussions with the experts in the user
    organizations.


    Incidentally, there’s another quote I like a lot—in fact, I used it as an epigraph
    in *SQL and Relational Theory*—that supports my contention that practitioners
    really do need to know the theoretical foundations of their field. It’s from Leonardo
    da Vinci (and is thus some 500 years old!), and it goes like this (I’ve added
    the boldface):


    *   Those who are enamored of practice without theory are like a pilot who goes
    into a ship without rudder or compass and never has any certainty where he is
    going. **Practice should always be based upon a sound knowledge of theory.**


    ## Aims of this Book


    If you’re like me, you’ll have encountered lots of design theory terms in the
    literature and live presentations and the like—terms such as *projection-join
    normal form*, *the chase*, *join dependency* , *FD preservation*, and many others—and
    I’m sure you’ve wondered from time to time exactly what they all mean. Thus, it’s
    one of my aims in this book to explain such terms: to define them carefully and
    accurately, to explain their relevance and applicability, and generally to remove
    any air of mystery that might seem to surround them. And if I’m successful in
    that aim, I’ll have gone a good way to explaining what design theory is and why
    it’s important (indeed, a possible alternative title for the book could well be
    *Database Design Theory: What It Is and Why You Should Care*). Overall, it’s my
    goal to provide a painless introduction to design theory for database professionals.
    More specifically, what I want to do is the following:


    *   Review, albeit from a possibly unfamiliar perspective, aspects of design you
    should already be familiar with


    *   Explore in depth aspects you’re probably not already familiar with


    *   Provide clear and accurate explanations and definitions (with plenty of examples)
    of all pertinent concepts


    *   *Not* spend too much time on material that’s widely understood already, such
    as second and third normal form (2NF and 3NF)^([^(16)](#fn16))


    All of that being said, I should say too that database design is *not* my favorite
    subject. The reason it’s not is that much of that subject is still somewhat ...
    well, subjective. As I said earlier, design theory is the scientific foundation
    for database design. Sadly, however, there are numerous design issues that the
    theory simply doesn’t address at all (at least, not yet). Thus, while the formal
    principles I’ll be describing in this book do represent the scientific part of
    design, there are other parts that, as I’ve put it elsewhere, are still much more
    in the nature of an artistic endeavor. Indeed, one message of the book is precisely
    that we need more science in this field (see Chapter [17](#489629_2_En_17_Chapter.xhtml)).


    To put a more positive spin on matters, I’d like to draw your attention to the
    following. Design theory is, at least in part, about capturing the meaning of
    data, and as Codd himself once said in connection with that notion:^([^(17)](#fn17))


    *   [The] task of capturing the meaning of data (in a reasonably formal way) is
    never ending ... The goal is nevertheless an extremely important one because *even
    small successes can bring understanding and order into the field of database design*.


    In fact, I’ll go further: If your design violates any of the known science, then,
    as I’ve written elsewhere (in a slightly different context), the one thing you
    can be sure of is that things will go wrong. And though it might be hard to say
    exactly what will go wrong, and it might be hard to say whether things will go
    wrong in a major or minor way, you *know*—it’s guaranteed—that they will go wrong.
    Theory is important.


    ## Concluding Remarks


    This book grew in the writing; it turns out that, despite the slightly negative
    tone of some of the remarks in the previous section, there’s really quite a lot
    of good material to cover. What’s more, the material *builds*. Thus, while the
    first few chapters might seem to be going rather slowly, I think you’ll find the
    pace picks up later on. Part of the point is the number of terms and concepts
    that need to be introduced; the ideas aren’t really difficult, but they can seem
    a little overwhelming, at least until you’re comfortable with the terminology.
    For that reason, at least in certain key parts of the book, I’ll be presenting
    the material twice—first from an informal perspective, and then again from a more
    formal one. (As Bertrand Russell once memorably said: *Writing can be either readable
    or precise, but not at the same time.* I’m trying to have my cake and eat it too.)


    And talking of Bertrand Russell, it seems appropriate to close this chapter with
    another wonderful quote from his writings:^([^(18)](#fn18))


    *   I have been accused of a habit of changing my opinions ... I am not myself
    in any degree ashamed of [that habit]. What physicist who was already active in
    1900 would dream of boasting that his opinions had not changed during the last
    half century? ... The kind of philosophy that I value and have endeavoured to
    pursue is scientific, in the sense that there is some definite knowledge to be
    obtained and that new discoveries can make the admission of former error inevitable
    to any candid mind. For what I have said, whether early or late, I do not claim
    the kind of truth which theologians claim for their creeds. I claim only, at best,
    that the opinion expressed was a sensible one to hold at the time ... I should
    be much surprised if subsequent research did not show that it needed to be modified.
    [Such opinions were not] intended as pontifical pronouncements, but only as the
    best I could do at the time towards the promotion of clear and accurate thinking.
    Clarity, above all, has been my aim.


    I’ve quoted this extract elsewhere—in the preface to my book *An Introduction
    to Database Systems* (8th edition, Addison-Wesley, 2004) in particular. The reason
    I mention this latter book is that it includes among other things a tutorial treatment
    of some of the material covered in more depth in the present book. But the world
    has moved on; my own understanding of the theory is, I hope, quite a lot better
    than it was when I wrote that earlier book, and there are aspects of the treatment
    in that book that I would frankly now like to revise. One problem with that earlier
    treatment was that I attempted to make the material more palatable by adopting
    the fiction that every relvar has just one key, which could then harmlessly be
    regarded as the primary key. But a consequence of that simplifying assumption
    was that several of the definitions I gave (e.g., of 2NF and 3NF) were less than
    fully accurate. This state of affairs has led to a certain amount of confusion
    in the community—partly my fault, I freely admit, but partly also the fault of
    people who took the definitions out of context.'
  trans: '

    # 对常识与设计的反思


    作为前述内容的补充，我意识到常识或许并非如我们想象的那般普遍。以下摘自罗伯特·R·布朗^(¹⁵)论文（经轻微编辑）的片段说明了这一点。布朗首先展示了一个“简化的实际例子”——这是他的原话——涉及一个员工文件（包含员工号、员工姓名、电话号码、部门号和经理姓名等字段）和一个部门文件（包含部门号、部门名称、经理姓名和经理电话号码等字段），其中所有字段都具有直观上显而易见的含义。接着他写道：


    *   这个例子所依据的实际数据库拥有更多的文件和字段，以及更多的数据冗余。当被问及为何如此设计时，设计师给出的理由是性能和连接操作的困难。尽管在例子中冗余对您来说可能显而易见，但在设计文档中却不那么明显。在文件和字段更多的大型数据库中，如果不进行全面的信息分析，不与用户组织的专家进行深入讨论，是不可能发现这些重复的。


    顺便提一下，我非常喜欢另一段引文——事实上，我曾将其用作《SQL 与关系理论》一书的题词——它支持了我的主张，即从业人员确实需要了解其领域的理论基础。这段话出自列奥纳多·达·芬奇之口（距今约有
    500 年了！），内容如下（我添加了粗体）：


    *   那些沉迷于实践而忽视理论的人，就像一个没有舵和罗盘就登上船的船长，永远无法确定自己要去哪里。**实践应始终基于扎实的理论知识。**


    ## 本书的目标


    如果您和我一样，您可能在文献和现场演示等场合遇到过许多设计理论术语——例如*投影-连接范式*、*追踪*、*连接依赖*、*FD 保持*等——我相信您有时会疑惑这些术语到底是什么意思。因此，我在本书中的一个目标就是解释这些术语：仔细准确地定义它们，解释其相关性和适用性，并总体上消除它们可能看似笼罩的神秘感。如果我能成功实现这个目标，我将在很大程度上解释清楚设计理论是什么以及为什么它很重要（事实上，本书的一个可能替代标题很可能是《数据库设计理论：它是什么以及你为何应该关心》）。总的来说，我的目标是为数据库专业人员提供一个轻松的设计理论入门。更具体地说，我想做的是：


    *   从您可能不熟悉的角度，回顾您应该已经熟悉的设计方面

    *   深入探讨您可能尚不熟悉的方面

    *   对所有相关概念提供清晰准确的解释和定义（附大量示例）

    *   *不*在已经广泛理解的材料上花费过多时间，例如第二和第三范式（2NF 和 3NF）^(¹⁶)


    尽管如此，我也应该说明，数据库设计并不是我最喜欢的科目。原因在于，该科目的大部分内容仍然有些……嗯，主观。正如我之前所说，设计理论是数据库设计的科学基础。但遗憾的是，有许多设计问题理论根本没有涉及（至少目前还没有）。因此，虽然我将在本书中描述的形式化原则代表了设计的科学部分，但其他部分，正如我在别处所说，仍然更像是一种艺术努力。实际上，本书传达的一个信息正是我们需要在这个领域引入更多科学（参见第
    17 章）。


    为了更积极地看待问题，我想请大家注意以下内容。设计理论至少部分涉及捕捉数据的含义，正如科德本人曾经就此概念所说：^(¹⁷)


    *   [以某种相当正式的方式]捕捉数据含义的任务是永无止境的……然而，这个目标极其重要，因为*即使微小的成功也能为数据库设计领域带来理解和秩序*。


    事实上，我要进一步说：如果你的设计违反了任何已知的科学原理，那么，正如我在别处（在稍有不同的语境中）所写，你唯一可以肯定的就是事情会出错。尽管可能很难确切说出什么会出错，也很难说事情会以严重还是轻微的方式出错，但你*知道*——这是必然的——事情一定会出错。理论很重要。


    ## 结语


    这本书在写作过程中不断扩展；事实证明，尽管上一节的一些评论语调略显消极，但确实有相当多的好材料需要涵盖。更重要的是，这些材料是*递进式的*。因此，虽然前几章可能看起来进展相当缓慢，但我认为您会发现后续节奏会加快。部分原因在于需要引入大量的术语和概念；这些想法本身并不难，但它们可能看起来有点让人应接不暇，至少在您熟悉术语之前是这样。因此，至少在本书的某些关键部分，我会将材料呈现两次——首先是从非正式的角度，然后是从更正式的角度。（正如伯特兰·罗素曾令人难忘地说道：*写作要么可读，要么精确，但两者不可兼得。*
    我正试图两者兼得。）


    谈到伯特兰·罗素，似乎非常适合用他著作中的另一段精彩引语来结束本章：^(¹⁸)


    *   我被指责有改变观点的习惯……我本人对此[习惯]毫不羞愧。1900 年时已活跃的物理学家，谁会梦想夸耀自己在过去的半个世纪里观点没有改变？……我所珍视并努力追求的那种哲学是科学的，其意义在于存在一些可以获取的明确知识，并且新的发现可以使任何公正的心灵不可避免地承认过去的错误。对于我所说的，无论是早期还是晚期，我并不声称拥有神学家们对其信条所宣称的那种真理。我最多只声称，当时表达的观点在那时是明智的……如果后续研究表明它需要修改，我一点也不会惊讶。[这些观点并非]意在作为教条式的宣言，而只是我那时为促进清晰准确的思考所能做的最好努力。清晰，始终是我的目标。


    我曾在别处引用过这段摘录——特别是我的书《数据库系统导论》（第 8 版，Addison-Wesley，2004 年）的序言中。我提到后一本书是因为它包含了对本书中更深入涵盖的部分材料的教程式处理。但世界已经进步；我本人对理论的理解，我希望，比写那本早期书时要好得多，而且那本书中的某些处理方面，坦率地说，我现在想要修改。早期处理的一个问题是，我试图通过采用一个虚构的说法——即每个关系变量只有一个键，然后可以无害地将其视为主键——来使材料更易于接受。但这个简化假设的后果是，我给出的一些定义（例如
    2NF 和 3NF）不够完全准确。这种情况导致了社区中一定程度的困惑——我坦率承认部分是我的过错，但部分也是由于人们断章取义地理解了这些定义。

