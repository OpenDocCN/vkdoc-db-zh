    *   LP: *Part P2 is named Bolt, has color Green and weight 17.0 pounds (which
    is less than or equal to 17.0 pounds), and is stored in city Paris.*


    *   HP: *Part P2 is named Bolt, has color Green and weight 17.0 pounds (which
    is greater than or equal to 17.0 pounds), and is stored in city Paris.*


    These two propositions aren’t the same! Of course, they’re certainly *equivalent*—but
    in order to recognize that equivalence, we need to know that “17.0 ≤ 17.0” and
    “17.0 ≥ 17.0” are both true, and then we need to apply a little logical reasoning.
    (The point is, what’s obvious to us as human beings isn’t necessarily obvious
    to a machine, and for completeness I really ought to have spelled out the missing
    steps in my argument.).


    Now, adherence to the orthogonality principle in the light vs. heavy parts example
    would certainly avoid the redundancies illustrated in Figure [16-3](#489629_2_En_16_Chapter.xhtml#Fig3).
    Note, however, that the principle as stated applies only to relvars like LP and
    HP that have the very same heading, because of course it’s impossible for the
    very same tuple to appear in two different relvars if the relvars in question
    have different headings. Thus, you might be thinking the orthogonality principle
    isn’t much use, because it’s probably unusual in practice to have two relvars
    in the same database with the same heading.^([^(210)](#fn210)) And if that were
    all there was to it, then I would probably agree with you; I mean, in that case
    life would be fairly simple and this chapter could stop right here (it might not
    even be worth dignifying such a very obvious rule with the rather grand label
    “principle”). But, of course, there’s quite a lot more to be said on the matter.
    In order to explore the possibilities further, I first need to take a closer look
    at the relationship between tuples and propositions.'
  trans: '

    如你所见，现在这个设计显然是糟糕的；具体来说，零件 P2 和 P3 的元组现在同时出现在图 16-3 的两个关系变量中（换句话说，存在一些冗余）。更有甚者，这些元组*必须*同时出现在两个关系变量中！因为我们可以反过来假设：假如（比如说）零件
    P2 的元组出现在`HP`中而不在`LP`中。那么，注意到`LP`中不包含零件 P2 的元组，我们就可以根据`闭世界假设`（参见第 2 章）合法地推断出：并不存在零件
    P2 重 17.0 磅这种情况。但是，我们接着从`HP`中看到零件 P2 实际上重 17.0 磅，于是数据库就不一致了（它包含矛盾）。*注意：* 当然，数据库中的不一致性是极其不可取的。事实上，我将在附录
    B 中展示，你永远无法信任从不一致的数据库中得到的结果；确实，你可能会从这样的数据库中得到*任何可能的结果*——甚至是诸如 1=0 这种隐含荒谬内容的结论！


    现在，图 16-3 的设计问题显而易见：`LP`和`HP`的谓词是“重叠”的，这意味着完全相同的元组*t*可以同时满足两者。更有甚者，正如我们已经看到的，如果*t*是这样一个元组，并且在某个给定时间点元组*t*代表一个“真实事实”，那么，根据`闭世界假设`，元组*t*在相关时间点必然同时出现在两个关系变量中（当然，冗余由此产生）。实际上，我们面临着另一个等价约束（EQD）：


    ```

    CONSTRAINT ... ( LP WHERE WEIGHT = 17.0 ) =

    ( HP WHERE WEIGHT = 17.0 ) ;

    ```


    再强调一次，这个例子中的问题是我们允许两个关系变量具有重叠的谓词。显然，我们要寻找的原则应该类似于：不要那样做！让我们试着更精确地陈述这一点：


    *   **定义（*正交设计原则*，第一次尝试）：** 如果关系变量`R1`和`R2`是不同的，则不能存在一个元组，其性质是：它出现在`R1`中当且仅当它出现在`R2`中。^(²⁰⁹)


    术语*正交*源于这一原则实质上要求关系变量之间应彼此独立——如果它们的含义在前述意义上重叠，则它们就不会是独立的。*注意：* 在下文中，我常常将`正交性原则`简写为`the
    orthogonality principle`，有时甚至直接简写为`orthogonality`。


    正如本书其他地方一样，我可能会被指责在前面略施小计。请再看一下图 16-3；特别地，看一下零件 P2 的元组。该元组同时出现在`LP`和`HP`中，因为它代表`LP`谓词的一个真实实例化*以及*`HP`谓词的一个真实实例化。还是说不是这样？这些谓词针对零件
    P2 的实例化实际上如下：


    *   `LP`：*零件 P2 名为螺栓，颜色为绿色，重量为 17.0 磅（小于等于 17.0 磅），存储在巴黎。*


    *   `HP`：*零件 P2 名为螺栓，颜色为绿色，重量为 17.0 磅（大于等于 17.0 磅），存储在巴黎。*


    这两个命题并不相同！当然，它们*等价*——但为了认识到这种等价性，我们需要知道`17.0 ≤ 17.0`和`17.0 ≥ 17.0`都为真，然后我们需要进行一点逻辑推理。（关键在于，对我们人类来说显而易见的事情，对机器来说不一定显而易见，为了严谨起见，我本应在我之前的论证中详细说明缺失的步骤。）


    现在，在轻重零件例子中遵守正交性原则当然可以避免图 16-3 所展示的冗余。但请注意，所述原则仅适用于像`LP`和`HP`这样具有完全相同标题的关系变量，因为如果所讨论的关系变量具有不同的标题，完全相同的元组当然不可能出现在两个不同的关系变量中。因此，你可能会认为正交性原则用处不大，因为在实践中，同一数据库中有两个标题相同的关系变量可能并不常见^(²¹⁰)。如果仅止于此，那么我可能会同意你的观点；我的意思是，那样的话事情就相当简单了，本章也可以在此结束（甚至可能不值得为如此显而易见的规则冠以“原则”这样宏大的标签）。但是，当然，关于这个问题还有很多话要说。为了进一步探讨各种可能性，我首先需要更仔细地研究一下元组和命题之间的关系。

