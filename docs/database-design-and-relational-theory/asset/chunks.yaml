  trans: '## 由键所蕴含的连接依赖


    那么，我们如何确定一个给定的非平凡连接依赖是否由键所蕴含呢？事实证明存在一种算法，即*成员算法*（由 Fagin 提出），可以完成这项工作。它的工作原理如下。设关系变量
    `R` 的标题为 `H`，并设 ☼ `{X1, ..., Xn}` 是相对于 `H` 的一个连接依赖，记为 `J`。那么：


    1.  如果 `J` 的两个不同分量都包含 `R` 的同一个键 `K`，则在 `J` 中用它们的并集替换它们。

    2.  重复上一步，直到无法再进行替换为止。


    那么，当且仅当此时的 `J` 是平凡的——即当且仅当 `J` 的最终版本包含 `H` 作为一个分量时^(¹³⁷)，算法成功，且原始的连接依赖由 `R` 的键所蕴含。（注意，平凡的连接依赖尤其会使算法成功，这是显而易见的。）


    让我们看几个例子。首先，考虑我们常用的关系变量 `S`。这里还有另一个在该关系变量中成立的连接依赖——我们称之为 `J1`：


    ```

    ☼ { { SNO , SNAME } , { SNO , STATUS } , { SNO , CITY } }

    ```


    我们通过反复应用希斯定理已经知道这个连接依赖在 `S` 中成立。然而，现在请注意分量 `{SNO,SNAME}` 和 `{SNO,STATUS}` 都包含键
    `{SNO}`。因此，应用成员算法，我们可以用它们的并集 `{SNO,SNAME,STATUS}` 替换它们。`J1` 现在看起来像这样：


    ```

    ☼ { { SNO , SNAME , STATUS } , { SNO , CITY } }

    ```


    请注意，(a) 这个修订后的 `J1` 本身也是一个相对于关系变量 `S` 标题的连接依赖，并且 (b) 关系变量 `S` 也受其约束——这两个事实合起来应该能让我们对算法的工作原理有所了解（更多解释见后文）。


    接下来，后一个连接依赖的分量 `{SNO,SNAME,STATUS}` 和 `{SNO,CITY}` 都包含键 `{SNO}`，因此我们可以用它们的并集替换它们。我们得到：


    ```

    ☼ { { SNO , SNAME , STATUS , CITY } }

    ```


    `J1` 的这个进一步修订版又是一个连接依赖（实际上是一个*一元*连接依赖），相对于 `S` 的标题。然而，它表达的只是关系变量 `S` 等于其恒等投影的“连接”（回想一下第
    5 章习题 5.1 的答案：单个关系 `r` 的连接 `JOIN{r}` 恒等于 `r`）。换句话说，`J1` 的这个进一步修订版只是说 `S` 可以被“无损分解”为其恒等投影。但这个观察是显然成立的：*任何*关系变量都可以被“无损分解”为其恒等投影，正如我们在第
    6 章中所见。事实上，该连接依赖现在形式上是平凡的，因为它包含一个等于相关标题的分量。由此可知，最初陈述的连接依赖 `J1` 由关系变量 `S` 的键所蕴含。


    作为反例，现在考虑以下连接依赖——我们称之为 `J2`——它也在关系变量 `S` 中成立：


    ```

    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }

    ```


    由于该关系变量的唯一键 `{SNO}` 显然没有包含在这个（二元）连接依赖的两个分量中，成员算法对它没有影响。因此，该算法的输出等于输入（即由原始的连接依赖
    `J2` 组成，未改变）；该输出的任何分量都不等于整个标题，因此 `J2` 不是由键所蕴含的（所以关系变量 `S` 也就不在 5NF 中）。


    最后，让我们考虑一些更抽象的例子。设关系变量 `R` 只有属性 `A`、`B`、`C`、`D`、`E` 和 `F`，并且 `R` 只有键 `{A}`、`{B}`
    和 `{C,D}`。进一步，用 `AB` 表示属性集 `{A,B}`，其他属性名组合类似（“希斯表示法”——参见第 7 章）。现在考虑以下连接依赖：


    1.  ☼ `{` `AB` `,` `ACDE` `,` `BF` `}`

    2.  ☼ `{` `ABC` `,` `ACD` `,` `BEF` `}`

    3.  ☼ `{` `AB` `,` `AC` `,` `ADEF` `}`

    4.  ☼ `{` `ABC` `,` `CDEF` `}`

    5.  ☼ `{` `ABD` `,` `ACDE` `,` `DF` `}`


    在继续阅读之前，请尝试自己将成员算法应用于这些连接依赖。如果你这样做，你会发现编号 1-3 是由键所蕴含的（因此 `R` 必然受其约束），而编号 4-5 则不是。简要说明如下：


    *   编号 1 和 2 都是由键对 `{A}` 和 `{B}` 共同蕴含的，但不是由任何单个键蕴含的。

    *   相比之下，编号 3 是由键 `{A}` 单独蕴含的。

    *   编号 4 当且仅当 `{C}` 是一个键时才会被键所蕴含（实际上是被一个单键蕴含），但它并不是；此外，该连接依赖不可能在 `R` 中成立，因为如果成立，那么
    `{C}` 将必须是一个键（请思考一下！）。

    *   至于编号 5，它显然不是由键所蕴含的；它可能在 `R` 中成立，也可能不成立，但如果成立，那么 `R` 就不可能在 5NF 中。


    那么这些例子中到底发生了什么？让我试着解释一下我所说内容背后的直观含义（你可能愿意尝试根据关系变量 `S` 和连接依赖 ☼`{{SNO,SNAME},{SNO,STATUS},{SNAME,CITY}}`
    来推导接下来的内容，并再次假设 `{SNO}` 和 `{SNAME}` 都是该关系变量的键）：


    *   设 `X1`, ..., `Xn` 是关系变量 `R` 标题 `H` 的子集，使得 `X1`, ..., `Xn` 的并集等于 `H`。

    *   设 `J` 为连接依赖 ☼`{X1, ..., Xn}`，并且 `J` 由 `R` 的键所蕴含。

    *   设 `r` 是 `R` 的当前值的关系。

    *   任意选择集合 `{X1, ..., Xn}` 中的两个不同元素（分量），例如 `X1` 和 `X2`。

    *   设 `r1` 和 `r2` 分别是 `r` 在 `X1` 和 `X2` 上的投影。


    现在，如果 `X1` 和 `X2` 都包含 `R` 的同一个键 `K`，那么 `r1` 和 `r2` 的连接 `r12`——其标题 `X12` 将是 `X1`
    和 `X2` 的并集——将是一个严格的一对一连接，因此可以用 `r12` 替换 `r1` 和 `r2` 而不会丢失信息。（同时，`J` 中的 `X1` 和
    `X2` 可以用 `X12` 替换。）由于（如前所述）原始的 `J` 是由 `R` 的键所蕴含的，重复进行此类替换将根据定义最终产生一个关系，该关系 (a)
    等于原始关系 `r`，特别是 (b) 因此其标题等于整个标题 `H`。


    现在让我指出，我到目前为止所说的一切在常见特殊情况下——即相关关系变量 `R` 只有一个键 `K` 时——会变得简单得多。在这种情况下，连接依赖 ☼`{X1,
    ..., Xn}` 由键所蕴含当且仅当以下两点同时为真：


    1.  `R` 的每个属性都包含在至少一个 `X1`, ..., `Xn` 中。（当然，这个要求在一般情况下以及这个特殊情况下都适用。）

    2.  `R` 的唯一键 `K` 包含在每一个 `X1`, ..., `Xn` 中——换句话说，每一个 `X1`, ..., `Xn` 都是一个超键。


    因此，如果 `R` 只有一个键 `K`，那么 `R` 在 5NF 中当且仅当在 `R` 中成立的每一个连接依赖的每一个分量都包含那个键 `K`^(¹³⁸)。然而，请注意——***这一点非常重要！***——我在这里假设所考虑的连接依赖都是相对于
    `R` 不可约的。更多解释请参见第 11 章。


    作为上述观点的一个例子，考虑关系变量 `P`。在该关系变量中成立的唯一不可约连接依赖 ☼`{X1, ..., Xn}` 满足每一个 `Xi`（`i` = 1,
    ..., `n`）都包含唯一键 `{PNO}`。因此，这些连接依赖显然都由那个唯一键所蕴含，所以关系变量 `P` 在 5NF 中。以下是所讨论的其中一个连接依赖：


    ```

    ☼ { { PNO , PNAME , COLOR } , { PNO , WEIGHT , CITY } }

    ```


    因此，关系变量 `P` 可以被无损分解为其在这个连接依赖分量上的投影。（当然，我们是否真的想执行这个分解是另一回事。我们知道如果我们想的话可以这样做，仅此而已。）'
- fmt: 'Let me close this section by revisiting the `SPJ` example from Chapter 9.
    For convenience, a sample value of that relvar is shown in Figure 10-1 (a repeat
    of Figure 9-1). The predicate is `Supplier SNO supplies part PNO to project JNO`,
    and the following business rule (`BRX`) is in effect:


    ![../images/489629_2_En_10_Chapter/489629_2_En_10_Fig1_HTML.jpg](images/489629_2_En_10_Chapter/489629_2_En_10_Fig1_HTML.jpg)

    *Figure 10-1: Relvar `SPJ`—sample value*


    *   If supplier `s` supplies part `p` and part `p` is supplied to project `j`
    and project `j` is supplied by supplier `s`, then supplier `s` supplies part `p`
    to project `j`.


    Now, we know from Chapter 9 that (as I put it in that chapter) the following `JD`
    captures the essence of business rule `BRX` and so holds in relvar `SPJ`:

    ```

    ☼ { { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }

    ```

    Now we can see that this `JD` isn’t implied by the sole key (viz., `{SNO,PNO,JNO}`)
    of the relvar, because the membership algorithm fails, and so `SPJ` isn’t in `5NF`.
    So it can be nonloss decomposed into its three binary projections, and probably
    should be, if we want to reduce redundancy. Those three projections are all in
    `5NF` (no `JDs` hold in them at all apart from trivial ones).


    ## A Useful Theorem

    I said in Chapter 9 that in practice it’s quite unusual to find a relvar that’s
    in `BCNF` and not in `5NF`. In fact, there’s a theorem that addresses this issue:

    ```

    Theorem: Let R be a BCNF relvar and let R have no composite keys; then R is in
    5NF.

    ```

    (Recall from Chapter 1 that a composite key is a key consisting of two or more
    attributes.)


    This theorem is quite useful. What it says is, if you can get to `BCNF` (which
    is easy enough), and if there aren’t any composite keys in your `BCNF` relvar
    (which is often but not always the case), then you don’t have to worry about the
    complexities of `JDs` and `5NF` in general—you know without having to think about
    the matter any further that the relvar simply *is* in `5NF`. *Note:* Actually
    the theorem applies to `3NF`, not `BCNF`; that is, it really says a `3NF` relvar
    with no composite keys is in `5NF`. But every `BCNF` relvar is in `3NF`, and in
    any case `BCNF` is much more important than `3NF`, pragmatically speaking (as
    well as being conceptually simpler).


    I don’t know why, but people often misinterpret the foregoing theorem. To be specific,
    given that a `BCNF` relvar with no composite keys is “automatically” in `5NF`,
    people often seem to think that simply introducing a surrogate key (noncomposite
    by definition) into a `BCNF` relvar “automatically” means the relvar is now in
    `5NF`. But it doesn’t mean that at all! If the relvar wasn’t in `5NF` before the
    surrogate was introduced, it won’t be in `5NF` afterward. In particular, if it
    had a composite key before the surrogate was introduced, it’ll still have one
    afterward.


    ## FDs Aren’t JDs

    Statements to the effect that every `FD` is a `JD`, or that (as I put it in Chapter
    9) `JDs` are a kind of generalized `FD`, are quite common in the less formal parts
    of the literature; indeed, I’ve said such things myself in previous books and
    other previous writings. But such talk is strictly incorrect. It would be better
    to say that every `FD` *implies* a `JD` (which in fact is something we already
    know to be the case from Heath’s Theorem). In other words, if `R` is subject to
    a certain `FD`, `F` say, then it’s certainly subject to a certain `JD`, `J` say.
    However, the converse is false—`R` can be subject to that same `JD` `J` without
    being subject to that same `FD` `F`, as I now show:

    *   Let relvar `R` have attributes `A`, `B`, and `C` (only), let `F` be the `FD`
    `AB → C`, and let `R` be subject to `F` (Heath notation once again).

    *   By Heath’s Theorem, then, `R` is subject to the `JD` `☼{*ABC*,*AB*}`. (With
    reference to the formulation of Heath’s Theorem given in Chapter 9, take `X` to
    be `AB`, `Y` to be `C`, and `Z` to be the empty set of attributes.) Call this
    `JD` `J`.

    *   But this `JD` `J` is trivial—it holds in every relvar `R` that has heading
    `ABC`, regardless of whether that relvar is subject to the `FD` `AB → C`.'
