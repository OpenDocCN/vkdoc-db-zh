  trans: "\n## 函数依赖\n\n1NF 就讲到这里；现在我可以继续讨论一些更高阶的范式。前面已经提到，鲍依斯-科德范式（BCNF）是依据**函数依赖**（FD）来定义的，当然，第二范式（2NF）和第三范式（3NF）也是如此。下面是其定义：\n\
    \n**定义（函数依赖）：** 设 `X` 和 `Y` 是关系变量 `R` 的标题的子集；那么，当且仅当 `R` 的任意两个元组在 `X` 上一致时，它们在\
    \ `Y` 上也一致，则函数依赖（FD）\n```\nX → Y\n```\n在 `R` 中成立。^(^(⁵⁸)) 这里，`X` 和 `Y` 分别称为**决定因素**和**被决定因素**，整个\
    \ FD 可以读作“`X` 函数决定 `Y`”，或“`Y` 函数依赖于 `X`”，或者更简单地直接读作“`X` 箭头 `Y`”。\n\n下面举几个例子：\n\
    *   FD `{CITY} → {STATUS}` 在关系变量 `S` 中成立，这从第 2 章我们知道。顺便注意这里的花括号；定义中的 `X` 和 `Y`\
    \ 是 `R` 标题的子集，因此是（属性的）集合，即使像本例中它们恰好是单元素集。同样，`X` 和 `Y` 的值是元组，即使像本例中它们恰好是一元元组。\n\
    *   FD `{SNO} → {SNAME,STATUS}` 也在关系变量 `S` 中成立，因为 `{SNO}` 是该关系变量的一个键——事实上是唯一的键——并且**总是**存在“从键指出的箭头”（请参见紧接其后的“键”一节）。*注意：*\
    \ 为避免不明确，我使用短语“从 `X` 指出的箭头”表示存在某个 `Y`，使得 FD `X → Y` 在相关关系变量中成立（其中 `X` 和 `Y` 是该关系变量标题的子集）。\n\
    \n现在有一个有用的结论要记住：如果 FD `X → Y` 在关系变量 `R` 中成立，那么对于 `X` 的所有超集 `X'` 和 `Y` 的所有子集 `Y'`（当然，`X'`\
    \ 必须仍是标题的子集），FD `X' → Y'` 也一定在 `R` 中成立。换句话说，我们总可以在决定因素中添加属性，或从被决定因素中移除属性，得到的仍然是在该关系变量中成立的\
    \ FD。例如，下面这个 FD 也在关系变量 `S` 中成立：\n```\n{ SNO , CITY } → { STATUS }\n```\n（我从 FD\
    \ `{SNO} → {SNAME,STATUS}` 开始，在决定因素中添加了 `CITY`，并从被决定因素中移除了 `SNAME`。）\n\n我还需要解释\
    \ FD 何时是*平凡的*：\n\n**定义（平凡 FD）：** 当且仅当 FD `X → Y` 不可能被违反时，它是**平凡的**。\n\n例如，以下 FD\
    \ 在任何包含名为 `STATUS` 和 `CITY` 属性的关系变量中都是平凡地成立的：^(^(⁵⁹))\n```\n{ CITY , STATUS }\
    \ → { CITY }\n{ CITY , STATUS } → { STATUS }\n{ CITY }          → { CITY }\n{\
    \ CITY }          → { }\n```\n简要说明一下（为简单起见，仅考虑第一个例子）：如果两个元组的 `CITY` 和 `STATUS`\
    \ 值相同，那么它们的 `CITY` 值肯定相同。事实上，容易看出，FD `X → Y` 是平凡的，当且仅当 `Y` 是 `X` 的子集（用符号表示为 `Y\
    \ ⊆ X`）。在进行数据库设计时，我们通常不会费心处理平凡 FD，因为它们是，嗯，平凡的；但当我们试图在这些问题上做到形式化和精确时——特别是，当我们试图发展一种设计*理论*时——那么我们就需要考虑所有\
    \ FD，包括平凡和非平凡的。\n\n## 键的再探讨\n\n我在第 1 章一般性地讨论了键的概念，但现在需要更精确一些，并引入更多术语。首先，这里记录一下**候选键**的精确定义——如第\
    \ 1 章所述，在本书的大部分内容中，我将其简称为*键*：\n\n**定义（候选键，键）：** 设 `K` 是关系变量 `R` 标题的子集。那么，当且仅当\
    \ `K` 同时具有以下两个性质时，`K` 是 `R` 的一个候选键（或简称为键）：\n1.  **唯一性：** `R` 的任何合法值中都不包含两个不同的元组，它们在\
    \ `K` 上的值相同。\n2.  **不可约性：** `K` 的任何真子集都不具有唯一性。\n\n这是我们遇到的第一个涉及某种不可约性的定义，但在接下来的章节中我们还会遇到更多——在整个设计理论领域中，某种形式的不可约性无处不在且非常重要。具体到键的不可约性，其重要性的一个原因（并非唯一）是，如果我们指定了一个“键”但它不是不可约的，DBMS\
    \ 就无法实施适当的唯一性约束。例如，假设我们告诉 DBMS（撒谎！）`{SNO,CITY}` 是关系变量 `S` 的一个键，而且是唯一的键。那么 DBMS\
    \ 就无法实施供应商编号“全局”唯一的约束；相反，它只能实施一个更弱的约束，即供应商编号在相关城市内是“局部”唯一的。\n\n我不打算在这里进一步讨论上述定义，因为这个概念非常熟悉^(⁶⁰)——但请注意接下来的几个定义是如何依赖于它的：\n\
    \n**定义（键属性）：** 当且仅当关系变量 `R` 的属性 `A` 是 `R` 的至少一个键的一部分时，它是 `R` 的一个**键属性**。\n\n**定义（非键属性）：**\
    \ 当且仅当关系变量 `R` 的属性 `A` 不是任何键的一部分时，它是 `R` 的一个**非键属性**。^(^(⁶¹))\n\n例如，在关系变量 `SP`\
    \ 中，`SNO` 和 `PNO` 是键属性，`QTY` 是非键属性。\n\n**定义（“全键”关系变量）：** 当且仅当整个标题是一个键（此时它必然是唯一的键）时，一个关系变量是“**全键的**”——等价地，当且仅当整个标题的任何真子集都不是键。\n\
    \n*注意：* 如果一个关系变量是“全键的”，那么它当然没有非键属性，但反之不成立——一个关系变量可以使得其所有属性都是键属性，但本身并不是“全键的”（对吧？）。\n\
    \n**定义（超键）：** 设 `SK` 是关系变量 `R` 标题的子集。那么，当且仅当 `SK` 具有以下性质时，它是 `R` 的一个**超键**：\n\
    1.  **唯一性：** `R` 的任何合法值中都不包含两个不同的元组，它们在 `SK` 上的值相同。\n\n更简洁地说，`R` 的一个超键是 `R` 标题的一个子集，它是唯一的但不一定是不可约的。换句话说，我们可以粗略地说，超键是键的一个超集（之所以说“粗略”，是因为该超集当然仍须是相关标题的子集）。因此请注意，所有的键都是超键，但“大多数”超键不是键。*注意：*\
    \ 一个不是键的超键有时被称为**真超键**。\n\n定义**子键**的概念也很方便：\n\n**定义（子键）：** 设 `SK` 是关系变量 `R` 标题的子集。那么，当且仅当\
    \ `SK` 是 `R` 的至少一个键的子集时，它是 `R` 的一个**子键**。\n\n*注意：* 一个不是键的子键有时被称为**真子键**。\n\n举例来说，考虑关系变量\
    \ `SP`，它只有一个键，即 `{SNO,PNO}`。该关系变量有：\n1.  两个超键：\n    ```\n    { SNO , PNO }\n \
    \   { SNO , PNO , QTY }\n    ```\n    注意，标题对于任何关系变量 `R` 来说总是一个超键。\n2.  四个子键：\n"
- fmt: "# 数据库范式基础与核心概念\n\n```\n    { SNO , PNO }\n    { SNO }\n    { PNO }\n    {\
    \ }\n```\n\n注意，空属性集始终是任何关系变量 `R` 的子键。\n\n作为本节的结束，请注意，如果 `H` 和 `SK` 分别是关系变量 `R`\
    \ 的超键和键，那么函数依赖 `SK → H` 必然在 `R` 中成立。（等价地，函数依赖 `SK → Y` 对 `H` 的所有子集 `Y` 在 `R` 中都成立。）原因是，如果\
    \ `R` 的两个元组在 `SK` 上的值相同，那么它们必然是同一个元组，显然它们在 `Y` 上的值也必须相同。当然，所有这些论述也适用于 `SK` 不仅仅是超键而且是键的重要特殊情况；正如我之前（当然，非常不严谨地）所说，键总有箭头指出。事实上，我们现在可以给出一个更普遍的陈述：超键总有箭头指出。\n\
    \n## 第二范式\n\n在能够真正定义 2NF、3NF 和 BCNF 之前，我还需要引入一个概念，即 `FD` 不可约性（注意，这是另一种不可约性）：\n\
    \n*   **定义（不可约 FD）：** 函数依赖 `X → Y` 关于关系变量 `R` 是不可约的（或者如果 `R` 明确，则简称为不可约的），当且仅当它在\
    \ `R` 中成立，并且对于 `X` 的任何真子集 `X'`，`X' → Y` 在 `R` 中都不成立。\n\n例如，函数依赖 `{SNO,PNO} → {QTY}`\
    \ 关于关系变量 `SP` 是不可约的。*注意：* 这种不可约性有时被更明确地称为*左*不可约性（因为我们实际上讨论的是 `FD` 的左侧），但为了简洁，我在此省略了“左”这个词。\n\
    \n现在——你可能终于可以原谅地认为——我可以定义 2NF 了：\n\n*   **定义（第二范式）：** 关系变量 `R` 处于第二范式，当且仅当，对于\
    \ `R` 的每一个键 `K` 和每一个非主属性 `A`，函数依赖 `K → {A}`（必然在 `R` 中成立）是不可约的。\n\n*注意：* 以下（“首选”）定义在逻辑上等同于刚才给出的定义（参见本章末尾的练习\
    \ 4.4），但有时可能更有用：\n\n*   **定义（第二范式，首选）：** 关系变量 `R` 处于第二范式，当且仅当，对于在 `R` 中成立的每一个非平凡函数依赖\
    \ `X → Y`，以下至少有一条为真：\n    1.  `X` 是一个超键。\n    2.  `Y` 是一个子键。\n    3.  `X` 不是一个子键。\n\
    \n要点说明：\n\n*   首先，请理解将 2NF 视为设计过程的最终目标是非常不寻常的。事实上，2NF 和 3NF 主要具有历史意义；它们充其量被视为通向\
    \ BCNF 的垫脚石，而 BCNF 具有更重要的实践（以及理论）意义。\n*   文献中对 2NF 的定义通常采取“`R` 处于 2NF 当且仅当它处于\
    \ 1NF 并且……”的形式。然而，这类定义通常基于对 1NF 的错误理解。正如我们所见，*所有*关系变量都处于 1NF，因此“它处于 1NF 并且”这些词没有任何附加意义。\n\
    \n让我们看一个例子。实际上，对于范式来说，看一个反例通常比看一个例子更有启发性。因此，考虑一个修改版的关系变量 `SP`——我们称之为 `SCP`——它有一个额外的属性\
    \ `CITY`，表示对应供应商所在的城市。以下是一些样本元组：\n\n![../images/489629_2_En_4_Chapter/489629_2_En_4_Figa_HTML.jpg](images/489629_2_En_4_Chapter/489629_2_En_4_Figa_HTML.jpg)\n\
    \n这个关系变量显然存在冗余：供应商 `S1` 的每个元组都告诉我们 `S1` 在伦敦，供应商 `S2` 的每个元组都告诉我们 `S2` 在巴黎，等等。并且（诉诸上述\
    \ 2NF 的第一个定义），该关系变量不处于第二范式——其唯一的键是 `{SNO,PNO}`，因此函数依赖 `{SNO,PNO} → {CITY}` 必然成立，但这个函数依赖不是不可约的；具体来说，我们可以从决定因素中删除\
    \ `PNO`，剩下的 `{SNO} → {CITY}` 仍然是该关系变量中成立的函数依赖。等价地，我们可以说函数依赖 `{SNO} → {CITY}` 成立且是非平凡的；此外，(a)\
    \ `{SNO}` 不是一个超键，(b) `{CITY}` 不是一个子键，并且 (c) `{SNO}` *是*一个子键，因此再次（现在诉诸 2NF 的第二个“首选”定义）该关系变量不处于第二范式。\n\
    \n## 第三范式\n\n这次我将直接从我的首选定义开始：\n\n*   **定义（第三范式，首选）：** 关系变量 `R` 处于第三范式，当且仅当，对于在\
    \ `R` 中成立的每一个非平凡函数依赖 `X → Y`，以下至少有一条为真：\n    1.  `X` 是一个超键。\n    2.  `Y` 是一个子键。\n\
    \n要点说明：\n\n*   重复我在前一节说过的话（也许与普遍看法相反），3NF 主要具有历史意义——它充其量应被视为通向 BCNF 的垫脚石。*注意：*\
    \ 我这里说“与普遍看法相反”是因为，许多常见的“3NF”定义（至少在通俗文献中）实际上是 BCNF 的定义——而 BCNF，正如我已经指出的，*是*重要的。*读者须知。*\n\
    *   文献中对 3NF 的定义通常采取“`R` 处于 3NF 当且仅当它处于 2NF 并且……”的形式。我更喜欢一个不提及 2NF 的定义。然而请注意，我的\
    \ 3NF 定义实际上可以通过从我的 2NF 首选定义中删除条件 (c)（“`X` 不是一个子键”）而推导出来。因此，3NF 蕴含 2NF——也就是说，如果一个关系变量处于\
    \ 3NF，那么它必然也处于 2NF。\n\n我们已经看到一个处于 2NF 但不处于 3NF 的关系变量的例子：即供应商关系变量 `S`（参见第 [3](#489629_2_En_3_Chapter.xhtml)\
    \ 章中的图 [3-1](#489629_2_En_3_Chapter.xhtml#Fig1)）。详细说明：非平凡函数依赖 `{CITY} → {STATUS}`\
    \ 在该关系变量中成立，正如我们所知；此外，`{CITY}` 不是超键且 `{STATUS}` 不是子键，因此该关系变量不处于 3NF。（然而，它确实处于\
    \ 2NF。*练习：* 验证这一说法！）"
  raw: "```\n    { SNO , PNO }\n    { SNO }\n    { PNO }\n    { }\n    ```\n\nNote\
    \ that the empty set of attributes is always a subkey for any relvar *R*.\n\n\
    To close this section, note that if *H* and *SK* are the heading and a superkey,\
    \ respectively, for relvar *R*, then the FD *SK* → *H* holds in *R*, necessarily.\
    \ (Equivalently, the FD *SK* → *Y* holds in *R* for all subsets *Y* of *H*.) The\
    \ reason is that if two tuples of *R* have the same value for *SK*, then they\
    \ must in fact be the very same tuple, in which case they obviously must have\
    \ the same value for *Y*. Of course, all of these remarks apply in the important\
    \ special case in which *SK* is not just a superkey but a key; as I put it earlier\
    \ (very loosely, of course), there are always arrows out of keys. In fact, we\
    \ can now make a more general statement: There are always arrows out of superkeys.\n\
    \n## Second Normal Form\n\nThere’s one more concept I need to introduce, viz.,\
    \ *FD irreducibility* (another kind of irreducibility, observe), before I can\
    \ get on to the definitions of 2NF, 3NF, and BCNF as such:\n\n*   **Definition\
    \ (irreducible FD):** The FD *X* → *Y* is irreducible with respect to relvar *R*\
    \ (or just irreducible, if *R* is understood) if and only if it holds in *R* and\
    \ *X'* → *Y* doesn’t hold in *R* for any proper subset *X'* of *X*.\n\nFor example,\
    \ the FD {SNO,PNO} → {QTY} is irreducible with respect to relvar SP. *Note:* This\
    \ kind of irreducibility is sometimes referred to more explicitly as *left* irreducibility\
    \ (since it’s really the left side of the FD that we’re talking about), but I’ve\
    \ chosen to elide that “left” here for simplicity.\n\nNow—at last, you might be\
    \ forgiven for thinking—I can define 2NF:\n\n*   **Definition (second normal form):**\
    \ Relvar *R* is in second normal form (2NF) if and only if, for every key *K*\
    \ of *R* and every nonkey attribute *A* of *R*, the FD *K* → {*A*} (which holds\
    \ in *R*, necessarily) is irreducible.\n\n*Note:* The following (“preferred”)\
    \ definition is logically equivalent to the one just given—see Exercise 4.4 at\
    \ the end of the chapter—but can sometimes be more useful:\n\n*   **Definition\
    \ (second normal form, preferred):** Relvar *R* is in second normal form (2NF)\
    \ if and only if, for every nontrivial FD *X* → *Y* that holds in *R*, at least\
    \ one of the following is true:\n    1.  *X* is a superkey.\n\n    2.  *Y* is\
    \ a subkey.\n\n    3.  *X* is not a subkey.\n\nPoints arising:\n\n*   First of\
    \ all, please understand that it would be very unusual to regard 2NF as the ultimate\
    \ goal of the design process. In fact, both 2NF and 3NF are mainly of historical\
    \ interest; they’re both regarded at best as stepping stones on the way to BCNF,\
    \ which is of much more pragmatic (as well as theoretical) interest.\n\n*   Definitions\
    \ of 2NF in the literature often take the form “*R* is in 2NF if and only if it’s\
    \ in 1NF and ... .” However, such definitions are usually based on a mistaken\
    \ understanding of what 1NF is. As we’ve seen, *all* relvars are in 1NF, and the\
    \ words “it’s in 1NF and” therefore add nothing.\n\nLet’s look at an example.\
    \ Actually, it’s usually more instructive with the normal forms to look at a counterexample\
    \ rather than an example per se. Consider, therefore, a revised version of relvar\
    \ SP—let’s call it SCP—that has an additional attribute CITY, representing the\
    \ city of the applicable supplier. Here are some sample tuples:\n\n![../images/489629_2_En_4_Chapter/489629_2_En_4_Figa_HTML.jpg](images/489629_2_En_4_Chapter/489629_2_En_4_Figa_HTML.jpg)\n\
    \nThis relvar clearly suffers from redundancy: Every tuple for supplier S1 tells\
    \ us S1 is in London, every tuple for supplier S2 tells us S2 is in Paris, and\
    \ so on. And (appealing to the first of the foregoing definitions of 2NF) the\
    \ relvar isn’t in second normal form—its sole key is {SNO,PNO}, and the FD {SNO,PNO}\
    \ → {CITY} therefore certainly holds, but that FD isn’t irreducible; to be specific,\
    \ we can drop PNO from the determinant and what remains, {SNO} → {CITY}, is still\
    \ an FD that holds in the relvar. Equivalently, we can say the FD {SNO} → {CITY}\
    \ holds and is nontrivial; moreover, (a) {SNO} isn’t a superkey, (b) {CITY} isn’t\
    \ a subkey, and (c) {SNO} *is* a subkey, and so again (appealing now to the second,\
    \ “preferred” definition of 2NF) the relvar isn’t in second normal form.\n\n##\
    \ Third Normal Form\n\nThis time I’ll just start with my preferred definition:\n\
    \n*   **Definition (third normal form, preferred):** Relvar *R* is in third normal\
    \ form (3NF) if and only if, for every nontrivial FD *X* → *Y* that holds in *R*,\
    \ at least one of the following is true:\n    1.  *X* is a superkey.\n\n    2.\
    \  *Y* is a subkey.\n\nPoints arising:\n\n*   To repeat something I said in the\
    \ previous section (and contrary to popular opinion, perhaps), 3NF is mainly of\
    \ historical interest—it should be regarded at best as no more than a stepping\
    \ stone on the way to BCNF. *Note:* The reason I say *contrary to popular opinion*\
    \ here is that many of the “definitions” of 3NF commonly found (at least in the\
    \ popular literature) are actually definitions of BCNF—and BCNF, as I’ve already\
    \ indicated, *is* important. *Caveat lector.*\n\n*   Definitions of 3NF in the\
    \ literature often take the form “*R* is in 3NF if and only if it’s in 2NF and\
    \ ... .” I prefer a definition that makes no mention of 2NF. Note, however, that\
    \ my definition of 3NF can in fact be derived from my preferred definition for\
    \ 2NF by dropping condition (c) (“*X* is not a subkey”). It follows that 3NF implies\
    \ 2NF—that is, if a relvar is in 3NF, then it’s certainly in 2NF.\n\nWe’ve already\
    \ seen an example of a relvar that’s in 2NF but not 3NF: namely, the suppliers\
    \ relvar S (see Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1) in Chapter [3](#489629_2_En_3_Chapter.xhtml)).\
    \ To elaborate: The nontrivial FD {CITY} → {STATUS} holds in that relvar, as we\
    \ know; moreover, {CITY} isn’t a superkey and {STATUS} isn’t a subkey, and so\
    \ the relvar isn’t in 3NF. (It’s certainly in 2NF, however. *Exercise:* Check\
    \ this claim!)"
