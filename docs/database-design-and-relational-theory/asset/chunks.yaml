    符合这些规则的关系变量 `SJT` 的一个样本值如图 6-2 所示：


    ![../images/489629_2_En_6_Chapter/489629_2_En_6_Fig2_HTML.jpg](img/489629_2_En_6_Fig2_HTML.jpg)


    图 6-2 关系变量 `SJT` 的样本值


