  raw: "## Exercises\n\n1.  6NF relvars are sometimes said to be irreducible, and\
    \ I noted in the body of the chapter that this was yet another of the many kinds\
    \ of irreducibility that are relevant to design theory. How many different kinds\
    \ can you identify?\n\n2.  Suppose relvar P is replaced as discussed in the body\
    \ of the chapter by its 6NF projections PN, PL, PW, and PC. Can you think of any\
    \ improvements on that design?\n\n3.  Consider a relvar *R* representing marriages,\
    \ with attributes *A*, *B*, and *C* and predicate *Person A married person B on\
    \ date C*. Assume no polygamy; assume also that no two persons marry each other\
    \ more than once. What keys does *R* have? Does the JD ☼{*AB*,*BC*,*CA*} hold?\
    \ What’s the highest normal form *R* is in?\n\n4.  Design a database for the following.\
    \ The entities to be represented are soccer match fixtures for a certain team.\
    \ For matches that have already been played, we wish to record “goals for” and\
    \ “goals against”; however, these two properties clearly make no sense for matches\
    \ that have yet to be played. What normal forms are your relvars in?\n\n5.  In\
    \ the body of the chapter, I showed informally how reducing a relvar to 6NF projections\
    \ corresponded to reducing a conjunctive predicate to simple predicates. Could\
    \ there be such a thing as a disjunctive predicate? How might a relvar correspond\
    \ to such a predicate? What would be involved in reducing such a predicate to\
    \ simple predicates?\n\n6.  Given the sample value of relvar SCT_DURING in Figure\
    \ [14-4](#489629_2_En_14_Chapter.xhtml#Fig4), show the result of evaluating each\
    \ of the following expressions:\n    1.  `USING ( DURING ) : SCT_DURING { SNO ,\
    \ DURING }`\n\n    2.  `USING ( DURING ) : SCT_DURING { CITY , DURING }`\n\n \
    \   3.  `USING ( DURING ) : SCT_DURING { STATUS , DURING }`\n\n    4.  `USING\
    \ ( DURING ) : JOIN { SCT_DURING { SNO , CITY , DURING } , SCT_DURING { SNO ,\
    \ STATUS , DURING } }`\n\n*Note:* The answer in the last case is, of course, the\
    \ relation shown in Figure [14-5](#489629_2_En_14_Chapter.xhtml#Fig5)—but don’t\
    \ just take my word for it, please confirm that result for yourself (unless you’ve\
    \ done so already).\n\n## Answers\n\n1.  Irreducibility of keys and FDs, and the\
    \ relevance of FD irreducibility to 2NF, are all discussed in Chapter [4](#489629_2_En_4_Chapter.xhtml);\
    \ FD irreducibility is discussed further in Chapter [5](#489629_2_En_5_Chapter.xhtml).\
    \ Irreducible covers are discussed in Chapter [6](#489629_2_En_6_Chapter.xhtml).\
    \ Irreducible JDs are discussed in Chapter [11](#489629_2_En_11_Chapter.xhtml).\
    \ Irreducible (i.e., 6NF) relvars and the associated notion of “irreducible facts”\
    \ are discussed in the present chapter.\n\n2.  The main point that occurs to me\
    \ is that it might be nice to have some kind of “master” relvar whose primary\
    \ purpose is just to record the part numbers for all parts currently represented\
    \ in the database. If we call that relvar P, there’ll be EQDs between that relvar\
    \ P and the projection on {PNO} of each of the relvars PN, PL, PW, and PC (instead\
    \ of EQDs between, arbitrarily, the projection of PN on {PNO} and the projections\
    \ on {PNO} of each of PL, PW, and PC; indeed, one nice thing about having the\
    \ master relvar is precisely that it avoids that slight arbitrariness).\n\nMoreover,\
    \ suppose every part always has a known name and weight but doesn’t necessarily\
    \ have a known color or city. Then we can combine relvars P, PN, and PW, making\
    \ that combination—which I’ll still call P—the master relvar, and replace those\
    \ previously required EQDs by foreign key constraints from PL and PC to that master\
    \ relvar P. (A part with no known color will be represented in P but not PL; likewise,\
    \ a part with no known city will be represented in P but not PC.)\n\nIncidentally,\
    \ another argument in favor of including that master relvar P has to do with the\
    \ shipments relvar SP—given that master relvar, we can retain the conventional\
    \ foreign key constraint from SP to P; without it, life becomes rather messier\
    \ (right?).\n\n3.  Every pair of attributes is a key. The specified JD doesn’t\
    \ hold, because the following is certainly a legitimate value for the relvar:\n\
    \n```\n    a1  b1  c2\n    b1  a1  c2\n    a2  b1  c1\n    b1  a2  c1\n    a1\
    \  b2  c1\n    b2  a1  c1\n    ```\n\n(*a1* ≠ *a2*, *b1* ≠ *b2*, *c1* ≠ *c2*);\
    \ that is, the tuples (*a1*,*b1*,*c2*), (*a2*,*b1*,*c1*), and (*a1*,*b2*,*c1*)\
    \ most certainly don’t force the tuple (*a1*,*b1*,*c1*) to appear (!). The relvar\
    \ is in 6NF. Note, however, that it’s subject to a certain *symmetry* constraint;\
    \ to be specific, the tuple (*a*,*b*,*c*) appears if and only if the tuple (*b*,*a*,*c*)\
    \ appears (see the sample value above for an illustration of this point).^([^(197)](#fn197))\
    \ As a consequence, the relvar is also subject to certain insertion and deletion\
    \ anomalies. (In particular, therefore, it isn’t in DK/NF. See Chapter [15](#489629_2_En_15_Chapter.xhtml).)\n\
    \n4.  The thing to do here is to separate matches that have already been played\
    \ from those that haven’t:\n\n```\n    PAST_MATCHES { DATE , OPPONENT , GOALS_FOR\
    \ , GOALS_AGAINST , ... }\n    KEY { DATE }\n    FUTURE_MATCHES { DATE , OPPONENT\
    \ , ... }\n    KEY { DATE }\n    ```\n\nThese relvars are both in 5NF. PAST_MATCHES\
    \ in particular probably shouldn’t be replaced by 6NF projections. *Note:* Alternatively,\
    \ we might consider replacing FUTURE_MATCHES by a relvar FIXTURES, giving DATE\
    \ and OPPONENT for all matches past and future. What constraints would apply then?\
    \ Come to that, what constraints apply to the design shown above?\n\n5.  A disjunctive\
    \ predicate is the logical OR of two or more other predicates. If some relvar\
    \ *R* had a disjunctive relvar predicate, then the individual predicates that\
    \ are OR’d together would have to have the same parameters (because the tuples\
    \ that satisfy them would all have to be of the same type). Reducing such a relvar\
    \ to ones with simple predicates would probably involve decomposition via restriction\
    \ instead of projection (and recomposition via union instead of join). See Chapters\
    \ [15](#489629_2_En_15_Chapter.xhtml) and [16](#489629_2_En_16_Chapter.xhtml)\
    \ for further discussion.\n\n6.  1.  ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figb_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figb_HTML.jpg)\n\
    \n2.  ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figc_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figc_HTML.jpg)\n\
    \n3.  ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figd_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figd_HTML.jpg)\n\
    \n4.  Here first are the two U_projections (repeated from Figure [14-6](#489629_2_En_14_Chapter.xhtml#Fig6)):\n\
    \n![../images/489629_2_En_14_Chapter/489629_2_En_14_Fige_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Fige_HTML.jpg)\n\
    \nThe corresponding unpacked forms are as follows:\n\n![../images/489629_2_En_14_Chapter/489629_2_En_14_Figf_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figf_HTML.jpg)\n\
    \nHere’s the join of these two unpacked relations:\n\n![../images/489629_2_En_14_Chapter/489629_2_En_14_Figg_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figg_HTML.jpg)\n\
    \nPacking this result on DURING yields the relation shown in Figure [14-5](#489629_2_En_14_Chapter.xhtml#Fig5).\n\
    \nFootnotes [1](#489629_2_En_14_Chapter.xhtml#Fn1_source)   [2](#489629_2_En_14_Chapter.xhtml#Fn2_source)\
    \   [3](#489629_2_En_14_Chapter.xhtml#Fn3_source)   [4](#489629_2_En_14_Chapter.xhtml#Fn4_source)\
    \   [5](#489629_2_En_14_Chapter.xhtml#Fn5_source)   [6](#489629_2_En_14_Chapter.xhtml#Fn6_source)\
    \   [7](#489629_2_En_14_Chapter.xhtml#Fn7_source)   [8](#489629_2_En_14_Chapter.xhtml#Fn8_source)\
    \   [9](#489629_2_En_14_Chapter.xhtml#Fn9_source)   [10](#489629_2_En_14_Chapter.xhtml#Fn10_source)\
    \   [11](#489629_2_En_14_Chapter.xhtml#Fn11_source)   [12](#489629_2_En_14_Chapter.xhtml#Fn12_source)\
