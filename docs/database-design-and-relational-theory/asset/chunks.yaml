  trans: '

    顺便提一下，该定理涉及的是关系变量*R*的*显式*JD，但实际上我们可以去掉“显式”这个限定词，结论依然成立（即，*R*处于 ETNF 中，当且仅当在*R*中成立的*每一个*JD
    都有一个超键分量）。^(¹⁶⁸) 不过，在某种意义上，包含这个限定词使定理更“精确”。特别是，这意味着为了测试所讨论的关系变量是否处于 ETNF，无需检查其隐式
    JD。


    下一个定理提供了另一个简单而有用的测试：


    *   **定理：** 如果关系变量*R*处于 BCNF 且至少有一个非复合键（其中，非复合键指非复合的键，而复合键指由两个或多个属性组成的键），则该关系变量处于
    ETNF。


    该定理为关系变量处于 ETNF 提供了一个充分条件（尽管不是必要条件）。顺便提一下，值得注意的是，该条件具有一个吸引人的特性，即它只涉及键，不涉及 JD 和
    FD（至少不是显式地涉及）。


    下一个定理表明，ETNF 确实严格介于 4NF 和 5NF 之间：


    *   **定理：** 5NF ⇒ ETNF ⇒ 4NF，而反向蕴含均不成立。


    最后，这里还有另一个定理，给出了关系变量处于 ETNF 的一个充分条件（尽管不是必要条件）：


    *   **定理：** 如果关系变量*R*处于 3NF 且没有复合键，则该关系变量处于 ETNF。


    这个结果是直接的，因为所述条件实际上意味着关系变量*R*处于 5NF。^(¹⁶⁹) 因此，它理所当然地处于 ETNF。


    ### 一个处于 ETNF 但不处于 5NF 的关系变量


    关系变量`SPJ′`，即上一节（“5NF 太强了”）中的第二个例子，提供了一个处于 ETNF 但不处于 5NF 的具体实例。提醒一下，该关系变量具有属性`SNO`、`PNO`和`JNO`；它只有一个键，即`{SNO,PNO}`；它处于
    BCNF；其谓词是*供应商`SNO`向项目`JNO`供应零件`PNO`*；并且以下 JD 成立（但没有其他 JD 成立，除了从此 JD 和/或唯一键逻辑推导出来的
    JD）：


    ```

    ☼ { { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }

    ```


    如前所述，该关系变量不处于 5NF，正是因为上述 JD 并非由唯一键所蕴含。然而，它*确实*处于 ETNF，因为在此关系变量中成立的唯一显式 JD——即刚才显示的那个——有一个分量是超键（即分量`{SNO,PNO}`）。换句话说，该关系变量即使不处于
    5NF，也既没有 FD 冗余也没有 JD 冗余，因此是无冗余的，从而处于 ETNF。


    现在假设该关系变量仅包含以下两个元组：


    ```

    t1  :  s1  p1  j2

    t2  :  s1  p2  j1

    ```


    （这里假设*p1* ≠ *p2* 且 *j1* ≠ *j2*）。假设我们现在插入以下元组：


    ```

    t3  :  s2  p1  j1

    ```


    （其中*s2* ≠ *s1*）。那么，该 JD 意味着以下元组也必须出现：


    ```

    t4  :  s1  p1  j1

    ```


    然而，正如我们之前所见，这里的元组*t1*和*t4*实际上必须是同一个元组，因为它们具有相同的键值。由此可得*j1* = *j2*，这与最初的一个假设相矛盾。因此，如果元组*t1*和*t2*存在，那么尝试插入元组*t3*必定失败，正是因为它导致了那个矛盾。此外，由于直接尝试插入元组*t4*也必定失败（无论是由于键唯一性违规，还是因为它蕴含了*j1*
    = *j2*，任你选择），因此以下有点离奇的业务规则也必须生效：


    *   如果(a) 供应商*s1*向项目*j2*供应零件*p1*，且(b) 供应商*s1*向项目*j1*供应零件*p2*（*p1* ≠ *p2*，*j1*
    ≠ *j2*），那么(c) 没有任何供应商（即使是*s1*）能向项目*j1*供应零件*p1*。


    事实上，同样离奇的规则也必须生效（注意其对称性）：^(¹⁷⁰)


    *   如果(a) 供应商*s1*向项目*j2*供应零件*p1*，且(b) 供应商*s2*向项目*j1*供应零件*p1*（*s1* ≠ *s2*，*j1*
    ≠ *j2*），那么(c) 没有任何零件（即使是*p1*）能被供应商*s1*供应给项目*j1*。


    *   如果(a) 供应商*s1*向项目*j1*供应零件*p2*，且(b) 供应商*s2*向项目*j1*供应零件*p1*（*s1* ≠ *s2*，*p1*
    ≠ *p2*），那么(c) 没有任何项目（即使是*j1*）能被供应商*s1*供应零件*p1*。


    实际上，这三个规则可以合并为一个，如下。我们同意，关系变量`SPJ′`的每个元组代表一次发货（由某个供应商向某个项目发送某个零件）。那么就不可能存在三个不同的发货*x*、*y*和*z*，使得*x*和*y*涉及同一供应商，*y*和*z*涉及同一零件，*z*和*x*涉及同一项目。


    关于`SPJ′`的例子，还有另一点要说明（很重要）。请再回顾一下导致上述三个“离奇”业务规则（尤其是第一个规则）的分析。该分析表明，元组*t3*不能与元组*t1*和*t2*同时出现在关系变量中。因此，`SPJ′`尽管处于
    ETNF，却仍然遭受插入异常。（相比之下，它不会遭受删除异常——假设成立的唯一约束是所述的 JD 和所述的键约束及其逻辑推论。）所以，5NF 和 ETNF
    之间的一个区别如下：


    *   尽管两者都是无冗余的，但 5NF 保证“没有插入异常”，而 ETNF 不保证——再次假设 FD 和 JD 是唯一考虑的约束类型。^(¹⁷¹)


    当然，从`SPJ′`这个例子很容易得出结论：处于 ETNF 但不处于 5NF 的关系变量在实践中可能很少见。然而，两者之间存在明显的逻辑差异，因此——至少从减少冗余的角度来看——应该瞄准的目标是
    ETNF，而不是 5NF。


    事实上，`SPJ′`这个例子也从另一个角度强化了后一种主张。由于该关系变量满足三元 JD`☼{{SNO,PNO},{PNO,JNO},{JNO,SNO}}`，它可以被无损分解为它在`{SNO,PNO}`、`{PNO,JNO}`和`{JNO,SNO}`上的投影。这些投影都是全键的，并且实际上每个都处于
    5NF。然而，这种分解“丢失了”FD`{SNO,PNO} → {JNO}`！正如我们在本书第二部分所看到的，以这种方式丢失依赖关系通常是不可取的；因此，关系变量`SPJ′`说明了一点：不仅
    5NF 有时太强，而且它有时可能绝对是禁忌。


    ### 一个处于 4NF 但不处于 ETNF 的关系变量


    如我们所见，关系变量`SPJ′`处于 ETNF 但不处于 5NF。然而，它处于 4NF（尽管不处于 BCNF），因为该关系变量中根本不成立任何非平凡的 MVD。那么，一个处于
    4NF 但不处于 ETNF 的关系变量是怎样的呢？事实上，关系变量`SPJ`（不是`SPJ′`）提供了一个例子。回顾一下，该关系变量具有属性`SNO`、`PNO`和`JNO`；是全键的；并且受某个三元
    JD 约束。然而，该关系变量中根本不成立任何非平凡的 MVD——等价地，没有非平凡的二元 JD——因此它肯定处于 4NF。但它不处于 ETNF（我们知道这一点），因为该三元
    JD 的任何分量都不是超键。它当然也不处于 5NF，这是理所当然的。

