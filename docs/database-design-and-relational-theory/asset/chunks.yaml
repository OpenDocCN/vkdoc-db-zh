  trans: "## 答案\n\n1.  见本章正文。\n\n2.  一个函数依赖集 `F` 的闭包 `F^(+)` 是由 `F` 中所有函数依赖所隐含的函数依赖的集合。仅包含函数依赖\
    \ `{SNO,PNO} → {QTY}` 的集合的闭包，在第 4 章的练习 4.1 的答案中给出。\n\n3.  函数依赖 `X → Y` 被满足，当且仅当每当两个元组在\
    \ `X` 上一致时，它们在 `Y` 上也一致（我特意以一种相当宽松的形式给出此定义）。因此：\n    *   如果两个元组在 `X` 上一致，它们肯定在\
    \ `X` 的任何子集 `Y` 上也一致，所以自反规则是合理的。\n    *   如果两个元组在 `XZ` 上一致，它们肯定在 `Z` 上一致。它们也肯定在\
    \ `X` 上一致，因此，如果 `X → Y` 被满足，那么在 `Y` 上也一致；因此它们在 `YZ` 上一致，所以增补规则是合理的。\n    *   如果两个元组在\
    \ `X` 上一致且 `X → Y` 被满足，它们就在 `Y` 上一致。如果它们在 `Y` 上一致且 `Y → Z` 被满足，它们就在 `Z` 上一致。所以传递规则是合理的。\n\
    \n4.  见本章正文。\n\n5.  令 `U` 表示 `Z` 和 `Y` 的交集，令 `V` 表示 `Z` 和 `Y` 之间的差集 `Z – Y`（按此顺序）。那么：\n\
    \    1.  `X → Y`   （给定）\n    2.  `Z → W`   （给定）\n    3.  `X → U`   （1，分解）\n  \
    \  4.  `XV → UV`   （3，增补）\n    5.  `XV → Z`   （简化 4）\n    6.  `XV → W`   （5，2，传递）\n\
    \    7.  `XV → YW`   （1，6，合成；证明完成）\n\n    此证明中使用的规则在注释中指出。以下规则都是达文定理的特例：并集规则、传递规则和增补规则。下面这条有用的规则也是如此：\n\
    \n    如果 `X → Y` 且 `XY → Z`，则 `X → Z`。\n\n    *注：* 后者是有时被称为伪传递规则的特例，其一般形式如下：\n\
    \n    *伪传递规则：* 如果 `X → Y` 且 `YW → Z`，则 `XW → Z`。\n\n6.  第一步是重写给定的函数依赖集，使得每个函数依赖的右侧都是单属性：\n\
    \    1.  `AB → C`\n    2.  `C → A`\n    3.  `BC → D`\n    4.  `ACD → B`\n    5.\
    \  `BE → C`\n    6.  `CE → A`\n    7.  `CE → F`\n    8.  `CF → B`\n    9.  `CF\
    \ → D`\n    10. `D → E`\n    11. `D → F`\n\n    现在：\n    *   2 蕴含 6，因此可以去掉 6。\n\
    \    *   8 通过增补蕴含 `CF → BC`，再结合 3 通过传递蕴含 `CF → D`，因此可以去掉 9。\n    *   8 通过增补蕴含\
    \ `ACF → AB`，且 11 通过增补蕴含 `ACD → ACF`，因此通过传递得到 `ACD → AB`，再通过分解得到 `ACD → B`，因此可以去掉\
    \ 4。\n\n    无法进行进一步的简化，因此我们得到以下不可再简化的覆盖：\n    ```\n    AB  → C\n    C   → A\n\
    \    BC  → D\n    BE  → C\n    CE  → F\n    CF  → B\n    D   → E\n    D   → F\n\
    \    ```\n\n    或者：\n    *   2 蕴含 6，因此可以去掉 6（如前所述）。\n    *   2 通过增补蕴含 `CD → AD`，再次通过增补蕴含\
    \ `CD → ACD`，再结合 4 通过传递蕴含 `CD → B`，因此可以用 `CD → B` 替换 4。\n    *   2 和 9 通过合成蕴含\
    \ `CF → AD`，通过增补蕴含 `CF → ADC`，再结合（原始的）4 通过传递蕴含 `CF → B`，因此可以去掉 8。\n\n    无法进行进一步的简化，因此我们得到以下不可再简化的覆盖：\n\
    \    ```\n    AB  → C\n    C   → A\n    BC  → D\n    CD  → B\n    BE  → C\n  \
    \  CE  → F\n    CF  → D\n    D   → E\n    D   → F\n    ```\n\n    由此可见，原始函数依赖集至少存在两个不同的不可再简化覆盖。还需注意这两个覆盖具有不同的基数。\n\
    \n7.  是的，它是。证明此结果最简单的方法是计算集合 `ACF` 的闭包 `ACF^(+)`，结果发现是整个集合 `ABCDEFG`。或者，我们可以应用阿姆斯特朗公理和本章正文中讨论的其他规则，如下所示：\n\
    \    1.  `A → B`   （给定）\n    2.  `ACF → BCF`   （1，增补）\n    3.  `BC → E`   （给定）\n\
    \    4.  `BCF → EF`   （3，增补）\n    5.  `ACF → EF`   （2，4，传递）\n    6.  `ACF → AEF`\
    \   （5，增补）\n    7.  `AEF → G`   （给定）\n    8.  `ACF → G`   （6，7，传递）\n    9.  `BC\
    \ → DE`   （给定）\n    10. `BC → D`   （9，分解）\n    11. `BCF → DF`   （10，增补）\n    12.\
    \ `BCF → D`   （11，分解）\n    13. `ACF → D`   （2，12，传递）\n    14. `ACF → DG`   （7，13，合成）\n\
    \n8.  我们将第一个集合的函数依赖编号如下：\n    1.  `A → B`\n    2.  `AB → C`\n    3.  `D → AC`\n\
    \    4.  `D → E`\n\n    现在，3 可以替换为：\n    ```\n    3.   D → A  且   D → C\n    ```\n\
    \n    接下来，1 和 2 一起蕴含（参见练习 7.5 答案末尾提到的“有用规则”）2 可以替换为：\n    ```\n    2.   A → C\n\
    \    ```\n\n    但现在我们有了 `D → A` 和 `A → C`，所以 `D → C` 由传递性蕴含，可以去掉，留下：\n    ```\n\
    \    3.   D → A\n    ```\n\n    因此，第一个函数依赖集等价于以下不可再简化覆盖：\n    ```\n    A → B\n\
    \    A → C\n    D → A\n    D → E\n    ```\n\n    第二个给定的函数依赖集\n    ```\n    A →\
    \ BC\n    D → AE\n    ```\n    显然也等价于这同一个不可再简化覆盖。因此，这两个给定的集合是等价的。\n\n9.  该集合显然是可约简的，因为\
    \ `C → J` 和 `CJ → I` 一起蕴含 `C → I`。至于键：一个明显的超键是 `ABCDGJ`（所有给定函数依赖左侧出现的属性的组合）。我们可以从这个集合中去掉\
    \ `J`，因为 `C → J`，并且可以去掉 `G`，因为 `AB → G`。由于 `A`、`B`、`C`、`D` 中没有一个出现在任何给定函数依赖的右侧，因此\
    \ `ABCD` 是一个键。\n\n脚注 1   2   3   4   5\n\n# 8. 反规范化\n\n> *到底什么是“规范”？*\n> —佚名：*虫子去哪儿*\n\
    \n我想就反规范化说几句。到目前为止，我在这本书中还没有考虑过比 BCNF 更高级别的规范化（至少没有详细考虑过）。但是反规范化，如果它真有什么含义的话，不可能仅仅针对\
    \ BCNF；我的意思是，它不能仅仅指退回到某个低于 BCNF 的特定规范化级别。相反，它的含义必须是从*任何*给定的规范化级别退回到某个更低的级别。\n\n\
    话虽如此，我也需要指出，处于 BCNF 但不在更高范式的关系变量相对少见（不过我需要补充，并非完全未知）。因此，在实践中，反规范化通常确实相当具体地指退回到低于\
    \ BCNF 的某个规范化级别；因此，本章被包含在本书的这一部分。"
- fmt: '## “为性能而反规范化”（？）


    自从SQL产品首次上市以来，“为性能而反规范化”的说法就被广泛传播。其（似是而非的！）支持论点大致如下：


    1.  规范化意味着大量的关系变量。

    2.  大量的关系变量意味着大量的存储文件。

    3.  大量的存储文件意味着大量的I/O。


    以供应商和零件为例，一个获取供应红色零件的供应商详情的请求涉及两个二元连接——可能先是供应商与供货连接，然后该连接的结果再与零件连接。如果这三个关系变量对应三个物理上分离的存储文件，那么这两个连接将需要大量的I/O，因此性能会很差。


    如前所述，至少在原则上，这个论点是似是而非的。原因在于关系模型并未规定关系变量必须与存储文件一一映射。以供应商和零件为例，从逻辑上讲，我们没有理由不能将这三个关系变量的连接——去掉明显的冗余——作为一个单独的存储文件物理存储在磁盘上，^([^(103)](#fn103))
    这可以显著减少所考虑查询的I/O量。然而，这一点与当前讨论无关，因为：


    *   首先，这个领域是大多数DBMS厂商严重让我们失望的地方；大多数SQL产品确实将关系变量与存储文件一一映射，几乎无一例外。^([^(104)](#fn104))
    即便是例外情况，也无法为我们提供我们可能期望或关系系统理论上能够实现的那么多数据独立性。因此，作为一个实际问题，那个“似是而非的”论点，对于当今大多数SQL产品来说，不幸是成立的。

    *   其次，即使关系变量不与存储文件一一映射，在存储文件级别进行反规范化可能仍然是可取的。事实上，进行非一一映射的一个主要原因正是，它允许在物理级别（它应该属于的层级）进行反规范化，而无需让这种处理渗透到逻辑层级——从而污染它。


    因此，让我们为了讨论而假设反规范化有时确实需要在某个层级进行。但*什么是*反规范化？


    ## 反规范化意味着什么？


    奇怪的是，对于一种被广泛倡导的做法，关于反规范化实际包含什么似乎存在相当大的混淆。（教科书也帮不上什么大忙，即使是那些专门讲设计主题的。大多数甚至根本不提这个话题，提到的那些也很少给出定义，而且肯定不会深入讨论。）例如，几年前我曾有机会读到一篇专门讨论商业SQL产品中反规范化问题的论文。^([^(105)](#fn105))
    在下文中，我将称该论文为“反规范化论文”。现在，作者开篇是*反对*反规范化的。引用如下：


    *   我认为规范化原则应该被视为*戒律*……除非你面临金钱、硬件可扩展性、当前SQL技术、网络优化、并行化或其他性能技术无法解决的性能问题[*措辞略有改动，斜体为后加*]。


    我完全同意这一立场。事实上，我曾在1990年写的一篇关于实践中使用SQL系统的论文中说过非常类似的话，^([^(106)](#fn106)) 我建议反规范化作为一种性能策略“只有在其他所有方法都失败时”才使用。然而，不幸的是，反规范化论文的其余部分往往暗示作者并不真正知道反规范化是什么；在上面引用的开篇立场声明之后，论文接着给出了大约八个“为性能而设计”的例子，其中除一个外，其他都与反规范化毫无关系！


    然而，为作者辩护，我再说一遍，在文献中确实很难找到一个精确的反规范化定义。当然，可以认为不需要这样的定义，因为（a）反规范化，无论它是什么，肯定都是规范化的逆过程，并且（b）规范化本身当然是精确定义的。但记录在案，我稍后会给出一个关于反规范化精确定义可能样子的概念。但在那之前，让我澄清一点，我对反规范化论文中建议的具体设计策略没有特别的异议；事实上，我在1982年自己写的一篇论文中就建议过其中几个相同的策略。^([^(107)](#fn107))
    我的异议只在于作者特别称它们为反规范化策略。


    所以，这是我的定义，无论它值多少（如果它看起来有点长，我表示歉意）。我从这样一个观察开始，说得宽松一点，对某个关系变量 *R* 进行*规范化*意味着减少冗余。更具体地说，它通过以下方式减少冗余：


    1.  用一组投影 *R1*, ..., *Rn* 替换 *R*，使得 *R1*, ..., *Rn* 中至少有一个比 *R* 具有更高的规范化级别，并且

    2.  对于 *R* 的所有可能取值 *r*，如果将 *R1*, ..., *Rn* 对应的值 *r1*, ..., *rn*（分别）重新连接在一起，那么该连接的结果等于
    *r*。


    因此，提出以下定义：


    **（反规范化）定义：** 对一组关系变量 *R1*, ..., *Rn* 进行反规范化意味着通过以下方式增加冗余：


    1.  用它们的连接 *R* 替换 *R1*, ..., *Rn*，使得 *R* 比 *R1*, ..., *Rn* 中至少一个的规范化级别更低，并且

    2.  对于 *R1*, ..., *Rn* 的所有可能取值 *r1*, ..., *rn*（分别），将 *R* 的对应值 *r* 在 *Ri* 的属性上进行投影的结果等于
    *ri*（*i* = 1, ..., *n*）。


    源于此定义的要点：'
  raw: '## “Denormalize for Performance” (?)


    Ever since SQL products first came on the market, the claim that it’s necessary
    to “denormalize for performance” has been widely promulgated. The (specious!)
    supporting argument goes something like this:


    1.  Normalization means lots of relvars.


    2.  Lots of relvars means lots of stored files.


    3.  Lots of stored files means lots of I/O.


    In the case of suppliers and parts, for example, a request to get details for
    suppliers who supply red parts involves two dyadic joins—suppliers to shipments
    first, perhaps, and then the result of that join to parts. And if the three relvars
    correspond to three physically separate stored files, then those two joins will
    require lots of I/O and will therefore perform badly.


    As already noted, this argument is specious, at least in principle. The reason
    is that the relational model nowhere stipulates that relvars must map one for
    one to stored files. In the case of suppliers and parts, for example, there’s
    no logical reason why we couldn’t physically store the join of the three relvars—with
    the obvious redundancies factored out, possibly—as one single stored file on the
    disk,^([^(103)](#fn103)) which could reduce the amount of I/O significantly for
    the query under consideration. The point is irrelevant for present purposes, however,
    because:


    *   First, this area is one in which most DBMS vendors have seriously let us down;
    most SQL products do indeed map relvars one for one to stored files, pretty much.^([^(104)](#fn104))
    Even the exceptions fail to provide us with as much data independence as we might
    like, or as much as relational systems are theoretically capable of. As a practical
    matter, therefore, that “specious” argument is, sadly, valid for most SQL products
    today.


    *   Second, even if relvars didn’t map one for one to stored files, denormalization
    might still be desirable at the stored file level. Indeed, a major reason why
    mappings that aren’t one for one would be desirable is precisely that they would
    permit denormalization to be done at the physical level, where it belongs, without
    it having to show through to—and thereby corrupt—the logical level.


    So let’s assume for the sake of discussion that denormalization does sometimes
    have to be done, at some level or other. But what *is* denormalization?


    ## What does Denormalization Mean?


    Curiously, for a practice that’s so widely advocated, there seems to be considerable
    confusion over what denormalization actually consists of. (The textbooks aren’t
    much help, either, even the ones that specialize in design topics. Most of them
    don’t even mention the subject, and those that do rarely offer a definition, and
    they certainly don’t discuss the matter in much depth.) For example, some years
    ago now I had occasion to read a paper specifically devoted to the question of
    denormalization in commercial SQL products.^([^(105)](#fn105)) I’ll refer to that
    paper as “the denormalization paper” in what follows. Now, the author begins by
    arguing *against* denormalization. To quote:


    *   I think the normalization principles should be treated as *commandments* ...
    unless you’re faced with performance problems that money, hardware scalability,
    current SQL technology, network optimization, parallelization, or other performance
    techniques can’t resolve [*slightly reworded, italics added*].


    I couldn’t agree more with this position. Indeed, I’m on record as saying very
    much the same thing myself: In a paper I wrote in 1990 on the use of SQL systems
    in practice,^([^(106)](#fn106)) I recommended denormalization as a performance
    tactic “only if all else fails.” Unfortunately, however, the rest of the denormalization
    paper tends to suggest that the author doesn’t really know what denormalization
    is; after the opening position statement quoted above, the paper goes on to give
    some eight examples of “designing for performance,” all but one of which have
    absolutely nothing to do with denormalization at all!


    In the author’s defense, however, I say again that it does seem to be difficult
    to find a precise definition of denormalization in the literature. Of course,
    it could be argued that no such definition is needed, given that (a) denormalization,
    whatever else it might be, must surely be the inverse of normalization, and (b)
    normalization in turn certainly is precisely defined. For the record, however,
    I’ll give some idea as to what a precise definition of denormalization might look
    like in just a moment. Before I do so, however, let me make it clear that I have
    no particular quarrel with the specific design tactics suggested in the denormalization
    paper; indeed, I suggested several of those same tactics in a paper I wrote myself
    back in 1982.^([^(107)](#fn107)) My quarrel is only with the fact that the author
    refers to them as denormalization tactics specifically.


    So here’s my own definition, for what it’s worth (and I apologize if it seems
    a little lengthy). I start with the observation that, speaking a little loosely,
    *normalizing* some relvar *R* means decreasing redundancy. To be more specific,
    it decreases redundancy by:


    1.  Replacing *R* by a set of projections *R1*, ..., *Rn* such that at least one
    of *R1*, ..., *Rn* is at a higher level of normalization than *R*, and such that
    also


    2.  For all possible values *r* of *R*, if the corresponding values *r1*, ...,
    *rn* of *R1*, ..., *Rn* (respectively) are joined back together again, then the
    result of that join is equal to *r*.


    Hence the following proposed definition:


    1.  Replacing *R1*, ..., *Rn* by their join *R* such that *R* is at a lower level
    of normalization than at least one of *R1*, ..., *Rn*, and such that also


    2.  For all possible values *r1*, ..., *rn* of *R1*, ..., *Rn* (respectively),
    the result of projecting the corresponding value *r* of *R* over the attributes
    of *Ri* is equal to *ri* (*i* = 1, ..., *n*).


    *   **Definition (denormalization):** Denormalizing a set of relvars *R1*, ...,
    *Rn* means increasing redundancy by:


    Points arising from this definition:'
