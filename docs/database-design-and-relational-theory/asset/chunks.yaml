  trans: "\n# 第九章 连接依赖与第五范式（非正式）\n\n> *如果不能打败他们，就加入他们。*\n> \n> ——佚名\n\n正如鲍伊斯-科德范式是根据函数依赖来定义的，第五范式（5NF）同样是根据连接依赖（JDs）来定义的；^(¹²²)\
    \ 如第 4 章所述，事实上，5NF 是关于连接依赖的*那个*范式，正如 BCNF 是关于函数依赖的*那个*范式一样。因此，本书这一部分对这些概念的处理方式，与第二部分对\
    \ BCNF 和函数依赖的处理是并行的。换句话说，我计划在第 10 章进行正式阐述，而在本章进行非正式讨论。\n\n我必须立刻补充一点：尽管 5NF 确实是关于连接依赖的“那个”范式，但这并不必然意味着\
    \ 5NF 是规范化过程的终极目标。*恰恰相反*，事实上：至少还有另外两种范式可能更有资格获得这个称号，我们将在本书的第四部分看到。然而，无论是从教学角度还是历史角度来看，我认为先详细讨论\
    \ 5NF 是可取的。（我提到这一点只是为了避免造成误解；我的一位评审人认为我应该以不同的顺序呈现这些内容，但恕我难以苟同。）\n\n过去，我在写作中倾向于将连接依赖视为一种广义的函数依赖。现在我意识到这种观点是错误的，或者至少是误导性的；相反，最好将连接依赖视为一种完全不同的现象。当然，函数依赖和连接依赖都属于依赖（即约束），并且它们在某些方面确实相似；特别是，某个连接依赖在关系变量`R`中成立，意味着`R`可以以某些方式进行无损分解，正如某个函数依赖在关系变量`R`中成立也意味着`R`可以以某些方式进行无损分解。同样正确的是，每一个函数依赖都隐含着一个连接依赖，因此，如果某个函数依赖`F`在关系变量`R`中成立，那么某个特定的连接依赖`J`在`R`中也成立。但并非所有连接依赖都是由函数依赖隐含的；事实上，说得非常宽松——但我必须在此强调，我接下来要说的*极其*不精确——我们或许可以说，5NF\
    \ 涉及的是那些不被函数依赖所隐含的连接依赖。也就是说，当某个关系变量`R`处于 BCNF，但受到某个不被函数依赖隐含的连接依赖约束时，5NF 的概念才可能适用。\n\
    \n那么，一个关系变量处于 BCNF，当且仅当它所服从的所有函数依赖都由键隐含。因此，正如你可能预期的那样，一个关系变量处于 5NF，当且仅当它所服从的所有连接依赖都由键隐含。^(¹²³)\
    \ 然而，后一个概念——即连接依赖由键隐含的概念——比其函数依赖的对应物更难精确界定；事实上，围绕这些概念有一个非常丰富的理论，你很快就会看到，其中一些理论初看起来可能有点让人难以招架（更不用说令人困惑了）。你需要保持清醒的头脑！正如一位在此领域比我渊博得多的人曾对我说过的：*连接依赖非常神秘*。\n\
    \n开场白到此为止；现在让我们进入正题。\n\n## 连接依赖——基本概念\n\n到目前为止，在本书的大部分内容中，我都在做一个隐含的假设：即当我们分解某个关系变量时，我们总是通过用该关系变量的恰好两个投影来替换它。^(¹²⁴)\
    \ （请注意，希斯定理为我迄今为止关于无损分解的大部分论述提供了形式基础，它确实是专门针对分解为恰好两个投影的。）此外，只要我们的目标仅仅是达到 BCNF，这个假设就完全成立；换句话说，它成功地将我们带到了那个特定的目标。因此，你可能会惊讶地了解到，存在一些关系变量，它们不能被无损分解为两个投影，但可以被无损分解为三个（或更多）投影。\n\
    \n顺便提一下，值得注意的是，科德在 1969 年，即他关于关系模型的第一篇论文中（参见附录 D），就给出了一个例子，表明他已经意识到了上述可能性。然而，这个例子显然被该论文的大多数原始读者忽略了；当几年后（确切地说是\
    \ 1977 年）这个可能性被重新发现时，研究界无疑感到很惊讶。\n\n我之前曾宽松地提到，5NF 与那些不被函数依赖隐含的连接依赖有关。我现在可以进一步补充（尽管仍然是非常宽松的说法），它与那些不能被无损分解为两个投影，但可以被无损分解为三个或更多投影的关系变量有关。换句话说，当出现这些情况时——即存在(a)\
    \ 不被函数依赖隐含的连接依赖和(b) 只能被无损分解为三个或更多投影的关系变量——你才真正需要认真研究连接依赖和 5NF。\n\n那么，当我们说某个连接依赖在某个关系变量中成立时，确切含义是什么？定义如下：\n\
    \n*   **定义（连接依赖）：** 令 `X1`, ..., `Xn` 是关系变量 `R` 的标题 `H` 的子集；那么，连接依赖（JD）——有时更具体地称为\
    \ *n* 元连接依赖——\n    ```\n    ☼ { X1 , ... , Xn }\n    ```\n    在 `R` 中成立，当且仅当 `R`\
    \ 可以无损分解为其在 `X1`, ..., `Xn` 上的投影，或者等价地说，当且仅当 `R` 的每一个合法值 `r` 都等于其在 `X1`, ...,\
    \ `Xn` 上的投影 `r1`, ..., `rn` 的连接。`X1`, ..., `Xn` 被称为该连接依赖的组成部分，整个连接依赖可以读作“星 `X1`,\
    \ ..., `Xn`”（有时也读作“连接 `X1`, ..., `Xn`”——不过我必须赶紧补充，“连接”在这里其实不是最贴切的词，因为通常理解的连接操作符连接的是*关系*，而\
    \ `X1`, ..., `Xn` 不是关系，而是标题）。\n\n举个简单的例子，再次考虑供应商关系变量 `S`。如我们所知，该关系变量服从函数依赖 `{CITY}\
    \ → {STATUS}`，因此希斯定理告诉我们，它可以无损分解为其在 `{SNO,SNAME,CITY}` 和 `{CITY,STATUS}` 上的投影。换句话说，以下二元连接依赖在该关系变量中成立：\n\
    ```\n☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }\n```\n\n由此引出的要点：\n\n*  \
    \ 注意，根据定义，组成部分 `X1`, ..., `Xn` 的并集必须等于 `H`（即 `H` 的每个属性必须至少出现在这些组成部分中的一个里），否则 `R`\
    \ 就不可能等于这些组成部分对应投影的连接。\n\n*   不同的作者使用不同的符号来表示连接依赖；我使用一种特殊类型的星号（“☼”），但符号 ⋈（“领结”）在研究文献中更常见。^(¹²⁵)\n\
    \n*   指出这一点可能有所帮助：说某个连接依赖成立，等价于说如果我们把相应的投影连接起来，永远不会得到任何“伪”元组（正如我在第 3 章的练习 3.2\
    \ 中所称呼的那样）。\n"
- fmt: "以下是排版后的文档内容：\n\n假设我们观察到以下内容。我将通过一个简单但稍显抽象的例子来解释。设关系变量 *R* 仅包含属性 *A*、*B*、*C*\
    \ 和 *D*，并且连接依赖 ☼{*AB*,*BC*,*CD*}（“希思记法” — 见第 [7](#489629_2_En_7_Chapter.xhtml)\
    \ 章）在 *R* 中成立。此外，让我用符号 “∈” 表示 “出现在”（如第 [5](#489629_2_En_5_Chapter.xhtml) 章习题 5.4\
    \ 的答案中所述）。那么，所述 JD 在 *R* 中成立等价于以下陈述：\n\n```\nif    EXISTS c1 ( EXISTS d1 ( ( a\
    \  , b  , c1 , d1 ) ∈ R ) ) AND\n      EXISTS a2 ( EXISTS d2 ( ( a2 , b  , c \
    \ , d2 ) ∈ R ) ) AND\n      EXISTS a3 ( EXISTS b3 ( ( a3 , b3 , c  , d  ) ∈ R\
    \ ) )\nthen                          ( a  , b  , c  , d  ) ∈ R\n```\n\n*解释：* 假设\
    \ *R* 中存在一个元组满足 *A* = *a* 且 *B* = *b* ***并且*** *R* 中存在一个元组满足 *B* = *b* 且 *C* =\
    \ *c* ***并且*** *R* 中存在一个元组满足 *C* = *c* 且 *D* = *d*。那么元组 (*a*,*b*)、(*b*,*c*) 和\
    \ (*c*,*d*) 将分别出现在 *R* 在 *AB*、*BC* 和 *CD* 上的投影中，因此当我们连接这三个投影时，元组 (*a*,*b*,*c*,*d*)\
    \ 将会出现。\n\n此外，其逆命题显然也成立：如果元组 (*a*,*b*,*c*,*d*) 出现在 *R* 中，那么元组 (*a*,*b*)、(*b*,*c*)\
    \ 和 (*c*,*d*) 必然会出现在那三个投影中（因此上述正式陈述中的 ***如果*** 实际上可以被 ***当且仅当*** 所取代）。\n\n作为这一点的简单说明，假设以下\
    \ JD 在关系变量 S 中成立：\n\n```\n☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }\n```\n\
    \n—— 这意味着元组 (*s*,*n*,*t*,*c*) 出现在 S 中当且仅当存在一个 S 中的元组满足 SNO = *s* 且 SNAME = *n*\
    \ 且 CITY = *c* ***并且*** 存在一个 S 中的元组满足 CITY = *c* 且 STATUS = *t*。\n\n继续这个例子，我们知道，前述\
    \ JD 在关系变量 S 中成立是希思定理的一个逻辑推论。事实上，我们现在可以重新表述希思定理如下：\n\n*   **希思定理**（*针对关系变量，根据\
    \ JD 重述*）：设关系变量 *R* 的标题为 *H*，并设 *X*、*Y* 和 *Z* 是 *H* 的子集，使得 *X*、*Y* 和 *Z* 的并集等于\
    \ *H*。令 *XY* 表示 *X* 和 *Y* 的并集，类似地定义 *XZ*。如果 *R* 受函数依赖 *X* → *Y* 约束，那么 *R* 便受连接依赖\
    \ ☼{*XY*,*XZ*} 约束。\n\n因此，如前所述，FD 蕴含 JD —— 但并非所有 JD 都由 FD 蕴含，我们稍后会看到。在详细阐述这一点之前，让我强调一下要求：给定\
    \ JD 的组件的并集必须等于相关标题。对于 FD 则没有类似的要求；对于 FD，其左右两边不必是它们的并集等于相关标题，它们只需是该标题的子集。这一区别（至少在直观上）可能有助于突出\
    \ JD 和 FD 在本质上确实不同。\n\n现在，前述例子中的 JD —\n\n```\n☼ { { SNO , SNAME , CITY } , { CITY\
    \ , STATUS } }\n```\n\n—— 是二元的，正如我所说：它有两个组件，并且对应于一个无损分解成两个投影。相比之下，以下另一个 JD 在关系变量\
    \ S 中成立：\n\n```\n☼ { { SNO , SNAME } , { SNO , CITY } , { CITY , STATUS } }\n\
    ```\n\n这个是三元的，但它实际上是通过“级联”两个二元 JD 得到的：\n\n*   首先，我们已经知道，二元 JD ☼{{SNO,SNAME,CITY},{CITY,STATUS}}\
    \ 在 S 中成立。\n*   但是函数依赖 {SNO} → {SNAME} 在 S 在 {SNO,SNAME,CITY} 上的投影中成立（对应于该二元 JD\
    \ 的一个组件），^([^(126)](#fn126)) 因此二元 JD ☼{{SNO,SNAME},{SNO,CITY}} 在该投影中成立。\n\n由此可见，所述三元\
    \ JD 在原始关系变量中成立（并且该关系变量可以相应地无损分解成三个投影，但请理解我并不是说它应该这样做）。相比之下，在紧接的下一节中，我将给出一个三元\
    \ JD 的例子，它不是通过级联二元 JD 得到的，因此也是一个关系变量可以无损分解成三个投影而不能分解成两个的例子。\n\n## 处于 BCNF 但非 5NF\
    \ 的关系变量\n\n我将从我们通常的发货关系变量 SP 的一个修改版本开始 —— 我称它为 SPJ。修改包括 (a) 删除属性 QTY 和 (b) 引入一个新属性\
    \ JNO（“项目编号”）。其谓词是*供应商 SNO 向项目 JNO 供应零件 PNO*，一个样本值如图 [9-1](#489629_2_En_9_Chapter.xhtml#Fig1)\
    \ 所示。注意，该关系变量是“全码”的，因此肯定处于 BCNF。\n\n![../images/489629_2_En_9_Chapter/489629_2_En_9_Fig1_HTML.jpg](images/489629_2_En_9_Chapter/489629_2_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1\n关系变量 SPJ — 样本值\n\n现在假设以下业务规则（让我们称之为 BRX）生效：\n\n*   如果 (a) 供应商 *s* 供应零件\
    \ *p* 并且 (b) 零件 *p* 被供应给项目 *j* 并且 (c) 项目 *j* 由供应商 *s* 供应，那么 (d) 供应商 *s* 向项目 *j*\
    \ 供应零件 *p*。\n\n用稍微更具体的话说，业务规则 BRX 表示，如果以下三个都是真命题 —\n\n1.  Smith 向某个项目供应扳手\n2.\
    \  某人向 Manhattan 项目供应扳手\n3.  Smith 向 Manhattan 项目供应某物\n\n—— 那么以下命题也是一个真命题：\n\n\
    4.  Smith 向 Manhattan 项目供应扳手。\n\n换句话说，如果关系变量 SPJ 包含代表命题 a.、b. 和 c. 的元组，那么它必须也包含一个代表命题\
    \ d. 的元组。^([^(127)](#fn127)) 注意，图 [9-1](#489629_2_En_9_Chapter.xhtml#Fig1) 中的要求得到了满足（取\
    \ S1 为 Smith，P1 为扳手，J1 为 Manhattan 项目）。\n\n现在，命题 a.、b. 和 c. 通常并不蕴含命题 d.。详细来说，如果我们只知道命题\
    \ a.、b. 和 c. 为真，那么我们知道 Smith 向某个项目 *j* 供应扳手；我们知道某个供应商 *s* 向 Manhattan 项目供应扳手；并且我们知道\
    \ Smith 向 Manhattan 项目供应某个零件 *p* —— 但我们无法有效推断 *s* 就是 Smith，无法有效推断 *p* 就是扳手，也无法有效推断\
    \ *j* 就是 Manhattan 项目。诸如此类的错误推断就是有时被称为*连接陷阱*的例子。然而，在当前情况下，业务规则 BRX 告诉我们*没有陷阱*；也就是说，在这个特定案例中，我们*可以*从命题\
    \ a.、b. 和 c. 有效推断出命题 d.。\n\n现在让我们更仔细地考虑这个例子。让我暂时用 SP、PJ 和 JS 分别表示 SPJ 在 {SNO,PNO}、{PNO,JNO}\
    \ 和 {JNO,SNO} 上的投影。那么我们有以下结论：\n\n*   根据投影和连接的定义，\n\n    ```\n    IF   ( s , p\
    \ , j )     ∈  JOIN { SP , PJ , JS }\n    THEN ( s , p )         ∈  SP\n    AND\
    \  ( p , j )         ∈  PJ\n    AND  ( j , s )         ∈  JS\n    ```\n\n    因此存在\
    \ *s'*、*p'* 和 *j'* 使得\n\n    ```\n    ( s  , p  , j' )  ∈  SPJ\n    AND  ( s \
    \ , p' , j  )  ∈  SPJ\n    AND  ( s' , p  , j  )  ∈  SPJ\n    ```\n\n*   但根据业务规则\
    \ BRX，\n\n    ```\n    IF   ( s  , p  , j' )  ∈  SPJ\n    AND  ( s  , p' , j \
    \ )  ∈  SPJ\n    AND  ( s' , p  , j  )  ∈  SPJ\n    THEN ( s  , p  , j  )  ∈ \
    \ SPJ\n    ```\n\n因此，如果 (*s*,*p*,*j*) 出现在 SP、PJ 和 JS 的连接中，那么它也出现在 SPJ 中。但其逆命题显然也成立\
    \ —— 即，如果 (*s*,*p*,*j*) 出现在 SPJ 中，那么它必然出现在 SP、PJ 和 JS 的连接中。\n\n因此 (*s*,*p*,*j*)\
    \ 出现在 SPJ 中***当且仅当***它出现在 SP、PJ 和 JS 的连接中。由此可见，关系变量 SPJ 的每个合法值都等于其在 {SNO,PNO}、{PNO,JNO}\
    \ 和 {JNO,SNO} 上的投影的连接，因此以下 JD\n\n```\n☼ { { SNO , PNO } , { PNO , JNO } , { JNO\
    \ , SNO } }\n```\n\n在关系变量 SPJ 中当然成立。"
  raw: "*   The following observation might also be helpful. I’ll explain it in terms\
    \ of a simple, though slightly abstract, example. Let relvar *R* have attributes\
    \ *A*, *B*, *C*, and *D* (only), and let the JD ☼{*AB*,*BC*,*CD*} (“Heath notation”\
    \ —see Chapter [7](#489629_2_En_7_Chapter.xhtml)) hold in *R*. Also, let me use\
    \ the symbol “∈” to mean “appears in” (as in the answer to Exercise 5.4 in Chapter\
    \ [5](#489629_2_En_5_Chapter.xhtml)). Then to say the given JD holds in *R* is\
    \ equivalent to saying the following:\n\n```\nif    EXISTS c1 ( EXISTS d1 ( (\
    \ a  , b  , c1 , d1 ) ∈ R ) ) AND\nEXISTS a2 ( EXISTS d2 ( ( a2 , b  , c  , d2\
    \ ) ∈ R ) ) AND\nEXISTS a3 ( EXISTS b3 ( ( a3 , b3 , c  , d  ) ∈ R ) )\nthen \
    \                         ( a  , b  , c  , d  ) ∈ R\n```\n\n*Explanation:* Let\
    \ there exist a tuple in *R* with *A* = *a* and *B* = *b* ***and*** a tuple in\
    \ *R* with *B* = *b* and *C* = *c* ***and*** a tuple in *R* with *C* = *c* and\
    \ *D = d*. Then the tuples (*a*,*b*), (*b*,*c*), and (*c*,*d*) will appear in\
    \ the projections of *R* on *AB*, *BC*, and *CD*, respectively, and so the tuple\
    \ (*a*,*b*,*c*,*d*) will appear when we join these three projections together.\n\
    \nMoreover, the converse is clearly true as well: If the tuple (*a*,*b*,*c*,*d*)\
    \ appears in *R*, then the tuples (*a*,*b*), (*b*,*c*), and (*c*,*d*) will certainly\
    \ appear in those three projections (and so that ***if*** in the foregoing formal\
    \ statement could in fact be replaced by ***if and only if***).\n\nAs a simple\
    \ illustration of this last point, to say the following JD holds in relvar S—\n\
    \n```\n☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }\n```\n\n—is to say the\
    \ tuple (*s*,*n*,*t*,*c*) appears in S if and only if there exists a tuple in\
    \ S with SNO = *s* and SNAME = *n* and CITY = *c* ***and*** there exists a tuple\
    \ in S with CITY = *c* and STATUS = *t*.\n\nTo continue with this same example\
    \ for a moment, the fact that the foregoing JD holds in relvar S is a logical\
    \ consequence of Heath’s Theorem, as we know. In fact, we can now restate Heath’s\
    \ Theorem as follows:\n\n*   **Heath’s Theorem** (*for relvars, restated in terms\
    \ of JDs*): Let relvar *R* have heading *H* and let *X*, *Y*, and *Z* be subsets\
    \ of *H* such that the union of *X*, *Y*, and *Z* is equal to *H*. Let *XY* denote\
    \ the union of *X* and *Y*, and similarly for *XZ*. If *R* is subject to the FD\
    \ *X* → *Y*, then *R* is subject to the JD ☼{*XY*,*XZ*}.\n\nAs stated earlier,\
    \ therefore, FDs imply JDs—but not all JDs are implied by FDs, as we’ll see. Before\
    \ I elaborate on this point, however, let me stress the requirement that the union\
    \ of the components of a given JD must be equal to the pertinent heading. No analogous\
    \ requirement applies to FDs; with FDs, the left and right sides don’t have to\
    \ be such that their union is equal to the pertinent heading, they only have to\
    \ be subsets of that heading. This distinction might help to highlight the point\
    \ (at least intuitively) that JDs and FDs really are different in kind.\n\nNow,\
    \ the JD in the foregoing example—\n\n```\n☼ { { SNO , SNAME , CITY } , { CITY\
    \ , STATUS } }\n```\n\n—is binary, as I’ve said: It has two components, and it\
    \ corresponds to a nonloss decomposition into two projections. Here by contrast\
    \ is another JD that holds in relvar S:\n\n```\n☼ { { SNO , SNAME } , { SNO ,\
    \ CITY } , { CITY , STATUS } }\n```\n\nThis one is ternary, but it’s derived,\
    \ in effect, by “cascading” two binary ones:\n\n*   First, as we already know,\
    \ the binary JD ☼{{SNO,SNAME,CITY},{CITY,STATUS}} holds in S.\n\n*   But the FD\
    \ {SNO} → {SNAME} holds in the projection of S on {SNO,SNAME,CITY} (corresponding\
    \ to one of the components of that binary JD),^([^(126)](#fn126)) and so the binary\
    \ JD ☼{{SNO,SNAME},{SNO,CITY}} holds in that projection.\n\nIt follows that the\
    \ given ternary JD holds in the original relvar (and the relvar can be nonloss\
    \ decomposed into three projections accordingly, though please understand that\
    \ I’m not saying it should be). By contrast, in the section immediately following\
    \ I’ll give an example of a ternary JD that’s not derived by cascading binary\
    \ ones, and hence an example of a relvar that can be nonloss decomposed into three\
    \ projections and not into two.\n\n## A Relvar in BCNF and Not 5NF\n\nI’ll start\
    \ with a revised version—I’ll call it SPJ—of our usual shipments relvar SP. The\
    \ revisions consist of (a) dropping attribute QTY and (b) introducing a new attribute\
    \ JNO (“project number”). The predicate is *Supplier SNO supplies part PNO to\
    \ project JNO*, and a sample value is shown in Figure [9-1](#489629_2_En_9_Chapter.xhtml#Fig1).\
    \ Note that the relvar is “all key” and thus certainly in BCNF.\n\n![../images/489629_2_En_9_Chapter/489629_2_En_9_Fig1_HTML.jpg](images/489629_2_En_9_Chapter/489629_2_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nRelvar SPJ—sample value\n\nNow suppose the following business\
    \ rule (let’s call it BRX) is in effect:\n\n*   If (a) supplier *s* supplies part\
    \ *p* and (b) part *p* is supplied to project *j* and (c) project *j* is supplied\
    \ by supplier *s*, then (d) supplier *s* supplies part *p* to project *j*.\n\n\
    In slightly more concrete terms, what business rule BRX says is that if (for example)\
    \ all three of the following are true propositions—\n\n1.  Smith supplies monkey\
    \ wrenches to some project\n\n2.  Somebody supplies monkey wrenches to the Manhattan\
    \ project\n\n3.  Smith supplies something to the Manhattan project\n\n—then the\
    \ following is a true proposition as well:\n\n4.  Smith supplies monkey wrenches\
    \ to the Manhattan project.\n\nIn other words, if relvar SPJ contains tuples representing\
    \ propositions a., b., and c., it must also contain a tuple representing proposition\
    \ d.^([^(127)](#fn127)) Note that this requirement is met in Figure [9-1](#489629_2_En_9_Chapter.xhtml#Fig1)\
    \ (take S1 to be Smith, P1 to be monkey wrenches, and J1 to be the Manhattan project).\n\
    \nNow, propositions a., b., and c. would normally not imply proposition d. To\
    \ elaborate, if we know only that propositions a., b., and c. are true, then we\
    \ know that Smith supplies monkey wrenches to some project *j*; we know that some\
    \ supplier *s* supplies monkey wrenches to the Manhattan project; and we know\
    \ that Smith supplies some part *p* to the Manhattan project—but we can’t validly\
    \ infer that *s* is Smith, we can’t validly infer that *p* is monkey wrenches,\
    \ and we can’t validly infer that *j* is the Manhattan project. False inferences\
    \ such as these are examples of what’s sometimes called *the connection trap*.\
    \ In the case at hand, however, business rule BRX tells us *there is no trap*;\
    \ that is, we *can* validly infer proposition d. from propositions a., b., and\
    \ c. in this particular case.\n\nNow let’s consider the example more carefully.\
    \ Let me use SP, PJ, and JS, just for the moment, to denote the projections of\
    \ SPJ on {SNO,PNO}, {PNO,JNO}, and {JNO,SNO}, respectively. Then we have the following:\n\
    \n*   By the definitions of projection and join,\n\n```\n    IF   ( s , p , j\
    \ )     ∈  JOIN { SP , PJ , JS }\n    THEN ( s , p )         ∈  SP\n    AND  (\
    \ p , j )         ∈  PJ\n    AND  ( j , s )         ∈  JS\n    ```\n\nand therefore\
    \ there exist *s'*, *p'*, and *j'* such that\n\n```\n    ( s  , p  , j' )  ∈ \
    \ SPJ\n    AND  ( s  , p' , j  )  ∈  SPJ\n    AND  ( s' , p  , j  )  ∈  SPJ\n\
    \    ```\n\n*   But by business rule BRX,\n\n```\n    IF   ( s  , p  , j' )  ∈\
    \  SPJ\n    AND  ( s  , p' , j  )  ∈  SPJ\n    AND  ( s' , p  , j  )  ∈  SPJ\n\
    \    ```\n\nthen we necessarily have:\n\n*   So if (*s*,*p*,*j*) appears in the\
    \ join of SP, PJ, and JS, it also appears in SPJ. But the converse is obviously\
    \ true as well—i.e., if (*s*,*p*,*j*) appears in SPJ, it certainly appears in\
    \ the join of SP, PJ, and JS.\n\n```\n( s  , p  , j  )  ∈  SPJ\n```\n\nThus (*s*,*p*,*j*)\
    \ appears in SPJ ***if and only if*** it appears in the join of SP, PJ, and JS.\
    \ It follows that every legal value of relvar SPJ is equal to the join of its\
    \ projections on {SNO,PNO}, {PNO,JNO}, and {JNO,SNO}, and hence that the JD\n\n\
    ```\n☼ { { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }\n```\n\ncertainly holds\
    \ in relvar SPJ."
  trans: "\n以下是排版后的文档内容：\n\n假设我们观察到以下内容。我将通过一个简单但稍显抽象的例子来解释。设关系变量 *R* 仅包含属性 *A*、*B*、*C*\
    \ 和 *D*，并且连接依赖 ☼{*AB*,*BC*,*CD*}（“希思记法” — 见第 7 章）在 *R* 中成立。此外，让我用符号 “∈” 表示 “出现在”（如第\
    \ 5 章习题 5.4 的答案中所述）。那么，所述 JD 在 *R* 中成立等价于以下陈述：\n\n```\nif    EXISTS c1 ( EXISTS\
    \ d1 ( ( a  , b  , c1 , d1 ) ∈ R ) ) AND\n      EXISTS a2 ( EXISTS d2 ( ( a2 ,\
    \ b  , c  , d2 ) ∈ R ) ) AND\n      EXISTS a3 ( EXISTS b3 ( ( a3 , b3 , c  , d\
    \  ) ∈ R ) )\nthen                          ( a  , b  , c  , d  ) ∈ R\n```\n\n\
    *解释：* 假设 *R* 中存在一个元组满足 *A* = *a* 且 *B* = *b* ***并且*** *R* 中存在一个元组满足 *B* = *b*\
    \ 且 *C* = *c* ***并且*** *R* 中存在一个元组满足 *C* = *c* 且 *D* = *d*。那么元组 (*a*,*b*)、(*b*,*c*)\
    \ 和 (*c*,*d*) 将分别出现在 *R* 在 *AB*、*BC* 和 *CD* 上的投影中，因此当我们连接这三个投影时，元组 (*a*,*b*,*c*,*d*)\
    \ 将会出现。\n\n此外，其逆命题显然也成立：如果元组 (*a*,*b*,*c*,*d*) 出现在 *R* 中，那么元组 (*a*,*b*)、(*b*,*c*)\
    \ 和 (*c*,*d*) 必然会出现在那三个投影中（因此上述正式陈述中的 ***如果*** 实际上可以被 ***当且仅当*** 所取代）。\n\n作为这一点的简单说明，假设以下\
    \ JD 在关系变量 S 中成立：\n\n```\n☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }\n```\n\
    \n—— 这意味着元组 (*s*,*n*,*t*,*c*) 出现在 S 中当且仅当存在一个 S 中的元组满足 SNO = *s* 且 SNAME = *n*\
    \ 且 CITY = *c* ***并且*** 存在一个 S 中的元组满足 CITY = *c* 且 STATUS = *t*。\n\n继续这个例子，我们知道，前述\
    \ JD 在关系变量 S 中成立是希思定理的一个逻辑推论。事实上，我们现在可以重新表述希思定理如下：\n\n*   **希思定理**（*针对关系变量，根据\
    \ JD 重述*）：设关系变量 *R* 的标题为 *H*，并设 *X*、*Y* 和 *Z* 是 *H* 的子集，使得 *X*、*Y* 和 *Z* 的并集等于\
    \ *H*。令 *XY* 表示 *X* 和 *Y* 的并集，类似地定义 *XZ*。如果 *R* 受函数依赖 *X* → *Y* 约束，那么 *R* 便受连接依赖\
    \ ☼{*XY*,*XZ*} 约束。\n\n因此，如前所述，FD 蕴含 JD —— 但并非所有 JD 都由 FD 蕴含，我们稍后会看到。在详细阐述这一点之前，让我强调一下要求：给定\
    \ JD 的组件的并集必须等于相关标题。对于 FD 则没有类似的要求；对于 FD，其左右两边不必是它们的并集等于相关标题，它们只需是该标题的子集。这一区别（至少在直观上）可能有助于突出\
    \ JD 和 FD 在本质上确实不同。\n\n现在，前述例子中的 JD —\n\n```\n☼ { { SNO , SNAME , CITY } , { CITY\
    \ , STATUS } }\n```\n\n—— 是二元的，正如我所说：它有两个组件，并且对应于一个无损分解成两个投影。相比之下，以下另一个 JD 在关系变量\
    \ S 中成立：\n\n```\n☼ { { SNO , SNAME } , { SNO , CITY } , { CITY , STATUS } }\n\
    ```\n\n这个是三元的，但它实际上是通过“级联”两个二元 JD 得到的：\n\n*   首先，我们已经知道，二元 JD ☼{{SNO,SNAME,CITY},{CITY,STATUS}}\
    \ 在 S 中成立。\n*   但是函数依赖 {SNO} → {SNAME} 在 S 在 {SNO,SNAME,CITY} 上的投影中成立（对应于该二元 JD\
    \ 的一个组件），^(¹²⁶) 因此二元 JD ☼{{SNO,SNAME},{SNO,CITY}} 在该投影中成立。\n\n由此可见，所述三元 JD 在原始关系变量中成立（并且该关系变量可以相应地无损分解成三个投影，但请理解我并不是说它应该这样做）。相比之下，在紧接的下一节中，我将给出一个三元\
    \ JD 的例子，它不是通过级联二元 JD 得到的，因此也是一个关系变量可以无损分解成三个投影而不能分解成两个的例子。\n\n## 处于 BCNF 但非 5NF\
    \ 的关系变量\n\n我将从我们通常的发货关系变量 SP 的一个修改版本开始 —— 我称它为 SPJ。修改包括 (a) 删除属性 QTY 和 (b) 引入一个新属性\
    \ JNO（“项目编号”）。其谓词是*供应商 SNO 向项目 JNO 供应零件 PNO*，一个样本值如图 9-1 所示。注意，该关系变量是“全码”的，因此肯定处于\
    \ BCNF。\n\n![../images/489629_2_En_9_Chapter/489629_2_En_9_Fig1_HTML.jpg](img/489629_2_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1\n关系变量 SPJ — 样本值\n\n现在假设以下业务规则（让我们称之为 BRX）生效：\n\n*   如果 (a) 供应商 *s* 供应零件\
    \ *p* 并且 (b) 零件 *p* 被供应给项目 *j* 并且 (c) 项目 *j* 由供应商 *s* 供应，那么 (d) 供应商 *s* 向项目 *j*\
    \ 供应零件 *p*。\n\n用稍微更具体的话说，业务规则 BRX 表示，如果以下三个都是真命题 —\n\n1.  Smith 向某个项目供应扳手\n2.\
    \  某人向 Manhattan 项目供应扳手\n3.  Smith 向 Manhattan 项目供应某物\n\n—— 那么以下命题也是一个真命题：\n\n\
    4.  Smith 向 Manhattan 项目供应扳手。\n\n换句话说，如果关系变量 SPJ 包含代表命题 a.、b. 和 c. 的元组，那么它必须也包含一个代表命题\
    \ d. 的元组。^(¹²⁷) 注意，图 9-1 中的要求得到了满足（取 S1 为 Smith，P1 为扳手，J1 为 Manhattan 项目）。\n\n\
    现在，命题 a.、b. 和 c. 通常并不蕴含命题 d.。详细来说，如果我们只知道命题 a.、b. 和 c. 为真，那么我们知道 Smith 向某个项目 *j*\
    \ 供应扳手；我们知道某个供应商 *s* 向 Manhattan 项目供应扳手；并且我们知道 Smith 向 Manhattan 项目供应某个零件 *p*\
    \ —— 但我们无法有效推断 *s* 就是 Smith，无法有效推断 *p* 就是扳手，也无法有效推断 *j* 就是 Manhattan 项目。诸如此类的错误推断就是有时被称为*连接陷阱*的例子。然而，在当前情况下，业务规则\
    \ BRX 告诉我们*没有陷阱*；也就是说，在这个特定案例中，我们*可以*从命题 a.、b. 和 c. 有效推断出命题 d.。\n\n现在让我们更仔细地考虑这个例子。让我暂时用\
    \ SP、PJ 和 JS 分别表示 SPJ 在 {SNO,PNO}、{PNO,JNO} 和 {JNO,SNO} 上的投影。那么我们有以下结论：\n\n* \
    \  根据投影和连接的定义，\n\n    ```\n    IF   ( s , p , j )     ∈  JOIN { SP , PJ , JS }\n\
    \    THEN ( s , p )         ∈  SP\n    AND  ( p , j )         ∈  PJ\n    AND \
    \ ( j , s )         ∈  JS\n    ```\n\n    因此存在 *s'*、*p'* 和 *j'* 使得\n\n    ```\n\
    \    ( s  , p  , j' )  ∈  SPJ\n    AND  ( s  , p' , j  )  ∈  SPJ\n    AND  ( s'\
    \ , p  , j  )  ∈  SPJ\n    ```\n\n*   但根据业务规则 BRX，\n\n    ```\n    IF   ( s  ,\
    \ p  , j' )  ∈  SPJ\n    AND  ( s  , p' , j  )  ∈  SPJ\n    AND  ( s' , p  , j\
    \  )  ∈  SPJ\n    THEN ( s  , p  , j  )  ∈  SPJ\n    ```\n\n因此，如果 (*s*,*p*,*j*)\
    \ 出现在 SP、PJ 和 JS 的连接中，那么它也出现在 SPJ 中。但其逆命题显然也成立 —— 即，如果 (*s*,*p*,*j*) 出现在 SPJ 中，那么它必然出现在\
    \ SP、PJ 和 JS 的连接中。\n\n因此 (*s*,*p*,*j*) 出现在 SPJ 中***当且仅当***它出现在 SP、PJ 和 JS 的连接中。由此可见，关系变量\
    \ SPJ 的每个合法值都等于其在 {SNO,PNO}、{PNO,JNO} 和 {JNO,SNO} 上的投影的连接，因此以下 JD\n\n```\n☼ {\
    \ { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }\n```\n\n在关系变量 SPJ 中当然成立。\n"
- fmt: 'Observe now that the foregoing `JD` is ternary—it has three components. What’s
    more, it isn’t implied by `FDs`.^([^(128)](#fn128)) Hence it certainly isn’t implied
    by keys (recall from Chapter [5](#489629_2_En_5_Chapter.xhtml) that a key constraint
    is just a special case of an `FD`). As a consequence, relvar `SPJ`, although it’s
    in `BCNF` (because it’s “all key”), isn’t in `5NF`.


    In order to understand this state of affairs a little better, it’s helpful to
    go back to the sample `SPJ` value shown in Figure [9-1](#489629_2_En_9_Chapter.xhtml#Fig1).
    Figure [9-2](#489629_2_En_9_Chapter.xhtml#Fig2) shows (a) values of the projections
    `SP`, `PJ`, and `JS` corresponding to that sample value, (b) the effect of joining
    the `SP` and `PJ` projections (on `{PNO}`), and (c) the effect of joining that
    result and the `JS` projection (on `{JNO,SNO}`). As you can see, joining the first
    two projections produces a copy of the original `SPJ` relation plus one additional
    (“spurious”) tuple; joining in the other projection then eliminates that additional
    tuple, thereby getting us back to the original `SPJ` relation. Moreover, the net
    effect is the same whatever pair of projections we choose for the first join,
    though the intermediate result is different in each case. *Exercise:* Check this
    claim.


    ![../images/489629_2_En_9_Chapter/489629_2_En_9_Fig2_HTML.jpg](images/489629_2_En_9_Chapter/489629_2_En_9_Fig2_HTML.jpg)


    Figure 9-2


    `SPJ` = the join of all three of its binary projections but not of any two


    To repeat, therefore, the `JD` `☼{SP,PJ,JS}`—if now you’ll let me use the names
    `SP`, `PJ`, and `SJ` to refer not to the projections as such but to the corresponding
    headings—holds in relvar `SPJ`; in other words, that `JD` captures the essence,
    as it were, of business rule `BRX`. As a consequence, relvar `SPJ` can be nonloss
    decomposed accordingly. What’s more, it probably should be, because it suffers
    from redundancy; to be specific, in terms of the sample value of Figure [9-1](#489629_2_En_9_Chapter.xhtml#Fig1),
    the proposition that supplier S1 supplies part P1 to project J1 is represented
    both explicitly, by means of the tuple (S1,P1,J1), and implicitly, as a logical
    consequence of the `JD` and the propositions represented by the other three tuples.


    *More terminology:* We say a `JD` like the one that applies in the `SPJ` example
    is *tuple forcing*, because if certain tuples appear, it forces certain additional
    tuples to appear as well. In Figure [9-1](#489629_2_En_9_Chapter.xhtml#Fig1),
    for example, the appearance of the three tuples (S1,P1,J2), (S1,P2,J1), and (S2,P1,J1)
    forces the appearance of the tuple (S1,P1,J1). Note carefully that not all `JDs`
    are tuple forcing; for example, the join dependency `☼{{SNO,SNAME,CITY},{CITY,STATUS}}`
    holds in relvar `S`, as we know, but there’s no question of it forcing tuples
    to appear. *Note:* To jump ahead of ourselves for a moment, it’ll turn out later
    that a relvar that’s subject to a tuple forcing `JD` can’t be in `5NF` (though
    as the `SPJ` example shows, it can be in `BCNF`).


    ## Cyclic Rules


    Observe now the cyclic nature of business rule `BRX` (“if `s` is connected to
    `p` and `p` is connected to `j` and `j` is connected back to `s` again, then `s`
    and `p` and `j` must all be *directly* connected, in the sense that they must
    all appear together in the same tuple”). Let’s agree to describe that rule `BRX`
    as “3-way cyclic.” Then we can say more generally that it’s if an `n`-way cyclic
    rule exists for some `n` > 2 that we might be faced with a relvar that’s (a) in
    `BCNF` and not in `5NF` and therefore (b) can be nonloss decomposed into `n` projections
    and not into fewer.^([^(129)](#fn129))


    That said, I have to say too that in my experience such cyclic rules are rare
    in practice—which means that, in practice, most relvars, if they’re in at least
    `BCNF`, are probably in `5NF` as well. Indeed, it’s quite unusual in practice
    to find a relvar that’s in `BCNF` and not in `5NF`. Unusual, but not unknown!—I’ve
    certainly encountered a few real world examples myself on occasion. In other words,
    the fact that such relvars are unusual doesn’t mean you don’t need to worry about
    them, or about `JDs` and `5NF`. *Au contraire*, in fact: `JDs` and `5NF` are tools
    in your designer’s toolkit, as it were, and (other things being equal) you should
    probably try to ensure that all of the relvars in your database are in `5NF`.^([^(130)](#fn130))'
