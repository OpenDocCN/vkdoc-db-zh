- fmt: "# Preface to the First Edition\n\n![](images/978-1-4842-5540-7_CoverFigure.jpg)\n\
    \nISBN 978-1-4842-5539-1 e-ISBN 978-1-4842-5540-7 [https://doi.org/10.1007/978-1-4842-5540-7](https://doi.org/10.1007/978-1-4842-5540-7)\
