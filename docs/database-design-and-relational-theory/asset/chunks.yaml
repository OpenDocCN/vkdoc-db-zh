- fmt: "## Exercises\n\n1.  从记忆中绘制标准形式层级（“Version II”）。你的绘图应至少包含九种标准形式。\n\n2.  定义\
    \ (a) `FD` 冗余；(b) `JD` 冗余；(c) `ETNF`。\n\n3.  在本章正文中，我提到关系变量可以处于 `SKNF` 而不在 `5NF`\
    \ 中，并提出了以下关系变量作为例子：\n    令关系变量 `R` 具有属性 `A`、`B` 和 `C`；使用 `Heath` 表示法，令 `AB`、`BC`\
    \ 和 `CA` 都是 `R` 的键；并令连接依赖 `☼{AB,BC,CA}`——称之为 `J`——在 `R` 中成立。\n    但你可能不无理由地对这个例子感到些许怀疑。具体来说，你可能想知道，一个关系变量是否真的能存在，且恰好受制于指定的键约束和指定的\
    \ `JD`（尽管我确实接着给出了这个例子的一个稍微具体一些的版本）。通过证明事实上所有可能的依赖集（`FDs` 和 `JDs`）都是一致的——即总能找到至少一个满足该集合中所有依赖的关系——来表明这个例子毕竟是合理的。\n\
    \n4.  从“`5NF` 过强”一节中的关系变量 `SPJ′` 受制于可能被称为“对称”的 `JD`——即 `JD ☼{{SNO,PNO},{PNO,JNO},{JNO,SNO}}`——但它也表现出一些不对称性，因为该\
    \ `JD` 的三个分量中只有一个对应于一个键。直观上，你可能期望另外两个分量也对应于键。证明情况并非必然如此。\n\n5.  关于本章正文中的关系变量 `SPJ′`，证明以下业务规则必须如所述生效：\n\
    \    *   如果供应商 `s1` 向项目 `j2` 提供零件 `p1`，且供应商 `s2` 向项目 `j1` 提供零件 `p1`（`s1` ≠ `s2`，`j1`\
    \ ≠ `j2`），那么任何零件，甚至 `p1`，都不能由供应商 `s1` 提供给项目 `j1`。\n    *   如果供应商 `s1` 向项目 `j1`\
    \ 提供零件 `p2`，且供应商 `s2` 向项目 `j1` 提供零件 `p1`（`s1` ≠ `s2`，`p1` ≠ `p2`），那么 (c) 任何项目，甚至\
    \ `j1`，都不能由供应商 `s1` 提供零件 `p1`。\n\n6.  再次关于本章正文中的关系变量 `SPJ′`，给出一个 **Tutorial D**\
    \ `CONSTRAINT` 语句，对应于以下业务规则：\n    *   如果 (a) 供应商 `s1` 向项目 `j2` 提供零件 `p1` 且 (b)\
    \ 供应商 `s1` 向项目 `j1` 提供零件 `p2`（`p1` ≠ `p2`，`j1` ≠ `j2`），那么 (c) 任何供应商，甚至 `s1`，都不能向项目\
    \ `j1` 提供零件 `p1`。\n\n## Answers\n\n1.  参见图 [13-1](#489629_2_En_13_Chapter.xhtml#Fig1)。\n\
    \n2.  参见本章正文。\n\n3.  令关系 `r` 的标题为 `H`。那么如果 `r` 的基数（cardinality）为 `1` 或 `0`，它肯定将满足所有可以针对\
    \ `H` 定义的可能的 `FDs` 和 `JDs`。由此可知，所有可能的依赖集（`FDs` 和 `JDs`）都是一致的，尽管其中一些依赖集可能蕴含满足它们的关系其基数至多为一。（请注意，顺便说一句，基数至多为一的关系变量其唯一的键是空集\
    \ `{ }`——参见第 [4](#489629_2_En_4_Chapter.xhtml) 章练习 4.10 的答案——并且必然处于 `5NF`。）\n\n\
    4.  以下无疑是关系变量 `SPJ′` 的一个合法值—\n    ```\n    s1  p1  j1\n    s2  p1  j1\n    ```\n\
    \    （`s1` ≠ `s2`）—因此 `{PNO,JNO}` 不是一个键。同样，以下也是 `SPJ′` 的一个合法值—\n    ```\n    s1\
    \  p1  j1\n    s1  p2  j1\n    ```\n    （`p1` ≠ `p2`）—因此 `{JNO,SNO}` 也不是一个键。\n\
    \n5.  关于所述的第一条规则，假设关系变量 `SPJ′` 包含以下元组（注意“第三”个元组直接违反了该规则）：\n    ```\n    s1  p1\
    \  j2\n    s2  p1  j1\n    s1  px  j1\n    ```\n    （`s1` ≠ `s2`，`j1` ≠ `j2`）。以下是对应的二元投影：\n\
    \    ```\n    s1  p1      p1  j2      j2  s1\n    s2  p1      p1  j1      j1 \
    \ s2\n    s1  px      px  j1      j1  s1\n    ```\n    连接最左边的两个投影得到：\n    ```\n\
    \    s1  p1  j2\n    s1  p1  j1\n    s2  p1  j2\n    s2  p1  j1\n    s1  px  j1\n\
    \    ```\n    将此结果与第三个投影连接得到：\n    ```\n    s1  p1  j2\n    s1  p1  j1\n    s2\
    \  p1  j1\n    s1  px  j1\n    ```\n    但 `{SNO,PNO}` 是一个键，所以从“前两个元组”可以得出 `j1`\
    \ = `j2`：矛盾。因此第一条规则确实必须生效。\n    证明第二条规则也生效遵循相同的一般模式。\n\n6.  `CONSTRAINT ...`\n\
    \    ```\n    WITH ( T1 := SPJ′ RENAME { PNO AS Y1 , JNO AS Z1 } ) ,\n       \
    \   T2 := SPJ′ RENAME { PNO AS Y2 , JNO AS Z2 } ) ,\n          T3 := JOIN { T1\
    \ , T2 } ,\n          T4 := T3 WHERE Y1 ≠ Y2 AND Z1 ≠ Z2 ,\n          T5 := T4\
    \ { Y1 , Z2 } ,\n          T6 := T5 RENAME { Y1 AS PNO , Z2 AS JNO } ,\n     \
    \     T7 := JOIN { SPJ′ , T6 } ) :\n          IS_EMPTY ( T7 ) ;\n    ```\n\n \
    \   以下是一个用关系演算表述的上述约束（**Tutorial D** 当然基于关系代数）。令 `t1`、`t2`、`t3` 为在关系变量 `SPJ′`\
    \ 上取值的范围变量（range variables）。那么我们有：\n    ```\n    CONSTRAINT ...\n    FORALL t1\
    \ FORALL t2 FORALL t3\n    ( IF   t1.SNO = t2.SNO AND t1.PNO ≠ t2.PNO AND t1.JNO\
    \ ≠ t2.JNO\n      THEN t3.PNO ≠ t1.PNO OR  t3.JNO ≠ t2.JNO ) ;\n    ```\n\n##\
