  trans: '

    # 14. 6NF


    > *为什么，在早餐前，我有时能相信六件不可能的事情。*

    >

    > ——刘易斯·卡罗尔：《爱丽丝梦游仙境》（1865）


    套用我在第 9 章说过的话，到目前为止，在本书中我一直假设，我们唯一关心的范式，是那些涉及以投影作为分解运算符、并以连接作为相应重组运算符的范式。在那一章中我也说过，基于这个假设，5NF
    是最终的范式。然而，我在该章的一个脚注中也提到了一种叫做*第六*范式或 6NF 的东西，^(¹⁸⁵) 这正是本章要讨论的内容。


    那么，如果我们偏离关于分解和重组运算符的通常假设，会发生什么呢？嗯，在我们合著的《时间与关系理论：关系模型和 SQL 中的时间数据库》（Morgan Kaufmann，2014
    年）——下文简称为“时间书”——中，休·达文（Hugh Darwen）、尼科斯·洛伦佐斯（Nikos Lorentzos）和我定义了：


    1.  关系运算符的广义版本，特别是广义化的投影和连接，因此

    2.  基于这些广义化的投影和连接，定义了一种广义化的连接依赖，进而

    3.  定义了一种新的范式（即 6NF）。^(¹⁸⁶)


    正如描述这些发展的书名所暗示的，这些发展在时间数据方面尤为重要。然而，6NF 本身可以被定义为 (a) 不依赖于那些广义化的概念，从而 (b) 同样适用于——我敢说，甚至很重要——普通的或“常规的”（即非时间性的）数据。这正是下一节要讨论的内容。


    ## 常规数据的第六范式


    定义如下：


    *   `定义（常规数据的第六范式）`：关系变量 `R` 属于第六范式（6NF），当且仅当在 `R` 中成立的唯一连接依赖（JD）是平凡连接依赖；换句话说，在
    `R` 中成立的唯一连接依赖是 ☼{ ..., `H`, ... } 这种形式，其中 `H` 是 `R` 的标题。


    当然，我们永远无法摆脱平凡依赖；因此，一个 6NF 的关系变量除了通过平凡方式外，根本不能进行无损分解。^(¹⁸⁷) 因此，一个 6NF 的关系变量有时被称为*不可约的*（注意，这是另一种不可约性）。我们常用的供货关系变量
    `SP` 属于 6NF，第 9 章中的关系变量 `CTXD` 也属于 6NF；相比之下，我们常用的零件关系变量 `P` 属于 5NF 但不属于 6NF。（当然，我们常用的供应商关系变量
    `S` 甚至不属于 3NF。）


    现在，根据定义可以直接得出，每个 6NF 的关系变量当然也属于 5NF——也就是说，6NF 蕴含 5NF。此外，6NF 总是可达的。它在直觉上也很有吸引力，原因如下：


    *   如果关系变量 `R` 被其 6NF 投影 `R1`, ..., `Rn` 取代，那么 `R1`, ..., `Rn` 的谓词都是简单谓词，而 `R`
    整体的谓词是这些简单谓词的合取（即它是一个*合取谓词*）。


    让我立即解释一下这些话的含义：


    *   `定义（简单谓词与复合谓词）`：一个谓词是简单的，当且仅当它不涉及任何连接词。一个谓词是复合的（或称组合的），当且仅当它不是简单的。

    *   `定义（连接词）`：连接词是像 `AND`、`OR` 或 `NOT` 这样的逻辑运算符。

    *   `定义（合取谓词）`：一个合取谓词是两个或多个其他谓词的逻辑 `AND`。^(¹⁸⁸)


    例如，假设我们将关系变量 `P` 替换为其在属性 `{PNO,PNAME}`、`{PNO,COLOR}`、`{PNO,WEIGHT}` 和 `{PNO,CITY}`
    上的投影 `PN`、`PL`、`PW` 和 `PC`。那么这些投影的谓词如下（请注意，这些谓词都是简单谓词）：


    *   `PN`：     *零件 `PNO` 的名称是 `PNAME`。*

    *   `PL`：     *零件 `PNO` 的颜色是 `COLOR`。*

    *   `PW`：     *零件 `PNO` 的重量是 `WEIGHT`。*

    *   `PC`：     *零件 `PNO` 存放在城市 `CITY`。*


    而 `P` 本身的谓词是这四个谓词的逻辑 `AND`。^(¹⁸⁹) 因此，如例子所示，属于 6NF 的关系变量可以看作是将数据的含义分解成了无法再进一步分解的片段（它们代表了有时被称为“原子事实”，或更可取的说法是“不可约事实”的东西）。粗略地说，我们可能会说，一个
    6NF 关系变量的谓词不涉及任何 `AND`。


    在这方面，让我简要提醒一下第 12 章和第 9 章中的关系变量 `CTX` 和 `SPJ`。对于 `CTX`，其谓词无疑是合取的——*课程 `CNO` 可由教师
    `TNO` 教授* **并且** *课程 `CNO` 使用教材 `XNO`*——将该关系变量分解为其在 `{CNO,TNO}` 和 `{CNO,XNO}`
    上的二元（事实上是 6NF）投影，实际上消除了那个 `AND`。至于 `SPJ`，那里的谓词也是合取的，尽管在我陈述的简化形式中可能不明显。这是一个更完整的版本：*供应商
    `SNO` 供应零件 `PNO`* **并且** *零件 `PNO` 被供应给项目 `JNO`* **并且** *项目 `JNO` 由供应商 `SNO` 供应*
    **并且** *供应商 `SNO` 将零件 `PNO` 供应给项目 `JNO`*。同样，将该关系变量分解为其三个二元（事实上是 6NF）投影，实际上消除了这些
    `AND`。


    *   这里是对 6NF 的一个很好的特征描述（实际上，它是一个定理）：

    *   `定理`：关系变量 `R` 属于 6NF，当且仅当 (a) 它属于 5NF，(b) 它的度为 `n`，并且 (c) 它没有度小于 `n` – 1 的键。

