  trans: '


    ## 迄今总结


    让我总结一下目前的进展。核心要点是：某些**连接依赖**（`JD`）蕴含着其他`JD`。作为这一点的具体说明，我们已经讨论过：


    *   ***无关组件：*** 任意给定的`JD` `J`，等价于可以通过向`J`添加或从`J`删除无关组件而得到的每一个`JD` `J''`。


    *   ***合并组件：*** 任意给定的`JD` `J`，蕴含着可以通过将`J`中的两个或多个组件替换为它们的并集而得到的每一个`JD` `J''`。


    *   ***不可约性：*** 在关系变量 `R` 中成立的任意给定的`JD` `J`，等价于至少一个在 `R` 中成立且不可约的`JD` `J''`——该`J''`不一定与`J`不同（其中*等价*和*不可约*都必须理解为相对于
    `R` 而言）。由此可知，`R` 的不可约`JD`实际上蕴含了 `R` 的所有`JD`。


    以下观察同样有效（我没有详细讨论它们，但它们在直觉上是显而易见的）：


    *   ***添加属性：*** 如果`JD` `J` 在关系变量 `R` 中成立，那么通过将 `R` 的某个属性添加到 `J` 的某个组件中而获得的每一个`JD`
    `J''` 也在 `R` 中成立。


    *   ***添加组件：*** 如果`JD` `J` 在关系变量 `R` 中成立，那么通过将 `R` 的标题的任何子集作为另一个组件添加到 `J` 中而获得的每一个`JD`
    `J''` 也在 `R` 中成立。


    然而，在后两种情况下，我们讨论的是蕴含关系，而非等价关系。例如，在关系变量 `S` 中（但为简单起见，再次忽略 `SNAME`），以下 `JD`

    ```

    ☼ { { SNO , STATUS } , { SNO , CITY } }

    ```

    成立，因此，添加了一个组件的下列 `JD` 也成立：

    ```

    ☼ { { SNO , STATUS } , { SNO , CITY } , { CITY , STATUS } }

    ```

    然而，反之则不成立——如果后一个 `JD` 成立，并不能推出前一个 `JD` 也成立。^(^[¹⁴⁴])


    我们还可以这样说：如果 (a) `J` 是在关系变量 `R` 中成立的一个 `JD`，并且 `J` 蕴含另一个 `JD` `J''`（根据定义，`J''`
    因此也在 `R` 中成立），并且 (b) `J''` 是通过从 `J` 的组件中删除属性 和/或 从 `J` 中删除整个组件而得到的，那么 `J` 必然是一个“坏”的
    `JD`（参见“合并组件”一节末尾关于好`JD`与坏`JD`的论述）。然而，即使一个 `JD` `J` 不蕴含任何这样的 `JD` `J''`，它仍然可能是“坏”的，我们将会看到；也就是说，并非所有“坏”的
    `JD` 都遵循上述简单模式。


    现在，我想将讨论稍微推广一下。首先，从现在开始，术语*依赖*将根据上下文需要，指代`FD`（函数依赖）或`JD`（连接依赖）或两者兼有。^(^[¹⁴⁵])
    到目前为止，在本书中，每当我考虑一个依赖被其他依赖所蕴含的问题时，我大多（虽然是默认地）将注意力限制在由*单个*依赖所蕴含的那些依赖上。然而，更一般的情况是，某些依赖的*组合*可以蕴含其他依赖。让我举个例子。


    考虑一个关系变量 `SPT`，其属性为 `SNO`、`PNO` 和 `STATUS`（仅此而已），其中属性的含义如常。假设我们得知，以下依赖（一个`FD`和一个`JD`）都在此关系变量中成立，这并非毫无道理：

    ```

    { SNO , PNO } → { STATUS }

    ☼ { { SNO , PNO } , { SNO , STATUS } }

    ```

    现在，根据具体情况的语义，直觉上很明显：(a) `{SNO}` 不是 `SPT` 的键，然而 (b) `FD` `{SNO} → {STATUS}` 在 `SPT`
    中隐含地成立（因此顺便说一句，`SPT` 不属于`2NF`）。请注意，我说的是*隐含地*——我们并未被明确告知该`FD`成立。问题是：仅凭给定的`FD`和`JD`成立，我们能否*证明*
    (a) 和 (b)？也就是说，我们能否在不考虑任何语义的情况下，形式地证明 (a) 和 (b) 是有效的？（毕竟，如果我们希望系统能够推断依赖，系统就必须这样做。系统不知道任何语义，正如我在这里使用该术语那样。）^(^[¹⁴⁶])


    那么，让我们来尝试一下。首先，假设 `SPT` 中出现了以下元组——

    ```

    s1  p1  t1

    s1  p2  t2

    ```

    ——其中 `p1` ≠ `p2`。现在，为了证明 `FD` `{SNO} → {STATUS}` 成立，我们需要证明 `t1` 和 `t2` 必须相等。我们首先写下这两个元组对应于给定的
    `JD` `☼{{SNO,PNO},{SNO,STATUS}}` 的组件上的投影：

    ```

    s1  p1             s1  t1

    s1  p2             s1  t2

    ```

    将这两个投影连接起来，我们得到了原始的两个元组加上两个额外的元组（下面以**粗体**显示）：

    ```

    s1  p1  t1

    s1  p1  t2

    s1  p2  t1

    s1  p2  t2

    ```

    由于给定的 `JD` 成立，这两个额外的元组实际上必须随原始两个元组一起出现在该关系变量中。但 `FD` `{SNO,PNO} → {STATUS}` 也成立；由此可推出
    `t1` = `t2`，进而 `FD` `{SNO} → {STATUS}` 成立（每个具有 `SNO` 值为 `s1` 的元组也具有 `STATUS` 值为
    `t1`）。这是待证部分的 (b)。同时，根据我们的假设有 `p1` ≠ `p2`——请注意，到目前为止的论证中没有任何内容使该假设无效——由此可推出 `FD`
    `{SNO} → {PNO}` *不*成立，因此 `{SNO}` 不是键；这就是待证部分的 (a)。


    因此我们看到，任何给定的关系变量都既受显式依赖（这些是被显式声明的依赖）约束，也受隐式依赖（这些是由显式声明的依赖所蕴含的依赖）约束。为了记录在案，让我将这些要点整合到一个合适的定义中：


    *   **定义（显式依赖与隐式依赖）：** 设 `R` 是一个关系变量。与 `R` 相关联的是两组显式依赖：一组是 `R` 中成立的显式`FD` `XFD`，另一组是
    `R` 中成立的显式`JD` `XJD`。`XFD` 中的`FD`连同`XJD` 中的`JD` 就是 `R` 的显式依赖。那些不在 `XFD` 或 `XJD`
    中，但却是 `XFD` 和 `XJD` 中依赖的逻辑结果的`FD`和`JD`，则是 `R` 的隐式依赖。`R` 的显式依赖和隐式依赖合在一起，就是 `R`
    的依赖。一个关系 `r` 只有在满足 `R` 的所有依赖的条件下，才能被赋给 `R`。


    '
- fmt: '## The Chase Algorithm


    From everything we’ve seen in this chapter so far, the obvious question presents
    itself:


    > ***Given some set D of dependencies (FDs or JDs or a mixture), what dependencies
    d are implied by those in that set?***


    A partial answer to this question is provided by *the chase algorithm*, which
    is, precisely, an algorithm for testing whether some given dependency *d* is implied
    by some given set of dependencies *D*.^([^(147)](#fn147)) More specifically, given
    such a set *D* and such a dependency *d*, the chase will either:


    1.  Show that *d* is implied by *D*, or

    2.  Show that it isn’t, by providing an explicit counterexample—that is, a relation
    that satisfies all of the dependencies in *D* and yet violates *d*.


    As a matter of fact we’ve already seen some examples of the chase in action, as
    it were. In the previous section, I showed how a given FD and JD together implied
    a certain FD and not another (the latter was actually a key constraint, which
    is a special case of an FD constraint, of course). And in the section before that,
    I gave two examples in which a given FD and JD together implied a certain JD (thereby
    showing the given JD was reducible, incidentally). All of these examples were
    in fact applications of the chase. But now let’s get more specific. In order to
    do that, I first need to introduce a little more terminology:


    *   Consider FDs. Abstractly (though of course very loosely), an FD takes the
    form “If certain tuples `t1`, ..., `tn` appear, then certain attributes within
    those tuples must have equal values.” For this reason, FDs are sometimes said
    to be *equality generating* dependencies.

    *   Now consider JDs. Abstractly, but again very loosely, a JD takes the form
    “If certain tuples `t1`, ..., `tn` appear, then a certain tuple `t` must appear.”
    JDs are therefore sometimes said to be *tuple generating* dependencies.


    Before going any further, I must caution you not to confuse tuple generating and
    tuple *forcing* dependencies.^([^(148)](#fn148)) A tuple *forcing* dependency
    is a JD with the property that if tuples `t1`, ..., `tn` appear, then some tuple
    `t` is forced to appear that’s distinct from each of `t1`, ..., `tn`. By contrast,
    a tuple *generating* dependency (a) doesn’t require the “generated” tuple to be
    distinct from the given tuples and (b) doesn’t in fact have to be a JD, as such,
    at all. (However, the only tuple generating dependencies discussed in this book
    are indeed JDs specifically. For present purposes, therefore, you can take “tuple
    generating dependency” to mean a JD; thus, we can say that all tuple forcing dependencies
    are tuple generating, but some tuple generating dependencies aren’t tuple forcing.)


    Equality generating and tuple generating dependencies both involve a set of *premises*—viz.,
    the given tuples `t1`, ..., `tn`—and a *conclusion*. For a tuple generating dependency,
    the conclusion is the generated tuple `t`; for an equality generating dependency
    , it’s the fact that a certain equality holds.


    Now I can explain the chase algorithm as such. Perhaps I should say first that
    it’s essentially common sense; in fact, it tends to be easier to illustrate than
    to describe. In outline, however, it works like this. We’re trying to determine
    whether the dependency *d* follows from the dependencies in the set *D*. We proceed
    as follows:


    1.  We write down tuples representing the premises of *d*.

    2.  We apply the dependencies in *D* to those tuples (possibly generating additional
    tuples), and keep repeating this process until no further change occurs.


    This procedure overall will eventually yield either:


    1.  A representation of the conclusion of *d*, in which case *d* does follow from
    *D*, or

    2.  A relation that satisfies *D* but not *d*, in which case *d* doesn’t follow
    from *D*.


    Let’s do an example. Let the given set of dependencies be as follows:


    ```

    { A → C , B → C , C → D , CE → A , DE → C }

    ```


    (Actually they’re all FDs, as you can see.) Consider also the following JD (call
    it *J*):


    ```

    ☼ { AB , AD , AE , BE , CDE }

    ```


    I’ll now show that the given FDs do in fact imply *J* (a state of affairs that,
    I’ll think you agree, is far from immediately obvious).


    The first step is to write down tuples representing the premises of the JD *J*.
    Now, let me spell out exactly what that JD says:


    *   If all of the following are the case—a tuple appears with `A` = `a` and `B`
    = `b`; a tuple appears with `A` = `a` and `D` = `d`; a tuple appears with `A`
    = `a` and `E` = `e`; a tuple appears with `B` = `b` and `E` = `e`; a tuple appears
    with `C` = `c` and `D` = `d` and `E` = `e`.

    *   —then the following must also be the case: a tuple appears with `A` = `a`
    and `B` = `b` and `C` = `c` and `D` = `d` and `E` = `e`.


    However, it turns out to be more convenient in what follows to use, not `a`, `b`,
    `c`, `d`, and `e` as such, but rather suffixed `x`’s and `y`’s to denote attribute
    values. To be specific, I’ll use `x1`-`x5` in place of `a`-`e`, respectively,
    and I’ll use `y`’s in all other positions; e.g., I’ll use `y23` to denote the
    “third” (i.e., `C`) value in the “second” premise tuple. So the premise tuples
    look like this:^([^(149)](#fn149))


    ```

    x1   x2  y13  y14  y15

    x1  y22  y23   x4  y25

    x1  y32  y33  y34   x5

    y41   x2  y43  y44   x5

    y51  y52   x3   x4   x5

    ```


    If (and only if) the JD is implied by the five FDs, then, these tuples will “generate”
    the following tuple:


    ```

    x1   x2   x3   x4   x5

    ```


    So let’s see if it does; i.e., let’s apply the given dependencies.


    *   From `A` → `C`, we have `y13` = `y23` = `y33`; likewise, from `B` → `C`, we
    have `y13` = `y43`. So we can replace each of `y23`, `y33`, and `y43` by `y13`.
    The premise tuples become (replacements shown in **bold**):


    *   From `C` → `D`, we have `y14` = `y34` = `y44` = `x4`. Make the replacements:


    ```

    x1   x2  y13  y14  y15

    x1  y22  y13   x4  y25

    x1  y32  y13  y34   x5

    y41   x2  y13  y44   x5

    y51  y52   x3   x4   x5

    ```


    *   From `CE` → `A`, we have `y41` = `x1`. Make the replacements:


    ```

    x1   x2  y13   x4  y15

    x1  y22  y13   x4  y25

    x1  y32  y13   x4   x5

    y41   x2  y13   x4   x5

    y51  y52   x3   x4   x5

    ```


    *   From `DE` → `C`, we have `y13` = `x3`. Make the replacements:


    ```

    x1   x2  y13   x4  y15

    x1  y22  y13   x4  y25

    x1  y32  y13   x4   x5

    x1   x2  y13   x4   x5

    y51  y52   x3   x4   x5

    ```


    *   The “fourth” tuple here is all `x`’s, and so the JD *J* does indeed follow
    from the given FDs.


    ```

    x1   x2   x3   x4  y15

    x1  y22   x3   x4  y25

    x1  y32   x3   x4   x5

    x1   x2   x3   x4   x5   Success: all x''s !!!

    y51  y52   x3   x4   x5

    ```


    Let’s look at another example. Let the given set of dependencies consist of just
    the JD `{AB,AC}`. Does this set imply the FD `A` → `B`? *Note:* We already know
    the answer is no, because what we’re talking about here is the converse of Heath’s
    Theorem, and we know from Exercise 5.4 that the converse of Heath’s Theorem is
    false. But let’s see what the chase tells us:


    *   Premise tuples:


    ```

    x1  y12  y13

    x1  y22  y23

    ```


    If and only if the FD is implied by the JD, then applying the JD to these tuples
    will have to make `y12` and `y22` equal. Does it do so? Well:


    *   The given JD “generates” tuples as follows:


    *   The four tuples taken together satisfy the JD but not the FD; in particular,
    they don’t require that `y12` = `y22`. So the FD doesn’t follow from the JD.


    ```

    x1  y12  y23

    x1  y22  y13

    ```'
