- fmt: 'By the way, the theorem refers to *explicit* JDs of *R*, but in fact we could
    drop that “explicit” qualifier and what would be left would still be true (i.e.,
    *R* is in ETNF if and only if *every* JD that holds in *R* has a superkey component).^([^(168)](#fn168))
    However, including the qualifier makes the theorem “tighter,” in a sense. In particular,
    it means there’s no need to check a relvar’s implicit JDs in order to test whether
    the relvar in question is in ETNF.


    The next theorem provides another simple and useful test:


    *   **Theorem:** Relvar *R* is in ETNF if it’s in BCNF and has at least one noncomposite
    key (where a noncomposite key is one that isn’t composite, and a composite key
    is one that consists of two or more attributes).


    This theorem provides a sufficient condition, though not a necessary one, for
    a relvar to be in ETNF. By the way, it’s worth noting that the condition in question
    has the attractive property that it talks in terms of keys only, not JDs and not
    FDs (at least, not explicitly).


    The next theorem shows that ETNF does indeed fall strictly between 4NF and 5NF:


    *   **Theorem:** 5NF ⇒ ETNF ⇒ 4NF, while neither of the reverse implications holds.


    Finally, here’s another theorem giving a sufficient condition, though not a necessary
    one, for a relvar to be in ETNF:


    *   **Theorem:** Relvar *R* is in ETNF if it’s in 3NF and has no composite key.


    This result is immediate because the stated conditions in fact imply that relvar
    *R* is in 5NF.^([^(169)](#fn169)) Hence it’s in ETNF a fortiori.


    ### A Relvar in ETNF and not 5NF


    Relvar `SPJ′`, the second example from the previous section (“5NF Is Too Strong”),
    provides a concrete example of a relvar that’s in ETNF and not in 5NF. Just to
    remind you, that relvar has attributes `SNO`, `PNO`, and `JNO`; it has just one
    key, viz., `{SNO,PNO}`; it’s in BCNF; the predicate is *Supplier `SNO` supplies
    part `PNO` to project `JNO`*; and the following JD holds (but no others do, apart
    from ones that are logical consequences of this JD and/or the sole key):


    ```

    ☼ { { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }

    ```


    As noted earlier, this relvar isn’t in 5NF, precisely because the foregoing JD
    isn’t implied by the sole key. However, it *is* in ETNF, because the only explicit
    JD—i.e., the one just shown—that holds in the relvar has a component that’s a
    superkey (viz., the component `{SNO,PNO}`). In other words, the relvar, even though
    it’s not in 5NF, is nevertheless neither FD redundant nor JD redundant, and is
    thus redundancy free, and hence in ETNF.


    Suppose now that the relvar contains just these two tuples:


    ```

    t1  :  s1  p1  j2

    t2  :  s1  p2  j1

    ```


    (where, let’s assume, *p1* ≠ *p2* and *j1* ≠ *j2*). Suppose we now insert the
    following tuple:


    ```

    t3  :  s2  p1  j1

    ```


    (where *s2* ≠ *s1*). The JD then implies that the following tuple must appear
    as well:


    ```

    t4  :  s1  p1  j1

    ```


    As we saw earlier, however, tuples *t1* and *t4* here must in fact be one and
    the same, since they have the same key value. It follows that *j1* = *j2*, contradicting
    one of the original assumptions. Hence, if tuples *t1* and *t2* appear, then an
    attempt to insert tuple *t3* must fail, precisely because it leads to that contradiction.
    Moreover, since an attempt to insert tuple *t4* directly must also fail (either
    on a key uniqueness violation or because it implies *j1* = *j2*, take your pick),
    it follows that the following somewhat bizarre business rule must also be in effect:


    *   If (a) supplier *s1* supplies part *p1* to project *j2* and (b) supplier *s1*
    supplies part *p2* to project *j1* (*p1* ≠ *p2*, *j1* ≠ *j2*), then (c) no supplier,
    not even *s1*, can supply part *p1* to project *j1*.


    As a matter of fact, it turns out that the following equally bizarre rules must
    be in effect as well (note the symmetry):^([^(170)](#fn170))


    *   If (a) supplier *s1* supplies part *p1* to project *j2* and (b) supplier *s2*
    supplies part *p1* to project *j1* (*s1* ≠ *s2*, *j1* ≠ *j2*), then (c) no part,
    not even *p1*, can be supplied by supplier *s1* to project *j1*.


    *   If (a) supplier *s1* supplies part *p2* to project *j1* and (b) supplier *s2*
    supplies part *p1* to project *j1* (*s1* ≠ *s2*, *p1* ≠ *p2*), then (c) no project,
    not even *j1*, can be supplied by supplier *s1* with part *p1*.


    Actually these three rules can be combined into one, as follows. Let’s agree to
    say that each tuple of relvar `SPJ′` represents a shipment (by some supplier of
    some part to some project). Then there can’t exist three distinct shipments *x*,
    *y*, and *z* such that *x* and *y* involve the same supplier, *y* and *z* involve
    the same part, and *z* and *x* involve the same project.


    There’s another point to make (an important one) in connection with the `SPJ′`
    example. Refer once more to the analysis that led to the three “bizarre” business
    rules discussed above (the first of those rules in particular). That analysis
    showed that tuple *t3* can’t appear in the relvar together with tuples *t1* and
    *t2*. It follows, therefore, that `SPJ′`, although it’s in ETNF, nevertheless
    does suffer from an insertion anomaly. (By contrast, it doesn’t suffer from a
    deletion anomaly—assuming, that is, that the only constraints that hold are the
    stated JD and the stated key constraint and logical consequences thereof.) So
    one distinction between 5NF and ETNF is as follows:


    *   Even though both are redundancy free, 5NF guarantees “no insertion anomalies”
    while ETNF doesn’t—assuming, again, that FDs and JDs are the only kinds of constraints
    under consideration.^([^(171)](#fn171))


    Of course, it’s tempting to conclude from the `SPJ′` example that relvars that
    are in ETNF and not in 5NF are likely to be rare in practice. Nevertheless, there’s
    a clear logical difference between the two, and so—from the point of view of reducing
    redundancy, at least—it’s ETNF, not 5NF, that ought to be the target to be aimed
    for.


    As a matter of fact, the `SPJ′` example reinforces this latter claim in another
    way also. Since the relvar satisfies the ternary JD `☼{{SNO,PNO},{PNO,JNO},{JNO,SNO}}`,
    it can be nonloss decomposed into its projections on `{SNO,PNO}`, `{PNO,JNO}`,
    and `{JNO,SNO}`, respectively. Those projections are each all key, and each in
    fact is in 5NF. However, that decomposition “loses” the FD `{SNO,PNO} → {JNO}`!
    As we saw in Part II of this book, losing dependencies in such a manner is generally
    not recommended; hence relvar `SPJ′` illustrates the point that not only is 5NF
    sometimes too strong, but it might sometimes be positively contraindicated.


    ### A Relvar in 4NF and not ETNF


    As we’ve seen, relvar `SPJ′` is in ETNF and not in 5NF. It is, however, in 4NF
    (though not BCNF), because no nontrivial MVDs hold in that relvar at all. So what
    about a relvar that’s in 4NF and not in ETNF? In fact relvar `SPJ` (not `SPJ′`)
    provides an example. Just to recap, that relvar has attributes `SNO`, `PNO`, and
    `JNO`; is all key; and is subject to a certain ternary JD. No nontrivial MVDs—equivalently,
    no nontrivial binary JDs—hold in that relvar at all, however, and so it’s certainly
    in 4NF. But it’s not in ETNF (as we know), because no component of that ternary
    JD is a superkey. Nor is it in 5NF, of course, a fortiori.'
