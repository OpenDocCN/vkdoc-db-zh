  trans: '

    出于可读性的考虑，我特意撰写了一本篇幅较短的书，并且也有意让每一章都保持较短。^(²)（我深信应以小而易消化的块状方式传递信息。）此外，每一章都包含一套习题（其中大部分的答案在书末的附录
    D 中提供），^(³) 我确实建议你尝试完成其中部分习题，若能完成全部则更好。有些习题旨在展示如何将理论思想应用于实践；另一些习题（即便不在习题本身中，也会在答案里）提供了主题相关的额外信息，超出了正文所涵盖的范围；还有一些习题——例如，要求你证明某个简单的理论结果——旨在让你理解“像理论家一样思考”涉及哪些内容。总体而言，我试图让你对设计理论是什么以及它为何如此，获得一些洞见。


    ## 前置知识


    我的目标读者是数据库专业人士：更具体地说，是对数据库设计有浓厚兴趣的数据库专业人士。因此，我特别假定你对关系模型有相当程度的熟悉，或者至少熟悉该模型的某些方面（第
    2 章将更详细地讨论这些问题）。如前所述，熟悉 `SQL 与关系理论` 这本书会很有帮助。


    ## 逻辑设计与物理设计


    本书是关于设计`理论`的；因此，根据定义，它是关于逻辑设计，而非物理设计。当然，我并不是说物理设计不重要（当然不是）；但我的意思是，它是一项独立的活动，与逻辑设计分离且在逻辑设计之后进行。明确说明这一点，设计数据库的“正确”方式如下：


    1.  首先进行清晰的逻辑设计。然后，作为一个独立的后续步骤：

    2.  将该逻辑设计映射到目标 DBMS 所支持的任何物理结构上。^(⁴)


    因此请注意，物理设计应当源自逻辑设计，而不是反过来。（事实上，理想情况下，系统应当能够从逻辑设计“自动”推导出物理设计，完全无需人工参与该过程。）^(⁵)


    重申一下，本书是关于设计理论的。因此，它不涉及的另一件事是多年来不时提出的各种临时设计方法——如实体/关系建模等。当然，我意识到其中某些方法在实践中被相当广泛地使用，但事实是它们拥有的坚实理论基础相对较少。因此，它们大多超出了像本书这样的书籍的范围。不过，我确实在文中各处（尤其是在第
    8 章、第 17 章以及附录 C 中）对这些“非理论性”问题发表了一些看法。


    ### 关于作者


    脚注 1   2   3   4   5


    # 第一部分：背景介绍


    本书的这一部分由两章介绍性章节组成，其标题（分别是“前言”和“前置知识”）或多或少是自解释的。


    ## 1. 前言


    > *（当被问及什么是爵士乐时：）*

    >

    > *伙计，如果你还得问，那你永远也不会懂。*

    >

    > ——路易斯·阿姆斯特朗（据传）


    本书的副标题是 `范式及其他相关话题`。显然需要一些解释！首先，我谈论的当然是设计理论——即数据库设计理论——而众所周知，范式是该理论的主要组成部分；因此有了副标题的前半部分。但该理论远不止范式，这一事实解释了副标题的后半部分。第三，不幸的是——至少从从业者的角度来看——设计理论似乎充斥着难以理解、并且似乎与实际进行的设计工作关系不大的术语和概念。这就是为什么我将副标题的后半部分用通俗（甚至可以说是俚语）的措辞表达出来；我想传达这样一个观念：虽然我们偶尔不可避免地会处理“困难”的材料，但我会尽可能让对该材料的处理显得不那么令人望而生畏。当然，我是否达到了这个目标，要由你来评判。


    我还想就设计理论是否与实际进行的设计工作有关这一点再多说几句。让我明确一点：没有人能够或应该声称数据库设计是容易的。但扎实的理论知识只会有所帮助。事实上，如果你想正确地进行设计——如果你想构建出如预期那样健壮、灵活和准确的数据库——那么你必须掌握理论。别无选择：至少，如果你想声称自己是设计专业人士的话。设计理论是数据库设计的科学基础，正如关系模型是整个数据库技术的科学基础一样。正如任何从事一般数据库技术工作的专业人士都需要熟悉关系模型一样，任何专门从事数据库设计的人也需要熟悉设计理论。恰当的设计是如此重要！毕竟，数据库处于我们在计算世界中所做大量工作的核心；因此，如果它设计得很糟糕，负面影响可能会异常广泛。

