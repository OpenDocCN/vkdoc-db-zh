  trans: "\n## 元组与命题\n\n如您所知，在某个给定时间，出现在某个给定关系变量 `R` 中的每个元组都表示某个特定的命题。该命题是关系变量 `R`\
    \ 的关系变量谓词的一个实例化，（按惯例）在所讨论的时间被理解为真。例如，以下是关系变量 `HP` 的谓词（示例值如图 16-2 和 16-3 所示）：\n\
    \n*   *零件 `PNO` 的名称是 `PNAME`，颜色为 `COLOR`，重量为 `WEIGHT`（大于或等于 17.0 磅），并且存储在城市 `CITY`\
    \ 中。*\n\n当前该关系变量包含（除其他外）一个关于零件 `P6` 的元组，该元组代表了上述谓词的以下实例化：\n\n*   *零件 `P6` 的名称是\
    \ `Cog`，颜色为 `Red`，重量为 `19.0` 磅（大于或等于 17.0 磅），并且存储在城市 `London` 中。*\n\n粗略地说，我们可以说数据库“包含命题”（或至少是命题的表示）。现在，我曾在本书前面的几个地方说过，或者至少暗示过，数据库涉及一些冗余，当且仅当它将同一件事说了两次。现在我可以让这个说法更精确一点：\n\
    \n*   **定义（冗余）：** 数据库涉及冗余，当且仅当它包含同一命题的两种不同表示。\n\n既然元组表示命题，就很容易将上述定义理解为：数据库涉及冗余，当且仅当它包含同一个元组的两种不同出现。^(²¹¹)\
    \ 然而，不幸的是，这种对定义的（错误）解释充其量是过度简化了。让我们更仔细地审视它。\n\n首先，当然，至少有一点是真实的：我们不希望同一个元组在同一关系变量中出现多次（即在同一时间），因为这种情况肯定构成了“将同一件事说了两次”。（我曾听科德说过：如果某件事是真的，说两次也不会让它变得更真。）现在，关系模型本身通过定义处理了这个特定要求——关系从不包含重复元组，关系变量也是如此，因此我们可以忽略这种可能性。\n\
    \n这里有两点。第一，鉴于上述事实，可以说避免冗余的愿望是选择集合（根据定义不能包含重复元素）而不是“包”（可以包含）作为建立坚实数据库理论的正确数学抽象的动机之一——尽管可能是一个次要的动机（？）。SQL\
    \ 的辩护者们请注意！\n\n第二，我注意到现在我们有了“重复元组”概念的精确描述。（人们一直在使用这个短语，但我非常怀疑如果被追问，他们中有多少人能精确定义它。）严格来说，当然，两个元组是重复的，当且仅当它们是同一个元组，就像两个整数是重复的当且仅当它们是同一个整数。因此，从逻辑角度来看，“重复元组”这个短语并没有太大意义（说两个不同的元组是重复的是一种矛盾）。当人们使用那个短语时，他们真正谈论的是同一个元组的重复*出现*。因此，在数据库上下文中经常遇到的短语“重复消除”，更准确地说应该是*重复*消除。但我离题了……让我们回到主要讨论。\n\
    \n接下来，我观察到我们通常也不希望相同的*子*元组在同一关系变量中出现多次（同样，是在同一时间）。^(²¹²) 但经典规范化处理了这一点；例如，正是因为，在之前的章节中，函数依赖\
    \ `{CITY} -> {STATUS}` 在关系变量 `S` 中成立——导致相同的 `{CITY,STATUS}` 对（或子元组）反复出现，每次出现时具有相同的含义——我们被建议用其在\
    \ `{CITY,STATUS}` 和 `{SNO,SNAME,CITY}` 上的投影来替换该关系变量。\n\n我的下一个观点是，同一个元组可以表示任意数量的不同命题，这很容易看出。作为一个简单的例子，令\
    \ `SC` 和 `PC` 分别为关系变量 `S` 在 `{CITY}` 上的投影和关系变量 `P` 在 `{CITY}` 上的投影。给定我们通常的示例值，那么，仅包含\
    \ `CITY` 值 `London` 的元组同时出现在 `SC` 和 `PC` 中——但这两种出现代表不同的命题。具体来说，在 `SC` 中的出现代表命题\
    \ *伦敦至少有一个供应商*，而在 `PC` 中的出现代表命题 *伦敦至少有一个零件*（为示例起见，两种情况都略有简化）。\n\n更重要的是——在这里我必须稍微更正式一点——同一个命题也可以由任意数量的不同元组表示。这是因为，形式上，相关的属性名称是元组的一部分（如果需要确认这一点，请查看第\
    \ 5 章中*元组*的定义）。例如，考虑我们通常的供应关系变量 `SP`，其属性为 `SNO`、`PNO` 和 `QTY`，谓词为：\n\n*   *供应商\
    \ `SNO` 以数量 `QTY` 供应零件 `PNO`。*\n\n现在假设我们另外有一个关系变量 `PS`，其属性为 `SNR`、`PNR` 和 `AMT`，谓词为：\n\
    \n*   *供应商 `SNR` 以数量 `AMT` 供应零件 `PNR`。*\n\n那么（使用 `Tutorial D` 语法）以下元组很可能分别出现在关系变量\
    \ `SP` 和 `PS` 中：\n\n```\nTUPLE { SNO 'S1' , PNO 'P1' , QTY 300 }\nTUPLE { SNR\
    \ 'S1' , PNR 'P1' , AMT 300 }\n```\n\n这些显然是不同的元组，但它们都表示同一个命题，即：\n\n*   *供应商 `S1`\
    \ 以数量 `300` 供应零件 `P1`。*\n\n事实上，两个关系变量 `SP` 和 `PS` 中的每一个都可以用另一个来定义，正如以下约束（实际上是\
    \ `EQD`）所示：\n\n```\nCONSTRAINT ...\nPS = SP RENAME { SNO AS SNR , PNO AS PNR ,\
    \ QTY AS AMT } ;\nCONSTRAINT ...\nSP = PS RENAME { SNR AS SNO , PNR AS PNO , AMT\
    \ AS QTY } ;\n```\n\n因此，一个同时包含这两个关系变量的数据库显然涉及冗余。^(²¹³)\n\n上述讨论的要点是：元组和命题之间存在多对多的关系——任意数量的元组可以表示同一个命题，任意数量的命题可以由同一个元组表示。鉴于这种情况，这里尝试更精确地阐述正交性原则：\n\
    \n*   **定义（*****正交设计原则*****, 第二次尝试）**：设关系变量 `R1` 和 `R2` 是不同的，并且让它们的标题分别为 `{A1,...,An}`\
    \ 和 `{B1,...,Bn}`。将关系变量 `R1` 定义如下：\n\n    ```\n    R1 = R RENAME { A1 AS B1′ ,\
    \ ... , An AS Bn′ }\n    ```\n\n    其中 `B1′`, ..., `Bn′` 是 `B1`, ..., `Bn` 的某种排列。（注意\
    \ `R1` 和 `R2` 因此具有相同的标题。）^(²¹⁴) 那么，必须不存在限制条件 `c1` 和 `c2`（两者都不是恒假），使得以下等式依赖成立：\n\
    \n    ```\n    ( R1 WHERE c1 ) = ( R2 WHERE c2 )\n    ```\n\n### 源自这第二次尝试的要点：\n\
    \n*   遵守此版本的原则可以解决图 16-3 设计中的问题。具体来说，将 `R` 和 `R2` 分别设为 `LP` 和 `HP`，并将 `R1` 定义如下：\n\
    \n    ```\n    R1 = LP RENAME { PNO AS PNO , ... , CITY AS CITY }\n    ```\n"
- fmt: "(In other words, take `R1` to be identically equal to `R`.) Now take both\
    \ `c1` and `c2` to be the restriction condition `WEIGHT = 17.0`. Then the equality\
    \ dependency (`R1` WHERE `c1`) = (`R2` WHERE `c2`) obviously holds, and the design\
    \ thus violates orthogonality.\n\n*Note:* As this example demonstrates, so long\
    \ as `c1` and `c2` aren’t identically false, then certain tuples must exist that,\
    \ if and when they represent “true facts,” will necessarily have to appear in\
    \ both `R1` and `R2`—and, in essence, that’s the situation we want to outlaw.\
    \ (By contrast, if either of `c1` and `c2` were identically false, the corresponding\
    \ restriction—`R1` WHERE `c1` or `R2` WHERE `c2`, as applicable—would be empty,\
    \ and so there wouldn’t and couldn’t be any orthogonality violation.)\n\n- This\
    \ second version of the principle subsumes the first, because we can make `R1`\
    \ identical to `R`—in effect, by making the renaming a “no op,” as in the previous\
    \ bullet item. (As I pointed out earlier, the previous version of the principle\
    \ did assume the relvars in question had the same heading. As the discussions\
    \ of the present section have shown, however, we can’t limit our attention to\
    \ that simple case alone.) That second version also solves the SP vs. PS problem,\
    \ of course—in effect, by taking each of `c1` and `c2` to be simply TRUE.\n- Recall\
    \ from Chapter [6](#489629_2_En_6_Chapter.xhtml) that, in logic, something that’s\
    \ identically false (e.g., the boolean expression `WEIGHT >= 17.0 AND WEIGHT <\
    \ 17.0`) is called a *contradiction*. Thus, the requirement that `c1` and `c2`\
    \ not be identically false can be stated thus: Neither `c1` nor `c2` is a contradiction\
    \ in the logical sense.\n\n## The First Example Revisited\n\nNow let’s return\
    \ to our motivating example, in which relvar `S` was decomposed vertically into\
    \ its projections `SNC` and `STC` on `{SNO,SNAME,CITY}` and `{SNO,STATUS,CITY}`,\
    \ respectively.^(^(215)^(#fn215)) (The example of light vs. heavy parts involved\
    \ horizontal decomposition, of course.) Observe now that although `SNC` and `STC`\
    \ are certainly of the same degree, there’s no way any given tuple can appear\
    \ in both: Tuples in `SNC` have an `SNAME` attribute, while tuples in `STC` have\
    \ a `STATUS` attribute instead. What’s more, there’s no way we can simply rename\
    \ (say) the `SNAME` attribute in `SNC` to `STATUS` and thereby produce a relvar\
    \ with the same heading as `STC`, because `SNAME` in `SNC` is of type `CHAR` and\
    \ `STATUS` in `STC` is of type `INTEGER`. (Renaming attributes changes *names*,\
    \ not types.) It follows that our second attempt at defining the orthogonality\
    \ principle is still inadequate; in the case at hand, in fact, it simply doesn’t\
    \ apply.\n\nRecall now what the problem was with the foregoing design: The tuple\
    \ (`s`,`c`) appears in the projection of `SNC` on `{SNO,CITY}` if and only if\
    \ that very same tuple (`s`,`c`) appears in the projection of `STC` on `{SNO,CITY}`.\
    \ That is, the following EQD holds:\n\n```\nCONSTRAINT ... SNC { SNO , CITY }\
    \ = STC { SNO , CITY } ;\n```\n\nLet’s agree to ignore the question of attribute\
    \ renaming for the moment, since it isn’t relevant to this example. Then the crucial\
    \ point about the foregoing EQD is that it holds, not between distinct database\
    \ relvars as such, but rather between distinct *projections* of the *same* database\
    \ relvar: to be specific, projections arising from vertical decomposition of the\
    \ database relvar `S`. But such doesn’t have to be the case, of course—I mean,\
    \ `SNC` and `STC` might have been defined independently, as two completely distinct\
    \ relvars, without there ever having existed (in the designer’s mind, so to speak)\
    \ a relvar `S` that’s equal to their join. They might even be, not distinct relvars\
    \ in their own right, but projections of two such distinct relvars. All of which\
    \ leads to a third attempt at defining the orthogonality principle:\n\n- **Definition\
    \ (**The Principle of Orthogonal Design, third attempt**)**: Let relvars `R1`\
    \ and `R2` be distinct. Then:\n  1. There must not exist a JD `{X1,...,Xn}` that’s\
    \ irreducible with respect to `R1`^(^(216)^(#fn216)) such that\n  2. There exists\
    \ some `Xi` (1 <= `i` <= `n`) and some possibly empty set of attribute renamings\
    \ on the projection, `R1X` say, of `R1` on `Xi` that maps `R1X` into `R1Y`, say,\
    \ such that\n  3. `R1Y` has the same heading as some subset `Y` of the heading\
    \ of `R2`, such that\n  4. The following equality dependency holds:\n\n     ```\n\
    \     R1Y = R2Y\n     ```\n     (where `R2Y` is the projection of `R2` on `Y`).\n\
    \nNow, this all looks quite complex, but basically all it says is that no projection\
    \ in any nonloss decomposition of `R1` can be information equivalent to any projection\
    \ of `R2`. Indeed, as you can probably see, much of the complexity in the definition\
    \ (what complexity there is) arises from the need to deal with the renaming issue.\
    \ The following slightly simpler version of the definition, which ignores that\
    \ complication, might help to make the point clearer:\n\n- **Definition (The Principle\
    \ of Orthogonal Design, third attempt but ignoring renaming)**: Let relvars `R1`\
    \ and `R2` be distinct. Then:\n  1. There must not exist a JD `{X1,...,Xn}` that’s\
    \ irreducible with respect to `R1` such that\n  2. There exists some `Xi` (1 <=\
    \ `i` <= `n`) that’s identical to some subset `Y` of the heading of `R2`, such\
    \ that\n  3. The following equality dependency holds:\n\n     ```\n     R1Y =\
    \ R2Y\n     ```\n     (where `R1Y` and `R2Y` are the projections on `Y` of `R1`\
    \ and `R2`, respectively).\n\nObserve now that adherence to this third version\
    \ of the principle resolves the problem with our motivating example, in which\
    \ relvar `S` was decomposed into its projections `SNC` and `STC` on `{SNO,SNAME,CITY}`\
    \ and `STC {SNO,STATUS,CITY}`, respectively. Because suppose that decomposition\
    \ is done. Then:"
