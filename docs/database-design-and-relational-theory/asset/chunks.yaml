    \ , PNO , QTY } → { SNO , QTY }\n    { SNO , PNO , QTY } → { PNO , QTY }\n   \
    \ { SNO , PNO , QTY } → { SNO }\n    { SNO , PNO , QTY } → { PNO }\n    { SNO\
    \ , PNO , QTY } → { QTY }\n    { SNO , PNO , QTY } → { }\n    { SNO , PNO }  \
    \     → { SNO , PNO , QTY }\n    { SNO , PNO }       → { SNO , PNO }\n    { SNO\
    \ , PNO }       → { SNO , QTY }\n    { SNO , PNO }       → { PNO , QTY }\n   \
    \ { SNO , PNO }       → { SNO }\n    { SNO , PNO }       → { PNO }\n    { SNO\
    \ , PNO }       → { QTY }\n    { SNO , PNO }       → { }\n    { SNO , QTY }  \
    \     → { SNO , QTY }\n    { SNO , QTY }       → { SNO }\n    { SNO , QTY }  \
    \     → { QTY }\n    { SNO , QTY }       → { }\n    { PNO , QTY }       → { PNO\
    \ , QTY }\n    { PNO , QTY }       → { PNO }\n    { PNO , QTY }       → { QTY\
    \ }\n    { PNO , QTY }       → { }\n    { SNO }             → { SNO }\n    { SNO\
    \ }             → { }\n    { PNO }             → { PNO }\n    { PNO }        \
    \     → { }\n    { QTY }             → { QTY }\n    { QTY }             → { }\n\
    \    { }                 → { }\n    ```\n\n    其中，只有以下四个不是平凡的：\n\n    ```\n  \
