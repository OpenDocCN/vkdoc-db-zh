    \ body of the chapter (in the section “Combining Components”) that (a) the first\
    \ of these JDs implied the second but that (b) decomposing S on the basis of that\
    \ second JD (even though it’s irreducible) wouldn’t be a good idea. Why not?\n\
    \n4.  Can a JD be both trivial and irreducible?\n\n## Answers\n\n1.  *Which JDs\
    \ are trivial?* None. *Which ones involve irrelevant components?* i., k., and\
    \ l. *Which imply others?* a. implies b.; d. implies g. and h.; e. implies g.;\
    \ f. implies h. and i.; j. implies k. *Which pairs are equivalent?* None. *Which\
    \ are satisfied by the sample value in Figure*[*1-1*](#489629_2_En_1_Chapter.xhtml#Fig1)*?*\
    \ a., b., c., d., e., g., and l. *Which hold in relvar P?* a., b., c., e., and\
    \ l. *Which are irreducible?* a., b., c., and e.\n\n2.  1.  By Heath’s Theorem,\
    \ the answer is obviously yes (take *X* as *A*, *Y* as *BC*, and *Z* as *D*).\
    \ But let’s see if we can prove this result using the chase. Premise tuples:\n\
    \n```\n        x1  y12  y13   x4\n        x1   x2   x3  y24\n        ```\n\nFrom\
    \ the FD *A* → *B*, we have *y12* = *x2*; from the FD *A* → *C*, we have *y13*\
    \ = *x3*. Make the replacements:\n\n```\n        x1   x2   x3   x4\n        x1\
    \   x2   x3  y24\n        ```\n\nNow we have a tuple of all *x*’s, and the desired\
    \ result follows: The given JD does follow from the given JDs.\n\n2.  Premise\
    \ tuples:\n\n```\n        x1   x2  y13  y14\n        y21   x2   x3  y24\n    \
    \    y31  y32   x3   x4\n        ```\n\nThe FDs imply *y24* = *x4* and *y13* =\
    \ *x3*. Make the replacements:\n\n```\n        x1   x2   x3  y14\n        y21\
    \   x2   x3   x4\n        y31  y32   x3   x4\n        ```\n\nThe FD *C* → *D*\
    \ now implies *y14* = *x4*; making the replacement gives us a tuple of all *x*’s,\
    \ and so the result follows: The given JD does follow from the given FDs. Note\
    \ that we had to use one of the FDs twice in the chase in this example. Note too\
    \ that we could have obtained the same result by applying Heath’s Theorem twice:\
    \ The FD *C* → *D* implies the JD ☼{*CD*,*CAB*}, which in turn implies the JD\
    \ ☼{*CD*,*BC*,*BA*}, thanks to the FD *B* → *C*.\n\n3.  I leave it to you to show\
    \ the answer here is *no*.\n\n4.  Premise tuples:\n\n```\n        x1   x2  y13\
    \  y14\n        y21   x2   x3  y24\n        y31  y32   x3   x4\n        ```\n\n\
    Applying the JD ☼{*BC*,*ABD*} to the tuples with a common *B* value (viz., *x2*)\
    \ generates the following tuples:\n\n```\n        x1    x2   x3  y24\n       \
    \ y21   x2  y13  y14\n        ```\n\nWe don’t obtain a tuple of all *x*’s, and\
    \ so the “target” JD doesn’t follow from the given one; in fact, we now have a\
    \ sample relation (of five tuples) that satisfies the latter and not the former.\n\
    \n3.  Here first is a proof of part (b) of the extended theorem:\n    1.  *X*\
    \ → *Y*     (given)\n\n2.  *XZ* → *YZ*     (augmentation)\n\n3.  *XZ* → *XZ*     (self\
    \ determination)\n\n4.  *XZ* → *XYZ*     (2 and 3, union)\n\nHence *XZ* is a superkey\
    \ for *R*.\n\nAs for the converse, suppose relvar *R* contains the following tuples:\n\
    \n```\n    x  y1  z1\n    x  y2  z2\n    ```\n\nThanks to the JD ☼{*XY*,*XZ*},\
    \ the following tuples must then also appear:\n\n```\n    x  y1  z2\n    x  y2\
    \  z1\n    ```\n\nBut *XZ* is a superkey and so *XZ* → *Y* holds, so *y1* = *y2*;\
    \ hence *X* → *Y* holds.\n\n4.  This exercise is discussed further in Chapter\
    \ [16](#489629_2_En_16_Chapter.xhtml), but I give a preliminary discussion here.\
    \ First of all, suppose such a decomposition (i.e., on the basis of the second\
    \ JD) were done. Let the projections so obtained be labeled SNC and CTN in the\
    \ obvious way. Then the projections of SNC and CTN on {SNAME,CITY} are clearly\
    \ equal; that is, the following equality dependency (EQD) holds—\n\n```\nCONSTRAINT\
    \ ... SNC { SNAME , CITY } = CTN { SNAME , CITY } ;\n```\n\n—and relvars SNC and\
    \ CTN thus suffer from redundancy.\n\nObserve further that the FD {CITY} → {STATUS}\
    \ holds in CTN. By Heath’s Theorem, therefore, we can decompose CTN into its projections\
    \ CT and CN on {CITY,STATUS} and {CITY,SNAME}, respectively. It follows that the\
    \ JD\n\n```\n☼ { { SNO , SNAME , CITY } , { CITY , STATUS , SNAME } }\n```\n\n\
    implies the JD\n\n```\n☼ { { SNO , SNAME , CITY } , { CITY , STATUS } , { CITY\
    \ , SNAME } }\n```"
  trans: "\n## 结束语\n\n在本章中，我们已经看到连接依赖（JD）隐含连接依赖；一个 JD 和一个函数依赖（FD）共同隐含一个 FD；FD 隐含 JD；以及在前几章中，FD\
    \ 隐含 FD。然而，请注意，追踪（chase）过程让我们能够做的，仅仅是确定一个*特定的*依赖是否由给定的依赖集推导出来。它并不能让我们从给定集合中*推断*或*生成*新的依赖（这就是为什么我在前一节开头附近说，追踪只提供了该问题的部分答案）。为此，我们需要为\
    \ FD 和 JD 建立一套公理化体系。尽管阿姆斯特朗规则（Armstrong's rules）为 FD 本身提供了一套可靠且完备的公理化体系，但不幸的是，一个已知的事实是，对于同时考虑\
    \ FD 和 JD 的情况，并不存在这样的公理化体系。^(¹⁵⁰)\n\n### 练习\n\n1.  考虑供应商-零件数据库中的零件关系变量 `P`。为简化起见，我们将属性\
    \ `PNO`、`PNAME`、`COLOR`、`WEIGHT` 和 `CITY` 分别重命名为 `A`、`B`、`C`、`D` 和 `E`，并再次使用希思（Heath）记号法。那么以下\
    \ JD 都是相对于 `P` 的标题定义的：\n    1.  ☼ `{AC , ABDE}`\n    2.  ☼ `{ACD , ABDE}`\n  \
    \  3.  ☼ `{AE , ABCD}`\n    4.  ☼ `{AB , ACD , CE}`\n    5.  ☼ `{AB , ACD , AE}`\n\
    \    6.  ☼ `{AB , BCD , DE}`\n    7.  ☼ `{ABC , ACDE , CE}`\n    8.  ☼ `{ABCD\
    \ , BDE , BCE}`\n    9.  ☼ `{AB , ABC , BCD , CDE , AD}`\n    10. ☼ `{AB , BC\
    \ , CD , DE , AD}`\n    11. ☼ `{ABD , CDE , ABC , BE , ABE}`\n    12. ☼ `{A ,\
    \ AB , ABC , ABD , ACE}`\n\n    这些 JD 中哪些是平凡的？哪些包含了无关分量？哪些隐含了列表中的其他 JD？哪些对之间是相互等价的？哪些被图\
    \ 1-1 所示的关系变量 `P` 的样本值所满足？哪些在关系变量 `P` 中成立？哪些相对于 `P` 是不可约的？\n\n2.  本练习中的依赖都是相对于由属性\
    \ `ABCD` 组成的标题定义的。\n    1.  FD 集合 `{A → B, A → C}` 是否隐含 JD ☼{`AD`,`ABC`}？\n  \
    \  2.  FD 集合 `{C → D, B → C}` 是否隐含 JD ☼{`AB`,`BC`,`CD`}？\n    3.  FD 集合 `{A →\
    \ B, B → C}` 是否隐含 JD ☼{`AB`,`BC`,`CD`}？\n    4.  JD ☼{`BC`,`ABD`} 是否隐含 JD ☼{`AB`,`BC`,`CD`}？\n\
    \n3.  我们从第 5 章的练习 5.4 中得知，希思定理（Heath's Theorem）的逆命题是错误的。然而，该定理有一个扩展版本，其逆命题是正确的。如下所示：\n\
    \n    **希思定理**（*扩展版本*）：设关系变量 `R` 的标题为 `H`，并设 `X`、`Y` 和 `Z` 是 `H` 的子集，使得 `X`、`Y`\
    \ 和 `Z` 的并集等于 `H`。令 `XY` 表示 `X` 和 `Y` 的并集，`XZ` 同理。如果 `R` 受 FD `X → Y` 约束，那么 (a)\
    \ `R` 受 JD ☼{`XY`,`XZ`} 约束，并且 (b) `XZ` 是 `R` 的一个超键。\n\n    证明此定理的(b)部分。同时证明 (a)\
    \ 和 (b) 一起蕴含 `X → Y` 成立（即扩展定理的逆命题）。\n\n4.  考虑以下两个在关系变量 `S` 中成立的 JD：\n\n    ```\n\
    \    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS } , { SNAME , CITY } }\n   \
    \ ☼ { { SNO , SNAME , CITY } , { CITY , STATUS , SNAME } }\n    ```\n\n    我在本章正文（“合并分量”一节）中指出，(a)\
    \ 第一个 JD 隐含第二个 JD，但是 (b) 基于第二个 JD 对 `S` 进行分解（即使它是不可约的）也不是一个好主意。为什么？\n\n5.  一个\
    \ JD 可以同时是平凡的并且是不可约的吗？\n\n### 答案\n\n1.  *哪些 JD 是平凡的？* 没有。*哪些包含了无关分量？* i.、k. 和\
    \ l.。*哪些隐含了其他 JD？* a. 隐含 b.；d. 隐含 g. 和 h.；e. 隐含 g.；f. 隐含 h. 和 i.；j. 隐含 k.。*哪些对之间是等价的？*\
    \ 没有。*哪些被图 1-1 的样本值所满足？* a.、b.、c.、d.、e.、g. 和 l.。*哪些在关系变量 `P` 中成立？* a.、b.、c.、e.\
    \ 和 l.。*哪些是不可约的？* a.、b.、c. 和 e.。\n\n2.  1.  根据希思定理，答案显然是肯定的（取 `X` 为 `A`，`Y` 为\
    \ `BC`，`Z` 为 `D`）。但让我们看看是否能用追踪来证明这个结果。前提元组：\n\n        ```\n        x1  y12  y13\
    \   x4\n        x1   x2   x3  y24\n        ```\n\n        根据 FD `A → B`，我们有 `y12\
    \ = x2`；根据 FD `A → C`，我们有 `y13 = x3`。进行替换：\n\n        ```\n        x1   x2   x3\
    \   x4\n        x1   x2   x3  y24\n        ```\n\n        现在我们得到了一个全为 `x` 的元组，所需的结果随之得出：给定的\
    \ JD 确实由给定的 JD 隐含。\n\n    2.  前提元组：\n\n        ```\n        x1   x2  y13  y14\n\
    \        y21   x2   x3  y24\n        y31  y32   x3   x4\n        ```\n\n     \
    \   FD 隐含 `y24 = x4` 和 `y13 = x3`。进行替换：\n\n        ```\n        x1   x2   x3 \
    \ y14\n        y21   x2   x3   x4\n        y31  y32   x3   x4\n        ```\n\n\
    \        现在 FD `C → D` 隐含 `y14 = x4`；进行替换后我们得到一个全为 `x` 的元组，因此结果成立：给定的 JD 确实由给定的\
    \ FD 隐含。注意在这个例子中，我们在追踪中不得不使用了一个 FD 两次。还需注意，我们可以通过应用两次希思定理获得相同的结果：FD `C → D` 隐含\
    \ JD ☼{`CD`,`CAB`}，而该 JD 又借助 FD `B → C` 隐含 JD ☼{`CD`,`BC`,`BA`}。\n\n    3.  我留给你来证明这里的答案是*否定*的。\n\
    \n    4.  前提元组：\n\n        ```\n        x1   x2  y13  y14\n        y21   x2  \
    \ x3  y24\n        y31  y32   x3   x4\n        ```\n\n        将 JD ☼{`BC`,`ABD`}\
    \ 应用于具有相同 `B` 值（即 `x2`）的元组，生成以下元组：\n\n        ```\n        x1    x2   x3  y24\n\
    \        y21   x2  y13  y14\n        ```\n\n        我们并没有得到一个全为 `x` 的元组，因此“目标”JD\
    \ 并不由给定的 JD 隐含；事实上，我们现在有了一个满足后者但不满足前者的示例关系（由五个元组组成）。\n\n3.  首先证明扩展定理的(b)部分：\n\
    \    1.  `X → Y`     (给定)\n    2.  `XZ → YZ`     (增广律)\n    3.  `XZ → XZ`    \
    \ (自反律)\n    4.  `XZ → XYZ`     (由 2 和 3，合并)\n\n    因此，`XZ` 是 `R` 的一个超键。\n\n \
    \   至于逆命题，假设关系变量 `R` 包含以下元组：\n\n    ```\n    x  y1  z1\n    x  y2  z2\n    ```\n\
    \n    由于 JD ☼{`XY`,`XZ`}，以下元组也必然出现：\n\n    ```\n    x  y1  z2\n    x  y2  z1\n\
    \    ```\n\n    但 `XZ` 是一个超键，因此 `XZ → Y` 成立，所以 `y1 = y2`；因此 `X → Y` 成立。\n\n4.\
    \  这个练习在第 16 章有进一步讨论，但我在此先做一个初步分析。首先，假设进行了这样的分解（即基于第二个 JD）。设投影得到的关系变量按明显方式标记为\
    \ `SNC` 和 `CTN`。那么，`SNC` 和 `CTN` 在 `{SNAME,CITY}` 上的投影显然是相等的；也就是说，以下等式依赖（EQD）成立——\n\
    \n    ```\n    CONSTRAINT ... SNC { SNAME , CITY } = CTN { SNAME , CITY } ;\n\
    \    ```\n\n    ——因此关系变量 `SNC` 和 `CTN` 存在冗余。\n\n    进一步观察，在 `CTN` 中 FD `{CITY}\
    \ → {STATUS}` 成立。因此，根据希思定理，我们可以将 `CTN` 分解为其在 `{CITY,STATUS}` 和 `{CITY,SNAME}`\
    \ 上的投影，分别记为 `CT` 和 `CN`。由此可见，JD\n\n    ```\n    ☼ { { SNO , SNAME , CITY } , {\
    \ CITY , STATUS , SNAME } }\n    ```\n\n    隐含了 JD\n\n    ```\n    ☼ { { SNO ,\
    \ SNAME , CITY } , { CITY , STATUS } , { CITY , SNAME } }\n    ```\n"
- fmt: "In this latter JD, however, the `{CITY,SNAME}` component is clearly irrelevant,\
    \ since it’s a proper subset of the `{SNO,SNAME,CITY}` component; it can therefore\
    \ be dropped without significant loss. (In fact, of course, this latter JD is\
    \ identical to the first of the two JDs as given in the original exercise.)\n\n\
    1.  Yes! To be specific, every relvar `R` is subject to the trivial and irreducible\
    \ JD `{H}`, where `H` is the heading of `R`. (The corresponding decomposition\
    \ is into the pertinent identity projection.)\n\nFootnotes [1](#489629_2_En_11_Chapter.xhtml#Fn1_source)\
    \   [2](#489629_2_En_11_Chapter.xhtml#Fn2_source)   [3](#489629_2_En_11_Chapter.xhtml#Fn3_source)\
    \   [4](#489629_2_En_11_Chapter.xhtml#Fn4_source)   [5](#489629_2_En_11_Chapter.xhtml#Fn5_source)\
    \   [6](#489629_2_En_11_Chapter.xhtml#Fn6_source)   [7](#489629_2_En_11_Chapter.xhtml#Fn7_source)\
    \   [8](#489629_2_En_11_Chapter.xhtml#Fn8_source)\n\n# 12. MVDs and 4NF\n\n> *Who’s\
    \ on first, What’s on second, I Don’t Know’s on third.*\n>\n> —Bud Abbott and\
    \ Lou Costello: *The Naughty Nineties* (1945)\n\nIn Chapter [10](#489629_2_En_10_Chapter.xhtml),\
    \ I said that 4NF, like 2NF and 3NF, is mostly of historical interest. However,\
    \ that characterization is possibly a little unfair, because:\n\n*   First of\
    \ all, 4NF is *the* normal form with respect to what are called multivalued dependencies\
    \ or `MVD`s. Now, `MVD`s are really just a special kind of `JD`; so if you know\
    \ about `JD`s in general, you know about `MVD`s as well, in a sense. Nevertheless,\
    \ `MVD`s are still worth studying in their own right (for one thing, they’re probably\
    \ more common in practice than `JD`s that aren’t `MVD`s).\n\n*   Second, `MVD`s\
    \ have a more intuitive real world interpretation than `JD`s in general do, and\
    \ therefore tend to be a little easier to understand.\n\n*   Third, `MVD`s, unlike\
    \ `JD`s in general, do have an axiomatization, as we’ll see.\n\nSo let’s take\
    \ a closer look.\n\n## An Introductory Example\n\nIn this section and the next,\
    \ I’ll examine `MVD`s from a comparatively informal point of view; in the section\
    \ after that I’ll consider them again, but more formally, and use that more formal\
    \ understanding to lead up to 4NF. I’ll begin with a definition:\n\n*   **Definition\
    \ (multivalued dependency as a `JD`):** A multivalued dependency (`MVD`) is a\
    \ join dependency with exactly two components.\n\nIt follows from this definition\
    \ that a nonloss decomposition on the basis of an `MVD` always yields exactly\
    \ two projections (recall that `JD`s in general are *n-*way for some positive\
    \ integer *n*, where *n* can be greater than two; by contrast, `MVD`s are always\
    \ exactly 2-way). It follows further that the following `JD` (for example) is\
    \ in fact an `MVD`:\n\n```\n☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }\n\
    ```\n\nNow, we’ve seen this particular `JD` repeatedly in this book; it holds\
    \ in relvar `S`. But didn’t I say in Chapter [9](#489629_2_En_9_Chapter.xhtml)\
    \ that this particular `JD` was implied by a *functional* dependency: viz., the\
    \ `FD` `{CITY} → {STATUS}`? Indeed I did; what the example shows, therefore, is\
    \ that some `MVD`s are implied by `FD`s. But not all are, and as you’d probably\
    \ expect it’s the ones that aren’t that are the interesting ones, in a sense.\
    \ So let’s take a look at an example of one of those “interesting ones.” Consider\
    \ Figure [12-1](#489629_2_En_12_Chapter.xhtml#Fig1), which shows a sample value\
    \ for a relvar called `CTX`.^([^(151)](#fn151)) The predicate is *Course `CNO`\
    \ can be taught by teacher `TNO` and uses textbook `XNO`*.\n\n![../images/489629_2_En_12_Chapter/489629_2_En_12_Fig1_HTML.jpg](images/489629_2_En_12_Chapter/489629_2_En_12_Fig1_HTML.jpg)\n\
    \n**Figure 12-1** Relvar `CTX`─sample value\n\nNow, relvar `CTX` is “all key”\
    \ and is thus certainly in `BCNF`. Yet it suffers from redundancy, as you can\
    \ see; for example, the fact that teacher `T1` can teach course `C1` appears twice,\
    \ and so does the fact that course `C1` uses textbook `X1`. (It therefore suffers\
    \ from certain update anomalies also. See Exercise 12.3 at the end of the chapter.)\
    \ And the reason for these redundancies is that I’m assuming, perhaps not very\
    \ realistically, that teachers and textbooks are quite independent of one another—that\
    \ is, no matter who actually teaches any particular offering of some particular\
    \ course, the same textbooks are used. I also assume a given teacher or given\
    \ textbook can be associated with any number of courses. Thus:\n\n*   Each course\
    \ `c` has a set `T` of teachers who can teach it and a set `X` of textbooks that\
    \ it uses.\n*   And, for each such course `c`, there’s a tuple in `CTX` for every\
    \ possible combination of a teacher `t` from `T` and a textbook `x` from `X`.\
    \ (Loosely speaking, in other words, each `CNO` value appears together with the\
    \ *cartesian product* of all of the `TNO` and `XNO` values that are associated\
    \ with that `CNO` value.)\n\nTo state the matter more precisely, the following\
    \ constraint holds in relvar `CTX` (recall that from Chapter [9](#489629_2_En_9_Chapter.xhtml)\
    \ that the symbol “∈” means “appears in”):\n\n```\nIF   ( c, t1, x1 )  ∈  CTX\
    \ AND\n     ( c, t2, x2 )  ∈  CTX\nTHEN ( c, t1, x2 )  ∈  CTX AND\n     ( c, t2,\
    \ x1 )  ∈  CTX\n```\n\nBut to say this constraint holds is equivalent to saying\
    \ that the following join dependency holds:\n\n```\n☼ { { CNO , TNO } , { CNO\
    \ , XNO } }\n```\n\nIt follows that `CTX` is subject to this `JD`, and it further\
    \ follows that the relvar can, and probably should, be decomposed into its projections\
    \ on `{CNO,TNO}` and `{CNO,XNO}`. *Exercise:* Show the values of these projections\
    \ corresponding to the sample value of relvar `CTX` in Figure [12-1](#489629_2_En_12_Chapter.xhtml#Fig1),\
    \ and check that the redundancies disappear. (But what multirelvar constraint\
    \ now needs to be enforced?)\n\nI remark that the constraint shown above could\
    \ be reduced from four lines to three without loss, by simply dropping the last\
    \ line. What I mean is this: If tuples (`c`,`t1`,`x1`) and (`c`,`t2`,`x2` ) both\
    \ appear, then the tuple (`c`,`t1`,`x2` ) must appear (as the third line says);\
    \ so, switching the first two tuples around, it follows that if (`c`,`t2`,`x2` )\
    \ and (`c`,`t1`,`x1`) appear, then (`c`,`t2`,`x1`) must appear as well (as the\
    \ fourth line says). But the four-line version of the constraint is more symmetric\
    \ and aesthetically more satisfying, as well as perhaps being easier to understand.\n\
    \nBy the way, you might be thinking the redundancies in `CTX` are unnecessary;\
    \ more specifically, you might be thinking the relvar doesn’t need to show all\
    \ possible `TNO` / `XNO` combinations for a given `CNO`. For example, two tuples\
    \ would clearly suffice to represent the information that course `C1` has two\
    \ teachers and two textbooks. The problem is, *which* two tuples? Any specific\
    \ choice leads to a relvar having a very unobvious interpretation and very strange\
    \ update behavior. (Try stating the predicate for such a relvar!—i.e., try stating\
    \ the criteria for deciding whether or not some given tuple logically belongs\
    \ in that relvar. If you try this exercise, I think you’ll see why the redundancies\
    \ in `CTX` are necessary after all.)"
  raw: "In this latter JD, however, the {CITY,SNAME} component is clearly irrelevant,\
    \ since it’s a proper subset of the {SNO,SNAME,CITY} component; it can therefore\
    \ be dropped without significant loss. (In fact, of course, this latter JD is\
    \ identical to the first of the two JDs as given in the original exercise.)\n\n\
    1.  Yes! To be specific, every relvar *R* is subject to the trivial and irreducible\
    \ JD {*H*}, where *H* is the heading of *R*. (The corresponding decomposition\
    \ is into the pertinent identity projection.)\n\nFootnotes [1](#489629_2_En_11_Chapter.xhtml#Fn1_source)\
    \   [2](#489629_2_En_11_Chapter.xhtml#Fn2_source)   [3](#489629_2_En_11_Chapter.xhtml#Fn3_source)\
    \   [4](#489629_2_En_11_Chapter.xhtml#Fn4_source)   [5](#489629_2_En_11_Chapter.xhtml#Fn5_source)\
    \   [6](#489629_2_En_11_Chapter.xhtml#Fn6_source)   [7](#489629_2_En_11_Chapter.xhtml#Fn7_source)\
    \   [8](#489629_2_En_11_Chapter.xhtml#Fn8_source)\n\n# 12. MVDs and 4NF\n\n> *Who’s\
    \ on first, What’s on second, I Don’t Know’s on third.*\n> \n> —Bud Abbott and\
    \ Lou Costello: *The Naughty Nineties* (1945)\n\nIn Chapter [10](#489629_2_En_10_Chapter.xhtml),\
    \ I said that 4NF, like 2NF and 3NF, is mostly of historical interest. However,\
    \ that characterization is possibly a little unfair, because:\n\n*   First of\
    \ all, 4NF is *the* normal form with respect to what are called multivalued dependencies\
    \ or MVDs. Now, MVDs are really just a special kind of JD; so if you know about\
    \ JDs in general, you know about MVDs as well, in a sense. Nevertheless, MVDs\
    \ are still worth studying in their own right (for one thing, they’re probably\
    \ more common in practice than JDs that aren’t MVDs).\n\n*   Second, MVDs have\
    \ a more intuitive real world interpretation than JDs in general do, and therefore\
    \ tend to be a little easier to understand.\n\n*   Third, MVDs, unlike JDs in\
    \ general, do have an axiomatization, as we’ll see.\n\nSo let’s take a closer\
    \ look.\n\n## An Introductory Example\n\nIn this section and the next, I’ll examine\
    \ MVDs from a comparatively informal point of view; in the section after that\
    \ I’ll consider them again, but more formally, and use that more formal understanding\
    \ to lead up to 4NF. I’ll begin with a definition:\n\n*   **Definition (multivalued\
    \ dependency as a JD):** A multivalued dependency (MVD) is a join dependency with\
    \ exactly two components.\n\nIt follows from this definition that a nonloss decomposition\
    \ on the basis of an MVD always yields exactly two projections (recall that JDs\
    \ in general are *n-*way for some positive integer *n*, where *n* can be greater\
    \ than two; by contrast, MVDs are always exactly 2-way). It follows further that\
    \ the following JD (for example) is in fact an MVD:\n\n```\n☼ { { SNO , SNAME\
    \ , CITY } , { CITY , STATUS } }\n```\n\nNow, we’ve seen this particular JD repeatedly\
    \ in this book; it holds in relvar S. But didn’t I say in Chapter [9](#489629_2_En_9_Chapter.xhtml)\
    \ that this particular JD was implied by a *functional* dependency: viz., the\
    \ FD {CITY} → {STATUS}? Indeed I did; what the example shows, therefore, is that\
    \ some MVDs are implied by FDs. But not all are, and as you’d probably expect\
    \ it’s the ones that aren’t that are the interesting ones, in a sense. So let’s\
    \ take a look at an example of one of those “interesting ones.” Consider Figure\
    \ [12-1](#489629_2_En_12_Chapter.xhtml#Fig1), which shows a sample value for a\
    \ relvar called CTX.^([^(151)](#fn151)) The predicate is *Course CNO can be taught\
    \ by teacher TNO and uses textbook XNO*.\n\n![../images/489629_2_En_12_Chapter/489629_2_En_12_Fig1_HTML.jpg](images/489629_2_En_12_Chapter/489629_2_En_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1\n\nRelvar CTX─sample value\n\nNow, relvar CTX is “all key” and is\
    \ thus certainly in BCNF. Yet it suffers from redundancy, as you can see; for\
    \ example, the fact that teacher T1 can teach course C1 appears twice, and so\
    \ does the fact that course C1 uses textbook X1\\. (It therefore suffers from\
    \ certain update anomalies also. See Exercise 12.3 at the end of the chapter.)\
    \ And the reason for these redundancies is that I’m assuming, perhaps not very\
    \ realistically, that teachers and textbooks are quite independent of one another—that\
    \ is, no matter who actually teaches any particular offering of some particular\
    \ course, the same textbooks are used. I also assume a given teacher or given\
    \ textbook can be associated with any number of courses. Thus:\n\n*   Each course\
    \ *c* has a set *T* of teachers who can teach it and a set *X* of textbooks that\
    \ it uses.\n\n*   And, for each such course *c*, there’s a tuple in CTX for every\
    \ possible combination of a teacher *t* from *T* and a textbook *x* from *X*.\
    \ (Loosely speaking, in other words, each CNO value appears together with the\
    \ *cartesian product* of all of the TNO and XNO values that are associated with\
    \ that CNO value.)\n\nTo state the matter more precisely, the following constraint\
    \ holds in relvar CTX (recall that from Chapter [9](#489629_2_En_9_Chapter.xhtml)\
    \ that the symbol “∈” means “appears in”):\n\n```\nIF   ( c, t1, x1 )  ∈  CTX\
    \ AND\n( c, t2, x2 )  ∈  CTX\nTHEN ( c, t1, x2 )  ∈  CTX AND\n( c, t2, x1 )  ∈\
    \  CTX\n```\n\nBut to say this constraint holds is equivalent to saying that the\
    \ following join dependency holds:\n\n```\n☼ { { CNO , TNO } , { CNO , XNO } }\n\
    ```\n\nIt follows that CTX is subject to this JD, and it further follows that\
    \ the relvar can, and probably should, be decomposed into its projections on {CNO,TNO}\
    \ and {CNO,XNO}. *Exercise:* Show the values of these projections corresponding\
    \ to the sample value of relvar CTX in Figure [12-1](#489629_2_En_12_Chapter.xhtml#Fig1),\
    \ and check that the redundancies disappear. (But what multirelvar constraint\
    \ now needs to be enforced?)\n\nI remark that the constraint shown above could\
    \ be reduced from four lines to three without loss, by simply dropping the last\
    \ line. What I mean is this: If tuples (*c*,*t1*,*x1*) and (*c*,*t2*,*x2* ) both\
    \ appear, then the tuple (*c*,*t1*,*x2* ) must appear (as the third line says);\
    \ so, switching the first two tuples around, it follows that if (*c*,*t2*,*x2* )\
    \ and (*c*,*t1*,*x1*) appear, then (*c*,*t2*,*x1*) must appear as well (as the\
    \ fourth line says). But the four-line version of the constraint is more symmetric\
    \ and aesthetically more satisfying, as well as perhaps being easier to understand.\n\
    \nBy the way, you might be thinking the redundancies in CTX are unnecessary; more\
    \ specifically, you might be thinking the relvar doesn’t need to show all possible\
    \ TNO / XNO combinations for a given CNO. For example, two tuples would clearly\
    \ suffice to represent the information that course C1 has two teachers and two\
    \ textbooks. The problem is, *which* two tuples? Any specific choice leads to\
    \ a relvar having a very unobvious interpretation and very strange update behavior.\
    \ (Try stating the predicate for such a relvar!—i.e., try stating the criteria\
    \ for deciding whether or not some given tuple logically belongs in that relvar.\
    \ If you try this exercise, I think you’ll see why the redundancies in CTX are\
    \ necessary after all.)"
  trans: "\n然而，在后一个连接依赖（JD）中，`{CITY, SNAME}` 分量显然是无关的，因为它是 `{SNO, SNAME, CITY}` 分量的一个**真子集**；因此，它可以被舍弃而不会造成重大损失。（当然，实际上，这后一个\
    \ JD 与原练习中给出的前两个 JD 是相同的。）\n\n1.  是的！具体来说，每个关系变量 `R` 都服从一个平凡且不可约的连接依赖 `{H}`，其中\
    \ `H` 是 `R` 的标题。（相应的分解是分解为恒等投影。）\n\n脚注 1   2   3   4   5   6   7   8\n\n# 12.\
    \ 多值依赖与第四范式 (4NF)\n\n> *一垒手是谁，二垒手是什么，三垒手是“我不知道”。*\n>\n> ——巴德·阿博特和卢·科斯特洛：*《淘气的九十年代》*\
    \ (1945)\n\n在第 10 章中，我说过第四范式（4NF），像第二范式（2NF）和第三范式（3NF）一样，主要是具有历史意义。然而，这种描述可能有点不公平，因为：\n\
    \n*   首先，4NF 是*关于*所谓多值依赖（`MVD`）的*唯一*范式。现在，`MVD` 其实只是 `JD` 的一种特殊类型；所以，如果你大体上了解\
    \ `JD`，在某种意义上也就了解了 `MVD`。尽管如此，`MVD` 本身仍然值得研究（一方面，它们在实践中可能比非 `MVD` 的 `JD` 更常见）。\n\
    \n*   其次，与一般的 `JD` 相比，`MVD` 有更直观的现实世界解释，因此往往更容易理解一些。\n\n*   第三，与一般的 `JD` 不同，`MVD`\
    \ 确实有公理化系统，我们将会看到。\n\n所以，让我们更仔细地看看。\n\n## 引入性示例\n\n在本节和下一节，我将从相对非正式的角度来考察 `MVD`；在之后的一节，我将再次考虑它们，但会更正式一些，并利用这种更正式的理解来引出\
    \ 4NF。我先给出一个定义：\n\n*   **定义（作为 `JD` 的多值依赖）：** 一个多值依赖（`MVD`）是一个**恰好有两个分量**的连接依赖。\n\
    \n根据这个定义，基于 `MVD` 的无损分解总是恰好产生两个投影（回想一下，一般的 `JD` 是某个正整数 *n* 的 *n*-路连接依赖，而 *n* 可以大于二；相比之下，`MVD`\
    \ 总是恰好为 2-路）。进一步可以推断，下面的 `JD`（例如）实际上就是一个 `MVD`：\n\n```\n☼ { { SNO , SNAME , CITY\
    \ } , { CITY , STATUS } }\n```\n\n现在，我们在本书中反复看到过这个特定的 `JD`；它在关系变量 `S` 中成立。但我不是在第\
    \ 9 章中说过，这个特定的 `JD` 是由一个*函数*依赖所蕴含的：即 `FD` `{CITY} → {STATUS}`？确实如此；因此，这个例子表明，一些\
    \ `MVD` 是由 `FD` 所蕴含的。但并非所有 `MVD` 都是如此，而且正如你可能预期的，在某种意义上，那些不由 `FD` 蕴含的 `MVD` 才是有趣的。所以，让我们看一个这种“有趣者”的例子。考虑图\
    \ 12-1，它显示了一个名为 `CTX` 的关系变量的示例值。^(¹⁵¹) 其谓词是 *课程 `CNO` 可以由教师 `TNO` 教授并使用教材 `XNO`*。\n\
    \n![../images/489629_2_En_12_Chapter/489629_2_En_12_Fig1_HTML.jpg](img/489629_2_En_12_Fig1_HTML.jpg)\n\
    \n**图 12-1** 关系变量 `CTX` ── 示例值\n\n现在，关系变量 `CTX` 是“全键”的，因此肯定属于 `BCNF`。然而，正如你所见，它存在冗余；例如，教师\
    \ `T1` 能教授课程 `C1` 这个事实出现了两次，课程 `C1` 使用教材 `X1` 这个事实也是如此。（因此它也存在某些更新异常。请参阅本章末尾的练习\
    \ 12.3。）而这些冗余的原因是我做了一个假设（可能不太现实），即教师和教材是彼此独立的——也就是说，无论谁实际教授某门特定课程的某个特定授课，都使用相同的教材。我还假设，给定的教师或给定的教材可以与任意数量的课程相关联。因此：\n\
    \n*   每门课程 `c` 都有一个能教授它的教师集合 `T` 和一个它使用的教材集合 `X`。\n*   并且，对于每门这样的课程 `c`，`CTX`\
    \ 中都有一条元组，对应于从集合 `T` 中选出的教师 `t` 和从集合 `X` 中选出的教材 `x` 的每一种可能组合。（粗略地说，换句话说，每个 `CNO`\
    \ 值都与和该 `CNO` 值相关的所有 `TNO` 和 `XNO` 值的*笛卡尔积*一起出现。）\n\n更精确地说，以下约束在关系变量 `CTX` 中成立（回想一下，从第\
    \ 9 章起，符号“∈”表示“出现在”）：\n\n```\nIF   ( c, t1, x1 )  ∈  CTX AND\n     ( c, t2, x2\
    \ )  ∈  CTX\nTHEN ( c, t1, x2 )  ∈  CTX AND\n     ( c, t2, x1 )  ∈  CTX\n```\n\
    \n但是，说这个约束成立，就等价于说以下连接依赖成立：\n\n```\n☼ { { CNO , TNO } , { CNO , XNO } }\n```\n\
    \n由此可知，`CTX` 服从这个 `JD`，并进一步可知，这个关系变量可以，而且很可能应该，被分解为它在 `{CNO, TNO}` 和 `{CNO, XNO}`\
    \ 上的投影。*练习：* 展示对应于图 12-1 中关系变量 `CTX` 示例值的这些投影的值，并验证冗余消失了。（但现在需要强制执行什么样的多关系变量约束呢？）\n\
    \n我注意到，上面显示的约束可以通过简单地删除最后一行，从四行缩减到三行而没有损失。我的意思是：如果元组 (`c`, `t1`, `x1`) 和 (`c`,\
    \ `t2`, `x2`) 都出现，那么元组 (`c`, `t1`, `x2`) 必须出现（如第三行所说）；所以，交换前两个元组，可以推断，如果 (`c`,\
    \ `t2`, `x2`) 和 (`c`, `t1`, `x1`) 出现，那么 (`c`, `t2`, `x1`) 也必须出现（如第四行所说）。但四行版本的约束更对称，美学上更令人满意，也许也更容易理解。\n\
    \n顺便说一句，你可能会认为 `CTX` 中的冗余是不必要的；更具体地说，你可能认为对于给定的 `CNO`，关系变量不需要显示所有可能的 `TNO` / `XNO`\
    \ 组合。例如，显然可以用两条元组来表示课程 `C1` 有两位教师和两本教材的信息。问题是，*哪*两条元组？任何特定的选择都会导致一个解释非常不直观、更新行为非常奇怪的关系变量。（试着为这样的关系变量陈述谓词！——即，试着陈述判定某个给定元组是否逻辑上属于该关系变量的标准。如果你尝试做这个练习，我想你会明白为什么\
    \ `CTX` 中的冗余毕竟是必要的。）\n"
- fmt: '## Multivalued Dependencies (Informal)


    The existence of "problem" BCNF relvars like `CTX` was recognized very early on,
    and the way to deal with them was also recognized at that time, at least intuitively
    (see Exercise 12.8). However, it wasn’t until 1977 that these intuitive ideas
    were put on a sound theoretical footing by Fagin’s introduction of the notion
    of MVDs.^(^([152](#fn152))^)^ Let me elaborate.


    Relvar `CTX` is subject to the JD ☼{{`CNO`,`TNO`},{`CNO`,`XNO`}}. However, we
    can equally well say it’s subject to the following *pair of MVDs* :


    ```

    { CNO } →→ { TNO }

    { CNO } →→ { XNO }

    ```


    *Note:* The MVD `X` →→ `Y` can be read as "`X` multidetermines `Y`" or "`Y` is
    multidependent on `X`," or more simply just as "`X` double arrow `Y`."


    Taken together, what the foregoing MVDs mean, intuitively, is this: Courses don’t
    have just one teacher or just one textbook (i.e., the FDs {`CNO`} → {`TNO`} and
    {`CNO`} → {`XNO`} don’t hold)—but they do have a *set* of teachers and a *set*
    of textbooks (where both of those sets are nonempty). What’s more, for a given
    course, the set of teachers and the set of textbooks are completely independent
    of one another. (As I put it earlier, it doesn’t matter who actually teaches some
    specific offering of some course, the same textbooks are used. Likewise, it doesn’t
    matter, with respect to some course, which textbooks are actually used—the same
    teachers can teach it.) So we can say the following:


    *   For a given course `c` and a given textbook `x`, the set `T` of teachers associated
    with that (`c`,`x`) pair depends on `c` alone—it makes no difference which particular
    `x` we choose.


    *   Likewise, for a given course `c` and a given teacher `t`, the set `X` of textbooks
    associated with that (`c`,`t`) pair also depends on `c` alone—it makes no difference
    which particular `t` we choose.


    Note that the sample value of relvar `CTX` shown in Figure [12-1](#489629_2_En_12_Chapter.xhtml#Fig1)
    does indeed abide by these two rules.


    To repeat, relvar `CTX` is subject to a *pair* of MVDs. In general, in fact, it’s
    easy to show (see the next section) that, given relvar `R` with heading `H` and
    subsets `X`, `Y`, and `Z` of `H` such that the union of `X`, `Y`, and `Z` is equal
    to `H`, the MVD `X` →→ `Y` holds in `R` if and only if the MVD `X` →→ `Z` also
    holds in `R`. MVDs always go together in pairs in this way. For that reason it’s
    usual to write them as a "one liner," thus:


    ```

    X →→ Y | Z

    ```


    ("`X` double arrow `Y` bar `Z`"). In the case of relvar `CTX`, for example, we
    have:


    ```

    { CNO } →→ { TNO } | { XNO }

    ```


    Now, we might say, *very* loosely, that an MVD is like an FD, except that instead
    of "For one of these, there’s one of those," it’s "For one of these, there’s a
    *set* of those" (it’s this informal characterization that makes MVDs a little
    easier to understand than JDs in general). But the point about always going in
    pairs is important (note that nothing analogous applies to FDs). Indeed, if the
    MVD concept is defined *too* imprecisely—as I’ve just done, in fact!—one could
    incorrectly conclude that for *every* pair of subsets `X` and `Y` of the heading
    of the pertinent relvar, there’s an MVD from `X` to `Y`. For example, in the shipments
    relvar `SP`, there’s certainly a set of quantities for each supplier number, but
    the MVD {`SNO`} →→ {`QTY`} does *not* hold—it’s not the case that for a given
    supplier number `s` and given part number `p`, the set `Q` of quantities associated
    with that (`s`,`p`) pair depends on `s` alone.


    ## Multivalued Dependencies (Formal)


    The definitions in this section parallel those given in earlier chapters for FDs
    and JDs and are therefore presented with little by way of further commentary.


    *   **Definition (multivalued dependency):** Let `H` be a heading; then a multivalued
    dependency (MVD) with respect to `H` is an expression of the form `X` →→ `Y`,
    where `X` (the determinant) and `Y` (the dependant) are both subsets of `H`. The
    phrase *MVD with respect to H* can be abbreviated to just *MVD*, if `H` is understood.


    Note carefully that, like FDs and JDs, MVDs are defined with respect to some heading,
    not with respect to some relation or some relvar. Note too that from a formal
    point of view (again like FDs and JDs), MVDs are just expressions—expressions
    that, when interpreted with respect to some specific relation, become propositions
    that (by definition) evaluate to either TRUE or FALSE.


    *   **Definition (satisfying or violating an MVD):** Let relation `r` have heading
    `H`; let `X` →→ `Y` be an MVD, `M` say, with respect to `H`; and let `Z` be the
    attributes of `H` not contained in either `X` or `Y`. (In other words, (a) `Z`
    is the complement with respect to `H` of the union of `X` and `Y`, and (b) the
    union of `X`, `Y`, and `Z` is thus equal to `H`.) If `r` satisfies the JD ☼{*XY*,*XZ*},
    then `r` satisfies `M`; otherwise `r` violates `M`.


    Note that the foregoing definition is symmetric in `Y` and `Z`, whence it follows
    that `r` satisfies the MVD `X` →→ `Y` if and only if it satisfies the MVD `X`
    →→ `Z` (and we can therefore write them as a "one liner," as noted in the previous
    section).


    *   **Definition (MVD holding):** The MVD `M` holds in relvar `R` (equivalently,
    relvar `R` is subject to the MVD `M`) if and only if every relation that can ever
    be assigned to relvar `R` satisfies `M`. The MVDs that hold in relvar `R` are
    the MVDs of `R`.


    From this definition and the previous one, it follows that `R` is subject to the
    MVD `X` →→ `Y` if and only if it’s subject to the MVD `X` →→ `Z`.


    *   **Fagin’s Theorem:**^(^([153](#fn153))^)^ Relvar `R` can be nonloss decomposed
    into its projections on `XY` and `XZ` if and only if the MVDs `X` →→ `Y` | `Z`
    hold in `R`.


    Fagin’s Theorem is the "stronger form of Heath’s Theorem" that I promised in Chapter
    [5](#489629_2_En_5_Chapter.xhtml). That is, where Heath’s Theorem gives only a
    sufficient condition for a relvar to be nonloss decomposable into two projections,
    Fagin’s Theorem gives both necessary and sufficient conditions. Of course, Fagin’s
    Theorem is "obvious," given what we now know about JDs in general; with hindsight,
    there would never have been any formal need to define MVDs at all if JDs in general
    had been defined and properly investigated first. But Fagin’s Theorem was proved
    before JDs in general had been properly investigated, and it was a new and important
    result at the time; what’s more, it still has practical significance, inasmuch
    as MVDs do correspond to a fairly common kind of business rule, whereas the same
    probably can’t be said for "cyclic" *n-*way JDs for *n* > 2 as discussed in Chapters
    [9](#489629_2_En_9_Chapter.xhtml) and [10](#489629_2_En_10_Chapter.xhtml).'
