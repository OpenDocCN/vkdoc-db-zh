- fmt: 'There''s another new operator as well, `UNPACK`, which "goes the other way,"
    as it were; that is, given a relation such as that shown in Figure 14-1 (or the
    one shown in Figure 14-2, come to that) as input, it produces a relation in which
    the `DURING` values are all of the minimum possible size (in other words, they''re
    *unit intervals*). For example, the following expression applied to the relation
    shown in Figure 14-1—


    ```sql

    UNPACK S_DURING ON ( DURING )

    ```


    —produces the result shown in Figure 14-3 below. That result is the *unpacked
    form* of the relation shown in Figure 14-1 (also of the relation shown in Figure
    14-2, as I hope should be obvious).


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig3_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Fig3_HTML.jpg)


    Figure 14-3: Unpacked form of relations in Figures 14-1 and Figure 14-2


    The relation shown in Figure 14-3 is information equivalent to each of the relations
    in Figures 14-1 and 14-2. What''s more, like the one in Figure 14-2, it doesn''t
    suffer from redundancy (though like the one in Figure 14-1 it does rather obviously
    suffer from circumlocution).


    Now, you might be thinking from what I''ve said so far that all we need to do
    to avoid those redundancy and circumlocution problems is just to make sure that
    relvars are always kept in packed form.([^(194)](#fn194)) Unfortunately, however,
    packed form, though it''s part of the solution, isn''t sufficient to solve the
    problems completely, and the following example shows why. Consider Figure 14-4,
    which shows a sample value for a relvar called `SCT_DURING`, with predicate as
    follows: *Supplier `SNO` was located in city `CITY` and had status `STATUS` throughout*
    *interval* *`DURING`.*


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig4_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Fig4_HTML.jpg)


    Figure 14-4: Relvar `SCT_DURING`—sample value


    Let''s assume now that (in contrast to earlier chapters) the FD `{CITY} -> {STATUS}`
    no longer holds. Then relvar `SCT_DURING` is in `BCNF`—the sole key is `{SNO,DURING}`,
    and the only FDs that hold are ones implied by that key. (As a matter of fact,
    though I won''t attempt to prove it, the relvar is in `5NF` also.) Yet the sample
    value in Figure 14-4 clearly exhibits both redundancy and circumlocution. So the
    first lesson of this example is this: Nonloss decomposition as classically understood—i.e.,
    nonloss decomposition based on classical projection and classical join—is of no
    help in avoiding those problems. We need something else.


    What''s more, as I''ve already said, packed form by itself doesn''t solve the
    problem either. Figure 14-5 shows the packed form of the relation from Figure
    14-4—and as you can see, that relation, though it doesn''t suffer from redundancy,
    still does suffer from circumlocution. (Of course, the relations of Figures 14-4
    and 14-5 are certainly information equivalent, though.)


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig5_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Fig5_HTML.jpg)


    Figure 14-5: Packed form of relation in Figure 14-4


    So packed form isn''t the solution (at least, not the whole solution); to repeat,
    we need something else. In order to see what that something else might be, observe
    now that the redundancy and circumlocution in Figure 14-4, and the circumlocution
    in Figure 14-5, are all really a consequence of the fact that the `DURING` value
    in any given tuple applies not to the `CITY` and `STATUS` values in that tuple
    individually, but rather to those `CITY` and `STATUS` values taken in combination.
    But as the example makes clear, a given supplier''s city and that supplier''s
    status vary independently over time; so surely what we need to do is split the
    original relation into two separate relations, one for supplier cities and one
    for supplier status values, each with a `DURING` attribute of its own. We can
    achieve this split as follows—first, unpack the original relation on `DURING`;
    second, take projections of that unpacked form on `{SNO,CITY,DURING}` and `{SNO,STATUS,DURING}`,
    respectively; finally, pack those two projections on `DURING`. Given the sample
    `SCT_DURING` value from Figure 14-4, Figure 14-6 shows the relations that result
    from this process—and as you can see, these relations exhibit neither redundancy
    nor circumlocution:


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig6_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Fig6_HTML.jpg)


    Figure 14-6: Relvars `SC_DURING` and `ST_DURING`—sample values


    Moreover, as the caption to the figure suggests, these two relations can be regarded
    as sample values of two relvars `SC_DURING` and `ST_DURING`, which, I''m suggesting,
    might reasonably and desirably be regarded as a replacement for the original relvar
    `SCT_DURING`.


    Now, the sequence of steps involved in this example—unpack, project, pack again—turns
    out to be needed so frequently in practice that defining an appropriate shorthand
    seems like a good idea. Here then is a definition—a considerably simplified definition,
    please note!—of an operator (actually a generalized form of classical projection)
    that, for reasons that should quickly become clear, we call `U_projection`:


    **Definition (`U_projection`):** Let *r* be a relation, let attribute *A* of *r*
    be interval valued, and let *X* be a subset of the heading of *r* that contains
    *A*. Then the expression `USING (A) : r{X}` denotes the `U_projection` (with respect
    to *A*) of *r* on *X*, and it''s defined to be shorthand for the following:


    ```sql

    PACK

    ( ( UNPACK r ON ( A ) ) { X } )

    ON ( A )

    ```


    In other words, `U_projection` works by first unpacking the input relation as
    indicated, then doing a regular projection on that unpacked intermediate result,
    and then (re)packing the result of that projection to obtain the final packed
    result. Here are a couple of examples:


    ```sql

    USING ( DURING ) : SCT_DURING { SNO , CITY , DURING }

    USING ( DURING ) : SCT_DURING { SNO , STATUS , DURING }

    ```


    Given the sample value for relvar `SCT_DURING` from Figure 14-4, these two expressions
    produce the relations shown in Figure 14-6. *Exercise:* Check this claim, if you
    haven''t done so already.


    What I''m suggesting, then, is that the original relvar `SCT_DURING` be replaced
    by the two "U_projection" relvars `SC_DURING` and `ST_DURING`. For that replacement
    to be valid, though, it obviously needs to be nonloss. Now, if we do a regular
    join on the two `U_projections` shown in Figure 14-6 (the join will be on the
    basis of attributes `SNO` and `DURING`), we clearly won''t obtain either the relation
    shown in Figure 14-4 or the one shown in Figure 14-5. In fact, all we''ll get
    is the following:


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figa_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figa_HTML.jpg)'
