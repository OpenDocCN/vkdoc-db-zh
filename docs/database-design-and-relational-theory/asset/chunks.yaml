- fmt: "*   最后，由前一点可知，任何给定的关系变量 *R* 总是可以被分解为5NF投影。换句话说，5NF总是可以实现的。\n\n*关于冗长性的概念说明：*\
    \ 在第[1](#489629_2_En_1_Chapter.xhtml)章中，我说过设计理论在很大程度上——并非完全——是关于减少冗长性的，并且我在本章中多次提到了冗长性；特别是，我提到规范化程度越高，能防止的冗长性就越多。但是，给冗长性下一个精确的定义似乎相当困难！——事实上，困难到我认为在本书的这个早期阶段，甚至尝试定义它都是不合适的，所以我不会这样做。换句话说，在进一步通知之前，我只是假设我们至少能够识别它（即冗长性）——尽管，实际上，即便这是一个相当大的假设。第[17](#489629_2_En_17_Chapter.xhtml)章将深入探讨这个概念。\n\
    \n## 规范化与约束\n\n与规范化相关的还有另一个常被忽视的问题。再次考虑将关系变量 `S` 分解为其投影 `SNC` 和 `CT` 的例子——`SNC`\
    \ 在 `{SNO, SNAME, CITY}` 上，`CT` 在 `{CITY, STATUS}` 上。那么有三种情况需要考虑：\n\n1.  假设原始设计，仅包含关系变量\
    \ `S`，至少在逻辑上是正确的（即，它仅仅遭受冗长性问题）。正如我在“规范化有两个目的”一节中指出的，那么，在这两个投影之间存在某个约束（一个“相等依赖”）：\n\
    \n    ```\n    CONSTRAINT ... SNC { CITY } = CT { CITY } ;\n    ```\n    （“`SNC`\
    \ 中的每个城市都出现在 `CT` 中，反之亦然”）。\n\n2.  或者，假设 `SNC` 和 `CT` 中的一个可能包含一个在另一个中没有对应元组的元组，而反之则不可能。为了明确起见，再次假设\
    \ `CT` 可能包含像 `(Rome, 10)` 这样在 `SNC` 中没有对应元组的元组，而 `SNC` 永远不可能包含一个在 `CT` 中没有对应元组的元组。那么，在两个投影之间存在一个*外键约束*（从\
    \ `SNC` 到 `CT`，在刚才提到的具体例子中）：^([^(40)](#fn40))\n\n    ```\n    FOREIGN KEY { CITY\
    \ } REFERENCES CT\n    ```\n\n3.  第三种可能性，也许比前两种可能性小，是 `CT` 和 `SNC` 都可能被允许包含在对方中没有对应元组的元组。例如，可能\
    \ `CT` 包含元组 `(Rome, 10)` 但没有供应商位于罗马，而 `SNC` 包含元组 `(S6, Lopez, Madrid)` 但马德里没有状态。在这种情况下，显然在两个关系变量之间根本不涉及任何关于城市的约束（至少，为了这个例子，我们假设没有）。\n\
    \n现在，稍微简化一下，我说过一个处于 *n* 范式的关系变量 *R* 总是可以无损分解为处于 *n*+1 范式的投影。然而，如前所述，*这样的分解通常意味着至少有一个新的约束现在需要被维护*。更糟糕的是，所讨论的约束是一个*多关系变量*约束（即，它跨越两个关系变量，在某些情况下可能超过两个）。因此存在一个权衡：我们是想要分解的好处，还是想避免那个多关系变量约束？^([^(41)](#fn41))\n\
    \n或许有人会认为，至少在 `SNC` 和 `CT` 的例子中，分解也意味着现在有一个约束*不再*需要维护：即函数依赖 `{CITY} -> {STATUS}`。但这个论点并不完全有效——就这点而言，分解所做的只是将那个约束从一个关系变量转移到另一个关系变量（实际上是从关系变量\
    \ `S` 到关系变量 `CT`，在那里，维护约束 `{CITY}` 是一个键这一事实会附带维护该函数依赖）。\n\n现在，在正在讨论的简单例子中，进行分解的好处几乎肯定超过了不进行分解的好处。但情况并非总是如此；事实上，在更复杂的情况下，是否要进行分解可能是一个相当令人头疼的问题。在下文中，为了避免大量重复的文字，我通常会假设我们总是希望进行分解——但请不要忘记，有时存在有说服力的不去分解的理由，特别是在比当前例子更复杂的例子中，如本书第三和第四部分所讨论的。"
  raw: "*   Finally, it follows from the previous point that any given relvar *R*\
    \ can always be decomposed into 5NF projections in particular. In other words,\
    \ 5NF is always achievable.\n\n*A note on the concept of redundancy:* In Chapter\
    \ [1](#489629_2_En_1_Chapter.xhtml) I said design theory is largely—not exclusively—about\
    \ reducing redundancy, and I’ve referred to redundancy repeatedly in the present\
    \ chapter; in particular, I’ve said the higher the level of normalization, the\
    \ more redundancy is prevented. But coming up with a precise definition of what\
    \ redundancy really is seems to be quite difficult!—so much so, in fact, that\
    \ I don’t think it would be appropriate, at this early point in the book, even\
    \ to try to define it, and so I won’t. In other words, I’m just going to assume\
    \ until further notice that we can at least recognize it (redundancy, that is)\
    \ when we see it—though, actually, even that’s a pretty big assumption. Chapter\
    \ [17](#489629_2_En_17_Chapter.xhtml) examines the concept in depth.\n\n## Normalization\
    \ and Constraints\n\nThere’s another issue that arises in connection with normalization,\
    \ one that’s often overlooked. Again consider the example of decomposing relvar\
    \ S into its projections SNC and CT—SNC on {SNO,SNAME,CITY} and CT on {CITY,STATUS}.\
    \ Then there are three cases to consider:\n\n1.  Suppose the original design,\
    \ consisting of just relvar S, was at least logically correct (i.e., it merely\
    \ suffered from redundancy). As I pointed out in the section “Normalization Serves\
    \ Two Purposes,” then, there’s a certain constraint (an “equality dependency”)\
    \ that holds between the two projections:\n\n    ```\n    CONSTRAINT ... SNC {\
    \ CITY } = CT { CITY } ;\n    ```\n\n    (“every city in SNC appears in CT and\
    \ vice versa”).\n\n2.  Alternatively, suppose it’s possible for one of SNC and\
    \ CT to contain a tuple that has no counterpart in the other, while the converse\
    \ is not possible. To fix our ideas, suppose again that it’s possible for CT to\
    \ contain a tuple such as (Rome,10) that has no counterpart in SNC, while SNC\
    \ can never contain a tuple that has no counterpart in CT. Then a *foreign key\
    \ constraint* holds between the two projections (from SNC to CT, in the specific\
    \ example just mentioned):^([^(40)](#fn40))\n\n    ```\n    FOREIGN KEY { CITY\
    \ } REFERENCES CT\n    ```\n\n3.  The third possibility, perhaps less likely than\
    \ the first two, is that CT and SNC might both be allowed to contain tuples with\
    \ no counterpart in the other. For example, it might be that CT contains the tuple\
    \ (Rome,10) but no supplier is located in Rome, while SNC contains the tuple (S6,Lopez,\
    \ Madrid) but Madrid has no status. In this case, clearly there’s no constraint\
    \ involving cities that holds between the two relvars at all (at least, let’s\
    \ assume not for the sake of the example).\n\nNow, simplifying somewhat, I’ve\
    \ said that a relvar *R* in *n*th normal form can always be nonloss decomposed\
    \ into projections in (*n*+1)st normal form. As the foregoing discussion indicates,\
    \ however, *such decomposition usually means there’s at least one new constraint\
    \ that now needs to be maintained*. What makes matters worse is that the constraint\
    \ in question is a *multirelvar* constraint (i.e., it spans two relvars, and in\
    \ some cases possibly more than two). So there’s a tradeoff: Do we want the benefits\
    \ of decomposition, or do we want to avoid that multirelvar constraint?^([^(41)](#fn41))\n\
    \nIt might be argued, at least in the SNC and CT example, that the decomposition\
    \ also means there’s now a constraint that *doesn’t* have to be maintained: viz.,\
    \ the FD {CITY} → {STATUS}. But this argument isn’t entirely valid—all the decomposition\
    \ does, in this respect, is move that constraint from one relvar to another (actually\
    \ from relvar S to relvar CT, where it’s maintained as a side effect of maintaining\
    \ the constraint that {CITY} is a key).\n\nNow, in the simple example under discussion,\
    \ the benefits of doing the decomposition almost certainly outweigh the benefits\
    \ of not doing so. But such is not always the case; indeed, the question of whether\
    \ or not to decompose, in more complicated situations, can be a fairly vexing\
    \ one. In what follows, in order to avoid a lot of repetitive text, I’ll generally\
    \ assume we do always want to do the decomposition—but please don’t forget there\
    \ can sometimes be persuasive arguments for not doing so, especially in examples\
    \ more complex than the one at hand, such as are discussed in Parts III and IV\
    \ of this book."
