    \ explicitly nevertheless, that views (like normalization, in fact, though for\
    \ very different reasons) serve two rather different purposes:\n\n1.  The user\
    \ who actually defines view *V* is, obviously, aware of the expression *X* in\
    \ terms of which *V* is defined. That user can use the name *V* wherever the expression\
    \ *X* is intended, but such uses are basically just shorthand (much like the use\
    \ of macros in a programming language).\n\n2.  By contrast, a user who’s merely\
    \ informed that view *V* exists and is available for use is supposed not to be\
    \ aware of that defining expression *X*; to that user, in fact, *V* is supposed\
    \ to look and feel just like a base relvar.^([^(220)](#fn220))\n\nAs an example\
    \ of Case 1, suppose the user perceives the database as containing two relvars\
    \ *R1* and *R2* and goes on to define their join as a view; clearly, then, that\
    \ view is redundant so far as that user is concerned, and it could be dropped\
    \ without any loss of information. For definiteness, therefore, I’m going to assume\
    \ from this point forward (barring explicit statements to the contrary) that no\
    \ relvar in the database is defined in terms of any others, so that at least this\
    \ particular kind of redundancy isn’t present. With this possibility ruled out,\
    \ then, it’s tempting to set a stake in the ground and say again that redundancy\
    \ at the logical level is always undesirable. In order to adopt such a position,\
    \ however, we need to be able to say what we mean by the term, for otherwise the\
    \ position can’t possibly make sense. And even if we manage to come up with a\
    \ good definition, is the position (i.e., that redundancy at the logical level\
    \ is always bad) really tenable? Is it possible to eliminate all redundancy? Is\
    \ it even desirable?\n\nThese are questions of considerable pragmatic importance,\
    \ of course. Indeed, I think it’s noteworthy that Codd called his very first (1969)\
    \ paper on the relational model “Derivability, *Redundancy*, and Consistency of\
    \ Relations Stored in Large Data Banks” (my italics). And his second (1970) paper,\
    \ “A Relational Model of Data for Large Shared Data Banks”—this is the one that’s\
    \ usually regarded as the seminal paper in the field, though that characterization\
    \ is a little unfair to its 1969 predecessor—was in two parts of almost equal\
    \ length, the second of which was called “Redundancy and Consistency” (the first\
    \ was called “Relational Model and Normal Form”). Codd thus clearly regarded his\
    \ thoughts on redundancy as a major part of the contribution of his relational\
    \ work: rightly so, in my opinion, since he did at least provide us with a framework\
    \ in which we could begin to address the issue precisely and systematically.\n\
    \nNow, I showed in the previous chapter that one putative definition of redundancy\
    \ that doesn’t work is this: The database involves redundancy if and only if it\
    \ contains two distinct appearances of the same tuple. But we can validly say\
    \ the following:^([^(221)](#fn221))\n\n*   **Definition (redundancy in the database,\
    \ generic version):** The database involves redundancy if and only if it contains,\
    \ directly or indirectly, two distinct representations of the same proposition.\n\
    \nThe trouble is, although this definition is clearly correct, it doesn’t help\
    \ much with the practical problem of reducing redundancy. But it does at least\
    \ imply the following, which is a little better:\n\n*   **Definition (redundancy\
    \ in the database, preliminary detailed version):** Let *D* be a database design\
    \ and let *p* be a proposition. Then:\n    1.  If there exists a database value\
    \ (i.e., a set of values for the relvars mentioned in *D*), *DB*, that conforms\
    \ to *D*, such that\n\n2.  There exists within *DB* some specific appearance of\
    \ some tuple or combination of tuples that represents *p*, either explicitly or\
    \ implicitly, and\n\n3.  There exists within *DB* some distinct appearance of\
    \ some tuple or combination of tuples that also represents *p*, either explicitly\
    \ or implicitly, then\n\n4.  *DB* contains, and *D* permits, redundancy.\n\nThe\
    \ principles of normalization and *The Principle of Orthogonal Design* are aimed\
    \ precisely at reducing redundancy in the foregoing sense. Observe, however, that\
    \ all the definition says is *if*—not *if and only if*—certain tuples appear,\
    \ *then* there’s redundancy. In other words, it’s not a complete definition. Indeed,\
    \ we’ll see examples of designs later in this chapter that clearly involve redundancy,\
    \ even though they don’t contain distinct tuples or tuple combinations that represent\
    \ the same proposition. What’s more, the examples in question are fully normalized\
    \ and fully orthogonal, for the most part. Thus, the principles of normalization\
    \ and orthogonality, though necessary and undoubtedly important, are a long way\
    \ from being sufficient."
  trans: "# 17. 我们需要更多科学\n\n> *我告诉你三次的就是真理。*\n>\n> —刘易斯·卡罗尔：《猎鲨记》(1876)\n\n说某物是“冗余的”意味着什么？事实证明——相当令人惊讶，或者考虑到我们之前章节中已经遇到过的种种困难，也许这并不令人惊讶——要给出一个精确的答案相当困难。最好的《钱伯斯二十世纪词典》（其定义通常精炼而准确）也只能给出以下解释：\n\
    \n*   `redundant` 丰富的：过度丰富的：多余的\n\n*   然而，《钱伯斯二十世纪同义词词典》（该词典的配套用书）确实给出了以下一系列精彩的同义词或近义词：\n\
    \n*   `redundant` *多余的*， 冗长的， 过度的， 额外的， 非本质的， 过度的， 填充的， 委婉迂回的， 赘述的， 冗长啰嗦的， 重复的，\
    \ 非必须的， 多余的， 额外的， 过剩的， 同义反复的， 闲置的， 不必要的， 不需要的， 不想要的， 冗长的， 啰嗦的\n\n它还给出了以下一组很好的反义词：\n\
    \n*   简洁的， 本质的， 必要的\n\n尽管如此，我们已经看到，设计理论总体上可以被视为一套用于减少冗余的原则和技术（从而减少某些可能发生的不一致性和更新异常的可能性）。然而，重申一下，冗余到底是什么？我们似乎对这个术语没有一个非常精确的定义——我们只是有一个模糊的概念，即它可能导致问题，至少如果没有妥善管理的话。本章将更深入地探讨这些问题。\n\
    \n为了能更好地理解什么是冗余，我们首先需要清晰地区分系统的逻辑层和物理层。显然，这两个层面的设计目标是不同的。在物理层，冗余几乎肯定会以某种形式存在。原因有以下几点：\n\
    \n*   索引和其他此类“快速访问路径”结构必然涉及一些冗余，因为某些数据值既存储在这些辅助结构中，也存储在它们提供“快速访问”的结构中。\n*   以某种方式物理存储的派生关系变量和/或派生关系——即所谓的*快照*、*汇总表*、*物化查询*或*物化视图*\
    \ ^(²¹⁹)——显然也涉及一些冗余。\n\n当然，物理层存在冗余的原因是为了性能。但物理冗余对逻辑层没有，或者应该没有影响——它由数据库管理系统管理，用户看不到，或者不应该看到。我在这里提及它，只是为了先把它撇开。从现在开始，我将只关注逻辑层的冗余。\n\
    \n那么，在逻辑层面，人们很容易直接说冗余总是不好的。但这个说法当然过于简单化了，即使不考虑其他因素，仅视图机制的存在就足以说明问题。让我稍微离题一下，详细说明后一点。众所周知，但仍然值得明确指出的是，视图（实际上，就像规范化一样，尽管原因截然不同）服务于两个相当不同的目的：\n\
    \n1.  实际上定义视图`V`的用户，显然知道定义`V`所用的表达式`X`。该用户可以在原本打算使用表达式`X`的地方使用名称`V`，但这种用法基本上只是一种简写（很像编程语言中宏的使用）。\n\
    2.  相比之下，一个仅仅被告知视图`V`存在且可用的用户，应该不知道那个定义表达式`X`；实际上，对这个用户来说，`V`看起来和感觉上应该就像一个基本关系变量。\
    \ ^(²²⁰)\n\n作为情况 1 的例子，假设用户认为数据库包含两个关系变量`R1`和`R2`，并接着将它们的连接定义为一个视图；显然，就该用户而言，这个视图是冗余的，即使删除它也不会丢失任何信息。因此，为了确定性，我将从此处开始（除非有明确说明）假设数据库中没有任何关系变量是用其他关系变量定义的，这样至少这种特定类型的冗余就不存在了。排除了这种可能性之后，人们很容易再次断言逻辑层面的冗余总是不可取的。然而，要采取这样的立场，我们需要能够说明我们所说的这个术语是什么意思，否则这个立场就不可能成立。而且，即使我们设法给出了一个好的定义，这个立场（即逻辑层面的冗余总是不好的）真的站得住脚吗？有可能消除所有冗余吗？甚至有必要消除所有冗余吗？\n\
    \n这些当然是具有重大实际意义的问题。事实上，我认为值得注意的是，科德在他关于关系模型的第一篇（1969 年）论文中，就将其命名为“存储在大型数据库中的关系的可导出性、*冗余*和一致性”（*冗余*为斜体）。而他的第二篇（1970\
    \ 年）论文“大型共享数据库的关系模型”——通常被认为是该领域的开创性论文，尽管这个评价对它 1969 年的前作有点不公平——由几乎等长的两部分组成，第二部分叫做“冗余与一致性”（第一部分叫做“关系模型与范式”）。因此，科德显然将他对冗余的思考视为其关系工作的主要贡献之一：在我看来，他这样做是对的，因为他至少为我们提供了一个框架，使我们能够开始精确和系统地处理这个问题。\n\
    \n现在，我在前一章已经展示了一个行不通的冗余的假想定义是这样的：当且仅当数据库包含同一元组的两个不同出现时，才涉及冗余。但我们可以有效地这样说： ^(²²¹)\n\
    \n*   **定义（数据库中的冗余，通用版本）：** 当且仅当数据库直接或间接地包含同一命题的两个不同表示时，才涉及冗余。\n\n问题在于，尽管这个定义显然是正确的，但它对减少冗余的实际问题帮助不大。但它至少暗示了以下这个稍微好一点的定义：\n\
    \n*   **定义（数据库中的冗余，初步详细版本）：** 设`D`是一个数据库设计，`p`是一个命题。那么：\n    1.  如果存在一个符合`D`的数据库值（即`D`中提到的关系变量的一组值）`DB`，并且\n\
    \    2.  在`DB`中存在某个元组或元组组合的特定出现，该出现显式或隐式地表示了`p`，并且\n    3.  在`DB`中存在某个不同的元组或元组组合的出现，该出现也显式或隐式地表示了`p`，那么\n\
    \    4.  `DB`包含冗余，并且`D`允许冗余。\n\n规范化原则和*正交设计原则*正是旨在减少上述意义上的冗余。然而请注意，该定义只是说*如果*——而不是*当且仅当*——某些元组出现，*那么*就存在冗余。换句话说，这不是一个完整的定义。确实，我们将在本章后面看到一些明显涉及冗余的设计示例，尽管它们并不包含表示同一命题的不同元组或元组组合。更重要的是，这些例子中的大部分在很大程度上是完全规范化和完全正交的。因此，规范化和正交性原则虽然是必要的且无疑很重要，但远非充分。"
- fmt: "## A Little History\n\nBefore I get into a discussion of just how and why\
    \ normalization and orthogonality are insufficient, I'd like to say a little more\
    \ about Codd's attempts in his very first two papers to address the issue of redundancy.\
    \ In his 1969 paper, he said this:\n\n*   A set of relations is *strongly redundant*\
    \ if it contains at least one relation [that] is derivable from the rest of the\
    \ [relations in the set].\n\nAnd he tightened up this definition slightly in his\
    \ 1970 paper:\n\n*   A set of relations is *strongly redundant* if it contains\
    \ at least one relation that possesses a projection [that] is derivable from other\
    \ projections of relations in the set.\n\nI should explain that when Codd says\
    \ a relation `r` is *derivable* from a set `S` of relations, he means `r` is equal\
    \ to the result of applying some sequence of relational operations (join, projection,\
    \ and so forth) to relations from `S`. I do have a few comments on his definitions,\
    \ however:\n\n*   Even more to the point, the first reference (at least) to *projections*\
    \ in the 1970 definition should be replaced by references to *projections that\
    \ correspond to components of irreducible JDs*. (The first of the two objections\
    \ in the previous bullet item, objection a., would then go away.)\n\n*   First,\
    \ the term *relation* should be replaced by the term *relvar* throughout. (Of\
    \ course, this latter term wasn't introduced until several years later, and Codd\
    \ never used it at all.) In fact, I think it's fair to say that what Codd meant\
    \ by the term *relation* in these quotes wasn't just a `relvar` as such but, more\
    \ specifically, a *base* `relvar`.\n\n*   Second, we can ignore the qualifier\
    \ *strongly*. Codd was distinguishing between \"strong\" redundancy and what he\
    \ called *weak* redundancy, but weak redundancy is irrelevant as far as we're\
    \ concerned. The reason is that weak redundancy has to do merely with equality\
    \ dependencies that don't hold at all times but do happen to be satisfied at particular\
    \ times, given the relation values that happen to exist at the times in question.\n\
    \nActually, it seems to me that what was going on here was precisely that Codd\
    \ was struggling with the logical difference between relations and relvars!—see\
    \ the previous bullet item. \"Strong\" redundancy applies to relvars (it's what\
    \ we usually mean by *redundancy* when we talk about database design). \"Weak\"\
    \ redundancy, by contrast, applies to relations, not relvars (it's just an artifact\
    \ of the values the relvars happen to have at some particular time, and it's not\
    \ particularly interesting).\n\n*   The 1969 definition is subsumed by the 1970\
    \ definition, of course, because (as we know from Chapter [6](#489629_2_En_6_Chapter.xhtml))\
    \ every relvar `R` is identically equal to a certain projection of `R`—namely,\
    \ the corresponding identity projection.\n\n*   More to the point, the 1970 definition\
    \ is still deficient as a definition of redundancy in general for at least the\
    \ following two reasons:\n    1.  It includes certain possibilities that we normally\
    \ wouldn't regard as redundancies at all. For example, suppose the suppliers-and-parts\
    \ database is subject to the constraint that every part must be supplied by at\
    \ least one supplier. Then the projection of relvar `SP` on `{PNO}` will necessarily\
    \ be equal to the projection of relvar `P` on `{PNO}`, and we'll have a \"strong\
    \ redundancy\" on our hands.\n\n    *Note:* Perhaps a more realistic example to\
    \ illustrate the same point would be a constraint on a personnel database to the\
    \ effect that every employee must be in a department and every department must\
    \ have at least one employee.\n\n    2.  At the same time, it excludes many possibilities\
    \ that we certainly would regard as redundancies—see, e.g., the example of light\
    \ vs. heavy parts in Chapter [16](#489629_2_En_16_Chapter.xhtml) (second version,\
    \ as illustrated in Figure [16-3](#489629_2_En_16_Chapter.xhtml#Fig3)). Several\
    \ further examples are given in later sections of the present chapter.\n\nOne\
    \ last comment on Codd's definitions: Codd did at least say (in both papers) that\
    \ \"we shall associate with [the database] a collection of statements [that] define\
    \ all of the redundancies\" in that database. The \"statements\" Codd is referring\
    \ to here are `Tutorial D` `CONSTRAINT` statements (or something logically equivalent\
    \ to such statements), of course. In other words, Codd certainly wanted the system\
    \ to be aware of the redundancies, and he wanted those redundancies to be managed\
    \ accordingly. Unfortunately, however, he then went on to say:\n\nThe generation\
    \ of an inconsistency ... could be logged internally, so that if it were not remedied\
    \ within some reasonable time ... the system could notify the security officer\
    \ [*sic*]. Alternatively, the system could [inform the user] that such and such\
    \ relations now need to be changed to restore consistency ... Ideally, [different\
    \ remedial actions] should be possible ... for different subcollections of relations.\n\
    \n*Note:* \"Inconsistencies\" (or, as I would prefer to call them, integrity violations)\
    \ can certainly be caused by redundancy—more precisely, by redundancy that's inadequately\
    \ managed—but not all integrity violations are caused by redundancy, of course.\
    \ More to the point, I believe the database should *never* be allowed to contain\
    \ any inconsistencies, at least as far as the user is concerned; as I said in\
    \ Chapter [16](#489629_2_En_16_Chapter.xhtml), you can never trust the results\
    \ you get from an inconsistent database. In other words, \"remedying inconsistencies\"\
    \ needs to be done immediately, at the level of individual statements (not even\
    \ at the transaction level).^([^(222)](#fn222)) See the section \"Managing Redundancy\"\
    \ later in this chapter."
