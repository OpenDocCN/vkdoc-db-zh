    \n现在，稍微简化一下，我说过一个处于 *n* 范式的关系变量 *R* 总是可以无损分解为处于 *n*+1 范式的投影。然而，如前所述，*这样的分解通常意味着至少有一个新的约束现在需要被维护*。更糟糕的是，所讨论的约束是一个*多关系变量*约束（即，它跨越两个关系变量，在某些情况下可能超过两个）。因此存在一个权衡：我们是想要分解的好处，还是想避免那个多关系变量约束？^(⁴¹)\n\
    \n或许有人会认为，至少在 `SNC` 和 `CT` 的例子中，分解也意味着现在有一个约束*不再*需要维护：即函数依赖 `{CITY} -> {STATUS}`。但这个论点并不完全有效——就这点而言，分解所做的只是将那个约束从一个关系变量转移到另一个关系变量（实际上是从关系变量\
    \ `S` 到关系变量 `CT`，在那里，维护约束 `{CITY}` 是一个键这一事实会附带维护该函数依赖）。\n\n现在，在正在讨论的简单例子中，进行分解的好处几乎肯定超过了不进行分解的好处。但情况并非总是如此；事实上，在更复杂的情况下，是否要进行分解可能是一个相当令人头疼的问题。在下文中，为了避免大量重复的文字，我通常会假设我们总是希望进行分解——但请不要忘记，有时存在有说服力的不去分解的理由，特别是在比当前例子更复杂的例子中，如本书第三和第四部分所讨论的。\n"
- fmt: '## Equality Dependencies


    Again consider the example of decomposing relvar S into its projections SNC and
    CT on {SNO,SNAME,CITY} and {CITY,STATUS}, respectively. Assume the case in which
    the following constraint holds between the two projections:


    ```

    CONSTRAINT ... SNC { CITY } = CT { CITY } ;

    ```


    ("every city in SNC appears in CT and vice versa"). As mentioned in the previous
    section, this constraint is an example of what''s called an equality dependency.
    I''ll define that concept precisely in just a moment. First, however, I want to
    introduce a convention that I''ll be using from this point forward for simplifying
    the notation for projection slightly.^(^(42)) Let relational expression *rx* evaluate
    to relation *r*; let relation *r* have heading *H*; let *X* be a subset of *H*;
    and let *A1*, ..., *An* be all of the attributes of *X* (i.e., *X* = {*A1*, ...,
    *An*}). Then we allow the projection expression *rx*{*A1*,...,*An*} to be abbreviated—a
    trifle illogically—to just *rx*{*X*}.


    ### Definition (equality dependency)

    Loosely, a constraint that requires two specified relations to be equal. More
    precisely, let *R1* and *R2* be relvars with headings *H1* and *H2*, respectively.
    Also, let *X1* and *X2* be subsets of *H1* and *H2*, respectively, such that there
    exists a possibly empty set of attribute renamings such that the result, *R*,
    of applying those renamings to the projection *R1* on the attributes of *X1* has
    heading *X2*. Then an equality dependency (EQD) between *R1* and *R2* is a statement
    to the effect that *R* and the projection of *R2* on the attributes of *X2* must
    be equal—i.e., *R* = *R2*{*X2*}.


    In fact, equality dependencies are an important special case of a more general
    phenomenon known as inclusion dependencies:


    ### Definition (inclusion dependency)

    Loosely, a constraint that requires one specified relation to be included in another.
    More precisely, let *R1* and *R2* be relvars with headings *H1* and *H2*, respectively.
    Also, let *X1* and *X2* be subsets of *H1* and *H2*, respectively, such that there
    exists a possibly empty set of attribute renamings such that the result, *R*,
    of applying those renamings to the projection *R1* on the attributes of *X1*}
    has heading *X2*. Then an inclusion dependency (IND) from *R1* to *R2* is a statement
    to the effect that *R* must be included in (i.e., be a subset of) the projection
    of *R2* on the attributes of *X2*—in symbols, *R* ⊆ *R2*{*X2*}.


    Points arising from this latter definition:


    *   A foreign key constraint is a special case of an IND. In the suppliers-and-parts
    database, for example, {SNO} in relvar SP is a foreign key, referencing the key
    {SNO} in relvar S; thus, there''s an IND from SP to S—the projection of SP on
    {SNO} is included in the projection of S on {SNO} (in symbols, `SP{SNO} ⊆ S{SNO}`).
    But note that (to use the notation of the foregoing definition) INDs in general,
    unlike foreign key constraints in particular, don''t require *X2* to be a key^(^(43))
    for *R2*.


    *   As already noted, an EQD is a special case of an IND, too. To be more specific,
    the EQD "*A* = *B*" is equivalent to the pair of INDs "*A* is included in *B*"
    and "*B* is included in *A*" (in symbols, *A* ⊆ *B* and *B* ⊆ *A*). In other words,
    an EQD is an IND that goes both ways, as it were.


    Now, we''re going to be seeing lots of examples of EQDs in particular, as opposed
    to INDs in general, in the pages ahead. In fact this state of affairs should be
    obvious: Nonloss decomposing a relvar into projections usually leads to INDs at
    least and often to EQDs, as we already know. However, it''s EQDs that don''t arise
    as a result of nonloss decomposition that are the interesting ones, in a way.
    The reason is that the existence of such an EQD often turns out to be a mark of
    redundancy—because if (as I put it earlier) some piece of information is represented
    twice, an EQD might be what''s needed to keep the two representations in agreement.


    If you''ve never heard of EQDs before, you might be wondering why not, given their
    conceptual importance. Certainly they don''t seem to have received very much attention
    in the literature. In my opinion, the most likely reason for this unfortunate
    state of affairs is the SQL language ... As you''ll know if you''ve ever tried
    the exercise, EQDs are extremely awkward to formulate in SQL, because SQL has
    no direct way of expressing relational comparisons.^(^(44)) A striking example
    in support of this contention can be found in the discussion of Example 12 in
    Chapter 17 of this book.'
