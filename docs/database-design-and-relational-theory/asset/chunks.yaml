  trans: '

    ## 逻辑设计与物理设计


    维基百科就说到这儿吧；我认为我已经表明，抱怨整个行业似乎对设计理论和设计最佳实践理解不深是有道理的。因此，在本附录的剩余部分，我想尝试为这场讨论注入一些清晰度；更具体地说，我想试着澄清数据库设计究竟是什么，或者至少应该是什么。我将从一些定义开始。


    *   **定义（数据库设计）：** 指逻辑数据库设计或物理数据库设计，具体取决于上下文——虽然未加限定的术语 `数据库设计`，或者有时简称为 `设计`，除非上下文另有要求，通常被理解为特指逻辑数据库设计。


    *   **定义（逻辑数据库设计，或简称逻辑设计）：** 指决定某个数据库应包含哪些表、这些表应有哪些列、以及这些表和列应遵循哪些完整性约束的过程，或该过程的结果。


    逻辑设计过程的目标是产生一个独立于所有与物理实现或具体应用相关考虑的设计（后一目标之所以可取，理由非常充分：在设计时通常无法知晓数据库的所有预期用途）。并且根据前述定义，整个过程可概括为：


    1.  尽可能仔细地确定表谓词和其他业务规则，尽管必然有些非正式，然后

    2.  将这些非正式的谓词和规则映射到正式定义的表、列和完整性约束——最好能以确保过程结果不涉及受控冗余的方式实现。


    我将在本附录后面解释 `表谓词`、`业务规则` 和 `不受控冗余` 这些术语的含义。同时，这里还有一个定义：


    *   **定义（物理数据库设计，或简称物理设计）：** 指给定某个逻辑设计后，决定该设计应如何映射到目标 DBMS 所支持的任何物理结构的过程，或该过程的结果。


    请仔细注意（如前所述定义所指出的），物理设计应源自逻辑设计，而不是反过来。实际上，理想情况下它应自动派生，尽管我意识到对于当今大多数商业产品而言，这可能有点不切实际。`^(²⁵⁷)`


    在本附录的剩余部分，我将特别专注于逻辑设计（从此时起，我通常将其简称为 `设计`）。


    ## 理论的作用


    我在此想说的主要一点是，确实存在一些科学或理论可以帮助逻辑设计过程。我指的当然是诸如进一步规范化原则和 `正交设计原理` 等事项。换句话说，如果你是一名设计师，你对自己——以及你的客户，也就是那些最终将不得不与你设计的数据库打交道的人——负有责任，去彻底熟悉这些原则，并知道如何以及何时应用它们。（我顺便指出，理论内容比许多人似乎意识到的要多得多。它当然不仅仅是确保所有表都符合某种特定范式的问题。不过，这里不是深入细节的地方。`^(²⁵⁸)`）


    我想说的第二点是，虽然科学很重要，但遗憾的是，设计中有许多方面是科学完全无法涉及的。而这就需要实践经验来弥补。如果你在设计领域有丰富的个人经验，嗯，那很好——你可能已经（或许是艰难地！）学会了哪些方法可行，哪些不可行。但如果你自己没有太多经验可以依靠（或者即使你有），那么你就需要能够遵循的合理建议，来自确实有此类经验的人的建议。一本由合格专业人员撰写的设计方面的好书，可以帮助满足这一需求。不过，有一点需要警惕：关于数据库技术的书籍，与专门关于设计的书籍相对，可能
    *并非* 你这里所需要的。这类书籍确实经常描述理论设计概念（例如各种范式），但它们通常不会就如何将这些概念应用于实际设计任务提供太多指导。*读者须自担风险*。

    '
- fmt: '## Predicates


    Let me now elaborate as promised on those terms `table predicate`, `business rule`,
    and `uncontrolled redundancy`. I’ll discuss predicates in this section and rules
    and redundancy in the next two.


    First of all, then, predicates. The `table predicate` for a given table is simply
    a reasonably precise, but informal, statement in natural language of what the
    table in question means—in other words, it’s a statement of how that table is
    supposed to be understood by users. For example, suppose we have a table called
    `EMP` (“employees”), with columns called `ENO`, `ENAME`, `DNO`, and `SALARY`.
    Then the predicate for that table `EMP` might look something like this:


    > *The person with employee number `ENO` is an employee of the company, is named
    `ENAME`, works in the department with department number `DNO`, and is paid salary
    `SALARY`.*


    `ENO`, `ENAME`, `DNO`, and `SALARY` are the *parameters* to this predicate, and
    of course they correspond to the columns of the table with those same names.


    Let me take a few moments to explain where this terminology of table predicates
    comes from.^([^(259)](#fn259)) In logic, a predicate is basically just *a truth
    valued function*. Like all functions, it has a set of parameters; it returns a
    result when it’s invoked; and (because it’s truth valued) that result is either
    `TRUE` or `FALSE`. Here’s a trivial example:


    ```

    x > y

    ```


    For this predicate, the parameters are `x` and `y`, and they stand for values
    of—let’s agree for the sake of the example—type `INTEGER`. When we invoke this
    function, we substitute arguments of the appropriate types for the parameters.
    Suppose we substitute the integers `8` and `5`, respectively. We obtain the following
    statement:


    ```

    8 > 5

    ```


    This statement is in fact a *proposition*, which in logic is something that’s
    unequivocally either true or false. In the case at hand, of course, it’s true;
    but if we substituted, say, `3` and `7` instead of `8` and `5` as the pertinent
    arguments, the resulting proposition would be false.


    Now let me get back to the predicate for table `EMP`. For that predicate the parameters
    are, as previously stated, `ENO`, `ENAME`, `DNO`, and `SALARY`, and they stand
    for values of (again let’s agree for the sake of the example) types `CHAR`, `CHAR`,
    `CHAR`, and `MONEY`, respectively. (See the next section for more on the question
    of data types.) Now suppose we invoke this function—i.e., suppose we *instantiate
    this predicate*, as the logicians say—and substitute the arguments `E4`, `Evans`,
    `D8`, and `70K`, respectively, for the parameters. We obtain the following proposition:


    > *The person with employee number `E4` is an employee of the company, is named
    `Evans`, works in the department with department number `D8`, and is paid salary
    `70K`.*


    And—here comes the point—*the corresponding row `(E4, Evans, D8, 70K)` will appear
    in the `EMP` table if and only if this particular proposition is true*. From a
    logical point of view, in fact, that’s exactly what a “table” is: It’s a set of
    rows, where the rows in question consist of all and only those rows whose column
    values form the arguments to a true instantiation of some specified predicate—and
    that specified predicate is, precisely, the `table predicate` for the table in
    question.


    Another way of saying the same thing is this (the following constitutes what’s
    usually known as *The Closed World Assumption*):


    *   If row `r` appears in table `T`, then the proposition corresponding to `r`
    is true.

    *   If row `r` could appear in `T` but doesn’t, then the proposition corresponding
    to `r` is false.


    *Note:* By “the proposition corresponding to `r`” in the foregoing, I mean, of
    course, the instantiation of the table predicate for `T` that’s obtained by substituting
    column values from `r` for the parameters of that predicate.


    ## Rules


    Now I turn to the second of those terms I promised to explain, `business rule`
    . Like a table predicate, a business rule too is a reasonably precise but informal
    statement in natural language. However, it differs from a table predicate in its
    purpose, which is to capture some aspect of how the data in the database needs
    to be constrained:^([^(260)](#fn260))


    *   To start with, there’ll certainly be rules that specify what type of information
    is denoted by the parameters to those table predicates. In the case of employees,
    for example, there’ll be a rule to the effect that the `SALARY` parameter (“salaries”)
    denotes money values, expressed in, let’s say, euros or U.S. dollars.^([^(261)](#fn261))

    *   Second, there’ll be rules that constrain the values those parameters can take
    for a given employee considered in isolation. For example, there might a rule
    that says salaries mustn’t be negative and must be less than some specified upper
    limit.

    *   Third, there’ll be rules that constrain the set of employees taken as a whole,
    independent of other “entities” such as departments, that might be represented
    in the same database. For example, there might be a rule to the effect that employee
    numbers must be unique.

    *   Finally, there’ll be rules that constrain employees considered in combination
    with other entities represented in the database. For example, there might be a
    rule to the effect that every employee must be assigned to some known department,
    or a rule to the effect that no employee can have a salary greater than that of
    the manager of the department the employee in question is assigned to.


    I’d like to say a bit more about this issue of business rules, because it’s important—also
    because in practice it does tend to get somewhat overlooked. As the foregoing
    discussion should be sufficient to suggest, business rules can get quite complicated
    (as complicated as you like, in fact). As I’ve said, however, they’re necessarily
    somewhat informal. Their formal counterpart—i.e., the thing they map to in the
    logical design—is *integrity constraints* (constraints for short), which thus
    need to be stated in some formal language and enforced by the DBMS. In other words,
    I depart here from certain other writers in stating categorically that database
    design isn’t just about choosing data structures—integrity constraints are crucial
    as well. (Of course, it’s true that other writers usually do at least talk about
    key and foreign key constraints—sometimes cardinality constraints too—but these
    particular constraints are really nothing more than important special cases of
    a much more general phenomenon.) In this connection, I’d like to draw your attention
    to the following remarks (somewhat paraphrased here) from *The Business Rule Book*
    (2nd edition), by Ron Ross (Business Rule Solutions Inc., 1997):


    Even though business rules (like the data itself) are “shared” and universal,
    traditionally they haven’t been captured in database design. Instead, they’ve
    usually been stated vaguely (if at all) in largely uncoordinated analytical and
    design documents, and then buried deep in the logic of application programs. Since
    application programs are notoriously unreliable in the consistent and correct
    application of such rules, this has been the source of considerable frustration
    and error.


    I couldn’t agree more. Moreover, note the implicit but strong criticism of DBMS
    products that fail to provide adequate support for integrity constraints! (Interestingly,
    the support provided in this area by the SQL standard is actually not too bad.
    Unfortunately, however, SQL products have been rather slow, to say the least,
    in implementing this aspect of the standard.)'
  raw: '## Predicates


    Let me now elaborate as promised on those terms *table predicate*, *business rule*,
    and *uncontrolled redundancy*. I’ll discuss predicates in this section and rules
    and redundancy in the next two.


    First of all, then, predicates. The *table predicate* for a given table is simply
    a reasonably precise, but informal, statement in natural language of what the
    table in question means—in other words, it’s a statement of how that table is
    supposed to be understood by users. For example, suppose we have a table called
    EMP (“employees”), with columns called ENO, ENAME, DNO, and SALARY. Then the predicate
    for that table EMP might look something like this:


    > *The person with employee number ENO is an employee of the company, is named
    ENAME, works in the department with department number DNO, and is paid salary
    SALARY.*


    ENO, ENAME, DNO, and SALARY are the *parameters* to this predicate, and of course
    they correspond to the columns of the table with those same names.


    Let me take a few moments to explain where this terminology of table predicates
    comes from.^([^(259)](#fn259)) In logic, a predicate is basically just *a truth
    valued function*. Like all functions, it has a set of parameters; it returns a
    result when it’s invoked; and (because it’s truth valued) that result is either
    TRUE or FALSE. Here’s a trivial example:


    ```

    x > y

    ```


    For this predicate, the parameters are *x* and *y*, and they stand for values
    of—let’s agree for the sake of the example—type INTEGER. When we invoke this function,
    we substitute arguments of the appropriate types for the parameters. Suppose we
    substitute the integers 8 and 5, respectively. We obtain the following statement:


    ```

    8 > 5

    ```


