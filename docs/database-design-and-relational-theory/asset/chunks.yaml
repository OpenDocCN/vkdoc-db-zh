    relvar 的所有可能关系的头部。相比之下，体部会改变；具体来说，随着在相关 relvar 上执行更新，它会改变。


    *   我说过头部是一个属性的集合。然而，就本书而言，更简单的想法是将头部仅视为一组属性*名*——这当然是一种简化，但对所讨论的事项没有严重的负面影响。


    *   实际上，更正确的想法是将头部视为一组*属性名/类型名对*（当然，同时保留要求这些属性名必须互不相同）。例如，在本书的所有示例中，我将假设属性`SNO`和`PNO`都是`CHAR`类型（任意长度的字符串），属性`QTY`是`INTEGER`类型（整数）。^(²⁰^)
    当我说符合某个头部的元组时，我的意思是该元组中的每个属性值都必须是相应类型的值。例如，为了让一个元组符合 relvar `SP`的头部，它必须具有属性`SNO`、`PNO`和`QTY`（没有其他），并且这些属性的值必须分别是`CHAR`、`CHAR`和`INTEGER`类型。


    虽然话是这么说，但我现在也必须说明，对于关系设计理论的目的而言，类型大多不是非常重要。这就是为什么从此往后，我将随意简化我对头部的定义。此外，在我大多数的关系和
    relvar 示例（以及 relvar 定义）中，我也将只显示属性名，而不费心甚至不提及相应的类型。


    *   给定头部中的属性数量是该头部的*度*（有时称为*元数*）。它也是具有该头部的任何关系或 relvar 的度。


    *注意：*术语*度*也用于元组和键（以及外键）的上下文中。例如，relvar `SP`的所有元组都像该 relvar 本身一样，度为三；该 relvar 的唯一键`{SNO,
    PNO}`的度为二；该 relvar 中的两个外键`{SNO}`和`{PNO}`的度各为一。


    *   给定体部中的元组数量是该体部的*基数*。它也是具有该体部的任何关系或 relvar 的基数。^(²¹^)


    *   （头部、关系等的）度可以是任何非负整数。度 1 称为*一元*；度 2，*二元*；度 3，*三元*；以此类推。更一般地说，度*n*称为*n 元*。'
- fmt: '## Predicates and Propositions


    Again consider the shipments relvar `SP`. Like all relvars, that relvar is supposed
    to represent some portion of the real world. In fact, I can be more precise: The
    heading of that relvar represents a certain *predicate*, meaning it’s a kind of
    generic statement about some portion of the real world (it’s generic because it’s
    *parameterized*, as I’ll explain in just a moment). The predicate in question
    (i.e., the one for relvar `SP`) is quite simple:


    *   Supplier `SNO` supplies part `PNO` in quantity `QTY`.


    This predicate is the *intended interpretation* —in other words, the *meaning*—for,
    or of, relvar `SP`.


    Perhaps I should say a little more about the way I use the term *predicate* in
    this book. First of all, you’re probably familiar with the term already, since
    SQL uses it extensively to refer to boolean or truth valued expressions (it talks
    about comparison predicates, `IN` predicates, `EXISTS` predicates, and so on).
    However, while this usage on SQL’s part isn’t exactly incorrect, it does usurp
    a very general term—one that’s extremely important in database contexts—and give
    it a rather specialized meaning, which is why I prefer not to follow that usage
    myself.


    Second, I should explain in the interest of accuracy that a predicate isn’t really
    a statement as such; rather, it’s the assertion made by that statement. For example,
    the predicate for relvar `SP` is what it is, regardless of whether it’s expressed
    in English or Spanish or whatever. For simplicity, however, I’ll assume in what
    follows that a predicate is indeed just a statement per se, typically but not
    necessarily expressed in some natural language such as English.


    Finally, I’ve now explained what I mean by the term, but you should be aware that—the
    previous paragraph notwithstanding—there seems to be little consensus, even among
    logicians, as to *exactly* what a predicate is. In particular, some writers regard
    a predicate as a purely formal construct that has no meaning in itself, and regard
    what I’ve called the intended interpretation as something distinct from the predicate
    as such. I don’t want to get into arguments about such matters here; for further
    discussion, I refer you to the paper “What’s a Predicate?” in *Database Explorations:
    Essays on The Third Manifesto and Related Topics,* by C. J. Date and Hugh Darwen
    (Trafford, 2010).


    You can think of a predicate, a trifle loosely, as *a truth valued function*.
    Like all functions, it has a set of parameters; it returns a result when it’s
    invoked; and (because it’s truth valued) that result is either `TRUE` or `FALSE`.
    In the case of the predicate for relvar `SP`, for example, the parameters are
    `SNO`, `PNO`, and `QTY` (corresponding of course to the attributes of the relvar),
    and they stand for values of the applicable types (`CHAR`, `CHAR`, and `INTEGER`,
    respectively, in this simple example). And when we invoke the function—when we
    *instantiate the predicate*, as the logicians say—we substitute arguments for
    the parameters. Suppose we substitute the arguments `S1`, `P1`, and `300`, respectively.
    We obtain the following statement:


    *   Supplier `S1` supplies part `P1` in quantity `300`.


    This statement is in fact a *proposition*, which in logic is something that evaluates
    to either `TRUE` or `FALSE`, unconditionally. Here are a couple of examples:


    1.  Edward Abbey wrote *The Monkey Wrench Gang*.

    2.  William Shakespeare wrote *The Monkey Wrench Gang*.


    The first of these is true and the second false. Don’t fall into the common trap
    of thinking that propositions must always be true! However, the ones I’m talking
    about at the moment *are* supposed to be true ones, as I now explain:


    *   First of all, as I’ve already said, every relvar has an associated predicate,
    called the *relvar* *predicate* for the relvar in question. (So *Supplier `SNO`
    supplies part `PNO` in quantity `QTY`* is the relvar predicate for relvar `SP`.)

    *   Let relvar `R` have predicate `P`. Then every tuple `t` appearing in `R` at
    some given time `T` can be regarded as representing a certain proposition `p`,
    derived by invoking (or *instantiating*) `P` at that time `T` with the attribute
    values from `t` as arguments.

    *   And (*very important!*) we assume by convention that each proposition `p`
    obtained in this manner evaluates to `TRUE`.


    Given the sample value shown for relvar `SP` on the left of Figure [2-1](#489629_2_En_2_Chapter.xhtml#Fig1),
    for example, we assume the following propositions both evaluate to `TRUE` at time
    `T1`:


    *   Supplier `S1` supplies part `P1` in quantity `300`.

    *   Supplier `S2` supplies part `P1` in quantity `300`.


    What’s more, we go further: If at some given time `T` a certain tuple plausibly
    could appear in some relvar but doesn’t, then we’re entitled to assume that the
    corresponding proposition is false at that time `T`. For example, the tuple


    ```

    ( ''S1'' , ''P2'' , 200 )

    ```


    (to adopt an obvious shorthand notation) is certainly a plausible `SP` tuple;
    but it doesn’t appear in relvar `SP` at time `T1`—I’m referring to Figure [2-1](#489629_2_En_2_Chapter.xhtml#Fig1)
    again—and so we’re entitled to assume that *it’s not the case that* the following
    proposition is true at time `T1`:


    *   Supplier `S1` supplies part `P2` in quantity `200`.


    (On the other hand, this proposition *is* true at time `T2`.)


    To sum up: A given relvar `R` contains, at any given time, *all* and *only* the
    tuples that represent true propositions (true instantiations of the relvar predicate
    for `R`) at the time in question—or, at least, that’s what we always assume in
    practice. In other words, we adopt in practice what’s called *The Closed World
    Assumption* . And since that assumption is so crucial—it underlies just about
    everything we do when we use a database, even though it’s seldom acknowledged
    explicitly—I’d like to spell it out here for the record:


    *   **Definition (The Closed World Assumption):** Let relvar `R` have predicate
    `P`. Then *The Closed World Assumption* (`CWA`) says (a) if tuple `t` appears
    in `R` at time `T`, then the instantiation `p` of `P` corresponding to `t` is
    assumed to be `TRUE` at time `T`; conversely, (b) if tuple `t` plausibly could
    appear in `R` at time `T` but doesn’t, then the instantiation `p` of `P` corresponding
    to `t` is assumed to be `FALSE` at time `T`. In other words (a trifle loosely):
    Tuple `t` appears in relvar `R` at time `T` if and only if it “satisfies the predicate”
    for `R` at time `T`.'
