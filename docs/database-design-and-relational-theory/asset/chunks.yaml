    \ STATUS). Now consider the query “Get the average supplier city status value.”\
    \ Given our usual sample values (see Figure [3-2](#489629_2_En_3_Chapter.xhtml#Fig2) in\
    \ Chapter [3](#489629_2_En_3_Chapter.xhtml)), the status values for Athens, London,\
    \ and Paris are 30, 20, and 30, respectively, and so the average is 80/3, which\
    \ is 26.667 to three decimal places. Here then are some attempts at formulating\
    \ this query in SQL (I’ll assume for simplicity that S is nonempty, so we don’t\
    \ have to worry about what happens in SQL if we try to apply the AVG operator\
    \ to an empty set):^([^(117)](#fn117))\n\n1.  `SELECT AVG ( STATUS ) AS RESULT`\n\
    \n    `FROM   S`\n\n*Result* (incorrect): 26\\. The problem here is that London’s\
    \ status and Paris’s status have both been counted twice. Perhaps we need a DISTINCT\
    \ inside the AVG invocation? Let’s try that:\n\n1.  `SELECT AVG ( DISTINCT STATUS\
    \ ) AS RESULT`\n\n    `FROM   S`\n\n*Result* (incorrect): 25\\. No, it’s distinct\
    \ *cities* we need to examine, not distinct status values. We can do that by grouping:\n\
    \n1.  `SELECT CITY , AVG ( STATUS ) AS RESULT`\n\n    `FROM   S`\n\n    `GROUP  BY\
    \ CITY`\n\n*Result* (incorrect): (Athens,30), (London,20), (Paris,30). This formulation\
    \ gives average status *per city*, not the overall average. Ah, so perhaps what\
    \ we want is the average of the averages?—\n\n1.  `SELECT CITY , AVG ( AVG ( STATUS\
    \ ) ) AS RESULT`\n\n    `FROM   S`\n\n    `GROUP  BY CITY`\n\n*Result:* Syntax\
    \ error—the SQL standard quite rightly doesn’t allow “set function” invocations\
    \ to be nested in this manner.^([^(118)](#fn118)) One more attempt:\n\n1.  `SELECT\
    \ AVG ( TEMP.STATUS ) AS RESULT`\n\n    `FROM ( SELECT DISTINCT S.CITY , S.STATUS`\n\
    \n           `FROM   S ) AS TEMP`\n\n*Result* (correct at last): 26.667\\. But\
    \ note how complicated this expression is compared to its analog on the fully\
    \ normalized design (relvars SNC and CT):\n\n1.  `SELECT AVG ( STATUS ) AS RESULT`\n\
    \n    `FROM   CT`\n\n## Denormalization Considered Harmful (II)\n\nI said in the\
    \ previous section that the argument in favor of denormalization is that it makes\
    \ retrievals easier to express and makes them perform better. But does that argument\
    \ really stand up to careful analysis? Let’s take a closer look.\n\nFirst of all,\
    \ it clearly isn’t true across the board that retrievals are easier to express;\
    \ the previous section presented a detailed counterexample, but the point can\
    \ be made with much simpler examples. By way of illustration, consider what’s\
    \ involved in formulating the query “Get all supplier details” against (a) the\
    \ normalized design of Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1) and (b)\
    \ a denormalized design in which relvars S, SP, and P are replaced by a single\
    \ “joined” relvar called, say, SSPP. Here are **Tutorial D** formulations:\n\n\
    1.  `S`\n\n2.  `SSPP { SNO , SNAME , STATUS , CITY }`\n\nOr if you want SQL solutions:\n\
    \n1.  `SELECT *`\n\n`FROM S`\n\n2.  `SELECT DISTINCT SNO , SNAME , STATUS , CITY`\n\
    \n`FROM SSPP`\n\nThe next point is that many queries are likely to perform worse,\
    \ too. There are several reasons for this state of affairs. One is that denormalization\
    \ leads to redundancy, which in turn can lead to a need to do duplicate elimination\
    \ (in this connection, note that DISTINCT in the second of the foregoing SQL formulations).\
    \ Another is as follows:\n\n*   Suppose again that the join of suppliers, shipments,\
    \ and parts is represented as one single stored file. Also, assume for simplicity\
    \ that any given stored file consists of a physically contiguous collection of\
    \ stored records, one for each tuple currently appearing in the relvar the stored\
    \ file represents.\n\n*   Let’s suppose too for the sake of the argument that\
    \ the query “Get details for suppliers who supply red parts” will perform reasonably\
    \ well against this physical structure. OK; but the query “Get all supplier details”\
    \ will perform *worse* than it would against the structure in which the three\
    \ relvars map to three physically separate stored files! Why? Because in the latter\
    \ design, all supplier stored records will be physically contiguous, whereas in\
    \ the former design they’ll effectively be spread over a wider area, and will\
    \ therefore require more I/O. Analogous remarks apply to any query that accesses\
    \ suppliers only, or parts only, or shipments only, instead of performing some\
    \ kind of join.\n\n*   Note too that denormalization, again because it increases\
    \ redundancy, will most likely lead to bigger stored records, and this fact too\
    \ can lead to more I/O, not less. As a trivial example, a 4K page can hold two\
    \ 2K stored records but only one 3K stored record; hence, a denormalization that\
    \ increases redundancy by 50% could increase I/O by 100%. (I’m speaking pretty\
    \ loosely here, of course.)\n\nMy next observation is that even if we accept the\
    \ claim that denormalization makes retrievals easier to express and perform better,\
    \ it certainly makes updates harder to express and perform worse. Now, this point\
    \ is (as I said before) widely understood; however, what’s not so widely understood\
    \ is that denormalization opens the door to integrity violations, too. For example,\
    \ in relvar S (as opposed to the projection relvars SNC and CT), *someone*—either\
    \ the system or the user, and in current practice probably the latter—is going\
    \ to have to be responsible for maintaining the FD {CITY} → {STATUS}; and if that\
    \ maintenance isn’t done, integrity is lost. By contrast, in the normalized two-relvar\
    \ design, all that has to be done is to enforce the key constraint on CT—which\
    \ will definitely be done by the system, not the user—and the fact that each city\
    \ has one status will then be maintained “automatically.”"
  trans: "\n## 反规范化被认为是有害的 (I)\n\n在本节中，我将提出一个论点——一个逻辑论点，而且可能是你以前未曾见过的——来支持这样一种立场：**只应将反规范化作为最后的手段**。本质上，该论点在于：虽然（众所周知）反规范化可能在逻辑上不利于更新操作，*但它也可能在逻辑上不利于检索操作*，因为它可能使某些查询的表述变得更加困难。（或者，它可能使这些查询更容易被错误地表述，这意味着，如果它们执行了，你得到的答案本身可能正确，但却是对错误问题的回答。）让我来说明一下。\n\
    \n再次考虑关系变量 `S`，其包含函数依赖 `{CITY} → {STATUS}`。如前文（在“反规范化意味着什么？”一节中）所述，该关系变量可被视为是关系变量\
    \ `SNC`（包含属性 `SNO`、`SNAME` 和 `CITY`）和 `CT`（包含属性 `CITY` 和 `STATUS`）进行反规范化的结果。现在考虑查询：“获取平均供应商城市状态值”。根据我们通常使用的样本值（参见第\
    \ 3 章图 3-2），雅典、伦敦和巴黎的状态值分别为 30、20 和 30，因此平均值为 80/3，保留三位小数即 26.667。以下是尝试用 SQL 表述此查询的几种方式（为简单起见，我假设\
    \ `S` 非空，这样我们就不必担心在 SQL 中对空集应用 `AVG` 操作符时会发生什么）：^(¹¹⁷)\n\n1.  ```sql\n    SELECT\
    \ AVG ( STATUS ) AS RESULT\n    FROM S\n    ```\n    *结果*（错误）：26。这里的问题是伦敦的状态值和巴黎的状态值都被计算了两次。也许我们需要在\
    \ `AVG` 调用中加入 `DISTINCT`？让我们试试：\n\n1.  ```sql\n    SELECT AVG ( DISTINCT STATUS\
    \ ) AS RESULT\n    FROM S\n    ```\n    *结果*（错误）：25。不，我们需要检查的是不同的*城市*，而不是不同的状态值。我们可以通过分组来实现：\n\
    \n1.  ```sql\n    SELECT CITY , AVG ( STATUS ) AS RESULT\n    FROM S\n    GROUP\
    \ BY CITY\n    ```\n    *结果*（错误）：(Athens,30), (London,20), (Paris,30)。这个表述给出的是*每个城市*的平均状态值，而不是整体平均值。啊，那么也许我们想要的是平均值的平均值？——\n\
    \n1.  ```sql\n    SELECT CITY , AVG ( AVG ( STATUS ) ) AS RESULT\n    FROM S\n\
    \    GROUP BY CITY\n    ```\n    *结果：* 语法错误——SQL 标准相当合理地不允许以这种方式嵌套“集合函数”调用。^(¹¹⁸)\
    \ 再试一次：\n\n1.  ```sql\n    SELECT AVG ( TEMP.STATUS ) AS RESULT\n    FROM ( SELECT\
    \ DISTINCT S.CITY , S.STATUS\n           FROM S ) AS TEMP\n    ```\n    *结果*（终于正确了）：26.667。但请注意，与完全规范化设计（关系变量\
    \ `SNC` 和 `CT`）上的类似表达相比，这个表达式是多么复杂：\n\n1.  ```sql\n    SELECT AVG ( STATUS ) AS\
    \ RESULT\n    FROM CT\n    ```\n\n## 反规范化被认为是有害的 (II)\n\n我在前一节中提到，支持反规范化的论点是它使检索更易于表述并且性能更好。但是，这个论点真的能经得起仔细分析吗？让我们仔细看看。\n\
    \n首先，检索更易于表述显然不是普遍成立的；前一节提供了一个详细的反例，但可以用更简单的例子来说明这一点。举例来说，考虑针对 (a) 图 1-1 的规范化设计\
    \ 和 (b) 将关系变量 `S`、`SP` 和 `P` 替换为一个称为 `SSPP` 的单一“连接”关系变量的反规范化设计，来表述查询“获取所有供应商详情”所涉及的内容。以下是\
    \ `Tutorial D` 表述：\n\n1.  `S`\n2.  `SSPP { SNO , SNAME , STATUS , CITY }`\n\n\
    或者如果你想要 SQL 解决方案：\n\n1.  ```sql\n    SELECT *\n    FROM S\n    ```\n2.  ```sql\n\
    \    SELECT DISTINCT SNO , SNAME , STATUS , CITY\n    FROM SSPP\n    ```\n\n下一个观点是，许多查询的性能也很可能会变差。造成这种情况的原因有几个。一个是反规范化会导致冗余，而这反过来又可能导致需要执行重复项消除操作（在这方面，请注意上述第二个\
    \ SQL 表述中的 `DISTINCT`）。另一个原因如下：\n\n*   再次假设供应商、供货和零件的连接被表示为一个单一的存储文件。同时，为简单起见，假设任何给定的存储文件都由一组物理上连续的存储记录组成，每条记录对应于该存储文件所表示的关系变量中当前出现的一个元组。\n\
    \n*   为了论证，我们还假设查询“获取供应红色零件的供应商详情”针对这种物理结构性能表现尚可。好吧；但是查询“获取所有供应商详情”的性能将*比*在三个关系变量映射到三个物理上独立的存储文件的结构上*更差*！为什么？因为在后一种设计中，所有供应商存储记录将是物理连续的，而在前一种设计中，它们实际上分布在更广的区域，因此需要更多的\
    \ I/O。类似的评论适用于任何仅访问供应商、或仅访问零件、或仅访问供货记录，而不是执行某种连接的查询。\n\n*   还请注意，反规范化，同样因为它增加了冗余，很可能会导致更大的存储记录，而这一事实也会导致更多的\
    \ I/O，而不是更少。举一个简单的例子，一个 4K 的页面可以容纳两个 2K 的存储记录，但只能容纳一个 3K 的存储记录；因此，一个将冗余度增加 50%的反规范化可能会使\
    \ I/O 增加 100%。（当然，我在这里说得相当不严谨。）\n\n我的下一个观察是，即使我们接受反规范化使检索更易于表述且性能更好的说法，它肯定会使更新更难以表述且性能更差。这一点（正如我之前所说）已被广泛理解；然而，不那么被广泛理解的是，反规范化也为完整性违规打开了大门。例如，在关系变量\
    \ `S` 中（与投影关系变量 `SNC` 和 `CT` 相反），*某人*——无论是系统还是用户，在当前实践中很可能是后者——将不得不负责维护函数依赖 `{CITY}\
    \ → {STATUS}`；如果该维护未完成，完整性就会丢失。相比之下，在规范化的双关系变量设计中，所需要做的只是强制执行 `CT` 上的键约束——这肯定是由系统而非用户完成的——然后每个城市具有一个状态值的事实将“自动”得到维护。\n"
- fmt: "One reviewer of this chapter pointed out that yet another advantage of doing\
    \ a normalized design is that such a design tends to simplify the formulation\
    \ of complex queries, in that it enables expressions representing such formulations\
    \ to be more modular, through nesting of simple subexpressions. This is true in\
    \ principle, but I feel obliged to add that, although such modular formulations\
    \ can readily be constructed in a well designed language like `Tutorial D` (using\
    \ that language’s `WITH` feature, illustrated in examples elsewhere in this book),\
    \ they’re much harder—sometimes impossible—to formulate in SQL. Why? Because SQL’s\
    \ `WITH` feature is very much less useful than `Tutorial D`’s, owing to the fact\
    \ that (a) the semantics of SQL’s `SELECT` clause are sensitive to the presence\
    \ or absence of certain other constructs in the overall expression (especially\
    \ but not only `GROUP BY` and `HAVING` clauses and aggregate operator invocations),\
    \ and hence owing also to the consequent fact that (b) there’s nothing like a\
    \ one to one mapping in SQL between semantic and syntactic constructs.\n\nMy final\
    \ point is this: Regardless of whether we’re talking about\n\n1.  True denormalization,\
    \ which is done at the physical level only, or\n\n2.  The kind of denormalization\
    \ we have to do in most of today’s SQL products, which affects the logical level\
    \ as well,\n\nthe point isn’t widely appreciated enough that when people say “denormalize\
    \ for performance,” they’re really referring to the performance *of specific applications*.\
    \ As I put it earlier (in the section “What Does Denormalization Mean?”), denormalization\
    \ is typically based on a somewhat narrow perspective on the overall problem.\
    \ *Any* particular physical design is likely to be good for some applications\
    \ but bad for others (in terms of its performance implications, that is).\n\n\
    ## In this chapter\n\nIn this chapter, I’ve given strong arguments in favor of\
    \ not denormalizing; in effect, therefore, I’ve given arguments in favor of normalizing.\
    \ And it’s certainly true that good designs are usually fully normalized. But\
    \ it’s important to understand that the opposite isn’t necessarily true! That\
    \ is, a design can be fully normalized and yet still be bad. For example, the\
    \ projection `ST` of relvar `S` on attributes `SNO` and `STATUS` is certainly\
    \ in BCNF—in fact, it’s in the highest possible normal form, as we’ll see in Part\
    \ IV of this book—but it’s clearly not a good design, as we saw in Chapter 6.\n\
    \n### Concluding Remarks\n\n## Exercises\n\n1.  It’s sometimes suggested that\
    \ one advantage of binary relvars over the general *n-*ary relvars supported by\
    \ the relational model is that binary relvars are always in BCNF (implying among\
    \ other things that we don’t need to worry about normalization and denormalization,\
    \ perhaps). Either show that binary relvars are indeed always in BCNF, or show\
    \ that the claim is incorrect by producing a counterexample.\n\n2.  The following\
    \ is an excerpt from a published interview with a certain database consultant.^([^(119)](#fn119))\
    \ It begins with a statement from the consultant:\n    *   ***Consultant:*** The\
    \ problems ... largely result from normalizing data across multiple [relvars]\
    \ ... Many queries, however, are much easier to understand if the data is denormalized\
    \ ...\n\n    *   ***Interviewer:*** Doesn’t denormalization potentially lower\
    \ data integrity and reduce flexibility in supporting unanticipated queries?\n\
    \n    *   ***Consultant:*** Normalization, and its emphasis on elimination of\
    \ redundant storage, is purely a transaction processing issue. When users view\
    \ data, they see it in a redundant form. In order to transform data into a form\
    \ that is useful to users, it must be denormalized by means of a join, which is\
    \ essentially a way of dynamically denormalizing data for greater ease of use.\
    \ The problem is that users can’t tolerate the time and cost of joins. To address\
    \ the problem, companies replicate data in an ever increasing number of decision\
    \ support databases, which represent denormalized views of the data.\n\n    What\
    \ if anything do you think is wrong with the opinions expressed?\n\n3.  The possibility\
    \ of using surrogate identifiers or keys was mentioned in the body of the chapter.\
    \ Indeed, many designers recommend the use of such artifical or surrogate keys\
    \ in place of what are sometimes called “natural” keys. For example, we might\
    \ add an attribute `SPNO`, say, to our usual shipments relvar (making sure it\
    \ has the uniqueness property, of course) and then make `{SPNO}` a surrogate key\
    \ for that relvar. (Note, however, that `{SNO,PNO}` would still be a key; it just\
    \ wouldn’t be the only one any longer.) Thus, surrogate keys are keys in the usual\
    \ relational sense, but (a) they always consist of exactly one attribute and (b)\
    \ their values serve solely as surrogates for the entities they stand for (i.e.,\
    \ they serve merely to represent the fact that those entities exist—they carry\
    \ absolutely no additional meaning or baggage of any kind). Ideally, those surrogate\
    \ values would be system generated, but whether they’re system or user generated\
    \ has nothing to do with the basic idea of surrogate keys as such. Two questions:\
    \ Are surrogate keys the same thing as tuple IDs? And do you think they’re a good\
    \ idea?\n\n4.  If two designs are information equivalent, it must be possible\
    \ to use operations of the relational algebra to convert them into one another.\
    \ Consider, therefore, the following competing designs for an employees relvar\
    \ from the body of the chapter:\n\n    ```\n    EMP { ENO , JAN_PAY , FEB_PAY\
    \ , ..., DEC_PAY }\n    KEY { ENO }\n    EMP { ENO , MONTH , PAY }\n    KEY {\
    \ ENO , MONTH }\n    ```\n\n    Using `Tutorial D` or SQL (or your own preferred\
    \ database language), show how each of these designs can be converted into the\
    \ other."
