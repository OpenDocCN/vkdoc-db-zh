    \ `STATUS`。* 以下函数依赖（FD）等成立：\n```\n{ SNO }   → { CLASS }\n{ CLASS } → { CITY }\n\
    { CITY }  → { STATUS }\n```\n关系变量 `RX3` 不属于 3NF，因为在 FD `{CLASS} → {CITY}` 中，`{CLASS}`\
    \ 不是超键，`{CITY}` 不是子键。（对于 `{CITY} → {STATUS}`，情况类似，只需稍作调整。）因此，常规的规范化过程会建议我们应用 Heath\
    \ 定理到这个 FD `{CLASS} → {CITY}` 来分解这个关系变量。但如果我们这样做，会得到：\n```\nRX3A { CLASS , CITY\
    \ }\nKEY { CLASS }\nRX3B { SNO , CLASS , STATUS }\nKEY { SNO }\n```\n在这个分解中，`RX3A`\
    \ 属于 3NF，但 `RX3B` 仅属于 2NF——并且如你所见，FD `{CITY} → {STATUS}` 丢失了。实际上，更好的做法是基于 FD `{CITY}\
    \ → {STATUS}` 进行分解：\n```\nRX3A′ { CITY , STATUS }\nKEY { CITY }\nRX3B′ { SNO ,\
    \ CLASS , CITY }\nKEY { SNO }\n```\n`RX3A′` 属于 3NF，而 `RX3B′` 仅属于 2NF，但至少 FD `{CITY}\
    \ → {STATUS}` 被保留了。此外，我们现在可以继续基于 FD `{CLASS} → {CITY}` 来分解 `RX3B′`，得到：\n```\n\
    RX3BA′ { CLASS , CITY }\nKEY { CLASS }\nRX3BB′ { SNO , CLASS }\nKEY { SNO }\n\
    ```\n这些关系变量都属于 3NF。\n\n所以，现在我们已经看到了四个关于 FD 可能丢失的不同分解示例。这个话题还有很多内容可以讨论，但一个明确的信息是：常规的规范化过程——事实上是实践中经常教授的那种！——在几个方面是不足的。具体来说：\n\
    \n*   常规观点认为，FD 保留只与从 3NF 到 BCNF 的步骤相关，但正如我们所见，情况未必如此。\n*   常规规范化过程通常建议作为分解基础的\
    \ FD，不一定是最好的选择。\n*   该过程还假设可以通过从 1NF 到 2NF 再到 3NF（等等）按顺序逐步推进来找到最佳设计，这再次未必正确。\n\
    \n当然，“第一”、“第二”等命名法强化了最后这种看法；但这种命名法在某种程度上其实只是一个历史的偶然。我的意思是，如果第一个被定义的范式是 BCNF——这完全有可能，因为其定义在概念上如此简单，不涉及\
    \ FD 不可约性、非键属性、子键、1NF、2NF 或 3NF——那么实际上就永远没有必要将 2NF 和 3NF 作为特定的范式单独提出来。^(⁸⁸)\n\n\
    ## 一个有效的方法\n\n这里介绍一个保证能产生分解的方法，其中所有关系变量都属于 3NF（但不一定是 BCNF），并且所有 FD 都被保留。^(⁸⁹)\
    \ 为方便起见，在下文中我将称之为 `the 3NF procedure`（3NF 过程）。输入是一个关系变量 `R` 和一组所谓的 `irreducible\
    \ cover`（不可约覆盖，称它为 `C`），用于 `R` 中成立的 FD。我稍后会解释什么是 `irreducible cover`——顺便说一句，`irreducible`（不可约的）这个词又出现了——但让我先陈述这个过程：\n\
    \n1.  令 `S` 为一个头的集合。将 `S` 初始化为空集 `{ }`。\n2.  令 `X` 为 `C` 中某个 FD 的左侧（决定因素）；令 `C`\
    \ 中所有左侧为 `X` 的 FD 的完整集合为 `X → Y1`, ..., `X → Yn`；并令 `Y1`, ... `Yn` 的并集为 `Y`。将\
    \ `X` 和 `Y` 的并集添加到 `S` 中。对每个不同的 `X` 执行此步骤。\n3.  令 `U` 为 `R` 中不属于 `S` 任何元素的属性集合。如果\
    \ `U` 非空，则将 `U` 添加到 `S` 中。\n4.  如果 `S` 中没有元素是 `R` 的超键，则将 `R` 的某个键 `K` 添加到 `S`\
    \ 中。\n\n在这个过程结束时，`S` 的元素就是一组 3NF 关系变量的头，`R` 可以无损地分解为这些关系变量，而不会丢失任何 FD。尤其需要注意的是，该过程没有明确提到\
    \ 2NF，甚至没有将其作为某种垫脚石。\n\n那么它是如何工作的呢？显然，`irreducible cover` 的概念很重要。为了解释这个概念，让我先指出一件我已经多次顺便提到的事情：即\
    \ *一些 FD 蕴含其他 FD* 的事实。一个简单的例子是，FD `X → Y` 和 `Y → Z` 一起蕴含了 FD `X → Z`——我的意思是，如果前两个\
    \ FD 被关系 `r` 满足，那么第三个也必须被 `r` 满足。或者，更关键的是：如果前两个在关系变量 `R` 中成立，那么第三个也必须在 `R` 中成立。我们在前一节关于关系变量\
    \ `RX3` 的讨论中看到了一个例证，其中 FD `{CLASS} → {CITY}` 和 `{CITY} → {STATUS}` 都成立，因此 FD `{CLASS}\
    \ → {STATUS}` 也成立。\n\n因此，一些 FD 蕴含其他 FD。给定一个 FD 的集合 `F`，我们可以合理地讨论 `F` 的一个 `cover`（覆盖）。定义如下：\n\
    \n*   **定义（cover，覆盖）：** 一个 FD 集合 `F` 的 `cover` 是一个 FD 集合 `C`，使得 `F` 中的每个 FD 都由\
    \ `C` 中的 FD 所蕴含。\n\n作为一个简单的例子，令 `F` 为集合：\n```\n{ X → Y , Y → Z , X → Z }\n```\n\
    那么以下两者都是 `F` 的 `cover`：\n```\n{ X → Y , Y → Z }\n{ X → Y , Y → Z , X → Z }\n```\n\
    这个例子立即说明了三点：首先，`cover` 通常不是唯一的；其次，任何 FD 集合当然是它自身的 `cover`，因为每个 FD 都蕴含自身。第三点也更重要：对于给定的\
    \ FD 集合 `F`，强制执行其某个 `cover` `C` 中的 FD 将“自动”强制执行 `F` 中的 FD。因此，给定需要强制执行的 FD 集合 `F`，只需找到\
    \ `F` 的某个 `cover` `C` 并强制执行 `C` 中的 FD 即可。（事实上，只需强制执行 `F` 的一个 `irreducible cover`\
    \ 中的 FD，这一点很快就会清楚。）\n\n现在我可以定义什么是 `irreducible cover` 了：\n\n*   **定义（irreducible\
    \ cover，不可约覆盖）：** 一个 FD 集合 `F` 的 `cover` `C` 是 `irreducible` 的，当且仅当它具备以下所有属性：\n\
    \    1.  *Singleton dependant（单例依赖项）：*`C` 中的每个 FD 的右侧只有一个属性。\n    2.  *Irreducible\
    \ determinant（不可约决定因素）：*`C` 中的每个 FD 本身是不可约的。^(⁹⁰)\n    3.  *No redundant FDs（无冗余\
    \ FD）：*不能从 `C` 中丢弃任何 FD 而不失去 `C` 是 `F` 的 `cover` 这一性质。\n\n当然，立即出现的问题是：给定某个特定的\
    \ FD 集合，如何找到该集合的一个 `irreducible cover`？我将在下一章详细回答这个问题。现在，让我先给一个例子——即以下 FD 集合，它们构成了我们通常的供应商关系变量\
    \ `S` 中成立的 FD 的一个 `irreducible cover`："
