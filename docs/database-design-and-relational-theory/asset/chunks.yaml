    1.  给定函数依赖 `{T} → {J}` 成立，整个属性集函数依赖于 `{S,T}`。

    2.  同时，给定函数依赖 `{S} → {J}` 和 `{T} → {S}` *不* 成立，整个属性集不函数依赖于 `{S,T}` 的任何真子集。


    因此存在两个键：`{S,J}` 和 `{S,T}`。^(⁸²) 或许更重要的是，`{T}` *不是* 一个键，因此关系变量 `SJT` 受制于一个并非“从一个键出发的箭头”的函数依赖（更正式地说，它不是由键所蕴含的）。因此，该关系变量不属于
    BCNF，尽管它属于 3NF。（*练习：* 验证此说法。）并且它存在冗余；例如，给定图 6-2 所示的样本值，White 教授教授数学这一事实出现了两次。正如您所预料的那样，它也存在更新异常；例如，再次参考图
    6-2，我们无法删除 Jones 正在学习物理的事实，同时不丢失 Brown 教授教授物理这一信息。


    现在，我们可以通过适当地分解关系变量来解决这些问题。将 Heath 定理应用于函数依赖 `{T} → {J}`（令 `X`、`Y` 和 `Z` 分别为 `{T}`、`{J}`
    和 `{S}`），我们得到以下无损分解：


    ```

    TJ { T , J }

    KEY { T }

    TS { T , S }

    KEY { T , S }

    ```


    我将留下另一个练习由您来完成：（a）显示对应于图 6-2 所示 `SJT` 值的这两个关系变量的值，（b）证明这些关系变量属于 BCNF，以及（c）验证该分解确实避免了上述冗余和更新异常。特别要注意的是，函数依赖
    `{T} → {J}` 在此分解中成为了一个键约束；而在原始设计中，它并非键约束，因此必须单独陈述和强制执行（我指的是在键约束之上）。


    到目前为止，一切顺利。但还有另一个问题。事实是，尽管分解为 `TJ` 和 `TS` 确实解决了某些问题，但不幸的是它引入了其他问题。具体来说，函数依赖


    ```

    { S , J } → { T }

    ```


    丢失了（它肯定不是由分解结果中唯一成立的非平凡函数依赖 `{T} → {J}` 所蕴含的）。因此，关系变量 `TJ` 和 `TS` 无法被独立更新。例如，尝试将元组


    ```

    ( Smith , Prof. Brown )

    ```


    插入 `TS` 必须被拒绝，因为 Brown 教授教授物理，而 Smith 已经由 Green 教授教授物理；然而，如果不检查 `TJ`，就无法检测到这个事实。


    总而言之，这个例子表明：在无损分解中，我们通常追求两个目标，即 BCNF 投影和 FD 保留，遗憾的是，这两个目标可能相互冲突。换句话说，并不总是能同时实现两者。


    在本章早期的一个草稿中，我在此时写道：


    *   那么，我们该放弃哪个目标呢？嗯，如果我能告诉你，我会的，但我不能。`SJT` 例子表明，规范化理论尽管重要，但其本身还不够；我的意思是，有些问题它无法回答。所以启示是：*我们需要更多的科学！*
    规范化理论当然是科学的，但它不能解决所有设计问题。


    然而，在一位审稿人的提示下，我得出了结论：上述段落可能言过其实。在这里，我们与其说需要更多的科学，不如说需要更好的实现！也就是说，在类似当前讨论的情况下，容忍一个未达到完全规范化的设计的主要论据，在于当今的数据库管理系统处理像示例中“丢失”的函数依赖这样的多关系变量约束非常笨拙。因此，让我在此明确表示，在存在冲突的情况下，依赖保留很可能是需要放弃的目标。^(⁸³)'
- fmt: '## Another Example


    I suggested at the beginning of the previous section that the SJT example might
    be considered pathological. Now, however, I’m going to claim it’s not, not entirely;
    I’m going to give several more examples that (as far as I’m concerned) demonstrate
    that the issue of FD preservation arises more often than you might think.


    Normalization as commonly perceived is a process of stepping from 1NF to 2NF to
    3NF (etc.) in sequence. Let’s agree to refer to that process as commonly perceived—i.e.,
    stepping from 1NF to 2NF to 3NF (etc.) in sequence—as “the conventional normalization
    procedure.” In this section and the next two, then, I want to present a series
    of examples to demonstrate that the conventional normalization procedure isn’t
    necessarily a good idea if followed too blindly. My first example involves a relvar
    that looks like this:


    ```

    RX1 { SNO , PNO , CITY , STATUS , QTY }

    ```


    The name `RX1` stands for “relvar example 1”; the predicate is *Supplier `SNO`
    is located in city `CITY`, which has status `STATUS`, and supplies part `PNO`
    in quantity `QTY`.* (I ignore supplier names for simplicity.) Let’s assume, reasonably
    enough, that the following FDs hold in this relvar:


    ```

    { SNO }       → { CITY }

    { CITY }      → { STATUS }

    { SNO , PNO } → { QTY }

    ```


    Now, it’s intuitively obvious that the following FDs hold as well, implicitly:^([^(84)](#fn84))


    ```

    { SNO }       → { STATUS }

    { SNO , PNO } → { CITY , STATUS }

    ```


    In fact, the last of these FDs can be expanded to `{SNO,PNO} → H`, where `H` is
    the entire heading; in other words, `{SNO,PNO}` is a key for relvar `RX1`.


    Recall now that a relvar *R* is in 2NF if and only if, for every key *K* and every
    nonkey attribute *A*, the FD *K* → {*A*} is irreducible. Clearly, then, `RX1`
    isn’t in 2NF, because the FD `{SNO,PNO} → {CITY}` is “an FD out of a key” of `RX1`
    but isn’t irreducible; to be specific, it isn’t irreducible because the FD `{SNO}
    → {CITY}` also holds in that relvar. The conventional normalization procedure
    would thus recommend that we decompose the relvar by applying Heath’s Theorem
    to that FD `{SNO} → {CITY}`. But if we do, then this is what we get:


    ```

    RX1A { SNO , CITY }

    KEY { SNO }

    RX1B { SNO , PNO , STATUS , QTY }

    KEY { SNO , PNO }

    ```


    Observe now that the FD `{CITY} → {STATUS}` is lost in this decomposition. So
    one immediate lesson from this example is that the issue of FD preservation can
    be relevant to the step from 1NF to 2NF—not just to the step from 3NF to BCNF,
    which was the step illustrated by the SJT example in the previous section.


    Relvar `RX1A` here is certainly in 2NF. By contrast, relvar `RX1B` isn’t, because
    the FD `{SNO,PNO} → {STATUS}` is reducible. So we can apply Heath’s Theorem again
    to decompose it into its projections on `{SNO,STATUS}` and `{SNO,PNO,QTY}`, both
    of which are in 2NF; however, the damage has already been done, as it were—the
    FD `{CITY} → {STATUS}` has already been lost.


    How can we preserve the FD in this example? One answer is: By decomposing on the
    basis, not of the FD `{SNO} → {CITY}`, but rather of the FD `{SNO} → {CITY,STATUS}`.
    Note carefully, however, that this FD isn’t one of the FDs originally listed explicitly,
    nor is it one of the ones I said were obviously implied by those explicit ones;
    it’s thus unlikely to have been chosen as a basis for decomposition in the conventional
    normalization procedure. Nevertheless, suppose we do choose it and perform the
    corresponding decomposition. Here’s the result:


    ```

    RX1A′ { SNO , CITY , STATUS }

    KEY { SNO }

    RX1B′ { SNO , PNO , QTY }

    KEY { SNO , PNO }

    ```


    In this decomposition, `STATUS` appears in the relvar with key `{SNO}` and not
    the relvar with key `{SNO,PNO}`, and the FD `{CITY} → {STATUS}` is thereby preserved.
    *Note:* Of course, relvar `RX1A′` here is still not in 3NF, so we would probably
    want to decompose it further. Again, however, we need to be a little careful;
    to be specific, we need to decompose on the basis of the FD `{CITY} → {STATUS}`,
    not `{SNO} → {STATUS}`, or we’ll lose an FD again. But `{CITY} → {STATUS}` is
    the FD the conventional normalization procedure would tell us to use, so there
    shouldn’t be a problem here.


    Now, an alternative to the foregoing would be to decompose the original relvar
    `RX1` on the basis of the FD `{CITY} → {STATUS}`, yielding:


    ```

    RX1A′′ { CITY , STATUS }

    KEY { CITY }

    RX1B′′ { SNO , PNO , CITY , QTY }

    KEY { SNO , PNO }

    ```


    This decomposition also preserves the FD `{CITY} → {STATUS}`. Note, however, that
    this FD isn’t the one that caused the original 2NF violation in relvar `RX1` (it
    isn’t “an arrow out of a proper subkey”); again, therefore, it’s quite unlikely
    in practice, if we’re following the conventional normalization procedure, that
    we would have chosen it as a basis for decomposition at this stage. Note also
    that relvar `RX1B′′` here is still not in 3NF, so we would probably want to decompose
    it further. I’ll leave the details of that further decomposition for you to think
    about.


    ## … And Another


    Let’s look at another example. Suppose suppliers are partitioned into classes
    (`C1`, `C2`, etc.), so we have a relvar `RX2` that looks like this (I’ll ignore
    supplier names for simplicity, as I did in the `RX1` example):


    ```

    RX2 { SNO , CLASS , CITY , STATUS }

    KEY { SNO }

    ```


    The predicate is *Supplier `SNO` is in class `CLASS`, is located in city `CITY`,
    and has status `STATUS`.* Suppose also that (a) each class has just one status
    and (b) each city has just one status as well, but that (c) classes and cities
    are otherwise quite independent of each other. Then the following FDs hold:


    ```

    { CLASS } → { STATUS }

    { CITY }  → { STATUS }

    ```


    *Note:* I’m also assuming there’s a business rule in effect that says that, for
    any given supplier, the city status is equal to the class status (that’s why we’re
    able to get away with just one `STATUS` attribute instead of two).^([^(85)](#fn85))


    Recall now that a relvar *R* is in 3NF if and only if, for every nontrivial FD
    *X* → *Y* that holds in *R*, either *X* is a superkey or *Y* is a subkey (or both).
    Clearly, then, `RX2` isn’t in 3NF, because in the FD `{CITY} → {STATUS}`, `{CITY}`
    isn’t a superkey and `{STATUS}` isn’t a subkey. The conventional normalization
    procedure would thus recommend that we decompose the relvar by applying Heath’s
    Theorem to that FD `{CITY} → {STATUS}`. But if we do, this is what we get (two
    projection relvars both in 3NF):


    ```

    RX2A { CITY , STATUS }

    KEY { CITY }

    RX2B { SNO , CLASS , CITY }

    KEY { SNO }

    ```


    Observe now that the FD `{CLASS} → {STATUS}` is lost in this decomposition. (Of
    course, if we had done the decomposition on the basis of that FD instead of the
    FD `{CITY} → {STATUS}`, then this latter FD would have been lost instead.) So
    now we see the issue of FD preservation can also be relevant to the step from
    2NF to 3NF.


    Now, we can preserve the FD in this example by decomposing on the basis of the
    FD `{SNO} → {CLASS,CITY}`—though once again this FD is unlikely to have been chosen
    as a basis for decomposition, since it wasn’t stated explicitly.^([^(86)](#fn86))
    Be that as it may, here’s the result:


    ```

    RX2A′ { CLASS , CITY , STATUS }

    KEY { CLASS , CITY }

    RX2B′ { SNO , CLASS , CITY }

    KEY { SNO }

    ```


    In this decomposition, `{CLASS,CITY}` is a (composite) foreign key in `RX2B′`,
    referencing `RX2A′`. Relvar `RX2B′` is in 3NF. However, relvar `R2XA′` isn’t even
    in 2NF, since the FD `{CLASS,CITY} → {STATUS}` is clearly reducible. So if we
    decide to keep that relvar, the FDs `{CLASS} → {STATUS}` and `{CITY} → {STATUS}`
    will have to be separately stated and enforced.^([^(87)](#fn87)) Alternatively,
    we could decompose the relvar into its projections on `{CLASS,STATUS}` and `{CITY,STATUS}`,
    in which case an appropriate multirelvar constraint will have to be separately
    stated and enforced. *Exercise:* What would that constraint look like?'
