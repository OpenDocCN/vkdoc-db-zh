  trans: '

    现在请注意，前述设计在（常见的？）特定情况下会变得“更加冗余”，即当类型为 `E` 的每个实体实际上都拥有全部 `n` 个属性时。图 17-4 是图 17-3
    的修订版本，说明了这种情况：


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig4_HTML.jpg](img/489629_2_En_17_Fig4_HTML.jpg)


    ##### 图 17-4

    图 17-3 的修订版本


    现在观察——说得宽松一点——`{SNO}` 在每个关系变量中都成了一个外键，引用着其他关系变量中唯一的键 `{SNO}`；等价地说，任何一个关系变量在 `{SNO}`
    上的投影都等于其他任何一个关系变量在 `{SNO}` 上的投影。嗯……为了更精确地表述这一点，四个关系变量之间存在着一个相等性依赖，关联着每一对关系变量：


    ```

    CONSTRAINT ...

    IDENTICAL { S { SNO } , SN { SNO } , ST { SNO } , SC { SNO } } ;

    ```


    `IDENTICAL` 是由休·达文（Hugh Darwen）和我在我们的著作 *Database Explorations: Essays on The
    Third Manifesto and Related Topics* (Trafford, 2010) 及其他地方提出的一个操作符，作为 `Tutorial
    D` 的补充。你可以将它看作一种 `n-`元的“=”操作符。其语义如下：表达式


    `IDENTICAL { rx1 , ... , rxn }`


    如果表达式 `rx1`, ..., `rxn` 所分别表示的 `r1`, ..., `rn` 这些关系全都相等，则返回 TRUE；否则返回 FALSE。


    然而，即使在图 17-4 所示的极端情况下，该设计也没有违反正交性。此外，我再次说明，如果在一个架构良好的 DBMS 中，这类设计将有很多可取之处。特别是，在这样的系统中，相等性依赖以及由此产生的冗余将被“自动”管理和维护（参见后面的“管理冗余”章节）。


    ## 示例 7


    考虑一家公司，其中要求每位员工必须恰好属于一个部门，并且要求每个部门至少有一名员工。图 17-5 展示了针对这种情况的 RM/T 设计的示例值（概要形式）：


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig5_HTML.jpg](img/489629_2_En_17_Fig5_HTML.jpg)


    ##### 图 17-5

    员工与部门─示例值


    顺便问一下，你认为这里的关系变量 `EMPDEPT` 是员工的 P-关系变量，还是部门的，还是两者的？请说明你的理由！（事实上，再深入探讨一下，RM/T 设计在这个例子中可能不是最佳选择，因为
    `EMP` 和 `EMPDEPT` 之间必然存在一一对应关系，似乎没有理由不将这两个关系变量合并为一个。）


    不管怎样，参考图中的示例值，我们看到正好有五名员工和三个部门。既然每位员工必须恰好属于一个部门，而每个部门必须至少有一名员工，那么为什么不定义一个部门——比如说
    `D3`——为“默认”部门，并采用一条规则：任何在 `EMP` 中提到但未出现在 `EMPDEPT` 中的员工都属于该默认部门？根据图 17-4，这条规则将允许我们从
    `EMPDEPT` 中省略元组 `(E4,D3)` 和 `(E5,D3)`。请注意，如果我们不采用这样的规则，那么该设计显然又涉及了一些冗余——具体来说，它受制于以下相等性依赖：


    ```

    CONSTRAINT EVERY_EMP_HAS_A_DEPT EMP { ENO } = EMPDEPT { ENO } ;

    CONSTRAINT EVERY_DEPT_HAS_AN_EMP DEPT { DNO } = EMPDEPT { DNO } ;

    ```


    然而，在我看来，至少有两个因素不利于采用这种“默认部门”设计。首先，选择哪个部门作为默认部门可能是任意的。其次，现在我们需要对关系变量 `EMPDEPT`
    的含义格外小心！显而易见的谓词 *员工 `ENO` 属于部门 `DNO`* 行不通了。为什么不行？因为，在该谓词下（并假设部门 `D3` 是默认部门），省略元组
    `(E5,D3)`，比如说，将意味着——由于 **`封闭世界假设`**——员工 `E5` **不属于** 部门 `D3`！因此，谓词必须是如下形式：


    *   *员工 `ENO` 属于部门 `DNO`（该部门不是默认部门编号 `D3`）。*


    现在，这个谓词确实有效（我认为！），但它相当棘手。假设元组 `(E1,D1)` 出现在关系变量中，如图 17-5 所示。那么相应的命题是：


    *   *员工 `E1` 属于部门 `D1`（该部门不是默认部门编号 `D3`）。*


    当然，这个命题评估为真。目前还好。然而，现在假设关系变量中没有员工 `E5` 的元组。预期的解释当然是员工 `E5` 属于部门 `D3`；但 **`封闭世界假设`**
    实际上是怎么说的呢？首先，注意，例如，特定的元组 `(E5,D1)` 并没有出现。那么，根据 **`封闭世界假设`**，以下必须是一个真命题：


    *   **`并非`** *员工 `E5` 属于部门 `D1`（该部门不是默认部门编号 `D3`）。*


    或者稍微更正式一点：


    ```

    NOT ( E5 属于 D1 AND D1 ≠ D3 )

    ```


    根据德摩根定律，这个表达式等价于：


    ```

    E5 不属于 D1 OR D1 = D3

    ```


    由于 `D1 = D3` 为假，该表达式简化为“`E5` 不属于 `D1`”，这正是我们想要的（我的意思是，这是一个真命题）。


    类似的分析表明，我们可以推断 `E5` 肯定不属于任何非默认部门 `D3` 的部门。但那个默认部门呢？嗯，元组 `(E5,D3)` 没有出现，因此以下必须是一个真命题：


    ```

    NOT ( E5 属于 D3 AND D3 ≠ D3 )

    ```


    等价于：


    ```

    E5 不属于 D3 OR D3 = D3

    ```


    由于 `D3 = D3` 为真，该表达式简化为真（TRUE）。然而，请注意，这个命题为真并不能告诉我们 `E5` **属于** `D3`！现在，也许我们可以推断出后一个事实，给定
    `E5` 确实存在并且肯定不属于任何不等于 `D3` 的部门（？）。但我严重怀疑用户在实践中是否愿意处理如此迂回、抠逻辑细节的论证。


    ## 示例 8


    考虑图 17-6 所示的设计（这是前一章图 16-4 的一个略微修订、有些类 RM/T 的版本）：


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig6_HTML.jpg](img/489629_2_En_17_Fig6_HTML.jpg)


    ##### 图 17-6

    员工与薪资的 RM/T 设计─示例值


    这些关系变量的谓词如下：


    *   `EMP`: *员工 `ENO` 受雇于公司。*

    *   `EARNS`: *员工 `ENO` 拥有薪资 `SALARY`。*

    *   `SALARY_UNK`: *员工 `ENO` 拥有薪资，但我们不知道具体是多少。*

    *   `UNSALARIED`: *员工 `ENO` 没有薪资。*


    现在请注意，关系变量 `SALARY_UNK` 或 `UNSALARIED` 中有一个是冗余的——任何在关系变量 `EMP` 中表示但未在 `EARNS`
    中表示的员工，必须恰好在另外两个关系变量中的一个中表示；因此，我们可以丢弃，比如关系变量 `SALARY_UNK`，而不会造成任何信息丢失。^(²³⁶) 然而，似乎没有任何充分的理由在
    `SALARY_UNK` 和 `UNSALARIED` 中选择一个丢弃，而对称性的考虑会主张保留两者，并忍受这种冗余（？）。


    对称性通常是另一个良好的设计原则。引用波利亚（Polya）的话：^(²³⁷) “尝试对称地处理对称的事物，不要肆意破坏任何自然的对称性。”但示例 8 以及类似的例子——也许也包括示例
    7——表明，对称性和无冗余有时可能是相互冲突的目标。

    '
- fmt: '## Example 9


    This example is due to Hugh Darwen. It’s based on a real life situation that arises
    in connection with the Open University in the U.K. We’re given a relvar that looks
    like this:


    ```

    SCT { SNO , CNO , TNO }

    KEY { SNO , CNO , TNO }

    ```


    The predicate is: *Student `SNO` is enrolled on course `CNO` and is tutored on
    that course by tutor `TNO`* (or, more briefly, *Tutor `TNO` tutors student `SNO`
    on course `CNO`*). Figure [17-7](#489629_2_En_17_Chapter.xhtml#Fig7) shows a sample
    value for this relvar. The redundancies are obvious: For example, the fact that
    student S1 is enrolled on course C1, the fact that course C1 is tutored by tutor
    T1, and the fact that tutor T1 tutors student S1 are all represented more than
    once in the sample value shown in the figure.^([^(238)](#fn238))


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig7_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig7_HTML.jpg)


    Figure 17-7


    Relvar `SCT`─sample value


    Now, one tactic we might consider for reducing redundancy in examples like this
    one is to make use of surrogate keys (surrogates for short).^([^(239)](#fn239))
    For example, we might introduce an attribute `XNO`, say, whose values serve as
    surrogates for (`SNO`,`CNO`) pairs, as illustrated in Figure [17-8](#489629_2_En_17_Chapter.xhtml#Fig8).
    (Observe from that figure that I’ve made {`XNO`} the primary key for relvar `XSC`.
    However, the combination {`SNO`,`CNO`} is a key too, of course.)


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig8_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig8_HTML.jpg)


    Figure 17-8


    *Using surrogates* *for {`SNO`,`CNO`} combinations*


    One difficulty with this approach is as follows: On what basis do we decide to
    use surrogates for {`SNO`,`CNO`} combinations and not for {`CNO`,`TNO`} combinations
    or {`TNO`,`SNO`} combinations? Whichever choice we make is asymmetric. Moreover,
    surrogates are not without problems of their own. Here are some of them:^([^(240)](#fn240))


    *   Surrogates can make updating more complicated (in essence, users have to do
    their own foreign key checking).

    *   To add insult to injury, the system’s foreign key checking—which almost certainly
    still has to be done—(a) will never fail and (b) will therefore be pure overhead.

    *   Queries and updates become longer, more tedious to write, more error prone,
    harder to debug, and harder to maintain.

    *   More integrity constraints become necessary.


    For present purposes, however, the real question is this: Does introducing surrogates
    really serve to reduce redundancy? I don’t want to try to address this question
    here; I’ll come back to it later, in the section “Refining the Definition.”


    ## Example 10


    Another tactic we might consider for reducing redundancy in examples like that
    of Figure [17-7](#489629_2_En_17_Chapter.xhtml#Fig7) is to introduce some relation
    valued attributes or RVAs. Figure [17-9](#489629_2_En_17_Chapter.xhtml#Fig9) gives
    an example.


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig9_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig9_HTML.jpg)


    Figure 17-9


    Using an RVA for tutors


    One obvious problem with this approach—quite apart from all of the usual problems
    that always attend the use of RVAs, of course, as described in Chapter [4](#489629_2_En_4_Chapter.xhtml)—is
    again asymmetry: On what basis do we decide to use an RVA for tutors and not for
    students or courses? And in any case, does this tactic really reduce redundancy?
    Again I’ll come back to this question later, in the section “Refining the Definition.”


    ## Example 11


    This one is just a placemarker. In our book *Time and Relational Theory: Temporal
    Databases in the* *Relational Model and SQL* (Morgan Kaufmann, 2014), Hugh Darwen,
    Nikos Lorentzos, and I show that certain “new” kinds of redundancy can arise in
    connection with temporal data, and we propose a number of new design principles
    and techniques for dealing with them.^([^(241)](#fn241))


    ## Example 12


    My last example is typical of a common practical situation. It’s loosely based
    on an example in Fabian Pascal’s book *Practical Issues in Database Management:
    A Reference for the Thinking Practitioner* (Addison-Wesley, 2000). We’re given
    two relvars that look like this (and I assume until further notice that they’re
    base relvars specifically):


    ```

    PAYMENTS { CUSTNO , DATE , AMOUNT }

    KEY { CUSTNO , DATE }

    TOTALS { CUSTNO , TOTAL }

    KEY { CUSTNO }

    ```


    Attribute `TOTAL` in relvar `TOTALS` is an example of what’s often called *derived
    data*; its value for any given customer is derived by summing all of the payments
    for the customer in question. In fact, the following equality dependency holds^([^(242)](#fn242))
    (and note that for once I’ve given the constraint a name, viz., `C12`, because
    I’m going to want to refer to it later):


    ```

    CONSTRAINT C12 TOTALS = SUMMARIZE PAYMENTS BY { CUSTNO } :

    { TOTAL := SUM ( AMOUNT ) } ;

    ```


    *Note:* `SUMMARIZE` is `Tutorial D`’s analog of SQL’s `SELECT` with a `GROUP BY`
    (speaking *very* loosely!) .^([^(243)](#fn243)) However, in case you feel more
    comfortable with SQL than `Tutorial D`, let me also give an SQL version of the
    foregoing:


    ```

    CREATE ASSERTION C12 CHECK

    ( NOT EXISTS

    ( SELECT ∗

    FROM   TOTALS

    WHERE  NOT EXISTS

    ( SELECT ∗

    FROM ( SELECT CUSTNO , SUM ( AMT ) AS TOTAL

    FROM   PAYMENTS

    GROUP  BY CUSTNO ) AS TEMP1

    WHERE  TOTALS.CUSTNO = TEMP1.CUSTNO ) )

    AND

    NOT EXISTS

    ( SELECT ∗

    FROM ( SELECT CUSTNO , SUM ( AMT ) AS TOTAL

    FROM   PAYMENTS

    GROUP  BY CUSTNO ) AS TEMP2

    WHERE  NOT EXISTS

    ( SELECT ∗

    FROM   TOTALS

    WHERE  TOTALS.CUSTNO = TEMP2.CUSTNO ) ) ) ;

    ```


    Now, derived data is redundant by definition—though once again there are no violations
    of either normalization or orthogonality in the example (in particular, relvars
    `PAYMENTS` and `TOTALS` are both in 6NF). I’ll analyze this example in more detail
    in the section immediately following.


    ## Managing Redundancy


    The fact that the design of Example 12 from the previous section is redundant
    is clearly shown by the fact that the specified equality dependency holds (Constraint
    `C12`). And there are, at least in principle, four basic approaches to dealing
    with the kind of redundancy illustrated by that example:


    1.  Raw design only

    2.  Declare the constraint

    3.  Use a view

    4.  Use a snapshot


    Let’s take a closer look.


    ### 1. Raw Design Only


    This is perhaps the approach most likely to be encountered in practice, given
    the limited functionality provided by most of today’s DBMSs. The idea is simply
    that:


    1.  Relvars `PAYMENTS` and `TOTALS` are defined exactly as shown in the previous
    section.

    2.  Constraint `C12` is *not* declared to the DBMS.

    3.  Maintaining the derived data is 100% the user’s responsibility. (Or some user’s
    responsibility, at any rate; the maintenance might be done by means of a triggered
    procedure, but some user still has to write the code for that procedure.)^([^(244)](#fn244))


    In effect, this approach trades off (a) the extra work involved on the part of
    the user—or some user, at any rate—in executing certain updates (as well as the
    associated performance hit) against (b) the improved performance obtained when
    executing certain queries. But there are no guarantees; if the user makes a mistake
    during some update that (in effect) causes Constraint `C12` to be violated, well,
    tough.


    ### 2. Declare the Constraint


    In this approach Constraint `C12` is explicitly declared to the DBMS and the DBMS
    takes the responsibility for enforcing it. Maintaining the derived data is still
    the user’s responsibility, though, exactly as it was under the previous approach.
    What’s more, if the user carries out this task reliably and correctly, the constraint
    checking will never fail, and it will thus, in effect, constitute pure overhead
    on the user’s updates. But we can’t dispense with the constraint, precisely because
    we do need the system to check that the user *is* carrying out the maintenance
    task reliably and correctly.'
