  trans: '

    ## 具有两个或更多键的关系变量


    现在，让我们来看一些具有两个或更多键的关系变量的合理实际例子。第一个例子是关系变量 `EXAM`，它具有属性 `S`（学生）、`J`（科目）和 `P`（名次），其谓词是*学生
    S 参加了科目 J 的考试，并在班级排名中获得第 P 名*。为了这个例子，我们假设没有并列名次（即，没有两名学生在同一科目中获得相同的名次）。那么，很明显，给定一个学生和科目，就有一个唯一对应的名次；同样，给定一个科目和名次，就有一个唯一对应的学生。因此，函数依赖
    `{S,J} → {P}` 和 `{J,P} → {S}` 都成立，并且 `{S,J}` 和 `{J,P}` 都是键（或者，如果你愿意，都是候选键）：


    ```

    EXAM { S , J , P }

    KEY { S , J }

    KEY { J , P }

    ```


    *练习：* 这个关系变量属于哪种范式？


    这是另一个例子（它基本上是第 14 章的练习 14.3）：我们有一个表示婚姻的关系变量，具有属性 `A`、`B` 和 `C`，其谓词是*人物 A 在日期 C
    与人物 B 结婚*。假设没有一夫多妻制，并且也假设没有两个人彼此结婚超过一次，那么这里的每一对属性都是一个键：


    ```

    MARRIAGE { A , B , C }

    KEY { A , B }

    KEY { B , C }

    KEY { C , A }

    ```


    这是又一个例子，基于一个简单的航空公司应用（其谓词是*飞行员 `PILOT` 在日期 `DAY` 的小时 `HOUR` 从登机口 `GATE` 驾驶航班出发*）：


    ```

    ROSTER { DAY , HOUR , GATE , PILOT }

    KEY { DAY , HOUR , GATE }

    KEY { DAY , HOUR , PILOT }

    ```


    在上述情况下，我们如何选择主键？有什么理由选择一个键而不是另一个？Codd 的“简单性”标准似乎没什么帮助。还要注意，无论我们选择哪一个，最终都会导致一种令人不快的不对称性；例如，在婚姻的例子中，我们可能会发现自己将一位配偶视为“比另一位更平等”（从而肯定会冒犯某人）。为什么我们被迫引入这种不对称性？不对称通常不是个好主意。这里再次引用第
    17 章中引用的波利亚的话：“尝试对称地处理对称的事物，不要肆意破坏任何自然的对称性。”


    现在，在上述所有例子中，键不仅是复合的，而且它们都相互重叠（即，它们有一个共同的属性）。为了防止人们认为只有在键重叠时选择主键才会有困难，因此，让我给出一个反例。假设我们有一个代表元素周期表（即化学元素表）的关系变量
    `ELEMENT`。那么每个元素都有一个唯一的名称（例如，铅）、一个唯一的符号（例如，铅的符号是 `Pb`）和一个唯一的原子序数（例如，铅的原子序数是 82）。该关系变量因此显然有三个不同的键，它们都是简单的（即，每个键只涉及一个属性），并且显然没有任何重叠。我们基于什么理由从这三个键中选择一个作为主键？在我看来，根据具体情况，为其中任何一个键辩护都有充分的理由。


    这是另一个熟悉（也许过于熟悉）的具有多个键的关系变量的例子，所有这些键都是简单的：


    ```

    TAX_BRACKET { LOW , HIGH , RATE }

    KEY { LOW }

    KEY { HIGH }

    KEY { RATE }

    ```


    当然，我在这里假设没有两个应税收入范围（`LOW` 到 `HIGH`）适用相同的税率。*注意：* 我在第 14 章中建议，税级可能更适合表示为单个区间值属性（比如
    `RANGE`），而不是分开的 `LOW` 和 `HIGH` 属性。然而，即使那样表示，仍然会有两个不重叠的键，`RANGE` 和 `RATE`。


    我可以给出更多的例子，但到现在我的观点应该很清楚了：不仅在有选择的情况下，没有正式标准来选择一个键而不是另一个键，而且有时似乎连非正式的标准都没有。因此，即使坚持必须始终做出这样的选择在某些情况下（也许在大多数情况下）是合适的，但似乎并不合适。


    还有一点需要提及，这是我迄今为止提出的大多数论点中更为正式的一点。在过去的 50 年里，关于依赖理论和进一步规范化、视图更新、优化（特别是语义优化）以及许多其他问题已经进行了大量研究。在所有这些研究中，起关键作用的是候选键，而不是主键。（事实上，它必须如此，正是因为所讨论的研究是形式化的。候选键概念是形式化定义的。主键概念则不是。）既然如此，似乎真的不适合在*形式上*坚持
    `PK:AK` 的区分——尽管，重申一遍，在*非正式*层面上推荐它可能是合适的。


    我想提出的另一点是，`PK:AK` 的区分似乎导致了基础关系变量与其他关系变量之间一种不合意且不必要的区别（至少根据 Codd 的说法）。这是因为，根据 Codd
    的说法，关系模型：


    *   *要求*基础关系变量必须有主键；

    *   *允许*但不要求视图和快照具有主键；并且

    *   认为对于任何其他关系变量，“主键的声明或推导是*完全不必要*的”（原文为斜体）。


    这些陈述转述（但只是略微转述）自 Codd 说选择主键没有正式基础的那篇论文。事实上，该论文甚至暗示，基础关系变量之外的关系变量可能根本不具备主键，如果这一暗示是真的，那肯定会对这个概念本身提出严重的疑问（记住*可互换性原理*）。尽管如此，我在这些问题上的立场则相当不同。具体来说，我认为：


    *   首先，每个关系变量，无论是基础的还是派生的，都至少有一个键（因为，当然，没有关系，更不用说关系变量，会允许重复元组）。

    *   其次，每个基础关系变量必须至少显式声明一个键。当然，最好所有这样的键都能显式声明。（事实上，一个未显式声明的基础关系变量键，就系统——或者就此而言，关系模型本身——而言，根本就不是一个键。）

    *   通常，一个基础关系变量会特别有一个显式声明的主键，但我不坚持将这种状态作为硬性要求。

    *   基于在《SQL 与关系理论》中详细解释的原因，我相信系统应该能够推导派生关系变量的键。

    *   尽管有前一点，我相信也应该可以为派生关系变量（特别是视图和快照）显式声明键。同样，请参阅《SQL 与关系理论》以获取进一步讨论。

    '
- fmt: '## The Invoices and Shipments Example


    I now turn my attention to a more elaborate example. The example (which is based
    on a real world application) concerns invoices and shipments, and there’s a one
    to one relationship between these two entity types: Each shipment has exactly
    one invoice, each invoice has exactly one shipment. Here then is the “obvious”
    database design (for the sake of the example, I use a hypothetical syntax that
    explicitly distinguishes between primary and alternate keys):^([^(280)](#fn280))


    ```

    INVOICE  { INVNO , SHIPNO , INV_DETAILS }

    PRIMARY KEY { INVNO }

    ALTERNATE KEY { SHIPNO }

    FOREIGN KEY { SHIPNO } REFERENCES SHIPMENT

    SHIPMENT { SHIPNO , INVNO , SHIP_DETAILS }

    PRIMARY KEY { SHIPNO }

    ALTERNATE KEY { INVNO }

    FOREIGN KEY { INVNO } REFERENCES INVOICE

    ```


    So the database structure is as shown in Figure [C-1](#489629_2_En_20_Chapter.xhtml#Fig1)
    (note that the arrows in that figure, in contrast to arrows in figures elsewhere
    in this book, represent foreign key references, not functional dependencies):


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig1_HTML.jpg](images/489629_2_En_20_Chapter/489629_2_En_20_Fig1_HTML.jpg)


    Figure C-1


    The invoices-and-shipments database


    Now, each relvar in this example actually has two keys, `{`INVNO`}` and `{`SHIPNO`}`.
    However, I assume we can agree for the sake of argument that the “natural” primary
    key for `INVOICE` is `{`INVNO`}` and the “natural” primary key for `SHIPMENT`
    is `{`SHIPNO`}`; then `{`SHIPNO`}` in `INVOICE` and `{`INVNO`}` in `SHIPMENT`
    are alternate keys. Furthermore, of course, each of those alternate keys is also
    a foreign key (as Figure [C-1](#489629_2_En_20_Chapter.xhtml#Fig1) indicates),
    referring to the primary key of the other relvar.


    One problem with the foregoing design is as follows. Clearly, the database is
    subject to the constraint—actually it’s an equality dependency, and I’ll call
    it `Constraint CIS`—that if the `INVOICE` relvar shows invoice `i` as corresponding
    to shipment `s`, then the `SHIPMENT` relvar must show shipment `s` as corresponding
    to invoice `i` (and vice versa):^([^(281)](#fn281))


    ```

    CONSTRAINT CIS

    INVOICE { INVNO , SHIPNO } = SHIPMENT { INVNO , SHIPNO } ;

    ```


    In other words, the tuple `(`i`,`s`,...)` appears in `INVOICE` if and only if
    the tuple `(`s`,`i`,...)` appears in `SHIPMENT`. But the design illustrated in
    Figure [C-1](#489629_2_En_20_Chapter.xhtml#Fig1) doesn’t capture or enforce this
    constraint (for example, the configuration of values shown in Figure [C-2](#489629_2_En_20_Chapter.xhtml#Fig2)
    is permitted by that design and yet violates the constraint). The constraint thus
    needs to be separately stated (as above) and separately enforced.


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig2_HTML.jpg](images/489629_2_En_20_Chapter/489629_2_En_20_Fig2_HTML.jpg)


    Figure C-2


    “Legal” `INVOICE` and `SHIPMENT` values that violate constraint `CIS`


    It might be thought that if we pretended the primary key for each relvar was the
    *combination* `{`INVNO`,`SHIPNO`}`, and if we further defined each of those fake
    “primary keys” to be a foreign key referencing the other, then `Constraint CIS`
    would be taken care of automatically. (In fact, I’ve actually seen such a subterfuge
    explicitly recommended, by people who really ought to know better.) But the relational
    model requires primary keys—in fact, keys in general—to be irreducible, meaning
    they mustn’t contain any attributes that are irrelevant for unique identification
    purposes (and there are good reasons for that requirement, too, as we know from
    Chapter [4](#489629_2_En_4_Chapter.xhtml)). In other words, `{`INVNO`,`SHIPNO`}`
    just *isn’t* a key (and so it certainly can’t be the primary key) for either relvar,
    and we’d be lying if we told the system otherwise. Indeed, if `{`INVNO`,`SHIPNO`}`
    were truly a key, then the relationship between invoices and shipments would be
    many to many, which it isn’t.


    Precisely because `Constraint CIS` holds, the design of Figure [C-1](#489629_2_En_20_Chapter.xhtml#Fig1)
    clearly involves some redundancy: Every pair of `{`INVNO`,`SHIPNO`}` values appearing
    in either relvar also necessarily appears in the other. Now, we could avoid that
    redundancy by combining the two relvars into one (`INV_SHIP`), as follows:


    ```

    INV_SHIP { INVNO , SHIPNO , INV_DETAILS , SHIP_DETAILS }

    PRIMARY KEY { INVNO }

    ALTERNATE KEY { SHIPNO }

    ```


    By eliminating the redundancy in this way, we’ve also eliminated the need to state
    and enforce `Constraint CIS`. Furthermore, we could now define the original `INVOICE`
    and `SHIPMENT` relvars as views—specifically, projection views—of `INV_SHIP`,
    thus allowing the user still to regard invoices and shipments as distinct entities.^([^(282)](#fn282))
    This revised design thus does enjoy certain advantages over the “obvious” version.


    On the other hand, there are some disadvantages too. Observe first that we’ve
    had to make an asymmetric decision once again, choosing `{`INVNO`}` over `{`SHIPNO`}`—arbitrarily—as
    the primary key for relvar `INV_SHIP`.^([^(283)](#fn283)) Second, suppose further
    that shipments have certain subsidiary information that invoices don’t; e.g.,
    suppose shipments are containerized, each shipment involving several containers.
    Then a new `CONTAINER` relvar is needed:


    ```

    CONTAINER { CONTNO , SHIPNO , ... }

    PRIMARY KEY { CONTNO }

    FOREIGN KEY { SHIPNO } REFERENCES INV_SHIP { SHIPNO }

    ```


    And now we have a foreign key referencing an alternate key!—which the relational
    model as originally defined explicitly prohibits, as we know.


    Now, can we avoid this apparent violation of the prescriptions of the original
    model? Well, of course, the answer is *yes*. There are various ways in which this
    might be done:


    1.  We could go back to the two-relvar design (thereby reintroducing the data
    redundancy and the need for the additional constraint, however).

    2.  We could replace `SHIPNO` by `INVNO` in the `CONTAINER` relvar. However, this
    approach seems very artificial (containers have nothing to do with invoices per
    se), and moreover introduces an unpleasant level of indirection into the design
    (the shipment for a given container would be accessible only via the corresponding
    invoice).

    3.  We could leave the `CONTAINER` relvar as it is, but replace the foreign key
    specification by an explicit declaration to the effect that every `SHIPNO` value
    in `CONTAINER` must also appear in `INV_SHIP` (using a language like SQL or **Tutorial
    D** that permits the definition of arbitrarily complex constraints). But it does
    seem a pity to have to deal with a constraint that’s so similar to a “true” foreign
    key constraint in such a roundabout manner; indeed, it could be argued that the
    effect is again to introduce an undesirable asymmetry, foreign keys that reference
    primary keys being treated in one manner and “foreign keys” that reference alternate
    keys being treated in quite another.

    4.  We could introduce a surrogate primary key (`{`ISNO`}`, say) for `INV_SHIP`,
    and use that as the foreign key in the `CONTAINER` table—which would still involve
    a level of indirection, as in paragraph 2 above, but would at least reintroduce
    the symmetry that was lost when we arbitrarily chose `{`INVNO`}` as the primary
    key for `INV_SHIP`.'
  raw: '## The Invoices and Shipments Example


    I now turn my attention to a more elaborate example. The example (which is based
    on a real world application) concerns invoices and shipments, and there’s a one
    to one relationship between these two entity types: Each shipment has exactly
    one invoice, each invoice has exactly one shipment. Here then is the “obvious”
    database design (for the sake of the example, I use a hypothetical syntax that
    explicitly distinguishes between primary and alternate keys):^([^(280)](#fn280))


    ```

    INVOICE  { INVNO , SHIPNO , INV_DETAILS }

    PRIMARY KEY { INVNO }

    ALTERNATE KEY { SHIPNO }

    FOREIGN KEY { SHIPNO } REFERENCES SHIPMENT

    SHIPMENT { SHIPNO , INVNO , SHIP_DETAILS }

    PRIMARY KEY { SHIPNO }

    ALTERNATE KEY { INVNO }

    FOREIGN KEY { INVNO } REFERENCES INVOICE

    ```


    So the database structure is as shown in Figure [C-1](#489629_2_En_20_Chapter.xhtml#Fig1)
    (note that the arrows in that figure, in contrast to arrows in figures elsewhere
    in this book, represent foreign key references, not functional dependencies):


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig1_HTML.jpg](images/489629_2_En_20_Chapter/489629_2_En_20_Fig1_HTML.jpg)


    Figure C-1


    The invoices-and-shipments database


    Now, each relvar in this example actually has two keys, {INVNO} and {SHIPNO}.
    However, I assume we can agree for the sake of argument that the “natural” primary
    key for INVOICE is {INVNO} and the “natural” primary key for SHIPMENT is {SHIPNO};
    then {SHIPNO} in INVOICE and {INVNO} in SHIPMENT are alternate keys. Furthermore,
    of course, each of those alternate keys is also a foreign key (as Figure [C-1](#489629_2_En_20_Chapter.xhtml#Fig1)
    indicates), referring to the primary key of the other relvar.


    One problem with the foregoing design is as follows. Clearly, the database is
    subject to the constraint—actually it’s an equality dependency, and I’ll call
    it Constraint CIS—that if the INVOICE relvar shows invoice *i* as corresponding
    to shipment *s*, then the SHIPMENT relvar must show shipment *s* as corresponding
    to invoice *i* (and vice versa):^([^(281)](#fn281))


    ```

    CONSTRAINT CIS

    INVOICE { INVNO , SHIPNO } = SHIPMENT { INVNO , SHIPNO } ;

    ```


    In other words, the tuple (*i*,*s*,...) appears in INVOICE if and only if the
    tuple (*s*,*i*,...) appears in SHIPMENT. But the design illustrated in Figure
    [C-1](#489629_2_En_20_Chapter.xhtml#Fig1) doesn’t capture or enforce this constraint
    (for example, the configuration of values shown in Figure [C-2](#489629_2_En_20_Chapter.xhtml#Fig2)
    is permitted by that design and yet violates the constraint). The constraint thus
    needs to be separately stated (as above) and separately enforced.


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig2_HTML.jpg](images/489629_2_En_20_Chapter/489629_2_En_20_Fig2_HTML.jpg)


    Figure C-2


    “Legal” INVOICE and SHIPMENT values that violate constraint CIS


    It might be thought that if we pretended the primary key for each relvar was the
    *combination* {INVNO,SHIPNO}, and if we further defined each of those fake “primary
    keys” to be a foreign key referencing the other, then Constraint CIS would be
    taken care of automatically. (In fact, I’ve actually seen such a subterfuge explicitly
    recommended, by people who really ought to know better.) But the relational model
    requires primary keys—in fact, keys in general—to be irreducible, meaning they
    mustn’t contain any attributes that are irrelevant for unique identification purposes
    (and there are good reasons for that requirement, too, as we know from Chapter
    [4](#489629_2_En_4_Chapter.xhtml)). In other words, {INVNO,SHIPNO} just *isn’t*
    a key (and so it certainly can’t be the primary key) for either relvar, and we’d
    be lying if we told the system otherwise. Indeed, if {INVNO,SHIPNO} were truly
    a key, then the relationship between invoices and shipments would be many to many,
    which it isn’t.


    Precisely because Constraint CIS holds, the design of Figure [C-1](#489629_2_En_20_Chapter.xhtml#Fig1)
    clearly involves some redundancy: Every pair of {INVNO,SHIPNO} values appearing
    in either relvar also necessarily appears in the other. Now, we could avoid that
    redundancy by combining the two relvars into one (“INV_SHIP”), as follows:


    ```

    INV_SHIP { INVNO , SHIPNO , INV_DETAILS , SHIP_DETAILS }

    PRIMARY KEY { INVNO }

    ALTERNATE KEY { SHIPNO }

    ```


    By eliminating the redundancy in this way, we’ve also eliminated the need to state
    and enforce Constraint CIS. Furthermore, we could now define the original INVOICE
    and SHIPMENT relvars as views—specifically, projection views—of INV_SHIP, thus
    allowing the user still to regard invoices and shipments as distinct entities.^([^(282)](#fn282))
    This revised design thus does enjoy certain advantages over the “obvious” version.


    On the other hand, there are some disadvantages too. Observe first that we’ve
    had to make an asymmetric decision once again, choosing {INVNO} over {SHIPNO}—arbitrarily—as
    the primary key for relvar INV_SHIP.^([^(283)](#fn283)) Second, suppose further
    that shipments have certain subsidiary information that invoices don’t; e.g.,
    suppose shipments are containerized, each shipment involving several containers.
    Then a new CONTAINER relvar is needed:


    ```

    CONTAINER { CONTNO , SHIPNO , ... }

    PRIMARY KEY { CONTNO }

    FOREIGN KEY { SHIPNO } REFERENCES INV_SHIP { SHIPNO }

    ```


    And now we have a foreign key referencing an alternate key!—which the relational
    model as originally defined explicitly prohibits, as we know.


    Now, can we avoid this apparent violation of the prescriptions of the original
    model? Well, of course, the answer is *yes*. There are various ways in which this
    might be done:


    1.  We could go back to the two-relvar design (thereby reintroducing the data
    redundancy and the need for the additional constraint, however).


    2.  We could replace SHIPNO by INVNO in the CONTAINER relvar. However, this approach
    seems very artificial (containers have nothing to do with invoices per se), and
    moreover introduces an unpleasant level of indirection into the design (the shipment
    for a given container would be accessible only via the corresponding invoice).


    3.  We could leave the CONTAINER relvar as it is, but replace the foreign key
    specification by an explicit declaration to the effect that every SHIPNO value
    in CONTAINER must also appear in INV_SHIP (using a language like SQL or **Tutorial
    D** that permits the definition of arbitrarily complex constraints). But it does
    seem a pity to have to deal with a constraint that’s so similar to a “true” foreign
    key constraint in such a roundabout manner; indeed, it could be argued that the
    effect is again to introduce an undesirable asymmetry, foreign keys that reference
    primary keys being treated in one manner and “foreign keys” that reference alternate
    keys being treated in quite another.


    4.  We could introduce a surrogate primary key ({ISNO}, say) for INV_SHIP, and
    use that as the foreign key in the CONTAINER table—which would still involve a
    level of indirection, as in paragraph 2 above, but would at least reintroduce
    the symmetry that was lost when we arbitrarily chose {INVNO} as the primary key
    for INV_SHIP.'
  trans: '## 发票与发货单示例


    现在，我将关注一个更详尽的示例。该示例（基于一个真实世界的应用）涉及发票和发货单，并且这两种实体类型之间存在一对一的关系：每个发货单恰好对应一张发票，每张发票恰好对应一个发货单。以下便是“显而易见”的数据库设计（为示例清晰起见，我使用了一种假设的语法，以明确区分主键和候选键）：[²⁸⁰]


    ```

    INVOICE  { INVNO , SHIPNO , INV_DETAILS }

    PRIMARY KEY { INVNO }

    ALTERNATE KEY { SHIPNO }

    FOREIGN KEY { SHIPNO } REFERENCES SHIPMENT

    SHIPMENT { SHIPNO , INVNO , SHIP_DETAILS }

    PRIMARY KEY { SHIPNO }

    ALTERNATE KEY { INVNO }

    FOREIGN KEY { INVNO } REFERENCES INVOICE

    ```


    因此，数据库结构如图 C-1 所示（请注意，与本书其他图中的箭头不同，该图中的箭头表示外键引用，而非函数依赖）：


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig1_HTML.jpg](img/489629_2_En_20_Fig1_HTML.jpg)


    图 C-1


    发票与发货单数据库


    现在，在这个示例中，每个关系变量实际上都有两个键：`{`INVNO`}` 和 `{`SHIPNO`}`。然而，为了论证方便，我假设我们可以达成共识：`INVOICE`
    的“自然”主键是 `{`INVNO`}`，而 `SHIPMENT` 的“自然”主键是 `{`SHIPNO`}`；那么，`INVOICE` 中的 `{`SHIPNO`}`
    和 `SHIPMENT` 中的 `{`INVNO`}` 就是候选键。此外，当然，这些候选键中的每一个也是一个外键（如图 C-1 所示），引用了另一个关系变量的主键。


    上述设计存在一个问题，如下所述。显然，数据库需要满足一个约束——实际上，这是一个相等依赖，我将其称为 `Constraint CIS`——即，如果 `INVOICE`
    关系变量显示发票 `i` 对应发货单 `s`，那么 `SHIPMENT` 关系变量必须显示发货单 `s` 对应发票 `i`（反之亦然）：[²⁸¹]


    ```

    CONSTRAINT CIS

    INVOICE { INVNO , SHIPNO } = SHIPMENT { INVNO , SHIPNO } ;

    ```


    换言之，元组 `(`i`,`s`,...)` 出现在 `INVOICE` 中，当且仅当元组 `(`s`,`i`,...)` 出现在 `SHIPMENT` 中。但是，图
    C-1 所示的设计并未捕获或强制执行此约束（例如，图 C-2 所示的值配置被该设计所允许，但却违反了该约束）。因此，该约束需要被单独陈述（如上所述）并被单独强制执行。


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig2_HTML.jpg](img/489629_2_En_20_Fig2_HTML.jpg)


    图 C-2


    违反 `CIS` 约束的“合法” `INVOICE` 和 `SHIPMENT` 值


    或许有人会想，如果我们假装每个关系变量的主键是 *组合* `{`INVNO`,`SHIPNO`}`，并且进一步将这些伪造的“主键”定义为引用另一个关系变量的外键，那么
    `Constraint CIS` 就会自动得到处理。（事实上，我确实见过有人明确推荐这种权宜之计，而这些人本应更了解情况。）但是，关系模型要求主键——实际上是所有键——必须是不可约的，这意味着它们不能包含任何对唯一标识目的无关的属性（正如我们从第
    4 章所知，这个要求有其充分的理由）。换言之，`{`INVNO`,`SHIPNO`}` 对于任何一个关系变量来说都 *不是* 一个键（因此它当然也不能是主键），如果我们告诉系统并非如此，那就是在撒谎。事实上，如果
    `{`INVNO`,`SHIPNO`}` 真的是一个键，那么发票和发货单之间的关系将是多对多的，而实际上并非如此。


    正因为 `Constraint CIS` 成立，图 C-1 的设计显然涉及一些冗余：出现在任一关系变量中的每一对 `{`INVNO`,`SHIPNO`}`
    值也必然出现在另一个关系变量中。现在，我们可以通过将两个关系变量合并为一个（`INV_SHIP`）来避免这种冗余，如下所示：


    ```

    INV_SHIP { INVNO , SHIPNO , INV_DETAILS , SHIP_DETAILS }

    PRIMARY KEY { INVNO }

    ALTERNATE KEY { SHIPNO }

    ```


    通过这种方式消除冗余，我们也消除了陈述和强制执行 `Constraint CIS` 的需要。此外，我们现在可以将原始的 `INVOICE` 和 `SHIPMENT`
    关系变量定义为 `INV_SHIP` 的视图——具体来说，是投影视图——从而让用户仍然可以将发票和发货单视为不同的实体。[²⁸²] 因此，这个修订后的设计确实比“显而易见”的版本享有某些优势。


    另一方面，它也存在一些缺点。首先请注意，我们不得不再次做出非对称的决定，任意选择 `{`INVNO`}` 而非 `{`SHIPNO`}` 作为关系变量 `INV_SHIP`
    的主键。[²⁸³] 其次，进一步假设发货单具有一些发票所没有的附属信息；例如，假设货物是集装箱运输的，每个发货单涉及多个集装箱。那么就需要一个新的 `CONTAINER`
    关系变量：


    ```

    CONTAINER { CONTNO , SHIPNO , ... }

    PRIMARY KEY { CONTNO }

    FOREIGN KEY { SHIPNO } REFERENCES INV_SHIP { SHIPNO }

    ```


    而现在我们有了一个引用候选键的外键！——正如我们所知，原始定义的关系模型明确禁止这种情况。


    那么，我们能否避免这种表面上的违背原始模型规定的情况呢？答案当然是 *肯定的*。可以通过多种方式来实现：


    1.  我们可以回到两个关系变量的设计（尽管这会重新引入数据冗余和对额外约束的需求）。

    2.  我们可以在 `CONTAINER` 关系变量中用 `INVNO` 替换 `SHIPNO`。然而，这种方法似乎非常不自然（集装箱本身与发票无关），而且会在设计中引入令人不快的间接层（对于给定的集装箱，只能通过相应的发票访问其所属的发货单）。

    3.  我们可以让 `CONTAINER` 关系变量保持原样，但将外键规范替换为一个显式声明，以表明 `CONTAINER` 中的每个 `SHIPNO` 值也必须出现在
    `INV_SHIP` 中（使用像 SQL 或 **Tutorial D** 这样允许定义任意复杂约束的语言）。但是，必须以如此迂回的方式处理一个与“真正的”外键约束如此相似的约束，确实令人遗憾；事实上，可以认为其效果同样是引入了不良的非对称性，即引用主键的外键以一种方式处理，而引用候选键的“外键”则以完全不同的方式处理。

    4.  我们可以为 `INV_SHIP` 引入一个代理主键（例如 `{`ISNO`}`），并在 `CONTAINER` 表中使用它作为外键——这仍然会像上面第
    2 点那样引入间接层，但至少会重新引入当我们任意选择 `{`INVNO`}` 作为 `INV_SHIP` 的主键时所丢失的对称性。


    [²⁸⁰]: 这里的语法是假设的，纯粹是为了明确区分主键和候选键。

    [²⁸¹]: 严格来说，约束 `CIS` 是一个更通用的约束（相等依赖）的特例。详细讨论见正文。

    [²⁸²]: 这里假设所使用的语言支持对视图进行更新。如果视图可更新，则用户可能（例如）通过 `INVOICE` 视图插入一行，而 DBMS 则会在底层的
    `INV_SHIP` 关系变量中实现相应的插入操作。

    [²⁸³]: 有人可能会问，为什么我们不选择 `{`SHIPNO`}` 作为主键呢？答案是，这确实是一个任意的选择；不过，一旦做出了选择（无论选择哪一个），它就固定下来了，这体现了该设计的非对称性。'
- fmt: 'To summarize: None of these four "workaround" approaches seems totally satisfactory.
    The example thus seems to show that—if we wish to avoid redundancy and arbitrariness
    and artificiality and asymmetry and indirectness—then we need to be able to treat
    primary and alternate keys as equals, and we need to be able to have foreign keys
    that reference alternate keys. In other words, we need to ignore the differences
    between primary and alternate keys, and simply consider them all as just keys.
    Please note carefully, however, that I''m `not` saying the apparent need in this
    example to violate certain precepts of the original relational model can''t be
    avoided; what I''m saying is I don''t see a good way to avoid it, nor a good reason
    for adopting a bad way. I would therefore like to suggest that the precepts in
    question be treated as strong (?) guidelines but not as inviolable rules.


    ## One Primary Key per Entity Type?


    I turn now to the second of the two issues mentioned in the introduction to this
    appendix: viz., that entities of a given type are supposed to be identified in
    exactly the same way everywhere in the database. What this means, loosely speaking,
    is that there''ll typically be:


    *   A single "anchor" relvar for the pertinent entity type, having some particular
    primary key, together with

    *   Zero or more subsidiary relvars giving further information about entities
    of that type, each having a foreign key that refers back to the primary key of
    that anchor relvar.


    (Does this state of affairs remind you of the `RM/T` design discipline discussed
    in Chapter [17](#489629_2_En_17_Chapter.xhtml)?) But several obvious questions
    arise:


    *   Might there not be good reasons to have more than one anchor relvar for a
    given entity type, perhaps corresponding to different "roles"—see the discussion
    of applicants and employees in the next section—for that entity type?

    *   If there are several such anchor relvars, might there not be good reasons
    to have different primary keys in different anchor relvars—thus implying that
    the same entity might be identified in different ways in different contexts?

    *   Hence, might there not be good reasons to have different foreign keys in different
    relvars that, again, identify the same entity in different ways in different contexts?

    *   Finally, might there not even be good reasons to have several distinct identifiers,
    all of equal weight, for the same entity in the *same* relvar?


    We''ve already seen several examples in this appendix (in the section "Relvars
    with More than One Key") in which the answer to the last of these questions is
    clearly `yes`. In order to examine the other questions, let''s consider another
    example.


    ## The Applicants and Employees Example


    This example (which, like the invoices and shipments example, is based on a real
    world application) concerns applicants for jobs in a certain enterprise. Relvar
    `APPLICANT` is used to keep a record of such applicants:


    ```

    APPLICANT { ANO , NAME , ADDR , ... }

    PRIMARY KEY { ANO }

    ```


    The applicant number (`ANO`) is assigned at the time the applicant applies for
    the job; it''s unique to the applicant, and `{ANO}` thus constitutes the obvious
    primary key (in fact, it''s the only key).


    Next, several further relvars are used to keep subsidiary applicant information
    (previous jobs held, list of references, list of dependants, etc.). I consider
    just one of these here, the "previous jobs held" relvar (`APPLICANT_JOBS`):


    ```

    APPLICANT_JOBS { ANO , EMPLOYER , JOB , START , END , ... }

    PRIMARY KEY { ANO , START }

    ALTERNATE KEY { ANO , END }

    FOREIGN KEY { ANO } REFERENCES APPLICANT

    ```


    Observe, incidentally, that once again we seem to be faced with an arbitrary choice
    of primary key, but that''s not the point I want to examine here.^([^(284)](#fn284))


    Now, when a job applicant is successful and becomes an employee, he or she is
    assigned an employee number (`ENO`, unique to the employee), and information regarding
    the new employee—job title, department number, phone number, etc.—is recorded
    in an `EMP` relvar:


    ```

    EMP { ENO , JOB , DNO , PHONENO , ... }

    PRIMARY KEY { ENO }

    ```


    Now we have two distinct anchor relvars, `APPLICANT` and `EMP`, such that the
    very same entity (i.e., a successful applicant) is identified by an `ANO` value
    in one of the two and by an `ENO` value in the other. Of course, it''s true that
    the two relvars represent different *roles*—a tuple in `APPLICANT` represents
    a person in an applicant role and the corresponding tuple in `EMP` (if there is
    one) represents the same person in an employee role—but the fact remains that
    there''s just a single entity involved.


    The foregoing isn''t the end of the story. Clearly, relvar `EMP` needs to refer
    back to relvar `APPLICANT` somehow (I''m assuming for the sake of the example,
    though the assumption might be a little unrealistic, that every employee was once
    an applicant). Thus, we need to add an `ANO` attribute to the `EMP` relvar and
    define a foreign key accordingly:


    ```

    EMP { ENO , ANO , JOB , DNO , PHONENO , ... }

    PRIMARY KEY { ENO }

    ALTERNATE KEY { ANO }

    FOREIGN KEY { ANO } REFERENCES APPLICANT

    ```


    Now we have two candidate keys once again!—namely, `{ENO}` and `{ANO}`. This point
    will be relevant in a few moments; for now, however, I''ll ignore it.


    Next, of course, we''ll need additional relvars to carry subsidiary information
    for employees (salary history, benefit details, etc.). Here''s the salary history
    relvar:


    ```

    SAL_HIST { ENO , DATE , SALARY , ... }

    PRIMARY KEY { ENO , DATE }

    FOREIGN KEY { ENO } REFERENCES EMP

    ```


    Now we have the very same entity being not only *identified*, but also *referenced*,
    by an `ENO` value in one relvar (`SAL_HIST`) and by an `ANO` value in others (`APPLICANT_JOBS`,
    `EMP`). In other words, the database structure is as shown in Figure [C-3](#489629_2_En_20_Chapter.xhtml#Fig3).


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig3_HTML.jpg](images/489629_2_En_20_Chapter/489629_2_En_20_Fig3_HTML.jpg)


    Figure C-3


    The applicants-and-employees database


    Now, we might avoid the apparent need for two different identifiers (`ANO` and
    `ENO`) for the same entity type by regarding `EMP` as a `subtype` of `APPLICANT`;^([^(285)](#fn285))
    after all, every employee is or once was an applicant (loosely speaking), while
    the converse isn''t true. In this way we could use `{ANO}` as the primary key
    for `EMP`, treating `{ENO}` as an alternate key (or even dropping it altogether),
    and replace `ENO` by `ANO` in the `SAL_HIST` relvar. The database structure is
    now as shown in Figure [C-4](#489629_2_En_20_Chapter.xhtml#Fig4):


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig4_HTML.jpg](images/489629_2_En_20_Chapter/489629_2_En_20_Fig4_HTML.jpg)


    Figure C-4


    Using `{ANO}` as the primary key for `EMP`'
  raw: 'To summarize: None of these four “workaround” approaches seems totally satisfactory.
    The example thus seems to show that—if we wish to avoid redundancy and arbitrariness
    and artificiality and asymmetry and indirectness—then we need to be able to treat
    primary and alternate keys as equals, and we need to be able to have foreign keys
    that reference alternate keys. In other words, we need to ignore the differences
    between primary and alternate keys, and simply consider them all as just keys.
    Please note carefully, however, that I’m *not* saying the apparent need in this
    example to violate certain precepts of the original relational model can’t be
    avoided; what I’m saying is I don’t see a good way to avoid it, nor a good reason
    for adopting a bad way. I would therefore like to suggest that the precepts in
    question be treated as strong (?) guidelines but not as inviolable rules.


    ## One Primary Key per Entity Type?


    I turn now to the second of the two issues mentioned in the introduction to this
    appendix: viz., that entities of a given type are supposed to be identified in
    exactly the same way everywhere in the database. What this means, loosely speaking,
    is that there’ll typically be:


    *   A single “anchor” relvar for the pertinent entity type, having some particular
    primary key, together with


    *   Zero or more subsidiary relvars giving further information about entities
    of that type, each having a foreign key that refers back to the primary key of
    that anchor relvar.


    (Does this state of affairs remind you of the RM/T design discipline discussed
    in Chapter [17](#489629_2_En_17_Chapter.xhtml)?) But several obvious questions
    arise:


    *   Might there not be good reasons to have more than one anchor relvar for a
    given entity type, perhaps corresponding to different “roles”—see the discussion
    of applicants and employees in the next section—for that entity type?


    *   If there are several such anchor relvars, might there not be good reasons
    to have different primary keys in different anchor relvars—thus implying that
    the same entity might be identified in different ways in different contexts?


    *   Hence, might there not be good reasons to have different foreign keys in different
    relvars that, again, identify the same entity in different ways in different contexts?


    *   Finally, might there not even be good reasons to have several distinct identifiers,
    all of equal weight, for the same entity in the *same* relvar?


    We’ve already seen several examples in this appendix (in the section “Relvars
    with More than One Key”) in which the answer to the last of these questions is
    clearly *yes*. In order to examine the other questions, let’s consider another
    example.


    ## The Applicants and Employees Example


    This example (which, like the invoices and shipments example, is based on a real
    world application) concerns applicants for jobs in a certain enterprise. Relvar
    APPLICANT is used to keep a record of such applicants:


    ```

    APPLICANT { ANO , NAME , ADDR , ... }

    PRIMARY KEY { ANO }

    ```


    The applicant number (ANO) is assigned at the time the applicant applies for the
    job; it’s unique to the applicant, and {ANO} thus constitutes the obvious primary
    key (in fact, it’s the only key).


    Next, several further relvars are used to keep subsidiary applicant information
    (previous jobs held, list of references, list of dependants, etc.). I consider
    just one of these here, the “previous jobs held” relvar (APPLICANT_JOBS):


    ```

    APPLICANT_JOBS { ANO , EMPLOYER , JOB , START , END , ... }

    PRIMARY KEY { ANO , START }

    ALTERNATE KEY { ANO , END }

    FOREIGN KEY { ANO } REFERENCES APPLICANT

    ```


    Observe, incidentally, that once again we seem to be faced with an arbitrary choice
    of primary key, but that’s not the point I want to examine here.^([^(284)](#fn284))


    Now, when a job applicant is successful and becomes an employee, he or she is
    assigned an employee number (ENO, unique to the employee), and information regarding
    the new employee—job title, department number, phone number, etc.—is recorded
    in an EMP relvar:


    ```

    EMP { ENO , JOB , DNO , PHONENO , ... }

    PRIMARY KEY { ENO }

    ```


    Now we have two distinct anchor relvars, APPLICANT and EMP, such that the very
    same entity (i.e., a successful applicant) is identified by an ANO value in one
    of the two and by an ENO value in the other. Of course, it’s true that the two
    relvars represent different *roles*—a tuple in APPLICANT represents a person in
    an applicant role and the corresponding tuple in EMP (if there is one) represents
    the same person in an employee role—but the fact remains that there’s just a single
    entity involved.


    The foregoing isn’t the end of the story. Clearly, relvar EMP needs to refer back
    to relvar APPLICANT somehow (I’m assuming for the sake of the example, though
    the assumption might be a little unrealistic, that every employee was once an
    applicant). Thus, we need to add an ANO attribute to the EMP relvar and define
    a foreign key accordingly:


    ```

    EMP { ENO , ANO , JOB , DNO , PHONENO , ... }

    PRIMARY KEY { ENO }

    ALTERNATE KEY { ANO }

    FOREIGN KEY { ANO } REFERENCES APPLICANT

    ```


    Now we have two candidate keys once again!—namely, {ENO} and {ANO}. This point
    will be relevant in a few moments; for now, however, I’ll ignore it.


    Next, of course, we’ll need additional relvars to carry subsidiary information
    for employees (salary history, benefit details, etc.). Here’s the salary history
    relvar:


    ```

    SAL_HIST { ENO , DATE , SALARY , ... }

    PRIMARY KEY { ENO , DATE }

    FOREIGN KEY { ENO } REFERENCES EMP

    ```


    Now we have the very same entity being not only *identified*, but also *referenced*,
    by an ENO value in one relvar (SAL_HIST) and by an ANO value in others (APPLICANT_JOBS,
    EMP). In other words, the database structure is as shown in Figure [C-3](#489629_2_En_20_Chapter.xhtml#Fig3).


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig3_HTML.jpg](images/489629_2_En_20_Chapter/489629_2_En_20_Fig3_HTML.jpg)


    Figure C-3


    The applicants-and-employees database


    Now, we might avoid the apparent need for two different identifiers (ANO and ENO)
    for the same entity type by regarding EMP as a *subtype* of APPLICANT;^([^(285)](#fn285))
    after all, every employee is or once was an applicant (loosely speaking), while
    the converse isn’t true. In this way we could use {ANO} as the primary key for
    EMP, treating {ENO} as an alternate key (or even dropping it altogether), and
    replace ENO by ANO in the SAL_HIST relvar. The database structure is now as shown
    in Figure [C-4](#489629_2_En_20_Chapter.xhtml#Fig4):


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig4_HTML.jpg](images/489629_2_En_20_Chapter/489629_2_En_20_Fig4_HTML.jpg)


    Figure C-4


    Using {ANO} as the primary key for EMP'
  trans: '

    总结：这四种“变通”方法似乎都不完全令人满意。这个例子因此表明——如果我们希望避免冗余、任意性、人为性、不对称性和间接性——那么我们需要能够将主键和备用键同等对待，并且需要能够拥有引用备用键的外键。换句话说，我们需要忽略主键和备用键之间的差异，而简单地将它们都视为键。然而，请注意，我`不是`说这个例子中明显需要违反原始关系模型某些准则的情况无法避免；我所说的是，我看不到一个避免它的好方法，也没有一个采用糟糕方法的好理由。因此，我想建议将相关准则视为强（？）指导方针，而非不可违反的规则。


    ## 每个实体类型只有一个主键？


    现在我转向本附录引言中提到的第二个问题：即给定类型的实体应以完全相同的方式在数据库中的任何地方进行标识。通俗地说，这意味着通常会存在：


    *   一个针对相关实体类型的单一“锚点”关系变量（relvar），具有某个特定主键，以及

    *   零个或多个从属关系变量，提供关于该类型实体的进一步信息，每个从属关系变量都有一个外键引用回该锚点关系变量的主键。


    （这种情况是否让你想起了第 17 章讨论的 `RM/T` 设计规范？）但几个显而易见的问题出现了：


    *   是否存在充分的理由为给定实体类型设置多个锚点关系变量，可能对应于该实体类型的不同“角色”——参见下一节关于申请人和雇员的讨论？

    *   如果存在多个这样的锚点关系变量，是否可能存在充分的理由，使得不同的锚点关系变量具有不同的主键——从而意味着同一个实体可能在不同的上下文中以不同的方式被标识？

    *   因此，是否可能存在充分的理由，使得在不同的关系变量中存在不同的外键，再次在不同的上下文中以不同的方式标识同一个实体？

    *   最后，在*同一个*关系变量中，为同一个实体设置多个不同的标识符且权重相等，是否甚至也可能存在充分的理由？


    我们在本附录的前面部分（在“具有多个键的关系变量”一节）已经看到了几个例子，其中对最后一个问题的回答显然是 `是`。为了考察其他问题，让我们考虑另一个例子。


    ## 申请人和雇员的例子


    这个例子（与发票和发货的例子一样，基于一个真实世界的应用）涉及某企业工作的申请人。关系变量 `APPLICANT` 用于记录这些申请人：


    ```

    APPLICANT { ANO , NAME , ADDR , ... }

    PRIMARY KEY { ANO }

    ```


    申请号 (`ANO`) 在申请人申请工作时分配；它对申请人是唯一的，因此 `{ANO}` 构成了显而易见的主键（事实上，它是唯一的键）。


    接下来，使用几个进一步的关系变量来保存从属的申请人信息（以前从事的工作、推荐人列表、家属列表等）。这里我只考虑其中一个，“以前从事的工作”关系变量 (`APPLICANT_JOBS`)：


    ```

    APPLICANT_JOBS { ANO , EMPLOYER , JOB , START , END , ... }

    PRIMARY KEY { ANO , START }

    ALTERNATE KEY { ANO , END }

    FOREIGN KEY { ANO } REFERENCES APPLICANT

    ```


    顺便注意一下，我们似乎再次面临主键选择的任意性问题，但这不是我想在此考察的重点。^(²⁸⁴)


    现在，当一名求职者成功并成为一名雇员时，他或她将被分配一个雇员号 (`ENO`，对雇员唯一)，有关新雇员的信息——职位、部门号、电话号码等——被记录在一个
    `EMP` 关系变量中：


    ```

    EMP { ENO , JOB , DNO , PHONENO , ... }

    PRIMARY KEY { ENO }

    ```


    现在我们有了两个不同的锚点关系变量 `APPLICANT` 和 `EMP`，其中同一个实体（即，成功的申请人）在一个关系变量中由一个 `ANO` 值标识，在另一个关系变量中由一个
    `ENO` 值标识。当然，确实这两个关系变量代表不同的*角色*——`APPLICANT` 中的一个元组表示处于申请人角色的人，而 `EMP` 中相应的元组（如果存在的话）表示处于雇员角色的同一个人——但事实是，所涉及的只是一个单一的实体。


    前述情况并非故事的结局。显然，关系变量 `EMP` 需要以某种方式引用回关系变量 `APPLICANT`（为了这个例子，我假设每个雇员都曾经是申请人，尽管这个假设可能有点不现实）。因此，我们需要在
    `EMP` 关系变量中添加一个 `ANO` 属性，并相应地定义一个外键：


    ```

    EMP { ENO , ANO , JOB , DNO , PHONENO , ... }

    PRIMARY KEY { ENO }

    ALTERNATE KEY { ANO }

    FOREIGN KEY { ANO } REFERENCES APPLICANT

    ```


    现在我们再次有了两个候选键！——即 `{ENO}` 和 `{ANO}`。这一点稍后会相关；不过目前，我将忽略它。


    接下来，当然，我们将需要额外的关系变量来保存雇员的从属信息（薪资历史、福利详情等）。这是薪资历史关系变量：


    ```

    SAL_HIST { ENO , DATE , SALARY , ... }

    PRIMARY KEY { ENO , DATE }

    FOREIGN KEY { ENO } REFERENCES EMP

    ```


    现在，同一个实体不仅在一个关系变量 (`SAL_HIST`) 中通过 `ENO` 值被*标识*，而且在其他关系变量 (`APPLICANT_JOBS`, `EMP`)
    中通过 `ANO` 值被*引用*。换句话说，数据库结构如图 C-3 所示。


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig3_HTML.jpg](img/489629_2_En_20_Fig3_HTML.jpg)


    图 C-3


    申请人和雇员数据库


    现在，通过将 `EMP` 视为 `APPLICANT` 的一个 `子类型`，^(²⁸⁵)我们或许可以避免明显需要为同一实体类型设置两个不同标识符 (`ANO`
    和 `ENO`) 的情况；毕竟，每个雇员都是或曾经是一名申请人（通俗地说），而反之则不然。这样，我们可以将 `{ANO}` 用作 `EMP` 的主键，将 `{ENO}`
    视为一个备用键（甚至完全去掉它），并在 `SAL_HIST` 关系变量中用 `ANO` 替换 `ENO`。数据库结构现在如图 C-4 所示：


    ![../images/489629_2_En_20_Chapter/489629_2_En_20_Fig4_HTML.jpg](img/489629_2_En_20_Fig4_HTML.jpg)


    图 C-4


    使用 `{ANO}` 作为 `EMP` 的主键

    '
- fmt: 'However, note the implications of this state of affairs: It’s not just the
    database design that’s changed, it’s the way the enterprise has to operate. (For
    a start, it now has to identify employees by applicant number instead of employee
    number.) Why should the enterprise change its way of doing business, just because
    of a piece of relational dogma (`“one primary key per entity type”`)? To be specific,
    why shouldn’t it be allowed to identify applicants by applicant number and employees
    by employee number—even though applicants and employees are all persons, and indeed
    every employee is (or once was) also an applicant?


    Another possibility would be to introduce a `PERSON` relvar and then regard both
    `APPLICANT` and `EMPLOYEE` as subtypes of `PERSON`. I leave the details as an
    exercise for the reader; I simply remark that this approach basically doesn’t
    solve anything, even if we invent a `“person number”` (`PNO`) and make `{PNO}`
    the primary key of `PERSON`.


    To summarize: The foregoing example strongly suggests there might be occasions
    on which it’s indeed desirable (a) to have several different anchor relvars for
    the same entity type; (b) to have a different primary key in each of those anchor
    relvars; and (c) to have different foreign keys referring to those different primary
    keys in different subsidiary relvars. Again, please note that I’m `not` saying
    the apparent need here to violate the rule `“one primary key per entity type”`
    can’t be avoided; what I’m saying is I don’t see a good way to avoid it, nor do
    I see a good reason for adopting a bad way. Again, therefore, I would like to
    suggest that the `“one primary key for one entity type”` precept be treated as
    a strong (?) guideline, but not as an inviolable rule.


    ## Concluding Remarks


    In this appendix I’ve presented a number of pragmatic arguments for:


    *   Relaxing the commonly accepted rule that every base relvar have a distinguished
    key called the primary key

    *   Relaxing the (perhaps less commonly accepted) rule that every foreign key
    refer specifically to a primary key instead of to an alternate key^([^(286)](#fn286))

    *   Relaxing the commonly accepted rule that there be exactly one anchor relvar
    for each entity type


    Of course, I’m well aware that if we do relax these rules, then we open the door
    to the possibility of bad designs. That’s why I recommend retaining recommendations
    such as `“one primary key per entity type”` as rules of thumb, or good design
    guidelines. In other words, the rules in question should be violated only if there’s
    some really good reason for doing so. But what I’ve tried to show in this appendix
    is that sometimes such good reasons do exist.


