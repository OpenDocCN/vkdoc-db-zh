  raw: "## Exercises\n\n1.  Draw the normal form hierarchy (“Version II”) from memory.\
    \ Your drawing should include at least nine normal forms.\n\n2.  Define (a) FD\
    \ redundancy; (b) JD redundancy; (c) ETNF.\n\n3.  In the body of the chapter,\
    \ I said among other things that a relvar could be in SKNF and not in 5NF, and\
    \ I proposed the following as an example of such a relvar:\n\n    Let relvar R\
    \ have attributes A, B, and C; using Heath notation, let AB, BC, and CA each be\
    \ keys of R; and let the JD ☼{AB,BC,CA}—call it J—hold in R.\n\n    But you might\
    \ not unreasonably be a little suspicious of this example. To be more specific,\
    \ you might be wondering whether a relvar could even exist that’s subject to exactly\
    \ the specified key constraints and the specified JD (despite the fact that I\
    \ did go on to give a slightly more concrete version of the example). Show that\
    \ the example is reasonable after all by demonstrating that in fact all possible\
    \ sets of dependencies (FDs and JDs) are consistent, in the sense that at least\
    \ one relation can always be found that satisfies all of the dependencies in the\
    \ set.\n\n4.  Relvar SPJ′ from the section “5NF Is Too Strong” was subject to\
    \ what might be called a “symmetric” JD—viz., the JD ☼{{SNO,PNO},{PNO,JNO},{JNO,SNO}}—and\
    \ yet displayed some asymmetry also, in that just one of the three components\
    \ of that JD corresponded to a key. Intuitively, you might expect the other two\
    \ components to correspond to keys as well. Show that such isn’t necessarily the\
    \ case.\n\n5.  With regard to relvar SPJ′ from the body of the chapter, show that\
    \ the following business rules must be in effect as claimed:\n    *   If supplier\
    \ *s1* supplies part *p1* to project *j2* and supplier *s2* supplies part *p1*\
    \ to project *j1* (*s1* ≠ *s2*, *j1* ≠ *j2*), then no part, not even *p1*, can\
    \ be supplied by supplier *s1* to project *j1*.\n\n    *   If supplier *s1* supplies\
    \ part *p2* to project *j1* and supplier *s2* supplies part *p1* to project *j1*\
    \ (*s1* ≠ *s2*, *p1* ≠ *p2*), then (c) no project, not even *j1*, can be supplied\
    \ by supplier *s1* with part *p1*.\n\n6.  Again with regard to relvar SPJ′ from\
    \ the body of the chapter, give a **Tutorial D** CONSTRAINT statement corresponding\
    \ to the following business rule:\n    *   If (a) supplier *s1* supplies part\
    \ *p1* to project *j2* and (b) supplier *s1* supplies part *p2* to project *j1*\
    \ (*p1* ≠ *p2*, *j1* ≠ *j2*), then (c) no supplier, not even *s1*, can supply\
    \ part *p1* to project *j1*.\n\n## Answers\n\n1.  See Figure [13-1](#489629_2_En_13_Chapter.xhtml#Fig1).\n\
    \n2.  See the body of the chapter.\n\n3.  Let relation *r* have heading *H*. Then\
    \ *r* will certainly satisfy all possible FDs and JDs that can be defined with\
    \ respect to *H* if *r* has cardinality either one or zero. It follows that all\
    \ possible sets of dependencies (FDs and JDs) are consistent, though some such\
    \ sets might have the implication that any relation that satisfies them can have\
    \ cardinality at most one. (Note, incidentally, that a relvar of cardinality at\
    \ most one has the empty set { } as its sole key—see the answer to Exercise 4.10\
    \ in Chapter [4](#489629_2_En_4_Chapter.xhtml)—and is necessarily in 5NF.)\n\n\
    4.  The following is certainly a legitimate value for relvar SPJ′—\n\n    ```\n\
    \    s1  p1  j1\n    s2  p1  j1\n    ```\n\n    (*s1* ≠ *s2*)—so {PNO,JNO} isn’t\
    \ a key. Likewise, the following is also a legitimate value for SPJ′—\n\n    ```\n\
    \    s1  p1  j1\n    s1  p2  j1\n    ```\n\n    (*p1* ≠ *p2*)—so {JNO,SNO} isn’t\
    \ a key either.\n\n5.  With respect to the first of the rules as stated, suppose\
    \ relvar SPJ′ contains the following tuples (note that “the third” tuple directly\
    \ violates the rule):\n\n    ```\n    s1  p1  j2\n    s2  p1  j1\n    s1  px \
    \ j1\n    ```\n\n    (*s1* ≠ *s2*, *j1* ≠ *j2*). Here then are the corresponding\
    \ binary projections:\n\n    ```\n    s1  p1      p1  j2      j2  s1\n    s2 \
    \ p1      p1  j1      j1  s2\n    s1  px      px  j1      j1  s1\n    ```\n\n\
    \    Joining the two leftmost projections gives:\n\n    ```\n    s1  p1  j2\n\
    \    s1  p1  j1\n    s2  p1  j2\n    s2  p1  j1\n    s1  px  j1\n    ```\n\n \
    \   Joining this result with the third projection gives:\n\n    ```\n    s1  p1\
    \  j2\n    s1  p1  j1\n    s2  p1  j1\n    s1  px  j1\n    ```\n\n    But {SNO,PNO}\
    \ is a key, so from “the first two tuples” it follows that *j1* = *j2*: Contradiction.\
    \ So the first rule must indeed be in effect.\n\n    Proving that the second rule\
    \ is in effect as well follows the same general pattern.\n\n6.  `CONSTRAINT ...`\n\
    \n    ```\n    WITH ( T1 := SPJ′ RENAME { PNO AS Y1 , JNO AS Z1 ) ,\n    T2 :=\
    \ SPJ′ RENAME { PNO AS Y2 , JNO AS Z2 ) ,\n    T3 := JOIN { T1 , T2 } ,\n    T4\
    \ := T3 WHERE Y1 ≠ Y2 AND Z1 ≠ Z2 ,\n    T5 := T4 { Y1 , Z2 } ,\n    T6 := T5\
    \ RENAME { Y1 AS PNO , Z2 AS JNO } ,\n    T7 := JOIN { SPJ′ , T6 } ) :\n    IS_EMPTY\
    \ ( T7 ) ;\n    ```\n\n    Here for interest is a formulation of the foregoing\
    \ constraint in relational calculus (**Tutorial D** is based on relational algebra,\
    \ of course). Let *t1*, *t2*, *t3* be range variables ranging over relvar SPJ′.\
    \ Then we have:\n\n    ```\n    CONSTRAINT ...\n    FORALL t1 FORALL t2 FORALL\
    \ t3\n    ( IF   t1.SNO = t2.SNO AND t1.PNO ≠ t2.PNO AND t1.JNO ≠ t2.JNO\n   \
    \ THEN t3.PNO ≠ t1.PNO OR  t3.JNO ≠ t2.JNO ) ;\n    ```\n\nFootnotes [1](#489629_2_En_13_Chapter.xhtml#Fn1_source)\
    \   [2](#489629_2_En_13_Chapter.xhtml#Fn2_source)   [3](#489629_2_En_13_Chapter.xhtml#Fn3_source)\
