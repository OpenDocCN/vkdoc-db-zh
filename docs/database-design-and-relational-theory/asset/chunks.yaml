  trans: '# 15. 这还不是结束


    > *这还不是结束，甚至都不是结束的开始。*

    >

    > *但或许，这是开始的结束。*

    >

    > —温斯顿·丘吉尔：*在伦敦市长大人日午宴上的演讲* (1942 年 11 月 10 日)


    > *永恒是个可怕的念头。*

    >

    > *我的意思是，这一切究竟会在哪里结束？*

    >

    > —汤姆·斯托帕德：*《君臣人子小命呜呼》* (1967)


    这真是一段漫长而奇特的旅程……在本书第二部分，我们涵盖了 1NF、2NF、3NF 以及 BCNF（最后一个讲得相当详细）；在第三部分，我们涵盖了 4NF 和
    5NF（后者也花了相当长的篇幅）；而在之前的两章中，我们又见识了另外四种范式：ETNF、RFNF、SKNF 和 6NF（其中最后一种显然是最重要的）。但这依然不是故事的结局。在本章中，仅为了完整性，我将简要描述或至少提及文献中曾定义过的其他几种范式。


    ## 域键范式


    域键范式（DK/NF）与本书此前讨论的所有范式都不同，因为它根本不是根据 FD、MVD 和 JD 来定义的。^(¹⁹⁸) DK/NF 实际上是一种“理想”的范式：根据定义，处于
    DK/NF 的关系变量可以保证免受某些更新异常的影响，因此它是可取的；然而可悲的是，它并非总是可以达到，而且“究竟何时才能达到？”这个问题也尚未得到解答。尽管如此，我们还是来研究一下。


    DK/NF 是根据*域约束*和*键约束*来定义的。键约束当然是我们已经熟悉的（在第 5 章中有正式定义）。至于域约束，我提醒一下，*域*本质上就是*类型*的另一个名称（参见第
    2 章练习 2.4 的答案）。由此推论，域约束在逻辑上应该与类型约束是同一回事；换句话说，它应该就是构成目标类型的那个值集的规格说明（关于这个概念的进一步讨论，请参见《SQL
    与关系理论》）。然而，该术语在当前上下文中有着稍特殊的含义。具体来说，这里使用的*域约束*这个术语，指的是一个约束，其大意是：给定属性的值不仅取自某个规定的域，而且必须取自该域的某个规定的子集。例如，供应商关系变量`S`上可能存在一个约束，要求`STATUS`值（它们是整数，即`INTEGER`类型的值）必须在
    1 到 100 之间（含）。


    那么，以下是一些定义：


    - **定义（域键范式）：** 当且仅当关系变量`R`中成立的每一个单关系变量约束都是由`R`中成立的域约束和键约束所隐含的时候，关系变量`R`才处于域键范式（DK/NF）。

    - **定义（单关系变量约束）：** 任何可以通过单独检查相关关系变量（即无需检查数据库中的任何其他关系变量）来测试的完整性约束。^(¹⁹⁹)


    因此，在概念上，对 DK/NF 关系变量施加强制约束是简单的，因为只需强制执行相关的域约束和键约束就足够了，然后所有约束——不仅仅是 FD、MVD 和 JD，而是适用于该关系变量的*所有*单关系变量约束——都将被自动强制执行。


    DK/NF 最早由 Fagin 于 1981 年定义，^(²⁰⁰) 正是这篇 DK/NF 论文首次为*插入异常*和*删除异常*这些术语给出了精确定义。我在第
    10 章定义了这些概念（并在第 13 章再次提及），但之前的那些定义和讨论是专门针对 JD 来阐述的。现记录在此的是一般性定义（请注意，它们指的是单关系变量约束，而不仅仅是碰巧为
    FD、MVD 或 JD 的约束）：^(²⁰¹)


    - **定义（插入异常）：** 当且仅当存在关系变量`R`的一个合法值`r`以及一个与`R`具有相同标题的元组`t`，使得将`t`附加到`r`所得到的关系满足`R`的键约束但违反`R`上的某个其他单关系变量约束时，关系变量`R`才遭受插入异常。

    - **定义（删除异常）：** 当且仅当存在关系变量`R`的一个合法值`r`以及`r`的一个元组`t`，使得从`r`中移除`t`所得到的关系违反`R`上的某个单关系变量约束时，关系变量`R`才遭受删除异常。


    DK/NF 论文证明，处于 DK/NF 的关系变量不可能遭受上述定义的插入或删除异常。（实际上它证明了一个更强的结果：即当且仅当关系变量处于 DK/NF 时，它才不会遭受此类异常。）


    最后，我们有如下定理：


    - **定理：** 只要每一个相关属性至少可以取两个不同的值，DK/NF 就蕴含 5NF。


    也就是说（说得稍不严谨一点），每一个 DK/NF 关系变量都处于 5NF——尽管它当然不一定处于 6NF。正如在第 13 章（在一个脚注中）指出的，事实上，在唯一成立的约束恰好是
    FD 和 JD 的这种（可惜可能不太常见的）特殊情况下，DK/NF 和 5NF 是一致的。


    ## 初等键范式


    初等键范式（EKNF）由 Zaniolo 于 1982 年引入。^(²⁰²) 定义如下：


    - **定义（初等键范式）：** 当且仅当，对于`R`中成立的每一个非平凡 FD `X → Y`，都有（a）`X`是超键，或者（b）`Y`是某个初等键的子键时，关系变量`R`才处于初等键范式（EKNF）——其中，键`K`是初等键当且仅当存在`R`的某个属性`A`，使得
    FD `K → {A}`是非平凡且不可约的。


    从这个定义可以直接看出，EKNF 严格介于 3NF 和 BCNF 之间；也就是说，BCNF 蕴含 EKNF，EKNF 蕴含 3NF，而反向的蕴含关系不成立。至于例子：嗯，正如本书其他地方指出的，对于范式来说，展示一个反例通常比展示一个正例更具启发性。因此，假设：


    1.  我们惯常的发货关系变量`SP`，除了通常的`QTY`属性外，还有一个属性`SNAME`，代表相应供应商的名称。

    2.  供应商名称必须是唯一的（即没有两个不同的供应商在同一时间拥有相同的名称）。


    那么这个修改版的`SP`就有两个键：`{SNO,PNO}`和`{SNAME,PNO}`。然而，这些键都不是初等键，因为以这些键之一作为决定因素所成立的非平凡
    FD 只有`{SNO,PNO} → {SNAME}`和`{SNAME,PNO} → {SNO}`，而这两个 FD 都是可约的（在这两种情况下，`PNO`都可以从决定因素中删除而不造成损失）。因此，该关系变量受到两个非平凡
    FD 的约束：`{SNO} → {SNAME}`和`{SNAME} → {SNO}`，在这两个 FD 中，决定因素不是超键，且被决定因素也不是初等键的子键。因此，这个版本的`SP`关系变量不处于
    EKNF（尽管它处于 3NF）。


    EKNF 的既定目标是“捕捉 3NF 和 BCNF 两者的显著特性”，同时避免两者的问题（即 3NF“过于宽容”，而 BCNF“易于导致计算复杂性”）。话虽如此，我也应该说，EKNF
    在文献中并不常被引用。'
- fmt: "## Overstrong PJ/NF\n\nRecall that 5NF was originally called PJ/NF, and PJ/NF\
    \ meant that every JD was implied by keys (speaking rather loosely). In fact,\
    \ in the paper in which he introduced PJ/NF, Fagin also introduced what he called\
    \ `overstrong` PJ/NF, which meant (again rather loosely) that every JD was implied\
    \ by some specific key considered in isolation. Note that this latter is what\
    \ one might intuitively have expected the definition of `regular` PJ/NF (i.e.,\
    \ 5NF) to have been—recall the remarks in Chapters 10 and 12 concerning the parallelism\
    \ among the definitions of BCNF, 4NF, and 5NF. Be that as it may, here’s the definition:\n\
    \n`Definition (overstrong PJ/NF):` Relvar `R` is in overstrong PJ/NF if and only\
    \ if every JD of `R` is implied by some key of `R`.\n\nOverstrong PJ/NF clearly\
    \ implies 5NF (i.e., “regular” PJ/NF), but the reverse is false. A single counterexample\
    \ suffices to demonstrate this latter fact:^([^(203)](#fn203)) Consider a relvar\
    \ `R` with attributes `A`, `B`, `C`, and `D` (only) and keys `{A}` and `{B}` only.\
    \ Let the only dependencies to hold in `R` be ones that are implied by these keys\
    \ (so `R` is definitely in 5NF). Now consider the JD ☼{`AB`,`BC`,`AD`}. Applying\
    \ the membership algorithm, we see that this JD holds in `R`; but it’s not a consequence\
    \ of either of the keys considered in isolation, as can also be seen by checking\
    \ the membership algorithm. So `R` is in 5NF (or PJ/NF) but not in overstrong\
    \ PJ/NF.\n\n## “Restriction-Union” Normal Form\n\nConsider the parts relvar `P`\
    \ from the suppliers-and-parts database. Normalization theory as I’ve described\
    \ it up to this point tells us relvar `P` is in a “good” normal form; indeed,\
    \ it’s in 5NF, and it’s therefore guaranteed to be free of anomalies that can\
    \ be removed by taking projections. But why keep all parts in a single relvar?\
    \ What about a design in which red parts are kept in one relvar (`RP`, say), blue\
    \ ones in another (`BP`, say), and so on? In other words, what about the possibility\
    \ of decomposing the original parts relvar via restriction instead of projection?\
    \ Would the resulting structure be a good design or a bad one? (In fact it would\
    \ almost certainly be bad unless we were very careful, as we’ll see in Part V\
    \ of this book; however, the point here is that classical normalization theory\
    \ as such has absolutely nothing to say about the matter.)\n\nAnother direction\
    \ for design research therefore consists of examining the implications of decomposing\
    \ relvars by some operator other than projection. In the example, the decomposition\
    \ operator is, as already mentioned, (disjoint) restriction, and the corresponding\
    \ recomposition operator is (disjoint) union. Thus, it might be possible to construct\
    \ a “restriction-union” normalization theory, analogous to—but orthogonal to—the\
    \ projection-join normalization theory we’ve been considering throughout the bulk\
    \ of this book. I don’t want to get much more specific on such matters here; suffice\
    \ it to say that some initial ideas along these lines can be found:\n\n1.  In\
    \ a paper by Smith, which discusses a normal form called (3,3)NF .^([^(204)](#fn204))\
    \ Smith shows, first, that (3,3)NF implies BCNF; second, that a (3,3)NF relvar\
    \ need not be in 4NF, nor need a 4NF relvar be in (3,3)NF. As suggested above,\
    \ therefore, reduction to (3,3)NF is orthogonal to reduction to 4NF (and 5NF).\n\
    \n2.  In Fagin’s PJ/NF paper, which includes as a kind of postscript a preliminary\
    \ discussion of a normal form called PJSU/NF (S for “split” and U for union).\
    \ *Tentative definition:* Relvar `R` is in PJSU/NF if and only if it’s in PJ/NF\
    \ (i.e., 5NF) and there’s no way to split it via restriction into relvars `R1`\
    \ and `R2` such that the dependencies of `R1` and `R2` are different.\n\n## Exercises\n\
    \n1.  Define DK/NF. Give an example of a relvar in 6NF that’s not in DK/NF.\n\n\
    2.  What’s the difference between SKNF and overstrong PJ/NF? In fact, *is* there\
    \ a difference?\n\n3.  Give definitions, as precise as you can make them, of the\
    \ relational operators restriction and union.\n\n4.  How would you fit the various\
    \ normal forms mentioned in this chapter (also 6NF) into the normal form hierarchy\
    \ of Figure 13-1?\n\n## Answers\n\n1.  For the definition, see the body of the\
    \ chapter. As for an example, suppose relvar `SP` is subject to a constraint to\
    \ the effect that odd numbered parts can be supplied only by odd numbered suppliers\
    \ and even numbered parts only by even numbered suppliers. (This example is very\
    \ contrived, of course, but it suffices for the purpose at hand.) Then this constraint\
    \ is clearly not implied by the domain and key constraints that hold in relvar\
    \ `SP`, and so the relvar isn’t in DK/NF; yet it’s certainly in 6NF.\n\n2.  There\
    \ certainly is a difference, since overstrong PJ/NF implies 5NF and 5NF implies\
    \ SKNF and the reverse implications don’t hold. But it’s easy to confuse the two,\
    \ because the following superficially similar observations are both true. Let\
    \ `R` be a relvar, and let `J` = ☼{`X1`,...,`Xn`} be an irreducible JD that holds\
    \ in `R`. Then:\n    *   `R` is in SKNF if and only if, for every such `J`, each\
    \ `Xi` (`i` = 1, ..., `n`) includes **some** key of `R`.\n    *   `R` is in overstrong\
    \ PJ/NF if and only if, for every such `J`, each `Xi` (`i` = 1, ..., `n`) includes\
    \ **the same** key of `R`.\n\n3.  Apologies if you think these definitions a little\
    \ late in coming:\n    *   `Definition (restriction):` Let `r` be the relation\
    \ <`H`,`h`> and let `bx` be a boolean expression in which every attribute reference\
    \ identifies some attribute of `r` and there aren’t any relvar references. Then\
    \ `bx` denotes a restriction condition, `c` say, and the restriction of `r` according\
    \ to `c`, `r WHERE c`, is the relation <`H`,`x`>, where `x` is the set of all\
    \ tuples of `r` for which `c` evaluates to TRUE.\n    *   `Definition (union):`\
    \ Let relations `r1`, ..., `rn` (`n` ≥ 0) all have the same heading `H`. Then\
    \ the union of `r1`, ..., `rn`, `UNION {r1,...,rn}`, is a relation with heading\
    \ `H` and body the set of all tuples `t` such that `t` appears in at least one\
    \ of `r1, r2, ..., rn`. (If `n` = 0, some syntactic mechanism, not shown here,\
    \ is needed to specify the pertinent heading `H`, and the result is the unique\
    \ empty relation having that heading.) Observe that union as here defined is an\
    \ `n`-adic operator, not a dyadic operator merely.\n\n4.  This one isn’t easy\
    \ to answer! Figure 15-1 is my attempt.\n\n    ![../images/489629_2_En_15_Chapter/489629_2_En_15_Fig1_HTML.jpg](images/489629_2_En_15_Chapter/489629_2_En_15_Fig1_HTML.jpg)\n\
    \n    Figure 15-1: The normal form hierarchy (III)\n\nThe figure is accurate as\
    \ far as it goes. But:\n\n*   DK/NF needs to be added—probably on a par with 6NF\
    \ (neither DK/NF nor 6NF implies the other, but “most” DK/NF relvars are in 5NF).\n\
    *   Overstrong PJ/NF needs to be added—again, probably on a par with 6NF.\n* \
    \  (3,3)NF needs to be added—probably on a par with EKNF but off to one side,\
    \ as it were (since (3,3)NF implies BCNF but neither (3,3)NF nor 4NF implies the\
    \ other).\n*   PJSU/NF needs to be added—again, probably on a par with 6NF.\n\n\
    Note, however, that even if we stay in the “direct mainstream” (i.e., from 1NF\
    \ to 6NF, inclusive), there are still eleven logically distinct normal forms;\
    \ the others—the ones discussed in the present chapter—might fairly be described\
    \ as outliers."
