    —doesn’t arise, because that JD isn’t defined with respect to the heading of that
    relation.


    *   **Definition (JD holding):** Let relvar *R* have heading *H* and let ☼{*X1*,...,*Xn*}
    be a JD, *J* say, with respect to *H*. Then JD *J* holds in relvar *R* (equivalently,
    relvar *R* is subject to JD *J*) if and only if every relation that can ever be
    assigned to relvar *R* satisfies *J*. The JDs that hold in relvar *R* are the
    JDs of *R*.


    Please note the terminological distinction I’m drawing here—JDs are *satisfied*
    (or are violated) by relations, but *hold* (or don’t hold) in relvars. I’ll adhere
    to this distinction throughout what follows. By way of example, the first of the
    four JDs given at the top of the previous page holds in relvar S—


    ```

    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }

    ```


    —but the second and third don’t:


    ```

    ☼ { { SNO , SNAME } , { SNO , STATUS } , { SNAME , CITY } }

    ☼ { { CITY , SNO } , { CITY , STATUS , SNAME } }

    ```


    (Contrast the examples following the previous definition.) So now, at last, we
    know precisely what it means for a given relvar to be subject to a given JD. And
    it should be clear—in fact, it’s it’s immediate from the definition—that relvar
    *R* can be nonloss decomposed into its projections on *X1*, ..., *Xn* ***if and
    only if*** it’s subject to the JD ☼{*X1*,...,*Xn*}.'
  trans: '## 连接依赖再探


    我首先给出连接依赖（JD）的精确定义，随后的解释性文本在结构上刻意与第 5 章对应文本平行。（类似的说明也适用于下一节。）


    ### 定义（连接依赖）

    令 `H` 为一个标题；那么，关于 `H` 的一个连接依赖（JD）是一个形如 ☼{`X1`,...,`Xn`} 的表达式，其中 `X1`, ..., `Xn`（该
    JD 的分量）是 `H` 的子集，且它们的并集等于 `H`。**注意：** 如果 `H` 是已理解的，那么“关于 `H` 的 JD”这一短语可简称为“JD”。


    以下是一些示例：


    ```

    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }

    ☼ { { CITY , SNO } , { CITY , STATUS , SNAME } }

    ☼ { { SNO , SNAME } , { SNO , STATUS } , { SNAME , CITY } }

    ☼ { { SNO , CITY } , { CITY , STATUS } }

    ```


    请注意，与函数依赖（FD）类似，JD 是针对某个标题定义的，而不是针对某个关系或某个关系变量。例如，就刚才显示的 JD 而言，前三个是针对标题 `{SNO,SNAME,STATUS,CITY}`
    定义的，而第四个是针对标题 `{SNO,STATUS,CITY}` 定义的。


    还需注意，同样像 FD 一样，从形式上来看，JD 只是表达式；当针对某个特定关系进行解释时，它们就成为（根据定义）求值结果为真（TRUE）或假（FALSE）的命题。例如，如果将上面显示的前两个
    JD 针对关系变量 `S` 的当前值（见图 1-1 或图 3-1）所对应的关系进行解释，那么第一个 JD 求值为真，第二个则求值为假。


    当然，在非正式语境下，通常将 ☼{`X1`,...,`Xn`} 定义为 JD 的条件是，它在某个特定上下文中求值为真。然而，这种定义方式无法用于描述某个给定关系不满足或违反某个给定
    JD 的情况——因为根据那个非正式定义，一个不满足的 JD 根本就不算是 JD。例如，我们就无法说关系变量 `S` 的当前值违反了上面显示的第二个 JD。


    这是另一个 JD 的例子，它恰好被关系变量 `S` 的当前值所满足（实际上也被该关系变量的所有合法值所满足）：


    ```

    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS } , { CITY , STATUS } }

    ```


    这个 JD 对应于一种无损分解，其中某个投影在重构过程中并非必需。实际上，它显然等价于前面显示的四个 JD 中的第一个^(¹³⁴)——


    ```

    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }

    ```


    ——这意味着可以从原始 JD 中删除两个相同分量之一，而不会造成重大损失。基于这些原因，我将把任何给定 JD 的分量统称为一个集合^(¹³⁵)，即使该 JD
    书面形式中的分量逗号列表可能包含重复项（集合本身永远不会包含重复项）。（当然，这就是为什么那个逗号列表要用花括号括起来。）


    ### 定义（满足或违反 JD）

    令关系 `r` 的标题为 `H`，并令 ☼{`X1`,...,`Xn`} 是一个关于 `H` 的 JD，记为 `J`。如果 `r` 等于其在 `X1`, ...,
    `Xn` 上投影的连接，则 `r` 满足 `J`；否则 `r` 违反 `J`。


    请注意，是关系而不是关系变量满足或违反某个给定的 JD。例如，给定前一页顶部的四个 JD，关系变量 `S` 的当前值满足第一个和第三个——


    ```

    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }

    ☼ { { SNO , SNAME } , { SNO , STATUS } , { SNAME , CITY } }

    ```


    ——但违反了第二个：


    ```

    ☼ { { CITY , SNO } , { CITY , STATUS , SNAME } }

    ```


    请注意，该关系是否满足或违反第四个 JD 的问题——


    ```

    ☼ { { SNO , CITY } , { CITY , STATUS } }

    ```


    ——并不存在，因为该 JD 并非针对该关系的标题定义的。


    ### 定义（JD 成立）

    令关系变量 `R` 的标题为 `H`，并令 ☼{`X1`,...,`Xn`} 是一个关于 `H` 的 JD，记为 `J`。那么，JD `J` 在关系变量 `R`
    中成立（等价地，关系变量 `R` 受限于 JD `J`）当且仅当任何可能赋值给关系变量 `R` 的关系都满足 `J`。在关系变量 `R` 中成立的 JD 就是
    `R` 的 JD。


    请注意我在此所做的术语区分——关系满足（或违反）JD，但 JD 在关系变量中成立（或不成立）。在接下来的内容中，我将始终遵循这一区分。


    例如，前一页顶部给出的四个 JD 中，第一个在关系变量 `S` 中成立——


    ```

    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }

    ```


    ——但第二个和第三个不成立：


    ```

    ☼ { { SNO , SNAME } , { SNO , STATUS } , { SNAME , CITY } }

    ☼ { { CITY , SNO } , { CITY , STATUS , SNAME } }

    ```


    （与前一定义后的示例对比。）因此，现在我们终于确切知道了“一个给定的关系变量受限于某个给定的 JD”意味着什么。而且应该很清楚——事实上，从定义中可以直接看出——关系变量
    `R` 可以无损分解为其在 `X1`, ..., `Xn` 上的投影***当且仅当***它受限于 JD ☼{`X1`,...,`Xn`}。'
- fmt: '## Fifth Normal Form


    Now, when we were talking about `FDs` and `BCNF`, we got into a discussion of
    `trivial FDs`, and `FD irreducibility`, and `FDs implied by keys`, and various
    related matters. As I''m sure you''d expect by now, analogous concepts arise in
    connection with `JDs` and `5NF` also, but the details are a little trickier. Well,
    the concept of a `JD` being trivial is actually quite straightforward:


    *   **Definition (`trivial JD`):** Let `☼{*X1*,...,*Xn*}` be a `JD`, `J` say,
    with respect to heading `H`. Then `J` is trivial if and only if it''s satisfied
    by every relation with heading `H`.


    From this definition, it''s easy to prove the following result:


    *   **Theorem:** Let `☼{*X1*,...,*Xn*}` be a `JD`, `J` say, with respect to heading
    `H`. Then `J` is trivial if and only if some `Xi` (1 ≤ `i` ≤ `n`) is equal to
    `H` (because every relation with heading `H` necessarily satisfies every `JD`
    with respect to `H` that''s of the form `☼{...,*H*,...}`).


    We can regard this theorem as an operational (or "syntactic") definition, inasmuch
    as it provides an effective test that can easily be applied in practice. (By contrast,
    the formal or "semantic" definition isn''t of much use in the practical problem
    of determining whether or not a given `JD` is trivial.)


    I''ll defer discussion of `JD irreducibility` to the next chapter. Before then,
    I want to explain what it means for a `JD` to be implied by keys:


    *   **Definition (`JD implied by keys`):** Let relvar `R` have heading `H` and
    let `☼{*X1*,...,*Xn*}` be a `JD`, `J` say, with respect to `H`. Then `J` is implied
    by the keys of `R` if and only if every relation `r` that satisfies `R`''s key
    constraints also satisfies `J`.


    This definition requires a certain amount of elaboration. First, to say some relation
    satisfies some particular key constraint is to say it satisfies the applicable
    uniqueness requirement; and if it satisfies the uniqueness requirement for the
    attributes that constitute some key, it certainly satisfies the uniqueness requirement
    for every superset of that set of attributes (just so long as that superset is
    a subset of the pertinent heading, of course)—in other words, for every corresponding
    superkey. Thus, the phrase "satisfies `R`''s key constraints" in the definition
    could be replaced by the phrase "satisfies `R`''s superkey constraints" without
    making any significant difference. Likewise, the concept "implied by keys" could
    just as well be "implied by superkeys," again without making any significant difference.


    Second, what happens if the `JD` `J` mentioned in the definition is trivial? Well,
    in that case, by definition, `J` is satisfied by every relation `r` with heading
    `H`, and so `J` is certainly satisfied by every relation `r` that satisfies `R`''s
    key constraints a fortiori. So trivial `JDs` are always "implied by keys," trivially.


    Third, then, consider nontrivial `JDs`. How do we determine whether some nontrivial
    `JD` `J` is implied by the keys of some relvar? This question does have a satisfactory
    answer, but it''s a little complicated, and for that reason I''ll defer it to
    the next section. Before then, I want to give a definition of `5NF` and say something
    about that definition:


    *   **Definition (`fifth normal form`):** Relvar `R` is in fifth normal form (`5NF`),
    also known as projection-join normal form (`PJ/NF`), if and only if every `JD`
    of `R` is implied by the keys of `R`.


    Now, it should be clear that if a `JD` is implied by the keys of `R`, it certainly
    holds in `R` (i.e., it''s certainly "a `JD` of `R`"). *But the converse is false:*
    A `JD` can hold in `R` without being implied by the keys of `R`. In other words,
    the whole point about the `5NF` definition is that the only `JDs` that hold in
    a `5NF` relvar are ones we can''t get rid of—which means ones implied by keys
    (including trivial ones as a special case).^([^(136)](#fn136))


    I''d like to close this section by pointing out an intuitively attractive parallelism
    between the `BCNF` and `5NF` definitions:


    *   `R` is in `BCNF` if and only if every `FD` that holds in `R` is implied by
    the keys of `R`.


    *   `R` is in `5NF` if and only if every `JD` that holds in `R` is implied by
    the keys of `R`.


    However, there''s a significant difference also. In the `BCNF` definition, we
    can simplify the phrase "implied by the keys" to "implied by *a* key" (meaning
    any key considered in isolation)—because, if relvar `R` has keys `K1`, ..., `Kn`
    and the `FD` `Ki` → `Y` holds in `R` for some key `Ki`, then the `FD` `Ki` → `Y`
    holds in `R` for all keys `Ki` (1 ≤ `i` ≤ `n`), necessarily. By contrast, no such
    simplification applies to `5NF`—the `JDs` that hold in a `5NF` relvar are `JDs`
    that are implied by the keys taken in combination, *not* necessarily just by some
    key considered in isolation. For example, let''s suppose for the moment that relvar
    `S` has two keys, `{SNO}` and `{SNAME}`. Then the following `JD` (a repeat of
    one we''ve seen several times already)—


    ```

    ☼ { { SNO , SNAME } , { SNO , STATUS } , { SNAME , CITY } }

    ```


    —would hold in that relvar. (To spell the point out, every relation that satisfies
    the two key constraints would satisfy this `JD`.) But a relation that doesn''t
    satisfy *both* of those two key constraints won''t necessarily satisfy the `JD`
    either, and the `JD` therefore doesn''t hold in the relvar, precisely because
    `{SNAME}` isn''t in fact a key. *Exercise:* Invent some sample data to demonstrate
    the truth of these claims.'
