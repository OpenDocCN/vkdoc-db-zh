    \ before the concrete.*\n> \n> —Z. A. Melzak: *Companion to Concrete Mathematics*\
    \ (1973)\n\nAs noted in the previous chapter, Boyce/Codd normal form (BCNF for\
    \ short) is defined in terms of functional dependencies (FDs); indeed, it’s really\
    \ *the* normal form with respect to functional dependencies, just as—to get ahead\
    \ of ourselves for a moment—5NF is really *the* normal form with respect to join\
    \ dependencies (JDs). The overall purpose of the present chapter is to explain\
    \ BCNF and FDs in detail; as the chapter title indicates, however, the various\
    \ explanations and associated definitions are all intentionally a little informal\
    \ at this stage. (Informal, but not inaccurate; I won’t tell any deliberate lies.)\
    \ A more formal treatment of the material appears in the next chapter.\n\n## First\
    \ Normal Form\n\nLet relation *r* have attributes *A1*, ..., *An*, of types *T1*,\
    \ ..., *Tn*, respectively. By definition, then, if tuple *t* appears in relation\
    \ *r*, the value of attribute *Ai* in *t* is, and of course must be, of type *Ti*\
    \ (*i* = 1, ..., *n*). For example, if *r* is the relation that’s the current\
    \ value of the shipments relvar SP (see Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1) in\
    \ Chapter [1](#489629_2_En_1_Chapter.xhtml)), then every tuple in *r* has an SNO\
    \ value that’s of type CHAR, a PNO value that’s also of type CHAR, and a QTY value\
    \ that’s of type INTEGER.\n\nNow, another way of saying what the first two sentences\
    \ of the previous paragraph say is simply that relation *r* is in *first normal\
    \ form* (1NF). Thus, *every* relation is in 1NF!—because a “relation” *r* for\
    \ which those two sentences fail to hold simply isn’t a relation in the first\
    \ place. My apologies for the repetition, therefore, but here for the record is\
    \ a precise definition:^([^(49)](#fn49))\n\n*   **Definition (first normal form):**\
    \ Let relation *r* have attributes *A1*, ..., *An*, of types *T1*, ..., *Tn*,\
    \ respectively. Then *r* is in first normal form (1NF) if and only if, for all\
    \ tuples *t* appearing in *r*, the value of attribute *Ai* in *t* is of type *Ti*\
    \ (*i* = 1, ..., *n*).\n\nTo say it in different words, 1NF just means that each\
    \ tuple in the relation in question contains exactly one value, of the appropriate\
    \ type, for each attribute. *Observe in particular, therefore, that 1NF places\
    \ absolutely no limitation on what those attribute types are allowed to be*.^([^(50)](#fn50))\
    \ They can even be relation types! That is, relations with relation valued attributes—RVAs\
    \ for short—are legal (you might be surprised to hear this, but it’s true). An\
    \ example is given in Figure [4-1](#489629_2_En_4_Chapter.xhtml#Fig1) below.\n\
    \n![../images/489629_2_En_4_Chapter/489629_2_En_4_Fig1_HTML.jpg](images/489629_2_En_4_Chapter/489629_2_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1\n\nA relation with a relation valued attribute\n\nI’ll have more\
    \ to say about RVAs in just a moment, but first I need to get a couple of small\
    \ points out of the way. To start with, I need to define what it means for a relation\
    \ to be *normalized:*\n\n*   **Definition (normalized):** Relation *r* is normalized\
    \ if and only if it’s in 1NF.\n\nIn other words, *normalized* and *first normal\
    \ form* mean exactly the same thing—all normalized relations are in 1NF, all 1NF\
    \ relations are normalized. The reason for this slightly strange state of affairs\
    \ is that *normalized* was the original (historical) term; the term *1NF* wasn’t\
    \ introduced until people started talking about 2NF and higher levels of normalization,\
    \ when a term was needed to describe relations^([^(51)](#fn51)) that weren’t in\
    \ one of those higher normal forms. Of course, it’s common nowadays for the term\
    \ *normalized* to be used to mean some higher normal form (often 3NF specifically,\
    \ or perhaps BCNF); indeed, I’ve been known to use it that way myself, though\
    \ I generally try not to—because strictly speaking such usage is sloppy and incorrect,\
    \ and it’s probably better avoided unless there’s no chance of confusion.\n\n\
    Turning to the second of my “small points”: Observe now that all of the discussions\
    \ in this section so far (the definitions in particular) have been framed in terms\
    \ of relations, not relvars. But since every relation that can ever be assigned\
    \ to a relvar is in 1NF by definition, no harm is done if we extend the 1NF concept\
    \ in the obvious way to apply to relvars as well—and it’s desirable to do so,\
    \ because (as we’ll see) all of the other normal forms are defined to apply to\
    \ relvars, not relations. In fact, it could be argued that the reason 1NF *is*\
    \ defined in terms of relations and not relvars has to do with the fact that it\
    \ was, regrettably, many years before that distinction (I mean the distinction\
    \ between relations and relvars) was properly drawn, anyway.\n\nBack to RVAs.\
    \ I’ve said, in effect, that relvars with RVAs are legal—but now I need to add\
    \ that from a design point of view, at least, such relvars are usually (not always)\
    \ contraindicated. Now, this fact doesn’t mean you should avoid RVAs entirely\
    \ (in particular, there’s no problem if some attribute of some query result happens\
    \ to be relation valued)—it just means we don’t usually want RVAs “designed into\
    \ the database,” as it were. I don’t want to get into a lot of detail on this\
    \ issue in this book; let me just say that relvars with RVAs tend to look very\
    \ much like the hierarchic structures found in older, nonrelational systems like\
    \ IMS,^([^(52)](#fn52)) and all of the old problems that used to arise with hierarchies\
    \ therefore raise their ugly head once again. Here for reference is a list of\
    \ some of those problems:\n\n*   The fundamental point is that hierarchies are\
    \ asymmetric. Thus, while they might make some tasks easier, they certainly make\
    \ others more difficult.\n\n*   As a specific illustration of the previous point,\
    \ queries in particular are asymmetric, as well as being more complicated than\
    \ their symmetric counterparts. For example, consider what’s involved in formulating\
    \ the queries “Get part numbers for parts supplied by supplier S2” and “Get supplier\
    \ numbers for suppliers who supply part P2” against the relation of Figure [4-1](#489629_2_En_4_Chapter.xhtml#Fig1).\
    \ The natural language versions of these queries are symmetric with respect to\
    \ each other, but their formulations in SQL^([^(53)](#fn53))—or **Tutorial D**,\
    \ or any other formal language, come to that—most certainly aren’t (see Exercise\
    \ 4.14).\n\n*   Similar remarks apply to security and integrity constraints.\n\
    \n*   Similar remarks apply to updates, perhaps with even more force.\n\n*   There’s\
    \ no guidance, in general, as to how to choose the “best” hierarchy. In the case\
    \ of suppliers and parts, for example, should we make parts subordinate to suppliers—which\
    \ is effectively what the design illustrated in Figure [4-1](#489629_2_En_4_Chapter.xhtml#Fig1)\
    \ does—or suppliers subordinate to parts?\n\n*   Even “natural” hierarchies like\
    \ organization charts and bill of materials structures are still best represented,\
    \ usually, by nonhierarchic designs."
  trans: "\n# 第四章 函数依赖与 BCNF（非正式讨论）\n\n> *在抽象概念之前教授具体内容，简直是罪过。*\n> \n> ——Z·A·梅尔扎克：《具体数学\
    \ companion》（1973）\n\n如前一章所述，Boyce/Codd 范式（简称 `BCNF`）是根据函数依赖（`FDs`）定义的；事实上，就函数依赖而言，它确实是*那个*范式——正如，我们稍提前说明一下，`5NF`\
    \ 就连接依赖（`JDs`）而言是*那个*范式一样。本章的主要目的是详细解释 `BCNF` 和 `FDs`；然而，正如章节标题所示，现阶段的各种解释及相关定义都特意采用了一点非正式的方式。（非正式，但不错误；我不会故意说谎。）更正式的处理方式将在下一章出现。\n\
    \n## 第一范式\n\n设关系 `r` 具有属性 `A1`, ..., `An`，其类型分别为 `T1`, ..., `Tn`。根据定义，如果元组 `t`\
    \ 出现在关系 `r` 中，那么 `t` 中属性 `Ai` 的值必须是类型 `Ti`（`i = 1, ..., n`）。例如，如果 `r` 是发货关系变量\
    \ `SP` 的当前值（参见第一章图 1-1），那么 `r` 中的每个元组都有一个类型为 `CHAR` 的 `SNO` 值，一个类型同样为 `CHAR` 的\
    \ `PNO` 值，以及一个类型为 `INTEGER` 的 `QTY` 值。\n\n现在，前两句话的另一种表述方式就是：关系 `r` 处于*第一范式*（`1NF`）。因此，*每一个*关系都在\
    \ `1NF` 中！——因为如果一个“关系” `r` 不满足那两句话，它首先就不是一个关系。因此，对于重复表示歉意，但以下记录在案的是精确定义：^(⁴⁹)\n\
    \n*   **定义（第一范式）：** 设关系 `r` 具有属性 `A1`, ..., `An`，其类型分别为 `T1`, ..., `Tn`。那么，`r`\
    \ 处于第一范式（`1NF`）当且仅当，对于 `r` 中出现的所有元组 `t`，属性 `Ai` 在 `t` 中的值属于类型 `Ti`（`i = 1, ...,\
    \ n`）。\n\n换句话说，`1NF` 仅仅意味着所讨论的关系中，每个元组对于每个属性都恰好包含一个适当类型的值。*因此要特别注意，`1NF` 绝对不限制这些属性类型可以是什么*。^(⁵⁰)\
    \ 它们甚至可以是关系类型！也就是说，具有关系值属性（简称 `RVAs`）的关系是合法的（你听到这个可能会惊讶，但这是真的）。一个例子见下图 4-1。\n\n\
    ![../images/489629_2_En_4_Chapter/489629_2_En_4_Fig1_HTML.jpg](img/489629_2_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1：一个具有关系值属性的关系\n\n关于 `RVAs` 我稍后还有话要说，但首先我需要处理几个小问题。首先，我需要定义什么是*规范化*的关系：\n\
    \n*   **定义（规范化）：** 关系 `r` 是规范化的当且仅当它处于 `1NF`。\n\n换句话说，*规范化* 和 *第一范式* 意义完全相同——所有规范化的关系都在\
    \ `1NF` 中，所有 `1NF` 的关系都是规范化的。这种有点奇怪状态的原因在于，*规范化* 是最初的（历史性的）术语；术语 *`1NF`* 直到人们开始讨论\
    \ `2NF` 及更高范式时才被引入，当时需要一个术语来描述那些^(⁵¹) 不属于那些更高范式的关系。当然，现在常见的情况是，*规范化* 一词被用来表示某种更高范式（通常是\
    \ `3NF`，或者可能是 `BCNF`）；事实上，我自己也曾经这样用过，尽管我通常尽量避免——因为严格来说，这种用法是草率且不正确的，除非不会引起混淆，否则最好避免。\n\
    \n转向我的“小问题”中的第二点：请注意，到目前为止本节的所有讨论（尤其是定义）都是围绕*关系*而非*关系变量*展开的。但由于根据定义，任何可以赋给一个关系变量的关系都处于\
    \ `1NF`，那么如果我们以显而易见的方式将 `1NF` 概念扩展到关系变量上也不会造成伤害——而且这样做是可取的，因为（我们将看到）所有其他范式都被定义为应用于关系变量，而非关系。事实上，可以说\
    \ `1NF` *之所以* 用关系而非关系变量定义，是因为一个令人遗憾的事实：关系与关系变量之间的区别过了很多年才被正确地区分开来。\n\n回到 `RVAs`。我实际上说过，带有\
    \ `RVAs` 的关系变量是合法的——但现在我需要补充一点，至少从设计的角度来看，这样的关系变量通常是（并非总是）不推荐的。这并不意味着你应该完全避免 `RVAs`（特别是，如果某个查询结果的某个属性恰好是关系值，那没有问题）——它只是意味着我们通常不希望将\
    \ `RVAs` “设计进数据库中”。我不想在本书中深入探讨这个问题；让我只说一点，带有 `RVAs` 的关系变量往往看起来非常像在 IMS^(⁵²) 等旧的、非关系系统中出现的层次结构，因此过去与层次结构相关的所有老问题都会再次出现。以下供参考，列出了其中一些问题：\n\
    \n*   根本点在于层次结构是不对称的。因此，虽然它们可能使某些任务更容易，但肯定使其他任务更困难。\n*   作为前一点的具体例证，查询本身也是不对称的，并且比它们对称的对应查询更复杂。例如，考虑针对图\
    \ 4-1 的关系制定查询“获取由供应商 S2 供应的零件的零件号”和“获取供应零件 P2 的供应商的供应商号”所涉及的工作。这些查询的自然语言版本彼此是对称的，但它们在\
    \ `SQL`^(⁵³)——或 **Tutorial D**，或任何其他正式语言——中的制定方式绝对不是对称的（见练习 4.14）。\n*   类似的评论也适用于安全性和完整性约束。\n\
    *   类似的评论也适用于更新，或许更有说服力。\n*   通常，没有指导说明如何选择“最佳”层次结构。以供应商和零件为例，我们应该让零件从属于供应商——这实际上是图\
    \ 4-1 所示设计的做法——还是让供应商从属于零件？\n*   即使是像组织结构图和物料清单结构这样“自然的”层次结构，通常也最好用非层次化设计来表示。\n"
- fmt: '## Violating First Normal Form


    By now you might be wondering, if all `relvars` are in `1NF` by definition, what
    it could possibly mean for something *not* to be in `1NF`. Perhaps surprisingly,
    this question does have a sensible answer. The point is, today’s commercial `DBMS`s
    don’t properly support `relvars` (or `relations`) at all—instead, they support
    a construct that for convenience I’ll call a `table`, though by that term I don’t
    necessarily mean to limit myself to the kinds of tables found in `SQL` systems
    specifically.^([^(54)](#fn54)) And tables, as opposed to `relvars`, might indeed
    not be in `1NF`. To elaborate:


    **Definition (normalized table):** A table is in first normal form (`1NF`)—equivalently,
    such a table is normalized—if and only if it’s a direct and faithful representation
    of some `relvar`.


    So of course the question is: What does it mean for a table to be a direct and
    faithful representation of a `relvar`? The answer to this question involves five
    basic requirements, all of which are immediate consequences of the fact that the
    value of a `relvar` at any given time is (of course) always a `relation` specifically:


    1.  The table never contains any duplicate rows.


    2.  There’s no left to right ordering to the columns.


    3.  There’s no top to bottom ordering to the rows.


    4.  All columns are regular columns.


    5.  Every row and column intersection always contains exactly one value of the
    applicable type, and nothing else.


    Requirements 1-3 are self-explanatory,^([^(55)](#fn55)) but the other two merit
    a little more explanation, perhaps. First, then, consider Requirement 4 (“All
    columns are regular columns”). In order to satisfy this requirement, the table
    in question must be such that both of the following are true:


    1.  Every column has a proper name (i.e., one that could be specified as a column
    name in a `CREATE TABLE` statement, in `SQL` terms), and that name is unique among
    the column names that apply to the table in question.


    2.  No row is allowed to contain anything extra, over and above values of those
    columns just mentioned. Thus, there are no “hidden” columns that can be accessed
    only by special operators instead of by regular column references (where a “regular
    column reference” is basically just a column name), and there are no columns that
    cause invocations of regular operators on rows to have irregular effects. In particular,
    therefore, there are no *identifiers* other than regular relational key values
    (no hidden “row IDs” or “object IDs,” as are unfortunately found in some `SQL`
    products today), and there are no hidden *timestamps* as are found in certain
    “temporal database” proposals in the literature.


    As for Requirement 5: Observe first of all that this requirement means that `null`s
    are prohibited (since `null`s, whatever else they might be, certainly aren’t values).
    More generally, however, the requirement is intended to address the issue of *data
    value atomicity*. That’s the one thing that “everybody knows” about `relations`
    in the relational model—namely, that attribute values within such `relations`
    are supposed to be atomic (right?). So what exactly does *atomic* mean in this
    context? Well, in his famous 1970 paper,^([^(56)](#fn56)) Codd merely said it
    meant “nondecomposable.” And in later writings he went on to say that *nondecomposable*
    in turn meant “nondecomposable by the `DBMS`,” which I take to mean there’s no
    way the user can ask the `DBMS` to perform some such decomposition, either explicitly
    or implicitly, on his or her behalf. All right, so let’s consider a few examples:


    *   *Character strings:* Are character strings nondecomposable in the foregoing
    sense? Clearly not—think of `SQL`’s `SUBSTRING`, `LIKE`, and concatenate operators,
    for example, all of which clearly rely on the fact that character strings in general
    have some internal structure and are thus decomposable into smaller pieces. Yet
    surely no one would argue that character strings shouldn’t be allowed in `relations`.


    *   *Fixed point numbers:* Can be decomposed into integer and fractional parts.


    *   *Integers:* Can be decomposed into their prime factors. (Of course, I realize
    this isn’t the kind of decomposability we usually consider in this context; I’m
    just trying to show that the notion of decomposability is itself open to a variety
    of interpretations.)


    *   *Dates and times:* Can be decomposed into year / month / day and hour / minute
    / second components, respectively.


    *   *Relational expressions:* Consider, e.g., view definitions in the catalog.
    Such expressions are certainly “decomposable”—decomposable by the `DBMS`, in fact—because
    if they weren’t, there’d be no point in keeping them in the catalog in the first
    place.


    The bottom line from all of these examples, and many others like them, is that
    if `relation` `r` has an attribute `A`, then the values of `A` within `r` can
    be *anything whatsoever*, just so long as they’re values of the type `T` that’s
    the type defined for that attribute `A`. And that type `T` in turn can be any
    type whatsoever!^([^(57)](#fn57)) It can even be a `relation` type (whence the
    possibility of `relation` valued attributes, discussed a few pages back).


    The `1NF` “atomicity” requirement is sometimes stated in the form “no repeating
    groups.” Indeed, I’ve stated it in that form myself in numerous earlier writings—in
    the previous edition of the present book in particular, where I attempted (but
    failed, I think) to give a precise definition of what a repeating group might
    be. On further reflection, I’ve come to the conclusion that it’s better not to
    try to think about repeating groups at all in this context, but rather to focus
    on (and then, as I’ve just done, to debunk!) the notion of atomicity instead.
    In other words, I now think the injunction against repeating groups is and always
    was essentially meaningless—and I hereby apologize to anyone who might have been
    misled by my earlier efforts in this regard.


    In conclusion, if any of the five requirements are violated, the table in question
    doesn’t “directly and faithfully” represent a `relvar`, *and all bets are off*.
    In particular, relational operators such as `join` are no longer guaranteed to
    work as expected (as you’ll already know if—as I assume—you’re familiar with `SQL`).
    The relational model deals with *`relation`* values and variables, and *`relation`*
    values and variables *only*.'
