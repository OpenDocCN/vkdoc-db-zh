    as well. (Of course, it’s true that other writers usually do at least talk about
    key and foreign key constraints—sometimes cardinality constraints too—but these
    particular constraints are really nothing more than important special cases of
    a much more general phenomenon.) In this connection, I’d like to draw your attention
    to the following remarks (somewhat paraphrased here) from *The Business Rule Book*
    (2nd edition), by Ron Ross (Business Rule Solutions Inc., 1997):


    Even though business rules (like the data itself) are “shared” and universal,
    traditionally they haven’t been captured in database design. Instead, they’ve
