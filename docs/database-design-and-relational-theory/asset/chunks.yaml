    \   [12](#489629_2_En_9_Chapter.xhtml#Fn12_source)\n\n# 10. JDs and 5NF (Formal)\n\
    \n> *After great pain, a formal feeling comes.*\n> \n> —Emily Dickinson:\n> \n\
    > *Poem No. 341* (c. 1862):\n> \n> Thomas H. Johnson (ed.):\n> \n> *The Complete\
    \ Poems of Emily Dickinson* (1960)\n\nJust as Chapter [5](#489629_2_En_5_Chapter.xhtml)\
    \ consisted of a more formal treatment of material introduced informally in Chapter\
