  trans: "\n# 第一版前言\n\n![](img/978-1-4842-5540-7_CoverFigure.jpg)\n\nISBN 978-1-4842-5539-1\
    \ e-ISBN 978-1-4842-5540-7 [`doi.org/10.1007/978-1-4842-5540-7`](https://doi.org/10.1007/978-1-4842-5540-7)\
    \ © C. J. Date 2019  \n本作品受版权保护。出版者保留所有权利，无论涉及材料的全部或部分，具体包括翻译、重印、插图复用、朗诵、广播、微缩胶片或其他任何物理方式的复制，以及信息存储与检索、电子改编、计算机软件，或目前已知或未来开发的任何类似或相异的方法论。本书可能出现商标名称、标识和图片。我们并非在每次出现商标名称、标识和图片时都使用商标符号，而是仅以编辑方式并为商标所有者利益使用这些名称、标识和图片，并无侵犯商标权的意图。本书中对商品名称、商标、服务标识及类似术语的使用，即使未特别标识，也不应被理解为对它们是否受专有权利约束的意见表达。尽管本书中的建议和信息在出版时被认为是真实准确的，但作者、编辑或出版商均不对可能存在的任何错误或遗漏承担法律责任。出版商对本出版物所含材料不作任何明示或暗示的担保。本书在全球范围内由\
    \ Springer Science+Business Media New York 发行，地址：233 Spring Street, 6th Floor,\
    \ New York, NY 10013。电话 1-800-SPRINGER，传真 (201) 348-4505，电子邮件 orders-ny@springer-sbm.com，或访问\
    \ www.springeronline.com。Apress Media, LLC 是一家加州有限责任公司，其唯一成员（所有者）是 Springer Science\
    \ + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州公司。\n\
    \n*在计算机领域，优雅并非可有可无的奢侈品，而是决定成败的品质。*\n——埃兹赫·W·迪杰斯特拉\n\n*拙劣的设计对设计者最为不利。*\n——赫西俄德\n\
    \n*值得注意的是，当本文任何部分显得沉闷时，其中必有设计。*\n——理查德·斯蒂尔爵士\n\n*正式设计学科的理念常因模糊的文化/哲学谴责（如“扼杀创造力”）而遭到排斥；这种现象在……所谓“人文学科”的浪漫化视野实际上将技术无能理想化的背景下更为显著……[我们]知道，为了可靠性和理智的控制，我们必须保持设计的简洁和清晰。*\n\
    ——埃兹赫·W·迪杰斯特拉\n\n*我的设计绝对光明磊落。*\n——佚名\n\n——— ♦♦♦♦♦ ———\n\n***谨以此书献给我的妻子琳迪和我的女儿莎拉与珍妮，并倾注我所有的爱***\n\
    \n本书最初是作为《数据库实战：从业者的关系理论》（O’Reilly，2005）一书中相对较短的一章开始的。该书后来被大幅扩展的版本《SQL 与关系理论：如何编写准确的\
    \ SQL 代码》（O’Reilly，2009）所取代，在那里，设计相关材料因与书籍主题略有偏离，不再自成一章，而是变成了一个（稍长的）附录。随后我开始着手准备后者的第二版。^(¹)\
    \ 在这项工作的过程中，我发现关于数据库设计这一主题有太多内容需要阐述，以至于该附录的篇幅几乎要膨胀到与全书不成比例的地步。既然这个主题正如我所说，本就偏离了那本书的主要重点，我决定快刀斩乱麻，将这些材料分离出来，单独成书：也就是您现在看到的这本。\n\
    \n由上述情况立即引出三点：\n\n*   首先，本书确实假定您熟悉《SQL 与关系理论》一书所涵盖的内容（特别是，它假定您确切知道`关系`、`属性`和`元组`是什么）。然而，我并不为此种情况致歉，因为本书面向数据库专业人士，而数据库专业人士无论如何都理应熟悉那本早期著作中的大部分内容。\n\
    *   其次，尽管有前一点所述，本书与那本早期著作之间不可避免地存在少量重叠。不过，我已尽力将这种重叠控制在最低限度。\n*   第三，本书中再次不可避免地包含了许多对那本早期著作的引用。本书中对其他出版物的引用大多以完整形式给出，如本例：\n\
    \    *   Ronald Fagin: “Normal Forms and Relational Database Operators,” Proc.\
    \ 1979 ACM SIGMOD International Conference on Management of Data, Boston, Mass.\
    \ (May/June 1979)\n\n    然而，特别是针对《SQL 与关系理论》一书的引用，从现在开始，我将以该缩写标题本身的形式给出。\n\n实际上，多年来我曾在不同地方发表过数篇关于设计理论各个方面的短文，本书的目的之一便是保留那些早期著述中的精华部分。但它并非仅仅是对先前发表材料的简单拼凑，我真诚地希望它不会被视为如此。一方面，它包含了许多新材料。另一方面，它对整个主题提出了一个更连贯，我认为也更好的视角（这些年来我自己也学到了很多！）。事实上，即使某部分文本基于早期出版物，相关内容也已彻底重写，并且我相信，得到了改进。\n\
    \n现在，关于数据库设计的书籍并不匮乏——那么这本有何不同？事实上，我认为市场上没有哪本书与这本完全相同。有许多关于设计实践的书（质量参差不齐，在我这个并非不偏不倚的人看来），但那些书（再次，根据我的个人意见）通常未能很好地解释底层理论。也有一些关于设计理论的书，但它们往往面向理论家而非实践者，且学术气息颇浓。我想做的是弥合这一鸿沟；换句话说，我想以实践者能够理解的方式来解释理论，并展示该理论为何具有重大的实际意义。我并非试图面面俱到；我不想讨论理论的每一个细节，而是专注于在我看来重要的部分（当然，对于我确实涵盖的部分，我的处理旨在尽可能精确和准确）。此外，我的目标是正式与非正式的明智结合；换句话说，我试图提供理论的一个平缓介绍，以便：\n\
    1.  您可以利用重要的理论成果来帮助实际进行设计，并且\n2.  如果您有兴趣，您将能够去阅读更学术的著作并理解它们。\n"
- fmt: "In the interest of readability, I’ve deliberately written a fairly short book,\
    \ and I’ve deliberately made each chapter fairly short, too. ^([²](#fn2)) (I’m\
    \ a great believer in doling out information in small and digestible chunks.)\
    \ Also, every chapter includes a set of exercises (answers to most of which are\
    \ given in Appendix  [D](#489629_2_En_21_Chapter.xhtml) at the back of the book),\
    \ ^([³](#fn3)) and I do recommend that you have a go at some of those exercises\
    \ if not all. Some of them are intended to show how to apply the theoretical ideas\
    \ in practice; others provide (in the answers if not in the exercises as such)\
    \ additional information on the subject matter, over and above what’s covered\
    \ in the main body of the text; and still others are meant—for example, by asking\
    \ you to prove some simple theoretical result—to get you to gain some understanding\
    \ as to what’s involved in “thinking like a theoretician.” Overall, I’ve tried\
    \ to give some insight into what design theory is and why it is the way it is.\n\
    \n## Prerequisites\n\nMy target audience is database professionals: more specifically,\
    \ database professionals with a more than passing interest in database design.\
    \ In particular, therefore, I assume you’re reasonably familiar with the relational\
    \ model, or at least with certain aspects of that model (Chapter [2](#489629_2_En_2_Chapter.xhtml)\
    \ goes into more detail on these matters). As already indicated, familiarity with\
    \ the `SQL and Relational Theory` book would be helpful.\n\n## Logical vs. Physical\
    \ Design\n\nThis book is about design `theory` ; by definition, therefore, it’s\
    \ about logical design, not physical design. Of course, I’m not saying physical\
    \ design is unimportant (of course not); but I am saying it’s a distinct activity,\
    \ separate from and subsequent to logical design. To spell the point out, the\
    \ “right” way to design a database is as follows:\n\n1.  Do a clean logical design\
    \ first. Then, as a separate and subsequent step:\n\n2.  Map that logical design\
    \ into whatever physical structures the target DBMS happens to support. ^([⁴](#fn4))\n\
    \nNote, therefore, that the physical design should be derived from the logical\
    \ design and not the other way around. (Ideally, in fact, the system should be\
    \ able to derive the physical design “automatically” from the logical design,\
    \ without the need for human involvement in the process at all.) ^([⁵](#fn5))\n\
    \nTo repeat, the book is about design theory. So another thing it’s not about\
    \ is the various ad hoc design methodologies—entity / relationship modeling and\
    \ the like—that have been proposed over the years, at one time or another. Of\
    \ course, I realize that certain of those methodologies are fairly widely used\
    \ in practice, but the fact remains that they enjoy comparatively little by way\
    \ of a solid theoretical basis. As a result, they’re mostly beyond the scope of\
    \ a book like this one. However, I do have a few remarks here and there on such\
    \ “nontheoretical” matters (especially in Chapters [8](#489629_2_En_8_Chapter.xhtml)\
    \ and [17](#489629_2_En_17_Chapter.xhtml) , also in Appendix  [C](#489629_2_En_20_Chapter.xhtml)\
    \ ).\n\n### About the Author\n\nFootnotes [1](#489629_2_En_BookFrontmatter_OnlinePDF.xhtml#Fn1_source)\
    \   [2](#489629_2_En_BookFrontmatter_OnlinePDF.xhtml#Fn2_source)   [3](#489629_2_En_BookFrontmatter_OnlinePDF.xhtml#Fn3_source)\
    \   [4](#489629_2_En_BookFrontmatter_OnlinePDF.xhtml#Fn4_source)   [5](#489629_2_En_BookFrontmatter_OnlinePDF.xhtml#Fn5_source)\n\
    \n# Part I: Setting the Scene\n\nThis part of the book consists of two introductory\
    \ chapters, the titles of which (“Preliminaries” and “Prerequisites,” respectively)\
    \ are more or less self-explanatory.\n\n## 1. Preliminaries\n\n> *(On being asked\
    \ what jazz is:)*\n\n> *Man, if you gotta ask, you’ll never know.*\n> \n> —Louis\
    \ Armstrong (attrib.)\n\nThis book has as its subtitle `Normal Forms and All That\
    \ Jazz`. Clearly some explanation is needed! First of all, of course, I’m talking\
    \ about design theory—database design theory, that is—and everybody knows that\
    \ normal forms are a major component of that theory; hence the first part of the\
    \ subtitle. But there’s more to that theory than just normal forms, and that fact\
    \ accounts for that subtitle’s second part. Third, it’s unfortunately the case\
    \ that—from the practitioner’s point of view, at any rate—design theory seems\
    \ to be riddled with terms and concepts that are hard to understand and don’t\
    \ seem to have much to do with design as actually done in practice. That’s why\
    \ I framed the latter part of my subtitle in colloquial (not to say slangy) terms;\
    \ I wanted to convey the idea that, although we’d necessarily be dealing with\
    \ “difficult” material on occasion, the treatment of that material would be as\
    \ undaunting and unintimidating as I could make it. But whether I’ve succeeded\
    \ in that aim is for you to judge, of course.\n\nI’d also like to say a little\
    \ more on the question of whether design theory has anything to do with design\
    \ as carried out in practice. Let me be clear: Nobody could, or should, claim\
    \ that database design is easy. But a sound knowledge of the theory can only help.\
    \ In fact, if you want to do design properly—if you want to build databases that\
    \ are as robust, flexible, and accurate as they’re supposed to be—then you simply\
    \ have to come to grips with the theory. There’s just no alternative: at least,\
    \ not if you want to claim to be a design professional. Design theory is the scientific\
    \ foundation for database design, just as the relational model is the scientific\
    \ foundation for database technology in general. And just as anyone professionally\
    \ involved in database technology in general needs to be familiar with the relational\
    \ model, so anyone involved in database design in particular needs to be familiar\
    \ with design theory. Proper design is so important! After all, the database lies\
    \ at the heart of so much of what we do in the computing world; so if it’s badly\
    \ designed, the negative impacts can be extraordinarily widespread."
  raw: "In the interest of readability, I’ve deliberately written a fairly short book,\
    \ and I’ve deliberately made each chapter fairly short, too. ^([²](#fn2)) (I’m\
    \ a great believer in doling out information in small and digestible chunks.)\
    \ Also, every chapter includes a set of exercises (answers to most of which are\
    \ given in Appendix  [D](#489629_2_En_21_Chapter.xhtml) at the back of the book),\
    \ ^([³](#fn3)) and I do recommend that you have a go at some of those exercises\
    \ if not all. Some of them are intended to show how to apply the theoretical ideas\
    \ in practice; others provide (in the answers if not in the exercises as such)\
    \ additional information on the subject matter, over and above what’s covered\
    \ in the main body of the text; and still others are meant—for example, by asking\
    \ you to prove some simple theoretical result—to get you to gain some understanding\
    \ as to what’s involved in “thinking like a theoretician.” Overall, I’ve tried\
    \ to give some insight into what design theory is and why it is the way it is.\n\
    \n## Prerequisites\n\nMy target audience is database professionals: more specifically,\
    \ database professionals with a more than passing interest in database design.\
    \ In particular, therefore, I assume you’re reasonably familiar with the relational\
    \ model, or at least with certain aspects of that model (Chapter [2](#489629_2_En_2_Chapter.xhtml)\
    \ goes into more detail on these matters). As already indicated, familiarity with\
    \ the*SQL and Relational Theory* book would be helpful.\n\n## Logical vs. Physical\
    \ Design\n\nThis book is about design*theory* ; by definition, therefore, it’s\
    \ about logical design, not physical design. Of course, I’m not saying physical\
    \ design is unimportant (of course not); but I am saying it’s a distinct activity,\
    \ separate from and subsequent to logical design. To spell the point out, the\
    \ “right” way to design a database is as follows:\n\n1.  Do a clean logical design\
    \ first. Then, as a separate and subsequent step:\n\n2.  Map that logical design\
    \ into whatever physical structures the target DBMS happens to support. ^([⁴](#fn4))\n\
    \nNote, therefore, that the physical design should be derived from the logical\
    \ design and not the other way around. (Ideally, in fact, the system should be\
    \ able to derive the physical design “automatically” from the logical design,\
    \ without the need for human involvement in the process at all.) ^([⁵](#fn5))\n\
    \nTo repeat, the book is about design theory. So another thing it’s not about\
    \ is the various ad hoc design methodologies—entity / relationship modeling and\
    \ the like—that have been proposed over the years, at one time or another. Of\
    \ course, I realize that certain of those methodologies are fairly widely used\
    \ in practice, but the fact remains that they enjoy comparatively little by way\
    \ of a solid theoretical basis. As a result, they’re mostly beyond the scope of\
    \ a book like this one. However, I do have a few remarks here and there on such\
    \ “nontheoretical” matters (especially in Chapters [8](#489629_2_En_8_Chapter.xhtml)\
    \ and [17](#489629_2_En_17_Chapter.xhtml) , also in Appendix  [C](#489629_2_En_20_Chapter.xhtml)\
    \ ).\n\n### About the Author\n\nFootnotes [1](#489629_2_En_BookFrontmatter_OnlinePDF.xhtml#Fn1_source)\
