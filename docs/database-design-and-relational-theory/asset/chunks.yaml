- fmt: '# 6. Preserving FDs


    > *Nature does require*

    >

    > *Her times of preservation*

    >

    > —William Shakespeare: *Henry VIII* (1613)


    Once again consider our usual suppliers relvar `S`. Since `{SNO}` is a key, that
    relvar is certainly subject to the FD `{SNO} → {STATUS}`. Thus, taking `X` as
    `{SNO}`, `Y` as `{STATUS}`, and `Z` as `{SNAME,CITY}`, Heath’s Theorem tells us
    we can decompose that relvar into relvars `SNC` and `ST`, where `SNC` has heading
    `{SNO,SNAME,CITY}` and `ST` has heading `{SNO,STATUS}`. Sample values for `SNC`
    and `ST` corresponding to the value shown for `S` in Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1)
    are shown in Figure [6-1](#489629_2_En_6_Chapter.xhtml#Fig1):


    ![../images/489629_2_En_6_Chapter/489629_2_En_6_Fig1_HTML.jpg](images/489629_2_En_6_Chapter/489629_2_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Relvars `SNC` and `ST`─sample values


    In this decomposition:


    -   Relvars `SNC` and `ST` are both in BCNF—`{SNO}` is the key for both, and the
    only nontrivial FDs that hold in those relvars are “arrows out of superkeys.”

    -   What’s more, the decomposition is certainly nonloss (as is in fact guaranteed
    by Heath’s Theorem)—if we join `SNC` and `ST` together, we get back to `S`.

    -   However, *the FD `{CITY} → {STATUS}` has been lost*—by which I mean, of course,
    that it’s been replaced by a certain multirelvar constraint, as explained in the
    previous chapter.^([^(79)](#fn79)) The multirelvar constraint in question can
    be stated as follows:


    ```sql

    CONSTRAINT ... WITH ( SNCT := JOIN { SNC , ST } ) :

    COUNT ( SNCT { CITY } ) =

    COUNT ( SNCT { CITY , STATUS } ) ;

    ```


    *Explanation:* What this constraint says is that if we join `SNC` and `ST`, we
    get a result—call it `SNCT`—in which the number of distinct cities is equal to
    the number of distinct city / status pairs. And the fact that this latter property
    holds is equivalent to saying that the FD `{CITY} → {STATUS}` holds in that join,
    and hence in the original relvar `S` also (since the decomposition was nonloss,
    meaning `S` and that join `SNCT` are logically identical).


    So we’ve “lost” an FD. What are the implications? Well, certainly the multirelvar
    constraint that replaces it is harder to state, as we’ve just seen. More to the
    point, perhaps, it’s harder to enforce: harder, that is, than it would have been
    with the preferred decomposition into projections `SNC` and `CT`, as illustrated
    in Figure [3-2](#489629_2_En_3_Chapter.xhtml#Fig2) in Chapter [3](#489629_2_En_3_Chapter.xhtml).^([^(80)](#fn80))
    For example, suppose we update relvar `SNC` to change the city for supplier `S1`
    from London to Athens; then we must also update relvar `ST` to change the status
    for supplier `S1` from 20 to 30—because if we don’t, then joining `SNC` and `ST`
    back together will produce a result that isn’t a legitimate value for relvar `S`.
    (By contrast, if we update relvar `SNC` to change the city for supplier `S2` from
    Paris to Athens, then we *don’t* have to update relvar `ST` as well—but we still
    have to inspect relvar `ST` in order to determine that fact.)


    It might be possible, given a well architected DBMS, to get the system to do that
    necessary inspection of relvar `ST` “automatically,” instead of the user having
    to do it. It might even be possible to get the system to perform any necessary
    additional updates “automatically,” too. Even in such a system, however, it’s
    still the case that the constraint is harder to enforce (i.e., more work still
    has to be done, even if it’s done by the system and not the user). In any case,
    such possibilities are just a pipedream at the time of writing—today’s commercial
    products mostly don’t even allow multirelvar constraints to be stated, in general,
    let alone enforce them; the foregoing possibilities are out of reach today, and
    dealing with (and in particular enforcing) such constraints is thus the user’s
    responsibility.


    So the message is: Try to choose a decomposition that preserves FDs instead of
    one that loses them. (In the case at hand, replacing the projection on `{SNO,STATUS}`
    by that on `{CITY,STATUS}` solves the problem.) Loosely speaking, in other words,
    if the FD `X → Y` holds in the original relvar, try not to choose a decomposition
    in which `X` winds up in one relvar and `Y` in another. *Note:* Of course, I’m
    assuming here that the decomposition isn’t being done on the basis of that FD
    `X → Y` itself—because if it is, we’ll effectively wind up with two `X`’s, one
    of which will be in the same relvar as `Y` (necessarily so) and the other won’t.
    I’m also assuming, tacitly, that `X → Y` is part of what’s called an *irreducible
    cover* for the total set of FDs that hold in the original relvar. I’ll be discussing
    irreducible covers later in this chapter.'
