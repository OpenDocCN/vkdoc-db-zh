    顺便提一下，我认为上述内容在很大程度上解释了为什么我不是 E/R（“实体/关系”）建模和类似图形化方法的粉丝。（你可能已经注意到前面章节中完全没有 E/R
    图之类的东西！）E/R 建模和类似方案的问题在于，它们不如形式逻辑强大——远不如。特别是，它们没有包含对量词（`EXISTS` 和 `FORALL`）^(²²⁵)
    的足够支持——这是一个严重的遗漏，因为约束的表述*总是*至少隐含地需要这种支持，或等效于此种支持的东西。^(²²⁶) 因此，这些方案和这些图完全无法表示除少数（虽然重要但有限）约束之外的所有约束。因此，虽然在高抽象层次上使用此类图来阐明整体设计可能是可以接受的，但认为此类图实际上就是*整个*设计则是误导性的，在某些方面是相当危险的。*恰恰相反*：设计是关系变量（这些图确实显示了）加上约束（这些图没有显示）。^(²²⁷)


    ## 示例 1


    我认为，作为一个研究领域，设计理论总体上仍然非常开放。为了支持这一观点，在本节及接下来的几节中，我想给出一些设计示例，这些设计（a）是完全规范化且完全正交的（至少在大多数情况下），但（b）仍然存在各种冗余（同样，在大多数情况下）。


    对于我的第一个例子，考虑下面这个简单的关系变量，它表示一组姓名和地址（谓词是 *人员姓名 NAME 居住在地址 ADDR*）：


    ```

    NADDR { NAME , ADDR }

    KEY { NAME }

    ```


    假设该关系变量中的属性 `ADDR` 是*元组值*的，其中相关元组具有属性 `STREET`、`CITY`、`STATE` 和 `ZIP`。（是的，元组值属性或
    TVA 是合法的，就像关系值属性或 RVA 是合法的一样——参见第 4 章——并且原因大致相同。）图 17-1 显示了该关系变量的一个示例值。


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig1_HTML.jpg](img/489629_2_En_17_Fig1_HTML.jpg)


    图 17-1


    关系变量 `NADDR`（属性 `ADDR` 为元组值）─示例值


    现在，为了示例的缘故，假设（如我们在练习 6.2 中所做的那样），每当两个 `ADDR` 值具有相同的 `ZIP` 分量时，它们也具有相同的 `CITY`
    和 `STATE` 分量。那么，上述设计显然涉及一些冗余。然而，这里并没有违反规范化。特别是，函数依赖


    ```

    { ZIP } → { CITY , STATE }

    ```


    *不*成立。（为什么不？*答案*：因为 FD 被定义为在属性之间成立，而不是在属性的分量之间成立。）


    话虽如此，让我现在指出，上述 FD 在用以下表达式的结果替换 `NADDR` 后是成立的：


    ```

    NADDR UNWRAP ( ADDR )

    ```


    **`Tutorial D`** 的 `UNWRAP` 操作符有效地将某个元组值属性替换为一组属性，每个分量一个；因此，上述表达式返回一个具有属性 `NAME`、`STREET`、`CITY`、`STATE`
    和 `ZIP` 的结果。当然，该结果仍然只有 2NF，甚至不是 BCNF，并且它仍然存在冗余。


    我们可能忍不住从这个例子得出结论，解包 TVA 是个好主意。但是，这是否足以被确立为良好设计的*原则*，而不仅仅是一个建议或经验法则？^(²²⁸)


    ## 示例 2


    Codd 可能会以属性 `ADDR` 的值不是“原子的”为由反对示例 1 的设计（尽管我不清楚他是否曾在其任何著作中明确处理过元组值属性本身的问题）。现在，我自己并不同意这个立场，原因在本书第
    4 章及其他地方有详细解释——但这个点不值得争论，因为我们显然可以用 `CHAR` 类型的属性替换该元组值属性，如图 17-2 所示。而 Codd 肯定会允许这种修改后的设计，然而它同样遭受着与示例
    1 中类似的冗余。


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig2_HTML.jpg](img/489629_2_En_17_Fig2_HTML.jpg)


    图 17-2


    修改后的关系变量 `NADDR`（属性 `ADDR` 为文本值）─示例值


    如果你不喜欢这个例子，可以考虑如果属性 `ADDR` 是某种用户定义类型（比如 `ADDRESS`）而不是 `CHAR` 类型，可能会发生什么。


    ## 示例 3


    与示例 2 中类似的冗余可能出现在 `DATE` 类型的属性中，如果这些属性包含——它们经常如此——星期几和日历日期（例如，“Friday, January
    18th, 2019”）。'
- fmt: "## Example 4\n\nMy next example is an extremely simple version of the familiar\
    \ employees-and-programmers database, in which all programmers are employees but\
    \ some employees aren’t programmers (as in Exercise 5.7 in Chapter [5](#489629_2_En_5_Chapter.xhtml)).\
    \ I note in passing that some people would say that employees and programmers\
    \ in this example correspond to an *entity supertype* and an *entity subtype*,\
    \ respectively.^([^(229)](#fn229)) Be that as it may, here’s the conventional\
    \ design:\n\n```\nEMP  { ENO }\nKEY { ENO }\nPGMR { ENO , LANG }\nKEY { ENO }\n\
    ```\n\nI’m assuming for simplicity that:\n\n1.  Employees in general have no attributes\
    \ of interest apart from `ENO` (because even if they do, it doesn’t materially\
    \ affect the situation).\n2.  Programmers have just one additional attribute,\
    \ `LANG` (programming language skill—e.g., “Java” or “SQL” or `Tutorial D`).\n\
    \nNow we have a choice: Record all employees in `EMP`, or record just the nonprogrammers\
    \ in `EMP`? Which is better? Well, if we record just the nonprogrammers in `EMP`,\
    \ the processing involved when an employee becomes or ceases to be a programmer\
    \ is slightly nontrivial (in both cases we have to delete a tuple from one relvar\
    \ and insert a tuple into the other). We also need to state and enforce the following\
    \ constraint:\n\n```\nCONSTRAINT ... IS_EMPTY ( JOIN { EMP , PGMR } ) ;\n```\n\
    \nNote too the implication if we want some other relvar to include a reference\
    \ to employees; normally such a reference would be a simple foreign key, but if\
    \ employees are split across two relvars as above it can’t be (at least, not with\
    \ foreign keys as conventionally understood).^([^(230)](#fn230))\n\nThe net of\
    \ such considerations is that this particular design is probably not recommended—instead,\
    \ we would probably want to record all employees in `EMP`.^([^(231)](#fn231))\
    \ Either way, however, the example displays no redundancy.^([^(232)](#fn232))\n\
    \n## Example 5\n\nNow I’d like to modify Example 4 slightly in order to make an\
    \ additional point. Suppose relvar `EMP` does include at least one additional\
    \ attribute, `JOB`; suppose further that a given employee is a programmer, and\
    \ is represented in relvar `PGMR`, if and only if the `JOB` value in that employee’s\
    \ tuple in `EMP` has the value `Programmer` (perhaps other values of `JOB`—`Janitor`,\
    \ for example—correspond to other relvars in the same kind of way). This kind\
    \ of situation is not at all uncommon in practice, by the way. Now there’s definitely\
    \ some redundancy, because the fact that some given employee `e` is a programmer\
    \ is represented twice—once by the fact that a tuple for `e` appears in `PGMR`,\
    \ and once by the fact that `e`’s tuple in `EMP` has the `JOB` value `Programmer`.\
    \ In fact the design is subject to the following equality dependency (as well\
    \ as many similar ones, possibly):\n\n```\nCONSTRAINT ...\nPGMR { ENO } = ( EMP\
    \ WHERE JOB = 'Programmer' ) { ENO } ;\n```\n\nNote, however, that there’s no\
    \ violation of orthogonality in this example, even though, given that all employees\
    \ (programmers included) are represented in `EMP`, it’s certainly the case that\
    \ the projection of `PGMR` on `{ENO}` is equal to a certain subset—it’s not a\
    \ restriction as such—of the projection of `EMP` on `{ENO}`.^([^(233)](#fn233))\
    \ But neither of those projections corresponds to a component of any irreducible\
    \ JD that holds in the pertinent relvar.^([^(234)](#fn234)) (Check the final version\
    \ of *The Principle of Orthogonal Design* in Chapter [16](#489629_2_En_16_Chapter.xhtml)\
    \ if you need to refresh your memory on this point.) Thus, a database can be fully\
    \ orthogonal and yet still exhibit some redundancy.\n\n## Example 6\n\nIn his\
    \ 1979 paper “Extending the Database Relational Model to Capture More Meaning”\
    \ (*ACM Transactions on Database Systems 4*, No. 4, December 1979), Codd proposed\
    \ a certain design discipline, which—simplifying slightly—can be described as\
    \ follows:\n\n*   Let *E* be an “entity type,” and let *ID* be a data type such\
    \ that every entity of type *E* has exactly one *primary identifier* (my term,\
    \ not Codd’s), of type *ID*. For example, *E* and *ID* might be the entity type\
    \ “suppliers” and the data type “character string,” respectively.\n*   Let *P1*,\
    \ ..., *Pn* be a set of “property types” such that every entity of type *E* has\
    \ at most one property of each of the types *P1*, ..., *Pn*. For example, in the\
    \ case of suppliers, *P1*, *P2*, and *P3* might be the property types “name,”\
    \ “status,” and “city” (so *n* = 3 in this example).\n    *Note:* I’m assuming\
    \ for the sake of the present discussion (only) that a given supplier can have\
    \ any subset of the three properties, including the empty subset in particular.\n\
    *   Corresponding to each entity type *E*, then, the database should contain:\n\
    \    1.  Exactly one *E-relvar* , with *ID* values for those entities of type\
    \ *E* that exist at some time, and\n    2.  Exactly one *P-relvar* for each *Pi*\
    \ (*i* = 1, ..., *n*), with {*ID* value, *Pi* value} pairs for each entity of\
    \ type *E* that exists at some time and has a property of type *Pi* at that time.\n\
    \nI’ll refer to this discipline as *the* *RM/T discipline* , since it’s part of\
    \ what Codd referred to, in that 1979 paper, as “the extended relational model\
    \ RM/T” (T for Tasmania, where Codd first presented his ideas for that extended\
    \ model). Applying the discipline to the case of suppliers specifically, we obtain\
    \ a design that looks like this (I ignore here for simplicity the fact that throughout\
    \ much of this book the FD `{CITY} -> {STATUS}` was supposed to hold in relvar\
    \ `S`):\n\n```\nS  { SNO }\nKEY { SNO } ;\nSN { SNO , SNAME }\nKEY { SNO }\nFOREIGN\
    \ KEY { SNO } REFERENCES S ;\nST { SNO , STATUS }\nKEY { SNO }\nFOREIGN KEY {\
    \ SNO } REFERENCES S ;\nSC { SNO , CITY }\nKEY { SNO }\nFOREIGN KEY { SNO } REFERENCES\
    \ S ;\n```\n\nEach of these relvars is in 6NF.^([^(235)](#fn235)) Figure [17-3](#489629_2_En_17_Chapter.xhtml#Fig3)\
    \ shows a set of sample values. *Note:* The values shown aren’t meant to correspond\
    \ exactly to our usual sample values, though they’re close. Observe in particular\
    \ that (a) supplier S3 has no status, (b) supplier S4 has no status and no city,\
    \ and (c) supplier S5 has no name, no status, and no city.\n\n![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig3_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig3_HTML.jpg)\n\
    \nFigure 17-3\n\nAn RM/T design for suppliers—sample values\n\nAs a matter of\
    \ fact, this kind of design actually has quite a lot to recommend it (at least,\
    \ it would do, given a well architected DBMS). For present purposes, however,\
    \ all I want to do is call your attention to the following: So long as every entity\
    \ of type *E* has at least one of the *n* properties, then such a design certainly\
    \ involves some redundancy—arguably, in fact, *strong* redundancy as defined by\
    \ Codd himself in his 1970 paper—because, at any given time, the value of the\
    \ E-relvar will be equal to the union of the projections of the P-relvars over\
    \ the identifier attribute. In the case of suppliers, for example, there would\
    \ be a constraint (an EQD, of course) that looks like this:\n\n```\nCONSTRAINT\
    \ ... S { SNO } = UNION { SN { SNO } ,\nST { SNO } ,\nSC { SNO } } ;\n```\n\n\
    *Note:* This particular redundancy doesn’t apply to Figure [17-3](#489629_2_En_17_Chapter.xhtml#Fig3),\
    \ though—i.e., the constraint isn’t satisfied, given the values shown in that\
    \ figure—because there’s one supplier (supplier S5) who doesn’t have any of the\
    \ three properties name, status, and city."
