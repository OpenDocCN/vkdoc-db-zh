  trans: '

    ## 为 PK:AK 区分辩护的论点


    在我详细探讨 `PK:AK` 区分的后果之前，我应首先审视为该区分辩护的论点。既然我自己也记录在案，是该区分的捍卫者^(²⁷⁶)，或许我应该从总结并事后反思我自己的论点开始！主要论点如下：


    ### 主要论点


    1.  放弃 `PK:AK` 区分将意味着，除其他事项外，“实体完整性规则”必须扩展到适用于所有候选键（至少是基关系变量中的所有候选键）。*注意：* 如果需要复习*候选键*这个术语，请参阅第
    1 章。


    正如我期望您所知，实体完整性规则是指基关系变量主键中的属性不允许为空值。现在，我长期以来一直主张无论如何都应该废除这条规则，部分原因在于它与空值有关（这是一个我断然拒绝的概念），部分原因在于它区分了基关系变量和其他关系变量，从而违反了`可互换性原则`（即基关系变量与视图）；因此，我现在发现这第一个支持
    `PK:AK` 区分的论点已经无关紧要了。


    *注意：* 如果您不熟悉`可互换性原则`，我应该解释其基本含义是：在基关系变量和视图之间不应有任何不必要的区分——视图对用户来说应具有与基关系变量相同的"外观和感觉"。


    2.  使用相同符号在任何地方标识给定实体的规范，使系统能够识别出这些引用确实都指向同一个事物。


    这个论点在其范围内显然是有效的，但我现在认为，所提到的规范应被视为非正式的指导方针，而非硬性规定。请参阅本附录后面的讨论——特别是 `applicants`
    和 `employees` 的例子——了解在实践中可能不希望遵循此类指导方针的情况。无论如何，所讨论的规范实际上与设计有关（换句话说，涉及如何在某些特定情况下应用关系模型），而不是关系模型本身；因此，特别是，它与关系模型本身是否应坚持主键无关。我当初提出这个论点时一定有点混淆了。


    3.  如果实体在不同地方以不同方式被标识，“元查询”——即对目录的查询——可能会更难以表述。例如，考虑一下，如果雇员有时通过员工编号被引用，有时通过社会保障号被引用，那么表述元查询“哪些关系变量引用了雇员？”会涉及什么。


    这里的想法基本上是，上述第 2 点提到的规范对用户和系统都可能有益。然而，在我看来，我们再次讨论的是非正式指导方针，而非绝对要求。


    4.  我的下一个观点并不完全是支持 `PK:AK` 区分的论点，而是对一个反对其区分的论点的批评。后者的论点如下：假设某个用户因安全原因无法看到某个主键；那么该用户需要通过某个备用键来访问数据；那么最初为什么要区分
    `PK:AK` 呢？


    我仍然觉得"这个后者的论点"不太有说服力，但当然，批评一个反对某个立场的论点并不能证明相反立场是正确的！


    5.  我的最后一点诉诸了奥卡姆剃刀原则（"如无必要，勿增实体"）。实际上，我当时是在论证，将所有候选键平等对待会使关系模型的元组级寻址方案不必要地复杂化。但现在很可能会被反驳（而且我现在也会这样反驳），奥卡姆剃刀实际上适用于相反的方向，主键和备用键的概念才是不必要的！——即，我们真正需要的只是候选键，或者换句话说，只需要*键*这个概念。


    ### 后续反思


    简而言之，上述论点在我看来不再那么有说服力了；唯一似乎仍然有效的，是上面第 2 和第 3 点总结的那个论点，而这个论点（如我所说）本身也并非真正论证需要在关系模型本身中做出
    `PK:AK` 区分。正如我也说过的，我现在认为该特定论点所支持的立场，更应被视为一种指导方针，而非不可违反的规则（再次，请参阅后面的例证）。


    我顺便注意到，我最初讨论这个问题时确实做了一些对冲……这是相关论文的另一段摘录（此处我稍作改写）：


    *   注意，如果我们同意暂时保留 `PK:AK` 区分，那么在未来某个时候如果需要，总是有可能消除这种区分。而且请注意，这个论点不适用于反方向：一旦我们致力于平等对待所有候选键，一个要求有特殊主键的系统将永远是非标准的。


    尽管我当时没有明说，但这段引述实际上构成了对`谨慎设计原则`的诉求，这是我仍然坚信的原则^(²⁷⁷)。事实上，我能够现在改变我对 `PK:AK` 区分的立场——这也正是我在做的——似乎本身就证明了该原则的正确性。


    ### Codd 的观点


    在结束本节之前，我指出，Codd 本人在同一论文中（他曾说选择主键没有形式化基础）也记录在案，是 `PK:AK` 区分的捍卫者（这并不奇怪，因为他是该区分的提出者）：


    *   如果允许任何关系变量拥有多个主键，将会出现严重问题……允许一个单一基关系变量拥有多个主键的后果……将是灾难性的。


    （我冒昧地在本段摘录中两次用 `relvar` 这个术语替换了 Codd 的术语*relation*。）他接着举了一个涉及具有"几种不同职责"——项目管理、部门管理、库存管理等——的雇员的例子，然后说：


    *   比较标识符的相等性……旨在确定涉及的是同一个雇员……如果用于雇员的标识符类型可能根据为比较选择了哪一对雇员标识[属性]而不同，那么这个目标将受到严重打击。


    嗯，我认为您可以看出这个论点本质上与上面第 2 和第 3 点给出的论点相同，而这个论点（a）正如我已经指出的，有些混淆，并且（b）正如我们将在本附录后面看到的，无论如何在仔细推敲下都无法完全站得住脚。

    '
- fmt: '## Relvars with Two or More Keys


    Now let’s consider some reasonably realistic examples of relvars with two or more
    keys. The first concerns a relvar `EXAM`, with attributes `S` (student), `J` (subject),
    and `P` (position), and predicate *Student S was examined in subject J and achieved
    position P in the class list*. For the sake of the example, let’s assume there
    are no ties (that is, no two students obtained the same position in the same subject).
    Then, clearly, given a student and subject, there’s exactly one corresponding
    position; equally, given a subject and position, there’s exactly one corresponding
    student. So the FDs `{S,J} → {P}` and `{J,P} → {S}` both hold, and `{S,J}` and
    `{J,P}` are both keys (or both candidate keys, if you prefer):


    ```

    EXAM { S , J , P }

    KEY { S , J }

    KEY { J , P }

    ```


    *Exercise:* What normal form is this relvar in?


    Here’s another example (it’s basically Exercise 14.3 from Chapter 14): We’re given
    a relvar representing marriages, with attributes `A`, `B`, and `C` and predicate
    *Person A married person B on date C*. Assuming no polygamy, and assuming also
    that no two persons marry each other more than once, every pair of attributes
    here is a key:


    ```

    MARRIAGE { A , B , C }

    KEY { A , B }

    KEY { B , C }

    KEY { C , A }

    ```


    And here’s yet another example, based on a simple airline application (the predicate
    is *Pilot `PILOT` takes a flight out from gate `GATE` at hour `HOUR` on day `DAY`*):


    ```

    ROSTER { DAY , HOUR , GATE , PILOT }

    KEY { DAY , HOUR , GATE }

    KEY { DAY , HOUR , PILOT }

    ```


    How do we choose the primary key in cases like the foregoing? What grounds are
    there for choosing one key over another? Codd’s criterion of “simplicity” doesn’t
    seem to help. Note too that whichever one we choose, we wind up with an unpleasant
    asymmetry; e.g., in the marriage example, we might find ourselves treating one
    spouse as “more equal than the other” (and thereby certainly offending someone).
    Why should we be forced to introduce such asymmetry? Asymmetry is usually not
    a good idea. Here again, repeated from Chapter 17, is that quote from Polya: “Try
    to treat symmetrically what is symmetrical, and do not destroy wantonly any natural
    symmetry.”


    Now, in all of the foregoing examples the keys were not only composite, they all
    overlapped one another (i.e., they had an attribute in common). Lest it be thought
    that it’s only when keys overlap that there might be difficulty in choosing the
    primary key, therefore, let me give a counterexample. Suppose we have a relvar
    `ELEMENT` representing the periodic table (i.e., the table of chemical elements).
    Then every element has a unique name (e.g., lead), a unique symbol (e.g., the
    symbol for lead is `Pb`), and a unique atomic number (e.g., the atomic number
    for lead is 82). The relvar thus clearly has three distinct keys, all of which
    are simple (i.e., they each involve just one attribute), and there’s obviously
    no overlap at all. On what grounds do we choose one of these three keys as the
    primary key? It seems to me a good case could be made for any of them, depending
    on circumstances.


    Here’s another familiar (perhaps all too familiar) example of a relvar with several
    keys, all of which are simple:


    ```

    TAX_BRACKET { LOW , HIGH , RATE }

    KEY { LOW }

    KEY { HIGH }

    KEY { RATE }

    ```


    Of course, I’m assuming here that no two taxable income ranges (`LOW` to `HIGH`)
    are subject to the same tax rate. *Note:* I suggested in Chapter 14 that tax brackets
    might better be represented as a single interval valued attribute (`RANGE`, say)
    instead of separate `LOW` and `HIGH` attributes. Even if it were, however, there
    would still be two nonoverlapping keys, `RANGE` and `RATE`.


    I could give many more examples, but by now my point is presumably clear: Not
    only are there no formal criteria for choosing one key over another, in those
    cases where there’s a choice, but sometimes there don’t appear to be any informal
    criteria either. Thus, it really doesn’t seem appropriate to insist that such
    a choice must always be made, even if it’s appropriate in some cases (perhaps
    even in most cases).


    There’s another important point that needs to be mentioned, a more formal one
    than most of those I’ve been making so far. Over the past 50 years a great deal
    of research has been carried out on dependency theory and further normalization,
    view updating, optimization (including semantic optimization in particular), and
    many other matters. And in all of this research it’s candidate keys, not primary
    keys, that play the crucial role. (Indeed, it must be, precisely because the research
    in question is formal. The candidate key concept is formally defined. The primary
    key concept isn’t.) Since this is so, it really doesn’t seem appropriate to insist
    *formally* on the `PK:AK` distinction—though, to repeat, it might be appropriate
    to recommend it *in*formally.


    Yet another point I want to make is that the `PK:AK` distinction seems to lead
    to an undesirable and unnecessary differentiation between base relvars and other
    relvars (at least according to Codd). That’s because, according to Codd, the relational
    model:


    *   *Requires* primary keys for base relvars;

    *   *Permits* but does not require them for views and snapshots; and

    *   Considers it “*completely unnecessary* for primary keys to be declared or
    deduced” for any other relvars (italics in the original).


    These statements are paraphrased (but only slightly) from the paper in which Codd
    said there was no formal basis for choosing the primary key. As a matter of fact,
    that paper goes so far as to suggest that relvars other than base ones might not
    even possess a primary key, a suggestion that if true surely raises serious questions
    about the concept in the first place (remember *The Principle of Interchangeability*).
    Be that as it may, my position on these matters is rather different. To be specific,
    I would say that:


    *   First, every relvar, base or derived, does have at least one key (because,
    of course, no relation, and a fortiori no relvar, ever permits duplicate tuples).

    *   Second, every base relvar must have at least one key explicitly declared.
    Preferably, of course, all such keys should be explicitly declared. (In fact,
    a base relvar key that’s not explicitly declared simply isn’t a key so far as
    the system—or the relational model itself, come to that—is concerned.)

    *   Often a base relvar will have an explicitly declared primary key in particular,
    but I don’t insist on this state of affairs as a hard requirement.

    *   For reasons explained in detail in *SQL and Relational Theory*, I believe
    the system should be able to deduce keys for derived relvars.

    *   The previous point notwithstanding, I believe it should also be possible to
    declare keys, explicitly, for derived relvars (for views and snapshots in particular).
    Again, see *SQL and Relational Theory* for further discussion.'
  raw: '## Relvars with Two or More Keys


    Now let’s consider some reasonably realistic examples of relvars with two or more
    keys. The first concerns a relvar EXAM, with attributes S (student), J (subject),
    and P (position), and predicate *Student S was examined in subject J and achieved
    position P in the class list*. For the sake of the example, let’s assume there
    are no ties (that is, no two students obtained the same position in the same subject).
    Then, clearly, given a student and subject, there’s exactly one corresponding
    position; equally, given a subject and position, there’s exactly one corresponding
    student. So the FDs {S,J} → {P} and {J,P} → {S} both hold, and {S,J} and {J,P}
    are both keys (or both candidate keys, if you prefer):


    ```

    EXAM { S , J , P }

    KEY { S , J }

    KEY { J , P }

    ```


    *Exercise:* What normal form is this relvar in?


    Here’s another example (it’s basically Exercise 14.3 from Chapter [14](#489629_2_En_14_Chapter.xhtml)):
    We’re given a relvar representing marriages, with attributes A, B, and C and predicate
    *Person A married person B on date C*. Assuming no polygamy, and assuming also
    that no two persons marry each other more than once, every pair of attributes
    here is a key:


    ```

    MARRIAGE { A , B , C }

    KEY { A , B }

    KEY { B , C }

    KEY { C , A }

    ```


    And here’s yet another example, based on a simple airline application (the predicate
    is *Pilot PILOT takes a flight out from gate GATE at hour HOUR on day DAY*):


    ```

    ROSTER { DAY , HOUR , GATE , PILOT }

    KEY { DAY , HOUR , GATE }

    KEY { DAY , HOUR , PILOT }

    ```


    How do we choose the primary key in cases like the foregoing? What grounds are
    there for choosing one key over another? Codd’s criterion of “simplicity” doesn’t
    seem to help. Note too that whichever one we choose, we wind up with an unpleasant
    asymmetry; e.g., in the marriage example, we might find ourselves treating one
