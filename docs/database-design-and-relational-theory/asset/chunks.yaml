    ## Concluding Remarks


    In this appendix I’ve presented a number of pragmatic arguments for:


    *   Relaxing the commonly accepted rule that every base relvar have a distinguished
    key called the primary key


    *   Relaxing the (perhaps less commonly accepted) rule that every foreign key
    refer specifically to a primary key instead of to an alternate key^([^(286)](#fn286))


