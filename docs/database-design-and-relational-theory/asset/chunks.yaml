    \ Tutorial,” Proc. 1971 ACM SIGFIDET Workshop on Data Description, Access, and\
    \ Control, San Diego, Calif., November 11th-12th, 1971; see Appendix [D](#489629_2_En_21_Chapter.xhtml)\
    \ once again). But I don’t think he ever mentioned it subsequently, at least not\
    \ in writing (because it was so intuitively obvious, perhaps).\n\n*Note* In case\
    \ you find the foregoing discussion too abstract, take *R* to be a relvar with\
    \ heading {CNO,T,X}, where T and X are relation valued and contain relations with\
    \ headings {TNO} and {XNO}, respectively. Separating the RVAs gives us relvars\
    \ with headings {CNO,T} and {CNO,X}, respectively. Ungrouping then gives us relvars\
    \ with headings {CNO,TNO} and {CNO,XNO}, respectively—which is precisely what\
    \ we want, of course, in the CTX example.\n\n8.  First of all, we’ll presumably\
    \ need three relvars for representatives, areas, and products, respectively:\n\
    \n```\n    R { RNO , ... } KEY { RNO }\n    A { ANO , ... } KEY { ANO }\n    P\
    \ { PNO , ... } KEY { PNO }\n    ```\n\nNext, we can represent the relationships\
    \ (a) between sales representatives and sales areas and (b) between sales representatives\
    \ and products by relvars like this:\n\n```\n    RA { RNO , ANO } KEY { RNO ,\
    \ ANO }\n    RP { RNO , PNO } KEY { RNO , PNO }\n    ```\n\nEvery product is sold\
    \ in every area. So if we introduce a relvar\n\n```\nAP { ANO , PNO } KEY { ANO\
    \ , PNO }\n```\n\nto represent the relationship between areas and products, then\
    \ we have the following constraint (an EQD):\n\n```\nCONSTRAINT C1 AP = JOIN {\
    \ A { ANO } , P { PNO } } ;\n```\n\n(The join here is actually a cartesian product.)\
    \ Note that this constraint implies that AP isn’t in 4NF. In fact, AP doesn’t\
    \ give us any information we can’t obtain from the other relvars. To be precise,\
    \ the following EQDs hold:\n\n```\nAP { ANO } = A { ANO }\nAP { PNO } = P { PNO\
    \ }\n```\n\nBut let’s assume for the moment that relvar AP is included in our\
    \ design anyway.\n\nNo two representatives sell the same product in the same area.\
    \ In other words, given an {ANO,PNO} combination, there’s exactly one responsible\
    \ sales representative, RNO, and so we can introduce a relvar\n\n```\nAPR { ANO\
    \ , PNO , RNO } KEY { ANO , PNO }\n```\n\nin which (to state it explicitly) the\
    \ following FD holds:\n\n```\n{ ANO , PNO } → { RNO }\n```\n\n(Specification of\
    \ {ANO,PNO} as a key is sufficient to express this FD.) However, relvars RA, RP,\
    \ and AP are now all redundant, since they’re all projections of APR; they can\
    \ therefore all be dropped. In place of constraint C1 we now need constraint C2\
    \ (another EQD):\n\n```\nCONSTRAINT C2 APR { ANO , PNO } = JOIN { A { ANO } ,\
    \ P { PNO } } ;\n```\n\nThis constraint must be separately and explicitly stated,\
    \ since it isn’t “implied by keys.”\n\nAlso, since every representative sells\
    \ all of that representative’s products in all of that representative’s areas,\
    \ we have the additional constraint C3 on relvar APR:\n\n```\n{ RNO } →→ { ANO\
    \ } | { PNO }\n```\n\n(These MVDs are nontrivial and not implied by keys, and\
    \ relvar APR is thus not in 4NF.)^([^(161)](#fn161)) Again the constraint must\
    \ be separately and explicitly stated.\n\nThus the final design consists of the\
    \ relvars R, A, P, and APR, together with the constraints C2 and C3 (both of which\
    \ are in fact EQDs once again):\n\n```\nCONSTRAINT C2 APR { ANO , PNO } = JOIN\
    \ { A { ANO } , P { PNO } } ;\nCONSTRAINT C3 APR = JOIN { APR { RNO , ANO } ,\
    \ APR { RNO , PNO } } ;\n```\n\n(There are also some foreign key constraints from\
    \ APR to the other three relvars, but the details are straightforward and I omit\
    \ them here.)"
  trans: '

    ## 答案


    ### 1.

    (a) 本章正文中的关系变量 `CTX` 是一个示例，当然，如果你能从自身工作环境提出一个例子则更好。

    (b) 设 `C` 为某个俱乐部，且关系变量 `R{A,B}` 满足：当且仅当 `a` 和 `b` 均是 `C` 的成员时，元组 `(a,b)` 才出现在
    `R` 中。那么 `R` 等于其投影 `R{A}` 和 `R{B}` 的笛卡尔积；因此，它服从连接依赖 ☼{*A*,*B*}，等价地，也服从以下多值依赖：

    ```

    { } →→ A | B

    ```

    这些多值依赖并非平凡的，因为它们肯定不在所有二元关系变量中成立，而且它们也不被超键所蕴含（`R` 中唯一的键是整个属性集）。由此可知 `R` 不属于 4NF。然而，它肯定属于
    BCNF，因为它是“全键”的。


    ### 2.

    可能的表述（注意这些是相等性依赖，EQDs）：

    ```

    CONSTRAINT ... CTX = JOIN { CTX { CNO , TNO } , CTX { CNO , XNO } } ;

    CONSTRAINT ... CTXD { CNO , TNO , XNO } = JOIN { CTXD { CNO , TNO } , CTXD { CNO
    , XNO } } ;

    ```


    ### 3.

    (a) 假设 `CTX` 的当前值如图 12-1 所示。那么图中所示的四个元组都无法单独被删除：这是一个删除异常。

    (b) 假设 `CTX` 的当前值仅包含图 12-1 所示的“前两个”元组。那么图中所示的“第三个”和“第四个”元组都无法单独插入：这是一个插入异常。


    ### 4.

    第 9 章中的关系变量 `SPJ` 是一个示例（除了平凡的依赖外，该关系变量中根本没有多值依赖成立，因此该关系变量肯定属于 4NF）。


    ### 5.

    以下证明可能被认为对如此明显的观点过于小题大做。设所讨论的投影为 `R''`。函数依赖 `X → Y` 在 `R''` 中成立，当且仅当，每当 `R''`
    的元组 `t1''` 和 `t2''` 具有相同的 `X` 值时，它们也具有相同的 `Y` 值。设 `T1` 和 `T2` 分别为 `R` 中导出 `t1''`
    的元组集合和导出 `t2''` 的元组集合。根据投影的定义，`T1` 中的每个元组 `t1` 都与 `t1''` 具有相同的 `X` 和 `Y` 值；同样地，`T2`
    中的每个元组 `t2` 都与 `t2''` 具有相同的 `X` 和 `Y` 值。由此可知，每当这样的元组 `t1` 和 `t2` 具有相同的 `X` 值时，它们也具有相同的
    `Y` 值；因此函数依赖 `X → Y` 在 `R` 中成立。进一步可以推出，`X → Y` 在 `R''` 中成立当且仅当它在 `R` 中成立。


    ### 6.

    该结果可直接从希斯定理（Heath’s Theorem）得出：如果 `R` 服从函数依赖 `X → Y`，那么它也服从连接依赖 ☼{*XY*,*XZ*}（其中
    `Z` 是 `R` 的“其余”属性），因此它也服从多值依赖 `X →→ Y | Z`。


    ### 7.

    连接依赖 ☼{*XY*,*XZ*} 是平凡的，当且仅当 `XY = H` 或 `XZ = H`。如果 `XY = H`，我们得到情况(b)。如果 `XZ =
    H`，那么（注意 `Y` 和 `Z` 根据定义不相交）必然是 `Y` 是 `X` 的子集，于是我们得到情况(a)。


    ### 8.

    该规则相当于说：如果我们从一个具有两个或多个独立关系值属性（RVA）的关系变量开始，并且我们想消除它们——我们通常（但并非总是）希望这样做（参见第 4 章习题
    4.11 的答案）——那么我们应该做的第一件事就是分离那些关系值属性。使用本练习的记法，此步骤将为我们分别得到具有属性集 `XY` 和 `XZ` 的关系变量。接下来我们应该做的，是在这些关系变量中对关系值属性进行解组操作。假设
    `Y` 和 `Z` 中的关系分别具有属性集 `A` 和 `B`；那么解组操作产生的关系变量将分别具有属性集 `XA` 和 `XB`。^(¹⁶⁰) 现在以常规方式对这些关系变量进行规范化，用
    BCNF 投影替换它们。那么这些 BCNF 投影将“自动地”属于 4NF。换句话说，如果遵循了上述程序，导致关系变量*不*属于 4NF 的多值依赖在实践中就不应该出现。


    顺便提一句，有趣的是，Codd 在他 1970 年关于关系模型的著名论文（见附录 D）中给出了一个例子，其中他实际上遵循了上述程序。次年他在另一篇论文中又简要提及（“Normalized
    Data Base Structure: A Brief Tutorial,” Proc. 1971 ACM SIGFIDET Workshop on Data
    Description, Access, and Control, San Diego, Calif., November 11th-12th, 1971；再次参见附录
    D）。但我认为他后来再也没有提到过它，至少没有书面提到（或许是因为它太直观明显了）。


    **注** 如果你觉得前面的讨论太抽象，不妨将 `R` 视为一个具有属性集 `{CNO,T,X}` 的关系变量，其中 `T` 和 `X` 是关系值的，并且分别包含具有属性集
    `{TNO}` 和 `{XNO}` 的关系。分离关系值属性后，我们分别得到具有属性集 `{CNO,T}` 和 `{CNO,X}` 的关系变量。解组后，我们分别得到具有属性集
    `{CNO,TNO}` 和 `{CNO,XNO}` 的关系变量——当然，这正是在 `CTX` 例子中我们想要的结果。


    首先，我们大概需要三个关系变量，分别用于代表、区域和产品：

    ```

    R { RNO , ... } KEY { RNO }

    A { ANO , ... } KEY { ANO }

    P { PNO , ... } KEY { PNO }

    ```

    接下来，我们可以通过像这样的关系变量来表示（a）销售代表和销售区域之间以及（b）销售代表和产品之间的关系：

    ```

    RA { RNO , ANO } KEY { RNO , ANO }

    RP { RNO , PNO } KEY { RNO , PNO }

    ```

    每个产品在每个区域都有销售。因此，如果我们引入一个关系变量

    ```

    AP { ANO , PNO } KEY { ANO , PNO }

    ```

    来表示区域和产品之间的关系，那么我们有以下约束（一个 EQD）：

    ```

    CONSTRAINT C1 AP = JOIN { A { ANO } , P { PNO } } ;

    ```

    （这里的连接实际上是笛卡尔积。）注意这个约束意味着 `AP` 不属于 4NF。实际上，`AP` 并没有给我们任何从其他关系变量无法获得的信息。准确地说，以下
    EQD 成立：

    ```

    AP { ANO } = A { ANO }

    AP { PNO } = P { PNO }

    ```

    但我们暂时假设关系变量 `AP` 无论如何都包含在我们的设计中。


    没有两个代表在同一个区域销售相同的产品。换句话说，给定一个 `{ANO,PNO}` 组合，有且只有一个负责的销售代表 `RNO`，因此我们可以引入一个关系变量

    ```

    APR { ANO , PNO , RNO } KEY { ANO , PNO }

    ```

    其中（明确说明）以下函数依赖成立：

    ```

    { ANO , PNO } → { RNO }

    ```

    （将 `{ANO,PNO}` 指定为键足以表达此函数依赖。）然而，关系变量 `RA`、`RP` 和 `AP` 现在都是冗余的，因为它们都是 `APR` 的投影；因此它们都可以被舍弃。现在，我们需要约束
    `C2`（另一个 EQD）来代替约束 `C1`：

    ```

    CONSTRAINT C2 APR { ANO , PNO } = JOIN { A { ANO } , P { PNO } } ;

    ```

    这个约束必须单独且明确地声明，因为它不是“由键所蕴含的”。


    此外，由于每个代表都在其所有销售区域销售其所有产品，我们在关系变量 `APR` 上有额外的约束 `C3`：

    ```

    { RNO } →→ { ANO } | { PNO }

    ```

    （这些多值依赖是非平凡的，且不被键所蕴含，因此关系变量 `APR` 不属于 4NF。）^(¹⁶¹) 同样，该约束必须单独且明确地声明。


    因此，最终设计由关系变量 `R`、`A`、`P` 和 `APR` 构成，同时包含约束 `C2` 和 `C3`（实际上两者又都是 EQD）：

    ```

    CONSTRAINT C2 APR { ANO , PNO } = JOIN { A { ANO } , P { PNO } } ;

    CONSTRAINT C3 APR = JOIN { APR { RNO , ANO } , APR { RNO , PNO } } ;

    ```

    （还有一些从 `APR` 到其他三个关系变量的外键约束，但细节很直接，此处省略。）

    '
- fmt: "This exercise illustrates very nicely the point that, in general, normalization\
    \ might be adequate to represent some of the semantic aspects of a given problem\
    \ (basically, FDs, MVDs, and JDs that are implied by keys), but explicit statement\
    \ of additional constraints will almost certainly be needed for other aspects.\
    \ It also illustrates the point that it might not always be desirable to normalize\
    \ “all the way” (relvar APR is in BCNF but not in 4NF).\n\nAs a subsidiary exercise,\
    \ you might like to consider whether a design involving RVAs might be appropriate\
    \ for the problem under consideration. Might such a design mean that some of the\
    \ comments in the previous paragraph no longer apply?\n\n1.  The first point to\
    \ note here is that the MVDs `A ->> B | C` and `A ->> C | D` make no mention of\
    \ attributes `D` and `B`, respectively. But didn’t I say that, given the generic\
    \ pair of MVDs `X ->> Y | Z`, the union of `X`, `Y`, and `Z` had to be equal to\
    \ the heading? Well, yes, I did—but I must now explain that we allow a certain\
    \ shorthand notation to be used as well, one that’s illustrated in this exercise.\
    \ For definiteness, let’s focus on the expression `A ->> B | C`. By definition,\
    \ this expression means `A ->> B` and `A ->> C`; and `A ->> B` implies `A ->>\
    \ CD`, and `A ->> C` implies `A ->> BD`. Moreover, since `A`, `B`, `C`, and `D`\
    \ are single attributes and hence mutually disjoint, the decomposition rule for\
    \ MVDs allows us to infer `A ->> D` from either `A ->> CD` or `A ->> BD`. Putting\
    \ this all together, we see that `A ->> B | C` is shorthand for either or both\
    \ of `A ->> B | CD` and `A ->> BD | C`. Given this state of affairs, moreover,\
    \ we adopt a shorthand according to which `A ->> B | CD` and `A ->> BD | C` can\
    \ both be written thus: `A ->> B | C | D`—and this latter expression in turn can\
    \ also be thought of as shorthand for the following *three* MVDs in combination:\
    \ `A ->> B`, `A ->> C`, and `A ->> D`.^([^(162)](#fn162))\n\nNow let’s try the\
    \ chase. Here are premise tuples for `A ->> C | D`, which as we’ve just seen is\
    \ equivalent to `A ->> BC | D`:\n\n```\n    x1   x2   x3  y14\n    x1  y22  y23\
    \   x4\n```\n\nApplying `A ->> B | CD` generates:\n\n```\n    x1   x2  y23   x4\n\
    \    x1  y22   x3  y14\n```\n\nApplying `B -> D` gives `y14 = x4`. Replacing:\n\
    \n```\n    x1   x2   x3   x4\n    x1  y22  y23   x4\n    x1   x2  y23   x4\n \
    \   x1  y22   x3   x4\n```\n\nAnd now we have a tuple of all `x`’s, so the given\
    \ dependencies do imply the target MVDs.\n\n2.  SCP can be define as a view (or\
    \ “virtual relvar”), thus:\n\n```\nVAR SCP VIRTUAL ( ( JOIN { S , SP , P } ) {\
    \ SNO , PNO , CITY } ) ;\n```\n\nThe following FD holds in this view:\n\n```\n\
    { SNO , PNO } -> { CITY }\n```\n\nIn fact, `{SNO,PNO}` is a key, and could be\
    \ declared as such, thus:^([^(163)](#fn163))\n\n```\nVAR SCP VIRTUAL ( ( JOIN\
    \ { S , SP , P } ) { SNO , PNO , CITY } )\nKEY { SNO , PNO } ;\n```\n\nThe following\
    \ (nontrivial) MVDs also hold:\n\n```\n{ CITY } ->> { SNO } | { PNO }\n```\n\n\
    Because of these MVDs, relvar SCP isn’t in 4NF, though it is in BCNF. As for “conventional\
    \ wisdom,” this example gives the lie to another popular misconception: viz.,\
    \ that a relvar consisting of a single key and a single nonkey attribute is necessarily\
    \ in 5NF (see Exercises 1.8 and 10.1).\n\nFootnotes [1](#489629_2_En_12_Chapter.xhtml#Fn1_source)\
    \   [2](#489629_2_En_12_Chapter.xhtml#Fn2_source)   [3](#489629_2_En_12_Chapter.xhtml#Fn3_source)\
    \   [4](#489629_2_En_12_Chapter.xhtml#Fn4_source)   [5](#489629_2_En_12_Chapter.xhtml#Fn5_source)\
    \   [6](#489629_2_En_12_Chapter.xhtml#Fn6_source)   [7](#489629_2_En_12_Chapter.xhtml#Fn7_source)\
    \   [8](#489629_2_En_12_Chapter.xhtml#Fn8_source)   [9](#489629_2_En_12_Chapter.xhtml#Fn9_source)\
    \   [10](#489629_2_En_12_Chapter.xhtml#Fn10_source)   [11](#489629_2_En_12_Chapter.xhtml#Fn11_source)\
    \   [12](#489629_2_En_12_Chapter.xhtml#Fn12_source)   [13](#489629_2_En_12_Chapter.xhtml#Fn13_source)\n\
    \n# Part IV: Further Normal Forms\n\n## Further Normal Forms\n\nTogether, Parts\
    \ II and III of this book have covered all of the normal forms included in what\
    \ Chapter [3](#489629_2_En_3_Chapter.xhtml) called “a first take” on the normal\
    \ form hierarchy (see Figure [3-3](#489629_2_En_3_Chapter.xhtml#Fig3)); to be\
    \ specific, they’ve discussed, in detail, the classical normal forms 1NF, 2NF,\
    \ 3NF, BCNF, 4NF, and 5NF, with the emphasis on BCNF and 5NF as the most significant\
    \ ones. But those six normal forms aren’t the end of the story!—there are several\
    \ more, and they constitute the primary subject matter of this part of the book.\n\
    \nPerhaps I should add that, of the three chapters in this part of the book, Chapter\
    \ [14](#489629_2_En_14_Chapter.xhtml) is probably the most important. The other\
    \ two are included mainly as an attempt on my part at some kind of completeness."
