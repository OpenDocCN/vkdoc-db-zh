  trans: '

    ## 关于术语的说明


    正如我确信你已注意到的，前一节中的引文主要以常见的“用户友好”术语——表、行和列（或字段）——来表达。相比之下，在本书中，我将倾向于使用更正式的术语 `关系`、`元组`（通常发音与
    `couple` 押韵）和 `属性`。如果我的这一决定使文本变得有点难以理解，我深表歉意，但我确实有我的理由。正如我在 *SQL 与关系理论* 一书中所说：^(⁷)


    > 我通常赞同使用更用户友好的术语的想法，前提是它们能帮助使这些概念更容易被接受。然而，在当前情况下，在我看来，遗憾的是，它们并没有使概念更容易被接受；相反，它们扭曲了概念，实际上对真正的理解事业造成了严重的损害。事实是，关系*不是*表，元组*不是*行，属性*不是*列。虽然在非正式语境下假装它们是一样的或许可以接受——事实上，我自己也经常这样做——但我认为，只有当所有相关方都理解那些更用户友好的术语只是对真相的近似，并且总体上未能捕捉到真正发生之事的本质时，这种做法才可以接受。换句话说：如果你确实理解了真实情况，那么明智地使用用户友好术语可能是个好主意；但首先，为了学习和理解那个真实情况，你确实需要掌握那些正式术语。


    对于以上内容，请允许我补充一点（正如我在前言中所说），我确实假设你确切知道 `关系`、`属性` 和 `元组` 是什么——尽管关于这些结构的正式定义实际上可以在第
    5 章中找到。


    还有一个术语问题我也需要先说明一下。关系模型当然是一种数据模型。然而不幸的是，“数据模型”这个术语在数据库领域有两个截然不同的含义。^(⁸) 第一个也是更基本的含义如下：


    **定义（数据模型，第一种含义）：** 对数据结构、数据操作符等进行的一种抽象的、自包含的逻辑定义，这些部分共同构成了用户与之交互的抽象机器。


    这是我们谈论关系模型时心中所想的含义：关系模型中的数据结构当然是关系，而数据操作符则是关系操作符，如投影、连接以及所有其他操作符。（至于定义中的“等等”，它涵盖了诸如键、外键及各种相关概念等事宜。）


    `数据模型` 这个术语的第二种含义如下：


    **定义（数据模型，第二种含义）：** 针对某个特定企业的数据（尤其是持久数据）所建立的模型。


    换句话说，第二种含义的数据模型只是一个（逻辑的、可能有些抽象的）数据库设计。例如，我们可能会谈到某个银行、医院或政府部门的数据模型。


    在解释了这两种不同的含义之后，我想请大家注意一个我认为能很好地阐明它们之间关系的类比：


    - 第一种含义的数据模型就像一门编程语言，其结构可用于解决许多具体问题，但其本身与任何此类具体问题并无直接联系。

    - 第二种含义的数据模型就像是用那门语言编写的一个具体程序——它使用第一种含义的模型所提供的设施，来解决某个具体问题。


    由以上所有内容可知，如果我们谈论的是第二种含义的数据模型，那么我们有理由以复数形式提及“关系模型”，或者使用不定冠词说“一个”关系模型。但如果我们谈论的是第一种含义的数据模型，那么*只有一个关系模型*，并且它是*这个*关系模型，使用定冠词。


    现在，你可能知道，大多数关于数据库设计的著作，特别是如果其重点在于实践而非底层理论，都专门在第二种含义上使用“模型”或“数据模型”这个术语。但是——*请务必注意！*——在本书中，我不遵循这种做法；实际上，除了偶尔指代关系模型本身，我根本不用“模型”这个术语。


    ## 贯穿全书的示例


    现在让我介绍一下我将作为本书后续大部分讨论基础的示例：那个熟悉的——甚至可以说是陈腐的——供应商-零件数据库。（我很抱歉又一次搬出这个老例子，但我确实相信，在各种不同的书籍和出版物中使用基本相同的例子，有助于而非阻碍学习过程。）示例值如次页的图
    1-1 所示。^(⁹) 详细说明如下：


    ![../images/489629_2_En_1_Chapter/489629_2_En_1_Fig1_HTML.jpg](img/489629_2_En_1_Fig1_HTML.jpg)


    图 1-1

    供应商-零件数据库——示例值


    - `供应商`：关系变量 `S` 表示供应商。^(¹⁰) 每个供应商有一个供应商编号（`SNO`），对于该供应商是唯一的；一个名称（`SNAME`），不一定是唯一的（尽管图
    1-1 中的 `SNAME` 值恰好是唯一的）；一个状态值（`STATUS`），表示供应商之间的某种排名或优先级；以及一个地点（`CITY`）。

    - `零件`：关系变量 `P` 表示零件（更准确地说，是零件的种类）。每种零件有一个零件编号（`PNO`），它是唯一的；一个名称（`PNAME`），不一定是唯一的；一种颜色（`COLOR`）；一个重量（`WEIGHT`）；以及一个存储该种零件的地点（`CITY`）。

    - `发货`：关系变量 `SP` 表示发货——它显示了哪些零件由哪些供应商供应或发运。每笔发货有一个供应商编号（`SNO`）、一个零件编号（`PNO`）和一个数量（`QTY`）。此外，为了示例方便，我假设在任何给定时间，对于给定的供应商和给定的零件，最多只有一笔发货，因此每笔发货都有一个唯一的供应商编号/零件编号组合。

    '
- fmt: '## Keys


    Before going any further, I need to review the familiar concept of `keys`, in
    the relational sense of that term. First of all, as I''m sure you know, every
    `relvar` has at least one `candidate` key. A candidate key is basically just a
    unique identifier; in other words, it''s a combination of attributes—often but
    not always a "combination" consisting of just a single attribute—such that every
    tuple in the relvar has a unique value for the combination in question. For example,
    with respect to the database of Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1):


    *   Every supplier has a unique supplier number and every part has a unique part
    number, so `{SNO}` is a candidate key for `S` and `{PNO}` is a candidate key for
    `P`.

    *   As for shipments, given the assumption that there''s at most one shipment
    at any given time for a given supplier and a given part, `{SNO,PNO}` is a candidate
    key for `SP`.


    Note the braces, by the way; to repeat, candidate keys are always combinations,
    or `sets`, of attributes (even when the set in question contains just one attribute),
    and the conventional representation of a set on paper is as a `commalist` of elements
    enclosed in braces.


    This is the first time I''ve mentioned the term `commalist`, which I''ll be using
    from time to time in the pages ahead. It can be defined as follows. Let `xyz`
    be some syntactic construct (for example, "attribute name"); then the term `xyz
    commalist` denotes a sequence of zero or more `xyz`''s in which each pair of adjacent
    `xyz`''s is separated by a comma (blank spaces appearing immediately before or
    after any comma are ignored). For example, if `A`, `B`, and `C` are attribute
    names, then the following are all attribute name commalists:


    ```

    A , B , C

    C , A , B

    B

    A , C

    ```


    So too is the empty sequence of attribute names.


    Moreover, when some commalist is enclosed in braces and thereby denotes a set,
    then (a) blank spaces appearing immediately after the opening brace or immediately
    before the closing brace are ignored, (b) the order in which the elements appear
    within the commalist is immaterial (because sets have no ordering to their elements),
    and (c) if an element appears more than once, it''s treated as if it appeared
    just once (because sets don''t contain duplicate elements).


    Next, as I''m sure you also know, a `primary` key is a candidate key that''s been
    singled out in some way for some kind of special treatment. Now, if the relvar
    in question has just one candidate key, then it doesn''t make any real difference
    if we call that key primary. But if the relvar has two or more candidate keys,
    then it''s usual to choose one of them to be primary, meaning it''s somehow "more
    equal than the others." Suppose, for example, that suppliers always have both
