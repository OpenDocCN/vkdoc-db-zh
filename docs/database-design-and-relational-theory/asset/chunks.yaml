- fmt: '### Our Choice of Name


    After Fagin, Darwen, and I had completed the bulk of our work on what became `ETNF`,
    our attention was drawn to a paper by Millist Vincent,^([^(172)](#fn172)) and
    in particular to the fact that our original name “redundancy free normal form”
    (`RFNF`) had already been used by Vincent to refer to something else. Since that
    name had been taken, therefore, we had to choose a different one, and of course
    we settled on “essential tuple normal form” (`ETNF`). Here’s the rationale for
    our choice. Let `R` be a relvar, let `r` be a value of `R`, and let `t` be a tuple
    in `r`. Then we define what it means for `t` to be either *partly* or *fully*
    redundant in `r`, thus:


    *   **Definition (partly redundant tuple):** Tuple `t` is partly redundant in
    `r` if and only if an `FD` `X → Y` holds in `R` and there exists a tuple `t′`
    in `r` (`t ≠ t′`) such that `t{X} = t′{X}`.

    *   **Definition (fully redundant tuple):** Tuple `t` is fully redundant in `r`
    if and only if there exists a set `s` of tuples in `r` (`t ∉ s`) such that, per
    some `JD` of `R`, the tuples in `s` force `t` to appear in `r`.


    Then we go on to define `t` to be redundant in `r` if and only if it’s either
    partly or fully redundant in `r`. Now, it should be immediately obvious that:

    1.  Such an `r` and `t` exist, and `t` is partly redundant in `r`, if and only
    if `R` is `FD` redundant.

    2.  Such an `r` and `t` exist, and `t` is fully redundant in `r`, if and only
    if `R` is `JD` redundant.^([^(173)](#fn173))


    Thus, taking *essential* to be an antonym of *redundant*, we define (a) `t` to
    be essential in `r` if and only if it’s not redundant in `r`, and (b) `R` to be
    in `ETNF` if and only if every relation `r` that’s a legitimate value for `R`
    is such that every tuple in `r` is essential in the foregoing sense.^([^(174)](#fn174))


    ## Redundancy Free Normal Form


    Now I turn to Vincent’s `RFNF`. Consider our usual suppliers relvar `S`, with
    attributes `SNO`, `SNAME`, `STATUS`, and `CITY`; sole key `{SNO}`; and explicit
    `FD {CITY} → {STATUS}`. A sample value is shown in Figure [13-2](#489629_2_En_13_Chapter.xhtml#Fig2)
    (basically just a repeat of Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1) from
    Chapter [3](#489629_2_En_3_Chapter.xhtml)):


    ![../images/489629_2_En_13_Chapter/489629_2_En_13_Fig2_HTML.jpg](images/489629_2_En_13_Chapter/489629_2_En_13_Fig2_HTML.jpg)


    Figure 13-2 The suppliers relvar—sample value


    Now, the tuple for supplier `S1` in the figure has city `London` and status `20`.
    As a consequence, the tuple for supplier `S4`, which also has city `London`, *must*
    have status `20`, for otherwise the `FD {CITY} → {STATUS}` would be violated.
    In a sense, therefore, the occurrence of that status value `20` in the tuple for
    supplier `S4` is redundant, because there’s nothing else it could possibly be—it’s
    a logical consequence of, and is fully determined by, the values appearing elsewhere
    in the overall relation.


    Examples like the foregoing provide the motivation for the following intuitively
    attractive definition (due to Vincent but considerably paraphrased here):


    *   **Definition (redundancy per Vincent):** Let relation `r` be a value of relvar
    `R`, let `t` be a tuple in `r`, and let `v` be an attribute value within `t`.
    Then that occurrence of `v` within `t` is redundant in `r`, and `R` is subject
    to redundancy, if and only if replacing that occurrence of `v` by an occurrence
    of `v′` (`v′ ≠ v`), while leaving everything else unchanged, causes some dependency^([^(175)](#fn175))
    of `R` to be violated.


    In other words, Vincent’s kind of redundancy exists if the attribute value occurrence
    in question *must* be `v` and nothing else. Note incidentally that a relation
    that contains a partly redundant tuple (according to our definition of that term)
    certainly displays Vincent’s kind of redundancy.


    Even though I said the foregoing definition is intuitively attractive (and I think
    it is), I should point out that in at least one respect it’s a little strange,
    too. Again consider the example of Figure [13-2](#489629_2_En_13_Chapter.xhtml#Fig2),
    in which the tuple for supplier `S4` has to have status value `20` because the
    tuple for supplier `S1` has status value `20`. Observe now that the reverse argument
    holds equally well: The tuple for supplier `S1` has to have status value `20`
    because the tuple for supplier `S4` has status value `20`! Now, it surely makes
    no sense to say those `20`’s are *both* redundant (does it?)—but that’s what the
    definition says if we take it literally. Thus, it seems to me that the definition
    is slightly weak and could do with a little tightening up. I’ll leave as an exercise
    for you to come up with such a tightened up definition, if you’re interested.


    Be all that as it may, let’s agree to refer to redundancy as just defined as “redundancy
    by Vincent’s definition .” Then we can define a new normal form, as follows:


    *   **Definition (redundancy free normal form):** Relvar `R` is in redundancy
    free normal form (`RFNF`) if and only if it’s not subject to redundancy by Vincent’s
    definition.^([^(176)](#fn176))


    Now, I hope it’s obvious that a relvar that’s not in `4NF` isn’t in `RFNF` as
    just defined.^([^(177)](#fn177)) But what about one that’s in `ETNF`? Well, consider
    the example of relvar `SPJ′` from the previous section (on `ETNF`) once again.
    As you’ll recall, that relvar suffers from neither `FD` redundancy nor `JD` redundancy
    and is thus in `ETNF` (though not in `5NF`). Now, we saw in that earlier section
    that if the relvar contains the following three tuples—


    ```

    t1  :  s1  p1  j2

    t2  :  s1  p2  j1

    t3  :  s2  p1  j1

    ```


    —then the following tuple has to appear as well:


    ```

    t4  :  s1  p1  j1

    ```


    But `{SNO,PNO}` is a key; it follows that (a) tuples `t1` and `t4`, since they
    have the same key value, are in fact one and the same, and hence that (b) `j1
    = j2`. Observe now, however, that the very fact that `j2`, in tuple `t1`, must
    be equal to `j1` means the relvar is subject to redundancy by Vincent’s definition!^([^(178)](#fn178))
    It follows that `RFNF` and `ETNF` are logically distinct; in fact, `RFNF` is strictly
    stronger than `ETNF`, in the sense that a relvar can be in `ETNF`—and hence redundancy
    free, by our definition—without being in `RFNF`, while the converse isn’t so.
    In fact, the `ETNF` paper proves the following stronger result:


    *   **Theorem:** `5NF ⇒ RFNF ⇒ ETNF ⇒ 4NF`, while none of the reverse implications
    hold.


    Note, therefore, that `ETNF` falls strictly between `4NF` and `RFNF`. Vincent
    also proves the following useful result:


    *   **Theorem:** Relvar `R` is in `RFNF` if and only if it’s in `BCNF` and, for
    every `JD` `J` that holds in `R`, the union of those components of `J` that are
    superkeys for `R` is equal to the heading of `R`.


    What Vincent actually does here is this: He defines relvar `R` to be in yet another
    normal form that he calls key complete normal form (`KCNF`) if and only if it
    satisfies the stated conditions (i.e., if and only if `R` is in `BCNF` and, for
    every `JD` `J` that holds in `R`, the union of those components of `J` that are
    superkeys for `R` is equal to the heading of `R`  ). Then he goes on to prove
    that `KCNF` and `RFNF` are in fact one and the same. In other words, his original
    `RFNF` definition is a semantic definition, while his `KCNF` definition—in effect,
    the foregoing theorem—is an operational or syntactic one.'
