  trans: "\n### 3. 使用视图\n\n显然，如果我们可以不仅仅是声明约束，而是能够实际告知系统派生数据所依据的规则，并让系统自动执行派生过程，那会更好。而我们确实可以做到；这正是视图机制的作用。具体来说，我们可以用一个同名的视图（或“虚拟关系变量”）来替换基础关系变量\
    \ `TOTALS`，如下所示：\n\n```\nVAR TOTALS VIRTUAL\n( SUMMARIZE PAYMENTS BY { CUSTNO\
    \ } :\n{ TOTAL := SUM ( AMOUNT ) } ) ;\n```\n\n现在用户不再需要担心维护派生数据；此外，约束 C12 现在已不可能被违反，甚至也不再需要声明它了，除非可能是非正式地（例如，作为告知用户视图语义的一种方式）。然而，请注意，必须明确告知用户不要试图去维护总计数据！这个事实并不意味着必须告知用户关系变量\
    \ `TOTALS` 是一个视图；它只是意味着用户必须被告知，维护任务实际上将由系统执行，用户不应干预。\n\n### 4. 使用快照\n\n然而，视图解决方案的缺点在于，每次引用视图时都会执行派生过程（即使自上次引用以来没有进行任何更新）。因此，如果整个操作的目标是在更新时执行派生工作以提升后续查询性能，那么视图方案显然就不够用了。在这种情况下，我们应该使用快照来代替视图：\n\
    \n```\nVAR TOTALS SNAPSHOT ... /* 假设语法 */\n( SUMMARIZE PAYMENTS BY { CUSTNO }\
    \ :\n{ TOTAL := SUM ( AMOUNT ) } )\nREFRESH ON EVERY UPDATE ;\n```\n\n快照概念起源于\
    \ Adiba 的一篇论文^(²⁴⁵)。基本上，快照和视图一样，都是派生关系变量；然而，与视图不同，它们是真实的，而非虚拟的——也就是说，它们不仅由其关于其他关系变量的定义来表示，而且（至少在概念上）还由其自身独立物化的数据副本表示。换句话说，定义快照很像执行查询，除了：\n\
    \n1.  查询的结果以指定名称（在示例中是 `TOTALS`）作为 *只读关系变量* 保存在数据库中（只读，即除了定期刷新外——参见下面的点 b）。\n\n\
    2.  定期（在示例中是 `ON EVERY UPDATE`）对快照进行 *刷新*——即丢弃其当前值，再次执行查询，该新执行的结果成为新的快照值。\n\n\
    \    `REFRESH` 子句的一般形式是\n\n```\nREFRESH [ ON ] EVERY <now and then>\n```\n\n其中\
    \ `<now and then>` 可能是，例如，`MONTH` 或 `WEEK` 或 `DAY` 或 `HOUR` 或 `n MINUTES` 或 `MONDAY`\
    \ 或 `WEEKDAY`（等等）。具体来说，`REFRESH ON EVERY UPDATE` 规范意味着快照与从中派生它的一个或多个关系变量保持永久同步——这大概正是我们在例\
    \ 12 中想要的。\n\n到目前为止，在本节中，我集中讨论了例 12 以及该例所展示的那种特定的“派生数据”。然而，事实是 *所有* 形式的冗余都可以被视为派生数据——如果\
    \ *x* 是冗余的，那么根据定义，*x* 可以从数据库中的其他东西派生出来。（将 *派生数据* 一词的使用局限于例 12 所说明的那种情况，因此是误导性的，不推荐。）由此可见，上述分析——特别是那四种不同的方法——可以推广到适用于所有类型的冗余，至少在原则上如此。请特别注意，其中第三种和第四种方法，分别使用视图和快照，都构成了有时称为\
    \ *受控* 冗余的例子。如果冗余确实存在（并且用户知晓它），但确保它永远不会导致任何不一致的“传播更新”任务是由系统而非用户管理的，则称该冗余是受控的。不受控的冗余可能是个问题，但受控的冗余不应该成为问题。事实上，我想更进一步——我想说，虽然可能无法完全消除冗余，甚至可能也不希望完全消除，但任何未被消除的冗余至少应该是受控的。特别是，我们需要对快照的支持^(²⁴⁶)。\n"
- fmt: "## Refining the Definition\n\n> Note: I’ve deliberately left this somewhat\
    \ lengthy section to the very end of the chapter (almost).\n\nConsider the shipments\
    \ relvar `SP`, with its predicate *Supplier `SNO` supplies part `PNO` in quantity\
    \ `QTY`*. Consider also the relation shown as the value of that relvar in Figure\
    \ [1-1](#489629_2_En_1_Chapter.xhtml#Fig1) in Chapter [1](#489629_2_En_1_Chapter.xhtml).\
    \ Observe that:\n\n1.  Two of the tuples in that relation are (`S1`,`P5`,`100`)\
    \ and (`S1`,`P6`,`100`).\n2.  Both of those tuples include (`S1`,`100`) as a subtuple.\n\
    \nWhat do those two appearances of that subtuple mean? Well, the appearance in\
    \ (`S1`,`P5`,`100`) means the following (I’ve numbered this proposition—note that\
    \ it is indeed a proposition—for purposes of future reference):\n\n1.  *Supplier\
    \ `S1` supplies some part in quantity `100`.*\n\nAnd the appearance in (`S1`,`P6`,`100`)\
    \ means exactly the same thing! So don’t we have here a situation in which the\
    \ database contains two distinct appearances of some (sub)tuple that represent\
    \ the very same proposition? In other words, in accordance with the definition\
    \ I gave in the introduction to this chapter, doesn’t the database contain some\
    \ redundancy?\n\nBefore I try to answer this question, I want to offer a simpler\
    \ illustration of the same point. With reference to Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1)\
    \ again, consider the six shipment (`SP`) tuples shown in that figure for supplier\
    \ `S1`. Clearly, those tuples all contain the subtuple (`S1`), of degree one.\
    \ And those six appearances of that subtuple all mean the same thing:\n\n2.  *Supplier\
    \ `S1` supplies some part in some quantity.*\n\nWe could even take the argument\
    \ one step further and consider the fact that *every* `SP` tuple—in fact, every\
    \ possible tuple, no matter what attributes it has—always has the 0-tuple as a\
    \ subtuple. Thus, there are twelve “appearances” (if you see what I mean!) of\
    \ that subtuple in the shipments relation of Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1),\
    \ and they all represent the following proposition:\n\n3.  *Some supplier supplies\
    \ some part in some quantity.*\n\nSo do we have redundancy on our hands here,\
    \ or don’t we? Well, notice that propositions 1-3 all involve some *existential\
    \ quantification*. Here then are slightly more formal versions of those same propositions\
    \ with that quantification made explicit and highlighted:\n\n1.  ***There exists\
    \ some part `PNO` such that*** *supplier `S1` supplies part `PNO` in quantity\
    \ `100`.*\n2.  ***There exists some part `PNO` such that there exists some quantity\
    \ `QTY`*** *such that supplier `S1` supplies part `PNO` in quantity `QTY`.*\n\
    3.  ***There exists some supplier `SNO` such that there exists some part `PNO`\
    \ such that there exists some quantity `QTY`*** *such that supplier `SNO` supplies\
    \ part `PNO` in quantity `QTY`.*\n\nIn these propositions, `SNO` in the third,\
    \ `QTY` in the second and third, and `PNO` in all three aren’t parameters—of course\
    \ not, since propositions never contain parameters!—but, rather, what the logicians\
    \ call *bound variables*, owing to the fact that they’re all “existentially quantified”\
    \ by the phrase *There exists some ... such that*.^([^(247)](#fn247)) *Note:*\
    \ If you’re unfamiliar with these notions (viz., bound variables and existential\
    \ quantification), you can find a tutorial treatment in *SQL and Relational Theory*.\
    \ However, I think the present discussion should be easy enough to follow even\
    \ if you don’t have any prior knowledge of such matters.\n\nIn contrast to the\
    \ foregoing, the propositions represented by tuples in the underlying relvar `SP`\
    \ don’t involve any existential quantifiers. That’s because they’re all just instantiations\
    \ of the relvar predicate (i.e., they’re all obtained just by substituting arguments\
    \ for the parameters of that predicate), and that predicate in turn, which is\
    \ as follows, involves no such quantifiers either:\n\n*   *Supplier `SNO` supplies\
    \ part `PNO` in quantity `QTY`.*\n\nTo summarize to this point, then, it looks\
    \ as if the following observations apply:\n\n1.  What might be called the *given*\
    \ propositions—the ones represented by tuples in the given relvars—are quantifier\
    \ free.\n\n    > It might not be quite true to say that such “given propositions”\
    \ are always quantifier free; consider, e.g., a relvar with attributes `WEIGHT`\
    \ and `HEIGHT` and predicate *Some person has weight `WEIGHT` and height `HEIGHT`*.\
    \ However, we can effectively eliminate the quantifiers in such a situation by\
    \ a process known as *skolemization* (after the logician T. A. Skolem). In the\
    \ example, that process involves replacing the original predicate by a predicate\
    \ of the form *Person `p` has weight `WEIGHT` and height `HEIGHT`* (where `p`\
    \ denotes some person or persons unknown). This latter predicate is quantifier\
    \ free.\n\n2.  By contrast, *derived* propositions—at least, derived propositions\
    \ that correspond to tuples obtained by taking projections of tuples in the given\
    \ relvars—do involve at least one existential quantifier, and possibly more than\
    \ one.\n\nNow, we surely don’t want to think of our usual shipments relvar `SP`\
    \ as being intrinsically redundant. So it looks as if what we might want to say\
    \ is something along the lines of the following:\n\n*   (*Warning: Tentative!*)\
    \ If the same proposition is represented twice, but that proposition is existentially\
    \ quantified, then that repetition doesn’t count as redundancy.\n\nBut wait a\
    \ minute—what about the suppliers relvar `S`, with its FD `{CITY} → {STATUS}`\
    \ (which I now want to assume does hold again)? An argument precisely analogous\
    \ to the foregoing would seem to suggest that, e.g., the tuple (`London`,`20`),\
    \ which appears as a subtuple in two of the supplier tuples depicted in Figure\
    \ [1-1](#489629_2_En_1_Chapter.xhtml#Fig1), represents the proposition:\n\n* \
    \  ***There exists some supplier `SNO` such that there exists some name `SNAME`\
    \ such that*** *supplier `SNO` is named `SNAME`, has status `20`, and is located\
    \ in city `London`.*\n\nClearly this proposition is existentially quantified;\
    \ yet it’s represented twice, and we *do* want that repetition to count as redundancy.\
    \ (As we know, relvar `S`, with its FD `{CITY} → {STATUS}`, isn’t in `BCNF`.)\
    \ So what’s going on?\n\nAs is so often the case, I believe the answer to this\
    \ question can be found by taking a closer look at the predicates. First, recall\
    \ from Chapter [14](#489629_2_En_14_Chapter.xhtml) that a predicate is *simple*\
    \ if and only if it involves no connectives, and *conjunctive* if it consists\
    \ of a set of other predicates connected by `AND` (and I’ll assume for present\
    \ purposes that those other predicates are all simple ones).^([^(248)](#fn248))\
    \ Now, the predicate for relvar `SP`, *Supplier `SNO` supplies part `PNO` in quantity\
    \ `QTY`*, is simple in the foregoing sense. By contrast, the predicate for relvar\
    \ `S` is conjunctive—it can be decomposed into a set of simple predicates. I can\
    \ make this latter fact more immediately obvious by stating the predicate in the\
    \ following slightly stilted but actually more logical form:\n\n*   *Supplier\
    \ `SNO` is named `SNAME`* **AND**\n*   *Supplier `SNO` is located in city `CITY`*\
    \ **AND**\n*   *City `CITY` has status `STATUS`.*\n\nFrom this version of the\
    \ predicate, then, it should be clear that:\n\n1.  Relvar `S` is subject to the\
    \ nontrivial, irreducible JD ☼{`SN`,`SC`,`CT`}, where the names `SN`, `SC`, and\
    \ `CT` denote the headings {`SNO`,`SNAME`}, {`SNO`,`CITY`}, and {`CITY`,`STATUS`},\
    \ respectively. (By contrast, the only JDs that hold in relvar `SP` are trivial\
    \ ones, and `SP` is in `6NF`. Relvar `S`, to repeat, isn’t even in `BCNF`.)\n\
    2.  Relvar `S` can therefore be nonloss decomposed in accordance with that JD.\
    \ The predicates for the corresponding projections are as follows:\n    *   `SN`:\
    \ *Supplier `SNO` is named `SNAME`.*\n    *   `SC`: *Supplier `SNO` is located\
    \ in city `CITY`.*\n    *   `CT*: *City `CITY` has status `STATUS`.*\n\nThese\
    \ predicates involve no existential quantification, and so the corresponding propositions\
    \ don’t, either.^([^(249)](#fn249))"
