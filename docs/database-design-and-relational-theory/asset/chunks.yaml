    \ are ones we can’t get rid of—which means ones implied by keys (including trivial\
    \ ones as a special case).^([^(154)](#fn154))\n\nRecall now from Chapter [10](#489629_2_En_10_Chapter.xhtml)\
    \ the parallelism between the BCNF and 5NF definitions. In fact, that parallelism\
    \ extends to the 4NF definition, too. That is, we have the following:\n\n*   *R*\
    \ is in BCNF if and only if every FD that holds in *R* is implied by the keys\
    \ of *R*.\n\n*   *R* is in 4NF if and only if every MVD that holds in *R* is implied\
    \ by the keys of *R*.\n\n*   *R* is in 5NF if and only if every JD that holds\
    \ in *R* is implied by the keys of *R*.\n\nNow, in the BCNF and 4NF definitions,\
    \ we can simplify “implied by the keys” to just “implied by some key”; as noted\
    \ in Chapter [10](#489629_2_En_10_Chapter.xhtml), however, the same is not true\
    \ for the 5NF definition. In that sense, 4NF resembles BCNF more than it does\
    \ 5NF. On the other hand, 4NF also resembles 5NF more than it does BCNF, in the\
    \ sense that the 4NF and 5NF definitions both rely on context—by which I mean\
    \ that the MVDs and JDs that hold in a 4NF or 5NF relvar involve, at least implicitly,\
    \ all of the attributes of that relvar, whereas the same is not true for BCNF.\
    \ (As I said earlier, the point about MVDs always going in pairs is important.\
    \ Nothing analogous applies to FDs.)\n\nRecall now from Chapter [6](#489629_2_En_6_Chapter.xhtml)\
    \ the concept of FD preservation. Essentially, the idea was as follows: If the\
    \ FD *X* → *Y* holds in relvar *R*, then the recommendation is to decompose *R*—assuming\
    \ that decomposition is desired at all, and assuming further that it’s done on\
    \ the basis of some FD other than *X* → *Y* itself—in such a way that *X* and\
    \ *Y* are kept together in the same projection. Well, that concept extends to\
    \ MVDs too—that is, the recommendation still applies if we replace the FD *X*\
    \ → *Y* by the MVD *X* →→ *Y* throughout.\n\nIn closing this section, let me state\
    \ explicitly that:\n\n1.  If relvar *R* is in 5NF, it’s certainly in 4NF; likewise,\
    \ if relvar *R* is in 4NF, it’s certainly in BCNF.\n\n2.  A relvar can be in 4NF\
    \ without being in 5NF (see Exercise 12.4 at the end of the chapter).\n\n3.  4NF\
    \ is always achievable. (In fact, of course, we know this already, because we\
    \ know that 5NF is always achievable, and now we also know that 5NF implies 4NF.)\n\
    \n## MVD Axiomatization\n\nAs I mentioned near the beginning of this chapter,\
    \ MVDs, unlike JDs in general, do have an axiomatization, or in other words a\
    \ sound and complete set of rules for generating “new” MVDs from given ones. The\
    \ rules in question are as follows:\n\n1.  *Reflexivity:* If *Y* is a subset of\
    \ *X*, then *X* →→ *Y*.\n\n2.  *Augmentation:* If *X* →→ *Y* and *Z* is a subset\
    \ of *W*, then *XW* →→ *YZ*.\n\n3.  *Transitivity:* If *X* →→ *Y* and *Y* →→ *Z*,\
    \ then *X* →→ *Z* – *Y*.\n\n4.  *Complementation:* If (a) the union of *X*, *Y*,\
    \ and *Z* is equal to the pertinent heading *H* and (b) the intersection of *Y*\
    \ and *Z* is a subset of *X*, then (c) *X* →→ *Y* | *Z*.\n\n    Now, these four\
    \ rules aren’t nearly as easy to understand or remember as Armstrong’s rules are\
    \ for FDs (or so it seems to me, at any rate). Partly for that reason, I won’t\
    \ attempt to justify them here, nor will I show them in action. However, I will\
    \ at least say that further rules can be derived from the original four, the following\
    \ among them:\n\n5.  *Pseudotransitivity:* If *X* →→ *Y* and *YZ* →→ *W*, then\
    \ *XZ* →→ *W* – *YZ*.\n\n6.  *Union:* If *X* →→ *Y* and *X* →→ *Z*, then *X* →→\
    \ *YZ*.\n\n7.  *Decomposition:* If *X* →→ *YZ* and *W* is the intersection of\
    \ *Y* and *Z*, then *X* →→ *Y* – *Z*, *X* →→ *Z* – *Y*, and *X* →→ *W*.\n\n  \
    \  The following rules involve both MVDs and FDs:\n\n8.  *Replication:* If *X*\
    \ → *Y*, then *X* →→ *Y*.\n\n9.  *Coalescence:* If (a) *X* →→ *Y*, (b) *Z* → *W*,\
    \ (c) *W* is a subset of *Y*, and (d) the intersection of *Y* and *Z* is empty,\
    \ then (e) *X* → *W*.\n\n    And the following is an additional derived rule:\n\
    \n10.  *Mixed pseudotransitivity:* If *X* →→ *Y* and *XY* → *Z*, then *X* → *Z*\
    \ – *Y*."
  trans: "\n## 第四范式\n\n听到存在一种叫做平凡多值依赖的东西，你可能不会感到惊讶：\n\n- **定义（`平凡多值依赖`）：** 设 `X →→\
    \ Y` 是关于关系模式 `H` 的一个多值依赖，记为 `M`。那么，`M` 是平凡的，当且仅当每个具有关系模式 `H` 的关系都满足它。\n- 根据这个定义，很容易证明以下定理（参见练习\
    \ 12.7）：\n- **定理：** 设 `X →→ Y` 是关于关系模式 `H` 的一个多值依赖，记为 `M`。那么，`M` 是平凡的，当且仅当 (a)\
    \ `Y` 是 `X` 的子集 或者 (b) `X` 和 `Y` 的并集等于 `H`。\n- 下一个定义你可能也不会感到惊讶：\n- **定义（由键蕴含的\
    \ `多值依赖`）：** 设关系变量 `R` 的关系模式为 `H`，并设 `X →→ Y` 是关于 `H` 的一个多值依赖，记为 `M`。那么，`M` 由\
    \ `R` 的键所蕴含，当且仅当每个满足 `R` 的键约束的关系 `r` 也满足 `M`。\n- 与函数依赖和连接依赖类似，这里的“由键蕴含”换成“由超键蕴含”也完全成立，不会产生实质性的差异。此外，如果\
    \ `M` 是平凡的，那么它被每个具有关系模式 `H` 的关系 `r` 所满足，因此它必然（a fortiori）被每个满足 `R` 的键约束的关系 `r`\
    \ 所满足。因此，平凡的多值依赖总是“由键蕴含”的，这是不言而喻的。那么，假设 `M` 是非平凡的。这样就很容易证明以下定理：\n- **定理：** 设 `M`\
    \ 是在关系变量 `R` 中成立的一个非平凡多值依赖。那么，`M` 由 `R` 的键所蕴含，当且仅当它可归结为从 `R` 的一个超键出发的一个 `函数依赖`——也就是说，双箭头可归结为单箭头，并且决定因素是一个超键。\n\
    \n现在我可以定义第四范式了：\n\n- **定义（第四范式）：** 关系变量 `R` 是第四范式（4NF）的，当且仅当 `R` 的每一个多值依赖都由 `R`\
    \ 的键所蕴含。\n\n然而，鉴于本节已经讨论过的各种定义和定理，我们可以看到以下可操作的定义（或定理）同样有效：\n\n- **定义（第四范式）：** 关系变量\
    \ `R` 是第四范式（4NF）的，当且仅当对于在 `R` 中成立的每一个非平凡多值依赖 `X →→ Y`，`X` 都是 `R` 的一个超键（换句话说，每一个这样的多值依赖都可归结为“从一个超键出发的函数依赖”）。\n\
    \n当然，如果一个多值依赖由 `R` 的键所蕴含，那么它肯定在 `R` 中成立——也就是说，它肯定是“`R` 的一个多值依赖”。然而，反之则不成立：一个多值依赖可以在\
    \ `R` 中成立，但并非由 `R` 的键所蕴含（如关系变量 CTX 所示）。因此，关于 4NF 定义的全部要点在于：在一个 4NF 关系变量中成立的唯一多值依赖，是我们无法摆脱的那些——也就是由键所蕴含的那些（包括平凡的特殊情况）。^(¹⁵⁴)\n\
    \n现在回忆一下第 10 章中 BCNF 和 5NF 定义之间的平行关系。实际上，这种平行关系也延伸到了 4NF 定义。也就是说，我们有以下关系：\n\n\
    - `R` 是 BCNF 的，当且仅当在 `R` 中成立的每个函数依赖都由 `R` 的键所蕴含。\n- `R` 是 4NF 的，当且仅当在 `R` 中成立的每个（非平凡）多值依赖都由\
    \ `R` 的键所蕴含。\n- `R` 是 5NF 的，当且仅当在 `R` 中成立的每个连接依赖都由 `R` 的键所蕴含。\n\n现在，在 BCNF 和 4NF\
    \ 定义中，我们可以将“由键蕴含”简化为“由某个键蕴含”；然而，如第 10 章所述，对于 5NF 定义情况并非如此。从这个意义上说，4NF 更类似于 BCNF\
    \ 而不是 5NF。另一方面，4NF 也比 BCNF 更类似于 5NF，因为 4NF 和 5NF 的定义都依赖于上下文——我指的是在一个 4NF 或 5NF\
    \ 关系变量中成立的多值依赖和连接依赖，至少隐式地涉及了该关系变量的所有属性，而对于 BCNF 则不是这样。（正如我前面所说，多值依赖总是成对出现这一点很重要。函数依赖则没有类似的情况。）\n\
    \n现在回忆一下第 6 章中关于函数依赖保持的概念。其核心思想如下：如果函数依赖 `X → Y` 在关系变量 `R` 中成立，那么建议是——假设确实需要分解，并且进一步假设分解是基于\
    \ `X → Y` 本身以外的某个函数依赖进行的——以保持 `X` 和 `Y` 在同一个投影中的方式进行分解。嗯，这个概念也可以扩展到多值依赖——也就是说，如果我们把函数依赖\
    \ `X → Y` 替换为多值依赖 `X →→ Y`，这个建议仍然适用。\n\n在结束本节之前，让我明确指出：\n\n1.  如果关系变量 `R` 是 5NF\
    \ 的，那么它肯定是 4NF 的；同样，如果关系变量 `R` 是 4NF 的，那么它肯定是 BCNF 的。\n2.  一个关系变量可以是 4NF 的，但不是\
    \ 5NF 的（参见本章末尾的练习 12.4）。\n3.  4NF 总是可达到的。（事实上，我们已经知道这一点，因为我们知道 5NF 总是可达到的，并且现在我们也知道\
    \ 5NF 蕴含 4NF。）\n\n## 多值依赖公理化\n\n正如我在本章开头提到的，多值依赖与一般的连接依赖不同，确实有一个公理化体系，换句话说，有一套可靠且完备的规则，用于从给定的多值依赖生成“新的”多值依赖。相关规则如下：\n\
    \n1.  *自反性：* 如果 `Y` 是 `X` 的子集，则 `X →→ Y`。\n2.  *增广性：* 如果 `X →→ Y` 且 `Z` 是 `W`\
    \ 的子集，则 `XW →→ YZ`。\n3.  *传递性：* 如果 `X →→ Y` 且 `Y →→ Z`，则 `X →→ Z - Y`。\n4.  *补足性：*\
    \ 如果 (a) `X`、`Y` 和 `Z` 的并集等于相关的关系模式 `H`，并且 (b) `Y` 和 `Z` 的交集是 `X` 的子集，则 (c) `X\
    \ →→ Y | Z`。\n\n    现在，这四条规则远不如 Armstrong 规则对于函数依赖那样容易理解或记忆（至少在我看来是这样）。部分出于这个原因，我不会在此试图证明它们，也不会展示它们如何运作。不过，我至少可以说，可以从原始的四条规则推导出更多的规则，其中包括以下几条：\n\
    \n5.  *伪传递性：* 如果 `X →→ Y` 且 `YZ →→ W`，则 `XZ →→ W - YZ`。\n6.  *合并：* 如果 `X →→ Y`\
    \ 且 `X →→ Z`，则 `X →→ YZ`。\n7.  *分解：* 如果 `X →→ YZ` 且 `W` 是 `Y` 和 `Z` 的交集，则 `X →→\
    \ Y - Z`、`X →→ Z - Y` 和 `X →→ W`。\n\n    以下规则同时涉及多值依赖和函数依赖：\n\n8.  *复制：* 如果 `X\
    \ → Y`，则 `X →→ Y`。\n9.  *合并：* 如果 (a) `X →→ Y`，(b) `Z → W`，(c) `W` 是 `Y` 的子集，并且\
    \ (d) `Y` 和 `Z` 的交集为空，则 (e) `X → W`。\n\n    以下是另一条推导出的规则：\n\n10.  *混合伪传递性：* 如果\
    \ `X →→ Y` 且 `XY → Z`，则 `X → Z - Y`。\n"
- fmt: "## Embedded Dependencies\n\n回忆第[9](#489629_2_En_9_Chapter.xhtml)章的关系变量`CTXD`，其属性为`CNO`、`TNO`、`XNO`和`DAYS`；唯一键为`{CNO,TNO,XNO}`；谓语为*Teacher\
    \ TNO spends DAYS days with textbook XNO on course CNO.*^([^(155)](#fn155))（这个关系变量可以看作是本章前面讨论的关系变量`CTX`的扩展版本。）一个示例值（重复自图[9-3](#489629_2_En_9_Chapter.xhtml#Fig3)）如图[12-2](#489629_2_En_12_Chapter.xhtml#Fig2)所示：\n\
    \n![../images/489629_2_En_12_Chapter/489629_2_En_12_Fig2_HTML.jpg](images/489629_2_En_12_Chapter/489629_2_En_12_Fig2_HTML.jpg)\n\
    图 12-2\n5NF关系变量`CTXD`——示例值\n\n正如我们在第[9](#489629_2_En_9_Chapter.xhtml)章所见，这个关系变量存在冗余；^([^(156)](#fn156))\
    \ 然而它处于5NF，这意味着除了由唯一键所隐含的连接依赖（JD）之外，不存在任何其他JD（因而更不存在任何多值依赖（MVD））。特别是，以下MVD\n\n\
    ```\n{ CNO } →→ { TNO } | { XNO }\n```\n\n并*不*成立。^([^(157)](#fn157)) 但是，请注意，与之相反，它们在`CTXD`在`{CNO,TNO,XNO}`上的投影中成立（对吧？）。因此，这些MVD被称为*嵌入依赖*（即相对于原始关系变量`CTXD`是嵌入的）。一般来说，给定某个具有标题`H`的关系变量`R`，一个相对于`R`的嵌入依赖是指一个在`R`本身中不成立，但在`R`在`H`的某个真子集上的投影中成立的依赖。如本例所示（并且正如实际上在第[9](#489629_2_En_9_Chapter.xhtml)章中以不同措辞指出的），嵌入依赖会导致冗余，但这种冗余无法通过取投影来消除。因此，这类冗余对应于必须单独声明和强制执行的约束（参见练习12.2）。\n\
    \n顺便提一下，请注意，上述嵌入概念适用于JD（进而适用于MVD）^([^(158)](#fn158))，但不适用于函数依赖（FD）。也就是说，给定某个关系变量`R`以及一个在标题中同时包含`X`和`Y`的`R`的投影，FD\
    \ `X` → `Y`在该投影中成立，当且仅当它在`R`本身中成立（参见练习12.5）。例如，FD `{CITY} → {STATUS}`在关系变量`S`中成立，也在该关系变量保留了这两个属性的每个投影中成立。\n\
    \n## Exercises\n\n1.  给出 (a) 一个度数至少为三、处于BCNF但不是4NF的关系变量的例子，以及 (b) 一个二元关系变量处于BCNF但不是4NF的例子。\n\
    2.  编写`Tutorial D`约束语句来表达 (a) 关系变量`CTX`中成立的MVD，以及 (b) 关系变量`CTXD`中成立的嵌入MVD，其中关系变量`CTX`和`CTXD`如本章正文所述。\n\
    3.  考虑本章正文中的关系变量`CTX`。该关系变量会发生哪些类型的更新异常？\n4.  给出一个处于4NF但不是5NF的关系变量的例子。\n5.  证明：给定某个关系变量`R`以及一个在标题中同时包含`X`和`Y`的`R`的投影，FD\
    \ `X` → `Y`在该投影中成立，当且仅当它在`R`本身中成立（参见本章正文的“嵌入依赖”一节，以及第[9](#489629_2_En_9_Chapter.xhtml)章的脚注5）。\n\
    6.  证明：如果关系变量`R`受FD `X` → `Y`约束，则它也受MVD `X` →→ `Y`约束。\n7.  设`X` →→ `Y`是关于标题`H`的一个MVD（记为`M`）。证明`M`是平凡的，当且仅当\
    \ (a) `Y`是`X`的子集，或者 (b) `X`与`Y`的并集等于`H`。顺便指出，由这个结果可知，给定一对MVD `X` →→ `Y` | `Z`（定义于标题`H`，其中`H`等于`X`、`Y`和`Z`的并集），`X`\
    \ →→ `Y`是平凡的当且仅当`X` →→ `Z`是平凡的。\n8.  实践中常采用以下经验法则：\n    设关系变量`R`的标题为`H`，且`H`被划分为不相交的子集`X`、`Y`和`Z`。进一步，设`X`为唯一键，并设`Y`和`Z`均为关系值。那么，再次使用Heath记号，`R`应被替换为`R1`和`R2`，其中`R1`\
    \ = `(*R*{*XY*}) UNGROUP (*Y*)`，`R2` = `(*R*{*XZ*}) UNGROUP (*Z*)`。^([^(159)](#fn159))\n\
    \    这条非正式法则与本章讨论的主题有何关联？\n9.  （*练习9.3的修改版*。）为以下场景设计一个数据库。需要表示的实体是销售代表、销售区域和产品。每位代表负责一个或多个区域的销售；每个区域有一位或多位负责的代表。每位代表负责一种或多种产品的销售，每种产品有一位或多位负责的代表。每种产品在每个区域销售；但是，没有两位代表在同一区域销售相同的产品。每位代表在其负责的每个区域销售相同的产品集。\n\
    10.  以下依赖是针对由属性`ABCD`组成的标题定义的：\n    ```\n    B → D\n    A →→ B | C\n    ```\n\
    \    使用追赶法证明这些依赖蕴含了MVD `A` →→ `C` | `D`。*注意*：我在这里使用了一种特定的简写记号，其中`A` →→ `B` | `C`和`A`\
    \ →→ `C` | `D`分别表示`A` →→ `B` | `CD`和`A` →→ `C` | `BD`。详见本题解答。\n11.  设关系变量`SCP`具有属性`SNO`、`PNO`和`CITY`，谓语为*Supplier\
    \ SNO and part PNO are both located in city CITY*。`SCP`能从我们常用的关系变量`S`、`P`和`SP`导出吗？它处于什么范式？你能想到这个例子可能与哪些传统智慧相悖吗？"
  raw: "## Embedded Dependencies\n\nRecall relvar CTXD from Chapter [9](#489629_2_En_9_Chapter.xhtml),\
    \ with attributes CNO, TNO, XNO, and DAYS; sole key {CNO,TNO,XNO}; and predicate\
    \ *Teacher TNO spends DAYS days with textbook XNO on course CNO.*^([^(155)](#fn155))\
    \ (This relvar can be regarded as an extended version of relvar CTX as discussed\
    \ earlier in this chapter.) A sample value, repeated from Figure [9-3](#489629_2_En_9_Chapter.xhtml#Fig3),\
    \ is shown in Figure [12-2](#489629_2_En_12_Chapter.xhtml#Fig2):\n\n![../images/489629_2_En_12_Chapter/489629_2_En_12_Fig2_HTML.jpg](images/489629_2_En_12_Chapter/489629_2_En_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2\n\nThe 5NF relvar CTXD—sample value\n\nAs we saw in Chapter [9](#489629_2_En_9_Chapter.xhtml),\
    \ this relvar suffers from redundancy;^([^(156)](#fn156)) yet it’s in 5NF, which\
    \ means that no JDs (and therefore no MVDs, a fortiori) hold apart from ones implied\
    \ by the sole key. In particular, therefore, the MVDs\n\n```\n{ CNO } →→ { TNO\
    \ } | { XNO }\n```\n\ndo *not* hold.^([^(157)](#fn157)) However, observe that,\
    \ by contrast, they do hold in the projection of CTXD on {CNO,TNO,XNO} (right?).\
    \ For that reason, those MVDs are said to be *embedded* dependencies (embedded,\
    \ that is, with respect to the original relvar CTXD). In general, given some relvar\
    \ *R* with heading *H*, an embedded dependency with respect to *R* is a dependency\
    \ that doesn’t hold in *R* itself but does hold in the projection of *R* on some\
    \ proper subset of *H*. As the example illustrates, therefore (and as was noted\
    \ in Chapter [9](#489629_2_En_9_Chapter.xhtml), in fact, albeit in different words),\
    \ embedded dependencies cause redundancy, but that redundancy can’t be eliminated\
    \ by taking projections. Such redundancies thus correspond to constraints that\
    \ must be separately stated and enforced (see Exercise 12.2).\n\nObserve, incidentally,\
    \ that the foregoing notion of embedding applies to JDs (and therefore to MVDs)^([^(158)](#fn158))\
    \ but not to FDs. That is, given some relvar *R* and a projection of *R* whose\
    \ heading includes both *X* and *Y*, the FD *X* → *Y* holds in that projection\
    \ if and only if it holds in *R* itself (see Exercise 12.5). For example, the\
    \ FD {CITY} → {STATUS} holds in relvar S as such and also in every projection\
    \ of that relvar that retains both of those attributes.\n\n## Exercises\n\n1.\
    \  Give (a) an example of a relvar of degree at least three that’s in BCNF but\
    \ not 4NF and (b) an example of a binary relvar that’s in BCNF but not 4NF.\n\n\
    2.  Write **Tutorial D** CONSTRAINT statements to express (a) the MVDs that hold\
    \ in relvar CTX and (b) the embedded MVDs that hold in relvar CTXD, where relvars\
    \ CTX and CTXD are as discussed in the body of the chapter.\n\n3.  Consider relvar\
    \ CTX from the body of the chapter. What kinds of update anomalies can occur with\
    \ that relvar?\n\n4.  Give an example of a relvar that’s in 4NF but not 5NF.\n\
    \n5.  Prove that, given some relvar *R* and a projection of *R* whose heading\
    \ includes both *X* and *Y*, the FD *X* → *Y* holds in that projection if and\
    \ only if it holds in *R* itself (see the section “Embedded Dependencies” in the\
    \ body of the chapter, also footnote 5 in Chapter [9](#489629_2_En_9_Chapter.xhtml)).\n\
    \n6.  Show that if relvar *R* is subject to the FD *X* → *Y*, it’s also subject\
    \ to the MVD *X* →→ *Y*.\n\n7.  Let *X* →→ *Y* be an MVD, *M* say, with respect\
    \ to heading *H*. Prove that *M* is trivial if and only if either (a) *Y* is a\
    \ subset of *X* or (b) the union of *X* and *Y* is equal to *H*. Incidentally,\
    \ note that it follows from this result that, given the pair of MVDs *X* →→ *Y*\
    \ | *Z* (defined with respect to heading *H*, where *H* is equal to the union\
    \ of *X*, *Y*, and *Z*), *X* →→ *Y* is trivial if and only if *X* →→ *Z* is trivial.\n\
    \n8.  The following rule of thumb is often adopted in practice:\n\n    Let relvar\
    \ *R* have heading *H* and let the heading *H* of *R* be partitioned into disjoint\
    \ subsets *X*, *Y*, and *Z*. Further, let *X* be the sole key and let *Y* and\
    \ *Z* both be relation valued. Then, using Heath notation once again, *R* should\
    \ be replaced by *R1* and *R2*, where *R1* = (*R*{*XY*}) UNGROUP (*Y*) and *R2*\
    \ = (*R*{*XZ*}) UNGROUP (*Z*), respectively.^([^(159)](#fn159))\n\n    How does\
    \ this informal rule relate to the topics discussed in the present chapter?\n\n\
    9.  (*Modified version of Exercise 9.3*.) Design a database for the following.\
    \ The entities to be represented are sales representatives, sales areas, and products.\
    \ Each representative is responsible for sales in one or more areas; each area\
    \ has one or more responsible representatives. Each representative is responsible\
    \ for sales of one or more products, and each product has one or more responsible\
    \ representatives. Each product is sold in each area; however, no two representatives\
    \ sell the same product in the same area. Each representative sells the same set\
    \ of products in each area for which that representative is responsible.\n\n10.\
    \  The following dependencies are defined with respect to a heading consisting\
    \ of attributes *ABCD*:\n\n    ```\n    B → D\n    A →→ B | C\n    ```\n\n   \
    \ Use the chase to show these dependencies imply the MVDs *A* →→ *C* | *D. Note:*\
    \ I’m making use of a certain shorthand notation here, according to which *A*\
    \ →→ *B* | *C* and *A* →→ *C* | *D* denote, respectively, *A* →→ *B* | *CD* and\
    \ *A* →→ *C* | *BD*. See the answer to this exercise for further explanation.\n\
    \n11.  Let relvar SCP have attributes SNO, PNO, and CITY and predicate *Supplier\
    \ SNO and part PNO are both located in city CITY*. Can SCP be derived from our\
    \ usual relvars S, P, and SP? What normal form is it in? Can you think of any\
    \ conventional wisdom this example might fly in the face of?"
  trans: "\n\n## 嵌入依赖\n\n回顾第 9 章的关系变量`CTXD`，其属性为`CNO`、`TNO`、`XNO`和`DAYS`；唯一键为`{CNO,TNO,XNO}`；谓语为*教师\
    \ TNO 在课程 CNO 上使用教材 XNO 花费了 DAYS 天。*^(¹⁵⁵)（这个关系变量可以看作是本章前面讨论的关系变量`CTX`的扩展版本。）一个示例值（重复自图\
    \ 9-3）如图 12-2 所示：\n\n![../images/489629_2_En_12_Chapter/489629_2_En_12_Fig2_HTML.jpg](img/489629_2_En_12_Fig2_HTML.jpg)\n\
    图 12-2\n5NF 关系变量`CTXD`——示例值\n\n正如我们在第 9 章所见，这个关系变量存在冗余；^(¹⁵⁶) 然而它处于 5NF，这意味着除了由唯一键所隐含的连接依赖（JD）之外，不存在任何其他\
    \ JD（因而更不存在任何多值依赖（MVD））。特别是，以下 MVD\n\n```\n{ CNO } →→ { TNO } | { XNO }\n```\n\
    \n并*不*成立。^(¹⁵⁷) 但是，请注意，与之相反，它们在`CTXD`在`{CNO,TNO,XNO}`上的投影中成立（对吧？）。因此，这些 MVD 被称为*嵌入依赖*（即相对于原始关系变量`CTXD`是嵌入的）。一般来说，给定某个具有标题`H`的关系变量`R`，一个相对于`R`的嵌入依赖是指一个在`R`本身中不成立，但在`R`在`H`的某个真子集上的投影中成立的依赖。如本例所示（并且正如实际上在第\
    \ 9 章中以不同措辞指出的），嵌入依赖会导致冗余，但这种冗余无法通过取投影来消除。因此，这类冗余对应于必须单独声明和强制执行的约束（参见练习 12.2）。\n\
    \n顺便提一下，请注意，上述嵌入概念适用于 JD（进而适用于 MVD）^(¹⁵⁸)，但不适用于函数依赖（FD）。也就是说，给定某个关系变量`R`以及一个在标题中同时包含`X`和`Y`的`R`的投影，FD\
    \ `X` → `Y`在该投影中成立，当且仅当它在`R`本身中成立（参见练习 12.5）。例如，FD `{CITY} → {STATUS}`在关系变量`S`中成立，也在该关系变量保留了这两个属性的每个投影中成立。\n\
    \n## 练习\n\n1.  给出 (a) 一个度数至少为三、处于 BCNF 但不是 4NF 的关系变量的例子，以及 (b) 一个二元关系变量处于 BCNF\
    \ 但不是 4NF 的例子。\n2.  编写`Tutorial D`约束语句来表达 (a) 关系变量`CTX`中成立的 MVD，以及 (b) 关系变量`CTXD`中成立的嵌入\
    \ MVD，其中关系变量`CTX`和`CTXD`如本章正文所述。\n3.  考虑本章正文中的关系变量`CTX`。该关系变量会发生哪些类型的更新异常？\n4.\
    \  给出一个处于 4NF 但不是 5NF 的关系变量的例子。\n5.  证明：给定某个关系变量`R`以及一个在标题中同时包含`X`和`Y`的`R`的投影，FD\
    \ `X` → `Y`在该投影中成立，当且仅当它在`R`本身中成立（参见本章正文的“嵌入依赖”一节，以及第 9 章的脚注 5）。\n6.  证明：如果关系变量`R`受\
    \ FD `X` → `Y`约束，则它也受 MVD `X` →→ `Y`约束。\n7.  设`X` →→ `Y`是关于标题`H`的一个 MVD（记为`M`）。证明`M`是平凡的，当且仅当\
    \ (a) `Y`是`X`的子集，或者 (b) `X`与`Y`的并集等于`H`。顺便指出，由这个结果可知，给定一对 MVD `X` →→ `Y` | `Z`（定义于标题`H`，其中`H`等于`X`、`Y`和`Z`的并集），`X`\
    \ →→ `Y`是平凡的当且仅当`X` →→ `Z`是平凡的。\n8.  实践中常采用以下经验法则：\n    设关系变量`R`的标题为`H`，且`H`被划分为不相交的子集`X`、`Y`和`Z`。进一步，设`X`为唯一键，并设`Y`和`Z`均为关系值。那么，再次使用\
    \ Heath 记号，`R`应被替换为`R1`和`R2`，其中`R1` = `(*R*{*XY*}) UNGROUP (*Y*)`，`R2` = `(*R*{*XZ*})\
    \ UNGROUP (*Z*)`。^(¹⁵⁹)\n    这条非正式法则与本章讨论的主题有何关联？\n9.  （*练习 9.3 的修改版*。）为以下场景设计一个数据库。需要表示的实体是销售代表、销售区域和产品。每位代表负责一个或多个区域的销售；每个区域有一位或多位负责的代表。每位代表负责一种或多种产品的销售，每种产品有一位或多位负责的代表。每种产品在每个区域销售；但是，没有两位代表在同一区域销售相同的产品。每位代表在其负责的每个区域销售相同的产品集。\n\
    10.  以下依赖是针对由属性`ABCD`组成的标题定义的：\n    ```\n    B → D\n    A →→ B | C\n    ```\n\
    \    使用追赶法证明这些依赖蕴含了 MVD `A` →→ `C` | `D`。*注意*：我在这里使用了一种特定的简写记号，其中`A` →→ `B` |\
    \ `C`和`A` →→ `C` | `D`分别表示`A` →→ `B` | `CD`和`A` →→ `C` | `BD`。详见本题解答。\n11.  设关系变量`SCP`具有属性`SNO`、`PNO`和`CITY`，谓语为*供应商\
    \ SNO 和零件 PNO 都位于城市 CITY。* `SCP`能从我们常用的关系变量`S`、`P`和`SP`导出吗？它处于什么范式？你能想到这个例子可能与哪些传统智慧相悖吗？\n\
    \n"
- fmt: '## Answers


    ### 1.

    (a) Relvar `CTX` in the body of the chapter is an example, of course, but it would
    be better if you could come up with an example from your own work environment.

    (b) Let `C` be a certain club, and let relvar `R{A,B}` be such that the tuple
    `(a,b)` appears in `R` if and only if `a` and `b` are both members of `C`. Then
    `R` is equal to the cartesian product of its projections `R{A}` and `R{B}`; thus,
    it’s subject to the JD ☼{*A*,*B*} and, equivalently, to the following MVDs:

    ```

    { } →→ A | B

    ```

    These MVDs aren’t trivial, since they certainly don’t hold in all binary relvars,
    and they’re not implied by a superkey either (the only key in `R` is the entire
    heading). It follows that `R` isn’t in 4NF. However, it’s certainly in BCNF, because
    it’s “all key.”


    ### 2.

    Possible formulations (note that these are equality dependencies, EQDs):

    ```

    CONSTRAINT ... CTX = JOIN { CTX { CNO , TNO } , CTX { CNO , XNO } } ;

    CONSTRAINT ... CTXD { CNO , TNO , XNO } = JOIN { CTXD { CNO , TNO } , CTXD { CNO
    , XNO } } ;

    ```


    ### 3.

    (a) Suppose the current value of `CTX` is as given in Figure 12-1. Then none of
    the four tuples shown can be deleted in isolation: a deletion anomaly.

    (b) Suppose the current value of `CTX` contains just “the first two” of the tuples
    shown in Figure 12-1. Then neither “the third” nor “the fourth” tuple shown can
    be inserted in isolation: an insertion anomaly.


    ### 4.

    Relvar `SPJ` from Chapter 9 is an example (no MVDs hold in that relvar at all,
    apart from trivial ones, and so the relvar is certainly in 4NF).


    ### 5.

    The following proof might be thought to make very heavy weather of such an obvious
    point. Let the projection in question be `R''`. The FD `X → Y` holds in `R''`
    if and only if, whenever tuples `t1''` and `t2''` of `R''` have the same `X` value,
    they also have the same `Y` value. Let `T1` and `T2` be, respectively, the set
    of tuples in `R` from which `t1''` is derived and the set of tuples in `R` from
    which `t2''` is derived. By the definition of projection, every tuple `t1` in
    `T1` has the same `X` and `Y` values as `t1''`; likewise, every tuple `t2` in
    `T2` has the same `X` and `Y` values as `t2''`. It follows that whenever such
    tuples `t1` and `t2` have the same `X` value, they also have the same `Y` value;
    thus the FD `X → Y` holds in `R`. And it further follows that `X → Y` holds in
    `R''` if and only if it holds in `R`.


    ### 6.

    This result is immediate from Heath’s Theorem: If `R` is subject to the FD `X
    → Y`, it’s also subject to the JD ☼{*XY*,*XZ*}, where `Z` is “the other” attributes
    of `R`, and therefore it’s subject to the MVDs `X →→ Y | Z`.


    ### 7.

    The JD ☼{*XY*,*XZ*} is trivial if and only if `XY = H` or `XZ = H`. If `XY = H`,
    we have Case (b). If `XZ = H`, then (noting that `Y` and `Z` are disjoint by definition)
    it must be the case that `Y` is a subset of `X`, and so we have Case (a).


    ### 8.

    The rule amounts to saying: If we start with a relvar with two or more independent
    relation valued attributes (RVAs) and we want to eliminate them—which we usually
    but not invariably do want to do (see the answer to Exercise 4.11 in Chapter 4)—then
    the first thing we should do is separate those RVAs. Using the notation of the
    exercise, this step will give us relvars with headings `XY` and `XZ`, respectively.
    The next thing we should do is ungroup the RVA in each of those relvars. Suppose
    the relations in `Y` and `Z` have headings `A` and `B`, respectively; then the
    relvars that result from those ungroupings will have headings `XA` and `XB`, respectively.^(^(160))
    Now normalize those relvars in the usual way, replacing them by BCNF projections.
    Then those BCNF projections will “automatically” be in 4NF. In other words, MVDs
    that cause a relvar *not* to be in 4NF shouldn’t arise in practice, if the foregoing
    procedure is followed.


    It’s interesting to note, incidentally, that in his famous 1970 paper on the relational
    model (see Appendix D), Codd gave an example in which he actually followed the
    foregoing procedure. He touched on it again, briefly, in another paper the following
    year (“Normalized Data Base Structure: A Brief Tutorial,” Proc. 1971 ACM SIGFIDET
    Workshop on Data Description, Access, and Control, San Diego, Calif., November
    11th-12th, 1971; see Appendix D once again). But I don’t think he ever mentioned
    it subsequently, at least not in writing (because it was so intuitively obvious,
    perhaps).


    **Note** In case you find the foregoing discussion too abstract, take `R` to be
    a relvar with heading `{CNO,T,X}`, where `T` and `X` are relation valued and contain
    relations with headings `{TNO}` and `{XNO}`, respectively. Separating the RVAs
    gives us relvars with headings `{CNO,T}` and `{CNO,X}`, respectively. Ungrouping
    then gives us relvars with headings `{CNO,TNO}` and `{CNO,XNO}`, respectively—which
    is precisely what we want, of course, in the `CTX` example.


    First of all, we’ll presumably need three relvars for representatives, areas,
    and products, respectively:

    ```

    R { RNO , ... } KEY { RNO }

    A { ANO , ... } KEY { ANO }

    P { PNO , ... } KEY { PNO }

    ```

    Next, we can represent the relationships (a) between sales representatives and
    sales areas and (b) between sales representatives and products by relvars like
    this:

    ```

    RA { RNO , ANO } KEY { RNO , ANO }

    RP { RNO , PNO } KEY { RNO , PNO }

    ```

    Every product is sold in every area. So if we introduce a relvar

    ```

    AP { ANO , PNO } KEY { ANO , PNO }

    ```

    to represent the relationship between areas and products, then we have the following
    constraint (an EQD):

    ```

    CONSTRAINT C1 AP = JOIN { A { ANO } , P { PNO } } ;

    ```

    (The join here is actually a cartesian product.) Note that this constraint implies
    that `AP` isn’t in 4NF. In fact, `AP` doesn’t give us any information we can’t
    obtain from the other relvars. To be precise, the following EQDs hold:

    ```

    AP { ANO } = A { ANO }

    AP { PNO } = P { PNO }

    ```

    But let’s assume for the moment that relvar `AP` is included in our design anyway.


    No two representatives sell the same product in the same area. In other words,
    given an `{ANO,PNO}` combination, there’s exactly one responsible sales representative,
    `RNO`, and so we can introduce a relvar

    ```

    APR { ANO , PNO , RNO } KEY { ANO , PNO }

    ```

    in which (to state it explicitly) the following FD holds:

    ```

    { ANO , PNO } → { RNO }

    ```

    (Specification of `{ANO,PNO}` as a key is sufficient to express this FD.) However,
    relvars `RA`, `RP`, and `AP` are now all redundant, since they’re all projections
    of `APR`; they can therefore all be dropped. In place of constraint `C1` we now
    need constraint `C2` (another EQD):

    ```

    CONSTRAINT C2 APR { ANO , PNO } = JOIN { A { ANO } , P { PNO } } ;

    ```

    This constraint must be separately and explicitly stated, since it isn’t “implied
    by keys.”


    Also, since every representative sells all of that representative’s products in
    all of that representative’s areas, we have the additional constraint `C3` on
    relvar `APR`:

    ```

    { RNO } →→ { ANO } | { PNO }

    ```

    (These MVDs are nontrivial and not implied by keys, and relvar `APR` is thus not
    in 4NF.)^(^(161)) Again the constraint must be separately and explicitly stated.


    Thus the final design consists of the relvars `R`, `A`, `P`, and `APR`, together
    with the constraints `C2` and `C3` (both of which are in fact EQDs once again):

    ```

    CONSTRAINT C2 APR { ANO , PNO } = JOIN { A { ANO } , P { PNO } } ;

    CONSTRAINT C3 APR = JOIN { APR { RNO , ANO } , APR { RNO , PNO } } ;

    ```

    (There are also some foreign key constraints from `APR` to the other three relvars,
    but the details are straightforward and I omit them here.)'
