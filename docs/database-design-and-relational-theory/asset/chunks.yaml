  trans: '

    请注意，前述的 `JD` 是三元的——它包含三个分量。更重要的是，它并非由 `FDs` 所蕴含^(¹²⁸)。因此，它当然也不是由键所蕴含（回想第 5 章，键约束只是
    `FD` 的一个特例）。其结果是，关系变量 `SPJ` 虽然处于 `BCNF`（因为它是“全键”的），却并未达到 `5NF`。


    为了更好地理解这种状况，回顾图 9-1 所示的 `SPJ` 示例值会很有帮助。图 9-2 展示了 (a) 对应于该示例值的投影 `SP`、`PJ` 和 `JS`
    的值，(b) 将 `SP` 和 `PJ` 投影（在 `{PNO}` 上）连接的效果，以及 (c) 将该结果与 `JS` 投影（在 `{JNO,SNO}` 上）连接的效果。如你所见，连接前两个投影会产生一个原始
    `SPJ` 关系的副本，外加一个额外的（“虚假”）元组；再连接另一个投影则消除了那个额外的元组，从而让我们回到了原始的 `SPJ` 关系。此外，无论我们为第一次连接选择哪一对投影，最终效果都是相同的，尽管每种情况下的中间结果不同。*练习：*
    验证这一说法。


    ![../images/489629_2_En_9_Chapter/489629_2_En_9_Fig2_HTML.jpg](img/489629_2_En_9_Fig2_HTML.jpg)


    **图 9-2**


    `SPJ` 是其所有三个二元投影的连接，而非任意两个的连接


    因此，再次强调，`JD` `☼{SP,PJ,JS}`——如果你现在允许我使用名称 `SP`、`PJ` 和 `SJ` 来指代相应的属性组而非投影本身——它在关系变量
    `SPJ` 中成立；换句话说，这个 `JD` 可以说捕捉了业务规则 `BRX` 的本质。因此，关系变量 `SPJ` 可以据此进行无损分解。而且，它很可能应该被分解，因为它存在冗余；具体来说，以图
    9-1 的示例值为例，“供应商 S1 向项目 J1 提供部件 P1”这一命题，既通过元组 (S1,P1,J1) 显式地表示，也作为 `JD` 以及其他三个元组所表示的命题的逻辑推论而隐式地存在。


    *更多术语：* 我们说像在 `SPJ` 例子中成立的这种 `JD` 是*元组强制*的，因为如果某些元组出现，它就会强制某些额外的元组也必须出现。例如在图 9-1
    中，三个元组 (S1,P1,J2)、(S1,P2,J1) 和 (S2,P1,J1) 的出现，强制了元组 (S1,P1,J1) 的出现。请注意，并非所有的 `JDs`
    都是元组强制的；例如，连接依赖 `☼{{SNO,SNAME,CITY},{CITY,STATUS}}` 在关系变量 `S` 中成立，如我们所知，但它不会强制元组出现。*注记：*
    提前说一下，我们稍后会看到，一个受元组强制 `JD` 约束的关系变量不可能处于 `5NF`（尽管如 `SPJ` 例子所示，它可以处于 `BCNF`）。


    ## 循环规则


    现在观察业务规则 `BRX` 的循环性质（“如果 `s` 连接到 `p`，`p` 连接到 `j`，并且 `j` 又连接回 `s`，那么 `s`、`p` 和
    `j` 必须都是*直接*连接的，意思是它们必须全部出现在同一个元组中”）。让我们同意将该规则 `BRX` 描述为“三路循环”的。那么更一般地说，如果对于某个
    `n` > 2 存在一条 `n` 路循环规则，我们就可能面临一个关系变量，它 (a) 处于 `BCNF` 但未达到 `5NF`，因此 (b) 可以无损分解为
    `n` 个投影，但不能分解为更少^(¹²⁹)。


    话虽如此，我也必须指出，根据我的经验，此类循环规则在实践中很少见——这意味着，在实践中，大多数关系变量，如果它们至少处于 `BCNF`，很可能也处于 `5NF`。实际上，在实践中发现一个处于
    `BCNF` 但未达到 `5NF` 的关系变量是相当不寻常的。虽然不寻常，但并非未知！——我自己当然也偶尔遇到过一些真实世界的例子。换句话说，这类关系变量不常见这一事实，并不意味着你不需要担心它们，或者不需要担心
    `JDs` 和 `5NF`。事实上，恰恰相反：`JDs` 和 `5NF` 可以说是你设计工具箱中的工具，并且（在其他条件相同的情况下）你或许应该尝试确保你数据库中的所有关系变量都处于
    `5NF`^(¹³⁰)。

    '
- fmt: "## Concluding Remarks\n\nI'll close this chapter with a few miscellaneous\
    \ observations. First, note that I'm assuming throughout this part of the book—as\
    \ indeed I did throughout the previous part as well, and will continue to do until\
    \ further notice—that the only operators we care about as far as relational decomposition\
    \ and recomposition are concerned are projection and join (projection for decomposition\
    \ and join for recomposition). Under that assumption, it's immediate from the\
    \ definition of join dependency that `JD`s are, in a sense, the \"ultimate\" kind\
    \ of dependency; that is, there's no \"higher\" kind of dependency such that `JD`s\
    \ are just a special case of that higher kind. And it follows further that—though\
    \ I haven't really defined it properly yet!—fifth normal form is the final normal\
    \ form^([^(131)](#fn131)) with respect to projection and join (which accounts\
    \ for its alternative name, *projection-join* normal form or `PJ/NF`).\n\nSecond,\
    \ I've referred several times to relvars that are in `BCNF` and not `5NF`; indeed,\
    \ I've tacitly assumed that if relvar `R` is in `5NF`, then it's certainly in\
    \ `BCNF`. In fact this assumption is correct. Let me also state for the record\
    \ that `5NF` is always achievable; that is, any relvar not in `5NF` can always\
    \ be decomposed into a set of `5NF` projections—though not necessarily without\
    \ losing dependencies, of course, since we already know from Chapter [7](#489629_2_En_7_Chapter.xhtml)\
    \ that preserving dependencies and decomposition to `BCNF` (let alone `5NF`) can\
    \ be conflicting objectives.\n\nThird, it follows from the definition of `5NF`\
    \ that a relvar `R` that's in `5NF` is guaranteed to be free of redundancies that\
    \ can be removed by taking projections. In other words, to say `R` is in `5NF`\
    \ is to say that further nonloss decomposition of `R` into projections, while\
    \ it might be possible, certainly won't remove any redundancies. *Note very carefully,\
    \ however, that to say R is in 5NF is not to say R is free of redundancy.* (A\
    \ belief to the contrary is another popular misconception. See Exercise 1.11 in\
    \ Chapter [1](#489629_2_En_1_Chapter.xhtml).) The fact is, there are many kinds\
    \ of redundancy that projection as such is powerless to remove—which is an illustration\
    \ of the point I made in Chapter [1](#489629_2_En_1_Chapter.xhtml), in the section\
    \ \"The Place of Design Theory,\" to the effect that there are numerous issues\
    \ that current design theory simply doesn't address at all. By way of example,\
    \ consider Figure [9-3](#489629_2_En_9_Chapter.xhtml#Fig3), which shows a sample\
    \ value for a relvar, `CTXD`, that's in `5NF` and yet still suffers from redundancy.\
    \ The predicate is *Teacher `TNO` spends `DAYS` days with textbook `XNO` on course\
    \ `CNO`*. The sole key is `{CNO,TNO,XNO}`. As you can see, the fact that (e.g.)\
    \ teacher `T1` teaches course `C1` appears twice, and so does the fact that course\
    \ `C1` uses textbook `X1`^([^(132)](#fn132)).\n\n![../images/489629_2_En_9_Chapter/489629_2_En_9_Fig3_HTML.jpg](images/489629_2_En_9_Chapter/489629_2_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3 The `5NF` relvar `CTXD`—sample value\n\nLet's analyze this example\
    \ a little more carefully:\n\n*   Since `{CNO,TNO,XNO}` is a key, the relvar is\
    \ subject to the following functional dependency—\n    ```\n    { CNO , TNO ,\
    \ XNO } → { DAYS }\n    ```\n    —which is an \"arrow out of a key.\"\n*   So\
    \ `DAYS` depends on all three of `CNO`, `TNO`, and `XNO`, and therefore can't\
    \ appear in a relvar with anything less than all three.\n*   Hence there's no\
    \ (nontrivial) decomposition of the relvar into projections that applies at all—the\
    \ relvar is in `5NF`. *Note:* A decomposition is trivial if and only if it's based\
    \ on dependencies (`FD`s or `JD`s) that are themselves trivial in turn, and nontrivial\
    \ if and only if it isn't trivial. Trivial `FD`s were discussed in Chapters [4](#489629_2_En_4_Chapter.xhtml)\
    \ and [5](#489629_2_En_5_Chapter.xhtml); trivial `JD`s are discussed in the next\
    \ chapter.\n*   Hence there's certainly no decomposition into projections that\
    \ can remove the redundancies, a fortiori.\n\n## Exercises\n\n1.  (*Repeated from\
    \ the body of the chapter.*) Check that (a) joining any pair of the binary relations\
    \ shown in Figure [9-2](#489629_2_En_9_Chapter.xhtml#Fig2) yields a result containing\
    \ a \"spurious\" tuple (i.e., a tuple not appearing in Figure [9-1](#489629_2_En_9_Chapter.xhtml#Fig1))\
    \ and that (b) joining the third binary relation to that intermediate result then\
    \ eliminates that spurious tuple.\n2.  Write a `Tutorial D` `CONSTRAINT` statement\
    \ to express the `JD` that holds in relvar `SPJ` as discussed in the body of the\
    \ chapter.\n3.  Design a database for the following. The entities to be represented\
    \ are sales representatives, sales areas, and products. Each representative is\
    \ responsible for sales in one or more areas; each area has one or more responsible\
    \ representatives. Each representative is responsible for sales of one or more\
    \ products, and each product has one or more responsible representatives. Each\
    \ product is sold in one or more areas, and each area has one or more products\
    \ sold in it. Finally, if representative `r` is responsible for area `a`, and\
    \ product `p` is sold in area `a`, and representative `r` sells product `p`, then\
    \ `r` sells `p` in `a`.\n4.  Give an example from your own work environment, if\
    \ possible, of a relvar in `BCNF` but not in `5NF`."
  raw: '## Concluding Remarks


    I’ll close this chapter with a few miscellaneous observations. First, note that
    I’m assuming throughout this part of the book—as indeed I did throughout the previous
    part as well, and will continue to do until further notice—that the only operators
    we care about as far as relational decomposition and recomposition are concerned
    are projection and join (projection for decomposition and join for recomposition).
    Under that assumption, it’s immediate from the definition of join dependency that
    JDs are, in a sense, the “ultimate” kind of dependency; that is, there’s no “higher”
    kind of dependency such that JDs are just a special case of that higher kind.
    And it follows further that—though I haven’t really defined it properly yet!—fifth
    normal form is the final normal form^([^(131)](#fn131)) with respect to projection
    and join (which accounts for its alternative name, *projection-join* normal form
    or PJ/NF).


    Second, I’ve referred several times to relvars that are in BCNF and not 5NF; indeed,
    I’ve tacitly assumed that if relvar *R* is in 5NF, then it’s certainly in BCNF.
    In fact this assumption is correct. Let me also state for the record that 5NF
    is always achievable; that is, any relvar not in 5NF can always be decomposed
    into a set of 5NF projections—though not necessarily without losing dependencies,
    of course, since we already know from Chapter [7](#489629_2_En_7_Chapter.xhtml)
    that preserving dependencies and decomposition to *BCNF* (let alone 5NF) can be
    conflicting objectives.


    Third, it follows from the definition of 5NF that a relvar *R* that’s in 5NF is
    guaranteed to be free of redundancies that can be removed by taking projections.
    In other words, to say *R* is in 5NF is to say that further nonloss decomposition
    of *R* into projections, while it might be possible, certainly won’t remove any
    redundancies. *Note very carefully, however, that to say R is in 5NF is not to
    say R is free of redundancy.* (A belief to the contrary is another popular misconception.
    See Exercise 1.11 in Chapter [1](#489629_2_En_1_Chapter.xhtml).) The fact is,
    there are many kinds of redundancy that projection as such is powerless to remove—which
    is an illustration of the point I made in Chapter [1](#489629_2_En_1_Chapter.xhtml),
    in the section “The Place of Design Theory,” to the effect that there are numerous
    issues that current design theory simply doesn’t address at all. By way of example,
    consider Figure [9-3](#489629_2_En_9_Chapter.xhtml#Fig3), which shows a sample
    value for a relvar, CTXD, that’s in 5NF and yet still suffers from redundancy.
    The predicate is *Teacher TNO spends DAYS days with textbook XNO on course CNO*.
    The sole key is {CNO,TNO,XNO}. As you can see, the fact that (e.g.) teacher T1
    teaches course C1 appears twice, and so does the fact that course C1 uses textbook
    X1.^([^(132)](#fn132))


    ![../images/489629_2_En_9_Chapter/489629_2_En_9_Fig3_HTML.jpg](images/489629_2_En_9_Chapter/489629_2_En_9_Fig3_HTML.jpg)


    Figure 9-3


    The 5NF relvar CTXD—sample value


    Let’s analyze this example a little more carefully:


    *   Since {CNO,TNO,XNO} is a key, the relvar is subject to the following functional
    dependency—


    ```

    { CNO , TNO , XNO } → { DAYS }

    ```


    —which is an “arrow out of a key.”


    *   So DAYS depends on all three of CNO, TNO, and XNO, and therefore can’t appear
    in a relvar with anything less than all three.


    *   Hence there’s no (nontrivial) decomposition of the relvar into projections
    that applies at all—the relvar is in 5NF. *Note:* A decomposition is trivial if
    and only if it’s based on dependencies (FDs or JDs) that are themselves trivial
    in turn, and nontrivial if and only if it isn’t trivial. Trivial FDs were discussed
    in Chapters [4](#489629_2_En_4_Chapter.xhtml) and [5](#489629_2_En_5_Chapter.xhtml);
    trivial JDs are discussed in the next chapter.


    *   Hence there’s certainly no decomposition into projections that can remove
    the redundancies, a fortiori.


    ## Exercises


    1.  (*Repeated from the body of the chapter.*) Check that (a) joining any pair
    of the binary relations shown in Figure [9-2](#489629_2_En_9_Chapter.xhtml#Fig2)
    yields a result containing a “spurious” tuple (i.e., a tuple not appearing in
    Figure [9-1](#489629_2_En_9_Chapter.xhtml#Fig1)) and that (b) joining the third
    binary relation to that intermediate result then eliminates that spurious tuple.


    2.  Write a **Tutorial D** CONSTRAINT statement to express the JD that holds in
    relvar SPJ as discussed in the body of the chapter.


    3.  Design a database for the following. The entities to be represented are sales
    representatives, sales areas, and products. Each representative is responsible
    for sales in one or more areas; each area has one or more responsible representatives.
    Each representative is responsible for sales of one or more products, and each
    product has one or more responsible representatives. Each product is sold in one
    or more areas, and each area has one or more products sold in it. Finally, if
    representative *r* is responsible for area *a*, and product *p* is sold in area
    *a*, and representative *r* sells product *p*, then *r* sells *p* in *a*.


    4.  Give an example from your own work environment, if possible, of a relvar in
    BCNF but not in 5NF.'
  trans: "\n## 结束语\n\n本章将以几点补充说明收尾。首先请注意，在本书的这一部分——实际上在之前的部分也一样，并且在另行通知前都将如此——我假设就关系分解与重组而言，我们唯一关心的运算符是投影和连接（分解用投影，重组用连接）。在此假设下，根据连接依赖的定义，`JD`在某种意义上是“终极”类型的依赖；也就是说，不存在比`JD`“更高级”的依赖类型使得`JD`仅仅是该高级类型的一个特例。由此进一步得出——尽管我尚未正式定义它！——关于投影和连接，第五范式是最终的范式^(¹³¹)（这也解释了它的别名，即*投影-连接*范式或`PJ/NF`）。\n\
    \n其次，我已多次提及处于`BCNF`但非`5NF`的关系变量；实际上，我默认了一个假设：如果关系变量`R`处于`5NF`，那么它必然也处于`BCNF`。事实上这个假设是正确的。我还要声明，`5NF`总是可实现的；也就是说，任何不处于`5NF`的关系变量总能被分解为一组`5NF`投影——当然，这未必能无损地保留依赖，因为我们已经在第\
    \ 7 章知道，保留依赖与分解到`BCNF`（更不用说`5NF`）可能是相互冲突的目标。\n\n第三，根据`5NF`的定义，一个处于`5NF`的关系变量`R`保证可以消除那些能通过取投影来移除的冗余。换言之，说`R`处于`5NF`，就意味着对`R`进一步进行无损分解成投影，虽然可能可行，但肯定不会移除任何冗余。*然而需特别注意，说\
    \ R 处于 5NF 并不意味着 R 没有冗余。*（相反的看法是另一种普遍存在的误解。参见第 1 章练习 1.11。）事实是，有许多种冗余是投影本身无力消除的——这正说明了我在第\
    \ 1 章“设计理论的地位”一节中提出的观点，即当前的设计理论完全未涉及诸多问题。例如，请看图 9-3，它展示了一个关系变量`CTXD`的示例值，该变量处于`5NF`但仍存在冗余。其谓词是*教师`TNO`在课程`CNO`上使用教材`XNO`共`DAYS`天*。唯一键是`{CNO,TNO,XNO}`。如你所见，例如教师`T1`教授课程`C1`这一事实出现了两次，同样，课程`C1`使用教材`X1`这一事实也出现了两次^(¹³²)。\n\
    \n![../images/489629_2_En_9_Chapter/489629_2_En_9_Fig3_HTML.jpg](img/489629_2_En_9_Fig3_HTML.jpg)\n\
    \n图 9-3 处于`5NF`的关系变量`CTXD`——示例值\n\n让我们更仔细地分析这个例子：\n*   由于`{CNO,TNO,XNO}`是一个键，该关系变量服从以下函数依赖——\n\
    \    ```\n    { CNO , TNO , XNO } → { DAYS }\n    ```\n    ——这是一个“键向外的箭头”。\n*\
    \   因此，`DAYS`依赖于`CNO`、`TNO`和`XNO`全部三者，所以它不能出现在缺少其中任何一个的关系变量中。\n*   因此，根本不存在将该关系变量分解成投影的（非平凡）方案——该关系变量处于`5NF`。*注：*\
    \ 一个分解是平凡的，当且仅当它基于的依赖（`FD`或`JD`）本身是平凡的；否则就是非平凡的。平凡`FD`已在第 4 章和第 5 章讨论；平凡`JD`将在下一章讨论。\n\
    *   因此，肯定不存在能移除冗余的分解成投影的方案，更不用说了。\n\n## 练习\n\n1.  （*重复自正文中内容。*）验证：(a) 连接图 9-2\
    \ 中显示的任意一对二元关系，都会产生一个包含“伪”元组（即不出现在图 9-1 中的元组）的结果；(b) 将第三个二元关系连接到该中间结果上，然后会消除那个伪元组。\n\
    2.  编写一条`Tutorial D``CONSTRAINT`语句，来表达正文中讨论的关系变量`SPJ`中所成立的`JD`。\n3.  为以下场景设计一个数据库。需要表示的实体是销售代表、销售区域和产品。每个代表负责一个或多个区域的销售；每个区域有一个或多个负责的代表。每个代表负责销售一种或多种产品，每种产品有一个或多个负责的代表。每种产品在一个或多个区域销售，每个区域有一种或多种产品在销售。最后，如果代表`r`负责区域`a`，并且产品`p`在区域`a`销售，并且代表`r`销售产品`p`，那么`r`在`a`销售`p`。\n\
    4.  如果可能，请给出一个来自你自己工作环境的、处于`BCNF`但非`5NF`的关系变量的例子。\n"
- fmt: "## Answers\n\n1.  Joining `SP` and `PJ` is discussed in the body of the chapter.\
    \ Joining `PJ` and `JS` yields the spurious tuple `(S2,P2,J1)`, which is then\
    \ eliminated because there’s no `(S2,P2)` tuple in `SP`. Joining `JS` and `SP`\
    \ yields the spurious tuple `(S1,P2,J2)`, which is then eliminated because there’s\
    \ no `(P2,J2)` tuple in `PJ`.\n\n2.  ```\n    CONSTRAINT ... SPJ = JOIN { SPJ\
    \ { SNO , PNO } ,\n    SPJ { PNO , JNO } ,\n    SPJ { JNO , SNO } } ;\n    ```\n\
    \    Note that this constraint is an equality dependency (i.e., an `EQD`—see Chapter\
    \ [3](#489629_2_En_3_Chapter.xhtml)).\n\n3.  First of all, we’ll presumably need\
    \ three relvars for representatives, areas, and products, respectively:\n    ```\n\
    \    R { RNO , ... } KEY { RNO }\n    A { ANO , ... } KEY { ANO }\n    P { PNO\
    \ , ... } KEY { PNO }\n    ```\n    Now, if representative `r` is responsible\
    \ for area `a`, and product `p` is sold in area `a`, and representative `r` sells\
    \ product `p`, then `r` sells `p` in `a`. This is a 3-way cyclic rule. So if we\
    \ were to have a relvar `RAP` looking like this—\n    ```\n    RAP { RNO , ANO\
    \ , PNO } KEY { RNO , ANO , PNO }\n    ```\n    (with the obvious predicate)—then\
    \ the following JD would hold in that relvar:\n    ```\n    ☼ { { RNO , ANO }\
    \ , { ANO , PNO } , { PNO , RNO } }\n    ```\n    The relvar would thus be subject\
    \ to redundancy. So let’s replace it by its three binary projections:\n    ```\n\
    \    RA { RNO , ANO } KEY { RNO , ANO }\n    AP { ANO , PNO } KEY { ANO , PNO\
    \ }\n    PR { PNO , RNO } KEY { PNO , RNO }\n    ```\n    (Now there are several\
    \ `EQD`s that need to be stated and enforced—e.g., the projections `RA{RNO}` and\
    \ `PR{RNO}` must always be equal—but the details are straightforward and I omit\
    \ them here.)\n    Next, each representative is responsible for sales in one or\
    \ more areas, and each area has one or more responsible representatives. But this\
    \ information is already contained in relvar `RA`, and nothing more is necessary.\
    \ Similarly, relvar `AP` takes care of the facts that each area has one or more\
    \ products sold in it and each product is sold in one or more areas, and relvar\
    \ `PR` takes care of the facts that each product has one or more responsible representatives\
    \ and each representative is responsible for sales of one or more products. Note,\
    \ however, that the user does need to be told that the join of `RA`, `AP`, and\
    \ `PR` does *not* involve any “connection trap” (i.e., that the 3-way cyclic rule\
    \ holds). Let’s explore this point. First of all, the predicates for `RA`, `AP`,\
    \ and `PR` are as follows:\n    *   `RA`: *Representative `RNO` is responsible\
    \ for area `ANO`.*\n    *   `AP`: *Product `PNO` is sold in area `ANO`.*\n   \
    \ *   `PR`: *Product `PNO` is sold by representative `RNO`.*\n    Observe, incidentally,\
    \ that a well architected `DBMS`—sadly, not one that’s available on the market\
    \ today, so far as I know!—would allow the designer to tell it about these predicates.\
    \ *Note:* Telling the `DBMS` about the predicates would serve to tell the user\
    \ too, of course. The difference is that telling the user can be done informally\
    \ (in fact, it has to be done informally, in today’s systems), but telling the\
    \ `DBMS`, if it could be done at all, would have to be done formally.\n    Back\
    \ to the 3-way rule. Clearly the designer can’t just tell the user that the join\
    \ of relvars `RA`, `AP`, and `PR` is equal to relvar `RAP`, because after the\
    \ decomposition relvar `RAP` no longer exists. However, we might define that join\
    \ as a view (or “virtual relvar”) :\n    ```\n    VAR RAP VIRTUAL ( JOIN { RA\
    \ , AP , PR } )\n    KEY { RNO , ANO , PNO } ;\n    ```\n    And that same well\
    \ architected `DBMS` would then be able to infer the following as a predicate\
    \ for view `RAP`:\n    *Representative `RNO` is responsible for area `ANO`* **and**\
    \ *product `PNO` is sold in area `ANO`* **and** *product `PNO` is sold by representative\
    \ `RNO`*.\n    But this predicate is less than the truth (it doesn’t capture the\
    \ 3-way cyclic rule). Ideally, therefore, there ought to be a way for the designer\
    \ to tell the `DBMS` (as well as the user) that the predicate is actually as follows:^([^(133)](#fn133))\n\
    \    *Representative `RNO` is responsible for area `ANO`* **and** *product `PNO`\
    \ is sold in area `ANO`* **and** *product `PNO` is sold by representative `RNO`*\n\
    \    **and**\n    *representative `RNO` sells product `PNO` in area `ANO`.*\n\
    \    Note that this latter predicate is stronger than the former, in that if a\
    \ certain `(RNO,PNO,ANO)` triple satisfies the latter, it certainly satisfies\
    \ the former, while the converse is (obviously) false.\n\n4.  *No answer provided.*\n\
    \nFootnotes [1](#489629_2_En_9_Chapter.xhtml#Fn1_source)   [2](#489629_2_En_9_Chapter.xhtml#Fn2_source)\
    \   [3](#489629_2_En_9_Chapter.xhtml#Fn3_source)   [4](#489629_2_En_9_Chapter.xhtml#Fn4_source)\
    \   [5](#489629_2_En_9_Chapter.xhtml#Fn5_source)   [6](#489629_2_En_9_Chapter.xhtml#Fn6_source)\
