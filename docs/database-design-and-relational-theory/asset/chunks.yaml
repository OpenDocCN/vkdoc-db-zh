  trans: '

    ### 第二个例子：为什么 5NF 做得太多了


    现在来看承诺的第二个例子。假设我们有另一个关系变量 `SPJ′`，它与 `SPJ` 相同，但额外受制于以下业务规则（BRY）：


    *   对于给定的供应商 `s` 和给定的零件 `p`，其供应的项目 `j` 至多只有一个。


    以下函数依赖（FD）抓住了规则 BRY 的本质，因此在关系变量 `SPJ′` 中成立：


    ```

    { SNO , PNO } → { JNO }

    ```


    换言之，`{SNO,PNO}` 是 `SPJ′` 的一个键。更重要的是，可以证明，除了刚才展示的 FD（以及平凡的 FD）外，`SPJ′` 中没有其他 FD
    成立，因此 `SPJ′` 和 `SPJ` 一样，处于 `BCNF`。然而，它不处于 `5NF`，因为之前展示的连接依赖（JD）在 `SPJ′` 中同样成立，也并非由键所蕴含。


    这个例子因此戳穿了两个流行的误解——第一，一个不处于 `5NF` 的 `BCNF` 关系变量必须是全键的（参见练习 1.8）；第二，一个只有一个键和一个非键属性的关系变量必须处于
    `5NF`（参见练习 1.9）。


    现在，假设和 `SPJ` 一样，关系变量 `SPJ′` 包含以下三个元组：


    ```

    t1  :  s1  p1  j2

    t2  :  s1  p2  j1

    t3  :  s2  p1  j1

    ```


    那么，由于 JD 的存在，以下元组也必须出现：


    ```

    t4  :  s1  p1  j1

    ```


    但是 `{SNO,PNO}` 是一个键；由此可知，由于元组 `t1` 和 `t4` 在该键上的值相同，它们实际上是同一个元组（因此 `j1` = `j2`，所以我们现在必须至少部分放弃最初的假设，即
    `s1` ≠ `s2`，`p1` ≠ `p2`，且 `j1` ≠ `j2`）。因此，我们在 `SPJ` 中观察到的那种冗余在 `SPJ′` 中不会发生。（具体来说，这种情况下元组
    `t4` 并不是一个“额外”的元组，因为它已经存在了。）换言之，`SPJ′` 尽管不处于 `5NF`，却不会 `事实上也不可能` 遭受 `5NF` 旨在解决的那种冗余。因此，看起来
    `5NF` 在某种意义上，对于这个目的来说可能太强了。


    ## 基本元组范式


    基本元组范式（`ETNF`）最早由 Ron Fagin、Hugh Darwen 和我在 2012 年的一篇论文中描述——下文简称“`ETNF` 论文”。我将首先对该论文的主要结果做一个简要且有些非正式的总结（但请注意，以下总结并非独立成文——纯粹是作为一个方便的概述提供）：


    *   宽泛地说，说一个关系变量 `R` 没有冗余，是指当前出现在 `R` 中的任何元组 `t` 都不代表可以从当前也出现在 `R` 中、但区别于 `t`
    的其他元组推导出的信息。

    *   当且仅当关系变量 `R` 在上述意义上没有冗余时，它才处于基本元组范式（`ETNF`）。

    *   当且仅当关系变量 `R` 处于 `BCNF`，并且对于 `R` 中成立的每个连接依赖（`JD`） `J`，`J` 的至少一个分量是 `R` 的超键时，`R`
    才处于 `ETNF`。

    *   `5NF` ⇒ `ETNF` ⇒ `4NF`，而反向蕴含不成立（换句话说，`ETNF` 严格地位于 `4NF` 和 `5NF` 之间）。


    如果关系变量 `R` 处于 `BCNF` 并且有一个非复合键，那么它就处于 `ETNF`。


    ### 定义与定理


    现在我将呈现一系列定义和定理（附带讨论），它们共同构成了 `ETNF` 论文的主要成果。首先，让我给出——你可能觉得早就该给了——元组强制连接依赖这个概念的精确定义：


    *   **定义（元组强制 `JD`）：** 设 `J` 是一个关于头 `H` 的 `JD`，且 `J` 在关系变量 `R` 中成立。那么 `J` 可能会导致，也可能不会导致：如果某些元组
    `t1`, ..., `tn` 出现在 `R` 中，则某个额外的元组 `t` 被强制也出现在 `R` 中（这里术语 `额外的` 意味着 `t` 区别于 `t1`,
    ..., `tn` 中的每一个）。当且仅当它确实有这个后果时，`J` 相对于 `R` 是元组强制的。


    给定这个定义，很容易看出，如果 `J` 确实相对于 `R` 是元组强制的，那么它必须是（a）非平凡的，（b）不是由 `R` 的键所蕴含的，并且（c）不是由
    `R` 的任何 `FD` 所蕴含的。（由于这里的（a）和（b），还可以推出 `R` 不可能处于 `5NF`。）


    接下来，引入 `FD` 冗余和 `JD` 冗余这两个术语是很方便的：


    *   **定义（`FD` 冗余）：** 当且仅当关系变量 `R` 不处于 `BCNF` 时，它是 `FD` 冗余的。

    *   **定义（`JD` 冗余）：** 当且仅当某个元组强制 `JD` 在 `R` 中成立时，关系变量 `R` 是 `JD` 冗余的。


    注意，这两种冗余互不蕴含；也就是说，一个关系变量可以是 `FD` 冗余的而不是 `JD` 冗余的，也可以是 `JD` 冗余的而不是 `FD` 冗余的。例如：


    *   来自“`5NF` 太强了”一节的关系变量 `SPJ`——具有属性 `SNO`、`PNO` 和 `JNO`；键 `{SNO,PNO,JNO}`；以及
    JD ☼{{SNO,PNO},{PNO,JNO},{JNO,SNO}}——处于 `BCNF`，因此不是 `FD` 冗余的，但它显然是 `JD` 冗余的，因为那个
    JD 是元组强制的。

    *   来自第 1 章的关系变量 `S`——具有属性 `SNO`、`SNAME`、`STATUS` 和 `CITY`；键 `{SNO}`；以及 FD `{CITY}`
    → `{STATUS}`——不处于 `BCNF`，因此是 `FD` 冗余的。但是该关系变量中没有任何元组强制 `JD` 成立，因此它不是 `JD` 冗余的。


    继续定义：


    *   **定义（无冗余）：** 当且仅当关系变量 `R` 既不是 `FD` 冗余的也不是 `JD` 冗余的时，它是无冗余的。


    注意，根据这个定义，一个 `5NF` 关系变量肯定是无冗余的。然而，正如我将要展示的，一个关系变量并不需要处于 `5NF` 才能是无冗余的；相反，只需它处于
    `ETNF` 就足够了。事实上，这就是 `ETNF` 的定义：


    *   **定义（基本元组范式）：** 当且仅当关系变量 `R` 是无冗余的时，它才处于基本元组范式（`ETNF`）。


    换句话说，当且仅当关系变量 `R` 既不是 `FD` 冗余的也不是 `JD` 冗余的——等价地说，当且仅当它处于 `BCNF` 并且没有任何元组强制 `JD`
    成立时，它才处于 `ETNF`。


    当然，虽然上述定义既精确又准确，但它几乎没有实际用处，因为它对于确定一个给定的关系变量是否确实处于 `ETNF` 帮助不大。但以下定理在这方面确实有帮助：


    *   **定理：** 当且仅当关系变量 `R` 处于 `BCNF`，并且对于 `R` 中成立的每个显式 `JD` `J`，`J` 的某个分量是 `R` 的超键时，`R`
    才处于 `ETNF`。


    这个定理为关系变量处于 `ETNF` 提供了必要且充分的条件。因此，我们可以将其视为一个有用、可用的测试——实际上，视为 `ETNF` 的一个有效 `定义`。（换句话说，原始定义是一个语义定义，而该定理提供了一个操作性的或句法的定义。关于此类问题的解释性说明请参见第
    5 章。）

