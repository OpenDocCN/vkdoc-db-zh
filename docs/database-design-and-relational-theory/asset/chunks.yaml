  trans: '## 函数依赖再探讨


    现在我能够妥善处理函数依赖的概念了。我将再次给出精确的定义——但在本节中（与上一节相比），我会对这些定义及其部分含义作更多的阐述。


    ### 定义（函数依赖）

    令 `H` 为一个标题；那么，关于 `H` 的一个函数依赖是一个形如 `X → Y` 的表达式，其中 `X`（决定因素）和 `Y`（被决定因素）都是 `H`
    的子集。如果 `H` 是已知的，短语 *关于 H 的函数依赖* 可以简写为 *函数依赖*。


    下面是一些例子：

    ```

    { CITY } → { STATUS }

    { CITY } → { SNO }

    ```


    请注意——这或许与普遍的看法相反——函数依赖在形式上是相对于某个*标题*定义的，而不是相对于某个关系或某个关系变量。例如，刚才展示的两个函数依赖，是相对于任何包含名为
    `CITY`、`STATUS` 和 `SNO` 属性（可能还有其他属性）的标题定义的。还需注意，从形式角度来看，一个函数依赖仅仅是一个*表达式*：一个表达式，当相对于某个特定关系进行解释时，就变成了一个（根据定义）求值结果为`TRUE`或`FALSE`的*命题*。例如，如果上面展示的两个函数依赖相对于关系变量
    `S` 的当前值对应的关系（参见第 1 章中的图 1-1）进行解释，那么第一个求值为 `TRUE`，第二个则求值为 `FALSE`。当然，在非正式场合，通常只会在某个特定上下文中，当一个表达式在该上下文中求值为
    `TRUE` 时，才将其定义为函数依赖；然而，这样的定义使得我们无法说明某个给定关系未能满足，或者说违反了某个给定的函数依赖。为什么？因为根据那个非正式的定义，一个未被满足的函数依赖首先就不是一个函数依赖！例如，我们就无法说关系变量
    `S` 的当前值对应的关系违反了上面展示的第二个函数依赖。


    我实在无法过分强调上述观点。对大多数人来说，这代表着思维方式的转变；然而，如果你想真正理解设计理论究竟是什么，这种转变是必须的。关键在于：大多数关于函数依赖的论述——包括首次引入该概念的早期研究论文——实际上根本没有定义函数依赖这个概念本身！相反，它们说的是类似于这样的话：“在关系
    `r` 中，`Y` 函数依赖于 `X`，当且仅当，`r` 中任意两个元组只要在 `X` 上一致，它们在 `Y` 上也一致。” 这当然是完全正确的——但这并不是对函数依赖的定义；相反，这是对函数依赖*被满足*意味着什么的定义。但如果我们想发展一个关于函数依赖本身的理论，那么我们显然需要能够将函数依赖作为独立的对象来讨论，脱离某个特定关系或特定关系变量的上下文。更具体地说，我们需要将函数依赖本身的概念，与其可能在某个上下文中具有某种解释或含义的想法分离开来。事实上，设计理论可以被视为逻辑学的一个小分支，而逻辑学根本不是关于含义的——它是关于形式化操作的。


    ### 定义（满足或违反函数依赖）

    令关系 `r` 的标题为 `H`，并令 `X → Y` 是一个关于 `H` 的函数依赖，记为 `F`。如果 `r` 的所有元组对 `t1` 和 `t2` 满足：只要
    `t1{*X*} = t2{*X*}`，就有 `t1{*Y*} = t2{*Y*}`，那么 `r` 满足 `F`；否则 `r` 违反 `F`。


    请注意，是关系（而不是关系变量）满足或违反某个给定的函数依赖。例如，关系变量 `S` 的当前值对应的关系（参见图 3-1）满足以下两个函数依赖——

    ```

    { CITY }  → { STATUS }

    { SNAME } → { CITY }

    ```

    ——但违反这一个：

    ```

    { CITY } → { SNO }

    ```


    ### 定义（函数依赖成立）

    函数依赖 `F` 在关系变量 `R` 中成立（等价地，关系变量 `R` 受函数依赖 `F` 约束），当且仅当每个可以赋值给关系变量 `R` 的关系都满足 `F`。在关系变量
    `R` 中成立的函数依赖就是 `R` 的函数依赖。


    *重要提示：* 请注意我在此所做的术语区分——函数依赖由关系来*满足*（或*违反*），但在关系变量中*成立*（或*不成立*）。也请注意，在本书中我将始终遵循这一区分。举例来说，以下函数依赖在关系变量
    `S` 中成立——

    ```

    { CITY } → { STATUS }

    ```

    ——而下面这两个不成立：

    ```

    { SNAME } → { CITY }

    { CITY }  → { SNO }

    ```

    （请与前面定义后的例子进行对比。）因此，现在我们终于确切地知道了一个给定的关系变量受某个给定的函数依赖约束意味着什么。'
- fmt: '## Boyce/Codd Normal Form Revisited


    With a proper understanding of `FD`s under our belt, as it were, I can now go
    on to tackle the question of what it means for a relvar to be in `BCNF`. Again
    I proceed by means of a series of precise definitions.


    ### Definition (trivial FD)

    Let `X` → `Y` be an `FD`, `F` say, with respect to heading `H`. Then `F` is trivial
    if and only if it’s satisfied by every relation with heading `H`.


    Now, in Chapter 4 I defined a trivial `FD` to be one that can’t possibly be violated.
    There’s nothing wrong with that definition, of course; however, the one just given
    is preferable because it explicitly mentions the pertinent heading. I also said
    in Chapter 4 that it’s easy to see that the `FD` `X` → `Y` is trivial if and only
    if `Y` is a subset of `X`. Well, that’s true too; but I can now say that this
    latter fact isn’t really a definition but rather a *theorem*, easily proved from
    the definition as such. (On the other hand, the definition as such isn’t very
    helpful in determining whether a given `FD` is trivial, whereas the theorem is.
    For that reason, we might regard the theorem as an *operational* definition, inasmuch
    as it provides an effective test that can easily be applied in practice.) Let
    me state the theorem explicitly for the record:


    ### Theorem

    Let `X` → `Y` be an `FD`, `F` say. Then `F` is trivial if and only if the dependant
    `Y` is a subset of the determinant `X` (in symbols, `Y ⊆ X`).


    Distinctions like the one I’m drawing here are sometimes characterized as *semantic
    vs. syntactic* distinctions. To spell the point out: The original definition—`F`
    is trivial if and only if it’s satisfied by every relation with the pertinent
    heading—is semantic, because it defines what the concept means; by contrast, the
    theorem, or what I’ve called the “operational” definition—`F` is trivial if and
    only if `Y` is a subset of `X`—is syntactic, because it provides a check that
    can be performed in a purely syntactic way. We’ll be meeting this distinction
    between semantic and syntactic notions again (fairly frequently, in fact) in the
    pages ahead. Indeed, one case in point arises almost immediately in connection
    with the notion of `FD` irreducibility (see below).


    To continue with the definitions:


    ### Definition (superkey)

    A superkey of relvar `R` is a subset `SK` of the heading `H` of `R` such that
    the `FD` `SK` → `H` holds in `R` (“is an `FD` of `R`”). That `FD` is a superkey
    constraint on `R`.


    For example, `{SNO}`, `{SNO,CITY}`, and `{SNO,CITY,STATUS}` are all superkeys
    for relvar `S`.


    ### Definition (irreducible FD)

    The `FD` `X` → `Y` is irreducible with respect to relvar `R` (or just irreducible,
    if `R` is understood) if and only if it holds in `R` and `X''` → `Y` doesn’t hold
    in `R` for any proper subset `X''` of `X`.


    For example, the `FD` `{CITY}` → `{STATUS}` is irreducible with respect to relvar
    `S`. By contrast, the `FD` `{CITY,SNO}` → `{STATUS}`, though certainly an `FD`
    of `S`, is *reducible* with respect to `S`. Observe that while `FD`s as such are
    defined with respect to some *heading*, `FD` irreducibility is defined with respect
    to some *relvar*. In other words, `FD`s as such are just a syntactic notion (an
    `FD` is just an expression that takes a certain syntactic form), while `FD` irreducibility
    is a matter of semantics (it has to do with what the pertinent `FD` means in connection
    with the pertinent relvar). *Note:* I don’t assume in what follows that the `FD`s
    we’re talking about are irreducible ones only, though in practice we typically
    do.


    ### Definition (key)

    A key of relvar `R` is a subset `K` of the heading `H` of `R` such that the `FD`
    `K` → `H` is an irreducible `FD` of `R`. That `FD` is a key constraint on `R`.


    Note the appeal to `FD` irreducibility in the foregoing definition.


    ### Definition (FD implied by keys)

    Let relvar `R` have heading `H` and let `X` → `Y` be an `FD`, `F` say, with respect
    to `H`. Then `F` is implied by the keys of `R` if and only if every relation `r`
    that satisfies `R`’s key constraints also satisfies `F`.


    This definition requires some elaboration. First of all, if some relation satisfies
    some key constraint, then of course it satisfies the pertinent uniqueness requirement;
    and if it satisfies the uniqueness requirement for the set of attributes that
    constitute some key, it certainly also satisfies the uniqueness requirement for
    every superset of that set of attributes (just so long as that superset is a subset
    of the pertinent heading, of course)—in other words, for every corresponding superkey.
    Thus, the phrase “satisfies `R`’s key constraints” in the definition could be
    replaced by the phrase “satisfies `R`’s superkey constraints” without making any
    significant difference. Likewise, the concept “implied by keys” could just as
    well be “implied by superkeys,” again without making any significant difference.


    Second, what happens if the `FD` `F` mentioned in the definition is trivial? Well,
    in that case, by definition, `F` is satisfied by every relation `r` with heading
    `H`, and so `F` is certainly satisfied by every relation `r` that satisfies `R`’s
    key constraints, a fortiori. So trivial `FD`s are always “implied by keys,” trivially.


    Third, then, suppose `F` is nontrivial. Then it’s easy to prove the following
    theorem:


    ### Theorem

    Let `F` be an `FD` that holds in relvar `R`. Then `F` is implied by the keys of
    `R` if and only if it’s a superkey constraint on `R`.


    In other words, it’s like that business with trivial `FD`s: The formal definition
    as such isn’t much help in determining whether a given `FD` is implied by keys,
    but the theorem is. For that reason, we can regard the theorem as an *operational*
    definition, since it provides an effective test that can easily be applied in
    practice.


    And now, at last, I can define `BCNF`:


    ### Definition (Boyce/Codd normal form)

    Relvar `R` is in Boyce/Codd normal form (`BCNF`) if and only if every `FD` of
    `R` is implied by the keys of `R`.


    However, given the various definitions and theorems already discussed in this
    section, we can see that the following operational or “syntactic” definition (or
    theorem) is valid too:


    ### Definition (Boyce/Codd normal form)

    Relvar `R` is in Boyce/Codd normal form (`BCNF`) if and only for every nontrivial
    `FD` `X` → `Y` that holds in `R`, `X` is a superkey for `R`.


    As I put it in Chapter 4, it follows from this definition that the only `FD`s
    that hold in a `BCNF` relvar are either trivial ones (we can’t get rid of those,
    obviously) or arrows out of superkeys (we can’t get rid of those, either). Though
    now I’d like to add that when I talk about “getting rid of” some `FD`, I fear
    I’m being—I hope uncharacteristically—a little sloppy ... For example, consider
    relvar `S`. That relvar is subject to the `FD` `{CITY}` → `{STATUS}`, among others;
    as explained in Chapter 3, therefore, the recommendation is to decompose the relvar
    into its projections `SNC`, on `{SNO,SNAME,CITY}`, and `CT`, on `{CITY,STATUS}`.
    But if we do, then the `FD` `{SNO}` → `{STATUS}`, which also holds in relvar `S`,
    “disappears,” in a sense; thus we have indeed “gotten rid of it,” in a sense.
    But what does it mean to say the `FD` has disappeared? The answer is: It’s been
    replaced by a multirelvar constraint (that is, a constraint that spans two or
    more relvars). So the constraint certainly still exists—it just isn’t an `FD`
    any more.^(73)^ Similar remarks apply throughout this book whenever I talk of
    “getting rid of” dependencies of any kind, be they `FD`s or otherwise.'
  raw: '## Boyce/Codd Normal Form Revisited


    With a proper understanding of FDs under our belt, as it were, I can now go on
    to tackle the question of what it means for a relvar to be in BCNF. Again I proceed
    by means of a series of precise definitions.


    *   **Definition (trivial FD):** Let *X* → *Y* be an FD, *F* say, with respect
    to heading *H*. Then *F* is trivial if and only if it’s satisfied by every relation
    with heading *H*.


    Now, in Chapter [4](#489629_2_En_4_Chapter.xhtml) I defined a trivial FD to be
    one that can’t possibly be violated. There’s nothing wrong with that definition,
    of course; however, the one just given is preferable because it explicitly mentions
    the pertinent heading. I also said in Chapter [4](#489629_2_En_4_Chapter.xhtml)
    that it’s easy to see that the FD *X* → *Y* is trivial if and only if *Y* is a
    subset of *X*. Well, that’s true too; but I can now say that this latter fact
    isn’t really a definition but rather a *theorem*, easily proved from the definition
    as such. (On the other hand, the definition as such isn’t very helpful in determining
    whether a given FD is trivial, whereas the theorem is. For that reason, we might
    regard the theorem as an *operational* definition, inasmuch as it provides an
    effective test that can easily be applied in practice.) Let me state the theorem
    explicitly for the record:


    *   **Theorem:** Let *X* → *Y* be an FD, *F* say. Then *F* is trivial if and only
    if the dependant *Y* is a subset of the determinant *X* (in symbols, *Y* ⊆ *X*).


    Distinctions like the one I’m drawing here are sometimes characterized as *semantic
    vs. syntactic* distinctions. To spell the point out: The original definition—*F*
    is trivial if and only if it’s satisfied by every relation with the pertinent
    heading—is semantic, because it defines what the concept means; by contrast, the
    theorem, or what I’ve called the “operational” definition—*F* is trivial if and
    only if *Y* is a subset of *X*—is syntactic, because it provides a check that
    can be performed in a purely syntactic way. We’ll be meeting this distinction
    between semantic and syntactic notions again (fairly frequently, in fact) in the
    pages ahead. Indeed, one case in point arises almost immediately in connection
    with the notion of FD irreducibility (see below).


    To continue with the definitions:


    *   **Definition (superkey):** A superkey of relvar *R* is a subset *SK* of the
    heading *H* of *R* such that the FD *SK* → *H* holds in *R* (“is an FD of *R*”).
    That FD is a superkey constraint on *R*.


    For example, {SNO}, {SNO,CITY}, and {SNO,CITY,STATUS} are all superkeys for relvar
    S.


    *   **Definition (irreducible FD):** The FD *X* → *Y* is irreducible with respect
    to relvar *R* (or just irreducible, if *R* is understood) if and only if it holds
    in *R* and *X''* → *Y* doesn’t hold in *R* for any proper subset *X''* of *X*.


    For example, the FD {CITY} → {STATUS} is irreducible with respect to relvar S.
    By contrast, the FD {CITY,SNO} → {STATUS}, though certainly an FD of S, is *reducible*
    with respect to S. Observe that while FDs as such are defined with respect to
    some *heading*, FD irreducibility is defined with respect to some *relvar*. In
    other words, FDs as such are just a syntactic notion (an FD is just an expression
    that takes a certain syntactic form), while FD irreducibility is a matter of semantics
    (it has to do with what the pertinent FD means in connection with the pertinent
    relvar). *Note:* I don’t assume in what follows that the FDs we’re talking about
    are irreducible ones only, though in practice we typically do.


    *   **Definition (key):** A key of relvar *R* is a subset *K* of the heading *H*
    of *R* such that the FD *K* → *H* is an irreducible FD of *R*. That FD is a key
    constraint on *R*.


    Note the appeal to FD irreducibility in the foregoing definition.


    *   **Definition (FD** **implied by keys)** **:** Let relvar *R* have heading
    *H* and let *X* → *Y* be an FD, *F* say, with respect to *H*. Then *F* is implied
    by the keys of *R* if and only if every relation *r* that satisfies *R*’s key
    constraints also satisfies *F*.


    This definition requires some elaboration. First of all, if some relation satisfies
    some key constraint, then of course it satisfies the pertinent uniqueness requirement;
    and if it satisfies the uniqueness requirement for the set of attributes that
    constitute some key, it certainly also satisfies the uniqueness requirement for
    every superset of that set of attributes (just so long as that superset is a subset
    of the pertinent heading, of course)—in other words, for every corresponding superkey.
    Thus, the phrase “satisfies *R*’s key constraints” in the definition could be
    replaced by the phrase “satisfies *R*’s superkey constraints” without making any
    significant difference. Likewise, the concept “implied by keys” could just as
    well be “implied by superkeys,” again without making any significant difference.


    Second, what happens if the FD *F* mentioned in the definition is trivial? Well,
    in that case, by definition, *F* is satisfied by every relation *r* with heading
    *H*, and so *F* is certainly satisfied by every relation *r* that satisfies *R*’s
    key constraints, a fortiori. So trivial FDs are always “implied by keys,” trivially.


    Third, then, suppose *F* is nontrivial. Then it’s easy to prove the following
    theorem:


    *   **Theorem:** Let *F* be an FD that holds in relvar *R*. Then *F* is implied
    by the keys of *R* if and only if it’s a superkey constraint on *R*.


    In other words, it’s like that business with trivial FDs: The formal definition
    as such isn’t much help in determining whether a given FD is implied by keys,
    but the theorem is. For that reason, we can regard the theorem as an *operational*
    definition, since it provides an effective test that can easily be applied in
    practice.


    And now, at last, I can define BCNF:


    *   **Definition (Boyce/Codd normal form):** Relvar *R* is in Boyce/Codd normal
    form (BCNF) if and only if every FD of *R* is implied by the keys of *R*.


    However, given the various definitions and theorems already discussed in this
    section, we can see that the following operational or “syntactic” definition (or
    theorem) is valid too:


    *   **Definition (Boyce/Codd normal form):** Relvar *R* is in Boyce/Codd normal
    form (BCNF) if and only for every nontrivial FD *X* → *Y* that holds in *R*, *X*
    is a superkey for *R*.


    As I put it in Chapter [4](#489629_2_En_4_Chapter.xhtml), it follows from this
    definition that the only FDs that hold in a BCNF relvar are either trivial ones
    (we can’t get rid of those, obviously) or arrows out of superkeys (we can’t get
    rid of those, either). Though now I’d like to add that when I talk about “getting
    rid of” some FD, I fear I’m being—I hope uncharacteristically—a little sloppy
    ... For example, consider relvar S. That relvar is subject to the FD {CITY} →
    {STATUS}, among others; as explained in Chapter [3](#489629_2_En_3_Chapter.xhtml),
    therefore, the recommendation is to decompose the relvar into its projections
    SNC, on {SNO,SNAME,CITY}, and CT, on {CITY,STATUS}. But if we do, then the FD
    {SNO} → {STATUS}, which also holds in relvar S, “disappears,” in a sense; thus
    we have indeed “gotten rid of it,” in a sense. But what does it mean to say the
    FD has disappeared? The answer is: It’s been replaced by a multirelvar constraint
    (that is, a constraint that spans two or more relvars). So the constraint certainly
    still exists—it just isn’t an FD any more.^([^(73)](#fn73)) Similar remarks apply
    throughout this book whenever I talk of “getting rid of” dependencies of any kind,
    be they FDs or otherwise.'
  trans: '

    ## 重新审视鲍伊斯-科德范式


    既然我们已经对`函数依赖`（FD）有了恰当的理解，现在可以着手探讨一个关系变量处于`BCNF`意味着什么这个问题了。我将再次通过一系列精确定义来展开论述。


    ### 定义（平凡函数依赖）

    设`X` → `Y`是一个关于`标题`（heading）`H`的`函数依赖`（FD），记为`F`。当且仅当`F`被每个具有标题`H`的关系所满足时，`F`是平凡的。


    在第四章中，我将平凡`FD`定义为一种不可能被违反的`函数依赖`。当然，那个定义本身没有问题；然而，刚才给出的定义更优，因为它明确提到了相关的`标题`。我在第四章还说过，很容易看出`FD`
    `X` → `Y`是平凡的，当且仅当`Y`是`X`的子集。嗯，这也是对的；但现在我可以说，后一个事实其实不是一个定义，而是一个可以轻松从定义本身证明的*定理*。（另一方面，定义本身对于判断一个给定的`FD`是否是平凡的并没有太大帮助，而定理则很有用。因此，我们可以将该定理视为一个*操作型*定义，因为它提供了一个在实践中容易应用的有效测试方法。）让我将此定理明确陈述如下，以作记录：


    ### 定理

    设`X` → `Y`是一个`函数依赖`，记为`F`。那么，`F`是平凡的当且仅当因变量`Y`是决定因素`X`的子集（符号表示为 `Y ⊆ X`）。


    我现在所区分的这类差异，有时被描述为*语义与句法*的区别。具体来说：原始定义——当且仅当`F`被具有相关标题的每个关系满足时，`F`才是平凡的——是语义的，因为它定义了概念的含义；相比之下，定理，或我所谓的“操作型”定义——当且仅当`Y`是`X`的子集时，`F`才是平凡的——是句法的，因为它提供了一个可以纯句法方式进行的检验。在接下来的内容中，我们将会再次（实际上相当频繁地）遇到语义概念与句法概念之间的这种区别。事实上，一个相关的例子几乎立刻出现在`FD`的**不可约性**（见下文）概念中。


    继续定义：


    ### 定义（超键）

    关系变量`R`的一个超键是`R`的`标题``H`的一个子集`SK`，使得`FD` `SK` → `H`在`R`中成立（即“是`R`的一个`FD`”）。该`FD`就是`R`上的一个超键约束。


    例如，`{供应商号}`（`{SNO}`）、`{供应商号,城市}`（`{SNO,CITY}`）和`{供应商号,城市,状态}`（`{SNO,CITY,STATUS}`）都是关系变量`S`的超键。


    ### 定义（不可约函数依赖）

    `FD` `X` → `Y`关于关系变量`R`是不可约的（或者如果`R`明确，则简称为不可约的），当且仅当它在`R`中成立，并且对于`X`的任何真子集`X''`，`X''`
    → `Y`在`R`中都不成立。


    例如，`FD` `{城市}` → `{状态}`（`{CITY}` → `{STATUS}`）关于关系变量`S`是不可约的。相比之下，`FD` `{城市,供应商号}`
    → `{状态}`（`{CITY,SNO}` → `{STATUS}`），虽然是`S`的一个`FD`，但关于`S`却是*可约的*。请注意，虽然`FD`本身是定义在某个*标题*上的，但`FD`的不可约性却是定义在某个*关系变量*上的。换句话说，`FD`本身只是一个句法概念（`FD`只是一个具有特定句法形式的表达式），而`FD`的不可约性则是一个语义问题（它与相关的`FD`在相关关系变量中的含义有关）。*注意：*在下文中，我并不假设我们讨论的`FD`仅仅是不可约的那些，尽管在实践中我们通常只关注不可约的`FD`。


    ### 定义（键）

    关系变量`R`的一个键是`R`的`标题``H`的一个子集`K`，使得`FD` `K` → `H`是`R`的一个不可约`FD`。该`FD`就是`R`上的一个键约束。


    请注意上述定义中对`FD`不可约性的引用。


    ### 定义（由键所蕴含的函数依赖）

    设关系变量`R`具有标题`H`，并设`X` → `Y`是关于`H`的一个`函数依赖`，记为`F`。那么，当且仅当每个满足`R`的键约束的关系`r`也满足`F`时，`F`是由`R`的键所蕴含的。


    这个定义需要一些详细说明。首先，如果某个关系满足某个键约束，那么它当然满足相应的唯一性要求；并且如果它满足构成某个键的属性集合的唯一性要求，那么它也必然满足该属性集合的任何超集的唯一性要求（当然，只要该超集是相关标题的子集即可）——换句话说，也满足每个对应超键的唯一性要求。因此，定义中的短语“满足`R`的键约束”可以替换为“满足`R`的超键约束”，而不会产生重大差异。同样，“由键所蕴含”的概念也可以等同地称为“由超键所蕴含”，同样不会有重大差异。


    其次，如果定义中提到的`FD` `F`是平凡的，会怎样？那么，根据定义，`F`被每个具有标题`H`的关系`r`所满足，因此`F`当然也被每个满足`R`的键约束的关系`r`所满足，这是不言而喻的。所以，平凡`FD`总是“由键所蕴含”的，这是平凡的。


    第三，那么假设`F`是非平凡的。这样就很容易证明以下定理：


    ### 定理

    设`F`是在关系变量`R`中成立的一个`函数依赖`。那么，`F`是由`R`的键所蕴含的，当且仅当它是`R`上的一个超键约束。


    换句话说，这就像平凡`FD`的情况一样：形式定义本身对于判断一个给定的`FD`是否由键所蕴含没有太大帮助，但定理却很有用。因此，我们可以将该定理视为一个*操作型*定义，因为它提供了一个在实践中容易应用的有效检验方法。


    现在，我终于可以定义`BCNF`了：


    ### 定义（鲍伊斯-科德范式）

    关系变量`R`处于鲍伊斯-科德范式（`BCNF`），当且仅当`R`的每个`FD`都是由`R`的键所蕴含的。


    然而，鉴于本节已讨论的各种定义和定理，我们可以看到以下操作型或“句法”定义（或定理）同样有效：


    ### 定义（鲍伊斯-科德范式）

    关系变量`R`处于鲍伊斯-科德范式（`BCNF`），当且仅当对于在`R`中成立的每个非平凡`FD` `X` → `Y`，`X`都是`R`的一个超键。


    正如我在第四章所表述的，从这个定义可以推导出，在一个`BCNF`关系变量中成立的唯一`FD`，要么是平凡的（显然，我们无法消除这些），要么是源自超键的“箭头”（这些我们也无法消除）。不过，我现在想补充一点：当我说“消除”某个`FD`时，恐怕我表达得——我希望这不是我一贯的风格——有点不严谨……例如，考虑关系变量`S`。该关系变量受`FD`
    `{城市}` → `{状态}`（`{CITY}` → `{STATUS}`）以及其他一些`FD`的约束；因此，如第三章所解释，建议是将该关系变量分解为其在`{供应商号,供应商名,城市}`（`{SNO,SNAME,CITY}`）上的投影`SNC`，以及在`{城市,状态}`（`{CITY,STATUS}`）上的投影`CT`。但如果我们这样做了，那么同样在关系变量`S`中成立的`FD`
    `{供应商号}` → `{状态}`（`{SNO}` → `{STATUS}`），在某种意义上就“消失”了；因此，在某种意义上我们确实“消除”了它。但是，说`FD`消失了意味着什么？答案是：它被一个**多关系变量约束**（即，一个跨越两个或多个关系变量的约束）所取代了。因此，约束肯定仍然存在——它只是不再是一个`FD`了。⁷³^
    在本书中，每当我谈到“消除”任何类型的依赖关系时，无论是`FD`还是其他类型，都有类似的论述。

    '
- fmt: '## Heath’s Theorem


    考虑关系变量`S`及其函数依赖`{CITY} → {STATUS}`。假设我们对其进行分解，但不是像第3章那样分解为关系变量`SNC`和`CT`，而是分解为关系变量`SNT`和`CT`——其中`CT`与之前相同，但`SNT`的标题是`{SNO,SNAME,STATUS}`而非`{SNO,SNAME,CITY}`。图3-1所示关系变量`S`的值对应的`SNT`和`CT`的样本值如图5-1所示：


    ![../images/489629_2_En_5_Chapter/489629_2_En_5_Fig1_HTML.jpg](images/489629_2_En_5_Chapter/489629_2_En_5_Fig1_HTML.jpg)

    图 5-1

    关系变量`SNT`和`CT`——样本值


    给定这个分解，我希望你能看出：


    *   关系变量`SNT`和`CT`都属于BCNF（键分别是`{SNO}`和`{CITY}`，并且在这些关系变量中成立的非平凡函数依赖仅限于“超键的箭头向外”）。

    *   然而，与第3章的分解不同，这个分解不是无损的，而是*有损的*。例如，从图5-1我们无法判断供应商`S2`是在巴黎还是雅典——请注意，如果我们将这两个投影连接起来^(^(74))^会发生什么——因此我们丢失了信息。


    让我们更仔细地看看这个例子。首先，以下是关系变量`SNT`和`CT`的谓词：

    *   `SNC`: *供应商`SNO`的名字是`SNAME`，并且其状态为`STATUS`。*

    *   `CT`: *城市`CITY`的状态为`STATUS`。*


    因此，这两个关系变量连接后的谓词是：

    *   *供应商`SNO`的名字是`SNAME`，并且其状态为`STATUS`***且***城市`CITY`的状态为`STATUS`。*


    现在回顾关系变量`S`的谓词（见第2章练习2.6的答案）：

    *   *供应商`SNO`的名字是`SNAME`，并且位于城市`CITY`，***该城市***的状态为`STATUS`。*


    后一个谓词显然与连接的谓词不同。更准确地说，如果某个给定元组`t`满足前者，那么它也满足连接的谓词，但反之则不成立。这就是为什么该连接“丢失信息”或“有损”——仅仅因为某个元组出现在连接结果中，我们不能假设它也出现在原始的关系变量`S`中。


    那么，究竟是什么使得某些分解是无损的，而另一些是有损的？这个问题是规范化理论的核心所在。可以正式表述为：


    *   ***设`r`是一个关系，`r1, ..., rn`是`r`的投影。为了使`r`等于这些投影的连接，必须满足什么条件？***


    （顺便说一句，请注意这里隐含的假设，如前所述，连接是一个`n`元运算。）


    这个问题的一个重要但不完整的答案由伊恩·希斯在1971年^(^(75))^提供，他证明了如下定理：


    *   **希斯定理**（*针对关系*）：设关系`r`的标题为`H`，并设`X`、`Y`和`Z`满足它们的并集等于`H`（因此`X`、`Y`和`Z`都是`H`的子集）。令`XY`表示`X`和`Y`的并集，`XZ`同理。如果`r`满足函数依赖`X
    → Y`，则`r`等于其在属性集`XY`和`XZ`上的投影的连接。


    作为例子，再次考虑供应商关系（即图3-1所示关系变量`S`的当前值）。该关系满足函数依赖`{CITY} → {STATUS}`。因此，将`X`取为`{CITY}`，`Y`取为`{STATUS}`，`Z`取为`{SNO,SNAME}`，希斯定理告诉我们，将该关系分解为在属性集`{CITY,STATUS}`和`{CITY,SNO,SNAME}`^(^(76))^上的投影是无损的——正如我们已知的那样。


    现在，重要的是要理解（重申一下）希斯对原始问题的回答只是部分性的。我将根据前面的例子解释这意味着什么。基本上，该定理确实告诉我们图3-2（见第3章）中的投影`SNC`和`CT`的分解是无损的；然而，它并没有告诉我们图5-1中`SNT`和`CT`的分解是有损的。换句话说，如果我们基于一个函数依赖进行分解（如图3-2的例子），那么希斯定理表明分解将是无损的；但如果我们基于其他依据进行分解（如图5-1的例子），那么该定理对此没有定论。因此，该定理给出了给定（二元）分解是无损的一个充分条件，而非必要条件。这意味着，即使关系`r`不满足函数依赖`X
    → Y`，也有可能将其无损分解为在`XY`和`XZ`上的投影。*注意：* 本书后面（见第12章）将描述一个更强的希斯定理形式，它给出了给定分解是无损的既必要又充分的条件。


    作为旁注，我指出，希斯在其证明定理的论文中，也给出了他所谓的“第三”范式的定义，而该定义实际上就是BCNF的定义。由于该定义比博伊斯和科德的定义早了大约三年，在我看来，BCNF理应被称为*希斯*范式。但事实并非如此。


    现在，在第3章“规范化服务于两个目的”一节中，我曾说过类似这样的话：


    *   如果你一直在仔细注意，你可能会有理由指责我在上述讨论中玩了一个小把戏。具体来说，我考虑的是一个*关系*分解是无损意味着什么；但规范化（我们本应讨论的主题）不是分解关系的问题，而是分解*关系变量*的问题。


    嗯，这些评论在这里也适用！所以我们还是回到关系变量……再次考虑关系变量`S`。假设我们确实决定执行推荐的分解，将其分解为“投影”关系变量`SNC`和`CT`；此外，假设我们希望该分解是无损的，我们当然希望如此。换句话说，我们希望该分解能使得，*在任何时候*，关系变量`S`的当前值都等于`SNC`和`CT`当前值的连接^(^(77))^。也就是说，我们希望关系变量`S`服从以下完整性约束`YCT`（实际上它是一个相等依赖——见第3章）：


    ```

    CONSTRAINT YCT

    S = JOIN { S { SNO , SNAME , CITY } , S { CITY , STATUS } } ;

    ```


    现在，回顾第2章，关系变量`S`肯定服从我称之为`XCT`的约束：


    ```

    CONSTRAINT XCT

    COUNT ( S { CITY } ) = COUNT ( S { CITY , STATUS } ) ;

    ```


    只是为了提醒你，后一个约束仅仅表明函数依赖`{CITY} → {STATUS}`在`S`中成立。因此，诉诸希斯定理，我们看到关系变量`S`的每一个可能值，既然它必然满足约束`XCT`，那么也必然满足约束`YCT`。因此，约束`XCT`*蕴含*约束`YCT`（为了阐明这一点，其含义是，如果关系变量`S`服从`XCT`——它确实服从——那么它也必然服从`YCT`）。因此，约束`YCT`确实成立，并且关系变量`S`分解为关系变量`SNC`和`CT`确实是无损的，符合要求。由此可见，我们可以将希斯定理应用于关系变量，而不仅仅是关系。所以让我们据此重述它：'
  raw: '## Heath’s Theorem


    Consider relvar S once again, with its FD {CITY} → {STATUS}. Suppose we decompose
    that relvar, not as in Chapter [3](#489629_2_En_3_Chapter.xhtml) into relvars
    SNC and CT, but instead into relvars *SNT* and CT—where CT is the same as before,
    but SNT has heading {SNO,SNAME,STATUS} instead of {SNO,SNAME,CITY}. Sample values
    for SNT and CT corresponding to the value shown for S in Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1)
    are shown in Figure [5-1](#489629_2_En_5_Chapter.xhtml#Fig1):


    ![../images/489629_2_En_5_Chapter/489629_2_En_5_Fig1_HTML.jpg](images/489629_2_En_5_Chapter/489629_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Relvars SNT and CT—sample values


    Given this decomposition, I hope you can see that:


    *   Relvars SNT and CT are both in BCNF (the keys are {SNO} and {CITY}, respectively,
    and the only nontrivial FDs that hold in those relvars are “arrows out of superkeys”).


    *   Unlike the decomposition in Chapter [3](#489629_2_En_3_Chapter.xhtml), however,
    this decomposition is not nonloss but *lossy*. For example, we can’t tell from
    Figure [5-1](#489629_2_En_5_Chapter.xhtml#Fig1) whether supplier S2 is in Paris
    or Athens—note what happens if we join the two projections together^([^(74)](#fn74))—and
    so we’ve lost information.


    Let’s take a slightly closer look at this example. First of all, here are the
    predicates for relvars SNT and CT:


    *   SNC: *Supplier SNO is named SNAME and has status STATUS.*


    *   CT: *City CITY has status STATUS.*


    So the predicate for the join of those two relvars is:


    *   *Supplier SNO is named SNAME and has status STATUS* **and** *city CITY has
    status STATUS.*


    Now recall the predicate for relvar S (see the answer to Exercise 2.6 in Chapter
    [2](#489629_2_En_2_Chapter.xhtml)):


    *   *Supplier SNO is named SNAME and is located in city CITY,* **which** *has
    status STATUS.*


    This latter predicate is clearly not the same as the predicate for the join. To
    be more precise, if some given tuple *t* satisfies it, then that tuple *t* also
    satisfies the predicate for the join, but the converse is false. That’s why the
    join “loses information” or “is lossy”—just because some tuple appears in the
    join, we can’t assume it also appears in the original relvar S.


    So what exactly is it that makes some decompositions nonloss and others lossy?
    This is the question that lies at the heart of normalization theory. It can be
    stated formally thus:


    *   ***Let r be a relation and let r1, ..., rn be projections of r. What conditions
    must be satisfied in order for r to be equal to the join of those projections?***


    (By the way, note the tacit assumption here that—as noted earlier—join is an *n-*adic
    operator.)


    An important, albeit partial, answer to this question was provided by Ian Heath
    in 1971^([^(75)](#fn75)) when he proved the following theorem:


    *   **Heath’s Theorem** (*for relations*): Let relation *r* have heading *H* and
    let *X*, *Y*, and *Z* be such that their union is equal to *H* (so *X*, *Y*, and
    *Z* are all subsets of *H*). Let *XY* denote the union of *X* and *Y*, and similarly
    for *XZ*. If *r* satisfies the FD *X* → *Y*, then *r* is equal to the join of
    its projections on *XY* and *XZ*.


    By way of example, consider the suppliers relation once again (i.e., the current
    value of relvar S as shown in Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1)).
    That relation satisfies the FD {CITY} → {STATUS}. Thus, taking *X* as {CITY},
    *Y* as {STATUS}, and *Z* as {SNO,SNAME}, Heath’s Theorem tells us that the decomposition
    of that relation into its projections on the sets of attributes {CITY,STATUS}
    and {CITY,SNO,SNAME}^([^(76)](#fn76)) is nonloss—as indeed we already know.


    Now, it’s important to understand that (to repeat) Heath’s answer to the original
    question was only partial. I’ll explain what this means in terms of the foregoing
    example. Basically, the theorem does tell us the decomposition into projections
    SNC and CT (see Figure [3-2](#489629_2_En_3_Chapter.xhtml#Fig2) in Chapter [3](#489629_2_En_3_Chapter.xhtml))
    is nonloss; however, it doesn’t tell us the one into SNT and CT (see Figure [5-1](#489629_2_En_5_Chapter.xhtml#Fig1))
    is lossy. In other words, if we decompose on the basis of an FD, as we did in
    the example of Figure [3-2](#489629_2_En_3_Chapter.xhtml#Fig2), then Heath’s Theorem
    says the decomposition will be nonloss; but if we decompose on some other basis,
    as we did in the example of Figure [5-1](#489629_2_En_5_Chapter.xhtml#Fig1), then
    the theorem has nothing to say on the matter. Thus, the theorem gives a sufficient
    condition, but not a necessary one, for a given (binary) decomposition to be nonloss.
    It follows that it might be possible to decompose relation *r* in a nonloss way
    into its projections on *XY* and *XZ* even if it doesn’t satisfy the FD *X* →
    *Y*. *Note:* I’ll be describing a stronger form of Heath’s Theorem, one that gives
    both necessary and sufficient conditions for a given decomposition to be nonloss,
    later in this book (see Chapter [12](#489629_2_En_12_Chapter.xhtml)).


    As an aside, I remark that in the paper in which he proved his theorem, Heath
    also gave a definition of what he called “third” normal form that was in fact
    a definition of BCNF. Since that definition preceded Boyce and Codd’s definition
    by some three years, it seems to me that BCNF ought by rights to be called *Heath*
    normal form. But it isn’t.


    Now, in Chapter [3](#489629_2_En_3_Chapter.xhtml), in the section “Normalization
    Serves Two Purposes,” I said something like the following:


    *   If you’ve been paying careful attention, you might reasonably accuse me of
    practicing a tiny deception in the foregoing discussion. To be specific, I’ve
    considered what it means for a decomposition of *relations* to be nonloss; but
    normalization, which is what we’re supposed to be talking about, isn’t a matter
    of decomposing relations, it’s a matter of decomposing *relvars*.


    Well, these remarks apply here too! So let’s get back to relvars ... Consider
    relvar S once again. Suppose we do decide to perform the recommended decomposition
    into the “projection” relvars SNC and CT; moreover, suppose we want that decomposition
    to be nonloss, as indeed we surely do. In other words, what we want is for the
    decomposition to be such that, *at all times*, the current value of relvar S is
    equal to the join of the current values of SNC and CT.^([^(77)](#fn77)) That is,
    we want relvar S to be subject to the following integrity constraint, YCT (actually
    it’s an equality dependency—see Chapter [3](#489629_2_En_3_Chapter.xhtml)):


    ```

    CONSTRAINT YCT

    S = JOIN { S { SNO , SNAME , CITY } , S { CITY , STATUS } } ;

    ```


    Now, recall from Chapter [2](#489629_2_En_2_Chapter.xhtml) that relvar S is certainly
    subject to the constraint that I there called XCT:


    ```

    CONSTRAINT XCT

    COUNT ( S { CITY } ) = COUNT ( S { CITY , STATUS } ) ;

    ```


    Just to remind you, this latter constraint merely says the FD {CITY} → {STATUS}
    holds in S. Appealing to Heath’s Theorem, therefore, we see that every possible
    value of relvar S, since it necessarily satisfies constraint XCT, necessarily
    satisfies constraint YCT as well. And it follows that constraint XCT *implies*
    constraint YCT (meaning, to spell the point out, that if relvar S is subject to
    XCT—which it is—then it’s necessarily subject to YCT as well). So constraint YCT
    does hold, and the decomposition of relvar S into relvars SNC and CT is indeed
    nonloss, as required. It follows that we can take Heath’s Theorem as applying
    to relvars after all, not just to relations. So let’s restate it accordingly:'
