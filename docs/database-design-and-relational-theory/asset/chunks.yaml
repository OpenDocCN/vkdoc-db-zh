  trans: "## 组合分量\n\n至此我们已看到，某些连接依赖（JD）蕴含其他连接依赖，正如某些函数依赖（FD）蕴含其他函数依赖。但无关分量远非故事的结局。下一点如下所述（我将其标记为定理，但它非常明显，几乎配不上如此宏大的称谓）：\n\
    \n### 定理\n\n设 `J` 为一个 JD，并设 `J'` 是通过将 `J` 的两个分量替换为其并集而派生出的 JD。那么 `J` 蕴含 `J'`（即，每一个满足\
    \ `J` 的关系也满足 `J'`）。\n\n举例来说，关系变量 `S` 的每一个合法值都满足以下 JD（这是上一节中的 JD，即包含一个无关分量的那个）——\n\
    \n```\n☼ { { SNO , SNAME , CITY } , { CITY , STATUS } , { SNAME , CITY } }\n```\n\
    \n——因此也满足下面这个 JD：\n\n```\n☼ { { SNO , SNAME , CITY } , { CITY , STATUS , SNAME\
    \ } }\n```\n\n### 练习\n\n请自行验证上述主张的有效性——如果它不是一目了然的话，甚至可以尝试形式化地证明它。（另外，通过这种方式组合分量，可以从给定的\
    \ JD 派生出多少个不同的 JD？）引申要点：\n\n*   在第 10 章解释成员资格算法（即测试某个 JD 是否由键蕴含的算法）背后的直觉时，我隐式地利用了上述定理。\n\
    *   请注意，该定理涉及的是一个蕴含关系，而非等价关系：`J` 蕴含 `J'`，但反之不成立——一般而言，`J'` 并不蕴含 `J`，因此 `J` 和 `J'`\
    \ 并不等价（同样，是一般情况下）。\n    *注：* 事实上这一点很容易看出：如果我们持续用分量的并集替换分量，最终会得到一个等于整个标题的 JD，得到的\
    \ JD `J'` 将是平凡的——显然，并非每一个 JD 都等价于某个平凡 JD。\n*   尽管上面所示的两个 JD 中的第二个（即二元 JD）在关系变量\
    \ `S` 中成立，但基于该 JD 对关系变量 `S` 进行无损分解**并不是**一个好主意。\n    *注：* 练习 11.4 要求你进一步解释这一观察结果，但现在你或许可以花点时间让自己确信它是正确的。另外——提前说一下——我可以说所讨论的那个二元\
    \ JD，事实上对于 `S` 来说是*不可约的*（参见紧随其后的章节）。因此，这个例子表明，尽管不可约 JD 很重要，但它们不一定对应于好的分解。换句话说，非正式地说，我们需要区分“好”和“坏”的\
    \ JD，这里的“好”与“坏”指的是相应分解的质量。关于此类问题的进一步讨论，请参见第 16 章。\n\n## 不可约 JD\n\n到目前为止，一个 JD\
    \ 蕴含另一个 JD 的概念或多或少是语法层面的——我并没有真正关注我们所讨论的 JD 是否确实在某个给定的关系变量中成立。（请注意，无论是无关分量的定义，还是关于用分量并集替换的定理，都没有提及任何关系变量，甚至没有提及标题。）然而，现在让我们考虑那些确实在某个关系变量中成立的\
    \ JD。于是我们有下面的定理：\n\n### 定理\n\n设 JD `J` 在关系变量 `R` 中成立；那么 `J` 等价于某个同样在 `R` 中成立的不可约\
    \ JD（不一定唯一）。\n\n我稍后会解释 JD 不可约的确切含义。但首先请注意，等价（即 JD 的等价）的概念必须在某个特定关系变量的上下文中理解；也就是说，可能存在两个\
    \ JD，它们在一个关系变量中都成立，但在另一个关系变量中只有一个成立。在这种情况下，这两个 JD 对于第一个关系变量可能等价也可能不等价，但对于第二个关系变量它们肯定不等价。\n\
    \n现在来谈谈 JD 等价本身。让我先提醒你本书第二部分关于 FD 的一点：即，每一个在关系变量 `R` 中成立的 FD 都蕴含某个同样在 `R` 中成立的不可约\
    \ FD。（这很容易理解：只需不断从决定因素中删除属性，直到剩下的不再是 `R` 中成立的 FD。）类似地，每一个在关系变量 `R` 中成立的 JD 都蕴含——事实上（一个更强的说法）——等价于某个同样在\
    \ `R` 中成立的不可约 JD。\n\n### 定义（不可约 JD）\n\n设 `☼{*X1*,...,*Xn*}` 是一个在关系变量 `R` 中成立的\
    \ JD，记作 `J`，并且不存在 `{*X1*,...,*Xn*}` 的真子集 `{*Y1*,...,*Ym*}`，使得 JD `☼{*Y1*,...,*Ym*}`\
    \ 也在 `R` 中成立。那么，`J` 对于 `R` 是不可约的（或者简称为不可约的，如果 `R` 是已知的）。\n\n引申要点：\n\n*   容易看出，每一个在关系变量\
    \ `R` 中成立的 JD 都蕴含一个同样在 `R` 中成立的不可约 JD：只需不断从给定的 JD 中删除分量，直到剩下的 JD 不再在 `R` 中成立，那么最后一个成立的\
    \ JD 就是不可约的。\n*   也很容易看出，蕴含关系在另一个方向上也成立：从不可约 JD 开始，将被删除的分量一个一个地加回去，直到恢复原始 JD。在此过程的每一步，当前版本的\
    \ JD 都将是一个在 `R` 中成立的 JD。\n    *注：* 综合这一点和前一点，可以得出：(a) 每一个在 `R` 中成立的 JD 都等价于某个在\
    \ `R` 中成立的不可约 JD（事实上如前所述），因此 (b) 在 `R` 中成立的不可约 JD 实际上蕴含了所有在 `R` 中成立的 JD。\n*  \
    \ 如果某个分量 `Xi` 在 `J` 中是无关的，那么 `J` 对于它成立的每一个关系变量肯定是可约的（因为 `Xi` 可以被删除而不会造成重大损失）。然而，即使所有分量都是相关的，`J`\
    \ 对于某个关系变量仍然可能是可约的，如下所示。\n\n再次考虑供应商关系变量 `S`。但为了简单起见，我们同意忽略属性 `SNAME`；而且，我们同意在进一步通知之前，将名称“`S`”视为指代这个简化版本的关系变量。现在考虑以下\
    \ JD：\n\n```\n☼ { { SNO , CITY } , { CITY , STATUS } , { SNO , STATUS } }\n```"
- fmt: "This JD—let’s call it `J1`—clearly has no irrelevant components. However,\
    \ I’ll show that (a) it holds in relvar `S` but that (b) it’s reducible with respect\
    \ to that relvar, because the `{CITY,STATUS}` component can be dropped and what’s\
    \ left is still a JD of `S`.\n\n*Note:* Actually the reducibility in this example\
    \ is intuitively obvious, because (to state the matter precisely) the projection\
    \ on `{CITY,STATUS}` of `S` is clearly equal to the projection on `{CITY,STATUS}`\
    \ of the join of `S{SNO,CITY}` and `S{SNO,STATUS}`. As a consequence, the `{CITY,STATUS}`\
    \ component adds nothing, as it were. To repeat, therefore: The reducibility is\
    \ “obvious”—but now I want to prove it.\n\n1.  First, then, suppose the following\
    \ tuples appear in `S`:\n\n    ```\n    s1  c1  t2\n    s2  c1  t1\n    s1  c2\
    \  t1\n    ```\n\n    (I’m using an obvious simplified notation for tuples here;\
    \ `s1` and `s2` denote supplier numbers, `c1` and `c2` denote supplier cities,\
    \ and `t1` and `t2` denote status values. Note how each of the three tuples corresponds\
    \ to one component of JD `J1`.)\n\n    Now, because `{SNO}` is a key, the following\
    \ FDs hold in `S`:\n\n    ```\n    { SNO } → { CITY }\n    { SNO } → { STATUS\
    \ }\n    ```\n\n    We can therefore conclude that `c1` = `c2` and `t1` = `t2`,\
    \ and so the tuple\n\n    ```\n    s1  c1  t1\n    ```\n\n    appears in `S`,\
    \ necessarily, because in fact it’s identical to the first (or, equally, the third)\
    \ in the original list of tuples as shown above. But to say the original “three”\
    \ tuples cause this “fourth” tuple to appear—if you see what I mean—is to say,\
    \ precisely, that JD `J1` holds (I mean, that’s what `J1` says). So `J1` does\
    \ hold in `S`.\n\n2.  Now appealing to either of the FDs `{SNO} → {CITY}` and\
    \ `{SNO} → {STATUS}` (both of which hold in `S`, as we know) and to Heath’s Theorem,\
    \ we see that the following JD—let’s call it `J2`—certainly holds in relvar `S`:\n\
    \n    ```\n    ☼ { { SNO , CITY } , { SNO , STATUS } }\n    ```\n\n    But the\
    \ components of `J2` form a proper subset of those of `J1`. It follows that `J1`\
    \ is reducible with respect to `S`. To be specific, the component `{CITY,STATUS}`\
    \ can be dropped from `J1` without loss, in the sense that what remains is still\
    \ a JD of `S`.\n\nObserve now that the foregoing proof made no use of the fact\
    \ that the functional dependency `{CITY} → {STATUS}` holds in `S` (indeed, the\
    \ result would still be valid even if that FD didn’t hold). But now let’s do another\
    \ example that does make use of that FD:\n\n*   First, we know from the previous\
    \ example that the following JD (`J1` from that example) holds in `S`:\n\n   \
    \ ```\n    ☼ { { SNO , CITY } , { CITY , STATUS } , { SNO , STATUS } }\n    ```\n\
    \n*   But the FD `{CITY} → {STATUS}` also holds, and so by Heath’s Theorem the\
    \ following JD—let’s call it `J3`—holds as well:\n\n    ```\n    ☼ { { SNO , CITY\
    \ } , { CITY , STATUS } }\n    ```\n\n*   The components of `J3` form a proper\
    \ subset of those of `J1`, and so it follows once again that `J1` is reducible\
    \ with respect to `S`. To be specific, the component `{SNO,STATUS}` can be dropped\
    \ from `J1` without loss, in the sense that what remains is still a JD of `S`.\n\
    \nObserve, therefore, that the original JD `J1` is equivalent, with respect to\
    \ relvar `S`, to two distinct JDs: namely, `J2` and `J3`.\n\nIn general, of course,\
    \ the question is: Given relvar `R` and a JD `J` that holds in `R`, how can we\
    \ find an irreducible equivalent (meaning, to be more precise about the matter,\
    \ a JD that’s both equivalent to `J` and irreducible, where `equivalent` and `irreducible`\
    \ are both understood as being with respect to `R`)? Well:\n\n*   If some component\
    \ is irrelevant in `J`, that component can clearly be dropped.\n*   If all components\
    \ are relevant, we can only try dropping one, and then:\n    1.  If what’s left\
    \ is still a JD of `R`, we drop another component and repeat the process.\n  \
    \  2.  If what’s left isn’t a JD of `R`, we reinstate the dropped component and\
    \ try dropping another one.\n\nEventually, we’ll arrive at a JD that’s equivalent\
    \ to the original one and is irreducible.\n\nAnd how do we tell whether some JD\
    \ is in fact a JD of `R`? Well, if it’s one that’s been explicitly declared as\
    \ such, there’s clearly no problem; but if not, we can use the `chase`, which\
    \ I’ll be describing in the next section but one."
