  trans: "\n本章的一位审阅者指出，进行规范化设计的另一个优势在于，此类设计倾向于简化复杂查询的表述，因为它使得代表此类表述的表达式能够通过嵌套简单的子表达式而更具模块性。原则上确实如此，但我感到有必要补充一点：尽管在像`Tutorial\
    \ D`这样设计良好的语言中（使用该语言的`WITH`特性，本书其他章节的示例中有所说明）可以轻松构建这种模块化的表述，但在 SQL 中要表述它们却困难得多——有时甚至不可能。为什么？因为\
    \ SQL 的`WITH`特性远不如`Tutorial D`的有用，原因在于：(a) SQL 中 SELECT 子句的语义对整体表达式中某些其他结构（尤其但不限于`GROUP\
    \ BY`和`HAVING`子句以及聚合运算符调用）的存在与否很敏感，因此也导致(b) 在 SQL 中，语义结构和语法结构之间不存在类似一对一的映射关系。\n\
    \n我的最后一点是：无论我们讨论的是\n\n1.  真正的反规范化，仅在物理层面进行，还是\n2.  在当今大多数 SQL 产品中我们必须做的那种反规范化，它也影响逻辑层面，\n\
    \n一个未被广泛认识到的关键点是，当人们说“为性能而反规范化”时，他们实际上指的是*特定应用*的性能。正如我之前在“反规范化意味着什么？”一节中所述，反规范化通常基于对整体问题较为狭隘的视角。*任何*特定的物理设计都可能对某些应用有利，而对另一些应用不利（就其性能影响而言）。\n\
    \n## 本章总结\n\n在本章中，我提出了强有力的论据来支持不进行反规范化；因此，实际上，我给出了支持规范化的论据。当然，好的设计通常是完全规范化的。但重要的是要理解，反之则未必成立！也就是说，一个设计可以是完全规范化的，但仍然是糟糕的。例如，关系变量`S`在属性`SNO`和`STATUS`上的投影`ST`肯定是\
    \ BCNF——事实上，正如我们将在本书第四部分看到的，它处于最高可能的范式——但正如我们在第 6 章看到的，这显然不是一个好的设计。\n\n### 结束语\n\
    \n## 练习题\n\n1.  有时有人提出，二元关系变量相对于关系模型所支持的一般*n*元关系变量的一个优势是，二元关系变量总是处于 BCNF（这或许意味着我们无需担心规范化和反规范化）。请证明二元关系变量确实总是处于\
    \ BCNF，或者通过给出一个反例来证明该说法不正确。\n\n2.  以下是某数据库顾问发表的一篇采访摘录。^(¹¹⁹) 它以该顾问的陈述开始：\n   \
    \ *   ***顾问：*** 这些问题...很大程度上是由于跨多个[关系变量]规范化数据造成的...然而，许多查询在数据被反规范化后要容易理解得多...\n\
    \    *   ***采访者：*** 反规范化难道不会潜在地降低数据完整性并减少支持未预期查询的灵活性吗？\n    *   ***顾问：*** 规范化及其对消除冗余存储的强调，纯粹是一个事务处理问题。当用户查看数据时，他们看到的是冗余形式的数据。为了将数据转换为对用户有用的形式，必须通过连接（join）对其进行反规范化，这本质上是一种为提高易用性而动态反规范化数据的方式。问题在于用户无法容忍连接所需的时间和成本。为了解决这个问题，公司不断在越来越多的决策支持数据库中复制数据，这些数据库代表了数据的反规范化视图。\n\
    \n    你认为上述观点有什么问题（如果有的话）？\n\n3.  本章正文提到了使用代理标识符或键的可能性。事实上，许多设计者推荐使用此类人工或代理键来替代有时被称为“自然”键的键。例如，我们可能会在通常的供货关系变量中添加一个属性`SPNO`（当然要确保其具有唯一性），然后将`{SPNO}`作为该关系变量的一个代理键。（但请注意，`{SNO,PNO}`仍然是一个键；它只是不再是唯一的键了。）因此，代理键是通常意义上的关系键，但\
    \ (a) 它们总是由恰好一个属性组成，并且 (b) 它们的值仅作为其代表实体的代理（即，它们仅仅用于表示那些实体存在——它们绝对不携带任何额外的含义或包袱）。理想情况下，这些代理值应由系统生成，但它们是由系统还是用户生成，与代理键的基本概念本身无关。两个问题：代理键与元组\
    \ ID 是同一回事吗？你认为代理键是个好主意吗？\n\n4.  如果两个设计是信息等价的，那么必须能够使用关系代数的操作将它们相互转换。因此，请考虑本章正文中给出的关于雇员关系变量的以下两种竞争性设计：\n\
    \n    ```\n    EMP { ENO , JAN_PAY , FEB_PAY , ..., DEC_PAY }\n    KEY { ENO }\n\
    \    EMP { ENO , MONTH , PAY }\n    KEY { ENO , MONTH }\n    ```\n\n    使用`Tutorial\
    \ D`或 SQL（或你首选的数据库语言），展示如何将每种设计转换为另一种。\n"
- fmt: "## Answers\n\n1.  This exercise is (deliberately) a repeat in different words\
    \ of Exercise 4.6 in Chapter [4](#489629_2_En_4_Chapter.xhtml). The claim is incorrect,\
    \ as was shown in the answer to that earlier exercise.\n\n2.  It’s truly astonishing\
    \ how many erroneous statements can be made in such a tiny amount of text ...\
    \ Here are some of my own responses to the views expressed:\n    *   “Many queries\
    \ are much easier to understand if the data is denormalized”: I suspect that *understand*\
    \ here ought really to be *formulate* (for instance, *understanding* the query\
    \ “Get all supplier details” has nothing to do with how the database is designed).\
    \ If I’m right, then the claim might be valid. But the opposite claim is valid\
    \ too!—many queries are easier to formulate if the data isn’t denormalized, as\
    \ I showed in the body of the chapter.\n    *   The interviewer suggests that\
    \ denormalization can cause integrity problems and can reduce flexibility in supporting\
    \ unanticipated queries. I agree with these suggestions.\n    *   “Normalization,\
    \ and its emphasis on elimination of redundant storage, is purely a transaction\
    \ processing issue”: Normalization is about reducing *redundancy*, not reducing\
    \ redundant *storage*—though I suppose the consultant might be forgiven for conflating\
    \ the two, given the implementations most widely available today. But it’s categorically\
    \ not “a transaction processing issue”! As I put it in Chapter [1](#489629_2_En_1_Chapter.xhtml),\
    \ when we do database design in general, and when we do normalization in particular,\
    \ we’re concerned primarily with what the data *is*, not with how it’s going to\
    \ be used.\n    *   “When users view data, they see it in a redundant form”: Sometimes\
    \ they do, sometimes they don’t. But even if they do, that’s not an argument for\
    \ a denormalized design. For example, the users could be presented with a denormalized\
    \ perception of the data by means of the conventional view mechanism—I’m not saying\
    \ they should be, only that they could be—while the underlying database remains\
    \ properly normalized.\n    *   “In order to transform data into a form that is\
    \ useful ...”: This is simply a tendentious remark.\n    *   “[Join] is essentially\
    \ a way of dynamically denormalizing data for greater ease of use”: The user might\
    \ think of joins being done dynamically, but there’s no reason in general why\
    \ they can’t be done statically (i.e., ahead of time)—and I believe they often\
    \ would be, given a well architected `DBMS` .^([^(120)](#fn120)) It’s also untrue\
    \ to suggest that the result of a join must always be denormalized. “Greater ease\
    \ of use” is another tendentious remark.\n    *   “[Users] can’t tolerate the\
    \ time and cost of joins”: Joins aren’t necessarily time consuming or expensive.\
    \ Again, it depends on the implementation. In any case, “can’t tolerate” is, in\
    \ my opinion, far too judgmental.\n    *   “To address the problem, companies\
    \ replicate data in an ever increasing number of decision support databases, which\
    \ represent denormalized views of the data”: This might be true, but if it is\
    \ it’s an indictment of current implementations, not an argument for denormalization\
    \ as such.\n\n3.  First of all, surrogate keys are *not* the same thing as tuple\
    \ IDs. For one thing (to state the obvious), surrogates identify entities and\
    \ tuple IDs identify tuples, and there’s certainly nothing like a one to one correspondence\
    \ between entities and tuples. (Think of derived tuples in particular—for example,\
    \ tuples in the result of some query. In fact, it’s not at all clear that derived\
    \ tuples will have tuple IDs anyway.) Furthermore, tuple IDs usually have performance\
    \ connotations, but surrogates don’t (access to a tuple via its tuple ID is usually\
    \ assumed to be fast, but no such observation applies to surrogates). Also, tuple\
    \ IDs are often concealed from the user,^([^(121)](#fn121)) but surrogates mustn’t\
    \ be, thanks to *The Information Principle* (see Exercise 2.1 in Chapter [2](#489629_2_En_2_Chapter.xhtml));\
    \ in other words, it’s probably (and desirably!) not possible to store a tuple\
    \ ID in a database relvar, while it certainly (and desirably) is possible to store\
    \ a surrogate in a database relvar. In a nutshell: Surrogate keys have to do with\
    \ logical design, tuple IDs have to do with physical design.\n\n    Are surrogate\
    \ keys a good idea? Well, observe first that the relational model has nothing\
    \ to say on this question; like the business of design in general, in fact, whether\
    \ or not to use surrogate keys has to do with *how to apply* the relational model,\
    \ not with the relational model as such. That said, I have to say too that the\
    \ question of whether surrogate keys are good or bad is far from straightforward.\
    \ There are strong arguments on both sides: so many such, in fact, that I can’t\
    \ possibly do justice to them here (though some of them are summarized in Chapter\
    \ [17](#489629_2_En_17_Chapter.xhtml)). For further details, see the paper “Composite\
    \ Keys,” in my book *Relational Database Writings 1989-1991* (Addison-Wesley,\
    \ 1992). *Note:* The paper in question is called “Composite Keys” because surrogate\
    \ keys are perhaps most likely to be useful in practice in situations in which\
    \ existing keys, and corresponding foreign keys, are composite keys specifically.\n\
    \n4.  I show solutions in `SQL`, just for a change. Defining the first in terms\
    \ of the second (in outline):\n    ```sql\n    SELECT DISTINCT EX.ENO ,\n    \
    \    ( SELECT PAY\n          FROM   EMP AS EY\n          WHERE  EY.ENO = EX.ENO\n\
    \          AND    MONTH = 'Jan' ) AS JAN_PAY ,\n        ...\n        ( SELECT\
    \ PAY\n          FROM   EMP AS EY\n          WHERE  EY.ENO = EX.ENO\n        \
    \  AND    MONTH = 'Dec' ) AS DEC_PAY\n    FROM   EMP AS EX\n    ```\n\n    Defining\
    \ the second in terms of the first (again in outline):\n    ```sql\n    SELECT\
    \ ENO , 'Jan' AS MONTH , JAN_PAY AS PAY FROM EMP\n    UNION\n    ...\n    UNION\n\
    \    SELECT ENO , 'Dec' AS MONTH , DEC_PAY AS PAY FROM EMP\n    ```\n\n# Part\
    \ III\n## Join Dependencies, Fifth Normal Form, and Related Matters\n\nThis part\
    \ of the book does for join dependencies and fifth normal form what the previous\
    \ part did for functional dependencies and Boyce/Codd normal form. It also ties\
    \ up a number of loose ends having to do with normalization as a major component\
    \ of design theory in general."
