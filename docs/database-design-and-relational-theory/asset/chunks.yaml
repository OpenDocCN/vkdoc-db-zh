  trans: "\n### 引言\n嗯，在这一点上你可能已经超过我了（事实上，我希望如此）……显然，我们需要做的是：首先，解包（unpack）两个输入关系；然后对这些解包后的关系执行连接（join）；接着将连接结果重新打包（pack）以获得最终结果。如果我们完成了所有这些步骤，那么我们将得到如图\
    \ 14-5 所示的打包后的关系。*练习：* 再次验证这一结论（参见练习 14.6d）。\n\n### 定义（U_join）\n以上述示例作为动机，因此，这里给出一个定义——请注意，这又是一个大大简化的定义——关于一种我们称之为\
    \ `U_join` 的广义连接形式：\n\n*   **定义 (`U_join`)** **：** 设关系 `r1` 和 `r2` 是可连接的^(¹⁹⁵)，并且它们有一个共同的区间值属性\
    \ `A`。那么表达式 `USING (A) : JOIN {r1,r2}` 表示 `r1` 和 `r2` 的 `U_join`（关于 `A`），它被定义为以下内容的简写：\n\
    \n```\nPACK\n( JOIN\n{ ( UNPACK r1 ON ( A ) ) ,\n( UNPACK r2 ON ( A ) ) }\nON\
    \ ( A )\n```\n\n所以，正如我或多或少已经说过的，`U_join` 的工作方式是：首先解包两个输入关系，然后对这些解包后的中间结果执行常规连接，最后将连接结果（重新）打包以获得最终结果。\n\
    \n### 定义（U_equality）\n现在我也可以如承诺的那样，让信息等价这个概念更精确一些。具体来说，图 14-4 和图 14-5 中的关系是信息等价的，因为它们具有相同的解包形式；实际上，它们是\
    \ `U_equal` 的。以下是一个简化的定义：\n\n*   **定义 (`U_equality`)** **：** 设关系 `r1` 和 `r2` 具有相同的标题\
    \ `H`，并且它们有一个共同的区间值属性 `A`。那么表达式 `USING (A) : r1 = r2` 表示 `r1` 和 `r2` 之间关于 `A`\
    \ 的 `U_equality` 比较，它被定义为以下内容的简写：\n\n```\n( UNPACK r1 ON ( A ) ) = ( UNPACK r2\
    \ ON ( A ) )\n```\n\n那么，总结一下目前的内容：图 14-4 中的关系当然不等于其关于 `{SNO,CITY,DURING}` 和 `{SNO,STATUS,DURING}`\
    \ 的常规投影的常规连接。然而，它 *是* 相应 `U_projections` 的 `U_join` 的 `U_equal`。\n\n### 定义（U_join\
    \ 依赖）\n现在假设这种情况并非偶然——这不仅仅是我碰巧选择在图 14-4 中展示的样本值的问题——而是适用于所讨论关系变量（即关系变量 `SCT_DURING`）所有可能值的一个属性。那么我们可以说所讨论的关系变量服从某个广义连接依赖（实际上是一个\
    \ `U_JD`）。以下是一个简化的定义：\n\n*   **定义 (U_join 依赖)：** 设 `H` 是一个标题，并设 `H` 的属性 `A` 是区间值的。那么关于\
    \ `A` 和 `H` 的 U_join 依赖（简称 `U_JD`）是一个形式为 `USING (A) : ☼{X1,X2,...,Xn}` 的表达式，其中\
    \ `X1`, `X2`, ..., `Xn`（`U_JD` 的组成部分）是 `H` 的子集，且它们的并集等于 `H`。\n\n当然，接着我们会说：\n\n\
    *   一个给定的关系满足一个给定的 `U_JD`，当且仅当它 `U_equal` 于相关 `U_projections` 的 `U_join`。\n* \
    \  一个给定的关系变量服从一个给定的 `U_JD`——等价地说，该给定的 `U_JD` 在该给定的关系变量中成立——当且仅当可以赋值给该关系变量的每一个关系都满足该\
    \ `U_JD`。\n\n因此，在示例中，以下 `U_JD` 在关系变量 `SCT_DURING` 中成立：\n\n```\nUSING ( DURING\
    \ ) :\n☼ { { SNO , CITY , DURING } , { SNO , STATUS, DURING } }\n```\n\n此外，由于原始关系变量存在某些冗余和迂回，而这些并不适用于那些\
    \ `U_projections`，因此建议对其进行无损分解。并且我们可以基于此类考虑定义一种新的范式，使得关系变量 `SCT_DURING` 不在该新范式中，但其\
    \ `U_projections` 却在。然而，在定义那个新范式之前，还有一些进一步的重要要点需要说明——这些要点我在前面已经暗示过，但尚未明确陈述：\n\n\
    *   类似地，常规连接在语法和语义上都是 `U_join` 的特例。\n*   类似地，常规 `JD` 在语法和语义上都是 `U_JD` 的特例。\n*\
    \   第一点是，我们称之为 `U_projection` 的广义投影形式确实是一种真正的泛化。换句话说，常规投影只是 `U_projection` 的一个特例——或者换句话说，所有投影都是\
    \ `U_projections`，但有些 `U_projections` 不是投影（至少，后者按通常理解时）。原因如下（再次稍作简化）：\n    1.\
    \  首先，我们允许对关系 `r` 进行关于 *零个属性* 的 `U_projection`。定义变为：\n\n        ```\n        PACK\n\
    \        ( ( UNPACK r ON ( ) ) { X } )\n        ON ( )\n        ```\n\n    2.\
    \  其次，事实证明——如果需要进一步解释，请参阅时序方面的书籍——当关于零个属性执行时，`PACK` 和 `UNPACK` 都只是返回其输入，因此上述表达式简化为\
    \ `r{X}`，即 `r` 关于 `X` 的常规投影。\n    3.  第三，对于关于零个属性执行的 `U_projection`，我们允许从具体语法中省略\
    \ `USING` 前缀及其附带的冒号。\n\n从上述内容可以得出结论，正如所声称的，常规投影在语法和语义上都只是 `U_projection` 的特例。\n\
    \n因此，如果我们愿意，可以去掉那些 `U_` 前缀（除非在需要强调的场合），并简单地理解为：此后投影指的是 `U_projection`，连接和连接依赖也类似（关系的相等性也类似）。^(¹⁹⁶)\
    \ 所以我们想要定义的“新范式”就是 `6NF`，只不过支撑该范式的概念（投影、连接等）现在有了扩展的解释。所以定义如下（当然，它一直保持不变）：\n\n\
    ### 定义（第六范式）\n*   **定义 (第六范式)：** 关系变量 `R` 处于第六范式 (`6NF`) 中，当且仅当在 `R` 中成立的 `JD`\
    \ 只有平凡的；换句话说，在 `R` 中成立的 `JD` 只有形式为 `☼{ ..., H, ... }` 的，其中 `H` 是 `R` 的标题。\n"
- fmt: "# Exercises\n\n1.  `6NF` relvars are sometimes said to be irreducible, and\
    \ I noted in the body of the chapter that this was yet another of the many kinds\
    \ of irreducibility that are relevant to design theory. How many different kinds\
    \ can you identify?\n\n2.  Suppose relvar `P` is replaced as discussed in the\
    \ body of the chapter by its `6NF` projections `PN`, `PL`, `PW`, and `PC`. Can\
    \ you think of any improvements on that design?\n\n3.  Consider a relvar `R` representing\
    \ marriages, with attributes `A`, `B`, and `C` and predicate *Person A married\
    \ person B on date C*. Assume no polygamy; assume also that no two persons marry\
    \ each other more than once. What keys does `R` have? Does the JD `{AB,BC,CA}`\
    \ hold? What’s the highest normal form `R` is in?\n\n4.  Design a database for\
    \ the following. The entities to be represented are soccer match fixtures for\
    \ a certain team. For matches that have already been played, we wish to record\
    \ “goals for” and “goals against”; however, these two properties clearly make\
    \ no sense for matches that have yet to be played. What normal forms are your\
    \ relvars in?\n\n5.  In the body of the chapter, I showed informally how reducing\
    \ a relvar to `6NF` projections corresponded to reducing a conjunctive predicate\
    \ to simple predicates. Could there be such a thing as a disjunctive predicate?\
    \ How might a relvar correspond to such a predicate? What would be involved in\
    \ reducing such a predicate to simple predicates?\n\n6.  Given the sample value\
    \ of relvar `SCT_DURING` in Figure [14-4](#489629_2_En_14_Chapter.xhtml#Fig4),\
    \ show the result of evaluating each of the following expressions:\n    1.  `USING\
    \ ( DURING ) : SCT_DURING { SNO , DURING }`\n    2.  `USING ( DURING ) : SCT_DURING\
    \ { CITY , DURING }`\n    3.  `USING ( DURING ) : SCT_DURING { STATUS , DURING\
    \ }`\n    4.  `USING ( DURING ) : JOIN { SCT_DURING { SNO , CITY , DURING } ,\
    \ SCT_DURING { SNO , STATUS , DURING } }`\n\n    *Note:* The answer in the last\
    \ case is, of course, the relation shown in Figure [14-5](#489629_2_En_14_Chapter.xhtml#Fig5)—but\
    \ don’t just take my word for it, please confirm that result for yourself (unless\
    \ you’ve done so already).\n\n# Answers\n\n1.  Irreducibility of keys and `FDs`,\
    \ and the relevance of `FD` irreducibility to `2NF`, are all discussed in Chapter\
    \ [4](#489629_2_En_4_Chapter.xhtml); `FD` irreducibility is discussed further\
    \ in Chapter [5](#489629_2_En_5_Chapter.xhtml). Irreducible covers are discussed\
    \ in Chapter [6](#489629_2_En_6_Chapter.xhtml). Irreducible `JDs` are discussed\
    \ in Chapter [11](#489629_2_En_11_Chapter.xhtml). Irreducible (i.e., `6NF`) relvars\
    \ and the associated notion of “irreducible facts” are discussed in the present\
    \ chapter.\n\n2.  The main point that occurs to me is that it might be nice to\
    \ have some kind of “master” relvar whose primary purpose is just to record the\
    \ part numbers for all parts currently represented in the database. If we call\
    \ that relvar `P`, there’ll be `EQDs` between that relvar `P` and the projection\
    \ on `{PNO}` of each of the relvars `PN`, `PL`, `PW`, and `PC` (instead of `EQDs`\
    \ between, arbitrarily, the projection of `PN` on `{PNO}` and the projections\
    \ on `{PNO}` of each of `PL`, `PW`, and `PC`; indeed, one nice thing about having\
    \ the master relvar is precisely that it avoids that slight arbitrariness).\n\n\
    \    Moreover, suppose every part always has a known name and weight but doesn’t\
    \ necessarily have a known color or city. Then we can combine relvars `P`, `PN`,\
    \ and `PW`, making that combination—which I’ll still call `P`—the master relvar,\
    \ and replace those previously required `EQDs` by foreign key constraints from\
    \ `PL` and `PC` to that master relvar `P`. (A part with no known color will be\
    \ represented in `P` but not `PL`; likewise, a part with no known city will be\
    \ represented in `P` but not `PC`.)\n\n    Incidentally, another argument in favor\
    \ of including that master relvar `P` has to do with the shipments relvar `SP`—given\
    \ that master relvar, we can retain the conventional foreign key constraint from\
    \ `SP` to `P`; without it, life becomes rather messier (right?).\n\n3.  Every\
    \ pair of attributes is a key. The specified `JD` doesn’t hold, because the following\
    \ is certainly a legitimate value for the relvar:\n\n    ```\n    a1  b1  c2\n\
    \    b1  a1  c2\n    a2  b1  c1\n    b1  a2  c1\n    a1  b2  c1\n    b2  a1  c1\n\
    \    ```\n\n    (`a1` ≠ `a2`, `b1` ≠ `b2`, `c1` ≠ `c2`); that is, the tuples (`a1`,`b1`,`c2`),\
    \ (`a2`,`b1`,`c1`), and (`a1`,`b2`,`c1`) most certainly don’t force the tuple\
    \ (`a1`,`b1`,`c1`) to appear (!). The relvar is in `6NF`. Note, however, that\
    \ it’s subject to a certain *symmetry* constraint; to be specific, the tuple (`a`,`b`,`c`)\
    \ appears if and only if the tuple (`b`,`a`,`c`) appears (see the sample value\
    \ above for an illustration of this point).^([^(197)](#fn197)) As a consequence,\
    \ the relvar is also subject to certain insertion and deletion anomalies. (In\
    \ particular, therefore, it isn’t in `DK/NF`. See Chapter [15](#489629_2_En_15_Chapter.xhtml).)\n\
    \n4.  The thing to do here is to separate matches that have already been played\
    \ from those that haven’t:\n\n    ```\n    PAST_MATCHES { DATE , OPPONENT , GOALS_FOR\
    \ , GOALS_AGAINST , ... }\n    KEY { DATE }\n    FUTURE_MATCHES { DATE , OPPONENT\
    \ , ... }\n    KEY { DATE }\n    ```\n\n    These relvars are both in `5NF`. `PAST_MATCHES`\
    \ in particular probably shouldn’t be replaced by `6NF` projections. *Note:* Alternatively,\
    \ we might consider replacing `FUTURE_MATCHES` by a relvar `FIXTURES`, giving\
    \ `DATE` and `OPPONENT` for all matches past and future. What constraints would\
    \ apply then? Come to that, what constraints apply to the design shown above?\n\
    \n5.  A disjunctive predicate is the logical `OR` of two or more other predicates.\
    \ If some relvar `R` had a disjunctive relvar predicate, then the individual predicates\
    \ that are `OR`’d together would have to have the same parameters (because the\
    \ tuples that satisfy them would all have to be of the same type). Reducing such\
    \ a relvar to ones with simple predicates would probably involve decomposition\
    \ via restriction instead of projection (and recomposition via union instead of\
    \ join). See Chapters [15](#489629_2_En_15_Chapter.xhtml) and [16](#489629_2_En_16_Chapter.xhtml)\
    \ for further discussion.\n\n6.  1.  ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figb_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figb_HTML.jpg)\n\
    \    2.  ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figc_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figc_HTML.jpg)\n\
    \    3.  ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figd_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figd_HTML.jpg)\n\
    \    4.  Here first are the two `U_projections` (repeated from Figure [14-6](#489629_2_En_14_Chapter.xhtml#Fig6)):\n\
    \        ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fige_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Fige_HTML.jpg)\n\
    \        The corresponding unpacked forms are as follows:\n        ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figf_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figf_HTML.jpg)\n\
    \        Here’s the join of these two unpacked relations:\n        ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figg_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Figg_HTML.jpg)\n\
    \        Packing this result on `DURING` yields the relation shown in Figure [14-5](#489629_2_En_14_Chapter.xhtml#Fig5).\n\
    \nFootnotes [1](#489629_2_En_14_Chapter.xhtml#Fn1_source)   [2](#489629_2_En_14_Chapter.xhtml#Fn2_source)\
    \   [3](#489629_2_En_14_Chapter.xhtml#Fn3_source)   [4](#489629_2_En_14_Chapter.xhtml#Fn4_source)\
    \   [5](#489629_2_En_14_Chapter.xhtml#Fn5_source)   [6](#489629_2_En_14_Chapter.xhtml#Fn6_source)\
    \   [7](#489629_2_En_14_Chapter.xhtml#Fn7_source)   [8](#489629_2_En_14_Chapter.xhtml#Fn8_source)\
