  trans: '## 示例 9


    此示例源自 Hugh Darwen。它基于英国开放大学（Open University）相关的一个真实情境。我们有一个关系变量，如下所示：


    ```

    SCT { SNO , CNO , TNO }

    KEY { SNO , CNO , TNO }

    ```


    其谓词是：*学生 `SNO` 注册了课程 `CNO`，并且在该课程上由导师 `TNO` 辅导*（或者更简洁地说，*导师 `TNO` 在课程 `CNO` 上辅导学生
    `SNO`*）。图 17-7 展示了这个关系变量的一个示例值。冗余是显而易见的：例如，“学生 S1 注册了课程 C1”、“课程 C1 由导师 T1 辅导”以及“导师
    T1 辅导学生 S1”这些事实，在图中所示的示例值中都重复表示了多次。^(²³⁸)


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig7_HTML.jpg](img/489629_2_En_17_Fig7_HTML.jpg)


    图 17-7


    关系变量 `SCT` — 示例值


    现在，对于此类例子，我们可能考虑的一种减少冗余的策略是使用代理键（简称代理）。^(²³⁹) 例如，我们可以引入一个属性 `XNO`，其值作为 (`SNO`,`CNO`)
    对的代理，如图 17-8 所示。（从图中观察可知，我已将 {`XNO`} 设为关系变量 `XSC` 的主键。当然，组合 {`SNO`,`CNO`} 也是一个键。）


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig8_HTML.jpg](img/489629_2_En_17_Fig8_HTML.jpg)


    图 17-8


    *为 {`SNO`,`CNO`} 组合使用代理*


    这种方法的一个困难点如下：我们基于什么决定为 {`SNO`,`CNO`} 组合使用代理，而不为 {`CNO`,`TNO`} 组合或 {`TNO`,`SNO`}
    组合使用代理？无论我们作何选择，都是不对称的。此外，代理本身也并非没有问题。以下是一些问题：^(²⁴⁰)


    *   代理可能使更新变得更复杂（本质上，用户必须进行自己的外键检查）。

    *   更糟糕的是，系统的外键检查——几乎肯定仍需执行——(a) 永远不会失败，并且 (b) 因此将成为纯粹的开销。

    *   查询和更新语句变得更长、编写更繁琐、更容易出错、更难调试和维护。

    *   需要更多的完整性约束。


    然而，就当前目的而言，真正的问题是：引入代理是否真的有助于减少冗余？我不想在此尝试回答这个问题；我将在后面的章节“精炼定义”中再回到这个问题。


    ## 示例 10


    对于类似图 17-7 的例子，我们可以考虑的另一种减少冗余的策略是引入一些关系值属性（RVA）。图 17-9 给出了一个例子。


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig9_HTML.jpg](img/489629_2_En_17_Fig9_HTML.jpg)


    图 17-9


    为导师使用 RVA


    这种方法一个显而易见的问题——当然，完全撇开使用 RVA 通常伴随的所有常见问题不谈，正如第 4 章所述——再次是不对称性：我们基于什么决定为导师使用 RVA，而不为学生或课程使用？无论如何，这种策略是否真的减少了冗余？我同样将在后面的章节“精炼定义”中回到这个问题。


    ## 示例 11


    这个例子只是一个占位符。在我们合著的《时间与关系理论：关系模型和 SQL 中的时态数据库》（*Time and Relational Theory: Temporal
    Databases in the Relational Model and SQL*，Morgan Kaufmann，2014）一书中，Hugh Darwen、Nikos
    Lorentzos 和我展示了与时态数据相关时可能出现的某些“新”类型的冗余，并提出了许多处理它们的新设计原则和技术。^(²⁴¹)


    ## 示例 12


    我的最后一个例子是一种常见实际情况的典型代表。它大致基于 Fabian Pascal 所著《数据库管理实践问题：思考型实践者参考手册》（*Practical
    Issues in Database Management: A Reference for the Thinking Practitioner*，Addison-Wesley，2000）中的一个例子。我们有两个关系变量，如下所示（并且我假设在进一步通知之前，它们具体是基本关系变量）：


    ```

    PAYMENTS { CUSTNO , DATE , AMOUNT }

    KEY { CUSTNO , DATE }

    TOTALS { CUSTNO , TOTAL }

    KEY { CUSTNO }

    ```


    关系变量 `TOTALS` 中的属性 `TOTAL` 是通常称为*派生数据*的一个例子；对于任何给定客户，其值是通过对相关客户的付款金额求和得出的。事实上，以下相等依赖成立^(²⁴²)（请注意，这次我为约束起了个名字，即
    `C12`，因为我稍后需要引用它）：


    ```

    CONSTRAINT C12 TOTALS = SUMMARIZE PAYMENTS BY { CUSTNO } :

    { TOTAL := SUM ( AMOUNT ) } ;

    ```


    *注意：* `SUMMARIZE` 是 `Tutorial D` 中类似于 SQL 带 `GROUP BY` 的 `SELECT` 的操作（*非常*宽松地说！）。^(²⁴³)
    不过，如果你对 SQL 比 `Tutorial D` 更熟悉，让我也给出前面语句的 SQL 版本：


    ```

    CREATE ASSERTION C12 CHECK

    ( NOT EXISTS

    ( SELECT *

    FROM   TOTALS

    WHERE  NOT EXISTS

    ( SELECT *

    FROM ( SELECT CUSTNO , SUM ( AMT ) AS TOTAL

    FROM   PAYMENTS

    GROUP  BY CUSTNO ) AS TEMP1

    WHERE  TOTALS.CUSTNO = TEMP1.CUSTNO ) )

    AND

    NOT EXISTS

    ( SELECT *

    FROM ( SELECT CUSTNO , SUM ( AMT ) AS TOTAL

    FROM   PAYMENTS

    GROUP  BY CUSTNO ) AS TEMP2

    WHERE  NOT EXISTS

    ( SELECT *

    FROM   TOTALS

    WHERE  TOTALS.CUSTNO = TEMP2.CUSTNO ) ) ) ;

    ```


    现在，派生数据根据定义就是冗余的——尽管该例子中再次没有违反规范化或正交性（特别是，关系变量 `PAYMENTS` 和 `TOTALS` 都属于 6NF）。我将在紧接的下一节中更详细地分析这个例子。


    ## 管理冗余


    上一节中的示例 12 设计是冗余的，这一点由指定的相等依赖（约束 `C12`）成立所清楚表明。处理该示例所展示的这种冗余，至少在原则上，有四种基本方法：


    1.  仅采用原始设计

    2.  声明约束

    3.  使用视图

    4.  使用快照


    让我们仔细看看。


    ### 1. 仅采用原始设计


    鉴于当今大多数 DBMS 提供的功能有限，这也许是实践中可能最常遇到的方法。其思路很简单：


    1.  关系变量 `PAYMENTS` 和 `TOTALS` 按照上一节所示准确定义。

    2.  约束 `C12` *不* 声明给 DBMS。

    3.  维护派生数据 100% 是用户的责任。（或者，至少是某些用户的责任；维护可以通过触发过程来完成，但仍然需要某个用户来编写该过程的代码。）^(²⁴⁴)


    实际上，这种方法权衡了 (a) 用户（或至少是某些用户）在执行某些更新时所涉及的额外工作（以及相关的性能影响）与 (b) 执行某些查询时获得的更好性能。但这没有保证；如果用户在某个更新过程中犯了错误，导致（实质上）违反了约束
    `C12`，那么，就麻烦了。


    ### 2. 声明约束


    在这种方法中，约束 `C12` 被显式声明给 DBMS，DBMS 负责强制执行它。然而，维护派生数据仍然是用户的责任，与上一种方法完全一样。更重要的是，如果用户可靠且正确地执行了这项任务，约束检查将永远不会失败，因此，它实际上构成对用户更新的纯粹开销。但我们不能省略这个约束，恰恰是因为我们需要系统来检查用户*是否*可靠且正确地执行了维护任务。'
- fmt: "### 3. Use a View\n\nClearly it would be better if, instead of simply declaring\
    \ the constraint, we could actually inform the system of the rule by which the\
    \ derived data is defined and have the system perform the derivation process automatically.\
    \ And we can; that’s exactly what the view mechanism does. To be specific, we\
    \ can replace the base relvar `TOTALS` by a view (or “virtual relvar”) of the\
    \ same name, thus:\n\n```\nVAR TOTALS VIRTUAL\n( SUMMARIZE PAYMENTS BY { CUSTNO\
    \ } :\n{ TOTAL := SUM ( AMOUNT ) } ) ;\n```\n\nNow the user no longer has to worry\
    \ about maintaining the derived data; moreover, there’s now no way that Constraint\
    \ C12 can possibly be violated, and there’s no need even to state it any more,\
    \ except perhaps informally (as a means of telling the user the semantics of the\
    \ view, perhaps). Note, however, that the user does have to be explicitly told\
    \ not to try to maintain the totals! This fact doesn’t mean the user has to be\
    \ told that relvar `TOTALS` is a view, though; it just means the user has to be\
    \ told that the maintenance task will effectively be performed by the system and\
    \ the user shouldn’t interfere.\n\n### 4. Use a Snapshot\n\nThe drawback to the\
    \ view solution, however, is that the derivation process is performed every time\
    \ the view is referenced (even if no updates have been done since the last time\
    \ it was referenced). Thus, if the whole object of the exercise is to do the derivation\
    \ work at update time in order to improve subsequent query performance, the view\
    \ solution is clearly inadequate. In that case, we should use a snapshot instead\
    \ of a view:\n\n```\nVAR TOTALS SNAPSHOT ... /* hypothetical syntax */\n( SUMMARIZE\
    \ PAYMENTS BY { CUSTNO } :\n{ TOTAL := SUM ( AMOUNT ) } )\nREFRESH ON EVERY UPDATE\
    \ ;\n```\n\nThe snapshot concept has its origins in a paper by Adiba.^([^(245)](#fn245))\
    \ Basically, snapshots, like views, are derived relvars; unlike views, however,\
    \ they’re real, not virtual—that is, they’re represented not just by their definition\
    \ in terms of other relvars, but also (at least conceptually) by their own separately\
    \ materialized copy of the data. In other words, defining a snapshot is much like\
    \ executing a query, except that:\n\n1.  The result of the query is kept in the\
    \ database under the specified name (`TOTALS` in the example) as a *read-only\
    \ relvar* (read-only, that is, apart from the periodic refresh—see point b. immediately\
    \ following).\n\n2.  Periodically (`ON EVERY UPDATE` in the example) the snapshot\
    \ is *refreshed*—that is, its current value is discarded, the query is executed\
    \ again, and the result of that new execution becomes the new snapshot value.\n\
    \n    The general form of the `REFRESH` clause is\n\n```\nREFRESH [ ON ] EVERY\
    \ <now and then>\n```\n\nwhere `<now and then>` might be, for example, `MONTH`\
    \ or `WEEK` or `DAY` or `HOUR` or `n MINUTES` or `MONDAY` or `WEEKDAY` (and so\
    \ on). In particular, the specification `REFRESH ON EVERY UPDATE` means the snapshot\
    \ is kept permanently in synch with the relvar(s) from which it is derived—which\
    \ is presumably just what we want, in the case of Example 12.\n\nNow, in this\
    \ section so far I’ve concentrated on Example 12 and the specific kind of “derived\
    \ data” illustrated by that example. However, the fact is that *all* forms of\
    \ redundancy can be thought of as derived data—if *x* is redundant, then by definition\
    \ *x* can be derived from something else in the database. (Limiting use of the\
    \ term *derived data* to the kind of situation illustrated by Example 12 is thus\
    \ misleading, and not recommended.) It follows that the foregoing analysis—in\
    \ particular, the four different approaches—can be generalized to apply to all\
    \ kinds of redundancy, at least in principle. Note in particular that the third\
    \ and fourth of those approaches, using views and snapshots respectively, both\
    \ constitute examples of what’s sometimes called *controlled* redundancy. Redundancy\
    \ is said to be controlled if it does exist (and the user is aware of it), but\
    \ the task of “propagating updates” to ensure that it never leads to any inconsistencies\
    \ is managed by the system, not the user. Uncontrolled redundancy can be a problem,\
    \ but controlled redundancy shouldn’t be. In fact, I want to go further—I want\
    \ to say that while it’s probably impossible, and might not even be desirable,\
    \ to eliminate redundancy completely, any redundancy that isn’t eliminated ought\
    \ at least to be controlled. In particular, we need support for snapshots.^([^(246)](#fn246))"
