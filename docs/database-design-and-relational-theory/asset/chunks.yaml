    的所有可能取值 `r`，在 `Ri` 的属性上投影 `r` 必须得到 `ri` (`i` = 1, ..., `n`) 这一要求将自动得到满足。


    支持反规范化的一般论点基本上是，它使检索更易于表达并使其性能更好。^(¹⁰⁸) 我将在后面的章节中探讨这一论点在多大程度上可能成立。然而，首先我想指出，一旦我们做出反规范化的决定，我们就踏上了一条非常滑的斜坡。问题是：我们在哪里停止？规范化的情况则不同，那里有明确的逻辑理由继续该过程，直到我们达到尽可能高的范式。那么我们是否可以得出结论，对于反规范化，我们应该进行到达到尽可能低的范式呢？当然不是；然而，没有逻辑标准来决定该过程应确切在何处停止。换句话说，在选择反规范化时，我们从一个至少有一些坚实科学和逻辑理论支撑的立场后退，并用一个纯粹是实用主义性质的立场取代了它（并且通常基于对整个问题较为狭隘的视角，这一点我稍后会详细阐述）。


    ## 反规范化不是什么（第一部分）


    我曾说过反规范化意味着增加冗余。但这并不意味着增加冗余就等于反规范化！这是反规范化论文陷入的陷阱之一；它所描述的设计策略确实（通常）增加了冗余，但它们——除了之前提到的一个特例——本身并不是反规范化的应用。（在逻辑中，如果
    `p implies q` 为真，并不能推出 `q implies p` 为真；如此论证是错误推理的一个著名例子，事实上它有一个专门的名称，称为 `The
    Fallacy of False Conversion` 《换位法谬误》。）


    让我们检查一下反规范化论文中的几个例子。在一个例子中，给出了关系变量 `ITEM` 和 `SALES`，如下所示：


    ```

    ITEM  { INO , INAME }

    KEY { INO }

    SALES { SNO , INO , QTY }

    KEY { SNO , INO }

    FOREIGN KEY { INO } REFERENCES ITEM

    ```


    其谓词分别是 *商品 INO 的名称为 INAME* 和 *在商店 SNO 中售出了商品 INO 共 QTY 件*。出于性能原因，该论文建议在 `ITEM`
    关系变量中添加一个 `TOTAL_QTY` 属性，其值对于任何给定商品是所有商店中该商品的总销售量。但是，尽管由此产生的设计确实涉及一些冗余，事实仍然是，两个关系变量仍然处于
    BCNF（特别注意，函数依赖 `{INO} → {TOTAL_QTY}` 在修订后的关系变量 `ITEM` 中成立）。换句话说，在这个例子中，本身并没有反规范化。


    第二个例子涉及论文中所谓的“内部数组”：


    ```

    EMP { ENO , JAN_PAY , FEB_PAY , ..., DEC_PAY }

    KEY { ENO }

    ```


    谓词是 *员工 ENO 在一月份获得 JAN_PAY 金额的工资，在二月份获得 FEB_PAY 金额，……，在十二月份获得 DEC_PAY 金额的工资*。并且大概（虽然论文没有明确说明）这种“按元组”的设计意在与以下“按属性”的类比进行对比——并且出于性能原因，可能优先于后者：


    ```

    EMP { ENO , MONTH , PAY }

    KEY { ENO , MONTH }

    ```


    但两种设计都处于 BCNF。同样，这里也没有反规范化；事实上，我提前说一句（参见第 17 章），我认为冗余也没有增加。（另一方面，原始的“按元组”设计可能很糟糕，如果你考虑查询“获取至少在某个月工资低于
    5K 的员工，以及对应的月份”，你就会明白。）


    关于前面的例子，一位同事最近提醒我注意 IBM 的 DBMS 产品 DB2 的一本参考手册中的以下摘录：


    ### 第一范式：


    如果一个关系实体的每个实例只包含一个值，从不包含多个重复属性，则该实体满足第一范式的要求。重复属性通常称为重复组，是本质上相同的不同属性。在满足第一范式要求的实体中，每个属性在其含义和名称上都是独立且唯一的。

    '
- fmt: '### Example:


    Assume that an entity contains the following attributes:


    `EMPLOYEE_NAME`


    `JANUARY_SALARY_AMOUNT`


    `FEBRUARY_SALARY_AMOUNT`


    `MARCH_SALARY_AMOUNT`


    This situation violates the requirement of first normal form, because `JANUARY_SALARY_AMOUNT`,
    `FEBRUARY_SALARY_AMOUNT`, and `MARCH_SALARY_AMOUNT` are essentially the same attribute,
    `EMPLOYEE_MONTHLY_SALARY_AMOUNT`.


    —*DB2 for z/OS Administration Guide*, IBM Form No. SC27-8844-2


    Well, the writing is dire, of course, but the message it conveys—to the extent
    it can even be understood, that is—is arguably still worse. What can I say.


    A third example involves splitting a `RESELLERS` relvar “horizontally” into two
    separate relvars, `ACTIVE_RESELLERS` and `INACTIVE_RESELLERS`. In other words,
    the original relvar is decomposed via `restriction` (not `projection`), and is
    reconstructed from the two restrictions via `union` (not `join`). So we’re clearly
    not talking about normalization in the classical sense here at all; a fortiori,
    therefore, we’re not talking about classical denormalization either.^(^(109)^)


    I’ll give one more example from the denormalization paper. This one starts with
    `STORE` and `EMP` relvars as follows:


    ```

    STORE { SNO , REGION , STATE , ... }

    KEY { SNO , REGION , STATE }

    EMP   { ENO , SNO , REGION , STATE , ... }

    KEY { ENO }

    FOREIGN KEY { SNO , REGION , STATE } REFERENCES STORE

    ```


    The predicates are `Store SNO is located in region REGION within state STATE`
    and `Employee ENO is employed at store SNO within region REGION within state STATE`.
    The redundancies are obvious, and so the paper suggests introducing a surrogate
    identifier for stores, `SID` say, thereby modifying the design as follows:


    ```

    STORE { SID , SNO , REGION , STATE , ... }

    KEY { SID }

    KEY { SNO , REGION , STATE }

    EMP   { ENO , SID , ... }

    KEY { ENO }

    FOREIGN KEY { SID } REFERENCES STORE

    ```


    But this revised design not only involves no denormalization, it actually decreases
    redundancy!^(^(110)^)—because the association of a given `SNO` with a given `REGION`
    and `STATE` now appears just once, instead of once for every employee of the store
    in question. (To beat the point to death, there’s *obviously* no denormalization
    here because—among other things—the one thing surely everybody agrees on is that
    denormalization is supposed to increase redundancy.)


    By the way, I’m aware that this example might give the impression that I think
    surrogates are a good idea. Well, they can be—but, sadly, they aren’t *always*
    a good idea. The fact is, surrogates, while they might solve some problems, can
    also introduce further problems of their own. See Exercise 8.3 at the end of the
    chapter, also Chapter 17, for further discussion.


    In closing this section, I’d like to make it very clear that the foregoing discussions
    are in no way intended as an attack on the denormalization paper or its author.
    Indeed, the following quote from that paper makes it clear that the author and
    I are really on the same side on the bigger issues:


    > We should stop criticizing the relational model and make a clear distinction
    between what’s SQL and what’s relational ... The two are totally different.


    I couldn’t agree more with this position, nor with the implication that the only
    reason we have to worry about such matters as denormalizing at the logical level
    is because of failures on the part of today’s SQL products. As I’ve written elsewhere,
    in fact:^(^(111)^) In an ideal system, we would never have to denormalize at all,
    at the logical level. Even in today’s systems, which are typically much less than
    ideal, I believe we should denormalize only as a last resort. That is, we should
    back off from a fully normalized design only if all other strategies for improving
    performance have failed, somehow, to meet requirements. (Of course, I’m going
    along here with the usual assumption that normalization has performance implications—as
    indeed it does, typically, in current SQL products.)


    ## What Denormalization Isn’t (II)


    So far in this chapter I’ve given what I think is a reasonable definition of what
    denormalization is, and I’ve given some examples of what it isn’t. However, perhaps
    it was simply a mistake on my part to think the term ought to be used in any kind
    of precise or logical sense. Certainly it’s not used very precisely in the industry
    at large; in fact, it mostly seems to be used—especially in a data warehouse context—to
    refer to just about anything that, as far as I’m concerned, can only be described
    as bad design practice. Not only that, but such bad practice is often explicitly
    recommended! Examples of such “recommended” bad practice include:


    *   Using repeating groups^(^(112)^)

    *   Permitting duplicate rows

    *   Using nulls; possibly worse, allowing nulls in keys

    *   Mixing different kinds of information in the same column (using a separate
    “flag” column to specify what kind each individual value is in the column in question)

    *   Using a single text column to represent what ought logically to be distinct
    columns


    I’d like to add a note here on *star schemas*, since the “star schema” concept
    and “denormalization” are often mentioned together.^(^(113)^) The basic idea behind
    this concept as follows. Suppose we wish to collect a history of business transactions
    for analysis purposes; for example, suppose in the case of suppliers and parts
    that we wish to record, for each shipment, the particular time interval in which
    that shipment occurred. Thus, we might identify time intervals by a time interval
    identifier (`TINO`), and introduce another relvar `TI` to relate those identifiers
    to the corresponding time intervals per se. The revised shipments relvar `SP`
    and the new time intervals relvar `TI` might then look as shown in Figure 8-1:^(^(114)^)


    ![../images/489629_2_En_8_Chapter/489629_2_En_8_Fig1_HTML.jpg](images/489629_2_En_8_Chapter/489629_2_En_8_Fig1_HTML.jpg)


    **Figure 8-1**

    Sample fact table (`SP`) and dimension table (`TI`)


    In star schema terminology, `SP` in this example is *the fact table* and `TI`
    is *a dimension table*. The suppliers relvar `S` and the parts relvar `P` are
    also dimension tables (see Figure 8-2).^(^(115)^) And the overall structure is
    referred to as a “star schema” because of a fancied resemblance of the corresponding
    entity / relationship diagram to a star, with the fact table being surrounded
    by—and connected by “rays,” or “spokes,” to—the dimension tables, as shown in
    Figure 8-2. (Those rays or spokes correspond to foreign key references, of course.)


    ![../images/489629_2_En_8_Chapter/489629_2_En_8_Fig2_HTML.jpg](images/489629_2_En_8_Chapter/489629_2_En_8_Fig2_HTML.jpg)


    **Figure 8-2**

    Star schema for suppliers and parts (with time intervals)


    Now, you might be wondering what the difference is between a star schema and a
    conventional relational design. In fact, a star schema for a simple example like
    the one under discussion is likely to be identical to a good relational design.
    In more complex situations, however, the dimension tables are often less than
    fully normalized (the objective here apparently being to avoid joins) .^(^(116)^)
    What''s more, other relational design recommendations are often violated, too
    (see the bullet list earlier in this section).


    Detailed discussion of star schemas and related matters is beyond the scope of
    this book; you can find a slightly more extended discussion in my book *An Introduction
    to Database Systems* (8th edition, Addison-Wesley, 2004).'
  raw: '### Example:


    Assume that an entity contains the following attributes:


    EMPLOYEE_NAME


    JANUARY_SALARY_AMOUNT


    FEBRUARY_SALARY_AMOUNT


    MARCH_SALARY_AMOUNT


    This situation violates the requirement of first normal form, because JANUARY_SALARY_AMOUNT,
    FEBRUARY_SALARY_AMOUNT, and MARCH_SALARY_AMOUNT are essentially the same attribute,
    EMPLOYEE_MONTHLY_SALARY_AMOUNT.


    —*DB2 for z/OS Administration Guide*, IBM Form No. SC27-8844-2


    Well, the writing is dire, of course, but the message it conveys—to the extent
    it can even be understood, that is—is arguably still worse. What can I say.


    A third example involves splitting a RESELLERS relvar “horizontally” into two
    separate relvars, ACTIVE_RESELLERS and INACTIVE_RESELLERS. In other words, the
    original relvar is decomposed via *restriction* (not projection), and is reconstructed
    from the two restrictions via *union* (not join). So we’re clearly not talking
    about normalization in the classical sense here at all; a fortiori, therefore,
    we’re not talking about classical denormalization either.^([^(109)](#fn109))


    I’ll give one more example from the denormalization paper. This one starts with
    STORE and EMP relvars as follows:


    ```

    STORE { SNO , REGION , STATE , ... }

    KEY { SNO , REGION , STATE }

    EMP   { ENO , SNO , REGION , STATE , ... }

    KEY { ENO }

    FOREIGN KEY { SNO , REGION , STATE } REFERENCES STORE

    ```


    The predicates are *Store SNO is located in region REGION within state STATE*
    and *Employee ENO is employed at store SNO within region REGION within state STATE*.
    The redundancies are obvious, and so the paper suggests introducing a surrogate
    identifier for stores, SID say, thereby modifying the design as follows:


    ```

    STORE { SID , SNO , REGION , STATE , ... }

    KEY { SID }

    KEY { SNO , REGION , STATE }

    EMP   { ENO , SID , ... }

    KEY { ENO }

    FOREIGN KEY { SID } REFERENCES STORE

    ```


    But this revised design not only involves no denormalization, it actually decreases
    redundancy!^([^(110)](#fn110))—because the association of a given SNO with a given
    REGION and STATE now appears just once, instead of once for every employee of
    the store in question. (To beat the point to death, there’s *obviously* no denormalization
    here because—among other things—the one thing surely everybody agrees on is that
    denormalization is supposed to increase redundancy.)


    By the way, I’m aware that this example might give the impression that I think
    surrogates are a good idea. Well, they can be—but, sadly, they aren’t *always*
    a good idea. The fact is, surrogates, while they might solve some problems, can
    also introduce further problems of their own. See Exercise 8.3 at the end of the
    chapter, also Chapter [17](#489629_2_En_17_Chapter.xhtml), for further discussion.


    In closing this section, I’d like to make it very clear that the foregoing discussions
    are in no way intended as an attack on the denormalization paper or its author.
    Indeed, the following quote from that paper makes it clear that the author and
    I are really on the same side on the bigger issues:


    *   [We should] stop criticizing the relational model and make a clear distinction
    between what’s SQL and what’s relational ... The two are totally different.


    I couldn’t agree more with this position, nor with the implication that the only
    reason we have to worry about such matters as denormalizing at the logical level
    is because of failures on the part of today’s SQL products. As I’ve written elsewhere,
    in fact:^([^(111)](#fn111)) In an ideal system, we would never have to denormalize
    at all, at the logical level. Even in today’s systems, which are typically much
    less than ideal, I believe we should denormalize only as a last resort. That is,
    we should back off from a fully normalized design only if all other strategies
    for improving performance have failed, somehow, to meet requirements. (Of course,
    I’m going along here with the usual assumption that normalization has performance
    implications—as indeed it does, typically, in current SQL products.)


    ## What Denormalization Isn’t (II)


    So far in this chapter I’ve given what I think is a reasonable definition of what
    denormalization is, and I’ve given some examples of what it isn’t. However, perhaps
    it was simply a mistake on my part to think the term ought to be used in any kind
    of precise or logical sense. Certainly it’s not used very precisely in the industry
    at large; in fact, it mostly seems to be used—especially in a data warehouse context—to
    refer to just about anything that, as far as I’m concerned, can only be described
    as bad design practice. Not only that, but such bad practice is often explicitly
    recommended! Examples of such “recommended” bad practice include:


    *   Using repeating groups^([^(112)](#fn112))


    *   Permitting duplicate rows


    *   Using nulls; possibly worse, allowing nulls in keys


    *   Mixing different kinds of information in the same column (using a separate
    “flag” column to specify what kind each individual value is in the column in question)


    *   Using a single text column to represent what ought logically to be distinct
    columns


    I’d like to add a note here on *star schemas*, since the “star schema” concept
    and “denormalization” are often mentioned together.^([^(113)](#fn113)) The basic
    idea behind this concept as follows. Suppose we wish to collect a history of business
    transactions for analysis purposes; for example, suppose in the case of suppliers
    and parts that we wish to record, for each shipment, the particular time interval
    in which that shipment occurred. Thus, we might identify time intervals by a time
    interval identifier (TINO), and introduce another relvar TI to relate those identifiers
    to the corresponding time intervals per se. The revised shipments relvar SP and
    the new time intervals relvar TI might then look as shown in Figure [8-1](#489629_2_En_8_Chapter.xhtml#Fig1):^([^(114)](#fn114))


    ![../images/489629_2_En_8_Chapter/489629_2_En_8_Fig1_HTML.jpg](images/489629_2_En_8_Chapter/489629_2_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Sample fact table (SP) and dimension table (TI)


    In star schema terminology, SP in this example is *the* *fact table* and TI is
    *a dimension table*. The suppliers relvar S and the parts relvar P are also dimension
    tables (see Figure [8-2](#489629_2_En_8_Chapter.xhtml#Fig2)).^([^(115)](#fn115))
    And the overall structure is referred to as a “star schema” because of a fancied
    resemblance of the corresponding entity / relationship diagram to a star, with
    the fact table being surrounded by—and connected by “rays,” or “spokes,” to—the
    dimension tables, as shown in Figure [8-2](#489629_2_En_8_Chapter.xhtml#Fig2).
    (Those rays or spokes correspond to foreign key references, of course.)


    ![../images/489629_2_En_8_Chapter/489629_2_En_8_Fig2_HTML.jpg](images/489629_2_En_8_Chapter/489629_2_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Star schema for suppliers and parts (with time intervals)


    Now, you might be wondering what the difference is between a star schema and a
    conventional relational design. In fact, a star schema for a simple example like
    the one under discussion is likely to be identical to a good relational design.
    In more complex situations, however, the dimension tables are often less than
    fully normalized (the objective here apparently being to avoid joins) .^([^(116)](#fn116))
    What''s more, other relational design recommendations are often violated, too
    (see the bullet list earlier in this section).


    Detailed discussion of star schemas and related matters is beyond the scope of
    this book; you can find a slightly more extended discussion in my book *An Introduction
    to Database Systems* (8th edition, Addison-Wesley, 2004).'
  trans: '

    ### 示例：


    假设一个实体包含以下属性：


    `EMPLOYEE_NAME`


    `JANUARY_SALARY_AMOUNT`


    `FEBRUARY_SALARY_AMOUNT`


    `MARCH_SALARY_AMOUNT`


    这种情况违反了第一范式的要求，因为 `JANUARY_SALARY_AMOUNT`、`FEBRUARY_SALARY_AMOUNT` 和 `MARCH_SALARY_AMOUNT`
    本质上是同一个属性 `EMPLOYEE_MONTHLY_SALARY_AMOUNT`。


    — *《z/OS 的 DB2 管理指南》*，IBM 表单号 SC27-8844-2


    好吧，这段文字写得当然很糟糕，但它所传达的信息——就其还能被理解的程度而言——可以说更糟。我还能说什么呢。


    第三个例子涉及将一个 `RESELLERS` 关系变量“水平”拆分为两个独立的关系变量 `ACTIVE_RESELLERS` 和 `INACTIVE_RESELLERS`。换句话说，原始关系变量通过
    `选择`（而非 `投影`）被分解，并通过 `并`（而非 `连接`）从两个选择结果中重构出来。因此，我们这里显然根本不是在讨论经典意义上的规范化；更进一步，我们讨论的也不是经典的反规范化。^(¹⁰⁹^)


    我将从反规范化论文中再举一例。这个例子以 `STORE` 和 `EMP` 关系变量开始，如下所示：


    ```

    STORE { SNO , REGION , STATE , ... }

    KEY { SNO , REGION , STATE }

    EMP   { ENO , SNO , REGION , STATE , ... }

    KEY { ENO }

    FOREIGN KEY { SNO , REGION , STATE } REFERENCES STORE

    ```


    其谓词是 `商店 SNO 位于州 STATE 内的地区 REGION` 和 `员工 ENO 受雇于州 STATE 内地区 REGION 的商店 SNO`。冗余显而易见，因此该论文建议为商店引入一个代理标识符，例如
    `SID`，从而修改设计如下：


    ```

    STORE { SID , SNO , REGION , STATE , ... }

    KEY { SID }

    KEY { SNO , REGION , STATE }

    EMP   { ENO , SID , ... }

    KEY { ENO }

    FOREIGN KEY { SID } REFERENCES STORE

    ```


    但这个修订后的设计不仅不涉及反规范化，实际上还减少了冗余！^(¹¹⁰^)——因为给定的 `SNO` 与给定的 `REGION` 和 `STATE` 的关联现在只出现一次，而不是为该商店的每个员工都出现一次。（为了把这点说透，这里*显然*没有反规范化，因为——除其他原因外——有一点是大家肯定都同意的：反规范化应该是增加冗余。）


    顺便说一句，我知道这个例子可能会给人一种印象，认为我觉得代理键是个好主意。嗯，它们可以是——但遗憾的是，它们*并非总是*好主意。事实是，代理键虽然能解决一些问题，但也会带来它们自己的进一步问题。详见本章末尾的练习
    8.3，以及第 17 章。


    在结束本节之前，我想明确指出，前面的讨论绝非意在攻击反规范化论文或其作者。事实上，该论文中的以下引文清楚地表明，作者和我在更大的问题上其实立场一致：


    > 我们应该停止批评关系模型，清楚地区分什么是 SQL，什么是关系……两者完全不同。


    我完全同意这一立场，也同意其隐含的意思，即我们之所以必须担心逻辑层面的反规范化这类事情，唯一的原因在于当今 SQL 产品的失败。事实上，正如我在别处所写：^(¹¹¹^)
    在一个理想的系统中，我们根本不需要在逻辑层面进行反规范化。即使在当今通常远非理想的系统中，我也认为我们应该只在万不得已的情况下才进行反规范化。也就是说，只有在所有其他提高性能的策略都未能满足要求时，我们才应放弃完全规范化的设计。（当然，我在这里沿用了通常的假设，即规范化会影响性能——在当前的
    SQL 产品中，通常确实如此。）


    ## 反规范化不是什么（II）


    到目前为止，本章已给出了我认为合理的反规范化定义，并提供了一些它不是什么的例子。然而，或许我错误地认为这个术语应该以某种精确或逻辑的方式使用。在行业中，它肯定没有被非常精确地使用；事实上，它似乎主要被用来——尤其是在数据仓库环境中——指代几乎任何在我看来只能被描述为糟糕设计实践的东西。不仅如此，这种糟糕的实践还经常被明确推荐！此类“被推荐”的糟糕实践的例子包括：


    *   使用重复组^(¹¹²^)

    *   允许重复行

    *   使用空值；更糟的是，允许在键中使用空值

    *   在同一列中混合不同类型的信息（使用单独的“标志”列来指定相关列中每个单独值的类型）

    *   使用单个文本列来表示逻辑上应该是不同的列


    我想在这里补充一点关于*星型模式*的说明，因为“星型模式”概念和“反规范化”经常被一起提及。^(¹¹³^) 该概念背后的基本思想如下。假设我们希望为分析目的收集业务交易的历史记录；例如，假设在供应商和零件的例子中，我们希望记录每次发货发生的特定时间区间。因此，我们可以用时间区间标识符（`TINO`）来标识时间区间，并引入另一个关系变量
    `TI` 来将这些标识符与相应的时间区间本身关联起来。修订后的发货关系变量 `SP` 和新的时间区间关系变量 `TI` 可能如图 8-1 所示：^(¹¹⁴^)


    ![../images/489629_2_En_8_Chapter/489629_2_En_8_Fig1_HTML.jpg](img/489629_2_En_8_Fig1_HTML.jpg)


    **图 8-1**

    示例事实表 (`SP`) 与维度表 (`TI`)


    在星型模式术语中，本例中的 `SP` 是*事实表*，而 `TI` 是*一个维度表*。供应商关系变量 `S` 和零件关系变量 `P` 也是维度表（见图 8-2）。^(¹¹⁵^)
    整体结构被称为“星型模式”，是因为想象中相应的实体/关系图类似于一个星形，事实表被维度表“环绕”，并通过“射线”或“辐条”与之相连，如图 8-2 所示。（这些射线或辐条当然对应于外键引用。）


    ![../images/489629_2_En_8_Chapter/489629_2_En_8_Fig2_HTML.jpg](img/489629_2_En_8_Fig2_HTML.jpg)


    **图 8-2**

    供应商和零件的星型模式（含时间区间）


    现在，你可能想知道星型模式与传统的关系设计之间有什么区别。事实上，对于像所讨论的简单例子，星型模式很可能与一个优秀的关系设计完全相同。然而，在更复杂的情况下，维度表往往未完全规范化（这里的目标显然是为了避免连接）。^(¹¹⁶^)
    更甚者，其他关系设计建议也常常被违反（见本节前面的项目符号列表）。


    关于星型模式及相关问题的详细讨论超出了本书范围；你可以在我的《*数据库系统概论*》（第 8 版，Addison-Wesley，2004 年）中找到稍长一些的讨论。

    '
- fmt: "## Denormalization Considered Harmful (I)\n\nIn this section, I’d like to\
    \ present an argument—a logical argument, that is, and one you might not have\
    \ seen before—in support of the position that you should denormalize only as a\
    \ last resort. Essentially, the argument is that while (as is well known) denormalization\
    \ can be logically bad for update, *it can be logically bad for retrieval as well*,\
    \ in the sense that it can make certain queries harder to formulate. (Alternatively,\
    \ it can make them easier to formulate incorrectly, meaning that, if they execute,\
    \ you’re getting answers that might be correct in themselves but are answers to\
    \ the wrong questions.) Let me illustrate.\n\nOnce again consider relvar `S`,\
    \ with its FD `{CITY} → {STATUS}`. As noted earlier (in the section “What Does\
    \ Denormalization Mean?”), that relvar can be regarded as the result of denormalizing\
    \ relvars `SNC` (with attributes `SNO`, `SNAME`, and `CITY`) and `CT` (with attributes\
    \ `CITY` and `STATUS`). Now consider the query “Get the average supplier city\
    \ status value.” Given our usual sample values (see Figure 3-2 in Chapter 3),\
    \ the status values for Athens, London, and Paris are 30, 20, and 30, respectively,\
    \ and so the average is 80/3, which is 26.667 to three decimal places. Here then\
    \ are some attempts at formulating this query in SQL (I’ll assume for simplicity\
    \ that `S` is nonempty, so we don’t have to worry about what happens in SQL if\
    \ we try to apply the `AVG` operator to an empty set):^([^(117)](#fn117))\n\n\
    1.  ```sql\n    SELECT AVG ( STATUS ) AS RESULT\n    FROM S\n    ```\n    *Result*\
    \ (incorrect): 26. The problem here is that London’s status and Paris’s status\
    \ have both been counted twice. Perhaps we need a `DISTINCT` inside the `AVG`\
    \ invocation? Let’s try that:\n\n1.  ```sql\n    SELECT AVG ( DISTINCT STATUS\
    \ ) AS RESULT\n    FROM S\n    ```\n    *Result* (incorrect): 25. No, it’s distinct\
    \ *cities* we need to examine, not distinct status values. We can do that by grouping:\n\
    \n1.  ```sql\n    SELECT CITY , AVG ( STATUS ) AS RESULT\n    FROM S\n    GROUP\
    \ BY CITY\n    ```\n    *Result* (incorrect): (Athens,30), (London,20), (Paris,30).\
    \ This formulation gives average status *per city*, not the overall average. Ah,\
    \ so perhaps what we want is the average of the averages?—\n\n1.  ```sql\n   \
    \ SELECT CITY , AVG ( AVG ( STATUS ) ) AS RESULT\n    FROM S\n    GROUP BY CITY\n\
    \    ```\n    *Result:* Syntax error—the SQL standard quite rightly doesn’t allow\
    \ “set function” invocations to be nested in this manner.^([^(118)](#fn118)) One\
    \ more attempt:\n\n1.  ```sql\n    SELECT AVG ( TEMP.STATUS ) AS RESULT\n    FROM\
    \ ( SELECT DISTINCT S.CITY , S.STATUS\n           FROM S ) AS TEMP\n    ```\n\
    \    *Result* (correct at last): 26.667. But note how complicated this expression\
    \ is compared to its analog on the fully normalized design (relvars `SNC` and\
    \ `CT`):\n\n1.  ```sql\n    SELECT AVG ( STATUS ) AS RESULT\n    FROM CT\n   \
    \ ```\n\n## Denormalization Considered Harmful (II)\n\nI said in the previous\
    \ section that the argument in favor of denormalization is that it makes retrievals\
    \ easier to express and makes them perform better. But does that argument really\
    \ stand up to careful analysis? Let’s take a closer look.\n\nFirst of all, it\
    \ clearly isn’t true across the board that retrievals are easier to express; the\
    \ previous section presented a detailed counterexample, but the point can be made\
    \ with much simpler examples. By way of illustration, consider what’s involved\
    \ in formulating the query “Get all supplier details” against (a) the normalized\
    \ design of Figure 1-1 and (b) a denormalized design in which relvars `S`, `SP`,\
    \ and `P` are replaced by a single “joined” relvar called, say, `SSPP`. Here are\
    \ `Tutorial D` formulations:\n\n1.  `S`\n2.  `SSPP { SNO , SNAME , STATUS , CITY\
    \ }`\n\nOr if you want SQL solutions:\n\n1.  ```sql\n    SELECT *\n    FROM S\n\
    \    ```\n2.  ```sql\n    SELECT DISTINCT SNO , SNAME , STATUS , CITY\n    FROM\
    \ SSPP\n    ```\n\nThe next point is that many queries are likely to perform worse,\
    \ too. There are several reasons for this state of affairs. One is that denormalization\
    \ leads to redundancy, which in turn can lead to a need to do duplicate elimination\
    \ (in this connection, note that `DISTINCT` in the second of the foregoing SQL\
    \ formulations). Another is as follows:\n\n*   Suppose again that the join of\
    \ suppliers, shipments, and parts is represented as one single stored file. Also,\
    \ assume for simplicity that any given stored file consists of a physically contiguous\
    \ collection of stored records, one for each tuple currently appearing in the\
    \ relvar the stored file represents.\n\n*   Let’s suppose too for the sake of\
    \ the argument that the query “Get details for suppliers who supply red parts”\
    \ will perform reasonably well against this physical structure. OK; but the query\
    \ “Get all supplier details” will perform *worse* than it would against the structure\
    \ in which the three relvars map to three physically separate stored files! Why?\
    \ Because in the latter design, all supplier stored records will be physically\
    \ contiguous, whereas in the former design they’ll effectively be spread over\
    \ a wider area, and will therefore require more I/O. Analogous remarks apply to\
    \ any query that accesses suppliers only, or parts only, or shipments only, instead\
    \ of performing some kind of join.\n\n*   Note too that denormalization, again\
    \ because it increases redundancy, will most likely lead to bigger stored records,\
    \ and this fact too can lead to more I/O, not less. As a trivial example, a 4K\
    \ page can hold two 2K stored records but only one 3K stored record; hence, a\
    \ denormalization that increases redundancy by 50% could increase I/O by 100%.\
    \ (I’m speaking pretty loosely here, of course.)\n\nMy next observation is that\
    \ even if we accept the claim that denormalization makes retrievals easier to\
    \ express and perform better, it certainly makes updates harder to express and\
    \ perform worse. Now, this point is (as I said before) widely understood; however,\
    \ what’s not so widely understood is that denormalization opens the door to integrity\
    \ violations, too. For example, in relvar `S` (as opposed to the projection relvars\
    \ `SNC` and `CT`), *someone*—either the system or the user, and in current practice\
    \ probably the latter—is going to have to be responsible for maintaining the FD\
    \ `{CITY} → {STATUS}`; and if that maintenance isn’t done, integrity is lost.\
    \ By contrast, in the normalized two-relvar design, all that has to be done is\
    \ to enforce the key constraint on `CT`—which will definitely be done by the system,\
    \ not the user—and the fact that each city has one status will then be maintained\
    \ “automatically.”"
