- fmt: '## Some Quotes from the Literature


    Since we’re going to be talking quite a lot about normal forms, I thought it might
    be—well, not exactly enlightening, but entertaining, possibly (?)—to begin with
    a few quotes from the literature. The starting point for the whole concept of
    normal forms is, of course, *first* normal form (`1NF`), and so an obvious question
    is: *Do you know what `1NF` is?* As the following quotes demonstrate (sources
    omitted to protect the guilty), a lot of people don’t:


    *   To achieve first normal form, each field in a table must convey unique information.


    *   An entity is said to be in the first normal form (`1NF`) when all attributes
    are single valued.


    *   A relation is in `1NF` if and only if all underlying domains contain atomic
    values only.


    *   If there are no repeating groups of attributes, then [the table] is in `1NF`.


    Now, it might be argued that some if not all of these quotes are at least vaguely
    correct—but they’re all hopelessly sloppy, even when they’re generally on the
    right lines. *Note:* In case you’re wondering, I’ll be giving a precise and accurate
    definition of `1NF` in Chapter [4](#489629_2_En_4_Chapter.xhtml).


    Let’s take a closer look at what’s going on here. Here again is the first of the
    foregoing quotes, now given in full:


    *   To achieve first normal form, each field in a table must convey unique information.
    For example, if you had a `Customer` table with two columns for the telephone
    number, your design would violate first normal form. First normal form is fairly
    easy to achieve, since few folks would see a need for duplicate information in
    a table.


    OK, so apparently we’re talking about a design that looks something like this:


    ![../images/489629_2_En_1_Chapter/489629_2_En_1_Figa_HTML.jpg](images/489629_2_En_1_Chapter/489629_2_En_1_Figa_HTML.jpg)


    Now, I can’t say whether this is a good design or not, but it certainly doesn’t
    violate `1NF`. (I can’t say whether it’s a good design because I don’t know exactly
    what “two columns for the telephone number” means—the phrase “duplicate information
    in a table” suggests we’re recording the same phone number twice, but such an
    interpretation is absurd on its face. But even if that interpretation is correct,
    it still wouldn’t constitute a violation of `1NF` as such.)


    Here’s another quote:


    *   First Normal Form ... means the table should have no “repeating groups” of
    fields ... A repeating group is when you repeat the same basic attribute (field)
    over and over again. A good example of this is when you wish to store the items
    you buy at a grocery store ... [*and the writer goes on to give an example, presumably
    meant to illustrate the concept of a repeating group, of a table called `Item
    Table`, with columns called `Customer`, `Item1`, `Item2`, `Item3`, and `Item4`*]:


    ![../images/489629_2_En_1_Chapter/489629_2_En_1_Figb_HTML.jpg](images/489629_2_En_1_Chapter/489629_2_En_1_Figb_HTML.jpg)


    Well, this design is almost certainly bad—what happens if the customer doesn’t
    purchase exactly four items?—but the reason it’s bad isn’t that it violates `1NF`;
    like the previous example, in fact, it’s a `1NF` design. So, while it might perhaps
    be claimed—indeed, it often is claimed—that `1NF` does mean, loosely, “no repeating
    groups,” a repeating group is *not* “when you repeat the same basic attribute
    over and over again.”^([⁶](#fn6))


    How about this one (a cry for help found on the Internet)? I’m quoting it absolutely
    verbatim, except that I’ve added some boldface:


    *   I have been trying to find the correct way of normalizing tables in `Access`.
    From what I understand, it goes from the 1st normal form to 2nd, then 3rd. Usually,
    that’s as far as it goes, but sometimes to the 5th and 6th. Then, there’s also
    the `Cobb 3rd`. This all makes sense to me. **I am supposed to teach a class in
    this starting next week,** and I just got the textbook. It says something entirely
    different. It says 2nd normal form is only for tables with a multiple-field primary
    key, 3rd normal form is only for tables with a single-field key. 4th normal form
    can go from 1st to 4th, where there are no independent one-to-many relationships
    between primary key and non-key fields. Can someone clear this up for me please?


    And one more (this time with a “helpful” response):


    *   *It’s not clear to me what “**normalized”* *means. Can you be specific about
    what normalization rules you are referring to? In what way is my schema not normalized?*


    Normalization: The process of replacing duplicate things with a reference to the
    original thing.


    *   For example, given “`john is-a person`” and “`john obeys army`,” one observes
    that the “`john`” in the second sentence is a duplicate of “`john`” in the first
    sentence. Using the means provided by your system, the second sentence should
    be stored as “`->john obeys army`.”'
