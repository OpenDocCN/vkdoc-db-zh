  trans: "\n## 示例 4\n\n我的下一个例子是常见的员工与程序员数据库的一个极简版本，其中所有程序员都是员工，但有些员工不是程序员（如第 5 章练习\
    \ 5.7 所述）。我顺便提一下，有些人会说本例中的员工和程序员分别对应*实体超类型*和*实体 subtype*。^(²²⁹) 尽管如此，传统的设计如下：\n\
    \n```\nEMP  { ENO }\nKEY { ENO }\nPGMR { ENO , LANG }\nKEY { ENO }\n```\n\n为简单起见，我假设：\n\
    \n1.  员工总体上除了 `ENO` 之外没有其他关注的属性（因为即使有，也不会实质性影响情况）。\n2.  程序员只有一个额外属性，`LANG`（编程语言技能——例如，“Java”、“SQL”或\
    \ `Tutorial D`）。\n\n现在我们面临一个选择：在 `EMP` 中记录所有员工，还是只在 `EMP` 中记录非程序员？哪种更好？嗯，如果只在\
    \ `EMP` 中记录非程序员，那么当员工成为或不再是程序员时，涉及的处理就稍微有点复杂（在这两种情况下，我们都必须从一个关系变量中删除一个元组，并向另一个关系变量中插入一个元组）。我们还需要声明并强制执行以下约束：\n\
    \n```\nCONSTRAINT ... IS_EMPTY ( JOIN { EMP , PGMR } ) ;\n```\n\n还要注意，如果我们希望其他某个关系变量包含对员工的引用，其隐含意义；通常这样的引用会是一个简单的外键，但如果员工如上所述被拆分到两个关系变量中，这就无法实现（至少，不能按常规理解的外键来实现）。^(²³⁰)\n\
    \n这类考量的结果是，这种特定设计可能不被推荐——相反，我们可能希望在 `EMP` 中记录所有员工。^(²³¹) 然而，无论哪种方式，该示例都没有显示冗余。^(²³²)\n\
    \n## 示例 5\n\n现在我想稍微修改一下示例 4，以说明另一个要点。假设关系变量 `EMP` 确实包含至少一个额外属性 `JOB`；再假设一个给定的员工是程序员，并在关系变量\
    \ `PGMR` 中表示，当且仅当该员工在 `EMP` 中的元组的 `JOB` 值为 `Programmer`（也许 `JOB` 的其他值——例如 `Janitor`——以类似方式对应其他关系变量）。顺便说一句，这类情况在实践中并不少见。现在肯定存在一些冗余，因为某个给定员工\
    \ `e` 是程序员这一事实被表示了两次——一次通过 `PGMR` 中存在 `e` 的元组这一事实，另一次通过 `e` 在 `EMP` 中的元组的 `JOB`\
    \ 值为 `Programmer` 这一事实。实际上，该设计受以下相等性依赖（可能还有许多类似的）约束：\n\n```\nCONSTRAINT ...\n\
    PGMR { ENO } = ( EMP WHERE JOB = 'Programmer' ) { ENO } ;\n```\n\n然而请注意，本例中没有违反正交性，即使考虑到所有员工（包括程序员）都在\
    \ `EMP` 中表示，`PGMR` 在 `{ENO}` 上的投影确实等于 `EMP` 在 `{ENO}` 上的投影的某个子集——但它本身并不是一种限制。^(²³³)\
    \ 但这两个投影都不对应于相关关系变量中成立的任何不可约 JD 的组成部分。^(²³⁴) （如果需要刷新对此的记忆，请查阅第 16 章中*正交设计原则*的最终版本。）因此，一个数据库可以是完全正交的，但仍然表现出一些冗余。\n\
    \n## 示例 6\n\n在他 1979 年的论文“扩展数据库关系模型以捕获更多意义”（*ACM Transactions on Database Systems\
    \ 4*, No. 4, December 1979）中，Codd 提出了一种特定的设计规范，稍微简化一下，可以描述如下：\n\n*   设 *E* 为一个“实体类型”，*ID*\
    \ 为一个数据类型，使得类型为 *E* 的每个实体都有一个且仅有一个*主标识符*（我的术语，不是 Codd 的），类型为 *ID*。例如，*E* 和 *ID*\
    \ 可能分别是实体类型“供应商”和数据类型“字符串”。\n*   设 *P1*, ..., *Pn* 为一组“属性类型”，使得类型为 *E* 的每个实体对于每个类型\
    \ *P1*, ..., *Pn* 至多有一个属性。例如，对于供应商，*P1*, *P2* 和 *P3* 可能是属性类型“名称”、“状态”和“城市”（所以在本例中\
    \ *n* = 3）。\n    *注意：* 为了当前的讨论（仅），我假设一个给定的供应商可以拥有这三个属性的任何子集，特别是空子集。\n*   相应地，对于每个实体类型\
    \ *E*，数据库应包含：\n    1.  一个且仅一个 *E-关系变量* ，包含在某个时间存在的类型为 *E* 的那些实体的 *ID* 值，以及\n \
    \   2.  对于每个 *Pi* (*i* = 1, ..., *n*)，一个且仅一个 *P-关系变量*，包含对于在某个时间存在且当时具有类型为 *Pi*\
    \ 的属性的类型为 *E* 的每个实体的 {*ID* 值, *Pi* 值} 对。\n\n我将这种规范称为 *RM/T 规范* ，因为它是 Codd 在那篇\
    \ 1979 年论文中称为“扩展关系模型 RM/T”（T 代表塔斯马尼亚，Codd 在那里首次提出了他关于该扩展模型的想法）的一部分。将该规范具体应用于供应商案例，我们得到一个如下所示的设计（为简单起见，我在此忽略本书大部分内容中假设在关系变量\
    \ `S` 中成立的函数依赖 `{CITY} -> {STATUS}`）：\n\n```\nS  { SNO }\nKEY { SNO } ;\nSN {\
    \ SNO , SNAME }\nKEY { SNO }\nFOREIGN KEY { SNO } REFERENCES S ;\nST { SNO , STATUS\
    \ }\nKEY { SNO }\nFOREIGN KEY { SNO } REFERENCES S ;\nSC { SNO , CITY }\nKEY {\
    \ SNO }\nFOREIGN KEY { SNO } REFERENCES S ;\n```\n\n这些关系变量中的每一个都处于 6NF。^(²³⁵)\
    \ 图 17-3 显示了一组示例值。*注意：* 所示值并非旨在与我们常用的示例值完全对应，但很接近。请特别注意：(a) 供应商 S3 没有状态，(b) 供应商\
    \ S4 没有状态也没有城市，以及 (c) 供应商 S5 没有名称、没有状态也没有城市。\n\n![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig3_HTML.jpg](img/489629_2_En_17_Fig3_HTML.jpg)\n\
    \n图 17-3\n\n供应商的 RM/T 设计——示例值\n\n事实上，这类设计确实有很多可取之处（至少，在拥有架构良好的 DBMS 的情况下会是这样）。然而，就当前目的而言，我只想提请各位注意以下一点：只要类型为\
    \ *E* 的每个实体至少拥有 *n* 个属性中的一个，那么这样的设计就肯定涉及一些冗余——事实上，可以说，是 Codd 本人在其 1970 年论文中定义的*强*冗余——因为在任何给定时间，E-关系变量的值将等于\
    \ P-关系变量在标识符属性上的投影的并集。例如，对于供应商，会有一个约束（当然，是一个 EQD）如下：\n\n```\nCONSTRAINT ... S\
    \ { SNO } = UNION { SN { SNO } ,\nST { SNO } ,\nSC { SNO } } ;\n```\n\n*注意：* 这个特定的冗余不适用于图\
    \ 17-3——即，给定该图中显示的值，该约束不成立——因为有一个供应商（供应商 S5）没有名称、状态和城市这三个属性中的任何一个。\n"
- fmt: 'Observe now that the foregoing kind of design becomes “even more redundant,”
    as it were, in the (common?) special case in which every entity of type `E` in
    fact has all of the `n` properties. Figure [17-4](#489629_2_En_17_Chapter.xhtml#Fig4)
    is a revised version of Figure [17-3](#489629_2_En_17_Chapter.xhtml#Fig3) that
    illustrates this situation:


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig4_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig4_HTML.jpg)


    ##### Figure 17-4

    A revised version of Figure [17-3](#489629_2_En_17_Chapter.xhtml#Fig3)


    Observe that now—speaking a trifle loosely—`{SNO}` is now a foreign key in each
    of the relvars that references the sole key `{SNO}` in each of the others; equivalently,
    the projection on `{SNO}` of any of the relvars is equal to the projection on
    `{SNO}` of any of the others. Well ... to be more precise about the matter, there’s
    an equality dependency interrelating every pair of the four relvars:


    ```

    CONSTRAINT ...

    IDENTICAL { S { SNO } , SN { SNO } , ST { SNO } , SC { SNO } } ;

    ```


    `IDENTICAL` is an operator proposed by Hugh Darwen and myself, in our book *Database
    Explorations: Essays on The Third Manifesto and Related Topics* (Trafford, 2010)
    and elsewhere, as an addition to `Tutorial D`. You can think of it as a kind of
    `n-`adic “=” operator. The semantics as follows: The expression


    `IDENTICAL { rx1 , ... , rxn }`


    returns TRUE if the relations `r1`, ..., `rn` represented by the expressions `rx1`,
    ..., `rxn`, respectively, are all equal; otherwise it returns FALSE.


    Even in the extreme case illustrated in Figure [17-4](#489629_2_En_17_Chapter.xhtml#Fig4),
    however, the design doesn’t violate orthogonality. What’s more, I say again that
    this kind of design would have quite a lot to recommend it, given a well architected
    DBMS. In particular, the equality dependencies, and therefore the redundancy,
    would be “automatically” managed and maintained in such a system (see the section
    “Managing Redundancy,” later).


    ## Example 7


    Consider a company in which every employee is required to be in exactly one department
    and every department is required to have at least one employee. Figure [17-5](#489629_2_En_17_Chapter.xhtml#Fig5)
    shows sample values (in outline) for an RM/T design for this situation:


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig5_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig5_HTML.jpg)


    ##### Figure 17-5

    Employees and departments─sample values


    By the way, do you think relvar `EMPDEPT` here is a P-relvar for employees, or
    for departments, or for both? Justify your answer! (In fact, to pursue the point
    a moment longer, an RM/T design might not be the best option in this example,
    because there’s necessarily a one to one correspondence between `EMP` and `EMPDEPT`,
    and there seems little reason not to collapse those two relvars into one.)


    Anyway, with reference to the sample values in the figure, we see that there are
    exactly five employees and exactly three departments. Since every employee must
    be in exactly one department and every department must have at least one employee,
    why not define one department—`D3`, say—to be the “default” one, and adopt a rule
    that says that any employee mentioned in `EMP` and not in `EMPDEPT` is in that
    default department? In terms of Figure [17-4](#489629_2_En_17_Chapter.xhtml#Fig4),
    this rule would allow us to omit the tuples `(E4,D3)` and `(E5,D3)` from `EMPDEPT`.
    Note that if we don’t adopt such a rule, then the design clearly involves some
    redundancy once again—to be specific, it’s subject to the following equality dependencies:


    ```

    CONSTRAINT EVERY_EMP_HAS_A_DEPT EMP { ENO } = EMPDEPT { ENO } ;

    CONSTRAINT EVERY_DEPT_HAS_AN_EMP DEPT { DNO } = EMPDEPT { DNO } ;

    ```


    There seem to me to be at least two factors that militate against adopting such
    a “default department” design, however. The first is that the choice of which
    department to make the default is likely to be arbitrary. The second is that now
    we need to be extremely careful over the meaning of relvar `EMPDEPT`! The obvious
    predicate *Employee `ENO` is in department `DNO`* doesn’t work. Why not? Because,
    under that predicate (and assuming department `D3` is the default), omitting the
    tuple `(E5,D3)`, say, would mean—thanks to `The Closed World Assumption`—that
    employee `E5` *isn’t* in department `D3`! So the predicate has to be something
    like this:


    *   *Employee `ENO` is in department `DNO` (which is not the default department
    number `D3`).*


    Now, this predicate does work (I think!), but it’s pretty tricky. Suppose the
    tuple `(E1,D1)` appears in the relvar, as shown in Figure [17-5](#489629_2_En_17_Chapter.xhtml#Fig5).
    Then the corresponding proposition is:


    *   *Employee `E1` is in department `D1` (which is not the default department
    number `D3`).*


    And of course this proposition evaluates to TRUE. OK so far. However, now suppose
    there’s no tuple in the relvar for employee `E5`. The intended interpretation
    is, of course, that employee `E5` is in department `D3`; but what does `The Closed
    World Assumption` actually say? Well, first of all, observe that, e.g., the specific
    tuple `(E5,D1)` doesn’t appear. By `The Closed World Assumption`, then, the following
    must be a true proposition:


    *   **`It’s not the case that`** *employee `E5` is in department `D1` (which is
    not the default department number `D3`).*


    Or a little more formally:


    ```

    NOT ( E5 is in D1 AND D1 ≠ D3 )

    ```


    By De Morgan’s laws, this expression is equivalent to:


    ```

    E5 is not in D1 OR D1 = D3

    ```


    Since `D1 = D3` is false, this expression reduces to just “`E5` is not in `D1`,”
    which is what we want (I mean, it’s a true proposition).


    A similar analysis shows that we can infer that `E5` certainly isn’t in any department
    that’s not the default one, `D3`. But what about that default one? Well, the tuple
    `(E5,D3)` doesn''t appear, and so the following must be a true proposition:


    ```

    NOT ( E5 is in D3 AND D3 ≠ D3 )

    ```


    Equivalently:


    ```

    E5 is not in D3 OR D3 = D3

    ```


    And since `D3 = D3` is true, this expression reduces to just TRUE. Note, however,
    that the fact that this proposition is true certainly doesn’t tell us is that
    `E5` is in `D3`! Now, perhaps we can infer this latter fact, given that `E5` does
    exist and certainly isn’t in any department not equal to `D3` (?). But I seriously
    doubt whether users would want to have to deal with such convoluted, logic-chopping
    arguments in practice.


    ## Example 8


    Consider the design illustrated in Figure [17-6](#489629_2_En_17_Chapter.xhtml#Fig6)
    (a slightly revised, somewhat RM/T-like version of Figure [16-4](#489629_2_En_16_Chapter.xhtml#Fig4)
    from the previous chapter):


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig6_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig6_HTML.jpg)


    ##### Figure 17-6

    An RM/T design for employees and salaries─sample values


    The predicates for these relvars are as follows:


    *   `EMP`: *Employee `ENO` is employed by the company.*

    *   `EARNS`: *Employee `ENO` has salary `SALARY`.*

    *   `SALARY_UNK`: *Employee `ENO` has a salary, but we don’t know what it is.*

    *   `UNSALARIED`: *Employee `ENO` doesn’t have a salary.*


    Observe now that either relvar `SALARY_UNK` or relvar `UNSALARIED` is redundant—any
    employee represented in relvar `EMP` and not in relvar `EARNS` must be represented
    in exactly one of the other two; so we could drop, say, relvar `SALARY_UNK` without
    any loss of information.^([^(236)](#fn236)) Yet there doesn’t seem to be any good
    reason for choosing either of `SALARY_UNK` and `UNSALARIED` over the other as
    the one to be dropped, and considerations of symmetry would argue in favor of
    retaining both, and living with the redundancy (?).


    Symmetry is usually another good design principle. To quote Polya:^([^(237)](#fn237))
    “Try to treat symmetrically what is symmetrical, and do not destroy wantonly any
    natural symmetry.” But Example 8 and others like it—Example 7 too, perhaps—show
    that symmetry and nonredundancy can sometimes be conflicting objectives.'
