  trans: '

    例如，令 `PLUS` 为一个关系变量，其属性为 `A`、`B` 和 `C`（因此度数为三），并令关系变量谓词为 `A + B = C`。那么 `PLUS`
    属于 5NF，并且它有三个键（即 `AB`、`BC` 和 `CA`，再次使用 Heath 表示法）；然而，这些键中没有一个的度数小于二，因此 `PLUS`
    也属于 6NF。


    顺便说一句，请不要误解我的意思——我*并非*说关系变量应始终处于 6NF，或者规范化应始终进行到 6NF。有时，一些较低的范式（例如 5NF）至少是足够的。此外，重复我在第
    8 章说过的一点，一个设计可以是完全规范化的（意味着所有关系变量都处于 5NF，甚至 6NF），但仍然是糟糕的。例如，供应商关系变量 `S` 在 `{SNO,SNAME}`、`{SNO,STATUS}`
    和 `{SNO,CITY}` 上的投影都处于 6NF，但由这三个投影组成的设计可能并不好，因为（正如我们在第 6 章所见）它丢失了一个函数依赖（FD）。


    另一个需要考虑的点是，用 6NF 投影替换一个 5NF 关系变量可能会导致需要维护某些相等依赖（EQD）。回顾第 3 章，EQD 是一种约束，大意是说某些关系变量的某些投影必须相等（说得稍微宽松一点）。例如，如果我们如上所述将关系变量
    `P` 分解为其投影 `PN`、`PL`、`PW` 和 `PC`，那么可能会应用以下 EQD：^(¹⁹⁰)


    ```

    CONSTRAINT ... PL { PNO } = PN { PNO } ;

    CONSTRAINT ... PW { PNO } = PN { PNO } ;

    CONSTRAINT ... PC { PNO } = PN { PNO } ;

    ```


    另一方面，正如其他地方所解释的，^(¹⁹¹) 像讨论中的这种分解可以成为处理缺失信息的一个良好基础。假设每个零件确实总是有一个已知的名称，但不一定有已知的颜色、重量或城市。那么，一个没有已知颜色的零件将简单地在关系变量
    `PL` 中没有元组（重量和城市以及关系变量 `PW` 和 `PC` 同理）。当然，相等依赖随后将变为*包含*依赖（实际上是外键约束），分别从 `PL` 到
    `PN`、`PW` 到 `PN` 以及 `PC` 到 `PN`。


    上述讨论的要点如下（为了明确起见，我将用零件的例子来表达）：如果有两个或多个属性，例如名称和颜色，是每个零件始终拥有的，那么将这两个属性分离到不同的投影中可能是个坏主意；但是，如果某个属性是“可选的”——换句话说，如果它有可能因某种原因而“缺失”或未知——那么将该属性放在其独立的关系变量中可能是个好主意。


    ## 时态数据的第六范式


    当然，时态数据本身就是一个庞大的主题，我在此只能做一个非常肤浅的介绍；然而，我想涵盖足够的内容来至少非正式地解释 6NF 的广义版本是什么。考虑图 14-1，它显示了一个名为
    `S_DURING` 的关系变量的示例值，其谓词如下：


    > *供应商 `SNO` 在整个时间区间 `DURING` 内都处于合同状态。*


    例如，我们从图中看到（除其他信息外）供应商 `S1` 从“第 4 天”（`d04`）到“第 7 天”（`d07`）（包括首尾）的整个区间内都处于合同状态。


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig1_HTML.jpg](img/489629_2_En_14_Fig1_HTML.jpg)

    *图 14-1 关系变量 `S_DURING`——示例值*


    正如示例所示，区间对于时态数据支持至关重要。然而，区间概念实际上具有更广泛的适用性，因为它出现在大量实际情境中。例如，税级（例如，$50,000–$75,000）可以被视为区间，这些区间涉及的是货币价值而非日期或时间价值。因此，尽管本节标题明确指代时态数据本身，但请注意，所有将要讨论的概念——不仅是区间概念本身，还包括各种相关概念——都具有更广泛的适用性和有用性。（事实上，我曾考虑将本节命名为“区间数据的第六范式”，这个标题在某些方面可能更贴切，尽管或许不那么直观易懂。）


    现在，图 14-1 中的关系显然表现出一些冗余；例如，它两次告诉我们供应商 `S1` 在第 6 天处于合同状态。它还表现出一种*迂回表述*；例如，它用了三个元组来告诉我们本可以用一个元组就能说明的信息，即供应商
    `S1` 在整个区间 [`d04`:`d10`] 内都处于合同状态。^(¹⁹²) 相比之下，图 14-2 所示的关系包含与图 14-1 相同的信息——即*信息等价*于^(¹⁹³)
    图 14-1 中的关系——但没有表现出这种冗余或迂回表述：


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig2_HTML.jpg](img/489629_2_En_14_Fig2_HTML.jpg)

    *图 14-2 图 14-1 中关系的打包形式*


    图 14-2 中的关系是图 14-1 中关系的*打包形式*，可以通过一种称为 `PACK` 的新关系运算符从后者获得，如下所示：


    ```

    PACK S_DURING ON ( DURING )

    ```


    实际上，这个表达式的作用是：对于当前关系变量 `S_DURING` 的值中表示的每个供应商，它将任何重叠或相邻的 `DURING` 值组合成一个单一的区间。例如，参考图
    14-1 和 14-2：


    *   对于供应商 `S1`，区间 [`d04`:`d07`] 和 [`d05`:`d10`] 重叠，因此可以将它们组合形成区间 [`d04`:`d10`]。

    *   对于供应商 `S2`，区间 [`d05`:`d06`] 和 [`d07`:`d08`] 相邻，因此可以将它们组合形成区间 [`d05`:`d08`]。


    *注意：* `S1` 的“另一个”区间，即 [`d09`:`d09`]，实际上只是被吸收进了那个组合区间 [`d04`:`d10`]。相比之下，供应商 `S2`
    的“另一个”区间，即 [`d03`:`d03`]，无法以这种方式与其他任何区间组合，因此保持不变。

