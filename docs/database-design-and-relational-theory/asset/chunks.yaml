  trans: '# 5. 函数依赖与 BCNF 范式（形式化）


    > *形式化即是规范*

    >

    > *非规范化则不然*

    >

    > *若规范即形式化，*

    >

    > *非形式化又为何物？*

    >

    > ——佚名：*虫洞去处*


    现在，我想后退一步，可以说是深吸一口气，重新审视函数依赖和 BCNF——但这次要以正确的方式进行（请原谅其中涉及的少量重复）。正如你将很快看到的，本章的处理方式比前一章要抽象得多；如果你已完全掌握前一章的内容，理解起来应该不会太困难，但肯定会更加形式化。因此，*在你完全消化前一章的所有内容之前，我希望你完全不要看本章。*（当然，做到这一点应该不难，因为前一章的大部分内容你肯定已经熟悉了。）


    一个普遍要点：既然 BCNF 是*关于*函数依赖的*规范*范式，那么本章中我将不会涉及第二范式或第三范式（或者实际上的第一范式）。正如我已经或多或少提到过的，第二范式和第三范式本身现在已经不那么有趣了。


    ## 预备定义


    在本节中，我仅给出一些熟悉但绝对基本的概念定义，几乎没有进一步阐述——这些定义比文献中常见的定义要精确得多（在某些情况下，也比本书前面给出的定义更精确）。举例说明这些定义的任务留作练习。


    *   **定义（标题）：** 一个标题 `H` 是一个属性名称的集合。


    我提醒你，前面的定义故意与第 2 章（见该章）给出的定义不完全相同。事实上，它比之前的定义更简单，^(⁷¹) 因此，接下来的某些定义也会相应简化。


    *   **定义（元组）：** 标题为 `H` 的一个元组是一组有序对 `<A,v>` 的集合（`H` 中出现的每个属性名称 `A` 对应一个这样的对），其中
    `v` 是一个值。短语 *标题为 H 的元组* 在 `H` 已被理解或与当前目的无关时，可以缩写为 *元组*。


    *   **定义（元组投影）：** 设 `t` 是一个标题为 `H` 的元组，`X` 是 `H` 的一个子集。那么 `t` 在 `X` 的属性上的（元组）投影
    `t{X}` 是一个标题为 `X` 的元组——即 `t` 的子集，仅包含那些 `A` 出现在 `X` 中的 `<A,v>` 对。^(⁷²)


    前面的定义定义了一个通常的关系投影操作符的版本，该操作符适用于单个元组（参见第 2 章的练习 2.11）。在接下来的篇幅中，我将多次引用这个定义。请注意，正如关系的每个投影本身也是一个关系一样，元组的每个投影本身也是一个元组。


    *   **定义（关系）：** 一个关系 `r` 是一个有序对 `<H,h>`，其中 `h` 是一组元组（即 `r` 的体），所有这些元组都具有标题 `H`。`H`
    是 `r` 的标题，`H` 的属性就是 `r` 的属性。`h` 中的元组就是 `r` 的元组。


    *   **定义（投影）：** 设 `r` 为关系 `<H,h>`，`X` 是 `H` 的一个子集。那么 `r` 在 `X` 的属性上的投影 `r{X}`
    是关系 `<X,x>`，其中 `x` 是所有元组 `t{X}` 的集合，而 `t` 是 `h` 中的一个元组。


    *   **定义（连接）：** 设关系 `r1`, ..., `rn`（`n` ≥ 0）是可连接的——即它们同名的属性属于相同的类型。那么 `r1`, ...,
    `rn` 的连接，`JOIN {r1,...,rn}`，是一个关系，其 (a) 标题是 `r1`, ..., `rn` 标题的并集，(b) 体是所有元组 `t`
    的集合，其中 `t` 是来自 `r1` 的一个元组、...、来自 `rn` 的一个元组的并集。


    由此产生的一些要点：


    *   刚刚定义的那种连接有时被更明确地称为*自然*连接。


    *   请注意，这里定义的连接是一个 *n* 元操作符，而不仅仅是一个二元操作符——`n` = 2 只是一个常见的特例。（至于 `n` < 2 的情况，请参见本章末尾的练习
    5.1。）正是因为这个事实，`Tutorial D` 使用了定义中提到的**前缀**语法风格——


    ```

    JOIN { r1 , ..., rn }

    ```


    ——尽管在 `n` = 2 的特殊情况下，它也支持**中缀**风格：


    ```

    r1 JOIN r2

    ```


    然而，在本书中，从这一刻起，我将倾向于使用前缀风格。


    *   还要注意，在操作关系 `r1`, ..., `rn` 中没有任何两个具有共同属性名称的特殊情况下，连接简化为笛卡尔积。


    本节的最后一个定义：


    *   **定义（关系变量，relvar）：** 一个关系变量或 relvar，其标题为 `H`，是一个变量 `R`，使得一个值 `r` 只能被赋给该变量，如果该值
    `r` 是一个具有标题 `H` 的关系。`H` 的属性就是 `R` 的属性。此外，如果关系 `r` 被赋给关系变量 `R`，那么在该赋值下，`r` 的体和元组分别成为
    `R` 的体和元组。


    *注意：* 前面的定义指出，关系 `r` *只能当* 它与 `R` 具有相同标题时才能被赋给关系变量 `R`。更准确地说，关系 `r` *当且仅当* (a)
    它与 `R` 具有相同标题*并且* (b) 它满足所有适用于 `R` 的约束时，才能被赋给关系变量 `R`，其中短语“所有适用于 `R` 的约束”包括 `R`
    中成立的函数依赖——参见紧接的下一节——但不限于函数依赖。'
- fmt: '## Functional Dependencies Revisited


    Now I’m in a position to deal properly with the concept of functional dependence.
    Again I’ll be presenting precise definitions—but in this section (as compared
    to the previous one) I’ll have rather more to say about those definitions and
    some of their implications.


    ### Definition (functional dependency)

    Let `H` be a heading; then a functional dependency (FD) with respect to `H` is
    an expression of the form `X → Y`, where `X` (the determinant) and `Y` (the dependant)
    are both subsets of `H`. The phrase *FD with respect to H* can be abbreviated
    to just *FD*, if `H` is understood.


    Here are a couple of examples:

    ```

    { CITY } → { STATUS }

    { CITY } → { SNO }

    ```


    Note carefully that—contrary to popular opinion, perhaps—FDs are formally defined
    with respect to some *heading*, not with respect to some relation or some relvar.
    The two FDs just shown, for example, are defined with respect to any heading that
    contains attributes called `CITY`, `STATUS`, and `SNO` (and others as well, possibly).
    Note too that from a formal point of view, an FD is just an *expression*: an expression
    that, when interpreted with respect to some specific relation, becomes a *proposition*
    that (by definition) evaluates to either `TRUE` or `FALSE`. For example, if the
    two FDs shown above are interpreted with respect to the relation that’s the current
    value of relvar `S` (see Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1) in Chapter
    [1](#489629_2_En_1_Chapter.xhtml)), then the first evaluates to `TRUE` and the
    second to `FALSE`. Of course, it’s common informally to define such an expression
    to be an FD, in some specific context, only if it evaluates to `TRUE` in that
    context; however, such a definition leaves no way of saying a given relation fails
    to satisfy, or in other words violates, some given FD. Why? Because, by that informal
    definition, an FD that isn’t satisfied wouldn’t be an FD in the first place! For
    example, we wouldn’t be able to say the relation that’s the current value of relvar
    `S` violates the second of the FDs shown above.


    I really can’t stress the foregoing point strongly enough. For most people, it
    represents a shift in thinking; however, it’s a shift that has to be made if you’re
    ever to understand what design theory is all about. The point is this: Most writings
    on FDs—including the early research papers that first introduced the concept—don’t
    actually define the concept of an FD, as such, at all! Instead, they say something
    along the lines of “`Y` is functionally dependent on `X` in relation `r` if and
    only if, whenever two tuples of `r` agree on `X`, they also agree on `Y`.” Which
    is perfectly true, of course—but it’s not a definition of an FD; instead, it’s
    a definition of what it means for an FD to be *satisfied*. But if we want to develop
    a theory of FDs as such, then we clearly need to be able to talk about FDs as
    objects in their own right, divorced from the context of some particular relation
    or some particular relvar. More specifically, we need to divorce the idea of an
    FD as such from the idea that it might have some interpretation, or meaning, in
    some context. In fact, design theory can be regarded as a small piece of logic,
    and logic isn’t about meaning at all—it’s about formal manipulations.


    ### Definition (satisfying or violating an FD)

    Let relation `r` have heading `H` and let `X → Y` be an FD, `F` say, with respect
    to `H`. If all pairs of tuples `t1` and `t2` of `r` are such that whenever `t1{*X*}
    = t2{*X*}`, then `t1{*Y*} = t2{*Y*}`, then `r` satisfies `F`; otherwise `r` violates
    `F`.


    Observe that it’s relations, not relvars, that satisfy or violate some given FD.
    For example, the relation that’s the current value of relvar `S` (see Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1))
    satisfies both of these FDs—

    ```

    { CITY }  → { STATUS }

    { SNAME } → { CITY }

    ```

    —and violates this one:

    ```

    { CITY } → { SNO }

    ```


    ### Definition (FD holding)

    The FD `F` holds in relvar `R` (equivalently, relvar `R` is subject to the FD
    `F`) if and only if every relation that can be assigned to relvar `R` satisfies
    `F`. The FDs that hold in relvar `R` are the FDs of `R`.


    *Important:* Please note the terminological distinction I’m drawing here—FDs are
    *satisfied* (or violated) by relations, but *hold* (or don’t hold) in relvars.
    Please note too that I’ll adhere to this distinction throughout this book. By
    way of example, the following FD holds in relvar `S`—

    ```

    { CITY } → { STATUS }

    ```

    —and these two don’t:

    ```

    { SNAME } → { CITY }

    { CITY }  → { SNO }

    ```

    (Contrast the examples following the previous definition.) So now, at last, we
    know precisely what it means for a given relvar to be subject to a given FD.'
