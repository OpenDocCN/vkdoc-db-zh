  trans: '

    ## 谓词


    现在，我将按承诺详细阐述 `表谓词`、`业务规则` 和 `不受控冗余` 这些术语。我将在本节讨论谓词，并在接下来的两节中讨论规则和冗余。


    首先，是谓词。对于一个给定的表，其 `表谓词` 简单来说就是一个相当精确但非正式的自然语言陈述，它说明了该表的含义——换言之，它陈述了用户应如何理解该表。例如，假设我们有一个名为
    `EMP`（“员工”）的表，其列名为 `ENO`、`ENAME`、`DNO` 和 `SALARY`。那么，该表 `EMP` 的谓词可能类似于：


    > *员工号为 `ENO` 的人是公司的员工，名为 `ENAME`，在部门编号为 `DNO` 的部门工作，其薪资为 `SALARY`。*


    `ENO`、`ENAME`、`DNO` 和 `SALARY` 是此谓词的*参数*，当然它们对应于具有相同名称的表中的列。


    让我花点时间解释一下表谓词这个术语的来源。^(²⁵⁹) 在逻辑学中，谓词基本上就是一个*真值函数*。像所有函数一样，它有一组参数；调用时它会返回一个结果；并且（因为它是真值函数）该结果要么是
    `TRUE`，要么是 `FALSE`。这里有一个简单的例子：


    ```

    x > y

    ```


    对于这个谓词，参数是 `x` 和 `y`，它们代表（为了这个例子，我们姑且约定）`INTEGER` 类型的值。当我们调用这个函数时，我们用适当类型的实参替换参数。假设我们分别用整数
    `8` 和 `5` 替换。我们得到以下语句：


    ```

    8 > 5

    ```


    这个语句实际上是一个*命题*，在逻辑学中，命题是明确无误地或为真或为假的东西。在当前例子中，它当然是真的；但是，如果我们代入，比如说，`3` 和 `7` 而不是
    `8` 和 `5` 作为相关实参，得到的命题将是假的。


    现在让我回到表 `EMP` 的谓词。对于该谓词，参数如前所述，是 `ENO`、`ENAME`、`DNO` 和 `SALARY`，它们代表（同样为了这个例子，我们姑且约定）类型分别为
    `CHAR`、`CHAR`、`CHAR` 和 `MONEY` 的值。（关于数据类型的问题，请参见下一节。）现在假设我们调用这个函数——即，假设我们*实例化这个谓词*，正如逻辑学家所说——并分别用实参
    `E4`、`Evans`、`D8` 和 `70K` 替换参数。我们得到以下命题：


    > *员工号为 `E4` 的人是公司的员工，名为 `Evans`，在部门编号为 `D8` 的部门工作，其薪资为 `70K`。*


    而且——关键点来了——*当且仅当这个特定命题为真时，对应的行 `(E4, Evans, D8, 70K)` 才会出现在 `EMP` 表中*。从逻辑角度来看，事实上，这正是“表”的定义：它是一组行，其中的行包含且仅包含那些其列值构成某个指定谓词的真实实例化的实参的行——而那个指定的谓词，恰恰就是相关表的
    `表谓词`。


    另一种表述方式如下（这通常被称为*封闭世界假设*）：


    *   如果行 `r` 出现在表 `T` 中，那么与 `r` 对应的命题为真。

    *   如果行 `r` 可能出现在 `T` 中但并未出现，那么与 `r` 对应的命题为假。


    *注意：* 上述中“与 `r` 对应的命题”，我指的是，当然是，通过将 `r` 中的列值代入 `T` 的表谓词的参数而得到的该谓词的实例化。


    ## 规则


    现在我转向我承诺要解释的第二个术语，`业务规则`。与表谓词类似，业务规则也是一个相当精确但非正式的自然语言陈述。然而，它在目的上不同于表谓词，其目的是捕捉数据库中数据需要被约束的某些方面：^(²⁶⁰)


    *   首先，肯定会有规则规定那些表谓词的参数所表示的信息类型。以员工为例，例如，会有一条规则，大意是 `SALARY` 参数（“薪资”）表示货币价值，以，比如说，欧元或美元表示。^(²⁶¹)

    *   其次，会有规则约束这些参数对于一个孤立考虑的给定员工所能取的值。例如，可能有一条规则说薪资不能为负，并且必须小于某个指定的上限。

    *   第三，会有规则约束作为一个整体的员工集合，独立于可能在同一数据库中表示的其他“实体”，如部门。例如，可能有一条规则，大意是员工号必须是唯一的。

    *   最后，会有规则约束与数据库中表示的其他实体相结合考虑的员工。例如，可能有一条规则，大意是每个员工必须被分配到某个已知的部门；或者一条规则，大意是任何员工的薪资都不能超过其所属部门经理的薪资。


    我想就业务规则这个问题再多说几句，因为它很重要——也因为在实践中它往往被有些忽视。正如前面的讨论所足以表明的，业务规则可能相当复杂（事实上，可以随你所愿地复杂）。然而，正如我所说，它们必然是非正式的。它们的形式化对应物——即它们在逻辑设计中映射到的东西——是*完整性约束*（简称约束），因此需要用某种形式化语言来陈述，并由
    DBMS 强制执行。换句话说，我在此与某些其他作者的观点不同，我明确声明数据库设计不仅仅是选择数据结构——完整性约束同样至关重要。（当然，其他作者通常确实至少会谈论主键和外键约束——有时也包括基数约束——但这些特定的约束只不过是一个更普遍现象的几个重要特例。）在这方面，我想请大家注意罗恩·罗斯（Ron
    Ross，Business Rule Solutions Inc.，1997）所著《业务规则书》（第二版）中的以下评论（此处略有转述）：


    > 尽管业务规则（像数据本身一样）是“共享”和普遍的，但传统上它们并未在数据库设计中被捕获。相反，它们通常只是模糊地（如果有的话）陈述在很大程度上不协调的分析和设计文档中，然后被深埋在应用程序的逻辑中。由于应用程序在一致且正确地应用此类规则方面是出了名的不可靠，这已经成为相当多挫折和错误的来源。


    我完全同意。此外，请注意其中隐含但强烈的批评，针对的是那些未能为完整性约束提供足够支持的 DBMS 产品！（有趣的是，SQL 标准在这方面提供的支持实际上并不太差。然而，不幸的是，SQL
    产品在实现标准的这一方面一直相当缓慢，至少可以说。）

    '
- fmt: '# Redundancy


    The third term I promised to explain is *uncontrolled redundancy*. Now, we often
    say, loosely, that the database is redundant if and only if "it says the same
    thing twice." We also often say, again loosely, that we don''t want the database
    to involve any redundancy in this sense. However, it would be more accurate to
    say we don''t want it to involve any *uncontrolled* redundancy. Uncontrolled redundancy
    can be a problem, but controlled redundancy shouldn''t be. Let me explain ...
    First, here are some more definitions:


    *   **Definition (controlled redundancy):** Redundancy in the database is controlled
    if the user is aware of it, but it''s guaranteed never to lead to any inconsistencies.


    *   **Definition (uncontrolled redundancy):** Redundancy in the database is uncontrolled
    if it has the potential to lead to inconsistencies.


    *   **Definition (inconsistency):** The database is inconsistent (at least from
    a formal point of view) if and only if there''s some integrity constraint it''s
    supposed to conform to but doesn''t.


    So if controlled redundancy means no inconsistencies, it must also mean no constraints
    are violated—or at least, and more precisely, no constraints having to do with
    data redundancy as such. Of course, not all constraints do have to do with data
    redundancy as such; for example, a constraint to the effect that salaries mustn''t
    be negative doesn''t. Thus, if the database were to show some employee as having
    a negative salary it would certainly be inconsistent, but that particular inconsistency
    wouldn''t be one that arises from redundancy.[^(262)](#fn262) (It would, however,
    mean the database was incorrect, in the sense that it didn''t faithfully reflect
    the state of affairs in the real world. Inconsistent implies incorrect, though
    the converse is false—the database can be incorrect without being inconsistent.
    For example, if it showed some employee as earning a salary different from that
    employee''s true salary, it would be incorrect, but probably not inconsistent.)


    To say it again, then, constraints don''t always have to do with redundancy. But
    redundancy does always have to do with constraints.[^(263)](#fn263) For example,
    suppose—very unrealistically!—that there''s a constraint to the effect that all
    employees in the same department must earn the same salary. Suppose further that
    the database shows Heli and Chris as being in the same department. Then if it
    were also to show Heli and Chris, separately, as earning the same salary, it would
    be redundant; by contrast, if it were to show Heli and Chris as earning different
    salaries, it would be inconsistent (and incorrect).


    So to say the database involves some redundancy is to say some constraint is supposed
    to apply. The constraint in question, in the case of the "same salary" example,
    might be formulated in SQL as follows:[^(264)](#fn264)


    ```sql

    CREATE ASSERTION AX1 CHECK

    ( ( SELECT COUNT ( DISTINCT DNO ) FROM EMP ) =

    ( SELECT COUNT ( * ) FROM

    ( SELECT DISTINCT DNO , SALARY FROM EMP ) AS POINTLESS ) ) ;

    ```


    Stating this constraint serves to inform the user that the redundancy exists;
    enforcing it serves to ensure that it won''t lead to any inconsistencies, thereby
    guaranteeing that the redundancy in question is controlled. Note, therefore, that
    we see once again, not incidentally, how important it is to be able to state constraints
    formally and how important it is for the DBMS to be able to enforce them.


    # “Eventual Consistency”


    There''s one more topic I want to cover in this appendix. Some readers, I''m sure,
    will have found the remarks in the previous section concerning consistency and
    redundancy a little puzzling, especially in view of the recent interest in what
    has come to be known as *eventual consistency* (in the context of so called "NoSQL"
    systems in particular). So let me try to clarify those remarks.


    First of all, to repeat, to say that a database is consistent merely means, formally
    speaking, that the database conforms to all stated constraints. Now, it''s crucially
    important that the database *always* be consistent in this formal sense; indeed,
    a database that''s not consistent in this sense, at some particular time, is like
    a logical system that contains a contradiction. Well, actually, that''s exactly
    what it is—a logical system with a contradiction. And in a logical system with
    a contradiction, you can prove *anything*; for example, you can prove that `1
    = 0`.[^(265)](#fn265) What this means in database terms is that if the database
    is ever inconsistent in the foregoing formal sense, you can never trust the answers
    you get to queries—they might be false, they might be true, and you have no way
    in general of knowing which they are. In other words, all bets are off. That''s
    why consistency in the formal sense is so crucial. It''s also why, contrary to
    popular opinion, integrity checking must always be immediate —i.e., it must be
    done at the end of any update operation that has the potential to violate the
    integrity constraint in question. (In other words, so called "deferred checking,"
    meaning integrity checking that''s deferred to the end of the pertinent transaction,
    is a violation of the principles of the relational model; in fact, it''s a logical
    error.)


    But consistency in the formal sense isn''t necessarily the same thing as consistency
    as conventionally understood, meaning consistency as that term is typically used
    outside the world of databases in particular. Suppose items `X` and `Y` in the
    database are meant to represent quantities `x` and `y` in the real world, and
    suppose further that `x` and `y` are supposed always to be equal. (They might,
    for example, both be the selling price for some commodity, represented twice in
    the database because replication is being used to improve availability.) If `X`
    and `Y` in fact have different values at some given time, we might certainly say,
    informally, that there''s an inconsistency in the data as stored at that time.
    But that "inconsistency" is an inconsistency as far as the system is concerned
    *only if the system has been told that X and Y are supposed to be equal*—i.e.,
    only if "`X = Y`" has been declared as a formal integrity constraint. If it hasn''t,
    then (a) the fact that `X ≠ Y` at some time doesn''t in itself constitute a consistency
    violation as far as the system is concerned, and (b) importantly, the system will
    never rely on an assumption that `X` and `Y` are equal.


    Thus, if all we want is for `X` and `Y` to be equal "eventually"—i.e., if we''re
    content for that requirement to be handled in the application layer—all we have
    to do as far as the database system is concerned is omit any declaration of "`X
    = Y`" as a formal constraint. No problem, and in particular no violation of the
    relational model.


