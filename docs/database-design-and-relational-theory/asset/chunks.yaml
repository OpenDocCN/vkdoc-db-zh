  trans: '

    ## 追踪算法


    从本章目前所讨论的所有内容来看，一个显而易见的问题自然浮现：


    > ***给定某个依赖集合 D（函数依赖 FDs 或连接依赖 JDs 或混合体），该集合隐含了哪些依赖 d？***


    这个问题的部分答案由*追踪算法*提供，该算法正是用于测试某个给定的依赖 *d* 是否由某个给定的依赖集合 *D* 所隐含。^(¹⁴⁷) 更具体地说，给定这样的集合
    *D* 和依赖 *d*，追踪算法将：


    1.  证明 *d* 由 *D* 隐含，或者

    2.  通过提供一个明确的反例（即，一个满足 *D* 中所有依赖但违反 *d* 的关系）来证明它并非如此。


    事实上，我们已经在实践中看到过一些追踪算法的例子。在上一节中，我展示了一个给定的 FD 和 JD 如何共同隐含某个特定的 FD 而不隐含另一个（后者实际上是一个键约束，当然，它是
    FD 约束的一个特例）。而在再前一节，我给出了两个例子，其中一个给定的 FD 和 JD 共同隐含了某个特定的 JD（顺带说明，这证明了给定的 JD 是可约的）。所有这些例子实际上都是追踪算法的应用。但现在让我们更具体一些。为此，我首先需要引入更多一点术语：


    *   考虑 FDs。抽象地（尽管当然非常宽泛地），一个 FD 的形式是“如果出现某些元组 `t1`, ..., `tn`，那么这些元组中的某些属性必须具有相等的值。”
    因此，FD 有时被称为*相等生成*依赖。

    *   现在考虑 JDs。同样抽象且宽泛地，一个 JD 的形式是“如果出现某些元组 `t1`, ..., `tn`，那么某个元组 `t` 必须出现。” 因此，JD
    有时被称为*元组生成*依赖。


    在继续之前，我必须提醒你不要混淆元组生成依赖和元组*强制*依赖。^(¹⁴⁸) 一个元组*强制*依赖是一种 JD，其特性是如果元组 `t1`, ..., `tn`
    出现，那么某个不同于 `t1`, ..., `tn` 中每一个的元组 `t` 将被迫出现。相比之下，一个元组*生成*依赖 (a) 不要求“生成”的元组与给定元组不同，并且
    (b) 实际上根本不必是 JD。（然而，本书中讨论的唯一元组生成依赖确实是 JD。因此，就当前目的而言，你可以将“元组生成依赖”理解为 JD；这样，我们可以说所有元组强制依赖都是元组生成依赖，但某些元组生成依赖并非元组强制依赖。）


    相等生成依赖和元组生成依赖都涉及一组*前提*——即给定的元组 `t1`, ..., `tn`——和一个*结论*。对于元组生成依赖，结论是生成的元组 `t`；对于相等生成依赖，结论则是某个等式成立这一事实。


    现在我可以解释追踪算法本身了。也许我应该先说，它本质上是常识；实际上，它往往更容易演示而非描述。然而，其大致工作流程如下：我们试图确定依赖 *d* 是否由集合
    *D* 中的依赖所蕴含。我们按以下步骤进行：


    1.  我们写下代表 *d* 之前提的元组。

    2.  我们将 *D* 中的依赖应用于这些元组（可能生成额外的元组），并不断重复此过程，直到不再发生变化。


    这个过程最终将产生：


    1.  *d* 之结论的一种表示，在这种情况下 *d* 确实由 *D* 蕴含，或者

    2.  一个满足 *D* 但不满足 *d* 的关系，在这种情况下 *d* 并非由 *D* 蕴含。


    让我们看一个例子。假设给定的依赖集合如下：


    ```

    { A → C , B → C , C → D , CE → A , DE → C }

    ```

    （实际上，如你所见，它们都是 FDs。）再考虑以下 JD（称之为 *J*）：


    ```

    ☼ { AB , AD , AE , BE , CDE }

    ```


    我现在将展示，给定的 FDs 实际上确实隐含了 *J*（我认为你会同意，这种情况远非一目了然）。


    第一步是写下代表该 JD *J* 之前提的元组。现在，让我详细说明该 JD 的确切含义：


    *   如果以下所有情况都成立——出现一个 `A` = `a` 且 `B` = `b` 的元组；出现一个 `A` = `a` 且 `D` = `d` 的元组；出现一个
    `A` = `a` 且 `E` = `e` 的元组；出现一个 `B` = `b` 且 `E` = `e` 的元组；出现一个 `C` = `c` 且 `D`
    = `d` 且 `E` = `e` 的元组。

    *   ——那么以下情况也必须成立：出现一个 `A` = `a` 且 `B` = `b` 且 `C` = `c` 且 `D` = `d` 且 `E` = `e`
    的元组。


    然而，在后续步骤中，使用带后缀的 `x` 和 `y` 来表示属性值，而不是直接使用 `a`, `b`, `c`, `d`, `e`，会更加方便。具体来说，我将用
    `x1`-`x5` 分别代替 `a`-`e`，并在所有其他位置使用 `y`；例如，我将用 `y23` 表示“第二个”前提元组中的“第三个”（即 `C`）值。因此，前提元组如下所示：^(¹⁴⁹)


    ```

    x1   x2  y13  y14  y15

    x1  y22  y23   x4  y25

    x1  y32  y33  y34   x5

    y41   x2  y43  y44   x5

    y51  y52   x3   x4   x5

    ```


    如果（且仅如果）该 JD 被这五个 FDs 所隐含，那么这些元组将“生成”以下元组：


    ```

    x1   x2   x3   x4   x5

    ```


    那么，让我们看看它是否能做到；即，让我们应用给定的依赖。


    *   根据 `A` → `C`，我们有 `y13` = `y23` = `y33`；同样，根据 `B` → `C`，我们有 `y13` = `y43`。因此，我们可以用
    `y13` 替换 `y23`、`y33` 和 `y43` 中的每一个。前提元组变为（替换内容以**粗体**显示）：


    ```

    x1   x2  y13  y14  y15

    x1  y22  **y13**   x4  y25

    x1  y32  **y13**  y34   x5

    y41   x2  **y13**  y44   x5

    y51  y52   x3   x4   x5

    ```


    *   根据 `C` → `D`，我们有 `y14` = `y34` = `y44` = `x4`。进行替换：


    ```

    x1   x2  y13  **y14**  y15

    x1  y22  y13   x4  y25

    x1  y32  y13  **y34**   x5

    y41   x2  y13  **y44**   x5

    y51  y52   x3   x4   x5

    ```

    替换后：

    ```

    x1   x2  y13  **x4**  y15

    x1  y22  y13   x4  y25

    x1  y32  y13  **x4**   x5

    y41   x2  y13  **x4**   x5

    y51  y52   x3   x4   x5

    ```


    *   根据 `CE` → `A`，我们有 `y41` = `x1`。进行替换：


    ```

    x1   x2  y13   x4  y15

    x1  y22  y13   x4  y25

    x1  y32  y13   x4   x5

    **y41**   x2  y13   x4   x5

    y51  y52   x3   x4   x5

    ```

    替换后：

    ```

    x1   x2  y13   x4  y15

    x1  y22  y13   x4  y25

    x1  y32  y13   x4   x5

    **x1**   x2  y13   x4   x5

    y51  y52   x3   x4   x5

    ```


    *   根据 `DE` → `C`，我们有 `y13` = `x3`。进行替换：


    ```

    x1   x2  **y13**   x4  y15

    x1  y22  **y13**   x4  y25

    x1  y32  **y13**   x4   x5

    x1   x2  **y13**   x4   x5

    y51  y52   x3   x4   x5

    ```

    替换后：

    ```

    x1   x2  **x3**   x4  y15

    x1  y22  **x3**   x4  y25

    x1  y32  **x3**   x4   x5

    x1   x2  **x3**   x4   x5

    y51  y52   x3   x4   x5

    ```


    *   这里的“第四个”元组全部是 `x`，因此 JD *J* 确实由给定的 FDs 所隐含。


    ```

    x1   x2   x3   x4  y15

    x1  y22   x3   x4  y25

    x1  y32   x3   x4   x5

    x1   x2   x3   x4   x5   成功：全是 x !!!

    y51  y52   x3   x4   x5

    ```


    让我们再看另一个例子。假设给定的依赖集合仅包含 JD `{AB,AC}`。这个集合是否隐含 FD `A` → `B`？*注意：* 我们已经知道答案是否定的，因为我们这里讨论的是希斯定理（Heath’s
    Theorem）的逆命题，并且我们从练习 5.4 知道希斯定理的逆命题是假的。但让我们看看追踪算法会告诉我们什么：


    *   前提元组：


    ```

    x1  y12  y13

    x1  y22  y23

    ```


    如果且仅如果该 FD 被该 JD 隐含，那么将该 JD 应用于这些元组将必须使 `y12` 和 `y22` 相等。它是否做到了呢？嗯：


    *   给定的 JD “生成”元组如下：


    ```

    x1  y12  y13

    x1  y22  y23

    x1  y12  y23

    x1  y22  y13

    ```


    *   这四个元组一起满足 JD，但不满足 FD；具体来说，它们并不要求 `y12` = `y22`。因此，该 FD 并非由该 JD 蕴含。


