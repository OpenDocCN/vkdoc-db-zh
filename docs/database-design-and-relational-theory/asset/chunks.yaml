    \n## The Database is a Logical System\n\nLet *D* be a database design and let\
    \ *DB* be a corresponding database value (i.e., a set of values for the relvars\
    \ mentioned in *D*). As we know, then, the tuples in the relations^([^(267)](#fn267))\
    \ in *DB* can be regarded as representing certain propositions, propositions that\
    \ are assumed by convention to be true ones. By way of example, let’s assume until\
    \ further notice that *D* is our usual design for suppliers and parts and *DB*\
    \ accordingly is our usual sample value (shown again for convenience in Figure\
    \ [B-1](#489629_2_En_19_Chapter.xhtml#Fig1)). Then all of the following are “true\
    \ facts”:\n\n*   *Supplier S1 is named Smith, has status 20, and is located in\
    \ city London.*\n\n*   *Part P1 is named Nut, has color Red and weight 12.0, and\
    \ is stored in city London.*\n\n*   *Supplier S1 supplies part P1 in quantity\
    \ 300.*\n\nAnd so on.\n\n![../images/489629_2_En_19_Chapter/489629_2_En_19_Fig1_HTML.jpg](images/489629_2_En_19_Chapter/489629_2_En_19_Fig1_HTML.jpg)\n\
    \nFigure B-1\n\nThe suppliers-and-parts database—sample value\n\nWhat I didn’t\
    \ mention previously, though, is that the integrity constraints that any given\
    \ database value is supposed to satisfy can be understood as propositions too\
    \ (again, propositions that are assumed to be true ones). For example, consider\
    \ the following expression, which might be used to represent the fact that there’s\
    \ a foreign key constraint between shipments (SP) and suppliers (S):\n\n```\n\
    SP { SNO } ⊆ S { SNO }\n```\n\n(“the projection of SP on SNO is a subset—not necessarily\
    \ a proper subset—of the projection of S on SNO”). The symbols SP and S are relvar\
    \ names, of course, but in logical terms they can be understood as *designators*\
    \ , where a designator is simply something that denotes, or designates, some specific\
    \ object. As far as the database value *DB* is concerned, of course, those particular\
    \ designators denote the current value of the suppliers relvar and the current\
    \ value of the shipments relvar, respectively, and the constraint becomes (paraphrasing):\n\
    \n*   *Every supplier number in the shipments relation also appears in the suppliers\
    \ relation.*\n\nAnd this latter statement is indeed a proposition. Thus, *DB*\
    \ overall (data plus constraints) can be regarded (a trifle loosely) as a collection\
    \ of propositions, propositions that are—to say it one more time—supposed to be\
    \ true ones.\n\nBut we can go further. The fact is, a database value like *DB*,\
    \ together with the operators that can be applied to the propositions in that\
    \ database, can be regarded as *a logical system*. That is, it’s a formal system—like\
    \ euclidean geometry, for example—that has *axioms* (“given truths”) and *rules\
    \ of inference* by which we can prove *theorems* (“derived truths”) from those\
    \ axioms. Indeed, it was Codd’s very great insight, when he first invented the\
    \ relational model back in 1969, that a database isn’t really just a collection\
    \ of *data* (despite the name); rather, it’s a collection of *facts*, or what\
    \ the logicians call true propositions. Those propositions are represented by\
    \ the tuples in the relations and the associated constraints, and they constitute\
    \ the axioms of the logical system under discussion. And the inference rules are\
    \ essentially the rules by which new propositions can be derived from those given\
    \ ones; in other words, they’re the rules that tell us how to apply the operators\
    \ of the relational algebra. So when the system evaluates some relational expression—in\
    \ particular, when it responds to some query—what it’s really doing is deriving\
    \ new truths from given ones; in effect, it’s proving a theorem!\n\nOnce we recognize\
    \ the truth of the foregoing, we see that the whole apparatus of formal logic\
    \ becomes available for use in attacking “the database problem.” In other words,\
    \ questions such as\n\n*   What should the data look like to the user?\n\n*  \
    \ What should the constraints look like?\n\n*   What should the query language\
    \ look like?\n\n*   How should results be presented to the user?\n\n*   How can\
    \ we best implement queries (or, more generally, evaluate database expressions)?\n\
    \n*   How should we design the database in the first place?\n\nall become, in\
    \ effect, questions in logic—i.e., questions that are susceptible to logical treatment\
    \ and can be given logical answers.\n\nOf course, it goes without saying that\
    \ the relational model supports the foregoing perception of what databases are\
    \ all about very directly—which is why, in my opinion, the relational model is\
    \ rock solid, and “right,” and will endure.\n\n## Proving that 1 = 0\n\nIn the\
    \ text quoted at the beginning of the appendix, I said this, more or less:\n\n\
    *   In a logical system with a contradiction, you can prove *anything*; for example,\
    \ you can prove that 1 = 0\\. In fact, you can *prove* that you can prove that\
    \ 1 = 0!\n\nAll right, so here’s the proof:\n\n*   Suppose the system in question\
    \ is such that it states, either implicitly or explicitly,^([^(268)](#fn268))\
    \ that both *p* and NOT *p* are true (there’s the contradiction), where *p* is\
    \ some proposition.\n\n*   Let *q* be an arbitrary proposition.\n\n*   From the\
    \ truth of *p*, we can infer the truth of *p* OR *q*.\n\n*   From the truth of\
    \ *p* OR *q* and the truth of NOT *p*, we can infer the truth of *q*.\n\n*   But\
    \ *q* was arbitrary!—it could, for example, be the proposition 1 = 0\\. QED.\n\
    \nIt follows more generally that *absolutely any proposition whatsoever* can be\
    \ shown to be “true” in an inconsistent system."
  trans: "# 关于一致性的更多论述\n\n> *你可以保持一致或不一致，但不应该在这两者之间来回摇摆。*\n> \n> —佚名，引自 Edsger W.\
    \ Dijkstra：\n> \n> *Selected Writings on Computing: A Personal Perspective* (1982)\n\
    \n以下内容节选自附录 A，并略有编辑：\n\n*   说数据库是*一致的*，意味着它符合所有规定的约束。现在，在形式意义上数据库始终保持一致是至关重要的；事实上，在某个特定时间不一致的数据库，就如同一个包含矛盾的逻辑系统。嗯，实际上，它恰恰就是一个包含矛盾的逻辑系统。而在一个包含矛盾的逻辑系统中，你可以证明*任何*东西；例如，你可以证明\
    \ 1 = 0。（事实上，你可以*证明*你能证明 1 = 0！）在数据库术语中，这意味着如果数据库在前述形式意义上曾出现不一致，那么你就永远无法信任查询得到的答案——它们可能是假的，也可能是真的，而你通常无法辨别它们属于哪种情况。换句话说，所有的保证都失效了。这就是为什么在形式意义上的一致性如此关键。这也解释了，与普遍看法相反，完整性检查必须总是即时的——也就是说，它必须在任何有可能违反所讨论完整性约束的更新操作结束时执行。换句话说，所谓的“延迟检查”，即推迟到相关事务结束时才进行完整性检查，违反了关系模型的原则；事实上，这是一个逻辑错误。\n\
    \n在重新审阅前一个附录时，我想到上述文本所包含的信息可以做一些阐述。我的意思是，它提出了各种问题——相当重要的问题——任何称职的数据库专业人员都理应能够回答，但似乎在文献中并未得到太多关注^(²⁶⁶)。因此，我想在这个附录中讨论这些问题（因此可以将其视为前一个附录的某种后记——如果你愿意，可以看作是附录的附录）。\n\
    \n## 数据库是一个逻辑系统\n\n令 *D* 为数据库设计，令 *DB* 为对应的数据库值（即，为 *D* 中提及的关系变量所赋的一组值）。那么我们知道，*DB*\
    \ 中关系^(²⁶⁷)中的元组可以被视为表示某些命题，这些命题按约定被假定为真命题。举例来说，在进一步说明之前，我们假设 *D* 是我们常用的供应商和零件设计，*DB*\
    \ 相应地是我们常用的样本值（为方便起见，再次展示在图 B-1 中）。那么，以下都是“真实事实”：\n\n*   *供应商 S1 名为 Smith，状态为\
    \ 20，位于城市 London。*\n\n*   *零件 P1 名为 Nut，颜色为 Red，重量为 12.0，存储于城市 London。*\n\n* \
    \  *供应商 S1 供应零件 P1，数量为 300。*\n\n等等。\n\n![../images/489629_2_En_19_Chapter/489629_2_En_19_Fig1_HTML.jpg](img/489629_2_En_19_Fig1_HTML.jpg)\n\
    \n图 B-1\n\n供应商-零件数据库——样本值\n\n然而，我先前没有提到的是，任何特定数据库值应满足的完整性约束也可以被理解为命题（同样，被假定为真命题）。例如，考虑以下表达式，它可能用于表示发货表\
    \ (`SP`) 和供应商表 (`S`) 之间存在外键约束这一事实：\n\n```\nSP { SNO } ⊆ S { SNO }\n```\n\n（“`SP`\
    \ 在 `SNO` 上的投影是 `S` 在 `SNO` 上的投影的子集——不一定是真子集”）。符号 `SP` 和 `S` 当然是关系变量名，但从逻辑上讲，它们可以被理解为*指示词*，其中指示词仅仅是表示或指定某个特定对象的东西。就数据库值\
    \ *DB* 而言，这些特定的指示词分别表示供应商关系变量的当前值和发货关系变量的当前值，于是该约束变为（转述）：\n\n*   *发货关系中的每一个供应商编号也出现在供应商关系中。*\n\
    \n而这后一个陈述确实是一个命题。因此，*DB* 整体（数据加约束）可以（略微宽松地）被视为一组命题，这些命题——再重申一次——被假定为真命题。\n\n但我们还可以更进一步。事实上，像\
    \ *DB* 这样的数据库值，连同可以应用于该数据库中命题的运算符，可以被视为*一个逻辑系统*。也就是说，它是一个形式系统——就像欧几里得几何一样——拥有*公理*（“给定的真理”）和*推理规则*，通过这些规则我们可以从公理中证明*定理*（“推导出的真理”）。确实，这正是\
    \ Codd 在 1969 年首次发明关系模型时的伟大洞见：数据库实际上并不只是*数据*的集合（尽管有此名称）；相反，它是*事实*的集合，或者逻辑学家所称的真命题。这些命题由关系中的元组和相关的约束表示，它们构成了所讨论逻辑系统的公理。而推理规则本质上是那些能够从给定命题推导出新命题的规则；换句话说，它们是告诉我们如何应用关系代数运算符的规则。因此，当系统评估某个关系表达式——特别是当它响应某个查询时——它实际上是在从给定的真理中推导出新的真理；实际上，它是在证明一个定理！\n\
    \n一旦我们认识到上述事实的真实性，我们就会看到形式逻辑的全部工具都可以用于解决“数据库问题”。换句话说，诸如以下的问题：\n\n*   数据在用户面前应该是什么样子的？\n\
    \n*   约束应该是什么样子的？\n\n*   查询语言应该是什么样子的？\n\n*   结果应该如何呈现给用户？\n\n*   我们如何才能最好地实现查询（或者更一般地，评估数据库表达式）？\n\
    \n*   我们首先应该如何设计数据库？\n\n实际上都变成了逻辑问题——即，易于进行逻辑处理并能够给出逻辑答案的问题。\n\n当然，不言而喻，关系模型非常直接地支持了上述对数据库本质的看法——这也就是为什么，在我看来，关系模型是坚如磐石、“正确”且将持久存在的。\n\
    \n## 证明 1 = 0\n\n在本附录开头引用的文本中，我大致说了这样一句话：\n\n*   在一个包含矛盾的逻辑系统中，你可以证明*任何*东西；例如，你可以证明\
    \ 1 = 0。事实上，你可以*证明*你能证明 1 = 0！\n\n好吧，那么证明如下：\n\n*   假设所讨论的系统是这样：它要么隐含地、要么明确地^(²⁶⁸)陈述了\
    \ *p* 和 `NOT` *p* 都为真（这就是矛盾所在），其中 *p* 是某个命题。\n\n*   令 *q* 为一个任意命题。\n\n*   从 *p*\
    \ 为真，我们可以推断出 *p* `OR` *q* 为真。\n\n*   从 *p* `OR` *q* 为真 和 `NOT` *p* 为真，我们可以推断出\
    \ *q* 为真。\n\n*   但 *q* 是任意的！——例如，它可以是命题 1 = 0。证毕。\n\n由此可以更普遍地推断出，在不一致的系统中，*绝对任何命题都可以被证明为“真”*。"
- fmt: '## Wrong Answers


    The foregoing argument should be sufficient to show the crucial importance of
    integrity constraints. To be specific, if the database is in violation of some
    constraint, then the logical system that’s the database is inconsistent—and (as
    we now know) we can get absolutely any answer at all from an inconsistent system.^([^(269)](#fn269))


    That said, however, the skeptic might still say “Really? I’m not convinced. Come
    on, show me a realistic example, not one of your abstract *p* and *q* arguments.”
    So let me see if I can rise to this challenge.


    I’ll start with a really simple example. Suppose the current value of the suppliers-and-parts
    database is such that (a) there’s at least one supplier; (b) there’s a constraint
    to the effect that there must always be at least one part; but in fact (c) right
    now there aren’t any parts at all (there’s the inconsistency). Now consider the
    relational calculus expression:^([^(270)](#fn270))


    ```

    S WHERE EXISTS P ( TRUE )

    ```


    Or if you prefer SQL:


    ```sql

    SELECT ∗

    FROM   S

    WHERE  EXISTS

    ( SELECT ∗

    FROM   P )

    ```


    Now, if either of these expressions is evaluated directly, the result will be
    empty, because the expression in the `WHERE` clause evaluates to `FALSE`. Alternatively,
    if the system (or the user, come to that) observes that there’s a constraint that
    says that `EXISTS P (TRUE)` must evaluate to `TRUE`—or, in SQL, that `SELECT ∗
    FROM P` must return a nonempty result—then that `WHERE` clause can be replaced
    by one saying simply `WHERE TRUE`, and the result will then be all suppliers.^([^(271)](#fn271))
    At least one of these answers must be wrong! In a sense, in fact, they’re both
    wrong; given an inconsistent database, there simply isn’t—there can’t be—any well
    defined notion of correctness, and any answer is as good (or bad) as any other.
    Indeed, this state of affairs should be self-evident: If I tell you some proposition
    *p* is both true and false, and then I ask you whether some proposition that relies
    on *p* in some way is true, there’s simply no right answer you can give me.


    In case you’re still not convinced, consider the following slightly more realistic
    SQL example:


    ```sql

    SELECT CASE

    WHEN EXISTS ( SELECT ∗ FROM P )

    THEN ( x )

    ELSE ( y )

    END AS Z

    FROM   S

    ```


    Under the same assumptions as before—i.e., at least one supplier but no parts,
    despite a constraint saying there should be a part—this expression will return
    either `x` or `y` (more precisely, it will return a table containing a row containing
    either `x` or `y`), depending, in effect, on whether or not the `EXISTS` invocation
    is replaced by just `TRUE`. Now consider that `x` and `y` can each be essentially
    anything at all ... For example, `x` might be the SQL expression `SELECT SUM (WEIGHT)
    FROM P` while `y` might be the literal `0.0`—in which case executing the query
    could easily lead to the erroneous conclusion that the total part weight is `null`
    instead of zero. (The total part weight should be zero, of course, if there are
    no parts. What makes the wrong answer particularly galling in this example is
    that the user has clearly gone out of his or her way to formulate the query in
    such a way as to obtain the logically correct answer, zero, if indeed there are
    no parts.)


    ## Generalizing the Argument


    One reviewer of an early version of this appendix, still not convinced, tried
    a different question. He asked, in effect, how we might express the query “Get
    the total shipment quantity, taken over all shipments” in such a way as to obtain
    some specific incorrect answer, say 5000, from a certain inconsistent database.
    Well, before I try to answer that question, let me try to generalize the argument
    as presented in the previous section.


    First of all, then, we know that a database value is, abstractly, a collection
    of propositions. Let `DBP` be the collection of propositions constituting database
    value `DB`. Let `LA` be the logical AND—i.e., the conjunction—of all of the propositions
    in `DBP`. Further, let some query against `DB` return a result `R`, where `R`
    is a relation that’s derived from the relations in `DB` by evaluating the relational
    expression representing the given query. Of course, `R` in turn can be understood
    as another collection of propositions `RP`; so we can say that “`LA` implies `RP`”
    is true, or in other words that the propositions in `RP` are a logical consequence
    of those in `LA`. But if `DB` is inconsistent (i.e., if `DBP` involves a contradiction),
    `LA` evaluates to `FALSE`—and the implication “`FALSE` implies `p`” evaluates
    to `TRUE` for all possible propositions `p`,^([^(272)](#fn272)) regardless of
    whether that proposition `p` is true or false in itself. If `DB` is inconsistent,
    therefore, we have no way (in general) of knowing whether the individual propositions
    in `RP` are true or false.


    Now I return to the reviewer’s question: How might we express the query “Get the
    total shipment quantity, taken over all shipments” in such a way as to obtain
    the answer 5000 from a certain inconsistent database? In fact I don’t think the
    way this question is stated makes very much sense. In **Tutorial D**, the obvious
    way of expressing the query as such (i.e., ignoring for the moment the requirement
    that it has to return the value 5000 against a certain inconsistent database)
    is as follows:


    ```

    EXTEND TABLE_DEE : { TOTQ := SUM ( SP , QTY } }

    ```


    Or if you prefer SQL:


    ```sql

    SELECT SUM ( QTY ) AS TOTQ

    FROM   SP

    ```


    Evaluating either of these expressions yields a result that looks like this:


    ![../images/489629_2_En_19_Chapter/489629_2_En_19_Figa_HTML.jpg](images/489629_2_En_19_Chapter/489629_2_En_19_Figa_HTML.jpg)


    The corresponding proposition is “The total shipment quantity `TOTQ`, taken over
    all shipments, is `x`.” Now, it doesn’t matter what the actual value of `x` is
    (it might or might not be 5000); what matters is that if the database is inconsistent,
    we have no way of knowing whether the corresponding proposition is true or false
    (i.e., whether `x` is the true total quantity). In other words, it’s not *how
    we write the query* that’s the point at issue—it’s *how we interpret the result*.
    More specifically, we can’t assume that the result we’ve been given is correct.
    As I said earlier, if the database is inconsistent, then all bets are off.^([^(273)](#fn273))'
