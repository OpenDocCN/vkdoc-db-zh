    ## 多值依赖（非正式）


    很早就认识到存在像 `CTX` 这样的“有问题的”BCNF 关系变量，并且当时至少直观上也认识到了处理它们的方法（参见练习 12.8）。然而，直到 1977
    年，法金（Fagin）引入了多值依赖（MVD）的概念，才将这些直观的想法置于坚实的理论基础之上。^(152)^ 让我详细说明一下。


    关系变量 `CTX` 受连接依赖 ☼{{`CNO`,`TNO`},{`CNO`,`XNO`}} 约束。然而，我们同样可以说它受以下*一对多值依赖*约束：


    ```

    { CNO } →→ { TNO }

    { CNO } →→ { XNO }

    ```


    *注：* 多值依赖 `X` →→ `Y` 可读作 "`X` 多值决定 `Y`" 或 "`Y` 多值依赖于 `X`"，或者更简单地读作 "`X` 双箭头 `Y`"。


    综合起来看，上述多值依赖直观上的含义是：一门课程不只有一位教师或只有一本教材（即函数依赖 {`CNO`} → {`TNO`} 和 {`CNO`} → {`XNO`}
    不成立）——但它确实有一个教师的*集合*和一个教材的*集合*（这两个集合都是非空的）。而且，对于一门给定的课程，教师集合和教材集合是彼此完全独立的。（正如我之前所说，无论谁实际教授某门课程的某个具体班次，使用的教材都是相同的。同样，对于某门课程，无论实际使用哪些教材，相同的教师都可以教授它。）因此，我们可以说：


    *   对于一门给定的课程 `c` 和一本给定的教材 `x`，与该 (`c`,`x`) 对关联的教师集合 `T` 仅依赖于 `c`——选择哪个特定的 `x`
    并没有影响。


    *   同样，对于一门给定的课程 `c` 和一位给定的教师 `t`，与该 (`c`,`t`) 对关联的教材集合 `X` 也仅依赖于 `c`——选择哪个特定的
    `t` 并没有影响。


    请注意，图 12-1 中显示的关系变量 `CTX` 的示例值确实遵循这两条规则。


    重申一下，关系变量 `CTX` 受*一对*多值依赖约束。事实上，一般来说，很容易证明（参见下一节），给定具有头`H`的关系变量`R`，以及`H`的子集`X`、`Y`和`Z`，使得`X`、`Y`和`Z`的并集等于`H`，那么多值依赖`X`
    →→ `Y`在`R`中成立当且仅当多值依赖`X` →→ `Z`也在`R`中成立。多值依赖总是以这种方式成对出现。因此，通常将它们写成“一行形式”，如下所示：


    ```

    X →→ Y | Z

    ```


    （"`X` 双箭头 `Y` 竖线 `Z`"）。以关系变量 `CTX` 为例，我们有：


    ```

    { CNO } →→ { TNO } | { XNO }

    ```


    现在，我们可以说，*非常*不严格地说，一个 MVD 类似于一个 FD，只不过它不是“对于其中一个，有一个对应的那个”，而是“对于其中一个，有一个对应的那个的*集合*”（正是这种非正式的描述使得
    MVD 比一般的 JD 更容易理解一些）。但成对出现这一点很重要（请注意，FD 没有类似的情况）。事实上，如果 MVD 概念定义得*过于*不精确——就像我刚才做的那样！——可能会错误地得出结论：对于相关关系变量头的*每一对*子集`X`和`Y`，都存在一个从`X`到`Y`的
    MVD。例如，在发货关系变量`SP`中，对于每个供应商号肯定有一个数量的集合，但多值依赖 {`SNO`} →→ {`QTY`} *并不*成立——事实并非对于一个给定的供应商号`s`和给定的零件号`p`，与该(`s`,`p`)对关联的数量集合`Q`仅依赖于`s`。


    ## 多值依赖（形式化）


    本节的定义与前面章节中为 FD 和 JD 给出的定义类似，因此不作过多进一步说明。


    *   **定义（多值依赖）：** 令 `H` 为一个头；那么，关于 `H` 的一个多值依赖（MVD）是一个形式为 `X` →→ `Y` 的表达式，其中 `X`（决定因素）和
    `Y`（被决定因素）都是 `H` 的子集。短语 *关于 H 的 MVD* 可简写为 *MVD*，如果 `H` 是已知的。


    请注意，与 FD 和 JD 一样，MVD 是针对某个头定义的，而不是针对某个关系或某个关系变量定义的。还要注意，从形式上看（同样与 FD 和 JD 一样），MVD
    只是表达式——这些表达式在针对某个特定关系进行解释时，会成为命题，根据定义，这些命题的取值要么为真（TRUE），要么为假（FALSE）。


    *   **定义（满足或违反 MVD）：** 令关系 `r` 的头为 `H`；令 `X` →→ `Y` 是一个关于 `H` 的 MVD，记为 `M`；令 `Z`
    为 `H` 中既不包含在 `X` 中也不包含在 `Y` 中的属性。（换句话说，(a) `Z` 是 `X` 和 `Y` 的并集关于 `H` 的补集，因此 (b)
    `X`、`Y` 和 `Z` 的并集等于 `H`。）如果 `r` 满足连接依赖 ☼{*XY*, *XZ*}，那么 `r` 满足 `M`；否则 `r` 违反 `M`。


    请注意，上述定义在 `Y` 和 `Z` 上是对称的，因此可以得出：`r` 满足多值依赖 `X` →→ `Y` 当且仅当它满足多值依赖 `X` →→ `Z`（因此，如前一节所述，我们可以将它们写成“一行形式”）。


    *   **定义（MVD 成立）：** 多值依赖 `M` 在关系变量 `R` 中成立（等价地，关系变量 `R` 受多值依赖 `M` 约束）当且仅当每一个可能被赋给关系变量
    `R` 的关系都满足 `M`。在关系变量 `R` 中成立的多值依赖就是 `R` 的多值依赖。


    从这个定义和前一个定义可以得出，`R` 受多值依赖 `X` →→ `Y` 约束当且仅当它受多值依赖 `X` →→ `Z` 约束。


    *   **法金定理：**^(153)^ 关系变量 `R` 可以无损分解为其在 `XY` 和 `XZ` 上的投影，当且仅当多值依赖 `X` →→ `Y` |
    `Z` 在 `R` 中成立。


    法金定理是我在第 5 章承诺过的“希斯定理的更强形式”。也就是说，希斯定理只给出了一个关系变量可无损分解为两个投影的充分条件，而法金定理给出了充要条件。当然，考虑到我们现在对一般
    JD 的了解，法金定理是“显而易见的”；事后看来，如果首先定义并妥善研究了一般 JD，就根本没有必要形式化地定义 MVD 了。但法金定理是在一般 JD 得到妥善研究之前被证明的，在当时是一个新的重要成果；而且，它至今仍有实际意义，因为
    MVD 确实对应于一种相当常见的业务规则，而对于第 9 和 10 章讨论的* n* > 2 的“循环” *n-* 路 JD，情况可能并非如此。

