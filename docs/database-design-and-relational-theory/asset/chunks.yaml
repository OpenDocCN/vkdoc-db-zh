    \   [19](#489629_2_En_6_Chapter.xhtml#Fn19_source)\n\n# 7. FD Axiomatization\n\
    \n> *[The] true and solid living axioms*\n> \n> —Francis Bacon: *The New Organon*\
    \ (1620)\n\nI’ve touched on the point several times already that some FDs imply\
    \ others; now it’s time to get more specific. First of all, however, I need to\
    \ introduce some notation—notation that (a) reduces the number of keystrokes required\
    \ in formal proofs and the like and (b) can also help, sometimes, to see the forest\
    \ as well as the trees, as it were.\n\nAs you might recall, Heath’s Theorem as\
    \ I stated it in Chapter [5](#489629_2_En_5_Chapter.xhtml) included the following\
    \ sentence: *Let XY denote the union of X and Y, and similarly for XZ.* The notation\
    \ I want to introduce is basically just an extension of this simple idea (it’s\
    \ a trifle illogical, but it’s very convenient). To be specific, the notation\
    \ uses expressions of the form *XY* to mean:\n\n*   The union of {*X*} and {*Y*},\
    \ if *X* and *Y* are individual attribute names\n\n*   The union of *X* and *Y*,\
    \ if *X* and *Y* are sets of attribute names\n\n*   The union of {*X*} and *Y*,\
    \ if *X* is an individual attribute name and *Y* denotes a set of such names (or\
    \ the union of *X* and {*Y*}, if the roles of *X* and *Y* are reversed)\n\nIt\
    \ also allows {*X*} to be abbreviated to just *X* (e.g., in an FD) if *X* denotes\
    \ an individual attribute. *Note:* For convenience, I’ll refer to this notation\
    \ from this point forward as *Heath notation* (though I must make it clear that\
    \ Heath himself didn’t actually use it in his paper)."
  trans: "\n# 答案\n\n## 1.\n\n```\nCONSTRAINT ... WITH ( SJT := JOIN { TJ , TS } )\
    \ :\nCOUNT ( SJT ) = COUNT ( SJT { S , J } ) ;\n```\n\n或者，使用第 4 章练习 4.8 答案中描述的约束替代风格：\n\
    \n1.  设 `LT` 和 `CT` 分别是 `RX2A′` 在 `{CLASS,STATUS}` 和 `{CITY,STATUS}` 上的投影。那么 (a)\
    \ `{CLASS}` 和 `{CITY}` 将成为 `RX2B′` 中的外键，分别引用 `LT` 和 `CT`，并且 (b) 以下多关系变量约束也将成立：\n\
    \n```\nCONSTRAINT ... WITH (\n    LTX := LT RENAME { STATUS AS X } ,\n    CTY\
    \ := CT RENAME { STATUS AS Y }\n) :\nAND ( JOIN { RX2B′ , LTX , CTY } , X = Y\
    \ ) ;\n```\n\n## 2.\n\n给定的第一个 FD `{STREET,CITY,STATE} → {ZIP}` 意味着 `{STREET,CITY,STATE}`\
    \ 是一个键；第二个 FD 意味着该关系变量不符合 BCNF。然而，如果我们使用 Heath 定理基于函数依赖 `{ZIP} → {CITY,STATE}`\
    \ 将其分解为 BCNF 投影，如下所示：\n\n```\nZCT { ZIP , CITY , STATE }\nKEY { ZIP }\n\nZR  {\
    \ ZIP , STREET }\nKEY { ZIP , STREET }\n```\n\n——那么我们就丢失了 FD `{STREET,CITY,STATE}\
    \ → {ZIP}`。结果是，关系变量 `ZCT` 和 `ZR` 不能被独立更新。（*补充练习：* 为 `ZCT` 和 `ZR` 开发一些示例值来说明这一点。）当然，如果我们不执行此分解，就会存在一些冗余；具体来说，一个给定的邮政编码对应特定城市和州的事实会出现多次。但这种冗余会导致问题吗？考虑到一个给定城市和州的邮政编码不经常变化，答案是“可能，但不经常”。（另一方面，邮政编码*从不*改变的说法并不正确。）\n\
    \n## 3.\n\n以下是 `RX1` 的一个不可约覆盖：\n\n```\n{ SNO , PNO } → { QTY }\n{ SNO }      \
    \ → { CITY }\n{ CITY }      → { STATUS }\n```\n\n3NF 过程产生 `{SNO,PNO,QTY}`、`{SNO,CITY}`\
    \ 和 `{CITY,STATUS}`。\n\n接下来是 `RX3`。一个不可约覆盖：\n\n```\n{ SNO }   → { CLASS }\n{ CLASS\
    \ } → { CITY }\n{ CITY }  → { STATUS }\n```\n\n3NF 过程产生 `{SNO,CLASS}`、`{CLASS,CITY}`\
    \ 和 `{CITY,STATUS}`。\n\n最后是 `RX2`。不可约覆盖：\n\n```\n{ SNO }   → { CLASS }\n{ SNO\
    \ }   → { CITY }\n{ CLASS } → { STATUS }\n{ CITY }  → { STATUS }\n```\n\n3NF 过程产生\
    \ `{SNO,CLASS,CITY}`、`{CLASS,STATUS}` 和 `{CITY,STATUS}`。这个例子有趣的地方在于（正如正文中所示），如果我们基于\
    \ FD `{SNO} → {CLASS,CITY}` 进行分解，我们得到的是 `{SNO,CLASS,CITY}` 和 `{CLASS,CITY,STATUS}`\
    \ 作为 3NF 投影头，而这*并非* 3NF 过程的结果。实际上，3NF 过程的结果需要维护以下相当复杂的多关系变量约束（一个相等依赖）：\n\n```\n\
    CONSTRAINT ... JOIN { TJ , TS } KEY { S , J } ;\n```\n\n```\nCONSTRAINT ... JOIN\
    \ { SLC , LT } = JOIN { SLC , CT } ;\n```\n\n（“对于给定的供应商，班级状态 = 城市状态”；这里的 `SLC`、`LT`\
    \ 和 `CT` 分别表示 `RX2` 在 `{SNO,CLASS,CITY}`、`{CLASS,STATUS}` 和 `{CITY,STATUS}` 上的投影）。这个例子说明了一点：尽管\
    \ 3NF 过程保证产生 3NF 投影并且不会丢失任何 FD，但它可能不应该被过于盲目地遵循。\n\n*注意：* 假设我们分别命名关系变量 `LT` 和 `CT`\
    \ 中的状态属性，如下所示：\n\n```\nLT { CLASS , CLASS_STATUS }\nCT { CITY , CITY_STATUS }\n\
    ```\n\n那么，对于任何给定的供应商，两个状态值必须相等的约束可以这样表述：\n\n```\nCONSTRAINT ... IS_EMPTY (\n \
    \   ( JOIN { SLC , LT , CT } )\n    WHERE CLASS_STATUS ≠ CITY_STATUS\n) ;\n```\n\
    \n（**Tutorial D** 表达式 `IS_EMPTY (rx)` 在由关系表达式 `rx` 表示的关系 `r` 为空时返回 `TRUE`，否则返回\
    \ `FALSE`。）或者：\n\n```\nCONSTRAINT ...\nAND ( JOIN { SLC , LT , CT } , CLASS_STATUS\
    \ = CITY_STATUS ) ;\n```\n\n这个例子的整体信息可以这样表述：在特定设计中丢失或保留 FD 的整个问题，实际上只是一个更普遍现象的特例：即，如果我们从某个设计\
    \ *D1* 开始，并将其映射到某个逻辑等价的设计 *D2*，那么通常该过程将涉及约束以及关系变量的某些重构，这（事实上）必然是显而易见的。\n\n## 4.\n\
    \n*假设：* 没有明星在同一部电影中扮演超过一个角色；没有电影有超过一个导演。（这些假设合理吗？）FDs：\n\n```\n{ S , M } → { R\
    \ }\n{ M }     → { D , Y }\n{ S }     → { B }\n{ B }     → { Z , C }\n{ Z , C\
    \ } → { H }\n```\n\n如果所有九个属性都组合在一个关系变量中，则该关系变量仅符合 1NF（`{S,M}` 是一个键）。BCNF 过程产生\
    \ `{S,M,R}`、`{M,D,Y}`、`{S,B}`、`{B,Z,C}` 和 `{Z,C,H}`。没有丢失任何 FD。\n\n# 7. FD 公理化\n\
    \n> *[那]真实而坚实的活的公理*\n> \n> ——弗朗西斯·培根：《新工具》（1620）\n\n我已经多次提到一点，即一些 FD 蕴含另一些；现在是时候更具体地说明了。然而，首先我需要介绍一些符号——这种符号（a）减少了形式化证明等所需的击键次数，并且（b）有时也能帮助人们“见林也见木”。\n\
    \n正如你可能记得的，我在第 5 章中陈述的 Heath 定理包含了以下句子：*令 XY 表示 X 和 Y 的并集，XZ 同理。* 我想介绍的符号基本上只是这个简单想法的扩展（它有点不合逻辑，但非常方便）。具体来说，该符号使用形式为\
    \ *XY* 的表达式来表示：\n\n*   如果 *X* 和 *Y* 是单个属性名，则表示 {*X*} 和 {*Y*} 的并集\n*   如果 *X* 和\
    \ *Y* 是属性名集合，则表示 *X* 和 *Y* 的并集\n*   如果 *X* 是单个属性名而 *Y* 表示这样一个名称的集合（或者如果 *X* 和\
    \ *Y* 的角色互换），则表示 {*X*} 和 *Y* 的并集（或 *X* 和 {*Y*} 的并集）\n\n如果 *X* 表示单个属性，它还允许将 {*X*}\
    \ 缩写为 *X*（例如，在 FD 中）。*注意：* 为方便起见，我将从此刻起将此符号称为 *Heath 符号*（尽管必须澄清的是，Heath 本人在他的论文中并未实际使用它）。\n"
- fmt: "# Armstrong’s Axioms\n\n## 基本概念与规则\n\n我们已经看到，从形式上讲，一个函数依赖（FD）就是一个表达式：具体来说，是\
    \ `X` → `Y` 形式的表达式，其中 `X` 和 `Y` 是集合（实际上是属性名的集合，但从形式角度看，集合由什么组成并不重要）。现在，假设我们给定某个\
    \ FD 集合（比如 `F`）。那么，我们可以应用某些正式的 *推理规则*，从 `F` 中的 FD 推导出进一步的 FD——这些 FD 是 `F` 中 FD\
    \ 所 *蕴含* 的，意思是，如果 `F` 中的 FD 在某个给定的关系变量中成立，那么推导出的 FD 在该关系变量中也成立。这些规则最早由 Armstrong\
    \ 在 1974 年提出，因此通常被称为 *Armstrong 推理规则* 或（更常见地） *Armstrong 公理*。它们可以用多种等价的方式表述，以下是最简单的一种：\n\
    \n1.  **自反性：** 如果 `Y` 是 `X` 的子集（即 `Y` ⊆ `X`），则 `X` → `Y`。\n2.  **增广性：** 如果 `X`\
    \ → `Y`，则 `XZ` → `YZ`。\n3.  **传递性：** 如果 `X` → `Y` 且 `Y` → `Z`，则 `X` → `Z`。\n\n\
    观察到，鉴于 FD 的预期解释，这些规则在直觉上是合理的。也就是说，既然我们知道 FD “意味着”什么，我们很容易看出，例如，如果 FD `X` → `Y`\
    \ 和 `Y` → `Z` 都在关系变量 `R` 中成立，那么 FD `X` → `Z` 也必然在该关系变量中成立。（供应商关系变量 `S` 说明了这条特定的规则——FD\
    \ `{SNO}` → `{CITY}` 和 `{CITY}` → `{STATUS}` 都在该关系变量中成立，因此 FD `{SNO}` → `{STATUS}`\
    \ 也成立。）\n\n所以这些规则是合理的。但更重要的是，它们既是 *可靠* 的，又是 *完备* 的。可靠性和完备性是在形式系统中经常遇到的概念。在当前考虑的具体形式系统中，它们的含义如下：\n\
    \n*   **完备性：** 如果一个 FD `f` 被给定集合 `F` 中的 FD 所蕴含，那么它可以使用这些规则从 `F` 中的 FD 推导出来。（重申一下，说某个\
    \ FD `f` 被某个集合 `F` 中的 FD 所蕴含，意思是如果 `F` 中的 FD 成立，则 `f` 也成立。）\n*   **可靠性：** 如果一个\
    \ FD `f` 未被给定集合 `F` 中的 FD 所蕴含，那么它不能使用这些规则从 `F` 中的 FD 推导出来。^([^(98)](#fn98))\n\n\
    因此，这些规则构成了所谓的 FD 的 *公理化*。其结果是，它们可以用来推导出任何给定 FD 集合 `F` 的所谓 *闭包 `F+`*。定义如下：\n\n\
    *   **定义（FD 集合的闭包）：** 设 `F` 是一个 FD 集合。则 `F` 的闭包 `F+` 是所有被 `F` 中 FD 所蕴含的 FD 的集合。\n\
    \n更重要的是，这个推导过程可以 *机械化*；也就是说，Armstrong 规则可以被纳入（例如）一个设计工具中，该工具给定某个关系变量 `R` 中成立的\
    \ FD 集合 `F`，将能够计算该集合 `F` 的闭包 `F+`，换句话说，就是计算在该关系变量中成立的所有 FD 的完整集合。这种情况的重要性应该不言而喻。\n\
    \n## 附加规则\n\n可以从最初的三条规则推导出若干附加的推理规则，其中包括以下几条。这些附加规则可以用来简化从 `F` 计算 `F+` 的实际任务。以下是一些例子：\n\
    \n1.  **自确定：** `X` → `X`。\n2.  **合并：** 如果 `X` → `Y` 且 `X` → `Z`，则 `X` → `YZ`。\n\
    3.  **复合：** 如果 `X` → `Y` 且 `Z` → `W`，则 `XZ` → `YW`。\n4.  **分解：^([^(99)](#fn99))**\
    \ 如果 `X` → `YZ`，则 `X` → `Y` 且 `X` → `Z`。\n\n在下一节中，我将展示如何从最初的三条规则推导出这四条规则。不过，首先让我给出几个例子，说明这些规则（包括原始规则和附加规则）在实际中如何使用。作为第一个例子，假设我们给定一个关系变量\
    \ `R`，其属性为 `A`、`B`、`C`、`D`、`E`、`F`，并被告知以下 FD 在该关系变量中成立：\n\n```\nA  → BC\nB  →\
    \ E\nCD → EF\n```\n\n我现在来证明 FD `AD` → `F` 也在 `R` 中成立（我认为你会同意，这个事实并非显而易见）。^([^(100)](#fn100))\
    \ 证明如下：\n\n1.  `A` → `BC`   （给定）\n2.  `A` → `C`   （由 1，分解）\n3.  `AD` → `CD`  \
    \ （由 2，增广）\n4.  `CD` → `EF`   （给定）\n5.  `AD` → `EF`   （由 3 和 4，传递）\n6.  `AD` →\
    \ `F`   （由 5，分解）\n\n对于第二个例子，回顾第 6 章中关于 *不可约覆盖* 的概念。提醒一下：(a) 对于给定的 FD 集合 `F`，一个覆盖是一个\
    \ FD 集合 `C`，使得 `F` 中的每一个 FD 都被 `C` 中的 FD 所蕴含；(b) 当且仅当覆盖 `C` 具有以下所有属性时，它才是不可约的：\n\
    \n1.  **单属性依赖体：** `C` 中的每个 FD 的右侧只有一个属性。\n2.  **不可约决定因素：** 从 `C` 中任何 FD 的左侧删除任何属性，都会导致\
    \ `C` 不再是 `F` 的覆盖。\n3.  **无冗余 FD：** 从 `C` 中删除任何 FD，都会导致 `C` 不再是 `F` 的覆盖。\n\n在上一章中，我（默认地）假设每个\
    \ FD 集合 `F` 都有一个不可约覆盖。事实上，这很容易理解：\n\n*   由于分解规则，我们可以不失一般性地假设 `F` 中的每个 FD 的右侧都是单属性。\n\
    *   接下来，对于 `F` 中的每个 FD，检查其左侧的每个属性 `A`；如果从该左侧删除 `A` 对闭包 `F+` 没有影响，则从该左侧删除 `A`。\n\
    *   对于 `F` 中剩下的每个 FD，如果从 `F` 中删除该 FD 对闭包 `F+` 没有影响，则从 `F` 中删除该 FD。\n\n`F` 的最终版本是不可约的，并且是原始版本的覆盖。\n\
    \n下面是一个具体的例子，说明实际找到一个不可约覆盖的过程。设给定的 FD 集合（都假设在某个具有属性 `A`、`B`、`C`、`D` 的关系变量 `R`\
    \ 中成立）如下：\n\n```\nA  → BC\nB  → C\nA  → B\nAB → C\nAC → D\n```\n\n那么，以下步骤将为这个给定集合生成一个不可约覆盖：\n\
    \n1.  首先，重写这些 FD，使得每个的右侧都是单属性：\n\n    ```\n    A  → B\n    A  → C\n    B  → C\n\
    \    A  → B\n    AB → C\n    AC → D\n    ```\n\n    现在观察到 FD `A` → `B` 出现了两次，因此可以删除一次出现。\n\
    2.  可以从 FD `AC` → `D` 的左侧删除属性 `C`，因为我们有 `A` → `C`，所以通过增广有 `A` → `AC`，又给定 `AC`\
    \ → `D`，所以通过传递性有 `A` → `D`；因此 `AC` → `D` 左侧的 `C` 是冗余的。\n3.  FD `AB` → `C` 可以删除，因为我们又有\
    \ `A` → `C`，所以通过增广有 `AB` → `CB`，再通过分解有 `AB` → `C`。\n4.  FD `A` → `C` 被 FD `A`\
    \ → `B` 和 `B` → `C` 一起蕴含，因此可以删除。\n\n最后我们得到：\n\n```\nA → B\nB → C\nA → D\n```\n\
    \n这个集合是不可约的。\n\n## 证明附加规则\n\n如前所述，在本节中，我展示如何从原始的规则 1-3 推导出规则 4-7。\n\n1.  **自确定：**\
    \ `X` → `X`。\n    **证明：** 由自反性立即可得。\n2.  **合并：** 如果 `X` → `Y` 且 `X` → `Z`，则 `X`\
    \ → `YZ`。\n    **证明：** `X` → `Y`（给定），故由增广得 `X` → `XY`；又 `X` → `Z`（给定），故由增广得 `XY`\
    \ → `YZ`；故由传递性得 `X` → `YZ`。\n3.  **复合：** 如果 `X` → `Y` 且 `Z` → `W`，则 `XZ` → `YW`。\n\
    \    **证明：** `X` → `Y`（给定），故由增广得 `XZ` → `YZ`；同样，`Z` → `W`（给定），故由增广得 `YZ` → `YW`；故由传递性得\
    \ `XZ` → `YW`。\n4.  **分解：** 如果 `X` → `YZ`，则 `X` → `Y` 且 `X` → `Z`。\n    **证明：**\
    \ `X` → `YZ`（给定）且 `YZ` → `Y` 由自反性得；故由传递性得 `X` → `Y`（同理可得 `X` → `Z`）。"
  raw: "## Armstrong’s Axioms\n\nWe’ve seen that, formally speaking, an FD is just\
    \ an expression: to be specific, an expression of the form *X* → *Y*, where *X*\
    \ and *Y* are sets (actually sets of attribute names, but from a formal point\
    \ of view it really doesn’t matter what the sets consist of). Now, suppose we’re\
    \ given some set (*F*, say) of FDs. Then we can apply certain formal *rules of\
    \ inference* to derive further FDs from the ones in *F*—FDs that are *implied*\
    \ by the ones in *F*, meaning that if the ones in *F* hold in some given relvar,\
    \ then the derived ones hold in that relvar too. The rules in question were first\
    \ stated by Armstrong in 1974 and for that reason are usually referred to as *Armstrong’s\
    \ inference rules* or (more commonly) as *Armstrong’s axioms* . They can be stated\
    \ in a variety of equivalent ways, of which the following is perhaps the simplest:\n\
    \n1.  *Reflexivity:* If *Y* is a subset of *X* (i.e., *Y* ⊆ *X*), then *X* → *Y*.\n\
    \n2.  *Augmentation:* If *X* → *Y*, then *XZ* → *YZ*.\n\n3.  *Transitivity:* If\
    \ *X* → *Y* and *Y* → *Z*, then *X* → *Z*.\n\nObserve that these rules are intuitively\
    \ reasonable, given the intended interpretation of FDs. That is, since we know\
    \ what FDs “mean,” we can easily see that, e.g., if the FDs *X* → *Y* and *Y*\
    \ → *Z* both hold in relvar *R*, then the FD *X* → *Z* must do so too. (The suppliers\
    \ relvar S illustrates this particular rule—the FDs {SNO} → {CITY} and {CITY}\
    \ → {STATUS} both hold in that relvar, and therefore the FD {SNO} → {STATUS} does\
    \ so, too.)\n\nSo the rules are reasonable. But what’s more important is that\
    \ they’re both *sound* and *complete*. Soundness and completeness are concepts\
    \ frequently encountered in connection with formal systems in general. In the\
    \ particular formal system under consideration here, this is what they mean:\n\
    \n*   *Completeness:* If an FD *f* is implied by the ones in the given set *F*,\
    \ then it can be derived from the ones in *F* by means of the rules. (To repeat,\
    \ to say that some FD *f* is implied by the FDs in some set *F* is to say that\
    \ if the FDs in *F* hold, then *f* holds too.)\n\n*   *Soundness:* If an FD *f*\
    \ isn’t implied by the ones in the given set *F*, then it can’t be derived from\
    \ the ones in *F* by means of the rules.^([^(98)](#fn98))\n\nThe rules thus form\
    \ what’s called an *axiomatization* for FDs. As a consequence, they can be used\
    \ to derive what’s called the *closure F*^(*+*)of any given set *F* of FDs. Here’s\
    \ a definition:\n\n*   **Definition (closure of a** **set of FDs)** **:** Let\
    \ *F* be a set of FDs. Then the closure *F*^(*+*) of *F* is the set of all FDs\
    \ implied by those in *F*.\n\nWhat’s more, the derivation process can be *mechanized*;\
    \ that is, Armstrong’s rules can be incorporated into (e.g.) a design tool that,\
    \ given a set *F* of FDs that hold in some relvar *R*, will be able to compute\
    \ the closure *F*^(*+*) of that set *F*, or in other words the complete set of\
    \ all FDs that hold in that relvar. The significance of this state of affairs\
    \ should be obvious.\n\n## Additional Rules\n\nSeveral additional inference rules\
    \ can be derived from the original three, the following among them. Such additional\
    \ rules can be used to simplify the practical task of computing *F*^(*+*) from\
    \ *F*. Here are some examples:\n\n1.  *Self determination: X* → *X*.\n\n2.  *Union:*\
    \ If *X* → *Y* and *X* → *Z*, then *X* → *YZ*.\n\n3.  *Composition:* If *X* →\
    \ *Y* and *Z* → *W*, then *XZ* → *YW*.\n\n4.  *Decomposition*:^([^(99)](#fn99))\
    \ If *X* → *YZ*, then *X* → *Y* and *X* → *Z*.\n\nIn the next section, I’ll show\
    \ how these four rules can be derived from the original three. First, however,\
    \ let me give a couple of examples to show how the rules (both original and additional\
    \ ones) can be used in practice. By way of a first example, suppose we’re given\
    \ a relvar *R* with attributes *A*, *B*, *C*, *D*, *E*, *F*, and we’re told the\
    \ following FDs hold in that relvar:\n\n```\nA  → BC\nB  → E\nCD → EF\n```\n\n\
    I’ll now show the FD *AD* → *F* also holds in *R* (a fact that, I think you’ll\
    \ agree, isn’t immediately obvious).^([^(100)](#fn100)) Here’s the proof:\n\n\
    1.  *A* → *BC*   (given)\n\n2.  *A* → *C*   (1, decomposition)\n\n3.  *AD* → *CD*   (2,\
    \ augmentation)\n\n4.  *CD* → *EF*   (given)\n\n5.  *AD* → *EF*   (3 and 4, transitivity)\n\
    \n6.  *AD* → *F*   (5, decomposition)\n\nFor a second example, recall from Chapter\
    \ [6](#489629_2_En_6_Chapter.xhtml) the notion of an *irreducible cover*. Just\
    \ to remind you, (a) a cover for a given set *F* of FDs is a set *C* of FDs such\
    \ that every FD in *F* is implied by those in *C*, and (b) that cover *C* is irreducible\
    \ if and only if it possesses all of the following properties:\n\n1.  *Singleton\
    \ dependant:* Every FD in *C* has just one attribute on the right side.\n\n2.\
    \  *Irreducible determinant:* No attribute can be discarded from the left side\
    \ of any FD in *C* without losing the property that *C* is a cover for *F*.\n\n\
    3.  *No redundant FDs:* No FD can be discarded from *C* without losing the property\
    \ that *C* is a cover for *F*.\n\nNow, I assumed in the previous chapter (tacitly)\
    \ that every set *F* of FDs had an irreducible cover. In fact, this is easy to\
    \ see:\n\n*   Thanks to the decomposition rule, we can assume without loss of\
    \ generality that every FD in *F* has a singleton right side.\n\n*   Next, for\
    \ each FD in *F*, examine each attribute *A* on the left side; if deleting *A*\
    \ from that left side has no effect on the closure *F*^(*+*), delete *A* from\
    \ that left side.\n\n*   For each FD remaining in *F*, if deleting that FD from\
    \ *F* has no effect on the closure *F*^(*+*), delete that FD from *F*.\n\nThe\
    \ final version of *F* is irreducible and is a cover for the original version.\n\
    \nHere then is a concrete example to illustrate the process of actually finding\
    \ an irreducible cover. Let the given set of FDs (all of which presumably hold\
    \ in some relvar *R* with attributes *A*, *B*, *C*, *D*) be as follows:\n\n```\n\
    A  → BC\nB  → C\nA  → B\nAB → C\nAC → D\n```\n\nThen the following procedure will\
    \ produce an irreducible cover for this given set:\n\n1.  First, rewrite the FDs\
    \ such that each has a singleton right side:\n\n    ```\n    A  → B\n    A  →\
    \ C\n    B  → C\n    A  → B\n    AB → C\n    AC → D\n    ```\n\n    Observe now\
    \ that the FD *A* → *B* occurs twice, so one occurrence can be dropped.\n\n2.\
    \  Attribute *C* can be dropped from the left side of the FD *AC* → *D*, because\
    \ we have *A* → *C*, so *A* → *AC* by augmentation, and we’re given *AC* → *D*,\
    \ so *A* → *D* by transitivity; so the *C* on the left side of *AC* → *D* is redundant.\n\
    \n3.  The FD *AB* → *C* can be dropped, because again we have *A* → *C*, so *AB*\
    \ → *CB* by augmentation, so *AB* → *C* by decomposition.\n\n4.  The FD *A* →\
    \ *C* is implied by the FDs *A* → *B* and *B* → *C* taken together, so it can\
    \ be dropped.\n\nWe’re left with:\n\n```\nA → B\nB → C\nA → D\n```\n\nThis set\
    \ is irreducible.\n\n## Proving the Additional Rules\n\nAs promised, in this section\
    \ I show how to derive Rules 4-7 from the original Rules 1-3.\n\n1.  *Self determination:*\
    \ *X* → *X*.\n\n    **Proof:** Immediate by reflexivity.\n\n2.  *Union* *:* If\
    \ *X* → *Y* and *X* → *Z*, then *X* → *YZ*.\n\n    **Proof:** *X* → *Y* (given),\
    \ hence *X* → *XY* by augmentation; also *X* → *Z* (given), hence *XY* → *YZ*\
    \ by augmentation; hence *X* → *YZ* by transitivity.\n\n3.  *Composition:* If\
    \ *X* → *Y* and *Z* → *W*, then *XZ* → *YW*.\n\n    **Proof:** *X* → *Y* (given),\
    \ hence *XZ* → *YZ* by augmentation; likewise, *Z* → *W* (given), hence *YZ* →\
    \ *YW* by augmentation; hence *XZ* → *YW* by transitivity.\n\n4.  *Decomposition:*\
    \ If *X* → *YZ*, then *X* → *Y* and *X* → *Z*.\n\n    **Proof:** *X* → *YZ* (given)\
    \ and *YZ* → *Y* by reflexivity; hence *X* → *Y* by transitivity (and likewise\
    \ for *X* → *Z*)."
  trans: "\n# 阿姆斯特朗公理\n\n## 基本概念与规则\n\n我们已经看到，从形式上讲，一个函数依赖（FD）就是一个表达式：具体来说，是 `X` →\
    \ `Y` 形式的表达式，其中 `X` 和 `Y` 是集合（实际上是属性名的集合，但从形式角度看，集合由什么组成并不重要）。现在，假设我们给定某个 FD 集合（比如\
    \ `F`）。那么，我们可以应用某些正式的 *推理规则*，从 `F` 中的 FD 推导出进一步的 FD——这些 FD 是 `F` 中 FD 所 *蕴含* 的，意思是，如果\
    \ `F` 中的 FD 在某个给定的关系变量中成立，那么推导出的 FD 在该关系变量中也成立。这些规则最早由阿姆斯特朗在 1974 年提出，因此通常被称为\
    \ *阿姆斯特朗推理规则* 或（更常见地） *阿姆斯特朗公理*。它们可以用多种等价的方式表述，以下是最简单的一种：\n\n1.  **自反性：** 如果 `Y`\
    \ 是 `X` 的子集（即 `Y` ⊆ `X`），则 `X` → `Y`。\n2.  **增广性：** 如果 `X` → `Y`，则 `XZ` → `YZ`。\n\
    3.  **传递性：** 如果 `X` → `Y` 且 `Y` → `Z`，则 `X` → `Z`。\n\n观察到，鉴于 FD 的预期解释，这些规则在直觉上是合理的。也就是说，既然我们知道\
    \ FD “意味着”什么，我们很容易看出，例如，如果 FD `X` → `Y` 和 `Y` → `Z` 都在关系变量 `R` 中成立，那么 FD `X` →\
    \ `Z` 也必然在该关系变量中成立。（供应商关系变量 `S` 说明了这条特定的规则——FD `{SNO}` → `{CITY}` 和 `{CITY}` →\
    \ `{STATUS}` 都在该关系变量中成立，因此 FD `{SNO}` → `{STATUS}` 也成立。）\n\n所以这些规则是合理的。但更重要的是，它们既是\
    \ *可靠* 的，又是 *完备* 的。可靠性和完备性是在形式系统中经常遇到的概念。在当前考虑的具体形式系统中，它们的含义如下：\n\n*   **完备性：**\
    \ 如果一个 FD `f` 被给定集合 `F` 中的 FD 所蕴含，那么它可以使用这些规则从 `F` 中的 FD 推导出来。（重申一下，说某个 FD `f`\
    \ 被某个集合 `F` 中的 FD 所蕴含，意思是如果 `F` 中的 FD 成立，则 `f` 也成立。）\n*   **可靠性：** 如果一个 FD `f`\
    \ 未被给定集合 `F` 中的 FD 所蕴含，那么它不能使用这些规则从 `F` 中的 FD 推导出来。^(⁹⁸)\n\n因此，这些规则构成了所谓的 FD 的\
    \ *公理化*。其结果是，它们可以用来推导出任何给定 FD 集合 `F` 的所谓 *闭包 `F+`*。定义如下：\n\n*   **定义（FD 集合的闭包）：**\
    \ 设 `F` 是一个 FD 集合。则 `F` 的闭包 `F+` 是所有被 `F` 中 FD 所蕴含的 FD 的集合。\n\n更重要的是，这个推导过程可以\
    \ *机械化*；也就是说，阿姆斯特朗规则可以被纳入（例如）一个设计工具中，该工具给定某个关系变量 `R` 中成立的 FD 集合 `F`，将能够计算该集合 `F`\
    \ 的闭包 `F+`，换句话说，就是计算在该关系变量中成立的所有 FD 的完整集合。这种情况的重要性应该不言而喻。\n\n## 附加规则\n\n可以从最初的三条规则推导出若干附加的推理规则，其中包括以下几条。这些附加规则可以用来简化从\
    \ `F` 计算 `F+` 的实际任务。以下是一些例子：\n\n1.  **自确定：** `X` → `X`。\n2.  **合并：** 如果 `X` →\
    \ `Y` 且 `X` → `Z`，则 `X` → `YZ`。\n3.  **复合：** 如果 `X` → `Y` 且 `Z` → `W`，则 `XZ` →\
    \ `YW`。\n4.  **分解：^(⁹⁹)** 如果 `X` → `YZ`，则 `X` → `Y` 且 `X` → `Z`。\n\n在下一节中，我将展示如何从最初的三条规则推导出这四条规则。不过，首先让我给出几个例子，说明这些规则（包括原始规则和附加规则）在实际中如何使用。作为第一个例子，假设我们给定一个关系变量\
    \ `R`，其属性为 `A`、`B`、`C`、`D`、`E`、`F`，并被告知以下 FD 在该关系变量中成立：\n\n```\nA  → BC\nB  →\
    \ E\nCD → EF\n```\n\n我现在来证明 FD `AD` → `F` 也在 `R` 中成立（我认为你会同意，这个事实并非显而易见）。^(¹⁰⁰)\
    \ 证明如下：\n\n1.  `A` → `BC`   （给定）\n2.  `A` → `C`   （由 1，分解）\n3.  `AD` → `CD`  \
    \ （由 2，增广）\n4.  `CD` → `EF`   （给定）\n5.  `AD` → `EF`   （由 3 和 4，传递）\n6.  `AD` →\
    \ `F`   （由 5，分解）\n\n对于第二个例子，回顾第 6 章中关于 *不可约覆盖* 的概念。提醒一下：(a) 对于给定的 FD 集合 `F`，一个覆盖是一个\
    \ FD 集合 `C`，使得 `F` 中的每一个 FD 都被 `C` 中的 FD 所蕴含；(b) 当且仅当覆盖 `C` 具有以下所有属性时，它才是不可约的：\n\
    \n1.  **单属性依赖体：** `C` 中的每个 FD 的右侧只有一个属性。\n2.  **不可约决定因素：** 从 `C` 中任何 FD 的左侧删除任何属性，都会导致\
    \ `C` 不再是 `F` 的覆盖。\n3.  **无冗余 FD：** 从 `C` 中删除任何 FD，都会导致 `C` 不再是 `F` 的覆盖。\n\n在上一章中，我（默认地）假设每个\
    \ FD 集合 `F` 都有一个不可约覆盖。事实上，这很容易理解：\n\n*   由于分解规则，我们可以不失一般性地假设 `F` 中的每个 FD 的右侧都是单属性。\n\
    *   接下来，对于 `F` 中的每个 FD，检查其左侧的每个属性 `A`；如果从该左侧删除 `A` 对闭包 `F+` 没有影响，则从该左侧删除 `A`。\n\
    *   对于 `F` 中剩下的每个 FD，如果从 `F` 中删除该 FD 对闭包 `F+` 没有影响，则从 `F` 中删除该 FD。\n\n`F` 的最终版本是不可约的，并且是原始版本的覆盖。\n\
    \n下面是一个具体的例子，说明实际找到一个不可约覆盖的过程。设给定的 FD 集合（都假设在某个具有属性 `A`、`B`、`C`、`D` 的关系变量 `R`\
    \ 中成立）如下：\n\n```\nA  → BC\nB  → C\nA  → B\nAB → C\nAC → D\n```\n\n那么，以下步骤将为这个给定集合生成一个不可约覆盖：\n\
    \n1.  首先，重写这些 FD，使得每个的右侧都是单属性：\n\n    ```\n    A  → B\n    A  → C\n    B  → C\n\
    \    A  → B\n    AB → C\n    AC → D\n    ```\n\n    现在观察到 FD `A` → `B` 出现了两次，因此可以删除一次出现。\n\
    2.  可以从 FD `AC` → `D` 的左侧删除属性 `C`，因为我们有 `A` → `C`，所以通过增广有 `A` → `AC`，又给定 `AC`\
    \ → `D`，所以通过传递性有 `A` → `D`；因此 `AC` → `D` 左侧的 `C` 是冗余的。\n3.  FD `AB` → `C` 可以删除，因为我们又有\
    \ `A` → `C`，所以通过增广有 `AB` → `CB`，再通过分解有 `AB` → `C`。\n4.  FD `A` → `C` 被 FD `A`\
    \ → `B` 和 `B` → `C` 一起蕴含，因此可以删除。\n\n最后我们得到：\n\n```\nA → B\nB → C\nA → D\n```\n\
    \n这个集合是不可约的。\n\n## 证明附加规则\n\n如前所述，在本节中，我展示如何从原始的规则 1-3 推导出规则 4-7。\n\n1.  **自确定：**\
    \ `X` → `X`。\n    **证明：** 由自反性立即可得。\n2.  **合并：** 如果 `X` → `Y` 且 `X` → `Z`，则 `X`\
    \ → `YZ`。\n    **证明：** `X` → `Y`（给定），故由增广得 `X` → `XY`；又 `X` → `Z`（给定），故由增广得 `XY`\
    \ → `YZ`；故由传递性得 `X` → `YZ`。\n3.  **复合：** 如果 `X` → `Y` 且 `Z` → `W`，则 `XZ` → `YW`。\n\
    \    **证明：** `X` → `Y`（给定），故由增广得 `XZ` → `YZ`；同样，`Z` → `W`（给定），故由增广得 `YZ` → `YW`；故由传递性得\
    \ `XZ` → `YW`。\n4.  **分解：** 如果 `X` → `YZ`，则 `X` → `Y` 且 `X` → `Z`。\n    **证明：**\
    \ `X` → `YZ`（给定）且 `YZ` → `Y` 由自反性得；故由传递性得 `X` → `Y`（同理可得 `X` → `Z`）。\n"
- fmt: "## 另一种闭包\n\n回顾一下，一组函数依赖（FD）的闭包 `F^(+)` 是由 `F` 中的 FD 所蕴含的所有 FD 的集合。原则上，我们可以反复应用阿姆斯特朗规则（和/或由此导出的规则），直到不再产生新的\
    \ FD，从而从 `F` 计算出 `F^(+)`。然而在实践中，几乎没有必要专门计算 `F^(+)`（这或许是件好事，因为刚刚概述的过程效率很低）。但现在我想展示如何计算\
    \ `F^(+)` 的一个重要的子集：即由所有具有给定决定因素的 FD 组成的子集。更准确地说，我将展示，给定一个属性集 `H`、`H` 的一个子集 `Z`\
    \ 以及关于 `H` 的一组 FD `F`，我们如何计算所谓的 `Z` 在 `F` 下的 `闭包 Z^(+)`。定义如下：\n\n### 定义（属性集的闭包）\n\
    设 `H` 是一个属性集，`Z` 是 `H` 的一个子集，`F` 是关于 `H` 的一组 FD。那么，`Z` 在 `F` 下的闭包 `Z^(+)` 是 `H`\
    \ 的极大子集 `C`，使得 `Z → C` 由 `F` 中的 FD 所蕴含。\n\n顺便提一下，请注意我们现在有两种闭包（注意不要混淆！）：一组 FD 的闭包，以及一组属性在一组\
    \ FD 下的闭包。^([^(101)](#fn101)) 同时也请注意，我们对两者使用相同的“上标加号”表示法。\n\n下面是一个计算 `Z` 在 `F`\
    \ 下的闭包 `Z^(+)` 的简单伪代码算法：\n\n```\nZ+ := Z ;\ndo \"forever\" ;\nfor each FD X →\
    \ Y in F\ndo ;\nif X is a subset of Z+\nthen replace Z+ by the union of Z+ and\
    \ Y ;\nend ;\nif Z+ did not change on this iteration\nthen quit ;  /* computation\
    \ complete */\nend ;\n```\n\n让我们来看一个例子。假设给定的属性集是 `ABCDEG`，我们想要在以下 FD 集 `F` 下计算属性集\
    \ `AB` 的闭包 `AB+`：\n\n```\nA  → BC\nE  → CG\nB  → E\nCD → EG\n```\n\n现在让我们逐步执行该算法：\n\
    \n1.  首先，我们将结果 `AB+` 初始化为属性集 `AB`。\n2.  现在我们循环内部循环四次，每个给定的 FD 一次。在第一次迭代中（对于 FD\
    \ `A → BC`），我们发现决定因素 `A` 确实是到目前为止计算出的 `AB+` 的子集，因此我们将属性 `B` 和 `C` 添加到结果中。`AB+`\
    \ 现在是集合 `ABC`。\n3.  在第二次迭代中（对于 FD `E → CG`），我们发现决定因素 `E` **不是** 当前结果的子集，因此结果保持不变。\n\
    4.  在第三次迭代中（对于 FD `B → E`），我们将 `E` 添加到 `AB+`，因此其值现在为 `ABCE`。\n5.  在第四次迭代中（对于 FD\
    \ `CD → EG`），`AB+` 保持不变。\n6.  现在我们再次循环内部循环四次。在第一次迭代中，结果保持不变；在第二次迭代中，它扩展到 `ABCEG`；在第三次和第四次迭代中，它保持不变。\n\
    7.  现在我们再次循环内部循环四次。结果保持不变，因此整个过程终止，`AB+ = ABCEG`。\n\n嗯，我希望你能从这个例子中看出，在给定 `H`、`F`\
    \ 和 `Z` 的情况下计算 `Z^(+)` 本质上是直接的。重要的是：给定某个 FD 集 `F`（关于某个属性集 `H`），我们可以轻松判断某个特定的 FD\
    \ `X → Y`（关于同一个 `H`）是否被 `F` 蕴含，因为当且仅当 `Y` 是 `X` 在 `F` 下的闭包 `X^(+)` 的子集时，该 FD 才被蕴含。换句话说，我们现在有了一种简单的方法来确定给定的\
    \ FD `X → Y` 是否在 `F` 的闭包 `F^(+)` 中，而无需实际计算 `F^(+)`。\n\n根据（属性集闭包的）定义还可以得出，关系变量\
    \ `R` 的超键正是那些 `R` 属性集的子集 `SK`，使得 `SK` 在相关 FD 集下的闭包 `SK^(+)` 等于 `R` 的整个属性集。\n\n\
    ## 练习\n\n*   **达文定理：** 如果 `X → Y` 且 `Z → W`，则 `XV → YW`，其中 `V = Z - Y`。\n    证明这个定理。你使用了前两个练习中的哪些规则？那些练习中的哪些规则可以作为该定理的特例推导出来？\n\
    1.  说阿姆斯特朗规则是可靠（sound）的意味着什么？完备（complete）的呢？\n2.  一组 FD 的闭包是什么？设 `F` 是仅包含 FD `{SNO,PNO}\
    \ → {QTY}` 的 FD 集，该 FD 在关系变量 `SP` 中成立。展示该集合 `F` 的闭包。\n3.  根据 FD 被满足的定义，展示自反性、增广性和传递性规则是合理的。\n\
    4.  （*尝试在不回看本章内容的情况下完成此练习。*）证明前一个练习中的三个规则蕴含了自确定、合并、复合和分解规则。\n5.  以下定理由休·达文提出：^([^(102)](#fn102))\n\
    1.  为以下 FD 集找到一个不可约覆盖：\n1.  考虑以下 FD 集：\n```\nAB  → C      BE → C\nC   → A    \
    \  CE → FA\nBC  → D      CF → BD\nACD → B      D  → EF\n```\n```\nA   → B\nBC\
    \  → DE\nAEF → G\n```\nFD `ACF → DG` 是否由此集蕴含？\n1.  如果且仅如果每个集合都是另一个的覆盖，则两个 FD 集是*等价*的。以下集合是否等价？\n\
    ```\n{ A → B , AB → C , D → AC , D → E }\n{ A → BC , D → AE }\n```\n请注意，任何给定的\
    \ FD 集 `F` 当然等价于任何作为其不可约覆盖的集合，并且进一步说，两个集合等价当且仅当它们具有相同的不可约覆盖。\n1.  关系变量 `R` 具有属性\
    \ `A`, `B`, `C`, `D`, `E`, `F`, `G`, `H`, `I`, 和 `J`，并受以下 FD 约束：\n```\nABD → E\
    \        C  → J\nAB  → G        CJ → I\nB   → F        G  → H\n```\n这个集合是可约的吗？`R`\
    \ 有哪些键？"
  raw: "## Another Kind of Closure\n\nTo recap, the closure *F*^(*+*) of a set *F*\
    \ of FDs is the set of all FDs implied by those in *F*. Now, in principle we could\
    \ compute *F*^(*+*) from *F* by repeatedly applying Armstrong’s rules (and/or\
    \ rules derived therefrom) until they stop producing new FDs. In practice, however,\
    \ there’s little need to compute *F*^(*+*) per se (which is just as well, perhaps,\
    \ since the procedure just outlined is hardly very efficient). But now I want\
    \ to show how we can compute a certain important subset of *F*^(*+*): namely,\
    \ that subset consisting of all FDs having a given determinant. More precisely,\
    \ I’ll show how, given a heading *H*, a subset *Z* of *H*, and a set *F* of FDs\
    \ with respect to *H*, we can compute what’s called the *closure Z*^(*+*) of *Z*\
    \ under *F*. Here’s the definition:\n\n*   **Definition (closure of a set of attributes):**\
    \ Let *H* be a heading, let *Z* be a subset of *H*, and let *F* be a set of FDs\
    \ with respect to *H*. Then the closure *Z*^(*+*) of *Z* under *F* is the maximal\
    \ subset *C* of *H* such that *Z* → *C* is implied by the FDs in *F*.\n\nBy the\
    \ way, note that we now have two kinds of closure (try not to confuse them!):\
    \ closure of a set of FDs, and closure of a set of attributes under a set of FDs.^([^(101)](#fn101))\
    \ Note too that we use the same “superscript plus” notation for both.\n\nHere\
    \ then is a simple pseudocode algorithm for computing the closure *Z*^(*+*)of\
    \ *Z* under *F*:\n\n```\nZ+ := Z ;\ndo \"forever\" ;\nfor each FD X → Y in F\n\
    do ;\nif X is a subset of Z+\nthen replace Z+ by the union of Z+ and Y ;\nend\
    \ ;\nif Z+ did not change on this iteration\nthen quit ;  /* computation complete\
    \ */\nend ;\n```\n\nLet’s do an example. Suppose the given heading is *ABCDEG*\
    \ and we want to compute the closure *AB*^+ of the set of attributes *AB* under\
    \ the following set *F* of FDs:\n\n```\nA  → BC\nE  → CG\nB  → E\nCD → EG\n```\n\
    \nLet’s now step through the algorithm:\n\n1.  First of all, we initialize the\
    \ result *AB*^+ to the set of attributes *AB*.\n\n2.  We now go round the inner\
    \ loop four times, once for each of the given FDs. On the first iteration (for\
    \ the FD *A* → *BC*), we find that the determinant *A* is indeed a subset of *AB*^+\
    \ as computed thus far, so we add attributes (*B* and) *C* to the result. *AB*^+\
    \ is now the set *ABC*.\n\n3.  On the second iteration (for the FD *E* → *CG*),\
    \ we find that the determinant *E* is *not* a subset of the result as computed\
    \ so far, which thus remains unchanged.\n\n4.  On the third iteration (for the\
    \ FD *B* → *E*), we add *E* to *AB*^+, which thus now has the value *ABCE*.\n\n\
    5.  On the fourth iteration (for the FD *CD* → *EG*), *AB*^+ remains unchanged.\n\
    \n6.  Now we go round the inner loop four times again. On the first iteration,\
    \ the result remains unchanged; on the second, it expands to *ABCEG*; on the third\
    \ and fourth, it remains unchanged.\n\n7.  Now we go round the inner loop four\
    \ times again. The result remains unchanged, and so the whole process terminates,\
    \ with *AB*^+ = *ABCEG*.\n\nWell, I hope you can see from this example that computing\
    \ *Z*^(*+*) given *H*, *F*, and *Z* is essentially straightforward. And the important\
    \ thing is this: Given some set *F* of FDs (with respect to some heading *H*),\
    \ we can easily tell whether some specific FD *X* → *Y* (with respect to that\
    \ same heading *H*) is implied by *F*, because it will be so if and only if *Y*\
    \ is a subset of the closure *X*^(*+*) of *X* under *F*. In other words, we now\
    \ have a simple way of determining whether a given FD *X* → *Y* is in the closure\
    \ *F*^(*+*) of *F* without actually having to compute *F*^(*+*).\n\nIt also follows\
    \ from the definition (of closure of a set of attributes) that the superkeys for\
    \ a relvar *R* are precisely those subsets *SK* of the heading of *R* such that\
    \ the closure *SK*^(*+*) of *SK*—under the pertinent set of FDs—is the entire\
    \ heading of *R*.\n\n## Exercises\n\n*   **Darwen’s Theorem** **:** If *X* → *Y*\
    \ and *Z* → *W*, then *XV* → *YW*, where *V* = *Z* – *Y*.\n\n    Prove this theorem.\
    \ Which rules from the previous two exercises did you use? Which rules from those\
    \ exercises can be derived as special cases of the theorem?\n\n1.  What does it\
    \ mean to say that Armstrong’s rules are sound? Complete?\n\n2.  What’s the closure\
    \ of a set of FDs? Let *F* be the set of FDs containing just the FD {SNO,PNO}\
    \ → {QTY}, which holds in relvar SP. Show the closure of that set *F*.\n\n3. \
    \ Given the definition of what it means for an FD to be satisfied, show that the\
    \ reflexivity, augmentation, and transitivity rules are reasonable.\n\n4.  (*Try\
    \ this exercise without referring back to the body of the chapter.*) Prove that\
    \ the three rules of the previous exercise imply the self determination, union,\
    \ composition, and decomposition rules.\n\n5.  The following theorem is due to\
    \ Hugh Darwen:^([^(102)](#fn102))\n\n1.  Find an irreducible cover for the following\
    \ set of FDs:\n\n1.  Consider the following set of FDs:\n\n```\nAB  → C      BE\
    \ → C\nC   → A      CE → FA\nBC  → D      CF → BD\nACD → B      D  → EF\n```\n\
    \n```\nA   → B\nBC  → DE\nAEF → G\n```\n\nIs the FD *ACF* → *DG* implied by this\
    \ set?\n\n1.  Two sets of FDs are *equivalent* if and only if each is a cover\
    \ for the other. Are the following sets equivalent?\n\n```\n{ A → B , AB → C ,\
    \ D → AC , D → E }\n{ A → BC , D → AE }\n```\n\nNote that any given set *F* of\
    \ FDs is certainly equivalent to any set that’s an irreducible cover for *F*,\
    \ and further that two sets are equivalent if and only if they have the same irreducible\
    \ cover.\n\n1.  Relvar R has attributes A, B, C, D, E, F, G, H, I, and J, and\
    \ is subject to the following FDs:\n\n```\nABD → E        C  → J\nAB  → G    \
    \    CJ → I\nB   → F        G  → H\n```\n\nIs this set reducible? What keys does\
    \ R have?"
