  raw: '## Keys


    Before going any further , I need to review the familiar concept of *keys*, in
    the relational sense of that term. First of all, as I’m sure you know, every relvar
    has at least one *candidate* key. A candidate key is basically just a unique identifier;
    in other words, it’s a combination of attributes—often but not always a “combination”
    consisting of just a single attribute—such that every tuple in the relvar has
    a unique value for the combination in question. For example, with respect to the
    database of Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1):


    *   Every supplier has a unique supplier number and every part has a unique part
    number, so {SNO} is a candidate key for S and {PNO} is a candidate key for P.


    *   As for shipments, given the assumption that there’s at most one shipment at
    any given time for a given supplier and a given part, {SNO,PNO} is a candidate
    key for SP.


    Note the braces, by the way; to repeat, candidate keys are always combinations,
    or *sets*, of attributes (even when the set in question contains just one attribute),
    and the conventional representation of a set on paper is as a commalist of elements
    enclosed in braces.


    This is the first time I’ve mentioned the term *commalist*, which I’ll be using
    from time to time in the pages ahead. It can be defined as follows. Let *xyz*
    be some syntactic construct (for example, “attribute name”); then the term *xyz
    commalist* denotes a sequence of zero or more *xyz*’s in which each pair of adjacent
    *xyz*’s is separated by a comma (blank spaces appearing immediately before or
    after any comma are ignored). For example, if *A*, *B*, and *C* are attribute
    names, then the following are all attribute name commalists:


    ```

    A , B , C

    C , A , B

    B

    A , C

    ```


    So too is the empty sequence of attribute names.


    Moreover, when some commalist is enclosed in braces and thereby denotes a set,
    then (a) blank spaces appearing immediately after the opening brace or immediately
    before the closing brace are ignored, (b) the order in which the elements appear
    within the commalist is immaterial (because sets have no ordering to their elements),
    and (c) if an element appears more than once, it’s treated as if it appeared just
    once (because sets don’t contain duplicate elements).


    Next, as I’m sure you also know, a *primary* key is a candidate key that’s been
    singled out in some way for some kind of special treatment. Now, if the relvar
    in question has just one candidate key, then it doesn’t make any real difference
    if we call that key primary. But if the relvar has two or more candidate keys,
    then it’s usual to choose one of them to be primary, meaning it’s somehow “more
    equal than the others.” Suppose, for example, that suppliers always have both
    a unique supplier number and a unique supplier name, so that {SNO} and {SNAME}
    are both candidate keys. Then we might choose {SNO}, say, to be the primary key.


    Observe now that I said it’s *usual* to choose a primary key. Indeed it is usual—but
    it’s *not* 100% necessary. If there’s just one candidate key, then there’s no
    choice and no problem; but if there are two or more, then having to choose one
    and make it primary smacks a little bit of arbitrariness, at least to me. (Certainly
    there are situations where there don’t seem to be any really good reasons for
    making such a choice. There might even be good reasons for not doing so. Appendix
    [C](#489629_2_En_20_Chapter.xhtml) elaborates on such matters.) For reasons of
    familiarity, I’ll usually follow the primary key discipline myself in this book—and
    in pictures like Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1) I’ll indicate
    primary key attributes by double underlining—but I want to stress the fact that
    it’s really candidate keys, not primary keys, that are significant from a relational
    point of view, and indeed from a design theory point of view as well. Partly for
    such reasons, from this point forward I’ll use the term *key*, unqualified, to
    mean any candidate key, regardless of whether the candidate key in question has
    additionally been designated as primary. (In case you were wondering, the special
    treatment enjoyed by primary keys over other candidate keys is mainly syntactic
    in nature, anyway; it isn’t fundamental, and it isn’t very important.)


    *More terminology:* First, a key involving two or more attributes is said to be
    *composite* (and a noncomposite key is sometimes said to be *simple*) . Second,
    if a given relvar has two or more keys and one is chosen as primary, then the
    others are sometimes said to be *alternate* keys (see Appendix [C](#489629_2_En_20_Chapter.xhtml)).
    Third, a *foreign* key is a combination, or set, of attributes *FK* in some relvar
    *R2* such that each *FK* value is required to be equal to some value of some key
    *K* in some relvar *R1* (*R1*and *R2* not necessarily distinct).^([^(11)](#fn11))
    With reference to Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1), for example,
    {SNO} and {PNO} are both foreign keys in relvar SP, corresponding to keys {SNO}
    and {PNO} in relvars S and P, respectively.'
  trans: '## 键


    在深入之前，我需要回顾一下 `键` 这个熟悉的概念，即该术语在关系意义上的含义。首先，我相信你知道，每个 `关系变量` 都至少有一个 `候选` 键。候选键基本上就是一个唯一标识符；换句话说，它是一个属性的组合——通常但不总是仅由单个属性组成的“组合”——使得关系变量中的每个元组对于该组合都有唯一的值。例如，参照图
    1-1 的数据库：


    *   每个供应商都有一个唯一的供应商编号，每个零件都有一个唯一的零件编号，因此 `{SNO}` 是 `S` 的一个候选键，而 `{PNO}` 是 `P`
    的一个候选键。

    *   对于发货情况，假设在任何给定时间，一个给定的供应商和一个给定的零件最多只有一条发货记录，那么 `{SNO, PNO}` 就是 `SP` 的一个候选键。


    顺便注意一下花括号；重申一下，候选键始终是属性的组合，或者说 `集合`（即使该集合只包含一个属性），而在纸上表示集合的惯例是用花括号括起来的一个由元素组成的
    `逗号列表`。


    这是我第一次提到 `逗号列表` 这个术语，在后续章节中我会不时使用它。其定义如下。令 `xyz` 为某种语法结构（例如，“属性名”）；那么术语 `xyz 逗号列表`
    表示一个由零个或多个 `xyz` 组成的序列，其中每对相邻的 `xyz` 之间用逗号分隔（紧跟在逗号之前或之后的空格被忽略）。例如，如果 `A`、`B` 和
    `C` 是属性名，那么以下都是属性名逗号列表：


    ```

    A , B , C

    C , A , B

    B

    A , C

    ```


    空的属性名序列同样也是。


    此外，当某个逗号列表被花括号括起来从而表示一个集合时，那么（a）紧跟在左花括号之后或右花括号之前的空格被忽略；（b）元素在逗号列表中出现的顺序无关紧要（因为集合的元素没有顺序）；（c）如果一个元素出现多次，它被视为只出现一次（因为集合不包含重复元素）。


    接下来，我相信你也知道，`主` 键是以某种方式被挑选出来接受某种特殊处理的候选键。现在，如果所讨论的关系变量只有一个候选键，那么我们称该键为主键并没有什么实质区别。但如果关系变量有两个或更多个候选键，通常会选择其中一个作为主键，意味着它在某种程度上“比其他键更重要”。例如，假设供应商总是同时拥有唯一的供应商编号和唯一的供应商名称，因此
    `{SNO}` 和 `{SNAME}` 都是候选键。那么我们可能会选择（比如说）`{SNO}` 作为主键。


    请注意，我说的是 *通常* 选择一个主键。确实如此——但这 *并非* 100% 必要。如果只有一个候选键，那就别无选择，也没有问题；但如果有一个以上，那么必须选择一个并使其成为主键，就带有一点随意性，至少对我来说是这样。（当然，有些情况下似乎没有任何真正的充分理由来做这样的选择。甚至可能有充分的理由不这么做。附录
    C 详细阐述了这类问题。）出于熟悉的原因，我本人在本书中通常也会遵循主键规范——并且在图 1-1 这样的图中，我会用双下划线标示主键属性——但我想强调的是，从关系的角度来看，以及从设计理论的角度来看，真正重要的是候选键，而不是主键。部分出于这些原因，从今往后，我将使用
    `键` 这个无修饰的术语来表示任何候选键，无论该候选键是否另外被指定为主键。（如果你好奇，主键相对于其他候选键所享有的特殊处理，主要本质上是语法上的；它不是根本性的，也不是非常重要。）


    *更多术语：* 首先，涉及两个或更多属性的键被称为 `复合` 键（而非复合键有时被称为 `简单` 键）。其次，如果一个给定的关系变量有两个或更多个键，并且其中一个被选为主键，那么其他的键有时被称为
    `备用` 键（参见附录 C）。第三，`外` 键是某个关系变量 `R2` 中属性的一个组合或集合 `FK`，要求每个 `FK` 值必须等于某个关系变量 `R1`
    中某个键 `K` 的某个值（`R1` 和 `R2` 不必是不同的）。^(¹¹) 以图 1-1 为例，`{SNO}` 和 `{PNO}` 在关系变量 `SP`
    中都是外键，分别对应于关系变量 `S` 和 `P` 中的键 `{SNO}` 和 `{PNO}`。'
- fmt: '## The Place of Design Theory


    As I said in the preface, by the term *design* I mean logical design, not physical
    design. Logical design is concerned with what the database looks like to the user
    (which means, loosely, what `relvars` exist and what constraints apply to those
    `relvars`); physical design, by contrast, is concerned with how a given logical
    design maps to physical storage.^([^(12)](#fn12)) And the term *design theory*
    refers specifically to logical design, not physical design—the point being that
    physical design is necessarily dependent on aspects (performance aspects in particular)
    of the target DBMS, whereas logical design is, or should be, DBMS independent.
    Throughout this book, then, the unqualified term *design* should be understood
    to mean logical design specifically, unless the context demands otherwise.


    Now, design theory as such isn’t part of the relational model; rather, it’s a
    separate theory that builds on top of that model. (It’s appropriate to think of
    it as part of relational theory in general, but it’s not, to repeat, part of the
    relational model per se.) Thus, design concepts such as further normalization
    are themselves based on more fundamental notions—e.g., the `projection` and `join`
    operators of the relational algebra—that *are* part of the relational model. (All
    of that being said, however, it could certainly be argued that design theory is
    a *logical consequence* of the relational model, in a sense. In other words, I
    think it would be inconsistent to agree with the relational model in general but
    not to agree with the design theory that’s based on it.)


    The overall objective of logical design is to achieve a design that’s (a) hardware
    independent, for obvious reasons; (b) operating system and DBMS independent, again
    for obvious reasons; and finally, and perhaps a little controversially, (c) *application*
    independent (in other words, we’re concerned primarily with what the data is,
    rather than with how it’s going to be used). Application independence in this
    sense is desirable for the very good reason that it’s normally—perhaps always—the
    case that not all uses to which the data will be put are known at design time;
    thus, we want a design that’ll be robust, in the sense that it won’t be invalidated
    by the advent of application requirements that weren’t foreseen at the time of
    the original design. Observe that one important consequence of this state of affairs
    is that we aren’t (or at least shouldn’t be) interested in making design compromises
    for physical performance reasons. Design theory in general, and individual database
    designs in particular, should never be driven by mere performance considerations.


    Back to design theory as such. As we’ll see, that theory includes a number of
    formal theorems, theorems that provide practical guidelines for designers to follow.
    So if you’re a designer, you need to be familiar with those theorems. Let me quickly
    add that I don’t mean you need to know how to prove the theorems in question (though
    in fact the proofs are often quite simple); what I mean is, you need to know what
    the theorems say—i.e., you need to know the results—and you need to be prepared
    to apply those results. That’s the nice thing about theorems: Once somebody’s
    proved them, then their results become available for anybody to use whenever they
    need to.


    Now, it’s sometimes claimed, not entirely unreasonably, that all design theory
    really does is *bolster up your intuition*. What do I mean by this remark? Well,
    consider the suppliers-and-parts database. The obvious design for that database
    is the one illustrated in Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1); I mean,
    it’s “obvious” that three `relvars` are necessary, that attribute `STATUS` belongs
    in relvar `S`, that attribute `COLOR` belongs in relvar `P`, that attribute `QTY`
    belongs in relvar `SP`, and so on. But why exactly are these things obvious? Well,
    suppose we try a different design; for example, suppose we move the `STATUS` attribute
    out of relvar `S` and into relvar `SP` (intuitively the wrong place for it, of
    course, since status is a property of suppliers, not shipments). Figure [1-2](#489629_2_En_1_Chapter.xhtml#Fig2)
    on the next page shows a sample value for this revised shipments relvar, which
    I’ll call `STP` to avoid confusion:^([^(13)](#fn13))


    ![../images/489629_2_En_1_Chapter/489629_2_En_1_Fig2_HTML.jpg](images/489629_2_En_1_Chapter/489629_2_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Relvar `STP`—sample value


    A glance at the figure is sufficient to show what’s wrong with this design: It’s
    *redundant*, in the sense that every tuple for supplier `S1` tells us `S1` has
    status `20`, every tuple for supplier `S2` tells us `S2` has status `30`, and
    so on.^([^(14)](#fn14)) And design theory tells us that not designing the database
    in the obvious way will lead to such redundancy, and tells us also (albeit implicitly,
    perhaps) what the consequences of such redundancy will be. In other words, design
    theory is largely—though not exclusively—about reducing redundancy, as we’ll see.
    (As an aside, I remark that partly for such reasons, the theory has been described,
    perhaps a little unkindly, as *a good source of bad examples*.)


    Now, if design theory really does just bolster up your intuition, then it might
    be (and indeed has been) criticized on the grounds that it’s really all just common
    sense anyway. By way of example, consider relvar `STP` again. As I’ve said, that
    relvar is obviously badly designed; the redundancies are obvious, the consequences
    are obvious too, and any competent human designer would “naturally” avoid such
    a design, even if that designer had no explicit knowledge of design theory at
    all. But what does “naturally” mean here? What principles are being applied by
    that human designer in opting for a more “natural” (and better) design?


    The answer is: They’re exactly the principles that design theory talks about (the
    principles of normalization, for example). In other words, competent designers
    already have those principles in their brain, as it were, even if they’ve never
    studied them formally and can’t put a name to them or articulate them precisely.
    So yes, the principles are common sense—but they’re *formalized* common sense.
    (Common sense might be common, but it’s not always easy to say exactly what it
    is!) What design theory does is state *in a precise way* what certain aspects
    of common sense consist of. In my opinion, that’s the real achievement—or one
    of the real achievements, anyway—of the theory: It formalizes certain commonsense
    principles, thereby opening the door to the possibility of mechanizing those principles
    (that is, incorporating them into computerized design tools). Critics of the theory
    often miss this point; they claim, quite rightly, that the ideas are mostly just
    common sense, but they don’t seem to realize it’s a significant achievement to
    state what common sense means in a precise and formal way.'
