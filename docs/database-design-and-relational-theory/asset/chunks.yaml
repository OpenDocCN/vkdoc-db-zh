  trans: "## 历史小记\n\n在讨论为何规范化和正交性还不够充分之前，我想再谈谈科德在其最早的两篇论文中为解决冗余问题所做的尝试。他在 1969 年的论文中这样写道：\n\
    \n*   如果一组关系中**至少包含一个**可从该组中[其他关系]推导出的关系，则这组关系是*强冗余*的。\n\n而在 1970 年的论文中，他将这一定义稍作收紧：\n\
    \n*   如果一组关系中至少包含一个拥有**投影**的关系，且该投影可从该组中其他关系的投影推导得出，则这组关系是*强冗余*的。\n\n我需要解释一下，当科德说关系\
    \ `r` *可从*一组关系 `S` 推导时，他的意思是 `r` 等于对 `S` 中的关系应用一系列关系运算（连接、投影等）所得的结果。不过，我对他的定义有几点评论：\n\
    \n*   更关键的是，1970 年定义中首次提到的（至少）*投影*，应替换为*对应于不可约 JD 的分量的投影*。（上一条要点中的第一个反对意见，即反对意见\
    \ a，就会因此消失。）\n\n*   首先，术语*关系*应全部替换为术语*关系变量*。（当然，后一术语是几年后才引入的，而科德从未使用过。）事实上，我认为可以公平地说，科德在这些引文中使用的*关系*一词，指的不仅仅是一个`关系变量`本身，而更具体地说，是一个*基本*`关系变量`。\n\
    \n*   其次，我们可以忽略修饰语*强*。科德当时在区分“强”冗余和他所谓的*弱*冗余，但弱冗余与我们无关。原因是弱冗余仅仅涉及并非始终成立、但恰好在特定时间满足（给定当时恰好存在的关系值）的相等性依赖。\n\
    \n实际上，在我看来，这里发生的事情正是科德在努力处理关系和关系变量之间的逻辑差异！——参见前一点要点。“强”冗余适用于关系变量（这是我们在谈论数据库设计时通常所指的*冗余*）。相比之下，“弱”冗余适用于关系而非关系变量（它只是关系变量在某个特定时间恰好具有的值的产物，并不特别有趣）。\n\
    \n*   1969 年的定义当然被 1970 年的定义所涵盖，因为（正如我们从第 6 章所知）每个关系变量 `R` 都恒等于 `R` 的某个特定投影——即相应的恒等投影。\n\
    \n*   更关键的是，1970 年的定义作为冗余的一般定义仍然存在缺陷，至少由于以下两个原因：\n    1.  它包含了一些我们通常根本不认为是冗余的可能性。例如，假设供应商-零件数据库受制于一个约束：每个零件必须至少由一个供应商供应。那么关系变量\
    \ `SP` 在 `{PNO}` 上的投影必然等于关系变量 `P` 在 `{PNO}` 上的投影，这样我们就面临一个“强冗余”。\n    *注：* 或许一个更能说明同样问题的更现实的例子是，对人员数据库施加约束：每个员工必须属于一个部门，且每个部门必须至少有一名员工。\n\
    \    2.  同时，它排除了许多我们肯定会视为冗余的可能性——例如，参见第 16 章中关于轻型零件与重型零件的例子（第二个版本，如图 16-3 所示）。本章后续章节会给出更多例子。\n\
    \n关于科德定义的最后一点评论：科德至少（在两篇论文中）都提到，“我们将[数据库]关联一组语句[用以]定义该数据库中的所有冗余”。科德这里所指的“语句”，当然是`Tutorial\
    \ D`中的`CONSTRAINT`语句（或在逻辑上等价于此的语句）。换句话说，科德当然希望系统能感知冗余，并希望这些冗余能被相应地管理。然而，不幸的是，他接着又说：\n\
    \n不一致性的产生……可以在内部记录，这样如果它在某个合理时间内未被纠正……系统就可以通知安全官[*原文如此*]。或者，系统可以[通知用户]某些关系现在需要更改以恢复一致性……理想情况下，[不同的补救措施]应该……能够应用于关系的不同子集。\n\
    \n*注：* “不一致性”（或者我更愿意称之为完整性违规）当然可能由冗余引起——更准确地说，是由管理不当的冗余引起——但并非所有的完整性违规都是由冗余引起的，这一点是肯定的。更关键的是，我认为数据库*绝不应*被允许包含任何不一致性，至少从用户的角度来看是这样；正如我在第\
    \ 16 章所说，你永远无法信任从不一致的数据库中得到的结果。换句话说，“纠正不一致性”需要立即在单条语句层面完成（甚至不是在事务层面）。^(²²²) 请参阅本章后面的“管理冗余”一节。"
- fmt: '## 谓词与约束


    虽然在前面的章节中，我对谓词和约束都有很多论述，但我还没有明确指出这些概念之间的逻辑差异；所以现在让我来弥补这个不足。首先，对于给定的关系变量 *R*，其谓词——有时为了明确起见，更具体地称为关系变量谓词——是
    *R* 的*预期解释*或*含义*。当然，每个给定关系变量 *R* 的用户都应该（或被假定！）理解相应的谓词。然而需要注意的是，至少在当前的实现中，谓词是用自然语言陈述的，因此本质上是非正式的。


    因此，谓词是非正式的。相比之下，约束是*正式的*。本质上，约束是一个布尔表达式，用某种形式语言（如 SQL 或 **`Tutorial D`**）表达，并且通常包含对数据库中关系变量的引用，它被要求始终计算为
    TRUE。设 *R* 是一个关系变量。那么，将提到 *R* 的所有约束的逻辑与视为 *R* 的约束是很方便的。因此，请注意，*R* 的谓词只有用户理解，而
    *R* 的约束则是用户*和系统*都能“理解”的。事实上，*R* 的约束可以看作系统对 *R* 谓词的近似表示。当然，理想情况下，我们希望 *R* 始终满足其谓词；然而，我们所能期望的最好情况是它始终满足其约束。^([^(223)](#fn223))


    鉴于数据库应该是所谓的“感兴趣微世界”语义的忠实表示，因此谓词和约束与数据库设计工作高度相关。我们可以说，谓词是这些语义的非正式表示，而约束则是正式表示。因此，总的来说，我认为数据库设计过程是这样的：^([^(224)](#fn224))


    1.  首先，我们尽可能仔细地确定关系变量谓词（和其他业务规则）。

    2.  然后，我们将这些谓词和规则映射为关系变量和约束。


    由上可见，我们可以看到，理解设计理论（规范化等）的另一种方式是：*它是一套帮助确定谓词（从而也是约束）的原则和技术*。这个观点支撑着本章后续的大部分内容。


    顺便提一下，我认为上述内容在很大程度上解释了为什么我不是 E/R（“实体/关系”）建模和类似图形化方法的粉丝。（你可能已经注意到前面章节中完全没有 E/R
    图之类的东西！）E/R 建模和类似方案的问题在于，它们不如形式逻辑强大——远不如。特别是，它们没有包含对量词（`EXISTS` 和 `FORALL`）^([^(225)](#fn225))
    的足够支持——这是一个严重的遗漏，因为约束的表述*总是*至少隐含地需要这种支持，或等效于此种支持的东西。^([^(226)](#fn226)) 因此，这些方案和这些图完全无法表示除少数（虽然重要但有限）约束之外的所有约束。因此，虽然在高抽象层次上使用此类图来阐明整体设计可能是可以接受的，但认为此类图实际上就是*整个*设计则是误导性的，在某些方面是相当危险的。*恰恰相反*：设计是关系变量（这些图确实显示了）加上约束（这些图没有显示）。^([^(227)](#fn227))


    ## 示例 1


    我认为，作为一个研究领域，设计理论总体上仍然非常开放。为了支持这一观点，在本节及接下来的几节中，我想给出一些设计示例，这些设计（a）是完全规范化且完全正交的（至少在大多数情况下），但（b）仍然存在各种冗余（同样，在大多数情况下）。


    对于我的第一个例子，考虑下面这个简单的关系变量，它表示一组姓名和地址（谓词是 *人员姓名 NAME 居住在地址 ADDR*）：


    ```

    NADDR { NAME , ADDR }

    KEY { NAME }

    ```


    假设该关系变量中的属性 `ADDR` 是*元组值*的，其中相关元组具有属性 `STREET`、`CITY`、`STATE` 和 `ZIP`。（是的，元组值属性或
    TVA 是合法的，就像关系值属性或 RVA 是合法的一样——参见第 [4](#489629_2_En_4_Chapter.xhtml) 章——并且原因大致相同。）图
    [17-1](#489629_2_En_17_Chapter.xhtml#Fig1) 显示了该关系变量的一个示例值。


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig1_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig1_HTML.jpg)


    图 17-1


    关系变量 `NADDR`（属性 `ADDR` 为元组值）─示例值


    现在，为了示例的缘故，假设（如我们在练习 6.2 中所做的那样），每当两个 `ADDR` 值具有相同的 `ZIP` 分量时，它们也具有相同的 `CITY`
    和 `STATE` 分量。那么，上述设计显然涉及一些冗余。然而，这里并没有违反规范化。特别是，函数依赖


    ```

    { ZIP } → { CITY , STATE }

    ```


    *不*成立。（为什么不？*答案*：因为 FD 被定义为在属性之间成立，而不是在属性的分量之间成立。）


    话虽如此，让我现在指出，上述 FD 在用以下表达式的结果替换 `NADDR` 后是成立的：


    ```

    NADDR UNWRAP ( ADDR )

    ```


    **`Tutorial D`** 的 `UNWRAP` 操作符有效地将某个元组值属性替换为一组属性，每个分量一个；因此，上述表达式返回一个具有属性 `NAME`、`STREET`、`CITY`、`STATE`
    和 `ZIP` 的结果。当然，该结果仍然只有 2NF，甚至不是 BCNF，并且它仍然存在冗余。


    我们可能忍不住从这个例子得出结论，解包 TVA 是个好主意。但是，这是否足以被确立为良好设计的*原则*，而不仅仅是一个建议或经验法则？^([^(228)](#fn228))


    ## 示例 2


    Codd 可能会以属性 `ADDR` 的值不是“原子的”为由反对示例 1 的设计（尽管我不清楚他是否曾在其任何著作中明确处理过元组值属性本身的问题）。现在，我自己并不同意这个立场，原因在本书第
    [4](#489629_2_En_4_Chapter.xhtml) 章及其他地方有详细解释——但这个点不值得争论，因为我们显然可以用 `CHAR` 类型的属性替换该元组值属性，如图
    [17-2](#489629_2_En_17_Chapter.xhtml#Fig2) 所示。而 Codd 肯定会允许这种修改后的设计，然而它同样遭受着与示例
    1 中类似的冗余。


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig2_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig2_HTML.jpg)


    图 17-2


    修改后的关系变量 `NADDR`（属性 `ADDR` 为文本值）─示例值


    如果你不喜欢这个例子，可以考虑如果属性 `ADDR` 是某种用户定义类型（比如 `ADDRESS`）而不是 `CHAR` 类型，可能会发生什么。


    ## 示例 3


    与示例 2 中类似的冗余可能出现在 `DATE` 类型的属性中，如果这些属性包含——它们经常如此——星期几和日历日期（例如，“Friday, January
    18th, 2019”）。'
  raw: '## Predicates vs. Constraints


    Although I’ve had a lot to say about both predicates and constraints in previous
    chapters, I haven’t explicitly called out the logical difference between these
    concepts; so let me remedy that deficiency now. First, then, the predicate—sometimes
    referred to more explicitly as the relvar predicate, for definiteness—for a given
    relvar *R* is the *intended interpretation*, or *meaning*, for *R*. Of course,
    every user of a given relvar *R* is supposed (or assumed!) to understand the corresponding
    predicate. Note, however, that—at least in today’s implementations—predicates
    are stated in natural language and are therefore somewhat informal in nature,
    necessarily.


    So predicates are informal. By contrast, constraints are *formal*. In essence,
    a constraint is a boolean expression, expressed in some formal language like SQL
    or **Tutorial D** and normally containing references to relvars in the database,
    that’s required to evaluate to TRUE at all times. Let *R* be a relvar. Then it’s
    convenient to think of the logical AND of all of the constraints that mention
    *R* as *the* constraint for *R*. Note, therefore, that whereas the predicate for
    *R* is understood only by the user, the constraint for *R* is “understood” by
    both the user *and the system*. In fact, the constraint for *R* might be regarded
    as the system’s approximation to the predicate for *R*. Ideally, of course, we
    would like *R* to be such that it always satisfies its predicate; the best we
    can hope for, however, is that it always satisfies its constraint.^([^(223)](#fn223))


    Given now that a database is supposed to be a faithful representation of the semantics
    of what might be called “the microworld of interest,” it follows that predicates
    and constraints are highly relevant to the business of database design. We could
    say that predicates are the informal, and constraints the formal, representation
    of those semantics. Overall, therefore, the database design process as I see it
    goes like this:^([^(224)](#fn224))


    1.  First we pin down the relvar predicates (and other business rules) as carefully
    as possible.


    2.  Then we map those predicates and rules into relvars and constraints.


    As a consequence of the foregoing, we can see that another way to think about
    design theory—normalization and so forth—is as follows: *It’s a set of principles
    and techniques for helping with the business of pinning down predicates* (and
    hence constraints). This perspective underpins much of what follows in this chapter.


    As an aside, I note that the foregoing goes a long way toward explaining why I’m
    not much of a fan of E/R (“entity / relationship”) modeling and similar pictorial
    methodologies. (You might have noticed the total absence of E/R diagrams and the
    like in previous chapters!) The problem with E/R modeling and suchlike schemes
    is that they’re less powerful—much less powerful—than formal logic. In particular,
    they don’t include anything like adequate support for the quantifiers (EXISTS
    and FORALL)^([^(225)](#fn225))—which is a serious omission, because the formulation
    of constraints *always* at least tacitly requires such support, or something equivalent
    to such support.^([^(226)](#fn226)) As a consequence, those schemes and those
    diagrams are completely incapable of representing all but a few (admittedly important,
    but limited) constraints. Thus, while it might be acceptable to use such diagrams
    to explicate the overall design at a high level of abstraction, it’s misleading,
    and in some respects quite dangerous, to think of such diagrams as actually *being*
    the design in its entirety. *Au contraire:* The design is the relvars, which the
    diagrams do show, plus the constraints, which they don’t.^([^(227)](#fn227))


    ## Example 1


    It’s my claim that design theory as a field of investigation is, in general, still
    wide open. To bolster this claim, in this section and the next few I want to give
    some examples of designs that (a) are fully normalized and fully orthogonal (at
    least in most cases) and yet (b) still suffer from various redundancies (again,
    in most cases).


    For my first example, consider the following simple relvar, which represents a
    set of names and addresses (the predicate is *Person NAME resides at address ADDR*):


    ```

    NADDR { NAME , ADDR }

    KEY { NAME }

    ```


    Suppose attribute ADDR in this relvar is *tuple valued*, where the tuples in question
    have attributes STREET, CITY, STATE, and ZIP. (Yes, tuple valued attributes or
    TVAs are legal, just as relation valued attributes or RVAs are legal—see Chapter
    [4](#489629_2_En_4_Chapter.xhtml)—and for much the same reasons.) A sample value
    for this relvar is shown in Figure [17-1](#489629_2_En_17_Chapter.xhtml#Fig1).


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig1_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig1_HTML.jpg)


    Figure 17-1


    Relvar NADDR (attribute ADDR tuple valued)─sample value


    Assume now for the sake of the example, as we did in Exercise 6.2, that whenever
    two ADDR values have the same ZIP component, they also have the same CITY and
    STATE components. Then the foregoing design clearly involves some redundancy.
    Yet there’s no violation of normalization here. In particular, the functional
    dependency


    ```

    { ZIP } → { CITY , STATE }

    ```


    does *not* hold. (Why not? *Answer:* Because FDs are defined to hold among attributes,
    not among components of attributes.)


    That said, let me now point out that the foregoing FD does hold in the result
    of replacing NADDR by the result of the following expression:


    ```

    NADDR UNWRAP ( ADDR )

    ```


    The **Tutorial D** UNWRAP operator effectively replaces some tuple valued attribute
    by a set of attributes, one for each component of that TVA; thus, the foregoing
    expression returns a result with attributes NAME, STREET, CITY, STATE, and ZIP.
    Of course, that result is still only in 2NF, not even BCNF, and it still suffers
    from redundancy.


    We might be tempted to conclude from this example that unwrapping TVAs is a good
    idea. But is it enough of a good idea to be enshrined as a *principle* of good
    design, as opposed to a mere recommendation or rule of thumb?^([^(228)](#fn228))


    ## Example 2


    Codd would probably have argued against the design of Example 1 on the grounds
    that values of attribute ADDR aren’t “atomic” (though I’m not aware that he ever
    explicitly addressed the question of tuple valued attributes, as such, in any
    of his writings). Now, I don’t agree with this position myself, for reasons explained
    in detail in Chapter [4](#489629_2_En_4_Chapter.xhtml) of the present book and
    elsewhere—but the point isn’t worth fighting over, because we can obviously replace
    that tuple valued attribute by an attribute of type CHAR as shown in Figure [17-2](#489629_2_En_17_Chapter.xhtml#Fig2).
    And Codd would surely have allowed that revised design, and yet it suffers from
    redundancies precisely analogous to those in Example 1.


    ![../images/489629_2_En_17_Chapter/489629_2_En_17_Fig2_HTML.jpg](images/489629_2_En_17_Chapter/489629_2_En_17_Fig2_HTML.jpg)


    Figure 17-2


    Revised relvar NADDR (attribute ADDR text valued)—sample value


    And if you don’t like this example, consider what could happen if attribute ADDR
    were of some user defined type (ADDRESS, say) instead of type CHAR.


    ## Example 3


    Redundancies similar to those in Example 2 can arise in connection with attributes
    of type DATE, if those attributes include—as they frequently do—the day of the
    week as well as a calendar date (as in, for example, “Friday, January 18th, 2019”).'
