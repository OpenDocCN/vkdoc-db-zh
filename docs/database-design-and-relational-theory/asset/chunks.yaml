    \ independent:\n\n*   **Definition (independent projections):** Projections *R1*\
    \ and *R2* of relvar *R* are independent if and only if every FD that holds in\
    \ *R* also holds in the join of *R1* and *R2*.\n\nHere now is the theorem:\n\n\
    *   **Rissanen’s Theorem** **:** Let relvar *R*, with heading *H*, have projections\
    \ *R1* and *R2*, with headings *H1* and *H2*, respectively; further, let *H1*\
    \ and *H2* both be proper subsets of *H*, let their union be equal to *H*, and\
    \ let their intersection be nonempty.^([^(97)](#fn97)) Then projections *R1* and\
    \ *R2* are independent if and only if (a) their common attributes constitute a\
    \ superkey for at least one of them and (b) every FD that holds in *R* is implied\
    \ by those that hold in at least one of them.\n\nConsider the “good” decomposition\
    \ of S into its projections SNC and CT. Those two projections are independent,\
    \ because (a) the set of common attributes is just {CITY} and {CITY} is a superkey—actually\
    \ a key—for CT, and (b) every FD that holds in S either holds in one of the two\
    \ projections or is implied by those that do (see the next chapter). By contrast,\
    \ consider the “bad” decomposition into the projections SNC and ST. Here the projections\
    \ aren’t independent, because the FD {CITY} → {STATUS} can’t be inferred from\
    \ those holding in those projections (though it’s at least true that the set of\
    \ common attributes, {SNO}, is a superkey—actually a key—for both).\n\nAs a historical\
    \ note, I observe that it was Rissanen’s work on independent projections (which\
    \ was done, or at least published, in 1977) that laid the foundation for the theory\
    \ of what we now call FD preservation.\n\n## Exercises\n\n1.  Relvar SJT from\
    \ the section “An Unfortunate Conflict” is subject to the FD {S,J} → {T}. Write\
    \ a **Tutorial D** CONSTRAINT statement to express the multirelvar constraint\
    \ that replaces this FD if we decompose SJT into its projections TJ and TS on\
    \ {T,J} and {T,S}, respectively.\n\n2.  (*Repeated from the body of the chapter.*)\
    \ Suppose relvar RX2A′ from section “... And Another” is decomposed into its projections\
    \ on {CLASS,STATUS} and {CITY,STATUS}. As noted in that section, an appropriate\
    \ multirelvar constraint will now have to be separately stated and enforced. What\
    \ does that constraint look like?\n\n3.  The following relvar is intended to represent\
    \ a set of United States street addresses:\n\n```\nADDR { STREET , CITY , STATE\
    \ , ZIP }\n```\n\nUsing **Tutorial D** syntax, a typical tuple of this relvar\
    \ might look like this:\n\n```\nTUPLE { STREET '1600 Pennsylvania Ave.' ,\nCITY\
    \ 'Washington' , STATE 'DC' , ZIP '20500' }\n```\n\nAssume, not entirely unrealistically,\
