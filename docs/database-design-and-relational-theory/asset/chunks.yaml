  trans: '

    ## 谓词与命题


    再次考虑供货关系变量 `SP`。和所有关系变量一样，该关系变量旨在表示现实世界的某个部分。实际上，我可以更精确地说：该关系变量的标题表示某个*谓词*，即它是关于现实世界某一部分的一种通用陈述（之所以说“通用”，是因为它是*参数化的*，我稍后会解释）。所讨论的谓词（即关系变量
    `SP` 的谓词）非常简单：


    *   供应商 `SNO` 供应零件 `PNO`，数量为 `QTY`。


    这个谓词是关系变量 `SP` 的*预期解释*——换句话说，即其*含义*。


    或许我应该就本书中*谓词*这一术语的用法再多说几句。首先，你可能已经熟悉这个术语了，因为 SQL 大量使用它来指代布尔值或真值表达式（它谈论比较谓词、`IN`
    谓词、`EXISTS` 谓词等等）。然而，虽然 SQL 的这种用法并非完全错误，但它确实挪用了一个非常通用的术语——该术语在数据库语境中极其重要——并赋予其一个相当专门化的含义，这就是为什么我自己更倾向于不遵循那种用法。


    其次，为了准确起见，我应该解释一下，谓词本身并不是一个陈述语句；确切地说，它是该陈述所作出的断言。例如，关系变量 `SP` 的谓词就是其本身，无论它是用英语、西班牙语还是其他语言表达的。然而，为了简便，在下文中我将假设谓词确实就是一个陈述语句本身，通常（但不一定）是用某种自然语言（如英语）表达的。


    最后，我已经解释了我所说的这个术语的含义，但你应该意识到——尽管有上一段的内容——关于谓词*确切*是什么，即使在逻辑学家中似乎也鲜有共识。特别是，一些作者将谓词视为纯粹的形式构造，其本身没有意义，并将我所说的“预期解释”视为与谓词本身不同的东西。我不想在此陷入关于此类问题的争论；欲进一步讨论，请参阅
    C. J. Date 和 Hugh Darwen 所著的《数据库探索：关于<第三宣言>及相关主题的论文集》(*Database Explorations:
    Essays on The Third Manifesto and Related Topics*, Trafford, 2010) 中的论文《什么是谓词？》(“What’s
    a Predicate?”)。


    你可以将谓词（稍显宽松地）理解为*一个真值函数*。像所有函数一样，它有一组参数；调用时会返回一个结果；并且（因为它是真值函数）该结果要么是 `TRUE`（真），要么是
    `FALSE`（假）。以关系变量 `SP` 的谓词为例，其参数是 `SNO`、`PNO` 和 `QTY`（当然对应于该关系变量的属性），它们代表相应类型的值（在这个简单例子中分别是
    `CHAR`、`CHAR` 和 `INTEGER`）。当我们调用这个函数——当我们*实例化该谓词*时（用逻辑学家的话说）——我们用实参替换形参。假设我们分别用实参
    `S1`、`P1` 和 `300` 替换。我们得到如下陈述：


    *   供应商 `S1` 供应零件 `P1`，数量为 `300`。


    这个陈述实际上是一个*命题*，在逻辑学中，命题是无条件地求值为 `TRUE` 或 `FALSE` 的东西。这里有几个例子：


    1.  爱德华·艾比（Edward Abbey）写了《猴子扳手帮》(*The Monkey Wrench Gang*)。

    2.  威廉·莎士比亚（William Shakespeare）写了《猴子扳手帮》(*The Monkey Wrench Gang*)。


    第一个命题为真，第二个为假。不要陷入常见的误区，认为命题必须总是真的！不过，我此刻谈论的命题*确实*被假定为真命题，我现在解释如下：


    *   首先，如前所述，每个关系变量都有一个相关联的谓词，称为该关系变量的*关系变量谓词*。（因此，*供应商 `SNO` 供应零件 `PNO`，数量为 `QTY`*
    就是关系变量 `SP` 的关系变量谓词。）

    *   设关系变量 `R` 具有谓词 `P`。那么，在某个给定时间 `T` 出现在 `R` 中的每个元组 `t`，都可视为表示某个命题 `p`，该命题是通过在时间
    `T` 使用 `t` 中的属性值作为实参来调用（或*实例化*）`P` 而派生的。

    *   并且（*非常重要！*）我们按约定假设，以这种方式获得的每个命题 `p` 求值结果均为 `TRUE`。


    例如，给定图 2-1 左侧所示的关系变量 `SP` 的示例值，我们假定以下两个命题在时间 `T1` 求值结果均为 `TRUE`：


    *   供应商 `S1` 供应零件 `P1`，数量为 `300`。

    *   供应商 `S2` 供应零件 `P1`，数量为 `300`。


    此外，我们更进一步：如果在某个给定时间 `T`，某个元组看似合理地可以出现在某个关系变量中但实际上没有，那么我们有权假设相应的命题在该时间 `T` 为假。例如，元组


    ```

    ( ''S1'' , ''P2'' , 200 )

    ```


    （采用一种明显的简写表示法）肯定是一个合理的 `SP` 元组；但它在时间 `T1` 并没有出现在关系变量 `SP` 中——我再次指的是图 2-1——因此我们有权假设，在时间
    `T1`，以下命题*并非*为真：


    *   供应商 `S1` 供应零件 `P2`，数量为 `200`。


    （另一方面，该命题在时间 `T2` 为真。）


    总结一下：在任何给定时间，一个给定的关系变量 `R` 包含*所有且仅*那些在该时间表示真命题（即关系变量 `R` 的关系变量谓词的真实实例化）的元组——或者，至少，这是我们在实践中始终假设的。换句话说，我们在实践中采纳了所谓的*封闭世界假设*。由于该假设至关重要——它是我们使用数据库时所做几乎所有事情的基础，尽管很少被明确提及——我想在此将其明确阐述如下：


    *   **定义（封闭世界假设）：** 设关系变量 `R` 具有谓词 `P`。那么*封闭世界假设*（`CWA`）指出：(a) 如果元组 `t` 在时间 `T`
    出现在 `R` 中，则假定与 `t` 对应的 `P` 的实例化 `p` 在时间 `T` 为 `TRUE`；反之，(b) 如果元组 `t` 在时间 `T` 看似合理地可以出现在
    `R` 中但实际没有，则假定与 `t` 对应的 `P` 的实例化 `p` 在时间 `T` 为 `FALSE`。换句话说（稍显宽松）：元组 `t` 在时间 `T`
    出现在关系变量 `R` 中，当且仅当它在时间 `T` “满足 `R` 的谓词”。

    '
- fmt: '## More on Suppliers and Parts


    Now let’s get back to the suppliers-and-parts database as such, with sample values
    as shown in Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1) in the previous chapter.
    Here now are definitions of the three relvars in that database, expressed in a
    language called `Tutorial D` (see further explanation following the definitions):


    ```

    VAR S BASE RELATION

    { SNO CHAR , SNAME CHAR , STATUS INTEGER , CITY CHAR }

    KEY { SNO } ;

    VAR P BASE RELATION

    { PNO CHAR , PNAME CHAR , COLOR CHAR , WEIGHT RATIONAL , CITY CHAR }

    KEY { PNO } ;

    VAR SP BASE RELATION

    { SNO CHAR , PNO CHAR , QTY INTEGER }

    KEY { SNO , PNO }

    FOREIGN KEY { SNO } REFERENCES S

    FOREIGN KEY { PNO } REFERENCES P ;

    ```


    As I said, these definitions are expressed in a language called `Tutorial D`.
    Now, I believe that language is pretty much self-explanatory; however, a comprehensive
    description can be found if needed in the book *Databases, Types, and the Relational
    Model: The Third Manifesto* (3rd edition), by C. J. Date and Hugh Darwen (Addison-Wesley,
    2007).^(22)^ *Note:* As its title suggests, that book also introduces and explains
    *The Third Manifesto*, a precise though somewhat formal definition of the relational
    model and a supporting type theory (including, incidentally, a comprehensive model
    of type inheritance).^(23)^ In particular, it uses the name `D` as a generic name
    for any language that conforms to the principles laid down by *The Third Manifesto*.
    Any number of distinct languages could qualify as a valid `D`; sadly, however,
    SQL isn’t one of them, which is why examples in this book are expressed for the
    most part in `Tutorial D` and not in SQL. (Of course, `Tutorial D` is a valid
    `D`; in fact, it was explicitly designed to be suitable as a vehicle for illustrating
    and teaching the ideas of *The Third Manifesto*.)


    This is as good a point as any to mention that the terminology used in the present
    book is based on that of *The Third Manifesto* (“the *Manifesto*” for short).
    As a consequence, it does differ on occasion from that found in some of the design
    theory literature. For example, that literature typically doesn’t talk about relation
    headings; instead, it uses the term *relation schema*.^(24)^ Nor does it talk
    about relation variables (relvars); instead, what this book refers to as a (relation)
    value that’s assigned to some relvar it calls an *instance* of the corresponding
    *schema*.


    Back to the relvar definitions. As you can see, each of those definitions includes
    a `KEY` specification, which means that every relation that might ever be assigned
    to any of those relvars is required to satisfy the corresponding *key constraint*.
    (Recall from Chapter [1](#489629_2_En_1_Chapter.xhtml) that every relvar does
    have at least one key.) For example, every relation that might ever be assigned
    to relvar `S` is required to satisfy the constraint that no two distinct tuples
    in that relation have the same `SNO` value. What’s more, I’m going to assume throughout
    this book, barring explicit statements to the contrary, that the following *functional
    dependency*^(25)^ (FD) also holds in relvar `S`:


    ```

    { CITY } → { STATUS }

    ```


    You can read this FD, informally, as *STATUS is functionally dependent on CITY*,
    or as *CITY functionally determines STATUS*, or more simply as just *CITY arrow
    STATUS*. What it means is that every relation that might ever be assigned to relvar
    `S` is required to satisfy the constraint that if two tuples in that relation
    have the same `CITY` value, then they must also have the same `STATUS` value.^(26)^
    Observe that the sample value of relvar `S` given in Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1)
    does indeed satisfy this constraint. *Note:* I’ll have a great deal more to say
    about FDs later in Parts II and III of this book, but I’m sure you’re already
    familiar with the basic idea anyway.


    Now, just as `KEY` specifications are used to declare key constraints, so we need
    some kind of syntax in order to be able to declare FD constraints. `Tutorial D`
    provides no specific syntax for that purpose, however^(27)^ (neither does SQL,
    come to that). It does allow them to be expressed in a somewhat roundabout fashion—for
    example:


    ```

    CONSTRAINT XCT

    COUNT ( S { CITY } ) = COUNT ( S { CITY , STATUS } ) ;

    ```


    *Explanation:* In `Tutorial D`, an expression of the form *rx*{*A1*,...,*An*}
    denotes the projection on attributes *A1*, ..., *An* of the relation *r* that
    results from evaluation of the relational expression *rx*. If the current value
    of relvar `S` is the relation *s*, therefore, (a) the expression `S{CITY}` denotes
    the projection of *s* on `CITY`; (b) the expression `S{CITY,STATUS}` denotes the
    projection of *s* on `CITY` and `STATUS`; and (c) the constraint overall—which
    I’ve named, arbitrarily, `XCT`—requires the cardinalities, denoted by the two
    `COUNT` invocations, of those two projections to be equal. (If it’s not obvious
    that requiring these two cardinalities to be equal is equivalent to requiring
    the desired FD constraint to hold, try interpreting constraint `XCT` as stated
    in terms of the sample data in Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1).)


    You might feel, not unreasonably, that those appeals to `COUNT` in the formulation
    of constraint `XCT` are somehow a little inelegant. If so, then here’s an alternative
    formulation that avoids them:


    ```

    CONSTRAINT XCT

    WITH ( CT := S { CITY , STATUS } ) :

    AND ( ( CT JOIN ( CT RENAME { STATUS AS X } ) ) , STATUS = X ) ;

    ```


    *Explanation:* First, the `WITH` specification (“`WITH (…):`”) serves merely to
    introduce a name, `CT`, that can be used later in the overall expression to avoid
    having to write out the expression it stands for, possibly several times over.
    Second, the `Tutorial D` `RENAME` operator is more or less self-explanatory (but
    is defined anyway, in the answer to Exercise 2.15). Third, the `Tutorial D` expression
    `AND(*rx*,*bx*)`, where *rx* is a relational expression and *bx* is a boolean
    expression, returns `TRUE` if and only if the condition denoted by *bx* evaluates
    to `TRUE` for every tuple in the relation denoted by *rx*.


    The foregoing state of affairs notwithstanding, I’ll assume throughout this book
    that FDs can be stated (or “declared”) using the simple arrow notation illustrated
    earlier. Analogous remarks apply to other kinds of dependencies also (in particular,
    to join dependencies and multivalued dependencies, which I’ll be introducing in
    Chapters [9](#489629_2_En_9_Chapter.xhtml) and [12](#489629_2_En_12_Chapter.xhtml),
    respectively).


    I’ll close this chapter with a little teaser. Assuming the only constraints that
    apply to the suppliers-and-parts database are the foregoing FD constraint and
    the specified key (and foreign key) constraints, then we can say that relvars
    `S`, `P`, and `SP` are in second, fifth, and sixth normal form, respectively.
    To understand the significance of these observations, please read on!'
  raw: '## More on Suppliers and Parts


    Now let’s get back to the suppliers-and-parts database as such, with sample values
    as shown in Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1) in the previous chapter.
    Here now are definitions of the three relvars in that database, expressed in a
    language called **Tutorial D** (see further explanation following the definitions):


    ```

    VAR S BASE RELATION

    { SNO CHAR , SNAME CHAR , STATUS INTEGER , CITY CHAR }

    KEY { SNO } ;

    VAR P BASE RELATION

    { PNO CHAR , PNAME CHAR , COLOR CHAR , WEIGHT RATIONAL , CITY CHAR }

    KEY { PNO } ;

    VAR SP BASE RELATION

    { SNO CHAR , PNO CHAR , QTY INTEGER }

    KEY { SNO , PNO }

    FOREIGN KEY { SNO } REFERENCES S

    FOREIGN KEY { PNO } REFERENCES P ;

    ```


    As I said, these definitions are expressed in a language called **Tutorial D**.
    Now, I believe that language is pretty much self-explanatory; however, a comprehensive
    description can be found if needed in the book *Databases, Types, and the Relational
    Model:* *The* *Third Manifesto* (3rd edition), by C. J. Date and Hugh Darwen (Addison-Wesley,
    2007).^([^(22)](#fn22)) *Note:* As its title suggests, that book also introduces
    and explains *The Third Manifesto*, a precise though somewhat formal definition
    of the relational model and a supporting type theory (including, incidentally,
    a comprehensive model of type inheritance).^([^(23)](#fn23)) In particular, it
    uses the name **D** as a generic name for any language that conforms to the principles
    laid down by *The Third Manifesto*. Any number of distinct languages could qualify
    as a valid **D**; sadly, however, SQL isn’t one of them, which is why examples
    in this book are expressed for the most part in **Tutorial D** and not in SQL.
    (Of course, **Tutorial D** is a valid **D**; in fact, it was explicitly designed
    to be suitable as a vehicle for illustrating and teaching the ideas of *The Third
    Manifesto*.)


    This is as good a point as any to mention that the terminology used in the present
    book is based on that of *The Third Manifesto* (“the *Manifesto*” for short).
    As a consequence, it does differ on occasion from that found in some of the design
    theory literature. For example, that literature typically doesn’t talk about relation
    headings; instead, it uses the term *relation schema* .^([^(24)](#fn24)) Nor does
    it talk about relation variables (relvars); instead, what this book refers to
    as a (relation) value that’s assigned to some relvar it calls an *instance* of
    the corresponding *schema*.


    Back to the relvar definitions. As you can see, each of those definitions includes
    a KEY specification, which means that every relation that might ever be assigned
    to any of those relvars is required to satisfy the corresponding *key constraint*.
    (Recall from Chapter [1](#489629_2_En_1_Chapter.xhtml) that every relvar does
    have at least one key.) For example, every relation that might ever be assigned
    to relvar S is required to satisfy the constraint that no two distinct tuples
    in that relation have the same SNO value. What’s more, I’m going to assume throughout
    this book, barring explicit statements to the contrary, that the following *functional
    dependency*^([^(25)](#fn25)) (FD) also holds in relvar S:


    ```

    { CITY } → { STATUS }

    ```


    You can read this FD, informally, as *STATUS is functionally dependent on CITY*,
    or as *CITY functionally determines STATUS*, or more simply as just *CITY arrow
    STATUS*. What it means is that every relation that might ever be assigned to relvar
    S is required to satisfy the constraint that if two tuples in that relation have
    the same CITY value, then they must also have the same STATUS value.^([^(26)](#fn26))
    Observe that the sample value of relvar S given in Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1)
    does indeed satisfy this constraint. *Note:* I’ll have a great deal more to say
    about FDs later in Parts II and III of this book, but I’m sure you’re already
    familiar with the basic idea anyway.


    Now, just as KEY specifications are used to declare key constraints, so we need
    some kind of syntax in order to be able to declare FD constraints. **Tutorial
    D** provides no specific syntax for that purpose, however^([^(27)](#fn27)) (neither
    does SQL, come to that). It does allow them to be expressed in a somewhat roundabout
    fashion—for example:


    ```

    CONSTRAINT XCT

    COUNT ( S { CITY } ) = COUNT ( S { CITY , STATUS } ) ;

    ```


    *Explanation:* In **Tutorial D**, an expression of the form *rx*{*A1*,...,*An*}
    denotes the projection on attributes *A1*, ..., *An* of the relation *r* that
    results from evaluation of the relational expression *rx*. If the current value
    of relvar S is the relation *s*, therefore, (a) the expression S{CITY} denotes
    the projection of *s* on CITY; (b) the expression S{CITY,STATUS} denotes the projection
    of *s* on CITY and STATUS; and (c) the constraint overall—which I’ve named, arbitrarily,
    XCT—requires the cardinalities, denoted by the two COUNT invocations, of those
    two projections to be equal. (If it’s not obvious that requiring these two cardinalities
    to be equal is equivalent to requiring the desired FD constraint to hold, try
    interpreting constraint XCT as stated in terms of the sample data in Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1).)


    You might feel, not unreasonably, that those appeals to COUNT in the formulation
    of constraint XCT are somehow a little inelegant. If so, then here’s an alternative
    formulation that avoids them:


    `CONSTRAINT XCT`


    `WITH ( CT := S { CITY , STATUS } ) :`


    `AND ( ( CT JOIN ( CT RENAME { STATUS AS X } ) , STATUS = X ) ;`


    *Explanation:* First, the WITH specification (“WITH (…):”) serves merely to introduce
    a name, CT, that can be used later in the overall expression to avoid having to
    write out the expression it stands for, possibly several times over. Second, the
    **Tutorial D** RENAME operator is more or less self-explanatory (but is defined
    anyway, in the answer to Exercise 2.15). Third, the **Tutorial D** expression
    AND(*rx*,*bx*), where *rx* is a relational expression and *bx* is a boolean expression,
    returns TRUE if and only if the condition denoted by *bx* evaluates to TRUE for
    every tuple in the relation denoted by *rx*.


    The foregoing state of affairs notwithstanding, I’ll assume throughout this book
    that FDs can be stated (or “declared”) using the simple arrow notation illustrated
    earlier. Analogous remarks apply to other kinds of dependencies also (in particular,
    to join dependencies and multivalued dependencies, which I’ll be introducing in
    Chapters [9](#489629_2_En_9_Chapter.xhtml) and [12](#489629_2_En_12_Chapter.xhtml),
    respectively).


    I’ll close this chapter with a little teaser. Assuming the only constraints that
    apply to the suppliers-and-parts database are the foregoing FD constraint and
    the specified key (and foreign key) constraints, then we can say that relvars
    S, P, and SP are in second, fifth, and sixth normal form, respectively. To understand
    the significance of these observations, please read on!'
  trans: '## 关于供应商与零件的更多内容


    现在，让我们回到供应商与零件数据库本身，其示例值如前一章图 1-1 所示。以下是该数据库中三个关系变量的定义，使用一种名为 `Tutorial D` 的语言表达（定义之后有进一步解释）：


    ```

    VAR S BASE RELATION

    { SNO CHAR , SNAME CHAR , STATUS INTEGER , CITY CHAR }

    KEY { SNO } ;

    VAR P BASE RELATION

    { PNO CHAR , PNAME CHAR , COLOR CHAR , WEIGHT RATIONAL , CITY CHAR }

    KEY { PNO } ;

    VAR SP BASE RELATION

    { SNO CHAR , PNO CHAR , QTY INTEGER }

    KEY { SNO , PNO }

    FOREIGN KEY { SNO } REFERENCES S

    FOREIGN KEY { PNO } REFERENCES P ;

    ```


    正如我所说，这些定义是用一种名为 `Tutorial D` 的语言表达的。我认为这种语言在很大程度上是不言自明的；然而，如果需要，可以在 C. J. Date
    和 Hugh Darwen 所著的 *Databases, Types, and the Relational Model: The Third Manifesto*
    （第 3 版，Addison-Wesley，2007 年）一书中找到全面的描述。²²^ *注意：* 正如其标题所示，该书也介绍并解释了*《The Third
    Manifesto》*，这是对关系模型及其支持的类型理论（顺带包括一个全面的类型继承模型）的一个精确但有些正式的定义。²³^ 特别地，它使用名称 `D` 作为任何符合
    *《The Third Manifesto》* 所确立原则的语言的通用名称。任何数量的不同语言都可以成为有效的 `D`；然而遗憾的是，SQL 并不是其中之一，这就是为什么本书中的示例大多用
    `Tutorial D` 而非 SQL 表达的原因。（当然，`Tutorial D` 是一个有效的 `D`；事实上，它是被明确设计为适合用作阐述和教授 *《The
    Third Manifesto》* 思想的载体。）


    现在正好提一下，本书使用的术语基于*《The Third Manifesto》*（简称“*Manifesto*”）。因此，它偶尔会与一些设计理论文献中的术语有所不同。例如，那些文献通常不谈论关系标题；而是使用术语
    *关系模式*。²⁴^ 它们也不谈论关系变量；而是将本书中称为赋给某个关系变量的关系值称为相应*模式*的*实例*。


    回到关系变量的定义。如你所见，每个定义都包含一个 `KEY` 规范，这意味着任何可能赋给这些关系变量的关系都必须满足相应的*键约束*。（回想第 1 章，每个关系变量确实至少有一个键。）例如，任何可能赋给关系变量
    `S` 的关系都必须满足这样一个约束：在该关系中，没有两个不同的元组具有相同的 `SNO` 值。此外，在本书中，除非有明确声明，否则我将假设以下*函数依赖*²⁵^（FD）也在关系变量
    `S` 中成立：


    ```

    { CITY } → { STATUS }

    ```


    你可以非正式地将此 FD 读作 *STATUS 函数依赖于 CITY*，或 *CITY 函数决定 STATUS*，或更简单地读作 *CITY 箭头 STATUS*。它的意思是，任何可能赋给关系变量
    `S` 的关系都必须满足这样一个约束：如果该关系中的两个元组具有相同的 `CITY` 值，那么它们也必须具有相同的 `STATUS` 值。²⁶^ 观察图 1-1
    中给出的关系变量 `S` 的示例值，它确实满足此约束。*注意：* 在本书的第二部分和第三部分，我将对 FD 进行更多的讨论，但我相信你已经熟悉了基本思想。


    现在，正如使用 `KEY` 规范来声明键约束一样，我们需要某种语法来声明 FD 然而约束。然而，`Tutorial D` 并没有为此目的提供特定的语法²⁷^（SQL
    也没有）。它确实允许以某种迂回的方式表达它们——例如：


    ```

    CONSTRAINT XCT

    COUNT ( S { CITY } ) = COUNT ( S { CITY , STATUS } ) ;

    ```


    *解释：* 在 `Tutorial D` 中，形式为 *rx*{*A1*,...,*An*} 的表达式表示对关系表达式 *rx* 求值所得的关系 *r* 在属性
    *A1*, ..., *An* 上的投影。因此，如果关系变量 `S` 的当前值是关系 *s*，那么 (a) 表达式 `S{CITY}` 表示 *s* 在 `CITY`
    上的投影；(b) 表达式 `S{CITY,STATUS}` 表示 *s* 在 `CITY` 和 `STATUS` 上的投影；(c) 整个约束——我随意命名为
    `XCT`——要求这两个投影的基数（由两个 `COUNT` 调用表示）相等。（如果要求这两个基数相等等价于要求所需的 FD 约束成立这一点不明显，可以尝试根据图
    1-1 中的样本数据来解释所陈述的约束 `XCT`。）


    你可能会觉得，在约束 `XCT` 的表述中使用 `COUNT` 有点不够优雅，这种感觉并非没有道理。如果是这样，那么这里有一个避免使用它们的替代表述：


    ```

    CONSTRAINT XCT

    WITH ( CT := S { CITY , STATUS } ) :

    AND ( ( CT JOIN ( CT RENAME { STATUS AS X } ) ) , STATUS = X ) ;

    ```


    *解释：* 首先，`WITH` 规范（“`WITH (…):`”）仅用于引入一个名称 `CT`，该名称可以在后面的整个表达式中使用，以避免多次写出它所代表的表达式。其次，`Tutorial
    D` 的 `RENAME` 运算符或多或少是不言自明的（但无论如何，在练习 2.15 的答案中有定义）。第三，`Tutorial D` 表达式 `AND(*rx*,*bx*)`，其中
    *rx* 是关系表达式，*bx* 是布尔表达式，当且仅当对于 *rx* 所表示的关系中的每个元组，*bx* 所表示的条件求值为 `TRUE` 时，才返回 `TRUE`。


    尽管有上述情况，我将在本书中假设可以使用前面演示的简单箭头符号来陈述（或“声明”）FD。类似的评论也适用于其他类型的依赖（特别是连接依赖和多值依赖，我将分别在第
    9 章和第 12 章介绍）。


    我将以一个小悬念结束本章。假设适用于供应商与零件数据库的唯一约束是前述的 FD 约束以及指定的键（和外键）约束，那么我们可以说关系变量 `S`、`P` 和
    `SP` 分别处于第二、第五和第六范式。要理解这些观察的意义，请继续阅读！'
- fmt: "## Exercises\n\nThe purpose of these exercises is to test your knowledge of\
    \ relational theory. Most of them can’t be answered from material in the present\
    \ chapter alone. However, everything mentioned in those exercises, and in the\
    \ answers to them in the next section, is discussed in detail in *SQL and Relational\
    \ Theory*.\n\n1.  What’s `The Information Principle`?\n\n2.  Which of the following\
    \ statements are true?\n    1.  Relations (and hence relvars) have no ordering\
    \ to their tuples.\n    2.  Relations (and hence relvars) have no ordering to\
    \ their attributes.\n    3.  Relations (and hence relvars) never have any unnamed\
    \ attributes.\n    4.  Relations (and hence relvars) never have two or more attributes\
    \ with the same name.\n    5.  Relations (and hence relvars) never contain duplicate\
    \ tuples.\n    6.  Relations (and hence relvars) never contain nulls.\n    7.\
    \  Relations (and hence relvars) are always in 1NF.\n    8.  The types over which\
    \ relational attributes are defined can be arbitrarily complex.\n    9.  Relations\
    \ (and hence relvars) themselves have types.\n\n3.  Which of the following statements\
    \ are true?\n    1.  Every subset of a heading is a heading.\n    2.  Every subset\
    \ of a body is a body.\n    3.  Every subset of a tuple is a tuple.\n\n4.  The\
    \ term `domain` is usually found in texts on relational theory, but it wasn’t\
    \ mentioned in the body of the chapter. What do you make of this fact?\n\n5. \
    \ Define the terms `proposition` and `predicate`. Give examples.\n\n6.  State\
    \ the predicates for relvars `S`, `P`, and `SP` from the suppliers-and-parts database.\n\
    \n7.  Let `DB` be any database you happen to be familiar with and let `R` be any\
    \ relvar in `DB`. What’s the predicate for `R`? *Note:* The point of this exercise\
    \ is to get you to apply some of the ideas discussed in the body of this chapter\
    \ to your own data, in an attempt to get you thinking about data in general in\
    \ such terms. Obviously the exercise has no unique right answer.\n\n8.  Explain\
    \ `The Closed World Assumption` in your own terms. Could there be such a thing\
    \ as `The Open World Assumption`?\n\n9.  Give definitions, as precise as you can\
    \ make them, of the terms `tuple` and `relation`.\n\n10. State as precisely as\
    \ you can what it means for (a) two tuples to be equal; (b) two relations to be\
    \ equal.\n\n11. A tuple is a set (a set of components); so do you think it might\
    \ make sense to define versions of the usual set operators (union, intersection,\
    \ etc.) that apply to tuples?\n\n12. To repeat, a tuple is a set of components.\
    \ But the empty set is a legitimate set; thus, we could define an `empty tuple`\
    \ to be a tuple where the pertinent set of components is empty. What are the implications?\
    \ Can you think of any uses for such a tuple?\n\n13. A key is a set of attributes\
    \ and the empty set is a legitimate set; thus, we could define an `empty key`\
    \ to be a key where the pertinent set of attributes is empty. What are the implications?\
    \ Can you think of any uses for such a key?\n\n14. A predicate has a set of parameters\
    \ and the empty set is a legitimate set; thus, a predicate could have an empty\
    \ set of parameters. What are the implications?\n\n15. The normalization discipline\
    \ makes heavy use of the relational operators projection and join. Give definitions,\
    \ as precise as you can make them, of these two operators. Also, have a go at\
    \ defining the attribute renaming operator (`RENAME` in `Tutorial D`).\n\n16.\
    \ The operators of the relational algebra form a closed system. What do you understand\
    \ by this remark?\n\n## Answers\n\n1.  `The Information Principle` is a fundamental\
    \ principle that underpins the entire relational model. It can be stated as follows:\n\
    \n    **Definition (`The Information Principle`):** The only kind of variable\
    \ allowed in a relational database is the relation variable or relvar. Equivalently,\
    \ the entire information content of the database at any given time is represented\
    \ in one and only one way—namely, as values in attribute positions in tuples in\
    \ relations.\n\n    Note that SQL tables (at least, SQL tables in the database)\
    \ that involve left to right column ordering or contain duplicate rows or nulls\
    \ all violate `The Information Principle` (see the answer to the next exercise).\
    \ Interestingly, however, SQL tables with anonymous columns or columns with nonunique\
    \ names apparently don’t violate the principle. The reason is that the principle\
    \ as stated applies explicitly to relvars or relations *in the database*. And\
    \ while SQL tables in general can have anonymous columns or columns with nonunique\
    \ names, such tables can’t be part of the database. This state of affairs suggests\
    \ rather strongly that `The Information Principle` could do with a little tightening\
    \ up.\n\n2.  True. b. True. c. True. d. True. e. True. f. True. g. True. h. False.\
    \ However, it’s “almost” true; there are two small exceptions, both of which I’ll\
    \ simplify just slightly for present purposes. The first is that if relation `r`\
    \ is of type `T`, then no attribute of `r` can itself be of type `T`. The second\
    \ is that no relation in the database can have an attribute of any pointer type.^([^(28)](#fn28))\
    \ i. True.\n\n    *Subsidiary exercise:* Would any of the foregoing answers change\
    \ if the original statements were framed in terms of SQL tables instead of relations\
    \ and relvars?\n\n    *Answer:* Yes, they would all change except for a. and h.\
    \ In the case of h., moreover, the answer ought really to change too, from “False”\
    \ to “False, but even more so.” One reason for this state of affairs—not the only\
    \ one—is that SQL has no proper notion of table type, and SQL columns thus can’t\
    \ possibly be of such a type a fortiori.\n\n3.  True. b. True. c. True. *Note:*\
    \ Let me state for the record here that throughout this book, in accordance with\
    \ standard mathematical practice, I take expressions of the form “`B` is a subset\
    \ of `A`” (in symbols, “`B` ⊆ `A`”) to include the possibility that `B` and `A`\
    \ might be equal. Thus, e.g., every heading is a subset of itself, and so is every\
    \ body, and so is every tuple. When I want to exclude such a possibility, I’ll\
    \ talk explicitly in terms of *proper* subsets (in symbols, “`B` ⊂ `A`”). For\
    \ example, the body of our usual suppliers relation is certainly a subset of itself,\
    \ but not a proper subset of itself (*no* set is a proper subset of itself). What’s\
    \ more, the foregoing remarks apply equally to supersets, mutatis mutandis; for\
    \ example, the body of our usual suppliers relation is a superset of itself, but\
    \ not a proper superset of itself. *More terminology:* A set is said to *include*\
    \ its subsets. By the way, don’t confuse inclusion with *containment*—a set *includes*\
    \ its subsets but *contains* its elements .\n\n4.  The reason the term wasn’t\
    \ mentioned in the body of the chapter is that it’s just a synonym for `type`.\
    \ (Early relational writings, my own included, tended to use it, but more recent\
    \ ones use `type` instead, since it’s shorter and has a more extensive pedigree\
    \ anyway, at least in the computing world.) Thus, a domain is a named, finite\
    \ set of values—all possible values of some specific kind: for example, all possible\
    \ integers, or all possible character strings, or all possible triangles, or all\
    \ possible XML documents, or all possible relations with a specific heading (etc.,\
    \ etc.). By the way, don’t confuse domains as understood in the relational world\
    \ with the construct of the same name in SQL, which (as explained in *SQL and\
    \ Relational Theory*) can be regarded at best as a very weak kind of type.\n\n\
    5.  See the body of the chapter."
  raw: "## Exercises\n\nThe purpose of these exercises is to test your knowledge of\
    \ relational theory. Most of them can’t be answered from material in the present\
    \ chapter alone. However, everything mentioned in those exercises, and in the\
    \ answers to them in the next section, is discussed in detail in *SQL and Relational\
    \ Theory*.\n\n1.  What’s *The Information Principle?*\n\n2.  Which of the following\
    \ statements are true?\n    1.  Relations (and hence relvars) have no ordering\
    \ to their tuples.\n\n    2.  Relations (and hence relvars) have no ordering to\
    \ their attributes.\n\n    3.  Relations (and hence relvars) never have any unnamed\
    \ attributes.\n\n    4.  Relations (and hence relvars) never have two or more\
    \ attributes with the same name.\n\n    5.  Relations (and hence relvars) never\
    \ contain duplicate tuples.\n\n    6.  Relations (and hence relvars) never contain\
    \ nulls.\n\n    7.  Relations (and hence relvars) are always in 1NF.\n\n    8.\
    \  The types over which relational attributes are defined can be arbitrarily complex.\n\
    \n    9.  Relations (and hence relvars) themselves have types.\n\n3.  Which of\
    \ the following statements are true?\n    1.  Every subset of a heading is a heading.\n\
    \n    2.  Every subset of a body is a body.\n\n    3.  Every subset of a tuple\
    \ is a tuple.\n\n4.  The term *domain* is usually found in texts on relational\
    \ theory, but it wasn’t mentioned in the body of the chapter. What do you make\
    \ of this fact?\n\n5.  Define the terms *proposition* and *predicate*. Give examples.\n\
    \n6.  State the predicates for relvars S, P, and SP from the suppliers-and-parts\
    \ database.\n\n7.  Let *DB* be any database you happen to be familiar with and\
    \ let *R* be any relvar in *DB*. What’s the predicate for *R*? *Note:* The point\
    \ of this exercise is to get you to apply some of the ideas discussed in the body\
    \ of this chapter to your own data, in an attempt to get you thinking about data\
    \ in general in such terms. Obviously the exercise has no unique right answer.\n\
    \n8.  Explain *The Closed World Assumption* in your own terms. Could there be\
    \ such a thing as *The Open World Assumption*?\n\n9.  Give definitions, as precise\
    \ as you can make them, of the terms *tuple* and *relation*.\n\n10.  State as\
    \ precisely as you can what it means for (a) two tuples to be equal; (b) two relations\
    \ to be equal.\n\n11.  A tuple is a set (a set of components); so do you think\
    \ it might make sense to define versions of the usual set operators (union, intersection,\
    \ etc.) that apply to tuples?\n\n12.  To repeat, a tuple is a set of components.\
    \ But the empty set is a legitimate set; thus, we could define an *empty tuple*\
    \ to be a tuple where the pertinent set of components is empty. What are the implications?\
    \ Can you think of any uses for such a tuple?\n\n13.  A key is a set of attributes\
    \ and the empty set is a legitimate set; thus, we could define an *empty key*\
    \ to be a key where the pertinent set of attributes is empty. What are the implications?\
    \ Can you think of any uses for such a key?\n\n14.  A predicate has a set of parameters\
    \ and the empty set is a legitimate set; thus, a predicate could have an empty\
    \ set of parameters. What are the implications?\n\n15.  The normalization discipline\
    \ makes heavy use of the relational operators projection and join. Give definitions,\
    \ as precise as you can make them, of these two operators. Also, have a go at\
    \ defining the attribute renaming operator (RENAME in **Tutorial D**).\n\n16.\
    \  The operators of the relational algebra form a closed system. What do you understand\
    \ by this remark?\n\n## Answers\n\n1.  *The Information Principle* is a fundamental\
    \ principle that underpins the entire relational model. It can be stated as follows:\n\
    \n**Definition (*****The Information Principle*****)** **:** The only kind of\
    \ variable allowed in a relational database is the relation variable or relvar.\
    \ Equivalently, the entire information content of the database at any given time\
    \ is represented in one and only one way—namely, as values in attribute positions\
    \ in tuples in relations.\n\nNote that SQL tables (at least, SQL tables in the\
    \ database) that involve left to right column ordering or contain duplicate rows\
    \ or nulls all violate *The Information Principle* (see the answer to the next\
    \ exercise). Interestingly, however, SQL tables with anonymous columns or columns\
    \ with nonunique names apparently don’t violate the principle. The reason is that\
    \ the principle as stated applies explicitly to relvars or relations *in the database*.\
    \ And while SQL tables in general can have anonymous columns or columns with nonunique\
    \ names, such tables can’t be part of the database. This state of affairs suggests\
    \ rather strongly that *The Information Principle* could do with a little tightening\
    \ up.\n\n2.  True. b. True. c. True. d. True. e. True. f. True. g. True. h. False.\
    \ However, it’s “almost” true; there are two small exceptions, both of which I’ll\
    \ simplify just slightly for present purposes. The first is that if relation *r*\
    \ is of type *T*, then no attribute of *r* can itself be of type *T*. The second\
    \ is that no relation in the database can have an attribute of any pointer type.^([^(28)](#fn28))\
    \ i. True.\n\n*Subsidiary exercise:* Would any of the foregoing answers change\
    \ if the original statements were framed in terms of SQL tables instead of relations\
    \ and relvars?\n\n*Answer:* Yes, they would all change except for a. and h. In\
    \ the case of h., moreover, the answer ought really to change too, from “False”\
    \ to “False, but even more so.” One reason for this state of affairs—not the only\
    \ one—is that SQL has no proper notion of table type, and SQL columns thus can’t\
    \ possibly be of such a type a fortiori.\n\n3.  True. b. True. c. True. *Note:*\
    \ Let me state for the record here that throughout this book, in accordance with\
    \ standard mathematical practice, I take expressions of the form “*B* is a subset\
    \ of *A*” (in symbols, “*B* ⊆ *A*”) to include the possibility that *B* and *A*\
    \ might be equal. Thus, e.g., every heading is a subset of itself, and so is every\
    \ body, and so is every tuple. When I want to exclude such a possibility, I’ll\
    \ talk explicitly in terms of *proper* subsets (in symbols, “*B* ⊂ *A*”). For\
    \ example, the body of our usual suppliers relation is certainly a subset of itself,\
    \ but not a proper subset of itself (*no* set is a proper subset of itself). What’s\
    \ more, the foregoing remarks apply equally to supersets, mutatis mutandis; for\
    \ example, the body of our usual suppliers relation is a superset of itself, but\
    \ not a proper superset of itself. *More terminology:* A set is said to *include*\
    \ its subsets. By the way, don’t confuse inclusion with *containment*—a set *includes*\
    \ its subsets but *contains* its elements .\n\n4.  The reason the term wasn’t\
    \ mentioned in the body of the chapter is that it’s just a synonym for *type*.\
    \ (Early relational writings, my own included, tended to use it, but more recent\
    \ ones use *type* instead, since it’s shorter and has a more extensive pedigree\
    \ anyway, at least in the computing world.) Thus, a domain is a named, finite\
    \ set of values—all possible values of some specific kind: for example, all possible\
    \ integers, or all possible character strings, or all possible triangles, or all\
    \ possible XML documents, or all possible relations with a specific heading (etc.,\
    \ etc.). By the way, don’t confuse domains as understood in the relational world\
    \ with the construct of the same name in SQL, which (as explained in *SQL and\
    \ Relational Theory*) can be regarded at best as a very weak kind of type.\n\n\
    5.  See the body of the chapter."
  trans: "## 练习\n\n这些练习旨在测试你对关系理论的了解。其中大部分无法仅凭本章内容作答。然而，这些练习以及下一节答案中提及的所有内容，都在《*SQL\
    \ 与关系理论*》一书中有详细讨论。\n\n1.  什么是 `信息原理`？\n\n2.  以下哪些陈述是正确的？\n    1.  关系（以及关系变量）的元组没有顺序。\n\
    \    2.  关系（以及关系变量）的属性没有顺序。\n    3.  关系（以及关系变量）永远不会有没有名称的属性。\n    4.  关系（以及关系变量）永远不会有两个或更多同名的属性。\n\
    \    5.  关系（以及关系变量）永远不会包含重复的元组。\n    6.  关系（以及关系变量）永远不会包含空值。\n    7.  关系（以及关系变量）总是处于第一范式。\n\
    \    8.  关系属性所基于的类型可以任意复杂。\n    9.  关系（以及关系变量）本身具有类型。\n\n3.  以下哪些陈述是正确的？\n   \
    \ 1.  每个标题的子集都是一个标题。\n    2.  每个主体的子集都是一个主体。\n    3.  每个元组的子集都是一个元组。\n\n4.  `定义域`\
    \ 这个术语通常在关系理论的文本中找到，但在本章正文中并未提及。你如何看待这一事实？\n\n5.  定义 `命题` 和 `谓词` 这两个术语。并举例说明。\n\
    \n6.  阐明供应商-零件数据库中关系变量 `S`、`P` 和 `SP` 的谓词。\n\n7.  设 `DB` 为你碰巧熟悉的任意数据库，并设 `R` 为\
    \ `DB` 中的任意关系变量。`R` 的谓词是什么？*注意：* 此练习的要点是让你将本章正文讨论的一些想法应用到你自己的数据上，以期促使你用这些术语来泛化地思考数据。显然，这个练习没有唯一的正确答案。\n\
    \n8.  用你自己的话解释 `封闭世界假设`。是否存在一种叫做 `开放世界假设` 的东西？\n\n9.  尽可能精确地定义 `元组` 和 `关系` 这两个术语。\n\
    \n10. 尽可能精确地说明：(a) 两个元组相等意味着什么；(b) 两个关系相等意味着什么。\n\n11. 元组是一个集合（分量的集合）；那么你认为定义适用于元组的常规集合运算符（并、交等）的版本是否有意义？\n\
    \n12. 再次强调，元组是分量的集合。但空集是一个合法的集合；因此，我们可以定义一个 `空元组`，即相关分量集合为空的元组。这有何含义？你能想到这种元组的任何用途吗？\n\
    \n13. 键是一个属性的集合，而空集是一个合法的集合；因此，我们可以定义一个 `空键`，即相关属性集合为空的键。这有何含义？你能想到这种键的任何用途吗？\n\
    \n14. 谓词有一个参数的集合，而空集是一个合法的集合；因此，一个谓词可以有空的参数集合。这有何含义？\n\n15. 规范化规则大量使用关系运算符投影和连接。尽可能精确地定义这两个运算符。另外，尝试定义属性重命名运算符（`Tutorial\
    \ D` 中的 `RENAME`）。\n\n16. 关系代数的运算符构成了一个封闭系统。你如何理解这一论述？\n\n## 答案\n\n1.  `信息原理`\
    \ 是支撑整个关系模型的基本原理。可以表述如下：\n\n    **定义（`信息原理`）：** 关系数据库中唯一允许的变量是关系变量或关系变量。等价地，数据库在任何给定时间点的全部信息内容仅以一种方式表示——即，作为关系中元组内属性位置上的值。\n\
    \n    注意，涉及从左到右列顺序或包含重复行或空值的 SQL 表（至少是数据库中的 SQL 表）都违反了 `信息原理`（参见下一个练习的答案）。然而有趣的是，具有匿名列或非唯一列名的\
    \ SQL 表显然不违反该原理。原因是所陈述的原理明确适用于数据库中的关系变量或关系。虽然 SQL 表通常可以有匿名列或非唯一列名，但这样的表不能成为数据库的一部分。这种状况相当强烈地表明，`信息原理`\
    \ 可能需要稍作收紧。\n\n2.  a. 正确。b. 正确。c. 正确。d. 正确。e. 正确。f. 正确。g. 正确。h. 错误。然而，这“几乎”是正确的；有两个小的例外，为了当前目的我稍作简化。第一个是，如果关系\
    \ `r` 的类型是 `T`，那么 `r` 的任何属性本身都不能是类型 `T`。第二个是，数据库中任何关系都不能有任何指针类型的属性。^(²⁸) i. 正确。\n\
    \n    *辅助练习：* 如果原始陈述是针对 SQL 表而非关系和关系变量来表述的，上述答案中是否有任何会改变？\n\n    *答案：* 是的，除了 a.\
    \ 和 h. 以外，其他都会改变。对于 h.，答案实际上也应该改变，从“错误”变为“错误，但更是如此”。造成这种状况的一个原因（并非唯一原因）是 SQL 没有恰当的表类型概念，因此\
    \ SQL 列根本不可能属于这种类型。\n\n3.  a. 正确。b. 正确。c. 正确。*注意：* 在此我需声明，在本书中，按照标准数学惯例，我将“`B`\
    \ 是 `A` 的子集”（符号表示为“`B` ⊆ `A`”）这种形式的表述理解为包含 `B` 和 `A` 可能相等的情况。因此，例如，每个标题都是其自身的子集，每个主体也是，每个元组也是。当我想排除这种可能性时，我会明确使用\
    \ *真* 子集（符号表示为“`B` ⊂ `A`”）。例如，我们通常的供应商关系的主体当然是它自身的子集，但不是它的真子集（*没有* 集合是其自身的真子集）。此外，上述评论同样适用于超集，作必要修改即可；例如，我们通常的供应商关系的主体是其自身的超集，但不是其自身的真超集。*更多术语：*\
    \ 一个集合被称为 *包含* 其子集。顺便说一句，不要把包含（inclusion）与 *包含关系*（containment）混淆——一个集合 *包含* 其子集，但\
    \ *含有* 其元素。\n\n4.  该术语未在正文中提及的原因是，它只是 `类型` 的同义词。（早期的关系著作，包括我自己的，倾向于使用它，但近期的著作则使用\
    \ `类型` 代替，因为它更简短，并且至少在计算机领域有更悠久的历史渊源。）因此，定义域是一个命名的、有限的值集合——某个特定种类的所有可能值：例如，所有可能的整数，或所有可能的字符串，或所有可能的三角形，或所有可能的\
    \ XML 文档，或具有特定标题的所有可能的关系（等等，等等）。顺便说一句，不要将关系世界中理解的定义域与 SQL 中同名的构造相混淆，后者（如《*SQL\
    \ 与关系理论*》中所解释的）充其量只能被视为一种非常弱的类型。\n\n5.  见本章正文。"
- fmt: '## 关系变量定义


    *   **Relvar S**：供应商*SNO*命名为*SNAME*，位于城市*CITY*，并具有状态*STATUS*。

    *   **Relvar P**：零件*PNO*命名为*PNAME*，具有颜色*COLOR*和重量*WEIGHT*，并存储在城市*CITY*。

    *   **Relvar SP**：供应商*SNO*以数量*QTY*供应零件*PNO*。


    ## 答案


    *未提供答案。*


    ## 封闭世界假设与开放世界假设


    *封闭世界假设*粗略地说，是指数据库陈述或隐含的一切都是真的，而其他一切都是假的。^([^(29)](#fn29)) 而*开放世界假设*——是的，确实有这种东西——则是指数据库陈述或隐含的一切都是真的，而其他一切都是未知的。这有什么含义？首先，让我们同意将*封闭世界假设*和*开放世界假设*分别缩写为CWA和OWA。现在考虑查询“供应商S6在罗马吗？”（更精确地说，“在关系变量*S*中，是否存在*SNO*值为''S6''且*CITY*值为''罗马''的元组？”）。**Tutorial
    D** 表述：


    ```

    ( S WHERE SNO = ''S6'' AND CITY = ''Rome'' ) { }

    ```


    正如《SQL与关系理论》中所解释的，该表达式的结果要么是`TABLE_DEE`，要么是`TABLE_DUM`。`TABLE_DEE`和`TABLE_DUM`是唯一两个度数为零的关系；`TABLE_DEE`只包含一个元组（实际上是空元组），而`TABLE_DUM`完全不包含任何元组。在CWA下，如果结果为`TABLE_DEE`，则意味着答案是*是的*，供应商S6确实存在且在罗马；如果结果为`TABLE_DUM`，则意味着答案是*不是*，供应商S6不存在或不在罗马。相反，在OWA下，`TABLE_DEE`仍然意味着*是的*，但`TABLE_DUM`意味着供应商S6是否存在或在罗马是*未知的*。


    现在考虑查询“如果供应商S6存在，那么该供应商在罗马吗？”（注意此查询与上面讨论的查询在逻辑上的区别）。请注意，如果关系变量*S*显示供应商S6存在但位于罗马以外的其他城市，那么这个查询的答案必须是*不是*，无论我们讨论的是CWA还是OWA。^([^(30)](#fn30))
    所以这里的**Tutorial D**表述是：


    ```

    TABLE_DEE MINUS ( ( S WHERE SNO = ''S6'' AND CITY ≠ ''Rome'' ) { } )

    ```


    因此，请务必注意，如果此表达式的结果是`TABLE_DUM`，那么这个`TABLE_DUM`必须意味着*不是*，*即使在OWA下也是如此*。因此，OWA存在固有的模糊性：有时`TABLE_DUM`必须意味着*未知*，而有时它必须意味着*不是*——当然我们（一般来说）无法确定何时适用哪种解释。


    再强调一下：在关系世界中，`TABLE_DEE`和`TABLE_DUM`分别就是代表*是的*和*不是*，并且没有可用的“第三个度数为零的关系”来表示OWA根本上要求的“第三个真值”。因此，OWA和关系模型从根本上是不兼容的。


    ## 精确定义


    精确的定义在第5章中给出。


    ## 值的相等性


    任何类型的两个值，当且仅当它们是同一个值时才相等（这意味着它们必须是同一类型，这是不言而喻的）。因此，两个元组相等当且仅当它们是同一个元组，两个关系相等当且仅当它们是同一个关系。但我们可以更具体地阐述细节：

    1.  两个元组*t*和*t''*相等，当且仅当它们具有相同的属性*A1*, ..., *An*，并且对于所有*i* (*i* = 1, ..., *n*)，*t*中*Ai*的值等于*t''*中*Ai*的值。

    2.  两个关系*r*和*r''*相等，当且仅当它们有相同的标题和相同的体（即，它们的标题相等且体相等）。因此，特别要注意，两个“空关系”（即没有任何元组的关系，或等价地说体为空的关系）相等当且仅当它们的标题相等。


    ## 元组上的运算


    是的！然而，我们当然希望此类运算符总是产生一个有效的元组作为结果（即，我们希望此类运算具有*闭包*，就像我们关系运算具有闭包一样——参见下面练习2.16的答案）。例如，对于元组并，我们希望输入元组满足同名属性具有相同值（因此，不言而喻，它们是同一类型）。举例来说，令*t1*和*t2*分别是一个供应商元组和一个发货元组，并且令*t1*和*t2*具有相同的*SNO*值。那么*t1*和*t2*的并集`UNION{*t1*,*t2*}`——使用**Tutorial
    D**符号——是一个类型为`TUPLE {SNO CHAR, SNAME CHAR, STATUS INTEGER, CITY CHAR, PNO CHAR,
    QTY INTEGER}`的元组，其属性值来自*t1*或*t2*或两者（如适用）。例如，如果*t1*是`(S1,Smith, 20,London)`，*t2*是`(S1,P1,300)`——使用本章正文“谓词与命题”一节中引入的元组简写符号^([^(31)](#fn31))——那么它们的并集是元组`(S1,Smith,20,London,P1,300)`。*注意：*
    此操作同样可以称为*元组连接*而非元组并。


    顺便说一句，不仅常见的集合运算符可以调整应用于元组——某些著名的关系运算符也是如此（正如我刚才在连接方面所暗示的）。一个重要的例子是元组投影运算符，它是关系投影运算符的直接改编。例如，令*t*为一个供应商元组；那么*t*在属性集`{SNO,CITY}`上的投影*t*{SNO,CITY}，是*t*中仅包含来自*t*的*SNO*和*CITY*分量的子元组。（当然，子元组本身也是一个元组。）同样，*t*{CITY}是*t*中仅包含*CITY*分量的子元组，而*t*{
    }是*t*中不包含任何分量的子元组（换句话说，它是0元组——参见下面练习2.12的答案）。事实上，值得注意的是，*每一个*元组都有一个在空属性集上的投影，其值正是0元组。


    ## 空元组


    空元组（注意有且只有一个这样的元组；等价地说，所有空元组彼此相等）就是前面练习答案中提到的0元组。至于这种元组的用途，我只想说，至少在概念上，这样一个元组的存在在许多方面至关重要。特别是，空元组是特殊关系`TABLE_DEE`中唯一的元组，这已在练习2.8的答案中提到。


    ## 空键


    说关系变量*R*有一个空键，是说*R*永远不能包含超过一个元组。为什么？因为每个元组对于空属性集都有相同的值——即空元组（参见前两个练习的答案）；因此，如果*R*有一个空键，并且如果*R*包含两个或更多元组，我们将面临键唯一性违反。而且，是的，约束*R*永远不能包含超过一个元组当然可能是有用的。我将寻找这种情况的例子作为一个附属练习。


    ## 谓词与命题


    一个具有空参数集的谓词是一个命题。换句话说，命题是一个退化的谓词；所有命题都是谓词，但“大多数”谓词不是命题。


    ## 投影与连接的定义


    投影和连接的定义在第5章中给出，但这里是**RENAME**的定义：


    **定义（属性重命名）**：令*r*为一个关系，*A*为*r*的一个属性，且*r*没有一个名为*B*的属性。那么重命名*r* `RENAME {*A* AS
    *B*}` 是一个关系*r''*，其 (a) 标题与*r*的标题相同，只是该标题中的属性*A*被重命名为*B*，(b) 体与*r*的体相同，只是该体中对*A*的所有引用（更准确地说，该体中的元组中对*A*的引用）被替换为对*B*的引用。'
