- fmt: '### A Relvar in RFNF and not 5NF


    我们可以构造一个属于RFNF但不属于5NF的关系变量示例，方法是采用本章前面讨论的具有两个依赖的关系变量`SPJ′`——


    ```

    { SNO , PNO } → { JNO }

    ☼ { { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }

    ```


    ——并添加另一个依赖：


    ```

    { PNO , JNO } → { SNO }

    ```


    这个额外的依赖（当然也意味着`{PNO,JNO}`是该关系变量的另一个键）对应于一条额外的业务规则（`BRZ`）：


    *   对于给定的零件`p`和给定的项目`j`，最多只有一个供应商`s`供应。


    让我将`SPJ′`的这个修订版本称为`SPJ′′`，并将给定的三元JD称为`J`。那么，`J`的`{SNO,PNO}`和`{PNO,JNO}`分量都是`SPJ′′`的超键；它们的并集等于`SPJ′′`的标题；因此——由于可以证明没有其他不可约的JD成立——可以得出结论`SPJ′′`属于RFNF。然而，它不属于5NF，因为成员资格算法在该三元JD
    `J`上失败了。


    ### A Relvar in ETNF and not RFNF


    正如已经指出的，关系变量`SPJ′`——不是`SPJ′′`！——是一个属于ETNF但不属于RFNF的关系变量示例。为了明确这一点：那个三元JD再次成立。但由于该JD中唯一是超键的分量是`{SNO,PNO}`，所有超键分量的并集肯定不等于标题，因此该关系变量不属于RFNF。


    ## Superkey Normal Form


    当Fagin、Darwen和我正在研究后来成为ETNF的成果时，我们的注意力被Ragnar Normann的另一篇论文^([^(179)](#fn179))所吸引，该论文讨论了与我们工作相关的问题。然而，那篇论文并没有描述任何等同于我们的ETNF或Vincent的RFNF的东西；相反，它的重点是表明某些教科书上对5NF的定义是不正确的^([^(180)](#fn180))。它通过定义所谓的`最小无损分解`（基本上对应于本书中定义的不可约JD），然后以这个概念为基础定义一个新的范式：^([^(181)](#fn181))


    *   **定义（超键范式）：** 当且仅当对于关系变量`R`中成立的每一个不可约JD `☼{X1,...,Xn}`，`X1`, ..., `Xn`中的每一个都是`R`的超键时，关系变量`R`才属于超键范式（`SKNF`）。


    该论文还证明了`5NF ⇒ SKNF ⇒ 4NF`，并且反向蕴含不成立。它没有证明`SKNF`是无冗余的（既不是我定义的术语，也不是Vincent意义上的），尽管事实上它是。^([^(182)](#fn182))


    重复一下，Normann的论文证明了`5NF ⇒ SKNF ⇒ 4NF`。然而，ETNF论文实际上证明了以下更强的结果：


    *   **定理：** `5NF ⇒ SKNF ⇒ RFNF ⇒ ETNF ⇒ 4NF`，并且所有反向蕴含均不成立。


    因此请注意，`SKNF`严格地位于`RFNF`和`5NF`之间。


    ### A Relvar in SKNF and not 5NF


    这里是一个属于`SKNF`但不属于`5NF`的关系变量示例。设关系变量`R`具有属性`A`、`B`和`C`；使用Heath表示法，设`AB`、`BC`和`CA`分别是`R`的键；并设JD
    `☼{AB,BC,CA}`——称之为`J`——在`R`中成立。那么可以证明这个关系变量属于`SKNF`^([^(183)](#fn183))；然而它不属于`5NF`，因为成员资格算法在`J`上失败了。*注意：*
    为了使示例更具体一些，设谓词为*存在一个人，其最喜欢的颜色是A，最喜欢的餐馆是B，最喜欢的作曲家是C*，并且设有一些业务规则，大意是(a)两个不同的人不能共享超过一个共同的喜好，以及(b)不存在三个不同的人，使得对于每一个喜好，这三人中都有两人共享它。


    ### A Relvar in RFNF and not SKNF


    前一节标题“A Relvar in RFNF and not 5NF”下给出的示例在这里也适用，因为所讨论的关系变量确实不属于`SKNF`，尽管它属于`RFNF`。


    ## Concluding Remarks


    重复一下我在引言中警告过你的事情，本章我们涵盖的所有内容的细节都是微妙且令人困惑的，并且可能难以记住——事实上，如果你到现在还没有同意这些看法，我会非常惊讶！——我不指望你仅仅通过一两次阅读就能吸收所有这些细节。然而，以下简要总结，重点列出了各种新范式之间最重要的逻辑差异，可能会有所帮助：


    *   当且仅当关系变量`R`属于`BCNF`，并且对于`R`中成立的每一个JD `J`，`J`的某个分量是`R`的超键时，`R`才属于`ETNF`。

    *   当且仅当关系变量`R`属于`BCNF`，并且对于`R`中成立的每一个JD `J`，`J`中那些是`R`超键的分量的并集等于`R`的标题时，`R`才属于`RFNF`。

    *   当且仅当关系变量`R`属于`BCNF`，并且对于`R`中成立的每一个JD `J`，`J`的每一个分量都是`R`的超键时，`R`才属于`SKNF`。


    让我通过指出一点来结束本章：一个关系变量可以属于`5NF`——因此也属于本章讨论的任何或所有新范式——但仍然可能受到某种冗余的影响，这种冗余虽然与本章中我使用的各种冗余定义不完全相同，但非常接近。^([^(184)](#fn184))
    考虑关系变量`SPJQ`，其属性为`SNO`、`PNO`、`JNO`和`QTY`（仅此而已），谓词为*供应商`SNO`以数量`QTY`供应零件`PNO`给项目`JNO`*。唯一的键是`{SNO,PNO,JNO}`，该关系变量属于`BCNF`。请注意，JD
    `☼{{SNO,PNO},{PNO,JNO},{JNO,SNO}}`在该关系变量中*不*成立。然而，它在该关系变量在`{SNO,PNO,JNO}`上的投影中确实成立（实际上它是一个嵌入式依赖的例子——见第12章）。现在假设该关系变量包含以下元组（仅此而已）：


    ```

    s1  p1  j2  100

    s1  p2  j1  200

    s2  p1  j1  300

    s1  p1  j3  400

    ```


    多亏了嵌入式依赖，我们必须有`j3 = j1`。因此，关系变量`SPJQ`确实以某种形式受到冗余的影响。尽管如此，该关系变量属于`ETNF`、`RFNF`、`SKNF`，实际上也属于`5NF`。关键在于，本章讨论的冗余与在所讨论的关系变量中成立的*函数依赖和连接依赖*（仅此而已）有关。遗憾的是，这个定义对于其他可能也恰好成立的约束——嵌入式依赖或任何其他类型的约束——完全无能为力。'
  raw: '### A Relvar in RFNF and not 5NF


    We can construct an example of a relvar that’s in RFNF and not in 5NF by taking
    relvar SPJ′ with its two dependencies as discussed earlier in this chapter—


    ```

    { SNO , PNO } → { JNO }

    ☼ { { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }

    ```


    —and adding another:


    ```

    { PNO , JNO } → { SNO }

    ```


    This additional dependency (which implies, of course, that {PNO,JNO} is another
    key for the relvar) corresponds to an additional business rule (BRZ):


    *   Any given part *p* is supplied to a given project *j* by at most one supplier
    *s*.


    Let me refer to this revised version of SPJ′ as SPJ′′, and to the given ternary
    JD as J. Then the {SNO,PNO} and {PNO,JNO} components of J are both superkeys for
    SPJ′′; their union is equal to the heading of SPJ′′; and so—since it can be shown
    that no other irreducible JDs hold—it follows that SPJ′′ is in RFNF. Yet it’s
    not in 5NF, because the membership algorithm fails on that ternary JD J.


    ### A Relvar in ETNF and not RFNF


    Relvar SPJ′—not SPJ′′!—is an example of a relvar that’s in ETNF and not in RFNF,
    as already noted. Just to spell the point out, however: Once again, that ternary
    JD holds. But since the only component of this JD that’s a superkey is {SNO,PNO},
    the union of all superkey components is certainly not equal to the heading, and
    the relvar is thus not in RFNF.


    ## Superkey Normal Form


    While Fagin, Darwen, and I were working on what became ETNF, our attention was
    drawn to yet another paper, this one by Ragnar Normann,^([^(179)](#fn179)) that
    dealt with issues related to our work. That paper doesn’t describe anything equivalent
    to our ETNF, however, nor to Vincent’s RFNF; rather, its focus is on showing that
    certain textbook definitions of 5NF are incorrect.^([^(180)](#fn180)) It does
    this by defining what it calls *minimal lossless decompositions* (which are basically
    decompositions that correspond to irreducible JDs as defined in the present book),
    and then using that notion as a basis for defining a new normal form:^([^(181)](#fn181))


    *   **Definition (superkey normal form):** Relvar *R* is in superkey normal form
    (SKNF) if and only if, for every irreducible JD ☼{*X1*,...,*Xn*} that holds in
    *R*, each of *X1*, ..., *Xn* is a superkey for *R*.


    The paper also proves that 5NF ⇒ SKNF ⇒ 4NF and that the reverse implications
    don’t hold. It doesn’t show that SKNF is redundancy free (neither as I’ve defined
    that term nor in Vincent’s sense), though in fact it is.^([^(182)](#fn182))


    To repeat, Normann’s paper proves that 5NF ⇒ SKNF ⇒ 4NF. However, the ETNF paper
    actually proves the following stronger result:


    *   **Theorem:** 5NF ⇒ SKNF ⇒ RFNF ⇒ ETNF ⇒ 4NF, while none of the reverse implications
    holds.


    Note, therefore, that SKNF falls strictly between RFNF and 5NF.


    ### A Relvar in SKNF and not 5NF


    Here then is an example of a relvar that’s in SKNF and not in 5NF. Let relvar
    R have attributes A, B, and C; using Heath notation, let AB, BC, and CA each be
    keys of R; and let the JD ☼{AB,BC,CA}—call it J—hold in R. Then it can be shown
    that this relvar is in SKNF;^([^(183)](#fn183)) yet it’s not in 5NF, because the
    membership algorithm fails on J. *Note:* To make the example a little more concrete,
    let the predicate be *There exists a person whose favorite color is A, favorite
    restaurant is B, and favorite composer is C*, and let there be business rules
    to the effect that (a) no two distinct persons can have more than one favorite
    in common and (b) no three distinct persons can be such that, for each favorite,
    two of those three persons have it in common.


    ### A Relvar in RFNF and not SKNF


    The example given in the previous section under the heading “A Relvar in RFNF
    and not 5NF” serves here also, since the relvar in question is indeed not in SKNF,
    though it is in RFNF.


    ## Concluding Remarks


    To repeat something I warned you about in the introduction, the details of everything
    we’ve been covering in this chapter are subtle and confusing and can be difficult
    to remember—indeed, I’d be very surprised if you didn’t agree with these remarks
    by now!—and I don’t expect you to absorb all of those details on just one or two
    readings. However, the following brief summary, highlighting the most significant
    logical differences between the various new normal forms, might help a little:


    *   Relvar *R* is in ETNF if and only if it’s in BCNF and, for every JD *J* that
    holds in *R*, some component of *J* is a superkey for *R*.


    *   Relvar *R* is in RFNF if and only if it’s in BCNF and, for every JD *J* that
    holds in *R*, the union of those components of *J* that are superkeys for *R*
    is equal to the heading of *R.*


    *   Relvar *R* is in SKNF if and only if it’s in BCNF and, for every JD *J* that
    holds in *R*, every component of *J* is a superkey for *R*.


    Let me close the chapter by pointing out that a relvar can be in 5NF—and hence
    in any or all of the new normal forms discussed in this chapter—and yet still
    be subject to redundancy that, while not exactly identical to redundancy in any
    of the various senses in which I’ve used that term in this chapter, is nevertheless
    very close to it.^([^(184)](#fn184)) Consider a relvar SPJQ, with attributes SNO,
    PNO, JNO, and QTY (only) and predicate *Supplier SNO supplies part PNO to project
    JNO in quantity QTY*. The sole key is {SNO,PNO,JNO}, and the relvar is in BCNF.
    Note carefully that the JD ☼{{SNO,PNO},{PNO,JNO},{JNO,SNO}} does *not* hold in
    this relvar. However, it does hold in the projection of the relvar on {SNO,PNO,JNO}
    (actually it’s an example of an embedded dependency—see Chapter [12](#489629_2_En_12_Chapter.xhtml)).
    Now suppose the relvar contains the following tuples (only):


    ```

    s1  p1  j2  100

    s1  p2  j1  200

    s2  p1  j1  300

    s1  p1  j3  400

    ```


    Thanks to the embedded dependency, then, we must have *j3* = *j1*. Thus, relvar
    SPJQ is certainly subject to redundancy, of a kind. Nevertheless, the relvar is
    in ETNF, RFNF, SKNF, and indeed 5NF. The point is, the kind of redundancy discussed
    in this chapter has to do with *the FDs and JDs* (only) that hold in the relvar
    in question. Sadly, that definition has nothing whatsoever to say about any other
    constraints—embedded dependencies or any other kinds of constraints—that might
    also happen to hold.'
  trans: '

    ### 一个属于 RFNF 但不属于 5NF 的关系变量


    我们可以构造一个属于 RFNF 但不属于 5NF 的关系变量示例，方法是采用本章前面讨论的具有两个依赖的关系变量`SPJ′`——


    ```

    { SNO , PNO } → { JNO }

    ☼ { { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }

    ```


    ——并添加另一个依赖：


    ```

    { PNO , JNO } → { SNO }

    ```


    这个额外的依赖（当然也意味着`{PNO,JNO}`是该关系变量的另一个键）对应于一条额外的业务规则（`BRZ`）：


    *   对于给定的零件`p`和给定的项目`j`，最多只有一个供应商`s`供应。


    让我将`SPJ′`的这个修订版本称为`SPJ′′`，并将给定的三元 JD 称为`J`。那么，`J`的`{SNO,PNO}`和`{PNO,JNO}`分量都是`SPJ′′`的超键；它们的并集等于`SPJ′′`的标题；因此——由于可以证明没有其他不可约的
    JD 成立——可以得出结论`SPJ′′`属于 RFNF。然而，它不属于 5NF，因为成员资格算法在该三元 JD `J`上失败了。


    ### 一个属于 ETNF 但不属于 RFNF 的关系变量


    正如已经指出的，关系变量`SPJ′`——不是`SPJ′′`！——是一个属于 ETNF 但不属于 RFNF 的关系变量示例。为了明确这一点：那个三元 JD 再次成立。但由于该
    JD 中唯一是超键的分量是`{SNO,PNO}`，所有超键分量的并集肯定不等于标题，因此该关系变量不属于 RFNF。


    ## 超键范式


    当 Fagin、Darwen 和我正在研究后来成为 ETNF 的成果时，我们的注意力被 Ragnar Normann 的另一篇论文^(¹⁷⁹)所吸引，该论文讨论了与我们工作相关的问题。然而，那篇论文并没有描述任何等同于我们的
    ETNF 或 Vincent 的 RFNF 的东西；相反，它的重点是表明某些教科书上对 5NF 的定义是不正确的^(¹⁸⁰)。它通过定义所谓的`最小无损分解`（基本上对应于本书中定义的不可约
    JD），然后以这个概念为基础定义一个新的范式：^(¹⁸¹)


    *   **定义（超键范式）：** 当且仅当对于关系变量`R`中成立的每一个不可约 JD `☼{X1,...,Xn}`，`X1`, ..., `Xn`中的每一个都是`R`的超键时，关系变量`R`才属于超键范式（`SKNF`）。


    该论文还证明了`5NF ⇒ SKNF ⇒ 4NF`，并且反向蕴含不成立。它没有证明`SKNF`是无冗余的（既不是我定义的术语，也不是 Vincent 意义上的），尽管事实上它是。^(¹⁸²)


    重复一下，Normann 的论文证明了`5NF ⇒ SKNF ⇒ 4NF`。然而，ETNF 论文实际上证明了以下更强的结果：


    *   **定理：** `5NF ⇒ SKNF ⇒ RFNF ⇒ ETNF ⇒ 4NF`，并且所有反向蕴含均不成立。


    因此请注意，`SKNF`严格地位于`RFNF`和`5NF`之间。


    ### 一个属于 SKNF 但不属于 5NF 的关系变量


    这里是一个属于`SKNF`但不属于`5NF`的关系变量示例。设关系变量`R`具有属性`A`、`B`和`C`；使用 Heath 表示法，设`AB`、`BC`和`CA`分别是`R`的键；并设
    JD `☼{AB,BC,CA}`——称之为`J`——在`R`中成立。那么可以证明这个关系变量属于`SKNF`^(¹⁸³)；然而它不属于`5NF`，因为成员资格算法在`J`上失败了。*注意：*
    为了使示例更具体一些，设谓词为*存在一个人，其最喜欢的颜色是 A，最喜欢的餐馆是 B，最喜欢的作曲家是 C*，并且设有一些业务规则，大意是(a)两个不同的人不能共享超过一个共同的喜好，以及(b)不存在三个不同的人，使得对于每一个喜好，这三人中都有两人共享它。


    ### 一个属于 RFNF 但不属于 SKNF 的关系变量


    前一节标题“A Relvar in RFNF and not 5NF”下给出的示例在这里也适用，因为所讨论的关系变量确实不属于`SKNF`，尽管它属于`RFNF`。


    ## 结束语


    重复一下我在引言中警告过你的事情，本章我们涵盖的所有内容的细节都是微妙且令人困惑的，并且可能难以记住——事实上，如果你到现在还没有同意这些看法，我会非常惊讶！——我不指望你仅仅通过一两次阅读就能吸收所有这些细节。然而，以下简要总结，重点列出了各种新范式之间最重要的逻辑差异，可能会有所帮助：


    *   当且仅当关系变量`R`属于`BCNF`，并且对于`R`中成立的每一个 JD `J`，`J`的某个分量是`R`的超键时，`R`才属于`ETNF`。

    *   当且仅当关系变量`R`属于`BCNF`，并且对于`R`中成立的每一个 JD `J`，`J`中那些是`R`超键的分量的并集等于`R`的标题时，`R`才属于`RFNF`。

    *   当且仅当关系变量`R`属于`BCNF`，并且对于`R`中成立的每一个 JD `J`，`J`的每一个分量都是`R`的超键时，`R`才属于`SKNF`。


    让我通过指出一点来结束本章：一个关系变量可以属于`5NF`——因此也属于本章讨论的任何或所有新范式——但仍然可能受到某种冗余的影响，这种冗余虽然与本章中我使用的各种冗余定义不完全相同，但非常接近。^(¹⁸⁴)
    考虑关系变量`SPJQ`，其属性为`SNO`、`PNO`、`JNO`和`QTY`（仅此而已），谓词为*供应商`SNO`以数量`QTY`供应零件`PNO`给项目`JNO`*。唯一的键是`{SNO,PNO,JNO}`，该关系变量属于`BCNF`。请注意，JD
    `☼{{SNO,PNO},{PNO,JNO},{JNO,SNO}}`在该关系变量中*不*成立。然而，它在该关系变量在`{SNO,PNO,JNO}`上的投影中确实成立（实际上它是一个嵌入式依赖的例子——见第
    12 章）。现在假设该关系变量包含以下元组（仅此而已）：


    ```

    s1  p1  j2  100

    s1  p2  j1  200

    s2  p1  j1  300

    s1  p1  j3  400

    ```


    多亏了嵌入式依赖，我们必须有`j3 = j1`。因此，关系变量`SPJQ`确实以某种形式受到冗余的影响。尽管如此，该关系变量属于`ETNF`、`RFNF`、`SKNF`，实际上也属于`5NF`。关键在于，本章讨论的冗余与在所讨论的关系变量中成立的*函数依赖和连接依赖*（仅此而已）有关。遗憾的是，这个定义对于其他可能也恰好成立的约束——嵌入式依赖或任何其他类型的约束——完全无能为力。

