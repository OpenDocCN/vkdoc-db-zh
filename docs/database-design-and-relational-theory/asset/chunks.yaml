    *员工 E4 在部门 Dj 中*（对于任何不等于 D3 的部门 *Dj*）的元组。但这是一个相当牵强的论点！此外，（缺失的）命题 "*员工 E4 在某个不等于
    D3 的部门 Dj 中*" 并不真正是非量化的——它是对如下内容的缩写：


