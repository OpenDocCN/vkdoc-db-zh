    To get back to the definitions:


    *   **Definition (satisfying or violating an FD):** Let relation *r* have heading
    *H* and let *X* → *Y* be an FD, *F* say, with respect to *H*. If all pairs of
    tuples *t1* and *t2* of *r* are such that whenever *t1*{*X*} = *t2*{*X*}, then
    *t1*{*Y*} = *t2*{*Y*}, then *r* satisfies *F*; otherwise *r* violates *F*.


