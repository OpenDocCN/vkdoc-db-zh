    \ be declared, and enforced by the system, to ensure (again) that it never leads\
    \ to inconsistency.\n\n*   If it can’t be controlled and constraints can’t be\
    \ enforced by the system (or perhaps can’t even be formally declared), then you’re\
    \ on your own—and woe betide you if you make any mistakes.\n\nSadly, this last\
    \ scenario is the one most likely to obtain in practice, given the state of today’s\
    \ commercial implementations.\n\n## Exercises\n\n1.  I claimed in the body of\
    \ the chapter that if database *DB* contains (either explicitly or implicitly)\
    \ two or more distinct representations of some simple unquantified proposition\
    \ *p*, then *DB* contains some redundancy. Can you think of a database that doesn’t\
    \ contain two or more such representations of any such proposition and yet in\
    \ your opinion still displays some redundancy?\n\n## Answers\n\n1.  If you have\
    \ a good answer to this exercise, please communicate it to me at PO Box 1000,\
    \ Healdsburg, CA 95448, USA (regular mail only, please).\n\nFootnotes [1](#489629_2_En_17_Chapter.xhtml#Fn1_source)\
    \   [2](#489629_2_En_17_Chapter.xhtml#Fn2_source)   [3](#489629_2_En_17_Chapter.xhtml#Fn3_source)\
