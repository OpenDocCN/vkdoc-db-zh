  trans: '

    ## 另一个例子


    我在前一节开头曾暗示，SJT 例子可能被认为是病态的。然而，现在我要宣称它并非完全如此；我将再给出几个例子，这些例子（在我看来）表明，函数依赖保持问题比你想象的更为常见。


    通常理解的规范化是一个从 1NF 到 2NF 再到 3NF（等等）的顺序过程。让我们约定，将这种通常理解的过程——即按顺序从 1NF 到 2NF 再到 3NF（等等）——称为“**常规规范化过程**”。在本节及接下来的两节中，我想通过一系列例子来说明，如果过于盲目地遵循常规规范化过程，未必是一个好主意。我的第一个例子涉及一个如下的关系变量：


    ```

    RX1 { SNO , PNO , CITY , STATUS , QTY }

    ```


    名称 `RX1` 代表“关系变量示例 1”；其谓词是*供应商 `SNO` 位于城市 `CITY`，该城市的状态为 `STATUS`，并且供应零件 `PNO`
    的数量为 `QTY`。*（为简便起见，我忽略了供应商名称。）让我们合理地假设，以下函数依赖在此关系变量中成立：


    ```

    { SNO }       → { CITY }

    { CITY }      → { STATUS }

    { SNO , PNO } → { QTY }

    ```


    现在，直观上很明显，以下函数依赖也隐式成立：^(⁸⁴)


    ```

    { SNO }       → { STATUS }

    { SNO , PNO } → { CITY , STATUS }

    ```


    事实上，最后一个函数依赖可以扩展为 `{SNO,PNO} → H`，其中 `H` 是整个标题；换句话说，`{SNO,PNO}` 是关系变量 `RX1` 的一个键。


    现在回想一下，当且仅当对于每个键 *K* 和每个非键属性 *A*，函数依赖 *K* → {*A*} 都是不可约的时，关系变量 *R* 才处于 2NF。显然，`RX1`
    不在 2NF 中，因为函数依赖 `{SNO,PNO} → {CITY}` 是 `RX1` 的“一个键的箭头”，但它不是不可约的；具体来说，它不可约是因为函数依赖
    `{SNO} → {CITY}` 在该关系变量中也成立。因此，常规规范化过程会建议我们通过应用希斯定理到该函数依赖 `{SNO} → {CITY}` 来分解关系变量。但如果我们这样做，得到的结果是：


    ```

    RX1A { SNO , CITY }

    KEY { SNO }

    RX1B { SNO , PNO , STATUS , QTY }

    KEY { SNO , PNO }

    ```


    现在观察，在此分解中，函数依赖 `{CITY} → {STATUS}` 丢失了。所以这个例子带来的一个直接教训是，函数依赖保持问题可能与从 1NF 到 2NF
    的步骤相关——而不仅仅是 SJT 例子中展示的从 3NF 到 BCNF 的步骤。


    这里的关系变量 `RX1A` 当然在 2NF 中。相比之下，关系变量 `RX1B` 不在 2NF 中，因为函数依赖 `{SNO,PNO} → {STATUS}`
    是可约的。因此，我们可以再次应用希斯定理，将其分解为在 `{SNO,STATUS}` 和 `{SNO,PNO,QTY}` 上的投影，这两个投影都在 2NF
    中；然而，损失已经造成——函数依赖 `{CITY} → {STATUS}` 已经丢失了。


    在这个例子中我们如何保持函数依赖呢？一个答案是：基于函数依赖 `{SNO} → {CITY,STATUS}` 而不是 `{SNO} → {CITY}` 来分解。不过，请仔细注意，这个函数依赖并不是最初明确列出的那些之一，也不是我说过由那些明确依赖明显隐含的那些之一；因此，在常规规范化过程中，它不太可能被选为分解的基础。尽管如此，假设我们确实选择了它并执行了相应的分解。结果如下：


    ```

    RX1A′ { SNO , CITY , STATUS }

    KEY { SNO }

    RX1B′ { SNO , PNO , QTY }

    KEY { SNO , PNO }

    ```


    在此分解中，`STATUS` 出现在键为 `{SNO}` 的关系变量中，而不是键为 `{SNO,PNO}` 的关系变量中，从而函数依赖 `{CITY} →
    {STATUS}` 得以保持。*注意：* 当然，这里的关系变量 `RX1A′` 仍然不在 3NF 中，因此我们很可能希望进一步分解它。不过，同样地，我们需要稍微小心；具体来说，我们需要基于函数依赖
    `{CITY} → {STATUS}` 而不是 `{SNO} → {STATUS}` 进行分解，否则我们又会丢失一个函数依赖。但是 `{CITY} → {STATUS}`
    是常规规范化过程会告诉我们要使用的函数依赖，所以这里不应该有问题。


    现在，上述方案的另一种替代方法是基于函数依赖 `{CITY} → {STATUS}` 分解原始关系变量 `RX1`，产生：


    ```

    RX1A′′ { CITY , STATUS }

    KEY { CITY }

    RX1B′′ { SNO , PNO , CITY , QTY }

    KEY { SNO , PNO }

    ```


    这种分解也保持了函数依赖 `{CITY} → {STATUS}`。然而，请注意，这个函数依赖并不是导致原始关系变量 `RX1` 违反 2NF 的那个（它不是一个“从真子键发出的箭头”）；因此，再次说明，如果我们遵循常规规范化过程，在实践中我们不太可能在这个阶段选择它作为分解的基础。还要注意，这里的关系变量
    `RX1B′′` 仍然不在 3NF 中，因此我们很可能希望进一步分解它。我将把这个进一步分解的细节留给您思考。


    ## … 再来一个


    让我们看另一个例子。假设供应商被划分为类别（`C1`、`C2` 等），因此我们有一个如下的关系变量 `RX2`（和 `RX1` 示例一样，我将为简便起见忽略供应商名称）：


    ```

    RX2 { SNO , CLASS , CITY , STATUS }

    KEY { SNO }

    ```


    其谓词是*供应商 `SNO` 属于类别 `CLASS`，位于城市 `CITY`，并且状态为 `STATUS`。* 还假设 (a) 每个类别只有一个状态，并且
    (b) 每个城市也只有一个状态，但 (c) 类别和城市在其他方面彼此独立。那么以下函数依赖成立：


    ```

    { CLASS } → { STATUS }

    { CITY }  → { STATUS }

    ```


    *注意：* 我还假设有一个有效的业务规则，该规则表明，对于任何给定的供应商，城市状态等于类别状态（这就是为什么我们能够只使用一个 `STATUS` 属性而不是两个）。^(⁸⁵)


    现在回想一下，当且仅当对于 *R* 中成立的每个非平凡函数依赖 *X* → *Y*，要么 *X* 是超键，要么 *Y* 是子键（或两者兼是），关系变量 *R*
    才处于 3NF。显然，`RX2` 不在 3NF 中，因为在函数依赖 `{CITY} → {STATUS}` 中，`{CITY}` 不是超键，`{STATUS}`
    也不是子键。因此，常规规范化过程会建议我们通过应用希斯定理到该函数依赖 `{CITY} → {STATUS}` 来分解关系变量。但如果我们这样做，得到的结果是（两个投影关系变量都在
    3NF 中）：


    ```

    RX2A { CITY , STATUS }

    KEY { CITY }

    RX2B { SNO , CLASS , CITY }

    KEY { SNO }

    ```


    现在观察，在此分解中，函数依赖 `{CLASS} → {STATUS}` 丢失了。（当然，如果我们基于该函数依赖而不是函数依赖 `{CITY} → {STATUS}`
    进行分解，那么后面这个函数依赖反而会丢失。）所以现在我们看到，函数依赖保持问题也与从 2NF 到 3NF 的步骤相关。


    现在，我们可以通过基于函数依赖 `{SNO} → {CLASS,CITY}` 分解来在这个例子中保持函数依赖——尽管这个函数依赖同样不太可能被选为分解的基础，因为它没有被明确陈述。^(⁸⁶)
    尽管如此，结果如下：


    ```

    RX2A′ { CLASS , CITY , STATUS }

    KEY { CLASS , CITY }

    RX2B′ { SNO , CLASS , CITY }

    KEY { SNO }

    ```


    在此分解中，`{CLASS,CITY}` 是 `RX2B′` 中的一个（复合）外键，引用 `RX2A′`。关系变量 `RX2B′` 在 3NF 中。然而，关系变量
    `R2XA′` 甚至不在 2NF 中，因为函数依赖 `{CLASS,CITY} → {STATUS}` 显然是可约的。因此，如果我们决定保留该关系变量，则必须单独声明并强制执行函数依赖
    `{CLASS} → {STATUS}` 和 `{CITY} → {STATUS}`。^(⁸⁷) 或者，我们可以将该关系变量分解为在 `{CLASS,STATUS}`
    和 `{CITY,STATUS}` 上的投影，在这种情况下，必须单独声明并强制执行一个适当的多关系变量约束。*练习：* 该约束会是什么样子？

    '
- fmt: "## … And Still Another\n\n考虑前一章节示例的修订版本，其中 (a) 供应商再次被划分为类别，但 (b) 每个类别现在只有一个城市（每个城市又只有一个状态，与之前一样）。因此，我们有一个关系变量\
    \ `RX3`，其结构如下（再次为简便忽略供应商名称）：\n```\nRX3 { SNO , CLASS , CITY , STATUS }\n```\n\
    实际上，`RX3` 的头（heading）与 `RX2` 相同，但谓词不同：*供应商 `SNO` 属于类别 `CLASS`，该类别有城市 `CITY`，该城市有状态\
    \ `STATUS`。* 以下函数依赖（FD）等成立：\n```\n{ SNO }   → { CLASS }\n{ CLASS } → { CITY }\n\
    { CITY }  → { STATUS }\n```\n关系变量 `RX3` 不属于3NF，因为在 FD `{CLASS} → {CITY}` 中，`{CLASS}`\
    \ 不是超键，`{CITY}` 不是子键。（对于 `{CITY} → {STATUS}`，情况类似，只需稍作调整。）因此，常规的规范化过程会建议我们应用 Heath\
    \ 定理到该 FD `{CLASS} → {CITY}` 来分解这个关系变量。但如果我们这样做，会得到：\n```\nRX3A { CLASS , CITY\
    \ }\nKEY { CLASS }\nRX3B { SNO , CLASS , STATUS }\nKEY { SNO }\n```\n在这个分解中，`RX3A`\
    \ 属于3NF，但 `RX3B` 仅属于2NF——并且如你所见，FD `{CITY} → {STATUS}` 丢失了。实际上，更好的做法是基于 FD `{CITY}\
    \ → {STATUS}` 进行分解：\n```\nRX3A′ { CITY , STATUS }\nKEY { CITY }\nRX3B′ { SNO ,\
    \ CLASS , CITY }\nKEY { SNO }\n```\n`RX3A′` 属于3NF，而 `RX3B′` 仅属于2NF，但至少 FD `{CITY}\
    \ → {STATUS}` 被保留了。此外，我们现在可以继续基于 FD `{CLASS} → {CITY}` 来分解 `RX3B′`，得到：\n```\n\
    RX3BA′ { CLASS , CITY }\nKEY { CLASS }\nRX3BB′ { SNO , CLASS }\nKEY { SNO }\n\
    ```\n这些关系变量都属于3NF。\n\n所以，现在我们已经看到了四个关于FD可能丢失的不同分解示例。这个话题还有很多内容可以讨论，但一个明确的信息是：常规的规范化过程——事实上是实践中经常教授的那种！——在几个方面是不足的。具体来说：\n\
    \n*   常规观点认为，FD保留只与从3NF到BCNF的步骤相关，但正如我们所见，情况未必如此。\n*   常规规范化过程通常建议作为分解基础的FD，不一定是最好的选择。\n\
    *   该过程还假设可以通过从1NF到2NF再到3NF（等等）按顺序逐步推进来找到最佳设计，这再次未必正确。\n\n当然，“第一”、“第二”等命名法强化了最后这种看法；但这种命名法在某种程度上其实只是一个历史的偶然。我的意思是，如果第一个被定义的范式是BCNF——这完全有可能，因为其定义在概念上如此简单，不涉及FD不可约性、非键属性、子键、1NF、2NF或3NF——那么实际上就永远没有必要将2NF和3NF作为特定的范式单独提出来。^([^(88)](#fn88))\n\
    \n## 一个有效的方法\n\n这里介绍一个保证能产生分解的方法，其中所有关系变量都属于3NF（但不一定是BCNF），并且所有FD都被保留。^([^(89)](#fn89))\
    \ 为方便起见，在下文中我将称之为 `the 3NF procedure`。输入是一个关系变量 `R` 和一组所谓的 `irreducible cover`（称它为\
    \ `C`），用于 `R` 中成立的FD。我稍后会解释什么是 `irreducible cover`——顺便说一句，`irreducible` 这个词又出现了——但让我先陈述这个过程：\n\
    \n1.  令 `S` 为一个头的集合。将 `S` 初始化为空集 `{ }`。\n2.  令 `X` 为 `C` 中某个FD的左侧（决定因素）；令 `C`\
    \ 中所有左侧为 `X` 的FD的完整集合为 `X → Y1`, ..., `X → Yn`；并令 `Y1`, ... `Yn` 的并集为 `Y`。将 `X`\
    \ 和 `Y` 的并集添加到 `S` 中。对每个不同的 `X` 执行此步骤。\n3.  令 `U` 为 `R` 中不属于 `S` 任何元素的属性集合。如果\
    \ `U` 非空，则将 `U` 添加到 `S` 中。\n4.  如果 `S` 中没有元素是 `R` 的超键，则将 `R` 的某个键 `K` 添加到 `S`\
    \ 中。\n\n在这个过程结束时，`S` 的元素就是一组3NF关系变量的头，`R` 可以无损地分解为这些关系变量，而不会丢失任何FD。尤其需要注意的是，该过程没有明确提到2NF，甚至没有将其作为某种垫脚石。\n\
    \n那么它是如何工作的呢？显然，`irreducible cover` 的概念很重要。为了解释这个概念，让我先指出一件我已经多次顺便提到的事情：即 *一些FD蕴含其他FD*\
    \ 的事实。一个简单的例子是，FD `X → Y` 和 `Y → Z` 一起蕴含了 FD `X → Z`——我的意思是，如果前两个FD被关系 `r` 满足，那么第三个也必须被\
    \ `r` 满足。或者，更关键的是：如果前两个在关系变量 `R` 中成立，那么第三个也必须在 `R` 中成立。我们在前一节关于关系变量 `RX3` 的讨论中看到了一个例证，其中\
    \ FD `{CLASS} → {CITY}` 和 `{CITY} → {STATUS}` 都成立，因此 FD `{CLASS} → {STATUS}` 也成立。\n\
    \n因此，一些FD蕴含其他FD。给定一个FD的集合 `F`，我们可以合理地讨论 `F` 的一个 `cover`。定义如下：\n\n*   **定义（cover）：**\
    \ 一个FD集合 `F` 的 `cover` 是一个FD集合 `C`，使得 `F` 中的每个FD都由 `C` 中的FD所蕴含。\n\n作为一个简单的例子，令\
    \ `F` 为集合：\n```\n{ X → Y , Y → Z , X → Z }\n```\n那么以下两者都是 `F` 的 `cover`：\n```\n\
    { X → Y , Y → Z }\n{ X → Y , Y → Z , X → Z }\n```\n这个例子立即说明了两点：首先，`cover` 通常不是唯一的；其次，任何FD集合当然是它自身的\
    \ `cover`，因为每个FD都蕴含自身。第三点也更重要：对于给定的FD集合 `F`，强制执行其某个 `cover` `C` 中的FD将“自动”强制执行\
    \ `F` 中的FD。因此，给定需要强制执行的FD集合 `F`，只需找到 `F` 的某个 `cover` `C` 并强制执行 `C` 中的FD即可。（事实上，只需强制执行\
    \ `F` 的一个 `irreducible cover` 中的FD，这一点很快就会清楚。）\n\n现在我可以定义什么是 `irreducible cover`\
    \ 了：\n\n*   **定义（irreducible cover）：** 一个FD集合 `F` 的 `cover` `C` 是 `irreducible`\
    \ 的，当且仅当它具备以下所有属性：\n    1.  *Singleton dependant:* `C` 中的每个FD的右侧只有一个属性。\n    2.\
    \  *Irreducible determinant:* `C` 中的每个FD本身是不可约的。^([^(90)](#fn90))\n    3.  *No\
    \ redundant FDs:* 不能从 `C` 中丢弃任何FD而不失去 `C` 是 `F` 的 `cover` 这一性质。\n\n当然，立即出现的问题是：给定某个特定的FD集合，如何找到该集合的一个\
    \ `irreducible cover`？我将在下一章详细回答这个问题。现在，让我先给一个例子——即以下FD集合，它们构成了我们通常的供应商关系变量 `S`\
    \ 中成立的FD的一个 `irreducible cover`："
  raw: '## … And Still Another


    Consider now a revised version of the example from the previous section in which
    (a) suppliers are again partitioned into classes, but (b) each class now has just
    one city (where each city in turn has just one status, as before). So we have
    a relvar RX3 that looks like this (once again I ignore supplier names for simplicity):


    ```

    RX3 { SNO , CLASS , CITY , STATUS }

    ```


    In fact, of course, RX3 has the same heading as RX2 did, but the predicate is
    different: *Supplier SNO is in class CLASS, which has city CITY, which has status
    STATUS.* The following FDs hold among others:


    ```

    { SNO }   → { CLASS }

    { CLASS } → { CITY }

    { CITY }  → { STATUS }

    ```


    Relvar RX3 isn’t in 3NF, because in the FD {CLASS} → {CITY}, {CLASS} isn’t a superkey
    and {CITY} isn’t a subkey. (The same goes for {CITY} → {STATUS}, mutatis mutandis.)
    The conventional normalization procedure would thus recommend that we decompose
    the relvar by applying Heath’s Theorem to that FD {CLASS} → {CITY}. But if we
    do, this is what we get:


    ```

    RX3A { CLASS , CITY }

    KEY { CLASS }

    RX3B { SNO , CLASS , STATUS }

    KEY { SNO }

    ```


    In this decomposition, RX3A is in 3NF but RX3B is only in 2NF—and as you can see,
    the FD {CITY} → {STATUS} is lost. In fact, it would have been better to decompose
    on the basis of that FD {CITY} → {STATUS}:


    ```

    RX3A′ { CITY , STATUS }

    KEY { CITY }

    RX3B′ { SNO , CLASS , CITY }

    KEY { SNO }

    ```


    RX3A′ is in 3NF while RX3B′ is only in 2NF, but at least the FD {CITY} → {STATUS}
    has been preserved. What’s more, we can now go on to decompose RX3B′ on the basis
    of the FD {CLASS} → {CITY} to obtain:


    ```

    RX3BA′ { CLASS , CITY }

    KEY { CLASS }

    RX3BB′ { SNO , CLASS }

    KEY { SNO }

    ```


    These relvars are both in 3NF.


    So now we’ve seen four different examples of decompositions in which FDs are or
    might be lost. There’s a lot more that could be said on the topic, but one clear
    message is: The conventional normalization procedure—in fact, the one that’s often
    taught in practice!—is inadequate in several respects. To be specific:


    *   Conventional wisdom has it that FD preservation is relevant only to the step
    from 3NF to BCNF, but as we’ve seen such isn’t necessarily the case.


    *   The FDs typically suggested by the conventional normalization procedure as
    the basis for decomposition aren’t necessarily the best ones to use.


    *   That procedure also assumes the best design can be found by stepping from
    1NF to 2NF to 3NF (etc.) in sequence, which again isn’t necessarily the case.


    Of course, the very nomenclature of “first,” “second,” etc. reinforces this last
    perception; but that nomenclature is really nothing more than a historical accident,
    in a way. I mean, if the first of the normal forms to be defined had been BCNF—which
    it easily could have been, since the definition is so conceptually simple, involving
    as it does no mention of FD irreducibility, nonkey attributes, subkeys, 1NF, 2NF,
    or 3NF—then there would really never have been any need to call out 2NF and 3NF
    as specific normal forms, as such, at all.^([^(88)](#fn88))


    ## A Procedure that Works


    Here now is a procedure that’s guaranteed to produce a decomposition in which
    all relvars are in 3NF (though not necessarily BCNF) and all FDs are preserved.^([^(89)](#fn89))
    For convenience, I’ll refer to it in what follows as *the 3NF procedure*. The
    input is a relvar *R* and what’s called an *irreducible cover*, *C* say, for the
    FDs that hold in *R*. I’ll explain what an irreducible cover is in a few moments—by
    the way, there’s that word *irreducible* again—but let me state the procedure
    first:


    1.  Let *S* be a set of headings. Initialize *S* to the empty set, { }.


    2.  Let *X* be the left side (the determinant) of some FD in *C*; let the complete
    set of FDs in *C* with left side *X* be *X* → *Y1*, ..., *X* → *Yn*; and let the
    union of *Y1*, ... *Yn* be *Y*. Add the union of *X* and *Y* to *S*. Perform this
    step for each distinct *X*.


    3.  Let *U* be the set of attributes of *R* not contained in any element of *S*.
    If *U* is nonempty, add *U* to *S*.


    4.  If no element of *S* is a superkey for *R*, add some key *K* of *R* to *S*.


    At the conclusion of this procedure, the elements of *S* are the headings of a
    set of 3NF relvars into which *R* can be nonloss decomposed without losing any
    FDs. Note in particular that the procedure makes no explicit mention of 2NF, not
    even as some kind of stepping stone.


    So how does it work? Clearly, the notion of an irreducible cover is important.
    In order to explain that notion, let me first call out something I’ve appealed
    to several times already in passing: namely, the fact that *some FDs imply others*.
    As a simple example, the FDs *X* → *Y* and *Y* → *Z* together imply the FD *X*
    → *Z*—by which I mean, if the first two FDs are satisfied by relation *r*, then
    the third one must be satisfied by *r* as well. Or, perhaps more to the point:
    If the first two hold in relvar *R*, then the third one must hold in *R* as well.
    We saw an illustration in the previous section, in connection with relvar RX3,
    where the FDs {CLASS} → {CITY} and {CITY} → {STATUS} both held, and so the FD
    {CLASS} → {STATUS} held as well.


    So some FDs imply others. Given a set *F* of FDs, then, we can sensibly talk about
    a *cover* for *F*. Here’s the definition:


    *   **Definition (cover):** A cover for a set *F* of FDs is a set *C* of FDs such
    that every FD in *F* is implied by the FDs in *C*.


    As a trivial example, let *F* be the set:


    ```

    { X → Y , Y → Z , X → Z }

    ```


    Then the following are both covers for *F*:


    ```

    { X → Y , Y → Z }

    { X → Y , Y → Z , X → Z }

    ```


    This example illustrates two points right away: First, covers aren’t unique, in
    general; second, any set of FDs is certainly a cover for itself, because among
    other things every FD implies itself. A third and more important point is the
    following: Enforcing the FDs in a cover *C* for a given set *F* will “automatically”
    enforce those in that set *F*. Thus, given some set *F* of FDs that need to be
    enforced, it’s sufficient to find some cover *C* for *F* and enforce the FDs in
    *C* instead. (In fact, it’s sufficient to enforce the FDs in an *irreducible*
    cover for *F*, as will quickly become clear.)


    Now I can define what it means for a cover to be irreducible:


    1.  *Singleton dependant:* Every FD in *C* has just one attribute on the right
    side.


    2.  *Irreducible determinant:* Every FD in *C* is itself irreducible.^([^(90)](#fn90))


    3.  *No redundant FDs:* No FD can be discarded from *C* without losing the property
    that *C* is a cover for *F*.


    *   **Definition (irreducible cover):** A cover *C* for a set *F* of FDs is irreducible
    if and only if it possesses all of the following properties:


    Of course, the following question arises immediately: Given some specific set
    of FDs, how can we find an irreducible cover for that set? I’ll answer this question
    properly in the next chapter. For now, let me just give an example—viz., the following
    set of FDs, which constitute an irreducible cover for the FDs that hold in our
    usual suppliers relvar S:'
