  trans: "\n## 解答\n\n1.  本练习（刻意地）用不同措辞重复了第 4 章的练习 4.6。该论断是不正确的，正如前面那个练习的答案所展示的那样。\n\
    \n2.  真是令人惊讶，如此简短的文本竟能包含这么多错误的陈述……以下是我对所表达观点的一些回应：\n    *   “如果数据是反规范化的，许多查询会更容易理解”：我怀疑这里的*理解*实际上应该是*表述*（例如，*理解*查询“获取所有供应商详情”与数据库的设计方式无关）。如果我猜对了，那么这个论断可能是成立的。但反过来的论断也成立！——正如我在本章正文中展示的，如果数据不是反规范化的，许多查询更容易表述。\n\
    \    *   采访者指出反规范化可能导致完整性问题，并降低支持未预期查询的灵活性。我同意这些看法。\n    *   “规范化及其对消除冗余存储的强调，纯粹是一个事务处理问题”：规范化是关于减少*冗余*，而不是减少冗余*存储*——尽管考虑到当今最广泛可用的实现方式，原谅这位顾问混淆两者也说得通。但它绝对不是一个“事务处理问题”！正如我在第\
    \ 1 章所述，当我们进行数据库设计，特别是进行规范化时，我们主要关注的是数据*是什么*，而不是数据将*如何被使用*。\n    *   “当用户查看数据时，他们看到的是冗余形式”：有时是，有时不是。但即使他们看到的是冗余形式，这也不是支持反规范化设计的论据。例如，可以通过常规的视图机制向用户呈现数据的反规范化感知——我并不是说他们应该这样，只是说他们可以这样——而底层的数据库保持适当的规范化。\n\
    \    *   “为了将数据转换成有用的形式……”：这纯粹是一种有倾向性的言论。\n    *   “[连接]本质上是一种动态反规范化数据以提高易用性的方法”：用户可能认为连接是动态完成的，但通常没有理由认为它们不能静态完成（即提前完成）——而且我相信，在架构良好的`DBMS`下，它们常常会是静态完成的。^(¹²⁰)\
    \ 认为连接的结果必须总是反规范化的，这也是不正确的。“更大的易用性”是另一个有倾向性的说法。\n    *   “[用户]无法容忍连接所需的时间和成本”：连接不一定耗时或昂贵。这同样取决于实现方式。无论如何，在我看来，“无法容忍”这个说法太过武断。\n\
    \    *   “为了解决这个问题，公司在数量不断增长的决策支持数据库中复制数据，这些数据库代表了数据的反规范化视图”：这可能是事实，但如果是这样，那是对当前实现方式的控诉，而不是支持反规范化本身的论据。\n\
    \n3.  首先，代理键*不同于*元组 ID。一方面（显而易见），代理键标识实体，而元组 ID 标识元组，实体和元组之间肯定不存在一一对应关系。（特别是考虑派生元组——例如，某个查询结果中的元组。事实上，派生元组是否会有元组\
    \ ID 根本不明确。）此外，元组 ID 通常带有性能含义，但代理键没有（通常认为通过元组 ID 访问元组很快，但对代理键没有这种说法）。另外，元组 ID\
    \ 通常对用户隐藏，^(¹²¹) 但代理键不能隐藏，这要归因于*信息原理*（见第 2 章练习 2.1）；换句话说，在数据库关系变量中存储元组 ID 很可能是（也期望是！）不可能的，而存储代理键当然是（也期望是）可能的。简而言之：代理键与逻辑设计相关，元组\
    \ ID 与物理设计相关。\n\n    代理键是个好主意吗？嗯，首先要观察到，关系模型对这个问题没有定论；实际上，像一般的设计问题一样，是否使用代理键与*如何应用*关系模型有关，而不是关系模型本身。话虽如此，我也必须说，代理键是好是坏这个问题远非简单明了。双方都有强有力的论据：事实上，论据如此之多，我无法在此详述（尽管其中一些在第\
    \ 17 章有所总结）。更多细节，请参阅我所著《关系数据库文集 1989-1991》（Addison-Wesley，1992 年）中的论文《复合键》。*注：*\
    \ 该论文之所以被称为《复合键》，是因为代理键在实践中最有可能在现有键及对应外键本身是复合键的情况下发挥作用。\n\n4.  我用`SQL`展示解决方案，换换口味。用第二种形式定义第一种（概述）：\n\
    \    ```sql\n    SELECT DISTINCT EX.ENO ,\n        ( SELECT PAY\n          FROM\
    \   EMP AS EY\n          WHERE  EY.ENO = EX.ENO\n          AND    MONTH = 'Jan'\
    \ ) AS JAN_PAY ,\n        ...\n        ( SELECT PAY\n          FROM   EMP AS EY\n\
    \          WHERE  EY.ENO = EX.ENO\n          AND    MONTH = 'Dec' ) AS DEC_PAY\n\
    \    FROM   EMP AS EX\n    ```\n\n    用第一种形式定义第二种（同样是概述）：\n    ```sql\n    SELECT\
    \ ENO , 'Jan' AS MONTH , JAN_PAY AS PAY FROM EMP\n    UNION\n    ...\n    UNION\n\
    \    SELECT ENO , 'Dec' AS MONTH , DEC_PAY AS PAY FROM EMP\n    ```\n\n# 第三部分\n\
    ## 连接依赖、第五范式及相关事项\n\n本书的这一部分对连接依赖和第五范式所做的阐述，就如同前一部分对函数依赖和 Boyce-Codd 范式所做的那样。它还总结了与规范化作为一般设计理论主要组成部分相关的一些零散问题。\n"
- fmt: "# 9. JDs and 5NF (Informal)\n\n> *If you can’t beat ’em, join ’em.*\n> \n\
    > —Anon.\n\nJust as Boyce/Codd normal form is defined in terms of functional dependencies,\
    \ so fifth normal form (5NF) is defined in terms of join dependencies (JDs);^([^(122)](#fn122))\
    \ as noted in Chapter [4](#489629_2_En_4_Chapter.xhtml), in fact, 5NF is *the*\
    \ normal form with respect to JDs, just as BCNF is *the* normal form with respect\
    \ to FDs. And the treatment of these ideas in this part of the book therefore\
    \ parallels the treatment of BCNF and FDs in Part II. In other words, I plan to\
    \ treat the material both formally, in Chapter [10](#489629_2_En_10_Chapter.xhtml),\
    \ and informally in the present chapter.\n\nLet me immediately add that although\
    \ 5NF is indeed “the” normal form with respect to JDs, this state of affairs shouldn’t\
    \ necessarily be taken to mean that 5NF is the ultimate goal of the normalization\
    \ process. *Au contraire*, in fact: There are at least two further normal forms\
    \ that might have a better claim to that title, as we’ll see in Part IV of this\
    \ book. From a pedagogical point of view, however, as well as from a historical\
    \ one, I think it’s desirable to discuss 5NF in detail first. (I mention this\
    \ point simply in order to avoid giving a false impression; one of my reviewers\
    \ felt I should have presented the material in a different sequence, but I don’t\
    \ agree.)\n\nNow, in previous writings I’ve tended to deal with JDs as if they\
    \ were just a generalized kind of FD. I now realize this view of the matter is\
    \ wrong, or at least misleading; rather, it’s better to regard JDs as a completely\
    \ different phenomenon. Of course, FDs and JDs are both dependencies (i.e., constraints),\
    \ and they do resemble each other in certain respects; in particular, the fact\
    \ that a certain JD holds in relvar `R` implies that `R` can be nonloss decomposed\
    \ in certain ways, just as the fact that a certain FD holds in relvar `R` also\
    \ implies that `R` can be nonloss decomposed in certain ways. It’s also true that\
    \ every FD implies a JD, so that if some FD `F` holds in relvar `R`, a certain\
    \ JD `J` holds in `R` also. But not all JDs are implied by FDs; in fact, to speak\
    \ very loosely—but I must emphasize here that what I’m about to say is *extremely*\
    \ imprecise—we might say that 5NF has to do with JDs that aren’t implied by FDs.\
    \ That is, it’s if some relvar `R` is in BCNF, but is subject to some JD that’s\
    \ not implied by FDs, that the notion of 5NF might be relevant.\n\nNow, a relvar\
    \ is in BCNF if and only if all FDs to which it’s subject are implied by keys.\
    \ As you’d probably expect, therefore, a relvar is in 5NF if and only if all JDs\
    \ to which it’s subject are implied by keys.^([^(123)](#fn123)) However, this\
    \ latter notion—i.e., the notion of JDs being implied by keys—is a bit trickier\
    \ to pin down than its FD counterpart; in fact, there’s a very rich theory surrounding\
    \ these ideas, as you’ll soon see, and some of that theory can be a little overwhelming\
    \ (not to say confusing) at first. You need to keep a clear head! As someone much\
    \ more knowledgeable in these matters than I am once said to me: *JDs are very\
    \ mysterious*.\n\nSo much for the preamble; now let’s get down to specifics.\n\
    \n## Join Dependencies—the Basic Idea\n\nMost of the time in this book so far,\
    \ I’ve been making a tacit assumption: namely, I’ve been assuming that when we\
    \ decompose some relvar, we always do so by replacing that relvar by exactly two\
    \ of its projections.^([^(124)](#fn124)) (Note that Heath’s Theorem, which provides\
    \ the formal underpinning for most of what I’ve had to say so far regarding nonloss\
    \ decomposition, does address decomposition into exactly two projections specifically.)\
    \ What’s more, that assumption was fully warranted, so long as our target was\
    \ only BCNF; in other words, it successfully carried us as far as that specific\
    \ target. So you might be surprised to learn that there exist relvars that can’t\
    \ be nonloss decomposed into two projections but can be nonloss decomposed into\
    \ three (or maybe more than three).\n\nAs an aside, I note that, remarkably enough,\
    \ Codd gave an example in 1969, in his very first paper on the relational model\
    \ (see Appendix [D](#489629_2_En_21_Chapter.xhtml)), that showed he was aware\
    \ of the foregoing possibility. However, that example was apparently overlooked\
    \ by most of the paper’s original readers; certainly it seems to have come as\
    \ a surprise to the research community when the possibility was rediscovered several\
    \ years later (in 1977, to be precise).\n\nNow, I said earlier, albeit loosely,\
    \ that 5NF had to do with JDs that aren’t implied by FDs. I can now add, though\
    \ again speaking very loosely, that it has to do with relvars that can’t be nonloss\
    \ decomposed into two projections but can be nonloss decomposed into three or\
    \ more. In other words, it’s when these circumstances arise—i.e., when there are\
    \ (a) JDs that aren’t implied by FDs and (b) relvars that can only be nonloss\
    \ decomposed into three or more projections—that you do really have to come to\
    \ grips with JDs and 5NF.\n\nSo what exactly do we mean when we say some JD holds\
    \ in some relvar? Here’s a definition:\n\n*   **Definition (join dependency):**\
    \ Let `X1`, ..., `Xn` be subsets of the heading `H` of relvar `R`; then the join\
    \ dependency (JD)—sometimes more specifically the *n*-ary JD—\n    ```\n    ☼\
    \ { X1 , ... , Xn }\n    ```\n    holds in `R` if and only if `R` can be nonloss\
    \ decomposed into its projections on `X1`, ..., `Xn`, or in other words if and\
    \ only if every legal value `r` of `R` is equal to the join of its projections\
    \ `r1`, ..., `rn` on `X1`, ..., `Xn`, respectively. `X1`, ..., `Xn` are said to\
    \ be the components of the JD, and the JD overall can be read as “star `X1`, ...,\
    \ `Xn`” (or sometimes “join `X1`, ..., `Xn`”—though I hasten to add that “join”\
    \ really isn’t the mot juste here, because the join operator as usually understood\
    \ joins *relations*, and `X1`, ..., `Xn` aren’t relations but headings).\n\nBy\
    \ way of a simple example, consider the suppliers relvar `S` once again. As we\
    \ know, that relvar is subject to the FD `{CITY} → {STATUS}`, and so Heath’s Theorem\
    \ tells us it can be nonloss decomposed into its projections on `{SNO,SNAME,CITY}`\
    \ and `{CITY,STATUS}`. In other words, the following binary JD holds in that relvar:\n\
    ```\n☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }\n```\n\nPoints arising:\n\
    \n*   Note that it follows from the definition that the union of the components\
    \ `X1`, ..., `Xn` must be equal to `H` (i.e., every attribute of `H` must appear\
    \ in at least one of those components), for otherwise `R` couldn’t possibly be\
    \ equal to the join of the projections corresponding to those components.\n\n\
    *   Different writers use different symbols to denote a JD; I use a special kind\
    \ of star (“☼”), but the symbol ⋈ (“bow tie”) is more frequently encountered in\
    \ the research literature.^([^(125)](#fn125))\n\n*   It might help to point out\
    \ that to say some JD holds is equivalent to saying that if we join the corresponding\
    \ projections together, we’ll never get any “spurious” tuples (as I called them\
    \ in Chapter [3](#489629_2_En_3_Chapter.xhtml), in Exercise 3.2)."
