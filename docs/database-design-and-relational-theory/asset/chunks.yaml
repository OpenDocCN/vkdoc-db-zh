  trans: '

    # **希思定理与非损耗分解**


    ## **希思定理（针对关系变量）**

    设关系变量 `R` 的标题为 `H`，并令 `X`、`Y` 和 `Z` 满足它们的并集等于 `H`（因此 `X`、`Y` 和 `Z` 都是 `H` 的子集）。令
    `XY` 表示 `X` 和 `Y` 的并集，`XZ` 同理。如果 `R` 受函数依赖 `X` → `Y` 约束，则 `R` 可以被非损耗分解为其在 `XY`
    和 `XZ` 上的投影。


    关于非损耗分解（分解到 BCNF 或其他形式）这个一般性话题，我还有最后一点要说明。再次考虑关系变量 `S`，及其函数依赖 `{CITY} → {STATUS}`。根据希思定理，该关系变量可以被非损耗分解为其在
    `{SNO,SNAME,CITY}` 和 `{CITY,STATUS}` 上的投影。然而，显然它也可以被非损耗分解为这两个投影*外加*（比如说）在 `{SNAME,STATUS}`
    上的投影；也就是说，如果我们把这三个投影连接起来，就能回到起点。（如果你不觉得这显而易见，可以使用我们为关系变量 `S` 准备的常规样本值来验证这个说法。）但是，在重建原始关系变量的过程中，显然不需要第三个投影。在进行数据库设计时，出于显而易见的原因，我们通常只考虑那些在重建过程中*需要*每个投影的分解方案——但在本书中，我讨论的是一般的分解，我不会将自己局限在那些每个投影在重建时都需要的分解方案上（当然，除非有明确声明）。


    ## **练习**


    ### **练习 1**

    本章正文中定义的连接（join）运算对于任意的 *n* ≥ 0 是一个 *n* 元运算符，而不仅仅是二元运算符（*n* = 2）。那么，如果 *n* = 1
    会发生什么？如果 *n* = 0 呢？


    ### **练习 2**

    尽可能精确地定义“一个关系变量受一个函数依赖约束”是什么意思。


    ### **练习 3**

    考虑以下函数依赖：

    1. `{ CITY }` → `{ STATUS }`

    2. `{ SNO , CITY }` → `{ STATUS }`

    3. `{ SNO }` → `{ SNO }`

    4. `{ SNO , CITY }` → `{ SNO }`

    5. `{ SNO }` → `{ SNO , CITY }`

    6. `{ SNAME , SNO }` → `{ STATUS , CITY }`

    7. `{ SNO }` → `{ STATUS }`

    8. `{ SNAME }` → `{ STATUS , SNO }`


    其中哪些函数依赖是平凡的？哪些被图 3-1 中给出的关系变量 `S` 的当前值所满足？哪些在关系变量 `S` 中成立？哪些相对于关系变量 `S` 是不可约的？


    ### **练习 4**

    证明希思定理（原始版本）。并证明该定理的逆命题不成立。*注：* 与此相关，请参见第 11 章的练习 11.3。


    ### **练习 5**

    说一个函数依赖被一个超键所蕴含，究竟是什么意思？或者说被一个键所蕴含呢？


    ### **练习 6**

    这是一个谓词：

    > 在周期 `P` 中的第 `D` 天，学生 `S` 正在参加课程 `L`，该课程由教师 `T` 在教室 `C` 授课，其中 `D` 是一周中的一天（周一至周五），`P`
    是一天中的一个节次（1-8）。课程持续一个节次，并拥有一个课程标识符 `L`，该标识符在本周内所有课程中是唯一的。


    为这个数据库设计一组 BCNF 关系变量。它们的键是什么？


    ### **练习 7**

    为以下情况设计一个数据库。需要表示的实体是员工和程序员。每个程序员都是员工，但并非每个员工都是程序员。员工拥有员工编号、姓名和薪水。程序员拥有（单门）编程语言技能。如果程序员可以拥有两门或更多此类技能，会对你的设计产生什么影响？


    ### **练习 8**

    本章正文中给出的*键*的定义在形式上与第 4 章给出的定义有些不同。这些定义在逻辑上是等价的吗？


    ## **答案**


    ### **答案 1**

    单个关系 `r` 的连接 `JOIN{*r*}` 就是 `r`；完全没有关系的连接 `JOIN{ }` 是 `TABLE_DEE`（唯一一个度为 0、基数为
    1 的关系）。更多解释，请参见 *SQL 与关系理论*。


    ### **答案 2**

    参见本章正文。


    ### **答案 3**

    函数依赖 c. 和 d.（仅这两个）是平凡的。所有八个函数依赖 a. – h. 都被关系变量 `S` 的当前值所满足。除 h. 外，其余所有函数依赖在关系变量
    `S` 中都成立。函数依赖 a., c., e., 和 g. 相对于关系变量 `S` 是不可约的；b., d., 和 f. 是可约的。（至于 h.，不可约性的问题不成立，因为该函数依赖在关系变量中不成立。如果你没有立刻理解这一点，请查阅函数依赖不可约性的定义。）


    ### **答案 4**

    希思定理的原始版本指出，如果 (a) 关系 `r` 的标题为 `H`，(b) `X`、`Y` 和 `Z` 是 `H` 的子集，且它们的并集等于 `H`，并且
    (c) `r` 满足函数依赖 `X` → `Y`，那么 (d) `r` 等于其在 `XY` 和 `XZ` 上投影的连接（其中 `XY` 表示 `X` 和 `Y`
    的并集，`XZ` 同理）。下面，我将极其详细地展示该定理的一个证明。*注：* 证明中大量使用了“`t ∈ r.`”这种形式的表达式。该表达式可以读作“元组
    `t` 出现在关系 `r` 中”。


    首先考虑最简单的情况，即 `X`、`Y` 和 `Z` 都是单元素集合（即每个集合只包含一个属性）。设相关属性分别为 `A`、`B` 和 `C`。根据第 3
    章练习 3.2 的答案，我们知道，取 `r` 在 `XY`（即 `{A,B}`）上的投影 `r1` 和在 `XZ`（即 `{A,C}`）上的投影 `r2`，然后将
    `r1` 和 `r2` 连接回去，不会丢失 `r` 的任何元组。现在我来证明，反过来，连接中的每个元组确实都是 `r` 的元组（换句话说，连接不会产生任何“虚假”元组）。设
    `(a,b,c) ∈ JOIN {r1,r2}`。为了在连接中生成这样一个元组，我们必须有 `(a,b) ∈ r1` 和 `(a,c) ∈ r2`。因此，必定存在
    `b''` 和 `c''`，使得元组 `(a,b,c'') ∈ r` 和 `(a,b'',c) ∈ r` 存在。但是 `r` 满足 `{A} → {B}`；因此
    `b = b''`，所以 `(a,b,c) ∈ r`。


    下一个最简单的情况是 `X`、`Y` 和 `Z` 不一定是单元素集合，但它们两两不相交。在这种情况下，我们可以有效地将构成 `X` 的属性视为单个属性（`Y`
    和 `Z` 同理），那么前一段的论证就直接适用了。


    我们现在需要考虑如果 `X`、`Y` 和 `Z` 不是两两不相交会发生什么。有三种情况需要考虑：`X` 和 `Y` 相交，`X` 和 `Z` 相交，以及 `Y`
    和 `Z` 相交。


    首先，假设 `X` 和 `Y` 相交，但 `X` 和 `Z` 不相交，且 `Y` 和 `Z` 不相交（因此 `Z = H – XY`）。回想一下，如果 `X
    → Y` 被满足，那么对于 `Y` 的所有子集 `Y''`，`X → Y''` 也被满足。因此函数依赖 `X → Y – X` 被满足。但是 `X` 和 `Y
    – X` 是不相交的；根据前一个结果，`r` 等于其在 (a) `X` 和 `Y – X` 的并集以及 (b) `XZ` 上投影的连接。但是（再次）`X`
    和 `Y – X` 是不相交的，所以它们的并集等于 `XY`。所以定理在这种情况下也适用，我们可以（并且我将）在证明的剩余部分不失一般性地假设 `X` 和
    `Y` 是不相交的。


    现在假设 `X` 和 `Z` 相交，但 `Y` 和 `Z` 不相交。那么根据前一个结果，`r` 等于其在 (a) `XY` 和 (b) `X` 和 `Z –
    X` 的并集上投影的连接。但是 `X` 和 `Z – X` 的并集等于 `XZ`。所以定理在这种情况下也适用，我们可以（并且我将）在证明的剩余部分不失一般性地假设
    `X` 和 `Z` 是不相交的。

