- fmt: "## Independent Projections\n\nTo close this chapter, I’d like to return to\
    \ the example I opened it with. Just to remind you, that example involved the\
    \ nonloss decomposition of our usual suppliers relvar `S` into its projections\
    \ `SNC` on `{SNO,SNAME,CITY}` and `ST` on `{SNO,STATUS}`. That decomposition lost\
    \ the FD `{CITY} → {STATUS}`, with the consequence that updates to either of the\
    \ projections sometimes required updates to the other, in order to enforce the\
    \ constraint that each city has just one status. By contrast, the “sensible” decomposition\
    \ of `S` into its projections `SNC` (on `{SNO,SNAME,CITY}`) and `CT` (on `{CITY,STATUS}`)\
    \ suffers from no such problem—updates can be made to either projection without\
    \ regard to the other.^([^(96)](#fn96))\n\nFor the sake of the present discussion,\
    \ let me refer to decompositions like the one into `SNC` and `ST` as `bad` and\
    \ decompositions like the one into `SNC` and `CT` as `good`. As we’ve seen, then,\
    \ the projections in a good decomposition can be updated independently of each\
    \ other; for that reason, they’re sometimes referred to explicitly as *independent\
    \ projections*. By contrast, the projections in a bad decomposition aren’t independent\
    \ in that same sense. So we can say that in order to preserve FDs, we want a decomposition\
    \ in which the projections are independent. And there’s a theorem, due to Jorma\
    \ Rissanen, that can help in this regard. Before I state that theorem, however,\
    \ let me give a precise definition of what it means for two projections to be\
    \ independent:\n\n*   **Definition (independent projections):** Projections `R1`\
    \ and `R2` of relvar `R` are independent if and only if every FD that holds in\
    \ `R` also holds in the join of `R1` and `R2`.\n\nHere now is the theorem:\n\n\
    *   **Rissanen’s Theorem:** Let relvar `R`, with heading `H`, have projections\
    \ `R1` and `R2`, with headings `H1` and `H2`, respectively; further, let `H1`\
    \ and `H2` both be proper subsets of `H`, let their union be equal to `H`, and\
    \ let their intersection be nonempty.^([^(97)](#fn97)) Then projections `R1` and\
    \ `R2` are independent if and only if (a) their common attributes constitute a\
    \ superkey for at least one of them and (b) every FD that holds in `R` is implied\
    \ by those that hold in at least one of them.\n\nConsider the “good” decomposition\
    \ of `S` into its projections `SNC` and `CT`. Those two projections are independent,\
    \ because (a) the set of common attributes is just `{CITY}` and `{CITY}` is a\
    \ superkey—actually a key—for `CT`, and (b) every FD that holds in `S` either\
    \ holds in one of the two projections or is implied by those that do (see the\
    \ next chapter). By contrast, consider the “bad” decomposition into the projections\
    \ `SNC` and `ST`. Here the projections aren’t independent, because the FD `{CITY}\
    \ → {STATUS}` can’t be inferred from those holding in those projections (though\
    \ it’s at least true that the set of common attributes, `{SNO}`, is a superkey—actually\
    \ a key—for both).\n\nAs a historical note, I observe that it was Rissanen’s work\
    \ on independent projections (which was done, or at least published, in 1977)\
    \ that laid the foundation for the theory of what we now call FD preservation.\n\
    \n## Exercises\n\n1.  Relvar `SJT` from the section “An Unfortunate Conflict”\
    \ is subject to the FD `{S,J} → {T}`. Write a `Tutorial D` `CONSTRAINT` statement\
    \ to express the multirelvar constraint that replaces this FD if we decompose\
    \ `SJT` into its projections `TJ` and `TS` on `{T,J}` and `{T,S}`, respectively.\n\
    \n2.  (*Repeated from the body of the chapter.*) Suppose relvar `RX2A′` from section\
    \ “... And Another” is decomposed into its projections on `{CLASS,STATUS}` and\
    \ `{CITY,STATUS}`. As noted in that section, an appropriate multirelvar constraint\
    \ will now have to be separately stated and enforced. What does that constraint\
    \ look like?\n\n3.  The following relvar is intended to represent a set of United\
    \ States street addresses:\n    ```\n    ADDR { STREET , CITY , STATE , ZIP }\n\
    \    ```\n    Using `Tutorial D` syntax, a typical tuple of this relvar might\
    \ look like this:\n    ```\n    TUPLE { STREET '1600 Pennsylvania Ave.' ,\n  \
    \  CITY 'Washington' , STATE 'DC' , ZIP '20500' }\n    ```\n    Assume, not entirely\
    \ unrealistically, that the following FDs hold in this relvar and are irreducible:\n\
    \    ```\n    { STREET , CITY , STATE } → { ZIP }\n    { ZIP }               \
    \    → { CITY , STATE }\n    ```\n    How would you decompose this relvar?\n\n\
    4.  Show the effects of applying the 3NF procedure to relvars `RX1`, `RX3`, and\
    \ `RX2` (note the sequence here!) from the body of the chapter.\n\n5.  Here’s\
    \ a predicate:\n    > Film star `S` plays role `R` in movie `M`, which was directed\
    \ by director `D` and released in year `Y`; further, star `S` was born on date\
    \ `B` and therefore has zodiac sign `Z` and Chinese zodiac `C`, and `Z` and `C`\
    \ together determine `S`’s horoscope `H`.\n    Give a set of FDs that capture\
    \ the foregoing state of affairs. State any assumptions you make regarding business\
    \ rules that might be in effect. Also, apply the BCNF procedure to obtain an appropriate\
    \ set of BCNF relvars. Does that procedure lose any FDs?"
