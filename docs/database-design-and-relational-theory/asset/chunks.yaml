  trans: '## 文献中的一些引述


    由于我们接下来将大量讨论范式，我想以一些文献引述作为开篇，这或许不能说是启发性的，但可能是有趣的（？）。整个范式概念的起点当然是*第一*范式（`1NF`），因此一个显而易见的问题是：*你知道`1NF`是什么吗？*
    正如以下引述所表明的（为保护有过者省略了来源），很多人并不知道：


    *   要实现第一范式，表中的每个字段必须传达唯一信息。


    *   当所有属性都是单值时，称该实体处于第一范式（`1NF`）。


    *   当且仅当所有底层域仅包含原子值时，关系才处于`1NF`。


    *   如果不存在重复的属性组，那么[该表]就处于`1NF`。


    现在，或许可以辩称，这些引述即使不是全部，也至少有一部分在某种程度上是正确的——但它们都马虎到无可救药，即使大体方向是对的。*注意：* 如果你好奇的话，我将在第
    4 章给出`1NF`的精确定义。


    让我们仔细看看这里的问题所在。再次列出上述第一条引述，这次是完整版本：


    *   要实现第一范式，表中的每个字段必须传达唯一信息。例如，如果你有一个`Customer`表，其中有两列用于存储电话号码，那么你的设计就违反了第一范式。第一范式相当容易实现，因为很少有人会认为需要在表中存储重复信息。


    好的，那么显然我们讨论的是一种类似这样的设计：


    ![../images/489629_2_En_1_Chapter/489629_2_En_1_Figa_HTML.jpg](img/489629_2_En_1_Figa_HTML.jpg)


    现在，我不能说这是一个好设计，但它肯定没有违反`1NF`。（我说不出它是否是好设计，因为我不知道“两列用于存储电话号码”确切是什么意思——“表中的重复信息”这个表述暗示我们记录了相同的电话号码两次，但这种解释本身就显得荒谬。但即使这种解释正确，它本身也不构成对`1NF`的违反。）


    这是另一条引述：


    *   第一范式...意味着表不应该有“重复组”字段...重复组是指你一遍又一遍地重复相同的基本属性（字段）。一个很好的例子是当你希望存储在杂货店购买的商品时...[*接着作者给出了一个例子，大概是为了说明重复组的概念，是一个名为`Item
    Table`的表，包含名为`Customer`、`Item1`、`Item2`、`Item3`和`Item4`的列*]：


    ![../images/489629_2_En_1_Chapter/489629_2_En_1_Figb_HTML.jpg](img/489629_2_En_1_Figb_HTML.jpg)


    嗯，这个设计几乎肯定是糟糕的——如果顾客购买的商品不是正好四件怎么办？——但它糟糕的原因并不是违反了`1NF`；和前一个例子一样，实际上它是一个`1NF`设计。因此，尽管或许可以声称——事实上也经常有人声称——`1NF`宽松地讲确实意味着“无重复组”，但重复组*并非*“一遍又一遍地重复相同的基本属性”。^(⁶)


    这个怎么样（在互联网上找到的求助呼喊）？我完全逐字引用，只加了一些粗体：


    *   我一直试图找出在`Access`中对表进行规范化的正确方法。据我所知，它从第一范式到第二范式，再到第三范式。通常，就到此为止了，但有时会到第五和第六范式。然后，还有`Cobb
    第三范式`。这些我都理解。**我下周就要开始教这门课了，**而我刚拿到教科书。它说的完全不同。它说第二范式只适用于具有多字段主键的表，第三范式只适用于具有单字段键的表。第四范式可以从第一范式到第四范式，其中主键和非键字段之间不存在独立的一对多关系。有人能帮我澄清一下吗？


    还有一个（这次附带了一个“有帮助的”回复）：


    *   *我不太明白“**规范化**”是什么意思。你能具体说明你指的是哪些规范化规则吗？我的模式在哪些方面不规范？*


    规范化：用对原始事物的引用来替换重复事物的过程。


    *   例如，给定“`john is-a person`”和“`john obeys army`”，可以观察到第二句中的“`john`”是第一句中“`john`”的重复。使用系统提供的手段，第二句应存储为“`->john
    obeys army`”。'
- fmt: '## A Note on Terminology


    As I’m sure you noticed, the quotes in the previous section were expressed for
    the most part in the familiar “user friendly” terminology of tables, rows, and
    columns (or fields). In this book, by contrast, I’ll favor the more formal terms
    `relation`, `tuple` (usually pronounced to rhyme with `couple`), and `attribute`.
    I apologize if this decision on my part makes the text a little harder to follow,
    but I do have my reasons. As I said in *SQL and Relational Theory:* ^([⁷](#fn7))


    > I’m generally sympathetic to the idea of using more user friendly terms, if
    they can help make the ideas more palatable. In the case at hand, however, it
    seems to me that, regrettably, they don’t make the ideas more palatable; instead,
    they distort them, and in fact do the cause of genuine understanding a grave disservice.
    The truth is, a relation is *not* a table, a tuple is *not* a row, and an attribute
    is *not* a column. And while it might be acceptable to pretend otherwise in informal
    contexts—indeed, I often do so myself—I would argue that it’s acceptable only
    if all parties involved understand that those more user friendly terms are just
    an approximation to the truth and fail overall to capture the essence of what’s
    really going on. To put it another way: If you do understand the true state of
    affairs, then judicious use of the user friendly terms can be a good idea; but
    in order to learn and appreciate that true state of affairs in the first place,
    you really do need to come to grips with the formal terms.


    To the foregoing, let me add that (as I said in the preface) I do assume you know
    exactly what `relations`, `attributes`, and `tuples` are—though in fact formal
    definitions of these constructs can be found in Chapter [5](#489629_2_En_5_Chapter.xhtml).


    There’s another terminological matter I need to get out of the way, too. The relational
    model is, of course, a data model. Unfortunately, however, this latter term has
    two quite distinct meanings in the database world.^([⁸](#fn8)) The first and more
    fundamental one is this:


    **Definition (data model, first sense):** An abstract, self-contained, logical
    definition of the data structures, data operators, and so forth, that together
    make up the abstract machine with which users interact.


    This is the meaning we have in mind when we talk about the relational model in
    particular: The data structures in the relational model are relations, of course,
    and the data operators are the relational operators projection, join, and all
    the rest. (As for that “and so forth” in the definition, it covers such matters
    as keys, foreign keys, and various related concepts.)


    The second meaning of the term `data model` is as follows:


    **Definition (data model, second sense):** A model of the data (especially the
    persistent data) of some particular enterprise.


    In other words, a data model in the second sense is just a (logical, and possibly
    somewhat abstract) database design. For example, we might speak of the data model
    for some bank, or some hospital, or some government department.


    Having explained these two different meanings, I’d like to draw your attention
    to an analogy that I think nicely illuminates the relationship between them:


    - A data model in the first sense is like a programming language, whose constructs
    can be used to solve many specific problems but in and of themselves have no direct
    connection with any such specific problem.

    - A data model in the second sense is like a specific program written in that
    language—it uses the facilities provided by the model, in the first sense of that
    term, to solve some specific problem.


    It follows from all of the above that if we’re talking about data models in the
    second sense, then we might reasonably speak of “relational models” in the plural,
    or “a” relational model, with an indefinite article. But if we’re talking about
    data models in the first sense, then *there’s only one relational model*, and
    it’s *the* relational model, with the definite article.


    Now, as you are probably aware, most writings on database design, especially if
    their focus is on pragma rather than the underlying theory, use the term “model,”
    or the term “data model,” exclusively in the second sense. But—*please note very
    carefully!*—I don’t follow this practice in the present book; in fact, I don’t
    use the term “model” at all, except occasionally to refer to the relational model
    as such.


    ## The Running Example


    Now let me introduce the example I’ll be using as a basis for most of the discussions
    in the rest of the book: the familiar—not to say hackneyed—suppliers-and-parts
    database. (I apologize for dragging out this old warhorse yet one more time, but
    I do believe that using essentially the same example in a variety of different
    books and publications can help, not hinder, the learning process.) Sample values
    are shown in Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1) on the next page.^([⁹](#fn9))
    To elaborate:


    ![../images/489629_2_En_1_Chapter/489629_2_En_1_Fig1_HTML.jpg](images/489629_2_En_1_Chapter/489629_2_En_1_Fig1_HTML.jpg)


    Figure 1-1

    The suppliers-and-parts database—sample values


    - `Suppliers`: Relvar `S` denotes suppliers.^([^(10)](#fn10)) Each supplier has
    one supplier number (`SNO`), unique to that supplier; one name (`SNAME`), not
    necessarily unique (though the `SNAME` values in Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1)
    do happen to be unique); one status value (`STATUS`), representing some kind of
    ranking or preference level among suppliers; and one location (`CITY`).

    - `Parts`: Relvar `P` denotes parts (more accurately, kinds of parts). Each kind
    of part has one part number (`PNO`), which is unique; one name (`PNAME`), not
    necessarily unique; one color (`COLOR`); one weight (`WEIGHT`); and one location
    where parts of that kind are stored (`CITY`).

    - `Shipments`: Relvar `SP` denotes shipments—it shows which parts are supplied,
    or shipped, by which suppliers. Each shipment has one supplier number (`SNO`),
    one part number (`PNO`), and one quantity (`QTY`). Also, I assume for the sake
    of the example that there’s at most one shipment at any given time for a given
    supplier and a given part, and so each shipment has a supplier-number / part-number
    combination that’s unique.'
