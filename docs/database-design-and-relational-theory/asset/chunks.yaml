    \ weight WEIGHT, and is stored in city CITY.* Relvar SP: *Supplier SNO supplies\
    \ part PNO in quantity QTY.*\n\n7.  *No answer provided.*\n\n8.  *The Closed World\
    \ Assumption* says, loosely, that everything stated or implied by the database\
    \ is true and everything else is false.^([^(29)](#fn29)) And *The Open World Assumption*—yes\
    \ , there is such a thing—says that everything stated or implied by the database\
    \ is true and everything else is unknown. What are the implications? Well, first\
    \ let’s agree to abbreviate *Closed World Assumption* and *Open World Assumption*\
    \ to CWA and OWA, respectively. Now consider the query “Is supplier S6 in Rome?”\
    \ (meaning, more precisely, “Is there a tuple for supplier S6 in relvar S with\
    \ CITY value equal to Rome?”). **Tutorial D** formulation:\n\n```\n    ( S WHERE\
    \ SNO = 'S6' AND CITY = 'Rome' ) { }\n    ```\n\nAs explained in *SQL and Relational\
    \ Theory*, this expression evaluates to either TABLE_DEE or TABLE_DUM. TABLE_DEE\
    \ and TABLE_DUM are the only relations of degree zero; TABLE_DEE contains just\
    \ one tuple (the empty tuple, in fact), and TABLE_DUM contains no tuples at all.\
    \ Under the CWA, moreover, if the result is TABLE_DEE, it means the answer is\
    \ *yes*, it’s indeed the case that supplier S6 exists and is in Rome; if the result\
    \ is TABLE_DUM, it means the answer is *no*, it’s not the case that supplier S6\
    \ exists and is in Rome. Under the OWA, by contrast, TABLE_DEE still means *yes*,\
    \ but TABLE_DUM means it’s *unknown* whether supplier S6 exists and is in Rome.\n\
    \nNow consider the query “If supplier S6 exists, is that supplier in Rome?” (note\
    \ the logical difference between this query and the one discussed above). Observe\
    \ that the answer to this query has to be *no* if relvar S shows supplier S6 as\
    \ existing but in some city other than Rome, regardless of whether we’re talking\
    \ about the CWA or the OWA.^([^(30)](#fn30)) So here’s the **Tutorial D** formulation:\n\
    \n```\n    TABLE_DEE MINUS ( ( S WHERE SNO = 'S6' AND CITY ≠ 'Rome' ) { } )\n\
    \    ```\n\nNote carefully, therefore, that if this expression evaluates to TABLE_DUM,\
    \ that TABLE_DUM has to mean *no*, *even under the OWA*. Thus, the OWA suffers\
    \ from an inherent ambiguity: Sometimes TABLE_DUM has to mean *unknown* and sometimes\
    \ it has to mean *no*—and of course we can’t say (in general) which interpretation\
    \ applies when.\n\nJust to beat the point to death: TABLE_DEE and TABLE_DUM simply\
    \ do mean *yes* and *no*, respectively, in the relational world, and there’s no\
    \ “third relation” of degree zero available to represent the “third truth value”\
    \ that the OWA fundamentally requires. Thus, the OWA and the relational model\
    \ are fundamentally incompatible with one another.\n\n9.  Precise definitions\
    \ are given in Chapter [5](#489629_2_En_5_Chapter.xhtml).\n\n10.  Two values of\
    \ any kind are equal if and only if they’re the very same value (meaning they\
    \ must be of the same type, a fortiori). So two tuples are equal if and only if\
    \ they’re the very same tuple, and two relations are equal if and only if they’re\
    \ the very same relation. But we can be more specific and spell out the details,\
    \ thus:\n    1.  Two tuples *t* and *t'* are equal if and only if they have the\
    \ same attributes *A1*, ..., *An* and for all *i* (*i* = 1, ..., *n*), the value\
    \ of *Ai* in *t* is equal to the value of *Ai* in *t'*.\n\n2.  Two relations *r*\
    \ and *r'* are equal if and only if they have the same heading and the same body\
    \ (i.e., their headings are equal and their bodies are equal). Note in particular,\
    \ therefore, that two “empty relations” (i.e., relations without any tuples, or\
    \ equivalently relations with empty bodies) are equal if and only if their headings\
    \ are equal.\n\n11.  Yes! However, we would of course want such operators always\
    \ to produce a valid tuple as a result (i.e., we would want *closure* for such\
    \ operations, just as we have closure for relational operations—see the answer\
    \ to Exercise 2.16 below). For tuple union, for example, we would want the input\
    \ tuples to be such that attributes with the same name have the same value (and\
    \ are therefore of the same type, a fortiori). By way of example, let *t1* and\
    \ *t2* be a supplier tuple and a shipment tuple, respectively, and let *t1* and\
    \ *t2* have the same SNO value. Then the union of *t1* and *t2*, UNION{*t1*,*t2*},\
    \ is—to use **Tutorial D** notation—a tuple of type TUPLE {SNO CHAR, SNAME CHAR,\
    \ STATUS INTEGER, CITY CHAR, PNO CHAR, QTY INTEGER}, with attribute values as\
    \ in *t1* or *t2* or both (as applicable). E.g., if *t1* is (S1,Smith, 20,London)\
    \ and *t2* is (S1,P1,300)—to use the shorthand notation for tuples introduced\
    \ in the section “Predicates and Propositions” in the body of the chapter^([^(31)](#fn31))—then\
    \ their union is the tuple (S1,Smith,20,London,P1,300). *Note:* This operation\
    \ might equally well be called *tuple join* instead of tuple union.\n\nBy the\
    \ way, it’s not just the usual set operators that might be adapted to apply to\
    \ tuples—the same goes for certain of the well known relational operators, too\
    \ (as in fact I’ve just suggested with respect to join in particular). One important\
    \ example is the tuple projection operator, which is a straightforward adaptation\
    \ of the relational projection operator. For example, let *t* be a supplier tuple;\
    \ then the projection *t*{SNO,CITY} of *t* on attributes {SNO,CITY} is that subtuple\
    \ of *t* that contains just the SNO and CITY components from *t*. (Of course,\
    \ a subtuple is itself a tuple in its own right.) Likewise, *t*{CITY} is that\
    \ subtuple of *t* that contains just the CITY component from *t*, and *t*{ } is\
    \ that subtuple of *t* that contains no components at all (in other words, it’s\
    \ the 0-tuple—see the answer to Exercise 2.12 below). In fact, it’s worth noting\
    \ explicitly that *every* tuple has a projection on the empty set of attributes\
    \ whose value is, precisely, the 0-tuple.\n\n12.  The empty tuple (note that there’s\
    \ exactly one such; equivalently, all empty tuples are equal to one another) is\
    \ the same thing as the 0-tuple, mentioned in the answer to the previous exercise.\
    \ As for uses for such a tuple, I’ll just say that, conceptually at least, the\
    \ fact that such a tuple does exist is crucially important in numerous ways. In\
    \ particular, the empty tuple is the only tuple in the special relation TABLE_DEE,\
    \ already mentioned in the answer to Exercise 2.8.\n\n13.  To say relvar *R* has\
    \ an empty key is to say *R* can never contain more than one tuple. Why? Because\
    \ every tuple has the same value for the empty set of attributes—namely, the empty\
    \ tuple (see the answers to the previous two exercises); thus, if *R* had an empty\
    \ key, and if *R* were to contain two or more tuples, we would have a key uniqueness\
    \ violation on our hands. And, yes, constraining *R* never to contain more than\
    \ one tuple could certainly be useful. I’ll leave finding an example of such a\
    \ situation as a subsidiary exercise.\n\n14.  A predicate with an empty set of\
    \ parameters is a proposition. In other words, a proposition is a degenerate predicate;\
    \ all propositions are predicates, but “most” predicates aren’t propositions.\n\
    \n15.  Definitions of projection and join are given in Chapter [5](#489629_2_En_5_Chapter.xhtml),\
    \ but here’s a definition of RENAME :\n\n**Definition (attribute renaming):**\
    \ Let *r* be a relation, let *A* be an attribute of *r*, and let *r* not have\
    \ an attribute named *B*. Then the renaming *r* RENAME {*A* AS *B*} is a relation\
