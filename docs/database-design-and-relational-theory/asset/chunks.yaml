    \ up those atoms. And of course those protons and neutrons aren't really indivisible,\
    \ either—they contain a variety of “subsubatomic” particles called *quarks*. And\
    \ so on, possibly (?).\n\nOne last point: An attempt *might* be made to rescue\
    \ the notion of absolute atomicity, as follows. Let’s agree to say a value is\
    \ *not* atomic if and only if operators exist to \"take the value apart,\" as\
    \ it were. (I think this idea, or something very like it, was probably what was\
    \ in Codd’s mind when he said that *nondecomposable* meant, specifically, “nondecomposable\
    \ by the DBMS.”) Thus, a character string isn’t atomic because it can be taken\
    \ apart by means of the SUBSTRING operator; a set isn’t atomic because it can\
    \ be taken apart by means of operators that extract either elements or subsets\
    \ from the set; and so on. By contrast, a fixed point number is atomic, if there\
    \ are no operators to extract its integer and fractional parts (say). But even\
    \ if we were to accept this argument, it seems to me we would then also have to\
    \ accept the argument that the very same value might be atomic today and composite\
    \ tomorrow! Such would be the case for a fixed point number, for example, if there\
    \ were originally no operators to extract its integer and fractional parts but\
    \ such operators were subsequently introduced. And it further seems to me that\
    \ if the notion of atomicity is time dependent in this way, then (as previously\
    \ claimed) it really doesn’t have any absolute meaning.\n\nFootnotes [1](#489629_2_En_4_Chapter.xhtml#Fn1_source)\
