    \   [9](#489629_2_En_9_Chapter.xhtml#Fn9_source)   [10](#489629_2_En_9_Chapter.xhtml#Fn10_source)\
    \   [11](#489629_2_En_9_Chapter.xhtml#Fn11_source)   [12](#489629_2_En_9_Chapter.xhtml#Fn12_source)\n\
    \n# 10. JDs and 5NF (Formal)\n\n> *After great pain, a formal feeling comes.*\n\
    > —Emily Dickinson:\n> *Poem No. 341* (c. 1862):\n> Thomas H. Johnson (ed.):\n\
    > *The Complete Poems of Emily Dickinson* (1960)\n\nJust as Chapter [5](#489629_2_En_5_Chapter.xhtml)\
    \ consisted of a more formal treatment of material introduced informally in Chapter\
    \ [4](#489629_2_En_4_Chapter.xhtml), so this chapter consists of a more formal\
    \ treatment of material introduced informally in Chapter [9](#489629_2_En_9_Chapter.xhtml).\
    \ But there’s rather more to cover in this chapter than there was in Chapter [5](#489629_2_En_5_Chapter.xhtml),\
    \ as you’ll soon see. Let me just say up front that, just as Chapter [5](#489629_2_En_5_Chapter.xhtml)\
    \ had little to say about `2NF` or `3NF`, so this chapter has little to say about\
