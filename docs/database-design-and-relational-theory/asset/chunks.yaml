    { CITY } → { STATUS }

    ```


    简单阐述一下：显然，`S` 中成立的所有函数依赖 (`FD`) 都由这三个 `FD` 共同蕴含，因此这三个 `FD` 肯定构成一个**覆盖** (`cover`)。此外，每个
    `FD` 的**依赖项** (`dependant`) 都是单属性的；从三个**决定因素** (`determinant`) 中都无法再删除任何属性；并且这三个
    `FD` 中没有一个可以被丢弃。因此，这个覆盖实际上是一个**不可约的** (`irreducible`) 覆盖。相比之下，以下几组 `FD` 同样是 `S`
    中成立的 `FD` 的覆盖，但它们不是不可约的（每种情况，为什么不是？）：


    ```

    1. { SNO }  → { SNAME , CITY }

    { CITY } → { STATUS }

    2. { SNO , SNAME } → { CITY }

    { SNO }         → { SNAME }

    { CITY }        → { STATUS }

    3. { SNO }  → { SNAME }

    { SNO }  → { CITY }

    { CITY } → { STATUS }

    { SNO }  → { STATUS }

    ```


    现在让我们回到 `3NF` 过程。具体来看一下它如何应用于 `SJT` 示例。提醒一下，该**关系变量** (`relvar`) 具有属性 `S`、`J`
    和 `T`；候选键为 `{S,J}` 和 `{S,T}`；并且受到函数依赖 `{T} → {J}` 的约束。因此，以下 `FD` 成立：


    ```

    { S , J } → { T }

    { S , T } → { J }

    { T }     → { J }

    ```


    然而，很容易看出，这里的 `FD` `{S,T} → {J}` 是冗余的——事实上，我在本章前面第一次讨论这个例子时实际上就假设了这一点——因此，另外两个
    `FD` 一起构成了一个不可约覆盖（我称之为 `C`）：


    ```

    { S , J } → { T }

    { T }     → { J }

    ```


    现在我们可以应用 `3NF` 过程。我们从一个空的标题集合 `S` 开始。第二步做两件事：它收集 `C` 中具有相同左部的 `FD`（在这个例子中这步实际上已经完成），然后将集合（实际上是标题）


    ```

    { S , J , T }

    { T , J }

    ```


    添加到 `S` 中。第三步没有效果，因为原关系变量的每个属性现在都至少包含在 `S` 的一个元素中。最后一步也没有效果，因为 `S` 中的元素 `{S,J,T}`
    是原关系变量的一个**超键** (`superkey`)。因此，总体而言，`3NF` 过程告诉我们，关系变量 `S` 可以**无损分解** (`nonloss
    decomposed`)，并且以保持 `FD` 的方式，分解为它在 `{S,J,T}` 和 `{T,J}` 上的**投影** (`projection`)。要点如下：


    *   在 `{S,J,T}` 上的投影当然与原关系变量相同！——换句话说，它是一个**恒等投影** (`identity projection`)（见下一节），并且严格来说，这里并没有进行多少分解。

    *   除非我们希望能够表达，例如，布莱克教授教授物理，但同时不存在任何由布莱克教授实际授课的学生，否则似乎没有太多理由在维护原关系变量的同时也维护第二个关系变量（即
    `{T,J}` 上的投影）。如果我们不需要这种能力，我们可能就不希望维护那个关系变量。因此，`3NF` 过程产生的分解不一定是一个推荐的分解——但是，重申一遍，它确保了所有关系变量都在
    `3NF` 中，并且所有的 `FD` 都得以保留。


    我将把它留作一个练习（练习 6.3），来展示当 `3NF` 过程应用于关系变量 `RX1`、`RX2` 和 `RX3` 时会发生什么。同时，我想用几句话结束本节，讨论一下
    `BCNF` 以及一个可能的 `BCNF` 过程。


    首先，我们可以在 `3NF` 过程中添加另一个（第五）步骤，如下所示：


    1.  设 `Z` 是 `S` 中的一个元素，使得关系变量 `R` 在 `Z` 的属性上的投影 `P` 不在 `BCNF` 中；设 `X → Y` 是 `C`
    中在 `P` 中成立的一个 `FD`；并且设 `X` 不是 `P` 的一个超键。在 `S` 中用以下内容替换 `Z`：(a) `X` 和 `Y` 的并集，(b)
    `Z` 和 `Y` 之间的差集 `Z – Y`（按此顺序）。对每个不同的 `Z` 和每个不同的 `X` 执行此步骤。


    现在，应用于关系变量 `SJT` 的 `3NF` 过程产生了一个由标题 `{T,J}` 和 `{S,J,T}` 组成的集合 `S`。`SJT` 在 `{T,J}`
    上的投影是 `BCNF` 的，但 `SJT` 在 `{S,J,T}` 上的（恒等）投影不是，因为 `FD` `{T} → {J}` 在该投影中成立，而 `{T}`
    不是一个超键。因此，应用步骤 5，我们删除标题 `{S,J,T}` 并插入 (a) `{T}` 和 `{J}` 的并集——但这个插入没有效果，因为该并集已经是
    `S` 的一个元素——以及 (b) `{S,J,T}` 和 `{J}` 之间的差集，按此顺序。因此，`S` 最终包含以下标题作为元素：


    ```

    { S , T }

    { T , J }

    ```


    这两个标题是一组 `BCNF` 关系变量的标题，`SJT` 可以无损分解为这些关系变量（这些关系变量的键分别是 `{S,T}` 和 `{T}`）。因此，在
    `3NF` 过程中添加步骤 5 将其转换为一个 `BCNF` 过程，尽管不保证 `FD` 被保留。（事实上，当然不可能提供任何这样的保证，因为我们已经知道
    `BCNF` 和 `FD` 保留可能是相互冲突的目标。）然而，任何丢失的 `FD` 都是那些如果不违反 `BCNF` 就无法保留的 `FD`。


    实际上，我们可以简化问题，直接走向 `BCNF`，完全绕过 `3NF`，使用以下过程（输入与 `3NF` 过程相同——即，它由一个关系变量 `R` 和一个
    `R` 中成立的 `FD` 的不可约覆盖 `C` 组成）：


    1.  将 `S` 初始化为仅包含 `R` 的标题。

    2.  （*与 `3NF` 过程的步骤 2 相同。*）设 `X` 是 `C` 中某个 `FD` 的左部（决定因素）；设 `C` 中左部为 `X` 的 `FD`
    的完整集合为 `X → Y1`, ..., `X → Yn`；并设 `Y1`, ... `Yn` 的并集为 `Y`。将 `X` 和 `Y` 的并集添加到 `S`
    中。对每个不同的 `X` 执行此步骤。

    3.  （*与上面的步骤 5 相同。*）设 `Z` 是 `S` 中的一个元素，使得关系变量 `R` 在 `Z` 的属性上的投影 `P` 不在 `BCNF`
    中；设 `X → Y` 是 `C` 中在 `P` 中成立的一个 `FD`；并且设 `X` 不是 `P` 的一个超键。在 `S` 中用以下内容替换 `Z`：(a)
    `X` 和 `Y` 的并集，(b) `Z` 和 `Y` 之间的差集 `Z – Y`（按此顺序）。对每个不同的 `Z` 和每个不同的 `X` 执行此步骤。


    在这个过程结束时，`S` 的元素是一组 `BCNF` 关系变量的标题，`R` 可以无损分解为这些关系变量，但不一定会丢失 `FD`。请注意，该过程没有提及
    `2NF` 或 `3NF`。

    '
- fmt: '## Identity Decompositions


    It''s a bit of a digression from the main theme of this chapter, but I''d like
    to elaborate briefly on the concept of an `identity projection`. Here''s a definition
    (I define it for `relvar`s, but of course a precisely analogous definition applies
    to relations as well—and tuples too, come to that):


    *   Definition (`identity projection`): The `identity projection` of a given `relvar`
    is the projection of that `relvar` on all of its attributes.


    Now, it should be obvious that any `relvar` can be `nonloss` decomposed, albeit
    trivially, into its `identity projection`. However, some people don''t like to
    think of such a decomposition as being a decomposition, as such, at all (as I
    said in connection with the `SJT` example, there isn''t much decomposition, as
    such, going on here). If you happen to be one of those people, then you might
    prefer the following way of looking at the matter. Let `relvar R` have `heading
    H`. Then it''s certainly true that the `FD { } → { }` holds in `R`, where `{ }`
    is the empty set of attributes (this `FD` is trivial, of course, and holds in
    *every* `relvar`). By Heath''s Theorem, therefore—take `X`, `Y`, and `Z` to be
    `{ }`, `{ }`, and `H`, respectively—`R` can be `nonloss` decomposed into its projections
    `R1` and `R2`, where:


    1.  The `heading XY` of `R1` is the union of `{ }` and `{ }`, which reduces to
    just `{ }`; i.e., `R1` is the projection of `R` on no attributes at all, and its
    value is either `TABLE_DUM`, if `R` is empty, or `TABLE_DEE` otherwise.^([^(92)](#fn92))


    2.  The `heading XZ` of `R2` is the union of `{ }` and `H`, which reduces to just
    `H`; i.e., `R2` is the projection of `R` on all of its attributes, or in other
    words the `identity projection` of `R`.


    Now, I hope it''s clear that this decomposition is `nonloss`—`R` is certainly
    equal to the join of `R1` and `R2`. (On the other hand, it''s also true that the
    combination of `R1` and `R2` fails to meet the usual requirement that both projections
    should be needed in the reconstruction process.)


    While I''m on the subject of what might be called `identity decompositions`, let
    me remark that any `relvar` can also always be decomposed (again trivially, but
    this time "horizontally" instead of "vertically") into the corresponding `identity
    restriction`^([^(93)](#fn93)). Here''s a definition (again I define it for `relvar`s,
    but of course an analogous concept applies to relations as well, though not this
    time to tuples):


    *   Definition (`identity restriction`): The `identity restriction` of a given
    `relvar R` is any restriction of `R` in which the restriction condition is identically
    true—in other words, any restriction of `R` that''s logically equivalent to one
    of the following form:


    ```

    R WHERE TRUE

    ```


    *Note:* In logic, something that''s identically true, such as the boolean expression
    `CITY = CITY`, is called a `tautology`. Thus, we can say the `identity restriction`
    of `relvar R` is any restriction in which the restriction condition is a `tautology`.


    I remark in passing that any given `relvar R` also always has an `empty restriction`^([^(94)](#fn94)),
    which we can denote thus:


    ```

    R WHERE FALSE

    ```


    The (disjoint!) union of the `identity restriction` and the `empty restriction`
    of a given `relvar R` is of course identically equal to `R`. *Note:* In logic,
    something that''s identically false, such as the boolean expression `CITY ≠ CITY`,
    is called a `contradiction`; thus, we can say the `empty restriction` of `relvar
    R` is any restriction in which the restriction condition is a `contradiction`^([^(95)](#fn95)).


    ## More on the Conflict


    To revert to the main theme of the chapter: By now we''ve seen several examples
    in which `FD`s might be lost. In most of those examples, we could avoid losing
    the `FD` by being careful; in one case, however (the `SJT` example), the objectives
    of preserving `FD`s and `BCNF` decomposition were genuinely in conflict with each
    other. So the obvious question arises: Can we characterize those cases where there
    really is a conflict? The answer is yes; in fact, it''s easy to do so.


    Let `R` be the `relvar` we''re dealing with, and let `C` be an `irreducible cover`
    for the `FD`s that hold in `R`. Construct an `FD graph` as follows:


    1.  Create a node for each attribute of `R`.


    2.  Let `X → Y` be an `FD` in `C` for which `X` involves two or more attributes;
    create a "supernode" containing just the nodes for the attributes named in `X`.
    (If you''re doing this on paper, you could draw a circle enclosing the individual
    attribute nodes.) Supernodes are considered to be nodes. Repeat this step for
    each `FD` in `C` for which the determinant involves two or more attributes.


    3.  Let `X → Y` be an `FD` in `C`. Draw a directed arc from the node for `X` to
    the node for `Y`. Repeat this step for each `FD` in `C`.


    4.  If and only if the finished graph contains any cycles (where a cycle is a
    sequence of two or more directed arcs from a node to itself), then `R` cannot
    be `nonloss` decomposed into `BCNF` projections without losing an `FD`.


    As an exercise, try applying the foregoing procedure to the various examples discussed
    earlier in the chapter. When you do, you''ll quickly understand (if you haven''t
    done so already) what''s really going on here. To spell the point out: There''s
    a genuine conflict only if the `relvar` involves a pattern of `FD`s akin to the
    pattern that obtains in the `SJT` example.'
  raw: '## Identity Decompositions


    It’s a bit of a digression from the main theme of this chapter, but I’d like to
    elaborate briefly on the concept of an identity projection. Here’s a definition
    (I define it for relvars, but of course a precisely analogous definition applies
    to relations as well—and tuples too, come to that):


    *   **Definition (****identity projection)** **:** The identity projection of
    a given relvar is the projection of that relvar on all of its attributes.


    Now, it should be obvious that any relvar can be nonloss decomposed, albeit trivially,
    into its identity projection. However, some people don’t like to think of such
    a decomposition as being a decomposition, as such, at all (as I said in connection
    with the SJT example, there isn’t much decomposition, as such, going on here).
    If you happen to be one of those people, then you might prefer the following way
    of looking at the matter. Let relvar *R* have heading *H*. Then it’s certainly
    true that the FD { } → { } holds in *R*, where { } is the empty set of attributes
    (this FD is trivial, of course, and holds in *every* relvar). By Heath’s Theorem,
    therefore—take *X*, *Y*, and *Z* to be { }, { }, and *H*, respectively—*R* can
    be nonloss decomposed into its projections *R1* and *R2*, where:


    1.  The heading *XY* of *R1* is the union of { } and { }, which reduces to just
    { }; i.e., *R1* is the projection of *R* on no attributes at all, and its value
    is either TABLE_DUM, if *R* is empty, or TABLE_DEE otherwise.^([^(92)](#fn92))


    2.  The heading *XZ* of *R2* is the union of { } and *H*, which reduces to just
    *H*; i.e., *R2* is the projection of *R* on all of its attributes, or in other
    words the identity projection of *R*.


    Now, I hope it’s clear that this decomposition is nonloss—*R* is certainly equal
    to the join of *R1* and *R2*. (On the other hand, it’s also true that the combination
    of *R1* and *R2* fails to meet the usual requirement that both projections should
    be needed in the reconstruction process.)


    While I’m on the subject of what might be called *identity decompositions*, let
    me remark that any relvar can also always be decomposed (again trivially, but
    this time “horizontally” instead of “vertically”) into the corresponding identity
    *restriction*.^([^(93)](#fn93)) Here’s a definition (again I define it for relvars,
    but of course an analogous concept applies to relations as well, though not this
    time to tuples):


    *   **Definition (****identity restriction)** **:** The identity restriction of
    a given relvar *R* is any restriction of *R* in which the restriction condition
    is identically true—in other words, any restriction of *R* that’s logically equivalent
    to one of the following form:


    ```

    R WHERE TRUE

    ```


    *Note:* In logic, something that’s identically true, such as the boolean expression
    CITY = CITY, is called a *tautology*. Thus, we can say the identity restriction
    of relvar *R* is any restriction in which the restriction condition is a tautology.


    I remark in passing that any given relvar *R* also always has an *empty* restriction,^([^(94)](#fn94))
    which we can denote thus:


    ```

    R WHERE FALSE

    ```


    The (disjoint!) union of the identity restriction and the empty restriction of
    a given relvar *R* is of course identically equal to *R*. *Note:* In logic, something
    that’s identically false, such as the boolean expression CITY ≠ CITY, is called
    a *contradiction* ; thus, we can say the empty restriction of relvar *R* is any
    restriction in which the restriction condition is a contradiction.^([^(95)](#fn95))


    ## More on the Conflict


    To revert to the main theme of the chapter: By now we’ve seen several examples
    in which FDs might be lost. In most of those examples, we could avoid losing the
    FD by being careful; in one case, however (the SJT example), the objectives of
    preserving FDs and BCNF decomposition were genuinely in conflict with each other.
    So the obvious question arises: Can we characterize those cases where there really
    is a conflict? The answer is yes; in fact, it’s easy to do so.


    Let *R* be the relvar we’re dealing with, and let *C* be an irreducible cover
    for the FDs that hold in *R*. Construct an *FD graph* as follows:


    1.  Create a node for each attribute of *R*.


    2.  Let *X* → *Y* be an FD in *C* for which *X* involves two or more attributes;
    create a “supernode” containing just the nodes for the attributes named in *X*.
    (If you’re doing this on paper, you could draw a circle enclosing the individual
    attribute nodes.) Supernodes are considered to be nodes. Repeat this step for
    each FD in *C* for which the determinant involves two or more attributes.


    3.  Let *X* → *Y* be an FD in *C*. Draw a directed arc from the node for *X* to
    the node for *Y*. Repeat this step for each FD in *C*.


    4.  If and only if the finished graph contains any cycles (where a cycle is a
    sequence of two or more directed arcs from a node to itself), then *R* cannot
    be nonloss decomposed into BCNF projections without losing an FD.


    As an exercise, try applying the foregoing procedure to the various examples discussed
    earlier in the chapter. When you do, you’ll quickly understand (if you haven’t
    done so already) what’s really going on here. To spell the point out: There’s
    a genuine conflict only if the relvar involves a pattern of FDs akin to the pattern
    that obtains in the SJT example.'
