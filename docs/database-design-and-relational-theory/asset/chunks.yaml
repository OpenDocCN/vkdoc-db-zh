  trans: "\n## 过强的 PJ/NF\n\n回顾一下，5NF 最初被称为 PJ/NF，而 PJ/NF 的含义是（相当宽松地说）每个连接依赖（JD）都是由键所蕴含的。事实上，在引入\
    \ PJ/NF 的那篇论文中，Fagin 还引入了他称为 `过强的` PJ/NF，其含义是（再次相当宽松地说）每个 JD 都是由某个**单独考虑**的特定键所蕴含的。请注意，后者正是人们可能直觉上认为\
    \ `常规的` PJ/NF（即 5NF）定义应该有的样子——回顾第 10 章和第 12 章中关于 BCNF、4NF 和 5NF 定义之间平行性的论述。尽管如此，定义如下：\n\
    \n`定义（过强的 PJ/NF）：` 当且仅当关系变量 `R` 的每一个 JD 都由 `R` 的某个键所蕴含时，关系变量 `R` 才处于过强的 PJ/NF\
    \ 中。\n\n过强的 PJ/NF 显然蕴含 5NF（即“常规的” PJ/NF），但反之则不成立。一个反例就足以证明后一个事实：^(²⁰³) 考虑一个仅包含属性\
    \ `A`、`B`、`C` 和 `D` 的关系变量 `R`，且仅有键 `{A}` 和 `{B}`。让 `R` 中唯一成立的依赖是那些由这些键所蕴含的依赖（因此\
    \ `R` 肯定处于 5NF）。现在考虑 JD ☼{`AB`,`BC`,`AD`}。应用成员算法，我们看到这个 JD 在 `R` 中成立；但它并非任何一个键**单独考虑**时的结果，通过检查成员算法也可以看出这一点。因此，`R`\
    \ 处于 5NF（或 PJ/NF）中，但并不处于过强的 PJ/NF 中。\n\n## “限制-并”范式\n\n考虑供应商-零件数据库中的零件关系变量 `P`。到目前为止我所描述的规范化理论告诉我们关系变量\
    \ `P` 处于一个“良好”的范式中；实际上，它处于 5NF 中，因此可以保证不存在可以通过进行投影来消除的异常。但为什么要把所有零件都保存在一个关系变量中呢？如果将红色零件保存在一个关系变量（例如\
    \ `RP`）中，蓝色零件保存在另一个关系变量（例如 `BP`）中，以此类推，这种设计怎么样呢？换句话说，通过**限制**（restriction）而不是投影来分解原始零件关系变量的可能性如何？由此产生的结构会是一个好的设计还是一个坏的设计？（实际上，除非我们非常小心，否则这几乎肯定是一个坏设计，我们将在本书的第五部分看到；然而，这里的要点是，经典的规范化理论本身对此完全没有发言权。）\n\
    \n因此，设计研究的另一个方向在于研究通过投影之外的某种算子来分解关系变量的含义。在上面的例子中，分解算子是，如前所述，（不相交的）限制，而相应的重组算子是（不相交的）并。因此，或许有可能构建一种“限制-并”规范化理论，类似于——但区别于——我们在这本书大部分篇幅中一直在考虑的投影-连接规范化理论。我不想在这里就这些事情说得更具体；可以说，沿着这些思路的一些初步想法可以在以下文献中找到：\n\
    \n1.  Smith 的一篇论文，其中讨论了一种称为 (3,3)NF 的范式。^(²⁰⁴) Smith 首先表明，(3,3)NF 蕴含 BCNF；其次，一个\
    \ (3,3)NF 的关系变量不必处于 4NF，一个 4NF 的关系变量也不必处于 (3,3)NF。因此，如上所述，归约到 (3,3)NF 与归约到 4NF（以及\
    \ 5NF）是正交的。\n\n2.  在 Fagin 的 PJ/NF 论文中，作为某种附录，初步讨论了一种称为 PJSU/NF 的范式（S 代表“分割”，U\
    \ 代表并）。*暂定定义：* 当且仅当关系变量 `R` 处于 PJ/NF（即 5NF）中，并且无法通过限制将其分割成关系变量 `R1` 和 `R2`，使得\
    \ `R1` 和 `R2` 的依赖不同时，关系变量 `R` 才处于 PJSU/NF 中。\n\n## 练习\n\n1.  定义 DK/NF。给出一个处于 6NF\
    \ 但不处于 DK/NF 的关系变量的例子。\n\n2.  SKNF 和过强的 PJ/NF 之间有什么区别？实际上，*存在*区别吗？\n\n3.  尽可能精确地给出关系算子**限制**和**并**的定义。\n\
    \n4.  你会如何将本章提到的各种范式（以及 6NF）纳入图 13-1 的范式层次结构中？\n\n## 答案\n\n1.  定义见本章正文。至于例子，假设关系变量\
    \ `SP` 受到一个约束，其大意是：奇数编号的零件只能由奇数编号的供应商提供，偶数编号的零件只能由偶数编号的供应商提供。（当然，这个例子非常牵强，但对于当前目的来说足够了。）那么这个约束显然不是由关系变量\
    \ `SP` 中成立的域和键约束所蕴含的，因此该关系变量不处于 DK/NF 中；然而它肯定处于 6NF 中。\n\n2.  肯定存在区别，因为过强的 PJ/NF\
    \ 蕴含 5NF，而 5NF 蕴含 SKNF，并且反向蕴含不成立。但很容易混淆两者，因为以下两个表面相似的观察都是正确的。令 `R` 为一个关系变量，并令\
    \ `J` = ☼{`X1`,...,`Xn`} 为一个在 `R` 中成立的不可约的 JD。那么：\n    *   当且仅当对于每一个这样的 `J`，每个\
    \ `Xi` (`i` = 1, ..., `n`) 都包含 `R` 的**某个**键时，`R` 才处于 SKNF 中。\n    *   当且仅当对于每一个这样的\
    \ `J`，每个 `Xi` (`i` = 1, ..., `n`) 都包含 `R` 的**同一个**键时，`R` 才处于过强的 PJ/NF 中。\n\n3.\
    \  如果你认为这些定义来得太晚，我很抱歉：\n    *   `定义（限制）：` 令 `r` 为关系 <`H`,`h`>，并令 `bx` 为一个布尔表达式，其中每个属性引用都标识了\
    \ `r` 的某个属性，并且没有任何关系变量引用。那么 `bx` 表示一个限制条件，记作 `c`，而 `r` 按照 `c` 的限制，即 `r WHERE c`，是关系\
    \ <`H`,`x`>，其中 `x` 是 `r` 的所有使 `c` 求值为 TRUE 的元组的集合。\n    *   `定义（并）：` 令关系 `r1`,\
    \ ..., `rn` (`n` ≥ 0) 都具有相同的标题 `H`。那么 `r1`, ..., `rn` 的并，即 `UNION {r1,...,rn}`，是一个标题为\
    \ `H`、主体为所有满足 `t` 至少出现在 `r1, r2, ..., rn` 之一中的元组 `t` 的集合的关系。（如果 `n` = 0，则需要某种语法机制（此处未显示）来指定相关的标题\
    \ `H`，结果是具有该标题的唯一空关系。）请注意，这里定义的并是一个 `n` 元算子，而不仅仅是一个二元算子。\n\n4.  这个问题不容易回答！图 15-1\
    \ 是我的尝试。\n\n    ![../images/489629_2_En_15_Chapter/489629_2_En_15_Fig1_HTML.jpg](img/489629_2_En_15_Fig1_HTML.jpg)\n\
    \n    图 15-1：范式层次结构（III）\n\n该图就其范围而言是准确的。但是：\n\n*   需要添加 DK/NF——可能与 6NF 处于同一级别（DK/NF\
    \ 和 6NF 都不蕴含对方，但“大多数” DK/NF 的关系变量处于 5NF 中）。\n*   需要添加过强的 PJ/NF——同样，可能与 6NF 处于同一级别。\n\
    *   需要添加 (3,3)NF——可能与 EKNF 处于同一级别但偏向一侧（因为 (3,3)NF 蕴含 BCNF，但 (3,3)NF 和 4NF 都不蕴含对方）。\n\
    *   需要添加 PJSU/NF——同样，可能与 6NF 处于同一级别。\n\n但请注意，即使我们只停留在“直接主流”中（即从 1NF 到 6NF，包含两者），仍然有十一个逻辑上不同的范式；其他的——即本章讨论的那些——或许可以公允地称为“特例”。\n"
- fmt: '# Part V Orthogonality


    Orthogonality


    To repeat something I said in Chapter 1, database design is not my favorite subject.
    The reason is that so little of design practice is truly scientific; normalization
    is scientific, of course, but not much else is. However, the topic of this part
    of the book, orthogonality, does represent another tiny piece of science in what’s
    otherwise still, sadly, a fairly subjective field.


    # 16. The Principle of Orthogonal Design


    > *Orthogonal* At right angles to; independent.

    >

    > —David Darling: *The Universal Book of Mathematics* (2004)


    I’ve said repeatedly in earlier parts of this book that normalization is the science
    (or a large part of the science, at any rate) underlying database design. Thus,
    it’s appropriate to begin this chapter with a quick review of normalization principles
    and a brief analysis of how well normalization meets its objectives.


    ## Two Cheers for Normalization


    Here first, then, is a simplified summary of the principles of normalization:


    1.  A `relvar` not in `5NF` should be decomposed into a set of `5NF` projections.^(^([^(205)](#fn205))^)

    2.  The original `relvar` should be reconstructable by joining those projections
    back together again—i.e., the decomposition should be nonloss.

    3.  Every projection should be needed in the reconstruction process.

    4.  The decomposition should preserve dependencies (`FDs` and `JDs`), insofar
    as it can do so without violating the first principle.


    Normalization is far from being a panacea, however, as we can easily see by considering
    what its goals are and how well it measures up against them. Here are those goals:


    *   To achieve a design that’s a “good” representation of the real world (i.e.,
    one that’s logically correct and intuitively easy to understand, and is a good
    basis for future growth)

    *   To reduce redundancy

    *   Thereby to avoid certain update anomalies that might otherwise occur

    *   To simplify the statement and enforcement of certain integrity constraints


    I’ll consider each in turn.


    *   *Good representation of the real world:* Normalization does well on this one.
    I have no criticisms on this score.

    *   *Reduce redundancy:* Normalization is a good start on this problem too, but
    it’s only a start. For one thing, it’s a process of taking projections, and we’ve
    seen that not all redundancies can be removed by taking projections; indeed, there
    are many kinds of redundancy that normalization simply doesn’t address at all.
    (Chapter 17 takes up this issue.) For another thing, taking projections, even
    when the decomposition is nonloss, can cause dependencies to be lost, as we saw
    in Chapter 6 and elsewhere.

    *   *Avoid update anomalies:* This point is, at least in part, just the previous
    one by another name. It’s well known that designs that aren’t properly normalized
    can be subject to certain update anomalies, precisely because of the redundancies
    they entail. In `relvar STP`, for example (see Figure 1-2 in Chapter 1), supplier
    `S1` might be shown as having status `20` in one tuple and status `25` in another.


    Of course, this particular anomaly can arise only if a less than perfect job is
    being done on integrity constraint enforcement. Perhaps a better way to think
    about the update anomaly issue is this: The constraints needed to prevent such
    anomalies will be easier to state, and might be easier to enforce, if the design
    is properly normalized than they would be if it isn’t (see the next bullet item
    below). Yet another way to think about it is: More single-tuple updates^([^(206)](#fn206))
    will be logically acceptable if the design is properly normalized than would be
    the case if it isn’t (because unnormalized designs imply redundancy—i.e., several
    tuples saying the same thing—and redundancy in turn implies that sometimes we
    have to update several things at the same time).


    *   *Simplify statement and enforcement of constraints:* As we know from earlier
    chapters, some dependencies imply others. (More generally, in fact, constraints
    of any kind can imply others. As a trivial example, if shipment quantities must
    be less than or equal to `5000`, they must certainly be less than or equal to
    `6000`.) Now, if constraint *A* implies constraint *B*, then stating and enforcing
    *A* will effectively state and enforce *B* “automatically” (indeed, *B* won’t
    need to be separately stated at all, except perhaps by way of documentation).
    And normalization to (at least) `5NF` gives us a very simple way of stating and
    enforcing certain important constraints; basically, all we have to do is define
    keys and enforce their uniqueness—which we’re going to do anyway—and then all
    applicable `JDs` (and all applicable `MVDs` and `FDs` as well) will effectively
    be stated and enforced automatically, because they’ll all be implied by those
    keys. So normalization does a pretty good job in this area too. (Of course, I’m
    ignoring here the various multirelvar constraints that the normalization process
    is likely to give rise to.)


    Here on the other hand are several more reasons, over and above those already
    given, why normalization is no panacea:


    *   First, `JDs` and `MVDs` and `FDs` aren’t the only kind of constraint, and
    normalization doesn’t help with any others.

    *   Second, given a particular set of `relvar`s, there’ll often be several distinct
    nonloss decompositions into `5NF` projections—see Chapter 6 for several examples—and
    there’s little or no formal guidance available to tell us which one to choose
    in such cases. (To be honest, though, I doubt whether this lack is likely to cause
    major problems in practice.)

    *   Third, there are many design issues that normalization simply doesn’t address.
    For example, what is it that tells us there should be just one suppliers `relvar`,
    instead of one for London suppliers, one for Paris suppliers, and so on? It certainly
    isn’t normalization as classically understood.


    All of that being said, I must make it clear that I don’t want the foregoing comments
    to be seen as any kind of attack. As I said in Chapter 8, I believe anything less
    than a fully normalized design is strongly contraindicated. But the fact remains
    that normalization (what I referred to as “the scientific part of design”) as
    such really doesn’t do as much of the job as we’d like—and so it’s good to be
    able to say that now there’s a tiny piece of additional science available to us.
    That’s what orthogonal design is all about.


    *Note:* The concept of orthogonality has evolved over time. As a result, portions
    of this chapter are at odds, somewhat, with previous writings—mostly by myself—on
    this same subject. What’s more, I very much doubt whether this chapter is the
    last word, either. I do believe the chapter is accurate as far as it goes; however,
    further refinements to the material might well be possible, and desirable, in
    the future. *Caveat lector*.'
