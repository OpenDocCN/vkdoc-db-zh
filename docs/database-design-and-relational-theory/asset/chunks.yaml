  trans: '


    ## 第五范式


    之前，在我们讨论 `FDs` 和 `BCNF` 时，我们涉及了关于 **平凡 FD**、**FD 可归约性**、**由键蕴含的 FD** 以及各种相关事项的讨论。正如你目前可能预料到的那样，`JDs`
    和 `5NF` 也存在类似的概念，但细节要稍微复杂一些。嗯，`JD` 是平凡的这个概念实际上非常直接：


    *   **定义（**平凡 JD**）：** 设 `☼{*X1*,...,*Xn*}` 是一个关于关系模式 `H` 的 `JD`，记为 `J`。那么，当且仅当每一个具有关系模式
    `H` 的关系都满足 `J` 时，`J` 才是平凡的。


    根据这个定义，很容易证明以下结论：


    *   **定理：** 设 `☼{*X1*,...,*Xn*}` 是一个关于关系模式 `H` 的 `JD`，记为 `J`。那么，当且仅当某个 `Xi`（1
    ≤ `i` ≤ `n`）等于 `H` 时，`J` 才是平凡的（因为每个具有关系模式 `H` 的关系必然满足每一个形如 `☼{...,*H*,...}` 的、关于
    `H` 的 `JD`）。


    我们可以将此定理视为一个可操作的（或“语法上的”）定义，因为它提供了一个在实践中易于应用的有效测试。（相比之下，形式化或“语义上的”定义在判断一个给定 `JD`
    是否平凡这一实际问题上用处不大。）


    我将把 `JD 可归约性` 的讨论推迟到下一章。在此之前，我想解释一下 `JD` 由键蕴含的含义：


    *   **定义（由键蕴含的 JD）：** 设关系变量 `R` 的关系模式为 `H`，并设 `☼{*X1*,...,*Xn*}` 是一个关于 `H` 的 `JD`，记为
    `J`。那么，当且仅当每一个满足 `R` 的键约束的关系 `r` 也满足 `J` 时，`J` 才是由 `R` 的键所蕴含的。


    这个定义需要一定的阐述。首先，说某个关系满足某个特定的键约束，就是说它满足适用的唯一性约束；并且，如果它满足构成某个键的属性集上的唯一性约束，那么它肯定也满足该属性集的每个超集上的唯一性约束（当然，只要该超集是相关关系模式的子集即可）——换句话说，也满足每个对应的超键上的唯一性约束。因此，定义中“满足
    `R` 的键约束”的短语可以被替换为“满足 `R` 的超键约束”，而不会产生任何实质性差异。同样，“由键蕴含”的概念也完全可以视为“由超键蕴含”，同样也不会产生任何实质性差异。


    其次，如果定义中提到的 `JD` `J` 是平凡的会怎样？嗯，在这种情况下，根据定义，`J` 被每一个具有关系模式 `H` 的关系 `r` 所满足，因此，它当然也被每一个满足
    `R` 的键约束的关系 `r` 所满足。所以，平凡 `JDs` 总是“由键蕴含的”，这是显而易见的。


    第三，考虑非平凡的 `JDs`。我们如何判断某个非平凡的 `JD` `J` 是否被某个关系变量的键所蕴含？这个问题确实有一个令人满意的答案，但它有点复杂，因此我将把它推迟到下一节讨论。在此之前，我想给出
    `5NF` 的定义，并对该定义做些说明：


    *   **定义（第五范式）：** 当且仅当关系变量 `R` 的每一个 `JD` 都由 `R` 的键所蕴含时，该关系变量才处于第五范式（`5NF`），也称为投影-连接范式（`PJ/NF`）。


    现在，应该很清楚，如果一个 `JD` 由 `R` 的键所蕴含，那么它当然在 `R` 中成立（即它当然是“`R` 的一个 `JD`”）。*但反之则不成立：*
    一个 `JD` 可以在 `R` 中成立，却没有被 `R` 的键所蕴含。换句话说，`5NF` 定义的关键在于，在一个 `5NF` 关系变量中成立的唯一 `JDs`
    是我们无法消除的那些——这意味着它们是由键所蕴含的（包括平凡的情况作为一个特例）。^(¹³⁶)


    我想通过指出 `BCNF` 和 `5NF` 定义之间一个直观上很有吸引力的平行关系来结束本节：


    *   `R` 处于 `BCNF`，当且仅当每一个在 `R` 中成立的 `FD` 都由 `R` 的键所蕴含。


    *   `R` 处于 `5NF`，当且仅当每一个在 `R` 中成立的 `JD` 都由 `R` 的键所蕴含。


    然而，也有一个显著的差异。在 `BCNF` 定义中，我们可以将“由键蕴含”的短语简化为“由*一个*键蕴含”（意指任意单独考虑的键）——因为，如果关系变量 `R`
    具有键 `K1`, ..., `Kn`，并且对于某个键 `Ki`，`FD` `Ki` → `Y` 在 `R` 中成立，那么对于所有键 `Ki`（1 ≤ `i`
    ≤ `n`），`FD` `Ki` → `Y` 必然在 `R` 中成立。相比之下，这种简化不适用于 `5NF`——在 `5NF` 关系变量中成立的 `JDs`
    是那些由组合在一起的键所蕴含的 `JDs`，*而不仅仅*是由某个单独考虑的键所蕴含。例如，我们暂时假设关系变量 `S` 有两个键：`{SNO}` 和 `{SNAME}`。那么，下面的
    `JD`（我们已经见过多次的一个重复）——

    ```

    ☼ { { SNO , SNAME } , { SNO , STATUS } , { SNAME , CITY } }

    ```

    ——将会在该关系变量中成立。（明确来说，每一个满足这两个键约束的关系都将满足此 `JD`。）但是，一个不满足*这两个*键约束的关系，也不一定会满足该 `JD`，因此该
    `JD` 不在该关系变量中成立，正是因为 `{SNAME}` 实际上不是一个键。*练习：* 创建一些示例数据来证明这些陈述的真实性。


    '
- fmt: '## JDs Implied by Keys


    So how do we determine whether a given nontrivial JD is implied by keys? It turns
    out there’s an algorithm, the *membership algorithm* (due to Fagin), that does
    the job. It works like this. Let relvar `R` have heading `H`, and let ☼ `{X1,
    ..., Xn}` be a JD, `J` say, with respect to `H`. Then:


    1.  If two distinct components of `J` both include the same key `K` of `R`, replace
    them in `J` by their union.

    2.  Repeat the previous step until no further replacements are possible.


    Then the algorithm succeeds, and the original JD is implied by the keys of `R`,
    if and only if `J` is now trivial—i.e., if and only if the final version of `J`
    contains `H` as a component.^([^(137)](#fn137)) (Note that trivial JDs in particular
    cause the algorithm to succeed, trivially.)


    Let’s look at a few examples. First of all, consider our usual suppliers relvar
    `S`. Here’s another JD—let’s call it `J1`—that holds in that relvar:


    ```

    ☼ { { SNO , SNAME } , { SNO , STATUS } , { SNO , CITY } }

    ```


    We already know by repeated application of Heath’s Theorem that this JD holds
    in `S`. However, observe now that the components `{SNO,SNAME}` and `{SNO,STATUS}`
    both include the key `{SNO}`. Applying the membership algorithm, therefore, we
    can replace them by their union `{SNO,SNAME,STATUS}`. `J1` now looks like this:


    ```

    ☼ { { SNO , SNAME , STATUS } , { SNO , CITY } }

    ```


    Note that (a) this revised version of `J1` is itself a JD with respect to the
    heading of relvar `S`, and also that (b) relvar `S` is subject to it—two facts
    that together should give some insight as to what’s going on with the algorithm
    (see further explanation later).


    Next, the components `{SNO,SNAME,STATUS}` and `{SNO,CITY}` of this latter JD both
    include the key `{SNO}`, and so we can replace them by their union. We obtain:


    ```

    ☼ { { SNO , SNAME , STATUS , CITY } }

    ```


    This further revision of `J1` is again a JD (a *unary* JD, in fact) with respect
    to the heading of `S`. However, all it says is that relvar `S` is equal to the
    “join” of just its identity projection (recall from the answer to Exercise 5.1
    in Chapter [5](#489629_2_En_5_Chapter.xhtml) that the join of a single relation
    `r`, `JOIN{r}`, is identically equal to `r`). In other words, that further revision
    of `J1` simply says that `S` can be “nonloss decomposed” into its identity projection.
    But this observation is trivially true: *Any* relvar can be “nonloss decomposed”
    into its identity projection, as we saw in Chapter [6](#489629_2_En_6_Chapter.xhtml).
    Indeed, the JD is now formally trivial, since it contains a component that’s equal
    to the pertinent heading. It follows that JD `J1` as originally stated is implied
    by the keys of relvar `S`.


    By way of a counterexample, consider now the following JD—let’s call it `J2`—which
    also holds in relvar `S`:


    ```

    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS } }

    ```


    Since the sole key, `{SNO}`, of the relvar is certainly not included in both components
    of this (binary) JD, the membership algorithm has no effect on it. Thus, the output
    from that algorithm is equal to the input (i.e., it consists of the original JD
    `J2`, unchanged); no component of that output is equal to the entire heading,
    and so `J2` isn’t implied by keys (and relvar `S` isn’t in 5NF, therefore).


    Finally, let’s consider some more abstract examples. Let relvar `R` have attributes
    `A`, `B`, `C`, `D`, `E`, and `F` (only), and let `R` have keys `{A}`, `{B}`, and
    `{C,D}` (only). Further, let `AB` denote the set of attributes `{A,B}`, and similarly
    for other attribute name combinations (“Heath notation”—see Chapter [7](#489629_2_En_7_Chapter.xhtml)).
    Now consider the following JDs:


    1.  ☼ `{` `AB` `,` `ACDE` `,` `BF` `}`

    2.  ☼ `{` `ABC` `,` `ACD` `,` `BEF` `}`

    3.  ☼ `{` `AB` `,` `AC` `,` `ADEF` `}`

    4.  ☼ `{` `ABC` `,` `CDEF` `}`

    5.  ☼ `{` `ABD` `,` `ACDE` `,` `DF` `}`


    Try applying the membership algorithm to these JDs for yourself before reading
    any further. If you do, you’ll find that Nos. 1-3 are implied by keys (and `R`
    is therefore subject to them, necessarily), while Nos. 4-5 aren’t. To elaborate
    briefly:


    *   Nos. 1 and 2 are both implied by the pair of keys `{A}` and `{B}` taken together,
    but not by any individual key.

    *   By contrast, No. 3 is implied by the key `{A}` considered in isolation.

    *   No. 4 would be implied by keys—actually by an individual key—if and only if
    `{C}` were a key, but it isn’t; what’s more, that JD can’t possibly hold in `R`,
    because if it did, then `{C}` would have to be a key after all (think about it!).

    *   As for No. 5, it clearly isn’t implied by the keys; it might or might not
    hold in `R`, but if it does, then `R` can’t be in 5NF.


    So what exactly is going on in these examples? Let me try to explain the intuition
    behind what I’ve been saying (you might like to try working through what follows
    in terms of the suppliers relvar `S` and the JD ☼`{{SNO,SNAME},{SNO,STATUS},{SNAME,CITY}}`,
    under the assumption once again that `{SNO}` and `{SNAME}` are both keys for that
    relvar):


    *   Let `X1`, ..., `Xn` be subsets of the heading `H` of relvar `R`, such that
    the union of `X1`, ..., `Xn` is equal to `H`.

    *   Let `J` be the JD ☼`{X1, ..., Xn}`, and let `J` be implied by the keys of
    `R`.

    *   Let `r` be the relation that’s the current value of `R`.

    *   Choose, arbitrarily, two distinct elements (components) of the set `{X1, ...,
    Xn}`, say `X1` and `X2`.

    *   Let `r1` and `r2` be the projections of `r` on `X1` and `X2`, respectively.


    Now, if `X1` and `X2` both include the same key `K` of `R`, then the join `r12`
    of `r1` and `r2`—whose heading `X12` will be the union of `X1` and `X2`—will be
    a strict one to one join, and so `r1` and `r2` can be replaced by `r12` without
    loss of information. (At the same time, `X1` and `X2` can be replaced in `J` by
    `X12`.) Since (as stated) the original version of `J` was implied by the keys
    of `R`, performing such replacements repeatedly will, by definition, eventually
    yield a relation (a) that’s equal to the original relation `r`, and in particular
    (b) will therefore have a heading equal to the entire heading `H`.


    Let me now point out that everything I’ve said so far becomes much simpler in
    the common special case where the pertinent relvar `R` has just one key `K`. In
    that case, the JD ☼`{X1, ..., Xn}` is implied by keys if and only if the following
    are both true:


    1.  Every attribute of `R` is included in at least one of `X1`, ..., `Xn`. (This
    requirement always applies, of course, in the general case as well as in this
    special one.)

    2.  The sole key `K` of `R` is included in each of `X1`, ..., `Xn`—in other words,
    each of `X1`, ..., `Xn` is a superkey.


    So if `R` has just one key `K`, then `R` is in 5NF if and only if every component
    of every JD that holds in `R` includes that key `K`.^([^(138)](#fn138)) However,
    please note that—***this is important!***—I’m assuming here that the only JDs
    under consideration are ones that are irreducible with respect to `R`. See Chapter
    [11](#489629_2_En_11_Chapter.xhtml) for further explanation.


    By way of an example of the foregoing point, consider the parts relvar `P`. The
    only irreducible JDs ☼`{X1, ..., Xn}` that hold in that relvar are such that each
    `Xi` (`i` = 1, ..., `n`) includes the sole key `{PNO}`. Those JDs are clearly
    all implied by that sole key, therefore, and relvar `P` is thus in 5NF. Here’s
    one of the JDs in question:


    ```

    ☼ { { PNO , PNAME , COLOR } , { PNO , WEIGHT , CITY } }

    ```


    Thus, relvar `P` can be nonloss decomposed into its projections on the components
    of this JD. (Whether we would actually want to perform that decomposition is another
    matter, of course. We know we could if we wanted to, that’s all.)'
