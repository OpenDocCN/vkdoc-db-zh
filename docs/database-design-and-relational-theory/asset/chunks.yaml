  trans: '## 关于关系变量的定义


    *   **关系变量 S**：供应商的编号（*SNO*）、名称（*SNAME*）、所在城市（*CITY*）以及状态（*STATUS*）。

    *   **关系变量 P**：零件的编号（*PNO*）、名称（*PNAME*）、颜色（*COLOR*）、重量（*WEIGHT*）以及存储城市（*CITY*）。

    *   **关系变量 SP**：供应商（*SNO*）供应零件（*PNO*）的数量（*QTY*）。


    ## 答案


    *未提供答案。*


    ## 封闭世界假设与开放世界假设


    *封闭世界假设*（CWA）粗略地讲，是指数据库中明确陈述或隐含的一切都为真，而其他一切则为假。^(²⁹) 而*开放世界假设*（OWA）——没错，确实有这种东西——则是指数据库中明确陈述或隐含的一切都为真，而其他一切则为未知。这有什么含义呢？首先，我们同意将*封闭世界假设*和*开放世界假设*分别缩写为
    CWA 和 OWA。现在考虑查询“供应商 S6 在罗马吗？”（更精确地说，“在关系变量*S*中，是否存在*SNO*值为''S6''且*CITY*值为''罗马''的元组？”）。**Tutorial
    D** 表述如下：


    ```

    ( S WHERE SNO = ''S6'' AND CITY = ''Rome'' ) { }

    ```


    正如《SQL 与关系理论》中所解释的，该表达式的结果要么是`TABLE_DEE`，要么是`TABLE_DUM`。`TABLE_DEE`和`TABLE_DUM`是仅有的两个度数为零的关系；`TABLE_DEE`只包含一个元组（实际上是空元组），而`TABLE_DUM`则完全不包含任何元组。在
    CWA 下，如果结果为`TABLE_DEE`，则意味着答案是*是的*，供应商 S6 确实存在且位于罗马；如果结果为`TABLE_DUM`，则意味着答案是*不是*，供应商
    S6 不存在或不在罗马。相反，在 OWA 下，`TABLE_DEE`仍然意味着*是的*，但`TABLE_DUM`意味着供应商 S6 是否存在或在罗马是*未知的*。


    现在考虑查询“如果供应商 S6 存在，那么该供应商在罗马吗？”（请注意此查询与上面讨论的查询在逻辑上的区别）。请注意，如果关系变量*S*显示供应商 S6 存在但位于罗马以外的其他城市，那么这个查询的答案必须是*不是*，无论我们讨论的是
    CWA 还是 OWA。^(³⁰) 因此，这里的**Tutorial D**表述是：


    ```

    TABLE_DEE MINUS ( ( S WHERE SNO = ''S6'' AND CITY ≠ ''Rome'' ) { } )

    ```


    所以，务必注意，如果此表达式的结果是`TABLE_DUM`，那么这个`TABLE_DUM`必须意味着*不是*，*即使在 OWA 下也是如此*。因此，OWA
    存在固有的模糊性：有时`TABLE_DUM`必须意味着*未知*，而有时它必须意味着*不是*——当然我们（一般来说）无法确定何时适用哪种解释。


    需要再次强调的是：在关系世界中，`TABLE_DEE`和`TABLE_DUM`分别代表*是的*和*不是*，并且没有可用的“第三个度数为零的关系”来表示 OWA
    从根本上要求的“第三个真值”。因此，OWA 和关系模型从根本上是不兼容的。


    ## 精确定义


    精确的定义在第 5 章中给出。


    ## 值的相等性


    任何类型的两个值，当且仅当它们是同一个值时才相等（这意味着它们必须是同一类型，这是不言而喻的）。因此，两个元组相等当且仅当它们是同一个元组，两个关系相等当且仅当它们是同一个关系。但我们可以更具体地阐述细节：

    1.  两个元组*t*和*t''*相等，当且仅当它们具有相同的属性*A1*, ..., *An*，并且对于所有*i* (*i* = 1, ..., *n*)，*t*中*Ai*的值等于*t''*中*Ai*的值。

    2.  两个关系*r*和*r''*相等，当且仅当它们有相同的标题和相同的体（即，它们的标题相等且体相等）。因此，特别要注意，两个“空关系”（即没有任何元组的关系，或等价地说体为空的关系）相等当且仅当它们的标题相等。


    ## 元组上的运算


    是的！然而，我们当然希望此类运算符总是产生一个有效的元组作为结果（即，我们希望此类运算具有*闭包*，就像我们关系运算具有闭包一样——参见下面练习 2.16
    的答案）。例如，对于元组并，我们希望输入元组满足同名属性具有相同值（因此，不言而喻，它们是同一类型）。举例来说，令*t1*和*t2*分别是一个供应商元组和一个发货元组，并且令*t1*和*t2*具有相同的*SNO*值。那么*t1*和*t2*的并集`UNION{*t1*,*t2*}`——使用**Tutorial
    D**符号——是一个类型为`TUPLE {SNO CHAR, SNAME CHAR, STATUS INTEGER, CITY CHAR, PNO CHAR,
    QTY INTEGER}`的元组，其属性值来自*t1*或*t2*或两者（如适用）。例如，如果*t1*是`(S1,Smith, 20,London)`，*t2*是`(S1,P1,300)`——使用本章正文“谓词与命题”一节中引入的元组简写符号^(³¹)——那么它们的并集是元组`(S1,Smith,20,London,P1,300)`。*注意：*
    此操作同样可以称为*元组连接*而非元组并。


    顺便说一句，不仅常见的集合运算符可以调整应用于元组——某些著名的关系运算符也是如此（正如我刚才在连接方面所暗示的）。一个重要的例子是元组投影运算符，它是关系投影运算符的直接改编。例如，令*t*为一个供应商元组；那么*t*在属性集`{SNO,CITY}`上的投影*t*{SNO,CITY}，是*t*中仅包含来自*t*的*SNO*和*CITY*分量的子元组。（当然，子元组本身也是一个元组。）同样，*t*{CITY}是*t*中仅包含*CITY*分量的子元组，而*t*{
    }是*t*中不包含任何分量的子元组（换句话说，它是 0 元组——参见下面练习 2.12 的答案）。事实上，值得注意的是，*每一个*元组都有一个在空属性集上的投影，其值正是
    0 元组。


    ## 空元组


    空元组（注意有且只有一个这样的元组；等价地说，所有空元组彼此相等）就是前面练习答案中提到的 0 元组。至于这种元组的用途，我只想说，至少在概念上，这样一个元组的存在在许多方面至关重要。特别是，空元组是特殊关系`TABLE_DEE`中唯一的元组，这已在练习
    2.8 的答案中提到。


    ## 空键


    说关系变量*R*有一个空键，是说*R*永远不能包含超过一个元组。为什么？因为每个元组对于空属性集都有相同的值——即空元组（参见前两个练习的答案）；因此，如果*R*有一个空键，并且如果*R*包含两个或更多元组，我们将面临键唯一性违反。而且，是的，约束*R*永远不能包含超过一个元组当然可能是有用的。我将寻找这种情况的例子作为一个附属练习。


    ## 谓词与命题


    一个具有空参数集的谓词是一个命题。换句话说，命题是一个退化的谓词；所有命题都是谓词，但“大多数”谓词不是命题。


    ## 投影与连接的定义


    投影和连接的定义在第 5 章中给出，但这里是**RENAME**的定义：


    **定义（属性重命名）**：令*r*为一个关系，*A*为*r*的一个属性，且*r*没有一个名为*B*的属性。那么重命名*r* `RENAME {*A* AS
    *B*}` 是一个关系*r''*，其 (a) 标题与*r*的标题相同，只是该标题中的属性*A*被重命名为*B*，(b) 体与*r*的体相同，只是该体中对*A*的所有引用（更准确地说，该体中的元组中对*A*的引用）被替换为对*B*的引用。'
- fmt: "*Note*: `Tutorial D` additionally supports a form of `RENAME` that allows\
    \ two or more separate attribute renamings to be carried out in parallel (“multiple\
    \ `RENAME`”). Examples are given in Chapter [16](#489629_2_En_16_Chapter.xhtml).\n\
    \n## Part II: Functional Dependencies, Boyce/Codd Normal Form, and Related Matters\n\
    \nFunctional Dependencies, Boyce/Codd Normal Form, and Related Matters\n\nAlthough\
    \ normal forms as such aren’t the whole of design theory, it’s undeniable that\
    \ they’re a very large part of that theory, and they form the principal topic\
    \ of Parts II–IV of this book. The present part, Part II, takes the story as far\
    \ as Boyce/Codd normal form (`BCNF`), which is “the” normal form with respect\
    \ to functional dependencies (`FDs`).\n\n## 3. Normalization: Some Generalities\n\
    \n> *Normal: See abnormal.*\n>\n> —from an early IBM PL/I reference manual (1960s)\n\
    \nIn this chapter, I want to clarify certain general aspects of further normalization\
    \ before I start getting into specifics (which I’ll do in the next chapter). I’ll\
    \ begin by taking a closer look at the sample value of relvar `S` from Figure\
    \ [1-1](#489629_2_En_1_Chapter.xhtml#Fig1) (repeated for convenience as Figure\
    \ [3-1](#489629_2_En_3_Chapter.xhtml#Fig1) below):\n\n![../images/489629_2_En_3_Chapter/489629_2_En_3_Fig1_HTML.jpg](images/489629_2_En_3_Chapter/489629_2_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\nThe suppliers relvar—sample value\n\nRecall now that the functional\
    \ dependency (`FD`)\n\n```\n{ CITY } -> { STATUS }\n```\n\nholds in relvar `S`\
    \ (I’ve included an arrow in the figure to suggest this fact). Because that `FD`\
    \ holds in that relvar^([^(32)](#fn32)), it turns out that the relvar is in second\
    \ normal form (`2NF`) but not in third (`3NF`). As a consequence, it suffers from\
    \ redundancy; to be specific, the fact that a given city has a given status appears\
    \ many times, in general. And the discipline of *further normalization*—which\
    \ , please note, from this point forward I’ll abbreviate most of the time to just\
    \ *normalization* , unqualified—would therefore suggest that we decompose the\
    \ relvar into two relvars `SNC` and `CT` of lesser degree, as indicated in Figure\
    \ [3-2](#489629_2_En_3_Chapter.xhtml#Fig2) (which shows, of course, values for\
    \ those relvars corresponding to the sample value shown for relvar `S` in Figure\
    \ [3-1](#489629_2_En_3_Chapter.xhtml#Fig1)).\n\n![../images/489629_2_En_3_Chapter/489629_2_En_3_Fig2_HTML.jpg](images/489629_2_En_3_Chapter/489629_2_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2\nRelvars `SNC` and `CT`—sample values\n\nPoints arising from this\
    \ example:\n\n*   First, the decomposition, or normalization, certainly eliminates\
    \ the redundancy—the fact that a given city has a given status now appears exactly\
    \ once.\n\n*   Second, the decomposition process is basically a process of *taking\
    \ projections*—the relations shown in Figure [3-2](#489629_2_En_3_Chapter.xhtml#Fig2)\
    \ are each projections of the relation shown in Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1).\
    \ In fact, we can write a couple of equations:^([^(33)](#fn33))\n\n    ```\n \
    \   SNC  =  S { SNO , SNAME , CITY }\n    CT   =  S { CITY , STATUS }\n    ```\n\
    \n    *Note:* Other kinds of decomposition are also possible, but I’ll assume\
    \ until further notice that the term *decomposition*, unqualified, means decomposition\
    \ via projection specifically.\n\n*   Third, the decomposition process is *nonloss*\
    \ (also called *lossless*)—no information is lost in the process, because the\
    \ relation shown in Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1) can be reconstructed\
    \ by taking the *join* of the relations shown in Figure [3-2](#489629_2_En_3_Chapter.xhtml#Fig2):\n\
    \n    ```\n    S  =  SNC JOIN CT\n    ```\n\n    (`Tutorial D` syntax again).\
    \ Thus, we can say the relation in Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1)\
    \ and the pair of relations in Figure [3-2](#489629_2_En_3_Chapter.xhtml#Fig2)\
    \ are *information equivalent*—or, to state the matter more precisely, for any\
    \ query that can be performed against the relation of Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1),\
    \ there’s a corresponding query that can be performed against the relations of\
    \ Figure [3-2](#489629_2_En_3_Chapter.xhtml#Fig2) (and vice versa) that produces\
    \ the same result. Clearly, such “losslessness” of decompositions is an important\
    \ property; whatever we do by way of normalization, we certainly mustn’t lose\
    \ any information when we do it.\n\n*   It follows from the foregoing that just\
    \ as projection is the decomposition operator (with respect to normalization as\
    \ conventionally understood), so join is the corresponding *re*composition operator.\n\
    \nFootnotes [1](#489629_2_En_2_Chapter.xhtml#Fn1_source)   [2](#489629_2_En_2_Chapter.xhtml#Fn2_source)\
    \   [3](#489629_2_En_2_Chapter.xhtml#Fn3_source)   [4](#489629_2_En_2_Chapter.xhtml#Fn4_source)\
