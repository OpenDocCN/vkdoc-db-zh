- fmt: '# Heath''s Theorem and Nonloss Decomposition


    ## Heath''s Theorem (for relvars)

    Let relvar `R` have heading `H` and let `X`, `Y`, and `Z` be such that their union
    is equal to `H` (so `X`, `Y`, and `Z` are all subsets of `H`). Let `XY` denote
    the union of `X` and `Y`, and similarly for `XZ`. If `R` is subject to the FD
    `X` → `Y`, then `R` can be nonloss decomposed into its projections on `XY` and
    `XZ`.


    There’s one further point I want to make on the general topic of nonloss decomposition
    (to BCNF or otherwise). Once again consider relvar `S`, with its FD `{CITY} →
    {STATUS}`. By Heath’s Theorem, that relvar can be nonloss decomposed into its
    projections on `{SNO,SNAME,CITY}` and `{CITY,STATUS}`. However, it can clearly
    also be nonloss decomposed into those two projections *together with* (say) the
    projection on `{SNAME,STATUS}`; that is, if we join all three of those projections
    together, we get back to where we started. (Check this claim for yourself, using
    our usual sample value for relvar `S`, if it isn’t immediately obvious.) However,
    that third projection clearly isn’t needed in the process of reconstructing the
    original relvar. Now, when we’re doing database design, for obvious reasons we
    usually consider only decompositions for which every projection *is* needed in
    the reconstruction process—but in this book I’m discussing decompositions in general,
    and I won’t limit myself to those in which every projection is needed for reconstruction
    (barring explicit statements to the contrary, of course).


    ## Exercises


    ### Exercise 1

    The version of join defined in the body of the chapter is an *n-*adic operator
    for arbitrary *n* ≥ 0, not just a dyadic one (*n* = 2). So what happens if *n*
    = 1? Or *n* = 0?


    ### Exercise 2

    Define as precisely as you can what it means for a relvar to be subject to a functional
    dependency.


    ### Exercise 3

    Consider the following FDs:

    1. `{ CITY }` → `{ STATUS }`

    2. `{ SNO , CITY }` → `{ STATUS }`

    3. `{ SNO }` → `{ SNO }`

    4. `{ SNO , CITY }` → `{ SNO }`

    5. `{ SNO }` → `{ SNO , CITY }`

    6. `{ SNAME , SNO }` → `{ STATUS , CITY }`

    7. `{ SNO }` → `{ STATUS }`

    8. `{ SNAME }` → `{ STATUS , SNO }`


    Which of these FDs are trivial? Which ones are satisfied by the current value
    of relvar `S` as given in Figure 3-1? Which hold in relvar `S`? Which are irreducible
    with respect to relvar `S`?


    ### Exercise 4

    Prove Heath’s Theorem (original version). Prove also that the converse of that
    theorem isn’t valid. *Note:* In this connection, see also Exercise 11.3 in Chapter
    11.


    ### Exercise 5

    What exactly does it mean to say an FD is implied by a superkey? Or a key?


    ### Exercise 6

    Here’s a predicate:

    > On day `D` during period `P`, student `S` is attending lesson `L`, which is
    being taught by teacher `T` in classroom `C`, where `D` is a day of the week (Monday-Friday)
    and `P` is a period (1-8) within the day. Lessons are one period in duration and
    have a lesson identifier `L` that’s unique with respect to all lessons taught
    in the week.


    Design a set of BCNF relvars for this database. What are the keys?


    ### Exercise 7

    Design a database for the following. The entities to be represented are employees
    and programmers. Every programmer is an employee, but not every employee is a
    programmer. Employees have an employee number, name, and salary. Programmers have
    a (single) programming language skill. What difference would it make to your design
    if programmers could have two or more such skills?


    ### Exercise 8

    The definition of *key* given in the body of the chapter is somewhat different
    in form from the definition given in Chapter 4. Are those definitions logically
    equivalent?


    ## Answers


    ### Answer 1

    The join of a single relation, `JOIN{*r*}`, is just `r`; the join of no relations
    at all, `JOIN{ }`, is `TABLE_DEE` (the only relation of degree zero and cardinality
    one). For further explanation, see *SQL and Relational Theory*.


    ### Answer 2

    See the body of the chapter.


    ### Answer 3

    FDs c. and d. (only) are trivial. All eight FDs a. – h. are satisfied by the current
    value of relvar `S`. All but h. hold in relvar `S`. FDs a., c., e., and g. are
    irreducible with respect to relvar `S`; FDs b., d., and f. are reducible. (As
    for h., the question of irreducibility doesn’t arise, since that FD doesn’t hold
    in the relvar. Check the definition of FD irreducibility if you don’t immediately
    grasp this point.)


    ### Answer 4

    The original version of Heath’s Theorem says that if (a) relation `r` has heading
    `H`, (b) `X`, `Y`, and `Z` are subsets of `H` whose union is equal to `H`, and
    (c) `r` satisfies the FD `X` → `Y`, then (d) `r` is equal to the join of its projections
    on `XY` and `XZ` (where `XY` denotes the union of `X` and `Y`, and similarly for
    `XZ`). In what follows, I show a proof of this theorem in excruciating detail.
    *Note:* The proof makes much use of expressions of the form “`t ∈ r.`” This expression
    can be read as “tuple `t` appears in relation `r`.”


    First consider the simplest possible case, in which `X`, `Y`, and `Z` are singleton
    sets (i.e., contain just one attribute each). Let the attributes in question be
    `A`, `B`, and `C`, respectively. Now, we know from the answer to Exercise 3.2
    in Chapter 3 that no tuple of `r` is lost by taking the projections `r1` of `r`
    on `XY` (i.e., on `{A,B}`) and `r2` of `r` on `XZ` (i.e., on `{A,C}`), respectively,
    and then joining `r1` and `r2` back together again. I now show that, conversely,
    every tuple of the join is indeed a tuple of `r` (in other words, the join doesn’t
    generate any “spurious” tuples). Let `(a,b,c) ∈ JOIN {r1,r2}`. In order to generate
    such a tuple in the join, we must have `(a,b) ∈ r1` and `(a,c) ∈ r2`. Hence there
    must exist tuples `(a,b,c'') ∈ r` and `(a,b'',c) ∈ r` for some `b''` and some
    `c''`. But `r` satisfies `{A} → {B}`; hence `b = b''`, and so `(a,b,c) ∈ r`.


    The next simplest case is the one in which `X`, `Y`, and `Z` aren’t necessarily
    singleton sets but are pairwise disjoint. In this case, we can effectively regard
    the attributes constituting `X` as a single attribute (and similarly for `Y` and
    `Z`), and the argument of the previous paragraph then applies directly.


    We now need to consider what happens if `X`, `Y`, and `Z` aren’t pairwise disjoint.
    There are three cases to consider: `X` and `Y` not disjoint, `X` and `Z` not disjoint,
    and `Y` and `Z` not disjoint.


    First, then, let `X` and `Y` not be disjoint, but let `X` and `Z` be disjoint
    and let `Y` and `Z` be disjoint (hence `Z = H – XY`). Recall now that if `X →
    Y` is satisfied, then so is `X → Y''` for all subsets `Y''` of `Y`. Hence the
    FD `X → Y – X` is satisfied. But `X` and `Y – X` are disjoint; by the previous
    result, therefore, `r` is equal to the join of its projections on (a) the union
    of `X` and `Y – X` and (b) `XZ`. But (again) `X` and `Y – X` are disjoint, so
    their union is equal to `XY`. So the theorem applies in this case also, and we
    can (and I will) assume without loss of generality in the remainder of the proof
    that `X` and `Y` are disjoint.


    Now let `X` and `Z` not be disjoint, but let `Y` and `Z` be disjoint. By the previous
    result, then, `r` is equal to the join of its projections on (a) `XY` and (b)
    the union of `X` and `Z – X`. But the union of `X` and `Z – X` is equal to `XZ`.
    So the theorem applies in this case also, and we can (and I will) assume without
    loss of generality in the remainder of the proof that `X` and `Z` are disjoint.'
