    # 13. ETNF, RFNF, SKNF


    > *形式中最重要的事情，是无论使用何种形式，都要保持自由。*

    >

    > ——华莱士·史蒂文斯：*《关于诗歌的笔记》* (1937)


    在其他条件相同的情况下，我们通常希望数据库中的*冗余*尽可能少。这里的*冗余*我特指——至少就本章而言——可以通过取投影来消除的任何冗余。当然，我们使用进一步规范化（或简称规范化）的原则来帮助我们实现这一目标。多年来，人们一直认为一个关系变量必须符合第五范式（`5NF`，也称为投影-连接范式或`PJ/NF`），才能在上述意义上消除冗余。然而，令人有些惊讶的是，事实证明这种看法是不正确的——也就是说，事实证明可以定义几种其他的范式，它们都弱于`5NF`且强于第四范式（`4NF`），并且它们在消除冗余方面与`5NF`同样有效。这些范式是：


    *   本质元组范式，`ETNF`

    *   无冗余范式，`RFNF`（也称为键完全范式，`KCNF`）

    *   超键范式，`SKNF`


    此外，使用符号“`⇒`”表示逻辑蕴涵，存在一个定理，大意是：`5NF` ⇒ `SKNF` ⇒ `RFNF` ⇒ `ETNF` ⇒ `4NF`，而反向的蕴涵关系均不成立；也就是说，一个关系变量若符合此处列出的任一范式，则（a）必然也符合其在序列中右侧的下一个范式，但（b）*不一定*也符合其左侧的范式。请参阅图
    13-1（这是第 3 章图 3-3 的扩展版本）。


    ![../images/489629_2_En_13_Chapter/489629_2_En_13_Fig1_HTML.jpg](img/489629_2_En_13_Fig1_HTML.jpg)


    图 13-1


    范式层次结构（II）


    本章剩余部分将相当深入地描述这些新范式——即 `ETNF`、`RFNF`（或 `KCNF`）和 `SKNF`——以及各种相关事项。但请注意，本章既旨在作为教程，也至少同样旨在作为参考；其中的细节微妙且相当令人困惑，并且可能难以记住，我当然不期望你仅通过一两次阅读就全部吸收它们。我认为在大多数情况下你也不需要做到这一点。不过，至少让我给你一些关于即将展开的讨论结构的概览，这样在我们开始深入细节之前，你能对整体论证过程有所了解。


    本章包含四个主要小节。第一节，“`5NF` 过于严格”，提供了一些动机性材料，接下来的三节则分别讨论 `ETNF`、`RFNF` 和 `SKNF`。具体而言：


    *   关于 `ETNF` 的小节——顺便说一句，这显然最长——提供了 (a) 一个符合 `ETNF` 但不符合 `5NF` 的关系变量，以及 (b) 一个符合
    `4NF` 但不符合 `ETNF` 的关系变量的示例。

    *   关于 `RFNF` 的小节提供了 (a) 一个符合 `RFNF` 但不符合 `5NF` 的关系变量，以及 (b) 一个符合 `ETNF` 但不符合
    `RFNF` 的关系变量的示例。

    *   关于 `SKNF` 的小节提供了 (a) 一个符合 `SKNF` 但不符合 `5NF` 的关系变量，以及 (b) 一个符合 `RFNF` 但不符合
    `SKNF` 的关系变量的示例。


    因此，综合来看，这些示例除其他外，阐明了那个主张——或者更确切地说是定理——`5NF` ⇒ `SKNF` ⇒ `RFNF` ⇒ `ETNF` ⇒ `4NF`，而反向的蕴涵关系均不成立。


    ## 5NF 过于严格


    本节提供两个例子。第一个例子提醒我们 `5NF` 旨在解决的冗余问题；第二个例子表明，也许 `5NF` 并不是该问题的最佳解决方案。


    ### 第一个例子：5NF 的作用


    第一个例子只是第 9 章和第 10 章中 `SPJ` 例子的重复。我相信你会记得，关系变量 `SPJ` 是全键的（因此肯定符合 `BCNF`）——它的属性是
    `SNO`、`PNO` 和 `JNO`，其谓词是*供应商 `SNO` 向项目 `JNO` 供应零件 `PNO`*。此外，以下业务规则（`BRX`）生效：


    *   如果供应商 *s* 供应零件 *p*，且零件 *p* 被供应给项目 *j*，且项目 *j* 由供应商 *s* 供应，那么供应商 *s* 向项目 *j*
    供应零件 *p*。


    以下连接依赖（`JD`）捕捉了业务规则 `BRX` 的本质，因此在关系变量 `SPJ` 中成立：


    ```

    { { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }

    ```


    如果你需要回忆连接依赖的相关内容，这个 `JD` 表示在任何给定时间，`SPJ` 的当前值等于其在 `{SNO,PNO}`、`{PNO,JNO}` 和 `{JNO,SNO}`
    上的投影的连接。但请注意，这个 `JD` 并不是由关系变量 `SPJ` 的唯一键所蕴涵的——如果你需要回忆 `JD` 如何被键蕴涵的含义，请参阅第 10 章——因此该关系变量不符合
    `5NF`。而且，它确实存在冗余。具体来说，假设它包含以下三个元组：


    ```

    t1  :  s1  p1  j2

    t2  :  s1  p2  j1

    t3  :  s2  p1  j1

    ```


    （这里 *s1* 和 *s2* 表示供应商编号；*p1* 和 *p2* 表示零件编号；*j1* 和 *j2* 表示项目编号；*t1*、*t2* 和 *t3*
    只是这三个元组的标签，为方便起见在接下来的内容中使用。此外，我假设在另行通知前，*s1* ≠ *s2*，*p1* ≠ *p2*，且 *j1* ≠ *j2*。）由于
    `JD` 的存在，以下元组也必须出现在关系变量 `SPJ` 中：


    ```

    t4  :  s1  p1  j1

    ```


    因此，我们可以说，元组 *t1-t3* 的出现强制要求元组 *t4* 也必须出现（因此该 `JD` 具体是一个元组强制 `JD`）。换句话说，该关系变量确实如所声称的那样存在冗余，因为命题“*s1*
    向 *j1* 供应 *p1*”既被显式表示（通过元组 *t4*），也被隐式表示（作为 `JD` 与元组 *t1-t3* 所表示的命题共同推出的逻辑结论）。因此，规范化原则建议我们将其分解为在
    `{SNO, PNO}` 上的投影 `SP`、在 `{PNO,JNO}` 上的投影 `PJ` 以及在 `{JNO,SNO}` 上的投影 `JS`。该分解是无损的（`SPJ`
    等于 `SP`、`PJ` 和 `JS` 的连接）；`SP`、`PJ` 和 `JS` 都符合 `5NF`；并且冗余消失了。


    顺便说一下，关系变量 `SPJ` 所展示的冗余有一些有趣的含义（这些观察应该对后面有帮助）。让元组 *t1-t4* 如前所述，并再次假设 *s1* ≠ *s2*，*p1*
    ≠ *p2*，且 *j1* ≠ *j2*。那么：


    *   如果关系变量包含所有四个元组 *t1-t4*，那么试图仅删除元组 *t4* 显然必须失败，因为 `JD` 的存在。换句话说，如第 10 章所解释的，关系变量
    `SPJ` 对该 `JD` 存在删除异常。

    *   或者，如果关系变量只包含元组 *t1* 和 *t2*，那么试图仅插入元组 *t3* 也必须失败，同样因为 `JD` 的存在。同样如第 10 章所解释的，我们可以说关系变量
    `SPJ` 对该 `JD` 存在插入异常。


    将 `SPJ` 分解为其投影 `SP`、`PJ` 和 `JS` 就消除了这些异常。

    '
- fmt: '### The Second Example: Why 5NF Does Too Much


    Now I turn to the promised second example. Suppose we have another relvar `SPJ′`,
    where `SPJ′` is identical to `SPJ` except that it’s subject to the following additional
    business rule (BRY):


    *   Any given supplier `s` supplies a given part `p` to at most one project `j`.


    The following functional dependency (FD) captures the essence of rule BRY and
    therefore holds in relvar `SPJ′`:


    ```

    { SNO , PNO } → { JNO }

    ```


    In other words, `{SNO,PNO}` is a key for `SPJ′`. What’s more, it can be shown
    that no other FDs hold in `SPJ′` apart from the one just shown (and trivial ones),
    and `SPJ′` is thus, like `SPJ`, in `BCNF`. However, it’s not in `5NF`, because
    the JD shown previously holds in `SPJ′` just as it did in `SPJ`, again without
    being implied by the keys.


    The example thus gives the lie to two popular misconceptions—first, that a `BCNF`
    relvar that’s not in `5NF` must be all key (see Exercise 1.8); second, that a
    relvar with just one key and just one nonkey attribute must be in `5NF` (see Exercise
    1.9).


    Now suppose as we did with `SPJ` that relvar `SPJ′` contains the following three
    tuples:


    ```

    t1  :  s1  p1  j2

    t2  :  s1  p2  j1

    t3  :  s2  p1  j1

    ```


    Thanks to the JD, then, the following tuple also has to appear:


    ```

    t4  :  s1  p1  j1

    ```


    But `{SNO,PNO}` is a key; it follows that tuples `t1` and `t4`, since they have
    the same value for that key, are in fact one and the same (and hence that `j1`
    = `j2`, so now we have to drop at least part of our original assumption that `s1`
    ≠ `s2`, `p1` ≠ `p2`, and `j1` ≠ `j2`). Hence, the kind of redundancy we observed
    with `SPJ` doesn’t occur with `SPJ′`. (To be specific, tuple `t4` in this case
    isn’t an “additional” tuple, because it already exists.) In other words, `SPJ′`,
    even though it’s not in `5NF`, doesn’t `and in fact can’t` suffer from the kind
    of redundancy that `5NF` is intended to address. Thus, it looks as if `5NF` might
    be, in a certain sense, too strong for the purpose.


    ## Essential Tuple Normal Form


    Essential tuple normal form (`ETNF`) was first described in a 2012 paper—referred
    to hereinafter as “the `ETNF` paper”—by Ron Fagin, Hugh Darwen, and myself. I’ll
    begin the discussion by giving a brief and somewhat informal summary of the main
    results from that paper (please note, however, that the following summary isn’t
    meant to stand on its own—it’s provided purely as a convenient overview):


    *   Loosely, to say that relvar `R` is free from redundancy is to say that no
    tuple `t` currently appearing in `R` represents information that can be derived
    from other tuples distinct from `t` but also currently appearing in `R`.

    *   Relvar `R` is in essential tuple normal form (`ETNF`) if and only if it’s
    free from redundancy in the foregoing sense.

    *   Relvar `R` is in `ETNF` if and only if it’s in `BCNF` and, for every `JD`
    `J` that holds in `R`, at least one component of `J` is a superkey for `R`.

    *   `5NF` ⇒ `ETNF` ⇒ `4NF`, while the reverse implications don’t hold (in other
    words, `ETNF` falls strictly between `4NF` and `5NF`).


    If relvar `R` is in `BCNF` and has a noncomposite key, then it’s in `ETNF`.


    ### Definitions and Theorems


    Now I present a series of definitions and theorems (with supporting discussion)
    that together constitute the principal results of the `ETNF` paper. First let
    me give—not before time, you might be thinking—a precise definition of the concept
    of a tuple forcing `JD`:


    *   **Definition (tuple forcing `JD`):** Let `J` be a `JD` with respect to heading
    `H`, and let `J` hold in relvar `R`. Then `J` might or might not have the consequence
    that if certain tuples `t1`, ..., `tn` appear in `R`, a certain additional tuple
    `t` is forced to appear in `R` as well (where the term `additional` means that
    `t` is distinct from each of `t1`, ..., `tn`). If and only if it does have that
    consequence, then `J` is tuple forcing with respect to `R`.


    Given this definition, it’s easy to see that if `J` is indeed tuple forcing with
    respect to `R`, it must be (a) nontrivial, (b) not implied by the keys of `R`,
    and (c) not implied by any `FD` of `R`. (Thanks to (a) and (b) here, it also follows
    that `R` can’t possibly be in `5NF`.)


    Next, it’s convenient to introduce the terms `FD redundant` and `JD redundant`:


    *   **Definition (`FD` redundancy):** Relvar `R` is `FD` redundant if and only
    if it’s not in `BCNF`.

    *   **Definition (`JD` redundancy):** Relvar `R` is `JD` redundant if and only
    if some tuple forcing `JD` holds in `R`.


    Note that neither of these kinds of redundancy implies the other; that is, a relvar
    can be `FD` redundant without being `JD` redundant, and `JD` redundant without
    being `FD` redundant. For example:


    *   Relvar `SPJ` from the section “`5NF` Is Too Strong”—with attributes `SNO`,
    `PNO`, and `JNO`; key `{SNO,PNO,JNO}`; and `JD` ☼{{SNO,PNO},{PNO,JNO},{JNO,SNO}}—is
    in `BCNF` and hence not `FD` redundant, but it’s clearly `JD` redundant, because
    that `JD` is tuple forcing.

    *   Relvar `S` from Chapter 1—with attributes `SNO`, `SNAME`, `STATUS`, and `CITY`;
    key `{SNO}`; and `FD` `{CITY}` → `{STATUS}`—isn’t in `BCNF` and is therefore `FD`
    redundant. But no tuple forcing `JD`s hold in that relvar, and so the relvar isn’t
    `JD` redundant.


    To continue with the definitions:


    *   **Definition (redundancy free):** Relvar `R` is redundancy free if and only
    if it’s neither `FD` redundant nor `JD` redundant.


    Note that a `5NF` relvar is certainly redundancy free by this definition. As I’ll
    show, however, it turns out that a relvar doesn’t have to be in `5NF` in order
    to be redundancy free; rather, it’s sufficient that it just be in `ETNF`. In fact,
    that’s the definition of `ETNF`:


    *   **Definition (essential tuple normal form):** Relvar `R` is in essential tuple
    normal form (`ETNF`) if and only if it’s redundancy free.


    In other words, relvar `R` is in `ETNF` if and only if it’s neither `FD` redundant
    nor `JD` redundant—equivalently, if and only if it’s in `BCNF` and no tuple forcing
    `JD` holds.


    Of course, while the foregoing definition is both precise and accurate, it’s of
    little practical use, because it doesn’t help much with the question of determining
    whether a given relvar is indeed in `ETNF`. But the following theorem does help
    in this regard:


    *   **Theorem:** Relvar `R` is in `ETNF` if and only if it’s in `BCNF` and, for
    every explicit `JD` `J` that holds in `R`, some component of `J` is a superkey
    for `R`.


    This theorem provides both necessary and sufficient conditions for a relvar to
    be in `ETNF`. We can therefore take it as a useful, usable test—in effect, as
    a valid `definition` of `ETNF`. (To put it another way, the original definition
    is a semantic definition, while the theorem provides an operational or syntactic
    definition. See the explanatory remarks on such matters in Chapter 5.)'
