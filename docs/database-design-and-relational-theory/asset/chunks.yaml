- fmt: "## Tuples vs. Propositions\n\nAs you know, every tuple appearing in some given\
    \ relvar `R` at some given time represents a certain proposition, the proposition\
    \ in question being an instantiation of the relvar predicate for that relvar `R`\
    \ that (by convention) is understood to be true at the time in question. For example,\
    \ here again is the predicate for relvar `HP` (sample value as in Figures [16-2](#489629_2_En_16_Chapter.xhtml#Fig2)\
    \ and [16-3](#489629_2_En_16_Chapter.xhtml#Fig3)):\n\n*   *Part `PNO` is named\
    \ `PNAME`, has color `COLOR` and weight `WEIGHT` (which is greater than or equal\
    \ to 17.0 pounds), and is stored in city `CITY`.*\n\nThis relvar currently contains\
    \ (among other things) a tuple for part `P6`, and that tuple represents the following\
    \ instantiation of the foregoing predicate:\n\n*   *Part `P6` is named `Cog`,\
    \ has color `Red` and weight `19.0` pounds (which is greater than or equal to\
    \ 17.0 pounds), and is stored in city `London`.*\n\nLoosely speaking, then, we\
    \ can say the database “contains propositions” (or representations of propositions,\
    \ at any rate). Now, I’ve said, or at least suggested, several times at earlier\
    \ points in this book that the database involves some redundancy if and only if\
    \ it says the same thing twice. Now I can make this statement a little more precise:\n\
    \n*   **Definition (redundancy):** The database involves redundancy if and only\
    \ if it contains two distinct representations of the same proposition.\n\nNow,\
    \ given that tuples represent propositions, it’s tempting to understand the foregoing\
    \ definition as meaning that the database involves redundancy if and only if it\
    \ contains two distinct appearances of the same tuple.^([^(211)](#fn211)) Unfortunately,\
    \ however, this (mis)interpretation of the definition is considerably oversimplified\
    \ at best. Let’s examine it more carefully.\n\nFirst of all, of course, it’s at\
    \ least true that we don’t want the same tuple to appear more than once in the\
    \ same relvar (at the same time, that is), because such a state of affairs would\
    \ certainly constitute “saying the same thing twice.” (As I once heard Codd remark:\
    \ If something is true, saying it twice doesn’t make it any more true.) Now, the\
    \ relational model itself takes care of this particular requirement—by definition,\
    \ relations never contain duplicate tuples, and the same is therefore true for\
    \ relvars, and so we can ignore this possibility.\n\nTwo points here. First, given\
    \ the truth of the foregoing, it could be argued that a desire to avoid redundancy\
    \ was one of the motivations—albeit a minor one, perhaps (?)—for choosing sets\
    \ (which can’t contain duplicate elements, by definition) instead of “bags” (which\
    \ can) as the right mathematical abstraction on which to found a solid database\
    \ theory. SQL apologists please note!\n\nSecond, I note that now we have a precise\
    \ characterization of the notion of “duplicate tuples.” (People use this phrase\
    \ all the time, and yet I very much doubt whether many of them would be able to\
    \ define it precisely if pressed.) Strictly speaking, of course, two tuples are\
    \ duplicates if and only if they’re the very same tuple, just as two integers\
    \ are duplicates if and only if they’re the very same integer. Thus, the phrase\
    \ “duplicate tuples” thus doesn’t really make much sense from a logical point\
    \ of view (to say two distinct tuples are duplicates is a contradiction in terms).\
    \ What people are really talking about when they use that phrase is duplicate\
    \ *appearances* of the *same* tuple. For that reason, the phrase “duplicate elimination,”\
    \ which as we all know is often encountered in database contexts, would much better\
    \ be *duplication* elimination. But I digress … Let’s get back to the main discussion.\n\
    \nNext, then, I observe that we often don’t want the same *sub*tuple to appear\
    \ more than once in the same relvar (again, at the same time).^([^(212)](#fn212))\
    \ But classical normalization takes care of this one; e.g., it was precisely because,\
    \ in earlier chapters, the `FD {CITY} -> {STATUS}` held in relvar `S`—causing\
    \ the same `{CITY,STATUS}` pair (or subtuple) to occur repeatedly, with the same\
    \ meaning every time it did—that we were recommended to replace that relvar by\
    \ its projections on `{CITY,STATUS}` and `{SNO,SNAME,CITY}`, respectively.\n\n\
    My next point is that the very same tuple can represent any number of distinct\
    \ propositions, as can easily be seen. As a trivial example, let `SC` and `PC`\
    \ be the projection of relvar `S` on `{CITY}` and the projection of relvar `P`\
    \ on `{CITY}`, respectively. Given our usual sample values, then, a tuple containing\
    \ just the `CITY` value `London` appears in both `SC` and `PC`—but those two appearances\
    \ represent distinct propositions. To be specific, the appearance in `SC` represents\
    \ the proposition *There’s at least one supplier in London*, and the appearance\
    \ in `PC` represents the proposition *There’s at least one part in London* (simplifying\
    \ slightly in both cases for the sake of the example).\n\nWhat’s more—and here\
    \ I have to get a little more formal on you for a moment—the same proposition\
    \ can be represented by any number of distinct tuples, too. That’s because, formally,\
    \ the pertinent attribute names are part of the tuple (check the definition of\
    \ *tuple* in Chapter [5](#489629_2_En_5_Chapter.xhtml) if you need confirmation\
    \ of this point). For example, consider our usual shipments relvar `SP`, with\
    \ attributes `SNO`, `PNO`, and `QTY`, and with predicate:\n\n*   *Supplier `SNO`\
    \ supplies part `PNO` in quantity `QTY`.*\n\nNow suppose we additionally had a\
    \ relvar `PS`, with attributes `SNR`, `PNR`, and `AMT`, and with predicate:\n\n\
    *   *Supplier `SNR` supplies part `PNR` in quantity `AMT`.*\n\nThen (using `Tutorial\
    \ D` syntax) the following tuples might well appear in relvars `SP` and `PS`,\
    \ respectively:\n\n```\nTUPLE { SNO 'S1' , PNO 'P1' , QTY 300 }\nTUPLE { SNR 'S1'\
    \ , PNR 'P1' , AMT 300 }\n```\n\nThese are clearly different tuples, but they\
    \ both represent the same proposition, viz.:\n\n*   *Supplier `S1` supplies part\
    \ `P1` in quantity `300`.*\n\nIn fact, each of the two relvars `SP` and `PS` can\
    \ be defined in terms of the other, as the following constraints (actually `EQD`s\
    \ once again) both show:\n\n```\nCONSTRAINT ...\nPS = SP RENAME { SNO AS SNR ,\
    \ PNO AS PNR , QTY AS AMT } ;\nCONSTRAINT ...\nSP = PS RENAME { SNR AS SNO , PNR\
    \ AS PNO , AMT AS QTY } ;\n```\n\nA database that contained both relvars would\
    \ thus clearly involve redundancy.^([^(213)](#fn213))\n\nThe net of the foregoing\
    \ discussion is this: There’s a many to many relationship between tuples and propositions—any\
    \ number of tuples can represent the same proposition, any number of propositions\
    \ can be represented by the same tuple. Given this state of affairs, then, here’s\
    \ an attempt at stating the orthogonality principle a little more precisely:\n\
    \n*   **Definition (*****The Principle of Orthogonal Design*****, second attempt)**\
    \ **:** Let relvars `R` and `R2` be distinct, and let them have headings `{A1,...,An}`\
    \ and `{B1,...,Bn}`, respectively. Let relvar `R1` be defined as follows:\n\n\
    \    ```\n    R1 = R RENAME { A1 AS B1′ , ... , An AS Bn′ }\n    ```\n\n    where\
    \ `B1′`, ..., `Bn′` is some permutation of `B1`, ..., `Bn`. (Observe that `R1`\
    \ and `R2` thus have the same heading.)^([^(214)](#fn214)) Then there must not\
    \ exist restriction conditions `c1` and `c2`, neither of which is identically\
    \ false, such that following equality dependency holds:\n\n    ```\n    ( R1 WHERE\
    \ c1 ) = ( R2 WHERE c2 )\n    ```\n\n### Points arising from this second attempt:\n\
    \n*   Adherence to this version of the principle solves the problem with the design\
    \ of Figure [16-3](#489629_2_En_16_Chapter.xhtml#Fig3). To be specific, take `R`\
    \ and `R2` to be `LP` and `HP`, respectively, and define `R1` as follows:\n\n\
    \    ```\n    R1 = LP RENAME { PNO AS PNO , ... , CITY AS CITY }\n    ```"
