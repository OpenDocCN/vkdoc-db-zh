- fmt: "## Concluding Remarks\n\nIn this chapter, we've seen JDs implying JDs; a JD\
    \ and an FD together implying an FD; FDs implying a JD; and, in earlier chapters,\
    \ FDs implying FDs. However, note carefully that all the chase lets us do is determine\
    \ whether a *specific* dependency follows from given dependencies. What it doesn't\
    \ do is let us *infer*, or *generate*, new dependencies from the given set (that's\
    \ why I said, near the beginning of the previous section, that the chase provided\
    \ only a partial answer to the question). For that, we'd need an axiomatization\
    \ for FDs and JDs. And while Armstrong's rules provide a sound and complete axiomatization\
    \ for FDs by themselves, it's unfortunately a known fact that no such axiomatization\
    \ exists for FDs and JDs considered together .^([^(150)](#fn150))\n\n### Exercises\n\
    \n1.  Consider the parts relvar `P` from the suppliers-and-parts database. For\
    \ simplicity, let's rename attributes `PNO`, `PNAME`, `COLOR`, `WEIGHT`, and `CITY`\
    \ as `A`, `B`, `C`, `D`, and `E`, respectively, and let's use Heath notation once\
    \ again. Then the following JDs are all defined with respect to the heading of\
    \ `P`:\n    1.  ☼ `{AC , ABDE}`\n    2.  ☼ `{ACD , ABDE}`\n    3.  ☼ `{AE , ABCD}`\n\
    \    4.  ☼ `{AB , ACD , CE}`\n    5.  ☼ `{AB , ACD , AE}`\n    6.  ☼ `{AB , BCD\
    \ , DE}`\n    7.  ☼ `{ABC , ACDE , CE}`\n    8.  ☼ `{ABCD , BDE , BCE}`\n    9.\
    \  ☼ `{AB , ABC , BCD , CDE , AD}`\n    10. ☼ `{AB , BC , CD , DE , AD}`\n   \
    \ 11. ☼ `{ABD , CDE , ABC , BE , ABE}`\n    12. ☼ `{A , AB , ABC , ABD , ACE}`\n\
    \n    Which of these JDs are trivial? Which ones involve irrelevant components?\
    \ Which imply which others in the list? Which pairs are equivalent to one another?\
    \ Which are satisfied by the sample value of relvar `P` shown in Figure 1-1? Which\
    \ hold in relvar `P`? Which are irreducible with respect to `P`?\n\n2.  The dependencies\
    \ in this exercise are all defined with respect to a heading consisting of attributes\
    \ `ABCD`.\n    1.  Does the set of FDs `{A → B, A → C}` imply the JD ☼{`AD`,`ABC`}?\n\
    \    2.  Does the set of FDs `{C → D, B → C}` imply the JD ☼{`AB`,`BC`,`CD`}?\n\
    \    3.  Does the set of FDs `{A → B, B → C}` imply the JD ☼{`AB`,`BC`,`CD`}?\n\
    \    4.  Does the JD ☼{`BC`,`ABD`} imply the JD ☼{`AB`,`BC`,`CD`}?\n\n3.  We know\
    \ from Exercise 5.4 in Chapter 5 that the converse of Heath's Theorem is false.\
    \ However, there's an extended version of that theorem whose converse is true.\
    \ Here it is:\n\n    **Heath's Theorem** (*extended version*) : Let relvar `R`\
    \ have heading `H` and let `X`, `Y`, and `Z` be subsets of `H` such that the union\
    \ of `X`, `Y`, and `Z` is equal to `H`. Let `XY` denote the union of `X` and `Y`,\
    \ and similarly for `XZ`. If `R` is subject to the FD `X → Y`, then (a) `R` is\
    \ subject to the JD ☼{`XY`,`XZ`}, and (b) `XZ` is a superkey for `R`.\n\n    Prove\
    \ part (b) of this theorem. Prove also that (a) and (b) together imply that `X\
    \ → Y` holds (the converse of the extended theorem).\n\n4.  Consider the following\
    \ JDs, both of which hold in relvar `S`:\n\n    ```\n    ☼ { { SNO , SNAME , CITY\
    \ } , { CITY , STATUS } , { SNAME , CITY } }\n    ☼ { { SNO , SNAME , CITY } ,\
    \ { CITY , STATUS , SNAME } }\n    ```\n\n    I pointed out in the body of the\
    \ chapter (in the section \"Combining Components\") that (a) the first of these\
    \ JDs implied the second but that (b) decomposing `S` on the basis of that second\
    \ JD (even though it's irreducible) wouldn't be a good idea. Why not?\n\n5.  Can\
    \ a JD be both trivial and irreducible?\n\n### Answers\n\n1.  *Which JDs are trivial?*\
    \ None. *Which ones involve irrelevant components?* i., k., and l. *Which imply\
    \ others?* a. implies b.; d. implies g. and h.; e. implies g.; f. implies h. and\
    \ i.; j. implies k. *Which pairs are equivalent?* None. *Which are satisfied by\
    \ the sample value in Figure 1-1?* a., b., c., d., e., g., and l. *Which hold\
    \ in relvar `P`?* a., b., c., e., and l. *Which are irreducible?* a., b., c.,\
    \ and e.\n\n2.  1.  By Heath's Theorem, the answer is obviously yes (take `X`\
    \ as `A`, `Y` as `BC`, and `Z` as `D`). But let's see if we can prove this result\
    \ using the chase. Premise tuples:\n\n        ```\n        x1  y12  y13   x4\n\
    \        x1   x2   x3  y24\n        ```\n\n        From the FD `A → B`, we have\
    \ `y12 = x2`; from the FD `A → C`, we have `y13 = x3`. Make the replacements:\n\
    \n        ```\n        x1   x2   x3   x4\n        x1   x2   x3  y24\n        ```\n\
    \n        Now we have a tuple of all `x`'s, and the desired result follows: The\
    \ given JD does follow from the given JDs.\n\n    2.  Premise tuples:\n\n    \
    \    ```\n        x1   x2  y13  y14\n        y21   x2   x3  y24\n        y31 \
    \ y32   x3   x4\n        ```\n\n        The FDs imply `y24 = x4` and `y13 = x3`.\
    \ Make the replacements:\n\n        ```\n        x1   x2   x3  y14\n        y21\
    \   x2   x3   x4\n        y31  y32   x3   x4\n        ```\n\n        The FD `C\
    \ → D` now implies `y14 = x4`; making the replacement gives us a tuple of all\
    \ `x`'s, and so the result follows: The given JD does follow from the given FDs.\
    \ Note that we had to use one of the FDs twice in the chase in this example. Note\
    \ too that we could have obtained the same result by applying Heath's Theorem\
    \ twice: The FD `C → D` implies the JD ☼{`CD`,`CAB`}, which in turn implies the\
    \ JD ☼{`CD`,`BC`,`BA`}, thanks to the FD `B → C`.\n\n    3.  I leave it to you\
    \ to show the answer here is *no*.\n\n    4.  Premise tuples:\n\n        ```\n\
    \        x1   x2  y13  y14\n        y21   x2   x3  y24\n        y31  y32   x3\
    \   x4\n        ```\n\n        Applying the JD ☼{`BC`,`ABD`} to the tuples with\
    \ a common `B` value (viz., `x2`) generates the following tuples:\n\n        ```\n\
    \        x1    x2   x3  y24\n        y21   x2  y13  y14\n        ```\n\n     \
    \   We don't obtain a tuple of all `x`'s, and so the \"target\" JD doesn't follow\
    \ from the given one; in fact, we now have a sample relation (of five tuples)\
    \ that satisfies the latter and not the former.\n\n3.  Here first is a proof of\
    \ part (b) of the extended theorem:\n    1.  `X → Y`     (given)\n    2.  `XZ\
    \ → YZ`     (augmentation)\n    3.  `XZ → XZ`     (self determination)\n    4.\
    \  `XZ → XYZ`     (2 and 3, union)\n\n    Hence `XZ` is a superkey for `R`.\n\n\
    \    As for the converse, suppose relvar `R` contains the following tuples:\n\n\
    \    ```\n    x  y1  z1\n    x  y2  z2\n    ```\n\n    Thanks to the JD ☼{`XY`,`XZ`},\
    \ the following tuples must then also appear:\n\n    ```\n    x  y1  z2\n    x\
    \  y2  z1\n    ```\n\n    But `XZ` is a superkey and so `XZ → Y` holds, so `y1\
    \ = y2`; hence `X → Y` holds.\n\n4.  This exercise is discussed further in Chapter\
    \ 16, but I give a preliminary discussion here. First of all, suppose such a decomposition\
    \ (i.e., on the basis of the second JD) were done. Let the projections so obtained\
    \ be labeled `SNC` and `CTN` in the obvious way. Then the projections of `SNC`\
    \ and `CTN` on `{SNAME,CITY}` are clearly equal; that is, the following equality\
    \ dependency (EQD) holds—\n\n    ```\n    CONSTRAINT ... SNC { SNAME , CITY }\
    \ = CTN { SNAME , CITY } ;\n    ```\n\n    —and relvars `SNC` and `CTN` thus suffer\
    \ from redundancy.\n\n    Observe further that the FD `{CITY} → {STATUS}` holds\
    \ in `CTN`. By Heath's Theorem, therefore, we can decompose `CTN` into its projections\
    \ `CT` and `CN` on `{CITY,STATUS}` and `{CITY,SNAME}`, respectively. It follows\
    \ that the JD\n\n    ```\n    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS , SNAME\
    \ } }\n    ```\n\n    implies the JD\n\n    ```\n    ☼ { { SNO , SNAME , CITY\
    \ } , { CITY , STATUS } , { CITY , SNAME } }\n    ```"
