- fmt: "## Fourth Normal Form\n\nYou won’t be surprised to hear there’s such a thing\
    \ as a trivial MVD:\n\n- **Definition (`trivial MVD`):** Let `X →→ Y` be an MVD,\
    \ `M` say, with respect to heading `H`. Then `M` is trivial if and only if it’s\
    \ satisfied by every relation with heading `H`.\n- From this definition, it’s\
    \ easy to prove the following theorem (see Exercise 12.7):\n- **Theorem:** Let\
    \ `X →→ Y` be an MVD, `M` say, with respect to heading `H`. Then `M` is trivial\
    \ if and only if either (a) `Y` is a subset of `X` or (b) the union of `X` and\
    \ `Y` is equal to `H`.\n- You probably won’t be surprised by the next definition,\
    \ either:\n- **Definition (`MVD` implied by keys):** Let relvar `R` have heading\
    \ `H` and let `X →→ Y` be an MVD, `M` say, with respect to `H`. Then `M` is implied\
    \ by the keys of `R` if and only if every relation `r` that satisfies `R`’s key\
    \ constraints also satisfies `M`.\n- As with FDs and JDs, “implied by keys” here\
    \ could just as well be “implied by superkeys” without making any significant\
    \ difference. Also, if `M` is trivial, it’s satisfied by every relation `r` with\
    \ heading `H`, and so it’s satisfied by every relation `r` that satisfies `R`’s\
    \ key constraints a fortiori. Thus, trivial MVDs are always “implied by keys,”\
    \ trivially. So suppose `M` is nontrivial. Then it’s easy to prove the following\
    \ theorem:\n- **Theorem:** Let `M` be a nontrivial MVD that holds in relvar `R`.\
    \ Then `M` is implied by the keys of `R` if and only if it reduces to an `FD`\
    \ out of a superkey of `R`—i.e., the double arrow reduces to a single arrow, as\
    \ it were, and the determinant is a superkey.\n\nAnd now I can define 4NF:\n\n\
    - **Definition (fourth normal form):** Relvar `R` is in fourth normal form (4NF)\
    \ if and only if every MVD of `R` is implied by the keys of `R`.\n\nHowever, given\
    \ the various definitions and theorems already discussed in this section, we can\
    \ see that the following operational definition (or theorem) is valid too:\n\n\
    - **Definition (fourth normal form):** Relvar `R` is in fourth normal form (4NF)\
    \ if and only for every nontrivial MVD `X →→ Y` that holds in `R`, `X` is a superkey\
    \ for `R` (in other words, every such MVD reduces to “an `FD` out of a superkey”).\n\
    \nOf course, if an MVD is implied by the keys of `R`, it certainly holds in `R`—i.e.,\
    \ it’s certainly “an MVD of `R`.” However, the converse is false: An MVD can hold\
    \ in `R` without being implied by the keys of `R` (as relvar CTX illustrates).\
    \ Thus, the whole point about the 4NF definition is that the only MVDs that hold\
    \ in a 4NF relvar are ones we can’t get rid of—which means ones implied by keys\
    \ (including trivial ones as a special case).^([^(154)](#fn154))\n\nRecall now\
    \ from Chapter 10 the parallelism between the BCNF and 5NF definitions. In fact,\
    \ that parallelism extends to the 4NF definition, too. That is, we have the following:\n\
    \n- `R` is in BCNF if and only if every FD that holds in `R` is implied by the\
    \ keys of `R`.\n- `R` is in 4NF if and only if every MVD that holds in `R` is\
    \ implied by the keys of `R`.\n- `R` is in 5NF if and only if every JD that holds\
    \ in `R` is implied by the keys of `R`.\n\nNow, in the BCNF and 4NF definitions,\
    \ we can simplify “implied by the keys” to just “implied by some key”; as noted\
    \ in Chapter 10, however, the same is not true for the 5NF definition. In that\
    \ sense, 4NF resembles BCNF more than it does 5NF. On the other hand, 4NF also\
    \ resembles 5NF more than it does BCNF, in the sense that the 4NF and 5NF definitions\
    \ both rely on context—by which I mean that the MVDs and JDs that hold in a 4NF\
    \ or 5NF relvar involve, at least implicitly, all of the attributes of that relvar,\
    \ whereas the same is not true for BCNF. (As I said earlier, the point about MVDs\
    \ always going in pairs is important. Nothing analogous applies to FDs.)\n\nRecall\
    \ now from Chapter 6 the concept of FD preservation. Essentially, the idea was\
    \ as follows: If the FD `X → Y` holds in relvar `R`, then the recommendation is\
    \ to decompose `R`—assuming that decomposition is desired at all, and assuming\
    \ further that it’s done on the basis of some FD other than `X → Y` itself—in\
    \ such a way that `X` and `Y` are kept together in the same projection. Well,\
    \ that concept extends to MVDs too—that is, the recommendation still applies if\
    \ we replace the FD `X → Y` by the MVD `X →→ Y` throughout.\n\nIn closing this\
    \ section, let me state explicitly that:\n\n1. If relvar `R` is in 5NF, it’s certainly\
    \ in 4NF; likewise, if relvar `R` is in 4NF, it’s certainly in BCNF.\n2. A relvar\
    \ can be in 4NF without being in 5NF (see Exercise 12.4 at the end of the chapter).\n\
    3. 4NF is always achievable. (In fact, of course, we know this already, because\
    \ we know that 5NF is always achievable, and now we also know that 5NF implies\
    \ 4NF.)\n\n## MVD Axiomatization\n\nAs I mentioned near the beginning of this\
    \ chapter, MVDs, unlike JDs in general, do have an axiomatization, or in other\
    \ words a sound and complete set of rules for generating “new” MVDs from given\
    \ ones. The rules in question are as follows:\n\n1.  *Reflexivity:* If `Y` is\
    \ a subset of `X`, then `X →→ Y`.\n2.  *Augmentation:* If `X →→ Y` and `Z` is\
    \ a subset of `W`, then `XW →→ YZ`.\n3.  *Transitivity:* If `X →→ Y` and `Y →→\
    \ Z`, then `X →→ Z – Y`.\n4.  *Complementation:* If (a) the union of `X`, `Y`,\
    \ and `Z` is equal to the pertinent heading `H` and (b) the intersection of `Y`\
    \ and `Z` is a subset of `X`, then (c) `X →→ Y | Z`.\n\n    Now, these four rules\
    \ aren’t nearly as easy to understand or remember as Armstrong’s rules are for\
    \ FDs (or so it seems to me, at any rate). Partly for that reason, I won’t attempt\
    \ to justify them here, nor will I show them in action. However, I will at least\
    \ say that further rules can be derived from the original four, the following\
    \ among them:\n\n5.  *Pseudotransitivity:* If `X →→ Y` and `YZ →→ W`, then `XZ\
    \ →→ W – YZ`.\n6.  *Union:* If `X →→ Y` and `X →→ Z`, then `X →→ YZ`.\n7.  *Decomposition:*\
    \ If `X →→ YZ` and `W` is the intersection of `Y` and `Z`, then `X →→ Y – Z`,\
    \ `X →→ Z – Y`, and `X →→ W`.\n\n    The following rules involve both MVDs and\
    \ FDs:\n\n8.  *Replication:* If `X → Y`, then `X →→ Y`.\n9.  *Coalescence:* If\
    \ (a) `X →→ Y`, (b) `Z → W`, (c) `W` is a subset of `Y`, and (d) the intersection\
    \ of `Y` and `Z` is empty, then (e) `X → W`.\n\n    And the following is an additional\
    \ derived rule:\n\n10.  *Mixed pseudotransitivity:* If `X →→ Y` and `XY → Z`,\
    \ then `X → Z – Y`."
