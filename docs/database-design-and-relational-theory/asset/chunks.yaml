- fmt: "# Heath定理的证明与讨论\n\n现在，设`Y`和`Z`不相交。令`W` = `Z` – `Y`。由于`r`满足函数依赖（FD）`X` → `Y`，那么它也满足FD\
    \ `X` → `Y` – `W`，并且`Y` – `W`与`Z`是不相交的。根据先前的结果，因此`r`等于其在 (a) `X` 和 `Y` – `W` 的并集\
    \ 与 (b) `XZ` 上的投影的连接。现在我引用一个容易证明（见下文）的引理，其内容是：如果(a) `r1`和`r2`是`r`的投影，使得`JOIN{r1,\
    \ r2}` = `r`，(b) `H'`是`H`的子集，但是是`r1`标题（heading）的超集，且(c) `r'`是`r`在`H'`上的投影，那么(d)\
    \ `JOIN{r', r2}` = `r`；通俗地说，`r1`可以扩展`r2`的任意属性而不改变连接的结果。从这个引理可以直接得出，`r`等于其在`XY`和`XZ`上的投影的连接；因此定理在此情况下也成立。\n\
    \n## 结论\n\nHeath定理在所有可能的情况下都成立。\n\n## 引理\n\n设`r`的标题为`H`，并将`H`划分为`A`、`B`、`C`和`D`，为简便起见，假设这四个子集均非空。（将证明扩展到该假设不成立的情况，留作补充练习。）不失一般性，我们可以将`A`、`B`、`C`和`D`视为单独的属性。所以设`r1`\
    \ = `R{A, B}`，`r2` = `r{B, C, D}`，且设`(a, b)` ∈ `r1`，`(b, c, d)` ∈ `r2`。由于`r` =\
    \ `JOIN{r1, r2}`，因此`(a, b, c, d)` ∈ `r`；故`(a, b, c)` ∈ `r{A, B, C}`，且`(b, c, d)`\
    \ ∈ `r{B, C, D}`；因此`(a, b, c, d)` ∈ `JOIN{r{A, B, C}, r{B, C, D}}`。所需的结果随之得出——`r{B,\
    \ C, D}`就是`r2`，而`r{A, B, C}`可以被视为`r'`，其中`H'` = `{A, B, C}`。\n\n## Heath定理的逆命题\n\
    \nHeath定理的逆命题会说，如果关系`r`等于其在`XY`和`XZ`上的投影的连接，那么`r`满足FD `X` → `Y`。这个逆命题是错误的。要证明这一点，只需举出一个反例。因此考虑一个关系变量CTX，其属性为CNO（课程）、TNO（教师）和XNO（教材），其谓词为“课程CNO可以由教师TNO教授并使用教材XNO”。以下是该关系变量的一个示例值：\n\
    \n![示例关系变量CTX的值](images/489629_2_En_5_Chapter/489629_2_En_5_Figa_HTML.jpg)\n\n\
    这个示例值等于其在`{CNO, TNO}`和`{CNO, XNO}`上的投影的连接，但它显然不满足FD `{CNO}` → `{TNO}`（也不满足FD `{CNO}`\
    \ → `{XNO}`）。**注意：** 我将在第12章中对这个特定例子有更多讨论。\n\n## 练习\n\n1.  见正文部分。\n\n2.  假设我们从一个关系变量开始，其属性D、P、S、L、T、C显然对应于谓词的参数。那么在该关系变量中，以下非平凡的FD成立：\n\
    \    ```\n    { L }         → { D , P , C , T }\n    { D , P , C } → { L , T }\n\
    \    { D , P , T } → { L , C }\n    { D , P , S } → { L , C , T }\n    ```\n \
    \   一个可能的BCNF关系变量集合（概要）如下：\n    ```\n    SCHEDULE { L , D , P , C , T }\n    KEY\
    \ { L }\n    KEY { D , P , C }\n    KEY { D , P , T }\n    STUDYING { S , L }\n\
    \    KEY { S , L }\n    ```\n    注意，FD `{D, P, S}` → `{L, C, T}` 在这种分解中“丢失”了（参见第6章）。\n\
    \n3.  最简单的设计（概要）是：\n    ```\n    EMP  { ENO , ENAME , SALARY }\n    KEY { ENO\
    \ }\n    PGMR { ENO , LANG }\n    KEY { ENO }\n    FOREIGN KEY { ENO } REFERENCES\
    \ EMP\n    ```\n    每个员工在EMP中都有一元组（且EMP没有其他元组）。碰巧是程序员的员工在PGMR中还有额外的一个元组（且PGMR没有其他元组）。注意，EMP和PGMR的连接为程序员（仅）提供了完整信息——员工号、姓名、薪水和语言技能。\n\
    \n    如果程序员可能有两种或更多语言技能，唯一的显著区别是关系变量PGMR将是“全键”的（即，其唯一键是`{ENO, LANG}`），如下所示：\n\
    \    ```\n    PGMR { ENO , LANG }\n    KEY { ENO , LANG }\n    FOREIGN KEY { ENO\
    \ } REFERENCES EMP\n    ```\n\n4.  是的，它们当然是的！"
  raw: "Now let *Y* and *Z* not be disjoint. Let *W* = *Z* – *Y*. Since *r* satisfies\
    \ the FD *X* → *Y*, then, it also satisfies the FD *X* → *Y* – *W*, and *Y* –\
    \ *W* and *Z* are disjoint. By the previous result, therefore, *r* is equal to\
    \ the join of its projections on (a) the union of *X* and *Y* – *W* and (b) *XZ*.\
    \ I now appeal to a lemma, easily proved (see below), to the effect that if (a)\
    \ *r1* and *r2* are projections of *r* such that JOIN{*r1*,*r2*} = *r*, (b) *H'*\
    \ is a subset of *H* but a superset of the heading of *r1*, and (c) *r'* is the\
    \ projection of *r* on *H'*, then (d) JOIN{*r'*,*r2*} = *r*; in other words, loosely,\
    \ *r1* can be extended with arbitrary attributes of *r2* without altering the\
    \ result of the join. From this lemma, it follows immediately that *r* is equal\
    \ to the join of its projections on *XY* and *XZ*; so the theorem applies in this\
    \ case also.\n\n*Conclusion:* Heath’s Theorem is valid in all possible cases.\n\
    \n*Lemma:* Let *r* have heading *H* and let *H* be partitioned into *A*, *B*,\
    \ *C*, and *D*, and assume for simplicity that none of these four subsets is empty.\
    \ (Extending the proof to cover the case where that assumption fails to hold is\
    \ left as a subsidiary exercise.) Without loss of generality, we can treat *A*,\
    \ *B*, *C*, and *D* as if they were individual attributes. So let *r1* = *R*{*A*,*B*}\
    \ and *r2* = *r* {*B*,*C*,*D*}, and let (*a*,*b*) ∈ *r1* and (*b*,*c*,*d* ) ∈\
    \ *r2*. Since *r* = JOIN{*r1*,*r2*}, it follows that (*a*,*b*,*c*,*d* ) ∈ *r*;\
    \ hence (*a*,*b*,*c*) ∈ *r*{*A*,*B*,*C*} and (*b*,*c*,*d* ) ∈ *r*{*B*,*C*,*D*};\
    \ hence (*a*,*b*,*c*,*d* ) ∈ JOIN{*r*{*A*,*B*,*C*},*r*{*B*,*C*,*D*}}. The desired\
    \ result follows—*r*{*B*,*C*,*D*} is *r2*, and *r* {*A*,*B*,*C*} can be taken\
    \ as *r'*, with *H'* = {*A*,*B*,*C*}.\n\nThe converse of Heath’s Theorem would\
    \ say that if relation *r* is equal to the join of its projections on *XY* and\
    \ *XZ*, then *r* satisfies the FD *X* → *Y*. This converse is false. To show this\
    \ is so, it’s sufficient to exhibit a counterexample. So consider a relvar CTX,\
    \ with attributes CNO (course), TNO (teacher), and XNO (textbook), and predicate\
    \ *Course CNO can be taught by teacher TNO and uses textbook XNO*. Here’s a sample\
    \ value for this relvar:\n\n![../images/489629_2_En_5_Chapter/489629_2_En_5_Figa_HTML.jpg](images/489629_2_En_5_Chapter/489629_2_En_5_Figa_HTML.jpg)\n\
    \nThis sample value is equal to the join of its projections on {CNO,TNO} and {CNO,XNO},\
    \ but it clearly fails to satisfy the FD {CNO} → {TNO} (or the FD {CNO → {XNO},\
    \ come to that). *Note:* I’ll have more to say about this particular example in\
    \ Chapter [12](#489629_2_En_12_Chapter.xhtml).\n\n1.  See the body of the chapter.\n\
    \n2.  Suppose we start with a relvar with attributes D, P, S, L, T, and C corresponding\
    \ to parameters of the predicate in the obvious way. Then the following nontrivial\
    \ FDs hold in that relvar:\n\n```\n    { L }         → { D , P , C , T }\n   \
    \ { D , P , C } → { L , T }\n    { D , P , T } → { L , C }\n    { D , P , S }\
    \ → { L , C , T }\n    ```\n\nA possible set of BCNF relvars (in outline) is:^([^(78)](#fn78))\n\
    \n```\n    SCHEDULE { L , D , P , C , T }\n    KEY { L }\n    KEY { D , P , C\
    \ }\n    KEY { D , P , T }\n    STUDYING { S , L }\n    KEY { S , L }\n    ```\n\
    \nNote that the FD {D,P,S} → {L,C,T} is “lost” in this decomposition (see Chapter\
    \ [6](#489629_2_En_6_Chapter.xhtml)).\n\n3.  The simplest design (in outline)\
    \ is:\n\n```\n    EMP  { ENO , ENAME , SALARY }\n    KEY { ENO }\n    PGMR { ENO\
    \ , LANG }\n    KEY { ENO }\n    FOREIGN KEY { ENO } REFERENCES EMP\n    ```\n\
    \nEvery employee has a tuple in EMP (and EMP has no other tuples). Employees who\
    \ happen to be programmers additionally have a tuple in PGMR (and PGMR has no\
    \ other tuples). Note that the join of EMP and PGMR gives full information—employee\
    \ number, name, salary, and language skill—for programmers (only).\n\nThe only\
    \ significant difference if programmers could have two or more language skills\
    \ is that relvar PGMR would be “all key” (i.e., its sole key would be {ENO,LANG}),\
    \ thus:\n\n```\n    PGMR { ENO , LANG }\n    KEY { ENO , LANG }\n    FOREIGN KEY\
    \ { ENO } REFERENCES EMP\n    ```\n\n4.  Yes, they are (of course!).\n\nFootnotes\
    \ [1](#489629_2_En_5_Chapter.xhtml#Fn1_source)   [2](#489629_2_En_5_Chapter.xhtml#Fn2_source)\
    \   [3](#489629_2_En_5_Chapter.xhtml#Fn3_source)   [4](#489629_2_En_5_Chapter.xhtml#Fn4_source)\
    \   [5](#489629_2_En_5_Chapter.xhtml#Fn5_source)   [6](#489629_2_En_5_Chapter.xhtml#Fn6_source)\
    \   [7](#489629_2_En_5_Chapter.xhtml#Fn7_source)   [8](#489629_2_En_5_Chapter.xhtml#Fn8_source)"
