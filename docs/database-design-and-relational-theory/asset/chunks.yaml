    to contain a tuple, say (S6,Lopez,Madrid), that has no counterpart in relvar CT.
    Then, again, the design consisting just of relvar S is simply incorrect, because
    it requires every city in which a supplier is located to have some status.


    Here’s another way to look at the foregoing argument. Suppose the design consisting
    just of relvar S did faithfully reflect the state of affairs in the real world
    after all. Then relvars SNC and CT would be subject to the following integrity
    constraint (“Every city in SNC appears in CT and vice versa”):


    ```

    CONSTRAINT ... SNC { CITY } = CT { CITY } ;

    ```


    But this constraint —which is an example of what later I’m going to be calling
    an *equality dependency* or EQD—manifestly isn’t satisfied in the example under
    discussion. *Note:* For simplicity, I haven’t bothered to give this constraint
    a name, as you can see. Indeed, I’ll omit such names from all of my examples in
    this book from this point forward, except where there’s some compelling reason
    to do otherwise.


    To sum up, we see that normalization can be (and is) used to address two rather
    different problems:


    1.  It can be used to fix a logically incorrect design, as in the example discussed
    earlier in this section. *Exercise:* Do issues analogous to those raised in that
    example apply to the STP example from the section “The Place of Design Theory”
    in Chapter [1](#489629_2_En_1_Chapter.xhtml)? (*Answer:* Yes, they do.)


    2.  It can be used to reduce redundancy in an otherwise logically correct design.
    (Obviously a design doesn’t have to be logically incorrect in the foregoing sense
    in order to display redundancy.)


    Much confusion arises in practice because these two cases are often not clearly
    distinguished. Indeed, most of the literature focuses on Case 2—and for definiteness
    I’ll assume Case 2 myself in what follows, where it makes any difference—but please
    don’t lose sight of Case 1, which in practice is at least as important, if not
    more so.


    Further, I should point out that, strictly speaking, the terminology of projections
    and joins applies only to Case 2\. That’s because in Case 1, as we’ve seen, the
    “new” relvars aren’t necessarily projections of the “old” one, nor is the “old”
    one necessarily the join of the “new” ones (if you see what I mean). In fact,
    what does it mean to talk about projections and joins of relvars (as opposed to
    relations) anyway? Well, as I’ve written elsewhere, more or less:^([^(39)](#fn39))'
  trans: '

    ## 规范化服务于两个目的


    到目前为止，一切都很好；这些都是我们非常熟悉的内容。但现在我想指出，如果你一直在仔细听讲，你或许有理由指责我在前面的论述中玩了一个小小的(?) 花招……具体来说，我探讨了*关系*的何种分解才是无损的；但规范化——我们真正应该讨论的主题——并非关乎分解关系，而是关乎分解*关系变量*。（毕竟，根据定义，数据库设计就是关于选择数据库中应该存在哪些关系变量，而不是哪些关系。）


    假设我们确实决定执行将关系变量 `S` 分解为关系变量 `SNC` 和 `CT` 的建议。请注意，现在我确实在谈论关系变量而非关系；然而，为了明确起见，我们假设所讨论的关系变量具有图
    3-1 和 3-2 所示的样本值。再次为了明确起见，让我们专门关注关系变量 `CT`。嗯，那个关系变量确实是一个关系变量——我的意思是，它是一个变量——因此我们可以更新它。例如（使用第
    2 章介绍的元组简写符号），我们可能会插入元组


    ```

    ( ''Rome'' , 10 )

    ```


    但在此更新之后，关系变量 `CT` 包含了一个在关系变量 `S` 中没有对应项的元组（顺便说一句，在关系变量 `SNC` 中也没有对应项）。现在，这种可能性经常被用作——事实上，Codd
    在他关于规范化的最初几篇论文中就曾亲自使用过（参见附录 D）——支持首先进行分解的论据：由此产生的双关系变量设计能够表示原始的单关系变量设计所不能表示的某些信息。（在当前案例中，它可以表示那些当前没有任何供应商位于的城市的状态信息。）但同一事实也意味着，这两种设计并非真正信息等价，此外，关系变量
    `CT` 也并非完全就是关系变量 `S` 的一个“投影”^(³⁴)——它包含一个并非源自关系变量 `S` 中任何元组的投影或其他方式派生出来的元组。^(³⁵)
    或者更确切地说（或许更关键的是），`CT` 也不是 `SNC` 和 `CT` 之连接的投影，因此，从某种意义上说，那个连接“丢失了信息”；具体来说，它丢失了罗马状态为
    10 的信息。^(³⁶)


    如果我们从关系变量 `SNC` 中删除元组


    ```

    ( ''S5'' , ''Adams'' , ''Athens'' )

    ```


    也会出现类似的情况。在此更新之后，我们可以说，^(³⁷) 关系变量 `S` 包含一个在关系变量 `SNC` 中没有对应项的元组（尽管在关系变量 `CT` 中有一个）。因此，这两种设计再次并非真正信息等价；而这次关系变量
    `S` 并不完全算是关系变量 `SNC` 和 `CT` 的一个“连接”，因为它包含一个与关系变量 `SNC` 中任何元组都不对应的元组。


    因此，这两种设计终究不是信息等价的。但我之前不是说过分解的“无损性”是一个重要属性吗？我们通常不都假设，如果设计 *B* 是通过规范化设计 *A* 而产生的，那么设计
    *B* 和设计 *A* 应该是信息等价的吗？这里到底发生了什么？


    ### 通过谓词来理解


    为了回答这些问题，审视关系变量的谓词是有帮助的。`SNC` 的谓词是：


    *   *供应商 `SNO` 的名称是 `SNAME`，并且位于城市 `CITY`。*


    而 `CT` 的谓词是：


    *   *城市 `CITY` 的状态为 `STATUS`。*


    现在，假设一个城市即使没有任何供应商位于其中，也可能拥有一个状态；换句话说，假设关系变量 `CT` 可能包含一个像 `(Rome,10)` 这样的元组，而在关系变量
    `SNC` 中没有对应项。^(³⁸) *那么，仅由关系变量 `S` 构成的设计就是完全错误的。* 也就是说，如果谓词 *城市 `CITY` 的状态为 `STATUS`*
    的一个真例化可能存在，而与此同时，不存在一个具有相同 `CITY` 值的谓词 *供应商 `SNO` 的名称是 `SNAME`，并且位于城市 `CITY`*
    的真例化，那么仅由关系变量 `S` 构成的设计就无法忠实地反映现实世界的事态（因为该设计无法表示没有任何供应商位于的城市的状态）。


    类似地，假设一个供应商可能位于某个城市，即使该城市没有状态；换句话说，假设关系变量 `SNC` 可能包含一个元组，例如 `(S6,Lopez,Madrid)`，而在关系变量
    `CT` 中没有对应项。那么，再次地，仅由关系变量 `S` 构成的设计就是不正确的，因为它要求每个有供应商位于的城市都必须有某种状态。


    ### 一种完整性约束视角


    这里有另一种方式来看待前面的论证。假设仅由关系变量 `S` 构成的设计确实忠实地反映了现实世界的事态。那么，关系变量 `SNC` 和 `CT` 将受到以下完整性约束（“`SNC`
    中的每个城市都出现在 `CT` 中，反之亦然”）：


    ```

    CONSTRAINT ... SNC { CITY } = CT { CITY } ;

    ```


    但这个约束——这是我稍后将称之为*等值依赖*或 `EQD` 的一个例子——在所讨论的示例中显然未被满足。*注意：* 为简单起见，如你所见，我没有费心给这个约束命名。实际上，从现在起，除了有令人信服的理由需要命名的情况，我将在本书的所有示例中省略此类名称。


    ### 规范化的两个目的


    总结一下，我们看到规范化可以（并且确实）用于解决两个相当不同的问题：


    1.  它可用于修正逻辑上不正确的设计，如本节前面讨论的示例所示。*练习：* 类似于该示例中提出的问题是否也适用于第 1 章“设计理论的地位”一节中的 `STP`
    示例？（*答案：* 是的，适用。）


    2.  它可用于减少一个在其他方面逻辑上正确设计中的冗余。（显然，一个设计不必在前述意义上是逻辑不正确的才会表现出冗余。）


    实践中产生了许多混淆，因为这两种情况常常未被明确区分。事实上，大多数文献都集中在案例 2 上——并且为了明确起见，在接下来的内容中，如果这有影响的话，我自己也将假设是案例
    2——但请不要忽视案例 1，它在实践中至少同样重要，甚至可能更重要。


    此外，我应该指出，严格来说，投影和连接的术语仅适用于案例 2。这是因为在案例 1 中，正如我们所看到的，“新”关系变量不一定是“旧”关系变量的投影，“旧”关系变量也不一定是“新”关系变量的连接（如果你明白我的意思）。实际上，谈论关系变量（而非关系）的投影和连接到底意味着什么？嗯，正如我在其他地方或多或少写过的那样：^(³⁹)

    '
- fmt: '根据定义，投影、连接等操作专门应用于关系值。特别是，它们当然适用于那些碰巧是关系变量当前值的值。因此，讨论，例如，关系变量`S`在属性`{CITY,STATUS}`上的投影是明确合理的，这意味着将该关系变量`S`的当前值在这些属性上进行投影所得到的关系。然而，在某些上下文中（例如，在规范化中），使用诸如“关系变量`S`在属性`{CITY,STATUS}`上的投影”这样的表达式以稍有不同的含义被证明是方便的。具体来说，我们可能会松散但非常方便地说，某个关系变量`CT`是关系变量`S`在属性`{CITY,STATUS}`上的投影——更准确地说，这意味着关系变量`CT`在所有时刻的值都等于当时关系变量`S`的值在这些属性上的投影。因此，在某种意义上，我们可以讨论关系变量本身的投影，而不仅仅是关系变量当前值的投影。类似的评论适用于所有关系运算。


    换句话说，我们仍然使用投影/连接术语，即使在情况1中也是如此。这样的说法有些不妥——甚至可以说是草率的——但它至少很简洁。但更准确的说法应该是，分解不是一个直接进行投影的过程，而是一个*让人想起*投影（对重组和连接也是如此）但与之并不完全相同的过程。


    ## 更新异常


    *更新异常*的概念在讨论规范化时经常被提及。现在，应该清楚任何形式的冗余都可能导致异常——因为冗余大致意味着某些信息被表示了两次，因此总是存在两种表示不一致的可能性（即，如果其中一个被更新而另一个没有）。更具体地说，让我们考虑关系变量`S`的情况，其中存在以下函数依赖（`FD`）：


    ```

    { CITY } → { STATUS }

    ```


    这个`FD`所导致的冗余——即，关于某个城市具有某个状态的事实的重复或双重表示——已经讨论过了。它会导致如下异常（这些例子假设了图3-1中关系变量`S`的样本值）：


    *   **插入异常**：在罗马有供应商之前，我们无法插入“罗马的状态是10”这个事实。

    *   **删除异常**：如果我们删除唯一在雅典的供应商，我们就会丢失“雅典的状态是30”这个事实。

    *   **修改异常**：我们无法在不修改（通常）该供应商状态的情况下，更改（“修改”）给定供应商的城市。并且我们无法在不为相关城市的所有供应商进行相同修改的情况下，修改给定供应商的状态。


    用两个“投影”关系变量`SNC`和`CT`替换关系变量`S`可以解决这些问题（具体如何解决？）。此外，我要正式声明，关系变量`S`（如前所述）处于第二范式（`2NF`）而非第三范式（`3NF`），而关系变量`SNC`和`CT`都处于第三范式（`3NF`），实际上也处于`BCNF`。一般来说，`BCNF`是解决上述各类异常所引起问题的方案。


    ## 范式层次结构


    如你所知，存在许多不同的范式。下面的图3-3是我对所谓的范式层次结构的初步展示（但请注意，我将在后面的章节——具体是第13至15章——中扩展这个层次结构）。


    ![../images/489629_2_En_3_Chapter/489629_2_En_3_Fig3_HTML.jpg](images/489629_2_En_3_Chapter/489629_2_En_3_Fig3_HTML.jpg)


    图3-3 范式层次结构（一）


    要点：


    *   首先，你可能认为这个层次结构是颠倒的，因为它把最高的范式放在底部，最低的放在顶部。我不想争论这一点；我只想说，按图中所示的方式展示（在我看来）更符合这样一个事实：例如，所有`2NF`关系变量都属于`1NF`，但有些`1NF`关系变量不属于`2NF`。

    *   存在许多不同的范式：第一、第二、第三，等等。图中展示了六种，但如你所见，它们并未被标记为第一到第六（不完全如此）——在第三和第四之间有一个“闯入者”`BCNF`。我将在第4章解释这个术语怪异的原因；现在，我只想说`BCNF`是*Boyce/Codd范式*的缩写。尽管存在`BCNF`这个例外，但使用*第n范式*这个术语来泛指不同级别的规范化是方便的，在下文中我将不时采用这种用法。

    *   图中还在`BCNF`和`4NF`之间显示了一个有意的间隔。然而，这个间隔并非暗示那里可能存在某些“缺失”的范式（实际上没有）；相反，它反映了在前四种范式和后两种范式之间，层次结构中存在某种概念上的跳跃或转变。更多解释请参见本书第三部分。

    *   除第一范式（`1NF`）外，所有范式都是根据某些*依赖*定义的——在此上下文中，这只是完整性约束的另一个术语。从规范化角度看，依赖的主要类型是*函数*依赖（`FDs`）和*连接*依赖（`JDs`）。

    *   图中将`BCNF`和`5NF`突出显示（用粗体），以表明它们相对于其他所示范式的重要性。`BCNF`是根据函数依赖定义的，`5NF`是根据连接依赖定义的。实际上，我们将在后续章节中看到，就函数依赖（`FDs`）而言，`BCNF`确实是“那个”范式；就连接依赖（`JDs`）而言，`5NF`确实是“那个”范式。

    *   一般来说，从设计角度看，规范化级别越高越好——因为规范化级别越高，可能出现的冗余就越少，因此可能发生的更新异常也就越少。

    *   一个关系变量可能处于*第n*范式而不处于*第n+1*范式。

    *   相反，如果关系变量*R*处于*第n+1*范式，那么它肯定也处于*第n*范式。换句话说，第五范式（`5NF`）意味着第四范式（`4NF`），依此类推。因此，说关系变量*R*处于`BCNF`并不排除*R*也可能处于`5NF`的可能性。然而，在实践中，诸如关系变量*R*处于，比如说，`BCNF`这样的陈述，通常被理解为*R*处于`BCNF`*且不处于任何更高的范式*。因此，请特别注意，本书中我*不*遵循这种用法。

    *   如果关系变量*R*处于*第n*范式而不处于*第n+1*范式，那么它总是可以通过投影以无损方式进行分解，使得（a）投影通常处于*第n+1*范式，并且（b）*R*等于这些投影的连接。'
  raw: '*   By definition, the operators projection, join, and so on apply to relation
    values specifically. In particular, of course, they apply to the values that happen
    to be the current values of relvars. It thus clearly makes sense to talk about,
    e.g., the projection of relvar S on attributes {CITY,STATUS}, meaning the relation
    that results from taking the projection on those attributes of the relation that’s
    the current value of that relvar S. In some contexts, however (normalization,
    for example), it turns out to be convenient to use expressions like “the projection
    of relvar S on attributes {CITY,STATUS}” in a slightly different sense. To be
    specific, we might say, loosely but very conveniently, that some *relvar*, CT,
    is the projection of relvar S on attributes {CITY,STATUS}—meaning, more precisely,
    that the value of relvar CT at all times is equal to the projection on those attributes
    of the value of relvar S at the time in question. In a sense, therefore, we can
    talk in terms of projections of relvars per se, rather than just in terms of projections
    of current values of relvars. Analogous remarks apply to all of the relational
    operations.


    In other words, we do still use the projection / join terminology, even in Case
    1\. Such talk is somewhat inappropriate—not to say sloppy—but it is at least succinct.
    But it would really be more accurate to say, not that decomposition is a process
    of taking projections as such, but rather that it’s a process that’s *reminiscent
    of*, but not quite the same as, what we do when we take projections (and similarly
    for recomposition and join).


    ## Update Anomalies


    The concept of *update anomalies* is frequently mentioned in connection with normalization.
    Now, it should be clear that redundancy of any kind can always lead to anomalies—because
    redundancy means, loosely, that some piece of information is represented twice,
    and so there’s always the possibility that the two representations don’t agree
    (i.e., if one is updated and the other isn’t). More specifically, let’s consider
    the case of relvar S, where the following FD holds:


    ```

    { CITY } → { STATUS }

    ```


    The redundancy, as such, that this FD gives rise to—viz., the repeated, or duplicated,
    representation of the fact that a given city has a given status—has already been
    discussed. It leads to anomalies like the following (these examples assume the
    sample value shown for relvar S in Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1)):


    *   **Insertion anomaly** **:** We can’t insert the fact that the status for Rome
    is 10 until there’s a supplier in Rome.


    *   **Deletion anomaly:** If we delete the only supplier in Athens, we lose the
    fact that the status for Athens is 30.


    *   **Modification anomaly** **:** We can’t change (“modify”) the city for a given
    supplier without changing (“modifying”) the status for that supplier as well (in
    general). And we can’t modify the status for a given supplier without making the
    same modification for all suppliers in the pertinent city.


    Replacing relvar S by the two “projection” relvars SNC and CT solves these problems
    (how, exactly?). Moreover, let me state for the record that relvar S is (as previously
    noted) in second normal form and not in third, while relvars SNC and CT are both
    in third normal form, and in fact in BCNF as well. In general, BCNF is the solution
    to the problems caused by the kinds of anomalies mentioned above.


    ## The Normal Form Hierarchy


    As you know, there are many different normal forms. Figure [3-3](#489629_2_En_3_Chapter.xhtml#Fig3)
    below is our first take on what I’ll call the normal form hierarchy (but please
    note immediately that I’ll be expanding that hierarchy in later chapters—in Chapters
    [13](#489629_2_En_13_Chapter.xhtml)-[15](#489629_2_En_15_Chapter.xhtml), to be
    specific).


    ![../images/489629_2_En_3_Chapter/489629_2_En_3_Fig3_HTML.jpg](images/489629_2_En_3_Chapter/489629_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The normal form hierarchy (I)


    Points arising:


    *   First of all, you might think the hierarchy is upside down, since it shows
    the highest normal form at the bottom and the lowest at the top. I don’t want
    to argue the point; let me just say that showing it the way I’ve done in the figure
    fits better (in my view) with the fact that, e.g., all 2NF relvars are in 1NF
    but some 1NF relvars aren’t in 2NF.


    *   There are many different normal forms: first, second, third, and so on. The
    figure shows six of them, but as you can see they aren’t labeled first, ..., sixth
    (not quite)—there’s an interloper, BCNF, between third and fourth. I’ll explain
    the reason for this terminological oddity in Chapter [4](#489629_2_En_4_Chapter.xhtml);
    for now, let me just say that the name BCNF is short for *Boyce/Codd normal form*.
    Despite the BCNF exception, however, it’s convenient to use the term *nth normal
    form* to refer generically to the different levels of normalization, and I’ll
    adopt that usage from time to time in what follows.


    *   The figure also shows a deliberate gap between BCNF and 4NF. However, that
    gap isn’t meant to suggest there might be some “missing” normal forms at that
    point (in fact there aren’t); rather, it reflects the fact that there’s a kind
    of conceptual jump, or shift, in the hierarchy between the first four normal forms
    and the last two. See Part III of this book for further explanation.


    *   All of the normal forms apart from the first (1NF) are defined in terms of
    certain *dependencies*—in this context, just another term for integrity constraints.
    The principal kinds of dependencies from a normalization perspective are *functional*
    dependencies (FDs) and *join* dependencies (JDs).


    *   BCNF and 5NF are highlighted (set in boldface) in the figure to indicate their
    relative importance, compared to the other normal forms shown. BCNF is defined
    in terms of functional dependencies, and 5NF is defined in terms of join dependencies.
    Indeed, as we’ll see in subsequent chapters , BCNF is really “the” normal form
    so far as functional dependencies (FDs) are concerned, and 5NF is really “the”
    normal form so far as join dependencies (JDs) are concerned.


    *   Generally speaking, the higher the level of normalization the better, from
    a design point of view—because the higher the level of normalization, the fewer
    the redundancies that can occur, and the fewer the update anomalies that can therefore
    occur as well.


    *   It’s possible for a relvar to be in *n*th normal form and not in (*n*+1)st.


    *   By contrast, if relvar *R* is in (*n*+1)st normal form, then it’s certainly
    in *n*th. In other words, fifth normal form (5NF) implies fourth normal form (4NF),
    and so on. It follows that to say that, e.g., relvar *R* is in BCNF doesn’t preclude
    the possibility that *R* is in 5NF as well. In practice, however, it’s common
    for statements to the effect that relvar *R* is in, say, BCNF to be taken to mean
    that *R* is in BCNF *and not in any higher normal form*. Please note carefully,
    therefore, that I do *not* follow that usage in this book.


    *   If relvar *R* is in *n*th normal form and not in (*n*+1)st, then it can always
    be decomposed via projection, in a nonloss way, such that (a) the projections
    are, typically, in (*n*+1)st normal form and (b) *R* is equal to the join of those
    projections.'
  trans: '

    根据定义，投影、连接等操作是专门应用于关系值的。它们当然也适用于那些恰好是关系变量当前值的值。因此，讨论，例如，关系变量`S`在属性`{CITY, STATUS}`上的投影是完全合理明确的，这意味着对关系变量`S`的当前值在这些属性上进行投影所得到的关系。然而，在某些上下文（例如，在规范化过程中）中，使用诸如“关系变量`S`在属性`{CITY,
    STATUS}`上的投影”这样的表达式，并赋予其稍有不同的含义，被证明是方便的。具体来说，我们可能会松散但非常方便地说，某个关系变量`CT`是关系变量`S`在属性`{CITY,
    STATUS}`上的投影——更准确地说，这意味着关系变量`CT`在任何时刻的值都等于该时刻关系变量`S`的值在这些属性上的投影。因此，在某种意义上，我们可以讨论关系变量本身的投影，而不仅仅是关系变量当前值的投影。类似的论述也适用于所有关系运算。


    换句话说，我们仍然使用投影/连接术语，即使在情况 1 中也是如此。这样的说法有些欠妥——甚至可以说是草率的——但它至少很简洁。但更准确的说法应该是，分解不是一个直接进行投影的过程，而是一个*让人想起*投影（对重组和连接也是如此）但又与之并不完全相同的过程。


    ## 更新异常


    *更新异常*的概念在讨论规范化时经常被提及。应该清楚，任何形式的冗余都可能导致异常——因为冗余大致意味着某些信息被表示了两次，因此总是存在两种表示不一致的可能性（即，如果其中一个被更新而另一个没有）。更具体地说，让我们考虑关系变量`S`的情况，其中存在以下函数依赖（`FD`）：


    ```

    { CITY } → { STATUS }

    ```


    这个`FD`所导致的冗余——即，关于某个城市具有某种状态的事实的重复或双重表示——已经讨论过了。它会导致如下异常（这些例子假设了图 3-1 中关系变量`S`的样本值）：


    *   **插入异常**：在罗马有供应商之前，我们无法插入“罗马的状态是 10”这个事实。

    *   **删除异常**：如果我们删除唯一在雅典的供应商，我们就会丢失“雅典的状态是 30”这个事实。

    *   **修改异常**：我们无法在不修改（通常）该供应商状态的情况下，更改（“修改”）给定供应商的城市。并且我们无法在不为该城市所有供应商进行相同修改的情况下，修改给定供应商的状态。


    用两个“投影”关系变量`SNC`和`CT`替换关系变量`S`可以解决这些问题（具体如何解决？）。此外，我要正式声明，关系变量`S`（如前所述）处于第二范式（`2NF`）而非第三范式（`3NF`），而关系变量`SNC`和`CT`都处于第三范式（`3NF`），实际上也处于`BCNF`。一般来说，`BCNF`是解决上述各类异常所引起问题的方案。


    ## 范式层次结构


    如你所知，存在许多不同的范式。下面的图 3-3 是我对所谓的范式层次结构的初步展示（但请注意，我将在后面的章节——具体是第 13 至 15 章——中扩展这个层次结构）。


    ![../images/489629_2_En_3_Chapter/489629_2_En_3_Fig3_HTML.jpg](img/489629_2_En_3_Fig3_HTML.jpg)


    图 3-3 范式层次结构（一）


    要点：


    *   首先，你可能认为这个层次结构是颠倒的，因为它把最高的范式放在底部，最低的放在顶部。我不想争论这一点；我只想说，按图中所示的方式展示（在我看来）更符合这样一个事实：例如，所有`2NF`关系变量都属于`1NF`，但有些`1NF`关系变量不属于`2NF`。

    *   存在许多不同的范式：第一、第二、第三，等等。图中展示了六种，但如你所见，它们并未被标记为第一到第六（不完全如此）——在第三和第四范式之间有一个“闯入者”`BCNF`。我将在第
    4 章解释这个术语怪异的原因；现在，我只想说`BCNF`是*Boyce/Codd 范式*的缩写。尽管存在`BCNF`这个例外，但使用*第 n 范式*这个术语来泛指不同级别的规范化是方便的，在下文中我将不时采用这种用法。

    *   图中还在`BCNF`和`4NF`之间显示了一个有意的间隔。然而，这个间隔并非暗示那里可能存在某些“缺失”的范式（实际上没有）；相反，它反映了在前四种范式和后两种范式之间，层次结构中存在某种概念上的跳跃或转变。更多解释请参见本书第三部分。

    *   除第一范式（`1NF`）外，所有范式都是根据某些*依赖*定义的——在此上下文中，这*依赖*只是完整性约束的另一个术语。从规范化角度看，依赖的主要类型是*函数*依赖（`FDs`）和*连接*依赖（`JDs`）。

    *   图中将`BCNF`和`5NF`突出显示（用粗体），以表明它们相对于其他所示范式的重要性。`BCNF`是根据函数依赖定义的，`5NF`是根据连接依赖定义的。实际上，我们将在后续章节中看到，就函数依赖（`FDs`）而言，`BCNF`确实是“那个”范式；就连接依赖（`JDs`）而言，`5NF`确实是“那个”范式。

    *   一般来说，从设计角度看，规范化级别越高越好——因为规范化级别越高，可能出现的冗余就越少，因此可能发生的更新异常也就越少。

    *   一个关系变量可能处于*第 n*范式而不处于*第 n+1*范式。

    *   相反，如果关系变量*R*处于*第 n+1*范式，那么它肯定也处于*第 n*范式。换句话说，第五范式（`5NF`）意味着第四范式（`4NF`），依此类推。因此，说关系变量*R*处于`BCNF`并不排除*R*也可能处于`5NF`的可能性。然而，在实践中，诸如“关系变量*R*处于，比如说，`BCNF`”这样的陈述，通常被理解为*R*处于`BCNF`*且不处于任何更高的范式*。因此，请特别注意，本书中我*不*遵循这种用法。

    *   如果关系变量*R*处于*第 n*范式而不处于*第 n+1*范式，那么它总是可以通过投影以无损方式进行分解，使得（a）投影通常处于*第 n+1*范式，并且（b）*R*等于这些投影的连接。

