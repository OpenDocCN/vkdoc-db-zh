  raw: '3.  Relvar S certainly contains subtuples corresponding to SN, SC, and CT;
    however, those corresponding to SN and SC are never repeated because {SNO} is
    a key. By contrast, those corresponding to CT are repeated, at least potentially
    (as we know from Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1)), and such repetition
    does constitute redundancy.


    With all of the foregoing by way of motivation, then, I offer the following as
    a putative “final” definition of what it means for a database to exhibit redundancy:


    1.  If there exists a database value (i.e., a set of values for the relvars mentioned
    in *D*), *DB*, that conforms to *D*, such that


    2.  There exists within *DB* some specific appearance of some tuple or combination
    of tuples that represents *p*, either explicitly or implicitly, and


    3.  There exists within *DB* some distinct appearance of some tuple or combination
    of tuples that also represents *p*, either explicitly or implicitly, then


    4.  *DB* contains, and *D* permits, redundancy.


    *   **Definition (redundancy in the database, “final” detailed version):** Let
    *D* be a database design and let proposition *p* be both simple and unquantified.
    Then:


    Of course, the foregoing definition can also be expressed more succinctly thus:


    *   **Definition (redundancy in the database, “final” succinct version):** Let
    *D* be a database design; let *DB* be a database value (i.e., a set of values
    for the relvars mentioned in *D*) that conforms to *D*; and let *p* be a simple
    unquantified proposition. If *DB* contains two or more distinct representations
    of *p* (either implicitly or implicitly), then *DB* contains, and *D* permits,
    redundancy.


    Observe in particular that a database can still display redundancy by this definition,
    even if it fully conforms to *The Principle of Orthogonal Design* and all normalization
    principles. Note, however, that the definition still says that *if*—not *if and
    only if*—a certain condition holds, *then* there’s redundancy; I’d like to replace
    that *if* by *if and only if*, but I don’t quite have the courage of my convictions
    here. Not yet.


    Be that as it may, let’s consider Examples 1-12 from earlier sections of this
    chapter and see what the implications of the foregoing definition are for those
    examples specifically. *Please note carefully:* Throughout the following analysis,
    the unqualified term *proposition* should be taken to mean a simple proposition
    that’s not existentially quantified, unless the context demands otherwise. (However,
    I often use the more explicit term *simple unquantified proposition* anyway, for
    emphasis.)


    ### Examples 1 and 2


    Both of these examples display redundancy because the simple unquantified proposition
    *San Francisco, California is the city corresponding to zip code 94100* is represented
    twice.


    ### Example 3


    Suppose two distinct tuples both contain the DATE value “Friday, January 18th,
    2019”; then the database clearly displays redundancy because the simple unquantified
    proposition *January 18th, 2019 is a Friday* is represented twice, explicitly.
    In fact, there’s redundancy even if that DATE value appears just once! The reason
    is that even in that case, the proposition *January 18th, 2019 is a Friday* is
    represented both explicitly and implicitly. The explicit representation is obvious;
    the implicit representation is a consequence of the fact that one part of the
    value, viz., the day of the week (Friday, in the example), can be computed from
    the rest of the value (January 18th, 2019, in the example).^([^(250)](#fn250))


    ### Example 4


    There’s no redundancy in this example.


    ### Example 5


    Let employee *e* be represented in relvar EMP and let the JOB value for *e* be
    “Programmer” (so employee *e* is represented in relvar PGMR as well). As pointed
    out earlier, then, the simple unquantified proposition *Employee e is a programmer*
    is clearly represented (explicitly!) in two different ways.


    ### Example 6


    For a supplier *s* who doesn’t have all three properties (i.e., name, status,
    and city), this example is essentially similar to Example 4, q.v. For a supplier
    *s* who has all three, we could say the E-relvar tuple for *s* is redundant—*if*
    we accept that the predicate for that E-relvar takes the form *SNO is a supplier*
    and the predicates for the P-relvars take the form *SNO is a supplier* ***and***
    *...* (etc, etc.), meaning the unquantified propositions that are represented
    more than once are *S1 is a supplier*, *S2 is a supplier*, and so on. Debatable,
    maybe. What do you think?


    ### Example 7


    I said earlier that there seem to be good arguments against adopting the “default
    department” design here (and there are). But if we do adopt that design, then
    we might say the proposition *Employee E4 is in department D3* (for example) is
    represented twice: once by an explicit tuple, and once by the *lack* of a tuple
    corresponding to the proposition *Employee E4 is in department Dj* for any department
    *Dj* not equal to D3\. But that’s a pretty tortuous argument! What’s more, the
    (missing) proposition “*Employee E4 is in department Dj for some department Dj
    not equal to D3*” isn’t really unquantified—it’s an abbreviation for something
    like this:


    *   ***There doesn’t exist a department Dj such that*** *employee E4 is in department
    Dj and Dj ≠ D3.*^([^(251)](#fn251))


    So what do you think?


    ### Example 8


    The proposition *Employee E4 is unsalaried* is represented both explicitly by
    a tuple in UNSALARIED and implicitly by the lack of a tuple for employee E4 in
    either EARNS or SALARY_UNK. (This example has points of similarity with both Example
    6 and Example 7.)'
