    (a repeat of Figure [9-1](#489629_2_En_9_Chapter.xhtml#Fig1)). The predicate is
    *Supplier SNO supplies part PNO to project JNO*, and the following business rule
    (BRX) is in effect:


    ![../images/489629_2_En_10_Chapter/489629_2_En_10_Fig1_HTML.jpg](images/489629_2_En_10_Chapter/489629_2_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Relvar SPJ—sample value


    *   If supplier *s* supplies part *p* and part *p* is supplied to project *j*
    and project *j* is supplied by supplier *s*, then supplier *s* supplies part *p*
    to project *j*.


    Now, we know from Chapter [9](#489629_2_En_9_Chapter.xhtml) that (as I put it
    in that chapter) the following JD captures the essence of business rule BRX and
    so holds in relvar SPJ:


    ```

    ☼ { { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }

    ```


    Now we can see that this JD isn’t implied by the sole key (viz., {SNO,PNO,JNO})
    of the relvar, because the membership algorithm fails, and so SPJ isn’t in 5NF.
    So it can be nonloss decomposed into its three binary projections, and probably
    should be, if we want to reduce redundancy. Those three projections are all in
    5NF (no JDs hold in them at all apart from trivial ones).


    ## A Useful Theorem


    I said in Chapter [9](#489629_2_En_9_Chapter.xhtml) that in practice it’s quite
    unusual to find a relvar that’s in BCNF and not in 5NF. In fact, there’s a theorem
    that addresses this issue:


    *   **Theorem:** Let *R* be a BCNF relvar and let *R* have no composite keys;
    then *R* is in 5NF.


    (Recall from Chapter [1](#489629_2_En_1_Chapter.xhtml) that a composite key is
    a key consisting of two or more attributes.)


    This theorem is quite useful. What it says is, if you can get to BCNF (which is
    easy enough), and if there aren’t any composite keys in your BCNF relvar (which
    is often but not always the case), then you don’t have to worry about the complexities
    of JDs and 5NF in general—you know without having to think about the matter any
    further that the relvar simply *is* in 5NF. *Note:* Actually the theorem applies
    to *3NF*, not BCNF; that is, it really says a *3NF* relvar with no composite keys
    is in 5NF. But every BCNF relvar is in 3NF, and in any case BCNF is much more
    important than 3NF, pragmatically speaking (as well as being conceptually simpler).


    I don’t know why, but people often misinterpret the foregoing theorem. To be specific,
    given that a BCNF relvar with no composite keys is “automatically” in 5NF, people
    often seem to think that simply introducing a surrogate key (noncomposite by definition)
    into a BCNF relvar “automatically” means the relvar is now in 5NF. But it doesn’t
    mean that at all! If the relvar wasn’t in 5NF before the surrogate was introduced,
    it won’t be in 5NF afterward. In particular, if it had a composite key before
    the surrogate was introduced, it’ll still have one afterward.


    ## FDs Aren’t JDs


    Statements to the effect that every FD is a JD, or that (as I put it in Chapter
    [9](#489629_2_En_9_Chapter.xhtml)) JDs are a kind of generalized FD, are quite
    common in the less formal parts of the literature; indeed, I’ve said such things
    myself in previous books and other previous writings. But such talk is strictly
    incorrect. It would be better to say that every FD *implies* a JD (which in fact
    is something we already know to be the case from Heath’s Theorem). In other words,
    if *R* is subject to a certain FD, *F* say, then it’s certainly subject to a certain
    JD, *J* say. However, the converse is false—*R* can be subject to that same JD
    *J* without being subject to that same FD *F*, as I now show:


    *   Let relvar *R* have attributes *A*, *B*, and *C* (only), let *F* be the FD
    *AB* → *C*, and let *R* be subject to *F* (Heath notation once again).


    *   By Heath’s Theorem, then, *R* is subject to the JD ☼{*ABC*,*AB*}. (With reference
    to the formulation of Heath’s Theorem given in Chapter [9](#489629_2_En_9_Chapter.xhtml),
    take *X* to be *AB*, *Y* to be *C*, and *Z* to be the empty set of attributes.)
    Call this JD *J*.


    *   But this JD *J* is trivial—it holds in every relvar *R* that has heading *ABC*,
    regardless of whether that relvar is subject to the FD *AB* → *C*.'
  trans: '让我来结束本节的讨论，重新回顾一下第 9 章的`SPJ`示例。为方便起见，该关系变量的一个样本值显示在图 10-1 中（即图 9-1 的重复）。其谓词是“供应商`SNO`向项目`JNO`供应零件`PNO`”，且以下业务规则（`BRX`）生效：


    ![../images/489629_2_En_10_Chapter/489629_2_En_10_Fig1_HTML.jpg](img/489629_2_En_10_Fig1_HTML.jpg)

    *图 10-1：关系变量`SPJ`——样本值*


    *   如果供应商`s`供应零件`p`，且零件`p`供应给项目`j`，并且项目`j`由供应商`s`供应，那么供应商`s`向项目`j`供应零件`p`。


    现在，根据第 9 章的内容，我们知道（正如我在该章所述）以下`JD`捕捉了业务规则`BRX`的精髓，因此在关系变量`SPJ`中成立：

    ```

    ☼ { { SNO , PNO } , { PNO , JNO } , { JNO , SNO } }

    ```

    现在我们可以看到，这个`JD`并非由该关系变量的唯一键（即`{SNO,PNO,JNO}`）所蕴含，因为成员资格判定算法失败，所以`SPJ`不在`5NF`中。因此，它可以无损分解为其三个二元投影，如果我们想要减少冗余，或许应该这样做。这三个投影都处于`5NF`中（除了平凡的`JD`外，它们中根本不成立任何`JD`）。


    ## 一个有用的定理

    我在第 9 章说过，在实践中发现一个处于`BCNF`但不处于`5NF`中的关系变量是相当罕见的。事实上，有一个定理阐述了这个问题：

    ```

    定理：设 R 是一个 BCNF 关系变量，且 R 没有复合键；则 R 处于 5NF 中。

    ```

    （回顾第 1 章，复合键是指由两个或更多属性组成的键。）


    这个定理非常有用。它说明的是，如果你能到达`BCNF`（这相当容易），并且如果你的`BCNF`关系变量中没有任何复合键（这通常是但并非总是如此），那么你就不必担心`JD`和`5NF`整体上的复杂性——你无需再进一步思考这个问题，就能知道该关系变量*本身*就处于`5NF`中。*注：*
    实际上该定理适用于`3NF`，而非`BCNF`；也就是说，它真正说的是一个没有复合键的`3NF`关系变量处于`5NF`中。但每个`BCNF`关系变量都处于`3NF`中，而且无论如何，从实用角度讲（并且概念上也更简单），`BCNF`比`3NF`重要得多。


    我不知道为什么，但人们常常误解上述定理。具体来说，鉴于没有复合键的`BCNF`关系变量是“自动”处于`5NF`中的，人们似乎常常认为，仅仅向一个`BCNF`关系变量中引入代理键（按定义就是非复合的）就意味着该关系变量“自动”现在处于`5NF`中。但这根本不是事实！如果该关系变量在引入代理键之前不处于`5NF`中，之后也不会处于`5NF`中。特别是，如果它在引入代理键之前有一个复合键，之后它仍然会有一个复合键。


    ## FD 不是 JD

    在文献中不太正式的部分，常常出现诸如“每个`FD`都是一个`JD`”，或者（正如我在第 9 章所说）“`JD`是某种广义的`FD`”之类的说法；实际上，我在以前的书籍和其他著作中也说过这样的话。但这种说法是严格错误的。更好的说法是每个`FD`*蕴含*一个`JD`（事实上，这是通过希斯定理我们已知的情况）。换句话说，如果`R`受限于某个`FD`，比方说`F`，那么它当然也受限于某个`JD`，比方说`J`。然而，反过来则不成立——`R`可以受限于相同的`JD`
    `J`，而不受限于相同的`FD` `F`，我现在展示如下：

    *   设关系变量`R`仅具有属性`A`、`B`和`C`，设`F`是`FD` `AB → C`，并设`R`受限于`F`（再次使用希斯记法）。

    *   根据希斯定理，`R`受限于`JD` `☼{*ABC*,*AB*}`。（参考第 9 章给出的希斯定理表述，取`X`为`AB`，`Y`为`C`，`Z`为空属性集。）称此`JD`为`J`。

    *   但此`JD` `J`是平凡的——它在每个具有标题`ABC`的关系变量`R`中都成立，无论该关系变量是否受限于`FD` `AB → C`。'
- fmt: "## Update Anomalies Revisited\n\nIn Chapter [3](#489629_2_En_3_Chapter.xhtml),\
    \ we took a brief look at certain update anomalies that can be caused by `FD`s:\
    \ specifically, `FD`s that hold in a relvar that’s not in `BCNF`. To be frank,\
    \ however, the update anomaly concept was never very precisely defined (at least,\
    \ not in that context); probably the best that could be said about it is that\
    \ the update anomaly problem is just the redundancy problem looked at from another\
    \ point of view. So what about `JD`s?—specifically, `JD`s that hold in a relvar\
    \ that’s not in `5NF`? Such `JD`s do cause redundancy, as we’ve seen, and so we\
    \ can expect them to give rise to update anomalies as well. And indeed they do;\
    \ what’s more, the concept can be (or at any rate, is) more precisely defined\
    \ in that context, as we’ll see.\n\nConsider Figure [10-2](#489629_2_En_10_Chapter.xhtml#Fig2),\
    \ which shows two possible values for relvar `SPJ`; the one on the left is a repeat\
    \ of the relation from Figure [10-1](#489629_2_En_10_Chapter.xhtml#Fig1), the\
    \ one on the right is obtained from the one on the left by removing two tuples.\n\
    \n![../images/489629_2_En_10_Chapter/489629_2_En_10_Fig2_HTML.jpg](images/489629_2_En_10_Chapter/489629_2_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2: Two possible values for relvar `SPJ`\n\nRecall now that the following\
    \ `JD` holds in relvar `SPJ`:\n\n```\n☼ { { SNO , PNO } , { PNO , JNO } , { JNO\
    \ , SNO } }\n```\n\nIt follows that:\n\n- If the current value of the relvar is\
    \ the relation on the left of the figure (“possible value 1”), there’s a `` `deletion\
    \ anomaly` ``: We can’t delete just the tuple `(S1,P1,J1)`, because what results\
    \ after that deletion violates the `JD` and is thus not a legal value for `SPJ`.\n\
    \n- Likewise, if the current value of the relvar is the relation on the right\
    \ of the figure (“possible value 2”), there’s an `` `insertion anomaly` ``: We\
    \ can’t insert just the tuple `(S2,P1,J1)`, because what results after that insertion\
    \ is—again, and for the same reason—not a legal value for `SPJ`.\n\nNow, the `JD`\
    \ in this example is `` `tuple forcing` ``. (Recall from Chapter [9](#489629_2_En_9_Chapter.xhtml)\
    \ that a `JD` is tuple forcing if it’s such that, if certain tuples appear, certain\
    \ additional tuples are forced to appear as well.) And the notion of tuple forcing\
    \ `JD`s—or the intuition behind that notion, rather—allows us to give definitions\
    \ of the kinds of update anomalies that can occur in the presence of such a `JD`,\
    \ definitions that are more precise than their `FD` counterparts (such as they\
    \ are).^([^(139)](#fn139)) To be specific:\n\n- **Definition (deletion anomaly\
    \ with `JD`s):** Let the `JD` `J` hold in relvar `R`. Then `R` suffers from a\
    \ deletion anomaly with respect to `J` if and only if there exist a relation `r`\
    \ and a tuple `t`, each with the same heading as `R`, such that:\n    1. `r` satisfies\
    \ `J`, and\n    2. The relation `r'` whose body is obtained from that of `r` by\
    \ removing `t` violates `J`.\n\n- **Definition (insertion anomaly with `JD`s):**\
    \ Let the `JD` `J` hold in relvar `R`. Then `R` suffers from an insertion anomaly\
    \ with respect to `J` if and only if there exist a relation `r` and a tuple `t`,\
    \ each with the same heading as `R`, such that:\n    1. `r` satisfies `J`, and\n\
    \    2. The relation `r'` whose body is obtained from that of `r` by appending\
    \ `t` satisfies `R`’s key constraints but violates `J`.\n\n- Points arising:\n\
    \    - Note that (a) the foregoing anomalies are specifically defined in terms\
    \ of some `JD` `J`, and (b) they can certainly both occur in the same relvar `R`,\
    \ as the `SPJ` example illustrates. In Chapter [13](#489629_2_En_13_Chapter.xhtml),\
    \ however, we’ll see that it’s also possible, if `JD` `J` holds in relvar `R`,\
    \ for `R` to suffer from an insertion anomaly and not a deletion anomaly (with\
    \ respect to `J` in both cases).\n    - Although they’re more precisely defined\
    \ than their `FD` counterparts, the foregoing anomalies can still be regarded\
    \ as the redundancy problem looked at from another point of view—though here,\
    \ of course, we’re referring to redundancy that’s caused by a `JD`, not by an\
    \ `FD`.\n    - If relvar `R` is subject to update anomalies and those anomalies\
    \ are caused by a `JD` (tuple forcing or otherwise), then replacing `R` by a set\
    \ of `5NF` projections will solve the problem. That is, such anomalies can’t occur\
    \ with a `5NF` relvar.\n\nPlease note carefully, however, that not all update\
    \ anomalies are caused by `FD`s or `JD`s. In fact, it’s probably true to say that\
    \ most integrity constraints (perhaps all?) can give rise to an insertion anomaly,\
    \ in the sense that there always exists a tuple whose insertion would cause the\
    \ constraint in question to be violated. (As a simple example, suppose there’s\
    \ a constraint to the effect that supplier status values must lie in the range\
    \ 1 to 100, inclusive.) By contrast, comparatively few constraints can give rise\
    \ to a deletion anomaly. (One that can would be a constraint to the effect that\
    \ there must always be at least two distinct suppliers. Another is a foreign key\
    \ constraint; in the suppliers-and-parts database, for example, deleting a supplier\
    \ can’t be done if it causes the foreign key constraint from `SP` to `S` to be\
    \ violated.^([^(140)](#fn140)))\n\n## Exercises\n\n1.  The following questions\
    \ are repeated from Chapter [1](#489629_2_En_1_Chapter.xhtml), but you should\
    \ have a better chance of answering them now (assuming you couldn’t do so before,\
    \ that is):\n    1.  (*Exercise 1.6.*) Is it true that every “all key” relvar\
    \ is in `5NF`?\n    2.  (*Exercise 1.7.*) Is it true that every binary relvar\
    \ is in `5NF`?\n    3.  (*Exercise 1.8.*) Is it true that if a relvar has just\
    \ one key and just one other attribute, then it’s in `5NF`?\n    4.  (*Exercise\
    \ 1.9.*) Is it true that if a relvar is in `BCNF` but not `5NF`, then it must\
    \ be all key?\n    5.  (*Exercise 1.10.*) Can you give a precise definition of\
    \ `5NF`?\n    6.  (*Exercise 1.11.*) Is it true that `5NF` relvars are redundancy\
    \ free?\n2.  Give as precise a definition as you can of what it means for a relvar\
    \ to be subject to a join dependency.\n3.  How many `JD`s hold in the shipments\
    \ relvar `SP`?\n4.  What does it mean to say a `JD` is implied by superkeys?\n\
    5.  What’s a trivial `JD`? Is a trivial `FD` a special case?\n6.  Give an example\
    \ of a `JD` that’s (a) tuple forcing, (b) not tuple forcing.\n7.  Consider (either\
    \ base relvar or view) `RAP` as discussed in the answer to Exercise 9.2 in Chapter\
    \ [9](#489629_2_En_9_Chapter.xhtml). Give examples of an insertion anomaly and\
    \ a deletion anomaly that can occur with that relvar.\n8.  The following is a\
    \ lightly edited quote from a certain database textbook:\n    - Fifth normal form\
    \ concerns dependencies that are rather obscure. It has to do with relations that\
    \ can be divided into subrelations ... but then cannot be reconstructed. The condition\
    \ under which this situation arises has no clear, intuitive meaning. We do not\
    \ know what the consequences of such dependencies are or even if they have any\
    \ practical consequences.\n    - Do you have any comments?\n9.  The following\
    \ is a lightly edited quote from my own textbook *An Introduction to Database\
    \ Systems* (8th edition, Addison-Wesley, 2004):\n    - Relvar `R` is in `5NF`\
    \ if and only if every nontrivial `JD` that holds in `R` is implied by the keys\
    \ of `R`, where:\n        1. The `JD` ☼{*A*, *B*, ..., *Z*} is trivial (with respect\
    \ to `R`) if and only if at least one of *A*, *B*, ..., *Z* is the heading of\
    \ `R`.\n        2. The `JD` ☼{*A*, *B*, ..., *Z*} is implied by the keys of `R`\
    \ if and only if each of *A*, *B*, ..., *Z* is a superkey for `R`.\n    - Do you\
    \ have any comments?"
  raw: "## Update Anomalies Revisited\n\nIn Chapter [3](#489629_2_En_3_Chapter.xhtml),\
    \ we took a brief look at certain update anomalies that can be caused by FDs:\
    \ specifically, FDs that hold in a relvar that’s not in BCNF. To be frank, however,\
    \ the update anomaly concept was never very precisely defined (at least, not in\
    \ that context); probably the best that could be said about it is that the update\
    \ anomaly problem is just the redundancy problem looked at from another point\
    \ of view. So what about JDs?—specifically, JDs that hold in a relvar that’s not\
    \ in 5NF? Such JDs do cause redundancy, as we’ve seen, and so we can expect them\
    \ to give rise to update anomalies as well. And indeed they do; what’s more, the\
    \ concept can be (or at any rate, is) more precisely defined in that context,\
    \ as we’ll see.\n\nConsider Figure [10-2](#489629_2_En_10_Chapter.xhtml#Fig2),\
    \ which shows two possible values for relvar SPJ; the one on the left is a repeat\
    \ of the relation from Figure [10-1](#489629_2_En_10_Chapter.xhtml#Fig1), the\
    \ one on the right is obtained from the one on the left by removing two tuples.\n\
    \n![../images/489629_2_En_10_Chapter/489629_2_En_10_Fig2_HTML.jpg](images/489629_2_En_10_Chapter/489629_2_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2\n\nTwo possible values for relvar SPJ\n\nRecall now that the following\
    \ JD holds in relvar SPJ:\n\n```\n☼ { { SNO , PNO } , { PNO , JNO } , { JNO ,\
    \ SNO } }\n```\n\nIt follows that:\n\n*   If the current value of the relvar is\
    \ the relation on the left of the figure (“possible value 1”), there’s a *deletion\
    \ anomaly*: We can’t delete just the tuple (S1,P1,J1), because what results after\
    \ that deletion violates the JD and is thus not a legal value for SPJ.\n\n*  \
    \ Likewise, if the current value of the relvar is the relation on the right of\
    \ the figure (“possible value 2”), there’s an *insertion anomaly*: We can’t insert\
    \ just the tuple (S2,P1,J1), because what results after that insertion is—again,\
    \ and for the same reason—not a legal value for SPJ.\n\nNow, the JD in this example\
    \ is *tuple forcing*. (Recall from Chapter [9](#489629_2_En_9_Chapter.xhtml) that\
    \ a JD is tuple forcing if it’s such that, if certain tuples appear, certain additional\
    \ tuples are forced to appear as well.) And the notion of tuple forcing JDs—or\
    \ the intuition behind that notion, rather—allows us to give definitions of the\
    \ kinds of update anomalies that can occur in the presence of such a JD, definitions\
    \ that are more precise than their FD counterparts (such as they are).^([^(139)](#fn139))\
    \ To be specific:\n\n*   **Definition (deletion anomaly with JDs)** **:** Let\
    \ the JD *J* hold in relvar *R*. Then *R* suffers from a deletion anomaly with\
    \ respect to *J* if and only if there exist a relation *r* and a tuple *t*, each\
    \ with the same heading as *R*, such that:\n    1.  *r* satisfies *J*, and\n\n\
    2.  The relation *r'* whose body is obtained from that of *r* by removing *t*\
    \ violates *J*.\n\n*   **Definition (insertion anomaly with JDs)** **:** Let the\
    \ JD *J* hold in relvar *R*. Then *R* suffers from an insertion anomaly with respect\
    \ to *J* if and only if there exist a relation *r* and a tuple *t*, each with\
    \ the same heading as *R*, such that:\n    1.  *r* satisfies *J*, and\n\n2.  The\
    \ relation *r'* whose body is obtained from that of *r* by appending *t* satisfies\
    \ *R*’s key constraints but violates *J*.\n\n*   Points arising:\n    *   Note\
    \ that (a) the foregoing anomalies are specifically defined in terms of some JD\
    \ *J*, and (b) they can certainly both occur in the same relvar *R*, as the SPJ\
    \ example illustrates. In Chapter [13](#489629_2_En_13_Chapter.xhtml), however,\
    \ we’ll see that it’s also possible, if JD *J* holds in relvar *R*, for *R* to\
    \ suffer from an insertion anomaly and not a deletion anomaly (with respect to\
    \ *J* in both cases).\n\n*   Although they’re more precisely defined than their\
    \ FD counterparts, the foregoing anomalies can still be regarded as the redundancy\
    \ problem looked at from another point of view—though here, of course, we’re referring\
    \ to redundancy that’s caused by a JD, not by an FD.\n\n*   If relvar *R* is subject\
    \ to update anomalies and those anomalies are caused by a JD (tuple forcing or\
    \ otherwise), then replacing *R* by a set of 5NF projections will solve the problem.\
    \ That is, such anomalies can’t occur with a 5NF relvar.\n\nPlease note carefully,\
    \ however, that not all update anomalies are caused by FDs or JDs. In fact, it’s\
    \ probably true to say that most integrity constraints (perhaps all?) can give\
    \ rise to an insertion anomaly, in the sense that there always exists a tuple\
    \ whose insertion would cause the constraint in question to be violated. (As a\
    \ simple example, suppose there’s a constraint to the effect that supplier status\
    \ values must lie in the range 1 to 100, inclusive.) By contrast, comparatively\
    \ few constraints can give rise to a deletion anomaly. (One that can would be\
    \ a constraint to the effect that there must always be at least two distinct suppliers.\
    \ Another is a foreign key constraint; in the suppliers-and-parts database, for\
    \ example, deleting a supplier can’t be done if it causes the foreign key constraint\
    \ from SP to S to be violated.^([^(140)](#fn140)))\n\n## Exercises\n\n1.  The\
    \ following questions are repeated from Chapter [1](#489629_2_En_1_Chapter.xhtml),\
    \ but you should have a better chance of answering them now (assuming you couldn’t\
    \ do so before, that is):\n    1.  (*Exercise 1.6.*) Is it true that every “all\
    \ key” relvar is in 5NF?\n\n    2.  (*Exercise 1.7.*) Is it true that every binary\
    \ relvar is in 5NF?\n\n    3.  (*Exercise 1.8.*) Is it true that if a relvar has\
    \ just one key and just one other attribute, then it’s in 5NF?\n\n    4.  (*Exercise\
    \ 1.9.*) Is it true that if a relvar is in BCNF but not 5NF, then it must be all\
    \ key?\n\n    5.  (*Exercise 1.10.*) Can you give a precise definition of 5NF?\n\
    \n    6.  (*Exercise 1.11.*) Is it true that 5NF relvars are redundancy free?\n\
    \n2.  Give as precise a definition as you can of what it means for a relvar to\
    \ be subject to a join dependency.\n\n3.  How many JDs hold in the shipments relvar\
    \ SP?\n\n4.  What does it mean to say a JD is implied by superkeys?\n\n5.  What’s\
    \ a trivial JD? Is a trivial FD a special case?\n\n6.  Give an example of a JD\
    \ that’s (a) tuple forcing, (b) not tuple forcing.\n\n7.  Consider (either base\
    \ relvar or view) RAP as discussed in the answer to Exercise 9.2 in Chapter [9](#489629_2_En_9_Chapter.xhtml).\
    \ Give examples of an insertion anomaly and a deletion anomaly that can occur\
    \ with that relvar.\n\n8.  The following is a lightly edited quote from a certain\
    \ database textbook:\n    *   Fifth normal form concerns dependencies that are\
    \ rather obscure. It has to do with relations that can be divided into subrelations\
    \ ... but then cannot be reconstructed. The condition under which this situation\
    \ arises has no clear, intuitive meaning. We do not know what the consequences\
    \ of such dependencies are or even if they have any practical consequences.\n\n\
    \    *   Do you have any comments?\n\n9.  The following is a lightly edited quote\
    \ from my own textbook *An Introduction to Database Systems* (8th edition, Addison-Wesley,\
    \ 2004):\n    *   Relvar *R* is in 5NF if and only if every nontrivial JD that\
    \ holds in *R* is implied by the keys of *R*, where:\n        1.  The JD ☼{*A*,\
    \ *B*, ..., *Z*} is trivial (with respect to *R*) if and only if at least one\
    \ of *A*, *B*, ..., *Z* is the heading of *R*.\n\n        2.  The JD ☼{*A*, *B*,\
    \ ..., *Z*} is implied by the keys of *R* if and only if each of *A*, *B*, ...,\
    \ *Z* is a superkey for *R*.\n\nDo you have any comments?"
  trans: "\n## 更新异常再探讨\n\n在第 3 章中，我们简要探讨了由 `FD` 可能引起的某些更新异常：具体来说，是那些存在于一个非 `BCNF`\
    \ 关系变量中的 `FD`。然而坦率地说，更新异常的概念从未被非常精确地定义过（至少，在那个上下文中没有）；或许最恰当的说法是，更新异常问题只是从另一个角度看待冗余问题。那么\
    \ `JD` 呢？——特别是那些存在于一个非 `5NF` 关系变量中的 `JD`？正如我们所见，这样的 `JD` 确实会导致冗余，因此我们可以预期它们也会引起更新异常。而事实上也的确如此；更重要的是，在那个上下文中，这个概念可以（或者说至少是）被更精确地定义，我们将会看到这一点。\n\
    \n请看图 10-2，它显示了关系变量 `SPJ` 的两个可能值；左边的一个是图 10-1 中关系的重复，右边的一个则是通过从左边的关系中移除两个元组而得到的。\n\
    \n![../images/489629_2_En_10_Chapter/489629_2_En_10_Fig2_HTML.jpg](img/489629_2_En_10_Fig2_HTML.jpg)\n\
    \n图 10-2：关系变量 `SPJ` 的两个可能值\n\n现在回想一下，以下 `JD` 在关系变量 `SPJ` 中成立：\n\n```\n☼ { { SNO\
    \ , PNO } , { PNO , JNO } , { JNO , SNO } }\n```\n\n由此可知：\n\n- 如果关系变量的当前值是图中左侧的关系（“可能值\
    \ 1”），则存在一个 `` `删除异常` ``：我们不能仅仅删除元组 `(S1,P1,J1)`，因为删除该元组后的结果违反了 `JD`，因此不是 `SPJ`\
    \ 的合法值。\n\n- 同样地，如果关系变量的当前值是图中右侧的关系（“可能值 2”），则存在一个 `` `插入异常` ``：我们不能仅仅插入元组 `(S2,P1,J1)`，因为插入该元组后的结果——同样由于相同的原因——也不是\
    \ `SPJ` 的合法值。\n\n在此例中，`JD` 是 `` `元组强制` `` 的。（回想第 9 章，如果一个 `JD` 满足这样的条件：如果某些特定的元组出现，则某些额外的元组也被强制出现，那么该\
    \ `JD` 是元组强制的。）元组强制 `JD` 的概念——或者说其背后的直觉——允许我们定义在此类 `JD` 存在时可能发生的更新异常类型，这些定义比其\
    \ `FD` 对应定义（如果它们存在的话）更为精确。^(¹³⁹) 具体来说：\n\n- **定义（带 `JD` 的删除异常）：** 设 `JD` `J` 在关系变量\
    \ `R` 中成立。当且仅当存在一个关系 `r` 和一个元组 `t`，两者都具有与 `R` 相同的标题，使得：\n    1. `r` 满足 `J`，并且\n\
    \    2. 通过从 `r` 的主体中移除 `t` 而得到的关系 `r'` 违反了 `J`。\n    那么 `R` 相对于 `J` 遭受删除异常。\n\n\
    - **定义（带 `JD` 的插入异常）：** 设 `JD` `J` 在关系变量 `R` 中成立。当且仅当存在一个关系 `r` 和一个元组 `t`，两者都具有与\
    \ `R` 相同的标题，使得：\n    1. `r` 满足 `J`，并且\n    2. 通过向 `r` 的主体附加 `t` 而得到的关系 `r'` 满足\
    \ `R` 的键约束但违反了 `J`。\n    那么 `R` 相对于 `J` 遭受插入异常。\n\n- 引申要点：\n    - 注意 (a) 上述异常是专门针对某个\
    \ `JD` `J` 定义的，以及 (b) 它们当然可能同时出现在同一个关系变量 `R` 中，如 `SPJ` 示例所示。然而，在第 13 章中，我们将看到，如果\
    \ `JD` `J` 在关系变量 `R` 中成立，`R` 也可能遭受插入异常而没有删除异常（两种情况下都是相对于 `J` 而言）。\n    - 尽管比其\
    \ `FD` 对应定义更精确，上述异常仍然可以被视为从另一个角度看待的冗余问题——当然，这里我们指的是由 `JD` 引起的冗余，而非 `FD` 引起的冗余。\n\
    \    - 如果关系变量 `R` 容易受到更新异常的影响，并且这些异常是由某个 `JD`（无论是元组强制与否）引起的，那么用一组 `5NF` 投影替换 `R`\
    \ 将解决问题。也就是说，此类异常不会在 `5NF` 关系变量中发生。\n\n但请务必注意，并非所有更新异常都是由 `FD` 或 `JD` 引起的。事实上，或许可以说，大多数（也许所有？）完整性约束都可能引起插入异常，其意义在于，总是存在某个元组，其插入会导致所讨论的约束被违反。（作为一个简单例子，假设存在一个约束，要求供应商的状态值必须在\
    \ 1 到 100 的范围内，包括 1 和 100。）相比之下，相对较少的约束能引起删除异常。（一个能引起删除异常的约束是：必须始终至少存在两个不同的供应商。另一个是外键约束；例如，在供应商-零件数据库中，如果删除供应商会导致从\
    \ `SP` 到 `S` 的外键约束被违反，则该删除操作无法执行。^(¹⁴⁰)）\n\n## 练习\n\n1.  以下问题在第 1 章中重复出现，但现在你应该更有机会回答它们（假设你之前无法回答的话）：\n\
    \    1.  （*练习 1.6*。）是否每个“全键”关系变量都是 `5NF` 的？\n    2.  （*练习 1.7*。）是否每个二元关系变量都是 `5NF`\
    \ 的？\n    3.  （*练习 1.8*。）如果一个关系变量只有一个键和另一个属性，那么它是否一定是 `5NF` 的？\n    4.  （*练习 1.9*。）如果一个关系变量是\
    \ `BCNF` 但不是 `5NF`，那么它是否必然是全键的？\n    5.  （*练习 1.10*。）你能给出 `5NF` 的精确定义吗？\n    6.\
    \  （*练习 1.11*。）是否 `5NF` 关系变量都是无冗余的？\n2.  尽可能精确地定义一个关系变量受制于连接依赖意味着什么。\n3.  发货关系变量\
    \ `SP` 中有多少个 `JD` 成立？\n4.  说一个 `JD` 由超键蕴含是什么意思？\n5.  什么是平凡 `JD`？平凡 `FD` 是特例吗？\n\
    6.  给出一个 `JD` 的例子，要求 (a) 是元组强制的，(b) 不是元组强制的。\n7.  考虑第 9 章练习 9.2 答案中讨论的（基本关系变量或视图）`RAP`。给出一个在该关系变量上可能发生的插入异常和删除异常的例子。\n\
    8.  以下是某本数据库教科书中的一个经过轻微编辑的引述：\n    - 第五范式涉及的依赖关系相当晦涩。它与可以被划分为子关系...但之后却无法重建的关系有关。这种情况出现的条件没有清晰、直观的含义。我们不知道此类依赖的后果，甚至不知道它们是否有任何实际后果。\n\
    \    - 你有何评论？\n9.  以下引述自我本人的教科书《数据库系统导论》（第 8 版，Addison-Wesley，2004）：\n    - 关系变量\
    \ `R` 是 `5NF` 的，当且仅当 `R` 中成立的每一个非平凡 `JD` 都由 `R` 的键所蕴含，其中：\n        1. `JD` ☼{*A*,\
    \ *B*, ..., *Z*}（相对于 `R`）是平凡的，当且仅当 *A*, *B*, ..., *Z* 中至少有一个是 `R` 的标题。\n     \
    \   2. `JD` ☼{*A*, *B*, ..., *Z*} 由 `R` 的键所蕴含，当且仅当 *A*, *B*, ..., *Z* 中的每一个都是\
    \ `R` 的超键。\n    - 你有何评论？\n"
- fmt: "## Answers\n\n1.  No (see the discussion of relvar `SPJ` in the body of the\
    \ chapter for a counterexample). b. No (in fact, as was shown in the answer to\
    \ Exercise 4.6 in Chapter [4](#489629_2_En_4_Chapter.xhtml), a binary relvar isn’t\
    \ necessarily even in `BCNF`, or even `2NF`). c. No (see Chapter [13](#489629_2_En_13_Chapter.xhtml)).\
    \ d. No (again, see Chapter [13](#489629_2_En_13_Chapter.xhtml)). e. See the body\
    \ of the chapter. f. No (see relvar `CTXD` in Chapter [9](#489629_2_En_9_Chapter.xhtml)\
    \ for a counterexample; see also Chapter [17](#489629_2_En_17_Chapter.xhtml)).\n\
    \n2.  See the body of the chapter.\n\n3.  First, I assume no `JD` has any repeated\
    \ components, for otherwise the number of `JD`s would literally be infinite (though\
    \ at least the number of *logically distinct* `JD`s would of course always be\
    \ finite). Second, relvar `SP` is in `5NF`, and in fact in `6NF`; we haven’t discussed\
    \ `6NF` yet (see Chapter [14](#489629_2_En_14_Chapter.xhtml)), but I can at least\
    \ say for now that if a relvar is in `6NF`, then all of the `JD`s that hold in\
    \ that relvar will be trivial ones. So the question becomes: How many trivial\
    \ `JD`s hold in relvar `SP`? Well, all such `JD`s take the form `☼{*H*,*X1*,...,*Xn*}`,\
    \ where `H` denotes the entire heading and `{X1,...,Xn}` is a set—possibly empty—of\
    \ proper subsets of `H`. Since `H` is of degree three, it has eight subsets, of\
    \ which all but one are proper. So how many distinct sets are there whose elements\
    \ are some subset of a prescribed set of seven elements? Well, there’s one such\
    \ set with no elements at all; there are seven such sets with just one element;\
    \ and, more generally, there are “7 pick *i*” such sets with *i* elements (*i*\
    \ = 0, 1, ..., 7).^([^(141)](#fn141)) So the total number of sets of proper subsets\
    \ of `H` = (7 pick 0) + (7 pick 1) + (7 pick 2) + ... + (7 pick 7) = 1 + 7 + 21\
    \ + 35 + 35 + 21 + 7 + 1 = 128. So there are 128 trivial `JD`s altogether that\
    \ hold in relvar `SP`. *Note:* Of those 128, 64 involve an empty component, which\
    \ might reasonably be ignored—for example, the `JD`s `☼{*H*,{ }}` and `☼{*H*}`\
    \ are clearly equivalent^([^(142)](#fn142))—thereby reducing the total count to\
    \ 64.\n\n4.  See the body of the chapter.\n\n5.  For the definition, see the body\
    \ of the chapter. Since an `FD` isn’t a `JD` but merely implies one, a trivial\
    \ `FD` isn’t a special case. However, the `JD` implied by a trivial `FD` is indeed\
    \ itself trivial in turn. For example, the trivial `FD` `{CITY,STATUS} → {STATUS}`\
    \ holds in the suppliers relvar `S`. Applying Heath’s Theorem, therefore, we see\
    \ the trivial `JD` `☼{*AB*,*AC*}` holds in `S`, where `A` is `{CITY,STATUS}`,\
    \ `B` is `{STATUS}`, and `C` is `{SNO,SNAME}` (the `JD` is trivial because `AC`\
    \ is equal to the entire heading).\n\n6.  For an example of a tuple forcing `JD`,\
    \ see the `SPJ` example in the body of the chapter. As for one that’s not tuple\
    \ forcing, consider, e.g., the `JD` `☼{{SNO,SNAME,CITY},{CITY,STATUS}}` that holds\
    \ in relvar `S` (which fails to be tuple forcing, observe, precisely because it\
    \ has a component that’s a superkey for the pertinent relvar).\n\n7.  Examples\
    \ can be obtained from the examples given in the body of the chapter in connection\
    \ with relvar `SPJ` by systematically replacing supplier numbers by `RNO` values,\
    \ part numbers by `ANO` values, and project numbers by `PNO` values. *No further\
    \ answer provided.*\n\n8.  Well, obviously I don’t know whether you have any comments,\
    \ but I certainly do. However, I don’t think it would be polite to air them here,\
    \ so I won’t.\n\n9.  The given “definition” is not only embarrassingly sloppy,\
    \ it’s wrong! To be more specific:\n    *   \"`R` is in in `5NF` if and only if\
    \ every nontrivial `JD` that holds in `R` is implied by the keys of `R`\" is correct.\n\
    \    However:\n    *   The triviality or otherwise of a given `JD` should be defined\
    \ with respect to a heading, not a relvar.\n    *   For the `JD` `☼{*A*, *B*,\
    \ ..., *Z*}` to hold in `R`, it’s necessary, but obviously not sufficient, that\
    \ the union of `A`, `B`, ..., `Z` be equal to the entire heading of `R`.\n   \
    \ *   But even if the foregoing condition is satisfied, then the fact that each\
    \ of `A`, `B`, ..., `Z` is a superkey for `R` is *not* sufficient for the `JD`\
    \ in question to be implied by the keys of `R`. (On the other hand, it *is* sufficient\
    \ in the simple special case in which `R` has just one key.)\n    See Chapter\
    \ [13](#489629_2_En_13_Chapter.xhtml) for further discussion.\n\nFootnotes [1](#489629_2_En_10_Chapter.xhtml#Fn1_source)\
    \   [2](#489629_2_En_10_Chapter.xhtml#Fn2_source)   [3](#489629_2_En_10_Chapter.xhtml#Fn3_source)\
    \   [4](#489629_2_En_10_Chapter.xhtml#Fn4_source)   [5](#489629_2_En_10_Chapter.xhtml#Fn5_source)\
    \   [6](#489629_2_En_10_Chapter.xhtml#Fn6_source)   [7](#489629_2_En_10_Chapter.xhtml#Fn7_source)\
    \   [8](#489629_2_En_10_Chapter.xhtml#Fn8_source)   [9](#489629_2_En_10_Chapter.xhtml#Fn9_source)\n\
    \n# 11. Implicit Dependencies\n\n> *What are you implying?*\n>\n> —20th century\
    \ catchphrase\n\nWe’ve seen several illustrations in previous chapters of the\
    \ idea that certain dependencies imply others. To be specific, we saw in Chapter\
    \ [7](#489629_2_En_7_Chapter.xhtml) how some `FD`s are implied by other `FD`s,\
    \ and we saw in Chapters [9](#489629_2_En_9_Chapter.xhtml) and [10](#489629_2_En_10_Chapter.xhtml)\
    \ how some `JD`s are implied by `FD`s. It’s time to take a closer look at such\
    \ matters. Note that if we need to tell what normal form some given relvar is\
    \ in, we do need to know all of the dependencies, implicit ones as well as explicit\
    \ ones, that hold in that relvar. In this chapter, therefore, I plan to discuss\
    \ among other things:\n\n*   Irrelevant `JD` components\n*   Combining `JD` components\n\
    *   Irreducible `JD`s\n*   Adding `JD` components\n\nThese various discussions\
    \ will pave the way for an explanation of what’s called *the chase*, to be described\
    \ in the penultimate section of the chapter.\n\n## Irrelevant Components\n\nOnce\
    \ again consider relvar `S`, with its `FD` `{CITY} → {STATUS}`. As we know from\
    \ previous chapters:\n\n*   That relvar can be nonloss decomposed into its projections\
    \ on `{SNO,SNAME,CITY}` and `{CITY,STATUS}`.\n*   It can also clearly be nonloss\
    \ decomposed into those same two projections *together with* the projection on\
    \ (say) `{SNAME,CITY}`.\n*   However, that third projection is irrelevant, in\
    \ the sense that it clearly isn’t needed in the process of reconstructing the\
    \ original relvar.\n\nNow let me restate the foregoing example in terms of `JD`s,\
    \ as follows: Relvar `S` is subject to the `JD`\n\n```\n☼ { { SNO , SNAME , CITY\
    \ } , { CITY , STATUS } }\n```\n\nand also to the `JD`\n\n```\n☼ { { SNO , SNAME\
    \ , CITY } , { CITY , STATUS } , { SNAME , CITY } }\n```\n\nIn this latter `JD`,\
    \ however, the `{SNAME,CITY}` component is irrelevant: It’s a proper subset of\
    \ another component, and for that reason the corresponding projection isn’t needed\
    \ in the process of reconstructing the original relvar.\n\nWith the foregoing\
    \ example by way of motivation, I can now give a precise definition of what it\
    \ means for some component to be irrelevant in some `JD`:\n\n*   **Definition\
    \ (irrelevant component):** Let `☼{X1,..., Xn}` be a `JD`, *J* say; then `Xi`\
    \ is irrelevant in *J* if and only if (a) there exists some `Xj` in *J* such that\
    \ `Xi` is a proper subset of `Xj` (in symbols, `Xi ⊂ Xj`) or (b) there exists\
    \ some `Xj` in *J* (`j < i`) such that `Xj = Xi`.^([^(143)](#fn143))\n\nThe reason\
    \ for my choice of the term *irrelevant* here should be clear: If `Xi` is irrelevant\
    \ in *J*, then every relation that satisfies *J* also satisfies *J*′, where *J*′\
    \ is derived from *J* by dropping `Xi`. What’s more, the converse is true too:\
    \ Every relation that satisfies *J*′ also satisfies *J*. In other words, the `JD`s\
    \ *J* and *J′* are *equivalent*: Each implies the other, and every relation that\
    \ satisfies either necessarily satisfies the other as well. It follows that not\
    \ only can irrelevant components always be dropped, they can always be added too,\
    \ without significant effect."
  raw: "## Answers\n\n1.  No (see the discussion of relvar SPJ in the body of the\
