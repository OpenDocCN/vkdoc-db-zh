    \ FD `X → Y` 是否在 `F` 的闭包 `F^(+)` 中，而无需实际计算 `F^(+)`。\n\n根据（属性集闭包的）定义还可以得出，关系变量\
    \ `R` 的超键正是那些 `R` 属性集的子集 `SK`，使得 `SK` 在相关 FD 集下的闭包 `SK^(+)` 等于 `R` 的整个属性集。\n\n\
    ## 练习\n\n*   **达文定理：** 如果 `X → Y` 且 `Z → W`，则 `XV → YW`，其中 `V = Z - Y`。\n    证明这个定理。你使用了前两个练习中的哪些规则？那些练习中的哪些规则可以作为该定理的特例推导出来？\n\
    1.  说阿姆斯特朗规则是可靠（sound）的意味着什么？完备（complete）的呢？\n2.  一组 FD 的闭包是什么？设 `F` 是仅包含 FD `{SNO,PNO}\
    \ → {QTY}` 的 FD 集，该 FD 在关系变量 `SP` 中成立。展示该集合 `F` 的闭包。\n3.  根据 FD 被满足的定义，展示自反性、增广性和传递性规则是合理的。\n\
    4.  （*尝试在不回看本章内容的情况下完成此练习。*）证明前一个练习中的三个规则蕴含了自确定、合并、复合和分解规则。\n5.  以下定理由休·达文提出：^(¹⁰²)\n\
    1.  为以下 FD 集找到一个不可约覆盖：\n1.  考虑以下 FD 集：\n```\nAB  → C      BE → C\nC   → A    \
    \  CE → FA\nBC  → D      CF → BD\nACD → B      D  → EF\n```\n```\nA   → B\nBC\
    \  → DE\nAEF → G\n```\nFD `ACF → DG` 是否由此集蕴含？\n1.  如果且仅如果每个集合都是另一个的覆盖，则两个 FD 集是*等价*的。以下集合是否等价？\n\
    ```\n{ A → B , AB → C , D → AC , D → E }\n{ A → BC , D → AE }\n```\n请注意，任何给定的\
    \ FD 集 `F` 当然等价于任何作为其不可约覆盖的集合，并且进一步说，两个集合等价当且仅当它们具有相同的不可约覆盖。\n1.  关系变量 `R` 具有属性\
    \ `A`, `B`, `C`, `D`, `E`, `F`, `G`, `H`, `I`, 和 `J`，并受以下 FD 约束：\n```\nABD → E\
    \        C  → J\nAB  → G        CJ → I\nB   → F        G  → H\n```\n这个集合是可约的吗？`R`\
    \ 有哪些键？\n"
- fmt: "## Answers\n\n1.  See the body of the chapter.\n\n2.  The closure `F^(+)`\
    \ of a set `F` of FDs is the set of all FDs implied by those in `F`. The closure\
    \ of the set of FDs containing just the FD `{SNO,PNO} → {QTY}` is given in the\
    \ answer to Exercise 4.1 in Chapter [4](#489629_2_En_4_Chapter.xhtml).\n\n3. \
    \ The FD `X → Y` is satisfied if and only if whenever two tuples agree on `X`,\
    \ they also agree on `Y` (I’m deliberately giving this definition in a pretty\
    \ loose form). So:\n    *   If two tuples agree on `X`, they certainly agree on\
    \ every subset `Y` of `X`, so the reflexivity rule is reasonable.\n    *   If\
    \ two tuples agree on `XZ`, they certainly agree on `Z`. They also certainly agree\
    \ on `X` and hence, if `X → Y` is satisfied, on `Y` as well; hence they agree\
    \ on `YZ`, and so the augmentation rule is reasonable.\n    *   If two tuples\
    \ agree on `X` and `X → Y` is satisfied, they agree on `Y`. If they agree on `Y`\
    \ and `Y → Z` is satisfied, they agree on `Z`. So the transitivity rule is reasonable.\n\
    \n4.  See the body of the chapter.\n\n5.  Let `U` denote the intersection of `Z`\
    \ and `Y` and let `V` denote the difference `Z – Y` between `Z` and `Y` (in that\
    \ order). Then:\n    1.  `X → Y`   (given)\n    2.  `Z → W`   (given)\n    3.\
    \  `X → U`   (1, decomposition)\n    4.  `XV → UV`   (3, augmentation)\n    5.\
    \  `XV → Z`   (simplifying 4)\n    6.  `XV → W`   (5, 2, transitivity)\n    7.\
    \  `XV → YW`   (1, 6, composition; this completes the proof)\n\n    The rules\
    \ used in this proof are indicated in the comments. The following rules are all\
    \ special cases of Darwen’s Theorem: the union, transitivity, and augmentation\
    \ rules. So too is the following useful rule:\n\n    If `X → Y` and `XY → Z`,\
    \ then `X → Z`.\n\n    *Note:* This latter is a special case of what’s sometimes\
    \ called the pseudotransitivity rule, which in its general form looks like this:\n\
    \n    *Pseudotransitivity:* If `X → Y` and `YW → Z`, then `XW → Z`.\n\n6.  The\
    \ first step is to rewrite the given set of FDs such that every FD has a singleton\
    \ right side:\n    1.  `AB → C`\n    2.  `C → A`\n    3.  `BC → D`\n    4.  `ACD\
    \ → B`\n    5.  `BE → C`\n    6.  `CE → A`\n    7.  `CE → F`\n    8.  `CF → B`\n\
    \    9.  `CF → D`\n    10. `D → E`\n    11. `D → F`\n\n    Now:\n    *   2 implies\
    \ 6, so we can drop 6.\n    *   8 implies `CF → BC` by augmentation, which with\
    \ 3 implies `CF → D` by transitivity, so we can drop 9.\n    *   8 implies `ACF\
    \ → AB` by augmentation, and 11 implies `ACD → ACF` by augmentation, and so `ACD\
    \ → AB` by transitivity, and so `ACD → B` by decomposition, so we can drop 4.\n\
    \n    No further reductions are possible, and so we’re left with the following\
    \ irreducible cover:\n    ```\n    AB  → C\n    C   → A\n    BC  → D\n    BE \
    \ → C\n    CE  → F\n    CF  → B\n    D   → E\n    D   → F\n    ```\n\n    Alternatively:\n\
    \    *   2 implies 6, so we can drop 6 (as before).\n    *   2 implies `CD → AD`\
    \ by augmentation, which implies `CD → ACD` by augmentation again, which with\
    \ 4 implies `CD → B` by transitivity, so we can replace 4 by `CD → B`.\n    *\
    \   2 and 9 imply `CF → AD` by composition, which implies `CF → ADC` by augmentation,\
    \ which with (the original) 4 implies `CF → B` by transitivity, so we can drop\
    \ 8.\n\n    No further reductions are possible, and so we’re left with the following\
    \ irreducible cover:\n    ```\n    AB  → C\n    C   → A\n    BC  → D\n    CD \
    \ → B\n    BE  → C\n    CE  → F\n    CF  → D\n    D   → E\n    D   → F\n    ```\n\
    \n    Observe, therefore, that there are (at least) two distinct irreducible covers\
    \ for the original set of FDs. Note too that those two covers have different cardinalities.\n\
    \n7.  Yes, it is. The easiest way to prove this result is to compute the closure\
    \ `ACF^(+)` of the set `ACF`, which turns out to be the entire set `ABCDEFG`.\
    \ Alternatively, we can apply Armstrong’s axioms and the other rules discussed\
    \ in the body of the chapter, as follows:\n    1.  `A → B`   (given)\n    2. \
    \ `ACF → BCF`   (1, augmentation)\n    3.  `BC → E`   (given)\n    4.  `BCF →\
    \ EF`   (3, augmentation)\n    5.  `ACF → EF`   (2, 4, transitivity)\n    6. \
    \ `ACF → AEF`   (5, augmentation)\n    7.  `AEF → G`   (given)\n    8.  `ACF →\
    \ G`   (6, 7, transitivity)\n    9.  `BC → DE`   (given)\n    10. `BC → D`   (9,\
    \ decomposition)\n    11. `BCF → DF`   (10, augmentation)\n    12. `BCF → D` \
    \  (11, decomposition)\n    13. `ACF → D`   (2, 12, transitivity)\n    14. `ACF\
    \ → DG`   (7, 13, composition)\n\n8.  Let’s number the FDs of the first set as\
    \ follows:\n    1.  `A → B`\n    2.  `AB → C`\n    3.  `D → AC`\n    4.  `D →\
    \ E`\n\n    Now, 3 can be replaced by:\n    ```\n    3.   D → A  and   D → C\n\
    \    ```\n\n    Next, 1 and 2 together imply (see the “useful rule” mentioned\
    \ near the end of the answer to Exercise 7.5) that 2 can be replaced by:\n   \
    \ ```\n    2.   A → C\n    ```\n\n    But now we have `D → A` and `A → C`, so\
    \ `D → C` is implied by transitivity and can be dropped, leaving:\n    ```\n \
    \   3.   D → A\n    ```\n\n    The first set of FDs is thus equivalent to the\
    \ following irreducible cover:\n    ```\n    A → B\n    A → C\n    D → A\n   \
    \ D → E\n    ```\n\n    The second given set of FDs\n    ```\n    A → BC\n   \
    \ D → AE\n    ```\n    is clearly also equivalent to this same irreducible cover.\
    \ The two given sets are thus equivalent.\n\n9.  The set is clearly reducible,\
    \ since `C → J` and `CJ → I` together imply `C → I`. As for keys: An obvious superkey\
    \ is `ABCDGJ` (the combination of all attributes mentioned on the left sides of\
    \ the given FDs). We can drop `J` from this set because `C → J`, and we can drop\
    \ `G` because `AB → G`. Since none of `A`, `B`, `C`, `D` appears on the right\
    \ side of any of the given FDs, it follows that `ABCD` is a key.\n\nFootnotes\
    \ [1](#489629_2_En_7_Chapter.xhtml#Fn1_source)   [2](#489629_2_En_7_Chapter.xhtml#Fn2_source)\
    \   [3](#489629_2_En_7_Chapter.xhtml#Fn3_source)   [4](#489629_2_En_7_Chapter.xhtml#Fn4_source)\
    \   [5](#489629_2_En_7_Chapter.xhtml#Fn5_source)\n\n# 8. Denormalization\n\n>\
    \ *What’s normal, anyway?*\n> —Anon.: *Where Bugs Go*\n\nI want to say a few words\
    \ about denormalization. Now, I haven’t considered, so far in this book, any level\
    \ of normalization higher than BCNF (at least, not in detail). But denormalization,\
    \ if it means anything at all, can’t apply just to BCNF specifically; I mean,\
    \ it can’t refer just to dropping back to some level of normalization that’s lower\
    \ than BCNF specifically. Rather, it has to mean dropping back from *any* given\
    \ level of normalization to some lower one.\n\nThat said, however, I need to say\
    \ too that relvars that are in BCNF and not in some higher normal form are comparatively\
    \ unusual (though not completely unknown, I hasten to add). In practice, therefore,\
    \ denormalization does usually refer quite specifically to dropping back to some\
    \ level of normalization below BCNF; hence the inclusion of this chapter in this\
    \ part of the book."
