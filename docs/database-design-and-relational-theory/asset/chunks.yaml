    \ `R` 的超键和键，那么函数依赖 `SK → H` 必然在 `R` 中成立。（等价地，函数依赖 `SK → Y` 对 `H` 的所有子集 `Y` 在 `R`\
    \ 中都成立。）原因是，如果 `R` 的两个元组在 `SK` 上的值相同，那么它们必然是同一个元组，显然它们在 `Y` 上的值也必须相同。当然，所有这些论述也适用于\
    \ `SK` 不仅仅是超键而且是键的重要特殊情况；正如我之前（当然，非常不严谨地）所说，键总有箭头指出。事实上，我们现在可以给出一个更普遍的陈述：超键总有箭头指出。\n\
    \n## 第二范式\n\n在能够真正定义 2NF、3NF 和 BCNF 之前，我还需要引入一个概念，即 `FD` 不可约性（注意，这是另一种不可约性）：\n\
    \n*   **定义（不可约 FD）：** 函数依赖 `X → Y` 关于关系变量 `R` 是不可约的（或者如果 `R` 明确，则简称为不可约的），当且仅当它在\
    \ `R` 中成立，并且对于 `X` 的任何真子集 `X'`，`X' → Y` 在 `R` 中都不成立。\n\n例如，函数依赖 `{SNO,PNO} → {QTY}`\
    \ 关于关系变量 `SP` 是不可约的。*注意：* 这种不可约性有时被更明确地称为*左*不可约性（因为我们实际上讨论的是 `FD` 的左侧），但为了简洁，我在此省略了“左”这个词。\n\
    \n现在——你可能终于可以原谅地认为——我可以定义 2NF 了：\n\n*   **定义（第二范式）：** 关系变量 `R` 处于第二范式，当且仅当，对于\
    \ `R` 的每一个键 `K` 和每一个非主属性 `A`，函数依赖 `K → {A}`（必然在 `R` 中成立）是不可约的。\n\n*注意：* 以下（“首选”）定义在逻辑上等同于刚才给出的定义（参见本章末尾的练习\
    \ 4.4），但有时可能更有用：\n\n*   **定义（第二范式，首选）：** 关系变量 `R` 处于第二范式，当且仅当，对于在 `R` 中成立的每一个非平凡函数依赖\
    \ `X → Y`，以下至少有一条为真：\n    1.  `X` 是一个超键。\n    2.  `Y` 是一个子键。\n    3.  `X` 不是一个子键。\n\
    \n要点说明：\n\n*   首先，请理解将 2NF 视为设计过程的最终目标是非常不寻常的。事实上，2NF 和 3NF 主要具有历史意义；它们充其量被视为通向\
    \ BCNF 的垫脚石，而 BCNF 具有更重要的实践（以及理论）意义。\n*   文献中对 2NF 的定义通常采取“`R` 处于 2NF 当且仅当它处于\
    \ 1NF 并且……”的形式。然而，这类定义通常基于对 1NF 的错误理解。正如我们所见，*所有*关系变量都处于 1NF，因此“它处于 1NF 并且”这些词没有任何附加意义。\n\
    \n让我们看一个例子。实际上，对于范式来说，看一个反例通常比看一个例子更有启发性。因此，考虑一个修改版的关系变量 `SP`——我们称之为 `SCP`——它有一个额外的属性\
    \ `CITY`，表示对应供应商所在的城市。以下是一些样本元组：\n\n![../images/489629_2_En_4_Chapter/489629_2_En_4_Figa_HTML.jpg](img/489629_2_En_4_Figa_HTML.jpg)\n\
    \n这个关系变量显然存在冗余：供应商 `S1` 的每个元组都告诉我们 `S1` 在伦敦，供应商 `S2` 的每个元组都告诉我们 `S2` 在巴黎，等等。并且（诉诸上述\
    \ 2NF 的第一个定义），该关系变量不处于第二范式——其唯一的键是 `{SNO,PNO}`，因此函数依赖 `{SNO,PNO} → {CITY}` 必然成立，但这个函数依赖不是不可约的；具体来说，我们可以从决定因素中删除\
    \ `PNO`，剩下的 `{SNO} → {CITY}` 仍然是该关系变量中成立的函数依赖。等价地，我们可以说函数依赖 `{SNO} → {CITY}` 成立且是非平凡的；此外，(a)\
    \ `{SNO}` 不是一个超键，(b) `{CITY}` 不是一个子键，并且 (c) `{SNO}` *是*一个子键，因此再次（现在诉诸 2NF 的第二个“首选”定义）该关系变量不处于第二范式。\n\
    \n## 第三范式\n\n这次我将直接从我的首选定义开始：\n\n*   **定义（第三范式，首选）：** 关系变量 `R` 处于第三范式，当且仅当，对于在\
    \ `R` 中成立的每一个非平凡函数依赖 `X → Y`，以下至少有一条为真：\n    1.  `X` 是一个超键。\n    2.  `Y` 是一个子键。\n\
    \n要点说明：\n\n*   重复我在前一节说过的话（也许与普遍看法相反），3NF 主要具有历史意义——它充其量应被视为通向 BCNF 的垫脚石。*注意：*\
    \ 我这里说“与普遍看法相反”是因为，许多常见的“3NF”定义（至少在通俗文献中）实际上是 BCNF 的定义——而 BCNF，正如我已经指出的，*是*重要的。*读者须知。*\n\
    *   文献中对 3NF 的定义通常采取“`R` 处于 3NF 当且仅当它处于 2NF 并且……”的形式。我更喜欢一个不提及 2NF 的定义。然而请注意，我的\
    \ 3NF 定义实际上可以通过从我的 2NF 首选定义中删除条件 (c)（“`X` 不是一个子键”）而推导出来。因此，3NF 蕴含 2NF——也就是说，如果一个关系变量处于\
    \ 3NF，那么它必然也处于 2NF。\n\n我们已经看到一个处于 2NF 但不处于 3NF 的关系变量的例子：即供应商关系变量 `S`（参见第 3 章中的图\
    \ 3-1）。详细说明：非平凡函数依赖 `{CITY} → {STATUS}` 在该关系变量中成立，正如我们所知；此外，`{CITY}` 不是超键且 `{STATUS}`\
    \ 不是子键，因此该关系变量不处于 3NF。（然而，它确实处于 2NF。*练习：* 验证这一说法！）\n"
- fmt: "# Boyce/Codd Normal Form\n\nAs I said earlier, Boyce/Codd normal form (BCNF)\
    \ is the normal form with respect to FDs—but now I can define it precisely:\n\n\
    *   **Definition (Boyce/Codd normal form):** Relvar `R` is in Boyce/Codd normal\
    \ form (BCNF) if and only if, for every nontrivial FD `X` → `Y` that holds in\
    \ `R`, the following is true:\n    1.  `X` is a superkey.\n\nPoints arising:\n\
    \n*   It follows from the definition that the only FDs that hold in a BCNF relvar\
    \ are either trivial ones (we can’t get rid of those, obviously) or arrows out\
    \ of superkeys (we can’t get rid of those, either). Or as some people like to\
    \ say: *Every fact is a fact about the key, the whole key, and nothing but the\
    \ key*—though I must immediately add that this informal characterization, intuitively\
    \ attractive though it is, isn’t really accurate, because it assumes among other\
    \ things that there’s just one key.\n*   The definition makes no reference to\
    \ 2NF or 3NF. Note, however, that the definition can be derived from the 3NF definition\
    \ by dropping condition (b) (“`Y` is a subkey”). It follows that BCNF implies\
    \ 3NF—that is, if a relvar is in BCNF, then it’s certainly in 3NF.\n\nBy way of\
    \ an example of a relvar that’s in 3NF but not BCNF, consider a revised version\
    \ of the shipments relvar—let’s call it `SNP`—that has an additional attribute\
    \ `SNAME`, representing the name of the pertinent supplier. Suppose also that\
    \ supplier names are necessarily unique (i.e., no two suppliers ever have the\
    \ same name at the same time). Here are some sample tuples:\n\n![../images/489629_2_En_4_Chapter/489629_2_En_4_Figb_HTML.jpg](images/489629_2_En_4_Chapter/489629_2_En_4_Figb_HTML.jpg)\n\
    \nOnce again we observe some redundancy: Every tuple for supplier `S1` tells us\
    \ `S1` is named `Smith`, every tuple for supplier `S2` tells us `S2` is named\
    \ `Jones`, and so on; likewise, every tuple for `Smith` tells us `Smith`’s supplier\
    \ number is `S1`, every tuple for `Jones` tells us `Jones`’s supplier number is\
    \ `S2`, and so on. And the relvar isn’t in BCNF. First of all, it has two keys,\
    \ `{SNO,PNO}` and `{SNAME,PNO}`.^([^(62)](#fn62)) Second, every subset of the\
    \ heading—the subset `{QTY}` in particular—is (of course) functionally dependent\
    \ on both of those keys. Third, however, the FDs `{SNO}` → `{SNAME}` and `{SNAME}`\
    \ → `{SNO}` also hold; these FDs are certainly not trivial, nor are they arrows\
    \ out of superkeys, and so the relvar isn’t in BCNF (though it is in 3NF).\n\n\
    Finally, as I’m sure you know, the normalization discipline says: If relvar `R`\
    \ isn’t in BCNF, then decompose it into projections that are. In the case of relvar\
    \ `SNP`, either of the following decompositions will meet this objective:\n\n\
    *   Projecting on `{SNO,SNAME}` and `{SNO,PNO,QTY}`\n*   Projecting on `{SNO,SNAME}`\
    \ and `{SNAME,PNO,QTY}`\n\nI can now explain why BCNF is the odd one out, as it\
    \ were, in not simply being called “nth normal form” for some *n*. To quote from\
    \ the paper in which Codd first described this new normal form:^([^(63)](#fn63))\n\
    \n*   More recently, Boyce and Codd developed the following definition: A [relvar]\
    \ `R` is in third normal form if it is in first normal form and, for every attribute\
    \ collection `C` of `R`, if any attribute not in `C` is functionally dependent\
    \ on `C`, then all attributes in `R` are functionally dependent on `C` [*in other\
    \ words, `C` is a superkey*].\n\nSo Codd was giving here what he regarded as a\
    \ “new and improved” definition of *third* normal form. But the trouble was, the\
    \ new definition was (and is) strictly stronger than the old one; that is, any\
    \ relvar that’s in 3NF by the new definition is certainly in 3NF by the old one,\
    \ but the converse isn’t true—a relvar can be in 3NF by the old definition and\
    \ not in 3NF by the new one (relvar `SNP`, discussed above, is a case in point).\
    \ So what that “new and improved” definition really defined was a new and stronger\
    \ normal form, which therefore needed a distinct name of its own. However, by\
    \ the time this point was adequately recognized, Fagin had already defined what\
    \ he called fourth normal form, so *that* name wasn’t available.^([^(64)](#fn64))\
    \ Hence the anomalous name *Boyce/Codd* *normal form*.\n\n## Exercises\n\n1. \
    \ How many FDs hold in relvar `SP`? Which ones are trivial? Which are irreducible?\n\
    2.  Is it true that the FD concept relies on the notion of tuple equality?\n3.\
    \  Give examples from your own work environment of (a) a relvar not in 2NF; (b)\
    \ a relvar in 3NF but not 2NF; (c) a relvar in BCNF but not 3NF.\n4.  Prove that\
    \ the two definitions of 2NF given in the body of the chapter are logically equivalent.\n\
    5.  Is it true that if a relvar isn’t in 2NF, then it must have a composite key?\n\
    6.  Is it true that every binary relvar is in BCNF?\n7.  (*Same as Exercise 1.4.*)\
    \ Is it true that every “all key” relvar is in BCNF?\n8.  Write `Tutorial D` CONSTRAINT\
    \ statements to express the fact that the pair of FDs `{SNO}` → `{SNAME}` and\
    \ `{SNAME}` → `{SNO}` hold in relvar `SNP` (see the section “Boyce/Codd Normal\
    \ Form”).\n    *Note:* This is the first exercise in any chapter that asks you\
    \ to give an answer in `Tutorial D`. Of course, I realize you might not be completely\
    \ conversant with that language; in all such exercises, therefore—for example,\
    \ in Exercises 4.14 and 4.15 below—please just do the best you can. I do think\
    \ it’s worth your while at least to attempt the exercises in question.\n9.  Let\
    \ `R` be a relvar of degree *n*. What’s the maximum number of FDs that can possibly\
    \ hold in `R` (trivial ones as well as nontrivial)? What’s the maximum number\
    \ of keys it can have?\n10. Given that `X` and `Y` in the FD `X` → `Y` are both\
    \ sets of attributes, what happens if either of those sets is empty?\n11. Can\
    \ you think of a situation in which it really would be reasonable to have a base\
    \ relvar with an RVA?\n12. There’s been a lot of discussion in the industry in\
    \ recent years of the possibility of *XML databases*. But XML documents are inherently\
    \ hierarchic in nature; so do you think the criticisms of hierarchies in the body\
    \ of the chapter apply to XML databases? (Well, yes, they do, as I indicated in\
    \ footnote 4 earlier in the chapter. So what do you conclude?)\n13. In Chapter\
    \ [1](#489629_2_En_1_Chapter.xhtml) I said I’d be indicating primary key attributes,\
    \ in tabular pictures of relations, by double underlining. At that point, however,\
    \ I hadn’t properly discussed the difference between relations and relvars, and\
    \ now we know that keys in general apply to relvars, not relations. Yet we’ve\
    \ seen several tabular pictures since then that represent relations as such (I\
    \ mean, relations that aren’t just a sample value for some relvar)—see, e.g.,\
    \ Figure [4-1](#489629_2_En_4_Chapter.xhtml#Fig1) for three examples^([^(65)](#fn65))—and\
    \ I’ve certainly been using the double underlining convention in those pictures.\
    \ So what can we say about that convention now?\n14. Give `Tutorial D` formulations\
    \ of the following queries against the relation shown in Figure [4-1](#489629_2_En_4_Chapter.xhtml#Fig1):\n\
    \    1.  Get part numbers for parts supplied by supplier `S2`.\n    ```\n    (\
    \ SNO S2 ) { PNO }\n    ```\n    2.  Get supplier numbers for suppliers who supply\
    \ part `P2`.\n    ```\n    ( PNO P2 ) { SNO }\n    ```\n15. Suppose we need to\
    \ update the database to show that supplier `S2` supplies part `P5` in a quantity\
    \ of 500. Give `Tutorial D` formulations of the required update against (a) the\
    \ non RVA design of Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1), (b) the RVA\
    \ design of Figure [4-1](#489629_2_En_4_Chapter.xhtml#Fig1).\n16. Given the RVA\
    \ design illustrated in Figure [4-1](#489629_2_En_4_Chapter.xhtml#Fig1), state\
    \ as precisely as you can the corresponding relvar predicate."
