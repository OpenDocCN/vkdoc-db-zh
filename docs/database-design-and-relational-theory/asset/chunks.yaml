  trans: "\n# 练习题\n\n1.  `6NF` 关系变量有时被称为不可约的，我在本章正文中也提到过，这是设计理论相关的众多不可约性中的又一种。你能识别出多少种不同的不可约性？\n\
    \n2.  假设关系变量 `P` 已按照本章正文的讨论，被其 `6NF` 投影 `PN`、`PL`、`PW` 和 `PC` 所取代。你能想到这个设计有什么改进之处吗？\n\
    \n3.  考虑一个表示婚姻的关系变量 `R`，其属性为 `A`、`B` 和 `C`，谓词是*人物 A 于日期 C 与人物 B 结婚*。假设没有一夫多妻制；同时假设任意两人之间结婚不会超过一次。`R`\
    \ 有哪些键？连接依赖 `{AB, BC, CA}` 是否成立？`R` 处于最高级范式是什么？\n\n4.  为以下场景设计一个数据库。需要表示的实体是某支球队的足球比赛赛程。对于已经进行过的比赛，我们希望记录“进球数”和“失球数”；然而，对于尚未进行的比赛，这两个属性显然没有意义。你的关系变量处于哪些范式？\n\
    \n5.  在本章正文中，我非正式地展示了如何将一个关系变量归约为 `6NF` 投影，这对应于将一个合取谓词归约为简单谓词。是否存在所谓的析取谓词？一个关系变量如何对应这样的谓词？将这样的谓词归约为简单谓词会涉及什么？\n\
    \n6.  给定图 14-4 中关系变量 `SCT_DURING` 的示例值，展示计算以下每个表达式的结果：\n    1.  `USING ( DURING\
    \ ) : SCT_DURING { SNO , DURING }`\n    2.  `USING ( DURING ) : SCT_DURING { CITY\
    \ , DURING }`\n    3.  `USING ( DURING ) : SCT_DURING { STATUS , DURING }`\n \
    \   4.  `USING ( DURING ) : JOIN { SCT_DURING { SNO , CITY , DURING } , SCT_DURING\
    \ { SNO , STATUS , DURING } }`\n\n    *注：* 最后一个案例的答案当然是图 14-5 所示的关系——但请不要只听我说，请自行确认该结果（除非你已经这么做过了）。\n\
    \n# 答案\n\n1.  键和 `FD` 的不可约性，以及 `FD` 不可约性与 `2NF` 的相关性，都在第 4 章讨论过；`FD` 不可约性在第 5\
    \ 章有进一步讨论。不可约覆盖在第 6 章讨论。不可约 `JD` 在第 11 章讨论。不可约（即 `6NF`）关系变量及相关的“不可约事实”概念在本章讨论。\n\
    \n2.  我想到的主要一点是，或许可以有一个某种形式的“主”关系变量，其主要目的只是记录当前数据库中所有零件的零件号。如果我们称该关系变量为 `P`，那么在那个关系变量\
    \ `P` 与关系变量 `PN`、`PL`、`PW` 和 `PC` 各自在 `{PNO}` 上的投影之间，将会存在 `EQD`（替代任意地选择 `PN` 在\
    \ `{PNO}` 上的投影与 `PL`、`PW` 和 `PC` 各自在 `{PNO}` 上的投影之间的 `EQD`；事实上，拥有这个主关系变量的一个好处恰恰在于它避免了那种轻微的任意性）。\n\
    \n    此外，假设每个零件总是有一个已知的名称和重量，但不一定有已知的颜色或城市。那么我们可以合并关系变量 `P`、`PN` 和 `PW`，将这个组合——我仍然称之为\
    \ `P`——作为主关系变量，并用从 `PL` 和 `PC` 到那个主关系变量 `P` 的外键约束取代之前需要的 `EQD`。（一个没有已知颜色的零件将在\
    \ `P` 中表示，但不在 `PL` 中表示；同样，一个没有已知城市的零件将在 `P` 中表示，但不在 `PC` 中表示。）\n\n    顺便说一句，支持包含那个主关系变量\
    \ `P` 的另一个论据与零件供应关系变量 `SP` 有关——有了那个主关系变量，我们可以保留从 `SP` 到 `P` 的常规外键约束；没有它，事情会变得相当混乱（对吧？）。\n\
    \n3.  每一对属性都是一个键。指定的 `JD` 不成立，因为下面的值肯定是一个关系变量的合法值：\n\n    ```\n    a1  b1  c2\n\
    \    b1  a1  c2\n    a2  b1  c1\n    b1  a2  c1\n    a1  b2  c1\n    b2  a1  c1\n\
    \    ```\n\n    （`a1` ≠ `a2`, `b1` ≠ `b2`, `c1` ≠ `c2`）；也就是说，元组 (`a1`,`b1`,`c2`)、(`a2`,`b1`,`c1`)\
    \ 和 (`a1`,`b2`,`c1`) 肯定不会强制元组 (`a1`,`b1`,`c1`) 出现（！）。该关系变量处于 `6NF`。但请注意，它受制于某种*对称*约束；具体来说，元组\
    \ (`a`,`b`,`c`) 出现当且仅当元组 (`b`,`a`,`c`) 出现（上图所示示例值就说明了这一点）。^(¹⁹⁷) 因此，该关系变量也受制于某些插入和删除异常。（特别是，因此，它不在\
    \ `DK/NF` 中。见第 15 章。）\n\n4.  这里要做的就是区分已经进行过的比赛和尚未进行的比赛：\n\n    ```\n    PAST_MATCHES\
    \ { DATE , OPPONENT , GOALS_FOR , GOALS_AGAINST , ... }\n    KEY { DATE }\n  \
    \  FUTURE_MATCHES { DATE , OPPONENT , ... }\n    KEY { DATE }\n    ```\n\n   \
    \ 这些关系变量都处于 `5NF`。特别是 `PAST_MATCHES` 可能不应该被 `6NF` 投影所取代。*注：* 或者，我们可以考虑用一个关系变量\
    \ `FIXTURES` 取代 `FUTURE_MATCHES`，给出所有过去和未来比赛的 `DATE` 和 `OPPONENT`。那样会适用什么约束？话说回来，上面展示的设计适用什么约束？\n\
    \n5.  析取谓词是两个或多个其他谓词的逻辑 `OR`。如果某个关系变量 `R` 具有析取关系变量谓词，那么被 `OR` 在一起的各个谓词必须具有相同的参数（因为满足它们的元组都必须是相同类型）。将这样的关系变量归约为具有简单谓词的关系变量，可能涉及通过限制（restriction）而不是投影进行分解（并通过并集而不是连接进行重组）。更多讨论见第\
    \ 15 和 16 章。\n\n6.  1.  ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figb_HTML.jpg](img/489629_2_En_14_Figb_HTML.jpg)\n\
    \    2.  ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figc_HTML.jpg](img/489629_2_En_14_Figc_HTML.jpg)\n\
    \    3.  ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figd_HTML.jpg](img/489629_2_En_14_Figd_HTML.jpg)\n\
    \    4.  首先是两个 `U_ 投影`（从图 14-6 重复而来）：\n        ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fige_HTML.jpg](img/489629_2_En_14_Fige_HTML.jpg)\n\
    \        对应的解包形式如下：\n        ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figf_HTML.jpg](img/489629_2_En_14_Figf_HTML.jpg)\n\
    \        以下是这两个解包关系的连接：\n        ![../images/489629_2_En_14_Chapter/489629_2_En_14_Figg_HTML.jpg](img/489629_2_En_14_Figg_HTML.jpg)\n\
    \        在 `DURING` 上打包这个结果，就得到了图 14-5 所示的关系。\n\n脚注 1   2   3   4   5   6   7\
