  trans: '## 违反第一范式


    至此，你可能会疑惑：如果根据定义所有 `关系变量` 都在 `1NF` 中，那么说某物 *不在* `1NF` 中又意味着什么？或许令人惊讶的是，这个问题确实有一个合理的答案。关键在于，当今的商业
    `DBMS` 根本没有完全支持 `关系变量`（或 `关系`）——相反，它们支持一种结构，为方便起见，我称之为 `表`，尽管我使用这个术语并不一定意味着仅限于
    `SQL` 系统中的表。^(⁵⁴) 而与 `关系变量` 相对的表，确实可能不在 `1NF` 中。详细说明如下：


    **定义（规范化表）：** 一个表是第一范式（`1NF`）——等价地说，该表是规范化的——当且仅当它是某个 `关系变量` 的直接且忠实的表示。


    因此，问题自然是：一个表如何才算是一个 `关系变量` 的直接且忠实的表示？这个问题的答案涉及五个基本要求，所有这些都是以下事实的直接结果：`关系变量` 在任何给定时间的值（当然）始终是一个特定的
    `关系`：


    1.  表中从不包含任何重复的行。


    2.  列没有从左到右的顺序。


    3.  行没有从上到下的顺序。


    4.  所有列都是常规列。


    5.  每行每列的交叉点总是恰好包含一个适用类型的值，除此之外别无其他。


    要求 1-3 是不言自明的，^(⁵⁵) 但另外两点可能需要稍多解释。首先，考虑要求 4（“所有列都是常规列”）。为了满足这个要求，所讨论的表必须满足以下两点：


    1.  每一列都有一个正确的名称（即，用 `SQL` 的话说，一个可以在 `CREATE TABLE` 语句中指定为列名的名称），并且该名称在所讨论表的适用列名中是唯一的。


    2.  不允许任何行包含超出上述列值的额外内容。因此，不存在只能通过特殊操作符而非常规列引用（“常规列引用”基本上就是列名）访问的“隐藏”列，也没有任何列会导致对行调用常规操作符时产生不规则的效果。特别地，因此，除了常规的关系键值之外，没有其他
    *标识符*（没有隐藏的“行 ID”或“对象 ID”，不幸的是，这在当今一些 `SQL` 产品中存在），也没有像某些文献中“时态数据库”提案中存在的隐藏 *时间戳*。


    至于要求 5：首先请注意，该要求意味着禁止 `null`（因为 `null`，无论它们可能是什么，肯定不是值）。然而，更一般地说，该要求旨在解决 *数据值原子性*
    的问题。这是关系模型中“人人皆知”的关于 `关系` 的一点——即其中的属性值应该是原子的（对吗？）。那么，这里的 *原子* 到底是什么意思？嗯，Codd 在他著名的
    1970 年论文中，^(⁵⁶) 仅表示其意为“不可分解”。在后来的著作中，他继续说明 *不可分解* 进而意味着“不能被 `DBMS` 分解”，我认为这意味着用户无法请求
    `DBMS` 代表其显式或隐式地执行此类分解。好吧，那么让我们考虑几个例子：


    *   *字符串：* 字符串在上述意义上是不可分解的吗？显然不是——例如，想想 `SQL` 的 `SUBSTRING`、`LIKE` 和连接操作符，它们显然都依赖于字符串通常具有某种内部结构并且因此可以分解成更小片段这一事实。然而，肯定没有人会争辩说
    `关系` 中不应该允许存在字符串。


    *   *定点数：* 可以分解为整数部分和小数部分。


    *   *整数：* 可以分解为其质因数。（当然，我意识到这通常不是我们在这种语境下考虑的那种可分解性；我只是想说明可分解性概念本身有多种解释。）


    *   *日期和时间：* 可以分别分解为年/月/日和时/分/秒成分。


    *   *关系表达式：* 考虑，例如，目录中的视图定义。这些表达式当然是“可分解的”——事实上是可被 `DBMS` 分解的——因为如果它们不可分解，一开始将它们保存在目录中就毫无意义。


    所有这些例子以及许多类似例子的核心结论是，如果关系 `r` 有一个属性 `A`，那么 `r` 中 `A` 的值可以是 *任何东西*，只要它们是为该属性 `A`
    定义的类型 `T` 的值即可。而那个类型 `T` 本身又可以是任何类型！^(⁵⁷) 它甚至可以是 `关系` 类型（因此有了前几页讨论的关系值属性的可能性）。


    `1NF` “原子性”要求有时以“无重复组”的形式陈述。事实上，我自己在许多早期的著作中也这样陈述过——特别是在本书的上一版中，我试图（但我想失败了）给出什么是重复组的精确定义。经过进一步思考，我得出的结论是，在此语境下最好不要试图去思考重复组，而是要关注（然后，正如我刚才所做的那样，去驳斥！）原子性概念。换句话说，我现在认为禁止重复组的禁令过去是、现在也仍然是本质上毫无意义的——我特此向任何可能被我在此方面早期的努力所误导的人道歉。


    总之，如果违反了这五项要求中的任何一项，所讨论的表就没有“直接且忠实”地表示一个 `关系变量`，*那么一切都不作数了*。特别是，诸如 `连接` 之类的关系运算符不再保证能按预期工作（如果你——如我所假设的那样——熟悉
    `SQL`，你早已知道这一点）。关系模型处理且只处理 *`关系`* 值和变量。'
- fmt: "## Functional Dependencies\n\nSo much for 1NF; now I can move on and begin\
    \ to discuss some of the higher normal forms. Now, I’ve already said that Boyce/Codd\
    \ normal form (BCNF) is defined in terms of functional dependencies (FDs), and\
    \ of course the same is true of second normal form (2NF) and third normal form\
    \ (3NF) as well. So here’s a definition:\n\n**Definition (functional dependency):**\
    \ Let `X` and `Y` be subsets of the heading of relvar `R`; then the functional\
    \ dependency (FD)\n```\nX → Y\n```\nholds in `R` if and only if, whenever two\
    \ tuples of `R` agree on `X`, they also agree on `Y`.^(^([^(58)](#fn58))) `X`\
    \ and `Y` here are called the determinant and the dependant, respectively, and\
    \ the FD overall can be read as “`X` functionally determines `Y`,” or as “`Y`\
    \ is functionally dependent on `X`,” or more simply just as “`X` arrow `Y`.”\n\
    \nHere are a couple of examples:\n*   The FD `{CITY} → {STATUS}` holds in relvar\
    \ `S`, as we know from Chapter [2](#489629_2_En_2_Chapter.xhtml). Note the braces,\
    \ by the way; `X` and `Y` in the definition are subsets of the heading of `R`,\
    \ and are therefore sets (of attributes), even when, as in the example, they happen\
    \ to be singleton sets. By the same token, `X` and `Y` values are tuples, even\
    \ when, as in the example, they happen to be tuples of degree one.\n*   The FD\
    \ `{SNO} → {SNAME,STATUS}` also holds in relvar `S`, because `{SNO}` is a key—in\
    \ fact, the only key—for that relvar, and there are *always* “arrows out of keys”\
    \ (see the section “Keys,” immediately following this one). *Note:* In case it\
    \ isn’t obvious, I use the phrase “arrow out of `X`” to mean there exists some\
    \ `Y` such that the FD `X → Y` holds in the pertinent relvar (where `X` and `Y`\
    \ are subsets of the heading of that relvar).\n\nNow here’s a useful thing to\
    \ remember: If the FD `X → Y` holds in relvar `R`, then the FD `X' → Y'` also\
    \ holds in relvar `R` for all supersets `X'` of `X` and all subsets `Y'` of `Y`\
    \ (just so long as `X'` is still a subset of the heading, of course). In other\
    \ words, we can always add attributes to the determinant or subtract them from\
    \ the dependant, and what we get will still be an FD that holds in the relvar\
    \ in question. For example, here’s another FD that holds in relvar `S`:\n```\n\
    { SNO , CITY } → { STATUS }\n```\n(I started with the FD `{SNO} → {SNAME,STATUS}`\
    \ and added `CITY` to the determinant and subtracted `SNAME` from the dependant.)\n\
    \nI also need to explain what it means for an FD to be *trivial*:\n\n**Definition\
    \ (trivial FD):** The FD `X → Y` is trivial if and only if there’s no way it can\
    \ be violated.\n\nFor example, the following FDs all hold trivially in any relvar\
    \ with attributes called `STATUS` and `CITY`:^(^([^(59)](#fn59)))\n```\n{ CITY\
    \ , STATUS } → { CITY }\n{ CITY , STATUS } → { STATUS }\n{ CITY }          → {\
    \ CITY }\n{ CITY }          → { }\n```\nTo elaborate briefly (but considering\
    \ just the first of these examples, for simplicity): If two tuples have the same\
    \ value for `CITY` and `STATUS`, they certainly have the same value for `CITY`.\
    \ In fact, it’s easy to see that the FD `X → Y` is trivial if and only if `Y`\
    \ is a subset of `X` (in symbols, `Y ⊆ X`). Now, when we’re doing database design,\
    \ we don’t usually bother with trivial FDs because they’re, well, trivial; but\
    \ when we’re trying to be formal and precise about these matters—in particular,\
    \ when we’re trying to develop a *theory* of design—then we need to take all FDs\
    \ into account, trivial ones as well as nontrivial.\n\n## Keys Revisited\n\nI\
    \ discussed the concept of keys in general terms in Chapter [1](#489629_2_En_1_Chapter.xhtml),\
    \ but it’s time to get a little more precise about the matter and to introduce\
    \ some more terminology. First, here for the record is a precise definition of\
    \ the term *candidate key*—which, as noted in Chapter [1](#489629_2_En_1_Chapter.xhtml),\
    \ I abbreviate to just *key* throughout most of this book:\n\n**Definition (candidate\
    \ key, key):** Let `K` be a subset of the heading of relvar `R`. Then `K` is a\
    \ candidate key (or just a key for short) for `R` if and only if it possesses\
    \ both of the following properties:\n1.  *Uniqueness:* No legitimate value for\
    \ `R` contains two distinct tuples with the same value for `K`.\n2.  *Irreducibility:*\
    \ No proper subset of `K` has the uniqueness property.\n\nThis is the first definition\
    \ we’ve encountered that involves some kind of irreducibility, but we’ll meet\
    \ several more in the pages ahead—irreducibility of one kind or another is ubiquitous,\
    \ and important, throughout the field of design theory in general, as we’ll see.\
    \ Regarding key irreducibility in particular, one reason (not the only one) why\
    \ it’s important is that if we were to specify a “key” that wasn’t irreducible,\
    \ the DBMS wouldn’t be able to enforce the proper uniqueness constraint. For example,\
    \ suppose we told the DBMS (lying!) that `{SNO,CITY}` was a key, and in fact the\
    \ only key, for relvar `S`. Then the DBMS couldn’t enforce the constraint that\
    \ supplier numbers are “globally” unique; instead, it could enforce only the weaker\
    \ constraint that supplier numbers are “locally” unique, in the sense that they’re\
    \ unique within the pertinent city.\n\nI’m not going to discuss the foregoing\
    \ definition any further here, since the concept is so familiar^([^(60)](#fn60))—but\
    \ observe how the next few definitions depend on it:\n\n**Definition (key attribute):**\
    \ Attribute `A` of relvar `R` is a key attribute for `R` if and only if it’s part\
    \ of at least one key of `R`.\n\n**Definition (nonkey attribute):** Attribute\
    \ `A` of relvar `R` is a nonkey attribute for `R` if and only if it’s not part\
    \ of any key of `R`.^(^([^(61)](#fn61)))\n\nFor example, in relvar `SP`, `SNO`\
    \ and `PNO` are key attributes and `QTY` is a nonkey attribute.\n\n**Definition\
    \ (“all key” relvar):** A relvar is “all key” if and only if the entire heading\
    \ is a key (in which case it’s the only key, necessarily)—equivalently, if and\
    \ only if no proper subset of the entire heading is a key.\n\n*Note:* If a relvar\
    \ is “all key,” then it certainly has no nonkey attributes, but the converse is\
    \ false—a relvar can be such that all of its attributes are key attributes and\
    \ yet not be “all key” (right?).\n\n**Definition (superkey):** Let `SK` be a subset\
    \ of the heading of relvar `R`. Then `SK` is a superkey for `R` if and only if\
    \ it possesses the following property:\n1.  *Uniqueness:* No legitimate value\
    \ for `R` contains two distinct tuples with the same value for `SK`.\n\nMore succinctly,\
    \ a superkey for `R` is a subset of the heading of `R` that’s unique but not necessarily\
    \ irreducible. In other words, we might say, loosely, that a superkey is a superset\
    \ of a key (“loosely,” because of course the superset in question must still be\
    \ a subset of the pertinent heading). Observe, therefore, that all keys are superkeys,\
    \ but “most” superkeys aren’t keys. *Note:* A superkey that isn’t a key is sometimes\
    \ said to be a *proper* superkey.\n\nIt’s convenient to define the notion of a\
    \ *subkey* also:\n\n**Definition (subkey):** Let `SK` be a subset of the heading\
    \ of relvar `R`. Then `SK` is a subkey for `R` if and only if it’s a subset of\
    \ at least one key of `R`.\n\n*Note:* A subkey that isn’t a key is sometimes said\
    \ to be a *proper* subkey.\n\nBy way of example, consider relvar `SP`, which has\
    \ just one key, viz., `{SNO,PNO}`. That relvar has:\n1.  Two superkeys:\n    ```\n\
    \    { SNO , PNO }\n    { SNO , PNO , QTY }\n    ```\n    Note that the heading\
    \ is always a superkey for any relvar `R`.\n2.  Four subkeys:"
