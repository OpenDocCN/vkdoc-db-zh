- fmt: '## Relations and Relvars


    再看一下第[1](#489629_2_En_1_Chapter.xhtml)章中的图[1-1](#489629_2_En_1_Chapter.xhtml#Fig1)，即供应商-零件数据库。该图显示了三个关系：具体来说，是数据库在某个特定时刻恰好存在的关系。但是，如果我们从另一个时间点查看同一个数据库，我们很可能会看到三个不同的关系取代了它们。换句话说，`S`、`P`和`SP`实际上是变量——精确地说是关系变量——并且就像一般变量一样，它们在不同时间具有不同的值。既然它们是关系变量，那么它们在任何给定时间的值，当然是关系值。


    为了进一步探讨这些概念，考虑图[2-1](#489629_2_En_2_Chapter.xhtml#Fig1)。该图显示：(a)左边是图[1-1](#489629_2_En_1_Chapter.xhtml#Fig1)中发货关系的一个大幅简化版本；(b)右边是在执行了某个更新后得到的关系。使用上一段的术语，我们可以说：(a)在图的左边，我们看到的是关系变量`SP`在某个特定时间*T1*的关系值；(b)在右边，我们看到的是同一个关系变量在某个可能稍晚的时间*T2*的关系值，在插入了一个额外的元组之后。


    ![../images/489629_2_En_2_Chapter/489629_2_En_2_Fig1_HTML.jpg](images/489629_2_En_2_Chapter/489629_2_En_2_Fig1_HTML.jpg)


    **图 2-1**


    关系值与变量——一个例子


    因此，关系值和关系变量之间存在明显的逻辑差异。问题在于，数据库界历来使用同一个术语*relation*来指代这两个概念，这种做法无疑导致了混淆（尤其是在本书讨论的上下文中，例如进一步规范化）。因此，在本书中，从此往后，我将非常仔细地区分这两者——当我说关系值时，我会用关系值这个术语；当我说关系变量时，我会用关系变量这个术语。不过，我也会在大多数时候将*relation
    value*简写为*relation*（正如我们大多时候将*integer value*简写为*integer*一样）。并且我会在大多数时候将*relation
    variable*简写为***relvar***；例如，我会说供应商-零件数据库包含三个*relvars*（更准确地说，是三个*base* relvars；视图也是relvars，但本书中关于视图本身我没什么要多说的）。


    实际上，关于视图，有一点我确实想说。*可交换性原则*（视图与基本relvars之间）实际上表明——至少对用户而言——视图应该看起来和感觉起来就像基本relvars一样。（我指的不是那些仅定义为简写形式的视图，我指的是旨在以某种方式使用户与“真实”数据库隔离的视图。详见第[17](#489629_2_En_17_Chapter.xhtml)章对这一点的阐述。）一般来说，用户实际上交互的并不是一个只包含基本relvars（“真实”数据库）的数据库，而是一个可以称为*用户*数据库的东西，它包含一些基本relvars和视图的混合。但是，这个用户数据库对用户而言，应该看起来和感觉起来就像一个真实数据库一样；因此，本书将要讨论的所有设计原则，例如规范化原则，同样适用于此类用户数据库，而不仅仅是“真实”数据库。出于这个原因，在本书中我将随意使用不加限定的术语*relvar*，依靠上下文来表明该术语是指基本relvars和视图两者，还是仅特指基本relvars（或仅特指视图）。


    让我们回到图[2-1](#489629_2_En_2_Chapter.xhtml#Fig1)。正如该图所示，关系由两部分组成：*头部*和*体部*。基本上，头部是一个属性的集合，而体部是一个符合该头部的元组的集合。例如，图[2-1](#489629_2_En_2_Chapter.xhtml#Fig1)中显示的两个关系都有一个包含三个属性的头部；此外，图中左边的关系有一个包含两个元组的体部，右边的那个有一个包含三个元组的体部。因此请注意，一个关系并不真正包含元组，至少不是直接包含——它包含一个体部，而那个体部又包含元组。然而，在实践中，为了简单起见，我们确实通常谈论得好像关系直接包含元组一样。由此引申的要点：


    *   头部和体部的术语可以以显而易见的方式扩展到relvars。当然，一个relvar的头部（就像关系的头部一样）永远不会改变——它等同于可能被赋给该relvar的所有可能关系的头部。相比之下，体部会改变；具体来说，随着在相关relvar上执行更新，它会改变。


    *   我说过头部是一个属性的集合。然而，就本书而言，更简单的想法是将头部仅视为一组属性*名*——这当然是一种简化，但对所讨论的事项没有严重的负面影响。


    *   实际上，更正确的想法是将头部视为一组*属性名/类型名对*（当然，同时保留要求这些属性名必须互不相同）。例如，在本书的所有示例中，我将假设属性`SNO`和`PNO`都是`CHAR`类型（任意长度的字符串），属性`QTY`是`INTEGER`类型（整数）。^(^(20)^)
    当我说符合某个头部的元组时，我的意思是该元组中的每个属性值都必须是相应类型的值。例如，为了让一个元组符合relvar `SP`的头部，它必须具有属性`SNO`、`PNO`和`QTY`（没有其他），并且这些属性的值必须分别是`CHAR`、`CHAR`和`INTEGER`类型。


    虽然话是这么说，但我现在也必须说明，对于关系设计理论的目的而言，类型大多不是非常重要。这就是为什么从此往后，我将随意简化我对头部的定义。此外，在我大多数的关系和relvar示例（以及relvar定义）中，我也将只显示属性名，而不费心甚至不提及相应的类型。


    *   给定头部中的属性数量是该头部的*度*（有时称为*元数*）。它也是具有该头部的任何关系或relvar的度。


    *注意：*术语*度*也用于元组和键（以及外键）的上下文中。例如，relvar `SP`的所有元组都像该relvar本身一样，度为三；该relvar的唯一键`{SNO,
    PNO}`的度为二；该relvar中的两个外键`{SNO}`和`{PNO}`的度各为一。


    *   给定体部中的元组数量是该体部的*基数*。它也是具有该体部的任何关系或relvar的基数。^(^(21)^)


    *   （头部、关系等的）度可以是任何非负整数。度1称为*一元*；度2，*二元*；度3，*三元*；以此类推。更一般地说，度*n*称为*n元*。'
  raw: '## Relations and Relvars


    Take another look at Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1), the suppliers-and-parts
    database, in Chapter [1](#489629_2_En_1_Chapter.xhtml). That figure shows three
    relations: namely, the relations that happen to exist in the database at some
    particular time. But if we were to look at the same database at some different
    time, we would probably see three different relations appearing in their place.
    In other words, S, P, and SP are really variables—relation variables, to be precise—and
    just like variables in general, they have different values at different times.
    And since they’re relation variables specifically, their values at any given time
    are, of course, relation values.


    As a basis for examining these ideas further, consider Figure [2-1](#489629_2_En_2_Chapter.xhtml#Fig1).
    That figure shows (a) on the left, a very much reduced version of the shipments
    relation from Figure [1-1](#489629_2_En_1_Chapter.xhtml#Fig1); (b) on the right,
    the relation that results after a certain update has been performed. Using the
    terminology of the previous paragraph, we can say that (a) on the left of the
    figure we see the relation value that’s the value of relation variable SP at some
    particular time *T1*; (b) on the right, we see the relation value that’s the value
    of that same relation variable at some presumably later time *T2*, after an additional
    tuple has been inserted.


    ![../images/489629_2_En_2_Chapter/489629_2_En_2_Fig1_HTML.jpg](images/489629_2_En_2_Chapter/489629_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Relation values and variables—an example


    So there’s an obvious logical difference between relation values and relation
    variables. The trouble is, the database community has historically used the same
    term, *relation*, to stand for both concepts, and that practice has certainly
    led to confusion (not least in contexts that are the subject of the present book,
    such as further normalization). In this book, therefore, I’ll distinguish very
    carefully between the two from this point forward—I’ll talk in terms of relation
    values when I mean relation values and relation variables when I mean relation
    variables. However, I’ll also abbreviate *relation value*, most of the time, to
    just *relation* (exactly as we abbreviate *integer value* most of the time to
    just *integer*). And I’ll abbreviate *relation variable* most of the time to ***relvar***;
    for example, I’ll say the suppliers-and-parts database contains three *relvars*
    (more precisely, three *base* relvars; views are relvars too, but I have little
    to say about views as such in this book).


    Actually, there’s one thing I do want to say about views. *The Principle of Interchangeability*
    (of views and base relvars) says, in effect, that—at least as far as the user
    is concerned—views are supposed to look and feel just like base relvars. (I don’t
    mean views that are defined as mere shorthands, I mean views that are intended
    to insulate the user from the “real” database in some way. See Chapter [17](#489629_2_En_17_Chapter.xhtml)
    for an elaboration of this point.) In general, in fact, the user interacts not
    with a database that contains base relvars only (the “real” database), but rather
    with what might be called a *user* database that contains some mixture of base
    relvars and views. But that user database is supposed to look and feel just like
    a real database as far as the user is concerned; thus, all of the design principles
    to be discussed in this book, such as the principles of normalization, apply equally
    well to such user databases, not just to the “real” database. For this reason,
    I’ll feel free to use the unqualified term *relvar* throughout this book, relying
    on context to indicate whether the term refers to base relvars and views equally,
    or just to base relvars (or just to views) specifically.


    Let’s get back to Figure [2-1](#489629_2_En_2_Chapter.xhtml#Fig1). As that figure
    suggests, relations have two parts, a *heading* and a *body*. Basically, the heading
    is a set of attributes, and the body is a set of tuples that conform to that heading.
    For example, the two relations shown in Figure [2-1](#489629_2_En_2_Chapter.xhtml#Fig1)
    both have a heading consisting of three attributes; also, the relation on the
    left of that figure has a body consisting of two tuples and the one on the right
    has a body consisting of three. Note, therefore, that a relation doesn’t really
    contain tuples, at least not directly—it contains a body, and that body in turn
    contains the tuples. In practice, however, we do usually talk as if relations
    contained tuples directly, for simplicity. Points arising:


    *   The terminology of headings and bodies extends in the obvious way to relvars
    too. Of course, the heading of a relvar (like that of a relation) never changes—it’s
    identical to the heading of all possible relations that might ever be assigned
    to the relvar in question. By contrast, the body does change; to be specific,
    it changes as updates are performed on the relvar in question.


    *   I’ve said a heading is a set of attributes. As far as the present book is
    concerned, however, it’s simpler to think of a heading as just a set of attribute
    *names*—an oversimplification, certainly, but not one that has any serious negative
    impact on the matters to be discussed.


    *   Actually it would be more correct to think of a heading as a set of *attribute-name
    / type-name pairs* (while retaining the requirement that the attribute names in
    question must all be distinct, of course). For example, I’m going to assume in
    examples throughout this book that attributes SNO and PNO are each of type CHAR
    (character strings of arbitrary length) and attribute QTY is of type INTEGER (integers).^([^(20)](#fn20))
    And when I talk about tuples conforming to some heading, I mean each attribute
    value within the tuple in question must be a value of the pertinent type. For
    example, in order for a tuple to conform to the heading of relvar SP, it must
    have attributes SNO, PNO, and QTY (and no others), and the values of those attributes
    must be of types CHAR, CHAR, and INTEGER, respectively.


    All of that being said, I must now say too that types are mostly not very important
    for the purposes of relational design theory. That’s why I’ll feel free from this
    point forward to simplify my definition of what a heading is. What’s more, I’ll
    also feel free, in most of my sample relations and relvars (and relvar definitions),
    to show the attribute names only and not bother about or even mention the corresponding
    types.


    *   The number of attributes in a given heading is the *degree* (sometimes the
    *arity*) of that heading. It’s also the degree of any relation or relvar having
    that heading.


    *Note:* The term *degree* is also used in connection with both tuples and keys
    (and foreign keys). For example, the tuples of relvar SP are all, like that relvar
    itself, of degree three; the sole key of that relvar, {SNO,PNO}, is of degree
    two; and the two foreign keys in that relvar, {SNO} and {PNO}, are each of degree
    one.


    *   The number of tuples in a given body is the *cardinality* of that body. It’s
    also the cardinality of any relation or relvar having that body.^([^(21)](#fn21))


    *   The degree (of a heading or relation or whatever) can be any nonnegative integer.
    Degree 1 is said to be *unary*; degree 2, *binary*; degree 3, *ternary*; and so
    on. More generally, degree *n* is said to be *n-*ary.'
