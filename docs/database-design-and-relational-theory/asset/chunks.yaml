  trans: '

    # 第五部分 正交性


    正交性


    重复我在第一章说过的话，数据库设计并非我最喜欢的科目。原因在于，真正科学的设计实践少之又少；规范化当然是科学的，但除此之外就乏善可陈了。然而，本书这部分的主题——正交性，确实代表了这个（可悲地）仍然相当主观的领域中又一小块科学。


    # 第十六章 正交设计原则


    > *正交* 与……成直角；独立的。

    >

    > ——戴维·达林：《数学之书》（2004 年）


    我在本书前面的部分反复提到，规范化是支撑数据库设计的科学（或至少是其重要组成部分）。因此，本章从快速回顾规范化原则并简要分析规范化实现其目标的程度开始是恰当的。


    ## 为规范化欢呼两声


    那么，首先是一个简化的规范化原则总结：


    1.  一个不在`5NF`中的`关系变量`应被分解为一组`5NF`投影。^(²⁰⁵^)

    2.  原始`关系变量`应能通过将这些投影重新连接起来而重建——即，分解应是无损的。

    3.  每个投影在重建过程中都应是必需的。

    4.  分解应尽可能保留依赖关系（`FD`和`JD`），只要这样做不违背第一条原则。


    然而，规范化远非万能药，这一点通过考察其目标及其实现程度便可轻易看出。其目标如下：


    *   实现一个能"良好"表示现实世界的设计（即逻辑上正确、直观易懂，并且是未来发展的良好基础）

    *   减少冗余

    *   从而避免某些可能发生的更新异常

    *   简化某些完整性约束的声明与执行


    我将逐一考察。


    *   *良好地表示现实世界：* 规范化在这方面做得很好。我对此没有批评意见。

    *   *减少冗余：* 规范化在解决这个问题上也是一个好的开端，但它仅仅是个开端。一方面，这是一个取投影的过程，而我们已经看到，并非所有冗余都能通过取投影来消除；事实上，规范化根本完全不涉及许多种冗余。（第十七章将讨论这个问题。）另一方面，即使分解是无损的，取投影也可能导致依赖丢失，正如我们在第六章及其他地方看到的那样。

    *   *避免更新异常：* 这一点至少部分地是上一条的另一种说法。众所周知，未适当规范化的设计可能容易受到某些更新异常的影响，这正是因为它们所带来的冗余。例如，在`关系变量
    STP`中（见第 1 章图 1-2），供应商`S1`可能在一个元组中显示状态为`20`，在另一个元组中显示状态为`25`。


    当然，这种特定的异常只有在完整性约束执行不完美的情况下才会出现。或许思考更新异常问题的更好方式是：如果设计是适当规范化的，防止此类异常所需的约束会更易于声明，并且可能更容易执行，反之则不然（见下面的下一个要点）。另一种思考方式是：如果设计是适当规范化的，那么逻辑上可接受的单个元组更新^[(206)^]会比不规范化时更多（因为未规范化的设计意味着冗余——即，多个元组表达相同的事情——而冗余反过来又意味着有时我们必须同时更新多个事项）。


    *   *简化约束的声明与执行：* 从前面的章节我们知道，某些依赖隐含了其他依赖。（更一般地说，事实上任何类型的约束都可能隐含其他约束。作为一个简单的例子，如果发货数量必须小于或等于`5000`，那么它们当然必须小于或等于`6000`。）现在，如果约束*A*隐含约束*B*，那么声明和执行*A*将有效地"自动"声明和执行*B*（实际上，*B*根本不需要单独声明，除了可能作为文档说明）。而规范化到（至少）`5NF`为我们提供了一种非常简单的方法来声明和执行某些重要的约束；基本上，我们所要做的就是定义键并执行其唯一性——这我们本来就会做——然后所有适用的`JD`（以及所有适用的`MVD`和`FD`）都将有效地被自动声明和执行，因为它们都将被这些键所隐含。因此，规范化在这个领域也做得相当不错。（当然，我在这里忽略了规范化过程可能引发的各种多关系变量约束。）


    另一方面，除了已给出的理由之外，规范化并非万能药还有以下几个原因：


    *   首先，`JD`和`MVD`以及`FD`并非唯一的约束类型，规范化对其他类型的约束没有帮助。

    *   其次，给定一组特定的`关系变量`，通常会有几种不同的无损分解为`5NF`投影的方案——参见第 6 章的几个例子——而我们几乎没有或完全没有正式的指导来告诉我们在此类情况下该选择哪一种。（不过说实话，我怀疑这种缺失在实践中不太可能造成重大问题。）

    *   第三，有许多设计问题是规范化根本不涉及的。例如，是什么告诉我们应该只有一个供应商`关系变量`，而不是为伦敦供应商设一个、为巴黎供应商设一个，等等？这肯定不是经典理解中的规范化所能决定的。


    尽管如此，我必须明确表示，我不希望上述评论被视为任何形式的攻击。正如我在第 8 章所说，我相信任何未完全规范化的设计都是强烈不适宜的。但事实仍然是，规范化（我称之为"设计中科学的部分"）本身确实没有完成我们期望的那么多工作——因此，能够说现在有额外的一小块科学可供我们使用是件好事。这就是正交设计的全部意义所在。


    *注：* 正交性的概念随着时间的推移而演变。因此，本章部分内容与之前关于同一主题的著作——主要是我自己的——有些出入。此外，我非常怀疑本章是否就是最终定论。我确实相信本章在其论述范围内是准确的；然而，未来很可能（也值得）对该材料进行进一步的完善。*读者宜自行判断*。

    '
- fmt: '## A Motivating Example


    For simplicity, let the FD `{CITY} → {STATUS}` *not* hold any longer in relvar
    `S` (*and please note that I’ll stay with this revised assumption throughout the
    present chapter*). Consider now the following decomposition of that relvar:


    ```

    SNC { SNO , SNAME , CITY }

    KEY { SNO }

    STC { SNO , STATUS , CITY }

    KEY { SNO }

    ```


    Sample values are shown in Figure [16-1](#489629_2_En_16_Chapter.xhtml#Fig1).
    As the figure clearly shows, this decomposition is hardly very sensible (in particular,
    note that the fact that a given supplier is located in a given city appears twice),
    and yet it abides by all of the normalization principles—both projections are
    in 5NF; the decomposition is nonloss; both projections are needed in the reconstruction
    process; and dependencies are preserved.


    ![`../images/489629_2_En_16_Chapter/489629_2_En_16_Fig1_HTML.jpg`](images/489629_2_En_16_Chapter/489629_2_En_16_Fig1_HTML.jpg)


    Figure 16-1


    Relvars `SNC` and `STC`─sample values


    Intuitively, the problem with the foregoing design is obvious: The tuple `(s,n,c)`
    appears in `SNC` if and only if the tuple `(s,t,c)` appears in `STC`; equivalently,
    the tuple `(s,c)` appears in the projection of `SNC` on `{SNO,CITY}` if and only
    if that very same tuple `(s,c)` appears in the projection of `STC` on `{SNO,CITY}`.
    To state the matter a trifle more formally, we can say the design is subject to
    the following equality dependency (EQD)—


    ```

    CONSTRAINT ... SNC { SNO , CITY } = STC { SNO , CITY } ;

    ```


    —and this EQD makes the redundancy explicit.


    To repeat, however, the foregoing design abides by *all* of the well established
    principles of normalization. It follows that those principles by themselves aren’t
    enough—we need something else to tell us what’s wrong with the design (something
    else *formal*, that is; we all know what’s wrong with it informally). To put the
    matter another way, the normalization discipline provides a set of formal principles
    to guide us in our attempts to reduce redundancy, but that set of principles by
    itself is inadequate, as the example plainly shows. We need another principle;
    in other words, as I keep saying, we need more science.


    ## A Simpler Example


    In order to see what the principle we need might look like, let’s consider another,
    simpler (?) example. As you know, normalization as such—in particular, normalization
    as used in the `SNC` / `STC` example of the previous section—has to do with “vertical”
    decomposition of relvars (meaning decomposition via projection). But “horizontal”
    decomposition (that is, decomposition via restriction) is clearly possible, too.
    Consider the design illustrated in Figure [16-2](#489629_2_En_16_Chapter.xhtml#Fig2),
    in which the parts relvar `P` has been split horizontally—in fact, partitioned—into
    two relvars, one (“light parts,” `LP`) containing parts with weight less than
    17.0 pounds and the other (“heavy parts,” `HP`) containing parts with weight greater
    than or equal to 17.0 pounds.^([^(207)](#fn207))


    ![`../images/489629_2_En_16_Chapter/489629_2_En_16_Fig2_HTML.jpg`](images/489629_2_En_16_Chapter/489629_2_En_16_Fig2_HTML.jpg)


    Figure 16-2


    Relvars `LP` and `HP`─sample values


    The predicates are as follows:


    *   `LP`: *Part `PNO` is named `PNAME`, has color `COLOR` and weight `WEIGHT`
    (which is less than 17.0 pounds), and is stored in city `CITY`.*


    *   `HP`: *Part `PNO` is named `PNAME`, has color `COLOR` and weight `WEIGHT`
    (which is greater than or equal to 17.0 pounds), and is stored in city `CITY`.*


    Note that the original relvar `P` can be recovered by taking the (disjoint) union
    of relvars `LP` and `HP`.


    Why might we want to perform such a horizontal decomposition? Frankly, I’m not
    aware of any good logical reason for doing so, though of course that’s not to
    say no such reason exists. Be that as it may, observe that we can, and should,
    state two constraints that apply to these relvars:


    ```

    CONSTRAINT LPC AND ( LP , WEIGHT < 17.0 ) ;

    CONSTRAINT HPC AND ( HP , WEIGHT ≥ 17.0 ) ;

    ```


    (I remind you from Chapter [2](#489629_2_En_2_Chapter.xhtml) that the `Tutorial
    D` expression `AND (rx, bx)`, where `rx` is a relational expression and `bx` is
    a boolean expression, returns `TRUE` if and only if the condition denoted by `bx`
    evaluates to `TRUE` for every tuple in the relation denoted by `rx`.)


    So we have here what is at least arguably a slightly unusual situation. To be
    specific, for each of relvars `LP` and `HP`, part of the predicate can and should
    be captured formally in the shape of an explicit constraint. Indeed, the very
    fact that such constraints need to be stated and enforced might be seen as militating
    against the design. But even if horizontal decomposition is therefore contraindicated
    at the logical level, there are still plenty of pragmatic reasons (having to do
    with recovery, security, performance, and other such matters) for such a decomposition
    at the physical level. Hence, given that the logical and physical levels tend
    to be in lockstep, pretty much, in today’s DBMSs—i.e., there’s not nearly as much
    data independence in those DBMSs as there ought to be—it follows that there are
    likely to be pragmatic reasons, if not logical ones, for performing such a decomposition
    at the logical level as well, at least given the state of the art found in current
    implementations.


    Now, regardless of what you might think of the foregoing argument, at least there’s
    nothing obviously bad about the design of Figure [16-2](#489629_2_En_16_Chapter.xhtml#Fig2)
    (well, let’s agree as much for the sake of the example, at any rate).^([^(208)](#fn208))
    But suppose we were to define relvar `LP` just a little differently; to be specific,
    suppose we were to define it to contain those parts with weight less than *or
    equal to* 17.0 pounds (adjusting the predicate and constraint `LPC` accordingly,
    of course). Figure [16-3](#489629_2_En_16_Chapter.xhtml#Fig3) is a revised version
    of Figure [16-2](#489629_2_En_16_Chapter.xhtml#Fig2), showing what happens with
    this revised design.


    ![`../images/489629_2_En_16_Chapter/489629_2_En_16_Fig3_HTML.jpg`](images/489629_2_En_16_Chapter/489629_2_En_16_Fig3_HTML.jpg)


    Figure 16-3


    Relvars `LP` (revised) and `HP`─sample values'
  raw: '## A Motivating Example


    For simplicity, let the FD {CITY} → {STATUS} *not* hold any longer in relvar S
    (*and please note that I’ll stay with this revised assumption throughout the present
    chapter*). Consider now the following decomposition of that relvar:


    ```

    SNC { SNO , SNAME , CITY }

    KEY { SNO }

    STC { SNO , STATUS , CITY }

    KEY { SNO }

    ```


    Sample values are shown in Figure [16-1](#489629_2_En_16_Chapter.xhtml#Fig1).
    As the figure clearly shows, this decomposition is hardly very sensible (in particular,
    note that the fact that a given supplier is located in a given city appears twice),
    and yet it abides by all of the normalization principles—both projections are
    in 5NF; the decomposition is nonloss; both projections are needed in the reconstruction
    process; and dependencies are preserved.


    ![../images/489629_2_En_16_Chapter/489629_2_En_16_Fig1_HTML.jpg](images/489629_2_En_16_Chapter/489629_2_En_16_Fig1_HTML.jpg)


    Figure 16-1


    Relvars SNC and STC─sample values


    Intuitively, the problem with the foregoing design is obvious: The tuple (*s*,*n*,*c*)
    appears in SNC if and only if the tuple (*s*,*t*,*c*) appears in STC; equivalently,
    the tuple (*s*,*c*) appears in the projection of SNC on {SNO,CITY} if and only
    if that very same tuple (*s*,*c*) appears in the projection of STC on {SNO,CITY}.
    To state the matter a trifle more formally, we can say the design is subject to
    the following equality dependency (EQD)—


    ```

    CONSTRAINT ... SNC { SNO , CITY } = STC { SNO , CITY } ;

    ```


    —and this EQD makes the redundancy explicit.


