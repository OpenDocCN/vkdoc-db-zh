  trans: '

    1.  数据库中现在包含两个不同的关系变量，即 `SNC` 和 `STC`。


    2.  值得感谢的是，**希斯定理**以及函数依赖 `{SNO} → {SNAME}` 在关系变量 `SNC` 中成立这一事实，意味着连接依赖 `☼{{SNO,SNAME},{SNO,CITY}}`
    在关系变量 `SNC` 中成立——事实上，它相对于该关系变量是不可约的。


    3.  因此，关系变量 `SNC` 在 `{SNO,CITY}` 上的投影是其有效无损分解的一部分。但是，在该投影与关系变量 `STC` 在相同属性集上的投影之间，存在一个**相等性依赖**。因此，正如刚才所述（“第三次尝试”），该设计违反了正交性原则。


    我现在观察到，正交性原则的这个版本让我有机会处理第 11 章中的一项未竟之事。你或许还记得，我在那一章中指出，以下连接依赖在关系变量 `S` 中成立，并且实际上相对于该关系变量是不可约的：


    ```

    ☼ { { SNO , SNAME , CITY } , { CITY , STATUS , SNAME } }

    ```


    但我也说过，基于这个连接依赖对关系变量 `S` 进行分解并不是个好主意（练习 11.4 询问了原因）。好吧，我们现在可以看到，如果进行了那种分解：


    1.  数据库中现在包含两个不同的关系变量——我将称它们为 `SNC` 和 `CTN`——它们的标题分别为 `{SNO,SNAME,CITY}` 和 `{CITY,STATUS,SNAME}`。


    2.  值得感谢的是，**希斯定理**以及函数依赖 `{CITY} → {STATUS}` 在 `CTN` 中成立——至少，就第 11 章的范围而言它确实成立——这一事实意味着连接依赖
    `☼{{CITY,STATUS},{CITY,SNAME}}` 在关系变量 `CTN` 中成立，并且实际上相对于该关系变量是不可约的。


    3.  因此，关系变量 `CTN` 在 `{CITY,SNAME}` 上的投影是其有效无损分解的一部分。但是，在该投影与关系变量 `SNC` 在相同属性集上的投影之间，存在一个**相等性依赖**。换句话说，该设计再次违反了正交性原则。


    这个例子的要旨是：基于一个“不良”的连接依赖进行无损分解，是违背**正交设计原则**的。（例子中的连接依赖是“不良的”，因为属性 `SNAME` 可以从 `{CITY,STATUS,SNAME}`
    这个分量中移除，而不会造成重大损失。）更重要的是，遵守正交性原则的一个结果是，本章开头给出的第三个规范化原则——即每一个投影在重建过程中都应该是必需的——将自动得到满足（因此，正交性与规范化之间毕竟存在某种逻辑联系）。


    ## 再探第二个例子


    不幸的是，上一节给出的正交性原则的第三个版本仍然遗漏了一些东西，重温轻量与重量部件的例子揭示了它是什么：它遗漏了关于**约束**的那部分业务。（在那个例子中，相等性依赖并非存在于数据库关系变量本身之间，也非存在于这些关系变量的投影之间，而是存在于这些关系变量的某些**约束**之间。）换句话说，该原则的第三个版本未能包含第二个版本。相比之下，下面的表述同时处理了约束问题和投影问题：


    **定义（正交设计原则，第四次尝试）：** 设关系变量 `R1` 和 `R2` 是不同的。那么：


    1.  不存在一个相对于 `R1` 不可约的连接依赖 `☼{X1,...,Xn}`，使得


    2.  存在某个 `Xi`（1 ≤ `i` ≤ `n`）以及一组可能为空的属性重命名，作用于 `R1` 在 `Xi` 上的投影（记为 `R1X`），该重命名将
    `R1X` 映射为 `R1Y`，并且


    3.  `R1Y` 的标题与 `R2` 的标题的某个子集 `Y` 相同，并且


    4.  存在限制条件 `c1` 和 `c2`，两者均非恒假，并且


    5.  以下相等性依赖成立：


    ```

    ( R1Y WHERE c1 ) = ( R2Y WHERE c2 )

    ```


    （其中 `R2Y` 是 `R2` 在 `Y` 上的投影）。


    ## 最终版本（？）


    信不信由你，仍然存在问题……考虑供应商关系变量的一个版本——我称之为 `SCC`——它具有属性 `SNO`、`CITYA` 和 `CITYB`。设 `SCC`
    受到约束：对于任何给定的供应商，`CITYA` 和 `CITYB` 的值必须相同。*结果：* 冗余！当然，这是一个糟糕的设计，但它是一种可能的设计，如果能扩展正交性原则以处理（即禁止）这种设计，那就太好了。下面这个最终（？）的表述应该可以做到（我将其作为一个练习留给你去弄清楚具体是如何做到的）：


    **定义（正交设计原则，“最终”版本）：** 设 `R1` 和 `R2` 为关系变量（不一定不同）。那么：


    1.  不存在一个相对于 `R1` 不可约的连接依赖 `☼{X1,...,Xn}`，使得


    2.  存在某个 `Xi`（1 ≤ `i` ≤ `n`）以及一组可能为空的属性重命名，作用于 `R1` 在 `Xi` 上的投影（记为 `R1X`），该重命名将
    `R1X` 映射为 `R1Y`，并且


    3.  `R1Y` 的标题与 `R2` 的标题的某个子集 `Y` 相同（如果 `R1` 和 `R2` 是同一个关系变量，则 `Y` 必须与 `Xi` 不同），并且


    4.  存在限制条件 `c1` 和 `c2`，两者均非恒假，并且


    5.  以下相等性依赖成立：


    ```

    ( R1Y WHERE c1 ) = ( R2Y WHERE c2 )

    ```


    （其中 `R2Y` 是 `R2` 在 `Y` 上的投影）。


    这个版本的原则包含了所有先前的版本。

    '
- fmt: '## A Clarification


    I’m sorry to have to report that there’s quite a lot of confusion in the literature
    over orthogonality, even though the basic idea is so simple. I’m even sorrier
    to have to say the confusion is probably my fault—some of my previous writings
    on this topic have been (not to put too fine a point upon it) flat out wrong.
    So let me take this opportunity to try and set the record straight. The basic
    point is this:


    > Orthogonality says that relvars shouldn’t have overlapping meanings; it doesn’t
    say that relvars shouldn’t have the same heading (or, more generally, headings
    that “overlap”).


    ### Example 1: ON_VACATION and NEEDS_PHONE


    Here’s a simple example, due to Hugh Darwen, that illustrates the difference.
    Consider the predicates *Employee ENO is on vacation* and *Employee ENO is awaiting
    phone number allocation*. The obvious design for this situation involves two relvars
    of degree one that look like this (in outline):


    ```

    ON_VACATION { ENO }

    KEY { ENO }

    NEEDS_PHONE { ENO }

    KEY { ENO }

    ```


    Clearly, the very same tuple can appear in both of these relvars at the same time.
    But even if it does, those two appearances represent two different propositions,
    and there’s no redundancy involved, and no violation of orthogonality.^(217)


    Observe now that there’s a difference in kind between the example just discussed
    and the light vs. heavy parts examples (relvars `LP` and `HP`) illustrated in
    Figures 16-2 and 16-3, earlier in this chapter. In the latter case, as we saw
    earlier, we can write a formal constraint, to the effect that the pertinent `WEIGHT`
    value has to lie in a certain range, that a given tuple has to satisfy in order
    for it to be accepted for insertion into `LP` or `HP` or both. However, there’s
    no formal constraint we can write that a given tuple has to satisfy in order for
    it to be accepted for insertion into `ON_VACATION` or `NEEDS_PHONE` or both. In
    other words, if the user asserts that a certain tuple is to be inserted into,
    say, `ON_VACATION`, then the system simply has to trust the user; there’s no check
    it can perform to ascertain that the tuple does indeed belong in `ON_VACATION`
    instead of (or as well as) `NEEDS_PHONE`.


    ### Example 2: EARNS, SALARY_UNK, and UNSALARIED


    Here’s another example, also due to Hugh Darwen, that might also mistakenly be
    thought to violate orthogonality but in fact doesn’t. We’re given three relvars
    that look like this (in outline):^(218)


    ```

    EARNS      { ENO , SALARY }

    KEY { ENO }

    SALARY_UNK { ENO }

    KEY { ENO }

    UNSALARIED { ENO }

    KEY { ENO }

    ```


    Sample values are shown in Figure 16-4.


    ![../images/489629_2_En_16_Chapter/489629_2_En_16_Fig4_HTML.jpg](images/489629_2_En_16_Chapter/489629_2_En_16_Fig4_HTML.jpg)


    Figure 16-4


    `EARNS`, `SALARY_UNK`, and `UNSALARIED`─sample values


    The predicates for these three relvars are as follows:


    *   `EARNS`: *Employee ENO has salary SALARY.*

    *   `SALARY_UNK`: *Employee ENO has a salary, but we don’t know what it is.*

    *   `UNSALARIED`: *Employee ENO doesn’t have a salary.*


    Now, relvars `SALARY_UNK` and `UNSALARIED` do have the same heading—but even if
    the same tuple could simultaneously appear in both, there wouldn’t be any redundancy,
    because the appearances in question would represent two different propositions.
    In fact, of course, the semantics of the situation are such that no tuple should
    simultaneously appear in both, anyway (in other words, the relvars are disjoint).
    The following constraint will take care of this requirement:


    ```

    CONSTRAINT ... IS_EMPTY ( JOIN { SALARY_UNK , UNSALARIED } ) ;

    ```


    (As explained in the answer to Exercise 6.4 in Chapter 6, the `Tutorial D` expression
    `IS_EMPTY ( *rx* )` returns `TRUE` if the relation `r` denoted by the relational
    expression `rx` is empty and `FALSE` otherwise.)


    *Note:* In fact, of course, no employee should be represented in more than one
    of the relvars `EARNS`, `SALARY_UNK`, and `UNSALARIED`, so the foregoing constraint
    ought to be extended or revised appropriately. I’ll leave the details as an exercise
    (part of Exercise 16.3).


    ## Concluding Remarks


    In closing, I want to make a few further (and somewhat miscellaneous) observations
    on the concept of orthogonality in general. First of all, the overall objective
    of orthogonal design, like that of normalization, is to reduce redundancy and
    thereby to avoid certain update anomalies that might otherwise occur. In fact,
    orthogonality complements normalization, in the sense that—to speak rather loosely—normalization
    reduces redundancy within relvars, while orthogonality reduces it across relvars.


    What’s more, orthogonality complements normalization in another way also. Consider
    once again the (bad) decomposition of relvar `S` into its projections `SNC` and
    `STC`, as illustrated in Figure 16-1. As we saw earlier, that decomposition abided
    by all of the usual normalization principles; in other words, it was orthogonality,
    not normalization, that told us the design was bad.


    My next point is that, like the principles of normalization, *The Principle of
    Orthogonal Design* is basically just common sense—but (again like normalization)
    it’s formalized common sense, and the remarks I made in Chapter 1 in connection
    with such formalization apply here also. As I said in that chapter:


    *   What design theory does is [formalize] certain commonsense principles, thereby
    opening the door to the possibility of mechanizing those principles (that is,
    incorporating them into computerized design tools). Critics of the theory often
    miss this point; they claim, quite rightly, that the ideas are mostly just common
    sense, but they don’t seem to realize it’s a significant achievement to state
    what common sense means in a precise and formal way.


    My final point is this: Suppose we start with the usual parts relvar `P`, but
    decide for design purposes to decompose that relvar into a set of restrictions,
    as in the light vs. heavy parts example. Then the orthogonality principle tells
    us that the restrictions in question should be pairwise disjoint (also, of course,
    that their union—which will in fact be a disjoint union—should take us back to
    the original relvar).


    *Note:* In previous writings, I’ve referred to a decomposition that meets the
    foregoing requirement as an orthogonal decomposition. However, I now think it
    would be better to generalize this term and use it to mean any decomposition that
    abides by the orthogonality principle. This revised definition includes the earlier
    one as a special case.'
  raw: '## A Clarification


    I’m sorry to have to report that there’s quite a lot of confusion in the literature
    over orthogonality, even though the basic idea is so simple. I’m even sorrier
    to have to say the confusion is probably my fault—some of my previous writings
    on this topic have been (not to put too fine a point upon the matter) flat out
    wrong. So let me take this opportunity to try and set the record straight. The
    basic point is this:


    > *Orthogonality says that relvars shouldn’t have overlapping meanings; it doesn’t
    say that relvars shouldn’t have the same heading (or, more generally, headings
    that “overlap”).*


    Here’s a simple example, due to Hugh Darwen, that illustrates the difference.
    Consider the predicates *Employee ENO is on vacation* and *Employee ENO is awaiting
    phone number allocation*. The obvious design for this situation involves two relvars
    of degree one that look like this (in outline):


    ```

    ON_VACATION { ENO }

    KEY { ENO }

    NEEDS_PHONE { ENO }

    KEY { ENO }

    ```


    Clearly, the very same tuple can appear in both of these relvars at the same time.
    But even if it does, those two appearances represent two different propositions,
    and there’s no redundancy involved, and no violation of orthogonality.^([^(217)](#fn217))


    Observe now that there’s a difference in kind between the example just discussed
    and the light vs. heavy parts examples (relvars LP and HP) illustrated in Figures
    [16-2](#489629_2_En_16_Chapter.xhtml#Fig2) and [16-3](#489629_2_En_16_Chapter.xhtml#Fig3),
    earlier in this chapter. In the latter case, as we saw earlier, we can write a
    formal constraint, to the effect that the pertinent WEIGHT value has to lie in
    a certain range, that a given tuple has to satisfy in order for it to be accepted
    for insertion into LP or HP or both. However, there’s no formal constraint we
    can write that a given tuple has to satisfy in order for it to be accepted for
    insertion into ON_VACATION or NEEDS_PHONE or both. In other words, if the user
    asserts that a certain tuple is to be inserted into, say, ON_VACATION, then the
    system simply has to trust the user; there’s no check it can perform to ascertain
    that the tuple does indeed belong in ON_VACATION instead of (or as well as) NEEDS_PHONE.


    Here’s another example, also due to Hugh Darwen, that might also mistakenly be
    thought to violate orthogonality but in fact doesn’t. We’re given three relvars
    that look like this (in outline) :^([^(218)](#fn218))


    ```

    EARNS      { ENO , SALARY }

    KEY { ENO }

    SALARY_UNK { ENO }

    KEY { ENO }

    UNSALARIED { ENO }

    KEY { ENO }

    ```


    Sample values are shown in Figure [16-4](#489629_2_En_16_Chapter.xhtml#Fig4).


    ![../images/489629_2_En_16_Chapter/489629_2_En_16_Fig4_HTML.jpg](images/489629_2_En_16_Chapter/489629_2_En_16_Fig4_HTML.jpg)


    Figure 16-4


    Relvars EARNS, SALARY_UNK, and UNSALARIED─sample values


    The predicates for these three relvars are as follows:


    *   EARNS: *Employee ENO has salary SALARY.*


    *   SALARY_UNK: *Employee ENO has a salary, but we don’t know what it is.*


    *   UNSALARIED: *Employee ENO doesn’t have a salary.*


    Now, relvars SALARY_UNK and UNSALARIED do have the same heading—but even if the
    same tuple could simultaneously appear in both, there wouldn’t be any redundancy,
    because the appearances in question would represent two different propositions.
    In fact, of course, the semantics of the situation are such that no tuple should
    simultaneously appear in both, anyway (in other words, the relvars are disjoint).
    The following constraint will take care of this requirement:


    ```

    CONSTRAINT ... IS_EMPTY ( JOIN { SALARY_UNK , UNSALARIED } ) ;

    ```


    (As explained in the answer to Exercise 6.4 in Chapter [6](#489629_2_En_6_Chapter.xhtml),
    the **Tutorial D** expression IS_EMPTY (*rx*) returns TRUE if the relation *r*
    denoted by the relational expression *rx* is empty and FALSE otherwise.)


    *Note:* In fact, of course, no employee should be represented in more than one
    of the relvars EARNS, SALARY_UNK, and UNSALARIED, so the foregoing constraint
    ought to be extended or revised appropriately. I’ll leave the details as an exercise
    (part of Exercise 16.3).


    ## Concluding Remarks


    In closing, I want to make a few further (and somewhat miscellaneous) observations
    on the concept of orthogonality in general. First of all, the overall objective
    of orthogonal design, like that of normalization, is to reduce redundancy and
    thereby to avoid certain update anomalies that might otherwise occur. In fact,
    orthogonality complements normalization, in the sense that—to speak rather loosely—normalization
    reduces redundancy within relvars, while orthogonality reduces it across relvars.


    What’s more, orthogonality complements normalization in another way also. Consider
    once again the (bad) decomposition of relvar S into its projections SNC and STC,
    as illustrated in Figure [16-1](#489629_2_En_16_Chapter.xhtml#Fig1). As we saw
    earlier, that decomposition abided by all of the usual normalization principles;
    in other words, it was orthogonality, not normalization, that told us the design
    was bad.


    My next point is that, like the principles of normalization, *The Principle of
    Orthogonal Design* is basically just common sense—but (again like normalization)
    it’s formalized common sense, and the remarks I made in Chapter [1](#489629_2_En_1_Chapter.xhtml)
    in connection with such formalization apply here also. As I said in that chapter:


    *   What design theory does is [formalize] certain commonsense principles, thereby
    opening the door to the possibility of mechanizing those principles (that is,
    incorporating them into computerized design tools). Critics of the theory often
    miss this point; they claim, quite rightly, that the ideas are mostly just common
    sense, but they don’t seem to realize it’s a significant achievement to state
    what common sense means in a precise and formal way.


    My final point is this: Suppose we start with the usual parts relvar P, but decide
    for design purposes to decompose that relvar into a set of restrictions, as in
    the light vs. heavy parts example. Then the orthogonality principle tells us that
    the restrictions in question should be pairwise disjoint (also, of course, that
    their union—which will in fact be a disjoint union—should take us back to the
    original relvar).


    *Note:* In previous writings, I’ve referred to a decomposition that meets the
    foregoing requirement as an orthogonal decomposition. However, I now think it
    would be better to generalize this term and use it to mean any decomposition that
    abides by the orthogonality principle. This revised definition includes the earlier
    one as a special case.'
  trans: '

    ## 澄清说明


    我很遗憾地必须指出，文献中关于正交性的概念存在相当多的混淆，尽管其基本思想非常简单。我更加遗憾地必须说，这种混淆可能源于我本人——我之前关于这个主题的一些文章（说得不客气些）是完全错误的。因此，请允许我借此机会尝试纠正记录。基本要点如下：


    > 正交性指的是关系变量不应具有重叠的含义；它并非说关系变量不应具有相同的-heading（或者，更一般地说，不应具有“重叠”的-heading）。


    ### 示例 1：ON_VACATION 与 NEEDS_PHONE


    这是一个由休·达文（Hugh Darwen）提出的简单例子，用以说明其中的区别。考虑谓词 *员工 ENO 正在休假* 和 *员工 ENO 等待分配电话号码*。这种情况的显而易见的设计涉及两个一度的关系变量，大致如下：


    ```

    ON_VACATION { ENO }

    KEY { ENO }

    NEEDS_PHONE { ENO }

    KEY { ENO }

    ```


    显然，完全相同的元组可以同时出现在这两个关系变量中。但即使如此，这两个出现代表的是两个不同的命题，并不涉及冗余，也没有违反正交性。²¹⁷


    现在请注意，刚刚讨论的例子与本章前面图 16-2 和 16-3 展示的轻量零件与重量零件示例（关系变量 `LP` 和 `HP`）之间存在本质区别。在后一种情况下，正如我们之前看到的，我们可以编写一个形式化约束，大意是相关的
    `WEIGHT` 值必须位于某个范围内，某个元组必须满足该条件才能被接受插入到 `LP` 或 `HP` 或两者中。然而，对于 `ON_VACATION` 或
    `NEEDS_PHONE` 或两者，我们无法编写一个元组必须满足的形式化约束才能被接受插入。换句话说，如果用户断言某个元组要插入到，比如 `ON_VACATION`
    中，那么系统只能相信用户；它无法执行任何检查来确定该元组确实属于 `ON_VACATION` 而不是（或同时属于）`NEEDS_PHONE`。


    ### 示例 2：EARNS、SALARY_UNK 与 UNSALARIED


    这是另一个例子，同样由休·达文提出，可能也会被错误地认为违反了正交性，但实际上并没有。我们有三个关系变量，大致如下：²¹⁸


    ```

    EARNS      { ENO , SALARY }

    KEY { ENO }

    SALARY_UNK { ENO }

    KEY { ENO }

    UNSALARIED { ENO }

    KEY { ENO }

    ```


    示例值如图 16-4 所示。


    ![../images/489629_2_En_16_Chapter/489629_2_En_16_Fig4_HTML.jpg](img/489629_2_En_16_Fig4_HTML.jpg)


    图 16-4


    `EARNS`、`SALARY_UNK` 和 `UNSALARIED` ── 示例值


    这三个关系变量的谓词如下：


    *   `EARNS`: *员工 ENO 的薪资为 SALARY。*

    *   `SALARY_UNK`: *员工 ENO 有薪资，但我们不知道具体数额。*

    *   `UNSALARIED`: *员工 ENO 没有薪资。*


    现在，关系变量 `SALARY_UNK` 和 `UNSALARIED` 确实具有相同的-heading——但即使相同的元组可以同时出现在两者中，也不会有任何冗余，因为所讨论的出现代表的是两个不同的命题。当然，事实上，该情况的语义决定了没有元组应该同时出现在两者中（换句话说，这两个关系变量是不相交的）。以下约束将满足这一要求：


    ```

    CONSTRAINT ... IS_EMPTY ( JOIN { SALARY_UNK , UNSALARIED } ) ;

    ```


    （如第 6 章习题 6.4 的答案所述，`Tutorial D` 表达式 `IS_EMPTY ( *rx* )` 如果关系表达式 `rx` 所表示的关系 `r`
    为空则返回 `TRUE`，否则返回 `FALSE`。）


    *注：* 事实上，当然，任何员工都不应该在 `EARNS`、`SALARY_UNK` 和 `UNSALARIED` 这三个关系变量中超过一个里出现，因此前述约束应该被适当扩展或修订。细节我将留作练习（习题
    16.3 的一部分）。


    ## 结束语


    最后，我想就正交性这个概念再做一些（有些是零散的）观察。首先，正交性设计的总体目标，如同规范化一样，是减少冗余，从而避免某些可能发生的更新异常。事实上，正交性是对规范化的补充，因为——说得宽松一点——规范化减少了关系变量内部的冗余，而正交性减少了关系变量之间的冗余。


    此外，正交性在另一个方面也对规范化起到了补充作用。再次考虑关系变量 `S` 分解为其投影 `SNC` 和 `STC` 的（不良）分解，如图 16-1 所示。正如我们之前看到的，该分解遵循了所有通常的规范化原则；换句话说，是正交性，而不是规范化，告诉我们这个设计是不好的。


    我的下一个观点是，如同规范化原则一样，*正交设计原则* 本质上只是常识——但是（也如同规范化一样）它是形式化的常识，我在第 1 章中关于这种形式化的评论在这里同样适用。正如我在那一章中所说：


    *   设计理论所做的是[形式化]某些常识性原则，从而为将这些原则机械化（即，将它们纳入计算机化的设计工具）打开了可能性。该理论的批评者常常忽略了这一点；他们相当正确地声称，这些思想大多只是常识，但他们似乎没有意识到，以精确和形式化的方式阐明常识意味着什么，是一项重大成就。


    我的最后一点是：假设我们从常见的零件关系变量 `P` 开始，但出于设计目的，决定将该关系变量分解为一组限制，如轻量零件与重量零件示例。那么正交性原则告诉我们，所讨论的限制应该两两不相交（当然，还要求它们的并集——实际上将是一个不相交并集——应该能带我们回到原始的关系变量）。


    *注：* 在以前的著作中，我将满足上述要求的分解称为正交分解。然而，我现在认为最好推广这个术语，用它来表示任何遵循正交性原则的分解。这个修订后的定义将之前的定义作为一个特例包括在内。

    '
- fmt: "## Exercises\n\n1.  Try stating the final version of `The Principle of Orthogonal\
    \ Design` without looking back at the body of the chapter.\n\n2.  Consider the\
    \ design of any database you happen to be familiar with. Does it involve any violations\
    \ of `The Principle of Orthogonal Design`? Are there any constraints—especially\
    \ “overlapping” ones—that ought to be stated declaratively but haven’t been?\n\
    \n3.  Consider the second example in the section “A Clarification” (the one involving\
    \ relvars `EARNS`, `SALARY_UNK`, and `UNSALARIED`). Do you think the design illustrated\
    \ in that example is redundancy free? Also try stating a formal constraint to\
    \ guarantee that no employee is represented in more than one of those three relvars.\n\
    \n4.  Suppose we replace the suppliers relvar `S` by a set of relvars `LS`, `PS`,\
    \ `AS`, ... (one for each distinct supplier city—the `LS` relvar, for example,\
    \ contains tuples for suppliers in London only). These relvars all have the same\
    \ attributes, viz., `SNO`, `SNAME`, and `STATUS` (there’s no need to keep the\
    \ `CITY` attribute, because if we did its value would be constant throughout each\
    \ relvar). Does this design violate orthogonality? Can you think of any other\
    \ problems with it?\n\n    By the way, if we did keep the `CITY` attribute in\
    \ relvars `LS`, `PS`, `AS`, etc., the design would actually violate the principles\
    \ of normalization! Why so, exactly?\n\n5.  Suppose attribute `CITY` in both the\
    \ suppliers relvar `S` and the parts relvar `P` is replaced by a pair of attributes\
    \ `CITY` and `STATE` (sample values: Burlington, Vermont vs. Burlington, Massachusetts).\
    \ Does this revised design display any redundancy? Does it violate the principles\
    \ of normalization? Does it violate orthogonality?\n\n## Answers\n\n1.  See the\
    \ body of the chapter.\n\n2.  *No answer provided.*\n\n3.  No, it isn’t redundancy\
    \ free (see the further remarks on examples of this kind in Chapter [17](#489629_2_En_17_Chapter.xhtml)).\
    \ As for the constraint, the following will suffice:\n\n    ```\n    CONSTRAINT\
    \ ... IS_EMPTY ( JOIN { SALARY_UNK , UNSALARIED } )\n    AND IS_EMPTY ( JOIN {\
    \ EARNS , SALARY_UNK } )\n    AND IS_EMPTY ( JOIN { EARNS , UNSALARIED } ) ;\n\
    \    ```\n\n    *Note:* In my book `View Updating and Relational Theory: Solving\
    \ the View Update Problem` (O’Reilly, 2013), I propose support for expressions\
    \ of the form `DISJOINT {*r1*,*...*,*rn*}`, which return `TRUE` if and only if\
    \ no two of the argument relations *r1*, ..., *rn* have any tuples in common.\
    \ Using this `DISJOINT` operator, the foregoing constraint could be simplified\
    \ to just:\n\n    ```\n    CONSTRAINT ... DISJOINT { EARNS { ENO } , SALARY_UNK\
    \ , UNSALARIED } ;\n    ```\n\n4.  The design doesn’t violate orthogonality, but\
    \ there are several other things wrong with it. For example, how would you express\
    \ the query “Get the city for supplier `S1`”? (There are two cases to consider:\
    \ one where you do at least know what supplier cities exist, and one where you\
    \ don’t. In the latter case, you might want to think about this query too: “Is\
    \ supplier `S1` represented in the database?”) Also, what’s happened to the FD\
    \ `{CITY} -> {STATUS}` (assuming such an FD is supposed to hold)? And what about\
    \ the `{SNO}` foreign key in relvar `SP`? (Again there are two cases to consider—the\
    \ same two as before, in fact.)\n\n    If we do keep the `CITY` attribute in relvars\
    \ `LS`, `PS`, etc., then:\n    1.  If the FD `{CITY} -> {STATUS}` held in the\
    \ original suppliers relvar `S`, then it certainly still holds in relvars `LS`,\
    \ `PS`, etc., and so those relvars aren’t in BCNF.\n\n    2.  What’s more, the\
    \ FD `{ } -> {CITY}` also holds in each of those relvars. Since this FD isn’t\
    \ “an arrow out of a key,” that’s another reason why the relvars wouldn’t be in\
    \ BCNF. (See the answer to Exercise 4.6 in Chapter [4](#489629_2_En_4_Chapter.xhtml),\
    \ where an essentially similar example is discussed.)\n\n    Finally, if the FD\
    \ `{CITY} -> {STATUS}` held in the original suppliers relvar `S`, then—regardless\
    \ of whether we keep the `CITY` attribute in relvars `LS`, `PS`, etc., or not—the\
    \ FD `{ } -> {STATUS}` also holds in each of those relvars, and so yet again the\
    \ relvars wouldn’t be in BCNF. Note, therefore, that the FD `{CITY} -> {STATUS}`,\
    \ if it holds at all (which it can do only if the `CITY` attribute is retained,\
    \ of course), is in fact reducible, under the suggested horizontal decomposition.\n\
    \n5.  If there exist two distinct tuples, both in `S` or both in `P` or one in\
    \ each, that contain the same `CITY` / `STATE` pair (say Burlington, Vermont),\
    \ then clearly there’s some kind of redundancy involved. But there’s no violation\
    \ of the principles of normalization—both relvars are still in 5NF. And there’s\
    \ no violation of orthogonality either!—more evidence, if evidence is still required,\
    \ that we need more science in this area.\n\n    Note, incidentally, that `{CITY,STATE}`\
    \ in relvars `S` and `P` might very well be foreign keys, referencing a `{CITY,STATE}`\
    \ key in some other relvar. I’ll leave the implications of this possibility as\
    \ something for you to think about.\n\n    Now recall the example of relvars `ON_VACATION`\
    \ and `NEEDS_PHONE` from the body of the chapter. Suppose we extend both of those\
    \ relvars to include an employee salary attribute (`SALARY`). Then (like the `{CITY,STATE}`\
    \ example) this revised design certainly suffers from redundancy, and yet it doesn’t\
    \ violate either normalization principles or orthogonality. This time, however,\
    \ we can at least write a formal constraint that makes the redundancy explicit.\
    \ Let me abbreviate `ON_VACATION` and `NEEDS_PHONE` to `OV` and `NP`, respectively.\
    \ Then we have:\n\n    ```\n    CONSTRAINT ... WITH ( X := JOIN { OV { ENO } ,\
    \ NP { ENO } } ) :\n    JOIN { X , OV } = JOIN { X , NP } ;\n    ```\n\n    This\
    \ constraint requires that if `ENO` *e* appears in both relvars, then *e*’s salary\
    \ must be the same in both.\n\nFootnotes [1](#489629_2_En_16_Chapter.xhtml#Fn1_source)\
    \   [2](#489629_2_En_16_Chapter.xhtml#Fn2_source)   [3](#489629_2_En_16_Chapter.xhtml#Fn3_source)\
    \   [4](#489629_2_En_16_Chapter.xhtml#Fn4_source)   [5](#489629_2_En_16_Chapter.xhtml#Fn5_source)\
    \   [6](#489629_2_En_16_Chapter.xhtml#Fn6_source)   [7](#489629_2_En_16_Chapter.xhtml#Fn7_source)\
    \   [8](#489629_2_En_16_Chapter.xhtml#Fn8_source)   [9](#489629_2_En_16_Chapter.xhtml#Fn9_source)\
    \   [10](#489629_2_En_16_Chapter.xhtml#Fn10_source)   [11](#489629_2_En_16_Chapter.xhtml#Fn11_source)\
    \   [12](#489629_2_En_16_Chapter.xhtml#Fn12_source)   [13](#489629_2_En_16_Chapter.xhtml#Fn13_source)\
    \   [14](#489629_2_En_16_Chapter.xhtml#Fn14_source)\n\n# Part VI Redundancy\n\n\
    Redundancy\n\nThroughout this book, we’ve been concerned with getting redundancy\
    \ out of the design. But what *is* redundancy?"
