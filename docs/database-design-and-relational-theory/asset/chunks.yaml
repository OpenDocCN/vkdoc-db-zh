    is as follows:


    ```

    EXTEND TABLE_DEE : { TOTQ := SUM ( SP , QTY } }

    ```


    Or if you prefer SQL:


    ```

    SELECT SUM ( QTY ) AS TOTQ

    FROM   SP

    ```


    Evaluating either of these expressions yields a result that looks like this:


    ![../images/489629_2_En_19_Chapter/489629_2_En_19_Figa_HTML.jpg](images/489629_2_En_19_Chapter/489629_2_En_19_Figa_HTML.jpg)


    The corresponding proposition is “The total shipment quantity TOTQ, taken over
    all shipments, is *x*.” Now, it doesn’t matter what the actual value of *x* is
    (it might or might not be 5000); what matters is that if the database is inconsistent,
    we have no way of knowing whether the corresponding proposition is true or false
    (i.e., whether *x* is the true total quantity). In other words, it’s not *how
    we write the query* that’s the point at issue—it’s *how we interpret the result*.
    More specifically, we can’t assume that the result we’ve been given is correct.
    As I said earlier, if the database is inconsistent, then all bets are off.^([^(273)](#fn273))'
  trans: '

    ## 错误答案


    前述论证应足以表明完整性约束的关键重要性。具体而言，如果数据库违反了某些约束，那么作为逻辑系统的数据库就是不一致的——而（正如我们现在所知）我们从一个不一致的系统中可以得到任何答案。^(²⁶⁹)


    话虽如此，怀疑论者可能仍会说：“真的吗？我不信。得了吧，给我看个现实的例子，别用你那些抽象的*p*和*q*的论证。”那么，让我看看是否能应对这一挑战。


    我会从一个非常简单的例子开始。假设当前供应商-零件数据库的值满足：(a) 至少存在一个供应商；(b) 存在一个约束，要求必须始终至少有一个零件；但事实上 (c)
    现在根本没有任何零件（这就是不一致性）。现在考虑这个关系演算表达式：^(²⁷⁰)


    ```

    S WHERE EXISTS P ( TRUE )

    ```


    或者如果你更喜欢 SQL：


    ```sql

    SELECT ∗

    FROM   S

    WHERE  EXISTS

    ( SELECT ∗

    FROM   P )

    ```


    现在，如果直接计算这两个表达式中的任意一个，结果都将为空，因为 `WHERE` 子句中的表达式计算结果为 `FALSE`。或者，如果系统（或者用户也一样）观察到有一个约束要求
    `EXISTS P (TRUE)` 必须计算为 `TRUE`——或者在 SQL 中，`SELECT ∗ FROM P` 必须返回非空结果——那么那个 `WHERE`
    子句就可以被一个简单地说 `WHERE TRUE` 的子句替换，结果就会是所有供应商。^(²⁷¹) 至少有一个答案肯定是错的！事实上，在某种意义上，它们都是错的；给定一个不一致的数据库，根本不存在——也不可能存在——任何定义明确的正确性概念，任何答案都和其他答案一样（好或坏）。确实，这种情况应该是不言自明的：如果我告诉你某个命题*p*既真又假，然后我问你某个以某种方式依赖于*p*的命题是否为真，你根本无法给我一个正确的答案。


    如果你还不信服，请看下面这个稍现实一点的 SQL 示例：


    ```sql

    SELECT CASE

    WHEN EXISTS ( SELECT ∗ FROM P )

    THEN ( x )

    ELSE ( y )

    END AS Z

    FROM   S

    ```


    在与之前相同的假设下——即，至少有一个供应商但没有零件，尽管有约束说应该有零件——这个表达式将返回 `x` 或 `y`（更准确地说，它将返回一个包含一行、该行包含
    `x` 或 `y` 的表），实际上，取决于 `EXISTS` 调用是否被简单地替换为 `TRUE`。现在想想，`x` 和 `y` 各自可以是任何东西……例如，`x`
    可能是 SQL 表达式 `SELECT SUM (WEIGHT) FROM P`，而 `y` 可能是字面量 `0.0`——在这种情况下，执行查询很容易导致错误的结论，认为零件总重量是
    `null` 而不是零。（当然，如果没有零件，零件总重量应该是零。在这个例子中，错误答案特别令人恼火的一点是，用户显然特意以这种方式表述查询，以便在确实没有零件时获得逻辑上正确的答案零。）


    ## 推广论证


    一位审阅此附录早期版本的审阅者，仍然不信服，尝试了一个不同的问题。他实际上问的是，我们如何才能表达查询“获取所有发货单的总发货数量”，以便从某个不一致的数据库中获得某个特定的错误答案，比如
    5000。嗯，在我尝试回答这个问题之前，让我先推广一下上一节中提出的论证。


    首先，我们知道数据库值抽象地看是一组命题。令 `DBP` 为构成数据库值 `DB` 的命题集合。令 `LA` 是 `DBP` 中所有命题的逻辑与——即合取。此外，假设针对
    `DB` 的某个查询返回一个结果 `R`，其中 `R` 是通过计算表示给定查询的关系表达式，从 `DB` 中的关系派生出的一个关系。当然，`R` 本身也可以被理解为另一组命题
    `RP`；因此我们可以说“`LA` 蕴含 `RP`”为真，换句话说，`RP` 中的命题是 `LA` 中命题的逻辑结果。但是，如果 `DB` 是不一致的（即，如果
    `DBP` 涉及矛盾），`LA` 就计算为 `FALSE`——而蕴含式“`FALSE` 蕴含 `p`”对于所有可能的命题 `p` 都计算为 `TRUE`，^(²⁷²)
    无论该命题 `p` 本身是真还是假。因此，如果 `DB` 是不一致的，我们（通常）就无法知道 `RP` 中的各个命题是真还是假。


    现在回到审阅者的问题：我们如何才能表达查询“获取所有发货单的总发货数量”，以便从某个不一致的数据库中获得答案 5000？事实上，我认为这个问题的表述方式没有多大意义。在
    **Tutorial D** 中，表达此查询本身（即，暂时忽略必须针对某个不一致数据库返回值 5000 的要求）的明显方式如下：


    ```

    EXTEND TABLE_DEE : { TOTQ := SUM ( SP , QTY } }

    ```


    或者如果你更喜欢 SQL：


    ```sql

    SELECT SUM ( QTY ) AS TOTQ

    FROM   SP

    ```


    计算这两个表达式中的任意一个，都会产生一个类似这样的结果：


    ![../images/489629_2_En_19_Chapter/489629_2_En_19_Figa_HTML.jpg](img/489629_2_En_19_Figa_HTML.jpg)


    相应的命题是“所有发货单的总发货数量 `TOTQ` 是 `x`。”现在，`x` 的实际值是多少并不重要（它可能是 5000，也可能不是）；重要的是，如果数据库是不一致的，我们就无法知道相应的命题是真还是假（即，`x`
    是否为真实的总量）。换句话说，问题的关键不在于*我们如何编写查询*——而在于*我们如何解释结果*。更具体地说，我们不能假设得到的结果是正确的。正如我之前所说，如果数据库不一致，那么一切都不可信了。^(²⁷³)

    '
- fmt: '## Why Integrity Checking Must Be Immediate


    In the text quoted at the beginning of the appendix, I said this, more or less:


    *   Contrary to popular opinion, integrity checking must always be immediate—i.e.,
    it must be done “at statement boundaries,” meaning the end of any update operation
    that has the potential to violate the integrity constraint in question. In other
    words, so called “deferred checking,” meaning checking that’s deferred to the
    end of the pertinent transaction, is a violation of the principles of the relational
    model; in fact, it’s a logical error.


    Actually there are at least five reasons for insisting that database constraints
    must be checked at statement boundaries, but the first and biggest one is simply
    that (as I’ve tried to show in previous sections) we can *never* tolerate any
    inconsistencies in the database, not even within the bounds of a single transaction.
    That is, while it might be true, thanks to the so called isolation property of
    transactions, that no more than one transaction ever sees any particular inconsistency,
    the fact remains that the particular transaction in question does see the inconsistency
    and can thereby produce wrong answers. *Note:* The book `SQL and Relational Theory`
    contains a detailed discussion of the foregoing issue, as well as of the other
    four reasons—the other four reasons, that is, for insisting that database constraints
    must always be checked at statement boundaries.


    Footnotes [1](#489629_2_En_19_Chapter.xhtml#Fn1_source)   [2](#489629_2_En_19_Chapter.xhtml#Fn2_source)   [3](#489629_2_En_19_Chapter.xhtml#Fn3_source)   [4](#489629_2_En_19_Chapter.xhtml#Fn4_source)   [5](#489629_2_En_19_Chapter.xhtml#Fn5_source)   [6](#489629_2_En_19_Chapter.xhtml#Fn6_source)   [7](#489629_2_En_19_Chapter.xhtml#Fn7_source)   [8](#489629_2_En_19_Chapter.xhtml#Fn8_source)


    # Primary Keys Are Nice but Not Essential


    > Life is rather like a tin of sardines—we’re all of us looking for the key.

    >

    > —Alan Bennett:`Beyond the Fringe` (1960)


    Recall this text from Chapter [1](#489629_2_En_1_Chapter.xhtml):


    *   I said it’s *usual* to choose a primary key. Indeed it is usual—but it’s not
    100% necessary. If there’s just one candidate key, then there’s no choice and
    no problem; but if there are two or more, then having to choose one and make it
    primary smacks a little bit of arbitrariness, at least to me. (Certainly there
    are situations where there don’t seem to be any really good reasons for making
    such a choice. There might even be good reasons for not doing so. Appendix [C](#489629_2_En_20_Chapter.xhtml)
    [*i.e., the present appendix*] elaborates on such matters.)


    Now, the position articulated in this extract clearly flies in the face of conventional
    wisdom; indeed, it might even be said to contravene certain widely accepted precepts
    of the relational model, or of relational theory in general. To be specific:


    *   Out of the necessarily nonempty set of keys possessed by a given relvar, the
    relational model as originally defined ascribes a primal role to an arbitrarily
    chosen member of that set called the *primary* key.


    *   Relational design methodologies—though not the relational model per se—tend
    to suggest, again a trifle arbitrarily, that a given “entity” should be identified
    and referenced throughout the database by the same (primary) key value everywhere
    it’s represented.


    As indicated, however, these recommendations—some might even call them *prescriptions*—both
    involve a certain degree of arbitrariness. The first in particular has always
    been the source of some slight embarrassment to relational advocates (myself included).
    One of the strongest arguments in favor of the relational model is and always
    has been its claim to a solid logical foundation. However, whereas this claim
    is clearly justified for the most part, the distinction between primary and alternate
    keys^([^(274)](#fn274))—i.e., the idea of having to choose one member from a set
    of equals and make it somehow “more equal than the others”—has always seemed to
    rest on grounds that don’t enjoy the same degree of theoretical respectability.
    Certainly there doesn’t seem to be any *formal* justification for the distinction;
    it seems to smack more of dogma than logic, which is why as I said I find the
    situation embarrassing. This appendix grew out of my own increasing dissatisfaction
    with the seeming lack of solid justification for the orthodox relational position
    on these matters. (As a friend of mine once said to me, these are the areas where
    in live presentations “You talk very quickly and hope no one will notice.”)


    What’s more, not only does there seem to be no formal justification for the `PK:AK`
    distinction, there doesn’t seem to be any formal way of making the choice, either.
    Indeed, Codd himself is on record as saying “The normal basis [for making the
    choice] is simplicity, *but this aspect is outside the scope of the relational
    model*” (my italics).^([^(275)](#fn275)) But why should it be necessary to make
    the choice in the first place?—i.e., why, in those cases where a genuine choice
    does exist, should it be necessary, or desirable, to introduce such an element
    of arbitrariness?


    Furthermore, the relational model as originally defined goes on to insist that
    all references via foreign keys, anywhere in the database, to (tuples in) a given
    relvar must always be via that relvar’s primary key specifically, never via some
    alternate key. Thus we see that a decision that was essentially arbitrary in the
    first place—the choice of which key is to be primary—can lead to arbitrary restrictions
    on subsequent decisions as well; that is, it might constrain the set of decisions
    as to what can and can’t be a legal foreign key, in ways that might not have been
    foreseen when that first decision (i.e., the primary key decision) was made.


    I claim, then, that the idea that a distinction should be made, in the relational
    model as such, between primary and alternate keys—hereinafter referred to as *the
    `PK:AK` distinction* —introduces an unpleasant note of arbitrariness, artificiality,
    awkwardness, and asymmetry into what is otherwise a formally defined system (viz.,
    the relational model). I claim further that it can also serve to introduce an
    unpleasant degree of arbitrariness, artificiality, awkwardness, and asymmetry
    into the database itself. And I claim still further that it can also lead to an
    undesirable and unnecessary distinction between base and derived relvars, as I’ll
    show.


    All of that being so, can the `PK:AK` distinction truly be justified? This appendix
    offers what I consider to be strong arguments in support of the position that
    the answer to this question must be *no*.'
