    For example, the relation that’s the current value of relvar S (see Figure [3-1](#489629_2_En_3_Chapter.xhtml#Fig1))
    satisfies both of these FDs—


    ```

    { CITY }  → { STATUS }

    { SNAME } → { CITY }

    ```


    —and violates this one:


    *   **Definition (FD holding):** The FD *F* holds in relvar *R* (equivalently,
    relvar *R* is subject to the FD *F*) if and only if every relation that can be
