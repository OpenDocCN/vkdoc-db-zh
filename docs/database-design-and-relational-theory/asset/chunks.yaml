    \ lose any FDs?"
  trans: "## 独立投影\n\n在结束本章之前，我想回到开篇时的例子。提醒一下，那个例子涉及对我们常用的关系变量 `S` 进行无损分解，将其投影为 `{SNO,SNAME,CITY}`\
    \ 上的 `SNC` 和 `{SNO,STATUS}` 上的 `ST`。该分解丢失了函数依赖（FD）`{CITY} → {STATUS}`，其后果是，为了强制实施“每个城市只有一个状态”这一约束，对任一投影的更新有时需要同时更新另一个投影。相比之下，将\
    \ `S` “明智地”分解为其投影 `SNC`（在 `{SNO,SNAME,CITY}` 上）和 `CT`（在 `{CITY,STATUS}` 上）则不存在此类问题——更新可以独立地对任一投影进行，无需考虑另一个。^(⁹⁶)\n\
    \n出于当前讨论的目的，让我将像分解为 `SNC` 和 `ST` 这样的分解称为 `bad`，而将像分解为 `SNC` 和 `CT` 这样的分解称为 `good`。那么，正如我们所见，在一个好的分解中，投影可以彼此独立地更新；因此，它们有时被明确地称为\
    \ *独立投影*。相反，在一个不好的分解中，投影在同样的意义上并不独立。因此可以说，为了保留 FD，我们需要一个投影相互独立的分解。有一个由 Jorma Rissanen\
    \ 提出的定理对此很有帮助。不过，在陈述该定理之前，让我先给出投影相互独立的确切定义：\n\n*   **定义（独立投影）：** 关系变量 `R` 的投影\
    \ `R1` 和 `R2` 是独立的，当且仅当 `R` 中成立的每一个 FD 在 `R1` 和 `R2` 的连接中也成立。\n\n现在给出定理：\n\n*\
    \   **Rissanen 定理：** 设关系变量 `R`，其标题为 `H`，拥有投影 `R1` 和 `R2`，其标题分别为 `H1` 和 `H2`；进一步，设\
    \ `H1` 和 `H2` 都是 `H` 的真子集，它们的并集等于 `H`，并且它们的交集非空。^(⁹⁷) 那么，投影 `R1` 和 `R2` 是独立的，当且仅当\
    \ (a) 它们的公共属性构成其中至少一个投影的超键，并且 (b) `R` 中成立的每一个 FD 都由其中至少一个投影中成立的 FD 所蕴涵。\n\n考虑将\
    \ `S` “好地”分解为其投影 `SNC` 和 `CT`。这两个投影是独立的，因为 (a) 公共属性集仅为 `{CITY}`，且 `{CITY}` 是 `CT`\
    \ 的超键（实际上是键），以及 (b) `S` 中成立的每一个 FD 要么在两个投影之一中成立，要么由其中成立的 FD 所蕴涵（参见下一章）。相反，考虑“坏地”分解为投影\
    \ `SNC` 和 `ST`。这里的投影不独立，因为 FD `{CITY} → {STATUS}` 无法从这些投影中成立的 FD 推导出来（尽管至少公共属性集\
    \ `{SNO}` 是两者的超键——实际上是键）。\n\n作为历史备注，我指出正是 Rissanen 关于独立投影的工作（完成于，或至少发表于 1977 年）为我们现在所称的\
    \ FD 保留理论奠定了基础。\n\n## 练习\n\n1.  来自“一个不幸的冲突”一节的关系变量 `SJT` 受 FD `{S,J} → {T}` 约束。编写一条\
    \ `Tutorial D` `CONSTRAINT` 语句，来表达如果我们把 `SJT` 分解为其在 `{T,J}` 和 `{T,S}` 上的投影 `TJ`\
    \ 和 `TS` 后，替代此 FD 的多关系变量约束。\n\n2.  （*重复自正文章节。*）假设来自“……再举一例”一节的关系变量 `RX2A′` 被分解为它在\
    \ `{CLASS,STATUS}` 和 `{CITY,STATUS}` 上的投影。如该节所述，现在必须单独声明并强制实施一个适当的多关系变量约束。该约束是什么样的？\n\
    \n3.  以下关系变量旨在表示一组美国街道地址：\n    ```\n    ADDR { STREET , CITY , STATE , ZIP }\n\
    \    ```\n    使用 `Tutorial D` 语法，此关系变量的一个典型元组可能如下所示：\n    ```\n    TUPLE { STREET\
    \ '1600 Pennsylvania Ave.' ,\n    CITY 'Washington' , STATE 'DC' , ZIP '20500'\
    \ }\n    ```\n    假设（并非完全不切实际）此关系变量中成立以下 FD，并且它们是不可约的：\n    ```\n    { STREET\
    \ , CITY , STATE } → { ZIP }\n    { ZIP }                   → { CITY , STATE }\n\
    \    ```\n    你会如何分解这个关系变量？\n\n4.  展示对正文章节中的关系变量 `RX1`、`RX3` 和 `RX2`（注意此处的顺序！）应用\
    \ 3NF 过程的效果。\n\n5.  这里有一个谓词：\n    > 电影明星 `S` 在电影 `M` 中扮演角色 `R`，该电影由导演 `D` 执导并于年份\
    \ `Y` 上映；此外，明星 `S` 出生于日期 `B`，因此其星座为 `Z`，生肖为 `C`，并且 `Z` 和 `C` 共同决定 `S` 的星象 `H`。\n\
    \    请给出一组能捕捉上述情况的 FD。请说明你所做的关于可能生效的业务规则的任何假设。另外，应用 BCNF 过程来获得一组适当的 BCNF 关系变量。该过程是否会丢失任何\
    \ FD？"
- fmt: "# Answers\n\n## 1.\n\n```\nCONSTRAINT ... WITH ( SJT := JOIN { TJ , TS } )\
    \ :\nCOUNT ( SJT ) = COUNT ( SJT { S , J } ) ;\n```\n\n或者，使用第[4](#489629_2_En_4_Chapter.xhtml)章练习4.8答案中描述的约束替代风格：\n\
    \n1.  设 `LT` 和 `CT` 分别是 `RX2A′` 在 `{CLASS,STATUS}` 和 `{CITY,STATUS}` 上的投影。那么 (a)\
    \ `{CLASS}` 和 `{CITY}` 将成为 `RX2B′` 中的外键，分别引用 `LT` 和 `CT`，并且 (b) 以下多关系变量约束也将成立：\n\
    \n```\nCONSTRAINT ... WITH (\n    LTX := LT RENAME { STATUS AS X } ,\n    CTY\
    \ := CT RENAME { STATUS AS Y }\n) :\nAND ( JOIN { RX2B′ , LTX , CTY } , X = Y\
    \ ) ;\n```\n\n## 2.\n\n给定的第一个 FD `{STREET,CITY,STATE} → {ZIP}` 意味着 `{STREET,CITY,STATE}`\
    \ 是一个键；第二个 FD 意味着该关系变量不符合 BCNF。然而，如果我们使用 Heath 定理基于函数依赖 `{ZIP} → {CITY,STATE}`\
    \ 将其分解为 BCNF 投影，如下所示：\n\n```\nZCT { ZIP , CITY , STATE }\nKEY { ZIP }\n\nZR  {\
    \ ZIP , STREET }\nKEY { ZIP , STREET }\n```\n\n——那么我们就丢失了 FD `{STREET,CITY,STATE}\
    \ → {ZIP}`。结果是，关系变量 `ZCT` 和 `ZR` 不能被独立更新。（*补充练习：* 为 `ZCT` 和 `ZR` 开发一些示例值来说明这一点。）当然，如果我们不执行此分解，就会存在一些冗余；具体来说，一个给定的邮政编码对应特定城市和州的事实会出现多次。但这种冗余会导致问题吗？考虑到一个给定城市和州的邮政编码不经常变化，答案是“可能，但不经常”。（另一方面，邮政编码*从不*改变的说法并不正确。）\n\
    \n## 3.\n\n以下是 `RX1` 的一个不可约覆盖：\n\n```\n{ SNO , PNO } → { QTY }\n{ SNO }      \
    \ → { CITY }\n{ CITY }      → { STATUS }\n```\n\n3NF 过程产生 `{SNO,PNO,QTY}`、`{SNO,CITY}`\
    \ 和 `{CITY,STATUS}`。\n\n接下来是 `RX3`。一个不可约覆盖：\n\n```\n{ SNO }   → { CLASS }\n{ CLASS\
    \ } → { CITY }\n{ CITY }  → { STATUS }\n```\n\n3NF 过程产生 `{SNO,CLASS}`、`{CLASS,CITY}`\
    \ 和 `{CITY,STATUS}`。\n\n最后是 `RX2`。不可约覆盖：\n\n```\n{ SNO }   → { CLASS }\n{ SNO\
    \ }   → { CITY }\n{ CLASS } → { STATUS }\n{ CITY }  → { STATUS }\n```\n\n3NF 过程产生\
    \ `{SNO,CLASS,CITY}`、`{CLASS,STATUS}` 和 `{CITY,STATUS}`。这个例子有趣的地方在于（正如正文中所示），如果我们基于\
    \ FD `{SNO} → {CLASS,CITY}` 进行分解，我们得到的是 `{SNO,CLASS,CITY}` 和 `{CLASS,CITY,STATUS}`\
    \ 作为 3NF 投影头，而这*并非* 3NF 过程的结果。实际上，3NF 过程的结果需要维护以下相当复杂的多关系变量约束（一个相等依赖）：\n\n```\n\
    CONSTRAINT ... JOIN { TJ , TS } KEY { S , J } ;\n```\n\n```\nCONSTRAINT ... JOIN\
    \ { SLC , LT } = JOIN { SLC , CT } ;\n```\n\n（“对于给定的供应商，班级状态 = 城市状态”；这里的 `SLC`、`LT`\
    \ 和 `CT` 分别表示 `RX2` 在 `{SNO,CLASS,CITY}`、`{CLASS,STATUS}` 和 `{CITY,STATUS}` 上的投影）。这个例子说明了一点：尽管\
    \ 3NF 过程保证产生 3NF 投影并且不会丢失任何 FD，但它可能不应该被过于盲目地遵循。\n\n*注意：* 假设我们分别命名关系变量 `LT` 和 `CT`\
    \ 中的状态属性，如下所示：\n\n```\nLT { CLASS , CLASS_STATUS }\nCT { CITY , CITY_STATUS }\n\
    ```\n\n那么，对于任何给定的供应商，两个状态值必须相等的约束可以这样表述：\n\n```\nCONSTRAINT ... IS_EMPTY (\n \
    \   ( JOIN { SLC , LT , CT } )\n    WHERE CLASS_STATUS ≠ CITY_STATUS\n) ;\n```\n\
    \n（**Tutorial D** 表达式 `IS_EMPTY (rx)` 在由关系表达式 `rx` 表示的关系 `r` 为空时返回 `TRUE`，否则返回\
    \ `FALSE`。）或者：\n\n```\nCONSTRAINT ...\nAND ( JOIN { SLC , LT , CT } , CLASS_STATUS\
    \ = CITY_STATUS ) ;\n```\n\n这个例子的整体信息可以这样表述：在特定设计中丢失或保留 FD 的整个问题，实际上只是一个更普遍现象的特例：即，如果我们从某个设计\
    \ *D1* 开始，并将其映射到某个逻辑等价的设计 *D2*，那么通常该过程将涉及约束以及关系变量的某些重构，这（事实上）必然是显而易见的。\n\n## 4.\n\
    \n*假设：* 没有明星在同一部电影中扮演超过一个角色；没有电影有超过一个导演。（这些假设合理吗？）FDs：\n\n```\n{ S , M } → { R\
    \ }\n{ M }     → { D , Y }\n{ S }     → { B }\n{ B }     → { Z , C }\n{ Z , C\
    \ } → { H }\n```\n\n如果所有九个属性都组合在一个关系变量中，则该关系变量仅符合 1NF（`{S,M}` 是一个键）。BCNF 过程产生\
    \ `{S,M,R}`、`{M,D,Y}`、`{S,B}`、`{B,Z,C}` 和 `{Z,C,H}`。没有丢失任何 FD。\n\n# 7. FD 公理化\n\
    \n> *[那]真实而坚实的活的公理*\n> \n> ——弗朗西斯·培根：《新工具》（1620）\n\n我已经多次提到一点，即一些 FD 蕴含另一些；现在是时候更具体地说明了。然而，首先我需要介绍一些符号——这种符号（a）减少了形式化证明等所需的击键次数，并且（b）有时也能帮助人们“见林也见木”。\n\
    \n正如你可能记得的，我在第[5](#489629_2_En_5_Chapter.xhtml)章中陈述的 Heath 定理包含了以下句子：*令 XY 表示\
    \ X 和 Y 的并集，XZ 同理。* 我想介绍的符号基本上只是这个简单想法的扩展（它有点不合逻辑，但非常方便）。具体来说，该符号使用形式为 *XY* 的表达式来表示：\n\
    \n*   如果 *X* 和 *Y* 是单个属性名，则表示 {*X*} 和 {*Y*} 的并集\n*   如果 *X* 和 *Y* 是属性名集合，则表示 *X*\
    \ 和 *Y* 的并集\n*   如果 *X* 是单个属性名而 *Y* 表示这样一个名称的集合（或者如果 *X* 和 *Y* 的角色互换），则表示 {*X*}\
    \ 和 *Y* 的并集（或 *X* 和 {*Y*} 的并集）\n\n如果 *X* 表示单个属性，它还允许将 {*X*} 缩写为 *X*（例如，在 FD 中）。*注意：*\
    \ 为方便起见，我将从此刻起将此符号称为 *Heath 符号*（尽管必须澄清的是，Heath 本人在他的论文中并未实际使用它）。"
  raw: "## Answers\n\n1.  `CONSTRAINT ... WITH ( SJT := JOIN { TJ , TS } ) :`\n\n\
    `COUNT ( SJT ) =`\n\n`COUNT ( SJT { S , J } ) ;`\n\nOr, using the alternative\
    \ style for constraints described in the answer to Exercise 4.8 in Chapter [4](#489629_2_En_4_Chapter.xhtml):\n\
    \n1.  Let LT and CT be the projections of RX2A′ on {CLASS,STATUS} and {CITY,STATUS},\
    \ respectively. Then (a) {CLASS} and {CITY} will be foreign keys in RX2B′, referencing\
    \ LT and CT, respectively, and (b) the following multirelvar constraint will also\
    \ hold:\n\n```\n    CONSTRAINT ... WITH ( LTX := LT RENAME { STATUS AS X } ,\n\
    \    CTY := CT RENAME { STATUS AS Y } ) :\n    AND ( JOIN { RX2B′ , LTX , CTY\
    \ } , X = Y ) ;\n    ```\n\n2.  The first of the given FDs means {STREET,CITY,STATE}\
    \ is a key; the second means the relvar isn’t in BCNF. However, if we use Heath’s\
    \ Theorem to decompose it (on the basis of the functional dependency {ZIP} → {CITY,STATE})\
    \ into BCNF projections as follows—\n\n```\n    ZCT { ZIP , CITY , STATE }\n \
    \   KEY { ZIP }\n    ZR  { ZIP , STREET }\n    KEY { ZIP , STREET }\n    ```\n\
    \n—then we lose the FD {STREET,CITY,STATE} → {ZIP}. As a result, relvars ZCT and\
    \ ZR can’t be independently updated. (*Subsidiary exercise:* Develop some sample\
    \ values for ZCT and ZR to illustrate this point.) Of course, if we don’t perform\
    \ this decomposition, there’ll be some redundancy; to be specific, the fact that\
    \ a given zip code corresponds to a particular city and state will appear several\
    \ times. But does that redundancy cause problems? Given that the zip code for\
    \ a given city and state doesn’t change very often, the answer is “possibly, but\
    \ not very often.” (On the other hand, it’s not true that zip codes *never* change.)\n\
    \n3.  Here’s an irreducible cover for RX1:\n\n```\n    { SNO , PNO } → { QTY }\n\
    \    { SNO }       → { CITY }\n    { CITY }      → { STATUS }\n    ```\n\nThe\
    \ 3NF procedure yields {SNO,PNO,QTY}, {SNO,CITY}, and {CITY,STATUS}.\n\nNext,\
    \ RX3\\. An irreducible cover:\n\n```\n    { SNO }   → { CLASS }\n    { CLASS\
    \ } → { CITY }\n    { CITY }  → { STATUS }\n    ```\n\nThe 3NF procedure yields\
    \ {SNO,CLASS}, {CLASS,CITY}, and {CITY,STATUS}.\n\nFinally RX2\\. Irreducible\
    \ cover:\n\n```\n    { SNO }   → { CLASS }\n    { SNO }   → { CITY }\n    { CLASS\
    \ } → { STATUS }\n    { CITY }  → { STATUS }\n    ```\n\nThe 3NF procedure yields\
    \ {SNO,CLASS,CITY}, {CLASS,STATUS}, and {CITY,STATUS}. The interesting thing about\
    \ this example is that (as was shown in the body of the chapter) if we decompose\
    \ on the basis of the FD {SNO} → {CLASS,CITY}, we obtain {SNO,CLASS,CITY} and\
    \ {CLASS,CITY,STATUS} as the 3NF projection headings, and that’s *not* what we\
    \ get from the 3NF procedure. In fact, the result of the 3NF procedure requires\
    \ the following rather complicated multirelvar constraint (an equality dependency)\
    \ to be maintained:\n\n```\nCONSTRAINT ... JOIN { TJ , TS } KEY { S , J } ;\n\
    ```\n\n```\nCONSTRAINT ... JOIN { SLC , LT } = JOIN { SLC , CT } ;\n```\n\n(“for\
    \ a given supplier, class status = city status”; SLC, LT, and CT here denote the\
    \ projections of RX2 on {SNO,CLASS,CITY}, {CLASS,STATUS}, and {CITY,STATUS}, respectively).\
    \ The example thus illustrates the point that although the 3NF procedure is certainly\
    \ guaranteed to yield 3NF projections and not to lose any FDs, it probably shouldn’t\
    \ be followed too blindly.\n\n*Note:* Suppose we were to name the status attributes\
    \ in relvars LT and CT differently, thus:\n\n```\nLT { CLASS , CLASS_STATUS }\n\
    CT { CITY , CITY_STATUS }\n```\n\nThen the constraint that the two status values\
    \ must be equal for any given supplier might be stated thus:\n\n```\nCONSTRAINT\
    \ ... IS_EMPTY ( ( JOIN { SLC , LT , CT } )\nWHERE CLASS_STATUS ≠ CITY_STATUS\
    \ ) ;\n```\n\n(The **Tutorial D** expression IS_EMPTY (*rx*) returns TRUE if the\
    \ relation *r* denoted by the relational expression *rx* is empty and FALSE otherwise.)\
    \ Alternatively:\n\n```\nCONSTRAINT ...\nAND ( JOIN { SLC , LT , CT } , CLASS_STATUS\
    \ = CITY_STATUS ) ;\n```\n\nThe overall message of this example might be put this\
    \ way: This whole business of losing or preserving FDs in particular is really\
    \ just a special case of a more general phenomenon: namely, that if we start with\
    \ some design *D1* and map it into some logically equivalent design *D2*, then\
    \ in general that process will involve some restructuring of constraints as well\
    \ as of relvars, necessarily (as should in fact be obvious).\n\n1.  *Assumptions:*\
    \ No star plays more than one role in any given movie; no movie has more than\
    \ one director. (Are these assumptions reasonable?) FDs:\n\n```\n    { S , M }\
    \ → { R }\n    { M }     → { D , Y }\n    { S }     → { B }\n    { B }     → {\
    \ Z , C }\n    { Z , C } → { H }\n    ```\n\nIf all nine attributes are combined\
    \ in a single relvar, then that relvar is only in 1NF ({S,M} is a key). The BCNF\
    \ procedure yields {S,M,R}, {M,D,Y}, {S,B}, {B,Z,C}, and {Z,C,H}. No FDs are lost.\n\
    \nFootnotes [1](#489629_2_En_6_Chapter.xhtml#Fn1_source)   [2](#489629_2_En_6_Chapter.xhtml#Fn2_source)\
