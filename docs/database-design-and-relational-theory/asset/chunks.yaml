- fmt: '# 15. The End Is Not Yet


    > *Now, this is not the end. It is not even the beginning of the end.*

    >

    > *But it is, perhaps, the end of the beginning.*

    >

    > —Winston Churchill: *Speech at the Lord Mayor’s Day Luncheon, London* (November
    10th, 1942)


    > *Eternity’s a terrible thought.*

    >

    > *I mean, where’s it all going to end?*

    >

    > —Tom Stoppard: *Rosenkrantz and Guildenstern Are Dead* (1967)


    What a long strange trip it’s been ... In Part II of this book, we covered 1NF,
    2NF, 3NF, and BCNF (the last at some length); in Part III we covered 4NF and 5NF
    (the latter at considerable length); and in the previous two chapters we’ve met
    four more normal forms, ETNF, RFNF, SKNF, and 6NF (of which the last is easily
    the most important). But even that’s not the end of the story. In this chapter,
    just for completeness, I briefly describe or at least mention a few other normal
    forms that have been defined in the literature at one time or another.


    ## Domain-Key Normal Form


    Domain-key normal form (DK/NF) differs from all of the normal forms discussed
    in this book prior to this point in that it’s not defined in terms of FDs, MVDs,
    and JDs, as such, at all.^([^(198)](#fn198)) DK/NF is really a kind of “ideal”
    normal form: It’s desirable because, by definition, a relvar in DK/NF is guaranteed
    to be free of certain update anomalies; sadly, however, it’s not always achievable,
    nor has the question “Exactly when can it be achieved?” been answered. Be that
    as it may, let’s investigate.


    DK/NF is defined in terms of *domain constraints* and *key constraints*. Key constraints
    are already familiar, of course (they were defined formally in Chapter [5](#489629_2_En_5_Chapter.xhtml)).
    As for domain constraints, I remind you that *domain* is essentially just another
    word for *type* (see the answer to Exercise 2.4 in Chapter [2](#489629_2_En_2_Chapter.xhtml)).
    It follows that a domain constraint ought logically to be the same thing as a
    type constraint; in other words, it ought simply to be a specification of the
    set of values that constitute the type in question (see *SQL and Relational Theory*
    for further discussion of this concept). However, the term is being used in the
    present context in a slightly special sense. To be specific, a *domain constraint*,
    as that term is used here, is a constraint to the effect that values of a given
    attribute are taken not just from some prescribed domain, but rather from some
    prescribed subset of that domain. For example, there might be a constraint on
    the suppliers relvar `S` to the effect that `STATUS` values (which are integers,
    i.e., values of type `INTEGER`) must be in the range one to a hundred, inclusive.


    Here then are some definitions:


    - **Definition (domain-key normal form):** Relvar `R` is in domain-key normal
    form (DK/NF) if and only if every single-relvar constraint that holds in `R` is
    implied by the domain constraints and key constraints that hold in `R`.

    - **Definition (single-relvar constraint):** Any integrity constraint that can
    be tested by examining the pertinent relvar in isolation (i.e., without having
    to examine any other relvar in the database).^([^(199)](#fn199))


    Enforcing constraints on a DK/NF relvar is thus conceptually simple, since it’s
    sufficient to enforce just the pertinent domain and key constraints, and all constraints—not
    just FDs, MVDs, and JDs, but *all* single-relvar constraints that apply to the
    relvar in question—on the relvar will then be enforced automatically.


    DK/NF was first defined by Fagin in 1981,^([^(200)](#fn200)) and it was the DK/NF
    paper that first gave precise definitions for the terms *insertion anomaly* and
    *deletion anomaly*. I defined these notions in Chapter [10](#489629_2_En_10_Chapter.xhtml)
    (and referred to them again in Chapter [13](#489629_2_En_13_Chapter.xhtml)), but
    those previous definitions and discussions were framed in terms of JDs specifically.
    Here for the record are the general definitions (note that they refer to single-relvar
    constraints in general, not just ones that happen to be FDs or MVDs or JDs):^([^(201)](#fn201))


    - **Definition (insertion anomaly):** Relvar `R` suffers from an insertion anomaly
    if and only if there exists a legal value `r` for `R` and a tuple `t` with the
    same heading as `R` such that the relation obtained by appending `t` to `r` satisfies
    `R`’s key constraints but violates some other single-relvar constraint on `R`.

    - **Definition (deletion anomaly):** Relvar `R` suffers from a deletion anomaly
    if and only if there exists a legal value `r` for `R` and a tuple `t` of `r` such
    that the relation obtained by removing `t` from `r` violates some single-relvar
    constraint on `R`.


    The DK/NF paper proves that a relvar in DK/NF can’t suffer from insertion or deletion
    anomalies as just defined. (Actually it proves a stronger result: viz., that a
    relvar can’t suffer from such anomalies if *and only if* it’s in DK/NF.)


    Finally, we have the following theorem:


    - **Theorem:** So long as every pertinent attribute can take on at least two distinct
    values, DK/NF implies 5NF.


    That is (speaking a trifle loosely), every DK/NF relvar is in 5NF—though it’s
    not necessarily in 6NF, of course. As noted in Chapter [13](#489629_2_En_13_Chapter.xhtml),
    in fact (in a footnote), DK/NF and 5NF coincide in the—sadly, probably unlikely—special
    case where the only constraints that hold are FDs and JDs specifically.


    ## Elementary Key Normal Form


    Elementary key normal form (EKNF) was introduced by Zaniolo in 1982.^([^(202)](#fn202))
    Here’s the definition:


    - **Definition (elementary key normal form):** Relvar `R` is in elementary key
    normal form (EKNF) if and only if, for every nontrivial FD `X → Y` that holds
    in `R`, either (a) `X` is a superkey or (b) `Y` is a subkey of some elementary
    key—where key `K` is elementary if and only if there exists some attribute `A`
    of `R` such that the FD `K → {A}` is nontrivial and irreducible.


    It’s immediate from this definition that EKNF falls strictly between 3NF and BCNF;
    that is, BCNF implies EKNF, EKNF implies 3NF, and the reverse implications don’t
    hold. As for an example: Well, as noted elsewhere in this book, with the normal
    forms it’s usually more instructive to show a counterexample rather than an example
    per se. Suppose, therefore, that:


    1.  Our usual shipments relvar `SP` has, instead of the usual `QTY` attribute,
    an attribute `SNAME`, representing the name of the applicable supplier.

    2.  Supplier names are necessarily unique (i.e., no two distinct suppliers ever
    have the same name at the same time).


    Then this revised version of `SP` has two keys, `{SNO,PNO}` and `{SNAME,PNO}`.
    However, these keys aren’t elementary keys, because the only nontrivial FDs that
    hold with one of these keys as determinant are `{SNO,PNO} → {SNAME}` and `{SNAME,PNO}
    → {SNO}`, and these FDs are both reducible (in both cases `PNO` can be dropped
    from the determinant without loss). So the relvar is subject to two nontrivial
    FDs, `{SNO} → {SNAME}` and `{SNAME} → {SNO}`, in which the determinant isn’t a
    superkey and the dependant isn’t a subkey of an elementary key. So this version
    of relvar `SP` isn’t in EKNF (though it is in 3NF).


    The stated intent of EKNF is “to capture the salient qualities of both 3NF and
    BCNF” while avoiding the problems of both (namely, that 3NF is “too forgiving”
    and BCNF is “prone to computational complexity”). That said, I should say too
    that EKNF isn’t much referenced in the literature.'
