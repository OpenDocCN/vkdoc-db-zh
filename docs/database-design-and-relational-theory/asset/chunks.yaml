  trans: '

    ## 一个激励性示例


    为简化起见，让我们假设函数依赖（FD）`{CITY} → {STATUS}` 在关系变量 `S` 中*不再*成立（*请注意，在本章后续内容中，我将一直沿用这一修正后的假设*）。现在考虑对该关系变量进行如下分解：


    ```

    SNC { SNO , SNAME , CITY }

    KEY { SNO }

    STC { SNO , STATUS , CITY }

    KEY { SNO }

    ```


    示例值如图 16-1 所示。如图所示，这种分解相当不合理（尤其要注意，给定供应商位于给定城市的事实出现了两次），然而它却遵守了所有的规范化原则——两个投影都是
    5NF；分解是无损的；重建过程需要这两个投影；并且依赖关系得到了保留。


    ![`../images/489629_2_En_16_Chapter/489629_2_En_16_Fig1_HTML.jpg`](img/489629_2_En_16_Fig1_HTML.jpg)


    图 16-1

    关系变量 `SNC` 和 `STC` — 示例值


    直观上看，上述设计的问题显而易见：元组 `(s,n,c)` 出现在 `SNC` 中当且仅当元组 `(s,t,c)` 出现在 `STC` 中；等价地说，元组
    `(s,c)` 出现在 `SNC` 在 `{SNO, CITY}` 上的投影中当且仅当同一个元组 `(s,c)` 出现在 `STC` 在 `{SNO, CITY}`
    上的投影中。稍正式一点表述，我们可以说该设计受制于以下相等依赖（EQD）——


    ```

    CONSTRAINT ... SNC { SNO , CITY } = STC { SNO , CITY } ;

    ```


    ——而这个 EQD 使冗余变得明确。


    然而，需要重申的是，上述设计遵守了*所有*公认的规范化原则。由此可见，仅靠这些原则是不够的——我们需要其他东西来告诉我们设计错在哪里（*形式化*的其他东西，即；我们都从非形式化角度知道问题所在）。换句话说，规范化准则提供了一套形式化原则来指导我们减少冗余，但正如例子清楚表明的，这套原则本身是不充分的。我们需要另一个原则；换言之，正如我一直强调的，我们需要更多的科学。


    ## 一个更简单的例子


    为了了解我们需要的原则可能是什么样子，让我们考虑另一个更简单（？）的例子。如你所知，规范化本身——特别是像上一节 `SNC` / `STC` 例子中使用的规范化——与关系变量的“垂直”分解（即通过投影进行的分解）有关。但“水平”分解（即通过限制进行的分解）显然也是可能的。考虑图
    16-2 所示的设计，其中零件关系变量 `P` 被水平地——实际上是被分区——拆分为两个关系变量，一个（“轻零件”，`LP`）包含重量小于 17.0 磅的零件，另一个（“重零件”，`HP`）包含重量大于或等于
    17.0 磅的零件。^(²⁰⁷)


    ![`../images/489629_2_En_16_Chapter/489629_2_En_16_Fig2_HTML.jpg`](img/489629_2_En_16_Fig2_HTML.jpg)


    图 16-2

    关系变量 `LP` 和 `HP` — 示例值


    谓词如下：


    *   `LP`：*零件 `PNO` 的名称为 `PNAME`，具有颜色 `COLOR` 和重量 `WEIGHT`（小于 17.0 磅），并存储在城市 `CITY`。*

    *   `HP`：*零件 `PNO` 的名称为 `PNAME`，具有颜色 `COLOR` 和重量 `WEIGHT`（大于或等于 17.0 磅），并存储在城市
    `CITY`。*


    请注意，原始关系变量 `P` 可以通过取关系变量 `LP` 和 `HP` 的（不相交）并集来恢复。


    我们为什么可能想进行这样的水平分解？坦率地说，我不知道有任何好的逻辑理由这样做，当然这并非说这样的理由不存在。尽管如此，请注意我们可以，并且应该，陈述两个适用于这些关系变量的约束：


    ```

    CONSTRAINT LPC AND ( LP , WEIGHT < 17.0 ) ;

    CONSTRAINT HPC AND ( HP , WEIGHT ≥ 17.0 ) ;

    ```


    （我提醒你回顾第 2 章，`Tutorial D` 表达式 `AND (rx, bx)`，其中 `rx` 是关系表达式，`bx` 是布尔表达式，当且仅当由
    `bx` 表示的条件对由 `rx` 表示的关系中的每个元组求值为 `TRUE` 时，它返回 `TRUE`。）


    因此，我们在这里至少可以说遇到了一种有点不寻常的情况。具体来说，对于关系变量 `LP` 和 `HP` 中的每一个，部分谓词可以并且应该以显式约束的形式被形式化地捕获。实际上，需要陈述和强制执行此类约束这一事实本身可能就被视为不利于该设计。但即使水平分解在逻辑层面上因此被视为禁忌，在物理层面上进行这种分解仍然有很多实际原因（与恢复、安全性、性能和其他此类问题有关）。因此，鉴于在当今的
    DBMS 中，逻辑层和物理层往往步调一致——即，这些 DBMS 中的数据独立性远未达到应有的程度——由此可见，在逻辑层面上进行这种分解也可能有实际原因，即使没有逻辑原因，至少根据当前实现的技术水平来看是这样。


    现在，无论你对上述论点有何看法，至少图 16-2 的设计没有明显不妥之处（嗯，无论如何，为了这个例子，让我们姑且这么认为）。^(²⁰⁸) 但假设我们将关系变量
    `LP` 定义得稍有不同；具体来说，假设我们将其定义为包含重量小于*或等于* 17.0 磅的零件（当然，相应地调整谓词和约束 `LPC`）。图 16-3 是图
    16-2 的修订版，展示了采用这种修订设计后发生的情况。


    ![`../images/489629_2_En_16_Chapter/489629_2_En_16_Fig3_HTML.jpg`](img/489629_2_En_16_Fig3_HTML.jpg)


    图 16-3

    关系变量 `LP`（修订后）和 `HP` — 示例值

