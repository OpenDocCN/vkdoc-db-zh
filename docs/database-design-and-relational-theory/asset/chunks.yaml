    \ } ) ;\n    ```\n\n*Explanation:* What this constraint says is that if we join\
    \ SNC and ST, we get a result—call it SNCT—in which the number of distinct cities\
    \ is equal to the number of distinct city / status pairs. And the fact that this\
    \ latter property holds is equivalent to saying that the FD {CITY} → {STATUS}\
    \ holds in that join, and hence in the original relvar S also (since the decomposition\
    \ was nonloss, meaning S and that join SNCT are logically identical).\n\nSo we’ve\
    \ “lost” an FD. What are the implications? Well, certainly the multirelvar constraint\
    \ that replaces it is harder to state, as we’ve just seen. More to the point,\
    \ perhaps, it’s harder to enforce: harder, that is, than it would have been with\
    \ the preferred decomposition into projections SNC and CT, as illustrated in Figure\
    \ [3-2](#489629_2_En_3_Chapter.xhtml#Fig2) in Chapter [3](#489629_2_En_3_Chapter.xhtml).^([^(80)](#fn80))\
    \ For example, suppose we update relvar SNC to change the city for supplier S1\
    \ from London to Athens; then we must also update relvar ST to change the status\
    \ for supplier S1 from 20 to 30—because if we don’t, then joining SNC and ST back\
    \ together will produce a result that isn’t a legitimate value for relvar S. (By\
    \ contrast, if we update relvar SNC to change the city for supplier S2 from Paris\
    \ to Athens, then we *don’t* have to update relvar ST as well—but we still have\
    \ to inspect relvar ST in order to determine that fact.)\n\nIt might be possible,\
    \ given a well architected DBMS, to get the system to do that necessary inspection\
    \ of relvar ST “automatically,” instead of the user having to do it. It might\
    \ even be possible to get the system to perform any necessary additional updates\
    \ “automatically,” too. Even in such a system, however, it’s still the case that\
    \ the constraint is harder to enforce (i.e., more work still has to be done, even\
    \ if it’s done by the system and not the user). In any case, such possibilities\
    \ are just a pipedream at the time of writing—today’s commercial products mostly\
    \ don’t even allow multirelvar constraints to be stated, in general, let alone\
    \ enforce them; the foregoing possibilities are out of reach today, and dealing\
    \ with (and in particular enforcing) such constraints is thus the user’s responsibility.\n\
    \nSo the message is: Try to choose a decomposition that preserves FDs instead\
    \ of one that loses them. (In the case at hand, replacing the projection on {SNO,STATUS}\
    \ by that on {CITY,STATUS} solves the problem.) Loosely speaking, in other words,\
    \ if the FD *X* → *Y* holds in the original relvar, try not to choose a decomposition\
    \ in which *X* winds up in one relvar and *Y* in another. *Note:* Of course, I’m\
    \ assuming here that the decomposition isn’t being done on the basis of that FD\
    \ *X* → *Y* itself—because if it is, we’ll effectively wind up with two *X*’s,\
    \ one of which will be in the same relvar as *Y* (necessarily so) and the other\
    \ won’t. I’m also assuming, tacitly, that *X* → *Y* is part of what’s called an\
    \ *irreducible cover* for the total set of FDs that hold in the original relvar.\
    \ I’ll be discussing irreducible covers later in this chapter."
  trans: '

    # 6. 保持函数依赖


    > *大自然确实要求*

    >

    > *她进行保存的时候*

    >

    > —威廉·莎士比亚：《亨利八世》（1613 年）


    再次考虑我们常用的关系变量 `S`。由于 `{SNO}` 是一个键，该关系变量显然受函数依赖 `{SNO} → {STATUS}` 约束。因此，取 `X`
    为 `{SNO}`，`Y` 为 `{STATUS}`，`Z` 为 `{SNAME,CITY}`，希斯定理告诉我们，可以将该关系变量分解为关系变量 `SNC`
    和 `ST`，其中 `SNC` 的标题为 `{SNO,SNAME,CITY}`，`ST` 的标题为 `{SNO,STATUS}`。图 6-1 显示了对应于图
    3-1 中所示的 `S` 的值的 `SNC` 和 `ST` 的示例值：


    ![../images/489629_2_En_6_Chapter/489629_2_En_6_Fig1_HTML.jpg](img/489629_2_En_6_Fig1_HTML.jpg)


    图 6-1


    关系变量 `SNC` 和 `ST` — 示例值


    在此分解中：


    -   关系变量 `SNC` 和 `ST` 都符合 BCNF——`{SNO}` 是两者的键，并且在这两个关系变量中成立的非平凡函数依赖只是“从超键指出的箭头”。

    -   此外，该分解肯定是无损的（实际上由希斯定理保证）——如果我们连接 `SNC` 和 `ST`，就能恢复回 `S`。

    -   然而，*函数依赖 `{CITY} → {STATUS}` 已经丢失*——我的意思是，当然，它已被某个特定的多关系变量约束所取代，如前一章所述。^(⁷⁹)
    所讨论的多关系变量约束可以表述如下：


    ```sql

    CONSTRAINT ... WITH ( SNCT := JOIN { SNC , ST } ) :

    COUNT ( SNCT { CITY } ) =

    COUNT ( SNCT { CITY , STATUS } ) ;

    ```


    *解释：* 这个约束说明，如果我们连接 `SNC` 和 `ST`，会得到一个结果——称之为 `SNCT`——其中不同城市的数量等于不同的城市/状态对的数量。而后一性质成立，等同于说函数依赖
    `{CITY} → {STATUS}` 在该连接中成立，因此在原始关系变量 `S` 中也成立（因为分解是无损的，意味着 `S` 和那个连接 `SNCT` 在逻辑上是相同的）。


    所以我们“丢失”了一个函数依赖。这有什么影响？嗯，当然，替换它的多关系变量约束更难表述，正如我们刚才看到的。也许更重要的是，它更难实施：即，比重构为投影 `SNC`
    和 `CT` 的首选分解更难实施，如第 3 章图 3-2 所示。^(⁸⁰) 例如，假设我们将关系变量 `SNC` 更新，将供应商 `S1` 的城市从伦敦改为雅典；那么我们也必须更新关系变量
    `ST`，将供应商 `S1` 的状态从 20 改为 30——因为如果我们不这样做，那么将 `SNC` 和 `ST` 连接回去将产生一个不是关系变量 `S`
    的合法值的结果。（相比之下，如果我们将关系变量 `SNC` 更新，将供应商 `S2` 的城市从巴黎改为雅典，那么我们*不*必同时更新关系变量 `ST`——但我们仍然必须检查关系变量
    `ST` 以确定这一事实。）


    如果有一个架构良好的 DBMS，也许可以让系统“自动”完成对关系变量 `ST` 的必要检查，而不必由用户手动完成。甚至可能让系统也“自动”执行任何必要的额外更新。然而，即使在这样的系统中，约束仍然更难实施（即，即使由系统而非用户完成，仍然需要做更多的工作）。无论如何，在撰写本文时，这些可能性只是空想——当今的商业产品大多甚至不允许一般性地声明多关系变量约束，更不用说实施它们了；前述可能性目前无法实现，因此处理（特别是实施）此类约束是用户的责任。


    所以，传达的信息是：尽量选择能保持函数依赖的分解，而不是丢失它们的分解。（在当前情况下，将对 `{SNO,STATUS}` 的投影替换为对 `{CITY,STATUS}`
    的投影就解决了问题。）粗略地说，换句话说，如果函数依赖 `X → Y` 在原始关系变量中成立，尽量不要选择一个分解，其中 `X` 最终落在一个关系变量中，而
    `Y` 落在另一个中。*注意：* 当然，我这里假设分解不是基于那个函数依赖 `X → Y` 本身进行的——因为如果是，我们实际上会得到两个 `X`，其中一个将与
    `Y` 在同一个关系变量中（必然如此），而另一个则不会。我还默认假设，`X → Y` 是所谓原始关系变量中成立的总函数依赖集的*不可约覆盖*的一部分。本章稍后将讨论不可约覆盖。

    '
- fmt: '## An Unfortunate Conflict


    FD 保留的基本思想相当直接；然而，不幸的是，事情存在许多复杂情况，关于这个主题还有更多需要说明的内容。作为温和地介绍其中一些复杂情况的方式，我将提出一个可能被某些人视为病态的例子。我们有一个关系变量
    `SJT`，其属性为 `S`（学生）、`J`（科目）和 `T`（教师），谓词是*学生 `S` 由教师 `T` 教授科目 `J`*。以下业务规则适用：^([^(81)](#fn81))


    *   对于每个科目，学习该科目的每个学生只由一位教师教授。

    *   每位教师只教授一个科目。

    *   每位学生学习多个科目，因此通常由多位教师教授。

    *   每个科目通常有多个学生学习。

    *   每个科目通常由多位教师教授。

    *   同一科目的不同学生可能由同一位教师教授该科目，也可能不是。


    符合这些规则的关系变量 `SJT` 的一个样本值如图 6-2 所示：


    ![../images/489629_2_En_6_Chapter/489629_2_En_6_Fig2_HTML.jpg](images/489629_2_En_6_Chapter/489629_2_En_6_Fig2_HTML.jpg)


    图 6-2 关系变量 `SJT` 的样本值


    关系变量 `SJT` 的函数依赖是什么？根据第一条业务规则，我们有 `{S,J} → {T}`。根据第二条，我们有 `{T} → {J}`。对剩余规则的仔细分析表明，除了平凡的或可归约的（或两者兼有）函数依赖外，没有其他函数依赖成立。因此，成立的唯一的非平凡、不可归约的函数依赖是这两个：


    ```

    { S , J } → { T }

    { T }     → { J }

    ```


    那么，键是什么？嗯，`{S,J}` 是一个键，因为整个属性集显然函数依赖于 `{S,J}`，而不依赖于 `{S,J}` 的任何真子集。此外，`{S,T}`
    也是一个键，因为：


    1.  给定函数依赖 `{T} → {J}` 成立，整个属性集函数依赖于 `{S,T}`。

    2.  同时，给定函数依赖 `{S} → {J}` 和 `{T} → {S}` *不* 成立，整个属性集不函数依赖于 `{S,T}` 的任何真子集。


    因此存在两个键：`{S,J}` 和 `{S,T}`。^([^(82)](#fn82)) 或许更重要的是，`{T}` *不是* 一个键，因此关系变量 `SJT`
    受制于一个并非“从一个键出发的箭头”的函数依赖（更正式地说，它不是由键所蕴含的）。因此，该关系变量不属于 BCNF，尽管它属于 3NF。（*练习：* 验证此说法。）并且它存在冗余；例如，给定图
    6-2 所示的样本值，White 教授教授数学这一事实出现了两次。正如您所预料的那样，它也存在更新异常；例如，再次参考图 6-2，我们无法删除 Jones
    正在学习物理的事实，同时不丢失 Brown 教授教授物理这一信息。


    现在，我们可以通过适当地分解关系变量来解决这些问题。将 Heath 定理应用于函数依赖 `{T} → {J}`（令 `X`、`Y` 和 `Z` 分别为 `{T}`、`{J}`
    和 `{S}`），我们得到以下无损分解：


    ```

    TJ { T , J }

    KEY { T }

    TS { T , S }

    KEY { T , S }

    ```


    我将留下另一个练习由您来完成：（a）显示对应于图 6-2 所示 `SJT` 值的这两个关系变量的值，（b）证明这些关系变量属于 BCNF，以及（c）验证该分解确实避免了上述冗余和更新异常。特别要注意的是，函数依赖
    `{T} → {J}` 在此分解中成为了一个键约束；而在原始设计中，它并非键约束，因此必须单独陈述和强制执行（我指的是在键约束之上）。


    到目前为止，一切顺利。但还有另一个问题。事实是，尽管分解为 `TJ` 和 `TS` 确实解决了某些问题，但不幸的是它引入了其他问题。具体来说，函数依赖


    ```

    { S , J } → { T }

    ```


    丢失了（它肯定不是由分解结果中唯一成立的非平凡函数依赖 `{T} → {J}` 所蕴含的）。因此，关系变量 `TJ` 和 `TS` 无法被独立更新。例如，尝试将元组


    ```

    ( Smith , Prof. Brown )

    ```


    插入 `TS` 必须被拒绝，因为 Brown 教授教授物理，而 Smith 已经由 Green 教授教授物理；然而，如果不检查 `TJ`，就无法检测到这个事实。


    总而言之，这个例子表明：在无损分解中，我们通常追求两个目标，即 BCNF 投影和 FD 保留，遗憾的是，这两个目标可能相互冲突。换句话说，并不总是能同时实现两者。


    在本章早期的一个草稿中，我在此时写道：


    *   那么，我们该放弃哪个目标呢？嗯，如果我能告诉你，我会的，但我不能。`SJT` 例子表明，规范化理论尽管重要，但其本身还不够；我的意思是，有些问题它无法回答。所以启示是：*我们需要更多的科学！*
    规范化理论当然是科学的，但它不能解决所有设计问题。


    然而，在一位审稿人的提示下，我得出了结论：上述段落可能言过其实。在这里，我们与其说需要更多的科学，不如说需要更好的实现！也就是说，在类似当前讨论的情况下，容忍一个未达到完全规范化的设计的主要论据，在于当今的数据库管理系统处理像示例中“丢失”的函数依赖这样的多关系变量约束非常笨拙。因此，让我在此明确表示，在存在冲突的情况下，依赖保留很可能是需要放弃的目标。^([^(83)](#fn83))'
  raw: '## An Unfortunate Conflict


    The basic idea of FD preservation is fairly straightforward; unfortunately, however,
    there are complications, and it turns out that there’s quite a bit more that needs
    to be said on the subject. By way of a gentle introduction to some of those complications,
    I’ll present what some might regard as a pathological example. We’re given a relvar
    SJT with attributes S (student), J (subject), and T (teacher), and predicate *Student
    S is taught subject J by teacher T*. The following business rules apply:^([^(81)](#fn81))


    *   For each subject, each student of that subject is taught by only one teacher.


    *   Each teacher teaches only one subject.


    *   Each student studies several subjects, and hence is taught by several teachers
    (in general).


    *   Each subject is studied by several students (in general).


    *   Each subject is taught by several teachers (in general).


    *   Distinct students of the same subject might or might not be taught that subject
    by the same teacher.


    A sample value for this relvar that conforms to these rules is shown in Figure
    [6-2](#489629_2_En_6_Chapter.xhtml#Fig2):


    ![../images/489629_2_En_6_Chapter/489629_2_En_6_Fig2_HTML.jpg](images/489629_2_En_6_Chapter/489629_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Sample value for relvar SJT


    What are the FDs for relvar SJT? From the first business rule, we have {S,J} →
    {T}. From the second, we have {T} → {J}. A careful analysis of the remaining rules
    shows that no other FDs hold other than ones that are either trivial or reducible
    (or both). Thus, the only nontrivial, irreducible FDs that hold are these two:


    ```

    { S , J } → { T }

    { T }     → { J }

    ```


    So what are the keys? Well, {S,J} is a key, since the entire heading is clearly
    functionally dependent on {S,J} and not on any proper subset of {S,J}. Also, {S,T}
    is a key, because:


    1.  It’s certainly the case, given that the FD {T} → {J} holds, that the entire
    heading is functionally dependent on {S,T}.


    2.  It’s also the case, given that the FDs {S} → {J} and {T} → {S} do *not* hold,
    that the entire heading isn’t functionally dependent on any proper subset of {S,T}.


    So there are two keys, {S,J} and {S,T}.^([^(82)](#fn82)) Perhaps more to the point,
    {T} is *not* a key, and so relvar SJT is subject to an FD that’s not “an arrow
    out of a key” (i.e., it’s not implied by keys, to state the matter a trifle more
    formally). As a consequence, the relvar isn’t in BCNF, though it is in 3NF. (*Exercise:*
    Check this claim.) And it suffers from redundancy; for example, given the sample
    value shown in Figure [6-2](#489629_2_En_6_Chapter.xhtml#Fig2), the fact that
    Professor White teaches Math appears twice. As you would expect, therefore, it
    also suffers from update anomalies; for example, with respect to Figure [6-2](#489629_2_En_6_Chapter.xhtml#Fig2)
    again, we can’t delete the fact that Jones is studying Physics without losing
    the information that Professor Brown teaches Physics.


    Now, we can get over these problems by decomposing the relvar appropriately. Applying
    Heath’s Theorem to the FD {T} → {J} (take *X*, *Y*, and *Z* to be {T}, {J}, and
    {S}, respectively), we obtain the following nonloss decomposition:


    ```

    TJ { T , J }

    KEY { T }

    TS { T , S }

    KEY { T , S }

    ```


    I’ll leave it as another exercise for you (a) to show the values of these two
    relvars corresponding to the value of SJT shown in Figure [6-2](#489629_2_En_6_Chapter.xhtml#Fig2),
    (b) to show that these relvars are in BCNF, and (c) to check that the decomposition
    does in fact avoid the redundancy and update anomalies mentioned above. Observe
    in particular that the FD {T} → {J} becomes a key constraint in this decomposition;
    in the original design, by contrast, it wasn’t, and so it had to be stated and
    enforced separately (over and above the key constraints, I mean).


    So far, so good. But there’s another problem. The fact is, although the decomposition
    into TJ and TS does indeed solve certain problems, it unfortunately introduces
    others. To be specific, the FD


    ```

    { S , J } → { T }

    ```


    is lost (certainly it isn’t implied by the FD {T} → {J}, which is the only nontrivial
    FD to hold in the result of the decomposition). As a consequence, relvars TJ and
    TS can’t be independently updated. For example, an attempt to insert the tuple


    ```

    ( Smith , Prof. Brown )

    ```


    into TS must be rejected, because Professor Brown teaches Physics and Smith is
    already being taught Physics by Professor Green; yet this fact can’t be detected
    without inspecting TJ.


    To sum up, what the example shows is as follows: There are two objectives we typically
    aim for in nonloss decomposition, BCNF projections and FD preservation, and, sadly,
    these objectives can be in conflict with one another. In other words, it isn’t
    always possible to achieve both.


    Now, at this point in an earlier draft of this chapter, I wrote the following:


    *   So which objective do we give up on? Well, I’d tell you if I could, but I
    can’t. What the SJT example demonstrates is that the theory of normalization,
    important though it is, isn’t enough as it stands; I mean, there are questions
    it doesn’t answer. So the message is: *We need more science!* Normalization theory
    is certainly scientific, but it doesn’t solve all design problems.


    At the prompting of one of my reviewers, however, I’ve come to the conclusion
    that the foregoing paragraph is probably overstated. It’s not so much more science
    we need here, it’s better implementations! That is, the main argument for tolerating
    a less than properly normalized design, in cases like the one at hand, is the
    fact that today’s DBMSs make it quite awkward to deal with multirelvar constraints
    like the “lost” FD in the example. So let me set a stake in the ground and state
    for the record that dependency preservation is probably the objective to give
    up on, in those cases in which there’s a conflict.^([^(83)](#fn83))'
  trans: '## 一个不幸的冲突


