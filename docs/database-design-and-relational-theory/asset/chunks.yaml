- fmt: 'For example, let `PLUS` be a relvar with attributes `A`, `B`, and `C` (so
    the degree is three), and let the relvar predicate be `A + B = C`. Then `PLUS`
    is in 5NF, and it has three keys (viz., `AB`, `BC`, and `CA`, to use Heath notation
    once again); however, none of those keys is of degree less than two, and `PLUS`
    is thus also in 6NF.


    By the way, please don’t misunderstand me here—I’m *not* saying that relvars should
    always be in 6NF, or that normalization should always be carried as far as 6NF.
    Sometimes some lower normal form (5NF, say) is at least adequate. What’s more,
    to repeat something I said in Chapter [8](#489629_2_En_8_Chapter.xhtml), a design
    can be fully normalized (meaning the relvars are all in 5NF, or even 6NF) and
    yet still be bad. For example, the projections of the suppliers relvar `S` on
    `{SNO,SNAME}`, `{SNO,STATUS}`, and `{SNO,CITY}` are all in 6NF, and yet a design
    consisting of those three projections is probably not a good one, because (as
    we saw in Chapter [6](#489629_2_En_6_Chapter.xhtml)) it loses an FD.


    Another point to consider is that replacing a 5NF relvar by 6NF projections will
    probably lead to the need to maintain certain equality dependencies (EQDs). Recall
    from Chapter [3](#489629_2_En_3_Chapter.xhtml) that an EQD is a constraint to
    the effect that certain projections of certain relvars must be equal (speaking
    a trifle loosely). For example, if we decompose relvar `P` as discussed above
    into its projections `PN`, `PL`, `PW`, and `PC`, then the following EQDs will
    probably apply:^([^(190)](#fn190))


    ```

    CONSTRAINT ... PL { PNO } = PN { PNO } ;

    CONSTRAINT ... PW { PNO } = PN { PNO } ;

    CONSTRAINT ... PC { PNO } = PN { PNO } ;

    ```


    On the other hand, as explained elsewhere,^([^(191)](#fn191)) decompositions like
    the one under discussion can be a good basis for dealing with missing information.
    Suppose every part does always have a known name but doesn’t necessarily have
    a known color, weight, or city. Then a part with no known color will simply have
    no tuple in relvar `PL` (and similarly for weights and cities and relvars `PW`
    and `PC`, respectively). Of course, the equality dependencies will then become
    *inclusion* dependencies (actually foreign key constraints), from `PL` to `PN`,
    `PW` to `PN`, and `PC` to `PN`, respectively.


    The net of the foregoing discussion is as follows (I’ll express it in terms of
    the parts example, just for definiteness): If there are two or more properties,
    say name and color, that every part always has, then separating those two properties
    into distinct projections is probably a bad idea; but if some property is “optional”—in
    other words, if it has the potential to be “missing” or unknown for some reason—then
    placing that property in a relvar of its own is probably a good idea.


    ## Sixth Normal Form for Temporal Data


    Temporal data is a huge subject in its own right, of course, and I can give only
    a very superficial introduction to it here; however, I’d like to cover enough
    to explain, at least informally, what the generalized version of 6NF is all about.
    Consider Figure [14-1](#489629_2_En_14_Chapter.xhtml#Fig1), which shows a sample
    value for a relvar called `S_DURING`, with predicate as follows:


    > *Supplier `SNO` was under contract throughout interval `DURING`.*


    For example, we see from the figure that (among other things) supplier `S1` was
    under contract throughout the interval from “day 4” (`d04`) to “day 7” (`d07`),
    inclusive.


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig1_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Fig1_HTML.jpg)

    *Figure 14-1 Relvar `S_DURING`—sample value*


    As the example suggests, intervals are crucial to temporal data support. However,
    the interval notion is actually of much wider applicability, cropping up as it
    does in a huge variety of practical situations. For example, tax brackets (e.g.,
    $50,000–$75,000) can be thought of as intervals, intervals that involve money
    values instead of date or time values. Despite the fact that the title of the
    present section refers to temporal data as such, therefore, please be aware that
    all of the concepts to be discussed—not just the interval concept as such, but
    all of the various related concepts—are of much more general applicability and
    usefulness. (As a matter of fact I toyed with the idea of naming the section “Sixth
    Normal Form for Interval Data,” a title that would really be more appropriate
    in some ways, though perhaps less imediately understandable.)


    Now, the relation in Figure [14-1](#489629_2_En_14_Chapter.xhtml#Fig1) clearly
    exhibits some redundancy; for example, it tells us twice that supplier `S1` was
    under contract on day 6. It also exhibits a kind of *circumlocution*; for example,
    it takes three tuples to tell us what it could have told us with just one, viz.,
    that supplier `S1` was under contract throughout the interval [`d04`:`d10`].^([^(192)](#fn192))
    By contrast, the relation shown in Figure [14-2](#489629_2_En_14_Chapter.xhtml#Fig2)
    contains the same information as—i.e., is *information equivalent* to^([^(193)](#fn193))—the
    one in Figure [14-1](#489629_2_En_14_Chapter.xhtml#Fig1) but exhibits no such
    redundancy or circumlocution:


    ![../images/489629_2_En_14_Chapter/489629_2_En_14_Fig2_HTML.jpg](images/489629_2_En_14_Chapter/489629_2_En_14_Fig2_HTML.jpg)

    *Figure 14-2 Packed form of relation in Figure 14-1*


    The relation in Figure [14-2](#489629_2_En_14_Chapter.xhtml#Fig2) is the *packed
    form* of the one in Figure [14-1](#489629_2_En_14_Chapter.xhtml#Fig1), and it
    can be obtained from that one by means of a new relational operator called `PACK`,
    as follows:


    ```

    PACK S_DURING ON ( DURING )

    ```


    In effect, what this expression does is this: For each supplier represented in
    the current value of relvar `S_DURING`, it combines into a single interval any
    `DURING` values that either overlap or meet. For example, with reference to Figures
    [14-1](#489629_2_En_14_Chapter.xhtml#Fig1) and [14-2](#489629_2_En_14_Chapter.xhtml#Fig2):


    *   In the case of supplier `S1`, the intervals [`d04`:`d07`] and [`d05`:`d10`]
    overlap, and so they can be combined to form the interval [`d04`:`d10`].

    *   In the case of supplier `S2`, the intervals [`d05`:`d06`] and [`d07`:`d08`]
    meet, and so they can be combined to form the interval [`d05`:`d08`].


    *Note:* The “other” interval for `S1`, viz., the interval [`d09`:`d09`], effectively
    just gets absorbed into that combined interval [`d04`:`d10`]. By contrast, the
    “other” interval for supplier `S2`, viz., the interval [`d03`:`d03`], can’t be
    combined with any other interval in this way and thus remains unaffected.'
