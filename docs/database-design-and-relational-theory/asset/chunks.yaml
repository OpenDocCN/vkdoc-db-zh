    unequivocally either true or false. In the case at hand, of course, it’s true;
    but if we substituted, say, 3 and 7 instead of 8 and 5 as the pertinent arguments,
    the resulting proposition would be false.


    Now let me get back to the predicate for table EMP. For that predicate the parameters
    are, as previously stated, ENO, ENAME, DNO, and SALARY, and they stand for values
    of (again let’s agree for the sake of the example) types CHAR, CHAR, CHAR, and
    MONEY, respectively. (See the next section for more on the question of data types.)
    Now suppose we invoke this function—i.e., suppose we *instantiate this predicate*,
    as the logicians say—and substitute the arguments E4, Evans, D8, and 70K, respectively,
    for the parameters. We obtain the following proposition:


    > *The person with employee number E4 is an employee of the company, is named
    Evans, works in the department with department number D8, and is paid salary 70K.*


    And—here comes the point—*the corresponding row (E4, Evans, D8, 70K) will appear
    in the EMP table if and only if this particular proposition is true*. From a logical
    point of view, in fact, that’s exactly what a “table” is: It’s a set of rows,
    where the rows in question consist of all and only those rows whose column values
    form the arguments to a true instantiation of some specified predicate—and that
    specified predicate is, precisely, the “table predicate” for the table in question.


    Another way of saying the same thing is this (the following constitutes what’s
    usually known as *The Closed World Assumption*):


    *   If row *r* appears in table *T*, then the proposition corresponding to *r*
    is true.


    *   If row *r* could appear in *T* but doesn’t, then the proposition corresponding
    to *r* is false.


    *Note:* By “the proposition corresponding to *r*” in the foregoing, I mean, of
    course, the instantiation of the table predicate for *T* that’s obtained by substituting
    column values from *r* for the parameters of that predicate.


    ## Rules


    Now I turn to the second of those terms I promised to explain, *business rule*
    . Like a table predicate, a business rule too is a reasonably precise but informal
    statement in natural language. However, it differs from a table predicate in its
    purpose, which is to capture some aspect of how the data in the database needs
    to be constrained:^([^(260)](#fn260))


    *   To start with, there’ll certainly be rules that specify what type of information
    is denoted by the parameters to those table predicates. In the case of employees,
    for example, there’ll be a rule to the effect that the SALARY parameter (“salaries”)
    denotes money values, expressed in, let’s say, euros or U.S. dollars.^([^(261)](#fn261))


    *   Second, there’ll be rules that constrain the values those parameters can take
    for a given employee considered in isolation. For example, there might a rule
    that says salaries mustn’t be negative and must be less than some specified upper
    limit.


    *   Third, there’ll be rules that constrain the set of employees taken as a whole,
    independent of other “entities” such as departments, that might be represented
    in the same database. For example, there might be a rule to the effect that employee
    numbers must be unique.


    *   Finally, there’ll be rules that constrain employees considered in combination
    with other entities represented in the database. For example, there might be a
    rule to the effect that every employee must be assigned to some known department,
    or a rule to the effect that no employee can have a salary greater than that of
    the manager of the department the employee in question is assigned to.


    I’d like to say a bit more about this issue of business rules, because it’s important—also
    because in practice it does tend to get somewhat overlooked. As the foregoing
    discussion should be sufficient to suggest, business rules can get quite complicated
