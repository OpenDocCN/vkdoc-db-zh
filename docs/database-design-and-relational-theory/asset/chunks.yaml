  trans: '## 为什么完整性检查必须是即时的


    在本附录开头引用的文字中，我大致表达了以下观点：


    *   与普遍看法相反，完整性检查必须始终是即时的——也就是说，必须在“语句边界”处完成，即在任何有可能违反相关完整性约束的更新操作结束时进行。换句话说，所谓的“延迟检查”（即推迟到相关事务结束时才进行的检查）违反了关系模型的原则；事实上，这是一种逻辑错误。


    坚持数据库约束必须在语句边界进行检查的原因至少有五点，但首要也是最重要的一点是：正如我在前面章节试图展示的那样，我们*永远*不能容忍数据库中的任何不一致性，即使是在单个事务的范围内也不行。也就是说，虽然由于事务所谓的隔离性，可能确实最多只有一个事务会看到某个特定的不一致性，但事实是，该特定事务确实看到了这个不一致性，并可能因此产生错误的答案。*注：*
    书籍 `SQL 与关系理论` 对上述问题以及其他四个原因（即坚持数据库约束必须始终在语句边界进行检查的其他四个原因）进行了详细讨论。


    脚注 1   2   3   4   5   6   7   8


    # 主键虽好，但非必需


    > 生活相当像一罐沙丁鱼——我们都在寻找那把钥匙。

    >

    > ——艾伦·贝内特：`Beyond the Fringe` (1960)


    回顾第 1 章中的这段文字：


    *   我说过选择主键是*通常的*做法。这确实是通常的做法——但它并非 100% 必要。如果只有一个候选键，那么就没有选择，也没有问题；但如果存在两个或更多，那么必须选择其中一个并将其设为主键，就多少带点随意性，至少对我来说是这样。（当然，在某些情况下，似乎确实没有真正充分的理由来做这种选择。甚至可能有很好的理由不这样做。附录
    C [*即本附录*] 对此有详细阐述。）


    现在，这段摘录中阐明的观点显然与传统智慧背道而驰；事实上，甚至可以说它违反了关系模型或一般关系理论中某些被广泛接受的准则。具体来说：


    *   从一个给定关系变量必然非空的键集合中，最初定义的关系模型赋予该集合中一个任意选择的成员——称为*主*键——一个首要的角色。


    *   关系设计方法论——虽然不是关系模型本身——倾向于建议，同样有点随意地，一个给定的“实体”应该在整个数据库中由同一个（主）键值来识别和引用，无论它在哪里被表示。


    然而，如上所述，这些建议——有些人甚至可能称之为*规定*——都涉及一定程度的随意性。特别是第一点，一直以来都让关系模型的支持者（包括我自己）感到些许尴尬。支持关系模型最有力的论据之一一直是它声称拥有坚实的逻辑基础。然而，虽然这一声称在很大程度上显然是合理的，但主键和候选键^(²⁷⁴)
    之间的区别——即必须从一组相等的成员中选择一个并使其在某种程度上“比其他成员更平等”的观念——似乎一直建立在不享有同等理论声誉的基础上。当然，似乎没有任何*正式*的理由来支持这种区别；它似乎更像是教条而非逻辑，这就是为什么我说这种情况令人尴尬。本附录源于我对关系正统立场在这些问题上似乎缺乏坚实依据的日益不满。（正如我的一位朋友曾经对我说，在现场演示中，这些领域就是“你讲得很快，希望没人会注意到”的地方。）


    更重要的是，不仅似乎没有理由来证明 `PK:AK` 区别的合理性，似乎也没有任何正式的方法来做出选择。事实上，科德本人曾明确表示“选择的正常依据是简单性，*但这个方面超出了关系模型的范围*”（斜体为我所加）。^(²⁷⁵)
    但为什么必须做出选择呢？——也就是说，在确实存在真正选择的情况下，为什么有必要或可取地要引入这种随意性的因素呢？


    此外，最初定义的关系模型还坚持，数据库中任何地方通过外键对（一个给定关系变量中的）元组的所有引用，都必须始终通过该关系变量的主键进行，绝不能通过某个替代键。因此我们看到，一个本质上随意的决定——选择哪个键作为主键——也可能导致后续决定受到随意性限制；也就是说，它可能以一种在做出第一个决定（即主键决定）时未曾预料到的方式，限制关于什么可以和不可以成为合法外键的决策集合。


    因此我认为，在关系模型本身中区分主键和替代键（以下简称为 *`PK:AK` 区别*）的观念，给原本是一个形式化定义的系统（即关系模型）引入了随意性、人为性、笨拙性和不对称性这些令人不快的音符。我进一步认为，它也可能给数据库本身引入令人不快的随意性、人为性、笨拙性和不对称性。我还要进一步指出，正如我将展示的那样，它还可能导致基本关系变量和派生关系变量之间出现不良且不必要的区别。


    既然如此，`PK:AK` 区别真的合理吗？本附录提供了我认为强有力的论据，支持对这个问题的回答必须是*否定的*。'
- fmt: '## Arguments in Defense of the PK:AK Distinction


    Before I consider consequences of the `PK:AK` distinction in detail, I should
    first examine the arguments in its defense. Since I’m on record as a defender
    of that distinction myself,^([^(276)](#fn276)) perhaps I should begin by summarizing,
    and with hindsight responding to, my own arguments! The principal ones were as
    follows:


    ### 主要论点


    1.  Dropping the `PK:AK` distinction would imply among other things that “the
    entity integrity rule” would have to be extended to apply to all candidate keys
    (all candidate keys in base relvars, at any rate). *Note:* Refer to Chapter [1](#489629_2_En_1_Chapter.xhtml)
    if you need to refresh your memory regarding the term *candidate key*.


    As I expect you know, the entity integrity rule is a rule to the effect that attributes
    participating in the primary key of a base relvar don’t allow nulls. Now, I’ve
    argued for a long time that this rule should be dropped anyway, partly because
    it has to do with nulls (a concept I categorically reject), and partly because
    it draws a distinction between base and other relvars and thereby violates `The
    Principle of Interchangeability` (i.e., of base relvars and views); thus, I now
    find this first argument in favor of the `PK:AK` distinction to be irrelevant.


    *Note:* In case you’re unfamiliar with `The Principle of Interchangeability`,
    I should explain that basically what it says is that there shouldn’t be any unnecessary
    distinctions between base relvars and views—views should “look and feel” to the
    user just like base relvars.


    2.  The discipline of using the same symbol to identify a given entity everywhere
    it’s referenced allows the system to recognize the fact that those references
    do all refer to the same thing.


    This argument is clearly valid as far as it goes, but I now feel the discipline
    referred to should be treated as an informal guideline rather than a hard and
    fast requirement. See the discussions later in this appendix—in particular, the
    `applicants` and `employees` example—for examples of situations in which it might
    be desirable not to follow such a guideline in practice. In any case, the guideline
    in question really has to do with design (in other words, with how to apply the
    relational model in some specific situation), not with the relational model as
    such; in particular, therefore, it has nothing to do with whether the relational
    model as such should insist on primary keys. I must have been a little confused
    when I advanced this argument originally.


    3.  “Metaqueries”—i.e., queries against the catalog—can be more difficult to formulate
    if entities are identified in different ways in different places. For example,
    consider what’s involved in formulating the metaquery “Which relvars refer to
    employees?” if employees are referred to sometimes by employee number and sometimes
    by social security number.


    The idea here is basically that the discipline referred to under point 2 above
    can be beneficial for the user as well as the system. Again, however, it seems
    to me that we’re really talking about informal guidelines, not absolute requirements.


    4.  My next point wasn’t exactly an argument for the `PK:AK` distinction, but
    rather a criticism of an argument against it. This latter argument went as follows:
    Suppose some user is prevented, for security reasons, from seeing some primary
    key; then that user needs access to the data by some alternate key instead; so
    why make the `PK:AK` distinction in the first place?


    I still don’t find “this latter argument” very convincing, but of course criticizing
    an argument against some position doesn’t prove the contrary position is correct!


    5.  My final point was an appeal to Occam’s Razor (“Concepts should not be multiplied
    beyond necessity”). In effect, I was arguing that to treat all candidate keys
    as equals was to complicate the relational model’s tuple level addressing scheme
    unnecessarily. But it might well be argued (and now I would argue) that Occam’s
    Razor actually applies the other way around, and that it’s the concepts of primary
    key and alternate key that are unnecessary!—i.e., all we really need is candidate
    keys, or in other words just keys *tout court*.


    ### 后续反思


    In a nutshell, the foregoing arguments no longer seem to me very compelling; the
    only one that still appears to have any validity is the one summarized under points
    2 and 3 above, which (as I’ve said) isn’t really an argument for making the `PK:AK`
    distinction in the relational model as such, anyway. As I’ve also said, I now
    feel the position supported by that particular argument should be seen more as
    a guideline than as an inviolable rule (again, see later for examples to justify
    this position).


    I note in passing, though, that I did hedge my bets somewhat when I first discussed
    this issue ... Here’s another extract from the pertinent paper (I’ve reworded
    it just slightly here):


    *   Note that if we can agree on retaining the `PK:AK` distinction for now, there’s
    always the possibility of eliminating that distinction if desirable at some future
    time. And note moreover that this argument doesn’t apply in the opposite direction:
    Once we’re committed to treating all candidate keys equally, a system that requires
    a distinguished primary key will forever be nonstandard.


    Although I didn’t say as much at the time, this quote effectively constitutes
    an appeal to `The Principle of Cautious Design`, a principle I do still strongly
    believe in.^([^(277)](#fn277)) Indeed, it seems to me that the very fact that
    I’m able to shift my position on the `PK:AK` distinction now—which is indeed what
    I’m doing—can be seen as a vindication of that principle.


    ### Codd的观点


    Before closing this section, I remark that Codd himself is also on record, in
    the same paper where he said there was no formal basis for choosing the primary
    key, as a defender of the `PK:AK` distinction (not surprisingly, since he originated
    it):


    *   Severe problems would arise ... if any relvar whatsoever were permitted to
    have more than one primary key [*sic*] ... The consequences of permitting more
    than one primary key ... for a single base relvar [would be] disastrous.


    (I’ve taken the liberty of replacing Codd’s term *relation* by the term `relvar`
    twice in this extract.) He goes on to give an example involving employees with
    “several distinct responsibilities”—project management, department management,
    inventory management, etc.—and then says:


    *   Comparing for equality of identifiers ... is intended to establish that one
    and the same employee is involved ... This objective is dealt a severe blow if
    the types of identifiers used for employees can be different depending on which
    pair of employee-identifying [attributes] is selected for the comparison.


    Well, I think you can see this argument is essentially the same as the one given
    under points 2 and 3 above, which (a) as I’ve already indicated, is slightly confused,
    and (b) as we’ll see later in this appendix, doesn’t fully stand up under close
    scrutiny anyway.'
