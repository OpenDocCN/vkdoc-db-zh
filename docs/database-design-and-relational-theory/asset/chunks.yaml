    \ tuples appear in S:\n\n```\n    s1  c1  t2\n    s2  c1  t1\n    s1  c2  t1\n\
    \    ```\n\n(I’m using an obvious simplified notation for tuples here; *s1* and\
    \ *s2* denote supplier numbers, *c1* and *c2* denote supplier cities, and *t1*\
    \ and *t2* denote status values. Note how each of the three tuples corresponds\
    \ to one component of JD J1.)\n\nNow, because {SNO} is a key, the following FDs\
    \ hold in S:\n\n```\n    { SNO } → { CITY }\n    { SNO } → { STATUS }\n    ```\n\
    \nWe can therefore conclude that *c1* = *c2* and *t1* = *t2*, and so the tuple\n\
    \n```\ns1  c1  t1\n```\n\nappears in S, necessarily, because in fact it’s identical\
    \ to the first (or, equally, the third) in the original list of tuples as shown\
    \ above. But to say the original “three” tuples cause this “fourth” tuple to appear—if\
    \ you see what I mean—is to say, precisely, that JD J1 holds (I mean, that’s what\
    \ J1 says). So J1 does hold in S.\n\n1.  Now appealing to either of the FDs {SNO}\
    \ → {CITY} and {SNO} → {STATUS} (both of which hold in S, as we know) and to Heath’s\
    \ Theorem, we see that the following JD—let’s call it J2—certainly holds in relvar\
    \ S:\n\n```\n☼ { { SNO , CITY } , { SNO , STATUS } }\n```\n\nBut the components\
    \ of J2 form a proper subset of those of J1\\. It follows that J1 is reducible\
    \ with respect to S. To be specific, the component {CITY,STATUS} can be dropped\
    \ from J1 without loss, in the sense that what remains is still a JD of S.\n\n\
    Observe now that the foregoing proof made no use of the fact that the functional\
    \ dependency {CITY} → {STATUS} holds in S (indeed, the result would still be valid\
    \ even if that FD didn’t hold). But now let’s do another example that does make\
    \ use of that FD:\n\n*   First, we know from the previous example that the following\
    \ JD (J1 from that example) holds in S:\n\n*   But the FD {CITY} → {STATUS} also\
    \ holds, and so by Heath’s Theorem the following JD—let’s call it J3—holds as\
    \ well:\n\n```\n☼ { { SNO , CITY } , { CITY , STATUS } , { SNO , STATUS } }\n\
    ```\n\n*   The components of J3 form a proper subset of those of J1, and so it\
    \ follows once again that J1 is reducible with respect to S. To be specific, the\
    \ component {SNO,STATUS} can be dropped from J1 without loss, in the sense that\
    \ what remains is still a JD of S.\n\n```\n☼ { { CITY , STATUS } , { CITY , SNO\
    \ } }\n```\n\nObserve, therefore, that the original JD J1 is equivalent, with\
    \ respect to relvar S, to two distinct JDs: namely, J2 and J3.\n\nIn general,\
    \ of course, the question is: Given relvar *R* and a JD *J* that holds in *R*,\
    \ how can we find an irreducible equivalent (meaning, to be more precise about\
    \ the matter, a JD that’s both equivalent to *J* and irreducible, where *equivalent*\
    \ and *irreducible* are both understood as being with respect to *R*)? Well:\n\
    \n*   If some component is irrelevant in *J*, that component can clearly be dropped.\n\
    \n*   If all components are relevant, we can only try dropping one, and then:\n\
    \    1.  If what’s left is still a JD of *R*, we drop another component and repeat\
    \ the process.\n\n2.  If what’s left isn’t a JD of *R*, we reinstate the dropped\
    \ component and try dropping another one.\n\nEventually, we’ll arrive at a JD\
    \ that’s equivalent to the original one and is irreducible.\n\nAnd how do we tell\
    \ whether some JD is in fact a JD of *R*? Well, if it’s one that’s been explicitly\
    \ declared as such, there’s clearly no problem; but if not, we can use the *chase*,\
    \ which I’ll be describing in the next section but one."
  trans: "\n这个连接依赖——我们称之为 `J1`——显然没有无关的组成部分。然而，我将证明：(a) 它在关系变量 `S` 中成立；但 (b) 它相对于该关系变量是可约的，因为\
    \ `{CITY,STATUS}` 这个组成部分可以被移除，而剩下的部分仍然是 `S` 的一个连接依赖。\n\n*注意：* 实际上，本例中的可约性在直观上是显而易见的，因为（精确地说）`S`\
    \ 在 `{CITY,STATUS}` 上的投影，显然等于 `S{SNO,CITY}` 和 `S{SNO,STATUS}` 的连接在 `{CITY,STATUS}`\
    \ 上的投影。因此，`{CITY,STATUS}` 这个组成部分可以说没有增加任何信息。因此，重申一下：可约性是“显而易见”的——但现在我要证明它。\n\n\
    1.  首先，假设 `S` 中出现以下元组：\n\n    ```\n    s1  c1  t2\n    s2  c1  t1\n    s1  c2\
    \  t1\n    ```\n\n    （我在此使用了一种简化的元组表示法；`s1` 和 `s2` 表示供应商编号，`c1` 和 `c2` 表示供应商所在城市，`t1`\
    \ 和 `t2` 表示状态值。请注意，这三个元组中的每一个都对应于连接依赖 `J1` 的一个组成部分。）\n\n    现在，由于 `{SNO}` 是一个键，以下函数依赖在\
    \ `S` 中成立：\n\n    ```\n    { SNO } → { CITY }\n    { SNO } → { STATUS }\n    ```\n\
    \n    因此，我们可以推断出 `c1` = `c2` 且 `t1` = `t2`，所以元组\n\n    ```\n    s1  c1  t1\n \
    \   ```\n\n    必然出现在 `S` 中，因为它实际上与上文所示原始元组列表中的第一个（或者，同样地，第三个）元组完全相同。但是，说原始的“三个”元组导致这个“第四个”元组出现——如果你明白我的意思——精确地说，就是断言连接依赖\
    \ `J1` 成立（我的意思是，这正是 `J1` 所表述的）。因此，`J1` 确实在 `S` 中成立。\n\n2.  现在，利用 `{SNO} → {CITY}`\
    \ 或 `{SNO} → {STATUS}` 这两个函数依赖（正如我们所知，两者在 `S` 中都成立）以及希斯定理（Heath’s Theorem），我们看到以下连接依赖——称之为\
    \ `J2`——在关系变量 `S` 中必然成立：\n\n    ```\n    ☼ { { SNO , CITY } , { SNO , STATUS }\
    \ }\n    ```\n\n    但是 `J2` 的组成部分是 `J1` 的组成部分的一个真子集。由此可知，`J1` 相对于 `S` 是可约的。具体来说，组成部分\
    \ `{CITY,STATUS}` 可以从 `J1` 中移除而不会造成损失，因为剩下的部分仍然是 `S` 的一个连接依赖。\n\n现在请注意，上述证明并未使用函数依赖\
    \ `{CITY} → {STATUS}` 在 `S` 中成立这一事实（实际上，即使该函数依赖不成立，这个结论仍然有效）。但现在让我们再做一个利用到该函数依赖的例子：\n\
    \n*   首先，我们从上一个例子中知道，以下连接依赖（即该例中的 `J1`）在 `S` 中成立：\n\n    ```\n    ☼ { { SNO ,\
    \ CITY } , { CITY , STATUS } , { SNO , STATUS } }\n    ```\n\n*   但是函数依赖 `{CITY}\
    \ → {STATUS}` 也成立，因此根据希斯定理，以下连接依赖——称之为 `J3`——同样成立：\n\n    ```\n    ☼ { { SNO ,\
    \ CITY } , { CITY , STATUS } }\n    ```\n\n*   `J3` 的组成部分是 `J1` 的组成部分的一个真子集，因此再次得出\
    \ `J1` 相对于 `S` 是可约的结论。具体来说，组成部分 `{SNO,STATUS}` 可以从 `J1` 中移除而不会造成损失，因为剩下的部分仍然是\
    \ `S` 的一个连接依赖。\n\n因此，请注意，原始的连接依赖 `J1` 相对于关系变量 `S`，等价于两个不同的连接依赖：即 `J2` 和 `J3`。\n\
    \n当然，一般来说，问题是：给定关系变量 `R` 和一个在 `R` 中成立的连接依赖 `J`，我们如何找到一个不可约的等价物（更精确地说，是一个既与 `J`\
    \ 等价又不可约的连接依赖，这里的`等价`和`不可约`都被理解为相对于 `R`）？嗯：\n\n*   如果某个组成部分在 `J` 中是无关的，那么显然可以移除该组成部分。\n\
    *   如果所有组成部分都是相关的，我们只能尝试移除一个，然后：\n    1.  如果剩下的部分仍然是 `R` 的一个连接依赖，我们就再移除另一个组成部分，并重复此过程。\n\
    \    2.  如果剩下的部分不是 `R` 的一个连接依赖，我们就恢复被移除的那个组成部分，并尝试移除另一个。\n\n最终，我们会得到一个与原始连接依赖等价且不可约的连接依赖。\n\
    \n那么，我们如何判断某个连接依赖是否确实是 `R` 的一个连接依赖呢？嗯，如果它是一个被明确声明为 `R` 的连接依赖，那显然没有问题；但如果不是，我们可以使用\
    \ `chase` 算法，我将在再下一节中描述它。\n"
- fmt: '## Summary So Far


    Let me summarize where we are. The general point is that some `JD`s imply others.
    As specific illustrations of this point, we’ve discussed:


    *   *Irrelevant components:* Any given `JD` `J` is equivalent to every `JD` `J''`
    that can be obtained from `J` by adding or dropping irrelevant components.


    *   *Combining components:* Any given `JD` `J` implies every `JD` `J''` that can
    be obtained from `J` by replacing two or more components by their union.


    *   *Irreducibility:* Any given `JD` `J` that holds in relvar `R` is equivalent
    to at least one `JD` `J''`—not necessarily distinct from `J`—that holds in `R`
    and is irreducible (where *equivalent* and *irreducible* must both be understood
    as being with respect to `R`). It follows that `R`''s irreducible `JD`s in fact
    imply all of `R`''s `JD`s.


    The following observations are also valid (I haven’t discussed them in detail,
    but they’re intuitively obvious):


    *   *Adding attributes:* If `JD` `J` holds in relvar `R`, then so does every `JD`
    `J''` that can be obtained from `J` by adding some attribute of `R` to some component
    of `J`.


    *   *Adding components:* If `JD` `J` holds in relvar `R`, then so does every `JD`
    `J''` that can be obtained from `J` by adding any subset of the heading of `R`
    as another component.


    In both of these latter cases, however, we’re talking about implication, not equivalence.
    For example, in relvar `S` (but ignoring `SNAME` once again, for simplicity),
    the `JD`

    ```

    ☼ { { SNO , STATUS } , { SNO , CITY } }

    ```

    holds, and therefore the following `JD`, with an added component, holds as well:

    ```

    ☼ { { SNO , STATUS } , { SNO , CITY } , { CITY , STATUS } }

    ```

    However, the converse is false—if the latter `JD` holds, it doesn’t follow that
    the former one does.^(^[[^(144)](#fn144)])


    We can also say the following: If (a) `J` is a `JD` that holds in relvar `R` and
    `J` implies another `JD` `J''` (which therefore also holds in `R`, by definition),
    and (b) `J''` is obtained from `J` by dropping attributes from components of `J`
    and/or dropping entire components from `J`, then `J` is certainly a “bad” `JD`
    (see the remarks on the topic of good vs. bad `JD`s at the end of the section
    “Combining Components”). However, a `JD` `J` can still be “bad” even if it implies
    no such `JD` `J''`, as we’ll see; that is, not all “bad” `JD`s conform to the
    foregoing simple pattern.


    Now I’d like to generalize the discussion somewhat. First of all, from this point
    forward I’ll take the term *dependencies* to mean either `FD`s or `JD`s or both,
    as the context demands.^(^[[^(145)](#fn145)]) Now, throughout this book so far,
    whenever I’ve considered the question of dependencies being implied by others,
    I’ve mostly, albeit tacitly, limited my attention to ones that are implied by
    an *individual* dependency. More generally, however, it turns out that certain
    *combinations* of dependencies can imply others. Let me give an example.


    Consider a relvar `SPT`, with attributes `SNO`, `PNO`, and `STATUS` (only), where
    the attributes have their usual meanings. Suppose we’re told, not entirely unreasonably,
    that the following dependencies (one `FD` and one `JD`) both hold in this relvar:

    ```

    { SNO , PNO } → { STATUS }

    ☼ { { SNO , PNO } , { SNO , STATUS } }

    ```

    Now, given the semantics of the situation, it’s intuitively obvious that (a) `{SNO}`
    isn’t a key for `SPT` and yet (b) the `FD` `{SNO} → {STATUS}` holds in `SPT` implicitly
    (and so `SPT` isn’t in `2NF`, incidentally). Note that I say *implicitly*—we haven’t
    been told explicitly that the `FD` holds. The question is: Can we *prove* (a)
    and (b), given only that the stated `FD` and `JD` hold? That is, can we show that
    (a) and (b) are valid *formally*, without paying any regard to semantics? (After
    all, that’s what the system would have to do, if we wanted it to be able to infer
    dependencies. The system doesn’t know anything about semantics, as I’m using that
    term here.)^(^[[^(146)](#fn146)])


    So let’s give it a try. First of all, suppose the following tuples appear in `SPT`—

    ```

    s1  p1  t1

    s1  p2  t2

    ```

    —where `p1` ≠ `p2`. Now what we need to do, in order to show that the `FD` `{SNO}
    → {STATUS}` holds, is to show that `t1` and `t2` must be equal. We begin by writing
    down the projections of the two tuples corresponding to the components of the
    given `JD` `☼{{SNO,PNO},{SNO,STATUS}}`:

    ```

    s1  p1             s1  t1

    s1  p2             s1  t2

    ```

    Joining these projections together, we obtain the original two tuples plus two
    extra ones (shown below in **bold**):

    ```

    s1  p1  t1

    s1  p1  t2

    s1  p2  t1

    s1  p2  t2

    ```

    Since the given `JD` holds, the two extra tuples must in fact appear in the relvar
    along with the original two. But the `FD` `{SNO,PNO} → {STATUS}` holds also; it
    follows that `t1` = `t2`, and hence that the `FD` `{SNO} → {STATUS}` holds (every
    tuple that has `SNO` `s1` also has `STATUS` `t1`). This is part (b) of what was
    to be proved. At the same time, by our assumption we have `p1` ≠ `p2`—note that
    nothing in the argument so far invalidates that assumption—from which it follows
    that the `FD` `{SNO} → {PNO}` *doesn’t* hold, and so `{SNO}` isn’t a key; and
    this is part (a) of what was to be proved.


    So we see that any given relvar is subject to both explicit dependencies (these
    are the ones explicitly declared) and implicit dependencies (these are the ones
    implied by the explicitly declared ones). For the record, let me bring these points
    together into an appropriate definition:


    *   **Definition (explicit vs. implicit dependencies):** Let `R` be a relvar.
    Associated with `R` are two sets of explicit dependencies: a set `XFD` of explicit
    `FD`s that hold in `R` and a set `XJD` of explicit `JD`s that hold in `R`. The
    `FD`s in `XFD` together with the `JD`s in `XJD` are the explicit dependencies
    of `R`. The `FD`s and `JD`s that aren’t in `XFD` or `XJD` but are logical consequences
    of the ones in `XFD` and `XJD` are the implicit dependencies of `R`. The explicit
    and implicit dependencies of `R` taken together are the dependencies of `R`. A
    relation `r` can be assigned to `R` only if that relation `r` satisfies all of
    the dependencies of `R`.'
