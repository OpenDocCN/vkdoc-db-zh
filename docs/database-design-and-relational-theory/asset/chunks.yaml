    \ considerably simplified definition again, please note—of a generalized form\
    \ of join that we call `U_join`:\n\n*   **Definition (`U_join`)** **:** Let relations\
    \ `r1` and `r2` be joinable,^([^(195)](#fn195)) and let them have a common attribute\
    \ `A` that’s interval valued. Then the expression `USING (A) : JOIN {r1,r2}` denotes\
    \ the `U_join` (with respect to `A`) of `r1` and `r2`, and it’s defined to be\
    \ shorthand for the following:\n\n```\nPACK\n( JOIN\n{ ( UNPACK r1 ON ( A ) )\
    \ ,\n( UNPACK r2 ON ( A ) ) }\nON ( A )\n```\n\nSo, as I’ve more or less said\
    \ already, `U_join` works by first unpacking both input relations, then doing\
    \ a regular join on those unpacked intermediate results, and then (re)packing\
    \ the result of that join to obtain the final result.\n\n### Definition (U_equality)\n\
    I can now also as promised make the notion of information equivalence a little\
    \ more precise. To be specific, the relations of Figures [14-4](#489629_2_En_14_Chapter.xhtml#Fig4)\
    \ and [14-5](#489629_2_En_14_Chapter.xhtml#Fig5) are information equivalent because\
    \ they have the same unpacked form; in fact, they’re `U_equal`. Here’s a simplified\
    \ definition:\n\n*   **Definition (`U_equality`)** **:** Let relations `r1` and\
    \ `r2` have the same heading `H`, and let them have a common attribute `A` that’s\
    \ interval valued. Then the expression `USING (A) : r1 = r2` denotes a `U_equality`\
    \ comparison (with respect to `A`) between `r1` and `r2`, and it’s defined to\
    \ be shorthand for the following:\n\n```\n( UNPACK r1 ON ( A ) ) = ( UNPACK r2\
    \ ON ( A ) )\n```\n\nTo summarize so far, then: The relation of Figure [14-4](#489629_2_En_14_Chapter.xhtml#Fig4)\
    \ is certainly not equal to the regular join of its regular projections on `{SNO,CITY,DURING}`\
    \ and `{SNO,STATUS,DURING}`. However, it *is* `U_equal` to the `U_join` of the\
    \ corresponding `U_projections`.\n\n### Definition (U_join dependency)\nNow suppose\
    \ this state of affairs isn’t just a fluke—it isn’t just a matter of the sample\
    \ value I happened to choose to show in Figure [14-4](#489629_2_En_14_Chapter.xhtml#Fig4)—but\
    \ is, rather, a property that applies to all possible values of the relvar in\
    \ question (i.e., relvar `SCT_DURING`). Then we can say that the relvar in question\
    \ is subject to a certain generalized join dependency (a `U_JD`, in fact). Here’s\
    \ a simplified definition:\n\n*   **Definition (U_join dependency):** Let `H`\
    \ be a heading, and let attribute `A` of `H` be interval valued. Then a U_join\
    \ dependency (`U_JD` for short) with respect to `A` and `H` is an expression of\
    \ the form `USING (A) : ☼{X1,X2,...,Xn}`, where `X1`, `X2`, ..., `Xn` (the components\
    \ of the `U_JD`) are subsets of `H` whose union is equal to `H`.\n\nThen, of course,\
    \ we go on to say that:\n\n*   A given relation satisfies a given `U_JD` if and\
    \ only if it’s `U_equal` to the `U_join` of the pertinent `U_projections`.\n*\
    \   A given relvar is subject to a given `U_JD`—equivalently, the given `U_JD`\
    \ holds in the given relvar—if and only if every relation that can be assigned\
    \ to that relvar satisfies that `U_JD`.\n\nIn the example, therefore, the following\
    \ `U_JD` holds in relvar `SCT_DURING`:\n\n```\nUSING ( DURING ) :\n☼ { { SNO ,\
    \ CITY , DURING } , { SNO , STATUS, DURING } }\n```\n\nMoreover, since the original\
    \ relvar suffers from certain redundancies and circumlocutions that don’t apply\
    \ to those `U_projections`, the recommendation is to nonloss decompose it accordingly.\
    \ And we can define a new normal form based on such considerations, in such a\
    \ way that relvar `SCT_DURING` isn’t in that new normal form but its `U_projections`\
    \ are. Before defining that new normal form, however, there are some further important\
    \ points to be made—points that I’ve hinted at in the foregoing but haven’t yet\
    \ stated explicitly:\n\n*   Analogously, regular join is a special case of `U_join`,\
    \ both syntactically and semantically.\n*   Analogously, a regular `JD` is a special\
    \ case of a `U_JD`, both syntactically and semantically.\n*   The first is that\
    \ the generalized form of projection that we call `U_projection` truly is a generalization\
    \ as such. In other words, regular projection is just a special case of `U_projection`—or\
    \ to put it another way, all projections are `U_projections`, but some `U_projections`\
    \ aren’t projections (at least, as this latter term is usually understood). The\
    \ reason is as follows (simplifying somewhat yet again):\n    1.  First, we allow\
    \ a `U_projection` of relation `r` to be taken with respect to *no attributes\
    \ at all*. The definition becomes:\n\n        ```\n        PACK\n        ( ( UNPACK\
    \ r ON ( ) ) { X } )\n        ON ( )\n        ```\n\n    2.  Second, it turns\
    \ out—see the temporal book if you need further explanation—that `PACK` and `UNPACK`,\
    \ when performed with respect to no attributes, both just return their input,\
    \ and so the foregoing expression reduces to just `r{X}`, the regular projection\
    \ of `r` on `X`.\n    3.  Third, we allow the `USING` prefix and its accompanying\
    \ colon to be omitted from the concrete syntax for a `U_projection` that’s done\
    \ with respect to no attributes.\n\nIt follows from the foregoing that, as claimed,\
    \ regular projection is just a special case of `U_projection`, both syntactically\
    \ and semantically.\n\nIt follows that we can drop those `U_` prefixes, if we\
    \ like (except in circumstances where we might want to retain them for emphasis),\
    \ and simply understand that henceforth projection means `U_projection`, and similarly\
    \ for join and join dependency (and similarly for relation equality too, come\
    \ to that).^([^(196)](#fn196)) So the “new normal form” we want to define is just\
    \ `6NF`, except that the concepts that underpin that normal form (projection,\
    \ join, etc.) now have an extended interpretation. So here’s the definition (but\
    \ of course it’s the same as it always was):\n\n### Definition (sixth normal form)\n\
    *   **Definition (sixth normal form):** Relvar `R` is in sixth normal form (`6NF`)\
    \ if and only if the only `JD`s that hold in `R` are trivial ones; in other words,\
    \ the only `JD`s that hold in `R` are of the form `☼{ ..., H, ... }`, where `H`\
    \ is the heading of `R`."
