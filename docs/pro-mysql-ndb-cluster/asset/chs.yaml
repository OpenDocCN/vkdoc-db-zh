  \    | 1024  |\n| performance_schema_max_stage_classes                     | 150\
  \   |\n| performance_schema_max_statement_classes                 | 193   |\n| performance_schema_max_statement_stack\
  \                   | 10    |\n| performance_schema_max_table_handles          \
