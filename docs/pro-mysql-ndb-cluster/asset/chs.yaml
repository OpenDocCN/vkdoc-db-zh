  配置设置完成后，就该启动 MySQL Cluster Manager 了。


  ### 启动和停止 MySQL Cluster Manager


  MySQL Cluster Manager 可以通过直接执行和停止进程来启动和停止，也可以通过使用服务管理系统（如 System V init 脚本、systemd
  和 Windows 服务）来完成。使用服务管理系统来控制 `mcmd` 与用于 MySQL NDB Cluster 守护进程的方式并无不同，因此不再详细讨论。相反，重点将放在直接启动和停止
  `mcmd` 进程上。


  以下是在 Linux 上启动 `mcmd` 进程的示例，其配置文件位于 `/etc/mcmd.ini`：


  ```

  shell$ sudo -u mysql nohup /opt/mysql/mcm1.4.2/bin/mcmd \

  --defaults-file=/etc/mcmd.ini > /dev/null 2>&1 &

  ```


  要在 Microsoft Windows 的命令提示符下启动代理进程，命令类似，例如：


  ```

  C:>START /B "" "C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm1.4.2\bin\mcmd.exe"
  --defaults-file="C:\MySQL_Cluster\mcmd.ini"

  MySQL Cluster Manager 1.4.2 (64bit) started

  Connect to MySQL Cluster Manager by running "C:\Program Files (x86)\MySQL\MySQL
  Cluster Manager\mcm1.4.2\bin\mcm" -a WIN-LAPTOP:1862

  ```


  关闭 `mcmd` 进程的推荐方法是使用 `mcm` 客户端中的 `stop agents` 命令，此方法适用于所有平台。可以关闭单个代理或多个代理，包括一个站点中的所有代理。如果
  `stop agents` 命令不带任何参数使用，则仅关闭 `mcm` 客户端所连接到的代理：


  ```

  mcm> stop agents;

  +-----------------------------+

  | 命令结果                    |

  +-----------------------------+

  | 代理进程已成功停止          |

  +-----------------------------+

  1 行记录集 (0.02 sec)

  ```


  要关闭站点中的所有主机，请在命令中添加站点名称：


  ```

  mcm> stop agents test_site;

  +-----------------------------+

  | 命令结果                    |

  +-----------------------------+

  | 代理进程已成功停止          |

  +-----------------------------+

  1 行记录集 (0.18 sec)

  ```


  如果在 UNIX 或 Linux 上使用信号关闭代理，请确保使用 `SIGTERM` 信号，或者从 Microsoft Windows 进程列表管理器中终止进程而不进行强制关闭。


  **警告**


  与其他 MySQL NDB Cluster 进程一样，除非在无法使用 `SIGTERM` 使 `mcmd` 进程停止的关键情况下，否则不要使用 `SIGKILL`
  信号。使用 `SIGKILL` 终止进程可能会导致管理目录损坏。


  ### MySQL Cluster Manager 客户端


  MySQL Server 产品和 SQL 节点有 `mysql` 命令行客户端，可用于从命令行操作架构和数据。同样，MySQL Cluster Manager
  使用 `mcm` 命令行客户端向 `mcmd` 进程发送命令。


  客户端使用 MySQL Cluster Manager 安装目录中 bin 目录下的 `mcm` 二进制文件启动。假设安装目录为 `/opt/mysql/mcm1.4.2`，则完整路径为
  `/opt/mysql/mcm1.4.2/bin/mcm`。假设 `mcm` 命令在路径中，并且 `manager-port` 使用默认值，则可以进行连接，如列表
  13-4 所示。用户名和密码是使用 `manager-username` 和 `manager-password` 选项定义的。`mcm` 客户端是与 MySQL
  Cluster Manager 交互的唯一方式。


  ```

  shell mcm --user=mcmd --password

  MySQL Cluster Manager client started.

  This wrapper will spawn the mysql client to connect to mcmd

  Enter password:

  Welcome to the MySQL monitor.  Commands end with ; or \g.

  Your MySQL connection id is 1

  Server version: 1.4.2 MySQL Cluster Manager

  Copyright (c) 2000, 2016, Oracle and/or its affiliates. All rights reserved.

  Oracle is a registered trademark of Oracle Corporation and/or its

  affiliates. Other names may be trademarks of their respective

  owners.

  Type ''help;'' or ''\h'' for help. Type ''\c'' to clear the current input statement.

  mcm>

  列表 13-4.

  启动 `mcm` 命令行客户端

  ```


  如果输出看起来很熟悉，并让人联想到 `mysql` 命令行客户端，那是因为 `mcm` 二进制文件本身只是 `mysql` 二进制文件的一个包装器。这也是在安装过程中要求安装
  `mysql` 命令行客户端并将其置于路径中的原因。因为底层使用的是 `mysql` 命令行客户端，所以命令必须像 SQL 语句一样以分号 (`;`) 结尾。命令不区分大小写，但约定是全部使用小写。也可以使用
  `--execute` 或 `-e` 选项来执行命令。列表 13-5 展示了一个示例，其中使用 `mcm --execute` 获取关于 `create site`
  命令的帮助。在 Microsoft Windows 上，可以通过调用 `mcm.exe` 代替 `mcm` 来运行相同的命令。


  ```

  shell$ mcm --user=mcmd --password --execute="create site --help;"

  MySQL Cluster Manager client started.

  This wrapper will spawn the mysql client to connect to mcmd

  Enter password:

  +----------------------------------------------------------------+

  | 帮助信息                                                       |

  +----------------------------------------------------------------+

  |                                                                |

  | create site [选项]                                 |

  |                                                                |

  |     根据 --hosts 中列出的主机创建一个站点。                    |

  |                                                                |

  |     必需选项：                                                 |

  |     --hosts|-h             以逗号分隔的主机名列表。            |

  |                            格式: --hosts = [,]*。 |

  |                                                                |

  +----------------------------------------------------------------+

  列表 13-5.

  直接从 Linux Shell 执行命令

  ```


  这也表明 MySQL Cluster Manager 命令接受 `--help` 参数，该参数将提供有关命令工作方式的简短摘要。下一节将向您展示如何管理集群，同时演示几个最重要的命令。


  ### 管理集群


  安装好 MySQL Cluster Manager 后，就该使用它来安装和管理集群了。本节首先介绍安装和配置集群，然后讨论启动和停止集群、对在线集群执行配置更改、执行备份和恢复，最后升级集群。



  #### 安装集群二进制文件


  在实际安装集群之前，您必须单独下载 MySQL NDB 集群。如果使用的是 MySQL Cluster Manager 的捆绑发行版，则无需此操作，但本教程使用的是独立发行版，以便支持任何
  MySQL NDB 集群版本。与 MySQL Cluster Manager 一起使用时，您必须为 Linux 和 UNIX 下载 tarball 发行版，或为
  Windows 下载 Zip 文件发行版。下载方式如 `第 5 章` 所述。


  下载 MySQL NDB 集群后，应解压该文件。在本示例中，版本 `7.5.5` 将被解压到 `/opt/mysql/packages/7.5.5`。例如：


  ```

  shell$ mkdir /opt/mysql/packages

  shell$ cd /opt/mysql/packages/

  # 将下载的 .tar.gz 文件复制到 /opt/mysql/packages

  shell$ tar -zxf mysql-cluster-gpl-7.5.5-linux-glibc2.5-x86_64.tar.gz

  shell$ mv mysql-cluster-gpl-7.5.5-linux-glibc2.5-x86_64 7.5.5

  ```


  将 MySQL NDB 集群二进制文件放置到位后，其余的安装工作将在 `mcm` 客户端中完成。


  #### 通过 mcm 客户端准备集群


  无论使用何种操作系统，准备新集群的步骤都是相同的，当然，用于链接到二进制文件、集群节点数据目录等的路径取决于平台和硬件的设置方式。


  使用哪个 MySQL Cluster Manager 代理并不重要。您甚至不必在所有步骤中都使用同一个代理，尽管通常为了简单起见并查看已完成的操作，最好保持一致。


  **注意**


  MySQL Cluster Manager 不会为 `mysqld` 节点的 `root@localhost` 用户设置密码。请务必使用 `SET PASSWORD`
  命令为该账户设置一个强密码。


  将要安装的集群使用与 `第 10 章` 中演示重启所用集群相同的配置，并增加了两个可以从任何主机连接的 API 节点。`表 13-13` 总结了这八个节点及其在四台主机上的分布情况。


  表 13-13. 将要安装的集群节点


  | 节点 ID | 节点类型 | 主机 |

  | --- | --- | --- |

  | 1 | 数据节点 (`ndbmtd`) | 192.168.56.103 |

  | 2 | 数据节点 (`ndbmtd`) | 192.168.56.104 |

  | 49 | 管理节点 (`ndb_mgmd`) | 192.168.56.101 |

  | 50 | 管理节点 (`ndb_mgmd`) | 192.168.56.102 |

  | 51 | SQL 节点 (`mysqld`) | 192.168.56.103 |

  | 52 | SQL 节点 (`mysqld`) | 192.168.56.104 |

  | 53 | API 节点 (非 `mysqld`) | 任何主机 |

  | 54 | API 节点 (非 `mysqld`) | 任何主机 |


  按照惯例，MySQL Cluster Manager 将前 48 个节点 ID 保留给数据节点。这是因为所有数据节点的节点 ID 必须介于 1 和 48 之间。管理节点、SQL
  节点和 API 节点从 49 号开始获得连续的 ID。


  第一步是定义要安装集群的站点。这是使用 `create site` 命令完成的。站点名称可以是任何对安装有意义的名称。在本例中，将使用名称 `test_site`。创建站点时，必须指定站点上包含的主机。以后可以添加其他主机。本教程的完整命令如下所示：


  ```

  mcm> create site --hosts=192.168.56.101,192.168.56.102,192.168.56.103,192.168.56.104
  test_site;

  +---------------------------+

  | 命令结果                  |

  +---------------------------+

  | 站点创建成功              |

  +---------------------------+

  1 行 in set (3.21 sec)

  ```


  可以使用 `list sites` 命令列出 MySQL Cluster Manager 已知的站点：


  ```

  mcm> list sites\G

  *************************** 1. row ***************************

  站点: test_site

  端口: 1862

  位置: Local

  主机: 192.168.56.101,192.168.56.102,192.168.56.103,192.168.56.104

  1 行 in set (0.07 sec)

  ```


  现在站点已经创建，可以定义软件包了。这等同于为解压 MySQL NDB 集群二进制文件的路径分配一个名称：


  ```

  mcm> add package --basedir=/opt/mysql/packages/7.5.5 cluster_7.5.5;

  +----------------------------+

  | 命令结果                   |

  +----------------------------+

  | 软件包添加成功             |

  +----------------------------+

  1 行 in set (4.19 sec)

  ```


  默认情况下，所有已定义的主机使用相同的 `basedir`。可以通过添加 `--host` 选项为一部分主机使用路径。但是，最好让所有主机使用相同的配置。可以使用
  `list packages` 命令列出可用的软件包：


  ```

  mcm> list packages test_site\G

  *************************** 1. row ***************************

  软件包: cluster_7.5.5

  路径: /opt/mysql/packages/7.5.5

  主机: 192.168.56.101,192.168.56.102,192.168.56.103,192.168.56.104

  1 行 in set (0.11 sec)

  ```



  现在可以开始定义集群了，这需要使用 `create cluster` 命令。该命令有两个必需的参数：要使用的软件包和集群中要包含的进程。后续也可以添加额外的进程。进程的格式为
  `<进程名>@<主机>`。`<进程名>` 的支持值列于表 13-14 中。


  #### 表 13-14. 支持的进程类型


  | 进程名 | 描述 |

  | --- | --- |

  | `ndb_mgmd` | 一个管理节点。 |

  | `ndbapi` | 任何非 SQL 节点的 API 节点。包括用于 SQL 节点上 `ndb_cluster_connection_pool` 选项的额外
  API 节点插槽。 |

  | `ndbd` | 单线程数据节点。 |

  | `ndbmtd` | 多线程数据节点。 |

  | `mysqld` | 一个 SQL 节点。对于 `ndb_cluster_connection_pool` 大于 1 的 SQL 节点，只添加一个 `mysqld`
  节点，并使用 `ndbapi` 来处理连接池中的其余连接。 |


  请注意，当你通过名称设置集群时，MySQL 集群管理器如何区分单线程和多线程数据节点。在配置数据节点时指定进程类型也是如此。


  除了 `mysqld` 和 `ndbapi` 节点外，所有节点都必须绑定到特定的主机。对于 `mysqld` 和 `ndbapi` 节点，可以使用主机名 `*`（星号）来表示任意主机。


  `create cluster` 命令最终形式如下（所有 `--processhosts` 参数必须在一行内，且不能有空格）：


  ```

  mcm> create cluster --package=cluster_7.5.5 --processhosts=ndbmtd@192.168.56.103,ndbmtd@192.168.56.104,ndb_mgmd@192.168.56.101,ndb_mgmd@192.168.56.102,mysqld@192.168.56.103,mysqld@192.168.56.104,ndbapi@*,ndbapi@*
  test_cluster;

  +------------------------------+

  | Command result               |

  +------------------------------+

  | Cluster created successfully |

  +------------------------------+

  1 row in set (3.69 sec)

  ```


  可以使用 `list clusters` 命令列出 `test_site` 站点中可用的集群：


  ```

  mcm> list clusters test_site;

  +--------------+---------------+

  | Cluster      | Package       |

  +--------------+---------------+

  | test_cluster | cluster_7.5.5 |

  +--------------+---------------+

  1 row in set (0.14 sec)

  ```


  更有趣的是 `show status` 命令。它主要有两种用法来获取集群状态。列表 13-6 返回了 `test_cluster` 集群的总体状态以及包含所有进程的详细视图。


  ### 列表 13-6. 获取集群状态


  ```

  mcm> show status test_cluster;

  +--------------+---------+---------+

  | Cluster      | Status  | Comment |

  +--------------+---------+---------+

  | test_cluster | created |         |

  +--------------+---------+---------+

  1 row in set (0.09 sec)

  mcm> show status --process test_cluster;

  +--------+----------+----------------+--------+-----------+---------------+

  | NodeId | Process  | Host           | Status | Nodegroup | Package       |

  +--------+----------+----------------+--------+-----------+---------------+

  | 49     | ndb_mgmd | 192.168.56.101 | added  |           | cluster_7.5.5 |

  | 50     | ndb_mgmd | 192.168.56.102 | added  |           | cluster_7.5.5 |

  | 1      | ndbmtd   | 192.168.56.103 | added  | n/a       | cluster_7.5.5 |

  | 2      | ndbmtd   | 192.168.56.104 | added  | n/a       | cluster_7.5.5 |

  | 51     | mysqld   | 192.168.56.103 | added  |           | cluster_7.5.5 |

  | 52     | mysqld   | 192.168.56.104 | added  |           | cluster_7.5.5 |

  | 53     | ndbapi   | *              | added  |           |               |

  | 54     | ndbapi   | *              | added  |           |               |

  +--------+----------+----------------+--------+-----------+---------------+

  8 rows in set (0.09 sec)

  ```


  `show status` 还有其他几种模式。列表 13-7 展示了该命令帮助文本的完整输出。输出已重新格式化以减少文本宽度。


  ### 列表 13-7. show status 命令的帮助信息


  ```

  mcm> show status --help;

  +--------------------------------------------------------------------------+

  | Help                                                                     |

  +--------------------------------------------------------------------------+

  |                                                                          |

  | show status [options]                                       |

  |                                                                          |

  |     显示指定集群的集群、进程、操作、进度或备份状态。                     |

  |     如果未指定选项，默认为 --cluster。                                   |

  |                                                                          |

  |     有效选项：                                                           |

  |     --backup|-k            显示备份详情。                                 |

