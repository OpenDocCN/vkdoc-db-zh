  \                 | 130                     |\n|       1 | MaxNoOfAttributes   \
  \          | 1009                    |\n|       1 | MaxNoOfTriggers            \
  \   | 1400                    |\n|       1 | MaxNoOfConcurrentTransactions | 1024\
  \                    |\n|       1 | MaxNoOfConcurrentOperations   | 5120       \
  \             |\n|       1 | DataMemory                    | 41943040          \
  \      |\n|       1 | IndexMemory                   | 15728640                |\n\
  |       1 | FileSystemPath                | /cluster/node_1         |\n|       1\
  \ | BackupDataBufferSize          | 4194304                 |\n|       1 | BackupLogBufferSize\
  \           | 4194304                 |\n|       1 | Arbitration               \
  \    | 1                       |\n|       1 | RedoBuffer                    | 16777216\
  \                |\n|       1 | BackupDataDir                 | /backups/cluster/node_1\
  \ |\n|       1 | DiskPageBufferMemory          | 16777216                |\n|  \
  \     1 | Nodegroup                     | 0                       |\n|       1 |\
  \ SharedGlobalMemory            | 20971520                |\n|       2 | NodeId\
  \                        | 2                       |\n|       2 | DataDir      \
  \                 | /cluster/node_2         |\n|       2 | MaxNoOfTables       \
  \          | 130                     |\n|       2 | MaxNoOfAttributes          \
  \   | 1009                    |\n|       2 | MaxNoOfTriggers               | 1400\
  \                    |\n|       2 | MaxNoOfConcurrentTransactions | 1024       \
  \             |\n|       2 | MaxNoOfConcurrentOperations   | 4096              \
  \      |\n|       2 | DataMemory                    | 41943040                |\n\
  |       2 | IndexMemory                   | 15728640                |\n|       2\
  \ | FileSystemPath                | /cluster/node_2         |\n|       2 | BackupDataBufferSize\
  \          | 4194304                 |\n|       2 | BackupLogBufferSize        \
  \   | 4194304                 |\n|       2 | Arbitration                   | 1 \
  \                      |\n|       2 | RedoBuffer                    | 16777216 \
  \               |\n|       2 | BackupDataDir                 | /backups/cluster/node_2\
  \ |\n|       2 | DiskPageBufferMemory          | 16777216                |\n|  \
  \     2 | Nodegroup                     | 0                       |\n|       2 |\
  \ SharedGlobalMemory            | 20971520                |\n+---------+-------------------------------+-------------------------+\n\
  36 rows in set (0.03 sec)\n```\n**清单 16-16. 查找所有具有非默认值的选项**\n\n> 注意\n> 并非所有选项都定义了默认值。`FileSystemPath`\
  \ 就是一个例子。这些选项将始终包含在报告中，以查找所有具有非默认值的选项。\n\n最后，配置视图可用于检测数据节点何时具有不同的配置。例如，如果在进行配置更改的滚动重启期间遗漏了某个节点，就可能发生此问题。当数据节点的配置不同时，可能会导致看似随机发生的微妙问题，因此很难调试。清单\
  \ 16-17 展示了一个检测数据节点设置不同的参数的例子。\n\n\n```\nmysql> SELECT p.param_name, v.node_id,\
  \ v.config_value\nFROM (SELECT config_param\nFROM ndbinfo.config_values\nGROUP BY\
  \ config_param\nHAVING COUNT(DISTINCT config_value) > 1\n) t\nINNER JOIN ndbinfo.config_params\
  \ p\nON p.param_number = t.config_param\nINNER JOIN ndbinfo.config_values v\nON\
  \ v.config_param = t.config_param\nWHERE param_name NOT IN ('BackupDataDir', 'DataDir',\n\
  'FileSystemPath', 'NodeId', 'Nodegroup')\nORDER BY p.param_name, v.node_id;\n+-------------------------------------+---------+--------------+\n\
  | param_name                          | node_id | config_value |\n+-------------------------------------+---------+--------------+\n\
  | MaxNoOfConcurrentOperations         |       1 | 5120         |\n| MaxNoOfConcurrentOperations\
  \         |       2 | 4096         |\n+-------------------------------------+---------+--------------+\n\
  2 rows in set (0.04 sec)\nListing 16-17.\n在数据节点上查找具有不同值的选项\n```\n\n有几个选项预计会有所不同。为了避免返回可能掩盖实际问题的数据，这些选项通过\
  \ `WHERE` 子句被明确移除。被排除的选项列表会根据集群的预期配置因集群而异。\n\n以上就是关于 NDB 集群信息数据库的示例报告。虽然这些报告对于访问数据非常有用，但它们无法替代日志。日志包含额外信息，并且即使事件完成后，消息仍然保留。MySQL\
  \ NDB 集群中的日志是接下来要讨论的监控源。\n\n### NDB 集群日志\n\n与 SQL 节点类似，管理节点和数据节点也有自己的日志文件。管理节点维护集群日志，这是整个集群的总体日志。在数据节点上，有三种日志类型：常规日志、错误日志和跟踪日志（文件）。本节概述了这些日志，并讨论了如何配置它们。\n\
  \n#### 集群日志\n\n集群日志是获取整个集群运行状况概览的最佳位置。这些日志由管理节点维护，每个管理节点一组日志，但它记录了与集群中所有节点相关的信息——因此得名。\n\
  \n由于管理节点控制集群日志，消息只有在至少一个管理节点在线时才会写入其中。考虑到每个管理节点写入自己的日志，当某个节点离线时可能会出现间隙，因此通常需要检查每个管理节点的集群日志。\n\
  \n**提示**\n\n集群日志消息的文档位于 [`dev.mysql.com/doc/refman/5.7/en/mysql-cluster-logs-cluster-log.html`](https://dev.mysql.com/doc/refman/5.7/en/mysql-cluster-logs-cluster-log.html)。\n\
  \n默认情况下，集群日志写入文件，每个集群日志由一组文件组成（稍后会详细介绍配置，包括如何更改目标位置、文件名、最大文件大小和最大文件数量）。当前正在写入的文件没有后缀，而旧文件则有后缀，包括一个数字。为了说明，假设当前活动的集群日志文件是\
  \ `ndb_49_cluster.log`（对于 `NodeId = 49` 的管理节点，这是默认值）。此文件名是集群日志的基本文件名。\n\n安装集群时，集群日志仅由\
  \ `ndb_49_cluster.log` 组成。日志消息随后写入该文件，当它达到最大大小时，会被重命名为 `ndb_49_cluster.log.1`，并创建一个名为\
  \ `ndb_49_cluster.log` 的新文件。当新文件也达到其最大大小时，它会被重命名为 `ndb_49_cluster.log.2`，依此类推。在某些时候，旧的集群日志文件数量达到配置允许的最大值。此时，`ndb_49_cluster.log.1`\
  \ 会被重新使用。因此，集群日志是一个循环日志，但 `ndb_49_cluster.log` 始终是最新的文件，而存档的日志文件中要么是次旧的，其余按顺序排列。\n\
  \n对于最多四个文件的配置，如图 16-2 所示。为简洁起见，图中文件的基本名称是 `cluster.log`，但对于生产系统，强烈建议在基本文件名中包含管理节点的节点\
  \ ID——例如，第 17 章讨论的 `ndb_error_reporter` 脚本就需要唯一的集群日志基本名称才能收集所有集群日志文件集。\n\n![A435171_1_En_16_Fig2_HTML.jpg](img/A435171_1_En_16_Fig2_HTML.jpg)\n\
  \n图 16-2.\n\n集群日志的循环特性 **提示**\n\n务必确保所有管理节点的集群日志基本文件名是唯一的。\n\n表 16-6 包含与集群日志相关的配置选项。除了集群日志基本文件名外，最好在所有节点上保持设置相同。关于这些选项以及如何控制记录内容的更多细节将在本节余下部分讨论。\n\
  \n表 16-6.\n\n集群日志配置选项\n\n| 选项 | 适用节点 | 默认值 | 描述 |\n| --- | --- | --- | --- |\n|\
  \ `LogDestination` | 管理节点 | 见正文 | 集群日志的写入位置、最大文件数量和文件大小。 |\n| `MemReportFrequency`\
  \ | 数据节点 | 0 | 报告 `DataMemory` 和 `IndexMemory` 使用情况的间隔秒数。 |\n| `StartupStatusReportFrequency`\
  \ | 数据节点 | 0 | 在初始节点重启期间，创建分片日志文件进度的报告频率。 |\n```\n\n\n\n#### 日志目标\n\n集群日志通过 `LogDestination`\
  \ 选项进行配置。其值是一个以分号分隔的列表，每个部分配置一个日志目标。支持三种日志目标：\n\n*   `FILE`：如前所述写入日志文件。这是默认且最常用的目标。\n\
  *   `SYSLOG`：将日志发送到 syslog 工具。\n*   `CONSOLE`：将日志写入控制台。除调试外很少使用。\n\n`FILE` 和 `SYSLOG`\
  \ 目标支持附加参数。这些参数列于表 16-7 中。\n\n**表 16-7. 日志目标的附加参数**\n\n| 选项 | 日志目标 | 描述 |\n| ---\
  \ | --- | --- |\n| `filename` | `FILE` | 基础文件名。建议在文件名中包含管理节点的节点 ID。 |\n| `maxsize`\
  \ | `FILE` | 每个集群日志文件的最大字节数。 |\n| `maxfiles` | `FILE` | 集群日志文件的最大数量（每个数据节点）。 |\n\
  | `facility` | `SYSLOG` | 要使用的 syslog 工具。支持的工具值包括 `auth`、`authpriv`、`cron`、`daemon`、`ftp`、`kern`、`lpr`、`mail`、`news`、`syslog`、`user`、`uucp`、`local0`、`local1`、`local2`、`local3`、`local4`、`local5`、`local6`\
  \ 和 `local7`。 |\n\n对于可以指定多个选项的 `FILE`，选项之间用逗号分隔。`LogDestination` 的默认值是 `FILE:filename=ndb_<NodeId>_cluster.log,maxsize=1000000,maxfiles=6`，其中\
  \ `<NodeId>` 是管理节点的节点 ID。默认大小适用于测试系统，但在大多数情况下建议为生产系统增大该值。\n\n在为 `FILE` 目标确定文件大小和数量时，应尽可能使文件大小足够大——例如，它必须仍可被查看和搜索。这在文件大小方面具体意味着什么取决于用于读取日志文件的工具。例如，Linux\
  \ 上的 `less` 命令可以处理数 GB 的大文件。处理大文件的主要问题在于搜索和读取所需的时间。其他工具（如 Notepad++）可能有最大文件大小限制。实际上，最大\
  \ 10-20 兆字节的大小运行良好。\n\n然后增加 `maxfiles`，使总大小（`maxsize * maxfiles`）足够大，以至少包含一周的日志数据。请注意，重启包含每个表和索引的数据，因此对于具有大量表、索引和/或数据节点的集群，一次滚动重启可能会使用几兆字节的日志空间。\n\
  \n#### 内存报告频率\n\n将 `MemReportFrequency` 设置为大于 `0` 的值将导致数据节点每 `MemReportFrequency`\
  \ 秒生成一份关于其 `DataMemory` 和 `IndexMemory` 使用情况的报告。该报告如下列摘录所示。\n\n```\n2017-06-19 20:26:02\
  \ [MgmtSrvr] INFO   -- Node 1: Data usage is 13%(174 32K pages of total 1280)\n\
  2017-06-19 20:26:02 [MgmtSrvr] INFO   -- Node 1: Index usage is 5%(113 8K pages\
  \ of total 1952)\n2017-06-19 20:26:03 [MgmtSrvr] INFO   -- Node 2: Data usage is\
  \ 13%(174 32K pages of total 1280)\n2017-06-19 20:26:03 [MgmtSrvr] INFO   -- Node\
  \ 2: Index usage is 5%(113 8K pages of total 1952)\n```\n\n相同的数据可以从 `ndbinfo.memoryusage`\
  \ 获得，这对于监控目的更好，尽管在日志中偶尔出现的内存使用情况报告对于与其他日志消息关联可能有用。\n\n即使 `MemReportFrequency = 0`，内存使用报告也不会完全关闭。如果数据或索引内存的使用率在任一方向上跨越\
  \ 80% 和 90% 的阈值，仍然会出现消息。清单 16-18 显示了一个内存使用率增长通过 80% 和 90%，然后减少回 80% 以下的示例。\n\n```\n\
  2017-06-19 21:12:39 [MgmtSrvr] INFO   -- Node 1: Data usage increased to 81%(1044\
  \ 32K pages of total 1280)\n2017-06-19 21:12:40 [MgmtSrvr] INFO   -- Node 2: Data\
  \ usage increased to 81%(1045 32K pages of total 1280)\n2017-06-19 21:12:51 [MgmtSrvr]\
  \ INFO   -- Node 2: Data usage increased to 90%(1153 32K pages of total 1280)\n\
  2017-06-19 21:12:52 [MgmtSrvr] INFO   -- Node 1: Data usage increased to 90%(1160\
  \ 32K pages of total 1280)\n2017-06-19 21:18:36 [MgmtSrvr] INFO   -- Node 2: Data\
  \ usage decreased to 88%(1132 32K pages of total 1280)\n2017-06-19 21:18:37 [MgmtSrvr]\
  \ INFO   -- Node 1: Data usage decreased to 88%(1132 32K pages of total 1280)\n\
  2017-06-19 21:22:08 [MgmtSrvr] INFO   -- Node 2: Data usage decreased to 79%(1013\
  \ 32K pages of total 1280)\n2017-06-19 21:22:09 [MgmtSrvr] INFO   -- Node 1: Data\
  \ usage decreased to 79%(1013 32K pages of total 1280)\n```\n**清单 16-18. 关于内存使用增加和减少的消息**\n\
  \n#### 启动状态报告频率\n\n最后一个集群日志配置选项是 `StartupStatusReportFrequency`。此选项仅在初始数据节点重启期间使用，此时会重新创建重做日志。特别是，如果日志是完整创建的（而不是稀疏的），这可能需要很长时间，因此记录进度报告会很有用。\n\
  \n默认设置（`StartupStatusReportFrequency = 0`）仅在开始和完成时记录重做日志文件生成的信息。当该值设置为非零值时，将每隔 `StartupStatusReportFrequency`\
  \ 秒记录一次进度报告。\n\n\n#### 控制日志记录内容\n\n在一定程度上，可以通过 `ndb_mgm` 命令行客户端中的 `CLUSTERLOG` 命令来控制记录到集群日志的内容。共有八个日志类别，每个类别都设置了一个日志阈值。这些类别是：\n\
  \n*   `CHECKPOINT`：用于在本地和全局检查点执行期间创建的消息。\n*   `CONNECTION`：用于在集群节点之间建立连接时创建的消息。\n\
  *   `ERROR`：与不导致节点故障的错误相关的消息。这包括丢失的心跳。\n*   `INFO`：用于信息性消息，例如发送心跳时。\n*   `NODERESTART`：类似于\
  \ `STARTUP` 和 `SHUTDOWN`，但用于数据节点重启。\n*   `STARTUP`：用于在数据节点启动期间创建的消息。\n*   `STATISTICS`：各种统计信息，例如事务数量、当前操作等。\n\
  *   `SHUTDOWN`：用于在数据节点关闭期间创建的消息。\n\n除 `ERROR` 外，所有类别的默认阈值为 `7`，`ERROR` 的默认阈值为 15。阈值的允许范围是\
  \ 0 到 15，其中 0 仅包含最重要的消息，而 15 包含所有消息。\n\n每条日志消息都有一个优先级，该优先级会与阈值进行比较。如果优先级小于或等于阈值，则该消息将被记录。例如，如果阈值为\
  \ 12 或更高，则优先级为 12 的消息将被记录。换句话说，配置的阈值越高，日志消息就越多。\n\n通过指定要应用到的数据节点，后跟 `CLUSTERLOG`\
  \ 命令以及带有阈值的类别来设置阈值。例如，要为 `NodeId = 1` 的数据节点将 `STATISTICS` 类别设置为 `15`，请使用以下命令：\n\n\
  ```\nndb_mgm> 1 CLUSTERLOG STATISTICS=15\nExecuting CLUSTERLOG STATISTICS=15 on\
  \ node 1 OK!\n```\n\n要对所有数据节点进行相同的更改，请使用以下命令：\n\n```\nndb_mgm> ALL CLUSTERLOG STATISTICS=15\n\
  Executing CLUSTERLOG STATISTICS=15 on node 1 OK!\nExecuting CLUSTERLOG STATISTICS=15\
  \ on node 2 OK!\n```\n\n注意\n\n阈值是针对给定的管理节点和数据节点对设置的（或一个管理节点对所有数据节点）。如果有多个管理节点，并且阈值应适用于所有集群日志，则必须在连接到每个管理节点时执行\
  \ `CLUSTERLOG` 命令。\n\n在旧版本的 MySQL NDB Cluster 中，更常见的做法是提高阈值以获取信息。例如，对于统计信息，通常最好从\
  \ `ndbinfo` 获取数据。\n\n除了优先级之外，每条日志消息还有一个严重性级别。可以使用参数略有不同的 `CLUSTERLOG` 命令，按严重性过滤消息。例如，您可以使用以下命令切换\
  \ `INFO` 级别消息的记录：\n\n```\nndb_mgm> CLUSTERLOG FILTER INFO;\nINFO disabled\n```\n\
  \n再次执行以重新启用：\n\n```\nndb_mgm> CLUSTERLOG FILTER INFO;\nINFO enabled\n```\n\n有六个严重性级别，按严重性递减的顺序排列为：\n\
  \n*   `ALERT`：必须立即纠正的最严重问题。这包括有关网络分区、节点故障、备份失败等的信息。\n*   `CRITICAL`：此级别目前未使用。\n\
  *   `ERROR`：仍然非常重要且必须紧急处理的事件。例如运输器错误。\n*   `WARNING`：重要的消息，例如丢失的心跳（但节点尚未被宣告为死亡）。这些消息通常需要关注。\n\
  *   `INFO`：通常不需要任何操作的信息性消息。例如备份已启动或已完成。\n*   `DEBUG`：非常详细的消息，例如运输器已收到文件结束消息。这些消息在处理源代码时大多有用。\n\
  \n默认情况下，除 `DEBUG` 严重性级别外，所有级别均已启用。\n\n提示\n\n集群日志事件的详细信息、如何控制记录内容以及事件的分类（包括其优先级和严重性）记录在\
  \ [`dev.mysql.com/doc/refman/5.7/en/mysql-cluster-event-reports.html`](https://dev.mysql.com/doc/refman/5.7/en/mysql-cluster-event-reports.html)\
  \ 以及页面顶部附近列出的子页面中。\n\n#### 数据节点日志\n\n虽然集群日志提供了集群活动的良好概览，但有时需要获取更多信息。每个数据节点有三种日志类型，涵盖一般消息、非计划关闭详细信息和跟踪日志。所有数据节点日志文件都位于\
  \ `DataDir` 指定的路径中。表 16-8 总结了这三种日志。\n\n表 16-8. 数据节点日志文件\n\n| 日志 | 文件名 | 描述 |\n|\
  \ --- | --- | --- |\n| 输出日志 | `ndb_<NodeId>_out.log` | 一般日志消息。类似于 MySQL 服务器错误日志，但用于数据节点。\
  \ |\n| 错误日志 | `ndb_<NodeId>_error.log` | 每次非计划关闭一个消息块，包含节点关闭原因的详细信息。 |\n| 跟踪日志 |\
  \ `ndb_<NodeId>_trace.log.<count>` | 每次非计划关闭一组日志文件。每组每个数据节点线程一个文件。 |\n\n`<NodeId>`\
  \ 是数据节点的 `NodeId` 的占位符，`<count>` 是一个计数器的占位符，该计数器针对每次非计划关闭递增。`MaxNoOfSavedMessages`\
  \ 选项设置错误日志中的消息块数和跟踪文件集的限制。默认值为 25。\n\n第 17 章专门介绍故障排除，并包含有关数据节点日志的更多信息。\n\n### 总结\n\
  \n本章介绍了 `ndbinfo` 模式，包括创建可用于监控目的的报告的几个示例。此外，还讨论了管理和数据节点上可用的日志和跟踪文件。它也结束了关于监控、监控来源以及\
  \ MySQL NDB Cluster 设置中可用日志的探讨。正如您在本章和前两章所见，监控是一个非常大的主题，本身就可以写一整本书。在 MySQL NDB Cluster\
  \ 上实现良好的监控不是一天就能完成的事情——相反，它是一个持续的过程。\n\n还有一个与监控和日志相关的话题需要讨论：故障排除。这是下一章的主题。\n\n脚注\
  \ 1\n\n[`en.wikipedia.org/wiki/Standard_deviation`](https://en.wikipedia.org/wiki/Standard_deviation)\n\
  \n# 17. 典型问题与解决方案\n\n本章讨论可能发生在 MySQL NDB Cluster 上的问题。由于没有事物是完美的，您的 MySQL NDB Cluster\
  \ 安装可能会遇到一些麻烦。为了您的服务质量，尽量减少因这些麻烦导致的停机时间非常重要。您需要为问题做好准备，并尽快解决它们。在本章中，通过典型的问题示例学习如何应对麻烦。\n\
  \n### 数据节点上的典型问题\n\n由于数据节点是 MySQL NDB Cluster 的核心，数据节点上的问题可能会影响整个数据库集群系统。即使数据节点通常是冗余的，并且单个数据节点的缺失不会导致整个系统中断，但由于多个节点故障，这种情况仍可能发生。因此，尽量减少多个节点故障的概率非常重要。为了实现这一目标，必须快速识别问题并解决它们。\n\
  \n提示\n\n当您遇到问题时，请务必搜索错误数据库，因为相同的问题可能已被报告。如果您找不到完全相同的问题，请在 [`bugs.mysql.com/`](https://bugs.mysql.com/)\
  \ 提交一个新的错误报告。如果您拥有支持许可证，请联系 Oracle Corporation 寻求支持。商业支持是节省调查所需时间和成本的好方法。\n\n####\
  \ 关于节点故障的一般信息\n\n数据节点可能因多种原因崩溃。由于 MySQL NDB 集群采用**早期故障策略**，当出现问题时，数据节点会自行关闭。该策略假设数据节点具有冗余性，当发生单节点故障时，可以防止整个系统中断。单节点故障对\
  \ MySQL NDB 集群并非致命问题。请对节点故障采取适当措施。如果您长期运行包含大量数据节点的集群，那么在某些时候遇到节点故障的可能性相当高。\n\n本节讨论如何收集调查节点故障所需的信息。\n\
  \n#### 集群日志\n\n节点故障发生后，您必须首先检查的是集群日志，它是整个集群的集中式综合日志。它存储在每个管理节点上。集群日志的内容因其过滤配置而异。有关集群日志的更多详细信息，请参见第\
  \ 16 章；有关集群日志配置的更多详细信息，请参见第 4 章。默认情况下，集群日志的文件名类似为 `ndb_NODEID_cluster.log`，其中 `NODEID`\
  \ 是写入集群日志的管理节点的 `NodeId`。\n\n在节点故障时，数据节点会在完全关闭之前报告其为何要异常关闭的原因。在节点故障导致节点崩溃之前，集群日志中可能存在一些迹象。请仔细检查集群日志，看看崩溃之前发生了什么。清单\
  \ 17-1 显示了一个因心跳故障导致节点故障的集群日志示例。在此示例中，节点 1 被强制关闭，因为节点 2（节点 1 的“左侧”节点）检测到心跳信号在特定时间内未到达。有关心跳和“左侧”节点的更多信息，请参见第\
  \ 1 章。\n\n```\n2017-05-13 17:27:09 [MgmtSrvr] WARNING  -- Node 2: Node 1 missed\
  \ heartbeat 2\n2017-05-13 17:27:14 [MgmtSrvr] WARNING  -- Node 2: Node 1 missed\
  \ heartbeat 3\n2017-05-13 17:27:19 [MgmtSrvr] WARNING  -- Node 2: Node 1 missed\
  \ heartbeat 4\n2017-05-13 17:27:19 [MgmtSrvr] ALERT    -- Node 2: Node 1 declared\
  \ dead due to missed heartbeat\n... snip ...\n2017-05-13 17:27:22 [MgmtSrvr] ALERT\
  \    -- Node 1: Forced node shutdown completed. Caused by error 2315: 'Node declared\
  \ dead. See error log for details(Arbitration error). Temporary error, restart node'.\n\
  ```\n\n清单 17-1. 因错过心跳导致数据节点故障时的集群日志\n\n#### 节点日志\n\n顾名思义，节点日志是存储在本地每个节点上的特定于节点的日志。与集群日志相比，它可能包含更详细的信息，并可用于调试目的。节点日志的文件名类似为\
  \ `ndb_NODEID_out.log`，其中 `NODEID` 是数据节点的 `NodeId`。清单 17-2 显示了一个因错过心跳导致数据节点被关闭时的节点日志示例。\n\
  \n```\n2017-05-13 17:27:22 [ndbd] WARNING  -- thr: 1: Overslept 23577 ms, expected\
  \ ∼10ms\n2017-05-13 17:27:22 [ndbd] WARNING  -- thr: 2: Overslept 23572 ms, expected\
  \ ∼10ms\n2017-05-13 17:27:22 [ndbd] WARNING  -- thr: 0: Overslept 23572 ms, expected\
  \ ∼10ms\n2017-05-13 17:27:22 [ndbd] WARNING  -- timerHandlingLab, expected 10ms\
  \ sleep, not scheduled for: 23572 (ms)\n2017-05-13 17:27:22 [ndbd] WARNING  -- thr:\
  \ 3: Overslept 23571 ms, expected ∼10ms\n2017-05-13 17:27:22 [ndbd] INFO     --\
  \ Watchdog: User time: 93  System time: 681\n2017-05-13 17:27:22 [ndbd] WARNING\
  \  -- Watchdog: Warning overslept 23669 ms, expected 100 ms.\n2017-05-13 17:27:22\
  \ [ndbd] INFO     -- We(1) have been declared dead by 2 (via 2) reason: Heartbeat\
  \ failure(4)\n2017-05-13 17:27:22 [ndbd] INFO     -- QMGR (Line: 4213) 0x00000002\n\
  2017-05-13 17:27:22 [ndbd] INFO     -- Error handler shutting down system\n2017-05-13\
  \ 17:27:22 [ndbd] INFO     -- Error handler shutdown completed - exiting\n2017-05-13\
  \ 17:27:22 [ndbd] ALERT    -- Node 1: Forced node shutdown completed. Caused by\
  \ error 2315: 'Node declared dead. See error log for details(Arbitration error).\
  \ Temporary error, restart node'.\n```\n\n清单 17-2. 因错过心跳被标记为死亡时的数据节点节点日志示例\n\n您可以看到数据节点中的线程**睡眠过长**时间，因此报告了看门狗警告。当没有更多信号需要处理时，数据节点中的线程会故意休眠一段时间。然而，线程可能由于各种原因睡眠过长（未能按计划唤醒）；例如，由于高负载，操作系统未能为线程分配\
  \ CPU 时间。在此示例中，线程睡眠过长是因为我使用调试器（GDB）暂停了 `ndbmtd` 进程一段时间。这阻止了数据节点 1 向数据节点 2 发送心跳信号，因此数据节点\
  \ 2 将数据节点 1 标记为死亡。虽然这是一个**人为故障**，但类似日志内容也可能偶然出现在您的生产系统中。\n\n##### 错误日志\n\n当数据节点遇到计划外关闭时，它会将其错误日志中记录一个事件。写入错误日志的信息包括错误发生时间、错误代码、错误发生位置等。错误日志的文件名类似为\
  \ `ndb_NODEID_error.log`，其中 `NODEID` 表示数据节点的 `NodeId`。清单 17-3 显示了一个因错过心跳被标记为死亡时的数据节点错误日志示例。\n\
  \n```\nTime: Saturday 13 May 2017 - 17:27:22\nStatus: Temporary error, restart node\n\
  Message: Node declared dead. See error log for details (Arbitration error)\nError:\
  \ 2315\nError data: We(1) have been declared dead by 2 (via 2) reason: Heartbeat\
  \ failure(4)\nError object: QMGR (Line: 4213) 0x00000002\nProgram: ndbmtd\nPid:\
  \ 29262 thr: 0\nVersion: mysql-5.7.18 ndb-7.5.6\nTrace file name: ndb_1_trace.log.1\n\
  Trace file path: /var/lib/mysql-cluster/ndb_1_trace.log.1 [t1..t4]\n***EOM***\n\
  ```\n\n清单 17-3. 因错过心跳被标记为死亡时的数据节点错误日志示例\n\n在此错误日志中，您可以看到错误编号为 2315；数据节点 2 因连续四次心跳失败将此节点标记为死亡。然后，`QMGR`\
  \ 块强制关闭了此节点。您还可以看到 MySQL NDB 集群的版本是 7.5.6。对于此情况，错误日志提供的信息已足够，无需进一步调查。然而，在各种情况下通常需要进一步的信息。进一步调查所需信息的来源是跟踪文件，这将在下一节中描述。\n\
  \n#### 跟踪文件\n\n当节点发生故障时，会在失败的数据节点的`DataDir`目录下生成一个名为跟踪文件的特殊日志文件。请不要将此处的跟踪文件与从`mysqld`的调试版本中获取的跟踪文件混淆。本节中的跟踪文件是\
  \ NDB 内核的一项功能，在非调试版本的`ndbd`和`ndbmtd`上默认启用。跟踪文件的文件名类似于`ndb_NODEID_trace.log.N`，其中`NODEID`表示数据节点的`NodeId`，`N`表示跟踪文件的\
  \ ID。该 ID 会递增至`MaxNoOfSavedMessages`，如果达到`MaxNoOfSavedMessages`，则重置为`1`。\n\n####\
  \ 注意\n\n如果数据节点频繁崩溃，请增加`MaxNoOfSavedMessages`的值，以便新的跟踪文件不会覆盖现有文件。每个跟踪文件的大小很小，因此不必担心跟踪文件会消耗过多的文件系统空间。此选项的默认值为\
  \ 25。\n\n跟踪文件是调查崩溃问题时最重要的数据来源。每次崩溃都会创建一个或多个跟踪文件。清单 17-4 和 17-5 展示了跟踪文件内容的示例。清单 17-4\
  \ 显示了一个跟踪文件的起始部分。清单 17-5 显示了一个跟踪文件的中间部分。\n\n```\n$ head -20 ndb_1_trace.log.1\n\
  JAM CONTENTS up->down left->right\nSOURCE FILE          LINE  LINE  LINE  LINE \
  \ LINE  LINE  LINE  LINE  LINE\nQmgrMain.cpp         02804 02821 02989 02828 02926\
  \ 00050 00051 00052 00053\n\n---> signal\nDbdihMain.cpp        00359 00530 27209\
  \ 16403 16492 16492 16492 16492\n---> signal\nDbdihMain.cpp        16857\n---> signal\n\
  DbdihMain.cpp        16497 16510\n---> signal\nDbdihMain.cpp        17581 17527\
  \ 17527 17527 17527 17527 17527 17527 17527\n17527 17527 17527 17527 17527 17527\
  \ 17527 17527 17527\n17527 17527 17527 17527 17527 17527 17527 17527 17527\n17527\
  \ 17527 17527 17527 17527 17527 17527 17527 17527\n17527 17527 17527 17527 17527\
  \ 17527 17527 17527 17527\n17527 17527 17527 17527 17562\nDbtcMain.cpp         05571\n\
  Ndbfs.cpp            01593 01426\n清单 17-4.\n跟踪文件起始部分的示例内容\n```\n\n```\n$ head -461\
  \ ndb_1_trace.log.1 | tail -12\n---> signal\nQmgrMain.cpp         00220 04130\n\
  SimulatedBlock.cpp   02018\n--------------- Signal ----------------\nr.bn: 252 \"\
  QMGR\", r.proc: 1, r.sigId: 146516 gsn: 254 \"FAIL_REP\" prio: 0\ns.bn: 252 \"QMGR\"\
  , s.proc: 2, s.sigId: 96525 length: 3 trace: 0 #sec: 0 fragInf: 0\nFailedNode: 1,\
  \ FailCause: 4\n--------------- Signal ----------------\nr.bn: 246 \"DBDIH\", r.proc:\
  \ 1, r.sigId: 146515 gsn: 164 \"CONTINUEB\" prio: 0\ns.bn: 246 \"DBDIH\", s.proc:\
  \ 1, s.sigId: 146502 length: 1 trace: 0 #sec: 0 fragInf: 0\nCheck GCP Stop\n清单 17-5.\n\
  跟踪文件中间部分的示例内容\n```\n\n如果从未见过，这看起来可能像垃圾信息，尽管它非常重要。跟踪文件的内容由两部分组成。一部分是如清单 17-4 所示的程序跟踪；另一部分是最近执行的信号转储，如清单\
  \ 17-5 的后半部分。\n\n调查数据节点上的问题需要程序跟踪，因为数据节点中的工作单元是信号。通常基于锁的多线程程序通过以嵌套方式调用函数来实现复杂算法，这些算法使用锁来解决竞争条件。因此，通过检查堆栈跟踪可以弄清楚线程在崩溃时正在做什么；它是一条历史记录，指示哪个函数被哪个函数调用。由于`mysqld`是基于锁的多线程程序，堆栈跟踪是调查崩溃原因的良好起点。\n\
  \n然而，这对于`ndbmtd`和`ndbd`来说并不成立。在这些进程中，复杂算法被分解为信号，信号是这些进程中的任务单元。处理每个信号的算法设计得非常小而简单。如果一个信号需要进一步处理，则通过一个或多个额外的信号来完成，这些信号被发送到内核块（自己的或其他的），而不是通过调用函数。`ndbmtd`和`ndbd`的堆栈跟踪相当小，不包含足够的数据来弄清楚程序执行的历史。因此，在进行崩溃分析时，需要跟踪文件而不是堆栈跟踪。\n\
  \n跟踪文件的第一部分指示相关线程在哪个源文件的哪一行执行。例如，清单 17-4 表明`ndbmtd`执行了`QmgrMain.cpp`的第 2804 行，然后是同一文件的第\
  \ 2821、2989、2828 行等。信号处理在第 255 行结束，然后切换到下一个信号，该信号从`DbdihMain.cpp`的第 359 行开始。\n\n\
  跟踪文件的后半部分是按从新到旧顺序排列的信号列表。如第 2 章所述，信号根据其优先级存储在两个作业缓冲区中。由于作业缓冲区是按循环方式使用的固定大小数组，已执行的旧信号会在作业缓冲区中保留一段时间。当每个信号执行时，会分配一个单调递增的标识符给该信号。因此，即使存在两个缓冲区，也可以使用此标识符对作业缓冲区中的信号按执行顺序进行排序。\n\
  \n查看清单 17-5，它显示了 jam 缓冲区内容和作业缓冲区内容的边界。由于 jam 缓冲区内容按从旧到新的顺序排序，而作业缓冲区内容按从新到旧的顺序排序，因此最新数据位于边界附近。因此，通过检查边界附近的数据，可以弄清楚数据节点崩溃那一刻发生的情况。分析跟踪文件时，首先要做的就是滚动到边界。然后，获取最新作业缓冲区周围的源代码以及信号数据。\n\
  \n请注意，数据节点的多线程版本`ndbmtd`有多组作业缓冲区和 jam 缓冲区；每个线程一组。因此，每个实例都会创建一个跟踪文件，每个跟踪文件的后缀为`_tN`，其中`N`表示线程号。要写入跟踪文件，必须事先停止所有执行线程。非崩溃原因的线程会通过`STOP_FOR_CRASH`信号停止。因此，首先调查不包含`STOP_FOR_CRASH`信号的跟踪文件。请注意，错误日志条目也会告诉您它认为哪个线程是罪魁祸首。\n\
  \n\n##### 核心转储文件\n\n尽管数据节点是使用信号处理架构设计的，但有时仍需分析核心转储文件以访问内存中的值。从跟踪文件中可以检索的信息主要是行号和信号数据。如果您需要检查跟踪文件中未显示的更多数据（例如全局变量），则像处理常规程序一样，需要核心转储文件。\n\
  \n在类 UNIX 系统上，可以通过以下指令在崩溃时获取核心转储文件：\n\n*   确保您的程序二进制文件包含调试符号。Oracle 公司官方发布的二进制文件包含调试符号。使用从源代码编译的二进制文件时请谨慎。\n\
  *   确保文件系统上有足够的可用空间。由于数据节点进程消耗大量内存，因此需要相同的可用磁盘空间来存储核心转储文件。\n*   在启动 `ndbmtd` 和 `ndbd`\
  \ 之前，使用 `ulimit` 命令允许进程生成足够大的核心转储文件。指定 `unlimited` 以生成完整的进程内存映像。\n*   在启动 `ndbmtd`\
  \ 和 `ndbd` 时指定 `--core-file` 选项。\n\n要分析核心转储文件，需要 GDB、LLDB、dbx 或 mdb 等调试器。\n\n注意\n\
  \n目前，Windows 上的数据节点不会生成核心转储文件。有关 Windows 上此问题的详细信息，请参阅错误报告：[`bugs.mysql.com/bug.php?id=86358`](https://bugs.mysql.com/bug.php?id=86358)。\n\
  \n##### NDB 错误报告工具\n\n当数据节点崩溃时，我们需要检查包括配置文件和日志在内的各种文件。NDB 错误报告工具，即 `ndb_error_reporter`\
  \ 命令，会收集调查所需的各种文件。它通过 SSH 登录到远程主机，并将文件复制到本地主机。从数据节点和管理节点收集以下文件：\n\n*   `config.ini`\n\
  *   PID 文件\n*   集群日志\n*   错误日志\n*   节点日志\n*   跟踪文件\n*   `FileSystemPath` 下的数据文件（可选）\n\
  \n该命令以配置文件作为其参数。一个典型的命令是：\n\n```\n$ ndb_error_reporter ./config.ini\n```\n\n然后，它在当前工作目录下生成一个名为\
  \ `ndb_error_report_DATETIME.tar.bz2` 的压缩归档文件，其中 `DATETIME` 表示当前时间戳的数字格式（`YYYYMMDDhhmmss`）。该命令可能需要额外的参数来指定用于远程登录的用户名。更多详情请参见\
  \ `ndb_error_reporter --help`。\n\n我建议在设置好集群后，为测试目的运行一次此命令。如果您遇到任何问题，请在需要使用此实用程序收集崩溃信息之前提前解决它们。\n\
  \n由于该命令是用 Perl 脚本编写的，因此您需要预先在系统上安装 Perl 解释器。\n\n提示\n\nMySQL 集群管理器也可以收集配置文件和日志。有关\
  \ MySQL 集群管理器的更多详情，请参见第 13 章。\n\n#### 看门狗超时\n\n在数据节点上，所有处理信号的线程都由看门狗线程监控。看门狗线程每\
  \ `TimeBetweenWatchDogCheck` 毫秒唤醒一次，并检查被监控线程是否已将看门狗计数器更改为非零值，然后将计数器重置为零。如果看门狗计数器保持为零，则看门狗线程认为被监控线程已卡住且无法继续执行。由于\
  \ MySQL NDB 集群被设计为一个实时数据库系统，需在保证的时限内做出响应，在一个信号上卡住是一个严重问题。回想一下，MySQL NDB 集群采用了快速失败策略。当检测到看门狗超时，卡住的数据节点将被强制关闭。清单\
  \ 17-6 显示了一个错误日志，其中数据节点因看门狗超时而死亡。\n\n```\nTime: Thursday 18 May 2017 - 15:53:34\n\
  Status: Temporary error, restart node\nMessage: WatchDog terminate, internal error\
  \ or massive overload on the machine running this node (Internal error, programming\
  \ error or missing error message, please report a bug)\nError: 6050\nError data:\
  \ Job Handling\nError object: /srctopdir/storage/ndb/src/kernel/vm/WatchDog.cpp\n\
  Program: ndbmtd\nPid: 2082\nVersion: mysql-5.7.18 ndb-7.5.6\nTrace file name: ndb_2_trace.log.1\n\
  Trace file path: /var/lib/mysql-cluster/ndb_2_trace.log.1 [t1..t4]\n***EOM***\n\
  ```\n\n清单 17-6.\n因数据节点死于看门狗超时而导致的错误日志\n\n您可以看到清单 17-6 中的 `Error Data` 是 “`Job Handling`”，这表示线程卡住时的状态。此状态表明数据节点在处理信号时卡住了。表\
  \ 17-1 显示了可能的线程状态列表。\n\n表 17-1.\n\n数据节点上可能的线程状态列表\n\n| 状态 | 描述 |\n| --- | --- |\n\
  | Job Handling | 执行线程正在处理信号。 |\n| Scanning Timers | 执行线程正在检测时钟是否倒走。 |\n| External\
  \ I/O | 发送线程正在释放本地内存。 |\n| Print Job Buffers at crash | 线程正在崩溃时转储 jam 缓冲区和信号内存。\
  \ |\n| Checking connections | 接收线程正在检查连接状态。 |\n| Performing Send | 发送线程正在执行发送操作。\
  \ |\n| Polling for Receive | 接收线程正在轮询套接字。 |\n| Performing Receive | 接收线程正在执行接收操作。\
  \ |\n| Allocating memory | 线程正在分配内存。此状态仅在启动时显示。 |\n| Packing Send Buffers | 线程正在打包发送缓冲区，以便为其他线程释放内存。\
  \ |\n\n看门狗超时可能由以下原因引起：\n\n*   数据节点过载。\n*   由于内存不足，数据节点进程被换出。\n*   使用虚拟机时导致不必要的延迟。\n\
  *   网络接口故障。\n*   内核内部发生缓慢操作，例如内存压缩。\n*   数据节点中的错误，例如无限循环。\n\n##### LCP 看门狗超时\n\n\
  当数据节点遇到磁盘问题时，它可能长时间无法将本地检查点（LCP）写入磁盘。如果 LCP 进度超过 `LcpScanProgressTimeout` 秒（默认为\
  \ 60 秒）没有任何进展，数据节点将由于快速失败策略而自行关闭。卡住的 LCP 是个问题，因为它会耗尽重做日志空间。请注意，上次 LCP 之后写入的所有重做日志条目都必须保留，直到下一个\
  \ LCP 完成。清单 17-7 显示了一个错误日志示例，其中数据节点因 LCP 看门狗超时而死亡。\n\n```\nTime: Thursday 18 May\
  \ 2017 - 18:32:57\nStatus: Temporary error, restart node\nMessage: LCP fragment\
  \ scan watchdog detected a problem.  Please report a bug. (Internal error, programming\
  \ error or missing error message, please report a bug)\nError: 7200\nError data:\
  \ Please report this as a bug. Provide as much info as possible, especially all\
  \ the ndb_*_out.log files, Thanks. Shutting down node due to lack of LCP fragment\
  \ scan progress\nError object: DBLQH (Line: 25454) 0x00000002\nProgram: ndbmtd\n\
  Pid: 30777 thr: 2\nVersion: mysql-5.7.18 ndb-7.5.6\nTrace file name: ndb_3_trace.log.1_t2\n\
  Trace file path: /var/lib/mysql-cluster/ndb_3_trace.log.1 [t1..t4]\n***EOM***\n\
  ```\n\n清单 17-7.\n因数据节点死于 LCP 看门狗超时而导致的错误日志\n\n此问题很可能是由故障和/或过载的磁盘引起的。您需要监控磁盘的 I/O\
  \ 活动并更换任何故障磁盘。\n\n\n#### 交换混乱\n\n如第 3 章和第 4 章所述，现代 CPU 通常内置内存控制器以加快内存访问速度。RAM 直接连接到每个\
  \ CPU。因此，访问内存的速度取决于目标内存位于哪个 CPU 上。这种系统架构被称为非统一内存访问（NUMA）。图 17-1 展示了一个具有两个 CPU 的\
  \ NUMA 系统的概念视图。每个 CPU 及其本地内存称为一个 NUMA 节点。如果 CPU0 访问位于不同 NUMA 节点的 CPU1 下的 RAM，则数据必须通过两个\
  \ CPU 之间的总线进行传输，这比访问本地 RAM 要慢得多。\n\n![A435171_1_En_17_Fig1_HTML.jpg](img/A435171_1_En_17_Fig1_HTML.jpg)\n\
  \n图 17-1. NUMA 概念\n\n近期的 Linux 内核尝试从运行分配内存的线程所在的同一个 NUMA 节点分配内存。如果当前 NUMA 节点的可用空间不足，则从其他\
  \ NUMA 节点分配内存。这种策略对于分配少量内存的程序效果很好，因为同一 NUMA 节点内的内存访问速度快。然而，对于所需内存大于单个 NUMA 节点 RAM\
  \ 大小的程序，这种策略效果不佳。图 17-2 描述了一个 NUMA 节点内存耗尽的情况。\n\n![A435171_1_En_17_Fig2_HTML.jpg](img/A435171_1_En_17_Fig2_HTML.jpg)\n\
  \n图 17-2. 即使存在可用空间，内存仍然短缺\n\n在图 17-2 中，CPU0 无法从其本地 RAM 模块分配更多内存。在这种情况下，操作系统内核将为用户进程从远程\
  \ NUMA 节点分配内存。从功能角度来看，即使内存访问速度较慢，这也不是问题。然而，某些内核模块有时要求从线程当前运行的同一个 NUMA 节点分配内存。在这种情况下，即使远程\
  \ NUMA 节点上存在可用内存，内存仍然短缺。然后，一些进程被换出。这被称为**交换混乱**。当然，交换会对运行中的程序产生各种负面影响，例如速度下降，进而可能导致数据节点的其他关键问题，例如**看门狗超时**。\n\
  \n从 MySQL NDB Cluster 7.2 开始，为 Linux 二进制文件引入了`Numa`选项。当该选项设置为 1（默认值）时，使用`libnuma`的功能从所有\
  \ NUMA 节点均匀执行内存分配。请不要禁用此选项。如果您使用的是旧版本，请考虑升级到 MySQL NDB Cluster 7.2 或更新版本。如果不想升级，请通过`numactrl`命令运行数据节点，如下所示：\n\
  \n```\n$ numactrl --interleave all ndbmtd -c mgmhost\n```\n\n#### GCP 停止\n\n在 7.2\
  \ 系列之前的版本中，全局检查点停止是一个主要问题。由于采用了尽早失败的策略，数据节点被设计为分离滞后的节点以保持整个系统稳定。作为该策略的一部分，导致 GCP\
  \ 滞后的数据节点会被强制关闭，这被称为**GCP 停止**。GCP 可能因各种原因花费时间，而过度的延迟将导致 GCP 停止。\n\n当微 GCP 未在`TimeBetweenEpochsTimeout`毫秒内完成时，即检测到\
  \ GCP 停止。微 GCP 通常可以快速完成，因为它是一个内存操作。然而，对于（非微）GCP，由于数据节点每`TimeBetweenGlobalCheckpoints`毫秒将重做日志写入磁盘，可能会花费较长时间。GCP\
  \ 停止很可能由于磁盘速度慢而发生。磁盘变慢有多种原因：\n\n*   磁盘故障。\n*   由于对磁盘数据表的读/写操作导致磁盘 I/O 过载。\n*   其他进程使用磁盘，包括将备份复制出服务器。\n\
  *   对重做日志的写入过多。\n\n从 MySQL NDB Cluster 7.2 开始，`TimeBetweenEpochsTimeout`的默认值已更改为\
  \ 0，这完全禁用了微 GCP 的超时。在非常旧的版本（早于 7.0.21 和 7.1.10）中，超时无法禁用，该选项的默认值为四秒。从 MySQL NDB Cluster\
  \ 7.0.21 和 7.1.10 开始，最大值从 32 秒增加到 256 秒，并且可以禁用微 GCP 超时。（实际上，在某些情况下 32 秒的设置并不够。）此更改通过避免因尽早失败策略导致的数据节点故障，提高了数据节点的可用性。然而，存在一个权衡，即当磁盘由于前述原因变慢时，事务处理的响应可能会变慢。任何活动事务在正在进行的微\
  \ GCP 完成之前都无法提交。因此，当 GCP 停止被禁用时，完成这些事务将需要很长时间。\n\n为了解决这个问题，在 MySQL NDB Cluster 7.2\
  \ 系列中又添加了另一项功能——**重做日志过度提交**。顾名思义，即使重做日志的写入实际上没有完成，也暂定假定其在推进。这可以防止在磁盘突然变慢时事务处理变慢。如果写入重做日志的操作稍后赶上，则没有问题。如果磁盘速度太慢，以至于重做日志刷新操作花费超过`RedoOverCommitLimit`秒并达到`RedoOverCommitCounter`次，则挂起的事务将被中止。从稳定性角度来看，这比关闭数据节点更好。然后，包括\
  \ SQL 节点在内的 NDB API 客户端将根据`DefaultOperationRedoProblemAction`选项采取进一步的措施。重做日志过度提交的一个缺点是，它会增加在完全系统中断时丢失数据的机会，因为它可能扩大重做日志记录实际尚未完成的时期。\n\
  \n因此，GCP 停止在近期版本中已不是主要问题。然而，使用非零的`TimeBetweenEpochsTimeout`值来配置数据节点仍然有意义，以便在磁盘速度慢时，如果您更倾向于尽早失败策略而非中止事务，则可以有意触发\
  \ GCP 停止。这将最大化性能而不是牺牲稳定性。\n\n#### 网络分区（脑裂）\n\n正如本书其他章节（例如第 1 章和第 3 章）所讨论的，MySQL\
  \ NDB Cluster 数据节点可能发生一种称为网络分区（也称为脑裂）的问题。网络分区是指数据节点之间的网络连接被均匀断开，使得每个节点组中恰好有一个数据节点可以运行并连接。在这种情况下，可能会有多个集群继续运行。由于它们之间已断开连接，对一个集群的写入操作可能导致另一个集群中的数据不一致，这对于数据库系统是致命问题，因为数据一致性至关重要。\n\
  \n为了防止网络分区，MySQL NDB Cluster 执行仲裁来决定哪个集群将继续运行。当仲裁执行并且一个集群胜出时，另一个集群会被强制关闭。此过程即所谓的\
  \ STONITH（Shoot The Other Node In The Head）。如果仲裁正常工作，网络分区就不会发生。即使仲裁未工作，网络分区也不会发生，因为所有数据节点将因仲裁失败而关闭。但整个集群关闭也是一个需要避免的严重问题。\n\
  \n确保即使在数据节点之间的网络连接丢失时，仲裁器也能从所有数据节点访问。为数据节点之间的连接使用独立的网络交换机，并通过诸如 bonding 驱动之类的网络层实现网络连接冗余，如第\
  \ 3 章所述。\n\n网络分区成为实际问题的唯一可能时机是在启动时，因为即使发生网络分区，启动时也不会执行仲裁。务必确保启动期间永远不会发生网络分区。我强烈建议将\
  \ `StartPartitionedTimeout` 设置为一个非常大的值，以防止启动时发生网络分区。\n\n如果偶然发现网络分区正在发生，请按照以下说明解决问题：\n\
  \n1.  尽快停止您的应用程序。\n2.  决定哪个分区应该保留。如果不确定，任意选择一个也可以。\n3.  关闭一个分区。\n4.  解决网络问题。\n5.\
  \  使用 `--initial` 选项逐个重新连接已停止的数据节点。\n6.  如果可能，解决数据不一致问题。否则，考虑恢复最近一次成功的备份。前者情况下，您将部分丢失最新的修改；后者情况下，您将丢失所有最近的修改。\n\
  7.  重新启动您的应用程序。\n\n#### 整个系统的计划外关闭\n\n即使系统具有容错性，整个系统也可能离线；可能由以下原因引起：\n\n*   当数据节点故障时，同一节点组中一个存活的数据节点可能在故障节点恢复在线之前也发生故障。如果一个节点组内没有可用的数据节点，整个数据库集群系统将关闭。\n\
  *   整个集群运行所在的数据中心停电。为防止灾难性情况，通常会采用 `UPS（不间断电源）`。\n*   导致多个数据节点失败的严重错误。\n\n当面临完全的系统故障时，必须重新启动集群。重新启动集群时请考虑以下提示：\n\
  \n*   为备份制作 NDB 文件系统的完整副本。这通常是 `FileSystemPath` 子目录下的文件系统。\n*   重新启动时无需执行进一步操作，因为数据将自动恢复。\n\
  *   当发生整个系统计划外关闭时，一些最近提交的事务可能会丢失，因为重做日志在事务提交时不会写入磁盘。重做日志会在每个 GCP 时写入磁盘。\n*   确定硬件机器是否正常。查看所有\
  \ CPU 是否都在运行、RAM 大小是否与之前相同、以及所有文件系统是否已挂载。\n*   检查网络连接以防止不必要的网络分区。`ping` 命令足以达到此目的。\n\
  *   如果某些机器无论如何都无法恢复，考虑在没有它们的情况下启动集群。MySQL NDB Cluster 可以在每个节点组至少有一个数据节点可用的情况下启动，即使缺少某些数据节点。此类启动类型也称为部分启动。如果执行部分启动，在启动\
  \ `ndbmtd` 或 `ndbd` 时指定 `--nowait-nodes` 选项。有关重新启动操作的更多信息，请参见第 10 章。\n\n### SQL\
  \ 节点上的典型问题\n\nSQL 节点是 MySQL NDB Cluster 的另一个重要组件，因为应用程序通常通过 SQL 节点访问数据，并且日常操作（如监控、表维护、复制等）也需要它。快速解决\
  \ SQL 节点上出现的问题至关重要。请注意，本节中的示例展示了典型问题，并未列出所有问题，您可能会在生产系统中遇到其他问题。\n\n#### 执行查询时的错误\n\
  \nSQL 节点是执行查询时的主要错误来源，因为如果在查询执行过程中发生错误，它会向其客户端报告。对于应用程序来说，获取错误信息以正确处理错误非常重要。我们将在下一章讨论如何处理错误（异常）。必须在应用程序中实现错误处理机制以应对错误。根据错误内容，应用程序可能会重试事务或执行其他错误处理算法，如以下小节所述。\n\
  \n##### 资源临时错误\n\n在查询执行期间，从 `mysqld` 抛出的错误 `ER_GET_TEMPORARY_ERRMSG`（`Errno` = `1297`）表示资源临时错误，意味着某些资源暂时短缺。当应用程序收到此错误时，请按照以下步骤处理：\n\
  \n1.  显式回滚当前事务。（如果愿意，可以重新连接到 `mysqld`。）\n2.  让程序等待一段时间。（在大多数情况下，几秒钟就足够了。）\n3.  重试相同的事务。\n\
  \n在错误处理后不要忘记关闭会话，因为废弃的连接会导致诸如连接短缺和会话意外断开等问题。\n\n顾名思义，临时资源错误由于资源短缺而发生。应充分增加资源，以减少临时资源错误发生的可能性。需要增加的参数会在错误信息中写明，例如：\n\
  \n```\nOut of operation records in transaction coordinator (increase MaxNoOfConcurrentOperations)\n\
  ```\n\n在这种情况下，如果相同错误频繁发生，应增加 `MaxNoOfConcurrentOperations`。\n\n##### 非临时错误\n\nSQL\
  \ 节点可能报告非临时错误，如 `ER_GET_ERRMSG`（`Errno` = `1296`）。在这种情况下，集群无法正常工作。SQL 节点上的问题可能无法恢复。`ER_GET_ERRMSG`\
  \ 的示例错误消息为：\n\n```\nERROR 1296 (HY000): Got error 157 'Unknown error code' from\
  \ NDBCLUSTER\n```\n\n在这种情况下，需要人工干预才能从问题中恢复。例如，您可能需要先恢复数据节点。\n\n\n##### 与数据节点的连接丢失\n\
  \nSQL 节点可能遇到的最严重问题之一是与数据节点的连接丢失。由于所有数据都存储在数据节点中，当 SQL 节点失去与数据节点的连接时，它将无法执行任何操作。在\
  \ SQL 节点与数据节点断开连接期间，会发生 `ER_GET_ERRMSG` 错误，如前一节所述。\n\n断开连接可能由以下原因引起：\n\n*   整个集群被关闭。\n\
  *   网络设备故障。\n*   网络缓慢（由于过载等原因）。\n\n由缓慢网络引起的断连可能是一种可自动恢复的错误。这可能是由心跳错误或事件传输滞后引起的。前者容易理解，但后者需要一些解释。\n\
  \n在数据节点中，用于二进制日志事件生成的纪元会缓冲一段时间，因为网络通信不会立即完成。因此，用于事件生成的数据传输应在后台进行。为了在后台完成，需要足够的缓冲区来暂时存储数据。如果此类事件的数据传输滞后，此缓冲区可能会被填满。在这种情况下，无法在缓冲区中保存更多数据，因此一些事件将会丢失。这将导致\
  \ SQL 节点上难以执行查询。因此，滞后的 SQL 节点会被断开连接。\n\n缓冲区大小由两个选项决定：`MaxBufferedEpochs` 和 `MaxBufferedEpochBytes`。`MaxBufferedEpochs`\
  \ 指定以纪元数量为单位的缓冲区大小。默认值为 100。因此，缓冲区中最多可以存储 100 个未发送的纪元。由于默认情况下每 100 毫秒生成一个纪元，缓冲区总共可以存储\
  \ 10 秒的纪元。然而，网络通信中 10 秒的延迟限制过于严格。默认值可能设置得较小，因为 MySQL NDB Cluster 是一个实时数据库系统，并采用“尽早失败”策略。`MaxBufferedEpochBytes`\
  \ 指定以字节为单位的缓冲区大小。\n\n当缓冲区即将耗尽时，数据节点会断开 SQL 节点的连接，并在集群日志中记录一条消息：\n\n```\n2017-05-21\
  \ 13:28:05 [MgmtSrvr] INFO     -- Node 3: Disconnecting lagging nodes '0000000000000000000000000000000000000000000000000010000000000000',\n\
  ```\n\n如果 SQL 节点由于此问题频繁断开连接，请考虑将 `MaxBufferedEpochs` 和/或 `MaxBufferedEpochBytes`\
  \ 的值增加一倍。如果问题仍然存在，则再次将它们增加一倍，直到问题解决。\n\n如第 6 章所述，断开连接时，`LOST_EVENTS` 事件会被写入二进制日志。该事件表明二进制日志中可能存在数据丢失，并将导致复制失败。\n\
  \nSQL 节点与数据节点断开连接后，即使连接恢复，所有表也会暂时变为只读。这是因为在 SQL 节点断开连接期间，可能存在模式更改。一旦连接恢复，NDB 二进制日志注入器线程会重启，并检查所有模式。然后，表将变为可写状态，并在\
  \ SQL 节点的错误日志中显示以下消息。\n\n```\n2017-05-21 13:42:09 9047 [Note] NDB Binlog: ndb tables\
  \ writable\n```\n\n##### 与事务处理相关的错误\n\n当出现问题时，SQL 节点可能会向其客户端引发各种错误。有些错误是 `NDBCluster`\
  \ 存储引擎特有的，但其他错误则不是。例如，重复键错误并非 `NDBCluster` 存储引擎特有。它可能发生在任何支持唯一约束的存储引擎上。我们将在下一章详细讨论此类错误处理的细节。\n\
  \n#### 崩溃\n\n`mysqld` 进程与其他程序一样，会因各种原因面临崩溃。当进程崩溃时，识别崩溃原因对于防止进一步崩溃至关重要。在本节中，我们讨论如何应对\
  \ `mysqld` 崩溃。\n\n##### 错误日志\n\n当 `mysqld` 崩溃时，它会将相关信息打印到错误日志。它在崩溃时还会打印堆栈跟踪。由于各种原因（例如，堆栈内存损坏、硬件故障等），可能不会打印堆栈跟踪。`mysqld`\
  \ 的堆栈跟踪比 `ndbd` 或 `ndbmtd` 的更具信息量，因为 `mysqld` 是一个多线程（基于锁）的程序。因此，`mysqld` 的堆栈跟踪指示了函数调用历史。\n\
  \n错误日志还可能包含有助于调查崩溃原因的信息。`mysqld` 可能在崩溃前报告一些症状，这有助于您确定原因。\n\n##### 核心转储文件\n\n尽管堆栈跟踪对\
  \ `mysqld` 很有用，但通常还需要更多信息，例如核心转储文件。错误日志中包含的堆栈跟踪缺乏以下信息：\n\n*   错误日志中的堆栈跟踪仅针对导致崩溃的线程。其他线程的堆栈跟踪在错误日志中不可用。\n\
  *   即使局部变量存储在堆栈中，它们也不会在堆栈跟踪中打印。\n*   全局变量和堆内存不存储在堆栈中。\n\n注意\n\n默认情况下不会生成核心转储文件。您需要指定\
  \ `--core-file` 选项来获取核心转储文件。\n\n如果您需要此类信息，请获取核心转储文件并使用调试器打开它。要在 Linux 上获取核心转储文件，请遵循以下说明：\n\
  \n1.  允许操作系统转储核心。将 `myqld_safe` 的 `--core-file-size` 选项设置为 `unlimited`。如果使用 `systemd`\
  \ 启动 `mysqld`，请在 `mysqld.service` 配置文件中将 `LimitCORE` 选项设置为 `infinity`。\n2.  为 `mysqld`\
  \ 启用 `--core-file` 选项。\n3.  将内核参数 `fs.suid_dumpable` 设置为 `1`。\n4.  重启 MySQL 服务器并等待其崩溃。\n\
  \n当从通过自身调用 `setuid(2)` 系统调用来更改有效用户的进程获取核心转储文件时，需要 `fs.suid_dumpable` 内核参数。如果需要，也可以更改\
  \ `kernel.core_pattern` 内核参数。您可以使用 `sysctl -w` 命令在线更改内核参数，如下所示：\n\n```\n"
- '# sysctl -w fs.suid_dumpable = 1

  ```


  但是，使用 `sysctl -w` 命令更改的设置在操作系统重启后会丢失。要使更改持久生效，请编辑 `/etc/sysctl.conf` 或在 `/etc/sysctl.d`
  目录下创建一个具有两位数字前缀和 `.conf` 后缀的新文件。


  在 Windows 上也可以获取 `mysqld` 的核心转储文件。您只需为 `mysqld` 指定 `--core-file` 选项。


  检查核心转储文件中数据的过程取决于调试器。有关如何使用调试器的更多信息，请参阅其手册。


  提示


  检查核心转储文件时，您经常会看到 `<optimized out>` 字符串。这表明所讨论的变量仅存储在寄存器中，而未存储在内存中。在这种情况下，您无法直接从核心转储文件中检索变量的值。



  ##### OOM Killer


  若发现`mysqld`进程消失且错误日志中无任何输出，则该进程很可能被其他程序终止。在 Linux 系统上，导致`mysqld`被终止的最常见原因是 OOM killer（内存不足终止程序）。


  由于 Linux 内核允许内存超量分配，可能会在进程获得分配器返回的堆内存指针后出现内存短缺。此时，内核可能仅分配了虚拟内存空间，而到物理内存的映射可能尚未完成。物理内存是在进程实际访问该内存区域时才进行分配的。这种行为被称为**延迟页面分配**或**乐观内存分配**。在某些情况下，该机制可以节省内存，因为并非所有分配的内存都必然被使用——进程最终可能只访问了已分配内存的一部分。这同时也节省了
  CPU 时间，因为物理内存分配是一项繁重的操作。该机制还提高了进程的可用性，因为即使分配的内存大小超过实际可用内存，在进程访问已分配的内存区域之前，都不会检测到内存不足错误。另一方面，如果内核预期内存将会短缺，它会返回一个内存不足错误。因此，延迟页面分配在大多数情况下都能正常工作。


  延迟页面分配的主要缺点是，即使内核对内存分配返回了成功，内存短缺问题也可能在事后才显现出来，因为它是乐观的。在这种情况下，系统可能由于内存短缺而无法继续执行。OOM
  killer 程序通过终止一个正在运行的进程来解决这种问题。`mysqld`进程以及`ndbmtd`和`ndbd`很可能是 OOM killer 的目标，因为这些进程会消耗大量内存。


  为防止 OOM killer 终止这些进程，需要调整被 OOM killer 终止的可能性分数。将`-17`写入`/proc/[pid]/oom_adj`文件，其中`[pid]`是目标进程的实际
  PID。然后 OOM killer 将不会终止该进程。以下示例帮助调整`mysqld`进程的分数：


  ```

  $ su

  '
- '# cd /proc/`pidof mysqld`

  '
- "# echo -17 > oom_adj\n```\n\n每次启动不应被 OOM killer 终止的进程时，都需要执行此操作。监控内存使用情况以确保内存不会耗尽也很重要。\n\
  \n> 提示\n>\n> Windows 没有 OOM killer，因为 Windows 上永远不会发生 OOM 情况。由于 Windows 不超量使用内存分配，内存不足错误在内存分配阶段就会被检测到。\n\
  \n> 注意\n>\n> SQL 节点上可能会发生各种类型的问题，这些问题在标准 MySQL 服务器上也会发生。有关 MySQL 服务器的示例问题和解决方案的更多详细信息，请参见以下页面：\n\
  >\n> [`dev.mysql.com/doc/refman/en/problems.html`](https://dev.mysql.com/doc/refman/en/problems.html)\n\
  \n### 管理节点上的典型问题\n\n从可用性角度来看，管理节点不太重要，因为如果不需要执行管理任务（例如将失败的数据节点重新加入集群），数据节点和 SQL\
  \ 节点可以在没有管理节点的情况下运行。因此，本书中不会深入探讨管理故障的细节。无论问题类型如何，在遇到问题时都必须采取以下常见操作：\n\n*   逐个停止所有管理节点。然后逐一重启它们。\n\
  *   清除配置缓存并重新启动。\n*   使用`--verbose`选项启动管理服务器。\n\n### 总结\n\n在本章中，我们讨论了处理故障的通用数据收集方法，以及数据节点和\
  \ SQL 节点遇到的典型问题。由于数据节点和 SQL 节点具有不同的架构，调查其问题需要不同类型的数据。\n\n快速收集有关问题的必要信息非常重要，因为您必须尽快确定问题原因以保持数据库正常运行。即使您拥有支持许可，也需要及时收集数据。为故障做好准备，并在问题发生时立即采取必要的行动。\n\
  \n# 第五部分 开发与性能调优\n\n# 18. 使用 MySQL NDB 集群开发 SQL 应用程序\n\n本章讨论了使用 SQL 与 MySQL NDB\
  \ 集群进行应用程序开发的相关主题。虽然 MySQL NDB 集群可以通过 SQL 节点作为关系数据库系统使用，也可以通过原生 NDB API 作为 NoSQL\
  \ 存储使用。本章涵盖前者，即通过 SQL 节点访问 MySQL NDB 集群。尽管可以像访问其他关系数据库一样访问 MySQL NDB 集群，但理解 MySQL\
  \ NDB 集群特有的技术非常重要。\n\n### 设计表\n\n开发数据库应用程序的第一步是设计其表结构。虽然可以像使用其他存储引擎一样使用`NDBCluster`存储引擎，但访问性能和空间效率等重要方面会因其设计而异。集群能够处理的最大负载取决于表的设计。\n\
  \n我们讨论使用`NDBCluster`存储引擎的表对象的基本概念。我们不讨论特定于应用程序的事项，例如每个表中应包含哪些数据。例如，我们不会讨论开发金融应用程序时需要哪些类型的表以及每个表中必须包含哪些类型的列。\n\
  \n#### 创建 NDB 集群表\n\n创建新表的方式与使用标准 MySQL 服务器时相同。唯一的区别是存储引擎名称。存储引擎名称应为`NDBCluster`或`NDB`，如下所示。存储引擎名称不区分大小写，`NDBCluster`和`NDB`是同义词。您可以随意指定其中任何一个。\n\
  \n```\nmysql> CREATE TABLE tbl (id SERIAL, col VARCHAR(100)) ENGINE NDBCluster;\n\
  ```\n\n可以从任意 SQL 节点执行`CREATE TABLE`。使用`NDBCluster`存储引擎的表会通过隐藏的`mysql.ndb_schema`系统表自动传播到所有\
  \ SQL 节点。图 18-1 展示了模式传播的概念视图。因此，您无需关心应使用哪个 SQL 节点来创建表。可以从任何 SQL 节点发出其他 DDL 语句；但是，您应该记住，对于在线`ALTER\
  \ TABLE`语句，表锁是在本地 SQL 节点上获取的。因此，您需要注意使用哪个 SQL 节点执行在线`ALTER TABLE`。对于离线`ALTER TABLE`需要更加小心。有关模式更改的更多信息，请参见第\
  \ 9 章。\n\n![A435171_1_En_18_Fig1_HTML.jpg](img/A435171_1_En_18_Fig1_HTML.jpg)\n\n\
  图 18-1.\n模式定义通过 mysql.ndb_schema 表传播\n\n\n#### 支持的数据类型\n\n标准 MySQL 服务器所支持的任何数据类型，在\
  \ MySQL NDB 集群中也同样受支持。因此，你可以像使用标准 MySQL 服务器一样，使用 `NDBCluster` 存储引擎来设计表。\n\n作为 MySQL\
  \ NDB 集群的一个限制，每列所需的存储空间是四字节的倍数。如果存储某些可变长度数据需要 13 字节，系统仍会分配 16 字节。`BLOB` 及其变体（包括\
  \ `TEXT`）是通过隐藏的支持表实现的。`BLOB` 列的前 256 字节存储在主表中。如果列值大于 256 字节，剩余的值将存储在隐藏表中。隐藏表中的每行大小为\
  \ 2000 字节。单个 `BLOB` 值可能在隐藏表中占用多行。\n\n**注意**：由于这种空间分配方式效率不高，应尽可能避免使用 `BLOB` 列。\n\n\
  尽管标准 MySQL 服务器针对小型数值数据类型（如 `TINYINT`、`SMALLINT` 和 `MEDIUMINT`）提供了高效的数据类型，但在 `NDBCluster`\
  \ 存储引擎中，它们每行要消耗四字节。因此，在 `NDBCluster` 存储引擎上使用这类小型数值数据类型，不如在标准 MySQL 服务器上高效。\n\n类似地，`BIT`\
  \ 列的空间也是一次性分配四字节。因此，一个 `BIT(1)` 列会消耗四字节。然而，与其他数据类型不同，每行中的多个 `BIT` 列会存储在一处。所以，除非总大小超过\
  \ 32 位，否则不需要额外的四字节。因此，32 个 `BIT(1)` 列和一个单独的 `BIT(32)` 列所需的空间相同。请注意，可为空的列也需要一个位来标识该列是否为\
  \ `NULL`，并且这个位与 `BIT` 列存储在同一空间中。\n\n截至 MySQL NDB 集群 7.5 系列，已支持 `JSON` 列和生成列。如果要使用这些功能，请安装\
  \ MySQL NDB 集群 7.5 或更高版本。空间列受到支持，但 MySQL NDB 集群不支持空间索引。\n\n#### 三种索引类型\n\n在关系数据库系统上设计表时，索引是最重要的因素之一。理解其特性和用途至关重要。你需要了解\
  \ MySQL NDB 集群上可用的索引类型，以及每种索引类型的架构。这是表设计的第一步。MySQL NDB 集群中的索引结构与 `InnoDB` 等其他存储引擎略有不同。\n\
  \n在 MySQL NDB 集群中，你可以使用三种类型的索引：\n\n*   **唯一哈希索引**：此类索引仅用于主键。唯一支持的搜索操作是等值比较。\n* \
  \  **有序索引**：此类索引用于非唯一的二级索引。此索引可用于通用目的，就像 `InnoDB` 中的 B-Tree 索引一样。\n*   **二级唯一哈希索引**：此类索引用于二级唯一索引。这种索引本质上与主索引相同，但通过隐藏的支持表实现。\n\
  \n以下各节将详细介绍每种索引类型。\n\n##### 主键的唯一哈希索引\n\n唯一哈希索引是用于主键的索引类型。顾名思义，它确保单个键值的唯一性。简称为哈希索引。在本章中，我们统称其为哈希索引。\n\
  \n与一般的哈希索引一样，MySQL NDB 集群中的哈希索引只能用于等值比较。无法将其用于范围或不等比较。像清单 18-1 中的查询可以使用哈希索引。\n\n\
  ```\nmysql> EXPLAIN SELECT Name, CountryCode FROM City WHERE Id = 100\\G\n***************************\
  \ 1. row ***************************\nid: 1\nselect_type: SIMPLE\ntable: City\n\
  partitions: p0,p1,p2,p3\ntype: eq_ref\npossible_keys: PRIMARY\nkey: PRIMARY\nkey_len:\
  \ 4\nref: const\nrows: 1\nfiltered: 100.00\nExtra: NULL\n1 row in set, 1 warning\
  \ (0.00 sec)\n```\n**清单 18-1. 使用等值比较查询表**\n\n请注意，`type` 是 `eq_ref`，因此通过使用 `PRIMARY\
  \ KEY` 进行等值比较来访问表。即使键在 `WHERE` 子句中没有直接与常量值比较，哈希索引也用于连接。清单 18-2 展示了一个示例查询执行计划，其中使用内表的主键连接两个表。请注意，`City`\
  \ 表（内表）是以 `eq_ref` 访问类型进行访问的。\n\n```\nmysql> EXPLAIN SELECT Country.Name, City.Name\
  \ FROM Country INNER JOIN City ON Country.Capital = City.Id WHERE Country.Code LIKE\
  \ 'J%'\\G\n*************************** 1. row ***************************\nid: 1\n\
  select_type: SIMPLE\ntable: Country\npartitions: p0,p1,p2,p3\ntype: range\npossible_keys:\
  \ PRIMARY\nkey: PRIMARY\nkey_len: 3\nref: NULL\nrows: 11\nfiltered: 100.00\nExtra:\
  \ Parent of 2 pushed join@1; Using where with pushed condition ((`world`.`Country`.`Code`\
  \ like 'J%') and (`world`.`Country`.`Capital` is not null)); Using MRR\n***************************\
  \ 2. row ***************************\nid: 1\nselect_type: SIMPLE\ntable: City\n\
  partitions: p0,p1,p2,p3\ntype: eq_ref\npossible_keys: PRIMARY\nkey: PRIMARY\nkey_len:\
  \ 4\nref: world.Country.Capital\nrows: 1\nfiltered: 100.00\nExtra: Child of 'Country'\
  \ in pushed join@1\n2 rows in set, 1 warning (0.01 sec)\n```\n**清单 18-2. 两个表连接的执行计划示例**\n\
  \n每个表内部最多只能创建一个哈希索引。如果表没有显式定义主键，`NDBCluster` 存储引擎会自动创建一个隐藏的主键，定义为 `BIGINT UNSIGNED\
  \ NOT NULL AUTO_INCREMENT PRIMARY KEY USING HASH`。因此，无论是否显式定义，每个表都有一个主键。所以，整个集群最多可以有\
  \ `MaxNoOfTables` 个哈希索引。\n\n强烈建议显式定义主键，因为如果没有显式定义，系统会创建隐藏主键。隐藏主键无法使用 SQL 访问。如果未显式定义主键，在\
  \ NDB 集群复制设置中，从 SQL 节点上会对表进行扫描。\n\n哈希索引存储在 `IndexMemory` 中，它们是存储在 `IndexMemory`\
  \ 中的唯一对象。它们每行消耗 21 到 25 字节，用于存储哈希值和指向行的指针。`IndexMemory` 的消耗量相当小。\n\n\n\n##### 有序索引\n\
  \n顾名思义，有序索引是一种索引，其所有索引行都按键值的顺序排序。有序索引可以像通常的 B+树索引一样使用。它可以用于：\n*   等值比较 (`=`)：使用等号将值与键进行比较。\n\
  *   不等值比较 (`!=`, `<>`)：不等于。\n*   范围扫描 (`<`, `<=`, `>`, `>=`，以及这些的组合)：小于、小于等于、大于、大于等于或介于之间。\n\
  *   全索引扫描：当没有条件使用此索引过滤行，但查询可以通过仅访问索引中包含的列来解决时，会选择此执行计划。\n*   排序：可以通过按索引顺序读取行来解决排序问题。\n\
  \n请注意，有序索引是分区本地的。这意味着有序索引无法搜索其他分区中的行，因此也无法搜索其他节点组中的行。回想一下，`NDBCluster` 表中的行是水平分区的。有关分区平衡的更多信息，请参见第\
  \ 2 章。这使得使用有序索引进行等值比较比在默认分区平衡下的主键查找开销更大。\n\n图 18-2 展示了有序索引扫描的概念流程。图 18-2 中的 `TC`\
  \ 代表事务协调器，它在每个事务开始时被选定。请注意，当使用默认分区平衡时，使用有序索引查找匹配指定键值或值范围的行时，必须访问所有数据节点，因为所有分区都可能包含匹配给定键值或值范围的行。\n\
  \n![A435171_1_En_18_Fig2_HTML.jpg](img/A435171_1_En_18_Fig2_HTML.jpg)\n\n图 18-2.\n\
  有序索引扫描过程流程\n\n这种情况有两个例外：\n*   用户定义分区：表通过用户定义的方式进行分区，并且搜索条件中包含针对分区键的等值比较。在这种情况下，只搜索具有给定分区键值的分区。\n\
  *   全复制表：该表是一个全复制表，所有数据节点都拥有该表的完整相同副本。在这种情况下，有序索引查找可以通过访问任意数据节点来解决。\n\n通常，使用有序索引查找比主键查找开销更大。因此，平均而言，它不会像主键查找那么快。查找的开销与数据节点的数量成正比，如果查询结果的大小很小，这种开销的影响可能更大。另一方面，如果查询结果很大，则许多行匹配给定的范围。换句话说，由于所有数据节点都被并行搜索，有序索引扫描非常高效。在这种情况下，如果集群中有更多的数据节点，使用有序索引进行范围扫描将会更快。\n\
  \n请注意，即使有序索引是一种索引，它也存储在 `DataMemory` 中，而不是 `IndexMemory` 中。这是许多人常犯的错误。在 MySQL NDB\
  \ Cluster 中，只有哈希索引存储在 `IndexMemory` 中。有序索引中的每个索引行消耗 10 个字节。最多可以创建 `MaxNoOfOrderedIndexes`\
  \ 个有序索引。\n\n##### 用于辅助索引的唯一哈希索引\n\n当哈希索引用作辅助索引时，其结构类似但有所不同。在 MySQL NDB Cluster 中，唯一能确保键值唯一性的对象是哈希索引。然而，哈希索引本质上可以是主键本身的实现。那么\
  \ MySQL NDB Cluster 如何确保辅助索引上键值的唯一性呢？\n\n**注意**\n如果表没有显式主键，但有唯一键，则第一个定义的非空唯一键将被选为表的主键。\n\
  \n答案是 MySQL NDB Cluster 创建了一个内部隐藏的支持表来确保辅助唯一键值的唯一性。该支持表无法从 SQL 节点直接访问。该支持表的定义方式是：主表唯一索引中的列构成支持表的主键，而主表主键值的列则作为非键列存储在支持表中。图\
  \ 18-3 描述了辅助唯一索引查找的概念流程。首先访问支持表并检索主键值。然后，通过查找检索到的主键值来获取实际的行数据。\n\n![A435171_1_En_18_Fig3_HTML.jpg](img/A435171_1_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3.\n使用辅助哈希索引进行唯一键查找\n\n唯一索引查找比有序索引查找更高效，因为除非分区分布从默认情况更改，否则必须访问所有数据节点上的有序索引。当然，辅助唯一索引查找比主键查找慢，因为它需要访问两个表来解决查询。此外，辅助唯一索引查找可能需要额外的网络跳转。\n\
  \n通常，即使辅助索引被定义为唯一索引，其值与主键值也无关。因此，目标行可能存储在与唯一索引行所在数据节点不同的数据节点上，因为它们应该具有不同的哈希值。当然，如果辅助唯一索引行和目标行存储在同一个数据节点上，查询会很快。否则，唯一索引查找需要额外的网络跳转才能完成，这比前一种情况要慢。它们存储在同一个数据节点的概率与数据节点的数量成反比下降。\n\
  \n请注意，更新支持表上的行会消耗操作记录。因此，当使用辅助哈希索引时，可能需要增加 `MaxNoOfConcurrentOperations`。\n\n辅助哈希索引同时消耗\
  \ `IndexMemory` 和 `DataMemory`，因为支持表有自己的哈希索引和代表主表主键列值的非键列。最多可以创建 `MaxNoOfUniqueHashIndexes`\
  \ 个辅助哈希索引。\n\n\n\n#### 定义索引\n\n正确理解如何使用三种类型的索引非常重要。最关键的一点是，系统默认会为 `PRIMARY KEY`\
  \ 和 `UNIQUE` 二级索引在内部创建两个索引。这是因为哈希索引除了相等比较外，不能用于任何其他操作。通常，索引也用于其他目的，例如范围扫描和排序。\n\n\
  ##### 示例：定义带有显式主键的表\n\n代码清单 18-3 展示了一个 `CREATE TABLE` 语句示例，该语句定义了一个带有显式主键的表。\n\n\
  ```\nCREATE TABLE City (\nID int(11) NOT NULL AUTO_INCREMENT,\nName char(35) NOT\
  \ NULL DEFAULT '',\nCountryCode char(3) NOT NULL DEFAULT '',\nDistrict char(20)\
  \ NOT NULL DEFAULT '',\nPopulation int(11) NOT NULL DEFAULT '0',\nPRIMARY KEY (ID),\n\
  KEY CountryCode (CountryCode)\n) ENGINE=NDBCluster;\n```\n*代码清单 18-3. 定义带有显式主键的表*\n\
  \n在这种情况下，系统内部会创建两个索引——一个哈希索引和一个有序索引。这可以通过 `ndb_desc` 命令确认，如代码清单 18-4 所示。\n\n```\n\
  shell$ ndb_desc -c mgmhost -d world City\n-- City --\nVersion: 16777217\nFragment\
  \ type: HashMapPartition\nK Value: 6\nMin load factor: 78\nMax load factor: 80\n\
  Temporary table: no\nNumber of attributes: 5\nNumber of primary keys: 1\nLength\
  \ of frm data: 338\nMax Rows: 0\nRow Checksum: 1\nRow GCI: 1\nSingleUserMode: 0\n\
  ForceVarPart: 1\nPartitionCount: 4\nFragmentCount: 4\nPartitionBalance: FOR_RP_BY_LDM\n\
  ExtraRowGciBits: 0\nExtraRowAuthorBits: 0\nTableStatus: Retrieved\nTable options:\n\
  HashMap: DEFAULT-HASHMAP-3840-4\n-- Attributes --\nID Int PRIMARY KEY DISTRIBUTION\
  \ KEY AT=FIXED ST=MEMORY AUTO_INCR\nName Char(35;latin1_swedish_ci) NOT NULL AT=FIXED\
  \ ST=MEMORY DEFAULT \"\"\nCountryCode Char(3;latin1_swedish_ci) NOT NULL AT=FIXED\
  \ ST=MEMORY DEFAULT \"\"\nDistrict Char(20;latin1_swedish_ci) NOT NULL AT=FIXED\
  \ ST=MEMORY DEFAULT \"\"\nPopulation Int NOT NULL AT=FIXED ST=MEMORY DEFAULT 0\n\
  -- Indexes --\nPRIMARY KEY(ID) - UniqueHashIndex\nPRIMARY(ID) - OrderedIndex\nCountryCode(CountryCode)\
  \ - OrderedIndex\nNDBT_ProgramExit: 0 - OK\n```\n*代码清单 18-4. 使用 ndb_desc 命令显示实际表结构*\n\
  \n在代码清单 18-4 的 `ndb_desc` 命令输出中，可以发现有两个索引——`PRIMARY KEY` 和 `PRIMARY`。前者是哈希索引，后者是有序索引。请注意，哈希索引显示为\
  \ `UniqueHashIndex`。如果查询是相等比较，则使用哈希索引。否则，使用有序索引。\n\n#### 阻止创建有序索引\n\n如果应用程序仅需要对给定表进行相等比较，可以通过在\
  \ DDL 中指定 `USING HASH` 关键字来阻止创建有序索引，如代码清单 18-5 所示。\n\n```\nCREATE TABLE City (\n\
  ID int(11) NOT NULL AUTO_INCREMENT,\nName char(35) NOT NULL DEFAULT '',\nCountryCode\
  \ char(3) NOT NULL DEFAULT '',\nDistrict char(20) NOT NULL DEFAULT '',\nPopulation\
  \ int(11) NOT NULL DEFAULT '0',\nPRIMARY KEY (ID) USING HASH,\nKEY CountryCode (CountryCode)\n\
  ) ENGINE=NDBCluster;\n```\n*代码清单 18-5. 在主键中不创建有序索引的表*\n\n请注意，`USING HASH` 关键字被包含在主键定义中。当通过此语句创建表时，`ndb_desc`\
  \ 命令的索引部分看起来如以下清单所示。\n\n```\n-- Indexes --\nPRIMARY KEY(ID) - UniqueHashIndex\n\
  CountryCode(CountryCode) - OrderedIndex\n```\n\n我建议最初创建表时，为主键包含 `USING HASH` 关键字，因为相等比较是主键最常用的操作。为有序索引节省内存是值得的，因为内存并非免费。如果你后来发现应用程序确实需要有序索引，你可以随时在线将有序索引作为二级索引添加。有序索引的功能无论它们是主键的一部分还是独立的二级索引，都不会改变。\n\
  \n#### 带有 UNIQUE 二级索引的行为\n\n与主键类似，底层也会为二级 `UNIQUE` 索引创建哈希索引和有序索引。如果不需要有序索引，你可以像处理主键那样，使用\
  \ `USING HASH` 关键字来跳过它。哈希索引是一个支撑表，但它像主键一样显示为 `UniqueHashIndex`。你需要通过检查索引名称来识别它是否是主键。代码清单\
  \ 18-6 展示了一个 `ndb_desc` 命令输出的示例，该表有一个主键和一个唯一二级索引。请注意，代码清单 18-6 中的表 `Country` 与本章前面示例中显示的不同，因为\
  \ `City` 表没有适合用于二级唯一索引的列组合。\n\n```\nshell$ ndb_desc -c mgmhost -d world Country\n\
  -- Country –\n... snip ...\n-- Indexes --\nPRIMARY KEY(Code) - UniqueHashIndex\n\
  PRIMARY(Code) - OrderedIndex\nName(Name) - OrderedIndex\nName$unique(Name) - UniqueHashIndex\n\
  NDBT_ProgramExit: 0 - OK\n```\n*代码清单 18-6. 包含一个二级唯一索引的表的索引结构*\n\n#### 创建非唯一二级索引\n\
  \n如果你想创建一个非唯一二级索引，只需像往常一样创建即可。\n\n```\nALTER TABLE City ADD INDEX (Name);\n```\n\
  \n对于 MySQL NDB Cluster，添加索引是一个原地（在线）操作。有关在线模式更改的更多详细信息，请参阅第 9 章。\n\n#### 索引类型总结\n\
  \n表 18-1 列出了 `NDBCluster` 存储引擎的索引类型组合。请记住，你需要选择一种索引类型。要选择合适的索引类型，你必须理解每种索引类型的特性以及你的应用程序需求。\n\
  \n*表 18-1. 可能的索引类型组合*\n\n| 索引类型 | 操作 | 存储 | 每行数据大小 |\n| --- | --- | --- | --- |\n\
  | `PRIMARY KEY` | 多种 | `IndexMemory` + `DataMemory` | `IndexMemory` 中 21 到 25 字节，`DataMemory`\
  \ 中 10 字节 |\n| 带 `USING HASH` 的 `PRIMARY KEY` | 相等比较 | `IndexMemory` | `IndexMemory`\
  \ 中 21 到 25 字节 |\n| `UNIQUE` | 多种 | `IndexMemory` + `DataMemory` | `IndexMemory`\
  \ 中 21 到 25 字节，`DataMemory` 中为主表主键值的大小 + 10 字节 |\n| 带 `USING HASH` 的 `UNIQUE` |\
  \ 相等比较 | `IndexMemory` + `DataMemory` | `IndexMemory` 中 21 到 25 字节，`DataMemory`\
  \ 中为主表主键值的大小 |\n| 非唯一二级索引 | 多种 | `DataMemory` | `DataMemory` 中 10 字节 |\n\n\n####\
  \ T 树索引\n\nMySQL NDB Cluster 中的有序索引结构不是 B+ 树索引，后者在关系数据库系统（尤其是 MySQL 中）被广泛使用。MySQL\
  \ NDB Cluster 采用了 T 树索引。T 树可以像 B+ 树索引一样使用，但其结构不同于 B+ 树索引。图 18-4 描绘了一个 T 树索引中几个节点的概念视图。这里的术语“节点”指的是构成树的数据单元，而不是集群中的节点。请注意图中每个节点的形状看起来像字母\
  \ T。T 树索引的名称正是源于节点的形状。当然，你也可以用不同的方式绘制它。在 T 树索引原始论文中，节点的形状看起来就像字母 T。\n\n![A435171_1_En_18_Fig4_HTML.jpg](img/A435171_1_En_18_Fig4_HTML.jpg)\n\
  图 18-4. T 树结构概览\n\nT 树索引是为内存数据库系统优化的。与 B+ 树索引不同，T 树索引本身不包含索引数据，它只有指向数据的指针。对于用于内存数据库系统的\
  \ T 树索引来说，存储指针就足够了，因为键值始终存在于内存中。T 树还可以节省 CPU 资源，因为在索引中搜索、插入或删除行时需要的比较操作更少。\n\n每个节点都有一个指向行数据的指针数组，这些指针按排序状态排列。`L`\
  \ 是一个指向子树的指针，该子树中的所有值都小于本节点中的所有值。`R` 值是一个指向子树的指针，该子树中的所有值都大于本节点中的所有值。\n\n搜索从树的根节点开始。搜索一个节点时，首先检查键值是否包含在当前节点的数组范围内。如果给定的键值包含在当前节点的范围内，则称该节点为边界节点。如果在边界节点中找到了该行，则返回该行。否则，搜索失败。如果给定的键值小于当前节点中的所有值，则以相同的方式搜索左子树。同样，如果给定的键值较大，则搜索右子树。\n\
  \n#### 估算表大小\n\n在 MySQL NDB Cluster 上设计表时，你可能想知道每行消耗多少内存或磁盘，因为容量是数据库系统的重要主题。有两个可用选项：一个是\
  \ `ndb_size.pl`，它包含在官方软件包中；另一个是 `sizer`，它由第三方开发。\n\n##### ndb_size.pl 命令\n\n如果你不太关心细节，`ndb_size.pl`\
  \ 命令是一个不错的选择，因为每种数据类型的数据大小变化不大，而且 `ndb_size.pl` 命令随 MySQL NDB Cluster 软件包一起提供。如果你使用的是\
  \ RPM 软件包，它包含在客户端软件包中。\n\n要使用 `ndb_size.pl` 命令，系统上必须安装 Perl 解释器，因为它是用 Perl 编写的。此外，使用此命令还需要\
  \ `MethodMaker`、`Perl DBI` 和 Perl 的 MySQL 驱动程序（`DBD::mysql`）。有关 `DBD::mysql` 的信息，请参考以下页面：\n\
  \n[`search.cpan.org/dist/DBD-mysql/lib/DBD/mysql.pm`](http://search.cpan.org/dist/DBD-mysql/lib/DBD/mysql.pm)\n\
  \n`ndb_size.pl` 命令计算当给定表的存储引擎变为 `NDBCluster` 时，现有的非 NDB 表所需的资源。现有表的存储引擎是任意的。要计算所需资源，请先使用其他存储引擎（如\
  \ `InnoDB`）创建表，然后运行 `ndb_size.pl` 命令，如清单 18-7 所示。\n\n```\nshell$ ndb_size.pl --database=world\
  \ --hostname=sqlnode1 --user=msandbox --password=msandbox\nndb_size.pl report for\
  \ database: 'world' (3 tables)\n\nConnected to: DBI:mysql:host=sqlnode1\nIncluding\
  \ information for versions: 4.1, 5.0, 5.1\nworld.Country\n\nDataMemory for Columns\
  \ (* means varsized DataMemory):\n... snip ...\nParameter Minimum Requirements\n\
  \n* indicates greater than default\nParameter        Default          4.1      \
  \     5.0           5.1\nNoOfOrderedIndexes           128            6         \
  \    6             6\nIndexMemory (KB)         18432          368           176\
  \           176\nNoOfTriggers           768           39            39         \
  \   39\nNoOfUniqueHashIndexes            64            3             3         \
  \    3\nDataMemory (KB)         81920          672           672           736\n\
  NoOfTables           128            6             6             6\nNoOfAttributes\
  \          1000           32            32            32\n```\n清单 18-7. 计算 World\
  \ 数据库所需资源\n\n`ndb_size.pl` 命令会打印每个表的资源消耗情况（清单 18-10 中省略了每个表的输出）。然后，在末尾打印所需资源的摘要。如你所见，那里打印的版本号（如\
  \ 4.1、5.0 和 5.1）已过时。然而，你仍然可以使用此命令来估算资源消耗，因为在最新版本中差异并不巨大。\n\n##### sizer 命令\n\n如果你想根据你正在使用的版本来估算数据大小，`sizer`\
  \ 是一个不错的选择。它是由 severalnines 开发的一个 NDB API 应用程序。`sizer` 命令以源代码形式附带一个简单的 Makefile。你可以从\
  \ GitHub 获取源代码。要构建 `sizer` 命令，你需要库文件（`libmysqlclient_r.so` 和 `libndbclient.so`）以及相关的头文件。为\
  \ Makefile 设置 `MYSQL_BASEDIR` 变量，使其指向安装了库和头文件的目录。`MYSQL_BASEDIR` 变量的默认值是 `/usr`，这适用于\
  \ OS 原生软件包安装（如 RPM）。如果你将软件包安装到另一个目录（如 `/usr/local/mysql-cluster`），则请按照以下命令示例运行 `make`\
  \ 命令。二进制文件在源代码的顶层目录下创建。如果你愿意，可以将它移动到任何目录。\n\n```\nshell$ git clone https://github.com/severalnines/sizer.git\n\
  shell$ cd sizer\nshell$ make MYSQL_BASEDIR=/usr/local/mysql-cluster\n```\n\n`sizer`\
  \ 的用法与 `ndb_size.pl` 类似，但它像清单 18-8 所示那样连接到管理节点和数据节点；它不像 `ndb_size.pl` 那样连接到 SQL\
  \ 节点。在执行 `sizer` 命令之前，你需要安装 MySQL NDB Cluster 并用示例数据填充表。\n\n```\nshell$ export LD_LIBRARY_PATH=/usr/local/mysql-cluster\n\
  shell$ sizer -c mgmhost -d world\n... snip ...\nRecord size (incl OH):\n#Rows found=239\
  \ records\n#OrderedIndexes=2\n#UniqueHashIndexes=2\n#blob/text=0\n#attributes=15\n\
  DataMemory=440 bytes\nIndexMemory=40 bytes\nDiskspace=0 bytes\nAppending the following\
  \ to world.csv\nworld,Country,239,1,2,2,0,15,40,440,0,0,0\n```\n清单 18-8. sizer 命令示例\n\
  \n`sizer` 命令生成一个 CSV 文件，其文件名类似于 `database_name.csv`。每列指示以下数据（括号内的数据表示清单 18-8 示例中\
  \ `world.Country` 表的示例值）：\n\n*   数据库名称（`world`）\n*   表名（`Country`）\n*   表中的行数（239）\n\
  *   表对象数量（始终为 1）\n*   表中有序索引的数量（2）\n*   唯一哈希索引的数量，包括主索引和二级索引（2）\n*   `BLOB`/`TEXT`\
  \ 列的数量（0）\n*   属性的数量（15）\n*   每行消耗的 `IndexMemory` 大小（40）\n*   每行消耗的 `DataMemmory`\
  \ 大小（440）\n*   磁盘表消耗的磁盘空间大小（0）\n*   此表中是否使用了变长列（0）\n*   二级唯一哈希索引的支撑表中是否使用了变长列（0）\n\
  \n有关 `sizer` 的更多信息，请参考以下页面：[`github.com/severalnines/sizer`](https://github.com/severalnines/sizer)。\n\
  \n\n##### 估算每张表所需对象数量\n\n估算每张表所需的对象数量也很重要，因为对象数量需要在配置文件 (`config.ini`) 中由用户手动定义。如果已拥有表定义，`ndb_size.pl`\
  \ 命令可完成此任务。请参考前一节中的清单 18-7，查看这些命令的示例输出。请注意，`sizer` 命令仅显示列的数量，而非消耗的属性数量。\n\n如果尚未完成表的设计，可以使用下表估算所需属性的数量：\n\
  \n*   非 BLOB 列：1\n*   BLOB (TEXT) 列：5\n*   主键中的哈希索引：0\n*   二级唯一哈希索引：1 + 构成该索引的列数\n\
  *   有序索引：1 + 构成该索引的列数\n\n例如，`world.Country` 表的属性数量计算如下：\n\n*   非 BLOB 列：1 * 15 =\
  \ 15\n*   BLOB (TEXT) 列：5 * 0 = 0\n*   主键中的哈希索引：0 * 1 = 0\n*   二级唯一哈希索引：(1 + 0)\
  \ * 0 = 0\n*   有序索引：1 + 1 (对于主键，如果未指定 `USING HASH`) = 2\n*   总计：17\n\n#### 定义外键约束\n\
  \n从 MySQL NDB Cluster 7.3 开始，支持外键。您可以使用外键来维护两个表之间的引用关系完整性，方法是在子表上指定一组引用列，并在父表上指定一组被引用列。如果在父表中没有匹配的行，则对子表的任何插入或更新操作都将被拒绝。还可以定义当父表中的行被更新或删除时所执行的操作。\n\
  \n以下列表展示了一个带有 `update` 和 `delete` 操作的外键的典型定义：\n\n```\nmysql> ALTER TABLE Country\
  \ ADD CONSTRAINT fk_capital FOREIGN KEY (Capital) REFERENCES City(ID) ON UPDATE\
  \ SET NULL ON DELETE SET NULL;\nQuery OK, 0 rows affected (2.74 sec)\nRecords: 0\
  \  Duplicates: 0  Warnings: 0\n```\n\n每次在子表或父表上插入、更新或删除行时，都会在数据节点上检查外键约束。要在子表上定义外键，父表上的被引用列或列集必须是构成主键或二级唯一索引的一组列。每个被引用列的数据类型必须与引用列相同。例如，您不能定义一个引用\
  \ `BIGINT` 列的外键，其引用列是 `INT` 类型。引用列的列出顺序必须与被引用的主键或二级唯一索引的定义顺序相同。这些要求比 `InnoDB` 更严格。在\
  \ `InnoDB` 中，被引用列必须有索引，但不一定是唯一的。被引用列和引用列的数据类型必须相似，但不一定要完全相同。\n\n表 18-2 列出了 SQL 标准支持的\
  \ `ON UPDATE` 和 `ON DELETE` 子句操作，以及它们在 MySQL NDB Cluster 中的状态。\n\n表 18-2.\n外键约束中对父表进行修改时的操作\n\
  \n| 操作 | 在 NDBCluster 上是否支持 | 描述 |\n| --- | --- | --- |\n| `RESTRICT` | 是 | 如果在子表中存在匹配的行，则拒绝更新或删除父表。如果指定了此操作，您必须先修改子表，使没有行引用父表中要更新或删除的行。\
  \ |\n| `CASCADE` | 有限制 | 对父表的更新或删除会传播到子表的匹配行。如果被引用的列集是父表的主键，MySQL NDB Cluster 不支持对\
  \ `ON UPDATE` 使用 `CASCADE` 操作。 |\n| `SET NULL` | 是 | 当父表中的行被更新或删除时，子表中匹配行的引用列将被设置为\
  \ `NULL`。 |\n| `NO ACTION` | 与 `RESTRICT` 相同 | 在 MySQL Server 和 MySQL NDB Cluster\
  \ 上，它的定义与 `RESTRICT` 相同。某些数据库系统将 `NO ACTION` 实现为延迟检查，但 MySQL 不支持此功能。 |\n| `SET DEFAULT`\
  \ | 否 | 在更新或删除父表中的行时，将引用列设置为其默认值。MySQL 不支持此操作。 |\n\n#### 查看表定义\n\n您可以通过多种方式查看表的定义。具体来说，`SHOW\
  \ CREATE TABLE` 语句（就像在 MySQL Server 上对普通表那样）、`ndb_desc` 命令以及 `ndbinfo` 表都可用于精确查看表定义。清单\
  \ 18-9 展示了 `SHOW CREATE TABLE` 命令输出的示例。\n\n```\nmysql> SHOW CREATE TABLE City\\\
  G\n*************************** 1. row ***************************\n       Table:\
  \ City\nCreate Table: CREATE TABLE `City` (\n  `ID` int(11) NOT NULL AUTO_INCREMENT,\n\
  \  `Name` char(35) NOT NULL DEFAULT '',\n  `CountryCode` char(3) NOT NULL DEFAULT\
  \ '',\n  `District` char(20) NOT NULL DEFAULT '',\n  `Population` int(11) NOT NULL\
  \ DEFAULT '0',\n  PRIMARY KEY (`ID`),\n  KEY `CountryCode` (`CountryCode`),\n  CONSTRAINT\
  \ `fk_countrycode` FOREIGN KEY (`CountryCode`) REFERENCES `Country` (`Code`) ON\
  \ DELETE SET NULL ON UPDATE SET NULL\n) ENGINE=ndbcluster AUTO_INCREMENT=4080 DEFAULT\
  \ CHARSET=latin1\n1 row in set (0.00 sec)\n清单 18-9.\nSHOW CREATE TABLE 命令输出示例\n\
  ```\n\n`SHOW CREATE TABLE` 命令的用处在于，`Create Table` 字段的值可以重用作可执行的 SQL 命令。您可以修改由 `SHOW\
  \ CREATE TABLE` 打印出的 SQL 命令，从而创建一个类似的表。\n\n`ndb_desc` 命令是专用于 MySQL NDB Cluster 的工具。它会打印表定义，并附带一些\
  \ MySQL NDB Cluster 特有的额外信息。清单 18-10 显示了针对与清单 18-9 相同的表的 `ndb_desc` 命令输出示例。\n\n\
  ```\nshell$ ndb_desc -c mgmhost -d world City\n-- City --\nVersion: 67108865\nFragment\
  \ type: HashMapPartition\nK Value: 6\nMin load factor: 78\nMax load factor: 80\n\
  Temporary table: no\nNumber of attributes: 5\nNumber of primary keys: 1\nLength\
  \ of frm data: 338\nMax Rows: 0\nRow Checksum: 1\nRow GCI: 1\nSingleUserMode: 0\n\
  ForceVarPart: 1\nPartitionCount: 4\nFragmentCount: 4\nPartitionBalance: FOR_RP_BY_LDM\n\
  ExtraRowGciBits: 0\nExtraRowAuthorBits: 0\nTableStatus: Retrieved\nTable options:\n\
  HashMap: DEFAULT-HASHMAP-3840-4\n-- Attributes --\nID                   Int    \
  \        PRIMARY KEY DISTRIBUTION KEY AT=FIXED ST=MEMORY AUTO_INCR\nName       \
  \          Char(35;latin1_swedish_ci) NOT NULL AT=FIXED ST=MEMORY DEFAULT \"\"\n\
  CountryCode          Char(3;latin1_swedish_ci) NOT NULL AT=FIXED ST=MEMORY DEFAULT\
  \ \"\"\nDistrict             Char(20;latin1_swedish_ci) NOT NULL AT=FIXED ST=MEMORY\
  \ DEFAULT \"\"\nPopulation           Int            NOT NULL AT=FIXED ST=MEMORY\
  \ DEFAULT 0\n-- Indexes --\nPRIMARY KEY(ID) - UniqueHashIndex\nPRIMARY(ID) - OrderedIndex\n\
  CountryCode(CountryCode) - OrderedIndex\n-- ForeignKeys --\n27/24/fk_countrycode\
  \ CountryCode (CountryCode) REFERENCES world.Country/PRIMARY KEY () on update set\
  \ null on delete set null\nNDBT_ProgramExit: 0 - OK\n清单 18-10.\nndb_desc 命令输出示例\n\
  ```\n\n当您想要查看表的内部结构（例如分区定义和额外位的数量）时，`ndb_desc` 命令非常有用，这些信息不会在 `SHOW CREATE TABLE`\
  \ 的输出中打印。\n\n从 MySQL NDB Cluster 7.5 系列开始，在 `ndbinfo` 数据库中添加了各种有用的表来检索表的元数据和状态。特别是，`table_fragments`、`table_info`\
  \ 和 `table_replicas` 表对于获取表元数据和状态非常有用。这些表没有直接标识表名的列。您需要参考 `dict_obj_info` 表来根据表名识别表标识符。清单\
  \ 18-11 展示了一个从 `ndbinfo.table_info` 表中检索表元数据的示例查询。\n\n\n\n### 磁盘数据表\n\n```\nmysql>\
  \ SELECT * FROM dict_obj_info d JOIN table_info t ON d.id = t.table_id  WHERE fq_name\
  \ LIKE 'world/def/City'\\G\n*************************** 1\\. row ***************************\n\
  type: 2\nid: 24\nversion: 67108865\nstate: 4\nparent_obj_type: 0\nparent_obj_id:\
  \ 0\nfq_name: world/def/City\ntable_id: 24\nlogged_table: 1\nrow_contains_gci: 1\n\
  row_contains_checksum: 1\nread_backup: 0\nfully_replicated: 0\nstorage_type: MEMORY\n\
  hashmap_id: 1\npartition_balance: FOR_RP_BY_LDM\ncreate_gci: 0\n1 row in set (0.02\
  \ sec)\n\n清单 18-11.\n从 ndbinfo.table_info 表中检索表元数据\n```\n\n有关 `ndbinfo` 数据库的更多详细信息，请参见第\
  \ 16 章。\n\n你也可以使用其他工具来查看表定义，就像在标准 MySQL 服务器上一样，例如 `DESC`、`EXPLAIN`、`SHOW FULL FIELDS`\
  \ 和 Information Schema。清单 18-12 展示了对 `world.City` 表执行 `DESC` 命令的输出示例。\n\n```\nmysql>\
  \ DESC City;\n+-------------+----------+------+-----+---------+----------------+\n\
  | 字段        | 类型     | 可空 | 键  | 默认值  | 额外属性       |\n+-------------+----------+------+-----+---------+----------------+\n\
  | ID          | int(11)  | NO   | PRI | NULL    | auto_increment |\n| Name     \
  \   | char(35) | NO   |     |         |                |\n| CountryCode | char(3)\
  \  | NO   | MUL |         |                |\n| District    | char(20) | NO   |\
  \     |         |                |\n| Population  | int(11)  | NO   |     | 0  \
  \     |                |\n+-------------+----------+------+-----+---------+----------------+\n\
  5 rows in set (0.00 sec)\n\n清单 18-12.\nworld.City 表的 DESC 命令输出\n```\n\nMySQL NDB\
  \ Cluster 支持磁盘数据表（或基于磁盘的表）作为一种选项，可用于以合理的性能损失为代价，使用成本更低的存储介质来存储大数据。自 MySQL NDB Cluster\
  \ 6.2 系列起，该功能已得到支持。\n\n我强烈建议在使用磁盘数据表时采用 SSD。在 SSD 尚未普及时期，磁盘数据表因为存储介质是硬盘驱动器（HDD）而非常缓慢。由于\
  \ HDD 是机械控制的，移动磁头和寻道目标扇区需要很长时间。因此，磁盘数据表只能用于归档等非常特定的用途。如今，我们可以选择固态硬盘（SSD），其成本相对于\
  \ RAM 来说已很合理。它没有机械部件，因此在响应时间和吞吐量方面都具有更好的读/写性能。此外，市场上最近也出现了采用 PCIe 和 NVMe 等超高速接口的\
  \ SSD 产品。有了这类快速 SSD，磁盘数据表已成为一种通用场景下的现实选择，只带来很小的性能损失。\n\n#### 磁盘数据表架构\n\n由于磁盘数据表的存储方式不同，其更新方式也不同于内存表。图\
  \ 18-5 描绘了写入磁盘数据表时的概念性流程。\n\n![A435171_1_En_18_Fig5_HTML.jpg](img/A435171_1_En_18_Fig5_HTML.jpg)\n\
  \n图 18-5.\n磁盘数据表架构概览：写事务\n\n当写入磁盘数据表时，所有修改都在磁盘页面缓冲区中进行，就像对 `InnoDB` 表的所有修改都在 `InnoDB`\
  \ 缓冲池中进行一样。旧行值会被复制到 undo 日志中以备回滚使用；在回滚和崩溃恢复时，会从 undo 日志中恢复旧行值。磁盘数据表仍然需要重做日志记录，因为即使修改的是磁盘数据表，重做日志也用于崩溃恢复，并且微\
  \ GCP（全局检查点）是复制所必需的。\n\n当对磁盘数据表执行崩溃恢复时，表空间的状态会回退到最近一次 LCP（局部检查点）执行时的状态，以使磁盘数据表的表空间与内存表的数据内存保持同步。然后，你会连同内存表一起应用重做日志。这意味着磁盘数据表仍然需要充足的重做日志空间。为了同步表空间和\
  \ LCP，下一次 LCP 之前的所有更改必须在 LCP 执行前刷写到磁盘。\n\n#### 磁盘数据表的已知限制\n\n使用磁盘数据表时，必须牢记以下限制以防止出现问题。磁盘数据表的主要限制包括：\n\
  \n*   无法将索引和索引列存储在磁盘上：MySQL NDB Cluster 尚不支持完整的磁盘数据表。即使对于磁盘数据表，主键列也存储在内存中。\n*  \
  \ 磁盘数据表不会提高数据持久性：在 MySQL NDB Cluster 中，持久性通过检查点机制来保证。无论如何，要恢复最新数据都需要重做日志。\n*   需要大缓冲区来提升磁盘数据表性能：分配的磁盘页面缓冲区越大，表访问速度越快。为了给磁盘页面缓冲区分配大内存，必须相应地减少数据内存。即使分配了充足的磁盘页面缓冲区并使用了快速\
  \ SSD，磁盘数据表仍然比内存表慢。\n*   空间效率并非最优：使用磁盘数据表比使用内存表需要更多的空间。由于所需的存储介质是磁盘而非内存，如果系统拥有大量磁盘空间，就可能存储更大量的数据。\n\
  *   空间可重用性不佳：无法使用 `OPTIMIZE TABLE` 回收磁盘区域。一旦磁盘空间分配给一个表，在该表被删除之前，该空间不会被释放。\n*   磁盘数据表中的每个列都需要一个\
  \ 8 字节指针：如果列本身很小，它会比内存表消耗更多的内存。\n*   响应时间不可预测：对内存表的响应时间是可预测的。但对磁盘数据表则不然，因为响应时间很大程度上取决于目标数据是否被缓存在内存中。\n\
  \n#### 磁盘数据表的配置选项\n\n与其他类型的表一样，需要配置选项才能使磁盘数据表发挥出良好性能。本节，我们将讨论可调整的磁盘数据表相关选项。有关配置选项的更多信息，请参阅第\
  \ 4 章。\n\n*   `DiskPageBufferMemory`：此选项决定分配给磁盘页面缓冲区的内存量。缓冲区越大，能节省的磁盘 I/O 就越多。当你需要磁盘数据表有更好性能时，请尽可能多地分配内存。默认值为\
  \ 64MB。\n*   `SharedGlobalMemory`：此选项并非专用于磁盘数据表，但 undo 日志缓冲区是从该内存中分配的。每个数据节点上 undo\
  \ 日志缓冲区的最大大小为 600MB。默认值为 128MB。\n*   `DiskIOThreadPool`：此选项指定用于磁盘数据表的 I/O 线程数。如果使用了快速\
  \ SSD，或者使用多个磁盘来分散 I/O 负载，你应考虑增加线程数。默认值为 2。\n*   `FileSystemPathDD`、`FileSystemPathDataFiles`、`FileSystemPathUndoFiles`：这些选项指定存储磁盘数据对象的目录。如果未指定后两个选项，则\
  \ `FileSystemPathDD` 是它们的默认值。`FileSystemPathDataFiles` 指定表空间数据文件的目录。`FileSystemPathUndoFiles`\
  \ 指定 undo 日志的目录。当每个数据节点主机使用多个磁盘来分散 I/O 负载时，这些选项是必需的。`FileSystemPathDD` 的默认值是 `FileSystemPath`。\n\
  *   `InitialLogFileGroup`、`InitialTablespace`：如果在初始系统启动时指定了这些选项，就会创建 undo 日志和表空间。否则，这些磁盘数据对象必须手动创建，如下一节所述。这些选项没有默认值。\n\
  \n\n##### 准备日志文件组\n\n要使用磁盘数据表，您必须预先创建磁盘数据对象。所需的对象是日志文件组（撤消日志）和表空间（数据文件）。\n\n日志文件组使用任意\
  \ SQL 节点上的 `CREATE LOGFILE GROUP` 命令创建。以下列表展示了创建日志文件组的示例命令。目前，每个集群只能创建一个日志文件组。\n\
  \n```\nmysql> CREATE LOGFILE GROUP lg1 ADD UNDOFILE 'undo1.log' INITIAL_SIZE = 10G\
  \ UNDO_BUFFER_SIZE = 600M ENGINE NDB;\nQuery OK, 0 rows affected (35 min 17.13 sec)\n\
  ```\n\n此命令需要相当长的时间才能完成，因为必须初始化撤消日志文件。`CREATE LOGFILE GROUP` 命令中的每个子句含义如下：\n\n* \
  \  `ADD UNDOFILE 'filename'`：此子句向日志文件组添加一个撤消日志文件。使用 `CREATE LOGFILE GROUP` 命令时，只能指定一个撤消日志文件，并且撤消日志文件是必需的。\n\
  *   `INITIAL_SIZE = size`：此子句指定撤消日志文件的大小。顾名思义，这不仅是初始大小，也是撤消日志文件生命周期内的大小。以后无法更改。如果发现撤消日志太小，可以稍后使用\
  \ `ALTER LOGFILE GROUP` 命令添加更多撤消日志文件。此子句可以省略。撤消文件的默认大小为 `128MB`。\n*   `UNDO_BUFFER_SIZE\
  \ = size`：此子句指定撤消缓冲区的大小，这是一个在将撤消数据写入撤消日志文件之前临时存储它的缓冲区。较大的撤消缓冲区可能会提高写入性能。请注意，因为缓冲区大小以后无法更改。撤消日志缓冲区的最大大小为\
  \ `600MB`。此子句可以省略。撤消缓冲区的默认值为 `8MB`。\n\n请注意，在大多数情况下，撤消日志文件和撤消缓冲区的默认大小都太小。如果您在高负载下使用磁盘数据表，则必须适当增加这些大小。由于撤消缓冲区大小以后无法更改，因此在确定大小时要非常小心。强烈建议在生产系统中创建日志文件组之前，在测试系统上进行基准测试。\n\
  \n撤消日志文件大小的估算方式与重做日志类似。撤消日志用于将表空间中的数据回滚到最近一次 LCP（本地检查点）完成时的状态。为了回滚到最近一次 LCP，撤消日志条目必须保留到下一个\
  \ LCP 完成。因此，您可以使用以下公式计算撤消日志条目的理论最大大小：\n\n```\ntime_taken_to_complete_lcp * io_speed_of_undo_logging\n\
  ```\n\n此公式与用于计算重做日志大小的公式相同。有关重做日志大小估算的更多信息，请参见第 4 章。\n\n##### 准备表空间\n\n创建日志文件组后，就该使用\
  \ `CREATE TABLESPACE` 命令创建用于存储磁盘数据表的表空间了。以下命令输出展示了创建表空间的示例命令。请注意，必须在创建表空间之前创建日志文件组，因为每个表空间都链接到某个特定的日志文件组。与日志文件组不同，一个集群中可以创建多个表空间。\n\
  \n```\nmysql> CREATE TABLESPACE ts1 ADD DATAFILE 'ts1-1.dat' USE LOGFILE GROUP lg1\
  \ EXTENT_SIZE = 256K INITIAL_SIZE = 8G ENGINE NDB;\nQuery OK, 0 rows affected (33\
  \ min 6.03 sec)\n```\n\n`CREATE TABLESPACE` 命令中的每个子句含义如下：\n\n*   `ADD DATAFILE 'filename'`：此子句向要创建的表空间添加一个数据文件。此子句不能省略，并且在\
  \ `CREATE TABLESPACE` 命令中只能添加一个数据文件。\n*   `USE LOGFILE GROUP lg_name`：此子句指定此表空间关联的日志文件组。\n\
  *   `EXTENT_SIZE = size`：此子句指定区的大小，即每个磁盘数据表分区的分配单元。最小大小为 `32KB`，最大大小为 `2G`。此子句可以省略。默认值为\
  \ `1MB`。请注意，过大的区会减少数据文件内的区数量，因为区是无法在多个表之间共享的分配单元。区过大会导致磁盘空间利用效率低下。在大多数情况下，默认值即可。不要将其设置得过小或过大。\n\
  *   `INITIAL_SIZE = size`：此子句指定数据文件的大小。就像撤消日志文件一样，文件大小以后无法更改。如果发现表空间太小，需要使用 `ALTER\
  \ TABLESPACE` 命令添加数据文件。\n\n您需要注意区大小和数据文件大小。每个数据文件最多可以有 `64K` 个区。建议每个数据文件的最大区数为 `32K`。因此，使用默认区大小，您最多可以创建\
  \ `32GB` 的数据文件。在清单 18-18 中，区大小设置为 `256KB`，比默认值小四倍，数据文件大小设置为 `8GB`，比使用 `32KB` 区时的最大大小小四倍。\n\
  \n如果您需要更大的表空间，请添加更多数据文件或增大区大小。或者，您可以创建多个表空间。\n\n\n#### 创建磁盘数据表\n\n要创建磁盘数据表，必须在 `CREATE\
  \ TABLE` 语句中指定 `STORAGE DISK` 子句和 `TABLESPACE` 子句。清单 18-13 展示了创建一个磁盘数据表的示例命令。\n\n\
  ```sql\nmysql> CREATE TABLE ddCity (\n->   ID int(11) NOT NULL AUTO_INCREMENT,\n\
  ->   Name char(35) NOT NULL DEFAULT '',\n->   CountryCode char(3) NOT NULL DEFAULT\
  \ '',\n->   District char(20) NOT NULL DEFAULT '',\n->   Population int(11) NOT\
  \ NULL DEFAULT '0',\n->   PRIMARY KEY (ID),\n->   KEY CountryCode (CountryCode)\n\
  -> ) ENGINE=NDB STORAGE DISK TABLESPACE ts1;\nQuery OK, 0 rows affected (5.79 sec)\n\
  ```\n清单 18-13. 创建一个磁盘数据表\n\n在此示例中，整个表被定义为磁盘数据。也可以仅将某些列存储在磁盘上。由于索引和被索引的列无法存储在磁盘，它们会被自动定义为内存数据。你可以使用\
  \ `ndb_desc` 命令来查看每个列实际使用的存储类型。以下命令输出是清单 18-13 中 `ddCity` 表的 `ndb_desc` 命令输出的摘录。\n\
  \n```\n-- Attributes --\nID Int PRIMARY KEY DISTRIBUTION KEY AT=FIXED ST=MEMORY\
  \ AUTO_INCR\nName Char(35;latin1_swedish_ci) NOT NULL AT=FIXED ST=DISK DEFAULT \"\
  \"\nCountryCode Char(3;latin1_swedish_ci) NOT NULL AT=FIXED ST=MEMORY DEFAULT \"\
  \"\nDistrict Char(20;latin1_swedish_ci) NOT NULL AT=FIXED ST=DISK DEFAULT \"\"\n\
  Population Int NOT NULL AT=FIXED ST=DISK DEFAULT 0\n```\n\n你可以看到 `ID` 和 `CountryCode`\
  \ 列显示为 `ST=MEMORY`，因此存储在内存中。其他列显示为 `ST=DISK`，因此存储在磁盘上。\n\n可以按列指定存储。尽管 `Population`\
  \ 列存储在磁盘上，但效率不高，因为它仅为 4 字节的列数据在内存中需要 8 字节的指针。清单 18-14 展示了一个 `CREATE TABLE` 语句示例，它定义了与清单\
  \ 18-13 相同的表，但指定了存储偏好。\n\n```sql\nmysql> CREATE TABLE ddCity (\n->   ID int(11)\
  \ NOT NULL AUTO_INCREMENT,\n->   Name char(35) NOT NULL DEFAULT '' STORAGE DISK,\n\
  ->   CountryCode char(3) NOT NULL DEFAULT '',\n->   District char(20) NOT NULL DEFAULT\
  \ '' STORAGE DISK,\n->   Population int(11) NOT NULL DEFAULT '0',\n->   PRIMARY\
  \ KEY (ID),\n->   KEY CountryCode (CountryCode)\n-> ) ENGINE=NDB TABLESPACE ts1;\n\
  Query OK, 0 rows affected (1.35 sec)\n```\n清单 18-14. 为特定列定义磁盘数据的表\n\n如你所见，在表定义的最后一行没有指定\
  \ `STORAGE DISK`。相反，`STORAGE DISK` 被指定在列定义中。这导致只有指定的列被存储在磁盘上。你可以通过使用 `ndb_desc`\
  \ 命令来确认这一点，如下列命令输出所示，该输出是 `ndb_desc` 输出的摘录。\n\n```\n-- Attributes --\nID Int PRIMARY\
  \ KEY DISTRIBUTION KEY AT=FIXED ST=MEMORY AUTO_INCR\nName Char(35;latin1_swedish_ci)\
  \ NOT NULL AT=FIXED ST=DISK DEFAULT \"\"\nCountryCode Char(3;latin1_swedish_ci)\
  \ NOT NULL AT=FIXED ST=MEMORY DEFAULT \"\"\nDistrict Char(20;latin1_swedish_ci)\
  \ NOT NULL AT=FIXED ST=DISK DEFAULT \"\"\nPopulation Int NOT NULL AT=FIXED ST=MEMORY\
  \ DEFAULT 0\n```\n\n你可以看到 `ID`、`CountryCode` 和 `Population` 列存储在内存中。`Name` 和 `District`\
  \ 列按 `CREATE TABLE` 语句中的指定存储在磁盘上。\n\n#### 监控磁盘数据表\n\n当你使用磁盘数据表时，请使用以下模式和 `ndbinfo`\
  \ 数据库信息来监控磁盘数据表的元数据和状态。有关这些 `ndbinfo` 表的更多信息，请参见第 16 章。\n\n#### 关于规范化的考虑\n\n作为一名数据库从业者，我坚持认为规范化对于\
  \ MySQL NDB 集群仍然有意义，因为它是一个关系数据库管理系统。当表未被规范化时，表中可能包含重复数据。如果碰巧只更新了重复行的某一部分，就会导致异常，因为已更新的行和未更新的行将会不同，尽管逻辑上它们必须是相同的。\n\
  \n未规范化的表是多个表连接的结果。规范化的过程是在不丢失数据的情况下将这样一个表分解为多个表。这消除了表内潜在的数据重复。原始表可以通过连接这些表来重新构造。\n\
  \n规范化的一个主要缺点是需要更多的连接。这对于旧版本的 MySQL NDB 集群来说是一个大问题，因为连接非常慢。然而，最近版本的 MySQL NDB 集群拥有良好的连接算法、下推连接和批处理键访问连接，尽管\
  \ `InnoDB` 通常仍然优于 NDB。由于在最近版本的 MySQL NDB 集群中连接速度相当快，你不必太担心表连接的问题。\n\n#### 关于表设计的主要限制\n\
  \n表 18-3 描述了在 MySQL NDB 集群中设计表时的主要限制。\n\n表 18-3. 关于表设计的主要限制\n\n| 项目 | 限制描述 |\n|\
  \ --- | --- |\n| 数据库对象总数 | 最多可创建总计 20320 个数据库对象。此硬性限制包括数据库、表和索引。 |\n| 表总数 | 受 `MaxNoOfTables`\
  \ 设置限制。 |\n| 索引总数 | 受 `MaxNoOfOrderedIndexes` 和 `MaxNoOfUniqueHashIndexes` 设置限制。\
  \ |\n| 每个索引的数据大小 | 3072 字节 |\n| 每个表的属性数量 | 512。属性是属于表的元素，如列或索引。有关属性的更多信息，请参见第 4\
  \ 章。 |\n| 每个索引的列数 | 32 |\n| 支持的索引类型 | 哈希索引和有序索引。（不支持空间索引和全文索引。）不支持索引前缀。 |\n| 可索引的列类型\
  \ | 除 BLOB（包括 TEXT 和 BIT）外的所有类型。 |\n| 最大行大小 | 14000 字节。注意，每个 BLOB 列为此总量贡献 264 字节。\
  \ |\n| 支持的分区类型 | `KEY` 或 `HASH` |\n| 每个节点组的最大分区数 | 八个 |\n| 磁盘数据表的表空间总数 | 2³² |\n\
  | 磁盘数据表每个表空间的数据文件数 | 2¹⁶ |\n| 磁盘数据表每个数据文件的区数 | 2¹⁵ |\n| 磁盘数据表的推荐最大数据文件大小 | 32GB\
  \ |\n| 自增列值 | 值在 SQL 节点之间是非单调的，因为每个 SQL 节点会预先保留一定范围的值。 |\n| 用作临时表 | 不支持 |\n\n###\
  \ 通过 SQL 访问数据\n\n表准备好后，就该操作其中的数据了。由于 MySQL NDB 集群是一个关系数据库管理系统，SQL 是主要的操作方法，尽管它也有\
  \ NoSQL 风格的方法。在本节中，我们将讨论如何从应用程序中使用 SQL 访问 MySQL NDB 集群中的数据库。\n\n#### 连接到 SQL 节点\n\
  \n应用程序可以像连接标准 MySQL 服务器一样连接到 SQL 节点，尽管存储引擎不同。应用程序唯一的问题是连接到哪个 SQL 节点。正如本书其他地方所讨论的，MySQL\
  \ NDB 集群可以有多个 SQL 节点。应用程序可以从任何 SQL 节点访问相同的数据。有三种典型的选择来解决这个问题：\n\n*   应用程序有多个实例，每个应用程序实例始终连接到同一个\
  \ SQL 节点。在这种情况下，应用程序实例和 SQL 节点通常位于同一主机上。\n*   对于 Java 应用程序，使用 Connector/J 的负载均衡功能。\n\
  *   使用外部负载均衡器来分散负载。\n\n每种方法都有其优缺点。请仔细选择适合你应用程序的方法。\n\n\n\n#### 每个应用实例配备一个 SQL 节点\n\
  \n这是最有前景的方法。如果应用服务器的数量不是太多，为每个应用服务器实例部署一个 SQL 节点是一个不错的选择，因为这种拓扑不需要额外的程序。图 18-6 是该拓扑的概念视图，其中每个应用服务器都连接到同一主机内的\
  \ SQL 节点。由于它们位于同一主机内，应用服务器可以通过 UNIX 域套接字连接。与远程网络连接相比，通过 UNIX 域套接字的连接开销非常小，因此这种拓扑在性能和简洁性方面都有优势。\n\
  \n![A435171_1_En_18_Fig6_HTML.jpg](img/A435171_1_En_18_Fig6_HTML.jpg)\n\n图 18-6.\
  \ 每个应用服务器连接到位于同一主机的 SQL 节点\n\n#### 使用 Connector/J 进行负载均衡\n\n如果你正在使用 Java 开发应用程序，仅通过使用\
  \ `Connector/J` 就可以解决这个问题。`Connector/J` 具有针对 MySQL NDB 集群和 1:N MySQL 复制设置的负载均衡功能。要启用负载均衡，你只需调整连接参数。需要调整两个参数：连接\
  \ URL 和 `loadBalanceStrategy`。用于负载均衡的连接 URL 格式如下：\n\n```\njdbc:mysql:loadbalance://{逗号分隔的服务器列表}/{数据库名称}\n\
  ```\n\n清单 18-15 展示了一个启用负载均衡的 `Connector/J` 配置示例。\n\n```\nClass.forName(\"com.mysql.jdbc.Driver\"\
  );\nString url = \"jdbc:mysql:loadbalance://host1,host2,host3/db\";\nProperties\
  \ props = new Properties();\nprops.setProperty(\"user\", \"username\");\nprops.setProperty(\"\
  password\", \"my password\");\nprops.setProperty(\"loadBalanceStrategy\", \"random\"\
  );\nConnection conn = DriverManager.getConnection(url, props);\n```\n\n清单 18-15.\
  \ 为使用 Connector/J 进行负载均衡设置 URL 和属性\n\n通过此设置，到 SQL 节点的连接会分布在多个服务器上，如图 18-7 所示。\n\n\
  ![A435171_1_En_18_Fig7_HTML.jpg](img/A435171_1_En_18_Fig7_HTML.jpg)\n\n图 18-7. 使用\
  \ Connector/J 负载均衡数据库访问\n\n`loadBalanceStrategy` 的可接受值是 `random` 或 `bestResponseTime`。设置为\
  \ `random` 时，连接会从服务器列表中随机获取。设置为 `bestResponseTime` 时，驱动程序会选择在上一次事务中响应时间最佳的服务器。默认值是\
  \ `random`。\n\n#### 使用负载均衡器\n\n市场上有很多负载均衡器。负载均衡器的类型大致分为以下三种：\n\n*   **硬件负载均衡器**：负载均衡由专用硬件完成。它看起来像一个网络交换机。\n\
  *   **TCP/IP 层负载均衡器**：负载均衡由可用于一般 TCP/IP 连接的软件完成，例如 LVS 和 HAProxy。\n*   **MySQL 协议负载均衡器**：负载均衡由\
  \ MySQL 协议层的软件完成。这种类型的负载均衡器只能用于 MySQL 或其他支持 MySQL 协议的数据库。（具体产品名称请参见以下描述。）本书将更详细地讨论这一种。\n\
  \n图 18-8 描绘了使用负载均衡器从应用程序到 SQL 节点连接的概览。如果负载均衡器是基于软件的，那么它极有可能与应用服务器运行在同一主机上。\n\n![A435171_1_En_18_Fig8_HTML.jpg](img/A435171_1_En_18_Fig8_HTML.jpg)\n\
  \n图 18-8. 使用负载均衡器平衡从应用程序到 SQL 节点的连接\n\n遗憾的是，Oracle 公司目前没有发布适合与 MySQL NDB 集群一起使用的负载均衡器。`MySQL\
  \ Router` 在其开发阶段是一个潜在的候选者。然而，它已成为 `InnoDB Cluster`（一种基于标准 MySQL 复制的高可用性解决方案）的专用软件。因此，它不能用于\
  \ MySQL NDB 集群。\n\n有几款第三方软件可用于 MySQL NDB 集群的负载均衡。我个人推荐 `ProxySQL`，因为它实用，并且是在 GPLv3\
  \ 许可下的免费软件。`ProxySQL` 的源代码发布在 GitHub 上：\n\n[`github.com/sysown/proxysql`](https://github.com/sysown/proxysql)\n\
  \n`ProxySQL` 不仅仅是一个负载均衡器，它还具有丰富的功能，例如查询重写、查询路由、查询缓存、防火墙等等。本书只讨论其负载均衡功能。\n\n目前，`ProxySQL`\
  \ 没有详细的使用手册，请参考其 GitHub 仓库的 wiki 页面以及源代码中包含的 `doc` 目录。由于 `ProxySQL` 的配置有点令人困惑，我们将讨论其典型用法。\n\
  \n首先，将 `ProxySQL` 安装到你的主机上。你可以从 GitHub 下载源代码或二进制（RPM 和 DEB）包。与一般的开源项目不同，它没有自动配置工具，例如\
  \ `configure` 脚本或 `cmake` 配置文件。只需从源代码顶层目录运行 `make` 即可。清单 18-16 显示了从源代码构建它的典型命令。\n\
  \n```\nshell$ git clone https://github.com/sysown/proxysql.git\nshell$ cd proxysql\n\
  shell$ make\nshell$ sudo make install\n```\n\n清单 18-16. 从源代码构建 ProxySQL\n\n这将安装\
  \ `systemd` 服务 `proxysql.service`、默认配置文件 `/etc/proxysql.conf` 以及 `proxysql` 命令。你可以通过\
  \ `systemd` 或命令行启动它。\n\n\n\nProxySQL 的配置系统令人困惑。ProxySQL 的配置系统中有四层：`RUNTIME`、`MEMORY`、`DISK`\
  \ 和 `CONFIG FILE`。图 18-9 显示了 ProxySQL GitHub 仓库 wiki 页面的截图。`RUNTIME` 是唯一有效的配置层，用于控制\
  \ ProxySQL 的行为。`MEMORY` 是一个内存中的 SQLite 数据库，而 `DISK` 是一个磁盘上的 SQLite 数据库。任何配置首先被加载到\
  \ `MEMORY`，然后应用到 `RUNTIME`。无法直接将配置从 `DISK` 或 `CONFIG FILE` 加载到 `RUNTIME`。顾名思义，`MEMORY`\
  \ 中的配置不是持久化的，重启后会丢失。你必须将更改保存到 `DISK` 以使其持久化。`CONFIG FILE` 是一个补充性的配置源。仅在你偏好基于文件的配置风格时才使用它。\n\
  \n![A435171_1_En_18_Fig9_HTML.jpg](img/A435171_1_En_18_Fig9_HTML.jpg)\n\n图 18-9.\
  \ ProxySQL 的四个配置层\n\n初始配置除了一些基本配置和注释外是空的。如果你偏好使用配置文件进行配置，请在启动 `proxysql` 守护进程之前，注释掉、复制并编辑其中的一些配置。当你使用管理界面进行配置时，此步骤可以跳过。\n\
