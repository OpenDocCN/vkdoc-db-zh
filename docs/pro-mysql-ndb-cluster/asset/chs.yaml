  \ 视图的监控对于第 14 章“为何监控？”一节中讨论的所有三个原因都至关重要——建立基线、进行根本原因分析和执行预防性维护。下一节包含使用这些视图的示例。本书各处也提供了其他示例。\n\
  \n### NDB Cluster 报告\n\n就像前一章讨论的性能模式一样，`ndbinfo` 模式起初可能让人望而生畏。然而，稍加练习后，检索信息会变得更容易。本节将展示几个如何使用\
  \ `ndbinfo` 模式生成报告的示例。这些报告本身很有用，同时也作为编写针对视图的查询的入门介绍，以便创建更多报告。\n\n#### 内存使用报告\n\n\
  `memoryusage` 视图可用于监控每个数据节点和每种内存类型已分配和当前使用的 `DataMemory`、`IndexMemory` 和 `LongMessageBuffer`\
  \ 内存量。列表 16-4 显示了该视图的原始输出。\n\n```sql\nmysql> SELECT * FROM ndbinfo.memoryusage;\n\
  +---------+---------------------+---------+------------+----------+-------------+\n\
  | node_id | memory_type         | used    | used_pages | total    | total_pages\
  \ |\n+---------+---------------------+---------+------------+----------+-------------+\n\
  |       1 | Data memory         | 3309568 |        101 | 41943040 |        1280\
  \ |\n|       1 | Index memory        |  638976 |         78 | 15990784 |       \
  \ 1952 |\n|       1 | Long message buffer |  524288 |       2048 | 67108864 |  \
  \    262144 |\n|       2 | Data memory         | 3309568 |        101 | 41943040\
  \ |        1280 |\n|       2 | Index memory        |  638976 |         78 | 15990784\
  \ |        1952 |\n|       2 | Long message buffer |  393216 |       1536 | 67108864\
  \ |      262144 |\n+---------+---------------------+---------+------------+----------+-------------+\n\
  6 rows in set (0.02 sec)\n```\n\n**列表 16-4.**\n`ndbinfo.memoryusage` 视图\n\n此输出非常适合机器使用——例如在监控系统中——但对于人类阅读，列表\
  \ 16-5 中的查询可能更合适。该查询使用了 `sys` 模式中的 `sys.format_bytes()` 函数来为字节数添加单位。\n\n```sql\n\
  mysql> SELECT node_id, memory_type, sys.format_bytes(used) AS UsedBytes,\n    ->\
  \ sys.format_bytes(total) as TotalBytes,\n    -> sys.format_bytes(total-used) AS\
  \ FreeBytes,\n    -> ROUND(100*used/total, 2) AS UsedPct\n    -> FROM ndbinfo.memoryusage;\n\
  +---------+---------------------+------------+------------+-----------+---------+\n\
  | node_id | memory_type         | UsedBytes  | TotalBytes | FreeBytes | UsedPct\
  \ |\n+---------+---------------------+------------+------------+-----------+---------+\n\
  |       1 | Data memory         | 3.16 MiB   | 40.00 MiB  | 36.84 MiB |    7.89\
  \ |\n|       1 | Index memory        | 624.00 KiB | 15.25 MiB  | 14.64 MiB |   \
  \ 4.00 |\n|       1 | Long message buffer | 512.00 KiB | 64.00 MiB  | 63.50 MiB\
  \ |    0.78 |\n|       2 | Data memory         | 3.16 MiB   | 40.00 MiB  | 36.84\
  \ MiB |    7.89 |\n|       2 | Index memory        | 624.00 KiB | 15.25 MiB  | 14.64\
  \ MiB |    4.00 |\n|       2 | Long message buffer | 384.00 KiB | 64.00 MiB  | 63.62\
  \ MiB |    0.59 |\n+---------+---------------------+------------+------------+-----------+---------+\n\
  6 rows in set (0.02 sec)\n```\n\n**列表 16-5.**\n`ndbinfo.memoryusage` 视图的格式化输出\n\n\
  现在，三个字节列的值以 KiB 和 MiB 为单位显示。具体单位取决于实际值，在 MySQL NDB Cluster 7.5 及更高版本中最大可达 GiB。此外，添加了\
  \ `UsedPct` 列，以便更容易地看出集群距离耗尽内存还有多远。\n\n\n#### 磁盘页缓冲区报告\n\n磁盘页缓冲区用于在内存中缓存磁盘数据。与`InnoDB`缓冲池类似，磁盘页缓冲区通过将磁盘数据保留在内存中来提高性能，这样后续使用相同数据的查询就可以从内存中检索数据，而无需进行昂贵的磁盘操作。这在第\
  \ 18 章中有更详细的解释。磁盘页缓冲区的有效性对于磁盘数据的性能至关重要。在确定其有效性时，`ndbinfo.diskpagebuffer`视图中的两列尤为关键：\n\
  \n*   `page_requests_direct_return`：从缓存中直接返回的页面。这些有助于提高命中率。\n*   `page_requests_wait_io`：需从磁盘读取返回的页面。这些有助于降低命中率。\n\
  \n两者之和即为页面请求总数。因此，可以使用这两列计算磁盘页缓冲区的缓存命中率，如清单 16-6 所示。输出中一些列已被重命名以缩减结果宽度。`IF(...)`子句用于避免在尚无页面请求时出现除零错误。\n\
  \n```sql\nmysql> SELECT node_id, block_instance,\npage_requests_direct_return AS\
  \ PageDirectReturn,\npage_requests_wait_io AS PageWaitIo,\nIF(page_requests_direct_return+page_requests_wait_io\
  \ = 0,\nNULL,\nROUND(100*page_requests_direct_return/\n(page_requests_direct_return+page_requests_wait_io),\n\
  2)\n) AS CacheHitPct\nFROM ndbinfo.diskpagebuffer;\n+---------+----------------+------------------+------------+-------------+\n\
  | node_id | block_instance | PageDirectReturn | PageWaitIo | CacheHitPct |\n+---------+----------------+------------------+------------+-------------+\n\
  |       1 |              1 |            10488 |         17 |       99.84 |\n|  \
  \     1 |              2 |                1 |          1 |       50.00 |\n|    \
  \   2 |              1 |            10408 |         17 |       99.84 |\n|      \
  \ 2 |              2 |                1 |          1 |       50.00 |\n+---------+----------------+------------------+------------+-------------+\n\
  4 rows in set (0.02 sec)\n清单 16-6.\n查询磁盘页缓冲区命中率\n```\n\n`block_instance`列是所使用的 PGMAN\
  \ 内核块的实例。清单 16-7 展示了如何查找这些块实例所在的线程。\n\n**注意**\n\n`PGMAN`块实例的数量取决于`MaxNoOfExecutionThreads`和`ThreadConfig`的配置。\n\
  \n```sql\nmysql> SELECT node_id, thr_no, tb.block_instance, t.thread_name\nFROM\
  \ ndbinfo.threadblocks tb\nINNER JOIN ndbinfo.threads t USING (node_id, thr_no)\n\
  WHERE tb.block_name = 'PGMAN'\nORDER BY node_id, block_instance;\n+---------+--------+----------------+-------------+\n\
  | node_id | thr_no | block_instance | thread_name |\n+---------+--------+----------------+-------------+\n\
  |       1 |      1 |              0 | rep         |\n|       1 |      2 |      \
  \        1 | ldm         |\n|       1 |      1 |              2 | rep         |\n\
  |       2 |      1 |              0 | rep         |\n|       2 |      2 |      \
  \        1 | ldm         |\n|       2 |      1 |              2 | rep         |\n\
  +---------+--------+----------------+-------------+\n6 rows in set (0.03 sec)\n\
  清单 16-7.\n获取有关 PGMAN 内核块实例的信息\n```\n\n因此，在这种情况下，用于查询的 LDM 线程的缓存命中率为 99.84%，这是很好的。考虑到返回的页面数量很少，复制线程的低命中率无需担忧。清单\
  \ 16-6 和 16-7 中的两个查询可以合并，如清单 16-8 所示。\n\n```sql\nmysql> SELECT node_id, block_instance,\
  \ t.thread_name,\ndpb.page_requests_direct_return AS PageDirect,\ndpb.page_requests_wait_io\
  \ AS PageWait,\nIF(dpb.page_requests_direct_return+page_requests_wait_io = 0,\n\
  NULL,\nROUND(100*dpb.page_requests_direct_return/\n(dpb.page_requests_direct_return+\n\
  dpb.page_requests_wait_io),\n2)\n) AS HitPct\nFROM ndbinfo.diskpagebuffer dpb\n\
  INNER JOIN ndbinfo.threadblocks tb\nUSING (node_id, block_instance)\nINNER JOIN\
  \ ndbinfo.threads t USING (node_id, thr_no)\nWHERE tb.block_name = 'PGMAN'\nORDER\
  \ BY node_id, block_instance;\n+---------+----------------+-------------+------------+----------+--------+\n\
  | node_id | block_instance | thread_name | PageDirect | PageWait | HitPct |\n+---------+----------------+-------------+------------+----------+--------+\n\
  |       1 |              1 | ldm         |      10488 |       17 |  99.84 |\n| \
  \      1 |              2 | rep         |          1 |        1 |  50.00 |\n|  \
  \     2 |              1 | ldm         |      10408 |       17 |  99.84 |\n|   \
  \    2 |              2 | rep         |          1 |        1 |  50.00 |\n+---------+----------------+-------------+------------+----------+--------+\n\
  4 rows in set (0.05 sec)\n清单 16-8.\n用于确定每个线程的磁盘页缓冲区命中率的组合查询\n```\n\n#### 集群性能监控报告\n\
  \n##### 传输器报告\n\n网络是集群基础设施中最容易成为瓶颈的部分之一。`ndbinfo.transporters`视图提供了一种简单的方法来监控过载的传输器，并识别哪些节点间的连接对整体数据使用贡献最大。\n\
  \n> **注意**\n> 传输器的度量指标会在其状态变更为已连接时重置。然而，在断开连接后，这些指标会被保留，直到连接重新建立。\n\n在确定传输器状态时，会考虑两个阈值：\n\
  *   过载：当发送缓冲区使用量超过`OverloadLimit`字节时发生。默认情况下，`OverloadLimit`是该传输器的`SendBufferMemory`的\
  \ 80%。\n*   减速：在过载限制的 60%时发生。\n\n如果某个传输器倾向于过载，则有必要研究改进网络或增加发送缓冲区的大小。`ndbinfo.transporters`视图有四个与过载和减速情况相关的列：\n\
  *   overloaded：传输器当前是否过载。\n*   overload_count：传输器过载的次数。\n*   slowdown：传输器当前是否处于减速状态。\n\
  *   slowdown_count：传输器处于减速状态的次数。\n\n过载和减速状态通常只持续很短的时间，因此从监控角度来看，计数通常更有用。\n\n列表 16-9\
  \ 展示了一个查询`ndbinfo.transporters`视图以获取两个`NodeId = 1`和`NodeId = 2`的数据节点之间传输器状态的示例。数据显示了两个方向。\n\
  \n```sql\nmysql> SELECT * FROM transporters WHERE (node_id = 1 AND remote_node_id\
  \ = 2) OR (node_id = 2 AND remote_node_id = 1)\\G\n*************************** 1.\
  \ row ***************************\nnode_id: 1\nremote_node_id: 2\nstatus: CONNECTED\n\
  remote_address: 192.168.56.104\nbytes_sent: 139508260\nbytes_received: 117712512\n\
  connect_count: 1\noverloaded: 0\noverload_count: 0\nslowdown: 0\nslowdown_count:\
  \ 0\n*************************** 2. row ***************************\nnode_id: 2\n\
  remote_node_id: 1\nstatus: CONNECTED\nremote_address: 192.168.56.103\nbytes_sent:\
  \ 117712512\nbytes_received: 139508260\nconnect_count: 1\noverloaded: 0\noverload_count:\
  \ 0\nslowdown: 0\nslowdown_count: 0\n2 rows in set (0.02 sec)\n```\n列表 16-9. 两个数据节点之间的传输器数据与指标\n\
  \n在这种情况下，数据是对称的，但对于四个过载和减速列来说，情况并非总是如此。`bytes_sent`和`bytes_received`列可以选择使用`sys.format_bytes()`函数进行格式化，就像内存使用报告中所做的那样。如果过载或减速计数器增加，则表明存在问题。类似地，如果`connect_count`在没有刻意重启某个节点的情况下增加，可能意味着存在网络问题。\n\
  \n##### 磁盘写入速度报告\n\n在 MySQL NDB Cluster 7.4 及更高版本中，可以监控本地检查点（LCP）、备份和重做日志的磁盘写入速度。由于本地检查点和备份由相同的代码处理，它们的磁盘写入指标是合并的。\n\
  \n`ndbinfo.disk_write_speed_base`视图记录了原始指标。该视图中一行的示例如下：\n\n```sql\nmysql> SELECT\
  \ * FROM disk_write_speed_base LIMIT 1\\G\n*************************** 1. row ***************************\n\
  node_id: 1\nthr_no: 0\nmillis_ago: 0\nmillis_passed: 1001\nbackup_lcp_bytes_written:\
  \ 0\nredo_bytes_written: 131072\ntarget_disk_write_speed: 20971520\n1 row in set\
  \ (0.01 sec)\n```\n\n数据属于在`millis_ago`毫秒前结束的报告期，数据收集持续了`millis_passed`毫秒。`target_disk_write_speed`值是\
  \ LDM 线程每秒目标写入的字节数。这个目标会根据数据节点的`MaxDiskWriteSpeed`、`MaxDiskWriteSpeedOtherNodeRestart`、`MaxDiskWriteSpeedOwnRestart`和`MinDiskWriteSpeed`选项而变化。\n\
  \n基础表每个 LDM 线程有 61 行，每个周期接近一秒。由于每个 LDM 线程总有一条记录是在 0 毫秒前完成的，因此最旧的周期大约在一分钟前结束。这一秒的间隔也是\
  \ LDM 线程用于内部监控磁盘写入速度的，目标磁盘写入速度可能会在每个周期后进行调整。\n\n原始数据对监控系统非常有用，因为它允许计算它可能支持的任何统计数据。然而，对于手动检查，通常更推荐使用`ndbinfo.disk_write_speed_aggregate`和`ndbinfo.disk_write_speed_aggregate_node`视图之一。这两个视图聚合了上一秒、过去\
  \ 10 秒和过去一分钟的数据。此外，`ndbinfo.disk_write_speed_aggregate`视图还计算了标准差¹，并判断是否适用以下任一条件（及对应的列名）：\n\
  *   slowdowns_due_to_io_lag：由于 I/O 子系统成为瓶颈而导致 I/O 减速。\n*   slowdowns_due_to_high_cpu：由于高\
  \ CPU 使用率而导致 I/O 减速。\n*   disk_write_speed_set_to_min：磁盘写入速度被设置为`MinDiskWriteSpeed`。\n\
  *   current_target_disk_write_speed：LDM 线程当前试图达到的目标写入速度。\n\n这些列对于排查性能问题非常有用，并且如果不考虑其他指标，无法从基础数据中推导出减速列。\n\
  \n`ndbinfo.disk_write_speed_aggregate`视图按 LDM 线程分组聚合数据，而`ndbinfo.disk_write_speed_aggregate_node`视图按数据节点分组数据。列表\
  \ 16-10 展示了`ndbinfo.disk_write_speed_aggregate`视图的示例输出。\n\n\n##### 磁盘写入速度视图\n\n\
  以下是 `ndbinfo.disk_write_speed_aggregate` 视图的示例：\n\n```sql\nmysql> SELECT * FROM\
  \ ndbinfo.disk_write_speed_aggregate\\G\n*************************** 1. row ***************************\n\
  node_id: 1\nthr_no: 0\nbackup_lcp_speed_last_sec: 134000\nredo_speed_last_sec: 0\n\
  backup_lcp_speed_last_10sec: 13479\nredo_speed_last_10sec: 65261\nstd_dev_backup_lcp_speed_last_10sec:\
  \ 40000\nstd_dev_redo_speed_last_10sec: 65000\nbackup_lcp_speed_last_60sec: 26000\n\
  redo_speed_last_60sec: 65000\nstd_dev_backup_lcp_speed_last_60sec: 179000\nstd_dev_redo_speed_last_60sec:\
  \ 65000\nslowdowns_due_to_io_lag: 5\nslowdowns_due_to_high_cpu: 0\ndisk_write_speed_set_to_min:\
  \ 0\ncurrent_target_disk_write_speed: 20971520\n*************************** 2. row\
  \ ***************************\nnode_id: 2\nthr_no: 0\nbackup_lcp_speed_last_sec:\
  \ 1061000\nredo_speed_last_sec: 0\nbackup_lcp_speed_last_10sec: 106169\nredo_speed_last_10sec:\
  \ 65209\nstd_dev_backup_lcp_speed_last_10sec: 318000\nstd_dev_redo_speed_last_10sec:\
  \ 65000\nbackup_lcp_speed_last_60sec: 42000\nredo_speed_last_60sec: 65000\nstd_dev_backup_lcp_speed_last_60sec:\
  \ 198000\nstd_dev_redo_speed_last_60sec: 64000\nslowdowns_due_to_io_lag: 6\nslowdowns_due_to_high_cpu:\
  \ 0\ndisk_write_speed_set_to_min: 0\ncurrent_target_disk_write_speed: 20971520\n\
  2 rows in set (0.01 sec)\n```\n清单 16-10. `ndbinfo.disk_write_speed_aggregate` 视图\n\
  \n该视图包含每个线程的数据。写入速度显示了过去 1、10 和 60 秒内用于备份/LCP 写入、重做写入的数据及其标准差。（1 秒数据没有标准差，因为它是一个单独的测量值。）10\
  \ 秒和 60 秒的值是每秒的。\n\n还有关于减速的统计信息，例如自上次节点重启以来，写入速度被设置为 `MinDiskWriteSpeed` 的秒数，以及当前目标速度。在示例中，请注意有六次因\
  \ I/O 延迟检测到减速。\n\n清单 16-11 展示了 `ndbinfo.disk_write_speed_aggregate_node` 视图的示例。\n\
  \n```sql\nmysql> SELECT * FROM disk_write_speed_aggregate_node\\G\n***************************\
  \ 1. row ***************************\nnode_id: 1\nbackup_lcp_speed_last_sec: 75000\n\
  redo_speed_last_sec: 130000\nbackup_lcp_speed_last_10sec: 7540\nredo_speed_last_10sec:\
  \ 65235\nbackup_lcp_speed_last_60sec: 1000\nredo_speed_last_60sec: 65000\n***************************\
  \ 2. row ***************************\nnode_id: 2\nbackup_lcp_speed_last_sec: 74000\n\
  redo_speed_last_sec: 129000\nbackup_lcp_speed_last_10sec: 7537\nredo_speed_last_10sec:\
  \ 65209\nbackup_lcp_speed_last_60sec: 1000\nredo_speed_last_60sec: 65000\n2 rows\
  \ in set (0.01 sec)\n```\n清单 16-11. `ndbinfo.disk_write_speed_aggregate_node` 视图\n\
  \n在这种情况下，聚合是按节点进行的，并且只包含 1、10 和 60 秒的值，没有标准差。乍一看，这个视图可能不太有用，但请考虑一个具有多个 LDM 线程（最多可有\
  \ 32 个）的集群。在这种情况下，`ndbinfo.disk_write_speed_aggregate` 视图将为每个数据节点的每个 LDM 线程提供一行，因此\
  \ `ndbinfo.disk_write_speed_aggregate_node` 中每节点一行的信息可用于获取节点工作情况的概览。\n\n##### 锁报告\n\
  \n事务系统中一个常见的问题是两个事务争夺相同的锁。在最坏的情况下，这两个事务可能持有对方事务所需的锁。这称为死锁。在 MySQL NDB Cluster 中，锁等待和死锁的处理方式相同：在\
  \ `TransactionDeadlockDetectionTimeout` 毫秒后，事务会放弃等待并因锁等待超时错误而失败。\n\n> **注意**\n>\n\
  > 这里讨论的锁是在 `NDBCluster` 级别（即数据节点内的存储引擎中）。前一章中与 Performance Schema 讨论的锁是针对表和元数据的（但仅在一个\
  \ SQL 节点内）。\n\n挑战在于确定哪些事务在等待哪些锁，以及持有阻塞锁的事务正在做什么。可以使用三个 `ndbinfo` 视图——`cluster_locks`、`locks_per_fragment`\
  \ 和 `cluster_transactions`——来获取此信息。清单 16-12 展示了一个确定阻塞锁和等待锁以及查找两个冲突连接信息的示例。\n\n```sql\n\
  -- 查找关于冲突锁的信息\nmysql> SELECT lb.tableid, lb.fragmentid, lpf.fq_name,\nlpf.parent_fq_name,\
  \ lpf.type,\n'-----------------' AS '-----------------------',\nlb.transid AS BlockingTransId,\
  \ lb.op AS BlockingOp,\nlb.duration_millis AS BlockingMilliSeconds,\ntb.state AS\
  \ BlockingState,\ntb.count_operations AS BlockingOperations,\ntb.inactive_seconds\
  \ AS BlockingInactiveSeconds,\ntb.client_node_id AS BlockingNodeId,\n'-----------------'\
  \ AS '-----------------------',\nlw.transid AS WaitingTransId, lw.op AS WaitingOp,\n\
  lw.duration_millis AS WaitingMilliSeconds,\ntw.state AS WaitingState,\ntw.count_operations\
  \ AS WaitingOperations,\ntw.inactive_seconds AS WaitingInactiveSeconds,\ntw.client_node_id\
  \ as WaitingNodeId\nFROM ndbinfo.cluster_locks lw\nINNER JOIN ndbinfo.cluster_locks\
  \ lb\nON lb.lock_num = lw.waiting_for\nINNER JOIN ndbinfo.cluster_transactions tb\n\
  ON tb.transid = lb.transid\nINNER JOIN ndbinfo.cluster_transactions tw\nON tw.transid\
  \ = lw.transid\nINNER JOIN ndbinfo.locks_per_fragment lpf\nON lpf.table_id = lb.tableid\n\
  AND lpf.fragment_num = lb.fragmentid\nAND lpf.node_id = lb.node_id\\G\n***************************\
  \ 1. row ***************************\ntableid: 12\nfragmentid: 1\nfq_name: world/def/City\n\
  parent_fq_name: NULL\ntype: User table\n-----------------------: -----------------\n\
  BlockingTransId: 36084872111980557\nBlockingOp: READ\nBlockingMilliSeconds: 2028919\n\
  BlockingState: Started\nBlockingOperations: 2\nBlockingInactiveSeconds: 2009\nBlockingNodeId:\
  \ 51\n-----------------------: -----------------\nWaitingTransId: 40588471739351055\n\
  WaitingOp: READ\nWaitingMilliSeconds: 3323\nWaitingState: Started\nWaitingOperations:\
  \ 1\nWaitingInactiveSeconds: 3\nWaitingNodeId: 51\n1 row in set (0.28 sec)\n-- 阻塞连接信息\n\
  mysql> SELECT session.*\nFROM information_schema.ndb_transid_mysql_connection_map\
  \ map\nINNER JOIN sys.session\nON session.conn_id = map.mysql_connection_id\nWHERE\
  \ (map.ndb_transid >> 32) = (36084872111980557 >> 32)\\G\n***************************\
  \ 1. row ***************************\nthd_id: 134\nconn_id: 111\nuser: root@localhost\n\
  db: world\ncommand: Sleep\nstate: NULL\ntime: 2038\ncurrent_statement: NULL\nstatement_latency:\
  \ NULL\nprogress: NULL\nlock_latency: 159.54 ms\nrows_examined: 1\nrows_sent: 0\n\
  rows_affected: 1\ntmp_tables: 0\ntmp_disk_tables: 0\nfull_scan: NO\nlast_statement:\
  \ UPDATE world.City SET Population = Population + 1 WHERE ID = 130\nlast_statement_latency:\
  \ 163.07 ms\ncurrent_memory: 0 bytes\nlast_wait: NULL\nlast_wait_latency: NULL\n\
  source: NULL\ntrx_latency: NULL\ntrx_state: NULL\ntrx_autocommit: NULL\npid: 26941\n\
  program_name: mysql\n1 row in set (0.05 sec)\n-- 等待连接信息\nmysql> SELECT session.*\n\
  FROM information_schema.ndb_transid_mysql_connection_map map\nINNER JOIN sys.session\n\
  ON session.conn_id = map.mysql_connection_id\nWHERE (map.ndb_transid >> 32) = (40588471739351055\
  \ >> 32)\\G\n*************************** 1. row ***************************\nthd_id:\
  \ 141\nconn_id: 118\nuser: root@localhost\ndb: world\ncommand: Query\nstate: updating\n\
  time: 21\ncurrent_statement: UPDATE world.City SET Population = Population + 1 WHERE\
  \ ID = 130\nstatement_latency: 20.38 s\nprogress: NULL\nlock_latency: 146.00 us\n\
  rows_examined: 0\nrows_sent: 0\nrows_affected: 0\ntmp_tables: 0\ntmp_disk_tables:\
  \ 0\nfull_scan: NO\nlast_statement: NULL\nlast_statement_latency: NULL\ncurrent_memory:\
  \ 0 bytes\nlast_wait: NULL\nlast_wait_latency: NULL\nsource: NULL\ntrx_latency:\
  \ NULL\ntrx_state: NULL\ntrx_autocommit: NULL\npid: 26986\nprogram_name: mysql\n\
  1 row in set (0.05 sec)\n```\n清单 16-12. 调查锁\n\n\n\n用于查找阻塞和等待事务的查询语句看起来很长，但实际上是多张表的直接连接。对于阻塞和等待的事务，`cluster_locks`\
  \ 和 `cluster_transactions` 视图提供了一对视图，而 `locks_per_fragment` 视图则用于获取有关锁注册所在表和/或索引的附加信息。虚线列的作用是使数据分组更清晰——分别对应表信息、阻塞信息和等待信息。\n\
  \n用于查找附加信息的两个查询必须在发起连接的 SQL 节点上执行。该节点 ID 可以通过 `ndbinfo` 查询找到。连接信息则使用 `sys.session`\
  \ 视图查找。\n\n##### 检测热点\n\n锁视图也可用于确定哪些表和分片构成了热点。`ndbinfo.locks_per_fragment` 视图非常适合此目的。清单\
  \ 16-13 展示了该视图的一个示例行。这些数字相对于生产系统的预期值有些夸大，因为它们是通过人为设置较大的 `TransactionDeadlockDetectionTimeout`\
  \ 值以方便测试获得的。\n\n```sql\nmysql> SELECT *\nFROM ndbinfo.locks_per_fragment\nWHERE\
  \ node_id = 2 AND table_id = 12 AND fragment_num = 1\\G\n***************************\
  \ 1. row ***************************\nfq_name: world/def/City\nparent_fq_name: NULL\n\
  type: User table\ntable_id: 12\nnode_id: 2\nblock_instance: 1\nfragment_num: 1\n\
  ex_req: 2008\nex_imm_ok: 1998\nex_wait_ok: 1\nex_wait_fail: 9\nsh_req: 0\nsh_imm_ok:\
  \ 0\nsh_wait_ok: 0\nsh_wait_fail: 0\nwait_ok_millis: 2360\nwait_fail_millis: 550811\n\
  1 row in set (0.04 sec)\n```\n**清单 16-13.** `ndbinfo.locks_per_fragment` 视图\n\n\
  以 `ex_` 为前缀的列代表排他锁，而以 `sh_` 为前缀的列代表共享锁。在此示例中，共有 2008 次排他锁请求 (`ex_req`)，其中 1998 次被立即授予\
  \ (`ex_imm_ok`)，1 次在等待后被授予 (`ex_wait_ok`)，9 次在等待但未被授予 (`ex_wait_fail`)。如果一个分片或表（通过聚合数据）有许多锁请求在等待或失败，则表明该区域存在争用。更好的索引或不同的查询模式可能有助于解决此问题，或者可以考虑增加\
  \ `TransactionDeadlockDetectionTimeout` 来解决或缓解问题。\n\n##### 日志缓冲区和空间报告\n\n第 2 章讨论了事务所做的更改如何在提交时写入重做缓冲区，然后在全局检查点期间刷新到重做日志。重做日志用于持久化已提交的事务，直到其更改被包含在本地检查点中。图\
  \ 16-1 展示了此机制的概览。对于磁盘数据存在类似的机制，其中有一个撤消日志和撤消日志缓冲区用于需要回滚的事务（另见第 18 章）。\n\n![A435171_1_En_16_Fig1_HTML.jpg](img/A435171_1_En_16_Fig1_HTML.jpg)\n\
  **图 16-1.** 本地检查点和重做日志机制概览\n\n监控重做和撤消缓冲区以及重做和撤消日志对于避免事务中止和集群变为只读至关重要。`ndbinfo` 模式中有两个用于此目的的视图：`logbuffers`\
  \ 用于监控缓冲区，`logspaces` 用于监控日志。清单 16-14 展示了查询缓冲区和日志使用情况的示例。\n\n```sql\nmysql> SELECT\
  \ node_id, log_type, log_id, log_part,\nsys.format_bytes(total) AS total,\nsys.format_bytes(used)\
  \ AS used,\nROUND(100*used/total, 2) AS UsedPct\nFROM ndbinfo.logbuffers;\n+---------+----------+--------+----------+-----------+------------+---------+\n\
  | node_id | log_type | log_id | log_part | total     | used       | UsedPct |\n\
  +---------+----------+--------+----------+-----------+------------+---------+\n\
  |       1 | REDO     |      0 |        1 | 16.00 MiB | 320.00 KiB |    1.95 |\n\
  |       1 | DD-UNDO  |     20 |        0 | 2.00 MiB  | 5.08 KiB   |    0.25 |\n\
  |       2 | REDO     |      0 |        1 | 16.00 MiB | 320.00 KiB |    1.95 |\n\
  |       2 | DD-UNDO  |     20 |        0 | 2.00 MiB  | 31.48 KiB  |    1.54 |\n\
  +---------+----------+--------+----------+-----------+------------+---------+\n\
  4 rows in set (0.01 sec)\n```\n```sql\nmysql> SELECT node_id, log_type, log_id,\
  \ log_part,\nsys.format_bytes(total) AS total,\nsys.format_bytes(used) AS used,\n\
  ROUND(100*used/total, 2) AS UsedPct\nFROM ndbinfo.logspaces;\n+---------+----------+--------+----------+------------+----------+---------+\n\
  | node_id | log_type | log_id | log_part | total      | used     | UsedPct |\n+---------+----------+--------+----------+------------+----------+---------+\n\
  |       1 | REDO     |      0 |        0 | 256.00 MiB | 2.00 MiB |    0.78 |\n|\
  \       1 | REDO     |      0 |        1 | 256.00 MiB | 2.00 MiB |    0.78 |\n|\
  \       1 | REDO     |      0 |        2 | 256.00 MiB | 0 bytes  |    0.00 |\n|\
  \       1 | REDO     |      0 |        3 | 256.00 MiB | 0 bytes  |    0.00 |\n|\
  \       1 | DD-UNDO  |     20 |        0 | 16.00 MiB  | 2.05 MiB |   12.80 |\n|\
  \       2 | REDO     |      0 |        0 | 256.00 MiB | 2.00 MiB |    0.78 |\n|\
  \       2 | REDO     |      0 |        1 | 256.00 MiB | 2.00 MiB |    0.78 |\n|\
  \       2 | REDO     |      0 |        2 | 256.00 MiB | 0 bytes  |    0.00 |\n|\
  \       2 | REDO     |      0 |        3 | 256.00 MiB | 0 bytes  |    0.00 |\n|\
  \       2 | DD-UNDO  |     20 |        0 | 16.00 MiB  | 1.95 MiB |   12.17 |\n+---------+----------+--------+----------+------------+----------+---------+\n\
  10 rows in set (0.02 sec)\n```\n**清单 16-14.** 查询 `ndbinfo.logbuffers` 和 `ndbinfo.logspaces`\
  \ 视图\n\n在此示例中，重做日志的使用率不到 1%，但这可能是因为本地检查点刚刚完成。那么在完成之前，使用率是多少呢？将使用率定期记录在带有图表的监控系统中，可以很容易地看出，例如，在本地检查点完成之前，重做日志是否接近占满。随着数据量增长，本地检查点变得越来越大，这个问题可能会发生。\n\
  \n\n##### 配置报告\n\n在 MySQL NDB Cluster 7.4 及更早版本中，查询数据节点配置的唯一方法是使用 `ndb_config` 工具。这是一种繁琐的获取配置值的方式——例如，必须知道选项名称的确切拼写。回顾第\
  \ 10 章中关于 `ndb_config` 的用法，要使用 `ndb_config` 从两个数据节点分别获取 `DataMemory` 的值，必须进行两次请求。例如：\n\
  \n```shell\nshell$ ndb_config --type=ndbd --fields=': ' --rows='\\n' \\\n--query=NodeId,DataMemory\
  \ \\\n--config-from-node=1 --nodeid=1\n1: 41943040\nshell$ ndb_config --type=ndbd\
  \ --fields=': ' --rows='\\n' \\\n--query=NodeId,DataMemory \\\n--config-from-node=2\
  \ --nodeid=2\n2: 41943040\n```\n\n使用 `ndb_config` 获取关于选项的信息则更加困难。为此，可以使用 `--config-info`\
  \ 选项。但是，没有过滤选项，因此总是会返回所有选项的信息：\n\n```shell\nshell$ ndb_config –configinfo\n...\n\
  IndexMemory (非负整数)\n每个 ndbd (DB) 节点上分配用于存储索引的字节数\n默认值: 18874368 (最小值: 1048576, 最大值:\
  \ 1099511627776)\nDataMemory (非负整数)\n每个 ndbd (DB) 节点上分配用于存储数据的字节数\n默认值: 83886080\
  \ (最小值: 1048576, 最大值: 1099511627776)\nUndoIndexBuffer (非负整数)\n每个 ndbd (DB) 节点上分配用于写入索引部分\
  \ UNDO 日志的字节数\n默认值: 2097152 (最小值: 1048576, 最大值: 4294967039)\n...\n```\n\n从 MySQL\
  \ NDB Cluster 7.5 开始，你可以使用 `ndbinfo` 模式中的 `config_params` 和 `config_values` 视图。\n\
  \n`config_params` 视图包含有关配置选项的信息，包括描述、数据类型、默认值、最小值和最大值，以及该选项是否为必填项。例如，对于 `DataMemory`\
  \ 参数：\n\n```sql\nmysql> SELECT *\nFROM ndbinfo.config_params\nWHERE param_name =\
  \ 'DataMemory'\\G\n*************************** 1. row ***************************\n\
  param_number: 112\nparam_name: DataMemory\nparam_description: 每个 ndbd(DB) 节点上分配用于存储数据的字节数\n\
  param_type: unsigned\nparam_default: 83886080\nparam_min: 1048576\nparam_max: 1099511627776\n\
  param_mandatory: 0\nparam_status:\n1 row in set (0.01 sec)\n```\n\n旧版本的 MySQL NDB\
  \ Cluster 中也存在 `config_params` 视图，但它只包含 `param_number` 和 `param_name` 列。\n\n能够查询配置选项的信息固然不错，但与\
  \ `param_values` 视图进行连接才是真正有趣的地方。清单 16-15 展示了如何获取单个配置选项 `DataMemory` 的值。\n\n```sql\n\
  mysql> SELECT v.node_id, p.param_name, v.config_value, p.param_default,\nIF(v.config_value\
  \ = p.param_default, 'YES', 'NO') AS IsDefault\nFROM ndbinfo.config_params p\nINNER\
  \ JOIN ndbinfo.config_values v\nON v.config_param = p.param_number\nWHERE p.param_name\
  \ = 'DataMemory';\n+---------+------------+--------------+---------------+-----------+\n\
  | node_id | param_name | config_value | param_default | IsDefault |\n+---------+------------+--------------+---------------+-----------+\n\
  |       1 | DataMemory | 41943040     | 83886080      | NO        |\n|       2 |\
  \ DataMemory | 41943040     | 83886080      | NO        |\n+---------+------------+--------------+---------------+-----------+\n\
  2 rows in set (0.02 sec)\n```\n**清单 16-15. DataMemory 选项的配置信息**\n\n通过将实际值（`config_value`\
  \ 列）与默认值（`param_default` 列）进行比较，可以确定该选项是否正在使用默认值。清单 16-16 使用此方法返回一个报告，其中包含所有设置为非默认值的配置选项。\n\
  \n```sql\nmysql> SELECT v.node_id, p.param_name, v.config_value\nFROM ndbinfo.config_params\
  \ p\nINNER JOIN ndbinfo.config_values v\nON v.config_param = p.param_number\nWHERE\
  \ v.config_value <> p.param_default;\n+---------+-------------------------------+-------------------------+\n\
  | node_id | param_name                    | config_value            |\n+---------+-------------------------------+-------------------------+\n\
  |       1 | NodeId                        | 1                       |\n|       1\
