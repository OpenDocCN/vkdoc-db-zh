  42 rows in set (0.00 sec)\n```\n清单 15-8. 性能模式变量\n\n前面讨论的事件使用者与事件表紧密相关，事件表是接下来要查看的下一组性能模式表。\n\
  \n##### 事件表\n\n事件表与事件使用者直接相关，每个事件使用者对应一个事件表。有四种事件类型，每种都有三个作用域。本节将讨论这一点以及事件类型之间的关系。\n\
  \n表 15-6 展示了 MySQL NDB Cluster 7.5 中可用的 12 个事件表。表名遵循 `events_{type}_{scope}` 的模式。类型是\
  \ `stages`、`statements`、`transactions` 或 `waits` 之一，作用域是 `current`、`history` 或 `history_long`。\n\
  \n**表 15-6. 性能模式事件表**\n\n| 表名 | 描述 |\n| --- | --- |\n| `events_stages_current` |\
  \ 每个现有线程的当前或最新阶段事件。 |\n| `events_stages_history` | 每个现有线程的最后 10 个阶段事件。 |\n| `events_stages_history_long`\
  \ | SQL 节点的最后 10000 个阶段事件。 |\n| `events_statements_current` | 每个现有线程的当前或最新语句。 |\n\
  | `events_statements_history` | 每个现有线程的最后 10 条语句。 |\n| `events_statements_history_long`\
  \ | SQL 节点的最后 10000 条语句。 |\n| `events_transactions_current` | 每个现有线程的当前或最新事务。 |\n\
  | `events_transactions_history` | 每个现有线程的最后 10 个事务。 |\n| `events_transactions_history_long`\
  \ | SQL 节点的最后 10000 个事务。 |\n| `events_waits_current` | 每个现有线程的当前或最新等待事件。 |\n| `events_waits_history`\
  \ | 每个现有线程的最后 10 个等待事件。 |\n| `events_waits_history_long` | SQL 节点的最后 10000 个等待事件。\
  \ |\n\n对于 `events` 使用者，`current` 使用者监控当前或最后一个事件。`history` 使用者为每个连接保留最后 10 个（默认）事件，但当连接断开时数据会被清除。另一方面，`history_long`\
  \ 使用者默认保留最后 10000 个事件，与连接无关，并且在连接断开时事件会持久保留；当所有事件用完时，最旧的事件会被清除。\n\n事件类型总结在表 15-7\
  \ 中，它们之间的关系如图 15-2 所示。事务是最高层级，包含一个或多个语句。语句在执行过程中经历各个阶段。最底层是等待事件，它们是低级别的交互，如 I/O\
  \ 或互斥锁等待。除了二进制日志等的 I/O 等待外，由于查询的大部分工作在数据节点上执行，等待事件对于集群中的 SQL 节点来说不是很有趣。事件表中可用的列仅取决于事件类型，例如\
  \ `events_statements_current`、`events_statements_history` 和 `events_statements_history_long`\
  \ 都具有相同的列。\n\n![A435171_1_En_15_Fig2_HTML.jpg](img/A435171_1_En_15_Fig2_HTML.jpg)\n\
  图 15-2. 事件类型之间的关系\n\n**表 15-7. 按详细程度递增顺序排列的性能模式事件类型**\n\n\n##### MySQL 性能模式 事件与作用域\n\
  \n| 事件类型 | 描述 |\n| --- | --- |\n| 事务 | 最高级别（细节最少）。包含诸如请求的事务隔离级别（但不一定是实际使用的事务隔离级别，因为\
  \ `NDBCluster` 表始终使用 `READ-COMMITTED`）、事务状态等详细信息。此事件类型在 MySQL NDB Cluster 7.5 中添加。默认情况下，未启用任何事务事件的作用域。\
  \ |\n| 语句 | 这是最常用的事件类型。它记录每条语句的数据。包含大量有用的信息，例如持续时间；检查、返回和影响了多少行；是否使用了内部临时表；是否使用了索引；等等。在\
  \ 7.3 及更高版本中，默认启用当前作用域；在 7.5 版本中，历史作用域也被默认启用。 |\n| 阶段 | 这大致对应于 `SHOW PROCESSLIST`\
  \ 报告的状态。这些默认不启用。 |\n| 等待 | 最低级别（细节最多）。等待事件例如包括 I/O 和等待互斥锁。这些非常具体，对于底层性能调优非常有用，但也是开销最大的。默认情况下，未启用任何等待事件消费者。\
  \ |\n\n事件作用域指定保留多少以及哪些记录。收集历史作用域数据的一个先决条件是当前作用域也被收集。历史数据可以按连接（history）或按 SQL 节点（history\
  \ long）收集。当前事件始终是按连接的，尽管在某些情况下一个连接可能有多个事件。一旦连接关闭，当前和历史事件就会被清除。三种作用域总结在表 15-8 中。\n\
  \n表 15-8. 性能模式事件作用域\n\n| 事件作用域 | 描述 |\n| --- | --- |\n| 当前 | 当前正在进行的事件。如果一个连接当前没有正在进行的事件，则返回最后一个事件。对于语句事件，当前作用域类似于\
  \ `SHOW PROCESSLIST`，但包括当前空闲连接的最后执行语句。`sys` 模式利用此功能提供了更详细的进程列表，如下一节所示。当前作用域仅包含查询事件时存在的线程。\
  \ |\n| 历史 | 为每个连接和后台线程保留最近 10 个（默认）事件。这对于较高级别的事件类型最有用，因为较低级别的事件通常持续时间很短，以至于 10 个事件仅代表最后几分之一秒。历史作用域仅包含查询事件时存在的线程。每个线程存储的事件数量可以通过\
  \ MySQL 配置文件中的以下选项更改：`performance_schema_events_transactions_history_size`、`performance_schema_events_statements_history_size`、`performance_schema_events_stages_history_size`\
  \ 和 `performance_schema_events_waits_history_size`。 |\n| 长历史 | 保留最后 10000 个（默认）事件，而不考虑触发事件的线程。即使线程关闭，长历史作用域中的事件也会被保留。这使得\
  \ `events_%_history_long` 表对于检查所有连接的最近历史非常有用。要存储的事件数量可以使用 MySQL 配置文件中的以下选项更改：`performance_schema_events_transactions_history_long_size`、`performance_schema_events_statements_history_long_size`、`performance_schema_events_stages_history_long_size`\
  \ 和 `performance_schema_events_waits_history_long_size`。 |\n\n一个事件可以是另一个事件的父事件。因此，每个事件表都有两列，本质上是定义指向其他表中某个事件的（虚拟）外键：\n\
  *   `NESTING_EVENT_ID`：父事件的事件 ID。\n*   `NESTING_EVENT_TYPE`：父 ID 是事务、语句、阶段还是等待事件。\n\
  \n由于通常并非所有事件都被捕获，并且事件可能不会按照捕获的顺序被清除，因此这种关系并不完整。然而，在大多数情况下这不是问题。\n\n使用嵌套列的一个简单示例是查找事务中执行的语句。清单\
  \ 15-9 展示了如何查找 `THREAD_ID = 35` 的当前或最后一个事务中最多最后 10 条语句，并按执行顺序（最旧的在前，最新的在最后）返回查询。此示例需要启用\
  \ `events_transactions_current` 消费者和 `transaction`  instruments。`events_statements_%`\
  \ 表的细节以及性能模式中的计时值稍后讨论。\n\n```sql\nmysql> SELECT s.EVENT_ID, s.SQL_TEXT,\n    sys.format_time(s.TIMER_WAIT)\
  \ AS QueryTime\n    FROM performance_schema.events_transactions_current t\n    INNER\
  \ JOIN performance_schema.events_statements_history s\n    ON s.NESTING_EVENT_ID\
  \ = t.EVENT_ID\n    WHERE t.THREAD_ID = 35\n    AND s.NESTING_EVENT_TYPE = 'transaction'\n\
  \    ORDER BY s.EVENT_ID\\G\n*************************** 1. row ***************************\n\
  EVENT_ID: 202\nSQL_TEXT: UPDATE queue SET status = 1, locked_by = 23 WHERE status\
  \ = 0 AND locked_by IS NULL LIMIT 1\nQueryTime: 3.30 毫秒\n***************************\
  \ 2. row ***************************\nEVENT_ID: 203\nSQL_TEXT: SELECT id, val FROM\
  \ queue WHERE locked_by = 23\nQueryTime: 1.08 毫秒\n*************************** 3.\
  \ row ***************************\nEVENT_ID: 204\nSQL_TEXT: UPDATE queue SET status\
  \ = 2, locked_by = NULL WHERE locked_by = 23\nQueryTime: 2.60 毫秒\n***************************\
  \ 4. row ***************************\nEVENT_ID: 205\nSQL_TEXT: COMMIT\nQueryTime:\
  \ 966.89 微秒\n4 rows in set (0.00 sec)\n```\n清单 15-9. 查找事务中的最新语句\n\n通常，嵌套层级可能更深。以下设置了一个测试，然后执行一个事务，该事务调用存储过程来添加员工，最后提交事务。在事务执行的同时，另一个连接使用\
  \ `sys` 模式存储过程 `sys.ps_trace_thread()` 监视事件表（实际上是长历史事件表）。该过程将其输出保存在 DOT 图描述语言文件中（参见\
  \ [`en.wikipedia.org/wiki/DOT_(graph_description_language)`](https://en.wikipedia.org/wiki/DOT_(graph_description_language))\
  \ ），文件名作为参数之一（本例中为 `/mysql/out/trace.dot`）。`sys.ps_trace_thread()` 的参数是：\n*   要监视的线程\
  \ (`28`)。\n*   保存输出到的文件 (`'/mysql/out/trace.dot'`)。\n*   监视多长时间（秒）（`10` 秒）。\n* \
  \  轮询事件表的频率——以秒为单位（`0.1` 秒）。\n*   是否在开始监视前截断性能模式表（`TRUE`）。启用此选项可避免将旧事件包含在跟踪中，但也会丢弃表中的所有现有数据。因此，启用该选项在测试系统中最有用。\n\
  *   是否自动启用性能模式设置（`FALSE`）。启用后，设置将在过程结束时恢复。手动设置性能模式可以更精细地控制跟踪中包含的内容。\n*   是否在跟踪中添加事件的文件名和行号（`FALSE`）。\n\
  \n除了默认设置外，此示例要工作，还必须启用 `events_transactions_current`、`events_transactions_history_long`\
  \ 和 `events_statements_history_long` 消费者以及 `transaction`  instrument。\n\n提示：在最新版本的\
  \ MySQL Server 和 MySQL NDB Cluster 中，只有目标目录在 `secure_file_priv` 选项指定的目录之下，才能从 MySQL\
  \ 内部将数据保存到文件。\n\n测试执行如清单 15-10 所示。\n\n\n##### 测试事务追踪与性能模式事件表\n\n## 清单 15-10. 用于追踪事务的测试\n\
  \n```sql\n-- 设置测试环境\nmysql> CREATE TABLE employee (\nid char(36) PRIMARY KEY,\n\
  Name varchar(40) NOT NULL\n) ENGINE=NDBCluster;\nQuery OK, 0 rows affected (2.46\
  \ sec)\nmysql> DELIMITER $$\nmysql> CREATE PROCEDURE AddEmp(IN in_name varchar(40),\
  \ OUT out_uuid char(36))\nBEGIN\nSET out_uuid = UUID();\nSELECT\nout_uuid AS id;\n\
  INSERT\nINTO\nemployee\nVALUES (out_uuid, in_name);\nEND$$\nQuery OK, 0 rows affected\
  \ (0.01 sec)\nmysql> DELIMITER ;\n-- 启用消费者和仪器\nmysql> UPDATE performance_schema.setup_consumers\n\
  SET ENABLED = 'YES'\nWHERE NAME IN ('events_transactions_current',\n'events_transactions_history_long',\n\
  'events_statements_history_long');\nQuery OK, 3 rows affected (0.00 sec)\nRows matched:\
  \ 3  Changed: 3  Warnings: 0\nmysql> UPDATE performance_schema.setup_instruments\n\
  SET ENABLED = 'YES',\nTIMED = 'YES'\nWHERE NAME = 'transaction';\nQuery OK, 1 row\
  \ affected (0.00 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n-- 确定性能模式线程 ID\n\
  mysql> SELECT sys.ps_thread_id(NULL);\n+------------------------+\n| sys.ps_thread_id(NULL)\
  \ |\n+------------------------+\n|                     28 |\n+------------------------+\n\
  1 row in set (0.01 sec)\n-- 在另一个连接中使用上一条语句的线程 ID 开始数据收集。\nOther Connection> CALL\
  \ sys.ps_trace_thread(28, '/mysql/out/trace.dot',\n10, 0.1, TRUE, FALSE, FALSE);\n\
  -- 在性能模式线程 ID = 28 的连接中执行测试\nmysql> BEGIN;\nQuery OK, 0 rows affected (0.00 sec)\n\
  mysql> CALL AddEmp\n('John Doe', @id);\n+--------------------------------------+\n\
  | id                                   |\n+--------------------------------------+\n\
  | 17ecdc78-5265-11e7-a0a3-080027fa42a9 |\n+--------------------------------------+\n\
  1 row in set (0.00 sec)\nQuery OK, 1 row affected (0.00 sec)\nmysql> COMMIT;\nQuery\
  \ OK, 0 rows affected (0.00 sec)\n-- 可选：将性能模式设置重置为默认值。\nmysql> CALL sys.ps_setup_reset_to_default(FALSE);\n\
  Query OK, 0 rows affected (0.07 sec)\n```\n\n##### 转换 DOT 文件\n\nDOT 格式的文件可以使用 Graphviz\
  \ 工具集中的`dot`程序等软件转换为图形表示 ([`www.graphviz.org/`](http://www.graphviz.org/))。Graphviz\
  \ 可从多个 Linux 软件包仓库获取，也可以从其主页下载适用于 Linux、Oracle Solaris、Microsoft Windows 和 macOS\
  \ 的版本。将 DOT 文件转换为 PNG 文件的示例如下：\n\n```shell\ndot -Tpng -o trace.png /mysql/out/trace.dot\n\
  ```\n\n## 图 15-3. 嵌套事件的追踪\n\n图 15-3 显示了生成的图表。为了使数据更易于阅读，进行了两项修改：图表被裁剪，只显示最左侧带有`BEGIN`语句的方框边缘；颜色方案也进行了更改，以便在黑白书籍中更好地显示。\n\
  \n![A435171_1_En_15_Fig3_HTML.jpg](img/A435171_1_En_15_Fig3_HTML.jpg)\n\n### 从图\
  \ 15-3 中的观察结果\n\n*   每个事件的详细信息都包含在一个方框中，每个事件一个方框。对于`BEGIN`语句，所有指标要么是`0`，要么是`FALSE`。\n\
  *   追踪包含一个事务（第二列，深灰色）和四个层级中的六条语句。\n*   事务事件包含诸如是否使用 GTID（NDB Cluster 不支持）、状态（`COMMITTED`）、事务隔离模式等信息。请注意，事务隔离级别被列为`REPEATABLE\
  \ READ`，这是请求的级别（因为它是默认值）。但是，MySQL NDB Cluster 只支持`READ COMMITTED`。因此，对于 MySQL NDB\
  \ Cluster，列出的和实际的事务隔离级别可能不同。\n*   执行事务所花费的总时间是 7.02 毫秒。\n*   事务的父节点是`BEGIN`语句。事务本身又是两条语句的父节点，其中`CALL`语句又是另外三条语句的父节点。\n\
  *   对于除了存储过程内部`SET`语句外的每条语句，都有一个很长的详细信息列表。其中包括执行时间（`SET`语句也包含此项）、是否发生错误或警告、受影响/发送/检查的行数、索引使用情况等。\n\
  *   语句的事件（参见事件耗时旁边的字符串，例如`CALL`语句的`sql/call_procedure`）在语句是直接执行还是通过存储过程执行时有所不同。直接执行的语句事件以`sql/`开头，而通过过程执行的语句事件以`sp/`开头。\n\
  \n图 15-3 中所有细节的唯一来源是事件表，这显示了它们在收集信息方面是多么有用。\n\n##### 关于事件表的总结\n\n虽然表的数量和数据量起初可能看起来很庞大，但显示类似数据的表之间存在高度的相似性，表和列的名称也相当一致。例如，所有事件表都有相似的列来在较高层面上描述事件，然后根据它是等待、阶段、语句还是事务事件来包含特定的列。同一事件类型的`current`、`history`和`history\
  \ long`表都具有相同的列。某一事件类型的汇总表将包含易于与每事件表关联的列。下一个示例将使用`events_statements_current`表来说明如何读取原始数据。\n\
  \n清单 15-11 显示了从`events_statements_current`表中获取线程 ID 为 31 的最近一次查询的原始输出示例。其细节与在追踪图中看到的相似，但有几点值得进一步考虑。\n\
  \n\n\n`TIMER_START`、`TIMER_END`、`TIMER_WAIT` 和 `LOCK_TIME` 的值都非常大。性能模式中的所有计时单位都是皮秒\
  \ (10^(-12) 秒)。选择这个单位的原因是为了性能（它确保不需要除法运算，而除法在计算上比乘法更昂贵）。当软件使用这些计时值时，这个单位选择不是问题，但它使得人类难以阅读这些值。`sys`\
  \ 模式包含几个格式化函数，其中之一是 `format_time()`。这个函数可用于将皮秒转换为人类可读的单位：\n\n```\nmysql> SELECT\
  \ EVENT_ID, sys.format_time(TIMER_START) AS TimeStart,\nsys.format_time(TIMER_END)\
  \ AS TimeEnd,\nsys.format_time(TIMER_WAIT) AS TimeWait,\nsys.format_time(LOCK_TIME)\
  \ AS LockTime\nFROM performance_schema.events_statements_current\nWHERE THREAD_ID\
  \ = 31;\n+----------+-----------+---------+----------+-----------+\n| EVENT_ID |\
  \ TimeStart | TimeEnd | TimeWait | LockTime  |\n+----------+-----------+---------+----------+-----------+\n\
  |       35 | 1.95 h    | 1.95 h  | 1.85 ms  | 224.00 us |\n+----------+-----------+---------+----------+-----------+\n\
  1 row in set (0.00 sec)\n```\n\n这四个时间值的含义如下：\n\n*   `TimeStart`：从计时器上次重置到事件开始所经过的时间（以小时为单位）。重置发生在\
  \ MySQL 重启时或计时器溢出时（溢出发生在 2⁶⁴ 皮秒后，大约是 30.5 周）。\n*   `TimeEnd`：从计时器上次重置到事件结束所经过的时间（以小时为单位）。\n\
  *   `TimeWait`：事件的总持续时间（以毫秒为单位）。这与 `TIMER_END` 和 `TIMER_START` 的差值相同。\n*   `LockTime`：等待表锁所花费的时间（以微秒为单位）。对于\
  \ `NDBCluster` 表，这个值不太有用，因为它们使用行级锁。\n\n由于不同的事件使用不同的计时器（如 `setup_timers` 表的描述中所述），通常不能比较不同事件的\
  \ `TIMER_START` 和 `TIMER_END` 值。而应始终使用 `EVENT_ID` 列来比较事件的顺序。\n\n另一个有趣的细节是 `DIGEST`\
  \ 和 `DIGEST_TEXT` 列：\n\n```\nSQL_TEXT: SELECT * FROM world.City WHERE CountryCode\
  \ = 'AUS' ORDER BY Population DESC\nDIGEST: d21ff2e30ed268303522831878e8e1d6\nDIGEST_TEXT:\
  \ SELECT * FROM `world` . `City` WHERE `CountryCode` = ? ORDER BY `Population` DESC\n\
  ```\n\n`DIGEST_TEXT` 列是查询的规范化版本。性能模式对查询的规范化类似于 `mysqldumpslow` 脚本对慢查询日志所做的操作，以便对除参数外相同的查询进行分组。在示例中，`CountryCode`\
  \ 的值被替换为一个问号 (?)，因此如果该查询针对不同的国家重复执行，摘要文本将是相同的：\n\n```\nSQL_TEXT: SELECT * FROM world.City\
  \ WHERE CountryCode = 'USA' ORDER BY Population DESC\nDIGEST: d21ff2e30ed268303522831878e8e1d6\n\
  DIGEST_TEXT: SELECT * FROM `world` . `City` WHERE `CountryCode` = ? ORDER BY `Population`\
  \ DESC\n```\n\n`DIGEST` 是一个基于规范化查询的 MD5 哈希值（尽管不像 `MD5(DIGEST_TEXT)` 那么简单）。拥有摘要哈希使得查询相似的查询变得更加简单。例如：\n\
  \n```\nmysql> SELECT sys.format_time(TIMER_WAIT) AS TimeWait,\nCONCAT(LEFT(SQL_TEXT,\
  \ 56), ' ...') AS 'SQL'\nFROM performance_schema.events_statements_history\nWHERE\
  \ DIGEST = 'd21ff2e30ed268303522831878e8e1d6';\n+----------+--------------------------------------------------------------+\n\
  | TimeWait | SQL                                                          |\n+----------+--------------------------------------------------------------+\n\
  | 1.85 ms  | SELECT * FROM world.City WHERE CountryCode = 'AUS' ORDER ... |\n| 1.61\
  \ ms  | SELECT * FROM world.City WHERE CountryCode = 'USA' ORDER ... |\n+----------+--------------------------------------------------------------+\n\
  2 rows in set (0.00 sec)\n```\n\n然而，摘要的作用甚至比这更大。它们在性能模式内部也用于生成 SQL 节点上查询的摘要。摘要表是接下来要查看的下一组表。\n\
  \n\n\n#### 汇总表\n\n上一节的主题——事件表，包含的是原始数据。这对于检查特定事件（例如某个慢查询）非常有用。然而，特别是在每秒查询数很高的 SQL\
  \ 节点上，由于事件被清除得太快，事件表并不总是那么实用。这时，汇总表就派上用场了。\n\nMySQL NDB Cluster 7.5 包含 36 个汇总表，如表\
  \ 15-9 至表 15-14 所示。命名约定是 `{what}_summary_by_{group by}`，其中 `{what}` 表示所汇总的数据，`{group\
  \ by}` 表示数据的分组依据。对于某些汇总表，会重复使用 \"`by_{group by}`\" 模式，以表示数据按多个维度分组。对于某些汇总表，还会在 \"\
  `summary_`\" 后添加 \"`global_`\"，以明确表示只有一个分组级别。\n\n表 15-9 显示了阶段事件的汇总表。由于大多数阶段事件默认是禁用的，因此这些表中的大多数汇总值都为\
  \ 0。\n\n表 15-9. 阶段事件汇总表\n\n| 表名 | 描述 |\n| --- | --- |\n| `events_stages_summary_by_account_by_event_name`\
  \ | 按账号和事件名分组的阶段。 |\n| `events_stages_summary_by_host_by_event_name` | 按主机和事件名分组的阶段。\
  \ |\n| `events_stages_summary_by_thread_by_event_name` | 按线程和事件名分组的阶段。 |\n| `events_stages_summary_by_user_by_event_name`\
  \ | 按用户和事件名分组的阶段。 |\n| `events_stages_summary_global_by_event_name` | 仅按事件名分组的阶段。\
  \ |\n\n表 15-10 中列出的语句事件汇总表是最常用的汇总表。表 15-14 之后讨论了一个使用 `events_statements_summary_by_digest`\
  \ 表的示例。\n\n表 15-10. 语句事件汇总表\n\n| 表名 | 描述 |\n| --- | --- |\n| `events_statements_summary_by_account_by_event_name`\
  \ | 按账号和事件名分组的语句。 |\n| `events_statements_summary_by_digest` | 按摘要分组的语句。 |\n| `events_statements_summary_by_host_by_event_name`\
  \ | 按主机和事件名分组的语句。 |\n| `events_statements_summary_by_program` | 按存储过程、存储函数、存储事件或触发器分组的语句。\
  \ |\n| `events_statements_summary_by_thread_by_event_name` | 按线程和事件名分组的语句。 |\n|\
  \ `events_statements_summary_by_user_by_event_name` | 按用户和事件名分组的语句。 |\n| `events_statements_summary_global_by_event_name`\
  \ | 仅按事件名分组的语句。 |\n\n表 15-11 列出了事务事件汇总表。默认情况下，事务不会被插桩，因此汇总数据将全部为零。\n\n表 15-11. 事务事件汇总表\n\
  \n| 表名 | 描述 |\n| --- | --- |\n| `events_transactions_summary_by_account_by_event_name`\
  \ | 按账号和事件名分组的事务。 |\n| `events_transactions_summary_by_host_by_event_name` | 按主机和事件名分组的事务。\
  \ |\n| `events_transactions_summary_by_thread_by_event_name` | 按线程和事件名分组的事务。 |\n\
  | `events_transactions_summary_by_user_by_event_name` | 按用户和事件名分组的事务。 |\n| `events_transactions_summary_global_by_event_name`\
  \ | 仅按事件名分组的事务。 |\n\n最后一类事件汇总表是等待事件。表 15-12 对其进行了汇总。\n\n表 15-12. 等待事件汇总表\n\n| 表名\
  \ | 描述 |\n| --- | --- |\n| `events_waits_summary_by_account_by_event_name` | 按账号和事件名分组的等待事件。\
  \ |\n| `events_waits_summary_by_host_by_event_name` | 按主机和事件名分组的等待事件。 |\n| `events_waits_summary_by_instance`\
  \ | 按实例分组的等待事件。参见后面的实例表。 |\n| `events_waits_summary_by_thread_by_event_name` | 按线程和事件名分组的等待事件。\
  \ |\n| `events_waits_summary_by_user_by_event_name` | 按用户和事件名分组的等待事件。 |\n| `events_waits_summary_global_by_event_name`\
  \ | 仅按事件名分组的等待事件。 |\n\n表 15-13 显示了内存汇总表。默认情况下，仅对性能模式内存事件启用了内存插桩，因此默认情况下，这些汇总表中只有这些事件的数据是非零的。如果已为所有内存事件启用了插桩，这些汇总表对于确定\
  \ SQL 节点的内存使用情况非常有用。\n\n表 15-13. 内存汇总表\n\n| 表名 | 描述 |\n| --- | --- |\n| `memory_summary_by_account_by_event_name`\
  \ | 按账号和事件名分组的内存使用情况。 |\n| `memory_summary_by_host_by_event_name` | 按主机和事件名分组的内存使用情况。\
  \ |\n| `memory_summary_by_thread_by_event_name` | 按线程和事件名分组的内存使用情况。 |\n| `memory_summary_by_user_by_event_name`\
  \ | 按用户和事件名分组的内存使用情况。 |\n| `memory_summary_global_by_event_name` | 仅按事件名分组的内存使用情况。\
  \ |\n\n最后一组汇总表用于文件、对象、套接字和表。表 15-14 对其进行了汇总。\n\n表 15-14. 文件、对象、套接字和表的汇总表\n\n| 表名\
  \ | 描述 |\n| --- | --- |\n| `file_summary_by_event_name` | 按事件名分组的文件。包括 I/O 延迟以及读写的数据量。\
  \ |\n| `file_summary_by_instance` | 按文件实例和事件名分组的文件。包括 I/O 延迟以及读写的数据量。 |\n| `objects_summary_global_by_type`\
  \ | 表、存储过程、存储函数、存储事件和触发器的使用次数以及在其中花费的时间。 |\n| `socket_summary_by_event_name` | 基于连接类型（TCP/IP、UNIX\
  \ 套接字等）的统计信息。 |\n| `socket_summary_by_instance` | 按套接字实例分组的统计信息。 |\n| `table_io_waits_summary_by_index_usage`\
  \ | 按索引分组的表 I/O 等待事件。 |\n| `table_io_waits_summary_by_table` | 按表分组的表 I/O 等待事件。\
  \ |\n| `table_lock_waits_summary_by_table` | 按表分组的表锁等待事件。 |\n\n汇总表本质上就是独立的报告，这使得它们对于调查问题非常有用。其中一个特别值得更详细考虑的汇总表是\
  \ `events_statements_summary_by_digest` 表。该表使用上一节讨论的摘要来对语句事件进行分组。统计数据会按默认模式库和摘要的组合进行聚合（以便区分对两个不同模式库执行的相同查询）。其结果类似于慢查询日志上\
  \ `mysqldumpslow` 脚本生成的报告，但它会自动为所有已插桩的查询保持更新，并且可以使用 `SELECT` 语句进行访问，这使得根据需要过滤和排序数据变得非常容易。\n\
  \n默认情况下，`events_statements_summary_by_digest` 表可以容纳 10000 个默认模式库和摘要的组合。可以使用 `performance_schema_digests_size`\
  \ 选项更改其大小（需要重启 SQL 节点）。当表中的最后一个可用行被使用后，默认模式库和摘要都将被设置为 `NULL`，所有与现有行不匹配的查询都将合并到此\
  \ `NULL` 行中。\n\n注意\n\n\n\n`events_statements_summary_by_digest` 表也是 MySQL 企业监视器查询分析器的默认数据源。\n\
  \n举个例子，假设需要查找执行最频繁的查询。清单 15-12 给出了一个这样的示例，其要求是查询必须至少执行了 500 次。\n\n```\nmysql> SELECT\
  \ SCHEMA_NAME, DIGEST, DIGEST_TEXT, COUNT_STAR,\nsys.format_time(SUM_TIMER_WAIT)\
  \ AS TotalTime,\nsys.format_time(AVG_TIMER_WAIT) AS AvgTime,\nSUM_ROWS_AFFECTED,\
  \ SUM_ROWS_SENT, SUM_ROWS_EXAMINED\nFROM performance_schema.events_statements_summary_by_digest\n\
  WHERE COUNT_STAR >= 500\nORDER BY COUNT_STAR DESC\\G\n***************************\
  \ 1. row ***************************\nSCHEMA_NAME: world\nDIGEST: 127979ff01aa4392cc363ae5c71177d5\n\
  DIGEST_TEXT: SELECT * FROM `City` WHERE `ID` = ?\nCOUNT_STAR: 1000\nTotalTime: 552.40\
  \ ms\nAvgTime: 552.40 us\nSUM_ROWS_AFFECTED: 0\nSUM_ROWS_SENT: 1000\nSUM_ROWS_EXAMINED:\
  \ 1000\n*************************** 2. row ***************************\nSCHEMA_NAME:\
  \ world\nDIGEST: 22a2a36f23374320e7a9739086957192\nDIGEST_TEXT: UPDATE `City` SET\
  \ `Population` = `Population` + ? WHERE `ID` = ?\nCOUNT_STAR: 1000\nTotalTime: 1.62\
  \ s\nAvgTime: 1.62 ms\nSUM_ROWS_AFFECTED: 1000\nSUM_ROWS_SENT: 0\nSUM_ROWS_EXAMINED:\
  \ 1000\n2 rows in set (0.00 sec)\n```\n\n清单 15-12. 至少执行 500 次的查询摘要\n\n输出显示，对于这两条语句，`SUM_ROWS_EXAMINED`（检查的总行数）与\
  \ `COUNT_STAR`（执行总次数）相同，因此平均每次执行只需检查一行。这是最好的情况（源于使用主键来定位行）。\n\n另一个非常有用的摘要表是 `table_io_waits_summary_by_index_usage`\
  \ 表。它可用于检查索引是否被使用。未使用的索引会在存储和性能方面带来开销。因此，监控索引是否被使用很有用，如果未被使用，则可研究是否可以将其移除。关于检查未使用索引的示例，请参阅下一节关于\
  \ `sys` 模式的内容，其中包含 `sys.schema_index_statistics` 视图的示例。\n\n`table_io_waits_summary_by_index_usage`\
  \ 表也可用于查找通过表扫描找到大量行的表。这通过将 `INDEX_NAME` 过滤条件设置为 `NULL` 来实现。此示例也将在讨论 `sys` 模式时提供——参见下一节中\
  \ `sys.schema_tables_with_full_table_scans` 视图的示例。\n\n接下来要考虑的下一组表是连接和线程表。\n\n####\
  \ 连接和线程表\n\n连接和线程表提供了对连接到 SQL 节点的统计信息和元数据以及存在的线程的访问。总共有七个表，全部列在表 15-15 中。\n\n表 15-15.\
  \ 性能模式连接表\n\n| 表名 | 描述 |\n| --- | --- |\n| `accounts` | 按用户名和主机名分组的当前和总线程数。 |\n\
  | `host_cache` | 来自非环回接口的 TCP/IP 连接的详细信息。 |\n| `hosts` | 按主机名分组的当前和总线程数。 |\n| `session_account_connect_attrs`\
  \ | 查询该表的相同帐户的会话属性。 |\n| `session_connect_attrs` | 所有连接的会话属性。 |\n| `threads` | 所有线程的详细信息，包括与进程列表类似的信息。\
  \ |\n| `users` | 按用户名分组的当前和总线程数。 |\n\n对于一般用途，`threads` 表是最有用的。之前就是用这个表来将连接 ID 与性能模式线程\
  \ ID 关联起来，并显示前台和后台线程都已被检测。它包含每个线程的各种元数据，以及对于用户连接，包含与进程列表相同的信息。清单 15-13 显示了一个用户连接的示例。\n\
  \n```\nmysql> SELECT * FROM performance_schema.threads WHERE THREAD_ID = 12595\\\
  G\n*************************** 1. row ***************************\nTHREAD_ID: 12595\n\
  NAME: thread/sql/one_connection\nTYPE: FOREGROUND\nPROCESSLIST_ID: 12572\nPROCESSLIST_USER:\
  \ app_user\nPROCESSLIST_HOST: ol7\nPROCESSLIST_DB: db1\nPROCESSLIST_COMMAND: Query\n\
  PROCESSLIST_TIME: 12\nPROCESSLIST_STATE: Sending data\nPROCESSLIST_INFO: SELECT\
  \ * FROM t1 INNER JOIN t2 USING (val)\nPARENT_THREAD_ID: NULL\nROLE: NULL\nINSTRUMENTED:\
  \ YES\nHISTORY: YES\nCONNECTION_TYPE: TCP/IP\nTHREAD_OS_ID: 14131\n1 row in set\
  \ (0.00 sec)\n```\n\n清单 15-13. `performance_schema.threads` 表\n\n与 `SHOW PROCESSLIST`\
  \ 语句或 `information_schema.PROCESSLIST` 表相比，更推荐使用 `threads` 表，因为后者需要一个对执行中的查询的互斥锁来生成进程列表。需要该互斥锁是因为\
  \ `SHOW PROCESSLIST` 和对 `information_schema.PROCESSLIST` 的查询需要从每个线程获取状态。性能模式的工作方式相反：线程在状态更改时更新性能模式，因此只需对\
  \ `threads` 表加一个表锁就足以获得一致的结果。此外，`threads` 表提供更多详细信息，并且可以与 `events_statements_current`\
  \ 表联接，以提供更多信息，包括执行时间的亚秒级精度。下一节将讨论的 `sys` 模式视图 `processlist` 和 `session` 将提供这方面的示例。\n\
  \n`accounts`、`hosts` 和 `users` 表都显示当前线程数和总线程数，但分别按帐户、主机和用户分组。清单 15-14 显示了这方面的示例。`NULL`\
  \ 用户和主机对应于后台线程和系统用户。请注意，列名使用了 `\"connection\"` 一词，但实际上它们指的是线程。\n\n\n##### 使用 `performance_schema`\
  \ 中的连接相关表\n\n```sql\nmysql> SELECT * FROM performance_schema.accounts;\n+----------+-----------+---------------------+-------------------+\n\
  | USER     | HOST      | CURRENT_CONNECTIONS | TOTAL_CONNECTIONS |\n+----------+-----------+---------------------+-------------------+\n\
  | NULL     | NULL      |                  25 |             12952 |\n| root     |\
  \ localhost |                   2 |                21 |\n| app_user | ol7      \
  \ |                   1 |               254 |\n+----------+-----------+---------------------+-------------------+\n\
  3 rows in set (0.00 sec)\n\nmysql> SELECT * FROM performance_schema.hosts;\n+-----------+---------------------+-------------------+\n\
  | HOST      | CURRENT_CONNECTIONS | TOTAL_CONNECTIONS |\n+-----------+---------------------+-------------------+\n\
  | NULL      |                  25 |             12956 |\n| localhost |         \
  \          2 |                21 |\n| ol7       |                   1 |        \
  \       254 |\n+-----------+---------------------+-------------------+\n3 rows in\
  \ set (0.00 sec)\n\nmysql> SELECT * FROM performance_schema.users;\n+----------+---------------------+-------------------+\n\
  | USER     | CURRENT_CONNECTIONS | TOTAL_CONNECTIONS |\n+----------+---------------------+-------------------+\n\
  | NULL     |                  25 |             12962 |\n| root     |           \
  \        2 |                21 |\n| app_user |                   1 |           \
  \    254 |\n+----------+---------------------+-------------------+\n3 rows in set\
  \ (0.00 sec)\n```\n列表 15-14. 获取线程数\n\n##### 使用 `host_cache` 表\n\n`host_cache` 表可用于获取来自非回环接口的\
  \ TCP 连接的详细信息（但不包括 UNIX 套接字连接和 `127.0.0.1` 之类的地址）。列表 15-15 提供了一个示例。这可用于查明连接错误的来源，以及是否有主机因协议握手错误过多而接近被阻止。如果某个主机的\
  \ `SUM_CONNECT_ERRORS` 达到 `max_connect_errors` 配置选项的值，该主机将被阻止。\n\n```sql\nmysql>\
  \ SELECT * FROM host_cache\\G\n*************************** 1. row ***************************\n\
  IP: 192.168.56.101\nHOST: ol7\nHOST_VALIDATED: YES\nSUM_CONNECT_ERRORS: 3\nCOUNT_HOST_BLOCKED_ERRORS:\
  \ 0\nCOUNT_NAMEINFO_TRANSIENT_ERRORS: 0\nCOUNT_NAMEINFO_PERMANENT_ERRORS: 0\nCOUNT_FORMAT_ERRORS:\
  \ 0\nCOUNT_ADDRINFO_TRANSIENT_ERRORS: 0\nCOUNT_ADDRINFO_PERMANENT_ERRORS: 0\nCOUNT_FCRDNS_ERRORS:\
  \ 0\nCOUNT_HOST_ACL_ERRORS: 0\nCOUNT_NO_AUTH_PLUGIN_ERRORS: 0\nCOUNT_AUTH_PLUGIN_ERRORS:\
  \ 0\nCOUNT_HANDSHAKE_ERRORS: 3\nCOUNT_PROXY_USER_ERRORS: 0\nCOUNT_PROXY_USER_ACL_ERRORS:\
  \ 0\nCOUNT_AUTHENTICATION_ERRORS: 8\nCOUNT_SSL_ERRORS: 0\nCOUNT_MAX_USER_CONNECTIONS_ERRORS:\
  \ 0\nCOUNT_MAX_USER_CONNECTIONS_PER_HOUR_ERRORS: 0\nCOUNT_DEFAULT_DATABASE_ERRORS:\
  \ 0\nCOUNT_INIT_CONNECT_ERRORS: 0\nCOUNT_LOCAL_ERRORS: 0\nCOUNT_UNKNOWN_ERRORS:\
  \ 0\nFIRST_SEEN: 2017-06-17 18:58:38\nLAST_SEEN: 2017-06-17 19:03:16\nFIRST_ERROR_SEEN:\
  \ 2017-06-17 18:58:38\nLAST_ERROR_SEEN: 2017-06-17 19:03:17\n1 row in set (0.00\
  \ sec)\n```\n列表 15-15. 主机缓存详细信息\n\n##### 使用会话连接属性表\n\n最后两个表——`session_account_connect_attrs`\
  \ 和 `session_connect_attrs`——都显示用户连接的属性。这些属性由客户端提供，因此可用的属性取决于连接的建立方式。这两个表的区别在于，`session_account_connect_attrs`\
  \ 仅包含与执行查询的连接所属账户相同的连接的属性，而 `session_connect_attrs` 则包含所有账户的属性。通过这种分离，可以将 `session_account_connect_attrs`\
  \ 的 `SELECT` 权限授予应允许检查其自身连接属性的用户，而不显示其他账户的信息。列表 15-16 展示了两个连接属性的示例。\n\n```sql\n\
  mysql> SELECT PROCESSLIST_ID AS ID, ATTR_NAME, ATTR_VALUE, ORDINAL_POSITION\n  \
  \   > FROM session_connect_attrs;\n+-------+------------------+----------------------+------------------+\n\
  | ID    | ATTR_NAME        | ATTR_VALUE           | ORDINAL_POSITION |\n+-------+------------------+----------------------+------------------+\n\
  |     9 | _os              | linux-glibc2.5       |                0 |\n|     9\
  \ | _client_name     | libmysql             |                1 |\n|     9 | _pid\
  \             | 1959                 |                2 |\n|     9 | _client_version\
  \  | 5.7.18-ndb-7.5.6     |                3 |\n|     9 | _platform        | x86_64\
  \               |                4 |\n|     9 | program_name     | mysql       \
  \         |                5 |\n| 26106 | _runtime_version | 1.8.0_111         \
  \   |                0 |\n| 26106 | _client_version  | 5.1.42               |  \
  \              1 |\n| 26106 | _client_name     | MySQL Connector Java |        \
  \        2 |\n| 26106 | _client_license  | GPL                  |              \
  \  3 |\n| 26106 | _runtime_vendor  | Oracle Corporation   |                4 |\n\
  +-------+------------------+----------------------+------------------+\n11 rows\
  \ in set (0.00 sec)\n```\n列表 15-16. 会话属性\n\n连接 ID 为 9 的连接正在使用 `mysql` 命令行客户端（版本\
  \ `5.7.18-ndb-7.5.6`）从 Linux 系统连接。而连接 ID `26106` 是一个使用 Connector/J 版本 `5.1.42` 的\
  \ Java 应用程序。这些属性的一个优点是，可以轻松检查所使用的客户端和连接器的版本；这可用于验证应用程序的所有实例是否都使用了适当的版本。\n\n这些属性表公开了连接客户端侧的变量。接下来是变量和状态表，它们提供来自服务器侧的信息。\n\
  \n#### 变量与状态表\n\n性能模式提供了一系列表，用于获取变量（选项）和状态变量的值。这些表既包含全局级也包含会话级，状态变量还可按账户、主机、线程和用户分组。表\
  \ 15-16 列出了这些表。在 MySQL NDB Cluster 7.5 中，`global_status`、`global_variables`、`session_status`\
  \ 和 `session_variables` 表已取代信息模式中对应的表，这是将更侧重性能且更动态的表迁移到性能模式工作的一部分。\n\n**表 15-16.\
  \ 性能模式变量与状态表**\n\n| 表名 | 描述 |\n| --- | --- |\n| `global_status` | 全局状态变量。与 `SHOW\
  \ GLOBAL STATUS` 相同，但不包括以 `Com_` 开头的变量。 |\n| `global_variables` | 全局配置变量。与 `SHOW\
  \ GLOBAL VARIABLES` 相同。 |\n| `session_status` | 会话状态变量。与 `SHOW SESSION STATUS` 相同，但不包括以\
  \ `Com_` 开头的变量。 |\n| `session_variables` | 会话配置变量。与 `SHOW SESSION VARIABLES` 相同。\
  \ |\n| `status_by_account` | 按用户名和主机名分组的状态变量。 |\n| `status_by_host` | 按主机名分组的状态变量。\
  \ |\n| `status_by_thread` | 按线程分组的状态变量。 |\n| `status_by_user` | 按用户名分组的状态变量。 |\n\
  | `user_variables_by_thread` | 每个当前连接的用户变量（例如 `@id`）。 |\n| `variables_by_thread`\
  \ | 每个当前连接的会话级配置变量。 |\n\n`variables_by_thread` 表是 `session_variables` 的更通用版本。`session_variables`\
  \ 包含查询该表的连接所拥有的变量，而 `variables_by_thread` 表则包含所有连接的数据。不过，还有一个额外的区别：`variables_by_thread`\
  \ 严格只包含会话级变量，而 `session_variables` 还包含了那些没有对应会话级版本的全局变量。例如，`tls_version` 包含在 `session_variables`\
  \ 中，但不在 `variables_by_thread` 中。\n\n清单 15-17 展示了如何结合使用 `variables_by_thread` 和 `global_variables`\
  \ 来检测客户端连接何时更改了任何配置选项。\n\n```\nmysql> SELECT t.THREAD_ID, VARIABLE_NAME,\nt.VARIABLE_VALUE\
  \ AS SessionValue,\ng.VARIABLE_VALUE AS GlobalValue\nFROM performance_schema.variables_by_thread\
  \ t\nINNER JOIN performance_schema.global_variables g\nUSING (VARIABLE_NAME)\nWHERE\
  \ t.VARIABLE_VALUE  g.VARIABLE_VALUE\nAND VARIABLE_NAME NOT IN ('character_set_database',\n\
  'collation_database');\n+-----------+------------------+--------------+-------------+\n\
  | THREAD_ID | VARIABLE_NAME    | SessionValue | GlobalValue |\n+-----------+------------------+--------------+-------------+\n\
  |     32412 | sort_buffer_size | 2097152      | 262144      |\n+-----------+------------------+--------------+-------------+\n\
  1 row in set (0.02 sec)\n```\n**清单 15-17. 使用非全局变量值确定连接**\n\n数据库字符集和排序规则被过滤掉了，因为它们取决于连接的当前模式是如何创建的，而不是连接设置了什么。同样，可能需要过滤掉其他已知会变化的选项。在这个例子中，排序缓冲区已被其中一个连接增大到了\
  \ 2MB。过大的缓冲区可能导致性能问题和过高的内存使用，因此如果该连接的预期值并非如此，可能值得进一步调查。\n\n下一组要查看的表是复制表。\n\n####\
  \ 复制表\n\n在 MySQL Server 5.7 和 MySQL NDB Cluster 7.5 之前，获取复制状态和配置信息的唯一方法是使用 `SHOW\
  \ SLAVE STATUS` 语句。在 MySQL NDB Cluster 7.5 中，添加了表 15-17 中的八个表，使得部分信息可通过性能模式获取。这些表也在第\
  \ 6 章讨论过，此处不再赘述。\n\n**表 15-17. 性能模式复制表**\n\n| 表名 | 描述 |\n| --- | --- |\n| `replication_applier_configuration`\
  \ | 从属 SQL 线程的配置。 |\n| `replication_applier_status` | 从属 SQL 线程的状态。 |\n| `replication_applier_status_by_coordinator`\
  \ | 多线程从属的协调器线程状态。 |\n| `replication_applier_status_by_worker` | 多线程从属的工作线程状态。 |\n\
  | `replication_connection_configuration` | 从属 IO 线程的配置。 |\n| `replication_connection_status`\
  \ | 从属 IO 线程的状态。 |\n| `replication_group_member_stats` | 此表显示复制组成员的网络和状态信息。MySQL\
  \ NDB Cluster 不支持组复制。 |\n| `replication_group_members` | MySQL 组复制成员的统计信息。MySQL\
  \ NDB Cluster 不支持组复制。 |\n\n\n#### 实例表\n\n有许多被跟踪的实例，范围从互斥锁到预处理语句。表 15-18 列出了可用于这些实例的六个表。大多数表并不常用，但在某些调试情况下可能会很有用。\n\
  \n表 15-18. 性能模式实例表\n\n| 表名 | 描述 |\n| --- | --- |\n| `cond_instances` | 条件同步实例。仅包含实例名称和内存地址。\
  \ |\n| `file_instances` | 文件实例。包含文件名、事件名称以及打开该文件的文件描述符数量。 |\n| `mutex_instances`\
  \ | 互斥锁实例。包含内存地址以及（如果有）哪个线程持有该互斥锁的锁。 |\n| `prepared_statements_instances` | 类似于\
  \ `events_statements_current` 的预处理语句统计信息。 |\n| `rwlock_instances` | 读写锁实例。包含内存地址、（如果有）哪个线程持有写锁，以及该实例存在多少个读锁。\
  \ |\n| `socket_instances` | 每个 TCP/IP 套接字、UNIX 套接字等。包含内存地址、使用该套接字的线程 ID、套接字 ID、IP\
  \ 地址、端口号和状态。 |\n\n有一个表与其他表有些不同：`prepared_statements_instances` 表。它与 `events_statements_current`\
  \ 表非常相似，只是它用于预处理语句。没有与事件历史或长历史表等效的表，因此只能查看当前存在的预处理语句（即存在于预处理语句缓存中的语句）。\n\n清单 15-18\
  \ 展示了一个示例，其中缓存中有两个预处理语句。请注意，两个预处理语句的语句名称和 SQL 文本是相同的——这并非错误。预处理语句的作用域是连接，因此两个连接可以自由创建具有相同名称的预处理语句。\n\
  \n```sql\nmysql> SELECT * FROM prepared_statements_instances\\G\n***************************\
  \ 1. row ***************************\nOBJECT_INSTANCE_BEGIN: 140468851714864\nSTATEMENT_ID:\
  \ 1\nSTATEMENT_NAME: stmt_city\nSQL_TEXT: SELECT * FROM world.City WHERE ID = ?\n\
  OWNER_THREAD_ID: 32412\nOWNER_EVENT_ID: 10\nOWNER_OBJECT_TYPE: NULL\nOWNER_OBJECT_SCHEMA:\
  \ NULL\nOWNER_OBJECT_NAME: NULL\nTIMER_PREPARE: 230446000\nCOUNT_REPREPARE: 0\n\
  COUNT_EXECUTE: 4\nSUM_TIMER_EXECUTE: 3560169000\nMIN_TIMER_EXECUTE: 671388000\n\
  AVG_TIMER_EXECUTE: 890042000\nMAX_TIMER_EXECUTE: 1107494000\nSUM_LOCK_TIME: 504000000\n\
  SUM_ERRORS: 0\nSUM_WARNINGS: 0\nSUM_ROWS_AFFECTED: 0\nSUM_ROWS_SENT: 4\nSUM_ROWS_EXAMINED:\
  \ 4\nSUM_CREATED_TMP_DISK_TABLES: 0\nSUM_CREATED_TMP_TABLES: 0\nSUM_SELECT_FULL_JOIN:\
  \ 0\nSUM_SELECT_FULL_RANGE_JOIN: 0\nSUM_SELECT_RANGE: 0\nSUM_SELECT_RANGE_CHECK:\
  \ 0\nSUM_SELECT_SCAN: 0\nSUM_SORT_MERGE_PASSES: 0\nSUM_SORT_RANGE: 0\nSUM_SORT_ROWS:\
  \ 0\nSUM_SORT_SCAN: 0\nSUM_NO_INDEX_USED: 0\nSUM_NO_GOOD_INDEX_USED: 0\n***************************\
  \ 2. row ***************************\nOBJECT_INSTANCE_BEGIN: 140469259951328\nSTATEMENT_ID:\
  \ 1\nSTATEMENT_NAME: stmt_city\nSQL_TEXT: SELECT * FROM world.City WHERE ID = ?\n\
  OWNER_THREAD_ID: 35411\nOWNER_EVENT_ID: 3\nOWNER_OBJECT_TYPE: NULL\nOWNER_OBJECT_SCHEMA:\
  \ NULL\nOWNER_OBJECT_NAME: NULL\nTIMER_PREPARE: 313392000\nCOUNT_REPREPARE: 0\n\
  COUNT_EXECUTE: 1\nSUM_TIMER_EXECUTE: 1281026000\nMIN_TIMER_EXECUTE: 1281026000\n\
  AVG_TIMER_EXECUTE: 1281026000\nMAX_TIMER_EXECUTE: 1281026000\nSUM_LOCK_TIME: 165000000\n\
  SUM_ERRORS: 0\nSUM_WARNINGS: 0\nSUM_ROWS_AFFECTED: 0\nSUM_ROWS_SENT: 1\nSUM_ROWS_EXAMINED:\
  \ 1\nSUM_CREATED_TMP_DISK_TABLES: 0\nSUM_CREATED_TMP_TABLES: 0\nSUM_SELECT_FULL_JOIN:\
  \ 0\nSUM_SELECT_FULL_RANGE_JOIN: 0\nSUM_SELECT_RANGE: 0\nSUM_SELECT_RANGE_CHECK:\
  \ 0\nSUM_SELECT_SCAN: 0\nSUM_SORT_MERGE_PASSES: 0\nSUM_SORT_RANGE: 0\nSUM_SORT_ROWS:\
  \ 0\nSUM_SORT_SCAN: 0\nSUM_NO_INDEX_USED: 0\nSUM_NO_GOOD_INDEX_USED: 0\n2 rows in\
  \ set (0.00 sec)\n```\n\n清单 15-18. 预处理语句实例\n\n#### 锁表\n\n锁等待问题是数据库管理员需要调查的典型问题。锁可能发生在多个级别，从\
  \ SQL 节点中的全局级别，到元数据和表级锁，再到行级锁。性能模式包含两个表，列于表 15-19，可用于调查元数据锁和表锁。\n\n表 15-19. 性能模式锁表\n\
  \n| 表名 | 描述 |\n| --- | --- |\n| `metadata_locks` | 元数据锁信息。每个当前正在使用或正在等待的元数据锁对应一行。\
  \ |\n| `table_handles` | 关于表锁的信息。即使当前不存在锁或未请求锁，也可能返回行。 |\n\n鉴于这些只会在对 `NDBCluster`\
  \ 表进行模式更改时成为问题，并且 `NDBCluster` 存储引擎不支持在同一 SQL 节点上对表进行并发查询，这里将不再详细讨论性能模式锁表。下一章将展示如何调查\
  \ `NDBCluster` 表的行级锁争用。\n\n至此，对性能模式的介绍就结束了。可以看到，这里有大量的数据可用，并且 MySQL Server 的每个新版本都会添加更多的表和仪器。很容易让人不知所措，在紧张的时刻也很难记住所有的查询。这正是\
  \ `sys` 模式发挥作用的地方。\n\n**提示**\n\n关于性能模式还有更多需要了解的内容。完整文档可以在 MySQL 参考手册中找到：[`dev.mysql.com/doc/refman/en/performance-schema.html`](https://dev.mysql.com/doc/refman/en/performance-schema.html)。\n\
  \n### sys 模式\n\n`sys` 模式是 Mark Leith 的创意，他是 MySQL 企业监视器的经理之一。他启动了 `ps_helper` 项目，以试验监控想法并展示性能模式能够做什么，同时使其变得更简单。该项目后来更名为\
  \ `sys` 模式并移入了 MySQL。此后，包括本书作者之一在内的其他几个人也做出了贡献。\n\n本节将介绍 `sys` 模式的安装过程，并演示一些用例，包括\
  \ MySQL Workbench 中的性能报告。\n\n\n\n#### 安装\n\n`sys` 模式适用于 MySQL Server 5.6 及更高版本，这意味着也适用于\
  \ MySQL NDB Cluster 7.3 及更高版本。从 MySQL Server 5.7 / MySQL NDB Cluster 7.5 开始，它会像其他系统模式（例如\
  \ `mysql` 模式）一样默认安装。对于 MySQL NDB Cluster 7.3 和 7.4 的用户，则需要从 GitHub 仓库、MySQL Workbench\
  \ 或 MySQL Enterprise Monitor 手动安装。如果 `sys` 模式损坏或有可用更新，所有 MySQL NDB Cluster 版本都可以使用\
  \ GitHub 下载重新安装。\n\n`sys` 模式 GitHub 仓库位于 [`github.com/mysql/mysql-sys`](https://github.com/mysql/mysql-sys)。该仓库由\
  \ MySQL 开发团队管理，方式与服务器（包括 MySQL NDB Cluster）GitHub 仓库相同。从仓库主页，选择要下载的分支。在大多数情况下，建议选择\
  \ master 分支，它与 MySQL 安装的版本相同。然后点击绿色的 **Clone or Download** 按钮，接着点击 **Download ZIP**\
  \ 以下载安装文件。这也显示在图 15-4 中。\n\n![A435171_1_En_15_Fig4_HTML.jpg](img/A435171_1_En_15_Fig4_HTML.jpg)\n\
  \n**图 15-4.** 从 GitHub 下载 sys 模式\n\n下载的 Zip 文件解压后，进入存放安装文件的 `mysql-sys-master` 目录（如果下载的是\
  \ master 以外的分支，目录名会不同）。每个支持的版本都有一个 SQL 脚本：\n\n*   `sys_56.sql`：适用于 MySQL Server\
  \ 5.6 和 MySQL NDB Cluster 7.3 及 7.4。\n*   `sys_57.sql`：适用于 MySQL Server 5.7 和 MySQL\
  \ NDB Cluster 7.5 及 7.6。\n\n使用 `mysql` 命令行客户端连接到 SQL 节点，当前目录为 `mysql-sys-master`，并执行（使用适合\
  \ MySQL NDB Cluster 版本的安装文件）：\n\n```\nmysql> SOURCE sys_56.sql\nQuery OK, 0 rows\
  \ affected (0.00 sec)\nQuery OK, 0 rows affected (0.00 sec)\nQuery OK, 0 rows affected\
  \ (0.00 sec)\nQuery OK, 1 row affected (0.45 sec)\nDatabase changed\nQuery OK, 0\
  \ rows affected (0.04 sec)\n...\n```\n\n也可以使用 GUI（图形用户界面）安装 `sys` 模式，可以使用 MySQL\
  \ Enterprise Monitor 或 MySQL Workbench。图 15-5 显示了 MySQL Workbench 中“性能报告”里的安装屏幕。请注意，MySQL\
  \ Workbench 仅支持在 `sys` 模式尚不存在时进行安装；不支持升级。\n\n![A435171_1_En_15_Fig5_HTML.jpg](img/A435171_1_En_15_Fig5_HTML.jpg)\n\
  \n**图 15-5.** 从 MySQL Workbench 性能报告安装 sys 模式\n\n`sys` 模式安装好后，现在是时候仔细看看它提供了什么。\n\
  \n#### sys 模式对象\n\n`sys` 模式的核心是一组视图、存储函数和存储过程。此外，还有一个包含两个触发器的配置表。虽然其最初目标是提供对 `Performance\
  \ Schema` 的接口，但它已经发展到包含 `Information Schema` 并提供一些通用实用工具。\n\n`sys` 模式的主要目标之一是易于使用。因此，大多数情况下视图都包含\
  \ `ORDER BY` 子句。此外，包含 `Performance Schema` 计时、路径、字节值或语句的列都经过格式化，以便于人类阅读，并使输出更可能适应屏幕宽度。这种格式化可能并不总是需要的，例如当需要自定义排序或软件需要分析数据时。为了适应这种情况，每个使用格式化函数的视图也都存在一个视图名称带有\
  \ `x$` 前缀的版本。这些视图返回未格式化的数据。\n\n本节的其余部分列出了所有 `sys` 模式对象并提供了简要描述。\n\n**注意**\n\n有关\
  \ `sys` 模式对象的完整文档，请参阅参考手册 [`dev.mysql.com/doc/refman/5.7/en/sys-schema-reference.html`](https://dev.mysql.com/doc/refman/5.7/en/sys-schema-reference.html)\
  \ 或 GitHub 的 README 文件 [`github.com/mysql/mysql-sys/blob/master/README.md`](https://github.com/mysql/mysql-sys/blob/master/README.md)。\n\
  \n`sys` 模式仅包含一个用于配置的表。该表有两个触发器，用于设置更新配置的用户。表和触发器列于表 15-20 中。`sys` 模式配置将在下一节讨论。\n\
  \n**表 15-20.** sys 模式配置表和触发器\n\n| 表/触发器名称 | 描述 |\n| --- | --- |\n| `sys_config`\
  \ | 包含 `sys` 模式配置的表。 |\n| `sys_config_insert_set_user` | 设置插入新配置选项的用户名的触发器。 |\n\
  | `sys_config_update_set_user` | 设置更新配置选项的用户名的触发器。 |\n\n表 15-21 列出了按主机名分组提供摘要的视图。主机名是用户连接来源的地方，因此这些视图可用于（例如）确定来自多个应用主机的工作负载是否均匀。\n\
  \n**表 15-21.** sys 模式主机摘要视图\n\n| 视图名称 | 描述 |\n| --- | --- |\n| `host_summary` `x$host_summary`\
  \ | 按主机名分组的整体主机摘要。 |\n| `host_summary_by_file_io` `x$host_summary_by_file_io` |\
  \ 按主机名分组的文件 I/O 延迟。 |\n| `host_summary_by_file_io_type` `x$host_summary_by_file_io_type`\
  \ | 按主机名和事件名分组的文件 I/O 延迟。 |\n| `host_summary_by_stages` `x$host_summary_by_stages`\
  \ | 按主机名和阶段事件名分组的延迟。 |\n| `host_summary_by_statement_latency` `x$host_summary_by_statement_latency`\
  \ | 按主机名分组的语句统计信息。 |\n| `host_summary_by_statement_type` `x$host_summary_by_statement_type`\
  \ | 按主机名和语句类型分组的语句统计信息。 |\n\n有几个专门用于 `InnoDB` 存储引擎的视图。这些列于表 15-22 中。在 MySQL NDB\
  \ Cluster 中，当复制到 `InnoDB` 实例时，这些视图通常很有用。\n\n**表 15-22.** sys 模式 InnoDB 视图\n\n| 视图名称\
  \ | 描述 |\n| --- | --- |\n| `innodb_buffer_stats_by_schema` `x$innodb_buffer_stats_by_schema`\
  \ | 按模式分组的 `InnoDB` 缓冲池分配。 |\n| `innodb_buffer_stats_by_table` `x$innodb_buffer_stats_by_table`\
  \ | 按表分组的 `InnoDB` 缓冲池分配。 |\n| `innodb_lock_waits` `x$innodb_lock_waits` | 关于正在进行的\
  \ `InnoDB` 锁争用的信息。 |\n\n\n\n调查与磁盘 I/O 相关的问题可能难以追踪。然而，`sys` 模式包含了多个视图，可以从 SQL 节点内部查看导致\
  \ I/O 的原因。这些视图汇总在表 15-23 中。\n\n表 15-23. sys 模式 I/O 视图\n\n| 视图名称 | 描述 |\n| --- |\
  \ --- |\n| `io_by_thread_by_latency` `x$io_by_thread_by_latency` | 按线程分组的 I/O 延迟。\
  \ |\n| `io_global_by_file_by_bytes` `x$io_global_by_file_by_bytes` | 按文件分组的 I/O\
  \ 量。 |\n| `io_global_by_file_by_latency` `x$io_global_by_file_by_latency` | 按文件分组的\
  \ I/O 延迟。 |\n| `io_global_by_wait_by_bytes` `x$io_global_by_wait_by_bytes` | 按事件名称分组的\
  \ I/O 量。 |\n| `io_global_by_wait_by_latency` `x$io_global_by_wait_by_latency` |\
  \ 按事件名称分组的 I/O 延迟。 |\n| `latest_file_io` `x$latest_file_io` | 最新的文件 I/O 事件。 |\n\n\
  在 MySQL NDB Cluster 7.5 及更高版本中，可以启用对内存分配和释放时刻的检测。这可用于调查导致 SQL 节点整体内存使用量的原因。可用的视图列在表\
  \ 15-24 中。\n\n表 15-24. sys 模式内存使用视图\n\n| 视图名称 | 描述 |\n| --- | --- |\n| `memory_by_host_by_current_bytes`\
  \ `x$memory_by_host_by_current_bytes` | 按主机分组的当前内存使用量。 |\n| `memory_by_thread_by_current_bytes`\
  \ `x$memory_by_thread_by_current_bytes` | 按线程分组的当前内存使用量。 |\n| `memory_by_user_by_current_bytes`\
  \ `x$memory_by_user_by_current_bytes` | 按用户分组的当前内存使用量。 |\n| `memory_global_by_current_bytes`\
  \ `x$memory_global_by_current_bytes` | 按事件名称分组的当前内存使用量。 |\n| `memory_global_total`\
  \ `x$memory_global_total` | 当前总内存使用量。 |\n\n对于内存视图，请注意，内存使用情况仅从启用相应的内存检测工具时才开始被检测。这意味着，通常只有当内存检测工具在\
  \ MySQL 配置文件中启用，从而从 MySQL 启动时就被启用时，内存使用数据才是准确的。默认情况下，仅启用性能模式的内存检测。\n\n有几个视图可用于调查模式。分组在表和索引级别。这些视图对于调查索引是否最优、表是否即将用完自增值等非常有用。“命令行用法和示例”一节包含使用其中一些视图的示例。这些视图汇总在表\
  \ 15-25 中。\n\n表 15-25. sys 模式模式视图\n\n| 视图名称 | 描述 |\n| --- | --- |\n| `schema_auto_increment_columns`\
  \ | 关于自增列的信息，包括数据类型和已使用的值。 |\n| `schema_index_statistics` `x$schema_index_statistics`\
  \ | 关于索引使用情况的信息。 |\n| `schema_object_overview` | 按模式分组的表、索引等的数量概览。 |\n| `schema_redundant_indexes`\
  \ | 查找覆盖相同用途的两个索引，并提供删除哪个的建议。 |\n| `schema_table_lock_waits` `x$schema_table_lock_waits`\
  \ | 列出当前表元数据锁争用。 |\n| `schema_table_statistics` `x$schema_table_statistics` | 表使用统计信息，包括延迟和读取的数据量。\
  \ |\n| `schema_table_statistics_with_buffer` `x$schema_table_statistics_with_buffer`\
