  \ 进行中的锁、操作和事务\n\n表格 16-3 包含提供关于进行中的锁、操作和事务信息的视图。这些视图对于调查诸如集群并发操作（`MaxNoOfConcurrentOperations`\
  \ 选项）耗尽或锁争用等问题非常有用。\n\n表 16-3. ndbinfo 视图：进行中的锁、操作和事务\n\n| 表名 | 首个版本 | 描述 |\n| ---\
