  \n\n\n#### ndbinfo 视图\n\n这 41 个视图列在表格 16-2 到 16-5 中，以下四个类别各对应一个表格：\n\n*   集群配置与整体状态：这些视图提供有关集群配置和状态的信息。\n\
  *   进行中的锁、操作和事务：这些视图深入展示了操作和事务资源的使用位置以及锁的持有情况。\n*   性能指标：各种性能指标，例如磁盘写入速度、CPU 使用率等。\n\
  *   对象与内存使用情况：关于整体内存使用情况、每个分片的内存使用情况、日志缓冲区和空间等信息。\n\n这四个表格包含表名、该表首次被引入的版本（或多个版本）以及对表格的描述。仅当视图是在\
  \ 7.1.1 版本之后引入的，才会指定首个版本。如你所见，新视图经常被添加；此外，有时也会向现有视图中添加新的列。在某些情况下，视图不仅被添加到最新的开发版本，也被添加到现有的通用可用（GA）版本中。在这些情况下，会列出多个首个版本。由于\
  \ `ndbinfo` 视图是极佳的监控信息来源，这本身就足以成为考虑升级到最新版本的理由。\n\n> **提示**\n>\n> 每个表的详细描述可以在 MySQL\
  \ 参考手册中找到：[`dev.mysql.com/doc/refman/5.7/en/mysql-cluster-ndbinfo.html`](https://dev.mysql.com/doc/refman/5.7/en/mysql-cluster-ndbinfo.html)。\n\
  \n##### 集群配置与整体状态\n\n第一组视图用于集群配置和整体状态。这些视图列在表格 16-2 中。这些视图对于提取一般信息（如配置选项的值）或监控集群状态非常有用。\n\
  \n表 16-2. ndbinfo 视图：集群配置与整体状态\n\n| 表名 | 首个版本 | 描述 |\n| --- | --- | --- |\n| `arbitrator_validity_detail`\
