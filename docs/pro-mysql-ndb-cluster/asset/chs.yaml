  proc1=''mysqld'', pid1=''51'', proc2='''', pid2='''', val=''binlog''

  2017-05-16 21:07:50.520: (info) [T0x14eb320 chass@manager-api-util.c:391] Appended:
  sec='''' key=''log_bin'' proct1=''mysqld'' pid1=''51'' proct2='''' pid2='''' val=''binlog''
  pri=1 readonly=0

  ...

  2017-05-16 21:07:50.612: (info) [T0x1572450 CMGR @cluster-manager.c:10199] First
  unavailable host in view is 192.168.56.101:1


  2017-05-16 21:07:50.612: (warning) [T0x1572450 CMGR ] Message delivery failed: err->message=''Agent
  on host 192.168.56.101:186

  20 is unavailable'' mgr_set_configvalues

  2017-05-16 21:07:50.612: (info) [T0x1572450 CMGR @reply.c:161] Error reply to client
