  ##### 禁用分布式权限


  如果需要禁用分布式权限，可以使用表 12-3 中的存储过程将授权表转换回 SQL 节点（`MyISAM`）。可能出于各种原因需要恢复使用每个 SQL 节点本地的授权表。例如，因为执行降级、或需求发生变化，最好不在所有
  SQL 节点上拥有相同的权限，因此需要将权限转换回来。


  禁用分布式权限的步骤与启用它们类似：


  1.  创建账户及其权限的逻辑备份。可以使用`mysqldump`或`mysqlpump`完成备份。

  2.  在每个 SQL 节点上，更新授权表的备份，以确保在恢复本地表时包含在分布式期间对权限所做的所有更改。

  3.  在一个 SQL 节点上，执行`mysql_cluster_restore_local_privileges`过程。这将删除授权表并从`MyISAM`备份中重新创建它们。

  4.  在除步骤 3 中使用的节点之外的所有其他 SQL 节点上，执行`mysql_cluster_restore_privileges_from_local`过程。这是必需的，因为步骤
  3 中恢复的授权表本地版本仅适用于执行该步骤的 SQL 节点。

  5.  在所有 SQL 节点上，执行`FLUSH PRIVILEGES`。


  清单 12-7 展示了一个禁用分布式权限功能的示例。


  ```sql

