  1 行结果集 (0.00 sec)\n清单 18-21.\n通过 ProxySQL 连接到 SQL 节点\n```\n\n### NDBCluster 表的事务处理\n\
  \n在大多数方面，可以像访问 `InnoDB` 表一样访问 `NDBCluster` 表。您可以像编写 `InnoDB` 事务一样编写事务。然而，`NDBCluster`\
  \ 与 `InnoDB` 在事务处理方面存在一些重大差异。在开发事务性应用程序时，您必须牢记 MySQL NDB Cluster 事务处理的一些特性。\n\n\
  *   *仅支持 READ-COMMITTED 隔离级别*：`NDBCluster` 存储引擎仅支持 `READ-COMMITTED` 隔离级别。不支持 `REPEATABLE-READ`\
  \ 或 `SERIALIZABLE`。如果您的应用程序需要这些隔离级别，NDBCluster 可能不是一个好的选择。\n*   *不支持死锁检测*：MySQL\
  \ NDB Cluster 无法像 `InnoDB` 那样检测由冲突的行级锁引起的死锁。因此，任何锁问题都会被检测为锁等待超时，而不是死锁。\n*   *提交在磁盘上并非持久*：虽然所有数据都会在节点组内复制，但已提交的事务在\
  \ GCP（全局检查点）写入重做日志条目之前并非持久的。这意味着在整个集群故障时，事务不是持久的。\n*   *不支持保存点*：MySQL NDB Cluster\
  \ 不支持保存点。当您想要回滚未提交的更改时，必须始终回滚整个事务。\n*   *LOCK TABLES 命令不会阻止来自其他 SQL 节点的访问*：`LOCK\
  \ TABLES` 语句仅对发出该语句的同一 SQL 节点有效。因此，使用 `LOCK TABLES` 语句无法阻止在其他 SQL 节点上执行的事务。\n* \
  \  *无法临时禁用二进制日志记录*：如果在 SQL 节点中启用了二进制日志记录，则无法通过将 `sql_log_bin` 系统变量设置为 `OFF` 来为单个语句禁用二进制日志记录。\n\
  \n#### 错误处理技术\n\n在开发事务性数据库应用程序时，为错误做好准备很重要，因为事务理论并不能确保事务能够成功完成。它只确保所有事务的状态要么变为 `COMMIT`（提交），要么变为\
  \ `ABORT`（中止）。这简化了应用程序开发，因为无需考虑未完成的、进行到一半的状态。\n\n这一特性就是所谓的原子性；它是事务四个重要特性（称为 ACID）之一。因此，当事务失败时，该事务所做的所有更改都将被回滚。数据库状态会回滚，就好像失败的事务根本没有执行过一样。因此，事务性应用程序所需的唯一错误处理就是从头开始重试失败的事务。然而，换句话说，尽管算法简单，错误处理对于事务性应用程序来说是强制性的。\n\
  \n错误处理流程根据编程语言的类型而有所不同。使用过程式编程语言时，它通过检查函数的返回代码来判断是否发生错误。使用面向对象编程语言时，通常通过异常来检测错误。清单\
  \ 18-22 展示了一个包含重试算法的事务概念代码（使用 C API）。请注意，该代码只是一个概念，因此省略了许多内容并以缩写形式表示。您无法编译它。请阅读清单\
  \ 18-22 中的注释以了解此程序的功能。重试事务时，请确保失败事务中读取的所有值都已过时。即使读取的值仍存在于内存中，也不要复用它。\n\n```\nint\
  \ do_transaction1(...) {\n/* 变量声明 */\nMYSQL      *mysql;\nMYSQL_RES  *res;\nMYSQL_ROW\
  \  row;\nint        status;\nint        exit_code;\nint        retry_count = 5;\n\
  useconds_t retry_delay = 100000;\nloop:\n/* 获取连接 */\nmysql = mysql_init(NULL);\n\
  if (!mysql_real_connect(mysql, ...)) {\ngoto err;\n}\n/* 执行事务 */\nif(mysql_autocommit(mysql,\
  \ 0))\ngoto err;\n...\nstatus = mysql_real_query(mysql, ...);\nif(status) {\nif(事务可重试)\
  \ {\ngoto retry;\n} else {\ngoto err;\n}\n}\n...\ngoto end;\nretry:\n/* 为可恢复错误重试事务\
  \ */\nstatus = mysql_rollback();\nif(retry_count++ > 0) {\nusleep(retry_delay);\n\
  goto loop;\n}\nerr:\n/* 严重错误 */\nexit_code = THE_ERROR_CODE;\nend:\n/* 关闭连接 */\n\
  mysql_close(mysql);\nreturn exit_code;\n}\n清单 18-22.\n使用重试算法的 C 语言概念性事务处理代码\n```\n\
  \n使用 Java 等面向对象编程语言编写实现相同功能的程序可能有所不同。清单 18-23 展示了执行事务的 Java 程序示例源代码。这个 Java 程序比清单\
  \ 18-22 中的 C 程序更简短，因为 Java 比 C 更紧凑。\n\n```\npublic void doTransaction1() throws\
  \ SQLException {\nConnection     conn = null;\nStatement      stmt = null;\nResultSet\
  \      rs = null;\nint            retryCount = 5;\nint            sleepDelay = 100;\n\
  do {\ntry {\n// 获取连接\nconn = getConnection();\nconn.setAutoCommit(false);\n// 执行事务\n\
  stmt = conn.createStatement();\nString query = \"SELECT ... FROM tbl WHERE ...\"\
  ;\nrs = stmt.executeQuery(query);\n...\nretryCount = 0;\n} catch (SQLException sqlEx)\
  \ {\nString sqlState = sqlEx.getSQLState();\n// 确定事务是否可重试\nif (事务可重试) {\nThread.sleep(sleepDelay);\n\
  retryCount--;\n} else {\nretryCount = 0;\n}\n} finally {\ntry {\nif (rs != null)\
  \ rs.close();\nif (stmt != null) stmt.close();\nif (conn != null) conn.close();\n\
  } catch (SQLException sqlEx) {\n// 写入日志等\n...\n}\n}\n} while (retryCount > 0);\n\
  }\n清单 18-23.\n使用重试算法的 Java 语言概念性事务处理代码\n```\n\n\n#### 编写可重试事务程序的关键点与实现方法\n\n#####\
  \ 错误信息的类型与用途\n\n编写一个执行事务的程序时，关键点在于如何确定一个事务是否可重试。这取决于通过驱动程序从服务器报告了什么错误。因此，应用程序必须首先从驱动程序检索错误信息。MySQL\
  \ 驱动程序提供以下类型的错误信息：\n\n*   `Errno`： MySQL 特定的错误代码，分配给每种错误类型。您可以在 [`dev.mysql.com/doc/refman/5.7/en/error-messages-server.html`](https://dev.mysql.com/doc/refman/5.7/en/error-messages-server.html)\
  \ 和 [`dev.mysql.com/doc/refman/5.7/en/error-messages-client.html`](https://dev.mysql.com/doc/refman/5.7/en/error-messages-client.html)\
  \ 找到错误代码列表。\n*   `Error message`： 文本格式的错误描述。您可以在错误消息中找到其他信息，例如语法错误的位置、导致重复行的表名等。\n\
  *   `SQLSTATE`： 代表错误类型的五字符代码，该代码在 SQL 标准中定义。\n\n`Errno`（或错误代码）和 `SQLSTATE` 用于判断事务是否可重试，以及需要采取什么进一步的操作。请注意，`errno`\
  \ 也有一个表示错误类型的文本标签。您可以在参考手册中找到该标签。错误消息是人类可读的错误信息。错误消息主要用于记录日志，以便数据库管理员（DBA）后续审查。\n\
  \n检索错误信息的方式因编程语言和驱动程序实现而异。表 18-4 列出了发生错误时如何检索错误信息。\n\n**表 18-4. 每种编程语言的错误信息检索方法**\n\
  \n| 语言/驱动 | 错误检测方式 | 检索错误信息的方法 |\n| --- | --- | --- |\n| Connector/J | `SQLException`\
  \ | `SQLException#getSQLState()` `SQLException#getErrorCode()` `SQLException#getMessage()`\
  \ |\n| Connector/Python | `mysql.connector.Error` | `mysql.connector.Error#sqlstate`\
  \ `mysql.connector.Error#errno` `mysql.connector.Error#msg` |\n| C API | 返回值 | `mysql_sqlstate()`\
  \ `mysql_errno()` `mysql_error()` |\n| PHP, `mysqli` | 返回值 | `mysqli_sqlstate()`/`mysqli->sqlstate()`\
  \ `mysqli_errno()`/`mysqli->errno()` `mysqli_error()`/`mysqli->error()` |\n| PHP,\
  \ PDO | `PDOException` | `PDOException::$errInfo[0]` … SQLSTATE `PDOException::$errInfo[1]`\
  \ … Errno `PDOException::$errInfo[2]` … Error |\n| Perl, DBD::mysql | 异常或返回值（取决于\
  \ `RaiseError` 设置） | `$dbh->state` `$dbh->err` `$dbh->errstr` |\n| Ruby/MySQL |\
  \ `Mysql::Error` | `Mysql::Error#sqlstate` `Mysql::Error#errno` `Mysql::Error#error`\
  \ |\n\n##### 实现事务重试例程\n\n实现重试例程的最简单方法是针对所有类型的错误进行盲目的重试。这在大多数情况下都适用，因为除非事务已提交，否则重试本身是无害的。不要忘记在重试前回滚事务。否则，重试将不会成功。\n\
  \n如果您倾向于更聪明的选择，可以考虑实现一个例程，根据 `SQLSATE` 和错误码在重试前判断事务是否可重试。可重试错误的种类并不多，因为大多数错误对于应用程序来说是致命的。例如，`errno`\
  \ 1146 有一个标签 `ER_NO_SUCH_TABLE`，意思是“语句引用的表不存在”。一个不存在的表在重试时极不可能出现。所以，这不是一个可重试的错误。在这种情况下，无论如何都需要人工干预。DBA\
  \ 可能需要修复模式问题或修复应用程序代码中的错误。总之，只有在错误是临时的情况下，重试事务才有效。\n\n##### 基于 SQLSTATE 的重试判断\n\n\
  必须首先检查的信息是 `SQLSTATE`。`SQLSTATE` 由五个字符组成，前两个字符代表错误类，后三个字符代表错误子类。表 18-5 列出了 `SQLSTATE`\
  \ 的主要错误类。\n\n**表 18-5. SQLSTATE 中定义的主要错误类**\n\n| 类 | 类文本 | 可重试？ | 描述 |\n| --- |\
  \ --- | --- | --- |\n| `00` | 成功完成 | 否（无需重试） | 无错误。 |\n| `01` | 警告 | 否（无需重试） | 语句执行成功，但产生了一些警告。\
  \ |\n| `02` | 无数据 | 否（用于存储过程） | 不存在更多数据。 |\n| `08` | 连接异常 | 是 | 与连接相关的错误。 |\n| `22`\
  \ | 数据异常 | 否（用于存储过程） | 数据对于数据类型无效。 |\n| `23` | 完整性约束违规 | 否（用于存储过程） | 违反了约束。 |\n\
  | `25` | 无效的事务状态 | 否 | 尝试转换到事务的无效状态。 |\n| `28` | 无效的授权规格 | 否 | 授权失败。 |\n| `40` |\
  \ 事务回滚 | 是 | 事务因某种原因被回滚。当前，MySQL NDB 集群不支持。（发生在 `InnoDB` 上。） |\n| `42` | 语法错误或访问规则违规\
  \ | 否 | 解析器检测到语法错误。 |\n| `HY` | 通用错误 | 取决于具体情况 | 供应商特定。 |\n| `XA` | XA 事务错误 | 取决于具体情况\
  \ | MySQL NDB 集群不支持 XA 事务。 |\n\n如表 18-5 所示，唯一需要重试的 `SQLSTATE` 类是 `08`，在某些情况下是 `HY`。当\
  \ `SQLSTATE` 类为 `08` 时，应用程序需要重新连接到 SQL 节点。第 15 章讨论的临时错误包含在 `HY` 类中。请注意，`40` 或 `XA`\
  \ 可能来自 `InnoDB`，但不会发生在 `NDBCluster` 存储引擎上。\n\n> **注意**\n> 如果您遇到语法错误（`SQLSTATE class\
  \ = 42`），这可能是 SQL 注入攻击的症状。语法错误可能是攻击者更改 SQL 语法的结果。即使它们不是由于攻击造成的，语法错误也表明存在 SQL 注入攻击的潜在风险，因此应尽快修复。\n\
  \n##### 基于 MySQL NDB 集群错误码的重试判断\n\n当 `SQLSTATE` 类为 `HY` 时，应用程序必须检查从驱动程序检索到的错误码。在\
  \ MySQL NDB 集群中，表 18-6 中列出的错误码值得重试。\n\n**表 18-6. MySQL NDB 集群可重试的错误码列表**\n\n| 错误码\
  \ | 标签 | 描述 |\n| --- | --- | --- |\n| `1028` | `ER_FILSORT_ABORT` | 排序因各种原因被中止。这不特定于\
  \ `NDBCluster` 存储引擎。 |\n| `1036` | `ER_OPEN_AS_READONLY` | 访问的表以只读模式打开。这可能在 binlog\
  \ 注入器准备好之前发生。 |\n| `1038` | `ER_OUT_OF_SORTMEMORY` | 排序行时内存不足。这不特定于 `NDBCluster`\
  \ 存储引擎。 |\n| `1041` | `ER_OUT_OF_RESOURCES` | SQL 节点内存不足。这不特定于 `NDBCluster` 存储引擎。\
  \ |\n| `1180` | `ER_ERROR_DURING_COMMIT` | 提交期间发生错误。 |\n| `1181` | `ER_ERROR_DURING_ROLLBACK`\
  \ | 回滚期间发生错误。 |\n| `1135` | `ER_CANT_CREATE_THREAD` | 由于内存不足等原因，线程创建失败。这不特定于 `NDBCluster`\
  \ 存储引擎。 |\n| `1205` | `ER_LOCK_WAIT_TIMEOUT` | 事务因锁等待超时而无法获取锁。 |\n| `1297` | `ER_GET_TEMPORARY_ERRMSG`\
  \ | 资源临时错误。 |\n\n##### 特殊情况：提交期间的连接失败\n\n有一种极端情况，如果不进行进一步检查就无法重试。那就是执行提交时发生连接失败（`SQLSTATE\
  \ class = 08`），因为应用程序本身无法仅通过检查从驱动程序检索的错误信息来确定 `COMMIT` 是否成功。应用程序只知道它向 SQL 节点发出了\
  \ `COMMIT`，但由于网络问题，结果未知。这种问题可以通过 XA 事务来妥善处理；但是，MySQL NDB 集群尚未实现此功能。应用程序必须检查表数据以判断事务所做的更改是否可用，或者提出错误以进行人工干预。\n\
  \n#### 概要\n\n本章讨论了如何在 MySQL NDB 集群中，像使用普通关系型数据库一样，使用 SQL 开发应用程序。涵盖以下主题：\n\n*   创建表和索引，以及各种类型的数据库对象。\n\
  *   了解 MySQL NDB 集群中可用的索引类型。\n*   估算表大小及其所需对象。\n*   使用磁盘数据表。\n*   从应用程序连接到 SQL 节点。\n\
  *   采用事务和错误处理技术。\n\nSQL 是一门古老但至今仍被积极使用的数据操作语言。SQL 易于使用，并且在现实世界的数据库应用开发中被广泛使用。由于\
  \ MySQL NDB 集群可以通过 SQL 访问，因此您在开发应用程序时可以享受 SQL 的强大功能。\n\n下一章将讨论如何使用 NoSQL API 在 MySQL\
  \ NDB 集群上开发应用程序。虽然 SQL 是一门非常强大的编程语言，但仍有一些问题领域是 SQL 无法解决的。在这种情况下，NoSQL API 可能会派上用场。\n\
  \n## 19. 作为 NoSQL 数据库的 MySQL NDB 集群\n\n本章讨论了如何将 MySQL NDB 集群作为 NoSQL 数据库来开发应用程序的各种方法。MySQL\
  \ NDB 集群具有多种类型的 NoSQL 协议，它们可以访问与 SQL 相同的数据，但无需使用 SQL 查询接口的开销。能够通过不同协议访问相同的数据，是 MySQL\
  \ NDB 集群在开发实际应用程序时最出色的特性之一。\n\n### 为何使用 NoSQL？\n\nSQL 是一门完美的、自包含的语言，从它能提供关系数据库所能提供的所有功能这个意义上来说。然而，从性能角度来看，它有时并不完美。在某些情况下，人们更倾向于使用更简单、更快的访问方法。MySQL\
  \ NDB 集群具有一个原生的 `NDB API` 用于访问数据节点。它还支持建立在 `NDB API` 之上的几种 NoSQL API。\n\n本章讨论 MySQL\
  \ NDB 集群支持的主要 NoSQL API。\n\n*   `memcached` API：一个基于定义良好的网络协议的、众所周知、简单、快速且易于使用的\
  \ API。MySQL NDB 集群软件包捆绑了 `memcached` 服务器，它可以访问数据节点。虽然 `memcached` 协议非常简单，但与 SQL\
  \ 相比，它提供的功能要少得多。您可以在 [`github.com/memcached/memcached/blob/master/doc/protocol.txt`](https://github.com/memcached/memcached/blob/master/doc/protocol.txt)\
  \ 找到该协议的详细信息。\n*   `NDB API`：应用程序可以使用 `NDB API` 协议直接访问数据节点。由于 `NDB API` 是一个 C++\
  \ API，因此应用程序必须使用 C++ 编写。这使得使用 `NDB API` 实现访问数据的算法比使用 SQL 更困难。例如，连接、子查询、存储过程、`GROUP\
  \ BY` 和 `ORDER BY` 等都是 SQL 中非常强大且易于使用的操作。然而，使用 `NDB API` 实现这些相同的操作却是一项非常繁琐的任务。\n\
  *   `ClusterJ`：`NDB API` 的 Java 封装。应用程序可以通过 Java 本地接口 (`JNI`) 调用 `NDB API` 函数。开发\
  \ Java 应用程序比使用 C++ 的难度要低，但它们有更高的性能开销。\n\n每种协议都可以访问与 SQL 相同的数据，且性能开销比 SQL 小。然而，SQL\
  \ 是 MySQL NDB 集群可用的最强大的 API，因此每个 NoSQL 协议都为了换取性能优势而存在各自的缺点。因此，仅使用 NoSQL 协议来开发整个应用程序并不实际。最佳策略是结合使用\
  \ SQL 和 NoSQL。复杂的算法使用 SQL 实现，而简单但快速的算法则使用 NoSQL 实现。\n\n### 通过 memcached 访问数据\n\n\
  `memcached` 是一种在内存中存储（缓存）数据的软件名称。数据以键值对的形式存储。这类数据存储软件被称为键值存储 (`KVS`)。\n\n从 MySQL\
  \ NDB 集群 7.2 系列开始，`memcached` 服务器作为软件包的一部分捆绑提供。捆绑的 `memcached` 是一个特殊版本，可以使用 MySQL\
  \ NDB 集群作为其底层存储引擎。\n\n#### 为何使用 NDB-memcached\n\n`memcached` 协议广为人知，简单、易用且快速。许多读者可能之前已经使用过\
  \ `memcached`。尽管市场上有更先进的 `KVS` 产品，但对于缓存目的而言，`memcached` 仍然是一个不错的选择。\n\n图 19-1 展示了\
  \ `memcached` 与 MySQL NDB 集群协同工作的总体架构。`memcached` 服务器使用 `NDB API` 直接连接到数据节点。因此，它像\
  \ SQL 节点一样，充当一种 API 节点的角色。应用程序通过 `memcached` 协议访问 `memcached` 服务器，然后 `memcached`\
  \ 服务器使用 `NDB API` 访问数据节点上的实际数据。为方便起见，本章中我们将 `memcached` 服务器能够使用 MySQL NDB 集群作为其存储引擎的功能称为\
  \ `NDB-memcached`。请注意，即使我们称其为产品名 `NDB-memcached`，进程名仍然是 `memcached`。带前缀的 `NDB-memcached`\
  \ 和不带前缀的 `memcached` 表示相同的事物，在本章中我们将交替使用这些术语。\n\n![A435171_1_En_19_Fig1_HTML.jpg](img/A435171_1_En_19_Fig1_HTML.jpg)\n\
  \n图 19-1. `memcached` 与 MySQL NDB 集群协同工作的总体架构\n\n当数据在 `NDB-memcached` 中被修改时，数据节点内的行数据会被直接修改。另一方面，`NDB-memcached`\
  \ 可以看到从 SQL 节点修改后的最新行数据。因此，无需在 `memcached` 和关系数据库之间同步数据。这使得应用程序开发比将 `memcached`\
  \ 仅用作缓存而将标准 MySQL 服务器用作持久存储时更加容易。此外，即使 `memcached` 崩溃，数据节点上的数据仍然会保留。与将整体数据拆分为较小分片的分片机制不同，`NDB-memcached`\
  \ 中的每个 `memcached` 服务器都可以访问数据节点中的所有数据。因此，与标准的 `memcached` 相比，`NDB-memcached` 具有明显的优势。\n\
  \n`memcached` 最重要的方面在于其在响应时间和吞吐量方面的性能。由于 `memcached` 协议比 SQL 简单得多，因此它比 SQL 更高效。在处理\
  \ SQL 时，需要解析 SQL、检查权限、优化查询执行计划等等。SQL 处理的开销远大于通过 `memcached` 访问数据。然而，`memcached`\
  \ 无法处理诸如连接之类的复杂查询。因此，可以根据这些需求采用不同的访问方法：\n\n*   使用 `NDB-memcached` 进行简单快速的数据访问。\n\
  *   使用 SQL 进行复杂查询。\n\n此策略为您的应用程序带来了灵活性和性能。\n\n#### 设置 NDB-memcached\n\n在本节中，我们将讨论如何设置\
  \ `NDB-memcached`。\n\n##### 安装 NDB-memcached\n\n安装包含 `memcached` 二进制文件及相关文件的软件包。\n\
  \n当您在 Linux 上使用 `RPM` 或 `DEB` 包管理器时，在 MySQL NDB 集群 7.5 系列或更新版本中，`memcached` 被包含在一个单独的专用软件包中。例如，软件包名称为\
  \ `mysql-cluster-community-memcached-7.5.6-1.el7.x86_64.rpm` 或 `mysql-cluster-community-memcached_7.5.6-1ubuntu16.04_amd64.deb`。在\
  \ MySQL NDB 集群 7.4 或更早版本中，`memcached` 包含在服务器 `RPM` 包或某个 `DEB` 包中。对于其他软件包格式，无论操作系统类型如何，软件包都是合并且未按功能分离的。有关安装的更多信息，请参阅第\
  \ 5 章。\n\n> 注意\n>\n> `NDB-memcached` 目前不适用于 Windows 软件包，因为 `memcached` 官方不支持 Windows\
  \ 平台。请考虑使用类 UNIX 操作系统。\n\n##### 准备 ndbmemcache 模式\n首先，设置 NDB-memcached 所需的系统模式；模式名称为\
  \ `ndbmemcache`。要创建 `ndbmemcache` 模式及其中的表，请执行包含在 `ndb_memcache_metadata.sql` 中的\
  \ SQL 语句。对于 MySQL NDB Cluster 7.5 或更新版本的 RPM 和 DEB 包，该文件位于 `/usr/share/mysql/memcached-api/`\
  \ 目录中。对于其他包类型，它位于安装目录的 `share/mysql/memcached-api/` 子目录中。按照清单 19-1 所示加载 SQL 文件。你可以看到\
  \ `ndbmemcache` 数据库下有 11 张表。\n```\nmysql> source /usr/share/mysql/memcached-api/\
  \ ndb_memcache_metadata.sql\nQuery OK, 1 row affected (1.87 sec)\nDatabase changed\n\
  Query OK, 0 rows affected (0.81 sec)\n...\nmysql> use ndbmemcache\nDatabase changed\n\
  mysql> SHOW TABLES;\n+-----------------------+\n| Tables_in_ndbmemcache |\n+-----------------------+\n\
  | cache_policies        |\n| containers            |\n| demo_table            |\n\
  | demo_table_large      |\n| demo_table_tabs       |\n| external_values       |\n\
  | key_prefixes          |\n| last_memcached_signon |\n| memcache_server_roles |\n\
  | meta                  |\n| ndb_clusters          |\n+-----------------------+\n\
  11 rows in set (0.00 sec)\nListing 19-1.\n创建 ndbmemcache 模式及表\n```\n\n##### 启动 memcached\
  \ 服务器\n确保你的 `config.ini` 文件中有一个空闲的 `[API]` 或 `[MYSQLD]` 插槽，因为 `memcached` 作为 API\
  \ 节点连接到集群。一个 memcached 进程将消耗多达四个插槽。如果没有空闲插槽，请在启动 memcached 服务器之前至少添加一个 API 节点。有关添加\
  \ API 节点的步骤，请参阅第 10 章。\n\n要启动 memcached 服务器，请运行 `memcached` 命令，如清单 19-2 所示。\n```\n\
  shell$ memcached -E /usr/lib64/mysql/ndb_engine.so \\\n-e \"connectstring=mgmhost;role=db-only\"\
  \nListing 19-2.\n启动 memcached 服务器\n```\n如清单 19-2 所示，明确指定了两个选项。这些选项特定于 NDB-memcached。每个选项的含义如下：\n\
  *   `-E`：指定要使用的存储引擎实现的共享库。\n*   `-e`：指定传递给存储引擎的选项。选项在用分号分隔的文本中指定。\n\n通过 `-e` 选项传递的引擎特定选项列于表\
  \ 19-1 中。\n\n表 19-1. 传递给 ndb_engine.so 的引擎特定选项\n\n| 选项 | 描述 |\n| --- | --- |\n|\
  \ `connectstring=` string | 连接字符串。使用与普通 NDB 程序相同的格式指定。默认值为 `localhost:1186`。 |\n\
  | `role=` string | 分配给此 memcached 服务器的角色。默认值为 `default_role`。见下一节。 |\n| `scheduler=`\
  \ string | 以 `name:configuration` 格式指定调度器属性。默认为 `\"S:c0,f0,t1\"`，表示调度器名称为 `S`，S-调度器的选项为\
  \ `c0,f0,t1`。 |\n| `reconf={true\\|false}` | 指定是否允许在线重新配置。默认值为 `true`。 |\n| `debug={true\\\
  |false}` | 如果要调试 NDB-memcached，则设置为 `true`。默认值为 `false`。 |\n\n`scheduler` 的配置稍微复杂。除了\
  \ S-调度器（调度器名称有 `73`, `stockholm`, `trondheim`）外还有其他调度器，但 S-调度器经过最充分的测试，在大多数情况下已足够。S-调度器的参数以无空格的逗号分隔字符串表示，每个字符串以一个字母开头后跟一个数字。每个参数的含义如下：\n\
  *   `c`：指定到集群的连接数，就像 `mysqld` 中的 `--ndb-cluster-connection-pool` 一样。可能的范围是 0 – 4。默认值为\
  \ 0，表示自动。\n*   `f`：指定是否使用强制发送。默认值为 0（false）。此选项与 `mysqld` 中的 `--force-send` 选项效果相同。\n\
  *   `t`：设置发送线程计时器（毫秒）。可能的范围是 1 – 10。默认值为 1。\n\n其他 memcached 选项也可用，就像标准 memcached\
  \ 一样。有关可用选项的完整列表，请参阅 `memcached -h` 的输出。默认情况下，memcached 监听端口 11211。你可以使用 `telnet`\
  \ 命令测试 NDB-memcached，如清单 19-3 所示。如果你的操作系统上没有 `telnet` 命令（因为它是一个过时的命令），请尝试使用包中随 memcached\
  \ 一起提供的 `memclient` 命令。\n```\nshell$ telnet localhost 11211\nTrying ::1...\nConnected\
  \ to localhost.\nEscape character is '^]'.\nset love 0 0 5\npeace\nSTORED\nset b:big\
  \ 0 0 5\nsmall\nSTORED\n^]\ntelnet> quit\nConnection closed.\nshell$ memclient -a\n\
  Memclient 1.0 using Term::ReadLine::Stub\nAttempting ASCII connection to localhost:11211\
  \ ...\nConnected.\nmemcache > get love\nKEY        | FLAGS |Value\nlove        \
  \      | 0     |peace\nListing 19-3.\n连接到 NDB-memcached 并运行一些测试\n```\n你可以看到值存储在\
  \ NDBCluster 表中，如清单 19-4 所示。\n```\nmysql> SELECT * FROM ndbmemcache.demo_table;\n\
  +------+------------+-------+-------------+--------------+\n| mkey | math_value\
  \ | flags | cas_value   | string_value |\n+------+------------+-------+-------------+--------------+\n\
  | love |       NULL |     0 | 83214991362 | peace        |\n+------+------------+-------+-------------+--------------+\n\
  1 row in set (0.00 sec)\nmysql> SELECT * FROM ndbmemcache.demo_table_large;\n+------+-------+-------------+--------------+--------+----------+\n\
  | mkey | flags | cas_value   | string_value | ext_id | ext_size |\n+------+-------+-------------+--------------+--------+----------+\n\
  | big  |     0 | 83214991365 | small        |   NULL |     NULL |\n+------+-------+-------------+--------------+--------+----------+\n\
  1 row in set (0.00 sec)\nListing 19-4.\n从 SQL 节点访问与 NDB-memcached 相同的数据\n```\n如清单\
  \ 19-4 所示，值存储在 `demo_table` 和 `demo_table_large` 中。为什么它们存储在这些表中？是否可以通过 NDB-memcached\
  \ 访问任意表？这是下一个主题。\n\n#### 定义到 NDB Cluster 表的映射\n从清单 19-4 中可以看到，两个键 `love` 和 `b:big`\
  \ 存储在不同的表中。这是因为后者键有一个前缀 `b:`。NDB-memcached 可以根据前缀值访问不同的表。前缀 `b:` 是默认预定义的。此功能非常重要，因为如果只是访问演示表，它是没有用的。\n\
  \n要理解到表的映射，以下概念是关键点：\n*   **角色**：分配给每个 memcached 服务器的角色。在 `memcache_server_roles`\
  \ 表中定义，并在启动 `memcached` 进程时在 `-e` 选项中指定。\n*   **前缀**：每个键的前缀。\n*   **策略**：映射到每个值的缓存策略。\n\
  *   **容器**：定义在 `NDBCluster` 存储引擎中用于存储键值对的表（或多张表）。\n\n简而言之，角色和前缀的组合决定了使用哪对策略和容器。\n\
  \n#### 定义容器\n\n`Container` 定义了要从 NDB-memcached 访问的表和列。当然，目标表必须是 NDB Cluster 表。映射到表的键部分最多可由四列组成。键列集合必须由目标表上的主键或辅助唯一索引组成。映射到表的值部分最多可由\
  \ 16 列组成。如果键部分或值部分包含多个列，则必须在 memcached 客户端中以制表符分隔的格式指定。\n\n准备好目标表后，在 `ndbmemcache`\
  \ 数据库下的 `containers` 表中插入一条记录。`containers` 表包含表 [19-2] 中列出的列。\n\n表 19-2.\n`containers`\
  \ 表中的列\n\n| 列名 | 可否为空 | 描述 |\n| --- | --- | --- |\n| `name` | 否 | 容器的名称。 |\n| `db_schema`\
  \ | 否 | 目标表的数据库名。 |\n| `db_table` | 否 | 目标表名。 |\n| `key_columns` | 否 | 用作 memcached\
  \ 操作键的列的逗号分隔列表。最多可指定四列。如果在此表中指定了多列，则 memcached API 中的值必须以制表符分隔的格式指定。 |\n| `value_columns`\
  \ | 是 | 用作 memcached 存储/读取的值的列的逗号分隔列表。最多可指定 16 列。如果在此表中指定了多列，则 memcached API 中的值必须以制表符分隔的格式指定或检索。\
  \ |\n| `flags` | 否 | 目前未使用。 |\n| `increment_column` | 是 | 用于存储在 memcached `INCR`\
  \ 和 `DECR` 操作中使用的数值的列。如果设置，该列在目标表中必须定义为 `BIGINT UNSIGNED`。 |\n| `cas_column` | 是\
  \ | 用于 memcached 上的 Compare and Swap (CAS) 操作的列。如果设置，该列在目标表中必须定义为 `BIGINT UNSIGNED`。\
  \ |\n| `expire_time_column` | 是 | 用于确定行是否过期的列。如果设置，该列在目标表中必须定义为 `TIMESTAMP`。当从 memcached\
  \ 访问时，如果列值早于当前时间，则从目标表中删除该行。 |\n| `large_values_table` | 是 | 用于存储像 `BLOB` 数据这样的大型数据的表。\
  \ |\n\n以下 SQL 命令插入一个条目，以通过 NDB-memcached 访问 `world.City` 表。在此示例中，容器被命名为 `world_city`。`world.City`\
  \ 表中的两个非主键列被列在 `value_columns` 值中。\n\n```\nmysql> INSERT INTO containers VALUES('world_city',\
  \ 'world', 'City', 'ID', 'Name,CountryCode', 0, NULL, NULL, NULL, NULL);\nQuery\
  \ OK, 1 row affected (0.00 sec)\n```\n\n如果 `large_values_table` 不为空，则用于存储大值的表必须具有定义，如代码清单\
  \ [19-5] 所示。\n\n```\nCREATE TABLE IF NOT EXISTS `external_values` (\n`id` INT UNSIGNED\
  \ AUTO_INCREMENT NOT NULL,\n`part` SMALLINT NOT NULL,\n`content` VARBINARY(13950)\
  \ NOT NULL,\nPRIMARY KEY (id,part)\n) ENGINE = NDBCluster;\n```\n代码清单 19-5.\n存储大值的表的定义\n\
  \n#### 审查策略\n\nNDB-memcached 可以将数据存储在 memcached 中，也可以存储在 `NDBCluster` 表中。选择将数据存储在\
  \ memcached 中还是 `NDBCluster` 表中的偏好在 `ndbmemcache` 数据库下的 `cache_policies` 表中定义。`cache_policies`\
  \ 表中有六种预定义策略，如代码清单 [19-6] 所示。\n\n```\nmysql> SELECT * FROM cache_policies\\G\n***************************\
  \ 1. row ***************************\npolicy_name: memcache-only\nget_policy: cache_only\n\
  set_policy: cache_only\ndelete_policy: cache_only\nflush_from_db: false\n***************************\
  \ 2. row ***************************\npolicy_name: caching-with-local-deletes\n\
  get_policy: caching\nset_policy: caching\ndelete_policy: cache_only\nflush_from_db:\
  \ false\n*************************** 3. row ***************************\npolicy_name:\
  \ ndb-read-only\nget_policy: ndb_only\nset_policy: disabled\ndelete_policy: disabled\n\
  flush_from_db: false\n*************************** 4. row ***************************\n\
  policy_name: ndb-test\nget_policy: ndb_only\nset_policy: ndb_only\ndelete_policy:\
  \ ndb_only\nflush_from_db: true\n*************************** 5. row ***************************\n\
  policy_name: ndb-only\nget_policy: ndb_only\nset_policy: ndb_only\ndelete_policy:\
  \ ndb_only\nflush_from_db: false\n*************************** 6. row ***************************\n\
  policy_name: caching\nget_policy: caching\nset_policy: caching\ndelete_policy: caching\n\
  flush_from_db: false\n6 rows in set (0.00 sec)\n```\n代码清单 19-6.\n显示预定义的缓存策略\n\n\
  `cache_policies` 中的每一列都具有表 [19-3] 中列出的含义。\n\n表 19-3.\n`cache_policies` 表中列的描述\n\n\
  | 列名 | 描述 |\n| --- | --- |\n| `policy_name` | 策略的名称。该名称用于与角色和前缀进行映射。 |\n| `get_policy`\
  \ | 应用于 memcached `get` 操作的策略。 |\n| `set_policy` | 应用于 memcached `set` 操作的策略。 |\n\
  | `delete_policy` | 应用于 memcached `delete` 操作的策略。 |\n| `flush_from_db` | 指定在 memcached\
  \ 的 `flush_all` 操作时是否删除表中的所有行。 |\n\n`cache_policies` 表中三个策略列的可接受值描述如下：\n\n*   `cache_only`：仅在\
  \ memcached 自身的内存存储中获取、设置和删除数据。\n*   `ndb_only`：仅在关联的容器表中获取、设置和删除数据。\n*   `caching`：数据同时存储在\
  \ memcached 的内存存储和关联的容器表中。memcached 的存储用作容器表的缓存。在执行 `get` 操作时首先搜索缓存，如果在 memcached\
  \ 的内存数据存储中找到数据，则跳过任何进一步的搜索。在执行 `set` 和 `delete` 操作时，memcached 内存存储和关联容器表中的数据都会被更新或删除。\n\
  *   `disabled`：该操作不允许。\n\n查看预定义的策略，并选择适合你应用程序的策略。如果你只是想通过 memcached 协议访问与 NDB Cluster\
  \ 表相同的数据，那么 `ndb-only` 是选择。或者，如果你希望允许从 memcached 只读访问 NDB Cluster 表，请选择 `ndb-read-only`。`ndb-test`\
  \ 策略与 `ndb-only` 策略非常相似，除了 `flush_from_db` 设置。由于在 `flush_all` 操作时删除所有行是一个有点危险的操作，我建议不要使用此策略。\n\
  \n对于缓存策略，`caching` 和 `caching-with-local-deletes`，如果只更新其中之一，当然有可能 memcached 内存存储中的数据和容器表中的数据会不同步。使用缓存策略时要小心。`memcache-only`\
  \ 策略不访问容器表。数据不持久化，也不会同步到其他 memcached 实例。\n\n如果没有策略完全符合你的需求，你可以将自己的策略添加到 `cache_policies`\
  \ 表中。\n\n\n#### 定义服务器角色\n\n每个 memcached 服务器都被分配了一个角色。角色本身只是一个标签，定义在 `ndbmemcache`\
  \ 数据库下的 `memcache_server_roles` 表中。清单 19-7 展示了一个包含预定义角色的 `memcache_server_roles`\
  \ 表示例。\n\n```\nmysql> SELECT * FROM memcache_server_roles;\n+--------------+---------+---------+---------------------+\n\
  | role_name    | role_id | max_tps | update_timestamp    |\n+--------------+---------+---------+---------------------+\n\
  | large        |       4 |  100000 | 2017-06-11 17:13:35 |\n| default_role |   \
  \    0 |  100000 | 2017-06-11 17:13:35 |\n| db-only      |       1 |  100000 | 2017-06-11\
  \ 17:13:35 |\n| ndb-caching  |       3 |  100000 | 2017-06-11 17:13:35 |\n| mc-only\
  \      |       2 |  100000 | 2017-06-11 17:13:35 |\n+--------------+---------+---------+---------------------+\n\
  5 rows in set (0.00 sec)\n清单 19-7.\nmemcached_server_roles 表的示例内容\n```\n\n如你所见，每个角色都有一个数字标识符，显示在\
  \ `role_id` 列中。此值用于定义前缀与缓存策略和容器对之间的映射。\n\n你可以使用预定义的角色，也可以添加自己的角色。由于每个 memcached\
  \ 服务器实例的行为会根据分配的角色而不同，因此，如果你想运行具有不同行为的 memcached 服务器，可以根据需要定义任意多个角色。\n\n#### 定义映射\n\
  \n现在，你可以定义角色与前缀对以及缓存策略和容器对之间的映射。定义方法是向 `ndbmemcache` 数据库下的 `key_prefixes` 表添加条目。表\
  \ 19-4 列出了 `key_prefixes` 表中的列。\n\n表 19-4.\nkey_prefixes 表中的列\n\n| 列 | 描述 |\n| ---\
  \ | --- |\n| `server_role_id` | 使用 `memcached_server_roles` 表中 `role_id` 列的值来指定角色。\
  \ |\n| `key_prefix` | 为 memcached 操作指定的键的前缀。 |\n| `cluster_id` | 指定要访问的集群的标识符。访问默认集群时设置为\
  \ 0。本书不讨论使用多个集群与 NDB-memcached 的情况，因为这不是常见用法。 |\n| `policy` | 要应用的策略名称。此列的值必须在 `cache_policies`\
  \ 表的 `policy_name` 列中定义。 |\n| `container` | 要存储的容器名称。此列的值必须在 `containers` 表的 `name`\
  \ 列中定义。如果策略不需要表访问（例如 `memcache-only`），此列可以为 `NULL`。 |\n\n以下 SQL 命令是一个向 `key_prefixes`\
  \ 表添加条目的命令。在此示例中，使用前缀 `wc:` 在具有 `db-only` (`role_id` 为 1) 角色的 memcached 服务器上，通过\
  \ `world_city` 容器访问 `world.City` 表中的行，不进行缓存。\n\n```\nmysql> INSERT INTO key_prefixes\
  \ VALUES(1, 'wc:', 0, 'ndb-only', 'world_city');\n```\n\n#### 将设置应用到正在运行的 memcached\
  \ 实例\n\n前缀映射在 memcached 服务器启动时读取。因此，你可以通过重启 memcached 服务器来应用设置。这是应用设置最简单安全的方式。\n\
  \n如果你想在不停止 memcached 服务器的情况下应用更改，请将 `memcache_server_roles` 表的 `update_timestamp`\
  \ 列更新为当前时间戳，如下例所示。\n\n```\nmysql> UPDATE memcache_server_roles SET update_timestamp\
  \ = NOW() WHERE role_name = 'db-only';\nQuery OK, 1 row affected (0.00 sec)\nRows\
  \ matched: 1  Changed: 1  Warnings: 0\n```\n\n然后，`memcached` 进程将通过读取 `ndbmemcache`\
  \ 数据库下表中的配置来重新配置映射。现在，你可以使用前缀 `wc:` 访问 `world.City` 表，如清单 19-8 所示。请注意，检索到的值包含许多空格。这是由\
  \ `CHAR` 数据类型加上用于分隔两个列值的制表符造成的尾随空格。\n\n```\nmemclient -a\nMemclient 1.0 using Term::ReadLine::Stub\n\
  Attempting ASCII connection to localhost:11211 ...\nConnected.\nmemcache > get wc:1532\n\
  KEY        | FLAGS |Value\nwc:1532           | 0     |Tokyo                    \
  \            JPN\n清单 19-8.\n从 memcached 访问 world.City 表\n```\n\n当你在生产系统中使用 NDB-memcached\
  \ 时，我建议在定义映射之前截断 `key_prefixes` 表。预定义的映射在大多数情况下除了演示目的外没有用。你也可以删除 `ndbmemcache` 数据库中的演示表。\n\
  \n#### 在你的应用程序中通过 memcached 协议访问 NDBCluster 表\n\n要在应用程序中通过 memcached 协议访问 `NDBCluster`\
  \ 表，你必须安装适合你编程语言的 memcached 客户端库。访问 memcached 的客户端库并未捆绑在 MySQL NDB Cluster 软件包中，因此你必须自行获取。由于\
  \ memcached 是众所周知的常用软件，市场上有许多客户端库可供选择。\n\n例如，以下客户端库可用：\n\n*   Java：[`github.com/gwhalin/Memcached-Java-Client`](https://github.com/gwhalin/Memcached-Java-Client)\n\
  *   .NET：[`github.com/enyim/EnyimMemcached`](https://github.com/enyim/EnyimMemcached)\n\
  *   PHP：PECL 上提供的 memcached（libmemcached 绑定）和 memcached（原始实现）\n*   Python：[`github.com/linsomniac/python-memcached`](https://github.com/linsomniac/python-memcached)\
  \ , [`github.com/pinterest/pymemcache`](https://github.com/pinterest/pymemcache)\n\
  *   Ruby：[`github.com/arthurnn/memcached`](https://github.com/arthurnn/memcached)\n\
  *   Perl：Cache::Memcached CPAN 模块\n\n#### 性能调优\n\n有几个参数需要为 NDB-memcached 进行调整。\n\
  \n*   调度器：调度器设置可以通过 `-e` 选项的 `scheduler` 部分进行调整，如本节前面所述。如果你希望获得更好的吞吐量，考虑增加到数据节点的连接数（`c`\
  \ 参数）和发送线程计时器（`t` 参数）。如果你希望获得更好的响应时间，请打开强制发送（将 `1` 设置给 f 参数）。\n*   memcached 中使用的\
  \ NDB 对象数量：调整 `memcache_server_roles` 表中的 `max_tps` 列值和 `ndb_clusters` 表中的 `microsec_rtt`\
  \ 列值。`max_tps` 或 `microsec_rtt` 越大，memcached 中使用的 NDB 对象就越多。需要更多的 NDB 对象来并行处理对集群的更多访问，代价是内存使用量的增加。\n\
  \n### 通过 NDB API 访问数据\n\n虽然 `NDB-memcached` 是一个利用便捷的 memcached API 来获得更好性能的强大选择，但它仍然缺少一些功能并有一些性能开销。为了满足严格的要求，原生的\
  \ NoSQL 访问方法——NDB API，是最后的手段。\n\n\n\n#### 为何使用 NDB API？\n\n虽然 `NDB API` 是访问 `MySQL\
  \ NDB Cluster` 中表的一种优秀方法，但它并非应用开发的万灵药。当然，就像任何其他软件一样，使用 `NDB API` 也有其利弊。\n\n`NDB\
  \ API` 的优点包括：\n\n*   使用 `NDB API` 客户端库链接的应用程序直接连接到数据节点。它们之间没有带来开销的中继点。因此，在响应时间和吞吐量方面，`NDB\
  \ API` 是追求性能的最佳选择。\n*   它是一个类似 SQL 的事务性 API。虽然 `memcached` 很方便，但它的操作是非事务性的。\n* \
  \  它能执行数据节点提供的所有功能。虽然 `memcached` 很方便，但其功能非常有限；它只能对预定义的表执行基于查找的操作。`NDB API` 不仅能执行查找，还能对集群中的任何表执行扫描、条件搜索和参数化查询。\n\
  \n`NDB API` 的缺点包括：\n\n*   它是一个非常底层的 API，因此实现起来需要更多工作。虽然理论上它可以执行集群上的所有操作，但实现与 SQL\
  \ 相同的功能需要编写大量代码。例如，`JOIN` 是 SQL 中的常见操作，理论上可以使用 `NDB API` 实现；然而，这需要大量的代码。\n*   它主要面向\
  \ C++ 应用程序。虽然有其他编程语言的绑定，但在使用这些绑定时会有一些开销。使用 `Java`、`PHP`、`Python` 和 `Ruby` 等流行的 Web\
  \ 编程语言开发应用程序比开发 C++ 应用程序更容易。\n\n请仔细考虑 `NDB API` 是否适合您的应用需求。在功能方面，SQL 对于常见的应用开发已经足够。当需要更好的性能时，可以使用\
  \ `NDB-memcached`。尽管它比 `NDB API` 慢且不提供事务，但使用 `NDB-memcached` 要容易得多。\n\n#### 安装 NDB\
  \ API 的头文件和库\n\n要使用 `NDB API` 开发应用程序，必须在您的开发机器上安装头文件和库。在 `MySQL NDB Cluster` 7.5\
  \ 系列或更新版本中，所需的文件包含在以下软件包中：\n\n*   `RPM`：`ndbclient-devel` 软件包包含头文件和静态库。`ndbclient`\
  \ 软件包包含共享库。\n*   `DEB`：`ndbclient-dev` 软件包包含头文件和静态库。`ndbclient` 软件包包含共享库。\n*   全能软件包：所需文件捆绑在软件包中。\n\
  \n在 `MySQL NDB Cluster` 7.4 系列或更早版本中，所需的文件包含在以下软件包中：\n\n*   `RPM`：`devel` 软件包包含头文件和静态库。`server`\
  \ 软件包包含共享库。\n*   `DEB`：只有一个未按功能分离的 `deb` 软件包。唯一可用的软件包类型是一个全能的 `DEB` 软件包。\n*   全能软件包：所需文件捆绑在软件包中。\n\
  \n由于 `Windows` 和 `macOS` 仅提供全能软件包，所需的库捆绑在软件包中。然而，看起来 `Windows` 的 `MSI` 软件包没有 `ndbclient`\
  \ 库 (`ndbclient.dll`) 的动态链接版本。目前请使用 `Zip` 归档软件包。\n\n#### 使用 NDB API 构建应用程序\n\n要使用\
  \ `NDB API` 构建应用程序，您需要一个 `C++` 编译器。因此，请事先在您的开发机器上安装编译器。要编译程序并将其链接到 `libndbclient`\
  \ 库，必须向编译器和链接器传递适当的选项。\n\n编译器选项可以使用 `mysql_config` 命令获取。`mysql_config` 命令根据您的软件包安装布局显示所需的编译器选项。通用编译器选项可以使用\
  \ `--cflags` 选项获取，如下面的命令所示。请注意，此示例的第二行是此命令显示的结果。\n\n```\nshell$ mysql_config --cflags\n\
  -I/usr/include/mysql -g -fno-strict-aliasing   -DNDEBUG\n```\n\n还需要指定头文件位置的选项。这些选项可以使用带有\
  \ `--include` 选项的 `mysql_config` 命令获取。头文件位于通过 `mysql_config --include` 命令获取的包含路径下的\
  \ `storage/ndb`、`storage/ndb/ndbapi` 和 `storage/ndb/mgmapi` 子目录中。因此，您可以如下面的命令所示设置\
  \ `CXXFLAGS` 编译器选项。\n\n```\nshell$ CXXFLAGS=\"`mysql_config --cflags` \\\n`mysql_config\
  \ --include`/storage/ndb \\\n`mysql_config --include`/storage/ndb/ndbapi \\\n`mysql_config\
  \ --include`/storage/ndb/mgmapi\"\nshell$ export CXXFLAGS\n```\n\n如果您想通过环境变量将这些选项传递给编译器，可以像此示例一样导出它们。如果您还使用标准的\
  \ `MySQL C API`，请将 `mysql_config --include` 命令的输出（不带任何子目录）添加到编译器选项中。\n\n除了编译器选项外，还必须设置链接器选项。要获取链接器选项，请运行带有\
  \ `--libs_r` 选项的 `mysql_config` 命令。链接器还需要要链接的库列表。`NDB API` 应用程序所需的库是 `libndbclient`。根据库名称指定的约定，将\
  \ `-lndbclient` 添加到链接器选项中。以下命令设置了链接器选项。如果您也使用标准的 `MySQL C API`，请也将 `-lmysqlclient`\
  \ 添加到该选项中。\n\n```\nshell$ LDFLAGS=\"`mysql_config --libs_r` -lndbclient\"\n```\n\
  \n然后，您可以使用编译器编译您的应用程序，如下面的命令示例所示。在此示例中，使用来自 `GNU Compiler Collection` 的 `C++` 编译器\
  \ `g++` 来编译程序源文件 `example.cc`。\n\n```\nshell$ g++ $CXXFLAGS $LDFLAGS example.cc\
  \ -o example\n```\n\n\n\n##### 典型程序流程\n\n在程序开头需要包含 `NdbApi.hpp` 头文件。程序一开始就要调用 `ndb_init()`\
  \ 来初始化 NDB API。在程序退出前，应调用 `ndb_end(0)` 进行清理。\n\n即使在开发 NDB API 程序时，也经常需要配合使用 MySQL\
  \ C API（或你喜欢的 MySQL C++ 驱动）。这两个 API 库根据情况使用：\n-   应用程序使用 MySQL C API 访问 SQL 节点，以创建、删除或检查数据库对象。通过\
  \ SQL 节点执行复杂查询（如连接）是值得的。\n-   应用程序使用 NDB API 直接访问数据节点以进行数据访问。\n\n如果想使用 MySQL C API，除了\
  \ `NdbApi.hpp`，还需要包含 `mysql.h`，如代码清单 19-9 所示。别忘了调整编译器选项，以便在 NDB API 头文件路径之外添加 `mysql.h`\
  \ 的路径。确保程序在错误退出时调用了 `ndb_exit(0)`。如果使用 `exit()` 函数终止程序，很可能不会调用 `ndb_exit(0)`。我建议编写一个执行必要清理并退出的函数，在程序因错误退出时调用它。\n\
  \n```c\n#include <NdbApi.hpp>\n#include <mysql.h>\n... snip ...\nint main(int argc,\
  \ char *argv[])\n{\n    ndb_init();\n    ... snip ...\n    ndb_end(0);\n    return\
  \ 0;\n}\n```\n代码清单 19-9.\n使用 NDB API 和 MySQL C API 的程序的典型结构\n\n由于 NDB API 是用 C++\
  \ 这种典型的面向对象语言编写的，功能被实现为各种类。表 19-5 列出了 NDB API 程序中使用的主要类。\n\n表 19-5.\nNDB API 程序中常用的类\n\
  \n| 类 | 描述 |\n| --- | --- |\n| `Ndb_cluster_connection` | 管理与集群的连接。连接字符串传递给其构造函数。\
  \ |\n| `Ndb` | 访问数据节点的句柄。单个程序中的 `Ndb` 对象数量有上限。一个程序最多可创建 4711 个 `Ndb` 对象。 |\n| `NdbDictionary`\
  \ | 用于处理指定目标对象所需元数据的类。该类有各种子类来处理专用对象，例如 `Dictionary`、`Table`、`Column`、`Index` 和\
  \ `Event`。 |\n| `NdbTransaction` | 用于执行事务和基于记录的操作的类。 |\n| `NdbOperation` | 用于指定要执行操作的类。有几个子类来处理特定操作：`NdbIndexOperation`\
  \ 类用于辅助唯一索引查找，`NdbScanOperation` 类用于表扫描，`NdbScanOperation` 类用于索引扫描。`NdbOperation`\
  \ 类本身用于基于主键查找的操作。 |\n| `NdbScanFilter` | 用于定义应用于数据节点扫描的过滤器的类。 |\n| `NdbRecAttr`\
  \ | 用于按属性操作数据的类。 |\n| `NdbRecord` | 用于按行记录操作数据的类。 |\n| `NdbBlob` | 用于操作 blob 数据的类。\
  \ |\n| `NdbInterpretedCode` | 表示解释代码的类，该代码直接在数据节点上执行。该类与 `NdbRecord` 一起使用。 |\n|\
  \ `NdbEventOperation` | 用于处理通过 micro-GCP 通知的每个表修改事件的类。 |\n| `NdbError` | 用于检索错误信息的类。\
  \ |\n\n图 19-2 描述了 NDB API 程序的典型工作流程。在此工作流程中，程序使用了表 19-6 中列出的类。\n\n![A435171_1_En_19_Fig2_HTML.jpg](img/A435171_1_En_19_Fig2_HTML.jpg)\n\
  图 19-2.\nNDB API 程序典型流程的语义图\n\n##### 简单的读取示例\n\n正如他们所说，“眼见为实”。因此，本节向你展示一个如代码清单 19-11\
  \ 所示的可工作示例。查看示例代码中的注释。要运行本节中的示例程序，你需要在集群中设置 `world` 示例数据库。然后删除外键并将存储引擎更改为 `NDBCluster`。有关如何设置\
  \ `world` 示例数据库，请参考手册：[`dev.mysql.com/doc/world-setup/en/world-setup-installation.html`](https://dev.mysql.com/doc/world-setup/en/world-setup-installation.html)。代码清单\
  \ 19-10 展示了一个使用 NDB Cluster 存储引擎设置 `world` 数据库的命令示例。\n\n```sql\nmysql> source /path/to/world.sql\n\
  ... snip ...\nmysql> use world\nDatabase changed\nmysql> ALTER TABLE City DROP FOREIGN\
  \ KEY city_ibfk_1;\nQuery OK, 0 rows affected (0.11 sec)\nRecords: 0  Duplicates:\
  \ 0  Warnings: 0\nmysql> ALTER TABLE CountryLanguage DROP FOREIGN KEY countryLanguage_ibfk_1;\n\
  Query OK, 0 rows affected (0.09 sec)\nRecords: 0  Duplicates: 0  Warnings: 0\nmysql>\
  \ ALTER TABLE Country ENGINE NDBCluster;\nQuery OK, 239 rows affected (1.61 sec)\n\
  Records: 239  Duplicates: 0  Warnings: 0\nmysql> ALTER TABLE City ENGINE NDBCluster;\n\
  Query OK, 4079 rows affected (2.42 sec)\nRecords: 4079  Duplicates: 0  Warnings:\
  \ 0\nmysql> ALTER TABLE CountryLanguage ENGINE NDBCluster;\nQuery OK, 984 rows affected\
  \ (1.87 sec)\nRecords: 984  Duplicates: 0  Warnings: 0\n```\n代码清单 19-10.\n使用 NDB\
  \ Cluster 存储引擎设置 world 数据库\n\n```cpp\n#include <iostream>\n#include <NdbApi.hpp>\n\
  #include <stdlib.h>\nconst char *connectstring = \"mgmhost\";\nconst char *db =\
  \ \"world\";\nclass NdbApiExample1 {\npublic:\n    NdbApiExample1() : cluster_connection(NULL),\
  \ myNdb(NULL),\n                       myDict(NULL), myTable(NULL) {};\n    ~NdbApiExample1();\n\
  \    int doTest();\nprivate:\n    void print_error(const NdbError &e, const char\
  \ *msg)\n    {\n        std::cerr << msg << endl;\n        std::cerr << \"Error\
  \ code: \" << e.code << endl;\n        std::cerr << \"Error message: \" << e.message\
  \ << endl;\n    }\n    Ndb_cluster_connection *cluster_connection;\n    Ndb *myNdb;\n\
  \    NdbDictionary *myDict;\n    const NdbDictionary::Table *myTable;\n    NdbTransaction\
  \ *myTransaction;\n    NdbOperation *myOperation;\n};\nNdbApiExample1::~NdbApiExample1()\n\
  {\n    if (myTransaction) myNdb->closeTransaction(myTransaction);\n    if (myNdb)\
  \ delete myNdb;\n    if (cluster_connection) delete cluster_connection;\n    ndb_end(0);\n\
  }\nint NdbApiExample1::doTest()\n{\n    // Step 1. Initialize the NDB API\n    ndb_init();\n\
  \    // Step 2. Connect to the Cluster\n    cluster_connection = new Ndb_cluster_connection(connectstring);\n\
  \    if (cluster_connection->connect(4 /* retries               */,\n          \
  \                          5 /* delay between retries */,\n                    \
  \                1 /* verbose               */)) {\n        std::cerr << \"Connect\
  \ to cluster failed.\" << endl;\n        return 1;\n    }\n    if (cluster_connection->wait_until_ready(30,0))\
  \ {\n        std::cerr << \"Cluster was not ready within 30 secs.\" << endl;\n \
  \       return 2;\n    }\n    // Step 3. Create a database object\n    myNdb = new\
  \ Ndb(cluster_connection, db);\n    if (myNdb == NULL) {\n        std::cerr << \"\
  Could not create database object.\" << endl;\n        return 3;\n    }\n    if (myNdb->init()\
  \ == -1) {\n        print_error(myNdb->getNdbError(),\n                    \"Could\
  \ not connect to the database object.\");\n        return 3;\n    }\n    // Step\
  \ 4. Get table handle\n    myDict= myNdb->getDictionary();\n    myTable= myDict->getTable(\"\
  Country\");\n    if (myTable == NULL) {\n        print_error(myDict->getNdbError(),\
  \ \"Could not retrieve a table.\");\n        return 4;\n    }\n    // Step 5. Start\
  \ transaction\n    myTransaction= myNdb->startTransaction();\n    if (myTransaction\
  \ == NULL) {\n        print_error(myNdb->getNdbError(), \"Could not start transaction.\"\
  );\n        return 5;\n    }\n    // Step 6. Get operation handle\n    myOperation=\
  \ myTransaction->getNdbOperation(myTable);\n    if (myOperation == NULL) {\n   \
  \     print_error(myTransaction->getNdbError(),\n                    \"Could not\
  \ retrieve an operation.\");\n        return 6;\n    }\n    // Step 7. Specify type\
  \ of operation and search condition\n    myOperation->readTuple(NdbOperation::LM_Read);\n\
  \    myOperation->equal(\"Code\", \"JPN\");\n    // Step 8. Get buffers for results\n\
  \    NdbRecAttr *Name = myOperation->getValue(\"Name\", NULL);\n    NdbRecAttr *Capital\
  \ = myOperation->getValue(\"Capital\", NULL);\n    if (Name == NULL || Capital ==\
  \ NULL) {\n        print_error(myTransaction->getNdbError(),\n                 \
  \   \"Could not allocate attribute records.\");\n        return 7;\n    }\n    //\
  \ Step 9. Send a request to data nodes\n    if (myTransaction->execute( NdbTransaction::Commit\
  \ ) == -1) {\n        print_error(myTransaction->getNdbError(), \"Transaction failed.\"\
  );\n        return 8;\n    }\n    // Step 10. Retrieve values\n    std::cout <<\
  \ \"Country name: \" << Name->aRef() << endl;\n    std::cout << \"Capital: \" <<\
  \ Capital->u_32_value() << endl;\n    return 0;\n}\nint main(int argc, char *argv[])\n\
  {\n    NdbApiExample1 ex;\n    return ex.doTest();\n}\n```\n代码清单 19-11.\n读取表中一行的示例\
  \ NDB API 程序\n\n这段代码简单明了。所有工作都在 `NdbApiExample1` 类的 `doTest()` 函数中完成。让我们检查此程序中的每个步骤。\n\
  \n###### 步骤 1. 初始化 NDB API\n\n必须在程序开头调用 `ndb_init()`。\n\n###### 步骤 2. 连接到集群\n\n\
  连接字符串传递给 `Ndb_cluster_connection` 类的构造函数。成功创建该类的实例后，代码调用 `connect()` 成员函数以连接到集群。\n\
  \n\n\n###### 步骤 3：连接到 world 数据库\n\n使用一个 `Ndb` 类实例连接到 `world` 数据库。由于 `Ndb` 类不是线程安全的，你必须为每个线程创建专用的\
  \ `Ndb` 类实例。请勿在多个线程间共享 `Ndb` 类实例。每个进程最多可创建 4177 个 `Ndb` 类实例。\n\n###### 步骤 4：获取表句柄\n\
  \n获取一个句柄以访问 `Country` 表。访问对象时，你需要获取一个 `NdbDictionary::Dictionary` 类的实例。然后，通过获取到的字典来获取更多对象。\n\
  \n你可以复用从字典中检索到的对象。\n\n###### 步骤 5：启动事务\n\n事务必须显式启动。\n\n###### 步骤 6：获取操作句柄\n\n从 `NdbTransaction`\
  \ 类的实例中检索操作句柄对象，该实例在事务启动时获取。由于此示例是关于主键查找的，因此使用 `NdbTransaction::getNdbOperation()`\
  \ 函数来获取一个 `NdbOperation` 类的实例。请从以下函数中调用相应的函数以获取合适的操作句柄：\n\n*   `NdbTransaction::getNdbOperation()`\n\
  *   `NdbTransaction::getNdbIndexOperation()`\n*   `NdbTransaction::getNdbScanOperation()`\n\
  *   `NdbTransaction::getNdbIndexScanOperation()`\n\n###### 步骤 7：指定操作类型和搜索条件\n\n\
  在这一步，声明将要执行的操作类型。在本例中，通过调用 `NdbOperation::readTuple()` 函数，将读取指定为操作。这个函数的名字容易让人误解，因为它给人一种“调用此函数即执行读取操作”的印象。然而，该函数只是声明了即将执行的操作类型。操作将在稍后执行。\n\
  \n`NdbOperation` 类中定义了以下五种操作：\n\n*   `readTuple`: 根据主键值读取一行。\n*   `insertTuple`:\
  \ 插入一行。\n*   `updateTuple`: 更新主键值匹配的行。\n*   `writeTuple`: 如果匹配的行已存在则更新，如果不存在则插入。\n\
  *   `deleteTuple`: 删除主键值匹配的行。\n\n请注意，`NdbOperation::readTuple()` 接受一个参数 `NdbOperation::LM_Read`。此参数指定了锁模式，在本例中是共享锁。你可以使用以下四种模式指定锁模式：\n\
  \n*   `LM_Read`: 在整个事务生命周期内对行持有共享锁。\n*   `LM_Exclusive`: 在整个事务生命周期内对行持有排他锁。\n* \
  \  `LM_CommittedRead`: 不获取锁，仅读取已提交的行。\n*   `LM_SimpleRead`: 获取共享锁，但在操作完成后立即释放。\n\
  \n在此步骤的第二行，调用了 `NdbOperation::equal()`。这指定了要搜索的主键名和值。在本例中，搜索 `Code` 列的值匹配 `JPN`\
  \ 的行。如果主键由多个键部分（列）组成，请多次调用 `NdbOperation::equal()` 函数，以便为所有键部分提供值。\n\n###### 步骤\
  \ 8：为结果获取缓冲区\n\n在这一步，通过调用 `NdbOperation::getValue()` 来分配用于存储获取值的缓冲区。此函数只是准备缓冲区，就像\
  \ `NdbOperation::readTuple()` 一样，实际操作将在稍后执行。在此示例中，获取值的列名被指定为 `NdbOperation::getValue()`\
  \ 的第一个参数。`NdbOperation::getValue()` 的第一个参数可以是：\n\n*   以空字符结尾的字符串 (`char*`) 中的属性（列）名\n\
  *   `Uint32` 类型的属性标识符\n*   从字典检索到的 `NdbDictionary::Column` 类实例\n\n请注意，NDB API 中的列名区分大小写。请准确指定表定义中可见的名称。第二个参数是指向将要存储数据的内存区域的指针。如果像本例中一样为\
  \ `NULL`，则内存会自动分配，并在 `NdbRecAttr` 实例删除时释放。因此，如果你想稍后复用数据，必须在关闭事务前复制检索到的数据。\n\n我建议为\
  \ `NdbOperation::getValue()` 函数指定第二个参数，以避免不必要的数据复制，从而获得更好的性能。在这种情况下，即使 `NdbRecAttr`\
  \ 实例被删除，存储获取值的内存区域也不会被释放。然而，NDB API 无法知道缓冲区是否有足够的空间来存储数据，因为参数只是一个指针。请确保分配了足够的空间。你可以根据表定义计算存储列值所需的大小。\n\
  \n###### 步骤 9：向数据节点发送请求\n\n通过调用 `NdbTransaction::execute()` 向数据节点发送请求。然后，数据节点将处理该请求并向\
  \ NDB API 程序发送回复。NDB API 根据 `NdbRecAttr` 实例的规范设置值。\n\n请注意，本示例中 `NdbTransaction::execute()`\
  \ 函数的参数是 `NdbTransaction::Commit`。这表示如其名所示，将提交正在进行的事务。此函数接受以下值之一作为参数：\n\n*   `NdbTransaction::NoCommit`:\
  \ 指定此值时，请求会被发送到数据节点，但事务会继续。如果同一事务中还有更多操作要执行，请指定此值。\n*   `NdbTransaction::Commit`:\
  \ 将提交正在进行的事务。\n*   `NdbTransaction::Rollback`: 将回滚正在进行的事务。\n\n###### 步骤 10：检索值\n\
  \n从 `NdbRecAttr` 实例中检索值。你可以通过调用 `NdbRecAttr::aRef()` 函数来获取字符串值。但是，该字符串值不是以空字符结尾的。你必须使用\
  \ `NdbRecAttr::get_size_in_bytes()` 来确定字符串值的大小。由于 `Capital` 是一个 `UNSIGNED INT` 列，你可以通过调用\
  \ `NdbRecAttr::u_32_value()` 来访问该值。\n\n###### 步骤 11：清理\n\n在这一步，执行必要的清理工作。请注意，清理是在\
  \ `NdbApiExample1` 类的析构函数中完成的。当程序退出声明了 `NdbApiExample1` 实例作为局部变量的作用域时，该析构函数会被调用。在作用域退出时执行必要的清理是\
  \ C++ 程序中的一种便捷技术。\n\n\n\n#### 使用 NdbRecord 访问数据\n\n当使用 `NdbRecAttr` 类时，需要频繁创建该类的实例，因为\
  \ `NdbRecAttr` 类实例是从 `NdbOperation` 类实例中获取的。这给 NDB API 程序带来了一定的开销。为了减少由此产生的开销，在\
  \ MySQL NDB Cluster 6.2.15 中引入了 `NdbRecord` 类。\n\n`NdbRecord` 的作用是定义数据存储或从 NDB API\
  \ 加载的指针的相对内存布局，以便与数据节点交互。使用 `NdbRecord` 接口时，数据通过每行一个连续的内存区域进行交换，而 `NdbRecAttr` 则为每列绑定一个交换数据的内存区域。除了指定内存布局的方式不同外，`NdbRecAttr`\
  \ 和 `NdbRecord` 编程接口的程序流程是相同的。\n\n清单 19-12 展示了一个使用 `NdbRecord` 类交换数据的示例程序。仅摘录了不同的部分。步骤\
  \ 1 到 4 以及 11 与清单 19-11 相同。除了清单 19-11 中包含的内容外，还必须包含一些标准库的额外头文件。\n\n```\n...\n#include\
  \ <string.h>\n#include <iostream>\n#include <string>\n...\n// 步骤 5. 为 City 表的行定义\
  \ NdbRecord 内存区域\nstruct CountryRow {\n    char   nullBits;\n    char   Code[3];\n\
  \    char   Name[52];\n    Uint32 Capital;\n};\nNdbDictionary::RecordSpecification\
  \ recordSpec[3];\n// Code\nrecordSpec[0].column = myTable->getColumn(\"Code\");\n\
  recordSpec[0].offset = offsetof(struct CountryRow, Code);\nrecordSpec[0].nullbit_byte_offset\
  \ = 0;   // Not nullable\nrecordSpec[0].nullbit_bit_in_byte = 0;\n// Name\nrecordSpec[1].column\
  \ = myTable->getColumn(\"Name\");\nrecordSpec[1].offset = offsetof(struct CountryRow,\
  \ Name);\nrecordSpec[1].nullbit_byte_offset = 0;   // Not nullable\nrecordSpec[1].nullbit_bit_in_byte\
  \ = 0;\n// Capital\nrecordSpec[2].column = myTable->getColumn(\"Capital\");\nrecordSpec[2].offset\
  \ = offsetof(struct CountryRow, Capital);\nrecordSpec[2].nullbit_byte_offset =\n\
  \    offsetof(struct CountryRow, nullBits);;   // Nullable\nrecordSpec[2].nullbit_bit_in_byte\
  \ = 0;\nconst NdbRecord *pkRecord =\n    myDict->createRecord(myTable, recordSpec,\
  \ 1, sizeof(recordSpec[0]));\nconst NdbRecord *valsRecord =\n    myDict->createRecord(myTable,\
  \ recordSpec, 3, sizeof(recordSpec[0]));\nif (pkRecord == NULL || valsRecord ==\
  \ NULL) {\n    print_error(myNdb->getNdbError(), \"Could not create NdbRecord.\"\
  );\n    return 5;\n}\n// 步骤 6. 启动事务\nmyTransaction= myNdb->startTransaction();\n\
  if (myTransaction == NULL) {\n    print_error(myNdb->getNdbError(), \"Could not\
  \ start transaction.\");\n    return 6;\n}\n// 步骤 7. 指定操作类型和搜索条件\nCountryRow rowData;\n\
  std::memset(&rowData, 0, sizeof rowData);\nstd::memcpy(&rowData.Code, \"JPN\", 3);\n\
  const NdbOperation *pop=\n    myTransaction->readTuple(pkRecord,\n             \
  \                (char*) &rowData,\n                             valsRecord,\n \
  \                            (char*) &rowData);\nif (pop==NULL) {\n    print_error(myTransaction->getNdbError(),\n\
  \                \"Could not execute record based read operation\");\n    return\
  \ 7;\n}\n// 步骤 8. 向数据节点发送请求\nif (myTransaction->execute( NdbTransaction::Commit\
  \ ) == -1) {\n    print_error(myTransaction->getNdbError(), \"Transaction failed.\"\
  );\n    return 8;\n}\n// 步骤 9. 检索值\nstd::string nameStr = std::string(rowData.Name,\
  \ sizeof(rowData.Name));\nstd::cout << \" Name:         \"\n          << nameStr.substr(0,\
  \ nameStr.find_last_not_of(' ') + 1)\n          << std::endl;\nstd::cout << \" Capital\
  \ Code: \"\n          << (rowData.nullBits & 0x01 ? std::string(\"NULL\") :\n  \
  \                                     std::to_string(rowData.Capital))\n       \
  \   << std::endl;\nreturn 0;\n}\n```\n清单 19-12.\n使用 NdbRecord 从表中读取行的示例 NDB API\
  \ 程序\n\n让我们检查这个程序的每一个新步骤。\n\n##### 步骤 5. 定义 NdbRecords\n\n`NdbRecord` 是一个描述符，用于描述映射到连续内存区域的每行给定列集的内存布局。`CountryRow`\
  \ 结构体表示将通过 `NdbRecord` 接口访问的内存区域。通常，像本例中的这样的结构体被用作数据容器。因此，应用程序可以通过结构体成员访问行中的列数据。当然，它也可以是一个类而不是结构体。\n\
  \n然后，程序声明一个包含三个元素的 `NdbDictionary::RecordSpecification` 数组。该类指定通过 `NdbRecord` 接口访问的每列的内存位置和属性。由于此程序访问三列，因此使用了三个\
  \ `NdbDictionary::RecordSpecification` 结构体实例。`column` 成员指定目标列。`offset` 成员指定用于交换行数据的连续内存区域的起始相对偏移量。`nullbit_byte_offset`\
  \ 和 `nullbit_bit_in_byte` 成员指定列值为 `NULL` 时设置的空位位置。前者是存储空位的字节的相对偏移量。后者是字节内的哪一位用于指示列是否为\
  \ `NULL`。因此，`nullbit_bit_in_byte` 成员的可接受值为 0 到 7。\n\n接下来，创建两个 `NdbRecord` 类实例，一个用于作为搜索条件传递的主键值，另一个用于从数据节点获取的列值。`NdbDictionary::Dictionary::createRecord()`\
  \ 函数的第三个参数是由创建的 `NdbRecord` 实例映射的列数。\n\n##### 步骤 6. 启动事务\n\n启动一个新事务，就像使用 `NdbRecAttr`\
  \ 接口时一样。\n\n##### 步骤 7. 指定操作类型和搜索条件\n\n声明一个 `CountryRow` 结构体变量 `rowData`，并用 0 初始化。然后，将\
  \ `rowData` 的 `Code` 成员设置为 `JPN`，用作搜索条件。\n\n通过调用 `NdbTransaction::readTuple()` 函数获取指向\
  \ `NdbOperation` 类的指针。这指示 NDB API，即将进行的操作类型是 `readTule`，以及使用哪个 `NdbRecord` 和相关的内存区域作为搜索条件和结果的容器。\n\
  \n回想一下，在 `NdbRecAttr` 接口中，首先从 `NdbTransaction` 获取 `NdbOperation` 类实例，然后通过调用 `readTuple()`\
  \ 指定操作类型，通过调用 `NdbOperation::equal()` 指定搜索条件，通过调用 `NdbOperation::getValue()` 为每列指定内存容器，从而完成相同的事情。\n\
  \n因此，在 `NdbRecord` 接口中，NDB API 函数的调用次数要少得多。请注意，此示例程序中的步骤数比 `NdbRecAttr` 示例程序中的步骤数少一个。\n\
  \n##### 步骤 8. 向数据节点发送请求\n\n执行事务，就像使用 `NdbRecAttr` 接口时一样。\n\n##### 步骤 9. 检索值\n\n\
  在 `NdbRecord` 中，值检索非常简单。只需访问结构体成员即可实现。\n\n##### 关于使用 NdbRecord 接口的备注\n\n虽然创建 `NdbRecord`\
  \ 实例的代码有些混乱，但一旦定义，就可以重用已创建的 `NdbRecord` 实例。因此，在实现重复的程序例程时，此代码在性能方面具有明显优势。`NDBCluster`\
  \ 存储引擎中的表访问就是使用 `NDBRecord` 接口实现的。\n\n\n\n#### 扫描示例\n\n扫描操作远比基于主键的查找操作复杂。所有其他操作都属于扫描。扫描有两种类型：\n\
  *   表扫描\n*   有序索引扫描\n\n鉴于扫描操作的特性，无法对唯一的哈希索引进行扫描。\n\n通过 NDB API 执行扫描最强大的功能在于，它能在数据节点内部过滤数据。这将大幅减少传输到\
  \ NDB API 客户端的数据量。此功能对于 `NDB Cluster` 存储引擎也被称为引擎条件下推优化。扫描过滤也可以与有序索引结合使用。图 19-3 展示了扫描过滤的典型架构概览。除非表使用了非标准的数据分布策略，否则扫描通常会在所有数据节点上并行执行。\n\
  \n![A435171_1_En_19_Fig3_HTML.jpg](img/A435171_1_En_19_Fig3_HTML.jpg)\n图 19-3. 数据节点上的搜索过滤概念\n\
  \n扫描与 SQL 中的游标操作非常相似；首先定义游标，然后在循环中处理行数据，如果需要，则更新或删除该行。图 19-4 展示了扫描操作的典型程序流程。请注意，右下部分包含一个循环。\n\
  \n![A435171_1_En_19_Fig4_HTML.jpg](img/A435171_1_En_19_Fig4_HTML.jpg)\n图 19-4. 使用\
  \ NDB API 进行扫描操作的典型程序流程\n\n就像非扫描操作一样，扫描可以使用 `NdbRecAttr` 或 `NdbRecord` 接口来执行。由于手册中已有关于\
  \ `NdbRecAttr` 接口的良好示例，这里你将看到一个使用 `NdbRecord` 接口进行扫描的示例。清单 19-13 展示了一个扫描操作示例。该程序包含三个扫描示例——表扫描、索引扫描以及通过表扫描进行更新。由于程序较长，为讲解方便，它被分成了三个部分。清单\
  \ 19-13 到 19-15 共同构成一个完整的示例程序。此示例程序需要在 `world.City` 表的 `Population` 列上存在一个索引。\n\n\
