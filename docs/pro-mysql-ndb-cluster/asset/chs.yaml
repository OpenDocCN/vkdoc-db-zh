  548K    S7.FragLog\n548K    S8.FragLog\n548K    S9.FragLog\n9.9M    total\n清单 2-8.\n\
  重做日志文件的实际磁盘使用情况\n```\n\n实际上，除了 `S0.FragLog`（它有一些写入）之外，每个文件只贡献了 548KB。这是一个文件默认被创建为*稀疏文件*的例子。\n\
  \n### 总结\n\n本章的主题是数据节点，它们是集群的核心。数据节点是存储数据和进行大部分数据处理的地方。讨论的主题包括：\n\n*   单线程 (`ndbd`)\
  \ 和多线程 (`ndbmtd`) 二进制文件。\n*   哪些线程类型构成了多线程二进制文件。\n*   副本，即 MySQL NDB Cluster 拥有的数据副本数量。\n\
  *   节点组和分区，它们是水平可扩展性和分片的构建块。\n*   本地和全局检查点以及它们如何用于确保数据更改的持久性。\n*   重启类型的简要概述。\n\
  *   数据节点的内部结构，包括使用信号相互通信的内核块。\n*   数据和索引以及它们在数据节点中的存储和使用方式。\n*   研究数据库对象以及 `ndb_show_tables`\
  \ 和 `ndb_desc` 实用程序的案例研究。\n*   NDB 文件系统。\n\n这结束了第一部分，该部分概述了 MySQL NDB Cluster 是什么，并详细介绍了其工作原理。第二部分将介绍安装和配置，其中系统规划是首先讨论的领域。\n\
  \n脚注\n\n1 当一个进程线程变为空闲时，它可以做两件事之一。它可以开始自旋，这意味着它可以非常快地恢复工作，但它会为其他进程阻塞 CPU。或者，它可以进入休眠状态，让\
  \ CPU 为其他进程工作，但这意味着线程唤醒所需的时间会更长。\n\n2 这与 `InnoDB` 不同，后者使用 MySQL Server 内部基于与 `PASSWORD()`\
  \ 函数相同算法的哈希函数。\n\n### 第二部分\n\n"
- '# 3. 系统规划


  在本章中，我们将讨论规划 MySQL NDB Cluster 系统架构设计的要点，并简要讨论配置。由于 NDB Cluster 具有内置的高可用性 (HA) 功能，因此不需要额外的集群软件。然而，其内置
  HA 功能存在一些限制，因为没有什么是完美的，因此规划阶段对于系统可靠性非常重要。我们应该选择合适的拓扑、网络、服务器机器、操作系统 (OS) 等。系统能否成功稳定运行，在很大程度上取决于规划阶段，这一点毫不夸张。



  ### 确定您的优先级


  规划 `NDB Cluster` 部署时，最重要的一点是明确您为何要使用它。`NDB Cluster` 可用于不同目的：


  *   **高可用性**：即使某些组件离线，也要确保整个系统仍可访问，这一点很重要。为实现此能力，系统中的所有组件都必须是冗余的。

  *   **应对访问量增长的扩展性**：处理工作负载增长是现代数据库系统面临的最重要挑战之一。

  *   **灾难恢复**：一个非常重要的系统可能需要即使在数据中心因灾难而中断时也能保持运行。


  哪个因素对您的应用最为关键？请仔细考虑并确定您的目标。如果在此处做出错误选择，您也会采用错误的配置。


  ### 高可用性要求


  虽然 `NDB Cluster` 由三种类型的节点组成——数据节点、SQL 节点和管理节点——但它并非在每种节点类型上都存在**单点故障（`SPOF`）**。每种类型的节点都可以进行配置，以具备针对节点故障的容错能力。为使每种类型的节点都具备容错能力，必须满足以下条件。


  #### 数据节点


  对于数据节点，您需要决定的第一个参数是**副本数**，并且需要不止一个副本作为故障时的备用。所有节点组中的副本数必须相同。因此，副本数必须是数据节点总数的公因数。`NDB
  Cluster` 支持一到四个副本。只要一个节点组内不是所有副本都失效，数据库就能继续运行。一个副本意味着每个节点组最多只有一个副本，因此没有针对节点故障的容错能力，因为没有备用。所以，配置一个副本在生产系统中并不实用。


  那么，应该配置多少个副本呢？在大多数情况下，两个副本就足够且被推荐。实际上，目前官方不支持配置三个或四个副本。因此，配置两个副本是唯一的选择。


  理论上，三个或四个副本会提供更高的冗余度并提高系统可用性。如果您需要针对节点故障的额外可用性，并准备好自行维护，请考虑使用三个或四个副本。


  请仔细选择副本数量。集群启动后，此配置无法更改。要更改副本数，需要系统初始重启（初始化全部数据）。


  #### SQL 节点


  虽然 SQL 节点不存储任何用户数据，但一个 SQL 节点故障不会影响其他 SQL 节点。SQL 节点可以轻松配置为高可用。为此，拥有多个 SQL 节点就足够了。发生故障时，应用程序只需重新连接到另一个
  SQL 节点即可继续操作。有关应用程序如何重新连接到另一个 SQL 节点的更多详细信息，请参见 `第 18 章`。


  SQL 节点之间不直接通信。所有 SQL 节点之间的通信都通过数据节点进行。例如，由一个 SQL 节点触发的模式变更将作为事件通过数据节点传播。因此，无论客户端连接到哪个
  SQL 节点，它们看到的数据都是一致的。


  在每个运行应用程序的主机上部署一个 SQL 节点也是一个好主意。在这种情况下，应用程序将直接连接到本地 SQL 节点，该连接速度非常快。如果发生机器故障，同一台机器上的应用程序和
  SQL 节点将一同停机。如果应用程序服务器是冗余的（这种配置非常常见），一台机器的故障就不是问题。


  安装的 SQL 节点越多，集群的高可用性就越高。但是，请注意不要启用过多启用了二进制日志记录的 SQL 节点。在 `NDB Cluster` 上，二进制日志是使用从数据节点发送的数据生成的。配置越多启用了二进制日志记录的
  SQL 节点，通过网络传输的数据就越多，这可能会导致网络拥塞。


  #### 管理节点


  管理节点完全不参与数据访问。管理节点在以下情况下是必需的：


  *   **配置处理**：管理节点从配置文件中读取集群配置，并在其他节点启动时将集群配置部署到这些节点。

  *   **用户操作**：管理节点处理各种操作，例如启动和停止数据节点、启动备份等。

  *   **日志记录**：管理节点从所有数据节点收集事件，并写入称为集群日志的集中式日志文件。

  *   **仲裁**：当发生网络分区时，`MySQL NDB Cluster` 必须决定哪个可操作的集群应该存活。`MySQL NDB Cluster` 为此采用了称为
  `仲裁` 的技术。

  *   **状态监控**：管理节点有几个命令可用于显示运行节点的状态。


  为了高可用性目的，不一定需要配置多个管理节点。如果您倾向于更高的安全性，拥有两个管理节点就足够了。


  ### 为网络分区做准备


  网络分区是集群系统中一个众所周知的问题，`NDB Cluster` 也可能遇到。网络分区也被称为 **脑裂（`split brain`）**。网络分区是指数据节点之间的网络被均匀断开，导致每个节点组内有一个数据节点正在运行并保持连接。这样，偶然就会形成多个工作集群。**图
  3-1** 描述了一个典型的四数据节点网络分区情况。


  ![A435171_1_En_3_Fig1_HTML.jpg](img/A435171_1_En_3_Fig1_HTML.jpg)


  **图 3-1.** 网络分区


  **仲裁**是 `NDB Cluster` 上实现的一种用于解决网络分区的机制。一个被称为 **主席（`president`）** 的代表数据节点会从候选者（管理节点或
  SQL 节点）中选出一个 **仲裁者（`arbitrator`）**。在任何时候，只有一个仲裁者被配置和运行。当网络分区发生时，所有数据节点都尝试访问仲裁者以获得继续其操作的许可。在每个仲裁过程中，只有一个分区会胜出。如果一个数据节点在仲裁中“丢失”或超时，它将被强制关闭。这种由另一个存活集群执行的关闭操作类型称为
  **STONITH（Shoot The Other Node In The Head，即“将另一节点爆头”）**。有关仲裁过程的更多详细信息，请参阅 `第 1
  章`。


  **注意**


  请勿将仲裁者和数据节点放置在同一台服务器上。如果它们位于同一台服务器上，当服务器遇到计划外停机时，仲裁者和数据节点可能会同时丢失。因此，仲裁者应放置在与任何数据节点不同的机器上。


  从仲裁的性质来看，最好配置独立的网络路径：一条用于互连数据节点，另一条用于数据节点与仲裁者之间的通信。网络分区发生在数据节点之间的网络出现问题时，但至少应有一个存活集群能够联系到仲裁者，以避免整个系统关闭。因为如果两个集群都失去仲裁，两个存活集群都将被关闭。


  仲裁仅在数据节点上是必需的。SQL 节点和管理节点不需要仲裁，因为它们不存储任何数据。



  ### 可扩展性


  使用 NDB Cluster 的一个主要原因是实现高性能。NDB Cluster 擅长通过并行使用多台计算机处理数据访问请求来获得更佳的性能。这种策略被称为横向扩展（scaling
  out）。


  了解哪些类型的数据访问能够随数据节点数量成比例地扩展是很重要的。例如，以下类型的数据访问是可扩展的：


  -   查找读取：使用主键或唯一的二级哈希索引进行等值比较的行查找。只有该行所在的数据节点会参与查找操作。

  -   插入：也称为写入扩展，即大量的写入操作分散到多个节点上。

  -   使用用户定义分区的范围扫描：通过用户定义分区，当可能发生分区剪枝时，只有特定的数据节点会参与扫描操作。

  -   返回大量行的范围扫描：由于扫描是并行进行的，扫描所需的时间会按数据节点的数量成比例减少。

  -   使用下推算法的连接：当连接操作被下推到数据节点时，它会并行执行。


  相反，以下类型的数据访问在数据节点数量增加时**不**具备扩展性：


  -   返回少量行的范围扫描：当数据节点只返回少量行时，涉及数据节点的开销将主导并行化的优势。

  -   未使用下推算法的连接：当连接操作没有被下推到数据节点时，访问内部表需要大量的网络往返。


  扩展性并非万能，它不能解决所有性能问题。例如，一个返回大量行的范围扫描查询，即使许多数据节点可以并行处理范围扫描，其本身效率仍然不高。实际上，这种查询导致的每个数据节点的资源消耗会随数据节点数量的增加而成反比减少，而总吞吐量则会随之成比例增加。因此，它实现了自动扩展。然而，它本质上仍然是低效的。如果系统的吞吐量允许每秒执行
  4 次低效查询 `X`，那么在数据节点数量翻倍后，它将能够每秒执行 8 次相同的查询 `X`。每秒可执行的查询次数仍然很少。因此，即使这种查询的执行可以在数据节点间并行化，也不能频繁执行。否则，整个集群很容易会变慢。


  ### 灾难恢复


  MySQL NDB Cluster 提供了一种将数据从一个集群复制到另一个集群的功能，称为 NDB Cluster 复制或地理复制。NDB Cluster 复制是通过
  SQL 节点完成的，类似于标准的 MySQL 复制。所有修改都写入主 SQL 节点的二进制日志中。主 SQL 节点将二进制日志中的事件发送给从节点，从 SQL
  节点应用这些事件。通过这种方式，整个数据从主集群同步到从集群。


  由于标准的 MySQL 复制非常高效，因此可以配置 NDB Cluster 复制，使主集群和从集群位于地理位置上隔离的站点。通过这种设置，从集群可以用作灾难恢复的备用系统。当主集群所在站点发生中断，而从集群所在站点仍在运行时，从集群可以接管数据服务。


  有关 NDB Cluster 复制的更多详情，请参见第 6 章。


  ### 典型拓扑结构


  在本节中，我们将描述 NDB Cluster 的典型拓扑结构。尽管 NDB Cluster 的拓扑结构很灵活，但以下小节将讨论一些限制和注意事项。


  #### 副本数量


  正如本章前面所述，副本数量是首先要考虑的问题。由于数据的副本也会消耗用于数据存储的内存（以及用于本地检查点 LCP 的磁盘；有关 LCP 的更多详情，请参见第
  1 章），您拥有的副本越多，总数据量就越小。以下公式计算了数据总量的大小。


  ```

  (Number_of_data_nodes × Memory_per_node) ÷ Number_of_replicas

  ```


  在生产系统中不要选择一个副本，因为这样没有冗余。一个副本的配置仅对基准测试等目的有效。大多数情况下选择两个副本。


  #### 最大数据节点数量


  每个 NDB Cluster 集群总共最多可以有 48 个数据节点。如果您计划建立一个大型集群，请注意不要超过此限制。当您需要巨大容量时，可以考虑像 40 多个数据节点这样的大型集群。然而，使用大量服务器机器会增加机器故障的概率。如果您只需要更大的容量，请考虑使用内存更大的服务器机器，而不是增加数据节点数量，以避免增加机器故障的概率。


  #### 最大总节点数


  每个 NDB Cluster 集群最多可以有 255 个节点，包括所有类型的节点。我们最多可以配置 48 个数据节点，而且通常不需要许多管理节点。因此，这个限制实际上只影响
  SQL 节点的最大数量。例如，如果您有 20 个数据节点和 2 个管理节点，那么最多可以有 233 个 SQL 节点。


  SQL 节点通常与应用程序服务器放置在同一台机器上。这样的配置并非坏主意，因为除了 Windows 机器外，应用程序将通过 UNIX 域套接字连接到本地 SQL
  节点，这种连接速度非常快。然而，当您为了横向扩展的目的而希望增加应用程序服务器数量时，这种配置很可能达到 SQL 节点总数的上限，因为在这种配置中，SQL 节点的数量与应用程序服务器的数量相同。例如，如果您有
  20 个数据节点和 2 个管理节点，那么最多只能有 233 个 SQL 节点和 233 个应用程序服务器。


  #### 仲裁等级


  默认情况下，只有管理节点被配置为仲裁器。但通过配置 `ArbitrationRank` 选项，SQL 节点也可以成为备用仲裁器。`ArbitrationRank`
  选项指定了成为仲裁器的可能性。该参数的范围是 0、1 和 2。将其设置为 1 意味着它最有可能成为仲裁器，这是管理节点的默认值。2 的可能性低于 1。0 则禁用仲裁器，这是
  SQL 节点的默认值。


  如果您希望仲裁器具有高可用性，让一些 SQL 节点成为候选者而不是添加管理节点，是一个不错的选择。如果将一个 SQL 节点配置为候选仲裁器，那么在网络分区事件中，就不需要管理节点了。这将为节点总数限制节省一个节点插槽和一台主机。


  #### 将 SQL 节点和数据节点放置在同一台机器上


  如果 SQL 节点没有与应用程序服务器放置在同一台服务器机器上，那么它可以与数据节点放置在同一台机器上。然而，这样的拓扑结构并不是最优的，因此我们不鼓励这样做。原因如下：


  -   SQL 节点也会消耗相当数量的 CPU 和内存资源。解析 SQL 和优化执行计划通常消耗的资源比预期的要多。

  -   资源消耗在 SQL 节点之间可能不均衡。这将在数据节点上造成瓶颈，因为每个数据节点的可用资源不均等。

  -   SQL 节点与每个数据节点之间的距离（网络跳数）不均等。这也会在数据节点上造成瓶颈。


  如果性能不是您的首要任务，并且一定程度的性能下降是可以接受的，那么您可以将 SQL 节点和数据节点放在同一台机器上。否则，请不要这样做。



  #### 典型拓扑示例


  本节描述了从最小配置到大型配置的多个拓扑示例。请注意，本节仅展示示例。您无需遵循此处的相同配置，而是可以根据需要使用任何配置。


  ##### 最小配置：三台主机


  要以高可用数据库系统运行 NDB Cluster，至少需要三台服务器机器。其中两台用于数据节点冗余。如果性能不是最高优先级，可以将 SQL 节点和数据节点放置在同一主机上。管理节点需要一台额外的主机，因为它应该与数据节点放置在不同的主机上。这是因为如果管理节点与数据节点放置在同一主机上，仲裁器会与数据节点一同离线。由于管理节点不需要大量计算机资源，因此使用一台廉价的机器作为管理节点是可行且推荐的。


  图 3-2 描绘了三台主机的最小配置。在此情况下，系统拥有一个专用于 NDB Cluster 的网络或子网，与应用程序分离。


