  \ 检查线程间负载平衡的存储过程\n\n`spl` (每循环信号数) 列指示了每个线程的大致繁忙程度。在清单 20-2 中，最繁忙的线程类型是 `ldm`。只有\
  \ `id=2` 的那个 `ldm` 线程负载很重；另一个 `ldm` 线程负载很轻。`tc` 线程似乎有些繁忙，但不如 `ldm` 线程繁忙。\n\n\n#####\
  \ 中断与 CPU 绑定\n\n在将线程绑定到 CPU 时，另一个需要考虑的因素是，是否应该避免绑定到因中断而繁忙的 CPU 上。中断是硬件或软件在需要立即采取行动时通知\
  \ CPU 的一种方式。每个单独的中断完成得很快，只需要很少的 CPU 资源。然而，中断可能累积起来，大量的中断可能会占用大量 CPU 资源。高速设备可能会导致大量中断；例如，高\
  \ IOPS 的 NVMe 固态硬盘和高速的 10 千兆网络接口卡会导致大量的中断。\n\nLinux 系统通常配置为由特定的 CPU 默认处理中断。此类配置可能导致如下问题：\n\
  \n*   用户程序的执行可能会被繁忙的中断所阻碍。\n*   CPU 资源不足以处理来自繁忙设备的所有中断。\n\n为了防止此类问题，`irqbalance`非常有用。它能将中断造成的负载分散到所有或特定的\
  \ CPU 上。将中断绑定到 CPU 的机制称为中断亲和性。重要的是不要将中断绑定到太少的 CPU 上。否则，中断处理速度将成为瓶颈。请注意，并非所有设备都支持将中断亲和性绑定到多个\
  \ CPU。`irqbalance`仅在设备支持时设置中断亲和性。网络接口卡通常支持接收方调节（RSS），也称为多队列接收。启用 RSS 后，网络接口卡上接收数据包引起的中断可以被重定向到多个\
  \ CPU。否则，就不可能将工作负载分散到多个 CPU 上。\n\n为了确保 MySQL NDB 集群的良好性能，重要的是不要将中断和繁忙的数据节点线程（如`ldm`和`tc`）绑定到同一个\
  \ CPU 上。避免中断和繁忙线程之间冲突的最简单方法是将中断分散到所有 CPU 上。在这种情况下，所有 CPU 将分担中断的工作负载，每个 CPU 所需的资源将很小。处理中断所需的\
  \ CPU 资源永远不会短缺，因为所有 CPU 都参与处理中断。这种配置很简单；然而，它无法实现最佳性能。\n\n只有当中断和繁忙线程被显式地绑定到不同的 CPU\
  \ 上时，才能达到最佳性能。在这种情况下，数据节点中的繁忙线程可以独占给定 CPU 核心的全部资源。因此，一个绑定的线程可以在给定的系统上处理最多的信号。\n\n\
  当显式地将中断和线程绑定到 CPU 时，你需要确保分配给中断的 CPU 资源是充足的。要在 Linux 上查看由中断引起的 CPU 利用率，请显示`/proc/stat`文件的内容。每个\
  \ CPU 行的第六列表示处理中断所花费的时间。要分析中断，必须在内核中启用`CONFIG_IRQ_TIME_ACCOUNTING`配置标志。要确定该标志是否已启用，请执行以下命令：\n\
  \n```\nshell$ gunzip -c /proc/config.gz | grep CONFIG_IRQ_TIME_ACCOUNTING\n```\n\
  \n如果`CONFIG_IRQ_TIME_ACCOUNTING`标志被禁用，你必须从源代码编译内核来启用它。虽然构建 Linux 内核的方法超出了本书的范围，但它并不十分困难。请参阅你的\
  \ Linux 发行版手册了解内核编译的详细信息。如果`/proc/config.gz`不存在，你在执行此命令时甚至可能遇到问题。这可能是因为你的内核中`CONFIG_IKCONFIG`和`CONFIG_IKCONFIG_PROC`配置标志被禁用了。如果`/proc/config.gz`文件不存在，你需要首先重新编译内核。\n\
  \n在 macOS 上，用户不允许更改中断设置。处理中断的 CPU 是自动选择的。更糟糕的是，你无法获取由中断消耗的独立 CPU 使用率。它被包含在总 CPU\
  \ 使用率中。要在 macOS 上监控系统 CPU 时间，请选择“活动监视器”，并从菜单中打开“窗口” ➤ “CPU 历史记录”。图 20-3 显示了在双 CPU\
  \ 核心 Mac 机器上“活动监视器”的 CPU 历史记录窗口截图。\n\n![A435171_1_En_20_Fig3_HTML.jpg](img/A435171_1_En_20_Fig3_HTML.jpg)\n\
  \n图 20-3. 双 CPU 核心 Mac 机器上活动监视器的 CPU 历史记录屏幕\n\n如果你不介意安装免费软件，`htop`工作得非常好。如果你的系统上安装了\
  \ Homebrew（macOS 上流行的第三方包管理器），你可以按如下方式安装`htop`命令：\n\n```\nshell$ brew install htop\n\
  ```\n\n有关 Homebrew 的更多信息，请参见以下网站。\n\n[`brew.sh/`](https://brew.sh/)\n\n图 20-4 显示了`htop`命令的输出示例。\n\
  \n![A435171_1_En_20_Fig4_HTML.jpg](img/A435171_1_En_20_Fig4_HTML.jpg)\n\n图 20-4.\
  \ htop 命令输出示例\n\n在图 20-4 中`htop`命令输出的左上角，按 CPU 核心显示了 CPU 使用率。\n\n在 Windows 上，你可以使用性能监视器查看每个\
  \ CPU 核心的中断 CPU 使用率。图 20-5 显示了正在记录性能统计数据时的性能监视器。\n\n![A435171_1_En_20_Fig5_HTML.jpg](img/A435171_1_En_20_Fig5_HTML.jpg)\n\
  \n图 20-5. 使用性能监视器记录系统性能统计数据\n\n要查看系统性能，你必须首先记录统计数据。要记录数据，请从侧边菜单中的“数据收集器集” ➤ “系统”下选择“系统性能”，然后单击工具栏上的三角形图标。等待片刻，然后单击三角形图标右侧的方形图标。之后，你可以通过选择“报告”\
  \ ➤ “系统” ➤ “系统性能”来查看报告。图 20-6 显示了显示报告的性能监视器截图。\n\n![A435171_1_En_20_Fig6_HTML.jpg](img/A435171_1_En_20_Fig6_HTML.jpg)\n\
  \n图 20-6. 在性能监视器上显示系统性能报告\n\n性能指标按类别分组。你可以在“CPU” ➤ “进程”类别下找到“按 CPU 的处理器中断”。根据图 20-6\
  \ 中的数字，中断数量有些不平衡。CPU 2 处理的中断大约是 CPU 5 的八倍。\n\n如果设备支持接收方调节（RSS），可以在 Windows 上为网络接口卡指定中断亲和性。通常，中断亲和性对于网络接口设备尤为重要。因此，在\
  \ Windows 系统上，启用 RSS 通常足以满足中断亲和性的目的。以下命令从 Windows shell 启用 RSS。\n\n```\nPS C:\\\
  > netsh int tcp set global rss=enabled\n```\n\n使用实时调度器\n\n使用 CPU 绑定时，采用实时调度器并为绑定的线程分配高优先级是一个好主意。使用实时调度器时，线程会不间断地运行，直到有更高优先级的线程准备运行，或者给定的线程进入睡眠或等待事件。这允许实时线程最大化地利用\
  \ CPU 资源。\n\n要在 Linux 和 POSIX 系统上使用非特权用户将线程作为实时线程运行，必须配置资源限制。你需要编辑`/etc/security/limits.conf`并添加如下一行：\n\
  \n```\nmysql    -    rtprio    99\n```\n\n这假设`ndbd`或`ndbmtd`是使用`mysql`用户执行的。如果你使用不同的用户运行数据节点，请替换用户名。如果没有适当的资源配置，数据节点将无法启动。\n\
  \n\n### SQL 调优\n\n本节讨论如何通过调优 SQL 来最大化性能。上一节主要涉及 MySQL NDB Cluster 侧的性能调优，而本节将从应用程序的角度探讨性能调优。通常，编写高效的\
  \ SQL 语句非常重要，因为如果你理解了数据库管理系统的特性并据此编写 SQL，性能可能会提升许多倍。\n\n#### 线程调度与优先级\n\n或者，可以通过\
  \ `ThreadConfig` 中的 `thread_prio` 参数为给定线程分配更高的优先级。在 Linux 和 UNIX 系统上，`thread_prio`\
  \ 参数会调整指定线程的 *niceness*（UNIX 系统中进程调度的优先级），这需要的资源限制不同于实时调度器。在 `ThreadConfig` 选项中，`realtime`\
  \ 和 `thread_prio` 参数是互斥的。如果你能使用实时调度器，这通常是比指定 `thread_prio` 更好的选择。有关 `ThreadConfig`\
  \ 选项的更多信息，请参见第 4 章。\n\n`ThreadConfig` 选项的实时调度器同样适用于 Windows。设置线程优先级的过程与 UNIX 系统不同，它是通过调用\
  \ `SetThreadPriority()` Windows API 函数来完成的。当选择实时调度器时，会为指定线程设置 `THREAD_PRIORITY_TIME_CRITICAL`\
  \ 优先级。有关 `SetThreadPriority()` Windows API 函数的更多详细信息，请参阅以下页面：\n\n[`msdn.microsoft.com/en-us/library/windows/desktop/ms686277(v=vs.85).aspx`](https://msdn.microsoft.com/en-us/library/windows/desktop/ms686277(v=vs.85).aspx)\n\
  \n##### 混合绑定线程与非绑定线程\n\n即使你想将某些线程绑定到特定的 CPU，你也可以让其他线程保持非绑定状态。并非需要绑定所有线程。一个线程是否更适合绑定取决于其类型。`ldm`\
  \ 和 `tc` 是主要的绑定候选者，因为它们必须快速响应并处理尽可能多的信号。`recv` 和 `send` 线程是次一级的候选者。当它们被绑定到 CPU 并使用实时调度器时，节点间的通信将更具响应性。\n\
  \n在我看来，其他线程没有必要绑定到 CPU。通过混合使用绑定线程和非绑定线程，可以使用给定硬件实现最佳性能。将实时调度器设置给绑定线程是理想的。另一方面，不要为非绑定线程设置实时调度器，只需在它们处于非绑定状态时配置足够数量的线程即可。正如本节前面所讨论的，不将线程绑定到处理中断的\
  \ CPU 上也很重要。\n\n强烈建议使用基准测试来监控实际的系统性能。基准测试的好处在于它揭示了来自真实系统的实际数据。通过检查基准测试结果来确定线程的最佳组合。观察到的真实数据总是比基于“纸上谈兵”得出的假设更可靠。\n\
  \n#### 磁盘类型与文件系统块大小\n\n对于 MySQL NDB Cluster 而言，使用快速磁盘非常重要，即使仅使用内存表也是如此，因为日志和检查点会被写入磁盘以确保数据持久性。对\
  \ `NDBCluster` 表的写入速度受限于重做日志的写入速度。本地检查点（LCP）也会限制写入速度，因为如果重做日志空间耗尽，就无法将新的重做日志条目写入重做日志。在这种情况下，有必要释放被旧重做日志条目占用的空间，但在进行中的\
  \ LCP 完成之前，无法释放这些旧条目。\n\n在使用磁盘数据表时，磁盘速度更为重要，因为它们不仅需要写入磁盘，还需要从磁盘读取数据。对于磁盘数据表，除了数据文件和重做日志外，还需要写入撤销日志。因此，在这种情况下，你需要比使用内存表时更好的磁盘带宽。使用磁盘数据表时，采用快速磁盘至关重要。\n\
  \n优化磁盘 I/O 性能时，有以下几点考虑：\n\n*   格式化文件系统时，将其块大小（或在 NTFS 上的簇大小）调整为 32KB。这是因为在 MySQL\
  \ NDB Cluster 中，数据内存和磁盘数据表的页面大小为 32KB。\n*   在 Linux 上使用 `deadline` 或 `noop` I/O\
  \ 调度器。它们对于数据库系统的性能优于 Linux 内核默认的 `cfq` I/O 调度器。请注意，一些 Linux 发行版将默认 I/O 调度器设置为 `deadline`。\n\
  *   在 Linux 和 UNIX 系统上，挂载时追加 `noatime` 选项。这将提高文件读取性能，因为不再记录最后访问时间。当你重启数据节点并使用磁盘数据表时，这一点很重要。\n\
  *   应在磁盘上保留一些可用空间。通常，磁盘填充得越接近其容量，其性能就越慢。建议至少为每个磁盘分区保留 20% 的未分配可用空间。\n*   在 SSD 上启用\
  \ `Trim` 命令，该命令用于将未使用的区域标记为已丢弃。`Trim` 可能会提高磁盘性能，因为它可以省略不必要的磁盘写入。\n    *   在 Windows\
  \ 上，自 Windows 7 起支持 `Trim`。`Trim` 默认启用。要检查 `Trim` 是否已启用，请从命令提示符或具有管理员权限的 Windows\
  \ shell 中运行以下命令：\n        ```\n        fsutil behavior query DisableDeleteNotify\n\
  \        ```\n        如果值为 `1`，则 `Trim` 已禁用。这种情况下，请使用以下命令启用它：\n        ```\n   \
  \     fsutil behavior set DisableDeleteNotify 0\n        ```\n        如果该值未设置，则\
  \ `Trim` 已启用。更多信息，请参见 [`www.tenforums.com/tutorials/40028-enable-disable-trim-support-solid-state-drives-windows-10-a.html`](https://www.tenforums.com/tutorials/40028-enable-disable-trim-support-solid-state-drives-windows-10-a.html)。\n\
  \    *   在 macOS 上，自 mac OS X 10.6.8 (Snow Leopard) 起仅支持 Apple 品牌的 SSD 的 `Trim`。截至\
  \ macOS X 10.10.4 (Yosemite)，所有品牌的 SSD 均支持 `Trim`。要在第三方 SSD 上启用 `Trim`，请执行以下命令：\n\
  \        ```\n        sudo trimforce enable\n        ```\n    *   在 Linux 上，自 Linux\
  \ 内核版本 2.6.33 起支持 `Trim`。在 Linux 系统上，`Trim` 是否默认启用取决于具体的发行版。例如，自 14.04 版本起，Ubuntu\
  \ 默认启用 `Trim`。在启用之前，请运行以下命令验证你的设备是否支持 `Trim` 命令：\n        ```\n        hdparm -I\
  \ /dev/sdX\n        ```\n        要在 Linux 系统上启用它，请将 `discard` 添加到 `mount` 选项中。如果你正在使用\
  \ LVM，请在 `/etc/lvm/lvm.conf` 文件中设置 `issue_discard = 1`。除了 LVM 之外，你还需要为文件系统配置 `trim`\
  \ 选项。如果你更喜欢使用周期性的批处理 `trim`，可以使用 cron 中的 `fstrim` 命令。否则，在 `mount` 选项中添加 `discard`\
  \ 选项。更多信息，请参见 [`access.redhat.com/documentation/en-US/Red_Hat_Enterprise_Linux/7/html/Performance_Tuning_Guide/chap-Red_Hat_Enterprise_Linux-Performance_Tuning_Guide-Storage_and_File_Systems.html`](https://access.redhat.com/documentation/en-US/Red_Hat_Enterprise_Linux/7/html/Performance_Tuning_Guide/chap-Red_Hat_Enterprise_Linux-Performance_Tuning_Guide-Storage_and_File_Systems.html)。\n\
  \n**注意**\n\n请勿在 `dm-crypt` 上启用 `Trim`，因为这会增加安全风险。它会泄露来自已释放块的最小数据。至少，当启用 `Trim` 时，它可能允许攻击者推断正在使用的文件系统类型。更多信息请参见以下页面：[`asalor.blogspot.jp/2011/08/trim-dm-crypt-problems.html`](http://asalor.blogspot.jp/2011/08/trim-dm-crypt-problems.html)。\n\
  \n\n\n\n#### 事务大小调整\n\n需要注意的最重要特点是，MySQL NDB 集群针对大量小型事务进行了优化。当需要修改给定行数时，以多个更小的事务并行修改，比用一个大事务修改所有行要快得多。因此，如果你想更新大量行，请将这些修改拆分为多个事务，并尽可能保持每个事务足够小。如果可能，并行执行这些小事务。MySQL\
  \ NDB 集群将以快得多的速度完成修改，并且使数据节点不那么繁忙。\n\n当然，将一个大修改拆分为多个小部分可能会破坏原子性。如果原子性是必须的，无论事务多大，都不要将其拆分为更小的事务。请注意，如果执行一个足够大的事务，它可能会因为\
  \ `MaxNoOfConcurrentOperations` 或 `RedoBufferSize` 的上限而失败。即使原子性是必须的，但如果无法提高这些选项的上限，你将不得不把事务拆分成更小的部分。\n\
  \n那么，什么是事务的最佳大小呢？这取决于配置或表定义。如果一个事务是针对在线事务处理（OLTP）类型的工作负载，请将事务中修改的行数限制在大约 1,000 行。如果是批处理或在线分析处理（OLAP）类型的工作负载，请将行数限制在\
  \ 100,000 行。\n\n#### 非事务性批处理\n\n如果你需要一次性修改许多行，但又不必须是事务性的，可以在 SQL 节点上使用 `ndb_use_transaction`\
  \ 选项。默认情况下，此选项为 `ON`，事务是启用的。如果将其设置为 `OFF`，则会禁用事务支持，修改操作会快得多。此选项可以在会话级别设置。因此，你可以像下面的示例一样，在命令基础上禁用此选项：\n\
  \n```sql\nmysql> SET ndb_use_transaction = OFF;\nmysql> DELETE FROM world.City;\n\
  mysql> SET ndb_use_transaction = ON;\n```\n\n禁用事务将破坏事务属性，如原子性。因此，如果一个 SQL 命令因问题而只部分执行，你将无法回滚它。如果禁用了\
  \ `ndb_use_transaction`，则修改必须是可恢复或可检索的，例如在以下情况：\n\n*   在批处理过程中，创建一个表并从文件中向该表加载大量数据。\n\
  *   根据某些条件（如特定日期范围）删除不使用的行。\n\n在这些情况下，如果查询失败，你可以重复执行相同的查询。\n\n#### 引擎条件下推优化\n\n\
  MySQL NDB 集群最强大的功能之一是能够在数据节点过滤行。这将最大限度地减少数据节点与 SQL 节点之间的网络带宽使用，并最大化性能，因为过滤是在数据节点上并行完成的。无论是否存在合适的索引，都可以进行过滤。此功能在\
  \ SQL 节点上被称为引擎条件下推优化。引擎条件下推默认启用。\n\n当使用引擎条件下推时，会在 `EXPLAIN` 命令的 `Extra` 字段中指示，如清单\
  \ 20-3 所示。请注意，下推的条件显示在 `Extra` 字段的括号中。在 MySQL NDB Cluster 7.4 或更早版本中不显示此条件。\n\n\
  ```sql\nmysql> EXPLAIN SELECT * FROM City WHERE District = 'Tochigi'\\G\n***************************\
  \ 1. row ***************************\n           id: 1\n  select_type: SIMPLE\n\
  \        table: City\n   partitions: p0,p1,p2,p3\n         type: ALL\npossible_keys:\
  \ NULL\n          key: NULL\n      key_len: NULL\n          ref: NULL\n        \
  \ rows: 4079\n     filtered: 10.00\n        Extra: Using where with pushed condition\
  \ (`world`.`City`.`District` = 'Tochigi')\n1 row in set, 1 warning (0.00 sec)\n\
  清单 20-3.\n启用引擎条件下推优化的查询执行计划\n```\n\n要禁用引擎条件下推，请调整 `optimizer_switch` 选项，如清单 20-4\
  \ 所示。通常，禁用它没有优势。\n\n```sql\nmysql> set optimizer_switch='engine_condition_pushdown=off';\n\
  Query OK, 0 rows affected (0.00 sec)\nmysql> EXPLAIN SELECT * FROM City WHERE District\
  \ = 'Tochigi'\\G\n*************************** 1. row ***************************\n\
  \           id: 1\n  select_type: SIMPLE\n        table: City\n   partitions: p0,p1,p2,p3\n\
  \         type: ALL\npossible_keys: NULL\n          key: NULL\n      key_len: NULL\n\
  \          ref: NULL\n         rows: 4079\n     filtered: 10.00\n        Extra:\
  \ Using where\n1 row in set, 1 warning (0.00 sec)\n清单 20-4.\n禁用引擎条件下推优化\n```\n\n\
  尽管引擎条件下推快速且有用，但你必须意识到所有行都是在数据节点上扫描的。这会扭曲查询统计信息。例如，慢查询日志中的 `Rows_examined` 仅指示返回到\
  \ SQL 节点的行数。在数据节点上被扫描但过滤掉的行不包括在统计信息中。因此，当你寻找待优化的候选查询时，引擎条件下推可能会让你的工作变得更加困难。\n\n\
  请注意，引擎条件下推可以与索引一起使用。如果引擎条件下推与索引一起使用，则不匹配的行会在数据节点被过滤。这与索引条件下推优化非常相似，并且比全表扫描的引擎条件下推更高效。因此，即使引擎条件下推生效，拥有一个好的索引仍然非常重要。\n\
  \n#### 优化连接\n\n在非常早期的 MySQL NDB 集群版本中，连接是 MySQL NDB 集群的一个软肋，因为 SQL 节点只具有嵌套循环连接（NLJ）算法及其变种块嵌套循环连接（BNLJ）算法。这些算法需要在\
  \ SQL 节点和数据节点之间进行多次遍历。因此，连接非常慢，并且在数据节点上产生了大量负载。在最近的 MySQL NDB 集群版本中，提供了更强大的连接算法。\n\
  \n\n\n\n##### 下推连接优化\n\n连接（join）操作在 MySQL NDB Cluster 中执行得相当快，因为连接可以像搜索条件一样被**下推**到数据节点执行。借助下推连接优化，连接操作在数据节点内部完成，而\
  \ SQL 节点仅从数据节点接收连接后的行。\n\n下推连接自 MySQL NDB Cluster 7.2 系列起引入。它最初被称为自适应查询本地化（`AQL`）或选择-投影连接（`SPJ`）。后一个名称保留在处理下推连接的内核模块名称中。要使用下推连接，必须启用\
  \ `ndb_join_pushdown` 选项；该选项默认是启用的。\n\n下推连接有一些限制。要启用下推连接，需要满足以下条件：\n\n*   被连接表上的键列必须具有相同的数据类型。\n\
  *   查询不能引用 `BLOB` 或 `TEXT` 列。\n*   查询不能包含显式的锁子句——`FOR UPDATE` 和 `LOCK IN SHARE MODE`。\n\
  *   对于内连接，子表（内部表）的访问方法必须是 `ref`、`eq_ref` 或 `const`；对于外连接，则只能是 `eq_ref`。这意味着对于内连接，连接键列必须被索引；对于外连接，则必须具有唯一的哈希索引。\n\
  *   对下推连接和 `GROUP BY` 查询的支持有限。\n*   实验性的用户定义分区类型（除 `[LINER] KEY` 外）不受支持。\n\n如你所见，在使用下推连接时，表设计非常重要。请在不同表中对相同数据使用相同的数据类型，并在连接键列上定义合适的索引。\n\
  \n当采用下推连接时，`EXPLAIN` 命令的 `Extra` 字段将显示下推连接信息，如代码清单 20-5 所示。如果未启用引擎条件下推优化，可以执行 `SHOW\
  \ WARNINGS`，它会显示原因。\n\n```\nmysql> EXPLAIN SELECT * FROM City JOIN Country ON Country.Capital\
  \ = City.Id\\G\n*************************** 1. row ***************************\n\
  \           id: 1\n  select_type: SIMPLE\n        table: Country\n   partitions:\
  \ p0,p1,p2,p3\n         type: ALL\npossible_keys: NULL\n          key: NULL\n  \
  \    key_len: NULL\n          ref: NULL\n         rows: 239\n     filtered: 100.00\n\
  \        Extra: Parent of 2 pushed join@1; Using where with pushed condition (`world`.`Country`.`Capital`\
  \ is not null)\n*************************** 2. row ***************************\n\
  \           id: 1\n  select_type: SIMPLE\n        table: City\n   partitions: p0,p1,p2,p3\n\
  \         type: eq_ref\npossible_keys: PRIMARY\n          key: PRIMARY\n      key_len:\
  \ 4\n          ref: world.Country.Capital\n         rows: 1\n     filtered: 100.00\n\
  \        Extra: Child of 'Country' in pushed join@1\n2 rows in set, 1 warning (0.00\
  \ sec)\n```\n\n代码清单 20-5.\n使用下推连接的查询执行计划\n\n在代码清单 20-5 的示例中，`Country` 表的 `Extra`\
  \ 字段除了下推连接信息外，还包含了引擎条件下推的信息，尽管此查询中没有 `WHERE` 子句。这是因为优化器发现 `Country.Capital` 列被定义为可为空，但在本查询中它与一个不可为空的列进行连接，因此不可能为\
  \ `NULL`。在这种情况下，优化器认为可以使用一个额外的搜索条件高效地从父表中过滤出行。\n\n##### 批键访问连接优化\n\n批键访问连接（`BKAJ`）是\
  \ MySQL NDB Cluster 提供的另一种快速连接算法。它是块嵌套循环连接（`BNLJ`）的一个变种。`BNLJ` 是嵌套循环连接（`NLJ`）的改进版本，如果内部表没有合适的索引，它可以减少扫描次数。`BKAJ`\
  \ 的算法与 `BNLJ` 相同，不同之处在于它使用多范围读（`MRR`）优化来批量访问内部表。\n\n为了描述 `BKAJ` 算法，我们将首先讨论 `NLJ`\
  \ 和 `BNLJ` 算法。`NLJ` 是一个非常简单的算法，它像循环一样执行连接。以下代码是两张表连接的概念性算法。\n\n```\nfor each row\
  \ in t1 matching where condition {\n    for each row in t2 matching join key and\
  \ where condition {\n        send joined row to client\n    }\n}\n```\n\n如果内部表有合适的索引来获取行，那么即使从外部表返回大量行并且内部表必须被访问多次，`NLJ`\
  \ 也非常快。否则，它将非常低效。假设内部表没有合适的索引，并且查询从外部表获取了 100 万行，那么内部表将被扫描 100 万次。如果内部表很大，查询不太可能在实际时间内完成。\n\
  \n为了克服这个性能问题，引入了 `BNLJ`。使用 `BNLJ` 时，从外部表获取的行首先被存储到一个称为连接缓冲区的缓冲区中。将持续获取外部表的行直到缓冲区填满。然后，它使用搜索条件逐个从内部表获取行，并测试获取的行是否可以与缓冲区中的行进行连接。这大大减少了内部表的扫描次数。\n\
  \n图 20-7 是 `BNLJ` 算法的概念视图。如图 20-7 所示，`BNLJ` 仅在内部表上没有合适的键时才有效。\n\n![A435171_1_En_20_Fig7_HTML.jpg](img/A435171_1_En_20_Fig7_HTML.jpg)\n\
  图 20-7.\nBNLJ 算法的概念视图\n\n当内部表没有合适的索引并且需要扫描时，`BNLJ` 是一个非常强大的算法。然而，还有一些问题需要解决。即使内部表有适合连接的索引，访问内部表也不一定是最优的。`BKAJ`\
  \ 解决了这种情况下的性能问题；访问内部表虽然不是扫描，但效率不够高。\n\n理论上，不同表中的行顺序是无关的。因此，使用 `NLJ` 访问内部表将是随机顺序进行的，这通常是低效的。在\
  \ MySQL NDB Cluster 中，即使内部表有适合连接的索引，逐行访问内部表也并不高效，因为行访问操作涉及网络遍历。为了克服这个问题，`BKAJ` 非常有用。\n\
  \n使用 `BKAJ` 时，首先从外部表获取行并存储到连接缓冲区。然后，`BKAJ` 从缓冲的行中检索键值。接着，使用 `MRR` 优化从内部表获取行。使用 `MRR`\
  \ 时，行是使用按键顺序排序的多个键值来获取的。最后，从内部表获取的行与缓冲的行进行连接。由于对内部表的访问是使用多个键值批量进行的，因此这种类型的连接被称为批键访问连接。\n\
  \n\n\nBKAJ 默认是禁用的。要使用 `BKAJ`，需要修改 `optimizer_switch` 以便优化器可以选择 `BKAJ`，如清单 20-6 所示。请注意，清单\
  \ 20-6 中禁用了下推连接（pushdown join），因为它比 `BKAJ` 更高效。如果下推连接可用，优化器倾向于选择它而不是 `BKAJ`。清单 20-6\
  \ 中的示例查询与清单 20-5 相同。唯一的区别是查询执行计划。你可以在清单 20-6 中的 `City` 表的 `Extra` 字段中看到 `Using join\
  \ buffer (Batched Key Access)`。\n\n```sql\nmysql> set optimizer_switch='batched_key_access=on';\n\
  Query OK, 0 rows affected (0.00 sec)\nmysql> SET ndb_join_pushdown = 0;\nQuery OK,\
  \ 0 rows affected (0.00 sec)\nmysql> EXPLAIN SELECT * FROM City JOIN Country ON\
  \ Country.Capital = City.Id\\G\n*************************** 1. row ***************************\n\
  id: 1\nselect_type: SIMPLE\ntable: Country\npartitions: p0,p1,p2,p3\ntype: ALL\n\
  possible_keys: NULL\nkey: NULL\nkey_len: NULL\nref: NULL\nrows: 239\nfiltered: 100.00\n\
  Extra: Using where with pushed condition (`world`.`Country`.`Capital` is not null)\n\
  *************************** 2. row ***************************\nid: 1\nselect_type:\
  \ SIMPLE\ntable: City\npartitions: p0,p1,p2,p3\ntype: eq_ref\npossible_keys: PRIMARY\n\
  key: PRIMARY\nkey_len: 4\nref: world.Country.Capital\nrows: 1\nfiltered: 100.00\n\
  Extra: Using join buffer (Batched Key Access)\n2 rows in set, 1 warning (0.00 sec)\n\
  ```\n清单 20-6. 启用 `BKAJ` 并检查查询执行计划\n\n##### 卸载连接\n\n如果无法采用高效的连接算法，考虑从 `MySQL NDB\
  \ Cluster` 设置复制到 `InnoDB`。`InnoDB` 通常具有良好的连接性能，并且可以使用 1:N 拓扑将读取负载分散到多个从库。有关从 `MySQL\
  \ NDB Cluster` 设置复制到 `InnoDB` 的过程的更多信息，请参见第 6 章。\n\n#### 优化分区\n\n理解并调整 `MySQL NDB\
  \ Cluster` 上的分区非常重要。在 `MySQL NDB Cluster` 中，数据按行分散到数据节点中。每个表被拆分为分区，每个分区仅属于一个节点组（除非表是完全复制的）。因此，可以确定哪个数据节点存储了目标行。所以，分区键也作为数据节点之间的分布键。\n\
  \n##### `MySQL NDB Cluster` 上分区的特性\n\n目前，`MySQL NDB Cluster` 唯一支持的分区方法是 `KEY` 分区，包括其变体\
  \ `LINER KEY` 分区。`KEY` 分区类似于 `HASH` 分区，除了计算键值的表达式不同。对于 `HASH` 分区，用户指定分区表达式。而对于 `KEY`\
  \ 分区，`MySQL Server` 提供分区表达式；`MySQL NDB Cluster` 使用 `MD5()` 来达到此目的。\n\n在 `NDBCluster`\
  \ 存储引擎中，分区修剪的工作方式与 `InnoDB` 有几点不同：\n\n*   `NDBCluster` 存储引擎中并行扫描所有分区。即使未采用分区修剪，扫描速度也很快。\n\
  *   无法手动更改分区表达式，分区数量受系统配置限制。有关分区平衡的更多信息，请参见第 2 章。\n\n##### 用户定义分区\n\n默认情况下，主键用作分区键。这在大多数情况下并不是一个坏选择。然而，在某些情况下，选择不同的列作为分区键可能是更好的选择。例如，`world`\
  \ 示例数据库中的 `world.City` 表可能必须使用 `CountryCode` 而不是其主键 `ID` 进行分区，因为 `world.City` 表经常针对特定国家进行查询。\n\
  \n`MySQL NDB Cluster` 可以以不同于默认的方式对表进行分区。此功能称为用户定义分区。用户定义分区在以下场景中非常有用：\n\n*   经常将分区键的值指定为使用附加搜索条件进行范围扫描的等值比较。\n\
  *   使用分区键将表作为内部表进行连接。\n\n在这些情况下，查询用户定义分区表时可以应用分区修剪。它使查询更高效，从而提高了应用程序的可扩展性。\n\n例如，清单\
  \ 20-7 中的查询必须根据其执行计划扫描所有分区。你可以在 `EXPLAIN` 输出的 `partitions` 字段中看到列出了所有分区。该查询将访问所有数据节点。\n\
  \n```sql\nmysql> EXPLAIN SELECT * FROM City\n->   WHERE CountryCode='JPN' AND Name\
  \ LIKE 'T%'\\G\n*************************** 1. row ***************************\n\
  id: 1\nselect_type: SIMPLE\ntable: City\npartitions: p0,p1,p2,p3\ntype: ref\npossible_keys:\
  \ CountryCode\nkey: CountryCode\nkey_len: 3\nref: const\nrows: 3\nfiltered: 11.11\n\
  Extra: Using where with pushed condition (`world`.`City`.`Name` like 'T%')\n1 row\
  \ in set, 1 warning (0.00 sec)\n```\n清单 20-7. 扫描所有分区的查询\n\n现在考虑更改表定义，如清单 20-8 所示。在此示例中，主键和分区定义发生了变化。`City`\
  \ 表的分区键已从 `ID` 列更改为 `CountryCode` 列。\n\n```sql\nmysql> ALTER TABLE City MODIFY ID\
  \ INT NOT NULL, DROP PRIMARY KEY;\nQuery OK, 4079 rows affected (2.27 sec)\nRecords:\
  \ 4079  Duplicates: 0  Warnings: 0\nmysql> ALTER TABLE City ADD PRIMARY KEY (ID,\
  \ CountryCode)\n->                  PARTITION BY KEY (CountryCode);\nQuery OK, 4079\
  \ rows affected (0.88 sec)\nRecords: 4079  Duplicates: 0  Warnings: 0\n```\n清单 20-8.\
  \ 更改 `City` 表的表定义\n\n使用清单 20-8 中的表定义，与清单 20-7 中相同的查询将具有不同的执行计划，如清单 20-9 所示。\n\n\
  ```sql\nmysql> EXPLAIN SELECT * FROM City\n->   WHERE CountryCode='JPN' AND Name\
  \ LIKE 'T%'\\G\n*************************** 1. row ***************************\n\
  id: 1\nselect_type: SIMPLE\ntable: City\npartitions: p2\ntype: ref\npossible_keys:\
  \ CountryCode\nkey: CountryCode\nkey_len: 3\nref: const\nrows: 3\nfiltered: 11.11\n\
  Extra: Using where with pushed condition (`world`.`City`.`Name` like 'T%')\n1 row\
  \ in set, 1 warning (0.00 sec)\n```\n清单 20-9. 用户定义分区表的示例执行计划\n\n你可以看到，清单 20-9 中的查询只扫描了\
  \ `p2`，因为它为分区键 `CountryCode` 提供了明确的值。清单 20-9 中的执行计划比清单 20-7 中的执行计划可以实现更高程度的并行化，因为扫描造成的工作负载更少。\n\
  \n用户定义分区也适用于连接。清单 20-10 显示了当 `City` 表未进行用户定义分区时，连接的示例执行计划。你可以看到必须扫描所有分区以查找符合给定条件\
  \ `CountryCode = 'JPN'` 的行。\n\n\n##### 无用户定义分区时的执行计划\n```\nmysql> EXPLAIN SELECT\
  \ * FROM City JOIN Country ON\n    -> Country.Code = City.CountryCode WHERE Country.Code\
  \ = 'JPN'\\G\n*************************** 1. row ***************************\n \
  \          id: 1\n  select_type: SIMPLE\n        table: Country\n   partitions:\
  \ p2\n         type: eq_ref\npossible_keys: PRIMARY\n          key: PRIMARY\n  \
  \    key_len: 3\n          ref: const\n         rows: 1\n     filtered: 100.00\n\
  \        Extra: NULL\n*************************** 2. row ***************************\n\
  \           id: 1\n  select_type: SIMPLE\n        table: City\n   partitions: p0,p1,p2,p3\n\
  \         type: ref\npossible_keys: CountryCode\n          key: CountryCode\n  \
  \    key_len: 3\n          ref: const\n         rows: 3\n     filtered: 100.00\n\
  \        Extra: NULL\n2 rows in set, 2 warnings (0.00 sec)\n```\n**列表 20-10** 无用户定义分区的连接执行计划\n\
  \n当`City`表使用用户定义分区时，查询执行计划如列表 20-11 所示。\n\n##### 有用户定义分区时的执行计划\n```\nmysql> EXPLAIN\
  \ SELECT * FROM City JOIN Country ON\n    -> Country.Code = City.CountryCode WHERE\
  \ Country.Code = 'JPN'\\G\n*************************** 1. row ***************************\n\
  \           id: 1\n  select_type: SIMPLE\n        table: Country\n   partitions:\
  \ p2\n         type: eq_ref\npossible_keys: PRIMARY\n          key: PRIMARY\n  \
  \    key_len: 3\n          ref: const\n         rows: 1\n     filtered: 100.00\n\
  \        Extra: NULL\n*************************** 2. row ***************************\n\
  \           id: 1\n  select_type: SIMPLE\n        table: City\n   partitions: p2\n\
  \         type: ref\npossible_keys: CountryCode\n          key: CountryCode\n  \
  \    key_len: 3\n          ref: const\n         rows: 3\n     filtered: 100.00\n\
  \        Extra: NULL\n2 rows in set, 2 warnings (0.00 sec)\n```\n**列表 20-11** 使用用户定义分区的连接执行计划\n\
  \n现在，您可以看到在列表 20-11 中，两个表都只访问了`p2`分区。这在网络传输方面非常高效。当启用优化节点选择时，查询可以通过仅访问一个数据节点来解决。我们将在本节后面讨论优化节点选择。\n\
  \n图 20-8 描述了此查询访问了哪些分区。左边是无用户定义分区的情况，右边是有用户定义分区的情况。当集群拥有更多数据节点时，用户定义分区的效果变得更加显著。\n\
  \n![A435171_1_En_20_Fig8_HTML.jpg](img/A435171_1_En_20_Fig8_HTML.jpg)\n\n**图 20-8**\
  \ 使用和未使用用户定义分区的连接如何访问表\n\n用户定义分区的缺点是，在大多数情况下必须更改主键定义。这是由于 MySQL Server 的一个限制：所有唯一索引必须包含构成分区键的列。此限制是必需的，因为\
  \ MySQL Server 不支持分区表的全局索引。更改主键（或二级唯一索引）在大多数情况下可能是不可接受的，因为它会放松唯一性约束。如果原始唯一索引的唯一性约束是必须的，则无法使用用户定义分区。\n\
  \n##### 从备份副本和全复制表读取\n从 MySQL NDB Cluster 7.5 系列开始，可以调整分区平衡。有关分区平衡的更多信息，请参见第 2 章。\n\
  \n当采用分区平衡并从备份副本读取时，读取工作负载可以比默认平衡更有效地分布在数据节点之间。尽管这是添加到 MySQL NDB Cluster 7.5 的一个有趣功能，但我认为除了副本数为二、设置两个数据节点并像全复制表一样工作的情况外，从备份副本读取的效果并不显著。\n\
  \n另一方面，同样添加到 MySQL NDB Cluster 7.5 的全复制表效果则非常显著。当表是全复制时，每个数据节点都拥有该表的所有数据。因此，任何读取查询都可以通过仅访问一个数据节点来解决。作为权衡，针对全复制表的写入性能将比非全复制表差得多，因为修改必须同步到所有数据节点。集群拥有更多数据节点时，写入开销更大。\n\
  \n全复制表适用于具有以下特征的表：\n\n*   数据很少更改。\n*   表被应用程序非常频繁地读取。\n*   表经常与其他表进行连接。\n*   数据量较小。\n\
  \n#### 优化从 SQL 节点到数据节点的访问\n优化从 SQL 节点到数据节点的访问以最大化性能也很重要。SQL 节点必须在每次执行查询时向数据节点发送请求并从数据节点接收响应。\n\
  \n##### 连接池\n当 SQL 节点在具有多个 CPU 核心的机器上运行时，值得考虑增加 SQL 节点与数据节点之间的连接数，因为 NDB API 的单个实例会导致线程间的锁争用。\n\
  \n要增加 SQL 节点和数据节点之间的连接数，请在 `my.cnf` 中配置 `ndb_cluster_connection_pool` 选项。此选项无法在线更改。更改后需要重启\
  \ SQL 节点。\n\n此选项的默认值为 `1`。增加此选项可能会提高给定 SQL 节点的 SQL 处理吞吐量。虽然此选项的最大允许值为 `63`，但 `4`\
  \ 在大多数情况下就足够了。不要将其设置得过大。使用不同的 `ndb_cluster_connection_pool` 值对您的应用程序进行基准测试，并为应用程序和当前集群安装找到最佳设置。\n\
  \n要增加此选项，必须在 `config.ini` 中为 SQL 节点预留足够的空闲插槽。换句话说，对于管理和数据节点，来自 `ndb_cluster_connection_pool`\
  \ 的每个连接看起来都像一个不同的 SQL 节点。有关添加 SQL 节点的过程，请参阅第 10 章。\n\n### MySQL NDB Cluster 性能优化要点\n\
  \n#### 优化节点选择\n\n在数据节点上执行事务时，可以选择任意一个数据节点作为事务协调器（TC）。为了最大化事务的响应时间和吞吐量性能，选择合适的 TC\
  \ 至关重要。\n\n为了最小化 SQL 节点与数据节点之间通信所需的开销，MySQL NDB Cluster 提供了一种称为“分布感知”的功能。该功能根据事务中首个查询的行分布情况来选择\
  \ TC。如果查询基于其分布键进行查找，将 TC 选择为目标行所在的同一主机是最佳选择，因为解决查询不需要额外的网络通信。\n\n图 20-9 展示了一个基于分布键的查找查询的非最优节点选择情况；TC\
  \ 与目标行所在的数据节点不匹配。在这种情况下，TC 必须向另一个数据节点发送信号以请求发送行数据。\n\n![A435171_1_En_20_Fig9_HTML.jpg](img/A435171_1_En_20_Fig9_HTML.jpg)\n\
  图 20-9. 非最优的、非分布感知的节点选择\n\n提示：分布键可以是隐式分区表的主键，也可以是用户定义分区表的分区键。\n\n图 20-10 展示了一个最优的节点选择；TC\
  \ 与目标行所在的数据节点相匹配。在这种情况下，基于分布键的查找查询只需访问一个数据节点即可解决。\n\n![A435171_1_En_20_Fig10_HTML.jpg](img/A435171_1_En_20_Fig10_HTML.jpg)\n\
  图 20-10. 最优的分布感知节点选择\n\n为了使 SQL 节点能够基于分布情况选择 TC，必须将`ndb_optimized_node_selection`选项设置为`2`或`3`。默认值为`3`。此选项的可取值范围为`0`到`3`，定义如下：\n\
  \n*   `0`：不进行分布感知节点选择。TC 以轮询方式选择。\n*   `1`：不进行分布感知节点选择。TC 基于 SQL 节点与数据节点之间的网络跳数选择。如果\
  \ SQL 节点和数据节点位于同一主机，则该数据节点距离此 SQL 节点最近，因此总是被选为 TC。\n*   `2`：SQL 节点首先尝试基于分布感知选择 TC。如果给定查询无法修剪目标分区（例如没有用户定义分区的扫描），则回退到与`0`相同的行为。\n\
  *   `3`：与`2`相同，不同之处在于它回退到`1`而不是`0`。\n\n在大多数情况下，您无需更改此选项的默认值。另一方面，在编写事务时，您需要考虑以下几点：\n\
  \n*   在每个事务的开头执行一个只访问一个分区的查询。在用户定义分区表上对分区键进行查找或扫描。\n*   如果可能，请应用用户定义分区。这将增加整个事务仅在一个数据节点内执行的机会。\n\
  *   分布感知节点选择通过检查每个事务的第一条语句来完成。如果一个事务包含许多语句，分布感知节点选择的效果将很小。\n*   在某些情况下，分布感知节点选择甚至可能导致性能下降。例如，假设给定事务中的第一个查询访问一个只有一行的表。在这种情况下，同一个节点被选为该事务的\
  \ TC。如果`ndb_optimized_node_selection=3`，这会导致数据节点之间的工作负载不平衡。值得将其更改为`0`或`1`。\n\n####\
  \ 添加节点\n\n当硬件资源不足以应对当前工作负载时，可能需要向集群添加新节点。您可以在线将任何类型的节点添加到现有集群中。有关添加节点的更多详细信息，请参阅第\
  \ 10 章。有两种选择——添加数据节点和/或 SQL 节点。在遇到以下问题时必须添加数据节点：\n\n*   应用程序需要更多容量。\n*   访问表数据是主要瓶颈。\n\
  \n添加数据节点是否能提高性能取决于应用程序的访问模式，如下所述：\n\n*   使用唯一哈希索引的查找性能很可能通过添加数据节点得到改善。\n*   针对用户定义分区的扫描性能很可能通过添加数据节点得到改善，因为此类扫描只访问特定的数据节点。\n\
  *   返回许多行的、没有用户定义分区的扫描性能很可能通过添加数据节点得到改善，因为此类扫描在所有数据节点上并行执行。\n*   仅返回少量行的、没有用户定义分区的扫描性能不太可能通过添加数据节点得到改善，因为所有节点都必须参与才能返回少量行。这种操作会导致严重的开销。因此，添加数据节点可能会使性能变得更差。\n\
  \n另一方面，仅通过添加额外的 SQL 节点并在它们之间分散负载，通常可以提高性能。SQL 节点可能成为瓶颈，因为它消耗大量 CPU 资源。解析、优化和执行查询是\
  \ CPU 密集型工作负载。如果数据节点的性能很高，可能需要多个 SQL 节点来充分利用数据节点的潜力。\n\n#### 结合使用 NoSQL API 与 SQL\n\
  \n如果简单查询的响应时间很重要，请考虑使用 NoSQL API 而不是 SQL。它可以实现比 SQL 快得多的响应时间和更高的吞吐量。在 MySQL NDB\
  \ Cluster 中，可以从不同的 API（如`memcached`、`NDB API`和`ClusterJ`）访问相同的数据。\n\n仅使用 NoSQL 编写应用程序可能非常困难，因为\
  \ NoSQL API 是一种开销非常低的低级 API。混合使用 SQL 和 NoSQL 可以在开发效率和性能之间取得良好的平衡。\n\n### 总结\n\n\
  本章讨论了在系统层面和应用开发层面提高性能的关键点。性能始终是数据库应用程序开发中最重要的问题，因为任何性能不足的应用程序都是无用的。\n\n使用 MySQL\
  \ NDB Cluster 时，底层系统必须正确配置，并且必须配置 MySQL NDB Cluster 以使其能够高效地利用计算机资源。CPU 的配置尤其重要，因为除了与检查点和磁盘数据表相关的\
  \ I/O 之外，MySQL NDB Cluster 的负载是 CPU 密集型的。\n\n编写查询的方式也是数据库应用程序的一个重要问题。由于数据库管理系统有其自身的特点，了解数据库系统擅长什么非常重要。MySQL\
  \ NDB Cluster 具有本章讨论的各种优化算法和功能。当您遇到性能问题时，请回顾本章并找到改进的方法。\n\n\n# MySQL NDB Cluster\
  \ 技术文档\n\n## 1. 简介与核心概念\nMySQL NDB Cluster 是一种分布式数据库系统，它结合了高可用性、高性能和可伸缩性，为关键任务应用提供实时性能。\n\
  \n## 2. 架构与组件\n### 2.1 节点类型\n*   **数据节点**：存储数据，负责数据分片、事务协调和故障恢复。\n*   **管理节点**：管理集群配置、启动、停止和监控。\n\
  *   **SQL/API 节点**：提供 MySQL 服务器接口（SQL 节点）或 NDB API 接口（API 节点），用于访问数据。\n\n### 2.2\
  \ 核心概念\n*   **ACID**：原子性、一致性、隔离性、持久性。\n*   **仲裁**：用于在网络分区或节点故障时防止“脑裂”，确保集群只有一个主分区。\n\
  *   **epoch**：NDB 集群中用于复制和恢复的时间单位，与全局检查点相关。\n*   **LCP（本地检查点）** 和 **GCP（全局检查点）**：用于数据持久化和恢复的机制。\n\
  \n## 3. 存储引擎与数据\n### 3.1 数据类型与存储\nNDB 集群支持 BLOB、JSON 和 TEXT 等数据类型，数据存储在内存和磁盘中。\n\
  *   **DataMemory** 和 **IndexMemory**：配置数据和索引的内存使用。\n*   **磁盘数据表**：允许将数据存储在磁盘上，通过`CREATE\
  \ TABLESPACE`和`CREATE LOGFILE GROUP`命令管理。\n\n### 3.2 表设计\n*   **分区与分片**：数据自动或手动分区到不同节点组。\n\
  *   **索引**：支持主键、唯一哈希索引和有序索引。使用`ndb_desc`命令查看表信息。\n*   **规范化**：设计表时需考虑 NDB 存储引擎的特性。\n\
  \n## 4. 配置与部署\n### 4.1 配置文件\n配置通过`config.ini`（管理节点）和`my.cnf`（SQL 节点）文件管理。\n*   **关键参数**：例如`NoOfReplicas`、`DataMemory`、`IndexMemory`、`MaxNoOfTables`、`MaxNoOfTriggers`、`TimeBetweenEpochs`、`ArbitrationRank`等。\n\
  *   **数据节点选项**：如`BackupDataBufferSize`、`DiskPageBufferMemory`、`MaxNoOfExecutionThreads`等。\n\
  \n### 4.2 部署与安装\n*   支持多种平台安装，包括 Linux（RPM/DEB/tar.gz）、Windows（MSI/ZIP）和 macOS（DMG/原生包）。\n\
  *   使用`ndb_setup`或`MySQL NDB Cluster auto installer`进行图形化安装配置。\n*   `MySQL Cluster\
  \ Manager (MCM)`提供高级集群生命周期管理功能。\n\n## 5. 操作与管理\n### 5.1 启动与停止\n*   按顺序启动：管理节点（`ndb_mgmd`）、数据节点（`ndbd`/`ndbmtd`）、SQL\
  \ 节点（`mysqld`）。\n*   支持`--nostart`选项进行初始配置，以及`--reload`选项重新加载配置。\n\n### 5.2 备份与恢复\n\
  *   **备份**：使用`START BACKUP`命令创建备份。\n*   **恢复**：使用`ndb_restore`工具恢复数据。\n*   **逻辑备份**：可使用`mysqldump`、`mysqlpump`或\
  \ MySQL Workbench。\n\n### 5.3 监控\n*   **NDB 管理客户端**（`ndb_mgm`）：查看集群状态、执行管理任务。\n\
  *   **`ndbinfo`信息数据库**：提供集群配置、性能指标和状态视图，如`ndbinfo.memoryusage`。\n*   **性能模式**：用于监控查询、事务和等待事件。\n\
  \n## 6. 复制与高可用性\n### 6.1 NDB 集群复制\n*   支持主从复制和多主复制。\n*   **冲突检测**：提供基于时间戳和基于 epoch（`NDB$EPOCH()`、`NDB$EPOCH2()`等）的方法。\n\
  *   配置涉及`ndb_binlog_index`和`ndb_apply_status`系统表。\n\n### 6.2 故障转移与恢复\n*   **自动故障转移**：数据节点故障时自动处理。\n\
  *   **节点重启**：支持多种重启类型，如初始、常规、滚动重启。\n*   **灾难恢复**：涉及备份、时间点恢复（PITR）等。\n\n## 7. 性能与优化\n\
  ### 7.1 查询优化\n*   **下推优化**：将连接、聚合等操作下推到数据节点执行。\n*   **连接算法**：支持 BNLJ（块嵌套循环连接）、BKAJ（批处理键访问连接）等。\n\
  *   **`Condition pushdown`**：将 WHERE 条件下推到存储引擎。\n\n### 7.2 系统优化\n*   **CPU 与内存**：考虑\
  \ CPU 绑定策略、NUMA 架构、超线程（Hyper-threading）。\n*   **磁盘 I/O**：优化磁盘类型、文件系统块大小和`ODirect`设置。\n\
  *   **网络**：设计网络冗余，优化 TCP 设置和`Transporter`选项。\n\n## 8. 故障排除\n### 8.1 常见问题\n*   **SQL\
  \ 节点问题**：崩溃、查询丢失连接、OOM killer。\n*   **集群问题**：看门狗超时、网络分区、节点失败、计划外关机。\n*   **使用工具**：`ndb_error_reporter`收集错误信息，分析跟踪文件和核心转储。\n\
  \n## 9. 工具与实用程序\n*   **`ndb_desc`**：显示 NDB 表的描述信息。\n*   **`ndb_show_tables`**：显示集群中的表列表。\n\
  *   **`ndb_size.pl`/`sizer`**：估算表和索引的大小。\n*   **`ndb_index_stat`**：提供索引统计信息。\n*\
  \   **`ndb_waiter`**：等待集群达到特定状态。\n*   **`sys`模式**：提供性能视图和工具，如`sys.schema_unused_indexes`。\n\
  \n## 10. 特定场景与集成\n*   **NoSQL 访问**：通过 NDB API 或`memcached`（NDB-memcached）进行键值存储访问。\n\
  *   **与 ProxySQL 集成**：用于负载均衡和连接管理。\n*   **从现有 MySQL 升级**：支持在线或离线将数据迁移到 NDB 集群。\n"
