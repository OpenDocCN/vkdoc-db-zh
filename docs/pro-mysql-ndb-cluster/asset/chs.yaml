  `MySQL Cluster Manager`（和 `MySQL NDB Cluster`），因为那里提供了自 2011 年以来的所有版本，而 Oracle 交付云通常只包含一个版本——通常是最新版本。


  ##### 选择平台


  选择发布版本后，选择一个或多个平台，如图 13-3 所示。在此示例中，将为 64 位 Linux 和 Microsoft Windows 平台下载 `MySQL
  Cluster Manager`。


