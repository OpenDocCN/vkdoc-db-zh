  \ NDB Cluster 程序的信息。\n\n### 总结\n\n本章讨论了 NDB 管理客户端的用途。该客户端可用于各种管理任务，从获取当前内存使用情况报告到重新启动节点和管理节点组。MySQL\
  \ NDB Cluster 还包括其他几个客户端实用程序，这里也进行了简要讨论。本书的其余部分将使用管理客户端和其他实用程序，并提供其使用和输出的示例。下一章关于备份和恢复也不例外。\n\
