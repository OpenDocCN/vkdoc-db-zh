  \n##### 步骤 5. 定义 NdbRecord\n\n`indexRecord` 变量是使用 `myIndex` 作为 `NdbDictionary::Dictionary::createRecord()`\
  \ 函数的第一个参数创建的。这是因为 `indexRecord` 将用于索引扫描操作。\n\n\n\n# 扫描操作示例\n\n##### 步骤 7. 准备要应用的过滤器\n\
  \n从`NdbDictionary::Table`实例创建一个`NdbInterpretedCode`类型的变量。然后，从`NdbInterpretedCode`实例创建一个`NdbScanFilter`类型的变量。`NdbScanFilter`是用于定义过滤器的类。\n\
  \n`NdbScanFilter::begin()`函数的参数是`NdbScanFilter::AND`、`NdbScanFilter::OR`、`NdbScanFilter::NAND`或`NdbScanFilter::NOR`。\n\
  \n这指定了当在过滤器中定义了多个搜索条件时应用的逻辑运算符。\n\n`NdbScanFilter::cmp()`函数的调用定义了要应用的过滤器。在此示例中，定义的过滤器用于获取`CountryCode`列为`JPN`的行。`NdbScanFilter::cmp()`函数的第一个参数指定了操作类型。虽然本例中指定了`NdbScanFilter::COND_LIKE`，但它是一种用于字符串的条件类型。表\
  \ 19-6 列出了可用的条件类型。\n\n表 19-6. NdbScanFilter 中定义的条件类型\n\n| 条件类型 | 数据类型 | 描述 |\n|\
  \ --- | --- | --- |\n| `COND_LE` | 数值型 | 小于或等于 (<=) |\n| `COND_LT` | 数值型 | 小于 (<)\
  \ |\n| `COND_GE` | 数值型 | 大于或等于 (>=) |\n| `COND_GT` | 数值型 | 大于 (>) |\n| `COND_EQ`\
  \ | 数值型 | 等于 (=) |\n| `COND_NE` | 数值型 | 不等于 (!=) |\n| `COND_LIKE` | 字符串型 | 字符串的相似搜索\
  \ |\n| `COND_NOT_LIKE` | 字符串型 | 字符串的非相似搜索 |\n| `COND_AND_EQ_MASK` | 位类型 | 列值等于位操作的结果\
  \ |\n| `COND_AND_NE_MASK` | 位类型 | 列值不等于位操作的结果 |\n| `COND_AND_EQ_ZERO` | 位类型 | 位操作的结果为零\
  \ |\n| `COND_AND_NE_ZERO` | 位类型 | 位操作的结果为非零值 |\n\n当使用相似搜索时，您可以使用‘`%`’或‘`_`’字符作为通配符在字符串列中搜索数据，就像在\
  \ SQL 中一样。`NdbScanFilter`类还有其他的比较函数——`eq()`、`ne()`、`le()`、`lt()`、`ge()`和`gt()`——作为带有特定条件类型的`cmp()`的人类可读简写。要测试列是否为`NULL`，`NdbScanFilter`类也有`isnull()`和`isnotnull()`函数。\n\
  \n`NdbScanOperation::ScanOptions`是一个用于扫描选项的结构体。示例程序将由我们刚才讨论的过滤器创建的解释代码和扫描标志传递给这个结构体。扫描标志指定了扫描的一些附加属性，如表\
  \ 19-7 所述。虽然扫描标志定义在`NdbScanOperation`类中，但表 19-7 中省略了类名。\n\n表 19-7. 扫描标志\n\n| 标志名称\
  \ | 描述 |\n| --- | --- |\n| `SF_TupScan` | 按`DBTUP`内核块中的行顺序扫描。 |\n| `SF_DiskScan`\
  \ | 按磁盘上的行顺序扫描。 |\n| `SF_OrderBy` | 按索引中的行顺序扫描。仅适用于有序索引扫描操作。 |\n| `SF_OrderByFull`\
  \ | 与`SF_OrderBy`相同，只是所有键列都会自动添加到读位掩码中。 |\n| `SF_Descending` | 有序索引扫描按降序进行。 |\n\
  | `SF_ReadRangeNo` | 在多范围扫描时，返回范围的标识符。 |\n| `SF_MultiRange` | 执行多范围扫描。 |\n| `SF_KeyInfo`\
  \ | 请求将`KeyInfo`发送回调用方，这是进一步操作所必需的。 |\n\n##### 步骤 8. 指示 NDB API 扫描表\n\n在此步骤中，调用`NdbTransaction::scanTable()`来声明程序将使用`NdbRecord`接口执行表扫描。随后在步骤\
  \ 9 中调用`NdbTransaction::execute()`。请注意，参数是`NoCommit`，因为扫描需要进一步的操作。\n\n##### 步骤 10.\
  \ 循环获取行\n\n`NdbScanOperation::nextResult()`从数据节点获取一行。从数据节点的获取是批量完成的，然后暂时存储在 NDB\
  \ API 库中的一个缓冲区中。当第二个参数为`true`时，从数据节点获取。否则，仅从缓冲区检索一行。\n\n当获取到一行时，`NdbScanOperation::nextResult()`返回\
  \ 0。如果获取完成但没有更多匹配的行，它返回 1。如果它试图从本地缓冲区检索行，但本地没有可用的行，它返回 2。当发生错误时，它返回-1。\n\n虽然可以通过始终为`NdbScanOperation::nextResult()`的第二个参数指定`true`来编写扫描程序，但我不建议这样做。批处理是一种非常高效的方法，它可以显著提高应用程序性能。\n\
  \n这是一个扫描操作的基本程序流。无论扫描操作多么复杂，它都以类似的方式完成。示例有序索引扫描程序如清单 19-14 所示，它延续自清单 19-13。\n\n\
  ```\nint NdbApiExample3::do_index_scan_read()\n{\n// 步骤 1. 启动一个新事务\nNdbTransaction\
  \ *myTransaction = myNdb->startTransaction();\nif (myTransaction == NULL) {\nprint_error(myNdb->getNdbError(),\
  \ \"Could not start transaction.\");\nreturn 1;\n}\n// 步骤 2. 准备要应用的过滤器\nNdbInterpretedCode\
  \ code(myTable);\nNdbScanFilter filter(&code);\nif (filter.begin(NdbScanFilter::AND)\
  \ getColumnNo(), \"JPN\", 3) getNdbError(), \"Failed to set a filter.\");\nmyNdb->closeTransaction(myTransaction);\n\
  return 2;\n}\nUint32 scanFlags =\nNdbScanOperation::SF_OrderBy | NdbScanOperation::SF_Descending;\n\
  NdbScanOperation::ScanOptions options;\noptions.optionsPresent =\nNdbScanOperation::ScanOptions::SO_SCANFLAGS\
  \ |\nNdbScanOperation::ScanOptions::SO_INTERPRETED;\noptions.scan_flags = scanFlags;\n\
  options.interpretedCode= &code;\n// 步骤 3. 定义索引边界\nCityRow low, high;\nlow.Population\
  \ = 1000000;\nhigh.Population = 2000000;\nNdbIndexScanOperation::IndexBound bound;\n\
  bound.low_key= (char*)&low;\nbound.low_key_count = 1;\nbound.low_inclusive = true;\n\
  bound.high_key = (char*)&high;\nbound.high_key_count =1 ;\nbound.high_inclusive\
  \ = false;\nbound.range_no = 0;\n// 步骤 4. 指示 NDB API 扫描索引\nNdbIndexScanOperation\
  \ *isop =\nmyTransaction->scanIndex(indexRecord,\nvalsRecord,\nNdbOperation::LM_Read,\n\
  NULL,\n&bound,\n&options,\nsizeof(NdbScanOperation::ScanOptions));\nif (isop ==\
  \ NULL) {\nprint_error(myTransaction->getNdbError(),\n\"Could not retrieve an operation.\"\
  );\nmyNdb->closeTransaction(myTransaction);\nreturn 4;\n}\n// 步骤 5. 向数据节点发送请求\n\
  if (myTransaction->execute( NdbTransaction::NoCommit ) == -1) {\nprint_error(myTransaction->getNdbError(),\
  \ \"Failed to prepare a scan.\");\nmyNdb->closeTransaction(myTransaction);\nreturn\
  \ 5;\n}\n// 步骤 6. 循环获取行\nint check = 0;\nbool needToFetch = true;\nCityRow *row;\n\
  while((check = isop->nextResult((const char**) &row,\nneedToFetch, false)) >= 0)\
  \ {\nif (check == 0) {\n// 行可用\nneedToFetch = false;\nprint_city(row);\n} else if\
  \ (check == 2) {\n// 需要获取行\nmyTransaction->execute(NdbTransaction::NoCommit);\n\
  needToFetch = true;\n} else if (check == 1) {\n// 没有更多行\nbreak;\n}\n}\n// 步骤 7.\
  \ 结束事务并释放它\nif (check == -1) {\nprint_error(myTransaction->getNdbError(), \"Error\
  \ during index scan.\");\nmyNdb->closeTransaction(myTransaction);\nreturn 7;\n}\
  \ else {\nmyTransaction->execute(NdbTransaction::Commit);\n}\nmyNdb->closeTransaction(myTransaction);\n\
  return 0;\n}\n清单 19-14. 扫描操作的简单示例：三部分中的第二部分\n```\n\n如您所见，清单 19-14 中的程序与清单 19-13\
  \ 中的扫描程序非常接近。唯一不同的部分是步骤 3 中的边界定义和步骤 4 中的操作类型。\n\n\n\n##### 步骤 3. 定义索引边界\n\n`NdbIndexScanOperation::IndexBound`类用于为`NdbRecord`接口定义索引边界。`CityRow`结构体的两个变量用于指定扫描索引范围的下限和上限。该边界作为参数传递给`NdbTransaction::scanIndex()`函数，这将在下一步中描述。也可以在调用`NdbTransaction::scanIndex()`时将边界参数设为`NULL`，之后再应用边界。这种情况下，必须在调用`NdbTransaction::execute()`之前调用`NdbIndexScanOperation::setBound()`来设置边界。\n\
  \n##### 步骤 4. 指示 NDB API 扫描索引\n\n在此示例中，调用`NdbTransaction::scanIndex()`来执行有序索引扫描，代替了前面示例中的`NdbTransaction::scanTable()`。\n\
  \n扫描操作的最后一个示例涉及在扫描过程中更新行。清单 19-15 展示了一个在扫描操作中更新行的示例程序。\n\n```\nint NdbApiExample3::do_scan_update()\n\
  {\n// Step 1. Start a new transaction\nNdbTransaction *myTransaction = myNdb->startTransaction();\n\
