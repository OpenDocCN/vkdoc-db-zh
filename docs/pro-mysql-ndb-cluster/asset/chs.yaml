  \ |\n| `PARTITIONS` | 关于表中每个分区的信息。 |\n| `REFERENTIAL_CONSTRAINTS` | 关于外键的信息。 |\n\
  | `ROUTINES` | 详细信息，包括存储过程和存储函数的完整定义。 |\n| `SCHEMATA` | 模式（数据库）信息。 |\n| `STATISTICS`\
  \ | 等同于 `SHOW INDEXES`。 |\n| `TABLES` | 所有表的信息。等同于 `SHOW TABLE STATUS`。 |\n| `TABLESPACES`\
  \ | 表空间信息。 |\n| `TABLE_CONSTRAINTS` | 主键、唯一键和外键的摘要。 |\n| `TRIGGERS` | 所有用户级表触发器的详细信息（不是内部的\
  \ NDB Cluster 触发器）。 |\n| `VIEWS` | 视图的详细信息。 |\n\n#### 信息模式：权限信息\n\n权限信息表列在表 15-3\
  \ 中。权限存储在 `mysql` 模式中的表里，四个信息模式权限表是缓存权限的视图（即，如果 `mysql` 权限表直接使用 `INSERT`、`UPDATE`、`DELETE`\
  \ 等命令更新，那么信息模式权限表在执行 `FLUSH PRIVILEGES` 之前不会显示更改）。信息模式表的表定义与 `mysql` 表的表定义不同。这些表对于查找具有特定权限或访问给定模式、表或列的用户很有用。\n\
  \n表 15-3.\n\n| 表名 | 描述 |\n| --- | --- |\n| `COLUMN_PRIVILEGES` | 包含授予用户的列级权限。 |\n\
  | `SCHEMA_PRIVILEGES` | 包含授予用户的模式级权限。 |\n| `TABLE_PRIVILEGES` | 包含授予用户的表级权限。 |\n\
  | `USER_PRIVILEGES` | 包含授予用户的全局级权限。 |\n\n#### 信息模式：监控相关数据\n\n信息模式中有几个与监控相关的表。这些表包含在表\
  \ 15-4 中。其中一些表在性能模式（Performance Schema）中已有新的实现。`ndb_transid_mysql_connection_map`\
  \ 表对 MySQL NDB Cluster 尤其重要，将在本章及下一章的示例中使用。\n\n表 15-4.\n\n| 表名 | 描述 |\n| --- | ---\
  \ |\n| `GLOBAL_STATUS` | 与 `SHOW GLOBAL STATUS` 的输出相同。此表在 MySQL NDB Cluster 7.5\
  \ 及之后版本中默认禁用，并已在 MySQL Server 8.0 中移除。请改用 `performance_schema.global_status` 表。\
  \ |\n| `GLOBAL_VARIABLES` | 与 `SHOW GLOBAL VARIABLES` 的输出相同。此表在 MySQL NDB Cluster\
  \ 7.5 及之后版本中默认禁用，并已在 MySQL Server 8.0 中移除。请改用 `performance_schema.global_variables`\
  \ 表。 |\n| `ndb_transid_mysql_connection_map` | 提供 NDB 事务 ID 与使用该事务的 SQL 节点 ID 和连接\
  \ ID 之间的映射。示例将在后面提供。 |\n| `OPTIMIZER_TRACE` | 可用于获取查询执行时优化器决策过程的详细信息。 |\n| `PROCESSLIST`\
  \ | 与 `SHOW FULL PROCESSLIST` 相同。在 MySQL NDB Cluster 7.3 及之后版本中，建议改用 `performance_schema.threads`\
  \ 表。 |\n| `PROFILING` | 与使用 `SHOW PROFILE` 分析查询后获得的信息相同。该表已在 MySQL NDB Cluster 7.5\
  \ 及之后版本中弃用，推荐使用性能模式。 |\n| `SESSION_STATUS` | 与 `SHOW SESSION STATUS` 的输出相同。此表在 MySQL\
  \ NDB Cluster 7.5 及之后版本中默认禁用，并已在 MySQL Server 8.0 中移除。请改用 `performance_schema.session_status`\
  \ 表。 |\n| `SESSION_VARIABLES` | 与 `SHOW SESSION VARIABLES` 的输出相同。此表在 MySQL NDB Cluster\
  \ 7.5 中默认禁用，并已在 MySQL Server 8.0 中移除。请改用 `performance_schema.session_variables`\
  \ 表。 |\n\n##### 使用信息模式\n\n信息模式表可以像用户定义的表一样使用和连接。它们也可以与来自其他模式（例如性能模式和 `ndbinfo`）的表在查询中组合使用。例如，你可以获取\
  \ `world` 示例数据库中每个表的列数，如下列输出所示：\n\n```\nmysql> SELECT TABLE_SCHEMA, TABLE_NAME,\
  \ COUNT(*) AS NumColumns\nFROM information_schema.TABLES\nINNER JOIN information_schema.COLUMNS\n\
  USING (TABLE_SCHEMA, TABLE_NAME)\nWHERE TABLE_SCHEMA = 'world'\nGROUP BY TABLE_SCHEMA,\
  \ TABLE_NAME;\n+--------------+-----------------+------------+\n| TABLE_SCHEMA |\
  \ TABLE_NAME      | NumColumns |\n+--------------+-----------------+------------+\n\
  | world        | City            |          5 |\n| world        | Country      \
  \   |         15 |\n| world        | CountryLanguage |          4 |\n+--------------+-----------------+------------+\n\
  3 rows in set (0.07 sec)\n```\n\n涉及模式信息的查询通常相对较慢，特别是当表不在表缓存中时。原因在于，在 MySQL Server\
  \ 5.7 及更早版本中，信息存储在文件系统的 `.frm` 文件中，每次从一个文件中读取数据以获取模式信息是缓慢的。因此，请谨慎执行针对未通过 `WHERE`\
  \ 子句和模式名和/或表名进行限制的表、列、索引等进行的查询。在 MySQL Server 8.0 引入新的数据字典之前，信息模式不支持索引。不过，对于像 `TABLES`\
  \ 这样的表，对模式名和表名的限制条件存在有限的下推支持。\n\n使用信息模式时需要考虑的另一个性能问题是 `PROCESSLIST` 表（以及 `SHOW [FULL]\
  \ PROCESSLIST`）所需的互斥锁。在极端情况下，这可能会影响 MySQL 的性能，并且在过去确实导致过服务中断。因此，建议使用 `performance_schema.threads`\
  \ 表或其派生出的某个 `sys` 模式视图。此外，`threads` 表提供了更多信息和灵活性。性能模式 `threads` 表在 MySQL NDB Cluster\
  \ 7.3 及更高版本中可用。\n\n##### 信息模式与 NDB 集群\n\n对于 MySQL NDB 集群，有两个特别值得关注的表：`FILES` 和 `ndb_transid_mysql_connection_map`\
  \ 表。在 7.5 版本之前（随着通用表空间的引入，`InnoDB` 也开始使用该表），`FILES` 表是 NDB 集群专用的。这两个表都是信息模式 SQL\
  \ 标准的 MySQL 扩展。\n\n##### 信息模式 FILES 表\n\n`FILES` 表提供有关日志文件组和表空间文件的详细信息，例如大小和可用空间量。清单\
  \ 15-1 展示了一个示例，其中添加了一个包含一个撤销日志文件的日志组和一个包含一个数据文件的表空间。`FILES` 表的输出分为两部分——表空间文件的三行和日志文件组的三行。每个节点上的每个文件都有一行，日志文件组和表空间本身也各有一行。\n\
  \n```\nmysql> CREATE LOGFILE GROUP lg_1\nADD UNDOFILE 'undo_1.log'\nINITIAL_SIZE\
  \ 16M\nUNDO_BUFFER_SIZE 2M\nENGINE NDBCLUSTER;\nQuery OK, 0 rows affected (1.48\
  \ sec)\nmysql> CREATE TABLESPACE ts_1\nADD DATAFILE 'data_1.dat'\nUSE LOGFILE GROUP\
  \ lg_1\nINITIAL_SIZE 32M\nENGINE NDBCLUSTER;\nQuery OK, 0 rows affected (9.51 sec)\n\
  mysql> CREATE TABLE db1.t1 (\nid int unsigned NOT NULL auto_increment,\nval varchar(36)\
  \ NOT NULL,\nPRIMARY KEY (id)\n) ENGINE=NDBCluster\nTABLESPACE ts_1\nSTORAGE DISK;\n\
  Query OK, 0 rows affected (0.22 sec)\nmysql> INSERT INTO db1.t1 (val)\nVALUES (UUID()),\
  \ (UUID()), (UUID()), (UUID()), (UUID());\nQuery OK, 5 rows affected (0.00 sec)\n\
  Records: 5  Duplicates: 0  Warnings: 0\nmysql> INSERT INTO db1.t1 (val)\nSELECT\
  \ UUID()\nFROM db1.t1 a\nCROSS JOIN db1.t1 b;\nQuery OK, 25 rows affected (0.01\
  \ sec)\nRecords: 25  Duplicates: 0  Warnings: 0\nmysql> INSERT INTO db1.t1 (val)\n\
  SELECT UUID()\nFROM db1.t1 a\nCROSS JOIN db1.t1 b;\nQuery OK, 900 rows affected\
  \ (0.06 sec)\nRecords: 900  Duplicates: 0  Warnings: 0\nmysql> SELECT FILE_NAME,\
  \ FILE_TYPE, LOGFILE_GROUP_NAME, ENGINE, FREE_EXTENTS,\nTOTAL_EXTENTS, EXTENT_SIZE,\
  \ INITIAL_SIZE, MAXIMUM_SIZE, EXTRA\nFROM information_schema.FILES\nWHERE ENGINE='NDBCluster'\\\
  G\n*************************** 1\\. row ***************************\nFILE_NAME:\
  \ data_1.dat\nFILE_TYPE: DATAFILE\nLOGFILE_GROUP_NAME: lg_1\nENGINE: ndbcluster\n\
  FREE_EXTENTS: 30\nTOTAL_EXTENTS: 32\nEXTENT_SIZE: 1048576\nINITIAL_SIZE: 33554432\n\
  MAXIMUM_SIZE: 33554432\nEXTRA: CLUSTER_NODE=1\n*************************** 2\\.\
  \ row ***************************\nFILE_NAME: data_1.dat\nFILE_TYPE: DATAFILE\n\
  LOGFILE_GROUP_NAME: lg_1\nENGINE: ndbcluster\nFREE_EXTENTS: 30\nTOTAL_EXTENTS: 32\n\
  EXTENT_SIZE: 1048576\nINITIAL_SIZE: 33554432\nMAXIMUM_SIZE: 33554432\nEXTRA: CLUSTER_NODE=2\n\
  *************************** 3\\. row ***************************\nFILE_NAME: NULL\n\
  FILE_TYPE: TABLESPACE\nLOGFILE_GROUP_NAME: lg_1\nENGINE: ndbcluster\nFREE_EXTENTS:\
  \ NULL\nTOTAL_EXTENTS: NULL\nEXTENT_SIZE: 1048576\nINITIAL_SIZE: NULL\nMAXIMUM_SIZE:\
  \ NULL\nEXTRA: NULL\n*************************** 4\\. row ***************************\n\
  FILE_NAME: undo_1.log\nFILE_TYPE: UNDO LOG\nLOGFILE_GROUP_NAME: lg_1\nENGINE: ndbcluster\n\
  FREE_EXTENTS: NULL\nTOTAL_EXTENTS: 4194304\nEXTENT_SIZE: 4\nINITIAL_SIZE: 16777216\n\
  MAXIMUM_SIZE: 16777216\nEXTRA: CLUSTER_NODE=1;UNDO_BUFFER_SIZE=2097152\n***************************\
  \ 5\\. row ***************************\nFILE_NAME: undo_1.log\nFILE_TYPE: UNDO LOG\n\
  LOGFILE_GROUP_NAME: lg_1\nENGINE: ndbcluster\nFREE_EXTENTS: NULL\nTOTAL_EXTENTS:\
  \ 4194304\nEXTENT_SIZE: 4\nINITIAL_SIZE: 16777216\nMAXIMUM_SIZE: 16777216\nEXTRA:\
  \ CLUSTER_NODE=2;UNDO_BUFFER_SIZE=2097152\n*************************** 6\\. row\
  \ ***************************\nFILE_NAME: NULL\nFILE_TYPE: UNDO LOG\nLOGFILE_GROUP_NAME:\
  \ lg_1\nENGINE: ndbcluster\nFREE_EXTENTS: 4121268\nTOTAL_EXTENTS: NULL\nEXTENT_SIZE:\
  \ 4\nINITIAL_SIZE: NULL\nMAXIMUM_SIZE: NULL\nEXTRA: UNDO_BUFFER_SIZE=2097152\n6\
  \ rows in set (0.01 sec)\n清单 15-1.\n使用 information_schema.FILES 表\n```\n\n从监控的角度来看，空闲区的数量特别值得关注。它们显示了剩余空间的多少。乘以区大小即可得出以字节为单位的空闲空间量。使用磁盘上数据时，监控可用空间非常重要，这样在空间即将耗尽时，可以分配更多空间或清除现有数据。清单\
  \ 15-2 展示了一个检查数据文件和撤销日志空闲空间的示例。\n\n```\nmysql> SELECT FILE_NAME, FILE_TYPE,\n(FREE_EXTENTS*EXTENT_SIZE)\
  \ AS FreeBytes,\nROUND(100*FREE_EXTENTS/TOTAL_EXTENTS, 2) AS FreePct,\nEXTRA\nFROM\
  \ information_schema.FILES\nWHERE ENGINE='NDBCluster' AND FREE_EXTENTS IS NOT NULL;\n\
  +------------+-----------+-----------+---------+--------------------------+\n| FILE_NAME\
  \  | FILE_TYPE | FreeBytes | FreePct | EXTRA                    |\n+------------+-----------+-----------+---------+--------------------------+\n\
  | data_1.dat | DATAFILE  |  31457280 |   93.75 | CLUSTER_NODE=1           |\n| data_1.dat\
  \ | DATAFILE  |  31457280 |   93.75 | CLUSTER_NODE=2           |\n| NULL       |\
  \ UNDO LOG  |  16485072 |    NULL | UNDO_BUFFER_SIZE=2097152 |\n+------------+-----------+-----------+---------+--------------------------+\n\
  3 rows in set (0.01 sec)\n清单 15-2.\n确定磁盘数据文件和撤销日志的可用空间量\n```\n\n\n##### 信息模式表 ndb_transid_mysql_connection_map\n\
  \n`ndb_transid_mysql_connection_map` 表提供了 SQL 节点中的连接与 NDB 事务 ID 之间的映射。此映射用于过滤 `ndbinfo`\
  \ 模式表 `cluster_locks`、`cluster_operations` 和 `cluster_transactions` 中的集群锁、事务和操作，以在服务器级别创建相应的视图。清单\
  \ 15-3 展示了 `ndbinfo.server_transactions` 视图定义中使用的 `SELECT` 语句（经过重新格式化和轻微改写），其中使用了\
  \ `ndb_transid_mysql_connection_map` 表来获取特定 SQL 节点的事务。通常情况下，`ndb_transid_mysql_connection_map`\
  \ 表不需要手动使用，但在下一章调查锁问题时会提供一个示例。\n\n```sql\nSELECT map.mysql_connection_id, t.node_id,\
  \ t.block_instance,\nt.transid, t.state, t.count_operations, t.outstanding_operations,\n\
  t.inactive_seconds, t.client_node_id, t.client_block_ref\nFROM information_schema.ndb_transid_mysql_connection_map\
  \ map\nINNER JOIN ndbinfo.cluster_transactions t\nON map.ndb_transid >> 32 = t.transid\
  \ >> 32;\n```\n清单 15-3. `ndbinfo.server_transactions` 视图的定义\n\n上一个示例中使用的 `ndbinfo`\
  \ 模式是 MySQL NDB 集群特有的模式，将在下一章讨论。\n\n信息模式旨在提供相对静态的数据，而性能模式则恰恰相反，这是接下来要讨论的第二个数据源。\n\
  \n### 性能模式\n\n自 2010 年以来，人们一直在努力通过性能模式改进对 MySQL 的监控和性能问题调查。这是一组使用 `Performance_Schema`\
  \ 存储引擎的表，所有数据都存储在内存中。这些数据不是持久化的，因此默认设置下的开销通常较低。但从 MySQL NDB 集群的角度来看，缺点在于只有 `mysqld`\
  \ 进程被检测，因此性能模式中没有与数据节点相关的信息。本节将对性能模式进行介绍。\n\n与 MySQL Server 5.5 和 MySQL NDB 集群 7.2\
  \ 相比，MySQL Server 5.6 以及随后的 MySQL NDB 集群 7.3 及更高版本中的性能模式发生了一些重大变化。这里只讨论当前的实现。\n\n\
  如前所述，性能模式中的数据不是持久化的，因此在重启 SQL 节点时数据会丢失。此外，表的大小受到限制以控制内存使用，一旦表满了，旧数据要么被清除以为新数据腾出空间，要么会被分组到一个“溢出桶”中。\n\
  \n#### 性能模式线程\n\n在讨论使用性能模式的细节之前，有必要先讨论一下线程：性能模式引用线程并使用线程 ID 来唯一标识每个线程。线程可以是前台线程，即等同于在\
  \ `SHOW PROCESSLIST` 中显示的连接；也可以是后台线程，例如监听新连接的主 `mysqld` 线程或内部的 `InnoDB` 线程。\n\n\
  清单 15-4 展示了一个使用 `performance_schema.threads` 表可用线程的典型示例，并与来自信息模式（与 `SHOW PROCESSLIST`\
  \ 相同，但此处仅包含选定列）的进程列表输出进行了比较。`performance_schema.threads` 查询的 `ID` 列对应于 `information_schema.PROCESSLIST`\
  \ 查询的 `ID` 列。两个名称为 `thread/sql/one_connection` 的线程是普通连接（线程 ID 分别为 29 和 31）。\n\n\
  ```\nmysql> SELECT THREAD_ID, NAME, TYPE, PROCESSLIST_ID AS ID\n    -> FROM performance_schema.threads;\n\
  +-----------+----------------------------------------+------------+------+\n| THREAD_ID\
  \ | NAME                                   | TYPE       | ID   |\n+-----------+----------------------------------------+------------+------+\n\
  |         1 | thread/sql/main                        | BACKGROUND | NULL |\n|  \
  \       2 | thread/sql/thread_timer_notifier       | BACKGROUND | NULL |\n|    \
  \     3 | thread/innodb/io_ibuf_thread           | BACKGROUND | NULL |\n|      \
  \   4 | thread/innodb/io_log_thread            | BACKGROUND | NULL |\n|        \
  \ 5 | thread/innodb/io_read_thread           | BACKGROUND | NULL |\n|         6\
  \ | thread/innodb/io_read_thread           | BACKGROUND | NULL |\n|         7 |\
  \ thread/innodb/io_read_thread           | BACKGROUND | NULL |\n|         8 | thread/innodb/io_read_thread\
  \           | BACKGROUND | NULL |\n|         9 | thread/innodb/io_write_thread \
  \         | BACKGROUND | NULL |\n|        10 | thread/innodb/io_write_thread   \
  \       | BACKGROUND | NULL |\n|        11 | thread/innodb/io_write_thread     \
  \     | BACKGROUND | NULL |\n|        12 | thread/innodb/io_write_thread       \
  \   | BACKGROUND | NULL |\n|        13 | thread/innodb/page_cleaner_thread     \
  \ | BACKGROUND | NULL |\n|        15 | thread/innodb/srv_lock_timeout_thread  |\
  \ BACKGROUND | NULL |\n|        16 | thread/innodb/srv_error_monitor_thread | BACKGROUND\
  \ | NULL |\n|        17 | thread/innodb/srv_monitor_thread       | BACKGROUND |\
  \ NULL |\n|        18 | thread/innodb/srv_master_thread        | BACKGROUND | NULL\
  \ |\n|        19 | thread/innodb/srv_purge_thread         | BACKGROUND | NULL |\n\
  |        20 | thread/innodb/srv_worker_thread        | BACKGROUND | NULL |\n|  \
  \      21 | thread/innodb/srv_worker_thread        | BACKGROUND | NULL |\n|    \
  \    22 | thread/innodb/buf_dump_thread          | BACKGROUND | NULL |\n|      \
  \  23 | thread/innodb/srv_worker_thread        | BACKGROUND | NULL |\n|        24\
  \ | thread/innodb/dict_stats_thread        | BACKGROUND | NULL |\n|        25 |\
  \ thread/sql/signal_handler              | BACKGROUND | NULL |\n|        26 | thread/sql/compress_gtid_table\
  \         | FOREGROUND |    3 |\n|        29 | thread/sql/one_connection       \
  \       | FOREGROUND |    7 |\n|        31 | thread/sql/one_connection         \
  \     | FOREGROUND |    8 |\n+-----------+----------------------------------------+------------+------+\n\
  27 rows in set (0.00 sec)\n\nmysql> SELECT ID, USER, COMMAND, STATE\n    -> FROM\
  \ information_schema.PROCESSLIST\n    -> ORDER BY ID;\n+----+-------------+---------+-----------------------------------+\n\
  | ID | USER        | COMMAND | STATE                             |\n+----+-------------+---------+-----------------------------------+\n\
  |  1 | system user | Daemon  | Waiting for event from ndbcluster |\n|  7 | root\
  \        | Sleep   |                                   |\n|  8 | root        | Query\
  \   | executing                         |\n+----+-------------+---------+-----------------------------------+\n\
  3 rows in set (0.00 sec)\n```\n清单 15-4. 性能模式线程示例\n\n请注意，线程 ID 26 是一个前台线程，但这个特定的线程并未出现在进程列表输出中，因此它属于一种既不完全属于后台也不完全属于前台的线程。另一方面，`ID\
  \ = 1` 的进程列表行并未出现在 `performance_schema.threads` 输出中。这是等待数据节点事件的 NDB 二进制日志线程。\n\n\
  \n\n如示例所示，可以使用 `performance_schema.threads` 表在进程列表 ID 和性能模式线程 ID 之间进行转换。如果安装了 `sys`\
  \ 模式，另一种方法是使用 `sys.ps_thread_id()` 函数。`sys.ps_thread_id()` 仅支持从进程列表 ID 转换为性能模式线程\
  \ ID。清单 15-5 说明了这两种转换 ID 的方式。`CONNECTION_ID()` 函数获取当前连接的进程列表 ID。`sys.ps_thread_id()`\
  \ 函数也可以接受 `NULL` 作为参数，在这种情况下，它返回当前连接的性能模式线程 ID。\n\n```\nmysql> SELECT CONNECTION_ID();\n\
  +-----------------+\n| CONNECTION_ID() |\n+-----------------+\n|               7\
  \ |\n+-----------------+\n1 row in set (0.00 sec)\n\nmysql> SELECT THREAD_ID\n \
  \   -> FROM performance_schema.threads\n    -> WHERE PROCESSLIST_ID = 7;\n+-----------+\n\
  | THREAD_ID |\n+-----------+\n|        29 |\n+-----------+\n1 row in set (0.00 sec)\n\
  \nmysql> SELECT sys.ps_thread_id(7);\n+---------------------+\n| sys.ps_thread_id(7)\
  \ |\n+---------------------+\n|                  29 |\n+---------------------+\n\
  1 row in set (0.00 sec)\n\nmysql> SELECT sys.ps_thread_id(NULL);\n+------------------------+\n\
  | sys.ps_thread_id(NULL) |\n+------------------------+\n|                     29\
  \ |\n+------------------------+\n1 row in set (0.00 sec)\n```\n**清单 15-5.** 将进程列表\
  \ ID 转换为性能模式线程 ID\n\n> **注意**\n> 遗憾的是，“线程”一词在 MySQL 中被重载使用，在某些地方用作“连接”的同义词。在本章中，“连接”指用户连接，而“线程”指性能模式线程，即它可以是后台线程或前台线程（包括连接线程）。\n\
  \n#### 性能模式表概述\n\n截至 MySQL NDB Cluster 7.5.6，性能模式中总共有 87 张表。大多数表名都是自解释的。例如，用于配置性能模式的表具有\
  \ `setup_` 前缀，而汇总表的名称中包含 `_summary_`，并说明了它们按什么以及如何分组数据。本小节将通过多个表格列出所有性能模式表，并按照以下分组进行归类：\n\
  \n*   **设置表**：用于配置性能模式并获取与性能模式配置相关信息的表。\n*   **事件表**：包含已记录事件详细信息的表。\n*   **汇总表**：根据表的目的，对来自事件表的数据进行分组后生成的报告表。\n\
  *   **连接和线程表**：与前台和后台线程相关的数据。\n*   **变量和状态表**：全局或会话/线程级别的系统变量和状态变量。\n*   **复制表**：显示与复制相关信息的表。\n\
  *   **实例表**：包含从互斥量到预处理语句等实例数据的表。\n*   **锁表**：关于表级锁和元数据锁的表。\n\n本节剩余部分将介绍这些表，并提供使用其中最重要的一些表的示例。\n\
  \n##### 设置表与配置\n\n表 15-5 中的设置表允许数据库管理员动态更改性能模式的设置。共有五张设置表。其中最常用的是 `setup_consumers`\
  \ 和 `setup_instruments` 表。此外，还有一张参考表 `performance_timers`。\n\n**表 15-5.** 性能模式设置表\n\
  \n| 表名 | 描述 |\n| --- | --- |\n| `performance_timers` | `setup_timers` 表可用计时器的概述。\
  \ |\n| `setup_actors` | 配置默认情况下应对哪些账户进行检测和计时。 |\n| `setup_consumers` | 配置哪些消费者被启用以消费由检测点生成的数据。\
  \ |\n| `setup_instruments` | 配置应启用哪些检测点。 |\n| `setup_objects` | 配置应对哪些表、触发器、存储过程、存储函数和存储事件进行检测。\
  \ |\n| `setup_timers` | 配置对不同事件类型应使用哪种计时器。 |\n\n本节剩余部分将讨论这些设置表，并对相关术语进行介绍。\n\n#####\
  \ 检测点\n\n检测点是进行测量的代码点。可以对检测点进行计数和计时。对于与内存相关的检测点，计数意味着对内存分配和释放的大小进行求和。检测点的名称是自解释的，并遵循使用正斜杠\
  \ (`/`) 分隔组级别的约定。一个检测点名称的例子是 `statement/sql/select`。顾名思义，它检测一条 `SELECT` SQL 语句。启用它后，每条\
  \ `SELECT` 语句都将被计数，并可选择进行计时。所有用于 SQL 语句的检测点都具有 `statement/sql/` 前缀，后跟语句类型。\n\n检测点生成的数据必须被消费，才能使其在性能模式表中可用。这是由消费者完成的。\n\
  \n\n\n##### 消费者\n\n`setup_consumers` 表定义了可以消费哪些工具（instruments）。这些消费者（consumers）形成了一个层级结构，如图\
  \ 15-1 所示。对于位于最低两层的事件消费者，`%` 可以是 `stages`、`statements`、`transactions`（仅限 7.5 及更高版本）或\
  \ `waits`。\n\n![A435171_1_En_15_Fig1_HTML.jpg](img/A435171_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1.\n\nPerformance Schema 消费者\n\n要使一个消费者有效启用，不仅需要消费者本身被启用，其层级结构中的所有祖先消费者也必须被启用。例如，要使\
  \ `events_statements_history` 能够消费工具，`events_statements_current`、`thread_instrumentation`\
  \ 和 `global_instrumentation` 消费者也必须被启用。安装 `sys` 架构后，可以使用 `sys.ps_is_consumer_enabled()`\
  \ 函数来考虑层级关系。清单 15-6 列出了版本 7.5 中的所有消费者，以及它们是否在 `setup_consumers` 中默认启用，以及其所有祖先消费者是否也被启用的默认值。在\
  \ 7.3 和 7.4 版本中，`events_statements_history` 消费者默认未启用。\n\n```sql\nmysql> SELECT NAME,\
  \ ENABLED, sys.ps_is_consumer_enabled(NAME) AS Collects\n    FROM performance_schema.setup_consumers;\n\
  +----------------------------------+---------+----------+\n| NAME              \
  \               | ENABLED | Collects |\n+----------------------------------+---------+----------+\n\
  | events_stages_current            | NO      | NO       |\n| events_stages_history\
  \            | NO      | NO       |\n| events_stages_history_long       | NO   \
  \   | NO       |\n| events_statements_current        | YES     | YES      |\n| events_statements_history\
  \        | YES     | YES      |\n| events_statements_history_long   | NO      |\
  \ NO       |\n| events_transactions_current      | NO      | NO       |\n| events_transactions_history\
  \      | NO      | NO       |\n| events_transactions_history_long | NO      | NO\
  \       |\n| events_waits_current             | NO      | NO       |\n| events_waits_history\
  \             | NO      | NO       |\n| events_waits_history_long        | NO  \
  \    | NO       |\n| global_instrumentation           | YES     | YES      |\n|\
  \ thread_instrumentation           | YES     | YES      |\n| statements_digest \
  \               | YES     | YES      |\n+----------------------------------+---------+----------+\n\
  15 rows in set (0.00 sec)\n```\n清单 15-6.\n\nMySQL NDB Cluster 7.5 中的消费者。\n\n`statement_digest`\
  \ 消费者负责收集关于标准化查询的统计信息。其名称来源于为每个标准化查询计算出的摘要（digest）。可以在 `events_statements_summary_by_digest`\
  \ 表中找到这些数据——后文将展示一个收集数据的示例。\n\n每个事件消费者都对应一个事件表。表的名称与消费者相同。事件消费者和表的详细信息，以及事件类型之间的关系，将在下一节关于事件表的部分讨论。\n\
  \n##### 操作者、对象与计时器\n\n`setup_actors` 和 `setup_objects` 表定义了哪些账户（`user@hostname`）和哪些架构对象（表、存储程序等）被工具化。默认情况下，除了\
  \ `information_schema`、`mysql` 和 `performance_schema` 架构中的对象外，所有对象都会被工具化。`setup_timers`\
  \ 表定义了用于不同事件类型的计时器。计时器会根据其使用开销和精度自动设置。默认选择的计时器是系统相关的，通常无需更改。可用计时器的详细信息及其开销可以在 `performance_timers`\
  \ 表中找到。\n\n##### 配置建议与如何更改设置\n\n默认设置是一个良好的起点，通常只需要很少的更改（如果有的话），除非在调查特定问题时。一个值得考虑的更改示例是启用\
  \ `events_transactions_current` 消费者和 `transaction` 工具。这将允许获取事务的额外详细信息，例如查找事务中执行的所有语句。后文讨论事件表时将展示一个示例。要动态启用该消费者和工具，请使用清单\
  \ 15-7 中的语句。可选地，通过同时启用 `events_transactions_history` 消费者，可以为每个当前连接保留最近的 10 个事务。\n\
  \n注意\n\n除非明确注明，否则本章中的示例均无需启用默认设置之外的任何内容。\n\n```sql\nmysql> UPDATE performance_schema.setup_consumers\n\
  \       SET ENABLED = 'YES'\n       WHERE NAME = 'events_transactions_current';\n\
  Query OK, 1 row affected (0.00 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n\
  mysql> UPDATE performance_schema.setup_instruments\n       SET ENABLED = 'YES',\
  \ TIMED = 'YES'\n       WHERE NAME = 'transaction';\nQuery OK, 1 row affected (0.00\
  \ sec)\nRows matched: 1  Changed: 1  Warnings: 0\n```\n清单 15-7.\n\n启用事务监控\n\n也可以在\
  \ MySQL Server 配置文件（`my.cnf/my.ini`）中启用工具和消费者。要像清单 15-7 中那样动态启用事务消费者和工具，可以添加如下设置：\n\
  \n```ini\n[mysqld]\nperformance_schema_consumer_events_transactions_current = ON\n\
  performance_schema_instrument                           = transaction=ON\n```\n\n\
  `performance_schema_instrument` 选项支持 `%` 通配符，并且可以多次指定该选项。\n\n注意\n\n切勿在生产环境中启用所有消费者和工具。监控是有开销的，启用所有项将对性能产生重大影响！特别是\
  \ `wait/synch/%` 工具和 `events_waits_%` 消费者会增加开销。根据经验，监控的粒度越细，增加的开销就越大。\n\nPerformance\
  \ Schema 还有其他几个配置选项。清单 15-8 列出了 MySQL NDB Cluster 7.5.6 中所有可用变量及其默认值。值为 `-1` 表示该选项是自动调整大小的。更多详细信息，请参见\
  \ [`dev.mysql.com/doc/refman/5.7/en/performance-schema-options.html`](https://dev.mysql.com/doc/refman/5.7/en/performance-schema-options.html)。\n\
  \n\n\n#### MySQL 性能模式事件表\n\n```\nmysql> SHOW GLOBAL VARIABLES LIKE 'performance\\\
  _schema%';\n+----------------------------------------------------------+-------+\n\
  | Variable_name                                            | Value |\n+----------------------------------------------------------+-------+\n\
  | performance_schema                                       | ON    |\n| performance_schema_accounts_size\
  \                         | -1    |\n| performance_schema_digests_size         \
  \                 | 10000 |\n| performance_schema_events_stages_history_long_size\
  \       | 10000 |\n| performance_schema_events_stages_history_size            |\
  \ 10    |\n| performance_schema_events_statements_history_long_size   | 10000 |\n\
  | performance_schema_events_statements_history_size        | 10    |\n| performance_schema_events_transactions_history_long_size\
  \ | 10000 |\n| performance_schema_events_transactions_history_size      | 10   \
  \ |\n| performance_schema_events_waits_history_long_size        | 10000 |\n| performance_schema_events_waits_history_size\
  \             | 10    |\n| performance_schema_hosts_size                       \
  \     | -1    |\n| performance_schema_max_cond_classes                      | 80\
  \    |\n| performance_schema_max_cond_instances                    | -1    |\n|\
  \ performance_schema_max_digest_length                     | 1024  |\n| performance_schema_max_file_classes\
  \                      | 80    |\n| performance_schema_max_file_handles        \
  \              | 32768 |\n| performance_schema_max_file_instances              \
  \      | -1    |\n| performance_schema_max_index_stat                        | -1\
  \    |\n| performance_schema_max_memory_classes                    | 320   |\n|\
  \ performance_schema_max_metadata_locks                    | -1    |\n| performance_schema_max_mutex_classes\
  \                     | 210   |\n| performance_schema_max_mutex_instances      \
