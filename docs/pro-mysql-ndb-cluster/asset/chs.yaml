  }\nint main(int argc, char *argv[])\n{\nNdbApiExample3 ex;\nreturn ex.doTest();\n\
  }\nListing 19-15.\n扫描操作的简单示例：三部分中的第三部分\n```\n\n清单 19-15 中的程序与清单 19-13 中的程序基本相同，区别在于在第\
  \ 5 步的获取行循环内部更新了行。更新行的方式非常简单；你只需调用`NdbScanOperation::updateCurrentTuple()`函数。顾名思义，它会用新值替换由`NdbScanOperation::nextResult()`函数最新获取的行。你还可以使用`NdbScanOperation::deleteCurrentTuple()`删除当前行，并使用`NdbScanOperation::lockCurrentTuple()`锁定当前行。\n\
  \n#### 错误处理注意事项\n\n本节中的示例程序没有足够的错误处理机制。它们只是示例；这些程序的主要目标是易于理解。虽然 NDB API 是一个事务性数据库操作\
  \ API，但事务可能因各种原因失败。事务理论保证每个事务最终都处于两种状态之一——`COMMIT`或`ABORT`。前者是成功状态，后者是由于某些错误导致事务回滚的状态。该理论并不保证每次事务都会成功。\n\
  \n因此，就像 SQL 应用程序一样，NDB API 应用程序也需要错误处理，包括事务重试。要在 NDB API 应用程序上实现错误处理例程，请注意以下几点。\n\
  \n##### 获取错误信息\n\n正如你在本节所见，错误信息可以通过`NdbError`结构体实例引用，该实例可通过调用`Ndb::getNdbError()`函数获取。由于它是从`Ndb`对象检索的，所以在`Ndb`对象连接到数据库之前是不可用的。因此，在应用程序的早期阶段，你需要单独的错误处理实现。虽然`getNdbError()`函数在其他类中也有实现，但所有这些类都是使用现有的`Ndb`类对象创建的。\n\
  \n要实现一个重试事务的例程，有必要判断不成功的事务是否可重试。这可以通过检查`NdbError`结构体的`status`成员来完成。如果它等于`NdbError::TemporaryError`，则该事务可以重试。\n\
  \n##### 事务会自动回滚\n\n在 MySQL NDB Cluster 中，当事务因某些原因失败时，它会自动回滚，并且无法再通过该失败的事务执行进一步的操作。你需要立即关闭该事务，然后使用`NdbTransaction`的新实例重试事务。\n\
  \n\n\n##### 在重试前插入合理的等待时间\n\n临时错误不会立即消失，因为资源在其他事务释放之前可能无法使用。因此，在重试事务前插入一些合理的等待时间是个好主意。否则，重试事务的尝试很可能会因相同的临时错误而失败。\n\
  \n结合本节目前的内容，您可以编写代码来重试事务，如代码清单 19-16 所示。请注意，此代码仅是概念性的。您需要编写自己的代码来完成实际工作。\n\n```\n\
  int exitCode = incomplete;\nint retryCount = 10;\nint retryDelay = 50;\nwhile (retryCount--\
  \ > 0) {\n// 获取一个新的事务句柄\nNdbTransaction myTransaction = myNdb->startTransaction();\n\
  ... 在此处编写执行某些操作的代码 ...\nif (found_error) {\nconst NdbError err = myNdb->getNdbError();\n\
  // 判断错误是否可重试\nif (err.status == NdbError::TemporaryError) {\n// 关闭事务\nmyNdb->closeTransaction(myTransaction);\n\
  // 重试前休眠\nmillisleep(retryDelay);\ncontinue;\n} else {\nexitCode = failure;\nbreak;\n\
  }\n} else {\nexitCode = successful;\n}\n}\n```\n\n代码清单 19-16. 在 NDB API 上重试事务的概览概念代码\n\
  \n在本节中，您学习了如何使用 NDB API 开发应用程序。您可以使用 NDB API 上的事务来修改数据。事务使开发更加容易。\n\n本节描述的操作，如查找和扫描，是低级别功能。虽然它们是低级别的，但通过像搭积木一样组合这些低级别功能，从技术上讲，可以实现与\
  \ SQL 类似的高级功能。即便如此，与使用 SQL 等高级 API 开发应用程序相比，它仍会花费更多时间。然而，如果应用程序需要卓越的性能，这种努力将会得到回报。\n\
  \n在下一节中，我们将讨论如何使用 ClusterJ，一个用于 Java 编程语言的 API。用 C++ 开发整个数据库应用程序并不常见；有时仅在性能重要的部分使用它。对于数据库应用程序开发，Java\
  \ 比 C++ 使用得更为广泛。\n\n### 通过 ClusterJ 访问数据\n\n自 MySQL NDB Cluster 7.1 系列以来，NDB API\
  \ 库的官方 Java 绑定 ClusterJ 已经可用。尽管 ClusterJ 是 `libndbclient` 库的一个绑定，该库通过 Java 原生接口（简称\
  \ JNI）调用 NDB API C++ 函数，但 ClusterJ 的使用方式与 NDB API 本身大不相同。ClusterJ 拥有一个类似 O/R 映射器的接口。使用\
  \ ClusterJ 比直接使用 NDB API 要容易得多。\n\n由于 Connector/J 可以让 Java 应用程序与 SQL 节点配合使用，因此可以根据情况使用\
  \ ClusterJ 和 Connector/J，就像 C++ 应用程序可以同时使用 MySQL C API 和 NDB API 一样。\n\n还有一个用于 Apache\
  \ 软件基金会 Java 持久化项目 OpenJPA 的插件，称为 ClusterJPA。它会在使用 ClusterJ 和 Connector/J 之间自动切换以获得最佳性能。本书将不讨论\
  \ ClusterJPA，因为自以下版本的 MySQL NDB Cluster 起，它已不再受支持：7.2.30、7.3.18、7.4.16 和 7.5.7。\n\
  \n#### 安装 ClusterJ\n\n在 MySQL NDB Cluster 7.5 系列中，为 RPM 和 DEB 包管理器提供了单独的软件包。软件包名称包含字符串\
  \ \"java\"，例如 `mysql-cluster-community-java-7.5.6-1.el7.x86_64.rpm`。在较旧的版本中，ClusterJ\
  \ 包含在服务器 RPM 软件包和其他格式的一体化软件包中。\n\n由于 ClusterJ 是 NDB API 的包装器，因此同一主机上也必须安装 `libndbclient`\
  \ 库。请参阅本章前面关于 NDB API 的安装部分。\n\n要运行 ClusterJ 程序，必须将 `clusterj.jar` 添加到类路径中。在 RHEL\
  \ 或基于 Debian 的操作系统上，`clusterj.jar` 通常安装在 `/usr/share/mysql/java` 下，其文件名中包含表示版本号的字符串，例如\
  \ `clusterj-7.5.6.jar`。`libndbclient` 库的路径也需要通过 `-Djava.library.path` 选项传递给 JVM。它通常安装在\
  \ `/usr/lib/mysql` 下。因此，运行 ClusterJ 应用程序的命令如下所示：\n\n```\nshell$ java -classpath\
  \ /usr/share/mysql/java/clusterj-7.5.6.jar:. \\\n>           -Djava.library.path=/usr/lib/mysql\
  \ ClusterJAppName\n```\n\n编译 ClusterJ 应用程序时，必须通过类路径将 `clusterj-api.jar` 传递给 `javac`。编译\
  \ ClusterJ 应用程序的命令如下所示：\n\n```\nshell$ javac -classpath /usr/share/mysql/java/clusterj-api-7.5.6.jar\
  \ \\\n>            ClusterJAppName.java\n```\n\n#### 编写 ClusterJ 应用程序\n\n要访问集群，首先要获取\
  \ `com.mysql.clusterj.Session` 类的一个实例。这相当于 NDB API 的 `Ndb` 类。`Session` 类的实例从 `com.mysql.clusterj.SessionFactory`\
  \ 获取，而 `SessionFactory` 又从 `com.mysql.clusterj.ClusterJHelper` 获取。\n\n您通过带有注解的接口来获取数据访问。类成员与列之间的映射通过注解完成。该接口必须为每一列声明一个\
  \ getter 和 setter。一旦声明了 getter 和 setter，ClusterJ 就会识别出该列在表中应该存在。ClusterJ 假设列名是小写的。如果列名包含大写字符，则必须在\
  \ getter 和 setter 声明之前添加注解。应用程序访问的每个表都需要编写一个接口。\n\n#### ClusterJ 示例\n\n代码清单 19-17\
  \ 到 19-19 展示了一个 ClusterJ 示例程序。虽然它们由三个文件组成，但主要例程显示在代码清单 19-18 中，名为 `ClusterJSimple.java`。我们不在此详细讨论该示例程序的具体操作。示例程序的目的是让您了解\
  \ ClusterJ 的整体用法。请阅读程序中的注释以理解程序每个阶段所执行的操作。\n\n```\nimport com.mysql.clusterj.annotation.Column;\n\
  import com.mysql.clusterj.annotation.Index;\nimport com.mysql.clusterj.annotation.PersistenceCapable;\n\
  import com.mysql.clusterj.annotation.PrimaryKey;\n// 步骤 1. 定义一个接口\n@PersistenceCapable(table=\"\
  City\")\npublic interface City {\n@PrimaryKey\n@Column(name=\"ID\")\nint getId();\n\
  void setId(int id);\n@Column(name=\"Name\")\nString getName();\nvoid setName(String\
  \ name);\n@Column(name=\"District\")\nString getDistrict();\nvoid setDistrict(String\
  \ district);\n@Column(name=\"CountryCode\")\n@Index(name=\"CountryCode\")\nString\
  \ getCountryCode();\nvoid setCountryCode(String countryCode);\n@Column(name=\"Population\"\
  )\nint getPopulation();\nvoid setPopulation(int population);\n}\n```\n\n代码清单 19-17.\
  \ City.java: City 表的接口定义\n\n\n```java\nimport com.mysql.clusterj.ClusterJHelper;\n\
  import com.mysql.clusterj.SessionFactory;\nimport com.mysql.clusterj.Session;\n\
  import com.mysql.clusterj.Query;\nimport com.mysql.clusterj.query.QueryBuilder;\n\
  import com.mysql.clusterj.query.QueryDomainType;\nimport java.io.*;\nimport java.util.Properties;\n\
  import java.util.List;\nimport java.util.ArrayList;\nimport java.util.Map;\n\npublic\
  \ class ClusterJSimple {\n    public static void main (String[] args)\n        \
  \    throws java.io.FileNotFoundException,\n            java.io.IOException,\n \
  \           com.mysql.clusterj.ClusterJException {\n        // 步骤 2. 从文件加载属性\n \
  \       File propsFile = new File(\"clusterj.properties\");\n        InputStream\
  \ inStream = new FileInputStream(propsFile);\n        Properties props = new Properties();\n\
  \        props.load(inStream);\n\n        // 步骤 3. 获取一个会话实例\n        SessionFactory\
  \ factory = ClusterJHelper.getSessionFactory(props);\n        Session session =\
  \ factory.getSession();\n\n        // 步骤 4. 创建一个新的 City 实例并添加一行记录\n        City\
  \ newCity = session.newInstance(City.class);\n        newCity.setId(4080);\n   \
  \     newCity.setName(\"Tochigi\");\n        newCity.setDistrict(\"Tochigi\");\n\
  \        newCity.setCountryCode(\"JPN\");\n        newCity.setPopulation(140000);\n\
  \        session.persist(newCity);\n        System.out.println(\"Saved Tochigi-shi.\"\
  );\n\n        // 步骤 5. 查找 ID = 1532 的行\n        City whatsThis = session.find(City.class,\
  \ 1532);\n        System.out.println(\"Name of city where ID = 1532 is \"\n    \
  \            + whatsThis.getName().trim() + \".\");\n\n        // 步骤 6. 查找所有 CountryCode\
  \ = \"JPN\" 的行。参见步骤 9\n        List cities = findByCountryCode(session, \"JPN\"\
  );\n        System.out.println(\"Cities in Japan.\");\n        int n = 1;\n    \
  \    for (City c: cities) {\n            System.out.println((n++) + \":\" + c.getName().trim());\n\
  \        }\n\n        // 步骤 7. 更新一行：将东京的人口增加 1000000\n        City tokyo = whatsThis;\n\
  \        tokyo.setPopulation(tokyo.getPopulation() + 1000000);\n        session.updatePersistent(tokyo);\n\
  \n        // 步骤 8. 删除一行\n        City tochigi = session.newInstance(City.class);\n\
  \        tochigi.setId(4080);\n        session.deletePersistent(tochigi);\n    \
  \    System.out.println(\"Deleted Tochigi-shi\");\n    }\n\n    // 步骤 9. 使用查询构建器进行扫描的示例\n\
  \    static List findByCountryCode(Session session, String cc)\n            throws\
  \ com.mysql.clusterj.ClusterJException {\n        QueryBuilder builder = session.getQueryBuilder();\n\
  \        QueryDomainType domain =\n                builder.createQueryDefinition(City.class);\n\
  \        domain.where(domain.get(\"countryCode\")\n                .equal(domain.param(\"\
  cc\")));\n        Query query = session.createQuery(domain);\n        query.setParameter(\"\
  cc\", cc);\n        printExplain(query);\n        return query.getResultList();\n\
  \    }\n\n    // 步骤 10. 打印执行计划\n    static  void printExplain(Query q) {\n     \
  \   Map explain = q.explain();\n        for (String k: explain.keySet()) {\n   \
  \         System.err.println(k + \":\" + explain.get(k).toString());\n        }\n\
  \    }\n}\n/*\n列表 19-18.\nClusterJSimple.java : ClusterJ 程序示例\n*/\n```\n\n```properties\n\
  com.mysql.clusterj.connectstring=mgmhost\ncom.mysql.clusterj.database=world\n/*\n\
  列表 19-19.\nclusterj.properties : 连接属性示例\n*/\n```\n\n由于 `ClusterJ` 在内部使用了 `NDB API`，其编程风格与\
  \ `NDB API` 很接近。如果你熟悉 `NDB API`，那么使用 `ClusterJ` 将不会太困难。在开发使用 `ClusterJ` 的应用程序时，请阅读手册：[`dev.mysql.com/doc/ndbapi/en/mccj.html`](https://dev.mysql.com/doc/ndbapi/en/mccj.html)。\n\
  \n### 总结\n\n本章讨论了可用于 MySQL NDB Cluster 的 NoSQL 接口。本章涵盖的主要 API 包括 `memcached`、`NDB\
  \ API` 和 `ClusterJ`。\n\n正如你所见，在 MySQL NDB Cluster 中进行开发非常灵活。这种灵活性是 MySQL NDB Cluster\
  \ 最强大的优势之一。通常，一个应用程序包含多个部分——一部分可能需要复杂的查询，另一部分可能需要非常快速的数据访问。使用各种 MySQL NDB API 可以同时满足性能和功能需求。\n\
  \n剩下的唯一需要考虑的主题是性能，这将在下一章中讨论。\n\n# 第 20 章. MySQL NDB Cluster 与应用程序性能调优\n\n性能对于数据库管理系统来说是一个非常重要的主题。性能不足的数据库管理系统是无用的。对于\
  \ MySQL NDB Cluster 也是如此。本章将讨论如何提高 MySQL NDB Cluster 的性能。\n\n### MySQL NDB Cluster\
  \ 调优\n\n为了充分利用计算机资源，正确设置系统非常重要，以便 MySQL NDB Cluster 能够高效利用底层的处理器、磁盘、网络等资源。本节讨论如何配置系统以针对\
  \ MySQL NDB Cluster 进行优化。\n\n#### 禁用节能模式与 CPU 频率调节\n\n虽然节能模式和 CPU 频率调节有利于降低功耗，但对于\
  \ MySQL NDB 集群的性能而言，它们并无益处，甚至会影响响应时间的可预测性。当启用节能模式和/或 CPU 频率调节时，CPU 时钟频率会根据当前系统负载进行调整。如果\
  \ CPU 核心上没有待处理的任务，它可能会进入空闲状态。\n\n例如，英特尔 CPU 具有多种节能模式，称为 C-states。每个状态的名称以字母 C 后跟一位数字表示，如有需要还会附加一个字母。例如，C0、C1、C1E、C2……等等。数字越大，CPU\
  \ 核心进入的睡眠深度越深，被关闭的电路就越多。C0 表示核心正在运行，并未睡眠。当系统空闲一段时间后，操作系统会让 CPU 核心进入空闲 C-state 模式，例如\
  \ C1。\n\n在 MySQL NDB 集群中使用节能模式时，最显著的问题是唤醒睡眠中的 CPU 核心需要很长时间。当 CPU 核心在低时钟频率下运行，并检测到自身处于繁忙状态时，提升时钟频率也需要时间。这些时间延迟极大地影响了\
  \ MySQL NDB 集群的性能和响应时间。\n\n为了防止 Linux 系统上的空闲状态和 CPU 频率调节带来这些负面影响，请使用**性能** CPU 调控器。配置\
  \ CPU 调控器的方式因发行版而异。请参考相应发行版的手册以了解 CPU 调控器配置的详细信息。以下命令是一个示例，展示了如何在安装了 `cpupower`\
  \ 工具的系统上将调控器设置为性能模式。该命令在所有安装了 `cpupower` 工具的发行版中是通用的。\n\n```\nshell$ sudo cpupower\
  \ frequency-set --governor performance\n```\n\n通常，`cpupower` 命令的配置文件位于 `/etc/default/cpupower`。请编辑此文件并在您的主机上设置\
  \ `governor='performance'`。在大多数情况下，默认值为 `ondemand`，这会导致空闲的 CPU 核心进入空闲 C-state。\n\
  \n此外，如果您使用的是英特尔 CPU，可以通过设置内核参数 `intel_idle.max_cstate=0` 来完全禁用空闲状态。在使用 grub 作为引导加载程序的系统上，该参数通常设置在\
  \ `/etc/default/grub` 中以 `GRUB_CMDLINE_LINUX_DEFAULT=` 开头的行中。（编辑 `/etc/default/grub`\
  \ 后，您需要使用 `grub-mkconfig` 命令来创建实际的 grub 配置文件。）\n\n在 Windows 上，您可以从 Windows 控制面板的“电源选项”屏幕中选择“高性能”电源计划，如图\
  \ 20-1 所示。请注意，“高性能”设置最初是隐藏的。您可以通过单击“显示附加计划”来展开该计划。\n\n![A435171_1_En_20_Fig1_HTML.jpg](img/A435171_1_En_20_Fig1_HTML.jpg)\n\
  \n图 20-1. 在 Windows 上设置高性能电源计划\n\n在 Windows 10 上，您可以通过打开 Windows 设置，然后点击“系统”菜单来打开“电源选项”屏幕。选择“电源和睡眠”，然后点击“其他电源设置”，如图\
  \ 20-2 所示。\n\n![A435171_1_En_20_Fig2_HTML.jpg](img/A435171_1_En_20_Fig2_HTML.jpg)\n\
  \n图 20-2. Windows 10 上的电源和睡眠选项\n\n请注意，使用高性能模式时功耗将会增加。然而，这是值得付出的代价，因为禁用节能模式和 CPU\
  \ 频率调节所带来的性能提升是显著的。如果启用节能模式，我们需要更多的服务器才能达到相同的性能水平。无论是从资金还是电力角度来看，运行更多的服务器机器，其成本都远高于在更少的服务器上禁用节能模式。即使您运行着更多启用了节能模式的服务器，其响应时间通常也比在更少的服务器上禁用节能模式要差。\n\
  \n#### CPU 绑定策略\n\nCPU 绑定（或处理器亲和性）是影响数据节点性能的最重要因素。然而，配置 CPU 绑定并非易事。不当地将线程绑定到 CPU\
  \ 会导致性能下降。本节讨论如何利用 CPU 绑定来最大化性能。\n\n##### 超线程与 CPU 绑定\n\n超线程（HT）是现代 CPU（如酷睿系列和至强系列）中普遍实现的技术。借助\
  \ HT，操作系统可以在每个物理 CPU 核心上识别出多个虚拟 CPU 核心。虚拟 CPU 核心的行为类似于物理 CPU 核心。由于每个虚拟核心都可以运行一个线程，因此一个物理\
  \ CPU 核心上可以并发运行多个线程。\n\nHT 可以通过在线程间高效共享 CPU 硬件资源，来提升并行运行多线程应用程序的吞吐量。另一方面，作为副作用，应用程序的响应能力可能会因\
  \ HT 而牺牲。\n\n让多个线程共享一个物理核心会对 MySQL NDB 集群数据节点产生负面影响，因为当线程共享一个物理核心时，单个线程可以处理的信号数量会减少。这种缓慢的线程处理可能成为整个集群的瓶颈。不要将多于一个繁忙的线程绑定到共享同一物理核心的虚拟核心上。这两个线程会相互干扰彼此的执行。\n\
  \n> 注意\n>\n> 切勿将多于一个繁忙的线程绑定到共享同一物理核心的虚拟核心上。\n\n\n##### CPU 使用率与绑定\n\n平衡 CPU 核心的负载对于最大化\
  \ MySQL NDB Cluster 的性能至关重要。要实现这一目标，有必要监控 CPU 利用率并相应地调整配置。\n\n尽管常见的繁忙线程类型是 `ldm`\
  \ 和 `tc`，但其他类型的线程也可能偶然变得繁忙。关于线程类型的更多信息，请参见第 4 章。要识别哪个线程繁忙，`ndbinfo.cpustat` 表非常有用。它显示了每个线程的\
  \ CPU 利用率。该表显示了绑定到每个线程的 CPU 资源利用率。换句话说，该表仅在线程绑定到特定 CPU 时才有用，因为查看一个运行在任意 CPU 核心上的线程的\
  \ CPU 利用率是没有意义的。\n\n清单 20-1 展示了 `ndbinfo.cpustat` 表的示例输出。\n\n```\nmysql> SELECT\
  \ node_id, thr_no, thread_name, OS_user, OS_system, OS_idle FROM cpustat JOIN threads\
  \ USING (node_id, thr_no) WHERE node_id=1;\n+---------+--------+-------------+---------+-----------+---------+\n\
  | node_id | thr_no | thread_name | OS_user | OS_system | OS_idle |\n+---------+--------+-------------+---------+-----------+---------+\n\
  |       1 |      0 | main        |       0 |         1 |      99 |\n|       1 |\
  \      8 | send        |       1 |         3 |      99 |\n|       1 |      1 | rep\
  \         |       0 |         0 |     100 |\n|       1 |      2 | ldm         |\
  \      65 |         2 |      33 |\n|       1 |      3 | ldm         |       0 |\
  \        12 |      88 |\n|       1 |      4 | tc          |       0 |        10\
  \ |      90 |\n|       1 |      5 | tc          |       0 |        10 |      90\
  \ |\n|       1 |      6 | recv        |       0 |         7 |      93 |\n|     \
  \  1 |      7 | recv        |       1 |         5 |      95 |\n+---------+--------+-------------+---------+-----------+---------+\n\
  9 rows in set (0.08 sec)\n```\n\n清单 20-1. 使用 `cpustat` 表检查 CPU 利用率\n\n根据此输出，该数据节点有两个\
  \ `ldm` 线程、两个 `tc` 线程、两个 `recv` 线程、一个 `rep` 线程、一个 `main` 线程和一个 `send` 线程。只有 `id=2`\
  \ 的那个 `ldm` 线程似乎很繁忙；`tc` 和 `recv` 线程消耗了 CPU 时间。值得在此集群上增加 `ldm` 线程的数量。两个 `ldm` 线程的\
  \ CPU 使用率差异显著，因为一个处理某个表的主片段，另一个处理备份片段。当表具有 `READ_BACKUP=1` 表注释且工作负载类型为读取时，负载将会平衡。\n\
  \n虽然 `ndbinfo.cpustat` 显示的是操作系统报告的 CPU 利用率，但它有时可能不可靠，因为它会包含其他程序（包括内核内部处理的中断）引起的\
  \ CPU 利用率。这将导致即使是相同类型的线程，其 CPU 利用率也不平衡。在这种情况下，您需要验证 CPU 利用率是否确实是由数据节点内不平衡的工作负载引起的。\n\
  \n要分析每个线程的工作负载，`ndbinfo.threadstat` 表很有用。该表显示每个线程的统计数据，例如每个线程处理的信号计数。清单 20-2 是一个查看工作负载是否平衡的存储过程示例。如果特定线程比其他同类型线程处理更多的信号，则说明工作负载不平衡。\n\
  \n```\ndelimiter //\nCREATE PROCEDURE sigcount(t INT)\nBEGIN\nDROP TEMPORARY TABLE\
  \ IF EXISTS tmpstat;\nCREATE TEMPORARY TABLE tmpstat ENGINE MEMORY\nSELECT * FROM\
  \ ndbinfo.threadstat;\nSELECT SLEEP(t) FROM DUAL;\nSELECT STRAIGHT_JOIN\ns2.node_id,\n\
  s2.thr_no,\ns2.thr_nm,\n(s2.os_now - s1.os_now) AS time_ms,\n(s2.c_loop - s1.c_loop)\
  \ AS loops,\n(s2.c_exec - s1.c_exec) AS execs,\n(s2.c_wait - s1.c_wait) AS waits,\n\
  (s2.c_exec - s1.c_exec) / (s2.c_loop - s1.c_loop) AS spl --signals_per_loop\nFROM\n\
  tmpstat s1 INNER JOIN\nndbinfo.threadstat s2 USING (node_id, thr_no)\nORDER BY\n\
  s1.node_id, s1.thr_no;\nDROP TEMPORARY TABLE tmpstat;\nEND;//\ndelimiter ;\nmysql>\
  \ CALL sigcount(5);\n+----------+\n| SLEEP(t) |\n+----------+\n|        0 |\n+----------+\n\
