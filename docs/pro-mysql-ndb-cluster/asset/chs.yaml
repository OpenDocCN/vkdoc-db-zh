  ### 平台考虑因素


  到目前为止，本章讨论了 MySQL `NDB Cluster` 拓扑的高级视角。现在是时候在本节中讨论每台计算机机器的细节了。


  #### 处理器类型和操作系统


  如果您的处理器和操作系统组合得到 Oracle 的支持，您就可以为您的 MySQL `NDB Cluster` 安装使用任何类型的处理器和操作系统。您可以在以下页面上验证所需的处理器和操作系统组合是否受支持：


  [`www.mysql.com/support/supportedplatforms/cluster.html`](https://www.mysql.com/support/supportedplatforms/cluster.html)


  即使您的平台不受支持且没有为该平台提供二进制软件包，通过从源代码编译 MySQL `NDB Cluster`，在这些平台上运行它在技术上也可能是可行的，因为 MySQL
  `NDB Cluster` 被设计为在常用的 `POSIX` 系统上运行，这就是我们能够在 `BBB` 上运行它的原因。如果您不需要官方支持并且需要在特定平台上运行
  MySQL `NDB Cluster`，这将是一个不错的选择。


  #### CPU 性能和特性


  CPU 性能对于 MySQL `NDB Cluster` 很重要，因为 CPU 通常是内存数据库系统的最重要资源。（MySQL `NDB Cluster` 的另一个重要资源是网络吞吐量，因为它是一个分布式系统。）那么，CPU
  的哪些特性是最重要的呢？CPU 有许多特性，例如：


  *   时钟速度

  *   核心数量

  *   每个核心的线程数量

  *   `L2/L3` 缓存大小

  *   内存类型

  *   `NUMA` 与 `UMA`


  本节介绍为了实现最佳性能，每种类型的节点需要哪种 CPU 资源。



  ##### 数据节点理想的处理器特性


  CPU 选择最关键的要点在于所有数据节点需使用相同的 CPU。由于其无共享架构，针对数据节点的工作负载会被均匀分配到所有数据节点。换句话说，所有数据节点将处理大致相同的工作量。因此，如果某个数据节点能处理的工作量少于其他节点，该节点将成为整个集群的瓶颈，因为其他数据节点无法比该节点处理更多的工作负载。


  CPU 是数据节点性能最重要的组件。根据以下标准选择合适的 CPU：


  *   为最小化响应时间，选择高时钟频率的 CPU

  *   为最大化吞吐量，选择多核心 CPU


  如果你的应用程序不并行发出大量查询，但响应时间很重要，则选择具有非常高时钟频率的 CPU 型号。如果你的应用程序需要非常高的吞吐量，则选择具有多核心的 CPU
  型号。然而，数据节点可使用的 CPU 核心最大数量是有限制的。表 3-1 显示了每个数据节点进程可以生成的最大线程数，此数值通过 `MaxNoOfExecutionThreads`
  选项配置。


  表 3-1. 不同版本下的 MaxNoOfExecutionThreads


  | MySQL NDB 集群版本 | `MaxNoOfExecutionThreads` 范围 |

  | --- | --- |

  | 7.2.0 | 2 – 8 |

  | 7.2.5, 7.3.0 | 2 – 36 |

  | 7.3.3, 7.4.1, 7.5.0 | 2 – 72 |


  目前，在一台机器上（非单个 CPU 芯片内）配置超过 72 个 CPU 核心是没有意义的，因为除非你使用 `MaxNoOfExecutionThreads` 选项，否则没有任何版本的
  MySQL NDB 集群可以利用如此多的核心。在 7.2.3 版本中引入的 `ThreadConfig` 选项，允许你使用更多的 CPU 核心。（最多 100
  个线程。有关这些选项的更多详情，请参见第 4 章。）无论如何，如果吞吐量不足，你需要增加数据节点的数量。


  ##### SQL 节点理想的处理器特性


  如果你的应用程序通过 SQL 节点访问数据库，那么 SQL 节点上的 CPU 性能也很重要。由于 SQL 节点不存储任何数据，它们不需要大量内存或快速磁盘，但它们需要快速的
  CPU。SQL 节点执行的所有活动，例如解析 SQL 语句和优化执行计划，都是 CPU 密集型工作负载。总体上，SQL 节点比数据节点需要更多的 CPU 性能。如果你的集群拥有足够多配备强大
  CPU 的数据节点，但 SQL 节点的 CPU 资源不足，那么即使 SQL 节点处于 100% 满载状态，也无法充分利用数据节点上的 CPU 资源。


  ##### 管理节点理想的处理器特性


  由于管理节点执行的任务非常少，它们不需要快速的 CPU。性能较弱的 CPU 型号即可满足需求。


  ##### 选择最合适 CPU 的关键点


  为了增加总内存大小和 CPU 核心总数，服务器机器可能配备多个 CPU 芯片（插座）。近期的 x86_64 CPU 内部集成了内存控制器，每个内存控制器都有其最大内存容量。因此，服务器机器必须拥有多个
  CPU 芯片才能增加内存大小。


  这种方法对于内存大小和 CPU 处理能力是有益的，但对于内存访问速度则不太理想。在此类服务器机器上，内存访问速度并非均一。内存访问速度因目标内存连接到的 CPU
  而异。如果目标内存与尝试访问它的 CPU 连接到同一个 CPU，则访问速度最优。否则，内存访问速度会变慢，因为数据需要在内存控制器的管理下传输到拥有目标内存的
  CPU。


  不具备均一内存访问速度的系统被称为非统一内存访问（NUMA）机器。由于 NUMA 机器在内存访问速度方面存在微小劣势，如果可能，请选择非 NUMA 机器。在一个
  CPU 芯片内拥有多个 CPU 核心，优于在多个 CPU 芯片内每个拥有少量核心。同样，在一个 CPU 芯片下拥有大内存容量，优于多个 CPU 芯片但每个 CPU
  芯片下内存容量较小。


  L2/L3 缓存内存是选择好 CPU 时另一个重要因素。L2/L3 缓存内存越大，其内存访问性能越好。NUMA 系统在 L2/L3 内存访问方面也存在劣势，因为为了确保数据完整性，所有
  CPU 芯片上的缓存内容需要进行同步。缓存同步的成本不可忽视。


  根据经验法则，遵循以下标准：


  *   如果性能是最高优先级，选择具有单个 CPU、多核心和大内存的服务器机器。

  *   如果容量是最高优先级，选择具有多个 CPU 和大内存的服务器机器。


  **注意**

  虽然可以在同一个集群中混合使用不同的 CPU 架构或操作系统，但 CPU 字节序必须相同。用于 SQL 节点和数据节点之间通信的 NDB API 协议是一种原始二进制协议，在不同字节序的机器之间不可移植。如果你对
  SQL 节点使用小端序机器，那么对数据节点也应使用小端序机器。因此，例如，无法为 SQL 节点采用 x86_64（小端序）机器而为数据节点采用 SPARC（大端序）机器。相比之下，用于客户端应用程序和
  SQL 节点之间通信的 MySQL 协议是一种可识别字节序的协议。你可以为应用服务器采用任何类型的 CPU 或操作系统，而无需考虑 MySQL NDB 集群所使用的
  CPU 类型。


  #### 内存消耗


  RAM 模块正变得越来越便宜；然而，它们仍然是昂贵的组件。因此，安装超过所需容量的内存并非明智之举。


  数据节点需要大量内存。根据所需的数据容量准备足够的内存模块。其他类型的节点不需要大量内存。管理节点只需要几十兆字节的内存。在大多数情况下，如果你不在其上使用 `InnoDB`，SQL
  节点配备几 GB 内存就足够了。


  #### 磁盘性能


  尽管 MySQL NDB 集群主要用作内存数据库，但磁盘性能对于数据节点仍然很重要。在数据节点上，以下情况需要磁盘性能：


  *   将检查点数据存储到磁盘：数据节点持续将其 `DataMemory` 中的数据作为本地检查点（LCP）写入磁盘。如果 LCP 延迟，重做日志将会被填满，无法写入更多数据。

  *   重做日志记录：数据节点将修改写入重做日志以实现数据持久化。重做日志条目在事务提交时生成。

  *   进行备份：备份被保存在磁盘上。

  *   重启时读取数据：重启数据节点时，内存中表的所有数据都从磁盘读取。

  *   读写磁盘数据表：磁盘速度对于磁盘数据表的性能至关重要。


  除磁盘数据表外，读写操作都是顺序处理的。因此，对于不太繁忙的系统，可以使用便宜的硬盘驱动器（`HDD`）。如果你的应用程序需要最大的写入性能，请考虑使用固态硬盘（`SSD`）。使用
  `SSD` 时，最好避免采用三层单元（`TLC`）NAND 闪存的型号。与单层单元（`SLC`）或多层单元（`MLC`）等其他类型的 NAND 闪存相比，`TLC`
  的生命周期要短得多。


  管理节点和 SQL 节点不需要高磁盘性能。除非你在 SQL 节点上使用 `InnoDB`，否则使用廉价的磁盘即可。




  #### 虚拟机


  与物理机相比，虚拟机在运行 MySQL NDB Cluster 时性能较差。如果你需要一个性能最优的数据库系统，请不要使用虚拟机或云服务。当然，虚拟机通常很方便，但在性能方面确实不如物理机。


  ### 网络设计


  网络是 MySQL NDB Cluster 最重要的组成部分之一，因为它是一个分布式系统，需要在网络中交换大量数据。因此，如果网络带宽相比计算机硬件不足，网络往往会成为瓶颈。


  #### 网络设备


  以太网因其良好的性价比而被最广泛地使用。然而，在大多数情况下，千兆以太网 (`GbE`) 不足以满足集群节点间的互联需求。至少应考虑使用 `10GbE` 网卡和交换机。否则，网络将成为瓶颈，无法实现足够的吞吐量。


  在 MySQL NDB Cluster 7.2 之前的版本中，支持可扩展相干接口 (`SCI`) 协议，但近期的版本已不再支持。不过，仍可以使用 `SCI` 设备作为互联方式，因为
  `SCI` 设备也支持通过 `SCI` 协议进行 `TCP/IP` 连接，这种方式称为 `SuperSockets`。`SuperSockets` 很方便，因为它不需要重新编译集群二进制文件。`SCI`
  设备的吞吐量高达 `20 Gbps`，是 `10GbE` 的两倍。由于 `SCI` 的延迟低于 `10GbE`，因此有可能实现比使用 `10GbE` 的 MySQL
  NDB Cluster 设置更高的性能。`SCI` 最大的缺点是其交换机最多只支持八台计算机；这远少于集群节点的最大数量。


  `InfiniBand` 是以太网和 `SCI` 的一个良好替代方案。尽管 MySQL NDB Cluster 不支持 `InfiniBand` 原生 API（称为
  `InfiniBand Verbs`），但集群节点仍可以使用 `IP over InfiniBand (IPoIB)` 协议通过 `InfiniBand` 进行通信，无论底层协议如何，集群节点都将此视为常规的
  `TCP/IP` 套接字。


  #### 网络冗余


  MySQL NDB Cluster 本身不能容忍网络故障。在最坏的情况下，网络故障可能导致整个集群停机。为了提高 MySQL NDB Cluster 系统的可用性，事先实现网络冗余非常重要。


  在 Linux 系统上，广泛使用绑定驱动程序。该驱动程序在多个物理网络接口之上定义一个伪网络接口以实现冗余。当某条网络路径发生故障时，流量会被重定向到其他网络接口。


  其他操作系统也具有类似功能。例如，Solaris 有 `IP 多路径 (IPMP)`，Windows 有 `NIC 组合`。


  #### 直接连接


  为了最小化网络延迟并最大化网络带宽，使用以太网交叉线进行直接连接非常有用。即使通过以太网交叉线直接连接，也需要网络冗余。每台主机需要配备多个网卡以相互连接。要将四个数据节点冗余地相互连接，需要六个网络接口端口。


  当节点数量较少时，直接连接是一个不错的选择。它不需要中间的网络交换设备，因此可以节省一笔开支。然而，即使主机之间没有网络交换机，直接连接仍然需要独立的网卡。


  #### 安全注意事项


  `NDB API` 协议无法通过加密来保证安全。因此，`SQL` 节点和数据节点之间的网络应进行物理隔离，以防止未经授权的数据访问。请勿允许未经授权的人员访问运行集群节点的计算机硬件。


  如果因某些原因必须使用云环境，你需要使用 `虚拟私有云 (VPC)` 连接虚拟计算机。否则，你的集群将面临一定的数据截获风险。


  有关安全的更多信息，请参见第 12 章。


  ### 使用磁盘对象扩展容量


  本章讨论的最后一个议题是是否使用磁盘数据表。从 MySQL 5.1.6 版本（当时 MySQL Server 和 MySQL NDB Cluster 尚未分成独立产品）开始，MySQL
  NDB Cluster 支持磁盘数据表。


  磁盘数据表需要额外的文件和缓冲区内存——数据文件、撤销日志文件、磁盘页缓冲区和撤销缓冲区。这些对象对 MySQL NDB Cluster 的配置有重大影响。在规划阶段就决定是否使用磁盘数据表至关重要。


  有关磁盘数据表的更多详细信息，请参见第 2 章。


  #### 性能考虑


  磁盘数据表通过将数据存储在相对廉价的磁盘（文件系统）而非昂贵的内存中来获得更大的容量。因此，磁盘访问速度可能成为潜在的瓶颈，因为磁盘比内存慢。如果磁盘数据表上的行经常被访问，请考虑使用高速存储设备，例如采用
  `PCI Express` 和 `非易失性内存快速通道 (NVMe)` 等高速接口的 `SSD`。


  使用多个数据节点是一种良好的替代策略。由于 MySQL NDB Cluster 采用无共享架构，磁盘访问工作负载会被拆分并均匀分配到各个数据节点。理论上，集群上磁盘数据表的总
  I/O 吞吐量将与数据节点数量成比例地增加。增加数据节点也会提高容量。请综合考虑性能和容量，通过增加数据节点数量来解决问题。


  #### 存储要求


  遗憾的是，磁盘数据表不支持可变长度列，因此所有列都具有固定长度，该长度足以存储该列的最大数据量。例如，使用 `utf8` 字符集的 `VARCHAR(10)`
  列将始终需要 `30 字节`，这是低效的。因此，文件系统上的数据大小将远大于实际数据大小。


  当在内存表中使用可变长度列时，实际数据（对齐到四字节）、头部信息和碎片都会消耗存储空间。因此，所需的存储空间与列的平均数据大小成正比。另一方面，当使用仅支持固定大小列格式的磁盘数据表时，每行每列总是分配最大可能的空间。结果，磁盘数据表通常比内存表多消耗数倍的存储空间。


  #### 内存消耗


  尽管数据存储在磁盘上，但磁盘数据表仍然需要一定量的缓存内存来加速数据访问，就像 `InnoDB` 需要大型缓冲池内存一样。因此，你需要为磁盘页缓冲区和撤销缓冲区分配足够的内存。这意味着你需要减少用于
  `DataMemory` 和 `IndexMemory` 的内存。因此，在使用磁盘数据表时，规划服务器机器的内存大小需要格外小心。




  ## 本章概要


  本章讨论了根据应用程序需求确定集群设置整体策略的方法。规划集群时需要考虑的主要方面包括：


  *   应用程序需求的优先级：MySQL NDB Cluster 是一个高可用且可扩展的数据库管理系统，还提供灾难恢复功能。确定产品的哪些方面对你的应用程序最重要。

  *   拓扑结构：MySQL NDB Cluster 配置灵活，可以配置多种拓扑结构。确定哪种拓扑类型适合你的应用程序需求。

  *   平台：根据应用程序需求，确定每种节点适合的服务器机器类型。

  *   网络设计：网络设计对于最大化集群的性能和可用性至关重要。由于 MySQL NDB Cluster 是分布式数据库管理系统，大量数据包通过网络交换。

  *   是否使用磁盘数据表以获得容量：磁盘数据表可以提供比内存表大得多的容量，因为磁盘存储介质比内存成本更低。然而，在使用磁盘数据表时，由于限制和资源消耗，必须格外小心。


  规划阶段非常重要，因为系统的特性在此阶段被决定。之后调整细节是可能的，但整体方向不易更改。


  在下一章中，我们将讨论 MySQL NDB Cluster 的详细配置。详细配置与本章讨论的概览同等重要。前者是自上而下的方法，而后者是自下而上的方法。


  '
