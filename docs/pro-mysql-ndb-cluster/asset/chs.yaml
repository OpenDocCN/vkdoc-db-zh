  \ `x$schema_tables_with_full_table_scans` | 显示有关表扫描的信息。 |\n| `schema_unused_indexes`\
  \ | 列出未使用的索引。 |\n| `x$schema_flattened_keys` | `schema_redundant_indexes` 的辅助视图。\
  \ |\n\n性能模式的优势之一是能够查找满足特定条件的查询，例如使用了排序、内部临时表、未使用索引等。为了更方便地查找此类查询，`sys` 模式提供了表 15-26\
  \ 中的视图。所有语句视图都按默认模式和摘要进行分组。\n\n表 15-26. sys 模式语句视图\n\n| 视图名称 | 描述 |\n| --- | ---\
