  \ 表从集群级视图派生的，如前一章列表 15-3 所示。供参考，这里再次列出 `ndbinfo.server_transactions` 视图的定义（已重新格式化并稍作改写）：\n\
  \n```sql\nSELECT map.mysql_connection_id, t.node_id, t.block_instance,\nt.transid,\
  \ t.state, t.count_operations, t.outstanding_operations,\nt.inactive_seconds, t.client_node_id,\
  \ t.client_block_ref\nFROM information_schema.ndb_transid_mysql_connection_map map\n\
  INNER JOIN ndbinfo.cluster_transactions t\nON map.ndb_transid >> 32 = t.transid\
  \ >> 32;\n```\n\n##### 性能指标\n\n表格 16-4 列出了与性能监控相关的视图。这些视图范围从简单的 `counters` 视图到详细的磁盘、CPU\
  \ 和网络使用情况视图。这些视图是调查性能问题时最有用的视图之一。第 20 章提供了使用 `cpustat` 和 `threadstat` 视图的示例。\n\n\
  表 16-4. `ndbinfo` 视图：性能指标\n\n\n\n### NDB Cluster 报告\n\n下表列出了一些用于监控 NDB Cluster 性能的视图。\n\
