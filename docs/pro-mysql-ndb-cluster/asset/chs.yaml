  请注意，在创建用户时，该语句包含几个部分：


  *   账户名：账户名由用户名和主机名组成。用户和主机名在“访问控制和权限系统”一节中有更详细的讨论。

  *   身份验证插件：MySQL 支持多种身份验证插件。`IDENTIFIED WITH`子句指定使用哪一个。

  *   密码：这也称为认证字符串。**请务必选择一个不易被猜到的强密码！** 密码在`IDENTIFIED BY`子句后指定；当同时指定身份验证插件时，两者组合为`IDENTIFIED
  WITH <插件名> BY <密码>`。密码必须用引号括起来。

  *   SSL/TLS 选项：**强烈建议确保** SQL 节点与客户端/应用程序之间的所有通信都是加密的。MySQL 支持多种选项来指定这些要求。

  *   初始密码过期：对于计划由交互式用户（如数据库管理员）使用的新账户，建议在创建账户时使密码过期。


  对于身份验证插件，除非使用外部身份验证，否则`sha256_password`插件提供了最安全的哈希方式，因此是推荐选择。针对例如 LDAP 服务器的外部身份验证超出了本书范围。如果对此主题感兴趣，[`dev.mysql.com/doc/refman/5.7/en/pluggable-authentication.html`](https://dev.mysql.com/doc/refman/5.7/en/pluggable-authentication.html)
  及其参考文献提供了一个很好的起点。



  #### SSL/TLS 配置与账户管理


  ##### SSL/TLS 连接选项


  最简单的 SSL/TLS 选项是`REQUIRE SSL`，它仅要求连接必须加密，但对加密方法本身或客户端使用的证书没有限制。还有几个额外的子句可用于限制客户端连接时使用的
  SSL/TLS 密码、颁发者和主题。


  如果 MySQL NDB Cluster 7.5 被编译为使用 OpenSSL（商业版本 MySQL Cluster Carrier Grade Edition
  如此，但社区版并非如此），MySQL 会在初始化 SQL 节点的数据目录时自动设置创建自签名证书。为了获得更高的安全性，可以使用由受信任机构签名的证书。下一节将更详细地讨论这一点，包括一个使用
  MySQL NDB Cluster 7.5 及更高版本附带的`mysql_ssl_rsa_setup`工具生成自签名证书的示例。


  ##### 用户密码与连接安全


  当创建一个密码过期的用户时，会强制该用户在首次使用账户时更改密码。清单 12-2 说明了在执行`SET PASSWORD`语句之前，用户无法执行任何其他操作。从清单
  12-2 中观察到的另一点是，连接是使用`--ssl-mode=REQUIRE`选项创建的。这相当于客户端侧的`REQUIRE SSL`选项，该选项是在创建账户时指定的。将
  SSL 模式设置为`REQUIRE`可确保仅当 SQL 节点能提供加密连接时，才会建立连接。


  ```

  shell$ mysql --user=appadmin –password --ssl-mode=REQUIRE

  Enter password:

  ...

  mysql> SHOW SCHEMAS;

  ERROR 1820 (HY000): You must reset your password using ALTER USER statement before
  executing this statement.

  mysql> SET PASSWORD = ''Fid.Gourt^Ob9*H3b'';

  Query OK, 0 rows affected (0.16 sec)

  mysql> SHOW SCHEMAS;

  +--------------------+

  | Database           |

  +--------------------+

  | information_schema |

  | appdb              |

  | appdb_common       |

  +--------------------+

  3 rows in set (0.01 sec)

  清单 12-2.

  使用 PASSWORD EXPIRE 创建用户后首次连接

  ```


  ##### 账户权限管理


  继续清单 12-1 中的示例，为账户提供所需的最小权限非常重要。`ALL PRIVILEGES`权限可用于在指定范围内提供所有可用权限（使用`GRANT`语句的权限除外），但请确保谨慎使用。请注意，在全局（`*.*`）级别授予所有权限也将允许更改`mysql`模式（或任何其他模式）中的数据。


  当前分配的权限可以使用`SHOW GRANTS`语句或直接查询`mysql`模式中的权限表来检查。如果发现某个账户拥有不再需要的权限，可以使用`REVOKE`语句撤销它们。同样，可以使用`SHOW
  CREATE USER`语句检查账户设置。


  数据库管理员可以强制更改密码。这可以通过使用`SET PASSWORD`语句并指定要更改的账户来完成。更改密码可以与使密码过期结合起来，通过使用`ALTER USER`语句，就像首次设置密码时那样。MySQL
  NDB Cluster 7.5 中的`ALTER USER`是一个非常强大的用户管理语句，因为它可以设置或更改所有`CREATE USER`语句可用的选项。在`ALTER
  USER`语句中未指定的选项将保持其现有值。


  版本 7.5 中新增的一个有用功能是能够锁定账户。这可用于多种目的，例如暂时阻止账户连接，或创建专门用作存储程序和视图定义者的账户。后者的例子是`sys`模式使用的`mysql.sys@localhost`用户。在示例中，`ALTER
  USER ''appadmin''@''192.168.56.101'' ACCOUNT LOCK`语句用于锁定`''appadmin''@''192.168.56.101''`账户，例如在确定是否仍需要它期间。


  最后但同样重要的是，最佳实践是删除不再需要的用户。未使用的账户仍然提供对系统的访问权限。如果无法确定一个账户是否不需要，或者它只是一个很少使用的账户，一个选择是先将其锁定。


  关于删除不再需要的账户以及撤销不必要的权限这一点，记录和审查账户、权限以及其他安全方面也很重要。通过定期审计账户及其权限，可以确保不再需要的账户和权限被移除。记录审计结果将有助于下一次审计。


  清单 12-1 中的账户管理示例使用了仅在 7.5 版本中可用的几个功能。在过去的几个 MySQL Server 版本中，甲骨文公司投入了大量工作来改进 MySQL
  的默认安全性，并提供更好的工具来管理与安全相关的功能。这在账户管理方面尤为明显，特别是从 MySQL Server 5.6 升级到 5.7 或从 MySQL NDB
  Cluster 7.4 升级到 7.5 时。这是保持系统更新可以提供更好安全性的又一个例子。



  ##### SSL/TLS 证书


  为了启用加密连接来访问 SQL 节点，需要使用一种能够处理数据加解密的协议。MySQL 中用于建立连接间安全通信的技术被称为 TLS（传输层安全性），尽管由于历史原因，MySQL
  的选项中仍然使用 SSL（安全套接字层）这个术语。


  要启用加密，必须拥有可用的 SSL/TLS 证书。一种选择是购买由受信任的第三方**证书颁发机构**（CA）签名的证书。当服务器需要向未知用户证明其身份时，受信任的第三方
  CA 是有用的；例如，在互联网银行中，客户必须确保访问的网站确实属于其持有账户的银行。


  当应用程序连接到 SQL 节点时，通常使用**自签名证书**或由公司自有 CA 签名的证书就足够了。创建自签名证书的步骤起初可能看起来有些复杂；然而，MySQL
  NDB Cluster 7.5 及更高版本包含了一个名为 `mysql_ssl_rsa_setup` 的命令行实用程序，它可以自动化整个过程。缺点是这些证书是通用的，无法验证应用程序是否连接到了正确的
  SQL 节点。清单 12-3 展示了使用 `mysql_ssl_rsa_setup` 实用程序生成在 MySQL 中启用 SSL/TLS 加密所需文件的示例。


  ```shell

  shell$ mysql_ssl_rsa_setup --datadir=/var/lib/mysql --uid=mysql

  正在生成 2048 位 RSA 私钥

  ...............+++

  .+++

  将新私钥写入''ca-key.pem''


  正在生成 2048 位 RSA 私钥

  ...........................+++

  .................................+++

  将新私钥写入''server-key.pem''


  正在生成 2048 位 RSA 私钥

  ...........................................................+++

  ...............+++

  将新私钥写入''client-key.pem''


  清单 12-3.

  为 SQL 节点创建 SSL/TLS 证书

  ```


  注意：`mysql_ssl_rsa_setup` 命令首先创建一个私有 CA 证书。由 `mysql_ssl_rsa_setup` 生成的服务器证书随后使用该私有
  CA 证书进行自签名。


  在 MySQL NDB Cluster 7.5 中，只要 SSL/TLS 文件位于数据目录下，并且文件名与 `mysql_ssl_rsa_setup` 实用程序创建时的名称相同，`mysqld`
  进程就会自动发现它们。生成的证书并非特定于 MySQL NDB Cluster 7.5，因此也可用于旧版 MySQL；但在这种情况下，必须使用选项 `ssl_ca`、`ssl_cert`
  和 `ssl_key` 显式配置 SQL 节点。`my.cnf` 中的配置示例如下：


  ```ini

  [mysqld]

  ssl_ca   = /var/lib/mysql/ca-cert.pem

  ssl_cert = /var/lib/mysql/server-cert.pem

  ssl_key  = /var/lib/mysql/server-key.pem

  ```


  这种设置将支持客户端/应用程序与 SQL 节点之间所有通信的加密；然而，仍然存在两个问题——确认连接者身份和防止*中间人攻击*。


  第一个问题是，SQL 节点仍然仅依赖用户从给定主机连接时知道正确的用户名和密码组合。要解决此问题，客户端/应用程序需要使用它自己的证书，由 SQL 节点进行验证。可以创建一个账户，并限制其连接时可使用的
  SSL/TLS 证书。


  第二个问题是，客户端/应用程序并不知道它是否真的连接到了创建连接时指定的主机名和端口所对应的 SQL 节点。例如，可能存在“中间人”情况，即某个进程截获连接并在转发前对所有通信进行解密。


  为了处理这两种情况，有必要让证书由一个已知的证书颁发机构签名。这不一定需要是第三方商业提供商，但它必须是一个被集群和客户端/应用程序共同信任的证书颁发机构。例如，部署集群的公司的
  IT 部门可以签署这些证书。


  注意：如果手动创建证书，请确保所有 CA 证书、服务器证书和客户端证书都使用了唯一的**通用名称**。如果任何两个证书共享相同的通用名，它们将无法用于加密连接。




  #### 访问控制和权限系统


  MySQL 采用一个四层结构的访问控制与权限系统，能够对**谁可以从何处连接**以及**连接后能够执行哪些操作**进行细粒度的控制。这四个层级如下：


  用户名：指在 MySQL 客户端程序（例如通过 `--user` 选项）中指定的名称。用户或应用程序需要知道正确的用户名才能建立连接。建议使用易于识别账户所有者的用户名。例如，如果是一个真实的人，用户名应反映其姓名；如果是应用用户，则选择能反映应用名称的用户名。这样，在人员变动或应用版本更新后，更容易识别出哪些用户可以被移除。


  主机名：主机名限制了用户可以从哪个主机连接。可以在主机名中使用通配符，但需注意不要错误地授予用户从其需要连接的位置之外的其他主机访问的权限。可以配置允许同一用户名从不同的主机连接，但由于用户名与主机名的组合共同定义了一个账户，这些账户通常拥有不同的权限。例如，一个用户在从本地主机连接时可能有修改
  schema 的权限，但从远程主机连接时则只允许查询数据。


  密码：用于验证用户的身份。为增强认证安全性，可以补充要求使用 SSL/TLS 证书。


  权限：指账户被允许执行的操作。权限与用户名及用户连接来源的主机名组合绑定。权限可以分配到以下范围之一：全局、schema/数据库、表/视图/过程/函数或列。全局范围涵盖所有
  schema，或代表全局级别的权限。全局权限的例子包括 `SHUTDOWN` 和 `SUPER`。


  在 MySQL NDB Cluster 7.5 中，有超过 30 种权限可供选择。为账户确定并授予最小必要权限集可能是一项庞大的任务。这使得直接使用 `ALL
  PRIVILEGES` 同义词很有诱惑力——顾名思义，它为指定范围内的账户授予所有已知权限（不包括 `WITH GRANT OPTION` 权限）。然而，向账户授予所有权限是糟糕的做法，原因有很多。


  当一个账户拥有全局级别或 `mysql` schema 的所有权限时，这也包括了操作其他用户、（通过直接操作授权表）向新用户授予数据访问权限等能力。此外，它移除了一个安全屏障。例如，如果应用用户拥有所有权限，而开发者错误地添加了一条查询，删除了应用本不应被允许删除的数据表，那么权限系统将无法再阻止应用执行此操作。如果应用易受
  SQL 注入攻击，也可能发生类似问题。另一个需要警惕的潜在威胁是心怀不满的员工。最小化权限可以减少在这些情况下可能造成的损害。


  `SUPER` 权限本身值得额外关注。该权限实际上涵盖了一系列操作，从能够配置从库端的复制设置到终止其他用户运行的查询。


  注意：虽然 `SUPER` 是一个非常强大的权限，只应授予集群范围的管理员用户，但它并不等同于所有权限。


  关于拥有 `SUPER` 权限的用户，还有几个特殊行为。首先，`read_only` 选项对其不适用。其后果是，例如，用户可以修改本应为只读的复制从库。在 MySQL
  NDB Cluster 7.5 中，一个解决方法是使用新的 `super_read_only` 选项。其次，当 `max_connections` 配置的所有连接都在使用时，会为拥有
  `SUPER` 权限的用户保留一个额外连接，以便数据库管理员可以登录调查并解决问题。将 `SUPER` 权限授予应用用户将破坏此功能。


  提示：MySQL Enterprise Monitor 使用持久连接，这使其即使在所有连接都已用尽的情况下也能继续监控 SQL 节点。该监控功能包括返回进程列表的报告，类似于
  `SHOW PROCESSLIST`。其他监控解决方案可能提供类似功能。


  ##### 分布式权限


  对于像 MySQL NDB Cluster 这样具有多个 SQL 节点的分布式系统，一个挑战是在所有 SQL 节点之间保持账户和权限同步。此外，如果一个节点上的密码发生更改，它不会自动更新到其他节点。这可能导致难以察觉的故障。应用程序似乎工作正常，但当连接被路由到某个特定的
  SQL 节点时，它会失败。


  针对此问题的解决方案是一个称为**分布式权限**的功能。顾名思义，这是一种告诉 MySQL 所有节点上的权限必须保持一致的方法。在实践中，这是通过将存储所有账户、密码和权限信息的授权表转换为使用
  `NDBCluster` 存储引擎来实现的。这样，权限数据存储在数据节点内，并且像其他 `NDBCluster` 表一样，所有连接的 SQL 节点对数据有相同的视图。


  注意：请勿手动转换授权表，否则可能会破坏 MySQL。分布式权限应仅使用存储过程（如本节所述）来启用和禁用。


  要使用分布式权限，需要导入操作授权表所需的存储程序。这些存储程序作为源代码包含在一个名为 `ndb_dist_priv.sql` 的文件中。`ndb_dist_priv.sql`
  脚本位于 MySQL 基础目录下的 share 目录中。如果 MySQL 安装到全局目录（例如使用 RPM 管理系统时），则 `ndb_dist_priv.sql`
  脚本位于 share 目录下的 mysql 目录中。该文件完整路径的示例如表 12-2 所示。


  表 12-2. ndb_dist_priv.sql 脚本位置示例


  | 安装类型 | `basedir` | 完整路径 |

  | --- | --- | --- |

  | Linux - RPM | `/usr` | `/usr/share/mysql/ndb_dist_priv.sql` |

  | Linux/UNIX - Tarball | `/opt/mysql` | `/opt/mysql/share/ndb_dist_priv.sql` |

  | Windows – 安装 GUI | `C:\Program Files\MySQL\MySQL Cluster 7.5` | `C:\Program Files\MySQL\MySQL
  Cluster 7.5\ share\ndb_dist_priv.sql` |


  要安装这些存储程序，只需使用 `SOURCE` 命令，在默认 schema 为 `mysql` schema 的情况下导入该文件。验证完成时没有错误发生且所有存储过程都存在。代码清单
  12-4 展示了导入脚本并验证所有过程已安装的示例。由于存储过程不会在 SQL 节点之间分发，因此需要在所有 SQL 节点上执行这些步骤。注意启用了警告以确保产生的任何警告都被展开，以便检查。首次创建存储程序时，会发生许多警告，因为
  `ndb_dist_priv.sql` 脚本使用 `DROP PROCEDURE IF EXISTS` 和 `DROP FUNCTION IF EXISTS`
  来删除旧版本的存储程序。这些警告可以忽略。


  ```

  -- 示例：导入脚本并验证过程安装

  SOURCE /path/to/ndb_dist_priv.sql;

  SHOW PROCEDURE STATUS WHERE Db = ''mysql'';

  SHOW FUNCTION STATUS WHERE Db = ''mysql'';

  ```



