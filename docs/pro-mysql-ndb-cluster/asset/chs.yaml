  ### 特殊注意事项


  使用分布式权限时，需要记住一些特殊的注意事项。包括降级、恢复备份以及`root@localhost`账户密码丢失后的恢复。


  #### 降级


  MySQL 授权表特定于 SQL 节点的主要版本。作为 SQL 节点升级的一部分，必须执行`mysql_upgrade`脚本的主要原因之一，是确保授权表升级到与新版本兼容。为了支持升级而保留数据（和授权表），每个版本的
  SQL 节点也可以读取前一版本的授权表。


  然而，降级是不同的。旧版本的 SQL 节点将无法读取新版本的授权表。正如第 11 章所讨论的，即使没有分布式权限，降级到另一个主要版本也需要重新初始化 SQL
  节点。重新初始化步骤不适用于分布式权限，因为数据节点中的授权表将覆盖本地表，从而仍然是新版本。因此，有必要在执行降级时禁用分布式权限。


  #### 恢复备份


  当执行原生 NDB Cluster 备份的完全恢复时，需要显式告诉`ndb_restore`也恢复权限表。否则，这些表将被排除。在恢复中包含权限的选项是`--restore-privilege-tables`，并且必须为所有`ndb_restore`命令指定该选项。清单
  12-8 展示了一个完全恢复的示例。


  ```shell

  ##### 恢复模式 – 针对一个节点

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --restore_meta --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --restore-privilege-tables --disable-indexes

  ##### 恢复数据 – 针对备份中包含的每个数据节点

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --restore_data --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --restore-privilege-tables --disable-indexes

  ##### 重建索引 – 针对一个节点

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --restore-privilege-tables --rebuild-indexes

  清单 12-8. 使用 ndb_restore 进行包含分布式权限的完全恢复

  ```



  #### 恢复 `root@localhost` 密码


  如果数据库管理员被锁定在 SQL 节点之外，通常有两种恢复方法：使用 `skip-grant-tables` 或 `init-file` 选项。`skip-grant-tables`
  选项将禁用权限系统，因此无需密码即可连接；而 `init-file` 选项则指示 SQL 节点在启动时执行指定文件中的语句。然而，当启用了分布式权限时有一个注意事项——`skip-grant-tables`
  会被忽略，而 `init-file` 则无法使用，因为这些语句是在 `NDBCluster` 表变得可用之前执行的。


  这意味着唯一的选项是从数据节点中强制移除授权表。之后，即可恢复 `root@localhost` 密码。步骤如下：


  1.  使用 `ndb_drop_table` 实用程序删除六个授权表（`columns_priv`、`db`、`procs_priv`、`proxies_priv`、`tables_priv`
  和 `user`）。清单 12-9 包含了删除 `columns_priv` 表的示例。如果您在没有管理节点的主机上执行，并且该选项未包含在 MySQL 配置文件中，请添加
  `--ndb-connectstring` 选项。

  2.  确保将用于重新获取访问权限的 SQL 节点已停止。

  3.  恢复授权表的 `MyISAM` 版本。这可以通过多种方式完成，例如，您可以在文件系统级别复制每个 `MyISAM` 备份表回来，重新初始化数据目录（这将删除所有非
  `NDBCluster` 表！），或者从另一个安装中复制授权表。清单 12-9 展示了如何从使用 `mysql_cluster_backup_privileges`
  过程创建的 `MyISAM` 备份表中恢复 `columns_priv` 表。`cp` 命令假设当前工作目录是 SQL 节点的 `datadir`。

  4.  启动 SQL 节点。如果使用了授权表的备份副本，请使用 `skip-grant-tables` 选项；否则，正常启动并使用初始化时的密码。

  5.  恢复权限并再次设置分布式权限。


  ```

  #### 在数据节点中删除表

  shell$ ndb_drop_table --database=mysql columns_priv

  Dropping table columns_priv...OK

  NDBT_ProgramExit: 0 - OK

  #### 关闭 SQL 节点

  #### 恢复备份表

  shell$ cp mysql/columns_priv_backup.frm mysql/columns_priv.frm

  shell$ cp mysql/columns_priv_backup.MYD mysql/columns_priv.MYD

  shell$ cp mysql/columns_priv_backup.MYI mysql/columns_priv.MYI

  清单 12-9.

  删除并恢复 columns_priv 表

  ```


  ### 操作系统及基础架构的其余部分


  在讨论通过错误修复保持系统最新时，提到了考虑整个技术栈的重要性。这对于系统安全的各个方面也同样适用。由于通用基础架构非常多样，除了保持所有组件最新并与供应商合作确保组件配置正确外，无法给出具体建议。


  不过，操作系统级别的安全值得关注。在保护操作系统安全时，应考虑几个一般要点，例如：


  *   只安装必需的服务。

  *   确保服务（包括 MySQL NDB Cluster 进程）不以 `root`/系统管理员用户身份运行。

  *   禁用为运行服务而创建的用户的登录权限。

  *   使用强密码。

  *   保持操作系统和所有第三方软件最新。

  *   监控系统。

  *   审查日志。

  *   限制可以登录到服务器的人员及其拥有的权限。

  *   将对硬件（包括网络设备）的物理访问限制在可信的管理人员范围内。


  这些项目与为 MySQL NDB Cluster 所做的考虑类似。


  所有（或者说几乎所有）软件都有错误，其中大多数不会造成大问题。服务器上安装的软件越多，某些软件包含可能被用来导致服务中断、拒绝服务、获取不应有的权限或访问受限数据的错误的可能性就越大。限制安装的软件数量，可以更容易确保所有部分都已更新到最新的错误修复。这本身就是保护数据的重要一步。


  当一项服务（如 `mysqld` 或 `ndbmtd`）在主机上启动时，它将在一个用户账户下运行。最简单的方法是直接使用 `root`（在 Linux/UNIX
  上）或 `System Administrator` 账户（在 Windows 上），因为这可以解决所有权限问题。但另一方面，这也是权限可能被滥用的一个绝佳途径。相反，应确保服务只拥有所需的权限。例如，`mysqld`
  进程必须能够读取 MySQL 配置文件，但不应能够写入它。同样，`mysqld` 需要对数据目录进行读写访问，但不应被允许读写系统上的任何随机文件——例如安全日志。可能有些日志必须写入进程无权直接写入的文件。在这种情况下，必须通过一个服务来完成写入，该服务确保可以追加到日志，但防止删除。这些考虑都等同于向
  MySQL 用户授予权限。


  **注意**

  按照惯例，MySQL 服务在 Linux 和 UNIX 上使用 `mysql` 用户。例如，使用 RPM 包安装 MySQL 时，会自动创建 `mysql` 用户作为无登录用户。但实际上，并不限制必须使用哪个用户名。


  还可以采取一些步骤来检测是否有人（无论成功与否）曾尝试访问系统。这些步骤超出了本讨论的范围，但有一点值得一提——任何类型的监控只有在你确实关注监控系统生成的警报时才有用！这既适用于第
  14 章中讨论的 MySQL NDB Cluster 监控，也适用于其他类型的监控，例如入侵检测软件。如果警报被当作不重要而忽略，迟早会错过重要的警报。系统管理员必须确保安全软件的警报被正确分类，以便所有事件都能得到适当的紧急处理。


  ### 总结


  安全是当今世界的重要主题，无论怎样强调其对于参与软件部署的每个人都应置于首位都是不过分的。保护 MySQL NDB Cluster 安装的工作始于规划阶段，包括初始安装，并持续进行日常维护。这是一项永无止境的任务。


  需要实施的一些重要方面如下：


  *   使用与网络其余部分隔离的独立网络进行 MySQL NDB Cluster 节点间的通信。

  *   通过防火墙保护对 SQL 节点和/或应用程序的外部访问。

  *   保持所有软件和固件最新。

  *   限制授予操作系统用户和 MySQL 用户的权限。

  *   对所有外部连接使用加密连接。

  *   定期审查日志和监控警报。

  *   定期记录并审核账户、权限及整体安全性。

  *   让安全成为日常工作的一部分。


  至此，第二部分和第三部分主要集中于如何手动完成所有安装和维护任务。下一章将介绍 MySQL Cluster Manager，它将帮助您自动化其中的许多任务。



  '
- '# 13. MySQL 集群管理器


  到目前为止，前面的章节已经描述了 MySQL NDB 集群的内部原理，以及如何通过直接操作二进制文件、配置文件等方式来管理它。不过，还有另一种管理集群的方法——使用
  MySQL 集群管理器，它也常被缩写为 `MCM`。MySQL 集群管理器是一个企业级产品，它能显著简化集群的管理。该产品仅随 MySQL 集群运营商级版本订阅服务提供，同时也提供
  30 天试用版（参见 [`www.mysql.com/trials/`](https://www.mysql.com/trials/) ）。本章将提供一个 MySQL
  集群管理器的教程。


  **注意**


  即使你计划在生产环境中使用 MySQL 集群管理器，也建议先在测试系统上尝试手动管理一个集群，如前几章所述，以便获得管理集群过程的实际经验。


  ### 背景


  在开始教程之前，有必要先了解一些 MySQL 集群管理器的术语和架构，以便对命令名称及其工作原理有一些背景理解。本节讨论 MySQL 集群管理器使用的术语、架构、可用命令以及限制。


  **注意**


  无论集群是手动管理还是使用 MySQL 集群管理器管理，对于应用来说都没有区别。


  #### 术语


  有一些术语很重要，需要了解，因为它们会体现在命令和命令选项中。站点、主机、软件包、集群和进程是相关的，如表 13-1 所述。


  **表 13-1.** MySQL 集群管理器的重要术语


  | 术语 | 描述 |

  | --- | --- |

  | 站点 | 一组主机的集合。集群使用的所有主机必须位于同一个站点中。一台主机不能包含在多个站点中。 |

  | 主机 | 安装了一个或多个进程，或计划安装进程的主机。 |

  | 软件包 | MySQL NDB 集群文件。使用通用的 tar 包或 Zip 文件下载。集群中的所有进程使用相同的软件包，除非正在进行升级。 |

  | 集群 | 一个由多个进程组成的 MySQL NDB 集群安装实例。 |

  | 进程 | 集群中的各个进程（节点）。有五种受支持的进程类型：`ndb_mgmd`、`ndbapi`、`ndbd`、`ndbmtd` 和 `mysqld`。所有进程都明确绑定到特定主机，除了
  `ndbapi` 和 `mysqld` 进程还支持匿名主机。表 13-14 包含更多关于进程类型的信息。 |


  #### 架构


  为了让 MySQL 集群管理器能够监控进程，你必须在运行进程或计划安装进程的每个主机上安装一个代理。同样，对于已定义了进程的所有主机，也必须安装软件包。代理之间使用
  XCom 协议在专用端口上进行通信。此架构如图 13-1 所示。


  ![A435171_1_En_13_Fig1_HTML.jpg](img/A435171_1_En_13_Fig1_HTML.jpg)


  **图 13-1.** MySQL 集群管理器的架构


  图中省略了 MySQL NDB 集群节点之间的通信，但请记住，无论集群是手动部署还是使用 MySQL 集群管理器部署，节点间的通信都不会有所不同。MySQL 集群管理器代理之间的通信用实线表示，使用
  XCom 协议连接到由 `xcom-port` 选项指定的端口。代理会向外连接到管理节点和 SQL 节点，以便配置集群节点并对其进行监控。MySQL 集群管理器客户端（即
  `mcm` 客户端）可用于连接到任意一个代理来执行命令。`mcm` 客户端在与代理通信时使用标准的 MySQL 协议（与 `mysql` 命令行客户端连接 SQL
  节点时使用的协议相同）。从 `mcm` 客户端发起的连接会连接到由 `manager-port` 选项指定的端口。`mcm` 客户端可以从与代理相同的主机上执行，也可以在另一台主机上执行。




  ### 命令


  MySQL Cluster Manager 是命令驱动的。它并未为 MySQL NDB Cluster 提供任何新功能，而是提供了一个管理集群的界面，用于执行从初始安装、配置、备份与恢复到升级等一系列任务。对于独立集群而言，一个命令可能涵盖多个步骤。例如，在使新软件包可用后，使用单个命令即可执行升级。每个命令可分为信息、站点与代理、软件包、集群、配置、进程、备份与恢复或导入等类别。本教程中解释了除导入外这些类别的示例。导入在很大程度上取决于集群的初始设置和平台，因此其内容超出了本章范围。表
  13-2 至 13-9 概述了这些类别中可用的命令。启动和停止集群或其进程的命令也在表 13-15 中有更详细的讨论。


  表 13-9. MySQL Cluster Manager 1.4.2 中的导入命令


  | Command | Description |

  | --- | --- |

  | `import cluster` | 导入当前未由 MySQL Cluster Manager 管理的集群。这是执行 `import config` 命令后的导入第二阶段。
  |

  | `import config` | 导入当前未由 MySQL Cluster Manager 管理的集群的配置。这是导入的第一阶段。 |


  表 13-8. MySQL Cluster Manager 1.4.2 中的备份和恢复命令


  | Command | Description |

  | --- | --- |

  | `abort backup` | 中止正在进行的备份。 |

  | `backup cluster` | 备份集群的数据和架构。 |

  | `list backups` | 列出集群的可用备份。 |

  | `restore cluster` | 将备份恢复到集群。 |

  | `backup agents` | 备份代理的配置数据。 |


  表 13-7. MySQL Cluster Manager 1.4.2 中的进程命令


  | Command | Description |

  | --- | --- |

  | `add process` | 向集群添加一个或多个进程。 |

  | `change process` | 将 `ndbd` 进程更改为 `ndbmtd` 进程，或反之。 |

  | `list processes` | 列出集群的进程及其安装所在的主机。 |

  | `start process` | 启动集群中的一个进程。 |

  | `stop process` | 停止集群中的一个进程。 |

  | `update process` | 更新集群中的一个进程。 |

  | `remove process` | 从集群中移除一个进程。 |


  表 13-6. MySQL Cluster Manager 1.4.2 中的配置命令


  | Command | Description |

  | --- | --- |

  | `get` | 根据指定的过滤器获取集群中一个或多个节点的配置。 |

  | `reset` | 将集群中一个或多个节点的一个或多个配置选项重置为该选项的默认值。 |

  | `set` | 为集群中一个或多个节点的一个或多个配置选项设置值。 |


  表 13-5. MySQL Cluster Manager 1.4.2 中的集群命令


  | Command | Description |

  | --- | --- |

  | `create cluster` | 创建一个新集群。 |

  | `delete cluster` | 删除一个集群。 |

  | `list clusters` | 列出集群及其给定站点正在使用的软件包。 |

  | `list nextnodeids` | 列出如果添加另一个数据节点和其他节点时将使用的节点 ID。 |

  | `restart cluster` | 执行集群的滚动重启。 |

  | `show status` | 显示集群的状态、为集群执行的操作或集群的进程。 |

  | `start cluster` | 启动集群中的所有节点。 |

  | `stop cluster` | 停止集群中的所有节点。 |

  | `autotune` | 根据使用模板和写入负载自动调整集群。仅支持 MySQL NDB Cluster 7.4 及更高版本。本章后面的教程在配置集群时给出了一个示例。
  |

  | `upgrade cluster` | 升级或降级集群以使用不同的软件包。 |


  表 13-4. MySQL Cluster Manager 1.4.2 中的软件包命令


  | Command | Description |

  | --- | --- |

  | `add package` | 向一个或多个主机添加一个软件包。 |

  | `delete package` | 从一个或多个主机删除一个软件包。 |

  | `list packages` | 列出站点的所有软件包。 |


  表 13-3. MySQL Cluster Manager 1.4.2 中可用的站点和代理命令


  | Command | Description |

  | --- | --- |

  | `add hosts` | 向一个站点添加一个或多个主机。 |

  | `remove hosts` | 从一个站点移除一个或多个主机。 |

  | `list hosts` | 列出站点的所有主机以及主机上代理的状态和版本。 |

  | `change log-level` | 更改代理日志的详细程度。有关详细信息，请参阅本章末尾的“疑难解答 MySQL Cluster Manager”部分。
  |

  | `rotate log` | 轮转代理日志。 |

  | `collect logs` | 从代理、所有集群节点以及配置文件收集日志。这对于将所有日志集中到一个位置非常有用，例如上传到 MySQL Support。
  |

  | `create site` | 创建一个新站点。 |

  | `delete site` | 删除一个站点。 |

  | `list sites` | 列出所有站点以及每个站点中的主机。 |

  | `show settings` | 列出代理设置或安装代理的主机的详细信息。 |

  | `stop agents` | 停止一个或多个代理。 |

  | `version` | 返回代理版本。 |

  | `show warnings` | 列出代理上发生的最新警告。 |


  表 13-2. MySQL Cluster Manager 1.4.2 中可用的信息命令


  | Command | Description |

  | --- | --- |

  | `list commands` | 列出可用的命令。 |

  | `<command> --help` | `--help` 选项可与任何命令一起使用，以获取该命令的详细帮助。 |


  ### 限制


  MySQL Cluster Manager 存在一些需要注意的限制。其支持的平台列表是 MySQL NDB Cluster 支持平台列表的一个子集。支持平台列表可在
  [`www.mysql.com/support/supportedplatforms/cluster-manager.html`](https://www.mysql.com/support/supportedplatforms/cluster-manager.html)
  查看。此外，截至撰写本文时，MySQL Cluster Manager 的最新版本（版本 1.4.2）仅支持 MySQL NDB Cluster 7.3、7.4
  和 7.5。对于用户而言，请注意，除了检查状态外，一次只能执行一个命令。这是用户的责任，因为 MySQL Cluster Manager 不会阻止并发执行冲突的命令。


  > **注意**

  >

  > 客户端会话之间没有锁定机制。数据库管理员有责任确保不会并发执行冲突的操作。建议除检查状态外，一次切勿执行多个命令。



  ### 下载、安装与配置


  MySQL Cluster Manager 自身的安装过程非常直接。需要完成以下步骤：


  1.  如果尚未下载最新版本，请下载 `MySQL Cluster Manager`。

  2.  安装软件。

  3.  配置软件。

  4.  启动 `MySQL Cluster Manager`。


  本节剩余部分将详细讨论这些步骤。安装过程包含两个示例：在 Linux 上使用通用二进制文件，以及使用 Microsoft Windows 的 `MSI` 安装程序。其他平台要么支持像
  Linux 示例那样从 `tarball` 安装，要么支持原生打包格式，例如 `MSI` 安装程序或 `RPM`。


  #### 发行版本


  `MySQL Cluster Manager` 提供两种发行版本：


  *   **独立版**：此发行版本仅包含 `MySQL Cluster Manager` 本身。本章将使用此版本。下载时，文件标签将显示为 `MySQL-Cluster-Manager`，加上补丁版本号和平台信息。例如，`MySQL
  Cluster Manager 1.4.2 MSI for Windows x86 (64bit)`。

  *   **捆绑版**：此发行版本包含了在所下载的 `MySQL Cluster Manager` 版本制作时最新的 `MySQL NDB Cluster` 版本。例如，`MySQL
  Cluster Manager 1.4.2` 与 `MySQL NDB Cluster 7.5.5` 捆绑。下载时，文件标签将显示为 `MySQL-Cluster-Manager`，后跟补丁版本号、标签
  `+Cluster`，最后是平台信息。例如，`MySQL Cluster Manager 1.4.2+Cluster MSI for Windows x86 (64bit)`。


  注意


  术语“独立版”和“捆绑版”并非官方术语（实际上 `MySQL Cluster Manager` 的这两种分发方式没有官方名称）。此处使用这些术语是因为它们在 `MySQL
  Support` 与客户的沟通中最为常用，并且它们描述了下载文件的内容。


  由于 `MySQL Cluster Manager` 的发布频率低于 `MySQL NDB Cluster`，捆绑版本通常不会包含最新的 `MySQL NDB
  Cluster` 版本。因此，通常最好使用独立版的 `MySQL Cluster Manager` 并单独下载 `MySQL NDB Cluster`。本教程将使用独立的
  `MySQL Cluster Manager` 与 `MySQL NDB Cluster 7.5.5`，并将其升级到 `7.5.6`。


  #### 下载


  `MySQL Cluster Manager` 的 30 天试用版可以从 Oracle 软件交付云（ [`https://edelivery.oracle.com/`](https://edelivery.oracle.com/)
  ）下载。试用版与提供给付费客户的下载完全相同。下载过程类似于下载 `MySQL NDB Cluster`，如第 5 章所述，并且需要一个（免费的）Oracle
  账户。


  注意


  从 [`https://edelivery.oracle.com/`](https://edelivery.oracle.com/) 下载软件需遵守美国出口管理条例
  (`EAR`) 和其他出口法律。因此，所有账户在获准访问软件前必须经过验证。


  ##### 搜索软件


  登录 Oracle 软件交付云后，第一步是在搜索框中搜索 `MySQL Cluster Manager`，如图 13-2 所示。可用版本会显示在 `MySQL
  Cluster Manager` 旁边的“发布版本”区域。任何时刻都只有一个版本可用，因此显示的版本会随时间变化。


  ![A435171_1_En_13_Fig2_HTML.jpg](img/A435171_1_En_13_Fig2_HTML.jpg)


  **图 13-2.** 按产品或发布名称搜索


