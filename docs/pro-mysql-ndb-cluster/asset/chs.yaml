  \ UniqueHashIndex   Yes     sys       name$unique\n10  LogfileGroup      -     \
  \            loggroup_1\n16  UserTable         Yes     db1       t1\n1   0     \
  \            -                 DEFAULT-HASHMAP-3840-2\n0   IndexTrigger      - \
  \                NDB$INDEX_9_CUSTOM\n5   UserTable         Yes     mysql     NDB$BLOB_4_3\n\
  1   IndexTrigger      -                 NDB$INDEX_18_CUSTOM\n17  UserTable     \
  \    Yes     db1       NDB$BLOB_16_3\n19  OrderedIndex      No      sys       name\n\
  9   OrderedIndex      No      sys       ndb_index_stat_sample_x1\n3   HashIndexTrigger\
  \  -                 NDB$INDEX_20_UI\n21  OrderedIndex      No      sys       birthday\n\
  2   SystemTable       Yes     sys       SYSTAB_0\n4   UserTable         Yes    \
  \ mysql     ndb_schema\n1   TableEvent        -                 REPL$mysql/ndb_schema\n\
  2   TableEvent        -                 NDB$BLOBEVENT_REPL$mysql/ndb_schema_3\n\
  5   TableEvent        -                 REPL$db1/t1\n3   TableEvent        -   \
  \              REPL$mysql/ndb_apply_status\n6   TableEvent        -            \
  \     NDB$BLOBEVENT_REPL$db1/t1_3\n4   TableEvent        -                 ndb_index_stat_head_event\n\
  NDBT_ProgramExit: 0 – OK\n```\n**代码清单 2-3.** ndb_show_tables 实用工具的示例输出\n\n示例输出展示了存在多种“表”类型（在此上下文中，“表”不应按字面意思理解，例如它还包括内部触发器）：\n\
  \n\n\n##### NDB Cluster 中的对象类型与实用工具\n\n##### NDB Cluster 中的对象类型\n\nNDB Cluster 存储引擎管理多种类型的对象，可以通过\
  \ API 或 SQL 节点访问。从输出中可以看到，安装过程中创建了多种用户表，其中一些将在后续章节讨论；例如，`ndb_apply_status` 是第 6\
  \ 章讨论的复制实现的一部分。此外，互补的 BLOB 表虽然通过其父表访问，但也被视为用户表。\n\n*   **用户表**：这些是使用 `NDBCluster`\
  \ 存储引擎的表，可通过 API/SQL 节点访问。\n*   **系统表**：这些是内部系统表，无法直接访问。\n*   **唯一哈希索引**：用于唯一索引的哈希索引。\n\
  *   **有序索引**：一个有序索引。请注意，为添加到 `name` 列的索引同时存在唯一哈希索引和有序索引。\n*   **索引触发器**：这是有序索引的内部触发器（参见“数据节点内部结构”章节中的触发器）。可以从其名称确定触发器所属的索引。例如，对于\
  \ `NDB$INDEX_19_CUSTOM`，`19` 是对索引 ID 的引用。浏览列表可以发现，`id = 19` 的有序索引就是 `name` 列上的索引；然而，从输出中没有明确的方法可以将索引链接到表。\n\
  *   **哈希索引触发器**：这是唯一哈希索引的内部触发器。该触发器可以以与索引触发器相同的方式与索引关联。\n*   **撤销文件**：这些是添加到集群中的撤销文件。\n\
  *   **数据文件**：这些是集群的表空间文件。\n*   **表事件**：用于复制流的内部事件。\n\n日志列显示一个“表”是否将作为本地检查点的一部分被记录。通常，用户表和系统表会被记录，而其他所有内容则不会。对于用户表，可以在创建表时指定是否记录它。不记录表的一个好处是本地检查点会变小，但系统重启后该表将为空。从这个意义上讲，非日志表可以与传统\
  \ MySQL Server 实例中使用 `MEMORY` 存储引擎的表相比较。\n\n**提示**\n请不要将输出中列出的 `sys` 数据库与作为 MySQL\
  \ Server 5.7 和 MySQL NDB Cluster 7.5 一部分安装的 `sys` 模式混淆。清单 2-3 输出中引用的 `sys` 数据库是\
  \ `NDBCluster` 的一个内部数据库。\n\n##### ndb_desc 实用工具\n\nMySQL DBA 熟悉使用 `SHOW CREATE TABLE`\
  \ 命令来获取表的定义。在 MySQL NDB Cluster 中，还有另一种获取 `NDBCluster` 表信息的方法，即 `ndb_desc` 实用工具。`ndb_desc`\
  \ 的优势在于它不仅可以作为 NDB API 客户端工作，因此可以独立于 SQL 节点使用，而且提供了更详细的信息。\n\n作为一个例子，考虑清单 2-2 中的表\
  \ `db1.t1`：\n\n```sql\nCREATE TABLE db1.t1 (\nid INT UNSIGNED NOT NULL,\nname VARCHAR(20)\
  \ NOT NULL,\nbirthday date NOT NULL,\ncomment TEXT STORAGE DISK,\nPRIMARY KEY (id),\n\
  UNIQUE INDEX (name),\nINDEX (birthday)\n) ENGINE=ndbcluster TABLESPACE tblspc_1;\n\
  INSERT INTO db1.t1\nVALUES (1, 'Bob'  , '1980-03-21', REPEAT('a', 10000)),\n(2,\
  \ 'Alice', '1977-08-08', REPEAT('b', 4400)),\n(3, 'Hanna', '1982-05-30', REPEAT('c',\
  \ 2400)),\n(4, 'Mike', '1973-11-17', REPEAT('d', 400));\n```\n\n`ndb_desc` 的默认输出包含清单\
  \ 2-4 中的信息。\n\n```\nshell$ ndb_desc --database=db1 t1\n-- t1 --\nVersion: 1\nFragment\
  \ type: HashMapPartition\nK Value: 6\nMin load factor: 78\nMax load factor: 80\n\
  Temporary table: no\nNumber of attributes: 4\nNumber of primary keys: 1\nLength\
  \ of frm data: 373\nMax Rows: 0\nRow Checksum: 1\nRow GCI: 1\nSingleUserMode: 0\n\
  ForceVarPart: 1\nPartitionCount: 2\nFragmentCount: 2\nPartitionBalance: FOR_RP_BY_LDM\n\
  ExtraRowGciBits: 0\nExtraRowAuthorBits: 0\nTableStatus: Retrieved\nTable options:\n\
  HashMap: DEFAULT-HASHMAP-3840-2\n-- Attributes --\nid Unsigned PRIMARY KEY DISTRIBUTION\
  \ KEY AT=FIXED ST=MEMORY\nname Varchar(20;latin1_swedish_ci) NOT NULL AT=SHORT_VAR\
  \ ST=MEMORY\nbirthday Date NOT NULL AT=FIXED ST=MEMORY\ncomment Text(256,2000,0;latin1_swedish_ci)\
  \ NULL AT=MEDIUM_VAR ST=DISK BV=2 BT=NDB$BLOB_16_3\n-- Indexes --\nPRIMARY KEY(id)\
  \ - UniqueHashIndex\nPRIMARY(id) - OrderedIndex\nname(name) - OrderedIndex\nname$unique(name)\
  \ - UniqueHashIndex\nbirthday(birthday) - OrderedIndex\nNDBT_ProgramExit: 0 - OK\n\
  ```\n清单 2-4.\n`db1.t1` 表的 `ndb_desc` 实用工具输出\n\n输出的第一部分是通用表信息，例如版本，该版本在每次更改表定义时都会更新。一些有趣的可获取细节包括：\n\
  \n*   **分区数**：表可用的分区数。\n*   **分片数**：表可用的分片数。对于除完全复制表之外的所有其他表，分片数将与分区数相同。\n*   **分区平衡**：这是本章前面讨论的分区平衡。在此处，使用了默认的\
  \ `FOR_RP_BY_LDM`。\n*   **哈希映射**：MySQL NDB Cluster 为分区函数支持两种哈希映射。当前默认使用大型（3840）哈希映射是首选。较小的（240）哈希映射仅为向后兼容而提供，但由于自\
  \ MySQL NDB Cluster 7.2.7 以来的所有版本都支持较大的哈希映射，向后兼容性不再是问题。`HashMap` 值末尾的 `-2` 指的是分区数。\n\
  \n在通用表属性之后，是 `属性` 部分。在 MySQL NDB Cluster 中，列被称为属性。对于每一列，列出了其各种属性。一些更有趣的属性包括：\n\n\
  \n\n*   对于 `id` 列，它是主键和分布键。\n*   `AT` 属性指示该列是使用固定列格式还是动态列格式（`AT` 属性的 `%_VAR` 值）存储。\n\
  *   `ST` 属性指示该列是存储在内存中还是磁盘上。\n*   对于 `comment` 列，一个有趣的属性是 `BT`。因为 `comment` 列是一个\
  \ `TEXT` 列，它有一个互补的 `BLOB` 表，正如上一节的 \"BLOB、TEXT 和 JSON 列\" 小节所讨论的。`BT` 属性指示了这个 `BLOB`\
  \ 表的名称。还可以从数据类型 `Text(256,2000,0;latin1_swedish_ci)` 中看到附加信息。`256` 表示前 256 字节存储在内存中，`2000`\
  \ 表示剩余数据以最多 2000 字节的块存储。\n\n正如 `AT` 属性所提及的，MySQL NDB Cluster 支持两种列格式：固定和动态。固定格式，顾名思义，用于固定宽度存储。在\
  \ MySQL NDB Cluster 7.4 及更早版本中，固定宽度存储的限制是每分区 16GB，但在 7.5 版本中，这个限制已增加到 128TB。动态列格式使用可变宽度存储。动态格式比固定格式更灵活，例如，只有使用动态格式的列才能在线添加。固定格式列的优点是，对于本质上固定长度的数据（如整数），它们使用的内存更少。这两种列格式可以在同一个表中混合使用。\n\
  \n最后列出了索引。请注意，这里主键和 `name` 列上的唯一键有两个索引：一个唯一哈希索引和一个有序索引。这是 MySQL NDB Cluster 中所有唯一索引的默认设置。唯一哈希索引（除主键情况外存储在索引内存中）用于匹配单行和唯一性检查。有序索引则用于例如范围比较。\n\
  \n`ndb_desc` 支持附加选项。一个常用的选项是 `--extra-partition-info`（或 `-p`），正如其名，它提供表的分区信息。此选项可以与\
  \ `--extra-node-info`（`-n`）选项结合使用，以包含节点信息。清单 2-5 给出了一个例子。输出中与清单 2-4 相同的部分已替换为 `…`。分区信息的一些列已被移除。\n\
  \n```\nshell$ ndb_desc --database=db1 t1 -p\n...\n-- Per partition info --\nPartition\
  \  Row count  Commit count  Frag fixed memory  Frag varsized memory\n0         \
  \ 1          2             32768              32768\n1          3          6   \
  \          32768              32768\n清单 2-5.\ndb1.t1 表的 ndb_desc -p 输出\n```\n\n\
  清单 2-5 中的分区信息每个分区占一行。行数和提交计数是自解释的。更有趣的是 `Frag fixed memory` 和 `Frag varsized memory`\
  \ 值。如前所述，列格式可以是固定的或动态的。这里反映的是：`id`（`INT` 数据类型）和 `birthday`（`DATE`）列中的数据贡献给了 `Frag\
  \ fixed memory` 值，而 `comment` 列（`TEXT`）中的数据贡献给了 `Frag varsized memory` 值。每个分区和每种存储类型的使用量为\
  \ 32KB，原因是表中的数据量很小。用于数据的页面大小为 32KB，因此这表明目前每个分区中每种列格式各使用了一个页面。\n\n另一个可以提供表详细信息的选项是\
  \ `--blob-info (-b)` 选项，正如其名，它提供关于互补的 `BLOB` 表的信息。在 MySQL NDB Cluster 7.4 及更早版本中，它会添加\
  \ `BLOB` 表的每个分区信息，并且必须与 `-p` 选项一起使用；在 MySQL NDB Cluster 7.5 中，它会显示 `BLOB` 表的完整详细信息，就像父表一样。清单\
  \ 2-6 包含了一个部分输出的示例。一些输出，包括分区信息的一些列，已被移除。`Frag fixed memory` 和 `Frag varsized memory`\
  \ 列分别被截断为 `Frag fixed` 和 `Frag vars`。\n\n```\nshell$ ndb_desc --database=db1 t1\
  \ -pb\n...\n-- NDB$BLOB_16_3 –\n...\n-- Attributes --\nid Unsigned PRIMARY KEY DISTRIBUTION\
  \ KEY AT=FIXED ST=MEMORY\nNDB$PART Unsigned PRIMARY KEY AT=FIXED ST=MEMORY\nNDB$PKID\
  \ Unsigned NOT NULL AT=FIXED ST=MEMORY\nNDB$DATA Char(2000;binary) NOT NULL AT=FIXED\
  \ ST=DISK\n-- Indexes --\nPRIMARY KEY(id, NDB$PART) - UniqueHashIndex\n-- Per partition\
  \ info for NDB$BLOB_16_3 --\nPartition  Row count  Frag fixed  Frag var  Extent_space\
  \  Free extent_space\n0          2          32768       0         1048576      \
  \ 1026120\n1          9          32768       0         1048576       1012036\n清单\
  \ 2-6.\nndb_desc -pb 的输出\n```\n\n从 `Attributes` 部分可以看出，`BLOB` 表中有四列：\n\n*   `id`：父表的主键。这也是\
  \ `BLOB` 表主键的一部分，并且是分布键。也就是说，`BLOB` 表中的行将与它们所属的父表中的行存储在同一个分区。\n*   `NDB$PART`：`BLOB`\
  \ 部分。这是主键的第二部分，基本上是为构成一个 `BLOB` 值的每一行设置的计数器。该计数器确保 `BLOB` 数据可以按正确的顺序组合。\n*   `NDB$PKID`：此列保留供将来使用。\n\
  *   `NDB$DATA`：实际数据。它是一个固定宽度的 `CHAR(2000)` 列。\n\n从分区信息也可以看出数据列的固定宽度属性，其中只有 `Frag\
  \ fixed memory` 有数据。由于该列存储在磁盘上，分区信息还包括表空间区的使用详情。每个区大小为 1MB，每个分区使用其中一个区，并且大部分空间是空闲的。\n\
  \n\n\n##### NDB 文件系统\n\n关于数据节点最后要讨论的是 NDB 文件系统，这是数据节点存储其文件的地方。数据目录的顶层包含各种日志和跟踪文件以及\
  \ NDB 文件系统目录，如下列目录列表所示：\n\n```\nshell$ ls -lh\ntotal 3.8M\n-rw-r--r--. 1 mysql mysql\
  \ 1.1K Nov  3 18:25 ndb_1_error.log\ndrwxr-x---. 9 mysql mysql 4.0K Nov  3 16:57\
  \ ndb_1_fs\n-rw-r--r--. 1 mysql mysql  48K Nov  3 18:26 ndb_1_out.log\n-rw-r--r--.\
  \ 1 mysql mysql    5 Nov  3 18:25 ndb_1.pid\n-rw-r--r--. 1 mysql mysql 974K Nov\
  \  3 18:25 ndb_1_trace.log.1\n-rw-r--r--. 1 mysql mysql 997K Nov  3 18:25 ndb_1_trace.log.1_t1\n\
  -rw-r--r--. 1 mysql mysql 948K Nov  3 18:25 ndb_1_trace.log.1_t2\n-rw-r--r--. 1\
  \ mysql mysql 881K Nov  3 18:25 ndb_1_trace.log.1_t3\n-rw-r--r--. 1 mysql mysql\
  \    1 Nov  3 18:25 ndb_1_trace.log.next\n```\n\n请注意，所有文件和目录名称都以 `ndb_` 为前缀，后跟一个数字。该数字是数据节点的节点\
  \ ID。日志和跟踪文件在第 16 章讨论。文件 `ndb_1.pid` 存储数据节点的进程 ID。目录 `ndb_1_fs`（左侧第一列的 `d` 表示它是一个目录）是重做日志和其他文件存储的地方。这就是本节剩余部分将要探讨的内容。\n\
  \n`ndb_1_fs` 目录的内容包括几个目录和可能的几个文件。在此示例中，有七个子目录和四个文件：\n\n```\nshell$ ls -lh\ntotal\
  \ 385M\ndrwxr-x---. 4 mysql mysql   31 Nov  3 16:51 D1\ndrwxr-x---. 3 mysql mysql\
  \   18 Nov  3 16:50 D10\ndrwxr-x---. 3 mysql mysql   18 Nov  3 16:50 D11\ndrwxr-x---.\
  \ 4 mysql mysql   31 Nov  3 16:51 D2\ndrwxr-x---. 3 mysql mysql   18 Nov  3 16:50\
  \ D8\ndrwxr-x---. 3 mysql mysql   18 Nov  3 16:50 D9\n-rw-r--r--. 1 mysql mysql\
  \ 129M Nov  3 18:25 datafile_1.dat\n-rw-r--r--. 1 mysql mysql  65M Nov  3 18:25\
  \ datafile_2.dat\ndrwxr-x---. 4 mysql mysql   22 Nov  3 18:25 LCP\n-rw-r--r--. 1\
  \ mysql mysql 128M Nov  3 18:25 undo_1.log\n-rw-r--r--. 1 mysql mysql  64M Nov \
  \ 3 16:56 undo_2.log\n```\n\n这四个文件是表空间数据文件和日志文件组文件。这些文件都是使用相对路径创建的，因此它们被放置在 `ndb_1_fs`\
  \ 目录以及另一个数据节点的对应目录中。\n\n对于数据节点，这七个目录始终存在，但根据配置可能还有更多。这些目录可以分为三组：\n\n*   **元数据**：`D1`\
  \ 和 `D2` 目录存储有关表和集群的元数据。\n*   **重做日志**：`D8`、`D9`、`D10` 和 `D11` 目录包含重做日志。重做日志的每个部分都有一个目录（另请参阅本章前面名为“重做日志”的小节）。本例中有四个部分。\n\
  *   **本地检查点**：`LCP` 目录存储两个本地检查点。\n\n这些组中最有趣的是重做日志目录。每个目录包含由 `NoOfFragmentLogFiles`\
  \ 配置的文件数量，每个文件的大小为 `FragmentLogFileSize`。清单 2-7 展示了 `D8` 目录的情况。\n\n```\nshell$ ls\
  \ -lRh D8\nD8:\ntotal 4.0K\ndrwxr-x---. 2 mysql mysql 4.0K Nov  3 16:51 DBLQH\n\
  D8/DBLQH:\ntotal 8.8M\n-rw-r--r--. 1 mysql mysql 16M Nov  3 20:39 S0.FragLog\n-rw-r--r--.\
  \ 1 mysql mysql 16M Nov  3 16:50 S10.FragLog\n-rw-r--r--. 1 mysql mysql 16M Nov\
  \  3 16:50 S11.FragLog\n-rw-r--r--. 1 mysql mysql 16M Nov  3 16:50 S12.FragLog\n\
  -rw-r--r--. 1 mysql mysql 16M Nov  3 16:51 S13.FragLog\n-rw-r--r--. 1 mysql mysql\
  \ 16M Nov  3 16:51 S14.FragLog\n-rw-r--r--. 1 mysql mysql 16M Nov  3 16:51 S15.FragLog\n\
  -rw-r--r--. 1 mysql mysql 16M Nov  3 16:50 S1.FragLog\n-rw-r--r--. 1 mysql mysql\
  \ 16M Nov  3 16:50 S2.FragLog\n-rw-r--r--. 1 mysql mysql 16M Nov  3 16:50 S3.FragLog\n\
  -rw-r--r--. 1 mysql mysql 16M Nov  3 16:50 S4.FragLog\n-rw-r--r--. 1 mysql mysql\
  \ 16M Nov  3 16:50 S5.FragLog\n-rw-r--r--. 1 mysql mysql 16M Nov  3 16:50 S6.FragLog\n\
  -rw-r--r--. 1 mysql mysql 16M Nov  3 16:50 S7.FragLog\n-rw-r--r--. 1 mysql mysql\
  \ 16M Nov  3 16:50 S8.FragLog\n-rw-r--r--. 1 mysql mysql 16M Nov  3 16:50 S9.FragLog\n\
  清单 2-7.\nndb_1_fs/D8 目录的内容\n```\n\n首先，在 `D8` 目录中有一个 `DBLQH` 子目录。这表明这些文件由 `DBLQH`\
  \ 内核块使用，该块是 `LDM` 线程的主要部分。在 `DBLQH` 子目录内部有 16 个（默认值）文件，每个文件大小为 16MB（也是默认值）。表面上看，这似乎表明目录的总大小为\
  \ 256MB，但如清单 2-8 所示，事实并非如此。\n\n```\nshell$ du -shc *\n1.9M    S0.FragLog\n548K \
  \   S10.FragLog\n548K    S11.FragLog\n548K    S12.FragLog\n548K    S13.FragLog\n\
