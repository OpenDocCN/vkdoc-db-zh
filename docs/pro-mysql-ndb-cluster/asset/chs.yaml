- '# 10. 重启


  对于 MySQL NDB 集群的 DBA 来说，更常见的日常任务之一是重启集群节点。由于 MySQL NDB 集群是为高可用性而设计的，大多数重启都可以在集群整体保持在线的状态下进行。这意味着在
  MySQL NDB 集群中，重启扮演着特殊的角色，值得特别关注。


  在 MySQL NDB 集群中，重启用于多种原因，例如：


  *   配置变更

  *   添加管理节点、数据节点或 API/SQL 节点

  *   从崩溃中恢复

  *   升级（在第 11 章讨论）


