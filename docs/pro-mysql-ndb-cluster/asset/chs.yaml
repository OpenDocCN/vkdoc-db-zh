- '# 8. 备份和恢复


  对于任何数据库产品，备份和恢复都是确保在人为错误、硬件故障、自然灾害等情况下可以恢复数据的两个非常重要的部分。MySQL NDB Cluster 提供两种类型的备份：原生备份和逻辑备份。两种类型都有其用途，在大多数情况下，两者都应该使用。本章将介绍这两种选项，讨论何时使用它们，并介绍如何恢复备份。首先，本章讨论什么是备份以及备份过程。


  ### 备份和备份过程


  回答“什么是备份？”这个问题可能听起来很简单。Merriam-Webster 词典（[`www.merriam-webster.com/dictionary/backup`](https://www.merriam-webster.com/dictionary/backup)）中的定义是：


  > 计算机数据的副本（例如文件或硬盘驱动器的内容）


  这个定义是正确的，在 MySQL NDB Cluster 中也使用——创建备份就是创建集群中数据的副本。然而，习惯于其他数据库系统的数据库管理员可能对此有更复杂的理解。


  Oracle Database 管理员可能会想到涉及 Oracle Recovery Manager (RMAN；参见 [`www.oracle.com/technetwork/database/features/availability/rman-overview-096633.html`](http://www.oracle.com/technetwork/database/features/availability/rman-overview-096633.html)）的备份，它处理创建备份的所有细节，并与
  Oracle Secure Backup 和其他解决方案集成以将备份写入磁带。MySQL Enterprise Backup (MEB) 在支持与 Oracle
  Secure Backup 和第三方磁带备份解决方案协同工作方面具有一些相同的功能。


  另一方面，在 MySQL NDB Cluster 中，原生备份解决方案内置于数据节点中，并且从管理节点启动备份。这并不意味着备份质量不如使用 Oracle Recovery
  Manager 或 MySQL Enterprise Backup 制作的备份——它们都是专业级的备份。但是，不支持将备份目录保存到磁带或流式传输到远程主机。确保将备份传输到远程位置进行保存是数据库管理员的责任。


  在设计备份过程时，必须记住，备份的价值不超过恢复它的能力。备份过程不仅应包括如何创建备份，还应包括恢复它的整个周期。这包括即使整个数据中心因灾难（人为或自然灾害）而停机也能检索备份。不要轻视将备份传输到远程主机或磁带站这一步骤。确认备份有效的最佳方法是将它们恢复到测试系统，并验证是否可以找回所有数据。


  有了备份和备份过程的定义后，现在可以更详细地了解 NDB Cluster 原生备份的工作原理了。



  ### 原生 NDB 集群在线备份


  备份 `NDBCluster` 表的主要方法是使用原生备份。这对于 `NDBCluster` 表而言，就如同 MySQL 企业版备份对于 `InnoDB` 存储引擎一样。原生
  NDB 集群备份的主要特点包括：


  *   它是**在线的**。也就是说，在备份进行期间，可以更改数据和模式。

  *   它内置于 MySQL NDB 集群中（无需额外的二进制文件或软件包）。

  *   它支持在备份开始或结束时创建快照（备份保持一致的时间点）；默认情况下，快照在结束时创建，与 MySQL 企业版备份相同。

  *   原生备份的恢复支持并行恢复、恢复到不同的集群配置以及部分恢复。恢复备份在题为“恢复”的章节中讨论。

  *   它使用与本地检查点相同的底层机制。


  > **注意**

  >

  > MySQL 企业版备份和 Percona XtraBackup 都无法用于备份 MySQL NDB 集群，因为它们仅在本地主机的文件系统级别工作，无法连接到集群。


  #### 概述


  备份是从 NDB 管理客户端或 MySQL 集群管理器（MCM）客户端启动的（另见第 13 章）。启动备份的最简单方法是：


  ```

  shell$ ndb_mgm -e "START BACKUP"

  Connected to Management Server at: localhost:1186

  Waiting for completed, this may take several minutes

  Node 1: Backup 1 started from node 49

  Node 1: Backup 1 started from node 49 completed

  StartGCP: 91 StopGCP: 94

  #Records: 107373 #LogRecords: 2946

  Data: 20499388 bytes Log: 400956 bytes

  ```


  题为“启动和中止备份”的章节更详细地讨论了控制备份。从备份命令及其输出中需要注意几点，这将在本小节的剩余部分讨论。


  在示例中，控制权（提示符）直到备份完成才返回。这是默认行为。等待备份完成也是调用命令者获取备份返回值的唯一方式——备份成功与否。“备份监控”讨论了如何获取返回代码及其含义。


  输出中的 `Backup 1` 字符串指的是备份 ID。每个备份都有一个 ID，在恢复备份时也会使用。默认情况下，第一个备份编号为 1，下一个为 2，依此类推。但是，也可以指定自定义的备份
  ID。备份 ID 必须是介于 1 到 4294967294 之间（包含两端）的整数。自动生成的备份 ID 始终是之前使用的最大备份 ID 号加一。


  文本 `Backup 1 started from node 49` 表示节点 49（管理节点）通知节点 1（主数据节点）开始备份。节点 1 也会通知备份何时完成（下一行）。但是，所有在线数据节点都将参与备份。


  `StartGCP` 和 `StopGCP` 值指的是备份开始和完成时正在生效的全局检查点。请记住，全局检查点是一种跨数据节点同步将重做日志刷新到磁盘的机制。可以选择备份是在
  `StartGCP` 还是 `StopGCP` 时保持一致（参见下一小节“实现细节”）。


  最后，最后两行是有关备份大小的统计信息，包括记录数和行数。其中的“日志”部分指的是在备份进行期间收集的已提交事务。这将在下一小节关于备份内部工作原理的部分中讨论。


  #### 实现细节


  备份在所有在线数据节点上并行运行，因此每个数据节点将持有备份的一部分。每个节点将备份其主分区中的数据部分。如果节点离线，其主分区将由同一节点组中的另一个数据节点处理。这意味着数据只备份一次——这与本地检查点不同，在本地检查点中，每个数据节点会写出它拥有的所有数据。


  备份由三个部分组成，每个部分使用自己的文件。表 8-1 显示了备份的三个部分及每个部分使用的文件名。`<backup_id>` 表示为备份选择的备份 ID（见接下来的两个小节），`<node_id>`
  表示写入备份的节点的 `NodeId`。这三个文件写入到由 `BackupDataDir` 选项（在 config.ini 中）指定的路径下的 `BACKUP/BACKUP-<backup_id>`
  目录中。例如，如果 `BackupDataDir = /cluster` 且备份 ID 为 1，则这三个文件的路径是 `/cluster/BACKUP/BACKUP-1/`。整个备份过程如图
  8-1 所示。更多细节请参见以下讨论。


  ![A435171_1_En_8_Fig1_HTML.jpg](img/A435171_1_En_8_Fig1_HTML.jpg)


  图 8-1. 整体备份过程


  表 8-1. 备份各部分的文件名


  | 部分 | 文件名 |

  | --- | --- |

  | 元数据 | `BACKUP-<backup_id>.<node_id>.ctl` |

  | 表数据 | `BACKUP-<backup_id>-0.<node_id>.data` |

  | 事务日志 | `BACKUP-<backup_id>.<node_id>.log` |


  元数据包括使用 `NDBCluster` 存储引擎的表的表定义。需要记住的是，备份中不包含其他模式对象——包括视图和存储程序。所有数据节点都备份一份完整的元数据副本。表元数据由
  `DBDICT` 内核模块提供给备份。


  表数据是表中存储的实际数据。每个数据节点仅写出其当前作为主节点的片段的数据。如果某个数据节点离线，节点组中的其他数据节点将成为原由离线节点处理的片段的新主节点。这意味着该数据节点既要处理自己的片段，也要处理其离线同伴的片段，因此写出的数据量大约是其他数据节点的两倍。因此，最好在所有数据节点都在线时进行备份。


  事务日志记录了备份期间所做的更改。这确保了获得一致的备份，其中所有数据都对应于同一个时间点。根据备份是在开始还是结束时使用快照，该日志用于回滚（撤销日志）或前滚（重做日志）在备份期间提交的事务。事务日志通过内部触发器收集；当
  `DBTUP` 内核块检查要执行的触发器时，它会将受影响行的所需前像和/或后像发送给 `BACKUP` 内核块。表 8-2 显示了对于开始和结束时的快照，事务日志的类型以及在事务日志中记录的
  `INSERT`/`UPDATE`/`DELETE` 数据；主键用 PK 表示。从表中可以清楚地看出，在备份开始时的快照需要在事务日志中存储更多数据。


  表 8-2. 备份事务日志中存储的数据


  | 事件 | 快照：开始时 | 快照：结束时 |

  | --- | --- | --- |

  | `INSERT` | PK + 后像 | PK + 后像 |

  | `UPDATE` | PK + 前像和后像 | PK + 后像 |

  | `DELETE` | PK + 前像 | PK |


  此外，对于在备份开始时的快照，即使启用了 `CompressedBackup` 选项，事务日志也永远不会被压缩。因为当将其作为撤销日志应用时，日志必须按相反顺序读取，所以不支持压缩。由于这些原因，通常建议使用在备份结束时的快照，这也是默认设置。


  #### 启动与中止备份


  控制原生在线备份有两种可用操作：启动和中止。这些操作可以通过三种不同的方式执行：


  *   NDB 管理客户端：使用 `START BACKUP` 和 `ABORT BACKUP` 命令。

  *   NDB API：使用 `ndb_mgm_start_backup()` 和 `ndb_mgm_abort_backup()` 函数。NDB API 在第
  19 章讨论。

  *   MySQL 集群管理器（MCM）：使用 `BACKUP CLUSTER` 和 `ABORT BACKUP` 命令。MCM 在第 13 章讨论。


  NDB 管理客户端和 MCM 都使用 NDB API 函数作为控制备份的底层方式。本节的剩余部分将重点介绍如何使用 NDB 管理客户端来启动和中止备份。


  要启动备份，请使用 `START BACKUP` 命令。该命令接受几个可选参数：


  *   备份 ID：用于备份的 ID。每个备份由一个介于 1 到 4294967294（含）之间的数字 ID 标识。默认是使用先前的最高 ID 加一。参见本章后面的小节“选择备份
  ID”。

  *   快照时间：快照时间可以取两个互斥的值：`SNAPSHOTSTART` 和 `SNAPSHOTEND`。默认是 `SNAPSHOTEND`。如果使用备份开始时的快照，备份期间提交的事务在恢复备份时将被回滚。另一方面，如果使用备份结束时的快照，恢复的备份将包含备份期间提交的事务。

  *   客户端行为：此参数指定客户端在返回给用户之前应等待多久。可用值是 `NOWAIT`、`WAIT STARTED` 和 `WAIT COMPLETED`。`NOWAIT`
  将使管理客户端立即返回给用户；`WAIT STARTED` 将在备份启动后返回；`WAIT COMPLETED` 将在备份完成前不会返回。默认是等待直到备份完成（`WAIT
  COMPLETED`）。


  对于所有这三个参数，其值应在指定时不带选项名称。但是，指定的参数必须按它们列出的顺序包含。即（为了可读性添加了换行）：


  ```

  START BACKUP

  [backup id]

  [SNAPSHOTSTART|SNAPSHOTEND]

  [NOWAIT|WAIT STARTED|WAIT COMPLETED]

  ```


  请注意，执行命令时不应有任何换行符。例如，要创建一个使用下一个可用备份 ID、快照在备份开始时、并且客户端等待直到备份结束后才返回的备份，请使用：


  ```

  ndb_mgm> START BACKUP SNAPSHOTSTART

  Waiting for completed, this may take several minutes

  Node 1: Backup 5 started from node 49

  Node 1: Backup 5 started from node 49 completed

  StartGCP: 49332 StopGCP: 49337

  #Records: 2398587 #LogRecords: 0

  Data: 73818288 bytes Log: 0 bytes

  ```


  另一个例子是创建一个 ID 为 1612291604、快照在备份结束时、并在备份启动后返回的备份，如下所示：


  ```

  ndb_mgm> START BACKUP 1612291604 SNAPSHOTEND WAIT STARTED

  Waiting for started, this may take several minutes

  Node 1: Backup 1612291604 started from node 49

  ```


  当客户端立即返回或备份启动后，只要管理客户端仍保持连接，状态信息在可用时仍将被写入。因此，`NOWAIT` 和 `WAIT STARTED` 主要适用于在备份命令返回后管理客户端断开连接的情况。


  可以使用 `ABORT BACKUP` 命令中止正在进行中的备份。该命令接受一个参数：要中止的备份 ID。例如，要中止 ID 为 6 的备份，请使用：


  ```

  ndb_mgm> ABORT BACKUP 6

  Abort of backup 6 ordered

  Node 1: Backup 6 started from 49 has been aborted. Error: 1321

  ```


  #### 选择备份 ID


  所有备份都必须有一个备份 ID。最简单的解决方案是让 MySQL NDB 集群自动选择 ID，这将使用序列中的下一个更高 ID。例如，如果之前使用的最高备份 ID
  是 20，那么下一个自动生成的 ID 将是 21。这很简单，但缺点是备份 ID 不携带任何意义。


  另一种方法是手动或在备份脚本中生成备份 ID。一个选项是让备份 ID 反映备份启动的时间，例如，在格式 `%y%m%d%H%M` 中包含年、月、日、小时和分钟。每个格式控制符的含义如下：


  *   `%y`：两位数的年份。

  *   `%m`：两位数的月份。

  *   `%d`：两位数的月份中的日期。

  *   `%H`：两位数的小时（24 小时制）。

  *   `%M`：两位数的分钟。


  要在 Linux 上使用此格式生成的备份 ID 启动备份，可以使用 `date` 命令：


  ```

  shell$ ndb_mgm -e "START BACKUP $(date +''%y%m%d%H%M'')"

  Connected to Management Server at: localhost:1186

  Waiting for completed, this may take several minutes

  Node 1: Backup 1612291612 started from node 49

  Node 1: Backup 1612291612 started from node 49 completed

  StartGCP: 49988 StopGCP: 49992

  #Records: 2398587 #LogRecords: 0

  Data: 73818288 bytes Log: 0 bytes

  ```


  在 Windows 上，PowerShell 中的 `Get-Date` 命令是创建备份 ID 的最佳选择。例如（将命令保持在一行；此处为适应页面宽度而拆分为两行）：


  ```

  PS C:\> & ''C:\Program Files\MySQL\MySQL Cluster 7.5\bin\ndb_mgm.exe'' -e

  "START BACKUP $(get-date -Format yyMMddHHmm)"

  Connected to Management Server at: localhost:1186

  Waiting for completed, this may take several minutes

  Node 1: Backup 1707111936 started from node 49

  Node 1: Backup 1707111936 started from node 49 completed

  StartGCP: 5469 StopGCP: 5472

  #Records: 7367 #LogRecords: 0

  Data: 497756 bytes Log: 0 bytes

  ```


  格式字符串使用以下说明符：


  *   `yy`：年份的最后两位。

  *   `MM`：两位数的月份。

  *   `dd`：两位数的月份中的日期。

  *   `HH`：两位数的小时（24 小时制）。

  *   `MM`：两位数的分钟。


  另一种方法是在命令提示符中使用 `%DATE%` 和 `%TIME%` 变量；但是，请注意这些变量的格式取决于 Windows 设置的区域环境，因此更难使用。



  #### 备份监控


  MySQL NDB Cluster 在备份监控方面提供的功能有限。NDB 管理客户端允许您获取正在进行的备份的状态报告，但没有内置功能来获取已完成备份的状态。


  对于已完成的备份，最佳解决方案是检查集群日志。在集群日志中，备份开始和完成时会有一条日志消息：


  ```

  2016-12-29 17:16:02 [MgmtSrvr] INFO     -- Node 1: Backup 9 started from node 49

  2016-12-29 17:16:11 [MgmtSrvr] INFO     -- Node 1: Backup 9 started from node 49
  completed. StartGCP: 51829 StopGCP: 51834 #Records: 2398587 #LogRecords: 0 Data:
  73818288 bytes Log: 0 bytes

  ```


  备份完成的消息包含了备份的统计信息。如果备份失败，这也会记录在集群日志中，例如：


  ```

  2016-12-29 17:15:59 [MgmtSrvr] ALERT    -- Node 1: Backup 8 started from 49 has
  been aborted. Error: 1350

  ```


  可以使用 NDB 管理客户端中的 `BACKUPSTATUS` 报告获取正在进行的备份的进度信息：


  ```

  ndb_mgm> ALL REPORT BACKUPSTATUS

  Node 1: Local backup status: backup 7 started from node 49

  #Records: 1080791 #LogRecords: 0

  Data: 33553460 bytes Log: 0 bytes

  Node 2: Local backup status: backup 7 started from node 49

  #Records: 354437 #LogRecords: 0

  Data: 11342376 bytes Log: 0 bytes

  ```


  当没有备份进行时，报告会显示：


  ```

  ndb_mgm> ALL REPORT BACKUPSTATUS

  Node 1: Backup not started

  Node 2: Backup not started

  ```


  与管理客户端中的其他类似命令一样，可以使用 `ALL` 关键字获取所有数据节点的报告，或指定单个节点 ID。有关在 NDB 命令行客户端中生成报告的更多信息，请参见第
  7 章。


  备份与本地检查点共享 I/O，因此可以通过 `ndbinfo` 模式监控 I/O 使用情况。此外，还可以监控 CPU 使用率。与备份特别相关的视图有：


  *   `cpustat%` 表：这些视图提供每个线程的 CPU 使用率信息，要么是最后一秒的（`cpustat` 视图），要么是最近 20 次测量的（`cpustat_50ms`、`cpustat_1sec`
  和 `cpustat_20sec` 视图，测量间隔分别为 50 毫秒、1 秒或 20 秒）。这些视图可用于检测在执行备份期间与无备份进行期间相比，CPU 的使用程度。这些视图在
  7.5.2 版本中引入。

  *   `disk_write_speed_%` 表：这些视图显示备份/本地检查点数据和日志的磁盘写入速度。视图还包括当前目标写入速度，因此可以确定是否达到了目标。有一个包含原始数据的视图（`disk_write_speed_base`）和两个包含聚合数据的视图（`disk_write_speed_aggregate`
  和 `disk_write_speed_aggregate_node`）。这些视图在 7.4.1 版本中添加。


  检查磁盘 I/O 的示例如清单 8-1 所示。


  ```

  mysql> SELECT * FROM ndbinfo.disk_write_speed_aggregate_node\G

  *************************** 1. row ***************************

  node_id: 1

  backup_lcp_speed_last_sec: 7252000

  redo_speed_last_sec: 260000

  backup_lcp_speed_last_10sec: 2821118

  redo_speed_last_10sec: 78243

  backup_lcp_speed_last_60sec: 470000

  redo_speed_last_60sec: 64000

  *************************** 2. row ***************************

  node_id: 2

  backup_lcp_speed_last_sec: 6047000

  redo_speed_last_sec: 195000

  backup_lcp_speed_last_10sec: 1493014

  redo_speed_last_10sec: 71798

  backup_lcp_speed_last_60sec: 248000

  redo_speed_last_60sec: 63000

  2 rows in set (0.01 sec)

  ```


  由于同一个内核块处理备份和本地检查点，因此无法获取有多少 I/O 是由正在进行的备份引起的，有多少是由正在进行的本地检查点引起的详细信息。有关 `ndbinfo`
  模式的详细信息，请参见第 16 章。


  要获取有关备份是否成功的信息，有几种选择：


  *   使用 NDB 管理客户端或 NDB API `ndb_mgm_start_backup()` 函数创建备份时，检查返回码。

  *   对于 MySQL Cluster Manager (MCM)，使用 `LIST BACKUPS` 命令。此命令返回所有成功的备份，或者可以根据备份 ID
  列出单个备份。

  *   如本小节开头所述，检查集群日志。


  例如，要在 bash 中检查备份的返回码，使用此命令：


  ```

  shell$ ndb_mgm -e "START BACKUP 8"

  Connected to Management Server at: localhost:1386

  Waiting for completed, this may take several minutes

  Backup failed

  *  3001: Could not start backup

  *        Backup failed: file already exists (use ''START BACKUP ''): Temporary error:
  Temporary Resource error

  shell$ echo $?

  ```


  在 Windows PowerShell 中，使用 `$LastExitCode` 特殊变量获取退出码：


  ```

  PS C:\> & ''C:\Program Files\MySQL\MySQL Cluster 7.5\bin\ndb_mgm.exe'' -e "START
  BACKUP 1"

  Connected to Management Server at: localhost:1186

  Waiting for completed, this may take several minutes

  Backup failed

  *  3001: Could not start backup

  *        Backup failed: file already exists (use ''START BACKUP ''): Temporary error:
  Temporary Resource error

  PS C:\> echo $LastExitCode

  ```


  返回码 `0` 表示命令成功，非零返回码表示命令失败。要获取备份的整体状态，必须使用 `WAIT COMPLETED`（默认选项），因为返回码反映的是命令返回给用户时的状态。




  ### 备份配置


  为了优化备份性能，需要考虑几个配置选项。这些选项也在第 4 章中讨论过。有八个专门与备份相关的选项：


  *   `BackupDataDir`：存储备份的位置。将备份存储在与本地检查点不同的磁盘系统上，可以大大提高备份性能，或者通过将备份存储在比本地检查点所用磁盘更便宜的磁盘上来降低存储成本。将备份存储在独立的文件系统上还提供了冗余，因此即使包含本地检查点的磁盘系统丢失，备份仍然可用。`BackupDataDir`
  的默认值是 `FileSystemPath` 的值，而 `FileSystemPath` 的默认值又是 `DataDir`。

  *   `BackupDiskWriteSpeedPct`：此选项自 MySQL NDB Cluster 7.4.8 起新增，用于指定备份所使用的、由 `MinDiskWriteSpeed`
  和 `MaxDiskWriteSpeed` 指定的 I/O 带宽的百分比。

  *   `CompressedBackup`：启用后，备份将被压缩，这会以磁盘 I/O 换取更高的 CPU 使用率。压缩备份时，可能需要使用 `ThreadConfig`
  选项为 I/O 线程提供额外的 CPU 资源。只有当快照在备份结束时创建，事务日志才会被压缩。

  *   `BackupWriteSize`：备份的默认写入大小。写入大小可以自动增加，最高可达 `BackupMaxWriteSize` 的值。

  *   `BackupMaxWriteSize`：允许的最大写入大小。

  *   `BackupDataBufferSize`：用于缓冲数据写入的内存缓冲区大小。

  *   `BackupLogBufferSize`：用于缓冲事务日志写入的内存缓冲区大小。

  *   `BackupReportFrequency`：向集群日志报告备份进度的频率。


  **注意**


  此外，还有一个名为 `BackupMemory` 的选项，它在 MySQL NDB Cluster 7.4 及更高版本中已弃用。在早期版本中，它被设置为 `BackupDataBufferSize`
  和 `BackupLogBufferSize` 的总和。


  所有选项都可以通过滚动重启（对于 `BackupDataDir` 则是初始滚动重启）进行更改，因此在安装时无需锁定为特定值。备份选项没有“一刀切”的解决方案。重要的是监控性能（参见前一小节以及第
  14 章和第 16 章），并根据收集的数据得出的结论进行调整。例如，如果发现备份期间磁盘 I/O 是瓶颈，但 CPU 资源有闲置，解决方案可能是启用压缩备份。这也是为什么拥有良好监控很重要的一个例子，因为这样就可以比较配置更改前后的监控数据，并验证更改的效果。


  ### 逻辑备份与二进制日志


  原生（在线）备份功能非常出色，因为它提供了一种在集群保持应用程序读写可用的同时创建备份的方法。然而，它有三个局限性：


  *   备份主要用于恢复到另一个 MySQL NDB Cluster 安装。

  *   备份仅包含 `NDBCluster` 表的表定义和数据。使用其他存储引擎的表、视图、存储程序等不包括在内。

  *   备备份不是人类可读的。


  虽然备份可以转换为 CSV 文件，但如果已知备份将恢复到另一个存储引擎，通常最好创建逻辑备份。此外，最好保留一份 schema（模式）的逻辑备份，以防原生备份恢复到与备份所在集群配置不同的集群；这一点在下一节关于恢复的内容中有进一步讨论。


  逻辑备份是一种以可移植方式导出数据的备份。在 MySQL 中，这意味着要么是 SQL 语句（`CREATE TABLE`、`INSERT` 等），要么是 CSV
  文件。这使得恢复备份更容易，例如恢复到 `InnoDB` 复制从库。另一方面，它不支持在线备份。事实上，如下所述，为了确保备份的一致性，集群在备份期间必须是只读的。创建备份需要更长时间，恢复它则需要更长时间。


  #### 一致性考虑


  逻辑备份的主要优势在于其可移植性。然而，在确保创建一致性备份方面，这是有代价的。困难源于 MySQL NDB Cluster 的架构和局限性：


  *   MySQL NDB Cluster 仅支持 `READ COMMITTED` 事务隔离级别。因此，无法以与 `InnoDB` 存储引擎相同的方式创建读视图。`InnoDB`
  读视图允许在其他连接持续更新数据时创建在线数据快照。

  *   MySQL NDB Cluster 支持多个 API/SQL 节点，而 `LOCK TABLES` 在所有这些节点之间不是全局的。


  这意味着除非集群是只读的（最简单的方法是将集群置于单用户模式），否则无法创建一致的备份。有几种方法可以避免在创建逻辑备份时影响应用程序：


  *   复制从库：如果有一个只读的复制从库，可以在此从库上创建备份。在备份期间，复制从库将无法应用复制事件，因此必须考虑到这一点。但是，复制从库仍然可以将复制事件保存到中继日志，以确保在备份过程中复制主库崩溃时，仍有可能赶上复制主库。

  *   临时集群：对于一次性逻辑备份，可以将原生备份恢复到临时集群，然后在不影响生产集群的情况下进行逻辑备份。


  对于模式的备份，如果模式变更很少发生，这些考虑可能并不重要。在这种情况下，确保在未执行模式变更时进行模式备份可能就足够了。



  ### 创建逻辑备份


  要创建逻辑备份，需要执行一系列 SQL 语句来提取模式（schema）和/或数据。也就是说，一个包含表和数据的逻辑备份本质上将为每个表使用以下查询来创建：


  *   `SHOW CREATE TABLE ...` 以获取表定义。

  *   `SELECT * FROM ...` 以获取数据。


  在实际操作中，具体实现细节可能有所不同。


  #### 用于逻辑备份的客户端程序


  MySQL NDB 集群（以及 MySQL 服务器）附带了两个用于创建逻辑备份的客户端程序。此外，还有一个独立的 GUI 程序也支持创建备份。这三个程序分别是：


  *   `mysqlpump`：这是一个随 MySQL 服务器 5.7 和 MySQL NDB 集群 7.5 及更高版本附带的新实用程序。它旨在替代 `mysqldump`，并支持并行创建备份，以及在恢复数据后添加索引定义（以避免在数据恢复期间维护索引）。

  *   `mysqldump`：这是传统上用于 MySQL 逻辑备份的实用程序，包含在所有可用版本中。

  *   MySQL Workbench：MySQL Workbench 程序提供了一个 GUI 来执行查询、管理 SQL 节点等。它还包含一个用于控制 `mysqldump`
  的界面。


  > **注意**

  >

  > MySQL Workbench 的商业版本也支持通过 MySQL 企业备份进行备份。然而，如本章开头所述，MySQL 企业备份不支持 MySQL NDB 集群。


  #### `mysqlpump` 与 `mysqldump`


  `mysqlpump` 和 `mysqldump` 都支持在本地或从远程服务器创建备份。在 MySQL NDB 集群 7.5 及更高版本中，除非其限制要求使用
  `mysqldump`，否则建议使用 `mysqlpump`。与 MySQL NDB 集群相关的 `mysqlpump` 限制包括：


  *   生成的备份不保证与旧版本的 MySQL 服务器和 MySQL NDB 集群兼容。

  *   权限表不包含在备份中。但是，可以使用 `--users` 选项包含重新创建用户所需的 `CREATE USER` 和 `GRANT` 语句；这将在下一小节中讨论。

  *   没有在备份期间锁定所有表的功能。

  *   不支持包含用于重新创建日志文件组和表空间文件的 SQL 语句。

  *   不支持获取复制坐标（二进制日志文件和位置）。

  *   不支持备份到制表符分隔的文件。


  > **警告**

  >

  > 由于缺乏在备份期间锁定所有表的选项，对于除 `InnoDB` 以外的任何其他存储引擎，`mysqlpump` 无法保证所有表相对于同一时间点保持一致的备份。确保在备份期间模式或数据不发生更改，取决于创建备份的管理员。


  #### 逻辑备份的使用场景


  创建逻辑备份有多种用途。一些更常见的场景包括：


  *   模式备份：通过创建模式的逻辑备份，可以包含所有模式对象：表定义、存储程序定义等。此外，当在 7.4 及更早版本中恢复原生 NDB 集群备份时，`NDBCluster`
  表将使用与制作备份时相同数量的分区进行恢复。逻辑模式备份允许将表恢复到具有不同数量数据节点或不同配置的集群，并让恢复的表使用备份恢复到的集群的默认分区数。还可以使用不同的存储引擎恢复逻辑模式备份；例如，如果需要让复制从库使用
  `InnoDB` 来执行复杂的报告查询。

  *   完整备份：原生 NDB 备份仅包含 `NDBCluster` 表。`InnoDB` 表、存储程序（包括 `NDBCluster` 表的触发器）等不包括在内。完整备份可以确保有一个包含所有内容的单一备份。

  *   部分备份：虽然原生 NDB 备份支持部分恢复，但不支持部分备份。如果目标是将单个表复制到不同的系统，这可能会导致备份不必要的庞大。部分备份还可以包含所有非
  `NDBCluster` 表和对象。模式备份是部分备份的一个特例。


  > **提示**

  >

  > 建议在每次模式更改后创建逻辑模式备份。这将确保能够利用逻辑备份的额外灵活性，并备份未在 SQL 节点之间同步的模式对象。


  #### 创建一致的全量逻辑备份


  要创建一致的全量逻辑备份，集群必须首先处于单用户模式：


  ```

  shell$ ndb_mgm -e "ENTER SINGLE USER MODE 51"

  Connected to Management Server at: localhost:1186

  Single user mode entered

  Access is granted for API node 51 only.

  ```


  在此示例中，允许的节点 ID 是 `51`。为避免在备份期间发生更改并获取二进制日志文件和位置（如果 SQL 节点启用了二进制日志），必须锁定所有表：


  ```

  mysql> FLUSH TABLES WITH READ LOCK;

  Query OK, 0 rows affected (0.10 sec)

  -- 如果 SQL 节点启用了二进制日志记录：

  mysql> SHOW MASTER STATUS\G

  *************************** 1. row ***************************

  File: binlog.000003

  Position: 217047

  Binlog_Do_DB:

  Binlog_Ignore_DB:

  Executed_Gtid_Set:

  1 row in set (0.00 sec)

  ```


  记下 `SHOW MASTER STATUS` 输出中的 `File` 和 `Position` 值，并将其与备份一起存储。在创建备份本身时保持连接打开。接下来使用
  `mysqlpump` 创建实际的备份：


  ```

  shell$ mysqlpump --user=root --password --all-databases \

  --hex-blob --triggers --routines --events > full_backup.sql

  ```


  > **提示**

  >

  > 对于 `mysqlpump` 和 `mysqldump`，都建议使用 `--hex-blob` 选项。该选项确保二进制数据始终正确导出。


  最后，解锁表并退出单用户模式：


  ```

  mysql> UNLOCK TABLES;

  Query OK, 0 rows affected (0.00 sec)

  shell$ ndb_mgm -e "EXIT SINGLE USER MODE"

  Connected to Management Server at: localhost:1186

  Exiting single user mode in progress.

  Use ALL STATUS or SHOW to see when single user mode has been exited.

  shell$ ndb_mgm -e "ALL STATUS"

  Connected to Management Server at: localhost:1186

  Node 1: started (mysql-5.7.16 ndb-7.5.4)

  Node 2: started (mysql-5.7.16 ndb-7.5.4)

  ```



  使用 `mysqldump` 创建完整备份与使用 `mysqlpump` 类似。主要区别在于，最好添加 `--lock-all-tables` 选项，该选项与单用户模式相结合，可确保在备份期间不会对任何表进行更改。此外，对于启用了二进制日志的
  SQL 节点，请添加 `--master-data` 选项，以将二进制日志文件及其位置作为一条 `CHANGE MASTER TO` 语句包含在备份文件顶部附近。通过将该选项值设置为
  2，它会被包含为注释，这样在恢复备份时就不会自动应用：


  ```

  --

  -- Position to start replication or point-in-time recovery from

  --

  -- CHANGE MASTER TO MASTER_LOG_FILE=''binlog.000003'', MASTER_LOG_POS=217047;

  ```


  要应用 `CHANGE MASTER TO` 命令，可以在恢复备份前将其注释掉，或者手动执行它。


  因此，`mysqldump` 命令就变成了以下命令：


  ```

  shell$ mysqldump --user=root --password --lock-all-tables --master-data=2 \

  --all-databases --hex-blob \

  --triggers --routines --events > full_backup.sql

  ```


  默认情况下，`mysqldump` 备份会包含用于重建磁盘数据的日志文件组和表空间文件的 SQL 语句。如果不希望包含这些内容，请添加 `--no-tablespaces`
  选项。


  当使用 `mysqldump` 时，另一种选择是将数据备份为制表符分隔的文件。其优点是会得到一个包含模式定义的 SQL 脚本和一个包含数据的制表符分隔文件（文件扩展名为
  .txt）。这使得执行部分恢复更容易，并且可以并行恢复数据。缺点是每次只能备份一个数据库。例如，要为 `world` 示例数据库创建制表符分隔的备份，请使用如下示例中的命令：


  ```

  shell$ mysqldump --user=root --password \

  --hex-blob --triggers --routines --events \

  --tab=/backup/world world > /backup/world_programs.sql

  ```


  `--tab` 选项使用的是 `SELECT ... INTO OUTFILE ...` 语句，这意味着需要满足以下要求：


  *   必须允许 `mysqld` 进程写入 `--tab` 选项指定的目录。

  *   MySQL 必须通过 `--secure_file_priv` 选项被允许将该目录用作 `SELECT ... INTO OUTFILE ...` 的目标目录。`--secure_file_priv`
  的值可以是一个父目录；例如，在本例中是 `/backup`。

  *   创建备份的用户必须拥有 `FILE` 权限。


  由于一次只能备份一个数据库，因此备份过程应循环遍历所有需要备份的数据库。使用 `--lock-all-tables` 选项并无益处。备份过程应确保所有数据库在数据未被更改期间完成备份。对于本例的备份，`/backup/world`
  目录包含每个表的一个 .sql 文件和一个 .txt 文件，以及每个视图的一个 .sql 文件。.sql 文件还包含表的任何触发器。`mysqldump` 将存储函数、存储过程和事件的备份写入
  `stdout`，在本例中，它被重定向到 `/backup/world_programs.sql` 文件。


  **注意**


  `mysqlpump` 和 `mysqldump` 的 `--single-transaction` 选项都要求 `REPEATABLE READ` 事务隔离级别。由于
  `NDBCluster` 使用的是 `READ COMMITTED` 事务隔离级别，因此无法使用 `--single-transaction` 来备份包含 `NDBCluster`
  表的数据。


  #### 使用 `mysqldump` 进行部分备份


  部分备份在大多数方面与完整备份相同，区别仅在于添加或删除选项以获取所需的数据库部分。一个值得考虑的特殊情况是模式备份，它是一种包含所有表定义但不包含数据的部分备份。第
  10 章的“初始系统重启”案例研究中给出了一个这变得有用的示例。要使用 `mysqlpump` 创建包含所有表定义、触发器、存储例程和存储函数的备份，请使用命令：


  ```

  shell$ mysqlpump --user=root --password --all-databases \

  --skip-dump-rows --skip-defer-table-indexes \

  --triggers --routines --events > schema_backup.sql

  ```


  对于 `mysqldump`，命令是：


  ```

  shell$ mysqldump --user=root --password --no-data --all-databases \

  --triggers --routines --events > schema_backup.sql

  ```


  该命令在备份期间不会锁定表；假设在备份期间没有进行模式更改，则不需要锁定。


  ##### 通过 MySQL Workbench 进行逻辑备份


  MySQL Workbench 提供了一个 GUI 界面，可以使用 `mysqldump` 创建备份。与在命令行上执行 `mysqldump` 相比，它没有新增功能，但它可以简化备份设置。还可以获取
  MySQL Workbench 使用的 `mysqldump` 命令，以便将来可以直接在命令行上执行。图 8-2 显示了用于导出 `world` 示例数据库的“数据导出”屏幕。要导出，请选择左侧导航器（已高亮显示）中“管理”下的“数据导出”选项。有两种可用的备份类型：


  ![A435171_1_En_8_Fig2_HTML.jpg](img/A435171_1_En_8_Fig2_HTML.jpg)


  **图 8-2. MySQL Workbench: 数据导出屏幕**


  *   导出到转储项目文件夹：这会为每个表创建一个 SQL 脚本，并为每个模式创建一个包含存储程序、事件和视图的脚本。

  *   导出到自包含文件：这与为所选对象执行单个 `mysqldump` 命令所创建的内容类似。所有对象定义和数据都写入同一个文件。


  建议在“高级选项”页面中启用 hex-blob 选项；请参见图 8-3 中高亮显示的选项。目前 MySQL Workbench 不支持使用 `mysqlpump`
  进行数据导出。


  ![A435171_1_En_8_Fig3_HTML.jpg](img/A435171_1_En_8_Fig3_HTML.jpg)


  **图 8-3. MySQL Workbench: 数据导出屏幕的高级选项页**



  ##### 备份权限


  建议您单独备份权限，以便简化用户及其权限的恢复。当存在多个 SQL 节点且未使用分布式权限（用户权限存储在数据节点中——另见第 12 章）时，此方法尤其有用。导出权限有三种选项：


  *   `mysqlpump`

  *   手动使用 `SHOW CREATE USER` 和 `SHOW GRANTS FOR` SQL 语句导出。需要为每个用户执行一次命令。

  *   `mysqldump` 权限表。


  每种选项将更详细地讨论。


  在 MySQL NDB Cluster 7.5 中，使用带有 `--users` 选项的 `mysqlpump` 备份程序，可以轻松创建用户及其权限的备份：


  ```

  shell$ mysqlpump --user=root --password --users \

  --exclude-databases=% > users_backup.sql

  Enter password:

  Dump completed in 4847 milliseconds

  ```


  在此 `mysqlpump` 备份命令中，`--exclude-databases=%` 选项排除了所有数据库，仅保留 `CREATE USER` 和 `GRANT`
  语句。


  对于旧版本的 MySQL NDB Cluster，没有直接的方法导出 MySQL NDB Cluster 发行版提供的 SQL 语句。可以使用 `SHOW CREATE
  USER` 和 `SHOW GRANTS` 语句来获取重建用户所需的 `CREATE USER` 和 `GRANT` 语句。例如，使用 bash，可以如代码清单
  8-2 所示编写脚本。该脚本首先定义用于获取所有账户（格式为 `user@host`）的空格分隔列表的 SQL。然后，使用此 SQL 将变量 `USERS` 设置为该列表，最后循环遍历用户。在循环中，为当前用户执行
  `SHOW CREATE USER` 和 `SHOW GRANTS FOR`。


  ```

  shell$ SQL="SELECT GROUP_CONCAT(

  CONCAT('''''''', User, ''''''@'''''', Host, '''''''') SEPARATOR '' ''

  ) AS Users FROM mysql.user;"

  shell$ USERS=$(mysql --user=root --password --skip-column-names \

  --execute="${SQL}")

  shell$ for USER in ${USERS}; do

  echo "-- CREATE USER and GRANT for: ${USER}"

  mysql --user=root --password --skip-column-names --batch \

  --execute="SHOW CREATE USER ${USER};

  SHOW GRANTS FOR ${USER};"

  done

  ```


  代码清单 8-2. 使用 bash 导出用户及其权限的示例


  各种导出权限的选项产生类似的输出。代码清单 8-3 显示了代码清单 8-2 中示例生成的 SQL 语句示例。请注意，这些语句末尾没有分号来表示语句结束。


  ```

  -- CREATE USER and GRANT for: ''mysql.sys''@''localhost''

  Enter password:

  CREATE USER ''mysql.sys''@''localhost'' IDENTIFIED WITH ''mysql_native_password''
  AS ''*THISISNOTAVALIDPASSWORDTHATCANBEUSEDHERE'' REQUIRE NONE PASSWORD EXPIRE DEFAULT
  ACCOUNT LOCK

  GRANT USAGE ON *.* TO ''mysql.sys''@''localhost''

  GRANT TRIGGER ON `sys`.* TO ''mysql.sys''@''localhost''

  GRANT SELECT ON `sys`.`sys_config` TO ''mysql.sys''@''localhost''

  -- CREATE USER and GRANT for: ''root''@''localhost''

  Enter password:

  CREATE USER ''root''@''localhost'' IDENTIFIED WITH ''mysql_native_password'' AS
  ''*13430255D7D10DD8DCD27A6AE669F2CA263AB5EA'' REQUIRE NONE PASSWORD EXPIRE DEFAULT
  ACCOUNT UNLOCK

  GRANT ALL PRIVILEGES ON *.* TO ''root''@''localhost'' WITH GRANT OPTION

  GRANT PROXY ON ''''@'''' TO ''root''@''localhost'' WITH GRANT OPTION

  ```


  代码清单 8-3. 权限输出示例


  也可以使用 `mysqldump` 创建权限表的逻辑备份。这种方法有一些限制。备份通常只能恢复到相同版本的 MySQL NDB Cluster（更准确地说，包含的
  MySQL Server 版本必须相同）。如果备份中包含 `CREATE TABLE` 语句，则可以将权限恢复到下一个主要版本，前提是恢复后执行 `mysql_upgrade`。与返回
  `CREATE USER` 和 `GRANT` 语句的备份相比，如果只需要恢复部分用户，这种方法也需要更多工作。由于这些限制，通常最好使用讨论过的其他选项之一。


  备份所有权限表（包括 `CREATE TABLE` 语句）的 `mysqldump` 命令是：


  ```

  shell$ mysqldump --user=root --password --tables mysql \

  columns_priv db procs_priv proxies_priv tables_priv user

  ```


  如果不想包含 `CREATE TABLE` 语句，请添加 `--no-create-info` 选项：


  ```

  shell$ mysqldump --user=root --password --no-create-info --tables mysql \

  columns_priv db procs_priv proxies_priv tables_priv user

  ```


  无论哪种情况，恢复备份后，都必须执行 `FLUSH PRIVILEGES` 才能使恢复的权限生效。



  ### 二进制日志


  如第 6 章所讨论的，二进制日志是集群间复制的重要组成部分。它们也可用于时间点恢复（PITR）。本质上，二进制日志是记录所有数据和模式变更的日志。因此，备份二进制日志至关重要。


  备份二进制日志最简单的方法是复制它们。一个有效的复制方法是使用 `rsync`、`Robocopy`（[`technet.microsoft.com/en-us/library/cc733145(v=ws.11).aspx`](https://technet.microsoft.com/en-us/library/cc733145(v=ws.11).aspx)）或类似程序。二进制日志是只追加的。文件达到最大大小后，将不再被修改。因此
  `rsync` 能够最大限度地减少复制的数据量。


  使用 `rsync` 和 `Robocopy` 的主要缺点是二进制日志不是持续复制的。此外，`Robocopy` 会跳过打开的文件，因此只包含旧的二进制日志。即使每分钟进行一次同步，在繁忙的系统上，如果服务器宕机，也可能会遗漏大量的变更。


  MySQL NDB Cluster 7.3 及更高版本中的一个替代方案是使用 `mysqlbinlog` 实用程序将二进制日志变更流式传输到远程服务器。`mysqlbinlog`
  与其他 MySQL 客户端程序一起包含在内。这可以最大限度地减少在发生灾难性故障时未备份的二进制日志事件的数量。例如，要从 192.168.56.1 上的 SQL
  节点（端口 3306）流式传输起始文件为 `binlog.000001` 的二进制日志，可以使用以下命令：


  ```

  shell$ mysqlbinlog --read-from-remote-server --raw --stop-never \

  --result-file=/backup/binlog/ --host=192.168.56.101 \

  --user=backup –password binlog.000001

  ```


  指定的选项具有以下功能：


  *   `--read-from-remote-server`：告知 `mysqlbinlog` 从远程服务器复制二进制日志。

  *   `--raw`：默认情况下，`mysqlbinlog` 将二进制日志事件转换为文本。`--raw` 选项保持原始事件格式。

  *   `--stop-never`：到达最新二进制日志文件末尾时不停止流式传输。

  *   `--result-file`：用于存储流式二进制日志文件的前缀。这里指定了一个目录，因此二进制日志文件将以此目录为保存位置，文件名与被复制的源文件相同。

  *   `binlog.000001`：要复制的第一个文件。此文件必须与从中复制二进制日志的服务器上使用的文件名相同。可以使用 `SHOW BINARY LOGS`
  命令获取给定 SQL 节点上当前可用的二进制日志列表。


  其余参数是标准的连接选项。连接的用户必须具有 `REPLICATION SLAVE` 权限（与复制中一样）才能读取二进制日志。如果 `backup` 用户从 192.168.56.102
  连接来复制二进制日志，可以使用此命令创建该用户：


  ```

  mysql> CREATE USER backup@192.168.56.102 IDENTIFIED BY '''';

  Query OK, 0 rows affected (0.01 sec)

  mysql> GRANT REPLICATION SLAVE ON *.* TO backup@192.168.56.102;

  Query OK, 0 rows affected (0.01 sec)

  ```


  由于二进制日志包含集群的所有数据变更，因此使用 `mysqlbinlog` 时的用户密码必须妥善保管。最好使用 SSL 连接，以确保数据在传输过程中是加密的。


  备份二进制日志的一个重要部分是同时备份从数据节点用于衡量时间进度的纪元（epoch）到二进制日志文件和位置的映射。此映射维护在 `mysql.ndb_binlog_index`
  表中。该表是本地的（在 MySQL NDB Cluster 7.4 及更早版本中使用 `MyISAM` 存储引擎，在 7.5 版本中使用 `InnoDB` 存储引擎），位于启用二进制日志的
  SQL 节点上，并且必须与原生 NDB Cluster 备份分开备份。例如，使用：


  ```

  shell$ mysqldump --user=root --password \

  --tables mysql ndb_binlog_index > binlog_index.sql

  ```


  本章后面讨论时间点恢复时，将给出一个使用 `mysql.ndb_binlog_index` 表的示例。


  ### 恢复


  创建备份的补充操作是恢复它。这通常是一个被低估的任务。可能需要恢复备份的原因有多种，包括设置测试系统或复制从节点，到重要生产系统的灾难恢复。在任何情况下，了解正确的步骤对于尽可能快速、无痛地完成工作至关重要。第
  10 章中的“初始系统重启”案例研究给出了一个恢复备份的示例。


  **注意**


  备份的价值不超过恢复它的能力。确保你定期在不同场景下测试恢复备份，并且有完善记录的恢复过程。备份还必须存储在异地——如果数据中心起火，烧毁了备份和生产副本，那么备份就毫无用处。


  #### ndb_restore 程序


  用于恢复原生 NDB Cluster 备份的主要工具是 `ndb_restore` 实用程序，它包含在 MySQL NDB Cluster 安装中。如果使用 RPM
  包安装，在 7.5 版本中 `ndb_restore` 包含在客户端 RPM 中，在 7.4 及更早版本中包含在服务器 RPM 中。`ndb_restore`
  是一个实用程序，它以与 SQL 节点或 NDB API 应用程序相同的方式连接到集群。这意味着它可以从任何具有网络访问权限的主机执行；唯一的要求是从文件系统读取备份文件。


  **提示**


  因为 `ndb_restore` 是一个 NDB API 程序，它需要在 `config.ini` 中有一个 `mysqld` 或 `api` 节点槽位才能连接到集群。确保有足够的可用槽位，以便为每个数据节点并行执行一个
  `ndb_restore` 进程。


  `ndb_restore` 可以从 MySQL 配置文件中的 `[mysql_cluster]` 或 `[ndb_restore]` 组读取选项。无论执行何种操作，都有一些常用选项：


  *   `--ndb-connectstring=….` 指定如何连接到管理节点的常规连接字符串。

  *   `--backupid=….` 要恢复的备份 ID。

  *   `--nodeid=....` 创建备份时的节点 ID。每个节点创建了备份的一部分，这里指定的节点 ID 是 `ndb_restore` 正在恢复的那部分。

  *   `--backup_path=....` 备份在文件系统上的存储路径。路径必须包含特定于备份的目录。例如，如果数据节点配置为 `BackupDataDir
  = /backups/cluster/`，并且要恢复 ID 为 1 的备份，则要使用的备份路径是 `/backups/cluster/BACKUP/BACKUP-1`。


  使用 `ndb_restore` 恢复数据遵循三个高级步骤：


  1.  恢复模式。这可以是逻辑备份或 NDB Cluster 原生备份的恢复。

  2.  恢复数据。

  3.  重建索引。


  第三步重建索引是必要的，因为在恢复过程中如果有任何唯一键，数据恢复通常无法工作。问题在于恢复不会按照行最初插入和更新的相同顺序重放事务日志（但是，它仍然保证最终结果相同）。这意味着如果在恢复期间维护索引，可能会发生唯一键冲突。唯一键约束将在备份结束时重建索引时进行检查，因此在恢复结束时，约束将保证再次有效。外键同样适用此规则。



  #### 恢复模式


  恢复模式有两种方式：从原生 NDB 集群备份恢复或从逻辑备份恢复。选择哪种方式的主要决定因素在于，对于 7.4 及更早版本，表是否需要重新分区这一点是否重要。当从逻辑备份创建表时，分区的数量和分布取决于恢复时的数据节点数量及其配置。另一方面，在
  MySQL NDB Cluster 7.4 及更早版本中，从原生 NDB 集群备份创建表将使用与原始分区相同的分区来恢复表。如果数据节点或 LDM 线程的数量发生了变化，这是需要注意的一点；在这种情况下，从原生
  NDB 集群备份恢复模式可能会导致分区不平衡，某些数据节点和/或 LDM 线程没有任何分区。如果数据节点和/或 LDM 线程的数量减少，可能还需要从逻辑备份恢复表。否则，分区数量可能会超过集群支持的最大值。


  MySQL NDB Cluster 7.5 的一个变化是，`ndb_restore`现在会根据恢复目标集群对表进行分区。


  逻辑模式备份是一系列 SQL 语句，因此要恢复它，只需通过`mysql`命令行客户端导入备份即可，例如：


  ```

  mysql> warnings

  Show warnings enabled.

  mysql> SOURCE schema_backup.sql;

  ```


  `warnings`命令告诉`mysql`命令行客户端自动显示遇到的所有警告的详细信息。这在执行脚本中的语句时非常有用，否则将无法知道报告的警告内容是什么。可以使用`nowarning`命令再次禁用自动`SHOW
  WARNINGS`。


  提示

  如果从逻辑备份恢复模式，并且模式包含外键，而使用原生 NDB 集群备份恢复数据（如下一小节所述），请确保在恢复数据之前删除外键。恢复备份的最后一步是重建索引，这将添加外键。如果外键已经存在，这将导致错误。


  要从原生 NDB 集群备份恢复模式，需要使用`--restore_meta`选项。模式应仅从备份的一部分恢复（使用`--nodeid`选项）。例如，要从节点 ID
  为 1 创建的备份 ID 为 2 的备份部分恢复模式，`ndb_restore`命令如下所示：


  ```

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --restore_meta --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --disable-indexes

  ```


  `--disable-indexes`选项告诉`ndb_restore`创建除主键外没有任何索引的表。


  `ndb_restore --restore_meta`命令默认也会重新创建日志组和表空间文件。无论是否是完整恢复，都会创建这些文件。如果文件已存在，恢复将失败。要跳过恢复磁盘数据文件的过程，请使用`--no-restore-disk-objects`选项。


  #### 完整数据恢复


  完整数据恢复是最简单的恢复方式。在此上下文中，完整数据恢复意味着恢复备份中的所有内容。如果备份本身仅包含部分表和/或数据，“完整恢复”将仅恢复该部分表/数据。


  对于逻辑备份，恢复方式与恢复模式时描述的方式相同。逻辑备份实际上可能包含模式备份和数据备份。恢复逻辑备份的示例如下：


  ```

  mysql> warnings

  Show warnings enabled.

  mysql> SOURCE full_backup.sql;

  ```


  原生 NDB 集群备份恢复起来稍微复杂一些，因为备份分散在备份时所有在线的数据节点上。对于可以并行恢复的备份部分数量没有限制，只要集群能够跟上负载即可。通常，可以同时恢复所有部分。一种常见的方法是，从安装了创建该备份部分的节点的同一主机恢复每个部分；但这并不是必须的。


  要恢复由节点 ID 为 1 在备份 ID 为 2 中备份的数据，请使用如下命令：


  ```

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --restore_data --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --disable-indexes

  ```


  为备份的每个部分执行`ndb_restore`，将`--nodeid`选项设置为创建该备份部分的数据节点的节点 ID。如果使用禁用了索引的`ndb_restore`恢复了模式，则不需要`--disable-indexes`选项，但在这种情况下，它只是一个
  NOOP（无操作），因此为了简单起见，总是包含该选项。


  当从所有备份部分恢复数据后——即所有`ndb_restore --restore-data`命令都已成功完成——必须重建索引。此重建是使用`ndb_restore`的`--rebuild-indexes`选项触发的。重建索引的命令应仅对一个备份部分执行。继续示例，重建索引的命令如下所示：


  ```

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --rebuild-indexes

  ```


  #### 恢复到不同数量的数据节点


  对于将备份恢复到的集群（目标集群）与创建备份的集群（源集群）相比，所需的数据节点数量没有限制。然而，不同的数据节点数量通常也意味着集群具有不同的默认和最大分区数。因为在
  MySQL NDB Cluster 7.4 及更早版本中，`ndb_restore --restore_meta`恢复的模式分区数量与创建备份时相同，所以在这些版本中，当目标集群在数据节点数量和/或
  LDM 线程数量方面与源集群配置不匹配时，建议从逻辑模式备份恢复模式。


  原生 NDB 集群备份的数据恢复方式与两个集群相同时相同。如果备份部分被复制到数据节点的主机上，则需要进行分发，以便某些节点获得多个备份部分（如果目标集群的数据节点少于源集群），或者某些主机将没有任何备份部分（如果目标集群的数据节点多于源集群）。恢复数据时，数据会根据目标集群上表的分区自动分布，因此无需特别考虑。


  对于逻辑备份，需要考虑的事情更少。由于备份是通过其中一个 SQL 节点重放 SQL 脚本来恢复的，因此该过程与恢复到与源集群相同的目标集群完全一样。


  #### 部分数据恢复


  部分数据恢复是指仅恢复备份中的一个子集。原则上，部分备份既可以应用于表，也可以应用于数据。然而，出于本次讨论的目的，我们只考虑恢复表的一个子集这种情况。


  对于将所有备份都存放在单个 SQL 脚本中的逻辑备份，需要编辑 SQL 脚本以移除不应被恢复的部分备份。这正是使用 `mysqldump --tab=...`
  创建的备份或来自 MySQL Workbench 的转储项目文件夹的优势所在，因为每个表都创建在自己独立的文件中，使得执行部分恢复变得非常简单。


  **注意**


  `mysql` 命令行客户端的 `--one-database` 选项不能用于执行 SQL 脚本的部分恢复。该选项依赖于默认数据库。由于 SQL 脚本会为备份中的每个数据库更改默认模式，结果就是
  `--one-database` 将不起任何作用。


  另一方面，`ndb_restore` 内置了对部分恢复的支持，并且支持在恢复过程中重命名数据库名称。`ndb_restore` 有五个与部分恢复相关的命令行参数：


  *   `--exclude-databases=…`。一个逗号分隔的、要从恢复中排除的数据库列表。

  *   `--exclude-tables=…`。一个逗号分隔的、要从恢复中排除的表列表。每个表还必须包含数据库名称。

  *   `--include-databases=…`。一个逗号分隔的、要包含在备份中的数据库列表。

  *   `--include-tables=…`。一个逗号分隔的、要包含在备份中的表列表。与 `--exclude-tables` 类似，每个表必须包含数据库名称。

  *   `--rewrite-database=…`。接受两个用逗号分隔的数据库名称，第一个值是备份中的数据库名称，第二个是恢复到的数据库名称。任何受重命名影响的表中的外键都会作为重写过程的一部分被移除。例如，要将
  `world` 数据库重命名为 `world_temp`，请使用 `--rewrite-database=world,world_temp`。可以多次指定以重命名多个数据库。


  举个例子，假设一个备份（除了其他数据库外）包含了 `world` 示例数据库，并且需要将 `City` 表的数据恢复到一个名为 `world_temp` 的数据库中。例如，恢复一些意外删除的数据。在这种情况下，可以使用以下
  `ndb_restore` 命令序列（对于参与备份的每个数据节点，重复 `--restore_data` 步骤）：


  ```

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --restore_meta --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --include-tables=world.City \

  --rewrite-database=world,world_temp \

  --disable-indexes

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --restore_data --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --include-tables=world.City \

  --rewrite-database=world,world_temp \

  --disable-indexes

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --include-tables=world.City \

  --rewrite-database=world,world_temp \

  --rebuild-indexes

  ```


  可以组合包含和排除选项，或多次使用这些选项。当使用多个过滤器时，整体过滤器将是所有提供过滤器的组合。如果同时使用包含和排除选项，则整体过滤器的评估顺序取决于它们提供的顺序。考虑以下过滤器：


  ```

  shell$ ndb_restore ... --include-databases=world --exclude-tables=world.City

  ```


  在这种情况下，`--include-database` 将包含 `world` 模式中的所有表，而 `--exclude-tables` 将移除 `world.City`
  表，因此最终结果是恢复 `world` 模式中除 `City` 表之外的所有表。


  #### 使用 MySQL Workbench 进行恢复


  使用 `mysqldump`、`mysqlpump` 及类似备份程序创建的逻辑备份，也可以使用 MySQL Workbench 进行恢复。这有两种选项。第一种对应于前面描述的数据导出功能。它支持导入转储项目文件夹或自包含文件。虽然转储项目文件夹在由
  MySQL Workbench 的数据导出功能创建时效果最佳，但自包含文件可以来自任何创建 SQL 文件的备份软件。从可用性角度来看，主要区别在于转储项目文件夹提供了执行完全恢复和部分恢复的选项，而自包含文件仅支持完全恢复。图
  8-4 显示了 MySQL Workbench 中的数据导入屏幕，其中包含导入转储项目文件夹时可用的选项。


  ![A435171_1_En_8_Fig4_HTML.jpg](img/A435171_1_En_8_Fig4_HTML.jpg)


  图 8-4.


  MySQL Workbench 的数据导入功能


  在 MySQL Workbench 中恢复自包含 SQL 脚本的另一种方法是在查询选项卡中打开该脚本。优点是可以在执行前编辑脚本内容。缺点是很难以这种方式处理大型备份。通过选择查询选项卡并选择菜单“文件”下的“打开
  SQL 脚本”来加载脚本。如图 8-5 所示。也可以通过选择菜单“文件”下的“运行 SQL 脚本”来执行脚本；这与从数据导入屏幕执行自包含 SQL 文件类似。


  ![A435171_1_En_8_Fig5_HTML.jpg](img/A435171_1_En_8_Fig5_HTML.jpg)


  图 8-5.


  MySQL Workbench 菜单中的“打开 SQL 脚本”



  #### 时间点恢复 (PITR)


  一种更高级的恢复过程是时间点恢复（PITR）。顾名思义，它包括将数据恢复到某个特定的时间点。时间点恢复有两种常见情况：


  *   恢复到特定事件发生之前。例如，如果用户误删除了一个表，则有必要恢复到此事件发生之前。

  *   恢复到尽可能晚的时间点。例如，这可能在安装 MySQL 的主机崩溃后发生。


  一个特例是设置复制从库，因为这在很大程度上遵循与时间点恢复相同的步骤。


  时间点恢复过程包括两个高层次的步骤：


  1.  执行常规的备份恢复，如本章前面所述。

  2.  从创建备份的时间点开始，重放到恢复应结束的时间点的二进制日志。在应用二进制日志时，可能在某些情况下需要跳过选定的事件。对于设置复制从库，重放二进制日志原则上永远不会结束。


  从高层次来看，对逻辑备份和原生 NDB Cluster 备份执行时间点恢复没有区别，因为刚刚提到的两个步骤是相同的。然而，存在一个主要区别：确定创建备份时的二进制日志文件和位置。当使用
  `mysqldump` 创建备份时，如果指定了 `--master-data` 选项，备份将直接包含二进制日志文件和位置。但是，对于原生的 NDB Cluster
  备份，无法直接在备份中包含此信息，因为二进制日志记录不会在创建备份的数据节点上进行。此外，可能有多个启用了二进制日志的 SQL 节点，并且备份不会对应于每个 SQL
  节点二进制日志中的相同点。


  确定正确的二进制日志文件和位置有两个部分：


  *   `mysql.ndb_apply_status` 表：此表通常仅在复制从库上使用。但是，如果在使用 `ndb_restore` 恢复数据时添加了 `--restore_epoch`
  选项，它将在恢复过程中被填充。

  *   `mysql.ndb_binlog_index` 表：这是作为二进制日志备份一部分讨论过的表。它包含从 NDB Cluster epoch 到该 SQL
  节点上二进制日志文件和位置的映射。


  通过结合这两个表，可以确定从哪个点开始重放二进制日志。在设置复制从库时也需要这样做。


  将所有内容放在一起，时间点恢复的步骤是首先确保数据库已干净初始化，然后恢复原生 NDB Cluster 备份：


  ```shell

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --restore_meta --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --disable-indexes

  # 对于每个数据节点：

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --restore_data --restore_epoch --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --disable-indexes

  shell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102 \

  --nodeid=1 --backupid=2 \

  --backup_path=/backups/cluster/BACKUP/BACKUP-2 \

  --rebuild-indexes

  ```


  下一步是恢复 `mysql.ndb_binlog_index` 表的备份：


  ```sql

  mysql> warnings

  Show warnings enabled.

  mysql> use mysql;

  Database changed

  mysql> SOURCE binlog_index.sql

  Query OK, 0 rows affected (0.00 sec)

  ...

  ```


  在恢复数据时使用的 `--restore_epoch` 选项会填充 `mysql.ndb_apply_status` 表，类似于在应用二进制日志时复制从库上的操作。内容将类似于以下输出：


  ```sql

  mysql> SELECT * FROM mysql.ndb_apply_status;

  +-----------+--------------+----------+-----------+---------+

  | server_id | epoch        | log_name | start_pos | end_pos |

  +-----------+--------------+----------+-----------+---------+

  |         0 | 455266533375 |          |         0 |       0 |

  +-----------+--------------+----------+-----------+---------+

  1 row in set (0.01 sec)

  ```


  数据显示了每个 `server_id` 的最新应用 epoch。由于 epoch 源自 `ndb_restore`，所以服务器 ID 为 0。原则上，可能有多个行，此时关注的是
  `epoch` 列的最大值；实际上在恢复后只有一行。应将此 epoch 与 `mysql.ndb_binlog_index` 表中的 `epochs` 列进行比较，该列记录了对应于二进制日志文件和位置的
  epoch。对于时间点恢复或确定从何处开始复制，感兴趣的位置是大于在 `mysql.ndb_apply_status` 中找到的 epoch 的第一个 epoch
  对应的位置。二进制日志文件和位置现在可以按如下方式确定：


  ```sql

  mysql> SELECT i.File, i.Position

  FROM (SELECT MAX(epoch) AS MaxEpoch

  FROM mysql.ndb_apply_status) AS e

  INNER JOIN mysql.ndb_binlog_index i ON i.epoch > e.MaxEpoch

  ORDER BY i.epoch

  LIMIT 1;

  +------------------------------+----------+

  | File                         | Position |

  +------------------------------+----------+

  | /var/lib/mysql/binlog.000003 |   216567 |

  +------------------------------+----------+

  1 row in set (0.00 sec)

  ```


  现在可以使用 `mysqlbinlog` 工具应用二进制日志。有四个选项控制提取二进制日志的哪一部分：


  *   `--start-position=....` 上一步中找到的起始位置。如果指定了多个二进制日志文件，该位置仅适用于第一个文件。

  *   `--stop-position=....` `--start-position` 的对应项。它指定停止重放二进制日志的位置。如果指定了多个二进制日志文件，该位置仅适用于最后一个文件。

  *   `--start-datetime=....` 使用格式 `2016-12-29 16:04:44` 指定日期和时间。此选项与 `--stop-datetime`
  结合使用对于确定时间点恢复的停止位置最有用。

  *   `--stop-datetime=....` 类似于 `--start-datetime`，但指定何时停止重放二进制日志。不建议将此选项用作时间点恢复的一部分。原因是二进制日志事件记录的时间戳是事务开始的时间，但事件是按事务提交的顺序记录的。因此，时间戳通常不会按顺序排列。如果使用了
  `--stop-datetime`，那么当遇到时间戳比 `--stop-datetime` 指定值更新的第一个事件时，重放二进制日志就会停止。然而，该选项对于手动检查二进制日志可能很有用，例如，确定与
  `--stop-position` 一起使用的正确二进制日志位置。


  作为一个例子，考虑一个时间点恢复，需要重放二进制日志直到 2016 年 12 月 29 日 16:00 左右删除表的事件。首先检查二进制日志以确定删除表事件发生的位置。这将如下所示：


  ```shell

  shell$ mysqlbinlog --start-datetime=''2016-12-29 15:55:00'' \

  --stop-datetime=''2016-12-29 16:05:00'' \

  binlog.000005

  ...

  # at 6432260

  #161229 16:03:59 server id 57163508  end_log_pos 213382 CRC32 0x3da16db3        Query   thread_id=6     exec_time=1     error_code=0

  SET TIMESTAMP=1487066639/*!*/;

  /*!\C utf8 *//*!*/;

  SET @@session.character_set_client=33,@@session.collation_connection=33,@@session.collation_server=8/*!*/;

  DROP TABLE `world`.`City` /* generated by server */

  /*!*/;

  ```


  提示




  若需查找涉及行操作的事件，请使用参数 `--base64-output=decode-rows --verbose` 将行事件的十六进制编码转换为人类可读的形式。请注意，二进制日志不包含任何字符集信息，因此在显示时，诸如
  `varchar` 之类的字符串数据类型可能会受到影响。


  `DROP TABLE` 事件起始位置为 6432260，因此在重放二进制日志时，应使用此位置作为停止点：


  ```shell

  shell$ mysqlbinlog --start-position=216567 --stop-position=6432260 \

  binlog.000003 binlog.000004 binlog.000005 | \

  mysql --user=root --password

  ```


  ### 总结


  本章讨论了备份与恢复。可以使用原生 NDB Cluster 在线备份或逻辑备份进行备份。通常两者结合使用。原生 NDB Cluster 备份由数据节点直接创建，使用与本地检查点相同的底层代码。另一方面，逻辑备份是使用常规
  SQL 语句导出模式对象和数据创建的。备份用户、权限和二进制日志也很重要。


  恢复备份可用于多种用途，从搭建测试服务器到灾难恢复。定期测试恢复过程非常重要，以确保熟悉所有步骤并验证备份可恢复性。恢复可以与重放二进制日志结合执行时间点恢复，这对于例如在意外删除表后进行恢复非常有用。与时间点恢复相关的是设置复制从库的过程。


  下一章的主题是 `NDB Cluster` 表的维护。


  '
- "# 9. 表维护\n\n第二部分涵盖了安装和配置集群所需的任务，而本部分一直专注于日常维护集群所使用的工具和程序。数据库管理员的一项重要任务是表维护。这包括相对不频繁的任务，例如向现有表添加新列、维护良好的索引集，以及更频繁的任务，如对表进行碎片整理和更新索引统计信息。本章将讨论所有这些任务。\n\
  \n### 模式变更\n\n无论模式规划得多么仔细，最终都需要进行一些模式变更。这可能是由于应用程序的新需求，或者是因为模式设计没有达到最初预期的效果。生产环境中的模式变更通常是数据库系统的一个痛点；然而，对于\
  \ `NDB Cluster` 表，在多种情况下可以在表在线时进行变更，应用程序可以继续读写正在被更改的表。本节的其余部分将解释如何进行模式变更。\n\n####\
  \ 分发模式变更与全局模式锁\n\n当对 `NDB Cluster` 表进行模式变更时，该变更必须分发到所有 SQL 节点，并且需要一种机制来避免并发的冲突模式变更。全局模式锁的实现细节超出了本书的范围；但是，了解一些高层信息是有益的。这是本小节的主题。\n\
  \nMySQL NDB Cluster 使用隐藏的 `mysql.ndb_schema` 表来跟踪模式变更。它是一个 `NDB Cluster` 表，因此所有\
  \ API 节点对该表具有相同的视图。它是隐藏的，因此不会出现在 `SHOW TABLES` 语句或查询 Information Schema 表时——尽管使用\
  \ `ndb_show_tables` 实用程序或 `ndbinfo.dict_obj_info` 视图可以在数据节点数据字典中看到它：\n\n```shell\n\
  shell$ ndb_show_tables | grep ' ndb_schema$'\n7     UserTable            Online\
  \   Yes     mysql        def      ndb_schema\n```\n\n```mysql\nmysql> SELECT type_name,\
  \ id AS TableID, fq_name\nFROM ndbinfo.dict_obj_info\nINNER JOIN ndbinfo.dict_obj_types\
  \ ON type_id = type\nWHERE fq_name = 'mysql/def/ndb_schema';\n+------------+---------+----------------------+\n\
  | type_name  | TableID | fq_name              |\n+------------+---------+----------------------+\n\
  | User table |       7 | mysql/def/ndb_schema |\n+------------+---------+----------------------+\n\
  1 row in set (0.02 sec)\n```\n\n也可以直接查询该表，这在调试时很有用。例如，它将显示最后一次修改该表的查询以及该表的模式版本。清单\
  \ [9-1] 显示了 `db1.t1` 表的示例。\n\n```mysql\nmysql> SELECT * FROM mysql.ndb_schema WHERE\
  \ db = 'db1' AND name = 't1'\\G\n*************************** 1. row ***************************\n\
  db: db1\nname: t1\nslock:\nquery: ALTER TABLE t1 ADD INDEX (val)\nnode_id: 51\n\
  epoch: 0\nid: 10\nversion: 100663299\ntype: 7\n1 row in set (0.08 sec)\n```\n\n\
  **清单 9-1. `mysql.ndb_schema` 中关于 `db1.t1` 表的信息**\n\n![A435171_1_En_9_Fig1_HTML.jpg](img/A435171_1_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1. 通过 `mysql.ndb_schema` 表进行的模式分发**\n\n当两个 SQL 节点同时尝试更改同一个表的模式时，第二个开始的语句将被阻塞，直到第一个完成。例如，这可以从\
  \ `SHOW PROCESSLIST` 的输出中看到，如清单 [9-2] 所示，其中查询正在等待授予全局模式锁。全局模式锁应像任何其他锁一样对待——解决方案是等待锁被释放或终止持有锁的查询。如果锁没有被释放（这将是一个错误），通常重启持有锁的\
  \ SQL 节点会有所帮助。\n\n```mysql\nmysql> SHOW PROCESSLIST\\G\n...\n***************************\
  \ 2. row ***************************\nId: 4\nUser: root\nHost: localhost:49501\n\
  db: db1\nCommand: Query\nTime: 1\nState: Waiting for ndbcluster global schema lock\n\
  Info: ALTER TABLE t1 ADD INDEX (val)\n...\n```\n\n**清单 9-2. `ALTER TABLE` 查询等待全局模式锁**\n\
  \n了解了 MySQL NDB Cluster 如何处理模式变更的分发以及两个冲突的模式变更如何避免同时执行的一些背景知识后，现在可以继续讨论模式变更本身了。\n\
  \n\n### 在线与离线模式变更\n\n在 MySQL NDB 集群中，模式变更可分为两类：可在线执行的变更和需要使表离线的变更。在线模式变更的优势在于，它们对应用程序正在进行的活动造成的干扰最小。对于\
  \ `NDB Cluster` 表的多种模式变更类型，这都是可能的。表 9-1 总结了在线和离线模式变更的特性。接下来的两节将更详细地介绍，本章后面还有几个在线和离线模式变更的示例。\n\
  \n表 9-1. 在线与离线模式变更\n\n|   | 在线 | 离线 |\n| --- | --- | --- |\n| 实现方式 | 模式变更被下推到数据节点并原地执行，即不创建新表和复制数据。\
  \ | SQL 节点通过创建具有新架构的新表并复制数据来处理模式变更。最后，删除旧表并将新表重命名。 |\n| 在执行变更的 SQL 节点上 | 需要对表获取排他锁。\
  \ | 获取排他表级锁。即使指定了 `LOCK=SHARED` 也是如此。（请求共享锁还是排他锁会影响并发查询是因元数据锁还是表锁而阻塞。）此外，在 `LOCK=SHARED`\
  \ 模式下执行并发查询时，在 `ALTER TABLE` 结束时对新表进行重命名将导致死锁。 |\n| 在其他 API 节点上 | 允许并安全地进行读写操作。\
  \ | DML 语句不会发生锁操作，但这些操作不安全，在模式变更期间进行的任何数据更改都可能丢失。因此，建议将集群置于单用户模式，如第 7 章所述。 |\n\n\
  如两种模式变更方法的比较所示，在线和离线模式变更有根本上的不同，而且离线模式变更比在线模式变更的侵入性要大得多。\n\n### 离线模式变更\n\n值得更详细地讨论为离线模式变更启用单用户模式的建议。在将数据复制到新表时，没有事务日志来跟踪对表的更改。因此，在过程结束时，当旧表被新表替换时，对已复制部分的表所做的更改（包括插入新行）将会丢失。如果能保证只发生读取操作，那么在模式变更是可以保持其他节点在线，但在实践中，最好使用单用户模式功能，并在必要时将查询其他表的请求重定向到执行模式变更的\
  \ SQL 节点。\n\n### 注意\n\n不要在正在进行离线模式变更的表中插入、更新或删除数据。这些更改可能会丢失。建议使用第 7 章讨论的单用户模式功能，以避免无意中丢失数据。\n\
  \n执行模式变更需要资源，无论使用哪种算法。然而，由于复制模式变更在应用更改时需要一个额外的表，因此在此期间还需要更多的属性、内存和/或磁盘使用量。根据经验法则，在模式变更进行期间，表所需的属性数量是原始表的三倍。\n\
  \n第 4 章讨论了如何计算表使用的属性数量。为了留出一些余地，应配置 `MaxNoOfAttributes` 以允许至少六倍于原始表的属性数量。如果 `MaxNoOfAttributes`\
  \ 的值太小，将返回如清单 9-3 所示的错误。在这种情况下，必须增加 `MaxNoOfAttributes` 的值，这需要对数据节点进行滚动重启（参见第 10\
  \ 章）。\n\n```\nmysql> ALTER TABLE t1 ALGORITHM=COPY, ADD INDEX (val);\nERROR 1025\
  \ (HY000): Error on rename of './db1/t1' to './db1/#sql2-361e-5' (errno: 708 - Unknown\
  \ error 708)\nmysql> SHOW WARNINGS\\G\n*************************** 1. row ***************************\n\
  Level: Warning\nCode: 1296\nMessage: Got error 708 'No more attribute metadata records\
  \ (increase MaxNoOfAttributes)' from NDB\n*************************** 2. row ***************************\n\
  Level: Error\nCode: 1025\nMessage: Error on rename of './db1/t1' to './db1/#sql2-361e-5'\
  \ (errno: 708 - Unknown error 708)\n2 rows in set (0.01 sec)\n```\n\n清单 9-3. 因 `MaxNoOfAttributes`\
  \ 值过小而导致的错误\n\n### 在线模式变更\n\n在线模式变更显然是首选：它们允许应用程序继续完全在线运行，并且模式变更可以原地发生。这意味着工作量要少得多，因此模式变更完成得更快。但是，有一个注意事项：并非所有的模式变更都可以在线进行。在线模式变更的一般限制是：\n\
  \n*   表必须有一个显式的主键。当使用隐藏主键时，必须始终使用复制式的离线模式变更。\n*   一次只能执行以下更改之一：添加索引、删除索引或添加列。如果需要进行多项更改，请按顺序执行。\n\
  *   模式变更会对表获取排他锁，这会影响连接到同一 SQL 节点的会话。因此，使用该表的并发查询将被阻塞。出于这个原因，可以考虑额外保留一个用于管理任务（如表维护）的\
  \ SQL 节点。\n\n对于每个支持原地更改的操作，还有更具体的限制。支持的在线操作及其限制列于表 9-2 中。\n\n表 9-2. 支持原地算法的模式变更的限制\n\
  \n| 模式变更 | 限制与说明 |\n| --- | --- |\n| `ADD INDEX` | 不能与 `DROP INDEX` 或 `ADD COLUMN`\
  \ 同时使用。一次只能创建一个索引。适用于 `ALTER TABLE ... ADD INDEX` 和 `ADD INDEX` 语句。 |\n| `DROP INDEX`\
  \ | 不能与 `ADD INDEX` 或 `ADD COLUMN` 同时使用。一次只能删除一个索引。适用于 `ALTER TABLE ... DROP INDEX`\
  \ 和 `DROP INDEX` 语句。 |\n| `ADD COLUMN` | 该列必须使用动态列格式。如果未明确指定列格式，MySQL NDB 集群将自动选择动态格式并返回警告。不支持\
  \ TEXT 和 BLOB 数据类型。该列必须是 `DEFAULT NULL` 并允许空值。该列必须位于表定义中所有现有列之后¹。 |\n| `REORGANIZE\
  \ PARTITIONS` | 用于向集群添加更多数据节点或增加 LDM 线程数之后。 |\n| `OPTIMIZE TABLE` | 这不是 `ALTER TABLE`\
  \ 操作。其使用将在碎片整理部分讨论。 |\n| `RENAME` (表) | 适用于 `ALTER TABLE ... RENAME ...` 和 `RENAME\
  \ TABLE` 语句。只能在线重命名表名。重命名索引或列需要使用离线复制式 `ALTER TABLE`。 |\n| 设置 `READ_BACKUP` 属性 |\
  \ 此功能在 MySQL NDB 集群 7.5 中是新的。从备份副本读取的功能在第 2 章中已讨论。 |\n\n默认情况下，如果支持将选择原地算法；否则，将进行复制式模式变更。下一节讨论如何使用\
  \ `ALTER TABLE` 语句指定要使用的算法。\n\n#### ALTER TABLE 算法\n\n执行模式变更的语法在一定程度上取决于 MySQL NDB\
  \ Cluster 的版本。在 MySQL NDB Cluster 7.2 及更早版本中，使用 `ALTER TABLE` 的 `ONLINE` 和 `OFFLINE`\
  \ 关键字来指定应执行在线还是离线模式变更。在 MySQL NDB Cluster 7.3 及更高版本中，`InnoDB` 存储引擎也支持在线模式变更，语法已更改为使用\
  \ `ALGORITHM` 属性，而 `ONLINE` 和 `OFFLINE` 关键字已被弃用（并在 MySQL NDB Cluster 7.5 中移除）。`ALGORITHM`\
  \ 选项接受以下三个值之一：\n\n*   `INPLACE`：这将在表的现有副本内执行模式变更。这通常是首选，因为它比创建表副本更快。对于 `NDBCluster`\
  \ 表，这等同于在线模式变更。\n*   `COPY`：这会使用新的表定义创建表的副本。对于 `NDBCluster` 表，这等同于离线模式变更。\n*   `DEFAULT`：如果可能则选择\
  \ `INPLACE`，否则选择 `COPY`。指定 `DEFAULT` 与不指定 `ALGORITHM` 选项相同。\n\n注意\n\n术语 \"online\"\
  \ 和 \"offline\" 分别与 \"in-place\" 和 \"copy\" 可互换。因此，新旧语法在概念上没有变化。\n\n在 7.3 及更高版本中，还可以使用\
  \ `ALTER TABLE` 的 `LOCK` 选项来设置锁类型。锁类型仅适用于执行 `ALTER TABLE` 的本地 SQL 节点。它在 MySQL NDB\
  \ Cluster 中的用途有限，因为在线模式变更始终需要排他锁，而对于离线模式变更，原则上可以选择使用共享锁或排他锁。（如前所述，不建议尝试使用共享锁。）\n\
  \n小心\n\n如果尝试在同一 SQL 节点上并发查询使用该表，使用 `ALGORITHM=COPY, LOCK=SHARED` 进行离线模式变更将导致死锁。\n\
  \n以下 `ALTER TABLE` 语句是在线/in-place 模式变更的示例：\n\n*   MySQL NDB Cluster 7.3 及更高版本。\n\
  \n    ```\n    mysql> ALTER TABLE t1 [ALGORITHM=INPLACE, ]\n    [LOCK=EXCLUSIVE,\
  \ ]\n    ;\n    ```\n\n*   MySQL NDB Cluster 7.2 及更早版本。\n\n    ```\n    mysql> ALTER\
  \ [ONLINE] TABLE ;\n    ```\n\n在这里，方括号 (`[...]`) 内的语句部分是可选的，两个单词之间的竖线 (`|`) 表示必须选择一个单词，实际的模式变更应放在\
  \ `<schema change specification>` 所在的位置。\n\n用于离线/复制模式变更的 `ALTER TABLE` 语句示例如下（使用的语法与在线模式变更相同）：\n\
  \n*   MySQL NDB Cluster 7.3 及更高版本。\n\n    ```\n    mysql> ALTER TABLE t1 [ALGORITHM=COPY,\
  \ ]\n    [LOCK=SHARED|EXCLUSIVE, ]\n    ;\n    ```\n\n*   MySQL NDB Cluster 7.2\
  \ 及更早版本。\n\n    ```\n    mysql> ALTER [OFFLINE] TABLE ;\n    ```\n\n注意 `ALGORITHM`\
  \ 和 `LOCK` 选项后的逗号。本章后面有关于各种模式变更的示例。\n\n为了保持向后兼容性，在 MySQL NDB Cluster 7.3 和 7.4 中也可以使用\
  \ `ONLINE` 和 `OFFLINE` 关键字；但是，建议开始使用新语法，并且在 7.5 及更高版本中，`ALGORITHM` 选项是唯一支持的用于指定模式变更应进行原地修改还是作为复制\
  \ `ALTER TABLE` 执行的语法。在 7.3 和 7.4 版本中使用 `ONLINE` 和 `OFFLINE` 关键字也会导致弃用警告。\n\n以上就是在线和离线模式变更背后的理论。在讨论分区重组之前，我们先探讨一系列\
  \ `ALTER TABLE` 示例。\n\n#### ALTER TABLE 示例\n\n由于语法一开始可能比较困难，所以值得看一些示例。本节中的示例使用以下表格作为模式变更前的表定义：\n\
  \n```\nmysql> SHOW CREATE TABLE t1\\G\n*************************** 1. row ***************************\n\
  Table: t1\nCreate Table: CREATE TABLE `t1` (\n`id` int(10) unsigned NOT NULL,\n\
  `val` varchar(10) DEFAULT NULL,\nPRIMARY KEY (`id`)\n) ENGINE=ndbcluster DEFAULT\
  \ CHARSET=latin1\n1 row in set (0.02 sec)\n```\n\n请不要按示例中的时间值生搬硬套，因为它们来自一台相对较旧的笔记本电脑上的虚拟机。执行模式变更所需的时间也取决于数据量。然而，原地修改和复制模式变更之间的相对时间是相关的。\n\
  \n##### 默认行为\n\n默认情况下，如果支持则使用 `INPLACE` 算法，否则使用 `COPY` 算法。例如，在不指定任何修饰符的情况下，将接受 null\
  \ 值的列添加为最后一列将是在线进行的：\n\n```\nmysql> ALTER TABLE t1 ADD COLUMN rank int unsigned;\n\
  Query OK, 0 rows affected, 1 warning (2.62 sec)\nRecords: 0  Duplicates: 0  Warnings:\
  \ 1\nmysql> SHOW WARNINGS\\G\n*************************** 1. row ***************************\n\
  Level: Warning\nCode: 1478\nMessage: Converted FIXED field 'rank' to DYNAMIC to\
  \ enable online ADD COLUMN\n1 row in set (0.00 sec)\n```\n\n注意这个警告。之所以显示它，是因为默认情况下整数列将使用固定列格式，但对于在线模式变更的发生，必须使用动态列格式。可以更明确地指定行为同时避免警告。这就是下一个示例。\n\
  \n##### 使用显式列格式添加列\n\n如前一个示例所示，MySQL NDB Cluster 会自动为原地模式变更选择动态列格式，即使对于默认使用固定列格式的数据类型也是如此，但这会引发警告。最好避免此警告，因为它可能导致更重要的问题被忽视。为避免此警告，解决方案是显式指定列格式：\n\
  \n```\nmysql> ALTER TABLE t1\nADD COLUMN rank int unsigned COLUMN_FORMAT DYNAMIC;\n\
  Query OK, 0 rows affected (2.26 sec)\nRecords: 0  Duplicates: 0  Warnings: 0\n```\n\
  \n提示\n\n最佳实践是编写不引发任何警告的查询。这样更容易识别可能导致问题的查询，例如，因为它们使用了已弃用的功能。可以使用 `SHOW WARNINGS`\
  \ 语句（如前一个示例）查看警告，或者通过在 `mysql` 命令行客户端中使用 `warnings` 命令自动启用警告。\n\n如果不希望 MySQL NDB\
  \ Cluster 选择算法，或者如果模式变更只有在可以使用原地算法完成时才重要，该怎么办？接下来的两个示例将介绍这一点。\n\n##### 指定算法和锁类型\n\
  \n如果不执行 `ALTER TABLE` 语句，就无法知道将选择哪种算法。如果选择了复制算法，而预期是原地变更，这可能会导致意外情况。为避免此问题，请使用 `ALGORITHM`\
  \ 选项显式设置算法：\n\n```\nmysql> ALTER TABLE t1 ALGORITHM=INPLACE, ADD INDEX (val);\n\
  Query OK, 0 rows affected (8.29 sec)\nRecords: 0  Duplicates: 0  Warnings: 0\n```\n\
  \n可以通过显式设置本地 SQL 模式的锁类型来进行相同的变更。由于这是在线模式变更，锁类型必须设置为排他锁：\n\n```\nmysql> ALTER TABLE\
  \ t1 ALGORITHM=INPLACE, LOCK=EXCLUSIVE, ADD INDEX (val);\nQuery OK, 0 rows affected\
  \ (8.25 sec)\nRecords: 0  Duplicates: 0  Warnings: 0\n```\n\n相同的示例，但这里使用离线复制模式变更添加索引，使用\
  \ `ALGORITHM=COPY`：\n\n```\nmysql> ALTER TABLE t1 ALGORITHM=COPY, LOCK=EXCLUSIVE,\
  \ ADD INDEX (val);\nQuery OK, 131072 rows affected (2 min 23.23 sec)\nRecords: 131072\
  \  Duplicates: 0  Warnings: 0\n```\n\n注意通过表复制添加索引所需的时间要长得多。\n\n如果选择了 `ALGORITHM=INPLACE`，但变更不支持它，会发生什么？这是接下来要讨论的内容。\n\
  \n\n##### 尝试不支持的原地更改\n\n如果请求使用原地算法，但所涉及的模式变更不支持该算法，MySQL 将会返回错误。例如，删除列只能使用复制算法完成：\n\
  \n```\nmysql> ALTER TABLE t1 ALGORITHM=INPLACE, DROP COLUMN rank;\nERROR 1846 (0A000):\
  \ ALGORITHM=INPLACE is not supported. Reason: Detected unsupported change. Try ALGORITHM=COPY.\n\
  ```\n\n**提示**\n\n明确指定 `ALGORITHM=INPLACE` 的一个优点是，它可以确保不会误执行复制式的 `ALTER TABLE`。如果\
  \ `INPLACE` 算法不受支持，该语句将失败并报错。\n\n最后一种需要考虑的情况是 MySQL NDB Cluster 7.2 及更早版本中的模式变更，其中不支持\
  \ `ALGORITHM` 和 `LOCK` 关键字。\n\n##### 7.2 及更早版本中的模式变更\n\n在 MySQL NDB Cluster 7.2\
  \ 及更早版本中，使用 `OFFLINE` 和 `ONLINE` 关键字代替 `ALGORITHM` 关键字来指定模式变更的执行方式。无法设置锁定类型；执行 `ALTER\
  \ TABLE` 的 SQL 节点上总是会采取排他锁。\n\n例如，要在线（原地）添加索引，请使用：\n\n```\nmysql> ALTER ONLINE TABLE\
  \ t1 ADD INDEX (val);\n```\n\n离线（复制）模式变更的一个例子是使用固定列格式添加列：\n\n```\nmysql> ALTER OFFLINE\
  \ TABLE t1\nADD COLUMN rank int unsigned COLUMN_FORMAT FIXED DEFAULT NULL;\n```\n\
  \n关于进行模式变更的 `ALTER TABLE` 示例到此结束。然而，`ALTER TABLE` 也用于重组分区；例如，在更改数据节点数量和/或 LDM 线程之后。这是下一节的主题。\n\
  \n### 重组分区\n\n进行模式变更的一个特殊情况是重组分区。默认情况下，`NDBCluster` 表的创建基于数据节点数量和每个数据节点的 LDM 线程数量来确定分区数量。当集群配置发生变化时，有必要重新分布数据以利用新的集群配置。表\
  \ 9-3 展示了各种集群配置更改，并讨论了针对每种情况如何重组分区。概述显示，扩展可以通过在线模式变更完成，而缩减则需要离线模式变更。\n\n表 9-3.\n\
  \n集群配置更改后重组分区的要求\n\n| 配置更改 | 重组分区方法 |\n| --- | --- |\n| 增加数据节点数量 | 可以使用 `ALTER TABLE\
  \ t1 REORGANIZE PARTITION`。这是一个在线操作。示例请参见第 10 章。 |\n| 减少数据节点数量 | 需要重新创建表。可以使用空 `ALTER\
  \ TABLE`：`ALTER TABLE t1 ENGINE=NDBCluster`。这是一个离线操作。 |\n| 增加 LDM 线程数量 | 可以使用 `ALTER\
  \ TABLE ... REORGANIZE PARTITION`。这是一个在线操作，但必须在两次滚动重启（第一次滚动重启更改 LDM 线程数量）或系统重启后才能首次执行。\
  \ |\n| 减少 LDM 线程数量 | 需要重新创建表。可以使用空 `ALTER TABLE`：`ALTER TABLE t1 ENGINE=NDBCluster`。这是一个离线操作。\
  \ |\n\n**注意**\n\n`REORGANIZE PARTITION` 仅支持使用自动分区的表。为了对使用自定义分区的表进行重新分区，需要指定新的分区数量来重建表，例如：`mysql>\
  \ ALTER TABLE t1 ALGORITHM=COPY                      PARTITION BY KEY (id) PARTITIONS\
  \ 8;`\n\n即使在线重组分区是原地执行的，它也是一个开销巨大的操作。在跟踪数据位置以服务并发查询的同时，必须移动数据。此外，它会使原始分区产生碎片。通常，离线复制式的空\
  \ `ALTER TABLE` 会更快，同时还能对表进行碎片整理。空 `ALTER TABLE` 会重建表，并且（除了新表副本是按当前集群配置的默认分区数量创建的之外）不对表做任何更改。空\
  \ `ALTER TABLE` 总是一个复制操作，必须离线完成。本节剩余部分包括在线重组分区与重建表的示例，以及关于表碎片整理的讨论。\n\n使用 `REORGANIZE\
  \ PARTITION` 在线重组分区的示例如下：\n\n```\nmysql> ALTER TABLE t1 ALGORITHM=INPLACE, REORGANIZE\
  \ PARTITION;\nQuery OK, 0 rows affected (22 min 57.51 sec)\nRecords: 0  Duplicates:\
  \ 0  Warnings: 0\n```\n\n要改用空 `ALTER TABLE`——无论是在减少数据节点或 LDM 线程数量之后，还是为了完全整理表的碎片（另见下一节）——请使用：\n\
  \n```\nmysql> ALTER TABLE t1 ALGORITHM=COPY, LOCK=EXCLUSIVE, ENGINE=NDBCluster;\n\
  Query OK, 131072 rows affected (3 min 41.43 sec)\nRecords: 131072  Duplicates: 0\
  \  Warnings: 0\n```\n\n请注意此表重建与在线 `REORGANIZE PARTITION` 语句相比所花费的时间。这是复制式模式变更比在线方式更快的一种情况。\n\
  \n**提示**\n\n当需要重组分区时，如果可接受停机时间，最好通过执行空 `ALTER TABLE` 来完成。这通常比在线的 `REORGANIZE PARTITION`\
  \ 更快，同时能完全整理表的碎片。\n\n\n\n清单 9-4 展示了一个可用于查找适合作为分区重组候选表的查询示例。该查询要求所有数据节点均处于在线状态。MySQL\
  \ NDB Cluster 的版本必须至少为 7.5。如果一个表的当前分区数量，与根据当前集群配置创建新表时将采用的分区数量不同，则该表将被包含在结果中。查询还会指示该表是使用自动分区还是手动分区创建的。清单之后会解释该查询。\n\
  \n## 清单 9-4. 查找适合作为分区重组候选表的表\n\n```\nmysql> SELECT tds.table_id AS TableId, tbl.TableSchema,\
  \ tbl.TableName,\ntds.tab_partitions AS TablePartitions,\n(\nCASE ti.partition_balance\n\
  WHEN 'FOR_RA_BY_LDM'\nTHEN thr.NumLdmThreads/cfg.NoOfReplicas\nWHEN 'FOR_RP_BY_NODE'\n\
  THEN n.NumDataNodes\nWHEN 'FOR_RA_BY_NODE'\nTHEN n.NoOfNodeGroups\nELSE thr.NumLdmThreads\n\
  END / IF(ti.fully_replicated, n.NoOfNodeGroups, 1)\n) AS DefaultNumPartitions,\n\
  IF(ti.partition_balance = 'SPECIFIC',\n'YES',\n'NO'\n) AS HasCustomPartitions\n\
  FROM (SELECT COUNT(*) AS NumLdmThreads\nFROM ndbinfo.threads\nWHERE thread_name\
  \ = 'ldm'\n) thr\nCROSS JOIN (\nSELECT COUNT(*) AS NumDataNodes,\nCOUNT(DISTINCT\
  \ group_id) AS NoOfNodeGroups\nFROM ndbinfo.membership\n) n\nCROSS JOIN (\nSELECT\
  \ config_value AS NoOfReplicas\nFROM ndbinfo.config_params p\nINNER JOIN ndbinfo.config_values\
  \ v\nON v.config_param = p.param_number\nWHERE p.param_name = 'NoOfReplicas'\nLIMIT\
  \ 1 /* NoOfReplicas 在所有节点上必须相同 */\n) cfg\nINNER JOIN ndbinfo.table_distribution_status\
  \ tds\nINNER JOIN ndbinfo.table_info ti ON ti.table_id = tds.table_id\nINNER JOIN\
  \ (\nSELECT id AS table_id,\nSUBSTRING_INDEX(fq_name, '/', 1) AS TableSchema,\n\
  SUBSTRING_INDEX(fq_name, '/', -1) AS TableName\nFROM ndbinfo.dict_obj_info doi\n\
  INNER JOIN ndbinfo.dict_obj_types dot\nON dot.type_id = doi.type\nWHERE dot.type_name\
  \ = 'User table'\n) tbl ON tbl.table_id = tds.table_id\nWHERE NOT ((tbl.TableSchema\
  \ = 'mysql' AND tbl.TableName LIKE 'NDB$%')\nOR (tbl.TableSchema = 'sys'\nAND (tbl.TableName\
  \ LIKE 'NDB$%'\nOR tbl.TableName LIKE 'SYSTAB\\_%'\n)\n)\n)\nHAVING TablePartitions\
  \ <> DefaultNumPartitions\nORDER BY TableSchema, TableName;\n清单 9-4.\n查找适合作为分区重组候选表的表\n\
  ```\n\n由于该查询相当复杂，值得研究一下其各个组成部分。`SELECT` 部分中的 `CASE` 语句根据分区分布以及分区是否完全复制来计算预期的分区数。如果使用了自定义分区，则分区平衡设置为\
  \ `SPECIFIC`。\n\n`FROM` 子句中的第一个子查询使用 `ndbinfo.threads` 视图来确定集群中 LDM 线程的数量。第二个子查询使用\
  \ `ndbinfo.membership` 视图来查找数据节点和节点组的数量。第三个子查询通过 `ndbinfo.config_params` 和 `ndbinfo.config_values`\
  \ 视图检查配置，以获取 `NoOfReplicas` 配置选项的值。这三个子查询各自只返回一行，因此可以使用 `CROSS JOIN`，并且总体上结果仍然只有一行。\n\
  \n接下来的连接是与 `ndbinfo.table_distribution_status` 视图，它包含关于表分区数量的信息。此外，与 `ndbinfo.table_info`\
  \ 的连接提供了表的分区平衡设置以及分区是否完全复制。最后，一个子查询使用两个字典 `ndbinfo` 视图——`ndbinfo.dict_obj_info`\
  \ 和 `ndbinfo.dict_obj_types`——从完全限定的 NDB Cluster 名称 (`fq_name`) 中获取模式名和表名。\n\n`WHERE`\
  \ 子句过滤掉了系统表和其他无法重组的内部表。\n\n清单 9-4 中使用的 `ndbinfo.table_distribution_status` 表也可用于确定\
  \ `REORGANIZE PARTITION` 操作是否正在进行中，如清单 9-5 所示。`INNER JOIN` 部分中的子查询与清单 9-4 中使用的子查询相同，用于获取每个正在经历分区重组的表的模式名和表名。\n\
  \n## 清单 9-5. 查找当前正在进行分区重组的表\n\n```\nmysql> SELECT tds.table_id AS TableId, tbl.TableSchema,\
  \ tbl.TableName\nFROM ndbinfo.table_distribution_status tds\nINNER JOIN (\nSELECT\
  \ id AS table_id,\nSUBSTRING_INDEX(fq_name, '/', 1) AS TableSchema,\nSUBSTRING_INDEX(fq_name,\
  \ '/', -1) AS TableName\nFROM ndbinfo.dict_obj_info doi\nINNER JOIN ndbinfo.dict_obj_types\
  \ dot\nON dot.type_id = doi.type\nWHERE dot.type_name = 'User table'\n) tbl ON tbl.table_id\
  \ = tds.table_id\nWHERE tds.is_reorg_ongoing = 1;\n+---------+-------------+-----------+\n\
  | TableId | TableSchema | TableName |\n+---------+-------------+-----------+\n|\
  \       4 | office      | employee  |\n+---------+-------------+-----------+\n1\
  \ row in set (1.98 sec)\n清单 9-5.\n查找当前正在进行分区重组的表\n```\n\n本节前面讨论的空 `ALTER TABLE`\
  \ 语句对于重组分区还有第二个用途：表重建还会对表进行碎片整理。碎片整理——无论是就地（在线）操作还是复制（离线）操作——是接下来要讨论的主题。\n\n\n\n\
  ### 碎片整理\n\n随着时间的推移，数据被插入、删除和更新，表的数据存储中会出现间隙，并且逻辑上属于一起的数据（存储在同一个表中）可能不会位于连续的内存区域中。这被称为碎片化，它会导致使用的存储量大于必要值。例如，在向集群添加更多数据节点后重组分区时，可能会发生碎片化。\n\
  \n**提示**\n\n表数据的碎片化与文件系统碎片化并非完全不同。例如，可以参阅 [`https://en.wikipedia.org/wiki/File_system_fragmentation`](https://en.wikipedia.org/wiki/File_system_fragmentation)\
  \ 获取深入讨论。\n\n由对数据的各种更改而产生的空闲空间仍然会计入 `DataMemory` 或磁盘表空间数据文件中使用的总数据量。虽然这些内存可以用于同一表的新数据，但不能用于集群中存储的其他表。这意味着，即使在原则上仍有空闲内存的情况下，也有可能遇到表已满的错误。要回收分配给了表但实际空闲的任何内存，您必须对表进行碎片整理，以便移动数据以减少或消除间隙。\n\
  \n图 9-2 展示了数据内部如何发生碎片化的示例以及碎片整理过程的结果。该示例并非 `NDBCluster` 特有，仅用于说明目的。在更新第 2 行后，第 2\
  \ 行和第 3 行之间的浅灰色空间，以及在删除第 4 行后，第 3 行和第 5 行之间的空间都是空白空间；这就是碎片化。最后的碎片整理移动了第 3 行和第 5\
  \ 行以合并空闲空间。但请注意，碎片整理是一项开销大且速度慢的操作，特别是在需要重建表时。\n\n![A435171_1_En_9_Fig2_HTML.jpg](img/A435171_1_En_9_Fig2_HTML.jpg)\n\
  *图 9-2. 碎片化和碎片整理*\n\n对于 `NDBCluster` 表，可以通过以下三种方式之一实现碎片整理：\n\n-   使用 `OPTIMIZE TABLE`\
  \ 语句\n-   重启数据节点\n-   重建表（使用复制方式的空 `ALTER TABLE`）\n\n最简单且影响最小的方法是使用 `OPTIMIZE TABLE`\
  \ 语句：\n\n```\nmysql> OPTIMIZE TABLE t1;\n+--------+----------+----------+----------+\n\
  | Table  | Op       | Msg_type | Msg_text |\n+--------+----------+----------+----------+\n\
  | db1.t1 | optimize | status   | OK       |\n+--------+----------+----------+----------+\n\
  1 row in set (1 min 37.88 sec)\n```\n\n在 `NDBCluster` 中，`OPTIMIZE TABLE` 是一项在线操作。但是，只会对可变大小的内存（动态）进行碎片整理。\n\
  \n滚动重启（参见第 10 章）也会对可变大小数据进行碎片整理，其优点是从头重建索引，因此它将提供比 `OPTIMIZE TABLE` 更好的碎片整理效果。对于固定宽度的内存，回收碎片化内存的唯一方法是重建表。表重建可以通过空\
  \ `ALTER TABLE` 操作实现：\n\n```\nmysql> ALTER TABLE t1 ALGORITHM=COPY, LOCK=EXCLUSIVE,\
  \ ENGINE=NDBCluster;\nQuery OK, 131072 rows affected (3 min 41.43 sec)\nRecords:\
  \ 131072  Duplicates: 0  Warnings: 0\n```\n\n这与之前讨论的当在线 `REORGANIZE PARTITION` 不起作用时重新分区表的方法相同。这将离线重建表，但除此之外，除非自上次表重建或创建以来数据节点或\
  \ LDM 线程的数量发生了变化，否则不会进行其他更改，除了可能重新分区表。\n\n本章一直在讨论数据和索引的模式与存储。然而，还有另一个与日常表维护相关的方面：索引统计。这是本章的最后一个主题。\n\
  \n### 索引统计\n\n当查询通过 SQL 节点执行时，语句会被发送到优化器，优化器将确定用于实际执行的查询计划。虽然优化器总体上超出了本书的范围，但有一个与确定查询计划相关的方面值得讨论：索引统计。\n\
  \n索引统计提供了表中索引唯一值的数量估计。例如，考虑清单 9-6 中的表、数据和索引统计。该表有三个索引——主键、一个跨越 `Surname` 和 `FirstName`\
  \ 两列的索引，以及一个在 `IsManager` 列上的索引。在表本身上使用 `COUNT()` 聚合函数的查询显示了每个索引以及 `Name` 索引部分索引的实际唯一值数量。最后，最后一个查询显示了根据索引统计得出的相同唯一值数量。唯一值的数量也称为基数。\n\
  \n**注意**\n\n`NDBCluster` 表的索引统计还包括范围内的记录数估计——例如，有多少行的值 x 在 5 到 10 之间。这些估计值并未直接公开，有时可能导致非最优的查询计划。当发生这种情况时，请使用索引提示（[`dev.mysql.com/doc/refman/5.7/en/index-hints.html`](https://dev.mysql.com/doc/refman/5.7/en/index-hints.html)）以获得更好的索引。本书将不再进一步讨论范围内的记录数估计。\n\
  \n```\nmysql> SHOW CREATE TABLE office.employee\\G\n***************************\
  \ 1. row ***************************\nTable: employee\nCreate Table: CREATE TABLE\
  \ `employee` (\n`EmployeeID` int(10) unsigned NOT NULL,\n`FirstName` varchar(20)\
  \ DEFAULT NULL,\n`Surname` varchar(20) DEFAULT NULL,\n`IsManager` enum('No','Yes')\
  \ NOT NULL,\nPRIMARY KEY (`EmployeeID`),\nKEY `Name` (`Surname`,`FirstName`),\n\
  KEY `IsManager` (`IsManager`)\n) ENGINE=ndbcluster DEFAULT CHARSET=latin1\n1 row\
  \ in set (0.01 sec)\nmysql> SELECT COUNT(*), COUNT(DISTINCT EmployeeID),\nCOUNT(DISTINCT\
  \ Surname), COUNT(DISTINCT Surname, FirstName),\nCOUNT(DISTINCT IsManager)\nFROM\
  \ office.employee\\G\n*************************** 1. row ***************************\n\
  COUNT(*): 10000\nCOUNT(DISTINCT EmployeeID): 10000\nCOUNT(DISTINCT Surname): 372\n\
  COUNT(DISTINCT Surname, FirstName): 8543\nCOUNT(DISTINCT IsManager): 2\n1 row in\
  \ set (0.05 sec)\nmysql> SELECT INDEX_NAME, NON_UNIQUE, COLUMN_NAME, CARDINALITY\n\
  FROM information_schema.STATISTICS\nWHERE TABLE_SCHEMA = 'office' AND TABLE_NAME\
  \ = 'employee';\n+------------+------------+-------------+-------------+\n| INDEX_NAME\
  \ | NON_UNIQUE | COLUMN_NAME | CARDINALITY |\n+------------+------------+-------------+-------------+\n\
  | PRIMARY    |          0 | EmployeeID  |       10000 |\n| Name       |        \
  \  1 | Surname     |         391 |\n| Name       |          1 | FirstName   |  \
  \      9204 |\n| IsManager  |          1 | IsManager   |           2 |\n+------------+------------+-------------+-------------+\n\
  4 rows in set (0.00 sec)\n```\n*清单 9-6. 包含其数据和索引统计的表示例*\n\n观察清单 9-6 中的基数，有几点需要注意：\n\
  \n\n\n*   主键的基数等于行数。这是定义上的，因为主键要求所有值唯一且不允许空值。这同样适用于所有定义为 `NOT NULL` 的唯一索引。\n*  \
  \ `Name` 索引（`Surname` 和 `FirstName`）的基数不等于唯一值的数量。`Surname`（391）和 `FirstName`（9204）都列出了各自的基数。`FirstName`\
  \ 的基数是与 `Surname` 组合后的基数，即索引的总体基数。这是因为 `NDBCluster` 在计算基数时不做精确统计，而是通过扫描随机索引片段来获取索引值的样本，从而进行估计。对于像\
  \ `Name` 这样具有许多不同值的索引，这种估计不会精确。在本例中，误差大约为百分之七，这很少会导致选择错误的查询计划。\n*   `IsManager`\
  \ 索引的基数被发现为二。这并不奇怪，因为该列只接受两个值（`No` 和 `Yes`）。在这种情况下，索引统计恰好与不同值的计数相符，因为扫描的片段足以表明未检查的值不太可能包含除这两个值之外的其他值。\n\
  \n对于 `employee` 表，`Name` 索引对于按姓名搜索员工的查询非常有价值。它将使查询只需检查几行，而不是表中的全部 10000 行。然而，`IsManager`\
  \ 索引用处不大，因为它平均只能过滤掉 50% 的行，因此表扫描无论如何都是最高效的方式。这意味着 `IsManager` 索引只增加开销：它在 `DataMemory`\
  \ 中使用内存，并且在插入、更新或删除数据时维护索引也有开销。\n\n本节的其余部分将讨论影响索引统计的选项，以及用于重新计算它们的实用程序和语句。\n\n####\
  \ 索引统计内部机制\n\n在深入探讨更新索引统计及其行为配置的细节之前，有必要简要了解一下 MySQL NDB Cluster 中索引统计的内部实现机制。这只是一个概述，更深层次的细节超出了本书的范围。\n\
  \n索引统计在数据节点内部存储在两个系统表中。这两个表也在 SQL 节点上作为 `mysql` 模式中的以下表暴露：\n\n*   `ndb_index_stat_head`：索引统计的元信息。对于已计算统计信息的索引，每个索引对应一行。\n\
  *   `ndb_index_stat_sample`：索引的实际样本数据。\n\n这些表使用 `NDBCluster` 存储引擎，因此它们在 SQL 节点之间是同步的。然而，在每个\
  \ SQL 节点上，统计信息被加载到一个缓存中。此缓存通过两种方式更新：\n\n*   当 `ANALYZE TABLE` 的执行完成时。即使语句是在不同的 SQL\
  \ 节点上执行的，也会发生这种情况。\n*   通过一个后台索引统计线程。\n\n后台线程响应优化器的查询，并确保如果索引统计直接在数据节点上更新（使用后面讨论的\
  \ `ndb_index_stat` 实用程序），则 SQL 节点上的缓存也会更新。后台线程的缓存更新不会立即发生，而是按线程的计划进行。其配置将在本章后面讨论。\n\
  \n缓存本身被分成多个实例，可以是以下类型之一：\n\n*   `Query`：当前用于响应查询的缓存实例。\n*   `Build`：当前正在填充的缓存。\n\
  *   `Clean`：可以有多个 `Clean` 类型的实例。这些是可以被删除的旧缓存实例。\n\n索引统计实现的概述如图 9-3 所示。\n\n![A435171_1_En_9_Fig3_HTML.jpg](img/A435171_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3.\n\n索引统计实现概述\n\n#### 维护索引统计\n\n确保索引统计反映表中的数据分布非常重要。否则，查询计划将不是最优的。在涉及多个表连接的复杂查询中，错误的查询计划在最坏的情况下可能导致查询比最优查询计划慢多达\
  \ 100 倍或更多。`NDBCluster` 表的索引统计有三种更新方式：\n\n*   显式执行 `ANALYZE TABLE`。\n*   使用 `ndb_index_stat`\
  \ 实用程序。此工具也可用于其他任务，例如创建和删除存储索引统计的系统表。\n*   后台自动更新。\n\n这三种方法的基本工作原理相同；然而，对于用户来说，有一些值得更详细讨论的差异。\n\
  \n`ANALYZE TABLE` 是一个特定于 SQL 节点的语句，用于计算表的索引统计。它适用于所有支持索引的存储引擎的表。这是更新索引统计的最常用方法。清单\
  \ 9-7 展示了更新一个和两个表示例。可以通过在列表中添加更多表（用逗号分隔）来在同一条语句中分析更多表。如果未指定模式名，则使用当前模式。\n\n第一条语句更新当前模式下\
  \ `employee` 表的索引统计，而第二条语句更新 `office` 模式下 `employee` 和 `address` 表的统计。`ANALYZE TABLE`\
  \ 语句在结束时触发一个事件，确保缓存尽快更新；实际上，缓存的更新看起来就像是 `ANALYZE TABLE` 语句的一部分。\n\n```\nmysql> ANALYZE\
  \ TABLE employee;\n+-----------------+---------+----------+----------+\n| Table\
  \           | Op      | Msg_type | Msg_text |\n+-----------------+---------+----------+----------+\n\
  | office.employee | analyze | status   | OK       |\n+-----------------+---------+----------+----------+\n\
  1 row in set (0 min 56.85 sec)\nmysql> ANALYZE TABLE office.employee, office.address;\n\
  +-----------------+---------+----------+----------+\n| Table           | Op    \
  \  | Msg_type | Msg_text |\n+-----------------+---------+----------+----------+\n\
  | office.employee | analyze | status   | OK       |\n| office.address  | analyze\
  \ | status   | OK       |\n+-----------------+---------+----------+----------+\n\
  2 rows in set (1 min 53.20 sec)\n```\n清单 9-7.\n\n使用 `ANALYZE TABLE` 的示例\n\n注意\n\n\
  更新索引统计可能需要一些时间，具体取决于表中的行数和索引数量；然而，这项工作是在表在线状态下执行的，而且查询性能的提升可能非常显著。\n\nMySQL NDB\
  \ Cluster 发行版还包含 `ndb_index_stat` 实用程序，它可以执行一系列与索引统计相关的操作。该实用程序使用以下选项来执行支持的操作：\n\
  \n\n\n*   `--delete`：删除指定表的索引统计信息。需要提供`--database`选项和表名来指定表。\n*   `--update`：创建或更新指定表的索引统计信息。需要提供`--database`选项和表名来指定表。\n\
  *   `--dump`：转储指定表的索引统计元数据和样本。需要提供`--database`选项和表名来指定表。这类似于查询`ndb_index_stat_head`和`ndb_index_stat_sample`表，对调试很有用。\n\
  *   `--sys-drop`：删除存储索引统计信息的底层系统表（`ndb_index_stat_head`和`ndb_index_stat_sample`）。这也会删除所有现有的索引统计信息。删除并随后重新创建系统表在索引统计信息损坏时可能很有用。当系统索引统计表不存在时，MySQL\
  \ 将继续正常工作，只是`NDBCluster`表将没有索引统计信息，并且尝试生成索引统计信息将失败并报错。\n*   `--sys-create`：创建存储索引统计信息的底层系统表（`ndb_index_stat_head`和`ndb_index_stat_sample`）。`--sys-create`选项有两个替代版本：`--sys-create-if-not-exist`和`--sys-create-if-not-valid`，分别在系统表不存在或删除任何无效对象后创建它们。\n\
  \n提示\n\n可以通过执行`ndb_index_stat --help`选项或查阅 MySQL 参考手册获取`ndb_index_stat`的完整帮助信息，链接为\
  \ [`https://dev.mysql.com/doc/mysql-cluster-excerpt/5.7/en/mysql-cluster-programs-ndb-index-stat.html`](https://dev.mysql.com/doc/mysql-cluster-excerpt/5.7/en/mysql-cluster-programs-ndb-index-stat.html)。\n\
  \n列表 9-8 展示了更新`office.employee`表的索引统计信息的示例。添加`--verbose`选项会使命令返回对调试有用的额外信息。\n\n\
  ```\nshell$ ndb_index_stat --ndb_connectstring=192.168.56.101,192.168.56.102 \\\n\
  --update --database=office employee\ntable:employee index:PRIMARY fragCount:4\n\
  sampleVersion:2 loadTime:1500782413 sampleCount:2513 keyBytes:10052\nquery cache:\
  \ valid:1 sampleCount:2513 totalBytes:35182\ntimes in ms: save: 7.435 sort: 2.228\
  \ sort per sample: 0.000\ntable:employee index:Name fragCount:4\nsampleVersion:2\
  \ loadTime:1500782414 sampleCount:2344 keyBytes:35103\nquery cache: valid:1 sampleCount:2344\
  \ totalBytes:67919\ntimes in ms: save: 9.483 sort: 2.744 sort per sample: 0.001\n\
  table:employee index:IsManager fragCount:4\nsampleVersion:2 loadTime:1500782414\
  \ sampleCount:2 keyBytes:2\nquery cache: valid:1 sampleCount:2 totalBytes:20\ntimes\
  \ in ms: save: 1.818 sort: 0.004 sort per sample: 0.002\nNDBT_ProgramExit: 0 - OK\n\
  ```\n\n列表 9-8. 使用 `ndb_index_stat` 工具更新索引统计信息\n\n使用`ndb_index_stat`相比`ANALYZE TABLE`的一个优势是它更容易编写脚本，例如可以通过\
  \ cron 脚本或 Windows 任务计划程序来执行。\n\n最后，MySQL NDB Cluster 支持自动更新索引统计信息。在 DBDICT 块内部，当操作数量超过阈值时，索引将被标记为需要更新。随后后台循环会检测到这一点并更新索引统计信息，类似于`ANALYZE\
  \ TABLE`和`ndb_index_stat`的操作。然而，等到自动更新启动时，索引统计信息可能已经严重过时，并可能导致较差的查询计划。\n\n在 SQL\
  \ 节点级别还有另一种功能更有限的索引统计信息自动更新机制。它基于现有统计信息工作，其对插入、更新和删除行为的影响如表 9-4 所示。\n\n表 9-4. 索引统计信息自动更新的行为\n\
  \n| 操作 | 行为 |\n| --- | --- |\n| `INSERT` | 基数根据添加行的百分比增加。例如，行数加倍会使基数加倍。 |\n| `UPDATE`\
  \ | 基数不会改变。 |\n| `DELETE` | 基数根据删除行的百分比减少。例如，删除一半行会使基数减半。 |\n\n这种行为，加上索引统计信息后台正式更新的延迟，意味着每当表自上次更新索引统计信息以来发生显著变化时，您应该强制更新索引统计信息。这种强制更新可以通过`ANALYZE\
  \ TABLE`或`ndb_index_stat`工具来触发。\n\n\n### 选项与状态变量\n\nSQL 节点有两个选项用于控制`NDBCluster`表的索引统计信息：\n\
  \n*   `ndb_index_stat_enable`：启用或禁用是否计算索引统计信息，以及在确定查询计划时是否使用这些信息。默认值为`ON`。\n*  \
  \ `ndb_index_stat_option`：指定用于更新索引统计信息缓存的一系列选项。默认值包含在表 9-5 中。\n\n**表 9-5. `ndb_index_stat_option`变量的设置**\n\
  \n| 设置项 | 默认值 | 允许值 | 说明 |\n| --- | --- | --- | --- |\n| `loop_enable` | 1000ms\
  \ | 0ms- 4294967295ms | 当 `ndb_index_stat_enable = OFF` 时，在检查是否已启用索引统计计算之前等待的时间量。\
  \ |\n| `loop_idle` | 1000ms | 0ms- 4294967295ms | 当上次批量未被完全使用时，在开始再次更新缓存之前休眠的时间量。\
  \ |\n| `loop_busy` | 100ms | 0ms- 4294967295ms | 当上次批量被完全使用时，在开始再次更新缓存之前休眠的时间量。\
  \ |\n| `update_batch` | 1 | 1- 4294967295 | 更新缓存时的批处理大小。如果执行了所有循环，则状态设置为忙。 |\n|\
  \ `read_batch` | 4 | 1- 4294967295 | 读取索引统计信息时的批处理大小。如果执行了所有循环，则状态设置为忙。 |\n| `idle_batch`\
  \ | 32 | 1- 4294967295 | 状态为空闲时执行的索引统计信息维护的批处理大小。这永远不会将状态设置为忙。 |\n| `check_batch`\
  \ | 8 | 1- 4294967295 | 检查是否应更新索引统计信息时的批处理大小。如果执行了所有循环，则状态设置为忙。 |\n| `check_delay`\
  \ | 10m | 0s- 4294967295s | 检查是否有任何索引统计信息需要更新之间的时间间隔。 |\n| `delete_batch` | 8 |\
  \ 1- 4294967295 | 删除索引统计信息时的批处理大小。如果执行了所有循环，则状态设置为忙。 |\n| `clean_delay` | 1m | 0s-\
  \ 4294967295s | 当状态为空闲时使用。从缓存实例中读取索引统计信息（当前为`clean`类型）到允许删除该缓存实例之间的最短时间。 |\n| `error_batch`\
  \ | 4 | 1- 4294967295 | 检查索引统计信息中的错误时的批处理大小。这永远不会将状态设置为忙。 |\n| `error_delay` | 1m\
  \ | 0s- 4294967295s | 上次批处理发现错误后，在检查错误之前需要等待的最短时间。 |\n| `evict_batch` | 8 | 1- 4294967295\
  \ | 指定使用最近最少使用（LRU）列表从缓存中清除索引统计信息的批处理大小。当缓存使用量超过`cache_lowpct`百分比时，统计信息将被清除。如果执行了所有循环，则状态设置为忙。\
  \ |\n| `evict_delay` | 1m | 0s- 4294967295s | 自上次读取统计信息以来，从缓存中清除索引统计信息的最短延迟时间。 |\n\
  | `cache_limit` | 32M | 0- 4294967295 | 索引统计信息缓存的大小。如果索引统计信息量很大，请增加此大小。单位是为缓存分配的字节数，可以使用以下单位：K、M、G（无单位标识符则指定为字节）。\
  \ |\n| `cache_lowpct` | 90 | 0-100 | 开始从缓存中清除最近最少使用的统计信息之前，索引统计信息缓存应达到的使用百分比。单位为百分比。\
  \ |\n| `zero_total` | 0 | 0 和 1 | 当将 `zero_total` 设置为 1 时，`Ndb_index_stat_status`\
  \ 状态变量中的计数器将重置为 0。 |\n\n对于大多数系统，建议启用索引统计信息。唯一的例外是那些仅使用 `WHERE` 子句只匹配一个索引来查询单表的系统。在这种情况下，确定最优查询计划不需要索引统计信息。\n\
  \n`ndb_index_stat_option` 值得一些关注，因为它是一个相对复杂的选项。它由多个键值对组成，每个键值对本身是一个独立的设置，但在用户层面组合成一个复合设置。表\
  \ 9-5 列出了所有可用的设置、它们的默认值、允许值以及这些设置的作用。设置的顺序按照它们在 `ndb_index_stat_option` 选项中出现的顺序列出。\n\
  \n对于 `loop_enable`、`loop_idle` 和 `loop_busy` 设置的计时值，其值以毫秒为单位指定，赋值时 `ms` 单位是可选的。延迟计时设置接受的单位为\
  \ s、m 或 h（秒、分钟或小时——默认单位是 s）。对于批处理设置，单位是要执行的循环次数；如果执行了所有循环，则状态设置为忙。\n\n`ndb_index_stat_option`\
  \ 中的默认值适用于大多数部署，通常很少需要微调这些设置。可以在一条 `SET` 语句中设置一个或多个设置。例如：\n\n```sql\nmysql> SET\
  \ GLOBAL ndb_index_stat_option = 'loop_enable=1500ms,zero_total=1';\n```\n\n这将 `loop_enable`\
  \ 设置为 1500 毫秒，并重置 `Ndb_index_stat_status` 中的统计信息。重要的是，值中不能包含空格。未包含在 `SET` 语句中的设置将保持其当前值。\n\
  \n可以使用 `SHOW GLOBAL VARIABLES` 或通过选择值来获取 `ndb_index_stat_option` 的完整值列表，例如：\n\n\
  ```sql\nmysql> SELECT @@global.ndb_index_stat_option\\G\n***************************\
  \ 1. row ***************************\n@@global.ndb_index_stat_option: loop_enable=1000ms,loop_idle=1000ms,loop_busy=100ms,update_batch=1,read_batch=4,idle_batch=32,check_batch=8,check_delay=10m,delete_batch=8,clean_delay=1m,error_batch=4,error_delay=1m,evict_batch=8,evict_delay=1m,cache_limit=32M,cache_lowpct=90,zero_total=0\n\
  1 row in set (0.01 sec)\n```\n\n示例中的返回值也是默认值。\n\n可以通过 SQL 节点中的三个状态变量来监控索引统计信息的状态：\n\
  \n*   `Ndb_index_stat_status`：一组与 `ndb_index_stat_option` 设置相关的值。\n*   `Ndb_index_stat_cache_query`：索引统计信息缓存的查询实例当前使用的字节数。此值与\
  \ `Ndb_index_stat_status` 中 `cache` 列表中的 `query` 值相同。\n*   `Ndb_index_stat_cache_clean`：清理（clean）实例中当前使用的字节数。此值与\
  \ `Ndb_index_stat_status` 中 `cache` 列表中的 `clean` 值相同。\n\n`Ndb_index_stat_status`\
  \ 状态变量类似于 `ndb_index_stat_option`，不仅因为它包含一些与 `ndb_index_stat_option` 选项相关的统计信息，还因为它是一个包含多项统计信息的复合状态变量。`Ndb_index_stat_status`\
  \ 中包含的值列于表 9-6。\n\n**表 9-6. `Ndb_index_stat_status`中包含的统计信息**\n\n\n"
