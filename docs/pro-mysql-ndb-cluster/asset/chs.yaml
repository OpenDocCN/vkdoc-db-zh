  \ 模式与 MySQL 版本。 |\n\n##### 函数\n\n`sys` 模式中有若干函数。其中大多数是各种类型的辅助函数。\n\n###### 格式化函数\n\
  \n第一组函数可用于格式化性能模式中的字节、路径、语句和计时信息。这些函数列于表 15-30 中。\n\n表 15-30.\nsys 模式格式化函数\n\n|\
  \ 函数名称 | 描述 |\n| --- | --- |\n| `format_bytes` | 格式化字节并包含单位。 |\n| `format_path`\
  \ | 格式化路径，使用配置选项（例如 `datadir`）替换路径的部分内容。 |\n| `format_statement` | 将语句截断至 `statement_truncate_len`（参见“`sys`\
  \ 模式配置”部分）个字符，同时保留语句的开头和结尾。 |\n| `format_time` | 将皮秒转换为包含单位的可读格式。 |\n\n###### 实用函数\n\
  \n第二组函数可用于操作信息，例如从文件名中提取模式或表名，或操作列表。表 15-31 列出了这些实用函数。\n\n表 15-31.\nsys 模式实用函数\n\
  \n| 函数名称 | 描述 |\n| --- | --- |\n| `extract_schema_from_file_name` | 从文件名中提取模式名称。\
  \ |\n| `extract_table_from_file_name` | 从文件名中提取表名。 |\n| `list_add` | 如果元素不在逗号分隔列表中，则将该元素添加到列表中。\
  \ |\n| `list_drop` | 从逗号分隔列表中移除一个元素。 |\n| `quote_identifier` | 使用反引号 (`) 引用 MySQL\
  \ 标识符。 |\n| `sys_get_config` | 检索 sys 模式配置选项。参见“`sys` 模式配置”部分。 |\n| `version_major`\
  \ | 返回 MySQL 服务器的主版本号（例如，对于 5.7.18 返回 5）。 |\n| `version_minor` | 返回 MySQL 服务器的次版本号（例如，对于\
  \ 5.7.18 返回 7）。 |\n| `version_patch` | 返回 MySQL 服务器的补丁版本号（例如，对于 5.7.18 返回 18）。 |\n\
  \n###### 性能模式函数\n\n第三组也是最后一组函数直接使用性能模式表。例如，这些函数可用于确定哪些已启用，将连接 ID 转换为性能模式线程 ID 等。这些函数列于表\
  \ 15-32 中。\n\n表 15-32.\nsys 模式性能模式函数\n\n| 函数名称 | 描述 |\n| --- | --- |\n| `ps_is_account_enabled`\
  \ | 返回某个账户是否已启用 instrumentation。 |\n| `ps_is_consumer_enabled` | 返回某个 consumer 是否会收集数据（基于层级结构）。\
  \ |\n| `ps_is_instrument_default_enabled` | 返回某个 instrument 是否根据 MySQL 版本默认启用。 |\n\
  | `ps_is_instrument_default_timed` | 返回某个 instrument 是否根据 MySQL 版本默认计时。 |\n| `ps_is_thread_instrumented`\
  \ | 返回给定线程是否已 instrumentation。 |\n| `ps_thread_account` | 返回线程 ID 对应的 `username@hostname`。\
  \ |\n| `ps_thread_id` | 返回连接 ID 对应的性能模式线程 ID。 |\n| `ps_thread_stack` | 为给定线程生成 JSON\
  \ 格式的栈信息。 |\n| `ps_thread_trx_info` | 为线程生成包含当前事务详细信息的 JSON 对象。 |\n\n##### 存储过程\n\
  \n`sys` 模式中的存储过程也可以分为三组。\n\n###### 性能模式设置过程\n\n第一组包含旨在简化对性能模式进行配置更改的过程。表 15-33 列出了所有这些过程。\n\
  \n表 15-33.\nsys 模式性能模式设置过程\n\n| 过程名称 | 描述 |\n| --- | --- |\n| `ps_setup_disable_background_threads`\
  \ | 禁用所有后台线程的 instrumentation。 |\n| `ps_setup_disable_consumer` | 禁用名称中包含所提供字符串的所有\
  \ consumer。 |\n| `ps_setup_disable_instrument` | 禁用名称中包含所提供字符串的所有 instrument。 |\n\
  | `ps_setup_disable_thread` | 禁用具有所提供连接 ID 的连接的 instrumentation。 |\n| `ps_setup_enable_background_threads`\
  \ | 为所有后台线程启用 instrumentation。 |\n| `ps_setup_enable_consumer` | 启用名称中包含所提供字符串的所有\
  \ consumer。 |\n| `ps_setup_enable_instrument` | 启用名称中包含所提供字符串的所有 instrument。 |\n\
  | `ps_setup_enable_thread` | 为具有所提供连接 ID 的连接启用 instrumentation。 |\n| `ps_setup_reload_saved`\
  \ | 恢复在同一会话中先前使用 `ps_setup_save()` 过程保存的性能模式设置。 |\n| `ps_setup_reset_to_default`\
  \ | 将性能模式设置重置为默认值。本章前面的跟踪示例中使用了此过程。 |\n| `ps_setup_save` | 保存当前的性能模式设置。 |\n| `ps_setup_show_disabled`\
  \ | 显示所有已禁用的性能模式相关设置。 |\n| `ps_setup_show_disabled_consumers` | 显示所有已禁用的 consumer。\
  \ |\n| `ps_setup_show_disabled_instruments` | 显示所有已禁用的 instrument。 |\n| `ps_setup_show_enabled`\
  \ | 显示所有已启用的性能模式设置。 |\n| `ps_setup_show_enabled_consumers` | 显示所有已启用的 consumer。\
  \ |\n| `ps_setup_show_enabled_instruments` | 显示所有已启用的 instrument。 |\n\n###### 语句与跟踪过程\n\
  \n第二组存储过程对于调查语句或一组语句非常有用。其中就包括在讨论性能模式时用于跟踪事务的 `ps_trace_thread` 过程。这些语句和跟踪过程列于表\
  \ 15-34 中。\n\n表 15-34.\nsys 模式语句与跟踪过程\n\n| 过程名称 | 描述 |\n| --- | --- |\n| `ps_statement_avg_latency_histogram`\
  \ | 基于平均摘要延迟生成直方图。 |\n| `ps_trace_statement_digest` | 在一段时间内跟踪具有给定摘要的语句的出现情况。 |\n\
  | `ps_trace_thread` | 生成 DOT 格式的跟踪文件。先前在性能模式部分使用过。 |\n| `ps_truncate_all_tables`\
  \ | 截断所有性能模式表（将统计信息重置为与 SQL 节点重启后相同的状态）。 |\n\n###### 实用过程\n\n第三组 `sys` 模式对象包含一些实用过程，可轻松收集诊断数据、执行一次性动态创建的语句等。这些过程描述见表\
  \ 15-35。\n\n表 15-35.\nsys 模式实用过程\n\n| 过程名称 | 描述 |\n| --- | --- |\n| `create_synonym_db`\
  \ | 创建一个具有指定名称的模式，其中包含指向原始模式的视图。可用于例如将 `ps` 作为 `performance_schema` 的同义词。 |\n| `diagnostics`\
  \ | 在给定时间段内收集诊断数据。这包括来自 `ndbinfo` 视图的数据。 |\n| `execute_prepared_stmt` | 使用预处理语句执行作为参数传入的\
  \ SQL 查询，并在使用后释放该预处理语句。对于动态生成的查询很有用。 |\n| `table_exists` | 返回表是否存在，如果存在，则返回它是基表、临时表还是视图。\
  \ |\n\n\n\n#### sys 模式配置\n\n`sys` 模式自带配置管理功能，因为它还必须作为插件适配未包含在标准安装中的旧版 MySQL。配置由两部分组成——持久化部分存储在\
  \ `sys_config` 表中，以及使用用户变量的临时部分。默认配置见清单 15-19。\n\n```\nmysql> SELECT * FROM sys.sys_config;\n\
  +--------------------------------------+-------+---------------------+--------+\n\
  | variable                             | value | set_time            | set_by |\n\
  +--------------------------------------+-------+---------------------+--------+\n\
  | diagnostics.allow_i_s_tables         | OFF   | 2017-06-11 12:30:17 | NULL   |\n\
  | diagnostics.include_raw              | OFF   | 2017-06-11 12:30:17 | NULL   |\n\
  | ps_thread_trx_info.max_length        | 65535 | 2017-06-11 12:30:17 | NULL   |\n\
  | statement_performance_analyzer.limit | 100   | 2017-06-11 12:30:17 | NULL   |\n\
  | statement_performance_analyzer.view  | NULL  | 2017-06-11 12:30:17 | NULL   |\n\
  | statement_truncate_len               | 64    | 2017-06-11 12:30:17 | NULL   |\n\
  +--------------------------------------+-------+---------------------+--------+\n\
  6 rows in set (0.00 sec)\n```\n清单 15-19. `sys` 模式的默认配置\n\n`set_time` 列会自动更新，除非显式设置，因为该列定义为\
  \ `DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP`。`set_by` 用户则由触发器更新，以反映执行\
  \ `INSERT` 或 `UPDATE` 操作的用户名。`set_by` 设置为 `NULL` 表示该配置是在 `sys` 模式安装过程中插入的。\n\n对于\
  \ `sys_config` 表中的每个变量，都可以在会话级别通过用户变量覆盖其值，用户变量名以 `@sys.` 为前缀，后接选项名称。清单 15-20 展示了一个使用\
  \ `format_statement()` 函数格式化查询的示例。该函数使用 `statement_truncate_len` 选项来决定在何处截断查询。\n\
  \n```\nmysql> SELECT sys.format_statement('SELECT * FROM world.City INNER JOIN world.Country\
  \ on Country.Code = City.CountryCode') AS FormattedQuery\\G\n***************************\
  \ 1. row ***************************\nFormattedQuery: SELECT * FROM world.City INNER\
  \ ... ountry.Code = City.CountryCode\n1 row in set (0.00 sec)\nmysql> SET @sys.statement_truncate_len\
  \ = 128;\nQuery OK, 0 rows affected (0.01 sec)\nmysql> SELECT sys.format_statement('SELECT\
  \ * FROM world.City INNER JOIN world.Country on Country.Code = City.CountryCode')\
  \ AS FormattedQuery\\G\n*************************** 1. row ***************************\n\
  FormattedQuery: SELECT * FROM world.City INNER JOIN world.Country on Country.Code\
  \ = City.CountryCode\n1 row in set (0.00 sec)\nmysql> SET @sys.statement_truncate_len\
  \ = NULL;\nQuery OK, 0 rows affected (0.00 sec)\nmysql> SELECT sys.format_statement('SELECT\
  \ * FROM world.City INNER JOIN world.Country on Country.Code = City.CountryCode')\
  \ AS FormattedQuery\\G\n*************************** 1. row ***************************\n\
  FormattedQuery: SELECT * FROM world.City INNER ... ountry.Code = City.CountryCode\n\
  1 row in set (0.00 sec)\n```\n清单 15-20. 使用 `sys` 模式会话级设置的示例\n\n通过设置 `@sys.statement_truncate_len`\
  \ 可以更改截断点。将用户变量的值设置为 `NULL` 会重置该选项，`sys` 模式将重新使用来自 `sys_config` 的值。\n\n某些功能，如 `diagnostics()`\
  \ 存储过程，支持额外的自定义设置。参考手册包含这些自定义设置的详细信息。\n\n在 `sys` 模式安装并配置完成后，就可以查看一些使用示例了。\n\n####\
  \ 命令行用法与示例\n\n`sys` 模式的主要目标之一是易于使用。为此，其中的视图通常被设计为无需连接（join）或 `ORDER BY` 子句即可使用。一个简单的\
  \ `SELECT * FROM <视图名称>`，可能带有 `WHERE` 和/或 `LIMIT` 子句，是典型的用例。关于 Performance Schema\
  \ 的章节已经展示了几个使用 `sys` 模式的示例，并且在下一章使用 `ndbinfo` 模式时还会有更多示例。因此，本节将仅限于几个补充用例。\n\n一个已经被提及的视图是\
  \ `session` 视图。在下一章中，它也将用于查找 `ndbinfo` 锁报告中连接的详细信息。`session` 视图是 `SHOW PROCESSLIST`\
  \ 语句的高级版本。清单 15-21 展示了一个包含两个连接的示例。\n\n```\nmysql> SELECT * FROM sys.session\\G\n\
  *************************** 1. row ***************************\nthd_id: 32\nconn_id:\
  \ 9\nuser: root@localhost\ndb: NULL\ncommand: Sleep\nstate: NULL\ntime: 3\ncurrent_statement:\
  \ NULL\nstatement_latency: NULL\nprogress: NULL\nlock_latency: 3.19 ms\nrows_examined:\
  \ 1\nrows_sent: 1\nrows_affected: 0\ntmp_tables: 0\ntmp_disk_tables: 0\nfull_scan:\
  \ NO\nlast_statement: SELECT * FROM world.City WHERE ID = 130\nlast_statement_latency:\
  \ 3.88 ms\ncurrent_memory: 0 bytes\nlast_wait: NULL\nlast_wait_latency: NULL\nsource:\
  \ NULL\ntrx_latency: 641.43 us\ntrx_state: COMMITTED\ntrx_autocommit: YES\npid:\
  \ 29378\nprogram_name: mysql\n*************************** 2. row ***************************\n\
  thd_id: 28\nconn_id: 5\nuser: root@localhost\ndb: db1\ncommand: Query\nstate: Sending\
  \ data\ntime: 0\ncurrent_statement: SELECT * FROM sys.session\nstatement_latency:\
  \ 1.37 ms\nprogress: NULL\nlock_latency: 852.00 us\nrows_examined: 0\nrows_sent:\
  \ 0\nrows_affected: 0\ntmp_tables: 4\ntmp_disk_tables: 1\nfull_scan: YES\nlast_statement:\
  \ NULL\nlast_statement_latency: NULL\ncurrent_memory: 0 bytes\nlast_wait: NULL\n\
  last_wait_latency: NULL\nsource: NULL\ntrx_latency: 564.17 us\ntrx_state: ACTIVE\n\
  trx_autocommit: YES\npid: 4246\nprogram_name: mysql\n2 rows in set (0.05 sec)\n\
  ```\n清单 15-21. 使用 `sys.session` 视图\n\n第一行 (`thd_id: 32`) 显示了一个空闲连接。因为 `session`\
  \ 视图连接了 `performance_schema.events_statements_current` 表，所以可以包含上一条语句。第二行 (`thd_id:\
  \ 28`) 是一个正在执行查询的连接示例。在这两种情况下，都提供了详细的信息。\n\n`session` 视图有一个姊妹视图：`processlist` 视图。区别在于\
  \ `processlist` 视图不仅包含连接，还包含后台线程。\n\n数据库管理员经常考虑的一个问题是需要哪些索引。表扫描对性能是致命的，也可能影响其他查询。过多的索引同样会损害性能，因为当数据更改时必须维护它们，并且优化器在决定查询计划时必须考虑更多选项。为了审查索引是否合适，`sys`\
  \ 模式包含了三个可用的视图。\n\n清单 15-22 使用 `schema_redundant_indexes` 视图来查找冗余索引。\n\n\n```\n\
  mysql> SELECT * FROM sys.schema_redundant_indexes\\G\n***************************\
  \ 1. row ***************************\ntable_schema: world\ntable_name: City\nredundant_index_name:\
  \ Name\nredundant_index_columns: Name\nredundant_index_non_unique: 1\ndominant_index_name:\
  \ Name_2\ndominant_index_columns: Name,District\ndominant_index_non_unique: 1\n\
  subpart_exists: 0\nsql_drop_index: ALTER TABLE `world`.`City` DROP INDEX `Name`\n\
  *************************** 2. row ***************************\ntable_schema: world\n\
  table_name: CountryLanguage\nredundant_index_name: CountryCode\nredundant_index_columns:\
  \ CountryCode\nredundant_index_non_unique: 1\ndominant_index_name: PRIMARY\ndominant_index_columns:\
  \ CountryCode,Language\ndominant_index_non_unique: 0\nsubpart_exists: 0\nsql_drop_index:\
  \ ALTER TABLE `world`.`CountryLanguage` DROP INDEX `CountryCode`\n2 rows in set\
  \ (0.03 sec)\nmysql> SHOW CREATE TABLE world.CountryLanguage\\G\n***************************\
  \ 1. row ***************************\nTable: CountryLanguage\nCreate Table: CREATE\
  \ TABLE `CountryLanguage` (\n`CountryCode` char(3) NOT NULL DEFAULT '',\n`Language`\
  \ char(30) NOT NULL DEFAULT '',\n`IsOfficial` enum('T','F') NOT NULL DEFAULT 'F',\n\
  `Percentage` float(4,1) NOT NULL DEFAULT '0.0',\nPRIMARY KEY (`CountryCode`,`Language`),\n\
  KEY `CountryCode` (`CountryCode`),\nCONSTRAINT `countryLanguage_ibfk_1` FOREIGN\
  \ KEY (`CountryCode`) REFERENCES `Country` (`Code`) ON DELETE NO ACTION ON UPDATE\
  \ NO ACTION\n) ENGINE=ndbcluster DEFAULT CHARSET=latin1\n1 row in set (0.00 sec)\n\
  mysql> ALTER TABLE world.CountryLanguage DROP INDEX CountryCode;\nERROR 1553 (HY000):\
  \ Cannot drop index 'CountryCode': needed in a foreign key constraint\n```\n\n**清单\
  \ 15-22. 查找冗余索引**\n\n结果显示，`world.City` 表既有一个覆盖 `Name` 和 `District` 列的索引，也有一个仅覆盖\
  \ `Name` 列的索引。仅在 `Name` 列上的索引是冗余的，因为 `Name` 列是 `(Name, District)` 上的 `Name_2` 索引的**左前缀**。因此，`Name_2`\
  \ 索引可以用于那些只需要 `Name` 列索引的查询。但有一个需要注意的地方，正如 `world.CountryLanguage` 表上的冗余索引所示。当尝试删除冗余索引时，语句会失败，因为*外键约束*需要该索引。\n\
  \n检查完冗余索引后，就该检查未使用的索引了。`schema_unused_indexes` 视图就是为此目的而包含的。使用该视图的示例如下：\n\n```\n\
  mysql> SELECT * FROM sys.schema_unused_indexes;\n+---------------+-----------------+-------------+\n\
  | object_schema | object_name     | index_name  |\n+---------------+-----------------+-------------+\n\
  | world         | City            | CountryCode |\n| world         | City      \
  \      | Name        |\n| world         | CountryLanguage | CountryCode |\n+---------------+-----------------+-------------+\n\
  3 rows in set (0.00 sec)\n```\n\n该视图会自动排除属于主键的索引或位于 `mysql` 架构中的表上的索引（因为这些表不应被更改）。与冗余索引检查一样，为外键而存在的索引无法被删除。另一件需要记住的事情是，由于统计数据来自\
  \ Performance Schema，它们只涵盖自上次重置统计信息以来的时段（不会早于 SQL 节点的最后一次重启）。这意味着虽然某个索引在查询时显示为未使用，但它可能只是尚未被使用。例如，它可能是一个每周或每月批处理作业所必需的索引。因此，请确保统计信息覆盖足够长的时间以包含所有使用情况。\n\
  \n最后，是时候查找需要索引的表了。可以使用 `schema_tables_with_full_table_scans` 视图来查找执行了**表扫描**的表。结果包括扫描的行数以及扫描这些行所花费的时间。在继续操作并添加索引之前，请记住，有些查询根本无法使用索引，并且即使可以使用索引，在某些情况下，表扫描可能更高效——第\
  \ 18 章将对此进行一些讨论。例如：\n\n```\nmysql> SELECT * FROM sys.schema_tables_with_full_table_scans;\n\
  +---------------+-------------+-------------------+---------+\n| object_schema |\
  \ object_name | rows_full_scanned | latency |\n+---------------+-------------+-------------------+---------+\n\
  | world         | City        |           2370382 | 32.35 s |\n+---------------+-------------+-------------------+---------+\n\
  1 row in set (0.00 sec)\n```\n\n虽然现在知道 `world.City` 表正在进行表扫描，但尚不清楚是哪些查询引起的，以及哪些列可能从索引中受益。清单\
  \ 15-23 展示了如何使用 `statements_with_full_table_scans` 视图来查找使用全表扫描的查询。为了清晰起见，添加了对 `db`\
  \ 列的过滤条件，但通常需谨慎，因为这是针对执行查询的连接的默认架构进行过滤。\n\n**清单 15-23. 通过全表扫描查找 world 架构中的查询**\n\
  \n```\nmysql> SELECT *\nFROM sys.statements_with_full_table_scans\nWHERE db = 'world'\\\
  G\n*************************** 1. row ***************************\nquery: SELECT\
  \ * FROM `world` . `City` WHERE `Population` > ?\ndb: world\nexec_count: 10000\n\
  total_latency: 33.85 s\nno_index_used_count: 10000\nno_good_index_used_count: 0\n\
  no_index_used_pct: 100\nrows_sent: 2370000\nrows_examined: 2370000\nrows_sent_avg:\
  \ 237\nrows_examined_avg: 237\nfirst_seen: 2017-06-18 17:35:50\nlast_seen: 2017-06-18\
  \ 17:36:26\ndigest: e2842f4964f77841445bae18495f9dfe\n1 row in set (0.00 sec)\n\
  ```\n\n输出显示，导致表扫描的查询在 `Population` 列上有一个过滤条件。如果该查询是常用查询，可能值得添加索引。\n\n细心的读者可能会注意到，清单\
  \ 15-23 中的统计数据显示发送的行数与检查的行数相同。这通常表明需要进行表扫描，因为需要表中的所有行。然而，这里有一个陷阱。该查询的 `EXPLAIN`\
  \ 计划显示，尽管 `Population` 列上没有任何索引，但条件仍然被**下推**到存储引擎：\n\n```\nmysql> EXPLAIN SELECT\
  \ * FROM world.City WHERE Population > 1000000\\G\n*************************** 1.\
  \ row ***************************\nid: 1\nselect_type: SIMPLE\ntable: City\npartitions:\
  \ p0,p1\ntype: ALL\npossible_keys: NULL\nkey: NULL\nkey_len: NULL\nref: NULL\nrows:\
  \ 4079\nfiltered: 33.33\nExtra: Using where with pushed condition (`world`.`City`.`Population`\
  \ > 1000000)\n1 row in set, 1 warning (0.00 sec)\n```\n\n这意味着过滤是在数据节点上完成的，因此对于 SQL\
  \ 节点来说，看起来需要表中的所有行，这使得 `performance_schema.events_statements_summary_by_digest`（它是\
  \ `sys.statements_with_full_table_scans` 的数据源）中的统计信息有些误导。\n\n为了结束关于 `sys` 架构的讨论，将演示\
  \ MySQL Workbench 中的性能报告。\n\n##### MySQL Workbench 性能报告\n\nMySQL Workbench 是来自 MySQL\
  \ 的桌面客户端 GUI 工具。除了允许用户执行查询和管理 schema，MySQL Workbench 还包含了用于监控其所连接的 MySQL 实例的各种报告。其中一组报告被称为性能报告。\n\
  \n性能报告的来源是 `sys` schema 视图，每个报告对应一个视图。图 15-6 展示了一个使用其中一份报告的示例。性能报告使用未格式化数据的视图（即那些带有\
  \ `x$` 前缀的视图），因此可以更改排序顺序和使用的单位。在图 15-6 中，Total Time 列的单位已被更改为毫秒。\n\n![A435171_1_En_15_Fig6_HTML.jpg](img/A435171_1_En_15_Fig6_HTML.jpg)\n\
  \n图 15-6. MySQL Workbench 性能报告\n\n在报告底部有四个按钮。Export … 按钮可以将结果保存为 CSV 文件。Copy Selected\
  \ 按钮执行类似的导出，但将所选行以及标题行复制到剪贴板——同样使用 CSV 格式。Copy Query 按钮将用于报告的查询复制到剪贴板。在此示例中，查询是：\n\
  \n```sql\nselect * from sys.`x$statement_analysis`\n```\n\n最后，Refresh 按钮用于刷新报告。\n\
  \n以上是对 `sys` schema 的概览。需要考虑的最后一个来自 MySQL 内部的数据源是 `SHOW` 语句。\n\n### SHOW 语句\n\n\
  传统上——追溯到 MySQL 5.0 之前的时代——获取性能和状态数据的唯一方法是使用 `SHOW` 语句。虽然 `SHOW` 语句提供的数据现在越来越多地可以从其他来源（如\
  \ Information Schema、`ndbinfo`、Performance Schema 和 `sys` schema）获得，但并非所有信息都能从新来源获取。此外，`SHOW`\
  \ 命令在命令行中可能很方便，因为它们通常比查询其他来源输入更短。\n\nMySQL NDB Cluster 7.5 中总共有 40 个 `SHOW` 语句，范围从\
  \ `SHOW TABLES` 到 `SHOW SLAVE STATUS` 和 `SHOW BINLOG EVENTS` 等查询。表 15-36 从 MySQL\
  \ NDB Cluster 监控角度总结了最重要的 `SHOW` 语句。方括号中的关键字表示可选关键字。\n\n#### 表 15-36. 用于 NDB 集群监控的常用\
  \ SHOW 语句\n\n| SHOW 语句 | 描述 |\n| --- | --- |\n| `SHOW BINARY LOGS` | 列出所有二进制日志。用于验证\
  \ SQL 节点存储的二进制日志量。 |\n| `SHOW ENGINE NDBCluster STATUS` | 显示 `NDBCluster` 存储引擎的统计信息。\
  \ |\n| `SHOW [FULL] PROCESSLIST;` | 针对每个连接到 SQL 节点的连接返回一行，包含用户、正在执行的查询等详细信息。对于 MySQL\
  \ NDB Cluster 7.3 及更高版本，建议改用 `performance_schema.threads`、`sys.processlist` 或 `sys.session`。\
  \ |\n| `SHOW PROFILE` | 返回查询的性能分析，包含使用的每个线程状态的详细信息。需要在执行查询前启用性能分析。此功能已被弃用，并将在以后的版本中移除。请改用\
  \ Performance Schema。 |\n| `SHOW PROFILES` | 列出所有可用于 `SHOW PROFILE` 的查询性能分析。与 `SHOW\
  \ PROFILE` 一同被弃用。 |\n| `SHOW SLAVE HOSTS` | 列出连接到作为复制主服务器的 SQL 节点的复制从服务器。 |\n| `SHOW\
  \ SLAVE STATUS` | 列出复制从服务器上复制状态的详细信息。在 MySQL NDB Cluster 7.5 中，部分信息可从 Performance\
  \ Schema 复制表中获得，但仍有一些信息仅在 `SHOW SLAVE STATUS` 中提供。 |\n| `SHOW [GLOBAL&#124;SESSION]\
  \ STATUS` | 显示会话或全局状态变量。在 MySQL NDB Cluster 7.4 及更早版本中与查询 Information Schema 状态表相同，在\
  \ 7.5 版本中则与查询 Performance Schema 状态表相同。如果既未指定 `GLOBAL` 也未指定 `SESSION`，则返回会话状态。 |\n\
  | `SHOW TABLE STATUS` | 与查询 `information_schema.TABLES` 表相同。 |\n| `SHOW [GLOBAL&#124;SESSION]\
  \ VARIABLES` | 显示会话或全局配置变量。在 MySQL NDB Cluster 7.4 及更早版本中与查询 Information Schema\
  \ 变量表相同，在 7.5 版本中则与查询 Performance Schema 变量表相同。如果既未指定 `GLOBAL` 也未指定 `SESSION`，则返回会话变量。\
  \ |\n| `SHOW WARNINGS` | 并非直接用于监控。返回由上一条语句生成的警告和错误。无论是在 `mysql` 命令行客户端中直接执行查询还是通过应用程序执行，监视警告和错误都很重要。\
  \ |\n\n作为 NDB 集群特定的语句，考虑 `NDBCluster` 的 `SHOW ENGINE` 语句。示例输出如清单 15-24 所示。\n\n```sql\n\
  mysql> SHOW ENGINE NDBCluster STATUS\\G\n*************************** 1\\. row ***************************\n\
  Type: ndbcluster\nName: connection\nStatus: cluster_node_id=52, connected_host=\
  \ 192.168.56.101, connected_port=1186, number_of_data_nodes=2, number_of_ready_data_nodes=2,\
  \ connect_count=0\n*************************** 2\\. row ***************************\n\
  Type: ndbcluster\nName: NdbTransaction\nStatus: created=2, free=0, sizeof=368\n\
  *************************** 3\\. row ***************************\nType: ndbcluster\n\
  Name: NdbOperation\nStatus: created=4, free=4, sizeof=944\n***************************\
  \ 4\\. row ***************************\nType: ndbcluster\nName: NdbIndexScanOperation\n\
  Status: created=1, free=1, sizeof=1152\n*************************** 5\\. row ***************************\n\
  Type: ndbcluster\nName: NdbIndexOperation\nStatus: created=0, free=0, sizeof=952\n\
  *************************** 6\\. row ***************************\nType: ndbcluster\n\
  Name: NdbRecAttr\nStatus: created=8, free=8, sizeof=88\n***************************\
  \ 7\\. row ***************************\nType: ndbcluster\nName: NdbApiSignal\nStatus:\
  \ created=16, free=16, sizeof=144\n*************************** 8\\. row ***************************\n\
  Type: ndbcluster\nName: NdbLabel\nStatus: created=0, free=0, sizeof=200\n***************************\
  \ 9\\. row ***************************\nType: ndbcluster\nName: NdbBranch\nStatus:\
  \ created=0, free=0, sizeof=32\n*************************** 10\\. row ***************************\n\
  Type: ndbcluster\nName: NdbSubroutine\nStatus: created=0, free=0, sizeof=72\n***************************\
  \ 11\\. row ***************************\nType: ndbcluster\nName: NdbCall\nStatus:\
  \ created=0, free=0, sizeof=24\n*************************** 12\\. row ***************************\n\
  Type: ndbcluster\nName: NdbBlob\nStatus: created=0, free=0, sizeof=496\n***************************\
  \ 13\\. row ***************************\nType: ndbcluster\nName: NdbReceiver\nStatus:\
  \ created=2, free=0, sizeof=128\n*************************** 14\\. row ***************************\n\
  Type: ndbcluster\nName: NdbLockHandle\nStatus: created=0, free=0, sizeof=48\n***************************\
  \ 15\\. row ***************************\nType: ndbcluster\nName: binlog\nStatus:\
  \ latest_epoch=1319821975224330, latest_trans_epoch=1309823291359243, latest_received_binlog_epoch=1319821975224330,\
  \ latest_handled_binlog_epoch=1319821975224330, latest_applied_binlog_epoch=1307057332420613\n\
  15 rows in set (0.03 sec)\n```\n\n清单 15-24. SHOW ENGINE NDBCluster STATUS\n\n返回的信息包括连接到集群其余部分的详细信息、各种已创建对象的数量和每个对象的大小，以及与二进制日志相关的纪元（epoch）详情。这些指标不容易从其他来源获取。\n\
  \n以上是对 SQL 节点内部监控的通用数据源的概览。一个重要的信息来源尚未讨论：MySQL 日志文件。\n\n### MySQL 日志\n\n本章最后要讨论的监控环节是\
  \ MySQL 日志。MySQL 提供了多种日志，从用于审计的日志到 SQL 节点上的通用错误日志都有。定期检查错误日志，以便在潜在问题发生前发现它们，这一点很重要；而在调查事件时，所有日志都可能派上用场。根据应用和认证要求，可能还需要分析审计日志。本节将介绍\
  \ SQL 节点上可用的日志。\n\n#### SQL 节点错误日志\n\nSQL 节点上的错误日志——通常也称为 MySQL 错误日志——对于任何习惯使用 MySQL\
  \ Server 的数据库管理员来说都应该很熟悉。如果还不熟悉，那么现在正是将其纳入日常工作的绝佳时机。\n\nMySQL 错误日志是一种简单格式的日志，新消息会附加到文件末尾。有许多选项可用于控制日志记录行为。这些选项总结在表\
  \ 15-37 中。\n\n**表 15-37. SQL 节点错误日志的选项**\n\n| 选项 | 适用版本 | 默认值 | 描述 |\n| --- | ---\
  \ | --- | --- |\n| `log_error` | 所有版本 | (`stderr`) | 错误日志的路径/文件名。 |\n| `log_error_verbosity`\
  \ | 7.5+ | `3` | 日志详细级别。在 MySQL NDB Cluster 7.5 中已取代 `log_warnings`。级别 1 仅记录错误，级别\
  \ 2 增加警告，级别 3 增加注释。由于启动和关闭消息属于注释，建议使用级别 3。 |\n| `log_syslog` | 7.5+ | `OFF` | 是否记录到\
  \ syslog 设施。 |\n| `log_syslog_facility` | 7.5+ | `daemon` | 如果 `log_syslog` 设置为\
  \ `ON`，则指定要使用的 syslog 设施。 |\n| `log_syslog_include_pid` | 7.5+ | `ON` | 在记录到 syslog\
  \ 设施时，是否包含 SQL 节点的进程 ID。 |\n| `log_syslog_tag` | 7.5+ |   | 写入 syslog 时，要添加到 SQL\
  \ 节点标识符的可选标签。 |\n| `log_timestamps` | 7.5+ | `UTC` | 日志消息中使用的时间戳是采用 `UTC` 还是 `SYSTEM`\
  \ 时区。 |\n| `log_warnings` | 7.4 及更早版本 | `1` | 接受 0 或更高的值，但实际上只有 0、1 和 2 具有明显不同的日志详细级别。值为\
  \ 2 主要会增加与连接相关的消息。由于各级别功能缺乏明确区分，该选项已在 7.5 版本中弃用，并由 `log_error_verbosity` 取代。 |\n\
  \n在这些可用选项中，唯一推荐始终明确设置的是 `log_error`，除非日志记录仅通过 syslog 设施进行。设置错误日志的路径和文件名可以确保明确知道错误日志的位置，并且不会写入到\
  \ `stderr`。在紧急情况下，能够快速定位错误日志至关重要。\n\n正如关于 MySQL 错误日志讨论开头提到的，检查日志应成为日常工作的一部分。这将使数据库管理员能够及早获得问题预警。例如，在重启期间，所有正在使用的已弃用选项都会被列出并附带警告。\n\
  \n来自 MySQL NDB Cluster 7.5 错误日志的三个警告示例如下：\n\n```\n2017-06-20T06:45:42.986780Z 0\
  \ [Warning] The syntax '--log_warnings/-W' is deprecated and will be removed in\
  \ a future release. Please use '--log_error_verbosity' instead.\n2017-06-20T06:45:42.986844Z\
  \ 0 [Warning] TIMESTAMP with implicit DEFAULT value is deprecated. Please use --explicit_defaults_for_timestamp\
  \ server option (see documentation for more details).\n2017-06-20T06:45:42.988522Z\
  \ 0 [Warning] Insecure configuration for --secure-file-priv: Location is accessible\
  \ to all OS users. Consider choosing a different directory.\n```\n\n这些是重启期间最先出现的几条消息。第一条消息是因为配置中存在\
  \ `log_warnings` 选项，提示应改用 `log_error_verbosity` 选项。第二条是另一个弃用警告。这条消息很有趣，它建议使用 `explicit_defaults_for_timestamp`\
  \ 选项来避免使用已弃用的行为。然而，`explicit_defaults_for_timestamp` 本身也是已弃用的，因为它旨在作为一个过渡期的选项，用于支持\
  \ timestamp 数据类型列的两种默认行为。在这两种情况下，这都是给数据库管理员的一个提示：变更即将到来。关注这些弃用警告可以大大改善未来的升级体验。\n\
  \n第三条消息警告 `secure-file-priv` 选项指向的路径可以被所有操作系统用户访问。如果除了管理员之外还有其他用户可以访问该主机，这就很不安全。这是错误日志如何提供指导以改进\
  \ SQL 节点安全性的一个例子。\n\n\n#### 审计日志\n\n最后要讨论的日志是那些在某种程度上可用于审计的日志。这些日志的范围涵盖了传统的慢查询日志和通用查询日志，乃至企业级的审计日志。表\
  \ 15-38 列出了 MySQL 中可用的四种审计日志。所有日志都是针对每个 SQL 节点记录的。\n\n表 15-38.\n\n具备审计能力的日志\n\n\
  | 日志 | 描述 |\n| --- | --- |\n| 审计日志插件 | 审计日志插件是 **MySQL 企业版** 和 **MySQL Cluster 电信级版**\
  \ 订阅服务（作为 **MySQL 企业审计**）的一部分。它可以记录所有或部分已执行的查询，以及诸如连接、服务器启动和关闭等事件。有选项可控制性能、过滤、自动轮转等。MySQL\
  \ 企业审计的详细信息可在 [`dev.mysql.com/doc/refman/en/audit-log.html`](https://dev.mysql.com/doc/refman/en/audit-log.html)\
  \ 找到。 |\n| 查询分析器 | 虽然不是传统日志，但前一章讨论的 MySQL 企业监视器查询分析器会按时间间隔记录查询，这些记录可用于审计执行了哪些类型的查询。它还可以汇总来自集群中所有\
  \ SQL 节点的查询。 |\n| 慢查询日志 | 根据执行时间以及可选的是否未使用索引来记录查询。随 SQL 节点一起提供的 `mysqldumpslow`\
  \ 脚本可用于汇总慢查询日志中查询的统计信息。 |\n| 通用查询日志 | 记录所有查询和连接。这使其对于确定具体的语句和连接非常有用，但它会带来较高的性能开销、占用大量磁盘空间，并且没有过滤选项。\
  \ |\n| 二进制日志 | 二进制日志的主要用途是复制和基于时间点的恢复。然而，由于它记录了所有的数据和模式更改，因此也是记录更改的优秀审计日志。此外，作为唯一的一种日志，它记录了来自所有节点的事件。`mysqlbinlog`\
  \ 程序可用于读取二进制日志中的事件。 |\n\n对审计日志的需求程度取决于系统。然而，在所有情况下，能够回溯并检查节点上曾发生过哪些活动，对于事后分析来说都是一项宝贵的资源。前一章展示了一个例子，其中\
  \ MySQL 企业监视器中的查询分析器被用于确定数据内存耗尽的原因。\n\n审计日志也可以被主动使用。如果查询分析器显示响应时间不断增长，或者添加到慢查询日志中的查询速率增加，这可能是需要做出更改的信号。理想情况下，应在响应时间增长成为问题之前就发现这种情况。可能是因为数据量增加了，所以使用全表扫描的查询开始变得吃力，有必要研究改进索引——例如使用\
  \ `sys` 模式部分描述的技术。也可能是因为查询速率不断增加，开始对 SQL 节点或集群造成压力，因此有必要添加更多 SQL 节点，或者通过只读副本进行横向扩展以分散负载。\n\
  \n性能模式摘要汇总表似乎可能会使慢查询日志过时。尤其是在其之上构建了查询分析器之后。然而，慢查询日志有一些优点：它在查询完成时记录查询，并且与性能模式不同，数据会持久化到磁盘。慢查询日志记录的是实际执行的查询，而性能模式存储的是规范化后的查询。\n\
  \n**警告**\n审计日志固然很好，但有两个注意事项。它们有开销。它们不仅为管理员提供审计能力，也可能被入侵者用来获取数据。在部署审计解决方案前务必测试其性能，并保护好日志文件。\n\
  \n### 总结\n\nMySQL 服务器包含多种监控数据源以及多种日志。本章已经讨论了可用的表、视图、语句和日志如何在 MySQL NDB 集群中发挥作用。\n\
  \n信息模式是 MySQL 监控模式中的元老。它已存在十多年，至今仍是获取模式信息、插件、字符集、权限等信息的中心场所。较新的性能模式提供了一种获取从事务到互斥量以及其间几乎所有信息的方式。性能模式中可用的表和数据量可能看起来令人应接不暇，因此开发了\
  \ `sys` 模式来提供可作为报告的视图和用于操作数据的存储程序。最后，还有 `SHOW` 语句，这是获取监控信息的经典 MySQL 工具。在所有这些信息中，日志很容易被遗忘，但它们同样需要定期检视。\n\
  \n以上是对 MySQL 中普遍可用资源的快速概览。然而，对于 MySQL NDB 集群，还有一些额外的数据源和日志需要注意。这些将在下一章讨论。\n\n"
- "# 16. 监控 MySQL NDB 集群\n\n到目前为止，关于监控和日志的讨论，除少数例外，包含的信息并非 MySQL NDB 集群特有，而是也适用于独立的\
  \ MySQL 服务器安装。就像有专门针对 `InnoDB` 的信息模式表一样，也有专门针对数据节点和 `NDBCluster` 表的、包含监控数据的表和视图。\n\
  \n数据节点通过 SQL 节点提供的数据可以在 NDB 集群信息数据库——更广为人知的 `ndbinfo` 模式——中找到，这是本章的主题。讨论首先涵盖 `ndbinfo`\
  \ 模式的配置和可用视图，然后提供几个使用 `ndbinfo` 视图生成报告的示例。本章第三部分介绍管理和数据节点上可用的日志和跟踪文件。\n\n### NDB\
  \ 集群信息数据库 (ndbinfo)\n\n最初，能从数据节点提取的唯一数据只能在集群日志和数据节点输出日志中找到。在 MySQL NDB 集群 7.1.1\
  \ 中，引入了 NDB 集群信息数据库。根据其默认模式名称，它通常也被称为 `ndbinfo` 模式。此后，它经过了多次扩展，添加了更多数据。截至 MySQL\
  \ NDB 集群 7.5.6，共有 41 个视图和 43 个隐藏表。这些表使用 `NDBInfo` 存储引擎。\n\n`ndbinfo` 模式相对于日志的优势在于，它由可以使用\
  \ `SELECT` 语句进行查询的表和视图组成。在许多方面，它类似于信息模式和性能模式，但包含了 MySQL NDB 集群特有的信息。\n\n本节讨论 `ndbinfo`\
  \ 模式的配置及其可用视图。下一节将通过一系列使用这些视图的示例。\n\n\n\n#### 配置\n\n与 `ndbinfo` 模式相关的有七个配置选项和变量。这些在表\
  \ 16-1 中列出。在实践中，很少会更改这些值，尽管 `ndbinfo_offline` 和 `ndbinfo_show_hidden` 视图有一些很好的用例，稍后将进行讨论。\n\
  \n表 16-1. ndbinfo 配置选项\n\n| 选项 | 默认值 | 描述 |\n| --- | --- | --- |\n| `ndbinfo_database`\
  \ | `ndbinfo` | 用于 NDB 集群信息数据库的模式名称。虽然可以在重启时设置不同的值（例如，在 MySQL 配置文件中），但实际值只能在编译时更改。\
  \ |\n| `ndbinfo_max_bytes` | `0` | 仅用于调试目的。 |\n| `ndbinfo_max_rows` | `10` | 仅用于调试目的。\
  \ |\n| `ndbinfo_offline` | `OFF` | 将 `ndbinfo` 模式置于离线模式。如果底层表和视图实际上不存在（例如数据节点离线），这将避免错误。相反，表将始终显示为空。列表\
  \ 16-2 展示了一个示例。 |\n| `ndbinfo_show_hidden` | `OFF` | 是否显示包含来自数据节点实际数据的隐藏表。列表 16-3\
  \ 展示了一个示例。 |\n| `ndbinfo_table_prefix` | `ndb$` | 隐藏表使用的表名前缀。可以在启动时更改，但实际使用的值只能在编译时更改。\
  \ |\n| `ndbinfo_version` | N/A | `ndbinfo` 版本。这是一个只读变量，仅供参考。 |\n\n可以在 SQL 节点上使用\
  \ `SHOW GLOBAL VARIABLES` 查找当前设置，如列表 16-1 所示。\n\n```\nmysql> SHOW GLOBAL VARIABLES\
  \ LIKE 'ndbinfo%';\n+----------------------+---------+\n| Variable_name        |\
  \ Value   |\n+----------------------+---------+\n| ndbinfo_database     | ndbinfo\
  \ |\n| ndbinfo_max_bytes    | 0       |\n| ndbinfo_max_rows     | 10      |\n| ndbinfo_offline\
  \      | OFF     |\n| ndbinfo_show_hidden  | OFF     |\n| ndbinfo_table_prefix |\
  \ ndb$    |\n| ndbinfo_version      | 460038  |\n+----------------------+---------+\n\
  7 rows in set (0.00 sec)\n```\n\n列表 16-1. 检索 ndbinfo 相关变量\n\n##### ndbinfo_offline\n\
  \n`ndbinfo_offline` 选项对于在数据节点离线时避免错误很有用。如列表 16-2 所示，如果在数据节点离线时使用 `ndbinfo`，将导致连接到数据节点失败的错误。然而，设置\
  \ `ndbinfo_offline = ON` 后，将返回一个警告和一个空的结果集。\n\n```\nmysql> SELECT * FROM ndbinfo.table_info;\n\
  ERROR 1296 (HY000): Got error 157 'Connection to NDB failed' from NDBINFO\nmysql>\
  \ SET GLOBAL ndbinfo_offline = ON;\nQuery OK, 0 rows affected (0.00 sec)\nmysql>\
  \ SELECT * FROM ndbinfo.table_info;\nEmpty set, 1 warning (0.00 sec)\nmysql> SHOW\
  \ WARNINGS\\G\n*************************** 1. row ***************************\n\
  Level: Note\nCode: 1\nMessage: 'NDBINFO' has been started in offline mode since\
  \ the 'NDBCLUSTER' engine is disabled or @@global.ndbinfo_offline is turned on -\
  \ no rows can be returned\n1 row in set (0.00 sec)\n```\n\n列表 16-2. 使用 ndbinfo_offline\
  \ 模式\n\n##### ndbinfo_show_hidden\n\n默认情况下，所有使用 `NDBInfo` 存储引擎的表都是隐藏的，数据通过视图公开。在少数情况下，例如调试时，查看底层表可能很有用；例如，底层\
  \ `NDBInfo` 表的表定义包含解释数据含义的注释。只有对表名的引用是隐藏的——即使表被隐藏，仍然可以查询底层表。\n\n列表 16-3 展示了 `nodes`\
  \ 视图的示例，该视图使用 `ndb$info` 表作为数据源。即使 `ndbinfo_show_hidden` 设置为 `OFF`，视图和表都可以使用，但 `SHOW\
  \ TABLES`（以及 `information_schema.TABLES` 表）仅在 `ndbinfo_show_hidden` 设置为 `ON` 时才包含\
