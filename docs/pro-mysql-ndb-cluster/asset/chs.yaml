  ### 重启场景示例


  本章剩余部分将通过几个案例研究来演示重启操作。这些示例包括：


  *   **配置更改**：执行简单的配置更改以增加 `MaxNoOfConcurrentOperations` 的值。

  *   **添加管理节点**：将集群中的管理节点数量从一个增加到两个。

  *   **添加数据节点**：向现有集群添加一个节点组。

  *   **添加带预分配节点组的数据节点**：向现有集群添加一个新的节点组，而无需重启任何现有节点。

  *   **添加 API/SQL 节点**：向现有集群添加一个新的 API/SQL 节点。

  *   **从损坏的 NDB 文件系统中恢复**：在数据节点的 NDB 文件系统损坏（例如主机发生严重崩溃）后重启该节点。

  *   **初始系统重启**：执行初始系统重启以增加数据节点的线程数，并重新分布分区以利用额外的线程。


  除了“初始系统重启”案例研究外，所有其他更改都是在线执行的。


  为使命令更简洁，假设存在一个连接字符串已定义的 `/etc/my.cnf` 配置文件（或根据平台在类似位置）：


  ```ini

  [mysql_cluster]

  ndb_connectstring = 192.168.56.101,192.168.56.102

  ```


  除 `ndb_mgmd` 外的所有程序都需要此连接字符串才能工作。作为替代方案，可以在每个命令中通过命令行选项提供连接字符串。


  提醒一下，`config.ini` 中的配置如代码清单 10-4 所示。


  ```

  [ndb_mgmd default]

  DataDir      = /cluster/

  [ndbd default]

  NoOfReplicas = 2

  DataDir      = /cluster/

  [ndbd]

  NodeId       = 1

  HostName     = 192.168.56.103

  [ndbd]

  NodeId       = 2

  HostName     = 192.168.56.104

  [ndb_mgmd]

  NodeId       = 49

  HostName     = 192.168.56.101

  [ndb_mgmd]

  NodeId       = 50

  HostName     = 192.168.56.102

  [mysqld]

  NodeId       = 51

  HostName     = 192.168.56.103

  [mysqld]

  NodeId       = 52

  HostName     = 192.168.56.104

  [api]

  NodeId       = 53

  HostName     = 192.168.56.101

  [api]

  NodeId       = 54

  HostName     = 192.168.56.102

  ```

  代码清单 10-4.

  用于重启场景示例的集群配置


  #### 配置更改


  配置更改是执行重启的最常见原因，因为对 `config.ini` 中配置的任何更改都需要重启。对于大多数更改，这将是一次正常的**滚动重启**。本示例将从 `MaxNoOfConcurrentOperations`
  的默认值 (32768) 开始，并将其增加到 65536。当前值可以从 `ndbinfo.config_values` 和 `ndbinfo.config_params`
  表中查看，例如：


  ```sql

  mysql> SELECT param_name, param_default, node_id, config_value

  FROM ndbinfo.config_params

  INNER JOIN ndbinfo.config_values

  ON config_params.param_number = config_values.config_param

  WHERE param_name = ''MaxNoOfConcurrentOperations'';

  +-----------------------------+---------------+---------+--------------+

  | param_name                  | param_default | node_id | config_value |

  +-----------------------------+---------------+---------+--------------+

  | MaxNoOfConcurrentOperations | 32768         |       1 | 32768        |

  | MaxNoOfConcurrentOperations | 32768         |       2 | 32768        |

  +-----------------------------+---------------+---------+--------------+

  2 rows in set (0.02 sec)

  ```


  或者——这也是 MySQL NDB Cluster 7.4 及更早版本中唯一的选项——你可以使用 `ndb_config` 实用程序：


  ```shell

  shell$ ndb_config --type=ndbd --fields='': '' --rows=''\n'' \

  --query=NodeId,MaxNoOfConcurrentOperations

  1: 32768

  2: 32768

  ```


  传递给 `ndb_config` 的选项有：


  *   `--type`：要返回结果的节点类型，在本例中是数据节点（`ndbd` 同时涵盖单线程和多线程数据节点）。

  *   `--fields`：字段之间使用的分隔符。

  *   `--rows`：行之间使用的分隔符。

  *   `--query`：要查询的内容，在本例中是 `NodeId` 和 `MaxNoOfConcurrentOperations` 的值。


  `ndb_config` 实用程序还有一个额外的技巧：可以指定一个数据节点来获取配置，而不是询问管理节点。当配置更改仅部分应用时，这可能很有用，你将在本示例后面看到。


  配置更改的第一步是更新集群配置文件，包含 `MaxNoOfConcurrentOperations` 的新值：


  ```ini

  [ndbd default]

  NoOfReplicas = 2

  DataDir      = /cluster/

  MaxNoOfConcurrentOperations = 65536

  ```


  然后停止两个管理节点——否则如果每次只重启一个管理节点，它会在重启时从剩余的在线管理节点读取当前配置。


  ```shell

  shell$ ndb_mgm -e "49 STOP"

  Connected to Management Server at: 192.168.56.101:1186

  Node 49 has shutdown.

  Disconnecting to allow Management Server to shutdown

  shell$ ndb_mgm -e "50 STOP"

  Connected to Management Server at: 192.168.56.101:1186

  Connected to Management Server at: 192.168.56.102:1186

  Node 50 has shutdown.

  Disconnecting to allow Management Server to shutdown

  ```


  注意第二次执行 `ndb_mgm` 时，它首先尝试连接 192.168.56.101，然后切换到另一个节点。这是因为位于 192.168.56.101 上的管理节点（节点
  49）无法处理请求，所以使用了下一个管理节点。


  当两个管理节点都完成关闭后，可以使用 `--reload` 选项重新启动它们，以告诉管理节点读取新的配置文件：


  ```shell

  shell$ sudo -u mysql ndb_mgmd --config-file=/etc/config.ini \

  --config-dir=/cluster/config --ndb-nodeid=49 --reload

  MySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4

  shell$ sudo -u mysql ndb_mgmd --config-file=/etc/config.ini \

  --config-dir=/cluster/config --ndb-nodeid=50 --reload

  MySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4

  ```


  重启后可以在集群日志中观察到一件有趣的事情：



  ```

  2016-11-17 18:02:20 [MgmtSrvr] INFO     -- 检测到磁盘上的文件 /etc/config.ini 发生了变更，将尝试设置它。这是实际的差异内容：

  [ndbd(DB)]

  NodeId=1

  -MaxNoOfConcurrentOperations=32768

  +MaxNoOfConcurrentOperations=65536

  [ndbd(DB)]

  NodeId=2

  -MaxNoOfConcurrentOperations=32768

  +MaxNoOfConcurrentOperations=65536

  2016-11-17 18:02:20 [MgmtSrvr] INFO     -- 开始配置变更，代次：5

  2016-11-17 18:02:20 [MgmtSrvr] INFO     -- 节点 1: 节点 50: API mysql-5.7.16 ndb-7.5.4

  2016-11-17 18:02:20 [MgmtSrvr] INFO     -- 节点 2: 节点 50: API mysql-5.7.16 ndb-7.5.4

  2016-11-17 18:02:20 [MgmtSrvr] INFO     -- 配置 6 已提交

  2016-11-17 18:02:20 [MgmtSrvr] INFO     -- 配置变更完成！新代次：6

  ```


  ##### 配置变更概述


  集群日志包含了此次变更的差异（日志中称为 diff），并且配置代次（generation）从 5 递增到了 6。当重启管理节点时，使用 `--reload` 选项相比
  `--initial` 选项的一个优势就在于：日志将包含对配置所做更改的详细信息。


  ##### 检查配置变更的影响


  随着滚动重启的进行，检查配置变更的影响是很有趣的。在这个阶段，管理节点已经知晓了新配置，那么如何使用之前的方法来获取当前值，以反映这一变化呢？首先使用 `ndbinfo`
  模式（schema）：


  ```sql

  mysql> SELECT param_name, param_default, node_id, config_value

  FROM ndbinfo.config_params

  INNER JOIN ndbinfo.config_values

  ON config_params.param_number = values.config_param

  WHERE param_name = ''MaxNoOfConcurrentOperations'';

  +-----------------------------+---------------+---------+--------------+

  | param_name                  | param_default | node_id | config_value |

  +-----------------------------+---------------+---------+--------------+

  | MaxNoOfConcurrentOperations | 32768         |       1 | 32768        |

  | MaxNoOfConcurrentOperations | 32768         |       2 | 32768        |

  +-----------------------------+---------------+---------+--------------+

  2 行于集合 (0.04 sec)

  ```


  这符合预期——数据节点尚未意识到配置变更。这在 `ndbinfo.nodes` 表中也有所反映：


  ```sql

  mysql> SELECT * FROM ndbinfo.nodes;

  +---------+--------+---------+-------------+-------------------+

  | node_id | uptime | status  | start_phase | config_generation |

  +---------+--------+---------+-------------+-------------------+

  |       1 |    561 | STARTED |           0 |                 5 |

  |       2 |    581 | STARTED |           0 |                 5 |

  +---------+--------+---------+-------------+-------------------+

  2 行于集合 (0.02 sec)

  ```


  `config_generation` 列与管理节点在重启期间在集群日志中报告的一致。因此这里的配置代次是 5，即旧的代次。然而，使用 `ndb_config`
  工具乍一看会产生一个意外的结果：


  ```bash

  shell$ ndb_config --type=ndbd --fields='': '' --rows=''\n'' \

  --query=NodeId,MaxNoOfConcurrentOperations

  1: 65536

  2: 65536

  ```


  为什么会这样？原因是 `ndb_config` 可以向管理节点或任何数据节点查询配置。默认是向管理节点查询，这就解释了 `MaxNoOfConcurrentOperations`
  的新值。要向数据节点 1 查询配置，可以添加 `--config-from-node` 选项：


  ```bash

  shell$ ndb_config --type=ndbd --fields='': '' --rows=''\n'' \

  --query=NodeId,MaxNoOfConcurrentOperations \

  --config-from-node=1

  1: 32768

  2: 32768

  ```


  这种从不同节点获取配置的能力对于调查配置看起来不符合预期的问题非常有用。系统地先检查管理节点，然后是每个数据节点，将揭示哪些节点已应用了配置变更，哪些没有。


  ##### 继续重启剩余节点


  现在剩下的就是重启每个剩余的节点。可以使用管理客户端重启数据节点：


  ```bash

  shell$ ndb_mgm -e "1 RESTART"

  Connected to Management Server at: 192.168.56.101:1186

  Node 1 is being restarted

  ```


  此时，有必要等待重启完成，然后再重启第二个数据节点。第一个节点重启完成后，开始重启第二个节点：


  ```bash

  shell$ ndb_mgm -e "2 RESTART"

  Connected to Management Server at: 192.168.56.101:1186

  Node 2 is being restarted

  ```


  最后重启每个 API/SQL 节点。由于此步骤是平台相关的，留给读者自行完成。从技术上讲，对于像这样不影响 API/SQL 节点的配置变更，并不需要重启 API/SQL
  节点。但是，通过始终将所有节点作为滚动重启的一部分，可以确保没有节点被遗漏。


  ##### 验证配置


  回过头来检查配置，查看 `ndbinfo` 模式，现在可以看到两个数据节点都使用了新配置：


  ```sql

  mysql> SELECT * FROM ndbinfo.nodes;

  +---------+--------+---------+-------------+-------------------+

  | node_id | uptime | status  | start_phase | config_generation |

  +---------+--------+---------+-------------+-------------------+

  |       1 |    430 | STARTED |           0 |                 6 |

  |       2 |    247 | STARTED |           0 |                 6 |

  +---------+--------+---------+-------------+-------------------+

  2 行于集合 (0.01 sec)

  mysql> SELECT param_name, param_default, node_id, config_value

  FROM ndbinfo.config_params

  INNER JOIN ndbinfo.config_values

  ON config_params.param_number = values.config_param

  WHERE param_name = ''MaxNoOfConcurrentOperations'';

  +-----------------------------+---------------+---------+--------------+

  | param_name                  | param_default | node_id | config_value |

  +-----------------------------+---------------+---------+--------------+

  | MaxNoOfConcurrentOperations | 32768         |       1 | 65536        |

  | MaxNoOfConcurrentOperations | 32768         |       2 | 65536        |

  +-----------------------------+---------------+---------+--------------+

  2 行于集合 (0.04 sec)

  ```


  配置代次已增加到 6，并且 `MaxNoOfConcurrentOperations` 的值已增加到 65536。


  #### 添加管理节点


  本示例的起始配置与本章其他案例研究略有不同。除未包含 `192.168.0.102` 上的管理节点外，其余设置与清单 10-4 相同。本示例的任务是添加 `192.168.0.102`
  上的管理节点。


  添加管理节点的步骤如下：


  1.  通过添加新管理节点的详细信息来更新集群配置文件 (`config.ini`)。

  2.  更新所有数据节点以及 API/SQL 节点的 `ndb_connectstring` 选项（这包括诸如 `ndb_desc` 之类的实用程序）。

  3.  关闭现有的管理节点。

  4.  使用 `--initial` 标志重新启动现有的管理节点以及新的管理节点。

  5.  像滚动重启一样重新启动数据节点和 API/SQL 节点。


  本示例从集群已启动并运行开始：


  ```

  shell$ ndb_mgm -e "SHOW"

  Connected to Management Server at: 192.168.56.101:1186

  Cluster Configuration


  [ndbd(NDB)]     2 node(s)

  id=1    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0, *)

  id=2    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0)

  [ndb_mgmd(MGM)] 1 node(s)

  id=49   @192.168.56.101  (mysql-5.7.16 ndb-7.5.4)

  [mysqld(API)]   6 node(s)

  id=51   @192.168.56.103  (mysql-5.7.16 ndb-7.5.4)

  id=52   @192.168.56.104  (mysql-5.7.16 ndb-7.5.4)

  id=53 (not connected, accepting connect from 192.168.56.101)

  id=54 (not connected, accepting connect from 192.168.56.102)

  ```


  第一步是更新 `config.ini` 以添加新的管理节点。这需要添加一个额外的 `[ndb_mgmd]` 段，设置 `NodeId` 和 `HostName`
  选项。在本例中，新的管理节点将在 `192.168.56.102` 上执行，并使用 `[ndb_mgmd default]` 段中的选项和默认配置。添加的段如下：


  ```

  [ndb_mgmd]

  NodeId                        = 50

  HostName                      = 192.168.56.102

  ```


  生成的 `config.ini` 文件即为清单 10-4 中所示的文件。配置文件也必须复制到新节点。


  配置文件就位后，下一步是确保所有节点在将来重启时都会包含新的管理节点。连接到管理节点的客户端程序（如 `ndb_mgm` 和 `ndb_desc`）也应引用两个管理节点。为此，必须更新
  `--ndb_connectstring` 选项。如果该选项是在 `my.cnf/my.ini` 配置文件中设置的，则可以在那里进行更新：


  ```

  [mysql_cluster]

  ndb_connectstring = 192.168.56.101,192.168.56.102

  ```


  现在是实际重启的时候了。与其他配置更改一样，重启的第一部分是关闭管理节点。此操作可以从任一节点使用 `ndb_mgm` 管理客户端完成：


  ```

  shell$ ndb_mgm -e "49 STOP"

  Connected to Management Server at: 192.168.56.101:1186

  Node 49 has shutdown.

  Disconnecting to allow Management Server to shutdown

  ```


  管理节点关闭后，必须重新启动现有的以及新的管理节点。由于新的管理节点必然会使用第一代配置，这是少数情况下之一，管理节点必须使用 `--initial` 标志启动以重置管理节点。


  #### 提示


  在这种情况下，只有管理节点需要使用 `--initial` 重启。数据节点可以执行正常的节点重启。


  在 `192.168.56.101` 上启动管理节点：


  ```

  shell$ sudo -u mysql ndb_mgmd --config-file=/etc/config.ini \

  --config-dir=/cluster/config --ndb-nodeid=49 –initial

  MySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4

  ```


  在 `192.168.56.102` 上启动：


  ```

  shell$ sudo -u mysql ndb_mgmd --config-file=/etc/config.ini \

  --config-dir=/cluster/config --ndb-nodeid=50 --initial

  MySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4

  ```


  现在有两个管理节点的事实可以通过 `SHOW` 命令确认：


  ```

  shell$ ndb_mgm -e "SHOW"

  Connected to Management Server at: 192.168.56.101:1186

  ...

  [ndb_mgmd(MGM)] 2 node(s)

  id=49   @192.168.56.101  (mysql-5.7.16 ndb-7.5.4)

  id=50   @192.168.56.102  (mysql-5.7.16 ndb-7.5.4)

  ```


  现在剩下的就是逐个重新启动数据节点和 API/SQL 节点，它们在重新加入集群时将采用新的配置。为确保数据节点知晓新的连接字符串，请先停止数据节点，然后手动再次启动它们。首先是节点
  ID `1`：


  ```

  shell$ ndb_mgm -e "1 STOP"

  Connected to Management Server at: 192.168.56.101:1186

  Node 1 has shutdown.

  shell$ sudo -u mysql ndbmtd --ndb-nodeid=1

  ```


  然后是节点 ID `2`：


  ```

  shell$ ndb_mgm -e "2 STOP"

  Connected to Management Server at: 192.168.56.101:1186

  Node 2 has shutdown.

  shell$ sudo -u mysql ndbmtd --ndb-nodeid=2

  ```


  最后，可以重新启动两个 API/SQL 节点。如何执行此重启取决于平台、是 SQL 节点还是自定义 API 节点，以及它们的安装方式。因此，请使用适合该安装的方法关闭其中一个
  API 和 SQL 节点，然后再次启动它。继续处理其余的 API 和 SQL 节点。



  #### 添加数据节点


  在集群的生命周期中，可能需要增加数据节点的数量。需要添加更多数据节点的例子包括增加存储容量或为扫描操作提供更多并行度。


  向集群添加额外的数据节点比之前的示例需要更多几个步骤：


  1.  使用新数据节点的详细信息更新集群配置文件 (`config.ini`)。你必须添加一个完整的全新节点组，因此，例如对于 `NoOfReplicas =
  2`，必须添加两个新的数据节点。

  2.  对集群中的现有节点执行滚动重启。重要的是要记住将 API/SQL 节点也包含在这次滚动重启中。

  3.  启动新节点；由于这是它们首次启动，因此这将是一次初始重启。

  4.  为新的数据节点创建一个新的节点组。

  5.  重新组织现有表的分区，将部分现有数据移动到新的数据节点中。

  6.  优化重组后的表以回收可变宽度内存。重组分区等同于在新节点上插入部分数据并在旧节点上删除它。数据的删除将导致碎片，其中用于可变数据的内存可以在线回收。


  本示例开始时的配置如清单 10-4 所示，并且以下管理和数据节点在线：


  ```shell

  shell$ ndb_mgm -e "SHOW"

  Connected to Management Server at: 192.168.56.101:1186

  Cluster Configuration


  [ndbd(NDB)]     2 node(s)

  id=1    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0, *)

  id=2    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0)

  [ndb_mgmd(MGM)] 2 node(s)

  id=49   @192.168.56.101  (mysql-5.7.16 ndb-7.5.4)

  id=50   @192.168.56.102  (mysql-5.7.16 ndb-7.5.4)

  [mysqld(API)]   6 node(s)

  ...

  ```


  在这种情况下，新的数据节点被添加到现有的主机上。当同一台主机上有多个数据节点时，需要注意的一点是确保数据节点不在同一个节点组中；否则可能会引入单点故障。由于已经存在一个节点组，而新的数据节点将构成第二个节点组，因此新的节点组会自动分布到两台主机上，所以在这种情况下，新节点不会引入单点故障。


  第一步是在两个管理节点上更新 `config.ini` 文件以添加新数据节点。这通过添加两个 `[ndbd]` 段来完成：


  ```ini

  [ndbd]

  NodeId                        = 3

  HostName                      = 192.168.56.103

  [ndbd]

  NodeId                        = 4

  HostName                      = 192.168.56.104

  ```


  此时可以执行正常的滚动重启。首先关闭两个管理节点：


  ```shell

  shell$ ndb_mgm -e "49 STOP"

  Connected to Management Server at: 192.168.56.101:1186

  Node 49 has shutdown.

  Disconnecting to allow Management Server to shutdown

  shell$ ndb_mgm -e "50 STOP"

  Connected to Management Server at: 192.168.56.102:1186

  Node 50 has shutdown.

  Disconnecting to allow Management Server to shutdown

  ```


  然后使用 `--reload` 选项重启管理节点：


  ```shell

  shell$ sudo -u mysql ndb_mgmd --config-file=/etc/config.ini \

  --config-dir=/cluster/config --ndb-nodeid=49 –reload

  MySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4

  shell$ sudo -u mysql ndb_mgmd --config-file=/etc/config.ini \

  --config-dir=/cluster/config --ndb-nodeid=50 --reload

  MySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4

  ```


  集群日志显示了新配置：


  ```text

  ...

  2016-11-07 18:15:50 [MgmtSrvr] INFO     -- Detected change of /etc/config.ini on
  disk, will try to set it. This is the actual diff:

  [ndbd(DB)]

  NodeId=3

  Node removed

  [ndbd(DB)]

  NodeId=4

  Node removed

  [TCP]

  NodeId1=1

  NodeId2=3

  Connection removed

  ...

  ```


  在添加新节点时，这个“差异”看起来有点奇怪，因为它提到节点已被移除。然而，实际上所有的更改都已被添加。这包括 `[TCP]` 段。如第 2 章所述，无论节点是否在线，都会在所有可能的节点对之间建立传输连接。集群对
  TCP/IP 传输器设置使用了所有默认值，因此这部分内容直到现在才显示出来，但添加新节点会使管理节点也“发现”新的传输器设置。


  此时，重启两个现有的数据节点；这里也不需要特殊考虑。首先是节点 ID 为 1 的节点：


  ```shell

  shell$ ndb_mgm -e "1 RESTART"

  Connected to Management Server at: 192.168.56.101:1186

  Node 1 is being restarted

  ```


  等待重启完成，然后重启节点 ID 为 2 的数据节点：


  ```shell

  shell$ ndb_mgm -e "2 RESTART"

  Connected to Management Server at: 192.168.56.101:1186

  Node 2 is being restarted

  ```


  一旦第二个数据节点完成重启，根据平台和 API 节点类型（SQL 节点或应用程序），适当地重启每个 API/SQL 节点。重要的是，所有在过程开始时在线的节点都必须被关闭或重启。这是必需的，以便它们都意识到即将添加的新节点，并且有为它们准备的传输器。


  现在的状态是：


  ```shell

  shell$ ndb_mgm -e "SHOW"

  Connected to Management Server at: 192.168.56.101:1186

  Cluster Configuration


  [ndbd(NDB)]     4 node(s)

  id=1    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0, *)

  id=2    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0)

  id=3 (not connected, accepting connect from 192.168.56.103)

  id=4 (not connected, accepting connect from 192.168.56.104)

  ...

  ```


  这表明节点 3 和 4 是集群的一部分，但尚未启动。所以最后，是时候让新的数据节点上线了。由于这是新数据节点第一次启动，因此必须是一次初始启动。两个新节点的初始启动是同时进行的。首先是节点
  ID 为 3 的节点：


  ```shell

  shell$ sudo -u mysql ndbmtd --ndb-nodeid=3 --initial

  2016-11-07 18:35:46 [ndbd] INFO     -- Angel connected to ''192.168.56.101:1186''

  2016-11-07 18:35:46 [ndbd] INFO     -- Angel allocated nodeid: 3

  ```


  接下来，节点 ID 为 4 的节点：


  ```shell

  shell$ sudo -u mysql ndbmtd --ndb-nodeid=4 --initial

  2016-11-07 18:35:48 [ndbd] INFO     -- Angel connected to ''192.168.56.101:1186''

  2016-11-07 18:35:48 [ndbd] INFO     -- Angel allocated nodeid: 4

  ```


  重启完成后，状态为：


  ```shell

  shell$ ndb_mgm -e "SHOW"

  Connected to Management Server at: 192.168.56.101:1186

  Cluster Configuration


  [ndbd(NDB)]     4 node(s)

  id=1    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0, *)

  id=2    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0)

  id=3    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, no nodegroup)

  id=4    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, no nodegroup)

  ...

  ```


  这里需要注意的一点是，新的数据节点已经启动并成为集群的一部分，但没有与之关联的节点组。这意味着表将没有任何分区，因此也不会有任何数据存储在新的数据节点中。为了实际在新节点中存储数据，需要创建一个新的节点组。这可以使用管理客户端完成：


  ```shell

  shell$ ndb_mgm -e "CREATE NODEGROUP 3,4"

  Connected to Management Server at: 192.168.56.101:1186

  Nodegroup 1 created

  ```


  `CREATE NODEGROUP` 命令的参数是要添加到新节点组中的节点 ID，以逗号分隔的列表形式给出。最终状态是：


  ```shell

  shell$ ndb_mgm -e "SHOW"

  Connected to Management Server at: 192.168.56.101:1186

  Cluster Configuration


  [ndbd(NDB)]     4 node(s)

  id=1    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0, *)

  id=2    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0)

  id=3    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 1)

  id=4    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 1)

  ...

  ```



  ##### 重新组织数据


  最后一个任务是确保数据也被添加到新节点中。这将自动适用于所有新表，但现有表必须首先被重新分布。与前面的步骤类似，重新分布数据是一项在线操作。考虑一个在添加新节点之前就存在的表，比如
  `db1.t1`。使用 `ndb_desc` 实用程序查看该表，可以显示当前在各分区间的分布情况（为清晰起见，删除了一些信息）：


  ```

  shell$ ndb_desc --database=db1 t1 -pn

  ...

  -- Per partition info --

  Partition  Row count  Frag fixed memory  Frag varsized memory  Nodes

  0          62992      2031616            3112960               1,2

  1          63392      2064384            3145728               2,1

  ```


  或者，也可以使用 `ndbinfo` 模式：


  ```

  mysql> SELECT node_id, fragment_num,

  SUM(fixed_elem_alloc_bytes) AS FixedMem,

  SUM(var_elem_alloc_bytes) AS VarMem

  FROM ndbinfo.memory_per_fragment

  WHERE fq_name = ''db1/def/t1''

  GROUP BY node_id, fragment_num;

  +---------+--------------+----------+---------+

  | node_id | fragment_num | FixedMem | VarMem  |

  +---------+--------------+----------+---------+

  |       1 |            0 |  2031616 | 3112960 |

  |       1 |            1 |  2064384 | 3145728 |

  |       2 |            0 |  2031616 | 3112960 |

  |       2 |            1 |  2064384 | 3145728 |

  +---------+--------------+----------+---------+

  4 rows in set (0.05 sec)

  ```


  要重新组织现有表中的数据，可以使用如下所示的 `ALTER TABLE` 语句：


  ```

  mysql> ALTER TABLE db1.t1 ALGORITHM=INPLACE, REORGANIZE PARTITION;

  Query OK, 0 rows affected (13.42 sec)

  Records: 0  Duplicates: 0  Warnings: 0

  ```


  注意：在重新组织分区时，无法执行任何其他 DDL 语句。


  新的数据分布如下：


  ```

  mysql> SELECT node_id, fragment_num,

  SUM(fixed_elem_alloc_bytes) AS FixedMem,

  SUM(var_elem_alloc_bytes) AS VarMem

  FROM ndbinfo.memory_per_fragment

  WHERE fq_name = ''db1/def/t1''

  GROUP BY node_id, fragment_num;

  +---------+--------------+----------+---------+

  | node_id | fragment_num | FixedMem | VarMem  |

  +---------+--------------+----------+---------+

  |       1 |            0 |  2031616 | 3112960 |

  |       1 |            1 |  2064384 | 3145728 |

  |       2 |            0 |  2031616 | 3112960 |

  |       2 |            1 |  2064384 | 3145728 |

  |       3 |            2 |  1015808 | 1572864 |

  |       3 |            3 |  1048576 | 1572864 |

  |       4 |            2 |  1015808 | 1572864 |

  |       4 |            3 |  1048576 | 1572864 |

  +---------+--------------+----------+---------+

  8 rows in set (0.09 sec)

  ```


  唯一缺少的是释放旧分区中仍然使用的额外空间。这可以通过对每个表在线使用 `OPTIMIZE TABLE` 来完成。列表 10-5 展示了一个使用 `db1.t1`
  表的示例，以及如何回收部分变宽（动态）内存。


  ```

  mysql> OPTIMIZE TABLE db1.t1;

  +--------+----------+----------+----------+

  | Table  | Op       | Msg_type | Msg_text |

  +--------+----------+----------+----------+

  | db1.t1 | optimize | status   | OK       |

  +--------+----------+----------+----------+

  1 row in set (3.35 sec)

  mysql> SELECT node_id, fragment_num,

  SUM(fixed_elem_alloc_bytes) AS FixedMem,

  SUM(var_elem_alloc_bytes) AS VarMem

  FROM ndbinfo.memory_per_fragment

  WHERE fq_name = ''db1/def/t1''

  GROUP BY node_id, fragment_num;

  +---------+--------------+----------+---------+

  | node_id | fragment_num | FixedMem | VarMem  |

  +---------+--------------+----------+---------+

  |       1 |            0 |  2031616 | 1638400 |

  |       1 |            1 |  2064384 | 1638400 |

  |       2 |            0 |  2031616 | 1638400 |

  |       2 |            1 |  2064384 | 1638400 |

  |       3 |            2 |  1015808 | 1572864 |

  |       3 |            3 |  1048576 | 1572864 |

  |       4 |            2 |  1015808 | 1572864 |

  |       4 |            3 |  1048576 | 1572864 |

  +---------+--------------+----------+---------+

  8 rows in set (0.07 sec)

  ```

  列表 10-5. 整理数据碎片


  可以看出，`OPTIMIZE TABLE` 只回收了变宽内存（动态列格式）的空间。未回收的固定内存仍然可用于新行。唯一能完全回收内存的方法是重建表，例如使用一个空的
  `ALTER TABLE`：


  ```

  mysql> ALTER TABLE db1.t1 ENGINE=NDBCluster;

  Query OK, 126384 rows affected (38.18 sec)

  Records: 126384  Duplicates: 0  Warnings: 0

  ```



  ##### 使用节点组预分配添加数据节点


  另一种添加新数据节点的方法是提前配置集群以包含未来的数据节点，从而避免重启任何现有节点。这可以通过将未来节点的节点组设置为 `65536`（允许的最大值）来实现。例如：


  ```ini

  [ndbd]

  NodeId                        = 3

  NodeGroup                     = 65536

  HostName                      = 192.168.56.103

  [ndbd]

  NodeId                        = 4

  NodeGroup                     = 65536

  HostName                      = 192.168.56.104

  [ndbd]

  NodeId                        = 5

  NodeGroup                     = 65536

  HostName                      = 192.168.56.105

  [ndbd]

  NodeId                        = 6

  NodeGroup                     = 65536

  HostName                      = 192.168.56.106

  ```


  此配置支持将数据节点添加到两个现有主机或两个新主机上。


  关于为未来使用配置额外节点的一个注意事项是，默认情况下，当前数据节点在重启期间会等待未来的节点。这可以从集群日志中看出：


  ```

  2016-11-12 13:07:48 [MgmtSrvr] INFO     -- Node 1: Initial start,

  waiting 13 for 3, 4, 5 and 6 to connect,

  nodes [ all: 1, 2, 3, 4, 5 and 6

  connected: 1 and 2 missing: 3, 4, 5 and 6

  no-wait:

  no-nodegroup: 3, 4, 5 and 6 ]

  ...

  2016-11-12 13:08:01 [MgmtSrvr] INFO     -- Node 1: Initial start

  with nodes 1 and 2 [ missing: 3, 4, 5 and 6 no-wait:  ]

  ```


  上面的日志示例已重新格式化以便于阅读。它表明这是一次初始重启，第二行的第一个注释（在 `13:07:48`）说明集群正在等待另外 `13` 秒让节点 `3`、`4`、`5`
  和 `6`（即为未来节点预留的节点 ID）连接。第一条消息的最后四行显示了节点的摘要，包括所有已知的数据节点列表、已连接的节点、集群不会等待的节点以及没有节点组的节点。这展示了两个有趣的特性：


  *   `no-wait` 部分指的是可以指示数据节点在启动时不等待某些节点的可能性。这可用于跳过等待阶段。

  *   `no-nodegroup` 部分显示 MySQL NDB 集群将 `NodeGroup = 65536` 视为没有节点组。这正是我们能够将数据节点包含在配置中的原因，尽管它们暂时不打算成为集群的一部分。


  避免等待已知不参与重启的节点的选项是 `--nowait-nodes`，如本章前面所述。要跳过等待所有四个未来节点，请按如下方式启动节点：


  ```bash

  shell$ sudo -u mysql ndbmtd --ndb-nodeid=1 --nowait-nodes=3,4,5,6

  ```


  这对于节点 2 是等效的。另一种方法是设置 `StartNoNodeGroupTimeout` 选项，其默认值为 `15000` 毫秒（`15` 秒）。减少超时时间会使节点等待没有节点组的节点的时间缩短。


  此时，集群在线运行，有两个数据节点，并且决定在主机 `192.168.56.103` 和 `192.168.56.104` 上各添加一个节点，就像前面的例子一样。然而，由于节点已经添加到配置中，这次除了让新节点上线外，无需执行任何重启。首先检查集群状态：


  ```bash

  shell$ ndb_mgm -e "SHOW"

  Connected to Management Server at: 192.168.56.101:1186

  Cluster Configuration


  [ndbd(NDB)]     6 node(s)

  id=1    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0, *)

  id=2    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0)

  id=3 (not connected, accepting connect from 192.168.56.103)

  id=4 (not connected, accepting connect from 192.168.56.104)

  id=5 (not connected, accepting connect from 192.168.56.105)

  id=6 (not connected, accepting connect from 192.168.56.106)

  ...

  ```


  然后启动两个新的数据节点：


  ```bash

  shell$ sudo -u mysql ndbmtd --ndb-nodeid=3 --initial

  shell$ sudo -u mysql ndbmtd --ndb-nodeid=4 --initial

  ```


  集群现在处于与前面示例相同的状态，其中新节点已启动：


  ```bash

  shell$ ndb_mgm -e "SHOW"

  Connected to Management Server at: 192.168.56.101:1186

  Cluster Configuration


  [ndbd(NDB)]     6 node(s)

  id=1    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0, *)

  id=2    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0)

  id=3    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, no nodegroup)

  id=4    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, no nodegroup)

  id=5 (not connected, accepting connect from 192.168.56.105)

  id=6 (not connected, accepting connect from 192.168.56.106)

  ...

  ```


  请注意，新节点（`id=3` 和 `id=4`）在启动后显示没有节点组。这正是示例开头配置文件中 `NodeGroup = 65536` 的含义。


  > **提示**

  > 即使在新添加节点的配置中保留 `NodeGroup = 65536` 设置，集群也能正常运行。但是，如果将其移除，会使配置更加清晰。


  随着新数据节点上线，可以创建一个新的节点组：


  ```bash

  shell$ ndb_mgm -e "CREATE NODEGROUP 3,4"

  Connected to Management Server at: 192.168.56.101:1186

  Nodegroup 1 created

  ```


  最后，为每个表重新组织分区。例如，对于 `db1.t1` 表：


  ```sql

  mysql> ALTER TABLE db1.t1 ALGORITHM=INPLACE, REORGANIZE PARTITION;

  Query OK, 0 rows affected (13.42 sec)

  Records: 0  Duplicates: 0  Warnings: 0

  ```


  #### 添加 API/SQL 节点


  添加额外节点过程中最简单的步骤是添加新的 API/SQL 节点。从现有节点的角度来看，这与进行任何其他配置更改没有什么不同：


  1.  更新集群配置文件（`config.ini`），添加新节点。

  2.  执行如前面讨论的滚动重启。

  3.  安装、配置并启动新的 API/SQL 节点。


  添加额外 API/SQL 节点时需要考虑的主要问题是，管理和数据节点将为新节点分配发送和接收缓冲区。如果未配置 `TotalSendBufferMemory`，额外的发送缓冲区将导致总内存使用量随发送缓冲区的大小而增加（TCP
  部分的 `SendBufferMemory` 选项或默认 `2MB`）。如果已配置 `TotalSendBufferMemory`，则需要考虑新节点是否需要增加总发送缓冲区内存池。对于接收缓冲区，内存使用量随接收缓冲区的大小而增加（TCP
  部分的 `ReceiveBufferMemory` 选项或默认 `2MB`）。




  ### NDB 集群恢复与重启指南


  #### 从损坏的 NDB 文件系统中恢复


  其中一个数据节点的 NDB 文件系统可能会损坏。这种情况最可能发生在为本地检查点创建的文件上，通常发生在主机崩溃、节点被`SIGKILL`信号杀死或磁盘故障之后。但其他原因也可能导致此问题。症状是尝试重启数据节点失败。失败重启的一个例子可能是集群日志中出现如下消息：


  ```

  2016-11-16 16:41:40 [MgmtSrvr] ALERT    -- Node 2: Forced node shutdown completed.
  Occured during startphase 5\. Caused by error 2341: ''Internal program error (failed
  ndbrequire)(Internal error, programming error or missing error message, please report
  a bug). Temporary error, restart node''.

  ```


  在此示例中，相应的错误日志消息是：


  ```

  Time: Wednesday 16 November 2016 - 16:42:11

  Status: Temporary error, restart node

  Message: Internal program error (failed ndbrequire) (Internal error, programming
  error or missing error message, please report a bug)

  Error: 2341

  Error data: restore.cpp

  Error object: RESTORE (Line: 507) 0x00000002 Check len < 8192 failed

  Program: ndbmtd

  Pid: 18633 thr: 2

  Version: mysql-5.7.16 ndb-7.5.4

  Trace file name: ndb_2_trace.log.3_t2

  Trace file path: /cluster//ndb_2_trace.log.3 [t1..t4]

  ***EOM***

  ```


  回想一下，启动阶段 5 是恢复本地检查点的地方，这涉及`RESTORE`内核块。在这种情况下，有必要重新创建 NDB 文件系统。也就是说，需要对数据节点执行初始重启。


  数据节点的初始重启会删除 NDB 文件系统中的所有数据节点文件，但日志组文件或表空间文件除外。这意味着：


  *   必须确保同一节点组中有另一个节点处于在线状态。如果不是这种情况，您正在重启的节点要么无法重启，要么会在分区模式下重启且没有数据！

  *   如果存在必须删除的日志组文件或表空间文件，则需要手动删除。如果文件丢失，它们将在重启过程中重新创建。


  请参阅本章开头关于重启类型的讨论。


  #### 初始系统重启


  初始系统重启幸运地是很少发生的事件。以下示例将把配置从使用`MaxNoOfExecutionThreads = 2`（默认值，具有一个 LDM 线程）更改为使用`MaxNoOfExecutionThreads
  = 8`，具有四个 LDM 线程。如第[2]章所讨论的，索引内存分配在 LDM 线程之间，因此将 LDM 线程数量从 2 增加到 8 意味着每个 LDM 线程只有四分之一的可用索引内存量。这意味着，如果任何
  LDM 线程使用的索引内存超过 23.75%（所有索引内存使用的阈值是`IndexMemory`的 95%），则甚至无法使用新配置重启数据节点。因此，最终要能够增加
  LDM 线程，通常需要重新初始化集群并从备份中恢复数据。


  此示例使用的步骤如下：


  1.  使集群变为只读。

  2.  创建数据备份。

  3.  创建模式备份。

  4.  执行重启。

  5.  恢复模式。

  6.  恢复数据。


  因为可能有多个 API/SQL 节点连接到数据节点，所以在步骤 2 和 3 进行集群备份时，确保没有人更改任何数据可能很困难。为了使这更容易，MySQL NDB
  集群支持启用单一用户模式：


  ```

  shell$ ndb_mgm -e "ENTER SINGLE USER MODE 51"

  Connected to Management Server at: 192.168.56.101:1186

  Single user mode entered

  Access is granted for API node 51 only.

  ```


  该命令告诉集群，唯一允许连接的 API/SQL 节点是节点 51。


  提示：如果 SQL 节点使用`ndb_cluster_connection_pool`选项来建立多个连接，则要么使用`ndb_cluster_connection_pool
  = 1`重启，要么有一个用于维护的备用 SQL 节点，且仅有一个连接。


  将其与在 SQL 节点 51 上启用`super_read_only`模式相结合，可以保证不会发生任何更改：


  ```

  mysql> SET GLOBAL super_read_only = ON;

  Query OK, 0 rows affected (0.00 sec)

  ```


  如果这是一个复制从站，还要确保停止复制，因为`super_read_only`标志不适用于复制中的 SQL 线程。


  注意：在 MySQL 7.4 及更早版本中，`super_read_only`选项不存在。相反，有必要使用`read_only`选项，但要注意，在这种情况下，具有`SUPER`特权的用户（包括复制）仍然可以更改数据。


  此时可以进行备份。在此示例中，假设使用`NDBCluster`表的唯一用户创建的模式仅由`world`数据库组成。数据可以使用原生 NDB 备份进行备份，模式可以使用`mysqldump`进行备份：


  ```

  shell$ ndb_mgm -e "START BACKUP"

  Connected to Management Server at: 192.168.56.101:1186

  Waiting for completed, this may take several minutes

  Node 1: Backup 1 started from node 49

  Node 1: Backup 1 started from node 49 completed

  StartGCP: 638 StopGCP: 641

  #Records: 7370 #LogRecords: 0

  Data: 498424 bytes Log: 0 bytes

  shell$ mysqldump --no-data world > backup_world_schemaonly.sql

  ```


  对于生产数据，最好通过将其恢复到不同的集群来确认备份有效，然后再继续。备份验证后，可以对`config.ini`进行配置更改，并且可以关闭集群：


  ```

  shell$ ndb_mgm -e "SHUTDOWN"

  Connected to Management Server at: 192.168.56.101:1186

  4 NDB Cluster node(s) have shutdown.

  Disconnecting to allow management server to shutdown.

  ```


  像往常一样，重启从管理节点开始。即使数据节点将进行初始系统重启，也可以使用`--reload`标志启动这些节点。




  '
- "# 11. 升级与降级\n\n### 摘要\n\n本章介绍了 MySQL NDB 集群中节点启动、停止和重启的过程。重启操作至关重要，因为通过滚动重启，数据库管理员可以在不停机的情况下对集群进行更改。这些更改包括例如配置变更和添加更多节点。你还了解了如何监控重启过程。\n\
  \n本章后半部分专门介绍了一些以重启为核心操作的示例用例。这些示例从一个简单的数据节点选项配置变更开始，接着演示了添加管理节点、数据节点和 API/SQL 节点的过程。最后的两个示例则需要对一个或所有数据节点进行初始重启。\n\
  \n本章未涉及的一个使用滚动重启的示例是升级。执行升级本身就是一个足以覆盖整个章节的庞大主题——而这正是下一章的主题。\n\n```\nshell$ sudo\
  \ -u mysql ndb_mgmd --config-file=/etc/config.ini \\\n--config-dir=/cluster/config\
  \ --ndb-nodeid=49 --reload\nMySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4\n\
  shell$ sudo -u mysql ndb_mgmd --config-file=/etc/config.ini \\\n--config-dir=/cluster/config\
  \ --ndb-nodeid=50 --reload\nMySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4\n\
  ```\n\n当管理节点启动后，就该启动数据节点了。这使用 `--initial` 选项来完成。如果存在任何日志文件组文件和表空间文件，保留它们即可，因为可以被重用。要启动这两个数据节点：\n\
  \n```\nshell$ sudo -u mysql ndbmtd --ndb-nodeid=1 --initial\nshell$ sudo -u mysql\
  \ ndbmtd --ndb-nodeid=2 --initial\n```\n\n最后，重启 API/SQL 节点。\n\n注意\n\n重启前启用的单用户模式和只读模式在重启后不会保持。如果该状态必须在重启后保持，请在重启管理节点后启用单用户模式，并将超级只读模式添加到\
  \ SQL 节点的配置文件中。\n\n要恢复备份，请使用 `mysqldump` 备份的模式来恢复表定义。这确保了表是使用新的默认分区数创建的。如有必要，首先创建数据库。通常除非\
  \ SQL 节点的数据目录也被重新初始化，否则不需要这样做，因此在 `CREATE SCHEMA` 语句中添加了 `IF NOT EXISTS`，并且禁用了 `sql_notes`\
  \ 会话变量以避免虚假的错误和警告。（从技术上讲，使用 `IF NOT EXISTS`，如果模式已存在，会创建一个注解，而非警告。但是，注解是通过警告机制显示的。）然后恢复表定义：\n\
  \n```\nmysql> SET SESSION sql_notes = OFF;\nQuery OK, 0 rows affected (0.00 sec)\n\
  mysql> CREATE SCHEMA IF NOT EXISTS world;\nQuery OK, 1 row affected (0.05 sec)\n\
  mysql> SET SESSION sql_notes = ON;\nQuery OK, 0 rows affected (0.00 sec)\nmysql>\
  \ use world;\nDatabase changed\nmysql> SOURCE backup_world_schemaonly.sql\nQuery\
  \ OK, 0 rows affected (0.00 sec)\n```\n\n你必须删除任何外键；这不会影响数据完整性，并且在外键会在恢复结束时重建索引时恢复。\n\
  \n使用 `ndb_restore` 实用程序恢复数据。这可以对所有数据节点并行进行：\n\n```\nshell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102\
  \ \\\n--backupid=1 --backup-path=/cluster/BACKUP/BACKUP-1 \\\n--restore-data --disable-indexes\
  \ --nodeid=1\nshell$ ndb_restore --ndb-connectstring=192.168.56.101,192.168.56.102\
  \ \\\n--backupid=1 --backup-path=/cluster/BACKUP/BACKUP-1 \\\n--restore-data --disable-indexes\
  \ --nodeid=2\n```\n\n`ndb_restore` 使用的 `--disable-indexes` 选项会禁用索引，因此当所有数据都恢复后，必须重建索引。这可以通过一个命令完成，并且只需提及一个节点\
  \ ID：\n\n```\nshell$ ndb_restore --backupid=1 --backup-path=/cluster/BACKUP/BACKUP-1\
  \ \\\n--rebuild-indexes --nodeid=1\n```\n\n有关恢复备份的更多信息，请参见第 8 章。\n\n至此，集群已准备好重新投入使用。恢复的表将使用四个\
  \ LDM 线程来处理分区的数据。\n\n在许多数据库部署中，升级和降级是痛点，因为它们需要停机。因此，能够执行在线升级和降级是 MySQL NDB 集群的重要特性之一。在线升级和降级对于补丁版本变更（例如从\
  \ 7.5.4 到 7.5.5）以及主要版本变更（例如从 7.4.13 到 7.5.4）都得到支持。从技术角度来看，升级和降级之间几乎没有区别，因此在很大程度上可以视为相同处理。\n\
  \n对在线升级的支持也使得保持使用最新版本更加可行。安装最新版本也意味着拥有所有最新的错误修复，从而提高了集群的稳定性。\n\n提示\n\n在大多数情况下，建议对给定的\
  \ MySQL NDB 集群使用最新的补丁版本。这将确保所有可用的错误修复——包括安全错误的修复——都已应用。\n\n本章将详细讨论升级和降级，包括何时升级的考虑因素以及如何进行。\n\
  \n#### 升级\n\n升级是将 MySQL NDB 集群安装的当前二进制文件替换为更新版本的二进制文件的过程。升级可分为两种主要类型：补丁版本升级和主要版本升级。接下来的章节将讨论这两种升级类型以及升级的考虑因素。升级所需的实际步骤将在本章后面的“执行升级与降级”一节中介绍。\n\
  \n\n\n#### 升级类型\n\nMySQL 版本号包含三个组成部分：`x.y.z`，例如 `7.5.4`。MySQL NDB Cluster 版本号的 `x`\
  \ 组成部分已经多年未变，因此在本章的讨论中，假设只有 `y` 和 `z` 组件会发生变化。这留下了两种升级类型：\n\n*   补丁版本升级：仅 `z` 组件发生变化的升级。\n\
  *   主要版本升级：`y` 组件发生变化的升级。\n\n补丁版本升级通常只包含错误修复，尽管偶尔也可能包含新功能。这意味着，通常补丁版本升级只会引起少数问题。当然，在升级生产系统之前，进行测试和阅读发布说明仍然非常重要。\n\
  \n另一方面，主要版本升级包含重要的新功能或对现有功能的更改。在 MySQL NDB Cluster 最新主要版本中引入的一些主要更改示例包括：\n\n*  \
  \ 版本 `7.3`：引入了外键，并且用于 SQL 节点的 MySQL 服务器版本升级到了 `5.6`。\n*   版本 `7.4`：对重启以及本地检查点和备份的写入进行了重做。\n\
  *   版本 `7.5`：分区平衡、从备份副本读取，并且 MySQL 服务器版本升级到了 `5.7`。\n\n这些更改只是示例，用于说明在主要版本升级中可能预期的更改范围。由于数据节点有重大更改，在某些情况下\
  \ SQL 节点也有重大更改，因此在评估升级和测试阶段进行彻底工作非常重要。另一个对主要版本升级尤其重要的考虑是旧版本和新版本之间的兼容性。\n\n由于可以在线执行升级，因此会存在一段时间，其中部分节点仍在使用旧版本，而其他节点已升级到新版本。这意味着在升级完成之前，必须小心不要开始使用新功能。在某些情况下，需要由\
  \ DBA 和数据库开发人员确保在整个集群可用之前不使用新功能。一个例子是版本 `7.3` 中引入的外键。\n\n在其他情况下，存在可用的配置选项，例如 `7.3.10`、`7.4.7`\
  \ 及更高版本（在 `7.5` 中再次移除）中用于 SQL 节点的 `create_old_temporals` 选项。`create_old_temporals`\
  \ 选项确保使用时间数据类型（如 `TIMESTAMP`）的列使用 MySQL 服务器 `5.5`（在 MySQL NDB Cluster `7.2` 中使用）的格式创建。考虑向后兼容性并不局限于升级期间；如果还需要降级，重要的是在确定不需要降级之前，不要进行任何会阻止降级的更改。\n\
  \n#### 升级考虑因素\n\n升级主要有两个原因：获取错误修复和新功能。每次升级的动机各不相同，没有一个固定的规则可以应用于所有系统来决定何时需要升级。决定升级收益是否大于成本的一些考虑因素包括：\n\
  \n*   通常，对于主要版本内的每个补丁版本，由于错误修复，它会变得更加稳定。\n*   新的监控和调试信息（通常通过 `ndbinfo` 模式——参见第 16\
  \ 章）会随着时间的推移而增加，既包括在补丁版本中，也包括在主要版本升级中。\n*   执行升级的频率越高，每次升级中的更改就越少，因此学习调整/配置新功能的机会就越少。\n\
  *   每次升级都需要测试，这可能有利于不那么频繁的升级。\n*   尽管每个补丁版本都进行了广泛的回归测试，但总存在回归的可能性。在某些情况下，这可能有利于规避已知错误，而不是追逐所有最新的错误修复。\n\
  *   当新的主要版本发布时，引入生产环境总会暴露出在开发期间测试遗漏的错误。这可能有利于在升级到新主要版本之前稍作等待，或者在升级到新主要版本后进行更频繁的补丁版本升级。\n\
  *   主要版本越新，它将看到的错误修复就越多。也就是说，一些错误不会在旧版本中修复。因此，重要的是不要落后最新的主要版本太远。例如，在撰写本书时，版本 `7.2`、`7.3`、`7.4`\
  \ 和 `7.5` 正在积极维护中。在这种情况下，对于大多数用户，建议使用版本 `7.4` 或 `7.5`。\n\n还值得注意的是，在新的主要版本开发期间，会利用机会进行重构，这有助于修复否则难以修复的错误。具有较高回归潜在风险的错误也通常在新主要版本开发阶段修复，以便在引入生产系统之前留出额外的测试时间。这意味着有时获得错误修复的唯一方法是执行主要版本升级。\n\
  \n升级的缺点在于需要评估升级，包括广泛的测试。最终，DBA 需要考虑每个系统，并决定修复错误和获取新功能与测试和准备要求之间的正确平衡。\n\n#### 降级\n\
  \n从基本角度来看，降级与升级相同，只是版本号减少而不是增加。也就是说，在功能兼容性方面还有一些额外的考虑。由于 MySQL NDB Cluster 支持在线升级，要求是在两个主要版本之间不得移除任何功能，除非在升级前版本中提供了替代方案。然而，新功能通常至少会在主要版本升级中引入。一旦使用了新版本中的功能，通常就不再可能进行在线降级。\n\
  \n例如，考虑一个当前使用 MySQL NDB Cluster `7.5.4` 的集群。假设使用第 2 章中描述的全复制表功能创建一个新表：\n\n```sql\n\
  CREATE TABLE t1 (\nid int unsigned NOT NULL,\nval varchar(10) NOT NULL,\nPRIMARY\
  \ KEY (id)\n) ENGINE=ndbcluster COMMENT='NDB_TABLE=FULLY_REPLICATED=1';\n```\n\n\
  如果尝试将包含此表的集群降级到版本 `7.4.13`，在尝试恢复模式时重启将失败：\n\n```\n2016-12-08 21:50:51 [MgmtSrvr]\
  \ ALERT    -- Node 1: Forced node shutdown completed. Occurred during startphase\
  \ 5\\. Caused by error 2355: 'Failure to restore schema(Resource configuration error).\
  \ Permanent error, external action needed'.\n```\n\n这是预期的，DBA 和数据库开发人员有责任在确认不需要降级之前，不使用任何新功能。如果在包含新功能后需要降级，通常必须从备份中恢复数据。\n\
  \n另一个需要考虑的因素是 SQL 节点的其他存储引擎。特别是，`InnoDB` 通常不允许 MySQL 服务器主要版本之间的就地降级。这意味着作为降级的一部分，可能需要重新初始化\
  \ SQL 节点。本章后面的“在线降级”案例研究给出了一个例子。\n\n> **注意**\n>\n> MySQL 服务器不同主要版本之间的权限表通常存在差异。因此，使用\
  \ `CREATE USER` 和 `GRANT` 语句恢复用户和权限通常比尝试恢复权限表的实际内容更容易。\n\n\n\n### 执行升级与降级\n\nMySQL\
  \ NDB Cluster 支持两种执行升级或降级的方法：在线或离线。两者的区别在于，操作期间集群是否可供应用程序使用，或者集群是否将被关闭。在线升级或降级的优点显然是**对应用程序的影响较小**。另一方面，离线升级或降级的优点是**耗时更短、操作更简单**，特别是当您在同一台主机上有多个节点并使用适用于\
  \ MySQL NDB Cluster 7.4 或更早版本的 RPM 或 Debian 包时。此外，在少数罕见情况下，由于存在错误（在撰写本文时，最近一次出现是从\
  \ 7.2.14 或更高版本降级到 7.2.13 及更早版本时），在线操作可能无法进行。\n\n> 注意\n>\n> 在线升级是迄今为止最常用的升级和降级操作类型。因此，离线升级和降级更有可能遇到意外问题。\n\
  \n无论是在线还是离线操作，执行升级或降级的大部分步骤是相同的：\n\n1.  检查 MySQL 参考手册，以确定升级或降级是否有任何特殊注意事项，请访问 [`dev.mysql.com/doc/refman/5.7/en/mysql-cluster-upgrade-downgrade.html`](https://dev.mysql.com/doc/refman/5.7/en/mysql-cluster-upgrade-downgrade.html)。（使用页面右上角的版本选择器可以选择不同版本。）这些信息包括是否可以进行在线升级或降级。\n\
  2.  检查发行说明。关于 MySQL NDB Cluster 升级需要记住的一个重要点是，实际上有**两个升级**在同时进行：MySQL Server（用于\
  \ SQL 节点）和 NDB Cluster。发行说明可在 [`dev.mysql.com/doc/`](https://dev.mysql.com/doc/)\
  \ 页面的右上角区域找到。MySQL Server 5.7 发行说明的直接链接是 [`dev.mysql.com/doc/relnotes/mysql/5.7/en/`](https://dev.mysql.com/doc/relnotes/mysql/5.7/en/)，而\
  \ MySQL NDB Cluster 7.5 的则是 [`dev.mysql.com/doc/relnotes/mysql-cluster/7.5/en/`](https://dev.mysql.com/doc/relnotes/mysql-cluster/7.5/en/)。对于主要版本升级，还建议查看手册的“新增功能”部分——例如，MySQL\
  \ NDB Cluster 7.5 的 [`dev.mysql.com/doc/refman/5.7/en/mysql-nutshell.html`](https://dev.mysql.com/doc/refman/5.7/en/mysql-nutshell.html)\
  \ 和 [`dev.mysql.com/doc/refman/5.7/en/mysql-cluster-what-is-new.html`](https://dev.mysql.com/doc/refman/5.7/en/mysql-cluster-what-is-new.html)。\n\
  3.  **测试升级和降级**。这是非常重要的一步，应确保您已为升级和回滚升级（降级）准备好行动计划。没有良好的测试，实际升级或降级过程中出现问题的可能性会大得多。具体的测试内容很大程度上取决于系统，但请确保同时进行功能测试和性能测试。例如，功能测试必须确保不会出现警告和错误——这可能是因为应用程序使用了已弃用或已移除的功能。性能测试必须包含反映生产负载的工作负载；这将确保，例如，优化器的更改不会导致针对应用程序负载产生更差的查询计划。\n\
  4.  **对集群执行备份**。如果集群还包含除 `NDBCluster` 之外的其他存储引擎的数据，请确保也备份这些数据。\n5.  **执行实际的升级或降级**。此步骤在使用在线或离线操作时有所不同。本节末尾的两个小节将详细介绍。\n\
  6.  **在升级或降级完成后，验证一切是否按预期工作**。\n\n步骤 1-3 应在升级或降级操作时间之前完成，而步骤 4-6 则构成了升级或降级维护窗口本身。图\
  \ 11-1 概述了在线和离线情况下升级集群的过程。以下两个小节将讨论在线和离线操作的具体细节。\n\n> 警告\n>\n> 虽然使用分布式权限（参见第 12\
  \ 章）升级 SQL 节点是可行的，但主要版本之间的降级将无法工作。在降级过程中，禁用分布式权限非常重要。\n\n![A435171_1_En_11_Fig1_HTML.jpg](img/A435171_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1.\n在线和离线操作流程概述\n\n#### 在线升级与降级\n\n执行在线升级或降级的步骤与执行滚动重启相同，区别在于节点关闭时会替换其二进制文件：\n\
  \n1.  如有必要，使用新的配置更新集群配置文件（`config.ini`）。\n2.  关闭管理节点。如果有多个管理节点，应全部关闭。\n3.  替换管理节点的二进制文件。具体操作取决于平台，也取决于使用的是安装程序（例如\
  \ Microsoft Windows Installer .MSI 文件或 RPM 包）还是自解压文件（.zip 或 .tar 下载包）。此步骤将类似于第 5\
  \ 章讨论的安装过程。\n4.  启动管理节点。要读取配置文件（`config.ini`），请使用 `--reload`（在大多数情况下推荐）或 `--initial`\
  \ 命令行选项。\n5.  关闭一个或多个数据节点，**确保每个节点组中至少有一个数据节点保持在线**。与常规滚动重启一样，建议每次不要在同一主机上重启多个数据节点。\n\
  6.  替换在步骤 5 中关闭的数据节点的二进制文件。\n7.  启动离线的数据节点。\n8.  重复步骤 5-7，直到所有数据节点都已重启。\n9.  关闭一个或多个\
  \ API/SQL 节点，**确保始终至少有一个节点在线**。\n10. 替换在步骤 9 中关闭的 API/SQL 节点的二进制文件。\n11. 对于 SQL\
  \ 节点在降级时，如有必要，重新初始化数据目录。\n12. 启动离线的 API/SQL 节点。\n13. 对于 SQL 节点在降级时，如果节点已被重新初始化，请恢复所有非\
  \ `NDBCluster` 表的备份。\n14. 对于 SQL 节点在升级时，执行 `mysql_upgrade` 脚本以升级任何需要升级的表。\n15. 重复步骤\
  \ 9-12，直到所有 API/SQL 节点都已重启。\n\n> 提示\n>\n> API/SQL 节点可以在操作过程的任何阶段进行升级或降级（尽管如果进行了影响\
  \ API/SQL 节点的配置更改，必须首先重启管理节点）。如果 API/SQL 节点与其他节点类型共存于同一主机上，这一点尤其有用，因为在这种情况下，API/SQL\
  \ 可以与主机上的其他节点同时升级或降级。\n\n在滚动升级或降级期间，**重要的是不要使用只有部分节点能处理的功能**；特别是不要使用只有较新版本节点才知晓的功能。\n\
  \n本章末尾的案例研究部分包含一个在线升级和降级的示例。\n\n\n\n#### 离线升级与降级\n\n离线升级和降级比在线流程更简单。它包括关闭集群、替换二进制文件和执行系统重启。步骤如下：\n\
  \n1.  关闭所有 API/SQL 节点。\n2.  关闭管理节点和 SQL 节点。最好的方法是使用管理客户端中的 `SHUTDOWN` 命令：\n\n  \
  \  ```\n    mcm> SHUTDOWN\n    Connected to Management Server at: 192.168.56.101:1186\n\
  \    4 NDB Cluster node(s) have shutdown.\n    Disconnecting to allow management\
  \ server to shutdown.\n    ```\n\n3.  替换所有二进制文件。\n4.  执行管理节点和数据节点的系统重启。\n5.  对于降级时的\
  \ SQL 节点，如果需要，重新初始化数据目录。\n6.  启动 API/SQL 节点。\n7.  对于降级时的 SQL 节点，如果节点被重新初始化，则恢复所有非\
  \ `NDBCluster` 表的备份。\n8.  对于升级时的 SQL 节点，执行 `mysql_upgrade` 脚本来升级任何需要升级的表。\n\n本章末尾有一个离线升级的示例。\n\
  \n### 案例研究\n\n本节通过四个执行升级和降级的示例进行讲解：\n\n*   使用通用二进制文件从 MySQL NDB Cluster 7.4.13 在线升级到\
  \ 7.5.4。在本讨论中，通用二进制文件指的是不使用任何安装程序的 tarball 或 Zip 文件下载。\n*   使用 RPM 从 MySQL NDB Cluster\
  \ 7.4.13 在线升级到 7.5.4。\n*   从 MySQL NDB Cluster 7.5.4 在线降级到 7.4.13。\n*   从 MySQL\
  \ NDB Cluster 7.4.13 离线升级到 7.5.4。\n\n所有示例都使用与第 10 章相同的配置；参见清单 11-1。\n\n```\n[ndb_mgmd\
  \ default]\nDataDir                       = /cluster/\n[ndbd default]\nNoOfReplicas\
  \                  = 2\nDataDir                       = /cluster/\n[ndbd]\nNodeId\
  \                        = 1\nHostName                      = 192.168.56.103\n[ndbd]\n\
  NodeId                        = 2\nHostName                      = 192.168.56.104\n\
  [ndb_mgmd]\nNodeId                        = 49\nHostName                      =\
  \ 192.168.56.101\n[ndb_mgmd]\nNodeId                        = 50\nHostName     \
  \                 = 192.168.56.102\n[mysqld]\nNodeId                        = 51\n\
  HostName                      = 192.168.56.103\n[mysqld]\nNodeId               \
  \         = 52\nHostName                      = 192.168.56.104\n[api]\nNodeId  \
  \                      = 53\nHostName                      = 192.168.56.101\n[api]\n\
  NodeId                        = 54\nHostName                      = 192.168.56.102\n\
  清单 11-1.\n本章使用的集群配置\n```\n\n此外，还假设所有主机都在 `/etc/my.cnf` 中配置了 `ndb_connectstring`，因此无需在命令行中指定它：\n\
  \n```\n[mysql_cluster]\nndb_connectstring          = 192.168.56.101,192.168.56.102\n\
  ```\n\n**提示**\n\n在真实的集群安装中，建议在 `my.cnf` 或 `my.ini` 中也配置 `NodeId` 选项。\n\n#### 使用通用二进制文件进行在线升级\n\
  \n在此示例中，集群从使用 7.4.13 开始，将在线升级到 7.5.4。假设 7.4.13 已经安装并在线：\n\n```\nshell$ ndb_mgm -e\
  \ \"SHOW\"\nConnected to Management Server at: 192.168.56.101:1186\nCluster Configuration\n\
  \n[ndbd(NDB)]     2 node(s)\nid=1    @192.168.56.103  (mysql-5.6.34 ndb-7.4.13,\
  \ Nodegroup: 0, *)\nid=2    @192.168.56.104  (mysql-5.6.34 ndb-7.4.13, Nodegroup:\
  \ 0)\n[ndb_mgmd(MGM)] 2 node(s)\nid=49   @192.168.56.101  (mysql-5.6.34 ndb-7.4.13)\n\
  id=50   @192.168.56.102  (mysql-5.6.34 ndb-7.4.13)\n[mysqld(API)]   6 node(s)\n\
  id=51   @192.168.56.103  (mysql-5.6.34 ndb-7.4.13)\nid=52   @192.168.56.104  (mysql-5.6.34\
  \ ndb-7.4.13)\nid=53 (not connected, accepting connect from 192.168.56.101)\nid=54\
  \ (not connected, accepting connect from 192.168.56.102)\n```\n\n第一步是解包 MySQL NDB\
  \ Cluster 7.5.4 的二进制文件：\n\n```\nshell$ cd /opt/cluster\nshell$ tar -zxf mysql-cluster-gpl-7.5.4-linux-glibc2.5-x86_64.tar.gz\n\
  ```\n\n这应该在所有主机上完成。为了缩短路径，重命名目录：\n\n```\nshell$ mv mysql-cluster-gpl-7.5.4-linux-glibc2.5-x86_64\
  \ 7.5.4\n```\n\n在执行实际升级之前，请确保您有所有数据的备份。\n\n在这个阶段，只需要进行滚动重启，使用新二进制文件执行重启。在此示例中，节点将按以下顺序升级：\n\
  \n1.  管理节点\n2.  数据节点\n3.  SQL 节点\n\n滚动升级的第一步是关闭两个管理节点：\n\n```\nshell$ ndb_mgm -e\
  \ \"49 STOP\"\nConnected to Management Server at: 192.168.56.101:1186\nNode 49 has\
  \ shutdown.\nDisconnecting to allow Management Server to shutdown\nshell$ ndb_mgm\
  \ -e \"50 STOP\"\nConnected to Management Server at: 192.168.56.102:1186\nNode 50\
  \ has shutdown .\nDisconnecting to allow Management Server to shutdown\n```\n\n\
  等待两个管理节点关闭，然后使用升级后的二进制文件重启：\n\n```\nshell$ sudo -u mysql /opt/cluster/7.5.4/bin/ndb_mgmd\
  \ \\\n--config-file=/etc/config.ini --config-dir=/cluster/config \\\n--ndb-nodeid=49\
  \ --reload\nMySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4\nshell$ sudo\
  \ -u mysql /opt/cluster/7.5.4/bin/ndb_mgmd \\\n--config-file=/etc/config.ini --config-dir=/cluster/config\
  \ \\\n--ndb-nodeid=50 –reload\nMySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4\n\
  ```\n\n如果没有配置更改，则 `--reload` 选项不是必需的，但如果配置未更改，它作为 NOOP（无操作）也无妨。检查新状态显示管理节点现在使用的是\
  \ 7.5.4 版本，而集群的其余部分仍然使用 7.4.13：\n\n```\nshell$ ndb_mgm -e \"SHOW\"\nConnected to\
  \ Management Server at: 192.168.56.101:1186\nCluster Configuration\n\n[ndbd(NDB)]\
  \     2 node(s)\nid=1    @192.168.56.103  (mysql-5.6.34 ndb-7.4.13, Nodegroup: 0,\
  \ *)\nid=2    @192.168.56.104  (mysql-5.6.34 ndb-7.4.13, Nodegroup: 0)\n[ndb_mgmd(MGM)]\
  \ 2 node(s)\nid=49   @192.168.56.101  (mysql-5.7.16 ndb-7.5.4)\nid=50   @192.168.56.102\
  \  (mysql-5.7.16 ndb-7.5.4)\n...\n```\n\n现在依次重启每个数据节点。命令行客户端中的 `RESTART` 命令不能在此处使用，因为它不替换二进制文件。因此首先停止一个节点：\n\
  \n```\nshell$ ndb_mgm -e \"1 STOP\"\nConnected to Management Server at: 192.168.56.101:1186\n\
  Node 1 has shutdown.\n```\n\n然后使用新的二进制文件启动它：\n\n```\nshell$ sudo -u mysql /opt/cluster/7.5.4/bin/ndbmtd\
  \ --ndb-nodeid=1\n2016-11-26 19:19:10 [ndbd] INFO     -- Angel connected to '192.168.56.101:1186'\n\
  2016-11-26 19:19:10 [ndbd] INFO     -- Angel allocated nodeid: 1\n```\n\n等待节点完成重启，此时状态为：\n\
  \n```\nshell$ ndb_mgm -e \"SHOW\"\nConnected to Management Server at: 192.168.56.101:1186\n\
  Cluster Configuration\n```\n\n\n即使两个数据节点使用不同版本，应用程序仍可继续使用该集群，但在此阶段确保不使用任何新功能至关重要。然后对另一个数据节点重复相同操作：\n\
  \n```\nshell$ ndb_mgm -e \"2 STOP\"\nConnected to Management Server at: 192.168.56.101:1186\n\
  Node 2 has shutdown.\nshell$ sudo -u mysql /opt/cluster/7.5.4/bin/ndbmtd --ndb-nodeid=2\n\
  2016-11-26 19:21:37 [ndbd] INFO     -- Angel connected to '192.168.56.101:1186'\n\
  2016-11-26 19:21:37 [ndbd] INFO     -- Angel allocated nodeid: 2\n```\n\n至此，只剩下依次升级两个\
  \ SQL 节点。首先升级第一个：\n\n```\nshell$ /opt/cluster/7.4.13/bin/mysqladmin --host=127.0.0.1\
  \ shutdown\nshell$ /opt/cluster/7.5.4/bin/mysqld &\n[1] 9227\n```\n\n确保在 SQL 节点重新上线后执行一次\
  \ `mysql_upgrade`。这必须对每个 SQL 节点都执行，并且重要的是要为新版本使用 `mysql_upgrade`。\n\n```\nshell$\
  \ /opt/cluster/7.5.4/bin/mysql_upgrade --host=127.0.0.1\nChecking if update is needed.\n\
  Checking server version.\nRunning queries to upgrade MySQL server.\nChecking system\
  \ database.\nmysql.columns_priv                                 OK\nmysql.db   \
  \                                        OK\n...\nmysql.user                   \
  \                      OK\nUpgrading the sys schema.\nChecking databases.\nsys.sys_config\
  \                                     OK\nworld.City                           \
  \              OK\nworld.Country                                      OK\nworld.CountryLanguage\
  \                              OK\nUpgrade process completed successfully.\nChecking\
  \ if update is needed.\n```\n\n由于所有检查项都返回 `OK`，因此无需进一步操作。首先检查的是 `mysql` 模式中的系统表。这些包括权限表，它们是最常需要升级的表。`sys`\
  \ 模式是 MySQL Server 5.7（因此也是 MySQL NDB Cluster 7.5）中的新特性，它将由 `mysql_upgrade` 安装。第\
  \ 15 章包含了使用 `sys` 模式的示例。最后，检查所有用户表。\n\n最后一步是升级最后一个 SQL 节点：\n\n```\nshell$ /opt/cluster/7.4.13/bin/mysqladmin\
  \ --host=127.0.0.1 shutdown\nshell$ /opt/cluster/7.5.4/bin/mysqld &\n[1] 8189\n\
  shell$ /opt/cluster/7.5.4/bin/mysql_upgrade --host=127.0.0.1\nChecking if update\
  \ is needed.\nChecking server version.\nRunning queries to upgrade MySQL server.\n\
  Checking system database.\nmysql.columns_priv                                 OK\n\
  mysql.db                                           OK\n...\nmysql.user         \
  \                                OK\nFound empty sys database. Installing the sys\
  \ schema.\nUpgrading the sys schema.\nThe sys schema is already up to date (version\
  \ 1.5.1).\nChecking databases.\nsys.sys_config                                 \
  \    OK\nworld.City                                         OK\nworld.Country  \
  \                                    OK\nworld.CountryLanguage                 \
  \             OK\nUpgrade process completed successfully.\nChecking if update is\
  \ needed.\n```\n\n这里需要注意 `sys` 数据库被报告为空。当 `sys` 模式在第一个 SQL 节点上安装时，通过自动模式分发，该模式也会在第二个\
  \ SQL 节点上创建。然而，由于 `sys` 模式的对象都不是 `NDBCluster` 表，因此在后续待升级的 SQL 节点上该数据库将是空的。`mysql_upgrade`\
  \ 会确保 `sys` 模式仍然被安装。\n\n升级后的最终状态是：\n\n```\nshell$ ndb_mgm -e \"SHOW\"\nConnected\
  \ to Management Server at: 192.168.56.101:1186\nCluster Configuration\n\n[ndbd(NDB)]\
  \     2 node(s)\nid=1    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0,\
  \ *)\nid=2    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0)\n[ndb_mgmd(MGM)]\
  \ 2 node(s)\nid=49   @192.168.56.101  (mysql-5.7.16 ndb-7.5.4)\nid=50   @192.168.56.102\
  \  (mysql-5.7.16 ndb-7.5.4)\n[mysqld(API)]   6 node(s)\nid=51   @192.168.56.103\
  \  (mysql-5.7.16 ndb-7.5.4)\nid=52   @192.168.56.104  (mysql-5.7.16 ndb-7.5.4)\n\
  id=53 (not connected, accepting connect from 192.168.56.101)\nid=54 (not connected,\
  \ accepting connect from 192.168.56.102)\n```\n\n\n\n#### 从 7.4 升级到 7.5（使用 RPM）\n\
  \n在 MySQL NDB Cluster 7.4 及更早版本中，使用 RPM 安装 MySQL NDB Cluster 的系统进行升级和降级的一个难点是，集群节点使用的所有二进制文件都包含在同一个\
  \ RPM 中。服务器 RPM 包含了 `mysqld`、`ndb_mgmd`、`ndbd` 和 `ndbmtd`。这使得在单个主机上安装了多个节点的情况下，仅升级部分节点变得更加困难。这一点在\
  \ 7.5 版本中发生了变化，每种节点类型现在都有自己的 RPM 软件包。\n\n##### RPM 软件包结构\n\n7.4.13 RPM 捆绑包中提供的 RPM\
  \ 有：\n\n```\nshell$ ls -1\nMySQL-Cluster-client-gpl-7.4.13-1.el7.x86_64.rpm\nMySQL-Cluster-devel-gpl-7.4.13-1.el7.x86_64.rpm\n\
  MySQL-Cluster-embedded-gpl-7.4.13-1.el7.x86_64.rpm\nMySQL-Cluster-server-gpl-7.4.13-1.el7.x86_64.rpm\n\
  MySQL-Cluster-shared-compat-gpl-7.4.13-1.el7.x86_64.rpm\nMySQL-Cluster-shared-gpl-7.4.13-1.el7.x86_64.rpm\n\
  MySQL-Cluster-test-gpl-7.4.13-1.el7.x86_64.rpm\n```\n\n将此与 7.5.4 RPM 捆绑包中提供的 RPM\
  \ 进行比较：\n\n```\nshell$ ls -1\nmysql-cluster-community-auto-installer-7.5.4-1.el7.x86_64.rpm\n\
  mysql-cluster-community-client-7.5.4-1.el7.x86_64.rpm\nmysql-cluster-community-common-7.5.4-1.el7.x86_64.rpm\n\
  mysql-cluster-community-data-node-7.5.4-1.el7.x86_64.rpm\nmysql-cluster-community-devel-7.5.4-1.el7.x86_64.rpm\n\
  mysql-cluster-community-embedded-7.5.4-1.el7.x86_64.rpm\nmysql-cluster-community-embedded-compat-7.5.4-1.el7.x86_64.rpm\n\
  mysql-cluster-community-embedded-devel-7.5.4-1.el7.x86_64.rpm\nmysql-cluster-community-java-7.5.4-1.el7.x86_64.rpm\n\
  mysql-cluster-community-libs-7.5.4-1.el7.x86_64.rpm\nmysql-cluster-community-libs-compat-7.5.4-1.el7.x86_64.rpm\n\
  mysql-cluster-community-management-server-7.5.4-1.el7.x86_64.rpm\nmysql-cluster-community-memcached-7.5.4-1.el7.x86_64.rpm\n\
  mysql-cluster-community-ndbclient-7.5.4-1.el7.x86_64.rpm\nmysql-cluster-community-ndbclient-devel-7.5.4-1.el7.x86_64.rpm\n\
  mysql-cluster-community-server-7.5.4-1.el7.x86_64.rpm\nmysql-cluster-community-test-7.5.4-1.el7.x86_64.rpm\n\
  ```\n\n##### 直接升级尝试失败\n\n此示例开始时安装了以下 RPM：\n\n```\nshell$ rpm -qa | grep MySQL-Cluster\n\
  MySQL-Cluster-client-gpl-7.4.13-1.el7.x86_64\nMySQL-Cluster-shared-compat-gpl-7.4.13-1.el7.x86_64\n\
  MySQL-Cluster-server-gpl-7.4.13-1.el7.x86_64\nMySQL-Cluster-shared-gpl-7.4.13-1.el7.x86_64\n\
  MySQL-Cluster-devel-gpl-7.4.13-1.el7.x86_64\n```\n\n如果采用直接升级尝试，由于 RPM 的变更，升级将会失败：\n\
  \n```\nshell$ yum upgrade \\\nmysql-cluster-community-auto-installer-7.5.4-1.el7.x86_64.rpm\
  \ \\\nmysql-cluster-community-client-7.5.4-1.el7.x86_64.rpm \\\nmysql-cluster-community-common-7.5.4-1.el7.x86_64.rpm\
  \ \\\nmysql-cluster-community-data-node-7.5.4-1.el7.x86_64.rpm \\\nmysql-cluster-community-devel-7.5.4-1.el7.x86_64.rpm\
  \ \\\nmysql-cluster-community-java-7.5.4-1.el7.x86_64.rpm \\\nmysql-cluster-community-libs-7.5.4-1.el7.x86_64.rpm\
  \ \\\nmysql-cluster-community-libs-compat-7.5.4-1.el7.x86_64.rpm \\\nmysql-cluster-community-management-server-7.5.4-1.el7.x86_64.rpm\
  \ \\\nmysql-cluster-community-ndbclient-7.5.4-1.el7.x86_64.rpm \\\nmysql-cluster-community-ndbclient-devel-7.5.4-1.el7.x86_64.rpm\
  \ \\\nmysql-cluster-community-server-7.5.4-1.el7.x86_64.rpm\nLoaded plugins: langpacks,\
  \ ulninfo\nExamining mysql-cluster-community-auto-installer-7.5.4-1.el7.x86_64.rpm:\
  \ mysql-cluster-community-auto-installer-7.5.4-1.el7.x86_64\nPackage mysql-cluster-community-auto-installer\
  \ not installed, cannot update it. Run yum install to install it instead.\n...\n\
  Package mysql-cluster-community-server not installed, cannot update it. Run yum\
  \ install to install it instead.\nNo packages marked for update\n```\n\n由于 MySQL\
  \ NDB Cluster 7.4.13 已经安装，遵循错误信息中建议的安装 RPM 而非执行升级的操作同样无效。\n\n##### 卸载旧 RPM\n\n因此，必须先卸载旧的\
  \ RPM，这需要为 `rpm` 命令使用 `--nodeps` 选项：\n\n```\nshell$ rpm -e --nodeps \\\nMySQL-Cluster-client-gpl-7.4.13-1.el7.x86_64\
  \ \\\nMySQL-Cluster-shared-compat-gpl-7.4.13-1.el7.x86_64 \\\nMySQL-Cluster-server-gpl-7.4.13-1.el7.x86_64\
  \ \\\nMySQL-Cluster-shared-gpl-7.4.13-1.el7.x86_64 \\\nMySQL-Cluster-devel-gpl-7.4.13-1.el7.x86_64\n\
  ```\n\n**注意**\n卸载服务器 RPM 会将 `/etc/my.cnf` 文件重命名为 `/etc/my.cnf.rpmsave`。如果您重新安装服务器\
  \ RPM，请务必恢复旧的配置。\n\n##### 安装新 RPM\n\n然后就可以为主机安装所需的新 RPM 了。例如，对于一个数据节点：\n\n```\n\
  shell$ yum localinstall \\\nmysql-cluster-community-data-node-7.5.4-1.el7.x86_64.rpm\
  \ \\\nmysql-cluster-community-ndbclient-7.5.4-1.el7.x86_64.rpm\nLoaded plugins:\
  \ langpacks, ulninfo\nExamining mysql-cluster-community-data-node-7.5.4-1.el7.x86_64.rpm:\
  \ mysql-cluster-community-data-node-7.5.4-1.el7.x86_64\nMarking mysql-cluster-community-data-node-7.5.4-1.el7.x86_64.rpm\
  \ to be installed\nExamining mysql-cluster-community-ndbclient-7.5.4-1.el7.x86_64.rpm:\
  \ mysql-cluster-community-ndbclient-7.5.4-1.el7.x86_64\nMarking mysql-cluster-community-ndbclient-7.5.4-1.el7.x86_64.rpm\
  \ to be installed\n...\nInstalling : mysql-cluster-community-data-node-7.5.4-1.el7.x86_64\
  \      1/2\nInstalling : mysql-cluster-community-ndbclient-7.5.4-1.el7.x86_64  \
  \    2/2\nVerifying  : mysql-cluster-community-ndbclient-7.5.4-1.el7.x86_64    \
  \  1/2\nVerifying  : mysql-cluster-community-data-node-7.5.4-1.el7.x86_64      2/2\n\
  Installed:\nmysql-cluster-community-data-node.x86_64 0:7.5.4-1.el7\nmysql-cluster-community-ndbclient.x86_64\
  \ 0:7.5.4-1.el7\nComplete!\n```\n\n另一种方法是直接使用 `rpm` 命令安装。这样做的好处是可以使用 `--noscripts`\
  \ 选项，从而不执行 RPM 脚本片段。避免执行脚本片段对于在同一主机上安装了 SQL 节点以及管理节点或数据节点的 7.4 及更早版本尤其有利，因为它可以避免\
  \ SQL 节点自动启动。\n\n使用 RPM 升级过程的其余部分与上一个案例研究中的通用二进制文件情况相同。\n\n##### 处理依赖错误\n\n使用 RPM\
  \ 时可能出现的问题之一是，新版本的 MySQL NDB Cluster 依赖于不同于旧版本的库。在这种情况下，尝试安装新的 RPM 软件包可能会产生如下错误：\n\
  \n```\nshell$ yum remove mysql-cluster-community-ndbclient-7.5.4-1.el7.x86_64.rpm\n\
  Loaded plugins: langpacks, ulninfo\nNo Match for argument: mysql-cluster-community-ndbclient-7.5.4-1.el7.x86_64.rpm\n\
  No Packages marked for removal\n[root@ol7 rpm]# yum localinstall mysql-cluster-community-server-7.5.4-1.el7.x86_64.rpm\n\
  Loaded plugins: langpacks, ulninfo\nExamining mysql-cluster-community-server-7.5.4-1.el7.x86_64.rpm:\
  \ mysql-cluster-community-server-7.5.4-1.el7.x86_64\nMarking mysql-cluster-community-server-7.5.4-1.el7.x86_64.rpm\
  \ to be installed\nResolving Dependencies\n--> Running transaction check\n---> Package\
  \ mysql-cluster-community-server.x86_64 0:7.5.4-1.el7 will be installed\n--> Processing\
  \ Dependency: mysql-cluster-community-common(x86-64) = 7.5.4-1.el7 for package:\
  \ mysql-cluster-community-server-7.5.4-1.el7.x86_64\n--> Processing Dependency:\
  \ mysql-cluster-community-client(x86-64) >= 5.7.9 for package: mysql-cluster-community-server-7.5.4-1.el7.x86_64\n\
  --> Finished Dependency Resolution\nError: Package: mysql-cluster-community-server-7.5.4-1.el7.x86_64\
  \ (/mysql-cluster-community-server-7.5.4-1.el7.x86_64)\n           Requires: mysql-cluster-community-client(x86-64)\
  \ >= 5.7.9\nError: Package: mysql-cluster-community-server-7.5.4-1.el7.x86_64 (/mysql-cluster-community-server-7.5.4-1.el7.x86_64)\n\
  \           Requires: mysql-cluster-community-common(x86-64) = 7.5.4-1.el7\n   \
  \        You could try using --skip-broken to work around the problem\n```\n\n如果使用\
  \ `rpm` 命令而不是 `yum`，报告的错误信息会略有不同：\n\n\n"
- '# 依赖性错误处理

  ```shell

  shell$ rpm -ivh mysql-cluster-community-server-7.5.4-1.el7.x86_64.rpm

  error: Failed dependencies:

  mysql-cluster-community-client(x86-64) >= 5.7.9 is needed by mysql-cluster-community-server-7.5.4-1.el7.x86_64

  mysql-cluster-community-common(x86-64) = 7.5.4-1.el7 is needed by mysql-cluster-community-server-7.5.4-1.el7.x86_64

  ```


  在这种情况下，这是因为 MySQL NDB Cluster 服务器 RPM 已被拆分为多个 RPM，以便更大程度地选择要安装的二进制文件。在其他情况下，可能是需要新库或现有库的更新版本。在所有情况下，请阅读错误消息以查看哪个依赖项未满足。然后在
  `yum` 或 `rpm` 命令中包含提供缺失依赖项的包。


  #### 在线降级


  本示例中执行的降级与第一个案例研究中执行的升级相反。也就是说，集群将从使用版本 7.5.4 开始，降级到版本 7.4.13：


  ```shell

  shell$ ndb_mgm -e "SHOW"

  Connected to Management Server at: 192.168.56.101:1186

  Cluster Configuration


  [ndbd(NDB)]     2 node(s)

  id=1    @192.168.56.103  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0, *)

  id=2    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4, Nodegroup: 0)

  [ndb_mgmd(MGM)] 2 node(s)

  id=49   @192.168.56.101  (mysql-5.7.16 ndb-7.5.4)

  id=50   @192.168.56.102  (mysql-5.7.16 ndb-7.5.4)

  [mysqld(API)]   6 node(s)

  id=51   @192.168.56.103  (mysql-5.7.16 ndb-7.5.4)

  id=52   @192.168.56.104  (mysql-5.7.16 ndb-7.5.4)

  id=53 (not connected, accepting connect from 192.168.56.101)

  id=54 (not connected, accepting connect from 192.168.56.102)

  id=55 (not connected, accepting connect from any host)

  id=56 (not connected, accepting connect from any host)

  ```


  假设 7.4.13 二进制文件已在所有主机上准备就绪。


  照例，最佳实践是从创建备份开始。由于在降级过程中比升级更可能遇到复杂情况，因此确保备份可用尤为重要。由于 SQL 节点将作为降级的一部分重新初始化，因此必须拥有所有非
  `NDBCluster` 数据的备份。还值得拥有包含 `NDBCluster` 表的模式的 `CREATE DATABASE` 语句列表。可以使用以下查询创建此列表：


  ```sql

  mysql> SELECT DISTINCT

  CONCAT(''CREATE SCHEMA IF NOT EXISTS `'', SCHEMA_NAME, ''`;'')

  FROM information_schema.SCHEMATA

  INNER JOIN information_schema.TABLES ON

  TABLES.TABLE_SCHEMA = SCHEMATA.SCHEMA_NAME

  WHERE TABLES.ENGINE = ''ndbcluster''

  AND SCHEMATA.SCHEMA_NAME != ''mysql'';

  +------------------------------------------------------------+

  | CONCAT(''CREATE SCHEMA IF NOT EXISTS `'', SCHEMA_NAME, ''`;'') |

  +------------------------------------------------------------+

  | CREATE SCHEMA IF NOT EXISTS `world`;                       |

  +------------------------------------------------------------+

  1 row in set (0.02 sec)

  ```


  备份就绪后，管理节点和数据节点的降级遵循与升级相同的步骤。首先关闭两个管理节点，然后使用 7.4.13 二进制文件重新启动它们：


  ```shell

  shell$ ndb_mgm -e "49 STOP"

  Connected to Management Server at: 192.168.56.101:1186

  Node 49 has shutdown.

  Disconnecting to allow Management Server to shutdown

  shell$ ndb_mgm -e "50 STOP"

  Connected to Management Server at: 192.168.56.102:1186

  Node 50 has shutdown.

  Disconnecting to allow Management Server to shutdown

  ```


  在 `NodeId = 49` 的管理节点所在主机上：


  ```shell

  shell$ sudo -u mysql /opt/cluster/7.4.13/bin/ndb_mgmd \

  --config-file=/etc/config.ini --config-dir=/cluster/config \

  --ndb-nodeid=49 --reload

  ```


  对于 `NodeId = 50` 也类似：


  ```shell

  shell$ sudo -u mysql /opt/cluster/7.4.13/bin/ndb_mgmd \

  --config-file=/etc/config.ini --config-dir=/cluster/config \

  --ndb-nodeid=50 --reload

  ```


  管理节点降级后，继续处理数据节点。首先降级 `NodeId = 1` 的数据节点：


  ```shell

  shell$ ndb_mgm -e "1 STOP"

  Connected to Management Server at: 192.168.56.101:1186

  Node 1 has shutdown.

  shell$ sudo -u mysql /opt/cluster/7.4.13/bin/ndbmtd --ndb-nodeid=1

  2016-12-17 18:21:32 [ndbd] INFO     -- Angel connected to ''192.168.56.101:1186''

  2016-12-17 18:21:32 [ndbd] INFO     -- Angel allocated nodeid: 1

  ```


  对于 `NodeId = 2`：


  ```shell

  shell$ ndb_mgm -e "2 STOP"

  Connected to Management Server at: 192.168.56.101:1186

  Node 2 has shutdown.

  shell$ sudo -u mysql /opt/cluster/7.4.13/bin/ndbmtd --ndb-nodeid=2

  2016-12-17 18:55:42 [ndbd] INFO     -- Angel connected to ''192.168.56.101:1186''

  2016-12-17 18:55:42 [ndbd] INFO     -- Angel allocated nodeid: 2

  ```


  降级的最后部分是 SQL 节点，这也是最困难的部分。MySQL NDB Cluster 7.5.4 将包含一些 `InnoDB` 表，因为 MySQL Server
  5.7（用于 NDB Cluster 7.5）需要这些表。MySQL Server 5.7 和 MySQL Server 5.6（用于 NDB Cluster
  7.4）之间的 `InnoDB` 不兼容。虽然 MySQL 知道如何在升级时处理此问题，但不支持 `InnoDB` 的降级。因此，SQL 节点必须重新初始化。


  要降级第一个 SQL 节点，首先将其关闭：


  ```shell

  shell$ /opt/cluster/7.5.4/bin/mysqladmin --host=127.0.0.1 shutdown

  ```


  要重新初始化 SQL 节点，首先删除数据目录中的所有内容以及位于数据目录外的任何 `InnoDB`（或其他存储引擎的文件）。例如，如果 `datadir = /var/lib/mysql`
  且所有文件都存储在此目录中，则可以按如下方式进行重新初始化：


  ```shell

  shell$ rm -rf /var/lib/mysql

  shell$ mkdir /var/lib/mysql

  shell$ chown mysql:mysql /var/lib/mysql

  shell$ /opt/cluster/7.4.13/scripts/mysql_install_db \

  --basedir=/opt/cluster/7.4.13 --datadir=/var/lib/mysql \

  --user=mysql

  Installing MySQL system tables...

  ...

  ```


  然后可以再次启动该节点：


  ```shell

  shell$ /opt/cluster/7.4.13/bin/mysqld &

  ```


  恢复 SQL 节点的非 `NDBCluster` 数据——包括重新设置权限。最后对其他 SQL 节点重复此操作。


  #### 离线升级


  第四个也是最后一个示例将是一次离线升级。与之前的升级示例一样，它将从版本 `7.4.13` 升级到 `7.5.4`。示例开始时，MySQL NDB 集群 `7.4.13`
  已安装并处于在线状态：


  ```

  shell$ ndb_mgm -e "SHOW"

  Connected to Management Server at: 192.168.56.101:1186

  Cluster Configuration


  [ndbd(NDB)]     2 node(s)

  id=1    @192.168.56.103  (mysql-5.6.34 ndb-7.4.13, Nodegroup: 0, *)

  id=2    @192.168.56.104  (mysql-5.6.34 ndb-7.4.13, Nodegroup: 0)

  [ndb_mgmd(MGM)] 2 node(s)

  id=49   @192.168.56.101  (mysql-5.6.34 ndb-7.4.13)

  id=50   @192.168.56.102  (mysql-5.6.34 ndb-7.4.13)

  [mysqld(API)]   6 node(s)

  id=51   @192.168.56.103  (mysql-5.6.34 ndb-7.4.13)

  id=52   @192.168.56.104  (mysql-5.6.34 ndb-7.4.13)

  id=53 (not connected, accepting connect from 192.168.56.101)

  id=54 (not connected, accepting connect from 192.168.56.102)

  ```


  像往常一样，首先创建备份。然后作为关闭过程的第一步，停止 SQL 节点。关闭 SQL 节点的确切方法取决于平台和所使用的二进制文件。SQL 节点离线后，使用管理客户端中的
  `SHUTDOWN` 命令关闭管理节点和数据节点：


  ```

  shell$ ndb_mgm -e "SHUTDOWN"

  Connected to Management Server at: 192.168.56.101:1186

  4 NDB Cluster node(s) have shutdown.

  Disconnecting to allow management server to shutdown.

  ```


  等待关机完成，然后替换所有二进制文件，并使用升级后的二进制文件重新启动集群。首先启动管理节点：


  ```

  shell$ sudo -u mysql ndb_mgmd --config-file=/etc/config.ini \

  --config-dir=/cluster/config --ndb-nodeid=49 –reload

  MySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4

  shell$ sudo -u mysql ndb_mgmd --config-file=/etc/config.ini \

  --config-dir=/cluster/config --ndb-nodeid=50 --reload

  MySQL Cluster Management Server mysql-5.7.16 ndb-7.5.4

  ```


  下一步是启动数据节点。并行启动两个数据节点以缩短重启所需时间：


  ```

  shell$ sudo -u mysql ndbmtd --ndb-nodeid=1

  2016-12-17 20:13:25 [ndbd] INFO     -- Angel connected to ''192.168.56.101:1186''

  2016-12-17 20:13:25 [ndbd] INFO     -- Angel allocated nodeid: 1

  ```


  另一个数据节点：


  ```

  shell$ sudo -u mysql ndbmtd --ndb-nodeid=2

  2016-12-17 20:13:35 [ndbd] INFO     -- Angel connected to ''192.168.56.101:1186''

  2016-12-17 20:13:35 [ndbd] INFO     -- Angel allocated nodeid: 2

  ```


  当数据节点完成重启后，根据平台要求逐一启动 SQL 节点。在每个 SQL 节点启动后，务必执行 `mysql_upgrade` 以检查和升级表：


  ```

  shell$ mysql_upgrade --host=127.0.0.1

  Checking if update is needed.

  Checking server version.

  Running queries to upgrade MySQL server.

  ...

  Upgrade process completed successfully.

  Checking if update is needed.

  ```


  ### 总结


  升级和降级在最好的情况下也是不简单的任务，如果还涉及主要版本的变更，则可能需要大量的工作。在某些环境中，一次升级需要准备数月时间。MySQL NDB 集群提供了一些便利，因为升级——以及可能的降级——可以在线执行。


  本章讨论了在线和离线流程的升级和降级步骤。此外，还提供了四个不同升级和降级场景的案例研究。


  下一章将讨论 MySQL NDB 集群中的安全注意事项。


  '
- '# 12. 安全注意事项


  在互联网的早期，人们并没有过多考虑全球安装软件的安全性。网络连接未加密，因此包括密码在内的网络流量都可以以明文形式查看（还记得 `telnet` 吗？）。即使在今天，软件或硬件设备交付时使用标准默认密码或管理帐户无密码的情况也很常见。这种安全级别不符合当今的标准。本章从
  MySQL NDB 集群的角度讨论安全性。其中一些问题和解决方案绝非 MySQL NDB 集群所独有；另一些则非常具体。


  讨论的一些主题同样属于第 3、4 和 5 章（即集群最初规划和设置的阶段）。然而，认为安全性——包括网络配置的安全性——是一项一劳永逸的任务是错误的。它应该是初始设计和日常任务的一部分，以评估和维护集群的安全性。


  注意


  本章侧重于软件方面。硬件的物理安全也很重要，以及心怀不满或不诚实员工带来的风险。将服务器机房门未上锁让任何人随意进入，对于保护服务器安全作用甚微。同样，你也不希望一名日常工作需要访问你数据的员工将数据出售给最高出价者。



  ### 网络安全


  集群中的各个节点通常通过 TCP/IP 网络进行通信。由于低延迟和高吞吐量对 NDB 集群至关重要，因此在进行网络设置时（最好使用专用网络进行集群节点间通信）需要仔细权衡一些妥协方案。为了最小化网络流量的开销，节点间通信以明文（非加密）方式进行。此外，当节点加入集群时没有进行身份验证。简而言之，这意味着能够连接到数据节点的客户端也能够检索存储在其中的数据。因此，在配置网络时，将安全性放在首位至关重要。


  为了说明数据如何在网络流量中以明文可见，在插入一行数据时捕获了通过网络传输的数据：


  ```

  mysql> INSERT INTO employee (EmployeeID, FirstName, Surname, IsManager)

  VALUES (101, ''Jane'', ''Doe'', ''Yes'');

  Query OK, 1 row affected (0.00 sec)

  ```


  生成的包含网络捕获的文件可以检索到数据（仅显示一个网络数据包）：


  ```

  shell$ xxd  /tmp/insert.dump

  0000000: 2420 0040 3c01 1008 f702 f704 7c08 6d00  $ .@<.......|.m.

  0000010: 0400 0000 0000 0000 5ba1 9712 00c4 50a8  .............P.

  0000020: 0200 f500 1400 0100 0100 0000 e314 0000  ................

  0000030: 0033 8000 0000 0000 0000 0000 3300 0880  .3..........3...

  0000040: 4400 0000 0816 0000 0000 0000 0000 0000  D...............

  0000050: 0100 0000 0900 0000 6500 0000 0400 0000  ........e.......

  0000060: 6500 0000 0500 0100 044a 616e 6500 0000  e........Jane...

  0000070: 0400 0200 0344 6f65 0100 0300 0200 0000  .....Doe........

  ```


  最后两行是此示例中最值得关注的部分。注意从右侧的 ASCII 输出中可以读取到 Jane Doe。行中的其他值也是可见的，但对人类来说不太容易看出。例如，`EmployeeId`
  是 101，其十六进制为 65，这是倒数第二行的第一个字节。因此，虽然数据包格式高效（且相对易于调试），但从安全角度来看，任务在于防止未经授权的用户监听流量。


  保护集群免受未经授权访问的最简单且最有效的方法是设置两个网络层级：一个内部网络用于 MySQL NDB 集群节点之间，一个外部网络用于访问 SQL 节点或应用程序。这样做还有一个额外优势，即内部网络可以专用于集群节点间的通信，从而提高稳定性。请记住，MySQL
  NDB 集群是一个“故障即停机”系统，因此网络拥塞可能被解释为网络故障，导致集群关闭一个或多个节点。


  图 [12-1 展示了一个集群如何通过内部网络连接两个 SQL 节点、两个数据节点和两个管理节点，并且 SQL 节点可以通过防火墙从外部访问。设置网络还有其他选项，但为了确保安全配置，所有选项都应遵循相同的原则，即将不安全的通信与集群外部网络完全物理隔离。


  Caution


  如果 SQL 节点与管理节点或数据节点安装在同一主机上，请确保只允许连接到 SQL 节点。


  ![A435171_1_En_12_Fig1_HTML.jpg](img/A435171_1_En_12_Fig1_HTML.jpg)


  图 12-1.


  集群安全网络设置示例


  ### 更新


  保持集群安全的一个重要部分是保持其更新。这不仅适用于 MySQL NDB 集群，也适用于操作系统、网络设备的固件等。整个技术栈都应保持最新，以确保不仅所有用户级错误得到修复，所有安全漏洞也得到修复。


  不同的软件供应商处理安全漏洞的方式不同。这意味着您需要验证与集群安装相关的每个供应商的策略，包括基础设施部分。建议您记录这些策略，并与所有相关参考文献一起存放在一个中心位置，以便于查阅详细信息。在某些情况下，可能还会有计划地发布有关安全漏洞修复的信息，这些信息应纳入集群的维护计划。


  MySQL NDB 集群的供应商 Oracle Corporation 有一个政策，即每季度发布一次针对 Oracle 产品安全修复的更新。这些更新称为关键补丁更新（CPU），分别在
  1 月、4 月、7 月和 10 月最接近该月 17 日的星期二发布。有关发布时间表和各个版本参考的详细信息可在 [`www.oracle.com/technetwork/topics/security/alerts-086861.html`](https://www.oracle.com/technetwork/topics/security/alerts-086861.html)
  找到。


  Caution


  有时，如果错误不影响应用程序或有解决方法，跳过普通错误修复的更新是可以接受的。但是，请小心忽略安全错误的补丁。用于确定系统是否受给定安全漏洞影响的信息可能非常有限。因此，通常最安全的方法是始终确保应用所有安全补丁。


  ### SQL 节点中的账户和权限


  除了保持系统使用关键错误修复保持最新之外，主要的持续安全相关工作是用户管理。SQL 节点附带与 MySQL Server 相同的内置权限系统，并增加了支持分发权限的功能。也就是说，将它们存储在
  `NDBCluster` 表中，而不是通常的 `MyISAM` 表中。使用分布式权限意味着所有 SQL 节点都定义了相同的用户和权限。


  Note


  MySQL Server 8.0 将权限表更改为使用 `InnoDB` 存储引擎进行本地存储的权限。然而，在撰写本文时，还没有可用的 MySQL NDB 集群版本（即使是预览版）受此更改影响。


  数据库开发人员和管理员需要记住几个方面。其中一些是：


  *   确保授予用户的权限是最小必需权限。

  *   移除不再需要的权限。

  *   移除不再使用的用户。

  *   保持 SQL 节点之间的权限同步。

  *   定期记录和审查权限。


  本节的剩余部分将讨论这些主题，但分布式权限除外，该主题本身内容庞大，将在本章后面单独一节中讨论。


  Note


  数据库开发人员和管理员必须共同努力，确保用户及其权限设置正确，这一点非常重要。




  #### 账户与密码管理


  管理用户的任务看似简单。毕竟，在需要时创建新用户是件容易的事。然而，在保持系统安全方面，有几个陷阱需要注意。关于如何以安全的方式创建和维护用户，将在后续讨论中进行更详细的阐述。


  **注意**

  在 MySQL NDB 集群中管理用户、密码和权限，与在标准 MySQL 服务器中管理用户、密码和权限，**没有区别**。然而，由于这个话题非常重要，这里仍提供一个概述。你可以在
  MySQL 参考手册中更详细地研究此主题：[`dev.mysql.com/doc/refman/5.7/en/privilege-system.html`](https://dev.mysql.com/doc/refman/5.7/en/privilege-system.html)
  和 [`dev.mysql.com/doc/refman/5.7/en/account-management-sql.html`](https://dev.mysql.com/doc/refman/5.7/en/account-management-sql.html)。


  MySQL 支持多种语句来管理用户、密码和权限，以及查看用户和权限信息的语句。截至 MySQL NDB 集群 7.5 版本可用的语句总结在表 12-1 中。如果该语句并非在所有
  MySQL NDB 集群 7.2 及更高版本中都受支持，“版本”列会显示支持该语句的具体版本。


  **表 12-1.** 用于管理用户、密码和权限的语句


  | 语句 | 版本 | 描述 |

  | --- | --- | --- |

  | `ALTER USER` | 7.3+ | 修改现有用户账户。在 7.3 和 7.4 版本中，它仅限于使用户密码过期。在 7.5 版本中，它支持`CREATE
  USER`所能设置的所有选项。 |

  | `CREATE USER` |   | 创建新用户账户。在 7.4 及更早版本中，此操作仅限于创建用户并指定密码和身份验证插件。在 MySQL NDB 集群
  7.5 中，可以设置所有账户属性。 |

  | `DROP USER` |   | 删除现有用户。 |

  | `GRANT` |   | 为用户授予权限。它也可用于创建新用户、更改密码、设置身份验证选项和资源选项。在 7.5 版本中，建议仅将其用于授予权限。在 7.4
  及更早版本中，完成这些任务大多需要使用`GRANT`。**强烈建议切勿使用`GRANT`创建用户；应使用`CREATE USER`代替。** |

  | `RENAME USER` |   | 重命名用户。 |

  | `REVOKE` |   | 撤销用户的权限。 |

  | `SET PASSWORD` |   | 更改用户密码。在 7.5 版本中，新密码需要以明文形式提供，而在 7.4 及更早版本中，需要提供哈希后的密码。 |

  | `SHOW CREATE USER` | 7.5+ | 显示给定用户账户的详细信息，包括密码哈希、身份验证选项等。 |

  | `SHOW GRANTS` |   | 显示授予用户账户的权限。在 7.4 及更早版本中，它还包含 7.5 版本中`SHOW CREATE USER`所返回的信息。
  |


  可以使用`CREATE USER`或`GRANT`语句创建新用户。在 MySQL NDB 集群 7.5 中，更推荐使用`CREATE USER`，因为它具备设置用户所需的全部功能，不仅可以指定密码，还可以指定
  SSL/TLS 要求、资源限制、密码策略和账户锁定选项。`ALTER USER`语句可用于修改现有用户账户。在旧版 MySQL NDB 集群中，`CREATE
  USER`和`ALTER USER`支持的功能相当有限，除了创建用户、设置初始密码或使现有用户密码过期外，任何其他操作都必须使用`GRANT`语句。


  清单 12-1 提供了一个在 MySQL NDB 集群 7.5 中，用户生命周期内的一系列账户管理语句的示例。这些步骤通常不会一次性全部执行，而是在一段时间内逐步完成。这些语句是讨论有关用户账户及其设置的一些最佳实践的良好起点。示例之后将讨论
  MySQL 权限系统。


  ```

  mysql> CREATE USER ''appadmin''@''192.168.56.101'' IDENTIFIED WITH sha256_password
  BY ''cxon9Fr*egAj$2P!'' REQUIRE SSL PASSWORD EXPIRE;

