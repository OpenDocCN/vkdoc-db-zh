  #### 自愈代理


  MySQL 集群管理器的一个特性是其自愈能力。因此，当一个 MySQL 集群管理器代理宕机时，它将尝试通过从其他某个代理获取缺失的信息来自我恢复。在极少数情况下——例如主机崩溃后——代理仓库的状态可能会变得非常糟糕，以至于无法恢复。在这些情况下，一种解决方案是删除代理仓库，然后启动代理。首先，通过检查主机上的进程列表确认代理是否正在运行，查找
  `mcmd` 进程。例如：


  ```

  shell$ ps auxf | grep mcmd | grep -v grep

  ```


  这个命令不应返回任何内容。在 Microsoft Windows 中，检查任务管理器以确认 `mcmd` 进程是否存在，如图 13-10 所示。图中显示 `mcmd`
  进程存在，因此您必须先将其停止。


  ![A435171_1_En_13_Fig10_HTML.jpg](img/A435171_1_En_13_Fig10_HTML.jpg)


  图 13-10.


  Microsoft Windows 任务管理器中的 mcmd 进程


  在代理停止后，删除仓库目录中的所有内容以及仓库校验和文件。仓库是指定 `manager-directory` 选项路径下的 `rep` 目录，校验和文件是 `manager-directory`
  中的 `repchksum` 文件。使用前面章节教程所用的配置，在 Linux 上的完整路径是 `/var/lib/mcm_data/rep` 和 `/var/lib/mcm_data/repchksum`：


  ```

  shell$ rm -f /var/lib/mcm_data/rep/* /var/lib/mcm_data/repchksum

  ```


  对于 Microsoft Windows，默认路径是 `C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\rep`
  和 `C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\repchksum`。假设使用的是默认路径（否则请替换为实际路径），通过文件资源管理器或命令提示符删除它们：


  ```

  C:\Users\wisborg>del /s "C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\rep"
  "C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\repchksum"

  C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\rep\*, Are you sure
  (Y/N)? y

  Deleted file - C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\rep\clustat.test_cluster.8005fafe_10_0

  Deleted file - C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\rep\config.test_cluster.8005fafe_10_0

  Deleted file - C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\rep\opstat.test_cluster.8005fafe_10_0

  Deleted file - C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\rep\site.test_site.8005fafe_1_0

  Deleted file - C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\rep\sitepackage.cluster_7.5.5.8005fafe_8_0

  Deleted file - C:\Program Files (x86)\MySQL\MySQL Cluster Manager\mcm_data\repchksum

  ```


  最后，再次启动代理。


