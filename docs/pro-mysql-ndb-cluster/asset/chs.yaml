  \ 4G\nIndexMemory = 512M\n[NDBD]\nNodeId = 1\nHostName = host1\n[NDBD]\nNodeId =\
  \ 2\nHostName = host2\n[MYSQLD]\nNodeId = 49\nHostName = host1\n[MYSQLD]\nNodeId\
  \ = 50\nHostName = host2\n清单 4-1.\n一个小系统的 config.ini 示例\n```\n\n在此示例中，只配置了五个节点——一个管理节点、两个数据节点和两个\
  \ SQL 节点。数据节点和 SQL 节点的主机名重叠，因此它们被放置在相同的主机（`host1`，`host2`）上。管理节点放置在单独的主机（`mgmnost`）上，因此总共涉及三台主机。\n\
  \n当每个数据节点和每个 SQL 节点连接到管理服务器时，配置会分发给它们。当一个节点连接到管理节点时，管理节点通过比较连接节点的主机名和每个节下的 `HostName`\
  \ 选项来确定哪个槽位与该连接节点匹配。例如，如果 `ndbmtd` 从 `host2` 连接到管理节点，则其节点 ID 被识别为 2，因为有一个 `NDBD`\
  \ 节的配置为 `NodeId = 2` 和 `HostName = host2`。如果有另一个 `ndbmtd` 试图从 `host2` 连接到管理节点，连接将失败，因为没有可用的空闲数据节点槽位给从\
  \ `host2` 连接的节点。但是，即使数据节点的槽位被占用，`mysqld` 仍然可以从 `host2` 连接到管理节点，因为 `host2` 上有一个可用的\
  \ SQL 节点槽位。\n\n\n\n### 重启类型\n\n在集群启动后应用配置时，需要重启节点。在以下章节中，每个选项都配有重启类型的说明，这指的是目标节点的重启方式。在\
  \ MySQL NDB Cluster 中，定义了四种重启类型：\n\n*   **节点重启 (`N`)**: 一次重启一个节点，无需指定额外指令。若要将配置更改应用到整个集群，应依次重启每个节点。此操作也称为滚动重启。在滚动重启期间，集群保持运行，应用程序可以访问数据。当\
  \ `NoOfReplicas = 1` 时，无法执行节点重启，因为同一节点组内没有存活的数据节点。\n*   **系统重启 (`S`)**: 所有节点停止（集群完全关闭），然后集群再次启动。在系统重启期间，应用程序无法访问数据，因为集群已完全停止。\n\
  *   **初始节点重启 (`IN`)**: 此重启类型与节点重启类似，但每个数据节点在重启时使用 `--initial` 选项。此选项指示目标数据节点清除其数据，然后从同一节点组内的另一个节点复制全部数据。例如，当更改了与文件相关的选项时，就需要这种重启类型。\n\
  *   **初始系统重启 (`IS`)**: 此重启类型与系统重启类似，但所有数据节点在重启时使用 `--initial` 选项。这会导致所有数据被清除并丢失。如果您在重启后需要保留现有数据，请在执行系统初始重启之前进行完整备份。\n\
  \n重启类型和操作的详细信息在第 10 章中讨论。\n\n### 管理节点选项\n\n本节涵盖管理节点选项。管理节点的选项并不多。在本节中，仅列出主要选项。\n\
  \n#### 管理节点的主要选项\n\n##### NodeId\n\n| 默认值 | 自动 |\n| :--- | :--- |\n| 范围 | 1 – 255\
  \ |\n| 所属节 | `[MGM]` |\n| 重启类型 | 节点重启 |\n\n每个节点的标识符。在之前的版本中，`Id` 选项与 `NodeId` 含义相同，但在\
  \ MySQL NDB Cluster 7.5 中已被移除。即使不指定 `NodeId` 也可以配置每个节，因为如果未显式指定，其值会自动分配。然而，省略此参数并不是一个好的做法，因为它会导致配置的歧义。\n\
  \n##### HostName\n\n| 默认值 | 无（接受来自任何主机的连接） |\n| :--- | :--- |\n| 范围 | 任意主机名或 IP\
  \ 地址 |\n| 所属节 | `[MGM]` |\n| 重启类型 | 系统重启 |\n\n节点所在的主机名或 IP 地址。您可能会疑惑“为什么管理节点需要知道它自己的主机名？”。当安装了多个管理节点时，需要此主机名。\n\
  \n##### DataDir\n\n| 默认值 | 进程启动时的当前目录 |\n| :--- | :--- |\n| 范围 | 任意目录路径名 |\n| 所属节\
  \ | `[MGM]` 或 `[MGM DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n管理节点生成的数据（如日志文件和 PID 文件）存储在此目录中。\n\
  \n##### PortNumber\n\n| 默认值 | 1186 |\n| :--- | :--- |\n| 范围 | 任意端口号 |\n| 所属节 | `[MGM]`\
  \ 或 `[MGM DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n这是管理节点监听的端口号。在大多数情况下，无需更改此值。当默认端口号 (1186)\
  \ 被另一个程序占用时，您应将其更改为不同的值以避免端口冲突。例如，如果您在本地网络中安装了多个集群，您可能希望将管理节点整合到单个主机上以节省主机数量。这种配置是可行的，因为管理节点需要的计算机资源非常少。请注意不要弄错每个节点连接字符串中的端口号。如果指定了错误的连接字符串，节点将连接到不同的管理节点。\n\
  \n##### ArbitrationRank\n\n| 默认值 | 1 |\n| :--- | :--- |\n| 范围 | 0 – 2 |\n| 所属节 |\
  \ `[MGM]` 或 `[MGM DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定成为仲裁器的可能性。此参数的范围是 0、1 和 2。每个值的含义如下：\n\
  \n*   `0`: 该节点永远不会被用作仲裁器。\n*   `1`: 该节点具有高优先级；即，与低优先级节点相比，它将优先被选为仲裁器。\n*   `2`:\
  \ 表示低优先级节点，仅当所有更高优先级的节点都不可用时，它才会被用作仲裁器。\n\n如果您有多个管理节点，并且对哪个节点应成为仲裁器有偏好，请将不太理想的管理节点的此选项设置为\
  \ 2。请注意，不仅管理节点，SQL 节点也可以成为仲裁器。即使您只有一个可用的管理节点，通过使用 SQL 节点作为额外的仲裁器，仲裁器也可以实现容错。注意不要使用与数据节点位于同一主机上的\
  \ SQL 节点，因为仲裁器应位于与任何数据节点分开的主机上。\n\n\n##### LogDestination\n\n| 默认值 | `FILE:filename=ndb_node_id_cluster.log,maxsize=1000000,maxfiles=6`\
  \ |\n| 范围 | `CONSOLE&#124;SYSLOG&#124;FILE` 及其他附加参数 |\n| 所属章节 | `[MGM]` 或 `[MGM\
  \ DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定集群日志的输出目标。集群日志是 MySQL NDB Cluster 的集中式事件日志文件，所有事件报告都聚合为一个连续的日志。目标有以下三种类型：\n\
  \n*   `CONSOLE`：日志条目输出到 `ndb_mgmd` 进程的标准输出。\n*   `SYSLOG`：日志条目发送到 `syslog` 工具。\n\
  *   `FILE`：日志条目写入日志文件。日志文件以循环方式复用。\n\n`SYSLOG` 和 `FILE` 需要附加参数来指定日志规范的详细信息。\n\n\
  对于 `SYSLOG` 输出，应指定工具。工具指明了生成日志消息的组件。工具不是任意字符串，而是在 RFC 3164 的 syslog 协议中定义的。已定义的工具列于表\
  \ 4-2。如清单 4-2 所示，使用关键字指定工具。\n\n表 4-2. Syslog 工具\n\n| 数值代码 | 关键字 | 工具 |\n| --- |\
  \ --- | --- |\n| 0 | kern | 内核消息 |\n| 1 | user | 用户级消息 |\n| 2 | mail | 邮件系统 |\n\
  | 3 | daemon | 系统守护进程 |\n| 4 | auth | 安全/授权消息 |\n| 5 | syslog | 由 syslogd 内部生成的消息\
  \ |\n| 6 | lpr | 行式打印机子系统 |\n| 7 | news | 网络新闻子系统 |\n| 8 | uucp | UUCP 子系统 |\n|\
  \ 9 |   | 时钟守护进程 |\n| 10 | authpriv | 安全/授权消息 |\n| 11 | ftp | FTP 守护进程 |\n| 12 |\
  \   | NTP 子系统 |\n| 13 |   | 日志审计 |\n| 14 |   | 日志告警 |\n| 15 | cron | 时钟守护进程（调度守护进程）\
  \ |\n| 16 ∼ 23 | local0 ∼ local7 | 本地使用 0 ∼ 7 |\n\n清单 4-2. 使用 SYSLOG 的 LogDestination\n\
  ```\nLogDestination = SYSLOG:facility=local0\n```\n\n工具通常用于日志过滤。良好的做法是指定一个不与其他应用程序、系统程序或内核重叠的工具。`local0`\
  \ ∼ `local7` 适用于此目的。它们是所谓的自定义日志消息，操作系统不使用。默认工具是 `user`。\n\n可以将具有特定工具的日志消息存储到单独的日志文件中。在这种情况下，您可以根据需要自定义日志文件名、日志轮换等。\n\
  \n甚至可以使用 syslog 功能将集群日志定向到远程主机（日志服务器）。当您有多个集群安装时，这种配置很有用。您可以使用单个日志实体监控所有集群。更多信息请参考\
  \ syslog 手册。有几种 syslog 实现。具体配置取决于实现方式。\n\n对于 `FILE` 输出，存在以下三个参数：\n\n*   `filename`：日志文件名\n\
  *   `maxsize`：每个日志文件的最大大小\n*   `maxfiles`：保留的日志文件的最大数量\n\n`FILE` 输出的默认值如清单 4-3 所示。\n\
  \n清单 4-3. 使用 FILE 的 LogDestination\n```\nLogDestination = FILE:filename=ndb_{node_id}_cluster.log,maxsize=1024000,maxfiles=6\n\
  ```\n\n清单 4-3 中的 `{node_id}` 表示管理服务器的节点 ID。您不一定需要指定所有参数，但可以指定参数的任意组合。例如，您可以只指定 `maxsize`，而保持\
  \ `filename` 和 `maxfiles` 不变。\n\n我建议您将集群日志的大小增加约 10 倍。默认大小太小，日志轮换太快。\n\n#### 管理节点配置的要点\n\
  \n管理节点没有很多选项。绝大多数选项都可以在 `config.ini` 文件中省略。但是，为了稳健的设置，我建议至少设置以下三个选项：\n\n*   `NodeId`：节点\
  \ ID 默认是自动分配的；然而，这可能导致后续分配不同的标识符。\n*   `HostName`：如果未显式指定主机名，管理节点可以从任何主机连接。\n* \
  \  `DataDir`：默认数据目录是启动管理节点时所在的当前目录。当从 shell 启动管理节点进程时，该目录可能会改变。\n\n显式设置这些选项将消除管理节点配置的模糊性。\n\
  \n### 数据节点选项\n\n我们开始讨论数据节点选项。如第 2 章所述，数据节点是 MySQL NDB Cluster 的核心。配置数据节点是设置 MySQL\
  \ NDB Cluster 时最困难的阶段之一，因为存在大量选项。然而，如果换个角度看，数据节点的配置是 MySQL NDB Cluster 生命周期中最具挑战性和最令人兴奋的任务之一。\n\
  \n由于数据节点选项开发非常活跃，它们经常发生变化或新增。如果选项在 7.2 或更新版本中发生变化或引入，章节中会标明有效的版本号。\n\n#### 基本选项\n\
  \n以下选项在数据节点配置中是强制性的。为了稳健的安装，请显式设置这些选项。\n\n##### NodeId\n\n| 默认值 | 自动分配 |\n| 范围 |\
  \ 1 – 48 |\n| 所属章节 | `[NDBD]` |\n| 重启类型 | 节点重启 |\n\n这是节点的标识符，与其他节点类型的 `NodeId` 含义相同。但是，可能的取值范围是\
  \ 1 – 48，因为数据节点的最大数量应小于或等于 48。因此，良好的做法是让其他节点类型的 `NodeId` 大于 48。\n\n##### HostName\n\
  \n| 默认值 | 无（接受来自任何主机的连接） |\n| 范围 | 任意主机名或 IP 地址 |\n| 所属章节 | `[NDBD]` |\n| 重启类型 |\
  \ 系统重启 |\n\n节点所在的主机名或 IP 地址。您可以不设置此选项，但我不建议您这样做。为了使数据节点配置稳健，您需要设置此选项，并使主机名对该插槽是唯一的。\n\
  \n`HostName` 和 `NodeId` 用于在节点连接时标识插槽。因此，这些选项对于每个插槽是唯一的，不能写在 `[NDBD DEFAULT]` 部分，因为它们不能在多个插槽之间共享。\n\
  \n##### ServerPort\n\n| 默认值 | 无（自动分配） |\n| 范围 | 1 – 64K |\n| 所属章节 | `[NDBD]` 或 `[NDBD\
  \ DEFAULT]` |\n| 重启类型 | 系统重启 |\n\n此选项通过端口号指定，用于接受来自其他节点的连接。默认情况下，数据节点请求操作系统将端口号分配为临时端口号。例如，在\
  \ POSIX 系统上，`bind(2)` 系统调用会执行此操作。\n\n##### DataDir\n\n| 默认值 | 启动进程时所在的当前目录 |\n|\
  \ 范围 | 任意目录路径名 |\n| 所属章节 | `[NDBD]` 或 `[NDBD DEFAULT]` |\n| 重启类型 | 初始节点重启 |\n\n\
  此选项指定数据所在的目录。\n\n由于数据节点处理各种类型的数据，因此可以根据数据类型指定不同的目录。`DataDir` 被视为特定目录路径选项（如 `FileSystemPath`）的默认值。\n\
  \n日志文件（不是事务日志文件，而是 `ndbd` 或 `ndbmtd` 进程的日志文件）也存储在 `DataDir` 下，无法单独指定。\n\n并非所有数据节点的\
  \ `DataDir` 都必须相同。\n\n##### `NoOfReplicas`\n\n| 默认值 | 2 |\n| --- | --- |\n| 范围 |\
  \ 1 – 4（实际上，2 是唯一的选择） |\n| 所属节 | `[NDBD DEFAULT]` |\n| 重启类型 | 初始系统重启 |\n\n此选项指定数据的副本数量。理论上，副本数量越多，集群就越健壮。然而，三副本或四副本尚未经过官方测试和支持。一个副本意味着没有冗余；单节点故障会立即导致系统故障。目前你应选择两个副本。未来的版本可能会支持三或四副本，但目前还不确定。\n\
  \n有关副本的更多信息，请参阅第 2 章和第 3 章。\n\n#### 内存数据存储选项\n\n以下选项与内存容量规划相关。内存容量规划的策略并不难；除非系统发生内存交换，否则应分配系统拥有的尽可能多的内存。请注意，用于模式和事务处理的对象也会消耗一定量的内存。重要的是，不要在此节中为缓冲区分配过多的内存。要为它们留出余地。\n\
  \n##### `DataMemory`\n\n| 默认值 | 80M |\n| --- | --- |\n| 范围 | 1M – 1024M (字节) |\n\
  | 所属节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定存储行数据和有序索引数据的内存区域的大小。此选项决定了数据大小的上限。人们常误以为有序索引存储在\
  \ `IndexMemory` 中，但实际上它们存储在 `DataMemory` 中。从技术上讲，可以在 `[NDBD]` 节下写入此选项，但这没有意义。数据会在所有数据节点之间平均分配，每个数据节点上的数据量大致相同。对于本章中以下选项，列表中只写了\
  \ `[NDB DEFAULT]` 节，但适用类似的推理。\n\n整个集群的总可用内存大小按以下公式计算：\n\n```\nDataMemory × number_of_node_group\n\
  ```\n\n节点组的数量是数据节点数除以 `NoOfReplicas`。因此，整个集群在没有单点故障的情况下，理论上的最大可用数据内存是 24TB（48 个数据节点，每个数据节点\
  \ 1TB，2 个副本）。`DataMemory` 的数量也对 LCP、GCP 和备份的大小有影响。内存大小对存储需求也有很大影响。\n\n##### `IndexMemory`\n\
  \n| 默认值 | 18M |\n| --- | --- |\n| 范围 | 1M – 1024M (字节) |\n| 所属节 | `[NDBD DEFAULT]`\
  \ |\n| 重启类型 | 节点重启 |\n\n此选项指定用于哈希索引的内存大小，哈希索引用于主键和唯一哈希索引。键数据和额外开销（包括指向行数据的指针）存储在\
  \ `IndexMemory` 中。所需的 `IndexMemory` 大小大致取决于行的数量。还存在一些其他开销，除非你有大量小表，否则它们可以忽略不计。每行的数据大小可使用以下公式估算：\n\
  \n```\nNumber_of_Rows * 18 * NoOfReplicas\n```\n\n计算出的值表示整个集群所需的总内存量。因此，每个节点所需的内存量通过将其除以数据节点数来计算。例如，如果表有\
  \ 1,000,000,000 行，集群有 10 个数据节点，且 `NoOfReplicas` = 2，则该表每个数据节点所需的 `IndexMemory` 大小如下：\n\
  \n```\n1000000000 * 18 * 2 / 10 = 3.6GB\n```\n\n此公式仅是近似值，实际分配的内存量很可能小于计算值。在 MySQL\
  \ NDB Cluster 7.5 系列或更高版本上，你可以使用 `ndbinfo.memory_per_fragment` 表查询确切的已分配内存大小。有关\
  \ `ndbinfo` 模式的更多信息，请参阅第 16 章。\n\n##### `StringMemory`\n\n| 默认值 | 25 |\n| --- |\
  \ --- |\n| 范围 | 1 – 100 (百分比) 或 101 – 4294967039 (字节) |\n| 所属节 | `[NDBD DEFAULT]`\
  \ |\n| 重启类型 | 系统重启 |\n\n此选项指定用于对象名称的内存。当值小于 100 时，表示相对于根据需要名称的对象数量（如 `MaxNoOfTables`、`MaxNoOfAtrributes`、`MaxNoOfOrderedIndexes`、`MaxNoOfUniqueHashIndexes`\
  \ 和 `MaxNoOfTriggers`）计算出的理论最大所需内存大小的百分比。这些选项将在本章后面描述。在大多数情况下，默认值是足够的。\n\n当 `StringMemory`\
  \ 不足时，你在创建新表或添加列时会看到以下消息：\n\n```\nGot error 773 'Out of string memory, please modify\
  \ StringMemory config parameter' from NDBCLUSTER\n```\n\n在这种情况下，你需要增加 `StringMemory`。\n\
  \n##### `SharedGlobalMemory`\n\n| 默认值 | 128M |\n| --- | --- |\n| 范围 | 0 – 64T |\n\
  | 所属节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定共享全局内存的大小，该内存用于多种用途：\n\n*  \
  \ 磁盘数据表的撤销日志缓冲区\n*   日志文件组和表空间的元数据\n*   下推连接\n*   模式事务\n\n当你使用磁盘数据表和/或并行执行大量下推连接时，请增加此选项。`SharedGlobalmemory`\
  \ 的实际所需大小通常比预期的要大。\n\n##### `LockPagesInMainMemory`\n\n| 默认值 | 0 |\n| --- | ---\
  \ |\n| 范围 | 0 – 2 |\n| 所属节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项控制是否使用 `mlock(2)`\
  \ 锁定内存。当内存被锁定时，在系统内存不足时，数据节点进程不太可能被换出。例如，当复制大量文件并消耗大量文件系统缓存时，可能会发生内存短缺。\n\n此选项接受以下值之一：\n\
  \n*   0：不锁定内存。\n*   1：在分配所需内存区域后锁定内存。\n*   2：在分配内存之前设置锁定模式。\n\n1 和 2 之间的区别微不足道。无论如何都需要足够的系统内存。\n\
  \n##### `Numa`\n\n| 默认值 | 1 (True) |\n| --- | --- |\n| 范围 | 0, 1 (布尔值) |\n| 所属节\
  \ | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项在 Linux 系统上导致内存分配交错。\n\n如第 3 章所述，近期的\
  \ x86_64 CPU 内部集成了内存控制器，每个内存控制器拥有自己的内存。如果服务器有多个 CPU 芯片，每个 CPU 对目标内存的访问速度取决于内存位于哪个\
  \ CPU 上，这种访问速度是非均匀的。这种架构被称为非统一内存访问（NUMA）。默认情况下，Linux 会尝试在运行线程的同一个 CPU 上分配内存。这种策略对于小程序效果很好，因为本地内存访问比远程内存访问更快，单线程运行的程序所需内存较小。然而，对于需要多线程和大量内存的服务器程序来说，这会导致问题，因为内存在\
  \ NUMA 节点之间的分配是非均匀的。\n\n此选项导致内存分配交错，这意味着内存从所有 NUMA 节点均匀分配。默认值启用 NUMA 交错，你通常不需要更改它。一个不寻常的情况是，如果你在单个\
  \ NUMA 机器上运行多个数据节点，并将每个数据节点绑定到单独的 NUMA 节点。\n\n#### 模式对象选项\n\n在 MySQL NDB 集群上，模式对象的元数据存储在数据节点启动时分配的固定大小数组中。各种对象的最大允许数量由以下选项配置。重要的是要事先为每个模式对象分配所需的大小。模式对象设计将在第\
  \ 18 章中介绍。\n\n##### MaxNoOfTables\n\n| 默认值 | 128 |\n| 范围 | 8 – 20320 |\n| 小节 | `[NDBD\
  \ DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定集群中允许的最大表数。请注意，它包括系统表，例如 `ndb_schema`、`ndb_apply_status`\
  \ 等。唯一哈希索引会创建一个内部支持表，因此它消耗一个表对象，并根据应用需求确定最佳表数。\n\n##### MaxNoOfAttributes\n\n| 默认值\
  \ | 1000 |\n| 范围 | 32 – 4294967039 |\n| 小节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\
  \n此选项指定属性的数量。属性是属于表的元素，例如列或索引。每个对象消耗的属性数量因对象类型而异，具体描述如下：\n\n*   非 BLOB 列：1\n*  \
  \ BLOB (TEXT) 列：5\n*   主键中的哈希索引：0\n*   唯一哈希索引：1 加上索引中的列数\n*   有序索引：1 加上索引中的列数\n\n\
  您可能想知道为什么主键中的哈希索引不消耗属性。它不消耗 `MaxNoOfAttributes`；相反，它消耗 `MaxNoOfTables`。\n\n请注意，除非在\
  \ DDL 语句中指定 `USING HASH` 关键字，否则有序索引会随主键和唯一哈希索引一起创建。\n\n由于属性数据需要在所有数据节点之间共享，因此它不像行数据那样按节点组划分。`MaxNoOfAttributes`\
  \ 的值应根据模式对象的总量来决定。\n\n每个表实际消耗的属性数量可以使用 `ndb_desc` 命令显示。但是，默认情况下，`ndb_desc` 命令的输出中不包括关于\
  \ BLOB 列和唯一哈希索引的信息。您需要指定 `--blob-info` 选项才能看到关于 `BLOB` 列的信息。`BLOB` 列的行存储在一个单独的支持表中，该表消耗四个属性。唯一哈希索引也存储在单独的支持表中，但无法查看分配给唯一哈希索引的属性数量。\n\
  \n##### MaxNoOfOrderedIndexes\n\n| 默认值 | 128 |\n| 范围 | 0 - 4294967039 |\n| 小节 |\
  \ `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定有序索引的数量，这些索引用于二级索引、主键和唯一键。顾名思义，有序索引用于有序索引扫描。实际上，除了全表扫描和主键或唯一键查找之外的所有操作都作为有序索引扫描处理。有序索引是处理各种类型查询的关键对象。\n\
  \n所需的有序索引数量取决于模式设计。您可以使用以下规则确定有序索引的数量：\n\n*   非唯一二级索引：1\n*   不带 `USING HASH` 子句的唯一二级索引：1\n\
  *   不带 `USING HASH` 子句的主键：1\n\n每个有序索引也消耗一个 `MaxNoOfAttributes`。\n\n##### MaxNoOfUniqueHashIndexes\n\
  \n| 默认值 | 64 |\n| 范围 | 0 - 4294967039 |\n| 小节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启\
  \ |\n\n此选项指定唯一哈希索引的数量。顾名思义，每个唯一索引消耗此对象的数量为 1。请根据您的应用需求增加此选项的值。\n\n每个唯一哈希索引还消耗一个\
  \ `MaxNoOfTables` 和若干个 `MaxNoOfAttributes`，具体数量由构成索引的列数决定。\n\n##### MaxNoOfTriggers\n\
  \n| 默认值 | 768 |\n| 范围 | 0 - 4294967039 |\n| 小节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启\
  \ |\n\n此选项指定数据节点内部使用的内部触发器的数量。请注意，此处的触发器与 SQL 中的触发器不同。在数据节点中，内部触发器用于各种进程：\n\n* \
  \  更新有序索引条目\n*   更新唯一哈希索引条目\n*   更新 BLOB 列\n*   外键检查以及父表和子表的更新\n*   备份\n*   复制（生成二进制日志）\n\
  *   表重组\n\n在正常操作期间，无需修改此值，因为如果它太小，系统会自动调整。所需触发器的数量使用以下选项在内部计算：`MaxNoOfTables`、`MaxNoOfOrderedIndexes`\
  \ 和 `MaxNoOfUniqueHashIndexes`。\n\n#### 事务选项\n\n由于 MySQL NDB Cluster 是实时数据库系统，它不会动态分配内存。相反，它在启动时分配内存。这包括事务和数据操作使用的各种缓冲区。\n\
  \n##### MaxNoOfConcurrentTransactions\n\n| 默认值 | 4096 |\n| 范围 | 32 - 4294967039\
  \ |\n| 小节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定在每个数据节点中分配的事务记录数。事务记录是事务协调器（TC）使用的内存缓冲区。如第\
  \ 2 章所述，某个数据节点上的一个 TC 负责处理每个事务的整个生命周期。每个数据节点上都有 TC。因此，整个集群总共有 `(MaxNoOfConcurrentTransactions\
  \ * 数据节点数量)` 条事务记录。\n\n尽管其名称如此，`MaxNoOfConcurrentTransactions` 并不表示事务的数量。相反，它表示事务记录的数量。它们在逻辑上是不同的。事务记录是\
  \ TC 中用于处理事务而消耗的对象。TC 根据以下规则消耗事务记录：\n\n*   每个活动事务一条\n*   事务访问的每个表一条\n\n因此，整个集群所需的事务记录数量可以使用以下公式计算：\n\
  \n```\nmax_connections *\n(平均每个事务访问的表数 + 1) *\nsql 节点数量\n```\n\n每个事务平均访问的表数因应用程序中使用的查询而异。因此，如果不检查应用程序，则无法估算。\n\
  \n`MaxNoOfConcurrentTransactions` 指定每个数据节点的事务记录数。它的值应是由公式计算出的值除以数据节点数。但是，在发生节点故障时，同一节点组中的幸存节点必须处理故障节点的事务。良好的做法是将该值除以节点组的数量，而不是数据节点的数量：\n\
  \n```\nMaxNoOfTransactions =\nmax_connections *\n(平均每个事务访问的表数 + 1) *\nsql 节点数量 /\
  \ 节点组数量\n```\n\n##### MaxNoOfConcurrentOperations\n\n| 默认值 | 32K |\n| 范围 | 32 -\
  \ 4294967039 |\n| 小节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定操作记录的数量。在一个事务中，每更新、删除、插入或锁定一行都需要一个操作记录。此选项对每个数据节点操作的行数设定了上限。因此，在整个集群上可以操作\
  \ `(MaxNoOfConcurrentOperations * 数据节点数量)` 行。与 `MaxNoOfTransactions` 一样，为估算此选项的值，考虑节点故障，请使用节点组的数量而不是数据节点的数量。\n\
  \n请注意，由唯一哈希索引和 BLOB 列创建的支持表中的行也会消耗操作记录。例如，当更新具有唯一哈希索引的主表中某行的非键值时，则会共享锁定其支持表中的一行。\n\
  \n\n#### MaxNoOfConcurrentScans（最大并发扫描数）\n\n| 默认值 | 256 |\n| 范围 | 2 – 500 |\n| 部分\
  \ | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定每个数据节点的扫描记录数。每次扫描操作都需要一个扫描记录。正如在\
  \ `MaxNoOfOrderedIndexes` 部分所讨论的，除了主键或唯一键查找外的所有操作都是扫描操作。此外，全表扫描也需要一个扫描记录。对于整个集群，它能处理的扫描数量由以下公式计算：\n\
  \n```\nMaxNoOfConcurrentScans * number_of_data_nodes\n```\n\n当然，对此选项的估算应考虑到节点故障。\n\
  \n在大多数情况下，所需的扫描记录数量会比预期的多。因此，我建议你从一开始就将其增加到最大值。即使你将其增加到 500 并频繁遇到 `“活动扫描过多”` 错误，也请考虑添加更多数据节点。\n\
  \n#### MaxNoOfLocalScans（最大本地扫描数）\n\n| 默认值 | 自动 |\n| 范围 | 32 - 4294967039 |\n| 部分\
  \ | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定本地扫描记录的数量。与负责处理访问整个集群的扫描的扫描记录不同，本地扫描记录负责访问其自身数据节点中的数据。\n\
  \n默认情况下，此选项使用以下公式自动计算：\n\n```\nMaxNoOfConcurrentScans * number_of_data_nodes * 4\
  \ + 2\n```\n\n在大多数情况下，默认的自动计算值是足够的，你无需更改它。然而，在旧版本（< 7.2）中，公式不同，计算出的值远小于当前版本。如果在旧版本中观察到\
  \ `“活动扫描过多”` 错误，请增加此选项。\n\n#### MaxParallelScansPerFragment（每个分片的最大并行扫描数）\n\n| 默认值\
  \ | 256 |\n| 范围 | 1 - 4294967039 |\n| 部分 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\
  \n此选项指定每个分片的最大扫描数。如果应用程序的扫描访问集中在某些表上，请考虑增加此值以获得更高效的 CPU 利用率。\n\n#### TransactionDeadlockDetectionTimeout（事务死锁检测超时）\n\
  \n| 默认值 | 1200 |\n| 范围 | 50 – 4294967039 (毫秒) |\n| 部分 | `[NDBD DEFAULT]` |\n| 重启类型\
  \ | 节点重启 |\n\n此选项指定从某个事务被阻塞到被确定为超时所经过的毫秒数。尽管它的名称如此，但它并不表示死锁超时，而是锁等待超时。因此，此选项等同于\
  \ `InnoDB` 存储引擎的 `innodb_lock_wait_timeout` 选项。\n\n然而，MySQL NDB 集群没有死锁检测功能。因此，死锁会作为锁等待超时被检测到，因为处于死锁中的事务无论如何都无法继续进行。\n\
  \n通过增加此选项，事务因锁等待超时而中止的可能性会降低。但是，不建议设置过大的值，因为处于死锁中的事务也会持续很长时间。处于死锁中的事务可能会阻塞其他无辜的事务，这可能导致系统吞吐量严重下降。在非常繁忙的系统上，请考虑缩短超时时间，以避免因死锁导致的性能下降。\n\
  \n#### RedoBuffer（重做日志缓冲区）\n\n| 默认值 | 32M |\n| 范围 | 1M - 4294967039 (字节) |\n| 部分\
  \ | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定重做日志缓冲区的大小，该缓冲区用于在提交事务之前临时存储重做日志内容。所有更改在写入重做日志之前都应保存在重做日志缓冲区中。因此，重做日志缓冲区的大小应根据并发事务的数据更改大小来计算。如果你增加了\
  \ `MaxNoOfConcurrentOperations`，那么你也需要增加重做日志缓冲区的大小。\n\n请注意，每个 LDM 线程都会分配一个大小为 `RedoBuffer`\
  \ 的重做日志缓冲区。因此，重做日志缓冲区的总大小为 `RedoBuffer * number_of_ldm_threads`。\n\n#### RedoOverCommitLimit（重做日志提交覆盖限制）\n\
  \n| 默认值 | 20 |\n| 范围 | 0 – 4294967039 (秒) |\n| 部分 | `[NDBD DEFAULT]` |\n| 重启类型 |\
  \ 节点重启 |\n\nMySQL NDB 集群有一种机制，允许针对重做日志的写入和同步操作有一定的延迟。它可以在磁盘 I/O 延迟的情况下防止性能下降。\n\n\
  当然，重做日志记录对于 MySQL NDB 集群不丢失已提交事务至关重要，因此不应被延迟。如果重做日志记录比事务所做的更新慢，未刷新的重做日志数据量将持续增加。事务无法比重做日志记录的速度更快地进行。然而，磁盘\
  \ I/O 速度限制了重做日志记录的速度。因此，在负载突然激增的情况下，磁盘 I/O 可能成为瓶颈。\n\n为了解决这个问题，MySQL NDB 集群实现了对重做日志的提交覆盖。它允许未完成的磁盘刷新操作继续进行。由于\
  \ MySQL NDB 集群对节点故障具有容错能力，未刷新的重做日志中包含的数据在节点故障时不会丢失，因为同一节点组中的其他节点拥有相同的数据。\n\n尽管重做日志记录具有容错性，但允许刷新操作无限期延迟并不是一个好主意，因为较大的值会增加在另一个数据节点不可用时丢失数据的机会。`RedoOverCommitLimit`\
  \ 定义了针对重做日志磁盘刷新操作的超时（以秒为单位）。此选项与 `RedoOverCommitCounter` 结合使用。如果重做日志刷新操作耗时超过 `RedoOverCommitLimit`\
  \ 秒并发生了 `RedoOverCommitCounter` 次，则挂起的事务将被中止。发生重做日志记录超时时，API 节点将按照本章后面描述的 `DefaultOperationRedoProblemAction`\
  \ 中定义的方式采取操作。\n\n#### RedoOverCommitCounter（重做日志提交覆盖计数器）\n\n| 默认值 | 3 |\n| 范围 |\
  \ 0 – 4294967039 |\n| 部分 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定重做日志刷新操作的超时次数。更多信息请参阅\
  \ `RedoOverCommitLimit` 的解释。\n\n#### 总内存消耗估算\n\n数据库管理员能够估算分配给数据库服务器的总内存大小非常重要。在\
  \ MySQL NDB 集群数据节点进程上，会分配以下类型的内存：\n\n*   程序映像内存\n*   全局缓冲区\n*   模式对象和事务对象数组\n* \
  \  各种缓冲区\n\n接下来的章节将详细解释每种内存区域。\n\n##### 程序映像内存\n\n通常，`ndbd` 和 `ndbmtd` 会为程序可执行文件、共享库和栈内存分配内存。程序映像的总内存大小通常小于\
  \ 20MB，可以忽略不计。你可以在 Linux 上使用 `/proc` 文件系统确认用于此目的的内存大小。参见 `VmExe`、`VmLib` 和 `VmStk`。\n\
  \n\n##### 全局缓冲区\n\n全局缓冲区是为特定目的分配的大块内存。全局内存缓冲区的类型和分配的内存大小列于表 4-3。\n\n**表 4-3. 全局内存缓冲区类型与内存大小**\n\
  \n| 缓冲区类型 | 内存大小 | 是否超额分配 |\n| --- | --- | --- |\n| 数据缓冲区 | `DataMemory + IndexMemory`\
  \ | 否 |\n| 作业缓冲区 | `(number_of_threads) ^ 2 + 1MB` | 否 |\n| 传输缓冲区 | `SendBufferMemory\
  \ * (number_of_nodes - 1)` 或 `TotalSendBufferMemory + ExtraSendBufferMemory` | 是\
  \ |\n| 文件缓冲区 | `RedoBuffer` + 每个日志部分 1MB | 否 |\n| 磁盘页缓冲区 | `DiskPageBufferMemory`\
  \ | 否 |\n| Undo 缓冲区 | 在 `CREATE LOGFILE GROUP` 语句中定义 | 是 |\n| 模式事务内存 | 2MB | 是 |\n\
  | 共享全局内存 | `SharedGlobalMemory` | 否 |\n\n当需要更多内存时，某些全局缓冲区内存可能会被超额分配。由于分配是从共享全局内存中完成的，因此在正常操作期间，数据节点进程的总内存大小不会增加。\n\
  \n请注意，当配置了大量线程时，作业缓冲区是一个很大的内存区域。当配置了最大线程数（72）时，它大约消耗 5GB 内存。\n\n##### 模式和事务对象数组\n\
  \nMySQL NDB Cluster 有各种用途的固定大小内存区域。这些缓冲区的大小并非微不足道，因此您应该考虑这些内存大小，以避免内存超额分配。表 4-4\
  \ 显示了固定大小数组的列表以及每个单位的内存大小（每个选项每增加一个单位所带来的内存大小增量）。\n\n**表 4-4. 按选项划分的内存大小增量**\n\n\
  | 选项 | 每单位内存大小 |\n| --- | --- |\n| `MaxNoOfConcurrentTransactions` | 1.6KB |\n|\
  \ `MaxNoOfConcurrentOperations` | 873 字节 |\n| `MaxNoOfConcurrentIndexOperations`\
  \ | 160 字节 |\n| `MaxNoOfTriggers` | 381 字节 |\n| `MaxNoOfFiredTriggers` | 68 字节 |\n\
  | `MaxNoOfConcurrentScans` | 70KB |\n| `MaxNoOfAttributes` | 4.3KB |\n| `MaxNoOfTables`\
  \ | 11KB |\n| `MaxNoOfOrderedIndexes` | 11KB |\n| `MaxNoOfUniqueHashIndexes` | 11KB\
  \ |\n\n表 4-4 中的内存大小是通过运行 `ndbd` 进程并逐步更改选项值实际测得的值。观测版本为 7.5.4。\n\n##### 各种缓冲区\n\n\
  还存在更多缓冲区，例如 `LongMessageBuffer`、`UndoDataBuffer` 等。将这些缓冲区汇总用于估算是很混乱的。最好是从运行的进程确定实际的内存大小作为起点。您可以根据要修改的选项来估算内存大小。\n\
  \n#### 检查点选项\n\n检查点是 MySQL NDB Cluster 中一个非常重要的过程，因为它使数据在无论计划与否的整个系统关闭情况下都保持持久性。从性能角度来看也很重要，因为它限制了写入事务的吞吐量。客户端无法提交比检查点更快的事务。因此，对于写入密集型集群，检查点选项非常重要。\n\
  \n正如第 2 章所讨论的，有两种类型的检查点：\n\n*   LCP（本地检查点）：特定时间点的整个集群数据。\n*   GCP（全局检查点）：所有更改的历史记录。\n\
  \n有关 MySQL Cluster 中检查点的更多信息，请参见第 2 章。本章稍后将介绍如何调整检查点的选项。\n\n##### FileSystemPath\n\
  \n| 默认值 | `DataDir` |\n| 范围 | 任意目录路径名 |\n| 部分 | `[NDBD]` 或 `[NDBD DEFAULT]` |\n\
  | 重启类型 | 初始节点重启 |\n\n此选项指定存储备份和磁盘数据表文件的目录。除了检查点，还有其他选项可用于微调目录布局。\n\n##### NoOfFragmentLogFiles\n\
  \n| 默认值 | 16 |\n| 范围 | 3 – 4294967039 |\n| 部分 | `[NDBD DEFAULT]` |\n| 重启类型 | 初始节点重启\
  \ |\n\n此选项指定重做日志文件的数量。重做日志以循环方式写入。有关重做日志的更多信息，请参见第 2 章。\n\n重做日志的总文件大小使用以下公式计算：\n\
  \n```\nNoOfFragmentLogFiles * NoOfFragmentLogParts * FragmentLogFileSize\n```\n\n\
  这些选项的默认值分别为 16、4 和 16M。`16 * 4 * 16M = 1G` 是重做日志总大小的默认值。\n\n##### FragmentLogFileSize\n\
  \n| 默认值 | 16M |\n| 范围 | 4M – 1G（字节） |\n| 部分 | `[NDBD DEFAULT]` |\n| 重启类型 | 初始节点重启\
  \ |\n\n此选项指定每个重做日志文件的大小。更多信息请参见 `NoOfFragmentLogFiles`。如果您需要更多重做日志空间，请考虑首先增加此选项，因为每个日志文件都需要一个内存缓冲区。\n\
  \n##### NoOfFragmentLogParts\n\n| 默认值 | 4 |\n| 范围 | 4 – 32（仅允许 4 的倍数） |\n| 部分 |\
  \ `[NDBD DEFAULT]` |\n| 重启类型 | 初始节点重启 |\n\n此选项指定组内重做日志文件的数量。更多信息请参见 `NoOfFragmentLogFiles`。\n\
  \n##### InitFragmentLogFiles\n\n| 默认值 | `SPARSE` |\n| 范围 | `SPARSE`, `FULL` |\n\
  | 部分 | `[NDBD]` 或 `[NDBD DEFAULT]` |\n| 重启类型 | 初始节点重启 |\n\n此选项指定重做日志文件的初始化方式。默认值为\
  \ `SPARSE`，这意味着重做日志文件被创建为稀疏文件。稀疏文件是一种节省不必要的 I/O 操作和文件空间的机制。如果重做日志被创建为稀疏文件，每个文件的大小看起来与\
  \ `FragmentLogFileSize` 相同，但数据块并未实际分配。如果程序从稀疏区域读取，则会读取填充了零的数据，直到文件的长度。当数据写入稀疏区域时，才会分配数据块。\n\
  \n稀疏文件的主要缺点是，只有在数据实际写入时，文件系统的空闲空间大小才会减少。因此，您可能会在正常操作期间而非初始化时注意到文件系统空间不足。请确保您的文件系统有足够的空闲空间。\n\
  \n`FULL` 表示重做日志文件被真正初始化，数据块被实际分配。后续进行重做日志记录时，您将不会看到“文件系统已满”的错误。\n\n此选项对数据节点的首次启动没有影响。在重启时更改此选项的值没有意义。\n\
  \n##### CompressedLCP\n\n| 默认值 | 0 |\n| 范围 | 0, 1（布尔值） |\n| 部分 | `[NDBD DEFAULT]`\
  \ |\n| 重启类型 | 节点重启 |\n\n当此选项为 true 时，会导致 LCP 以压缩格式存储。这节省了一定的磁盘空间，但在 LCP 和重启时会消耗更多的\
  \ CPU 时间。在繁忙的系统上最好不要压缩 LCP。CPU 资源应保留给事务处理。\n\n不建议为不同的数据节点设置不同的此选项值。所有数据节点上的可用资源应相同，以避免瓶颈。\n\
  \n##### ODirect\n\n| 默认值 | 0 |\n| 范围 | 0, 1（布尔值） |\n| 部分 | `[NDBD DEFAULT]` |\n\
  | 重启类型 | 节点重启 |\n\n当此选项为 true 时，会导致检查点的写入操作以 `O_DIRECT` 模式进行，即直接 I/O。顾名思义，直接 I/O\
  \ 是直接进行的 I/O 操作，不经过文件系统缓存。它可以节省一定的 CPU 资源。最好在使用 2.6 或更高版本内核的 Linux 系统上将此选项设置为 true。\n\
  \n##### DiskCheckpointSpeed\n\n| 默认值 | 10M |\n| 范围 | 1M – 4294967039（字节） |\n| 部分\
  \ | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n| 生效版本 | 7.2.0 – 7.4.0 |\n\n此选项决定检查点写入操作的速度，即每秒写入的数据量。此选项在\
  \ 7.4.1 中已弃用，并在 7.5 系列中移除。在 7.4.1 或更新的系列上，请改用 `MinDiskWriteSpeed` 和 `MaxDiskWriteSpeed`。在\
  \ 7.4 系列（版本大于或等于 7.4.1）上，可以设置此选项，但它没有效果。\n\n##### DiskCheckpointSpeedInRestart\n\
  \n| 默认值 | 100M |\n| 范围 | 1M – 4294967039 (字节) |\n| 章节 | `[NDBD DEFAULT]` |\n| 重启类型\
  \ | 节点重启 |\n| 生效版本 | 7.2.0 – 7.4.0 |\n\n此选项决定了在重启操作期间作为一部分的本地检查点（LCP）每秒写入的数据量，即写操作的速度。此选项在\
  \ 7.4.1 版本中已弃用，并在 7.5 系列中被移除。在 7.4.1 或更新系列上，请改用 `MaxDiskWriteSpeedOtherNodeRestart`\
  \ 和 `MaxDiskWriteSpeedOwnRestart`。在 7.4 系列（版本大于或等于 7.4.1）上，此选项仍可设置，但不再起作用。\n\n#####\
  \ MinDiskWriteSpeed\n\n| 默认值 | 10M |\n| 范围 | 1M – 4294967039 (字节) |\n| 章节 | `[NDBD\
  \ DEFAULT]` |\n| 重启类型 | 节点重启 |\n| 生效版本 | 7.4.1 和 7.5.0 或更新版本 |\n\n此选项在 MySQL NDB\
  \ Cluster 7.4.1 中添加。此选项决定了本地检查点（LCP）和备份 I/O 速度的下限。重做日志记录的 I/O 速度不受此选项影响。\n\n数据节点在以下条件下调整\
  \ LCP 和备份的 I/O 速度：\n*   如果重做日志记录延迟（> 2 秒），则减慢速度\n*   如果 CPU 使用率低于 90%，则加快速度\n* \
  \  如果 CPU 使用率高于 95%，则减慢速度\n*   如果 CPU 使用率高于 97% 或 99%，则进一步减慢速度\n\n速度的调整在每个周期（大约\
  \ 1 秒）内逐步完成。LCP 的速度不会低于 `MinDiskWriteSpeed`，也不会高于 `MaxDiskWriteSpeed`。在此范围内，备份可能占用\
  \ I/O 速度的 `BackupDiskWriteSpeedPct` 百分比。\n\n##### MaxDiskWriteSpeed\n\n| 默认值 | 20M\
  \ |\n| 范围 | 1M – 4294967039 (字节) |\n| 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\
  | 生效版本 | 7.4.1 和 7.5.0 或更新版本 |\n\n此选项决定了本地检查点（LCP）和备份 I/O 速度的上限。更多信息请参阅 `MinDiskWriteSpeed`。\n\
  \n##### MaxDiskWriteSpeedOtherNodeRestart\n\n| 默认值 | 50M |\n| 范围 | 1M – 4294967039\
  \ (字节) |\n| 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n| 生效版本 | 7.4.1 和 7.5.0 或更新版本\
  \ |\n\n此选项决定了当另一个数据节点正在重启时的 I/O 速度。当其他数据节点重启时，LCP 的 I/O 必须具有更高的优先级，因为数据节点在重启过程中会执行\
  \ LCP。正在重启的数据节点上的 LCP 要等到进行中的 LCP 完成后才会启动。因此，必须加快幸存节点上正在进行的 LCP 速度，使其比通常情况更快。\n\n\
  ##### MaxDiskWriteSpeedOwnRestart\n\n| 默认值 | 200M |\n| 范围 | 1M – 4294967039 (字节)\
  \ |\n| 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n| 生效版本 | 7.4.1 和 7.5.0 或更新版本 |\n\
  \n此选项决定了作为重启过程一部分执行的 LCP 的 I/O 速度。由于数据节点在重启期间不需要执行全局检查点（GCP），所有 I/O 带宽都可以分配给 LCP。因此，此选项的值会高于其他\
  \ `MaxDiskWriteSpeed` 选项。\n\n##### TimeBetweenLocalCheckpoints\n\n| 默认值 | 20 |\n\
  | 范围 | 0 – 31（以 2 为底的对数表示的写入数据字数） |\n| 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\
  \n此选项决定了本地检查点（LCP）之间写入数据的最小大小。尽管名称如此，此选项并不指定 LCP 之间的时间间隔。\n\n此选项的数据大小以字数的 2 为底的对数来指定。每个字的大小为四字节。因此，默认值\
  \ 20 表示 `4 * 2²⁰` 字节 = 4MB。这意味着如果在上一次 LCP 之后，集群上进行的更新非常少且写入数据量小于 4MB，则不会启动新的 LCP。\n\
  \n为此选项设置较大的值可以防止在集群不繁忙时进行不必要的 LCP。特别是在使用 SSD 作为数据磁盘时，这是更可取的，因为与 HDD 相比，SSD 的写入次数限制较小。如果将此选项设置得非常大，则必须确保有足够的重做日志空间。在繁忙的系统上，无论如何新的\
  \ LCP 都会在上一个 LCP 结束后立即开始。\n\n##### TimeBetweenGlobalCheckpoints\n\n| 默认值 | 2000\
  \ |\n| 范围 | 20 – 32000（毫秒） |\n| 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定了一个全局检查点（GCP）与另一个\
  \ GCP 之间的时间间隔。与 `TimeBetweenLocalCheckpoints` 不同，此选项以毫秒为单位指定时间。在 GCP 期间，重做日志会被写入并同步到磁盘，从而使其持久化。\n\
  \n##### TimeBetweenEpochs\n\n| 默认值 | 100 |\n| 范围 | 0 – 32000（毫秒） |\n| 章节 | `[NDBD\
  \ DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定了微全局检查点（Micro-GCP）之间的时间间隔。微 GCP 是指每次写入文件的重做日志单元，它在特定周期内同时提交。包含在一个微\
  \ GCP 中的一组事务被称为一个纪元（epoch）。换句话说，纪元每隔 `TimeBetweenEpochs` 毫秒生成一次。确保每个纪元的内容在所有数据节点之间同步。因此，他们别称微\
  \ GCP 为数据同步过程。由于纪元在所有数据节点之间同步，因此写入重做日志是安全的，并且可用于崩溃恢复。\n\n顾名思义，微 GCP 的执行频率高于 GCP。微\
  \ GCP 用于在 SQL 节点上生成二进制日志。这使得数据节点能够比使用 GCP 更频繁、更快速地向 SQL 节点发送数据以生成二进制日志。这减少了复制延迟。\n\
  \n微 GCP 保留在重做缓冲区中，直到 GCP 完成，因此在节点故障时它不具有持久性。未被 GCP 写入磁盘的重做缓冲区内容将在崩溃后丢失。尽管微 GCP 不具有持久性，但如果\
  \ `NoOfReplicas` 为 `2` 或更大，它是容错的。即使一个数据节点崩溃，并且崩溃节点所属节点组中的任何节点仍然存活，任何已提交的事务都不会丢失。但是，如果微\
  \ GCP 没有通过 GCP 刷新到磁盘，在整个集群故障期间，它将真正丢失。\n\n##### TimeBetweenEpochsTimeout\n\n| 默认值\
  \ | 0 |\n| 范围 | 0 – 256000（毫秒） |\n| 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n\
  此选项指定了一个微 GCP 与另一个微 GCP 之间的超时时间（以毫秒为单位）。默认值 0 表示超时被禁用。一旦微 GCP 开始，在进行中的微 GCP 完成之前，无法提交新的事务。因此，卡住的微\
  \ GCP 会严重拖慢系统的写入吞吐量。\n\n由于微 GCP 可能因各种原因（如故障的网卡）而卡住，MySQL NDB Cluster 具有通过切断无法按时完成微\
  \ GCP 的数据节点来防止微 GCP 滞后导致系统变慢的功能。错过此超时的数据节点将被强制关闭。\n\n如果您的应用程序需要良好的响应时间，请考虑将此选项设置为非零值。但是，不要将此选项设置得太小。如果太小，会导致因偶然的缓慢而发生不必要的节点关闭。对于在虚拟机上运行的集群，不要将此选项设置为非零值，因为虚拟机由于\
  \ CPU 调度器的限制，响应经常滞后。\n\n在以前的版本（7.1 系列或更早）中，默认值是 4000。\n\n\n\n#### 估算重做日志大小\n\n选择一个最优的重做日志文件大小对于\
  \ MySQL NDB 集群来说是一项重要任务，因为当重做日志空间不足时，新事务将无法提交。重做日志越大，空间耗尽的可能性就越小。然而，设置一个不必要的过大重做日志并非良策，因为应避免浪费宝贵的文件系统空间。因此，您需要确定一个最优的重做日志大小。在确定最优大小时，请考虑以下因素。\n\
  \n*   数据大小\n*   I/O 速度\n\n崩溃恢复需要重做日志，它是针对局部检查点应用的。LCP 展示了某个时间点的完整数据快照，而重做日志则显示了按时间序列排列的增量差异。因此，在最新\
  \ LCP 之后生成的所有重做日志条目都是完美必需的。这意味着现有的重做日志条目在下一次 LCP 完成之前都无法被释放。这表明所需的重做日志文件最大尺寸等于两次\
  \ LCP 之间生成的重做日志条目总大小。要计算它，需要以下指令。\n\n##### 计算两次 LCP 之间的理论最长时间\n\n两次 LCP 之间的时间大约等于完成一次\
  \ LCP 所需的时间。可以使用以下公式计算：\n\n```\ndata_size / average_disk_write_speed_for_lcp\n```\n\
  \n除非磁盘速度不足，平均磁盘 I/O 速度将是 `MinDiskWriteSpeed` 和 `MaxDiskWriteSpeed` 之间的中间值。由于您需要为最坏情况做准备，计算时应采用\
  \ `MinDiskWriteSpeed`。因为 I/O 带宽在 LCP 和备份之间共享，LCP 最多可占用 `BackupDiskWriteSpeedPct`\
  \ 百分比的带宽。数据大小受限于 `DataMemory`。因此，完成 LCP 所需的时间为：\n\n```\nDataMemory / (MinDiskWriteSpeed\
  \ * BackupDiskWriteSpeedPct / 100)\n```\n\n##### 计算重做日志条目的理论最大大小\n\n写入重做日志时，I/O\
  \ 速度没有上限。全局检查点写入的数据量取决于写请求的量。您可以通过 `ndbinfo` 模式下的 `disk_write_speed_aggregate` 表来确定\
  \ GCP 写入的数据量，该表在 7.4.1 版本中添加。最好运行一些写入基准测试并监控此 `ndbinfo` 表，以查看重做日志记录的 I/O 速度。\n\n\
  一旦确定了重做日志记录的速度，就可以使用以下公式计算重做日志条目的理论最大大小：\n\n```\ntime_taken_to_complete_lcp * io_speed_of_redo_logging\n\
  ```\n\n或者，可以假设每秒写入的数据量作为最坏情况下的物理磁盘 I/O 速度。然而，物理磁盘速度通常过快且不切实际。毕竟，从实际系统获取的真实值更为可取。\n\
  \n##### 计算重做日志大小选项\n\n如本章前面所述，重做日志的总大小使用以下公式计算。如何确定这些选项的值呢？\n\n```\nNoOfFragmentLogFiles\
  \ * NoOfFragmentLogParts * FragmentLogFileSize\n```\n\n上一节计算的重做日志条目的理论最大大小必须与此重做日志的总大小相匹配。最好留有一些安全余地。如果满足此条件，您可以为这些选项选择任意值。\n\
  \n##### 计算示例\n\n例如，假设 `DataMemory` 为 18GB，`MinDiskWriteSpeed` 为 32M。在最坏情况下，完成一次\
  \ LCP 所需的时间为 10 分钟。如果重做日志记录速度为 80M/秒，则在一个 LCP 期间将生成 48GB 的重做日志条目。加上 33% 的余量，所需的重做日志大小约为\
  \ 64GB。假设 `NoOfFragmentLogParts` 设置为 32，这是运行尽可能多的 LDM 线程所必需的。那么，以下选项值的组合满足要求。\n\n\
  ```\nFragmentLogFileSize = 500M\nNoOfFragmentLogFiles = 4\nNoOfFragmentLogParts\
  \ = 32\n```\n\n#### 多线程选项\n\n根据摩尔定律，单个 CPU 芯片内的晶体管数量仍在增加。然而，最近每个 CPU 核心的性能并没有提高，因为：\n\
  \n*   时钟速度没有提升\n*   单靠增加晶体管数量并不能提升单核性能\n\n因此，近年来的高端 CPU 芯片每颗都有许多核心。为了实现高性能，软件必须利用多个\
  \ CPU 核心。所以，程序必须并行运行。从并行编程的角度来看，有两种选择——多线程或多进程。MySQL NDB 集群采用了前者，即多线程。为了尽可能实现高性能，优化多线程选项是关键。\n\
  \n##### MaxNoOfExecutionThreads\n\n| 默认值 | 2 |\n| 范围 | 2 – 8 (7.2.0 – 7.2.4) 2 –\
  \ 36 (7.2.5 – 7.3.2) 2 – 72 (7.3.3 – 最新版) |\n| 配置段 | `[NDBD DEFAULT]` |\n| 重启类型\
  \ | 初始系统重启 |\n\n此选项指定了多线程版本数据节点 `ndbmtd` 用于数据处理的线程数。多线程数据节点具有以下类型的线程。\n\n*   LDM\
  \ 线程：用于实际数据访问（如键查找和扫描）的线程。\n*   TC 线程：用于处理事务的线程。\n*   发送线程：向其他数据节点发送信号。\n*   接收线程：从其他数据节点接收信号。\n\
  *   主线程：此线程处理各种任务，如检查点、仲裁、故障切换等。\n*   Rep 线程：此线程将来自微 GCP 的变更发送到特定的 SQL 节点以生成二进制日志。\n\
  *   I/O 线程：此线程处理文件 I/O 请求。\n*   看门狗线程：此线程确定每个线程是否运行良好。\n\n此选项指定了这些类型线程的总数，每种线程的数量会自动调整。当然，对于数据库管理员来说，自动值虽然方便，但可能并非最优。如果您想达到最高性能，请改用\
  \ `ThreadConfig`。\n\n请注意，如果为此选项设置了较大的值，则必须相应增加 `NoOfFragmentLogParts`。LDM 线程的数量不得大于\
  \ `NoOfFragmentLogParts`。表 4-5 显示了针对 `MaxNoOfExecutionThreads` 的可接受的 `NoOfFragmentLogParts`\
  \ 值。请注意，表 4-5 针对 `MaxNoOfExecutionThreads` 值有几种变体，因为自 7.4.2 起线程分配发生了变化。\n\n表 4-5.\n\
  `MaxNoOfExecutionThreads` 所需的 `NoOfFragmentLogParts`\n\n| `MaxNoOfExecutionThreads`\
  \ | `NoOfFragmentLogParts` |\n| --- | --- |\n| 2 – 8 | 4 |\n| 9 – 23 (< 7.4.2) 9\
  \ – 19 (>= 7.4.2) | 8 |\n| 24 – 32 (< 7.4.2) 20 – 31 (>= 7.4.2) | 12 |\n| 32 – 47\
  \ (< 7.4.2) 32 – 39 (>= 7.4.2) | 16 |\n| 40 – 47 (>= 7.4.2) | 20 |\n| 48 – 63 |\
  \ 24 |\n| 64 – 72 | 32 |\n\n##### LockExecuteThreadToCPU\n\n| 默认值 | 无 |\n| 范围 |\
  \ 以逗号分隔的 CPU 列表。每个 CPU 有一个从 0 到 64K 的标识符。 |\n| 配置段 | `[NDBD]` 或 `[NDBD DEFAULT]`\
  \ |\n| 重启类型 | 节点重启 |\n\n此选项通过一个以逗号分隔的 CPU 列表，指定要绑定执行线程的 CPU。目标线程类型是除 I/O 线程和看门狗线程之外的所有线程。\n\
  \n当目标 CPU 的序列标识符连续无间隔时，您可以使用短横线指定一个范围内的多个 CPU 进行绑定。例如，`2-5` 等同于 `2,3,4,5`。无法使用此选项进行微调。例如，您无法指定哪个线程绑定到哪个\
  \ CPU。如果您想指定此类配置，请改用 `ThreadConfig`。\n\n在虚拟化环境中将线程绑定到 CPU 并非良策，因为从虚拟机看到的 CPU 是虚拟核心，并且无论如何都可能发生变化。\n\
  \n\n\n##### LockMaintThreadsToCPU\n\n| 默认值 | 无 |\n| 范围 | 逗号分隔的 CPU 列表。每个 CPU 的标识符范围为\
  \ 0 – 64K |\n| 所属段 | `[NDBD]` 或 `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定将 I/O\
  \ 线程和看门狗线程绑定到哪些 CPU，采用逗号分隔列表格式。使用此选项无法进行微调。若要指定哪个线程绑定到哪个 CPU，请改用 `ThreadConfig`。\n\
  \n##### ThreadConfig\n\n| 默认值 | 无 |\n| 范围 | 见下文 |\n| 所属段 | `[NDBD]` 或 `[NDBD DEFAULT]`\
  \ |\n| 重启类型 | 初始系统重启 |\n| 影响版本 | 7.3.0 – 最新 |\n\n此选项允许对线程配置进行微调。您可以为每种线程类型同时指定线程数量及其\
  \ CPU 亲和性。此选项的值由逗号分隔的属性列表组成，格式为 `thread_type={property=val[,property=val...]}`。已定义的线程类型有\
  \ `ldm`、`tc`、`recv`、`send`、`io`、`watchdog`、`main` 和 `rep`。这些线程类型与 `MaxNoOfExecutionThreads`\
  \ 中描述的相同。表 4-6 中的属性可以为每种线程类型设置。\n\n**表 4-6. ThreadConfig 中的线程属性**\n\n| 属性名称 | 范围\
  \ | 描述 |\n| --- | --- | --- |\n| `count` | 数字 | 每种类型线程的数量。更多信息见表 4-7。 |\n| `cpubind,\
  \ cpuset, cpubind_exclusive, cpuset_exclusive` | CPU 列表 | 逗号分隔的 CPU 列表，与 `LockExecuteThreadToCPU`\
  \ 和 `LockMaintThreadsToCPU` 相同。`cpubind` 使每个线程绑定到一个 CPU。`cpuset` 使每个线程绑定到一组 CPU。排他性变体（仅在\
  \ Solaris 上可用）不允许其他线程或进程绑定到相同的 CPU。 |\n| `spintime` | 微秒时间 | 当没有信号需要处理时，线程进入睡眠前的自旋时间。一旦线程进入睡眠，它将无法快速响应。自旋可以提高响应速度，但会消耗\
  \ CPU 时间。 |\n| `realtime` | 0 或 1 | 设置为 1 时，将使用实时调度器。这可能会提高性能。 |\n| `thread_prio`\
  \ | 0 – 10 | 10 为最高优先级。当多个线程共享相同的 CPU 时，此属性才有意义。 |\n\n默认情况下，线程数量为最小值，没有线程绑定到任何 CPU，没有线程进行自旋，并且所有线程具有相同的优先级。`realtime`\
  \ 属性的默认值是设置给 `RealTimeScheduler` 选项的值。\n\n表 4-7 显示了每种类型的线程数量范围。您可以在此范围内调整线程数量。请注意不要以不平衡的方式分配线程。某种类型的线程过多会导致一些线程空闲，而另一些线程非常繁忙。理想情况下，必须配置线程以使\
  \ CPU 核心负载均衡。\n\n**表 4-7. 每种类型的线程数量**\n\n| 线程类型 | 范围 |\n| --- | --- |\n| `ldm` |\
  \ 1, 2, 4, 6, 8, 12, 16 (< 7.3.3) <br> 1, 2, 4, 6, 8, 12, 16, 24, 32 (>= 7.3.3)\
  \ |\n| `tc` | 1 – 16 (< 7.3.3) <br> 1 – 32 (>= 7.3.3) |\n| `send` | 0 – 8 (< 7.3.3)\
  \ <br> 0 – 16 (>= 7.3.3) |\n| `recv` | 1 – 8 (< 7.3.3) <br> 1 – 16 (>= 7.3.3) |\n\
  | `main` | 仅 1 |\n| `rep` | 仅 1 |\n| `io` | 仅 1 |\n| `watchdog` | 仅 1 |\n\n清单 4-4\
  \ 展示了一个在 32 核系统上的配置示例。假设该系统有两个 CPU 芯片，每个芯片有 16 个核心，并且超线程已禁用。\n\n```\nThreadConfig\
  \ = ldm={count=16,cpubind=1-4,9-12,17-20,25-28,realtime=1,spintime=1},tc={count=6,cpubind=5,6,13,21,22,29,realtime=1,},send={count=2,cpubind=7,23},recv={count=4,cpubind=8,15,24,31},main={cpubind=14},io={cpubind=14},watchdog={cpubind=16,realtime=1},rep={cpubind=30}\n\
  NoOfFragmentLogParts = 16\n```\n\n**清单 4-4. 32 核系统上的 `ThreadConfig` 配置示例**\n\n在清单\
  \ 4-4 的示例中，CPU 0 没有绑定到任何线程。这是为了给操作系统和其他系统进程执行的任务留出空间。请注意，清单 2-2 中的 `ThreadConfig`\
  \ 看起来是多行的，但实际上写在一行中，不包含换行符。这样非常长的行无法在书籍的单页中呈现。\n\n确定最优设置非常困难。您可能需要反复进行基准测试，并通过试错法来确定最佳设置。根据经验法则，以下配置是一个良好的起点：\n\
  \n1.  将一半可用的 CPU 核心分配给 `ldm` 线程。\n2.  将 `ldm` 线程数量的四分之一分配给 `tc` 线程。\n3.  将 `ldm`\
  \ 线程数量的四分之一分配给 `recv` 和 `send` 线程。如果可用线程数为奇数，则分配更多给 `recv` 线程。\n4.  将其他 CPU 核心分别分配给其他类型的线程。\n\
  5.  至少留出一个 CPU 核心供系统使用。\n6.  将每个线程绑定到特定的 CPU，这可以通过确定 CPU 使用率来监控每个线程的繁忙程度。\n\n#####\
  \ CPU 属性考虑因素\n\n由于 CPU 必须响应各种请求，因此需要进行一些调整才能发挥其潜在性能。对于 MySQL NDB 集群，性能是最重要的需求。\n\
  \n###### 节能\n\n最好关闭节能功能，例如 Linux 系统上的 `cpuspeed`。启用节能功能后，操作系统会根据工作负载降低 CPU 频率。对于具有后台工作负载的系统（例如台式机）来说，这是合理的。然而，这对于繁忙的服务器机器有负面影响。当\
  \ CPU 频率较低时，无法快速处理突发工作负载，因为 CPU 频率恢复到原始状态存在延迟。这会损害数据访问的响应能力。\n\n在 Windows 上，请从电源选项设置中选择“高性能”电源计划。\n\
  \n###### 中断\n\n来自设备的中断在大多数情况下不可忽略。例如，当数据流量很大时，网卡会产生大量中断。默认情况下，在大多数操作系统上，中断由特定的 CPU\
  \ 处理。这使得某些 CPU 比其他 CPU 更繁忙。从节能角度来看，这是一个不错的选择。但是，它可能会导致性能瓶颈。在最坏的情况下，单个 CPU 核心会因中断而达到\
  \ 100% 的繁忙状态。如果系统有许多设备，那么该 CPU 核心将无法执行任何其他任务。\n\n防止此问题的一个选项是将中断引起的工作负载均匀地分散到所有 CPU。将中断重新分配给其他\
  \ CPU 的能力称为中断亲和性。要实现这一点，Linux 系统的选择是使用 `irqbalance`。如果中断仅集中在特定的 CPU 上，它会将中断请求重新分配给其他\
  \ CPU。这可以防止特定的 CPU 成为瓶颈。\n\n另一个选项是将中断请求重新分配给特定但多个 CPU。当使用 `ThreadConfig`、`LockExecuteThreadToCPU`\
  \ 或 `LockMaintThreadsToCPU` 选项将线程绑定到特定的 CPU 时，此策略尤其有效。将中断分配给数据节点中未被线程绑定的 CPU，这样中断就不会消耗数据节点线程的\
  \ CPU 资源。在这种情况下，Linux 的选择是 `irqbalance`。它可以在特定的 CPU 内重新平衡中断工作负载。\n\n在 Windows 上，需要编辑注册表来配置中断亲和性。在\
  \ Solaris 上，`pcitool` 是用于配置的工具。更多信息请参阅给定操作系统的手册。\n\n##### 超线程\n\n总体而言，超线程技术通过牺牲响应能力来提升整体吞吐量。当启用超线程时，多个逻辑核心会共享同一个物理核心。如果超线程不可用，在以下示例场景中可能会浪费部分\
  \ CPU 周期：\n\n1.  一个线程发出加载（从内存读取数据）指令。\n2.  数据是后续指令执行所必需的。\n3.  在内存响应并完成加载指令之前，CPU\
  \ 无法执行更多指令。\n\n超线程技术旨在改善此类场景下的性能。借助超线程，CPU 可能能够执行运行在另一个逻辑核心上的另一个线程的指令，从而充分利用 CPU\
  \ 核心。\n\n超线程技术存在几个主要缺点：\n\n*   单线程性能可能下降：随着更多逻辑核心共享同一个物理核心，当一个线程正在执行指令时，另一个线程无法执行新指令。\n\
  *   CPU 缓存内存的效率可能降低：物理缓存内存的一个实例必须存储来自多个线程的数据。这与使用上下文切换在单个 CPU 核心上运行多个线程时的问题相同。然而，数据节点不依赖于上下文切换。理想情况下，数据节点上的每个线程应独占一个绑定的\
  \ CPU 核心。\n*   CPU 使用率指标会产生误导：虽然操作系统看不到物理核心的使用情况，但 CPU 资源的容量很可能低于预期。\n\n那么，你到底应该使用超线程吗？答案是“视情况而定”。这取决于各种因素，例如应用程序负载类型和硬件规格。因此，最好在更改超线程设置的同时运行基准测试。你可以从\
  \ BIOS 设置中开启或关闭它。\n\n如果你觉得关闭它很麻烦，那就不要为每个物理核心分配超过一个逻辑核心。在这种情况下，可以配置线程分配，使某些类型的线程使用超线程，而其他线程则不使用。例如，`ldm`\
  \ 线程在不使用超线程时往往表现更好，但 `recv` 和 `send` 线程在使用超线程时性能更佳。\n\n#### 备份选项\n\n毋庸置疑，备份是数据库管理系统最重要的任务之一。任何存储介质都可能发生故障。即使没有硬件故障，操作失误或应用程序中的错误也可能导致重要数据丢失。为了保护重要数据，必须频繁进行备份。MySQL\
  \ NDB Cluster 具有原生备份功能，这是进行在线备份的唯一方式。然而，由于需要处理大量数据，在线备份是资源消耗型过程。默认设置通常没问题，但有时为了获得更好的性能，你需要进行微调。有关备份的更多信息，请参阅第\
  \ 8 章。\n\n##### BackupDataDir\n\n| 默认值 | `FileSystemPath` |\n| 取值范围 | 任意目录路径名 |\n\
  | 配置段 | `[NDBD]` 或 `[NDBD DEFAULT]` |\n| 重启类型 | 初始节点重启 |\n\n此选项指定存储备份数据的目录。备份文件通常很大，因此常与主数据分开存储在非昂贵磁盘上。从\
  \ I/O 带宽角度考虑，使用独立磁盘也是更优选择。\n\n##### BackupDiskWriteSpeedPct\n\n| 默认值 | 50 |\n| 取值范围\
  \ | 0 – 90 （百分比） |\n| 配置段 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n| 生效版本 | 7.4.8\
  \ – 最新 |\n\n此选项指定 LCP（本地检查点）和备份的 I/O 带宽速率。它们共享由 `MinDiskWriteSpeed` 和 `MaxDiskWriteSpeed`\
  \ 指定的相同 I/O 带宽。这意味着在备份期间，LCP 的速度将受到限制。在繁忙的系统上，应为此选项指定较小的值。\n\n有关这些选项的更多信息，请参阅本章前面描述相关选项的部分。\n\
  \n##### CompressedBackup\n\n| 默认值 | 0 |\n| 取值范围 | 0, 1 （布尔值） |\n| 配置段 | `[NDBD DEFAULT]`\
  \ |\n| 重启类型 | 节点重启 |\n\n当此选项为 true 时，备份以压缩格式存储。这会节省磁盘空间，但会消耗更多 CPU 资源。请勿在繁忙的系统上启用此选项。\n\
  \n##### BackupWriteSize\n\n| 默认值 | 256K |\n| 取值范围 | 2K – 4294967039 (字节) (< 7.4.8)\
  \ ; 32K – 4294967039 (字节) (>= 7.4.8) |\n| 配置段 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启\
  \ |\n\n此选项指定备份数据和日志的写入单元的默认大小。更大的写入单元尺寸可以减少 I/O 操作。当需要更多空间时，写入大小会自动扩展至 `BackupMaxWriteSize`。\n\
  \n##### BackupMaxWriteSize\n\n| 默认值 | 1M |\n| 取值范围 | 2K – 4294967039 (字节) (< 7.4.8)\
  \ ; 256K – 4294967039 (字节) (>= 7.4.8) |\n| 配置段 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启\
  \ |\n\n此选项指定备份数据和日志的写入单元的最大尺寸。\n\n##### BackupDataBufferSize\n\n| 默认值 | 16M |\n\
  | 取值范围 | 0 – 4294967039 (字节) (< 7.4.8) ; 2M – 4294967039 (字节) (7.4.8 – 7.4.10, 7.5.0)\
  \ ; 512K – 4294967039 (字节) (7.4.11 – 最新, 7.5.1 – 最新) |\n| 配置段 | `[NDBD DEFAULT]`\
  \ |\n| 重启类型 | 节点重启 |\n\n此选项指定备份数据的缓冲区大小。数据节点使用两种类型的备份缓冲区：一种用于数据，另一种用于日志。`ldm` 线程将需要备份的数据发送到此缓冲区。一旦缓冲区填满超过\
  \ `BackupWriteSize`，数据就会被写入文件。备份进程可以在写入文件的同时继续运行，并并行地继续填充缓冲区。\n\n##### BackupLogBufferSize\n\
  \n| 默认值 | 16M |\n| 取值范围 | 0 – 4294967039 (字节) (< 7.4.8) ; 2M – 4294967039 (字节) (>=\
  \ 7.4.8) |\n| 配置段 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定备份日志的缓冲区大小。备份日志跟踪备份期间数据发生的所有更改。\n\
  \n##### BackupMemory\n\n| 默认值 | 32M |\n| 取值范围 | 0 – 4294967039 (字节) |\n| 配置段 | `[NDBD\
  \ DEFAULT]` |\n| 重启类型 | 节点重启 |\n| 生效版本 | – 7.2 系列；在 7.3 中已弃用 |\n\n此选项在 7.3 系列中已弃用，在\
  \ 7.5 系列中被移除。此选项仅是 `BackupDataBufferSize` 和 `BackupLogBufferSize` 之和。在旧版本中，当这两个选项之一发生变化时，必须调整此选项。\n\
  \n##### BackupReportFrequency\n\n| 默认值 | 0 |\n| 取值范围 | 0 – 4294967039 (秒) |\n| 配置段\
  \ | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定将备份进度报告给集群日志的频率。默认值 0 表示不生成备份报告。不要设置得过于频繁，否则集群日志将被备份报告填满。如果你只想检查是否存在备份延迟，可以使用\
  \ `ndb_mgm` 客户端的 `ALL REPORT BACKUP` 命令作为替代。\n\n#### 传输器选项\n\n基本上，传输器的属性是针对每个单独的传输器配置的。但是，有少数选项是按数据节点设置的。请注意，数据节点通常有多个传输器。\n\
  \n##### TotalSendBufferMemory\n\n| 默认值 | 0 |\n| 取值范围 | 0, 256K – 4294967039 (字节)\
  \ |\n| 配置段 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定所有传输器的发送缓冲区总内存大小。无论节点类型如何，每个节点都需要一个传输器。默认情况下，发送缓冲区是为每个传输器分配的。因此，发送缓冲区所需的总内存大小与\
  \ `(节点数量 – 1)` 成正比增加。当配置了大量节点时，这会导致内存消耗巨大。\n\n此选项可以限制内存消耗，并使发送缓冲区内存按需分配。当连接了大量非繁忙的\
  \ API 节点或 SQL 节点时，请考虑设置此选项。\n\n\n##### `ExtraSendBufferMemory`\n\n| 默认值 | 0 |\n\
  | 范围 | 0, 32G (字节) |\n| 段落 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定了当传输器发送缓冲区即将耗尽时额外分配的内存大小。拥有额外的发送缓冲区内存可以提高数据节点的稳定性。目前，`TotalSendBufferMemory`和`ExtraSendBufferMemory`在内存使用方式上没有区别。这些选项的总和将被分配给一个缓冲区。\n\
  \n#### 磁盘对象选项\n\n如果决定使用磁盘数据表，为磁盘数据表使用的对象设置选项非常重要。关于磁盘数据表的更多信息，请参见第 2 章。\n\n#####\
  \ `FileSystemPathDD`\n\n| 默认值 | `FileSystemPath` |\n| 范围 | 任意目录路径名 |\n| 段落 | `[NDBD]`\
  \ 或 `[NDBD DEFAULT]` |\n| 重启类型 | 初始节点重启 |\n\n此选项为`FileSystemPathDataFiles`和`FileSystemPathUndoFiles`选项指定默认值。\n\
  \n##### `FileSystemPathDataFiles`\n\n| 默认值 | `FileSystemPathDD` |\n| 范围 | 任意目录路径名\
  \ |\n| 段落 | `[NDBD]` 或 `[NDBD DEFAULT]` |\n| 重启类型 | 初始节点重启 |\n\n此选项指定存储磁盘数据表数据文件的目录路径。此选项允许您将磁盘数据表和检查点数据放置在独立的磁盘上。将它们分开存放是良好的实践，这样检查点操作可以顺利进行，不受磁盘数据表的干扰。\n\
  \n强烈建议使用具有良好随机 I/O 性能的磁盘。不要为此目的使用硬盘驱动器，因为它们不擅长随机 I/O。\n\n##### `FileSystemPathUndoFiles`\n\
  \n| 默认值 | `FileSystemPathDD` |\n| 范围 | 任意目录路径名 |\n| 段落 | `[NDBD]` 或 `[NDBD DEFAULT]`\
  \ |\n| 重启类型 | 初始节点重启 |\n\n此选项指定存储磁盘数据表撤销日志文件的目录路径。甚至可以为磁盘数据表的数据文件和撤销日志文件使用独立的磁盘。当然，使用独立磁盘的好处是增加了总的磁盘\
  \ I/O 带宽。\n\n##### `InitialLogFileGroup`\n\n| 默认值 | 无 |\n| 范围 | 指定日志文件组的字符串 |\n\
  | 段落 | `[NDBD DEFAULT]` |\n| 重启类型 | 初始系统重启 |\n\n此选项指定在系统启动时自动创建的日志文件组的属性。该选项由三个或更多由分号分隔的部分组成。在以下示例中，名为`LG1`的日志文件组配置了两个\
  \ 5GB 的撤销日志文件和 1GB 的撤销日志缓冲区。这些撤销日志文件在`FileSystemPathUndoFiles`下创建。\n\n```\nInitialLogFileGroup\
  \ = name=LG1; undo_buffer_size=1G; undo1.log:5G; undo2.log:5G\n```\n\n`name`和`undo_log_buffer`属性是可选的。它们的默认值分别是`DEFAULT-LG`和`64M`。如果配置了多个撤销日志文件，可以使用分号列出它们。只要分配了足够的容量，撤销日志文件的数量并不重要。因此，您无需列出小文件。\n\
  \n此选项是为磁盘数据表设置所需日志文件组的一种便捷方法。此选项仅在集群首次启动时生效。您可以使用诸如`CREATE LOGFILE GROUP`之类的 DDL\
  \ 语句来设置日志文件组。更多信息请参见第 18 章。\n\n##### `InitialTableSpace`\n\n| 默认值 | 无 |\n| 范围 |\
  \ 指定日志文件组的字符串 |\n| 段落 | `[NDBD DEFAULT]` |\n| 重启类型 | 初始系统重启 |\n\n此选项指定在系统启动时自动创建的磁盘数据表表空间的属性。该选项由两个或多个由分号分隔的部分组成。在以下示例中，名为`TS1`的表空间配置了四个\
  \ 16GB 的数据文件。这些数据文件在`FileSystemPathDataFiles`下创建。\n\n```\nInitialTableSpace = name=TS1;\
  \ data1.dat:16G; data2.dat:16G; data3.dat:16G; data4.dat:16G\n```\n\n虽然表空间必须与日志文件组关联，但通过此选项创建的表空间需要`InitialLogFileGroup`选项创建的日志文件组。\n\
  \n此选项是为磁盘数据表设置所需表空间的一种便捷方法。此选项必须与`InitialLogFileGroup`一起使用。此选项仅在集群首次启动时生效。您可以使用诸如`CREATE\
  \ TABLESPACE`之类的 DDL 语句来设置日志文件组。更多信息请参见第 18 章。\n\n##### `DiskPageBufferMemory`\n\
  \n| 默认值 | 64M |\n| 范围 | 4M – 1T |\n| 段落 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n\
  此选项指定为磁盘页缓冲区分配的内存大小。此缓冲区用于缓存磁盘数据表上的行数据。如果您大量使用磁盘数据表，则需要为此缓冲区分配大量内存。另一方面，如果您不使用磁盘数据表，则可以将此选项减小到最小值以节省内存。\n\
  \n##### `DiskIOThreadPool`\n\n| 默认值 | 2 |\n| 范围 | 0 – 4294967039 |\n| 段落 | `[NDBD\
  \ DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定了用于针对表空间和撤销日志文件进行磁盘 I/O 的线程数量。您应该使用多个线程的主要原因是磁盘\
  \ I/O 是非常耗时的任务，文件操作系统调用不会立即响应。当一个线程等待系统调用的响应时，它无法处理其他任务。因此，当一个线程正在处理其他任务时，它无法发出文件操作系统调用。这会浪费\
  \ CPU 时间。\n\n使用适当数量的线程访问文件可以缓解这个问题。如果用户进程中发出多个 I/O 请求，请求会在内核和/或磁盘控制器中排队。I/O 请求按照内核和/或磁盘控制器中的\
  \ I/O 调度程序决定的顺序进行处理。这可以最大化磁盘 I/O 性能。\n\n在以下场景中可能需要增加此选项：\n*   将 I/O 负载分散到独立的磁盘上：表空间和撤销日志文件放置在多个磁盘上。在这种情况下，可以利用更多线程来提高\
  \ I/O 并行性。\n*   使用高性能磁盘：使用高性能磁盘作为底层存储。需要更高的 I/O 并行性来填满 I/O 带宽。\n\n您可能知道，这类问题可以通过异步\
  \ I/O 解决，例如 Linux 上的 epoll。但是没有与异步 I/O 相关的选项，因为 MySQL NDB Cluster 尚未实现它。它使用大量线程进行磁盘\
  \ I/O。\n\n#### 心跳和看门狗选项\n\n如第 1 章所述，MySQL NDB Cluster 采用故障早期策略，该策略会强制停止无响应的数据节点，以避免整个集群变慢。为了检测无响应的数据节点，MySQL\
  \ NDB Cluster 利用心跳和看门狗。\n\n##### `HeartbeatIntervalDbDb`\n\n| 默认值 | 5000 |\n| 范围\
  \ | 10 – 4294967039 (毫秒) |\n| 段落 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定了心跳之间的时间间隔。数据节点向另一个数据节点发送心跳信号（`CM_HEARTBEAT`），并每`HeartbeatIntevalDbDb`毫秒检查一次该心跳信号是否已到达。数据节点有两个独立的计时器分别用于心跳信号的发送和检查，但它们的间隔是相同的。如果一个数据节点检测到来自另一个数据节点的心跳信号连续四次缺失，则另一个数据节点将被标记为死亡，这将导致故障转移或系统关闭，具体取决于是否有足够的幸存节点继续集群操作。\n\
  \n如果集群运行在不稳定的网络上，请稍微增加此选项。如果您的应用程序需要最佳响应时间并且使用专用高速网络，请考虑将此选项减少到 1500，这是旧版本（< 7.2.0）的默认值。\n\
  \n\n\n#### HeartbeatIntervalDbApi\n\n| 默认值 | 1500 |\n| 范围 | 100 – 4294967039（毫秒）\
  \ |\n| 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定从 API（SQL）节点发送的心跳检查之间的时间间隔。所有\
  \ API 节点每 100 毫秒发送一次心跳（`API_REGREQ`）信号。数据节点每隔 `HeartbeatIntervalDbApi` 毫秒检查一次是否已收到心跳信号。如果一个\
  \ API 节点连续错过四次心跳信号，该 API 节点将被标记为死亡。随后，该 API 节点将被断开连接，所有进行中的事务都将被中止。\n\n当您的集群运行在不稳定的网络上时，请略微增大此选项的值。\n\
  \n#### HeartbeatOrder\n\n| 默认值 | 0 |\n| 范围 | 100 – 4294967039 |\n| 章节 | `[NDBD]`\
  \ |\n| 重启类型 | 系统重启 |\n\n此选项定义了心跳信号的发送顺序。心跳信号以循环方式发送。这意味着每个数据节点仅从一个节点接收心跳信号，同时，一个数据节点也仅向一个节点发送心跳信号。当数据节点数量超过两个时，心跳信号的源节点（左节点）和目标节点（右节点）是不同的。否则，它们是同一个节点。\n\
  \n心跳信号的顺序在每个 `[NDBD]` 部分（而不仅仅是 `[NDBD DEFAULT]` 部分）中被指定为一个整数值。心跳信号从一个节点发送到下一个具有该选项更大数值的数据节点。具有最高\
  \ `HeartbeatOrder` 值的数据节点向具有最低值的数据节点发送心跳信号。\n\n在大多数情况下，您无需更改此选项。当网络拓扑结构不对称且每个传输器的稳定性存在差异时，不稳定的网络更有可能丢失心跳。在这种情况下，请配置心跳顺序，确保每个节点组内至少有一个数据节点拥有稳定的心跳源，以避免因节点组故障导致整个系统关闭。\n\
  \n#### TimeBetweenWatchDogCheck\n\n| 默认值 | 6000 |\n| 范围 | 70 – 4294967039（毫秒） |\n\
  | 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定每次看门狗检查之间的时间间隔。看门狗是一种检查数据节点是否冻结的机制。如果看门狗线程观察到一个作业线程在连续三个检查周期内保持同一状态，它将立即关闭该节点。\n\
  \n#### ArbitrationTimeout\n\n| 默认值 | 7500 |\n| 范围 | 10 – 4294967039（毫秒） |\n| 章节\
  \ | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定仲裁的超时时间（毫秒）。如第 1 章和第 3 章所述，当集群发生网络分区时会执行仲裁。如果数据节点在超过\
  \ `ArbitrationTimeout` 毫秒的时间内无法从仲裁器获得回复，它将立即终止。\n\n#### StartPartialTimeout\n\n\
  | 默认值 | 30000 |\n| 范围 | 0 – 4294967039（毫秒） |\n| 章节 | `[NDBD DEFAULT]` |\n| 重启类型\
  \ | 节点重启 |\n\n此选项指定等待所有其他节点准备就绪的秒数。0 表示无限期等待。一旦 `StartPartialTimeout` 毫秒过去，且仍有一个或多个数据节点缺失，集群将强制继续启动过程，而不会等待缺失的节点。\n\
  \n#### StartPartitionedTimeout\n\n| 默认值 | 60000 |\n| 范围 | 0 – 4294967039（毫秒） |\n\
  | 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定等待网络分区解决的秒数。0 表示无限期等待。一旦 `StartPartitionedTimeout`\
  \ 毫秒过去，且仍有任何数据节点缺失，集群进入网络分区状态，即使潜在的网络分区问题尚未解决，集群也将强制继续启动过程。\n\n我建议将此选项设置为 0 或一个非常大的值。以潜在的网络分区状态启动是非常危险的。这很可能导致网络分区，因为在此超时发生时不会执行仲裁。因此，当超时发生时，两个独立的集群可能同时启动。必须避免这种情况，以保护数据免遭损坏。\n\
  \n#### 日志记录选项\n\n管理节点记录集群日志，但其内容（例如其事件）的来源是在数据节点上生成的。有几个与数据节点上事件报告相关的选项。有关日志级别的更多信息，请参阅第\
  \ 16 章。\n\n#### MemReportFrequency\n\n| 默认值 | 0 |\n| 范围 | 0 – 4294967039（秒） |\n\
  | 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 系统重启 |\n\n当此选项设置为非零值时，集群日志会定期记录内存使用情况。如果未激活定期使用情况报告，集群日志将在内存使用率达到\
  \ 80%、90% 和 100% 时进行报告。\n\n#### StartupStatusReportFrequency\n\n| 默认值 | 0 |\n| 范围\
  \ | 0 – 4294967039（秒） |\n| 章节 | `[NDBD DEFAULT]` |\n| 重启类型 | 系统重启 |\n\n当此选项设置为非零值时，集群日志会记录初始启动阶段\
  \ 4 的进度。如果重做日志的大小很大，此阶段可能需要很长时间，因为必须在此阶段初始化重做日志。\n\n#### 推荐的配置策略\n\n配置集群时最重要的事情是，您应该根据需求选择合适的服务器机器。不要根据服务器机器的规格来确定您的需求。应用需求大致可分为以下几类——容量、性能、响应速度和可用性。\n\
  \n例如，在容量方面，不可能将 `DataMemory` 设置得大于服务器机器的物理内存大小。您不应在确定所需内存量之前就选择服务器机器。\n\n数据节点的配置应遵循以下步骤：\n\
  \n1.  估算所需的计算机资源，例如内存大小、重做日志的磁盘空间、I/O 速度、网络速度和 CPU 速度。\n2.  在一定的余量范围内选择合适的计算机硬件。\n\
  3.  微调数据节点配置，使数据节点能够充分利用计算机资源。\n4.  为将来容量扩展时添加数据节点做好准备。\n\n在估算内存大小时，线程数量非常重要，因为它是增加所需内存大小的最重要的间接因素。多线程是现代计算机硬件的必备条件。精心定义的\
  \ `ThreadConfig` 与随手设置的 `MaxNoOfExecutionThreads` 相比，可能会使性能翻倍。\n\n仔细估算 LCP 速度和重做日志文件大小。它们是定义事务总体写入速度上限的主要因素。\n\
  \n配置和系统规划并非孤立的过程。我建议通读第 3 章和第 4 章。\n\n### SQL 节点选项\n\n本节讨论 SQL 节点和 API 节点的主要选项。章节名称可以是\
  \ `MYSQLD` 或 `API`。无论指定哪个章节名称，这些章节都被标识为相同的节点类型。在以下描述中，为方便起见，使用 `MYSQLD`。\n\n####\
  \ SQL 节点的主要选项\n\n##### NodeId\n\n| 默认值 | 自动 |\n| 范围 | 1 – 255 |\n| 章节 | `[MYSQLD]`\
  \ |\n| 重启类型 | 节点重启 |\n\n节点的标识符，其含义与其他节点类型的 `NodeId` 相同。\n\n##### HostName\n\n| 默认值\
  \ | 无（接受来自任何主机的连接） |\n| 范围 | 任意主机名或 IP 地址 |\n| 章节 | `[MYSQLD]` |\n| 重启类型 | 系统重启\
  \ |\n\n节点所在的主机名或 IP 地址。您可以不设置此选项，这意味着该插槽允许从任何主机连接。如果您不希望无特权节点连接，请显式设置此选项。\n\n\n\n\
  ##### ArbitrationRank\n\n| 默认值 | 0 |\n| 范围 | 0 – 2 |\n| 配置节 | `[MYSQLD]` 或 `[MYSQLD\
  \ DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n`ArbitrationRank` 选项指定了节点成为仲裁节点的可能性。该参数的可选值为 0、1\
  \ 和 2。SQL 节点的默认值为 0，这意味着默认情况下 SQL 节点不会成为仲裁节点。要使 SQL 节点成为额外的仲裁节点，请设置一个非零值。1 的优先级高于\
  \ 2。请注意，仲裁节点不应与数据节点位于同一台主机上。更多信息请参考本章前面对 `ArbitrationRank` 的解释，以及第 1 章和第 3 章的内容。\n\
  \n##### DefaultOperationRedoProblemAction\n\n| 默认值 | `QUEUE` |\n| 范围 | `ABORT` 或\
  \ `QUEUE` |\n| 配置节 | `[MYSQLD]` 或 `[MYSQLD DEFAULT]` |\n| 重启类型 | 系统重启 |\n| 生效版本\
  \ | 7.2.10 或更新 |\n\n此选项定义了由于超出重做操作超限阈值而中止的事务如何处理。每个值的含义如下：\n\n*   `ABORT`：来自已中止事务的任何挂起操作也将被中止。这适用于你希望在应用中自行处理重试的情况。\n\
  *   `QUEUE`：来自已中止事务的挂起操作将被排队以进行重试。\n\n请参阅本章前面对 `RedoOvercommitLimit` 和 `RedoOvercommitCounter`\
  \ 的解释。\n\n##### BatchSize\n\n| 默认值 | 64 (7.2.0) 256 (>= 7.2.1) |\n| 范围 | 1 – 992\
  \ (记录数) |\n| 配置节 | `[MYSQLD]` 或 `[MYSQLD DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定了扫描操作的批处理大小（以记录数为单位）。由于扫描操作会返回许多行，为了性能考虑，将记录打包成适当大小的批次非常重要。批处理大小受此选项和下面描述的\
  \ `BatchByteSize` 选项的限制。\n\n##### BatchByteSize\n\n| 默认值 | 32K (7.2.0) 16K (>= 7.2.1)\
  \ |\n| 范围 | 1K – 1M (字节) |\n| 配置节 | `[MYSQLD]` 或 `[MYSQLD DEFAULT]` |\n| 重启类型 |\
  \ 节点重启 |\n\n此选项指定了扫描操作的批处理大小（以字节为单位）。\n\n##### MaxScanBatchSize\n\n| 默认值 | 256K\
  \ |\n| 范围 | 32K – 16M (字节) |\n| 配置节 | `[MYSQLD]` 或 `[MYSQLD DEFAULT]` |\n| 重启类型\
  \ | 节点重启 |\n\n此选项指定了一个 SQL 节点一次可以从数据节点接收的数据总量。SQL 节点有可能一次性从数据节点接收过多记录，从而消耗过多内存。此选项旨在保护\
  \ SQL 节点免受此类过度内存消耗的影响。\n\n##### TotalSendBufferMemory\n\n| 默认值 | 0 |\n| 范围 | 0,\
  \ 256K – 4294967039 (字节) |\n| 配置节 | `[MYSQLD]` 或 `[MYSQLD DEFAULT]` |\n| 重启类型 |\
  \ 节点重启 |\n\n此选项指定了所有传输器的发送缓冲区总内存大小。无论节点类型如何，每个节点都需要一个传输器。默认情况下，每个传输器都会分配一个发送缓冲区。因此，所需的发送缓冲区内存总大小与\
  \ `(节点数量 – 1)` 成正比。请注意，SQL 节点之间不相互连接。但是，即使 SQL 节点只连接到数据节点和管理节点，当配置了大量数据节点时，也会导致较大的内存消耗。请参阅本章前面对\
  \ `TotalSendBufferMemory` 的解释。\n\nSQL 节点也定义了 `ExtraSendBufferMemory` 选项。这些选项配置的内存被分配给同一个缓冲区，且缓冲区使用情况不会按选项区分。\n\
  \n#### SQL 节点配置要点\n\n在大多数情况下，SQL 节点选项的默认值就足够了。通常不需要经常更改它们。如果 SQL 节点的服务器机器拥有高速 CPU\
  \ 和大内存，可以考虑增加批处理大小以最大化性能。虽然 `config.ini` 中可供 SQL 节点配置的选项不多，但 `mysqld` 上存在大量选项。\n\
  \n请注意，当 `--ndb-cluster-connection-pool` 选项设置为大于 1 时，SQL 节点将拥有多个 NDB API 连接。在这种情况下，缓冲区总大小也会与连接数量成比例增加。\n\
  \n### TCP 传输器选项\n\n在 MySQL NDB 集群中，可以对单个传输器（两个节点之间的网络路径）进行微调。可以配置以下模式的传输器：\n\n*\
  \   两个数据节点之间\n*   数据节点和 SQL（API）节点之间\n\n请注意，SQL（API）节点之间不相互连接。管理节点的传输器无法配置。\n\n\
  在大多数情况下，当传输器使用专用网络路径（例如使用交叉以太网电缆的直接连接）连接时，才会对单个传输器进行配置。\n\n随着节点数量的增加，传输器总数将急剧增加。每个任意两个数据节点的组合，或每个数据节点与\
  \ SQL 节点的组合，都存在一个传输器。两个数据节点之间的传输器数量可以用组合数 [`n`] `C` [`2`] 来计算，其中 `n` 代表数据节点的数量。数据节点的最大数量是\
  \ 48，因此两个数据节点之间的最大传输器数量是 [`48`] `C` [`2`] `= 1128`。数据节点与 SQL 节点之间的最大传输器数量是 `48 *\
  \ (255 – 48 – 1) = 9888`。（在此情况下，有 48 个数据节点，1 个管理节点和 206 个 SQL 节点。）因此，最大传输器总数为 `1128\
  \ + 9888 = 11016`，数量庞大。由此可见，在大型集群环境中定义单个传输器是一项艰巨的任务。\n\n#### 传输器主要选项\n\n##### NodeId1,\
  \ NodeId2\n\n| 默认值 | 无 |\n| 范围 | 1 – 255 |\n| 配置节 | `[TCP]` |\n| 重启类型 | 节点重启 |\n\
  \n这两个选项使用节点 ID 来标识传输器。任意两个节点的组合恰好对应一个传输器。换句话说，你需要为每两个节点的组合列出 `[TCP]` 配置节。\n\n#####\
  \ HostName1, HostName2\n\n| 默认值 | 无 |\n| 范围 | `NDBD`、`API` 或 `MYSQLD` 配置节中出现的主机名或\
  \ IP 地址 |\n| 配置节 | `[TCP]` |\n| 重启类型 | 节点重启 |\n\n这些选项指定了要使用的主机名或 IP 地址。如果一台服务器机器有多个网络接口，那么它们应该对应多个\
  \ IP 地址和主机名。因此，例如，可以按节点类型分离网络路径。这种配置将在本节后面讨论。\n\n##### SendBufferMemory\n\n| 默认值\
  \ | 2M |\n| 范围 | 256K – 4294967039 (字节) |\n| 配置节 | `[TCP]` 或 `[TCP DEFAULT]` |\n\
  | 重启类型 | 节点重启 |\n\n此选项指定了每个传输器用于缓冲待发送数据的内存大小。信号数据在发送到其他节点之前存储在此缓冲区中，因此该缓冲区称为发送缓冲区。当发送缓冲区变满时，数据节点无法将信号写入缓冲区，导致信号丢失。这种情况对数据节点而言是严重的，节点将会关闭。\n\
  \n在大多数情况下，默认值是足够的。\n\n##### ReceiveBufferMemory\n\n| 默认值 | 2M |\n| 范围 | 16K – 4294967039\
  \ (字节) |\n| 配置节 | `[TCP]` 或 `[TCP DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n此选项指定了每个传输器用于接收数据的内存大小。从其他数据节点接收到的信号数据在调度到\
  \ NDB 内核块之前存储在此缓冲区中。此缓冲区称为接收缓冲区。\n\n在大多数情况下，默认值是足够的。\n\n\n\n#### 通过独立网络路径的传输通道\n\
  \n###### 过载限制\n\n| 默认值 | 0 |\n| --- | --- |\n| 范围 | 0 – 4294967039 (字节) |\n| 所属章节\
  \ | `[TCP]` 或 `[TCP DEFAULT]` |\n| 重启类型 | 节点重启 |\n\n当发送缓冲区中未发送的数据超过此选项设定的值时，`DBLQH`\
  \ 内核块将中止更多请求并返回错误 `1218`。在发送缓冲区几乎满时拒绝更多请求是一种合理的实现。将此选项设置为发送缓冲区大小的大约 80% 将降低因发送缓冲区不足而导致关闭的概率。默认值为\
  \ `0`，这意味着 `DBLQH` 不检查过载状态。建议在 `[TCP DEFAULT]` 部分适当设置此选项。\n\n#### 通过独立网络路径的传输通道\n\
  \n在没有显式配置时，节点使用在 `HostName` 选项上指定的网络接口相互通信。但是，可以在 `[TCP]` 部分指定与 `HostName` 不同的其他网络接口。然后，您可以实现以下场景：\n\
  \n*   独立的网络允许数据节点在网络故障时访问仲裁器。这可以避免整个系统关闭。\n*   在低成本交换机之间分配工作负载，以获得更好的吞吐量和更低的成本。\n\
  *   将属于同一节点组的数据节点之间的通信重定向到物理服务器的直接连接，以获得更快的响应。\n*   将所有数据节点之间的通信重定向到专用的快速网络交换机。\n\
  \n尽管定义大量的 `[TCP]` 部分是一项繁琐的任务，但这是值得的，因为网络很可能是故障和性能瓶颈的来源。\n\n### 程序启动选项 (my.cnf)\n\
  \n本节介绍每个程序的主要启动选项，以及哪些选项被指定为命令行选项。与传统的 MySQL 程序一样，MySQL NDB Cluster 程序也会在 `my.cnf`\
  \ 中读取选项。\n\n`my.cnf` 文件中的选项和命令行中的选项是相同的东西，只是格式不同。前者没有破折号。另一个区别是，在 `my.cnf` 中不能使用缩写。\n\
  \n可以在不同的目录中拥有多个 `my.cnf` 文件。您可以使用 `--help --verbose` 选项查看程序读取了哪些文件：\n\n```\nshell$\
  \ ndbmtd --help --verbose | grep /my.cnf\n/etc/my.cnf /etc/mysql/my.cnf /usr/local/mysql/etc/my.cnf\
  \ ~/.my.cnf\n```\n\n#### 通用选项\n\n有几个选项在 NDB 程序（包括 `mysqld`）中常用。表 4-8 显示了这些常见选项。\n\
  \n**表 4-8. NDB 程序的通用选项**\n\n| 选项名称 | 缩写 | 默认值 | 描述 |\n| --- | --- | --- | --- |\n\
  | `--ndb-connectstring=string` `--connect-string=string` | `-c` | `localhost:1186`\
  \ | 指定连接字符串，用于连接管理节点。 |\n| `--ndb-nodeid=num` | | 0 (自动) | 此节点的节点 ID。当同一主机上运行多个节点时，必须显式指定节点\
  \ ID。 |\n| `--connect-retries=num` | | 12 | 连接到管理服务器失败时的重试次数。 |\n| `--connect-retry-delay=seconds`\
  \ | | 5 | 重试之间的间隔（秒）。 |\n| `--ndb-mgmd-host=host[:port]` | | `localhost:1186` |\
  \ 指定管理服务器主机和端口。 |\n| `--ndb-optimized-node-selection=num` | | `3` (对于 `mysqld`)\
  \ `TRUE` (对于其他) | 决定在数据访问时如何选择作为 TC 的数据节点。 |\n| `--character-sets-dir=path` | |\
  \ 无 | 包含字符集信息的目录。此选项实际上仅对 `mysqld` 有效。 |\n| `--core-file` | | `FALSE` | 当为 `TRUE`\
  \ 时，在崩溃时写入核心文件。 |\n| `--debug=options` | | `d:t:O,/tmp/*.trace` | 此选项仅在调试版本中可用。\
  \ |\n| `--help` | `-?` | `FALSE` | 打印帮助信息。 |\n| `--version` | `-V` | `FALSE` | 打印版本。\
  \ |\n\n##### 连接字符串\n\n除了像 `ndb_print_file` 这样的离线工具外，所有 NDB 程序在启动时都会连接到管理服务器。因此，连接字符串是一个关键且常见的选项。\n\
  \n当节点尝试连接时，管理服务器会将客户端的主机名与每个插槽上的 `HostName` 选项进行比较。如果有匹配的插槽可用，则接受连接。要连接到集群，您需要指定一个与至少一个可用插槽匹配的连接字符串。不需要身份验证或其他任何东西。\n\
  \n> 注意：没有 `HostName` 选项的插槽将接受来自任何主机的连接。\n\n连接字符串是表示管理节点位置的字符串。指定连接字符串的选项是 `--ndb-connectstring`（或\
  \ `--connect-string`）。虽然可以使用 `--ndb-mgmd-host` 指定管理服务器的主机名，但我不建议您使用它。因为它有限制，例如不能指定端口号。我推荐使用\
  \ `--ndb-connectstring`。连接字符串的格式如下：\n\n```\n[nodeid=#,]{hostname_or_ipaddr[:port][hostname_or_ipaddr[:port],\
  \ ...]}\n```\n\n请注意，方括号中的参数是可选的，可以省略。例如，如果管理服务器运行在名为 `mgm1` 的主机上，使用默认端口且不需要特定的节点\
  \ ID，则连接字符串为：\n\n```\nmgm1\n```\n\n如果管理服务器运行在名为 `mgm1` 和 `mgm2` 的主机上，使用网络端口 `1188`，并且需要的节点\
  \ ID 是 `20`，则连接字符串为：\n\n```\nnodeid=20,mgm1:1188,mgm2:1188\n```\n\n#### ndb_mgmd\
  \ 的主要选项\n\n有几个选项可以控制 `ndb_mgmd` 守护程序的启动行为。表 4-9 显示了 `ndb_mgmd` 的常用选项。\n\n**表 4-9.\
  \ ndb_mgmd 的主要选项**\n\n| 选项名称 | 缩写 | 默认值 | 描述 |\n| --- | --- | --- | --- |\n| `--config-file=file`\
  \ | `-f` | `./config.ini` | 配置文件的路径。 |\n| `--configdir=dir` `--config-dir=dir` |\
  \ | 安装目录 | 存储配置缓存的目录。 |\n| `--initial` | | 无参数 | 指定此选项时，所有配置缓存条目将被清除，并创建一个新的缓存条目。\
  \ |\n| `--reload` | | 无参数 | 指定此选项时，将读取 `config.ini` 并创建一个新的缓存条目。 |\n| `--config-cache[=TRUE|FALSE]`\
  \ 或 `--skip-config-cache` | | `TRUE` | 此选项指定是否使用配置缓存。 |\n| `--bind-address=host[:port]`\
  \ | | 无 | 此选项限制管理客户端可以连接的主机。 |\n| `--print-full-config` | `-P` | `FALSE` | 打印有效配置并退出。\
  \ |\n\n\n##### 配置缓存\n\n管理节点拥有一种机制，可以将配置数据以二进制格式缓存，而非读取并解析 `config.ini` 文件。此功能称为配置缓存。它能增强集群配置在变更时的稳定性。这是一个便捷的功能，但需稍加留意。\n\
  \n配置缓存默认启用。在启动时，`ndb_mgmd` 会读取最新的配置缓存条目，而无需读取 `config.ini`，即使 `config.ini` 已被更新。要使\
  \ `config.ini` 被读取，必须指定 `--reload` 选项。此选项会使 `ndb_mgmd` 读取 `config.ini` 文件，并将其内容与最新的配置缓存条目进行比较。若有任何变更，则会从\
  \ `config.ini` 的内容创建一个新的缓存条目。\n\n配置缓存条目具有以下文件名格式：\n```\nndb_node-id_config.bin.seq-number\n\
  ```\n例如，节点 ID 为 255 的管理节点上的第三个配置缓存条目是 `ndb_255_config.bin.3`。由于文件带有序列号，很容易识别最新的缓存条目。如果您在更改配置后遇到问题，可以通过删除最新的缓存条目文件并重启管理节点来恢复到之前的配置。\n\
  \n`--initial` 选项将删除所有缓存条目。当您将集群安装迁移到另一个环境，并希望从头刷新配置时，此选项非常方便。\n\n请注意，即使指定了 `--skip-configuration-cache`，如果存在配置缓存条目，它仍然会被读取。要完全禁用配置缓存，您必须删除所有缓存条目并同时指定\
  \ `--skip-configuration-cache` 选项。\n\n##### 在多个管理节点下读取新配置\n\n当存在多个管理节点时，在配置变更后重启需要遵循特殊流程，因为如果存在一个正在运行的管理节点，管理服务器会从该节点读取配置。简单的滚动重启（逐个重启管理节点）会失败。`ndb_mgmd`\
  \ 的重启必须使用以下步骤完成：\n\n1.  修改 `config.ini`。\n2.  停止所有管理节点，一次一个。\n3.  使用 `--initial`\
  \ 或 `--reload` 选项启动第一个 `ndb_mgmd`。\n4.  如果您使用 `--initial` 选项启动了第一个 `ndb_mgmd`，则使用\
  \ `--initial` 选项启动剩余的 `ndb_mgmd` 进程。\n5.  如果您使用 `--reload` 选项启动了第一个 `ndb_mgmd`，则在不指定\
  \ `--initial` 或 `--reload` 选项的情况下启动剩余的 `ndb_mgmd` 进程。它们将从第一个 `ndb_mgmd` 读取配置。\n\n\
  #### ndbd/ndbmtd 的选项\n\n数据节点的选项控制着启动进程的行为。表 4-10 列出了 `ndbd` 和 `ndbmtd` 常用的选项。\n\n\
  **表 4-10. ndbd 和 ndbmtd 的主要选项**\n\n| 选项名称 | 缩写 | 默认值 | 描述 |\n| --- | --- | --- |\
  \ --- |\n| `--initial` | `-i` | `FALSE` | 指定此选项时，将导致初始启动。 |\n| `--nostart` | `-n`\
  \ | `FALSE` | 当此选项为 `TRUE` 时，数据节点在连接到管理服务器后不会启动。 |\n| `--nowait-nodes=list` |  \
  \ | 无 | 此选项指定缺失的数据节点，并让数据节点执行部分重启。 |\n| `--initial-start` |   | `FALSE` | 此选项使数据节点执行初始部分重启。此选项需与\
  \ `–nowait-nodes` 选项配合使用。 |\n\n#### 初始启动\n\n如第 2 章所述，数据节点有一种称为初始启动的启动类型。在初始启动时，数据节点会在启动时擦除所有数据。初始启动分为以下类型：初始节点重启和初始系统重启。这两种初始重启类型的区别在于，前者是逐个重启数据节点，后者是在整个系统关闭后重启集群。请参阅本章前面关于重启类型的解释。\n\
  \n##### 部分启动\n\n有时，由于硬件故障等原因，需要在缺少部分数据节点的情况下启动集群。即使缺少一些数据节点，只要每个节点组至少有一个可用的数据节点，集群仍然是可以启动的。这种启动称为部分启动。\n\
  \n在执行部分启动时，必须指定 `--nowait-nodes` 选项。其参数是一个以逗号分隔的缺失节点的节点 ID 列表。例如，如果节点 ID 为 3、5 和\
  \ 7 的数据节点缺失，并且集群可以使用剩余的数据节点运行，则使用 `--nowait-nodes=3,5,7` 选项启动所有剩余的数据节点。如果是初始系统重启，则还需要\
  \ `--initial-start` 选项。\n\n##### 非自动启动\n\n个人建议使用此功能。当指定了 `--nostart` 选项时，数据节点在连接到管理节点后会暂停其执行。要恢复启动过程，必须从\
  \ `ndb_mgm` 客户端发出 `START` 命令。\n\n默认情况下，数据节点在连接到管理节点后会自动启动。在系统启动时，所有数据节点必须一次性启动。如果缺少某些数据节点且尚未准备好启动，所有正在启动的数据节点都会等待缺失的节点。当所有数据节点（由\
  \ `--nowait-nodes` 选项指定的数据节点除外）都准备就绪，或者 `StartPartialTimeout` 毫秒数已过时，正在启动的数据节点将继续启动过程。如果缺失的数据节点能够组成一个可运行的集群，换句话说，如果每个节点组至少缺失一个数据节点，则集群可能会陷入网络分区。在这种情况下，正在启动的数据节点将等待\
  \ `StartPartitionedTimeout` 毫秒数。\n\n在自动启动后照顾所有已启动的数据节点是费时费力的。我建议使用 `--nostart` 选项禁用自动启动，然后检查所有数据节点是否已连接，并使用以下命令从\
  \ `ndb_mgm` 客户端逐个启动它们。\n```\nndb_mgm> ALL START\n```\n\n#### mysqld 的选项\n\nSQL 节点\
  \ `mysqld` 拥有大量的选项，因为它的功能很复杂。例如，由于它执行查询，因此需要性能选项来调整查询执行时间。表 4-11 显示了 `mysqld` 的选项（不包括与复制相关的选项，这些选项将在第\
  \ 6 章讨论）。表 4-11 中的许多选项也在第 10、18 和 20 章中进行了讨论。\n\n##### 表 4-11. mysqld 的主要 NDB 相关选项\n\
  \n| 选项名称 | 默认值 | 描述 |\n| --- | --- | --- |\n| `--ndbcluster` | `TRUE` | 启用或禁用 NDB\
  \ Cluster 存储引擎。请勿更改默认值。 |\n| `--ndb-cluster-connection-pool=#` | 1 | 到数据节点的 NDB\
  \ API 连接数。一个连接占用一个 `MYSQLD` 插槽。范围是 1 – 63。 |\n| `--ndb-cluster-connection-pool-nodeids=#`\
  \ | 无 | 用于连接池的节点 ID 逗号分隔列表。此选项在 7.5 系列中引入。 |\n| `--ndb-optimized-node-selection=#`\
  \ | 3 | 选择数据节点作为 TC（事务协调器）的策略。范围是 0 – 3。 |\n| `--ndb-data-node-neighbor=#` | 0 |\
  \ 定义给定 SQL 节点最近的数据节点。与优化节点选择配合使用。范围是 0 – 255。此选项在 7.5 系列中引入。 |\n| `--ndb-autoincrement-prefetch-sz=#`\
  \ | 32 | 为给定 SQL 节点批量预留的自增列值，以减少对数据节点的访问。范围是 1 – 256。 |\n| `--ndb-batch-size=字节数`\
  \ | 32K | 事务批处理大小。 |\n| `--ndb-force-send=[0\\|1]` | `TRUE` | 如果设置为 true，对数据节点的请求会立即发送。\
  \ |\n| `--ndb-blob-read-batch-bytes= 字节数` | 64K | 从数据节点读取的 blob 数据的批处理大小。 |\n| `--ndb-blob-write-batch-bytes=字节数`\
  \ | 64K | 写入数据节点的 blob 数据的批处理大小。 |\n| `--ndb-default-column-format=名称` | `FIXED`\
  \ | 创建表时的默认列格式。 |\n| `--engine-condition-pushdown` | `TRUE` | 启用或禁用引擎条件下推优化。 |\n\
  | `--ndb-join-pushdown` | `TRUE` | 启用或禁用连接下推优化。 |\n| `--ndb-index-stat-enable=[0\\\
  |1]` | `FALSE` | 启用或禁用表统计功能。 |\n| `--ndb-index-stat-option=字符串` | 无 | 索引统计功能的参数逗号分隔列表。\
  \ |\n| `--ndb-allow-copying-alter-table=[0\\|1]` | `TRUE` | 如果为 true，则允许 `ALTER\
  \ TABLE` 的 `COPY` 算法。此选项在 7.5 系列中引入。 |\n| `--ndb-deferred-constraints=[0\\|1]` |\
  \ `FALSE` | 唯一键约束检查是否推迟到提交时，而不是每条语句后。 |\n| `--ndb-distribution=方法` | `KEYHASH` |\
  \ 表的分布方法。可接受的值是 `KEYHASH` 和 `LINEARHASH`。 |\n| `--ndb-optimization-delay=毫秒数` |\
  \ 10 | 在 `OPTIMIZE TABLE` 期间，每轮操作之间插入的时间延迟。 |\n| `--ndb-fully-replicated=[0\\|1]`\
  \ | `FALSE` | 如果为 true，没有显式指定的新表将创建为完全复制样式。此选项在 7.5 系列中引入。 |\n| `--ndb-read-backup=[0\\\
  |1]` | `FALSE` | 如果为 true，没有显式指定的新表将创建为可从任何副本读取样式。此选项在 7.5 系列中引入。 |\n| `--ndb-extra-logging=级别`\
  \ | 0 | 此选项值越大，记录的信息越多。范围是 0 – 20。 |\n\n#### 选项文件的位置\n\n按照惯例，MySQL 程序如果存在多个选项文件，可能会读取它们。可以在不同的选项文件中多次指定同一个选项。如果同一个选项被指定多次，则接受最后读取的值。因此，程序读取选项文件的顺序很重要。\n\
  \nMySQL 程序读取选项文件的位置和顺序取决于编译时的配置。无论程序是客户端还是服务器，您都可以使用系统的程序二进制文件和 `--help` 选项来确认选项文件的位置和顺序。以下命令输出是\
  \ UNIX 类系统上 `mysql` CLI 的示例。\n\n```\nshell$ mysql --help | grep /my.cnf\n/etc/my.cnf\
  \ /etc/mysql/my.cnf /usr/local/mysql/etc/my.cnf ~/.my.cnf\n```\n\n在 Windows PowerShell\
  \ 上，您可以做同样的事情。\n\n```\nPS C:\\Program Files\\MySQL\\MySQL Cluster 7.5\\bin> ./mysql\
  \ --help –verbose | Select-String \"my.ini\"\nC:\\WINDOWS\\my.ini C:\\WINDOWS\\\
  my.cnf C:\\my.ini C:\\my.cnf C:\\Program Files\\MySQL\\MySQL Cluster 7.5\\my.ini\
  \ C:\\Program Files\\MySQL\\MySQL Cluster 7.5\\my.cnf\n```\n\nMySQL 程序在 Windows\
  \ 上接受两种类型的配置文件名——`my.cnf` 和 `my.ini`。您可以随意选择文件名。\n\n除了配置文件之外，MySQL 程序在读取所有选项文件后，还会从命令行读取选项。因此，在命令行上指定为参数的命令行选项具有最高的优先级。\n\
  \n此外，有几个选项会影响如何读取选项文件，描述如下：\n\n*   `--no-defaults`：不读取任何选项文件，只接受命令行选项。\n*   `--defaults-file`：只读取作为此选项参数给出的选项文件。任何其他选项文件将被忽略。\n\
  *   `--defaults-extra-file`：除了选项文件外，还读取作为参数给出的选项文件。\n\n这些选项是互斥的，因此您一次只能指定其中一个。这些选项必须指定为第一个命令行选项。任何其他选项都不能放在这些选项之前。\n\
  \n在 UNIX 类系统上，MySQL Server 还会读取由环境变量 `$MYSQL_HOME` 指定目录下的选项文件。如果未设置该变量，`mysqld --help\
  \ --verbose` 将不会显示它。读取选项文件的规则相当复杂。表 4-12 显示了选项文件位置的列表。选项文件按照从上到下的顺序读取。我特意从表 4-12\
  \ 中省略了 Windows 的 `.cnf` 文件，因为它们是冗余的，并且具有相似的优先级（`.cnf` 文件在对应的 `.ini` 文件之后立即读取）。例外是\
  \ `.mylogin.cnf`，因为它没有 `.ini` 变体。\n\n##### 表 4-12. MySQL 程序的选项文件\n\n| Windows |\
  \ UNIX 类系统 |\n| --- | --- |\n| `%PROGRAMDATA%\\MySQL\\MySQL Server 5.7\\my.ini`\
  \ | `/etc/my.cnf` |\n| `%WINDIR%\\my.ini` | `/etc/mysql/my.cnf` |\n| `C:\\my.ini`\
  \ | `SYSCONFDIR/my.cnf` |\n| `BASEDIR\\my.ini` | `$MYSQL_HOME/my.cnf`（仅限 MySQL Server）\
  \ |\n| `--defaults-extra-file` | `--defaults-extra-file` |\n| `%APPDATA%\\MySQL\\\
  .mylogin.cnf`（仅限客户端） | `~/.my.cnf` |\n| | `~/.mylogin.cnf`（仅限客户端） |\n\n表 4-12 中的\
  \ `SYSCONFDIR` 是一个编译时选项。默认情况下，它与 CMake 的 `CMAKE_INSTALL_PREFIX` 选项相同，其默认值为 `/usr/local/mysql`。`.my.cnf`\
  \ 和 `.mylogin.cnf` 仅适用于即将执行程序的当前用户。如果存在，其他选项文件可以被任何用户读取。\n\n\n### 本章总结\n\n本章详细讨论了管理节点、数据节点和\
  \ SQL 节点的主要配置选项。在您检查集群配置时，本章可作为参考。\n\n正如您在本章中所见，MySQL NDB Cluster 有许多选项。配置如此众多的选项是一项艰巨的任务。数据节点尤其拥有众多配置选项，且其配置至关重要。在生产系统中，并非所有数据节点选项都必须进行配置。如本章所述，数据节点配置中有几个至关重要的类别：\n\
  *   **内存消耗**：明智地利用服务器机器上可用的全部内存至关重要。内存既用于存储，也在 MySQL NDB Cluster 操作期间用于缓冲处理中的数据。内存大小配置是\
  \ MySQL NDB Cluster 最关键的配置项。\n*   **重做日志大小**：在繁忙的系统中，MySQL NDB Cluster 需要相对较大的重做日志，因为它必须容纳两次连续本地检查点之间所做的所有修改。如果重做日志空间耗尽，在正在进行的本地检查点完成之前，客户端无法提交新事务。\n\
  *   **检查点速度**：检查点速度对于在合理时间内完成本地检查点非常重要。加快检查点速度将节省重做日志所需的空间。\n*   **多线程**：若未在数据节点上正确配置多线程，无论服务器机器有多少\
  \ CPU 核心，都不可能获得良好性能。\n\n通常，配置必须以自上而下的方式进行。微调可以稍后进行，但最初必须选择正确的方向。\n\n下一章，我们将讨论 NDB\
  \ Cluster 复制的架构及其使用方法。如本章所示，NDB Cluster 复制涉及多个集群，并且两者都必须进行妥善配置。\n\n"
- "# 5. 安装\n\n本章，我们将讨论 MySQL NDB Cluster 的安装过程。此讨论假设您已获取目标机器并完成硬件的初始配置。如果尚未完成，请回顾第\
  \ 3 章和第 4 章中的系统规划和配置任务。\n\n### 软件包安装\n\nMySQL NDB Cluster 的安装过程并不困难，是一个直接的过程。对于所有类型的节点，它包含两个步骤，另外\
  \ SQL 节点多一步，描述如下：\n1.  获取软件包文件\n2.  安装软件包\n3.  仅为 SQL 节点初始化数据目录\n\n#### 获取软件包\n\n\
  要安装软件包，必须首先获取软件包文件。Oracle 公司为官方支持的平台分发 MySQL NDB Cluster 二进制软件包。您可以根据第 3 章所述，在支持的平台页面上验证您的平台是否受支持。\n\
  \n`https://www.mysql.com/support/supportedplatforms/cluster.html`\n\n根据许可证类型，有两种软件包——免费软件/开源许可证和商业许可证。它们分别称为社区版和电信级版。如下所述，它们在不同的站点分发。\n\
  \n##### 社区版\n\n社区版是 MySQL NDB Cluster 的免费软件/开源版本。根据其许可证（GNU 通用公共许可证第二版，`GPLv2`），任何人都可以下载、安装、执行和重新分发该程序。它在\
  \ MySQL 下载站点分发：\n\n`http://dev.mysql.com/downloads/cluster/`\n\n下载站点会显示如图 5-1 所示的下载页面。\n\
  \n![A435171_1_En_5_Fig1_HTML.jpg](img/A435171_1_En_5_Fig1_HTML.jpg)\n\n图 5-1. 社区版下载屏幕\n\
  \n默认情况下，下载页面会根据您用于访问页面的浏览器发送的信息自动检测平台，并显示该平台的软件包。单击“下载”按钮即可下载所需软件包。如果您想更改目标平台，请单击下载菜单左上角的下拉菜单。\n\
  \n如果您想安装之前的 GA 版本（例如 7.4），请单击下载菜单右上角的链接。默认情况下，之前的 GA 版本页面显示 7.4 软件包。您还可以通过从下载菜单左上角的下拉菜单中选择所需版本来下载更早的版本。\n\
  \n如果您已使用 Oracle 账户登录 MySQL 开发者站点，则在您单击“下载”按钮后将立即开始下载。否则，您将看到一个提示您登录站点或创建新 Oracle\
  \ 账户的屏幕。我个人建议，如果您没有账户，最好创建一个，因为要执行某些任务（例如提交新的错误报告）必须登录 MySQL 开发者站点。如果您比较着急，只想下载软件包文件，请单击“不，谢谢，直接开始我的下载”链接，如图\
  \ 5-2 所示。\n\n![A435171_1_En_5_Fig2_HTML.jpg](img/A435171_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2. 未登录时的额外下载页面\n\n\n\n##### 运营商级版本 (CGE)\n\nMySQL Cluster 运营商级版本 (CGE) 是 MySQL\
  \ NDB Cluster 的商业许可版本。您需要购买许可证才能使用此版本的软件。与社区版相比，CGE 包含一些附加功能。您可以在以下页面一览 CGE 的功能：\n\
  \n[`www.mysql.com/products/`](http://www.mysql.com/products/)\n\nCGE 软件包文件可以从 My\
  \ Oracle Support (MOS) 或 Oracle Software Delivery Cloud 获取。在这两个网站上，您都需要一个 Oracle\
  \ 帐户登录。因此，您可以在 MySQL 社区下载站点、My Oracle Support 和 Oracle Software Delivery Cloud 上使用同一个通用帐户。\n\
  \n在 My Oracle Support 上，您可以获取除非常旧版本之外的所有 MySQL NDB Cluster 版本。如果您需要的软件包版本在该网站上缺失，请联系\
  \ Oracle 支持服务。图 5-3 显示了登录后 MOS 顶部的选项卡菜单。\n\n![A435171_1_En_5_Fig3_HTML.jpg](img/A435171_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3. MOS 顶部的选项卡菜单\n\n要获取 CGE 软件包，请单击“Patches & Updates”选项卡。然后，您将看到如图 5-4 所示的“Patch\
  \ Search”屏幕。\n\n![A435171_1_En_5_Fig4_HTML.jpg](img/A435171_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4. MOS 上的补丁搜索屏幕\n\n在“Product”文本框中输入 `MySQL Cluster`。然后，勾选“Include All Products\
  \ in a Family”复选框，从“Release”下拉菜单中选择所需版本，并选择所需的平台。最后，单击“Search”按钮，您将看到可供下载的软件包列表。如果您选择\
  \ Linux x86-64 作为平台，每个版本会列出多个软件包文件，因为有多种 Linux 发行版正式支持 MySQL NDB Cluster。请注意选择适当的软件包。\n\
  \n在 Oracle Software Delivery Cloud 上，仅提供最新版本的软件包。登录 Oracle Software Delivery Cloud\
  \ 后，您将看到如图 5-5 所示的软件包搜索菜单。在文本框中输入 `MySQL Cluster`。然后，下拉菜单中会显示几个候选选项。MySQL Cluster\
  \ Carrier Grade Edition 是一个产品名称，它不仅包括 MySQL NDB Cluster 软件包，还包括驱动程序等辅助软件包。如果您只需要服务器软件包，请选择带有版本号的软件名称，例如\
  \ \"MySQL Cluster 7.5.5\"。下一步是选择合适的平台。选择平台后，软件将被添加到下载队列。最后，单击“Continue”按钮，进入下载屏幕。\n\
  \n![A435171_1_En_5_Fig5_HTML.jpg](img/A435171_1_En_5_Fig5_HTML.jpg)\n\n图 5-5. Oracle\
  \ Software Delivery Cloud 上的软件搜索屏幕\n\n在下载屏幕上，您将看到软件许可通知。该许可通知表明，除了商业许可外，Oracle Software\
  \ Delivery Cloud 上的软件包也适用于试用许可。试用许可仅限于 30 天的评估期。协议的正文可在许可通知中找到。如果您没有商业许可但希望评估 MySQL\
  \ NDB Cluster 的商业版本，请在下载软件前仔细阅读许可通知。如果您不需要商业功能和支持，社区版是一个很好的替代方案，因为它是在 GPLv2 许可下授权的，该许可不会过期。\n\
  \n如果您想获取旧版本，您需要访问 MOS，而不是 Oracle Software Delivery Cloud。\n\n#### 在 Linux 上安装\n\n\
  在 Linux 系统上，有两种类型的软件包可用。一种是压缩的 tar 包 (`tar.gz`)，另一种是用于包管理器的安装程序包，例如 RPM 包和 Debian\
  \ 包。尽管存在许多其他类型的软件包，但只有 RPM 和 Debian 包是官方分发的。\n\n##### Tar.gz 归档包安装\n\n`Tar.gz` 是一种压缩文件格式，它使用\
  \ `tar`（磁带归档）进行归档，然后通过 `gzip`（GNU zip）进行压缩。在 `tar.gz` 归档包中，所有 MySQL NDB Cluster\
  \ 程序和相关文件都包含在一个文件中。安装该软件包非常简单；您只需解压归档文件。典型的目标目录是 `/usr/local` 或 `/opt`，但您可以根据需要将\
  \ `tar.gz` 文件解压到任何位置。清单 5-1 显示了 `tar.gz` 归档安装命令的示例。\n\n```\nshell$ su\nshell# mv\
  \ mysql-cluster-gpl-7.5.5-linux-glibc2.5-x86_64.tar.gz /opt\nshell# cd /opt && tar\
  \ xf mysql-cluster*tar.gz\nshell# ln -s mysql-cluster*64 mysql-cluster\n```\n\n\
  清单 5-1. 将 `tar.gz` 归档安装到 `/opt` 目录\n\n在此示例中，最后一个命令为解压后的目录创建了一个符号链接，以便于访问。当升级或降级集群时，需要在同一主机上安装多个版本。为解压后的目录创建符号链接比重命名安装目录本身更可取。解压后的目录条目如清单\
  \ 5-2 所述。\n\n```\nshell# ls -lh\ntotal 56K\ndrwxr-xr-x  2 root root  4.0K Jan 13\
  \ 22:18 bin\n-rw-r--r--  1 7161 31415  18K Oct 13 19:59 COPYING\ndrwxr-xr-x  2 root\
  \ root  4.0K Jan 13 22:18 docs\ndrwxr-xr-x  4 root root  4.0K Jan 13 22:18 include\n\
  drwxr-xr-x  4 root root  4.0K Jan 13 22:18 lib\ndrwxr-xr-x  4 root root  4.0K Jan\
  \ 13 22:18 man\ndrwxr-xr-x 10 root root  4.0K Jan 13 22:18 mysql-test\n-rw-r--r--\
  \  1 7161 31415 2.5K Oct 13 19:59 README\ndrwxr-xr-x 31 root root  4.0K Jan 13 22:18\
  \ share\ndrwxr-xr-x  2 root root  4.0K Jan 13 22:18 support-files\n```\n\n清单 5-2.\
  \ `tar.gz` 归档包的内容\n\n所有程序都安装在 `bin` 子目录中。为了便于访问，您可以将 `/opt/mysql-cluster/bin` 添加到您的\
  \ `PATH` 环境变量（可执行文件搜索路径）中。\n\n在典型设置中，您需要创建一个专用的用户帐户来运行服务器守护进程。虽然可以使用 `root` 用户运行服务器守护进程，但从安全角度来看，这并不理想，因为\
  \ `root` 用户拥有运行 NDB Cluster 程序所不需要的额外特权，并且如果该帐户被攻击者劫持，可能会危害系统。清单 5-3 显示了为 MySQL\
  \ Server 创建操作系统用户帐户的命令示例。\n\n```\nShell$ su\nshell# mkdir /var/lib/mysql\nshell#\
  \ groupadd mysql\nshell# useradd -g mysql -s /bin/false -d /var/lib/mysql mysql\n\
  shell# chown mysql:mysql /var/lib/mysql && chmod 700 /var/lib/mysql\nshell# passwd\
  \ mysql\n```\n\n清单 5-3. 创建用户帐户\n\n在清单 5-3 中，`mysql` 用户的登录 shell 被设置为 `/bin/false`。这禁止了\
  \ `mysql` 用户登录系统，但 `mysql` 仍然可以作为服务器进程的有效用户使用。\n\n除了创建用户帐户外，您还需要在 SQL 节点上手动初始化数据目录。在与\
  \ MySQL Server 5.7 结合使用的 MySQL NDB Cluster 7.5 上，数据目录使用 `mysqld --initialize` 初始化。在较旧的、与旧版\
  \ MySQL 结合使用的 MySQL NDB Cluster 版本中，数据目录使用 `mysql_install_db` 命令初始化。尽管 `mysql_install_db`\
  \ 在 MySQL Server 5.7 中仍然可用，但它已被弃用，并将在未来的版本中移除。\n\n清单 5-4 显示了在 MySQL NDB Cluster\
  \ 7.5 上初始化数据目录的典型命令示例。您只需使用 `--initialize` 选项启动 `mysqld`（MySQL Server 守护程序）即可。这将使用为\
  \ `mysqld` 的 `--user` 选项设置的用户帐户创建必要的系统表。此选项的默认用户名是 `mysql`。您无需更改生成文件的所有者。\n\n\n\
  ## MySQL NDB Cluster 安装与初始化\n\n```\nshell$ su\nshell# mysqld --initialize\n清单 5-4.\n\
  在 MySQL NDB Cluster 7.5 上初始化数据目录\n```\n\n在 MySQL NDB Cluster 7.4 或更早版本中，您需要使用 `mysql_install_db`\
  \ 脚本进行初始化。清单 5-5 展示了该脚本的典型命令示例。该脚本不会自动更改所有者，因此您需要在初始化数据目录后手动更改文件所有者。\n\n```\nshell$\
  \ su\nshell# cd /opt/mysql-cluster\nshell# bin/mysql_install_db --defaults-file=/etc/my.cnf\n\
  shell# chown -R mysql:mysql /var/lib/mysql\n清单 5-5.\n在 MySQL NDB Cluster 7.4 或更早版本上初始化数据目录\n\
  ```\n\n无论使用 `mysqld --initialize` 还是 `mysql_install_db`，都建议您在初始化数据目录之前完成 MySQL 服务器配置文件（如\
  \ `/etc/my.cnf`）的配置，因为 `InnoDB` 的一些选项在初始化完成后无法更改。例如，用于分离撤销表空间的 `innodb_undo_tablespaces`\
  \ 和 `innodb_undo_directory` 选项在数据目录初始化后无法更改。\n\n您可以选择配置系统，使 MySQL 服务器在系统启动和关闭时自动启动或停止。对于\
  \ MySQL 服务器有两种选择——SysV 风格的 init 和 `systemd`。请查阅您的操作系统手册以了解使用的是哪种 init 系统。甚至可以在其他\
  \ init 系统（如 OpenRC 和 upstart）上设置自动启动和关闭，但只有 `SysV style init` 和 `systemd` 是官方支持的。其他\
  \ init 系统的操作步骤超出了本书的范围。\n\n要使用 SysV 风格的 init 设置自动启动和关闭，您需要将 `mysql.server` 脚本复制到\
  \ `/etc/init.d` 并将其注册到每个运行级别。清单 5-6 展示了为 SysV 风格的 init 设置 init 脚本的过程，该过程使用了 `chkconfig`\
  \ 命令。\n\n```\nshell$ su\nshell# cp mysql.server /etc/init.d/mysqld\nshell# chmod\
  \ +x /etc/init.d/mysqld\nshell# chkconfig --add mysqld\n清单 5-6.\n使用 SysV 风格的 init\
  \ 设置自动启动和关闭\n```\n\n有关 `chkconfig` 命令的更多详细信息，请查阅操作系统的手册。\n\n要使用 `systemd` 设置自动启动和关闭，您需要手动创建\
  \ `systemd` 配置文件或从其他地方复制。获取 `systemd` 配置文件最简单的方法是从 RPM 包中复制。您可以使用 `rpm2cpio` 和 `cpio`\
  \ 命令提取 RPM 文件。RPM 包还包含一个名为 `mysqld_pre_systemd` 的辅助脚本。如果在启动 MySQL 服务器之前数据目录尚未初始化，此脚本会对其进行初始化。此脚本是可选的。如果数据目录已初始化，则不需要它。这些配置文件和辅助脚本假设安装目标是\
  \ `/usr` 目录。如果您将文件解压到其他目录（例如 `/opt/mysql-cluster`），则必须调整这些文件中的路径。您还需要创建由用户拥有的 `/var/run/mysqld`\
  \ 目录来运行 MySQL 服务器。使用 `systemd` 设置自动启动和关闭的过程如清单 5-7 所示。\n\n```\nshell$ rpm2cpio mysql-cluster-community-server-7.5.5-1.el7.x86_64.rpm\\\
  \n> | cpio -id\nshell$ sed -i -e 's#/usr/s\\?bin/my#/opt/mysql-cluster/bin/my#'\\\
  \n> usr/lib/systemd/system/mysqld.service\nshell$ sed -i -e 's#/usr/s\\?bin/my#/opt/mysql-cluster/bin/my#'\\\
  \n> usr/bin/mysqld_pre_systemd\nshell$ su\nshell# cp usr/lib/systemd/system/mysqld.service\
  \ /usr/lib/systemd/system\nshell# cp usr/bin/mysqld_pre_systemd /opt/mysql-cluster/bin\n\
  shell# mkdir /var/run/mysqld && chown mysql:mysql /var/run/mysqld\nshell# systemctl\
  \ start mysqld.service\nshell# systemctl enable mysqld.service\n清单 5-7.\n使用 Systemd\
  \ 设置自动启动和关闭\n```\n\n此示例假设 RPM 和 tar.gz 包已下载到当前工作目录。`rpm2cpio` 命令和管道 `cpio` 命令将文件提取到当前工作目录下，并保持目录结构完整。例如，程序二进制文件被提取到相对于当前工作目录的\
  \ `usr/bin` 目录。`sed` 命令使用非标准字符 `#` 作为字段分隔符调用，以避免路径分隔符 `/` 的转义字符。\n\n##### RPM 包安装\n\
  \nRPM 被 Red Hat Enterprise Linux 及其变体（包括 Oracle Enterprise Linux）以及 SUSE 及其变体使用。RPM\
  \ 包的安装很简单；可以使用 `rpm` 命令完成。整个 MySQL NDB Cluster 发行版按组件被分成多个 RPM 包。因此，您需要将适当的包安装到目标主机。\n\
  \n在 MySQL NDB Cluster 7.4 或更早版本中，RPM 包的类型与标准（非 NDB）MySQL 服务器相同，如清单 5-8 所述。NDB Cluster\
  \ 相关文件包含在 server、devel 和 test 包中。\n\n```\nshell$ tar tf MySQL-Cluster-gpl-7.4.13-1.el7.x86_64.rpm-bundle.tar\n\
  MySQL-Cluster-shared-gpl-7.4.13-1.el7.x86_64.rpm\nMySQL-Cluster-devel-gpl-7.4.13-1.el7.x86_64.rpm\n\
  MySQL-Cluster-test-gpl-7.4.13-1.el7.x86_64.rpm\nMySQL-Cluster-shared-compat-gpl-7.4.13-1.el7.x86_64.rpm\n\
  MySQL-Cluster-embedded-gpl-7.4.13-1.el7.x86_64.rpm\nMySQL-Cluster-client-gpl-7.4.13-1.el7.x86_64.rpm\n\
  MySQL-Cluster-server-gpl-7.4.13-1.el7.x86_64.rpm\n清单 5-8.\nMySQL NDB Cluster 7.4\
  \ 的 RPM 包列表\n```\n\nserver 包包含运行 NDB Cluster 所需的所有程序、共享库和数据文件。自动安装程序也包含在此包中。服务器守护程序安装到\
  \ `/usr/sbin`，客户端程序安装到 `/usr/bin`，库安装到 `/usr/lib`。因此，您需要安装 server 包来运行数据节点、管理节点和\
  \ NDB 客户端程序（如 `ndb_restore`）。当您想要运行链接 `libndbclient` 的 NDB API 客户端应用程序时，也需要 `server`\
  \ 包。\n\ndevel 包包含构建 MySQL C API 和 NDB API 程序所需的头文件和静态库。因此，如果适用，您需要在开发机器上安装它。\n\n\
  test 包包含 MySQL NDB Cluster 的附加测试用例。测试包是 MySQL 开发人员调试 MySQL 程序所必需的。因此，在生产系统中通常不需要。\n\
  \n简而言之，对于 MySQL NDB Cluster 7.4 或更早版本，您需要安装 server 包来运行 NDB Cluster 守护进程和链接 NDB\
  \ API 共享库，安装 devel 包来开发 NDB API 程序以及 MySQL C API 程序，以及其他包（就像标准 MySQL 服务器一样）。\n\n\
  在 MySQL NDB Cluster 7.5 上，包被拆分为更小的部分，如表 5-1 所列。\n\n**表 5-1. MySQL NDB Cluster 7.5\
  \ 的 RPM 包列表**\n\n\n| 组件 | 描述 |\n| --- | --- |\n| auto-installer | 自动安装程序包。本章稍后讨论。\
  \ |\n| client | 适用于 MySQL 服务器和 MySQL NDB 集群的 NDB 客户端程序，例如 `mysql`、`mysqldump`、`ndb_mgm`、`ndb_restore`\
  \ 等。 |\n| common | MySQL 服务器（非 MySQL NDB 集群）的通用软件包。包含字符集信息和错误消息。 |\n| data-node\
  \ | `ndbd` 和 `ndbmtd` 程序可执行文件。 |\n| devel | 开发 MySQL 客户端 C/C++ 程序所需的头文件、静态库和共享库。\
  \ |\n| embedded | MySQL 服务器的嵌入式（库）版本（`libmysqld`）。此软件包包含 `libmysqld` 的共享库版本。 |\n\
  | embedded-compat | 向后兼容的 `libmysqld`。 |\n| embedded-devel | 开发嵌入式 MySQL 服务器应用程序所需的头文件、静态库和共享库。\
  \ |\n| java | ClusterJ 应用程序所需的 JAR（Java 归档）文件。 |\n| libs | MySQL C API 客户端库（`libmysqlclient`）。此软件包包含\
  \ `libmysqlclient` 的共享库版本。 |\n| libs-compat | 向后兼容的 `libmysqlclient`。 |\n| management-server\
  \ | 此软件包包含 `ndb_mgmd`。 |\n| memcached | 与 Memcached 相关的二进制文件。 |\n| ndbclient | NDB\
  \ API 共享库（`libndbclient`）。 |\n| ndbclient-devel | 开发 NDB API 客户端程序所需的头文件和库。 |\n\
  | nodejs | Node.js 应用程序的驱动程序。 |\n| server | MySQL 服务器及相关程序。此版本的 MySQL 服务器包含 `NDBCluster`\
  \ 存储引擎支持。 |\n| server-minimal | 数据库服务器及相关工具的最小化安装。自 MySQL NDB 集群 7.5.7 起可用。 |\n\
  | test | MySQL 测试套件软件包。 |\n\nMySQL NDB 集群 7.5 的软件包划分优先于 7.4 或更早版本的划分。在 MySQL NDB\
  \ 集群 7.4 或更早版本中，所有与 MySQL NDB 集群相关的程序都包含在服务器软件包中，这常常导致问题。这意味着管理服务器、数据节点和 SQL 节点程序将同时被安装或移除。当一台主机上安装了多个类型的节点时，这使得滚动升级或降级变得困难。有关升级和降级操作的更多详细信息，请参见章节\
  \ 11。\n\n遗憾的是，目前尚无适用于 MySQL NDB 集群的 Yum（Yellowdog Updater Modified）仓库。您需要在不使用 Yum\
  \ 仓库的情况下安装、升级或降级软件包。\n\n与 `tar.gz` 软件包不同，某些 RPM 软件包会修改您的系统并为您执行管理任务。服务器软件包在安装（而非升级）时执行以下任务：\n\
  *   创建 `mysql` 用户和组\n*   创建数据目录\n*   初始化数据目录（仅限 MySQL NDB 集群 7.3 和 7.4）\n*   为 `mysqld`\
  \ 设置自动启动和关闭（适用于 systemd 或 SysV 风格的 init）\n\n共享软件包会调用 `ldconfig` 命令来设置符号链接，这是链接已安装共享库所必需的。更多信息请参阅\
  \ `ldconfig` 的手册页。\n\n服务器 RPM 软件包也会设置自动启动和关闭。在使用 SysV 风格 init 的旧系统上，只需安装服务器 RPM\
  \ 软件包即可启用自动启动和关闭。您可以使用 `chkconfig` 命令进行验证。有关此命令的更多详细信息，请参阅其手册页。MySQL 服务器将在系统下次重启时自动启动。要立即启动服务，请以\
  \ `root` 身份执行 `service` 命令：\n```\nshell$ su\nshell# service mysqld start\n```\n\
  服务名称可能因操作系统而异，可能是 `mysqld` 或 `mysql`。可以通过检查 `/etc/init.d` 目录的内容来确认服务名称。\n\n在装有 systemd\
  \ 的现代系统上，systemd 的配置文件也会随服务器 RPM 软件包一同安装。但是，默认情况下该服务并未启用。您需要使用 `systemctl` 显式启用它：\n\
  ```\nshell$ sudo systemctl enable mysqld.service\n```\n此命令使 MySQL 服务器在下次操作系统重启时自动启动。然而，此时\
  \ MySQL 服务器尚未启动。如果您想立即启动它，请执行 `systemctl`：\n```\nshell$ sudo systemctl start mysqld.service\n\
  ```\n\n##### Tar.gz 软件包与 RPM 软件包\n\n您的系统应该使用哪种类型的软件包？这取决于具体情况。软件包管理器实际上简化了一些操作任务，尤其在\
  \ SQL 节点上非常有用。因此，我通常推荐使用 RPM 软件包。\n\n然而，也存在一些不使用 RPM 软件包的理由。例如，MySQL NDB 集群 7.4\
  \ 或更早版本的 RPM 软件包存在一些缺点：软件包未按节点类型分离。一个 RPM 软件包无法安装两个以上的版本。因此，当单台主机上安装了多个类型的节点时，RPM\
  \ 软件包可能不太合适，因为在进行滚动升级或降级时可能会出现问题。\n\n##### DEB 软件包安装\n\nDEB 是 Debian 及其衍生版本（如 Ubuntu、KNOPPIX\
  \ 和 LMDE）使用的软件包格式。但是，MySQL NDB 集群仅支持 Debian 和 Ubuntu。有关支持的 Linux 发行版的更多信息，请参见支持的平台页面。\n\
  \n对于 MySQL NDB 集群 7.5.5 或更早版本（包括 7.5 之前的系列），MySQL NDB 集群的 DEB 软件包均为合一类型，并且仅适用于 Debian。所有程序二进制文件和相关文件都包含在一个软件包中。您只需运行带\
  \ `-i` 选项的 `dpkg` 命令：\n```\nshell# dpkg -i mysql-cluster-gpl-7.5.5-debian8-x86_64.deb\n\
  ```\n这种合一软件包在安装时不会运行脚本。因此，您需要像使用 tar.gz 软件包一样，手动设置用户账户、初始化数据目录以及设置自动启动和关闭。因此，使用合一类型\
  \ DEB 软件包的好处仅仅在于它由软件包管理器管理。\n\n自 MySQL NDB 集群 7.5.6 起，DEB 软件包的组织结构已更改，并且也支持 Ubuntu。它已更改为与\
  \ MySQL NDB 集群 7.5 系列的 RPM 软件包相同。有关 MySQL NDB 集群 7.5 系列 RPM 软件包组织结构的更多详细信息，请参阅表\
  \ 5-1。因此，您可以像安装 7.5 RPM 软件包一样，仅为该主机安装所需的软件包。\n\nRPM 软件包组织结构和新的 DEB 软件包组织结构之间存在几个差异：\n\
  *   服务器 DEB 软件包包含 systemd 相关文件：可以配置 SQL 节点在系统重启时自动启动。服务名称为 `mysql.service`。\n* \
  \  某些功能的 MySQL NDB 集群专用软件包不可用：您需要安装源自 MySQL Server 的软件包来获取 `mysql-common`、`mysql-client`\
  \ 和 `libmysqlclient`。我建议您下载 DEB Bundle tar 文件。\n*   调试符号存储在单独的软件包中：对于 Debian 软件包，调试符号存储在名称带有\
  \ `-dbgsym` 后缀的单独软件包中。Ubuntu 不提供调试符号。\n*   最小服务器软件包不可用：可能会在未来的版本中添加，但目前不可用。\n\n\
  #### 在 Windows 上安装\n\n在 Windows 系统上，有两种类型的软件包可用。一种是 ZIP 归档软件包，另一种是 Windows Installer\
  \ (MSI) 软件包。由于除 Microsoft Corporation 发行的版本外没有其他发行版，因此安装程序软件包格式只能是 Windows Installer。\n\
  \n\n##### Zip 压缩包安装\n\nZip 是一种广为人知的文件压缩格式。较新版本的 Windows 已内置对 Zip 文件的压缩和解压缩功能。在 Windows\
  \ 上安装 Zip 压缩包的过程与在 Linux 系统上安装`tar.gz`归档文件类似。安装可以通过将压缩包解压到系统上的任意位置来完成。例如，你可以将其解压到`C:\\\
  MySQL`。你可以使用资源管理器来解压该压缩包。\n\n创建一个选项文件，并将其放置在 MySQL 服务器读取选项文件的目录中，例如`C:\\Windows\\\
  my.ini`。如果你使用`--defaults-file`选项启动服务器，则可以将选项文件放在任意目录中。\n\n为已安装的节点创建数据目录。对于管理节点和数据节点，数据目录可以留空。安装过程至此结束。\n\
  \n对于 SQL 节点，在完成选项文件后，必须初始化数据目录。在 Windows 上，`mysql_install_db`脚本不起作用。因此，应使用其他方法初始化数据目录。从\
  \ MySQL 5.7 和 MySQL NDB Cluster 7.5 开始，可以使用`mysqld --initialize`来初始化数据目录：\n\n```\n\
  PS C:\\> C:\\mysql-cluster-gpl-7.5.5-winx64\\bin\\mysqld.exe --defaults-file=C:\\\
  MySQL\\my.ini --initialize\n```\n\n在 MySQL NDB Cluster 7.4 或更早版本中，无法在 Windows 上初始化数据目录，因为`mysqld`没有`--initialize`选项，且`mysqld_install_db`在\
  \ Windows 上不起作用。Zip 压缩包包含一个名为`data`的目录。将此目录的内容复制到目标数据目录，或者你可以直接复制整个目录，使目录名称与目标数据目录相同。\n\
  \n最后，你可以启动 SQL 节点。如果数据节点尚未准备好，请暂时禁用`NDBCluster`存储引擎（例如，注释掉与 NDB 相关的选项），然后启动 SQL\
  \ 节点以验证安装。在 Windows 上首次启动 SQL 节点时，指定`--console`选项以查看是否有任何问题被报告。`--console`选项使错误日志打印到控制台。如果有错误报告，你可以在命令执行后看到错误信息。清单\
  \ 5-9 展示了在 Windows 系统上首次启动的示例输出。\n\n```\nPS C:\\> C:\\mysql-cluster-gpl-7.5.5-winx64\\\
  bin\\mysqld.exe --defaults-file=C:\\MySQL\\my.ini --console\n2017-02-09T11:53:37.224242Z\
  \ 0 [Warning] TIMESTAMP with implicit DEFAULT value is deprecated. Please use --explicit_defaults_for_timestamp\
  \ server option (see documentation for more details).\n2017-02-09T11:53:37.224242Z\
  \ 0 [Note] --secure-file-priv is set to NULL. Operations related to importing and\
  \ exporting data are disabled\n2017-02-09T11:53:37.224242Z 0 [Note] C:\\mysql-cluster-gpl-7.5.5-winx64\\\
  bin\\mysqld.exe (mysqld 5.7.17-ndb-7.5.5-cluster-gpl) starting as process 1184 ...\n\
  ... snip ...\n2017-02-09T11:53:37.640424Z 0 [Note] C:\\mysql-cluster-gpl-7.5.5-winx64\\\
  bin\\mysqld.exe: ready for connections.\nVersion: '5.7.17-ndb-7.5.5-cluster-gpl'\
  \  socket: ''  port: 3306  MySQL Cluster Community Server (GPL)\n2017-02-09T11:53:37.640424Z\
  \ 0 [Note] Executing 'SELECT * FROM INFORMATION_SCHEMA.TABLES;' to get a list of\
  \ tables using the deprecated partition engine. You may use the startup option '--disable-partition-engine-check'\
  \ to skip this check.\n2017-02-09T11:53:37.640424Z 0 [Note] Beginning of list of\
  \ non-natively partitioned tables\n2017-02-09T11:53:37.702924Z 0 [Note] End of list\
  \ of non-natively partitioned tables\n```\n\n**清单 5-9.** 在 Windows 上首次启动 MySQL NDB\
  \ Cluster\n\n可选地，你可以将已安装的服务器守护进程程序（MySQL Server、数据节点和管理节点）配置为 Windows 服务，这些服务会在系统启动和关闭时自动启动和停止进程。要将守护进程程序安装为\
  \ Windows 服务，请使用`--install`选项运行它。此选项需要管理员权限来操作 Windows 服务。为 MySQL Server 和 NDB 守护进程（`ndbd`、`ndbmtd`、`ndb_mgmd`）指定选项的方式不同。我们先讨论\
  \ MySQL Server 的安装。\n\n要将 MySQL Server 安装为服务，如果你想使用放置在非标准位置的选项文件，请将`--defaults-file`选项与`--install`选项一起使用：\n\
  \n```\nPS C:\\> C:\\mysql-cluster-gpl-7.5.5-winx64\\bin\\mysqld.exe --install NDB75\
  \ --defaults-file=C:\\MySQL\\my.ini\nService successfully installed.\n```\n\n与普通的\
  \ MySQL 程序调用不同，`--install`选项必须指定为第一个参数。它甚至位于标准首个选项之前，如`--no-defaults`、`--defaults-file`和`--defaults-extra-file`。第二个参数（在示例中是`NDB75`）是要注册的服务名称。请注意，`--install`和服务名之间不需要等号。如果存在等号，命令会导致错误。注意确保服务名不会与其他服务冲突。如果没有指定其他选项，可以省略服务名。如果省略，服务名将为`MySQL`。服务名之后的以下选项在`mysqld`作为服务被调用时用作命令行选项。只允许一个附加选项。因此，你通常需要在此处指定`--defaults-file`。当在单台主机上使用不同配置安装多个服务时，这是必需的。\n\
  \nMySQL Server 在服务安装后不会自动启动。如果你愿意，可以使用 Windows 的“服务”界面启动已安装的 MySQL Server。可以通过“计算机管理”访问，或者通过在“开始”菜单中输入`services.msc`来访问。打开“计算机管理”的方式因\
  \ Windows 版本而异。图 5-6 显示了右键单击 Windows 开始菜单时弹出的菜单。你可以在菜单中间看到“计算机管理”。\n\n![A435171_1_En_5_Fig6_HTML.jpg](img/A435171_1_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6.** 右键单击 Windows 开始菜单时显示的弹出菜单\n\n图 5-7 是“计算机管理”中“服务”屏幕的截图。你可以在那里找到`NDB75`。该服务未运行。\n\
  \n![A435171_1_En_5_Fig7_HTML.jpg](img/A435171_1_En_5_Fig7_HTML.jpg)\n\n**图 5-7.**\
  \ Windows 服务管理界面\n\n你可以像处理其他标准 Windows 服务一样启动、停止、禁用或配置该服务。要进行配置，请右键单击目标服务（本例中为`NDB75`），然后从弹出菜单中选择**属性**。\n\
  \n对于 NDB 守护进程程序——`ndbd`、`ndbmtd`和`ndb_mgmd`——虽然你需要首先指定`--install`，但指定`--install`选项的方式与`mysqld`不同。`--install`和服务名之间需要等号。如果缺少等号，命令将导致错误。默认服务名对于`ndbd`和`ndbmtd`是\"\
  ndbd\"，对于`ndb_mgmd`是\"ndb_mgmd\"。你可以像`mysqld`一样使用`--remove`选项删除服务。使用`--remove`选项卸载服务时也需要等号。\n\
  \n\n##### Windows 安装包安装\n\n在 Windows 系统上，提供了适用于 Microsoft Windows Installer 的安装包。其文件扩展名为\
  \ `.msi`，因此 Microsoft Windows Installer 的安装包也称为 MSI 安装包或 MSI 文件。使用 MSI 进行安装非常简单。你可以通过图形界面安装向导来安装\
  \ MySQL NDB Cluster。\n\n开始安装时，在 Windows 资源管理器中双击已保存的 MSI 安装包。图 5-8 显示了安装向导的欢迎屏幕。点击\
  \ `Next` 继续安装。\n\n![A435171_1_En_5_Fig8_HTML.jpg](img/A435171_1_En_5_Fig8_HTML.jpg)\n\
  \n*图 5-8. MySQL Cluster 7.5 安装向导的欢迎屏幕*\n\n然后，你会看到许可证协议屏幕，如图 5-9 所示。阅读许可证协议，如果你接受，请勾选同意复选框。点击\
  \ `Next` 继续。\n\n![A435171_1_En_5_Fig9_HTML.jpg](img/A435171_1_En_5_Fig9_HTML.jpg)\n\
  \n*图 5-9. MSI 安装包安装过程中的许可证协议*\n\n接着，从三个选项中选择一个安装类型。图 5-10 是安装类型选择屏幕。当你选择 `Typical`\
  \ 时，除文档外的所有组件都将被安装。当你选择 `Complete` 时，所有组件都将被安装。你可以通过选择 `Custom` 来决定安装哪些组件。\n\n![A435171_1_En_5_Fig10_HTML.jpg](img/A435171_1_En_5_Fig10_HTML.jpg)\n\
  \n*图 5-10. 安装类型选择屏幕*\n\n图 5-11 显示了用于选择要安装组件的自定义安装屏幕。你可以省略不必要的组件以节省磁盘空间。例如，如果你只需要安装一个数据节点，可以将\
  \ `MySQL Cluster` 菜单下除 `Cluster Storage Engine` 组件以外的所有组件都设为不可用。\n\n![A435171_1_En_5_Fig11_HTML.jpg](img/A435171_1_En_5_Fig11_HTML.jpg)\n\
  \n*图 5-11. 选择要安装的组件*\n\n点击 `Next` 继续。完成向导选择后，你将看到 UAC（用户账户控制）屏幕。在 UAC 屏幕上点击 `Yes`。\n\
  \n程序二进制文件将被安装到 `C:\\Program Files\\MySQL` 下的目录中；例如，`C:\\Program Files\\MySQL\\MySQL\
  \ Cluster 7.5\\`。如果愿意，你可以将安装目录下的 `bin` 子目录添加到 `Path` 环境变量中（这是你的程序搜索路径），这样就可以从命令提示符或\
  \ Windows PowerShell 轻松启动 MySQL 程序。你可以在系统属性中更改环境变量，这可以通过控制面板的 `系统和安全` 菜单中的 `系统`\
  \ 子菜单访问。图 5-12 显示了控制面板中的 `系统` 子菜单。\n\n![A435171_1_En_5_Fig12_HTML.jpg](img/A435171_1_En_5_Fig12_HTML.jpg)\n\
  \n*图 5-12. 控制面板中的系统子菜单*\n\n点击 `高级系统设置`。你将看到系统属性屏幕，如图 5-13 所示。\n\n![A435171_1_En_5_Fig13_HTML.jpg](img/A435171_1_En_5_Fig13_HTML.jpg)\n\
  \n*图 5-13. Windows 系统属性屏幕*\n\n点击窗口底部的 `环境变量` 按钮。然后，你将看到当前用户和系统范围设置的环境变量列表。编辑 `Path`\
  \ 环境变量并添加例如 `C:\\Program Files\\MySQL\\MySQL Cluster 7.5\\bin`。\n\nMSI 安装包不会为 MySQL\
  \ NDB Cluster 守护进程设置 Windows 服务。因此，你需要手动完成此操作，就像使用 Zip 包安装一样。截至 MySQL NDB Cluster\
  \ 7.5，MSI 安装包也不会为 SQL 节点初始化数据目录。另一方面，初始数据目录包含在旧版本中。\n\n#### 在 macOS 上安装\n\n在 macOS（也称为\
  \ OS X 或 mac OS X）上，有两种类型的安装包可用。一种是压缩的 tar 包（`tar.gz`），就像在 Linux 上一样。另一种是原生安装程序包安装。\n\
  \n##### Tar.gz 归档包安装\n\n在 macOS 上安装 `tar.gz` 包与 Linux 的过程相同。请参阅本章前面的“Tar.gz 归档包安装”部分。\n\
  \n但是，将 MySQL 服务器设置为服务以实现自动启动和关闭的方式有所不同。macOS 使用 `launchd` 来实现此目的。要在 `launchd` 上设置服务，请将服务配置文件放在\
  \ `/Library/LaunchDaemons` 目录下。配置文件的内容是一个称为属性列表（简称 plist）的 XML 文件。属性列表的格式是预先定义的。制作所需\
  \ `launchd` 配置文件最简单的方法是从下一节描述的原生安装包中复制一个。清单 5-10 是 macOS 原生安装包中包含的一个属性列表文件（`com.oracle.oss.mysql.mysqld.plist`）。\n\
  \n```xml\nLabel             com.oracle.oss.mysql.mysqld\nProcessType       Interactive\n\
  Disabled          \nRunAtLoad         \nKeepAlive         \nSessionCreate     \n\
  LaunchOnlyOnce    \nUserName          _mysql\nGroupName         _mysql\nExitTimeOut\
  \       600\nProgram           /usr/local/mysql/bin/mysqld\nProgramArguments\n\n\
  /usr/local/mysql/bin/mysqld\n--user=_mysql\n--basedir=/usr/local/mysql\n--datadir=/usr/local/mysql/data\n\
  --plugin-dir=/usr/local/mysql/lib/plugin\n--log-error=/usr/local/mysql/data/mysqld.local.err\n\
  --pid-file=/usr/local/mysql/data/mysqld.local.pid\n\nWorkingDirectory  /usr/local/mysql\n\
  ```\n\n*清单 5-10. macOS 上用于 Launchd 的 MySQL 属性列表内容*\n\n如果需要，请修复 plist 文件中写的程序路径和参数。此时已启用自动启动和关闭。如果配置文件存在，操作系统会读取每个启动守护进程的配置文件。服务器将在下次操作系统重启时启动\
  \ MySQL 服务器，但它尚未立即启动。要立即启动服务器，请运行 `launchctl`：\n\n```shell\nshell$ su\nshell# launchctl\
  \ load /Library/LaunchDaemons/com.oracle.oss.mysql.mysqld.plist\n```\n\n你可以通过运行\
  \ `launchctl unload` 而不是 `launchctl load` 来停止 MySQL 服务器。要禁用自动启动和关闭，请修改 plist 文件并将\
  \ `RunAtLoad` 的值设置为 `false`。\n\n\n##### macOS 原生软件包安装\n\nmacOS 的原生安装包后缀为`.pkg`。使用原生（`.pkg`）软件包安装非常简单，可以通过图形界面向导完成。该软件包以\
  \ Apple 磁盘映像（后缀为`.dmg`）的形式分发，可以像普通磁盘一样被挂载为文件系统。要挂载它，请双击 DMG 文件。图 5-14 显示了挂载 MySQL\
  \ NDB Cluster 软件包后的 Finder 窗口。\n\n![A435171_1_En_5_Fig14_HTML.jpg](img/A435171_1_En_5_Fig14_HTML.jpg)\n\
  图 5-14. MySQL NDB Cluster DMG 文件已挂载\n\n要开始安装，请双击`.pkg`文件。安装向导将会显示，如图 5-15 所示。点击“继续”进行下一步。\n\
  \n![A435171_1_En_5_Fig15_HTML.jpg](img/A435171_1_En_5_Fig15_HTML.jpg)\n图 5-15. macOS\
  \ 上 MySQL NDB Cluster 安装程序的介绍页面\n\n下一个屏幕是许可协议。如果您使用的是社区版本，则许可证为 GPLv2。否则，将是 Oracle\
  \ Corporation 的专有许可证。当您在许可协议屏幕点击“继续”时，会显示一个对话框。如果您同意许可条款，请点击“同意”继续。\n\n下一个屏幕是“安装类型”，如图\
  \ 5-16 所示。\n\n![A435171_1_En_5_Fig16_HTML.jpg](img/A435171_1_En_5_Fig16_HTML.jpg)\n\
  图 5-16. macOS 上 MySQL NDB Cluster 安装程序的安装类型\n\n最初，“目的地选择”步骤被跳过。当您点击“更改安装位置”按钮时，向导会返回到“目的地选择”，但您无法更改默认设置。\n\
  \n当您点击“自定”时，您会看到类似图 5-17 的屏幕。在此屏幕上，您可以选择或取消选择要安装的组件。每个组件包含以下内容：\n\n*   `MySQL Server`：MySQL\
  \ NDB Cluster 程序的主体，包括所有类型的服务器守护进程和客户端程序。至少需要安装此软件包。\n*   `Preference Pane`：此软件包在\
  \ macOS 的系统偏好设置中添加 MySQL 偏好设置面板。\n*   `Launchd Support`：用于`launchd`的配置信息，`launchd`负责管理\
  \ macOS 上的自动启动和关闭。\n\n![A435171_1_En_5_Fig17_HTML.jpg](img/A435171_1_En_5_Fig17_HTML.jpg)\n\
  图 5-17. macOS 上 MySQL NDB Cluster 安装程序的组件选择屏幕\n\n默认情况下，所有组件都会被安装，我建议安装所有组件。点击“安装”继续。\n\
  \n安装过程开始时，会显示一个要求输入当前操作系统用户密码的对话框。需要获得超级用户（`root`）权限才能将文件写入文件系统。安装完成后，会显示为已安装 MySQL\
  \ Server 的`root@localhost`生成的密码，如图 5-18 所示。密码是随机生成的。因此，您在此屏幕上看到的密码会不同。（请不要担心，图 5-18\
  \ 中显示的是实际密码，但我已不再使用它。）在将密码复制到其他地方之前，请勿关闭窗口。如果需要，可以按`Command+Shift+3`截取屏幕截图。截图将保存到您的桌面。\n\
  \n![A435171_1_En_5_Fig18_HTML.jpg](img/A435171_1_En_5_Fig18_HTML.jpg)\n图 5-18. macOS\
  \ 上 MySQL NDB Cluster 安装程序的摘要屏幕\n\n服务器安装在`/usr/local`目录下的子目录中，安装程序会创建一个名为`/usr/local/mysql`的符号链接指向安装目录。将`/usr/local/mysql/bin`添加到您的`PATH`环境变量中，以便于访问\
  \ MySQL 程序。\n\n在 macOS 原生软件包设置中，配置自动启动和关闭非常容易。要进行配置，请打开“系统偏好设置”并在底部找到 MySQL。当您点击\
  \ MySQL 图标时，您会看到一个类似图 5-19 的配置对话框。您可以停止或启动服务器，以及启用或禁用自动启动和关闭。\n\n![A435171_1_En_5_Fig19_HTML.jpg](img/A435171_1_En_5_Fig19_HTML.jpg)\n\
  图 5-19. macOS 上的 MySQL 偏好设置面板\n\n**注意**\n\n一旦使用 MySQL 偏好设置面板更改了配置，位于`/Library/LaunchDaemons`下的启动守护进程配置文件会被转换为二进制\
  \ plist 格式。要恢复为 XML 格式，请对 plist 文件运行以下命令：\n```\nplutil -convert xml1 com.oracle.oss.mysql.mysqld.plist\n\
  ```\n\n\n### 使用自动安装器安装 MySQL NDB 集群实例\n\nMySQL NDB 集群自动安装器（简称“自动安装器”）是一个通过 Web 图形界面设置\
  \ MySQL NDB 集群实例的辅助工具。自动安装器并非软件包安装工具，而是用于轻松设置节点实例的工具。这意味着软件包需要预先安装。\n\n要启动自动安装器，请运行随\
  \ MySQL NDB 集群软件包一同安装的 `ndb_setup.py`。顾名思义，`ndb_setup.py` 是一个 Python 程序。因此，您的目标系统上需要安装\
  \ Python 解释器。所需的 Python 解释器版本为 2.6 或更高。此外，还需要两个 Python 库——Paramiko 1.7.7.1 或更高版本，以及\
  \ PyCrypto 2.6 或更高版本。请预先在您的目标系统上安装这些程序。\n\n由于 `ndb_setup.py` 通过 SSH 协议在远程主机上执行命令，因此远程主机上必须运行\
  \ SSH 服务器。同时，也需要设置用于登录远程服务器的用户。除非在用户名/密码对中明确指定用户名（如下一节所述），否则通过 SSH 进行的远程登录将使用执行\
  \ `ndb_setup.py` 的用户身份。因此，基本上您需要创建与本地用户名相同的远程用户。实例将使用该用户进行初始化和启动。如果您希望使用 `mysql`\
  \ 用户运行 MySQL NDB 集群程序，请允许该用户登录。（通常，出于安全原因，`mysql` 用户登录是被禁用的。）清单 5-11 是 `ndb_setup.py`\
  \ 从命令行运行时的示例输出。\n\n```shell\nshell$ ./ndb_setup.py\nRunning out of install dir:\
  \ /opt/mysql-cluster/bin\nStarting web server on port 8081\ndeathkey=787953\nPress\
  \ CTRL+C to stop web server.\nThe application should now be running in your browser.\n\
  (Alternatively you can navigate to http://localhost:8081/welcome.html to start it)\n\
  ```\n\n清单 5-11. 从命令行运行 `ndb_setup.py`\n\n可以看到该程序默认监听 TCP/IP 端口 8081。您可以通过在命令行中指定\
  \ `--port` 选项来更改它。该命令会自动打开您的浏览器并显示如图 5-20 所示的屏幕。\n\n![A435171_1_En_5_Fig20_HTML.jpg](img/A435171_1_En_5_Fig20_HTML.jpg)\n\
  \n图 5-20. MySQL 集群自动安装器的初始屏幕\n\n点击 **创建新的 MySQL 集群** 来设置新的安装。将显示一个向导式的设置屏幕，如图 5-21\
  \ 所示。\n\n![A435171_1_En_5_Fig21_HTML.jpg](img/A435171_1_En_5_Fig21_HTML.jpg)\n\n\
  图 5-21. 自动安装器上的“定义集群”屏幕\n\n首要任务是定义集群的整体配置。在自动安装器中无法对各个参数进行微调，而是在此屏幕上定义一个简要配置。每个输入框代表以下参数：\n\
  \n*   **集群名称**：要安装的集群的名称。\n*   **主机列表**：集群实例所在主机的逗号分隔列表。\n*   **应用领域**：从集群使用的应用类型，从以下选项中选择：\n\
  \    *   **简单测试**：用于测试的最小资源配置\n    *   **Web**：针对给定硬件的最大资源配置\n    *   **实时**：最小化响应时间\n\
  *   **写入负载**：写入事务的数量（从 **低**、**中** 和 **高** 中选择一项）。\n*   **SSH 凭证**：如果选中 **基于密钥的\
  \ SSH**，则使用预先注册的公钥进行 SSH 认证。否则，请指定用于认证的用户名和密码。\n\n点击 **下一步** 继续。下一个屏幕是主机详细信息的配置屏幕，如图\
  \ 5-22 所示。\n\n![A435171_1_En_5_Fig22_HTML.jpg](img/A435171_1_En_5_Fig22_HTML.jpg)\n\
  \n图 5-22. 自动安装器中的主机定义详情\n\n在此屏幕中，您需要指定给定主机的 CPU 核心数和内存量，以及 MySQL NDB 集群软件包的路径和数据目录。如果自动安装器无法在这些目录中找到程序，或者程序没有足够的权限访问这些数据目录，后续的安装将会失败。请确保软件包安装目录正确，并且数据目录的所有者、组和权限正确。点击\
  \ **下一步** 继续。\n\n下一个屏幕是进程定义，如图 5-23 所示。\n\n![A435171_1_En_5_Fig23_HTML.jpg](img/A435171_1_En_5_Fig23_HTML.jpg)\n\
  \n图 5-23. 自动安装器中的进程定义\n\n在此屏幕上，您需要定义哪个主机将运行哪种类型的节点。点击 **添加进程** 以为主机添加新节点。您可以通过拖放将节点移动到另一台主机上。点击\
  \ **下一步** 继续。下一步是定义参数，如图 5-24 所示。\n\n![A435171_1_En_5_Fig24_HTML.jpg](img/A435171_1_En_5_Fig24_HTML.jpg)\n\
  \n图 5-24. 在自动安装器中定义进程参数\n\n您可以更改基本参数，例如 SQL 节点的数据目录、套接字和端口号。同样，在自动安装器上无法微调详细参数。点击\
  \ **下一步** 继续。下一个屏幕是最终的安装步骤，如图 5-25 所示。\n\n![A435171_1_En_5_Fig25_HTML.jpg](img/A435171_1_En_5_Fig25_HTML.jpg)\n\
  \n图 5-25. 在自动安装器中部署、启动和停止集群\n\n如您所见，自动安装器的功能非常有限。它不适合日常使用。例如，可以启动和停止整个集群，但无法停止或启动单个节点。滚动重启也无法实现。如果您想为评估目的快速设置\
  \ MySQL NDB 集群，请尝试自动安装器。它也可能是进一步微调的良好起点。\n\n### 验证安装\n\n一旦所有安装步骤完成，请验证安装是否成功。\n\n\
  #### 配置文件\n\n在启动集群之前，请确保配置文件（如 `config.ini` 和 `my.cnf`）已完成，并且设置了预期的选项。对于 MySQL Server\
  \ 守护进程 `mysqld`（以及其他非 NDB 程序），您可以轻松验证选项是否被读取并设置为所需的值。使用 `--print-defaults` 选项运行\
  \ `mysqld`：\n\n```shell\nshell$ mysqld --print-defaults\nmysqld would have been\
  \ started with the following arguments:\n--character-set-server=utf8 --user=mysql\
  \ --port=3306 ...\n```\n\n它会列出在命令行或选项文件（`my.cnf`）中指定的所有选项。\n\n对于 NDB 程序，`--print-defaults`\
  \ 无效。管理服务器守护进程 `ndb_mgmd` 需要一个配置文件路径作为命令行选项。您无需担心程序实际读取的是哪个选项文件。虽然 `ndb_mgmd` 有一个名为\
  \ `--print-full-config` 的选项，但它会打印所有选项，包括所有可用槽位中未更改的选项。这对于快速检查选项值是否设置正确并不方便。相反，检查配置文件是否形成正确是很有用的。当指定\
  \ `--print-full-config` 时，`ndb_mgmd` 会解析给定的配置文件，就像进行常规启动一样，因此它确保选项名称正确且值在有效范围内。\n\
  \n\n\n#### 初始启动\n\n配置完成后，下一步就是启动集群。在首次启动时，集群会初始化其数据目录，并在管理节点和数据节点上创建数据文件。因此，一旦初始化完成，某些配置（例如\
  \ `FragmentLogFileSize`）若不重新初始化数据则无法更改。换句话说，在您向集群存储任何数据之前，您可以根据需要多次擦除全部数据并重启集群。\n\
  \n列表 5-12 展示了一个启动管理节点的示例命令。由于这是首次启动，`--initial` 选项可以省略。\n\n```\nshell$ /opt/mysql-cluster/bin/ndb_mgmd\
  \ -f /etc/mysql-cluster/config.ini\\\n--configdir=/var/lib/mysql-cluster\nMySQL\
  \ Cluster Management Server mysql-5.7.17 ndb-7.5.5\n列表 5-12.\n首次启动管理节点\n```\n\n\
  一旦所有管理节点都已启动，下一步便是启动数据节点。列表 5-13 是一个启动数据节点的典型命令。请使用列表 5-13 所示的命令启动所有数据节点。在此示例中，使用了多线程版本的数据节点\
  \ (`ndbmtd`)。\n\n```\nshell$ /opt/mysql-cluster/bin/ndbd -c nodeid=1,host3:1186\n\
  2017-01-30 16:56:09 [ndbd] INFO     -- Angel connected to host3:1186'\n2017-01-30\
  \ 16:56:09 [ndbd] INFO     -- Angel allocated nodeid: 1\n列表 5-13.\n首次启动数据节点\n```\n\
  \n数据节点的启动需要一些时间。要验证数据节点是否已启动，请从 `ndb_mgm` CLI 发出 `ALL STATUS` 命令，如列表 5-14 所示。\n\n\
  ```\nshell$ ndb_mgm\n-- NDB Cluster -- Management Client --\nConnected to Management\
  \ Server at: 127.0.0.1:1186\nndb_mgm> all status\nNode 1: started (mysql-5.7.17\
  \ ndb-7.5.5)\nNode 2: started (mysql-5.7.17 ndb-7.5.5)\n列表 5-14.\n通过 ndb_mgm CLI\
  \ 检查数据节点状态\n```\n\n最后一步是启动 SQL 节点。启动 SQL 节点的命令与标准 MySQL 服务器相同。例如，如果在 RHEL7 系统上使用\
  \ RPM 安装了服务器包，您可以使用 `systemctl` 命令启动 SQL 节点，如下所示：\n\n```\nshell$ sudo systemctl\
  \ start mysqld.service\n```\n\n#### 检查状态\n\n验证集群是否正常运行的最基本操作是查看其状态。首先，使用 `ndb_mgm`\
  \ CLI 连接集群并发出 `SHOW` 命令，如列表 5-15 所示。检查所有节点是否已连接且状态正常。\n\n```\nshell$ ndb_mgm\n--\
  \ NDB Cluster -- Management Client --\nndb_mgm> SHOW\nConnected to Management Server\
  \ at: 127.0.0.1:1186\nCluster Configuration\n\n[ndbd(NDB)]     2 node(s)\nid=1 \
  \   @host1  (mysql-5.7.17 ndb-7.5.5, Nodegroup: 0, *)\nid=2    @host2  (mysql-5.7.17\
  \ ndb-7.5.5, Nodegroup: 0)\n[ndb_mgmd(MGM)] 1 node(s)\nid=255  @host3  (mysql-5.7.17\
  \ ndb-7.5.5)\n[mysqld(API)]   7 node(s)\nid=50   @host1  (mysql-5.7.17 ndb-7.5.5)\n\
  id=51   @host1  (mysql-5.7.17 ndb-7.5.5)\nid=52   @host2  (mysql-5.7.17 ndb-7.5.5)\n\
  id=53   @host2  (mysql-5.7.17 ndb-7.5.5)\n列表 5-15.\nSHOW 命令输出示例\n```\n\n有关启动或停止集群过程的更多详细信息，请参阅第\
  \ 10 章。\n\n所有节点准备就绪后，针对 SQL 节点运行查询以检查集群是否正常运行。使用 `NDBCluster` 存储引擎创建一个测试数据库和测试表，然后插入一些行并查询该表。如果命令能够正常运行，没有任何问题，则说明您的安装是成功的。\n\
  \n### 卸载软件包\n\n如果您已停止使用 MySQL NDB Cluster 并且不再需要这些软件包，应将它们从系统中卸载。要卸载 MySQL NDB Cluster，首先需要关闭集群。可选地，如果您不再需要数据文件和配置文件，可以删除它们。\n\
  \n卸载步骤因软件包类型而异，如下节所述。\n\n#### Tar.gz 和 Zip 存档包\n\n此类软件包可以通过删除已安装的文件来卸载。例如，如果您将软件包安装在\
  \ Linux 的 `/opt/mysql-cluster` 中，只需运行以下 `rm` 命令：\n\n```\nshell$ su\nshell# rm -rf\
  \ /opt/mysql-cluster\n```\n\n在 Windows 上，使用 Windows 资源管理器删除安装目录。\n\n请确保同时删除已安装的服务。\n\
  \n在 Linux 上，使用 `chkconfig --del` 或 `systemctl disable` 删除服务。这两个命令都需要一个服务名称作为最后一个参数。有关更多详细信息，请查阅操作系统手册。您还需要删除已安装的脚本文件，例如\
  \ `/etc/init.d/mysql`，以及 `systemd` 配置文件，例如 `/usr/lib/systemd/system/mysql.service`。\n\
  \n在 Windows 上，使用 `--remove` 选项运行守护程序。这应在删除软件包文件之前完成。或者，您可以使用 `sc.exe` 删除服务。这可以在卸载软件包后完成。\n\
  \n```\nPS C:\\> sc.exe delete NDB75\n[SC] DeleteService SUCCESS\n```\n\n请注意，在 Windows\
  \ PowerShell 中，`sc` 是 `Set-Content` 的别名。因此，应执行带有 `.exe` 后缀的 `sc.exe`。否则，将在当前工作目录下创建一个名为\
  \ `delete` 且内容为 `NDB75` 的文件。\n\n在 macOS 上，运行 `launchctl unload` 以停止服务器。此命令需要一个 plist\
  \ 文件作为最后一个参数。然后，删除该 plist 文件。\n\n#### RPM 包\n\n您可以使用带有 `-e` 选项的 `rpm` 命令来卸载软件包。不需要额外的步骤。\n\
  \n#### Windows Installer 包\n\n您可以从 Windows 设置中删除 Windows Installer 包。单击“系统”，然后单击“应用和功能”以打开已安装的应用程序包列表。从按字母顺序排序的应用程序列表中选择“MySQL\
  \ 集群”。单击“卸载”以卸载该软件包。\n\n#### macOS 原生包\n\n开始之前，请确保服务已停止。您可以从系统偏好设置或使用 `launchctl\
  \ unload` 命令停止服务。\n\n不幸的是，macOS 没有卸载原生软件包的命令。这确实非常不便。这意味着必须手动删除已安装的文件。第一步是检查系统上安装了哪些软件包，如下所示：\n\
  \n```\nshell$ pkgutil --pkgs | grep mysql\ncom.mysql.launchd\ncom.mysql.mysql\n\
  com.mysql.prefpane\n```\n\n您可以看到三个与 MySQL 相关的软件包。它们分别是 MySQL 启动守护程序、MySQL NDB Cluster\
  \ 主软件包和 MySQL 系统偏好设置面板。以下命令以 `root` 用户身份删除这些软件包中包含的所有文件：\n\n```\nshell# rm -rf /usr/local/mysql*\n\
  shell# rm -rf /Library/LaunchDaemons/com.oracle.*.mysqld.plist\nshell# rm -rf /Library/PreferencePanes/MySQL.prefPane\n\
  ```\n\n注意\n\n您可以使用 `pkgutil --info` 识别文件安装的位置，并使用 `pkgutil --files` 识别安装了哪些文件。\n\
  \n然后，从软件包管理器中删除软件包信息。\n\n```\nshell# pkgutil --forget com.mysql.launchd\nshell#\
  \ pkgutil --forget com.mysql.mysql\nshell# pkgutil --forget com.mysql.prefpane\n\
  ```\n\n### 总结\n\n本章讨论了每个平台可用的安装类型以及如何在每个系统上安装 MySQL NDB Cluster 软件包。安装过程并不困难，但它非常重要。在生产系统中，安装必须始终做到完美无缺。没有正确的安装，您的系统将无法正常运行。\n\
  \n每种安装类型都有其优缺点。确定哪种安装类型最适合您的系统，并顺利进行安装。尤其是在安装非安装程序软件包时，必须格外小心。\n\n\n"
- "# 6. 复制\n\n复制是 MySQL 最流行的功能之一。它允许一个或多个从服务器拥有与主服务器完全相同的数据副本。这是一个非常实用的功能，因此具有多种应用场景。MySQL\
  \ NDB 集群也具备复制功能，称为 NDB 集群复制。本章将介绍如何使用它以及它的用途。\n\n### NDB 集群复制概述\n\n在讨论如何使用 NDB 集群复制之前，本节将概述\
  \ NDB 集群复制。\n\n#### 复制架构概述\n\n在标准的 MySQL 复制中，主服务器将所有修改记录到一个称为 `二进制日志` 的特殊日志文件中，日志内容在每个事件准备就绪后立即发送给从服务器。`二进制日志`\
  \ 的内容在事务性存储引擎提交事务时写入，对于非事务性存储引擎则在每个查询之后写入。`二进制日志` 中的每个内容都是对数据库进行修改的、以“可重放”格式表示的单元。`二进制日志`\
  \ 内容可以被执行，从而产生与原始事务或查询完全相同的修改。因此，通过连续应用一系列 `二进制日志` 内容，可以重放与主服务器上完全相同的数据更改。\n\n图\
  \ 6-1 是标准 MySQL 复制的示意图。在主服务器上，主服务器线程将 `二进制日志` 的内容发送给从服务器。该线程也称为 `binlog 发送线程`。`binlog\
  \ 发送线程` 只是一个普通的连接线程，但执行的命令与常规命令不同。该命令是 `` `COM_BINLOG_DUMP` ``，它持续地将 `binlog` 内容发送给作为客户端连接的从服务器。\n\
  \n![A435171_1_En_6_Fig1_HTML.jpg](img/A435171_1_En_6_Fig1_HTML.jpg)\n\n图 6-1. 标准\
  \ MySQL 复制（使用 InnoDB）架构概览\n\n从服务器有两种类型的线程。一种用于接收 `二进制日志` 内容并将其写入 `中继日志`，另一种用于重放\
  \ `中继日志` 内容。前者称为 `从 I/O 线程`，后者称为 `从 SQL 线程`。\n\n`从 I/O 线程` 持续接收 `二进制日志` 内容，然后将其存储到一个称为\
  \ `中继日志` 的中间日志中。一旦写入 `中继日志` 完成，`从 SQL 线程` 就会执行内容并将修改应用到其底层数据库。在图 6-1 中，数据库被描绘为存储引擎，因为真正持有数据的实体是存储引擎。\n\
  \n图 6-1 中所有相关的线程默认情况下不同步。由于主服务器不会等待从服务器应用修改，因此从服务器数据通常会略微滞后于主服务器数据。这种类型的复制称为 `异步复制`。然而，从服务器数据一直在紧密地追赶主服务器数据，因为图\
  \ 6-1 中描述的每一步执行得都非常快。\n\n注意\n\nMySQL 复制有一种特殊模式，称为 `半同步复制`，它使主服务器上的连接线程等待，直到 `从 I/O\
  \ 线程` 已将 `binlog` 内容写入其中 `中继日志` 并同步到磁盘。`半同步复制` 确保在主服务器崩溃时从服务器上不会丢失数据。在 `1:N 复制设置`\
  \ 中实现 `故障转移拓扑` 时，此功能非常有用。在标准 MySQL 复制中，一个主服务器可以连接多个从服务器。在 `1:N 复制设置` 中，当现有主服务器崩溃时，一个从服务器会被提升为主服务器。由于\
  \ MySQL 复制是异步的，因此在主服务器崩溃时，有很小的几率会丢失最新的修改。`半同步复制` 解决了这个问题。但是，MySQL NDB 集群不支持 `半同步复制`，因此它超出了本书的范围。\n\
  \nMySQL NDB 集群在标准 MySQL 复制的基础上实现了 `异步复制`。一个 `SQL 节点` 收集集群上所做的所有修改，并将其记录到其本地的 `二进制日志`\
  \ 中。这样的 `SQL 节点` 可以作为主服务器，将修改发送给从服务器。图 6-2 展示了 NDB 集群复制的概览。\n\n![A435171_1_En_6_Fig2_HTML.jpg](img/A435171_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2. NDB 集群复制架构概览\n\nNDB 集群复制的关键架构是，在 `数据节点` 上所做的修改会被发送到启用了 `二进制日志` 的 `SQL 节点`。没有这种机制，主\
  \ `SQL 节点` 将无法跟踪在其他 `SQL 节点` 上所做的修改。在标准 MySQL 服务器上，服务器内所做的所有修改都可以被服务器跟踪，然后序列化并写入\
  \ `二进制日志`。在 MySQL NDB 集群的 `SQL 节点` 上，这样的实现是不可能的，因为更改也会在其他 `SQL 节点` 以及其他类型的 `API\
  \ 节点` 上进行。在 MySQL NDB 集群中，实际的数据修改是在 `数据节点` 中进行的。因此，`数据节点` 持续地将所有修改发送到启用了 `二进制日志`\
  \ 的 `SQL 节点`。修改数据在每个 `micro-GCP` 时发送。\n\n虽然 `micro-GCP` 是 `数据节点` 上 `重做日志` 的数据源，但与通常的\
  \ `GCP`（全局检查点）不同，`micro-GCP` 不会被写入磁盘。`Micro-GCP` 是一种在 `数据节点` 之间同步数据的机制。包含在一个 `micro-GCP`\
  \ 中的一组事务称为一个 `纪元`，它们在某个时间段同时提交。因此，每个 `纪元` 的内容（称为 `事件`）都被确保在所有 `数据节点` 之间同步。`Micro-GCP`\
  \ 的执行频率高于 `GCP`。默认情况下，`micro-GCP` 每 100 毫秒执行一次，`GCP` 每两秒执行一次。这使得 `数据节点` 能够比在每次 `GCP`\
  \ 时发送 `事件` 更快地将 `事件` 发送到 `SQL 节点`。\n\n在 `SQL 节点` 上，来自 `数据节点` 的 `事件` 由一个称为 `binlog\
  \ 注入器线程` 的专用线程处理。它接收所有 `事件` 并将其序列化，然后写入 `二进制日志`。因此，`二进制日志` 是集群上所有修改的序列化历史记录，就像标准的\
  \ MySQL 复制一样。\n\n注意\n\n由于 `binlog 注入器` 从 `数据节点` 接收所有 `事件`，当集群拥有许多 `数据节点` 时，`SQL\
  \ 节点` 会变得非常繁忙。这是我们建议使用专用的 `SQL 节点` 来处理 `二进制日志记录` 的原因之一。\n\n#### 复制通道故障转移\n\n由于数据节点可以向任意\
  \ SQL 节点发送事件和二进制日志内容的来源，因此多个 SQL 节点可以同时拥有二进制日志，我们强烈建议您这样做。由于 SQL 节点在离线时无法接收事件，我们需要备用的、启用了二进制日志记录的\
  \ SQL 节点以实现冗余。当活动的主 SQL 节点崩溃或关闭时，必须使用备用的 SQL 节点来恢复复制，因为 SQL 节点在离线期间其二进制日志内容会完全丢失。这是\
  \ NDB 集群复制中一个非常重要的概念。\n\n如果您熟悉标准的 MySQL 复制，可能会产生疑问：“在备用的 SQL 节点上恢复复制时，应使用哪个二进制日志文件名和位置？”二进制日志是每个\
  \ SQL 节点本地的，因此文件名和二进制日志位置会根据服务器重启和服务器本地表的更新而变化。解决此问题的关键组件是两个系统表——`ndb_binlog_index`\
  \ 和 `ndb_apply_status`。前者是每个 SQL 节点本地的，后者是一个被所有 SQL 节点访问的 NDB 表。这些表存在于 `mysql` 系统数据库中。图\
  \ 6-3 描绘了这两个表如何与 NDB 集群复制协同工作。\n\n![A435171_1_En_6_Fig3_HTML.jpg](img/A435171_1_En_6_Fig3_HTML.jpg)\n\
  *图 6-3. `ndb_binlog_index` 和 `ndb_apply_status` 系统表的功能*\n\n二进制日志注入器线程将纪元与二进制日志位置之间的对应关系记录到\
  \ `ndb_binlog_index` 表中。由于 MySQL NDB 集群上的修改单元是纪元，二进制日志事件的单元也是纪元。这意味着从库可以将一个纪元视为一个不可分割的修改块（即一个事务）来应用。因此，二进制日志注入器会在二进制日志中记录每个纪元的开始。\n\
  \n然后，二进制日志注入器线程在每个二进制日志事件中生成一条原始记录，该记录会更新 `ndb_apply_status` 表。该事件跟踪哪个纪元被包含在二进制日志事件中。由于对\
  \ `ndb_apply_status` 表的修改也包含在同一个事件中，从库的 SQL 线程会在同一个事务中，将对目标表的原始修改与对 `ndb_apply_status`\
  \ 的更新一并执行。因此，您可以在 `ndb_apply_status` 表中找到应用到从库集群的最新纪元。\n\n因此，当您切换到备用的复制通道时，需要从从库\
  \ SQL 节点的 `ndb_apply_status` 表中读取最新的纪元，然后根据检索到的纪元找到对应的二进制日志文件名和位置。我们将在本章后面详细讨论故障转移过程的细节。\n\
  \n#### NDB 集群复制表\n\n表 6-1 总结了与 NDB 集群复制相关的系统表。请注意，表 6-1 中的所有表都位于 `mysql` 系统数据库中。\n\
  \n*表 6-1. NDB 集群复制表列表*\n\n| 名称 | 使用位置 | 描述 |\n| --- | --- | --- |\n| `ndb_binlog_index`\
  \ | 主库 | 二进制日志注入器将二进制日志位置与纪元之间的对应关系记录到此表中。 |\n| `ndb_apply_status` | 从库 | 即使主集群上并未实际执行更新，二进制日志注入器也会生成一个虚拟事件来更新此表。在从库端，从库\
  \ SQL 线程作为复制的一部分更新此表。此表的内容指示了从库集群已追赶上主集群的最新纪元。 |\n| `ndb_schema` | 双方 | 使用此表在 SQL\
  \ 节点之间同步模式信息。 |\n| `ndb_replication` | 视情况而定 | 用于冲突检测和解析的配置表。 |\n\n`ndb_schema`\
  \ 表本身并不直接参与 NDB 集群复制；但是，它使用与 NDB 集群复制相同的机制进行监控。\n\n您可能会注意到，使用 `SHOW TABLES` 命令和信息架构（information\
  \ schema）无法在 `mysql` 系统数据库中找到此表。该表是隐藏的，但它确实存在。您可以使用 `SELECT` 语句查询 `ndb_schema` 表的内容。此表存储了\
  \ `NDBCluster` 存储引擎的所有表、表空间和日志文件组的定义。当在某个 SQL 节点上发出 DDL 语句时，此表会得到更新。所有 SQL 节点上的二进制日志注入器都会监控此表。因此，其他\
  \ SQL 节点可以检测到此表上的任何更改。然后，一个 SQL 节点会根据 `ndb_schema` 表中的定义更新本地数据字典（即 .frm 文件）。即使禁用了二进制日志记录，二进制日志注入器线程仍会运行，并且只监控\
  \ `ndb_schema` 表，因为如果不监控此表，就无法检测到模式变更。`ndb_schema` 表也在第 9 章中有所描述。\n\n`ndb_replication`\
  \ 表用于配置冲突检测和解析。此表最初并不存在。因此，必须创建该表才能配置冲突检测和解析。有关该表的详细信息将在本章后面介绍。\n\n#### NDB 集群复制的用例和优势\n\
  \n在我看来，NDB 集群复制品的实现方式——使用与标准 MySQL 复制相同的机制——是一个很棒的设计。如前一节所述，数据同步不是通过特殊的通信通道完成的，而是使用二进制日志和\
  \ MySQL 协议进行同步。它具有明确的优势，例如：\n\n*   可以在两个 MySQL NDB 集群之间配置 NDB 集群复制，也可以在 MySQL NDB\
  \ 集群与标准的 MySQL 服务器（`InnoDB`）之间配置。\n*   对于现有的 MySQL 用户，可以以熟悉的方式管理 NDB 集群复制。这降低了新\
  \ NDB 集群复制用户的学习成本。\n*   可以像标准 MySQL 复制一样，配置各种拓扑结构的 NDB 集群复制。\n\nNDB 集群复制非常灵活。其使用方式有成千上万种。以下是一些广为人知的用例：\n\
  \n*   **灾难恢复**：如图 6-4 所示，即使发生灾难导致整个数据中心无法使用，也能在备用站点提供数据服务。数据通过安全连接（TLS）或通过专用网络在互联网上传输。\n\
  \n    ![A435171_1_En_6_Fig4_HTML.jpg](img/A435171_1_En_6_Fig4_HTML.jpg)\n    *图\
  \ 6-4. 使用 NDB 集群复制进行灾难恢复配置*\n\n*   **用于维护的备用集群**：用于各种维护任务，例如为了避免主集群负载而进行备份、为进行大规模维护任务（如为添加数据节点而重新分配分区）而计划的切换，以及复制模式变更。\n\
  *   **读取扩展**：与标准 MySQL 复制类似，用于扩展目的的 1:N 拓扑结构同样适用于 MySQL NDB 集群。虽然 MySQL NDB 集群具有良好的可扩展性，但它并不擅长某些类型的查询。如图\
  \ 6-5 所示，从 MySQL NDB 集群复制到 `InnoDB` 可以解决此类读取扩展性问题。\n\n    ![A435171_1_En_6_Fig5_HTML.jpg](img/A435171_1_En_6_Fig5_HTML.jpg)\n\
  \    *图 6-5. 通过从 MySQL NDB 集群复制到 InnoDB 实现读取扩展*\n\n为了让您的 NDB 集群复制设置富有成效，请明确其用途。换句话说，厘清应用需求，并认识到为什么需要\
  \ NDB 集群复制。如果没有明确的目的，您的系统将无法得到充分利用。\n\n\n### 设置 NDB 集群复制\n\n本节将讨论如何设置 NDB 集群复制。由于\
  \ NDB 集群复制的架构与标准 MySQL 复制非常接近，其设置过程也与之相似。尽管相似，它们仍存在一些差异。\n\n在设置 NDB 集群复制时，请考虑以下场景：\n\
  \n*   为全新的集群实例设置复制。由于实例是新安装的，集群预先没有任何数据。\n*   为现有的集群实例安装一个新的集群实例作为复制从站。\n*   在复制失败时设置备用复制通道。\n\
  \n让我们详细了解这些场景的具体操作步骤。\n\n#### 使用空数据库设置 NDB 集群复制\n\n在使用空数据库设置 NDB 集群复制的场景中，设置复制的流程与标准\
  \ MySQL 服务器相同，除了 MySQL NDB 集群特有的选项。要完成 NDB 集群复制设置，请按照以下说明操作。\n\n##### 设置主集群和从集群\n\
  \n您至少需要两个集群来设置复制——一个主集群和一个或多个从集群。根据应用需求，使用必要的配置来设置集群。设置步骤和配置请参见章节 3、4 和 5。\n\n#####\
  \ 为复制配置主 SQL 节点\n\n配置 `server_id` 选项，并使用 `ROW` 格式启用二进制日志。清单 6-1 显示了主 SQL 节点的配置示例。\n\
  \n```\n[mysqld]\nserver_id = 1\nlog_bin = mysql-bin\nbinlog_format = ROW\n清单 6-1.\n\
  主 SQL 节点的示例配置\n```\n\n由于 NDB 集群复制仅支持 `ROW` 二进制日志格式，`binlog_format` 选项应设置为除 `STATEMENT`\
  \ 以外的值。截至 MySQL Server 5.7 和 MySQL NDB 集群 7.5，`binlog_format` 的默认值为 `ROW`。因此，在 MySQL\
  \ NDB 集群 7.5 或更新版本上，显式设置 `binlog_format` 是可选的。\n\n确保每个 SQL 节点都有一个唯一的、特定的、独立的 `server_id`，并且在所有集群的所有\
  \ SQL 节点（包括从站）中，没有任何 SQL 节点组合具有相同的 `server_id`。这是标准 MySQL 复制的常见要求。\n\n注意\n\n不要启用\
  \ GTID，MySQL NDB 集群尚不支持此功能。\n\n如果 SQL 节点已经在运行，您需要重启 `mysqld` 以启用二进制日志及其他相关更改。如果\
  \ SQL 节点尚未启动，请在此阶段启动它。以下命令是在使用旧式 `init` 脚本的 Linux 主机上启动服务器的示例命令。请根据您的系统流程启动服务器。\n\
  \n```\nshell$ su\nshell# service mysqld start\n```\n\n##### 在主服务器上创建用于复制的用户\n\n\
  与标准 MySQL 复制一样，从站作为客户端连接到其主站。因此，主站上需要有一个供从站使用的用户账户。清单 6-2 显示了使用适当权限创建用户账户的示例命令。从站用户账户所需的权限是\
  \ `REPLICATION SLAVE`。\n\n```\nmysql> CREATE USER repl@slavehost IDENTIFIED BY 'slavepass';\n\
  mysql> GRANT REPLICATION SLAVE ON *.* TO repl@slavehost;\n清单 6-2.\n在主 SQL 节点上创建复制用户\n\
  ```\n\n目前，MySQL 复制不支持除原生密码和 `sha256_password` 以外的身份验证插件。请勿使用不支持的插件创建从站用户。\n\n#####\
  \ 为复制配置从 SQL 节点\n\n从站唯一必需的配置选项是 `server_id`。其他选项可以保持不变。由于 `server_id` 没有默认值，必须显式指定。清单\
  \ 6-3 是从 SQL 节点的配置示例。假设此清单中省略了 `NDBCluster` 存储引擎的其他必要选项。\n\n```\n[mysqld]\nserver_id\
  \ = 101\nskip_slave_start\n清单 6-3.\n从 SQL 节点的示例配置\n```\n\n您可以在清单 6-3 中找到另一个选项 `skip_slave_start`。如果复制设置有多个复制通道（本章稍后讨论），则此选项是必需的。\n\
  \n由于 `server_id` 是一个动态变量，如果您已经启动了从 SQL 节点，可以使用 `SET GLOBAL` 命令更改其值。如果您尚未启动从站，请启动它以继续复制设置。\n\
  \n注意\n\n一旦配置好复制后，请勿更改 `server_id`，因为 MySQL 复制假定 `server_id` 在整个复制生命周期内是不可变的。\n\n\
  ##### 配置复制\n\n现在将 SQL 节点配置为复制从站。由于我们假设集群上没有写入数据，因此无需指定二进制日志文件名和位置。清单 6-4 显示了使用 `CHANGE\
  \ MASTER TO` 命令设置新从站的示例。\n\n```\nmysql> CHANGE MASTER TO\n-> MASTER_HOST='masterhost',\n\
  -> MASTER_USER='repl',\n-> MASTER_PASSWORD='PASSWORD',\n-> MASTER_PORT=3306;\n清单\
  \ 6-4.\n用于设置新从站的 CHANGE MASTER TO 命令\n```\n\n提示\n\n由于复制连接本质上是普通的客户端连接，`MASTER_HOST`、`MASTER_USER`、`MASTER_PASSWORD`\
  \ 和 `MASTER_PORT` 选项分别等同于 `mysql` 命令行客户端的 `--host`、`--user`、`--password` 和 `--port`\
  \ 选项。\n\n\n##### 为复制保护连接（可选）\n\n如果您愿意，可以通过安全连接来保护主从服务器之间的网络通信。要为复制启用 TLS 连接，您需要正确配置主服务器和从服务器。有关如何设置安全连接的通用详情，请参见第\
  \ 12 章。特别需要在主服务器上设置证书以启用安全连接。\n\n在从服务器上，您需要在 `CHANGE MASTER TO` 命令中指定 `MASTER_SSL=1`，如清单\
  \ 6-5 所示。\n\n```\nmysql> STOP SLAVE;\nmysql> CHANGE MASTER TO MASTER_SSL=1;\nmysql>\
  \ START SLAVE;\n清单 6-5.\n为复制启用 TLS 连接\n```\n\n只需这几步过程即可启用安全连接。主从服务器之间的连接确保被加密。然而，安全性仍有提升空间。在此阶段，无论连接是否加密，从服务器都可以连接。要强制所有从服务器使用加密连接，需使\
  \ TLS 连接成为复制用户的必备条件。这可以通过在主服务器上执行以下命令实现。\n\n```\nmysql> ALTER USER repl@slavehost\
  \ REQUIRE SSL;\n```\n\n这要求用户 `repl@slavehost` 只能使用加密连接登录。这使得复制比未加密连接安全得多。然而，此设置中仍然存在一些风险。问题在于，只要给定的凭据有效，服务器就允许从任何主机连接到任何账户。认证正常工作听起来无懈可击；然而，凭据认证无法避免以下两个问题：\n\
  \n*   如果复制用户的凭据被盗或通过暴力攻击识别，攻击者可能使用伪装成真实从服务器的虚假从服务器接收二进制日志事件。这使得攻击者能够从复制设置中窃取重要数据。\n\
  *   从服务器可能连接到伪装成真实主服务器的虚假主服务器，因为主服务器只接受或拒绝来自从服务器的认证，而主服务器本身不需要认证。这使得攻击者能够向从服务器发送虚假的恶意数据，导致目标应用程序运行异常。\n\
  \n为防止此类问题，TLS 有一种使用证书识别连接对等方的机制。如果连接对等方没有有效的证书，则无法建立连接。否则，连接失败。有效的证书必须由已知的证书颁发机构（CA）签名，无论是公共\
  \ CA 还是私有 CA。通常，公共 CA 用于通过互联网的公共连接，例如网站。因此，私有 CA 适用于必须对公众隐藏的私有数据库连接。\n\n注意\n\n`mysql_ssl_rsa_setup`\
  \ 命令会创建一个私有 CA 作为设置的一部分。因此，由 `mysql_ssl_rsa_setup` 生成的证书是自签名证书。\n\n要强制从服务器在连接时指定证书，请使用以下命令在主服务器上更改用户定义：\n\
  \n```\nmysql> ALTER USER repl@slavehost REQUIRE X509;\n```\n\n为了验证从服务器是授权客户端，从服务器必须拥有有效的客户端证书。将\
  \ `ca.pem`、`client-cert.pem` 和 `client-key.pem` 复制到从服务器主机。然后，在 `CHANGE MASTER TO`\
  \ 命令中指定这些文件。假设文件被复制到 `/var/lib/mysql-cert` 目录，则使用 `CHANGE MASTER TO` 命令设置安全连接。参见清单\
  \ 6-6。\n\n```\nmysql> CHANGE MASTER TO\n->        MASTER_SSL_CA = 'ca.pem',\n->\
  \        MASTER_SSL_CERT = 'client-cert.pem',\n->        MASTER_SSL_KEY = 'client-key.pem',\n\
  ->        MASTER_SSL_CAPATH = '/var/lib/mysql-cert';\n清单 6-6.\n在从服务器上设置安全连接\n```\n\
  \n另一方面，从服务器验证主服务器是否确实是授权服务器也很有意义。为此，从服务器必须在 `CHANGE MASTER TO` 命令中指定 `MASTER_SSL_VERIFY_SERVER_CERT=1`\
  \ 选项。设置此选项后，从服务器会检查主服务器证书中包含的通用名称是否与主服务器的主机名相同。客户端仅在两者相同时才接受主服务器。否则，客户端将终止连接。\n\n\
  注意\n\n不幸的是，由 `mysql_ssl_rsa_setup` 生成的证书中包含的通用名称不是主机名，并且无法使用命令行选项手动更改。因此，如果您想使用此功能，需要手动生成证书。生成证书的过程有点复杂，超出了本书的讨论范围。\n\
  \n如您所见，设置集群复制的过程非常接近标准的 MySQL 复制。但请注意，本节中的过程仅适用于集群中未存储任何数据的情况。当您已经在运行集群，并且集群存储了要复制的数据时，则需要额外的步骤，如下一节所示。\n\
  \n##### 启动复制\n\n最后，使用 `START SLAVE` 命令启动复制，并使用 `SHOW SLAVE STATUS` 命令检查复制是否真正启动。\n\
  \n```\nmysql> START SLAVE;\nmysql> SHOW SLAVE STATUS\\G\n```\n\n检查 `Slave_IO_Running`\
  \ 和 `Slave_SQL_Running` 是否均为 “Yes”。`SHOW SLAVE STATUS` 命令字段的详细信息将在本章后面描述。请注意，`SHOW\
  \ SLAVE STATUS` 命令后跟了一个特殊的分隔符 `\\G`。这使得输出样式变为垂直样式，而非通常的表格样式。由于 `SHOW SLAVE STATUS`\
  \ 输出包含许多字段，垂直样式比标准表格样式更易于查看。\n\n#### 使用现有数据库设置 NDB 集群复制（离线）\n\n即使存在现有数据，如果能够确保维护窗口，设置\
  \ NDB 集群复制的过程也接近标准的 MySQL 复制。在维护窗口期间，即使集群处于启动和运行状态，应用程序也绝不能访问集群。因此，您需要确保在设置期间您的应用程序处于离线状态。您也可以通过将集群设置为单用户模式，并仅允许从无法被您的应用程序访问的\
  \ SQL 节点访问来实现此目标。有关单用户模式的更多信息，请参见第 8 章。\n\n要在维护窗口期间将从集群添加到现有集群，请按照以下部分的说明操作。\n\n\
  ##### 安装用作从服务器的新集群\n\n首先要做的是设置一个集群用作从服务器。请注意，从集群必须具备存储与主集群相同数据的容量。虽然拥有与主集群配置完全相同的从集群通常是理想的，但从集群的配置不一定必须与主集群相同。唯一的先决条件是必须有足够的容量。如果从服务器无法存储与主服务器相同的数据，则无法配置复制。\n\
  \n如果使用了复制过滤器，从服务器的数据量可能少于主服务器。仅在这种情况下，才可能在从服务器上采用容量较小的系统布局。\n\n##### 将主服务器数据复制到从服务器\n\
  \n从主服务器进行备份，并将其恢复到从服务器。确保此时主服务器和从服务器具有相同的数据。有关备份和恢复过程的详细信息，请参阅第 8 章。\n\n如果使用了复制过滤器，您可以从备份和/或恢复中省略被过滤的表。\n\
  \n##### 设置与空集群相同的复制\n\n继续前一节的第 2 步设置过程。如果主库上已经启用了二进制日志，您可以在启动复制前选择执行 `RESET MASTER`\
  \ 命令。此命令会清除所有现有的二进制日志。由于没有需要应用的二进制日志，如果您在主库上执行了 `RESET MASTER` 命令，则无需在 `CHANGE MASTER\
  \ TO` 命令中指定二进制日志文件名和位置。\n\n另一方面，如果您希望保留主库上的二进制日志，请使用 `SHOW MASTER STATUS` 命令记录当前的二进制日志文件名和位置。由于此时主库和从库的数据是相同的，旧的二进制日志绝不能应用到从库上。因此，您必须在\
  \ `CHANGE MASTER TO` 命令中指定二进制日志文件名和位置。下一节将提供一个带有二进制日志文件名和位置的 `CHANGE MASTER TO`\
  \ 命令示例。\n\n然后，使用 `START SLAVE` 命令启动复制，并使用 `SHOW SLAVE STATUS` 命令监控状态。\n\n#### 使用现有数据库设置\
  \ NDB 集群复制（在线）\n\n在实践中，生产系统往往 24x7 运行，因此很难获得维护窗口。请不要担心。MySQL NDB 集群具备在集群正常运行且应用程序正在访问或修改集群数据时，将新的从集群添加到现有集群的能力。\n\
  \n要在运行中的系统上设置 NDB 集群复制，需要一些在离线过程中未见的技巧，如下所示。\n\n##### 安装用作从库的新集群\n\n像前一节的离线过程一样，安装一个用作从库的新集群。从集群的先决条件与离线过程相同。\n\
  \n##### 为复制配置主库 SQL 节点\n\n在主库上启用二进制日志并设置 `server_id`。更多详情请参见列表 6-1。\n\n##### 从主库进行原生备份\n\
  \nMySQL NDB 集群唯一可用的在线备份方法是原生备份。从管理客户端执行 `START BACKUP` 命令，对主集群进行完整备份。\n\n##### 将备份恢复到从集群\n\
  \n为了使用现有数据设置新的从集群，必须确定备份的二进制日志文件名和位置。这里使用的关键概念是纪元，如本章前面所述。从主库进行的完整备份是某个时刻的数据快照。任何原生备份都有一个表示备份时刻的纪元。可以使用带有\
  \ `--restore-epoch`（或简写为 `-e`）选项的 `ndb_mgm` 命令来恢复纪元信息。列表 6-7 显示了一个在恢复数据的同时恢复纪元的命令示例。\n\
  \n```\nshell$ ndb_restore --ndb-connectstring=mgmhost --restore_meta --restore_data\
  \ --restore_epoch --nodeid=1 --backupid=1 --backup_path=/backups/cluster/BACKUP/BACKUP-1\
  \ --disable-indexes\n```\n列表 6-7. 将元数据、数据和纪元恢复到从集群\n\n此选项的结果是，纪元被存储在恢复集群的 `mysql.ndb_apply_status`\
  \ 表中。\n\n注意\n在上一节的离线过程中，不需要纪元和二进制日志位置信息，因为在设置期间没有数据被修改，且不使用现有的二进制日志。相反，在在线过程中，数据会被修改，并且二进制日志每秒都在持续生成。因此，如果不从备份中检索纪元，则无法从进行完整备份时的二进制日志位置开始复制。\n\
  \n在标准的 MySQL 复制中，可以在备份中包含所需的位置信息。例如，`mysqldump` 命令有一个 `--master-data` 选项用于此目的。但是，此选项不能用于\
  \ MySQL NDB 集群，因为它是一个分布式数据库，并且 SQL 节点无法进行在线备份。\n\n##### 确定二进制日志文件名和位置\n\n您必须做的第一件事是使用以下查询从从集群中检索纪元。\n\
  \n```\nmysql> SELECT MAX(epoch) AS latest FROM mysql.ndb_apply_status;\n```\n此查询可以从从集群上的任何\
  \ SQL 节点执行，因为 `mysql.ndb_apply_status` 表是使用 `ndbcluster` 存储引擎定义的，可以从任何 SQL 节点访问。\n\
  \n然后，登录到将成为新复制主库的主集群上的一个 SQL 节点。接着，使用上一个查询确定的纪元值，执行列表 6-8 中的查询。\n\n```\nmysql> SET\
  \ @epoch := 2101677821788177;\nmysql> SELECT\n-> SUBSTRING_INDEX(File, '/', -1)\
  \ AS binlog_file,\n-> Position AS binlog_position\n-> FROM mysql.ndb_binlog_index\n\
  -> WHERE epoch > @epoch\n-> ORDER BY epoch ASC LIMIT 1;\n```\n列表 6-8. 从 `mysql.ndb_binlog_index`\
  \ 表确定二进制日志文件名和位置\n\n##### 配置复制\n\n回到从集群，并登录到将成为新从库的 SQL 节点。然后，像列表 6-9 中那样，使用 `CHANGE\
  \ MASTER TO` 命令配置复制。指定从上一步检索到的二进制日志文件名和位置。\n\n```\nmysql> CHANGE MASTER TO\n-> MASTER_HOST='masterhost',\n\
  -> MASTER_USER='repl',\n-> MASTER_PASSWORD='PASSWORD',\n-> MASTER_PORT=3306,\n->\
  \ MASTER_LOG_FILE='mysql-bin.000123',\n-> MASTER_LOG_POS=1234567;\n```\n列表 6-9.\
  \ 使用二进制日志文件名和位置配置复制\n\n根据您的系统配置和状态适当地替换每个参数。这个 `CHANGE MASTER TO` 命令看起来与未启用 GTID\
  \ 的标准 MySQL 复制相同。`CHANGE MASTER TO` 命令本身没有区别。设置 NDB 集群复制与标准 MySQL 复制之间的唯一区别在于如何确定二进制日志位置，这是此阶段的预备步骤。\n\
  \n可选地，您可以如本章前面讨论的那样，使用 TLS 来保障主从之间的网络连接。\n\n最后，您可以像往常一样使用 `START SLAVE` 命令启动复制。使用\
  \ `SHOW SLAVE STATUS` 命令验证复制设置是否成功。\n\n### NDB 集群复制通道的故障切换\n\n在使用 NDB 集群复制时，建议设置多个复制通道。\n\
  \n如本章前面所讨论的，SQL 节点只有在运行时才能接收来自数据节点的修改。当离线时，主库 SQL 节点上会错过一定数量的二进制日志事件。除了整个集群关闭的情况，主库\
  \ SQL 节点的不可用将由于数据丢失而导致复制中断。为避免此问题，必须使主库 SQL 节点具有冗余性。为此，必须在主集群上多于一个的 SQL 节点上启用二进制日志。这样，当主库因某些原因停止工作时，可以将复制通道切换到另一个主库\
  \ SQL 节点，并以最小的停机时间继续复制。此场景如本章前面的图 6-3 所示。\n\n#### 何时进行故障转移\n\n当主 SQL 节点重启时，二进制日志注入器线程会向二进制日志写入一个名为\
  \ `LOST_EVENTS` 的特殊事件。该事件表明二进制日志事件可能已丢失。无论数据是否真的丢失，重启时都会写入此事件，因为 SQL 节点无法知道在主 SQL\
  \ 节点离线期间集群数据是否已被修改以及事件是否已丢失。\n\n除了服务器崩溃，还有几种场景会导致 `LOST_EVENTS` 事件。如果主 SQL 节点与数据节点之间的连接丢失，二进制日志注入器在连接恢复前无法接收事件。如果二进制日志注入器线程的进度太慢，跟不上集群上的修改，那么事件将无法在数据节点内排队，数据节点会认为\
  \ SQL 节点落后并断开其连接。在这些情况下，`LOST_EVENTS` 事件会被写入二进制日志。\n\n在从集群上，从 SQL 线程在从中继日志读取到 `LOST_EVENTS`\
  \ 事件时会强制停止。如果没有人工干预，从 SQL 线程不会因 `LOST_EVENTS` 事件而自动恢复。可以使用系统变量 `sql_slave_skip_counter`\
  \ 来跳过错误；然而，通常我们不应这样做，因为它会让丢失的数据保持原状，并导致主从数据不同步。当然，这是开始进行故障转移的最显著征兆。\n\n每当复制停止且无法恢复时，都必须执行故障转移。当然，由于\
  \ `LOST_EVENTS` 导致的复制失败是开始故障转移的绿色信号。这意味着当主 SQL 节点重启时，故障转移是强制性的。如果从 SQL 节点崩溃了怎么办？我建议执行故障转移，因为\
  \ NDB 集群复制的从库并非崩溃安全的。\n\n在其他情况下，只要复制从库线程不工作，就必须进行故障转移。\n\n使用 `SHOW SLAVE STATUS`\
  \ 监控复制状态，查看两个复制线程（`Slave_IO_Running` 和 `Slave_SQL_Running` 字段）是否工作正常。如果不是，开始对复制通道进行故障转移。\n\
  \n注意：MySQL 服务器具备避免从库崩溃时主从不一致的能力。此功能称为崩溃安全从库。崩溃安全从库的实现依赖于 `InnoDB` 事务。使用崩溃安全从库时，用户表和名为\
  \ `mysql.slave_relay_log_info` 的系统表（定义为 `InnoDB` 存储引擎）在同一事务中更新。这确保了即使在崩溃时，二进制日志位置和\
  \ `InnoDB` 表中的用户数据也能同步。然而，它不能确保二进制日志位置和 `NDBCluster` 表的同步。\n\n#### 启用二进制日志的 SQL\
  \ 节点数量\n\n尽管可以在多个 SQL 节点上启用二进制日志，但到底需要多少个 SQL 节点启用二进制日志呢？启用二进制日志的 SQL 节点越多，复制的冗余就越多。因此，你可能希望在多个\
  \ SQL 节点上启用二进制日志。然而，事情并非如此简单，因为为每个 SQL 节点生成二进制日志会在数据节点、SQL 节点和互联网络上产生一些开销。\n\n启用二进制日志的\
  \ SQL 节点过多可能会严重损害系统性能和/或系统稳定性，这是最坏的情况。因此，启用足够数量的 SQL 节点的二进制日志是一个好的做法。在我看来，大多数情况下两到三个就足够了。不要启用超过必要数量的\
  \ SQL 节点的二进制日志。\n\n#### 故障转移流程\n\n要对复制通道进行故障转移，请遵循以下步骤：\n\n1.  确保当前的从 SQL 节点已完全停止。\n\
  2.  使用 `mysql.ndb_apply_status` 表确定从集群上的当前纪元。\n3.  在新的主 SQL 节点上使用 `mysql.ndb_binlog_index`\
  \ 表确定二进制日志文件名和位置。\n4.  在当前或新的从 SQL 节点上使用 `CHANGE MASTER TO` 命令配置复制。\n5.  使用 `START\
  \ SLAVE` 命令启动复制。\n\n实际上，该流程本身与前一节（使用现有数据库的在线 NDB 集群复制设置流程）中的步骤 5 和 6 相同，除了上述的第一步。因此，请参阅前一节了解更多关于此流程的详细信息。\n\
  \n为确保当前的从库已完全停止，如果从 SQL 节点正在运行，请执行 `STOP SLAVE` 命令。如果从 SQL 节点已离线，除非设置了 `skip_slave_start`\
  \ 选项，否则不要启动从 SQL 节点。除非已确定从库上的当前纪元，否则不要执行 `RESET SLAVE` 命令，因为它会清空 `mysql.ndb_apply_status`\
  \ 表。自 MySQL NDB Cluster 7.3 系列起，添加了 `ndb_clear_apply_status` 选项。当此选项的值为 `OFF` 时，`RESET\
  \ SLAVE` 将不会清空 `mysql.ndb_apply_status` 表。\n\n#### NDB 集群复制通道故障转移的附加配置\n\n我建议在从集群上针对复制通道故障转移设置两个配置选项。\n\
  \n第一点是在从集群上拥有多个候选从 SQL 节点。尽管通道故障转移的主要目的是避免在主 SQL 节点离线时丢失二进制日志事件，但如果从 SQL 节点也同时离线，则无法继续复制。由于\
  \ MySQL 服务器实例可能因某种原因离线，你需要为从 SQL 节点意外离线的情况做好准备。预先在所有候选从 SQL 节点上显式设置 `server_id`。注意不要出现重复的\
  \ `server_id`。\n\n第二点是确保复制最多在一个从 SQL 节点上运行。不可能在多个从 SQL 节点上启动复制。这可能会导致复制期间出现问题，例如数据不一致或复制停止。默认情况下，包括\
  \ MySQL NDB 集群 SQL 节点在内的 MySQL 服务器，如果在进程重启前已使用 `CHANGE MASTER TO` 命令配置了复制，则会在重启后启动复制。一旦使用\
  \ `RESET SLAVE ALL` 命令取消配置复制，则在从 SQL 节点重启时复制将不会启动。或者，`skip_slave_start` 选项也会阻止在重启时启动复制。确保在所有从\
  \ SQL 节点上，重启时不会启动复制。我建议将 `skip_slave_start` 选项添加到所有 SQL 节点，因为在崩溃时无法取消配置复制。在由崩溃引起的重启中，阻止复制的唯一方法是使用\
  \ `skip_slave_start` 选项。\n\n### NDB 集群复制的日常维护\n\n要使 NDB 集群复制稳定，日常的细心维护很重要。没有适当的维护，任何软件都无法成功运行。在本节中，我们将讨论如何在日常业务中维护\
  \ NDB 集群复制。\n\n\n#### 监控 NDB 集群复制\n\n维护工作中最关键的部分是监控。需定期检查其状态是否健康，并在发现问题时报告。监控复制状态的命令与标准\
  \ MySQL 复制相同，即 `SHOW SLAVE STATUS`。列表 6-10 展示了 MySQL NDB Cluster 7.5 上 `SHOW SLAVE\
  \ STATUS` 命令的示例输出。\n\n```\nmysql> SHOW SLAVE STATUS\\G\n***************************\
  \ 1. row ***************************\n             Slave_IO_State: Waiting for master\
  \ to send event\n                Master_Host: masterhost1\n                Master_User:\
  \ repl\n                Master_Port: 3306\n              Connect_Retry: 60\n   \
  \         Master_Log_File: mysql-bin.000010\n        Read_Master_Log_Pos: 154\n\
  \               Relay_Log_File: relay-bin.000004\n                Relay_Log_Pos:\
  \ 355\n        Relay_Master_Log_File: mysql-bin.000007\n             Slave_IO_Running:\
  \ Yes\n            Slave_SQL_Running: No\n              Replicate_Do_DB:\n     \
  \     Replicate_Ignore_DB:\n           Replicate_Do_Table:\n       Replicate_Ignore_Table:\n\
  \      Replicate_Wild_Do_Table:\n  Replicate_Wild_Ignore_Table:\n              \
  \     Last_Errno: 1590\n                   Last_Error: The incident LOST_EVENTS\
  \ occured on the master. Message: mysqld startup\n                 Skip_Counter:\
  \ 0\n          Exec_Master_Log_Pos: 154\n              Relay_Log_Space: 3296\n \
  \             Until_Condition: None\n               Until_Log_File:\n          \
  \      Until_Log_Pos: 0\n           Master_SSL_Allowed: Yes\n               Master_SSL_CA_File:\n\
  \               Master_SSL_CA_Path:\n                  Master_SSL_Cert:\n      \
  \        Master_SSL_Cipher:\n                   Master_SSL_Key:\n        Seconds_Behind_Master:\
  \ NULL\nMaster_SSL_Verify_Server_Cert: No\n                Last_IO_Errno: 0\n  \
  \              Last_IO_Error:\n               Last_SQL_Errno: 1590\n           \
  \    Last_SQL_Error: The incident LOST_EVENTS occured on the master. Message: mysqld\
  \ startup\n  Replicate_Ignore_Server_Ids:\n             Master_Server_Id: 1\n  \
  \                Master_UUID: a20a9ded-25cd-11e7-bcb2-3c970ec815c3\n           \
  \  Master_Info_File: /var/lib/mysql-cluster/master.info\n                    SQL_Delay:\
  \ 0\n          SQL_Remaining_Delay: NULL\n        Slave_SQL_Running_State:\n   \
  \              Master_Retry_Count: 86400\n                Master_Bind:\n       \
  \ Last_IO_Error_Timestamp:\n       Last_SQL_Error_Timestamp: 170420 23:43:38\n \
  \              Master_SSL_Crl:\n           Master_SSL_Crlpath:\n          Retrieved_Gtid_Set:\n\
  \           Executed_Gtid_Set:\n               Auto_Position: 0\n        Replicate_Rewrite_DB:\n\
  \                Channel_Name:\n          Master_TLS_Version:\n1 row in set (0.00\
  \ sec)\n列表 6-10.\nSHOW SLAVE STATUS 命令的示例输出\n```\n\n`SHOW SLAVE STATUS` 命令中的字段数量会随版本升级而增加。许多字段具有参考价值；然而，其可见性并不佳。无需监控所有字段，而应监控最显著的字段，接下来将对此进行讨论。\n\
  \n##### Slave_IO_Running\n此字段指示从属 IO 线程是否正在运行。该字段的值为 `Yes` 或 `No`。从属 IO 线程的状态大致反映了主从服务器之间的网络连接状态。如果网络存在问题，此字段的值应为\
  \ `No`。在列表 6-10 中，该字段的值为 `Yes`，因此网络连接必定良好。\n\n##### Slave_IO_State\n`Slave_IO_Running`\
  \ 的值为 `Yes` 或 `No`，而此字段的值是各种字符串，指示从属 IO 线程的状态。该状态表明了从属 IO 线程正在做什么，例如 `Waiting for\
  \ master to send event`、`Connecting to master` 或 `Queueing master event to the relay\
  \ log`。\n\n##### Slave_SQL_Running\n此字段指示从属 SQL 线程是否正在运行。该字段的值为 `Yes` 或 `No`。如果在应用中继日志中的事件时发生错误，从属\
  \ SQL 线程将停止运行。\n\n##### Seconds_Behind_Master\n此字段显示一个时间段，表明复制延迟了多久。二进制日志中的每个事件都有一个事件生成的时间戳，该时间戳大致表示\
  \ binlog 注入器线程从数据节点接收事件的时间。`Seconds_Behind_Master` 的计算方法是当前时间与从属服务器上当前正在执行的事件的时间戳之差。如果中继日志中的所有事件都已执行完毕，且没有剩余的待执行事件，此字段的值为\
  \ 0。请注意，此字段的值是近似值，无法确定精确的延迟时间，因为主从服务器是独立的主机。即使主从服务器之间的网络出现延迟，也无法通过此字段检测到。\n\n#####\
  \ Master_Log_File\n从属 IO 线程当前正在读取的主服务器二进制日志的文件名。\n\n##### Read_Master_Log_Pos\n\
  从属 IO 线程当前正在读取的主服务器二进制日志事件的起始位置，或从属 IO 线程已读取的最后一个主服务器二进制日志事件的结束位置。\n\n##### Relay_Master_Log_File\n\
  从属 SQL 线程当前正在执行的主服务器二进制日志的文件名。\n\n##### Exec_Master_Log_Pos\n从属 SQL 线程当前正在执行的主服务器二进制日志事件的起始位置，或从属\
  \ SQL 线程已执行的最后一个主服务器二进制日志事件的结束位置。\n\n`Relay_Master_Log_File` 和 `Exec_Master_Log_Pos`\
  \ 这一对组合比 `Master_Log_File` 和 `Read_Master_Log_Pos` 更重要，因为前者指示了从属数据当前追赶到的位置。当从属服务器遇到故障时，可以使用当前数据以及\
  \ `Relay_Master_Log_File` 和 `Exec_Master_Log_Pos` 的当前值来恢复复制。\n\n\n\n##### Last_Errno\
  \ 与 Last_Error\n\n这些字段指示最近发生的错误信息。如果从库线程启动以来未发生错误，则这些字段为空。表 6-2 列出了`SHOW SLAVE STATUS`输出中以`Last`为前缀的字段。\n\
  \n**表 6-2. 指示错误信息的 SHOW SLAVE STATUS 字段列表**\n\n| 字段名 | 描述 |\n| --- | --- |\n| `Last_Errno`\
  \ | 指示最近一次发生在从库 IO 线程或从库 SQL 线程上的错误代码。 |\n| `Last_Error` | 最近一次发生在从库 IO 线程或从库 SQL\
  \ 线程上的错误的字符串表示。此字段比`Last_Errno`更具信息性，因为错误字符串中添加了额外信息。 |\n| `Last_IO_Errno` | 指示最近一次发生在从库\
  \ IO 线程上的错误代码。 |\n| `Last_IO_Error` | 最近一次发生在从库 IO 线程上的错误的字符串表示。 |\n| `Last_IO_Error_Timestamp`\
  \ | 指示从库 IO 线程上最近一次错误发生时的时间戳。 |\n| `Last_SQL_Errno` | 指示最近一次发生在从库 SQL 线程上的错误代码。\
  \ |\n| `Last_SQL_Error` | 最近一次发生在从库 SQL 线程上的错误的字符串表示。 |\n| `Last_SQL_Error_Timestamp`\
  \ | 指示从库 SQL 线程上最近一次错误发生时的时间戳。 |\n\n`Last_IO_Error_Timestamp`和`Last_SQL_Error_Timestamp`是在\
  \ MySQL Server 5.6.3 中添加的。因此，这些字段在 MySQL NDB Cluster 7.3 系列或更高版本中可用。\n\n`Last_errno`/`Last_Error`的值与`Last_IO_Errno`/`Last_IO_Error`或`Last_SQL_Errno`/`Last_SQL_Error`相同。所以，这些字段本质上是冗余的，但对于识别从库上发生的最新错误很方便。\n\
  \n自 MySQL NDB Cluster 7.5 起，在性能模式（performance schema）中添加了复制相关的表。除了`SHOW SLAVE STATUS`命令外，这些性能模式表也可用于监控复制状态。相当于`SHOW\
  \ SLAVE STATUS`命令的信息被拆分到多个表中。`SHOW SLAVE STATUS`混合显示了从库 IO 线程和从库 SQL 线程的配置与状态，而性能模式表则按线程类型以及是配置还是状态进行分离。表\
  \ 6-3 显示了复制相关的性能模式表列表。\n\n**表 6-3. MySQL NDB Cluster 7.5 上复制相关的性能模式表列表**\n\n| 表名\
  \ | 描述 |\n| --- | --- |\n| `replication_applier_configuration` | 从库 SQL 线程的配置。 |\n\
  | `replication_applier_status` | 从库 SQL 线程的状态。 |\n| `replication_applier_status_by_coordinator`\
  \ | 多线程从库中协调器线程的状态。 |\n| `replication_applier_status_by_worker` | 多线程从库中工作线程的状态。\
  \ |\n| `replication_connection_configuration` | 从库 IO 线程的配置。 |\n| `replication_connection_status`\
  \ | 从库 IO 线程的状态。 |\n| `replication_group_member_stats` | 此表显示复制组成员的网络和状态信息。 |\n\
  | `replication_group_members` | MySQL 组复制（Group Replication）成员的统计信息。 |\n\n由于 MySQL\
  \ NDB Cluster 不支持多线程从库和组复制，表 6-3 中的八个表中有四个与 NDB 集群复制无关。在监控方面，配置并不重要。因此，你需要监控两个表——`replication_applier_status`和`replication_connection_status`。请注意，性能模式中缺少相当于`Seconds_Behind_Master`的信息，因为它被认为存在缺陷。由于没有添加替代信息，如果你想监控复制延迟，请使用`SHOW\
  \ SLAVE STATUS`命令。\n\n> **注意**\n> 复制相关性能模式表的设计决策可在工作日志 7374 中找到：[`dev.mysql.com/worklot/task/?id=7374`](https://dev.mysql.com/worklot/task/?id=7374)。\n\
  \n#### 重启主集群\n\n重启集群时必须小心，因为重启主 SQL 节点会导致离线期间丢失一些事件，并引发`LOST_EVENTS`事件。另一方面，重启从库集群时不需要特别小心，因为从库\
  \ SQL 节点重启后可以安全地恢复复制。\n\n有两种重启过程：系统重启和滚动重启。本节介绍这两种重启类型重启时的注意事项。\n\n> **注意**\n> MySQL\
  \ NDB Cluster 还有另一种称为初始系统重启（initial system restart）的重启类型。在 NDB 集群复制设置后不应执行此操作，因为它会清除所有数据并破坏复制。有关重启过程的更多详细信息，请参阅第\
  \ 10 章。\n\n##### 在主集群上进行系统重启\n\n进行系统重启时，`LOST_EVENTS`事件是不可避免的。即使 SQL 节点保持在线，在集群离线期间，SQL\
  \ 节点与数据节点之间的连接也会丢失。但是，由于系统重启导致的`LOST_EVENTS`事件可以忽略，因为在集群离线期间无法修改数据。当你在主集群上执行系统重启时，请遵循以下说明：\n\
  \n1.  在从库 SQL 节点上使用`STOP SLAVE`命令停止复制。\n2.  停止应用程序并确保没有数据访问。\n3.  停止主 SQL 节点。\n\
  4.  关闭集群（使用`ndb_mgm`客户端的`SHUTDOWN`命令）。\n5.  执行系统重启。\n6.  启动主 SQL 节点。\n7.  在从库 SQL\
  \ 节点上使用`START SLAVE`命令启动复制。\n8.  你会看到从库 SQL 线程因`LOST_EVENTS`而停止。确认错误是由`LOST_EVENTS`事件引起的。如果错误是其他类型，请停止此过程并调查问题。\n\
  9.  使用`STOP SLAVE`命令停止复制。\n10. 在从库 SQL 节点上执行`SET GLOBAL sql_slave_skip_counter=1`。\n\
  11. 再次在从库 SQL 节点上使用`START SLAVE`命令启动复制。\n12. 使用`SHOW SLAVE STATUS`命令查看复制是否运行正常。\n\
  \n在此场景中，不需要复制通道故障转移。更确切地说，通道故障转移没有意义，因为所有 SQL 节点上都不可避免地会发生`LOST_EVENTS`事件。因此，只要主集群离线期间没有数据可以被修改，就可以忽略由于系统重启导致的`LOST_EVENTS`事件。\n\
  \n##### 在主集群上进行滚动重启\n\n在主集群进行滚动重启时，应用程序会继续写入、更新和删除数据。因此，在滚动重启过程中重启主 SQL 节点时，会进行修改但这些修改不会写入二进制日志。主集群上滚动重启的大致过程如下：\n\
  \n1.  像常规滚动重启一样重启管理节点和数据节点。\n2.  依次重启除当前充当主节点的 SQL 节点之外的其他 SQL 节点。\n3.  将复制故障转移到备用通道。\n\
  4.  重启先前作为主节点的 SQL 节点。\n5.  （可选）将复制切换回原始通道。\n\n### NDB 集群复制性能调优\n\n性能对于 NDB 集群复制也是一个重要话题。如果复制性能不足，从库将开始落后于主库，并且无法赶上。这种不同步的副本在大多数情况下用处不大。因此，你应该避免\
  \ NDB 集群复制上的不必要延迟。\n\n\n\n\n#### 显式主键\n\n强烈建议所有表都使用显式主键。如果没有显式主键，从库的 SQL 线程必须通过扫描表来查找目标行。表扫描是一项繁重的任务，应尽可能避免。如果表有显式主键，则可以通过主键查找来访问要更新或删除的行。\n\
  \n#### 硬件考量\n\n一个常见的误解是从库集群可以使用比主库集群性能更低的硬件。这当然是错误的。如果从库集群的硬件性能较差，它将无法写入与主库集群相同数量的更新。因此，从库集群必须拥有与主库集群性能相似的硬件；即等效的\
  \ CPU、磁盘和网络交换机。\n\n如果你计划向现有集群添加从库集群，请考虑将现有集群的硬件升级到更好的硬件。正如本章前面所讨论的，多个主库 SQL 节点会拥有二进制日志，而在非复制设置中，通常只有一个\
  \ SQL 节点出于时间点恢复的目的拥有二进制日志。拥有二进制日志的 SQL 节点越多，在数据节点、SQL 节点和互联网络上产生的任务就越多。其中，高速网络尤为重要。\n\
  \n#### 专用主库 SQL 节点\n\n最好在主库集群上将 SQL 节点专用于二进制日志记录。二进制日志记录是一项较为繁重的任务。普通查询可能会争夺资源，并与二进制日志记录发生锁竞争。\n\
  \n理想情况下，应将 SQL 节点专用于二进制日志记录，并放置在单独的服务器机器上。然而，这成本非常高昂。在同一台服务器机器上，为现有的 SQL 节点设置专用的\
  \ SQL 节点实例是一个合理的替代方案。这至少可以避免 `mysqld` 进程内部的锁竞争。\n\n#### 最小化主库二进制日志大小\n\n不要更改以下两个选项的默认值：`ndb_log_updated_only`\
  \ 和 `ndb_log_update_as_write`。如果将 `ndb_log_updated_only` 选项设置为 `ON`（这是默认值），则只有已更新列的变更会被写入二进制日志。如果将\
  \ `ndb_log_update_as_write` 选项设置为 `ON`（这是默认值），则更新操作会作为写入操作来记录。这可以抑制旧行值被写入二进制日志。只有在使用冲突检测和解决时才必须更改这些选项，否则请保持其默认值。\n\
  \n#### 从库批量更新\n\n在从库 SQL 节点上，启用 `slave_allow_batching` 选项可以提高从库 SQL 线程的性能。此选项仅对\
  \ NDB 集群复制有效。标准 MySQL 服务器上存在相同的选项，但它完全无效。启用后，如选项名称所示，事件不会逐个执行，而是以批处理方式一起执行。在繁忙的\
  \ NDB 集群复制环境中，最好将此选项设置为 `ON`。\n\n此选项的最大批处理大小为 32KB。批处理按纪元进行。因此，如果一个纪元内的事务总大小小于 32KB，批处理大小也可能小于\
  \ 32KB。\n\n#### 减少二进制日志同步到磁盘的频率\n\n由于用于 NDB 集群复制的主库和从库 SQL 节点并非崩溃安全的，因此设置 `sync_binlog=1`\
  \ 没有意义。建议在主库 SQL 节点上设置 `sync_binlog=1000` 或类似值。如果在从库上启用了二进制日志（通过 `log_slave_updates=ON`），则在从库\
  \ SQL 节点上也设置 `sync_binlog=1000`。\n\n从 MySQL Server 5.7 和 MySQL NDB Cluster 7.5 开始，`sync_binlog`\
  \ 选项的默认值更改为 1。此更改对于使用 `InnoDB` 的标准 MySQL Server 是合理的，但不适用于 MySQL NDB Cluster。在 MySQL\
  \ NDB Cluster 7.5 上，请不要忘记设置 `sync_binlog=1000`。\n\n#### 事件缓冲\n\n在一个繁忙的集群上，修改可能过快，导致数据节点内部的事件队列被填满。在这种情况下，数据节点会断开滞后的\
  \ SQL 节点并继续其操作。断开连接会引发一个 `LOST_EVENTS` 事件。当滞后的 SQL 节点被断开连接时，集群日志中会写入类似以下的消息。\n\n\
  ```\nDisconnecting node 52 because it has exceeded MaxBufferedEpochs (100 > 100),\
  \ epoch 63612/1\n```\n\n然后，在被断开连接的 SQL 节点上会写入以下消息。\n\n```\n[ERROR] cluster disconnect\
  \ An incident event has been written to the binary log which will stop the slaves.\n\
  ```\n\n这不是一个理想的情况。在这种情况下，通过增加 `config.ini` 文件中 `[NDBD DEFAULT]` 部分下的 `MaxBufferedEpochs`\
  \ 和 `MaxBufferedEpochBytes`，可以在断开滞后 SQL 节点之前提供更多的缓冲空间。\n\n### 冲突检测与解决\n\nMySQL NDB\
  \ 集群具备一项特殊能力，可以在多主复制设置（即多个集群充当主库）中检测发生的冲突。在多主复制中，由于复制是异步的，可能会出现数据不一致。修改冲突是多主复制特有的问题。它不会发生在独立集群或主从复制实例中。因此，一般来说，维护多主复制比维护主从复制更困难。检测多主复制期间发生的冲突的能力可以简化多主\
  \ NDB 集群复制的开发和运维。由于冲突检测是一个稍显高级的话题，并且除非使用多主复制，否则不是必需的，所以如果你愿意，可以暂时跳过本节。\n\n\n\n####\
  \ 多主复制\n\n在 MySQL 复制中，可以将一个从服务器配置为同时也充当其他从服务器的主服务器。在这种拓扑结构中，中间的 MySQL 服务器会中继来自其主服务器的更新。这种中继复制拓扑也称为级联。\n\
  \n级联的头部也可能成为级联的尾部从服务器。在这种情况下，复制流形成一个环路。这种类型的复制称为环形复制。图 6-6 描绘了包含四组 MySQL NDB 集群的环形复制。\n\
  \n![A435171_1_En_6_Fig6_HTML.jpg](img/A435171_1_En_6_Fig6_HTML.jpg)\n\n图 6-6.\n\
  包含四个集群的环形 NDB 集群复制\n\n图 6-7 是环形复制的一个特例，其中两个集群组成环形复制；一个集群是另一个集群的主服务器和从服务器。这种类型的复制称为多主复制。\n\
  \n![A435171_1_En_6_Fig7_HTML.jpg](img/A435171_1_En_6_Fig7_HTML.jpg)\n\n图 6-7.\n\
  多主 NDB 集群复制\n\n默认情况下，从服务器不会为复制所做的修改写入二进制日志。由于只有在修改写入二进制日志时才会传播，因此默认情况下，来自上游主服务器的修改不会传播到下游从服务器。要允许为复制所做的修改启用二进制日志记录，请将\
  \ `log_slave_updates` 设置为 `ON`。这种类型的配置如图 6-8 所示。\n\n![A435171_1_En_6_Fig8_HTML.jpg](img/A435171_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8.\n一个 SQL 节点同时充当主服务器和从服务器\n\n当在环形 NDB 集群复制中启用 `log_slave_updates` 时，所有从 SQL\
  \ 节点也充当主服务器；一个 SQL 节点应用来自主服务器的修改，同一个 SQL 节点也将复制产生的事件写入其自己的二进制日志，该日志将被发送到下一个从服务器，如图\
  \ 6-8 左侧所示。这种类型的环形复制的整体拓扑如图 6-8 右侧所示。\n\n或者，也可以在不启用 `log_slave_updates` 的情况下配置 MySQL\
  \ NDB 集群的环形复制。图 6-9 显示了未启用 `log_slave_updates` 的环形 NDB 集群复制。\n\n![A435171_1_En_6_Fig9_HTML.jpg](img/A435171_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9.\n一个 SQL 节点充当主服务器，另一个充当从服务器\n\n在这种情况下，每个从服务器不在本地存储二进制日志，而是由同一集群中的另一个 SQL\
  \ 节点代替存储二进制日志。\n\n目前，仅支持两种类型的环形拓扑：\n\n*   所有从服务器也充当主服务器，如图 6-8 所示。\n*   所有从服务器不存储二进制日志，备用\
  \ SQL 节点成为主服务器，如图 6-9 所示。\n\n在同一环形复制设置中混合两种类型的设置是不允许的。后者尚未经过充分测试，因此我建议使用 `log_slave_updates=1`\
  \ 配置环形复制。\n\n#### 多主复制引起的冲突\n\n环形或多主复制最显著的问题是冲突（或者换句话说，数据不一致）。本节描述了冲突在多主复制中是如何发生的。在本节中，我们使用两个集群的示例进行讨论。\n\
  \n图 6-10 是冲突序列的一个简化、抽象、最小化的模式。每个圆柱体表示存储在 MySQL NDB 集群中的一个表。每个圆柱体中的一个方块表示 `id`（表的主键）值为\
  \ 1 的同一行。\n\n![A435171_1_En_6_Fig10_HTML.jpg](img/A435171_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10.\n由于同时更新两个集群而导致的冲突\n\n在初始状态下，`id=1` 的行在两个集群上具有相同的值。然后，该行被更新为不同的值。这是可能的，因为它们是独立运行的独立集群。接着，两个集群开始将二进制日志中的事件传输到另一个集群。请注意，事件中包含的值是不同的。这导致具有不同值的二进制日志事件被应用于每个集群。因此，两个集群上的行值最终变得不同。\n\
  \n当然，同一行在两个集群上具有不同的值是一个严重的问题。这种情况是数据不一致。虽然应该避免数据不一致，但在标准的 MySQL 复制中无法完全避免，因为它是异步的。另一方面，MySQL\
  \ NDB 集群具有检测此类冲突并自动解决的功能。我们将在本节后面讨论如何在 NDB 集群复制上配置冲突检测和解决。\n\n注意\n\nNDB 集群复制的冲突检测和解决确实简化了使用多主复制的应用程序开发。然而，它仍然比仅更新一个集群的应用程序困难得多，因为后者可以利用事务的力量，而前者不能。在提交事务后解决不一致比在提交事务前避免不一致要困难得多，因为事务根据定义可以确保数据一致性。冲突解决本质上不是事务性操作，因此在某些场景下可能会破坏数据一致性。因此，在使用冲突检测和解决时必须格外小心。\n\
  \n#### 冲突检测方法\n\nNDB 集群复制上有几种类型的冲突检测方法。每种方法都有优点和缺点。因此，你需要根据应用程序需求选择合适的方法。大致来说，存在两类方法。一种是基于时间戳的，另一种是基于纪元的。\n\
  \n所有方法都通过逐行比较数据行来检测修改是否冲突。另一方面，解决将根据方法按行或按事务进行。可以选择按表选择方法。因此，不同的表可能有不同的冲突检测方法。\n\
  \n检测和解决冲突的代理是从 SQL 线程。因此，所有冲突检测和解决仅在从服务器端完成。应用程序可以以相同的方式执行和提交 `NDBCluster` 表上的事务，无论是否配置了冲突检测，因为冲突不会在提交时检测到。如果存在冲突，冲突将在事务提交所在集群的从属集群上被检测到。\n\
  \n```\nThere are several types of methods to detect conflicts on NDB Cluster Replication.\
  \ Each method has pros and cons. So, you need to choose an appropriate one depending\
  \ on application needs. Roughly speaking, two categories of methods exist. One is\
  \ timestamp-based and the other is epoch-based.\n\nAll methods detect if modifications\
  \ are in conflict by comparing data row by row. On the other hand, resolution will\
  \ be done per row or per transaction depending on the method. The method can be\
  \ chosen per table. So, different tables may have different conflict detection methods.\n\
  \nThe agent to detect and resolve the conflict is the slave SQL thread. So, all\
  \ conflict detection and resolution is done on the slave side only. An application\
  \ can execute and commit transactions on NDBCluster tables in the same way whether\
  \ conflict detection is configured or not, because conflict is not detected at commit\
  \ time. Conflicts will be detected on the other cluster, which is slave of the cluster\
  \ where transactions are committed, if there is a conflict.\n```\n\n\n##### `NDB$OLD(column_name)`\n\
  \n冲突检测和解析方法的名称以 `NDB$` 为前缀，并以包含一个可选参数的括号结尾。这里，`NDB$OLD` 是一个方法名，它接受一个列名作为参数。\n\n\
  `NDB$OLD` 是一种基于时间戳的方法。要使用基于时间戳的方法，目标表上需要有一个名为时间戳的特殊列。在冲突检测的语境中，时间戳列并非 SQL 中的 `TIMESTAMP`\
  \ 数据类型。该列之所以被称为时间戳，是因为它指示了行的旧度。时间戳列的实际数据类型必须是 `INT UNSIGNED` 或 `BIGINT UNSIGNED`。它们还应定义为\
  \ `NOT NULL`，因为每次检测冲突时都需要时间戳列的值。如果表已经有合适的列，则无需显式添加时间戳列。否则，你应该添加。\n\n如果目标表中当前的时间戳值与即将应用的二进制日志事件中包含的时间戳值不同，则\
  \ `NDB$OLD` 方法会检测到冲突。\n\n一旦使用 `NDB$OLD` 方法检测到冲突，即使冲突行只是单个事务的一部分，目标行的更新也会被拒绝。换句话说，这破坏了事务的原子性。\n\
  \n**注意**\n\n作为冲突解决的结果，数据库的状态在事务理论方面可能不一致。\n\n图 6-11 说明了如何使用 `NDB$OLD` 方法检测冲突。\n\n\
  ![A435171_1_En_6_Fig11_HTML.jpg](img/A435171_1_En_6_Fig11_HTML.jpg)\n\n图 6-11.\n\
  \n使用 `NDB$OLD` 方法检测冲突\n\n请注意，每次更新目标表时，也必须更新时间戳列。这通常通过使用以下语句递增时间戳列来完成：\n\n```\nUPDATE\
  \ tbl_name SET ... ts = ts+1;\n```\n\n每次检测到冲突时，对相同数据的更新应该已经同时在两个集群上进行。换句话说，如果 `cluster2`\
  \ 上的从机 SQL 线程检测到冲突，那么 `cluster2` 上的目标行也必须被更新。这意味着由 `cluster2` 上的更新产生的二进制日志事件应该已经发送到\
  \ `cluster1`，这也会导致 `cluster1` 上的冲突。因此，当使用此方法时，必须在两个集群上检测到冲突并拒绝二进制日志事件的应用。\n\n请注意，图\
  \ 6-11 步骤 3 中的 `col` 列值在两个集群上具有不同的值。这无疑是一种不一致状态。解决这种不一致取决于你的应用程序；你的应用程序必须确定哪个值是正确的并会被保留。在图\
  \ 6-11 中，底部描绘了一个名为 `t1$EX` 的表。这个表被称为异常表，其中存储了有关冲突和解决方案的信息。你的应用程序在解决不一致时可以使用存储在此表中的信息。异常表的细节将在本章后面描述。\n\
  \n##### `NDB$MAX(column_name)`\n\n此方法像 `NDB$OLD` 方法一样检测时间戳值何时已更改，但它通过保留具有更高时间戳值的行值来解决冲突。因此，在使用此方法时，时间戳列的值非常重要。\n\
  \n尽管对于此方法，可以通过使用类似 `UPDATE tbl_name SET ... ts = ts+1` 的语句递增时间戳列来维护时间戳列的值，但这将导致两个集群上的时间戳值相同。在这种情况下，两个集群上都会检测到冲突，并且冲突不会自动解决。此时，`NDB$MAX`\
  \ 的行为与 `NDB$OLD` 方法相同。因此，当每次更新时递增时间戳列，使用 `NDB$MAX` 方法没有优势。\n\n为了克服这个问题，需要一个外部程序，例如序列生成器。以前，Twitter\
  \ 开发的 snowflake 很受欢迎。然而，snowflake 项目现已停止，并且不再维护。有一些受 snowflake 启发的后继开源项目。因此，使用其中之一作为\
  \ `NDB$MAX` 方法使用的时间戳列的编号生成器是一个不错的选择。\n\n另一个选择是使用轻量级、高吞吐量的 NoSQL 数据库软件进行序列生成，例如 Riak、Redis\
  \ 或 memcached。序列生成必须极其快速，因此使用 SQL 达到此目的不合适。因此，通过 NDB API 使用 MySQL NDB Cluster 是一个不错的选择。但是，应用程序必须仅访问集群的单个实例。从多主复制的两个集群中检索序列号是没有意义的，因为这样的序列号也可能冲突。图\
  \ 6-12 说明了使用外部序列生成器的多主复制。\n\n![A435171_1_En_6_Fig12_HTML.jpg](img/A435171_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12.\n\n使用外部序列生成器的多主 NDB 集群复制\n\n使用挂钟时间是另一个选择。从重复值的可能性来看，它并不是一个完美的序列生成器。以下表达式生成足够实用的时间戳值，尽管存在在微秒范围内生成非按时间顺序排列的值的可能性。\n\
  \n```\nFLOOR(unix_timestamp(now(6)) * 10000000000) + @@server_id;\n```\n\n此表达式假设\
  \ `server_id` 最大为 9999。使用任意唯一标识符代替 `server_id` 也是可以接受的。\n\n使用外部序列生成器时，生成器的位置是个问题。由于多主\
  \ NDB 集群复制通常用于灾难恢复，集群位于地理上相距遥远的位置。也就是说，它们之间必须存在一定级别的网络延迟。因此，如果序列生成器位于一个站点，从另一个站点访问将响应缓慢。使用网络上的外部序列生成器时，必须考虑网络延迟。序列生成器也可能离线。\n\
  \n图 6-13 说明了在两个集群上进行的导致冲突的更新的一般处理流程。\n\n![A435171_1_En_6_Fig13_HTML.jpg](img/A435171_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13.\n\n使用 `NDB$MAX` 方法检测和解决冲突\n\n在图 6-13 的 `cluster2` 上，来自 `cluster1` 的更新被拒绝，因为表中的时间戳（1002）大于\
  \ `cluster1` 更新中包含的时间戳（1001）。\n\n##### `NDB$MAX_DELETE_WIN(column_name)`\n\n此方法与\
  \ `NDB$MAX` 方法相同，除了删除处理。在 `NDB$MAX` 方法中，`DELETE` 语句的冲突检测和解析与 `NDB$OLD` 方法完全一样。这意味着仅当二进制日志事件中的时间戳值与表中的时间戳值相同时，才会删除行。否则，检测到冲突。这个设计决策是因为删除操作没有新的时间戳值。\n\
  \n另一方面，`NDB$MAX_DELETE_WIN` 方法对删除处理有另一种策略。删除操作总是比其他操作具有更高的优先级。如果从机 SQL 线程尝试删除行，即使发生冲突，也会执行该操作。\n\
  \n\n## NDB$EPOCH()\n\n此方法仅支持在**恰好两个集群**的**多主复制**中使用：一个集群定义为主集群，另一个定义为备用集群。此外，每个从属\
  \ SQL 节点必须配置为主 SQL 节点，如本章前面图 6-7 所描述的复制架构所示。此处再次展示该图，以避免翻回前几页的需要。使用此方法时，冲突检测和解析是**不对称**的。这意味着在主集群上所做的修改在冲突发生时总是会胜出。因此，您的应用可以认为在主集群上提交的事务永远不会因冲突解析而在后续被更改。\n\
  \n使用此方法不需要时间戳列。因此，您无需修改应用以在每次更新行时也更新时间戳列。顾名思义，此方法使用 `epoch`（纪元）来检测冲突。\n\n`NDB$EPOCH`\
  \ 使用的 `epoch` 是主 SQL 节点自身的 `epoch`，该值被发送到从属节点，并通过循环复制返回。如图 6-3 所示，主 SQL 节点会创建一个事件来更新\
  \ `mysql.ndb_apply_status` 表，尽管该表在主 SQL 节点上并未被实际修改。此事件用于跟踪从属 SQL 节点上已应用的 `epoch`，进而识别主\
  \ SQL 节点上的二进制日志文件名和位置。因此，在从属 SQL 节点上，`mysql.ndb_apply_status` 表照常由从属 SQL 线程更新。通常，对\
  \ `mysql.ndb_apply_status` 的更新不会被记录到二进制日志中，因为即使启用了二进制日志且 `log_slave_updates` 设置为\
  \ `ON`，该事件也会被 `binlog injector` 线程忽略。\n\n只有当 `ndb_log_apply_status` 在 `log_slave_updates`\
  \ 之外也被启用时，对 `mysql.ndb_apply_status` 表的更新以及对该表的虚拟生成更新才会被写入二进制日志。这样，主 SQL 节点将接收到一个由它自身生成的用于更新\
  \ `mysql.ndb_apply_status` 的二进制日志事件。图 6-14 描绘了当 `log_slave_updates` 和 `ndb_log_apply_status`\
  \ 均为 `ON` 时的事件生成和传输过程。在此配置下，主 SQL 节点可以检测到通过复制循环回来的最新 `epoch`。因此，`ndb_log_apply_status`\
  \ 和 `log_slave_updates` 这两个选项是 `NDB$EPOCH` 及其变体所必需的。\n\n![A435171_1_En_6_Fig14_HTML.jpg](img/A435171_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14. NDB$EPOCH 方法所需的二进制日志事件生成\n\n图 6-15 描绘了使用 `NDB$EPOCH` 方法的冲突检测和解析。\n\n![A435171_1_En_6_Fig15_HTML.jpg](img/A435171_1_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15. NDB$EPOCH 方法检测并解析冲突\n\n请注意，`epoch` 在数据节点内部处理。`epoch` 值存储在复制表 `mysql.ndb_binlog_index`\
  \ 和 `mysql.ndb_apply_status` 中，用于复制目的。在图 6-15 中，`cluster1` 内部的 `epoch` 值表示 `cluster1`\
  \ 数据节点内部的当前 `epoch` 值。例如，在初始状态下，`epoch` 值是 x。`cluster2` 内部的 `epoch` 值表示通过 `mysql.ndb_apply_status`\
  \ 表推导出的 `cluster1` 的 `epoch` 值。该 `epoch` 值也存储在每一行中，在图 6-14 中被描述为行 `epoch`。在初始状态下，`epoch`\
  \ 值用常量 x 和 y 表示，假设它们是旧值。同时假设单向复制大约需要 200 毫秒。\n\n在图 6-15 的步骤 1 中，同一行在两个集群上都被更新。`cluster1`\
  \ 上的一行具有 `epoch` E。我省略了 `cluster2` 上该行的 `epoch` 值，因为它与 `NDB$EPOCH` 方法的冲突检测和解析无关。我们假设复制需要\
  \ 200 毫秒，因此 `cluster2` 上 `mysql.ndb_apply_status` 中的当前 `epoch` 值可能是 E - 2，因为 `epoch`\
  \ 默认每 `TimeBetweenEpochs` 毫秒（默认为 100）生成一次。此时，一个 `epoch` 值为 E - 2 的对 `mysql.ndb_apply_status`\
  \ 的更新已被写入 `cluster2` 的二进制日志。\n\n在图 6-15 的步骤 2 中，二进制日志事件被相互发送。请关注二进制日志事件中包含的 `epoch`\
  \ 值，这些值实际上是 `mysql.ndb_apply_status` 表中的值。由于 `cluster1` 上某行包含的 `epoch` 值 E 大于从 `cluster2`\
  \ 返回的 `epoch` 值 E - 2，因此该复制更新在步骤 3（图 6-16）中被主 SQL 节点（`cluster1`）识别为冲突，并通过忽略该更新来解析冲突。然后，`cluster1`\
  \ 发送一个额外的二进制日志事件来修复从属节点上的冲突。因此，在步骤 4 应用此事件后，两个集群之间的不一致将在 `cluster2` 上得到修复。\n\n![A435171_1_En_6_Fig16_HTML.jpg](img/A435171_1_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16. NDB$EPOCH_TRANS 方法的一个多主 NDB 集群复制配置示例\n\n## NDB$EPOCH_TRANS()\n\n此方法在冲突检测使用\
  \ `epoch` 方面与 `NDB$EPOCH` 方法相似。另一方面，冲突解析的方式不同，因为它是**按事务**处理，而不是按行处理。`NDB$EPOCH_TRANS`\
  \ 方法比 `NDB$EPOCH` 方法更具优势，因为使用 `NDB$EPOCH_TRANS` 方法时，在备用集群上执行的事务是原子性的。在发生冲突时，使用 `NDB$EPOCH_TRANS`\
  \ 方法，整个事务可能会在主集群上被忽略，并随后在备用集群上回滚。而使用 `NDB$EPOCH` 方法，只有冲突的行会被忽略和回滚，因此备用集群上的事务将是非原子性的。此外，除了冲突事务本身，依赖于冲突事务的事务也会因解析而被回滚。\n\
  \n### NDB$EPOCH2() 与 NDB$EPOCH2_TRANS()\n\n这些方法是 `NDB$EPOCH` 和 `NDB$EPOCH_TRANS`\
  \ 的改进版本，在 MySQL NDB Cluster 7.4 系列中引入。尽管 `NDB$EPOCH2` 方法已经可用，但与之前的方法 `NDB$EPOCH`\
  \ 相比，在实际应用上并无差异，尽管其实现和配置过程有所不同。只有 `NDB$EPOCH2_TRANS` 与旧版本相比具有实际意义。\n\n`NDB$EPOCH_TRANS`\
  \ 和 `NDB$EPOCH2_TRANS` 之间的区别在于处理“删除-删除”冲突的方式。当两个集群上都删除了相同的行后，主集群和从集群有可能进入不一致的状态，这是因为被删除的行没有存储纪元信息，程序无法为被删除的行比较纪元。代码清单\
  \ 6-11 展示了导致这种不一致的场景。请注意，从库的 SQL 线程在锁定目标行的事务提交之前，无法应用修改。假设 `mysqlP>` 代表主集群的提示符，`mysqlS>`\
  \ 代表从集群的提示符，并且在此示例中会话未被关闭或重新打开。\n\n```\nmysqlP> INSERT INTO t VALUES (1, ... omit\
  \ ...);\nmysqlP> BEGIN;\nmysqlP> DELETE FROM t WHERE id=1;\nmysqlS> BEGIN;\nmysqlS>\
  \ DELETE FROM t WHERE id=1; -- delete-delete situation\nmysqlP> COMMIT;\nmysqlP>\
  \ INSERT INTO t SET id=1 ...;\nmysqlP> DELETE FROM t WHERE id=1; -- delete same\
  \ row by chance\nmysqlS> COMMIT; INSERT INTO t SET id=1 ...; -- the row is unlocked\n\
  mysqlP> SELECT COUNT(*) FROM t WHERE id=1;\n+----------+\n| COUNT(*) |\n+----------+\n\
  |        1 |\n+----------+\n1 row in set (0.00 sec)\nmysqlS> SELECT COUNT(*) FROM\
  \ t WHERE id=1;\n+----------+\n| COUNT(*) |\n+----------+\n|        0 |\n+----------+\n\
  1 row in set (0.00 sec)\nListing 6-11.\nAn Example Scenario Where the Secondary\
  \ Wins on the NDB$EPOCH_TRANS Method\n```\n\n根据“主集群总是胜出”的策略，`id=1` 的行应在两个集群上都被删除。然而，它在主集群上并未被删除！请注意，从集群上\
  \ `COMMIT` 之后的 `INSERT` 是在 `COMMIT` 后立即执行的，因为它们是在同一行中执行的，这应该比 `TimeBetweenEpochs`\
  \ 更快。`NDB$EPOCH2_TRANS` 方法可以避免这种类型的分歧，从集群上 `COMMIT` 之后的 `INSERT` 将被标记为冲突。代码清单 6-11\
  \ 中的例子并非 100% 可复现，因为涉及到时序问题。\n\n使用 `NDB$EPOCH2` 和 `NDB$EPOCH2_TRANS` 方法时，由从集群上的修改引起的二进制日志事件将在主集群上执行，然后被发送回从集群。这些返回的事件被称为反射操作，并将在从集群上重新执行。请注意，主集群内\
  \ SQL 节点上的二进制日志增长会非常快，因为反射操作也被写入了二进制日志。\n\n由于在“删除-删除”冲突后会立即发生分歧，除非使用 `NDB$EPOCH2_TRANS`，否则最好将所有删除操作路由到单个集群。这需要应用程序开发付出额外的努力。另一方面，使用\
  \ `NDB$EPOCH2_TRANS` 方法时不会发生分歧，但由于反射操作，从集群偶尔会胜出。\n\n#### 读操作的冲突检测\n\n从 MySQL NDB\
  \ Cluster 7.4 系列开始，可以对持有独占行锁的读操作进行冲突检测。独占行锁通过使用 `SELECT ... FOR UPDATE` 语句查询行来获取。\n\
  \n要为读操作启用冲突检测和解决，必须在 SQL 节点上将 `ndb_log_exclusive_reads` 选项设置为 `ON`。当此选项为 `ON` 时，带有独占行锁的读操作将像\
  \ `UPDATE` 语句一样被写入二进制日志，但不会实际修改行。这是通过将行值设置为与当前值相同的值来实现的，因此从库上的行值保持不变。写入二进制日志的 `UPDATE`\
  \ 事件将像往常一样触发冲突检测和解决，无论冲突是由真正的 `UPDATE` 还是带有独占行锁的读操作引起的。因此，用于读操作的冲突检测方法与写操作相同。\n\n\
  请注意，当 `ndb_log_exclusive_reads` 设置为 `ON` 时，二进制日志的大小会增加。处理冲突检测和解决将需要额外的 CPU 资源。语句必须是严格的\
  \ `SELECT ... FOR UPDATE`。`SELECT ... LOCK IN SHARE MODE` 不会触发冲突检测和解决。\n\n#### 设置冲突检测与解决\n\
  \n在本节中，我们将讨论如何设置冲突检测和解决。我们假设 NDB Cluster 复制已经配置并正在运行。冲突检测和解决必须按表进行配置。如果你想在 10 张表上检测/解决冲突，你必须配置\
  \ 10 次。以下是为新创建的表设置冲突检测和解决的典型步骤：\n\n1.  配置冲突检测所需的选项。\n2.  向 `mysql.ndb_replication`\
  \ 表添加一条记录。\n3.  创建一个异常表。\n4.  创建目标表。\n\n步骤 1 对所有表都是通用的。因此，每个集群只需执行一次。对每个目标表重复步骤\
  \ 2-4。\n\n注意\n只有使用基于时间戳的方法时，才能为现有表设置冲突检测和解决。然而，这不推荐，因为在向 `mysql.ndb_replication`\
  \ 表添加记录并创建异常表后，所有涉及复制的 SQL 节点都必须重启。\n\n接下来让我们看看每个步骤的细节。\n\n\n#### 配置冲突检测与解决所需的选项\n\
  \n对于 SQL 节点，除了通常的 NDB 集群复制所需选项外，冲突检测和解决还需要一些额外的必选选项。所需的选项取决于上一节描述的冲突检测和解决方法。表 6-4\
  \ 列出了冲突检测和解决所需的选项。请在继续下一步之前，正确设置您所选冲突检测方法要求的所有选项。某些选项无法在线更改，需要重启 SQL 节点。每个选项的详细说明如下。\n\
  \n表 6-4. 冲突检测与解决的选项列表\n\n| 选项名称 | 要设置的值 | 方法 |\n| --- | --- | --- |\n| `log_slave_updates`\
  \ | `ON` | 所有基于纪元的方法必需：`NDB$EPOCH`、`NDB$EPOCH_TRANS`、`NDB$EPOCH_TRANS`、`NDB$EPOCH2_TRANS`\
  \ |\n| `ndb_log_update_as_write` | `OFF` | 所有 |\n| `ndb_log_updated_only` | `OFF`\
  \ | 所有 |\n| `ndb_log_apply_status` | `ON` | `NDB$EPOCH`及其变体方法必需。 |\n| `log_bin_use_v1_row_events`\
  \ | `OFF` | `NDB$EPOCH_TRANS`和`NDB$EPOCH2_TRANS` |\n| `ndb_log_transaction_id` |\
  \ `ON` | `NDB$EPOCH_TRANS`和`NDB$EPOCH2_TRANS` |\n| `ndb_slave_conflict_role` | `PRIMARY`或`SECONDARY`\
  \ | `NDB$EPOCH2`和`NDB$EPOCH2_TRANS` |\n| `ndb_log_exclusive_reads` | `ON`或`OFF`\
  \ | 所有 |\n\n当`log_slave_updates`设置为`ON`时，从库 SQL 线程会为源自主库的修改写入二进制日志，这是级联复制拓扑所必需的。如本节前面所述，配置多主\
  \ NDB 集群复制有两种选择，即带或不带`log_slave_updates`，分别如图 6-8 和图 6-9 所示。前者是经过充分测试并推荐的做法。特别是对于`NDB$EPOCH`方法及其变体，必须将`log_slave_updates`设置为`ON`，并且恰好设置两个集群。这意味着在每个集群上，只有一个\
  \ SQL 节点同时充当主库和从库，如图 6-14 所示。\n\n`ndb_log_update_as_write`的默认值为`ON`，这会导致更新作为写操作记录到二进制日志中。这意味着旧行值不会写入二进制日志，从而节省了二进制日志所需的空间。由于写事件对于`NDBCluster`存储引擎而言类似于`REPLACE`命令，这能很好地节省空间。但是，这种行为不适合冲突检测和解决，因为它需要旧行值来检测和/或解决冲突。因此，使用冲突检测和解决时，此选项必须设置为`OFF`。\n\
  \n`ndb_log_updated_only`的默认值为`ON`，这会导致只有行值的修改部分和主键值存储在二进制日志中。这节省了二进制日志所需的额外空间。但是，这种行为不适合冲突检测和解决，因为它需要旧行映像。使用冲突检测和解决时，此选项必须设置为`OFF`。\n\
  \n如本节前面所讨论的，对于`NDB$EPOCH`方法及其变体，`ndb_log_apply_status`必须设置为`ON`。此选项的默认值为`OFF`。当设置为`ON`时，直接主库的`mysql.ndb_apply_status`表的更新会被写入到从库\
  \ SQL 节点的二进制日志中。当然，要使此选项生效，`log_slave_updates`也必须设置为`ON`。\n\n对于`NDB$EPOCH_TRANS`和`NDB$EPOCH2_TRANS`方法，必须配置两个选项——`log_bin_use_v1_row_events`和`ndb_log_transaction_id`。前者必须设置为`OFF`，后者必须设置为`ON`。这是必需的，因为必须跟踪事务\
  \ ID 才能按事务解决冲突。当这些选项分别设置为`OFF`和`ON`时，事务 ID 和可选标志将存储在每个二进制日志事件中。当未设置标志时，此额外信息所需大小为\
  \ 12 字节；当设置了标志时，则为 14 字节。\n\n使用`NDB$EPOCH2`或`NDB$EPOCH2_TRANS`方法时，必须在两个集群上显式设置`ndb_slave_conflict_role`。此选项的有效值为`PRIMARY`、`SECONDARY`、`NONE`和`PASS`。请根据所需配置将此选项设置为`PRIMARY`或`SECONDARY`。当使用这些方法时，如果此选项设置为`NONE`，从库将因错误而停止。当此选项设置为`PASS`时，即使表已配置为使用`NDB$EPOCH2`或`NDB$EPOCH2_TRANS`方法进行冲突解决，也不会执行冲突检测。\n\
  \n当您想要检测和解决在两个集群上执行的`SELECT ... FOR UPDATE`的冲突时，`ndb_log_exclusive_reads`必须设置为`ON`。当此选项为`ON`时，`SELECT\
  \ ... FOR UPDATE`会被当作`UPDATE`命令写入，这将把行值更新为与之前相同的值。然后，独占读将接受冲突检测和解决。\n\n\n\n#####\
  \ 向 `mysql.ndb_replication` 表添加条目\n\n`mysql.ndb_replication` 系统表在冲突检测和解决的配置中扮演重要角色。默认情况下，此表不存在，因此在使用冲突检测和解决时，必须首先创建它。要创建\
  \ `mysql.ndb_replication` 系统表，请执行清单 6-12 中的语句。\n\n```sql\nCREATE TABLE mysql.ndb_replication\
  \  (\ndb VARBINARY(63),\ntable_name VARBINARY(63),\nserver_id INT UNSIGNED,\nbinlog_type\
  \ INT UNSIGNED,\nconflict_fn VARBINARY(128),\nPRIMARY KEY USING HASH (db, table_name,\
  \ server_id)\n)   ENGINE=NDB\nPARTITION BY KEY(db, table_name);\n```\n\n清单 6-12.\
  \ 创建 `mysql.ndb_replication` 系统表\n\n请注意，`mysql.ndb_replication` 表的 `CREATE TABLE`\
  \ 语句会被复制到其他集群，因为配置了环形 NDB 集群复制。因此，仅需在一个 SQL 节点上执行此命令即可。\n\n配置是通过向此表插入行来完成的。\n\n\
  `db` 和 `table_name` 列指定了进行冲突检测和解决的目标表。\n\n`server_id` 列指定了执行冲突检测和解决的从属 SQL 节点的 `server_id`。如果指定为\
  \ 0，则所有 SQL 节点都将执行冲突检测和解决。如果希望冲突检测和解决仅在特定的 SQL 节点上执行，请为每个 `server_id` 插入一行。`NDB$EPOCH`\
  \ 和 `NDB$EPOCH_TRANS` 方法需要特定的 `server_id`。在这种情况下，您需要为每个 `server_id` 向 `mysql.ndb_replication`\
  \ 表添加一行。\n\n`binlog_type` 列指定了二进制日志图像格式。此列覆盖主 SQL 节点上的二进制日志生成选项，例如 `ndb_log_update_as_write`\
  \ 和 `ndb_log_updated_only` 选项。当设置为 0 或 `NULL` 时，将采用服务器选项。格式以数字指定，如表 6-5 所述。通常，您可以将其设置为\
  \ 0 或 `NULL` 以使用服务器默认值。如果您尚未将 `ndb_log_update_as_write` 和 `ndb_log_updated_only`\
  \ 从默认值 (`ON`) 更改为 `OFF`，请将此列设置为 7。\n\n**表 6-5. `binlog_type` 列值**\n\n| 值 | 标签 |\
  \ 描述 |\n| --- | --- | --- |\n| 0 | `NBT_DEFAULT` | 使用服务器默认值。 |\n| 1 | `NBT_NO_LOGGING`\
  \ | 不在二进制日志中记录此表。 |\n| 2 | `NBT_UPDATED_ONLY` | 仅记录已更新的列。 |\n| 3 | `NBT_FULL` |\
  \ 记录所有列，无论是否更新。 |\n| 4 | `NBT_USE_UPDATE` | 更新操作作为更新记录。（相当于 `ndb_log_update_as_write=0`。）此值通常不使用。请指定\
  \ 6 或 7。 |\n| 5 | `未使用` | |\n| 6 | `NBT_UPDATED_ONLY_USE_UPDATE` | 仅记录已更新的列。更新操作作为更新（而非写入）记录。\
  \ |\n| 7 | `NBT_FULL_USE_UPDATE` | 记录所有列，无论是否更新。更新操作作为更新（而非写入）记录。 |\n\n`conflict_fn`\
  \ 列指定了要使用的冲突检测和解决方法。该方法根据方法类型接受一个参数。\n\n基于时间戳的方法——`NDB$OLD`、`NDB$MAX` 和 `NDB$MAX_DELETE_WIN`——接受时间戳列名作为参数。如果时间戳列名为\
  \ `ts` 且要使用的方法是 `NDB$OLD`，则此列应设置为 `NDB$OLD(ts)`。使用基于时间戳的方法时不能省略参数。\n\n基于纪元的方法——`NDB$EPOCH`、`NDB$EPOCH_TRANS`、`NDB$EPOCH2`\
  \ 和 `NDB$EPOXH2_TRANS`——接受每行要存储的额外比特数。该参数可以省略。如果省略，则采用默认值 6，这对于默认配置已足够。所需的比特数取决于\
  \ `TimeBetweenEpochs` 和 `TimeBetweenGlobalCheckpoints` 的值。\n\n默认情况下，每行存储一个 32 位数字，表示全局检查点\
  \ ID，而纪元由一个 64 位数字组成。这是因为恢复和重启只需要纪元的高 32 位部分。一个纪元实际上由两个 32 位数字组成。高位在每次 GCP（全局检查点）时递增，低位在每次微\
  \ GCP 时递增并在每次 GCP 时重置。因此，低位不会增长超过以下值：\n\n```\nTimeBetweenGlobalCheckpoints / TimeBetweenEpochs\
  \ - 1\n```\n\n回顾一下，重做日志在每次 GCP 时写入磁盘，而不是微 GCP。因此，恢复不需要在每次微 GCP 时递增并在每次 GCP 时重置的低位。然而，基于纪元的冲突方法需要它。低位通常非常小。默认情况下，最大为\
  \ 19，需要 5 位。默认值 6 对于默认的 GCP 和微 GCP 设置是足够的。如果您更改了 `TimeBetweenEpochs` 和 `TimeBetweenGlobalCheckpoints`\
  \ 的默认值，则可能需要更改此值的默认设置。确保预留足够的位数。否则，冲突检测时可能出现误报和漏报。\n\n因此，对于基于纪元的方法，必须在通过向 `mysql.ndb_replication`\
  \ 表添加所需条目配置好冲突检测和解决之后，才能创建目标表。否则，表将无法存储纪元的低位部分，从而根本无法检测到冲突。\n\n\n#### 异常表与目标表创建\n\
  \n##### 创建异常表\n\n异常表是冲突检测使用的一种辅助表。当检测到冲突时，该表中会记录各种信息。无论采用何种冲突检测方法，都可以使用异常表。尽管该表是可选的，但我强烈建议在创建冲突检测时一并创建它，因为该表中存储的信息对您的应用绝对有用。异常表的定义根据目标表的不同而变化。表的定义如清单\
  \ 6-13 所示。\n\n```\nCREATE TABLE target_table$EX  (\nNDB$server_id INT UNSIGNED,\n\
  NDB$master_server_id INT UNSIGNED,\nNDB$master_epoch BIGINT UNSIGNED,\nNDB$count\
  \ INT UNSIGNED,\n[NDB$OP_TYPE ENUM('WRITE_ROW','UPDATE_ROW', 'DELETE_ROW',\n'REFRESH_ROW',\
  \ 'READ_ROW') NOT NULL,]\n[NDB$CFT_CAUSE ENUM('ROW_DOES_NOT_EXIST', 'ROW_ALREADY_EXISTS',\n\
  'DATA_IN_CONFLICT', 'TRANS_IN_CONFLICT') NOT NULL,]\n[NDB$ORIG_TRANSID BIGINT UNSIGNED\
  \ NOT NULL,]\ntarget_table_pk_columns,\ntarget_table_non_pk_columns,\nPRIMARY KEY\
  \ (NDB$server_id, NDB$master_server_id,\nNDB$master_epoch, NDB$count)\n) ENGINE\
  \ = NDBCluster;\n```\n清单 6-13. 异常表的定义\n\n异常表的名称与目标表相同，但加上 `$EX` 后缀，并且异常表应与目标表位于同一数据库中。\n\
  \n异常表的定义看起来有点复杂。带有 `NDB$` 前缀的列以及底部的主键具有固定的定义。前四列总是必需的，而后三列是可选的。这些列的含义如表 6-6 所述。\n\
  \n表 6-6. 异常表的列定义\n\n| 列名 | 描述 |\n| --- | --- |\n| `NDB$server_id` | 检测到冲突的 `server_id`。\
  \ |\n| `NDB$master_server_id` | 向检测到冲突的从库发送二进制日志的主库的 `server_id`。 |\n| `NDB$master_epoch`\
  \ | 导致冲突的二进制日志对应的纪元值。 |\n| `NDB$count` | 每个目标表的计数器。从库 SQL 节点重启时重置。 |\n| `NDB$OP_TYPE`\
  \ | 可选列。导致冲突的操作类型。 |\n| `NDB$CFT_CAUSE` | 可选列。冲突原因。 |\n| `NDB$ORIG_TRANSID` | 可选列。导致冲突的事务\
  \ ID。此列对于 `NDB$EPOCH_TRANS` 或 `NDB$EPOCH2_TRANS` 方法很有用，这些方法可能为每个冲突在异常表中写入多行。 |\n\
  \n可选的 `NDB$` 列自 MySQL NDB Cluster 7.4 系列开始可用。由于这些列具有信息性，我建议使用它们。\n\n`target_table_pk_columns`\
  \ 是由目标表主键组成的列列表。所有主键列必须与目标表具有相同的数据类型。如果数据类型是字符串类型，请确保这些列与目标表中的列具有相同的字符集和排序规则。由于主键中包含的任何列都必须是\
  \ `NOT NULL`，因此在异常表中它们也必须设置为 `NOT NULL`。列的顺序不重要。您可以按任意顺序列出主键中包含的列。但是，`target_table_pk_columns`\
  \ 必须放在目标表的任何非主键列之前，并放在 `NDB$count` 之后。实际上，您可以将可选的 `NDB$` 列和 `target_table_pk_columns`\
  \ 按任意顺序放置。然而，我建议将可选的 `NDB$` 列放在 `target_table_pk_columns` 之前，以避免混淆。\n\n自 MySQL NDB\
  \ Cluster 7.4 系列起，如果表具有多列主键，则不必将目标表的所有主键列都包含在异常表中。如果您愿意，可以只指定部分主键列。\n\n`target_table_non_pk_columns`\
  \ 是目标表非主键列的列表。冲突发生时，将存储该列的新值或旧值；对于插入和更新，存储新值；对于删除，存储旧值。\n\n从 MySQL NDB Cluster 7.4\
  \ 系列开始，可以让非主键列具有 `$OLD`、`$NEW` 后缀或两者兼有。顾名思义，带有 `$OLD` 后缀的非主键列在冲突时将具有新值，而带有 `$NEW`\
  \ 后缀的非主键列在冲突时将具有旧值。对于每个非主键列，可以有两个带有 `$OLD` 和 `$NEW` 后缀的列。在这种情况下，在更新冲突时，新值和旧值都将存储在这些列中。由于在更新冲突时比较新值和旧值非常有用，我建议同时拥有\
  \ `$OLD` 和 `$NEW` 列。在插入或删除冲突时，`$OLD` 或 `$NEW` 列之一将没有值。因此，异常表中的非主键列必须是可为空的。当然，不必将所有非主键列都包含在异常表中。仅包含感兴趣的列。\n\
  \n如果目标表 `t1` 有一个主键列 `id` 和非主键列 `col1`、`col2` 和 `col3`，那么对于 MySQL NDB Cluster 7.4\
  \ 或更新系列，异常表将如清单 6-14 所示。\n\n```\nCREATE TABLE t1$EX  (\nNDB$server_id INT UNSIGNED,\n\
  NDB$master_server_id INT UNSIGNED,\nNDB$master_epoch BIGINT UNSIGNED,\nNDB$count\
  \ INT UNSIGNED,\nNDB$OP_TYPE ENUM('WRITE_ROW','UPDATE_ROW', 'DELETE_ROW',\n'REFRESH_ROW',\
  \ 'READ_ROW') NOT NULL,\nNDB$CFT_CAUSE ENUM('ROW_DOES_NOT_EXIST', 'ROW_ALREADY_EXISTS',\n\
  'DATA_IN_CONFLICT', 'TRANS_IN_CONFLICT') NOT NULL,\nNDB$ORIG_TRANSID BIGINT UNSIGNED\
  \ NOT NULL,\nid INT not null,\ncol1$OLD INT,\ncol1$NEW INT,\ncol2$OLD VARCHAR(10)\
  \ CHARACTER SET utf8mb4,\ncol2$NEW VARCHAR(10) CHARACTER SET utf8mb4,\ncol3$OLD\
  \ DATETIME,\ncol3$NEW DATETIME,\nPRIMARY KEY (NDB$server_id, NDB$master_server_id,\n\
  NDB$master_epoch, NDB$count)\n) ENGINE = NDBCluster;\n```\n清单 6-14. 异常表示例\n\n异常表仅在检测到冲突的从库端填充。您可以查询它以查找修复不一致所需的信息。从异常表读取行后，可以使用\
  \ `DELETE` 语句删除这些行。当行存储在一个集群上时，删除行无需特别注意。对异常表的操作不会被复制。\n\n**注意**\n\n不要截断异常表。`TRUNCATE\
  \ TABLE` 在 MySQL 系列中不是 DML 查询。它被当作 DDL 处理，并在内部重新创建表。这将破坏目标表和异常表之间的依赖关系，并且在检测到冲突时复制将失败。如果意外截断了异常表，请重启从库\
  \ SQL 节点来解决问题。\n\n##### 创建冲突检测的目标表\n\n按预期创建目标表。表创建后，冲突检测和解析即被激活。\n\n监控 SQL 节点的错误日志。如果在此时出现问题，错误消息将被写入错误日志，因为\
  \ `mysql.ndb_replication` 表中的条目以及相关异常表的定义在目标表创建之前不会被检查。如果发现任何问题，请检查 `mysql.ndb_replication`\
  \ 表的配置和异常表的定义。然后，解决问题并重新开始。\n\n##### 监控冲突检测\n\n使用冲突检测时，监控是否发生冲突非常重要。有两种监控状态的方法，如下所述。\n\
  \n##### 监控状态变量\n\n当检测到冲突时，表 6-7 中的状态变量会被更新。所有列出的状态变量均可通过在所有版本上执行 `SHOW GLOBAL STATUS\
  \ LIKE 'Ndb_conflict%'`，或在 MySQL NDB Cluster 7.5 及更新版本上执行 `SELECT * FROM performance_schema.global_status\
  \ WHERE variable_name LIKE 'Ndb_conflict%'` 来获取。\n\n表 6-7. 与冲突检测和解决相关的状态变量\n\n|\
  \ 状态变量 | 描述 |\n| --- | --- |\n| `Ndb_conflict_fn_max` | 使用 `NDB$MAX` 方法检测到冲突的次数。\
  \ |\n| `Ndb_conflict_fn_old` | 使用 `NDB$OLD` 方法检测到冲突的次数。 |\n| `Ndb_conflict_fn_max_del_win`\
  \ | 使用 `NDB$MAX_DELETE_WIN` 方法检测到冲突的次数。 |\n| `Ndb_conflict_fn_epoch` | 使用 `NDB$EPOCH`\
  \ 方法检测到冲突的次数。 |\n| `Ndb_conflict_fn_epoch_trans` | 使用 `NDB$EPOCH_TRANS` 方法检测到冲突的次数。\
  \ |\n| `Ndb_conflict_fn_epoch2` | 使用 `NDB$EPOCH2` 方法检测到冲突的次数。 |\n| `Ndb_conflict_fn_epoch2_trans`\
  \ | 使用 `NDB$EPOCH2_TRANS` 方法检测到冲突的次数。 |\n| `Ndb_conflict_trans_row_conflict_count`\
  \ | 被事务单元方法 `NDB$EPOCH_TRANS` 和 `NDB$EPOCH2_TRANS` 识别为冲突的行数。 |\n| `Ndb_conflict_trans_row_reject_count`\
  \ | 因冲突而被事务单元方法回退的行数。此状态变量的值包含 `Ndb_conflict_trans_row_conflict_count` 的值。 |\n|\
  \ `Ndb_conflict_trans_reject_count` | 因冲突而被事务单元方法回退的事务数。 |\n| `Ndb_conflict_trans_detect_iter_count`\
  \ | 事务单元方法检测冲突依赖关系的迭代次数。 |\n| `Ndb_conflict_trans_conflict_commit_count` | 通过事务单元方法解决冲突后提交的事务数。\
  \ |\n| `Ndb_conflict_epoch_delete_delete_count` | 检测到删除-删除冲突的次数。 |\n| `Ndb_conflict_reflected_op_prepare_count`\
  \ | 当使用 `NDB$EPOCH2` 或 `NDB$EPOCH2_TRANS` 方法时，在辅助节点上修改的行数。 |\n| `Ndb_conflict_reflected_op_discard_count`\
  \ | 当使用 `NDB$EPOCH2` 或 `NDB$EPOCH2_TRANS` 方法时，在辅助节点上修改、通过二进制日志发送到主节点、在主节点上应用、然后发送回辅助节点但被丢弃的行数。\
  \ |\n| `Ndb_conflict_refresh_op_count` | 为通过覆盖主节点数据来解决不一致而在辅助节点上执行的操作数。此状态变量仅在使用基于纪元的方法时可能增加。\
  \ |\n| `Ndb_conflict_last_conflict_epoch` | 检测到冲突时的最后一个本地纪元。 |\n| `Ndb_conflict_last_stable_epoch`\
  \ | 进行修改但未检测到冲突时的最后一个本地纪元。 |\n\n要从应用程序检测冲突的发生，请根据所使用的方法监控相应的 `Ndb_conflict_fn*`\
  \ 状态变量。\n\n##### 监控异常表\n\n另一种监控冲突的方法是查询 `exceptions table`（异常表）。仅当发生冲突时才会插入一个或多个行。如果目标表的数量不是很多，监控\
  \ `exceptions table` 不会是一项高负载的昂贵操作。\n\n此策略比监控状态变量有一些优势。当冲突发生时，由于自动解决导致某些数据被静默回退，您通常需要在应用程序中采取进一步措施。例如，可能需要通知用户其进行的修改已被取消；用户必须重新执行该操作。通过此策略，您可以将额外的代码与监控代码一同编写。\n\
  \n##### 冲突检测案例研究\n\n本节展示了一个设置使用 `NDB$EPOCH_TRANS` 和 `NDB$EPOCH2` 方法进行冲突检测和解决的过程示例。用于冲突检测和解决的示例表名为\
  \ `test.t_conflict`，其定义如下。\n\n```sql\nCREATE TABLE t_conflict (\nid BIGINT UNSIGNED\
  \ NOT NULL PRIMARY KEY,\ncol1 VARCHAR(64),\ncol2 DATETIME,\nINDEX ix1 (col1, col2)\n\
  ) ENGINE=NDBCluster CHARACTER SET utf8;\n```\n\n"
- "# 使用 NDB$EPOCH_TRANS 方法设置冲突检测\n\n##### 前提条件\n\n本示例假设已经安装了两个集群，并且它们正在运行多主复制。每个集群中的一个\
  \ SQL 节点同时充当主节点和从节点。为复制分配的 SQL 节点 `server_id` 分别为 `cluster1` 的 1001 和 `cluster2`\
  \ 的 2001。图 6-16 展示了此假设配置。\n\n除了图 6-16 中描绘的 SQL 节点外，可能还存在其他 SQL 节点或 API 节点。为了简化，它们被省略了。在此设置下，`log_slave_updates`\
  \ 应该已经被设置。\n\n##### 配置集群\n\n首先要做的是在两个集群的 `my.cnf` 中添加额外的配置。清单 6-15 展示了 `cluster1`\
  \ 的示例配置。\n\n```\n[mysqld]\nndbcluster\nndb_connectstring = mgmhost\nlog_bin = mysql-bin\n\
  log_slave_updates\nserver_id = 1001\n... snip ...\n# Additional configurations for\
  \ NDB$EPOCH_TRANS method\nndb_log_update_as_write = OFF\nndb_log_updated_only =\
  \ OFF\nndb_log_apply_status = ON\nlog_bin_use_v1_row_events = OFF\nndb_log_transaction_id\
  \ = ON\n```\n\n清单 6-15. NDB$EPOCH_TRANS 方法的示例配置\n\n要使更改生效，必须重新启动 SQL 节点，因为某些选项不是动态的，无法在不重启服务器的情况下更改。重启两个\
  \ SQL 节点后，使用 `START SLAVE` 命令再次启动复制。回想一下，重启主 SQL 节点会导致其在离线期间错过接收事件。为防止此问题，你有两个选择——在应用程序离线时重启\
  \ SQL 节点，以确保重启期间没有更新；或者先在备用复制通道上配置 SQL 节点，然后将复制切换到备用通道。请注意，在前一种情况下，复制会因为 `LOST_EVENT`\
  \ 事件而停止。如果重启期间确实没有进行任何修改，你可以通过 `SET GLOBAL sql_slave_skip_counter = 1` 安全地忽略该错误。\n\
  \n##### 添加冲突检测条目\n\n下一步是向 `mysql.ndb_replication` 表添加条目，以配置冲突检测和解决。假设除了 `server_id`\
  \ 为 1001 和 2001 的 SQL 节点外，还配置了一个 `server_id` 为 1002 和 2002 的备用复制通道。在这种情况下，冲突检测和解决只需在主节点端（`server_id`\
  \ 为 1001 和 1002 的 SQL 节点）进行。这是因为 `NDB$EPOCH_TRANS` 方法是非对称的，主节点总是获胜。清单 6-16 展示了一个向\
  \ `mysql.ndb_replication` 表添加条目的示例。如果表尚未创建，请先创建它。\n\n```\nmysql> INSERT INTO mysql.ndb_replication\
  \ VALUES ('test', 't_conflict', 1001, NULL, 'NDB$EPOCH_TRANS()');\nQuery OK, 1 row\
  \ affected (0.00 sec)\nmysql> INSERT INTO mysql.ndb_replication VALUES ('test',\
  \ 't_conflict', 1002, NULL, 'NDB$EPOCH_TRANS()');\nQuery OK, 1 row affected (0.00\
  \ sec)\n```\n\n清单 6-16. 为 NDB$EPOCH_TRANS 方法向 `mysql.ndb_replication` 表添加所需条目\n\n\
  由于 `NDB$EPOCH` 和 `NDB$EPOCH_TRANS` 方法每个 `server_id` 需要一个条目，因此本例需要两个条目。请注意，清单 6-16\
  \ 中省略了 `NDB$EPOCH_TRANS()` 的参数。本例中使用了默认值 6。\n\n##### 创建异常表与目标表\n\n在创建目标表之前，先创建异常表。本例中表名必须是\
  \ `t_conflict$EX`。异常表的定义因选择而异——是否包含每个非主键列，以及是否使用可选列。清单 6-17 展示了 `t_conflict` 目标表的示例异常表。\n\
  \n```\nCREATE TABLE t_conflict$EX (\nNDB$server_id INT UNSIGNED,\nNDB$master_server_id\
  \ INT UNSIGNED,\nNDB$master_epoch BIGINT UNSIGNED,\nNDB$count INT UNSIGNED,\nNDB$OP_TYPE\
  \ ENUM('WRITE_ROW','UPDATE_ROW', 'DELETE_ROW',\n'REFRESH_ROW', 'READ_ROW') NOT NULL,\n\
  NDB$CFT_CAUSE ENUM('ROW_DOES_NOT_EXIST', 'ROW_ALREADY_EXISTS',\n'DATA_IN_CONFLICT',\
  \ 'TRANS_IN_CONFLICT') NOT NULL,\nNDB$ORIG_TRANSID BIGINT UNSIGNED NOT NULL,\nid\
  \ BIGINT UNSIGNED not null,\ncol1$OLD VARCHAR(64) CHARACTER SET utf8,\ncol1$NEW\
  \ VARCHAR(64) CHARACTER SET utf8,\nPRIMARY KEY (NDB$server_id, NDB$master_server_id,\n\
  NDB$master_epoch, NDB$count)\n) ENGINE = NDBCluster;\n```\n\n清单 6-17. 包含可选列和一个非主键列的异常表示例\n\
  \n最后，创建目标表，如清单 6-18 所示。\n\n```\nmysql> CREATE TABLE t_conflict (\nid BIGINT UNSIGNED\
  \ NOT NULL PRIMARY KEY,\ncol1 VARCHAR(64),\ncol2 DATETIME,\nINDEX ix1 (col1, col2)\n\
  ) ENGINE=NDBCluster CHARACTER SET utf8;\nQuery OK, 0 rows affected (0.47 sec)\n\
  ```\n\n清单 6-18. 为 NDB$EPOCH_TRANS 方法的冲突检测和解决创建目标表\n\n##### 查看日志并测试\n\n你将在 SQL 节点的错误日志中看到类似清单\
  \ 6-19 的消息。\n\n```\n2017-05-06T03:28:22.329499Z 10 [Note] NDB Binlog: CREATE TABLE\
  \ Event: REPLF$test/t_conflict$EX\n2017-05-06T03:28:22.778946Z 10 [Note] NDB Slave:\
  \ Table test.t_conflict logging exceptions to test.t_conflict$EX\n2017-05-06T03:28:22.778965Z\
  \ 10 [Note] NDB Slave: Table test.t_conflict using conflict_fn NDB$EPOCH_TRANS.\n\
  2017-05-06T03:28:22.779511Z 10 [Note] NDB Binlog: CREATE TABLE Event: REPLF$test/t_conflict\n\
  2017-05-06T03:28:22.793209Z 10 [Note] NDB Binlog: logging ./test/t_conflict (FULL,USE_UPDATE)\n\
  ```\n\n清单 6-19. 创建表时在错误日志中出现的示例消息\n\n现在你可以测试冲突检测和解决了。清单 6-20 展示了使用 `NDB$EPOCH_TRANS`\
  \ 方法进行冲突检测和解决的示例。假设 `mysqlP>` 代表主节点（`cluster1` 上 `server_id = 1001` 的 SQL 节点会话）的提示符，`mysqlS>`\
  \ 代表辅助节点（`cluster2` 上 `server_id` = 2001 的 SQL 节点会话）的提示符。\n\n```\n##### PRIMARY\
  \ #####\nmysqlP> INSERT INTO t_conflict VALUES (1, 'Sun', NOW());\nQuery OK, 1 row\
  \ affected (0.00 sec)\nmysqlP> BEGIN;\nQuery OK, 0 rows affected (0.00 sec)\nmysqlP>\
  \ UPDATE t_conflict SET col1 = 'Moon';\nQuery OK, 1 row affected (0.00 sec)\nRows\
  \ matched: 1  Changed: 1  Warnings: 0\n##### SECONDARY #####\nmysqlS> BEGIN;\nQuery\
  \ OK, 0 rows affected (0.00 sec)\nmysqlS> UPDATE t_conflict SET col1 = 'Jupiter';\n\
  Query OK, 1 row affected (0.00 sec)\nRows matched: 1  Changed: 1  Warnings: 0\n\
  ##### PRIMARY #####\nmysqlP> COMMIT;\nQuery OK, 0 rows affected (0.00 sec)\n#####\
  \ SECONDARY #####\nmysqlS> COMMIT;\nQuery OK, 0 rows affected (0.00 sec)\n#####\
  \ PRIMARY #####\nmysqlP> SELECT * FROM t_conflict;\n+----+------+---------------------+\n\
  | id | col1 | col2                |\n+----+------+---------------------+\n|  1 |\
  \ Moon | 2017-05-06 12:37:50 |\n+----+------+---------------------+\n1 row in set\
  \ (0.00 sec)\nmysqlP> SELECT * FROM t_conflict$EX\\G\n***************************\
  \ 1\\. row ***************************\nNDB$server_id: 1\nNDB$master_server_id:\
  \ 1001\nNDB$master_epoch: 1835213755777034\nNDB$count: 3\nNDB$OP_TYPE: UPDATE_ROW\n\
  NDB$CFT_CAUSE: TRANS_IN_CONFLICT\nNDB$ORIG_TRANSID: 1279907607296\nid: 1\ncol1$OLD:\
  \ Sun\ncol1$NEW: Jupiter\n1 row in set (0.00 sec)\n##### SECONDARY #####\nmysqlS>\
  \ SELECT * FROM t_conflict;\n+----+------+---------------------+\n| id | col1 |\
  \ col2                |\n+----+------+---------------------+\n|  1 | Moon | 2017-05-06\
  \ 12:37:50 |\n+----+------+---------------------+\n1 row in set (0.00 sec)\nmysqlS>\
  \ SELECT * FROM t_conflict$EX;\nEmpty set (0.01 sec)\n```\n\n清单 6-20. 使用 NDB$EPOCH_TRANS\
  \ 方法测试冲突检测和解决\n\n请注意从此测试示例中得出的以下事实：\n\n\n## 使用 NDB$EPOCH2 方法设置冲突检测\n\n为 MySQL NDB\
  \ Cluster 7.4 系列新增的 `NDB$EPOCH2` 方法设置过程与 `NDB$EPOCH_TRANS` 方法类似。其配置方式与 `NDB$EPOCH`\
  \ 和 `NDB$EPOCH_TRANS` 略有不同。\n\n第一个区别在于服务器配置。代码清单 6-21 展示了在 `cluster1` 上充当主从角色的 SQL\
  \ 节点的配置示例。\n\n```\n[mysqld]\nndbcluster\nndb_connectstring = mgmhost\nlog_bin =\
  \ mysql-bin\nlog_slave_updates\nserver_id = 1001\n... snip ...\n# Additional configurations\
  \ for NDB$EPOCH_TRANS method\nndb_log_update_as_write = OFF\nndb_log_updated_only\
  \ = OFF\nndb_log_apply_status = ON\nndb_slave_conflict_role = PRIMARY\n代码清单 6-21.\n\
  NDB$EPOCH2 方法的 SQL 节点配置示例\n```\n\n请注意，此 SQL 节点的角色是使用 `ndb_slave_conflict_role` 选项定义的，而不是通过\
  \ `mysql.ndb_replication` 表中的条目。另一方面，别忘了为辅助集群上的 SQL 节点指定 `ndb_slave_conflict_role\
  \ = SECONDARY`。必须在两个集群上显式设置角色。\n\n此配置不包括在 `NDB$EPOCH_TRANS` 方法配置示例中出现的 `log_bin_use_v1_row_events\
  \ = OFF` 和 `ndb_log_transaction_id = ON`，因为该方法是 `NDB$EPOCH2`，它不是一个事务单元方法。\n\n下一步是向\
  \ `mysql.ndb_replication` 表添加一个条目，如代码清单 6-22 所示。\n\n```\nmysql> INSERT INTO mysql.ndb_replication\
  \ VALUES ('test', 't_conflict', 0, NULL, 'NDB$EPOCH2(7)');\nQuery OK, 1 row affected\
  \ (0.00 sec)\n代码清单 6-22.\n为 NDB$EPOCH2 方法添加必需条目到 mysql.ndb_replication 表\n```\n\n\
  请注意，`server_id` 列设置为 0。这表示冲突检测和解决将在所有配置为复制从节点的 SQL 节点上执行。`NDB$EPOCH2` 方法的不对称性由 `ndb_slave_confict_role`\
  \ 选项保证，而不是 `mysql.ndb_replication` 表中的 `server_id` 列。\n\n像 `NDB$EPOCH_TRANS` 示例一样创建异常表和目标表。然后，针对目标\
  \ `test.t_conflict` 表激活冲突检测和解决。\n\n##### 冲突检测所需的应用程序修改\n\n虽然循环 NDB 集群复制的冲突检测和解决功能在您需要从两个集群更新相同数据时非常方便，但它并非没有代价。您需要修改应用程序以适应冲突检测和解决。在本节中，我们将讨论如何调整您的应用程序以适应冲突检测和解决。\n\
  \n##### 选择正确的冲突检测方法\n\n使您的应用程序适应冲突检测和解决的第一步是选择合适的方法。正如本章所讨论的，方法有两类——基于时间戳的方法和基于纪元的方法。表\
  \ 6-8 列出了基于时间戳和基于纪元的方法之间的主要区别。\n\n表 6-8.\n基于时间戳与基于纪元方法的主要区别\n\n| 特性 | 基于时间戳的方法 |\
  \ 基于纪元的方法 |\n| --- | --- | --- |\n| 支持的集群数量 | 循环 NDB 集群复制中的任意数量集群。 | 两个 |\n| 集群对称性\
  \ | 对称；冲突可能在两个集群上被检测到。 | 不对称；集群将具有主或辅助角色。主节点始终获胜。 |\n| 表结构变更 | 需要；需要添加时间戳列。 | 不需要，但表内部存储额外的位。\
  \ |\n| 冲突解决单位 | 行；仅解决冲突的行。可能破坏事务一致性。 | 行或事务；事务单元方法可以确保事务一致性。 |\n| 冲突解决是否自动？ | 对于\
  \ `NDB$MAX` 和 `NDB$MAX_DELETE_WIN` 是。对于 `NDB$OLD` 否。 | 是。 |\n\n当您决定使用基于纪元的方法之一时，我推荐较新的版本\
  \ `NDB$EPOCH2` 和 `NDB$EPOCH2_TRANS`（优于 `NDB$EPOCH` 和 `NDB$EPOCH_TRANS`），因为新方法易于配置并具有删除-删除冲突处理功能。\n\
  \n##### 更新时间戳列\n\n使用基于时间戳的冲突检测和解决时，填充时间戳列是应用程序的责任。应用程序必须在更新表时随时更新时间戳列。否则，冲突无法被检测到。这需要额外的开发工作量。\n\
  \n更重要的是，`NDB$MAX` 和 `NDB$MAX_DELETE_WIN` 方法需要外部序列生成器。这需要额外的开发和运维成本。\n\n触发器对于填充或更新时间戳值很有用。对于\
  \ `NDB$OLD` 方法，实现一个在 `UPDATE` 时递增时间戳列的触发器就足够了。`INSERT` 触发器不是必需的，因为在执行 `CREATE TABLE`\
  \ 时可以指定列的默认值。对于 `NDB$MAX` 和 `NDB$MAX_DELETE_WIN` 方法，开发一个用户定义函数来从外部序列生成器检索新的时间戳值是个好主意，因为它可以从\
  \ `UPDATE` 触发器中调用。\n\n##### 监控冲突检测\n\n除非您的应用程序可以忽略所有已解决的冲突，否则您需要监控冲突的状态，如本节前面所述。由于检测到冲突时没有推送式通知，您的应用程序必须定期监控冲突。\n\
  \n##### 修复冲突\n\n在某些情况下，自动冲突解决对您的应用程序来说还不够，您的应用程序需要采取进一步的措施，例如：\n\n*   通知用户他们的更新可能被取消。\n\
  *   查询另一个集群以确保修改未被识别为冲突。\n*   验证数据库是否一致且没有违反约束。必要时调整数据。\n\n存储在异常表中的信息在对冲突采取进一步措施时很有用。处理完冲突后，您可以删除异常表中的行。如果您愿意，也可以保留异常表中的行以供后续审查。\n\
  \n#### 冲突检测的注意事项与限制\n\n尽管冲突检测是一项方便的功能，但它存在一些缺点和限制。因此，即使冲突检测和解决可用，使用多主 NDB 集群复制时也需要格外小心和付出额外努力。\n\
  \n#### 了解更多\n\n*   两个集群上的表即使更新为不同的值也具有相同的行值。这意味着冲突已解决，并且当行同时从两个集群更新时，主集群的修改获胜。\n\
  *   只有 `cluster1` 上的异常表有一个条目表明发生了冲突。这意味着冲突检测和解决仅在主集群上完成，如 `mysql.ndb_replication`\
  \ 表中所定义。\n\n如果您想进一步测试，请将以下过程作为一课来尝试。\n\n*   使用带有 `-vv` 选项的 `mysqlbinlog` 命令检查二进制日志。查看两个集群上写入了哪些事件。请注意，每指定一次该选项，详细级别就会增加。如果详细级别为\
  \ 1 或更大，则打印行值。如果详细级别为 2 或更大，则打印额外信息。\n*   从异常表中删除行。\n*   截断异常表并插入新行。看看会发生什么。\n*\
  \   测试删除-删除冲突处理。\n\n\n\n##### 二进制日志大小\n\n当采用冲突检测与解决机制时，二进制日志将需要更多空间。因此，需要准备比无冲突检测的\
  \ NDB 集群复制所需的更多磁盘空间和网络带宽。\n\n将 `ndb_log_update_as_write` 设置为 `OFF` 会使更新操作的二进制日志大小约增加一倍，这一点非常重要。\n\
  \n由于基于时间戳的方法需要在目标表中包含时间戳列，这既增加了表的大小，也增加了二进制日志的大小。\n\n基于纪元的方法需要将 `ndb_log_apply_status`\
  \ 选项设置为 `ON`，这将在从库的二进制日志中为每个事件占用额外的空间。当使用事务单元方法时，请确保 `log_bin_use_v1_row_events`\
  \ 设置为 `OFF`，并且 `ndb_log_transaction_id` 设置为 `ON`，这会为每个事件要求额外的字节。\n\n##### 性能开销\n\
  \n每次在从库 SQL 节点上应用二进制日志时，从库 SQL 线程和数据节点都会检查是否发生冲突。与无冲突检测的 NDB 集群复制相比，这需要额外的 CPU 资源。您可能不得不升级作为从库的\
  \ SQL 节点的 CPU。\n\n##### 延迟至关重要\n\n当使用冲突检测与解决时，复制延迟变得比无冲突检测的 NDB 集群复制更为关键。延迟时间越长，发生冲突的可能性就越高。因此，在使用冲突检测与解决时，尽快应用复制非常重要。\n\
  \n##### 事务处理\n\n事务必须是原子的；所有修改要么全部应用，要么完全不做。然而，对于行级冲突解决方法，只有导致冲突的行会在事务提交后被修改。这破坏了事务的原子性（即\
  \ ACID 中的 \"A\"），数据库将进入不一致状态。\n\n对于基于纪元的方法，事务在提交到辅助集群后将被取消。这意味着在辅助集群上无法确保持久性（即 ACID\
  \ 中的 \"D\"）。\n\n因此，在启用冲突检测与解决的 NDB 集群复制中，不可能充分发挥事务的能力。这将使应用开发比在通常的、完全事务化的 MySQL\
  \ NDB 集群上开发困难得多。因此，即使可以检测和解决冲突，我也通常不推荐使用多主 NDB 集群复制。只有当您准备好应对因违反事务模型而带来的额外工作时，才使用它。\n\
  \n### 复制到 InnoDB\n\n标准 MySQL 复制支持从一种存储引擎复制到另一种，但有一些限制。也可以配置从 MySQL NDB 集群复制到 `InnoDB`。尽管\
  \ MySQL NDB 集群是一个高度可扩展的系统，但需要这种类型的复制来提高可扩展性。存在一些无法通过独立的 MySQL NDB 集群设置解决的问题，例如：\n\
  \n*   对同一数据集的访问无法扩展，因为 MySQL NDB 集群采用无共享架构，数据按行进行水平分布。\n*   有序索引扫描扩展性不佳，除非使用用户定义的分区，因为扫描必须涉及所有数据节点才能完成。\n\
  *   在 `InnoDB` 上进行分析查询通常比在 MySQL NDB 集群上更快。\n\n复制到 `InnoDB` 是克服这些性能问题的一种便捷方法。\n\n\
  #### 要求与限制\n\n由于 `InnoDB` 和 `NDBCluster` 是不同的存储引擎，从 `NDBCluster` 主库复制到 `InnoDB`\
  \ 从库有一些要求。请注意，虽然它们是不同的存储引擎，但在复制时并非所有功能都受支持。\n\n##### 使用 MySQL NDB Cluster 捆绑的 mysqld\n\
  \n强烈建议您对主库和从库使用相同的二进制文件。`InnoDB` 存储引擎也包含在 MySQL NDB 集群捆绑的 `mysqld` 中。因此，您不仅可以将其用作\
  \ SQL 节点，还可以将其用作从库 MySQL 服务器。与标准 MySQL 服务器软件包中包含的 `mysqld` 程序相比，MySQL NDB 集群捆绑的\
  \ `mysqld` 程序具有一些附加功能。由于从库必须重现与主库相同的修改，功能上的差异可能会产生问题。\n\n##### 二进制日志格式要求\n\n在 NDB\
  \ 集群复制中，主库 SQL 节点以特殊格式存储二进制日志，这种格式只能由 MySQL NDB 集群从库处理。必须让主库 MySQL NDB 集群的二进制日志匹配\
  \ `InnoDB`。在 MySQL NDB 集群上，当 `ndb_log_update_as_write` 设置为 `ON`（这是 MySQL NDB 集群的默认设置）时，更新会作为写操作记录到二进制日志中。在从库端，MySQL\
  \ NDB 集群可以处理这样的二进制日志，不会报告错误。然而，`InnoDB` 不能。要从 MySQL NDB 集群复制到 `InnoDB`，必须在主库 SQL\
  \ 节点上设置 `ndb_log_update_as_write = OFF`。\n\n在主库 SQL 节点上，由于架构原因，偶尔会将重复条目记录到二进制日志中，这会导致在插入时出现\
  \ `ER_DUP_ENTRY` 错误，或在删除时出现 `ER_KEY_NOT_FOUND` 错误。为防止从库 SQL 节点出现问题，必须设置 `slave_exec_mode\
  \ = IDEMPOTENT`。此选项的默认值是 `STRICT`，这些错误将被当作实际错误处理。当此选项设置为 `IDEMPOTENT` 时，从库 SQL 线程模拟\
  \ NDB 集群复制从库的行为。它忽略这些错误，并且写行事件（基于行格式的 \"插入\"）被视为 `REPLACE` 命令处理。\n\n##### MySQL\
  \ NDB 集群系统表\n\n在 `mysql` 数据库中有几个系统表。如本章所述，主库 SQL 节点生成事件来更新 `mysql.ndb_apply_status`\
  \ 表。当启用索引统计功能时，`ANALYZE TABLE` 命令会更新两个系统表 `mysql.ndb_index_stat_head` 和 `mysql.ndb_index_stat_sample`。这些表在\
  \ SQL 节点连接到集群时创建。因此，它们不会在 `InnoDB` 从库上自动创建。您必须手动创建它们，或者设置复制过滤器来过滤它们。但是，我建议不要过滤 `mysql.ndb_apply_status`\
  \ 表。当您切换到备用复制通道时，需要此表。\n\n##### 环形复制与冲突检测\n\n配置涉及 MySQL NDB 集群和 `InnoDB` 的环形复制在技术上可能是可行的。但是，这种配置不受支持。我不建议使用跨存储引擎的环形复制。\n\
  \n此外，`InnoDB` 不支持冲突检测。这是 MySQL NDB 集群独有的功能。因此，无法检测或避免由环形拓扑引起的潜在冲突。\n\n\n##### 外键\n\
  \n外键是确保多个表之间引用约束的有用特性。然而，外键的实现方式取决于存储引擎，且在 `InnoDB` 和 `NDBCluster` 之间有所不同。例如，检查外键约束的时机不同：`NDBCluster`\
  \ 存储引擎在提交时检查，而 `InnoDB` 在每条语句后检查。这可能导致复制失败。\n\n要防止此问题，请从从库的 `InnoDB` 表中移除外键。当从库移除外键后，从库上就不会执行任何约束检查。不过，约束检查应该已在主库上执行过了。传播到从库的修改必须没有违反约束。\n\
  \n唯一剩下的问题是外键导致的级联更新和删除。级联更新和删除是在存储引擎内部完成的。因此，由级联操作引起的修改不会写入二进制日志。这假设了在从库上必须执行与主库相同的级联操作。当主库表上有外键而从库表上没有时，这就会产生问题。如果你是从\
  \ MySQL NDB Cluster 复制到 `InnoDB`，请不要使用外键的级联更新和删除。\n\n##### 唯一键\n\nNDB Cluster 复制通过延迟约束检查直到事务提交来避免潜在的唯一键约束冲突。在很旧的版本中，唯一键约束曾破坏过复制，但在最近的版本中已不是问题。然而，当复制到\
  \ `InnoDB` 时，这仍然是个问题，因为 `InnoDB` 在每条语句后都会检查唯一键约束。因此，请在从库端移除唯一键约束，因为可以假设所有来自主库的修改在每次事务提交时都不会违反唯一键约束。\n\
  \n##### 行大小限制\n\n虽然 MySQL NDB Cluster 的行容量最高可达 14KB，但 `InnoDB` 默认是 8KB。当表的行大小超过\
  \ 8KB 时，这可能会导致问题。在这种情况下，请使用 32KB 或 64KB 的 `innodb_page_size`。\n\n#### 设置到 InnoDB\
  \ 的复制\n\n在本节中，我们将讨论如何设置从 MySQL NDB Cluster 到 `InnoDB` 的复制。\n\n##### 配置主 SQL 节点并创建复制用户\n\
  \n你需要启用二进制日志并显式设置 `server_id`。别忘了设置 `ndb_log_update_as_write = OFF`，这是从 `NDBCluster`\
  \ 主库复制到其他存储引擎从库所必需的。清单 6-23 展示了主 SQL 节点的配置示例。\n\n```\n[mysqld]\nndbcluster\n...\
  \ snip ...\nserver_id = 1001\nlog_bin = mysql-bin\nbinlog_format = ROW\nndb_log_update_as_write\
  \ = OFF\n```\n清单 6-23. 复制到 InnoDB 时主 SQL 节点的示例配置\n\n如果不存在合适的用户，请创建一个从库用户。有关示例，请参考清单\
  \ 6-2。\n\n##### 为复制配置从库\n\n在从库端，必须显式设置 `server_id`，并且必须更改 `slave_exec_mode` 的默认值。清单\
  \ 6-24 展示了一个 `InnoDB` 从库的配置示例。\n\n```\n[mysqld]\nserver_id = 2001\nslave_exec_mode\
  \ = IDEMPOTENT\nreplicate_wild_ignore_table = mysql.ndb_index%\n```\n清单 6-24. 从\
  \ MySQL NDB Cluster 主库复制时，从库 MySQL 服务器的示例配置\n\n如果需要，你可以设置额外的复制过滤器。然后，启动从库 MySQL\
  \ 服务器，或者如果它已在运行，则重启它。\n\n##### 从主库获取备份\n\n在主集群上执行 `START BACKUP` 命令以进行原生在线备份。有关原生备份的更多信息，请参阅第\
  \ 8 章。除非确保在备份期间没有进行任何修改，否则原生备份是从在线 MySQL NDB Cluster 获取备份的唯一方式。清单 6-25 展示了一个原生备份的输出示例。\n\
  \n```\nndb_mgm> START BACKUP\nConnected to Management Server at: mgmhost\nWaiting\
  \ for completed, this may take several minutes\nNode 1: Backup 1 started from node\
  \ 255\nndb_mgm> Node 1: Backup 1 started from node 255 completed\nStartGCP: 527473\
  \ StopGCP: 527476\n#Records: 18444 #LogRecords: 112\nData: 575936 bytes Log: 4536\
  \ bytes\n```\n清单 6-25. 原生备份的示例输出\n\n请注意，备份完成时控制台打印的 `StopGCP` 值。这个值在后续步骤中是必需的。在此示例中，`StopGCP`\
  \ 是 `527476`。\n\n我建议使用 `mysqldump` 命令为模式再做一次备份，因为基于 SQL 的 DDL 在 `InnoDB` 从库上更容易恢复。使用\
  \ `mysqldump` 命令时指定 `--no-data` 选项以跳过数据备份。清单 6-26 展示了一个从主 SQL 节点获取模式备份的示例。\n\n```\n\
  shell$ mysqldump -h masterhost -uroot -p db_name --no-data > dump.sql\n```\n清单 6-26.\
  \ 从主 SQL 节点获取模式备份\n\n##### 将模式恢复到从库\n\n使用 `mysqldump` 命令生成的转储文件恢复模式。在恢复到从库 SQL 节点之前，请更改转储文件中的存储引擎。在类\
  \ UNIX 系统上，这可以使用 `sed` 命令完成，如下所示：\n\n```\nshell$ sed -i 's/ENGINE=ndbcluster/ENGINE=InnoDB/g'\
  \ dump.sql\n```\n\n然后，像往常一样将转储文件恢复到 MySQL 服务器；例如，使用 `mysql` CLI 中的 `SOURCE` 命令：\n\
  \n```\nmysql> SOURCE dump.sql\n```\n\n检查所有表是否已在从库上创建。\n\n\n##### 将数据恢复到从库\n\n这是此过程中最棘手的步骤。一个原生\
  \ NDB 备份由两部分组成：数据和日志。两者都必须被恢复，才能在某个特定时间点恢复一致的快照。有两种方法可以将备份恢复到 `InnoDB` 从库。\n\n一种方法是使用一个中间临时集群。先将原生备份恢复到临时集群，确保没有进行任何修改，然后使用\
  \ `mysqldump` 命令从临时集群中获取一个备份。使用 `mysqldump` 生成的转储文件可以像处理标准 MySQL 服务器一样进行恢复。\n\n\
  另一种方法是将数据部分转换为制表符分隔的文件，然后使用 `LOAD DATA INFILE` 命令恢复。转换可以使用 `ndb_restore` 命令完成。所需的选项是\
  \ `--print-data`、`--tab` 和 `--append`。`--print-data` 选项指示 `ndb_restore` 命令打印数据，而不是将其恢复到正在运行的集群。`--tab`\
  \ 选项指定创建制表符分隔文件的目标目录；在此目录下，每个表都会创建一个制表符分隔文件。`--append` 选项表示当制表符分隔文件已存在时，不会覆盖它们，而是追加新数据。\n\
  \n清单 6-27 展示了一个将备份转换为制表符分隔文件的示例。\n\n```\nshell$ ndb_restore -n 1 -b 1 --print-data\
  \ --tab=/backup/tab-files --append \\\n/path/to/backup\n清单 6-27.\n使用 ndb_restore\
  \ 命令将原生备份转换为制表符分隔文件\n```\n\n由于原生备份是针对每个数据节点创建的，因此需要对所有数据节点重复相同的命令。`ndb_restore`\
  \ 命令中的 `-n` 选项指定生成备份的节点 ID，`-b` 选项指定分配给每个备份的备份 ID。有关 `ndb_restore` 命令的更多信息，请参阅第\
  \ 8 章。然后，使用 `LOAD DATA INFILE` 命令将制表符分隔的文件恢复到 `InnoDB` 从库中。确保在恢复日志部分之前，数据部分已完全恢复。\n\
  \n下一步是恢复原生备份中包含的日志文件。从 MySQL NDB Cluster 7.5.4 开始，`ndb_restore` 命令可以生成可直接在 MySQL\
  \ 服务器上执行的 SQL 语句。要生成可执行的 SQL 日志，请指定 `--print-sql-log` 选项。即使指定了此选项，也会打印不必要的标题和页脚行。要抑制这些行，请按清单\
  \ 6-28 所示执行 `ndb_restore` 命令。\n\n```\nshell$ ndb_restore -n 1 -b 1 --print-sql-log\
  \ /path/to/backup \\\n| egrep '^INSERT|^DELETE|^UPDATE' >> dump-log.sql\n清单 6-28.\n\
  将原生备份日志转换为 SQL 格式\n```\n\n对所有数据节点重复相同的命令。然后，在从服务器上执行生成的 SQL 文件。由于 `ndb_restore`\
  \ 命令可用于针对较旧版本创建的备份，因此你可以使用 7.5.4 或更新版本捆绑的 `ndb_restore` 命令将备份日志转换为 SQL 格式。\n\n#####\
  \ 创建系统表\n\n创建 `mysql.ndb_apply_status` 表，其结构与主库相同，但存储引擎除外。使用 `InnoDB` 存储引擎而不是 `NDBCluster`\
  \ 来创建它。\n\n##### 设置复制\n\n最后，使用 `CHANGE MASTER TO` 命令设置复制。第一步是从主库 SQL 节点的 `mysql.ndb_binlog_index`\
  \ 表中检索二进制日志文件名和位置。所需的信息是备份时检索到的 `StopGCP` 值。清单 6-29 展示了一个检索二进制日志文件名和位置的示例查询。\n\n\
  ```\nmysql> SET @stopgcp = 527476;\nmysql> SELECT\n-> SUBSTRING_INDEX(File, '/',\
  \ -1) AS binlog_file,\n-> Position AS binlog_position\n-> FROM mysql.ndb_binlog_index\n\
  -> WHERE gci > @stopgcp\n-> ORDER BY epoch ASC LIMIT 1;\n清单 6-29.\n使用 StopGCP 从\
  \ mysql.ndb_binlog_index 表中检索二进制日志文件名和位置\n```\n\n在 `CHANGE MASTER TO` 命令中指定此查询检索到的文件名和位置。然后，执行\
  \ `START SLAVE` 命令启动复制，并使用 `SHOW SLAVE STATUS` 命令检查复制状态。\n\n#### 使用 InnoDB 作为从库时的技巧\n\
  \n使用 `InnoDB` 作为 MySQL NDB Cluster 的从库时，有几个技巧。\n\n##### 从备用通道恢复复制\n\n即使主库 SQL 节点在从库是\
  \ `InnoDB` 的情况下也可能因各种原因（例如主库 SQL 节点离线）导致二进制日志中缺失数据。因此，主库 SQL 节点需要冗余。在发生不可恢复的复制故障（如\
  \ `LOST_EVENTS` 事件）时，就像在 NDB Cluster 到 NDB Cluster 复制中一样，使用存储在 `mysql.ndb_apply_status`\
  \ 表中的纪元信息切换到备用的主库 SQL 节点。\n\n##### 通过跳过日志同步来加速更新\n\n通常，MySQL NDB Cluster 的写入速度比\
  \ `InnoDB` 快。这将导致 `InnoDB` 从库上出现不必要的复制延迟。为了防止 `InnoDB` 从库上的延迟，我建议在从库上将 `innodb_flush_log_at_trx_commt`\
  \ 设置为 0 或 2。这将跳过在事务提交时将 `InnoDB` 日志同步到磁盘。此设置通常不推荐使用，因为未同步到磁盘的最后提交的事务可能在机器故障时丢失。\n\
  \n由于 `mysql.ndb_apply_status` 表是在与其他表相同的事务中更新的，因此你可以在发生崩溃时使用表中的纪元安全地重启复制。即使由于某种原因无法重启复制，你也可以使用主库数据再次设置\
  \ `InnoDB` 从库。甚至，如果你有多个从服务器，也可以使用带有 `--dump-slave` 选项的 `mysqldump` 命令以及其他标准方法（如\
  \ MySQL Enterprise Backup）来克隆从库。\n\n\n### MySQL 服务器集群复制相关选项\n\n供参考，与 NDB 集群复制相关的\
  \ MySQL 服务器选项列于表 6-9 中。\n\n表 6-9. `mysqld` 中与 NDB 集群复制相关的选项列表\n\n| 选项名 | 默认值 | 描述\
  \ |\n| --- | --- | --- |\n| `log_bin` | 无 | 指定后启用二进制日志。此选项的参数用作二进制日志文件的基础名称。 |\n\
  | `sync_binlog` | 0 (<= 7.4) 1 (>= 7.5) | 在处理此选项指定的事件数后将二进制日志同步到磁盘。在 MySQL NDB 集群上，请将此选项设置为更大的值，例如\
  \ 1000。 |\n| `log_slave_updates` | `OFF` | 在从服务器上启用时，所有从主服务器传播的修改都会记录在从服务器的二进制日志中。\
  \ |\n| `ndb_log_bin` | `ON` | 启动二进制日志注入器线程。 |\n| `server_id` | 无 | 分配给服务器的服务器标识符。\
  \ |\n| `server_id_bits` | 32 | `server_id` 的有效位数。此选项的范围是 7 ∼ 32。 |\n| `binlog_format`\
  \ | `STATEMENT` (<= 7.4) `ROW` (>= 7.5) | 二进制日志的格式。NDB 集群复制仅支持行格式。 |\n| `expire_logs_days`\
  \ | 无 | 在此选项指定的天数后自动删除二进制日志。 |\n| `ndb_log_updated_only` | `ON` | 启用后，仅记录行中修改的部分到二进制日志。使用冲突检测或\
  \ `InnoDB` 从服务器时必须设为 `OFF`。 |\n| `ndb_log_update_as_write` | `ON` | 启用后，对 NDB 表的更新在二进制日志中记录为写入。使用冲突检测或\
  \ `InnoDB` 从服务器时必须设为 `OFF`。 |\n| `ndb_log_apply_status` | `OFF` | 启用后，来自主直接主服务器的针对\
  \ `ndb_apply_status` 表的修改会写入二进制日志。使用基于纪元的冲突检测方法时必须设为 `OFF`。 |\n| `ndb_log_binlog_index`\
  \ | `ON` | 纪元与二进制日志位置之间的映射被写入 `ndb_binlog_index` 表。 |\n| `slave_allow_batching`\
  \ | `OFF` | 启用后，更新会在从服务器上以批处理方式应用。这将提高从服务器性能。 |\n| `log_bin_use_v1_row_events` |\
  \ `OFF` | 禁用时，使用二进制日志格式的版本 2。`ndb_log_transaction_id` 选项必需。 |\n| `ndb_log_transaction_id`\
  \ | `OFF` | 启用后，`NDBCluster` 存储引擎的事务 ID 会写入每个二进制日志条目。基于纪元的冲突检测方法需要。 |\n| `ndb_slave_conflict_role`\
  \ | 无 | 指定服务器的角色为 `PRIMARY` 或 `SECONDARY`。`NDB$EPOCH2` 和 `NDB$EPOCH2_TRANS` 冲突检测方法需要。\
  \ |\n| `ndb_log_exclusive_reads` | `OFF` | 启用后，排他读操作会被写入二进制日志，以便进行冲突检测。 |\n\n###\
  \ NDB 集群复制的注意事项与限制\n\nNDB 集群复制存在若干限制。以下功能在 NDB 集群复制上不可用。如果需要使用这些功能，请考虑使用 `InnoDB`\
  \ 和标准 MySQL 复制代替 NDB 集群复制。\n\n*   GTID（全局事务标识符）\n*   多线程从服务器\n*   多源复制\n*   组复制\n\
  \n使用复制时，请确保所有表都有显式主键，因为如果某些表没有显式主键，在发生节点故障时可能会在复制中出错。当应用修改而扫描表时，如果表没有显式主键也会出现问题。总之，从开发和复制的角度来看，强烈建议所有表都拥有主键。\n\
  \n### 总结\n\nNDB 集群复制是一项强大的功能，可补充 MySQL NDB 集群的多个方面。例如：\n\n*   灾难恢复或备用集群；\n*   相同数据集的读取扩展；\n\
  *   跨存储引擎复制；\n\n这使得 MySQL NDB 集群在各种情况下更加有用。\n\n从下一节开始，我们将讨论日常任务和维护相关主题。为了保持数据库集群的健康，应每天对其进行良好的维护。维护任务的第一个主题是\
  \ MySQL NDB 集群的客户端和实用程序。\n\n## 第三部分 日常任务与维护\n\n## 7. NDB 管理客户端与其他 NDB 实用程序\n\nMySQL\
  \ NDB 集群附带了一系列用于管理、获取集群信息以及进行故障排除的实用程序。最常用的实用程序是 NDB 管理客户端 `ndb_mgm`，它连接到管理节点，可用于获取状态信息、创建备份等。本章详细介绍管理客户端，并概述其他实用程序。\n\
  \n### NDB 管理客户端\n\nNDB 管理客户端很特殊，因为它是唯一一个专门与管理节点通信的实用程序。所有数据节点、管理节点和 API/SQL 节点都需要节点\
  \ ID 才能连接，而 NDB 管理客户端不需要节点 ID。这意味着即使所有配置的 API 节点 ID 都已用尽，也总是可以使用管理客户端连接到集群。管理客户端可以执行的一些任务包括：\n\
  \n*   启动处于“未启动”状态的数据节点。示例请参见第 10 章。\n*   停止单个管理或数据节点、所有数据节点或所有管理和数据节点。详情请参见第 10\
  \ 章。\n*   重启管理或数据节点。示例请参见第 10 章。\n*   启动和中止在线 NDB 备份。详情请参见第 8 章。\n*   显示集群状态信息，包括哪些节点在线以及接受来自哪些主机的连接。\n\
  *   管理集群日志。详情请参见第 16 章。\n*   创建报告。\n*   创建或删除节点组。创建新节点组的示例请参见第 10 章。\n*   进入和退出单用户模式。\n\
  *   清除陈旧的会话。\n*   设置用于提示符的文本。\n\n本节的其余部分讨论 `ndb_mgm` 客户端最常见的用法，不包括其他章节讨论的情况，例如创建备份。\n\
  \n#### 调用 NDB 管理客户端\n\n启动管理客户端时只有少数几个选项可用，其中最重要的如下（按选项名称的长格式字母顺序排列）：\n\n*   `--defaults-extra-file=...`。除了默认配置文件外，还从该文件读取配置选项。另请参见\
  \ `--defaults-file` 选项。\n*   `--defaults-file=...`。其工作方式与其他所有 MySQL 程序相同。`ndb_mgm`\
  \ 将读取 `[mysql_cluster]` 和 `[ndb_mgm]` 组。读取配置文件对于设置 `ndb-connectstring` 选项可能很有用。\n\
  *   `--execute=.../-e`。要执行的命令。其工作方式与 `mysql` 命令行客户端相同。所有可以通过管理客户端交互执行的命令，也可以直接使用\
  \ `-e` 或 `--execute=...` 命令行选项执行。如果命令包含多个单词，则必须用引号将命令括起来，或用反斜杠 (`\\`) 转义空格。例如：`ndb_mgm\
  \ -e \"START BACKUP\"`。以这种方式执行命令的一个优点是，输出可以重定向到其他程序或文件。\n*   `--help`。显示有关可用选项和默认值的信息。\n\
  *   `--ndb-connectstring=.../-c`。以分号分隔的管理节点主机名和端口列表。每个管理节点的格式为 `hostname:port`。默认值为\
  \ `localhost:1186`。详见第 4 章。\n*   `--no-defaults`。不读取任何配置文件。另请参见 `--defaults-file`。\n\
  *   `--prompt=.../-p`。指定用于提示符的文本。默认为 `ndb_mgm>`。此功能在 MySQL NDB Cluster 7.5 中是新的。其用法类似于设置\
  \ `mysql` 命令行客户端的提示符，但不支持像 `\\c` 这样用于添加计数器的特殊序列。\n\n要获取有关命令行的更多信息，包括此处未提及的选项，请使用\
  \ `--help` 参数，如代码清单 7-1 所示。\n\n```\nshell$ ndb_mgm --help\nUsage: ./mysql/bin/ndb_mgm\
  \ [OPTIONS] [hostname [port]]\nMySQL distrib mysql-5.7.18 ndb-7.5.6, for linux-glibc2.5\
  \ (x86_64)\nDefault options are read from the following files in the given order:\n\
  /etc/my.cnf /etc/mysql/my.cnf /usr/local/mysql/etc/my.cnf ∼/.my.cnf\nThe following\
  \ groups are read: mysql_cluster ndb_mgm\nThe following options may be given as\
  \ the first argument:\n--print-defaults        Print the program argument list and\
  \ exit.\n--no-defaults           Don't read default options from any option file,\n\
  except for login file.\n--defaults-file=#       Only read default options from the\
  \ given file #.\n--defaults-extra-file=# Read this file after the global files are\
  \ read.\n--defaults-group-suffix=# Also read groups with concat(group, suffix)\n\
  --login-path=#          Read this path from the login file.\n-?, --usage       \
  \  Display this help and exit.\n-?, --help          Display this help and exit.\n\
  -V, --version       Output version information and exit.\n-c, --ndb-connectstring=name\n\
  Set connect string for connecting to ndb_mgmd. Syntax:\n\"[nodeid=;][host=][:]\"\
  . Overrides\nspecifying entries in NDB_CONNECTSTRING and my.cnf\n--ndb-mgmd-host=name\
  \ same as --ndb-connectstring\n--ndb-nodeid=#      Set node id for this node. Overrides\
  \ node id specified in\n--ndb-connectstring.\n--ndb-optimized-node-selection\nSelect\
  \ nodes for transactions in a more optimal way\n(Defaults to on; use --skip-ndb-optimized-node-selection\
  \ to disable.)\n-c, --connect-string=name\nsame as --ndb-connectstring\n--core-file\
  \         Write core on errors.\n--character-sets-dir=name\nDirectory where character\
  \ sets are.\n--connect-retry-delay=#\nSet connection time out. This is the number\
  \ of seconds\nafter which the tool tries reconnecting to the cluster.\n--connect-retries=#\
  \ Set connection retries. This is the number of times the\ntool tries connecting\
  \ to the cluster.\n-e, --execute=name  execute command and exit\n-p, --prompt=name\
  \   Set prompt to string specified\n-v, --verbose=#     Control the amount of printout\n\
  -t, --try-reconnect=#\nSame as --connect-retries\nVariables (--variable-name=value)\n\
  and boolean options {FALSE|TRUE}  Value (after reading options)\n---------------------------------\
  \ ----------------------------------------\nndb-connectstring                 (No\
  \ default value)\nndb-mgmd-host                     (No default value)\nndb-nodeid\
  \                        0\nndb-optimized-node-selection      TRUE\nconnect-string\
  \                    (No default value)\ncore-file                         FALSE\n\
  character-sets-dir                (No default value)\nconnect-retry-delay      \
  \         5\nconnect-retries                   12\nexecute                     \
  \      (No default value)\nprompt                            (No default value)\n\
  verbose                           1\ntry-reconnect                     12\n代码清单\
  \ 7-1.\nndb_mgm --help 的输出\n```\n\n\n#### 从客户端内部获取帮助\n\n管理客户端所支持命令的文档可在 MySQL 参考手册中找到，地址是\
  \ [`https://dev.mysql.com/doc/refman/5.7/en/mysql-cluster-mgm-client-commands.html`](https://dev.mysql.com/doc/refman/5.7/en/mysql-cluster-mgm-client-commands.html)。获取快速参考的一个更简便方法是使用管理客户端内部的\
  \ `HELP` 命令。帮助信息概览如清单 7-2 所示。这与上一小节使用 `ndb_mgm --help` 所提供的帮助不同，它提供的是关于可用命令的帮助。\n\
  \n```\nndb_mgm> HELP\n\nNDB Cluster -- Management Client -- Help\n\nHELP       \
  \                            打印帮助文本\nHELP COMMAND                           打印 COMMAND（例如\
  \ SHOW）的详细帮助\nSHOW                                   打印集群信息\nCREATE NODEGROUP ,...\
  \          添加包含节点的节点组\nDROP NODEGROUP                     删除 ID 为 NG 的节点组\nSTART\
  \ BACKUP [NOWAIT | WAIT STARTED | WAIT COMPLETED]\nSTART BACKUP [] [NOWAIT | WAIT\
  \ STARTED | WAIT COMPLETED]\nSTART BACKUP [] [SNAPSHOTSTART | SNAPSHOTEND] [NOWAIT\
  \ | WAIT STARTED | WAIT COMPLETED]\n启动备份（默认为 WAIT COMPLETED，SNAPSHOTEND）\nABORT\
  \ BACKUP                中止备份\nSHUTDOWN                               关闭集群中的所有进程\n\
  PROMPT []               在指定的字符串和默认提示符之间切换提示符（如果未指定字符串）\nCLUSTERLOG ON [] ...   \
  \      启用集群日志记录\nCLUSTERLOG OFF [] ...        禁用集群日志记录\nCLUSTERLOG TOGGLE [] ...\
  \     切换严重性过滤器的开/关状态\nCLUSTERLOG INFO                        打印集群日志信息\n START  \
  \                           启动数据节点（使用 -n 启动）\n RESTART [-n] [-i] [-a] [-f]     \
  \  重启数据节点或管理服务器节点\n STOP [-a] [-f]                    停止数据节点或管理服务器节点\nENTER SINGLE\
  \ USER MODE             进入单用户模式\nEXIT SINGLE USER MODE                  退出单用户模式\n\
  \ STATUS                            打印状态\n CLUSTERLOG {=}+  为集群日志设置日志级别\nPURGE STALE\
  \ SESSIONS                   重置管理服务器中保留的 nodeid\nCONNECT []              连接到管理服务器（如果已连接则重新连接）\n\
  \ REPORT               显示 的报告\nQUIT                                   退出管理客户端\n\
  \ = ALERT | CRITICAL | ERROR | WARNING | INFO | DEBUG\n = STARTUP | SHUTDOWN | STATISTICS\
  \ | CHECKPOINT | NODERESTART | CONNECTION | INFO | ERROR | CONGESTION | DEBUG |\
  \ BACKUP | SCHEMA\n = BACKUPSTATUS | MEMORYUSAGE | EVENTLOG\n    = 0 - 15\n    \
  \   = ALL | 任何数据库节点 ID\n有关 COMMAND 的详细帮助，请使用 HELP COMMAND 。\n清单 7-2.\nndb_mgm 中的\
  \ HELP 命令\n```\n\n提示\n\n与 `mysql` 命令行客户端不同，此客户端不支持多行语句，因此不需要分隔符。这意味着你可以在管理客户端中执行命令，而无需在末尾指定分号\
  \ (`;`)。与 SQL 语句类似，命令不区分大小写。\n\n正如 `HELP COMMAND` 命令的描述所述，你也可以获取给定命令的更详细帮助。例如，要了解更多关于\
  \ `START BACKUP` 命令的信息，请使用此命令：\n\n```\nndb_mgm> HELP START BACKUP\n\nNDB Cluster\
  \ -- Management Client -- Help for START BACKUP command\n\nSTART BACKUP  启动集群备份\n\
  START BACKUP [] [SNAPSHOTSTART | SNAPSHOTEND] [NOWAIT | WAIT STARTED | WAIT COMPLETED]\n\
  为集群启动备份。\n...\n```\n\n使用内置帮助是验证命令语法和用法的非常有用的方法。\n\n#### 设置提示符\n\n在 MySQL NDB Cluster\
  \ 7.5 及更高版本中，可以更改提示符。默认提示符是 `ndb_mgm>`。但是，如果你管理多个集群，将提示符设置为不同的值有助于降低在错误集群上执行命令的风险。\n\
  \n要更改提示符，请使用 `PROMPT` 命令，后跟你想要使用的字符串。该字符串不应加引号。例如，要将提示符设置为 `mgm - production>`，请使用以下命令：\n\
  \n```\nndb_mgm> PROMPT mgm - production>\nPrompt set to mgm - production>\nmgm -\
  \ production>\n```\n\n末尾不需要空格，因为提示符文本末尾的所有空白字符都会被自动修剪，然后会自动添加一个空格。\n\n要将提示符重置为默认值，请执行不带参数的\
  \ `PROMPT` 命令：\n\n```\nmgm - production> PROMPT\nReturning to default prompt of\
  \ ndb_mgm>\nndb_mgm>\n```\n\n在 MySQL NDB Cluster 7.5 中，提示符也可以在命令行上设置，因此也可以通过 MySQL\
  \ 配置文件设置：\n\n```\nshell$ ndb_mgm --prompt=\"mgm - production>\"\nConnected to Management\
  \ Server at: localhost:1186\nPrompt set to mgm - production>\n-- NDB Cluster --\
  \ Management Client --\nmgm - production>\n```\n\n#### 显示集群状态\n\n管理客户端中最常用的命令之一是\
  \ `SHOW` 命令。它提供集群状态的概览。此外，`STATUS` 命令提供更简单的输出，并且只包含数据节点。`SHOW` 命令不接受任何参数，因此其用法非常简单：\n\
  \n```\nndb_mgm> SHOW\nConnected to Management Server at: 192.168.56.101:1186\nCluster\
  \ Configuration\n\n[ndbd(NDB)]     2 node(s)\nid=1    @192.168.56.103  (mysql-5.7.16\
  \ ndb-7.5.4, Nodegroup: 0, *)\nid=2    @192.168.56.104  (mysql-5.7.16 ndb-7.5.4,\
  \ Nodegroup: 0)\n[ndb_mgmd(MGM)] 2 node(s)\nid=49   @192.168.56.101  (mysql-5.7.16\
  \ ndb-7.5.4)\nid=50   @192.168.56.102  (mysql-5.7.16 ndb-7.5.4)\n[mysqld(API)] \
  \  6 node(s)\nid=51   @192.168.56.103  (mysql-5.7.16 ndb-7.5.4)\nid=52   @192.168.56.104\
  \  (mysql-5.7.16 ndb-7.5.4)\nid=53 (not connected, accepting connect from 192.168.56.101)\n\
  id=54 (not connected, accepting connect from 192.168.56.102)\nid=55 (not connected,\
  \ accepting connect from any host)\nid=56 (not connected, accepting connect from\
  \ any host)\n```\n\n对于在线节点，信息包括以下数据：\n\n*   为该节点分配的节点 ID。\n*   节点连接的主机。\n*   使用的版本。\n\
  *   对于数据节点，该数据节点所属的节点组。\n*   对于数据节点，当前主节点（president 节点）旁边会有一个星号 (`*`)。在此示例中，`id\
  \ = 1` 是主节点。\n*   如果数据节点正在重启，这将会反映出来，但不会显示上次完成的启动阶段的详细信息（参见第 10 章）。\n\n对于当前未使用的插槽，信息包括：\n\
  \n*   可用的节点 ID。如果配置节点时没有明确的 NodeId，管理节点仍会为该插槽分配一个节点 ID。\n*   允许连接的来源。如果未配置 HostName，文本将显示允许来自任何主机的连接。\n\
  \n`SHOW` 命令的示例可在第 10 章和第 11 章中找到。第 10 章涵盖重启操作，第 11 章涵盖升级和降级。\n\n`STATUS` 命令对于快速获取一个或所有数据节点的状态概览非常有用。该命令需要一个参数——添加在\
  \ `STATUS` 关键字之前——该参数必须是 `ALL` 或一个节点 ID。由于状态信息包含关于最新重启阶段的信息，因此它对于监控数据节点的重启很有用。例如，获取节点\
  \ 2 的状态：\n\n```\nndb_mgm> 2 STATUS\nNode 2: starting (Last completed phase 4) (mysql-5.7.16\
  \ ndb-7.5.4)\n```\n\n获取所有数据节点的状态：\n\n```\nndb_mgm> ALL STATUS\nNode 1: started (mysql-5.7.16\
  \ ndb-7.5.4)\nNode 2: starting (Last completed phase 100) (mysql-5.7.16 ndb-7.5.4)\n\
  ```\n\n\n#### 单用户模式\n\n单用户模式用于某些维护场景，此时必须确保应用程序未连接到数据节点，或者仅通过单个 API 节点连接。在单用户模式下，只允许一个\
  \ API/SQL 节点连接。这也意味着，如果一个 SQL 节点配置的 `ndb_cluster_connection_pool` 值大于一，它将无法连接，因为它需要所有请求的连接槽都可用。如果\
  \ SQL 节点配置为使用大于一的连接池，而单用户模式维护窗口又需要使用 SQL 节点，解决方案是：要么使用一个专为此类情况准备的备用 SQL 节点，要么以 `ndb_cluster_connection_pool\
  \ = 1` 的配置重启一个现有的 SQL 节点。\n\n进入单用户模式的命令是 `ENTER SINGLE USER MODE`，该命令需要指定允许连接到集群的节点\
  \ ID。例如，要允许节点 ID 为 54 的节点连接，而不允许其他任何 API/SQL 节点连接，请使用以下命令：\n\n```\nndb_mgm> ENTER\
  \ SINGLE USER MODE 54;\nSingle user mode entered\nAccess is granted for API node\
  \ 54 only.\n```\n\n该命令可能需要一点时间才能完成，在此期间其他节点会被断开连接。在单用户模式下，`SHOW` 和 `STATUS` 命令会反映当前状态，例如：\n\
  \n```\nndb_mgm> ALL STATUS\nNode 1: single user mode (mysql-5.7.16 ndb-7.5.4)\n\
  Node 2: single user mode (mysql-5.7.16 ndb-7.5.4)\n```\n\n一旦维护窗口结束，请使用 `EXIT SINGLE\
  \ USER MODE` 命令恢复正常模式：\n\n```\nndb_mgm> EXIT SINGLE USER MODE\nExiting single user\
  \ mode in progress.\nUse ALL STATUS or SHOW to see when single user mode has been\
  \ exited.\n```\n\n#### 创建报告\n\n管理客户端可用于创建一系列报告，从而为集群提供有用的信息。报告可以针对单个数据节点生成，也可以针对所有数据节点生成。目前有三种可用的报告类型：\n\
  \n*   `MemoryUsage`：数据节点的数据内存和索引内存使用情况。\n*   `BackupStatus`：数据节点的备份状态。\n*   `EventLog`：来自数据节点事件日志的消息。\n\
  \n`MemoryUsage` 报告是最常用的报告，它提供了关于数据和（唯一哈希）索引当前内存使用情况的信息：\n\n```\nndb_mgm> ALL REPORT\
  \ MemoryUsage\nNode 1: Data usage is 55%(7070 32K pages of total 12800)\nNode 1:\
  \ Index usage is 43%(4459 8K pages of total 10304)\nNode 2: Data usage is 55%(7072\
  \ 32K pages of total 12800)\nNode 2: Index usage is 43%(4460 8K pages of total 10304)\n\
  ```\n\n内存使用信息以百分比和页面数量表示。\n\n`BackupStatus` 报告要么会报告备份未在进行，要么会提供正在进行的备份的进度信息。例如，当没有备份在进行而你请求所有数据节点的备份信息时：\n\
  \n```\nndb_mgm> ALL REPORT BackupStatus\nNode 1: Backup not started\nNode 2: Backup\
  \ not started\n```\n\n数据节点 1 在备份期间的状态：\n\n```\nndb_mgm> 1 REPORT BackupStatus\n\
  Node 1: Local backup status: backup 5 started from node 49\n#Records: 556508 #LogRecords:\
  \ 0\nData: 18873520 bytes Log: 0 bytes\n```\n\n有关备份的更多信息，请参见第 8 章。\n\n最后一种报告是 `EventLog`\
  \ 报告。这可用于获取关于数据节点活动的详细信息，其详细程度高于输出日志（参见第 16 章），且无需登录到数据节点。事件日志是一个环形缓冲区，因此可用的事件数量是有限的。代码清单\
  \ 7-3 展示了该报告的一个示例。如果选择来自所有数据节点的事件，事件将会交错显示。\n\n```\nndb_mgm> ALL REPORT EventLog\n\
  2016-12-18 16:24:13 Node 1: Node 50 Connected\n2016-12-18 16:24:13 Node 1: Communication\
  \ to Node 2 opened\n2016-12-18 16:24:14 Node 2: Node 50 Connected\n2016-12-18 16:24:14\
  \ Node 2: Communication to Node 1 opened\n2016-12-18 16:24:14 Node 1: Node 2 Connected\n\
  2016-12-18 16:24:14 Node 2: Node 1 Connected\n2016-12-18 16:24:17 Node 1: Node 2:\
  \ API mysql-5.7.16 ndb-7.5.4\n2016-12-18 16:24:17 Node 2: Node 1: API mysql-5.7.16\
  \ ndb-7.5.4\n...\n2016-12-18 16:38:39 Node 1: Backup 5 started from node 49\n2016-12-18\
  \ 16:39:28 Node 1: Backup 5 started from node 49 completed. StartGCP: 3596 StopGCP:\
  \ 3600 #Records: 2423505 #LogRecords: 0 Data: 74515992 bytes Log: 0 bytes\n2016-12-18\
  \ 16:39:31 Node 1: LDM(1): Completed LCP, #frags = 34 #records = 1211469, #bytes\
  \ = 60693392\n2016-12-18 16:39:31 Node 1: LDM(2): Completed LCP, #frags = 34 #records\
  \ = 1212045, #bytes = 60759696\n2016-12-18 16:39:33 Node 2: LDM(1): Completed LCP,\
  \ #frags = 34 #records = 1211469, #bytes = 60693392\n2016-12-18 16:39:33 Node 2:\
  \ LDM(2): Completed LCP, #frags = 34 #records = 1212045, #bytes = 60759696\n...\n\
  2016-12-18 16:43:33 Node 2: Trans. Count = 0, Commit Count = 0, Read Count = 0,\
  \ Simple Read Count = 0, Write Count = 0, AttrInfo Count = 0, Concurrent Operations\
  \ = 0, Abort Count = 0 Scans = 0 Range scans = 0, Local Read Count = 0 Local Write\
  \ Count = 0\n2016-12-18 16:43:33 Node 1: Operations=0\n2016-12-18 16:43:33 Node\
  \ 1: Global checkpoint 3718 started\n2016-12-18 16:43:33 Node 1: Global checkpoint\
  \ 3718 completed\n2016-12-18 16:43:34 Node 1: Trans. Count = 0, Commit Count = 0,\
  \ Read Count = 0, Simple Read Count = 0, Write Count = 0, AttrInfo Count = 0, Concurrent\
  \ Operations = 0, Abort Count = 0 Scans = 0 Range scans = 0, Local Read Count =\
  \ 0 Local Write Count = 0\n2016-12-18 16:43:35 Node 1: Global checkpoint 3719 started\n\
  2016-12-18 16:43:35 Node 1: Global checkpoint 3719 completed\n2016-12-18 16:43:37\
  \ Node 1: Global checkpoint 3720 started\n2016-12-18 16:43:37 Node 1: Global checkpoint\
  \ 3720 completed\n代码清单 7-3.\nEventLog 报告\n```\n\n#### 清除陈旧会话\n\n此命令极少需要使用。节点故障后，可能会发生节点\
  \ ID 未被释放的情况，这意味着该节点无法重新加入集群。在这种情况下，可以使用 `PURGE STALE SESSIONS` 命令来检查是否有任何节点 ID\
  \ 可以被释放，如果可以，则释放它们。该命令没有参数。使用该命令的示例如下：\n\n```\nndb_mgm> PURGE STALE SESSIONS\nNo\
  \ sessions purged\n```\n\n### 其他 NDB 实用工具\n\nMySQL NDB Cluster 下载版中包含多个实用工具。这些工具都安装在\
  \ `bin` 目录中。如果你使用 RPM 包安装 MySQL NDB Cluster，对于 7.5 版本，这些工具包含在客户端 RPM 中，例如 `mysql-cluster-community-client-7.5.4-1.el7.x86_64.rpm`，而对于更早的版本，这些工具则包含在服务器\
  \ RPM 中。其中一些实用工具的源代码也是使用 `NDB API` 的有用示例。\n\n表 7-1 概述了 7.5.6 版本中包含的实用工具。本书通篇提供了使用其中几个实用工具的示例。\n\
