  trans: '

    ## Kubernetes 简介


    Kubernetes 是一个容器编排器。它的职责是在数据中心内的服务器上启动基于容器的应用程序。为此，Kubernetes 使用代表数据中心资源的 `API
    对象`，使开发人员和系统管理员能够以代码形式定义系统，并使用该代码进行部署。基于容器的应用程序以 `Pod` 的形式部署到 `Kubernetes 集群`
    中。集群是计算资源的集合，这些资源是被称为 `节点` 的物理或虚拟服务器。让我们更详细地探讨这些元素中的每一个，从 Kubernetes 的优势开始，了解它在现代应用部署中所提供的价值：


    *   **工作负载调度：** Kubernetes 是一个容器编排器，其主要目标是在集群的 `节点` 上启动称为 `Pod` 的基于容器的应用程序。Kubernetes
    的工作就是找到在集群中运行 `Pod` 的最合适位置。在将 `Pod` 调度到 `节点` 上时，一个主要的关注点是确定一个 `节点` 是否有足够的 CPU
    和内存资源来运行分配的工作负载。


    *   **状态管理：** 当代码部署到 Kubernetes 中，定义了一个需要运行的工作负载时，Kubernetes 有责任在集群中启动 `Pod` 和其他资源，并保持集群处于期望状态。如果集群的运行状态偏离了期望状态，Kubernetes
    将尝试改变集群的运行状态，使其回到定义的期望状态。例如，如果一个 `Deployment` 定义了要运行一定数量的 `Pod`，当一个 `Pod` 失败时，Kubernetes
    将会在集群中部署一个新的 `Pod` 来替换失败的 `Pod`，确保 `Deployment` 所定义的 `Pod` 数量保持正常运行。此外，假设您希望扩展支持应用程序的
    `Pod` 数量以增加容量。在这种情况下，您只需增加 `Deployment` 中的副本数，Kubernetes 就会在集群中创建额外的 `Pod`，确保期望状态得以实现。更多内容将在接下来关于
    `控制器` 的章节中介绍。


    *   **一致部署：** 以代码形式部署应用程序能够实现可重复的流程。定义部署的代码是配置制品，可以置于源代码控制中。您也可以使用此代码在低级环境（例如开发环境）中部署相同的系统，甚至在本地系统与云之间部署。更多内容将在接下来关于
    Kubernetes API 的章节中介绍。


    *   **速度：** Kubernetes 支持快速、可控的部署，能够快速启动集群中的 `Pod`。此外，在 Kubernetes 中，应用程序可以快速扩展。扩展支持应用程序的
    `Pod` 数量可能就像更改一行代码那么简单，这可能只需要几秒钟。这将在第 5 章和第 7 章中详细演示。


    *   **基础设施抽象：** Kubernetes API 提供了对集群中可用资源的抽象或封装。在部署应用程序时，重点较少放在基础设施上，而更多地放在如何定义和部署应用程序以及如何消耗集群的资源上。用于部署的代码将描述
    `Deployment` 应该是什么样子，而集群将使其成为现实。如果应用程序需要诸如公共 IP 地址或存储之类的资源，这将成为 `Deployment` 的一部分，集群将为应用程序的使用调配这些资源。


    *   **持久服务端点：** Kubernetes 为在集群中部署的应用程序提供持久的 IP 和 DNS 命名。由于 `Pod` 可能会因为扩展操作或响应故障事件而出现和消失，Kubernetes
    为访问这些应用程序提供了这种网络抽象。根据所使用的 `服务` 类型，服务会将应用程序流量负载均衡到支持该应用程序的 `Pod`。随着 `Pod` 基于扩展操作或响应集群中的故障而被创建和销毁，Kubernetes
    会自动更新哪些 `Pod` 提供应用程序服务的信息。


    ## Kubernetes API


    Kubernetes API 提供了一个表示数据中心可用资源的可编程层。该 API 使您能够编写代码，在您的应用程序部署中使用这些资源。在编写代码以使用该
    API 时，您使用的是 `API 对象`，您使用它们来定义和部署 Kubernetes 中的应用程序工作负载。您编写的代码被提交给 `API 服务器`。`API
    服务器` 是 Kubernetes 集群中的核心通信枢纽。它是您与 Kubernetes 集群交互的主要方式，也是集群内部 Kubernetes 组件交换信息的唯一方式。随着新的集群状态被定义（无论是在初始
    `部署` 时还是在修改现有部署时），Kubernetes 开始实现您代码中描述的状态。您代码的期望状态成为了集群中的运行状态。


    ### API 对象


    Kubernetes `API 对象` 代表集群中可用的资源。集群中有用于计算、存储和网络元素等的 `API 对象`，可供您的应用程序工作负载使用。您将使用这些
    `API 对象` 编写代码，以定义您部署到 Kubernetes 集群中的应用程序和系统的期望状态。这些定义的 `API 对象` 向集群传达已部署工作负载的期望状态，而集群有责任确保该期望状态成为集群的运行状态。


    我们现在将介绍在 Kubernetes 集群中定义工作负载的核心 `API 对象`。这些是在 Kubernetes 中部署的应用程序的核心构建块。在接下来的章节中，我们将更深入地逐一探讨：


    *   **Pod：** 这些是基于容器的应用程序。`Pod` 是集群中的工作单元。`Pod` 是一个抽象，包含一个或多个容器及其执行所需的资源和配置，包括网络、存储、环境变量、配置文件和机密信息。


    *   **控制器：** 这些控制器定义应用程序工作负载并使其在集群中保持期望状态。一些 `控制器` 负责启动 `Pod` 并使这些 `Pod` 保持在期望状态。有几种不同类型的
    `控制器`，用于确保已部署的应用程序和系统的状态，以及集群的运行状态。我们在本节介绍几种 `控制器`，并在本书的剩余部分介绍更多。


    *   **服务：** 这些为访问基于 `Pod` 的应用程序提供网络抽象。`服务` 是应用程序的使用者（例如用户和其他应用程序）访问集群中部署的基于容器的应用程序服务的方式。


    *   **存储：** Kubernetes 为 `Pod` 访问集群中的存储和配置数据提供了抽象。像 `持久卷` 和 `持久卷声明` (`PVC`) 这样的存储对象用于独立于
    `Pod` 的生命周期来持久化应用程序数据。


    *   **配置数据：** 配置数据可以作为 `ConfigMap` 和 `Secret` 存储在集群中，它们可以作为文件和环境变量暴露给在 `Pod` 中运行的应用程序。


    除了所述的 `API 对象` 外，还有许多其他用于构建工作负载的对象，但这些是本书关注的核心 `API 对象` 类型，也用于部署 SQL Server。

    '
- fmt: '### API Server


    API Server 是 Kubernetes 集群中的中央通信枢纽。它是 Kubernetes 用户与集群交互以部署工作负载的主要方式，也是 Kubernetes
    在集群内部组件之间交换信息的主要方式。API Server 是一个通过 HTTPS 提供的 REST API，以 JSON 格式暴露 API 对象。当集群用户定义工作负载并将信息传达给
    API Server 时，该信息会被序列化并持久化存储在集群数据存储中。Kubernetes 随后会将集群的运行状态移动到这些存储在集群存储中的 API 对象所定义的期望状态。


    > 注意：集群数据存储是一个可插拔的资源。Kubernetes 中占主导地位的集群数据存储是一个名为 etcd（`https://etcd.io/`）的分布式键值存储。


    ### Core Kubernetes API Primitives


    现在让我们更仔细地看看上一节介绍的高级 API 对象。本节介绍 Pods、Controllers、Services、存储、ConfigMaps 和 Secrets。你将了解每个对象的更多细节，以及它们如何使你能够在
    Kubernetes 中部署应用程序，以及每个 API 对象允许你部署的工作负载类型。


    #### Pods


    Pod 也是 Kubernetes 集群中最基本的工作单元。从本质上讲，Pod 是一个 API 对象，代表一个或多个容器、其资源（如网络、存储）以及控制其执行的配置。最常见的
    Pod API 对象定义包含容器镜像、用于与容器化应用程序通信的网络端口，以及（如果需要）存储。


    Pod 是 Kubernetes 集群中的调度单元。在 Kubernetes 中，调度决定了在集群中的哪个节点上启动 Pod。一旦 Pod 被调度到节点上，容器运行时（通常是
    Docker 容器运行时）就会在该节点上使用指定的容器镜像启动一个容器。在将 Pod 调度到节点上时，Kubernetes 会确保运行 Pod 所需的 CPU
    和内存等资源在所选节点上可用，并且（如果在 Pod 中配置了）可以访问存储。


    > 注意：Kubernetes 实现了容器运行时接口（CRI），这意味着容器运行时是一个可插拔的资源，可以使用其他符合 CRI 的容器运行时。事实上的标准是
    containerd。有关这方面的更多详情，请参见第 [2](#494804_1_En_2_Chapter.xhtml) 章。


    Pod 是伸缩单元。在 Kubernetes 中部署应用程序时，你可以通过在集群中创建 Pod 的多个副本来水平伸缩应用程序，这些副本称为副本。伸缩 Pod
    副本使应用程序能够通过在集群中的节点上启动更多容器并利用额外的集群容量来支持更大的工作负载。此外，在集群中的多个节点上运行 Pod 的多个副本，可以在 Pod
    或节点故障时提供高可用性。


    Pod 是短暂的。如果删除了 Pod，其在节点上的容器会被停止然后删除。它被永久销毁，包括其可写层。Pod 永远不会被重新部署。相反，Kubernetes
    会从当前的 Pod API 对象定义创建一个新的 Pod。这两次部署的 Pod 之间不维护任何状态。对于无状态工作负载（如 Web 应用程序），这没问题。当新的
    Pod 被创建时，它们可以在准备好后开始接受工作负载。但对于有状态工作负载（如关系数据库系统），Pod 需要能够独立于其生命周期持久化其数据库中存储的数据状态。Kubernetes
    为我们提供了用于持久存储的 API 对象和结构，这将在下文描述。


    #### Controllers


    控制器定义、监控工作负载，并使集群的运行状态保持在期望状态。本节重点介绍用于创建和管理 Pod 的控制器。在 Kubernetes 中，很少通过手动定义和部署
    Pod 对象来创建 Pod。两个常用的工作负载 API 对象用于在 Kubernetes 中部署应用程序，它们是 `Deployment` 和 `StatefulSet`。


    `Deployment` 是一个 API 对象，使你能够通过 Pod 的配置来定义应用程序的期望状态，包括要创建的 Pod 数量（称为副本）。Deployment
    控制器会创建一个 `ReplicaSet`。`ReplicaSet` 负责使用来自 `Deployment` 对象的 Pod 规范在集群中启动 Pod。图
    [3-1](#494804_1_En_3_Chapter.xhtml#Fig1) 的第一帧显示了一个 `Deployment` 创建了一个 `ReplicaSet`，然后该
    `ReplicaSet` 在集群中启动了三个 Pod。


    ![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig1_HTML.jpg](images/494804_1_En_3_Chapter/494804_1_En_3_Fig1_HTML.jpg)


    图 3-1：ReplicaSet 操作


    控制器负责使集群的运行状态保持在期望状态，那么让我们看看这个过程。在图 [3-1](#494804_1_En_3_Chapter.xhtml#Fig1) 的第二帧中，假设其中一个
    Pod 因任何原因失败。也许是应用程序崩溃了，或者 Pod 运行的节点不再可用。在第三帧中，`ReplicaSet` 控制器感知到运行状态已偏离期望状态，并启动创建一个新
    Pod，确保 `ReplicaSet`（或应用程序）始终保持在三个 Pod 运行的期望状态。


    你可能会问，为什么 Deployment 控制器创建一个 `ReplicaSet`，而不是由 `Deployment` 直接创建 Pod？Deployment
    控制器定义了要创建的 Pod 数量以及 Pod 的配置。当更新 Deployment 配置时，旧 `ReplicaSet` 中的 Pod 会关闭，而新 `ReplicaSet`
    中的 Pod 会被创建。这使得新的容器镜像或 Pod 配置能够滚动更新。单个 `Deployment` 对象仍然存在，它管理着 `ReplicaSet` 之间的声明性更新和转换。如果你想深入了解这个主题，可以查看
    Pluralsight 课程 “Managing Kubernetes Controllers and Deployments”。


    Deployment 控制器不保证 Pod 的顺序或持久命名。一个 `Deployment` 包含一组 Pod，每个都是应用程序的精确副本。但是，如果一个
    Pod 被销毁，并在其位置创建一个新 Pod，则该 Pod 的名称不是持久的。像数据库系统这样的应用程序通常将数据分布在多个计算元素上，然后必须跟踪数据在系统中的位置以便后续检索。对于需要知道集合中命名计算资源的精确数据位置的有状态应用程序，使用
    Deployment 控制器可能会出现问题。


    为了允许 Kubernetes 支持这些类型的有状态应用程序，`StatefulSet` 控制器创建 Pod，每个 Pod 都具有唯一、持久且有序的名称。因此，需要控制数据跨多个
    Pod 放置的应用程序可以这样做，因为 Pod 名称是有序的，并且独立于 Pod 生命周期而持久存在。此外，`StatefulSet` 为应用程序提供稳定的存储，确保在因任何原因需要重新创建同名
    Pod 时，正确的存储对象能映射到该 Pod。'
  raw: '### API Server


    The API Server is the central communication hub in a Kubernetes Cluster. It is
    the primary way users of Kubernetes interact with a Cluster to deploy workloads.
    It is also the primary way Kubernetes exchanges information between the components
    inside a Cluster. The API Server is a REST API available over HTTPS exposing API
    Objects as JSON. As Cluster users define workloads and communicate the information
    to the API Server, this information is serialized and persisted in a Cluster data
    store. Kubernetes then will move the running state of a Cluster into the desired
    state defined in those API Objects stored in the Cluster store.


    Note


    The Cluster data store is a pluggable resource. The dominant Cluster data store
    in Kubernetes is a distributed key-value store called etcd ([*https://etcd.io/*](https://etcd.io/)
    ).


    ### Core Kubernetes API Primitives


    Now it is time to look more closely at each of the high-level API Objects introduced
    in the last section. This section introduces Pods, Controllers, Services, storage,
    ConfigMaps, and Secrets. You will learn more details about each and how they enable
    you to deploy applications in Kubernetes and the workloads that each API Object
    allows you to deploy.


    #### Pods


    A Pod is also the most *basic unit of work* in a Kubernetes Cluster. At its core,
    a Pod is an API Object that represents one or more *containers*, its *resources*
    such as networking, storage, and *configuration* controlling its execution. Most
    commonly, a Pod API Object definition consists of the container image(s), networking
    ports used to talk to the container-based application, and, if needed, storage.


    A Pod is the *unit of scheduling* in a Kubernetes Cluster. In Kubernetes, scheduling
    determines on which Node in a Cluster to start a Pod. Once the Pod is scheduled
    on the Node, a container using the specified container image is started on that
    Node by the container runtime, which conventionally is the Docker container runtime.
    When scheduling Pods on Nodes, Kubernetes ensures the resources like CPU and memory
    required to run the Pod are available on the selected Node and, if configured
    in the Pod, access to the storage.


    Note


    Kubernetes implements the Container Runtime Interface (CRI), meaning the container
    runtime is a pluggable resource and can use other CRI-compliant container runtimes.
    The de facto standard is containerd. See Chapter [2](#494804_1_En_2_Chapter.xhtml)
    for more details on this.


    A Pod is the *unit of scaling.* When deploying applications in Kubernetes, you
    can scale an application horizontally by creating multiple copies of a Pod in
    a Cluster, called *Replicas*. Scaling Pod Replicas enables applications to support
    larger workloads by starting more containers on the Nodes in a Cluster and leveraging
    additional Cluster capacity. Further, running multiple Replicas of a Pod in a
    Cluster across multiple nodes provides high availability in the event of Pod or
    Node failures.


    A Pod is *ephemeral*. If a Pod is deleted, its container(s) on the Node is stopped
    and then deleted. It is destroyed forever, including its writeable layer. A Pod
    is never redeployed. Instead, Kubernetes creates a new Pod from the current Pod
    API Object definition. There is no state maintained between these two deployments
    of a Pod. For stateless workloads, like web applications, this is OK. As new Pods
    are created, they can begin accepting workload when ready. But for stateful workloads
    like relational database systems, a Pod needs the ability to persist the state
    of the data stored in its databases independent of the Pod lifecycle. Kubernetes
    gives us API Objects and constructs for persistent storage, which are described
    in the following.


    #### Controllers


    Controllers define, monitor, and keep workloads and the running state of the Cluster
    in the desired state. This section focuses on Controllers for creating and managing
    Pods. In Kubernetes, it is rare to create Pods by defining and deploying a Pod
    Object manually. Two common Workload API objects are used for deploying applications
    in Kubernetes. They are *Deployment* and *StatefulSet*.


    A Deployment is an API Object that enables you to define an application’s desired
    state in the Pod’s configuration and includes the number of Pods to create, called
    Replicas. The Deployment Controller creates a *ReplicaSet*. The ReplicaSet is
    responsible for starting Pods in the Cluster, using the Pod specification from
    the Deployment Object. The first frame of Figure [3-1](#494804_1_En_3_Chapter.xhtml#Fig1)
    shows a Deployment that creates a ReplicaSet, and that ReplicaSet starts three
    Pods in the Cluster.


    ![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig1_HTML.jpg](images/494804_1_En_3_Chapter/494804_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    ReplicaSet operations


    Controllers are responsible for keeping the running state of the Cluster in the
    desired state, so let’s see that in action. In the second frame of Figure [3-1](#494804_1_En_3_Chapter.xhtml#Fig1),
    let’s say one of those Pods fails for any reason. Perhaps the application crashed,
    or maybe even the Node that Pod is running on is no longer available. In the third
    frame, the ReplicaSet Controller senses that the running state has deviated from
    the desired state and initiates the creation of a new Pod, ensuring the ReplicaSet,
    or the application, stays in the desired state of three Pods running at all times.


    You might be asking, why does the Deployment Controller create a ReplicaSet rather
    than the Deployment creating the Pods directly? The Deployment Controller defines
    both the number of Pods to create and the Pod’s configuration. When a Deployment
    configuration is updated, Pods in the old ReplicaSet shut down, and Pods in a
    new ReplicaSet are created. This enables the rollout of new container images or
    Pod configuration. A single Deployment Object still exists, and it manages the
    declarative updating and transitioning between ReplicaSets. If you want to dig
    deeper into this topic, check out the Pluralsight course “Managing Kubernetes
    Controllers and Deployments.”


    Deployment Controllers do not guarantee order or persistent naming of Pods. A
    Deployment consists of a collection of Pods, each of which is an exact copy of
    an application. However, a Pod’s name is not persistent if a Pod is destroyed,
    and a new Pod is created in its place. Applications such as database systems often
    distribute data across multiple compute elements and then have to keep track of
    the data’s location in the system for subsequent retrieval. Using a Deployment
    Controller can be problematic for stateful applications that require knowing the
    precise location of data in a collection of named compute resources.


    To allow Kubernetes to support these types of stateful applications, the StatefulSet
    Controller creates Pods, each with a unique, persistent, and ordered name. So
    applications that need to control the placement of data across multiple Pods can
    do that as Pod names are ordered and persist independent of the Pod lifecycle.
    Further, StatefulSets provide stable storage for applications, ensuring the mapping
    of the correct storage object to the same named Pod if it has to be created again
    for any reason.'
