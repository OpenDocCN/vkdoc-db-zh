- fmt: "## Containers\n\nWhen using container-based application deployments, containers\
    \ directly attack some of the challenges identified when deploying applications\
    \ on virtual machine–based platforms. Let’s look at what containers bring to the\
    \ table:\n\n*   **Speed:** When compared with VMs, containers are significantly\
    \ smaller. For example, a virtual machine with `SQL Server` installed on Windows\
    \ at a minimum will be 60+GB before you include any user databases. The current\
    \ container image for `SQL Server` is about 1.5GB in size. Moving a 1.5GB container\
    \ image around a modern data center is relatively trivial. Deploying a 60+GB VM\
    \ can take some time.\n\n*   **Patching:** When it comes to patching an application,\
    \ patching is a separate process from deployment. You’ll likely need additional\
    \ tooling to do so. Leveraging containers, you can very quickly update your application\
    \ by simply pulling a new container image for your application and starting a\
    \ new container up on that newer version of your application. If configuration\
    \ and state are properly decoupled from the container, our app can pick up and\
    \ start functioning again on the newer version with little to no impact on the\
    \ application users.\n\n*   **Troubleshooting:** Due to the ephemerality of containers,\
    \ a primary troubleshooting technique for container-based applications is to kill\
    \ and redeploy the container. Since the container image is a known good starting\
    \ point for our program’s state, one can simply restart a container and get back\
    \ into a good state.\n\n*   **Operating system upgrades:** When moving between\
    \ versions of an operating system, a container can be deleted and recreated on\
    \ the newer version of the OS. Since an application’s required libraries are contained\
    \ within the container, risk is reduced when moving between versions of the operating\
    \ system.\n\n*   **Fast and consistent deployments:** When using container-based\
    \ application deployment, deployments are written in code. Efficiencies are gained\
    \ in how applications are deployed and maintained. In terms of speed, there is\
    \ no longer a reliance on humans for the work and also consistency, since there\
    \ is code that represents the state of the system, which can be used repeatedly\
    \ in deployment processes. This code is placed into source control and is the\
    \ configuration artifact for the desired state of the system.\n\nDeployment automation\
    \ is no longer going to be an afterthought or something to strive for in enterprise\
    \ IT; it will be the primary way applications are deployed – using source-controlled\
    \ code defining the desired state of the system. Container-based deployment techniques\
    \ provide IT organizations the ability to provide services to the business more\
    \ quickly and consistently and enable IT to maintain infrastructure and applications\
    \ more easily, adding to organizations’ operational efficiency. Application deployment\
    \ and maintenance can get done faster and more confidently.\n\nBoth `Docker` and\
    \ `Kubernetes` enable IT organizations to write code representing a system’s desired\
    \ state. This code can then be updated effecting the desired changes to applications,\
    \ platforms, and systems. Code can be written for initial deployments, applying\
    \ updates, and patching container-based applications. These techniques can also\
    \ be used to enable troubleshooting with greater efficiency and if needed build\
    \ self-healing applications. Each of these concepts will be further explored in\
    \ much detail later in the book.\n\n### The Container Universe\n\nOK, so now that\
    \ you are familiar with the definition of a container and how it fits into modern\
    \ application deployment processes, let’s look at the container universe. There\
    \ are a lot of emerging technologies and techniques, and we want to spend some\
    \ time here familiarizing you with the names and players in this space.\n\nThe\
    \ following list shows some of the names and players in the container universe:\n\
    \n*   **Docker:** In today’s container space, `Docker` is a technology more than\
    \ anything. It is a container runtime and collection of tools that enables you\
    \ to create and run container images and containers on an operating system, sharing\
    \ the resources of that OS.\n\n*   **Docker Inc.:** This is the company that built\
    \ the tooling and drove the technology to enable containers. `Docker Inc.` has\
    \ open sourced the core technologies behind their container runtime and have spun\
    \ off several open source projects such as `containerd` ([https://containerd.io/](https://containerd.io/)),\
    \ `Open Container Initiative` ([www.opencontainers.org/](http://www.opencontainers.org/)),\
    \ and more.\n\n*   **containerd:** Is a container runtime that coordinates the\
    \ lifecycle functions of containers such as pulling container images and creating,\
    \ starting, and stopping containers. `containerd` is used by `Docker` and `Kubernetes`\
    \ among others to coordinate container lifecycle functions. In `Kubernetes`, the\
    \ container runtime is a pluggable component. `containerd` is the de facto standard.\n\
    \n*   **Other container runtimes:** The world of containers isn’t all `Docker`\
    \ on Linux. There are some other players in the game. Here is just a small sample\
    \ of the other container runtimes available:\n    *   **Container Linux/CoreOS\
    \ (rkt):** A purpose-built operating system that emphasizes container-based application\
    \ deployment using an application container runtime called `rkt` (pronounced rocket,\
    \ [http://coreos.com/](http://coreos.com/)).\n\n    *   **Podman:** A container\
    \ runtime for running Linux containers on Red Hat–based operating systems. For\
    \ more information, visit [https://github.com/containers/libpod](https://github.com/containers/libpod).\n\
    \n    *   **Windows Server 2016:** Gives you the ability to run both Windows and\
    \ Linux containers. For more information, visit [https://docs.microsoft.com/en-us/virtualization/windowscontainers/](https://docs.microsoft.com/en-us/virtualization/windowscontainers/).\n\
    \nNote\n\nIn this chapter, we will use `Docker` as the container runtime for our\
    \ single-container deployment scenarios. In later chapters, we will use `containerd`\
    \ as the container runtime in our `Kubernetes Clusters`.\n\n### Getting and Running\
    \ Containers\n\nLet’s talk about what a *container image* is, how a container\
    \ image is defined, and where container images live.\n\nThe following list highlights\
    \ the key elements of container images:\n\n*   **Container image:** Contains the\
    \ code, application binaries, libraries, and environment variables to run our\
    \ application. In the most basic terms, these are the things needed to run our\
    \ application. A running container image is called a container.\n\n*   **Docker\
    \ file:** Defines the elements of a container image. It tells the container runtime\
    \ which binary to start up when the container starts, which network ports to expose,\
    \ and other critical information about the container image to be built.\n\n* \
    \  **Container registry:** This is where images are stored. `Docker Hub` is one\
    \ of many container registries and is a primary place to store and exchange container\
    \ images. Repositories are ways to organize container images within a container\
    \ registry."
