    file

    ```


    We can now take that file and create a deployment declaratively. Do this using
    the command in Listing [5-19](#494804_1_En_5_Chapter.xhtml#PC19).


    ```

    kubectl apply -f nginx.yaml

    Listing 5-19

    Declarative deployment using the previously generated manifest

    ```


    This will generate a deployment like the previous one. By running the command
    in Listing [5-20](#494804_1_En_5_Chapter.xhtml#PC20), we can verify that our one
    replica (as defined in the manifest) is ready.


    ```

    kubectl get deployment nginx

    Listing 5-20

    Check the status of this deployment

    ```


    The output, as shown in Figure [5-6](#494804_1_En_5_Chapter.xhtml#Fig6), will
    confirm the status of our deployment.


    ![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig6_HTML.jpg](images/494804_1_En_5_Chapter/494804_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Output of kubectl get deployment nginx


    ### Modifying a Deployment


    Of course, an existing deployment can also be modified without a full redeployment.


    Let’s assume, for example, you want to update the number of replicas – or Pods
    – in the existing deployment.


    At first sight, the easiest way seems to be, again, to do this imperatively as
    shown in Listing [5-21](#494804_1_En_5_Chapter.xhtml#PC21).


    ```

    kubectl scale deployment nginx --replicas=2

    Listing 5-21

    Scale up nginx deployment to two replicas

    ```


    As you can see in Figure [5-7](#494804_1_En_5_Chapter.xhtml#Fig7), the deployment
    is now showing two replicas.


    ![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig7_HTML.jpg](images/494804_1_En_5_Chapter/494804_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Output of kubectl get deployment nginx after rescaling to two replicas


    But now, our manifest file and our deployment are out of sync, as the manifest
    still reflects only one replica.


    A better way would be to edit the manifest using a text editor. Open the file
    in a text editor of your choice and replace the original replica definition as
    shown in Listing [5-22](#494804_1_En_5_Chapter.xhtml#PC22) with the new definition
    of 20 replicas as shown in Listing [5-23](#494804_1_En_5_Chapter.xhtml#PC23).


    ```

    spec:

    replicas: 20

    Listing 5-23

    New replica definition with 20 replicas

    ```


    ```

    spec:

    replicas: 1

    Listing 5-22

    Existing replica definition with one replica

    ```


    Now, we can reapply the manifest (see Listing [5-24](#494804_1_En_5_Chapter.xhtml#PC24)),
    which will scale up our deployment to 20 replicas.


    ```

    kubectl apply -f nginx.yaml

    Listing 5-24

    Applying the new definition using kubectl

    ```


    As you can see in Figure [5-8](#494804_1_En_5_Chapter.xhtml#Fig8), the deployment
    is now showing 20 replicas (note that it will take some time for all of those
    replicas to show as ready).


    ![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig8_HTML.jpg](images/494804_1_En_5_Chapter/494804_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Output of kubectl get deployment nginx after rescaling to 20 replicas


    A third way to modify an existing object is *kubectl edit*. While this also comes
    with the disadvantage of losing sync between your YAML file and what’s actually
    deployed on your cluster, this is a very handy way of making multiple changes
    to a deployment, for example, at once.


    Run the code in Listing [5-25](#494804_1_En_5_Chapter.xhtml#PC25).


    ```

    kubectl edit deployment nginx

    Listing 5-25

    Edit a running deployment

    ```


    This will open the full manifest of the current deployment in your default text
    editor. Find the line with the previously defined 20 replicas and change it to
    30\. When closing and saving this editor, those changes will immediately be applied,
    which we can check again using kubectl get deployment. The result is also shown
    in Figure [5-9](#494804_1_En_5_Chapter.xhtml#Fig9).


    ![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig9_HTML.jpg](images/494804_1_En_5_Chapter/494804_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Output of kubectl get deployment nginx after rescaling to 30 replicas


    ## Exposing and Accessing Services in Your Cluster


    Now, we have a scaled deployment of nginx, but the applications running in the
    pods are not yet accessible. Let’s keep moving forward and expose that deployment
    as a Kubernetes service with a persistent IP address and port for our application
    to run on.


    A service can be created using *kubectl expose*.'
  trans: '

    ## 声明式部署


    对于更复杂的场景，或者仅仅是为了更轻松地将同一对象配置部署到另一个集群（例如，将应用程序从开发系统推送到测试系统），因此强烈建议使用基于清单的声明式方法。你的清单文件也应该像你环境中使用的任何其他代码一样，放入你的源代码控制系统中。在这种情况下，我们将仅使用一个可以用
    JSON 或 YAML 编写的清单，并通过像代码清单 5-15 中的命令将其提供给 API Server。顺便说一句，用 YAML 编写的清单会被 Kubernetes
    转换为 JSON。


    ```

    kubectl apply -f deployment.yaml

    代码清单 5-15

    将 YAML 文件提供给 API Server 的 Kubectl 命令

    ```


    这个命令将获取 `deployment.yaml` 文件的内容，并将其传递给 API Server，以便 Kubernetes 创建清单中定义的资源。


    一个清单可以由许多不同的对象类型组成，因此我们可以有一个 YAML 文件，其中首先创建一个存储类，然后是一个持久卷和持久卷声明，接着是一个部署和一个服务定义。所有这些都在同一个文件中。所有内容都通过命令行上的一个单一命令部署。


    正如前面也提到的，我们可以使用 `kubectl` 通过输出来生成这些清单。让我们从生成一个部署的清单开始，该部署与我们之前通过命令式方式创建的相匹配，使用的是代码清单
    5-16 中的代码。为此，我们添加一个输出格式和 `dry-run` 开关，这将仅生成清单，而不会部署任何内容到我们的集群。


    ```

    kubectl create deployment nginx --image=nginx --dry-run=client -o yaml

    代码清单 5-16

    生成 nginx 部署的 YAML 清单的 Kubectl 命令

    ```


    输出可以在代码清单 5-17 中找到。


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    creationTimestamp: null

    labels:

    app: nginx

    name: nginx

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: nginx

    strategy: {}

    template:

    metadata:

    creationTimestamp: null

    labels:

    app: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    resources: {}

    代码清单 5-17

    从前一个代码清单生成的清单

    ```


    让我们再次生成那个清单，但这次，我们将输出重定向到一个名为 `nginx.yaml` 的文件，如代码清单 5-18 所示。


    ```

    kubectl create deployment nginx --image=nginx --dry-run=client -o yaml > nginx.yaml

    代码清单 5-18

    生成并重定向到文件的 nginx 部署 YAML 清单的 Kubectl 命令

    ```


    我们现在可以取用那个文件，并以声明式方式创建一个部署。使用代码清单 5-19 中的命令来执行此操作。


    ```

    kubectl apply -f nginx.yaml

    代码清单 5-19

    使用先前生成的清单进行声明式部署

    ```


    这将生成一个与前一个类似的部署。通过运行代码清单 5-20 中的命令，我们可以验证我们的一个副本（如清单中所定义）已就绪。


    ```

    kubectl get deployment nginx

    代码清单 5-20

    检查此部署的状态

    ```


    输出如图 5-6 所示，将确认我们部署的状态。


    ![`../images/494804_1_En_5_Chapter/494804_1_En_5_Fig6_HTML.jpg`](img/494804_1_En_5_Fig6_HTML.jpg)


    图 5-6


    `kubectl get deployment nginx` 的输出


    ## 修改部署


    当然，现有部署也可以在不进行完全重新部署的情况下进行修改。


    例如，假设你想更新现有部署中的副本（Replica）或 Pod 的数量。


    乍一看，最简单的方法似乎又是通过命令式方式完成，如代码清单 5-21 所示。


    ```

    kubectl scale deployment nginx --replicas=2

    代码清单 5-21

    将 nginx 部署扩展到两个副本

    ```


    如图 5-7 所示，部署现在显示两个副本。


    ![`../images/494804_1_En_5_Chapter/494804_1_En_5_Fig7_HTML.jpg`](img/494804_1_En_5_Fig7_HTML.jpg)


    图 5-7


    扩展到两个副本后 `kubectl get deployment nginx` 的输出


    但现在，我们的清单文件和部署不同步了，因为清单仍然只反映一个副本。


    更好的方法是使用文本编辑器编辑清单。用你选择的文本编辑器打开该文件，将原始的副本定义（如代码清单 5-22 所示）替换为 20 个副本的新定义（如代码清单
    5-23 所示）。


    ```

    spec:

    replicas: 1

    代码清单 5-22

    一个副本的现有副本定义

    ```


    ```

    spec:

    replicas: 20

    代码清单 5-23

    20 个副本的新副本定义

    ```


    现在，我们可以重新应用清单（参见代码清单 5-24），这将把我们的部署扩展到 20 个副本。


    ```

    kubectl apply -f nginx.yaml

    代码清单 5-24

    使用 kubectl 应用新定义

    ```


    如图 5-8 所示，部署现在显示 20 个副本（请注意，所有这些副本显示为就绪需要一些时间）。


    ![`../images/494804_1_En_5_Chapter/494804_1_En_5_Fig8_HTML.jpg`](img/494804_1_En_5_Fig8_HTML.jpg)


    图 5-8


    扩展到 20 个副本后 `kubectl get deployment nginx` 的输出


    修改现有对象的第三种方法是 ``kubectl edit``。虽然这也存在使你的 YAML 文件与实际部署在集群上的内容失去同步的缺点，但这是一种非常方便的方法，可以一次性对部署进行多项更改。


    运行代码清单 5-25 中的代码。


    ```

    kubectl edit deployment nginx

    代码清单 5-25

    编辑正在运行的部署

    ```


    这将在你的默认文本编辑器中打开当前部署的完整清单。找到先前定义的 20 个副本的那一行，并将其更改为 30。关闭并保存此编辑器时，这些更改将立即应用，我们可以再次使用
    `kubectl get deployment` 进行检查。结果也如图 5-9 所示。


    ![`../images/494804_1_En_5_Chapter/494804_1_En_5_Fig9_HTML.jpg`](img/494804_1_En_5_Fig9_HTML.jpg)


    图 5-9


    扩展到 30 个副本后 `kubectl get deployment nginx` 的输出


    ## 在集群中暴露和服务访问


    现在，我们有了一个扩展的 nginx 部署，但 Pod 中运行的应用程序还无法访问。让我们继续前进，将该部署作为一个 Kubernetes 服务暴露出来，为我们的应用程序提供一个持久的
    IP 地址和端口。


    可以使用 ``kubectl expose`` 创建服务。

