    Digest: sha256:9572f7cdcee8591948c2963463447a53466950b3fc15a247fcad1917ca215a2f

    Status: Downloaded newer image for hello-world:latest

    Hello from Docker!

    This message shows that your installation appears to be working correctly.

    To generate this message, Docker took the following steps:

    1. The Docker client contacted the Docker daemon.

    2. The Docker daemon pulled the "hello-world" image from the Docker Hub. (amd64)

    3. The Docker daemon created a new container from that image which runs the executable
    that produces the output you are currently reading.

    4. The Docker daemon streamed that output to the Docker client, which sent it
    to your terminal.

    To try something more ambitious, you can run an Ubuntu container with:

    $ docker run -it ubuntu bash

    Share images, automate workflows, and more with a free Docker ID:

    https://hub.docker.com/

    For more examples and ideas, visit:

    https://docs.docker.com/get-started/

    ```


    Listing 1-2: Output of your first Docker container


    In addition to Docker, the Chapter [2](#494804_1_En_2_Chapter.xhtml) demos require
    the `sqlcmd` utility. You can download it from the following location:


    *   **SQL Server Command Line Utilities:** [*https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility*](https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility)


    ## Virtual Machine–Based Kubernetes Cluster Requirements


    As we move on to the Kubernetes chapters of the book, we will build a Kubernetes
    Cluster together in Chapter [4](#494804_1_En_4_Chapter.xhtml). To do this, we
    will need some compute and storage resources. For our lab, we are going to use
    a set of five Linux virtual machines. Each VM in our lab will need two vCPUs,
    2GB of RAM and 150GB of disk space, running Ubuntu Server 16.04+ as the operating
    system. We have tested the code in this book on both Ubuntu 16.04 and Ubuntu 18.04.
    Kubernetes is supported on several operating systems. Check out [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/)
    for more details.


    ### Running Virtual Machines in Azure


    If you don’t have a system that supports running these virtual machines, another
    option is to set them up in Azure. We have provided you a script that will set
    up the entire environment for you. This will require an active Azure subscription
    as well as the `Azure CLI (command line interface)`. You can download the `Azure
    CLI` from [*https://docs.microsoft.com/en-us/cli/azure/*](https://docs.microsoft.com/en-us/cli/azure/),
    and we will also show you an easy way of installing it from the command line in
    the section “Install Tools.” If you do not have an Azure subscription, you can
    sign up for a trial account at [*https://azure.microsoft.com/en-us/free/*](https://azure.microsoft.com/en-us/free/).
    This will give you a $200 credit for 30 days to use any Azure service.


    Before we can interact with Azure through the `Azure CLI`, we need to log in,
    which happens through the command shown in Listing [1-3](#494804_1_En_1_Chapter.xhtml#PC3).


    `az login`


    Listing 1-3: Login script to your Azure account using the Azure CLI


    This will open a web browser on Windows and a Mac or point you to a URL on Linux
    to confirm your credentials.


    If you have access to multiple Azure subscriptions, make sure you are using the
    right one by using the command in Listing [1-4](#494804_1_En_1_Chapter.xhtml#PC4).
    Should you be prompted to install any extensions for the Azure CLI, please do
    so.


    `az account set -s`


    Listing 1-4: Set the Azure CLI’s active subscription


    Now you can run the script in Listing [1-5](#494804_1_En_1_Chapter.xhtml#PC5),
    which will create a resource group, a virtual network, network security rules
    that allow inbound RDP and SSH connections from ANY IP address, and the virtual
    machines as described in the previous section. This will also generate public
    DNS entries, which by their nature must be unique, so please modify the following
    variables in the script based on your requirements:


    *   `Username`

    *   `PW` (the password to be used)

    *   `Region` (the Azure region where all resources will be created)

    *   `dnsPrefix` (prefix being added to all public DNS names)

    *   `RG` (resource group name)


    Note


    It is not advisable to have your machines being reachable from any public IP address,
    so do not use any sensitive data in this lab environment. The `dnsPrefix` must
    be globally unique, so change this to something containing your initials and/or
    random numbers.'
