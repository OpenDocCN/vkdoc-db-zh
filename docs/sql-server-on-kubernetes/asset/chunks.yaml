    \ get a basic workload up and running.\n\n# Part IIKubernetes in Practice\n\n\
    # 4. Installing Kubernetes\n\nIn this chapter, we will introduce how to build\
    \ a Kubernetes cluster both on-premises and in the cloud. We will begin with discussion\
    \ of the decision process of where to install, on-premises or in the cloud, and\
    \ what to consider in that process. We will then go through the process of building\
    \ an on-premises, virtual machine–based Kubernetes cluster using the *kubeadm*\
    \ installation method. Then next, we will build a cluster in Azure Kubernetes\
    \ Service. These clusters will be the foundation for all examples in the remainder\
    \ of the book."
  trans: "# 工作节点\n\n工作节点运行用户的应用程序负载。一个集群通常由至少一个控制平面节点和一组工作节点构成。每个工作节点都为集群的总体可用资源贡献一定数量的\
    \ CPU 和内存资源。您需要有足够的 CPU 和内存资源来在集群中运行您的应用负载，确保为应用程序提供足够容量，并且能够应对节点故障甚至规模增长的情况。\n\
    \n> **注意**\n> 控制平面节点的一个主要关注点是确保可用性。请查阅 [`kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/)\
    \ 以获取有关高可用控制平面拓扑的更多信息。\n\n集群中的所有节点，无论是控制平面还是工作节点，都由三个组件组成：用于与 API Server 通信以进行集群操作的\
    \ `kubelet`、用于将节点上运行的容器暴露给本地网络的 `kube-proxy`，以及用于在节点上启动和运行容器的 `容器运行时`：\n\n*  \
    \ **kubelet：** `kubelet` 是运行在节点上的一个服务，负责与 API Server 通信、在节点上启动 Pod，并确保该节点上的 Pod\
    \ 处于健康状态。`kubelet` 监控 API Server 的 Pod 工作负载状态，告诉容器运行时启动和停止容器。它还向 API Server 报告节点上运行的\
    \ Pod 的当前状态，并通过活性探针和就绪探针的形式对 Pod 执行健康检查。`kubelet` 向 API Server 报告节点的当前状态及其可用资源。\n\
    *   **kube-proxy：** `kube-proxy` 是运行在集群中所有节点上的一个容器，其功能是作为网络代理，负责将来自节点所在网络的流量路由到该节点上运行的\
    \ Pod。\n*   **容器运行时：** `容器运行时` 负责拉取容器镜像并在节点上运行容器。如今，最常见的是在 Kubernetes 集群中使用 Docker\
    \ 作为容器运行时。但容器运行时领域正朝着容器运行时接口标准发展，该标准允许在 Kubernetes 节点中使用几种不同的容器运行时作为容器运行时。Kubernetes\
    \ 支持 Docker、containerd 和 CRI-O 容器运行时。在本书中，使用的容器运行时是 Docker。有关 Kubernetes 支持的容器运行时的更多信息，请参见\
    \ [`kubernetes.io/docs/setup/production-environment/container-runtimes/`](https://kubernetes.io/docs/setup/production-environment/container-runtimes/)。\n\
    \n## 网络基础\n\n本 Kubernetes 入门章节的最后一个主要主题是网络。Kubernetes 网络模型使得工作负载可以部署在 Kubernetes\
    \ 中，同时抽象了网络的复杂性。这简化了集群中的应用程序配置和服务发现，并通过移除基础设施特定的代码提高了部署代码的可移植性。本节将介绍 Kubernetes\
    \ 网络模型和示例集群通信模式。\n\nKubernetes 网络由三条规则管理。这些规则实现了前述的简洁性。这些规则源自 [`kubernetes.io/docs/concepts/cluster-administration/networking/`](https://kubernetes.io/docs/concepts/cluster-administration/networking/)。\n\
    \n### Kubernetes 网络模型规则\n\n1.  所有 Pod 可以在无需进行网络地址转换的情况下与所有节点上的所有其他 Pod 通信。\n2.\
    \  节点上的所有代理，例如系统守护进程和 `kubelet`，可以与该节点上的所有 Pod 通信。\n3.  位于节点主机网络中的 Pod 可以在无需 NAT\
    \ 的情况下与所有节点上的所有 Pod 通信。\n\n上述规则通过确保 Pod 使用其真实的 Pod IP 和容器端口相互通信，而不是将其转换为依赖于部署所在网络基础设施的\
    \ IP 方案，从而简化了网络和应用程序配置。\n\n在 Kubernetes 中，`Pod 网络` 是指当容器运行时在节点上启动 Pod 时，Pod 所连接到的网络。每个部署的\
    \ Pod 在 `Pod 网络` 上都被赋予一个唯一的 IP 地址。`Pod 网络` 必须遵循前面定义的规则，这导致 Pod 使用其真实的 IP 地址。在实施\
    \ `Pod 网络` 时，有许多解决方案可以确保遵守 Kubernetes 网络模型规则。一个常见的解决方案是覆盖网络，它使用隧道协议在节点之间交换数据包，独立于底层物理基础设施的网络。这使得覆盖网络可以使用独立于数据中心物理基础设施的第\
    \ 3 层 IP 方案，从而更简单地遵守 Kubernetes 网络模型。\n\n另一种选择是作为裸机方法的一部分，在数据中心基础设施中构建 `Pod 网络`。这将需要\
    \ Kubernetes 集群管理员和负责网络的网络工程团队的协调。\n\n以下是 Kubernetes 集群中使用的常见通信模式，展示了 Pod 之间的相互访问以及对\
    \ Pod 提供的服务的访问。\n\n### 通信模式\n\n图 3-5 展示了 Kubernetes 集群中的一些示例通信模式。让我们一起看一下这些模式：\n\
    \n![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig5_HTML.jpg](img/494804_1_En_3_Fig5_HTML.jpg)\n\
    \n*图 3-5 Kubernetes 网络*\n\n1.  **Pod 内部**\n    一个 Pod 内的多个容器共享相同的容器命名空间。这些容器可以通过\
    \ `localhost` 在唯一的端口上相互通信。\n2.  **同一节点上的 Pod 之间**\n    当同一节点上的 Pod 需要通过网络通信时，它们通过节点上定义的本地软件桥接进行通信，并使用\
    \ Pod IP。\n3.  **不同节点上的 Pod 之间**\n    当不同节点上的 Pod 需要通过网络通信时，它们通过本地第 2 层或第 3 层网络使用\
    \ Pod IP 进行通信。\n4.  **服务**\n    当访问集群中的 `服务` 时，流量被路由到实现该 `服务` 的 `kube-proxy`，然后再路由到提供该应用程序服务的\
    \ Pod。正如本章前面介绍的，`服务` 将是您在集群中部署应用程序时最常进行的交互方式。\n\n## 总结\n\n本章介绍了 Kubernetes 以及它如何实现现代基于容器的应用程序的部署。您了解了\
    \ Kubernetes API 如何让您构建和建模要部署到 Kubernetes 集群中的应用程序。您还学习了部署工作负载的核心 API 原语：作为基于容器的应用程序的\
    \ `Pod`；保持集群及其工作负载处于期望状态的 `控制器`；用于访问应用程序的 `服务`；以及用于有状态应用程序的 `存储`。然后，您了解了集群的组件以及它们如何协同工作以确保您的期望状态得以实现，并且我们快速浏览了\
    \ Kubernetes 网络模型。在掌握了所有这些理论之后，现在该进入下一章了，在下一章中，我们将向您展示如何构建一个 Kubernetes 集群并让一个基本的工作负载启动并运行。\n\
    \n# 第二部分 Kubernetes 实践\n\n# 4. 安装 Kubernetes\n\n在本章中，我们将介绍如何在本地和云端构建 Kubernetes\
    \ 集群。我们将首先讨论安装地点（本地或云端）的决策过程以及在此过程中需要考虑的因素。然后，我们将介绍使用 `kubeadm` 安装方法在本地构建基于虚拟机的\
    \ Kubernetes 集群的过程。接下来，我们将在 Azure Kubernetes 服务中构建一个集群。这些集群将成为本书其余部分所有示例的基础。"
- fmt: '## 安装考虑因素与方法


    与几乎所有现代软件安装一样，您首先需要决定的是：在本地安装还是在云端安装。


    ### 部署位置？


    在云端部署时，您需要在两个主要的部署选项之间做出选择：


    *   **基础设施即服务 (IaaS)**：在 IaaS 场景中，您在云中部署`虚拟机`，然后在其上安装 Kubernetes。


    *   **平台即服务 (PaaS)**：Kubernetes 也可从[所有主要的云提供商](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597%2526startTime%253D47.4)处作为托管服务获得。在托管服务产品中，[您无需担心任何底层](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597%2526startTime%253D53.94)[基础设施或冗余；云提供商会为您处理。](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597%2526startTime%253D56.1)
    使用 PaaS 需要考虑的一点是，您将在版本控制和其他 Kubernetes 内部可用的功能以及访问控制平面节点方面失去一些灵活性。


    *   在本地部署时，决定因素同样是安装在虚拟机上还是直接安装在`裸机`上。虽然本地也有托管产品可用，但这些超出了本书的范围。


    在节点选择裸机还是虚拟机，主要取决于您的预期工作负载。如果您谈论的是大量可扩展的微服务，在虚拟机上运行的 Kubernetes 节点可能会为您提供更多灵活性。如果您部署的是一个大型的单体应用程序，中间的虚拟机管理程序将产生不必要的开销。您可能想知道：如果只运行一个应用程序，Kubernetes
    是最好的平台吗？和往常一样，答案是：视情况而定！虽然这不是一个显而易见的用例，但有一些像 SQL Server 大数据集群这样的应用程序（我们将在第 10
    章更深入地讨论）通常需要专用基础设施，但它们只部署在 Kubernetes 上。


    在本书中，我们将主要关注使用第 1 章中描述的设置、使用自管理（本地或 IaaS）机器的环境。无论您是将这些机器作为云端或本地的虚拟机安装，还是在裸机上安装，都不重要，因为
    Kubernetes 抽象了底层基础设施。


    展望未来，考虑在何处安装生产集群……这个问题应遵循您组织的总体战略。如果到目前为止您所有的应用都还在本地，那么让您的 Kubernetes 集群也生活在那里可能非常合理。另一方面，如果您正在迁移或已经将主要工作负载迁移到云端，您的
    Kubernetes 集群很可能也应该跟随。最终，这取决于您团队的技能组合以及在 Kubernetes 上运行用例的需求。


    ### 进一步考虑因素


    除了“在哪里”的问题，当然还有其他考虑因素，我们将在本章及本书的后续内容中更深入地讨论：


    *   您需要多少个工作节点来支持您的工作负载？


    *   这些节点的 CPU 和 RAM 配置是什么？


    *   如果控制平面失败，您是否需要高可用的解决方案？


    *   您的备份和恢复策略是什么？


    *   您将使用哪种存储？


    *   您将如何管理 Pod 和节点之间的网络？


    虽然我们正处于 Kubernetes 之旅的起点，但在考虑推出生产系统之前，这些都是您应该回答的问题。


    ### 安装方法


    根据您的安装位置，这在很大程度上也决定了您的安装方法。安装自管理集群时，您主要可以选择`kubeadm`（这是一种在`Linux`上部署 Kubernetes
    的免费方式）或类似 Red Hat OpenShift 的企业产品。安装本身通常通过命令行工具触发。


    当安装基于云的集群时，您的云提供商将负责安装部分，具体细节由您的云提供商在幕后决定。他们通常也提供自己的基于命令行的方法以及用于引导部署的 Web 门户。


    ### 其他选项


    还有一些其他选项，例如使用`Docker Desktop`在您的笔记本电脑上启动 Kubernetes 集群，或使用像树莓派这样的轻量级硬件作为部署目标。虽然它们可能有有效的用例，特别是在非生产环境中，但我们不会在本书中深入探讨这些。


    此外，虽然可以使用基于 Windows 的工作节点，但我们将重点使用`Linux`作为我们的操作系统。


    我们也不会详细介绍部署单节点集群的细节。如果您只有一台可用的`Ubuntu`机器，您可以使用清单 4-1 中的代码，它将启动一个包含`本地存储`的单节点集群，但这对于本书中的大多数练习来说是不够的，除了最基本的一些。


    ```bash

    wget -q -O deploy_kubeadm.sh https://bookmark.ws/ArcDemo_Linux

    chmod +x deploy_kubeadm.sh

    ./deploy_kubeadm.sh

    ```

    清单 4-1

    安装单节点集群


    ## 安装要求


    对于自管理的 Kubernetes 安装，我们将重点关注在 Linux（更具体地说是 Ubuntu）上使用`kubeadm`。虽然 CentOS、RHEL
    和其他 Linux 发行版也受支持，但我们必须选择一个环境，而 Ubuntu 似乎是如今最常见的选择。


    最低系统要求是具有两个 CPU、2GB RAM 并禁用交换空间的系统。然而，Kubernetes 组件的这一最低要求不支持任何有意义的工作负载。请确保您使用的是第
    1 章中规定的环境。在生产环境中，还要确保您已考虑到可扩展性和冗余性。


    [除了这些基本系统要求之外，](https://app.pluralsight.com/course-player%253FclipId%253D982d8f0e-d017-4f76-8bd5-c243179677d4%2526startTime%253D43.84)[您还需要一个
    CRI（容器运行时接口）容器运行时。](https://app.pluralsight.com/course-player%253FclipId%253D982d8f0e-d017-4f76-8bd5-c243179677d4%2526startTime%253D47.32)
    截至撰写本文时，Kubernetes 同时支持 Docker 和`containerd`。由于 Docker 在 Kubernetes 1.20 中已被弃用，并且其支持将在
    Kubernetes 1.23 或更高版本中被移除，因此在本书中我们将主要关注`containerd`。'
  raw: '## [Installation Considerations](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597)
    and Methods


    As with pretty much any modern software installation, the first thing you need
    to decide is: Will you be installing on-premises or to a cloud.


    ### Where to Deploy?


    When deploying to a cloud, you need to choose between two major deployment options:


    *   **Infrastructure as a Service (IaaS):** In an IaaS scenario, you deploy *virtual
    machines* within your cloud and then install Kubernetes on top of that.


    *   **Platform as a Service (PaaS):** [Kubernetes is also available as a managed
    service](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597%2526startTime%253D44.92)
    from [all the big cloud providers.​](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597%2526startTime%253D47.4)
    In a managed service offering, [you don’t have to worry about any of the underlying](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597%2526startTime%253D53.94)
    [infrastructure or redundancy; the cloud provider handles that for you.​](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597%2526startTime%253D56.1)
    One thing to consider with PaaS is that you will lose some flexibility in versioning
    and other features that are available inside Kubernetes as well as the access
    to the Control Plane Nodes.


    *   When deploying on-premises, the decision comes down to installing on virtual
    machines as well or directly on *bare metal*. While there are managed offerings
    available on-premises as well, those are out of the scope of this book.


    The decision between bare metal and virtual machines as your nodes mainly comes
    down to your anticipated workload. If you’re talking about a lot of scalable microservices,
    Kubernetes Nodes running on VMs will probably give you a lot of extra flexibility.
    If you’re deploying one large single application, the hypervisor in between will
    require unnecessary overhead. You may be wondering: If you’re only running a single
    application, is Kubernetes even the best platform for this? As so often, the answer
    is it depends! While it may not be an obvious use case, there are applications
    like SQL Server Big Data Clusters, which we’ll discuss in more depth in Chapter
    [10](#494804_1_En_10_Chapter.xhtml). While they often warrant dedicated infrastructure,
    they only deploy on Kubernetes.


    In this book, we will mostly be focusing on an environment using self-managed
    (on-premises or Infrastructure as a Service) machines using a setup as described
    in Chapter [1](#494804_1_En_1_Chapter.xhtml). It doesn’t matter if you installed
    those machines as VMs in the cloud, on-premises, or on bare metal, as Kubernetes
    abstracts the infrastructure away.


    Going forward, looking on where to install a potential production cluster… That
    question should follow your organization’s general strategy. If all you do so
    far is still on-premises, it might make perfect sense for your Kubernetes cluster
    to live there as well. If on the other hand you’re in the process of migrating
    or already have migrated major workloads to the cloud, your Kubernetes Cluster
    probably should follow. In the end, this comes down to your team’s skillset and
    the requirements of your use cases to run on Kubernetes.


    ### Further Considerations


    Besides the *where* question, there are of course other considerations about which
    we’ll be talking in more depth over the course of this chapter and the remainder
    of the book:


    *   How many Worker Nodes do you need to support your workload?


    *   What’s the CPU and RAM configuration of those nodes?


    *   Do you need a highly available solution in case the Control Plane fails?


    *   What is your backup and restore strategy?


    *   What kind of storage(s) are you going to use?


    *   How are you going to manage networking between pods and nodes?


    While we’re at the beginning of your Kubernetes journey, those are all questions
    that you should have an answer for before considering a rollout of a production
    system.


    ### [Installation Methods](https://app.pluralsight.com/course-player%253FclipId%253Dab5f2a68-44ce-4942-b2bf-2ace5886e3f1)


    Depending on where you’re installing, this will also for the most part determine
    your installation method. When installing a self-managed cluster, you can choose
    mainly kubeadm, which is a free way of deploying Kubernetes on *Linux* or enterprise
    offerings like Red Hat OpenShift. The installation itself is usually triggered
    through command line tools.


    When installing a cloud-based cluster, your cloud provider will take care of the
    installation part with the exact details behind the scenes being determined by
    your cloud provider. They usually offer their own command line–based approaches
    as well as web portals for a guided deployment.


    ### Additional Options


    There are a bunch of additional options like using *Docker* Desktop to spin up
    a Kubernetes Cluster on your laptop or using lightweight hardware like a Raspberry
    Pi as your deployment target. While they may have valid use cases, especially
    in non-production environments, we will not go into depth on these in this book.


    Also, while there are options to use Windows-based Worker Nodes, we will be focusing
    on using Linux as our operating system.


    We also will not be going through the details of deploying a single-node cluster.
    If you only have a single *Ubuntu* machine available, you can use the code in
    Listing [4-1](#494804_1_En_4_Chapter.xhtml#PC1), which will spin up a single-node
    cluster including *local storage,* but this will not be sufficient for most of
    the exercises through this book, except for the most basic ones.


    ```

    wget -q -O deploy_kubeadm.sh https://bookmark.ws/ArcDemo_Linux

    chmod +x deploy_kubeadm.sh

    ./deploy_kubeadm.sh

    Listing 4-1

    Install single-node cluster

    ```


    ## [Installation Requirements](https://app.pluralsight.com/course-player%253FclipId%253D982d8f0e-d017-4f76-8bd5-c243179677d4)


    For a self-managed Kubernetes installation, we will be focusing on kubeadm on
    Linux, more specifically Ubuntu. While CentOS, RHEL, and other Linux distributions
    are also supported, we just had to decide on one environment, and Ubuntu seems
    to be the most common choice these days.


    The bare minimum system requirements are a system with two CPUs, 2GB on RAM, and
    swap disabled. This minimum requirement for the Kubernetes components doesn’t
    support any meaningful workloads though. Please make sure that you’re using an
    environment as laid out in Chapter [1](#494804_1_En_1_Chapter.xhtml). In a production
    environment, also make sure you have accounted for scalability and redundancy.


    [In addition to those base system requirements,](https://app.pluralsight.com/course-player%253FclipId%253D982d8f0e-d017-4f76-8bd5-c243179677d4%2526startTime%253D43.84)
    [you’ll also need a CRI (Container Runtime Interface) container runtime.​](https://app.pluralsight.com/course-player%253FclipId%253D982d8f0e-d017-4f76-8bd5-c243179677d4%2526startTime%253D47.32)
    As of the time of writing, Kubernetes supports both Docker and *containerd*. As
    Docker has been deprecated in Kubernetes 1.20 and its support will be removed
    in Kubernetes version 1.23 or later, we will mainly focus on containerd in this
    book.'
  trans: '

    ## 安装考虑因素与方法


    与几乎所有现代软件安装一样，您首先需要决定的是：在本地安装还是在云端安装。


    ### 部署位置？


    在云端部署时，您需要在两个主要的部署选项之间做出选择：


    *   **基础设施即服务 (IaaS)**：在 IaaS 场景中，您在云中部署`虚拟机`，然后在其上安装 Kubernetes。


    *   **平台即服务 (PaaS)**：Kubernetes 也可从[所有主要的云提供商](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597%2526startTime%253D47.4)处作为托管服务获得。在托管服务产品中，[您无需担心任何底层](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597%2526startTime%253D53.94)[基础设施或冗余；云提供商会为您处理。](https://app.pluralsight.com/course-player%253FclipId%253D5f4148df-26ef-4ce3-a052-f7c6a91da597%2526startTime%253D56.1)
    使用 PaaS 需要考虑的一点是，您将在版本控制和其他 Kubernetes 内部可用的功能以及访问控制平面节点方面失去一些灵活性。


    *   在本地部署时，决定因素同样是安装在虚拟机上还是直接安装在`裸机`上。虽然本地也有托管产品可用，但这些超出了本书的范围。


    在节点选择裸机还是虚拟机，主要取决于您的预期工作负载。如果您谈论的是大量可扩展的微服务，在虚拟机上运行的 Kubernetes 节点可能会为您提供更多灵活性。如果您部署的是一个大型的单体应用程序，中间的虚拟机管理程序将产生不必要的开销。您可能想知道：如果只运行一个应用程序，Kubernetes
    是最好的平台吗？和往常一样，答案是：视情况而定！虽然这不是一个显而易见的用例，但有一些像 SQL Server 大数据集群这样的应用程序（我们将在第 10
    章更深入地讨论）通常需要专用基础设施，但它们只部署在 Kubernetes 上。


    在本书中，我们将主要关注使用第 1 章中描述的设置、使用自管理（本地或 IaaS）机器的环境。无论您是将这些机器作为云端或本地的虚拟机安装，还是在裸机上安装，都不重要，因为
    Kubernetes 抽象了底层基础设施。


    展望未来，考虑在何处安装生产集群……这个问题应遵循您组织的总体战略。如果到目前为止您所有的应用都还在本地，那么让您的 Kubernetes 集群也生活在那里可能非常合理。另一方面，如果您正在迁移或已经将主要工作负载迁移到云端，您的
    Kubernetes 集群很可能也应该跟随。最终，这取决于您团队的技能组合以及在 Kubernetes 上运行用例的需求。


    ### 进一步考虑因素


    除了“在哪里”的问题，当然还有其他考虑因素，我们将在本章及本书的后续内容中更深入地讨论：


    *   您需要多少个工作节点来支持您的工作负载？


    *   这些节点的 CPU 和 RAM 配置是什么？


    *   如果控制平面失败，您是否需要高可用的解决方案？


    *   您的备份和恢复策略是什么？


    *   您将使用哪种存储？


    *   您将如何管理 Pod 和节点之间的网络？


    虽然我们正处于 Kubernetes 之旅的起点，但在考虑推出生产系统之前，这些都是您应该回答的问题。


    ### 安装方法


    根据您的安装位置，这在很大程度上也决定了您的安装方法。安装自管理集群时，您主要可以选择`kubeadm`（这是一种在`Linux`上部署 Kubernetes
    的免费方式）或类似 Red Hat OpenShift 的企业产品。安装本身通常通过命令行工具触发。


    当安装基于云的集群时，您的云提供商将负责安装部分，具体细节由您的云提供商在幕后决定。他们通常也提供自己的基于命令行的方法以及用于引导部署的 Web 门户。


    ### 其他选项


    还有一些其他选项，例如使用`Docker Desktop`在您的笔记本电脑上启动 Kubernetes 集群，或使用像树莓派这样的轻量级硬件作为部署目标。虽然它们可能有有效的用例，特别是在非生产环境中，但我们不会在本书中深入探讨这些。


    此外，虽然可以使用基于 Windows 的工作节点，但我们将重点使用`Linux`作为我们的操作系统。


    我们也不会详细介绍部署单节点集群的细节。如果您只有一台可用的`Ubuntu`机器，您可以使用清单 4-1 中的代码，它将启动一个包含`本地存储`的单节点集群，但这对于本书中的大多数练习来说是不够的，除了最基本的一些。


    ```bash

    wget -q -O deploy_kubeadm.sh https://bookmark.ws/ArcDemo_Linux

    chmod +x deploy_kubeadm.sh

    ./deploy_kubeadm.sh

    ```

    清单 4-1

    安装单节点集群


    ## 安装要求


    对于自管理的 Kubernetes 安装，我们将重点关注在 Linux（更具体地说是 Ubuntu）上使用`kubeadm`。虽然 CentOS、RHEL
    和其他 Linux 发行版也受支持，但我们必须选择一个环境，而 Ubuntu 似乎是如今最常见的选择。


    最低系统要求是具有两个 CPU、2GB RAM 并禁用交换空间的系统。然而，Kubernetes 组件的这一最低要求不支持任何有意义的工作负载。请确保您使用的是第
    1 章中规定的环境。在生产环境中，还要确保您已考虑到可扩展性和冗余性。


    [除了这些基本系统要求之外，](https://app.pluralsight.com/course-player%253FclipId%253D982d8f0e-d017-4f76-8bd5-c243179677d4%2526startTime%253D43.84)[您还需要一个
    CRI（容器运行时接口）容器运行时。](https://app.pluralsight.com/course-player%253FclipId%253D982d8f0e-d017-4f76-8bd5-c243179677d4%2526startTime%253D47.32)
    截至撰写本文时，Kubernetes 同时支持 Docker 和`containerd`。由于 Docker 在 Kubernetes 1.20 中已被弃用，并且其支持将在
    Kubernetes 1.23 或更高版本中被移除，因此在本书中我们将主要关注`containerd`。

    '
- fmt: '### Network Requirements


    From a networking perspective, make sure that all machines have unique hostnames,
    MAC addresses, and IP addresses. Those IP addresses should ideally be on the same
    subnet, but at the very least must be set up to reach each other.


    If you are running a firewall within your network (for the purpose of the labs
    in this book, we recommend not to run a firewall, simply to avoid running into
    unnecessary complications with network), Table [4-1](#494804_1_En_4_Chapter.xhtml#Tab1)
    lists all the TCP ports that need to be reachable on the Control Plane.


    Table 4-1


    Required TCP Ports on Control Plane Node


    | Component | TCP Port(s) |

    | --- | --- |

    | API | 6443 |

    | Etcd | 2379–2380 |

    | Scheduler | 10251 |

    | Controller Manager | 10252 |

    | Kubelet | 10250 |


    On the nodes, the ports listed in Table [4-2](#494804_1_En_4_Chapter.xhtml#Tab2)
    need to be opened.


    Table 4-2


    Required TCP Ports on Worker Nodes


    | Component | TCP Port(s) |

    | --- | --- |

    | Kubelet | 10250 |

    | NodePort | 30000–32767 |


    Note


    The TCP ports listed here are the default ports. In case you changed those, adjust
    your firewall rules accordingly.


    ### [Getting Kubernetes](https://app.pluralsight.com/course-player%253FclipId%253Db0f4845d-f2a5-4a1a-a790-a39ccf314435)


    Of course, to install Kubernetes, we need to get Kubernetes. The Kubernetes software
    is maintained on GitHub, so if you go to [*https://GitHub.com/Kubernetes/Kubernetes/*](https://github.com/Kubernetes/Kubernetes/),
    you will find the Kubernetes project. You can also contribute your own ideas and
    changes to the project. This is also a very valuable resource to understand in
    detail how things work since you can view the code and learn from other people’s
    experiences with GitHub issues.


    In addition to the software itself, this is also where you will find additional
    documentation.


    While in theory you could get the code and compile everything on your own, we’ll
    make our lives a bit easier and install Kubernetes through a package manager.


    ## Building a Self-Managed Cluster


    With that theory in place, let’s get to work and build our very first Kubernetes
    Cluster running on Ubuntu machines using `kubeadm`. We will be using the environment
    as described in Chapter [1](#494804_1_En_1_Chapter.xhtml) including the prerequisites
    mentioned there.


    Note


    All our scripts are using the hostnames/IP addresses as described in Chapter [1](#494804_1_En_1_Chapter.xhtml).
    If you did build your lab using different settings, you will need to adjust those
    scripts accordingly. For readability purposes, we’ll not be pointing out every
    single instance where this may be required individually.


    ### Getting the VMs Ready


    First, we need to get our four VMs (`control` as well as `node-1`, `node-2`, and
    `node-3`) ready and install both `containerd` and the Kubernetes packages. Install
    and configure them on each of those machines as described in the next two paragraphs.
    There is no need to install `containerd` on the storage machine.


    Unless mentioned otherwise, just run the commands as stated using a shell on each
    of the machines. This installation cannot be triggered directly from our administrative
    workstation.


    #### Installing and Configuring containerd


    To install `containerd`, we need to load two modules (`overlay` and `br_netfilter`)
    using the code in Listing [4-2](#494804_1_En_4_Chapter.xhtml#PC2). They are needed
    for the OverlayFS used by the container runtime as well as for networking inside
    the cluster.


    ```

    sudo modprobe overlay

    sudo modprobe br_netfilter

    Listing 4-2

    Install modprobe overlay and br_netfilter

    ```


    Using the code in Listing [4-3](#494804_1_En_4_Chapter.xhtml#PC3), we need to
    make sure those are also loaded on reboot.


    ```

    cat <<EOF | sudo tee /etc/modules-load.d/containerd.conf

    overlay

    br_netfilter

    EOF

    Listing 4-3

    Persist modprobe and br_netfilter

    ```


    `containerd` also requires a few system parameters, which we can set and persist
    using the command in Listing [4-4](#494804_1_En_4_Chapter.xhtml#PC4).


    ```

    cat <<EOF | sudo tee /etc/sysctl.d/99-kubernetes-cri.conf

    net.bridge.bridge-nf-call-iptables  = 1

    net.ipv4.ip_forward                 = 1

    net.bridge.bridge-nf-call-ip6tables = 1

    EOF

    Listing 4-4

    Persist system parameters for containerd

    ```


    Next, let’s apply those settings without rebooting using the command in Listing
    [4-5](#494804_1_En_4_Chapter.xhtml#PC5).


    ```

    sudo sysctl --system

    Listing 4-5

    Apply sysctl changes

    ```


    Now our prerequisites for `containerd` are in place, so we can install it through
    `apt-get` as shown in Listing [4-6](#494804_1_En_4_Chapter.xhtml#PC6).


    ```

    sudo apt-get update

    sudo apt-get install -y containerd

    Listing 4-6

    Install containerd

    ```


    `containerd` requires a configuration file, and we can use `containerd` itself
    to generate one with default settings (Listing [4-7](#494804_1_En_4_Chapter.xhtml#PC7)).


    ```

    sudo mkdir -p /etc/containerd

    sudo containerd config default | sudo tee /etc/containerd/config.toml

    Listing 4-7

    Create containerd config

    ```


    In this file, we must set the cgroup driver for `containerd` to `systemd` as this
    is required for the `kubelet`.


    Open the file `/etc/containerd/config.toml` in a text editor as root (e.g., through
    `vi` as shown in Listing [4-8](#494804_1_En_4_Chapter.xhtml#PC8)).


    ```

    sudo vi /etc/containerd/config.toml

    Listing 4-8

    Edit containerd config

    ```


    In this file, find the section shown in Listing [4-9](#494804_1_En_4_Chapter.xhtml#PC9).


    ```

    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]

    Listing 4-9

    Section in containerd config

    ```


    Below that, add the two lines shown in Listing [4-10](#494804_1_En_4_Chapter.xhtml#PC10).


    ```

    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]

    SystemdCgroup = true

    Listing 4-10

    Lines to be added to containerd config

    ```


    Note


    Indentation matters here – this can be tabs or spaces! Make sure your file looks
    like the one in Figure [4-1](#494804_1_En_4_Chapter.xhtml#Fig1)!


    To exit `vi` and save the file, press `Esc` followed by typing `:x!`.


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig1_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Indentation in containerd config file


    Based on our new settings, we can use `systemctl` to restart `containerd` as shown
    in Listing [4-11](#494804_1_En_4_Chapter.xhtml#PC11).


    ```

    sudo systemctl restart containerd

    Listing 4-11

    Restart containerd

    ```


    `containerd` is now ready for use, and we can move on to the Kubernetes packages.


    You can confirm the status of the service using the command in Listing [4-12](#494804_1_En_4_Chapter.xhtml#PC12).


    ```

    sudo systemctl status containerd

    Listing 4-12

    Status of containerd

    ```'
