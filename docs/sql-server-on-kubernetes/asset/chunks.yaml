  trans: '### 存储池


    存储池为你提供了一个包含 Apache Spark 和 SQL Server 端点的 HDFS 集群。与计算池一样，每个大数据集群（BDC）至少有一个实例作为其存储池的一部分，但根据你的工作负载和用例，你也可以决定使用更多实例。这意味着每个大数据集群都自带其自身的
    HDFS，因此能够自托管你可能需要在集群内使用的任何基于文件的数据。如果你已经拥有一个 HDFS 存储，例如在 Azure Data Lake Store
    (ADLS) 中，你也可以通过所谓的层级化（tiering）将其作为挂载点添加。在这种情况下，你的 ADLS 仅会成为存储池中的一个文件夹。


    ### 数据池


    另一方面，数据池为你提供多个运行在 Linux Pod/实例上的 SQL Server，这些实例可以——再次通过外部表（external table）的概念——用于将单个表横向扩展到它们之上。理论上，你也可以像所有其他池一样，仅用一个实例部署你的数据池。但这只有在你不打算利用数据池的场景下才有意义，因为显然无法仅用一个实例来横向扩展一个表。你可以将数据池上横向扩展的表想象成一个
    `UNION ALL`——你对一个表运行单个查询，却得到了多个物理表的结果。数据池仅支持 `INSERT` 和 `TRUNCATE` 操作，并且不支持事务，因此不要将其视作你的主要数据存储，而应视作
    SQL Server 数据的一个缓存。


    ### 应用池


    最后一个组件是应用池。它允许你通过 Azure Data Studio、Visual Studio Code 或使用 `azdata` 的命令行，将 MLeap、R、Python
    或 SSIS 解决方案部署到其上。这些应用程序随后可以通过交互方式、通过 `REST API` 或基于计划来使用。


    ### BDC 中的 Kubernetes 构造


    每个 BDC 都将部署到它自己的命名空间中，默认是 `mssql-cluster`，位于一个 Kubernetes 集群内。BDC 中的不同组件由独立的 Pod
    表示。在不同的池中，例如数据池的每个实例，都将由其自己的 Pod 表示。通过 `kubectl` 检索到的 BDC 命名空间内 Pod 列表的输出可以在图
    10-3 中看到。


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig3_HTML.jpg](img/494804_1_En_10_Fig3_HTML.jpg)


    图 10-3


    在 BDC 命名空间中执行 `kubectl get pods` 的输出


    在此示例中，我们可以看到此特定部署在数据池和存储池中各有两个实例，而在应用池和计算池中各有一个实例，并且其他组件（如 `metricsdb`、`metricsdc`
    和 `metricsui` Pod）各有一个或多个 Pod，例如这些 Pod 代表了 Grafana 仪表板。正如你可能现在已经察觉到的，我们在第 8 章部署了
    Grafana 和 Kibana，它们作为 Azure Arc 支持的数据服务的一部分交付（如第 9 章所示），并且它们现在再次出现，它们已成为 Kubernetes
    上的 SQL Server 世界中监控和日志管理的既定标准。


    BDC 的端点在 Kubernetes 中通过服务（service）暴露。根据平台的不同，这些服务的类型将是 `NodePort` 或 `LoadBalancer`，正如我们在图
    10-4 的示例中看到的那样。


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig4_HTML.jpg](img/494804_1_En_10_Fig4_HTML.jpg)


    图 10-4


    在 BDC 命名空间中执行 `kubectl get services | grep NodePort` 的输出


    除了这些服务之外，它还公开了许多 `ClusterIP` 服务，以允许服务之间进行通信。


    它还创建了多种不同的集合（sets）——DaemonSets、ReplicaSets 和 StatefulSets。如果我们使用 `kubectl get
    all -n mssql-cluster` 来列出它们，它们都会出现在输出的下部（图 10-5）。


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig5_HTML.jpg](img/494804_1_En_10_Fig5_HTML.jpg)


    图 10-5


    大数据集群中的 Kubernetes 集合


    BDC 中的存储通过存储类和其中的动态配置来寻址。正如你在图 10-6 中看到的，大数据集群会根据需要创建动态持久卷声明（以及底层的卷）。


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig6_HTML.jpg](img/494804_1_En_10_Fig6_HTML.jpg)


    图 10-6


    大数据集群中的 PVC


    如你所见，大数据集群确实将我们迄今为止所涉及的所有内容整合在了一起，从 Kubernetes 对象、监控，当然还有 SQL Server。'
- fmt: '## Deployment


    与 Azure Arc 支持的数据服务类似，大数据集群通过 `azdata` 部署，并且该过程可以再次从命令行或 Azure Data Studio 运行，后者将创建一个笔记本，然后在后台运行
    `azdata`。


    部署 BDC 需要一个正常运行的 Kubernetes 集群，该集群可以运行在 `kubeadm`、AKS、EKS 或 OpenShift 上。


    要部署 BDC，您需要将 Kubernetes 上下文切换到所需的目标集群，并使用代码清单 [10-1](#494804_1_En_10_Chapter.xhtml#PC1)
    中的代码创建一个配置。


    ```

    azdata bdc config init [--path] [--source -s]

    ```

    清单 10-1

    创建 BDC 配置


    `Path` 只是配置文件（`bdc.json` 和 `control.json`）将通过清单 [10-1](#494804_1_En_10_Chapter.xhtml#PC1)
    中的命令创建的文件夹名称。`src` 是起始的现有基础模板之一，例如 `aks-dev-test` 或 `kubeadm-prod`。


    例如，要在名为 `myBDC` 的子文件夹中创建大数据集群配置的完整命令（该集群计划使用典型的开发/测试环境部署在 AKS 上）如清单 [10-2](#494804_1_En_10_Chapter.xhtml#PC2)
    所示。


    ```

    azdata bdc config init --path myBDC –-source aks-dev-test

    ```

    清单 10-2

    创建 BDC 配置


    这些文件将用于配置部署的所有方面，从将大数据集群集成到 Active Directory 以进行 AD 认证，到每个池中的副本数量，再到内存和存储要求。清单
    [10-3](#494804_1_En_10_Chapter.xhtml#PC3) 展示了这两个文件之一 `bdc.json` 的示例。


    ```

    {

    "apiVersion": "v1",

    "metadata": {

    "kind": "BigDataCluster",

    "name": "mssql-cluster"

    },

    "spec": {

    "resources": {

    "nmnode-0": {

    "spec": {

    "replicas": 2

    }

    },

    "sparkhead": {

    "spec": {

    "replicas": 2

    }

    },

    "zookeeper": {

    "spec": {

    "replicas": 3

    }

    },

    "gateway": {

    "spec": {

    "replicas": 1,

    "endpoints": [

    {

    "name": "Knox",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 30443

    }

    ]

    }

    },

    "appproxy": {

    "spec": {

    "replicas": 1,

    "endpoints": [

    {

    "name": "AppServiceProxy",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 30778

    }

    ]

    }

    },

    "master": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Master",

    "replicas": 3,

    "endpoints": [

    {

    "name": "Master",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 31433

    },

    {

    "name": "MasterSecondary",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 31436

    }

    ],

    "settings": {

    "sql": {

    "hadr.enabled": "true"

    }

    }

    }

    },

    "compute-0": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Compute",

    "replicas": 1

    }

    },

    "data-0": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Data",

