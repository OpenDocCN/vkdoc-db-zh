- fmt: '## A Little Helper for Windows Users: Chocolatey


    If you prefer using a Windows client as your administrative workstation, we also
    recommend using a package manager, to automate your installation.


    We’d like to point your attention to `chocolatey` or `choco`. In case you haven’t
    heard about it, `choco` is a free package manager for Windows that will allow
    us to install many of our prerequisites with a single line in PowerShell or a
    command prompt. Given that Windows Servers do not come with an easy-to-use built-in
    package manager, it just makes life much easier. You can find more information
    on [http://chocolatey.org](http://chocolatey.org), and you can even create an
    account and provide your own packages there.


    From a simple user perspective though, there is no need to create an account or
    to download any installer.


    To make `choco` available on your system, open a PowerShell window in Administrative
    mode and run the script shown in Listing 1-10.


    ```

    [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol
    -bor [Net.SecurityProtocolType]::Tls12

    Set-ExecutionPolicy Bypass -Scope Process -Force; iex ((New-Object System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))

    Listing 1-10

    Install script for Chocolatey in PowerShell

    ```


    Once the respective command has completed, `choco` is installed and ready to be
    used.


    ## Tools on Windows


    Now that we have a workstation and `choco` installed on it, let us start with
    a few little helpers that come with Linux by default, but are either missing or
    limited on Windows by default. By running the code in Listing 1-11, we’ll install
    `curl` (to interact with websites), `grep` (to filter output on the command line),
    and `putty` (which also comes with `pscp`, a tool that will allow us to copy data
    from a Linux machine and will also act as our SSH client).


    We will also be installing Chrome, as Internet Explorer (which comes with Windows
    Server by default) is not supported by some of the dashboards we’ll be using.


    ```

    choco install curl -y

    choco install grep -y

    choco install putty -y

    choco install googlechrome -y

    Listing 1-11

    Install script for recommended tools

    ```


    Up next are the `kubernetes-cli`, the `sql command line tools`, and the `Azure
    CLI`, which can be installed through the command in Listing 1-12.


    ```

    choco install kubernetes-cli -y

    choco install sqlserver-cmdlineutils -y

    choco install azure-cli -y

    Listing 1-12

    Install script for kubectl, sqlcmd, and the Azure CLI

    ```


    **Note**


    This will install the latest version of the Kubernetes CLI. For the examples in
    this book, this is fine and what we want. Just be aware that this can cause potential
    issues when working with older Kubernetes Clusters.


    Our last requirement is `azdata`. While it can’t be installed through `choco`
    currently, Microsoft is providing a permalink that makes it easy enough to automate
    its installation as shown in Listing 1-13.


    ```

    curl -o azdata.msi https://aka.ms/azdata-msi

    msiexec /i azdata.msi /passive

    Listing 1-13

    Install script for azdata

    ```


    Depending on which labs you’ll be replicating, some of these tools may not be
    required. Given that they’re all rather lightweight, we’d recommend installing
    them all anyway.


    ## NFS


    As we want our storage node to act as an NFS server, we need to install this as
    well. We’re choosing a single-node NFS for ease of use. A production cluster should
    be using enterprise-class storage.


    Open an SSH session into the `storage` node and save the contents of Listing 1-14
    to a file called `enable-nfs.sh`.


    ```

    #!/bin/bash

    apt install -y nfs-kernel-server

    groupadd mssql -g 10001

    useradd -u 10001 mssql -g mssql

    addgroup --gid 472 grafana

    useradd -g 472 -u 472 grafana

    mkdir -p /srv/exports/volumes/

    chown -R mssql:mssql /srv/exports/volumes/

    echo ''/srv/exports 172.16.94.0/24(rw,sync,no_subtree_check,no_root_squash)''
    > exports

    chmod 644 exports

    mv exports /etc/exports

    exportfs -a

    systemctl restart nfs-kernel-server

    mkdir /srv/exports/volumes/sql-instance-1

    chown -R mssql:mssql /srv/exports/volumes/

    mkdir /srv/exports/volumes/influxdb

    mkdir /srv/exports/volumes/grafana

    chown 472:472 /srv/exports/volumes/grafana

    mkdir /srv/exports/volumes/webcontent

    echo "Hello World!!!" >  /srv/exports/volumes/webcontent/index.html

    Listing 1-14

    enable-nfs.sh

    ```


    This script will install the NFS server, create a directory for its contents (as
    well as some directories we’ll use later for our first SQL Server deployment),
    and start the service. To run this script, you need to make it executable and
    run it as root as shown in Listing 1-15.


    ```

    chmod +x enable-nfs.sh

    sudo ./enable-nfs.sh

    Listing 1-15

    Run enable-nfs.sh

    ```


    Your NFS server is now ready and accessible.


    On the other machines, install the NFS utilities using the command in Listing
    1-16. This needs to be executed on every other VM individually.


    ```

    sudo apt install -y nfs-common

    Listing 1-16

    Install NFS utilities on NFS clients

    ```


    Test the connection from any client machine by mounting the NFS share using the
    code in Listing 1-17 and listing its content.


    ```

    sudo mount -t nfs storage:/srv/exports /mnt

    ls -al /mnt/volumes

    Listing 1-17

    Verify NFS connection on NFS clients

    ```


    The result from Listing 1-17 should look like what we see in Figure 1-1.


    ![../images/494804_1_En_1_Chapter/494804_1_En_1_Fig1_HTML.jpg](images/494804_1_En_1_Chapter/494804_1_En_1_Fig1_HTML.jpg)


    Figure 1-1

    NFS test from node1


    ## System Swap Settings


    As our last step, let’s ensure that swap is disabled on our Control Plane as well
    as the three nodes, as this is a requirement of the `kubelet`.


    Open an individual SSH connection into each of them and run the command in Listing
    1-18.


    ```

    swapoff -a

    Listing 1-18

    Disable swap

    ```


    Also remove any swap partitions from `/etc/fstab`. If you created your VMs using
    our script in Azure, this is not required.


    ## Summary


    In this chapter, we have laid the foundation for the labs we will perform together
    throughout the book. We will start off with deploying SQL Server as a container
    in Docker. Then we’ll move on to building our Kubernetes cluster together and
    deploying SQL Server and demo applications and databases in that cluster. In addition
    to the cluster, we also highlighted the tools needed for interacting with the
    applications and databases we will deploy in our cluster.


    # 2. Container Fundamentals


    Containers are changing the way applications are deployed. In this chapter, we
    will begin with the benefits of container-based application deployment and lay
    a solid technical foundation of container fundamentals introducing operations
    such as creating and running containers and persisting data. The chapter will
    close with the need for container orchestrators and introduce Kubernetes and its
    benefits. The goal of this chapter is, if you have never seen a container before,
    to become proficient in container basics before moving on to container orchestration
    with Kubernetes.'
  raw: '#### A Little Helper for Windows Users: Chocolatey


    If you prefer using a Windows client as your administrative workstation, we also
    recommend using a package manager, to automate your installation.


    We’d like to point your attention to Chocolatey or “choco.” In case you haven’t
    heard about it, choco is a free package manager for Windows that will allow us
    to install many of our prerequisites with a single line in PowerShell or a command
    prompt. Given that Windows Servers do not come with an easy-to-use built-in package
    manager, it just makes life much easier. You can find more information on [*http://chocolatey.org*](http://chocolatey.org),
    and you can even create an account and provide your own packages there.


    From a simple user perspective though, there is no need to create an account or
    to download any installer.


    To make choco available on your system, open a PowerShell window in Administrative
    mode and run the script shown in Listing [1-10](#494804_1_En_1_Chapter.xhtml#PC10).


    ```

    [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol
    -bor [Net.SecurityProtocolType]::Tls12

    Set-ExecutionPolicy Bypass -Scope Process -Force; iex ((New-Object System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))

    Listing 1-10

    Install script for Chocolatey in PowerShell

    ```


    Once the respective command has completed, choco is installed and ready to be
    used.


    #### Tools on Windows


    Now that we have a workstation and choco installed on it, let us start with a
    few little helpers that come with Linux by default, but are either missing or
    limited on Windows by default. By running the code in Listing [1-11](#494804_1_En_1_Chapter.xhtml#PC11),
    we’ll install *curl* (to interact with websites), *grep* (to filter output on
    the command line), and *putty* (which also comes with *pscp*, a tool that will
    allow us to copy data from a Linux machine and will also act as our SSH client).


    We will also be installing Chrome, as Internet Explorer (which comes with Windows
    Server by default) is not supported by some of the dashboards we’ll be using.


    ```

    choco install curl -y

    choco install grep -y

    choco install putty -y

    choco install googlechrome -y

    Listing 1-11

    Install script for recommended tools

    ```


    Up next are the *kubernetes-cli*, *the sql command line tools,* and the *Azure
    CLI*, which can be installed through the command in Listing [1-12](#494804_1_En_1_Chapter.xhtml#PC12).


    ```

    choco install kubernetes-cli -y

    choco install sqlserver-cmdlineutils -y

    choco install azure-cli -y

    Listing 1-12

    Install script for kubectl, sqlcmd, and the Azure CLI

    ```


    Note


    This will install the latest version of the Kubernetes CLI. For the examples in
    this book, this is fine and what we want. Just be aware that this can cause potential
    issues when working with older Kubernetes Clusters.


    Our last requirement is *azdata*. While it can’t be installed through choco currently,
    Microsoft is providing a permalink that makes it easy enough to automate its installation
    as shown in Listing [1-13](#494804_1_En_1_Chapter.xhtml#PC13).


    ```

    curl -o azdata.msi https://aka.ms/azdata-msi

    msiexec /i azdata.msi /passive

    Listing 1-13

    Install script for azdata

    ```


    Depending on which labs you’ll be replicating, some of these tools may not be
    required. Given that they’re all rather lightweight, we’d recommend installing
    them all anyway.


    ## NFS


    As we want our storage node to act as an NFS server, we need to install this as
    well. We’re choosing a single-node NFS for ease of use. A production cluster should
    be using enterprise-class storage.


    Open an SSH session into the *storage* node and save the contents of Listing [1-14](#494804_1_En_1_Chapter.xhtml#PC14)
    to a file called enable-nfs.sh.


    ```

    #!/bin/bash

    apt install -y nfs-kernel-server

    groupadd mssql -g 10001

    useradd -u 10001 mssql -g mssql

    addgroup --gid 472 grafana

    useradd -g 472 -u 472 grafana

    mkdir -p /srv/exports/volumes/

    chown -R mssql:mssql /srv/exports/volumes/

    echo ''/srv/exports 172.16.94.0/24(rw,sync,no_subtree_check,no_root_squash)''
    > exports

    chmod 644 exports

    mv exports /etc/exports

    exportfs -a

    systemctl restart nfs-kernel-server

    mkdir /srv/exports/volumes/sql-instance-1

    chown -R mssql:mssql /srv/exports/volumes/

    mkdir /srv/exports/volumes/influxdb

    mkdir /srv/exports/volumes/grafana

    chown 472:472 /srv/exports/volumes/grafana

    mkdir /srv/exports/volumes/webcontent

    echo "Hello World!!!" >  /srv/exports/volumes/webcontent/index.html

    Listing 1-14

    enable-nfs.sh

    ```


    This script will install the NFS server, create a directory for its contents (as
    well as some directories we’ll use later for our first SQL Server deployment),
    and start the service. To run this script, you need to make it executable and
    run it as root as shown in Listing [1-15](#494804_1_En_1_Chapter.xhtml#PC15) .


    ```

    chmod +x enable-nfs.sh

    sudo ./enable-nfs.sh

    Listing 1-15

    Run enable-nfs.sh

    ```


    Your NFS server is now ready and accessible.


    On the other machines, install the NFS utilities using the command in Listing
    [1-16](#494804_1_En_1_Chapter.xhtml#PC16). This needs to be executed on every
    other VM individually.


    ```

    sudo apt install -y nfs-common

    Listing 1-16

    Install NFS utilities on NFS clients

    ```


    Test the connection from any client machine by mounting the NFS share using the
    code in Listing [1-17](#494804_1_En_1_Chapter.xhtml#PC17) and listing its content.


    ```

    sudo mount -t nfs storage:/srv/exports /mnt

    ls -al /mnt/volumes

    Listing 1-17

    Verify NFS connection on NFS clients

    ```


    The result from Listing [1-17](#494804_1_En_1_Chapter.xhtml#PC17) should look
    like what we see in Figure [1-1](#494804_1_En_1_Chapter.xhtml#Fig1).


    ![../images/494804_1_En_1_Chapter/494804_1_En_1_Fig1_HTML.jpg](images/494804_1_En_1_Chapter/494804_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    NFS test from node1


    ## System Swap Settings


    As our last step, let’s ensure that swap is disabled on our Control Plane as well
    as the three nodes, as this is a requirement of the kubelet.


    Open an individual SSH connection into each of them and run the command in Listing
    [1-18](#494804_1_En_1_Chapter.xhtml#PC18).


    ```

    swapoff -a

    Listing 1-18

    Disable swap

    ```


    Also remove any swap partitions from */etc/fstab*. If you created your VMs using
    our script in Azure, this is not required.


    ## Summary


    In this chapter, we have laid the foundation for the labs we will perform together
    throughout the book. We will start off with deploying SQL Server as a container
    in Docker. Then we’ll move on to building our Kubernetes cluster together and
    deploying SQL Server and demo applications and databases in that cluster. In addition
    to the cluster, we also highlighted the tools needed for interacting with the
    applications and databases we will deploy in our cluster.


    # 2. Container Fundamentals


    Containers are changing the way applications are deployed. In this chapter, we
    will begin with the benefits of container-based application deployment and lay
    a solid technical foundation of container fundamentals introducing operations
    such as creating and running containers and persisting data. The chapter will
    close with the need for container orchestrators and introduce Kubernetes and its
    benefits. The goal of this chapter is, if you have never seen a container before,
    to become proficient in container basics before moving on to container orchestration
    with Kubernetes.'
  trans: '

    ## Windows 用户的小助手：Chocolatey


    如果你更喜欢使用 Windows 客户端作为你的管理工作站，我们也建议你使用一个包管理器来自动化安装过程。


    我们想请你注意 `chocolatey` 或 `choco`。如果你没听说过它，`choco` 是一个免费的 Windows 包管理器，它将允许我们通过 PowerShell
    或命令提示符中的一行命令安装许多先决条件。鉴于 Windows Server 没有自带一个易于使用的内置包管理器，这确实让生活轻松多了。你可以在 [`chocolatey.org`](http://chocolatey.org)
    上找到更多信息，你甚至可以在那里创建账户并提供你自己的软件包。


    不过，从一个简单的用户角度来看，你没有必要创建账户或下载任何安装程序。


    要让你的系统可以使用 `choco`，请以管理员模式打开一个 PowerShell 窗口，并运行清单 1-10 中所示的脚本。


    ```

    [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol
    -bor [Net.SecurityProtocolType]::Tls12

    Set-ExecutionPolicy Bypass -Scope Process -Force; iex ((New-Object System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))

    清单 1-10

    在 PowerShell 中安装 Chocolatey 的脚本

    ```


    相应的命令执行完成后，`choco` 就安装好并可以使用了。


    ## Windows 上的工具


    既然我们已经有一个工作站并在其上安装了 `choco`，让我们从一些在 Linux 中默认自带的小工具开始，这些工具在 Windows 上默认要么缺失，要么功能受限。通过运行清单
    1-11 中的代码，我们将安装 `curl`（用于与网站交互）、`grep`（用于在命令行上过滤输出）和 `putty`（它也附带了 `pscp`，一个允许我们从
    Linux 机器复制数据并同时作为我们 SSH 客户端的工具）。


    我们还将安装 Chrome，因为 Internet Explorer（Windows Server 默认自带）不被我们将使用的一些仪表板所支持。


    ```

    choco install curl -y

    choco install grep -y

    choco install putty -y

    choco install googlechrome -y

    清单 1-11

    安装推荐工具的脚本

    ```


    接下来是 `kubernetes-cli`、`sql command line tools` 和 `Azure CLI`，它们可以通过清单 1-12 中的命令安装。


    ```

    choco install kubernetes-cli -y

    choco install sqlserver-cmdlineutils -y

    choco install azure-cli -y

    清单 1-12

    安装 kubectl、sqlcmd 和 Azure CLI 的脚本

    ```


    **注意**


    这将安装最新版本的 Kubernetes CLI。对于本书中的示例来说，这没问题，也是我们想要的。只是要注意，当与较旧的 Kubernetes 集群一起工作时，这可能会导致潜在问题。


    我们的最后一个需求是 `azdata`。虽然目前它无法通过 `choco` 安装，但微软提供了一个永久链接，使得自动化安装变得足够简单，如清单 1-13 所示。


    ```

    curl -o azdata.msi https://aka.ms/azdata-msi

    msiexec /i azdata.msi /passive

    清单 1-13

    安装 azdata 的脚本

    ```


    根据你将要复现的实验，其中一些工具可能不是必需的。鉴于它们都相当轻量级，我们还是建议你全部安装。


    ## NFS


    因为我们希望我们的存储节点充当 NFS 服务器，所以我们需要安装这个服务。为了易于使用，我们选择单节点 NFS。生产集群应使用企业级存储。


    通过 SSH 登录到 `storage` 节点，并将清单 1-14 的内容保存到一个名为 `enable-nfs.sh` 的文件中。


    ```

    #!/bin/bash

    apt install -y nfs-kernel-server

    groupadd mssql -g 10001

    useradd -u 10001 mssql -g mssql

    addgroup --gid 472 grafana

    useradd -g 472 -u 472 grafana

    mkdir -p /srv/exports/volumes/

    chown -R mssql:mssql /srv/exports/volumes/

    echo ''/srv/exports 172.16.94.0/24(rw,sync,no_subtree_check,no_root_squash)''
    > exports

    chmod 644 exports

    mv exports /etc/exports

    exportfs -a

    systemctl restart nfs-kernel-server

    mkdir /srv/exports/volumes/sql-instance-1

    chown -R mssql:mssql /srv/exports/volumes/

    mkdir /srv/exports/volumes/influxdb

    mkdir /srv/exports/volumes/grafana

    chown 472:472 /srv/exports/volumes/grafana

    mkdir /srv/exports/volumes/webcontent

    echo "Hello World!!!" >  /srv/exports/volumes/webcontent/index.html

    清单 1-14

    enable-nfs.sh

    ```


    这个脚本将安装 NFS 服务器，为其内容创建一个目录（以及一些我们稍后将用于第一个 SQL Server 部署的目录），并启动服务。要运行此脚本，你需要使其可执行并以
    root 身份运行，如清单 1-15 所示。


    ```

    chmod +x enable-nfs.sh

    sudo ./enable-nfs.sh

    清单 1-15

    运行 enable-nfs.sh

    ```


    你的 NFS 服务器现在已经准备就绪并可访问。


    在其他机器上，使用清单 1-16 中的命令安装 NFS 工具。这需要在每个其他虚拟机上单独执行。


    ```

    sudo apt install -y nfs-common

    清单 1-16

    在 NFS 客户端上安装 NFS 工具

    ```


    通过从任何客户端机器挂载 NFS 共享并列出其内容来测试连接，使用清单 1-17 中的代码。


    ```

    sudo mount -t nfs storage:/srv/exports /mnt

    ls -al /mnt/volumes

    清单 1-17

    在 NFS 客户端上验证 NFS 连接

    ```


    清单 1-17 的结果应该类似于我们在图 1-1 中看到的内容。


    ![../images/494804_1_En_1_Chapter/494804_1_En_1_Fig1_HTML.jpg](img/494804_1_En_1_Fig1_HTML.jpg)


    图 1-1

    从 node1 进行的 NFS 测试


    ## 系统交换空间设置


    作为最后一步，让我们确保在我们的控制平面以及三个节点上都禁用了交换空间，因为这是 `kubelet` 的要求。


    通过 SSH 分别连接到它们每一个，并运行清单 1-18 中的命令。


    ```

    swapoff -a

    清单 1-18

    禁用交换空间

    ```


    同时从 `/etc/fstab` 中删除任何交换分区。如果你使用我们脚本在 Azure 中创建了虚拟机，则不需要这一步。


    ## 总结


    在本章中，我们为将在本书中一起进行的实验奠定了基础。我们将从在 Docker 中将 SQL Server 部署为容器开始。然后，我们将一起构建 Kubernetes
    集群，并在该集群中部署 SQL Server 以及演示应用程序和数据库。除了集群之外，我们还重点介绍了与我们将在集群中部署的应用程序和数据库进行交互所需的工具。


    # 2. 容器基础


    容器正在改变应用程序的部署方式。在本章中，我们将从基于容器的应用部署的优势开始，并介绍容器基础操作，如创建和运行容器、持久化数据，从而为容器基础知识打下坚实的技术基础。本章最后将讨论容器编排器的必要性，并介绍
    Kubernetes 及其优势。本章的目标是，如果你从未见过容器，那么在继续学习使用 Kubernetes 进行容器编排之前，让你精通容器基础知识。

    '
- fmt: '## Container-Based Application Deployment


    A `container` is a form of operating system virtualization. For years now, database
    professionals have become familiar with the concepts of machine virtualization
    where operating systems are multiplexing the hardware resources of our physical
    servers, the CPU, memory, and disk. In containers, the underlying operating system,
    its kernel, and resources are being multiplexed, or shared by applications running
    on that system. Each container thinks it is the only process running on the operating
    system. The operating system, in turn, controls access to the underlying hardware
    as normal. We will explore this isolation concept in more detail shortly. The
    software that has the responsibility of coordinating this work with the underlying
    operating system is called a `container runtime`.


    A container is a running `container image`. A `container image` contains the binaries,
    libraries, and file system components to run our application. So, when the container
    starts up, it will begin executing the defined executable inside it and then has
    access to the resources of the operating system, in terms of creating additional
    processes and performing disk or network I/O and so on. Figure [2-1](#494804_1_En_2_Chapter.xhtml#Fig1)
    shows the relationship between a container and its application.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig1_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig1_HTML.jpg)

    Figure 2-1: A containerized application


    Conventionally, there is only one application inside a container, because the
    application is the unit of work and also our unit of scaling. When a container
    starts, it will begin executing a defined application inside it. There are scenarios
    where you can put multiple applications inside containers if there is a very tight
    relationship between those applications, for example, an application server and
    a metrics data collector.


    Containers provide `isolation`. A process running inside a container cannot see
    any other processes running on the operating system or even processes running
    inside other containers. This concept is key to the portability and usability
    of and frankly the success of containers.


    Containers also can tie specific libraries to an application, helping you solve
    application library conflicts. Have you ever had an application that needed to
    be installed on a dedicated server because it required a specific version of a
    DLL or library and that version conflicted with another version perhaps supporting
    a different application? Containers can save you from having to do that. If a
    container has the required libraries available inside the container image, when
    loaded, they are isolated to that running container. Additional containers can
    be started up with potentially conflicting libraries, and those container-based
    applications will happily run in isolation of each other.


    The isolation from using containers provides portability in upgrading. You can
    upgrade a library inside a container without impacting other applications running
    in containers on your system. In Figure [2-2](#494804_1_En_2_Chapter.xhtml#Fig2),
    you can see multiple application containers running on a physical or virtual machine
    sharing the base operating system. These containers’ executions are completely
    isolated from each other. If they need to communicate, they must do so over the
    network.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig2_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig2_HTML.jpg)

    Figure 2-2: Container-based application deployments


    Containers are `ephemeral`, and this ephemerality is one of the superpowers of
    containers. When a container is up and running, the container has state in terms
    of the actual program state and any file data changed inside it. A container can
    also be deleted, and when deleted. any program state and file data inside the
    container is deleted.


    The ephemerality of containers is key to the concept of how container-based applications
    are deployed and maintained. Decoupling configuration and state from the container
    lifecycle itself is a core foundation of containers and also container orchestration.
    Techniques for decoupling configuration and state for containers are introduced
    later in this chapter with environment variables and Volumes and later in the
    book with Kubernetes constructs to help us achieve the same goals.


    ## What’s So Hard About Virtual Machines?


    Virtual machines have been strongly seated in enterprise IT as the platform of
    choice for about the last 20 years. We challenge you, the reader, to think what
    did virtualizing hardware gain you in your data center. You got better utilization
    of your hardware… That’s great. But what’s the cheapest thing in your data center?
    Your hardware. What’s the most expensive thing in your data center? You! Your
    time is the most expensive resource. When using virtual machines as our platform,
    there is little to no operational efficiency added to our organization, because
    virtual machines do not add to optimizing an organization’s most expensive resource,
    the people.


    Figure [2-3](#494804_1_En_2_Chapter.xhtml#Fig3) is the traditional implementation
    of virtual machines in a data center. Operations teams build the infrastructure,
    install the guest operating systems, and install all the applications on top of
    those OSs, and that’s the production environment. Operations teams very much so
    put an enormous amount of effort in keeping the systems and the applications properly
    functioning in this architecture.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig3_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig3_HTML.jpg)

    Figure 2-3: A traditional implementation of VMs and their applications in an enterprise
    data center


    Here are some of the challenges of deploying applications with virtual machine–based
    platforms:


    *   **Operating system resource overhead:** Running VMs has an inherent CPU and
    memory overhead. This CPU time and memory could be better spent supporting applications
    rather than operating systems.

    *   **Operating system patching:** Updating operating systems adds very little
    business value to your organization. It certainly is required to maintain a proper
    security posture but does not move your business forward.

    *   **Troubleshooting:** For years and years, systems were built, rolled out into
    production, and were left alone. If something broke, IT operations had to put
    on their capes and fix the system.

    *   **Operating system upgrades:** We think the hardest thing in IT to do is upgrading
    an operating system, because if you upgrade your OS, what do you have to test?
    EVERYTHING! This tight coupling of application to OS means each time a change
    is made to the base OS, it injects risk into our system.

    *   **Deployments:** End-to-end automated deployments of VMs and their applications
    are rare in enterprise IT. Moreover, these solutions are often custom-built, point
    solutions, which can be hard to maintain.


    Do any of the challenges of running virtual machine–based platforms mentioned
    move your business forward? Is anything gained by using virtual machines? We don’t
    think so…and perhaps there’s a better way.'
