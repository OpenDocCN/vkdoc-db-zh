    > 注意

    >

    > 目录 `/etc/kubernetes/manifests/` 包含集群控制平面的静态 Pod 清单。此目录中的每个清单都定义了控制平面 Pod 的配置。


    我们进行动态配置的最后一步是一个客户端配置器，负责在 Pod 动态请求时创建卷（清单 6-9）。'
