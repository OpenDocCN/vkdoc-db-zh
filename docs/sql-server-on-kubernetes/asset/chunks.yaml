    # 9. Azure Arc 启用的数据服务与 Kubernetes 上 SQL Server 的高可用性


    本章介绍 Azure Arc 启用的数据服务及其提供的强大功能，这些功能允许你使用从 Azure 云获得的相同自动化、集中控制管理和工具，在本地、本地数据中心和混合云中部署和管理数据资源。我们将向你展示如何在公司数据中心部署和管理运行在
    SQL Server 上的数据库，就好像它们是 Azure 平台的一部分一样，这一切都利用了 Kubernetes 的威力。Azure Arc 启用的数据服务也是如何为
    Kubernetes 上的 SQL Server（使用托管实例）实现可用性组（AG）这个问题的答案。


    ## 什么是 Azure Arc？


    从核心上讲，Microsoft Azure Arc 可在你部署了本地或任何云资源的任何地方提供 Azure 管理服务。它使你能够为组织的核心运营提供一致的管理服务和工具，无论技术架构部署在何处。让我们看看
    Azure Arc 的核心功能：


    -   **跨本地和混合云的统一体验**：你可以使用熟悉的工具，如 Azure 门户、Azure CLI、PowerShell 和 REST API 来管理和部署系统。

    -   **部署和运营**：凭借一套统一的工具，无论你部署在本地还是任何云中，部署和运营都是一致的。统一的工具使你的组织能够在任何部署场景中使用相同的代码和工具，无论部署在哪里。运营的一个关键要素是性能和可用性监控，Azure
    Monitor 可帮助你为 Azure Arc 启用的资源完成这项工作。

    -   **整合的访问控制、安全、策略管理和日志记录**：根据资源部署位置实施多个安全模型是具有挑战性和风险的，因为你可能需要管理多组安全规则及其实施。Azure
    Arc 使你能够拥有一个整合的安全模型和实施，并使用 Azure Log Analytics 等工具进行集中的安全和应用程序日志记录。此外，你可以使用 Azure
    Policy 等服务来管理治理和控制解决方案。

    -   **清单和组织**：凭借一套可用的工具以及资源组、订阅和标签等关键的 Azure 构造，管理员、操作员和技术经理可以全面了解其技术资产。系统部署在哪里已不再重要——服务和资源作为托管资源注册在
    Azure 中，无论它们部署在哪里，是本地还是任何云。


    Azure Arc 的范围涵盖从`Azure Arc 启用的服务器`和`Azure Arc 启用的 Kubernetes`到`Azure Arc 启用的 SQL
    Server`和`Azure Arc 启用的数据服务`。


    鉴于本书的范围，让我们将其总结到本质：Azure Arc 是一系列服务，允许你将原本只能部署到 Microsoft Azure 云中的服务运行在任何云中的任何基础设施上。我们将在本章中重点介绍
    Azure Arc 启用的数据服务中的一些产品。


    要了解更多关于 Azure Arc 的一般信息，请参考 [`docs.microsoft.com/en-us/azure/azure-arc/`](https://docs.microsoft.com/en-us/azure/azure-arc/)。


    ## Azure Arc 启用的数据服务简介


    Azure Arc 启用的数据服务架构是一个分层架构，包括硬件层、Kubernetes 层、管理控制平面层和数据服务层。图 9-1 突出了该架构。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig1_HTML.jpg](img/494804_1_En_9_Fig1_HTML.jpg)

    *图 9-1: Azure Arc 启用的数据服务架构*


    基础层是运行在任何硬件上的 Kubernetes，这些硬件可以是本地的，也可以在任何云中，并且构建在物理机或虚拟机上。然后，在 Kubernetes 集群内部署的是
    Arc 管理控制平面。Arc 管理控制平面是 Azure Arc 的大脑，它将 Azure 资源管理器（ARM）扩展到你的本地或混合云部署中。而在所有这一切之上，就是
    Azure Arc 启用的数据服务。


    让我们更仔细地看看图 9-2 所示的 Azure Arc 启用的数据服务的核心组件。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig2_HTML.jpg](img/494804_1_En_9_Fig2_HTML.jpg)

    *图 9-2: Azure Arc 启用的数据服务的核心组件*


    ### Azure Arc 数据控制器


    除了 Kubernetes 集群，运行 Azure Arc 启用的数据服务所需的第一个组件是数据控制器。它提供与 Azure 门户的连接，并部署一些我们稍后配置服务所需的核心服务。'
- fmt: "## Monitoring (Grafana and Kibana)\n\n在上一章中，我们部署了 Grafana，正如你所记得的，其中涉及了相当多的步骤。好消息是：当你部署\
    \ `Azure Arc Data Controller` 时，它会自动为你部署一个 Grafana 仪表板及其先决条件。\n\n它还附带了预配置的仪表板，如\
    \ SQL Managed Instance Metrics，如图 [9-3](#494804_1_En_9_Chapter.xhtml#Fig3) 所示。这看起来与我们在前一章看到的例子不同，因为这个仪表板是根据\
