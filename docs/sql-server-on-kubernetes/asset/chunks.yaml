    ```


    Azdata will prompt you for a username and password unless you’ve provided these
    through environment variables before. Depending on the extent of your deployment
    and the performance of your Kubernetes cluster, this may take anywhere from minutes
    to hours.


    You can follow the progress and see when it completes as can be seen in Figure
    [10-7](#494804_1_En_10_Chapter.xhtml#Fig7).


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig7_HTML.jpg](images/494804_1_En_10_Chapter/494804_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Output of azdata bdc create


    The duration taken for the deployment will also depend on whether the images had
    already been pre-pulled as these alone require more than 30GB to download.


    ## Monitoring and Management


    A BDC can be monitored directly from within Azure Data Studio as well as through
    the Grafana and Kibana dashboards , which we’ve already encountered in the previous
    chapters as you can see in Figure [10-8](#494804_1_En_10_Chapter.xhtml#Fig8).
    Also note how you can change the general behavior (like dark mode vs. light mode)
    of the portal and how this dashboard is again slightly different from the ones
    we’ve used in the previous chapters.


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig8_HTML.jpg](images/494804_1_En_10_Chapter/494804_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Grafana Portal – SQL Server Metrics


    Azure Data Studio provides you an overview of a cluster’s endpoints as well as
    a rough status about its health as shown in Figure [10-9](#494804_1_En_10_Chapter.xhtml#Fig9).


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig9_HTML.jpg](images/494804_1_En_10_Chapter/494804_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Big Data Cluster overview in ADS


    In addition to that, as you can see in Figure [10-10](#494804_1_En_10_Chapter.xhtml#Fig10),
    it also has a troubleshooting toolset for your BDC.


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig10_HTML.jpg](images/494804_1_En_10_Chapter/494804_1_En_10_Fig10_HTML.jpg)


    Figure 10-10


    Link to troubleshooting in ADS


    Behind this button is a collection of notebooks to troubleshoot every single component
    of your cluster. The first notebook to open is “TSG100 – The Big Data Cluster
    troubleshooter,” which will guide you through a full debugging of your Big Data
    Cluster. If you have already narrowed down which service is causing issues, you
    can also navigate directly to the analyzer notebook for that specific component.'
