    IP 上的应用程序流量会被负载均衡到其底层的 Pod IP 地址。随着 Pod 被控制器（如 `ReplicaSet` 控制器）创建和销毁，网络信息会自动更新以反映应用程序的当前状态。让我们看一个例子。


