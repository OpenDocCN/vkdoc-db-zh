    to check the state of our availability group.


    ```

    SELECT ag.name agname, ags.* FROM sys.dm_hadr_availability_group_states ags INNER
    JOIN sys.availability_groups ag ON ag.group_id = ags.group_id

    Listing 9-11

    Get AG health through T-SQL

    ```


    As you can see in Figure [9-15](#494804_1_En_9_Chapter.xhtml#Fig15), everything
    is looking fine.


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig15_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig15_HTML.jpg)


    Figure 9-15


    State of AG


    Just for reference, if we run the same query against our single instance deployment,
    this query will come back empty (see Figure [9-16](#494804_1_En_9_Chapter.xhtml#Fig16)).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig16_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig16_HTML.jpg)


    Figure 9-16


    No availability group deployed


    Also take note (Figure [9-17](#494804_1_En_9_Chapter.xhtml#Fig17)) that our HA
    instance was deployed using three pods rather than just one – you can verify that
    using `kubectl get pods` again.


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig17_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig17_HTML.jpg)


    Figure 9-17


    Pods for Managed Instance AG in Azure Arc namespace


    Note


    Here we see three replicas running in a StatefulSet with each pod running four
    containers.


    ## Summary


    In this chapter, we looked at Azure Arc–enabled Data Services and how they allow
    the deployment of complex solutions by adding another layer of abstraction through
    *azdata*. We deployed an Azure Arc–enabled Data Controller as well as an Azure
    Arc Managed Instance and made it highly available by deploying it as an availability
    group. In our next and last chapter, we will look at another SQL Server implementation
    running on Kubernetes: Big Data Clusters.


    # 10. Big Data Clusters


    Now that we know how to deploy SQL Server on Kubernetes, let’s look in our last
    chapter at how Microsoft designed, built, and deployed Big Data Clusters to run
    in Kubernetes and the challenges encountered and solutions crafted to build a
    complex distributed system in Kubernetes and ship it as a product. We will look
    at the BDC architecture and map that back to Kubernetes objects and constructs.'
  trans: '

    ### 部署 Azure Arc 托管 SQL 实例


    要通过 `azdata` 部署 Azure Arc 托管 SQL 实例，我们首先需要登录到集群，如清单 9-6 所示。


    ```

    azdata login -ns arc

    清单 9-6

    登录到数据控制器的 azdata 命令

    ```


    注意：如果您未在环境变量中存储用户名和密码，此命令将再次提示您输入。


    可以通过一个简单的 `azdata` 命令部署一个新的托管实例，如清单 9-7 中的命令。唯一必需的参数是实例名称。如果您未提供存储类，则将使用默认存储类。这要求必须已定义默认存储类！


    ```

    azdata arc sql mi create \

    --name arc-mi-01 \

    --storage-class-data managed-premium \

    --storage-class-logs managed-premium \

    --storage-class-data-logs managed-premium \

    --storage-class-backups managed-premium

    清单 9-7

    使用参数创建新的 SQL 托管实例的 azdata 命令

    ```


    部署过程会再次要求输入用户名和密码，除非您已通过环境变量提供，否则系统会提示您输入。


    部署完成后，`azdata` 将报告结果，如图 9-11 所示。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig11_HTML.jpg](img/494804_1_En_9_Fig11_HTML.jpg)


    图 9-11：创建 MI 后 `azdata` 的输出。


    使用清单 9-8 中的代码查看 Pod。


    ```

    kubectl get pods arc-mi-01-0 -n arc

    清单 9-8

    kubectl get pods

    ```


    我们还可以看到为我们的托管实例创建的 Pod（图 9-12）。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig12_HTML.jpg](img/494804_1_En_9_Fig12_HTML.jpg)


    图 9-12：MI 的 Pod。


    注意：这是一个包含三个内部运行容器的单一 Pod。这并不意味着我们获得了三个 SQL Server 实例。


    要使用 `sqlcmd`、`Azure Data Studio` 或其他客户端工具连接到我们的实例，我们需要 SQL Server 端点的 IP 地址和端口。除了使用
    `kubectl` 列出服务外，我们也可以使用清单 9-9 中的 `azdata` 命令来实现此目的。


    ```

    azdata arc sql mi list

    清单 9-9

    列出当前控制器中所有 SQL MI 的 azdata 命令

    ```


    这将返回我们实例的外部端点、其名称、副本数量及其当前状态，如图 9-13 所示。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig13_HTML.jpg](img/494804_1_En_9_Fig13_HTML.jpg)


    图 9-13：Azure Arc 命名空间中的托管实例。


    我们现在可以使用此信息连接到我们的 SQL Server。


    ## Azure Arc SQL 托管实例的高可用性


    在撰写本文时，Kubernetes 上的“常规” SQL Server（如我们在第 7 章中部署的）不支持 `可用性组`。


    您现在可能想知道，既然 Kubernetes 提供了原生的高可用性，为什么还需要 AG。问题在于，根据您使用的存储类型，在节点发生故障时，存储需要附加到新节点。这个过程可能耗时从几毫秒到几分钟不等。在高可用性环境中，几分钟的停机时间显然是不可接受的。


    答案同样在于 Arc 中的 `SQL 托管实例 Always On 可用性组`。如图 9-14 所示，它们将我们在本章前面介绍的 Azure Arc SQL
    托管实例与用于高可用性的可用性组 (`AGs`) 结合在一起。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig14_HTML.jpg](img/494804_1_En_9_Fig14_HTML.jpg)


    图 9-14：SQL 托管实例 Always On 可用性组。


    部署 Azure Arc 托管的 `SQL 托管实例 Always On 可用性组`时，它提供以下功能：


    1.  三副本组在内部管理，包括创建可用性组以及将副本加入创建的可用性组。

    2.  所有数据库（包括所有用户和系统数据库，如 `master` 和 `msdb`）都会自动添加到可用性组。此功能在可用性组副本之间提供单一系统视图。

    3.  会自动预配一个外部端点，用于连接到可用性组内的数据库，支持读写和只读连接。

    4.  能够通过连接到辅助实例运行只读工作负载。

    5.  在 Pod 或节点发生故障时，自动进行故障转移和实例重新部署。

    6.  由系统管理升级。


    部署由多个副本支持的托管实例简直太容易了。要将 Azure Arc SQL 托管实例部署为 AG，您只需在创建命令中添加 `--replicas` 开关，如清单
    9-10 所示。


    ```

    azdata arc sql mi create \

    --name arc-mi-ha \

    --replicas 3

    清单 9-10

    使用参数创建新的 SQL 托管实例的 azdata 命令

    ```


    一旦此部署完成，我们就可以检索主实例的端点，并针对其运行清单 9-11 中的命令来检查我们的可用性组状态。


    ```

    SELECT ag.name agname, ags.* FROM sys.dm_hadr_availability_group_states ags INNER
    JOIN sys.availability_groups ag ON ag.group_id = ags.group_id

    清单 9-11

    通过 T-SQL 获取 AG 运行状况

    ```


    如图 9-15 所示，一切看起来都很好。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig15_HTML.jpg](img/494804_1_En_9_Fig15_HTML.jpg)


    图 9-15：AG 的状态。


    仅作参考，如果我们针对单实例部署运行相同的查询，此查询将返回空结果（参见图 9-16）。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig16_HTML.jpg](img/494804_1_En_9_Fig16_HTML.jpg)


    图 9-16：未部署可用性组。


    另请注意（图 9-17）我们的 HA 实例是使用三个 Pod 而不是一个部署的——您可以再次使用 `kubectl get pods` 进行验证。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig17_HTML.jpg](img/494804_1_En_9_Fig17_HTML.jpg)


    图 9-17：Azure Arc 命名空间中用于托管实例 AG 的 Pod。


    注意：这里我们看到三个副本在 StatefulSet 中运行，每个 Pod 运行四个容器。


    ## 本章小结


    在本章中，我们探讨了 Azure Arc 托管的数据服务，以及它们如何通过 `azdata` 添加另一层抽象来允许部署复杂解决方案。我们部署了一个 Azure
    Arc 托管的数据控制器以及一个 Azure Arc 托管实例，并通过将其部署为可用性组使其具有高可用性。在下一章，也是最后一章，我们将探讨另一种在 Kubernetes
    上运行的 SQL Server 实现：大数据群集。


    # 10. 大数据群集


    既然我们知道了如何在 Kubernetes 上部署 SQL Server，让我们在最后一章看看 Microsoft 如何设计、构建和部署大数据群集以在 Kubernetes
    中运行，以及在 Kubernetes 中构建复杂分布式系统并将其作为产品交付所遇到的挑战和制定的解决方案。我们将查看 BDC 架构，并将其映射回 Kubernetes
    对象和结构。

