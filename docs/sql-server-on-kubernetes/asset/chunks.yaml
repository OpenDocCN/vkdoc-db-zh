    ## Summary


    In this chapter, we’ve covered ways on how to monitor the cluster and its applications
    using Grafana and the Kibana dashboard. We then used those portals to gain insights
    about our previously deployed SQL Server on Kubernetes. Let’s move on to the next
    chapter to look at Azure Arc–enabled Data Services, which allow us to deploy SQL
    Server on Kubernetes with high-availability options.


    # 9. Azure Arc–Enabled Data Services and High Availability for SQL Server on Kubernetes


    This chapter introduces Azure Arc–enabled Data Services and the powerful capabilities
    they provide to deploy and manage local, on-premises, and hybrid cloud data resources
    using the same automation and centralized control management and tooling that
    you get from the Azure Cloud. We will show you how to deploy and manage databases
    running on SQL Server in your corporate data center as if they were part of the
    Azure platform, all using the power of Kubernetes. Azure Arc–enabled Data Services
    are also the answer to the question how to implement availability groups (AGs)
    for SQL Server (using Managed Instances) on Kubernetes.


    ## What’s Azure Arc?


    At its core, Microsoft Azure Arc provides Azure management services wherever you
    have deployed resources on-premises or any cloud. It enables you to have consistent
    management services and tooling for your organizations’ core operations across
    technology architectures wherever deployed. Let’s look at the core features of
    Azure Arc:


    *   **Unified experience across on-premises and hybrid cloud:** Familiar tools
    like Azure Portal, the Azure CLI, PowerShell, and REST API are available to you
    to manage and deploy systems.


    *   **Deployment and operations:** With a unified set of tools, deployments and
    operations are consistent wherever you deploy, on-premises or in any cloud. Unified
    tooling enables your organization to use the same code and tools in any deployment
    scenario wherever deployed. A pivotal element to operations is performance and
    availability monitoring, and Azure Monitor is available to help you do that for
    your Azure Arc–enabled resources.


    *   **Consolidated access controls, security, policy management, and logging:**
    Implementing more than one security model based on where your resources are deployed
    is challenging and risky since you potentially have to manage multiple sets of
    security rules and their implementations. Azure Arc enables you to have a consolidated
    security model and implementation and use tools like Azure Log Analytics for centralized
    security and application logs. Additionally, you can manage governance and control
    solutions with services like Azure Policy.


    *   **Inventory and organization:** With one set of tooling available and key
    Azure constructs such as resource groups, subscriptions, and tags, administrators,
    operators, and managers can get a complete view of their technology estate. It
    doesn’t matter anymore where systems are deployed – services and resources are
    registered as managed resources in Azure irrespective of where they are deployed,
    on-premises or in any cloud.


    Azure Arc ranges from offerings like *Azure Arc–enabled servers* and *Azure Arc–enabled
    Kubernetes* to *Azure Arc–enabled SQL Server* and *Azure Arc–enabled Data Services*.


    Given the scope of this book though, let’s sum this up to its essence: Azure Arc
    is a range of services that allow you to run services that formerly were only
    deployable to Microsoft’s Azure Cloud to any infrastructure in any cloud. We will
    focus on some of the offerings within Azure Arc–enabled Data Services over the
    course of this chapter.


    To learn more about Azure Arc in general, please refer to [*https://docs.microsoft.com/en-us/azure/azure-arc/*](https://docs.microsoft.com/en-us/azure/azure-arc/).


