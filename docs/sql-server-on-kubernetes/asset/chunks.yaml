- fmt: '## Introduction to Big Data Clusters


    SQL Server 2019 Big Data Clusters – or just Big Data Clusters – are a new feature
    set within SQL Server 2019 with a broad range of functionality around data virtualization,
    data mart scale-out, and artificial intelligence. Despite Microsoft’s “cloud-first”
    strategy to release new features and functionality to Azure first and eventually
    roll them over to the on-premises versions (if at all), they are part of the box
    product, so while you can obviously install them wherever you want, they are customer
    managed.


    Big Data Clusters only run on Linux (let that sink in for a second!) and can only
    be deployed in a Kubernetes Cluster. While so far in this book we’ve showed you
    ways of deploying applications to Kubernetes as a modern alternative to classic
    deployments on Windows Servers, this is the point where you don’t get a choice
    on how to deploy it. And since this is the second example after Arc–enabled Data
    Services which we’ve introduced in the previous chapter, this is hopefully also
    the point – if you haven’t already – where you see how Kubernetes is the platform
    to deploy modern data applications and why it is so important to have that as
    part of your skillset going forward.


    SQL Server 2019 Big Data Clusters are essentially a combination of SQL Server,
    Apache Spark, and the HDFS running in a Kubernetes environment. They are not a
    single feature but rather a feature set. Figure [10-1](#494804_1_En_10_Chapter.xhtml#Fig1)
    categorizes the different parts of this feature set into different groups to help
    you better understand what is being provided. The overall idea is through virtualization
    and scale-out, SQL Server 2019 becomes your data hub for all your data, even if
    that data is not physically sitting in SQL Server.


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig1_HTML.jpg](images/494804_1_En_10_Chapter/494804_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Feature overview of SQL Server 2019 Big Data Clusters


    The major aspects of Big Data Clusters are shown from left to right. You have
    support for data virtualization, then a managed data platform, and finally an
    artificial intelligence (AI) platform.


    Let’s take a deeper look at them.


    ### Data Virtualization


    Data virtualization brings data into SQL Server that doesn’t physically sit in
    SQL Server. This is implemented through PolyBase. Originally introduced in SQL
    Server 2016, PolyBase introduced the concept of `external tables`. While PolyBase
    originally only supported file-based sources, this has now been greatly enhanced
    to other sources like Oracle, SQL Server, Teradata, MongoDB, and countless others.
    This allows you to create a table `dbo.Customers`, for example, and query it as
    if it were a local table, but its data is sitting in an Azure SQL Database, for
    example. While this may remind you a bit of linked servers, the fact that PolyBase
    external tables do not require the dreaded three-dot notation (`Servername.databasename.schemaname.tablename`)
    and queries against them are multi-threaded only shows some of the advantages
    they offer over them.


    There is no caching for external tables, so every single query against them hits
    the underlying source in real time, which is something you should consider – think
    about latency and workloads – before building your data warehouse from scratch
    through PolyBase ![../images/494804_1_En_10_Chapter/494804_1_En_10_Figa_HTML.gif](images/494804_1_En_10_Chapter/494804_1_En_10_Figa_HTML.gif).


    ### Managed Data Platform


    Within the managed data platform of Big Data Clusters, you are basically offered
    two options: You can scale out single SQL Server tables across multiple instances
    of SQL Server – so instead of just spreading them over files or file groups, they
    are physically pushed into separate instances. Or you can store and consume file-based
    data like `CSV` or `Parquet` files (if you are not familiar with Parquet, think
    of it like a `clustered column store for flat files`). Those files would be exposed
    and accessed in SQL Server through external tables again, allowing you to potentially
    run a query that looks like it’s consuming SQL Server data only but is in fact
    combining data from a CSV with a table in an Oracle instance with a big fact table
    that’s scaled out across a few other SQL Servers with a… You get the point.


    ### AI and Application Platform


    A Big Data Cluster allows you to deploy applications that can, for example, be
    SSIS packages or R or Python applications. These applications can then be exposed
    through a REST API and accessed from within the Big Data Cluster as well as from
    outside. Therefore, your Big Data Cluster becomes your database, your file server,
    and your application server, all at the same time and all within a single deployment
    without worrying about connectivity between those components and pools.


    ## BDC Architecture


    Big Data Clusters can be divided into four logical layers. Consider these as a
    collection of various infrastructure and management parts that perform a specific
    function inside the cluster. Each of the areas in turn has one or more roles it
    performs. For instance, inside the Data layer, there are two roles: the Storage
    Pool and the SQL Data Pool.


    Figure [10-2](#494804_1_En_10_Chapter.xhtml#Fig2) shows an overview of the four
    logical areas and the various roles that are part of each area.


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig2_HTML.jpg](images/494804_1_En_10_Chapter/494804_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Big Data Cluster architecture


    You can immediately infer the four logical layers: the Control layer (which internally
    is named the Control Plane – just like in Kubernetes itself there is another Control
    Plane) and the Compute, Data, and App areas.


    ### Big Data Cluster Components


    Let us take a deeper look at the components of our Big Data Cluster.


    #### BDC Control Plane


    The Control Plane – not to be confused with the Kubernetes Control Plane – of
    a Big Data Cluster is the centerpiece of every BDC deployment. It combines functionality
    like the Grafana and Kibana monitoring dashboards as well as vital functions like
    the control service and the configuration store. While you’ll probably never interact
    with any of these components except for the dashboards, your BDC simply wouldn’t
    do anything without them.


    #### SQL Server Master Instance


    You might have noticed there is an additional or almost standalone role displayed
    in Figure [10-2](#494804_1_En_10_Chapter.xhtml#Fig2), the SQL Server Master Instance.


    The SQL Server Master Instance is a SQL Server on Linux deployment and acts like
    an entrypoint toward your Big Data Cluster. It provides the external endpoint
    to connect to through Azure Data Studio or from other tools like SQL Server Management
    Studio.


    #### Compute Pool


    The compute pool consists of one or more SQL Server on Linux instances, allowing
    you to access various data sources through PolyBase in a distributed manner. For
    instance, a Compute Pool can access data stored inside HDFS on the Big Data Cluster
    itself or access data through any of the PolyBase connectors like Oracle or MongoDB.


    The main advantage of a Compute Pool is that it opens up options to distribute,
    or scale out, queries across multiple nodes inside each Compute Pool, boosting
    the performance of PolyBase queries.


    Every BDC deployment will have at least one SQL instance as part of the Compute
    Pool. You will never interact with them directly – except for debugging purposes
    maybe – and they will just transparently be part of your query executions across
    your cluster.'
