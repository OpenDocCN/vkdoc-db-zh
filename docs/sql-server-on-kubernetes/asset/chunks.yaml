    ## 工具


    虽然我们可以通过 YAML 清单部署 Azure Arc 生态系统中的所有内容，但 Microsoft 通过提供另一个抽象层次使我们的工作更轻松。使用名为
    `azdata` 的工具，我们可以描述所需的环境和配置服务，它将为我们生成 Kubernetes 中的对象。对于更复杂的场景，可以通过 JSON 文件进行配置，而对于更简单的用例，则可以通过命令行参数运行，这与
    `kubectl` 的命令式与声明式概念非常相似。


    **注意**

    不要混淆 `Azure CLI` 和 `azdata`。它们是两种不同的工具！


    我们已经在第 1 章在管理工作站上安装了 `azdata`。


    如果您更喜欢图形化体验，Azure Data Studio 也提供了图形化安装向导。此向导将为每次部署创建一个 Jupyter notebook，并在后台调用
    `azdata`。然而在本书中，我们将专注于基于命令行的安装。


    ### 部署数据控制器


    一旦您安装了 `azdata` 并且 `kubectl` 上下文设置为正确的集群，就可以通过类似于清单 9-3 中的命令来部署 Azure Arc 数据控制器。


    您需要提供以下设置：


    *   **名称：** 控制器的名称。

    *   **命名空间：** 要在您的 Kubernetes 集群中使用的命名空间 – 此命名空间不能包含任何其他对象。如果尚不存在，它将被创建。

    *   **订阅：** 您的 Azure 订阅 ID。

    *   **资源组：** 部署后服务应显示在 Azure 中的资源组。

    *   **位置：** 用于存储指标和日志的 Azure 区域。

    *   **存储类：** 用于数据控制器数据和日志的存储类。如果省略，将使用默认类。

    *   **配置文件名称：** 要使用的部署配置文件。


