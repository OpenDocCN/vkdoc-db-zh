  raw: '## Upgrading a Big Data Cluster


    Upgrades of a BDC happen through azdata, so first make sure that you have the
    latest version of azdata installed. To do so, run the code in Listing [10-5](#494804_1_En_10_Chapter.xhtml#PC5)
    just like when you first installed azdata.


    ```

    curl -o azdata.msi https://aka.ms/azdata-msi

    msiexec azdata.msi

    Listing 10-5

    Update azdata to the latest version

    ```


    Now you can use *azdata* to upgrade your cluster. The command for this is *azdata
    bdc upgrade,* followed by at least your cluster’s name and the target version.


    To upgrade to Big Data Clusters 2019 CU9, for example, you would use the command
    shown in Listing [10-6](#494804_1_En_10_Chapter.xhtml#PC6). This will update all
    your BDC’s components.


    ```

    azdata bdc upgrade --name mybdc --tag 2019-CU9-ubuntu-16.04

    Listing 10-6

    Upgrade your BDC to CU9 using azdata

    ```


    This will take some time as all the individual images will need to be pulled first
    followed by an upgrade of every single component in your cluster. Just like during
    the installation process, the upgrade process will give you a continuous status
    update on which component it is currently working at up to the point where the
    upgrade process is complete.


    At this point, there is no way to change the size of a Big Data Cluster post deployment,
    so azdata can upgrade an existing cluster to another version, but you could not
    change the number of instances in a pool, for example. This would require a new
    deployment.


    If you want to learn more about Big Data Clusters including details on how to
    deploy them, we recommend the Apress book *SQL Server Big Data Clusters: Data
    Virtualization, Data Lake, and AI Platform*.


    ## Summary


    In this final chapter, we explored how Kubernetes can be used to deploy very complex
    and heterogeneous applications like Big Data Clusters in a simple and automated
    way. This also concludes this book. We hope this helped you to gain a deeper understanding
    about Kubernetes and how it can help you to deploy modern data applications!


