- fmt: '### Deploying an Azure Arc–Enabled SQL Managed Instance


    To deploy an Azure Arc–enabled SQL Managed Instance through `azdata`, we first
    need to log into our cluster, as shown in Listing [9-6](#494804_1_En_9_Chapter.xhtml#PC6).


    ```

    azdata login -ns arc

    Listing 9-6

    azdata command to log into your Data Controller

    ```


    Note: If you did not store your username and password in environment variables,
    this command will prompt you for them again.


    A new Managed Instance can be deployed through a simple `azdata` command like
    the one in Listing [9-7](#494804_1_En_9_Chapter.xhtml#PC7). The only required
    parameter is the name of the instance. If you do not provide storage classes,
    the default class will be used. This requires a default storage class to be defined!


    ```

    azdata arc sql mi create \

    --name arc-mi-01 \

    --storage-class-data managed-premium \

    --storage-class-logs managed-premium \

    --storage-class-data-logs managed-premium \

    --storage-class-backups managed-premium

    Listing 9-7

    azdata command to create a new SQL Managed Instance with parameters

    ```


    The deployment requires a username and password again, which will be prompted
    for unless you’ve provided them through environment variables.


    Once the deployment has completed, `azdata` will report back as shown in Figure
    [9-11](#494804_1_En_9_Chapter.xhtml#Fig11).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig11_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig11_HTML.jpg)


    Figure 9-11: Output of `azdata` after creation of MI.


    Look at the pods using the code in Listing [9-8](#494804_1_En_9_Chapter.xhtml#PC8).


    ```

    kubectl get pods arc-mi-01-0 -n arc

    Listing 9-8

    kubectl get pods

    ```


    We can also see the pod that has been created for our Managed instance (Figure
    [9-12](#494804_1_En_9_Chapter.xhtml#Fig12)).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig12_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig12_HTML.jpg)


    Figure 9-12: Pod for MI.


    Note: This is one single pod with three containers running inside it. This does
    not mean we’re getting three SQL Server instances.


    To connect to our instance using `sqlcmd`, `Azure Data Studio`, or another client
    tool, we need the IP address and the port of the SQL Server endpoint. Besides
    using `kubectl` to list the services, we can also use the `azdata` command in
    Listing [9-9](#494804_1_En_9_Chapter.xhtml#PC9) for this purpose.


    ```

    azdata arc sql mi list

    Listing 9-9

    azdata command to list all SQL MIs in the current controller

    ```


    This will return our instance’s external endpoint, its name, the number of replicas,
    and its current state as shown in Figure [9-13](#494804_1_En_9_Chapter.xhtml#Fig13).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig13_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig13_HTML.jpg)


    Figure 9-13: Managed Instances in Azure Arc namespace.


    We could now use this information and connect to our SQL Server.


    ## High Availability for an Azure Arc SQL Managed Instance


    At the time of writing, a “regular” SQL Server on Kubernetes, like the one we’ve
    deployed in Chapter [7](#494804_1_En_7_Chapter.xhtml), does not support `availability
    groups`.


    You may now be wondering why you even need an AG since Kubernetes is providing
    native high availability. The problem is depending on what kind of storage you
    are using, in the case of a node failure, the storage needs to be attached to
    a new node. This can take anywhere from milliseconds to minutes. Having a downtime
    of multiple minutes is obviously not acceptable in an HA environment.


    The answer to that also lies in Arc through `SQL Managed Instance Always On availability
    groups`. As you can see in Figure [9-14](#494804_1_En_9_Chapter.xhtml#Fig14),
    they bring together Azure Arc SQL Managed Instances, which we’ve introduced earlier
    in this chapter, and availability groups (`AGs`) for high availability.


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig14_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig14_HTML.jpg)


    Figure 9-14: SQL Managed Instance Always On availability group.


    When deploying an Azure Arc–enabled `SQL Managed Instance Always On availability
    group`, it offers the following capabilities:


    1.  The three-replica group is managed internally, including creation of the availability
    group and joining replicas to the availability group created.

    2.  All databases are automatically added to the availability group, including
    all user and system databases like `master` and `msdb`. This capability provides
    a single system view across the availability group replicas.

    3.  An external endpoint is automatically provisioned for connecting to databases
    within the availability group for both read-write and read-only connections.

    4.  Ability to run read-only workloads by connecting to the secondary instances.

    5.  Automated failovers and instance redeployment in the event of pod or node
    failure.

    6.  Upgrades are managed.


    Deploying a Managed Instance backed by multiple replicas is almost too easy. To
    deploy an Azure Arc SQL Managed Instance as an AG, all you need to do is add the
    `--replicas` switch to your create command as shown in Listing [9-10](#494804_1_En_9_Chapter.xhtml#PC10).


    ```

    azdata arc sql mi create \

    --name arc-mi-ha \

    --replicas 3

    Listing 9-10

    azdata command to create a new SQL Managed Instance with parameters

    ```


    Once this deployment has finished, we can retrieve the primary’s endpoint and
    run the command in Listing [9-11](#494804_1_En_9_Chapter.xhtml#PC11) against it
    to check the state of our availability group.


    ```

    SELECT ag.name agname, ags.* FROM sys.dm_hadr_availability_group_states ags INNER
    JOIN sys.availability_groups ag ON ag.group_id = ags.group_id

    Listing 9-11

    Get AG health through T-SQL

    ```


    As you can see in Figure [9-15](#494804_1_En_9_Chapter.xhtml#Fig15), everything
    is looking fine.


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig15_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig15_HTML.jpg)


    Figure 9-15: State of AG.


    Just for reference, if we run the same query against our single instance deployment,
    this query will come back empty (see Figure [9-16](#494804_1_En_9_Chapter.xhtml#Fig16)).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig16_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig16_HTML.jpg)


    Figure 9-16: No availability group deployed.


    Also take note (Figure [9-17](#494804_1_En_9_Chapter.xhtml#Fig17)) that our HA
    instance was deployed using three pods rather than just one – you can verify that
    using `kubectl get pods` again.


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig17_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig17_HTML.jpg)


    Figure 9-17: Pods for Managed Instance AG in Azure Arc namespace.


    Note: Here we see three replicas running in a StatefulSet with each pod running
    four containers.


    ## Summary


    In this chapter, we looked at Azure Arc–enabled Data Services and how they allow
    the deployment of complex solutions by adding another layer of abstraction through
    `azdata`. We deployed an Azure Arc–enabled Data Controller as well as an Azure
    Arc Managed Instance and made it highly available by deploying it as an availability
    group. In our next and last chapter, we will look at another SQL Server implementation
    running on Kubernetes: Big Data Clusters.


    # 10. Big Data Clusters


    Now that we know how to deploy SQL Server on Kubernetes, let’s look in our last
    chapter at how Microsoft designed, built, and deployed Big Data Clusters to run
    in Kubernetes and the challenges encountered and solutions crafted to build a
    complex distributed system in Kubernetes and ship it as a product. We will look
    at the BDC architecture and map that back to Kubernetes objects and constructs.'
