  trans: '

    # 高级磁盘拓扑


    在生产环境中运行 SQL Server 时，存储始终是一个关键考量因素。在我们之前的示例中，我们将日志和数据部署到了同一个 NFS 驱动器上，其中混合了用户和系统数据库。


    相反，你可以定义多个持久卷和持久卷声明，并将它们附加到你的 Pod 上，这等同于在 Windows 服务器上拥有多个驱动器。


    你还可以使用以下三个环境变量来指定默认目录：


    *   `MSSQL_DATA_DIR`

    *   `MSSQL_LOG_DIR`

    *   `MSSQL_BACKUP_DIR`


    任何新的用户数据库都将在这些位置创建。


    同样，所有 PVC 在启动时都会以其定义的位置挂载到容器中，而 master 数据库将使用户数据库联机。


    # 资源管理（限制与请求）


    虽然存储配置处理了我们的数据部分，但我们也需要考虑计算资源，这实际上意味着 CPU 和内存。在 Kubernetes 中，这是通过 `limits` 和 `requests`
    来管理的，这些可以在 Pod 和命名空间级别上定义。


    请求是保证分配的最小资源量。如果你为 Pod 定义的请求无法满足（例如，在 64GB 内存的机器上请求 128GB 内存），则该 Pod 将无法启动。


    另一方面，限制定义了可分配给资源的最大值。默认情况下，不配置任何限制，这意味着默认情况下 Pod 可以（理论上）消耗无限量的内存和 CPU。


    对于 SQL Server，服务器实例设置仍然适用，因此请确保设置它们来进行配置。


    理想情况下，限制和请求应放入你的清单文件中（尽管理论上你可以通过 `kubectl` 命令式地设置它们）。它们将进入每个容器的一个名为 `resources`
    的新部分，如代码清单 7-19 所示。


    ```

    spec:

    containers:

    - name: mssql

    resources:

    requests:

    cpu: 1

    memory: 2Gi

    limits:

    cpu: 1

    memory: 4Gi

    代码清单 7-19

    YAML 清单中的资源部分

    ```


    此特定设置将为 SQL Server 恰好分配一个 CPU 核心、最少 2GB 内存（这是最低要求，依据 [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-ver15#system*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup%253Fview%253Dsql-server-ver15%2523system)），以及最多
    4GB 内存。4GB 是容器将看到的其可用限制。由于 `SQLPAL` 的架构，Linux 上的 SQL Server 默认只会看到此值的 80%，这可以通过使用
    `mssql-conf` 来调整。


    **注意**


    我们强烈建议始终在你的 SQL Server 实例内配置 `Max Server Memory`，以及 Kubernetes 的 CPU 和内存限制。


    如果你想了解更多关于在 Kubernetes 上运行 SQL Server 的内存设置，我们强烈推荐阅读这篇博客文章：[*www.centinosystems.com/blog/sql/memory-settings-for-running-sql-server-in-kubernetes/*](https://www.centinosystems.com/blog/sql/memory-settings-for-running-sql-server-in-kubernetes/)。


    # 备份（与还原）


    当然，另一个重要问题是：我如何以及在哪里备份我的数据？第一部分非常简单：你可以使用你偏好的现有技术，可以是像维护计划这样简单的东西，也可以是像 dbatools
    ([*https://dbatools.io/*](https://dbatools.io/)) 或 Ola Hallengren 的框架 ([*https://ola.hallengren.com/sql-server-backup.html*](https://ola.hallengren.com/sql-server-backup.html))
    这样的外部工具。这些备份也可以使用 SQL Server Agent 进行调度。


    更有趣的是“在哪里”这部分。实际上，你有两个选项：


    *   `备份到 URL`：从 SQL Server 2016 开始，Microsoft 实现了直接备份到（并从）Azure Blob 存储的能力。确切的语法和要求可以在
    [*https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/sql-server-backup-to-url?view=sql-server-ver15*](https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/sql-server-backup-to-url%253Fview%253Dsql-server-ver15)
    找到。

    *   **附加一个额外的持久卷。** 或者，你可以附加一个专门的额外卷，该卷可以是云原生的（如 Azure Disk 或 Azure Files），也可以是任何其他允许你将数据物理存储在不同位置的存储系统，如
    NFS、iSCSI 或光纤通道。


    同样的逻辑适用于还原。如果你想将现有的备份文件复制到你的 SQL 实例，可以使用 `kubectl` 来完成。重要的概念是该文件需要 SQL Server
    进程可以访问。


    此类复制任务的通用语法可在代码清单 7-20 中找到。


    ```

    kubectl cp 本地文件 目标 Pod:目标文件 -c 容器名称

    代码清单 7-20

    将本地文件复制到容器的通用代码

    ```


    在我们的具体案例中，要将本地文件 `AdventureWorks2017.bak` 复制到我们的 Pod `mssql-deployment-748c745b8d-7pvgn`
    的数据目录，命令将如代码清单 7-21 所示。


    ```

    kubectl cp AdventureWorks2017.bak mssql-deployment-748c745b8d-7pvgn:var/opt/mssql/data/AdventureWorks2017.bak
    -c mssql

    代码清单 7-21

    将本地文件复制到容器的代码

    ```


    复制后，可以使用 `sqlcmd`、Azure Data Studio、SQL Server Management Studio 或任何其他客户端工具还原此文件。我们仅建议对较小的文件使用此方法，因为你必须将文件复制到容器内部，这会消耗空间并需要时间。


    **注意**


    Kubernetes 只是我们运行 SQL Server 的平台——它并不能替代原生 SQL 备份的需要！


    # 总结


    在本章中，我们涵盖了在 Kubernetes 的 Pod 中运行独立 SQL Server 实例的所有相关内容，从基本部署到升级，再到在生产环境中运行 SQL
    Server on Kubernetes 必要的考量因素。在下一章中，我们将探讨如何监控集群及其应用程序。


    # 8. 监控 Kubernetes 上的 SQL Server


    虽然我们可以使用 `kubectl` 查看特定 Pod 的日志文件，但这根本算不上一个监控解决方案，并且由于工作负载在节点、Pod 和容器之间的分布式和临时性，我们确实认为需要一个集中式的观察窗口来快速分析和捕获问题——甚至在问题发生之前。


    因此，我们想向你们介绍两种完全集成 Kubernetes 和 SQL Server 的开源解决方案：用于性能和指标监控的 Grafana，以及用于日志聚合和分析的
    Kibana。


    虽然 Kubernetes 有一个内置的仪表板，但它对于生产环境来说还远远不够。


    Grafana 和 Kibana 都是开源工具，因此你可以查看并为其代码库做出贡献。


    # 用于性能监控的 Grafana


    Grafana 门户提供关于 Kubernetes 节点本身的状态和性能的性能指标和洞察，以及 SQL Server 特定的指标。


    让我们首先概述与 Kubernetes 上的 SQL Server 相关的主要内容——即系统指标，然后是 SQL Server 指标——之后再指导你如何安装和配置此解决方案。

    '
- fmt: "### System Metrics\n\nSystem metrics summarize the status of a Kubernetes\
    \ Node and consist of typical performance indicators like CPU, RAM, and disk usage\
    \ as shown in Figure [8-1](#494804_1_En_8_Chapter.xhtml#Fig1).\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig1_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1: Grafana Portal – Telegraf system dashboard\n\nIn addition to the\
    \ \"big picture,\" you can also get detailed information for every single component\
    \ like a specific disk or network interface.\n\nWhen running into performance\
    \ issues, this is always a good starting point. This can also be a great indicator\
    \ whether you overprovisioned your cluster.\n\n### SQL Server Metrics\n\nWhile\
    \ the Host Node metrics are focused on the physical side of the cluster, the SQL\
    \ Server metrics as shown in Figure [8-2](#494804_1_En_8_Chapter.xhtml#Fig2) provide\
    \ SQL Server–specific performance metrics, many of which DBAs are already familiar\
    \ with.\n\nStatistics show wait time, number of waiting tasks sorted by wait type,\
    \ transactions and requests per second, and other valuable metrics. They help\
    \ to understand more about the status of a specific SQL Server instance within\
    \ the cluster, which can be selected on the upper left of the screen.\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig2_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2: Grafana Portal – SQL Server metrics\n\n### How to Install and Configure\
    \ Grafana\n\nInstalling and configuring Grafana is not as simple as just deploying\
    \ a small pod. Grafana is the tool to visualize data, so we need two more components\
    \ behind the scenes: `InfluxDB`, which is our database to store all the collected\
    \ metrics, and `Telegraf`, which will be deployed to every node, collect the metrics\
    \ on these nodes, and send them to `InfluxDB`.\n\nThe required steps to set up\
    \ Grafana are\n\n*   Create a namespace and set is as your current context.\n\
    *   Set up your variables and secrets to be used by `InfluxDB` and `Grafana`.\n\
    *   Provision storage for `InfluxDB`.\n*   Deploy `InfluxDB`.\n*   Expose the\
    \ `InfluxDB` Deployment through a Service.\n*   Create a `ConfigMap` for `Telegraf`.\n\
    *   Create a `DaemonSet` for `Telegraf`.\n*   Provision storage for `Grafana`.\n\
    *   Deploy `Grafana`.\n*   Expose the `Grafana` Deployment through a Service.\n\
    *   Configure `Grafana` through the Grafana Portal.\n\nYou can see this ensemble\
    \ in Figure [8-3](#494804_1_En_8_Chapter.xhtml#Fig3).\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig3_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3: Grafana and its required components\n\nWe will not be guiding you\
    \ through or explain every single option of rolling out these components – that\
    \ alone would probably justify a book of its own – but rather guide you step by\
    \ step through the required tasks to get them running in your cluster for monitoring\
    \ your SQL Server workloads.\n\nTo keep things clean and tidy, let’s start by\
    \ creating a namespace called `monitoring` and set this as our current context\
    \ using the commands in Listing [8-1](#494804_1_En_8_Chapter.xhtml#PC1). This\
    \ means that every object we deploy after this will automatically be deployed\
    \ to this namespace.\n\n```\nkubectl create namespace monitoring\nkubectl config\
    \ set-context --current --namespace=monitoring\n```\n\nListing 8-1: Create and\
    \ switch to namespace `monitoring`\n\n`InfluxDB` will require a couple of secrets,\
    \ which we’ll set using the command in Listing [8-2](#494804_1_En_8_Chapter.xhtml#PC2).\n\
    \n```\nkubectl create secret generic influxdb-creds \\\n--from-literal=INFLUXDB_DB=monitoring\
    \ \\\n--from-literal=INFLUXDB_USER=user \\\n--from-literal=INFLUXDB_USER_PASSWORD=user\\\
    \n--from-literal=INFLUXDB_READ_USER=readonly \\\n--from-literal=INFLUXDB_READ_USER_PASSWORD=readonly\
    \ \\\n--from-literal=INFLUXDB_ADMIN_USER=admin \\\n--from-literal=INFLUXDB_ADMIN_USER_PASSWORD=admin\
    \ \\\n--from-literal=INFLUXDB_HOST=influxdb \\\n--from-literal=INFLUXDB_HTTP_AUTH_ENABLED=false\n\
    ```\n\nListing 8-2: Set variables and secrets for `InfluxDB`\n\nThe same applies\
    \ to `Grafana` (Listing [8-3](#494804_1_En_8_Chapter.xhtml#PC3)).\n\n```\nkubectl\
    \ create secret generic grafana-creds \\\n--from-literal=GF_SECURITY_ADMIN_USER=admin\
    \ \\\n--from-literal=GF_SECURITY_ADMIN_PASSWORD=admin123 \\\n--from-literal=GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel\n\
    ```\n\nListing 8-3: Set variables and secrets for `Grafana`\n\nUp next is a set\
    \ of YAML manifests. Unless noted otherwise for any of them, please save them\
    \ to a file each and deploy them to your cluster using `kubectl apply -f`. These\
    \ files are of course also available in the downloads of this book.\n\nSimilar\
    \ to what we did for our SQL Server instance, let’s create a persistent volume\
    \ and a persistent volume claim for `InfluxDB` using the manifest in Listing [8-4](#494804_1_En_8_Chapter.xhtml#PC4).\
    \ We will store that data on our NFS share again.\n\n```\napiVersion: v1\nkind:\
    \ PersistentVolume\nmetadata:\n  name: pv-nfs-influxdb\n  labels:\n    disk: influxdb\n\
    spec:\n  capacity:\n    storage: 5Gi\n  accessModes:\n    - ReadWriteOnce\n  persistentVolumeReclaimPolicy:\
    \ Retain\n  nfs:\n    server: storage\n    path: \"/srv/exports/volumes/influxdb\"\
    \n---\napiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: pvc-nfs-influxdb\n\
    spec:\n  selector:\n    matchLabels:\n      disk: influxdb\n  accessModes:\n \
    \   - ReadWriteOnce\n  resources:\n    requests:\n      storage: 5Gi\n```\n\n\
    Listing 8-4: `influxdb-storage.yaml`\n\nListing [8-5](#494804_1_En_8_Chapter.xhtml#PC5)\
    \ deploys the `InfluxDB` application and database."
  raw: '### System Metrics


    System metrics summarize the status of a Kubernetes Node and consist of typical
    performance indicators like CPU, RAM, and disk usage as shown in Figure [8-1](#494804_1_En_8_Chapter.xhtml#Fig1).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig1_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Grafana Portal – Telegraf system dashboard


    In addition to the “big picture,” you can also get detailed information for every
    single component like a specific disk or network interface.


    When running into performance issues, this is always a good starting point. This
    can also be a great indicator whether you overprovisioned your cluster.


    ### SQL Server Metrics


    While the Host Node metrics are focused on the physical side of the cluster, the
    SQL Server metrics as shown in Figure [8-2](#494804_1_En_8_Chapter.xhtml#Fig2)
    provide SQL Server–specific performance metrics, many of which DBAs are already
    familiar with.


    Statistics show wait time, number of waiting tasks sorted by wait type, transactions
    and requests per second, and other valuable metrics. They help to understand more
    about the status of a specific SQL Server instance within the cluster, which can
    be selected on the upper left of the screen.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig2_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Grafana Portal – SQL Server metrics


    #### How to Install and Configure Grafana


    Installing and configuring Grafana is not as simple as just deploying a small
    pod. Grafana is the tool to visualize data, so we need two more components behind
    the scenes: *InfluxDB*, which is our database to store all the collected metrics,
    and *Telegraf*, which will be deployed to every node, collect the metrics on these
    nodes, and send them to *InfluxDB*.


    The required steps to set up Grafana are


    *   Create a namespace and set is as your current context.


    *   Set up your variables and secrets to be used by InfluxDB and Grafana.


    *   Provision storage for InfluxDB.


    *   Deploy InfluxDB.


    *   Expose the InfluxDB Deployment through a Service.


    *   Create a ConfigMap for Telegraf.


    *   Create a DaemonSet for Telegraf.


    *   Provision storage for Grafana.


    *   Deploy Grafana.


    *   Expose the Grafana Deployment through a Service.


    *   Configure Grafana through the Grafana Portal.


    You can see this ensemble in Figure [8-3](#494804_1_En_8_Chapter.xhtml#Fig3).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig3_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Grafana and its required components


    We will not be guiding you through or explain every single option of rolling out
    these components – that alone would probably justify a book of its own – but rather
    guide you step by step through the required tasks to get them running in your
    cluster for monitoring your SQL Server workloads.


    To keep things clean and tidy, let’s start by creating a namespace called *monitoring*
    and set this as our current context using the commands in Listing [8-1](#494804_1_En_8_Chapter.xhtml#PC1).
    This means that every object we deploy after this will automatically be deployed
    to this namespace.


    ```

    kubectl create namespace monitoring

    kubectl config set-context --current --namespace=monitoring

    Listing 8-1

    Create and switch to namespace “monitoring”

    ```


    InfluxDB will require a couple of secrets, which we’ll set using the command in
    Listing [8-2](#494804_1_En_8_Chapter.xhtml#PC2).


    ```

    kubectl create secret generic influxdb-creds \

    --from-literal=INFLUXDB_DB=monitoring \

    --from-literal=INFLUXDB_USER=user \

    --from-literal=INFLUXDB_USER_PASSWORD=user\

    --from-literal=INFLUXDB_READ_USER=readonly \

    --from-literal=INFLUXDB_READ_USER_PASSWORD=readonly \

    --from-literal=INFLUXDB_ADMIN_USER=admin \

    --from-literal=INFLUXDB_ADMIN_USER_PASSWORD=admin \

    --from-literal=INFLUXDB_HOST=influxdb \

    --from-literal=INFLUXDB_HTTP_AUTH_ENABLED=false

    Listing 8-2

    Set variables and secrets for InfluxDB

    ```


    The same applies to Grafana (Listing [8-3](#494804_1_En_8_Chapter.xhtml#PC3)).


    ```

    kubectl create secret generic grafana-creds \

    --from-literal=GF_SECURITY_ADMIN_USER=admin \

    --from-literal=GF_SECURITY_ADMIN_PASSWORD=admin123 \

    --from-literal=GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel

    Listing 8-3

    Set variables and secrets for Grafana

    ```


    Up next is a set of YAML manifests. Unless noted otherwise for any of them, please
    save them to a file each and deploy them to your cluster using *kubectl apply
    -f*. These files are of course also available in the downloads of this book.


    Similar to what we did for our SQL Server instance, let’s create a persistent
    volume and a persistent volume claim for InfluxDB using the manifest in Listing
    [8-4](#494804_1_En_8_Chapter.xhtml#PC4). We will store that data on our NFS share
    again.


    ```

    apiVersion: v1

    kind: PersistentVolume

    metadata:

    name: pv-nfs-influxdb

    labels:

    disk: influxdb

    spec:

    capacity:

    storage: 5Gi

    accessModes:

    - ReadWriteOnce

    persistentVolumeReclaimPolicy: Retain

    nfs:

    server: storage

    path: "/srv/exports/volumes/influxdb"


    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: pvc-nfs-influxdb

    spec:

    selector:

    matchLabels:

    disk: influxdb

    accessModes:

    - ReadWriteOnce

    resources:

    requests:

    storage: 5Gi

    Listing 8-4

    influxdb-storage.yaml

    ```


    Listing [8-5](#494804_1_En_8_Chapter.xhtml#PC5) deploys the InfluxDB application
    and database.'
  trans: "### 系统指标\n\n系统指标汇总了 Kubernetes 节点的状态，并包含典型的性能指标，如 CPU、内存和磁盘使用率，如图 8-1 所示。\n\
    \n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig1_HTML.jpg](img/494804_1_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1：Grafana 门户 – Telegraf 系统仪表板\n\n除了“全局概览”之外，您还可以获取每个独立组件的详细信息，例如特定磁盘或网络接口。\n\
    \n当遇到性能问题时，这始终是一个很好的起点。这也是判断您是否对集群进行了过度配置的一个很好的指标。\n\n### SQL Server 指标\n\n宿主节点指标侧重于集群的物理层面，而如图\
    \ 8-2 所示的 SQL Server 指标则提供了 SQL Server 特定的性能指标，其中许多 DBA 已经很熟悉了。\n\n统计信息显示等待时间、按等待类型排序的等待任务数、每秒事务和请求数以及其他有价值的指标。它们有助于了解集群中特定\
    \ SQL Server 实例的状态，该实例可以在屏幕左上角选择。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig2_HTML.jpg](img/494804_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2：Grafana 门户 – SQL Server 指标\n\n### 如何安装和配置 Grafana\n\n安装和配置 Grafana 不像仅仅部署一个小型\
    \ Pod 那么简单。Grafana 是用于数据可视化的工具，因此我们还需要另外两个组件在幕后工作：`InfluxDB`，这是我们存储所有收集指标的数据库；以及\
    \ `Telegraf`，它将被部署到每个节点上，收集这些节点上的指标，并将它们发送到 `InfluxDB`。\n\n设置 Grafana 所需的步骤是：\n\
    \n*   创建一个命名空间并将其设置为当前上下文。\n*   设置供 `InfluxDB` 和 `Grafana` 使用的变量和密钥。\n*   为 `InfluxDB`\
    \ 配置存储。\n*   部署 `InfluxDB`。\n*   通过 Service 暴露 `InfluxDB` 部署。\n*   为 `Telegraf`\
    \ 创建一个 `ConfigMap`。\n*   为 `Telegraf` 创建一个 `DaemonSet`。\n*   为 `Grafana` 配置存储。\n\
    *   部署 `Grafana`。\n*   通过 Service 暴露 `Grafana` 部署。\n*   通过 Grafana 门户配置 `Grafana`。\n\
    \n您可以在图 8-3 中看到这个组合。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig3_HTML.jpg](img/494804_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3：Grafana 及其所需组件\n\n我们不会逐步指导或解释部署这些组件的每一个选项——单是这一点就足以单独写一本书——而是将逐步指导您完成所需的任务，使它们在您的集群中运行起来，以监控您的\
    \ SQL Server 工作负载。\n\n为了保持整洁有序，让我们从创建一个名为 `monitoring` 的命名空间开始，并使用清单 8-1 中的命令将其设置为当前上下文。这意味着我们之后部署的每个对象都将自动部署到这个命名空间中。\n\
    \n```\nkubectl create namespace monitoring\nkubectl config set-context --current\
    \ --namespace=monitoring\n```\n\n清单 8-1：创建并切换到命名空间 `monitoring`\n\n`InfluxDB`\
    \ 将需要一些密钥，我们将使用清单 8-2 中的命令进行设置。\n\n```\nkubectl create secret generic influxdb-creds\
    \ \\\n--from-literal=INFLUXDB_DB=monitoring \\\n--from-literal=INFLUXDB_USER=user\
    \ \\\n--from-literal=INFLUXDB_USER_PASSWORD=user\\\n--from-literal=INFLUXDB_READ_USER=readonly\
    \ \\\n--from-literal=INFLUXDB_READ_USER_PASSWORD=readonly \\\n--from-literal=INFLUXDB_ADMIN_USER=admin\
    \ \\\n--from-literal=INFLUXDB_ADMIN_USER_PASSWORD=admin \\\n--from-literal=INFLUXDB_HOST=influxdb\
    \ \\\n--from-literal=INFLUXDB_HTTP_AUTH_ENABLED=false\n```\n\n清单 8-2：设置 `InfluxDB`\
    \ 的变量和密钥\n\n这同样适用于 `Grafana`（清单 8-3）。\n\n```\nkubectl create secret generic grafana-creds\
    \ \\\n--from-literal=GF_SECURITY_ADMIN_USER=admin \\\n--from-literal=GF_SECURITY_ADMIN_PASSWORD=admin123\
    \ \\\n--from-literal=GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel\n\
    ```\n\n清单 8-3：设置 `Grafana` 的变量和密钥\n\n接下来是一组 YAML 清单。除非另有说明，否则请将每个清单保存到一个文件中，并使用\
    \ `kubectl apply -f` 将它们部署到您的集群中。当然，这些文件也包含在本书的下载资料中。\n\n与我们为 SQL Server 实例所做的类似，让我们使用清单\
    \ 8-4 中的清单为 `InfluxDB` 创建一个持久卷和一个持久卷声明。我们将再次将数据存储在我们的 NFS 共享上。\n\n```\napiVersion:\
    \ v1\nkind: PersistentVolume\nmetadata:\n  name: pv-nfs-influxdb\n  labels:\n\
    \    disk: influxdb\nspec:\n  capacity:\n    storage: 5Gi\n  accessModes:\n  \
    \  - ReadWriteOnce\n  persistentVolumeReclaimPolicy: Retain\n  nfs:\n    server:\
    \ storage\n    path: \"/srv/exports/volumes/influxdb\"\n---\napiVersion: v1\n\
    kind: PersistentVolumeClaim\nmetadata:\n  name: pvc-nfs-influxdb\nspec:\n  selector:\n\
    \    matchLabels:\n      disk: influxdb\n  accessModes:\n    - ReadWriteOnce\n\
    \  resources:\n    requests:\n      storage: 5Gi\n```\n\n清单 8-4：`influxdb-storage.yaml`\n\
    \n清单 8-5 部署了 `InfluxDB` 应用程序和数据库。"
- fmt: "```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  namespace: monitoring\n\
    \  labels:\n    app: influxdb\n  name: influxdb\nspec:\n  replicas: 1\n  selector:\n\
    \    matchLabels:\n      app: influxdb\n  template:\n    metadata:\n      labels:\n\
    \        app: influxdb\n    spec:\n      containers:\n      - envFrom:\n     \
    \   - secretRef:\n            name: influxdb-creds\n        image: docker.io/influxdb:1.8\n\
    \        name: influxdb\n        volumeMounts:\n        - mountPath: /var/lib/influxdb\n\
    \          name: var-lib-influxdb\n      volumes:\n      - name: var-lib-influxdb\n\
    \        persistentVolumeClaim:\n          claimName: pvc-nfs-influxdb\n```\n\
    Listing 8-5: `influxdb-deployment.yaml`\n\nWe will expose this deployment using\
    \ a `NodePort` service as shown in Listing 8-6.\n\n**Note**\n\nIn this manifest,\
    \ we’re defining a static port (`30010`) for our service. Unlike the previously\
    \ deployed services, this service will always run on this port instead of a random\
    \ port. The advantage of this is that you won’t have to change your URL calls.\n\
    \n```\napiVersion: v1\nkind: Service\nmetadata:\n  labels:\n    app: influxdb\n\
    \  name: influxdb\n  namespace: monitoring\nspec:\n  ports:\n  - port: 8086\n\
    \    protocol: TCP\n    targetPort: 8086\n    nodePort: 30010\n  selector:\n \
    \   app: influxdb\n  type: NodePort\n```\nListing 8-6: `influxdb-service.yaml`\n\
    \nListing 8-7 provides the `ConfigMap` for `Telegraf`. We’ve added the most common\
    \ system metrics (like `CPU`, `disk`, and `memory`) as well as our `SQL Server`.\n\
    \n**Note**\n\nPlease adjust the `<Port>` and `<Password>` in this manifest to\
    \ match your setting before applying it. This will be the password you’ve used\
    \ for your `SQL Server` as well as its port (`NodePort`).\n\n```\napiVersion:\
    \ v1\nkind: ConfigMap\nmetadata:\n  name: telegraf\n  namespace: monitoring\n\
    \  labels:\n    k8s-app: telegraf\ndata:\n  telegraf.conf: |+\n    [global_tags]\n\
    \    env = \"kubeadm\"\n    [agent]\n      hostname = \"$HOSTNAME\"\n    [[outputs.influxdb]]\n\
    \      urls = [\"http://$INFLUXDB_HOST:8086/\"] # required\n      database = \"\
    $INFLUXDB_DB\" # required\n      timeout = \"5s\"\n      username = \"$INFLUXDB_USER\"\
    \n      password = \"$INFLUXDB_USER_PASSWORD\"\n    [[inputs.cpu]]\n      percpu\
    \ = true\n      totalcpu = true\n      collect_cpu_time = false\n      report_active\
    \ = false\n    [[inputs.disk]]\n      ignore_fs = [\"tmpfs\", \"devtmpfs\", \"\
    devfs\"]\n    [[inputs.diskio]]\n    [[inputs.kernel]]\n    [[inputs.mem]]\n \
    \   [[inputs.processes]]\n    [[inputs.swap]]\n    [[inputs.system]]\n    [[inputs.docker]]\n\
    \      endpoint = \"unix:///var/run/docker.sock\"\n    [[inputs.sqlserver]]\n\
    \      servers = [\n        \"Server=control;Port=;User Id=sa;Password=;app name=telegraf;log=1;\"\
    \n      ]\n      query_version = 2\n```\nListing 8-7: `telegraf-configmap.yaml`\n\
    \nNext, we’ll deploy `Telegraf` through a `DaemonSet` using Listing 8-8.\n\n```\n\
    apiVersion: apps/v1\nkind: DaemonSet\nmetadata:\n  name: telegraf\n  namespace:\
    \ monitoring\n  labels:\n    k8s-app: telegraf\nspec:\n  selector:\n    matchLabels:\n\
    \      name: telegraf\n  template:\n    metadata:\n      labels:\n        name:\
    \ telegraf\n    spec:\n      containers:\n      - name: telegraf\n        image:\
    \ docker.io/telegraf:latest\n        env:\n        - name: HOSTNAME\n        \
    \  valueFrom:\n            fieldRef:\n              fieldPath: spec.nodeName\n\
    \        - name: \"HOST_PROC\"\n          value: \"/rootfs/proc\"\n        - name:\
    \ \"HOST_SYS\"\n          value: \"/rootfs/sys\"\n        - name: INFLUXDB_USER\n\
    \          valueFrom:\n            secretKeyRef:\n              name: influxdb-creds\n\
    \              key: INFLUXDB_USER\n        - name: INFLUXDB_USER_PASSWORD\n  \
    \        valueFrom:\n            secretKeyRef:\n              name: influxdb-creds\n\
    \              key: INFLUXDB_USER_PASSWORD\n        - name: INFLUXDB_HOST\n  \
    \        valueFrom:\n            secretKeyRef:\n              name: influxdb-creds\n\
    \              key: INFLUXDB_HOST\n        - name: INFLUXDB_DB\n          valueFrom:\n\
    \            secretKeyRef:\n              name: influxdb-creds\n             \
    \ key: INFLUXDB_DB\n        volumeMounts:\n        - name: sys\n          mountPath:\
    \ /rootfs/sys\n          readOnly: true\n        - name: proc\n          mountPath:\
    \ /rootfs/proc\n          readOnly: true\n        - name: docker-socket\n    \
    \      mountPath: /var/run/docker.sock\n        - name: utmp\n          mountPath:\
    \ /var/run/utmp\n          readOnly: true\n        - name: config\n          mountPath:\
    \ /etc/telegraf\n      terminationGracePeriodSeconds: 30\n      volumes:\n   \
    \   - name: sys\n        hostPath:\n          path: /sys\n      - name: docker-socket\n\
    \        hostPath:\n          path: /var/run/docker.sock\n      - name: proc\n\
    \        hostPath:\n          path: /proc\n      - name: utmp\n        hostPath:\n\
    \          path: /var/run/utmp\n      - name: config\n        configMap:\n   \
    \       name: telegraf\n```\nListing 8-8: `telegraf-daemonset.yaml`\n\nNow that\
    \ we have `InfluxDB` storing our metrics and `Telegraf` collecting them for us,\
    \ it’s time to roll out `Grafana` to visualize them.\n\nThe code in Listing 8-9\
    \ will first provide us our storage for `Grafana`’s configuration.\n\n```\napiVersion:\
    \ v1\nkind: PersistentVolume\nmetadata:\n  name: pv-nfs-grafana\n  labels:\n \
    \   disk: grafana\nspec:\n  capacity:\n    storage: 5Gi\n  accessModes:\n    -\
    \ ReadWriteOnce\n  persistentVolumeReclaimPolicy: Retain\n  nfs:\n    server:\
    \ storage\n    path: \"/srv/exports/volumes/grafana\"\n---\napiVersion: v1\nkind:\
