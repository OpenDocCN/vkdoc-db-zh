    DNS 名称来访问该 `Service` 提供的应用程序。然后，`Service` 会在属于它的 Pod 之间对流量进行负载均衡。


    ![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig3_HTML.jpg](img/494804_1_En_3_Fig3_HTML.jpg)

    图 3-3：`ReplicaSet` 和 `Service`


    在图 3-3 的第二帧中，假设 `ReplicaSet` 中的一个 Pod 发生故障。`ReplicaSet` 控制器感知到这一点，并部署一个新的 Pod，将该新
    Pod 的 IP 地址注册到 `Service` 中，然后开始将流量负载均衡到这个新 Pod。发生故障的 Pod 被删除，其 IP 地址从 `Service`
    中移除，流量不再被发送到该 IP。这一切都是自动发生的，无需任何用户交互。


    此外，当应用程序扩容添加更多 Pod，或缩容移除一些 Pod 时，Pod 的 IP 地址会相应地被添加到 `Service` 或从中移除。这确实是一项了不起的技术，我们每次看到它实际运行时都非常兴奋。这将在第
    5 章中详细演示。


    Kubernetes 中有三种类型的 `Service`，都可以用来访问在 Kubernetes 中运行的应用程序。服务类型分别是 `ClusterIP`、`NodePort`
    和 `LoadBalancer`。让我们更详细地了解每一种：


    - **`ClusterIP`：** `ClusterIP` 类型的 `Service` *仅*在集群内部可用。当应用程序不需要暴露在集群外部时，会使用此类
    `Service`。

    - **`NodePort`：** `NodePort` 类型的 `Service` 在集群中每个节点的真实 IP 地址上的一个固定端口暴露你的应用程序。访问
    `NodePort` 服务需要结合使用集群节点的真实网络 IP 地址和服务端口。接收到的流量会被路由到支持该服务的相应 Pod。当基于集群的应用程序需要从集群外部访问或与外部负载均衡器集成时，会使用
    `NodePort` 服务。

    - **`LoadBalancer`：** 此服务类型集成了云提供商的负载均衡器服务或集群外部部署的负载均衡器（例如本地的 F5）。在基于云的场景中，当基于集群的应用程序需要从集群外部访问时，会使用
    `LoadBalancer` 类型的 `Service`。


    这些服务类型都将在第 5 章中详细演示。


    ## 存储


    作为 SQL Server 专业人员，我们的首要任务是确保数据持久保存。Kubernetes 提供了 API 对象来支持像 SQL Server 这样的有状态应用程序的部署。有两个主要的
    API 对象可用于帮助实现这一点：`PersistentVolume`（持久卷）和 `PersistentVolumeClaim`（持久卷声明）。`PersistentVolume`
    是由集群管理员定义的、可供 Pod 使用的集群内存储。`PersistentVolume` 可以是许多不同类型的存储，例如来自云提供商的虚拟磁盘、`iSCSI`、`NFS`
    等。但 Pod 不直接访问 `PersistentVolume` 对象。Pod 在其对象定义中使用 `PersistentVolumeClaim` 来访问集群存储。`PersistentVolumeClaim`
    会向集群“请求”存储，然后 PVC 会对 `PersistentVolume` 提出声明，并将该 `PersistentVolume` 映射到 Pod。这个额外的抽象层将
    Pod 与 `PersistentVolume` 的存储实现细节解耦。这主要的好处是无需将存储实现细节（例如基础设施特定的存储参数）作为 Pod 定义的一部分。实现细节位于
    `PersistentVolume` 对象中。在 Kubernetes 中持久化数据将在第 6 章中更详细地介绍。


    ## 配置映射


    在 Kubernetes 中，应用程序配置数据可以作为 API 对象存储在集群中。`ConfigMap` 是一种存储键值对数据的 API 对象，是一种集群资源。存储的数据可以作为环境变量甚至配置文件暴露给
    Pod 及其容器，供容器中运行的应用程序使用。它们通常用于配置部署在 Kubernetes 中的更复杂的应用程序。`ConfigMap` 使你能够将配置从部署清单中的代码解耦，并将其存储在集群中供运行时引用。你将在第
    8 章中看到 `ConfigMap` 的使用。

