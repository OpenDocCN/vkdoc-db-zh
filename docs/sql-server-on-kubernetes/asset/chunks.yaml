  trans: '### 网络要求


    从网络角度来看，请确保所有机器都具有唯一的主机名、MAC 地址和 IP 地址。理想情况下，这些 IP 地址应位于同一子网中，但至少必须设置为能够相互访问。


    如果你在网络内运行防火墙（出于本书实验目的，我们建议不要运行防火墙，以避免不必要的网络复杂性），表 4-1 列出了在控制平面上需要可访问的所有 TCP 端口。


    表 4-1


    控制平面节点上必需的 TCP 端口


    | 组件 | TCP 端口 |

    | --- | --- |

    | API | 6443 |

    | Etcd | 2379–2380 |

    | 调度器 | 10251 |

    | 控制器管理器 | 10252 |

    | Kubelet | 10250 |


    在节点上，需要打开表 4-2 中列出的端口。


    表 4-2


    工作节点上必需的 TCP 端口


    | 组件 | TCP 端口 |

    | --- | --- |

    | Kubelet | 10250 |

    | NodePort | 30000–32767 |


    注意


    此处列出的 TCP 端口是默认端口。如果更改了这些端口，请相应地调整防火墙规则。


    ### [获取 Kubernetes](https://app.pluralsight.com/course-player%253FclipId%253Db0f4845d-f2a5-4a1a-a790-a39ccf314435)


    当然，要安装 Kubernetes，我们首先需要获取它。Kubernetes 软件托管在 GitHub 上，因此如果你访问 [*https://GitHub.com/Kubernetes/Kubernetes/*](https://github.com/Kubernetes/Kubernetes/)，就能找到
    Kubernetes 项目。你也可以将自己的想法和更改贡献给该项目。这也是一个非常宝贵的资源，可以详细了解其工作原理，因为你可以查看代码，并通过 GitHub
    上的 issues 学习他人的经验。


    除了软件本身，你还会在那里找到额外的文档。


    虽然理论上你可以获取代码并自行编译所有内容，但为了方便，我们将通过包管理器来安装 Kubernetes。


    ## 构建自管理集群


    理论基础已备，现在让我们开始使用 `kubeadm` 在 Ubuntu 机器上构建我们的第一个 Kubernetes 集群。我们将使用第 1 章中描述的环境，包括其中提到的先决条件。


    注意


    我们所有的脚本都使用第 1 章中描述的主机名/IP 地址。如果你的实验环境使用了不同的设置，你需要相应地调整这些脚本。为了可读性，我们不会逐一指出每个可能需要调整的地方。


    ### 准备虚拟机


    首先，我们需要准备好四台虚拟机（`control` 以及 `node-1`、`node-2` 和 `node-3`），并安装 `containerd` 和
    Kubernetes 软件包。按照下面两段的描述，在每台机器上安装并配置它们。无需在存储机上安装 `containerd`。


    除非另有说明，否则只需在每台机器上使用 shell 运行所述命令。此安装无法直接从我们的管理工作站触发。


    #### 安装和配置 containerd


    要安装 `containerd`，我们需要加载两个模块（`overlay` 和 `br_netfilter`），如清单 4-2 中的代码所示。它们分别是容器运行时使用的
    OverlayFS 和集群内网络所必需的。


    ```

    sudo modprobe overlay

    sudo modprobe br_netfilter

    清单 4-2

    安装 modprobe overlay 和 br_netfilter

    ```


    使用清单 4-3 中的代码，我们需要确保这些模块在重启后也能加载。


    ```

    cat <<EOF | sudo tee /etc/modules-load.d/containerd.conf

    overlay

    br_netfilter

    EOF

    清单 4-3

    持久化 modprobe 和 br_netfilter

    ```


    `containerd` 还需要一些系统参数，我们可以使用清单 4-4 中的命令进行设置和持久化。


    ```

    cat <<EOF | sudo tee /etc/sysctl.d/99-kubernetes-cri.conf

    net.bridge.bridge-nf-call-iptables  = 1

    net.ipv4.ip_forward                 = 1

    net.bridge.bridge-nf-call-ip6tables = 1

    EOF

    清单 4-4

    持久化 containerd 的系统参数

    ```


    接下来，让我们使用清单 4-5 中的命令应用这些设置，而无需重启。


    ```

    sudo sysctl --system

    清单 4-5

    应用 sysctl 更改

    ```


    现在，我们已经为 `containerd` 准备好了先决条件，因此可以通过 `apt-get` 安装它，如清单 4-6 所示。


    ```

    sudo apt-get update

    sudo apt-get install -y containerd

    清单 4-6

    安装 containerd

    ```


    `containerd` 需要一个配置文件，我们可以使用 `containerd` 本身生成一个具有默认设置的配置文件（清单 4-7）。


    ```

    sudo mkdir -p /etc/containerd

    sudo containerd config default | sudo tee /etc/containerd/config.toml

    清单 4-7

    创建 containerd 配置

    ```


    在此文件中，我们必须将 `containerd` 的 cgroup 驱动设置为 `systemd`，因为 `kubelet` 需要此设置。


    以 root 身份在文本编辑器中打开文件 `/etc/containerd/config.toml`（例如，通过 `vi`，如清单 4-8 所示）。


    ```

    sudo vi /etc/containerd/config.toml

    清单 4-8

    编辑 containerd 配置

    ```


    在此文件中，找到清单 4-9 所示的部分。


    ```

    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]

    清单 4-9

    containerd 配置中的章节

    ```


    在该部分下方，添加清单 4-10 所示的两行。


    ```

    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]

    SystemdCgroup = true

    清单 4-10

    要添加到 containerd 配置中的行

    ```


    注意


    此处的缩进很重要——可以是制表符或空格！请确保你的文件看起来像图 4-1 中的文件一样！


    要退出 `vi` 并保存文件，请按 `Esc` 键，然后输入 `:x!`。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig1_HTML.jpg](img/494804_1_En_4_Fig1_HTML.jpg)


    图 4-1


    containerd 配置文件中的缩进


    根据我们的新设置，我们可以使用 `systemctl` 重启 `containerd`，如清单 4-11 所示。


    ```

    sudo systemctl restart containerd

    清单 4-11

    重启 containerd

    ```


    `containerd` 现已准备就绪，我们可以继续安装 Kubernetes 软件包。


    你可以使用清单 4-12 中的命令确认服务状态。


    ```

    sudo systemctl status containerd

    清单 4-12

    containerd 的状态

    ```'
- fmt: '### Installing and Configuring Kubernetes Packages


    As we will be installing packages from the Google repository, we will need to
    add Google’s apt repository gpg key first (Listing [4-13](#494804_1_En_4_Chapter.xhtml#PC13)).


    ```bash

    curl -s https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key add
    -

    ```


    Listing 4-13

    Add Google gpg key


    With that key in place, we can also add the Kubernetes apt repository (Listing
    [4-14](#494804_1_En_4_Chapter.xhtml#PC14)).


    ```bash

    sudo bash -c ''cat /etc/apt/sources.list.d/kubernetes.list

    deb https://apt.kubernetes.io/ kubernetes-xenial main

    EOF''

    ```


    Listing 4-14

    Add Kubernetes apt repository


    Let’s update the apt package list and take a look at the available versions for
    the `kubelet` using the code in Listing [4-15](#494804_1_En_4_Chapter.xhtml#PC15).


    ```bash

    sudo apt-get update

    apt-cache policy kubelet | head -n 20

    ```


    Listing 4-15

    Update apt package list


    This shows the available versions, and as you can see in Figure [4-2](#494804_1_En_4_Chapter.xhtml#Fig2),
    at the time of writing, the latest available version is `1.20.4`.


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig2_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig2_HTML.jpg)


    Figure 4-2

    Version list for `kubelet`


    We can now install `kubelet`, `kubeadm`, and `kubectl` as shown in Listing [4-16](#494804_1_En_4_Chapter.xhtml#PC16).
    If your current machine is also the one you’ve used to install `kubectl` in Chapter
    [1](#494804_1_En_1_Chapter.xhtml), you may get a message that it’s already installed.


    ```bash

    sudo apt-get install -y kubelet kubeadm kubectl

    ```


    Listing 4-16

    Install Kubernetes packages


    This will install the latest version of each of these tools. Should you wish to
    install a previous version, you can specify that as shown in Listing [4-17](#494804_1_En_4_Chapter.xhtml#PC17).
    The code and samples in this book are not version specific though.


    ```bash

    VERSION=1.20.1-00

    sudo apt-get install -y kubelet=$VERSION kubeadm=$VERSION kubectl=$VERSION

    ```


    Listing 4-17

    Install specific version of Kubernetes packages


    To avoid automatic updates, we mark those tools (and `containerd`) as hold (Listing
    [4-18](#494804_1_En_4_Chapter.xhtml#PC18)). This gives us full control over the
    patching process, running it independent from patching the base operating system.


    ```bash

    sudo apt-mark hold kubelet kubeadm kubectl containerd

    ```


    Listing 4-18

    Mark Kubernetes packages and `containerd` as hold


    Let’s check the status of our `kubelet` and our container runtime (Listing [4-19](#494804_1_En_4_Chapter.xhtml#PC19)).


    ```bash

    sudo systemctl status kubelet.service

    sudo systemctl status containerd.service

    ```


    Listing 4-19

    Check status of `kubelet` and `containerd`


    As you can see in Figure [4-3](#494804_1_En_4_Chapter.xhtml#Fig3), the `kubelet`
    will enter a crashloop. This is normal behavior until a cluster is created or
    the node is joined to an existing cluster (you can leave that process by pressing
    `q`).


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig3_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig3_HTML.jpg)


    Figure 4-3

    Status of `kubelet` and `containerd`


    Also make sure that both services are set to start when the system starts up.
    This can be set through the commands in Listing [4-20](#494804_1_En_4_Chapter.xhtml#PC20).


    ```bash

    sudo systemctl enable kubelet.service

    sudo systemctl enable containerd.service

    ```


    Listing 4-20

    Enable startup on reboot for `kubelet` and `containerd`


    Note

    Remember to repeat this process and install and configure these packages on `control`,
    `node1`, `node2`, and `node3` individually!


    ### Creating a Control Plane


    With our container runtime and Kubernetes packages now in place, we can move on
    to create our Control Plane.


    Note

    All commands in this section need to be executed on your `control` VM.


    We start by generating a configuration file as shown in Listing [4-21](#494804_1_En_4_Chapter.xhtml#PC21).


    ```bash

    kubeadm config print init-defaults | tee ClusterConfiguration.yaml

    ```


    Listing 4-21

    Create `kubeadm` configuration file


    Inside the default Cluster configuration file, we need to change a couple of things.
    Some of them can be done in an automated way as shown in Listing [4-22](#494804_1_En_4_Chapter.xhtml#PC22).
    This will


    - Set the IP endpoint for the API Server `localAPIEndpoint.advertiseAddress` to
    the IP address of our Control Plane Node.

    - Change the `nodeRegistration.criSocket` from Docker to `containerd`. In a future
    release of Kubernetes, this will become the default.

    - Set the cgroup driver for the `kubelet` to `systemd`, which is not yet defined
    in this file, as the default is `cgroupfs`.

    - Define the podNetwork.


    ```bash

    sed -i ''s/  advertiseAddress: 1.2.3.4/  advertiseAddress: 172.16.94.10/'' ClusterConfiguration.yaml

    sed -i ''s/  criSocket: \/var\/run\/dockershim\.sock/  criSocket: \/run\/containerd\/containerd\.sock/''
    ClusterConfiguration.yaml

    cat > ClusterConfiguration.yaml


    apiVersion: kubelet.config.k8s.io/v1beta1

    kind: KubeletConfiguration

    cgroupDriver: systemd

    EOF

    ```


    Listing 4-22

    Modify `kubeadm` config file


    We also need to edit the `kubernetesVersion` in this file to match the version
    you installed earlier. First, confirm the installed version using the command
    in Listing [4-23](#494804_1_En_4_Chapter.xhtml#PC23).


    ```bash

    kubeadm version

    ```


    Listing 4-23

    Get current `kubeadm` version


    As you can see in Figure [4-4](#494804_1_En_4_Chapter.xhtml#Fig4), we have version
    `1.20.4` installed – unless you went with another version.


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig4_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig4_HTML.jpg)


    Figure 4-4

    Current version of `kubeadm` installed


    With this information, we can now edit the file (e.g., through `vi`) `ClusterConfiguration.yaml`
    and make sure the version matches as shown in Figure [4-5](#494804_1_En_4_Chapter.xhtml#Fig5).


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig5_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig5_HTML.jpg)


    Figure 4-5

    Set current version of `kubelet` in `ClusterConfiguration.yaml`.


    In the `networking` section, add a line that sets the `podSubnet` to `10.244.0.10/16`
    as shown in Figure [4-6](#494804_1_En_4_Chapter.xhtml#Fig6), which is required
    by the `flannel` network plugin.


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig6_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig6_HTML.jpg)


    Figure 4-6

    `podSubnet` in `ClusterConfiguration.yaml`


    Now, we’re ready to initialize our cluster using `kubeadm` as shown in Listing
    [4-24](#494804_1_En_4_Chapter.xhtml#PC24).


    ```bash

    sudo kubeadm init \

    --config=ClusterConfiguration.yaml \

    --cri-socket /run/containerd/containerd.sock

    ```


    Listing 4-24

    Initialize cluster


    This will take a few minutes and will output its progress constantly. The result
    should look similar to what you see in Figure [4-7](#494804_1_En_4_Chapter.xhtml#Fig7).


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig7_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig7_HTML.jpg)


    Figure 4-7

    Output of `kubeadm init`


    To make sure that we can interact with our cluster on a non-elevated shell as
    well, we need to create a config file and store it in our home directory as shown
    in Listing [4-25](#494804_1_En_4_Chapter.xhtml#PC25).


    ```bash

    mkdir -p $HOME/.kube

    sudo cp -i /etc/kubernetes/admin.conf $HOME/.kube/config

    sudo chown $(id -u):$(id -g) $HOME/.kube/config

    ```


    Listing 4-25

    Create `kubectl` configuration


    Note

    If you are using an administrative workstation, you can take this file and copy
    it or its contents to `.kube/config` in your home directory on this workstation.
    This will allow you to communicate with your cluster from that workstation.'
