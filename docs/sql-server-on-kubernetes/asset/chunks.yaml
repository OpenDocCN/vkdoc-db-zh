    \ Listing [5-6](#494804_1_En_5_Chapter.xhtml#PC6) will get you the exact same\
    \ result twice.\n\n```\nkubectl get no\nkubectl get nodes\nListing 5-6\nKubectl\
    \ command with and without resource type alias\n```\n\nThe official documentation\
    \ at [*https://kubernetes.io/docs/reference/kubectl/overview/#resource-types*](https://kubernetes.io/docs/reference/kubectl/overview/%2523resource-types)\
    \ has the full list of resource types available for you!\n\nBy the way, you can\
    \ also get a list of all the available resource types in your Kubernetes cluster\
    \ by running the command in Listing [5-7](#494804_1_En_5_Chapter.xhtml#PC7). This\
    \ is also another example for a command that doesn’t use operations, resources,\
    \ or output options.\n\n```\nkubectl api-resources\nListing 5-7\nKubectl command\
    \ to list available resource types\n```"
  trans: "# 5. 与 Kubernetes 集群交互\n\n集群功能正常运行并启动后，我们现在将学习与集群交互的核心工具——`kubectl`。Kubectl\
    \ 是一个命令行客户端，用于在 Kubernetes 中部署和维护应用程序，以及管理集群本身。在掌握了 `kubectl` 的基本知识后，我们将学习如何在集群中部署和访问应用程序。\n\
    \n为确保您的管理工作站能够访问集群，请使用代码清单 5-1 中的命令将 `kubectl` 配置复制到该工作站。\n\n```\nmkdir c:\\users\\\
    labuser\\.kube\n$LinuxPW=\"Str@ngPassw0rd\"\npscp -P 22 -pw $LinuxPW labuser@control:/home/labuser/.kube/config\
    \ c:\\users\\labuser\\.kube\n```\n*代码清单 5-1：将 kubectl 配置复制到 Windows 工作站*\n\n##\
    \ 使用 kubectl 与集群交互\n\nKubectl 是一个命令行工具，用于在 Kubernetes 中创建、读取、更新或删除几乎任何类型的资源。请记住，在\
    \ Kubernetes 中，所有操作都通过 API Server 进行，因此 `kubectl` 是您与 API Server 交互的主要方式。任何需要在\
    \ Kubernetes 中创建、修改或查询内容时，这都是主要的命令行工具。\n\n大多数 `kubectl` 命令实际上由三部分组成：\n\n*   **操作：**\
    \ 您想做什么？\n*   **资源：** 您想对什么资源执行操作？\n*   **输出：** 对于会产生输出的命令，输出应如何格式化？\n\n一个典型的命令如代码清单\
    \ 5-2 中的通用示例所示。\n\n```\nkubectl    \n```\n*代码清单 5-2：通用 kubectl 命令*\n\n例如，代码清单\
    \ 5-3 中的命令将返回集群中所有节点的详细列表。\n\n```\nkubectl get nodes -o wide\n```\n*代码清单 5-3：用于检索集群中节点详细列表的\
    \ Kubectl 命令*\n\n该命令的输出应与图 5-1 中的内容类似。\n\n![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig1_HTML.jpg](img/494804_1_En_5_Fig1_HTML.jpg)\n\
    \n*图 5-1：kubectl get node -o wide 命令的输出*\n\n如果您正在查找特定命名空间中的资源，此筛选条件也会传递给 `kubectl`。代码清单\
    \ 5-4 中的命令将返回在 `mssql-server` 命名空间中运行的所有 Pod。\n\n```\nkubectl get pods -n kube-system\n\
    ```\n*代码清单 5-4：用于检索命名空间中 Pod 的 Kubectl 命令*\n\n**注意**\n\n与 Kubernetes 生态系统中的大多数工具一样，`kubectl`\
    \ 可跨平台运行，因此无论您是在 Windows、Linux 还是 Mac 上运行，这些命令都完全相同。\n\n此语法的一个例外情况如代码清单 5-5 所示。\n\
    \n```\nkubectl cluster-info\n```\n*代码清单 5-5：用于获取集群概况的 Kubectl 命令*\n\n此命令未指定操作、资源或输出。这些都不需要，因为该命令提供集群的概况信息，例如其控制平面\
    \ IP 地址和端口，以及 KubeDNS 的状态。\n\n您收到的输出应大致与图 5-2 中的输出匹配。\n\n![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig2_HTML.jpg](img/494804_1_En_5_Fig2_HTML.jpg)\n\
    \n*图 5-2：kubectl cluster-info 命令的输出*\n\n让我们更仔细地看看 `kubectl` 命令的不同组成部分。\n\n###\
    \ 操作\n\n在 Kubernetes 中使用 `kubectl` 有大量操作，因此让我们专注于核心操作并更详细地了解它们：\n\n*   **应用：**\
    \ 这将把文件内容（通常是 YAML 文件）部署到您的 Kubernetes 集群。例如，在上一章部署集群时，我们在添加 flannel 时使用了此操作。`apply`\
    \ 也用于将应用程序声明式地部署到集群中。\n*   **创建：** `create` 允许您以命令式方式向集群添加资源，我们将在本章后面解释如何将应用程序部署到集群时更深入地探讨此操作。在许多情况下，`create`\
    \ 和 `apply` 可以达到相同的效果。\n*   **运行：** `run` 允许您启动一个 Pod 并指定容器镜像，基本上是引导最基本的 Pod 配置。\n\
    *   **解释：** 这为您提供了特定 Kubernetes API 对象或资源的文档，列出描述和构建该对象所需的字段。这在构建清单文件时特别有用，也可用于快速查找对象的字段名称。\n\
    *   **删除：** 这将删除指定的资源。\n*   **获取：** `kubectl get` 将显示有关指定资源类型的基本信息。\n*   **描述：**\
    \ `describe` 提供详细的资源信息，用于显示特定资源的非常详细的信息。当出现问题时，这是您的第一站：底部的事件部分是进行故障排除的绝佳位置。\n\
    *   **执行：** `exec` 允许您在 Pod 内的容器中执行命令。\n*   **日志：** 这允许您查看在 Pod 内运行的容器的日志。\n\n\
    如前所述，这是一个简短的列表，包含我们认为最关键的几个操作，只是为了让您入门。您可以在 [`kubernetes.io/docs/reference/kubectl/overview/#operations`](https://kubernetes.io/docs/reference/kubectl/overview/%23operations)\
    \ 找到完整的列表，我们强烈建议您查看一下！\n\n### 资源\n\n在命令行工作时，我们将把 `kubectl` 与前面看到的操作（如 `get`、`apply`\
    \ 等）和资源结合起来。基本上，*针对什么*执行该操作。我们也介绍了节点、Pod 和服务等概念，老实说，Kubernetes 中还有更多我们可以使用的对象。这就是我们指定要对哪种资源类型执行操作的方式。\n\
    \n一些最常见的资源类型包括：\n\n*   节点 (`no`)\n*   Pod (`po`)\n*   服务 (`svc`)\n\n在这里您可以看到括号中代表该特定资源类型的别名，因此节点用\
    \ `no`，Pod 用 `po`，服务用 `svc`，这是一个让我们能在命令行快速执行这些命令的好方法。\n\n它们在使用 `kubectl` 时完全同义，因此运行代码清单\
    \ 5-6 中的命令两次将得到完全相同的结果。\n\n```\nkubectl get no\nkubectl get nodes\n```\n*代码清单\
    \ 5-6：使用和不使用资源类型别名的 Kubectl 命令*\n\n官方文档 [`kubernetes.io/docs/reference/kubectl/overview/#resource-types`](https://kubernetes.io/docs/reference/kubectl/overview/%23resource-types)\
    \ 提供了可用资源类型的完整列表供您参考！\n\n顺便说一句，您还可以通过运行代码清单 5-7 中的命令来获取 Kubernetes 集群中所有可用资源类型的列表。这是另一个不使用操作、资源或输出选项的命令示例。\n\
    \n```\nkubectl api-resources\n```\n*代码清单 5-7：用于列出可用资源类型的 Kubectl 命令*"
- fmt: '## Output


    The final part of a `kubectl` command construct is modifying its output. We can
    specify `kubectl`''s output format by adding additional flags to our commands.


    One very helpful format that we want to introduce you to is `wide`, which will
    add additional information about our Kubernetes objects that are working with
    standard out.


    We can also output our Kubernetes objects as `YAML` and `JSON`. `YAML`- and `JSON`-formatted
    files are at the core of how Kubernetes describes things declaratively, giving
    us the ability to describe our configurations in code. We can use `kubectl` to
    output `YAML` or `JSON`, and this is a very valuable way to get configuration
    data out of our cluster and describe the resources that we''ve deployed in our
    cluster. We can persist this to file and exchange it with other systems, other
    environments, and other developers if we need to.


    Another option is `jsonpath`, which will only get you a specific subset or value
    from your `JSON` output. This is especially useful when you want to retrieve values
    like ports or IP addresses, for example, to be subsequently used in variables
    in a script.


    The full list of output options can be found at [`https://kubernetes.io/docs/reference/kubectl/overview/#output-options`](https://kubernetes.io/docs/reference/kubectl/overview/%2523output-options).
    Another very helpful resource, especially when you''re still getting acquainted
    with `kubectl`, is the `kubectl` cheatsheet: [`https://kubernetes.io/docs/reference/kubectl/cheatsheet/`](https://kubernetes.io/docs/reference/kubectl/cheatsheet/).


    ## Kubectl Context


    `Kubectl` can be used to manage multiple Kubernetes clusters from the same workstation.
    This is handled through so-called contexts. A context is the combination of a
    cluster and credentials to be used to log into that cluster.


    Let''s begin by listing all the contexts that are currently available to us using
    the command in Listing 5-8.


    ```

    kubectl config view

    ```

    Listing 5-8

    Show config of kubectl including all contexts


    As we can see in Figure 5-3, we have our `kubernetes-admin` context (which is
    our `kubeadm` cluster) and the `AKSCluster` context (which is our cluster in Azure
    Kubernetes Service).


    `../images/494804_1_En_5_Chapter/494804_1_En_5_Fig3_HTML.jpg`

    Figure 5-3

    View of current kubectl config


    Next, let''s check which context we''re currently using by running the command
    in Listing 5-9.


    ```

    kubectl config current-context

    ```

    Listing 5-9

    Get current kubectl context


    As shown in Figure 5-4, our current context is `kubernetes-admin`, so any `kubectl`
    command at this point will be executed against our `kubeadm` cluster.


    `../images/494804_1_En_5_Chapter/494804_1_En_5_Fig4_HTML.jpg`

    Figure 5-4

    Current kubectl context


    Let''s change the context to `AKSCluster` using Listing 5-10.


    ```

    kubectl config use-context AKSCluster

    ```

    Listing 5-10

    Switch kubectl context to AKSCluster


    This will change our current context to `aks-admin`. All commands in `kubectl`
    will now be executed against the AKS cluster.


    > **Note**

    >

    > Unless stated otherwise, all exercises in this and the upcoming chapters should
    be executed in the context `kubernetes-admin@kubernetes`.


    ## Application Deployment in Kubernetes


    So now that we know how to interact with our cluster at the command line, let''s
    move the conversation to application deployment in Kubernetes.


    Like most commands in Kubernetes being executed through `kubectl`, applications
    can be deployed using either an imperative or a declarative configuration.


    ### Imperative Deployments


    When you''re using imperative configuration, you''re generally going to be executing
    commands at the command line one at a time, and you''re going to be operating
    on one object at a time.


    Let''s run the command in Listing 5-11.


    ```

    kubectl create deployment nginx --image=nginx

    ```

    Listing 5-11

    Kubectl command to create a deployment using nginx


    The command is sent to the API Server, which will create a deployment named `nginx`
    based on the `nginx` image, but we''re only operating on one object at a time
    on the command line.


    This also works with other types of objects of course. The command in Listing
    5-12, for example, will again use the `nginx` image, but it will create a single
    pod running it.


    ```

    kubectl run nginx --image=nginx

    ```

    Listing 5-12

    Kubectl command to run a new nginx pod


    While this is certainly a straightforward way to manage a system, if your application
    stack starts to grow and your configurations and your deployments become more
    complex, managing each individual object at the command line isn''t really a sustainable
    way to manage or maintain your system. We''re going to want to do things declaratively,
    and this is a core principle behind Kubernetes where we define the desired state
    of our application or the cluster itself in code using `YAML` or `JSON`.


    Let us look at the pods using the command in Listing 5-13.


    ```

    kubectl get pods

    ```

    Listing 5-13

    kubectl command to list pods


    We will see (Figure 5-5) both our pods: the one that we spun up individually (named
    `nginx`) and the one from our deployment (named `nginx-6799fc88d8-fj928`). The
    name of the pod from our deployment is random and will change every single time
    the pod gets terminated and a new pod from the same deployment is created.


    `../images/494804_1_En_5_Chapter/494804_1_En_5_Fig5_HTML.jpg`

    Figure 5-5

    Output of kubectl get pods


    Before we move on to declarative deployments though, let''s clean up and delete
    the previously created deployment and pod using the command in Listing 5-14.


    ```

    kubectl delete deployment nginx

    kubectl delete pod nginx

    ```

    Listing 5-14

    Kubectl command to remove the imperatively created resources


    The deletion of the deployment will complete immediately, whereas the deletion
    of the individual pod will only return once the pod has been terminated and deleted.'
