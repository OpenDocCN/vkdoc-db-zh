    # 第一部分：容器与 Kubernetes 基础

    '
- fmt: '# Getting Started


    Welcome to `SQL Server on Kubernetes`! This chapter introduces the lab architecture
    and technical requirements that you’ll need to have in place to perform the labs
    in this book. The first set of labs is based on deploying SQL Server in a container
    on a Docker host. Then we’ll progress to deploying SQL Server and other applications
    into a Kubernetes cluster that we will help you build later in the book.


    ## Installing Docker


    In Chapter [2](#494804_1_En_2_Chapter.xhtml), we will introduce containers and
    deploying SQL Server as a container. To perform the labs in that chapter, you
    will need an installation of Docker on a computer and the `sqlcmd` utility. If
    you prefer using another command line–based SQL client like `mssql-cli`, that
    is fine too. However, for simplicity, we will stick to `sqlcmd` in our demos.


    Docker is available for Windows, MacOS, and Linux platforms, each of which has
    a unique installation method. While you can install Docker on any of these platforms
    and the Chapter [2](#494804_1_En_2_Chapter.xhtml) demos will work, we’re going
    to suggest for this course to create a virtual machine (VM) with two vCPUs, 8GB
    of RAM and 150GB of disk space, and install Ubuntu 18.04 as the base operating
    system.


    Here are links to the installation instructions for Docker on its various platforms.
    Please review the installation requirements for installing Docker on each of these
    platforms. If you want to replicate the demos in Chapter [2](#494804_1_En_2_Chapter.xhtml),
    you will need to have this environment in place first:


    *   **Docker Desktop for Windows:** [*https://docs.docker.com/docker-for-windows/install/*](https://docs.docker.com/docker-for-windows/install/)

    *   **Docker Desktop for Mac:** [*https://docs.docker.com/docker-for-mac/install/*](https://docs.docker.com/docker-for-mac/install/)

    *   **Docker Engine – Community (Ubuntu):** [*https://docs.docker.com/install/linux/docker-ce/ubuntu/*](https://docs.docker.com/install/linux/docker-ce/ubuntu/)


    Prior to moving on, please ensure you can successfully run a container in your
    environment. Execute Listing [1-1](#494804_1_En_1_Chapter.xhtml#PC1) at the command
    line.


    `docker run hello-world`


    Listing 1-1: Running your first Docker container


    If the container runs successfully, you will see the output shown in Listing [1-2](#494804_1_En_1_Chapter.xhtml#PC2).


    ```

