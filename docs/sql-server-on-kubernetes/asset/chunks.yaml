- fmt: '# Kubernetes Cluster Components


    ## Secrets


    A `Secret` is an API Object used to store sensitive information to be used by
    applications deployed in your Kubernetes cluster. Secrets are commonly used to
    store things like passwords, API tokens, public and private key pairs, and TLS
    certificates. You can write a deployment manifest and refer to that `Secret` by
    name, and the information stored in the `Secret` can be exposed to the containers
    running in the Pods as environment variables or as files in the file system.


    Secrets enable you to have safer and more flexible manifests and container images
    since you are not storing sensitive information along with those resources. You
    want to avoid storing sensitive information in deployment manifests and container
    images. Secrets allow you to store this type of potentially sensitive information
    in the cluster and retrieve it for later use at deployment time.


    ## Exploring Kubernetes Cluster Architecture


    The first part of this chapter introduces Kubernetes concepts and the core API
    Objects used to build and deploy workloads in a Kubernetes Cluster. Now it is
    time to dive into what a Kubernetes Cluster is, looking closely at each of the
    major components.


    A Kubernetes Cluster is a collection of servers (physical or virtual) called `Nodes`
    that provide a platform for running container-based applications in Pods. There
    are two types of Nodes in a Cluster. `Control Plane Nodes` are the controller
    of the Cluster itself, the brains behind the operations. `Worker Nodes` are the
    compute devices used to run Pods. Let’s look at each more closely, starting with
    the Control Plane Nodes. Figure [3-4](#494804_1_En_3_Chapter.xhtml#Fig4) provides
    us an overview of the cluster components.


    ![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig4_HTML.jpg](images/494804_1_En_3_Chapter/494804_1_En_3_Fig4_HTML.jpg)


    Figure 3-4: Kubernetes Cluster components


    ### Control Plane Nodes


    `Control Plane Nodes` operate the Control Plane Services. The Control Plane Services
    implement the core functions of a Kubernetes Cluster, such as managing the Cluster
    itself and its resources and controlling workload. The Control Plane consists
    of four components, each with a specific responsibility in the Cluster. They are
    the `API Server`, `etcd`, the `Scheduler`, and the `Controller Manager`. The Control
    Plane Services and Control Plane components are most commonly deployed as Pods
    that can run on a single Control Plane Node or run on several Control Plane Nodes
    for high availability. For more information on building highly available Clusters
    and their configuration, check out [https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/)
    and [https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/).


    Let’s look at each of the Control Plane functions and their responsibility in
    the cluster in more detail:


    *   `API Server`: The `API Server` is the main communication hub in a Cluster.
    All Cluster components communicate through the `API Server` to exchange information
    and state. It is a simple, stateless REST API that implements and exposes the
    Kubernetes API for access to users and other Cluster components. As API Objects
    are created, modified, or deleted, those objects’ state is committed to the Cluster.
    Multiple replicas of the `API Server` can be deployed across several Control Plane
    Nodes, and API traffic can be load balanced for high availability.


    *   `etcd`: `etcd` is a key-value data store used to persist the state of the
    Cluster. The `API Server` itself is stateless but serializes and stores object
    data in `etcd`. Since it does persist data, this needs to be protected for both
    recovery and availability. Backups of `etcd` should occur frequently, and if high
    availability is required, multiple replicas are configured in a highly available
    configuration.


    *   `Controller Manager`: The `Controller Manager` implements and ensures the
    desired state of the Cluster and its workloads. It uses control loops to monitor
    the running condition continually, compare it with the desired state, and make
    the changes needed to get the Cluster back into the desired state. To do this,
    the `Controller Manager` watches and updates the `API Server`. Earlier in this
    chapter, we introduced the concept of Controllers and how they enable you to tell
    the Kubernetes API what the desired state is. The `Controller Manager` implements
    that state. When it comes to Pods and application workloads, if a `Deployment`
    defines that three Pod Replicas of an application need to be online, the `Controller
    Manager` has the responsibility to ensure that those Pods are always online and
    ready reconciling the defined state with the Cluster’s running state by creating
    new Pods if needed.


    *   `Scheduler`: The `Scheduler` decides which Node in a Cluster to start a Pod
    on. It monitors the `API Server` looking for any unscheduled Pods. If the `Scheduler`
    finds any unscheduled Pods, it determines the best place to run those Pods in
    the Cluster. The scheduling decision is based on the resources available in the
    Cluster, the requirements defined for each pod, and potentially any administrative
    policy constraints. If you would like more details on scheduling, please check
    out the Pluralsight course “Configuring and Managing Kubernetes Storage and Scheduling.”'
  raw: '#### Secrets


    A Secret is an API Object used to store sensitive information to be used by applications
    deployed in your Kubernetes cluster. Secrets are commonly used to store things
    like passwords, API tokens, public and private key pairs, and TLS certificates.
    You can write a deployment manifest and refer to that Secret by name, and the
    information stored in the Secret can be exposed to the containers running in the
    Pods as environment variables or as files in the file system.


    Secrets enable you to have safer and more flexible manifests and container images
    since you are not storing sensitive information along with those resources. You
    want to avoid storing sensitive information in deployment manifests and container
    images. Secrets allow you to store this type of potentially sensitive information
    in the cluster and retrieve it for later use at deployment time.


    ## Kubernetes Cluster Components


    The first part of this chapter introduces Kubernetes concepts and the core API
    Objects used to build and deploy workloads in a Kubernetes Cluster. Now it is
    time to dive into what a Kubernetes Cluster is, looking closely at each of the
    major components.


    ### Exploring Kubernetes Cluster Architecture


    A Kubernetes Cluster is a collection of servers (physical or virtual) called *Nodes*
    that provide a platform for running container-based applications in Pods. There
    are two types of Nodes in a Cluster. *Control Plane Nodes* are the controller
    of the Cluster itself, the brains behind the operations. *Worker Nodes* are the
    compute devices used to run Pods. Let’s look at each more closely, starting with
    the Control Plane Nodes. Figure [3-4](#494804_1_En_3_Chapter.xhtml#Fig4) provides
    us an overview of the cluster components.


    ![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig4_HTML.jpg](images/494804_1_En_3_Chapter/494804_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Kubernetes Cluster components


    #### Control Plane Nodes


    Control Plane Nodes operate the Control Plane Services. The Control Plane Services
    implement the core functions of a Kubernetes Cluster, such as managing the Cluster
    itself and its resources and controlling workload. The Control Plane consists
    of four components, each with a specific responsibility in the Cluster. They are
    the *API Server*, *etcd*, the *Scheduler*, and the *Controller Manager*. The Control
    Plane Services and Control Plane components are most commonly deployed as Pods
    that can run on a single Control Plane Node or run on several Control Plane Nodes
    for high availability. For more information on building highly available Clusters
    and their configuration, check out [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/)
    and [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/)*.*


    Let’s look at each of the Control Plane functions and their responsibility in
    the cluster in more detail:


    *   **API Server:** The API Server is the main communication hub in a Cluster.
    All Cluster components communicate through the API Server to exchange information
    and state. It is a simple, stateless REST API that implements and exposes the
    Kubernetes API for access to users and other Cluster components. As API Objects
    are created, modified, or deleted, those objects’ state is committed to the Cluster.
    Multiple replicas of the API Server can be deployed across several Control Plane
    Nodes, and API traffic can be load balanced for high availability.


    *   **Etcd:** etcd is a key-value data store used to persist the state of the
    Cluster. The API Server itself is stateless but serializes and stores object data
    in etcd. Since it does persist data, this needs to be protected for both recovery
    and availability. Backups of etcd should occur frequently, and if high availability
    is required, multiple replicas are configured in a highly available configuration.


    *   **Controller Manager:** The Controller Manager implements and ensures the
    desired state of the Cluster and its workloads. It uses control loops to monitor
    the running condition continually, compare it with the desired state, and make
    the changes needed to get the Cluster back into the desired state. To do this,
    the Controller Manager watches and updates the API Server. Earlier in this chapter,
    we introduced the concept of Controllers and how they enable you to tell the Kubernetes
    API what the desired state is. The Controller Manager implements that state. When
    it comes to Pods and application workloads, if a Deployment defines that three
    Pod Replicas of an application need to be online, the Controller Manager has the
    responsibility to ensure that those Pods are always online and ready reconciling
    the defined state with the Cluster’s running state by creating new Pods if needed.


    *   **Scheduler:** The Scheduler decides which Node in a Cluster to start a Pod
    on. It monitors the API Server looking for any unscheduled Pods. If the Scheduler
    finds any unscheduled Pods, it determines the best place to run those Pods in
    the Cluster. The scheduling decision is based on the resources available in the
    Cluster, the requirements defined for each pod, and potentially any administrative
    policy constraints. If you would like more details on scheduling, please check
    out the Pluralsight course “Configuring and Managing Kubernetes Storage and Scheduling.”'
