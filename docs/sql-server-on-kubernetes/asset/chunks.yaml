    # Kubernetes 集群组件


    ## Secrets


    一个 `Secret` 是一种用于存储敏感信息的 API 对象，供部署在 Kubernetes 集群中的应用程序使用。Secrets 通常用于存储诸如密码、API
    令牌、公私钥对以及 TLS 证书等信息。您可以编写一个部署清单并通过名称引用该 `Secret`，其中存储的信息可以作为环境变量或文件系统中的文件暴露给在
    Pod 中运行的容器。


    Secrets 使您能够拥有更安全、更灵活的清单和容器镜像，因为您无需将敏感信息与这些资源一起存储。您应该避免在部署清单和容器镜像中存储敏感信息。Secrets
    允许您将此类潜在敏感信息存储在集群中，并在部署时检索以供后续使用。


    ## 探索 Kubernetes 集群架构


    本章第一部分介绍了 Kubernetes 的概念以及用于在 Kubernetes 集群中构建和部署工作负载的核心 API 对象。现在是时候深入了解什么是 Kubernetes
    集群了，让我们仔细看看每个主要组件。


    Kubernetes 集群是称为 `Node` 的服务器（物理或虚拟）集合，为在 Pod 中运行基于容器的应用程序提供了一个平台。集群中有两种类型的节点。`控制平面节点`
    是集群本身的控制器，是操作背后的大脑。`工作节点` 是用于运行 Pod 的计算设备。让我们更仔细地研究每一个，首先从控制平面节点开始。图 3-4 为我们提供了集群组件的概览。


    ![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig4_HTML.jpg](img/494804_1_En_3_Fig4_HTML.jpg)


    图 3-4：Kubernetes 集群组件


    ### 控制平面节点


    `控制平面节点` 运行控制平面服务。控制平面服务实现了 Kubernetes 集群的核心功能，例如管理集群本身及其资源，以及控制工作负载。控制平面由四个组件组成，每个组件在集群中都有特定的职责。它们是
    `API Server`、`etcd`、`Scheduler` 和 `Controller Manager`。控制平面服务和组件最常见的部署方式是作为 Pod，可以在单个控制平面节点上运行，也可以在多个控制平面节点上运行以实现高可用性。有关构建高可用集群及其配置的更多信息，请查阅
    [`kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/)
    和 [`kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/)。


    让我们更详细地看看每个控制平面功能及其在集群中的职责：


    *   `API Server`：`API Server` 是集群中的主要通信枢纽。所有集群组件都通过 `API Server` 进行通信以交换信息和状态。它是一个简单的、无状态的
    REST API，实现并暴露 Kubernetes API，供用户和其他集群组件访问。当 API 对象被创建、修改或删除时，这些对象的状态会被提交到集群。可以跨多个控制平面节点部署
    `API Server` 的多个副本，并且可以对 API 流量进行负载均衡以实现高可用性。

    *   `etcd`：`etcd` 是一个键值数据存储，用于持久化集群的状态。`API Server` 本身是无状态的，但它会序列化对象数据并存储在 `etcd`
    中。由于它确实持久化数据，因此需要为恢复和可用性提供保护。应频繁备份 `etcd`，如果需要高可用性，则应配置多个副本以实现高可用性配置。

    *   `Controller Manager`：`Controller Manager` 实现并确保集群及其工作负载的期望状态。它使用控制循环持续监控运行状况，将其与期望状态进行比较，并进行必要的更改以使集群恢复到期望状态。为此，`Controller
    Manager` 观察并更新 `API Server`。在本章前面，我们介绍了控制器的概念以及它们如何让您告诉 Kubernetes API 期望的状态是什么。`Controller
    Manager` 实现该状态。当涉及到 Pod 和应用程序工作负载时，如果某个 `Deployment` 定义了需要有三个 Pod 副本的应用程序在线，`Controller
    Manager` 的职责就是确保这些 Pod 始终在线并准备就绪，通过在需要时创建新的 Pod 来协调定义的状态与集群的运行状态。

    *   `Scheduler`：`Scheduler` 决定在集群中的哪个节点上启动 Pod。它监控 `API Server`，寻找任何未调度的 Pod。如果
    `Scheduler` 发现任何未调度的 Pod，它会确定在集群中运行这些 Pod 的最佳位置。调度决策基于集群中可用的资源、为每个 Pod 定义的需求，以及可能的任何管理策略约束。如果您想了解更多关于调度的细节，请查看
    Pluralsight 课程“Configuring and Managing Kubernetes Storage and Scheduling”。

