    ### Docker 卷


    Docker 卷（`https://docs.docker.com/storage/`）是一种由 Docker 管理的资源，它独立于容器的生命周期。Docker
    卷从底层操作系统或共享存储分配存储空间，并将其呈现到容器文件系统内的特定位置。


    提示

    请访问 `https://docs.docker.com/storage/storagedriver/` 查阅 Docker 文档以获取关于存储驱动程序的信息。


    当一个卷被挂载到容器文件系统内的某个位置时，应用程序修改的数据会被写入该文件系统位置，并最终写入卷中。这个卷的后端存储位于容器外部。现在，如果这个容器被删除，容器及其可写层仍然会被删除，但卷会保留下来，因为它的生命周期独立于容器。因此，文件系统中未由卷支持的其他部分的所有更改将不会被持久化。但是，写入由卷支持的文件位置的数据将被持久化。如果创建一个新容器并将该卷挂载到其中，存储在该卷中的数据在新容器中仍然是可访问的。图
    2-18 展示了一个名为 `sql1` 的容器化应用程序访问一个名为 `sqldata1` 的卷。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig18_HTML.jpg](img/494804_1_En_2_Fig18_HTML.jpg)


    图 2-18：附加了卷的容器


    让我们来看一些为 SQL Server 容器定义 Docker 卷的代码。


    ### 创建带有卷的容器


    清单 2-25 中的代码展示了一个容器的启动命令，与我们之前的示例类似。关键区别在于使用了 `-v` 或 `--volume` 参数来指定数据卷。


    ```

    docker run \

    --name ''sql1'' \

    -e ''ACCEPT_EULA=Y'' \

    -e ''MSSQL_SA_PASSWORD=S0methingS@Str0ng!'' \

    -p 1433:1433 \

    -v sqldata1:/var/opt/mssql \

    -d mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04

    ```


    清单 2-25：`docker run` 命令 – 数据卷规格说明


    让我们来解析这行代码……`-v` 指定了卷的配置。这会创建一个名为 `sqldata1` 的命名卷，该卷将从底层操作系统的文件系统中分配。确切的位置特定于容器运行时的平台（Windows、Linux
    或 MacOS）。冒号之后，您需要定义希望在容器内部挂载卷的位置，因此此卷被挂载到 `/var/opt/mssql`，这是 SQL Server on Linux
    容器中的默认实例目录。在此目录内，您将找到 SQL Server 所需的数据文件，例如 SQL Server 错误日志、跟踪文件、扩展事件文件以及系统和用户数据库。任何写入
    `/var/opt/mssql` 的数据都将被写入卷中，这是一个独立于容器的资源。


    注意

    SQL Server 的二进制文件位于文件系统的另一部分 `/opt/mssql/bin`。因此，当容器镜像被更新版本的 SQL Server 替换时，新的二进制文件将用于启动容器，而我们的数据将从
    `/var/opt/mssql` 读取，该数据在容器实例化之间会持久存在。


    那么，让我们在实践中看看这个过程，运行一系列使用 SQL Server 和 Docker 卷的演示，其中将突出显示以下要点。首先，启动一个在容器内部 `/var/opt/mssql`
    处挂载了卷的容器，并还原一个数据库。接着，删除该容器。然后，创建一个使用相同卷的新容器。最后，观察我们的数据如何独立于该容器的生命周期而持久存在。让我们开始吧。


    在清单 2-26 中，定义了一个带有卷 `sqldata1` 的容器。该卷被挂载到容器文件系统的 `/var/opt/mssql` 位置，所以让我们运行这个命令。


    现在，容器已经启动并运行，将数据库备份复制到容器中，并在备份文件上设置适当的权限。然后使用与上一节相同的过程还原数据库。代码示例（清单 2-26）突出了这三个步骤。


    ```

    docker cp TestDB1.bak sql1:/var/opt/mssql/data

    docker exec -u root sql1 chown mssql /var/opt/mssql/data/TestDB1.bak

    sqlcmd -S localhost,1433 -U sa -i restore_testdb1.sql -P ''S0methingS@Str0ng!''

    ```


    清单 2-26：`docker cp` 命令


    `sqlcmd` 将再次确认执行。


    容器启动并运行且用户数据库已还原后，检查我们此 SQL Server 容器实例上当前数据库列表，以确认数据库还原成功（清单 2-27）。


    ```

    sqlcmd -S localhost,1433 -U sa -Q ''SELECT name from sys.databases'' -P ''S0methingS@Str0ng!''

    ```


