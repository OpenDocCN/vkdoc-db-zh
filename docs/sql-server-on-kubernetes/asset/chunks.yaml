    \ `SQL Server on Linux` 中不支持的功能类似。更多信息，请参阅 [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019?#Unsupported*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019%253F%2523Unsupported)。\n\
    \n类似于 `Azure PaaS` 服务（如 `Azure SQL Managed Instance` 在 `Azure Cloud` 托管部署中）中提供的\
    \ `Always Current` 或 `Evergreen SQL` 产品，`Microsoft` 将持续发布更新的 `SQL Managed Instance`\
    \ 容器镜像到 `Microsoft Container Registry` 供 `Azure Arc–enabled SQL Managed Instance`\
    \ 使用。然后，根据你部署中定义的更新策略，你可以指定更新应用到环境的频率和时间。在 `SQL Server` 的传统实现中，管理更新是一个具有挑战性且耗时的过程。`Kubernetes`\
    \ 提供了快速吸收更新和更改并将其推出到集群的能力。这就是 `Azure Arc–enabled Data Services` 中使用的更新模型。\n\n\
    ### Azure Database for PostgreSQL\n\n目前 `Azure Arc–enabled Data Services` 内可用的另一项服务是\
    \ `Azure Database for PostgreSQL`。由于这超出了本书的范围，我们将不再详细介绍。\n\n## Kubernetes Constructs\
    \ in Azure Arc–Enabled Data Services\n\n当然，我们也想知道这一切是如何通过 `Kubernetes` 构造来反映的。\n\
    \n每一个 `Azure Arc–enabled Data Services` 的部署都将位于其自己的 `namespace` 中。这将允许你在同一个 `Kubernetes`\
    \ 集群上运行多个部署。\n\n如图 [9-6](#494804_1_En_9_Chapter.xhtml#Fig6) 所示，在这样的 `namespace`\
    \ 中，我们将找到 `controller`、`Grafana`、`Kibana` 和其他 `Data Controller` 服务的 `pods`，以及与此控制器关联的\
    \ `Data Services`。\n\n![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig6_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_9_Fig6_HTML.jpg)\n\
    \n图 9-6 Azure Arc–enabled Data Services namespace 中的 Pods\n\n对 `Data Services`\
    \ 以及 `pods` 中的监控和日志应用程序的访问是通过 `Kubernetes Services` 暴露的，如图 [9-7](#494804_1_En_9_Chapter.xhtml#Fig7)\
    \ 所示。\n\n![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig7_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig7_HTML.jpg)\n\
    \n图 9-7 Azure Arc–enabled Data Services namespace 中的 Services\n\n为了实现最大的灵活性，`Azure\
    \ Arc–enabled Data Services` 要求至少一个 `storage class`。每当创建 `Data Controller` 或 `data\
    \ service` 时，都需要一个 `storage class`。不同服务之间的类别可以不同，并且每个服务可以为日志（`Kubernetes` 日志）、数据和数据日志使用不同的类别。\n\
    \n如果你想了解更多关于 `Azure Arc–enabled Data Services` 的信息，我们也推荐我们的 Apress 书籍 *Azure Arc–Enabled\
    \ Data Services Revealed*。\n\n## Deploying Azure Arc–Enabled Data Services\n\n\
    现在是时候部署一些 `Azure Arc–enabled Data Services` 了。\n\n### Prerequisites\n\n正如预期的那样，在我们开始部署过程之前，我们需要一些先决条件。"
  raw: '#### Monitoring (Grafana and Kibana)


    In the last chapter, we deployed Grafana, and as you remember, there were quite
    a few steps involved. Good news: When you deploy an Azure Arc Data Controller,
    it will automatically deploy a Grafana dashboard including its prerequisites for
    you.


    It also comes with preconfigured dashboards like the SQL Managed Instance Metrics,
    as shown in Figure [9-3](#494804_1_En_9_Chapter.xhtml#Fig3). This looks different
    from the examples we’ve seen in the previous chapter because this dashboard is
    tailored to the specifics of a SQL Managed Instance.


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig3_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Grafana Portal – SQL MI Metrics


    In addition to this dashboard, the dashboards shown in Figure [9-4](#494804_1_En_9_Chapter.xhtml#Fig4)
    are automatically deployed.


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig4_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Built-in dashboards in Grafana Portal


    Of course, you can add any existing dashboard or create your own just like we
    did in the previous chapter as well.


    In addition to Grafana, Azure Arc–enabled Data Services also come with Kibana
    and its prerequisites rolled out by default, so there is also no need to deploy
    that manually.


    #### Connectivity Modes to Azure Portal


    Azure Arc–enabled Data Services come with a backchannel to Azure Portal, allowing
    you to upload your installation’s logs and metrics. This allows you to manage
    all your data estate – no matter if it’s a Managed Instance running in Azure Arc
    on-premises or an Azure SQL DB in Azure – in one single place. This information
    is also used for billing purposes.


    Depending on your infrastructure, location, and needs, you can pick between two
    modes:


    *   **Directly connected:** In this mode, your logs and metrics are constantly
    sent to Azure Portal, making the data available for analysis almost instantly.


    *   **Indirectly connected:** In this mode, you need to manually trigger or schedule
    an export and upload of your metrics and logs. This is especially useful if you
    are in a location with limited Internet connectivity.


    Once a resource’s data has been uploaded to Azure, it will show in the portal
    as you can see in the example in Figure [9-5](#494804_1_En_9_Chapter.xhtml#Fig5).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig5_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    CPU metric showing in Azure Portal


    ### Data Services


    On top of our Data Controller sit the Data Services which at the time of writing
    can either be an *Azure Arc SQL Managed Instance* or *Azure Database for PostgreSQL*.


    We will only be focusing on SQL Managed Instances as PostgreSQL is beyond the
    scope of this book.


    #### Azure Arc SQL Managed Instance


    Azure Arc–enabled SQL Managed Instance is your lift and shift version of SQL Server.
    It enables you to move workloads seamlessly into Azure Arc as it provides a high
    level of compatibility with on-premises installations of SQL Server, which is
    documented as nearly 100% compatible. This means that moving your databases from
    their current on-premises implementations into Azure Arc–enabled SQL Managed Instance
    will require little to no database changes. When deploying an Azure Arc–enabled
    SQL Managed Instance, you can take a backup from an on-premises version of SQL
    Server and restore that backup directly to an Azure Arc-enabled SQL Managed Instance.


    Tip


    Following [*https://docs.microsoft.com/en-us/azure/azure-arc/data/managed-instance-features#Unsupported*](https://docs.microsoft.com/en-us/azure/azure-arc/data/managed-instance-features%2523Unsupported)*,*
    you will find the list of unsupported features and services for Azure Arc–enabled
    SQL Managed Instance.


    Azure Arc–enabled SQL Managed Instance runs as a SQL Server on Linux process inside
    a container in Kubernetes. The features not available are similar to those not
    supported in SQL Server on Linux. For more information, look at [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019?#Unsupported*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019%253F%2523Unsupported).


    Similar to the Always Current or Evergreen SQL offerings available in Azure PaaS
    services such as Azure SQL Managed Instance in Azure Cloud–hosted deployments,
    Microsoft will continuously publish updated SQL Managed Instance container images
    to the Microsoft Container Registry for Azure Arc–enabled SQL Managed Instance.
    Then, based on update policies defined in your deployment, you can specify how
    often and when the updates are applied to your environment. In traditional implementations
    of SQL Server, managing updates is a challenging and time-consuming process. Kubernetes
    provides the ability to absorb updates and changes quickly and roll them out into
    the cluster. This is the update model used in Azure Arc–enabled Data Services.


    #### Azure Database for PostgreSQL


    The other service currently available within Azure Arc–enabled Data Services is
    Azure Database for PostgreSQL. We will not be going into more details on this,
    as it is beyond the scope of this book.


    ### Kubernetes Constructs in Azure Arc–Enabled Data Services


    Of course, we also want to know how all this is being reflected by Kubernetes
    constructs.


    Every deployment of Azure Arc–enabled Data Services will live in its own namespace.
    This will allow you to run multiple deployments on the same Kubernetes cluster.


    As you can see in Figure [9-6](#494804_1_En_9_Chapter.xhtml#Fig6), in such a namespace,
    we will find the pods of the controller, Grafana, Kibana, and the other Data Controller
    services as well as the Data Services associated with this controller.


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig6_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Pods in Azure Arc–enabled Data Services namespace


    Access to the Data Services and monitoring and logging applications in the pods
    is exposed through Kubernetes Services as shown in Figure [9-7](#494804_1_En_9_Chapter.xhtml#Fig7).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig7_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Services in Azure Arc–enabled Data Services namespace


    To allow for maximum flexibility, Azure Arc–enabled Data Services require at least
    one storage class. Whenever a Data Controller or data service is created, a storage
    class is required. This class can be different between different services, and
    each service can use different classes for logs (Kubernetes logs), data, and data
    logs.


    If you want to learn more about Azure Arc–enabled Data Services, we also recommend
    our Apress book *Azure Arc–Enabled Data Services Revealed*.


    ## Deploying Azure Arc–Enabled Data Services


    Now it’s time to deploy some Azure Arc–enabled Data Services.


    ### Prerequisites


    As expected, we need a couple of prerequisites before we can start the deployment
    process.'
  trans: '

    ## 监控（Grafana 和 Kibana）


    在上一章中，我们部署了 Grafana，正如你所记得的，其中涉及了相当多的步骤。好消息是：当你部署 `Azure Arc Data Controller`
    时，它会自动为你部署一个 Grafana 仪表板及其先决条件。


    它还附带了预配置的仪表板，如 SQL Managed Instance Metrics，如图 9-3 所示。这看起来与我们在前一章看到的例子不同，因为这个仪表板是根据
    `SQL Managed Instance` 的具体情况定制的。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig3_HTML.jpg](img/494804_1_En_9_Fig3_HTML.jpg)


    图 9-3 Grafana 门户 – SQL MI 指标


    除了这个仪表板，图 9-4 中显示的仪表板也会被自动部署。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig4_HTML.jpg](img/494804_1_En_9_Fig4_HTML.jpg)


    图 9-4 Grafana 门户中的内置仪表板


    当然，你也可以像我们在前一章中所做的那样，添加任何现有的仪表板或创建自己的仪表板。


    除了 Grafana，`Azure Arc–enabled Data Services` 默认也附带 `Kibana` 及其先决条件，因此同样无需手动部署。


    ## 连接到 Azure 门户的模式


    `Azure Arc–enabled Data Services` 附带一个到 `Azure Portal` 的后向通道，允许你上传安装的日志和指标。这使你可以在一个地方管理所有数据资产——无论它是在本地
    `Azure Arc` 上运行的 `Managed Instance`，还是 `Azure` 中的 `Azure SQL DB`。此信息也用于计费目的。


    根据你的基础设施、位置和需求，你可以选择两种模式：


    -   **直接连接：** 在此模式下，你的日志和指标会不断发送到 `Azure Portal`，使数据几乎立即可用于分析。

    -   **间接连接：** 在此模式下，你需要手动触发或计划导出和上传指标及日志。如果你所在位置互联网连接有限，这尤其有用。


    一旦资源的 `data` 被上传到 `Azure`，它就会在门户中显示，如图 9-5 的示例所示。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig5_HTML.jpg](img/494804_1_En_9_Fig5_HTML.jpg)


    图 9-5 在 Azure 门户中显示的 CPU 指标


    ## 数据服务


    在我们的 `Data Controller` 之上是 `Data Services`，在撰写本文时，它可以是 `Azure Arc SQL Managed
    Instance` 或 `Azure Database for PostgreSQL`。


    我们将只关注 `SQL Managed Instance`，因为 `PostgreSQL` 超出了本书的范围。


    ### Azure Arc SQL Managed Instance


    `Azure Arc–enabled SQL Managed Instance` 是你的 SQL Server 提升和转移版本。它使你能够将工作负载无缝迁移到
    `Azure Arc`，因为它与本地 `SQL Server` 安装提供了高度兼容性，据记录其兼容性接近 100%。这意味着将数据库从当前的本地实现迁移到
    `Azure Arc–enabled SQL Managed Instance` 几乎不需要数据库更改。在部署 `Azure Arc–enabled SQL
    Managed Instance` 时，你可以从本地 `SQL Server` 版本获取备份，并将该备份直接还原到 `Azure Arc-enabled SQL
    Managed Instance`。


    提示

    根据 [*https://docs.microsoft.com/en-us/azure/azure-arc/data/managed-instance-features#Unsupported*](https://docs.microsoft.com/en-us/azure/azure-arc/data/managed-instance-features%2523Unsupported)，你将找到
    `Azure Arc–enabled SQL Managed Instance` 不支持的功能和服务列表。


    `Azure Arc–enabled SQL Managed Instance` 作为 `SQL Server on Linux` 进程在 `Kubernetes`
    容器内运行。不可用的功能与 `SQL Server on Linux` 中不支持的功能类似。更多信息，请参阅 [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019?#Unsupported*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019%253F%2523Unsupported)。


    类似于 `Azure PaaS` 服务（如 `Azure SQL Managed Instance` 在 `Azure Cloud` 托管部署中）提供的 `Always
    Current` 或 `Evergreen SQL` 产品，`Microsoft` 将持续发布更新的 `SQL Managed Instance` 容器镜像到
    `Microsoft Container Registry` 供 `Azure Arc–enabled SQL Managed Instance` 使用。然后，根据你部署中定义的更新策略，你可以指定更新应用到环境的频率和时间。在
    `SQL Server` 的传统实现中，管理更新是一个具有挑战性且耗时的过程。`Kubernetes` 提供了快速吸收更新和更改并将其推出到集群的能力。这就是
    `Azure Arc–enabled Data Services` 中使用的更新模型。


    ### Azure Database for PostgreSQL


    目前 `Azure Arc–enabled Data Services` 内可用的另一项服务是 `Azure Database for PostgreSQL`。由于这超出了本书的范围，我们将不再详细介绍。


    ## Azure Arc–Enabled Data Services 中的 Kubernetes 构造


    当然，我们也想知道这一切是如何通过 `Kubernetes` 构造来反映的。


    每一个 `Azure Arc–enabled Data Services` 的部署都将位于其自己的 `namespace` 中。这将允许你在同一个 `Kubernetes`
    集群上运行多个部署。


    如图 9-6 所示，在这样的 `namespace` 中，我们将找到 `controller`、`Grafana`、`Kibana` 和其他 `Data Controller`
    服务的 `pods`，以及与此控制器关联的 `Data Services`。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig6_HTML.jpg](img/494804_1_9_Fig6_HTML.jpg)


    图 9-6 Azure Arc–enabled Data Services namespace 中的 Pods


    对 `Data Services` 以及 `pods` 中的监控和日志应用程序的访问是通过 `Kubernetes Services` 暴露的，如图 9-7
    所示。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig7_HTML.jpg](img/494804_1_En_9_Fig7_HTML.jpg)


    图 9-7 Azure Arc–enabled Data Services namespace 中的 Services


    为了实现最大的灵活性，`Azure Arc–enabled Data Services` 要求至少一个 `storage class`。每当创建 `Data
    Controller` 或 `data service` 时，都需要一个 `storage class`。不同服务之间的类别可以不同，并且每个服务可以为日志（`Kubernetes`
    日志）、数据和数据日志使用不同的类别。


    如果你想了解更多关于 `Azure Arc–enabled Data Services` 的信息，我们也推荐我们的 Apress 书籍 *Azure Arc–Enabled
    Data Services Revealed*。


    ## 部署 Azure Arc–Enabled Data Services


    现在是时候部署一些 `Azure Arc–enabled Data Services` 了。


    ### 先决条件


    正如预期的那样，在我们开始部署过程之前，我们需要一些先决条件。

    '
- fmt: '## Kubernetes Cluster


    正如您根据架构可能猜测的那样，Kubernetes 集群是必需的。


    如前所述，在此集群中，我们还需要至少一个支持动态配置的存储类（就像我们在第 [8](#494804_1_En_8_Chapter.xhtml) 章部署 `elasticsearch`
    时使用的 NFS provisioner）。


    我们将在此部署中使用我们的 `AKSCluster`。如果您更喜欢使用 `kubeadm` 集群，只需相应地调整 `storage class`。


    因此，我们首先按照清单 [9-1](#494804_1_En_9_Chapter.xhtml#PC1) 所示，将 `kubectl` 上下文切换回 `AKSCluster`。


    ```

    kubectl config use-context AKSCluster

    ```

    **清单 9-1**

    将 `kubectl` 上下文切换到 `AKSCluster`


    我们还将使用清单 [9-2](#494804_1_En_9_Chapter.xhtml#PC2) 中的 `kubectl` 命令检索此集群中的存储类。


    ```

    kubectl get storageclass

    ```

    **清单 9-2**

    列出 `AKSCluster` 中的存储类


    除非您已向此集群部署了任何其他存储类，否则输出应类似于图 [9-8](#494804_1_En_9_Chapter.xhtml#Fig8) 所示。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig8_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig8_HTML.jpg)

    **图 9-8**

    AKS 集群中的存储类


    ## Tooling


    虽然我们可以通过 YAML 清单部署 Azure Arc 生态系统中的所有内容，但 Microsoft 通过提供另一个抽象层次使我们的工作更轻松。使用名为
    `azdata` 的工具，我们可以描述所需的环境和配置服务，它将为我们生成 Kubernetes 中的对象。对于更复杂的场景，可以通过 JSON 文件进行配置，而对于更简单的用例，则可以通过命令行参数运行，这与
    `kubectl` 的命令式与声明式概念非常相似。


    **注意**

    不要混淆 `Azure CLI` 和 `azdata`。它们是两种不同的工具！


    我们已经在第 [1](#494804_1_En_1_Chapter.xhtml) 章在管理工作站上安装了 `azdata`。


    如果您更喜欢图形化体验，Azure Data Studio 也提供了图形化安装向导。此向导将为每次部署创建一个 Jupyter notebook，并在后台调用
    `azdata`。然而在本书中，我们将专注于基于命令行的安装。


    ### 部署数据控制器


    一旦您安装了 `azdata` 并且 `kubectl` 上下文设置为正确的集群，就可以通过类似于清单 [9-3](#494804_1_En_9_Chapter.xhtml#PC3)
    中的命令来部署 Azure Arc 数据控制器。


    您需要提供以下设置：


    *   **名称：** 控制器的名称。

    *   **命名空间：** 要在您的 Kubernetes 集群中使用的命名空间 – 此命名空间不能包含任何其他对象。如果尚不存在，它将被创建。

    *   **订阅：** 您的 Azure 订阅 ID。

    *   **资源组：** 部署后服务应显示在 Azure 中的资源组。

    *   **位置：** 用于存储指标和日志的 Azure 区域。

    *   **存储类：** 用于数据控制器数据和日志的存储类。如果省略，将使用默认类。

    *   **配置文件名称：** 要使用的部署配置文件。


    ```

    azdata arc dc create \

    --connectivity-mode Indirect \

    --name arc-dc-aks \

    --namespace arc \

    --subscription  \

    --resource-group "Kubernetes-Cloud" \

    --location eastus \

    --storage-class managed-premium \

    --profile-name azure-arc-aks-premium-storage

    ```

    **清单 9-3**

    用于创建数据控制器的 `azdata` 命令


    如果您部署到 `AKS` 以外的其他目标，则需要相应地调整 `profile name`。可以使用清单 [9-4](#494804_1_En_9_Chapter.xhtml#PC4)
    中的命令检索可用配置文件的列表。


    **注意**

    我们的示例使用间接模式，如果您想将指标和日志上传到 Azure 门户，则需要采取本书范围之外的额外步骤。


    ```

    azdata arc dc config list

    ```

    **清单 9-4**

    列出数据控制器配置文件名称的 `azdata` 命令


    输出将类似于图 [9-9](#494804_1_En_9_Chapter.xhtml#Fig9) 所示。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig9_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig9_HTML.jpg)

    **图 9-9**

    Azure Arc 数据控制器的配置配置文件列表


    要部署数据控制器，您需要接受许可协议并提供用户名和密码。


    如果您想在运行 `azdata` 命令时避免被提示输入它们，也可以在三个环境变量中提供：


    *   **ACCEPT_EULA：** 设置为 "Y"（仅当部署数据服务（如 SQL 托管实例）时才需要，数据控制器部署不需要）

    *   **AZDATA_USERNAME：** 要使用的用户名，例如 `arcadmin`

    *   **AZDATA_PASSWORD：** 为您选择的强密码


    如果您想在通过 `azdata` 部署时跟踪 Pod 的创建情况，可以使用清单 [9-5](#494804_1_En_9_Chapter.xhtml#PC5)
    中的命令。


    ```

    kubectl get pods -n arc –watch

    ```

    **清单 9-5**

    使用 `kubectl` 监控部署状态


    **注意**

    每当您向 `kubectl get` 语句添加 `--watch` 开关时，`kubectl` 将持续监控与您的命令匹配的对象，并不断刷新其当前状态。


    `azdata` 将在部署完成后报告，如图 [9-10](#494804_1_En_9_Chapter.xhtml#Fig10) 所示。


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig10_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig10_HTML.jpg)

    **图 9-10**

    数据控制器部署的输出'
  raw: '#### Kubernetes Cluster


    As you probably guessed based on the architecture, a Kubernetes cluster is required.


    As mentioned before, within this cluster, we also need at least one storage class
    that allows dynamic provisioning (like the NFS provisioner we used when we deployed
    *elasticsearch* in Chapter [8](#494804_1_En_8_Chapter.xhtml)).


    We will be using our *AKSCluster* for this deployment. If you prefer using your
    *kubeadm* cluster, just adjust the *storage class* accordingly.


    Therefore, we start by switching our kubectl context back to the AKSCluster as
    shown in Listing [9-1](#494804_1_En_9_Chapter.xhtml#PC1).


    ```

    kubectl config use-context AKSCluster

    Listing 9-1

    Switch kubectl context to AKSCluster

    ```


    We will also retrieve the storage classes in this cluster using the kubectl command
    in Listing [9-2](#494804_1_En_9_Chapter.xhtml#PC2).


    ```

    kubectl get storageclass

    Listing 9-2

    List storage classes in AKSCluster

    ```


    Unless you’ve deployed any additional storage classes to this cluster, this should
    look like the output in Figure [9-8](#494804_1_En_9_Chapter.xhtml#Fig8).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig8_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Storage classes in AKS Cluster


    #### Tooling


    While we could deploy everything in the Azure Arc ecosystem through YAML manifests,
    Microsoft makes our life easier by providing another level of abstraction. Using
    a tool called azdata, we can describe the environment and services we require,
    which will generate the objects in Kubernetes for us. For more complex scenarios,
    those can be configured through JSON files, whereas simpler use cases can be run
    through command line parameters, very similar to the concept of imperative vs.
    declarative statements with kubectl.


    Note


    Don’t confuse the *Azure CLI* and *azdata*. They are two different tools!


    We have already installed azdata on our administrative workstation in Chapter
    [1](#494804_1_En_1_Chapter.xhtml).


    Should you prefer a graphical experience, Azure Data Studio also provides a graphical
    installation wizard. This wizard will create a Jupyter notebook for each deployment
    calling azdata in the background. In this book however, we will focus on the command
    line–based installation.


    ### Deploying a Data Controller


    Once you have azdata installed and your kubectl context set to the right cluster,
    an Azure Arc Data Controller can be deployed through a command like the one in
    Listing [9-3](#494804_1_En_9_Chapter.xhtml#PC3).


    You will need to provide the following settings:


    *   **Name:** Name of the controller.


    *   **Namespace:** Namespace within your Kubernetes Cluster to be used – this
    namespace can’t have any other objects. If it doesn’t exist yet, it will be created.


    *   **Subscription:** Your Azure subscription ID.


    *   **Resource group:** The resource group in Azure where the service should show
    up after deployment.


    *   **Location:** The Azure region for your metrics and logs.


    *   **Storage class:** The storage class for the Data Controller’s data and logs.
    If this is omitted, the default class will be used.


    *   **Profile name:** The deployment profile to be used .


    ```

    azdata arc dc create \

    --connectivity-mode Indirect \

    --name arc-dc-aks \

    --namespace arc \

    --subscription  \

    --resource-group "Kubernetes-Cloud" \

    --location eastus \

    --storage-class managed-premium \

    --profile-name azure-arc-aks-premium-storage

    Listing 9-3

    azdata command to create a Data Controller

    ```


    If you are deploying to another target than AKS, you will need to adjust the *profile
    name* accordingly. A list of available profiles can be retrieved using the command
    in Listing [9-4](#494804_1_En_9_Chapter.xhtml#PC4).


    Note


    Our example is using indirect mode, and if you want to upload your metrics and
    logs to Azure Portal, additional steps that are out of scope of this book are
    required.


    ```

    azdata arc dc config list

    Listing 9-4

    azdata command to list profile names for Data Controller

    ```


    The output will look similar to the one shown in Figure [9-9](#494804_1_En_9_Chapter.xhtml#Fig9).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig9_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    List of configuration profiles for Azure Arc Data Controllers


    To deploy a Data Controller, you need to accept the license agreement and provide
    a username and password.


    If you want to avoid being prompted for them when running the azdata command,
    you can also provide them in three environment variables:


    *   **ACCEPT_EULA:** To be set to “Y” (this is only required for the deployment
    of data services like a SQL Managed Instance, not for the Data Controller)


    *   **AZDATA_USERNAME:** The username to be used, for example, arcadmin


    *   **AZDATA_PASSWORD:** To be a strong password of your choice


    If you want to follow the creation of Pods while deploying through azdata, you
    can do so using the command in Listing [9-5](#494804_1_En_9_Chapter.xhtml#PC5).


    ```

    kubectl get pods -n arc –watch

    Listing 9-5

    Monitor deployment status using kubectl

    ```


    Note


    Whenever you add the *--watch* switch to a *kubectl get* statement, kubectl will
    keep monitoring the objects matching your command and constantly refresh you on
    their current state.


    azdata will report back once the deployment has completed as shown in Figure [9-10](#494804_1_En_9_Chapter.xhtml#Fig10).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig10_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Output of a Data Controller deployment'
