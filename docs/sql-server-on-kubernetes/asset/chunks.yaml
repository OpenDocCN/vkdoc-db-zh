  trans: '## 输出


    `kubectl` 命令构建的最后一部分是修改其输出格式。我们可以通过向命令添加额外的标志来指定 `kubectl` 的输出格式。


    我们想向大家介绍的一个非常有用的格式是 `wide`，它会额外显示有关我们正在使用的 Kubernetes 对象的更多信息。


    我们还可以将 Kubernetes 对象输出为 `YAML` 和 `JSON` 格式。`YAML` 和 `JSON` 格式的文件是 Kubernetes 以声明式描述事物的核心，使我们能够用代码描述配置。我们可以使用
    `kubectl` 输出 `YAML` 或 `JSON`，这是一种从集群中提取配置数据并描述已在集群中部署资源的宝贵方法。我们可以将其持久化到文件中，并根据需要与其他系统、其他环境和其他开发者交换。


    另一个选项是 `jsonpath`，它只会从 `JSON` 输出中获取特定的子集或值。例如，当你想检索端口或 IP 地址等值，以便随后在脚本中用作变量时，这特别有用。


    完整的输出选项列表可以在 [`https://kubernetes.io/docs/reference/kubectl/overview/#output-options`](https://kubernetes.io/docs/reference/kubectl/overview/%2523output-options)
    找到。另一个非常有用的资源，特别是当你刚开始熟悉 `kubectl` 时，是 `kubectl` 速查表：[`https://kubernetes.io/docs/reference/kubectl/cheatsheet/`](https://kubernetes.io/docs/reference/kubectl/cheatsheet/)。


    ## Kubectl 上下文


    `Kubectl` 可用于从同一工作站管理多个 Kubernetes 集群。这是通过所谓的上下文来处理的。上下文是集群和用于登录该集群的凭据的组合。


    让我们首先使用清单 5-8 中的命令列出当前对我们可用的所有上下文。


    ```

    kubectl config view

    ```

    清单 5-8

    显示 kubectl 的配置，包括所有上下文


    正如我们在图 5-3 中看到的，我们有 `kubernetes-admin` 上下文（这是我们的 `kubeadm` 集群）和 `AKSCluster` 上下文（这是我们在
    Azure Kubernetes Service 中的集群）。


    `../images/494804_1_En_5_Chapter/494804_1_En_5_Fig3_HTML.jpg`

    图 5-3

    当前 kubectl 配置视图


    接下来，让我们通过运行清单 5-9 中的命令来检查我们当前正在使用哪个上下文。


    ```

    kubectl config current-context

    ```

    清单 5-9

    获取当前的 kubectl 上下文


    如图 5-4 所示，我们当前的上下文是 `kubernetes-admin`，因此此时任何 `kubectl` 命令都将针对我们的 `kubeadm` 集群执行。


    `../images/494804_1_En_5_Chapter/494804_1_En_5_Fig4_HTML.jpg`

    图 5-4

    当前的 kubectl 上下文


    让我们使用清单 5-10 将上下文更改为 `AKSCluster`。


    ```

    kubectl config use-context AKSCluster

    ```

    清单 5-10

    将 kubectl 上下文切换到 AKSCluster


    这将把我们当前的上下文更改为 `aks-admin`。`kubectl` 中的所有命令现在都将针对 AKS 集群执行。


    > **注意**

    >

    > 除非另有说明，本章及后续章节中的所有练习都应在 `kubernetes-admin@kubernetes` 上下文中执行。


    ## 在 Kubernetes 中部署应用


    既然我们知道了如何在命令行与集群交互，让我们将讨论转向在 Kubernetes 中部署应用程序。


    与大多数通过 `kubectl` 在 Kubernetes 中执行的命令一样，应用程序可以使用命令式或声明式配置进行部署。


    ### 命令式部署


    当你使用命令式配置时，通常会在命令行一次执行一条命令，并且一次只操作一个对象。


    让我们运行清单 5-11 中的命令。


    ```

    kubectl create deployment nginx --image=nginx

    ```

    清单 5-11

    使用 nginx 创建部署的 Kubectl 命令


    该命令被发送到 API Server，API Server 将基于 `nginx` 镜像创建一个名为 `nginx` 的部署，但我们一次只在命令行上操作一个对象。


    当然，这也适用于其他类型的对象。例如，清单 5-12 中的命令将再次使用 `nginx` 镜像，但它将创建一个运行它的独立 Pod。


    ```

    kubectl run nginx --image=nginx

    ```

    清单 5-12

    运行一个新的 nginx Pod 的 Kubectl 命令


    虽然这无疑是一种管理系统的方法，但如果你的应用程序栈开始增长，配置和部署变得更加复杂，在命令行管理每个单独的对象并不是一种可持续的管理或维护系统的方式。我们需要以声明式的方式做事，这是
    Kubernetes 的核心原则之一，即我们使用 `YAML` 或 `JSON` 在代码中定义应用程序或集群本身的期望状态。


    让我们使用清单 5-13 中的命令查看 Pod。


    ```

    kubectl get pods

    ```

    清单 5-13

    列出 Pod 的 kubectl 命令


    我们将看到（图 5-5）我们的两个 Pod：一个是单独启动的（名为 `nginx`），另一个来自我们的部署（名为 `nginx-6799fc88d8-fj928`）。来自我们部署的
    Pod 的名称是随机的，并且每次 Pod 被终止并从同一部署创建新 Pod 时都会改变。


    `../images/494804_1_En_5_Chapter/494804_1_En_5_Fig5_HTML.jpg`

    图 5-5

    kubectl get pods 的输出


    在继续讨论声明式部署之前，让我们先清理并删除先前创建的部署和 Pod，使用清单 5-14 中的命令。


    ```

    kubectl delete deployment nginx

    kubectl delete pod nginx

    ```

    清单 5-14

    删除命令式创建的资源的 Kubectl 命令


    删除部署将立即完成，而删除单个 Pod 只有在 Pod 被终止和删除后才会返回。'
- fmt: '## Declarative Deployments


    For either more complex scenarios or simply the advantage of an easier way to
    deploy the same configuration of an object to another cluster – for example, when
    pushing an application from a development to a test system – it is therefore highly
    recommended to use a manifest-based declarative approach. Your manifests should
    also go to your source control system just like any other code you’re using in
    your environment. In this case, we will just use a manifest that can be written
    in JSON or YAML and feed it to the API Server using a command like the one in
    Listing [5-15](#494804_1_En_5_Chapter.xhtml#PC15). By the way, manifests written
    in YAML will be converted to JSON by Kubernetes.


    ```

    kubectl apply -f deployment.yaml

    Listing 5-15

    Kubectl command to feed a YAML file to the API Server

    ```


    This command would take the contents of the `deployment.yaml` file and pass them
    to the API Server for Kubernetes to create the resources defined in the manifest.


    A manifest can consist of many different object types, so we could have a YAML
    that first creates a storage class followed by a persisted volume and volume claim
    followed by a deployment and a service definition, for example. All in the same
    file. All deployed through one single command on the command line.


    As also mentioned earlier, we can use `kubectl` to generate those manifests using
    the output. Let’s start by generating a manifest for a deployment matching the
    one we’ve previously created imperatively using the code in Listing [5-16](#494804_1_En_5_Chapter.xhtml#PC16).
    To do so, we add an output format and the `dry-run` switch, which will only generate
    the manifest but won’t deploy anything to our cluster.


    ```

    kubectl create deployment nginx --image=nginx --dry-run=client -o yaml

    Listing 5-16

    Kubectl command to generate YAML manifest for nginx deployment

    ```


    The output can be found in Listing [5-17](#494804_1_En_5_Chapter.xhtml#PC17).


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    creationTimestamp: null

    labels:

    app: nginx

    name: nginx

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: nginx

    strategy: {}

    template:

    metadata:

    creationTimestamp: null

    labels:

    app: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    resources: {}

    Listing 5-17

    Manifest generated from previous listing

    ```


    Let’s generate that manifest again, but this time, we will redirect the output
    to a file called `nginx.yaml` as shown in Listing [5-18](#494804_1_En_5_Chapter.xhtml#PC18).


    ```

    kubectl create deployment nginx --image=nginx --dry-run=client -o yaml > nginx.yaml

    Listing 5-18

    Kubectl command to generate YAML manifest for nginx deployment redirected to a
    file

    ```


    We can now take that file and create a deployment declaratively. Do this using
    the command in Listing [5-19](#494804_1_En_5_Chapter.xhtml#PC19).


    ```

    kubectl apply -f nginx.yaml

    Listing 5-19

    Declarative deployment using the previously generated manifest

    ```


    This will generate a deployment like the previous one. By running the command
    in Listing [5-20](#494804_1_En_5_Chapter.xhtml#PC20), we can verify that our one
    replica (as defined in the manifest) is ready.


    ```

    kubectl get deployment nginx

    Listing 5-20

    Check the status of this deployment

    ```


    The output, as shown in Figure [5-6](#494804_1_En_5_Chapter.xhtml#Fig6), will
    confirm the status of our deployment.


    ![`../images/494804_1_En_5_Chapter/494804_1_En_5_Fig6_HTML.jpg`](images/494804_1_En_5_Chapter/494804_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Output of `kubectl get deployment nginx`


    ## Modifying a Deployment


    Of course, an existing deployment can also be modified without a full redeployment.


    Let’s assume, for example, you want to update the number of replicas – or Pods
    – in the existing deployment.


    At first sight, the easiest way seems to be, again, to do this imperatively as
    shown in Listing [5-21](#494804_1_En_5_Chapter.xhtml#PC21).


    ```

    kubectl scale deployment nginx --replicas=2

    Listing 5-21

    Scale up nginx deployment to two replicas

    ```


    As you can see in Figure [5-7](#494804_1_En_5_Chapter.xhtml#Fig7), the deployment
    is now showing two replicas.


    ![`../images/494804_1_En_5_Chapter/494804_1_En_5_Fig7_HTML.jpg`](images/494804_1_En_5_Chapter/494804_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Output of `kubectl get deployment nginx` after rescaling to two replicas


    But now, our manifest file and our deployment are out of sync, as the manifest
    still reflects only one replica.


    A better way would be to edit the manifest using a text editor. Open the file
    in a text editor of your choice and replace the original replica definition as
    shown in Listing [5-22](#494804_1_En_5_Chapter.xhtml#PC22) with the new definition
    of 20 replicas as shown in Listing [5-23](#494804_1_En_5_Chapter.xhtml#PC23).


    ```

    spec:

    replicas: 20

    Listing 5-23

    New replica definition with 20 replicas

    ```


    ```

    spec:

    replicas: 1

    Listing 5-22

    Existing replica definition with one replica

    ```


    Now, we can reapply the manifest (see Listing [5-24](#494804_1_En_5_Chapter.xhtml#PC24)),
    which will scale up our deployment to 20 replicas.


    ```

    kubectl apply -f nginx.yaml

    Listing 5-24

    Applying the new definition using kubectl

    ```


    As you can see in Figure [5-8](#494804_1_En_5_Chapter.xhtml#Fig8), the deployment
    is now showing 20 replicas (note that it will take some time for all of those
    replicas to show as ready).


    ![`../images/494804_1_En_5_Chapter/494804_1_En_5_Fig8_HTML.jpg`](images/494804_1_En_5_Chapter/494804_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Output of `kubectl get deployment nginx` after rescaling to 20 replicas


    A third way to modify an existing object is ``kubectl edit``. While this also
    comes with the disadvantage of losing sync between your YAML file and what’s actually
    deployed on your cluster, this is a very handy way of making multiple changes
    to a deployment, for example, at once.


    Run the code in Listing [5-25](#494804_1_En_5_Chapter.xhtml#PC25).


    ```

    kubectl edit deployment nginx

    Listing 5-25

    Edit a running deployment

    ```


    This will open the full manifest of the current deployment in your default text
    editor. Find the line with the previously defined 20 replicas and change it to
    30. When closing and saving this editor, those changes will immediately be applied,
    which we can check again using `kubectl get deployment`. The result is also shown
    in Figure [5-9](#494804_1_En_5_Chapter.xhtml#Fig9).


    ![`../images/494804_1_En_5_Chapter/494804_1_En_5_Fig9_HTML.jpg`](images/494804_1_En_5_Chapter/494804_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Output of `kubectl get deployment nginx` after rescaling to 30 replicas


    ## Exposing and Accessing Services in Your Cluster


    Now, we have a scaled deployment of nginx, but the applications running in the
    pods are not yet accessible. Let’s keep moving forward and expose that deployment
    as a Kubernetes service with a persistent IP address and port for our application
    to run on.


    A service can be created using ``kubectl expose``.'
  raw: '### Declarative Deployments


    For either more complex scenarios or simply the advantage of an easier way to
    deploy the same configuration of an object to another cluster – for example, when
    pushing an application from a development to a test system – it is therefore highly
    recommended to use a manifest-based declarative approach. Your manifests should
    also go to your source control system just like any other code you’re using in
    your environment. In this case, we will just use a manifest that can be written
    in JSON or YAML and feed it to the API Server using a command like the one in
    Listing [5-15](#494804_1_En_5_Chapter.xhtml#PC15). By the way, manifests written
    in YAML will be converted to JSON by Kubernetes.


    ```

    kubectl apply -f deployment.yaml

    Listing 5-15

    Kubectl command to feed a YAML file to the API Server

    ```


    This command would take the contents of the deployment.yaml file and pass them
    to the API Server for Kubernetes to create the resources defined in the manifest.


    A manifest can consist of many different object types, so we could have a YAML
    that first creates a storage class followed by a persisted volume and volume claim
    followed by a deployment and a service definition, for example. All in the same
    file. All deployed through one single command on the command line.


    As also mentioned earlier, we can use kubectl to generate those manifests using
    the output. Let’s start by generating a manifest for a deployment matching the
    one we’ve previously created imperatively using the code in Listing [5-16](#494804_1_En_5_Chapter.xhtml#PC16).
    To do so, we add an output format and the dry-run switch, which will only generate
    the manifest but won’t deploy anything to our cluster.


    ```

    kubectl create deployment nginx --image=nginx --dry-run=client -o yaml

    Listing 5-16

    Kubectl command to generate YAML manifest for nginx deployment

    ```


    The output can be found in Listing [5-17](#494804_1_En_5_Chapter.xhtml#PC17).


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    creationTimestamp: null

    labels:

    app: nginx

    name: nginx

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: nginx

    strategy: {}

    template:

    metadata:

    creationTimestamp: null

    labels:

    app: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    resources: {}

    Listing 5-17

    Manifest generated from previous listing

    ```


    Let’s generate that manifest again, but this time, we will redirect the output
    to a file called nginx.yaml as shown in Listing [5-18](#494804_1_En_5_Chapter.xhtml#PC18).


    ```

