  trans: '

    # 启动和管理容器


    ## 启动一个现有容器


    由于容器仍存在于系统上，可以使用 `docker start` 命令并指定容器名称来重新启动它。该容器的所有状态和配置信息仍将保留，因此当容器再次启动时，我们的系统数据库和用户数据库都还在。


    ```

    docker start sql2

    代码清单 2-20

    docker start 命令

    ```


    然后，我们可以使用 `sqlcmd` 来列出我们实例中的数据库，如下列命令所示。


    ```

    sqlcmd -S localhost,1434 -U sa -Q ''SELECT name from sys.databases'' -P ''S0methingS@Str0ng!''

    代码清单 2-21

    使用 sqlcmd 列出数据库

    ```


    在输出中，`sql2` 已重新启动，显示了系统上的当前数据库，包括已还原的用户数据库 `TestDB1`。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig16_HTML.jpg](img/494804_1_En_2_Fig16_HTML.jpg)

    *图 2-16. 数据库列表*


    现在，让我们清理并停止这些容器。


    ```

    docker stop sql1

    docker stop sql2

    代码清单 2-22

    docker stop 命令

    ```


    ## 移除容器


    当容器停止后，`docker rm` 将从系统中移除一个容器。此时，容器内的数据将被销毁。因此，一旦这些容器被移除，已还原的 `TestDB1` 也就消失了。关于独立于容器生命周期的数据持久化将在下一节介绍。在以下示例中，`sql1`
    和 `sql2` 都被删除。


    ```

    docker rm sql1

    docker rm sql2

    代码清单 2-23

    docker rm 命令

    ```


    前面的示例删除了容器，但没有删除容器镜像。容器镜像仍在本地系统上，可用于派生新的容器。执行 `docker image ls` 可以显示系统上存在的容器镜像。


    ```

    docker image ls

    代码清单 2-24

    docker image ls 命令

    ```


    你可以看到容器镜像仍然在本地系统上。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig17_HTML.jpg](img/494804_1_En_2_Fig17_HTML.jpg)

    *图 2-17. `docker image ls` 命令的输出。本地系统上的容器镜像*


    # 容器内部原理


    现在，我们花点时间来看看容器内部原理，以便你能够理解操作系统在容器内运行进程时如何实现并提供对进程及其资源的隔离。


    容器是一个运行中的进程，它对底层操作系统及其资源具有隔离的视图。当从容器镜像启动容器时，容器运行时被指示启动在容器镜像中定义的一个特定进程。同时还定义了应用程序监听的端口以及其他配置信息。


    如前所述，在容器内执行的进程列表仅显示容器内运行的进程；系统上的其他进程不可见。尽管应用程序在容器内监听端口 `1433`，但要访问该应用程序，必须在基础操作系统上发布一个唯一的端口。操作系统如何为基于容器的应用程序在单一系统上提供这种隔离？这就是
    Linux 命名空间（namespaces）的用武之地。


    ## 命名空间


    Linux 内核命名空间 ([`man7.org/linux/man-pages/man7/namespaces.7.html`](http://man7.org/linux/man-pages/man7/namespaces.7.html))
    是一种内核构造，为在 Linux 上运行的进程提供隔离。Linux 中有六个核心命名空间，其中五个用于资源隔离，一个用于资源管理。查看下面的命名空间列表，你可以感受到命名空间提供了什么。它们为程序和程序正在使用的资源提供了与基础操作系统的隔离——例如进程、文件、网络等。


    五个资源隔离命名空间为系统上运行的进程提供对底层操作系统服务的访问：


    *   **PID：** 进程隔离

    *   **MNT：** 文件系统和挂载点隔离

    *   **NET：** 网络设备和协议栈隔离

    *   **IPC：** 进程间通信

    *   **UTS：** 唯一的主机名和域名


    第六个命名空间 `cgroups`（控制组）为在基础操作系统上运行的进程提供资源隔离。这使得多个进程可以在操作系统上运行，并让管理员能够控制资源分配：


    *   **cgroups：** 控制组能够分配和控制对系统资源（如 CPU、I/O 和内存）的访问。


    关于 `cgroups` 工作原理的更多信息，请查看 Linux 手册页链接：[`man7.org/linux/man-pages/man7/cgroups.7.html`](http://man7.org/linux/man-pages/man7/cgroups.7.html)。


    ## 联合文件系统


    容器镜像是只读的。当容器运行时，对容器内文件的任何更改都使用写时复制技术写入一个可写层。联合文件系统（Union File System）获取容器镜像的基础层和可写层，并将两者作为单一统一的文件系统呈现给应用程序。这种技术使我们能够从单个镜像启动许多容器，并通过重复使用该容器镜像层作为许多容器的起点来获得效率。每个容器都将拥有一个唯一的可写层，其生命周期与容器绑定。当容器被删除时，这个可写层也会被删除。如果你正在运行像
    SQL Server 这样的有状态应用，这听起来不太吸引人。为基于容器的应用程序提供数据持久化的技术将在下一节介绍。Docker 联合文件系统的实现细节多年来已经从
    AUFS、UnionFS 变为 OverlayFS，但这些实现细节超出了本讨论范围。


    **注意**

    如果你想深入了解容器镜像的工作原理，我们鼓励你查看我们同事 Elton Stoneman (@EltonStoneman) 在 Pluralsight 上的课程
    “Handling Data and Stateful Applications in Docker” ([`app.pluralsight.com/library/courses/handling-data-stateful-applications-docker/table-of-contents`](https://app.pluralsight.com/library/courses/handling-data-stateful-applications-docker/table-of-contents))。


    ## 容器中的数据持久化


    容器是短暂的（ephemeral），这意味着当容器被删除时，它就永远消失了。在上一节中，我们介绍过，当正在运行的容器内部数据发生变化时，它会被写入一个可写层，联合文件系统的职责是将各层连接起来，为基于容器的应用程序呈现一个单一的统一文件系统。而当容器被删除时，可写层也会被一并删除。那么，容器能否在其生命周期内（从创建到删除再到重新创建）实现数据持久化呢？你可能还会问，我们为什么需要删除容器？难道我们不应该让它一直保持运行吗？嗯，是的，你可以让容器一直运行，但如果你需要更换基础容器镜像（可能因为升级或某种修补，你的应用程序有了新的容器镜像），你就需要删除现有容器并使用那个新的容器镜像启动一个新容器。

    '
- fmt: '### Docker Volumes


    A Docker Volume (`https://docs.docker.com/storage/`) is a Docker managed resource
    that is independent of the lifecycle of the container. A Docker Volume allocates
    storage from the underlying operating system or shared storage and presents that
    storage into the container at a particular location inside the file system of
    the container.


    Tip


    Check out the Docker documentation for information on storage drivers by visiting
    `https://docs.docker.com/storage/storagedriver/`.


    With a Volume mounted at a location inside the file system in the container, as
    the application changes data, it is written into that file system location and
    will be written to the Volume. This Volume is back-ended by storage that’s outside
    of the container. Now if this container is deleted, the container and its writeable
    layer are still deleted, but the Volume remains since it has a lifecycle independent
    of the container. So all changes to other parts of the file system, not backed
    by a Volume, will not be persisted. But files written to the file location backed
    by the Volume will be persisted. If a new container is created and the Volume
    is mounted in the container, the data stored in the Volume is accessible inside
    the new container. Figure 2-18 shows a container-based application, `sql1`, accessing
    a Volume named `sqldata1`.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig18_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig18_HTML.jpg)


    Figure 2-18: A container with a Volume attached


    Let’s look at some code to define a Docker Volume for a SQL Server container.


    ### Creating a Container with a Volume


    The code in Listing 2-25 shows a container starting up similar to our previous
    examples. The key difference is a data Volume is specified with the `-v` or `--volume`
    parameter.


    ```

    docker run \

    --name ''sql1'' \

    -e ''ACCEPT_EULA=Y'' \

    -e ''MSSQL_SA_PASSWORD=S0methingS@Str0ng!'' \

    -p 1433:1433 \

    -v sqldata1:/var/opt/mssql \

    -d mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04

    ```


    Listing 2-25: `docker run` command – data Volume specification


    Let’s unpack that line of code there… `-v` specifies the configuration of a Volume.
    This creates a named Volume `sqldata1`, which will allocate a Volume from the
    underlying operating system’s file system. The exact location is specific to the
    container runtime’s platform, Windows, Linux, or MacOS. After the colon, you’ll
    define where you want the Volume mounted inside the container, so this Volume
    is mounted at `/var/opt/mssql`, which is SQL Server’s default instance directory
    in SQL Server on Linux containers. Inside this directory, you’ll find the data
    files needed by SQL Server, such as the SQL Server Error Log, Trace files, Extended
    Event files, and system and user databases. Any data that’s written into `/var/opt/mssql`
    is going to be written into the Volume, which is a resource independent of the
    container.


    Note


    SQL Server’s binaries live in another part of the file system at `/opt/mssql/bin`.
    So, when a container image is replaced with a newer version of SQL Server, the
    new binaries will be used to start up the container, and our data will be read
    from `/var/opt/mssql`, which will persist between container instantiations.


    So let’s see this in action and run through a series of demos using SQL Server
    and Docker Volumes where the following key points will be highlighted. First,
    starting up a container with a Volume mounted at `/var/opt/mssql` inside the container
    and restoring a database. Next, deleting that container. Then, creating a new
    container that uses that same Volume and finally observing that our data persists
    independent of the lifecycle of this container. Let’s get started.


    In Listing 2-26, a container is defined with a Volume, `sqldata1`. This Volume
    is mounted in the file system of the container at `/var/opt/mssql`, so let’s run
    this command.


    Now, with the container up and running, copy a database backup into the container
    and set the appropriate permissions on the backup file. Then restore the database
    using the same process as the previous section. The code example (Listing 2-26)
    highlights these three steps.


    ```

    docker cp TestDB1.bak sql1:/var/opt/mssql/data

    docker exec -u root sql1 chown mssql /var/opt/mssql/data/TestDB1.bak

    sqlcmd -S localhost,1433 -U sa -i restore_testdb1.sql -P ''S0methingS@Str0ng!''

    ```


    Listing 2-26: `docker cp` command


    `sqlcmd` will again confirm the execution.


    With the container up and running and the user database restored, check out the
    list of current databases on this instance of our SQL Server container to confirm
    the database restore was successful (Listing 2-27).


    ```

    sqlcmd -S localhost,1433 -U sa -Q ''SELECT name from sys.databases'' -P ''S0methingS@Str0ng!''

    ```


    Listing 2-27: List all databases through `sqlcmd`


    In Figure 2-19, the output is shown. `TestDB1` is listed in the set of databases
    on this SQL Server instance.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig19_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig19_HTML.jpg)


    Figure 2-19: List of databases on SQL Server instance'
