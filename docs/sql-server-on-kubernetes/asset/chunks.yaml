- fmt: "# Worker Nodes\n\nWorker Nodes run user application workloads. A cluster usually\
    \ consists of at least one Control Plane Node and a collection of Worker Nodes.\
    \ Each Worker Node contributes some amount of CPU and memory resources to the\
    \ overall available resources in a Cluster. You will need enough CPU and memory\
    \ resources to run your application workload in a Cluster, ensuring enough capacity\
    \ for applications and also in the event of Node failures and even growth.\n\n\
    > **Note**\n> A primary concern for the Control Plane Node is ensuring availability.\
    \ Check out [https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/)\
    \ for more information on high-availability Control Plane topologies.\n\nAll Nodes\
    \ in a Cluster, either Control Plane or Worker, consist of three components, the\
    \ `kubelet` that communicates with the API Server for Cluster operations, the\
    \ `kube-proxy` that exposes containers running on a Node to the local network,\
    \ and the `container runtime` that starts and runs the containers on the Node:\n\
    \n*   **kubelet:** The `kubelet` is a service running on a Node and is responsible\
    \ for communicating with the API Server, starting pods on a node, and ensuring\
    \ that the Pods on that Node are in a healthy state. The `kubelet` monitors the\
    \ API Server for Pod workload state, telling the container runtime to start and\
    \ stop containers. It also reports back to the API Server the current state of\
    \ Pods running on a Node and implements health checks on Pods in the form of Liveness\
    \ Probes and Readiness Probes. The `kubelet` reports back to the API Server the\
    \ Node’s current state and the resources available on that Node.\n*   **kube-proxy:**\
    \ `kube-proxy` is a container running on all Nodes in a Cluster and functions\
    \ as a network proxy responsible for routing traffic from the network the Node\
    \ is on to the Pods running on that Node.\n*   **Container runtime:** The `container\
    \ runtime` is responsible for pulling container images and running containers\
    \ on the Node. Today, most commonly, Docker is the container runtime used in Kubernetes\
    \ Clusters. But the container runtime space is moving toward the Container Runtime\
    \ Interface standard, which enables several different container runtimes to be\
    \ used as the container runtime in Kubernetes Nodes. Kubernetes supports Docker,\
    \ containerd, and CRI-O container runtimes. In this book, the container runtime\
    \ used is Docker. See [https://kubernetes.io/docs/setup/production-environment/container-runtimes/](https://kubernetes.io/docs/setup/production-environment/container-runtimes/)\
    \ for more information on the container runtimes supported in Kubernetes.\n\n\
    ## Networking Fundamentals\n\nThe final major topic in our Kubernetes primer chapter\
    \ is networking. The Kubernetes networking model enables workloads to be deployed\
    \ in Kubernetes while abstracting away network complexities. This simplifies application\
    \ configuration and service discovery in a cluster and increases the portability\
    \ of deployment code by removing infrastructure-specific code. This section introduces\
    \ the Kubernetes networking model and example cluster communication patterns.\n\
    \nThree rules govern Kubernetes networking. These rules enable the simplicity\
    \ described earlier. These rules are from [https://kubernetes.io/docs/concepts/cluster-administration/networking/](https://kubernetes.io/docs/concepts/cluster-administration/networking/).\n\
    \n### Kubernetes Networking Model Rules\n\n1.  All Pods can communicate with each\
    \ other on all Nodes without Network Address Translation (NAT).\n2.  All agents,\
    \ such as system daemons and the `kubelet`, on a Node can communicate with all\
    \ Pods on that Node.\n3.  Pods in the host network of a Node can communicate with\
    \ all Pods on all Nodes without NAT.\n\nThe preceding rules simplify networking\
    \ and application configuration by ensuring Pods are talking to each other on\
    \ the actual Pod IPs and container ports rather than having them translated to\
    \ an IP scheme dependent upon the network infrastructure where they are deployed.\n\
    \nIn Kubernetes, a `Pod Network` is the network Pods are attached to when the\
    \ container runtime starts them on a Node. Each Pod deployed is given a unique\
    \ IP address on the `Pod Network`. `Pod Networks` must follow the rules defined\
    \ earlier, which results in Pods using their real IP addresses. When implementing\
    \ `Pod Networks`, there are many solutions to ensure adherence to the Kubernetes\
    \ networking model rules. A common solution is overlay networking, which uses\
    \ a tunneling protocol to exchange packets between Nodes independent of the underlying\
    \ physical infrastructure’s network. This enables the overlay network to use a\
    \ layer 3 IP scheme independent of the data center’s physical infrastructure,\
    \ enabling simpler adherence to the Kubernetes networking model.\n\nAnother option\
    \ is to build a `Pod Network` as part of a data center infrastructure as part\
    \ of a bare-metal approach. This will require the coordination of the Kubernetes\
    \ Cluster administrator and the network engineering team responsible for the network.\n\
    \nThe following are common communication patterns used in a Kubernetes Cluster\
    \ showing Pods accessing each other and also accessing the Services provided by\
    \ Pods.\n\n### Communication Patterns\n\nFigure 3-5 shows some example communication\
    \ patterns in a Kubernetes cluster. Let’s walk through each of those together:\n\
    \n![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig5_HTML.jpg](images/494804_1_En_3_Chapter/494804_1_En_3_Fig5_HTML.jpg)\n\
    \n*Figure 3-5 Kubernetes networking*\n\n1.  **Inside a Pod**\n    Multiple containers\
    \ within a Pod share the same container namespace. These containers can communicate\
    \ with each other over `localhost` on unique ports.\n2.  **Pod to Pod within a\
    \ Node**\n    When Pods on the same Node need to communicate over the network,\
    \ they do so over a local software bridge defined on the Node and use the Pod\
    \ IP.\n3.  **Pod to Pod on another Node**\n    When Pods on different Nodes need\
    \ to communicate over the network, they do so over the local layer 2 or layer\
    \ 3 network using the Pod IP.\n4.  **Services**\n    When accessing `Services`\
    \ in a cluster, traffic is routed to the `kube-proxy` implementing the `Service`\
    \ and then routed to the Pod providing that application service. As introduced\
    \ earlier in this chapter, `Services` will be your most common interaction with\
    \ applications deployed in a Cluster.\n\n## Summary\n\nThis chapter introduced\
    \ Kubernetes and how it enables deployment of modern container-based applications.\
    \ You learned how the Kubernetes API enables you to build and model applications\
    \ that are deployed into a Kubernetes Cluster. You also learned the core API primitives\
    \ for deploying workloads: `Pods`, your container-based application; `Controllers`,\
    \ keeping the cluster and its workload in the desired state; `Services`, for access\
    \ to the applications; and `storage`, for stateful applications. Then you learned\
    \ about the components of a cluster and how they work together to ensure that\
    \ your desired state is implemented, and we had a quick tour of the Kubernetes\
    \ networking model. With all that theory behind us, now it’s time to move on to\
    \ the next chapter where we will show you how to build a Kubernetes cluster and\
    \ get a basic workload up and running.\n\n# Part II Kubernetes in Practice\n\n\
    # 4. Installing Kubernetes\n\nIn this chapter, we will introduce how to build\
    \ a Kubernetes cluster both on-premises and in the cloud. We will begin with discussion\
    \ of the decision process of where to install, on-premises or in the cloud, and\
    \ what to consider in that process. We will then go through the process of building\
    \ an on-premises, virtual machine–based Kubernetes cluster using the `kubeadm`\
    \ installation method. Then next, we will build a cluster in Azure Kubernetes\
    \ Service. These clusters will be the foundation for all examples in the remainder\
    \ of the book."
