    \ https\n    targetPort: 3000\n    nodePort: 30080\n  selector:\n    app: grafana\n\
    \  type: NodePort\n```\n清单 8-11: `grafana-service.yaml`\n\n你的性能监控环境现在已准备就绪。打开网页浏览器并登录\
    \ `http://control:30080`（这可以在任何能够访问控制平面节点且在其 `hosts` 文件中有相应条目的机器上进行）。使用我们之前定义的凭据（在我们的示例中是\
    \ `admin` 和 `admin123`）。\n\n转到左侧的 `Configuration` ➤ `Data Sources`（图 8-4）并点击 `Add\
    \ data source`。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig4_HTML.jpg](img/494804_1_En_8_Fig4_HTML.jpg)\n\
    图 8-4: Grafana – 添加数据源\n\n从 `Time series databases` 中选择 `InfluxDB`，并点击 `Select`，如图\
    \ 8-5 所示。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig5_HTML.jpg](img/494804_1_En_8_Fig5_HTML.jpg)\n\
    图 8-5: Grafana – 添加数据源 - 时序数据库\n\n将 URL（图 8-6）设置为 `http://influxdb:8086`。\n\n\
    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig6_HTML.jpg](img/494804_1_En_8_Fig6_HTML.jpg)\n\
    图 8-6: Grafana – 添加数据源 - 设置\n\n向下滚动，将 `Database` 设置为 `monitoring`，然后点击 `Save &\
    \ Test` 以验证你的连接，如图 8-7 所示。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig7_HTML.jpg](img/494804_1_En_8_Fig7_HTML.jpg)\n\
    图 8-7: Grafana – 添加数据源\n\n利用此连接，我们现在可以使用其指标创建仪表板。同样，我们不会深入探讨这一点，而是直接使用两个现有的仪表板。\n\
    \n导航到 `Dashboards` 并选择 `Manage`，如图 8-8 所示。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig8_HTML.jpg](img/494804_1_En_8_Fig8_HTML.jpg)\n\
    图 8-8: Grafana – 管理仪表板\n\n在下一个屏幕（图 8-9）上，点击 `Import`。\n"
- fmt: "## Kibana for Log Aggregation and Management\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig9_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig9_HTML.jpg)\n\
    \nFigure 8-9\n\nGrafana – Import dashboard\n\nIn the upper section, `Import via`\
    \ `grafana.com`, enter the ID `928` and click `Load` (Figure [8-10](#494804_1_En_8_Chapter.xhtml#Fig10)).\
    \ Dashboard `928` is a preconfigured system dashboard from the Grafana library,\
    \ and we’ll explain to you later in this chapter how you can find additional dashboards\
    \ for you to use.\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig10_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig10_HTML.jpg)\n\
    \nFigure 8-10\n\nGrafana – Import dashboard (Dashboad ID)\n\nChange the `InfluxDB\
    \ telegraf` dropdown in the lower section of the screen (Figure [8-11](#494804_1_En_8_Chapter.xhtml#Fig11))\
    \ to `InfluxDB` and click `Import`.\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig11_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig11_HTML.jpg)\n\
    \nFigure 8-11\n\nGrafana – Import dashboard (Results)\n\nThis will import and\
    \ open the Telegraf system dashboard for you, which has a ton of valuable information\
    \ about the hardware behind your Kubernetes Cluster (see Figure [8-12](#494804_1_En_8_Chapter.xhtml#Fig12)).\n\
    \n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig12_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig12_HTML.jpg)\n\
    \nFigure 8-12\n\nGrafana – Telegraf dashboard\n\nRepeat the same steps using dashboard\
    \ ID `9386` to import a dashboard that has SQL Server–specific metrics.\n\nYou\
    \ will find many more dashboards that you can use at [`https://grafana.com/ grafana/dashboards/`](https://grafana.com/%2520grafana/dashboards/).\
    \ If you want to learn more about Grafana itself, check out [`https://grafana.com/`](https://grafana.com/).\n\
    \nThe Kibana dashboard as shown in Figure [8-13](#494804_1_En_8_Chapter.xhtml#Fig13)\
    \ on the other hand provides you an insight to your Kubernetes log files including\
    \ those affecting your SQL Server pods and containers. Logging is valuable in\
    \ troubleshooting scenarios, and given that logs are tied to the lifecycle of\
    \ a pod and we need ways to access logs independent of that, we need a solution\
    \ that covers this for us. Kibana is part of the elastic stack. It also provides\
    \ options to create visualizations and dashboards on top of your log files.\n\n\
    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig13_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig13_HTML.jpg)\n\
    \nFigure 8-13\n\nKibana Portal – Overview\n\n### How to Install and Configure\
    \ Kibana\n\nKibana uses entirely different components than Grafana, but the general\
    \ logic is very similar. As you can see in Figure [8-14](#494804_1_En_8_Chapter.xhtml#Fig14),\
    \ we have `elasticsearch` acting as our data store, while Kibana is used as the\
    \ front end. `Fluent-bit` Pods on every node are responsible to collect the logs\
    \ and send them to `elasticsearch`.\n\nThe required steps to set up Kibana are:\n\
    \n- Create a namespace and set it as your current context.\n- Deploy elasticsearch\
    \ and expose it as a service.\n- Deploy fluent-bit.\n- Deploy Kibana and expose\
    \ it as a service.\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig14_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig14_HTML.jpg)\n\
    \nFigure 8-14\n\nKibana and its required components\n\nJust like with Grafana\
    \ before, let’s create a new namespace for Kibana using the code in Listing [8-12](#494804_1_En_8_Chapter.xhtml#PC12).\n\
    \n```bash\nkubectl create namespace logging\nkubectl config set-context --current\
    \ --namespace=logging\n```\n\nListing 8-12: Create and switch to namespace “logging”\n\
    \nAlso just like with Grafana, we will not explain every single detail but walk\
    \ you through the steps to get your log aggregation solution deployed to your\
    \ cluster.\n\nWe’ll start with a service to expose elasticsearch within our cluster\
    \ (Listing [8-13](#494804_1_En_8_Chapter.xhtml#PC13)).\n\nDid you notice something?\
    \ We’re exposing the services before deploying the pods. This is simply to illustrate\
    \ that the order here does not matter. Of course, the service will only be reachable\
    \ once the targeted deployment has also been created.\n\n```yaml\nkind: Service\n\
    apiVersion: v1\nmetadata:\n  name: elasticsearch\n  namespace: logging\n  labels:\n\
    \    app: elasticsearch\nspec:\n  selector:\n    app: elasticsearch\n  clusterIP:\
    \ None\n  ports:\n  - port: 9200\n    name: rest\n  - port: 9300\n    name: inter-node\n\
    ```\n\nListing 8-13: elasticsearch-service.yaml\n\nSince elasticsearch uses StatefulSets,\
    \ it requires one persistent volume for each pod, so instead of statically provisioning\
    \ a `PV` and `PVC`, we will be using a `storage class` for dynamic provisioning,\
    \ which we’ll point to our NFS server again. This storage class has already been\
    \ provisioned in Chapter [6](#494804_1_En_6_Chapter.xhtml).\n\nWith our storage\
    \ in place, we can roll out a StatefulSet for our elasticsearch application using\
    \ the manifest in Listing [8-14](#494804_1_En_8_Chapter.xhtml#PC14). In the last\
    \ section of this manifest, you can see our `nfs-storage` storage class being\
    \ referenced, which is how the two are being linked together."
  raw: '![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig9_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Grafana – Import dashboard


    In the upper section, *Import via* grafana.com, enter the ID *928* and click *Load*
    (Figure [8-10](#494804_1_En_8_Chapter.xhtml#Fig10)). Dashboard 928 is a preconfigured
    system dashboard from the Grafana library, and we’ll explain to you later in this
    chapter how you can find additional dashboards for you to use.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig10_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Grafana – Import dashboard (Dashboad ID)


    Change the *InfluxDB telegraf* dropdown in the lower section of the screen (Figure
    [8-11](#494804_1_En_8_Chapter.xhtml#Fig11)) to *InfluxDB* and click *Import*.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig11_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Grafana – Import dashboard (Results)


    This will import and open the Telegraf system dashboard for you, which has a ton
    of valuable information about the hardware behind your Kubernetes Cluster (see
    Figure [8-12](#494804_1_En_8_Chapter.xhtml#Fig12)).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig12_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    Grafana – Telegraf dashboard


    Repeat the same steps using dashboard ID *9386* to import a dashboard that has
    SQL Server–specific metrics.


    You will find many more dashboards that you can use at [*https://grafana.com/
    grafana/dashboards/*](https://grafana.com/%2520grafana/dashboards/). If you want
    to learn more about Grafana itself, check out [*https://grafana.com/*](https://grafana.com/).


    ## Kibana for Log Aggregation and Management


    The Kibana dashboard as shown in Figure [8-13](#494804_1_En_8_Chapter.xhtml#Fig13)
    on the other hand provides you an insight to your Kubernetes log files including
    those affecting your SQL Server pods and containers. Logging is valuable in troubleshooting
    scenarios, and given that logs are tied to the lifecycle of a pod and we need
    ways to access logs independent of that, we need a solution that covers this for
    us. Kibana is part of the elastic stack. It also provides options to create visualizations
    and dashboards on top of your log files.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig13_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig13_HTML.jpg)


    Figure 8-13


    Kibana Portal – Overview


    ### How to Install and Configure Kibana


    Kibana uses entirely different components than Grafana, but the general logic
    is very similar. As you can see in Figure [8-14](#494804_1_En_8_Chapter.xhtml#Fig14),
    we have *elasticsearch* acting as our data store, while Kibana is used as the
    front end. *Fluent-bit* Pods on every node are responsible to collect the logs
    and send them to *elasticsearch*.


    The required steps to set up Kibana are


    *   Create a namespace and set it as your current context.


    *   Deploy elasticsearch and expose it as a service.


    *   Deploy fluent-bit.


    *   Deploy Kibana and expose it as a service.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig14_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig14_HTML.jpg)


    Figure 8-14


    Kibana and its required components


    Just like with Grafana before, let’s create a new namespace for Kibana using the
    code in Listing [8-12](#494804_1_En_8_Chapter.xhtml#PC12).


    ```

    kubectl create namespace logging

    kubectl config set-context --current --namespace=logging

    Listing 8-12

    Create and switch to namespace “logging”

    ```


    Also just like with Grafana, we will not explain every single detail but walk
    you through the steps to get your log aggregation solution deployed to your cluster.


    We’ll start with a service to expose elasticsearch within our cluster (Listing
    [8-13](#494804_1_En_8_Chapter.xhtml#PC13)).


    Did you notice something? We’re exposing the services before deploying the pods.
    This is simply to illustrate that the order here does not matter. Of course, the
    service will only be reachable once the targeted deployment has also been created.


    ```

    kind: Service

    apiVersion: v1

    metadata:

    name: elasticsearch

    namespace: logging

    labels:

    app: elasticsearch

    spec:

    selector:

    app: elasticsearch

    clusterIP: None

    ports:

    - port: 9200

    name: rest

    - port: 9300

    name: inter-node

    Listing 8-13

    elasticsearch-service.yaml

    ```


    Since elasticsearch uses StatefulSets, it requires one persistent volume for each
    pod, so instead of statically provisioning a *PV* and *PVC*, we will be using
    a *storage class* for dynamic provisioning, which we’ll point to our NFS server
    again. This storage class has already been provisioned in Chapter [6](#494804_1_En_6_Chapter.xhtml).


    With our storage in place, we can roll out a StatefulSet for our elasticsearch
    application using the manifest in Listing [8-14](#494804_1_En_8_Chapter.xhtml#PC14).
    In the last section of this manifest, you can see our *nfs-storage* storage class
    being referenced, which is how the two are being linked together.'
  trans: "\n## Kibana 用于日志聚合与管理\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig9_HTML.jpg](img/494804_1_En_8_Fig9_HTML.jpg)\n\
    \n图 8-9\n\nGrafana – 导入仪表板\n\n在上部区域，通过 `grafana.com` `导入`，输入 ID `928` 并点击 `加载`（图\
    \ 8-10）。仪表板 `928` 是来自 Grafana 库的一个预配置系统仪表板，我们将在本章稍后向你解释如何查找更多可供你使用的仪表板。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig10_HTML.jpg](img/494804_1_En_8_Fig10_HTML.jpg)\n\
    \n图 8-10\n\nGrafana – 导入仪表板（仪表板 ID）\n\n将屏幕下部区域（图 8-11）的 `InfluxDB telegraf` 下拉菜单更改为\
    \ `InfluxDB`，然后点击 `导入`。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig11_HTML.jpg](img/494804_1_En_8_Fig11_HTML.jpg)\n\
    \n图 8-11\n\nGrafana – 导入仪表板（结果）\n\n这将为你导入并打开 Telegraf 系统仪表板，其中包含大量关于你的 Kubernetes\
    \ 集群背后硬件的有价值信息（见图 8-12）。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig12_HTML.jpg](img/494804_1_En_8_Fig12_HTML.jpg)\n\
    \n图 8-12\n\nGrafana – Telegraf 仪表板\n\n使用仪表板 ID `9386` 重复相同的步骤，以导入一个包含 SQL Server\
    \ 特定指标的仪表板。\n\n你可以在 [`https://grafana.com/grafana/dashboards/`](https://grafana.com/%2520grafana/dashboards/)\
    \ 找到更多可用的仪表板。如果你想了解更多关于 Grafana 本身的信息，请访问 [`https://grafana.com/`](https://grafana.com/)。\n\
    \n另一方面，如图 8-13 所示的 Kibana 仪表板，让你能够洞察你的 Kubernetes 日志文件，包括那些影响你的 SQL Server Pod\
    \ 和容器的日志。日志记录在故障排除场景中很有价值，并且鉴于日志与 Pod 的生命周期绑定，而我们又需要独立于该生命周期访问日志的方法，因此我们需要一个能为我们覆盖此需求的解决方案。Kibana\
    \ 是 Elastic Stack 的一部分。它还提供了在你的日志文件之上创建可视化和仪表板的选项。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig13_HTML.jpg](img/494804_1_En_8_Fig13_HTML.jpg)\n\
    \n图 8-13\n\nKibana 门户 – 概览\n\n### 如何安装和配置 Kibana\n\nKibana 使用的组件与 Grafana 完全不同，但总体逻辑非常相似。如图\
    \ 8-14 所示，我们有 `elasticsearch` 作为我们的数据存储，而 Kibana 用作前端。每个节点上的 `Fluent-bit` Pod\
    \ 负责收集日志并将其发送到 `elasticsearch`。\n\n设置 Kibana 所需的步骤是：\n\n- 创建一个命名空间并将其设置为当前上下文。\n\
    - 部署 elasticsearch 并将其作为服务暴露。\n- 部署 fluent-bit。\n- 部署 Kibana 并将其作为服务暴露。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig14_HTML.jpg](img/494804_1_En_8_Fig14_HTML.jpg)\n\
    \n图 8-14\n\nKibana 及其所需组件\n\n就像之前使用 Grafana 一样，让我们使用清单 8-12 中的代码为 Kibana 创建一个新的命名空间。\n\
    \n```bash\nkubectl create namespace logging\nkubectl config set-context --current\
    \ --namespace=logging\n```\n\n清单 8-12：创建并切换到命名空间“logging”\n\n同样像使用 Grafana 时一样，我们不会解释每一个细节，而是引导你完成将日志聚合解决方案部署到集群的步骤。\n\
    \n我们将从在集群内暴露 elasticsearch 的服务开始（清单 8-13）。\n\n你注意到什么了吗？我们在部署 Pod 之前就暴露了服务。这仅仅是为了说明这里的顺序并不重要。当然，只有在目标部署也创建后，服务才是可访问的。\n\
    \n```yaml\nkind: Service\napiVersion: v1\nmetadata:\n  name: elasticsearch\n \
    \ namespace: logging\n  labels:\n    app: elasticsearch\nspec:\n  selector:\n\
    \    app: elasticsearch\n  clusterIP: None\n  ports:\n  - port: 9200\n    name:\
    \ rest\n  - port: 9300\n    name: inter-node\n```\n\n清单 8-13：elasticsearch-service.yaml\n\
    \n由于 elasticsearch 使用 StatefulSet，它需要为每个 Pod 提供一个持久卷，因此我们将使用 `storage class` 进行动态配置，而不是静态预配置\
    \ `PV` 和 `PVC`，我们将再次将其指向我们的 NFS 服务器。此存储类已在第 6 章配置好。\n\n有了存储，我们就可以使用清单 8-14 中的配置清单为\
    \ elasticsearch 应用程序推出一个 StatefulSet。在此清单的最后一部分，你可以看到引用了我们的 `nfs-storage` 存储类，这就是两者连接起来的方式。\n"
- fmt: "# 在 Kubernetes 上部署日志聚合系统\n\n## 部署 Elasticsearch StatefulSet\n\n```yaml\napiVersion:\
    \ apps/v1\nkind: StatefulSet\nmetadata:\n  name: es-cluster\n  namespace: logging\n\
    spec:\n  serviceName: elasticsearch\n  replicas: 3\n  selector:\n    matchLabels:\n\
    \      app: elasticsearch\n  template:\n    metadata:\n      labels:\n       \
    \ app: elasticsearch\n    spec:\n      containers:\n      - name: elasticsearch\n\
    \        image: docker.elastic.co/elasticsearch/elasticsearch:7.2.0\n        resources:\n\
    \          limits:\n            cpu: 1000m\n          requests:\n            cpu:\
    \ 100m\n        ports:\n        - containerPort: 9200\n          name: rest\n\
    \          protocol: TCP\n        - containerPort: 9300\n          name: inter-node\n\
    \          protocol: TCP\n        volumeMounts:\n        - name: data\n      \
    \    mountPath: /usr/share/elasticsearch/data\n        env:\n        - name: cluster.name\n\
    \          value: k8s-logs\n        - name: node.name\n          valueFrom:\n\
    \            fieldRef:\n              fieldPath: metadata.name\n        - name:\
    \ discovery.seed_hosts\n          value: \"es-cluster-0.elasticsearch,es-cluster-1.elasticsearch,es-cluster-2.elasticsearch\"\
    \n        - name: cluster.initial_master_nodes\n          value: \"es-cluster-0,es-cluster-1,es-cluster-2\"\
    \n        - name: ES_JAVA_OPTS\n          value: \"-Xms512m -Xmx512m\"\n     \
    \ initContainers:\n      - name: fix-permissions\n        image: busybox\n   \
    \     command: [\"sh\", \"-c\", \"chown -R 1000:1000 /usr/share/elasticsearch/data\"\
    ]\n        securityContext:\n          privileged: true\n        volumeMounts:\n\
    \        - name: data\n          mountPath: /usr/share/elasticsearch/data\n  \
    \    - name: increase-vm-max-map\n        image: busybox\n        command: [\"\
    sysctl\", \"-w\", \"vm.max_map_count=262144\"]\n        securityContext:\n   \
    \       privileged: true\n      - name: increase-fd-ulimit\n        image: busybox\n\
    \        command: [\"sh\", \"-c\", \"ulimit -n 65536\"]\n        securityContext:\n\
    \          privileged: true\n  volumeClaimTemplates:\n  - metadata:\n      name:\
    \ data\n      labels:\n        app: elasticsearch\n    spec:\n      accessModes:\
    \ [ \"ReadWriteOnce\" ]\n      storageClassName: nfs-storage\n      resources:\n\
    \        requests:\n          storage: 100Gi\n```\n**清单 8-14** 将 Elasticsearch\
    \ 部署为 StatefulSet（`elasticsearch.yaml`）\n\n## 部署 Kibana\n\n在我们的集群上运行 Elasticsearch\
    \ 后，我们可以使用清单[8-15](#494804_1_En_8_Chapter.xhtml#PC15)来部署 Kibana 并将其作为服务暴露（同样使用静态端口：30445）。这也表明，无论我们是通过多个清单还是单个清单部署所有内容（此处为服务和部署），都没有关系。此外，我们是在创建部署之前创建服务，但\
    \ Kubernetes 会无缝地为我们处理好这一点。\n\n```yaml\napiVersion: v1\nkind: Service\nmetadata:\n\
    \  name: kibana\n  namespace: logging\n  labels:\n    app: kibana\nspec:\n  ports:\n\
    \  - port: 5601\n    targetPort: 5601\n    nodePort: 30445\n  selector:\n    app:\
    \ kibana\n  type: NodePort\n---\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: kibana\n  namespace: logging\n  labels:\n    app: kibana\nspec:\n  replicas:\
    \ 1\n  selector:\n    matchLabels:\n      app: kibana\n  template:\n    metadata:\n\
    \      labels:\n        app: kibana\n    spec:\n      containers:\n      - name:\
    \ kibana\n        image: docker.elastic.co/kibana/kibana:7.2.0\n        resources:\n\
    \          limits:\n            cpu: 1000m\n          requests:\n            cpu:\
    \ 100m\n        env:\n        - name: ELASTICSEARCH_URL\n          value: http://elasticsearch:9200\n\
    \        ports:\n        - containerPort: 5601\n```\n**清单 8-15** `kibana.yaml`\n\
    \n## 安装 Fluent-bit\n\n现在我们有了用于存储数据的 Elasticsearch 和用于展示数据的 Kibana。唯一缺少的组件是用于收集日志的\
    \ `fluent-bit`，这样我们才有数据可供处理。\n\n在这种情况下，我们只需直接从 GitHub 应用一个文件（清单[8-16](#494804_1_En_8_Chapter.xhtml#PC16)），就可以创建从\
    \ `ServiceAccount` 到 `Roles` 以及 `Deployment` 的所有内容。如果您想先检查或做任何更改，也可以先保存它们，然后应用本地清单。\n\
    \n```bash\nkubectl create -f https://raw.githubusercontent.com/fluent/fluent-bit-kubernetes-logging/master/fluent-bit-service-account.yaml\n\
    kubectl create -f https://raw.githubusercontent.com/fluent/fluent-bit-kubernetes-logging/master/fluent-bit-role.yaml\n\
    kubectl create -f https://raw.githubusercontent.com/fluent/fluent-bit-kubernetes-logging/master/fluent-bit-role-binding.yaml\n\
    kubectl create -f https://raw.githubusercontent.com/fluent/fluent-bit-kubernetes-logging/master/output/elasticsearch/fluent-bit-configmap.yaml\n\
    kubectl create -f https://raw.githubusercontent.com/fluent/fluent-bit-kubernetes-logging/master/output/elasticsearch/fluent-bit-ds.yaml\n\
    ```\n**清单 8-16** 安装 `fluent-bit`\n\n## 访问 Kibana\n\n我们的日志聚合系统现已准备就绪。打开 Web 浏览器并导航到\
    \ [*http://control:30445/*](http://www.control:30445/)。\n\n您将被询问（见图[8-15](#494804_1_En_8_Chapter.xhtml#Fig15)）是希望从示例数据开始还是自行探索，此时您将点击\
    \ *Explore on my own*。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig15_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig15_HTML.jpg)\n\
    \n**图 8-15** Kibana Portal\n\n## 配置数据源\n\n与 Grafana 类似，我们在使用 Kibana 之前需要配置其数据源。如图[8-16](#494804_1_En_8_Chapter.xhtml#Fig16)所示，点击左侧菜单中的\
    \ *Discover*。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig16_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig16_HTML.jpg)\n\
    \n**图 8-16** Kibana Portal 导航\n\n配置菜单（图[8-17](#494804_1_En_8_Chapter.xhtml#Fig17)）将要求您定义一个索引模式。\n\
    \n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig17_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig17_HTML.jpg)\n\
    \n**图 8-17** Kibana Portal – 定义索引模式\n\n我们现在保持简单，因此在文本框中输入 `logstash-**` 并点击 *Next\
    \ step*。\n\n下一步（图[8-18](#494804_1_En_8_Chapter.xhtml#Fig18)）要求您配置将使用哪个字段按时间过滤日志数据。在下拉菜单中选择\
    \ `@timestamp`，然后点击 *Create index pattern*。\n\n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig18_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig18_HTML.jpg)\n\
    \n**图 8-18** Kibana Portal – 配置索引设置\n\n再次点击左侧的 *Discover*，您将看到集群中收集日志的直方图（图[8-19](#494804_1_En_8_Chapter.xhtml#Fig19)）。\n\
    \n![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig19_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig19_HTML.jpg)\n\
    \n**图 8-19** Kibana 直方图\n\n这些数据可以通过多种方式进行筛选和分析。要了解更多关于 Kibana 的信息，我们建议您查看 [*www.elastic.co/kibana*](https://www.elastic.co/kibana)。"
  raw: '```

    apiVersion: apps/v1

    kind: StatefulSet

    metadata:

    name: es-cluster

    namespace: logging

    spec:

    serviceName: elasticsearch

    replicas: 3

    selector:

    matchLabels:

    app: elasticsearch

    template:

    metadata:

    labels:

    app: elasticsearch

    spec:

    containers:

    - name: elasticsearch

    image: docker.elastic.co/elasticsearch/elasticsearch:7.2.0

    resources:

    limits:

    cpu: 1000m

    requests:

    cpu: 100m

    ports:

    - containerPort: 9200

    name: rest

    protocol: TCP

    - containerPort: 9300

    name: inter-node

    protocol: TCP

    volumeMounts:

    - name: data

    mountPath: /usr/share/elasticsearch/data

    env:

    - name: cluster.name

    value: k8s-logs

    - name: node.name

    valueFrom:

    fieldRef:

    fieldPath: metadata.name

    - name: discovery.seed_hosts

    value: "es-cluster-0.elasticsearch,es-cluster-1.elasticsearch,es-cluster-2.elasticsearch"

    - name: cluster.initial_master_nodes

    value: "es-cluster-0,es-cluster-1,es-cluster-2"

    - name: ES_JAVA_OPTS

    value: "-Xms512m -Xmx512m"

    initContainers:

    - name: fix-permissions

    image: busybox

    command: ["sh", "-c", "chown -R 1000:1000 /usr/share/elasticsearch/data"]

    securityContext:

    privileged: true

    volumeMounts:

    - name: data

    mountPath: /usr/share/elasticsearch/data

    - name: increase-vm-max-map

    image: busybox

    command: ["sysctl", "-w", "vm.max_map_count=262144"]

    securityContext:

    privileged: true

    - name: increase-fd-ulimit

    image: busybox

    command: ["sh", "-c", "ulimit -n 65536"]

    securityContext:

    privileged: true

    volumeClaimTemplates:

    - metadata:

    name: data

    labels:

    app: elasticsearch

    spec:

    accessModes: [ "ReadWriteOnce" ]

    storageClassName: nfs-storage

    resources:

    requests:

    storage: 100Gi

    Listing 8-14

    Deploy elasticsearch as a StatefulSet (elasticsearch.yaml)

    ```


    With elasticsearch running on our cluster, we can deploy Kibana and expose it
    as a service (again using a static port: 30445) using the manifest in Listing
    [8-15](#494804_1_En_8_Chapter.xhtml#PC15). This is also an example showing that
    it doesn’t matter if we deploy everything (here service and deployment) through
    multiple manifests or a single manifest. Also, we’re creating the service before
    we’re creating the deployment, but Kubernetes works that out for us seamlessly.


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: kibana

    namespace: logging

    labels:

    app: kibana

    spec:

    ports:

    - port: 5601

    targetPort: 5601

    nodePort: 30445

    selector:

    app: kibana

    type: NodePort


    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: kibana

    namespace: logging

    labels:

    app: kibana

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: kibana

    template:

    metadata:

    labels:

    app: kibana

    spec:

    containers:

    - name: kibana

    image: docker.elastic.co/kibana/kibana:7.2.0

    resources:

    limits:

    cpu: 1000m

    requests:

    cpu: 100m

    env:

    - name: ELASTICSEARCH_URL

    value: http://elasticsearch:9200

    ports:

    - containerPort: 5601

    Listing 8-15

    kibana.yaml

    ```


    Now we have elasticsearch to hold our data and Kibana to display it. The only
    component missing is fluent-bit to collect the logs, so we have something to work
    with.


    In this case, we’re creating everything, from ServiceAccount to Roles and the
    Deployment by just applying a file straight from GitHub (Listing [8-16](#494804_1_En_8_Chapter.xhtml#PC16)).
    You could also save them first and apply the local manifests in case you wanted
    to check them first or make any changes.


    ```

    kubectl create -f https://raw.githubusercontent.com/fluent/fluent-bit-kubernetes-logging/master/fluent-bit-service-account.yaml

    kubectl create -f https://raw.githubusercontent.com/fluent/fluent-bit-kubernetes-logging/master/fluent-bit-role.yaml

    kubectl create -f https://raw.githubusercontent.com/fluent/fluent-bit-kubernetes-logging/master/fluent-bit-role-binding.yaml

    kubectl create -f https://raw.githubusercontent.com/fluent/fluent-bit-kubernetes-logging/master/output/elasticsearch/fluent-bit-configmap.yaml

    kubectl create -f https://raw.githubusercontent.com/fluent/fluent-bit-kubernetes-logging/master/output/elasticsearch/fluent-bit-ds.yaml

    Listing 8-16

    Install fluent-bit

    ```


    Our log aggregation system is now ready to use. Open a web browser and navigate
    to [*http://control:30445/*](http://www.control:30445/).


    You’ll be asked (see Figure [8-15](#494804_1_En_8_Chapter.xhtml#Fig15)) if you’d
    like to start with sample data or explore on your own, where you will click *Explore
    on my own*.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig15_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig15_HTML.jpg)


    Figure 8-15


    Kibana Portal


    Similar to Grafana, we need to configure our data sources for Kibana before we
    can use them. As illustrated in Figure [8-16](#494804_1_En_8_Chapter.xhtml#Fig16),
    click *Discover* on the left-hand menu.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig16_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig16_HTML.jpg)


    Figure 8-16


    Kibana Portal Navigation


    The configuration menu (Figure [8-17](#494804_1_En_8_Chapter.xhtml#Fig17)) will
    ask you to define an index pattern.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig17_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig17_HTML.jpg)


    Figure 8-17


    Kibana Portal – Define index pattern


    We will keep this simple for now, so enter *logstash-** in the text box and click
    *Next step*.


    The next step (Figure [8-18](#494804_1_En_8_Chapter.xhtml#Fig18)) asks you to
    configure which field will be used to filter log data by time. Select *@timestamp*
    in the dropdown and click *Create index pattern*.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig18_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig18_HTML.jpg)


    Figure 8-18


    Kibana Portal – Configure index settings


    Click *Discover* on the left side again, and you will see a histogram of collected
    logs within your cluster (Figure [8-19](#494804_1_En_8_Chapter.xhtml#Fig19)).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig19_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig19_HTML.jpg)


    Figure 8-19


    Kibana histogram


    This data can be filtered and analyzed in many different ways. To learn more about
    Kibana, we recommend you to take a look at [*www.elastic.co/kibana*](https://www.elastic.co/kibana).'
