  trans: '### 容器生命周期


    参考图 2-4，你可以看到一个基于容器的应用程序的生命周期。当开发者准备就绪，他们会在常规的应用程序开发平台中构建应用。然后，他们会为该应用程序编写一个 *Docker
    文件*。这个 Docker 文件包含了构建该应用程序容器镜像所需的信息。它会包含诸如容器启动时应运行哪个二进制文件、应用程序使用哪个网络端口等信息，以及其他许多可能的配置属性和构建镜像的指令。一旦
    Docker 文件准备就绪，开发者会告诉 Docker *构建*一个镜像。这将从 Docker 文件中获取定义好的信息，并在开发者的本地工作站上创建一个容器镜像。该容器镜像随后被
    *推送*（上传）到一个 *容器注册表* 中，直到有人准备好使用该容器镜像。当用户想要从该容器镜像启动一个容器时，他们会将该容器镜像 *拉取* 到他们的操作系统，该操作系统上的容器运行时随后会从容器镜像创建（运行）一个运行中的容器，然后应用程序就在该操作系统的容器中启动并运行了。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig4_HTML.jpg](img/494804_1_En_2_Fig4_HTML.jpg)


    图 2-4


    容器生命周期


    好了，理论说得够多了。让我们看看如何在 Docker 上以容器方式部署 SQL Server。在本书中，你不会构建容器镜像。你将使用公共容器注册表中可用的镜像。在本章中，你将操作
    SQL Server 容器，这些镜像可从 Microsoft 容器注册表 (`mcr.microsoft.com`) 获取。


    ### 操作容器镜像


    要拉取一个容器，执行 `docker pull` 命令并指定你想要拉取的容器镜像。在以下示例中，容器镜像来自容器注册表 `mcr.microsoft.com`
    中的 `mssql/server` 仓库，要请求一个特定的容器，你需要指定 *镜像标签*，这里是 `2019-latest`。代码清单 2-1 展示了此命令。


    ```

    docker pull mcr.microsoft.com/mssql/server:2019-latest

    代码清单 2-1

    用于拉取最新 SQL Server 2019 镜像的 docker pull 命令

    ```


    图 2-5 显示了代码清单 2-1 中命令的输出结果。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig5_HTML.jpg](img/494804_1_En_2_Fig5_HTML.jpg)


    图 2-5


    docker pull 命令的输出


    在前面的示例中，按照惯例正在拉取一个标签为 `2019-latest` 的容器镜像。容器镜像仓库的维护者通过指定一个 `latest` 标签来定义指向其应用程序最新版本的标签。如果你想拉取特定版本的容器镜像，你需要从该仓库获取可用标签的列表。对于
    SQL Server，你可以使用代码清单 2-2（Bash）和代码清单 2-3（Windows）所示的命令来实现。


    ```

    (Invoke-WebRequest https://mcr.microsoft.com/v2/mssql/server/tags/list).Content

    代码清单 2-3

    Windows 命令

    ```


    ```

    curl -sL https://mcr.microsoft.com/v2/mssql/server/tags/list

    代码清单 2-2

    Bash 命令

    ```


    图 2-6 向你展示了这些命令输出的部分内容。实际上有更多可用的容器镜像，但为简洁起见我们省略了一些。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig6_HTML.jpg](img/494804_1_En_2_Fig6_HTML.jpg)


    图 2-6


    容器镜像及其标签的简略列表


    如果你想拉取一个特定的容器，你需要指定一个容器镜像标签。代码清单 2-4 中的命令将拉取与标签 `2019-CU9-ubuntu-18.04` 关联的容器镜像。


    ```

    docker pull mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04

    代码清单 2-4

    拉取与特定标签关联的容器镜像的 docker pull 命令

    ```


    要获取本地系统上可用的镜像列表，请执行代码清单 2-5 中的 `docker image ls` 命令。命令的输出显示了已拉取到本地系统的镜像。示例如下。


    ```

    docker image ls

    代码清单 2-5

    docker image ls 命令

    ```


    对于每个镜像，输出（图 2-7）显示了镜像的仓库、标签、镜像标识符（`IMAGE ID`）、创建日期和镜像大小。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig7_HTML.jpg](img/494804_1_En_2_Fig7_HTML.jpg)


    图 2-7


    docker image ls 命令的输出


    一个常见的误解是 `docker image ls` 命令显示的创建日期是镜像被拉取的日期。事实并非如此。创建日期实际上是镜像被创建的日期。


    一个容器镜像可以有多个标签。在上面的输出中，如果你仔细观察容器 `IMAGE ID`，会注意到两个容器镜像的 `IMAGE ID` 值相同。标签 `2019-latest`
    和 `2019-CU9-ubuntu-18.04` 指向同一个容器镜像，因为在撰写本文时，SQL Server 2019 的最新镜像是 CU9。当一个新的容器镜像发布到仓库时，它将拥有一个新的、唯一的容器镜像
    ID。仓库管理员会将 `latest` 标签更新为指向该仓库中的这个最新镜像。'
- fmt: '### Starting a Container


    要启动一个容器，请执行`docker run`命令，如清单 [2-6](#494804_1_En_2_Chapter.xhtml#PC6) 所示。让我们通过以下示例来逐步了解。


    ```

    docker run \

    --env ''ACCEPT_EULA=Y'' \

    --env ''MSSQL_SA_PASSWORD=S0methingS@Str0ng!'' \

    --name ''sql1'' \

    --publish 1433:1433 \

    --detach \

    mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04

    Listing 2-6

    docker run command

    ```


    要在容器中运行 SQL Server，需要为初始启动配置 SQL Server。如前所述，将配置与状态解耦是在容器中运行应用程序的关键。这里是一个解耦配置的示例。SQL
    Server 将配置点暴露为环境变量。通过在运行时为这些环境变量指定值，你可以注入配置。在前面的命令中，你看到 `--env ''ACCEPT_EULA=Y''`。这为环境变量`ACCEPT_EULA`指定了值`''Y''`。在启动时，SQL
    Server 将查找此值并相应地启动。类似地，还定义了一个环境变量`''MSSQL_SA_PASSWORD=S0methingS@Str0ng!''`。这设置了容器启动时的`sa`密码，在本例中为`S0methingS@Str0ng!`。虽然不是必需的，但使用`--name=''sql1''`参数指定了容器名称，这在命令行中使用容器时很有用，并使我们能够通过名称访问容器。


    > 提示

    >

    > 有关可作为环境变量使用的配置的更多信息，请查看 [https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables)。


    除了应用程序配置和名称之外，为了通过网络访问基于容器的应用程序，必须暴露一个端口。参数`--publish 1433:1433`将容器内的一个端口暴露到基础操作系统上的容器外端口。让我们稍微解析一下，因为这是我们刚开始使用容器时经常出错的地方。第一个`1433`是应用程序在基础操作系统上监听的端口。默认情况下，它将监听主机操作系统的
    IP 地址，因此这是用户和其他应用程序在同一主机上本地访问或从其他主机远程访问基于容器的应用程序的方式。第二个`1433`是“容器内”监听的端口。更多关于这一点，稍后在讨论容器内部结构时会提到。接下来是`--detach`，它告诉容器运行时将运行进程从标准输出分离。这让我们重新获得终端的控制权，并将
    SQL Server 作为后台进程运行。


    > 注意

    >

    > 如果你在启动容器时遇到问题，请移除`--detach`参数，以便在屏幕上看到容器的日志流式传输到标准输出。在 SQL Server 容器中，这是`SQL
    Server Error Log`。我们在创建容器时最常见的原因是`sa`密码不够复杂；在查看错误日志时，这会很快显现出来。`docker logs`在此场景下也很有帮助。


    最后，是用于启动此容器的特定容器镜像，在本例中是`mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04`。


    如果`docker run`命令成功，它会将容器 ID 打印到标准输出。


    在清单 [2-7](#494804_1_En_2_Chapter.xhtml#PC7) 中执行`docker ps`以列出本地系统上运行的容器。


    ```

    docker ps

    Listing 2-7

    docker ps command

    ```


    图 [2-8](#494804_1_En_2_Chapter.xhtml#Fig8) 显示了命令的输出。`sql1`容器已启动并运行。它还显示了容器 ID、启动它的容器镜像、容器启动时启动的命令、容器名称、容器的创建时间以及容器的当前状态，在本例中已运行了
    10 分钟。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig8_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig8_HTML.jpg)

    图 2-8

    本地系统上运行的容器列表


    ### What If Something Goes Wrong?


    使用`docker logs`命令结合容器名称（清单 [2-8](#494804_1_En_2_Chapter.xhtml#PC8)），在本例中是`sql1`，以获取容器的输出。在
    SQL Server 中，你在这里找到的输出来自 SQL Server 错误日志，其中很可能包含有关容器为何无法启动的有价值的信息。


    ```

    docker logs sql1 | more

    Listing 2-8

    docker logs command

    ```


    ### Accessing a Container-Based Application


    在这个案例中，应用程序是 SQL Server，所以让我们使用命令行实用程序`sqlcmd`来访问 SQL Server。清单 [2-9](#494804_1_En_2_Chapter.xhtml#PC9)
    中的代码显示了一个获取`@@VERSION`输出的查询。


    ```

    sqlcmd -S localhost,1433 -U sa -Q ''SELECT @@VERSION'' -P ''S0methingS@Str0ng!''

    Listing 2-9

    Command line utility sqlcmd to access SQL Server

    ```


    在图 [2-9](#494804_1_En_2_Chapter.xhtml#Fig9) 中，你可以看到一个运行 SQL Server 2019 CU1 的容器，这与容器启动时指定的容器镜像相符。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig9_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig9_HTML.jpg)

    图 2-9

    容器启动时指定的容器镜像


    ### Starting a Second Instance of SQL Server


    要启动第二个 SQL Server 2019 CU1 容器实例，你需要再次执行`docker run`。关键区别在于一个唯一的容器名称，本例中是`sql2`，以及一个要发布的唯一端口。在本例中，第二个
    SQL Server 实例在端口`1434`上可用，如清单 [2-10](#494804_1_En_2_Chapter.xhtml#PC10) 所示。要访问此
    SQL Server 实例，应用程序将指向该端口。在以下命令中，我们使用了缩写的参数名称，而不是像之前`docker run`命令中那样使用完整的参数名称。


    ```

    docker run \

    --name ''sql2'' \

    -e ''ACCEPT_EULA=Y'' \

    -e ''MSSQL_SA_PASSWORD=S0methingS@Str0ng!'' \

    -p 1434:1433 \

    -d mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04

    Listing 2-10

    docker run command with unique container name

    ```


    `docker ps`将再次产生一个正在运行的容器列表。


    图 [2-10](#494804_1_En_2_Chapter.xhtml#Fig10) 中的命令输出显示两个容器`sql1`和`sql2`都已启动并运行。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig10_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig10_HTML.jpg)

    图 2-10

    docker ps 命令的输出


    现在有两个容器在运行，让我们将一个数据库恢复到其中一个容器中。在书籍下载中，你会找到一个 SQL Server 数据库`TestDB1.bak`和一个恢复脚本`restore_testdb1.sql`。


    `restore_testdb1.sql`的内容也可以在清单 [2-11](#494804_1_En_2_Chapter.xhtml#PC11) 中看到。


    ```

    USE [master]

    RESTORE DATABASE [TestDB1]

    FROM DISK = N''/var/opt/mssql/data/TestDB1.bak''

    WITH REPLACE

    Listing 2-11

    restore_testdb1.sql

    ```


    让我们逐步完成恢复数据库的过程，查看容器内的文件布局，然后了解运行容器的生命周期。'
  raw: '### Starting a Container


    To start a container, execute the `docker run` command like in Listing [2-6](#494804_1_En_2_Chapter.xhtml#PC6),
    and let’s walk through the following example.


    ```

    docker run \

    --env ''ACCEPT_EULA=Y'' \

    --env ''MSSQL_SA_PASSWORD=S0methingS@Str0ng!'' \

    --name ''sql1'' \

    --publish 1433:1433 \

    --detach \

    mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04

    Listing 2-6

    docker run command

    ```


    To run SQL Server in a container, a couple things are required to configure SQL
    Server for its initial startup. As discussed earlier, decoupling configuration
    and state is key to running applications in containers. Here is an example of
    decoupling configuration. SQL Server exposes configuration points as environment
    variables. And you can inject configuration at runtime by specifying values for
    those environment variables. In the preceding command, you see `--env ''ACCEPT_EULA=Y''.`
    This specifies the value `''Y''` for the environment variable `ACCEPT_EULA`. At
    startup, SQL Server will look for this value and start up accordingly. Similarly,
    defined is an environment variable `''MSSQL_SA_PASSWORD=S0methingS@Str0ng!''`.
    This sets the `sa` password at container startup, which in this case is `S0methingS@Str0ng!`.
    While not required, a container name is specified with the `--name=''sql1''` parameter,
    which is useful when working with containers at the command line and gives us
    the ability to address the container by its name.


    Tip


    For more information on configurations available as environment variables, check
    out [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables).


    In addition to application configuration and name, to access the container-based
    application over the network, a port must be exposed. The parameter `--publish
    1433:1433` exposes a port from inside the container to one outside the container
    on the base operating system. Let’s unpack this a bit, as this is one place we
    tripped up often when we got started with containers. The first `1433` is the
    port on which the application is listening on the base operating system. By default,
    it will listen on the IP address of the host OS, so this is how users and other
    applications will access the container-based application either locally on the
    same host or remotely from other hosts. The second `1433` is the port listening
    “inside” the container. More on this later when in the discussion on container
    internals. Next is `--detach,` which tells the container runtime to detach the
    running process from standard out. This gives us control of our terminal back
    and runs SQL Server as a background process.


    Note


    If you are having trouble starting a container, remove the `--detach` parameter
    so you can see the container’s log on the screen streamed to standard out. In
    SQL Server containers, this is the `SQL Server Error Log`. The most common reason
    we see when creating a container is the `sa` password is not complex enough; this
    will surface quickly when looking at the Error Log. `docker logs` is also helpful
    in this scenario.


    And finally, the specific container image to start this container from, and in
    this example, it is `mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04`.


    If the `docker run` command is successful, it will print the container ID to standard
    out.


    Execute `docker ps` in Listing [2-7](#494804_1_En_2_Chapter.xhtml#PC7) to list
    the containers running on a local system.


    ```

    docker ps

    Listing 2-7

    docker ps command

    ```


    Figure [2-8](#494804_1_En_2_Chapter.xhtml#Fig8) shows the command’s output. The
    `sql1` container is up and running. It also shows the container ID, which container
    image it started from, the command started when the container started up, the
    container name, when the container was created, and the container’s current status,
    which in this case has been up for 10 minutes.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig8_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    List of containers running on a local system


    ### What If Something Goes Wrong?


    Use the `docker logs` command combined with the container name (Listing [2-8](#494804_1_En_2_Chapter.xhtml#PC8)),
    in this case `sql1`, to get the output from the container. In SQL Server, the
    output you’ll find here is from the SQL Server Error Log, which will likely hold
    valuable information on why your container isn’t starting up.


    ```

    docker logs sql1 | more

    Listing 2-8

    docker logs command

    ```


    ### Accessing a Container-Based Application


    In this case, the application is SQL Server, so let’s use the command line utility
    sqlcmd to access SQL Server. The code in Listing [2-9](#494804_1_En_2_Chapter.xhtml#PC9)
    shows a query to get the `@@VERSION` output.


    ```

    sqlcmd -S localhost,1433 -U sa -Q ''SELECT @@VERSION'' -P ''S0methingS@Str0ng!''

    Listing 2-9

    Command line utility sqlcmd to access SQL Server

    ```


    In Figure [2-9](#494804_1_En_2_Chapter.xhtml#Fig9), you can see a container running
    SQL Server 2019 CU1, which matches what the container image specified at container
    startup.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig9_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Container image specified at container startup


    ### Starting a Second Instance of SQL Server


    To start a second instance of SQL Server 2019 CU1 as a container, you execute
    `docker run` again. The key differences will be a unique container name, in this
    case `sql2,` and also a unique port to publish on. In this case, the second SQL
    Server instance is available on port `1434` as displayed in Listing [2-10](#494804_1_En_2_Chapter.xhtml#PC10).
    To access this instance of SQL Server, applications will point to that port. In
    the following command, rather than use the full parameter names as we did in the
    previous `docker run` command, we are using abbreviated parameter names.


    ```

    docker run \

    --name ''sql2'' \

    -e ''ACCEPT_EULA=Y'' \

    -e ''MSSQL_SA_PASSWORD=S0methingS@Str0ng!'' \

    -p 1434:1433 \

    -d mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04

    Listing 2-10

    docker run command with unique container name

    ```


    `docker ps` will again yield a list of the running containers.


    The command’s output in Figure [2-10](#494804_1_En_2_Chapter.xhtml#Fig10) shows
    both containers up and running, `sql1` and `sql2`.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig10_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Output of docker ps command


    Now that there are two containers up and running, let’s restore a database into
    one of those containers. In the book downloads, you’ll find a SQL Server database
    `TestDB1.bak` and a restore script `restore_testdb1.sql`.


    The contents of restore_testdb1.sql can also be seen in Listing [2-11](#494804_1_En_2_Chapter.xhtml#PC11).


    ```

    USE [master]

    RESTORE DATABASE [TestDB1]

    FROM DISK = N''/var/opt/mssql/data/TestDB1.bak''

    WITH REPLACE

    Listing 2-11

    restore_testdb1.sql

    ```


    Let’s walk through the process of restoring a database, looking inside the container
    to see the file layout, and then go through the lifecycle of running a container.'
