    ## 大数据集群简介


    SQL Server 2019 大数据集群——或简称大数据集群——是 SQL Server 2019 中的一套新功能集，涵盖了数据虚拟化、数据集市横向扩展以及人工智能等广泛功能。尽管微软采取“云优先”策略，将新功能和特性首先发布到
    Azure，并最终才（如果有的话）推广到本地版本，但它们是盒装产品的一部分，因此虽然你显然可以随心所欲地安装它们，但它们是客户自行管理的。


    大数据集群只能在 Linux 上运行（请花点时间好好想想这一点！），并且只能部署在 Kubernetes 集群中。虽然本书到目前为止我们向你展示了将应用程序部署到
    Kubernetes 作为 Windows 服务器上经典部署的现代替代方案的方法，但到了这里，你没有选择如何部署它的余地。并且，由于这是继上一章介绍的 Arc
    启用数据服务之后的第二个示例，希望这也是你（如果你还没有意识到的话）看到 Kubernetes 如何成为部署现代数据应用程序的平台，以及为什么将其作为你未来技能组合的一部分如此重要的时刻。


    SQL Server 2019 大数据集群本质上是 SQL Server、Apache Spark 和 HDFS 在 Kubernetes 环境中的组合。它们不是单一功能，而是一个功能集。图
    10-1 将此功能集的不同部分分类到不同的组中，以帮助你更好地理解所提供的内容。总体思路是，通过虚拟化和横向扩展，SQL Server 2019 成为你所有数据的数据中心，即使这些数据并不物理存储在
    SQL Server 中。


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig1_HTML.jpg](img/494804_1_En_10_Fig1_HTML.jpg)


    图 10-1


    SQL Server 2019 大数据集群功能概览


    从左到右展示了大数据集群的主要方面。你拥有对数据虚拟化的支持，然后是一个托管数据平台，最后一个人工智能（AI）平台。


    让我们更深入地看看它们。


    ### 数据虚拟化


    数据虚拟化将数据引入 SQL Server，而这些数据并不物理存储在 SQL Server 中。这是通过 PolyBase 实现的。PolyBase 最初在
    SQL Server 2016 中引入，引入了 `外部表` 的概念。虽然 PolyBase 最初只支持基于文件的源，但现在已大大增强，支持其他源，如 Oracle、SQL
    Server、Teradata、MongoDB 以及无数其他源。这允许你创建一个表，例如 `dbo.Customers`，并像查询本地表一样查询它，但它的数据实际上存储在例如
    Azure SQL Database 中。虽然这可能让你联想到链接服务器，但 PolyBase 外部表不需要使用令人头疼的三段式命名法（`Servername.databasename.schemaname.tablename`）并且对它们的查询是多线程的，这些事实只显示了它们相对于链接服务器的一些优势。


    外部表没有缓存，因此对它们的每一次查询都会实时访问底层源，这是你在通过 PolyBase 从头构建数据仓库之前应该考虑的因素——考虑延迟和工作负载问题![../images/494804_1_En_10_Chapter/494804_1_En_10_Figa_HTML.gif](img/494804_1_En_10_Figa_HTML.gif)。


    ### 托管数据平台


    在大数据集群的托管数据平台中，你基本上有两个选项：你可以将单个 SQL Server 表横向扩展到多个 SQL Server 实例——因此，除了将它们分布在文件或文件组上之外，它们被物理地推送到单独的实例中。或者，你可以存储和消费基于文件的数据，如
    `CSV` 或 `Parquet` 文件（如果你不熟悉 Parquet，可以将其视为平面文件的 `聚集列存储索引`）。这些文件将再次通过 SQL Server
    中的外部表公开和访问，使你可能运行一个看起来只消耗 SQL Server 数据的查询，但实际上它结合了来自 CSV 的数据、Oracle 实例中的表、一个横向扩展到其他几个
    SQL Server 上的大型事实表……你明白这个意思了。


    ### AI 和应用程序平台


    大数据集群允许你部署应用程序，例如，可以是 SSIS 包或 R 或 Python 应用程序。这些应用程序随后可以通过 REST API 公开，并从大数据集群内部以及外部访问。因此，你的大数据集群同时成为你的数据库、文件服务器和应用程序服务器，都在一个单一的部署中，而无需担心这些组件和池之间的连接性。


    ## BDC 架构


    大数据集群可以分为四个逻辑层。将它们视为执行集群内特定功能的各种基础设施和管理部分的集合。每个区域又执行一个或多个角色。例如，在数据层内部，有两个角色：存储池和
    SQL 数据池。


    图 10-2 展示了四个逻辑区域以及各区域包含的各种角色的概览。


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig2_HTML.jpg](img/494804_1_En_10_Fig2_HTML.jpg)


    图 10-2


    大数据集群架构


    你可以立即推断出四个逻辑层：控制层（内部命名为控制平面——就像 Kubernetes 本身也有另一个控制平面一样）以及计算、数据和应用区域。


    ### 大数据集群组件


    让我们更深入地了解一下大数据集群的组件。


    #### BDC 控制平面


    控制平面——不要与 Kubernetes 控制平面混淆——是每个 BDC 部署的核心。它结合了 Grafana 和 Kibana 监控仪表板等功能，以及控制服务和配置存储等关键功能。虽然你可能除了仪表板之外永远不会与这些组件中的任何一个交互，但没有它们，你的
    BDC 根本无法做任何事情。


    #### SQL Server 主实例


    你可能已经注意到图 10-2 中显示了一个额外或几乎是独立的角色，SQL Server 主实例。


    SQL Server 主实例是一个部署在 Linux 上的 SQL Server，充当你大数据集群的入口点。它通过 Azure Data Studio 或其他工具（如
    SQL Server Management Studio）提供外部连接端点。


    #### 计算池


    计算池由一个或多个 Linux 上的 SQL Server 实例组成，允许你通过 PolyBase 以分布式方式访问各种数据源。例如，计算池可以访问大数据集群本身
    HDFS 中存储的数据，或者通过任何 PolyBase 连接器（如 Oracle 或 MongoDB）访问数据。


    计算池的主要优势在于，它提供了将查询分布或横向扩展到每个计算池内多个节点的选项，从而提升了 PolyBase 查询的性能。


    每个 BDC 部署至少会有一个 SQL 实例作为计算池的一部分。你永远不会直接与它们交互——可能除了调试目的——它们将只是透明地成为你在整个集群中执行查询的一部分。

    '
- fmt: '### Storage Pool


    The storage pool provides you an HDFS Cluster with Apache Spark and SQL Server
    endpoints. Just like with the Compute Pool, every BDC has at least one instance
    as part of its Storage Pool, but you can also decide for more, depending on your
    workloads and use cases. This means that every Big Data Cluster comes with its
    own HDFS and therefore is able to self-host any file-based data you may need to
    consume within your cluster. If you already have an HDFS store in, for example,
    Azure Data Lake Store (ADLS), you can also add this as a mountpoint through so-called
    tiering. Your ADLS would in this case just become a folder within your storage
    pool.


    ### Data Pool


    The data pool on the other hand provides you multiple SQL Server on Linux Pods/instances
    that can – again through the concept of an external table – be used to scale out
    single tables across them. In theory, you could also deploy your data pool with
    just one single instance like all the other pools. This only makes sense in a
    scenario, though, where you’re not going to make use of the data pool as you obviously
    can’t scale out a table with just a single instance. You can think of a scaled-out
    table on the data pool like a `UNION ALL` – you run a single query against a table
    and get the result of multiple physical tables. The data pool only supports `INSERT`
    and `TRUNCATE` operations and is not transaction aware, so do not consider this
    your primary data store but rather a cache for SQL Server data.


    ### Application Pool


    The last component is the application pool. It allows you to deploy MLeap, R,
    Python, or SSIS solutions to it through Azure Data Studio, Visual Studio Code,
    or the command line using `azdata`. Those applications can then be consumed either
    interactively, through a `REST API`, or based on a schedule.


    ### Kubernetes Constructs in BDC


    Every BDC will be deployed to its own namespace, which is by default `mssql-cluster`,
    within a Kubernetes cluster. The different components within a BDC are represented
    by individual pods. Within the different pools, every instance of the data pool,
    for example, will be represented by its own pod. The output of a list of pods
    within a BDC, retrieved through `kubectl`, can be seen in Figure [10-3](#494804_1_En_10_Chapter.xhtml#Fig3).


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig3_HTML.jpg](images/494804_1_En_10_Chapter/494804_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Output of `kubectl get pods` in a BDC namespace


    In this example, we can see that this specific deployment consists of two instances
    each in the data and storage pools vs. one instance each in the app and compute
    pools and one or more pods of each of the other components like the `metricsdb`,
    `metricsdc`, and `metricsui` pods, which, for example, represent the Grafana dashboard.
    As you can probably tell by now, with us deploying Grafana and Kibana in Chapter
    [8](#494804_1_En_8_Chapter.xhtml), them being shipped with Azure Arc–enabled Data
    Services as showcased in Chapter [9](#494804_1_En_9_Chapter.xhtml), and them now
    resurfacing yet again, they have become the de facto standard for monitoring and
    log management in the SQL Server on Kubernetes world.


    The BDC’s endpoints are exposed in Kubernetes through services. Depending on the
    platform, those will either be of type `NodePort` or `LoadBalancer`, as we can
    see in our example in Figure [10-4](#494804_1_En_10_Chapter.xhtml#Fig4).


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig4_HTML.jpg](images/494804_1_En_10_Chapter/494804_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Output of `kubectl get services | grep NodePort` in a BDC namespace


    In addition to these services, it also exposes a number of `ClusterIP` services
    to allow the services to communicate with each other.


    It also creates numerous different sets – DaemonSets, ReplicaSets, and StatefulSets.
    If we list them using `kubectl get all -n mssql-cluster`, they all show up in
    the lower part of the output (Figure [10-5](#494804_1_En_10_Chapter.xhtml#Fig5)).


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig5_HTML.jpg](images/494804_1_En_10_Chapter/494804_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Kubernetes sets in a Big Data Cluster


    Storage in a BDC is addressed through storage classes and dynamic provisioning
    within these. As you can see in Figure [10-6](#494804_1_En_10_Chapter.xhtml#Fig6),
    Big Data Clusters will create dynamic persistent volume claims (and the underlying
    volumes) as needed.


    ![../images/494804_1_En_10_Chapter/494804_1_En_10_Fig6_HTML.jpg](images/494804_1_En_10_Chapter/494804_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    PVCs in a Big Data Cluster


    As you can see, a Big Data Cluster is really bringing everything together that
    we’ve touched so far from Kubernetes objects over monitoring to, of course, SQL
    Server.'
