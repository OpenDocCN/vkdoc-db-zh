    Kubernetes 中还有更多控制器可用。本书重点关注 `Deployment`、`ReplicaSet` 和 `StatefulSet`，以及如何使用它们在
    Kubernetes 上部署 SQL Server。Kubernetes 中有许多控制器可用于构建不同类型的应用工作负载。有关不同控制器类型及其功能的更多信息，请查阅
    Kubernetes 文档：[`https://kubernetes.io/docs/concepts/workloads/`](https://kubernetes.io/docs/concepts/workloads/)。


