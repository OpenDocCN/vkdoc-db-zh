  raw: '## Deployment


    Just like Azure Arc–enabled Data Services, Big Data Clusters are being deployed
    through azdata, and the process can – again – be run from the command line or
    from Azure Data Studio, which will create a notebook that would then run azdata
    in the background.


    Deploying a BDC requires a working Kubernetes cluster in place, which can be running
    on kubeadm, AKS, EKS, or OpenShift.


    To deploy your BDC, you will change your Kubernetes context to the desired target
    cluster and create a configuration using the code in Listing [10-1](#494804_1_En_10_Chapter.xhtml#PC1).


    ```

    azdata bdc config init [--path] [--source -s]

    Listing 10-1

    Create a BDC configuration

    ```


    *Path* is just the folder name where the configuration files for your BDC (*bdc.json*
    and *control.json*) will be created at by the command in Listing [10-1](#494804_1_En_10_Chapter.xhtml#PC1).
    The *src* is one of the existing base templates to start with like *aks-dev-test*
    or *kubeadm-prod*.


    A full command to create a Big Data Cluster configuration in a subfolder called
    *myBDC* that is supposed to be deployed on AKS using a typical development/test
    environment would be, for example, as shown in Listing [10-2](#494804_1_En_10_Chapter.xhtml#PC2).


    ```

    azdata bdc config init --path myBDC –-source aks-dev-test

    Listing 10-2

    Create a BDC configuration

    ```


    Those files will be used to configure everything around your deployment from a
    potential integration of your Big Data Cluster into your Active Directory for
    AD authentication over the number of replicas within each pool to the memory and
    storage requirements. An example of one of these two files, bdc.json, can be seen
    in Listing [10-3](#494804_1_En_10_Chapter.xhtml#PC3).


    ```

