  trans: '

    ### 暴露类型为 ClusterIP 的服务


    如果你运行代码清单 5-26 中的命令，这将创建一个在端口 80 上暴露的服务，同时目标端口也是 80（因为这是`nginx`的默认端口）。


    ```

    kubectl expose deployment nginx --port=80 --target-port=80

    代码清单 5-26

    将 nginx 部署暴露为 ClusterIP 服务

    ```


    `port` 定义了服务监听的端口，而 `target port` 是容器内应用程序监听的端口。由于我们没有提供任何其他选项，该服务的类型将为 `ClusterIP`，这是默认的服务类型。我们可以通过运行代码清单
    5-27 中的命令来查看这一点。


    ```

    kubectl get service nginx

    代码清单 5-27

    获取服务详情

    ```


    如图 5-10 所示，这里还显示了该服务运行的 IP 地址。


    ![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig10_HTML.jpg](img/494804_1_En_5_Fig10_HTML.jpg)

    *图 5-10: `kubectl get service nginx` 的输出*


    虽然所有这些命令都是命令式的——正如我们之前提到的，这在测试中是可以的，但通常应使用`YAML`清单——你也可以通过添加`--dry-run`开关来修改命令，以生成一个`YAML`清单，然后如代码清单
    5-28 所示，将其应用到你的集群中。


    ```

    kubectl expose deployment nginx --port=80 --target-port=80

    --dry-run=client -o yaml

    代码清单 5-28

    创建清单以将 nginx 部署暴露为 ClusterIP 服务

    ```


    顺便说一下，如果你只想获取`ClusterIP`，这是输出格式`jsonpath`的完美用例，如代码清单 5-29 所示。当需要在自动化脚本中将此值存储到变量中时，这尤其有用。


    ```

    kubectl get service nginx -o jsonpath=''{ .spec.clusterIP }''

    代码清单 5-29

    仅通过 kubectl 检索 ClusterIP

    ```


    我们现在可以访问这个服务，例如，通过运行代码清单 5-30 中的`curl`请求（确保将 IP 地址更改为你集群中服务的`ClusterIP`）。


    ```

    curl http://10.109.180.180/

    代码清单 5-30

    访问 ClusterIP 服务

    ```


    正如我们在第 3 章详细阐述的，`ClusterIP`服务可以从集群内的任何节点和 Pod 访问，但无法从外部访问。根据你的应用场景，这可能足够，也可能不够。让我们假设你希望确保你的服务可以从集群外部访问。


    首先，使用代码清单 5-31 中的命令删除现有的服务。


    ```

    kubectl delete service nginx

    代码清单 5-31

    删除 nginx 服务

    ```


    ### 暴露类型为 NodePort 的服务


    如果你想暴露一个服务，使其也能从不属于你的 Kubernetes 集群的机器访问，我们需要将该服务作为`NodePort`类型暴露。


    为此，我们只需添加`--type`开关，如代码清单 5-32 所示。


    ```

    kubectl expose deployment nginx --port=80 --target-port=80 --type=NodePort

    代码清单 5-32

    将 nginx 部署暴露为 NodePort 服务

    ```


    让我们使用代码清单 5-33 中的命令查看此服务。


    ```

    kubectl get service nginx

    代码清单 5-33

    获取服务详情

    ```


    如图 5-11 所示，该服务现在显示类型为`NodePort`，并且也显示了我们服务部署时使用的（动态）端口。


    ![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig11_HTML.jpg](img/494804_1_En_5_Fig11_HTML.jpg)

    *图 5-11: `kubectl get service nginx` 的输出*


    此端口在服务的生命周期内不会改变。但是，如果你删除并再次暴露它，它很可能会显示一个不同的端口。


    就像上一个例子中的`ClusterIP`一样，我们可以使用`jsonpath`来仅检索`NodePort`，如代码清单 5-34 所示。


    ```

    kubectl get service nginx -o jsonpath=''{ .spec.ports[*].nodePort }''

    代码清单 5-34

    仅通过 kubectl 检索 nodePort

    ```


    类型为`NodePort`的服务可以在 Kubernetes 集群的任何节点上访问。在我们的示例中，代码清单 5-35 所示的请求可能最终到达我们部署的不同副本，但都会产生相同的输出。


    ```

    curl http://control:31260

    curl http://node1:31260

    curl http://node2:31260

    curl http://node3:31260

    代码清单 5-35

    访问 NodePort 服务

    ```


    ### 暴露类型为 LoadBalancer 的服务


    如果你的 Kubernetes 运行在例如 Azure Kubernetes Service 上，你需要使用`LoadBalancer`类型来暴露服务，这将为你提供一个外部
    IP 地址来访问该服务。这只适用于云场景或具有 Kubernetes 集成负载均衡器的本地场景。


    让我们从暴露部署开始，如代码清单 5-36 所示。


    ```

    kubectl expose deployment nginx --port=80 --target-port=80 --type=LoadBalancer

    代码清单 5-36

    将 nginx 部署暴露为 LoadBalancer 服务

    ```


    然后，我们可以再次获取完整的服务详情或仅获取服务 IP 地址，如代码清单 5-37 所示。


    ```

    kubectl get service nginx

    kubectl get service nginx -o jsonpath=''{.status.loadBalancer.ingress[0].ip }''

    代码清单 5-37

    获取服务详情

    ```


    使用此服务 IP 地址，我们就可以从外部客户端访问我们的部署了。


    ## 总结


    在本章中，我们介绍了使用`kubectl`与 Kubernetes 集群交互的不同方式，以从中获取所有不同类型的信息。我们还研究了如何使用命令式和声明式部署方法来部署和访问应用程序。让我们继续下一章，了解更多关于
    Kubernetes 集群中存储的知识！


    # 6. 在 Kubernetes 中存储持久数据


    在本章中，我们将深入探讨基于容器的应用程序对数据持久性的需求，以及容器持久化数据的内部原理。我们将介绍 Kubernetes 中的核心存储概念，例如 Kubernetes
    如何使用`Volumes`、`Persistent Volumes`和`Persistent Volume Claims`来存储数据，如何配置存储，以及 Kubernetes
    如何控制对该存储的访问。我们将研究静态和动态配置场景，特别是使用我们实验室环境中的`NFS`和 Azure Kubernetes Service。

    '
- fmt: "## The Need for Data Persistency in Container-Based Applications\n\nAs you\
    \ learned in Chapter [2](#494804_1_En_2_Chapter.xhtml), container images are read-only.\
    \ When data is created or changed inside a container, the data is written into\
    \ the writeable layer. The container runtime brings together both the container\
    \ image and the writeable layer into a single file system seen by the applications\
    \ running inside the container. When a container is deleted, both the container\
    \ and its writable layer are removed, and the data inside that writeable layer\
    \ is gone for good. Not the best place for persistent data, like database data.\
    \ As highlighted in Figure [6-1](#494804_1_En_6_Chapter.xhtml#Fig1), the writeable\
    \ layer has the lifecycle of the container.\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig1_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig1_HTML.jpg)\n\
    *Figure 6-1. Containers write data into the writable layer, which has the same\
    \ lifecycle as the container. When the container is removed, the data in the writeable\
    \ layer is also removed.*\n\nSo the question is, how can you store persistent\
    \ data in a container independent of the container’s lifecycle? That’s where Volumes\
    \ come in. Volumes allow you to attach storage to a container, and any data created\
    \ or changed is written into this Volume. The Volume has a lifecycle independent\
    \ of the container, and Volumes are the persistent storage model used by container\
    \ runtimes. Figure [6-2](#494804_1_En_6_Chapter.xhtml#Fig2) highlights how a Volume\
    \ is mounted into a file system giving the container persistent storage independent\
    \ of the container’s lifecycle.\n\nThis chapter extends that model into Kubernetes,\
    \ and you will learn how Kubernetes provides storage to stateful applications\
    \ running inside of Pods, which is independent of the Pod lifecycle.\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig2_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig2_HTML.jpg)\n\
    *Figure 6-2. Volumes allow containers to persist data independent of the lifecycle\
    \ of the container. When the container is removed, the data in the Volume remains\
    \ and can be attached to new and other containers.*\n\n## Storage in Kubernetes\n\
    \nTo deploy a stateful application in Kubernetes, there are a few core functions\
    \ that the Kubernetes cluster must implement. First, the Cluster needs to provision\
    \ and attach storage to a Pod as a Volume for an application. Next, depending\
    \ on the application architecture, the Cluster needs to control access to that\
    \ storage for both security and application compatibility. The Kubernetes API\
    \ exposes several objects that enable the provisioning, configuration, and access\
    \ control needed to deploy stateful applications. The following is a list of the\
    \ API Objects used by Kubernetes to support stateful applications:\n\n*   **Volumes:**\
    \ Part of the Pod Spec, the Volume is a storage that can be mounted by containers\
    \ running in a Pod.\n*   **Persistent Volume:** Storage in the Cluster defined\
    \ and configured by an administrator or dynamically provisioned by a Storage Class.\n\
    *   **Persistent Volume Claim:** A request for storage by a user in a manifest.\n\
    *   **Storage Class:** A way for cluster administrators to define classes (or\
    \ groups) of storage available for provisioning in the Cluster. Storage Classes\
    \ can facilitate dynamic provisioning, which creates Persistent Volume on demand\
    \ to satisfy user requests for storage made via Persistent Volume Claims.\n\n\
    Let’s now look more closely at each of these API Objects and how they enable you\
    \ to deploy stateful applications in Kubernetes.\n\n## Volumes\n\nA Volume is\
    \ a storage resource exposed by the Node, mounted inside the Pod. It is a directory\
    \ or block device on the Node that is accessible inside the container(s) running\
    \ in the Pod. A Volume can be mounted by more than one container in a Pod, enabling\
    \ sharing data between containers in a Pod. Defined as part of the Pod in the\
    \ Spec, the Volume has a lifecycle independent of the container but dependent\
    \ on the Pod, which means when a Pod is deleted, the access to the Volume is removed\
    \ as well. However, the data on the Volume is not destroyed and is available to\
    \ be attached to new Pods.\n\nThere are many types of Volumes available in Kubernetes.\
    \ Each type of Volume will require unique configuration based on the kind of storage\
    \ being allocated. In the following, you will find a collection of commonly used\
    \ Volume types in Kubernetes. When working with Volumes, each Volume type has\
    \ unique configuration attributes:\n\n*   **hostPath:** A mounted directory on\
    \ the Node’s file system in the Pod.\n*   **Local:** A mounted storage device\
    \ on a Node.\n*   **NFS:** Mount an existing NFS export into a Pod.\n*   **Fiber\
    \ Channel and iSCSI:** Block access to remote storage available via a storage\
    \ network.\n*   **Cloud storage:** Access to remote storage block devices and\
    \ file services for each of the major cloud providers:\n    *   AWS Elastic Block\
    \ Store\n    *   Azure Disk\n    *   Azure Files\n    *   GCE Persistent Disk\n\
    *   **Secrets and ConfigMaps:** Expose cluster API Objects containing configuration\
    \ data into Pods.\n*   **Persistent Volume Claim:** A request for access to storage\
    \ in the Cluster.\n\nFor a complete list, please see [*https://kubernetes.io/docs/concepts/storage/volumes/*](https://kubernetes.io/docs/concepts/storage/volumes/).\n\
    \nFor Volume types like NFS, Fiber Channel, and even cloud storage, they require\
    \ infrastructure-specific configuration elements. For example, when working with\
    \ NFS, you will need to define the network location of the NFS server and the\
    \ export you want to access. And when working with cloud storage, you will need\
    \ to define a unique identifier such as a resource ID or volume ID for the virtual\
    \ disk you want to access. Having infrastructure-specific configuration in Pod\
    \ Specs means it can be challenging to move that code between Kubernetes Clusters\
    \ since you will need to change the Pod Spec to match the storage environment\
    \ of the target Kubernetes cluster. This increases the risk of errors and reduces\
    \ the portability of the code. Persistent Volume Claims help solve this challenge.\
    \ We will learn more about Persistent Volume Claims later in this chapter.\n\n\
    First, let’s look at how to configure a Volume in a Pod. In the following example,\
    \ we have defined a Pod running `nginx`. That Pod also has a Volume defined. That\
    \ Volume is an NFS Volume with access to the file system on the storage server\
    \ in our lab environment. In this example, the NFS client needs additional configuration\
    \ parameters, which are the network location of the NFS server and the path that\
    \ is the export on the NFS server we want to mount. It is important to call out\
    \ that the Volumes are defined at the Pod level and are available to be mounted\
    \ into any containers running in the Pod. In a Pod, you use the `volumeMounts`\
    \ field to attach a Volume into the container. In Listing [6-1](#494804_1_En_6_Chapter.xhtml#PC1),\
    \ you can see the Volume name `webcontent` mounted into the file system using\
    \ the `mountPath` field at the location `/usr/share/nginx/html/web-app`.\n\n```yaml\n\
    apiVersion: v1\nkind: Pod\nmetadata:\n  name: nginx-pod\nspec:\n  containers:\n\
    \  - name: nginx\n    image: nginx\n    ports:\n    - containerPort: 80\n    volumeMounts:\n\
    \    - name: webcontent\n      mountPath: \"/usr/share/nginx/html/web-app\"\n\
    \  volumes:\n  - name: webcontent\n    nfs:\n      server: 172.16.94.5\n     \
    \ path: \"/srv/exports/volumes/webcontent\"\n```\n*Listing 6-1. Using a Volume\
    \ in a Pod Spec (volume.yaml)*"
  raw: "## The Need for Data Persistency in Container-Based Applications\n\nAs you\
    \ learned in Chapter [2](#494804_1_En_2_Chapter.xhtml), container images are read-only.\
    \ When data is created or changed inside a container, the data is written into\
    \ the writeable layer. The container runtime brings together both the container\
    \ image and the writeable layer into a single file system seen by the applications\
    \ running inside the container. When a container is deleted, both the container\
    \ and its writable layer are removed, and the data inside that writeable layer\
    \ is gone for good. Not the best place for persistent data, like database data.\
    \ As highlighted in Figure [6-1](#494804_1_En_6_Chapter.xhtml#Fig1), the writeable\
    \ layer has the lifecycle of the container.\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig1_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nContainers write data into the writable layer, which has the same\
    \ lifecycle as the container. When the container is removed, the data in the writeable\
    \ layer is also removed\n\nSo the question is, how can you store persistent data\
    \ in a container independent of the container’s lifecycle? That’s where Volumes\
    \ come in. Volumes allow you to attach storage to a container, and any data created\
    \ or changed is written into this Volume. The Volume has a lifecycle independent\
    \ of the container, and Volumes are the persistent storage model used by container\
    \ runtimes. Figure [6-2](#494804_1_En_6_Chapter.xhtml#Fig2) highlights how a Volume\
    \ is mounted into a file system giving the container persistent storage independent\
    \ of the container’s lifecycle.\n\nThis chapter extends that model into Kubernetes,\
    \ and you will learn how Kubernetes provides storage to stateful applications\
    \ running inside of Pods, which is independent of the Pod lifecycle.\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig2_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nVolumes allow containers to persist data independent of the lifecycle\
    \ of the container. When the container is removed, the data in the Volume remains\
    \ and can be attached to new and other containers\n\n## Storage in Kubernetes\n\
    \nTo deploy a stateful application in Kubernetes, there are a few core functions\
    \ that the Kubernetes cluster must implement. First, the Cluster needs to provision\
    \ and attach storage to a Pod as a Volume for an application. Next, depending\
    \ on the application architecture, the Cluster needs to control access to that\
    \ storage for both security and application compatibility. The Kubernetes API\
    \ exposes several objects that enable the provisioning, configuration, and access\
    \ control needed to deploy stateful applications. The following is a list of the\
    \ API Objects used by Kubernetes to support stateful applications:\n\n*   **Volumes:**\
    \ Part of the Pod Spec, the Volume is a storage that can be mounted by containers\
    \ running in a Pod.\n\n*   **Persistent Volume:** Storage in the Cluster defined\
    \ and configured by an administrator or dynamically provisioned by a Storage Class.\n\
    \n*   **Persistent Volume Claim:** A request for storage by a user in a manifest.\n\
    \n*   **Storage Class:** A way for cluster administrators to define classes (or\
    \ groups) of storage available for provisioning in the Cluster. Storage Classes\
    \ can facilitate dynamic provisioning, which creates Persistent Volume on demand\
    \ to satisfy user requests for storage made via Persistent Volume Claims.\n\n\
    Let’s now look more closely at each of these API Objects and how they enable you\
    \ to deploy stateful applications in Kubernetes.\n\n## Volumes\n\nA Volume is\
    \ a storage resource exposed by the Node, mounted inside the Pod. It is a directory\
    \ or block device on the Node that is accessible inside the container(s) running\
    \ in the Pod. A Volume can be mounted by more than one container in a Pod, enabling\
    \ sharing data between containers in a Pod. Defined as part of the Pod in the\
    \ Spec, the Volume has a lifecycle independent of the container but dependent\
    \ on the Pod, which means when a Pod is deleted, the access to the Volume is removed\
    \ as well. However, the data on the Volume is not destroyed and is available to\
    \ be attached to new Pods.\n\nThere are many types of Volumes available in Kubernetes.\
    \ Each type of Volume will require unique configuration based on the kind of storage\
    \ being allocated. In the following, you will find a collection of commonly used\
    \ Volume types in Kubernetes. When working with Volumes, each Volume type has\
    \ unique configuration attributes:\n\n*   **hostPath:** A mounted directory on\
    \ the Node’s file system in the Pod.\n\n*   **Local:** A mounted storage device\
    \ on a Node.\n\n*   **NFS:** Mount an existing NFS export into a Pod.\n\n*   **Fiber\
    \ Channel and iSCSI:** Block access to remote storage available via a storage\
    \ network.\n\n*   **Cloud storage:** Access to remote storage block devices and\
    \ file services for each of the major cloud providers:\n    *   AWS Elastic Block\
    \ Store\n\n*   Azure Disk\n\n*   Azure Files\n\n*   GCE Persistent Disk\n\n* \
    \  **Secrets and ConfigMaps:** Expose cluster API Objects containing configuration\
    \ data into Pods.\n\n*   **Persistent Volume Claim:** A request for access to\
    \ storage in the Cluster.\n\nFor a complete list, please see [*https://kubernetes.io/docs/concepts/storage/\
    \ volumes/*](https://kubernetes.io/docs/concepts/%2520storage/volumes/).\n\nFor\
    \ Volume types like NFS, Fiber Channel, and even cloud storage, they require infrastructure-specific\
    \ configuration elements. For example, when working with NFS, you will need to\
    \ define the network location of the NFS server and the export you want to access.\
    \ And when working with cloud storage, you will need to define a unique identifier\
    \ such as a resource ID or volume ID for the virtual disk you want to access.\
    \ Having infrastructure-specific configuration in Pod Specs means it can be challenging\
    \ to move that code between Kubernetes Clusters since you will need to change\
    \ the Pod Spec to match the storage environment of the target Kubernetes cluster.\
    \ This increases the risk of errors and reduces the portability of the code. Persistent\
    \ Volume Claims help solve this challenge. We will learn more about Persistent\
    \ Volume Claims later in this chapter.\n\nFirst, let’s look at how to configure\
    \ a Volume in a Pod. In the following example, we have defined a Pod running *nginx*.\
    \ That Pod also has a Volume defined. That Volume is an NFS Volume with access\
    \ to the file system on the storage server in our lab environment. In this example,\
    \ the NFS client needs additional configuration parameters, which are the network\
    \ location of the NFS server and the path that is the export on the NFS server\
    \ we want to mount. It is important to call out that the Volumes are defined at\
    \ the Pod level and are available to be mounted into any containers running in\
    \ the Pod. In a Pod, you use the *volumeMounts* field to attach a Volume into\
    \ the container. In Listing [6-1](#494804_1_En_6_Chapter.xhtml#PC1), you can see\
    \ the Volume name webcontent mounted into the file system using the *mountPath*\
    \ field at the location `/usr/share/nginx/html/web-app`.\n\n```\napiVersion: v1\n\
    kind: Pod\nmetadata:\nname: nginx-pod\nspec:\ncontainers:\n- name: nginx\nimage:\
    \ nginx\nports:\n- containerPort: 80\nvolumeMounts:\n- name: webcontent\nmountPath:\
    \ \"/usr/share/nginx/html/web-app\"\nvolumes:\n- name: webcontent\nnfs:\nserver:\
    \ 172.16.94.5\npath: \"/srv/exports/volumes/webcontent\"\nListing 6-1\nUsing a\
    \ Volume in a Pod Spec (volume.yaml)\n```"
  trans: "\n## 基于容器的应用程序中数据持久性的必要性\n\n正如你在第 2 章所学，容器镜像是只读的。当在容器内创建或更改数据时，数据会被写入可写层。容器运行时会将容器镜像和可写层整合到一个文件系统中，供容器内部运行的应用程序使用。当容器被删除时，容器及其可写层都会被移除，该可写层内的数据也随之永久丢失。这并非存储持久性数据（如数据库数据）的最佳位置。如图\
    \ 6-1 所示，可写层的生命周期与容器相同。\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig1_HTML.jpg](img/494804_1_En_6_Fig1_HTML.jpg)\n\
    *图 6-1. 容器将数据写入可写层，该层的生命周期与容器相同。当容器被移除时，可写层中的数据也会被移除。*\n\n那么问题来了，如何才能在容器中存储独立于其生命周期的持久性数据？这就是卷的用武之地。卷允许你将存储附加到容器，任何创建或更改的数据都会写入此卷。卷的生命周期独立于容器，是容器运行时使用的持久化存储模型。图\
    \ 6-2 突出展示了卷如何挂载到文件系统中，为容器提供独立于其生命周期的持久化存储。\n\n本章将把该模型扩展到 Kubernetes 中，你将学习 Kubernetes\
    \ 如何为在 Pod 内运行的有状态应用提供独立于 Pod 生命周期的存储。\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig2_HTML.jpg](img/494804_1_En_6_Fig2_HTML.jpg)\n\
    *图 6-2. 卷使容器能够持久化数据，独立于容器生命周期。当容器被移除时，卷中的数据依然保留，并且可以挂接到新的或其他容器上。*\n\n## Kubernetes\
    \ 中的存储\n\n要在 Kubernetes 中部署有状态应用，集群必须实现一些核心功能。首先，集群需要为 Pod 配置并附加存储作为应用的卷。其次，根据应用架构，集群需要控制对该存储的访问，以确保安全和应用兼容性。Kubernetes\
    \ API 暴露了多个对象，支持部署有状态应用所需的配置、配置和访问控制。以下是 Kubernetes 用于支持有状态应用的 API 对象列表：\n\n*\
    \   **卷：** 作为 Pod 规范的一部分，卷是一种可以被 Pod 中运行的容器挂载的存储。\n*   **持久卷：** 集群中由管理员定义和配置的存储，或由存储类动态配置的存储。\n\
    *   **持久卷声明：** 用户在清单中对存储的请求。\n*   **存储类：** 集群管理员定义集群中可用于配置的存储类别（或组）的一种方式。存储类可以促进动态配置，即根据需要创建持久卷，以满足用户通过持久卷声明提出的存储请求。\n\
    \n现在，让我们更仔细地看看每一个 API 对象，以及它们如何使你能够在 Kubernetes 中部署有状态应用。\n\n## 卷\n\n卷是节点暴露的存储资源，挂载在\
    \ Pod 内部。它是节点上的一个目录或块设备，可在 Pod 中运行的容器内部访问。一个卷可以被 Pod 中的多个容器挂载，从而实现 Pod 内容器之间的数据共享。作为\
    \ Pod 规范的一部分定义，卷的生命周期独立于容器，但依赖于 Pod，这意味着当 Pod 被删除时，对卷的访问也会被移除。但是，卷上的数据不会被销毁，可供挂接到新的\
    \ Pod。\n\nKubernetes 中有许多类型的卷可用。每种卷类型都需要根据所分配存储的种类进行独特的配置。下面列出了 Kubernetes 中常用的一些卷类型。使用卷时，每种卷类型都有其独特的配置属性：\n\
    \n*   **hostPath：** Pod 中节点文件系统上的挂载目录。\n*   **Local：** 节点上的挂载存储设备。\n*   **NFS：**\
    \ 将现有的 NFS 导出挂载到 Pod 中。\n*   **光纤通道和 iSCSI：** 通过存储网络访问远程存储的块设备。\n*   **云存储：**\
    \ 访问主要云提供商的远程存储块设备和文件服务：\n    *   AWS 弹性块存储\n    *   Azure 磁盘\n    *   Azure 文件\n\
    \    *   GCE 持久磁盘\n*   **Secret 和 ConfigMap：** 将包含配置数据的集群 API 对象暴露到 Pod 中。\n*\
    \   **持久卷声明：** 对集群中存储访问的请求。\n\n完整列表请参见 [*https://kubernetes.io/docs/concepts/storage/volumes/*](https://kubernetes.io/docs/concepts/storage/volumes/)。\n\
    \n对于 NFS、光纤通道甚至云存储等卷类型，它们需要特定于基础设施的配置元素。例如，使用 NFS 时，你需要定义 NFS 服务器的网络位置和要访问的导出路径。使用云存储时，你需要定义一个唯一标识符，例如你要访问的虚拟磁盘的资源\
    \ ID 或卷 ID。在 Pod 规范中包含特定于基础设施的配置意味着在 Kubernetes 集群之间移动该代码可能具有挑战性，因为你需要更改 Pod 规范以匹配目标\
    \ Kubernetes 集群的存储环境。这增加了错误风险并降低了代码的可移植性。持久卷声明有助于解决这一挑战。我们将在本章后面了解更多关于持久卷声明的内容。\n\
    \n首先，让我们看看如何在 Pod 中配置卷。在下面的示例中，我们定义了一个运行 `nginx` 的 Pod。该 Pod 还定义了一个卷。该卷是一个 NFS\
    \ 卷，用于访问我们实验室环境中存储服务器上的文件系统。在此示例中，NFS 客户端需要额外的配置参数，即 NFS 服务器的网络位置和我们要挂载的 NFS 服务器导出路径。重要的是要指出，卷是在\
    \ Pod 级别定义的，并且可供 Pod 中运行的任何容器挂载。在 Pod 中，你使用 `volumeMounts` 字段将卷附加到容器。在代码清单 6-1\
    \ 中，你可以看到卷名称 `webcontent` 通过 `mountPath` 字段挂载到文件系统位置 `/usr/share/nginx/html/web-app`。\n\
    \n```yaml\napiVersion: v1\nkind: Pod\nmetadata:\n  name: nginx-pod\nspec:\n  containers:\n\
    \  - name: nginx\n    image: nginx\n    ports:\n    - containerPort: 80\n    volumeMounts:\n\
    \    - name: webcontent\n      mountPath: \"/usr/share/nginx/html/web-app\"\n\
    \  volumes:\n  - name: webcontent\n    nfs:\n      server: 172.16.94.5\n     \
    \ path: \"/srv/exports/volumes/webcontent\"\n```\n*代码清单 6-1. 在 Pod 规范中使用卷 (volume.yaml)*\n"
- fmt: "On the Control Node, let’s get a Pod listing with the `-o wide` output modifier\
    \ to get the IP address of the Pod and use that Pod IP with `curl` to access `nginx`.\
    \ In Figure [6-3](#494804_1_En_6_Chapter.xhtml#Fig3), we are using `kubectl get\
    \ pods -o wide`, and in the output, you can see the `nginx` Pod running.\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig3_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3: Accessing `nginx` with the content stored on persistent storage\n\
    \nIn Figure [6-4](#494804_1_En_6_Chapter.xhtml#Fig4), you can see the persistent\
    \ storage mapping inside the Pod at `/user/share/nginx/html/web-app`.\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig4_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4: Viewing content stored on persistent storage inside the Pod\n\n\
    In Figure [6-5](#494804_1_En_6_Chapter.xhtml#Fig5), you can see where the content\
    \ is physically stored on the network. It is stored on the NFS server at `/srv/exports/volumes/webcontent`.\
    \ When this Pod is scheduled onto a Node in the Cluster, it is the responsibility\
    \ of the `kubelet` to attach the storage to the Node and expose it to the Pod.\n\
    \n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig5_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5: Viewing content stored on the NFS server\n\nVolumes provide a solution\
    \ for persistent storage in Kubernetes. However, as you saw in the code example,\
    \ there is infrastructure-specific code in the manifest. This means if you want\
    \ to use this code in another cluster, the manifest needs to be updated, which\
    \ increases the maintenance and decreases the portability of the code. The Kubernetes\
    \ designers and maintainers saw this issue and introduced a solution to that problem.\
    \ Back in the API Objects used by Kubernetes to support stateful applications,\
    \ there is a Volume type listed, `Persistent Volume Claim`. This Volume type enables\
    \ us to decouple the infrastructure-specific code into separate API Objects, the\
    \ `Persistent Volume` and `Persistent Volume Claim`. Let’s move forward and explore\
    \ those objects in more detail.\n\n## Persistent Volumes and Persistent Volume\
    \ Claims\n\nYou just learned how Volumes are used to expose storage to a Pod in\
    \ Kubernetes. But you also saw that having infrastructure-specific code inside\
    \ a Pod Spec increases maintenance and decreases the portability of your manifests.\
    \ Let’s look at how `Persistent Volumes` and `Persistent Volume Claims` can help\
    \ solve these challenges and move that infrastructure-specific code out of the\
    \ Pod Spec.\n\n### Persistent Volumes\n\nA `Persistent Volume` is an API resource\
    \ in Kubernetes defined by a cluster administrator or provisioned dynamically\
    \ by the Cluster using a `Storage Class`. A `Persistent Volume` has a lifecycle\
    \ independent of the Container and the Pod. Just like a Volume, each `Persistent\
    \ Volume` has a type that defines the type of storage you want to attach to Pods.\
    \ Now, rather than have the technical implementation details of your storage in\
    \ the Pod Spec, when you use a `Persistent Volume`, the `Persistent Volume` object\
    \ holds the implementation details of the storage attached to the Pod. Inside\
    \ the Pod Spec, there is a reference to a Storage API Object called a `Persistent\
    \ Volume Claim`. A `Persistent Volume Claim` is a request for the Cluster to map\
    \ a `Persistent Volume` to a Pod.\n\n`Persistent Volumes`, depending on their\
    \ type, either block or file system, are mounted or attached to the Node by the\
    \ `kubelet`. It is the responsibility of the container runtime to expose the mounted\
    \ or attached `Persistent Volume` to the containers inside the Pod. A `Persistent\
    \ Volume` is a non-namespaced resource in the Cluster, which means that it can\
    \ be shared across namespaces if needed.\n\n### Access Modes\n\nAccess Modes for\
    \ `Persistent Volumes` define the access pattern to the `Persistent Volume` object.\
    \ Each `Persistent Volume` has an Access Mode that describes the capabilities\
    \ of the underlying storage.\n\nThe following list details the Access Modes supported\
    \ in Kubernetes `Persistent Volumes` and `Persistent Volume Claims`:\n\n*   `ReadWriteOnce\
    \ (RWO):` Only one Node can access a `Persistent Volume` with read/write access.\n\
    *   `ReadWriteMany (RWX):` More than one Node can access a `Persistent Volume`\
    \ with read/write access.\n*   `ReadOnlyMany (ROX):` More than one Node can access\
    \ a `Persistent Volume` with read-only access.\n\nThe Access Mode chosen depends\
    \ on the application that will use the `Persistent Volume` and the underlying\
    \ `Persistent Volume` storage type. For example, an NFS export can support many\
    \ read/write clients due to the nature of NFS. However, like a virtual disk, a\
    \ block device usually only supports read-write access for one host since the\
    \ underlying virtual disk often cannot be attached to multiple hosts due to the\
    \ nature of virtual disks. On the application side, applications like SQL Server\
    \ can have only one process open a database file simultaneously, requiring `ReadWriteOnce`.\
    \ On the other hand, static files such as web content can be `ReadOnlyMany`, and\
    \ then the `Persistent Volume` can be attached to many Pods for scale-out access\
    \ to the content stored in the `Persistent Volume`.\n\nAccess Modes are Node level\
    \ rather than Pod level. So even if a `Persistent Volume` is `ReadWriteOnce`,\
    \ Pods running on the Node can potentially access the `Persistent Volume`. It\
    \ is up to the application being deployed and its configuration to ensure that\
    \ only one Pod is accessing the `Persistent Volume` at a point in time.\n\n###\
    \ Types of Persistent Volumes\n\nKubernetes supports a vast array of storage types\
    \ for `Persistent Volumes`. In the following list are the more common `Persistent\
    \ Volume` types we see in the field when working with stateful applications in\
    \ Kubernetes:\n\n*   `hostPath:` A mounted a directory on the Node’s file system\
    \ into the Pod.\n*   `Local:` A mounted storage device on a Node.\n*   `NFS:`\
    \ Mount an existing NFS export into a Pod.\n*   `Fiber Channel and iSCSI:` Block\
    \ access to remote storage available via a storage network.\n*   `Cloud storage:`\
    \ Access to remote storage block devices and file services for each of the major\
    \ cloud providers:\n    *   `awsElasticBlockStore`\n    *   `azureDisk`\n    *\
    \   `azureFiles`\n    *   `gcePersistentDisk`\n\nFor a complete list of `Persistent\
    \ Volume` types and configuration examples, check out [*https://kubernetes.io/docs/concepts/storage/persistent-volumes/*](https://kubernetes.io/docs/concepts/storage/persistent-volumes/).\n\
    \n### Defining a Persistent Volume\n\nLet’s look at the code needed to describe\
    \ a `Persistent Volume` (Listing [6-2](#494804_1_En_6_Chapter.xhtml#PC2)). In\
    \ the example, you can see we have defined size as 10GB in the field `spec.capacity.storage`\
    \ and have defined an Access Mode in `spec.accessModes` and have chosen `ReadWriteMany`.\
    \ So more than one Node in the Cluster can access this `Persistent Volume`. This\
    \ `Persistent Volume` is of type `nfs`, so you see the implementation details\
    \ for access to the NFS server and path. Each type of `Persistent Volume` has\
    \ unique configuration parameters. Check the previous link for the configuration\
    \ details for other types of `Persistent Volumes`.\n\n```yaml\napiVersion: v1\n\
    kind: PersistentVolume\nmetadata:\n  name: pv-nfs-data-static\nspec:\n  capacity:\n\
    \    storage: 10Gi\n  accessModes:\n    - ReadWriteMany\n  nfs:\n    server: 172.16.94.5\n\
    \    path: \"/srv/exports/volumes/webcontent\"\n```\n\nListing 6-2: Example `Persistent\
    \ Volume` (`pv.yaml`)"
  raw: "On the Control Node, let’s get a Pod listing with the `-o wide` output modifier\
    \ to get the IP address of the Pod and use that Pod IP with curl to access nginx.\
    \ In Figure [6-3](#494804_1_En_6_Chapter.xhtml#Fig3), we are using `kubectl get\
    \ pods -o wide,` and in the output, you can see the nginx Pod running.\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig3_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3\n\nAccessing nginx with the content stored on persistent storage\n\
    \nIn Figure [6-4](#494804_1_En_6_Chapter.xhtml#Fig4), you can see the persistent\
    \ storage mapping inside the Pod at `/user/share/nginx/html/web-app`.\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig4_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\n\nViewing content stored on persistent storage inside the Pod\n\n\
    In Figure [6-5](#494804_1_En_6_Chapter.xhtml#Fig5), you can see where the content\
    \ is physically stored on the network. It is stored on the NFS server at `/srv/exports/volumes/webcontent`.\
    \ When this Pod is scheduled onto a Node in the Cluster, it is the responsibility\
    \ of the kubelet to attach the storage to the Node and expose it to the Pod.\n\
    \n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig5_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5\n\nViewing content stored on the NFS server\n\nVolumes provide a\
    \ solution for persistent storage in Kubernetes. However, as you saw in the code\
    \ example, there is infrastructure-specific code in the manifest. This means if\
    \ you want to use this code in another cluster, the manifest needs to be updated,\
    \ which increases the maintenance and decreases the portability of the code. The\
    \ Kubernetes designers and maintainers saw this issue and introduced a solution\
    \ to that problem. Back in the API Objects used by Kubernetes to support stateful\
    \ applications, there is a Volume type listed, Persistent Volume Claim. This Volume\
    \ type enables us to decouple the infrastructure-specific code into separate API\
    \ Objects, the Persistent Volume and Persistent Volume Claim. Let’s move forward\
    \ and explore those objects in more detail.\n\n## Persistent Volumes and Persistent\
    \ Volume Claims\n\nYou just learned how Volumes are used to expose storage to\
    \ a Pod in Kubernetes. But you also saw that having infrastructure-specific code\
    \ inside a Pod Spec increases maintenance and decreases the portability of your\
    \ manifests. Let’s look at how Persistent Volumes and Persistent Volume Claims\
    \ can help solve these challenges and move that infrastructure-specific code out\
    \ of the Pod Spec.\n\n### Persistent Volumes\n\nA Persistent Volume is an API\
    \ resource in Kubernetes defined by a cluster administrator or provisioned dynamically\
    \ by the Cluster using a Storage Class. A Persistent Volume has a lifecycle independent\
    \ of the Container and the Pod. Just like a Volume, each Persistent Volume has\
    \ a type that defines the type of storage you want to attach to Pods. Now, rather\
    \ than have the technical implementation details of your storage in the Pod Spec,\
    \ when you use a Persistent Volume, the Persistent Volume object holds the implementation\
    \ details of the storage attached to the Pod. Inside the Pod Spec, there is a\
    \ reference to a Storage API Object called a Persistent Volume Claim. A Persistent\
    \ Volume Claim is a request for the Cluster to map a Persistent Volume to a Pod.\n\
    \nPersistent Volumes, depending on their type, either block or file system, are\
    \ mounted or attached to the Node by the kubelet. It is the responsibility of\
    \ the container runtime to expose the mounted or attached Persistent Volume to\
    \ the containers inside the Pod. A Persistent Volume is a non-namespaced resource\
    \ in the Cluster, which means that it can be shared across namespaces if needed.\n\
    \n### Access Modes\n\nAccess Modes for Persistent Volumes define the access pattern\
    \ to the Persistent Volume object. Each Persistent Volume has an Access Mode that\
    \ describes the capabilities of the underlying storage.\n\nThe following list\
    \ details the Access Modes supported in Kubernetes Persistent Volumes and Persistent\
    \ Volume Claims:\n\n*   **ReadWriteOnce (RWO):** Only one Node can access a Persistent\
    \ Volume with read/write access.\n\n*   **ReadWriteMany (RWX):** More than one\
    \ Node can access a Persistent Volume with read/write access.\n\n*   **ReadOnlyMany\
    \ (ROX):** More than one Node can access a Persistent Volume with read-only access.\n\
    \nThe Access Mode chosen depends on the application that will use the Persistent\
    \ Volume and the underlying Persistent Volume storage type. For example, an NFS\
    \ export can support many read/write clients due to the nature of NFS. However,\
    \ like a virtual disk, a block device usually only supports read-write access\
    \ for one host since the underlying virtual disk often cannot be attached to multiple\
    \ hosts due to the nature of virtual disks. On the application side, applications\
    \ like SQL Server can have only one process open a database file simultaneously,\
    \ requiring `ReadWriteOnce`. On the other hand, static files such as web content\
    \ can be `ReadOnlyMany`, and then the Persistent Volume can be attached to many\
    \ Pods for scale-out access to the content stored in the Persistent Volume.\n\n\
    Access Modes are Node level rather than Pod level. So even if a Persistent Volume\
    \ is `ReadWriteOnce,` Pods running on the Node can potentially access the Persistent\
    \ Volume. It is up to the application being deployed and its configuration to\
    \ ensure that only one Pod is accessing the Persistent Volume at a point in time.\n\
    \n### Types of Persistent Volumes\n\nKubernetes supports a vast array of storage\
    \ types for Persistent Volumes. In the following list are the more common Persistent\
    \ Volume types we see in the field when working with stateful applications in\
    \ Kubernetes:\n\n*   **hostPath:** A mounted a directory on the Node’s file system\
    \ into the Pod.\n\n*   **Local:** A mounted storage device on a Node.\n\n*   **NFS:**\
    \ Mount an existing NFS export into a Pod.\n\n*   **Fiber Channel and iSCSI:**\
    \ Block access to remote storage available via a storage network.\n\n*   **Cloud\
    \ storage:** Access to remote storage block devices and file services for each\
    \ of the major cloud providers:\n    *   awsElasticBlockStore\n\n    *   azureDisk\n\
    \n    *   azureFiles\n\n    *   gcePersistentDisk\n\nFor a complete list of Persistent\
    \ Volume types and configuration examples, check out [*https://kubernetes.io/docs/concepts/storage/persistent-volumes/*](https://kubernetes.io/docs/concepts/storage/persistent-volumes/).\n\
    \n### Defining a Persistent Volume\n\nLet’s look at the code needed to describe\
    \ a Persistent Volume (Listing [6-2](#494804_1_En_6_Chapter.xhtml#PC2)). In the\
    \ example, you can see we have defined size as 10GB in the field `spec.capacity.storage`\
    \ and have defined an Access Mode in `spec.accessModes` and have chosen `ReadWriteMany`.\
    \ So more than one Node in the Cluster can access this Persistent Volume. This\
    \ Persistent Volume is of type `nfs`, so you see the implementation details for\
    \ access to the NFS server and path. Each type of Persistent Volume has unique\
    \ configuration parameters. Check the previous link for the configuration details\
    \ for other types of Persistent Volumes.\n\n```\napiVersion: v1\nkind: PersistentVolume\n\
    metadata:\nname: pv-nfs-data-static\nspec:\ncapacity:\nstorage: 10Gi\naccessModes:\n\
    - ReadWriteMany\nnfs:\nserver: 172.16.94.5\npath: \"/srv/exports/volumes/webcontent\"\
    \nListing 6-2\nExample Persistent Volume (pv.yaml)\n```"
  trans: "\n在控制节点上，我们使用 `-o wide` 输出修饰符获取 Pod 列表以得到 Pod 的 IP 地址，然后结合该 Pod IP 地址使用\
    \ `curl` 来访问 `nginx`。在图 6-3 中，我们使用了 `kubectl get pods -o wide`，在输出中，你可以看到 `nginx`\
    \ Pod 正在运行。\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig3_HTML.jpg](img/494804_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3：使用持久存储上的内容访问 `nginx`\n\n在图 6-4 中，你可以看到 Pod 内部位于 `/user/share/nginx/html/web-app`\
    \ 的持久存储映射。\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig4_HTML.jpg](img/494804_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4：查看 Pod 内部持久存储上的内容\n\n在图 6-5 中，你可以看到内容在网络上实际存储的位置。它存储在 NFS 服务器的 `/srv/exports/volumes/webcontent`\
    \ 路径下。当这个 Pod 被调度到集群中的某个节点时，由 `kubelet` 负责将存储附加到该节点并暴露给该 Pod。\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig5_HTML.jpg](img/494804_1_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5：查看 NFS 服务器上的存储内容\n\n卷为 Kubernetes 中的持久存储提供了解决方案。然而，正如你在代码示例中所看到的，清单文件中存在与基础设施相关的代码。这意味着如果你想在另一个集群中使用此代码，就需要更新清单文件，这增加了维护成本并降低了代码的可移植性。Kubernetes\
    \ 的设计者和维护者看到了这个问题，并引入了一个解决方案。回顾一下 Kubernetes 用于支持有状态应用的 API 对象，其中列出了一个卷类型：`持久卷声明`。这种卷类型使我们能够将基础设施相关的代码分离到独立的\
    \ API 对象中，即 `持久卷` 和 `持久卷声明`。让我们继续前进，更详细地探讨这些对象。\n\n## 持久卷与持久卷声明\n\n你刚刚了解了如何在 Kubernetes\
    \ 中使用卷向 Pod 暴露存储。但你也看到在 Pod 规范中包含基础设施相关的代码会增加维护难度并降低清单文件的可移植性。现在我们来看看 `持久卷` 和\
    \ `持久卷声明` 如何帮助解决这些挑战，并将那些基础设施相关的代码移出 Pod 规范。\n\n### 持久卷\n\n`持久卷` 是 Kubernetes\
    \ 中的一种 API 资源，由集群管理员定义或由集群使用 `存储类` 动态供给。`持久卷` 的生命周期独立于容器和 Pod。就像卷一样，每个 `持久卷` 都有一个类型，定义了你想要附加到\
    \ Pod 的存储类型。现在，当你使用 `持久卷` 时，`持久卷` 对象持有附加到 Pod 的存储的实现细节，而不是将这些技术实现细节放在 Pod 规范中。在\
    \ Pod 规范内部，有一个对称为 `持久卷声明` 的存储 API 对象的引用。`持久卷声明` 是对集群的一个请求，要求将 `持久卷` 映射到 Pod。\n\
    \n根据其类型（块存储或文件系统），`持久卷` 由 `kubelet` 挂载或附加到节点。容器运行时负责将挂载或附加的 `持久卷` 暴露给 Pod 内部的容器。`持久卷`\
    \ 是集群中一个不带命名空间的资源，这意味着如果需要，它可以在命名空间之间共享。\n\n### 访问模式\n\n`持久卷` 的访问模式定义了访问 `持久卷`\
    \ 对象的模式。每个 `持久卷` 都有一个访问模式，描述了底层存储的能力。\n\n以下列表详细说明了 Kubernetes `持久卷` 和 `持久卷声明`\
    \ 支持的访问模式：\n\n*   `ReadWriteOnce (RWO):` 只有一个节点可以以读/写方式访问一个 `持久卷`。\n*   `ReadWriteMany\
    \ (RWX):` 多个节点可以以读/写方式访问一个 `持久卷`。\n*   `ReadOnlyMany (ROX):` 多个节点可以以只读方式访问一个 `持久卷`。\n\
    \n选择哪种访问模式取决于将使用 `持久卷` 的应用程序以及底层的 `持久卷` 存储类型。例如，由于 NFS 的特性，一个 NFS 导出可以支持许多读/写客户端。然而，像虚拟磁盘这样的块设备通常只支持一台主机进行读写访问，因为底层的虚拟磁盘通常由于其特性无法附加到多台主机。在应用方面，像\
    \ SQL Server 这样的应用程序可能只有一个进程能同时打开一个数据库文件，因此需要 `ReadWriteOnce`。另一方面，像 Web 内容这样的静态文件可以是\
    \ `ReadOnlyMany`，然后 `持久卷` 可以附加到许多 Pod，以实现对存储在 `持久卷` 中的内容的横向扩展访问。\n\n访问模式是节点级别的，而不是\
    \ Pod 级别的。因此，即使一个 `持久卷` 是 `ReadWriteOnce`，运行在节点上的 Pod 也有可能访问它。这取决于所部署的应用程序及其配置，以确保在任意时间点只有一个\
    \ Pod 正在访问该 `持久卷`。\n\n### 持久卷的类型\n\nKubernetes 为 `持久卷` 支持广泛的存储类型。下面列出了我们在 Kubernetes\
    \ 中处理有状态应用时更常见的 `持久卷` 类型：\n\n*   `hostPath:` 将节点文件系统上的一个目录挂载到 Pod 中。\n*   `Local:`\
    \ 节点上挂载的存储设备。\n*   `NFS:` 将现有的 NFS 导出挂载到 Pod 中。\n*   `Fiber Channel and iSCSI:`\
    \ 通过存储网络对远程存储进行块访问。\n*   `云存储:` 访问主要云提供商的远程存储块设备和文件服务：\n    *   `awsElasticBlockStore`\n\
    \    *   `azureDisk`\n    *   `azureFiles`\n    *   `gcePersistentDisk`\n\n有关\
    \ `持久卷` 类型的完整列表和配置示例，请查阅 [*https://kubernetes.io/docs/concepts/storage/persistent-volumes/*](https://kubernetes.io/docs/concepts/storage/persistent-volumes/)。\n\
    \n### 定义持久卷\n\n让我们看一下描述一个 `持久卷` 所需的代码（清单 6-2）。在示例中，你可以看到我们在 `spec.capacity.storage`\
    \ 字段中将大小定义为 10GB，在 `spec.accessModes` 中定义了访问模式并选择了 `ReadWriteMany`。因此，集群中的多个节点都可以访问这个\
    \ `持久卷`。这个 `持久卷` 是 `nfs` 类型，所以你可以看到访问 NFS 服务器和路径的实现细节。每种类型的 `持久卷` 都有独特的配置参数。请参考前面的链接获取其他类型\
    \ `持久卷` 的配置详细信息。\n\n```yaml\napiVersion: v1\nkind: PersistentVolume\nmetadata:\n\
    \  name: pv-nfs-data-static\nspec:\n  capacity:\n    storage: 10Gi\n  accessModes:\n\
    \    - ReadWriteMany\n  nfs:\n    server: 172.16.94.5\n    path: \"/srv/exports/volumes/webcontent\"\
    \n```\n\n清单 6-2：`持久卷` 示例 (`pv.yaml`)\n"
- fmt: '# Static Provisioning for Persistent Volumes and Persistent Volume Claims


    ## Persistent Volume Claims


    When an application wants to attach to a Persistent Volume in the Cluster, a Persistent
    Volume Claim must be created. A Persistent Volume Claim is a request for storage
    by a user. Persistent Volume Claims enable you to just ask for storage from the
    Cluster rather than having the implementation details in your Pod Spec. This allows
    portability of your application configurations and makes your deployment manifests
    Cluster independent when defining Pods and higher-level constructs, separating
    the infrastructure-specific code into dedicated storage objects from the deployment
    code.


    Persistent Volume Claim requests are based on size and Access Mode, and it is
    up to a controller in the Cluster to map the Persistent Volume Claim to a Persistent
    Volume. This process is called binding. A Persistent Volume Claim is a namespaced
    resource and binds to Persistent Volumes, which are not namespaced.


    Note: When binding Persistent Volume Claims to Persistent Volumes, if the Cluster
    cannot find an exact match based on size, it is possible to bind the Claim to
    a Persistent Volume that is larger than the Persistent Volume Claim’s requested
    size.


    ## Defining a Persistent Volume Claim


    In Listing 6-3 is the code for a Persistent Volume Claim. In the Claim, we define
    a size in the field `spec.resources.requests.storage` of 10GB and an Access Mode
    in the field `spec.accessModes.ReadWriteMany`. Once this YAML manifest is sent
    to the API Server, the Cluster will try to find a Persistent Volume matching the
    Persistent Volume Claim’s size and Access Mode. This process is called `binding`,
    and the status of the object changes to `Bound`. The process of creating a Persistent
    Volume resource and a Persistent Volume Claim is called `static provisioning`.
    Suppose a Persistent Volume cannot be found for a Persistent Volume Claim; the
    status is `Unbound`. If a Persistent Volume cannot be found, this will block the
    startup of a Pod requesting storage from the Cluster, and the Pod will be in the
    `Pending` state. If a Persistent Volume is created and has no Persistent Volume
    Claim, its status is `Available`.


    ```yaml

    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: pvc-nfs-data-static

    spec:

    accessModes:

    - ReadWriteMany

    resources:

    requests:

    storage: 10Gi

    ```

    Listing 6-3: Example Persistent Volume Claim (pvc.yaml)


    ## Static Provisioning Storage for Use by an Application


    With all that theory behind us, let’s statically provision a Persistent Volume
    and Persistent Volume Claim and deploy an application that uses those resources
    for persistent storage.


    First, create the Persistent Volume using the code from Listing 6-2 (pv.yaml),
    and then execute `kubectl get pv` (`pv` is the alias/acronym for Persistent Volume)
    to get the status of the Persistent Volume. In Figure 6-6, you see the Name, which
    is `pv-nfs-data-static`, its Capacity `10GB`, its Access Mode `ReadWriteMany`,
    its Reclaim Policy `Retain`, and its Status `Available` since there is no claim
    on it yet. Finally, Storage Class is blank since this Persistent Volume is not
    part of a Storage Class.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig6_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig6_HTML.jpg)

    Figure 6-6: Output of `kubectl get pv`


    Next, create the Persistent Volume Claim using the code from Listing 6-3 (pvc.yaml),
    and then execute `kubectl get pvc` (`pvc` is the alias/acronym for Persistent
    Volume Claim) to get the status of the Persistent Volume Claim. In Figure 6-7,
    you can see the name of the Persistent Volume Claim, its status is Bound, and
    the Volume is the Persistent Volume it is bound to, `pv-nfs-data-static`. This
    is the Persistent Volume that was just statically provisioned earlier, `pv-nfs-data-static`.
    The Claim’s capacity is `10GB`, and the Access Mode is `ReadWriteMany(RWX)`, and
    it is not a member of a Storage Class.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig7_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig7_HTML.jpg)

    Figure 6-7: Output of `kubectl get pvc`. The Persistent Volume Claim is bound
    to `pv-nfs-data-static`


    When we created the Persistent Volume Claim `pvc-nfs-data-static`, a controller
    in the Cluster began looking for a Persistent Volume to satisfy the Claim based
    on size and Access Mode. The Cluster found `pv-nfs-data-static`, and then the
    two were bound together. In Figure 6-8, we execute `kubectl get pv` again. The
    status of Persistent Volume `pv-nfs-data-static` is now Bound, and the Claim is
    `default/pvc-nfs-data-static`. Default is the name of the namespace that the Persistent
    Volume Claim is in.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig8_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig8_HTML.jpg)

    Figure 6-8: Output of `kubectl get pv` with a bound Persistent Volume and Persistent
    Volume Claim'
