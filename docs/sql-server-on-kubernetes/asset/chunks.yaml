    \ AKSCluster`)。\n\n在图 6-14 中是 `kubectl get storageclass` 在 Azure Kubernetes Service\
    \ 集群中的输出。有五种可用于动态配置的存储变体，每种都有不同的用例、性能配置和配置方式。要从其中一个存储类动态配置存储，您需要根据所需存储类型，从对应的\
    \ `StorageClass` 创建 `PersistentVolumeClaim`。\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig14_HTML.jpg](img/494804_1_En_6_Fig14_HTML.jpg)\n\
    *图 6-14: Azure Kubernetes Service 集群中可用的存储类*\n\n在清单 6-11 中，创建了两种资源：一个 `PersistentVolumeClaim`\
    \ 和一个 `Deployment`。`PersistentVolumeClaim` 定义了我们希望为此应用程序动态分配的存储类型。因此，与之前一样，我们定义了一个访问模式和大小。在这个\
    \ `PersistentVolumeClaim` 中，我们还指定了 `storageClassName` 为 `managed-premium`。当此 `PersistentVolumeClaim`\
    \ 被创建时，`PersistentVolume` 将从该存储类中动态分配。\n\n```\napiVersion: v1\nkind: PersistentVolumeClaim\n\
    metadata:\n  name: pvc-azure-data-dynamic\nspec:\n  accessModes:\n  - ReadWriteOnce\n\
    \  storageClassName: managed-premium\n  resources:\n    requests:\n      storage:\
    \ 10Gi\n---\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: nginx-azure-deployment-dynamic\n\
    spec:\n  replicas: 1\n  selector:\n    matchLabels:\n      app: nginx\n  template:\n\
    \    metadata:\n      labels:\n        app: nginx\n    spec:\n      containers:\n\
    \      - name: nginx\n        image: nginx\n        ports:\n        - containerPort:\
    \ 80\n        volumeMounts:\n        - name: webcontent\n          mountPath:\
    \ \"/usr/share/nginx/html/web-app\"\n      volumes:\n      - name: webcontent\n\
    \        persistentVolumeClaim:\n          claimName: pvc-azure-data-dynamic\n\
    ---\napiVersion: v1\nkind: Service\nmetadata:\n  name: nginx-azure-service-dynamic\n\
    spec:\n  selector:\n    app: nginx\n  ports:\n  - port: 80\n    protocol: TCP\n\
    \    targetPort: 80\n  type: LoadBalancer\n```\n\n清单 6-11: 使用 `PersistentVolumeClaim`\
    \ 和 Azure 存储动态配置的部署 (`deployment-dynamic-azure.yaml`)\n\n创建清单 6-11 中的资源后，您将拥有一个用于访问应用程序的\
    \ `PersistentVolume`、`PersistentVolumeClaim`、`Deployment` 和 `Service`。`PersistentVolumeClaim`\
    \ 将向集群请求从 `StorageClass` `managed-premium` 获取一个 `PersistentVolume`，底层的 `PersistentVolume`\
    \ 会被动态配置。\n\n在图 6-15 中，`PersistentVolumeClaim` `pvc-azure-data-dynamic` 绑定到了一个动态生成的、名称以\
    \ \"`pvc-`\" 为前缀的 `PersistentVolume`。\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig15_HTML.jpg](img/494804_1_En_6_Fig15_HTML.jpg)\n\
    *图 6-15: 动态配置的持久卷及其持久卷声明*\n\n**注意**\n请务必将集群上下文切换回您的实验集群：`kubectl config use-context\
    \ kubernetes-admin@kubernetes`。\n\n## 总结\n\n在本章中，我们介绍了基于容器的应用程序中对数据持久性的需求，以及容器在\
    \ `Volumes` 中持久化数据的内部原理。然后我们将该模型扩展到 Kubernetes 集群中，学习了如何使用 `PersistentVolumes`\
    \ 和 `PersistentVolumeClaims` 为部署在 Kubernetes 中的基于容器的应用程序提供存储。我们还研究了在我们的实验环境（使用\
    \ NFS）和云环境（使用 Azure Kubernetes Service）中的动态配置场景。\n\n# 第三部分：Kubernetes 中的 SQL Server\n"
- fmt: "# 7. Deploying SQL Server on Kubernetes\n\nIn this chapter, we will bring\
    \ it all together and learn what it takes to run SQL Server on Kubernetes. We\
    \ will look at how running SQL Server in a Pod is unique and how to control configuration\
    \ and maintain database state. We will look at how we can leverage Deployments\
    \ to upgrade SQL Server. We will finish the chapter with what considerations you\
    \ need to know to run SQL Server on Kubernetes in production. We will look at\
    \ things like performance considerations, resource management, and backups.\n\n\
    ## Running SQL Server in a Pod\n\nRunning SQL Server on Kubernetes is really bringing\
    \ everything together that we’ve learned so far. We will be defining one or multiple\
    \ persistent volume claims to store our SQL Server’s data. We will be deploying\
    \ a pod that is running SQL Server, and we will be attaching the PVCs to this\
    \ pod to overcome the decoupling of data and computation in Kubernetes. As our\
    \ last step, we will be exposing this pod through a service to make it accessible\
    \ by other applications, as illustrated in Figure [7-1](#494804_1_En_7_Chapter.xhtml#Fig1).\n\
    \n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig1_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1\nKubernetes components for a SQL Server Pod\n\nWhenever our SQL Server\
    \ pod gets replaced (because it was either deleted or destroyed), it will go back\
    \ to the initial state of the container image. This also means, if you did not\
    \ define any persistent storage, all changes and data will be lost. The pod therefore\
    \ requires three essential settings:\n\n*   `ACCEPT_EULA`: This is used for you\
    \ to accept the end user license agreement, which will be set as an environment\
    \ variable and is required for the Pod to start.\n*   `MSSQL_SA_PASSWORD`: The\
    \ sa password for our SQL instance, which we will store in the cluster secret,\
    \ where it’s being hashed but not encrypted.\n*   `Storage`: The definition on\
    \ which PVC to use.\n\nKubernetes will spin up the container, the storage is attached\
    \ to the Node and then the container is started, and the mapped storage will be\
    \ mounted inside the container. That way, all the data that is written by SQL\
    \ Server will effectively be written to the Persistent Volume. After applying\
    \ the vital settings (EULA and sa password), SQL Server will check if there are\
    \ system databases in the default data directory `/var/opt/mssql/data`. If there\
    \ are no system databases, SQL Server will copy a set of new system databases\
    \ into this directory. If there is an existing set of system databases in the\
    \ default data directory, it will bring the system databases from that directory\
    \ online, followed by the user databases that have been configured for this instance.\n\
    \nThis process will repeat every single time that our pod gets recreated, no matter\
    \ if that happens because we actively triggered that, for example, by applying\
    \ an upgrade, or because the Control Plane shifted the pod to another node. Using\
    \ this method, you are able to decouple the persistency of the data stored in\
    \ SQL Server from the lifecycle of the Pod. When a Pod is deployed, the storage\
    \ is mounted, the container starts and sees it has a master database, and then\
    \ SQL Server brings online the defined user databases.\n\n## Deploying SQL Server\
    \ on Kubernetes\n\nBefore we can start the actual deployment, a few preparations\
    \ have to be done first.\n\n### Preparation\n\nThe two essential considerations\
    \ and preparing steps before a deployment can be triggered are the provision of\
    \ a secret for the sa password as well as a PVC to store SQL Server’s data. While\
    \ there are many more things to be considered especially in a production environment,\
    \ which we’ll discuss later in this chapter, they form the bare minimum.\n\nSo,\
    \ in a nutshell, our steps are\n\n1.  Create a secret.\n2.  Create storage (PV/PVC).\n\
    3.  Create the SQL Server Deployment.\n\n#### Storage\n\nWe will be deploying\
    \ our first SQL Server to our kubeadm cluster and therefore have chosen NFS as\
    \ our storage platform, which will allow us to move pods across nodes without\
    \ losing access to previously generated data. As mentioned in Chapter [1](#494804_1_En_1_Chapter.xhtml),\
    \ this is perfect for our lab environment but is not recommended for high-performance\
    \ production systems.\n\nFor this purpose, we create a directory on our storage\
    \ server called `/srv/exports/volumes/sql-instance-1`.\n\nSave the contents of\
    \ Listing [7-1](#494804_1_En_7_Chapter.xhtml#PC1) to a file named `sql-storage.yaml`.\
    \ This can happen from any client, including your administrative workstation,\
    \ that is connected to your cluster.\n\n```yaml\napiVersion: v1\nkind: PersistentVolume\n\
    metadata:\n  name: pv-nfs-sql-instance-1\n  labels:\n    disk: system\nspec:\n\
    \  capacity:\n    storage: 10Gi\n  accessModes:\n    - ReadWriteOnce\n  persistentVolumeReclaimPolicy:\
    \ Retain\n  nfs:\n    server: storage\n    path: \"/srv/exports/volumes/sql-instance-1\"\
    \n\napiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: pvc-nfs-sql-instance-1\n\
    spec:\n  selector:\n    matchLabels:\n      disk: system\n  accessModes:\n   \
    \ - ReadWriteOnce\n  resources:\n    requests:\n      storage: 10Gi\n```\nListing\
    \ 7-1\n`sql-storage.yaml`\n\nThis file contains the definition for a persistent\
    \ volume as well as a persistent volume claim.\n\nLet’s apply this manifest to\
    \ our Kubernetes cluster using the code in Listing [7-2](#494804_1_En_7_Chapter.xhtml#PC2).\n\
    \n```bash\nkubectl apply -f sql-storage.yaml\n```\nListing 7-2\nApply `sql-storage.yaml`\
    \ to Kubernetes cluster\n\nWe can verify that both have been created using `kubectl`\
    \ (see Listing [7-3](#494804_1_En_7_Chapter.xhtml#PC3)).\n\n```bash\nkubectl get\
    \ pv\nkubectl get pvc\n```\nListing 7-3\nVerify previously created PV and PVC\n\
    \nBoth can be seen in the output as shown in Figure [7-2](#494804_1_En_7_Chapter.xhtml#Fig2).\n\
    \n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig2_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2\nOutput of `kubectl get node -o wide`\n\nThe Persistent Volume Claim\
    \ is bound to our Persistent Volume. Our storage is now ready for SQL Server.\n\
    \n#### Secret\n\nAs mentioned before, we will need to store a secret in our cluster\
    \ that holds the sa password to be used by SQL Server. This secret will be stored\
    \ within our cluster and can be referenced by our SQL Server deployment, so it’s\
    \ available and accessible for SQL Server. This also has the benefit of not having\
    \ the secret in the deployment manifest, so it can be easily shared without disclosing\
    \ confidential information like our password. This can be done declaratively or\
    \ imperatively, but often the secret is sourced from a secure secret store, for\
    \ example, Azure Key Vault.\n\nThe easiest way to create this secret is through\
    \ a `kubectl` command like the one in Listing [7-4](#494804_1_En_7_Chapter.xhtml#PC4).\n\
    \n```bash\nkubectl create secret generic mssql --from-literal=SA_PASSWORD=S0methingS@Str0ng!\n\
    ```\nListing 7-4\nCreate Kubernetes Secret using `kubectl`\n\nWe’re now ready\
    \ to deploy SQL Server onto Kubernetes."
  raw: '# 7. Deploying SQL Server on Kubernetes


    In this chapter, we will bring it all together and learn what it takes to run
    SQL Server on Kubernetes. We will look at how running SQL Server in a Pod is unique
    and how to control configuration and maintain database state. We will look at
    how we can leverage Deployments to upgrade SQL Server. We will finish the chapter
    with what considerations you need to know to run SQL Server on Kubernetes in production.
    We will look at things like performance considerations, resource management, and
    backups.


    ## Running SQL Server in a Pod


    Running SQL Server on Kubernetes is really bringing everything together that we’ve
    learned so far. We will be defining one or multiple persistent volume claims to
    store our SQL Server’s data. We will be deploying a pod that is running SQL Server,
    and we will be attaching the PVCs to this pod to overcome the decoupling of data
    and computation in Kubernetes. As our last step, we will be exposing this pod
    through a service to make it accessible by other applications, as illustrated
    in Figure [7-1](#494804_1_En_7_Chapter.xhtml#Fig1).


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig1_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Kubernetes components for a SQL Server Pod


    Whenever our SQL Server pod gets replaced (because it was either deleted or destroyed),
    it will go back to the initial state of the container image. This also means,
    if you did not define any persistent storage, all changes and data will be lost.
    The pod therefore requires three essential settings:


    *   **ACCEPT_EULA:** This is used for you to accept the end user license agreement,
    which will be set as an environment variable and is required for the Pod to start.


    *   **MSSQL_SA_PASSWORD:** The sa password for our SQL instance, which we will
    store in the cluster secret, where it’s being hashed but not encrypted.


    *   **Storage:** The definition on which PVC to use.


    Kubernetes will spin up the container, the storage is attached to the Node and
    then the container is started, and the mapped storage will be mounted inside the
    container. That way, all the data that is written by SQL Server will effectively
    be written to the Persistent Volume. After applying the vital settings (EULA and
    sa password), SQL Server will check if there are system databases in the default
    data directory */var/opt/mssql/data*. If there are no system databases, SQL Server
    will copy a set of new system databases into this directory. If there is an existing
    set of system databases in the default data directory, it will bring the system
    databases from that directory online, followed by the user databases that have
    been configured for this instance.


    This process will repeat every single time that our pod gets recreated, no matter
    if that happens because we actively triggered that, for example, by applying an
    upgrade, or because the Control Plane shifted the pod to another node. Using this
    method, you are able to decouple the persistency of the data stored in SQL Server
    from the lifecycle of the Pod. When a Pod is deployed, the storage is mounted,
    the container starts and sees it has a master database, and then SQL Server brings
    online the defined user databases.


    ## Deploying SQL Server on Kubernetes


    Before we can start the actual deployment, a few preparations have to be done
    first.


    ### Preparation


    The two essential considerations and preparing steps before a deployment can be
    triggered are the provision of a secret for the sa password as well as a PVC to
    store SQL Server’s data. While there are many more things to be considered especially
    in a production environment, which we’ll discuss later in this chapter, they form
    the bare minimum.


    So, in a nutshell, our steps are


    1.  Create a secret.


    2.  Create storage (PV/PVC).


    3.  Create the SQL Server Deployment.


    #### Storage


    We will be deploying our first SQL Server to our kubeadm cluster and therefore
    have chosen NFS as our storage platform, which will allow us to move pods across
    nodes without losing access to previously generated data. As mentioned in Chapter
    [1](#494804_1_En_1_Chapter.xhtml), this is perfect for our lab environment but
    is not recommended for high-performance production systems.


    For this purpose, we create a directory on our storage server called */srv/exports/volumes/sql-instance-1*.


    Save the contents of Listing [7-1](#494804_1_En_7_Chapter.xhtml#PC1) to a file
    named *sql-storage.yaml*. This can happen from any client, including your administrative
    workstation, that is connected to your cluster.


    ```

    apiVersion: v1

    kind: PersistentVolume

    metadata:

    name: pv-nfs-sql-instance-1

    labels:

    disk: system

    spec:

    capacity:

    storage: 10Gi

    accessModes:

    - ReadWriteOnce

    persistentVolumeReclaimPolicy: Retain

    nfs:

    server: storage

    path: "/srv/exports/volumes/sql-instance-1"


    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: pvc-nfs-sql-instance-1

    spec:

    selector:

    matchLabels:

    disk: system

    accessModes:

    - ReadWriteOnce

    resources:

    requests:

    storage: 10Gi

    Listing 7-1

    sql-storage.yaml

    ```


    This file contains the definition for a persistent volume as well as a persistent
    volume claim.


    Let’s apply this manifest to our Kubernetes cluster using the code in Listing
    [7-2](#494804_1_En_7_Chapter.xhtml#PC2).


    ```

    kubectl apply -f sql-storage.yaml

    Listing 7-2

    Apply sql-storage.yaml to Kubernetes cluster

    ```


    We can verify that both have been created using kubectl (see Listing [7-3](#494804_1_En_7_Chapter.xhtml#PC3)).


    ```

    kubectl get pv

    kubectl get pvc

    Listing 7-3

    Verify previously created PV and PVC

    ```


    Both can be seen in the output as shown in Figure [7-2](#494804_1_En_7_Chapter.xhtml#Fig2).


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig2_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Output of kubectl get node -o wide


    The Persistent Volume Claim is bound to our Persistent Volume. Our storage is
    now ready for SQL Server.


    #### Secret


    As mentioned before, we will need to store a secret in our cluster that holds
    the sa password to be used by SQL Server. This secret will be stored within our
    cluster and can be referenced by our SQL Server deployment, so it’s available
    and accessible for SQL Server. This also has the benefit of not having the secret
    in the deployment manifest, so it can be easily shared without disclosing confidential
    information like our password. This can be done declaratively or imperatively,
    but often the secret is sourced from a secure secret store, for example, Azure
    Key Vault.


    The easiest way to create this secret is through a kubectl command like the one
    in Listing [7-4](#494804_1_En_7_Chapter.xhtml#PC4).


    ```

    kubectl create secret generic mssql --from-literal=SA_PASSWORD=S0methingS@Str0ng!

    Listing 7-4

    Create Kubernetes Secret using kubectl

    ```


    We’re now ready to deploy SQL Server onto Kubernetes.'
  trans: "\n# 7. 在 Kubernetes 上部署 SQL Server\n\n在本章中，我们将把所有知识融会贯通，学习如何在 Kubernetes\
    \ 上运行 SQL Server。我们将探讨在 Pod 中运行 SQL Server 的独特之处，以及如何配置和管理数据库状态。我们还将了解如何利用 Deployment\
    \ 来升级 SQL Server。本章最后将讨论在生产环境中运行 SQL Server on Kubernetes 所需考虑的事项，例如性能考量、资源管理和备份。\n\
    \n## 在 Pod 中运行 SQL Server\n\n在 Kubernetes 上运行 SQL Server 实际上是将我们迄今为止学到的所有知识整合在一起。我们将定义一个或多个持久卷声明（Persistent\
    \ Volume Claim）来存储 SQL Server 的数据。我们将部署一个运行 SQL Server 的 Pod，并将 PVC 附加到该 Pod，以克服\
    \ Kubernetes 中数据与计算分离的特性。最后，我们将通过一个 Service（服务）暴露此 Pod，使其能被其他应用程序访问，如图 7-1 所示。\n\
    \n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig1_HTML.jpg](img/494804_1_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1\nSQL Server Pod 的 Kubernetes 组件\n\n每当我们的 SQL Server Pod 被替换（无论是被删除还是被销毁），它都会回到容器镜像的初始状态。这也意味着，如果您没有定义任何持久化存储，所有的更改和数据都将丢失。因此，Pod\
    \ 需要三个基本设置：\n\n*   `ACCEPT_EULA`：用于您接受最终用户许可协议，将设置为环境变量，是 Pod 启动所必需的。\n*   `MSSQL_SA_PASSWORD`：我们\
    \ SQL 实例的 sa 密码，我们将把它存储在集群的 Secret 中，它会被哈希处理但不会加密。\n*   `Storage`：定义要使用哪个 PVC。\n\
    \nKubernetes 将启动容器，存储被附加到节点，然后容器启动，映射的存储将被挂载到容器内部。这样，SQL Server 写入的所有数据都将有效地写入持久卷。应用关键设置（EULA\
    \ 和 sa 密码）后，SQL Server 将检查默认数据目录`/var/opt/mssql/data`中是否存在系统数据库。如果没有系统数据库，SQL\
    \ Server 会将一组新的系统数据库复制到此目录中。如果默认数据目录中已经存在一组系统数据库，它将从该目录中使系统数据库联机，然后是为此实例配置的用户数据库。\n\
    \n无论 Pod 是被重新创建，是因为我们主动触发（例如应用升级）还是因为控制平面将 Pod 迁移到另一个节点，这个过程每次都会重复。通过这种方法，您能够将\
    \ SQL Server 中存储的数据的持久性与 Pod 的生命周期解耦。当部署 Pod 时，存储被挂载，容器启动并看到它有一个 master 数据库，然后\
    \ SQL Server 使配置的用户数据库联机。\n\n## 在 Kubernetes 上部署 SQL Server\n\n在开始实际部署之前，首先需要完成一些准备工作。\n\
    \n### 准备工作\n\n在触发部署之前，两个关键的考虑和准备步骤是提供 sa 密码的 Secret 以及存储 SQL Server 数据的 PVC。虽然尤其是在生产环境中需要考虑更多事项（我们将在本章后面讨论），但它们构成了最低要求。\n\
    \n简而言之，我们的步骤是：\n\n1.  创建一个 Secret。\n2.  创建存储（PV/PVC）。\n3.  创建 SQL Server Deployment。\n\
    \n#### 存储\n\n我们将把第一个 SQL Server 部署到 kubeadm 集群，因此选择了 NFS 作为我们的存储平台，这将允许我们在节点之间移动\
    \ Pod，而不会丢失对先前生成的数据的访问权限。如第 1 章所述，这非常适合我们的实验室环境，但不推荐用于高性能生产系统。\n\n为此，我们在存储服务器上创建一个名为`/srv/exports/volumes/sql-instance-1`的目录。\n\
    \n将清单 7-1 的内容保存到一个名为`sql-storage.yaml`的文件中。这可以从任何连接到集群的客户端执行，包括您的管理工作站。\n\n```yaml\n\
    apiVersion: v1\nkind: PersistentVolume\nmetadata:\n  name: pv-nfs-sql-instance-1\n\
    \  labels:\n    disk: system\nspec:\n  capacity:\n    storage: 10Gi\n  accessModes:\n\
    \    - ReadWriteOnce\n  persistentVolumeReclaimPolicy: Retain\n  nfs:\n    server:\
    \ storage\n    path: \"/srv/exports/volumes/sql-instance-1\"\n\napiVersion: v1\n\
    kind: PersistentVolumeClaim\nmetadata:\n  name: pvc-nfs-sql-instance-1\nspec:\n\
    \  selector:\n    matchLabels:\n      disk: system\n  accessModes:\n    - ReadWriteOnce\n\
    \  resources:\n    requests:\n      storage: 10Gi\n```\n清单 7-1\n`sql-storage.yaml`\n\
    \n该文件包含一个持久卷和一个持久卷声明的定义。\n\n让我们使用清单 7-2 中的代码将此清单应用到我们的 Kubernetes 集群。\n\n```bash\n\
    kubectl apply -f sql-storage.yaml\n```\n清单 7-2\n将`sql-storage.yaml`应用到 Kubernetes\
    \ 集群\n\n我们可以使用`kubectl`验证两者是否已创建（见清单 7-3）。\n\n```bash\nkubectl get pv\nkubectl\
    \ get pvc\n```\n清单 7-3\n验证先前创建的 PV 和 PVC\n\n如图 7-2 所示，两者都可在输出中看到。\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig2_HTML.jpg](img/494804_1_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2\n`kubectl get node -o wide`的输出\n\n持久卷声明已绑定到我们的持久卷。我们的存储现已为 SQL Server\
    \ 准备就绪。\n\n#### Secret\n\n如前所述，我们将在集群中存储一个包含 SQL Server 要使用的 sa 密码的 Secret。此 Secret\
    \ 将存储在我们的集群中，可以由我们的 SQL Server Deployment 引用，因此 SQL Server 可以访问和使用它。这样做还有一个好处是，Secret\
    \ 不会出现在 Deployment 清单中，因此可以轻松共享而不泄露机密信息（如我们的密码）。这可以通过声明式或命令式方式完成，但通常 Secret 来源于安全的\
    \ Secret 存储，例如 Azure Key Vault。\n\n创建此 Secret 最简单的方法是通过`kubectl`命令，如清单 7-4 所示。\n\
    \n```bash\nkubectl create secret generic mssql --from-literal=SA_PASSWORD=S0methingS@Str0ng!\n\
    ```\n清单 7-4\n使用`kubectl`创建 Kubernetes Secret\n\n我们现在已准备好将 SQL Server 部署到 Kubernetes\
    \ 上。\n"
- fmt: "### Defining in YAML a SQL Server Deployment\n\nFor our SQL Server Deployment,\
    \ we’re creating another manifest, which we’ll call `sql-deployment.yaml`. You\
    \ will find its content in Listing 7-5.\n\nThere are three specifics that we would\
    \ like to point out:\n\n- **Strategy type – Recreate:** By default, when applying\
    \ an upgrade, for example, Kubernetes would run a rolling process, meaning that\
    \ it would start up a new pod and try to access the database files while the old\
    \ pod is still running. By setting this to Recreate, all the pods in the ReplicaSet\
    \ will be shut down before creating the new ReplicaSet and pods.\n\nSQL Server\
    \ handles this since it has an exclusive lock on the files. But it also means\
    \ the container will create and restart until it can get an exclusive lock on\
    \ the files.\n\n- **`securityContext`:** Our `fsGroup` is `10001`, which means\
    \ that all access to the NFS will also be executed using this group. If you didn’t\
    \ set permissions and/or create that group in Chapter 1, this will fail.\n\n-\
    \ **Hostname:** We are not defining a hostname, so our SQL Server will be dynamically\
    \ named after its pod name. We will explain later in this chapter how this could\
    \ be adjusted.\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: mssql-deployment\nspec:\n  replicas: 1\n  strategy:\n    type: Recreate\n\
    \  selector:\n    matchLabels:\n      app: mssql\n  template:\n    metadata:\n\
    \      labels:\n        app: mssql\n    spec:\n      securityContext:\n      \
    \  fsGroup: 10001\n      containers:\n      - name: mssql\n        image: 'mcr.microsoft.com/mssql/server:2019-CU8-ubuntu-18.04'\n\
    \        ports:\n        - containerPort: 1433\n        env:\n        - name:\
    \ ACCEPT_EULA\n          value: \"Y\"\n        - name: SA_PASSWORD\n         \
    \ valueFrom:\n            secretKeyRef:\n              name: mssql\n         \
    \     key: SA_PASSWORD\n        volumeMounts:\n        - name: mssqldb\n     \
    \     mountPath: /var/opt/mssql\n      volumes:\n      - name: mssqldb\n     \
    \   persistentVolumeClaim:\n          claimName: pvc-nfs-sql-instance-1\n\napiVersion:\
    \ v1\nkind: Service\nmetadata:\n  name: mssql-deployment\nspec:\n  selector:\n\
    \    app: mssql\n  ports:\n  - protocol: TCP\n    port: 31433\n    targetPort:\
    \ 1433\n  type: NodePort\n```\n*Listing 7-5 `sql-deployment.yaml`*\n\nThe most\
    \ important settings, besides the ones we’ve already mentioned, in this manifest\
    \ are the following:\n\n- **Image:** With this file, we will be deploying a SQL\
    \ Server 2019 CU8.\n\n- **Volumes:** We’re only attaching one single PVC, which\
    \ matches the one we’ve created in the previous step. We’re placing a persistent\
    \ volume at `/var/opt/mssql`, and anything written to that directory will be written\
    \ to the persistent volume, which is the key to decoupling data persistency and\
    \ pod lifecycle.\n\n- **Service:** We’re not only deploying a SQL Server pod but\
    \ also a service exposing this pod. The service will be of type `NodePort`, so\
    \ we will need to retrieve the TCP port through `kubectl` before, in order to\
    \ access the instance.\n\nTo deploy our pod and the service, we need to apply\
    \ this manifest again, as shown in Listing 7-6.\n\n```bash\nkubectl apply -f sql-deployment.yaml\n\
    ```\n*Listing 7-6 Apply `sql-deployment.yaml` to Kubernetes cluster*\n\nAfter\
    \ this step, we can use `kubectl` to retrieve the status of our deployment using\
    \ the command in Listing 7-7.\n\n```bash\nkubectl get deployment\n```\n*Listing\
    \ 7-7 Check status of deployment*\n\nIt will usually take a few minutes for the\
    \ deployment to be ready, as you can see in Figure 7-3 where it shows `0/1`. You\
    \ may have to rerun this command a few times (or use the `--watch` switch) until\
    \ it’s done. Keep in mind that unless you have pre-pulled the images, the first\
    \ deployment also involves downloading the SQL Server images, which will – depending\
    \ on your Internet connection – take significantly longer.\n\n![Figure 7-3](images/494804_1_En_7_Chapter/494804_1_En_7_Fig3_HTML.jpg)\n\
    *Figure 7-3 Output of `kubectl get deployment`*\n\nOnce this has completed, we\
    \ can also check the pod’s creation as well as the external TCP port through `kubectl`\
    \ as shown in Listing 7-8.\n\n```bash\nkubectl get pods\nkubectl get service\n\
    ```\n*Listing 7-8 Check status of pod and service*\n\nAs you can see in the output\
    \ (Figure 7-4), the pod gets a unique and random name, which will change every\
    \ time it gets recreated. In our example, the `NodePort` is `32651`. We will need\
    \ this for our subsequent queries to it.\n\n![Figure 7-4](images/494804_1_En_7_Chapter/494804_1_En_7_Fig4_HTML.jpg)\n\
    *Figure 7-4 Output of `kubectl get pods/service`*\n\nWith our SQL Server ready\
    \ and our connection parameters retrieved, we can now use `sqlcmd` as shown in\
    \ Listing 7-9 to run a first query against our instance.\n\n```bash\nsqlcmd -S\
    \ control, -U sa -P  -Q \"SELECT @@SERVERNAME,@@VERSION\"\n```\n*Listing 7-9 `sqlcmd`\
    \ query for server name and version*\n\n> **Note**\n> For all the `sqlcmd` queries\
    \ in this chapter, it is recommended to set up an environment variable with your\
    \ password so you can use this in your queries. The same applies to the port of\
    \ your instance. Also, if you prefer any other client, feel free to modify those\
    \ as you see fit. Also, if you are running this command from your Control Plane,\
    \ make sure `sqlcmd`’s location is included in your `PATH`.\n\nIf you look at\
    \ the output (Figure 7-5), you will notice that the server name matches our pod’s\
    \ name and the version matches what we’ve defined in our manifest.\n\n![Figure\
    \ 7-5](images/494804_1_En_7_Chapter/494804_1_En_7_Fig5_HTML.jpg)\n*Figure 7-5\
    \ Output of “SELECT @@SERVERNAME,@@VERSION”*\n\nNext, let’s create a user database\
    \ called `TestDB1` using the command in Listing 7-10.\n\n```bash\nsqlcmd -S control,\
    \ -U sa -P  -Q \"CREATE DATABASE TestDB1\"\n```\n*Listing 7-10 `sqlcmd` command\
    \ to create a new user database*\n\nIf we now list the directory contents of our\
    \ NFS share using the command in Listing 7-11, we will see the `mdf` and `ldf`\
    \ files for this database.\n\n> **Note**\n> Run this command on the `storage`\
    \ server.\n\n```bash\nls -al /srv/exports/volumes/sql-instance-1/*\n```\n*Listing\
    \ 7-11 List directory contents of NFS share*\n\nYou can see the output from the\
    \ previous command in Figure 7-6.\n\n![Figure 7-6](images/494804_1_En_7_Chapter/494804_1_En_7_Fig6_HTML.jpg)\n\
    *Figure 7-6 Contents of NFS share*\n\nWe now have our first SQL Server user database\
    \ online, running in our Kubernetes cluster."
  raw: '### Defining in YAML a SQL Server Deployment


    For our SQL Server Deployment, we’re creating another manifest, which we’ll call
    *sql-deployment.yaml* . You will find its content in Listing [7-5](#494804_1_En_7_Chapter.xhtml#PC5).


    There are three specifics that we would like to point out:


    *   **Strategy type – Recreate:** By default, when applying an upgrade, for example,
    Kubernetes would run a rolling process, meaning that it would start up a new pod
    and try to access the database files while the old pod is still running. By setting
    this to Recreate, all the pods in the ReplicaSet will be shut down before creating
    the new ReplicaSet and pods.


    SQL Server handles this since it has an exclusive lock on the files. But it also
    means the container will create and restart until it can get an exclusive lock
    on the files.


    *   **securityContext:** Our fsGroup is 10001, which means that all access to
    the NFS will also be executed using this group. If you didn’t set permissions
    and/or create that group in Chapter [1](#494804_1_En_1_Chapter.xhtml), this will
    fail.


    *   **Hostname:** We are not defining a hostname, so our SQL Server will be dynamically
    named after its pod name. We will explain later in this chapter how this could
    be adjusted.


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: mssql-deployment

    spec:

    replicas: 1

    strategy:

    type: Recreate

    selector:

    matchLabels:

    app: mssql

    template:

    metadata:

    labels:

    app: mssql

    spec:

    securityContext:

    fsGroup: 10001

    containers:

    - name: mssql

    image: ''mcr.microsoft.com/mssql/server:2019-CU8-ubuntu-18.04''

    ports:

    - containerPort: 1433

    env:

    - name: ACCEPT_EULA

    value: "Y"

    - name: SA_PASSWORD

    valueFrom:

    secretKeyRef:

    name: mssql

    key: SA_PASSWORD

    volumeMounts:

    - name: mssqldb

    mountPath: /var/opt/mssql

    volumes:

    - name: mssqldb

    persistentVolumeClaim:

    claimName: pvc-nfs-sql-instance-1


    apiVersion: v1

    kind: Service

    metadata:

    name: mssql-deployment

    spec:

    selector:

    app: mssql

    ports:

    - protocol: TCP

    port: 31433

    targetPort: 1433

    type: NodePort

    Listing 7-5

    sql-deployment.yaml

    ```


    The most important settings, besides the ones we’ve already mentioned, in this
    manifest are the following:


    *   **Image:** With this file, we will be deploying a SQL Server 2019 CU8.


    *   **Volumes:** We’re only attaching one single PVC, which matches the one we’ve
    created in the previous step. We’re placing a persistent volume at */var/opt/mssql,*
    and anything written to that directory will be written to the persistent volume,
    which is the key to decoupling data persistency and pod lifecycle.


    *   **Service:** We’re not only deploying a SQL Server pod but also a service
    exposing this pod. The service will be of type NodePort, so we will need to retrieve
    the TCP port through kubectl before, in order to access the instance.


    To deploy our pod and the service, we need to apply this manifest again, as shown
    in Listing [7-6](#494804_1_En_7_Chapter.xhtml#PC6).


    ```

    kubectl apply -f sql-deployment.yaml

    Listing 7-6

    Apply sql-deployment.yaml to Kubernetes cluster

    ```


    After this step, we can use kubectl to retrieve the status of our deployment using
    the command in Listing [7-7](#494804_1_En_7_Chapter.xhtml#PC7).


    ```

    kubectl get deployment

    Listing 7-7

    Check status of deployment

    ```


    It will usually take a few minutes for the deployment to be ready, as you can
    see in Figure [7-3](#494804_1_En_7_Chapter.xhtml#Fig3) where it shows 0/1\. You
    may have to rerun this command a few times (or use the *--watch* switch) until
    it’s done. Keep in mind that unless you have pre-pulled the images, the first
    deployment also involves downloading the SQL Server images, which will – depending
    on your Internet connection – take significantly longer.


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig3_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Output of kubectl get deployment


    Once this has completed, we can also check the pod’s creation as well as the external
    TCP port through kubectl as shown in Listing [7-8](#494804_1_En_7_Chapter.xhtml#PC8).


    ```

    kubectl get pods

    kubectl get service

    Listing 7-8

    Check status of pod and service

    ```


    As you can see in the output (Figure [7-4](#494804_1_En_7_Chapter.xhtml#Fig4)),
    the pod gets a unique and random name, which will change every time it gets recreated.
    In our example, the NodePort is 32651\. We will need this for our subsequent queries
    to it.


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig4_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Output of kubectl get pods/service


    With our SQL Server ready and our connection parameters retrieved, we can now
    use sqlcmd as shown in Listing [7-9](#494804_1_En_7_Chapter.xhtml#PC9) to run
    a first query against our instance.


    ```

    sqlcmd -S control, -U sa -P  -Q "SELECT @@SERVERNAME,@@VERSION"

    Listing 7-9

    sqlcmd query for server name and version

    ```


    Note


    For all the *sqlcmd* queries in this chapter, it is recommended to set up an environment
    variable with your password so you can use this in your queries. The same applies
    to the port of your instance. Also, if you prefer any other client, feel free
    to modify those as you see fit. Also, if you are running this command from your
    Control Plane, make sure sqlcmd’s location is included in your PATH.


    If you look at the output (Figure [7-5](#494804_1_En_7_Chapter.xhtml#Fig5)), you
    will notice that the server name matches our pod’s name and the version matches
    what we’ve defined in our manifest.


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig5_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Output of “SELECT @@SERVERNAME,@@VERSION”


    Next, let’s create a user database called TestDB1 using the command in Listing
    [7-10](#494804_1_En_7_Chapter.xhtml#PC10).


    ```

    sqlcmd -S control, -U sa -P  -Q "CREATE DATABASE TestDB1"

    Listing 7-10

    sqlcmd command to create a new user database

    ```


    If we now list the directory contents of our NFS share using the command in Listing
    [7-11](#494804_1_En_7_Chapter.xhtml#PC11), we will see the mdf and ldf files for
    this database.


    Note


    Run this command on the *storage* server.


    ```

    ls -al /srv/exports/volumes/sql-instance-1/*

    Listing 7-11

    List directory contents of NFS share

    ```


    You can see the output from the previous command in Figure [7-6](#494804_1_En_7_Chapter.xhtml#Fig6).


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig6_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Contents of NFS share


    We now have our first SQL Server user database online, running in our Kubernetes
    cluster.'
  trans: "### 在 YAML 中定义 SQL Server 部署\n\n对于我们的 SQL Server 部署，我们将创建另一个清单文件，命名为`sql-deployment.yaml`。你可以在代码清单\
    \ 7-5 中找到其内容。\n\n我们想特别指出三点：\n\n-   **策略类型 – Recreate（重建）：** 默认情况下，例如在应用升级时，Kubernetes\
    \ 会执行滚动更新过程，这意味着它会启动一个新的 Pod，并在旧 Pod 仍在运行时尝试访问数据库文件。通过将其设置为`Recreate`，在创建新的 ReplicaSet\
    \ 和 Pod 之前，当前 ReplicaSet 中的所有 Pod 都将被关闭。\n    SQL Server 可以处理这种情况，因为它对文件具有独占锁。但这同时也意味着，容器会不断创建和重启，直到它能获得文件的独占锁为止。\n\
    \n-   **`securityContext`（安全上下文）：** 我们的`fsGroup`是`10001`，这意味着对 NFS 的所有访问也将使用此组身份执行。如果你在第一章中没有设置权限和/或创建该组，此操作将失败。\n\
    \n-   **Hostname（主机名）：** 我们没有定义主机名，因此我们的 SQL Server 将根据其 Pod 名称动态命名。我们将在本章后面说明如何调整此设置。\n\
    \n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: mssql-deployment\n\
    spec:\n  replicas: 1\n  strategy:\n    type: Recreate\n  selector:\n    matchLabels:\n\
    \      app: mssql\n  template:\n    metadata:\n      labels:\n        app: mssql\n\
    \    spec:\n      securityContext:\n        fsGroup: 10001\n      containers:\n\
    \      - name: mssql\n        image: 'mcr.microsoft.com/mssql/server:2019-CU8-ubuntu-18.04'\n\
    \        ports:\n        - containerPort: 1433\n        env:\n        - name:\
    \ ACCEPT_EULA\n          value: \"Y\"\n        - name: SA_PASSWORD\n         \
    \ valueFrom:\n            secretKeyRef:\n              name: mssql\n         \
    \     key: SA_PASSWORD\n        volumeMounts:\n        - name: mssqldb\n     \
    \     mountPath: /var/opt/mssql\n      volumes:\n      - name: mssqldb\n     \
    \   persistentVolumeClaim:\n          claimName: pvc-nfs-sql-instance-1\n\napiVersion:\
    \ v1\nkind: Service\nmetadata:\n  name: mssql-deployment\nspec:\n  selector:\n\
    \    app: mssql\n  ports:\n  - protocol: TCP\n    port: 31433\n    targetPort:\
    \ 1433\n  type: NodePort\n```\n*代码清单 7-5 `sql-deployment.yaml`*\n\n除了我们已经提到的设置外，此清单中最重要的设置如下：\n\
    \n-   **镜像：** 通过此文件，我们将部署一个 SQL Server 2019 CU8。\n\n-   **卷：** 我们只挂载了一个 PVC，它与我们在上一步创建的那个相匹配。我们将一个持久卷放置在`/var/opt/mssql`，任何写入该目录的内容都将被写入持久卷，这是将数据持久性与\
    \ Pod 生命周期解耦的关键。\n\n-   **服务：** 我们不仅部署了一个 SQL Server Pod，还部署了一个用于暴露此 Pod 的服务。该服务的类型是`NodePort`，因此我们需要先通过`kubectl`获取\
    \ TCP 端口，才能访问此实例。\n\n要部署我们的 Pod 和服务，我们需要再次应用此清单，如代码清单 7-6 所示。\n\n```bash\nkubectl\
    \ apply -f sql-deployment.yaml\n```\n*代码清单 7-6 将 `sql-deployment.yaml` 应用到 Kubernetes\
    \ 集群*\n\n完成此步骤后，我们可以使用`kubectl`和代码清单 7-7 中的命令来检索部署状态。\n\n```bash\nkubectl get\
    \ deployment\n```\n*代码清单 7-7 检查部署状态*\n\n如图 7-3 所示（显示为`0/1`），部署通常需要几分钟才能准备就绪。你可能需要多次重新运行此命令（或使用`--watch`参数）直到它完成。请记住，除非你预先拉取了镜像，否则首次部署还包括下载\
    \ SQL Server 镜像，根据你的网络连接情况，这将需要更长时间。\n\n![图 7-3](img/494804_1_En_7_Fig3_HTML.jpg)\n\
    *图 7-3 `kubectl get deployment`的输出*\n\n一旦此过程完成，我们也可以通过`kubectl`检查 Pod 的创建情况以及外部\
    \ TCP 端口，如代码清单 7-8 所示。\n\n```bash\nkubectl get pods\nkubectl get service\n```\n\
    *代码清单 7-8 检查 Pod 和服务状态*\n\n如输出（图 7-4）所示，Pod 获得了一个唯一且随机的名称，每次重新创建时该名称都会改变。在我们的示例中，`NodePort`是`32651`。我们后续的查询需要此端口。\n\
    \n![图 7-4](img/494804_1_En_7_Fig4_HTML.jpg)\n*图 7-4 `kubectl get pods/service`的输出*\n\
    \n现在我们的 SQL Server 已就绪，并且已获取连接参数，我们可以如代码清单 7-9 所示使用`sqlcmd`对我们的实例运行第一个查询。\n\n\
    ```bash\nsqlcmd -S control, -U sa -P  -Q \"SELECT @@SERVERNAME,@@VERSION\"\n```\n\
    *代码清单 7-9 `sqlcmd` 查询服务器名称和版本*\n\n> **注意**\n> 对于本章中所有的`sqlcmd`查询，建议设置一个包含密码的环境变量，以便在查询中使用。这同样适用于你实例的端口。此外，如果你更喜欢其他客户端，请随意根据需要修改这些参数。同时，如果你是从控制平面运行此命令，请确保`sqlcmd`的位置包含在你的`PATH`环境变量中。\n\
    \n如果你查看输出（图 7-5），你会注意到服务器名称与我们的 Pod 名称匹配，版本与我们在清单中定义的一致。\n\n![图 7-5](img/494804_1_En_7_Fig5_HTML.jpg)\n\
    *图 7-5 “SELECT @@SERVERNAME,@@VERSION”的输出*\n\n接下来，让我们使用代码清单 7-10 中的命令创建一个名为`TestDB1`的用户数据库。\n\
    \n```bash\nsqlcmd -S control, -U sa -P  -Q \"CREATE DATABASE TestDB1\"\n```\n\
    *代码清单 7-10 `sqlcmd` 命令创建新的用户数据库*\n\n如果我们现在使用代码清单 7-11 中的命令列出 NFS 共享的目录内容，我们将看到此数据库的`mdf`和`ldf`文件。\n\
    \n> **注意**\n> 请在`storage`服务器上运行此命令。\n\n```bash\nls -al /srv/exports/volumes/sql-instance-1/*\n\
    ```\n*代码清单 7-11 列出 NFS 共享的目录内容*\n\n你可以从上一个命令的输出中看到图 7-6。\n\n![图 7-6](img/494804_1_En_7_Fig6_HTML.jpg)\n\
    *图 7-6 NFS 共享的内容*\n\n至此，我们的第一个 SQL Server 用户数据库已在线运行在 Kubernetes 集群中。"
- fmt: "### Additional Configuration Options\n\nWhile the aforementioned environment\
    \ variables only form the bare minimum, there are a lot more, which can all be\
    \ included in your YAML manifest just like the `ACCEPT_EULA` setting. The two\
    \ most important ones are probably\n\n*   `MSSQL_AGENT_ENABLED`: This is false\
    \ by default. Set it to true to enable the SQL Agent service for this instance.\n\
    *   `MSSQL_PID Evaluation`: This setting allows you to choose between `Developer`,\
    \ `Express`, `Web`, `Standard`, and `Enterprise` Editions. Alternatively, you\
    \ can provide a product key.\n\nYou will find the full reference of additional\
    \ configuration options like collation and Language ID in the official docs at\
    \ [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables?view=sql-server-ver15&viewFallbackFrom=sql-server-2019*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables%253Fview%253Dsql-server-ver15%2526viewFallbackFrom%253Dsql-server-2019).\n\
    \nIf you prefer a persistent server name over the dynamic pod name, you can specify\
    \ it in your deployment manifest as shown in Listing [7-12](#494804_1_En_7_Chapter.xhtml#PC12)\
    \ (the last two lines are being added to change the name of the server to `sql01`).\n\
    \n```\nspec:\n  securityContext:\n    fsGroup: 10001\n  hostname:\n    sql01\n\
    Listing 7-12\nDefine a static hostname\n```\n\nTo learn more about persistent\
    \ server names, we recommend this blog post: [*www.centinosystems.com/blog/sql/persistent-servername-when-deploying-sql-server-in-kubernetes/*](https://www.centinosystems.com/blog/sql/persistent-servername-when-deploying-sql-server-in-kubernetes/).\n\
    \n**Note**\nWhile setting the hostname manually is optional, features like replication\
    \ and many third-party tools rely on this. We therefore highly recommend setting\
    \ this in production environments.\n\n### Pod Lifecycle and Data Persistency\n\
    \nWhile you typically wouldn’t trigger this process manually, we’ve elaborated\
    \ on the fact before that Kubernetes separates compute and storage. While pods\
    \ are ephemeral, storage is (mostly) persistent.\n\nLet’s retrieve the name of\
    \ our current pod using `kubectl` (Listing [7-13](#494804_1_En_7_Chapter.xhtml#PC13)).\n\
    \n```\nkubectl get pods\nListing 7-13\nGet pod name\n```\n\nAs you can see in\
    \ Figure [7-7](#494804_1_En_7_Chapter.xhtml#Fig7), our current pod is `mssql-deployment-748c745b8d-w2sf8`.\n\
    \n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig7_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig7_HTML.jpg)\n\
    Figure 7-7\nCurrent Pod name\n\nNow, we’ll use `kubectl` to delete this pod (Listing\
    \ [7-14](#494804_1_En_7_Chapter.xhtml#PC14)).\n\n```\nkubectl delete pod mssql-deployment-748c745b8d-w2sf8\n\
    Listing 7-14\nDelete pod\n```\n\n`Kubectl` will confirm that the pod has been\
    \ deleted, which will take a few seconds (see Figure [7-8](#494804_1_En_7_Chapter.xhtml#Fig8)).\n\
    \n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig8_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig8_HTML.jpg)\n\
    Figure 7-8\nOutput of `kubectl delete pod`\n\nIf we retrieve our pods again, you\
    \ will see (Figure [7-9](#494804_1_En_7_Chapter.xhtml#Fig9)) that a new pod, with\
    \ a new name, has been created immediately.\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig9_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig9_HTML.jpg)\n\
    Figure 7-9\nOutput of `kubectl get pods`\n\nUse `sqlcmd` to list all the databases\
    \ in this instance as shown in Listing [7-15](#494804_1_En_7_Chapter.xhtml#PC15).\n\
    \n```\nsqlcmd -S control, -U sa -P  -Q \"SELECT Name FROM sys.databases\"\nListing\
    \ 7-15\nList databases in our instance\n```\n\nYou will see (Figure [7-10](#494804_1_En_7_Chapter.xhtml#Fig10))\
    \ that our database `TestDB1` is still present, as the storage was reattached\
    \ to the new pod.\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig10_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig10_HTML.jpg)\n\
    Figure 7-10\nList of databases in SQL instance\n\n### Upgrading SQL Server in\
    \ a Deployment\n\nUpgrading an existing SQL Server in a deployment is as easy\
    \ as its initial rollout. We simply need to update the image, which you can do\
    \ either by modifying your manifest’s container image in the Pod Spec and reapplying\
    \ or simply by setting the new image through `kubectl`. In our example in Listing\
    \ [7-16](#494804_1_En_7_Chapter.xhtml#PC16), we will update the image of our `mssql`\
    \ container to CU9.\n\n```\nkubectl set image deployment mssql-deployment mssql=mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04\n\
    Listing 7-16\nUpdate image to CU9\n```\n\nThe key thing here is that Kubernetes\
    \ will shut down the current pod before deploying the new pod (the Kubernetes\
    \ default is to add one and then remove the old).\n\nIf we use `kubectl` to describe\
    \ the deployment (Listing [7-17](#494804_1_En_7_Chapter.xhtml#PC17)), we will\
    \ see that the old replica set got scaled down followed by the new one being scaled\
    \ up. This is again because we’ve set the strategy to `Recreate` (see earlier).\n\
    \n```\nkubectl describe deployment mssql-deployment\nListing 7-17\nDescribe deployment\n\
    ```\n\nAs you can see in Figure [7-11](#494804_1_En_7_Chapter.xhtml#Fig11), the\
    \ preceding command shows the scaling operations.\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig11_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig11_HTML.jpg)\n\
    Figure 7-11\nOutput of Listing [7-17](#494804_1_En_7_Chapter.xhtml#PC17)\n\nThis\
    \ also resulted in a new pod, whose name we can retrieve through `kubectl` again\
    \ (Figure [7-12](#494804_1_En_7_Chapter.xhtml#Fig12)).\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig12_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig12_HTML.jpg)\n\
    Figure 7-12\nOutput of `kubectl get pods`\n\nIf you run `kubectl describe pod`\
    \ on this new Pod, you can see the events that happened during and after the update\
    \ command in this new Pod (Figure [7-13](#494804_1_En_7_Chapter.xhtml#Fig13)).\n\
    \n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig13_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig13_HTML.jpg)\n\
    Figure 7-13\nDescribe pod\n\nRun the command in Listing [7-18](#494804_1_En_7_Chapter.xhtml#PC18).\n\
    \n```\nkubectl rollout history deployment mssql-deployment --revision=2\nListing\
    \ 7-18\nRetrieve history for second revision of a deployment\n```\n\nAs you can\
    \ see in Figure [7-14](#494804_1_En_7_Chapter.xhtml#Fig14), this will show you\
    \ the details of that second revision to this deployment. Any subsequent update\
    \ to this deployment could be retrieved and tracked in the same way.\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig14_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig14_HTML.jpg)\n\
    Figure 7-14\nOutput of Listing [7-18](#494804_1_En_7_Chapter.xhtml#PC18)\n\nIf\
    \ we retrieve the server name and version through `sqlcmd` again (Figure [7-15](#494804_1_En_7_Chapter.xhtml#Fig15)),\
    \ you will see that the server name matches the new pod name and the version has\
    \ changed to CU9.\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig15_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig15_HTML.jpg)\n\
    Figure 7-15\nOutput of \"`SELECT @@SERVERNAME,@@VERSION`\"\n\nWe can also use\
    \ `sqlcmd` again to verify that our `TestDB1` is still there (Figure [7-16](#494804_1_En_7_Chapter.xhtml#Fig16)).\n\
    \n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig16_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig16_HTML.jpg)\n\
    Figure 7-16\nList of databases in SQL instance\n\n**Note**\nJust as we’ve just\
    \ upgraded our SQL Server, we could also roll back a CU upgrade using the same\
    \ methodology.\n\n### Running SQL Server on Kubernetes in Production\n\nJust like\
    \ a traditional SQL Server running on Windows, there are a bunch of factors to\
    \ be accounted for when designing a production environment."
  raw: '### Additional Configuration Options


    While the aforementioned environment variables only form the bare minimum, there
    are a lot more, which can all be included in your YAML manifest just like the
    *ACCEPT_EULA* setting. The two most important ones are probably


    *   **MSSQL_AGENT_ENABLED:** This is false by default. Set it to true to enable
    the SQL Agent service for this instance.


    *   **MSSQL_PID Evaluation:** This setting allows you to choose between Developer,
    Express, Web, Standard, and Enterprise Editions. Alternatively, you can provide
    a product key.


    You will find the full reference of additional configuration options like collation
    and Language ID in the official docs at [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables?view=sql-server-ver15&viewFallbackFrom=sql-server-2019*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables%253Fview%253Dsql-server-ver15%2526viewFallbackFrom%253Dsql-server-2019).


    If you prefer a persistent server name over the dynamic pod name, you can specify
    it in your deployment manifest as shown in Listing [7-12](#494804_1_En_7_Chapter.xhtml#PC12)
    (the last two lines are being added to change the name of the server to *sql01*).


    ```

    spec:

    securityContext:

    fsGroup: 10001

    hostname:

    sql01

    Listing 7-12

    Define a static hostname

    ```


    To learn more about persistent server names, we recommend this blog post: [*www.centinosystems.com/blog/sql/persistent-servername-when-deploying-sql-server-in-kubernetes/*](https://www.centinosystems.com/blog/sql/persistent-servername-when-deploying-sql-server-in-kubernetes/).


    Note


    While setting the hostname manually is optional, features like replication and
    many third-party tools rely on this. We therefore highly recommend setting this
    in production environments.


    ### Pod Lifecycle and Data Persistency


    While you typically wouldn’t trigger this process manually, we’ve elaborated on
    the fact before that Kubernetes separates compute and storage. While pods are
    ephemeral, storage is (mostly) persistent.


    Let’s retrieve the name of our current pod using kubectl (Listing [7-13](#494804_1_En_7_Chapter.xhtml#PC13)).


    ```

    kubectl get pods

    Listing 7-13

    Get pod name

    ```


    As you can see in Figure [7-7](#494804_1_En_7_Chapter.xhtml#Fig7), our current
    pod is *mssql-deployment-748c745b8d-w2sf8*.


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig7_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Current Pod name


    Now, we’ll use kubectl to delete this pod (Listing [7-14](#494804_1_En_7_Chapter.xhtml#PC14)).


    ```

    kubectl delete pod mssql-deployment-748c745b8d-w2sf8

    Listing 7-14

    Delete pod

    ```


    Kubectl will confirm that the pod has been deleted, which will take a few seconds
    (see Figure [7-8](#494804_1_En_7_Chapter.xhtml#Fig8)).


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig8_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Output of kubectl delete pod


    If we retrieve our pods again, you will see (Figure [7-9](#494804_1_En_7_Chapter.xhtml#Fig9))
    that a new pod, with a new name, has been created immediately.


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig9_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Output of kubectl get pods


    Use sqlcmd to list all the databases in this instance as shown in Listing [7-15](#494804_1_En_7_Chapter.xhtml#PC15).


    ```

    sqlcmd -S control, -U sa -P  -Q "SELECT Name FROM sys.databases"

    Listing 7-15

    List databases in our instance

    ```


    You will see (Figure [7-10](#494804_1_En_7_Chapter.xhtml#Fig10)) that our database
    TestDB1 is still present, as the storage was reattached to the new pod.


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig10_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    List of databases in SQL instance


    ## Upgrading SQL Server in a Deployment


    Upgrading an existing SQL Server in a deployment is as easy as its initial rollout.
    We simply need to update the image, which you can do either by modifying your
    manifest’s container image in the Pod Spec and reapplying or simply by setting
    the new image through kubectl. In our example in Listing [7-16](#494804_1_En_7_Chapter.xhtml#PC16),
    we will update the image of our mssql container to CU9.


    ```

    kubectl set image deployment mssql-deployment mssql=mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04

    Listing 7-16

    Update image to CU9

    ```


    The key thing here is that Kubernetes will shut down the current pod before deploying
    the new pod (the Kubernetes default is to add one and then remove the old).


    If we use kubectl to describe the deployment (Listing [7-17](#494804_1_En_7_Chapter.xhtml#PC17)),
    we will see that the old replica set got scaled down followed by the new one being
    scaled up. This is again because we’ve set the strategy to Recreate (see earlier).


    ```

    kubectl describe deployment mssql-deployment

    Listing 7-17

    Describe deployment

    ```


    As you can see in Figure [7-11](#494804_1_En_7_Chapter.xhtml#Fig11), the preceding
    command shows the scaling operations.


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig11_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Output of Listing [7-17](#494804_1_En_7_Chapter.xhtml#PC17)


    This also resulted in a new pod, whose name we can retrieve through kubectl again
    (Figure [7-12](#494804_1_En_7_Chapter.xhtml#Fig12)).


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig12_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Output of kubectl get pods


    If you run `kubectl describe pod` on this new Pod, you can see the events that
    happened during and after the update command in this new Pod (Figure [7-13](#494804_1_En_7_Chapter.xhtml#Fig13)).


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig13_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    Describe pod


    Run the command in Listing [7-18](#494804_1_En_7_Chapter.xhtml#PC18).


    ```

    kubectl rollout history deployment mssql-deployment --revision=2

    Listing 7-18

    Retrieve history for second revision of a deployment

    ```


    As you can see in Figure [7-14](#494804_1_En_7_Chapter.xhtml#Fig14), this will
    show you the details of that second revision to this deployment. Any subsequent
    update to this deployment could be retrieved and tracked in the same way.


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig14_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig14_HTML.jpg)


    Figure 7-14


    Output of Listing [7-18](#494804_1_En_7_Chapter.xhtml#PC18)


    If we retrieve the server name and version through sqlcmd again (Figure [7-15](#494804_1_En_7_Chapter.xhtml#Fig15)),
    you will see that the server name matches the new pod name and the version has
    changed to CU9.


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig15_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig15_HTML.jpg)


    Figure 7-15


    Output of “SELECT @@SERVERNAME,@@VERSION”


    We can also use sqlcmd again to verify that our TestDB1 is still there (Figure
    [7-16](#494804_1_En_7_Chapter.xhtml#Fig16)).


    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig16_HTML.jpg](images/494804_1_En_7_Chapter/494804_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    List of databases in SQL instance


    Note


    Just as we’ve just upgraded our SQL Server, we could also roll back a CU upgrade
    using the same methodology.


    ## Running SQL Server on Kubernetes in Production


    Just like a traditional SQL Server running on Windows, there are a bunch of factors
    to be accounted for when designing a production environment.'
  trans: "\n### 额外配置选项\n\n虽然上述环境变量仅构成了最基本的一组，但还有更多可以配置的选项，它们都可以像 `ACCEPT_EULA` 设置一样包含在你的\
    \ YAML 清单文件中。其中最重要的两个可能是：\n\n*   `MSSQL_AGENT_ENABLED`：默认值为 false。将其设置为 true 可为此实例启用\
    \ SQL 代理服务。\n*   `MSSQL_PID Evaluation`：此设置允许你在 `Developer`、`Express`、`Web`、`Standard`\
    \ 和 `Enterprise` 版本之间进行选择。或者，你也可以提供一个产品密钥。\n\n你可以在官方文档中找到关于排序规则和语言 ID 等额外配置选项的完整参考：[*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables?view=sql-server-ver15&viewFallbackFrom=sql-server-2019*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables%253Fview%253Dsql-server-ver15%2526viewFallbackFrom%253Dsql-server-2019)。\n\
    \n如果你更希望使用持久的服务器名称而不是动态的 Pod 名称，可以在你的部署清单中指定它，如清单 7-12 所示（最后两行是为了将服务器名称更改为 `sql01`\
    \ 而添加的）。\n\n```\nspec:\n  securityContext:\n    fsGroup: 10001\n  hostname:\n\
    \    sql01\n清单 7-12\n定义静态主机名\n```\n\n要了解更多关于持久服务器名称的信息，我们推荐这篇博客文章：[*www.centinosystems.com/blog/sql/persistent-servername-when-deploying-sql-server-in-kubernetes/*](https://www.centinosystems.com/blog/sql/persistent-servername-when-deploying-sql-server-in-kubernetes/)。\n\
    \n**注意**\n虽然手动设置主机名是可选的，但像复制这样的功能以及许多第三方工具都依赖于它。因此，我们强烈建议在生产环境中进行此设置。\n\n### Pod\
    \ 生命周期与数据持久性\n\n虽然你通常不会手动触发此过程，但我们之前已经详细阐述过，Kubernetes 将计算和存储分离。Pod 是短暂的，而存储（大部分）是持久的。\n\
    \n让我们使用 `kubectl` 检索当前 Pod 的名称（清单 7-13）。\n\n```\nkubectl get pods\n清单 7-13\n获取\
    \ Pod 名称\n```\n\n如图 7-7 所示，我们当前的 Pod 是 `mssql-deployment-748c745b8d-w2sf8`。\n\n\
    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig7_HTML.jpg](img/494804_1_En_7_Fig7_HTML.jpg)\n\
    图 7-7\n当前 Pod 名称\n\n现在，我们将使用 `kubectl` 删除这个 Pod（清单 7-14）。\n\n```\nkubectl delete\
    \ pod mssql-deployment-748c745b8d-w2sf8\n清单 7-14\n删除 Pod\n```\n\n`Kubectl` 将确认\
    \ Pod 已被删除，这需要几秒钟时间（见图 7-8）。\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig8_HTML.jpg](img/494804_1_En_7_Fig8_HTML.jpg)\n\
    图 7-8\n`kubectl delete pod` 的输出\n\n如果我们再次检索我们的 Pod，你将看到（图 7-9）一个新的、具有新名称的 Pod\
    \ 已被立即创建。\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig9_HTML.jpg](img/494804_1_En_7_Fig9_HTML.jpg)\n\
    图 7-9\n`kubectl get pods` 的输出\n\n使用 `sqlcmd` 列出此实例中的所有数据库，如清单 7-15 所示。\n\n```\n\
    sqlcmd -S control, -U sa -P  -Q \"SELECT Name FROM sys.databases\"\n清单 7-15\n\
    列出我们实例中的数据库\n```\n\n你将看到（图 7-10）我们的数据库 `TestDB1` 仍然存在，因为存储已重新挂载到新的 Pod 上。\n\n\
    ![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig10_HTML.jpg](img/494804_1_En_7_Fig10_HTML.jpg)\n\
    图 7-10\nSQL 实例中的数据库列表\n\n### 在部署中升级 SQL Server\n\n在部署中升级现有的 SQL Server 与其初始部署一样简单。我们只需更新镜像，这可以通过修改\
    \ Pod 规范中清单的容器镜像并重新应用来完成，或者简单地通过 `kubectl` 设置新镜像。在清单 7-16 的示例中，我们将把我们的 `mssql`\
    \ 容器镜像更新到 CU9。\n\n```\nkubectl set image deployment mssql-deployment mssql=mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04\n\
    清单 7-16\n将镜像更新为 CU9\n```\n\n这里的关键是 Kubernetes 将在部署新 Pod 之前关闭当前 Pod（Kubernetes\
    \ 默认是先添加一个新 Pod，然后移除旧的）。\n\n如果我们使用 `kubectl` 来描述这个部署（清单 7-17），我们将看到旧的副本集被缩容，随后新的副本集被扩容。这再次是因为我们将策略设置为\
    \ `Recreate`（如前所述）。\n\n```\nkubectl describe deployment mssql-deployment\n清单 7-17\n\
    描述部署\n```\n\n如图 7-11 所示，上述命令显示了扩容操作。\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig11_HTML.jpg](img/494804_1_En_7_Fig11_HTML.jpg)\n\
    图 7-11\n清单 7-17 的输出\n\n这也导致了一个新的 Pod，我们可以通过 `kubectl` 再次检索其名称（图 7-12）。\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig12_HTML.jpg](img/494804_1_En_7_Fig12_HTML.jpg)\n\
    图 7-12\n`kubectl get pods` 的输出\n\n如果你在这个新的 Pod 上运行 `kubectl describe pod`，你可以看到在此更新命令期间及之后发生在此新\
    \ Pod 中的事件（图 7-13）。\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig13_HTML.jpg](img/494804_1_En_7_Fig13_HTML.jpg)\n\
    图 7-13\n描述 Pod\n\n运行清单 7-18 中的命令。\n\n```\nkubectl rollout history deployment mssql-deployment\
    \ --revision=2\n清单 7-18\n检索部署第二个修订版的历史记录\n```\n\n如图 7-14 所示，这将向你显示该部署第二个修订版的详细信息。对此部署的任何后续更新都可以用同样的方式检索和跟踪。\n\
    \n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig14_HTML.jpg](img/494804_1_En_7_Fig14_HTML.jpg)\n\
    图 7-14\n清单 7-18 的输出\n\n如果我们再次通过 `sqlcmd` 检索服务器名称和版本（图 7-15），你会看到服务器名称与新 Pod 名称匹配，并且版本已更改为\
    \ CU9。\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig15_HTML.jpg](img/494804_1_En_7_Fig15_HTML.jpg)\n\
    图 7-15\n\"`SELECT @@SERVERNAME,@@VERSION`\" 的输出\n\n我们也可以再次使用 `sqlcmd` 来验证我们的 `TestDB1`\
    \ 是否仍然存在（图 7-16）。\n\n![../images/494804_1_En_7_Chapter/494804_1_En_7_Fig16_HTML.jpg](img/494804_1_En_7_Fig16_HTML.jpg)\n\
    图 7-16\nSQL 实例中的数据库列表\n\n**注意**\n正如我们刚刚升级了 SQL Server 一样，我们也可以使用相同的方法回滚 CU 升级。\n\
    \n### 在生产环境中于 Kubernetes 上运行 SQL Server\n\n就像在 Windows 上运行的传统 SQL Server 一样，在设计生产环境时需要考虑一系列因素。\n"
- fmt: '# Advanced Disk Topologies


    Storage is always a key consideration when operating SQL Server in production.
    In our previous example, we’ve deployed logs and data to the same NFS drive including
    a mix of user and system databases.


    Instead, you could define multiple persistent volumes and persistent volume claims
    and attach them to your pod, which would be the equivalent to having multiple
    drives on a Windows Server.


    You can also use these three environment variables, to specify the default directories:


    *   `MSSQL_DATA_DIR`

    *   `MSSQL_LOG_DIR`

    *   `MSSQL_BACKUP_DIR`


    Any new user databases will be created in these locations.


    Again, all PVCs will be mounted in the container at their defined locations on
    startup, and the master database will online the user databases.


    # Resource Management (Limits and Requests)


    While the storage configuration takes care of our data portion, we will also need
    to consider compute, which effectively means CPU and memory. In Kubernetes, this
    is managed through `limits` and `requests`, and those can be defined on both the
    Pod and namespace levels.


    A request is the guaranteed, minimum resource amount to be allocated. If you define
    a request for a pod that can’t be fulfilled (e.g., requesting 128GB of memory
    on a 64GB RAM machine), the pod won’t start.


    A limit on the other hand defines the maximum that can be allocated to a resource.
    By default, no limit is being configured, which means that by default a pod can
    consume (theoretically) an indefinite amount of memory and CPU.


    In the case of SQL Server, the server instance settings still apply, so make sure
    to set them to configure those.


    The limits and requests should ideally go into your manifest (though you could
    theoretically set them imperatively through `kubectl`). They will go to a new
    section called `resources` for each container as shown in Listing [7-19](#494804_1_En_7_Chapter.xhtml#PC19).


    ```

    spec:

    containers:

    - name: mssql

    resources:

    requests:

    cpu: 1

    memory: 2Gi

    limits:

    cpu: 1

    memory: 4Gi

    Listing 7-19

    Resource section in YAML manifest

    ```


    This specific setting would grant SQL Server exactly one CPU core, a minimum of
    2GB of RAM (which is the minimum requirement, as per [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-ver15#system*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup%253Fview%253Dsql-server-ver15%2523system)),
    and a maximum of 4GB of RAM. The 4GB is what the container will see as its available
    limit. Due to the architecture of `SQLPAL`, a SQL Server on Linux by default will
    only see 80% of this value, which can be adjusted by using `mssql-conf`.


    **Note**


    We highly recommend to always configure a `Max Server Memory` within your SQL
    Server instance as well as Kubernetes limits for CPU and memory.


    If you want to learn more about memory settings for running SQL Server on Kubernetes,
    we highly recommend this blog post: [*www.centinosystems.com/blog/sql/memory-settings-for-running-sql-server-in-kubernetes/*](https://www.centinosystems.com/blog/sql/memory-settings-for-running-sql-server-in-kubernetes/).


    # Backup (and Restore)


    Of course, another important question is: How and where do I back up my data?
    The first part is very easy: you can use your preferred existing techniques, which
    can be something as simple as a maintenance plan or external tools like dbatools
    ([*https://dbatools.io/*](https://dbatools.io/)) or Ola Hallengren’s framework
    ([*https://ola.hallengren.com/sql-server-backup.html*](https://ola.hallengren.com/sql-server-backup.html)).
    Those backups can also be scheduled using the SQL Server Agent.


    The part where it gets more interesting is the “where” part. Effectively, you
    are given two options:


    *   `Back up to URL`: Starting with SQL Server 2016, Microsoft implemented the
    ability to directly back up to (and restore from) Azure Blob Storage. The exact
    syntax and requirements can be found at [*https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/sql-server-backup-to-url?view=sql-server-ver15*](https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/sql-server-backup-to-url%253Fview%253Dsql-server-ver15).

    *   **Attach an additional persistent volume.** Alternatively, you could attach
    a dedicated additional volume, which could either be cloud native (like Azure
    Disk or Azure Files) or any other storage system that allows you to physically
    store your data in a different place, like NFS, iSCSI, or Fiber Channel.


    The same logic applies to restores. If you want to copy an existing backup file
    to your SQL instance, you can do so using `kubectl`. The important concept is
    that the file needs to be accessible to the SQL Server process.


    The general syntax for such a copy task can be found in Listing [7-20](#494804_1_En_7_Chapter.xhtml#PC20).


    ```

    kubectl cp LocalFile TargetPod:TargetFile -c ContainerName

    Listing 7-20

    Generic code to copy a local file to a container

    ```


    In our specific case, to copy the local file `AdventureWorks2017.bak` to the data
    directory of our pod `mssql-deployment-748c745b8d-7pvgn`, the command would look
    like the one in Listing [7-21](#494804_1_En_7_Chapter.xhtml#PC21).


    ```

    kubectl cp AdventureWorks2017.bak mssql-deployment-748c745b8d-7pvgn:var/opt/mssql/data/AdventureWorks2017.bak
    -c mssql

    Listing 7-21

    Code to copy a local file to a container

    ```


    After copying, this file can then be restored using `sqlcmd`, Azure Data Studio,
    SQL Server Management Studio, or any other client tool. We only recommend this
    for smaller files as you have to copy the file inside the container, which consumes
    space and takes time.


    **Note**


    Kubernetes is just our platform to run SQL Server – it does not replace the need
    for native SQL backups!


    # Summary


    In this chapter, we’ve covered everything around running a standalone SQL Server
    instance in a pod in Kubernetes, from basic deployment over upgrades up to necessary
    considerations to run a SQL Server on Kubernetes in your production environment.
    In the next chapter, we will look at how to monitor the cluster and its applications.


    # 8. Monitoring SQL Server on Kubernetes


    While we can use `kubectl` to look at the log files of specific pods, this simply
    does not qualify as a monitoring solution, and due to the distributed and ephemeral
    nature of workloads between nodes, pods, and containers, we really think that
    a central looking glass into your environment is necessary to analyze and catch
    issues fast enough when they occur – or even before.


    Therefore, we would like to introduce you to two open source solutions that fully
    integrate with Kubernetes and SQL Server, Grafana for performance and metric monitoring
    and Kibana for log aggregation and analysis.


    While Kubernetes has a built-in dashboard, it just doesn’t deliver enough for
    a production environment.


    Both Grafana and Kibana are open source tools so you can view and contribute to
    their code bases.


    # Grafana for Performance Monitoring


    The Grafana Portal provides performance metrics and insights on the status and
    performance of a Kubernetes Node itself, as well as SQL Server–specific metrics.


    Let us start by giving you an overview of the main relevant content with regard
    to SQL Server on Kubernetes – meaning system metrics, followed by SQL Server metrics
    – before guiding you on how to install and configure this solution.'
