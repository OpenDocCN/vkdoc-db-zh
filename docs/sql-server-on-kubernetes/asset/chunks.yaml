    \n图 9-3 Grafana 门户 – SQL MI 指标\n\n除了这个仪表板，图 [9-4](#494804_1_En_9_Chapter.xhtml#Fig4)\
    \ 中显示的仪表板也会被自动部署。\n\n![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig4_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig4_HTML.jpg)\n\
    \n图 9-4 Grafana 门户中的内置仪表板\n\n当然，你也可以像我们在前一章中所做的那样，添加任何现有的仪表板或创建自己的仪表板。\n\n除了 Grafana，`Azure\
    \ Arc–enabled Data Services` 默认也附带 `Kibana` 及其先决条件，因此同样无需手动部署。\n\n## Connectivity\
    \ Modes to Azure Portal\n\n`Azure Arc–enabled Data Services` 附带一个到 `Azure Portal`\
    \ 的后向通道，允许你上传安装的日志和指标。这使你可以在一个地方管理所有数据资产——无论它是在本地 `Azure Arc` 上运行的 `Managed Instance`，还是\
    \ `Azure` 中的 `Azure SQL DB`。此信息也用于计费目的。\n\n根据你的基础设施、位置和需求，你可以选择两种模式：\n\n- **直接连接：**\
    \ 在此模式下，你的日志和指标会不断发送到 `Azure Portal`，使数据几乎立即可用于分析。\n- **间接连接：** 在此模式下，你需要手动触发或计划导出和上传指标及日志。如果你所在位置互联网连接有限，这尤其有用。\n\
    \n一旦资源的 `data` 被上传到 `Azure`，它就会在门户中显示，如图 [9-5](#494804_1_En_9_Chapter.xhtml#Fig5)\
    \ 的示例所示。\n\n![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig5_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig5_HTML.jpg)\n\
    \n图 9-5 在 Azure 门户中显示的 CPU 指标\n\n## Data Services\n\n在我们的 `Data Controller` 之上是\
    \ `Data Services`，在撰写本文时，它可以是 `Azure Arc SQL Managed Instance` 或 `Azure Database\
    \ for PostgreSQL`。\n\n我们将只关注 `SQL Managed Instance`，因为 `PostgreSQL` 超出了本书的范围。\n\
    \n### Azure Arc SQL Managed Instance\n\n`Azure Arc–enabled SQL Managed Instance`\
    \ 是你的 SQL Server 提升和转移版本。它使你能够将工作负载无缝迁移到 `Azure Arc`，因为它与本地 `SQL Server` 安装提供了高度兼容性，据记录其兼容性接近\
