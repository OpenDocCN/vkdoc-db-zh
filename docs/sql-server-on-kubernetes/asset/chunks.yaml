- fmt: '## Modern Application Deployment


    现在我们已经讨论了核心容器基础知识，比如如何启动容器、访问这些应用程序，以及独立于容器生命周期持久化数据，让我们转而讨论容器在现代应用程序部署场景中的使用方式，并介绍容器编排器的需求。


    在本章到目前为止，我们已经展示了启动容器、在网络上公开该应用程序以及将持久存储附加到容器的配置。但在生产系统中如何大规模地完成这些工作？你希望每次需要启动容器时都登录服务器并输入`docker
    run`吗？你希望跟踪你的应用程序正在监听/发布哪些端口吗？不，实施该配置并跟踪资源在哪里以及如何访问这些资源并非一项简单的任务。这正是容器编排器发挥作用的地方。


    让我们从一个示例应用程序栈开始，如图[2-24](#494804_1_En_2_Chapter.xhtml#Fig24)所示。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig24_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig24_HTML.jpg)


    图 2-24


    示例应用程序架构


    关于如何使用容器部署这个架构，有一些基本问题：


    1.  这些基于容器的应用程序如何在数据中心部署和启动？

    2.  这些基于容器的应用程序在数据中心的哪些服务器上运行？

    3.  这些基于容器的应用程序如何扩展，如果我们想从2个Web服务器扩展到20个以应对工作负载激增怎么办？

    4.  我们如何一致地部署这个应用程序栈？

    5.  我们如何为测试或在另一个数据中心或云中部署到另一个环境？

    6.  我们或我们的任何应用程序如何访问这些服务？

    7.  哪些IP或DNS名称与这些应用程序相关联？


    容器编排器有助于回答这些问题。


    ## 容器编排器的需求


    容器编排器是一种软件，用于帮助管理基于容器的应用程序的部署。容器编排器基于期望状态和控制器的核心概念工作。容器编排器会计算在数据中心或云中的计算资源集合的何处运行你的工作负载，启动这些容器，并保持这些容器正常运行并处于定义的状态。


    让我们介绍容器编排器的一些关键功能：


    *   **工作负载放置：** 给定数据中心中的一组服务器，选择在哪台服务器上运行容器。

    *   **管理状态：** 启动容器并保持其在线。如果某些原因导致基于容器的应用程序停止或变得不可用，容器编排器可以做出反应并重新启动容器。

    *   **部署的速度和一致性：** 代码用于定义应用程序部署。容器编排器将部署该代码中定义的内容。此代码用于快速且一致地部署我们的应用程序。

    *   **隐藏集群的复杂性：** 容器编排器暴露了一个程序化API进行交互，因此用户可以较少关注我们应用程序的物理基础设施，而更专注于应用程序的部署方式。

    *   **持久的应用程序访问端点：** 容器编排器将跟踪哪些服务可用，并为我们基于容器的应用程序提供的服务提供持久的访问。


    有几种不同的容器编排器可用，本书重点介绍Kubernetes（[*https://kubernetes.io/*](https://kubernetes.io/)），因为它已成为开源容器编排器的标准。因此，本书的其余部分将重点介绍如何构建Kubernetes集群并将SQL
    Server部署到该环境中。


    ## 更多资源


    要更深入地了解Docker卷，请查看Anthony的博客系列“在Docker容器中持久化SQL Server数据”：


    *   [*www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-1/*](http://www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-1/)

    *   [*www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-2/*](http://www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-2/)

    *   [*www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-3/*](http://www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-3/)


    看看我们的技术评审和容器专家Andrew Pruski (*@dbafromthecold*)的容器博客系列。只要是关于容器的，Andrew很可能都写过博客：


    *   [*https://dbafromthecold.com/2017/03/15/summary-of-my-container-series/*](https://dbafromthecold.com/2017/03/15/summary-of-my-container-series/)


    另外，请务必看看我们的好朋友和全方位的SQL Server专家Bob Ward (*@bobwardms*)提供的资源。容器中的SQL Server就是Linux上的SQL
    Server。如果你想深入了解SQL Server在Linux上的工作原理，请务必查看Bob的书*Pro SQL Server on Linux*，Anthony非常荣幸地担任了该书的技术评审：


    *   **GitHub:** [*https://github.com/microsoft/bobsql*](https://github.com/microsoft/bobsql)

    *   ***Pro SQL Server on Linux:*** [*www.apress.com/gp/book/9781484241271*](https://www.apress.com/gp/book/9781484241271)

    *   ***SQL Server 2019 Revealed:*** [*www.apress.com/gp/book/9781484254189*](https://www.apress.com/gp/book/9781484254189)


    ## 总结


    Kubernetes是一个容器编排器，在本章中，我们奠定了容器工作原理的基础。我们展示了什么是容器以及容器如何提供应用程序隔离。容器用于快速部署应用程序，在我们的示例中，我们在容器中运行了SQL
    Server。本章的一个关键概念是需要将配置和状态与容器生命周期解耦，其核心工具是用于注入配置的环境变量和独立于容器生命周期持久化状态（数据）的卷。随着你学习如何在Kubernetes上部署SQL
    Server，这些核心概念将在本书的其余部分被重新审视和利用。


    # 3. Kubernetes架构


    本章介绍Kubernetes，描述其在现代应用程序部署中的角色、提供的优势及其架构。从其优势开始，你将学习Kubernetes在现代基于容器的应用程序部署中提供的价值。接下来，你将学习Kubernetes
    API如何使你能够构建和部署下一代应用程序和系统。在该API中，你将学习Kubernetes提供的用于定义和部署应用程序及系统的核心API原语。然后，你将学习Kubernetes集群及其组件的关键概念，并了解Kubernetes网络基础知识。'
  raw: '## Modern Application Deployment


    Now that we have discussed core container fundamentals like how to start containers,
    access those applications, and persist data independent of the container’s lifecycle,
    let’s shift the conversation to how containers are used in modern application
    deployment scenarios and introduce the need for container orchestrators.


    So far in this chapter, we have showed the configuration to start up a container,
    expose that application on the network, and also attach persistent storage to
    a container. But how is this done at scale in production systems? Do you want
    to be logging into servers and typing `docker run` each time you need to start
    up a container? Do you want to be tracking which ports your applications are listening/published
    on? No, implementing that configuration and also tracking what resources are where
    and how to access those is not a trivial task. This is where container orchestrators
    come into play.


    Let’s start off with an example application stack like the one in Figure [2-24](#494804_1_En_2_Chapter.xhtml#Fig24).


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig24_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig24_HTML.jpg)


    Figure 2-24


    Example application architecture


    There are some basic questions on how this is deployed using containers:


    1.  How are these container-based applications deployed in our data center, and
    how are they started up?


    2.  Where do these container-based applications run in our data center and on
    which servers?


    3.  How do these container-based applications scale, and what if we wanted to
    scale from 2 to 20 web servers to support a burst in workload?


    4.  How do we consistently deploy this application stack?


    5.  How do we deploy this in another environment for testing or perhaps in another
    data center or cloud?


    6.  How do we or any of our applications access the services?


    7.  What IPs or DNS names are associated with these applications?


    Container orchestrators help answer these questions.


    ## The Need for Container Orchestrators


    A container orchestrator is software that helps manage the deployment of your
    container-based applications. Container orchestrators are based on the core concepts
    of desired state and controllers. Container orchestrators will figure out where
    to run your workload in a collection of compute resources in your data center
    or cloud, start those containers up, and keep those containers up and running
    and in the defined state.


    Let’s introduce some of the key functionality of container orchestrators:


    *   **Workload placement:** Given a collection of servers in a data center, selecting
    which servers to run containers on.


    *   **Managing state:** Starting containers and also keeping them online. If something
    causes a container-based application to stop or become unavailable, a container
    orchestrator can react and restart the containers.


    *   **Speed and consistency of deployment:** Code is used to define application
    deployments. A container orchestrator will deploy what is defined in that code.
    This code is used to quickly and consistently deploy our applications.


    *   **Hide complexity in Clusters:** A container orchestrator exposes a programmatic
    API to interact with so users can be less concerned about the physical infrastructure
    for our applications and more focused on how applications are deployed.


    *   **Persistent application access endpoints:** A container orchestrator will
    track which services are available and provide persistent access to the services
    provided by our container-based applications.


    There are several different container orchestrators available, and in this book,
    the focus is on Kubernetes ([*https://kubernetes.io/*](https://kubernetes.io/)),
    as it has become the standard for open source container orchestrators. Therefore,
    the remainder of this book is focused on how to build a Kubernetes cluster and
    deploy SQL Server into that environment.


    ## More Resources


    For a deeper dive into Docker Volumes, check out Anthony’s blog series “Persisting
    SQL Server Data in Docker Containers”:


    *   [*www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-1/*](http://www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-1/)


    *   [*www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-2/*](http://www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-2/)


    *   [*www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-3/*](http://www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-3/)


    Check out our technical reviewer and container expert Andrew Pruski’s (*@dbafromthecold*)
    container blog series. If it has to do with containers, Andrew has likely blogged
    about it:


    *   [*https://dbafromthecold.com/2017/03/15/summary-of-my-container-series/*](https://github.com/nocentino/presentations)


    Also, make sure to take a look at the resources available by our good friend and
    all-around SQL Server expert Bob Ward (*@bobwardms*). SQL Server in containers
    is SQL Server on Linux. If you want to dive into how SQL Server on Linux works,
    be sure to check out Bob’s book *Pro SQL Server on Linux*, which Anthony had the
    absolute pleasure of being the technical reviewer:


    *   **GitHub:** [*https://github.com/microsoft/bobsql*](https://github.com/microsoft/bobsql)


    *   ***Pro SQL Server on Linux*****:** [*www.apress.com/gp/book/9781484241271*](https://www.apress.com/gp/book/9781484241271)


    *   ***SQL Server 2019 Revealed*****:** [*www.apress.com/gp/book/9781484254189*](https://www.apress.com/gp/book/9781484254189)


    ## Summary


    Kubernetes is a container orchestrator, and in this chapter, we have laid the
    foundation of how containers work. We showed what a container is and how containers
    provide application isolation. Containers are used to quickly deploy applications,
    and in our examples, we ran SQL Server in a container. One of the key concepts
    in this chapter is the need to *decouple configuration and state* from a container’s
    lifecycle, and the core tools for that are environment variables to inject configuration
    and Volumes to persist state (data) independently of a container’s lifecycle.
    These are core concepts that will be revisited and leveraged throughout the remainder
    of the book as you learn how to deploy SQL Server on Kubernetes.


    # 3. Kubernetes Architecture


    This chapter introduces Kubernetes, describing its role in modern application
    deployment, the benefits it provides, and its architecture. Starting off with
    its benefits, you will learn the value Kubernetes provides in modern container-based
    application deployment. Next, you will learn how the Kubernetes API enables you
    to build and deploy next-generation applications and systems. In that API, you
    will learn the core API primitives Kubernetes provides to define and deploy applications
    and systems. Then you will learn the key concepts of a Kubernetes cluster and
    its components and learn Kubernetes networking fundamentals.'
