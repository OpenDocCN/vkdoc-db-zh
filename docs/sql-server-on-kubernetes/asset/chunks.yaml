- fmt: '### SQL Server Logs in Kibana


    One set of filters we want to point out explicitly though is how to retrieve the
    logs for our SQL Server instance in Kibana.


    One very easy way would be to just use free text search as shown in Figure [8-20](#494804_1_En_8_Chapter.xhtml#Fig20).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig20_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig20_HTML.jpg)

    *Figure 8-20: Free text filter in Kibana*


    This will involve a lot of unwanted noise though. The better solution is to add
    a proper filter. To do so, click `Add filter` below the filter bar as shown in
    Figure [8-21](#494804_1_En_8_Chapter.xhtml#Fig21).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig21_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig21_HTML.jpg)

    *Figure 8-21: Add filter in Kibana*


    Select the Field `kuberneters.container_name`, the Operator `is`, and the Value
    `mssql` as shown in Figure [8-22](#494804_1_En_8_Chapter.xhtml#Fig22) and click
    `Save`.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig22_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig22_HTML.jpg)

    *Figure 8-22: Add filter for mssql in Kibana*


    This will bring up log files from all our SQL Server containers, as shown in Figure
    [8-23](#494804_1_En_8_Chapter.xhtml#Fig23).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig23_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig23_HTML.jpg)

    *Figure 8-23: Filter for mssql in Kibana*


    Of course, this can also be combined with the free text filter. If you add `"Login
    failed"` to the filter as shown in Figure [8-24](#494804_1_En_8_Chapter.xhtml#Fig24),
    you will get all failed login events in our SQL Server, as this log also includes
    the full SQL Server Error Log.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig24_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig24_HTML.jpg)

    *Figure 8-24: SQL Server Error Log in Kibana*


    In our example, that is already sufficient. In case you are running multiple SQL
    Server instances, you could also add additional filters for settings like `namespace`,
    `deployment`, or `pod` name.


    ## Cleanup


    To make sure that your upcoming demos run in the correct namespace, reset the
    current context to the default namespace as shown in Listing [8-17](#494804_1_En_8_Chapter.xhtml#PC17).


    ```

    kubectl config set-context --current --namespace=default

    ```

    *Listing 8-17: Reset kubectl context*


    Note


    The ports used in this example will also be used by services in the upcoming chapters.
    Either keep that in mind and modify the ports in those chapters or delete the
    resources from this chapter first.


    ## Summary


    In this chapter, we’ve covered ways on how to monitor the cluster and its applications
    using Grafana and the Kibana dashboard. We then used those portals to gain insights
    about our previously deployed SQL Server on Kubernetes. Let’s move on to the next
    chapter to look at Azure Arc–enabled Data Services, which allow us to deploy SQL
    Server on Kubernetes with high-availability options.


    # 9. Azure Arc–Enabled Data Services and High Availability for SQL Server on Kubernetes


    This chapter introduces Azure Arc–enabled Data Services and the powerful capabilities
    they provide to deploy and manage local, on-premises, and hybrid cloud data resources
    using the same automation and centralized control management and tooling that
    you get from the Azure Cloud. We will show you how to deploy and manage databases
    running on SQL Server in your corporate data center as if they were part of the
    Azure platform, all using the power of Kubernetes. Azure Arc–enabled Data Services
    are also the answer to the question how to implement availability groups (AGs)
    for SQL Server (using Managed Instances) on Kubernetes.


    ## What’s Azure Arc?


    At its core, Microsoft Azure Arc provides Azure management services wherever you
    have deployed resources on-premises or any cloud. It enables you to have consistent
    management services and tooling for your organizations’ core operations across
    technology architectures wherever deployed. Let’s look at the core features of
    Azure Arc:


    - **Unified experience across on-premises and hybrid cloud:** Familiar tools like
    Azure Portal, the Azure CLI, PowerShell, and REST API are available to you to
    manage and deploy systems.

    - **Deployment and operations:** With a unified set of tools, deployments and
    operations are consistent wherever you deploy, on-premises or in any cloud. Unified
    tooling enables your organization to use the same code and tools in any deployment
    scenario wherever deployed. A pivotal element to operations is performance and
    availability monitoring, and Azure Monitor is available to help you do that for
    your Azure Arc–enabled resources.

    - **Consolidated access controls, security, policy management, and logging:**
    Implementing more than one security model based on where your resources are deployed
    is challenging and risky since you potentially have to manage multiple sets of
    security rules and their implementations. Azure Arc enables you to have a consolidated
    security model and implementation and use tools like Azure Log Analytics for centralized
    security and application logs. Additionally, you can manage governance and control
    solutions with services like Azure Policy.

    - **Inventory and organization:** With one set of tooling available and key Azure
    constructs such as resource groups, subscriptions, and tags, administrators, operators,
    and managers can get a complete view of their technology estate. It doesn’t matter
    anymore where systems are deployed – services and resources are registered as
    managed resources in Azure irrespective of where they are deployed, on-premises
    or in any cloud.


    Azure Arc ranges from offerings like `Azure Arc–enabled servers` and `Azure Arc–enabled
    Kubernetes` to `Azure Arc–enabled SQL Server` and `Azure Arc–enabled Data Services`.


    Given the scope of this book though, let’s sum this up to its essence: Azure Arc
    is a range of services that allow you to run services that formerly were only
    deployable to Microsoft’s Azure Cloud to any infrastructure in any cloud. We will
    focus on some of the offerings within Azure Arc–enabled Data Services over the
    course of this chapter.


    To learn more about Azure Arc in general, please refer to [https://docs.microsoft.com/en-us/azure/azure-arc/](https://docs.microsoft.com/en-us/azure/azure-arc/).


    ## Introduction to Azure Arc–Enabled Data Services


    Azure Arc–enabled Data Services architecture is a layered architecture of hardware,
    Kubernetes, Management Control Plane, and Data Services. Figure [9-1](#494804_1_En_9_Chapter.xhtml#Fig1)
    highlights the architecture.


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig1_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig1_HTML.jpg)

    *Figure 9-1: Azure Arc–enabled Data Services architecture*


    The foundational layer is Kubernetes running on any hardware, which can be either
    on-premises or in any cloud and built on either physical or virtual machines.
    Then, deployed inside the Kubernetes Cluster is the Arc Management Control Plane.
    The Arc Management Control Plane is Azure Arc’s brains and extends Azure Resource
    Manager (ARM) to your on-premises or hybrid cloud deployments. And on top of all
    of that are Azure Arc–enabled Data Services.


    Let us take a closer look at the core components of Azure Arc–enabled Data Services
    as illustrated in Figure [9-2](#494804_1_En_9_Chapter.xhtml#Fig2).


    ![../images/494804_1_En_9_Chapter/494804_1_En_9_Fig2_HTML.jpg](images/494804_1_En_9_Chapter/494804_1_En_9_Fig2_HTML.jpg)

    *Figure 9-2: Core components of Azure Arc–enabled Data Services*


    ### Azure Arc Data Controller


    Besides the Kubernetes cluster, the first component we need to run Azure Arc–enabled
    Data Services is the Data Controller. It provides the connectivity to Azure Portal
    and deploys some core services that we need to provision services later.'
  raw: '### SQL Server Logs in Kibana


    One set of filters we want to point out explicitly though is how to retrieve the
    logs for our SQL Server instance in Kibana.


    One very easy way would be to just use free text search as shown in Figure [8-20](#494804_1_En_8_Chapter.xhtml#Fig20).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig20_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig20_HTML.jpg)


    Figure 8-20


    Free text filter in Kibana


    This will involve a lot of unwanted noise though. The better solution is to add
    a proper filter. To do so, click *Add filter* below the filter bar as shown in
    Figure [8-21](#494804_1_En_8_Chapter.xhtml#Fig21).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig21_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig21_HTML.jpg)


    Figure 8-21


    Add filter in Kibana


    Select the Field *kuberneters.container_name*, the Operator *is,* and the Value
    *mssql* as shown in Figure [8-22](#494804_1_En_8_Chapter.xhtml#Fig22) and click
    *Save*.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig22_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig22_HTML.jpg)


    Figure 8-22


    Add filter for mssql in Kibana


    This will bring up log files from all our SQL Server containers, as shown in Figure
    [8-23](#494804_1_En_8_Chapter.xhtml#Fig23).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig23_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig23_HTML.jpg)


    Figure 8-23


    Filter for mssql in Kibana


    Of course, this can also be combined with the free text filter. If you add *“Login
    failed”* to the filter as shown in Figure [8-24](#494804_1_En_8_Chapter.xhtml#Fig24),
