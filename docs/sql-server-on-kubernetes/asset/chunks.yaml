    此容器附加了一个卷，并挂载在其文件系统的 `/var/opt/mssql` 目录中。当 SQL Server 首次启动时，它会将关键的实例文件和系统数据库放入此目录。前一示例中恢复的用户数据库，根据恢复脚本（代码清单
    2-28）中的代码，被恢复到了子目录 `/var/opt/mssql/data` 中。


    ```

    sqlcmd -S localhost,1433 -U sa -Q ''SELECT name, physical_name from sys.master_files''
    -P ''S0methingS@Str0ng!'' -W

    代码清单 2-28

    通过 sqlcmd 列出所有文件及其物理名称

    ```


    通过查询 `sys.master_files`，可以看到（图 2-20），我们数据库的所有文件位置都在 `/var/opt/mssql/data` 中，该目录包含在我们的卷内。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig20_HTML.jpg](img/494804_1_En_2_Fig20_HTML.jpg)

    图 2-20

    文件及其位置列表


    注意

    默认的用户数据库和日志文件位置可作为环境变量进行配置。


    请查看 `https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables?view=sql-server-ver15`
    了解更多详情。本书第 7 章将对此主题进行进一步探讨。


    以下命令将停止容器 `sql1` 并将其移除（代码清单 2-29）。这通常会销毁与此容器关联的数据……但现在它使用的是一个卷。


    ```

    docker stop sql1

    docker rm sql1

    代码清单 2-29

    停止并移除容器 sql1

    ```


    代码清单 2-30 创建了一个新容器，并再次定义了一个卷 `sqldata1`。这是前一示例中使用的同一个卷，它是一个独立于容器的资源，你可以使用命令 `docker
    volume ls` 查看。SQL Server 的实例目录及其系统和用户数据库都在此卷内。因此，当 SQL Server 启动时，它会在 `/var/opt/mssql/data`
    中找到 master 数据库，然后读取实例的配置和状态。文件系统中任何已定义的用户数据库也将被联机。


    ```

    docker run \

    --name ''sql2'' \

    -e ''ACCEPT_EULA=Y'' \

    -e ''MSSQL_SA_PASSWORD=S0methingS@Str0ng!'' \

    -p 1433:1433 \

    -v sqldata1:/var/opt/mssql \

    -d mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04

    代码清单 2-30

    docker run 命令 – 创建新容器

    ```


    容器启动运行后，使用代码清单 2-31 中的命令查询当前数据库集。


    ```

    sqlcmd -S localhost,1433 -U sa -Q ''SELECT name from sys.databases'' -P ''S0methingS@Str0ng!''

    代码清单 2-31

    通过 sqlcmd 列出所有数据库

    ```


    在输出中，你可以看到 `TestDB1`（图 2-21)。现在我们想指出，这不仅包括用户数据库，还包括系统数据库以及与该实例关联的其他文件。因此，对实例所做的任何配置更改也将持久保留，例如，实例级配置如最大服务器内存。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig21_HTML.jpg](img/494804_1_En_2_Fig21_HTML.jpg)

    图 2-21

    SQL Server 实例上的数据库列表


    我们的卷是一个独立于容器的资源，你可以使用 `docker volume ls` 命令（代码清单 2-32）查看，如输出所示。


    ```

    docker volume ls

    代码清单 2-32

    docker volume ls 命令

    ```


    图 2-22 将向我们展示系统上当前定义的所有卷。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig22_HTML.jpg](img/494804_1_En_2_Fig22_HTML.jpg)

    图 2-22

    Docker 卷列表


    ### 深入了解卷


    在使用 Docker 时，我们最喜欢的命令之一是 `docker inspect`。如代码清单 2-33 所示，此命令用于获取有关资源的更详细信息，在下面的示例中，执行
    `docker inspect` 显示了关于我们卷的更详细信息。


    ```

    docker volume inspect sqldata1

    代码清单 2-33

    docker inspect 命令

    ```


    让我们浏览一下此输出的一部分，你可以在图 2-23 中看到。首先是 `CreatedAt`，即卷创建的日期和时间。还有 `Driver`，其值为 `local`。这意味着它使用的是底层操作系统的文件系统。接下来是
    `Mountpoint`；这是暴露到容器中的基础操作系统上的实际路径。因此，如果你在运行容器的底层操作系统上浏览到此目录，你将看到卷内容器中的文件，在我们的示例中，你将在此位置找到
    SQL Server 实例的文件及其数据库。


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig23_HTML.jpg](img/494804_1_En_2_Fig23_HTML.jpg)

    图 2-23

    docker inspect 的输出 – 卷的详细信息


    注意

    如果你使用的是 Mac 或 Windows，这些文件将被抽象化。Mac 和 Windows 都使用虚拟化技术，因此可以在这些平台上运行 Linux 容器。这些文件的实际位置将位于为容器运行时提供
    Linux 内核服务的虚拟机“内部”。在运行 Linux 容器的原生 Linux 系统上，你将在 `Mountpoint` 定义的实际文件系统位置找到这些文件。


    ### 停止和移除容器与卷


    现在我们已经介绍了容器的生命周期以及如何使用卷将数据持久保存在容器外部，是时候清理我们的资源了。我们现在将向你展示如何停止容器、删除容器以及删除卷。


    执行 `docker stop sql1`（代码清单 2-34）会告知 SQL Server 进程停止，然后停止容器。


    ```

    docker stop sql1

    代码清单 2-34

    docker stop 命令

    ```


    要删除容器，请使用 `docker rm`（代码清单 2-35）加上容器名称 `sql1`。由于其数据存储在卷中，如果仍希望继续使用该数据，可以再次创建新容器。


    ```

    docker rm sql1

    代码清单 2-35

    docker rm 命令

    ```


    但既然此演示已完成，使用 `docker volume rm sqldata1`（代码清单 2-36）删除卷。卷被删除时，数据才会被销毁。因此请谨慎使用此操作！


    ```

    docker volume rm sqldata1

    代码清单 2-36

    docker volume rm 命令

    ```

