- fmt: "# 5. Interacting with Your Kubernetes Cluster\n\nWith a functioning cluster\
    \ up and running, we will now learn the core way to interact with our cluster,\
    \ `kubectl`. Kubectl is the command line client used to deploy and maintain applications\
    \ in Kubernetes as well as to administrate the cluster itself. With `kubectl`\
    \ preliminaries behind us, we will learn how to deploy and access applications\
    \ in our cluster.\n\nTo make sure that your cluster can be reached from the administrative\
    \ workstation, copy the `kubectl` configuration to it using the command in Listing\
    \ 5-1.\n\n```\nmkdir c:\\users\\labuser\\.kube\n$LinuxPW=\"Str@ngPassw0rd\"\n\
    pscp -P 22 -pw $LinuxPW labuser@control:/home/labuser/.kube/config c:\\users\\\
    labuser\\.kube\n```\n*Listing 5-1: Copy kubectl config to Windows workstation*\n\
    \n## Using kubectl to Interact with Your Cluster\n\nKubectl is a command line\
    \ tool to create, read, update, or delete pretty much any kind of resource in\
    \ Kubernetes. Now remember, in Kubernetes, everything goes through the API Server,\
    \ and so `kubectl` is your primary way to interact with the API Server. Any time\
    \ you need to create, modify, or query something in Kubernetes, this is the primary\
    \ CLI tool for doing that.\n\nMost `kubectl` commands effectively consist of three\
    \ parts:\n\n*   **Operations:** What do you want to do?\n*   **Resources:** What\
    \ do you want to do it to?\n*   **Output:** For commands that produce an output,\
    \ how should the output be formatted?\n\nA typical command would look like the\
    \ generic example in Listing 5-2.\n\n```\nkubectl    \n```\n*Listing 5-2: Generic\
    \ kubectl command*\n\nThe command from Listing 5-3, for example, will return a\
    \ detailed list of all the nodes in our cluster.\n\n```\nkubectl get nodes -o\
    \ wide\n```\n*Listing 5-3: Kubectl command to retrieve detailed list of nodes\
    \ in a cluster*\n\nThe output from this command should look similar to what we\
    \ see in Figure 5-1.\n\n![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig1_HTML.jpg](images/494804_1_En_5_Chapter/494804_1_En_5_Fig1_HTML.jpg)\n\
    \n*Figure 5-1: Output of kubectl get node -o wide*\n\nIf you are looking for a\
    \ resource from a specific namespace, this filter would also be passed on to `kubectl`.\
    \ The command in Listing 5-4 would return all the pods running in the `mssql-server`\
    \ namespace.\n\n```\nkubectl get pods -n kube-system\n```\n*Listing 5-4: Kubectl\
    \ command to retrieve pods in a namespace*\n\n**Note**\n\nLike most tools in the\
    \ Kubernetes ecosystem, `kubectl` runs cross-platform, so these commands are identical\
    \ no matter if you run them on Windows, Linux, or a Mac.\n\nOne of the exceptions\
    \ to this syntax is shown in Listing 5-5.\n\n```\nkubectl cluster-info\n```\n\
    *Listing 5-5: Kubectl command to get a general overview of your cluster*\n\nThis\
    \ command doesn’t specify an operation, resource, or output. Those aren’t needed\
    \ as this command gives us a general overview of our cluster like its Control\
    \ Plane IP address and port as well as the status of KubeDNS.\n\nYou should receive\
    \ an output that more or less matches the one in Figure 5-2.\n\n![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig2_HTML.jpg](images/494804_1_En_5_Chapter/494804_1_En_5_Fig2_HTML.jpg)\n\
    \n*Figure 5-2: Output of kubectl cluster-info*\n\nLet us take a closer look at\
    \ the different parts of a `kubectl` command.\n\n### Operations\n\nThere are a\
    \ ton of operations in Kubernetes using `kubectl`, so let’s focus on the core\
    \ ones and look at them in more detail:\n\n*   **Apply:** This will deploy the\
    \ content of a file – typically a YAML file – to your Kubernetes cluster. We used\
    \ this during our cluster’s deployment in the previous chapter, for example, when\
    \ we added flannel. Apply will also be used for any declarative deployment of\
    \ applications into your cluster.\n*   **Create:** Create allows you to imperatively\
    \ add resources to your cluster, and we’ll take a deeper look at this later in\
    \ this chapter when we’ll explain how to deploy an application to your cluster.\
    \ In many cases, `create` and `apply` can both be used with the same result.\n\
    *   **Run:** Run will allow you to start a pod and specify the container image,\
    \ basically bootstrapping the most basic pod configuration.\n*   **Explain:**\
    \ This gives you the documentation for a particular Kubernetes API Object or resource,\
    \ listing the description and the fields needed to construct that object. This\
    \ is especially useful when building manifests and can also be used to quickly\
    \ find field names for objects.\n*   **Delete:** This will delete a specified\
    \ resource.\n*   **Get:** What `kubectl get` will do is display the basic information\
    \ about the specified resource type.\n*   **Describe:** Describe gives you detailed\
    \ resource information, and this is used to display very detailed information\
    \ about a particular resource. This is your first stop when things go wrong: the\
    \ events section at the bottom is a great place for troubleshooting.\n*   **Exec:**\
    \ Exec allows you to `exec` a command inside a container in a pod.\n*   **Logs:**\
    \ This allows you to view the logs from a container running inside of a pod.\n\
    \nAs mentioned before, this is a short list of the – in our opinion – most critical\
    \ ones, just to get you started. You will find a full list at [https://kubernetes.io/docs/reference/kubectl/overview/#operations](https://kubernetes.io/docs/reference/kubectl/overview/%23operations),\
    \ and we strongly encourage you to check those out!\n\n### Resources\n\nWhen working\
    \ at the command line, we’re going to combine `kubectl` with an operation like\
    \ the ones that we saw earlier with a resource. Basically, *what* do you want\
    \ to perform that operation against. We’ve also introduced things like nodes and\
    \ pods and services, and honestly, there are many, many more objects available\
    \ inside of Kubernetes that we can work with. That’s how we go ahead and specify\
    \ what type of resource we want to perform the operation against.\n\nSome of the\
    \ most common resource types would be:\n\n*   Nodes (`no`)\n*   Pods (`po`)\n\
    *   Services (`svc`)\n\nNow here you can see in parentheses an alias to represent\
    \ that particular type of resource, so nodes `no`, pods `po`, and services `svc`,\
    \ and that’s a good way so that we can get real quick at the command line executing\
    \ these commands.\n\nThey are completely synonymous when using `kubectl`, so running\
    \ the commands in Listing 5-6 will get you the exact same result twice.\n\n```\n\
    kubectl get no\nkubectl get nodes\n```\n*Listing 5-6: Kubectl command with and\
    \ without resource type alias*\n\nThe official documentation at [https://kubernetes.io/docs/reference/kubectl/overview/#resource-types](https://kubernetes.io/docs/reference/kubectl/overview/%23resource-types)\
    \ has the full list of resource types available for you!\n\nBy the way, you can\
    \ also get a list of all the available resource types in your Kubernetes cluster\
    \ by running the command in Listing 5-7. This is also another example for a command\
    \ that doesn’t use operations, resources, or output options.\n\n```\nkubectl api-resources\n\
    ```\n*Listing 5-7: Kubectl command to list available resource types*"
