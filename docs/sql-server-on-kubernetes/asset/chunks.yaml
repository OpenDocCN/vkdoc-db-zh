    Figure 9-1


    Azure Arc–enabled Data Services architecture


    The foundational layer is Kubernetes running on any hardware, which can be either
    on-premises or in any cloud and built on either physical or virtual machines.
    Then, deployed inside the Kubernetes Cluster is the Arc Management Control Plane.
    The Arc Management Control Plane is Azure Arc’s brains and extends Azure Resource
    Manager (ARM) to your on-premises or hybrid cloud deployments. And on top of all
    of that are Azure Arc–enabled Data Services.


    Let us take a closer look at the core components of Azure Arc–enabled Data Services
    as illustrated in Figure [9-2](#494804_1_En_9_Chapter.xhtml#Fig2).


