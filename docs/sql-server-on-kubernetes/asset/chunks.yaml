- fmt: '### Exposing a Service of Type ClusterIP


    If you run the code in Listing 5-26, this will create a service that is exposed
    on port 80, also targeting port 80 (as that’s the default for `nginx`).


    ```

    kubectl expose deployment nginx --port=80 --target-port=80

    Listing 5-26

    Expose nginx deployment as a ClusterIP service

    ```


    The `port` defines the port the service is listening on, whereas the `target port`
    is the port the application is listening on inside the container. As we did not
    provide any other options, the type of that service will be `ClusterIP`, which
    is the default service type. We can see that by running the command in Listing
    5-27.


    ```

    kubectl get service nginx

    Listing 5-27

    Get service details

    ```


    As you can see in Figure 5-10, this also shows the IP address that this service
    is running on.


    ![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig10_HTML.jpg](images/494804_1_En_5_Chapter/494804_1_En_5_Fig10_HTML.jpg)

    *Figure 5-10: Output of `kubectl get service nginx`*


    While all these commands are imperative – which is, as we’ve mentioned before,
    fine for testing, but `YAML` manifests should be used in general – you can also
    just modify the command by adding the `--dry-run` switch to generate a `YAML`
    manifest, which you can then apply to your cluster as shown in Listing 5-28.


    ```

    kubectl expose deployment nginx --port=80 --target-port=80

    --dry-run=client -o yaml

    Listing 5-28

    Create manifest to expose nginx deployment as a ClusterIP service

    ```


    By the way, if you only want to retrieve the `ClusterIP`, this is a perfect use
    case for the output format `jsonpath` as shown in Listing 5-29. This is especially
    helpful when storing this value in a variable in an automation script.


    ```

    kubectl get service nginx -o jsonpath=''{ .spec.clusterIP }''

    Listing 5-29

    Retrieve only the ClusterIP through kubectl

    ```


    We could now access this service, for example, by running the `curl` request in
    Listing 5-30 (make sure to change the IP address to the `ClusterIP` of the service
    in your cluster).


    ```

    curl http://10.109.180.180/

    Listing 5-30

    Access ClusterIP service

    ```


    As we’ve elaborated in Chapter 3, a `ClusterIP` service can be reached from any
    node and pod within your cluster but not from the outside. Depending on your application
    scenario, this may be sufficient or not. Let’s assume you want to make sure that
    your service is reachable from outside the cluster.


    First, delete the existing service using the command in Listing 5-31.


    ```

    kubectl delete service nginx

    Listing 5-31

    Delete nginx service

    ```


    ### Exposing a Service of Type NodePort


    If you want to expose a service so it can also be accessed from machines that
    are not part of your Kubernetes cluster, we need to expose this service as type
    `NodePort`.


    To do so, we simply add the `--type` switch as shown in Listing 5-32.


    ```

    kubectl expose deployment nginx --port=80 --target-port=80 --type=NodePort

    Listing 5-32

    Expose nginx deployment as a NodePort service

    ```


    Let’s take a look at this service using the command in Listing 5-33.


    ```

    kubectl get service nginx

    Listing 5-33

    Get service details

    ```


    As you can see in Figure 5-11, the service is now showing type `NodePort` and
    also the (dynamic) port that our service has been deployed with.


    ![../images/494804_1_En_5_Chapter/494804_1_En_5_Fig11_HTML.jpg](images/494804_1_En_5_Chapter/494804_1_En_5_Fig11_HTML.jpg)

    *Figure 5-11: Output of `kubectl get service nginx`*


    This port will not change for the lifetime of the service. If you delete and expose
    it again though, it will most probably show a different port.


    Just like with the `ClusterIP` in the previous example, we can use `jsonpath`
    to retrieve only the `NodePort` as shown in Listing 5-34.


    ```

    kubectl get service nginx -o jsonpath=''{ .spec.ports[*].nodePort }''

    Listing 5-34

    Retrieve only the nodePort through kubectl

    ```


    A service of type `NodePort` can be accessed on any of the Kubernetes cluster’s
    nodes. In our example, the requests shown in Listing 5-35 may all end up on different
    replicas of our deployment but will all result in the same output.


    ```

    curl http://control:31260

    curl http://node1:31260

    curl http://node2:31260

    curl http://node3:31260

    Listing 5-35

    Access NodePort service

    ```


    ### Exposing a Service of Type LoadBalancer


    If your Kubernetes is running, for example, on Azure Kubernetes Service, you need
    to expose the service using the `LoadBalancer` type, which will provide you an
    external IP address to be used to access the service. This will only work in cloud
    scenarios or in on-premises scenarios that have a Kubernetes-integrated load balancer.


    Let’s start by exposing the deployment as shown in Listing 5-36.


    ```

    kubectl expose deployment nginx --port=80 --target-port=80 --type=LoadBalancer

    Listing 5-36

    Expose nginx deployment as a LoadBalancer service

    ```


    Then, we can get the full service details or just the service IP address again
    as shown in Listing 5-37.


    ```

    kubectl get service nginx

    kubectl get service nginx -o jsonpath=''{.status.loadBalancer.ingress[0].ip }''

    Listing 5-37

    Get service details

    ```


    Using this service IP address, we can then access our deployment from external
    clients.


    ## Summary


    In this chapter, we introduced different ways to interact with a Kubernetes cluster
    using `kubectl` to get all different types of information out of it. We also looked
    at how to deploy and access applications using both imperative and declarative
    deployment methods. Let’s move on to the next chapter to learn more about storage
    in a Kubernetes cluster!


    # 6. Storing Persistent Data in Kubernetes


    In this chapter, we will dive into the need for data persistency in container-based
    applications and the internals of how containers persist data. We will introduce
    core storage concepts in Kubernetes, such as how Kubernetes stores data using
    `Volumes`, `Persistent Volumes`, and `Persistent Volume Claims`, how to provision
    storage, and how Kubernetes controls access to that storage. We look at both static
    and dynamic provisioning scenarios, specifically using `NFS` in our lab and Azure
    Kubernetes Service.'
