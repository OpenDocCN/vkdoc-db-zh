    ### Looking Deeper into Volumes


    Now when working with Docker, one of our favorite commands is `docker inspect`.
    This command as shown in Listing [2-33](#494804_1_En_2_Chapter.xhtml#PC33) is
    used to get more detailed information about a resource, and in the following example,
    executing `docker inspect` shows more detailed information about our Volume.


    ```

    docker volume inspect sqldata1

    Listing 2-33

    docker inspect command

    ```


    Let’s walk through some of this output, which you can see in Figure [2-23](#494804_1_En_2_Chapter.xhtml#Fig23).
    First is `CreateAt`, which is the date and time the Volume was created. Also available
    is the `Driver`, which is `local`. This means it is using the underlying operating
    system’s file system. Next is `Mountpoint`; this is the actual path on the base
    operating system that’s being exposed into the container. So, if you browse to
    this directory on the underlying operating system where the container is running,
    you will see the container’s files inside of the Volume, and in our example here,
    you will find the SQL Server instance’s files and its databases at this location.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig23_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig23_HTML.jpg)

    Figure 2-23

    Output of docker inspect – detailed information about Volume


    Note

    If you’re using Mac or Windows, these files are going to be abstracted away from
    you. Both Mac and Windows use virtualization technologies, so you can run Linux
    containers on those platforms. The actual file locations for these will be “inside”
    the VMs used to provide Linux kernel services to your container runtime. On a
    native Linux system running Linux containers, you will find these files at the
    actual file system location defined by `Mountpoint`.


    ### Stopping and Removing Containers and Volumes


    Now that we have highlighted the lifecycle of a container and also how to persist
    data externally from the container using a Volume, it is time to clean up our
    resources. We will now show you how to stop containers, delete containers, and
    also delete Volumes.


    Executing `docker stop sql1` (Listing [2-34](#494804_1_En_2_Chapter.xhtml#PC34))
    tells the SQL Server process to stop and then stop the container.


    ```

    docker stop sql1

    Listing 2-34

    docker stop command

    ```


    To delete a container, use `docker rm` (Listing [2-35](#494804_1_En_2_Chapter.xhtml#PC35))
    and then the container name, `sql1`. Since its data is stored in a Volume, a new
    container can be created again if the desire remains to continue to work with
    that data.


    ```

    docker rm sql1

    Listing 2-35

    docker rm command

    ```


    But since this demonstration is complete, delete the Volume, with `docker volume
    rm sqldata1` (Listing [2-36](#494804_1_En_2_Chapter.xhtml#PC36)). When the Volume
    is deleted, THIS is when the data will be destroyed. So use this with caution!


    ```

    docker volume rm sqldata1

    Listing 2-36

    docker Volume rm command

    ```'
