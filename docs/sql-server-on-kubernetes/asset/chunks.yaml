    ## Foreword


    SQL Server has been a force in the database industry for developers, enterprises,
    and small businesses for decades. For years, Windows Server was the prominent
    platform where SQL Server cut its teeth. In 2017, we launched the ability to run
    SQL Server on Linux operating systems, which was a game changer for us and for
    the database community.


    SQL Server’s support for Linux opens up our community to the wonderful technology
    of containers. Containers unlock new possibilities for portability, flexibility,
    efficiency, and optimization. SQL Server is now part of that world and ecosystem.
    With the support for containers comes the natural extension of Kubernetes, a system
    to deploy and manage containerized applications like SQL Server at scale.


    This book, written by two experts in the industry, Anthony Nocentino and Ben Weissman,
    is your best source to learn about SQL Server and Kubernetes. I have personally
    worked with both Anthony and Ben, and I can’t think of more capable authors for
    this subject.


    I love the way this book is organized for the reader. You will build your knowledge
    by starting with the fundamentals of containers, the Kubernetes architecture,
    and the details of deploying `k8s`. (Yes, you need to learn to call it that. Who
    wants to type the full name every time?) Armed with the knowledge of `k8s` fundamentals
    such as how to use the famous `kubectl` tool and storage concepts, you will learn
    all aspects of deploying, interacting with, and monitoring SQL Server on `k8s`.
    Along your journey with each chapter are many step-by-step examples and figures
    so you can visually confirm your experiences with SQL and `k8s`.


    The book concludes with great examples of SQL Server containers on `k8s` in real-world
    production scenarios including Azure Arc and SQL Server Big Data Clusters (BDC).
    SQL Server is everywhere you need it, and learning how SQL Server containers run
    on `k8s` is all about innovation with new platforms, new challenges, and new skills.
    This book will help you meet those challenges written by two of the experts in
    the SQL Server and platform industry and community.


    —Bob Ward


    Microsoft


