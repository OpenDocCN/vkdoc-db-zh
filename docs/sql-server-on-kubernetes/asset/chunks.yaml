- fmt: '# Starting and Managing Containers


    ## Starting an Existing Container


    Since the container is still on the system, it can be restarted with `docker start`
    and then specifying the container name. All of the state and configuration will
    still be there for this container, so our system and user databases will be there
    when the container is started up again.


    ```

    docker start sql2

    Listing 2-20

    docker start command

    ```


    We can then use `sqlcmd` to list the databases in our instance as shown in the
    following command.


    ```

    sqlcmd -S localhost,1434 -U sa -Q ''SELECT name from sys.databases'' -P ''S0methingS@Str0ng!''

    Listing 2-21

    List databases using sqlcmd

    ```


    In the output, `sql2` is started up again, showing the current databases on the
    system including the restored user database `TestDB1`.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig16_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig16_HTML.jpg)

    *Figure 2-16. List of databases*


    Now, let’s clean up and stop these containers.


    ```

    docker stop sql1

    docker stop sql2

    Listing 2-22

    docker stop command

    ```


    ## Removing a Container


    When the containers are stopped, `docker rm` will remove a container from a system.
    This is when the data inside the containers will be destroyed. So the restored
    `TestDB1` is gone once these containers are removed. Data persistency independent
    of the lifecycle of the container is covered in the next section. In the following
    example, both `sql1` and `sql2` are deleted.


    ```

    docker rm sql1

    docker rm sql2

    Listing 2-23

    docker rm command

    ```


    The preceding example deleted the containers, but not the container images. The
    container images are still on the local system and can be used to source new containers
    from. Executing `docker image ls` shows the system the container images are on.


    ```

    docker image ls

    Listing 2-24

    docker image ls command

    ```


    You can see the container images are still on the local system.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig17_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig17_HTML.jpg)

    *Figure 2-17. Output of `docker image ls` command. Container images on the local
    system*


    # Container Internals


    Now, we want to take some time to look at container internals so that you can
    understand how the operating system implements and provides the isolation to processes
    and their resources when running inside containers.


    A container is a running process with an isolated view of the underlying operating
    system and its resources. When a container is started from a container image,
    the container runtime is instructed to start a specific process that is defined
    in the container image. Also defined is which port the application is listening
    on, among other configuration information.


    As shown earlier, a process listing executed inside the container shows only the
    processes running inside the container; no other processes on the system are visible.
    And even though the application is listening on port `1433` inside the container,
    to access the application, a unique port on the base operating system must be
    published. How can the operating system provide this isolation for our container-based
    applications on a single system? This is where Linux namespaces come in.


    ## Namespaces


    Linux kernel namespaces ([http://man7.org/linux/man-pages/man7/namespaces.7.html](http://man7.org/linux/man-pages/man7/namespaces.7.html))
    are a kernel construct that provides isolation for processes running on Linux.
    There are six core namespaces available in Linux, five for resource isolation
    and one for resource governing. Looking at the following list of namespaces, you
    can get a feel for what namespaces provide. They provide isolation for programs
    and the resources the programs are using from the base operating system – things
    like processes, files, networking, and more.


    The five resource isolation namespaces provide processes running on the system
    access to the services of the underlying operating system:


    *   **PID:** Process isolation

    *   **MNT:** File system and mountpoint isolation

    *   **NET:** Network device and stack isolation

    *   **IPC:** Interprocess communication

    *   **UTS:** Unique hostname and domain naming


    The sixth namespace, `cgroups`, provides resource isolation for processes running
    on the base operating system. This enables multiple processes to run on the operating
    system and gives the administrator control over resource sharing:


    *   **cgroups:** Control Groups enable allocating and controlling access to system
    resources, like CPU, I/O, and memory.


    For more information about how `cgroups` work, check out this link to the Linux
    man page: [http://man7.org/linux/man-pages/man7/cgroups.7.html](http://man7.org/linux/man-pages/man7/cgroups.7.html).


    ## Union File System


    A container image is read-only. When a container is running, any changes to files
    inside the container are written to a writeable layer using a copy on write technique.
    The Union File System takes the container image’s base layer and the writeable
    layer and presents both back to the application as a single unified file system.
    This technique enables us to start many containers from a single image and gain
    the efficiencies of reusing that container image’s layer as the starting point
    for many containers. Each container will have a unique writable layer that has
    a lifecycle tied to the container. When a container is deleted, this writable
    layer is deleted too. Which, if you are running a stateful application like SQL
    Server, does not sound too appealing. Techniques to provide data persistency to
    our container-based applications are coming up in the next section. The implementation
    details of Docker’s Union File System have changed over the years from AUFS, UnionFS,
    and OverlayFS, but the implementation details are out of scope for this conversation.


    **Note**

    If you want to dig further into how container images work, we encourage you to
    check out our colleague Elton Stoneman’s (@EltonStoneman) Pluralsight course “Handling
    Data and Stateful Applications in Docker” ([https://app.pluralsight.com/library/courses/handling-data-stateful-applications-docker/table-of-contents](https://app.pluralsight.com/library/courses/handling-data-stateful-applications-docker/table-of-contents)).


    ## Data Persistency in Containers


    Containers are ephemeral, meaning when a container is deleted, it goes away…for
    good. In the preceding section, we introduced that as data changes inside a running
    container, it is written into a writeable layer and the Union File System has
    the responsibility of joining the layers together to present a single unified
    file system to the container-based application and when a container is deleted,
    the writeable layer is deleted as well. So can containers have data persistency
    across their lifecycle, from creation to deletion and creation again? You might
    also be asking, why would we need to delete a container? Shouldn’t we just be
    able to keep it up and running? Well yes, you can keep a container up and running,
    but if you need to change out the base container image (perhaps you have a new
    container image for your application due to an upgrade or some sort of patching),
    you will need to delete the existing container and start a new container using
    that new container image.'
