- fmt: '# Kubernetes 中的控制器、服务与存储


    ## StatefulSet 示例


    图 [3-2](#494804_1_En_3_Chapter.xhtml#Fig2) 展示了一个运行中的 `StatefulSet` 示例。此示例 `StatefulSet`
    被定义为具有三个副本（Replicas）并创建了三个 Pod。它创建的每个 Pod 都有一个唯一的有序名称：`sql-0`、`sql-1` 和 `sql-2`。`StatefulSet`
    中创建的第一个 Pod 总是从索引 0 开始。在此示例中，即 `sql-0`。对于添加到 `StatefulSet` 的每个 Pod，索引增加一。所以下一个
    Pod 是 `sql-1`，接着是 `sql-2`。如果 `StatefulSet` 扩容以添加一个 Pod，下一个 Pod 将被命名为 `sql-3`。如果
    `StatefulSet` 缩容，则编号最高的 Pod 会首先被移除。在此示例中，`sql-3` 会被移除。这些有序的创建和扩缩容操作对于有状态应用至关重要，因为它们将数据放置在命名的计算资源上，使有状态应用能够在任何时间点知晓数据的位置。


    ![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig2_HTML.jpg](images/494804_1_En_3_Chapter/494804_1_En_3_Fig2_HTML.jpg)

    图 3-2：一个示例 `StatefulSet` – 每个 Pod 都具有唯一、有序且持久的名称。每个 Pod 还有关联的持久存储。


    Kubernetes 中还有更多控制器可用。本书重点关注 `Deployment`、`ReplicaSet` 和 `StatefulSet`，以及如何使用它们在
    Kubernetes 上部署 SQL Server。Kubernetes 中有许多控制器可用于构建不同类型的应用工作负载。有关不同控制器类型及其功能的更多信息，请查阅
    Kubernetes 文档：[`https://kubernetes.io/docs/concepts/workloads/`](https://kubernetes.io/docs/concepts/workloads/)。


    ## 服务


    如前所述，没有任何 Pod 会被重新创建。每次创建 Pod 时，无论是初始创建还是替换现有 Pod，该新 Pod 在启动时都会被分配一个新的 IP 地址。当控制器根据配置创建和删除
    Pod，或响应故障并影响期望状态时，我们面临一个挑战：如果 Pod 的 IP 地址不断变化，应该使用哪个 IP 地址来访问集群中由 Pod 提供的应用程序服务？


    Kubernetes 提供了一种用于访问集群中部署的基于 Pod 的应用程序的网络抽象，称为 *Service*。`Service` 是一个持久的 IP 地址，可选择性地包含一个
    DNS 名称，用于访问集群中运行在 Pod 上的应用程序。一般来说，你在集群中部署的每个应用程序都有一个对应的 `Service`。接收到 `Service`
    IP 上的应用程序流量会被负载均衡到其底层的 Pod IP 地址。随着 Pod 被控制器（如 `ReplicaSet` 控制器）创建和销毁，网络信息会自动更新以反映应用程序的当前状态。让我们看一个例子。


    在图 [3-3](#494804_1_En_3_Chapter.xhtml#Fig3) 中，假设一个 `Deployment` 创建了一个 `ReplicaSet`，然后该
    `ReplicaSet` 创建了三个 Pod。每个 Pod 在网络上都有一个唯一的 IP 地址。为了让用户或应用程序能够访问这些 Pod 中的应用程序，需要定义一个
    `Service`。`Service` 在一个持久的 IP 地址和端口（例如 HTTP 的 80 端口）上暴露运行在一组 Pod 中的应用程序。用户或其他应用程序可以通过连接到
    `Service` 的 IP 地址或 DNS 名称来访问该 `Service` 提供的应用程序。然后，`Service` 会在属于它的 Pod 之间对流量进行负载均衡。


    ![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig3_HTML.jpg](images/494804_1_En_3_Chapter/494804_1_En_3_Fig3_HTML.jpg)

    图 3-3：`ReplicaSet` 和 `Service`


    在图 [3-3](#494804_1_En_3_Chapter.xhtml#Fig3) 的第二帧中，假设 `ReplicaSet` 中的一个 Pod 发生故障。`ReplicaSet`
    控制器感知到这一点，并部署一个新的 Pod，将该新 Pod 的 IP 地址注册到 `Service` 中，然后开始将流量负载均衡到这个新 Pod。发生故障的
    Pod 被删除，其 IP 地址从 `Service` 中移除，流量不再被发送到该 IP。这一切都是自动发生的，无需任何用户交互。


    此外，当应用程序扩容添加更多 Pod，或缩容移除一些 Pod 时，Pod 的 IP 地址会相应地被添加到 `Service` 或从中移除。这确实是一项了不起的技术，我们每次看到它实际运行时都非常兴奋。这将在第
    [5](#494804_1_En_5_Chapter.xhtml) 章中详细演示。


    Kubernetes 中有三种类型的 `Service`，都可以用来访问在 Kubernetes 中运行的应用程序。服务类型分别是 `ClusterIP`、`NodePort`
    和 `LoadBalancer`。让我们更详细地了解每一种：


    - **`ClusterIP`：** `ClusterIP` 类型的 `Service` *仅*在集群内部可用。当应用程序不需要暴露在集群外部时，会使用此类
    `Service`。

    - **`NodePort`：** `NodePort` 类型的 `Service` 在集群中每个节点的真实 IP 地址上的一个固定端口暴露你的应用程序。访问
    `NodePort` 服务需要结合使用集群节点的真实网络 IP 地址和服务端口。接收到的流量会被路由到支持该服务的相应 Pod。当基于集群的应用程序需要从集群外部访问或与外部负载均衡器集成时，会使用
    `NodePort` 服务。

    - **`LoadBalancer`：** 此服务类型集成了云提供商的负载均衡器服务或集群外部部署的负载均衡器（例如本地的 F5）。在基于云的场景中，当基于集群的应用程序需要从集群外部访问时，会使用
    `LoadBalancer` 类型的 `Service`。


    这些服务类型都将在第 [5](#494804_1_En_5_Chapter.xhtml) 章中详细演示。


    ## 存储


    作为 SQL Server 专业人员，我们的首要任务是确保数据持久保存。Kubernetes 提供了 API 对象来支持像 SQL Server 这样的有状态应用程序的部署。有两个主要的
    API 对象可用于帮助实现这一点：`PersistentVolume`（持久卷）和 `PersistentVolumeClaim`（持久卷声明）。`PersistentVolume`
    是由集群管理员定义的、可供 Pod 使用的集群内存储。`PersistentVolume` 可以是许多不同类型的存储，例如来自云提供商的虚拟磁盘、`iSCSI`、`NFS`
    等。但 Pod 不直接访问 `PersistentVolume` 对象。Pod 在其对象定义中使用 `PersistentVolumeClaim` 来访问集群存储。`PersistentVolumeClaim`
    会向集群“请求”存储，然后 PVC 会对 `PersistentVolume` 提出声明，并将该 `PersistentVolume` 映射到 Pod。这个额外的抽象层将
    Pod 与 `PersistentVolume` 的存储实现细节解耦。这主要的好处是无需将存储实现细节（例如基础设施特定的存储参数）作为 Pod 定义的一部分。实现细节位于
    `PersistentVolume` 对象中。在 Kubernetes 中持久化数据将在第 [6](#494804_1_En_6_Chapter.xhtml)
    章中更详细地介绍。


    ## 配置映射


    在 Kubernetes 中，应用程序配置数据可以作为 API 对象存储在集群中。`ConfigMap` 是一种存储键值对数据的 API 对象，是一种集群资源。存储的数据可以作为环境变量甚至配置文件暴露给
    Pod 及其容器，供容器中运行的应用程序使用。它们通常用于配置部署在 Kubernetes 中的更复杂的应用程序。`ConfigMap` 使你能够将配置从部署清单中的代码解耦，并将其存储在集群中供运行时引用。你将在第
    [8](#494804_1_En_8_Chapter.xhtml) 章中看到 `ConfigMap` 的使用。'
  raw: 'Figure [3-2](#494804_1_En_3_Chapter.xhtml#Fig2) shows an example of a running
    StatefulSet. This example StatefulSet is defined as having three Replicas and
    creates three Pods. Each Pod it creates has a unique ordered name, sql-0, sql-1,
    and sql-2\. The first Pod created in a StatefulSet always starts with a 0 index.
    In this example, that’s sql-0\. For each Pod added to the StatefulSet, the index
    is increased by one. So the next Pod is sql-1, followed by sql-2\. If the StatefulSet
    is scaled up to add one more Pod, the next Pod is named sql-3\. If the StatefulSet
    is scaled down, then the highest numbered Pod is removed first. In this example,
    sql-3 is removed. These ordered creation and scaling operations are essential
    to stateful applications that place data on named compute resources enabling the
    stateful applications to know the location of data at any point in time.


    ![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig2_HTML.jpg](images/494804_1_En_3_Chapter/494804_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    An example StatefulSet – each Pod has a unique, ordered, and persistent name.
    Each Pod also has persistent storage associated


    There are many more controllers available in Kubernetes. This book focuses on
    Deployments, ReplicaSets, and StatefulSets and how they are used to deploy SQL
    Server on Kubernetes. There are controllers to help craft many different types
    of application workloads in Kubernetes. For more information on different controller
    types and their functions, check out the Kubernetes documentation at [*https://kubernetes.io/docs/concepts/workloads/*](https://kubernetes.io/docs/concepts/workloads/).


    #### Services


    As we introduced earlier, no Pod is ever recreated. Every time a Pod is created,
    either during its initial creation or when replacing an existing pod, that new
    Pod is assigned a new IP at startup. With controllers creating and deleting Pods
    based on configuration, or responding to failures, and affecting the desired state,
    this leaves us with a challenge of which IP address should be used to access application
    services provided by Pods running in a Cluster if they are constantly in flux.


    Kubernetes provides a networking abstraction for access to Pod-based applications
    deployed in a Cluster called a *Service*. A Service is a persistent IP address
    and optionally a DNS name for access into an application running on Pods in a
    Cluster. Generally speaking, you will have one Service per application deployed
    in a Cluster. Application traffic received on the Service’s IP is load balanced
    to the underlying Pod IP addresses. As Pods are created and destroyed by Controllers,
    such as a ReplicaSet Controller, the network information is automatically updated
    to represent the application’s current state. Let’s look at an example of this.


    In Figure [3-3](#494804_1_En_3_Chapter.xhtml#Fig3), let’s say a Deployment creates
    a ReplicaSet, and the ReplicaSet creates three Pods. Each of those Pods has a
    unique IP address on the network. For users or applications to access the applications
    in those Pods, a Service is defined. A Service exposes the applications running
    in a collection of Pods on a persistent IP address and port, port 80 for HTTP.
    Users or other applications can access the application provided by that Service
    by connecting to the Service IP address or DNS name. The Service then load balances
    that traffic among the Pods that are part of the Service.


    ![../images/494804_1_En_3_Chapter/494804_1_En_3_Fig3_HTML.jpg](images/494804_1_En_3_Chapter/494804_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    ReplicaSet and Services


    In the second frame of Figure [3-3](#494804_1_En_3_Chapter.xhtml#Fig3), let’s
    say one of the Pods in the ReplicaSet fails. The ReplicaSet Controller senses
    this and deploys a new Pod and registers that new Pod’s IP address in the Service
    and starts load balancing to the new Pod. The Pod that fails is deleted, and its
    IP address is removed from the Service, and traffic is no longer sent to that
    IP. This all happens automatically without any user interaction.


    Further, when scaling an application up and adding more Pods or scaling an application
    down by removing some Pods, the Pod IPs are added or removed to or from the Service
    accordingly. It truly is a fantastic piece of technology, and we get very excited
    when we see this in action. This will be demonstrated in detail in Chapter [5](#494804_1_En_5_Chapter.xhtml).


    There are three types of Services available in Kubernetes, all of which can be
    used to access applications running in Kubernetes. The service types are *ClusterIP*,
    *NodePort*, and *LoadBalancer*. Let’s look at each in more detail:


    *   **ClusterIP:** ClusterIP Services are available *only* inside the Cluster.
    This type of Service is used when an application does not need to be exposed outside
    the Cluster.


    *   **NodePort:** A NodePort Service exposes your application on each Node’s real
    IP address in your Cluster on a fixed port. NodePort Services are accessed using
    the real network IP addresses of Cluster Nodes combined with the service port.
    Received traffic is routed to the appropriate Pods supporting the Service. NodePort
    Services are used when Cluster-based applications need to be accessed outside
    the Cluster or integrated with external load balancers.


    *   **LoadBalancer:** This service type integrates a cloud provider’s load balancer
    service or a cluster external load balancer deployed on-premises such as an F5\.
    A LoadBalancer Service is used in cloud-based scenarios when cluster-based applications
    need to be accessed outside the Cluster.


    Each of these Service types will be demonstrated in detail in Chapter [5](#494804_1_En_5_Chapter.xhtml).


    #### Storage


    As SQL Server professionals, our number one job is keeping data around. And Kubernetes
    has API Objects to enable the deployment of stateful applications, like SQL Server.
    There are two primary API Objects available to help with this, Persistent Volumes
    and Persistent Volume Claims. A Persistent Volume is storage available in a cluster
    defined by a cluster administrator available for consumption by Pods. There are
    many different types of storage available as Persistent Volumes, such as virtual
    disks from cloud providers, iSCSI, NFS, and many more. But Pods do not access
    the Persistent Volume object directly. A Pod uses a Persistent Volume Claim in
    the Pod Object definition to access cluster storage. The Persistent Volume Claim
    will “ask” the cluster for storage, and then the PVC will make a claim on the
    Persistent Volume and map the Persistent Volume to the Pod. This extra layer of
    abstraction decouples the Pod from storage implementation details of the Persistent
    Volume. This has the primary benefit of not having storage implementation details,
    such as infrastructure-specific storage parameters, as part of the Pod’s definition.
    The implementation details are in the Persistent Volume object. Persisting data
    in Kubernetes will be covered in greater detail in Chapter [6](#494804_1_En_6_Chapter.xhtml).


    #### ConfigMaps


    In Kubernetes, application configuration data can be stored in the cluster as
    API Objects. A ConfigMap is an API Object that stores key-value pairs as data
    is a cluster resource. The stored data can be exposed to Pods and their containers
    as environment variables or even configuration files that the applications running
    in the containers can use for configuration. These are commonly used to configure
    more complex applications deployed in Kubernetes. ConfigMaps enable you to decouple
    the configuration from the code in the deployment manifest and store it in the
    cluster for reference at runtime. You will see ConfigMaps in use in Chapter [8](#494804_1_En_8_Chapter.xhtml).'
