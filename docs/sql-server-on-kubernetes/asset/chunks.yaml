    除了 Linux 虚拟机外，此脚本还创建了一个 Windows 虚拟机，如本章后面所述，可用作您的管理工作站。


    注意

    > 当您不再需要这些资源时，请务必删除或停止并释放它们，以避免产生任何不必要的费用。


    ## 虚拟机网络配置


    按照表 1-1 中的指定配置实验虚拟机的 IP 地址。您可以在实验中自由使用不同的 IP 地址，但在构建集群的几个实验中需要考虑到这一点。如果您在上一节中选择了
    Azure 虚拟机方法，那么这些机器将已经以这种方式设置。


    表 1-1

    虚拟机配置


    | 名称 | IP 地址 | 功能 |

    | --- | --- | --- |

    | control | 172.16.94.10 | 控制平面节点 |

    | node1 | 172.16.94.11 | 工作节点 |

    | node2 | 172.16.94.12 | 工作节点 |

    | node3 | 172.16.94.13 | 工作节点 |

    | storage | 172.16.94.5 | NFS 存储服务器 |

    | workstation (optional) | 172.16.94.100 | 管理工作站 (Windows) |


    接下来，在 IT 领域有句话，永远是 DNS 的问题。因此，对于我们的实验，我们将向每个系统上的`/etc/hosts`文件添加主机条目，以确保我们能够在实验中通过名称访问所有系统。在清单
    1-6 中，您将找到我们`/etc/hosts`文件的内容。您的`hosts`文件可能包含 localhost 的条目以及可能的其他配置。


