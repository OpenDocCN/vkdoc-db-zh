- fmt: '### Restoring a Database to SQL Server Running in a Container


    The command in Listing [2-12](#494804_1_En_2_Chapter.xhtml#PC12) copies an existing
    database backup into a container at the directory `/var/opt/mssql/data` inside
    the `sql2` container, and the command in Listing [2-13](#494804_1_En_2_Chapter.xhtml#PC13)
    then sets the appropriate permissions on that copied backup file.


    Due to the nature of the non-root SQL Server container in SQL Server 2019 ([https://techcommunity.microsoft.com/t5/sql-server/non-root-sql-server-2019-containers/ba-p/859644](https://techcommunity.microsoft.com/t5/sql-server/non-root-sql-server-2019-containers/ba-p/859644)),
    the permissions of the file copied into the container need to be adjusted so the
    `sqlservr` process inside can read the file copied. On Linux systems, the command
    `docker cp` will copy the file as the `UID` of the user from the base operating
    system executing the `docker cp` command. The `sqlservr` process inside the container
    runs as the user `mssql`. The following `chown` command changes the ownership
    of the backup file to the user `mssql` so the user can read the file.


    ```

    docker exec -u root sql2 chown mssql /var/opt/mssql/data/TestDB1.bak

    Listing 2-13

    chown command inside the container

    ```


    ```

    docker cp TestDB1.bak sql2:/var/opt/mssql/data

    Listing 2-12

    docker cp command

    ```


    With that file in the correct location, execute the `restore_testdb1.sql` script,
    which contains the required T-SQL to restore this database. Notice we’re running
    this restore (Listing [2-14](#494804_1_En_2_Chapter.xhtml#PC14)) from outside
    the container and using `sqlcmd` on a client workstation and pointing it to the
    correct server name (`localhost`) and port `1434`.


    ```

    sqlcmd -S localhost,1434 -U sa -i restore_testdb1.sql -P ''S0methingS@Str0ng!''

    Listing 2-14

    Execute restore script through sqlcmd

    ```


    `sqlcmd` will confirm the successful restore as shown in Figure [2-11](#494804_1_En_2_Chapter.xhtml#Fig11).


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig11_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig11_HTML.jpg)


    Figure 2-11

    Successful restore of a database


    With the database restored, let’s use the `docker exec` command in Listing [2-15](#494804_1_En_2_Chapter.xhtml#PC15)
    to get access to the inside of the container. This will allow us to explore the
    internals of our running container. The parameter `-it` gives you an interactive
    terminal for the process being executed, which in this case is `/bin/bash`, a
    bash prompt. In the following example, the prompt presented shows the username
    of the logged-in user, `mssql`, and the hostname of the container that matches
    the container ID of the container.


    ```

    docker exec -it sql2 /bin/bash

    Listing 2-15

    docker exec command

    ```


    With this interactive bash shell that is running inside the container, let’s look
    around a bit. Execute a `ps -aux` command as shown in Listing [2-16](#494804_1_En_2_Chapter.xhtml#PC16)
    to list all processes running.


    ```

    ps -aux

    Listing 2-16

    ps -aux command

    ```


    In the output shown in Figure [2-12](#494804_1_En_2_Chapter.xhtml#Fig12), you
    will see there is only a small set of processes running inside the container:
    two `sqlservr` processes, a `bash` shell, and the `ps` command. This example highlights
    the isolation a container has at runtime. This container and its running processes
    cannot see any other processes running on the base operating system.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig12_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig12_HTML.jpg)


    Figure 2-12

    Output of `ps -aux` command


    Now, execute the directory listing (Listing [2-17](#494804_1_En_2_Chapter.xhtml#PC17))
    with `ls -la /var/opt/mssql/data`. This is the default database directory for
    SQL Server on Linux.


    ```

    ls -la /var/opt/mssql/data

    Listing 2-17

    Directory listing

    ```


    As you can see in Figure [2-13](#494804_1_En_2_Chapter.xhtml#Fig13), you will
    find the system and user databases in this directory. You will also find the database
    backup file you copied in the preceding demo, the `TestDB1.bak` file. Each container
    has a separate file system. So the files in this directory are only available
    to this running container. If this container is deleted, these files will be deleted
    with the container. We will introduce data persistency for containers shortly.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig13_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig13_HTML.jpg)


    Figure 2-13

    Default database directory for SQL Server on Linux


    To exit this container, use the `exit` command and return to our base OS’s shell.


    ### Stopping a Container


    A container running a daemon process like SQL Server will continue to run until
    it is told to stop. To stop a running container, execute the `docker stop` command
    in Listing [2-18](#494804_1_En_2_Chapter.xhtml#PC18) and specify the container
    name or the container ID. In the following example, the container `sql2` is being
    stopped. This will send a `SIGTERM` signal to the processes running inside the
    container to gracefully shut down.


    ```

    docker stop sql2

    Listing 2-18

    docker stop command

    ```


    ### Finding Containers on a Local System


    At this point, there are two containers on the local system. One container is
    currently stopped, `sql2`, and one is still running, `sql1`. Now execute a `docker
    ps` command.


    In the output (Figure [2-14](#494804_1_En_2_Chapter.xhtml#Fig14)), there is only
    one running container, `sql1`.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig14_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig14_HTML.jpg)


    Figure 2-14

    Output of `docker ps` command. List of running containers


    To see all of the containers on a system regardless of their current state, stopped
    or running, execute the `docker ps -a` command in Listing [2-19](#494804_1_En_2_Chapter.xhtml#PC19).


    ```

    docker ps -a

    Listing 2-19

    docker ps -a command

    ```


    In the output displayed in Figure [2-15](#494804_1_En_2_Chapter.xhtml#Fig15),
    both containers are listed, `sql1` and `sql2`. The key piece of information is
    the `STATUS` column. `sql1` is still up and running, as indicated by a status
    value `16 minutes ago`. For the other container, `sql2`, the status is `Exited
    (0) 33 seconds`; it is currently stopped. The `0` is the exit code from the application.
    A non-zero exit code indicates an error occurred inside the program; a zero (0)
    indicates a graceful shutdown.


    **Note**

    If you find a non-zero exit code, something went wrong, and you will want to use
    `docker logs` to investigate the issue for that container.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig15_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig15_HTML.jpg)


    Figure 2-15

    Output of `docker ps -a` command. List of all containers on the respective system'
