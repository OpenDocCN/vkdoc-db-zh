  trans: '

    ### 安装与配置 Kubernetes 软件包


    由于我们将从 Google 仓库安装软件包，因此需要先添加 Google 的 apt 仓库 GPG 密钥（见代码清单 4-13）。


    ```bash

    curl -s https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key add
    -

    ```

    代码清单 4-13

    添加 Google GPG 密钥


    有了该密钥后，我们就可以添加 Kubernetes apt 仓库了（见代码清单 4-14）。


    ```bash

    sudo bash -c ''cat > /etc/apt/sources.list.d/kubernetes.list

    deb https://apt.kubernetes.io/ kubernetes-xenial main

    EOF''

    ```

    代码清单 4-14

    添加 Kubernetes apt 仓库


    接下来，我们更新 apt 软件包列表，并使用代码清单 4-15 中的命令查看 `kubelet` 的可用版本。


    ```bash

    sudo apt-get update

    apt-cache policy kubelet | head -n 20

    ```

    代码清单 4-15

    更新 apt 软件包列表


    这会显示可用版本，如图 4-2 所示，在撰写本文时，最新可用版本是 `1.20.4`。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig2_HTML.jpg](img/494804_1_En_4_Fig2_HTML.jpg)

    图 4-2

    `kubelet` 的版本列表


    现在，我们可以如代码清单 4-16 所示，安装 `kubelet`、`kubeadm` 和 `kubectl`。如果你当前的机器也是你在第 1 章中用于安装
    `kubectl` 的机器，你可能会收到它已安装的消息。


    ```bash

    sudo apt-get install -y kubelet kubeadm kubectl

    ```

    代码清单 4-16

    安装 Kubernetes 软件包


    这将安装这些工具的最新版本。如果你想安装之前的版本，可以如代码清单 4-17 所示进行指定。不过，本书中的代码和示例并非特定于某个版本。


    ```bash

    VERSION=1.20.1-00

    sudo apt-get install -y kubelet=$VERSION kubeadm=$VERSION kubectl=$VERSION

    ```

    代码清单 4-17

    安装特定版本的 Kubernetes 软件包


    为避免自动更新，我们将这些工具（以及 `containerd`）标记为保持（hold）状态（代码清单 4-18）。这使我们能完全控制打补丁的过程，使其独立于基础操作系统的补丁更新。


    ```bash

    sudo apt-mark hold kubelet kubeadm kubectl containerd

    ```

    代码清单 4-18

    将 Kubernetes 软件包和 `containerd` 标记为保持状态


    让我们检查一下 `kubelet` 和容器运行时的状态（代码清单 4-19）。


    ```bash

    sudo systemctl status kubelet.service

    sudo systemctl status containerd.service

    ```

    代码清单 4-19

    检查 `kubelet` 和 `containerd` 的状态


    如图 4-3 所示，`kubelet` 会进入崩溃循环。在集群创建或节点加入现有集群之前，这是正常行为（你可以按 `q` 键退出该进程）。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig3_HTML.jpg](img/494804_1_En_4_Fig3_HTML.jpg)

    图 4-3

    `kubelet` 和 `containerd` 的状态


    同时，请确保两个服务都设置为开机自启。这可以通过代码清单 4-20 中的命令进行设置。


    ```bash

    sudo systemctl enable kubelet.service

    sudo systemctl enable containerd.service

    ```

    代码清单 4-20

    为 `kubelet` 和 `containerd` 设置开机自启


    注意

    请记住，在 `control`、`node1`、`node2` 和 `node3` 上分别重复此过程并安装配置这些软件包！


    ### 创建控制平面


    现在容器运行时和 Kubernetes 软件包已经就位，我们可以继续创建控制平面。


    注意

    本节中的所有命令都需要在你的 `control` 虚拟机上执行。


    我们首先生成一个配置文件，如代码清单 4-21 所示。


    ```bash

    kubeadm config print init-defaults | tee ClusterConfiguration.yaml

    ```

    代码清单 4-21

    创建 `kubeadm` 配置文件


    在默认的集群配置文件中，我们需要修改一些内容。其中一些可以通过代码清单 4-22 所示的方式自动化完成。这将：


    - 将 API 服务器的 IP 端点 `localAPIEndpoint.advertiseAddress` 设置为控制平面节点的 IP 地址。

    - 将 `nodeRegistration.criSocket` 从 Docker 更改为 `containerd`。在 Kubernetes 的未来版本中，这将成为默认值。

    - 将 `kubelet` 的 cgroup 驱动设置为 `systemd`，该值在此文件中尚未定义，默认值是 `cgroupfs`。

    - 定义 pod 网络。


    ```bash

    sed -i ''s/  advertiseAddress: 1.2.3.4/  advertiseAddress: 172.16.94.10/'' ClusterConfiguration.yaml

    sed -i ''s/  criSocket: \/var\/run\/dockershim\.sock/  criSocket: \/run\/containerd\/containerd\.sock/''
    ClusterConfiguration.yaml

    cat >> ClusterConfiguration.yaml


    apiVersion: kubelet.config.k8s.io/v1beta1

    kind: KubeletConfiguration

    cgroupDriver: systemd

    EOF

    ```

    代码清单 4-22

    修改 `kubeadm` 配置文件


    我们还需要编辑此文件中的 `kubernetesVersion` 以匹配你之前安装的版本。首先，使用代码清单 4-23 中的命令确认已安装的版本。


    ```bash

    kubeadm version

    ```

    代码清单 4-23

    获取当前的 `kubeadm` 版本


    如图 4-4 所示，我们安装的是 `1.20.4` 版本——除非你安装了其他版本。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig4_HTML.jpg](img/494804_1_En_4_Fig4_HTML.jpg)

    图 4-4

    当前安装的 `kubeadm` 版本


    有了这个信息，我们现在可以编辑文件（例如使用 `vi`）`ClusterConfiguration.yaml`，并确保版本匹配，如图 4-5 所示。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig5_HTML.jpg](img/494804_1_En_4_Fig5_HTML.jpg)

    图 4-5

    在 `ClusterConfiguration.yaml` 中设置 `kubelet` 的当前版本。


    在 `networking` 部分，添加一行将 `podSubnet` 设置为 `10.244.0.10/16`，如图 4-6 所示，这是 `flannel`
    网络插件所要求的。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig6_HTML.jpg](img/494804_1_En_4_Fig6_HTML.jpg)

    图 4-6

    `ClusterConfiguration.yaml` 中的 `podSubnet`


    现在，我们已准备好使用 `kubeadm` 初始化集群，如代码清单 4-24 所示。


    ```bash

    sudo kubeadm init \

    --config=ClusterConfiguration.yaml \

    --cri-socket /run/containerd/containerd.sock

    ```

    代码清单 4-24

    初始化集群


    这将需要几分钟时间，并会持续输出其进度。结果应与你在图 4-7 中看到的类似。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig7_HTML.jpg](img/494804_1_En_4_Fig7_HTML.jpg)

    图 4-7

    `kubeadm init` 的输出


    为确保我们也能在非提权 shell 中与集群交互，我们需要创建一个配置文件并将其存储在我们的主目录中，如代码清单 4-25 所示。


    ```bash

    mkdir -p $HOME/.kube

    sudo cp -i /etc/kubernetes/admin.conf $HOME/.kube/config

    sudo chown $(id -u):$(id -g) $HOME/.kube/config

    ```

    代码清单 4-25

    创建 `kubectl` 配置


    注意

    如果你使用的是管理工作站，你可以获取此文件并将其复制或其内容复制到该工作站上你的主目录下的 `.kube/config` 中。这将允许你从该工作站与你的集群通信。

    '
- fmt: '#### Pod Networking


    在加入工作节点之前，我们需要确保 Pod 网络已经设置好。市面上有许多不同的解决方案，我们决定保持简单，使用 `flannel`。虽然它没有像另一个流行的
    Pod 网络方案 `Calico` 那样拥有所有高级配置设置，但它在本地和云网络上无需任何额外配置即可工作，而这些网络往往会限制 `IPIP` 数据包等。


    使用 `wget` 命令下载默认的清单文件，如清单 [4-26](#494804_1_En_4_Chapter.xhtml#PC26) 所示。


    ```

    wget https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml

    Listing 4-26

    Download flannel

    ```


    如果需要，你可以先查看文件内容，但无需进行任何更改，因此我们将直接使用 `kubectl` 安装它，如清单 [4-27](#494804_1_En_4_Chapter.xhtml#PC27)
    所示。我们将在下一章详细讨论 `kubectl`，所以如果现在感觉有些解释不清，请不要担心。


    ```

    kubectl apply -f kube-flannel.yml

    Listing 4-27

    Install flannel

    ```


    至此，使用 `flannel` 的 Pod 网络设置完成。


    #### Storage


    虽然通常会在此阶段进行配置，但我们将首先部署一个没有任何附加存储的集群。由于 Kubernetes 将计算和数据分离，这完全可以实现。我们在下一章中关于与集群交互的最初练习不需要任何存储。在部署
    SQL Server（它确实需要存储）之前，我们将在第 [6](#494804_1_En_6_Chapter.xhtml) 章深入探讨 Kubernetes
    中的存储概念。


    ### Adding Nodes to a Cluster


    我们的控制平面已准备就绪，但还不能立即加入节点。为了使节点能够加入集群，我们需要一个令牌。最简单的方法是使用 `kubeadm` 直接生成一个 `join
    command`，如清单 [4-28](#494804_1_En_4_Chapter.xhtml#PC28) 所示。


    ```

    kubeadm token create --print-join-command

    Listing 4-28

    Generate token and join command

    ```


    输出内容与图 [4-8](#494804_1_En_4_Chapter.xhtml#Fig8) 中看到的相似。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig8_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig8_HTML.jpg)

    **图 4-8 加入命令（在控制平面节点上生成）**


    > 注意

    > 根据你安装的版本，你可能会收到一个警告，提示 Docker 不是你的容器运行时。可以安全地忽略此警告。


    现在，我们可以获取此命令并在每个所需的工作节点上运行它（以 root 身份运行；参见清单 [4-29](#494804_1_En_4_Chapter.xhtml#PC29)），这将启动加入过程。你自己的加入命令会有所不同，因为
    CA 证书是唯一的。加入令牌的有效期为 24 小时，因此如果以后想添加更多节点，你需要创建一个新的令牌。


    ```

    sudo kubeadm join 172.16.94.10:6443 \

    --token pdru87.9yjxcif8n4bb4yp0  \

    --discovery-token-ca-cert-hash sha256:9c86ee0fa239734c75f8c7233bdd628424098bfd451e154d6280fdf499a69c52

    Listing 4-29

    kubeadm join command

    ```


    > 注意

    > 确保添加 `sudo` – 命令需要以 root 身份运行，而 `--print-join-command` 不会为你添加它！


    节点将报告它们已开始加入过程，如图 [4-9](#494804_1_En_4_Chapter.xhtml#Fig9) 所示。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig9_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig9_HTML.jpg)

    **图 4-9 加入命令（在工作节点上执行）**


    让我们在控制平面上运行 `kubectl` 来列出节点（参见清单 [4-30](#494804_1_En_4_Chapter.xhtml#PC30)）。


    ```

    kubectl get nodes

    Listing 4-30

    List nodes in cluster

    ```


    我们将看到节点已出现但状态还是 `NotReady`（参见图 [4-10](#494804_1_En_4_Chapter.xhtml#Fig10)）。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig10_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig10_HTML.jpg)

    **图 4-10 集群中的节点**


    如果几分钟后再次运行该命令，所有节点都将显示为 `Ready`。节点显示为 `NotReady` 是因为运行 Pod 网络和 `kube-proxy` 的
    Pod 正在部署中。在所有节点都显示为 Ready（如图 [4-11](#494804_1_En_4_Chapter.xhtml#Fig11) 所示）之前，你不应继续在该集群上工作。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig11_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig11_HTML.jpg)

    **图 4-11 集群中所有节点均显示为 Ready**


    ## Building a Cluster in the Cloud with Azure Kubernetes Service


    有了自管理的集群后，让我们也使用 Azure Kubernetes Service 在 Azure 中安装一个托管的 Kubernetes 集群。


    > 注意

    > 此练习也可以从你的管理工作站执行。也可以通过 Azure 门户完成。


    我们将再次使用 `Azure CLI` 进行此练习。


    除非你仍然从第 [1](#494804_1_En_1_Chapter.xhtml) 章的会话中处于登录状态，否则让我们首先登录到你的 Azure 帐户并设置要使用的订阅，如清单
    [4-31](#494804_1_En_4_Chapter.xhtml#PC31) 所示。


    ```

    az login

    az account set -s <subscription-id>

    Listing 4-31

    Log in to Azure account

    ```


    接下来，让我们创建一个专用的资源组，如清单 [4-32](#494804_1_En_4_Chapter.xhtml#PC32) 所示。根据需要修改名称和位置。


    ```

    az group create --name "Kubernetes-Cloud" --location eastus

    Listing 4-32

    Create resource group

    ```


    我们已经准备好创建集群了。我们将使用清单 [4-33](#494804_1_En_4_Chapter.xhtml#PC33) 中的代码，这将在我们之前生成的资源组中创建一个名为
    `AKSCluster` 的三节点集群。


    ```

    az aks create \

    --resource-group "Kubernetes-Cloud" \

    --generate-ssh-keys \

    --name AKSCluster \

    --node-count 3

    Listing 4-33

    Create AKS cluster (bash)

    ```


    如果你是从 PowerShell 运行此命令，请确保修改换行符，如清单 [4-34](#494804_1_En_4_Chapter.xhtml#PC34)
    所示。这适用于本书中的任何多行清单。


    ```

    az aks create `

    --resource-group "Kubernetes-Cloud" `

    --generate-ssh-keys `

    --name AKSCluster `

    --node-count 3

    Listing 4-34

    Create AKS cluster (PowerShell)

    ```


    集群创建完成后，CLI 将报告结果，如图 [4-12](#494804_1_En_4_Chapter.xhtml#Fig12) 所示。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig12_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig12_HTML.jpg)

    **图 4-12 `az aks create` 的输出**


    有关创建 AKS 集群的更多选项（例如机器大小），请参阅官方文档 [*https://docs.microsoft.com/en-us/cli/azure/aks?view=azure-cli-latest#az_aks_create*](https://docs.microsoft.com/en-us/cli/azure/aks%253Fview%253Dazure-cli-latest%2523az_aks_create)。


    为了能够与我们的集群通信，我们需要添加其凭据并将其合并到我们现有的配置文件中。运行清单 [4-35](#494804_1_En_4_Chapter.xhtml#PC35)
    中的命令来执行此操作。这将允许我们使用基于证书的用户认证远程连接到此系统。


    ```

    az aks get-credentials --resource-group "Kubernetes-Cloud" --name AKSCluster

    Listing 4-35

    Retrieve credentials for AKS cluster

    ```


    现在我们已经配置了两个集群，它们的凭据已存储在我们的 `kubectl` 配置中。我们将在下一章解释如何使用 `kubectl` 与这些集群通信并在它们之间切换。


    > 注意

    > 虽然工具和语法可能不同，但部署其他托管的 Kubernetes 集群解决方案（如 GKE 或 EKS）的一般过程是相同的：获取它们的工具、部署集群并下载集群凭据。


    ## Summary


    在本章中，我们探讨了一些安装注意事项以及在安装 Kubernetes 之前需要了解的内容。我们还介绍了如何安装 Kubernetes，包括在 Linux 上自管理安装和通过托管云服务安装。在下一章中，我们将了解如何通过
    `kubectl` 与我们的集群进行交互。'
  raw: "#### Pod Networking\n\nBefore we can join our Worker Nodes, we need to ensure\
    \ that our Pod Network is set up. There are many different solutions out there,\
    \ and we have decided to keep it simple and use *flannel*. While it doesn’t have\
    \ all the advanced configuration settings like *Calico*, another version popular\
    \ for Pod Networking, it works without any additional configuration on local and\
    \ cloud networks, which tend to restrict *IPIP* packages, for example.\n\nDownload\
    \ the default manifest using the *wget* command in Listing [4-26](#494804_1_En_4_Chapter.xhtml#PC26).\n\
    \n```\nwget https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml\n\
    Listing 4-26\nDownload flannel\n```\n\nIf you want, you can look at the file first,\
    \ but there are no required changes, so we’ll go straight ahead and install it\
    \ using kubectl (Listing [4-27](#494804_1_En_4_Chapter.xhtml#PC27)). We will be\
    \ talking more about kubectl in the next chapter, so don’t worry if this feels\
    \ a bit unexplained at this point.\n\n```\nkubectl apply -f kube-flannel.yml\n\
    Listing 4-27\nInstall flannel\n```\n\nYour Pod Networking with flannel is now\
    \ set up.\n\n#### Storage\n\nWhile it would typically be configured at this stage,\
    \ we will be deploying our cluster without any attached storage at first. As Kubernetes\
    \ separates compute and data, this is totally doable. Our first exercises on interacting\
    \ with our cluster in the next chapter won’t require any storage. We will be handling\
    \ storage concepts in Kubernetes in depth in Chapter [6](#494804_1_En_6_Chapter.xhtml)\
    \ before deploying SQL Server – which does require storage.\n\n### Adding Nodes\
    \ to a Cluster\n\nOur Control Plane is ready, but we’re not quite ready to join\
    \ our nodes yet. For a node to be able to join a cluster, we need a token. The\
    \ easiest way is to directly generate a *join command* using kubeadm as shown\
    \ in Listing [4-28](#494804_1_En_4_Chapter.xhtml#PC28).\n\n```\nkubeadm token\
    \ create --print-join-command\nListing 4-28\nGenerate token and join command\n\
    ```\n\nThe output looks similar to what you see in Figure [4-8](#494804_1_En_4_Chapter.xhtml#Fig8).\n\
    \n![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig8_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig8_HTML.jpg)\n\
    \nFigure 4-8\n\nJoin command (generated on Control Plane Node)\n\nNote\n\nDepending\
    \ on your installed version, you may get a warning that Docker is not your container\
    \ runtime. It is safe to ignore this warning.\n\nNow, we can take this command\
    \ and run it (as root; see Listing [4-29](#494804_1_En_4_Chapter.xhtml#PC29))\
    \ on each of our desired Worker Nodes, which will then initiate the join process.\
    \ Your individual join command will be different because the CA certificate is\
    \ unique. The join token is a ticket valid for 24 hours, so if you want to add\
    \ more nodes later, you will need to create a new token.\n\n```\nsudo kubeadm\
    \ join 172.16.94.10:6443 \\\n--token pdru87.9yjxcif8n4bb4yp0  \\\n--discovery-token-ca-cert-hash\
    \ sha256:9c86ee0fa239734c75f8c7233bdd628424098bfd451e154d6280fdf499a69c52\nListing\
    \ 4-29\nkubeadm join command\n```\n\nNote\n\nMake sure to add *sudo* – the command\
    \ needs to be run as root, and the *--print-join-command* does not add it for\
    \ you!\n\nThe nodes will report that they have started the join process as you\
    \ can see in Figure [4-9](#494804_1_En_4_Chapter.xhtml#Fig9).\n\n![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig9_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig9_HTML.jpg)\n\
    \nFigure 4-9\n\nJoin command (executed on Worker Node)\n\nLet us list the nodes\
    \ by running kubectl on the Control Plane (see Listing [4-30](#494804_1_En_4_Chapter.xhtml#PC30)).\n\
    \n```\nkubectl get nodes\nListing 4-30\nList nodes in cluster\n```\n\nWe will\
    \ see that the nodes are showing up but are *NotReady* yet (see Figure [4-10](#494804_1_En_4_Chapter.xhtml#Fig10)).\n\
    \n![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig10_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig10_HTML.jpg)\n\
    \nFigure 4-10\n\nNodes in cluster\n\nIf you run the command again after a few\
    \ minutes, the nodes will all show as *Ready*. Nodes will show as *NotReady* because\
    \ the pods that run Pod Networking and kube-proxy are being deployed. You should\
    \ not proceed working on that cluster until all your nodes show as Ready, as in\
    \ Figure [4-11](#494804_1_En_4_Chapter.xhtml#Fig11).\n\n![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig11_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig11_HTML.jpg)\n\
    \nFigure 4-11\n\nAll Nodes in Cluster showing Ready\n\n## Building a Cluster in\
    \ the Cloud with Azure Kubernetes Service\n\nWith our self-managed cluster in\
    \ place, let’s also install a managed Kubernetes cluster in Azure using Azure\
    \ Kubernetes Service.\n\nNote\n\nThis exercise can also be executed from your\
    \ administrative workstation. It could also be achieved through Azure Portal.\n\
    \nWe will be using the *Azure CLI* again for this exercise.\n\nUnless you are\
    \ still logged in from the session in Chapter [1](#494804_1_En_1_Chapter.xhtml),\
    \ let’s start by logging in to your Azure account and setting the subscription\
    \ to be used as shown in Listing [4-31](#494804_1_En_4_Chapter.xhtml#PC31).\n\n\
    ```\naz login\naz account set -s \nListing 4-31\nLog in to Azure account\n```\n\
    \nNext, let’s create a dedicated resource group as shown in Listing [4-32](#494804_1_En_4_Chapter.xhtml#PC32).\
    \ Modify the name and location to fit your needs.\n\n```\naz group create --name\
    \ \"Kubernetes-Cloud\" --location eastus\nListing 4-32\nCreate resource group\n\
    ```\n\nWe’re already ready to go to create our cluster. We will be using the code\
    \ in Listing [4-33](#494804_1_En_4_Chapter.xhtml#PC33), which will be creating\
    \ a three-node cluster named AKSCluster in our previously generated resource group.\n\
    \n```\naz aks create \\\n--resource-group \"Kubernetes-Cloud\" \\\n--generate-ssh-keys\
    \ \\\n--name AKSCluster \\\n--node-count 3\nListing 4-33\nCreate AKS cluster (bash)\n\
    ```\n\nIn case you are running this command from PowerShell, make sure to modify\
    \ the line breaks as shown in Listing [4-34](#494804_1_En_4_Chapter.xhtml#PC34).\
    \ This applies to any multi-line listing in this book.\n\n```\naz aks create `\n\
    --resource-group \"Kubernetes-Cloud\" `\n--generate-ssh-keys `\n--name AKSCluster\
    \ `\n--node-count 3\nListing 4-34\nCreate AKS cluster (PowerShell)\n```\n\nOnce\
    \ the cluster creation has finished, the CLI will report back as shown in Figure\
    \ [4-12](#494804_1_En_4_Chapter.xhtml#Fig12).\n\n![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig12_HTML.jpg](images/494804_1_En_4_Chapter/494804_1_En_4_Fig12_HTML.jpg)\n\
    \nFigure 4-12\n\nOutput of az aks create\n\nFor more options when creating an\
    \ AKS cluster (like machine size), please refer to the official docs at [*https://docs.microsoft.com/en-us/cli/azure/aks?view=azure-cli-latest#az_aks_create*](https://docs.microsoft.com/en-us/cli/azure/aks%253Fview%253Dazure-cli-latest%2523az_aks_create).\n\
    \nTo be able to communicate with our cluster, we need to add its credentials and\
    \ merge them to our existing configuration file. Run the command in Listing [4-35](#494804_1_En_4_Chapter.xhtml#PC35)\
    \ to do that. This will allow us to connect to this system remotely using certificate-based\
    \ user authentication.\n\n```\naz aks get-credentials --resource-group \"Kubernetes-Cloud\"\
    \ --name AKSCluster\nListing 4-35\nRetrieve credentials for AKS cluster\n```\n\
    \nWe now have two clusters configured and their credentials stored in our kubectl\
    \ configuration. We will explain in the next chapter how we can use kubectl to\
    \ communicate with and switch between those clusters.\n\nNote\n\nWhile the tools\
    \ and syntax may differ, the general process is the same to deploying other managed\
    \ Kubernetes cluster solutions like GKE or EKS. Get their tools, deploy the cluster,\
    \ and download the cluster credentials.\n\n## Summary\n\nIn this chapter, we looked\
    \ at some installation considerations and what you need to know before you install\
    \ Kubernetes. We also covered the how with regard to installing Kubernetes, both\
    \ self-managed on Linux and through a managed cloud service. In the next chapter,\
    \ we will look at how we can interact with our cluster through kubectl."
  trans: '

    #### Pod 网络


    在加入工作节点之前，我们需要确保 Pod 网络已经设置好。市面上有许多不同的解决方案，我们决定保持简单，使用`flannel`。虽然它没有像另一个流行的 Pod
    网络方案`Calico`那样拥有所有高级配置设置，但它在本地和云网络上无需任何额外配置即可工作，而这些网络往往会限制`IPIP`数据包等。


    使用`wget`命令下载默认的清单文件，如清单 4-26 所示。


    ```

    wget https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml

    清单 4-26

    下载 flannel

    ```


    如果需要，你可以先查看文件内容，但无需进行任何更改，因此我们将直接使用`kubectl`安装它，如清单 4-27 所示。我们将在下一章详细讨论`kubectl`，所以如果现在感觉有些解释不清，请不要担心。


    ```

    kubectl apply -f kube-flannel.yml

    清单 4-27

    安装 flannel

    ```


    至此，使用`flannel`的 Pod 网络设置完成。


    #### 存储


    虽然通常会在此阶段进行配置，但我们将首先部署一个没有任何附加存储的集群。由于 Kubernetes 将计算和数据分离，这完全可以实现。我们在下一章中关于与集群交互的最初练习不需要任何存储。在部署
    SQL Server（它确实需要存储）之前，我们将在第 6 章深入探讨 Kubernetes 中的存储概念。


    ### 将节点添加到集群


    我们的控制平面已准备就绪，但还不能立即加入节点。为了使节点能够加入集群，我们需要一个令牌。最简单的方法是使用`kubeadm`直接生成一个`加入命令`，如清单
    4-28 所示。


    ```

    kubeadm token create --print-join-command

    清单 4-28

    生成令牌和加入命令

    ```


    输出内容与图 4-8 中看到的相似。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig8_HTML.jpg](img/494804_1_En_4_Fig8_HTML.jpg)

    **图 4-8 加入命令（在控制平面节点上生成）**


    > 注意

    > 根据你安装的版本，你可能会收到一个警告，提示 Docker 不是你的容器运行时。可以安全地忽略此警告。


    现在，我们可以获取此命令并在每个所需的工作节点上运行它（以 root 身份运行；参见清单 4-29），这将启动加入过程。你自己的加入命令会有所不同，因为 CA
    证书是唯一的。加入令牌的有效期为 24 小时，因此如果以后想添加更多节点，你需要创建一个新的令牌。


    ```

    sudo kubeadm join 172.16.94.10:6443 \

    --token pdru87.9yjxcif8n4bb4yp0  \

    --discovery-token-ca-cert-hash sha256:9c86ee0fa239734c75f8c7233bdd628424098bfd451e154d6280fdf499a69c52

    清单 4-29

    kubeadm 加入命令

    ```


    > 注意

    > 确保添加`sudo` – 命令需要以 root 身份运行，而`--print-join-command`不会为你添加它！


    节点将报告它们已开始加入过程，如图 4-9 所示。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig9_HTML.jpg](img/494804_1_En_4_Fig9_HTML.jpg)

    **图 4-9 加入命令（在工作节点上执行）**


    让我们在控制平面上运行`kubectl`来列出节点（参见清单 4-30）。


    ```

    kubectl get nodes

    清单 4-30

    列出集群中的节点

    ```


    我们将看到节点已出现但状态还是`NotReady`（参见图 4-10）。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig10_HTML.jpg](img/494804_1_En_4_Fig10_HTML.jpg)

    **图 4-10 集群中的节点**


    如果几分钟后再次运行该命令，所有节点都将显示为`Ready`。节点显示为`NotReady`是因为运行 Pod 网络和`kube-proxy`的 Pod 正在部署中。在所有节点都显示为
    Ready（如图 4-11 所示）之前，你不应继续在该集群上工作。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig11_HTML.jpg](img/494804_1_En_4_Fig11_HTML.jpg)

    **图 4-11 集群中所有节点均显示为 Ready**


    ## 在 Azure Kubernetes 服务中构建云集群


    有了自管理的集群后，让我们也使用 Azure Kubernetes Service 在 Azure 中安装一个托管的 Kubernetes 集群。


    > 注意

    > 此练习也可以从你的管理工作站执行。也可以通过 Azure 门户完成。


    我们将再次使用`Azure CLI`进行此练习。


    除非你仍然从第 1 章的会话中处于登录状态，否则让我们首先登录到你的 Azure 帐户并设置要使用的订阅，如清单 4-31 所示。


    ```

    az login

    az account set -s <subscription-id>

    清单 4-31

    登录 Azure 账户

    ```


    接下来，让我们创建一个专用的资源组，如清单 4-32 所示。根据需要修改名称和位置。


    ```

    az group create --name "Kubernetes-Cloud" --location eastus

    清单 4-32

    创建资源组

    ```


    我们已经准备好创建集群了。我们将使用清单 4-33 中的代码，这将在我们之前生成的资源组中创建一个名为`AKSCluster`的三节点集群。


    ```

    az aks create \

    --resource-group "Kubernetes-Cloud" \

    --generate-ssh-keys \

    --name AKSCluster \

    --node-count 3

    清单 4-33

    创建 AKS 集群（bash）

    ```


    如果你是从 PowerShell 运行此命令，请确保修改换行符，如清单 4-34 所示。这适用于本书中的任何多行清单。


    ```

    az aks create `

    --resource-group "Kubernetes-Cloud" `

    --generate-ssh-keys `

    --name AKSCluster `

    --node-count 3

    清单 4-34

    创建 AKS 集群（PowerShell）

    ```


    集群创建完成后，CLI 将报告结果，如图 4-12 所示。


    ![../images/494804_1_En_4_Chapter/494804_1_En_4_Fig12_HTML.jpg](img/494804_1_En_4_Fig12_HTML.jpg)

    **图 4-12 `az aks create`的输出**


    有关创建 AKS 集群的更多选项（例如机器大小），请参阅官方文档[*https://docs.microsoft.com/en-us/cli/azure/aks?view=azure-cli-latest#az_aks_create*](https://docs.microsoft.com/en-us/cli/azure/aks%253Fview%253Dazure-cli-latest%2523az_aks_create)。


    为了能够与我们的集群通信，我们需要添加其凭据并将其合并到我们现有的配置文件中。运行清单 4-35 中的命令来执行此操作。这将允许我们使用基于证书的用户认证远程连接到此系统。


    ```

    az aks get-credentials --resource-group "Kubernetes-Cloud" --name AKSCluster

    清单 4-35

    获取 AKS 集群的凭据

    ```


    现在我们已经配置了两个集群，它们的凭据已存储在我们的`kubectl`配置中。我们将在下一章解释如何使用`kubectl`与这些集群通信并在它们之间切换。


    > 注意

    > 虽然工具和语法可能不同，但部署其他托管的 Kubernetes 集群解决方案（如 GKE 或 EKS）的一般过程是相同的：获取它们的工具、部署集群并下载集群凭据。


    ## 总结


    在本章中，我们探讨了一些安装注意事项以及在安装 Kubernetes 之前需要了解的内容。我们还介绍了如何安装 Kubernetes，包括在 Linux 上自管理安装和通过托管云服务安装。在下一章中，我们将了解如何通过`kubectl`与我们的集群进行交互。

