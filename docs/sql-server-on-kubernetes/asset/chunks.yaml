    Volume matching the Persistent Volume Claim’s size and Access Mode. This process
    is called *binding* , and the status of the object changes to *Bound*. The process
    of creating a Persistent Volume resource and a Persistent Volume Claim is called
    *static provisioning* . Suppose a Persistent Volume cannot be found for a Persistent
    Volume Claim; the status is *Unbound*. If a Persistent Volume cannot be found,
    this will block the startup of a Pod requesting storage from the Cluster, and
    the Pod will be in the *Pending* state. If a Persistent Volume is created and
    has no Persistent Volume Claim, its status is *Available*.


    ```

    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: pvc-nfs-data-static

    spec:

    accessModes:

    - ReadWriteMany

    resources:

    requests:

    storage: 10Gi

    Listing 6-3

    Example Persistent Volume Claim (pvc.yaml)

    ```


    ## Static Provisioning for Persistent Volumes and Persistent Volume Claims


    With all that theory behind us, let’s statically provision a Persistent Volume
    and Persistent Volume Claim and deploy an application that uses those resources
    for persistent storage.


    ### Static Provisioning Storage for Use by an Application


    First, create the Persistent Volume using the code from Listing [6-2](#494804_1_En_6_Chapter.xhtml#PC2)
    (pv.yaml), and then execute `kubectl get pv` (pv is the alias/acronym for Persistent
    Volume) to get the status of the Persistent Volume. In Figure [6-6](#494804_1_En_6_Chapter.xhtml#Fig6),
    you see the Name, which is `pv-nfs-data-static`, its Capacity `10GB`, its Access
    Mode `ReadWriteMany`, its Reclaim Policy `Retain`, and its Status `Available`
    since there is no claim on it yet. Finally, Storage Class is blank since this
    Persistent Volume is not part of a Storage Class.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig6_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Output of kubectl get pv


    Next, create the Persistent Volume Claim using the code from Listing [6-3](#494804_1_En_6_Chapter.xhtml#PC3)
    (pvc.yaml), and then execute `kubectl get pvc` (pvc is the alias/acronym for Persistent
    Volume Claim) to get the status of the Persistent Volume Claim. In Figure [6-7](#494804_1_En_6_Chapter.xhtml#Fig7),
    you can see the name of the Persistent Volume Claim, its status is Bound, and
    the Volume is the Persistent Volume it is bound to, `pv-nfs-data-static`. This
    is the Persistent Volume that was just statically provisioned earlier, `pv-nfs-data-static`.
    The Claim’s capacity is `10GB`, and the Access Mode is `ReadWriteMany(RWX),` and
    it is not a member of a Storage Class.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig7_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Output of kubectl get pvc. The Persistent Volume Claim is bound to pv-nfs-data-static


    When we created the Persistent Volume Claim `pvc-nfs-data-static`, a controller
    in the Cluster began looking for a Persistent Volume to satisfy the Claim based
    on size and Access Mode. The Cluster found `pv-nfs-data-static`, and then the
    two were bound together. In Figure [6-8](#494804_1_En_6_Chapter.xhtml#Fig8), we
    execute `kubectl get pv` again. The status of Persistent Volume `pv-nfs-data-static`
    is now Bound, and the Claim is `default/pvc-nfs-data-static`. Default is the name
    of the namespace that the Persistent Volume Claim is in.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig8_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Output of kubectl get pv with a bound Persistent Volume and Persistent Volume
    Claim'
