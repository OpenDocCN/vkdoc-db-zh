    *   **管理状态：** 启动容器并保持其在线。如果某些原因导致基于容器的应用程序停止或变得不可用，容器编排器可以做出反应并重新启动容器。

    *   **部署的速度和一致性：** 代码用于定义应用程序部署。容器编排器将部署该代码中定义的内容。此代码用于快速且一致地部署我们的应用程序。

    *   **隐藏集群的复杂性：** 容器编排器暴露了一个程序化 API 进行交互，因此用户可以较少关注我们应用程序的物理基础设施，而更专注于应用程序的部署方式。

    *   **持久的应用程序访问端点：** 容器编排器将跟踪哪些服务可用，并为我们基于容器的应用程序提供的服务提供持久的访问。


    有几种不同的容器编排器可用，本书重点介绍 Kubernetes（[*https://kubernetes.io/*](https://kubernetes.io/)），因为它已成为开源容器编排器的标准。因此，本书的其余部分将重点介绍如何构建
    Kubernetes 集群并将 SQL Server 部署到该环境中。


    ## 更多资源


    要更深入地了解 Docker 卷，请查看 Anthony 的博客系列“在 Docker 容器中持久化 SQL Server 数据”：


    *   [*www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-1/*](http://www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-1/)

    *   [*www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-2/*](http://www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-2/)

    *   [*www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-3/*](http://www.centinosystems.com/blog/sql/persisting-sql-server-data-in-docker-containers-part-3/)


    看看我们的技术评审和容器专家 Andrew Pruski (*@dbafromthecold*)的容器博客系列。只要是关于容器的，Andrew 很可能都写过博客：


    *   [*https://dbafromthecold.com/2017/03/15/summary-of-my-container-series/*](https://dbafromthecold.com/2017/03/15/summary-of-my-container-series/)


    另外，请务必看看我们的好朋友和全方位的 SQL Server 专家 Bob Ward (*@bobwardms*)提供的资源。容器中的 SQL Server
    就是 Linux 上的 SQL Server。如果你想深入了解 SQL Server 在 Linux 上的工作原理，请务必查看 Bob 的书*Pro SQL
    Server on Linux*，Anthony 非常荣幸地担任了该书的技术评审：


    *   **GitHub:** [*https://github.com/microsoft/bobsql*](https://github.com/microsoft/bobsql)

    *   ***Pro SQL Server on Linux:*** [*www.apress.com/gp/book/9781484241271*](https://www.apress.com/gp/book/9781484241271)

    *   ***SQL Server 2019 Revealed:*** [*www.apress.com/gp/book/9781484254189*](https://www.apress.com/gp/book/9781484254189)


    ## 总结


    Kubernetes 是一个容器编排器，在本章中，我们奠定了容器工作原理的基础。我们展示了什么是容器以及容器如何提供应用程序隔离。容器用于快速部署应用程序，在我们的示例中，我们在容器中运行了
    SQL Server。本章的一个关键概念是需要将配置和状态与容器生命周期解耦，其核心工具是用于注入配置的环境变量和独立于容器生命周期持久化状态（数据）的卷。随着你学习如何在
    Kubernetes 上部署 SQL Server，这些核心概念将在本书的其余部分被重新审视和利用。


    # 3. Kubernetes 架构


    本章介绍 Kubernetes，描述其在现代应用程序部署中的角色、提供的优势及其架构。从其优势开始，你将学习 Kubernetes 在现代基于容器的应用程序部署中提供的价值。接下来，你将学习
    Kubernetes API 如何使你能够构建和部署下一代应用程序和系统。在该 API 中，你将学习 Kubernetes 提供的用于定义和部署应用程序及系统的核心
    API 原语。然后，你将学习 Kubernetes 集群及其组件的关键概念，并了解 Kubernetes 网络基础知识。

    '
- fmt: '## Introducing Kubernetes


    Kubernetes is a container orchestrator. It has the responsibility of starting
    up container-based applications on servers in a data center. To do this, Kubernetes
    uses `API Objects` representing resources in a data center, enabling developers
    and system administrators to define systems in code and use that code to deploy.
    Container-based applications are deployed as `Pods` into a `Kubernetes Cluster`.
    A Cluster is a collection of compute resources, either physical or virtual servers,
    called `Nodes`. Let’s dive into each of these elements in more detail, starting
    with the benefits of Kubernetes and understanding the value it provides in modern
    application deployment:


    *   **Workload scheduling:** Kubernetes is a container orchestrator having the
    primary goal of starting up container-based applications, called `Pods`, on `Nodes`
    in a `Cluster`. It is Kubernetes’ job to find the most appropriate place to run
    a `Pod` in the `Cluster`. When scheduling `Pods` on `Nodes`, a primary concern
    is determining if a `Node` has enough CPU and memory resources to run the assigned
    workload.


    *   **Managing state:** When code is deployed into Kubernetes, defining a workload
    that needs to be running, Kubernetes has the responsibility to start up `Pods`
    and other resources in the `Cluster` and keep the `Cluster` in the desired state.
    If the `Cluster`’s running state skews from the desired state, Kubernetes will
    try to change the `Cluster`’s running state to get the running state of the `Cluster`
    back into the defined desired state. For example, if a `Deployment` defines having
    a number of `Pods` running, if a `Pod` fails, Kubernetes will deploy a new `Pod`
    into the `Cluster`, replacing the failed `Pod`, ensuring the number of `Pods`
    defined by the `Deployment` are up and running. Further, suppose you want to scale
    the number of `Pods` supporting an application to add more capacity. In that case,
    you increase the number of replicas in the `Deployment`, and Kubernetes will create
    additional `Pods` in the `Cluster` ensuring the desired state is realized. More
    on this in the upcoming section on `Controllers`.


    *   **Consistent Deployment:** Deploying applications with code enables repeatable
    processes. The code defining a deployment is the configuration artifact and can
    be placed in source control. You can also use this code to deploy identical systems
    in down-level environments such as development environments or even between on-premises
    systems and the cloud. More on this in the upcoming section on the Kubernetes
    API.


    *   **Speed:** Kubernetes enables fast, controlled deployments, starting `Pods`
    in a `cluster` quickly. Furthermore, in Kubernetes, applications can be scaled
    quickly. Expanding the number of `Pods` supporting an application can be as simple
    as changing a line of code, and this can take as little as seconds. This will
    be demonstrated in great detail in Chapters [5](#494804_1_En_5_Chapter.xhtml)
    and [7](#494804_1_En_7_Chapter.xhtml).


    *   **Infrastructure abstraction:** The Kubernetes API provides an abstraction
    or wrapper around the resources available in a `Cluster`. When deploying applications,
    there is less focus on infrastructure and more on how applications are defined
    and deployed and consume the `Cluster`’s resources. The code used for deployments
    will describe how the `Deployment` should look, and the `Cluster` will make that
    happen. If applications need resources such as public IP addresses or storage,
    that becomes part of the `Deployment`, and the `Cluster` will provision these
    resources for the applications’ use.


    *   **Persistent Service endpoints:** Kubernetes provides persistent IP and DNS
    naming for applications deployed in the `Cluster`. As `Pods` can come and go due
    to scaling operations or reacting to failure events, Kubernetes provides this
    networking abstraction for accessing these applications. Depending upon the type
    of `Service` used, the service load balances application traffic to the `Pods`
    supporting the application. As `Pods` are created and destroyed, either based
    on scaling operations or in response to failures in the `Cluster`, Kubernetes
    automatically updates the information on which `Pods` provide the application
    services.


    ## The Kubernetes API


    The Kubernetes API provides a programmatic layer representing the resources available
    in a data center. The API enables you to write code to consume those resources
    in your application deployments. When writing code to consume the API, you use
    `API Objects`, which you use to define and deploy application workloads in Kubernetes.
    The code you write is submitted to the `API Server`. The `API Server` is the core
    communication hub in a Kubernetes `Cluster`. It is the primary way you interact
    with a Kubernetes `Cluster` and the only way Kubernetes components inside a `Cluster`
    exchange information. With the new `Cluster` state defined, either on initial
    `Deployment` or modifying an existing deployment, Kubernetes begins to implement
    the state described in your code. The desired state of your code becomes the running
    state in the `Cluster`.


    ### API Objects


    Kubernetes `API Objects` represent resources available in a `Cluster`. There are
    `API Objects` for compute, storage, and networking elements, among others, available
    in a `Cluster` for consumption by your application workloads. You will write code
    using these `API Objects` to define the desired state of your applications and
    systems deployed into a Kubernetes `Cluster`. These defined `API Objects` communicate
    to the `Cluster` the desired state of the workload deployed, and the `Cluster`
    has the responsibility of ensuring that desired state becomes the running state
    of the `Cluster`.


    We will now introduce the core `API Objects` to define workloads in a Kubernetes
    `Cluster`. These are the core building blocks of applications deployed in Kubernetes.
    In the upcoming sections, we will dive deeper into each of these individually:


    *   **Pods:** These are container-based applications. A `Pod` is the unit of work
    in a `Cluster`. A `Pod` is an abstraction that encompasses one or more containers
    and the resources and configuration it needs to execute, including networking,
    storage, environment variables, configuration files, and secrets.


    *   **Controllers:** These define and keep application workloads in the `Cluster`
    in the desired state. Some `Controllers` have the responsibility of starting `Pods`
    and keeping those `Pods` in the desired state. There are several different types
    of `Controllers` for ensuring the state of applications and systems deployed and
    also for the running state of the `Cluster`. We introduce several `Controllers`
    in this section and more throughout the book’s remainder.


    *   **Services:** These provide a networking abstraction for access to `Pod`-based
    applications. `Services` are how applications’ consumers, such as users and other
    applications, access the container-based application services deployed in a `Cluster`.


    *   **Storage:** Kubernetes provides abstractions for `Pods` to access storage
    and configuration data in a `Cluster`. Storage objects like the `Persistent Volume`
    and `Persistent Volume Claim` (`PVC`) are used to persist application data independent
    of the lifecycle of `Pods`.


    *   **Configuration data:** Configuration data can be stored in the `cluster`
    as `ConfigMaps` and `Secrets`, which can be exposed as files and environment variables
    to applications running in `Pods`.


    In addition to the `API Objects` described, there are many more used to craft
    workloads, but these are the core `API Object` types focused on in this book and
    for deploying SQL Server.'
