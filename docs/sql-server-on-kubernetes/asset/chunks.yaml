  raw: '```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    namespace: monitoring

    labels:

    app: influxdb

    name: influxdb

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: influxdb

    template:

    metadata:

    labels:

    app: influxdb

    spec:

    containers:

    - envFrom:

    - secretRef:

    name: influxdb-creds

    image: docker.io/influxdb:1.8

    name: influxdb

    volumeMounts:

    - mountPath: /var/lib/influxdb

    name: var-lib-influxdb

    volumes:

    - name: var-lib-influxdb

    persistentVolumeClaim:

    claimName: pvc-nfs-influxdb

    Listing 8-5

    influxdb-deployment.yaml

    ```


    We will expose this deployment using a NodePort service as shown in Listing [8-6](#494804_1_En_8_Chapter.xhtml#PC6).


    Note


    In this manifest, we’re defining a static port (30010) for our service. Unlike
    the previously deployed services, this service will always run on this port instead
    of a random port. The advantage of this is that you won’t have to change your
    URL calls.


    ```

    apiVersion: v1

    kind: Service

    metadata:

    labels:

    app: influxdb

    name: influxdb

    namespace: monitoring

    spec:

    ports:

    - port: 8086

    protocol: TCP

    targetPort: 8086

    nodePort: 30010

    selector:

    app: influxdb

    type: NodePort

    Listing 8-6

    influxdb-service.yaml

    ```


    Listing [8-7](#494804_1_En_8_Chapter.xhtml#PC7) provides the ConfigMap for Telegraf.
    We’ve added the most common system metrics (like CPU, disk, and memory) as well
    as our SQL Server.


    Note


    Please adjust the <Port> and <Password> in this manifest to match your setting
    before applying it. This will be the password you’ve used for your SQL Server
    as well as its port (NodePort).


    ```

    apiVersion: v1

    kind: ConfigMap

    metadata:

    name: telegraf

    namespace: monitoring

    labels:

    k8s-app: telegraf

    data:

    telegraf.conf: |+

    [global_tags]

    env = "kubeadm"

    [agent]

    hostname = "$HOSTNAME"

    [[outputs.influxdb]]

    urls = ["http://$INFLUXDB_HOST:8086/"] # required

    database = "$INFLUXDB_DB" # required

    timeout = "5s"

    username = "$INFLUXDB_USER"

    password = "$INFLUXDB_USER_PASSWORD"

    [[inputs.cpu]]

    percpu = true

    totalcpu = true

    collect_cpu_time = false

    report_active = false

    [[inputs.disk]]

    ignore_fs = ["tmpfs", "devtmpfs", "devfs"]

    [[inputs.diskio]]

    [[inputs.kernel]]

    [[inputs.mem]]

    [[inputs.processes]]

    [[inputs.swap]]

    [[inputs.system]]

    [[inputs.docker]]

    endpoint = "unix:///var/run/docker.sock"

    [[inputs.sqlserver]]

    servers = [

    "Server=control;Port=;User Id=sa;Password=;app name=telegraf;log=1;"

    ]

    query_version = 2

    Listing 8-7

    telegraf-configmap.yaml

    ```


    Next, we’ll deploy Telegraf through a DaemonSet using Listing [8-8](#494804_1_En_8_Chapter.xhtml#PC8).


    ```

    apiVersion: apps/v1

    kind: DaemonSet

    metadata:

    name: telegraf

    namespace: monitoring

    labels:

    k8s-app: telegraf

    spec:

    selector:

    matchLabels:

    name: telegraf

    template:

    metadata:

    labels:

    name: telegraf

    spec:

    containers:

    - name: telegraf

    image: docker.io/telegraf:latest

    env:

    - name: HOSTNAME

    valueFrom:

    fieldRef:

    fieldPath: spec.nodeName

    - name: "HOST_PROC"

    value: "/rootfs/proc"

    - name: "HOST_SYS"

    value: "/rootfs/sys"

    - name: INFLUXDB_USER

    valueFrom:

    secretKeyRef:

    name: influxdb-creds

    key: INFLUXDB_USER

    - name: INFLUXDB_USER_PASSWORD

    valueFrom:

    secretKeyRef:

    name: influxdb-creds

    key: INFLUXDB_USER_PASSWORD

    - name: INFLUXDB_HOST

    valueFrom:

    secretKeyRef:

    name: influxdb-creds

    key: INFLUXDB_HOST

    - name: INFLUXDB_DB

    valueFrom:

    secretKeyRef:

    name: influxdb-creds

    key: INFLUXDB_DB

    volumeMounts:

    - name: sys

    mountPath: /rootfs/sys

    readOnly: true

    - name: proc

    mountPath: /rootfs/proc

    readOnly: true

    - name: docker-socket

    mountPath: /var/run/docker.sock

    - name: utmp

    mountPath: /var/run/utmp

    readOnly: true

    - name: config

    mountPath: /etc/telegraf

    terminationGracePeriodSeconds: 30

    volumes:

    - name: sys

    hostPath:

    path: /sys

    - name: docker-socket

    hostPath:

    path: /var/run/docker.sock

    - name: proc

    hostPath:

    path: /proc

    - name: utmp

    hostPath:

    path: /var/run/utmp

    - name: config

    configMap:

    name: telegraf

    Listing 8-8

    telegraf-daemonset.yaml

    ```


    Now that we have InfluxDB storing our metrics and Telegraf collecting them for
    us, it’s time to roll out Grafana to visualize them.


    The code in Listing [8-9](#494804_1_En_8_Chapter.xhtml#PC9) will first provide
    us our storage for Grafana’s configuration.


    ```

    apiVersion: v1

    kind: PersistentVolume

    metadata:

    name: pv-nfs-grafana

    labels:

    disk: grafana

    spec:

    capacity:

    storage: 5Gi

    accessModes:

    - ReadWriteOnce

    persistentVolumeReclaimPolicy: Retain

    nfs:

    server: storage

    path: "/srv/exports/volumes/grafana"


    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: pvc-nfs-grafana

    spec:

    selector:

    matchLabels:

    disk: grafana

    accessModes:

    - ReadWriteOnce

    resources:

    requests:

    storage: 5Gi

    Listing 8-9

    grafana-storage.yaml

    ```


    This is followed by deploying Grafana itself using Listing [8-10](#494804_1_En_8_Chapter.xhtml#PC10).
    Take note of the fact that Grafana requires its own user and group to run. We’ve
    created those in Chapter [1](#494804_1_En_1_Chapter.xhtml) when we’ve set up the
    NFS server.


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    namespace: monitoring

    labels:

    app: grafana

    name: grafana

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: grafana

    template:

    metadata:

    labels:

    app: grafana

    spec:

    containers:

    - envFrom:

    - secretRef:

    name: grafana-creds

    image: docker.io/grafana/grafana:7.3.3

    name: grafana

    volumeMounts:

    - name: data-dir

    mountPath: /var/lib/grafana/

    securityContext:

    fsGroup: 472

    runAsGroup: 472

    runAsNonRoot: true

    runAsUser: 472

    volumes:

    - name: data-dir

    persistentVolumeClaim:

    claimName: pvc-nfs-grafana

    Listing 8-10

    grafana-deployment.yaml

    ```


    In our last step, we’ll expose Grafana as a service as well using Listing [8-11](#494804_1_En_8_Chapter.xhtml#PC11).
    This service will again be using a static port (30080).


    ```

    apiVersion: v1

    kind: Service

    metadata:

    labels:

    app: grafana

    name: grafana

    namespace: monitoring

    spec:

    ports:

    - port: 443

    name: https

    targetPort: 3000

    nodePort: 30080

    selector:

    app: grafana

    type: NodePort

    Listing 8-11

    grafana-service.yaml

    ```


    Your performance monitoring environment is now ready to be used. Open a web browser
    and log into [*http://control:30080*](http://www.control:30080) (this can happen
    on any machine that can reach the Control Plane Node and has a matching entry
    in its hosts file). Use the credentials that we’ve defined earlier (in our example
    admin and admin123).


    Navigate to *Configuration* ➤ *Data Sources* on the left side (Figure [8-4](#494804_1_En_8_Chapter.xhtml#Fig4))
    and click *Add data source*.


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig4_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Grafana – Add data source


    Pick *InfluxDB* from the *Time series databases* and click *Select* as illustrated
    in Figure [8-5](#494804_1_En_8_Chapter.xhtml#Fig5).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig5_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Grafana – Add data source - Time series databases


    Set the URL (Figure [8-6](#494804_1_En_8_Chapter.xhtml#Fig6)) to [*http://influxdb:8086*](http://www.influxdb:8086).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig6_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Grafana – Add data source - Settings


    Scroll down, set the *Database* to *monitoring,* and click *Save & Test* to verify
    your connection as shown in Figure [8-7](#494804_1_En_8_Chapter.xhtml#Fig7).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig7_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Grafana – Add data source


    Using this connection, we can now create a dashboard using its metrics. Again,
    we won’t be going through the depth of this but will rather use two existing dashboards.


    Navigate to *Dashboards* and select *Manage* as shown in Figure [8-8](#494804_1_En_8_Chapter.xhtml#Fig8).


    ![../images/494804_1_En_8_Chapter/494804_1_En_8_Fig8_HTML.jpg](images/494804_1_En_8_Chapter/494804_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Grafana – Manage dashboards


    On the next screen (Figure [8-9](#494804_1_En_8_Chapter.xhtml#Fig9)), click *Import*.'
