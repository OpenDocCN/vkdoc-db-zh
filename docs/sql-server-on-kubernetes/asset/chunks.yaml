    清单 2-12 中的命令将现有的数据库备份复制到 `sql2` 容器内的 `/var/opt/mssql/data` 目录，然后清单 2-13 中的命令会为该复制的备份文件设置适当的权限。


    由于 SQL Server 2019 中非 root 用户 SQL Server 容器的性质（[`techcommunity.microsoft.com/t5/sql-server/non-root-sql-server-2019-containers/ba-p/859644`](https://techcommunity.microsoft.com/t5/sql-server/non-root-sql-server-2019-containers/ba-p/859644)），需要调整复制到容器中的文件的权限，以便容器内部的
    `sqlservr` 进程可以读取该文件。在 Linux 系统上，`docker cp` 命令会以执行该命令的基础操作系统用户的 `UID` 来复制文件。容器内部的
    `sqlservr` 进程以用户 `mssql` 运行。以下 `chown` 命令将备份文件的所有者更改为用户 `mssql`，以便该用户可以读取文件。


    ```

    docker exec -u root sql2 chown mssql /var/opt/mssql/data/TestDB1.bak

    清单 2-13

    容器内的 chown 命令

