  trans: "\n## 容器\n\n当使用基于容器的应用部署时，容器直接解决了在基于虚拟机的平台上部署应用时所面临的一些挑战。让我们看看容器带来了哪些优势：\n\
    \n*   **速度：** 与虚拟机相比，容器体积要小得多。例如，一个在 Windows 上安装了`SQL Server`的虚拟机，在包含任何用户数据库之前，最低限度也会超过\
    \ 60GB。而当前的`SQL Server`容器镜像大小约为 1.5GB。在现代数据中心内传输一个 1.5GB 的容器镜像是相对轻松的。而部署一个超过 60GB\
    \ 的虚拟机则可能需要相当长的时间。\n\n*   **修补：** 就应用程序的修补而言，修补是一个与部署分离的独立过程。你很可能需要额外的工具来完成。利用容器，你可以通过简单地拉取应用程序的新容器镜像并基于该新版本启动一个新容器，从而非常快速地更新应用程序。如果配置和状态与容器正确解耦，我们的应用程序就可以在新版本上恢复并开始运行，对应用程序用户的影响微乎其微甚至为零。\n\
    \n*   **故障排除：** 由于容器的短暂性，基于容器的应用程序的一个主要故障排除技术是终止并重新部署容器。由于容器镜像是我们程序状态的一个已知良好起点，因此只需重新启动容器即可恢复到良好状态。\n\
    \n*   **操作系统升级：** 在不同版本的操作系统之间迁移时，可以删除容器并在较新版本的操作系统上重新创建。由于应用程序所需的库都包含在容器内，因此在操作系统版本之间迁移的风险降低了。\n\
    \n*   **快速且一致的部署：** 当使用基于容器的应用部署时，部署是以代码编写的。在应用部署和维护的效率上有所提升。在速度方面，不再依赖人力来完成工作；同时在一致性方面，由于有代表系统状态的代码，可以在部署过程中重复使用。这些代码被置于源代码控制中，是系统期望状态的配置产物。\n\
    \n部署自动化将不再是企业 IT 的事后考虑或追求的目标；它将成为部署应用程序的主要方式——使用定义系统期望状态的、受源代码控制的代码。基于容器的部署技术使\
    \ IT 组织能够更快速、更一致地为业务提供服务，并使 IT 能够更轻松地维护基础设施和应用程序，从而提升组织的运营效率。应用程序的部署和维护可以更快、更自信地完成。\n\
    \n`Docker` 和 `Kubernetes` 都使 IT 组织能够编写代表系统期望状态的代码。然后可以更新这些代码，对应用程序、平台和系统进行所需的更改。可以编写代码用于初始部署、应用更新和修补基于容器的应用程序。这些技术还可用于实现更高效的故障排除，并在需要时构建自修复应用程序。这些概念中的每一个都将在本书后面更详细地探讨。\n\
    \n### 容器领域\n\n好了，既然你已经熟悉了容器的定义以及它如何融入现代应用部署流程，现在让我们来看看容器领域。这里涌现了许多新兴的技术和技巧，我们希望花点时间让你熟悉这个领域的名称和参与者。\n\
    \n以下列表展示了容器领域的一些名称和参与者：\n\n*   **Docker：** 在当今的容器领域，`Docker` 首先是一种技术。它是一个容器运行时和工具集合，使你能够在操作系统上创建和运行容器镜像及容器，并共享该操作系统的资源。\n\
    \n*   **Docker Inc.：** 这是构建工具并推动技术以实现容器的公司。`Docker Inc.` 已将其容器运行时背后的核心技术开源，并衍生出几个开源项目，如\
    \ `containerd` ([`containerd.io/`](https://containerd.io/))、`Open Container Initiative`\
    \ ([www.opencontainers.org/](http://www.opencontainers.org/)) 等。\n\n*   **containerd：**\
    \ 是一个容器运行时，负责协调容器的生命周期功能，如拉取容器镜像、创建、启动和停止容器。`Docker` 和 `Kubernetes` 等都使用 `containerd`\
    \ 来协调容器生命周期功能。在 `Kubernetes` 中，容器运行时是一个可插拔的组件。`containerd` 是事实上的标准。\n\n*   **其他容器运行时：**\
    \ 容器的世界并非只有 Linux 上的 `Docker`。游戏中还有一些其他参与者。以下仅是可用其他容器运行时的一小部分示例：\n    *   **Container\
    \ Linux/CoreOS (rkt)：** 一个专门构建的操作系统，强调使用名为 `rkt`（发音为 rocket，[`coreos.com/`](http://coreos.com/)）的应用容器运行时进行基于容器的应用部署。\n\
    \n    *   **Podman：** 一个用于在基于 Red Hat 的操作系统上运行 Linux 容器的容器运行时。更多信息，请访问 [`github.com/containers/libpod`](https://github.com/containers/libpod)。\n\
    \n    *   **Windows Server 2016：** 使你能够运行 Windows 和 Linux 容器。更多信息，请访问 [`docs.microsoft.com/en-us/virtualization/windowscontainers/`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/)。\n\
    \n注意\n\n在本章中，我们将在单容器部署场景中使用 `Docker` 作为容器运行时。在后面的章节中，我们将在 `Kubernetes 集群` 中使用\
    \ `containerd` 作为容器运行时。\n\n### 获取和运行容器\n\n让我们来谈谈什么是*容器镜像*、容器镜像如何定义以及容器镜像存储在哪里。\n\
    \n以下列表强调了容器镜像的关键要素：\n\n*   **容器镜像：** 包含运行我们的应用程序所需的代码、应用程序二进制文件、库和环境变量。用最基本的术语来说，这些就是运行我们的应用程序所需的东西。一个正在运行的容器镜像称为容器。\n\
    \n*   **Dockerfile：** 定义容器镜像的要素。它告诉容器运行时在容器启动时启动哪个二进制文件、要暴露哪些网络端口，以及关于要构建的容器镜像的其他关键信息。\n\
    \n*   **容器注册库：** 这是存储镜像的地方。`Docker Hub` 是众多容器注册库之一，是存储和交换容器镜像的主要场所。仓库是在容器注册库内组织容器镜像的方式。\n"
- fmt: '### The Container Lifecycle


    Following along in Figure [2-4](#494804_1_En_2_Chapter.xhtml#Fig4), you''ll see
    a container-based application''s lifecycle. When a developer is ready, they will
    build their application in their normal application development platform. Then
    they will write a *Docker file* for that application. This Docker file contains
    the needed information to build a container image for that application. It will
    have information like which binary to start up when the container starts up and
    which network port the application lives on, among many other possible configuration
    attributes and instructions to build the image. Once the Docker file is ready,
    the developer will tell Docker to *build* an image. This will take the defined
    information from the Docker file and create a container image locally on the developer''s
    workstation. That container image is then *pushed* (uploaded) into a *container
    registry* where it will sit until someone is ready to use that container image.
    When a user wants to start up a container from that container image, they will
    *pull* that container image down to their operating system, the container runtime
    on that OS will then create (run) a running container from the container image,
    and then the application is up and running in a container on that OS.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig4_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    A container lifecycle


    OK, so enough talk. Let''s see how you can deploy SQL Server in a container on
    Docker. In this book, you will not be building container images. You will be using
    images available in public container registries. In this chapter, you will be
    working with SQL Server containers, and those images are available from the Microsoft
    Container Registry (`mcr.microsoft.com`).


    ### Working with Container Images


    To pull a container, execute the `docker pull` command and specify the container
    image you want to pull. In the following example, the container image is coming
    from the container registry `mcr.microsoft.com` from the repository `mssql/server`,
    and to ask for a specific container, you specify the *image tag*, which here is
    `2019-latest`. Listing [2-1](#494804_1_En_2_Chapter.xhtml#PC1) shows this command.


    ```

    docker pull mcr.microsoft.com/mssql/server:2019-latest

    Listing 2-1

    docker pull command for latest SQL Server 2019 image

    ```


    Figure [2-5](#494804_1_En_2_Chapter.xhtml#Fig5) shows the resulting output of
    the command in Listing [2-1](#494804_1_En_2_Chapter.xhtml#PC1).


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig5_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Output of docker pull


    In the preceding example, a container image with the tag `2019-latest` conventionally
    is being pulled. The maintainer of the container image repository defines a tag
    that points to the most recent version of their application by specifying a `latest`
    tag. If you want to pull a specific version of a container image, you will want
    to get a list of available tags from the repository. For SQL Server, you can do
    that with the commands shown in Listing [2-2](#494804_1_En_2_Chapter.xhtml#PC2)
    (Bash) and Listing [2-3](#494804_1_En_2_Chapter.xhtml#PC3) (Windows).


    ```

    (Invoke-WebRequest https://mcr.microsoft.com/v2/mssql/server/tags/list).Content

    Listing 2-3

    Command on Windows

    ```


    ```

    curl -sL https://mcr.microsoft.com/v2/mssql/server/tags/list

    Listing 2-2

    Command on Bash

    ```


    Figure [2-6](#494804_1_En_2_Chapter.xhtml#Fig6) shows you a part of these commands''
    outputs. There are many more container images available, but we''ve omitted some
    for brevity.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig6_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Abbreviated list of container images and their tags


    If you want to pull a specific container, you need to specify a container image
    tag. The command in Listing [2-4](#494804_1_En_2_Chapter.xhtml#PC4) will pull
    the container image associated with the tag `2019-CU9-ubuntu-18.04`.


    ```

    docker pull mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04

    Listing 2-4

    docker pull command to pull container image associated with specific tag

    ```


    To get a list of images available on a local system, execute the `docker image
    ls` command in Listing [2-5](#494804_1_En_2_Chapter.xhtml#PC5). The command''s
    output shows the images that have been pulled to the local system. The following
    is an example.


    ```

    docker image ls

    Listing 2-5

    docker image ls command

    ```


    For each image, the output (Figure [2-7](#494804_1_En_2_Chapter.xhtml#Fig7)) shows
    the image''s repository, the tags, the image identifier (the `IMAGE ID`), the
    creation date, and the image size.


    ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig7_HTML.jpg](images/494804_1_En_2_Chapter/494804_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    Output of docker image ls command


    It is a common misconception that the creation date shown by the `docker image
    ls` command is the date on which the image was pulled. That''s not the case. The
    creation date really is the date on which the image was created.


    A container image can have multiple tags. In the preceding output, if you look
    closely at the container `IMAGE ID`, you will notice that both container images
    have the same value for `IMAGE ID`. The tags `2019-latest` and `2019-CU9-ubuntu-18.04`
    point to the same container image because the latest image at the time of this
    writing for SQL Server 2019 is CU9. When a new container image is published into
    the repository, it will have a new, unique container image ID. The repository
    administrator will update the `latest` tag to point to this newest image in that
    repository.'
