  raw: '```

    kind: Deployment

    apiVersion: apps/v1

    metadata:

    name: nfs-client-provisioner

    spec:

    selector:

    matchLabels:

    app: nfs-client-provisioner

    replicas: 1

    strategy:

    type: Recreate

    template:

    metadata:

    labels:

    app: nfs-client-provisioner

    spec:

    serviceAccountName: nfs-client-provisioner

    containers:

    - name: nfs-client-provisioner

    image: quay.io/external_storage/nfs-client-provisioner:latest

    volumeMounts:

    - name: nfs-client-root

    mountPath: /persistentvolumes

    env:

    - name: PROVISIONER_NAME

    value: example.com/nfs

    - name: NFS_SERVER

    value: 172.16.94.5

    - name: NFS_PATH

    value: /srv/exports/volumes

    volumes:

    - name: nfs-client-root

    nfs:

    server: 172.16.94.5

    path: /srv/exports/volumes

    Listing 6-9

    nfs-provisioner.yaml

    ```


    With the NFS dynamic provisioning configuration in place, let’s create an application
    to use NFS dynamic provisioning for storing persistent data. In Listing [6-10](#494804_1_En_6_Chapter.xhtml#PC10),
    we have refactored the nginx deployment to use dynamic provisioning. The first
    part of the manifest is the definition of a Persistent Volume Claim named `pvc-nfs-data-dynamic`.
    In that object, you can see in the field storageClassName it references the Storage
    Class created in Listing [6-6](#494804_1_En_6_Chapter.xhtml#PC6), `nfs-storage`.
    The Volume is still of type `persistentVolumeClaim` and refers to the Persistent
    Volume Claim named `pvc-nfs-data-dynamic`. When this manifest is sent to the API
    Server, the Persistent Volume Claim is created and then the Deployment. The NFS
    dynamic provisioner will then create a Persistent Volume, and it is bound to the
    Persistent Volume Claim, and then the Pod starts up and mounts the Volume into
    the container. We did not have to create the Persistent Volume object directly.


    ```

    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: pvc-nfs-data-dynamic

    spec:

    accessModes:

    - ReadWriteOnce

    storageClassName: nfs-storage

    resources:

    requests:

    storage: 10Gi


    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx-nfs-deployment-dynamic

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: nginx

    template:

    metadata:

    labels:

    app: nginx

    spec:

    containers:

    - name: nginx

    image: nginx

    ports:

    - containerPort: 80

    volumeMounts:

    - name: webcontent

    mountPath: "/usr/share/nginx/html/web-app"

    volumes:

    - name: webcontent

    persistentVolumeClaim:

    claimName: pvc-nfs-data-dynamic


    apiVersion: v1

    kind: Service

    metadata:

    name: nginx-nfs-service-dynamic

    spec:

    selector:

    app: nginx

    ports:

    - port: 80

    protocol: TCP

    targetPort: 80

    Listing 6-10

    A Deployment using dynamic provisioning (deployment-dynamic.yaml)

    ```


    Once the manifest is sent to the API Server, the Persistent Volume Claim is created.
    The NFS dynamic provisioner (Volume Plugin) creates the underlying Persistent
    Volume. Note that the Storage Class is `nfs-storage,` which is the storage class
    used for dynamic provisioning in this scenario.


    Figure [6-12](#494804_1_En_6_Chapter.xhtml#Fig12) shows the Persistent Volume
    Claims.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig12_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    The current Persistent Volume Claims in the cluster


    Figure [6-13](#494804_1_En_6_Chapter.xhtml#Fig13) shows the Persistent Volumes.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig13_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    The current Persistent Volumes in the cluster


    ### Dynamically Provisioning Disks in Azure


    Let’s look at one more dynamic provisioning scenario, this time in Azure . The
    concepts here apply to any of the major cloud providers. When you need storage
    from your Cluster in the cloud using dynamic provisioning, the first thing you
    need to do is see what Storage Classes are available to you already. Most cloud
    providers will provide their commonly used storage subsystems as preconfigured
    Storage Classes for you to dynamically provision storage from.


    Tip


    Make sure to switch your cluster context to the Azure Kubernetes Service Cluster
    created in Chapter [4](#494804_1_En_4_Chapter.xhtml) (`kubectl config use-context
    AKSCluster`).


    In Figure [6-14](#494804_1_En_6_Chapter.xhtml#Fig14) is the output of `kubectl
    get storageclass` in an Azure Kubernetes Service cluster. There are five variations
    of storage available for dynamic provisioning, each having a different use case,
    performance profile, and configuration. To dynamically provision storage from
    one of these storage classes, you will make a Persistent Volume Claim from the
    Storage Class mapping to the type of storage needed.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig14_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Available Storage Classes in an Azure Kubernetes Service cluster


    In Listing [6-11](#494804_1_En_6_Chapter.xhtml#PC11), two resources are created:
    a Persistent Volume Claim and a Deployment. The Persistent Volume Claim defines
    what type of storage we want dynamically allocated for this application. So just
    like before, we define an Access Mode and a size. In this Persistent Volume Claim,
    we are also determining a storageClassName, which is managed-premium. This is
    the storage class that the Persistent Volume will be dynamically allocated from
    when this Persistent Volume Claim is created.


    ```

    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: pvc-azure-data-dynamic

    spec:

    accessModes:

    - ReadWriteOnce

    storageClassName: managed-premium

    resources:

    requests:

    storage: 10Gi


    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx-azure-deployment-dynamic

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: nginx

    template:

    metadata:

    labels:

    app: nginx

    spec:

    containers:

    - name: nginx

    image: nginx

    ports:

    - containerPort: 80

    volumeMounts:

    - name: webcontent

    mountPath: "/usr/share/nginx/html/web-app"

    volumes:

    - name: webcontent

    persistentVolumeClaim:

    claimName: pvc-azure-data-dynamic


    apiVersion: v1

    kind: Service

    metadata:

    name: nginx-azure-service-dynamic

    spec:

    selector:

    app: nginx

    ports:

    - port: 80

    protocol: TCP

    targetPort: 80

    type: LoadBalancer

    Listing 6-11

    A deployment using a Persistent Volume Claim and dynamic provisioning of Azure
    storage (deployment-dynamic-azure.yaml)

    ```


    After creating the resources in Listing [6-11](#494804_1_En_6_Chapter.xhtml#PC11),
    you will have a Persistent Volume, Persistent Volume Claim, Deployment, and Service
    for access to the application. The Persistent Volume Claim will ask the Cluster
    for a Persistent Volume from the Storage Class `managed-premium`, and the underlying
    Persistent Volume is dynamically provisioned.


    In Figure [6-15](#494804_1_En_6_Chapter.xhtml#Fig15), the Persistent Volume Claim
    `pvc-azure-data-dynamic` is bound to the Persistent Volume, which has a dynamically
    generated name prefixed with “`pvc-`”.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig15_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    The dynamically provisioned Persistent Volume and its Persistent Volume Claim


    Note


    Make sure to switch your cluster context back to your lab cluster using `kubectl
    config use-context kubernetes-admin@kubernetes`.


    ## Summary


    In this chapter, we introduced the need for data persistency in the container-based
    application and the internals of how containers persist data in Volumes. We then
    extended that model into the Kubernetes cluster and learned how to use Persistent
    Volumes and Persistent Volume Claims to provide storage to container-based applications
    deployed in Kubernetes. We also looked at dynamic provisioning scenarios in our
    lab environment using NFS and in the cloud using Azure Kubernetes Service.


