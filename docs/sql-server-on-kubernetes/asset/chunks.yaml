    # Modify these variables as needed

    $Region="EastUS"

    $RG="KubernetesLabs"

    $Username="labuser"

    $PW="Str@ngPassw0rd"

    $dnsPrefix="k8slab"

    $VMSize="Standard_B2s"

    $Linux_Image="Canonical:UbuntuServer:18.04-LTS:latest"

    $Windows_Image="Win2016datacenter"

    #Define machines

    $machines = ConvertFrom-Csv @''

    Hostname,IP,OS

    storage,172.16.94.5,Linux

    control,172.16.94.10,Linux

    node1,172.16.94.11,Linux

    node2,172.16.94.12,Linux

    node3,172.16.94.13,Linux

    workstation,172.16.94.100,Windows

    ''@

    # Create RG

    az group create -l $Region -n $RG

    # Create VNET and NSG

    az network vnet create --name LABVnet --resource-group $RG --address-prefixes
    172.16.94.0/24

    az network vnet subnet create --name LabSubnet --address-prefixes 172.16.94.0/24
    `

    --resource-group $RG --vnet-name LABVnet

    az network nsg create --name LABNSG --resource-group $RG

    az network nsg rule create --name SSH --nsg-name LABNSG --priority 1000 `

    --resource-group $RG --destination-port-ranges 22 --access "Allow" `

    --protocol TCP --direction Inbound

    az network nsg rule create --name RDP --nsg-name LABNSG --priority 1001 `

    --resource-group $RG --destination-port-ranges 3389 --access "Allow" `

    --protocol TCP --direction Inbound

    #Create VMs

    foreach($vm in $machines) {

    $hostname=$vm.Hostname

    $DNSName="$dnsPrefix-$hostname"

    $image=$Windows_Image

    if ($vm.OS -eq "Linux") { $image=$Linux_Image }

    az network public-ip create --name PIP-$hostname --resource-group $RG --dns-name
    $DNSName

    az network nic create --name NIC-$hostname --resource-group $RG --subnet LabSubnet
    `

    --vnet-name LABVnet --private-ip-address $vm.IP --public-ip-address PIP-$hostname

    az vm create --name $hostname --resource-group $RG --nics NIC-$hostname --os-disk-size-gb
    150 `

    --os-disk-name Disk-$hostname --image $image --authentication-type password `

    --admin-username $Username --admin-password $PW --size $VMSize

    }

    Listing 1-5

    PowerShell script to create a lab environment using Azure VMs

    ```


    In addition to the Linux VMs, this script has also created a Windows VM, which
    can be used as your administrative workstation as described later in this chapter.


    Note


    Make sure to delete or stop and deallocate all these resources when you don’t
    need them anymore to avoid them generating any unnecessary cost.


    ## Virtual Machine Network Configuration


    Configure the lab VMs’ IP addresses as specified in Table [1-1](#494804_1_En_1_Chapter.xhtml#Tab1).
    You are free to use different IP addresses in your lab, but you will need to account
    for that in several of the labs when building your cluster. If you’ve opted for
    the Azure VM approach in the previous section, those machines will already be
    set up this way.


    Table 1-1


    Virtual Machine Configuration


    | Name | IP Address | Function |

    | --- | --- | --- |

    | control | 172.16.94.10 | Control Plane Node |

    | node1 | 172.16.94.11 | Worker Node |

    | node2 | 172.16.94.12 | Worker Node |

    | node3 | 172.16.94.13 | Worker Node |

    | storage | 172.16.94.5 | NFS Storage Server |

    | workstation (optional) | 172.16.94.100 | Administrative workstation (Windows)
    |


    Next, in IT there’s a saying, it’s always DNS. So, for our lab, we are going to
    add host entries to the `/etc/hosts` file on each of these systems to ensure we
    are able to address all of the systems by name in our lab. In Listing [1-6](#494804_1_En_1_Chapter.xhtml#PC6),
    you will find the contents of our `/etc/hosts` file. Your `hosts` file may have
    entries for localhost and possibly other configurations.


    ```

    172.16.94.5    storage

    172.16.94.10   control

    172.16.94.11   node1

    172.16.94.12   node2

    172.16.94.13   node3

    Listing 1-6

    Required additional Linux hosts file contents

    ```


    If you do not know how to manually edit a file on a Linux system, you can run
    the script in Listing [1-7](#494804_1_En_1_Chapter.xhtml#PC7) on each of the Linux
    nodes.


    ```

    echo 172.16.94.5 storage > tmphosts

    echo 172.16.94.10 control >> tmphosts

    echo 172.16.94.11 node1 >> tmphosts

    echo 172.16.94.12 node2 >> tmphosts

    echo 172.16.94.13 node3 >> tmphosts

    sudo -- sh -c "cat tmphosts >> /etc/hosts"

    Listing 1-7

    Script to add entries to the Linux hosts file

    ```


    On a Windows machine, you will find the file under *C:\Windows\System32\ drivers\etc\hosts.*


    Note


    To edit the hosts file on Windows, make sure to run your editor as administrator.


    Before moving on, please be sure that you have console or SSH access (by using
    the hostname) to all of these virtual machines and that they are able to connect
    to each other over your network.


    ## Azure Kubernetes Service


    The majority of our demos will be from our local virtual machine–based Kubernetes
    Cluster, but due to the cloud native-ness of Kubernetes, there are some labs in
    this book that will require the services of an Azure Kubernetes Service (AKS)
    cluster so we can highlight certain Kubernetes functionality. This will also require
    an Azure subscription. We will build an AKS cluster together in Chapter [4](#494804_1_En_4_Chapter.xhtml).


    If you prefer to use another managed Kubernetes offering like Amazon EKS, that
    is fine too. However, again for reasons of simplicity, we will stick to this one
    example.


    ## Install Tools


    In addition to the Cluster, where we are going to deploy our demo applications
    and SQL Server, we will need some tools to work with the applications and databases
    we deploy. You can install these tools on an administrative workstation and access
    the applications and databases over the network. If so, you’ll want to ensure
    that you have the `/etc/hosts` file entries that we specified on the cluster nodes.
    For lab purposes, you may consider installing these on the Control Plane Node.
    For production systems, this is not advisable.


    We will need


    *   Basic tools (curl, grep, wget, SSH client)


    *   Kubectl


    *   Azure CLI


    *   Azdata


    *   SQL Server Command Line Utilities, which provides *sqlcmd* – [*https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility*](https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility)


    ### Using a Linux Machine as Your Administrative Workstation


    If you prefer to use one of your Linux machines as your administrative workstation,
    we need to make the Microsoft repository a trusted source using the code in Listing
    [1-8](#494804_1_En_1_Chapter.xhtml#PC8) and also to add the Microsoft repository
    to the list of known sources for package installations.


    ```

    sudo apt-get update

    sudo apt-get install gnupg ca-certificates curl wget software-properties-common
    apt-transport-https lsb-release -y

    curl -sL https://packages.microsoft.com/keys/microsoft.asc |

    gpg --dearmor |

    sudo tee /etc/apt/trusted.gpg.d/microsoft.asc.gpg > /dev/null

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    sudo add-apt-repository "$(wget -qO- https://packages.microsoft.com/config/ubuntu/18.04/prod.list)"

    sudo apt-get update

    Listing 1-8

    apt script for basic prerequisites

    ```


    Now we’re ready to go ahead and install azdata, the Azure command line interface,
    and *kubectl* using the code from Listing [1-9](#494804_1_En_1_Chapter.xhtml#PC9).


    ```

    sudo apt-get install -y azdata-cli

    sudo apt-get install -y azure-cli

    sudo apt-get install -y kubectl

    sudo apt-get install -y mssql-tools

    Listing 1-9

    apt script for azdata, azure-cli, sqlcmd, and kubectl

    ```


    That’s it – your Ubuntu machine is ready to go for the upcoming labs.


    ### Using a Windows Machine as Your Administrative Workstation


    Many of us are Windows users and therefore prefer deploying from a Windows client.
    While some of the tasks in the labs must be run within the Linux environment,
    many can also be executed from a Windows client.


    If you have opted to run your VMs in Azure, it is advisable to also have your
    administrative workstation there, so it sits on the same virtual network for seamless
    access to the Linux machines. We have created a Windows VM named *workstation*
    for that purpose earlier.'
