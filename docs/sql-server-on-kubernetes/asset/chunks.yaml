    # 持久卷与持久卷声明的静态配置


    ## 持久卷声明


    当一个应用希望连接到集群中的持久卷时，必须创建一个**持久卷声明**。持久卷声明是用户发起的存储请求。通过持久卷声明，您只需向集群提出存储需求，而无需在 Pod
    规范中涉及实现细节。这使得您的应用配置具有可移植性，并且在定义 Pod 及更高级别的资源时，使您的部署清单独立于具体的集群，从而将基础设施相关的代码从部署代码中分离出来，归入专用的存储对象。


    持久卷声明请求基于容量大小和访问模式，由集群中的控制器负责将持久卷声明映射到持久卷。这个过程称为**绑定**。持久卷声明是一个命名空间作用域的资源，它会绑定到不具有命名空间作用域的持久卷。


    注意：在将持久卷声明绑定到持久卷时，如果集群无法找到完全匹配容量的持久卷，则可能将声明绑定到一个容量大于持久卷声明请求大小的持久卷。


    ## 定义持久卷声明


    清单 6-3 展示了一个持久卷声明的代码。在该声明中，我们在 `spec.resources.requests.storage` 字段定义了 10GB 的容量大小，并在
    `spec.accessModes` 字段定义了 `ReadWriteMany` 的访问模式。一旦这个 YAML 清单被发送到 API 服务器，集群将尝试寻找一个匹配该持久卷声明的容量和访问模式的持久卷。这个过程称为
    `绑定`，对象的状态会变为 `Bound`。创建持久卷资源和持久卷声明的过程称为 **静态配置**。假设找不到满足持久卷声明的持久卷，则其状态为 `Unbound`。如果找不到持久卷，这将阻塞请求集群存储的
    Pod 的启动，该 Pod 将处于 `Pending` 状态。如果一个持久卷被创建但没有对应的持久卷声明，其状态则为 `Available`。


    ```yaml

    apiVersion: v1

    kind: PersistentVolumeClaim

    metadata:

    name: pvc-nfs-data-static

    spec:

    accessModes:

    - ReadWriteMany

    resources:

    requests:

    storage: 10Gi

    ```

    清单 6-3：持久卷声明示例 (pvc.yaml)


    ## 为应用静态配置存储


    理论部分介绍完毕，让我们来静态配置一个持久卷和持久卷声明，并部署一个使用这些资源进行持久化存储的应用。


    首先，使用清单 6-2 (pv.yaml) 中的代码创建持久卷，然后执行 `kubectl get pv`（`pv` 是持久卷的别名/缩写）来获取持久卷的状态。在图
    6-6 中，您可以看到其名称 `pv-nfs-data-static`、容量 `10GB`、访问模式 `ReadWriteMany`、回收策略 `Retain`，以及状态
    `Available`（因为目前还没有声明绑定到它）。最后，存储类是空白的，因为此持久卷不是存储类的一部分。


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig6_HTML.jpg](img/494804_1_En_6_Fig6_HTML.jpg)

    图 6-6：`kubectl get pv` 的输出


    接下来，使用清单 6-3 (pvc.yaml) 中的代码创建持久卷声明，然后执行 `kubectl get pvc`（`pvc` 是持久卷声明的别名/缩写）来获取其状态。在图
    6-7 中，您可以看到持久卷声明的名称，其状态为 `Bound`，而 `Volume` 字段显示了它绑定到的持久卷 `pv-nfs-data-static`。这正是我们之前刚刚静态配置的持久卷
    `pv-nfs-data-static`。该声明的容量为 `10GB`，访问模式为 `ReadWriteMany(RWX)`，并且它不属于任何存储类。


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig7_HTML.jpg](img/494804_1_En_6_Fig7_HTML.jpg)

    图 6-7：`kubectl get pvc` 的输出。持久卷声明已绑定到 `pv-nfs-data-static`


    当我们创建持久卷声明 `pvc-nfs-data-static` 时，集群中的一个控制器开始根据容量和访问模式寻找合适的持久卷来满足该声明。集群找到了 `pv-nfs-data-static`，然后两者被绑定在一起。在图
    6-8 中，我们再次执行 `kubectl get pv`。持久卷 `pv-nfs-data-static` 的状态现在是 `Bound`，并且 `Claim`
    字段显示为 `default/pvc-nfs-data-static`。`Default` 是该持久卷声明所在的命名空间的名称。


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig8_HTML.jpg](img/494804_1_En_6_Fig8_HTML.jpg)

    图 6-8：持久卷和持久卷声明绑定后 `kubectl get pv` 的输出

    '
- fmt: "### Deploying an Application Using Persistent Storage\n\nWith the storage\
    \ resources created via static provisioning, it is time to use that storage in\
    \ an application. In Listing [6-4](#494804_1_En_6_Chapter.xhtml#PC4) is a deployment\
    \ manifest for an application that uses storage. In the Pod Template Spec, the\
    \ Volume ``webcontent`` is of type ``persistentVolumeClaim``. The claimName is\
    \ ``pvc-nfs-data-static``. This is the Persistent Volume Claim object just created\
    \ earlier. So this Pod will try to access that Persistent Volume Claim. Volumes\
    \ are a Pod-level resource and can be shared among any containers running in a\
    \ Pod. The Volume is mapped to the container through the ``containers`` field.\
    \ The field ``volumeMounts`` specifies where inside the container’s file system\
    \ the Volume is mounted – in this example ``/usr/share/nginx/html/web-app``. So\
    \ the applications inside the container access that path, but the data is physically\
    \ stored on the Persistent Volume, which is on the NFS server in the lab and at\
    \ the path ``/srv/exports/volumes/webcontent``. This is the default content directory\
    \ for nginx. So, when the application is available, content in this directory\
    \ is available via HTTP.\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
    \  name: nginx-nfs-deployment\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n\
    \      app: nginx\n  template:\n    metadata:\n      labels:\n        app: nginx\n\
    \    spec:\n      volumes:\n        - name: webcontent\n          persistentVolumeClaim:\n\
    \            claimName: pvc-nfs-data-static\n      containers:\n        - name:\
    \ nginx\n          image: nginx\n          ports:\n            - containerPort:\
    \ 80\n          volumeMounts:\n            - name: webcontent\n              mountPath:\
    \ \"/usr/share/nginx/html/web-app\"\n\n---\napiVersion: v1\nkind: Service\nmetadata:\n\
    \  name: nginx-nfs-service\nspec:\n  selector:\n    app: nginx\n  ports:\n   \
    \ - port: 80\n      protocol: TCP\n      targetPort: 80\n```\nListing 6-4\nA Deployment\
    \ using persistent storage (deployment-static.yaml)\n\nIn Figure [6-9](#494804_1_En_6_Chapter.xhtml#Fig9),\
    \ you can see our web application accessing content on the NFS server `index.html`.\n\
    \n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig9_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig9_HTML.jpg)\n\
    Figure 6-9\nGet the IP address of the Service and access the application with\
    \ `curl`. The document returned is from the NFS server\n\nIn Figure [6-10](#494804_1_En_6_Chapter.xhtml#Fig10),\
    \ you can see we have opened a bash shell into one of the Pods in the Deployment\
    \ and listed the directory contents of ``/usr/share/nginx/html/web-app/``, and\
    \ the content from the NFS server is available in that directory.\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig10_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig10_HTML.jpg)\n\
    Figure 6-10\nA directory listing of the mounted Volume inside the Pod\n\nAnd finally,\
    \ in Figure [6-11](#494804_1_En_6_Chapter.xhtml#Fig11), you can see on the storage\
    \ server that in the NFS exports directory, this is the export exposed to the\
    \ Pod via the Persistent Volume and mounted into the container for access by nginx.\n\
    \n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig11_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig11_HTML.jpg)\n\
    Figure 6-11\nA directory list of the content stored on the NFS server\n\nIn this\
    \ section, we used static provisioning to create storage for a web application\
    \ deployment – creating the Persistent Volume and Persistent Volume Claim and\
    \ then using that Persistent Volume Claim as the Volume attached inside the Pod.\n\
    \n## Storage Classes and Dynamic Provisioning\n\nStatic provisioning is where\
    \ the cluster administrator defines and creates each Persistent Volume manually,\
    \ as we just explored in the previous section. Dynamic provisioning creates the\
    \ Persistent Volume resources on demand when a Persistent Volume Claim resource\
    \ is created. This can be advantageous as it relieves the cluster administrator\
    \ from having to manually configure storage for user requests. To facilitate dynamic\
    \ provisioning, a cluster administrator creates a ``Storage Class``. Let’s examine\
    \ the details of how dynamic provisioning works in Kubernetes.\n\n### Storage\
    \ Classes\n\nTo enable dynamic provisioning, a cluster administrator creates a\
    \ ``Storage Class``. A ``Storage Class`` is an API Object that describes a class\
    \ of storage available for allocation in the Cluster. ``Storage Class``es enable\
    \ you to define these tiers of storage and their configuration. And then you can\
    \ dynamically allocate Persistent Volumes to access that storage and attach it\
    \ to Pods in your Cluster. Common ways to group storage include the performance\
    \ attributes of the underlying storage infrastructure, such as Tier 1 solid-state\
    \ disks or Tier 2 hard disk drives or when in the cloud Premium or Standard storage\
    \ types.\n\nThe ``Storage Class`` uses a provisioner, sometimes called a Volume\
    \ Plugin, which is software deployed in the Cluster that interoperates with the\
    \ underlying storage infrastructure to create storage objects when Persistent\
    \ Volume Claims are created and presents that storage back to the cluster as a\
    \ Persistent Volume. Infrastructure-specific configuration parameters are defined\
    \ in the ``Storage Class`` and used as a template for the Persistent Volumes dynamically\
    \ allocated from the ``Storage Class``. When defining ``Storage Class``es, you\
    \ can configure a default ``Storage Class``. A default ``Storage Class`` is the\
    \ ``Storage Class`` used when a Persistent Volume Claim does not specify one in\
    \ its manifest.\n\nNote\n\nFor configuration examples of ``Storage Class``es for\
    \ many different types of storage available to use in Kubernetes, check out [https://kubernetes.io/docs/concepts/storage/storage-classes/](https://kubernetes.io/docs/concepts/storage/storage-classes/).\n\
    \n### Dynamic Provisioning\n\nWith a ``Storage Class`` defined in your Cluster,\
    \ when you create a Persistent Volume Claim, the ``Storage Class``' Volume Plugin\
    \ dynamically creates a Persistent Volume. Dynamic provisioning is available for\
    \ many different types of physical and cloud storage such as Azure Disk, Azure\
    \ Files, AWS Elastic Block Storage, Fiber Channel, GCE Persistent Disk, iSCSI,\
    \ and vSphere VMDK. For a complete list of storage types that support dynamic\
    \ provisioning, head over to [https://kubernetes.io/docs/concepts/storage/storage-classes/](https://kubernetes.io/docs/concepts/storage/storage-classes/)."
  raw: '### Deploying an Application Using Persistent Storage


    With the storage resources created via static provisioning, it is time to use
    that storage in an application. In Listing [6-4](#494804_1_En_6_Chapter.xhtml#PC4)
    is a deployment manifest for an application that uses storage. In the Pod Template
    Spec, the Volume `webcontent` is of type `persistentVolumeClaim`. The claimName
    is `pvc-nfs-data-static`. This is the Persistent Volume Claim object just created
    earlier. So this Pod will try to access that Persistent Volume Claim. Volumes
    are a Pod-level resource and can be shared among any containers running in a Pod.
    The Volume is mapped to the container through the *containers* field. The field
    volumeMounts specifies where inside the container’s file system the Volume is
    mounted – in this example `/usr/share/nginx/html/web-app`. So the applications
    inside the container access that path, but the data is physically stored on the
    Persistent Volume, which is on the NFS server in the lab and at the path `/srv/exports/volumes/webcontent`.
    This is the default content directory for nginx. So, when the application is available,
    content in this directory is available via HTTP.


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx-nfs-deployment

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: nginx

    template:

    metadata:

    labels:

    app: nginx

    spec:

    volumes:

    - name: webcontent

    persistentVolumeClaim:

    claimName: pvc-nfs-data-static

    containers:

    - name: nginx

    image: nginx

    ports:

    - containerPort: 80

    volumeMounts:

    - name: webcontent

    mountPath: "/usr/share/nginx/html/web-app"


    apiVersion: v1

    kind: Service

    metadata:

    name: nginx-nfs-service

    spec:

    selector:

    app: nginx

    ports:

    - port: 80

    protocol: TCP

    targetPort: 80

    Listing 6-4

    A Deployment using persistent storage (deployment-static.yaml)

    ```


    In Figure [6-9](#494804_1_En_6_Chapter.xhtml#Fig9), you can see our web application
    accessing content on the NFS server *index.html*.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig9_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Get the IP address of the Service and access the application with curl. The document
    returned is from the NFS server


    In Figure [6-10](#494804_1_En_6_Chapter.xhtml#Fig10), you can see we have opened
    a bash shell into one of the Pods in the Deployment and listed the directory contents
    of `/usr/share/nginx/html/web-app/`, and the content from the NFS server is available
    in that directory.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig10_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    A directory listing of the mounted Volume inside the Pod


    And finally, in Figure [6-11](#494804_1_En_6_Chapter.xhtml#Fig11), you can see
    on the storage server that in the NFS exports directory, this is the export exposed
    to the Pod via the Persistent Volume and mounted into the container for access
    by nginx.


    ![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig11_HTML.jpg](images/494804_1_En_6_Chapter/494804_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    A directory list of the content stored on the NFS server


    In this section, we used static provisioning to create storage for a web application
    deployment – creating the Persistent Volume and Persistent Volume Claim and then
    using that Persistent Volume Claim as the Volume attached inside the Pod.


    ## Storage Classes and Dynamic Provisioning


    Static provisioning is where the cluster administrator defines and creates each
    Persistent Volume manually, as we just explored in the previous section. Dynamic
    provisioning creates the Persistent Volume resources on demand when a Persistent
    Volume Claim resource is created. This can be advantageous as it relieves the
    cluster administrator from having to manually configure storage for user requests.
    To facilitate dynamic provisioning, a cluster administrator creates a Storage
    Class. Let’s examine the details of how dynamic provisioning works in Kubernetes.


    ### Storage Classes


    To enable dynamic provisioning, a cluster administrator creates a Storage Class.
    A Storage Class is an API Object that describes a class of storage available for
    allocation in the Cluster. Storage Classes enable you to define these tiers of
    storage and their configuration. And then you can dynamically allocate Persistent
    Volumes to access that storage and attach it to Pods in your Cluster. Common ways
    to group storage include the performance attributes of the underlying storage
    infrastructure, such as Tier 1 solid-state disks or Tier 2 hard disk drives or
    when in the cloud Premium or Standard storage types.


    The Storage Class uses a provisioner, sometimes called a Volume Plugin, which
    is software deployed in the Cluster that interoperates with the underlying storage
    infrastructure to create storage objects when Persistent Volume Claims are created
    and presents that storage back to the cluster as a Persistent Volume. Infrastructure-specific
    configuration parameters are defined in the Storage Class and used as a template
    for the Persistent Volumes dynamically allocated from the Storage Class. When
    defining Storage Classes, you can configure a default Storage Class. A default
    Storage Class is the Storage Class used when a Persistent Volume Claim does not
    specify one in its manifest.


    Note


    For configuration examples of Storage Classes for many different types of storage
    available to use in Kubernetes, check out [*https://kubernetes.io/docs/concepts/storage/storage-classes/*](https://kubernetes.io/docs/concepts/storage/storage-classes/).


    ### Dynamic Provisioning


    With a Storage Class defined in your Cluster, when you create a Persistent Volume
    Claim, the Storage Class’ Volume Plugin dynamically creates a Persistent Volume.
    Dynamic provisioning is available for many different types of physical and cloud
    storage such as Azure Disk, Azure Files, AWS Elastic Block Storage, Fiber Channel,
    GCE Persistent Disk, iSCSI, and vSphere VMDK. For a complete list of storage types
    that support dynamic provisioning, head over to [*https://kubernetes.io/docs/concepts/storage/storage-classes/*](https://kubernetes.io/docs/concepts/storage/storage-classes/).'
  trans: "### 使用持久化存储部署应用\n\n通过静态配置创建存储资源后，就可以在应用程序中使用这些存储了。清单 6-4 展示了一个使用存储的应用程序的部署清单。在\
    \ Pod 模板规范中，名为 `webcontent` 的卷类型是 `persistentVolumeClaim`。其 claimName 是 `pvc-nfs-data-static`。这正是刚刚创建的持久卷声明对象。因此，这个\
    \ Pod 将尝试访问该持久卷声明。卷是 Pod 级别的资源，可以在 Pod 内运行的任何容器之间共享。该卷通过 `containers` 字段映射到容器。`volumeMounts`\
    \ 字段指定了卷在容器文件系统内的挂载位置——在此示例中为 `/usr/share/nginx/html/web-app`。因此，容器内部的应用程序访问该路径，但数据实际存储在持久卷上，该持久卷位于实验室的\
    \ NFS 服务器上，路径为 `/srv/exports/volumes/webcontent`。这是 nginx 的默认内容目录。所以，当应用程序可用时，该目录中的内容即可通过\
    \ HTTP 访问。\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name:\
    \ nginx-nfs-deployment\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n\
    \      app: nginx\n  template:\n    metadata:\n      labels:\n        app: nginx\n\
    \    spec:\n      volumes:\n        - name: webcontent\n          persistentVolumeClaim:\n\
    \            claimName: pvc-nfs-data-static\n      containers:\n        - name:\
    \ nginx\n          image: nginx\n          ports:\n            - containerPort:\
    \ 80\n          volumeMounts:\n            - name: webcontent\n              mountPath:\
    \ \"/usr/share/nginx/html/web-app\"\n\n---\napiVersion: v1\nkind: Service\nmetadata:\n\
    \  name: nginx-nfs-service\nspec:\n  selector:\n    app: nginx\n  ports:\n   \
    \ - port: 80\n      protocol: TCP\n      targetPort: 80\n```\n清单 6-4\n一个使用持久化存储的部署（deployment-static.yaml）\n\
    \n在图 6-9 中，您可以看到我们的 Web 应用程序正在访问 NFS 服务器上的 `index.html` 内容。\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig9_HTML.jpg](img/494804_1_En_6_Fig9_HTML.jpg)\n\
    图 6-9\n获取 Service 的 IP 地址，并使用 `curl` 访问应用程序。返回的文档来自 NFS 服务器。\n\n在图 6-10 中，您可以看到我们打开了一个到部署中某个\
    \ Pod 的 bash shell，列出了 `/usr/share/nginx/html/web-app/` 目录的内容，来自 NFS 服务器的内容在该目录中可用。\n\
    \n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig10_HTML.jpg](img/494804_1_En_6_Fig10_HTML.jpg)\n\
    图 6-10\nPod 内部已挂载卷的目录列表\n\n最后，在图 6-11 中，您可以在存储服务器上看到，在 NFS 导出目录中，这是通过持久卷暴露给 Pod\
    \ 并挂载到容器中供 nginx 访问的导出目录。\n\n![../images/494804_1_En_6_Chapter/494804_1_En_6_Fig11_HTML.jpg](img/494804_1_En_6_Fig11_HTML.jpg)\n\
    图 6-11\n存储在 NFS 服务器上的内容的目录列表\n\n在本节中，我们使用静态配置为 Web 应用程序部署创建了存储——创建了持久卷和持久卷声明，然后将该持久卷声明作为卷附加到\
    \ Pod 内部。\n\n## 存储类和动态配置\n\n静态配置是集群管理员手动定义和创建每个持久卷的方式，正如我们在上一节中所探讨的。动态配置则是在创建持久卷声明资源时，按需创建持久卷资源。这样做是有利的，因为它减轻了集群管理员为用户请求手动配置存储的负担。为了支持动态配置，集群管理员需要创建一个\
    \ `Storage Class`。让我们详细了解一下 Kubernetes 中动态配置的工作原理。\n\n### 存储类\n\n要启用动态配置，集群管理员需要创建一个\
    \ `Storage Class`。`Storage Class` 是一个 API 对象，用于描述集群中可供分配的存储类别。`Storage Class`\
    \ 允许您定义这些存储层级及其配置。然后，您可以动态分配持久卷来访问该存储，并将其附加到集群中的 Pod。对存储进行分组的常见方式包括底层存储基础设施的性能属性，例如\
    \ Tier 1 固态硬盘或 Tier 2 硬盘驱动器，或在云环境中的 Premium 或 Standard 存储类型。\n\n`Storage Class`\
    \ 使用一个配置器（有时称为卷插件），这是部署在集群中的软件，与底层存储基础设施进行交互，在创建持久卷声明时创建存储对象，并将该存储作为持久卷呈现回集群。特定于基础设施的配置参数在\
    \ `Storage Class` 中定义，并用作从该 `Storage Class` 动态分配的持久卷的模板。在定义 `Storage Class` 时，您可以配置一个默认的\
    \ `Storage Class`。默认 `Storage Class` 是当持久卷声明在其清单中未指定 `Storage Class` 时所使用的那个。\n\
    \n注意\n有关 Kubernetes 中可用于许多不同类型存储的 `Storage Class` 配置示例，请查看 [`kubernetes.io/docs/concepts/storage/storage-classes/`](https://kubernetes.io/docs/concepts/storage/storage-classes/)。\n\
    \n### 动态配置\n\n在集群中定义了 `Storage Class` 后，当您创建一个持久卷声明时，该 `Storage Class` 的卷插件会动态创建一个持久卷。动态配置可用于多种不同的物理和云存储，例如\
    \ Azure Disk、Azure Files、AWS Elastic Block Storage、Fiber Channel、GCE Persistent\
    \ Disk、iSCSI 和 vSphere VMDK。有关支持动态配置的存储类型的完整列表，请访问 [`kubernetes.io/docs/concepts/storage/storage-classes/`](https://kubernetes.io/docs/concepts/storage/storage-classes/)。"
- fmt: '## Reclaim Policy


    当应用程序使用完持久卷（Persistent Volume）且消耗对象（如 Pod 或 Deployment）被删除时，可以删除持久卷声明（Persistent
    Volume Claim）。回收策略（Reclaim Policy）告诉集群在删除持久卷声明后应对持久卷做什么。当前支持的选项是 `Retain` 和 `Delete`。回收策略适用于静态和动态配置的持久卷：


    *   `Retain`：在删除持久卷声明时，保留持久卷及其底层存储。

    *   `Delete`：在删除持久卷声明时，删除持久卷及其底层存储。


    回收策略保护的是持久卷对象的复用，而不是底层存储。如果在删除持久卷声明对象时使用 `Retain` 回收策略，持久卷对象将不会被删除。持久卷的状态将变为 `Released`。如果你想复用持久卷中存储的数据，则需要集群管理员手动回收底层存储。你需要删除持久卷对象，同时保持底层存储元素完好无损。然后，你将重新配置一个持久卷指向该设备。这完全是一个新的持久卷，只是复用了底层存储。如果你不打算复用存储，则集群管理员需要删除底层存储。


    对于支持动态配置的系统和存储类型，通常使用 `Delete` 回收策略。`Delete` 回收策略会在删除持久卷声明时删除持久卷及其底层存储。这要求底层存储使用支持动态配置的卷插件（Volume
    Plugin）。存储类（Storage Classes）通常使用 `Delete` 回收策略，给人一种回收/动态分配给集群的物理存储的感觉。在使用 Azure/GKE/EKS
    等云平台的虚拟磁盘时，你会最常见到这种情况。随着存储子系统开始支持动态配置，这类功能在本地部署环境中也变得越来越普遍。请咨询你的存储管理员和供应商，了解你的存储系统是否支持动态配置。


    ## 使用动态配置来创建持久卷和持久卷声明


    在本节中，我们将介绍如何在 Kubernetes 应用程序部署中使用动态配置进行存储。我们将介绍两种场景：用于本地实验室场景的基于 NFS 的场景和用于云场景的基于
    Azure 磁盘的场景。


    ### 使用 NFS 动态配置磁盘


    在本书的实验室环境中，我们选择使用 NFS，因为它简单且易于访问……NFS 易于配置且广泛可用。对于本地生产场景，请考虑为企业级存储集群和应用数据使用企业级存储。


    我们在上一节刚刚探讨了 NFS 的静态配置。让我们深入探讨如何在实验室集群中为 NFS 配置动态配置。此配置支持本书后面即将进行的演示。我们还想指出，这里重点介绍的动态配置概念与其他动态配置器类似。


    我们将从清单 [6-5](#494804_1_En_6_Chapter.xhtml#PC5) 中的代码开始，为 NFS 动态配置器配置安全设置。


    ```

    kind: ServiceAccount

    apiVersion: v1

    metadata:

    name: nfs-client-provisioner


    kind: ClusterRole

    apiVersion: rbac.authorization.k8s.io/v1

    metadata:

    name: nfs-client-provisioner-runner

    rules:

    - apiGroups: [""]

    resources: ["persistentvolumes"]

    verbs: ["get", "list", "watch", "create", "delete"]

    - apiGroups: [""]

    resources: ["persistentvolumeclaims"]

    verbs: ["get", "list", "watch", "update"]

    - apiGroups: ["storage.k8s.io"]

    resources: ["storageclasses"]

    verbs: ["get", "list", "watch"]

    - apiGroups: [""]

    resources: ["events"]

    verbs: ["create", "update", "patch"]


    kind: ClusterRoleBinding

    apiVersion: rbac.authorization.k8s.io/v1

    metadata:

    name: run-nfs-client-provisioner

    subjects:

    - kind: ServiceAccount

    name: nfs-client-provisioner

    namespace: default

    roleRef:

    kind: ClusterRole

    name: nfs-client-provisioner-runner

    apiGroup: rbac.authorization.k8s.io


    kind: Role

    apiVersion: rbac.authorization.k8s.io/v1

    metadata:

    name: leader-locking-nfs-client-provisioner

    rules:

    - apiGroups: [""]

    resources: ["endpoints"]

    verbs: ["get", "list", "watch", "create", "update", "patch"]


    kind: RoleBinding

    apiVersion: rbac.authorization.k8s.io/v1

    metadata:

    name: leader-locking-nfs-client-provisioner

    subjects:

    - kind: ServiceAccount

    name: nfs-client-provisioner

    namespace: default

    roleRef:

    kind: Role

    name: leader-locking-nfs-client-provisioner

    apiGroup: rbac.authorization.k8s.io

    ```

    清单 6-5

    `nfs-rbac.yaml`


    接下来，我们将定义存储类本身（清单 [6-6](#494804_1_En_6_Chapter.xhtml#PC6)）。


    ```

    apiVersion: storage.k8s.io/v1

    kind: StorageClass

    metadata:

    name: nfs-storage

    provisioner: example.com/nfs

    parameters:

    archiveOnDelete: "false"

    ```

    清单 6-6

    `nfs-storageclass.yaml`


    这个特定的存储类还需要在 Kubernetes API 服务器中进行设置。因此，我们需要更新 API 服务器的配置以支持此设置。使用特权访问权限打开控制平面上的文件
    `/etc/kubernetes/manifests/kube-apiserver.yaml`，并找到清单 [6-7](#494804_1_En_6_Chapter.xhtml#PC7)
    中的部分。


    ```

    spec:

    containers:

    - command:

    - kube-apiserver

    ```

    清单 6-7

    `kube-apiserver.yaml` 中的 API 服务器部分


    在此部分中，添加如清单 [6-8](#494804_1_En_6_Chapter.xhtml#PC8) 所示的一行。


    ```

    - --feature-gates=RemoveSelfLink=false

    ```

    清单 6-8

    `kube-apiserver.yaml` 中的新行


    对文件所做的更改将由 kubelet 自动读取并应用于 API 服务器。在应用更改和 API 服务器 Pod 重建期间，你可能会暂时失去对 API 服务器的访问权限。


    > 注意

    >

    > 目录 `/etc/kubernetes/manifests/` 包含集群控制平面的静态 Pod 清单。此目录中的每个清单都定义了控制平面 Pod 的配置。


    我们进行动态配置的最后一步是一个客户端配置器，负责在 Pod 动态请求时创建卷（清单 [6-9](#494804_1_En_6_Chapter.xhtml#PC9)）。'
  raw: '## Reclaim Policy


    When an application is finished using a Persistent Volume and the consuming object
    is deleted, such as a Pod or a Deployment, the Persistent Volume Claim can be
    deleted. The Reclaim Policy tells the Cluster what to do with the Persistent Volume
    once the Persistent Volume Claim is deleted. The currently supported options are
    *Retain* and *Delete*. The Reclaim Policy applies to both statically and dynamically
    provisioned Persistent Volumes:


    *   **Retain:** Keeps the Persistent Volume and its underlying storage when the
    Persistent Volume Claim is deleted


    *   **Delete:** Deletes the Persistent Volume and its underlying storage when
    the Persistent Volume Claim is deleted


    The Reclaim Policy protects reuse of the Persistent Volume object, not the underlying
    storage. If you use the Retain Reclaim Policy when the Persistent Volume Claim
    object is deleted, the Persistent Volume object will not be deleted. The status
    of the Persistent Volume will be *Released*. If you want to reuse the data stored
    in the Persistent Volume, the underlying storage needs to be manually reclaimed
    by a cluster administrator. You will need to delete the Persistent Volume object,
    leaving the underlying storage element intact. Then you will create a Persistent
    Volume that is newly configured to that device again. This is an entirely new
    Persistent Volume but just reusing the underlying storage. If you don’t intend
    to reuse the storage, then the cluster administrator needs to delete the underlying
    storage.


    For systems and storage types that support dynamic provisioning, the Delete Reclaim
    Policy is often used. The Delete Reclaim Policy deletes the Persistent Volume
    and its underlying storage when the Persistent Volume Claim is deleted. This requires
    the underlying storage to use a Volume Plugin that supports dynamic provisioning.
    Storage Classes often use the *Delete Reclaim Policy*, giving you the feeling
    of recycling/dynamic physical storage allocated to the Cluster. You will see this
    most commonly in cloud scenarios when using virtual disks in Azure/GKE/EKS and
    others. This type of functionality is becoming more common on-premises as storage
    subsystems begin to support dynamic provisioning. Talk to your storage administrators
    and vendors to see if your storage systems support dynamic provisioning.


    ## Using Dynamic Provisioning for Persistent Volumes and Persistent Volume Claims


    In this section, we introduce how to use dynamic provisioning for storage in Kubernetes
    in application deployments. We will present two scenarios, NFS based for on-premises
    lab scenarios and Azure Disk based for cloud scenarios.


    ### Dynamically Provisioning Disks Using NFS


    In the lab environment for this book, we choose to use NFS for its simplicity
    and accessibility… NFS is easy to configure and widely available. For production
    scenarios on-premises, consider using enterprise-class storage for your clusters
    and application data.


    We just explored static provisioning for NFS in the previous section. Let’s dive
    in on how to configure dynamic provisioning for NFS in our lab Cluster. This configuration
    supports upcoming demos later in the book. We also want to point out that the
    dynamic provisioning configuration concepts highlighted here will be like other
    dynamic provisioners.


    We’ll start with the code in Listing [6-5](#494804_1_En_6_Chapter.xhtml#PC5) to
    configure security for the NFS dynamic provisioner.


    ```

    kind: ServiceAccount

    apiVersion: v1

    metadata:

    name: nfs-client-provisioner


    kind: ClusterRole

    apiVersion: rbac.authorization.k8s.io/v1

    metadata:

    name: nfs-client-provisioner-runner

    rules:

    - apiGroups: [""]

    resources: ["persistentvolumes"]

    verbs: ["get", "list", "watch", "create", "delete"]

    - apiGroups: [""]

    resources: ["persistentvolumeclaims"]

    verbs: ["get", "list", "watch", "update"]

    - apiGroups: ["storage.k8s.io"]

    resources: ["storageclasses"]

    verbs: ["get", "list", "watch"]

    - apiGroups: [""]

    resources: ["events"]

    verbs: ["create", "update", "patch"]


    kind: ClusterRoleBinding

    apiVersion: rbac.authorization.k8s.io/v1

    metadata:

    name: run-nfs-client-provisioner

    subjects:

    - kind: ServiceAccount

    name: nfs-client-provisioner

    namespace: default

    roleRef:

    kind: ClusterRole

    name: nfs-client-provisioner-runner

    apiGroup: rbac.authorization.k8s.io


    kind: Role

    apiVersion: rbac.authorization.k8s.io/v1

    metadata:

    name: leader-locking-nfs-client-provisioner

    rules:

    - apiGroups: [""]

    resources: ["endpoints"]

    verbs: ["get", "list", "watch", "create", "update", "patch"]


    kind: RoleBinding

    apiVersion: rbac.authorization.k8s.io/v1

    metadata:

    name: leader-locking-nfs-client-provisioner

    subjects:

    - kind: ServiceAccount

    name: nfs-client-provisioner

    namespace: default

    roleRef:

    kind: Role

    name: leader-locking-nfs-client-provisioner

    apiGroup: rbac.authorization.k8s.io

    Listing 6-5

    nfs-rbac.yaml

    ```


    Next, we’ll define the storage class itself (Listing [6-6](#494804_1_En_6_Chapter.xhtml#PC6)).


    ```

    apiVersion: storage.k8s.io/v1

    kind: StorageClass

    metadata:

    name: nfs-storage

    provisioner: example.com/nfs

    parameters:

    archiveOnDelete: "false"

    Listing 6-6

    nfs-storageclass.yaml

    ```


    This specific class also requires a setting within the Kubernetes API Server.
    Therefore, we need to update the configuration of the API Server to support this
    configuration. Open the file */etc/kubernetes/manifests/kube-apiserver.yaml* on
    the Control Plane with privileged access and find the section in Listing [6-7](#494804_1_En_6_Chapter.xhtml#PC7).


    ```

    spec:

    containers:

    - command:

    - kube-apiserver

    Listing 6-7

    API Server section in kube-apiserver.yaml

    ```


    Within this section, add a line as shown in Listing [6-8](#494804_1_En_6_Chapter.xhtml#PC8).


    ```

    - --feature-gates=RemoveSelfLink=false

    Listing 6-8

    New line in kube-apiserver.yaml

    ```


    The changes made to this file will be automatically read by the kubelet and applied
    to the API Server. You may lose access to the API Server momentarily while the
    changes are applied, and the API Server Pod is recreated.


    Note


    The directory `/etc/kubernetes/manifests/` contains the static pod manifests for
    the cluster Control Plane. Each of the manifests in this directory defines the
    configuration of the Control Plane pods.


    The last step for our dynamic provisioning is a client provisioner responsible
    for creating volumes whenever a pod dynamically asks for them (Listing [6-9](#494804_1_En_6_Chapter.xhtml#PC9)).'
