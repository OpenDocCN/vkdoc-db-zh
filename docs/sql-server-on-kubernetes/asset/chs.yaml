  \n#### 停止容器\n\n运行守护进程（如 SQL Server）的容器将持续运行，直到被告知停止。要停止一个正在运行的容器，执行清单 2-18 中的 `docker\
  \ stop` 命令，并指定容器名称或容器 ID。在下面的示例中，容器 `sql2` 正在被停止。这将向容器内运行的进程发送一个 `SIGTERM` 信号，使其优雅地关闭。\n\
  \n```\ndocker stop sql2\n清单 2-18\ndocker stop 命令\n```\n\n#### 在本地系统上查找容器\n\n此时，本地系统上有两个容器。一个容器已停止（`sql2`），另一个仍在运行（`sql1`）。现在执行\
  \ `docker ps` 命令。\n\n在输出（图 2-14）中，只有一个正在运行的容器 `sql1`。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig14_HTML.jpg](img/494804_1_En_2_Fig14_HTML.jpg)\n\
  \n图 2-14\n`docker ps` 命令的输出。正在运行的容器列表\n\n要查看系统上的所有容器，无论其当前状态是停止还是运行，请执行清单 2-19 中的\
  \ `docker ps -a` 命令。\n\n```\ndocker ps -a\n清单 2-19\ndocker ps -a 命令\n```\n\n在图 2-15\
  \ 显示的输出中，列出了两个容器 `sql1` 和 `sql2`。关键信息是 `STATUS`（状态）列。`sql1` 仍然在运行，状态值为 `16 minutes\
  \ ago`（16 分钟前启动）。对于另一个容器 `sql2`，状态是 `Exited (0) 33 seconds`（33 秒前退出）；它目前已停止。其中的\
  \ `0` 是应用程序的退出代码。非零退出代码表示程序内部发生错误；零（0）表示正常关闭。\n\n**注意**\n如果你发现非零退出代码，说明出现了问题，你需要使用\
  \ `docker logs` 来调查该容器的问题。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig15_HTML.jpg](img/494804_1_En_2_Fig15_HTML.jpg)\n\
  \n图 2-15\n`docker ps -a` 命令的输出。相应系统上所有容器的列表\n\n\n\n## 启动和管理容器\n\n### 启动一个现有容器\n\n\
  由于容器仍存在于系统上，可以使用 `docker start` 命令并指定容器名称来重新启动它。该容器的所有状态和配置信息仍将保留，因此当容器再次启动时，我们的系统数据库和用户数据库都还在。\n\
  \n```\ndocker start sql2\n代码清单 2-20\ndocker start 命令\n```\n\n然后，我们可以使用 `sqlcmd`\
  \ 来列出我们实例中的数据库，如下列命令所示。\n\n```\nsqlcmd -S localhost,1434 -U sa -Q 'SELECT name from\
  \ sys.databases' -P 'S0methingS@Str0ng!'\n代码清单 2-21\n使用 sqlcmd 列出数据库\n```\n\n在输出中，`sql2`\
  \ 已重新启动，显示了系统上的当前数据库，包括已还原的用户数据库 `TestDB1`。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig16_HTML.jpg](img/494804_1_En_2_Fig16_HTML.jpg)\n\
  *图 2-16. 数据库列表*\n\n现在，让我们清理并停止这些容器。\n\n```\ndocker stop sql1\ndocker stop sql2\n\
  代码清单 2-22\ndocker stop 命令\n```\n\n### 移除容器\n\n当容器停止后，`docker rm` 将从系统中移除一个容器。此时，容器内的数据将被销毁。因此，一旦这些容器被移除，已还原的\
  \ `TestDB1` 也就消失了。关于独立于容器生命周期的数据持久化将在下一节介绍。在以下示例中，`sql1` 和 `sql2` 都被删除。\n\n```\n\
  docker rm sql1\ndocker rm sql2\n代码清单 2-23\ndocker rm 命令\n```\n\n前面的示例删除了容器，但没有删除容器镜像。容器镜像仍在本地系统上，可用于派生新的容器。执行\
  \ `docker image ls` 可以显示系统上存在的容器镜像。\n\n```\ndocker image ls\n代码清单 2-24\ndocker image\
  \ ls 命令\n```\n\n你可以看到容器镜像仍然在本地系统上。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig17_HTML.jpg](img/494804_1_En_2_Fig17_HTML.jpg)\n\
  *图 2-17. `docker image ls` 命令的输出。本地系统上的容器镜像*\n\n## 容器内部原理\n\n现在，我们花点时间来看看容器内部原理，以便你能够理解操作系统在容器内运行进程时如何实现并提供对进程及其资源的隔离。\n\
  \n容器是一个运行中的进程，它对底层操作系统及其资源具有隔离的视图。当从容器镜像启动容器时，容器运行时被指示启动在容器镜像中定义的一个特定进程。同时还定义了应用程序监听的端口以及其他配置信息。\n\
  \n如前所述，在容器内执行的进程列表仅显示容器内运行的进程；系统上的其他进程不可见。尽管应用程序在容器内监听端口 `1433`，但要访问该应用程序，必须在基础操作系统上发布一个唯一的端口。操作系统如何为基于容器的应用程序在单一系统上提供这种隔离？这就是\
  \ Linux 命名空间（namespaces）的用武之地。\n\n### 命名空间\n\nLinux 内核命名空间 ([`man7.org/linux/man-pages/man7/namespaces.7.html`](http://man7.org/linux/man-pages/man7/namespaces.7.html))\
  \ 是一种内核构造，为在 Linux 上运行的进程提供隔离。Linux 中有六个核心命名空间，其中五个用于资源隔离，一个用于资源管理。查看下面的命名空间列表，你可以感受到命名空间提供了什么。它们为程序和程序正在使用的资源提供了与基础操作系统的隔离——例如进程、文件、网络等。\n\
  \n五个资源隔离命名空间为系统上运行的进程提供对底层操作系统服务的访问：\n\n*   **PID：** 进程隔离\n*   **MNT：** 文件系统和挂载点隔离\n\
  *   **NET：** 网络设备和协议栈隔离\n*   **IPC：** 进程间通信\n*   **UTS：** 唯一的主机名和域名\n\n第六个命名空间 `cgroups`（控制组）为在基础操作系统上运行的进程提供资源隔离。这使得多个进程可以在操作系统上运行，并让管理员能够控制资源分配：\n\
  \n*   **cgroups：** 控制组能够分配和控制对系统资源（如 CPU、I/O 和内存）的访问。\n\n关于 `cgroups` 工作原理的更多信息，请查看\
  \ Linux 手册页链接：[`man7.org/linux/man-pages/man7/cgroups.7.html`](http://man7.org/linux/man-pages/man7/cgroups.7.html)。\n\
  \n### 联合文件系统\n\n容器镜像是只读的。当容器运行时，对容器内文件的任何更改都使用写时复制技术写入一个可写层。联合文件系统（Union File System）获取容器镜像的基础层和可写层，并将两者作为单一统一的文件系统呈现给应用程序。这种技术使我们能够从单个镜像启动许多容器，并通过重复使用该容器镜像层作为许多容器的起点来获得效率。每个容器都将拥有一个唯一的可写层，其生命周期与容器绑定。当容器被删除时，这个可写层也会被删除。如果你正在运行像\
  \ SQL Server 这样的有状态应用，这听起来不太吸引人。为基于容器的应用程序提供数据持久化的技术将在下一节介绍。Docker 联合文件系统的实现细节多年来已经从\
  \ AUFS、UnionFS 变为 OverlayFS，但这些实现细节超出了本讨论范围。\n\n**注意**\n如果你想深入了解容器镜像的工作原理，我们鼓励你查看我们同事\
  \ Elton Stoneman (@EltonStoneman) 在 Pluralsight 上的课程 “Handling Data and Stateful\
  \ Applications in Docker” ([`app.pluralsight.com/library/courses/handling-data-stateful-applications-docker/table-of-contents`](https://app.pluralsight.com/library/courses/handling-data-stateful-applications-docker/table-of-contents))。\n\
  \n### 容器中的数据持久化\n\n容器是短暂的（ephemeral），这意味着当容器被删除时，它就永远消失了。在上一节中，我们介绍过，当正在运行的容器内部数据发生变化时，它会被写入一个可写层，联合文件系统的职责是将各层连接起来，为基于容器的应用程序呈现一个单一的统一文件系统。而当容器被删除时，可写层也会被一并删除。那么，容器能否在其生命周期内（从创建到删除再到重新创建）实现数据持久化呢？你可能还会问，我们为什么需要删除容器？难道我们不应该让它一直保持运行吗？嗯，是的，你可以让容器一直运行，但如果你需要更换基础容器镜像（可能因为升级或某种修补，你的应用程序有了新的容器镜像），你就需要删除现有容器并使用那个新的容器镜像启动一个新容器。\n\
  \n\n\n\n#### Docker 卷\n\nDocker 卷（`https://docs.docker.com/storage/`）是一种由 Docker\
  \ 管理的资源，它独立于容器的生命周期。Docker 卷从底层操作系统或共享存储分配存储空间，并将其呈现到容器文件系统内的特定位置。\n\n提示\n请访问 `https://docs.docker.com/storage/storagedriver/`\
  \ 查阅 Docker 文档以获取关于存储驱动程序的信息。\n\n当一个卷被挂载到容器文件系统内的某个位置时，应用程序修改的数据会被写入该文件系统位置，并最终写入卷中。这个卷的后端存储位于容器外部。现在，如果这个容器被删除，容器及其可写层仍然会被删除，但卷会保留下来，因为它的生命周期独立于容器。因此，文件系统中未由卷支持的其他部分的所有更改将不会被持久化。但是，写入由卷支持的文件位置的数据将被持久化。如果创建一个新容器并将该卷挂载到其中，存储在该卷中的数据在新容器中仍然是可访问的。图\
  \ 2-18 展示了一个名为 `sql1` 的容器化应用程序访问一个名为 `sqldata1` 的卷。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig18_HTML.jpg](img/494804_1_En_2_Fig18_HTML.jpg)\n\
  \n图 2-18：附加了卷的容器\n\n让我们来看一些为 SQL Server 容器定义 Docker 卷的代码。\n\n#### 创建带有卷的容器\n\n清单\
  \ 2-25 中的代码展示了一个容器的启动命令，与我们之前的示例类似。关键区别在于使用了 `-v` 或 `--volume` 参数来指定数据卷。\n\n```\n\
  docker run \\\n--name 'sql1' \\\n-e 'ACCEPT_EULA=Y' \\\n-e 'MSSQL_SA_PASSWORD=S0methingS@Str0ng!'\
  \ \\\n-p 1433:1433 \\\n-v sqldata1:/var/opt/mssql \\\n-d mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04\n\
  ```\n\n清单 2-25：`docker run` 命令 – 数据卷规格说明\n\n让我们来解析这行代码……`-v` 指定了卷的配置。这会创建一个名为 `sqldata1`\
  \ 的命名卷，该卷将从底层操作系统的文件系统中分配。确切的位置特定于容器运行时的平台（Windows、Linux 或 MacOS）。冒号之后，您需要定义希望在容器内部挂载卷的位置，因此此卷被挂载到\
  \ `/var/opt/mssql`，这是 SQL Server on Linux 容器中的默认实例目录。在此目录内，您将找到 SQL Server 所需的数据文件，例如\
  \ SQL Server 错误日志、跟踪文件、扩展事件文件以及系统和用户数据库。任何写入 `/var/opt/mssql` 的数据都将被写入卷中，这是一个独立于容器的资源。\n\
  \n注意\nSQL Server 的二进制文件位于文件系统的另一部分 `/opt/mssql/bin`。因此，当容器镜像被更新版本的 SQL Server 替换时，新的二进制文件将用于启动容器，而我们的数据将从\
  \ `/var/opt/mssql` 读取，该数据在容器实例化之间会持久存在。\n\n那么，让我们在实践中看看这个过程，运行一系列使用 SQL Server 和\
  \ Docker 卷的演示，其中将突出显示以下要点。首先，启动一个在容器内部 `/var/opt/mssql` 处挂载了卷的容器，并还原一个数据库。接着，删除该容器。然后，创建一个使用相同卷的新容器。最后，观察我们的数据如何独立于该容器的生命周期而持久存在。让我们开始吧。\n\
  \n在清单 2-26 中，定义了一个带有卷 `sqldata1` 的容器。该卷被挂载到容器文件系统的 `/var/opt/mssql` 位置，所以让我们运行这个命令。\n\
  \n现在，容器已经启动并运行，将数据库备份复制到容器中，并在备份文件上设置适当的权限。然后使用与上一节相同的过程还原数据库。代码示例（清单 2-26）突出了这三个步骤。\n\
  \n```\ndocker cp TestDB1.bak sql1:/var/opt/mssql/data\ndocker exec -u root sql1\
  \ chown mssql /var/opt/mssql/data/TestDB1.bak\nsqlcmd -S localhost,1433 -U sa -i\
  \ restore_testdb1.sql -P 'S0methingS@Str0ng!'\n```\n\n清单 2-26：`docker cp` 命令\n\n\
  `sqlcmd` 将再次确认执行。\n\n容器启动并运行且用户数据库已还原后，检查我们此 SQL Server 容器实例上当前数据库列表，以确认数据库还原成功（清单\
  \ 2-27）。\n\n```\nsqlcmd -S localhost,1433 -U sa -Q 'SELECT name from sys.databases'\
  \ -P 'S0methingS@Str0ng!'\n```\n\n清单 2-27：通过 `sqlcmd` 列出所有数据库\n\n输出如图 2-19 所示。`TestDB1`\
  \ 列在此 SQL Server 实例的数据库集合中。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig19_HTML.jpg](img/494804_1_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19：SQL Server 实例上的数据库列表\n\n\n\n此容器附加了一个卷，并挂载在其文件系统的 `/var/opt/mssql` 目录中。当\
  \ SQL Server 首次启动时，它会将关键的实例文件和系统数据库放入此目录。前一示例中恢复的用户数据库，根据恢复脚本（代码清单 2-28）中的代码，被恢复到了子目录\
