- '# 关于作者 关于技术审阅者


  '
- "# 第一部分：容器与 Kubernetes 基础\n\n\n\n## 开始使用\n\n欢迎来到**Kubernetes 上的 SQL Server**！本章将介绍实验环境的架构以及执行本书实验所需的技术要求。第一批实验基于在\
  \ Docker 主机上的容器中部署 SQL Server。之后，我们将进展到将 SQL Server 和其他应用程序部署到一个 Kubernetes 集群中，我们将在本书后面的部分帮助你构建这个集群。\n\
  \n### 安装 Docker\n\n在第 2 章，我们将介绍容器以及将 SQL Server 部署为容器。要执行该章的实验，你需要在一台计算机上安装 Docker\
  \ 和`sqlcmd`实用工具。如果你更喜欢使用其他基于命令行的 SQL 客户端，如`mssql-cli`，那也没问题。但为了简便起见，我们的演示将坚持使用`sqlcmd`。\n\
  \nDocker 可用于 Windows、MacOS 和 Linux 平台，每个平台都有独特的安装方法。虽然你可以在这些平台中的任何一个上安装 Docker，并且第\
  \ 2 章的演示也能运行，但我们建议为本课程创建一个拥有 2 个 vCPU、8GB RAM 和 150GB 磁盘空间的虚拟机，并安装 Ubuntu 18.04\
  \ 作为基础操作系统。\n\n以下是 Docker 在各平台上的安装说明链接。请查阅在每个平台上安装 Docker 的要求。如果你想复现第 2 章的演示，你需要首先准备好此环境：\n\
  \n*   **Docker Desktop for Windows：** [*https://docs.docker.com/docker-for-windows/install/*](https://docs.docker.com/docker-for-windows/install/)\n\
  *   **Docker Desktop for Mac：** [*https://docs.docker.com/docker-for-mac/install/*](https://docs.docker.com/docker-for-mac/install/)\n\
  *   **Docker Engine – Community (Ubuntu)：** [*https://docs.docker.com/install/linux/docker-ce/ubuntu/*](https://docs.docker.com/install/linux/docker-ce/ubuntu/)\n\
  \n在继续之前，请确保你能在你的环境中成功运行一个容器。在命令行执行清单 1-1。\n\n`docker run hello-world`\n\n清单 1-1：运行你的第一个\
  \ Docker 容器\n\n如果容器成功运行，你将看到如清单 1-2 所示的输出。\n\n```\nUnable to find image 'hello-world:latest'\
  \ locally\nlatest: Pulling from library/hello-world\n1b930d010525: Pull complete\n\
  Digest: sha256:9572f7cdcee8591948c2963463447a53466950b3fc15a247fcad1917ca215a2f\n\
  Status: Downloaded newer image for hello-world:latest\nHello from Docker!\nThis\
  \ message shows that your installation appears to be working correctly.\nTo generate\
  \ this message, Docker took the following steps:\n1. The Docker client contacted\
  \ the Docker daemon.\n2. The Docker daemon pulled the \"hello-world\" image from\
  \ the Docker Hub. (amd64)\n3. The Docker daemon created a new container from that\
  \ image which runs the executable that produces the output you are currently reading.\n\
  4. The Docker daemon streamed that output to the Docker client, which sent it to\
  \ your terminal.\nTo try something more ambitious, you can run an Ubuntu container\
  \ with:\n$ docker run -it ubuntu bash\nShare images, automate workflows, and more\
  \ with a free Docker ID:\nhttps://hub.docker.com/\nFor more examples and ideas,\
  \ visit:\nhttps://docs.docker.com/get-started/\n```\n\n清单 1-2：你的第一个 Docker 容器的输出\n\
  \n除了 Docker，第 2 章的演示还需要`sqlcmd`实用工具。你可以从以下位置下载它：\n\n*   **SQL Server 命令行实用工具：**\
  \ [*https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility*](https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility)\n\
  \n### 基于虚拟机的 Kubernetes 集群要求\n\n随着我们进入本书关于 Kubernetes 的章节，我们将在第 4 章一起构建一个 Kubernetes\
  \ 集群。为此，我们将需要一些计算和存储资源。对于我们的实验，我们将使用一组五台 Linux 虚拟机。我们实验中的每台虚拟机都需要 2 个 vCPU、2GB RAM\
  \ 和 150GB 磁盘空间，运行 Ubuntu Server 16.04+作为操作系统。我们已在 Ubuntu 16.04 和 Ubuntu 18.04 上测试了本书的代码。Kubernetes\
  \ 支持多种操作系统。更多详情请查阅[*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/)。\n\
  \n#### 在 Azure 中运行虚拟机\n\n如果你没有支持运行这些虚拟机的系统，另一个选择是在 Azure 中设置它们。我们为你提供了一个脚本，可以为你设置整个环境。这将需要一个有效的\
  \ Azure 订阅以及`Azure CLI（命令行界面）`。你可以从[*https://docs.microsoft.com/en-us/cli/azure/*](https://docs.microsoft.com/en-us/cli/azure/)下载`Azure\
  \ CLI`，我们也将在“安装工具”部分向你展示一种从命令行轻松安装它的方法。如果你没有 Azure 订阅，可以在[*https://azure.microsoft.com/en-us/free/*](https://azure.microsoft.com/en-us/free/)注册一个试用账户。这将为你提供\
  \ 200 美元的额度，有效期 30 天，可用于任何 Azure 服务。\n\n在我们能通过`Azure CLI`与 Azure 交互之前，我们需要登录，这通过清单\
  \ 1-3 所示的命令完成。\n\n`az login`\n\n清单 1-3：使用 Azure CLI 登录你的 Azure 账户的脚本\n\n这将在 Windows\
  \ 和 Mac 上打开一个网页浏览器，或在 Linux 上指向一个 URL 以确认你的凭据。\n\n如果你有权访问多个 Azure 订阅，请使用清单 1-4 中的命令确保你正在使用正确的那个。如果提示你为\
  \ Azure CLI 安装任何扩展，请照做。\n\n`az account set -s`\n\n清单 1-4：设置 Azure CLI 的活动订阅\n\n\
  现在你可以运行清单 1-5 中的脚本，它将创建一个资源组、一个虚拟网络、允许来自任何 IP 地址的入站 RDP 和 SSH 连接的网络安全规则，以及前一节中描述的虚拟机。这还将生成公共\
  \ DNS 条目，这些条目本质上必须是唯一的，因此请根据你的要求修改脚本中的以下变量：\n\n*   `Username`\n*   `PW`（要使用的密码）\n\
  *   `Region`（将创建所有资源的 Azure 区域）\n*   `dnsPrefix`（添加到所有公共 DNS 名称前的前缀）\n*   `RG`（资源组名称）\n\
  \n注意\n\n不建议让你的机器可以从任何公共 IP 地址访问，因此请不要在此实验环境中使用任何敏感数据。`dnsPrefix`必须是全局唯一的，因此请将其更改为包含你的姓名首字母和/或随机数字的内容。\n\
  \n\n\n## 使用 Azure 和 Azure Kubernetes Service 搭建实验室环境\n\n### PowerShell 脚本：创建 Azure\
  \ 实验室环境\n\n```powershell\n# 根据需要修改这些变量\n$Region=\"EastUS\"\n$RG=\"KubernetesLabs\"\
  \n$Username=\"labuser\"\n$PW=\"Str@ngPassw0rd\"\n$dnsPrefix=\"k8slab\"\n$VMSize=\"\
  Standard_B2s\"\n$Linux_Image=\"Canonical:UbuntuServer:18.04-LTS:latest\"\n$Windows_Image=\"\
  Win2016datacenter\"\n# 定义机器\n$machines = ConvertFrom-Csv @'\nHostname,IP,OS\nstorage,172.16.94.5,Linux\n\
  control,172.16.94.10,Linux\nnode1,172.16.94.11,Linux\nnode2,172.16.94.12,Linux\n\
  node3,172.16.94.13,Linux\nworkstation,172.16.94.100,Windows\n'@\n# 创建资源组\naz group\
  \ create -l $Region -n $RG\n# 创建虚拟网络和网络安全组\naz network vnet create --name LABVnet\
  \ --resource-group $RG --address-prefixes 172.16.94.0/24\naz network vnet subnet\
  \ create --name LabSubnet --address-prefixes 172.16.94.0/24 `\n--resource-group\
  \ $RG --vnet-name LABVnet\naz network nsg create --name LABNSG --resource-group\
  \ $RG\naz network nsg rule create --name SSH --nsg-name LABNSG --priority 1000 `\n\
  --resource-group $RG --destination-port-ranges 22 --access \"Allow\" `\n--protocol\
  \ TCP --direction Inbound\naz network nsg rule create --name RDP --nsg-name LABNSG\
  \ --priority 1001 `\n--resource-group $RG --destination-port-ranges 3389 --access\
  \ \"Allow\" `\n--protocol TCP --direction Inbound\n# 创建虚拟机\nforeach($vm in $machines)\
  \ {\n$hostname=$vm.Hostname\n$DNSName=\"$dnsPrefix-$hostname\"\n$image=$Windows_Image\n\
  if ($vm.OS -eq \"Linux\") { $image=$Linux_Image }\naz network public-ip create --name\
  \ PIP-$hostname --resource-group $RG --dns-name $DNSName\naz network nic create\
  \ --name NIC-$hostname --resource-group $RG --subnet LabSubnet `\n--vnet-name LABVnet\
  \ --private-ip-address $vm.IP --public-ip-address PIP-$hostname\naz vm create --name\
  \ $hostname --resource-group $RG --nics NIC-$hostname --os-disk-size-gb 150 `\n\
  --os-disk-name Disk-$hostname --image $image --authentication-type password `\n\
  --admin-username $Username --admin-password $PW --size $VMSize\n}\n```\n\n除了 Linux\
  \ 虚拟机外，此脚本还创建了一个 Windows 虚拟机，如本章后面所述，可用作您的管理工作站。\n\n注意\n> 当您不再需要这些资源时，请务必删除或停止并释放它们，以避免产生任何不必要的费用。\n\
  \n### 虚拟机网络配置\n\n按照表 1-1 中的指定配置实验虚拟机的 IP 地址。您可以在实验中自由使用不同的 IP 地址，但在构建集群的几个实验中需要考虑到这一点。如果您在上一节中选择了\
  \ Azure 虚拟机方法，那么这些机器将已经以这种方式设置。\n\n表 1-1\n虚拟机配置\n\n| 名称 | IP 地址 | 功能 |\n| --- |\
  \ --- | --- |\n| control | 172.16.94.10 | 控制平面节点 |\n| node1 | 172.16.94.11 | 工作节点\
  \ |\n| node2 | 172.16.94.12 | 工作节点 |\n| node3 | 172.16.94.13 | 工作节点 |\n| storage\
  \ | 172.16.94.5 | NFS 存储服务器 |\n| workstation (optional) | 172.16.94.100 | 管理工作站\
  \ (Windows) |\n\n接下来，在 IT 领域有句话，永远是 DNS 的问题。因此，对于我们的实验，我们将向每个系统上的`/etc/hosts`文件添加主机条目，以确保我们能够在实验中通过名称访问所有系统。在清单\
  \ 1-6 中，您将找到我们`/etc/hosts`文件的内容。您的`hosts`文件可能包含 localhost 的条目以及可能的其他配置。\n\n```\n\
  172.16.94.5    storage\n172.16.94.10   control\n172.16.94.11   node1\n172.16.94.12\
  \   node2\n172.16.94.13   node3\n```\n\n如果您不知道如何在 Linux 系统上手动编辑文件，可以在每个 Linux 节点上运行清单\
  \ 1-7 中的脚本。\n\n```bash\necho 172.16.94.5 storage > tmphosts\necho 172.16.94.10 control\
  \ >> tmphosts\necho 172.16.94.11 node1 >> tmphosts\necho 172.16.94.12 node2 >> tmphosts\n\
  echo 172.16.94.13 node3 >> tmphosts\nsudo -- sh -c \"cat tmphosts >> /etc/hosts\"\
  \n```\n\n在 Windows 机器上，您会在 `C:\\Windows\\System32\\drivers\\etc\\hosts` 找到该文件。\n\
  \n注意\n> 要在 Windows 上编辑 hosts 文件，请确保以管理员身份运行您的编辑器。\n\n继续之前，请确保您拥有对所有这些虚拟机的控制台或 SSH\
  \ 访问权限（通过使用主机名），并且它们能够通过您的网络相互连接。\n\n### Azure Kubernetes Service\n\n我们的大部分演示将基于本地基于虚拟机的\
  \ Kubernetes 集群，但由于 Kubernetes 的云原生特性，本书中的一些实验需要 Azure Kubernetes Service（AKS）集群的服务，以便我们突出显示某些\
  \ Kubernetes 功能。这还需要一个 Azure 订阅。我们将在第 4 章中一起构建一个 AKS 集群。\n\n如果您更喜欢使用其他托管的 Kubernetes\
  \ 服务，如 Amazon EKS，那也可以。但是，同样为了简单起见，我们将坚持使用这一个示例。\n\n### 安装工具\n\n除了我们将要部署演示应用程序和\
  \ SQL Server 的集群之外，我们还需要一些工具来操作我们部署的应用程序和数据库。您可以在管理工作站上安装这些工具，并通过网络访问应用程序和数据库。如果是这样，您需要确保拥有我们在集群节点上指定的`/etc/hosts`文件条目。出于实验目的，您可以考虑将它们安装在控制平面节点上。对于生产系统，不建议这样做。\n\
  \n我们需要：\n*   基本工具 (`curl`, `grep`, `wget`, SSH 客户端)\n*   `kubectl`\n*   Azure CLI\n\
  *   `azdata`\n*   SQL Server 命令行实用工具，提供 `sqlcmd` – [*https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility*](https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility)\n\
  \n#### 使用 Linux 机器作为管理工作站\n\n如果您更喜欢使用其中一台 Linux 机器作为管理工作站，我们需要使用清单 1-8 中的代码将 Microsoft\
  \ 存储库设为受信任源，并将 Microsoft 存储库添加到已知的软件包安装源列表中。\n\n```bash\nsudo apt-get update\nsudo\
  \ apt-get install gnupg ca-certificates curl wget software-properties-common apt-transport-https\
  \ lsb-release -y\ncurl -sL https://packages.microsoft.com/keys/microsoft.asc |\n\
  gpg --dearmor |\nsudo tee /etc/apt/trusted.gpg.d/microsoft.asc.gpg > /dev/null\n\
  curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -\nsudo\
  \ add-apt-repository \"$(wget -qO- https://packages.microsoft.com/config/ubuntu/18.04/prod.list)\"\
  \nsudo apt-get update\n```\n\n现在我们准备好使用清单 1-9 中的代码安装 `azdata`、Azure 命令行界面和 `kubectl`。\n\
  \n```bash\nsudo apt-get install -y azdata-cli\nsudo apt-get install -y azure-cli\n\
  sudo apt-get install -y kubectl\nsudo apt-get install -y mssql-tools\n```\n\n就这样\
  \ – 您的 Ubuntu 机器已准备好进行接下来的实验。\n\n#### 使用 Windows 机器作为管理工作站\n\n我们中的许多人都是 Windows\
  \ 用户，因此更喜欢从 Windows 客户端进行部署。虽然实验中的某些任务必须在 Linux 环境中运行，但许多任务也可以从 Windows 客户端执行。\n\
  \n如果您选择在 Azure 中运行虚拟机，建议您也将管理工作站放在那里，以便它位于同一虚拟网络上，从而可以无缝访问 Linux 机器。我们之前为此创建了一个名为\
  \ `workstation` 的 Windows 虚拟机。\n\n\n\n### Windows 用户的小助手：Chocolatey\n\n如果你更喜欢使用\
  \ Windows 客户端作为你的管理工作站，我们也建议你使用一个包管理器来自动化安装过程。\n\n我们想请你注意 `chocolatey` 或 `choco`。如果你没听说过它，`choco`\
  \ 是一个免费的 Windows 包管理器，它将允许我们通过 PowerShell 或命令提示符中的一行命令安装许多先决条件。鉴于 Windows Server\
  \ 没有自带一个易于使用的内置包管理器，这确实让生活轻松多了。你可以在 [`chocolatey.org`](http://chocolatey.org) 上找到更多信息，你甚至可以在那里创建账户并提供你自己的软件包。\n\
  \n不过，从一个简单的用户角度来看，你没有必要创建账户或下载任何安装程序。\n\n要让你的系统可以使用 `choco`，请以管理员模式打开一个 PowerShell\
  \ 窗口，并运行清单 1-10 中所示的脚本。\n\n```\n[Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol\
  \ -bor [Net.SecurityProtocolType]::Tls12\nSet-ExecutionPolicy Bypass -Scope Process\
  \ -Force; iex ((New-Object System.Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'))\n\
  清单 1-10\n在 PowerShell 中安装 Chocolatey 的脚本\n```\n\n相应的命令执行完成后，`choco` 就安装好并可以使用了。\n\
  \n### Windows 上的工具\n\n既然我们已经有一个工作站并在其上安装了 `choco`，让我们从一些在 Linux 中默认自带的小工具开始，这些工具在\
  \ Windows 上默认要么缺失，要么功能受限。通过运行清单 1-11 中的代码，我们将安装 `curl`（用于与网站交互）、`grep`（用于在命令行上过滤输出）和\
  \ `putty`（它也附带了 `pscp`，一个允许我们从 Linux 机器复制数据并同时作为我们 SSH 客户端的工具）。\n\n我们还将安装 Chrome，因为\
  \ Internet Explorer（Windows Server 默认自带）不被我们将使用的一些仪表板所支持。\n\n```\nchoco install\
  \ curl -y\nchoco install grep -y\nchoco install putty -y\nchoco install googlechrome\
  \ -y\n清单 1-11\n安装推荐工具的脚本\n```\n\n接下来是 `kubernetes-cli`、`sql command line tools`\
  \ 和 `Azure CLI`，它们可以通过清单 1-12 中的命令安装。\n\n```\nchoco install kubernetes-cli -y\n\
  choco install sqlserver-cmdlineutils -y\nchoco install azure-cli -y\n清单 1-12\n安装\
  \ kubectl、sqlcmd 和 Azure CLI 的脚本\n```\n\n**注意**\n\n这将安装最新版本的 Kubernetes CLI。对于本书中的示例来说，这没问题，也是我们想要的。只是要注意，当与较旧的\
  \ Kubernetes 集群一起工作时，这可能会导致潜在问题。\n\n我们的最后一个需求是 `azdata`。虽然目前它无法通过 `choco` 安装，但微软提供了一个永久链接，使得自动化安装变得足够简单，如清单\
  \ 1-13 所示。\n\n```\ncurl -o azdata.msi https://aka.ms/azdata-msi\nmsiexec /i azdata.msi\
  \ /passive\n清单 1-13\n安装 azdata 的脚本\n```\n\n根据你将要复现的实验，其中一些工具可能不是必需的。鉴于它们都相当轻量级，我们还是建议你全部安装。\n\
  \n### NFS\n\n因为我们希望我们的存储节点充当 NFS 服务器，所以我们需要安装这个服务。为了易于使用，我们选择单节点 NFS。生产集群应使用企业级存储。\n\
  \n通过 SSH 登录到 `storage` 节点，并将清单 1-14 的内容保存到一个名为 `enable-nfs.sh` 的文件中。\n\n```\n#!/bin/bash\n\
  apt install -y nfs-kernel-server\ngroupadd mssql -g 10001\nuseradd -u 10001 mssql\
  \ -g mssql\naddgroup --gid 472 grafana\nuseradd -g 472 -u 472 grafana\nmkdir -p\
  \ /srv/exports/volumes/\nchown -R mssql:mssql /srv/exports/volumes/\necho '/srv/exports\
  \ 172.16.94.0/24(rw,sync,no_subtree_check,no_root_squash)' > exports\nchmod 644\
  \ exports\nmv exports /etc/exports\nexportfs -a\nsystemctl restart nfs-kernel-server\n\
  mkdir /srv/exports/volumes/sql-instance-1\nchown -R mssql:mssql /srv/exports/volumes/\n\
  mkdir /srv/exports/volumes/influxdb\nmkdir /srv/exports/volumes/grafana\nchown 472:472\
  \ /srv/exports/volumes/grafana\nmkdir /srv/exports/volumes/webcontent\necho \"Hello\
  \ World!!!\" >  /srv/exports/volumes/webcontent/index.html\n清单 1-14\nenable-nfs.sh\n\
  ```\n\n这个脚本将安装 NFS 服务器，为其内容创建一个目录（以及一些我们稍后将用于第一个 SQL Server 部署的目录），并启动服务。要运行此脚本，你需要使其可执行并以\
  \ root 身份运行，如清单 1-15 所示。\n\n```\nchmod +x enable-nfs.sh\nsudo ./enable-nfs.sh\n\
  清单 1-15\n运行 enable-nfs.sh\n```\n\n你的 NFS 服务器现在已经准备就绪并可访问。\n\n在其他机器上，使用清单 1-16 中的命令安装\
  \ NFS 工具。这需要在每个其他虚拟机上单独执行。\n\n```\nsudo apt install -y nfs-common\n清单 1-16\n在 NFS\
  \ 客户端上安装 NFS 工具\n```\n\n通过从任何客户端机器挂载 NFS 共享并列出其内容来测试连接，使用清单 1-17 中的代码。\n\n```\n\
  sudo mount -t nfs storage:/srv/exports /mnt\nls -al /mnt/volumes\n清单 1-17\n在 NFS\
  \ 客户端上验证 NFS 连接\n```\n\n清单 1-17 的结果应该类似于我们在图 1-1 中看到的内容。\n\n![../images/494804_1_En_1_Chapter/494804_1_En_1_Fig1_HTML.jpg](img/494804_1_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n从 node1 进行的 NFS 测试\n\n### 系统交换空间设置\n\n作为最后一步，让我们确保在我们的控制平面以及三个节点上都禁用了交换空间，因为这是\
  \ `kubelet` 的要求。\n\n通过 SSH 分别连接到它们每一个，并运行清单 1-18 中的命令。\n\n```\nswapoff -a\n清单 1-18\n\
  禁用交换空间\n```\n\n同时从 `/etc/fstab` 中删除任何交换分区。如果你使用我们脚本在 Azure 中创建了虚拟机，则不需要这一步。\n\n\
  ### 总结\n\n在本章中，我们为将在本书中一起进行的实验奠定了基础。我们将从在 Docker 中将 SQL Server 部署为容器开始。然后，我们将一起构建\
  \ Kubernetes 集群，并在该集群中部署 SQL Server 以及演示应用程序和数据库。除了集群之外，我们还重点介绍了与我们将在集群中部署的应用程序和数据库进行交互所需的工具。\n\
  \n## 2. 容器基础\n\n容器正在改变应用程序的部署方式。在本章中，我们将从基于容器的应用部署的优势开始，并介绍容器基础操作，如创建和运行容器、持久化数据，从而为容器基础知识打下坚实的技术基础。本章最后将讨论容器编排器的必要性，并介绍\
  \ Kubernetes 及其优势。本章的目标是，如果你从未见过容器，那么在继续学习使用 Kubernetes 进行容器编排之前，让你精通容器基础知识。\n\n\
  \n\n### 基于容器的应用部署\n\n一个`容器`是一种操作系统虚拟化形式。多年来，数据库专业人员已经熟悉了机器虚拟化的概念，即操作系统对我们物理服务器的硬件资源（CPU、内存和磁盘）进行多路复用。在容器中，底层操作系统、其内核和资源正被运行在该系统上的应用程序进行多路复用或共享。每个容器都认为自己是操作系统上运行的唯一进程。反过来，操作系统则照常控制对底层硬件的访问。我们很快将更详细地探讨这种隔离概念。负责协调这项工作与底层操作系统的软件被称为`容器运行时`。\n\
  \n容器是一个运行的`容器镜像`。一个`容器镜像`包含了运行我们应用程序所需的二进制文件、库和文件系统组件。因此，当容器启动时，它将开始执行其内部定义的可执行文件，然后可以访问操作系统的资源，包括创建额外的进程、执行磁盘或网络\
  \ I/O 等。图 2-1 展示了容器与其应用程序之间的关系。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig1_HTML.jpg](img/494804_1_En_2_Fig1_HTML.jpg)\n\
  图 2-1：容器化的应用程序\n\n传统上，一个容器内只有一个应用程序，因为应用程序是工作单元，也是我们的扩展单元。当容器启动时，它将开始执行其内部定义的应用程序。在某些情况下，如果应用程序之间有非常紧密的关系（例如，应用服务器和指标数据收集器），你可以将多个应用程序放入一个容器中。\n\
  \n容器提供`隔离`。在容器内运行的进程无法看到操作系统上运行的任何其他进程，甚至无法看到其他容器内运行的进程。这个概念是容器可移植性、可用性乃至其成功的关键。\n\
  \n容器还可以将特定的库与应用程序绑定，帮助你解决应用程序库冲突。你是否曾经遇到过需要安装在专用服务器上的应用程序？因为它需要特定版本的 DLL 或库，而该版本可能与支持另一个应用程序的另一版本冲突。容器可以让你免于这样做。如果容器镜像内部有所需的库可用，当加载时，它们会被隔离到该运行容器中。可以启动带有潜在冲突库的额外容器，这些基于容器的应用程序将彼此隔离地愉快运行。\n\
  \n使用容器带来的隔离性在升级时提供了可移植性。你可以在不影响系统上其他运行容器中的应用程序的情况下升级容器内的库。在图 2-2 中，你可以看到多个应用程序容器运行在物理或虚拟机上，共享基础操作系统。这些容器的执行是完全相互隔离的。如果它们需要通信，则必须通过网络进行。\n\
  \n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig2_HTML.jpg](img/494804_1_En_2_Fig2_HTML.jpg)\n\
  图 2-2：基于容器的应用部署\n\n容器是`短暂的`，而这种短暂性是容器的超能力之一。当容器启动并运行时，容器在实际程序状态和内部更改的任何文件数据方面具有状态。容器也可以被删除，删除时，容器内的任何程序状态和文件数据也会被删除。\n\
  \n容器的短暂性是理解基于容器的应用程序如何部署和维护的概念关键。将配置和状态与容器生命周期本身解耦，是容器和容器编排的核心基础。本章稍后将介绍通过环境变量和卷来实现容器配置和状态解耦的技术，并在本书后面介绍使用\
  \ Kubernetes 结构来帮助我们实现相同的目标。\n\n### 虚拟机有何难点？\n\n在过去的 20 年里，虚拟机作为首选平台已在企业 IT 中牢牢扎根。我们挑战你，读者，去思考一下，硬件虚拟化在你的数据中心中为你带来了什么。你获得了更好的硬件利用率……这很好。但数据中心里最便宜的东西是什么？你的硬件。数据中心里最昂贵的东西是什么？你！你的时间是最昂贵的资源。当使用虚拟机作为我们的平台时，几乎没有为我们的组织增加运营效率，因为虚拟机并没有帮助优化组织最昂贵的资源——人员。\n\
  \n图 2-3 展示了数据中心中传统的虚拟机实现。运维团队构建基础设施，安装客户操作系统，并在这些操作系统之上安装所有应用程序，这就是生产环境。运维团队投入了巨大的努力来保持该架构中的系统和应用程序正常运行。\n\
  \n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig3_HTML.jpg](img/494804_1_En_2_Fig3_HTML.jpg)\n\
  图 2-3：企业数据中心中虚拟机及其应用程序的传统实现\n\n以下是使用基于虚拟机的平台部署应用程序的一些挑战：\n\n*   **操作系统资源开销：** 运行虚拟机存在固有的\
  \ CPU 和内存开销。这些 CPU 时间和内存本可以更好地用于支持应用程序，而不是操作系统。\n*   **操作系统补丁管理：** 更新操作系统为组织增加的业务价值非常有限。它确实是维护适当安全态势所必需的，但并不能推动业务发展。\n\
  *   **故障排除：** 多年来，系统被构建、投入生产，然后就被搁置了。如果出了什么问题，IT 运维必须挺身而出修复系统。\n*   **操作系统升级：**\
  \ 我们认为 IT 中最难做的事情就是升级操作系统，因为如果你升级了操作系统，你需要测试什么？所有东西！应用程序与操作系统的紧密耦合意味着每次对基础操作系统进行更改，都会给我们的系统注入风险。\n\
  *   **部署：** 在企业 IT 中，端到端自动化部署虚拟机及其应用程序的情况很少见。此外，这些解决方案通常是定制的、点解决方案，可能难以维护。\n\n以上提到的运行基于虚拟机的平台的任何挑战，是否推动了你的业务发展？使用虚拟机获得了什么吗？我们认为没有……或许有更好的方法。\n\
  \n\n\n### 容器\n\n当使用基于容器的应用部署时，容器直接解决了在基于虚拟机的平台上部署应用时所面临的一些挑战。让我们看看容器带来了哪些优势：\n\n\
  *   **速度：** 与虚拟机相比，容器体积要小得多。例如，一个在 Windows 上安装了`SQL Server`的虚拟机，在包含任何用户数据库之前，最低限度也会超过\
  \ 60GB。而当前的`SQL Server`容器镜像大小约为 1.5GB。在现代数据中心内传输一个 1.5GB 的容器镜像是相对轻松的。而部署一个超过 60GB\
  \ 的虚拟机则可能需要相当长的时间。\n\n*   **修补：** 就应用程序的修补而言，修补是一个与部署分离的独立过程。你很可能需要额外的工具来完成。利用容器，你可以通过简单地拉取应用程序的新容器镜像并基于该新版本启动一个新容器，从而非常快速地更新应用程序。如果配置和状态与容器正确解耦，我们的应用程序就可以在新版本上恢复并开始运行，对应用程序用户的影响微乎其微甚至为零。\n\
  \n*   **故障排除：** 由于容器的短暂性，基于容器的应用程序的一个主要故障排除技术是终止并重新部署容器。由于容器镜像是我们程序状态的一个已知良好起点，因此只需重新启动容器即可恢复到良好状态。\n\
  \n*   **操作系统升级：** 在不同版本的操作系统之间迁移时，可以删除容器并在较新版本的操作系统上重新创建。由于应用程序所需的库都包含在容器内，因此在操作系统版本之间迁移的风险降低了。\n\
  \n*   **快速且一致的部署：** 当使用基于容器的应用部署时，部署是以代码编写的。在应用部署和维护的效率上有所提升。在速度方面，不再依赖人力来完成工作；同时在一致性方面，由于有代表系统状态的代码，可以在部署过程中重复使用。这些代码被置于源代码控制中，是系统期望状态的配置产物。\n\
  \n部署自动化将不再是企业 IT 的事后考虑或追求的目标；它将成为部署应用程序的主要方式——使用定义系统期望状态的、受源代码控制的代码。基于容器的部署技术使 IT\
  \ 组织能够更快速、更一致地为业务提供服务，并使 IT 能够更轻松地维护基础设施和应用程序，从而提升组织的运营效率。应用程序的部署和维护可以更快、更自信地完成。\n\
  \n`Docker` 和 `Kubernetes` 都使 IT 组织能够编写代表系统期望状态的代码。然后可以更新这些代码，对应用程序、平台和系统进行所需的更改。可以编写代码用于初始部署、应用更新和修补基于容器的应用程序。这些技术还可用于实现更高效的故障排除，并在需要时构建自修复应用程序。这些概念中的每一个都将在本书后面更详细地探讨。\n\
  \n#### 容器领域\n\n好了，既然你已经熟悉了容器的定义以及它如何融入现代应用部署流程，现在让我们来看看容器领域。这里涌现了许多新兴的技术和技巧，我们希望花点时间让你熟悉这个领域的名称和参与者。\n\
  \n以下列表展示了容器领域的一些名称和参与者：\n\n*   **Docker：** 在当今的容器领域，`Docker` 首先是一种技术。它是一个容器运行时和工具集合，使你能够在操作系统上创建和运行容器镜像及容器，并共享该操作系统的资源。\n\
  \n*   **Docker Inc.：** 这是构建工具并推动技术以实现容器的公司。`Docker Inc.` 已将其容器运行时背后的核心技术开源，并衍生出几个开源项目，如\
  \ `containerd` ([`containerd.io/`](https://containerd.io/))、`Open Container Initiative`\
  \ ([www.opencontainers.org/](http://www.opencontainers.org/)) 等。\n\n*   **containerd：**\
  \ 是一个容器运行时，负责协调容器的生命周期功能，如拉取容器镜像、创建、启动和停止容器。`Docker` 和 `Kubernetes` 等都使用 `containerd`\
  \ 来协调容器生命周期功能。在 `Kubernetes` 中，容器运行时是一个可插拔的组件。`containerd` 是事实上的标准。\n\n*   **其他容器运行时：**\
  \ 容器的世界并非只有 Linux 上的 `Docker`。游戏中还有一些其他参与者。以下仅是可用其他容器运行时的一小部分示例：\n    *   **Container\
  \ Linux/CoreOS (rkt)：** 一个专门构建的操作系统，强调使用名为 `rkt`（发音为 rocket，[`coreos.com/`](http://coreos.com/)）的应用容器运行时进行基于容器的应用部署。\n\
  \n    *   **Podman：** 一个用于在基于 Red Hat 的操作系统上运行 Linux 容器的容器运行时。更多信息，请访问 [`github.com/containers/libpod`](https://github.com/containers/libpod)。\n\
  \n    *   **Windows Server 2016：** 使你能够运行 Windows 和 Linux 容器。更多信息，请访问 [`docs.microsoft.com/en-us/virtualization/windowscontainers/`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/)。\n\
  \n注意\n\n在本章中，我们将在单容器部署场景中使用 `Docker` 作为容器运行时。在后面的章节中，我们将在 `Kubernetes 集群` 中使用 `containerd`\
  \ 作为容器运行时。\n\n#### 获取和运行容器\n\n让我们来谈谈什么是*容器镜像*、容器镜像如何定义以及容器镜像存储在哪里。\n\n以下列表强调了容器镜像的关键要素：\n\
  \n*   **容器镜像：** 包含运行我们的应用程序所需的代码、应用程序二进制文件、库和环境变量。用最基本的术语来说，这些就是运行我们的应用程序所需的东西。一个正在运行的容器镜像称为容器。\n\
  \n*   **Dockerfile：** 定义容器镜像的要素。它告诉容器运行时在容器启动时启动哪个二进制文件、要暴露哪些网络端口，以及关于要构建的容器镜像的其他关键信息。\n\
  \n*   **容器注册库：** 这是存储镜像的地方。`Docker Hub` 是众多容器注册库之一，是存储和交换容器镜像的主要场所。仓库是在容器注册库内组织容器镜像的方式。\n\
  \n\n#### 容器生命周期\n\n参考图 2-4，你可以看到一个基于容器的应用程序的生命周期。当开发者准备就绪，他们会在常规的应用程序开发平台中构建应用。然后，他们会为该应用程序编写一个\
  \ *Docker 文件*。这个 Docker 文件包含了构建该应用程序容器镜像所需的信息。它会包含诸如容器启动时应运行哪个二进制文件、应用程序使用哪个网络端口等信息，以及其他许多可能的配置属性和构建镜像的指令。一旦\
  \ Docker 文件准备就绪，开发者会告诉 Docker *构建*一个镜像。这将从 Docker 文件中获取定义好的信息，并在开发者的本地工作站上创建一个容器镜像。该容器镜像随后被\
  \ *推送*（上传）到一个 *容器注册表* 中，直到有人准备好使用该容器镜像。当用户想要从该容器镜像启动一个容器时，他们会将该容器镜像 *拉取* 到他们的操作系统，该操作系统上的容器运行时随后会从容器镜像创建（运行）一个运行中的容器，然后应用程序就在该操作系统的容器中启动并运行了。\n\
  \n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig4_HTML.jpg](img/494804_1_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4\n\n容器生命周期\n\n好了，理论说得够多了。让我们看看如何在 Docker 上以容器方式部署 SQL Server。在本书中，你不会构建容器镜像。你将使用公共容器注册表中可用的镜像。在本章中，你将操作\
  \ SQL Server 容器，这些镜像可从 Microsoft 容器注册表 (`mcr.microsoft.com`) 获取。\n\n#### 操作容器镜像\n\
  \n要拉取一个容器，执行 `docker pull` 命令并指定你想要拉取的容器镜像。在以下示例中，容器镜像来自容器注册表 `mcr.microsoft.com`\
  \ 中的 `mssql/server` 仓库，要请求一个特定的容器，你需要指定 *镜像标签*，这里是 `2019-latest`。代码清单 2-1 展示了此命令。\n\
  \n```\ndocker pull mcr.microsoft.com/mssql/server:2019-latest\n代码清单 2-1\n用于拉取最新\
  \ SQL Server 2019 镜像的 docker pull 命令\n```\n\n图 2-5 显示了代码清单 2-1 中命令的输出结果。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig5_HTML.jpg](img/494804_1_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5\n\ndocker pull 命令的输出\n\n在前面的示例中，按照惯例正在拉取一个标签为 `2019-latest` 的容器镜像。容器镜像仓库的维护者通过指定一个\
  \ `latest` 标签来定义指向其应用程序最新版本的标签。如果你想拉取特定版本的容器镜像，你需要从该仓库获取可用标签的列表。对于 SQL Server，你可以使用代码清单\
  \ 2-2（Bash）和代码清单 2-3（Windows）所示的命令来实现。\n\n```\n(Invoke-WebRequest https://mcr.microsoft.com/v2/mssql/server/tags/list).Content\n\
  代码清单 2-3\nWindows 命令\n```\n\n```\ncurl -sL https://mcr.microsoft.com/v2/mssql/server/tags/list\n\
  代码清单 2-2\nBash 命令\n```\n\n图 2-6 向你展示了这些命令输出的部分内容。实际上有更多可用的容器镜像，但为简洁起见我们省略了一些。\n\n\
  ![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig6_HTML.jpg](img/494804_1_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6\n\n容器镜像及其标签的简略列表\n\n如果你想拉取一个特定的容器，你需要指定一个容器镜像标签。代码清单 2-4 中的命令将拉取与标签 `2019-CU9-ubuntu-18.04`\
  \ 关联的容器镜像。\n\n```\ndocker pull mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04\n\
  代码清单 2-4\n拉取与特定标签关联的容器镜像的 docker pull 命令\n```\n\n要获取本地系统上可用的镜像列表，请执行代码清单 2-5 中的\
  \ `docker image ls` 命令。命令的输出显示了已拉取到本地系统的镜像。示例如下。\n\n```\ndocker image ls\n代码清单 2-5\n\
  docker image ls 命令\n```\n\n对于每个镜像，输出（图 2-7）显示了镜像的仓库、标签、镜像标识符（`IMAGE ID`）、创建日期和镜像大小。\n\
  \n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig7_HTML.jpg](img/494804_1_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7\n\ndocker image ls 命令的输出\n\n一个常见的误解是 `docker image ls` 命令显示的创建日期是镜像被拉取的日期。事实并非如此。创建日期实际上是镜像被创建的日期。\n\
  \n一个容器镜像可以有多个标签。在上面的输出中，如果你仔细观察容器 `IMAGE ID`，会注意到两个容器镜像的 `IMAGE ID` 值相同。标签 `2019-latest`\
  \ 和 `2019-CU9-ubuntu-18.04` 指向同一个容器镜像，因为在撰写本文时，SQL Server 2019 的最新镜像是 CU9。当一个新的容器镜像发布到仓库时，它将拥有一个新的、唯一的容器镜像\
  \ ID。仓库管理员会将 `latest` 标签更新为指向该仓库中的这个最新镜像。\n\n#### 启动容器\n\n要启动一个容器，请执行 `docker run`\
  \ 命令，如清单 2-6 所示。让我们通过以下示例来逐步了解。\n\n```\ndocker run \\\n--env 'ACCEPT_EULA=Y' \\\n\
  --env 'MSSQL_SA_PASSWORD=S0methingS@Str0ng!' \\\n--name 'sql1' \\\n--publish 1433:1433\
  \ \\\n--detach \\\nmcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04\n清单 2-6\n\
  docker run 命令\n```\n\n要在容器中运行 SQL Server，需要为初始启动配置 SQL Server。如前所述，将配置与状态解耦是在容器中运行应用程序的关键。这里是一个解耦配置的示例。SQL\
  \ Server 将配置点暴露为环境变量。通过在运行时为这些环境变量指定值，你可以注入配置。在前面的命令中，你看到 `--env 'ACCEPT_EULA=Y'`。这为环境变量\
  \ `ACCEPT_EULA` 指定了值 `'Y'`。在启动时，SQL Server 将查找此值并相应地启动。类似地，还定义了一个环境变量 `'MSSQL_SA_PASSWORD=S0methingS@Str0ng!'`。这设置了容器启动时的\
  \ `sa` 密码，在本例中为 `S0methingS@Str0ng!`。虽然不是必需的，但使用 `--name='sql1'` 参数指定了容器名称，这在命令行中使用容器时很有用，并使我们能够通过名称访问容器。\n\
  \n> 提示\n>\n> 有关可作为环境变量使用的配置的更多信息，请查看 [`docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables)。\n\
  \n除了应用程序配置和名称之外，为了通过网络访问基于容器的应用程序，必须暴露一个端口。参数 `--publish 1433:1433` 将容器内的一个端口暴露到基础操作系统上的容器外端口。让我们稍微解析一下，因为这是我们刚开始使用容器时经常出错的地方。第一个\
  \ `1433` 是应用程序在基础操作系统上监听的端口。默认情况下，它将监听主机操作系统的 IP 地址，因此这是用户和其他应用程序在同一主机上本地访问或从其他主机远程访问基于容器的应用程序的方式。第二个\
  \ `1433` 是“容器内”监听的端口。更多关于这一点，稍后在讨论容器内部结构时会提到。接下来是 `--detach`，它告诉容器运行时将运行进程从标准输出分离。这让我们重新获得终端的控制权，并将\
  \ SQL Server 作为后台进程运行。\n\n> 注意\n>\n> 如果你在启动容器时遇到问题，请移除 `--detach` 参数，以便在屏幕上看到容器的日志流式传输到标准输出。在\
  \ SQL Server 容器中，这是 `SQL Server Error Log`。我们在创建容器时最常见的原因是 `sa` 密码不够复杂；在查看错误日志时，这会很快显现出来。`docker\
  \ logs` 在此场景下也很有帮助。\n\n最后，是用于启动此容器的特定容器镜像，在本例中是 `mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04`。\n\
  \n如果 `docker run` 命令成功，它会将容器 ID 打印到标准输出。\n\n在清单 2-7 中执行 `docker ps` 以列出本地系统上运行的容器。\n\
  \n```\ndocker ps\n清单 2-7\ndocker ps 命令\n```\n\n图 2-8 显示了命令的输出。`sql1` 容器已启动并运行。它还显示了容器\
  \ ID、启动它的容器镜像、容器启动时启动的命令、容器名称、容器的创建时间以及容器的当前状态，在本例中已运行了 10 分钟。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig8_HTML.jpg](img/494804_1_En_2_Fig8_HTML.jpg)\n\
  图 2-8\n本地系统上运行的容器列表\n\n#### 如果出现问题怎么办？\n\n使用 `docker logs` 命令结合容器名称（清单 2-8），在本例中是\
  \ `sql1`，以获取容器的输出。在 SQL Server 中，你在这里找到的输出来自 SQL Server 错误日志，其中很可能包含有关容器为何无法启动的有价值的信息。\n\
  \n```\ndocker logs sql1 | more\n清单 2-8\ndocker logs 命令\n```\n\n#### 访问基于容器的应用程序\n\
  \n在这个案例中，应用程序是 SQL Server，所以让我们使用命令行实用程序 `sqlcmd` 来访问 SQL Server。清单 2-9 中的代码显示了一个获取\
  \ `@@VERSION` 输出的查询。\n\n```\nsqlcmd -S localhost,1433 -U sa -Q 'SELECT @@VERSION'\
  \ -P 'S0methingS@Str0ng!'\n清单 2-9\n用于访问 SQL Server 的命令行实用程序 sqlcmd\n```\n\n在图 2-9\
  \ 中，你可以看到一个运行 SQL Server 2019 CU1 的容器，这与容器启动时指定的容器镜像相符。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig9_HTML.jpg](img/494804_1_En_2_Fig9_HTML.jpg)\n\
  图 2-9\n容器启动时指定的容器镜像\n\n#### 启动 SQL Server 的第二个实例\n\n要启动第二个 SQL Server 2019 CU1 容器实例，你需要再次执行\
  \ `docker run`。关键区别在于一个唯一的容器名称，本例中是 `sql2`，以及一个要发布的唯一端口。在本例中，第二个 SQL Server 实例在端口\
  \ `1434` 上可用，如清单 2-10 所示。要访问此 SQL Server 实例，应用程序将指向该端口。在以下命令中，我们使用了缩写的参数名称，而不是像之前\
  \ `docker run` 命令中那样使用完整的参数名称。\n\n```\ndocker run \\\n--name 'sql2' \\\n-e 'ACCEPT_EULA=Y'\
  \ \\\n-e 'MSSQL_SA_PASSWORD=S0methingS@Str0ng!' \\\n-p 1434:1433 \\\n-d mcr.microsoft.com/mssql/server:2019-CU9-ubuntu-18.04\n\
  清单 2-10\n具有唯一容器名称的 docker run 命令\n```\n\n`docker ps` 将再次产生一个正在运行的容器列表。\n\n图 2-10\
  \ 中的命令输出显示两个容器 `sql1` 和 `sql2` 都已启动并运行。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig10_HTML.jpg](img/494804_1_En_2_Fig10_HTML.jpg)\n\
  图 2-10\ndocker ps 命令的输出\n\n现在有两个容器在运行，让我们将一个数据库恢复到其中一个容器中。在书籍下载中，你会找到一个 SQL Server\
  \ 数据库 `TestDB1.bak` 和一个恢复脚本 `restore_testdb1.sql`。\n\n`restore_testdb1.sql` 的内容也可以在清单\
  \ 2-11 中看到。\n\n```\nUSE [master]\nRESTORE DATABASE [TestDB1]\nFROM DISK = N'/var/opt/mssql/data/TestDB1.bak'\n\
  WITH REPLACE\n清单 2-11\nrestore_testdb1.sql\n```\n\n让我们逐步完成恢复数据库的过程，查看容器内的文件布局，然后了解运行容器的生命周期。\n\
  \n\n#### 将数据库恢复到容器中运行的 SQL Server\n\n清单 2-12 中的命令将现有的数据库备份复制到 `sql2` 容器内的 `/var/opt/mssql/data`\
  \ 目录，然后清单 2-13 中的命令会为该复制的备份文件设置适当的权限。\n\n由于 SQL Server 2019 中非 root 用户 SQL Server\
  \ 容器的性质（[`techcommunity.microsoft.com/t5/sql-server/non-root-sql-server-2019-containers/ba-p/859644`](https://techcommunity.microsoft.com/t5/sql-server/non-root-sql-server-2019-containers/ba-p/859644)），需要调整复制到容器中的文件的权限，以便容器内部的\
  \ `sqlservr` 进程可以读取该文件。在 Linux 系统上，`docker cp` 命令会以执行该命令的基础操作系统用户的 `UID` 来复制文件。容器内部的\
  \ `sqlservr` 进程以用户 `mssql` 运行。以下 `chown` 命令将备份文件的所有者更改为用户 `mssql`，以便该用户可以读取文件。\n\
  \n```\ndocker exec -u root sql2 chown mssql /var/opt/mssql/data/TestDB1.bak\n清单\
  \ 2-13\n容器内的 chown 命令\n```\n\n```\ndocker cp TestDB1.bak sql2:/var/opt/mssql/data\n\
  清单 2-12\ndocker cp 命令\n```\n\n文件就位后，执行 `restore_testdb1.sql` 脚本，该脚本包含恢复此数据库所需的 T-SQL。请注意，我们是在容器外部运行此恢复操作（清单\
  \ 2-14），在客户端工作站上使用 `sqlcmd`，并将其指向正确的服务器名称（`localhost`）和端口 `1434`。\n\n```\nsqlcmd\
  \ -S localhost,1434 -U sa -i restore_testdb1.sql -P 'S0methingS@Str0ng!'\n清单 2-14\n\
  通过 sqlcmd 执行恢复脚本\n```\n\n`sqlcmd` 将确认成功恢复，如图 2-11 所示。\n\n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig11_HTML.jpg](img/494804_1_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11\n成功恢复数据库\n\n数据库恢复后，让我们使用清单 2-15 中的 `docker exec` 命令来访问容器内部。这将允许我们探索正在运行的容器的内部结构。参数\
  \ `-it` 为执行的进程（在本例中是 `/bin/bash`，一个 bash 提示符）提供一个交互式终端。在下面的示例中，显示的提示符展示了登录用户的用户名\
  \ `mssql`，以及与容器 ID 匹配的容器主机名。\n\n```\ndocker exec -it sql2 /bin/bash\n清单 2-15\ndocker\
  \ exec 命令\n```\n\n有了这个在容器内部运行的交互式 bash shell，让我们稍微探索一下。执行 `ps -aux` 命令，如清单 2-16\
  \ 所示，以列出所有正在运行的进程。\n\n```\nps -aux\n清单 2-16\nps -aux 命令\n```\n\n在图 2-12 所示的输出中，你会看到容器内部只运行着一小部分进程：两个\
  \ `sqlservr` 进程、一个 `bash` shell 和 `ps` 命令本身。此示例突显了容器在运行时具有的隔离性。此容器及其运行的进程无法看到基础操作系统上运行的任何其他进程。\n\
  \n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig12_HTML.jpg](img/494804_1_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12\n`ps -aux` 命令的输出\n\n现在，执行目录列表（清单 2-17）`ls -la /var/opt/mssql/data`。这是 Linux\
  \ 上 SQL Server 的默认数据库目录。\n\n```\nls -la /var/opt/mssql/data\n清单 2-17\n目录列表\n```\n\
  \n如图 2-13 所示，你将在此目录中找到系统和用户数据库。你还会找到在之前的演示中复制进来的数据库备份文件，即 `TestDB1.bak` 文件。每个容器都有一个独立的文件系统。因此，此目录中的文件仅对这个正在运行的容器可用。如果此容器被删除，这些文件将随容器一起删除。我们稍后将介绍容器的数据持久化。\n\
  \n![../images/494804_1_En_2_Chapter/494804_1_En_2_Fig13_HTML.jpg](img/494804_1_En_2_Fig13_HTML.jpg)\n\
