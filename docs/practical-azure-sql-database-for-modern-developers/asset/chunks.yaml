    The knowledge that you gained in this chapter enables you to professionally create
    proper database designs and understand the issues that you might find in databases.
    The concepts explained in this chapter represent the core knowledge required for
    database design. In the next chapter, we will go one step further – you will understand
    how to use some advanced concepts and types of tables and indexes that can improve
    the performance of your database.


    To know more about the topics mentioned in this chapter, you can start from these
    resources:


