- fmt: '### Connectivity best practices


    Let’s start from a very basic one: in a database application, latency matters!
    This means that, for performance reasons, it’s important to make sure your application
    code runs as close to your database as possible, no matter what Azure service
    it will be deployed on. This is especially true for applications that are executing
    a lot of database interactions or roundtrips, where this latency can easily become
    more impactful than real processing time.


    ![../images/493913_1_En_3_Chapter/493913_1_En_3_Fig1_HTML.jpg](images/493913_1_En_3_Chapter/493913_1_En_3_Fig1_HTML.jpg)

    Figure 3-1 Roundtrips to database


    At the very least, you should make sure your application gets deployed in the
    same region as where your database instance is. This may also have some architectural
    implications in case, for example, you’re designing a highly reliable, cross-region
    solution. This means that you need to plan for failing over not only your data
    layer but also your application tier accordingly to minimize latency impact in
    case of a malfunctioning of your primary site.


    Along the same line, it’s also important to understand overall Azure SQL connectivity
    architecture (explained in the official docs: [`https://aka.ms/sdmica`](https://aka.ms/sdmica))
    and make sure that, if your application tier is running in an Azure service like
    Virtual Machine, App Service, or Azure Kubernetes Service, as an example, it is
    leveraging the `Redirect` connection policy, which means that your application
    will communicate directly with the node hosting your database instance instead
    of passing through the Gateway layer for every single interaction. If your app
    is executing anything more than only a few queries every minute, this option will
    make a significant difference from a performance perspective, and the trade-off
    required is just to make sure that ports in the range of 11000–11999 are open
    in networking configuration where your client code resides.


    While it may sound trivial, another recommendation related to connectivity is
    to make sure your code is effectively opening a connection with an Azure SQL database
    instance as late as possible before executing some meaningful command, and it’s
    closing that connection as soon as results are consumed. Most driver libraries
    are, in fact, designed to leverage `Connection Pooling`, a mechanism that will
    help you balance between the cost of opening a brand-new physical connection (e.g.,
    a TCP socket) with a remote service, which always comes with a given millisecond
    overhead, and the cost of keeping too many connections always open as that will
    increase the amount of resources (memory, worker threads, etc.) consumed on the
    service side.


    `Connection pooling` works at the process level and keeps a physical connection
    opened for a certain amount of time even if in your application code you explicitly
    called a close or dispose method, so that if a new request to open a connection
    with the same connection string parameters will be executed later, the existing
    physical connection will be reused instead of opening a brand new one.


    Thanks to this approach, in a canonical web application or web API scenario, it’s
    not uncommon that, even if thousands of users are accessing a given page, only
    a few tens of real database connections are kept open at any given time, significantly
    reducing the overhead generated for Azure SQL database instances.


    Generally speaking, in most scenarios where a multi-threaded application is executing
    a conventional database workload (queries, transactions, etc.) against an Azure
    SQL instance, it is recommended to leverage `Connection Pooling` for performance
    reasons. The only exception to this general rule is where your application really
    needs to carefully control how specific operations are executed against the database.
    A good example for that are Data Definition Language (`DDL`) commands (`CREATE`,
    `ALTER`, `DROP` that will be discussed later, that work on data structures instead
    of data itself) that your application may issue against the database, where usually
    one connection at time is executed and commands are serialized on that same connection.


    As mentioned, most existing drivers are providing this capability out of the box
    and even enabling it by default, like `.NET Data Provider for SQL Server`, but
    there’s an important exception. In the Java space, historically, connection pooling
    has been a separate implementation from `JDBC` drivers so `SQL Server`’s one doesn’t
    provide functionality.


    Thankfully, there are many external packages offering that capability for your
    Java application, and one of the most known is certainly `HikariCP` ([`https://aka.ms/hikaricp`](https://aka.ms/hikaricp)),
    as mentioned before. It’s important to notice though that, generally speaking,
    Java drivers have some challenges in detecting what are usually referred as “stale
    connections” or client-side connection objects that have lost underlying connectivity
    with a database instance due to a transient issue, without trying to execute a
    test command (by explicitly invoking `java.sql.Connection.isValid()` which pings
    the database every time to make sure the connection is opened). In other drivers,
    this is usually performed at a lower level by checking the state of a TCP socket,
    but Java native APIs have issues with that. A similar problem could happen while
    a command is executed, and a resultset is under consumption by your application
    code. The recommendation here is to carefully configure both your `JDBC` driver
    and your connection pooling classes with proper timeouts to avoid that the application
    can hang forever if a transient error happens at the wrong time. All the details
    about these configurations are further explained in an article at this URL: [`https://aka.ms/jdbc-connection-guidance`](https://aka.ms/jdbc-connection-guidance).


    Other high-level languages and frameworks like Python and `pyodbc` may be suffering
    from the same transient connectivity issues, and the same approach and guidance
    is also recommended.'
  raw: '### Connectivity best practices


    Let’s start from a very basic one: in a database application, latency matters!
    This means that, for performance reasons, it’s important to make sure your application
    code runs as close to your database as possible, no matter what Azure service
    it will be deployed on. This is especially true for applications that are executing
    a lot of database interactions or roundtrips, where this latency can easily become
    more impactful than real processing time.


    ![../images/493913_1_En_3_Chapter/493913_1_En_3_Fig1_HTML.jpg](images/493913_1_En_3_Chapter/493913_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Roundtrips to database


    At the very least, you should make sure your application gets deployed in the
    same region as where your database instance is. This may also have some architectural
    implications in case, for example, you’re designing a highly reliable, cross-region
    solution. This means that you need to plan for failing over not only your data
    layer but also your application tier accordingly to minimize latency impact in
    case of a malfunctioning of your primary site.


    Along the same line, it’s also important to understand overall Azure SQL connectivity
    architecture (explained in the official docs: [`https://aka.ms/sdmica`](https://aka.ms/sdmica))
    and make sure that, if your application tier is running in an Azure service like
    Virtual Machine, App Service, or Azure Kubernetes Service, as an example, it is
    leveraging the Redirect connection policy, which means that your application will
    communicate directly with the node hosting your database instance instead of passing
    through the Gateway layer for every single interaction. If your app is executing
    anything more than only a few queries every minute, this option will make a significant
    difference from a performance perspective, and the trade-off required is just
    to make sure that ports in the range of 11000–11999 are open in networking configuration
    where your client code resides.


    While it may sound trivial, another recommendation related to connectivity is
    to make sure your code is effectively opening a connection with an Azure SQL database
    instance as late as possible before executing some meaningful command, and it’s
    closing that connection as soon as results are consumed. Most driver libraries
    are, in fact, designed to leverage Connection Pooling, a mechanism that will help
    you balance between the cost of opening a brand-new physical connection (e.g.,
    a TCP socket) with a remote service, which always comes with a given millisecond
    overhead, and the cost of keeping too many connections always open as that will
    increase the amount of resources (memory, worker threads, etc.) consumed on the
    service side.


    Connection pooling works at the process level and keeps a physical connection
    opened for a certain amount of time even if in your application code you explicitly
    called a close or dispose method, so that if a new request to open a connection
    with the same connection string parameters will be executed later, the existing
    physical connection will be reused instead of opening a brand new one.


    Thanks to this approach, in a canonical web application or web API scenario, it’s
    not uncommon that, even if thousands of users are accessing a given page, only
    a few tens of real database connections are kept open at any given time, significantly
    reducing the overhead generated for Azure SQL database instances.


    Generally speaking, in most scenarios where a multi-threaded application is executing
    a conventional database workload (queries, transactions, etc.) against an Azure
    SQL instance, it is recommended to leverage Connection Pooling for performance
    reasons. The only exception to this general rule is where your application really
    needs to carefully control how specific operations are executed against the database.
    A good example for that are Data Definition Language (DDL) commands (CREATE, ALTER,
    DROP that will be discussed later, that work on data structures instead of data
    itself) that your application may issue against the database, where usually one
    connection at time is executed and commands are serialized on that same connection.


    As mentioned, most existing drivers are providing this capability out of the box
    and even enabling it by default, like .NET Data Provider for SQL Server, but there’s
    an important exception. In the Java space, historically, connection pooling has
    been a separate implementation from JDBC drivers so SQL Server’s one doesn’t provide
    functionality.


    Thankfully, there are many external packages offering that capability for your
    Java application, and one of the most known is certainly HikariCP ([`https://aka.ms/hikaricp`](https://aka.ms/hikaricp)),
    as mentioned before. It’s important to notice though that, generally speaking,
    Java drivers have some challenges in detecting what are usually referred as “stale
    connections” or client-side connection objects that have lost underlying connectivity
    with a database instance due to a transient issue, without trying to execute a
    test command (by explicitly invoking *java.sql.Connection.isValid()* which pings
    the database every time to make sure the connection is opened). In other drivers,
    this is usually performed at a lower level by checking the state of a TCP socket,
    but Java native APIs have issues with that. A similar problem could happen while
    a command is executed, and a resultset is under consumption by your application
    code. The recommendation here is to carefully configure both your JDBC driver
    and your connection pooling classes with proper timeouts to avoid that the application
    can hang forever if a transient error happens at the wrong time. All the details
    about these configurations are further explained in an article at this URL: [`https://aka.ms/jdbc-connection-guidance`](https://aka.ms/jdbc-connection-guidance).


    Other high-level languages and frameworks like Python and pyodbc may be suffering
    from the same transient connectivity issues, and the same approach and guidance
    is also recommended.'
  trans: '

    ### 连接最佳实践


    让我们从一个非常基础的要点开始：在数据库应用程序中，延迟至关重要！这意味着，出于性能考虑，确保你的应用程序代码尽可能靠近数据库运行是非常重要的，无论它将部署在哪个
    Azure 服务上。对于执行大量数据库交互或往返通信的应用程序来说尤其如此，在这种情况下，延迟的影响很容易变得比实际处理时间更大。


    ![../images/493913_1_En_3_Chapter/493913_1_En_3_Fig1_HTML.jpg](img/493913_1_En_3_Fig1_HTML.jpg)

    图 3-1 与数据库的往返通信


    至少，你应该确保应用程序部署在数据库实例所在的同一区域。如果你在设计一个高可用的跨区域解决方案，这可能也会带来一些架构上的影响。这意味着你需要相应地规划数据层和应用层的故障转移，以在主站点发生故障时将延迟影响降至最低。


    同样重要的是，要理解 Azure SQL 的整体连接架构（在官方文档中有解释：[`https://aka.ms/sdmica`](https://aka.ms/sdmica)），并确保如果你的应用层运行在
    Azure 服务中（例如虚拟机、应用服务或 Azure Kubernetes 服务），它使用了 `Redirect` 连接策略。这意味着你的应用程序将直接与托管数据库实例的节点通信，而不是每次交互都通过网关层。如果你的应用程序每分钟执行的查询远不止几个，那么从性能角度来看，这个选项将产生显著的差异，而所需的权衡仅仅是确保你的客户端代码所在网络配置中开放了
    11000–11990 范围内的端口。


    虽然这听起来可能很基础，但另一个关于连接的建议是，确保你的代码在执行某些有意义的命令之前，尽可能晚地打开与 Azure SQL 数据库实例的连接，并在结果被消费后尽快关闭该连接。实际上，大多数驱动库都设计为利用
    `连接池` 机制，该机制可以帮助你在打开一个全新的物理连接（例如，一个 TCP 套接字）的成本（这总是伴随着一定的毫秒级开销）与保持过多连接一直打开的成本（这会增加服务端消耗的资源，如内存、工作线程等）之间取得平衡。


    `连接池` 在进程级别工作，即使你在应用程序代码中显式调用了关闭或处置方法，它也会在一段时间内保持物理连接处于打开状态。这样，如果稍后执行了使用相同连接字符串参数打开连接的新请求，将会重用现有的物理连接，而不是打开一个全新的连接。


    得益于这种方法，在典型的 Web 应用程序或 Web API 场景中，即使有数千名用户访问某个页面，在任何给定时间只保持几十个真实的数据库连接打开的情况并不少见，这显著减少了为
    Azure SQL 数据库实例产生的开销。


    一般来说，在大多数多线程应用程序对 Azure SQL 实例执行常规数据库工作负载（查询、事务等）的场景中，出于性能原因，建议利用 `连接池`。此通用规则的唯一例外是你的应用程序确实需要精确控制如何针对数据库执行特定操作。一个很好的例子是数据定义语言（`DDL`）命令（`CREATE`,
    `ALTER`, `DROP`，这些将在后面讨论，它们作用于数据结构而非数据本身），你的应用程序可能会向数据库发出这类命令，通常一次只在一个连接上执行，并且命令在该连接上被序列化。


    如前所述，大多数现有驱动都开箱即用地提供了此功能，甚至默认启用，例如 `.NET Data Provider for SQL Server`，但有一个重要的例外。在
    Java 领域，历史上连接池一直是与 `JDBC` 驱动分开实现的，因此 `SQL Server` 的驱动本身不提供此功能。


    值得庆幸的是，有许多外部包为你的 Java 应用程序提供了此功能，其中最知名的之一无疑是 `HikariCP` ([`https://aka.ms/hikaricp`](https://aka.ms/hikaricp))，如前所述。但需要注意的是，一般来说，Java
    驱动在检测所谓的“陈旧连接”方面存在一些挑战，即由于临时问题而丢失了与数据库实例底层连接的客户端连接对象，除非尝试执行测试命令（通过显式调用 `java.sql.Connection.isValid()`，该方法会定期
    ping 数据库以确保连接是打开的）。在其他驱动中，这通常通过在较低级别检查 TCP 套接字状态来执行，但 Java 原生 API 在这方面存在问题。类似的问题也可能在命令执行期间发生，此时结果集正在被你的应用程序代码消费。这里的建议是，仔细配置你的
    `JDBC` 驱动和连接池类，设置适当的超时，以避免在错误时间发生临时错误时应用程序可能永远挂起。关于这些配置的所有细节，在这篇文章中有进一步解释：[`https://aka.ms/jdbc-connection-guidance`](https://aka.ms/jdbc-connection-guidance)。


    其他高级语言和框架，如 Python 和 `pyodbc`，也可能遭受相同的临时连接问题，因此也推荐采用相同的方法和指导原则。

