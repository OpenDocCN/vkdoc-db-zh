    -- Explicitly rollback the transaction

    ROLLBACK TRANSACTION

    END CATCH

    SELECT * FROM dbo.Orders

    SELECT * FROM dbo.Inventory

    ```


    In this script, after creating and filling a couple of tables, you can find the
    `BEGIN TRANSACTION` statement followed by an (optional) name.


    The `BEGIN TRY` block will try to execute all statements until the `END TRY`,
    and if they will all be executed without errors, the transaction will be permanently
    committed by the `COMMIT TRANSACTION` statement.


    ![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig1_HTML.jpg](images/493913_1_En_7_Chapter/493913_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Successful transaction results


    We now change the quantity in stock for our product and we set it to zero, as
    we want to test what happens when running out of stock, and then we try to run
    the transaction again:


    ```

    UPDATE dbo.Inventory SET QuantityInStock=0 WHERE ProductID=1

    ```


    ![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig2_HTML.jpg](images/493913_1_En_7_Chapter/493913_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Transaction rollback results


    In this case, an error will be thrown while executing the `UPDATE Inventory` statement
    as we are violating the `CHECK` constraint placed on the `QuantityInStock` attribute.
    Control will pass from with the `BEGIN TRY` block to the `BEGIN CATCH` block.
    In that block, we’re retrieving all the details related to the latest error happened
    in that session, but we’re also explicitly calling `ROLLBACK TRANSACTION` to make
    sure that modifications made to other tables as part of the same transaction,
    in the sample `INSERT INTO Orders` command, will not be persisted, and system’s
    state will be consistent.'
  trans: '# 事务模式


    我们拥有的第三种模式称为 `implicit`（隐式）。在此模式下，Azure SQL 会在当前事务提交或回滚后启动一个新事务。启动事务无需执行任何操作；您只需提交或回滚每个事务。这最后一种模式主要是出于合规和向后兼容性的原因而实现的。在大多数用例中，您的应用程序在执行简单的数据库命令时会使用自动提交，且通常不需要严格控制复杂事务。当需要管理某些更复杂的具体事务行为时，建议切换到
    `explicit`（显式）模式。事务模式设置可通过执行显式 T-SQL 语句在连接级别进行控制。不同的客户端驱动程序可能有不同的事务模式默认设置，并且会在建立新连接时为您调用
    T-SQL 语句，因此查阅您所使用驱动程序的文档以了解其具体行为非常重要。


    ### 本地事务


    作为应用程序开发人员，您大部分时间将与在单个 Azure SQL 数据库实例上下文中执行的事务进行交互，这些事务通常被称为 *本地事务*，以区别于我们稍后将讨论的分布式事务。在此场景中，本地事务通常被包装在
    `存储过程` 内的更复杂的业务逻辑中使用，这通常是保持事务持续时间短暂并避免应用程序与数据库代码之间多次网络往返的推荐做法。如果出于任何原因，您不依赖 `存储过程`，而是在应用程序代码中编写数据库访问命令，您可以通过调用客户端驱动程序
    `API` 暴露的特定命令来控制事务行为。


    以下是一个如何在 T-SQL 脚本（如 `存储过程`）中使用显式事务的示例。在我们的系统中，有两个主要表：`订单表（Orders）` 和 `库存表（Inventory）`；每当为给定产品下一个新订单时，我们需要减少其库存数量。我们系统中的业务逻辑必须防止为即将缺货的商品下新订单。实现此逻辑的方法有很多种，在我们的示例中，我们将新订单的下达和同一商品库存的减少包装在一个显式事务中：


    ```sql

    -- 创建表结构

    CREATE TABLE dbo.Orders (ID int PRIMARY KEY, ProductID int, OrderDate datetime);

    CREATE TABLE dbo.Inventory (ProductID int PRIMARY KEY, QuantityInStock int

    CONSTRAINT CHK_QuantityInStock CHECK (QuantityInStock>-1));

    -- 插入一些示例值

    INSERT INTO dbo.Orders VALUES (1,1,getdate());

    INSERT INTO dbo.Inventory VALUES (1,100);

    -- 开始一个显式事务

    BEGIN TRANSACTION mytran

    -- 在应用逻辑中尝试执行工作单元

    BEGIN TRY

    INSERT INTO Orders VALUES (2,1,getdate());

    UPDATE Inventory SET QuantityInStock=QuantityInStock-1 WHERE ProductID=1

    -- 如果两个命令都成功，则提交事务

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    -- 如果有错误，则捕获详细信息

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    , ERROR_SEVERITY() AS ErrorSeverity

    , ERROR_STATE() AS ErrorState

    , ERROR_PROCEDURE() AS ErrorProcedure

    , ERROR_LINE() AS ErrorLine

    , ERROR_MESSAGE() AS ErrorMessage;

    -- 显式回滚事务

    ROLLBACK TRANSACTION

    END CATCH

    SELECT * FROM dbo.Orders

    SELECT * FROM dbo.Inventory

    ```


    在此脚本中，创建并填充了几个表之后，您可以找到 `BEGIN TRANSACTION` 语句，后面跟有一个（可选的）名称。


    `BEGIN TRY` 块将尝试执行直到 `END TRY` 为止的所有语句，如果它们全部执行无误，事务将通过 `COMMIT TRANSACTION` 语句永久提交。


    ![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig1_HTML.jpg](img/493913_1_En_7_Fig1_HTML.jpg)


    图 7-1：成功事务结果


    现在，我们更改产品的库存数量并将其设置为零，因为我们要测试库存耗尽时会发生什么，然后我们尝试再次运行该事务：


    ```sql

    UPDATE dbo.Inventory SET QuantityInStock=0 WHERE ProductID=1

    ```


    ![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig2_HTML.jpg](img/493913_1_En_7_Fig2_HTML.jpg)


    图 7-2：事务回滚结果


    在这种情况下，执行 `UPDATE Inventory` 语句时将抛出错误，因为我们违反了 `QuantityInStock` 属性上的 `CHECK` 约束。控制权将从
    `BEGIN TRY` 块传递到 `BEGIN CATCH` 块。在该块中，我们检索有关该会话中发生的最新错误的所有详细信息，但我们还显式调用 `ROLLBACK
    TRANSACTION` 以确保作为同一事务一部分对其他表所做的修改（在示例中是 `INSERT INTO Orders` 命令）不会持久化，系统状态将保持一致。'
- fmt: "Let's see how the same behavior can be achieved developing a sample application\
    \ using Python.\n\n```python\nimport os\nimport pyodbc\nfrom decouple import config\n\
    server = config('server')\ndatabase = config('database')\nusername = config('username')\n\
    password = config('password')\ndriver= '{ODBC Driver 17 for SQL Server}'\n# Connecting\
    \ to Azure SQL Database with autocommit=True\ncnxn = pyodbc.connect('DRIVER='+driver+';SERVER='+server+';PORT=1433;DATABASE='+database+';UID='+username+';PWD='+\
    \ password,autocommit=True)\ndef prepare_database():\n    try:\n        # Executing\
    \ database preparation tasks\n        cursor = cnxn.cursor()\n        cursor.execute(\"\
    \"\"IF (EXISTS (SELECT *  FROM INFORMATION_SCHEMA.TABLES\n            WHERE TABLE_SCHEMA\
    \ = 'dbo'\n            AND  TABLE_NAME = 'Orders'))\n        BEGIN\n         \
    \   DROP TABLE [dbo].[Orders];\n        END\n        IF (EXISTS (SELECT *  FROM\
    \ INFORMATION_SCHEMA.TABLES\n            WHERE TABLE_SCHEMA = 'dbo'\n        \
    \    AND  TABLE_NAME = 'Inventory'))\n        BEGIN\n            DROP TABLE [dbo].[Inventory];\n\
    \        END\n        CREATE TABLE [dbo].[Orders] (ID int PRIMARY KEY, ProductID\
    \ int, OrderDate datetime);\n        CREATE TABLE [dbo].[Inventory] (ProductID\
    \ int PRIMARY KEY, QuantityInStock int\n            CONSTRAINT CHK_QuantityInStock\
    \ CHECK (QuantityInStock>-1));\n        -- Fill up with some sample values\n \
    \       INSERT INTO dbo.Orders VALUES (1,1,getdate());\n        INSERT INTO dbo.Inventory\
    \ VALUES (1,0);\n        \"\"\")\n    except pyodbc.DatabaseError as err:\n  \
    \      # Catch if there’s an error\n        print(\"Couldn't prepare database\
    \ tables\")\ndef execute_transaction():\n    try:\n        # Switching to autocommit\
    \ = False, our app can now control transactional behavior\n        cnxn.autocommit\
    \ = False\n        cursor = cnxn.cursor()\n        cursor.execute(\"INSERT INTO\
    \ Orders VALUES (2,1,getdate());\")\n        cursor.execute(\"UPDATE Inventory\
    \ SET QuantityInStock=QuantityInStock-1 WHERE ProductID=1\")\n    except pyodbc.DatabaseError\
    \ as err:\n        # If there’s a database error, roll back the transaction\n\
    \        cnxn.rollback()\n        print(\"Transaction rolled back: \" + str(err))\n\
    \    else:\n        # If database commands were successful, commit the transaction\n\
    \        cnxn.commit()\n        print(\"Transaction committed!\")\n    finally:\n\
    \        cnxn.autocommit = True\nprepare_database()\nexecute_transaction()\nListing\
    \ 7-1\nExample of using transactions in Python\n```\n\nIn this example, you can\
    \ see how the `auto-commit` property plays an important role when controlling\
    \ transactions with `pyodbc` in Python. We’re opening the connection with `autocommit=True`,\
    \ which means that each command will be automatically committed once executed.\
    \ In the `prepare_database()` method in fact, we’re executing some preparation\
    \ activities in the database, and these will be executed as a single transaction.\
    \ In the `execute_transaction()` method though, we’re explicitly switching to\
    \ `autocommit=False`, so that we can programmatically control when to commit or\
    \ roll back our logical unit of work. Remember that our application logic is enforced\
    \ with a `CHECK` constraint that prevents placing new orders when a given product\
    \ is out of stock.\n\nBy executing this code sample, you will get back this error\
    \ message and database tables will not be modified as the transaction is rolled\
    \ back:\n\n```\nTransaction rolled back: ('23000', '[23000] [Microsoft][ODBC Driver\
    \ 17 for SQL Server][SQL Server] The UPDATE statement conflicted with the CHECK\
    \ constraint \"CHK_QuantityInStock\". The conflict occurred in database \"WideWorldImporters-Full\"\
    , table \"dbo.Inventory\", column 'QuantityInStock'. (547) (SQLExecDirectW)')\n\
    ```\n\nIn this very simple example, we’re reacting to the exception raised when\
    \ we’re getting an error executing a database operation, but there are other scenarios\
    \ where our application logic requires to check on a specific state of a given\
    \ entity in the database (by querying a table) and then decide whether commit\
    \ or roll back the entire unit of work as a whole.\n\nNaming a transaction can\
    \ be a useful practice that improves code readability and, maybe more important,\
    \ will be reflected in various transaction-related system views simplifying the\
    \ debugging process. `BEGIN TRANSACTION [transaction_name]` starts a local transaction,\
    \ but nothing is effectively written in the transaction log until further data\
    \ manipulation actions such as `INSERT`, `UPDATE`, or `DELETE` are triggering\
    \ an update to the log (although it may be that other activities like acquiring\
    \ locks to protect the transaction isolation level of `SELECT` statements can\
    \ happen).\n\nAn application or a script can begin, and even commit or roll back,\
    \ a transaction where another transaction already exists. Azure SQL does not really\
    \ provide direct support for nested transactions, and committing a transaction\
    \ opened within another has absolutely no effect. Only outer transactions will\
    \ effectively control what happens to various data manipulation activities executed\
    \ on various transactions in between, committing or rolling back everything. As\
    \ application developers, we should not really use this approach to avoid misleading\
    \ behaviors and consequences.\n\nSo why are nested transactions allowed at all?\
    \ Well, a common scenario where they can be used is when you are writing Stored\
    \ Procedures containing transactional logic that can be invoked either stand-alone\
    \ or from an outer procedure that may have itself already initiated a transaction.\
    \ A good practice is always to check if there’s already an open transaction on\
    \ that connection using the `@@TRANCOUNT` system variable and then decide if to\
    \ start a new one or just participate in the one started by the outer procedure\
    \ and marking the start of the inner part of the transaction with a `SAVE TRANSACTION\
    \ savepoint_name`.\n\nEvery time a new `BEGIN TRANSACTION` is executed, `@@TRANCOUNT`\
    \ will be incremented by 1\\. Same will be decremented by 1 every time `COMMIT\
    \ TRANSACTION` will be executed. In case of a `ROLLBACK TRANSACTION`, all transactions\
    \ will be rolled back and `@@TRANCOUNT` will be reset to zero, with the single\
    \ exception of the `ROLLBACK TRANSACTION savepoint_name` which will not affect\
    \ `@@TRANCOUNT` counter in any way.\n\nWhen more complex transactional logic is\
    \ required in fact, developers can define a location in the transaction flow where\
    \ to return if only a portion of the transaction is conditionally canceled or\
    \ rolled back: this is usually referred as a *savepoint*. If a transaction is\
    \ rolled back to a savepoint with a `ROLLBACK TRANSACTION savepoint_name`, then\
    \ the control flow must proceed to completion, optionally executing more T-SQL\
    \ statements if needed, and a `COMMIT TRANSACTION` statement to complete it successfully.\
    \ Otherwise, it must be canceled altogether by rolling the transaction back to\
    \ its beginning. To cancel an entire transaction, use the form `ROLLBACK TRANSACTION\
    \ transaction_name`.\n\nA T-SQL example that summarizes all these concepts is\
    \ as follows."
  raw: 'Let’s see how the same behavior can be achieved developing a sample application
    using Python.


    ```

    import os

    import pyodbc

    from decouple import config

    server = config(''server'')

    database = config(''database'')

    username = config(''username'')

    password = config(''password'')

    driver= ''{ODBC Driver 17 for SQL Server}''

    # Connecting to Azure SQL Database with autocommit=True

    cnxn = pyodbc.connect(''DRIVER=''+driver+'';SERVER=''+server+'';PORT=1433;DATABASE=''+database+'';UID=''+username+'';PWD=''+
    password,autocommit=True)

    def prepare_database():

    try:

    # Executing database preparation tasks

    cursor = cnxn.cursor()

    cursor.execute("""IF (EXISTS (SELECT *  FROM INFORMATION_SCHEMA.TABLES

    WHERE TABLE_SCHEMA = ''dbo''

    AND  TABLE_NAME = ''Orders''))

    BEGIN

    DROP TABLE [dbo].[Orders];

    END

    IF (EXISTS (SELECT *  FROM INFORMATION_SCHEMA.TABLES

    WHERE TABLE_SCHEMA = ''dbo''

    AND  TABLE_NAME = ''Inventory''))

    BEGIN

    DROP TABLE [dbo].[Inventory];

    END

    CREATE TABLE [dbo].[Orders] (ID int PRIMARY KEY, ProductID int, OrderDate datetime);

    CREATE TABLE [dbo].[Inventory] (ProductID int PRIMARY KEY, QuantityInStock int

    CONSTRAINT CHK_QuantityInStock CHECK (QuantityInStock>-1));

    -- Fill up with some sample values

    INSERT INTO dbo.Orders VALUES (1,1,getdate());

    INSERT INTO dbo.Inventory VALUES (1,0);

    """)

    except pyodbc.DatabaseError as err:

    # Catch if there’s an error

    print("Couldn''t prepare database tables")

    def execute_transaction():

    try:

    # Switching to autocommit = False, our app can now control transactional behavior

    cnxn.autocommit = False

    cursor = cnxn.cursor()

    cursor.execute("INSERT INTO Orders VALUES (2,1,getdate());")

    cursor.execute("UPDATE Inventory SET QuantityInStock=QuantityInStock-1 WHERE ProductID=1")

    except pyodbc.DatabaseError as err:

    # If there’s a database error, roll back the transaction

    cnxn.rollback()

    print("Transaction rolled back: " + str(err))

    else:

    # If database commands were successful, commit the transaction

    cnxn.commit()

    print("Transaction committed!")

    finally:

    cnxn.autocommit = True

    prepare_database()

    execute_transaction()

    Listing 7-1

    Example of using transactions in Python

    ```


    In this example, you can see how the *auto-commit* property plays an important
    role when controlling transactions with *pyodbc* in Python. We’re opening the
    connection with *autocommit=True*, which means that each command will be automatically
    committed once executed. In the *prepare_database()* method in fact, we’re executing
    some preparation activities in the database, and these will be executed as a single
    transaction. In the *execute_transaction()* method though, we’re explicitly switching
    to *autocommit=False*, so that we can programmatically control when to commit
    or roll back our logical unit of work. Remember that our application logic is
    enforced with a `CHECK` constraint that prevents placing new orders when a given
    product is out of stock.


    By executing this code sample, you will get back this error message and database
    tables will not be modified as the transaction is rolled back:


    ```

    Transaction rolled back: (''23000'', ''[23000] [Microsoft][ODBC Driver 17 for
    SQL Server][SQL Server] The UPDATE statement conflicted with the CHECK constraint
    "CHK_QuantityInStock". The conflict occurred in database "WideWorldImporters-Full",
    table "dbo.Inventory", column \''QuantityInStock\''. (547) (SQLExecDirectW)'')

    ```


    In this very simple example, we’re reacting to the exception raised when we’re
    getting an error executing a database operation, but there are other scenarios
    where our application logic requires to check on a specific state of a given entity
    in the database (by querying a table) and then decide whether commit or roll back
    the entire unit of work as a whole.


    Naming a transaction can be a useful practice that improves code readability and,
    maybe more important, will be reflected in various transaction-related system
    views simplifying the debugging process. `BEGIN TRANSACTION` `[transaction_name]`
    starts a local transaction, but nothing is effectively written in the transaction
    log until further data manipulation actions such as `INSERT`, `UPDATE`, or `DELETE`
    are triggering an update to the log (although it may be that other activities
    like acquiring locks to protect the transaction isolation level of `SELECT` statements
    can happen).


    An application or a script can begin, and even commit or roll back, a transaction
    where another transaction already exists. Azure SQL does not really provide direct
    support for nested transactions, and committing a transaction opened within another
    has absolutely no effect. Only outer transactions will effectively control what
    happens to various data manipulation activities executed on various transactions
    in between, committing or rolling back everything. As application developers,
    we should not really use this approach to avoid misleading behaviors and consequences.


    So why are nested transactions allowed at all? Well, a common scenario where they
    can be used is when you are writing Stored Procedures containing transactional
    logic that can be invoked either stand-alone or from an outer procedure that may
    have itself already initiated a transaction. A good practice is always to check
    if there’s already an open transaction on that connection using the `@@TRANCOUNT`
    system variable and then decide if to start a new one or just participate in the
    one started by the outer procedure and marking the start of the inner part of
    the transaction with a `SAVE TRANSACTION savepoint_name`.


    Every time a new `BEGIN TRANSACTION` is executed, `@@TRANCOUNT` will be incremented
    by 1\. Same will be decremented by 1 every time `COMMIT TRANSACTION` will be executed.
    In case of a `ROLLBACK TRANSACTION`, all transactions will be rolled back and
    `@@TRANCOUNT` will be reset to zero, with the single exception of the `ROLLBACK
    TRANSACTION savepoint_name` which will not affect `@@TRANCOUNT` counter in any
    way.


    When more complex transactional logic is required in fact, developers can define
    a location in the transaction flow where to return if only a portion of the transaction
    is conditionally canceled or rolled back: this is usually referred as a *savepoint*
    . If a transaction is rolled back to a savepoint with a `ROLLBACK TRANSACTION
    savepoint_name`, then the control flow must proceed to completion, optionally
    executing more T-SQL statements if needed, and a `COMMIT TRANSACTION` statement
    to complete it successfully. Otherwise, it must be canceled altogether by rolling
    the transaction back to its beginning. To cancel an entire transaction, use the
    form `ROLLBACK TRANSACTION transaction_name`.


    A T-SQL example that summarizes all these concepts is as follows.'
