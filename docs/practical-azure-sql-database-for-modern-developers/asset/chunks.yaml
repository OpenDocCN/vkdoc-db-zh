  trans: '## 复杂类型列


    标量类型列是关系数据库中标准且最常用的列类型。在大多数情况下，你可以仅包含标量类型列的规范化表来表示你的领域模型。然而，在某些场景下，你可能需要用一些非标量类型来表示你的应用程序对象。Azure
    SQL 支持在表列中存储以下类型：


    *   `XML` – Azure SQL 支持在列中存储格式正确的 XML 文档。

    *   空间列包含一些常用元素，用于表示地理和几何概念，如点、线、多边形等。

    *   `CLR` 列 – 这些列包含 `.NET` 对象的序列化二进制表示形式。


    这些类型不仅仅是其对应应用程序对象的二进制序列化。Azure SQL 支持对这些类型应用一些特定方法。以下代码示例展示了一个最近邻查询，该查询返回距离给定点最近的五个城市：


    ```

    DECLARE @g geography = ''POINT(-95 45.5)'';

    SELECT TOP(5) Location.ToString(), CityName

    FROM Application.Cities

    ORDER BY Location.STDistance(@g) ASC;

    ```


    空间列具有诸如 `STDistance` 之类的方法，该方法计算点与作为参数提供的位置之间的距离，并确保应用正确的计算，例如考虑地球是一个球体，以及有几种将地球表面投影到地图上的方式。这些并不简单的三角函数计算，你可以免费使用！


    Azure SQL 中的复杂类型使你能够解决需要超出经典表类型特殊处理的、非常特定的问题。


    Azure SQL 支持存储 JSON 文档；然而，没有特殊的 JSON 类型。Azure SQL 使用标准的 `nvarchar` 类型来存储 JSON
    格式的文本。这意味着 `任何` 编程语言都可以支持它，而无需特殊库。


    ### 声明式约束


    应用程序开发的黄金法则之一是业务规则应在应用层实现。纯粹主义者可能会认为，将业务逻辑推送到数据库存储过程、函数和触发器或客户端可能会导致问题和维护噩梦。我们对此已经做了一些讨论，明确描述了将计算推送到数据的必要性，但让我们先把之前讨论的所有原因放在一边，只关注
    `业务规则`。业务规则必须留在应用层：这总是正确的吗？让我们看一些你可能需要实现的业务规则示例：


    *   你必须确保一个人的电子邮件地址或用户名是唯一的。在创建新用户之前，你会查询表以检查是否存在具有相同电子邮件的另一个用户吗？

    *   你必须确保如果产品引用了不存在的客户，则无法保存该产品。在保存产品之前，你是否会每次读取客户表，只是为了确保没有人在此期间删除了该客户？

    *   当你从系统中删除客户时，所有附加信息（如文档）也应被删除，但订单和发票除外，对于这些，你需要断开与客户的关系，并在引用列中设置 `null` 值。如果客户仍有活动账户，则不应删除这些账户。在删除产品之前，你会从应用层查询
    `订单` 和 `发票` 表以确保它们不返回任何结果吗？这可能是一个你需要实现并彻底测试的非平凡策略。


    虽然你可以在应用程序中实现这些规则，但是否应该这样做是有争议的。描述数据状态和某些操作上行为的业务规则可以很容易地在数据库中声明。事实上，这些业务规则与数据紧密相连，以至于它们实际上更像是一种
    `数据一致性` 规则。当然，它始终属于“业务规则”这个大家族的定义范畴，但一如既往，过度概括可能比有益更有害。事实上，通过在数据库级别应用这些规则，你可以确保数据与业务规则保持一致，并且无需一行应用代码即可应用这些规则，遵循保持事物尽可能简单（但不能过于简单！）的黄金原则，也有助于建立良好且清晰的关注点分离。数据绝对是数据库关注的问题。此外，你的操作不会产生额外的性能影响，因为你不需要在主操作中运行额外的查询来验证额外规则或实现某些附带活动。因此，你还能获得更好的性能。这应该有助于你更好地理解，哪些程度的业务规则应在应用层应用，哪些应在数据库应用。


    Azure SQL 支持你通过以下约束来增强你的表，并声明性地定义规则以确保数据有效：


    *   `主键` 使你能够指定一个列（或一组列）保存对象的唯一标识符。

    *   `外键` 指定一个对象（表行）在逻辑上属于另一个对象或以某种方式与该对象相关。这被称为 `参照完整性`，它保证通过外键和主键绑定的两行之间的关系不会意外中断。

    *   `检查约束` 是每个对象都应检查的条件。这些约束保证对于保存在表中的数据，某些条件将始终为真。你可以将这些检查实现为最后一道防线，因此即使你的应用程序代码未能检查某些条件，或者你有多个服务可以更新相同的数据，你也可以确信数据库将保证该条件必须始终为真。

    *   `唯一约束` 保证列中的值是唯一的。它们几乎类似于主键（一个很大的区别是它们允许空值），可用于用户名或电子邮件地址等值。


    Azure SQL 支持你无需实现即可声明性地指定这些约束。以下声明描述了客户与其发票和订单之间的关系。这些声明还将指定在客户被删除时应对相关数据采取什么操作。当有人试图删除客户时，此关系将删除该客户的所有发票：


    ```

    ALTER TABLE Sales.Invoices

    ADD CONSTRAINT FK_Cust_Inv FOREIGN KEY (CustomerID)

    REFERENCES Sales.Customers (CustomerID) ON DELETE CASCADE;

    ```


    以下声明将阻止删除客户的操作，如果该客户存在某些订单：


    ```

    ALTER TABLE Sales.Orders

    ADD CONSTRAINT FK_Cust_Orders FOREIGN KEY (CustomerID)

    REFERENCES Sales.Customers (CustomerID) ON DELETE NO ACTION;

    ```


    只需几行代码，你就可以轻松实现可能难以在应用层编码（尤其是测试）的业务规则。利用这些内置约束，你可以依赖 Azure SQL 来维护数据完整性，而无需在应用逻辑中付出任何额外努力。'
- fmt: '### Making your tables secure


    Azure SQL enables you to associate fine-grained permissions to any user or login
    that can access your database. Let us imagine that you have a Sales microservice
    that manages information about the sales orders. This microservice accesses the
    Azure SQL database using the login `SalesMicroservice` that should be able to
    read or insert `Sales.Orders` table but not to update or delete data. It should
    just be able to read information about `Customers` and `Invoices`. For some custom
    actions, it might use only procedures that are placed in the `Sales` schema. A
    minimum set of permissions required for this microservice can be defined using
    the following rules:


    ```sql

    GRANT SELECT, INSERT ON OBJECT::Sales.Orders TO SalesMicroservice;

    GRANT SELECT ON OBJECT::Sales.Customers TO SalesMicroservice;

    GRANT SELECT ON OBJECT::Sales.Invoices TO SalesMicroservice;

    GRANT EXECUTE ON SCHEMA::Sales TO SalesMicroservice;

    ```


    These are easy to write and review security rules that you can define in your
    database. This security model is important in the architectures such as Command
    Query Responsibility Segregation (CQRS) where you have separate processes that
    are allowed only to read or update data. Assigning the minimum required set of
    permissions would ensure that you are not vulnerable to various security attacks
    such as SQL Injection or unauthorized changes. The security rules in Azure SQL
    database are the last line of defense of your data that should prevent data breaches
    even if there is some security hole in your application layer.


    If you need to examine permissions assigned to users, you can log in as the user
    or impersonate as user and check the permissions using `fn_my_permissions` function:


    ```sql

    EXECUTE AS USER = ''SalesMicroservice'';

    SELECT * FROM fn_my_permissions(''Sales.Customers'', ''OBJECT'');

    REVERT;

    ```


    In addition to manual inspection, there is a Vulnerability Assessment tool built
    into any Azure SQL that automatically inspects permissions assigned to the users
    and makes recommendations.


    ## Improve performance with indexes


    A table, unless you create a *clustered index* on it (you’ll learn about this
    in a few pages; for now, just keep in mind that by default a primary key also
    creates a clustered index behind the scenes), is a set of rows physically stored
    in the area like the heap memory in .NET, Java, and other modern programming languages
    or runtime environments. That kind of table is called a *heap table* in Azure
    SQL terminology.


    A classic heap table can be useful in an extremely limited set of scenarios (like
    scanning small tables or appending rows). However, the most expected operations
    in Azure SQL database would be finding the row by identifier (primary key), finding
    or updating a set by some criterion, and so on. These common operations are extremely
    inefficient on a plain set of rows organized as heaps. As you will soon learn,
    even a plain scanning of the entire table is more efficient if we use some special
    Columnstore format.


    Azure SQL enables you to use *indexes* to enhance this basic structure and speed
    up the access to the rows in various scenarios. Indexes are the structures of
    row addresses that enable you to organize the rows in your table or build a structure
    that the queries can use more efficiently than a basic table. There are several
    kinds of indexes in Azure SQL:


    *   B-tree indexes that represent multi-level tree-like structures of pointers.
    These indexes enable you to easily locate one or a set or rows without scanning
    the entire table.

    *   Columnstore indexes organize data in columnar format instead of default row
    format. These structures, which will be described in the next chapter, are an
    excellent solution for speeding up reporting and analytic queries that scan large
    parts of the table.

    *   Domain-specific indexes are special types of indexes built to efficiently
    support some non-standard structures or data types. Azure SQL supports Spatial
    indexes, Full-text indexes, and XML indexes. These indexes enable you to run some
    non-standard filters like containment of the coordinate within the area, XPath
    expression, filtering based on proximity of two words in the text, and so on.


    B-Tree indexes are the most common structure that you will find and use in any
    Azure SQL database (and more generally in any database, relational or not). B-tree
    indexes and tables are so tightly coupled that we cannot talk about them separately.
    In Azure SQL terminology, they are called Hobits (HOBT – Heap or B-Tree), and
    they represent the most common structures in most databases.


    Columnstore and domain-specific indexes are advanced concepts that will be explained
    in future chapters.'
