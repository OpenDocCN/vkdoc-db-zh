  trans: '### 查询非结构化文本


    一旦建立了全文搜索（FTS）索引，就可以使用以下功能通过文本匹配来搜索行：


    *   `CONTAINS` 和 `FREETEXT`：用于检查某些列中的值是否符合文本谓词中定义的条件。

    *   表值函数 `CONTAINSTABLE` 和 `FREETEXTTABLE`：返回符合文本匹配条件的行的标识符。


    以下示例展示了如何从 `Warehouse.StockItems` 表中查找所有 `SearchDetails` 列包含的文本符合 `@SearchCriterion`
    变量中定义的搜索条件的键：


    ![../images/493913_1_En_8_Chapter/493913_1_En_8_Figa_HTML.jpg](img/493913_1_En_8_Figa_HTML.jpg)


    ```sql

    DECLARE @SearchCondition NVARCHAR(200) = ''blue car'';

    SELECT StockItemID = ft.[KEY], ft.[RANK]

    FROM FREETEXTTABLE(Warehouse.StockItems, SearchDetails, @SearchCondition) AS ft

    ```


    `KEY` 列是 `StockItems` 表中某行的标识符，该行用于 FTS 索引，并代表由 `FREETEXTTABLE` 或 `CONTAINSTABLE`
    函数返回的记录。`RANK` 列描述该行与选择条件的匹配程度。可以使用 `KEY` 列将此结果集与原始表连接（`JOIN`），以获取更多结果。以下示例展示了如何查找
    FTS 函数返回的键对应的所有库存项：


    ![../images/493913_1_En_8_Chapter/493913_1_En_8_Figb_HTML.jpg](img/493913_1_En_8_Figb_HTML.jpg)


    ```sql

    DECLARE @SearchCondition NVARCHAR(200) = ''blue AND car'';

    SELECT

    si.StockItemID,

    si.StockItemName,

    ft.[RANK]

    FROM

    Warehouse.StockItems AS si

    INNER JOIN

    CONTAINSTABLE(Warehouse.StockItems, SearchDetails, @SearchCondition) AS ft ON
    si.StockItemID = ft.[KEY]

    ORDER BY

    ft.[RANK];

    ```


    表值函数 `CONTAINSTABLE` 和 `FREETEXTTABLE` 基于精确匹配或模糊匹配来匹配文本。这些函数的一个区别是，`CONTAINSTABLE`
    进行更精确的匹配，而 `FREETEXTTABLE` 则使用同义词库、同义词和词形变化进行模糊匹配。如果以单词 `"children"` 作为搜索条件，`FREETEXTTABLE`
    也会匹配包含 `"child"` 的行，但 `CONTAINSTABLE` 则不会。在 `CONTAINSTABLE` 中，需要显式指定表达式 `FORMSOF(INFLECTIONAL,children)`
    来指示 Azure SQL 包含该单词的词形变化形式。


    另一个区别是，`CONTAINSTABLE` 允许指定 `AND`、`OR` 或 `NEAR` 等运算符来定义如何搜索文本。在前面的示例中，你可能看到我们向
    `FREETEXTTABLE` 提供了单词集合 `"blue car"`，该函数将返回包含这些单词中任何一个的所有行，类似于大多数网络搜索引擎的行为。而在
    `CONTAINSTABLE` 示例中，我们需要显式指定诸如 `AND`、`OR` 或 `NEAR` 之类的运算符来指定应搜索的内容，例如 `"blue AND
    car"` 或 `"blue OR car"`。


    除了函数 `FREETEXTTABLE` 和 `CONTAINSTABLE`，你还可以使用等效的谓词 `FREETEXT` 和 `CONTAINS`。这些谓词可以在查询的
    `WHERE` 子句中使用，它们在功能上等同于显式地与 `FREETEXTTABLE` 和 `CONTAINSTABLE` 进行 `JOIN` 操作，区别在于你无法使用
    `RANK` 列：


    ```sql

    DECLARE @SearchCondition NVARCHAR(200) =

    ''FORMSOF(INFLECTIONAL,children) OR car'';

    SELECT

    si.StockItemID,

    si.StockItemName,

    si.SearchDetails

    FROM

    Warehouse.StockItems AS si

    WHERE

    CONTAINS(SearchDetails, @SearchCondition);

    ```


    如果存在包含单词 `''cars''` 的库存项，它不会出现在结果中，因为 `CONTAINS` 使用单词 `''car''` 进行精确匹配。但是，如果我们在搜索表达式
    `''children cars''` 中使用 `FREETEXT`，该谓词将使用这两个单词的词形变化形式。


    全文搜索是一个非常强大的工具，可以通过简单的表达式帮助你实现非常复杂的搜索。


    ### 如何在半结构化数据上利用非结构化索引？


    全文搜索不仅限于非结构化文本。你可以使用 FTS 索引来提高某些 JSON 搜索查询的性能，尤其是在需要筛选具有客户端定义的键值对的文档时。毕竟，FTS 索引与许多数据库中用于索引
    JSON 数据的 *广义倒排索引（GIN）* 非常相似。


    想象一下，我们需要实现一个功能，使用任意的键值组合来搜索大量的 JSON 文档。为每个可能的键添加 B-Tree 索引效率低下，而对 JSON 数据使用 `CLUSTERED
    COLUMNSTORE` 索引是为分析用例设计的，因此不是筛选的理想解决方案。


    如果我们知道值是一个单词，并且可以利用 JSON 存储为文本且键和值彼此靠近这一事实。在这种情况下，筛选所有具有所需键和值彼此靠近的 JSON 文本的 FTS
    可能会提供正确的结果。以下查询用于查找包含键值对的 JSON 文档：


    ```json

    {"Color":"Silver","MakeFlag":true,"SafetyStockLevel":100}

    ```


    ```sql

    SELECT si.StockItemID, si.StockItemName, si.Tags

    FROM Warehouse.StockItems AS si

    WHERE CONTAINS(CustomFields, ''NEAR((Color,Silver),1)

    AND NEAR((MakeFlag,true),1)

    AND NEAR((SafetyStockLevel,100),1)'')

    ```


    `CONTAINS` 谓词中的 `NEAR` 运算符是 JSON 场景（其中 JSON 属性的键靠近其值）的一个良好选择。此类谓词将快速查找所有包含彼此靠近的单词
    `"Color"` 和 `"Silver"` 的文本单元，这在 JSON 结构中正是如此。此外，`CONTAINS` 子句使我们能够使用 `AND`、`OR`
    和其他关系谓词来指定复杂的谓词。然而，FTS 不能保证 `"Color"` 是键且 `"Silver"` 是文本中的值，因为它不理解 JSON 结构中文本部分的语义。如果你有一个包含文本
    `"color silver"` 的 JSON 文档，它也会被 `CONTAINS` 谓词返回，尽管这不是键值对。


    为了消除误报结果，我们可以应用标准的 JSON 谓词来双重检查条件并保证结果的正确性：


    ```sql

    SELECT ProductID, Name

    FROM ProductCatalog

    WHERE CONTAINS(Data, ''NEAR((Color,Silver),1)

    AND NEAR((MakeFlag,true),1)

    AND NEAR((SafetyStockLevel,100),1)'')

    AND JSON_VALUE(Data,''$.Color'') = ''Silver''

    AND JSON_VALUE(Data,''$.MakeFlag'') = ''true''

    AND JSON_VALUE(Data,''$.SafetyStockLevel'') = ''100''

    ```


    该查询充分利用了 FTS 和 JSON 功能的优势来返回所需结果：


    *   `CONTAINS` 将快速筛选掉大部分不符合条件的条目，可能显著减少可能包含所需数据的候选行数量。如果没有这一部分，我们将不得不进行全表扫描并对每一行应用
    JSON 函数。

    *   `JSON_VALUE` 将对由 FTS 返回的较小候选集执行精确检查。这些谓词保证返回正确的结果，并且我们确信无需将它们应用于每个文档。


    此示例再次展示了 Azure SQL 功能如何很好地协同工作，使你能够实现各种场景。'
- fmt: '# Multi-model in Azure SQL: why and when


    Azure SQL is a modern multi-model database platform that enables you to use different
    data formats and combine them in order to design the best data model that will
    match the requirements of your domain. Depending on your scenario, you can represent
    relations as classic foreign key relationships or graph nodes/edges. Semi-structured
    data can be stored in `JSON`, `Spatial`, or `XML` columns.


    You just learned how you can use all these features. It’s now time to discuss
    why and when.


    One of the biggest advantages of Azure SQL is interoperability between core database
    features and multi-model capabilities. You can easily combine `Columnstore` with
    graphs or `JSON` data to get high-performance analytics capabilities on graph/`JSON`
    data, built-in language processing rules to customize application for any market,
    use all features that `T-SQL` language provides to create any query or powerful
    report, and integrate it with a variety of tools that understand `T-SQL`.


    With Azure SQL, you are getting the core functionalities that other `NoSQL` databases
    provide, plus a lot of standard relational database functionalities that can be
    easily integrated with `NoSQL` features. This is the most important reason why
    you should choose the multi-model capabilities of Azure SQL.


    So, should you choose Azure SQL with its multi-model capabilities or some specialized
    `NoSQL` Database engine that has more advanced features in these areas? That’s
    a very interesting – and not easy – question to answer.


    Azure SQL is not a `NoSQL` database. If you have a classic `NoSQL` scenario that
    requires advanced graph or document support and you don’t expect to have to deal
    with other data that would otherwise be better stored into a table, then you should
    surely evaluate full-fledged graph or document databases such as Azure Cosmos
    DB, MongoDB, Neo4j, and so on. These database engines are fully oriented on `NoSQL`
    scenarios and have implemented richer and more advanced `NoSQL` features. They
    address a very specific area and they are extremely good at it.


    The most important question that you need to ask yourself is what kind of additional
    `NoSQL` functionalities would your application need. Both Azure SQL and `NoSQL`
    database engines provide similar levels of fundamental graph and document processing
    functionalities (e.g., inserting, modifying, indexing, and searching). If you
    need more than these basic features, Azure SQL gives you an ability to leverage
    advanced querying using `T-SQL`, `Columnstore` technology for analytic, built-in
    machine learning capabilities with `R`/`Python` support, collations, replication
    mechanisms, and other functionalities that are proven as necessary in most of
    the real-world application. If you believe that these functionalities might be
    important for your application, then Azure SQL is the right choice for you.


    ## If you want to know more


    Lots of concepts and technologies have been discussed in this chapter. As usual,
    if you want to know more, you can find more food for your brain here:


    *   Multi-model capabilities of Azure SQL Database & SQL Managed Instance – [`https://docs.microsoft.com/azure/azure-sql/multi-model-features`](https://docs.microsoft.com/en-us/azure/azure-sql/multi-model-features)

    *   `Dapper.Stream` – [`https://github.com/JocaPC/Dapper.Stream/`](https://github.com/JocaPC/Dapper.Stream/)

    *   `JSON` Data in SQL Server – [`https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server)

    *   Getting started with `JSON` features in Azure SQL – [`https://docs.microsoft.com/azure/azure-sql/database/json-features`](https://docs.microsoft.com/en-us/azure/azure-sql/database/json-features)

    *   Graph processing with SQL Server and Azure SQL – [`https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-overview`](https://docs.microsoft.com/en-us/sql/relational-databases/graphs/sql-graph-overview)

    *   Spatial Data – [`https://docs.microsoft.com/sql/relational-databases/spatial/spatial-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/spatial/spatial-data-sql-server)

    *   Spatial Indexes Overview – [`https://docs.microsoft.com/sql/relational-databases/spatial/spatial-indexes-overview`](https://docs.microsoft.com/en-us/sql/relational-databases/spatial/spatial-indexes-overview)

    *   World Geodetic System (`WGS84`) – [`https://gisgeography.com/wgs84-world-geodetic-system/`](https://gisgeography.com/wgs84-world-geodetic-system/)

    *   Full-Text Search – [`https://docs.microsoft.com/sql/relational-databases/search/full-text-search`](https://docs.microsoft.com/sql/relational-databases/search/full-text-search)


    # 9. More Than Tables


    In the previous chapter, we learned about the `Hobits` (`HoBT`, Heap or B-Tree)
    – classic tables and indexes that are the most common objects in relational databases.
    In this chapter, you will learn about some special types of tables and indexes
    that can help you to build better designs for certain scenarios. Objects that
    will be explained in this chapter are:


    *   `Columnstore` structures that can improve performance of your reporting and
    analytic workloads

    *   Memory-optimized tables that can improve your `OLTP` workloads with `CRUD`-like
    actions

    *   Temporal tables that can preserve the entire history of the changes you made
    and enable you to perform historical and time travel analysis of data'
