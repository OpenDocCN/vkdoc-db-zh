  trans: '

    ## 变量


    T-SQL 中有两种类型的变量：标量变量和表变量。标量变量就是你在其他编程语言中习惯使用的普通变量。变量必须显式声明，其名称以字符“@”开头，并且必须指定类型：


    ```sql

    DECLARE @i INT = 42;

    DECLARE @name NVARCHAR(50) = N''John'';

    SELECT @i AS FamousNumber, @name AS CommonName;

    ```


    T-SQL 不支持数组、列表或字典，但如果你需要在变量中存储多个值，可以使用表变量：


    ```sql

    DECLARE @t AS TABLE (

    [Id] INT NOT NULL,

    [Name] NVARCHAR(50) NOT NULL

    );

    INSERT INTO @t VALUES (42, N''John'');

    SELECT * FROM @t;

    ```


    有一个在初学时可能会让人感到惊讶的行为，它与其他编程语言中的变量管理方式截然不同，那就是 Azure SQL 如何管理变量的**作用域**。变量的作用域是某个
    `批处理` 或某个对象。对于对象而言，理解作用域很容易，因为 T-SQL 的行为与其他任何编程语言完全一样。在 `存储过程`、`触发器` 或 `函数` 内部定义的变量，其作用域将仅限于该对象。


    而在对象外部定义的变量，其作用域则是 `批处理`。一个 `批处理` 是一起执行的一组 T-SQL 语句。在前面的代码示例中，你必须将所有三个语句（`DECLARE`、`INSERT`
    和 `SELECT`）放在一起执行；否则，代码将无法工作。如果你尝试单独执行 `DECLARE` 语句，它是可以工作的，但一旦执行完毕，变量就消失了。如果你接着尝试执行
    `INSERT` 语句，你将会收到一个错误，提示变量 `@t` 未定义。


    表变量通常只在非常特定的场景下使用，因为它们可能对性能产生相当大的影响，而且通常不应包含太多行。需要注意的是，这与内存消耗或类似问题无关：问题在于表变量介于两个世界——变量和表——之间，因此
    Azure SQL 引擎无法像优化常规表那样优化对其数据的访问。如果你想了解更多细节，请参阅本章末尾的内容。一般来说，如果你需要一个临时位置来存储部分数据，请改用临时表。


    ## 临时表


    尤其是在创建分析解决方案时，你可能（甚至相当频繁地）需要将处理后的数据临时存储在某个地方，以便稍后对其进行处理。有时，将一个非常复杂的查询拆分成几个较小的查询也很有帮助，这时你需要一个地方来存储某个查询的结果，以便另一个查询可以获取它进行进一步处理。


    临时表正是为解决这类情况而设计的。你可以使用标准的 `CREATE TABLE` 命令来创建临时表。只要表名以井号字符（`#`）开头，该表就是临时的：


    ```sql

    CREATE TABLE #t

    (

    [Id] INT NOT NULL,

    [Name] NVARCHAR(50) NOT NULL

    );

    ```


    “临时”意味着它将一直存在，直到被 `DROP` 命令手动销毁，或者直到它超出其作用域。对于 `存储过程` 或 `触发器`，作用域是创建该临时表的 `存储过程`
    或 `触发器` 的生命周期。一旦 `存储过程` 或 `触发器` 执行完毕，临时表就会被销毁。


    使用 `SELECT INTO` 语句可以快速“创建并填充”一个包含查询结果的临时表：


    ```sql

    SELECT

    [OrderLineID],

    [Description],

    [Quantity]

    INTO

    #Order37

    FROM

    [Sales].[OrderLines]

    WHERE

    [OrderID] = 37;

    ```


    一个名为 `#Order37` 的临时表将被创建，系统会自动推断列名和类型，并用与指定订单相关的 `[Sales].[OrderLines]` 表中的所有行来填充它。


    临时表受益于 Azure SQL 能够进行的特殊优化，因为它知道这些表本质上就是临时的。如果你需要临时存放数据，请确保使用它们而不是常规表。

    '
- fmt: "### Views\n\nViews are probably the simplest option available to reuse code\
    \ and encapsulate data processing logic. A view is nothing more than a query definition,\
    \ labeled with name, and usable as a table. In fact, views are also known as `virtual\
    \ tables`, even if this name is seldomly used.\n\nViews are useful for code reuse\
    \ but also for securing access to your data and to keep backward compatibility\
    \ with existing applications, by abstracting access to underlying tables.\n\n\
    #### Code Reuse and Performance\n\nThe first point is quite obvious: instead of\
    \ writing a complex query with `JOIN`s, Windowing Functions, and all the goodness\
    \ that Azure SQL provides, you can just save the query definition as a view and\
    \ then call it later by executing simpler code. For example, let’s create a view\
    \ to encapsulate the logic to calculate a Running Total:\n\n```sql\nCREATE OR\
    \ ALTER VIEW [Sales].[OrderLinesRuninngTotal]\nAS\nSELECT\n    [OrderID],\n  \
    \  [OrderLineID],\n    [Description],\n    [Quantity],\n    SUM(Quantity) OVER\
    \ (\n        PARTITION BY [OrderID]\n        ORDER BY [OrderLineID] ROWS BETWEEN\n\
    \        UNBOUNDED PRECEDING AND\n        CURRENT ROW\n    ) AS RunningTotal\n\
    FROM\n    [Sales].[OrderLines];\nGO\n```\n\nNow you can execute the same query\
    \ using this simpler code:\n\n```sql\nSELECT\n    OrderID,\n    [OrderLineID],\n\
    \    [Description],\n    [Quantity],\n    [RunningTotal]\nFROM\n    [Sales].[OrderLinesRuninngTotal];\n\
    ```\n\nThe query executed will be `exactly the same` as if you would have executed\
    \ the query code directly without using the view. More precisely, the view body\
    \ is “expanded” and merged with the query’s body. For example, in fact, if you\
    \ write something like this:\n\n```sql\nSELECT\n    OrderID,\n    [OrderLineID],\n\
    \    [Description],\n    [Quantity],\n    [RunningTotal]\nFROM\n    [Sales].[OrderLinesRuninngTotal]\n\
    WHERE\n    [OrderID] IN (41, 42, 43);\nGO\n```\n\n`GO` is not a `T-SQL` command\
    \ or keyword. `GO` is a keyword recognized by a tool, like `SQL Server Management\
    \ Studio` or `Azure Data Studio`, that notifies the tool that two sets of `T-SQL`\
    \ statements, usually called batches, must be executed `separately` and `independently`\
    \ (but not in parallel though!). This is needed by some commands, many `CREATE`\
    \ statements, for example, so that you can tell the tool you’re using when a view’s\
    \ body is finished and when another command, potentially even unrelated to the\
    \ created view, is starting.\n\nAzure SQL will behave like it could `push` the\
    \ `WHERE` clause into the view and apply the filter so that the running total\
    \ will be calculated only on the requested Orders. More precisely, what really\
    \ happens is that the view is `expanded` and merged with the query that is using\
    \ it. This allows Azure SQL to optimize the query as a whole and avoid, for example,\
    \ to just follow the precedence order which would require to calculate the Running\
    \ Total for `all` orders and then remove all the rows that are not in the query's\
    \ scope. As you can imagine, that would be extremely inefficient. By following\
    \ this optimization process instead, the view can take advantage of all the filters\
    \ used in outer queries (when it makes sense) so that it can reduce as much as\
    \ possible the number of rows on which it has to operate, providing better performance\
    \ and less resource usage.\n\n#### Security\n\nSecurity is another reason why\
    \ views are useful: you can grant someone access to a view while denying that\
    \ user access to the table used by the view. This means that you can be sure a\
    \ user can only see the result of the query, but not the values stored in the\
    \ underlying tables used to create that result.\n\n#### Abstraction and Compatibility\n\
    \nLast reason for taking advantage of views is that they help to abstract access\
    \ to tables by creating an indirection layer, so that your application and the\
    \ database can stay loosely coupled, giving you the flexibility to make changes\
    \ to your database without necessarily breaking any working application: views\
    \ can used as a backward-compatible interface to existing applications. You are\
    \ free to refactor your database and evolve its design to some new direction you\
    \ want it to take, with the peace of mind that you won’t introduce any breaking\
    \ changes.\n\nViews can be dropped using the `DROP VIEW` command:\n\n```sql\n\
    DROP VIEW [Sales].[OrderLinesRuninngTotal];\n```"
  raw: '### Views


    Views are probably the simplest option available to reuse code and encapsulate
    data processing logic. A view is nothing more than a query definition, labeled
    with name, and usable as a table. In fact, views are also known as *virtual tables*,
    even if this name is seldomly used.


    Views are useful for code reuse but also for securing access to your data and
    to keep backward compatibility with existing applications, by abstracting access
    to underlying tables.


    The first point is quite obvious: instead of writing a complex query with JOINs,
    Windowing Functions, and all the goodness that Azure SQL provides, you can just
    save the query definition as a view and then call it later by executing simpler
    code. For example, let’s create a view to encapsulate the logic to calculate a
    Running Total:


    ```

    CREATE OR ALTER VIEW [Sales].[OrderLinesRuninngTotal]

    AS

    SELECT

    [OrderID],

    [OrderLineID],

    [Description],

    [Quantity],

    SUM(Quantity) OVER (

    PARTITION BY [OrderID]

    ORDER BY [OrderLineID] ROWS BETWEEN

    UNBOUNDED PRECEDING AND

    CURRENT ROW

    ) AS RunningTotal

    FROM

    [Sales].[OrderLines];

    GO

    ```


    Now you can execute the same query using this simpler code:


    ```

    SELECT

    OrderID,

    [OrderLineID],

    [Description],

    [Quantity],

    [RunningTotal]

    FROM

    [Sales].[OrderLinesRuninngTotal];

    ```


    The query executed will be *exactly the same* as if you would have executed the
    query code directly without using the view. More precisely, the view body is “expanded”
    and merged with the query’s body. For example, in fact, if you write something
    like this:


    ```

    SELECT

    OrderID,

    [OrderLineID],

    [Description],

    [Quantity],

    [RunningTotal]

    FROM

    [Sales].[OrderLinesRuninngTotal]

    WHERE

    [OrderID] IN (41, 42, 43);

    GO

    ```


    `GO` is not a T-SQL command or keyword. `GO` is a keyword recognized by a tool,
    like SQL Server Management Studio or Azure Data Studio, that notifies the tool
    that two sets of T-SQL statements, usually called batches, must be executed *separately*
    and *independently* (but not in parallel though!). This is needed by some commands,
    many `CREATE` statements, for example, so that you can tell the tool you’re using
    when a view’s body is finished and when another command, potentially even unrelated
    to the created view, is starting.


    Azure SQL will behave like it could *push* the `WHERE` clause into the view and
    apply the filter so that the running total will be calculated only on the requested
    Orders. More precisely, what really happens is that the view is *expanded* and
    merged with the query that is using it. This allows Azure SQL to optimize the
    query as a whole and avoid, for example, to just follow the precedence order which
    would require to calculate the Running Total for *all* orders and then remove
    all the rows that are not in the query''s scope. As you can imagine, that would
    be extremely inefficient. By following this optimization process instead, the
    view can take advantage of all the filters used in outer queries (when it makes
    sense) so that it can reduce as much as possible the number of rows on which it
    has to operate, providing better performance and less resource usage.


    Security is another reason why views are useful: you can grant someone access
    to a view while denying that user access to the table used by the view. This means
    that you can be sure a user can only see the result of the query, but not the
    values stored in the underlying tables used to create that result.


    Last reason for taking advantage of views is that they help to abstract access
    to tables by creating an indirection layer, so that your application and the database
    can stay loosely coupled, giving you the flexibility to make changes to your database
    without necessarily breaking any working application: views can used as a backward-compatible
    interface to existing applications. You are free to refactor your database and
    evolve its design to some new direction you want it to take, with the peace of
    mind that you won’t introduce any breaking changes.


    Views can be dropped using the `DROP VIEW` command:


    ```

    DROP VIEW [Sales].[OrderLinesRuninngTotal];

    ```'
  trans: "### 视图\n\n视图可能是可用于重用代码和封装数据处理逻辑的最简单选项。视图不过是一个查询定义，被赋予名称，并可以作为表来使用。事实上，视图也被称为\
    \ `虚拟表`，尽管这个名称很少使用。\n\n视图对于代码重用很有用，同时也有助于保障数据访问的安全，并通过抽象对底层表的访问来保持与现有应用程序的向后兼容性。\n\
    \n#### 代码重用与性能\n\n第一点相当显而易见：与其编写包含 `JOIN`、窗口函数以及 Azure SQL 提供的所有优点的复杂查询，不如将查询定义保存为视图，然后通过执行更简单的代码来调用它。例如，让我们创建一个视图来封装计算累计总计的逻辑：\n\
    \n```sql\nCREATE OR ALTER VIEW [Sales].[OrderLinesRuninngTotal]\nAS\nSELECT\n\
    \    [OrderID],\n    [OrderLineID],\n    [Description],\n    [Quantity],\n   \
    \ SUM(Quantity) OVER (\n        PARTITION BY [OrderID]\n        ORDER BY [OrderLineID]\
    \ ROWS BETWEEN\n        UNBOUNDED PRECEDING AND\n        CURRENT ROW\n    ) AS\
    \ RunningTotal\nFROM\n    [Sales].[OrderLines];\nGO\n```\n\n现在，你可以使用这个更简单的代码执行相同的查询：\n\
    \n```sql\nSELECT\n    OrderID,\n    [OrderLineID],\n    [Description],\n    [Quantity],\n\
    \    [RunningTotal]\nFROM\n    [Sales].[OrderLinesRuninngTotal];\n```\n\n执行的查询将与不使用视图而直接执行查询代码时\
    \ `完全一样`。更准确地说，视图主体会被“展开”并与查询主体合并。例如，实际上，如果你编写类似这样的代码：\n\n```sql\nSELECT\n   \
    \ OrderID,\n    [OrderLineID],\n    [Description],\n    [Quantity],\n    [RunningTotal]\n\
    FROM\n    [Sales].[OrderLinesRuninngTotal]\nWHERE\n    [OrderID] IN (41, 42, 43);\n\
    GO\n```\n\n`GO` 不是 `T-SQL` 命令或关键字。`GO` 是由工具（如 `SQL Server Management Studio` 或\
    \ `Azure Data Studio`）识别的关键字，用于通知工具两组 `T-SQL` 语句（通常称为批处理）必须 `单独` 且 `独立` 地执行（但并非并行执行！）。某些命令（例如许多\
    \ `CREATE` 语句）需要这样做，以便你可以告诉所使用的工具一个视图主体何时结束，以及另一个可能与该视图无关的命令何时开始。\n\nAzure SQL\
    \ 的行为就像是可以 `推送` `WHERE` 子句到视图中并应用过滤器，以便仅对请求的订单计算累计总计。更准确地说，真正发生的情况是视图被 `展开` 并与使用它的查询合并。这使得\
    \ Azure SQL 可以作为一个整体来优化查询，从而避免，例如，仅仅遵循优先顺序——那将需要为 `所有` 订单计算累计总计，然后删除所有不在查询范围内的行。正如你所想，那样做效率极低。通过遵循此优化过程，视图可以利用外部查询中使用的所有过滤器（在合理的情况下），从而尽可能减少其必须操作的行数，提供更好的性能和更少的资源使用。\n\
    \n#### 安全性\n\n安全性是视图有用的另一个原因：你可以授予某人对视图的访问权限，同时拒绝该用户对视图所用表的访问。这意味着你可以确保用户只能看到查询的结果，而不能看到用于创建该结果的底层表中存储的值。\n\
    \n#### 抽象与兼容性\n\n利用视图的最后一个原因是，它们通过创建一个间接层来帮助抽象对表的访问，从而使你的应用程序和数据库保持松散耦合，为你提供灵活性，让你可以对数据库进行更改而不一定会破坏任何正常工作的应用程序：视图可以用作与现有应用程序向后兼容的接口。你可以自由地重构数据库并使其设计朝着你想要的新方向发展，并且无需担心会引入任何破坏性更改。\n\
    \n可以使用 `DROP VIEW` 命令删除视图：\n\n```sql\nDROP VIEW [Sales].[OrderLinesRuninngTotal];\n\
    ```"
- fmt: "## Functions\n\nFunctions in Azure SQL are of two types: functions that return\
    \ a table and functions that return a scalar value. Besides this difference, they\
    \ are very similar to what you probably already expect, given the fact that they\
    \ are, as the name implies, *functions*. They allow you to encapsulate and reuse\
    \ code and processing logic and can accept parameters and return a result.\n\n\
    As Azure SQL has many system-provided functions built in, for example, `STRING_SPLIT`,\
    \ the functions created by the user are generally called User-Defined Functions\
    \ or UDFs.\n\nUDFs that return a table are usually referenced to as Table-Valued\
    \ Functions or TVF for short; as such, they can be used anywhere a table could\
    \ be used too, for example:\n\n```sql\nSELECT\n    [OrderID],\n    [OrderDate],\n\
    \    [TotalQuantity],\n    [TotalValue]\nFROM\n    dbo.[GetOrderTotals](40, 42);\n\
    ```\n\nIf a TVF is made only of one `SELECT` statement, it becomes very similar\
    \ to a view with the exception that it supports parameters. As a view, such function\
    \ can be expanded and merged (this process is usually referred to as *inlining*)\
    \ with the query that is using it and thus can take advantage of better optimization.\
    \ For this ability to be *inlined*, those TVFs are called Inline Table-Valued\
    \ Functions:\n\n```sql\nCREATE OR ALTER FUNCTION dbo.GetOrderTotals(@FromOrderId\
    \ AS INT, @ToOrderID AS INT)\nRETURNS TABLE\nAS\nRETURN\n    WITH cte AS (\n \
    \       SELECT\n            [OrderId],\n            SUM([Quantity]) AS TotalQuantity,\n\
    \            SUM([Quantity] * [UnitPrice]) AS TotalValue\n        FROM\n     \
    \       [Sales].[OrderLines]\n        WHERE\n            [OrderId] BETWEEN @FromOrderId\
    \ AND @ToOrderID\n        GROUP BY\n            [OrderId]\n    )\n    SELECT\n\
    \        o.[OrderId],\n        o.[OrderDate],\n        ol.[TotalQuantity],\n \
    \       ol.[TotalValue]\n    FROM\n        cte ol\n        INNER JOIN\n      \
    \      [Sales].[Orders] o ON [ol].[OrderID] = [o].[OrderID];\nGO\n```\n\nA Table-Valued\
    \ Function that is made of more than one single `SELECT` statement is called Multi-Statement\
    \ Table-Valued Function, and while it provides more flexibility than an Inline\
    \ TVF, it cannot be optimized as much when called by other queries. For this reason,\
    \ it should be used only if there are no other options available as it may have\
    \ a tangible impact on performances.\n\nOn the other side of the spectrum, there\
    \ are the Scalar Functions. They return just a single value. The code used in\
    \ their body can be as complex as you want and even include several `SELECT` statements,\
    \ but at the end of its execution, one and only one scalar value must be returned.\n\
    \nWhile Scalar Functions could give the impression of something you would use\
    \ as much as possible, especially if you are used to imperative programming languages,\
    \ you should instead think twice when you want to create and use a new one. The\
    \ reason is simple and is related to the fact that applying one operation to a\
    \ set of data is usually much more efficient than executing that operation for\
    \ each data point (rows in case of a relational database) in your set. If you\
    \ create a Scalar function and use it to process the values returned by a query,\
    \ you are forcing Azure SQL to execute that function for each row returned. Each\
    \ call to a function has its own overhead, which adds up to the fact that Azure\
    \ SQL Query Optimizer is working with his hands tied as it doesn’t have much space\
    \ to optimize your code, as the function must be executed for every row. Performance\
    \ will suffer a lot. And it is not by chance, in fact, that every time a database\
    \ is forced to work processing single rows instead of a set of data, people refer\
    \ to it as RBAR (Row-By-Agonizing-Row). So, use Scalar UDFs sparingly. On the\
    \ bright side, in the last few years, Microsoft research found some clever methods\
    \ to take the code inside the Scalar Function and *rewrite* it as more optimizable\
    \ code, but still, if you can write the code in such a way RBAR is not needed\
    \ from the start, you will help the optimizer right away, without having to wait\
    \ for Microsoft Research, and in turn you’ll get better performance immediately.\n\
    \nFunctions can be dropped using the `DROP FUNCTION` command:\n\n```sql\nDROP\
    \ FUNCTION dbo.GetOrderTotals;\n```\n\n## Stored Procedures\n\nStored Procedures\
    \ are exactly what the name says: procedures stored in the database that can be\
    \ executed by calling them by name. Stored Procedures can have parameters, can\
    \ return a single scalar value, and can return zero one or more resultsets.\n\n\
    They offer an extremely powerful way to encapsulate complexity, reuse code, and\
    \ create an abstraction layer: they can be used to create an API interface – a\
    \ contract – that can shield the user from any changes or evolution that happens\
    \ during a database’s lifetime. In addition to that, Stored Procedures offer other\
    \ interesting benefits.\n\nLike many other programmability features used to easily\
    \ secure access to data, Stored Procedures can also be used for that purpose.\
    \ A user can be authorized to execute a Stored Procedure but could be denied to\
    \ access the underlying tables or views directly. This, especially if you are\
    \ creating public facing applications, like an API or web app, is vital as you\
    \ can be sure that, no matter what, a user accessing the database through that\
    \ solution will only be able to access data via the procedures you have created\
    \ for that purpose. Even if for some reason a user could gain direct access to\
    \ the database, bypassing your middle tier or your web app, he or she won’t be\
    \ able to do anything else apart from what the Stored Procedures would allow him\
    \ or her to do. That’s a pretty important point and a huge help in keeping your\
    \ data secure.\n\nStored Procedures also have another important benefit. Azure\
    \ SQL, once the Stored Procedure is invoked for the first time, will cache the\
    \ *execution plan*, also known, in other database systems, as a DAG (Directed\
    \ Acyclic Graph), which is a list of steps that Azure SQL will execute in order\
    \ to generate the result of your query. You will learn more about this later in\
    \ the book, but as you can imagine, especially for complex queries, generating\
    \ an execution plan can be expensive and resource-intensive, so caching it will\
    \ help Azure SQL to save CPU and time, giving you better overall performances\
    \ and freeing resources for higher scalability without incurring into additional\
    \ costs.\n\nAs a developer, Stored Procedures will be something you will love\
    \ to use as they really help you in creating a very clear separation of concerns,\
    \ keeping the code clean and polished, facilitate a clear definition of an interface\
    \ between database and application, and ultimately favor a good loosely coupled\
    \ architecture.\n\nA Stored Procedure can contain all the code you need to implement,\
    \ even the most complex data manipulation processes, and they are called using\
    \ the `EXEC` (or `EXECUTE` if you like to be verbose) command:\n\n```sql\nCREATE\
    \ OR ALTER PROCEDURE dbo.GetOrderForCustomer\n    @CustomerInfo NVARCHAR(MAX)\n\
    AS\nIF (ISJSON(@CustomerInfo) != 1) BEGIN\n    THROW 50000, '@CustomerInfo is\
    \ not a valid JSON document', 16\nEND\n    SELECT [Value] INTO #T FROM OPENJSON(@CustomerInfo,\
    \ '$.CustomerId') AS ci;\n    SELECT\n        [CustomerID],\n        COUNT(*)\
    \ AS OrderCount,\n        MIN([OrderDate]) AS FirstOrder,\n        MAX([OrderDate])\
    \ AS LastOrder\n    FROM\n        Sales.[Orders]\n    WHERE\n        [CustomerID]\
    \ IN (SELECT [Value] FROM #T)\n    GROUP BY\n        [CustomerID];\nGO\n```\n\n\
    In the preceding code, the Stored Procedure requires a string parameter. After\
    \ a simple validation, the JSON document received in input is read and, just to\
    \ simulate an intermediate step, the relevant content is saved into a temporary\
    \ table. After that, the results are retrieved and returned to the user. The created\
    \ Stored Procedure can be executed just by using the `EXEC` command:\n\n```sql\n\
    EXEC dbo.GetOrderForCustomer N'{\"CustomerId\": [106, 193, 832]}';\n```\n\nThe\
    \ code inside the Stored Procedure will be executed, and one resultset, the one\
    \ generated by the `SELECT ... FROM Sales.[Order]` query, will be returned."
  raw: '### Functions


    Functions in Azure SQL are of two types: functions that return a table and functions
    that return a scalar value. Besides this difference, they are very similar to
    what you probably already expect, given the fact that they are, as the name implies,
    *functions*. They allow you to encapsulate and reuse code and processing logic
    and can accept parameters and return a result.


    As Azure SQL has many system-provided functions built in, for example, `STRING_SPLIT`,
    the functions created by the user are generally called *User-Defined Functions*
    or *UDFs*.


    UDFs that return a table are usually referenced to as *Table-Valued Functions*
    or *TVF* for short*;* as such, they can be used anywhere a table could be used
    too, for example:


    ```

    SELECT

    [OrderID],

    [OrderDate],

    [TotalQuantity],

    [TotalValue]

    FROM

    dbo.[GetOrderTotals](40, 42);

    ```


    If a TVF is made only of one `SELECT` statement, it becomes very similar to a
    view with the exception that it supports parameters. As a view, such function
    can be expanded and merged (this process is usually referred to as *inlining*)
    with the query that is using it and thus can take advantage of better optimization.
    For this ability to be *inlined*, those TVFs are called *Inline Table-Valued Functions*
    :


    ```

    CREATE OR ALTER FUNCTION dbo.GetOrderTotals(@FromOrderId AS INT, @ToOrderID AS
    INT)

    RETURNS TABLE

    AS

    RETURN

    WITH cte AS (

    SELECT

    [OrderId],

    SUM([Quantity]) AS TotalQuantity,

    SUM([Quantity] * [UnitPrice]) AS TotalValue

    FROM

    [Sales].[OrderLines]

    WHERE

    [OrderId] BETWEEN @FromOrderId AND @ToOrderID

    GROUP BY

    [OrderId]

    )

    SELECT

    o.[OrderId],

    o.[OrderDate],

    ol.[TotalQuantity],

    ol.[TotalValue]

    FROM

    cte ol

    INNER JOIN

    [Sales].[Orders] o ON [ol].[OrderID] = [o].[OrderID];

    GO

    ```


    A Table-Valued Function that is made of more than one single `SELECT` statement
    is called *Multi-Statement Table-Valued Function* , and while it provides more
    flexibility than an Inline TVF, it cannot be optimized as much when called by
    other queries. For this reason, it should be used only if there are no other options
    available as it may have a tangible impact on performances.


    On the other side of the spectrum, there are the Scalar Functions. They return
    just a single value. The code used in their body can be as complex as you want
    and even include several `SELECT` statements, but at the end of its execution,
    one and only one scalar value must be returned.


    While Scalar Functions could give the impression of something you would use as
    much as possible, especially if you are used to imperative programming languages,
    you should instead think twice when you want to create and use a new one. The
    reason is simple and is related to the fact that applying one operation to a set
    of data is usually much more efficient than executing that operation for each
    data point (rows in case of a relational database) in your set. If you create
    a Scalar function and use it to process the values returned by a query, you are
    forcing Azure SQL to execute that function for each row returned. Each call to
    a function has its own overhead, which adds up to the fact that Azure SQL Query
    Optimizer is working with his hands tied as it doesn’t have much space to optimize
    your code, as the function must be executed for every row. Performance will suffer
    a lot. And it is not by chance, in fact, that every time a database is forced
    to work processing single rows instead of a set of data, people refer to it as
    *RBAR* (*Row-By-Agonizing-Row*). So, use Scalar UDFs sparingly. On the bright
    side, in the last few years, Microsoft research found some clever methods to take
    the code inside the Scalar Function and *rewrite* it as more optimizable code,
    but still, if you can write the code in such a way RBAR is not needed from the
    start, you will help the optimizer right away, without having to wait for Microsoft
    Research, and in turn you’ll get better performance immediately.


    Functions can be dropped using the `DROP FUNCTION` command:


    ```

    DROP FUNCTION dbo.GetOrderTotals;

    ```


    ### Stored Procedures


    Stored Procedures are exactly what the name says: procedures stored in the database
    that can be executed by calling them by name. Stored Procedures can have parameters,
    can return a single scalar value, and can return zero one or more resultsets.


    They offer an extremely powerful way to encapsulate complexity, reuse code, and
    create an abstraction layer: they can be used to create an API interface – a contract –
    that can shield the user from any changes or evolution that happens during a database’s
    lifetime. In addition to that, Stored Procedures offer other interesting benefits.


    Like many other programmability features used to easily secure access to data,
    Stored Procedures can also be used for that purpose. A user can be authorized
    to execute a Stored Procedure but could be denied to access the underlying tables
    or views directly. This, especially if you are creating public facing applications,
    like an API or web app, is vital as you can be sure that, no matter what, a user
    accessing the database through that solution will only be able to access data
    via the procedures you have created for that purpose. Even if for some reason
    a user could gain direct access to the database, bypassing your middle tier or
    your web app, he or she won’t be able to do anything else apart from what the
    Stored Procedures would allow him or her to do. That’s a pretty important point
    and a huge help in keeping your data secure.


    Stored Procedures also have another important benefit. Azure SQL, once the Stored
    Procedure is invoked for the first time, will cache the *execution plan*, also
    known, in other database systems, as a *DAG* (*Directed Acyclic Graph*), which
    is a list of steps that Azure SQL will execute in order to generate the result
    of your query. You will learn more about this later in the book, but as you can
    imagine, especially for complex queries, generating an execution plan can be expensive
    and resource-intensive, so caching it will help Azure SQL to save CPU and time,
    giving you better overall performances and freeing resources for higher scalability
    without incurring into additional costs.


    As a developer, Stored Procedures will be something you will love to use as they
    really help you in creating a very clear separation of concerns, keeping the code
    clean and polished, facilitate a clear definition of an interface between database
    and application, and ultimately favor a good loosely coupled architecture.


    A Stored Procedure can contain all the code you need to implement, even the most
    complex data manipulation processes, and they are called using the `EXEC` (or
    `EXECUTE` if you like to be verbose) command:


    ```

    CREATE OR ALTER PROCEDURE dbo.GetOrderForCustomer

    @CustomerInfo NVARCHAR(MAX)

    AS

    IF (ISJSON(@CustomerInfo) != 1) BEGIN

    THROW 50000, ''@CustomerInfo is not a valid JSON document'', 16

    END

    SELECT [Value] INTO #T FROM OPENJSON(@CustomerInfo, ''$.CustomerId'') AS ci;

    SELECT

    [CustomerID],

    COUNT(*) AS OrderCount,

    MIN([OrderDate]) AS FirstOrder,

    MAX([OrderDate]) AS LastOrder

    FROM

    Sales.[Orders]

    WHERE

    [CustomerID] IN (SELECT [Value] FROM #T)

    GROUP BY

    [CustomerID];

    GO

    ```


    In the preceding code, the Stored Procedure requires a string parameter. After
    a simple validation, the JSON document received in input is read and, just to
    simulate an intermediate step, the relevant content is saved into a temporary
    table. After that, the results are retrieved and returned to the user. The created
    Stored Procedure can be executed just by using the `EXEC` command:


    ```

    EXEC dbo.GetOrderForCustomer N''{"CustomerId": [106, 193, 832]}'';

    ```


    The code inside the Stored Procedure will be executed, and one resultset, the
    one generated by the `SELECT ... FROM Sales.[Order]` query, will be returned.'
  trans: "\n## 函数\n\nAzure SQL 中的函数分为两类：返回表的函数和返回标量值的函数。除了这个区别，它们与您可能预期的非常相似，因为正如其名所示，它们就是*函数*。它们允许您封装和重用代码及处理逻辑，可以接受参数并返回结果。\n\
    \n由于 Azure SQL 内置了许多系统函数，例如 `STRING_SPLIT`，用户创建的函数通常被称为用户定义函数或简称 UDF。\n\n返回表的函数通常被称为表值函数或简称\
    \ TVF；因此，它们可以在任何可以使用表的地方使用，例如：\n\n```sql\nSELECT\n    [OrderID],\n    [OrderDate],\n\
    \    [TotalQuantity],\n    [TotalValue]\nFROM\n    dbo.GetOrderTotals;\n```\n\n\
    如果一个 TVF 仅由一个 `SELECT` 语句组成，它就变得与视图非常相似，只是它支持参数。像视图一样，这样的函数可以被展开并与使用它的查询合并（这个过程通常被称为*内联*），从而可以利用更好的优化。为了具备这种*内联*能力，这些\
    \ TVF 被称为内联表值函数：\n\n```sql\nCREATE OR ALTER FUNCTION dbo.GetOrderTotals(@FromOrderId\
    \ AS INT, @ToOrderID AS INT)\nRETURNS TABLE\nAS\nRETURN\n    WITH cte AS (\n \
    \       SELECT\n            [OrderId],\n            SUM([Quantity]) AS TotalQuantity,\n\
    \            SUM([Quantity] * [UnitPrice]) AS TotalValue\n        FROM\n     \
    \       [Sales].[OrderLines]\n        WHERE\n            [OrderId] BETWEEN @FromOrderId\
    \ AND @ToOrderID\n        GROUP BY\n            [OrderId]\n    )\n    SELECT\n\
    \        o.[OrderId],\n        o.[OrderDate],\n        ol.[TotalQuantity],\n \
    \       ol.[TotalValue]\n    FROM\n        cte ol\n        INNER JOIN\n      \
    \      [Sales].[Orders] o ON [ol].[OrderID] = [o].[OrderID];\nGO\n```\n\n由多个 `SELECT`\
    \ 语句组成的表值函数称为多语句表值函数，虽然它比内联 TVF 提供更大的灵活性，但当被其他查询调用时，它的优化程度较低。因此，仅应在没有其他选项可用时才使用它，因为它可能对性能产生显著影响。\n\
    \n另一方面，是标量函数。它们只返回单个值。其主体中使用的代码可以任意复杂，甚至可以包含多个 `SELECT` 语句，但在执行结束时，必须且只能返回一个标量值。\n\
    \n虽然标量函数可能会给人一种你会尽可能多地使用的感觉，特别是如果你习惯于命令式编程语言，但在你想要创建和使用新的标量函数时，你应该三思。原因很简单，并且与这样一个事实有关：对一组数据应用一个操作通常比为集合中的每个数据点（在关系数据库中是行）执行该操作要高效得多。如果你创建一个标量函数并用它来处理查询返回的值，你就是在强制\
    \ Azure SQL 为返回的每一行执行该函数。每次函数调用都有其自身的开销，再加上 Azure SQL 查询优化器在优化你的代码时空间有限，因为它必须为每一行执行函数。性能会大受影响。事实上，每当数据库被迫逐行处理数据而不是处理数据集时，人们称之为\
    \ RBAR（Row-By-Agonizing-Row，逐行痛苦处理），这并非偶然。所以，要谨慎使用标量 UDF。好的一面是，近年来，微软研究发现了一些巧妙的方法，可以将标量函数内部的代码*重写*为更可优化的代码，但即便如此，如果你能从一开始就写出不需要\
    \ RBAR 的代码，你就能立即帮助优化器，而无需等待微软的研究，从而立即获得更好的性能。\n\n可以使用 `DROP FUNCTION` 命令删除函数：\n\
    \n```sql\nDROP FUNCTION dbo.GetOrderTotals;\n```\n\n## 存储过程\n\n存储过程正如其名：存储在数据库中的过程，可以通过按名称调用来执行。存储过程可以有参数，可以返回单个标量值，并且可以返回零个、一个或多个结果集。\n\
    \n它们提供了一种极其强大的方式来封装复杂性、重用代码和创建抽象层：它们可用于创建 API 接口——一种契约——可以保护用户免受数据库生命周期中发生的任何更改或演变的影响。除此之外，存储过程还提供了其他有趣的好处。\n\
    \n像许多其他用于轻松保护数据访问的可编程性特性一样，存储过程也可用于此目的。用户可以被授权执行存储过程，但可能被拒绝直接访问底层表或视图。这一点，特别是如果你正在创建面向公众的应用程序（如\
    \ API 或 Web 应用），至关重要，因为你可以确保，无论如何，通过该解决方案访问数据库的用户只能通过你为此目的创建的存储过程来访问数据。即使由于某种原因，用户能够绕过你的中间层或\
    \ Web 应用直接访问数据库，他或她也无法做存储过程允许之外的任何事情。这是一个相当重要的观点，对于保持数据安全有巨大帮助。\n\n存储过程还有另一个重要好处。Azure\
    \ SQL 在首次调用存储过程后，将缓存*执行计划*（在其他数据库系统中也称为 DAG，即有向无环图），这是 Azure SQL 为生成查询结果而将执行的一系列步骤。你将在本书后面了解更多相关内容，但正如你可以想象的，特别是对于复杂查询，生成执行计划可能非常昂贵且消耗资源，因此缓存它将帮助\
    \ Azure SQL 节省 CPU 和时间，为你提供更好的整体性能，并为更高的可伸缩性释放资源，而不会产生额外成本。\n\n作为开发人员，存储过程将是你会乐于使用的东西，因为它们确实有助于创建非常清晰的关注点分离，保持代码整洁和完善，促进数据库和应用程序之间接口的清晰定义，并最终有利于良好的松散耦合架构。\n\
    \n一个存储过程可以包含你实现最复杂的数据处理过程所需的所有代码，它们使用 `EXEC`（或者如果你喜欢详细点，可以用 `EXECUTE`）命令调用：\n\n\
    ```sql\nCREATE OR ALTER PROCEDURE dbo.GetOrderForCustomer\n    @CustomerInfo NVARCHAR(MAX)\n\
    AS\nIF (ISJSON(@CustomerInfo) != 1) BEGIN\n    THROW 50000, '@CustomerInfo is\
    \ not a valid JSON document', 16\nEND\n    SELECT [Value] INTO #T FROM OPENJSON(@CustomerInfo,\
    \ '$.CustomerId') AS ci;\n    SELECT\n        [CustomerID],\n        COUNT(*)\
    \ AS OrderCount,\n        MIN([OrderDate]) AS FirstOrder,\n        MAX([OrderDate])\
    \ AS LastOrder\n    FROM\n        Sales.[Orders]\n    WHERE\n        [CustomerID]\
    \ IN (SELECT [Value] FROM #T)\n    GROUP BY\n        [CustomerID];\nGO\n```\n\n\
    在前面的代码中，存储过程需要一个字符串参数。经过简单的验证后，读取输入的 JSON 文档，并且只是为了模拟一个中间步骤，相关内容被保存到一个临时表中。之后，检索结果并返回给用户。创建的存储过程只需使用\
    \ `EXEC` 命令即可执行：\n\n```sql\nEXEC dbo.GetOrderForCustomer N'{\"CustomerId\": [106,\
    \ 193, 832]}';\n```\n\n存储过程内部的代码将被执行，并且将返回一个结果集，即由 `SELECT ... FROM Sales.[Order]`\
    \ 查询生成的那个。\n"
- fmt: 'You may be wondering, at this point, when you should use Functions and when
    Stored Procedures. Good question! As a general guidance, keep in mind that while
    functions are quite powerful, especially the Inline Table-Valued Functions, they
    also have quite a lot of limitations and constraints. For this reason, unless
    you have some specific use case that is perfectly suited for a Function, the recommendation
    is to use Stored Procedures: they offer better performances and don’t have all
    the limitations that Functions have.


    ## Stored Procedures


    A Stored Procedure can be dropped using the `DROP PROCEDURE` command:


    ```

    DROP PROCEDURE dbo.GetOrderForCustomer;

    ```


    ### Triggers


    Triggers are special Stored Procedures that get executed when something happens.
    There are two types of Triggers: *DML* (*Data Manipulation Language*) Triggers
    and *DDL* (*Data Definition Language*) Triggers. The first type, DML Triggers,
    gets executed when an `INSERT`, `UPDATE`, or `DELETE` (or `MERGE`) command is
    executed. The latter, DDL Triggers, is instead executed when `CREATE`, `ALTER`,
    or `DROP` commands, which are used to define data structures, are invoked.


    In both cases, you will have access to special objects that will allow you to
    interact with the event that sparked the Trigger execution.


    For DML Triggers, you have access to the `Inserted` and `Deleted` virtual tables
    so that you can access the data as it was before and after the change. You can
    decide to do whatever you want with that data. For example, you can store the
    deleted data into another table to provide an easily accessible log of changed
    rows. You can also instruct the Trigger to prevent that change to happen at all:
    for example, you may want to be sure that some configuration data is not removed
    from a core table that your application needs to work properly.


    In DDL Triggers, you have access to an `EVENTDATA()` function that returns an
    XML containing all the details about the statement being executed. For example,
    in this case, you can save that information to keep track of when, how, and who
    altered a table or dropped an object. Also in this case, you can also prevent
    that modification from happening.


    Triggers are part of the transaction being executed, which means that you can
    decide if that transaction should be allowed to successfully complete or not.
    A situation where this could happen, for example, is when only a set of selected
    users are authorized to make changes to the discount rates applied to your products
    for selected customers. In a Trigger, you may check that the user making the change
    has the authorization to do it, maybe even logging that operation in another table
    to keep track of that. If the user doesn’t have that authorization, you can roll
    back the transaction right within the Trigger, meaning the change won’t happen
    at all:


    ```

    CREATE OR ALTER TRIGGER [Warehouse].[ProtectAzure]

    ON [Warehouse].[Colors]

    FOR UPDATE, DELETE

    AS

    BEGIN

    IF EXISTS(

    SELECT * FROM [Deleted]

    WHERE [ColorName] IN (''Azure'')

    )

    BEGIN

    THROW 50000, ''Azure is here to stay.'', 16;

    ROLLBACK TRAN;

    END

    END

    ```


    If you try to `DELETE` or `UPDATE` a value in the `Warehouse.Colors` table so
    that the color “Azure” will be removed or changed to something else, the Trigger
    will roll back that action, leaving the “Azure” color intact:


    ```

    DELETE FROM [Warehouse].[Colors] WHERE ColorID = 1

    ```


    This capability is very powerful but also quite expensive: since Triggers are
    part of an active transaction, they can roll it back, but from a resource usage
    perspective, it would be better to prevent it in the first place. Preventing it
    would have avoided using IO, CPU, and memory resources just to discover, right
    at the end of the process, that all the work done must be undone – such a waste
    of precious resources.


    Besides the impact on resource usage, Triggers can also have a big impact on performances.
    Their performance will be as good as the code you write and as fast as the logic
    you built into the Trigger could be. If in the Trigger you’re trying to aggregate
    data of a billion rows table, chances are that performance won’t be exactly stellar.
    And this will happen *every time* the Trigger is executed.


    That’s why, more and more frequently, Triggers are replaced with natively supported
    features. For example, as you’ll learn in the next sections, keeping track of
    all changes done to a table can be done more efficiently and easily using a feature
    called Temporal Tables, or that securing access to specific rows and values can
    be done with Row-Level Security.


    So, in general, try to keep Triggers’ usage as low as possible. You should do
    all the checks upfront before making any changes to your data, so that you don’t
    have to undo anything. It will favor performance, concurrency, maintainability,
    and scalability.


    Triggers can be dropped using the `DROP TRIGGER` command:


    ```

    DROP TRIGGER [Warehouse].[ProtectAzure]

    ON [Warehouse].[Colors];

    ```


    ### Non-scalar parameters


    As you just learned in the previous sections, Stored Procedure and Functions,
    as expected, support parameters. In all modern programming languages, parameters
    can be anything, from scalars to complex objects. In Azure SQL, this is true too,
    albeit with some differences, since there is no concept like an *object*, given
    that SQL is not an object-oriented language. In the next sections, you’ll find
    the options available to achieve what passing an object would do in other languages.'
