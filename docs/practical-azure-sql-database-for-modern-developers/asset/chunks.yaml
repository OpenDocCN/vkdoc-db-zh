    # 5. Developing with Azure SQL – Advanced


    After having discussed the foundational aspects of querying and manipulating data,
    it’s now time to focus on more advanced and development-oriented features that
    you can use in Azure SQL. If you already took a peek at the chapter content, you
    may be surprised to find a full section on security. Don’t be. Security is not
    something that can be added later, like an afterthought, that is a nice to have
    but not so core. On the contrary, security *is* important as much as performances
    and maintainability and must be taken into consideration from the ground up. Therefore,
    the options Azure SQL offers you to keep your data secure are a must-known for
    everyone who wants to create a modern application – modern because it is not only
    scalable and modular, but because it is also secure.


    ## Programmability


    As a developer, you already know how important it is to be able to reuse and encapsulate
    existing code. Azure SQL provides a wide range of options that you can use to
    make sure your SQL code is clean, legible, easy to maintain, and reusable.'
