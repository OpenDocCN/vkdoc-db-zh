    *   Expert Performance Indexing in SQL Server – [www.amazon.com/Expert-Performance-Indexing-SQL-Server/dp/1484211197](http://www.amazon.com/Expert-Performance-Indexing-SQL-Server/dp/1484211197)

    *   Design Patterns: Elements of Reusable Object-Oriented Software – [www.amazon.com/Design-Patterns-Elements-Reusable-Object-Oriented/dp/0201633612](http://www.amazon.com/Design-Patterns-Elements-Reusable-Object-Oriented/dp/0201633612)

    *   Domain-Driven Design: Tackling Complexity in the Heart of Software – [www.amazon.com/Domain-Driven-Design-Tackling-Complexity-Software-ebook/dp/B00794TAUG](http://www.amazon.com/Domain-Driven-Design-Tackling-Complexity-Software-ebook/dp/B00794TAUG)

    *   Databases: Explaining Data Normalization, Data Anomalies and DBMS Keys – [https://towardsdatascience.com/softly-explained-data-normalization-data-anomalies-and-dbms-keys-f8122aefaeb3](https://towardsdatascience.com/softly-explained-data-normalization-data-anomalies-and-dbms-keys-f8122aefaeb3)

    *   Heaps & Indexes – [https://docs.microsoft.com/sql/relational-databases/indexes/heaps-tables-without-clustered-indexes](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/heaps-tables-without-clustered-indexes%253Fview%253Dsql-server-ver15)

    *   Tiger Toolbox – [https://github.com/microsoft/tigertoolbox](https://github.com/microsoft/tigertoolbox)

    *   First Responder Kit – [https://github.com/BrentOzarULTD/SQL-Server-First-Responder-Kit](https://github.com/BrentOzarULTD/SQL-Server-First-Responder-Kit)

    *   sp_WhoIsActive – [https://github.com/amachanic/sp_whoisactive](https://github.com/amachanic/sp_whoisactive)


    # 7. Scalability, Consistency, and Performance


    Scalability, as generally defined, is the property of a system to handle a growing
    amount of work by adding resources to the system. In cloud platforms, where massive
    standardization and “economy of scale” principles are driving hardware design,
    the ability to just add resources to a single instance of a service may be limited.
    That is why, in addition to adopting scale-out architectures, an equally important
    aspect of scalability will be to design and tune your workload so that it can
    maximize resource utilization. If you are designing a brand-new application or
    have the chance to modify an existing one before migrating, this will also tangibly
    reduce your cloud bills.


    While scalability is certainly a key attribute, consistency is another critical
    aspect that we should expect from a RDBMS solution. Transactional systems are
    making sure that data will remain in a consistent state after applications and
    users’ interactions, and the underlying engine is responsible to govern how multiple
    concurrent activities from different users will access data to maintain this consistency,
    based on configurable attributes like the level of isolation between these transactional
    activities.


    Consistency is really a key factor in application development, even if it is quite
    often overlooked: many developers still think that consistency is optional. In
    some edge cases, it may be true; in most cases, it is not. In fact, it is not
    by chance that lately RDBMS has become again at the center of the stage. In the
    famous paper “F1: A Distributed SQL Database That Scales,” Google clearly stated
    that “Designing applications to cope with concurrency anomalies in their data
    is very error-prone, time consuming, and ultimately not worth the performance
    gains.” And if consistency is not taken care of right into the database, guess
    who will be asked to write code to deal with it? Right, you, the developer. That’s
    because your users will, instead, take consistency for granted. So, someone or
    something must have to deal with it – at scale, of course. And database-level
    consistency at scale is the reason why a whole new generation of post-relational
    databases like Google Spanner, Amazon Aurora, and Azure SQL Hyperscale came to
    light.'
