  trans: '

    ### 始终加密


    `始终加密`是一项功能，它能保证您高度敏感的数据（如信用卡号或社会保障号）使用一组密钥进行加密，而这组密钥不与数据库引擎共享。这意味着即使是数据库管理员也无法解密这些数据，因为数据将由应用程序直接加密，并以加密形式发送到数据库。


    ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figd_HTML.jpg](img/493913_1_En_5_Figd_HTML.jpg)


    `图 5-2. CreditLimit 已被始终加密`


    用于加密的密钥可以存储在本地计算机或`Azure 密钥保管库`中，只有有权访问这些密钥的应用程序才能访问加密数据。尝试在没有正确密钥的情况下访问`始终加密`数据将导致错误：


    ```

    Msg 0, Level 11, State 0, Line 0

    Failed to decrypt column ''CreditLimit''.

    ```


    为了对值进行加密和解密，客户端应用程序必须使用支持`始终加密`的连接库，例如


    *   `Microsoft JDBC Driver 6.0`（或更高版本）

    *   `ODBC Driver 13.1 for SQL Server`

    *   `ODBC Driver 17 for SQL Server`

    *   `Microsoft Drivers 5.2 for PHP for SQL Server`

    *   `Microsoft.Data.SqlClient`


    这些库会处理好一切，加密和解密对开发人员来说将是完全透明的。


    ## 如果您想了解更多


    现在，您已经全面了解了`Azure SQL`提供的所有受支持的可编程性特性，以及安全概念和选项的坚实基础。这些功能供您使用，以确保您的应用程序不仅可扩展、快速，而且安全。


    要了解本章提及主题的更多信息，您可以从这些资源开始：


    *   `SQL Server 2017 Developer''s Guide` – [`www.amazon.com/SQL-Server-2017-Developers-Guide-dp-1788476190/dp/1788476190`](http://www.amazon.com/SQL-Server-2017-Developers-Guide-dp-1788476190/dp/1788476190)

    *   `SQL Server 中临时表和表变量有什么区别？` – [`https://dba.stackexchange.com/questions/16385/whats-the-difference-between-a-temp-table-and-table-variable-in-sql-server/16386#16386`](https://dba.stackexchange.com/questions/16385/whats-the-difference-between-a-temp-table-and-table-variable-in-sql-server/16386%252316386)

    *   `使用变更跟踪` – [`https://docs.microsoft.com/sql/relational-databases/track-changes/work-with-change-tracking-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/work-with-change-tracking-sql-server%253Fview%253Dsql-server-ver15)

    *   `Debezium：从数据库流式传输变更` – [`https://debezium.io/`](https://debezium.io/)

    *   `SQL Server 变更流` – [`https://medium.com/@mauridb/sql-server-change-stream-b204c0892641`](https://medium.com/%2540mauridb/sql-server-change-stream-b204c0892641)

    *   `透明数据加密` – [`https://docs.microsoft.com/azure/sql-database/transparent-data-encryption-azure-sql?tabs=azure-portal`](https://docs.microsoft.com/en-us/azure/sql-database/transparent-data-encryption-azure-sql%253Ftabs%253Dazure-portal)

    *   `始终加密` – [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-database-engine)

    *   `始终加密客户端开发` – [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-client-development?view=azuresqldb-current`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-client-development%253Fview%253Dazuresqldb-current)


    ## 6. 表和索引的实际应用


    当人们想象一个表时，大多数情况下，它看起来像一个 Excel 电子表格。有许多按行和列组织的单元格，通常有一列包含行的标识符。


    `Azure SQL` 使您能够使用的远不止一个简单的表。您可以针对某些特定的查询模式、复杂的分析或高度并发的更新来配置和优化表。您还可以配置表以保留变更的完整历史记录、实现部分域数据完整性逻辑，并应用细粒度的安全规则。在本章中，您会发现一些实用建议，可以帮助您利用`Azure
    SQL`提供的功能来创建最适合您需求的表。

    '
- fmt: '## Designing good tables: Best Practices


    As a first step, we need to understand some best practices for table design. Table
    design is tightly coupled with Domain-Driven Design (DDD) theory described in
    Eric Evans book. In DDD, we are defining Domain Model entities (objects or classes)
    that are divided into `Bounded Contexts`. A `Bounded Context` is a logical boundary
    where particular terms, definitions, and rules apply in a consistent way. There
    are also associations between Domain Model entities, as shown in Figure [6-1](#493913_1_En_6_Chapter.xhtml#Fig1).


    ![../images/493913_1_En_6_Chapter/493913_1_En_6_Fig1_HTML.jpg](images/493913_1_En_6_Chapter/493913_1_En_6_Fig1_HTML.jpg)


    Figure 6-1: Domain model of application


    ## Mapping Domain Models to Database Tables


    Definition of entities in the Domain Model is known as a domain or logical design.
    Eventually, we need to decide how we should store Domain Model objects in the
    database. If you decide to store Domain Model entities in Azure SQL, there is
    a straightforward way to define your underlying tables. Every `Bounded Context`
    (`Sales` or `Support` in Figure [6-1](#493913_1_En_6_Chapter.xhtml#Fig1)) can
    be represented as a schema. In certain cases, the `Bounded Contexts` can be even
    represented by individual databases. Every Domain Model entity should be mapped
    to one or many tables in the associated schemas. Some high-level guidelines that
    you can use to map your Domain Model entities to database tables are:


    - Every Domain Model entity should be mapped to one table with a column that uniquely
    identifies the domain object (so-called `Primary Key`).

    - Every simple property of a domain object should be represented as a column in
    the table with a matching SQL type.

    - Every collection, array, or list in the domain object should be represented
    as a separate table. This table should have a column (known as `Foreign Key`)
    that matches the primary key of the row that contains this collection.

    - If there is a relationship from one domain object to another, the underlying
    table should have a column that contains a primary key of related objects. In
    some complex cases, there should be a separate mapping table with pairs of primary
    keys of related tables.


    ## The Value and Complexity of Data Normalization


    Looks complex? It might seem at the beginning. The process of rearranging complex
    domain objects into a set of tables with the minimum amount of redundancy is definitely
    a challenge. We already discussed a bit about this process, called `normalization`,
    as you may recall from Chapter [4](#493913_1_En_4_Chapter.xhtml).


    `Normalization` enables us to avoid accidental mistakes and prevent data inconsistency.
    As an example, people use words like “inquiry” and “enquiry” interchangeably (some
    might consider “enquiry” to be a spelling mistake of “inquiry”). There are also
    lots of words in American and British English that are spelled with a slight difference
    (e.g., colour and color, center and centre). Let’s imagine that you have an entity
    stored as a single row (or document in NoSQL document databases) that has `type`
    property with value “inquiry” and an array of `tags` where one tag is “.NET”.
    Someone might insert another similar entity with type “enquiry” and “dotnet” as
    one of the tags. A functionality that searches entities by types and tags will
    return different results based on search criterion because clients will enter
    “inquiry” and “enquiry” or “.NET” and “dotnet” and you probably cannot implement
    sophisticated rules that understand these synonyms. In these cases, it might be
    a better idea to store values of types and tags in a separate table, assign them
    identifiers, and use these identifiers in entities. This way, someone might choose
    a standardized term that will be used, maybe a list of synonyms for that term,
    and searches will always return consistent results.


    ## The Core Advantage of the Normalization Process


    How can you do this correctly if you have never done it before? Luckily, creating
    a good model is an iterative application of the `normalization` rules, so we’re
    not alone here. As `normalization` is all about avoiding potential data inconsistencies
    and redundancy, it is worth understanding why we absolutely try to avoid those
    at all costs.


    Redundancy is not necessarily bad per se, but it surely brings challenges. Let’s
    say, for example, that an Order Header shows that the order value is 100$, but
    then if you sum up all the items in the Order Details table for that specific
    order, you find a total value of 120$. Which one is correct? You don’t know. Even
    worse, you *cannot* know the answer just by looking at the data you have, as data
    is inconsistent. Data is there, but information is lost. And this is just one
    example. There are several well-known `data anomalies` (for details, see `https://aka.ms/sednda`)
    that can be prevented by a correct `normalization`.


    The `normalization` process will help you decompose objects into smaller pieces
    without losing any information. It is a “non-loss decomposition” process: it gives
    you the ability to always rebuild the original information when you need it. At
    the same time, it helps to avoid the perils of redundancy and thus inconsistency,
    favoring reuse of the smaller piece of information created as a result of its
    application.


    ## Normalization: A Starting Point and Further Reading


    We just have scratched the surface of this topic, and detailing the whole `normalization`
    process is beyond the scope of this book. You can start with the correct foot
    by keeping in mind that a good model is one where tables have scalar columns that
    depend *only* on the primary key and where foreign keys are used to reference
    and enforce relationships with other tables, so that information is never lost.


    `Normalization` is an amazingly interesting topic, as is one of the few formal
    processes that can be applied to informatics: you can find more details about
    database design in the books referenced and at the end of this chapter.


    ## Considering Additional Aspects of Table Design


    So far, we focused on the logical aspect of database design: `normalization` and
    mapping of domain classes to a table are not the end of the process. To optimally
    design a table, you need to think about the following:


    - What is the best way to define types and other properties for the columns in
    your table?

    - How to optimize operations on your tables using indexes?

    - What rules and constraints you want to define in your table to ensure that your
    data is valid?

    - How to make your tables secure?


    In the following sections, you will be presented some of the guidelines that can
    help you to answer these questions.'
  raw: '## Designing good tables


