    ## 成长型思维


    2006 年，心理学家卡罗尔·德韦克出版了名为《*思维模式：成功的新心理学*》的书，在书中她介绍了*成长型思维*的概念。她描述道，那些明白才能和能力可以通过持续的努力、学习和坚持来发展、获得和提升的人，即使经历失败和挫折，也比那些拥有*固定型思维*的人更可能取得成功。拥有固定型思维的人致力于维护已达到的现状，试图不表现出任何弱点，并且总是炫耀自己似乎没有遇到任何挑战或失败，因为他们认为自己懂得很多，如果不是全部的话。


    在当今这个瞬息万变的世界里，固定型思维行不通。


    相反，成长型思维的理念与敏捷方法论以及更普遍的观点——即成功的关键在于*拥抱变化*的能力——完美契合。保持学习并能适应新情况的能力，是拥抱变化的能力的基础。当然，这并非一蹴而就，失败以及从失败中汲取的教训，与成功一样，都是这一过程的一部分。


    这种方法还带来了另一个重要的行为：能够持续检查我们迄今所学，甚至我们的信念，是否仍然正确和适用。


    正如你现在可以想象的，以上所描述的一切，乍看之下似乎与这样一本技术书籍完全不搭，但实际上它与开发者的日常生活有着更深刻、更紧密的联系，因为在云环境中，变化持续不断地发生。应对如此高变化率的能力，成为优秀开发者的首要特质之一。


    事实上，并非偶然，在微软内部，“成长型思维”的理念是普遍存在的：这是发展、成长和保持竞争力所必需的。


    直到其中一位作者加入微软，了解了成长型思维，他才意识到，虽然有些开发者始终拥有这种思维，但另一些则没有。而这对于一切与数据和数据库相关的事情尤其如此。开发者通常不那么喜欢数据库，如果必须处理的话，他们往往只是试图以最简单、最快捷的方式搞定。


    但在信息时代，应该很清楚，数据，进而信息，再而知识，是我们所构建和赖以生存的一切的重心。高效操纵数据的能力将立即使一个开发者变成一个*更好的开发者*。


    成长型思维是开始审视这一挑战的一种方式。但这如何应用于开发？任何人都能成为*更好的开发者*吗？为什么这很重要，最重要的是，这与 Azure SQL 有什么关系？


    让我们尝试给出一些答案。


    ### 重新审视旧观念


    “关系模型过时了，无法扩展。” “你需要使用一些新范式才能扩展到云级别。” 甚至，“你无法在关系数据库中处理超过几百万行的数据。” 无论你是在云时代出生的新一代开发者，还是自己组装过第一台电脑、至今仍知道什么是*半字节*的老手，你听到上述言论的可能性都很高。


    既然有人说过这些，甚至写书撰文论述，那它们必定是真的。嗯，它们在某个时间点，比如大约 40 年前，可能是真的。但从那时到现在已经过去了很多年，所以是时候检验这些观念和迷思是否依然正确了。


    答案是：不。Azure SQL 由 SQL Server 发展而来，多年来经过了如此多的改进和升级，如果你没有真正专注于数据领域，你可能已经错过了它们。从开发者的角度看，你仍然在处理表和列——老实说，这已经不完全正确了，你将在接下来的章节中了解到——但在幕后，数据库引擎已经进行了大量更新，正如著名的
    SQL Server 专家 Bob Ward 所说，“SQL Server 2019 不是你爷爷辈的 SQL Server” ([`https://aka.ms/ssnygss`](https://aka.ms/ssnygss))。


    仅举几个现在在 SQL Server（因此也在 Azure SQL）中可用的惊人功能为例：你可以找到列存储表，数据以高度压缩的列式结构存储，能够使用 AVX
    和 SIMD 指令（是的，就是电子游戏用的那些指令）实现快速的向量计算；无锁结构也是可用的，它们不使用锁来保持数据一致性，而是采用更先进的技术，如多版本并发控制（MVCC），根据观察者与之交互的方式，相同的数据可以同时以不同的版本存在；表可以自动跟踪其保存数据发生的所有更改，甚至允许进行“时间点”查询，字面意思就是让查询可以回到过去；JSON
    文档和图模型可用，并与查询优化器深度集成，后者是人类工程学的一个奇迹，能够为你优化任何查询的执行，考虑到表中有多少数据、有哪些可用资源，以及为达到最佳性能目标有哪些可能的替代方案。


    所有这些功能——以及更多——还具备规模化运行的能力。云规模。事实上，一些最常用的网站、在线和移动游戏及应用，每天都在使用 Azure SQL，扩展到为全球数百万用户提供服务。


    Azure SQL 提供了许多功能，你应该去了解一下，以确保你不是每次都在重新发明轮子。


    但这只是故事的一半。

    '
- fmt: '### Continuous learning


    In another great blog post, this time by Grant Fritchey (Figure [1-1](#493913_1_En_1_Chapter.xhtml#Fig1)),
    that you can find here: "Why don’t people use columnstore indexes" ([`https://aka.ms/wdpuci`](https://aka.ms/wdpuci)),
    the issue – among others – is described extremely well. We were used to learning
    something once and using what we had learned for many years to come. It was already
    true long ago that in information technology you were expected to continuously
    learn and stay updated, but the pace at which innovation was happening was much
    slower that the pace you see today.


    ![../images/493913_1_En_1_Chapter/493913_1_En_1_Fig1_HTML.jpg](images/493913_1_En_1_Chapter/493913_1_En_1_Fig1_HTML.jpg)


    Figure 1-1: Words of wisdom


    The need to learn new concepts, technologies, and ideas was something you could
    easily do every couple of years and sometimes even more. Today the speed at which
    technology is moving is completely different. In the cloud, new updates are released
    every month. Azure SQL is constantly updated not only to correct bugs or improve
    existing features, but entire new features are released so that developers from
    all around the world can take advantage of them, to create simpler, yet more scalable
    and powerful solutions.


    It’s clear that the key to becoming a successful developer today is not only the
    ability to master one language or another. One of the key factors is the ability
    to learn and keep learning, so that your solution can take advantage of the latest
    and greatest innovations, leveraging the work done by other hundreds or even thousands
    of people, allowing you to create solutions that would be impossible otherwise.


    You can’t just learn a thing once and hope that’s enough. It is clearly not enough.
    Not anymore. Challenge yourself, keep learning, keep an eye on what’s new, and
    do this as part of your job routine. It’s just like creating unit or integration
    tests for the code you wrote. Years ago, almost no one was doing it. Now it is
    natural as breathing, and you won’t move forward in your project without some
    tests in place to give you the guarantee that you’re not introducing bugs or breaking
    existing code. Continuous learning is the same: no one should ignore the power
    of what the cloud offers just because you’re too busy writing code. You may be
    wasting hours and days on something that is already there.


    ### A better developer


    Developers that know how to properly take advantage of data and databases are,
    without any doubt, better developers – better not only because they can use the
    right tool to process data, but also because, on the cloud, every inefficiency
    means higher costs. For example, a very chatty application that continuously moves
    data from the database to a processing service to crunch and elaborate data may
    need to execute thousands of queries per second. That will require a close placement
    of the processing service to the database to reduce the network latency at minimum,
    as some network delay will incur for *every* query, as data needs to be moved
    in and out of the database; in addition to that, code will be more complex and
    will require more CPU resources; at the same time, the database will be used as
    a dumb storage wasting CPU cycles only to deal with the huge amount of queries
    sent by just one user, with the result that scalability will be more costly as
    compute power will be needed more and more as new users will use the service.
    This chain of issues can be avoided by making a better use of batching techniques
    via `Table-Valued Parameters` or `Bulk Load`. Better developers will know when
    it makes sense to write code and when they should leverage the database to operate
    with efficiency on data. It’s just one simple choice but can have an impact with
    many zeros in a lot of places: from the cloud bill your company will need to pay
    at the of the month, to the amount of time needed to maintain and evolve the system,
    through the ability to isolate different parts of the solution to work on them
    in parallel.


    Be a better developer by knowing your tools, being pragmatic, and keeping in mind
    that "You are not Google" ([`https://aka.ms/yang`](https://aka.ms/yang)); don’t
    just embrace new and exotic technologies just because the big companies do so.
    Use the one that better serves your overall needs, considering costs, performances,
    features, supportability and availability.


    ## Not just a passive container of data


    A relational database is much more than a container of data. It doesn’t just offer
    a way to persist data, as some architects and developers – with very extreme views
    – may instead think. If you need just a persistence layer, even a text file may
    be fine, especially today where you can put a text file in an Azure Blob Storage
    and be pretty much sure it will be high available, secure and globally distributed.
    But is that enough?


    The challenge starts when more than one entity, be it human or a software, needs
    to access that data. Who is going to make sure that all those who need to access
    don’t step on each other''s feet? And what about making sure that access to parts
    of stored data is secured so that different entities may only access the data
    that they are allowed to see? Who is in charge of guaranteeing that such data
    is handled in the correct way, so that if an application crashes while modifying
    that data, the modifications done are not left halfway finished?


    For sure you can put all this logic somewhere in your solution, if that will be
    the only one accessing the database. While this sounds amazingly elegant from
    an architectural point of view, it is also costly to implement and maintain. Again,
    it’s about deciding if reinventing the wheel makes sense or not. If you are creating
    a new vehicle to explore Mars, then reinventing the wheel surely makes sense.
    But in most of the cases, you’re not going to Mars. So it would be much better
    to focus your development efforts on something that is unique to your business
    challenge instead of using something that is already available and has been battle-tested
    for almost half a century. All evolutions are built on the shoulder of who was
    there before us: it makes sense to follow the same approach in software development
    too.


    ### Gatekeeper of data


    Databases are gatekeepers of data. It would be a beautiful world if all developers
    were good developers, if no bugs would be created, and if human error or hardware
    failure were not something we have to deal with. But that’s not the world we live
    in and, likely, it will never be. Reality is that not all developers are good
    developers, hardware has failures, and therefore data needs to be protected from
    any voluntary or involuntary corruption.


    Data is the ultimate asset, the one that carries the value as it can be transformed
    to information and knowledge, and it must be protected at all costs. A database
    like Azure SQL, among other duties, finds its main purpose in protecting the data
    from anything – bugs, errors, inconsistencies, and malicious users.


    A database is the last chance to make sure data is correctly modified and served,
    at scale, and with the expected performance. Moving all these features outside
    the database would mean creating a new database management system. But then you’ll
    be exactly at the starting point. Following the same analogy used before, it would
    be like if the wheel you created to explore Mars can now be used on the Earth
    too, and on every type of terrain: it is surely more flexible, but has exactly
    the same pros and cons of existing wheels, with the added complexity that only
    few know how to correctly use it.


    So, better learn how to make good use of existing one.'
