  trans: '

    ### Azure DevOps


    Azure DevOps 是一套功能全面的产品套件，能够支持团队在所有 DevOps 方面的需求。它包含一个与 Git 兼容的代码仓库、一个用于构建和发布生成的解决方案的管道、一组用于自动化测试的测试工具、一个用于本地化管理软件包的制品存储，以及一个用于确保工作能够被正确跟踪、分配和监控的敏捷规划和问题跟踪系统。


    如果你正在启动一个新项目且团队规模较小，Azure DevOps 是一个绝佳的选择，因为它的前五个用户是免费的。


    在将你的代码推送到 Azure DevOps 源代码仓库后，你可以配置构建管道，将 Azure SQL 代码作为部署的一部分部署到指定的 Azure SQL
    数据库中。


    管道可以使用不同的 `任务` 来定义代码推送到仓库时将执行的步骤。`Azure SQL Database deployment` 任务可用于将提供的 T-SQL
    脚本部署到目标 Azure SQL 数据库。


    ![../images/493913_1_En_11_Chapter/493913_1_En_11_Figb_HTML.jpg](img/493913_1_En_11_Figb_HTML.jpg)


    ## 数据库迁移


    既然你已经知道在哪里可以创建 CI/CD 管道，那么现在是时候开始弄清楚数据库如何也能成为该管道的一部分了。主要的挑战在于，当你想要在现有数据库中部署变更时，你可能需要保留已存储在数据库中的现有数据。如果该数据库是生产数据库，通常“可能”会变成“必须”。所有的挑战都始于数据库的这一关键方面，并且对于任何数据库（无论是关系型还是非关系型）都是如此。通过添加新列来扩展模式通常很简单，不会带来任何特别的复杂性。当你需要更改现有数据所使用的模式时，挑战就出现了。而且，无论你是采用读时模式还是写时模式，这个挑战始终存在。采用写时模式时，你需要更改数据库，以便所有现有数据都将更新以适应新模式。采用读时模式时，例如，如果你将数据存储在
    JSON 文档中，你可能能够大幅降低需要在数据库上执行的操作的复杂性，但你会将这种复杂性转移到应用程序逻辑中，而该逻辑需要能够处理不同版本的模式。


    不存在所谓的无模式解决方案。Martin Fowler 在其 *隐含模式* 演讲中一劳永逸地澄清了这个概念，该演讲可免费在线获取：[`www.martinfowler.com/articles/schemaless/`](http://www.martinfowler.com/articles/schemaless/)。他引入了隐含模式的概念，这是对被称为“无模式”的事物的正确命名方式。“无模式”作为一个通俗术语仍然存在，因为它如此广泛流传，但要让某物能够被操作，模式必须存在。除非有特定原因要避免，否则显式模式是更可取的。


    实际上，在 CI/CD 管道中处理数据库变更的挑战在于，通常你有一个源数据库，其中包含你的更新应用程序所使用的已演进模式，以及一个目标数据库，其中包含需要更新的现有模式以成为新模式。问题在于，你如何创建能够将目标数据库从现有模式带到新模式所需的
    T-SQL 脚本？而且，除了如何操作，谁将执行这项工作？如果目标数据库不为空，执行该更新操作的性能影响是什么？此外，如果出现问题，我们如何确保数据能被正确保留？是的，你总是有可以回滚的事务，在最坏的情况下，Azure
    SQL 为你提供了可用的数据库备份，所以至少在这方面你是有保障的。但恢复数据库可能涉及几分钟或几小时，而离线那么长时间可能不是一个可选项。


    为了解决这个挑战，最好将其分成两部分，对于 CI/CD 管道也采取同样的做法。创建两个管道来针对两种不同的用例是非常有帮助的。


    ### 合成环境


    第一个管道将用于确保应用于数据库的所有变更都在一个 `合成环境` 中得到测试：在这个环境中，数据库每次都是从头开始创建的，并且包含在该数据库中的数据是一组众所周知的数据，代表我们预期将要管理的数据，加上我们随着时间的推移了解到必须处理的、可能产生意外和不良状况的所有数据。例如，你可能不期望计算产品更新成本的存储过程的结果是负数，但如果从几个不同表读取的输入数据具有某些特定值，这种情况就会发生。除了你期望在数据库中拥有的常规、正确的数据外，你还应确保生成这种情况的数据集存在于这个合成环境数据库中，以便你能正确验证这种情况是否随时间推移得到了正确处理。


    这些值，包括正确的和问题相关的，将随着时间的推移而增长，因为你应该在收到测试人员或用户的反馈和问题后尽快向此集添加新数据。通过这样做，你将拥有一个随着时间的推移而增长的有价值的参考数据集，这对于保持你的解决方案没有回归错误和问题将非常有帮助。


    以下步骤将构成此管道的一部分：

    *   创建一个新数据库。

    *   部署模式和对象。

    *   加载参考数据集。

    *   运行测试。


    ### 集成环境


    如果合成环境中的所有测试都成功执行且没有错误，那么你就可以开始执行更复杂的管道了。既然你知道你的变更能产生期望的结果，你需要确保可以安全地将它们部署到生产数据库。这里的主要目标是确保用于将现有模式和数据更新到新模式的脚本是正确的，并且能在期望的时间内运行。


    这意味着需要生产数据库的一个副本。出于安全原因，你可能无法访问它，因为它可能包含敏感数据。你有两个选择来解决这个新挑战。你可以请求一份带有 `混淆数据` 的生产数据库副本，以便移除任何个人可识别信息或高安全数据，或者如果你工作在一个高度安全的环境中，你只需要一个可以用模拟数据填充的空生产数据库。有几种工具可以生成模拟的、但真实的数据。如果你确实需要创建一些高度定制的内容，也有适用于
    Python、Node 和 .NET 的库：

    *   `Faker` 同时适用于 .NET 和 Python（如果你想用一些冷门语言，也支持 PHP、Perl 和 Ruby）。

    *   `Mimesis` 是一个 Python 库。

    *   `MockNeat` 适用于 Java。

    *   `Faker.js` 适用于 Node。

    *   `Bogus` 是 Faker.js 移植到 .NET 的版本。


    一旦你有了这个参考数据库，你需要决定如何更新现有数据库，使其具有新模式、对象以及——如果需要的话——数据。这是一个相当广泛的话题，我们将在下一节深入讨论。无论你选择如何生成和应用变更到目标数据库，你的这个集成环境的
    CI/CD 管道看起来会像下面这样：

    *   恢复参考数据库。

    *   生成将参考数据库迁移到目标模式、更新现有对象并保留现有数据所需的 T-SQL 代码。

    *   运行生成的脚本。

    *   运行测试以验证结果。

    '
- fmt: "## Database migration tools\n\n生成用于将数据库从现有架构迁移到另一个架构的脚本可能涉及不同的步骤和技术，这取决于你所采用的开发理念：代码优先（Code\
    \ First）还是数据库优先（Database First）？\n\n### Code First\n\n代码优先意味着你决定直接通过应用程序代码来驱动数据库的创建、更改和演化。无需手动执行\
    \ `T-SQL` 脚本，也无需使用像 `SQL Server Management Studio` 或 `Azure Data Studio` 这样的独立工具。\n\
    \n这种方法的一个例子是 `Django`，一个广泛使用的 Python Web 应用程序框架：数据模型的定义完全在 Python 中进行。以下是直接取自\
    \ `Django` 官方文档的代码示例：\n\n```\nclass Member(models.Model):\n    \"\"\"A model of\
    \ a rock band member.\"\"\"\n    name = models.CharField(\"Member's name\", max_length=200)\n\
    \    instrument = models.CharField(choices=(\n        ('g', \"Guitar\"),\n   \
    \     ('b', \"Bass\"),\n        ('d', \"Drums\"),\n    ),\n    max_length=1\n\
    \    )\n    band = models.ForeignKey(\"Band\")\n```\n\n要创建数据库，你有一个 `migrate` 命令，负责执行所有必要的步骤，以使现有数据库与模型定义保持同步。对于\
    \ `Django`，该命令是：\n\n```\npython manage.py makemigrations\npython manage.py migrate\n\
    ```\n\n它将应用所有迁移。请记住，这种方法假设*没有手动在数据库外部进行更改*。例如，如果有人在没有使用提供工具的情况下手动向迁移目标数据库添加了一列，迁移可能会失败，因为它不检查对象的当前状态；它只是假设数据库在模式方面与上次应用迁移时的状态完全相同。\n\
    \n`Django` 是一个功能齐全的 Web 框架：如果你只需要一个可以在任何 Python 应用程序中使用的对象关系映射器（`ORM`），`SQLAlchemy`\
    \ 也通过 `Alembic` 包支持迁移。\n\n`.NET Core` 也通过 `Entity Framework` 支持代码优先和迁移，这是随 `.NET\
    \ Core` 一起提供的原生工具。\n\n一旦你创建了你的 `.NET` 模型\n\n```\nnamespace AzureSQLForDevelopers\n\
    {\n    public class BloggingContext : DbContext\n    {\n        public DbSet<Blog>\
    \ Blogs { get; set; }\n        public DbSet<Post> Posts { get; set; }\n      \
    \  [...]\n    }\n    public class Blog\n    {\n        public int BlogId { get;\
    \ set; }\n        public string Url { get; set; }\n        public int Rating {\
    \ get; set; }\n        public List<Post> Posts { get; set; }\n    }\n}\n```\n\n\
    你必须生成并应用迁移步骤，就像为 `Django` 所做的那样：\n\n```\ndotnet ef migrations add FirstMigration\n\
    dotnet ef database update\n```\n\n如果你需要或希望手动干预迁移过程以确保它能满足你的需求怎么办？自动化很棒，但通常需要一些手动干预来处理一些比自动化工具单独处理更复杂的情况。\n\
    \n幸运的是，所有最常见的代码优先解决方案都提供了一种自定义迁移步骤的方法。根据你使用的语言和框架，将有不同的策略来应用你需要的定制，但例如，如果你需要使用一些必须存在于数据库中的数据来初始化数据库，以使你的应用程序正常工作，或者甚至进行更复杂的更改，你都可以实现。\n\
    \n`ORM` 和数据库迁移工具几乎可用于任何平台，作为独立对象或嵌入在框架中；无论你想用什么语言或平台进行编码，如果你喜欢使用代码优先方法开发数据库的想法，你几乎可以肯定你会找到一个能帮助你的工具。\n\
    \n将迁移作为 `CI/CD` 管道的一部分执行非常简单，因为你只需在管道工具中执行用于生成和应用迁移的相同工具。\n\n在这种情况下，你不需要在 `CI/CD`\
    \ 管道中有任何专门的 `Azure SQL` 操作或任务，因为你不需要执行任何 `T-SQL` 脚本。你只需要能够调用迁移工具（这通常是一个命令行应用程序），为此，你只需使用在\
    \ `GitHub Actions` 或 `Azure DevOps` 中运行任意命令的原生支持（只需记住你可能需要在 `CI/CD` 环境中安装所选工具）。\n\
    \n### Database First\n\n数据库优先意味着你希望独立于使用它的应用程序来建模和演化数据库。这个术语通常与 `ORM` 的使用相关联。在\
    \ `ORM` 的上下文中，它意味着你将有一些工具根据现有的数据库表和对象创建你将在应用程序中使用的一些类。正如你所看到的，这与代码优先方法完全相反，代码优先是让代码负责创建数据库及相关对象。\n\
    \n如果我们把“数据库优先”的概念从 `ORM` 上下文中拿出来，在一个更通用和广泛的意义上使用它，它只是意味着你希望手动处理数据库，使用它自己的工具和语言来创建和演化它。在\
    \ `Azure SQL` 的情况下，这意味着你希望编写和使用 `T-SQL`，并且你将负责将应用程序和数据库连接在一起，可能使用 `ORM`，可能使用 `Micro-ORM`，或者可能只是完全手动完成。\n\
    \n这个选项给了你尽可能多的自由。一旦你对开发数据库进行了所有更改，你必须创建脚本，以便它们可以应用于目标数据库，使其也演化到所需的架构。同样，你在这里有很大的自由：你可以选择让工具自动为你生成脚本，或者你自己提供脚本。\n\
    \n#### DACPAC\n\n如果你更愿意使用一个工具，该工具获取你已处理的开发数据库，将其与目标数据库进行比较，计算差异，生成将目标数据库迁移到新架构所需的脚本（而不丢失任何数据），并最终为你应用这些脚本，那么你很幸运，因为这样的工具存在、免费，并且与你已用于在\
    \ `Azure SQL` 中还原数据库的工具是同一个：`SqlPackage`。\n\n使用 `SqlPackage`，你可以将现有数据库的架构提取到一个\
    \ `.dacpac` 文件中，然后将其用于目标数据库，让 `SqlPackage` 生成包含所有将目标数据库的架构与 `.dacpac` 中定义的架构同步所需命令的脚本。以下代码将提取名为\
    \ `blogs` 的、托管在 `Azure` 中的数据库中存在的架构和所有对象（但不包括数据）到 `blogs-v1.dacpac` 文件中：\n\n```\n\
    sqlpackage.exe\n    /a:Extract\n    /ssn:\"<server-name>.database.windows.net\"\
    \n    /su:\"<username>\"\n    /sp:\"<password>\"\n    /sdn:\"blogs\"\n    /tf:\"\
    blogs-v1.dacpac\"\n```\n\n一旦你有了 `.dacpac` 文件，你可以通过 `Publish` 操作立即用它来更新目标数据库：\n\
    \n```\nsqlpackage.exe\n    /a:Publish\n    /sf:\"blogs-v1.dacpac\"\n    /tsn:\"\
    <server-name>.database.windows.net\"\n    /tu:\"<username>\"\n    /tp:\"<password>\"\
    \n    /tdn:\"blogs-prod\"\n```\n\n或者创建稍后可用于通过同名操作更新数据库的脚本：\n\n```\nsqlpackage.exe\n\
    \    /a:Scripts\n    /sf:\"blogs-v1.dacpac\"\n    /tsn:\"<server-name>.database.windows.net\"\
    \n    /tu:\"<username>\"\n    /tp:\"<password>\"\n    /tdn:\"blogs-prod\"\n  \
    \  /op:\"blogs-db-v1.sql\"\n```\n\n生成脚本的能力很有用，如果你想自定义它以添加一些初始化数据（就像在代码优先场景中发生的那样），或者只是想将脚本保存到你的代码仓库中，以便确切知道在\
    \ `CI/CD` 管道中将执行什么。在这种情况下，你可能希望使用 `GitHub` 或 `DevOps` 中的 `Azure SQL` 操作或任务来执行该脚本。\n\
    \n另一个选择是直接在 `CI/CD` 管道中执行 `SqlPackage`，使用专门的 `Azure SQL` 操作或任务来应用更改，甚至不生成脚本。这种方法可能风险更高，因为你无法完全控制正在发生的事情，因此平均而言不是推荐的方法，但它确实是最灵活的，因为它会自动计算出将目标数据库带到所需状态所需的更改。"
  raw: '## Database migration tools


    Generating the scripts to migrate a database from an existing schema to another
    can involve different steps and technologies depending on which development philosophy
    you decided to adopt. Code first or Database first?


    ### Code First


    Code first means that you decided to drive database creation, change, and evolution
    directly via application code. No T-SQL script to execute manually, and no separate
    tools like SQL Server Management Studio or Azure Data Studio to be used.


    An example of this approach is Django, a widely used Python framework to build
    web applications: the definition of data models happens completely in Python.
    Here is a code sample taken directly from Django official documentation:


    ```

    class Member(models.Model):

    """A model of a rock band member."""

    name = models.CharField("Member''s name", max_length=200)

    instrument = models.CharField(choices=(

    (''g'', "Guitar"),

    (''b'', "Bass"),

    (''d'', "Drums"),

    ),

    max_length=1

    )

    band = models.ForeignKey("Band")

    ```


    To create the database , you have a *migrate* command that takes care of executing
    all the needed steps to bring an existing database in sync with what the model
    defines. For Django, the command is:


    ```

    python manage.py makemigrations

    python manage.py migrate

    ```


    and it will apply all the migrations. Keep in mind that this approach assumes
    that *no changes have been done manually and externally to the database*. For
    example, if someone manually added a column to a database that is target of the
    migration , without using the provided tool, the migration could fail as it does
    not check the current status of the object; it just assumes that the database
    is exactly in the same state, from a schema perspective, it was the last time
    a migration was applied.


    Django is a full-featured web framework: if you need just an Object-Relational
    Mapper (ORM) to use in any Python application, SQLAlchemy also supports migrations
    via the Alembic package.


    .NET Core also supports Code First and migrations, via Entity Framework , the
    native tool that comes with .NET Core.


    Once you have created your .NET model


    ```

    namespace AzureSQLForDevelopers

    {

    public class BloggingContext : DbContext

    {

    public DbSet Blogs { get; set; }

    public DbSet Posts { get; set; }

    [...]

    }

    public class Blog

    {

    public int BlogId { get; set; }

    public string Url { get; set; }

    public int Rating { get; set; }

    public List Posts { get; set; }

    }

    }

    ```


    you must generate and apply the migration steps, just like you did for Django:


    ```

    dotnet ef migrations add FirstMigration

    dotnet ef database update

    ```


    What if you need or want to manually intervene in the migration process to make
    sure it can fit your needs? Automation is great, but often, some manual intervention
    is needed to take care of some situation that is more complex than what the automation
    tool can handle alone.


    Luckily, all the most common Code First solutions provide a way to customize the
    migration steps. Depending on the language and framework you are using, there
    will be different strategies to apply the customization you need to have, but
    if, for example, you need to initialize the database with some data that must
    be present in the database to make your application work correctly or even make
    more complex changes, you are covered.


    ORM and database migration tools are available almost for any platforms as a stand-alone
    object or embedded in frameworks; no matter what language or platform you want
    to use to code, if you like the idea of developing the database using a Code First
    approach, you can be quite sure that you’ll find a tool that will help you with
    that.


    Executing the migration as part of the CI/CD pipeline is pretty simple as you
    only have to execute the same tool you used to generate and apply the migrations
    in the pipeline tool.


    In this case, you don’t need any specialized Azure SQL Actions or Tasks in the
    CI/CD pipeline as you don’t need to execute any T-SQL script. You just need to
    be able to invoke the migration tool, which usually is a command-line application,
    and for that, you just use the native support to run an arbitrary command (just
    keep in mind that you may need to install the chosen tool in the CI/CD environment)
    in both GitHub Actions or Azure DevOps.


    ### Database First


    Database First means that you want to model and evolve your database independently
    of the applications that are using it. The term is usually tied with ORM usage
    . Within the ORM context, it means that you’ll have some tool that will create
    some of the classes you’ll be using in your application starting from the existing
    database tables and objects. As you can see, this is completely opposite of the
    Code First approach, where you have the code taking care of creating the database
    and the related objects.


    If we take the idea of “Database First” out of the ORM context and use it in a
    more generic and broad sense, it just means that you want to work on the database
    manually, using its own tools and languages to create and evolve it. In Azure
    SQL case, this means that you want to write and use T-SQL and that you’ll be taking
    care of connecting the application and the database together, maybe using an ORM,
    maybe using a Micro-ORM, or maybe just doing it completely manually.


    This option gives you as much as freedom you want. Once you have made all the
    changes to your development database, you have to create the script so that they
    can be applied to a target database to evolve it to the desired schema too. Again,
    you have a lot of freedom here: you can choose to have tools that generate the
    scripts automatically for you or you can provide the script by yourself.


    #### DACPAC


    If you prefer to have a tool that takes the development database you have worked
    on and compare it to a target database, calculate the differences, generate the
    needed scripts to migrate the target database to the new schema (without losing
    any data), and finally apply those scripts for you, you’re lucky as such tool
    exists, is free, and is the same tool you have already used to restore a database
    in Azure SQL: `SqlPackage`.


    With `SqlPackage`, you can extract the schema of an existing database into a `.dacpac`
    file and then use it against a target database to have `SqlPackage` generate the
    script with all the commands needed to sync the schema of the target database
    with the schema defined in the `.dacpac`. The following code will extract into
    `blogs-v1.dacpac` the schema and all the objects, but not the data, existing in
    the database named `blogs` hosted in Azure:


    ```

    sqlpackage.exe

    /a:Extract

    /ssn:""

    /su:""

    /su:""

    /sdn:"blogs"

    /tf:"blogs-v1.dacpac"

    ```


    Once you have the `.dacpac` file , you can use it to update a target database
    right away via the `Publish` action:


    ```

    sqlpackage.exe

    /a:Publish

    /sf:"blogs-v1.dacpac"

    /tsn:""

    /tu:""

    /tp:""

    /tdn:"blogs-prod"

    ```


    or to create the script that you can later use to update the database via the
    homonymous action:


    ```

    sqlpackage.exe

    /a:Scripts

    /sf:"blogs-v1.dacpac"

    /tsn:""

    /tu:""

    /tp:""

    /tdn:"blogs-prod"

    /op:"blogs-db-v1.sql"

    ```


    The ability to generate the script is useful if you want to customize it to add
    some initialization data, as it was happening for the Code First scenario, or
    just want to save the script into your code repository so that you know exactly
    what would be executed in the CI/CD pipeline. In this case, you may want to use
    the Azure SQL Action or Task in GitHub or DevOps to execute that script.


    Another option could be to execute the `SqlPackage` directly in the CI/CD pipeline,
    using the specialized Azure SQL Action or Task, to apply the changes without even
    generating the script. This approach could be more risky, as you don’t have full
    control of what’s happening, and thus is not the recommended approach on average,
    but it is surely the most flexible as it will automatically figure out what are
    the needed changes to bring the target database to the desired state.'
