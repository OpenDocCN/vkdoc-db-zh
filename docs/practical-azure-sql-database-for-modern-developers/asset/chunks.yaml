  trans: '

    # 哪种 Azure SQL 驱动最适合我


    对于 C#、C++、Node.JS 或 Python 等语言，根据平台和应用需求，有多种驱动选项可供选择，因此了解有哪些可用组合及其推荐情况非常重要。


    如果你的应用程序面向 `full .NET Framework`（在 Windows 上）或跨平台的 `.NET Core`（在 Windows、macOS、Linux
    或 Docker 上），并使用如 `C#` 这样的语言，你有两个主要选项：


    *   依赖 `System.Data.SqlClient` 命名空间中经典的 `ADO.NET Provider for SQL Server`，它作为机器级别安装的完整
    .NET Framework 版本的一部分提供。

    *   在你的项目中引用新的 `Microsoft.Data.SqlClient` 驱动，它托管在 GitHub ([`https://aka.ms/ghmdsc`](https://aka.ms/ghmdsc))
    和 NuGet ([`https://aka.ms/ngmdsc`](https://aka.ms/ngmdsc))。


    后一种选项为 Microsoft 提供了更灵活、更直接的方式，以便为 .NET 的客户端库引入改进，因此在开发一个全新的应用程序时，推荐使用此版本。使用 `dotnet`
    CLI 为项目安装和引用此包非常简单：


    ```dotnet add package Microsoft.Data.SqlClient```


    像 Perl、PHP 和 Python 这样的编程语言提供了围绕原生 ODBC 驱动的轻量级包装器和接口（例如 `pyodbc`、`DBI` 等）。为了支持
    Azure SQL 最新版本中所有可用的最新功能（例如 Always Encrypted、数据分类、Azure Active Directory 身份验证等），推荐使用
    `Microsoft ODBC Driver 17 for SQL Server`（或更高版本）。该驱动除了支持 Windows 外，还适用于大多数主要的
    Linux 发行版和版本。与此驱动一同打包的还有传统的 SQL Server 客户端实用程序，如 `sqlcmd` 和 `bcp`。ODBC 驱动的安装过程很大程度上取决于你的目标操作系统和发行版，所有详细信息都可以在此
    URL 找到：[`https://aka.ms/azuresql-odbc-install`](https://aka.ms/azuresql-odbc-install)。


    Java 开发人员应使用 `Microsoft JDBC Driver 8.2 for SQL Server`，这是一个 Type 4 JDBC 驱动，支持
    JRE 8、11 和 12，并且可以在所有支持 Java 的主要操作系统上运行，包括 Sun Solaris。使用 Maven 时，可以通过将其作为依赖项添加到
    `POM.xml` 文件中来将 JDBC 驱动添加到项目：


    ```com.microsoft.sqlserver

    mssql-jdbc

    8.2.0.jre11

    ```


    正如 Java 领域的典型情况，JDBC 驱动不提供原生连接池功能，因此市场上有许多外部库可用。虽然我们不特别认可任何一个，但 `HikariCP` ([`https://aka.ms/hikaricp`](https://aka.ms/hikaricp))
    是我们在与连接到 Azure SQL 实例的客户合作时经常遇到的一个库，并已被证明快速且可靠。


    对于其他编程语言如 `Python`，通常有多种选项可用，尽管 Microsoft 将其测试工作和信心放在 `pyodbc` 驱动 ([`https://aka.ms/pyodbc`](https://aka.ms/pyodbc))
    上，如前所述，它依赖于 SQL Server 的 ODBC 驱动，并支持大多数操作系统。你可以在命令提示符中使用以下一行命令轻松安装 `pyodbc`：


    ```pip install pyodbc```


    类似地，对于 Node.JS，可以通过在命令行键入规范的包管理器命令来将 Tedious 驱动添加到项目：


    ```npm install tedious```


    ## 入门指南


    Microsoft 官方文档为开发者提供了一个很棒的“入门”部分 ([`https://aka.ms/sdcq`](https://aka.ms/sdcq))，这是开始熟悉使用循序渐进方法为
    Azure SQL 产品系列进行应用程序开发的最佳起点。


    虽然你将有时间评估所有这些示例，但我们将从这里开始，使用一些最流行的编程语言，从头开始解释如何连接到 Azure SQL 并运行一些基本查询的关键方面。


    本章中的所有示例都引用了一个名为“WideWorldImportersFull”的数据库，该数据库可以作为独立的 Azure SQL 数据库或托管实例进行部署。在第
    2 章中，你会找到关于如何部署此示例数据库的说明。请相应地更新连接字符串以使这些示例工作。


    ## 清单 3-1. .NET Core 应用程序中的数据访问方法


    ```public async Task> GetOrders()

    {

    List orders = new List();

    using (SqlConnection cnn =  new SqlConnection(

    config.GetConnectionString

    ("DefaultConnection")))

    // 连接字符串模式: "Server=tcp:.database.windows.net,1433;Initial Catalog=;User ID=;Password=;Connect
    Timeout=30;"

    {

    SqlCommand cmd = new SqlCommand

    (@"SELECT TOP 5

    [o].[OrderID],

    [o].[OrderDate],

    [c].[CustomerName]

    FROM [Sales].[Orders] AS [o]

    INNER JOIN [Sales].[Customers] AS [c]

    ON [o].[CustomerID] = [c].[CustomerID]", cnn);

    await cnn.OpenAsync();

    SqlDataReader dr = await cmd.ExecuteReaderAsync();

    while (dr.Read())

    {

    orders.Add(new Order()

    {

    OrderID = Convert.ToInt32(dr[0]),

    OrderDate = Convert.ToDateTime(dr[1]),

    CustomerName = Convert.ToString(dr[2])

    });

    }

    }

    return orders;

    }```


    在这个基本示例中，你可以找到一个典型的 .NET Core 数据访问方法，该方法可以在多种应用程序类型中复用，从控制台应用到 WebAPI 或 Azure
    函数。一旦你从 NuGet 添加了对 `Microsoft.Data.SqlClient` 包的引用，你就可以使用 `SqlConnection` 和 `SqlCommand`
    类，通过异步方法与 Azure SQL 交互，以打开新连接并执行命令，该命令检索结果集并实例化一个对象集合，供你在业务逻辑中使用。虽然当你执行像这样简单的操作时，幕后发生了许多其他事情，并且有许多最佳实践和指导可用于优化你的数据访问层，但你会发现在应用程序的大多数数据库交互中都会编写类似的代码。现在让我们用
    Java 来解决完全相同的场景，它是企业开发人员最喜欢的编程语言之一。


    ## 清单 3-2. Java 应用程序中的数据访问方法


    ```public List getOrders() {

    List order = new ArrayList();

    String connectionString = "jdbc:sqlserver://.database.windows.net:1433;" + "database=WideWorldImporters-Full;user=@;"
    + "password=;loginTimeout=30;";

    try {

    try (Connection conn =

    DriverManager.getConnection(connectionString)) {

    String sql =

    "SELECT TOP 5 "

    +"[o].[OrderID],"

    +"[o].[OrderDate],"

    +"[c].[CustomerName]"

    +"FROM [Sales].[Orders] AS [o]"

    +"INNER JOIN [Sales].[Customers] AS [c] "

    +"ON [o].[CustomerID] = [c].[CustomerID]";

    try (Statement stmt =

    conn.createStatement();

    ResultSet rs =

    stmt.executeQuery(sql)) {

    while (rs.next()) {

    order.add(new Order(

    rs.getInt(1),

    rs.getString(2),

    rs.getString(3)));

    }

    }

    conn.close();

    }

    } catch (Exception e) {

    System.out.println();

    e.printStackTrace();

    }

    return order;

    }```

