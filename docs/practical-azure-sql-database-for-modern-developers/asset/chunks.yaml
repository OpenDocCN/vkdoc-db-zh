- fmt: "### Leveraging transactions\n\nIt seems strange to begin a review of batching\
    \ by discussing transactions. But the use of client-side transactions has a subtle\
    \ server-side batching effect that improves performance. And transactions can\
    \ be added with only a few lines of code, so they provide a fast way to improve\
    \ performance of sequential operations.\n\nMoving from individual calls executed\
    \ as implicit transactions to wrapping several calls in a single transaction effectively\
    \ delays writes to the transaction log until the transaction is committed, reducing\
    \ the impact of latency between Azure SQL engine and transaction log storage.\n\
    \nDepending on specific table structures and number of operations to wrap in a\
    \ transaction, this technique can provide up to 10x performance improvement for\
    \ data modification tasks.\n\n### Table-valued parameters\n\nTable-valued parameters\
    \ support user-defined table types as parameters in Transact-SQL statements, Stored\
    \ Procedures, and functions. This client-side batching technique allows you to\
    \ send multiple rows of data within the table-valued parameter. To use table-valued\
    \ parameters, first define a table type. The following Transact-SQL statement\
    \ creates a table type named `MyTableType`:\n\n```\nCREATE TYPE MyTableType AS\
    \ TABLE (\nmytext NVARCHAR(MAX),\nnum INT\n);\n```\n\nIn your application code,\
    \ you can create an in-memory data structure with the exact same shape of the\
    \ table type and pass this data structure as a parameter in a text query or Stored\
    \ Procedure call. The following example shows this technique in a .NET Core application:\n\
    \n```\nusing (SqlConnection connection = new SqlConnection(connString))\n{\n \
    \   connection.Open();\n    DataTable table = new DataTable();\n    // Add columns\
    \ and rows. The following is a simple example.\n    table.Columns.Add(\"mytext\"\
    , typeof(string));\n    table.Columns.Add(\"num\", typeof(int));\n    for (var\
    \ i = 0; i < 10; i++)\n    {\n        table.Rows.Add(DateTime.Now.ToString(),\n\
    \                       DateTime.Now.Millisecond);\n    }\n    SqlCommand cmd\
    \ = new SqlCommand(\n        \"INSERT INTO MyTable(mytext, num) SELECT mytext,\
    \ num FROM @TestTvp\", connection);\n    cmd.Parameters.Add(\n        new SqlParameter()\n\
    \        {\n            ParameterName = \"@TestTvp\",\n            SqlDbType =\
    \ SqlDbType.Structured,\n            TypeName = \"MyTableType\",\n           \
    \ Value = table,\n        });\n    cmd.ExecuteNonQuery();\n}\n```\n\nTo improve\
    \ the previous example further, use a Stored Procedure instead of a text-based\
    \ command. The following Transact-SQL command creates a Stored Procedure that\
    \ takes the `SimpleTestTableType` table-valued parameter:\n\n```\nCREATE PROCEDURE\
    \ [dbo].[sp_InsertRows]\n    @TestTvp as MyTableType READONLY\nAS\nBEGIN\n   \
    \ INSERT INTO MyTable(mytext, num)\n    SELECT mytext, num FROM @TestTvp\nEND\n\
    GO\n```\n\nThen we can just change few lines of previous example to invoke the\
    \ Stored Procedure:\n\n```\nSqlCommand cmd = new SqlCommand(\"sp_InsertRows\"\
    , connection);\ncmd.CommandType = CommandType.StoredProcedure;\n```\n\nIn most\
    \ cases, table-valued parameters have equivalent or better performance than other\
    \ batching techniques. Table-valued parameters are often preferable, because they\
    \ are more flexible than other options. With table-valued parameters, you can\
    \ use logic in the Stored Procedure to determine which rows are updates and which\
    \ are inserts. The table type can also be modified to contain an “Operation” column\
    \ that indicates whether the specified row should be inserted, updated, or deleted.\n\
    \nFor more complex application scenarios where using table-valued parameters can\
    \ provide great benefits on both overall performance and also simplifying your\
    \ implementation, you can refer to this link to product documentation: [`https://aka.ms/piubbs`](https://aka.ms/piubbs).\n\
    \n### Bulk copy\n\nAzure SQL offers specific support for bulk loading large sets\
    \ of records into a table from an application. This support spans from the TDS\
    \ wire protocol up to various APIs available in many client drivers (e.g., `SqlClient`,\
    \ `JDBC`, or `ODBC`).\n\nAs an example, .NET applications can use the `SqlBulkCopy`\
    \ class to perform bulk insert operations. `SqlBulkCopy` is similar in function\
    \ to the command-line tool, `Bcp.exe`, or the Transact-SQL statement, `BULK INSERT`.\
    \ The following code example shows how to bulk copy the rows in the source `DataTable`,\
    \ represented by the `table` variable, to the destination table, `MyTable`:\n\n\
    ```\nusing (SqlConnection connection = new SqlConnection(connString))\n{\n   \
    \ connection.Open();\n    using (SqlBulkCopy bulkCopy = new SqlBulkCopy(connection))\n\
    \    {\n        bulkCopy.DestinationTableName = \"MyTable\";\n        bulkCopy.ColumnMappings.Add(\"\
    mytext\", \"mytext\");\n        bulkCopy.ColumnMappings.Add(\"num\", \"num\");\n\
    \        bulkCopy.WriteToServer(table);\n    }\n}\n```\n\nYou may be wondering\
    \ now what you should use table-valued parameters and when it would be better\
    \ to use the bulk copy API. Using table-valued parameters is comparable to other\
    \ ways of using set-based variables; however, using table-valued parameters frequently\
    \ can be faster for large datasets. Compared to bulk operations that have a greater\
    \ startup cost than table-valued parameters, table-valued parameters perform well\
    \ for inserting up to a few 1000 rows. If you’re batching 10000 rows or more instead,\
    \ bulk copy will definitely be the most efficient way of loading data into Azure\
    \ SQL.\n\n### Multiple-row parameterized INSERT statements\n\nOne alternative\
    \ for small batches is to construct a large parameterized `INSERT` statement that\
    \ inserts multiple rows. T-SQL language provides direct support to this use case\
    \ through the following syntax:\n\n```\nINSERT INTO [MyTable] ( mytext, num )\
    \ VALUES (@p1, @p2), (@p3, @p4), (@p5, @p6), (@p7, @p8), (@p9, @p10)\n```\n\n\
    From your language of choice then, you can use specific drivers’ APIs to leverage\
    \ these capabilities. As an example, you can take a look at this Python code fragment:\n\
    \n```\nparams = [ ('A', 1), ('B', 2) ]\ncursor.fast_executemany = True\ncursor.executemany(\"\
    insert into t(name, id) values (?, ?)\", params)\n```\n\nBasically, by setting\
    \ `fast_executemany` cursor property to `True`, `pyodbc` driver will pack multiple\
    \ parameter tuples into a single batch, drastically reducing the number of roundtrips\
    \ between your application code and the back-end database.\n\nHigher-level frameworks\
    \ like `EntityFramework` `Core` or `SQLAlchemy` are leveraging underlying client\
    \ drivers’ capability and provide equivalent batching options. It’s always a recommended\
    \ practice to check if these capabilities are available for your own combination\
    \ of programming language and framework."
  raw: '### Leveraging transactions


    It seems strange to begin a review of batching by discussing transactions. But
    the use of client-side transactions has a subtle server-side batching effect that
    improves performance. And transactions can be added with only a few lines of code,
    so they provide a fast way to improve performance of sequential operations.


    Moving from individual calls executed as implicit transactions to wrapping several
    calls in a single transaction effectively delays writes to the transaction log
    until the transaction is committed, reducing the impact of latency between Azure
    SQL engine and transaction log storage.


    Depending on specific table structures and number of operations to wrap in a transaction,
    this technique can provide up to 10x performance improvement for data modification
    tasks.


    ### Table-valued parameters


    Table-valued parameters support user-defined table types as parameters in Transact-SQL
    statements, Stored Procedures, and functions. This client-side batching technique
    allows you to send multiple rows of data within the table-valued parameter. To
    use table-valued parameters, first define a table type. The following Transact-SQL
    statement creates a table type named MyTableType:


    ```

    CREATE TYPE MyTableType AS TABLE (

    mytext NVARCHAR(MAX),

    num INT

    );

    ```


    In your application code, you can create an in-memory data structure with the
    exact same shape of the table type and pass this data structure as a parameter
    in a text query or Stored Procedure call. The following example shows this technique
    in a .NET Core application:


    ```

    using (SqlConnection connection = new SqlConnection(connString))

    {

    connection.Open();

    DataTable table = new DataTable();

    // Add columns and rows. The following is a simple example.

    table.Columns.Add("mytext", typeof(string));

    table.Columns.Add("num", typeof(int));

    for (var i = 0; i < 10; i++)

    {

    table.Rows.Add(DateTime.Now.ToString(),

    DateTime.Now.Millisecond);

    }

    SqlCommand cmd = new SqlCommand(

    "INSERT INTO MyTable(mytext, num) SELECT mytext, num FROM

    @TestTvp", connection);

    cmd.Parameters.Add(

    new SqlParameter()

    {

    ParameterName = "@TestTvp",

    SqlDbType = SqlDbType.Structured,

    TypeName = "MyTableType",

    Value = table,

    });

    cmd.ExecuteNonQuery();

    }

    ```


    To improve the previous example further, use a Stored Procedure instead of a text-based
    command. The following Transact-SQL command creates a Stored Procedure that takes
    the `SimpleTestTableType` table-valued parameter:


    ```

    CREATE PROCEDURE [dbo].[sp_InsertRows]

    @TestTvp as MyTableType READONLY

    AS

    BEGIN

    INSERT INTO MyTable(mytext, num)

    SELECT mytext, num FROM @TestTvp

    END

    GO

    ```


    Then we can just change few lines of previous example to invoke the Stored Procedure:


    ```

    SqlCommand cmd = new SqlCommand("sp_InsertRows", connection);

    cmd.CommandType = CommandType.StoredProcedure;

    ```


    In most cases, table-valued parameters have equivalent or better performance than
    other batching techniques. Table-valued parameters are often preferable, because
    they are more flexible than other options. With table-valued parameters, you can
    use logic in the Stored Procedure to determine which rows are updates and which
    are inserts. The table type can also be modified to contain an “Operation” column
    that indicates whether the specified row should be inserted, updated, or deleted.


    For more complex application scenarios where using table-valued parameters can
    provide great benefits on both overall performance and also simplifying your implementation,
    you can refer to this link to product documentation: [`https://aka.ms/piubbs`](https://aka.ms/piubbs).


    ### Bulk copy


    Azure SQL offers specific support for bulk loading large sets of records into
    a table from an application. This support spans from the TDS wire protocol up
    to various APIs available in many client drivers (e.g., SqlClient, JDBC, or ODBC).


    As an example, .NET applications can use the `SqlBulkCopy` class to perform bulk
    insert operations. `SqlBulkCopy` is similar in function to the command-line tool,
    `Bcp.exe`, or the Transact-SQL statement, `BULK INSERT`. The following code example
    shows how to bulk copy the rows in the source `DataTable`, represented by the
    `table` variable, to the destination table, `MyTable`:


    ```

    using (SqlConnection connection = new SqlConnection(connString))

    {

    connection.Open();

    using (SqlBulkCopy bulkCopy = new SqlBulkCopy(connection))

    {

    bulkCopy.DestinationTableName = "MyTable";

    bulkCopy.ColumnMappings.Add("mytext", "mytext");

    bulkCopy.ColumnMappings.Add("num", "num");

    bulkCopy.WriteToServer(table);

    }

    }

    ```


    You may be wondering now what you should use table-valued parameters and when
    it would be better to use the bulk copy API. Using table-valued parameters is
    comparable to other ways of using set-based variables; however, using table-valued
    parameters frequently can be faster for large datasets. Compared to bulk operations
    that have a greater startup cost than table-valued parameters, table-valued parameters
    perform well for inserting up to a few 1000 rows. If you’re batching 10000 rows
    or more instead, bulk copy will definitely be the most efficient way of loading
    data into Azure SQL.


    ### Multiple-row parameterized INSERT statements


    One alternative for small batches is to construct a large parameterized INSERT
    statement that inserts multiple rows. T-SQL language provides direct support to
    this use case through the following syntax:


    ```

    INSERT INTO [MyTable] ( mytext, num ) VALUES (@p1, @p2), (@p3, @p4), (@p5, @p6),
    (@p7, @p8), (@p9, @p10)

    ```


    From your language of choice then, you can use specific drivers’ APIs to leverage
    these capabilities. As an example, you can take a look at this Python code fragment:


    ```

    params = [ (''A'', 1), (''B'', 2) ]

    cursor.fast_executemany = True

    cursor.executemany("insert into t(name, id) values (?, ?)", params)

    ```


    Basically, by setting *fast_executemany* cursor property to `True`, pyodbc driver
    will pack multiple parameter tuples into a single batch, drastically reducing
    the number of roundtrips between your application code and the back-end database.


    Higher-level frameworks like EntityFramework Core or SQLAlchemy are leveraging
    underlying client drivers’ capability and provide equivalent batching options.
    It’s always a recommended practice to check if these capabilities are available
    for your own combination of programming language and framework.'
  trans: "### 利用事务\n\n在讨论批处理时，以事务作为开头似乎有些奇怪。但使用客户端事务具有一种微妙的服务器端批处理效果，能提升性能。而且添加事务只需几行代码，因此它们提供了一种快速提升顺序操作性能的方法。\n\
    \n将作为隐式事务执行的单个调用，转变为将多个调用包装在一个事务中，可以有效地延迟对事务日志的写入，直到事务提交，从而降低了 Azure SQL 引擎与事务日志存储之间延迟的影响。\n\
    \n根据具体的表结构和要包装在事务中的操作数量，此技术可为数据修改任务提供高达 10 倍的性能提升。\n\n### 表值参数\n\n表值参数支持在 Transact-SQL\
    \ 语句、存储过程和函数中使用用户定义的表类型作为参数。这种客户端批处理技术允许您在表值参数内发送多行数据。要使用表值参数，首先需要定义一个表类型。以下 Transact-SQL\
    \ 语句创建了一个名为 `MyTableType` 的表类型：\n\n```\nCREATE TYPE MyTableType AS TABLE (\nmytext\
    \ NVARCHAR(MAX),\nnum INT\n);\n```\n\n在应用程序代码中，您可以创建一个与表类型结构完全相同的内存数据结构，并将此数据结构作为参数传递给文本查询或存储过程调用。以下示例展示了此技术在\
    \ .NET Core 应用程序中的实现：\n\n```\nusing (SqlConnection connection = new SqlConnection(connString))\n\
    {\n    connection.Open();\n    DataTable table = new DataTable();\n    // 添加列和行。以下是一个简单示例。\n\
    \    table.Columns.Add(\"mytext\", typeof(string));\n    table.Columns.Add(\"\
    num\", typeof(int));\n    for (var i = 0; i < 10; i++)\n    {\n        table.Rows.Add(DateTime.Now.ToString(),\n\
    \                       DateTime.Now.Millisecond);\n    }\n    SqlCommand cmd\
    \ = new SqlCommand(\n        \"INSERT INTO MyTable(mytext, num) SELECT mytext,\
    \ num FROM @TestTvp\", connection);\n    cmd.Parameters.Add(\n        new SqlParameter()\n\
    \        {\n            ParameterName = \"@TestTvp\",\n            SqlDbType =\
    \ SqlDbType.Structured,\n            TypeName = \"MyTableType\",\n           \
    \ Value = table,\n        });\n    cmd.ExecuteNonQuery();\n}\n```\n\n为了进一步改进上面的示例，可以使用存储过程代替基于文本的命令。以下\
    \ Transact-SQL 命令创建了一个接受 `SimpleTestTableType` 表值参数的存储过程：\n\n```\nCREATE PROCEDURE\
    \ [dbo].[sp_InsertRows]\n    @TestTvp as MyTableType READONLY\nAS\nBEGIN\n   \
    \ INSERT INTO MyTable(mytext, num)\n    SELECT mytext, num FROM @TestTvp\nEND\n\
    GO\n```\n\n然后，我们只需修改前面示例中的几行代码来调用该存储过程：\n\n```\nSqlCommand cmd = new SqlCommand(\"\
    sp_InsertRows\", connection);\ncmd.CommandType = CommandType.StoredProcedure;\n\
    ```\n\n在大多数情况下，表值参数的性能与其他批处理技术相当或更优。表值参数通常更受青睐，因为它们比其他选项更灵活。使用表值参数，您可以在存储过程中使用逻辑来确定哪些行是更新，哪些是插入。表类型也可以修改以包含一个“操作”列，用于指示指定行应进行插入、更新还是删除。\n\
    \n对于更复杂的应用场景，使用表值参数可以在整体性能和简化实现方面带来巨大收益，您可以参考此产品文档链接：[`https://aka.ms/piubbs`](https://aka.ms/piubbs)。\n\
    \n### 批量复制\n\nAzure SQL 为从应用程序向表中大批量加载记录提供了专门的支持。这种支持从 TDS 纵向协议延伸到许多客户端驱动程序（例如\
    \ `SqlClient`、`JDBC` 或 `ODBC`）中可用的各种 API。\n\n例如，.NET 应用程序可以使用 `SqlBulkCopy` 类来执行批量插入操作。`SqlBulkCopy`\
    \ 在功能上类似于命令行工具 `Bcp.exe` 或 Transact-SQL 语句 `BULK INSERT`。以下代码示例展示了如何将源 `DataTable`（由\
    \ `table` 变量表示）中的行批量复制到目标表 `MyTable`：\n\n```\nusing (SqlConnection connection\
    \ = new SqlConnection(connString))\n{\n    connection.Open();\n    using (SqlBulkCopy\
    \ bulkCopy = new SqlBulkCopy(connection))\n    {\n        bulkCopy.DestinationTableName\
    \ = \"MyTable\";\n        bulkCopy.ColumnMappings.Add(\"mytext\", \"mytext\");\n\
    \        bulkCopy.ColumnMappings.Add(\"num\", \"num\");\n        bulkCopy.WriteToServer(table);\n\
    \    }\n}\n```\n\n您可能现在想知道应该在什么时候使用表值参数，什么时候使用批量复制 API 更合适。使用表值参数与其他使用基于集合的变量的方式相当；然而，对于大型数据集，频繁使用表值参数可能更快。与启动成本高于表值参数的批量操作相比，表值参数在插入多达几千行时表现良好。如果您要批处理的是\
    \ 10000 行或更多数据，那么批量复制无疑将是向 Azure SQL 加载数据最高效的方式。\n\n### 多行参数化 INSERT 语句\n\n对于小批量操作，另一种选择是构建一个插入多行的大型参数化\
    \ `INSERT` 语句。T-SQL 语言通过以下语法直接支持此用例：\n\n```\nINSERT INTO [MyTable] ( mytext, num\
    \ ) VALUES (@p1, @p2), (@p3, @p4), (@p5, @p6), (@p7, @p8), (@p9, @p10)\n```\n\n\
    然后，从您选择的编程语言出发，您可以使用特定驱动程序的 API 来利用这些功能。例如，您可以看一下这段 Python 代码片段：\n\n```\nparams\
    \ = [ ('A', 1), ('B', 2) ]\ncursor.fast_executemany = True\ncursor.executemany(\"\
    insert into t(name, id) values (?, ?)\", params)\n```\n\n基本上，通过将 `fast_executemany`\
    \ 游标属性设置为 `True`，`pyodbc` 驱动程序会将多个参数元组打包成一个批次，从而显著减少应用程序代码与后端数据库之间的往返次数。\n\n更高级别的框架，如\
    \ `EntityFramework` `Core` 或 `SQLAlchemy`，正在利用底层客户端驱动程序的能力，并提供等效的批处理选项。始终建议检查您自己使用的编程语言和框架组合是否支持这些功能。"
- fmt: '### Recommendations and best practices


    It’s important to understand the trade-offs between batching/buffering and resiliency.
    If a database operation fails, the risk of losing an unprocessed batch of business-critical
    data might outweigh the performance benefit of batching, so implementing proper
    retry logic techniques introduced in previous chapters is even more important
    when adopting batching.


    If you choose a single batching technique, `table-valued parameters` offer the
    best performance and flexibility. For the fastest insert performance, follow these
    general guidelines, but test your scenario:


    *   For < 100 rows, use a single-parameterized `INSERT` command.

    *   For < 1000 rows, use `table-valued parameters`.

    *   For >= 1000–2000 rows, use `SqlBulkCopy` in .NET or equivalent bulk copy techniques
    in other languages (e.g., `SQLServerBulkCopy` in Java).


    For update and delete operations, use `table-valued parameters` with `Stored Procedure`
    logic that determines the correct operation on each row in the table parameter.
    Use the largest batch sizes that make sense for your application and business
    requirements.


    Test the largest batch size to verify that `Azure SQL` does not reject it. Create
    configuration settings that control batching, such as the batch size or the buffering
    time window. These settings provide flexibility: you can change the batching behavior
    in production without redeploying the cloud service.


    Avoid parallel execution of batches that operate on a single table in one database.
    If you do choose to divide a single batch across multiple worker threads, run
    tests to determine the ideal number of threads. This number depends on several
    factors, including log generation rate limits for each service tiers and compute
    sizes, locking effects on data and index pages on target tables, and so on. The
    net effect is that more threads can effectively decrease performance rather than
    increase it, so it’s important to test your own workload and potentially adjust
    the number of threads.


    ### If you want to know more


    Managing data consistency is a tough task. Doing it concurrently and at scale,
    it’s even more challenging. As mentioned in the introduction of this chapter,
    it’s not by chance that almost all the most used databases provide support for
    transactions. Managing everything in the application code would be tremendously
    difficult and inefficient. And today the discussion between scalability and consistency
    is almost gone. Thanks to the new cloud-born architecture, like the one used to
    build `Azure SQL DB Hyperscale`, you can have both. The technology behind `Azure
    SQL Hyperscale` database is amazing. If you want to know more, here’s a list that
    will give you a kickstart:


    *   Unit of Work – [`https://martinfowler.com/eaaCatalog/unitOfWork.html`](https://martinfowler.com/eaaCatalog/unitOfWork.html)

    *   Spanner: Becoming a SQL System – Google Research – [`https://static.googleusercontent.com/media/research.google.com/en//pubs/archive/46103.pdf`](https://static.googleusercontent.com/media/research.google.com/en//pubs/archive/46103.pdf)

    *   Socrates: The New SQL Server in the Cloud – [`www.microsoft.com/research/publication/socrates-the-new-sql-server-in-the-cloud/`](http://www.microsoft.com/research/publication/socrates-the-new-sql-server-in-the-cloud/)

    *   Is SQL Beating NoSQL? – [`https://dzone.com/articles/is-sql-beating-nosql`](https://dzone.com/articles/is-sql-beating-nosql)

    *   6 Data Management Patterns for Microservices – [`http://progressivecoder.com/6-data-management-patterns-for-microservices/`](http://progressivecoder.com/6-data-management-patterns-for-microservices/)

    *   Transaction Locking and Row Versioning Guide – [`https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide`](https://docs.microsoft.com/en-us/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide)

    *   How to use batching to improve Azure SQL Database and Azure SQL Managed Instance
    application performance – [`https://docs.microsoft.com/azure/azure-sql/performance-improve-use-batching`](https://docs.microsoft.com/azure/azure-sql/performance-improve-use-batching)


    # 8. Multi-model Capabilities


    `Azure SQL` is not a traditional relational database platform. Every modern database
    must enable you to use various data formats for different scenarios. Although
    traditional normalized relational format is battle-tested and proven as optimal
    technology for a wide range of different scenarios, in some cases, you might find
    that some other formats might be the better fit for the problem that you are solving.


    One common example is denormalization. Traditionally, you are representing domain
    objects as a set of tables in the so-called *normal form* described in the previous
    chapters. This is a well-known database design technique where every complex domain
    structure, such as list or array, is placed in a separate table. The normalized
    model is optimal for highly concurrent workloads where many threads simultaneously
    update and read different parts of the domain object without affecting the threads
    that are updating other parts. However, if you have a workload where one thread
    accesses a single object at a time, a highly normalized database might force you
    to join a lot of tables to reconstruct the domain object from its physical parts.
    In this case, you might consider serializing the object as a single unit instead
    of decomposing it.


    `Azure SQL` enables you to use both relational and non-relational structures in
    the same physical data model.


    The ability to work with relational, structured, or several types of semi-structured
    formats categorizes `Azure SQL` as a Multi-Model database. If you visit [`https://db-engines.com/en/ranking`](https://db-engines.com/en/ranking)
    site that scores popularity of databases, you might notice that all highly ranked
    relational databases are also classified as multi-model databases, because supporting
    various data formats is a must-have requirement for all modern database systems.'
