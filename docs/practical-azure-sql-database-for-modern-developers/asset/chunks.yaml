  trans: '

    ## 内存优化表


    现在你已经理解了内存优化技术的主要优势，我们可以开始使用它们了。你可以通过将表标记为内存优化来利用其功能：


    ```

    CREATE TABLE dbo.Cache

    (

    [key] INT IDENTITY PRIMARY KEY NONCLUSTERED,

    data NVARCHAR(MAX)

    )

    WITH (MEMORY_OPTIMIZED=ON)

    ```


    你唯一需要做的更改是添加一个包含属性 `MEMORY_OPTIMIZED=ON` 的 `WITH` 子句。启用此属性后，数据行将始终保留在内存中，不再使用数据页，并且会在表数据上启用乐观并发等内存优化功能。


    内存优化表有三种类型：


    *   内存优化非持久仅限架构的表。这些表与临时表非常相似。表架构在重启或可能的系统崩溃后将被保留。Azure SQL 会在重启后重新创建表结构，但不会保留内容。这些表的主要用途是缓存场景（如
    ASP.NET 会话状态）、作为复杂数据处理的中间存储以及数据的快速加载（即所谓的暂存表）。


    *   内存优化持久表，其架构和数据即使在进程崩溃或故障转移后也会被保留。Azure SQL 将确保将最小信息集发送到日志并持久化，因此数据能在系统崩溃后得以保留。这些表在逻辑上等同于带有内存优化增强功能的经典表，用于提升现有行存储表的性能。


    *   内存优化列存储表是列存储结构与内存优化表的结合。其主要场景是在同一张表上结合分析型和事务型负载。这种组合被称为混合事务分析处理。


    在下面的示例中，你可以看到如何创建一个用作缓存的内存优化表：


    ```

    CREATE TABLE dbo.Cache

    (

    [key] INT IDENTITY PRIMARY KEY NONCLUSTERED,

    data NVARCHAR(MAX)

    )

    WITH (MEMORY_OPTIMIZED=ON, DURABILITY=SCHEMA_ONLY)

    ```


    你可能会疑惑，既然有其他专门的解决方案（如 Redis 或 Cosmos DB）通常更适合缓存，为何还要使用 Azure SQL 内存优化表来创建缓存解决方案。请记住，软件开发中最好的建议之一就是保持简单。如果你的项目已经在使用
    Azure SQL，能够直接在数据库中创建自定义的事务性缓存机制，而无需借助其他技术，可以大大简化你的解决方案，同时降低维护成本，因为你无需学习和维护另一门技术。除此之外，内存优化表还与
    Azure SQL 的所有其他功能深度集成。例如，你可以结合行级安全和内存优化表来创建安全的缓存解决方案。


    你可以使用两个 `WITH` 选项来定义数据是否即使在数据库崩溃时也会被持久化：


    *   `DURABILITY=SCHEMA_ONLY` 定义非持久表，如果 Azure SQL 数据库重启，只有表结构会被重新创建。


    *   `DURABILITY=SCHEMA_AND_DATA` 定义持久表，表结构和数据在故障转移或崩溃后都会保留。


    内存优化表的列存储格式必须通过在内存优化表内定义聚集列存储索引来指定，如下例所示：


    ```

    CREATE TABLE Accounts (

    AccountKey int NOT NULL PRIMARY KEY NONCLUSTERED,

    Description nvarchar (50),

    Type nvarchar(50),

    UnitSold int,

    INDEX cci CLUSTERED COLUMNSTORE

    ) WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA)

    ```


    列存储内存优化表结合了双方的优势——能够将数据放入内存的极快分析和压缩能力，以及内存优化表提供的高并发和极快的数据摄入与更新能力。这里唯一的风险是你可以处理的数据量。经典的列存储索引在内存中分析所有数据；但是，如果列段无法放入内存，它允许你将它们保留在磁盘上。而内存优化列存储则要求所有数据必须驻留在内存中。由于
    Azure SQL 会为内存优化数据保留大约 60% 的可用内存，你需要确保你的数据能够放得下。考虑到在列存储分析场景中我们讨论的是大量数据，如果你不确定数据能否全部放入内存，请使用基于磁盘的表。


    因此，内存优化聚集列存储索引覆盖的是一个特定的利基场景。事实上，对于 HTAP 场景，通用方法通常是使用带有 NCCI 索引的经典行存储表，而内存优化聚集列存储索引仅用于对性能要求极高的负载。例如，如果你需要能够每秒处理多达
    500 万行数据，就像本章最后引用的文章《使用 M 系列 Azure SQL 数据库扩展 IoT 工作负载》中所描述的那样，你将肯定需要用到内存优化聚集列存储索引。


    当我们讨论内存优化存储时，无法将索引排除在这个讨论之外。内存中的行是分散在内存空间中的对象，需要一些结构将它们绑定在一起。这些结构就是索引。每当你创建一个内存优化表时，你至少需要拥有一个索引。


    在前面的例子中，你看到了 `NONCLUSTERED` B 树索引和 `CLUSTERED COLUMNSTORE` 索引。还有另一种特定于内存优化表的索引类型，即
    `NONCLUSTERED HASH` 索引，如下例所示：


    ```

    CREATE TABLE [dbo].Employees WITH (BUCKET_COUNT = 100000),

    [EmpName] varchar NOT NULL,

    [EmpAddress] varchar NOT NULL,

    [EmpDEPID] [int] NOT NULL,

    [EmpBirthDay] [datetime] NULL

    ) WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA)

    ```


    `NONCLUSTERED HASH` 索引是一个内存中的哈希表，它使用列值作为键（本例中是 `EmpID`），并包含一个指向表中实际行的指针列表。每个哈希表由固定数量的槽（哈希桶）组成，每个槽包含一个指向实际行的指针数组。具有相同哈希值的行指针被链接成一个列表，代表它自己的哈希桶。


    桶计数必须在创建索引时指定，并影响每个桶中指针列表的长度。不同键值的数量与哈希桶数量的比率代表了预期的平均桶链表长度。链表越长，基于键查找行所需的操作就越多。


    桶计数应在索引键中不同值数量的 1 到 2 倍之间。实际上，很难估算列中不同值的数量；但是，如果 `BUCKET_COUNT` 的值在索引列中实际值数量的
    10 倍以内，你将获得良好的性能。请注意，高估通常比低估要好。如果一段时间后你发现比率不佳，你可以随时用新的桶计数重建索引。

    '
- fmt: '### Accessing memory-optimized tables


    Another advantage of memory-optimized tables is the fact that they can be accessed
    like any other classic table. You can use the same Transact-SQL queries to join
    memory-optimized tables, Columnstore table, and classic Hobits.


    Interoperability between the different features such as Columnstore, memory-optimized
    tables, JSON, and graphs is one of the core value propositions of Azure SQL. Any
    feature that is specific or optimized for some scenario will have the same or
    similar access methods.


    Memory-optimized tables use optimistic concurrency control that quickly creates
    a new version of row whenever some transaction updates it. This way, transactions
    that update data are getting their own private version of row without getting
    blocked by readers or blocking other writers.


    Three rows are shown in Figure [9-6](#493913_1_En_9_Chapter.xhtml#Fig6): `r1`
    with three versions, `r2` with two versions, and `r3` with four versions. Every
    version is created by some transaction that updates the row. Note that there are
    no 8KB boundaries around the rows so there is no risk that updating one row might
    affect others..


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig6_HTML.jpg](images/493913_1_En_9_Chapter/493913_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    New row version is created whenever some transaction updates the row


    This row versioning has some implications on some transaction isolation levels
    used in Azure SQL. Disk-based tables enable you to read the temporary uncommitted
    values of the rows if you are sure that this is what you want and bypass the locks.
    This is not possible in memory-optimized tables because there can be multiple
    uncommitted copies of the same row and Azure SQL doesn''t know which of these
    versions you would like to use.


    Also reading committed rows is not as easy as with regular tables. If you would
    like to read committed rows, your transaction would always need to check if the
    current row is really the latest or if there is some transaction that committed
    a new public version. This might be huge performance overhead that you surely
    want to avoid.


    The solution is to use a committed version of a row at the time of beginning your
    transaction, which looks like a snapshot of table data. The transaction isolation
    level that works with snapshot of data at the beginning of a transaction is called
    `SNAPSHOT` isolation level.


    If you need to use `READ COMMITTED` or `READ UNCOMMITTED` transaction isolation
    levels, you should explicitly put the snapshot isolation hint on the memory-optimized
    table to override it just for this table:


    ```sql

    SET TRANSACTION ISOLATION LEVEL READ COMMITTED;

    GO

    BEGIN TRANSACTION;  -- Explicit transaction.

    -- Employees is a memory-optimized table.

    SELECT * FROM

    dbo.Employees  as o  WITH (SNAPSHOT)  -- Table hint.

    COMMIT TRANSACTION;

    ```


    `WITH(SNAPSHOT)` hint instructs Azure SQL to interpret the values in the table
    as a snapshot of the data state at the time of execution. This isolation level
    ignores the changes that might occur in the meantime. This hint will prevent the
    error with code `41368` in other isolation modes.


    As an alternative to query hint, you can use the database option that will automatically
    elevate isolation level on memory-optimized tables to snapshot if needed:


    ```sql

    ALTER DATABASE current

    SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON;

    ```


    If you properly set up transaction isolation level, there are no big limitations
    in DML statements that you can use to query memory-optimized tables.


    ### Natively compiled code


    Azure SQL interprets the batches of T-SQL code that you use to work with data.
    This means that the query batches (one or more T-SQL statements) are parsed, then
    every query in the batch is compiled into an Execution Plan, which is broken down
    into operators (e.g., scan, join, sort), and the operators are executed to fetch
    or update the rows. This strategy of query processing might be a big bottleneck
    while working with memory-optimized data. Although you have data available in
    memory and minimal locks, chains of operators will still use classic mechanisms
    to fetch row by row and process it.


    Azure SQL enables you to use natively compiled modules to improve performance
    of your T-SQL code. You can imagine natively compiled modules in Azure SQL Database
    like customized C programs – yes, that’s right, C programs! – that process your
    data. Transact-SQL code will be pre-compiled into native .dll – dynamically linked
    libraries – and then executed by the Azure SQL engine to operate on data. Imagine
    that you have an API that accesses memory rows as lists or iterators and that
    you want to create a C code that iterates through the rows and applies some processing
    (similar to LINQ queries in .NET technology). This would probably be the faster
    way to work with data, but it might be hard to write this.


    As writing C modules to manipulate data is not an easy task, in order to remove
    complexity and still enable you to boost performance, Azure SQL Database allows
    you to declaratively write standard T-SQL code that accesses rows in memory-optimized
    tables. This T-SQL code will be translated into the equivalent C code that accesses
    table rows using internal API and compiled into native executable that will be
    executed in Azure SQL database process. This way, you are still expressing what
    you want to do using T-SQL code, and Azure SQL Database handles all complexity
    of accessing API via C language, unlocking extreme performances.


    Azure SQL enables you to write SQL procedures, functions, and Triggers that will
    be compiled into native executables. Natively compiled code might be orders of
    magnitude faster than classic counterparts. The only limitation is that they can
    access only memory-optimized tables and use a subset of T-SQL language.


    Natively compiled Stored Procedures are a commonly used approach to access and
    modify memory-optimized table data. A template that represents natively compiled
    Stored Procedure is shown in the following example:


    ```sql

    CREATE PROCEDURE myProcedure(@p1 int NOT NULL, @p2 nvarchar(5))

    WITH NATIVE_COMPILATION, SCHEMABINDING

    AS BEGIN ATOMIC WITH

    (TRANSACTION ISOLATION LEVEL = SNAPSHOT,

    LANGUAGE = N''us_english'')

    /* Procedure code goes here */

    END

    ```


    Any T-SQL code that is placed in the body of this procedure will be parsed, and
    the equivalent C code will be generated and compiled into a small dynamically
    linked library (.dll) file.


    Two main components of natively compiled procedures are


    *   `WITH` clause that defines procedure properties such as marking procedure
    as natively compiled and specifying schema binding. Schema binding means that
    the tables referenced by the Stored Procedure cannot be altered as long as the
    procedure exists. These are the only required options, but you can also specify
    others such as `EXECUTE AS` and so on.


    *   `ATOMIC` block representing a unit of work that will be either processed or
    canceled. In the atomic block, you need to specify options such as isolation level
    or language because these settings will be compiled into the dynamically linked
    library.


    Azure SQL enables you to write natively compiled functions and Triggers. One example
    of a natively compiled function is shown in the following listing. This function
    gets a string formatted as JSON text, parses it, and returns the properties from
