    return json.dumps(order_list)

    Listing 3-3

    Create a simple Python application

    ```


    In this Python Flask function (you can find the complete app in the companion
    GitHub repo), *pyodbc* module plays a central role. It provides a wrapper around
    ODBC driver and higher-level abstractions like connection, cursor, and row, which
    let you both execute commands and iterate on results. Rows are then transformed
    into a list of ordered dictionaries and returned as a JSON fragment to function
    callers. In pure Pythonic spirit, *pyodbc* represents a pretty efficient and straightforward
    method for accessing Azure SQL database instances from your Python programs.


    As we mentioned previously, *tedious* is the driver you can use to connect to
    Azure SQL from Node.JS applications. Let’s take a look at a simple function that
    executes a query and converts a resultset into a JSON array that can be returned,
    for example, as REST API result.


    ```

    exports.getorders = function(req, res) {

    const { Connection, Request } = require("tedious");

    const config = {

    server: ".database.windows.net",

    options: {

    database: "WideWorldImporters-Full",

    encrypt: true},

    authentication: {

    type: "default",

    options: {

    userName: "username",

    password: "password",

    }

    }

    };

    const connection = new Connection(config);

    connection.on("connect", err => {

    if (err) {

    console.error(err.message);

    } else {

    getOrders();

    }

    });

    function getOrders() {

    var data = []

    const request = new Request(

    `SELECT TOP 5 [o].[OrderID],

    [o].[OrderDate], [c].[CustomerName]

    FROM [Sales].[Orders] AS [o]

    INNER JOIN [Sales].[Customers] AS [c]

    ON [o].[CustomerID] = [c].[CustomerID]`,

    (err, rowCount) => {

    if (err) {

    console.error(err.message);

    }

    else {

    res.send(data)

    }

    }

    );

    request.on("row", function(row) {

    data.push({

    orderid: row[0].value,

    orderdate: row[1].value,

    customername: row[2].value

    })

    });

    connection.execSql(request);

    }

    };

    Listing 3-4

    Node.JS function returning JSON array from database

    ```


    As seen in previous examples for other programming languages, the Connection and
    Request objects play a central role for opening a new connection to the database,
    executing a command, and retrieving results (you can find the complete working
    example in the companion GitHub repo). These two objects offer all properties
    and capabilities to cover most common scenarios, from defining parameterized queries
    to transaction management or bulk loads.


    This section doesn’t cover all available drivers and libraries but provides a
    representative overview of how applications are typically connecting with Azure
    SQL and can definitely be applied to other drivers not mentioned here. Moving
    forward, we will focus on advanced and specific scenarios that are critical for
    your application’s data access layer.'
