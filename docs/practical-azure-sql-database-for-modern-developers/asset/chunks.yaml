- fmt: '## The growth mindset


    In 2006, the psychologist Carol Dweck published a book titled *Mindset: The New
    Psychology of Success* where she introduced the idea of the *growth mindset*.
    She describes that people who understand that talent and abilities can be developed,
    acquired, and improved through continuous effort, learning, and persistence, despite
    failure and setbacks, are more likely to succeed than those who instead have a
    *fixed mindset*. People with a fixed mindset work to defend the reached status
    quo, trying to show no weakness and always showing off like there are no challenges
    or failures, as they already know a lot, if not everything.


    A fixed mindset cannot work in today’s ever-changing world.


    On the opposite, the growth mindset idea goes perfectly hand in hand with the
    Agile methodology and the more general idea that key to success is the ability
    to *embrace changes*. The ability to keep learning and to be able to adapt to
    new situations is at the foundation of the ability of embracing changes. Of course,
    this doesn’t happen overnight, and failures, and what comes as a learning from
    them, are part of such a process as much as success is.


    This approach also brings another important behavior to the table: the ability
    to constantly check if what we have learned so far, or even our beliefs, are still
    true and applicable.


    As you can now imagine, everything just described, which at first glance may seem
    completely out of place in a technical book like this, is instead much more profound
    and interconnected with a developer’s everyday life, as in the cloud changes are
    constantly happening. The ability to deal with such a high rate of change becomes
    one of the primary traits of a good developer.


    Is not by chance, in fact, that within Microsoft the idea of a “growth mindset”
    is pervasive: it is needed to evolve, grow, and stay competitive.


    It wasn’t until one of the authors joined Microsoft, where he learned about the
    growth mindset, that he realized while some developers always have this mindset,
    others don''t. And this is especially true for everything that’s related to data
    and databases. Developers usually don’t like databases that much and simply try
    to deal with it in the simplest and quickest possible way, if they deal with it
    at all.


    But in the information age, it should be quite clear that data, and then information
    and then in turn knowledge, are the center of gravity of everything we build and
    do for a living. The ability to efficiently manipulate data will immediately turn
    a developer into a *better developer*.


    A growth mindset is a way to start to look at this challenge. But how is that
    applicable to development? How can anyone be a *better developer*? Why is this
    important and, above all, what this has to do with Azure SQL?


    Let’s try to give some answers.


    ### Reviewing old beliefs


    “The relational model is old and doesn’t scale.” “You need to use some new paradigm
    to be able to scale at cloud level.” Or even, “You can’t deal with more than a
    few millions of rows of data in a relational database.” No matter if you’re a
    new developer born in the cloud or a veteran that has assembled his or her first
    computer on its own and still know what a *nibble* is, chances that you have heard
    the aforementioned sentences are pretty high.


    Now, since someone said them, or even wrote books and blogs about it, they must
    be true. Well, they may have been true at some point in time, something like 40
    years ago. Time has passed since then, and so it is time to check if such beliefs
    and myth are still true.


    Well: no. Azure SQL evolved from SQL Server that through the years had so many
    improvements and upgrades that if you weren’t really focused on the data space,
    you may have missed them. From a developer point of view, you still deal with
    tables and columns – and this is already not entirely true to be honest, as you’ll
    learn in the next chapters – but behind the scenes the database engine has been
    updated so much that, as the well-known SQL Server guru Bob Ward said, “SQL Server
    2019 is not your Grandpa SQL Server” ([`https://aka.ms/ssnygss`](https://aka.ms/ssnygss)).


    Just to mention a few of the amazing features that are now available in SQL Server
    and thus Azure SQL, you can find columnstore tables where data is saved in a highly
    compressed, column-structured format that enables fast vector computations using
    AVX and SIMD instructions (yes, the same used by videogames); lock-free structures
    are also available where locking is not used to keep data consistent, but something
    much more advanced like Multi-Value Concurrency Control (MVCC) where the same
    data can exist at the same moment in different versions, depending on how the
    observer is interacting with it; tables can automatically keep track of all changes
    that happen on the data they hold, even allowing for “as-of” queries, literally
    allowing a query to travel back in time; JSON documents and graph models are available
    and deeply integrated with the query optimizer, a marvel of human engineering,
    that is able to optimize the execution of any query for you, taking into account
    how much data there is in a table, what are the resources available, and what
    are the possible alternatives to reach the best performance goal.


    All these features - and more - also come with the ability to run at scale. Cloud
    scale. Several of the most used websites, online and mobile games and applications,
    if fact, use Azure SQL every day, scaling to serve millions of users worldwide.


    Azure SQL offers a lot of features that you should check out to make sure you
    are not reinventing the wheel every time.


    But this is only half of the picture.'
