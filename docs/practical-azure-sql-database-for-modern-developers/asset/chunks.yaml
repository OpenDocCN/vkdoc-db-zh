    Azure SQL is a modern multi-model database platform that enables you to use different
    data formats and combine them in order to design the best data model that will
    match the requirements of your domain. Depending on your scenario, you can represent
    relations as classic foreign key relationships or graph nodes/edges. Semi-structured
    data can be stored in JSON, Spatial, or XML columns.


    You just learned how you can use all these features. It’s now time to discuss
    why and when.


    One of the biggest advantages of Azure SQL is interoperability between core database
    features and multi-model capabilities. You can easily combine Columnstore with
    graphs or JSON data to get high-performance analytics capabilities on graph/JSON
    data, built-in language processing rules to customize application for any market,
    use all features that T-SQL language provides to create any query or powerful
    report, and integrate it with a variety of tools that understand T-SQL.


    With Azure SQL, you are getting the core functionalities that other NoSQL databases
    provide, plus a lot of standard relational database functionalities that can be
    easily integrated with NoSQL features. This is the most important reason why you
    should choose the multi-model capabilities of Azure SQL.


    So, should you choose Azure SQL with its multi-model capabilities or some specialized
    NoSQL Database engine that has more advanced features in these areas? That’s a
    very interesting – and not easy – question to answer.


    Azure SQL is not a NoSQL database. If you have a classic NoSQL scenario that requires
    advanced graph or document support and you don’t expect to have to deal with other
    data that would otherwise be better stored into a table, then you should surely
    evaluate full-fledged graph or document databases such as Azure Cosmos DB, MongoDB,
    Neo4j, and so on. These database engines are fully oriented on NoSQL scenarios
    and have implemented richer and more advanced NoSQL features. They address a very
    specific area and they are extremely good at it.


    The most important question that you need to ask yourself is what kind of additional
    NoSQL functionalities would your application need. Both Azure SQL and NoSQL database
    engines provide similar levels of fundamental graph and document processing functionalities
    (e.g., inserting, modifying, indexing, and searching). If you need more than these
    basic features, Azure SQL gives you an ability to leverage advanced querying using
    T-SQL, Columnstore technology for analytic, built-in machine learning capabilities
    with R/Python support, collations, replication mechanisms, and other functionalities
    that are proven as necessary in most of the real-world application. If you believe
    that these functionalities might be important for your application, then Azure
    SQL is the right choice for you.


    ## If you want to know more


    Lots of concepts and technologies have been discussed in this chapter. As usual,
    if you want to know more, you can find more food for your brain here:


    *   Multi-model capabilities of Azure SQL Database & SQL Managed Instance – [`https://docs.microsoft.com/azure/azure-sql/multi-model-features`](https://docs.microsoft.com/en-us/azure/azure-sql/multi-model-features)


    *   Dapper.Stream – [`https://github.com/JocaPC/Dapper.Stream/`](https://github.com/JocaPC/Dapper.Stream/)


    *   JSON Data in SQL Server – [`https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server)


    *   Getting started with JSON features in Azure SQL – [`https://docs.microsoft.com/azure/azure-sql/database/json-features`](https://docs.microsoft.com/en-us/azure/azure-sql/database/json-features)


    *   Graph processing with SQL Server and Azure SQL – [`https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-overview`](https://docs.microsoft.com/en-us/sql/relational-databases/graphs/sql-graph-overview)


    *   Spatial Data – [`https://docs.microsoft.com/sql/relational-databases/spatial/spatial-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/spatial/spatial-data-sql-server)


    *   Spatial Indexes Overview – [`https://docs.microsoft.com/sql/relational-databases/spatial/spatial-indexes-overview`](https://docs.microsoft.com/en-us/sql/relational-databases/spatial/spatial-indexes-overview)


    *   World Geodetic System (WGS84) – [`https://gisgeography.com/wgs84-world-geodetic-system/`](https://gisgeography.com/wgs84-world-geodetic-system/)


    *   Full-Text Search – [`https://docs.microsoft.com/sql/relational-databases/search/full-text-search`](https://docs.microsoft.com/sql/relational-databases/search/full-text-search)


    # 9. More Than Tables


    In the previous chapter, we learned about the Hobits (HoBT, Heap or B-Tree) –
    classic tables and indexes that are the most common objects in relational databases.
    In this chapter, you will learn about some special types of tables and indexes
    that can help you to build better designs for certain scenarios. Objects that
    will be explained in this chapter are:


    *   Columnstore structures that can improve performance of your reporting and
    analytic workloads


    *   Memory-optimized tables that can improve your OLTP workloads with CRUD-like
    actions


    *   Temporal tables that can preserve the entire history of the changes you made
    and enable you to perform historical and time travel analysis of data'
  trans: '# Azure SQL 中的多模型：为何以及何时使用


    Azure SQL 是一个现代化的多模型数据库平台，它使您能够使用不同的数据格式并将它们组合起来，从而设计出最符合您领域需求的最佳数据模型。根据您的具体场景，您可以将关系表示为经典的外键关系或图的节点/边。半结构化数据可以存储在
    `JSON`、`空间` 或 `XML` 列中。


    你刚刚了解了如何使用所有这些功能。现在是时候讨论**为什么**以及**何时**使用了。


    Azure SQL 最大的优势之一是其核心数据库功能与多模型能力之间的互操作性。您可以轻松地将 `列存储` 与图或 `JSON` 数据结合，从而获得对图/`JSON`
    数据的高性能分析能力，利用内置的语言处理规则为任何市场定制应用程序，使用 `T-SQL` 语言提供的所有功能来创建任何查询或强大的报告，并将其与理解 `T-SQL`
    的各种工具集成。


    通过 Azure SQL，您不仅能获得其他 `NoSQL` 数据库提供的核心功能，还能获得大量标准的数据库功能，这些功能可以轻松地与 `NoSQL` 特性集成。这是您应该选择
    Azure SQL 多模型功能的最重要原因。


    那么，您应该选择具备多模型能力的 Azure SQL，还是选择在这些领域具有更高级功能的专用 `NoSQL` 数据库引擎呢？这是一个非常有趣——并且不容易——回答的问题。


    Azure SQL 并非一个 `NoSQL` 数据库。如果您有一个经典的 `NoSQL` 场景，需要高级的图或文档支持，并且您不期望需要处理其他更适合存储在表中的数据，那么您当然应该评估成熟的图或文档数据库，例如
    Azure Cosmos DB、MongoDB、Neo4j 等。这些数据库引擎完全面向 `NoSQL` 场景，并实现了更丰富、更高级的 `NoSQL` 功能。它们针对一个非常特定的领域，并且在这方面表现得极其出色。


    您需要问自己的最重要问题是，您的应用程序需要哪些额外的 `NoSQL` 功能。Azure SQL 和 `NoSQL` 数据库引擎都提供类似级别的基本图和文档处理功能（例如，插入、修改、索引和搜索）。如果您需要的不仅仅是这些基础功能，Azure
    SQL 让您能够利用 `T-SQL` 进行高级查询，使用 `列存储` 技术进行分析，通过 `R`/`Python` 支持利用内置机器学习功能，以及使用排序规则、复制机制和其他在大多数现实世界应用中被证明必要的功能。如果您认为这些功能对您的应用程序可能很重要，那么
    Azure SQL 是您的正确选择。


    ## 想了解更多


    本章讨论了许多概念和技术。一如既往，如果您想了解更多，可以在这里找到更多精神食粮：


    *   Azure SQL 数据库和 SQL 托管实例的多模型功能 – [`https://docs.microsoft.com/azure/azure-sql/multi-model-features`](https://docs.microsoft.com/azure/azure-sql/multi-model-features)

    *   `Dapper.Stream` – [`https://github.com/JocaPC/Dapper.Stream/`](https://github.com/JocaPC/Dapper.Stream/)

    *   SQL Server 中的 `JSON` 数据 – [`https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server)

    *   Azure SQL 中的 `JSON` 功能入门 – [`https://docs.microsoft.com/azure/azure-sql/database/json-features`](https://docs.microsoft.com/azure/azure-sql/database/json-features)

    *   使用 SQL Server 和 Azure SQL 进行图处理 – [`https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-overview`](https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-overview)

    *   空间数据 – [`https://docs.microsoft.com/sql/relational-databases/spatial/spatial-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/spatial/spatial-data-sql-server)

    *   空间索引概述 – [`https://docs.microsoft.com/sql/relational-databases/spatial/spatial-indexes-overview`](https://docs.microsoft.com/sql/relational-databases/spatial/spatial-indexes-overview)

    *   世界大地测量系统 (`WGS84`) – [`https://gisgeography.com/wgs84-world-geodetic-system/`](https://gisgeography.com/wgs84-world-geodetic-system/)

    *   全文搜索 – [`https://docs.microsoft.com/sql/relational-databases/search/full-text-search`](https://docs.microsoft.com/sql/relational-databases/search/full-text-search)


    # 9. 不仅仅是表格


    在上一章中，我们学习了 `Hobits` (`HoBT`，堆或 B 树)——关系数据库中最常见的对象：经典表和索引。在本章中，您将学习一些特殊类型的表和索引，它们可以帮助您为特定场景构建更好的设计。本章将要解释的对象包括：


    *   `列存储` 结构，可以提升您的报告和分析工作负载的性能

    *   内存优化表，可以通过类似 `CRUD` 的操作提升您的 `OLTP` 工作负载性能

    *   时态表，可以保存您所做更改的完整历史记录，并使您能够对数据进行历史和时间旅行分析'
- fmt: '# Columnstore format


    Rowstore format is the default storage format for tables in Azure SQL, and it
    is proven as an optimal structure for most general-purpose workloads. In rowstore
    format, the cell values belonging to a single row are physically placed close
    together in fixed-size 8KB structure called `pages` .^([²](#fn2)) This is a good
    solution if you should execute the queries that select or update the entire row
    or a set of rows. If you run the queries like `SELECT * FROM <table> WHERE <condition>`
    , where the `<condition>` predicate will select a single row or a small set of
    rows, the rowstore format is an excellent choice. Once the database engine locates
    the 8KB pages where the row(s) is placed, most of the data will be on that page
    and loaded with a single data page access.


    However, this is not the best solution in analytical and reporting queries that
    scan many rows like the one shown in the following listing:


    ```sql

    SELECT State, AVG(Price)

    FROM Sales.Products

    GROUP BY State

    ```


    In this type of analytical and reporting query, we need to access just two columns
    from all rows to calculate the result. Even in the presence of a Clustered Index
    , which would help to keep related data physically close to each other, a lot
    of resources will be put in loading data from unneeded columns: as obvious, this
    will have a negative impact on query performances.


    It''s important to highlight that since a database is usually a very concurrent
    system, the fact that Azure SQL loads into memory data that it doesn''t need at
    all may not necessarily be a bad thing, as this will help other queries to have
    that data already in memory, and thus they will have better performance. As memory
    is a very limited resource, compared to disk space, it''s important to understand
    what are the typical workload patterns for your system, so that every recommendation
    or best practice can be put into your system perspective. Especially with databases
    that cannot be optimized only for reads or for writes, finding the best balance
    is the key goal for developers and DBAs.


    Columnstore format is used in many analytical systems to improve performance in
    these scenarios. In Columnstore format, the cells are physically grouped together
    in column `segments` . Column segment is a physically close set of all values
    from a single column. The table is physically represented as a set of column segments
    instead of a set of rows. The difference between rowstore and Columnstore formats
    is shown in Figure [9-1](#493913_1_En_9_Chapter.xhtml#Fig1).


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig1_HTML.jpg](images/493913_1_En_9_Chapter/493913_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Rowstore format is optimal when a query needs to access all values from single
    or few rows (on left), while columnstore is optimal when the query accesses all
    values from single or few columns (on right)


    In the rowstore format shown on the left side, a reporting query would need to
    go through all rows in the table, read every page, and take two out of ten columns
    in each row to calculate the result. This means that a query that uses two out
    of ten columns will roughly use only 20% of memory pages that need to read. If
    you have a table where you are using just the smaller columns for analysis, but
    you have big `NVARCHAR` columns in the row that will be discarded by the query,
    as they are not used in the specific query, the efficiency is even worse because
    `NVARCHAR` columns will occupy more space as their memory pages that must be fetched
    and discarded.


    This might be a problem in memory caching architectures where underlying hardware
    takes the pages from the lower-level caches (or storage) to the higher-level memory
    caches because most of the data movement is in vain. Although that might look
    like a micro-optimization, you can see huge performance issues if you try to run
    these kind of queries on hundreds of thousands of rows already. Years of analysis
    and real-world experience show that the rowstore technology is not suitable for
    high-performance analytics and reporting.


    Let''s now focus on the Columnstore representation of the rows on the right side
    of Figure [9-1](#493913_1_En_9_Chapter.xhtml#Fig1). All values per column are
    physically grouped together. This means that the reporting query would easily
    pick up two columns that are necessary to compute the result and read only these
    values. Other values in the different columns are not used at all, and maybe they
    are even not in memory. Since the full-scan queries need to read all values from
    all or the majority of rows, the efficiency of memory read is close to 100%. All
    values within the same column are physically placed close to each other, and all
    of them will be read and used by the query. This significantly boosts performance
    of analytical queries. It''s actually quite common to see performance improvements
    of 10 or 100 times the original times based on rowstore.


    There is another optimization that can be leveraged in this case. All modern processors
    support `SIMD` (Single Instruction Multiple Data) operations that can extremely
    efficiently apply one operation on all elements in the memory array. If the storage
    organization enables us to provide a continuous array of cells that needs to be
    processed, `SIMD` instruction can apply a single operation on all values in the
    column segment. This is known as `batch mode execution` , and it is much more
    efficient than classic row-by-row processing.


    High data compression is another very convenient feature of Columnstore format.
    Columnstore structures might leverage the fact that the cell values that are stored
    together in column segments are similar. This characteristic enables Columnstore
    to apply various compression algorithms on the cells, such as:


    -   NULL-Values elimination – If there is a large percentage of missing values
    in the cells, Columnstore will just avoid storing these rows.

    -   Duplicate elimination – If a column has many identical values, Columnstore
    can record only one value and just mark the range of rows where this value occurs.
    This technique is also known as Run-Length Encoding.

    -   Dictionary normalization – String and other discrete values are placed in
    internal key-value dictionaries per column segment. Keys are placed in column
    segments instead of actual values.


    In addition to these strategies, entire segments can be compressed which can additionally
    save space. This is a common technique for the archival of data that is not commonly
    used but must stay in the database.


    These are generic characteristics and advantages of columnstore format. In the
    following sections, you will learn about the specific implementation of Columnstore
    format in Azure SQL.'
  raw: '## Columnstore format


    Rowstore format is the default storage format for tables in Azure SQL, and it
    is proven as an optimal structure for most general-purpose workloads. In rowstore
    format, the cell values belonging to a single row are physically placed close
    together in fixed-size 8KB structure called *pages* .^([²](#fn2)) This is a good
    solution if you should execute the queries that select or update the entire row
    or a set of rows. If you run the queries like `SELECT * FROM <table> WHERE <condition>`,
    where the `<condition>` predicate will select a single row or a small set of rows,
    the rowstore format is an excellent choice. Once the database engine locates the
    8KB pages where the row(s) is placed, most of the data will be on that page and
    loaded with a single data page access.


    However, this is not the best solution in analytical and reporting queries that
    scan many rows like the one shown in the following listing:


    ```

    SELECT State, AVG(Price)

    FROM Sales.Products

    GROUP BY State

    ```


    In this type of analytical and reporting query, we need to access just two columns
    from all rows to calculate the result. Even in the presence of a Clustered Index
    , which would help to keep related data physically close to each other, a lot
    of resources will be put in loading data from unneeded columns: as obvious, this
    will have a negative impact on query performances.


    It’s important to highlight that since a database is usually a very concurrent
    system, the fact that Azure SQL loads into memory data that it doesn’t need at
    all may not necessarily be a bad thing, as this will help other queries to have
    that data already in memory, and thus they will have better performance. As memory
    is a very limited resource, compared to disk space, it’s important to understand
    what are the typical workload patterns for your system, so that every recommendation
    or best practice can be put into your system perspective. Especially with databases
    that cannot be optimized only for reads or for writes, finding the best balance
    is the key goal for developers and DBAs.


    Columnstore format is used in many analytical systems to improve performance in
    these scenarios. In Columnstore format, the cells are physically grouped together
    in column *segments* . Column segment is a physically close set of all values
    from a single column. The table is physically represented as a set of column segments
    instead of a set of rows. The difference between rowstore and Columnstore formats
    is shown in Figure [9-1](#493913_1_En_9_Chapter.xhtml#Fig1).


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig1_HTML.jpg](images/493913_1_En_9_Chapter/493913_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Rowstore format is optimal when a query needs to access all values from single
    or few rows (on left), while columnstore is optimal when the query accesses all
    values from single or few columns (on right)


    In the rowstore format shown on the left side, a reporting query would need to
    go through all rows in the table, read every page, and take two out of ten columns
    in each row to calculate the result. This means that a query that uses two out
    of ten columns will roughly use only 20% of memory pages that need to read. If
    you have a table where you are using just the smaller columns for analysis, but
    you have big `NVARCHAR` columns in the row that will be discarded by the query,
    as they are not used in the specific query, the efficiency is even worse because
    `NVARCHAR` columns will occupy more space as their memory pages that must be fetched
    and discarded.


    This might be a problem in memory caching architectures where underlying hardware
    takes the pages from the lower-level caches (or storage) to the higher-level memory
    caches because most of the data movement is in vain. Although that might look
    like a micro-optimization, you can see huge performance issues if you try to run
    these kind of queries on hundreds of thousands of rows already. Years of analysis
    and real-world experience show that the rowstore technology is not suitable for
    high-performance analytics and reporting.


    Let’s now focus on the Columnstore representation of the rows on the right side
    of Figure [9-1](#493913_1_En_9_Chapter.xhtml#Fig1). All values per column are
    physically grouped together. This means that the reporting query would easily
    pick up two columns that are necessary to compute the result and read only these
    values. Other values in the different columns are not used at all, and maybe they
    are even not in memory. Since the full-scan queries need to read all values from
    all or the majority of rows, the efficiency of memory read is close to 100%. All
    values within the same column are physically placed close to each other, and all
    of them will be read and used by the query. This significantly boosts performance
    of analytical queries. It''s actually quite common to see performance improvements
    of 10 or 100 times the original times based on rowstore.


    There is another optimization that can be leveraged in this case. All modern processors
    support SIMD (Single Instruction Multiple Data) operations that can extremely
    efficiently apply one operation on all elements in the memory array. If the storage
    organization enables us to provide a continuous array of cells that needs to be
    processed, SIMD instruction can apply a single operation on all values in the
    column segment. This is known as *batch mode execution* , and it is much more
    efficient than classic row-by-row processing.


    High data compression is another very convenient feature of Columnstore format.
    Columnstore structures might leverage the fact that the cell values that are stored
    together in column segments are similar. This characteristic enables Columnstore
    to apply various compression algorithms on the cells, such as:


    *   NULL-Values elimination – If there is a large percentage of missing values
    in the cells, Columnstore will just avoid storing these rows.


    *   Duplicate elimination – If a column has many identical values, Columnstore
    can record only one value and just mark the range of rows where this value occurs.
    This technique is also known as Run-Length Encoding.


    *   Dictionary normalization – String and other discrete values are placed in
    internal key-value dictionaries per column segment. Keys are placed in column
    segments instead of actual values.


    In addition to these strategies, entire segments can be compressed which can additionally
    save space. This is a common technique for the archival of data that is not commonly
    used but must stay in the database.


    These are generic characteristics and advantages of columnstore format. In the
    following sections, you will learn about the specific implementation of Columnstore
    format in Azure SQL.'
  trans: '# 列存储格式


    行存储格式是 Azure SQL 中表的默认存储格式，它已被证明是大多数通用工作负载的理想结构。在行存储格式中，属于单行的单元格值在称为 `页面` 的固定大小
    8KB 结构中物理上彼此靠近放置。^(²) 如果你需要执行选择或更新整行或一组行的查询，这是一个很好的解决方案。如果你运行类似 `SELECT * FROM
    <table> WHERE <condition>` 的查询，其中 `<condition>` 谓词将选择单行或一小部分行，那么行存储格式是一个极佳的选择。一旦数据库引擎定位到放置该行的
    8KB 页面，大部分数据都将位于该页面上，并通过单次数据页面访问加载。


    然而，在分析和报告查询需要扫描许多行时，这并非最佳解决方案，如下列查询所示：


    ```sql

    SELECT State, AVG(Price)

    FROM Sales.Products

    GROUP BY State

    ```


    在这类分析和报告查询中，我们需要从所有行中仅访问两列来计算结果。即使存在有助于使相关数据在物理上彼此靠近的聚集索引，加载来自不需要的列的数据也会消耗大量资源：显然，这对查询性能会产生负面影响。


    必须强调的是，由于数据库通常是一个高度并发的系统，Azure SQL 将实际上不需要的数据加载到内存中未必是一件坏事，因为这将有助于其他查询直接使用已存在于内存中的数据，从而获得更好的性能。由于内存是相比磁盘空间非常有限的资源，理解系统典型的工作负载模式至关重要，这样任何建议或最佳实践才能结合你的系统具体情况来应用。特别是对于不能仅针对读取或写入进行优化的数据库，找到最佳平衡是开发者和数据库管理员的关键目标。


    列存储格式在许多分析系统中用于提高这些场景下的性能。在列存储格式中，单元格在物理上按列分组为 `段`。列段是来自单个列的所有值的一个物理上连续的集合。表在物理上表示为一组列段，而不是一组行。行存储和列存储格式之间的差异如图
    9-1 所示。


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig1_HTML.jpg](img/493913_1_En_9_Fig1_HTML.jpg)


    图 9-1


    当查询需要访问单行或少数行的所有值时（左图），行存储格式是最优的；而当查询访问单列或少数列的所有值时（右图），列存储格式是最优的。


    在左侧所示的行存储格式中，一个报告查询需要遍历表中的所有行，读取每个页面，并从每行的十列中取出两列来计算结果。这意味着，一个使用十列中两列的查询大约只使用了需要读取的内存页面的
    20%。如果你有一个表，其中仅使用较小的列进行分析，但行中存在大的 `NVARCHAR` 列，而这些列在特定查询中不会被使用而被丢弃，那么效率会更差，因为必须获取并丢弃的
    `NVARCHAR` 列会占用更多内存页面空间。


    这在内存缓存架构中可能是个问题，因为底层硬件需要将页面从较低级别的缓存（或存储）移动到较高级别的内存缓存，而大部分数据移动都是徒劳的。尽管这看起来像是微小的优化，但如果你尝试在数十万行上运行这类查询，可能会看到巨大的性能问题。多年的分析和实践经验表明，行存储技术不适用于高性能的分析和报告。


    现在，让我们关注图 9-1 右侧的行的列表示。每列的所有值在物理上分组在一起。这意味着报告查询可以轻松拾取计算结果所需的两列，并且只读取这些值。其他不同列中的值根本不会被使用，甚至可能不在内存中。由于全表扫描查询需要读取所有或大部分行的所有值，内存读取的效率接近
    100%。同一列中的所有值在物理上彼此靠近放置，查询将读取并使用所有这些值。这显著提升了分析查询的性能。实际上，经常可以看到性能比基于行存储的原始时间提升
    10 倍甚至 100 倍。


    在这种情况下，还有另一种优化可以利用。所有现代处理器都支持 `SIMD`（单指令多数据）操作，可以极其高效地对内存数组中的所有元素应用单一操作。如果存储组织能够提供需要处理的连续单元格数组，那么
    `SIMD` 指令可以对列段中的所有值应用单一操作。这被称为 `批处理模式执行`，它比经典的逐行处理效率高得多。


    高压缩率是列存储格式的另一个非常便利的特性。列存储结构可以利用存储在列段中的单元格值相似这一事实。这一特性使得列存储能够对单元格应用各种压缩算法，例如：


    -   NULL 值消除——如果单元格中有很大比例的缺失值，列存储将直接避免存储这些行。

    -   重复值消除——如果一列有许多相同的值，列存储可以只记录一个值，并标记该值出现的行范围。这种技术也称为游程编码。

    -   字典标准化——字符串和其他离散值被放置在每个列段的内部键值字典中。键被放置在列段中，而不是实际值。


    除了这些策略之外，整个段也可以被压缩，从而进一步节省空间。这是对不常用但必须保留在数据库中的数据进行归档的常用技术。


    以上是列存储格式的通用特性和优势。在接下来的章节中，你将了解 Azure SQL 中列存储格式的具体实现。'
- fmt: '### Columnstore in Azure SQL


    Azure SQL doesn''t use the classic Columnstore organization described in the previous
    section. In theory, we could create large column segments where each one would
    contain all values from a single table column and compress it. However, on any
    update we would need to decompress the entire column segment to insert, update,
    or delete a single value and then compress it again. To avoid this overhead, it
    might be better to split the unique column area into multiple column segments
    and perform the needed operations only on the segments that contain cells that
    need to be updated. In addition, most of the queries would not need to scan all
    rows, so most of the cells that would be decompressed would not be used. If we
    split a column into multiple column segments, maybe we can pick only the segments
    that are needed in query. The idea is very similar to a partitioning technique,
    but just applied within the column segment and in a totally transparent way for
    the user.


    Azure SQL introduces some enhancements of the original Columnstore structure to
    address these issues. Two main modifications are:


    *   Column segments do not span over the entire table. Azure SQL will divide table
    rows in the groups up to 1 million rows. These `row groups` are organized in Columnstore
    format, and every column segment has up to one million rows’ values.

    *   All new rows are inserted in a buffer row group organized using the rowstore
    format. Rowstore format is the perfect choice for row-oriented operation, so it
    makes sense to use it as an area for inserting new rows. These row groups are
    called `Deltastore`. Once these row groups reach one million records, they are
    transformed and compressed – transparently and in the background – into columnstore
    format.


    Organization of Columnstore structure in Azure SQL is shown in Figure 9-2.


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig2_HTML.jpg](images/493913_1_En_9_Chapter/493913_1_En_9_Fig2_HTML.jpg)


    Figure 9-2: Columnstore structures have a compressed area in Columnstore format
    and input area in rowstore format (Delta)


    In Azure SQL, the data rows in columnstore structure are divided into the row
    groups with up to one million rows. A million rows provide enough values to get
    good compression and still not too many rows to operate with row groups as independent
    units. Row groups can be placed in two areas:


    *   Compressed area containing many columnstore organized groups of rows where
    column segments in row groups are highly compressed. Ideally, all row groups would
    be compressed in this area.

    *   Deltastore area containing one or more rowstore organized groups of rows.
    This is the temporary buffer area with the rows that are waiting to be compressed
    and moved to the compressed area.


    If you already have some Columnstore index in your database, you can find the
    row groups using the following system view:


    ```sql

    SELECT * FROM sys.columnstore_rowgroups;

    ```


    The columns in the compressed row groups are organized into the column segment
    that contains all values from the designated column in the row group. This segment
    is highly compressed, and all values are stored as one continuous physical location.
    Every column segment contains the statistics that describe min and max values
    in the segment. This is an important information that the Azure SQL engine can
    use to optimize reports and analytics query performance on the Columnstore structure.
    We can easily find the existing column segments in Azure SQL Database using the
    following view:


    ```sql

    SELECT * FROM sys.columnstore_segments;

    ```


    The compressed area should contain more than 95% of data, and compressed data
    should not be changed. It’s undesirable to modify data in the compressed area
    because Azure SQL would need to decompress all values in the segment to update
    just one and then compress everything again.


    There is another area in the Columnstore structure called Deltastore. Deltastore
    contains a smaller set of row groups organized in a classic rowstore format (or
    Hobit described in the previous chapter). The main purpose of this area is buffering
    the new inputs and changes before they get compressed. Splitting every new row
    into each column and re-distributing values into corresponding column segments
    would be an inefficient strategy to insert data. Therefore, all new rows are inserted
    in the rowstore delta area where they reside until the row group gets up to one
    million rows. Once the row group in the delta store is filled, it is `closed`
    for new changes, and a background process will start converting this row group
    into Columnstore format and moving it into the compressed area. The goal is to
    move as much as possible row groups from delta storage into compressed storage,
    and delta storage should contain less than 5% of rows.


    In theory, we could have only one row group in the delta store. However, one row
    group might affect concurrency because one transaction that is inserting data
    might lock the row group and other requests that are trying to insert data would
    need to wait until the first one releases the lock. Therefore, the Columnstore
    structure creates new row groups to facilitate concurrent inserts.


    ### Updating values in Columnstore


    As already mentioned, updating compressed Columnstore data is not a desired action.
    Columnstore format is not read only, but updates have a bigger penalty compared
    to classical rowstore. Azure SQL has some enhancements that optimize updates of
    compressed data.


    One optimization is the Deltastore described in the previous section. Delta row
    groups buffer incoming rows until enough rows are available to successfully compress
    them. Deltastore is not always used though: Azure SQL decides if the incoming
    data should go into Deltastore or maybe it is better to directly compress it without
    buffering. Azure SQL uses the following rules:


    *   If you insert a smaller amount of (less than 102,400) rows, all rows will
    land into some Delta row group.

    *   If you insert more than 102,400 rows using single `BULK INSERT` or `SELECT
    INTO` statements, Azure SQL will stream these values directly into new compressed
    row groups.


    Another problem that needs to be solved is how to efficiently delete rows from
    a columnstore. Unpacking 1,000,000 rows to delete one and then compress 999,999
    is not a desirable technique. Azure SQL uses so-called `Delete indexes` and `Delete
    bitmaps` to “virtually” delete the rows. Whenever you need to delete a row from
    a compressed row group, Azure SQL will just “mark position” of this row as deleted.
    Whenever you read the rows from compressed column segments, Azure SQL will just
    ignore the rows marked as deleted at runtime. This way, the query that is reading
    data from the column segments is getting only existing rows and doesn’t need to
    be aware that the deleted rows are transparently excluded once the row groups
    are decompressed.


    There is only one operation left to be dealt with now: updating data. This is
    the most complex operation, as Azure SQL cannot just inject an updated value into
    an existing, highly compressed column segment without decompressing and compressing
    again everything else also. For this reason, every row update is represented as
    a combination of delete and insert operations. Old values of the row in the compressed
    row group are marked as deleted, and the new value is inserted in the delta store.


    Marking deleted rows and representing updates as a pair of delete and insert operations
    are used only if the affected row is in a compressed area. If the row is in the
    Delta store, it will be updated or deleted as any other row in regular Hobits.'
