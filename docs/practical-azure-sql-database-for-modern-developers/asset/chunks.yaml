- fmt: '# Azure SQL 中的查询存储功能


    ## 概述


    如前所述，查询存储在 Azure SQL 中默认启用且无法关闭。其默认配置针对持续数据收集进行了优化，但你仍然可以控制一些配置参数，例如最大存储大小（默认
    100MB）或用于聚合查询执行统计信息的时间间隔长度（默认 60 分钟）。如果没有特定需求，例如在希望加速处理的短期故障排除会话期间，我们建议在大多数使用场景中保留默认设置。


    查询存储的内部信息通过一系列视图呈现，这些视图可用于你的诊断查询，以了解 Azure SQL 在你的特定工作负载下的行为。下图展示了查询存储视图及其逻辑关系，其中编译时信息以蓝色实体显示：


    ![查询存储视图关系图](images/493913_1_En_10_Chapter/493913_1_En_10_Figi_HTML.jpg)


    ## 查询存储视图


    视图名称是直观的，但让我们浏览一些主要视图，看看它们如何有助于监控和排查我们的工作负载：


    *   `sys.query_store_query_text` 报告针对数据库执行的唯一查询文本，其中批处理中的每个语句都会生成一个单独的查询文本条目。

    *   `sys.query_context_settings` 呈现查询执行时影响执行计划的唯一设置组合。

    *   `sys.query_store_query` 显示在查询存储中被单独跟踪和强制的查询条目。

    *   `sys.query_store_plan` 返回带有编译时统计信息的查询估计计划。存储的计划等同于使用 `SET SHOWPLAN_XML ON`
    获取的计划。

    *   `sys.query_store_runtime_stats_interval` 显示为每个执行计划在自动生成的时间窗口（时间间隔）中聚合的运行时统计信息。我们可以使用
    `ALTER DATABASE SET` 语句中的 `INTERVAL_LENGTH_MINUTES` 来控制时间间隔的大小。

    *   `sys.query_store_runtime_stats` 报告已执行计划的聚合运行时统计信息。捕获的指标以四种统计函数的形式呈现：平均值、最小值、最大值和标准差。


    通过查询这些视图，你可以快速获取有关工作负载执行情况的详细信息；以下是一些示例。


    ## 查询示例


    此查询返回数据库上最后执行的十个查询：


    ```sql

    SELECT TOP 10 qt.query_sql_text, q.query_id,

    qt.query_text_id, p.plan_id, rs.last_execution_time

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    ORDER BY rs.last_execution_time DESC;

    ```


    这些是在过去一小时内执行时间最长的查询：


    ```sql

    SELECT TOP 10 rs.avg_duration, qt.query_sql_text, q.query_id,

    qt.query_text_id, p.plan_id, GETUTCDATE() AS CurrentUTCTime,

    rs.last_execution_time

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    WHERE rs.last_execution_time > DATEADD(hour, -1, GETUTCDATE())

    ORDER BY rs.avg_duration DESC;

    ```


    这些是在过去24小时内执行了更多 I/O 读取的查询：


    ```sql

    SELECT TOP 10 rs.avg_physical_io_reads, qt.query_sql_text,

    q.query_id, qt.query_text_id, p.plan_id, rs.runtime_stats_id,

    rsi.start_time, rsi.end_time, rs.avg_rowcount, rs.count_executions

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    JOIN sys.query_store_runtime_stats_interval AS rsi

    ON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id

    WHERE rsi.start_time >= DATEADD(hour, -24, GETUTCDATE())

    ORDER BY rs.avg_physical_io_reads DESC;

    ```


    你可能已经开始理解这个特性在监控和故障排除方面开启了哪些可能性，对吧？现在，让我们来看一些更复杂的场景，在这些场景中，使用查询存储特性可以在我们的性能调查中提供帮助。'
  raw: '![../images/493913_1_En_10_Chapter/493913_1_En_10_Figi_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figi_HTML.jpg)


    As mentioned, Query Store is enabled by default in Azure SQL and cannot be switched
    off. Default configuration is optimized for continuous data collection, but you
    can still control some of the configuration knobs like max store size (default
    100MB) or the interval length used to aggregate statistics for query executions
    (default 60 minutes). If you don’t have specific needs, like during short troubleshooting
    sessions where you want to speed up the process, we recommend leaving settings
    to default values for most use cases.


    Query Store internal information gets surfaced through a series of views that
    can be used in your diagnostic queries to understand the behaviors of Azure SQL
    with your specific workload. The following diagram shows Query Store views and
    their logical relationships, with compile-time information presented as blue entities:


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figj_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figj_HTML.jpg)


    View names are straightforward, but let’s go through some of the main ones and
    see how they can be useful to monitor and troubleshoot our workloads:


    *   `sys.query_store_query_text` is reporting unique query texts executed against
    the database, where every statement in the batch generates a separate query text
    entry .


    *   `sys.query_context_settings` presents unique combinations of plan-affecting
    settings under which queries are executed.


    *   `sys.query_store_query` shows query entries that are tracked and forced separately
    in Query Store.


    *   `sys.query_store_plan` returns an estimated plan for the query with the compile-time
    statistics. Stored plan is equivalent to one that you get by using `SET SHOWPLAN_XML
    ON`.


    *   `sys.query_store_runtime_stats_interval` shows runtime statistics aggregated
    in automatically generated time windows (intervals) for every executed plan. We
    can control the size of the interval using `INTERVAL_LENGTH_MINUTES` in `ALTER
    DATABASE SET` statement.


    *   `sys.query_store_runtime_stats` reports aggregated runtime statistics for
    executed plans. Captured metrics are in the form of four statistical functions:
    Average, Minimum, Maximum, and Standard Deviation.


    By querying these views, you can quickly get detailed information on how your
    workload is executing; here are some examples.


    This query is returning the last ten queries executed on the database:


    ```

    SELECT TOP 10 qt.query_sql_text, q.query_id,

    qt.query_text_id, p.plan_id, rs.last_execution_time

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    ORDER BY rs.last_execution_time DESC;

    ```


    These are the queries taking more time to execute within the last hour:


    ```

    SELECT TOP 10 rs.avg_duration, qt.query_sql_text, q.query_id,

    qt.query_text_id, p.plan_id, GETUTCDATE() AS CurrentUTCTime,

    rs.last_execution_time

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    WHERE rs.last_execution_time > DATEADD(hour, -1, GETUTCDATE())

    ORDER BY rs.avg_duration DESC;

    ```


    These are the queries executing more I/O reads in the last 24 hours:


    ```

    SELECT TOP 10 rs.avg_physical_io_reads, qt.query_sql_text,

    q.query_id, qt.query_text_id, p.plan_id, rs.runtime_stats_id,

    rsi.start_time, rsi.end_time, rs.avg_rowcount, rs.count_executions

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    JOIN sys.query_store_runtime_stats_interval AS rsi

    ON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id

    WHERE rsi.start_time >= DATEADD(hour, -24, GETUTCDATE())

    ORDER BY rs.avg_physical_io_reads DESC;

    ```


    You’re probably starting to get what possibilities this feature is opening in
    terms of monitoring and troubleshooting, right? Let’s now look at some more complex
    scenarios where using the Query Store feature can help during our performance
    investigations.'
  trans: '# Azure SQL 中的查询存储功能


    ## 概述


    如前所述，查询存储在 Azure SQL 中默认启用且无法关闭。其默认配置针对持续数据收集进行了优化，但你仍然可以控制一些配置参数，例如最大存储大小（默认
    100MB）或用于聚合查询执行统计信息的时间间隔长度（默认 60 分钟）。如果没有特定需求，例如在希望加速处理的短期故障排除会话期间，我们建议在大多数使用场景中保留默认设置。


    查询存储的内部信息通过一系列视图呈现，这些视图可用于你的诊断查询，以了解 Azure SQL 在你的特定工作负载下的行为。下图展示了查询存储视图及其逻辑关系，其中编译时信息以蓝色实体显示：


    ![查询存储视图关系图](img/493913_1_En_10_Figi_HTML.jpg)


    ## 查询存储视图


    视图名称是直观的，但让我们浏览一些主要视图，看看它们如何有助于监控和排查我们的工作负载：


    *   `sys.query_store_query_text` 报告针对数据库执行的唯一查询文本，其中批处理中的每个语句都会生成一个单独的查询文本条目。

    *   `sys.query_context_settings` 呈现查询执行时影响执行计划的唯一设置组合。

    *   `sys.query_store_query` 显示在查询存储中被单独跟踪和强制的查询条目。

    *   `sys.query_store_plan` 返回带有编译时统计信息的查询估计计划。存储的计划等同于使用 `SET SHOWPLAN_XML ON`
    获取的计划。

    *   `sys.query_store_runtime_stats_interval` 显示为每个执行计划在自动生成的时间窗口（时间间隔）中聚合的运行时统计信息。我们可以使用
    `ALTER DATABASE SET` 语句中的 `INTERVAL_LENGTH_MINUTES` 来控制时间间隔的大小。

    *   `sys.query_store_runtime_stats` 报告已执行计划的聚合运行时统计信息。捕获的指标以四种统计函数的形式呈现：平均值、最小值、最大值和标准差。


    通过查询这些视图，你可以快速获取有关工作负载执行情况的详细信息；以下是一些示例。


    ## 查询示例


    此查询返回数据库上最后执行的十个查询：


    ```sql

    SELECT TOP 10 qt.query_sql_text, q.query_id,

    qt.query_text_id, p.plan_id, rs.last_execution_time

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    ORDER BY rs.last_execution_time DESC;

    ```


    这些是在过去一小时内执行时间最长的查询：


    ```sql

    SELECT TOP 10 rs.avg_duration, qt.query_sql_text, q.query_id,

    qt.query_text_id, p.plan_id, GETUTCDATE() AS CurrentUTCTime,

    rs.last_execution_time

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    WHERE rs.last_execution_time > DATEADD(hour, -1, GETUTCDATE())

    ORDER BY rs.avg_duration DESC;

    ```


    这些是在过去 24 小时内执行了更多 I/O 读取的查询：


    ```sql

    SELECT TOP 10 rs.avg_physical_io_reads, qt.query_sql_text,

    q.query_id, qt.query_text_id, p.plan_id, rs.runtime_stats_id,

    rsi.start_time, rsi.end_time, rs.avg_rowcount, rs.count_executions

    FROM sys.query_store_query_text AS qt

    JOIN sys.query_store_query AS q

    ON qt.query_text_id = q.query_text_id

    JOIN sys.query_store_plan AS p

    ON q.query_id = p.query_id

    JOIN sys.query_store_runtime_stats AS rs

    ON p.plan_id = rs.plan_id

    JOIN sys.query_store_runtime_stats_interval AS rsi

    ON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id

    WHERE rsi.start_time >= DATEADD(hour, -24, GETUTCDATE())

    ORDER BY rs.avg_physical_io_reads DESC;

    ```


    你可能已经开始理解这个特性在监控和故障排除方面开启了哪些可能性，对吧？现在，让我们来看一些更复杂的场景，在这些场景中，使用查询存储特性可以在我们的性能调查中提供帮助。'
- fmt: '# Query Store at work


    Let’s say your application’s performance has degraded over the last week, and
    you want to understand if this can be related to some changes in the database.


    With Query Store, you can compare query executions based on different time windows
    like the recent period (last 4 hours) with what was happening last week when everything
    was fine in terms of performance:


    ```sql

    --- "Recent" workload - last 4 hours

    DECLARE @recent_start_time datetimeoffset;

    DECLARE @recent_end_time datetimeoffset;

    SET @recent_start_time = DATEADD(hour, -4, SYSUTCDATETIME());

    SET @recent_end_time = SYSUTCDATETIME();

    --- "History" workload – last week

    DECLARE @history_start_time datetimeoffset;

    DECLARE @history_end_time datetimeoffset;

    SET @history_start_time = DATEADD(day, -14, SYSUTCDATETIME());

    SET @history_end_time = DATEADD(day, -7, SYSUTCDATETIME());

    WITH

    hist AS

    (

    SELECT

    p.query_id query_id,

    ROUND(ROUND(CONVERT(FLOAT, SUM(rs.avg_duration * rs.count_executions)) * 0.001,
    2), 2) AS total_duration,

    SUM(rs.count_executions) AS count_executions,

    COUNT(distinct p.plan_id) AS num_plans

    FROM sys.query_store_runtime_stats AS rs

    JOIN sys.query_store_plan AS p ON p.plan_id = rs.plan_id

    WHERE (rs.first_execution_time >= @history_start_time

    AND rs.last_execution_time < @history_end_time)

    OR (rs.first_execution_time < @history_end_time)

    GROUP BY p.query_id

    ),

    recent AS

    (

    SELECT

    p.query_id query_id,

    ROUND(ROUND(CONVERT(FLOAT, SUM(rs.avg_duration * rs.count_executions)) * 0.001,
    2), 2) AS total_duration,

    SUM(rs.count_executions) AS count_executions,

    COUNT(distinct p.plan_id) AS num_plans

    FROM sys.query_store_runtime_stats AS rs

    JOIN sys.query_store_plan AS p ON p.plan_id = rs.plan_id

    WHERE  (rs.first_execution_time >= @recent_start_time

    AND rs.last_execution_time < @recent_end_time)

    OR (rs.first_execution_time < @recent_end_time)

    GROUP BY p.query_id

    )

    SELECT

    results.query_id AS query_id,

    results.query_text AS query_text,

    results.additional_duration_workload AS additional_duration_workload,

    results.total_duration_recent AS total_duration_recent,

    results.total_duration_hist AS total_duration_hist,

    ISNULL(results.count_executions_recent, 0) AS count_executions_recent,

    ISNULL(results.count_executions_hist, 0) AS count_executions_hist

    FROM

    (

    SELECT

    hist.query_id AS query_id,

    qt.query_sql_text AS query_text,

    ROUND(CONVERT(float, recent.total_duration/

    recent.count_executions-hist.total_duration/hist.count_executions)

    *(recent.count_executions), 2) AS additional_duration_workload,

    ROUND(recent.total_duration, 2) AS total_duration_recent,

    ROUND(hist.total_duration, 2) AS total_duration_hist,

    recent.count_executions AS count_executions_recent,

    hist.count_executions AS count_executions_hist

    FROM hist

    JOIN recent

    ON hist.query_id = recent.query_id

    JOIN sys.query_store_query AS q

    ON q.query_id = hist.query_id

    JOIN sys.query_store_query_text AS qt

    ON q.query_text_id = qt.query_text_id

    ) AS results

    WHERE additional_duration_workload > 0

    ORDER BY additional_duration_workload DESC

    OPTION (MERGE JOIN);

    ```


    This query is basically calculating what queries have introduced additional duration
    compared to the previous execution period and is returning information like recent
    and historical execution counts and total duration.


    ## 比较与强制执行计划


    For queries that are showing regressions, you should check if those had different
    query plans recently compared to when they were executing faster. What you can
    do to fix the problem is trying to force a specific execution plan for that query
    with this procedure:


    ```sql

    EXEC sp_query_store_force_plan @query_id = 48, @plan_id = 49;

    ```


    If you want to revert back this forcing and let Azure SQL calculate the execution
    plan again, you can unforce the plan by calling:


    ```sql

    EXEC sp_query_store_unforce_plan @query_id = 48, @plan_id = 49;

    ```


    It’s important to notice that, for this kind of optimization, you won’t need to
    change your application code in any way.


    ## 使用可视化工具


    If you prefer to run these investigations by using a visual tool instead of running
    T-SQL queries, SQL Server Management Studio offers a series of UI pages to interact
    with Query Store information. You can expand the `Query Store` node in your database
    to get what scenarios are supported:


    ![Query Store Node](images/493913_1_En_10_Chapter/493913_1_En_10_Figk_HTML.jpg)


    If you click `Regressed Queries`, for example, you’ll get by default the list
    of top 25 queries that have regressed in performance during the last hour, and
    you can slice and dice data on multiple dimensions like CPU time or IO and memory
    to find what you need. From the same UI, you can also look at available query
    plans for a given query and force the most optimal one by clicking the `Force
    Plan` button. It is that easy!


    ![Regressed Queries UI](images/493913_1_En_10_Chapter/493913_1_En_10_Figl_HTML.jpg)


    ## 分析等待统计


    Another interesting scenario for investigating overall performance of your application
    is looking at `Query Wait Statistics` for a given database.


    Clicking that option in the database tree will pop up a new window where most
    important wait state categories are shown in a chart ordered by total wait time,
    as you can see in this picture:


    ![Query Wait Statistics](images/493913_1_En_10_Chapter/493913_1_En_10_Figm_HTML.jpg)


    You can then drill down into the most impacting categories and will be presented
    with the top queries contributing to those wait states and their related query
    plans, so you will be able to force those that were more optimized for your specific
    workload:


    ![Wait Categories Detail](images/493913_1_En_10_Chapter/493913_1_En_10_Fign_HTML.jpg)


    Other similar scenarios are related to `Top Resource Consuming Queries` or `Queries
    With The Highest Variation`, where you can follow similar paths.


    ## 云平台集成：Query Performance Insight


    Last but not least, Azure SQL also provides Query Performance Insight, part of
    the Azure Portal experience, which is based on Query Store data to provide intelligent
    query analysis tools for single and pooled databases. It helps identify the top
    resource-consuming and long-running queries in your workload. This helps you find
    the queries to optimize to improve overall workload performance and efficiently
    use the resource that you are paying for. While SQL Server Management Studio and
    Azure Data Studio can be used to get detailed resource consumption for all your
    queries, Query Performance Insight gives you a quick and efficient way, right
    from the Azure portal, to determine their impact on overall resource usage for
    your database.


    ![Query Performance Insight in Azure Portal](images/493913_1_En_10_Chapter/493913_1_En_10_Figo_HTML.jpg)


    You can still drill down to individual query level to get details on things like
    resource consumption or how many times queries have been executed in a given time
    windows, but you can also interact with performance recommendations provided by
    `Database Advisor`, a feature in Azure SQL that learns about your database usage
    and provides customized recommendations that enable to maximize performance. These
    recommendations are spanning between query plan forcing, index creation and deletion,
    and such. By clicking the `Automate` button in the following page, you can also
    automate the execution of these recommendations and let Azure SQL keep your databases
    always in the best state:


    ![Database Advisor Recommendations](images/493913_1_En_10_Chapter/493913_1_En_10_Figp_HTML.jpg)


    To get more details on these interesting capabilities of Azure SQL, we recommend
    you to take a look at the official documentation here: [`https://aka.ms/daipr`](https://aka.ms/daipr).'
