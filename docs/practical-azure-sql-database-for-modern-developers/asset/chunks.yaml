    as expected, support parameters. In all modern programming languages, parameters
    can be anything, from scalars to complex objects. In Azure SQL, this is true too,
    albeit with some differences, since there is no concept like an *object*, given
    that SQL is not an object-oriented language. In the next sections, you’ll find
    the options available to achieve what passing an object would do in other languages.'
  trans: '您可能在想，此时应该在何时使用函数，何时使用存储过程。这是个好问题！作为一般性指导，请记住，尽管函数功能强大，尤其是内联表值函数，但它们也有相当多的限制和约束。因此，除非您有某个特定用例非常适合使用函数，否则推荐使用存储过程：它们性能更好，并且没有函数的所有限制。


    ## 存储过程


    可以使用 `DROP PROCEDURE` 命令删除存储过程：


    ```

    DROP PROCEDURE dbo.GetOrderForCustomer;

    ```


    ### 触发器


    触发器是一种特殊的存储过程，当特定事件发生时执行。触发器有两种类型：*DML*（*数据操作语言*）触发器和 *DDL*（*数据定义语言*）触发器。第一种，DML
    触发器，在执行 `INSERT`、`UPDATE` 或 `DELETE`（或 `MERGE`）命令时执行。后者，DDL 触发器，则是在调用用于定义数据结构的
    `CREATE`、`ALTER` 或 `DROP` 命令时执行。


    在这两种情况下，您都可以访问特殊对象，让您能够与引发触发器执行的事件进行交互。


    对于 DML 触发器，您可以访问 `Inserted` 和 `Deleted` 虚拟表，以便访问更改前后的数据。您可以决定如何处理这些数据。例如，您可以将删除的数据存储到另一个表中，以提供易于访问的已更改行日志。您还可以指示触发器直接阻止该更改发生：例如，您可能希望确保某些配置数据不会从应用程序正常运行所需的核心表中被移除。


    在 DDL 触发器中，您可以访问一个 `EVENTDATA()` 函数，该函数返回一个包含有关正在执行的语句所有详细信息的 XML。例如，在这种情况下，您可以保存该信息以跟踪表是何时、如何以及由谁修改的，或者对象是何时被删除的。同样，您也可以阻止该修改发生。


    触发器是正在执行的事务的一部分，这意味着您可以决定是否允许该事务成功完成。例如，可能发生这种情况的一种场景是：只有一组选定的用户被授权更改应用于特定客户的产品折扣率。在触发器中，您可以检查进行更改的用户是否具有相应授权，甚至可能将该操作记录在另一个表中以进行跟踪。如果用户没有该授权，您可以在触发器内直接回滚事务，这意味着更改根本不会发生：


    ```

    CREATE OR ALTER TRIGGER [Warehouse].[ProtectAzure]

    ON [Warehouse].[Colors]

    FOR UPDATE, DELETE

    AS

    BEGIN

    IF EXISTS(

    SELECT * FROM [Deleted]

    WHERE [ColorName] IN (''Azure'')

    )

    BEGIN

    THROW 50000, ''Azure is here to stay.'', 16;

    ROLLBACK TRAN;

    END

    END

    ```


    如果您尝试 `DELETE` 或 `UPDATE` `Warehouse.Colors` 表中的值，导致颜色 “Azure” 被移除或更改为其他内容，触发器将回滚该操作，使
    “Azure” 颜色保持不变：


    ```

    DELETE FROM [Warehouse].[Colors] WHERE ColorID = 1

    ```


    这种功能非常强大，但开销也相当大：由于触发器是活动事务的一部分，它们可以回滚事务，但从资源使用的角度来看，最好一开始就防止这种情况发生。预先防止本可以避免使用
    IO、CPU 和内存资源，却在进程最后才发现所有已完成的工作都必须撤销——这是对宝贵资源的浪费。


    除了对资源使用的影响外，触发器还可能对性能产生重大影响。它们的性能取决于您编写的代码质量以及触发器内置逻辑的执行速度。如果您在触发器中试图聚合一个包含十亿行的数据表，性能很可能不会太好。而且这种情况*每次*触发器执行时都会发生。


    这就是为什么触发器越来越频繁地被原生支持的功能所取代。例如，在接下来的章节中您将了解到，跟踪对表所做的所有更改可以通过一种称为“时态表”的功能更高效、更轻松地完成；或者，保护对特定行和值的访问可以通过“行级安全性”来实现。


    因此，一般来说，应尽量减少触发器的使用。您应该在更改数据之前就进行所有检查，这样就不必撤销任何操作。这将有利于性能、并发性、可维护性和可扩展性。


    可以使用 `DROP TRIGGER` 命令删除触发器：


    ```

    DROP TRIGGER [Warehouse].[ProtectAzure]

    ON [Warehouse].[Colors];

    ```


    ### 非标量参数


    正如您在前面章节中了解到的，存储过程和函数，如预期那样，支持参数。在所有现代编程语言中，参数可以是任何内容，从标量到复杂对象。在 Azure SQL 中，这也是正确的，但有一些区别，因为没有像*对象*这样的概念，因为
    SQL 不是面向对象的语言。在接下来的章节中，您将找到可用的选项，以实现其他语言中传递对象所能达到的效果。'
- fmt: '#### Table-Valued Parameters


    As the name implies, parameters can be tables. Yes, you can pass an entire table
    into a Function or a Stored Procedure. This is by far the best option you have
    when you need to pass quite a lot of data from your application to Azure SQL.
    I’ve written *quite* a lot because, as a rule of thumb, this option is good when
    you have up to some thousand rows to pass. If you are in the realms of hundreds
    of thousands, millions, or even more, then you should look at the “Bulk operations”
    section discussed in the previous chapter for *really good* performance.


    Also keep in mind that the Table-Valued Parameter (TVP) feature needs to be supported
    by the client library, as it needs to be aware of that option to be able to use
    it. Common languages like .NET, Python, Node, and Go all support TVPs.


    How to use the TVP depends on the language you are using, but the common idea
    is that you can load data into an object that can be enumerated, making sure that
    the data structure is compatible with the schema of the table *type* you’ll use
    as a parameter, and then pass that object to the Stored Procedure you are calling.


    You start creating the table type:


    ```sql

    CREATE TYPE dbo.PostTagsTableType AS TABLE

    (

    Tag NVARCHAR(100) NOT NULL UNIQUE

    );

    ```


    And then you reference it into your Stored Procedure:


    ```sql

    CREATE PROCEDURE dbo.AddTagsToPost

    @PostId INT,

    @Tags dbo.PostTagsTableType READONLY

    AS

    INSERT INTO dbo.PostTags SELECT @PostId, Tag FROM @Tags

    ```


    As you can see, the parameter `@Tags` is really a table so you can use it as a
    regular table with the only limit that it is read only. Then, with .NET, for example,
    you can use the TVP as shown in the following code:


    ```csharp

    var p2 = new SqlParameter("@Tags", SqlDbType.Structured);

    p2.TypeName = "dbo.PostTagsTableType";

    p2.Value = tags;

    cmd.Parameters.Add(p2);

    ```


    where the object `tags` is a .NET `DataTable`:


    ```csharp

    var tags = new DataTable("PostTagsTableType");

    tags.Columns.Add("Tag", typeof(string));

    tags.Rows.Add("azure-sql");

    tags.Rows.Add("tvp");

    ```


    Table-Valued Parameters are heavily optimized for performances, and also by sending
    a batch of rows to Azure SQL, your application will do the roundtrip to the database
    only once, instead of as many times as you have rows to pass. As every call to
    resources external to application has small overhead, by keeping the number of
    times you call the database as low as possible – also referred to as a less or
    not chatty application – you’ll make sure to give the end user the best experience
    possible, creating applications that are scalable and provide great performance.


    #### JSON


    Sometimes passing an object as a table will not be possible. For example, when
    we have an object representing something like a post, with its own tags, categories,
    author details, and so on. We could surely find ways to turn such objects into
    some Table-Valued Parameters, but it would hardly be elegant. So why not just
    pass the object serialized as JSON as a whole? Azure SQL is perfectly capable
    of doing complex JSON manipulations, as you’ll learn in Chapter [8](#493913_1_En_8_Chapter.xhtml).
    You can write a Stored Procedure that can accept JSON as a parameter; you can
    use it then to read the needed JSON sections so that you can fill the appropriate
    tables or pass the extracted values, or even the JSON document, to other procedures:


    ```sql

    CREATE PROCEDURE dbo.AddTagsToPost

    @PostId INT,

    @Tags NVARCHAR(MAX)

    AS

    INSERT INTO dbo.PostTags

    SELECT @PostId, T.[value] FROM OPENJSON(@Tags, ''$.tags'') T

    GO

    ```


    And the Stored Procedure can accept JSON in `@Tags`:


    ```sql

    EXEC dbo.AddTagsToPost 1, ''{"tags": ["azure-sql", "string_split", "csv"], "categories":
    {}}'';

    ```


    As JSON is passed a regular string, this technique will work with any language
    as there is no special knowledge required by the client libraries to take advantage
    of this option.


    #### CSV


    What about if you just need to pass a small array of values? Or if the language
    you are using does not support TVPs and JSON feels just overkill for the goal?
    One way to elegantly solve the problem would be to use good-old, but always present
    *CSV* (*Comma-Separated Values*). Note that the comma is not really mandatory,
    as you can use the divider you prefer, like a pipe or a dash. Azure SQL gives
    you the Table-Valued System Function `STRING_SPLIT` to use for this purpose:


    ```sql

    CREATE PROCEDURE dbo.AddTagsToPost

    @PostId INT,

    @Tags NVARCHAR(MAX)

    AS

    INSERT INTO dbo.PostTags

    SELECT @PostId, T.[value] FROM STRING_SPLIT(@Tags, ''|'') AS T

    ```


    And then you can just use the Stored Procedure like this:


    ```sql

    EXEC dbo.AddTagsToPost 1, ''azure-sql|string_split|csv''

    ```


    Same as with JSON, this option doesn’t require any special handling on the client
    side, so you can use this technique with any development language that supports
    regular ODBC connections.


    #### Monitoring data for changes


    Finding what data has changed from the last time an application, or a user, accessed
    it can be extremely helpful to increase application efficiency and scalability.
    Much fewer resources, in terms of CPU, network, and IO, would be needed, for example,
    to exchange only the changed data instead of a full set of data with a target
    application. In addition to such an already important point, since the burden
    of tracking changes can be left to Azure SQL, you’ll have your code leaner and
    solely focused on the specific business case you need to take care of. As a result,
    you will have more time to take care of it, removing from your plate the need
    of having to deal with other complexities that are anyway needed and expected
    in modern applications – like efficiency in data transfer.'
