    a User-Defined Function anywhere else, you may simply define the logic as an expression
    for a calculated column and you’ll just save some code and effort.'
  trans: '

    ## 排序规则


    排序规则是 Azure SQL 中另一个重要的文本属性。不同的排序规则使您能够定义 Azure SQL 在比较或排序文本值时应使用的语言规则。


    在标准编程语言中，您使用的是普通字符串，并且需要在需要时显式指定要使用不区分大小写的比较或排序规则。例如，如果您需要在 C# 中使用某种区域性语言规则对字符串进行排序，则需要为目标语言指定
    `CultureInfo`。在大多数编程语言中，您需要在某些方法中显式指定不区分大小写或区域性。Azure SQL 允许您定义语言规则和大小写敏感性，但它还支持一些更高级的比较和排序规则，如音调敏感性、假名敏感性（用于区分日语平假名和片假名字符）或变体选择符敏感性（用于在现代数字编码中应用一些细粒度的排序规则）。


    您可以使用如下语句轻松地在任何字符串列上设置排序规则：


    ```sql

    ALTER TABLE Warehouse.StockItems

    ALTER COLUMN Brand NVARCHAR(50)

    COLLATE Serbian_Cyrillic_100_CI_AI

    ```


    此语句将指定对该列的任何字符串操作都将使用塞尔维亚语规则，并忽略字符串中的大小写（`CI`）和音调（`AI`）。更改列的属性将自动应用于使用该列的所有排序和比较规则。


    Azure SQL 为世界上大多数语言提供了排序规则，并允许您为所有语言开启或关闭大小写、音调或假名敏感性规则。如果您需要为全球市场实施应用程序，这是一个巨大的优势。


    如果您不说日语，并且遇到了一个错误，指出应用程序中的某些日语单词排序不正确，您最不想做的事情就是为了修复这个错误而开始学习片假名和平假名之间的区别。这正是您可以利用
    Azure SQL 提供的语言规则的力量，并依赖 Azure SQL 能够正确排序结果这一事实的时候。


    文本的另一个重要属性是编码。字符可以使用不同的二进制表示形式存储，将字符转换为其二进制形式的规则称为编码模式。Unicode 标准为当前使用的大多数相关字符分配了唯一的数字标识符（称为
    `code point`，码点）。编码模式定义了如何将字符或其码点序列化为一系列字节。


    最简单的编码模式之一是 ASCII，它使用 7 位来编码英语中最常用的字符，每个字符一个字节（例如，代码 `0x5B` 代表 "]"）。ASCII 编码仅支持英语中使用的常见字符，但不支持西方或拉丁语言中使用的其他字符，如
    ä、ö、ü、ñ 或 ß。Windows-1252 和 ISO-8859-1 是 ASCII 的扩展，它们使用 8 位来编码更广泛的字符集。这些编码模式对西方语言中的其他常用字符进行编码。然而，由于这些编码模式无法表示其他语言中使用的字符，其他国家衍生出了自己的
    8 位编码模式用于国家字符集。其他国家级字符集的例子有 ISCII（印度）、VSCII（越南）或 YUSCII（前南斯拉夫）。单字节国家字符集使用高达 256
    的码点范围来表示其国家字母表中使用的常见字符。Azure SQL 使用 `varchar` 类型来表示某些单字节编码模式中的字符（尽管也有一些多字节代码页）。为了区分编码值属于哪个国家字符集，Azure
    SQL 使用列排序规则。如果 `varchar` 列中的二进制值是 `0xC6`，且列排序规则是某个拉丁排序规则（代码页 Windows-1250），Azure
    SQL 会假定这是字符 "Ć"。如果排序规则是某个塞尔维亚语排序规则，Azure SQL 会假定这是字符 "Ж"（在 `Serbian_Cyrillic`
    排序规则中 - 代码页 Windows-1251）或 "Æ"（在 `Serbian_Latin` 排序规则中 - 代码页 Windows-1252）。基于
    8 位码点和国家字符集来识别字符是不必要地简化且容易出错的，因此 Unicode 标准使用多字节编码空间来编码所有语言的字符，每个字符都有不同的码点。有几种用于
    Unicode 码点的编码模式，如 UTF-8，其中每个字符使用 1、2、3 或 4 个字节表示；以及 UTF-16，其中每个字符使用 2 或 4 个字节表示。Azure
    SQL 使用 `varchar` 类型来表示采用 UTF-8 编码的 Unicode 字符，但这些值必须使用以 `UTF8` 结尾的排序规则。为了表示 UTF-16
    编码方案，Azure SQL 使用 `nvarchar` 类型，该类型不依赖于排序规则。


    除非您确定 `string` 列中的字符只有有限的已知值，否则始终使用 Unicode。在大多数情况下，`nvarchar` 类型是一个不错的选择。尽管即使对于可以放入一个字节的常见字符，它也使用
    2 个字节，但 Azure SQL 有一些优化可以自动压缩这些值。如果您真的关心性能并希望针对常见字符进行优化，则应该使用带有 UTF-8 排序规则的 `varchar`
    类型。


    ## 计算列


    除了经典列之外，您还可以使用特殊的计算列，它们代表命名的表达式。例如，假设您有购买产品的数量、每个单位的价格和税率。您可以创建一个计算利润的函数并提供列值，但在某些情况下，创建一个自动重新计算的虚拟列会更好：


    ```sql

    ALTER TABLE Sales.OrderLines

    ADD Profit AS (Quantity*UnitPrice)*(1-TaxRate)

    ```


    读取此表的应用程序将获得利润值，而无需知道用于计算利润的函数。对于外部应用程序来说，此值看起来就像是表中的另一个值。此计算列不占用额外空间，并且在查询使用它时会动态重新计算。如果表达式可以快速计算，这种轻量级计算列是理想的解决方案。但是，如果您有一些需要字符串处理的繁重计算，您可能希望永久存储计算值，直到基础列更改。这样，您将使用一些额外的空间，但查询无需等待每个应返回行的计算完成。这类计算列称为持久化计算列，可以通过在前面的示例中添加关键字
    `PERSISTED` 来创建。生成的代码如下：


    ```sql

    ALTER TABLE Sales.OrderLines

    ADD Profit AS (Quantity*UnitPrice)*(1-TaxRate) PERSISTED

    ```


    当任何基础值更改时，持久化计算列中的值会自动重新计算。


    这可能看起来与您在上一章学到的用户定义函数非常相似：事实上，如果您愿意，也可以决定使用 `User-Defined Function` 来创建计算列。如果您不打算在其他地方使用
    `User-Defined Function`，您只需将逻辑定义为计算列的表达式，这样就能节省一些代码和精力。

    '
- fmt: '## Complex-type columns


    Scalar-type columns are standard and the most used column types in relational
    databases. In most of the cases, you will be able to represent your domain model
    with normalized tables containing only scalar-type columns. However, in some scenarios,
    you would need to represent your application object with some non-scalar types.
    Azure SQL enables you to store the following types in the table columns:


    *   `XML` – Azure SQL enables you to store properly formatted XML documents in
    columns.

    *   Spatial columns contain some common elements that are used to represent geographical
    and geometrical concepts such as points, lines, polygons, and so on.

    *   `CLR` column – These columns contain serialized binary representation of `.NET`
    objects.


    These types are not just a binary serialization of their application counterparts.
    Azure SQL enables you to apply some methods that are specific for these types.
    The following code example shows a Nearest Neighbor query that returns five cities
    that are closest to the given point:


    ```

    DECLARE @g geography = ''POINT(-95 45.5)'';

    SELECT TOP(5) Location.ToString(), CityName

    FROM Application.Cities

    ORDER BY Location.STDistance(@g) ASC;

    ```


    Spatial columns have methods such as `STDistance` that calculates the distance
    between the point and the location provided as an argument, making sure that correct
    calculations, for example, taking into account that the Earth is a spheroid and
    that there are several ways to project Earth surface on a map, are correctly applied.
    Not-so-easy trigonometric calculations are there for you to use for free!


    Complex types in Azure SQL enable you to solve very specific problems that need
    some special handling that does beyond classic table types.


    Azure SQL enables you to store JSON documents; however, there is no special JSON
    type. Azure SQL uses standard `nvarchar` type to store text in JSON format. This
    means that `any` programming language can support it without the need of special
    libraries.


    ### Declarative constraints


    One of the golden rules of application development is that the business rules
    should be implemented in the application layer. The purists may argue that pushing
    business logic to database Stored Procedures, Functions, and Triggers or on the
    client side might cause issues and maintenance nightmares. We discussed this a
    bit already, clearly describing the need to push compute to data, but let’s set
    all the previously discussed reasons aside for a second, and let’s focus on just
    `Business Rules`. Business Rules must stay in the application layer: is this always
    true? Let us look at some examples of business rules that you might need to implement:


    *   You must ensure that the email address or username of a person is unique.
    Are you going to query a table to check if there is another user with the same
    email before you create the new one?

    *   You must ensure that a product cannot be saved if it references some customer
    that does not exist. Are you going to read the customer table every time before
    you save the product just to ensure that nobody deleted the customer in the meantime?

    *   When you delete a customer from the system, all additional information (like
    documents) should be also deleted, except orders and invoices where you need to
    break the relationship with the customer and set a `null` value in the reference
    column. If the customer still has some active accounts, they should not be deleted.
    Are you going to query `Orders` and `Invoices` tables from the application layer
    to ensure that they will not return any result before you delete the product?
    This might be a non-trivial strategy that you need to implement and thoroughly
    test.


    Although you can implement these rules in your application, it is arguable should
    you do it. The business rules that describe data state and behavior on some actions
    can be easily declared in the database. Those business rules, in fact, are closely
    tied to the data, up to the point that they really are more a kind of `data consistency`
    rules. Surely, it is always part of the big family of “business rules” definition,
    but, as always, generalizing too much can be more harmful than beneficial. In
    fact, by applying these rules at the database level, you can be sure that the
    data will be consistent with the business rules and that rules will be applied
    without a line of application code, following the golden principle of keeping
    things as simple as possible (but not simpler!) and also helping in establishing
    a good and clear separation of concerns. Data is definitely a database concern.
    In addition, there would be no additional performance impact on your action because
    you would not need to run additional queries within the main action just to validate
    additional rules or implement some side activities. So, you’ll also get better
    performance. This should help you better understand up to which degree business
    rules should be applied in the application layer and which should be applied on
    the database.


    Azure SQL enables you to enhance your tables and declaratively define the rules
    that will ensure that the data is valid using the following constraints:


    *   `Primary keys` enable you to specify that a column (or a set of columns) holds
    a unique identifier of the object.

    *   `Foreign keys` specify that an object (table row) logically belongs to some
    other object or it is somehow related to that object. This is known as `referential
    integrity`, and it guarantees that the relationship between the two rows bounded
    with foreign key and primary key cannot be accidentally broken.

    *   `Check constraints` are the conditions that should be checked on every object.
    These constraints guarantee that some condition would always be true on the data
    that is saved in the table. You can implement these checks as a last line of defense,
    so even if your application code fails to check some condition or you have multiple
    services that can update the same data, you can be sure the database will guarantee
    that the condition must always be true.

    *   `Unique constraints` guarantee that a value is unique in the column. They
    are almost like primary keys (a big difference is that they allow for null values)
    and can be used for values like usernames or email addresses.


    Azure SQL enables you to declaratively specify these constraints without need
    to implement them. The following declarations describe relations between a customer
    and their invoices and orders. These declarations would also specify what the
    action should be taken on related data once a customer is deleted. When someone
    tries to delete the customer, this relationship would delete all customer invoices:


    ```

    ALTER TABLE Sales.Invoices

    ADD CONSTRAINT FK_Cust_Inv FOREIGN KEY (CustomerID)

    REFERENCES Sales.Customers (CustomerID) ON DELETE CASCADE;

    ```


    The following declaration will stop the customer delete action if there is some
    order for the customer:


    ```

    ALTER TABLE Sales.Orders

    ADD CONSTRAINT FK_Cust_Orders FOREIGN KEY (CustomerID)

    REFERENCES Sales.Customers (CustomerID) ON DELETE NO ACTION;

    ```


    With a few lines of code, you can easily implement business rules that might be
    hard to code (and especially test) in your application layer. Using these built-in
    constraints, you can rely on Azure SQL to maintain data integrity without any
    effort in your application logic.'
