    \  Console.WriteLine(\"Commit Exception Type: {0}\", ex.GetType());\n        Console.WriteLine(\"\
    \  Message: {0}\", ex.Message);\n\n        // Attempt to roll back the transaction.\n\
    \        try\n        {\n            transaction.Rollback(\"SampleTransaction\"\
    );\n        }\n        catch (Exception ex2)\n        {\n            // This catch\
    \ block will handle any errors that may have occurred\n            // on the server\
    \ that would cause the rollback to fail, such as\n            // a closed connection.\n\
    \            Console.WriteLine(\"Rollback Exception Type: {0}\", ex2.GetType());\n\
    \            Console.WriteLine(\"  Message: {0}\", ex2.Message);\n        }\n\
    \    }\n}\n```\n\n## Listing 7-3\n### Example of using transactions in a .NET\
    \ Core app\n\nAzure SQL offers several Dynamic Management Views (DMVs) to monitor\
    \ transactions running in a given database instance. They start with the `sys.dm_tran_*`\
    \ prefix. The following example returns detailed information on open transactions\
    \ at the database level:\n\n```sql\nSELECT * FROM sys.dm_tran_database_transactions\
