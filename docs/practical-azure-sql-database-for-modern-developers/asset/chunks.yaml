  trans: '### 变更跟踪


    变更跟踪是一项简单而有效的技术，用于了解自特定时间点以来数据发生了哪些变化。这项功能背后的理念是，每次用户访问一个表时，都可以请求获取当时的活动版本号。用户必须安全地存储该版本号，以便下次再次尝试访问该表时，用户还可以请求
    Azure SQL 仅获取从该版本号开始之后发生的*已更改*数据。Azure SQL 将返回从该版本号起的所有已更改数据，以及用户应在自身数据集上执行的操作（插入、更新或删除）以将其更新至当前状态，同时返回用户下次用于获取新一组更改的新版本号。


    此功能非常强大，因为它完全消除了客户端的所有复杂性，因为客户端唯一需要做的就是保存版本号并将其呈现给 Azure SQL。


    必须在数据库上启用变更跟踪：


    ```sql

    ALTER DATABASE WideWorldImportersStandard

    SET CHANGE_TRACKING = ON

    (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON)

    ```


    并在要跟踪的表上启用：


    ```sql

    ALTER TABLE [Warehouse].[Colors]

    ENABLE CHANGE_TRACKING

    ```


    从那时起，您可以使用系统标量函数 `CHANGE_TRACKING_CURRENT_VERSION()` 来获取当前版本号：


    ```sql

    SELECT CHANGE_TRACKING_CURRENT_VERSION()

    ```


    版本号在数据库级别计算并自动更新——这就是为什么它不需要任何参数——并且每当受跟踪的表中数据发生变化时，它都会改变。例如，假设我刚刚读取了表 `Warehouse.Colors`，并在操作完成后请求了当前版本号。除了结果集之外，Azure
    SQL 还向我返回了值 42，该值代表与*当前*版本相关联的数字，这意味着我刚刚读取的值与该版本号相关联。


    现在假设有人（甚至可能包括我自己）对 `Warehouse.Colors` 表进行了一些更改。一段时间后，比如 3 小时后，我需要再次从同一表中获取数据，但这次不是获取完整的数据集，我希望只获取自上次查看以来的更改，这样我就可以避免读取和传输所有未更改的行，而这些行很可能占大多数。


    `CHANGETABLE` 是我需要用于此目的的函数：


    ```sql

    SELECT

    SYS_CHANGE_OPERATION, ColorID

    FROM

    CHANGETABLE(CHANGES [Warehouse].[Colors], 42) C

    ```


    该查询将返回如下所示的表格：


    ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figa_HTML.jpg](img/493913_1_En_5_Figa_HTML.jpg)


    其中您可以看到对一行执行的操作以及该行主键列的值。借助主键（唯一标识表中的行），我们可以将该结果与原始表 `Warehouse.Colors` 进行联接，并获取所有我们需要的数据。我们现在可以再次运行
    `CHANGE_TRACKING_CURRENT_VERSION()` 函数以获取当前版本；假设现在它等于 50，我们将该值保存在某个地方，这样下次我们再次查询变更时，将使用该值来获取从那时起发生的新更改——依此类推，用于后续的同步。


    简单且极其高效——有助于保持客户端代码非常简洁且易于理解。


    要禁用特定表上的变更跟踪，您可以在要禁用变更跟踪的表上使用 `ALTER` 命令：


    ```sql

    ALTER TABLE [Warehouse].[Colors]

    DISABLE CHANGE_TRACKING

    ```


    要在整个数据库上禁用它，您需要在整个数据库上使用 `ALTER` 命令：


    ```sql

    ALTER DATABASE WideWorldImportersStandard

    SET CHANGE_TRACKING = OFF

    ```


    ### 变更数据捕获


    变更数据捕获是一项更复杂的技术，它使用内部不可变的事务日志来读取数据上所做的所有更改，并将其保存到指定的表中。它非常类似于其他数据库提供的变更数据流概念。它使用异步过程从事务日志中读取，因此非常适合在不影响发生更改的表的性能的情况下使用这些更改。目前，它尚未在所有
    Azure SQL 产品中完全可用，但请密切关注。借助像 Debezium 这样的解决方案，它将轻松实现近实时 ETL 解决方案的创建，并与 Kafka 集成，从而提供完全升级的开发者体验。


    ## 保护数据资产


    除了存储数据并按需提供访问外，数据库还承担着保护数据安全的任务。Azure SQL 提供了丰富的功能来实现这一点，包括通过权限管理、数据屏蔽到加密，因此您可以精确选择希望在何种程度上以及向谁暴露您的数据。


    除了将在下一节中介绍的功能外，请记住，默认情况下，得益于名为`透明数据加密`的功能，静态数据会自动加密。顾名思义，它是完全透明的，不需要对您的代码进行任何更改。一旦数据置于
    Azure 上，默认即受到保护。当然，这对你来说可能还不够，所以请继续阅读。'
- fmt: '### Permissions


    Managing permissions and thus data access authorization is typically a database
    administrator duty, but security is, as discussed already, a key point in every
    application, so it is always good for a developer to have at least a basic knowledge
    of the security principles of the tools and the system he or she needs to use,
    to make sure security can be taken care of from the ground up, avoiding future
    headaches and unpleasant surprises.


    Azure SQL applies the principle of the least privilege, and as such, a newly created
    user cannot really do much in Azure SQL. Aside from the `administrative` user
    you defined when you created the Azure SQL Server or Azure SQL Managed Instance
    resource, which has all the possible authorizations as it is an administrative
    account, and should not be used to grant application access to the data, you should
    create a dedicated user for your application. For example, for an API service
    hosted in Azure Web API, you could create the `WebAPI` user:


    ```sql

    CREATE USER WebAPI WITH PASSWORD = ''94m1-2sx0_1!'';

    ```


    If you try to log in with this user, you’ll discover that it doesn’t have access
    to anything. To allow it to do a `SELECT` on a table, for example, you need to
    `GRANT` it the correct permission:


    ```sql

    GRANT SELECT ON OBJECT::[Sales].[Orders] TO WebAPI;

    ```


    There are lots of permissions in Azure SQL which allow you to fine-tune the security
    access of any user. To simplify the management of security, you can use `roles`
    or `schemas`. Roles allow you to group users together, so that a user can inherit
    the permissions given to the roles he or she has been assigned to. Roles can be
    created manually, or you can use pre-existing roles. For example, any user in
    the `db_datareader` role can read data from any table, but they won’t be able
    to modify any data:


    ```sql

    ALTER ROLE [db_datareader] ADD MEMBER [WebAPI];

    ```


    If you want to give some permissions only to a specific set of objects, for example
    all the tables used by the Web API solution you are creating, you can target an
    object schema:


    ```sql

    GRANT SELECT ON SCHEMA::[Sales] TO WebAPI;

    ```


    Such code will allow you to use `SELECT` on any object that belongs to the `Sales`
    schema.


    As Stored Procedures do not allow `SELECT` to be used, as you may have already
    guessed, you’ll need to grant the `EXECUTE` permission to a user to make sure
    one can execute the desired Stored Procedure:


    ```sql

    GRANT EXECUTE ON OBJECT::[dbo].[AddTagsToPost] TO WebAPI;

    ```


    Every time a user tries to execute an action on an object for which he or she
    doesn’t have the correct permission, an error will be raised, and the execution
    of the statement will be halted.


    In order to test that a specific user has the correct permissions, you can `impersonate`
    that user if you have logged in using the administrative account:


    ```sql

    EXECUTE AS USER = ''WebAPI'';

    ```


    From now on, you can execute all the T-SQL code you want to test, and it will
    be executed as if was the user `WebAPI` to invoke it.


    To revert back to your administrative user, you just need to run


    ```sql

    REVERT;

    ```


    Also, keep in mind that if you want to make sure someone cannot access something,
    you can explicitly `DENY` to that user the permission to do something on an object:


    ```sql

    DENY SELECT ON OBJECT::[Sales].[Orders] TO SampleUser;

    ```


    A `DENY` will always win if there are several different and conflicting authorizations
    for the same object. This could happen if the user is part of one or more roles.


    To completely remove a user from a database, so that he won’t even be able to
    connect to it, one easy way is to delete the user:


    ```sql

    DROP USER SampleUser;

    ```


    In case you want to temporarily prevent the user from connecting, instead of dropping
    that user, you could just deny him or her the permission to connect if you want:


    ```sql

    DENY CONNECT TO SampleUser;

    ```


    Permissions and security are huge topics, but this is a good start. Remember to
    keep security in mind right from the beginning and you’ll already be one step
    ahead.


    If you’re already a security-savvy person, you may be thinking that using a password
    for logging in into a system is something that’s not really secure, and you are
    totally right. You can create an Azure SQL user that does not have a password
    stored in Azure SQL and that relies on Azure Active Directory instead. Your application
    can then use a Managed Identity to authenticate itself when connecting to Azure
    SQL.


    A full tutorial on this topic is here: [`https://aka.ms/aswtcmsi`](https://aka.ms/aswtcmsi).'
  raw: '### Permissions


    Managing permissions and thus data access authorization is typically a database
    administrator duty, but security is, as discussed already, a key point in every
    application, so it is always good for a developer to have at least a basic knowledge
    of the security principles of the tools and the system he or she needs to use,
    to make sure security can be taken care of from the ground up, avoiding future
    headaches and unpleasant surprises.


    Azure SQL applies the principle of the least privilege, and as such, a newly created
    user cannot really do much in Azure SQL. Aside from the *administrative* user
    you defined when you created the Azure SQL Server or Azure SQL Managed Instance
    resource, which has all the possible authorizations as it is an administrative
    account, and should not be used to grant application access to the data, you should
    create a dedicated user for your application. For example, for an API service
    hosted in Azure Web API, you could create the `WebAPI` user:


    ```

    CREATE USER WebAPI WITH PASSWORD = ''94m1-2sx0_1!'';

    ```


    If you try to log in with this user, you’ll discover that it doesn’t have access
    to anything. To allow it to do a `SELECT` on a table, for example, you need to
    `GRANT` it the correct permission:


    ```

    GRANT SELECT ON OBJECT::[Sales].[Orders] TO WebAPI;

    ```


    There are lots of permissions in Azure SQL which allow you to fine-tune the security
    access of any user. To simplify the management of security, you can use *roles*
    or *schemas*. Roles allow you to group users together, so that a user can inherit
    the permissions given to the roles he or she has been assigned to. Roles can be
    created manually, or you can use pre-existing roles. For example, any user in
    the `db_datareader` role can read data from any table, but they won’t be able
    to modify any data:


    ```

    ALTER ROLE [db_datareader] ADD MEMBER [WebAPI];

    ```


    If you want to give some permissions only to a specific set of objects, for example
    all the tables used by the Web API solution you are creating, you can target an
    object schema:


    ```

    GRANT SELECT ON SCHEMA::[Sales] TO WebAPI;

    ```


    Such code will allow you to use `SELECT` on any object that belongs to the `Sales`
    schema.


    As Stored Procedures do not allow `SELECT` to be used, as you may have already
    guessed, you’ll need to grant the `EXECUTE` permission to a user to make sure
    one can execute the desired Stored Procedure:


    ```

    GRANT EXECUTE ON OBJECT::[dbo].[AddTagsToPost] TO WebAPI;

    ```


    Every time a user tries to execute an action on an object for which he or she
    doesn’t have the correct permission, an error will be raised, and the execution
    of the statement will be halted.


    In order to test that a specific user has the correct permissions, you can *impersonate*
    that user if you have logged in using the administrative account:


    ```

    EXECUTE AS USER = ''WebAPI'';

    ```


    From now on, you can execute all the T-SQL code you want to test, and it will
    be executed as if was the user `WebAPI` to invoke it.


    To revert back to your administrative user, you just need to run


    ```

    REVERT;

    ```


    Also, keep in mind that if you want to make sure someone cannot access something,
    you can explicitly `DENY` to that user the permission to do something on an object:


    ```

    DENY SELECT ON OBJECT::[Sales].[Orders] TO SampleUser;

    ```


    A `DENY` will always win if there are several different and conflicting authorizations
    for the same object. This could happen if the user is part of one or more roles.


    To completely remove a user from a database, so that he won’t even be able to
    connect to it, one easy way is to delete the user:


    ```

    DROP USER SampleUser;

    ```


    In case you want to temporarily prevent the user from connecting, instead of dropping
    that user, you could just deny him or her the permission to connect if you want:


    ```

    DENY CONNECT TO SampleUser;

    ```


    Permissions and security are huge topics, but this is a good start. Remember to
    keep security in mind right from the beginning and you’ll already be one step
    ahead.


    If you’re already a security-savvy person, you may be thinking that using a password
    for logging in into a system is something that’s not really secure, and you are
    totally right. You can create an Azure SQL user that does not have a password
    stored in Azure SQL and that relies on Azure Active Directory instead. Your application
    can then use a Managed Identity to authenticate itself when connecting to Azure
    SQL.


    A full tutorial on this topic is here: [`https://aka.ms/aswtcmsi`](https://aka.ms/aswtcmsi).'
  trans: '

    ### 权限


    管理权限及相应的数据访问授权通常是数据库管理员的职责，但正如之前讨论的，安全性在每个应用中都至关重要。因此，开发者至少掌握所用工具和系统安全原理的基础知识总是有益的，这能确保从底层就考虑到安全性，避免未来的麻烦和意外。


    Azure SQL 遵循**最小权限原则**，因此，一个新创建的用户在 Azure SQL 中实际上能做的事情非常有限。除了你在创建 Azure SQL Server
    或 Azure SQL 托管实例资源时定义的`administrative`用户（它拥有所有可能的授权，因为是管理员账户，**不应**用于授予应用数据访问权限）之外，你应该为你的应用创建一个专用的用户。例如，对于一个托管在
    Azure Web API 中的 API 服务，你可以创建 `WebAPI` 用户：


    ```sql

    CREATE USER WebAPI WITH PASSWORD = ''94m1-2sx0_1!'';

    ```


    如果你尝试用这个用户登录，你会发现它无法访问任何内容。要允许它对某个表执行 `SELECT` 操作，例如，你需要 `GRANT` 它正确的权限：


    ```sql

    GRANT SELECT ON OBJECT::[Sales].[Orders] TO WebAPI;

    ```


    Azure SQL 中有大量的权限设置，允许你对任何用户的安全访问进行**微调**。为了简化安全管理，你可以使用 `roles` 或 `schemas`。角色允许你将用户分组，这样用户就能继承其所属角色的权限。角色可以手动创建，也可以使用预定义的角色。例如，`db_datareader`
    角色中的任何用户都可以从任何表读取数据，但他们无法修改任何数据：


    ```sql

    ALTER ROLE [db_datareader] ADD MEMBER [WebAPI];

    ```


    如果你只想对特定的一组对象（例如，你正在创建的 Web API 解决方案所使用的所有表）授予某些权限，你可以针对一个对象架构：


    ```sql

    GRANT SELECT ON SCHEMA::[Sales] TO WebAPI;

    ```


    这样的代码将允许你对属于 `Sales` 架构的任何对象使用 `SELECT`。


    正如你可能已经猜到的，存储过程不允许使用 `SELECT`，你需要向用户授予 `EXECUTE` 权限，以确保其可以执行所需的存储过程：


    ```sql

    GRANT EXECUTE ON OBJECT::[dbo].[AddTagsToPost] TO WebAPI;

    ```


    每当用户尝试对一个他/她没有正确权限的对象执行操作时，系统将引发错误，并停止该语句的执行。


    为了测试某个特定用户是否拥有正确的权限，如果你已经使用管理员账户登录，你可以 `impersonate`（模拟）该用户：


    ```sql

    EXECUTE AS USER = ''WebAPI'';

    ```


    从现在开始，你可以执行所有你想要测试的 T-SQL 代码，其执行效果就如同是用户 `WebAPI` 调用的一样。


    要切换回你的管理员用户，你只需运行：


    ```sql

    REVERT;

    ```


    另外，请记住，如果你希望确保某人不能访问某个资源，你可以明确地 `DENY`（拒绝）该用户在某对象上执行某项操作的权限：


    ```sql

    DENY SELECT ON OBJECT::[Sales].[Orders] TO SampleUser;

    ```


    如果存在多个针对同一对象且相互冲突的授权，`DENY`（拒绝）将始终优先。如果用户属于一个或多个角色，这种情况就可能发生。


    要从数据库中完全移除一个用户，使其甚至无法连接到数据库，一个简单的方法是删除该用户：


    ```sql

    DROP USER SampleUser;

    ```


    如果你只想暂时阻止用户连接，而不是删除该用户，你可以直接拒绝其连接权限：


    ```sql

    DENY CONNECT TO SampleUser;

    ```


    权限和安全是庞大的主题，但这是一个好的开始。请记住从一开始就牢记安全性，这样你就已经领先一步了。


    如果你已经是一个精通安全的人，你可能会认为使用密码登录系统并不十分安全，你是完全正确的。你可以创建一个不将密码存储在 Azure SQL 中的 Azure
    SQL 用户，它依赖于 Azure Active Directory。然后，你的应用程序可以在连接到 Azure SQL 时使用托管标识进行身份验证。


    关于此主题的完整教程在这里：[`https://aka.ms/aswtcmsi`](https://aka.ms/aswtcmsi)。

    '
- fmt: '### Row-Level Security


    使用权限（`permissions`），您可以拒绝访问某些表，甚至只是某些列。但如果您想拒绝访问某些特定的行呢？在 Azure SQL 中，您有一个强大的功能称为
    `Row-Level Security`（简称 `RLS`），它允许您精确地做到这一点。


    通过 `RLS`，您可以创建一个针对一个或多个表的 `策略`（`policy`）。每次对这些表执行读或写操作时，策略就会生效：它将评估受影响的行对于执行操作的用户是否可访问。


    为了进行评估，策略会将一个提供的用户定义内联表值函数应用到活动操作触及的每一行。如果函数返回 1，则该行可访问；否则，不可访问。


    得益于 Azure SQL 查询优化器，该函数将被 `内联`（`inlined`），因此它实际上不会为范围内的每一行执行；否则性能会非常糟糕，但从逻辑角度来看，这正是正在发生的事情。


    以下是一个安全策略定义的示例：


    ```sql

    CREATE SECURITY POLICY OrderSecurityPolicy

    ADD FILTER PREDICATE [rls].LoginSecurityPolicy(SalespersonPersonID) ON [Sales].[Orders]

    WITH (STATE = ON);

    ```


    如您所见，它使用函数 `rls.LoginSecurityPolicy` 来检查对 `Sales.Orders` 表中行的授权。该函数将接收它需要评估的每一行中
    `SalespersonPersonID` 列的值。该函数的创建方式如下：


    ```sql

    CREATE FUNCTION rls.LoginSecurityPolicy(@PersonID AS INT)

    RETURNS TABLE

    WITH SCHEMABINDING

    AS

    RETURN

    SELECT

    1 As [Authorized]

    FROM

    [Application].[People]

    WHERE

    LoginName = SESSION_CONTEXT(N''Login'')

    AND

    PersonID = @PersonId;

    GO

    ```


    该代码使用系统函数 `SESSION_CONTEXT` 来检索 `Login` 键的值。该函数非常有用，因为它允许客户端在连接数据中将一些信息传递给 Azure
    SQL，然后在整个连接生命周期内都可以访问这些信息。当您创建一个运行在中间层或作为微服务并且无法模拟调用用户的解决方案时，此功能非常方便。这样，您仍然可以将所需的信息（例如登录名）传递给
    Azure SQL，以便您可以使用它来应用安全策略。例如，如果您正在使用 OAuth2 来验证调用您正在构建的解决方案的用户，这绝对是一个必需的功能；否则，Azure
    SQL 将无法知道到底是谁在尝试访问数据，而您将不得不自己在客户端找到巧妙（且复杂）的方法来解决安全挑战。


    一旦 Azure SQL 获得了关于谁在实际尝试访问数据的信息，正如您在代码中所见，它将检查该登录名是否存在于 `Application.People` 表中。它还将使用活动安全策略注入到
    `@PersonId` 变量中的值来检查此人是否是分配来管理他或她正尝试访问的订单的人。如果所有这些检查都为真，则该行将允许呈现给用户。否则，该行将被简单地丢弃，用户甚至不会知道它的存在。事实上，当安全策略处于活动状态时，如果
    Kayla Woodcock 小姐（其 PersonId = 2）尝试通过我们创建的解决方案访问数据，她将只看到她自己的行：


    ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figb_HTML.jpg](images/493913_1_En_5_Chapter/493913_1_En_5_Figb_HTML.jpg)


    这非常棒，因为它确实大大简化了代码，确保只有用户有权看到的数据才会真正离开数据库。


    除了过滤掉行之外，策略还可以被指示在有人尝试访问其没有所需权限的行时引发错误。例如，这可以用于拦截那些会插入未授权值的 `INSERT` 命令。由于该值尚不存在，因此无法使用过滤谓词，但您可能仍然希望阻止其执行：这正是
    `BLOCK PREDICATE` 可以做到的。


    像往常一样，可以使用 `DROP` 命令删除安全策略：


    ```sql

    DROP SECURITY POLICY OrderSecurityPolicy;

    ```


    一个深入探讨 `RLS` 并展示如何将其用于创建真实世界应用程序的视频，以及一个包含有效示例代码的 GitHub 仓库，可以在这里找到：[`https://aka.ms/rlsvideo`](https://aka.ms/rlsvideo)。


    ### Dynamic Data Masking


    有时您无法阻止对某些列的访问，因为应用程序需要它们才能正常工作。例如，想象您正在创建一组 API，允许用户在可用数据上执行即席查询，这样就可以拥有一个即席报告或分析解决方案来运行最奇特的分析。一个典型的用例是将
    Power BI 连接到此类 API。根据访问数据的用户，您可能希望屏蔽一些返回的数据，以便未经授权的用户不会收到错误，而是简单地看到一个预设的模式，从而保护敏感信息。为此，您需要为您想要混淆的列添加一个
    `掩码`（`Mask`）：


    ```sql

    ALTER TABLE [Application].[People]

    ALTER COLUMN EmailAddress ADD MASKED WITH (FUNCTION = ''email()'');

    ```


    在执行上述代码后，任何没有 `UNMASK` 权限的人将只看到 `EmailAddress` 列的已屏蔽数据。


    ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figc_HTML.jpg](images/493913_1_En_5_Chapter/493913_1_En_5_Figc_HTML.jpg)


    *图 5-1. 动态数据屏蔽在行动中*


    这种混淆直接发生在数据库中，因此敏感数据永远不会被发送到 Azure SQL 之外。


    由于数据只是被混淆，一个*已经*拥有某些敏感数据的用户仍然可以使用该信息来查询数据库。假设在您正在创建的报告中，您需要分析一个特定用户，并且该用户向您提供了她自己的电子邮件。像这样的查询将完美工作：


    ```sql

    SELECT * FROM [Application].[People] WHERE EmailAddress = ''helenm@fabrikam.com''

    ```


    这为您提供了相当大的灵活性，因为您可以确保保护数据而不限制其对那些通过其他合法方式已访问该受保护信息的人的使用。


    当然，这是一把双刃剑，因为它也意味着通过执行暴力攻击，混淆后的数据可能会被恶意用户猜出。这就是为什么动态数据屏蔽应始终与其他安全功能（如行级安全）一起使用，以使发生数据泄露的可能性最小化。Azure
    还提供了一个名为高级威胁防护的功能，它也适用于 Azure SQL，它通过使用复杂的机器学习算法监控可疑的数据库访问和异常查询模式来引发潜在威胁的警报，因此您可以始终确保任何恶意访问数据的尝试都会被立即报告。'
  raw: '### Row-Level Security


    With permissions , you can deny access to certain tables or even just to certain
    columns. But what if you want to deny access to some specific rows? In Azure SQL,
    you have a powerful feature called *Row-Level Security*, or *RLS* for short, that
    allows you to do exactly that.


    With RLS, you can create a *policy* that will target one or more tables. Each
    time a read or a write operation is executed against those tables, the policy
    will kick in: it will evaluate if the rows affected by the requested operation
    are accessible to the user executing it or not.


    To do the evaluation, the policy will apply a provided user defined Inline Table-Valued
    Function to each row touched by the active operation. If the function returns
    1, that row will be accessible; otherwise, it won’t.


    Thanks to the Azure SQL Query Optimizer , the function will be *inlined*, and
    thus it won’t really be executed for each row in scope; otherwise, performance
    would be horrible, but from a logical point of view, that’s exactly what is happening.


    Here’s an example of a security policy definition:


    ```

    CREATE SECURITY POLICY OrderSecurityPolicy

    ADD FILTER PREDICATE [rls].LoginSecurityPolicy(SalespersonPersonID) ON [Sales].[Orders]

    WITH (STATE = ON);

    ```


    As you can see, it uses the Function `rls.LogonSecurityPolicy` to check authorization
    for rows in `Sales.Orders` table. The function will receive the value of the column
    `SalespersonPersonID` for each row it needs to evaluate. The function is created
    as follows:


    ```

    CREATE FUNCTION rls.LoginSecurityPolicy(@PersonID AS INT)

    RETURNS TABLE

    WITH SCHEMABINDING

    AS

    RETURN

    SELECT

    1 As [Authorized]

    FROM

    [Application].[People]

    WHERE

    LoginName = SESSION_CONTEXT(N''Login'')

    AND

    PersonID = @PersonId;

    GO

    ```


    The code uses the system function `SESSION_CONTEXT` to retrieve the value of the
    `Logon` key. The function is incredibly useful as it allows a client to pass some
    information to Azure SQL as part of the connection data that can then be accessed
    anytime during the connection lifetime. This feature comes in handy when you are
    creating a solution that runs on a middle tier or as a microservice and cannot
    impersonate the calling user. In this way, you can still have a way to pass to
    Azure SQL the information you need, for example, the login name, so that you can
    use it to apply a security policy. If you are using OAuth2 to authenticate the
    user calling the solution you are working on, for example, this is absolutely
    a needed feature; otherwise, Azure SQL won’t be able to know who is really trying
    to access the data, and you would have to find clever (and complex) way to solve
    the security challenge by yourself on the client side.


    Once Azure SQL has the information on who is actually trying to access the data,
    as you can see in the code, it will check if that login exists in the `Application.People`
    table. It will also check that such person is the one assigned to manage the order
    he or she is trying to access by using the value injected into the `@PersonId`
    variable by the active security policy. If all these checks are true, then the
    row is allowed to surface to the user. If not, the row will simply be discarded,
    and the user won’t even know it exists. In fact, when the security policy is active,
    if Miss Kayla Woodcock (that has PersonId = 2) tries to access the data via the
    solution we created, she will only see her rows:


    ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figb_HTML.jpg](images/493913_1_En_5_Chapter/493913_1_En_5_Figb_HTML.jpg)


    This is pretty amazing, as it really helps to simplify the code a lot, making
    sure that only the data a user is authorized to see will actually leave the database.


    Other than filtering out rows, a policy can also be instructed to raise an error
    in case someone is trying to access rows for which he or she doesn’t have the
    needed permissions. This can be useful, for example, to intercept `INSERT` commands
    that would insert non-authorized values. As the value doesn’t exist yet, there
    is no way to use the filter predicate, but still you may want to block its execution:
    that’s exactly what the `BLOCK PREDICATE` can do.


    As usual, the security policy can be deleted with the `DROP` command:


    ```

    DROP SECURITY POLICY OrderSecurityPolicy;

    ```


    A video that goes into detail of RLS and shows how it can be used to create real-world
    application, along with a GitHub repo with working sample code, is available here:
    [`https://aka.ms/rlsvideo`](https://aka.ms/rlsvideo).


    ### Dynamic Data Masking


    Sometimes you can’t prevent access to certain columns as the application expects
    them to work properly. For example, imagine you are creating a set of APIs that
    will allow the user to execute ad hoc queries on available data, so that one can
    have an ad hoc reporting or analytics solution to run even the most exotic analysis.
    A typical use case for this would be to connect Power BI to such API. Depending
    on the user accessing the data, you may want to mask some of the returned data,
    so that the unauthorized user, instead of getting an error, would simply see a
    predetermined pattern, protecting sensitive information. To do that, you need
    to add a *Mask* to the columns you want to obfuscate:


    ```

    ALTER TABLE [Application].[People];

    ALTER COLUMN EmailAddress ADD MASKED WITH (FUNCTION = ''email()'');

    ```


    After the preceding code is executed, anyone who doesn’t have the `UNMASK` permission
    will see only masked data for the `EmailAddress` column.


    ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figc_HTML.jpg](images/493913_1_En_5_Chapter/493913_1_En_5_Figc_HTML.jpg)


    *Figure 5-1. Dynamic Data Masking in action*


    This obfuscation happens right into the database, so no sensitive data is ever
    sent outside Azure SQL.


    As data is only obfuscated, a user that is *already* in possession of some sensitive
    data can still use that information to query the database. Let’s say that in the
    report you are creating, you need to analyze a specific user and that user gave
    you her own email. A query like this will work perfectly:


    ```

    SELECT * FROM [Application].[People] WHERE EmailAddress = ''helenm@fabrikam.com''

    ```


    This gives you quite a lot of flexibility as you can be sure to protect data without
    limiting its usage for those who had access to that protected information in some
    other, legitimate way.


    Of course, this is a double-edged sword as it also means that by executing brute
    force attacks, obfuscated data could be guessed by a malicious user. That’s why
    Dynamic Data Masking should always be used along with other security features,
    like Row-Level Security, so that the possibility of allowing a data breach is
    minimal. Azure also offers a feature called Advanced Threat Protection that works
    with Azure SQL too and that raises alerts for potential threats by using sophisticated
    Machine Learning algorithms to monitor suspicious database access and anomalous
    query patterns, so that you can always be sure that any malicious attempt to access
    your data will be reported immediately.'
  trans: '### 行级安全


    通过使用权限（`permissions`），您可以拒绝访问某些表，甚至只是某些列。但如果您想拒绝访问某些特定的行呢？在 Azure SQL 中，您拥有一个强大的功能，称为
    `行级安全`（简称 `RLS`），它允许您精确地做到这一点。


    借助 `RLS`，您可以为一个或多个表创建一个 `策略`（`policy`）。每次对这些表执行读或写操作时，该策略就会生效：它将评估受影响的行对于执行操作的用户是否可访问。


    为了进行评估，策略会将一个提供的用户定义内联表值函数应用到活动操作触及的每一行。如果函数返回 1，则该行可访问；否则，不可访问。


    得益于 Azure SQL 查询优化器，该函数将被 `内联`（`inlined`），因此它实际上不会为范围内的每一行执行（否则性能会非常糟糕），但从逻辑角度来看，这正是正在发生的事情。


    以下是一个安全策略定义的示例：


    ```sql

    CREATE SECURITY POLICY OrderSecurityPolicy

    ADD FILTER PREDICATE [rls].LoginSecurityPolicy(SalespersonPersonID) ON [Sales].[Orders]

    WITH (STATE = ON);

    ```


    如您所见，它使用函数 `rls.LoginSecurityPolicy` 来检查对 `Sales.Orders` 表中行的授权。该函数将接收它需要评估的每一行中
    `SalespersonPersonID` 列的值。该函数的创建方式如下：


    ```sql

    CREATE FUNCTION rls.LoginSecurityPolicy(@PersonID AS INT)

    RETURNS TABLE

    WITH SCHEMABINDING

    AS

    RETURN

    SELECT

    1 As [Authorized]

    FROM

    [Application].[People]

    WHERE

    LoginName = SESSION_CONTEXT(N''Login'')

    AND

    PersonID = @PersonId;

    GO

    ```


    该代码使用系统函数 `SESSION_CONTEXT` 来检索 `Login` 键的值。该函数非常有用，因为它允许客户端在连接数据中将一些信息传递给 Azure
    SQL，然后在整个连接生命周期内都可以访问这些信息。当您创建一个运行在中间层或作为微服务并且无法模拟调用用户的解决方案时，此功能非常方便。这样，您仍然可以将所需的信息（例如登录名）传递给
    Azure SQL，以便您可以使用它来应用安全策略。例如，如果您正在使用 OAuth2 来验证调用您正在构建的解决方案的用户，这绝对是一个必需的功能；否则，Azure
    SQL 将无法知道到底是谁在尝试访问数据，而您将不得不自己在客户端找到巧妙（且复杂）的方法来解决安全挑战。


    一旦 Azure SQL 获得了关于谁在实际尝试访问数据的信息，正如您在代码中所见，它将检查该登录名是否存在于 `Application.People` 表中。它还将使用活动安全策略注入到
    `@PersonId` 变量中的值来检查此人是否是分配来管理他或她正尝试访问的订单的人。如果所有这些检查都为真，则该行将允许呈现给用户。否则，该行将被简单地丢弃，用户甚至不会知道它的存在。事实上，当安全策略处于活动状态时，如果
    Kayla Woodcock 小姐（其 PersonId = 2）尝试通过我们创建的解决方案访问数据，她将只看到她自己的行：


    ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figb_HTML.jpg](img/493913_1_En_5_Figb_HTML.jpg)


    这非常棒，因为它确实大大简化了代码，确保只有用户有权看到的数据才会真正离开数据库。


    除了过滤掉行之外，策略还可以被指示在有人尝试访问其没有所需权限的行时引发错误。例如，这可以用于拦截那些会插入未授权值的 `INSERT` 命令。由于该值尚不存在，因此无法使用过滤谓词，但您可能仍然希望阻止其执行：这正是
    `阻止谓词`（`BLOCK PREDICATE`）可以做到的。


    像往常一样，可以使用 `DROP` 命令删除安全策略：


    ```sql

    DROP SECURITY POLICY OrderSecurityPolicy;

    ```


    一个深入探讨 `RLS` 并展示如何将其用于创建真实世界应用程序的视频，以及一个包含有效示例代码的 GitHub 仓库，可以在这里找到：[`https://aka.ms/rlsvideo`](https://aka.ms/rlsvideo)。


    ### 动态数据屏蔽


    有时您无法阻止对某些列的访问，因为应用程序需要它们才能正常工作。例如，想象您正在创建一组 API，允许用户在可用数据上执行即席查询，这样就可以拥有一个即席报告或分析解决方案来运行最奇特的分析。一个典型的用例是将
    Power BI 连接到此类 API。根据访问数据的用户，您可能希望屏蔽一些返回的数据，以便未经授权的用户不会收到错误，而是简单地看到一个预设的模式，从而保护敏感信息。为此，您需要为您想要混淆的列添加一个
    `掩码`（`Mask`）：


    ```sql

    ALTER TABLE [Application].[People]

    ALTER COLUMN EmailAddress ADD MASKED WITH (FUNCTION = ''email()'');

    ```


    在执行上述代码后，任何没有 `UNMASK` 权限的人将只看到 `EmailAddress` 列的已屏蔽数据。


    ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figc_HTML.jpg](img/493913_1_En_5_Figc_HTML.jpg)


    *图 5-1. 动态数据屏蔽在行动中*


    这种混淆直接发生在数据库中，因此敏感数据永远不会被发送到 Azure SQL 之外。


    由于数据只是被混淆，一个*已经*拥有某些敏感数据的用户仍然可以使用该信息来查询数据库。假设在您正在创建的报告中，您需要分析一个特定用户，并且该用户向您提供了她自己的电子邮件。像这样的查询将完美工作：


    ```sql

    SELECT * FROM [Application].[People] WHERE EmailAddress = ''helenm@fabrikam.com''

    ```


    这为您提供了相当大的灵活性，因为您可以确保保护数据而不限制其对那些通过其他合法方式已访问该受保护信息的人的使用。


    当然，这是一把双刃剑，因为它也意味着通过执行暴力攻击，混淆后的数据可能会被恶意用户猜出。这就是为什么动态数据屏蔽应始终与其他安全功能（如行级安全）一起使用，以使发生数据泄露的可能性最小化。Azure
    还提供了一个名为高级威胁防护的功能，它也适用于 Azure SQL，它通过使用复杂的机器学习算法监控可疑的数据库访问和异常查询模式来引发潜在威胁的警报，因此您可以始终确保任何恶意访问数据的尝试都会被立即报告。'
- fmt: '### Always Encrypted


    `Always Encrypted` is a feature that will guarantee that your highly sensitive
    data, like Credit Card numbers or Social Security numbers, is encrypted with a
    set of keys that are not shared with the database engine. This means that even
    database administrators won’t be able to decrypt that data, as the data will be
    encrypted directly by the application and sent to the database in its encrypted
    form.


    ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figd_HTML.jpg](images/493913_1_En_5_Chapter/493913_1_En_5_Figd_HTML.jpg)


    `Figure 5-2. CreditLimit has been Always Encrypted`


    The keys used for encryption can be stored in the local machine or in `Azure Key
    Vault`, and only those applications that have access to those keys can access
    the encrypted data. Trying to access `Always Encrypted` data without the correct
    key will result in an error:


    ```

    Msg 0, Level 11, State 0, Line 0

    Failed to decrypt column ''CreditLimit''.

    ```


    To encrypt and decrypt the values, the client application must use a connection
    library that supports `Always Encrypted`, like


    *   `Microsoft JDBC Driver 6.0` (or higher)

    *   `ODBC Driver 13.1 for SQL Server`

    *   `ODBC Driver 17 for SQL Server`

    *   `Microsoft Drivers 5.2 for PHP for SQL Server`

    *   `Microsoft.Data.SqlClient`


    Those libraries will take care of everything, and encryption and decryption will
    be completely transparent for the developer.


    ## If you want to know more


    You now have a complete knowledge of all the supported programmability features
    that `Azure SQL` offers, as well as a very good base of security concepts and
    options. These capabilities are at your disposal to make sure your application
    is not only scalable and fast but also secure.


    To know more about the topics mentioned in this chapter, you can start from these
    resources:


    *   `SQL Server 2017 Developer''s Guide` – [`www.amazon.com/SQL-Server-2017-Developers-Guide-dp-1788476190/dp/1788476190`](http://www.amazon.com/SQL-Server-2017-Developers-Guide-dp-1788476190/dp/1788476190)

    *   `What''s the difference between a temp table and table variable in SQL Server?`
    – [`https://dba.stackexchange.com/questions/16385/whats-the-difference-between-a-temp-table-and-table-variable-in-sql-server/16386#16386`](https://dba.stackexchange.com/questions/16385/whats-the-difference-between-a-temp-table-and-table-variable-in-sql-server/16386%252316386)

    *   `Working with Change Tracking` – [`https://docs.microsoft.com/sql/relational-databases/track-changes/work-with-change-tracking-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/work-with-change-tracking-sql-server%253Fview%253Dsql-server-ver15)

    *   `Debezium: Stream changes from your database` – [`https://debezium.io/`](https://debezium.io/)

    *   `SQL Server Change Stream` – [`https://medium.com/@mauridb/sql-server-change-stream-b204c0892641`](https://medium.com/%2540mauridb/sql-server-change-stream-b204c0892641)

    *   `Transparent data encryption` – [`https://docs.microsoft.com/azure/sql-database/transparent-data-encryption-azure-sql?tabs=azure-portal`](https://docs.microsoft.com/en-us/azure/sql-database/transparent-data-encryption-azure-sql%253Ftabs%253Dazure-portal)

    *   `Always Encrypted` – [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-database-engine)

    *   `Always Encrypted Client Development` – [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-client-development?view=azuresqldb-current`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-client-development%253Fview%253Dazuresqldb-current)


    ## 6. Practical Use of Tables and Indexes


    When people imagine a table, in most of the cases, this looks like an Excel spreadsheet.
    There are a bunch of cells organized in rows and columns, and there is usually
    one column that contains the identifiers of the rows.


    `Azure SQL` enables you to use much more than a plain table. You can configure
    and optimize your table for some specific query patterns, complex analytics, or
    highly concurrent updates. You can also configure your tables to keep a full history
    of changes, implement some parts of domain data-integrity logic, and apply fine-grained
    security rules. In this chapter, you can find some practical advice that can help
    you leverage the features that `Azure SQL` provides to create a table that is
    best fit for your needs.'
