    And the Stored Procedure can accept JSON in `@Tags`:


    ```

    EXEC dbo.AddTagsToPost 1, ''{"tags": ["azure-sql", "string_split", "csv"], "categories":
    {}}'';

    ```


    As JSON is passed a regular string, this technique will work with any language
    as there is no special knowledge required by the client libraries to take advantage
    of this option.


    #### CSV


    What about if you just need to pass a small array of values? Or if the language
    you are using does not support TVPs and JSON feels just overkill for the goal?
    One way to elegantly solve the problem would be to use good-old, but always present
    *CSV* (*Comma-Separated Values*). Note that the comma is not really mandatory,
    as you can use the divider you prefer, like a pipe or a dash. Azure SQL gives
    you the Table-Valued System Function STRING_SPLIT to use for this purpose:


    ```

    CREATE PROCEDURE dbo.AddTagsToPost

    @PostId INT,

    @Tags NVARCHAR(MAX)

    AS

    INSERT INTO dbo.PostTags

    SELECT @PostId, T.[value] FROM STRING_SPLIT(@Tags, ''|'') AS T

    ```


    And then you can just use the Stored Procedure like this:


    ```

    EXEC dbo.AddTagsToPost 1, ''azure-sql|string_split|csv''

    ```


    Same as with JSON , this option doesn’t require any special handling on the client
    side, so you can use this technique with any development language that supports
    regular ODBC connections.


    ## Monitoring data for changes


    Finding what data has changed from the last time an application, or a user, accessed
    it can be extremely helpful to increase application efficiency and scalability.
    Much fewer resources, in terms of CPU, network, and IO, would be needed, for example,
    to exchange only the changed data instead of a full set of data with a target
    application. In addition to such an already important point, since the burden
    of tracking changes can be left to Azure SQL, you’ll have your code leaner and
    solely focused on the specific business case you need to take care of. As a result,
    you will have more time to take care of it, removing from your plate the need
    of having to deal with other complexities that are anyway needed and expected
    in modern applications – like efficiency in data transfer.'
  trans: '

    #### 表值参数


    顾名思义，参数可以是表。是的，你可以将整个表传递给一个函数或存储过程。到目前为止，当你需要从应用程序向 Azure SQL 传递大量数据时，这是最佳选择。我用了
    *相当* 多这个词，因为根据经验法则，这个选项适用于传递数千行以内的数据。如果你的数据量达到数十万、数百万甚至更多，那么你应该参考前一章讨论的“批量操作”部分，以获得*非常出色*的性能。


    另外请记住，表值参数功能需要客户端库的支持，因为它需要知道这个选项才能使用它。常见的语言如 .NET、Python、Node 和 Go 都支持 TVP。


    如何使用 TVP 取决于你使用的语言，但基本思路是：你可以将数据加载到一个可以枚举的对象中，确保数据结构与你将用作参数的表*类型*的架构兼容，然后将该对象传递给你调用的存储过程。


    首先创建表类型：


    ```sql

    CREATE TYPE dbo.PostTagsTableType AS TABLE

    (

    Tag NVARCHAR(100) NOT NULL UNIQUE

    );

    ```


    然后在你的存储过程中引用它：


    ```sql

    CREATE PROCEDURE dbo.AddTagsToPost

    @PostId INT,

    @Tags dbo.PostTagsTableType READONLY

    AS

    INSERT INTO dbo.PostTags SELECT @PostId, Tag FROM @Tags

    ```


    如你所见，参数 `@Tags` 实际上是一个表，因此你可以像使用常规表一样使用它，唯一的限制是它是只读的。然后，以 .NET 为例，你可以像下面的代码那样使用
    TVP：


    ```csharp

    var p2 = new SqlParameter("@Tags", SqlDbType.Structured);

    p2.TypeName = "dbo.PostTagsTableType";

    p2.Value = tags;

    cmd.Parameters.Add(p2);

    ```


    其中，`tags` 对象是一个 .NET `DataTable`：


    ```csharp

    var tags = new DataTable("PostTagsTableType");

    tags.Columns.Add("Tag", typeof(string));

    tags.Rows.Add("azure-sql");

    tags.Rows.Add("tvp");

    ```


    表值参数经过了深度性能优化，并且通过向 Azure SQL 发送一批行数据，你的应用程序只需要与数据库进行一次往返通信，而不是每传递一行数据就通信一次。由于每次调用应用程序外部资源都会产生少量开销，因此将调用数据库的次数保持在最低水平（也称为减少应用程序的通信频率），可以确保为最终用户提供最佳体验，创建出可扩展且性能优异的应用程序。


    #### JSON


    有时，将对象作为表传递可能是不可行的。例如，当我们有一个表示诸如博文及其标签、分类、作者详细信息等的对象时。我们当然可以找到方法将此类对象转换为某种表值参数，但这很难称得上优雅。那么，为什么不直接将对象序列化为
    JSON 整体传递呢？Azure SQL 完全能够进行复杂的 JSON 操作，正如你将在第 8 章学到的。你可以编写一个能够接受 JSON 作为参数的存储过程；然后你可以用它来读取所需的
    JSON 部分，以便填充相应的表，或者将提取的值甚至整个 JSON 文档传递给其他过程：


    ```sql

    CREATE PROCEDURE dbo.AddTagsToPost

    @PostId INT,

    @Tags NVARCHAR(MAX)

    AS

    INSERT INTO dbo.PostTags

    SELECT @PostId, T.[value] FROM OPENJSON(@Tags, ''$.tags'') T

    GO

    ```


    该存储过程可以接受 `@Tags` 中的 JSON：


    ```sql

    EXEC dbo.AddTagsToPost 1, ''{"tags": ["azure-sql", "string_split", "csv"], "categories":
    {}}'';

    ```


    由于 JSON 是作为常规字符串传递的，这项技术适用于任何语言，因为客户端库不需要任何特殊知识即可利用此选项。


    #### CSV


    如果你只是需要传递一个小型值数组怎么办？或者如果你使用的语言不支持 TVP，而使用 JSON 又感觉有点杀鸡用牛刀？解决这个问题的一个优雅方法是使用经典的、但始终存在的
    *CSV*（*逗号分隔值*）。请注意，逗号并非强制性的，你可以使用自己喜欢的分隔符，如竖线或破折号。Azure SQL 为你提供了表值系统函数 `STRING_SPLIT`
    来用于此目的：


    ```sql

    CREATE PROCEDURE dbo.AddTagsToPost

    @PostId INT,

    @Tags NVARCHAR(MAX)

    AS

    INSERT INTO dbo.PostTags

    SELECT @PostId, T.[value] FROM STRING_SPLIT(@Tags, ''|'') AS T

    ```


    然后你可以像这样使用存储过程：


    ```sql

    EXEC dbo.AddTagsToPost 1, ''azure-sql|string_split|csv''

    ```


    与 JSON 一样，此选项不需要在客户端进行任何特殊处理，因此你可以将此技术用于任何支持常规 ODBC 连接的开发语言。


    #### 监控数据变更


    找出自上次应用程序或用户访问以来哪些数据发生了更改，对于提高应用程序的效率和可扩展性极为有帮助。例如，与目标应用程序交换仅更改的数据，而不是完整的数据集，所需的资源（CPU、网络和
    IO 方面）将大大减少。除了这个已经非常重要的优点外，由于跟踪变更的负担可以交给 Azure SQL 处理，你的代码将更加精简，并且只专注于你需要处理的特定业务场景。结果，你将有更多时间来处理它，从你的任务清单中移除那些在现代应用程序中无论如何都是必需且期望处理的其他复杂性——例如数据传输的效率。

    '
- fmt: '### Change Tracking


    Change tracking is a simple, yet effective technology to understand what data
    has changed since a specific moment in time. The idea behind this feature is that
    every time a user accesses a table, he or she can ask for the version number active
    at that moment. The user must keep that version number safely stored somewhere
    so that the next time he or she tries to access that table again, the user can
    also ask Azure SQL to only get the *changed* data starting from that version number
    and on. Azure SQL will return all the changed data from that version number along
    with the operation – insert, update, or delete – that the user should do on its
    own dataset to update it to the current status, along with the new version number
    that the user must use next time, to get a new set of changes.


    This feature is really powerful as it completely removes all the complexity from
    the client side, as the only thing that the client must do is to preserve the
    version number and present it to Azure SQL.


    Change Tracking must be enabled on the database:


    ```sql

    ALTER DATABASE WideWorldImportersStandard

    SET CHANGE_TRACKING = ON

    (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON)

    ```


    And on the table you want to track


    ```sql

    ALTER TABLE [Warehouse].[Colors]

    ENABLE CHANGE_TRACKING

    ```


    From that moment on, you can use the system scalar function `CHANGE_TRACKING_CURRENT_VERSION()`
    to get the current version number:


    ```sql

    SELECT CHANGE_TRACKING_CURRENT_VERSION()

    ```


    The version number is calculated and automatically updated at the database level
    – that’s why it doesn’t require any parameter – and will change every time some
    data is changed in one of the tracked tables. Let’s say, for example, that I’ve
    just read the table `Warehouse.Colors`, and after doing that, I asked the current
    version number. In addition to the resultset, Azure SQL returned the value 42
    to me, which represents the number associated with the *current* version, which
    means that the values I just read are associated with that version number.


    Now let’s say that someone, maybe even including myself, makes some changes to
    the `Warehourse.Colors` tables. After a while, let’s say 3 hours, I need to get
    the data again from the same table, but now, instead of getting the full dataset,
    I’d like to have only the changes from when I last saw it, so that I can avoid
    having to read and transfer all the rows that haven’t been changed in the meantime
    and that, most probably, would be the majority.


    `CHANGETABLE` is the function I need to use for this purpose:


    ```sql

    SELECT

    SYS_CHANGE_OPERATION, ColorID

    FROM

    CHANGETABLE(CHANGES [Warehouse].[Colors], 42) C

    ```


    The query will return a table like the following:


    ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figa_HTML.jpg](images/493913_1_En_5_Chapter/493913_1_En_5_Figa_HTML.jpg)


    where you can see the operation done on a row and the value of the column for
    the Primary Key of that row. With the Primary key – that uniquely identifies rows
    in a table – we can join that result with the original table, `Warehourse.Colors`,
    and get all the data we need. We can now run the `CHANGE_TRACKING_CURRENT_VERSION()`
    function again to get the current version; let’s say now it is equal to 50, and
    we keep the value somewhere, so that the next time we query for changes again,
    we''ll be using that value to get the new changes happened from that moment on
    – and so on for the next syncs.


    Easy and extremely efficient – and helpful to keep your client-side code very
    clean and easy to understand.


    To disable Change Tracking on a specific table, you use the `ALTER` command on
    the table where you want to disable Change Tracking:


    ```sql

    ALTER TABLE [Warehouse].[Colors]

    DISABLE CHANGE_TRACKING

    ```


    To disable it on the entire database, you use the `ALTER` command on the whole
    database:


    ```sql

    ALTER DATABASE WideWorldImportersStandard

    SET CHANGE_TRACKING = OFF

    ```


    ### Change data capture


    Change data capture is an even more sophisticated technology that uses the internal
    immutable transaction log to read all the changes done on data and save it into
    a specified table. It resembles very closely the idea of a Change Feed that some
    other databases provide. It reads from the transaction log using an asynchronous
    process and thus is perfect to consume changes without affecting performance of
    the table where those changes happened. At the moment, it is not yet fully available
    on all Azure SQL offerings, but keep an eye out for it. With solutions like Debezium,
    it will easily allow the creation of near real-time ETL solutions and integration
    with Kafka for a completely upgraded developer experience.


    ## Protecting data assets


    Aside from storing data and making it available upon request, a database also
    has the task of keeping the data secure. Azure SQL offers plenty of features to
    do that, ranging from permission management through data masking and up to encryption,
    so that you can choose exactly to which degree you want to expose your data and
    to whom.


    In addition to the features that will be presented in the next sections, keep
    in mind that by default data is encrypted at rest automatically, thanks to a feature
    named `Transparent Database Encryption`. As the name implies, it is completely
    transparent and doesn’t require any change to your code. Your data is secured
    by default once it is on Azure. Of course, that might not be enough for you, so
    read on.'
