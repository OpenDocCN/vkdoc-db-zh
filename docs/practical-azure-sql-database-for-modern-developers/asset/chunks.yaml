  trans: '

    ### 建议与最佳实践


    理解批处理/缓冲与弹性之间的权衡非常重要。如果数据库操作失败，丢失一批未处理的关键业务数据的风险可能超过批处理的性能优势。因此，在采用批处理时，实现前几章介绍的适当重试逻辑技术就更为重要。


    如果选择单一的批处理技术，`表值参数`能提供最佳的性能和灵活性。要获得最快的插入性能，请遵循以下通用准则，但务必在你的场景中进行测试：


    *   对于少于 100 行，使用单参数化的 `INSERT` 命令。

    *   对于少于 1000 行，使用`表值参数`。

    *   对于大于等于 1000–2000 行，在 .NET 中使用 `SqlBulkCopy`，或在其他语言中使用等效的批量复制技术（例如 Java 中的
    `SQLServerBulkCopy`）。


    对于更新和删除操作，请将`表值参数`与`存储过程`逻辑结合使用，该逻辑用于确定对表参数中每一行执行的正确操作。使用对你的应用程序和业务需求来说合理的大批次大小。


    测试最大的批次大小，以验证 `Azure SQL` 不会拒绝它。创建用于控制批处理的配置设置，例如批次大小或缓冲时间窗口。这些设置提供了灵活性：你可以在生产环境中更改批处理行为，而无需重新部署云服务。


    避免并行执行在单个数据库的单个表上操作的批次。如果确实选择将单个批次分配给多个工作线程，请运行测试以确定理想的线程数量。这个数量取决于几个因素，包括每个服务层级和计算大小的日志生成速率限制、对目标表上的数据和索引页的锁定影响等。最终效果是，更多的线程实际上可能会降低性能而不是提高它，因此测试你自己的工作负载并可能调整线程数量非常重要。


    ### 如果你想了解更多


    管理数据一致性是一项艰巨的任务。在并发和大规模场景下执行此任务则更具挑战性。正如本章引言所述，几乎所有最常用的数据库都提供对事务的支持并非偶然。在应用程序代码中管理一切将非常困难且效率低下。如今，关于可扩展性与一致性的争论几乎已不复存在。这要归功于新型的云原生架构，例如用于构建
    `Azure SQL DB Hyperscale` 的架构，让你可以两者兼得。`Azure SQL Hyperscale` 数据库背后的技术令人惊叹。如果你想了解更多，以下列表将为你提供一个起点：


    *   工作单元 – [`https://martinfowler.com/eaaCatalog/unitOfWork.html`](https://martinfowler.com/eaaCatalog/unitOfWork.html)

    *   Spanner：成为一个 SQL 系统 – Google Research – [`https://static.googleusercontent.com/media/research.google.com/en//pubs/archive/46103.pdf`](https://static.googleusercontent.com/media/research.google.com/en//pubs/archive/46103.pdf)

    *   Socrates：云端的全新 SQL Server – [`www.microsoft.com/research/publication/socrates-the-new-sql-server-in-the-cloud/`](http://www.microsoft.com/research/publication/socrates-the-new-sql-server-in-the-cloud/)

    *   SQL 正在击败 NoSQL 吗？ – [`https://dzone.com/articles/is-sql-beating-nosql`](https://dzone.com/articles/is-sql-beating-nosql)

    *   微服务的 6 种数据管理模式 – [`http://progressivecoder.com/6-data-management-patterns-for-microservices/`](http://progressivecoder.com/6-data-management-patterns-for-microservices/)

    *   事务锁定与行版本控制指南 – [`https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide`](https://docs.microsoft.com/en-us/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide)

    *   如何使用批处理提升 Azure SQL 数据库和 Azure SQL 托管实例的应用程序性能 – [`https://docs.microsoft.com/azure/azure-sql/performance-improve-use-batching`](https://docs.microsoft.com/azure/azure-sql/performance-improve-use-batching)


    # 8. 多模型能力


    `Azure SQL` 并非一个传统的关系型数据库平台。每个现代数据库都必须使你能够使用各种数据格式来应对不同场景。尽管传统的规范化关系型格式经过实战检验，并被证明是适用于广泛不同场景的优化技术，但在某些情况下，你可能会发现其他格式可能更适合你正在解决的问题。


    一个常见的例子是反规范化。传统上，你将领域对象表示为一组表，采用前几章所述的所谓*范式*形式。这是一种众所周知的数据库设计技术，其中每个复杂的领域结构，如列表或数组，都被放置在一个单独的表中。规范化模型对于高度并发的工作负载是优化的，在这种情况下，许多线程同时更新和读取领域对象的不同部分，而不影响正在更新其他部分的线程。然而，如果你的工作负载中，一个线程一次只访问一个对象，那么高度规范化的数据库可能会迫使你连接大量表来从物理部分重建领域对象。在这种情况下，你可以考虑将对象序列化为一个单一单元，而不是对其进行分解。


    `Azure SQL` 使你能够在同一个物理数据模型中同时使用关系型和非关系型结构。


    能够处理关系型、结构化或几种类型的半结构化格式，将 `Azure SQL` 归类为多模型数据库。如果你访问 [`https://db-engines.com/en/ranking`](https://db-engines.com/en/ranking)
    这个为数据库流行度评分的网站，你可能会注意到所有排名靠前的关系型数据库也被归类为多模型数据库，因为支持各种数据格式是所有现代数据库系统的必备要求。

    '
- fmt: '## Leveraging multi-model capabilities in database design


    Before we deep dive into multi-model capabilities of Azure SQL, let us see when
    you should use them in your applications. Some software engineers like NoSQL concepts
    because they make a database easier to use and don''t require (apparently) a lot
    of design upfront, and as such, you can start to use it right away without putting
    too much effort, and it also doesn''t require complex joins between tables. Others
    prefer relational model because it is battle-tested and guarantees that you may
    model any domain regardless of complexity. As a mature software engineer, you
    should not use dogmatic architectural decisions based on some arbitrary preference.
    The choice between relational and non-relational models or their combination should
    be based on the domain model of your application.


    If you are using something like Domain-Driven Development (DDD) , you are probably
    identifying Aggregates in your domain. Aggregate objects in DDD are the core entities
    in your domain model that represent the main access point for data and reference
    other entities and values. As an example, `Customer` might be the primary entity
    that you will use in your sales management module. This entity has some value
    objects and the reference to the other entities like `Order` or `Invoice`. If
    you know that client code will access customer orders and invoices through `Customer`
    object, then `Customer` is an aggregate that binds other entities that belong
    to him and represents the main access point for any external component that references
    any of the entities.


    ```

    Attention!


    Do not confuse Aggregates in DDD with aggregate functions (SUM, AVG, MAX) in SQL
    terminology.

    ```


    The dogmatic NoSQL approach would be to serialize the entire `Customer` aggregate
    and all related entities (`Orders`, `Invoices`) as one big collection that contains
    everything that you need in your application layer. This is a perfect choice for
    the applications that can fetch all necessary data using a single data access
    operation. Dogmatic relational approach would be to break every entity into a
    separate highly normalized table so different services in your application can
    access only a minimal set of information that they need. This is a perfect choice
    for highly concurrent applications where different threads at the same time access
    and modify different parts of entities or aggregates.


    The drawback of dogmatic decisions is that in both cases people assume the access
    patterns instead of analyzing usage patterns in the business domain. The proper
    approach is to analyze data access patterns that will be used and choose the best
    fit for the domain. Here are some examples of data access patterns that might
    influence your data design decisions:


    *   If you have big and complex forms where you need to preload both `Order` and
    `Invoice` entities after fetching `Customer` root aggregate and update information
    in `Customer`, `Invoice`, and `Order` entities once you save data on the form,
    it makes sense to store dependent entities as denormalized collections. This way
    you will read and persist all data with a single data access and avoid complex
    joins that gather data and transactions that span over multiple tables.


    *   If you know that different forms and services in your application might simultaneously
    update `Invoice` or `Order` entities that belong to the same `Customer` aggregate
    or you are frequently using lazy loading techniques, it makes sense to break entities
    into separate tables. This way, you can implement granular services that write
    and read only the objects that are needed. Breaking the entities to separate tables
    increases concurrency of your system, because different transactions can touch
    different parts of the entities without blocking each other. Otherwise, they would
    be synchronized and potentially blocked on each other.


    The application access patterns are the key factors that can guide your decision
    to use normalized or denormalized models.


    ### Classifying domain models


    Behavior analysis of your services and identification of data access patterns
    will enable you to identify what is the optimal storage design for your domain
    models. Depending on data access patterns in your application, you can classify
    your data models as


    *   `Highly normalized relational model` where you have dependencies and relationships
    between the entities (like classes in UML diagrams). This model is a perfect choice
    for highly concurrent applications and services updating or loading different
    parts of entities.


    *   `Graph` models are special kinds of models where nodes are interconnected
    with edges forming logical graph structure. This structure is a perfect choice
    for services that frequently break or establish bounds between the entities and
    traverse through the relations finding best paths or “friend-of-a-friend” type
    of analytics.


    *   `Non-relational` data where information is self-contained into the isolated
    data entities with very weak or non-existing relationships between them. This
    structure is perfect for the services that read and save domain objects as a single
    unit.


    ### Depending on the structure of your data entities, your models can be classified
    as


    *   `Structured` where all data entities have uniform or fixed schema. These types
    of entities can be easily visualized as rows and columns in Excel tables or serialized
    in CSV format.


    *   `Semi-structured` where data entities have some structure, but it is not always
    strict or uniform. Data entities have some common properties that are repeated
    across all entities, and some properties vary. Imagine a key-value collection
    with the different keys across entities or a hierarchically organized document
    with some missing values and sub-objects. These objects are typically serialized
    in JSON format.


    *   `Unstructured` data where patterns highly vary between data entities, and
    it is hard to find the common structure. The typical examples can be textual documents,
    images, or videos – there is a well-defined format that enables you to read information,
    but a combination of information in images makes them very different.


    Azure SQL is the best fit for relational structured and also a good fit for relational
    semi-structured data. The querying capabilities of SQL language enable you to
    apply the same processing rules over a large set of structured and semi-structured
    data and also easily traverse through foreign key and edge relationships.


    Structured information without relationships might be more efficiently stored
    as CSV or Excel files, especially if you need to store a large amount of data
    on Azure Data Lake or Azure Blob Storage. It doesn’t mean that you are losing
    query capabilities because Azure SQL still enables you to easily load these files
    from external storage and query them as in-database rows. Semi-structured and
    self-contained documents that are not related to other entities might be more
    efficiently stored in specialized document databases such as Azure Cosmos DB.
    Azure Cosmos DB provides many functionalities specialized for querying and indexing
    self-contained documents that you might leverage if you don’t need to cross-relate
    entities or implement some complex reports.'
  raw: '## Leveraging multi-model capabilities in database design


    Before we deep dive into multi-model capabilities of Azure SQL, let us see when
    you should use them in your applications. Some software engineers like NoSQL concepts because
    they make a database easier to use and don’t require (apparently) a lot of design
    upfront, and as such, you can start to use it right away without putting too much
    effort, and it also doesn''t require complex joins between tables. Others prefer
    relational model because it is battle-tested and guarantees that you may model
    any domain regardless of complexity. As a mature software engineer, you should
    not use dogmatic architectural decisions based on some arbitrary preference. The
    choice between relational and non-relational models or their combination should
    be based on the domain model of your application.


    If you are using something like Domain-Driven Development (DDD) , you are probably
    identifying Aggregates in your domain. Aggregate objects in DDD are the core entities
    in your domain model that represent the main access point for data and reference
    other entities and values. As an example, *Customer* might be the primary entity
    that you will use in your sales management module. This entity has some value
    objects and the reference to the other entities like *Order* or *Invoice*. If
    you know that client code will access customer orders and invoices through *Customer*
    object, then *Customer* is an aggregate that binds other entities that belong
    to him and represents the main access point for any external component that references
    any of the entities.


    Attention!


    Do not confuse Aggregates in DDD with aggregate functions (SUM, AVG, MAX) in SQL
    terminology.


    The dogmatic NoSQL approach would be to serialize the entire *Customer* aggregate
    and all related entities (*Orders*, *Invoices*) as one big collection that contains
    everything that you need in your application layer. This is a perfect choice for
    the applications that can fetch all necessary data using a single data access
    operation. Dogmatic relational approach would be to break every entity into a
    separate highly normalized table so different services in your application can
    access only a minimal set of information that they need. This is a perfect choice
    for highly concurrent applications where different threads at the same time access
    and modify different parts of entities or aggregates.


    The drawback of dogmatic decisions is that in both cases people assume the access
    patterns instead of analyzing usage patterns in the business domain. The proper
    approach is to analyze data access patterns that will be used and choose the best
    fit for the domain. Here are some examples of data access patterns that might
    influence your data design decisions:


    *   If you have big and complex forms where you need to preload both *Order* and
    *Invoice* entities after fetching *Customer* root aggregate and update information
    in *Customer*, *Invoice*, and *Order* entities once you save data on the form,
    it makes sense to store dependent entities as denormalized collections. This way
    you will read and persist all data with a single data access and avoid complex
    joins that gather data and transactions that span over multiple tables.


    *   If you know that different forms and services in your application might simultaneously
    update *Invoice* or *Order* entities that belong to the same *Customer* aggregate
    or you are frequently using lazy loading techniques, it makes sense to break entities
    into separate tables. This way, you can implement granular services that write
    and read only the objects that are needed. Breaking the entities to separate tables
    increases concurrency of your system, because different transactions can touch
    different parts of the entities without blocking each other. Otherwise, they would
    be synchronized and potentially blocked on each other.


    The application access patterns are the key factors that can guide your decision
    to use normalized or denormalized models.


    ### Classifying domain models


    Behavior analysis of your services and identification of data access patterns
    will enable you to identify what is the optimal storage design for your domain
    models. Depending on data access patterns in your application, you can classify
    your data models as


    *   *Highly normalized relational model* where you have dependencies and relationships
    between the entities (like classes in UML diagrams). This model is a perfect choice
    for highly concurrent applications and services updating or loading different
    parts of entities.


    *   *Graph* models are special kinds of models where nodes are interconnected
    with edges forming logical graph structure. This structure is a perfect choice
    for services that frequently break or establish bounds between the entities and
    traverse through the relations finding best paths or “friend-of-a-friend” type
    of analytics.


    *   *Non-relational* data where information is self-contained into the isolated
    data entities with very weak or non-existing relationships between them. This
    structure is perfect for the services that read and save domain objects as a single
    unit.


    Depending on the structure of your data entities, your models can be classified
    as


    *   *Structured* where all data entities have uniform or fixed schema. These types
    of entities can be easily visualized as rows and columns in Excel tables or serialized
    in CSV format.


    *   *Semi-structured* where data entities have some structure, but it is not always
    strict or uniform. Data entities have some common properties that are repeated
    across all entities, and some properties vary. Imagine a key-value collection
    with the different keys across entities or a hierarchically organized document
    with some missing values and sub-objects. These objects are typically serialized
    in JSON format.


    *   *Unstructured* data where patterns highly vary between data entities, and
    it is hard to find the common structure. The typical examples can be textual documents,
    images, or videos – there is a well-defined format that enables you to read information,
    but a combination of information in images makes them very different.


    Azure SQL is the best fit for relational structured and also a good fit for relational
    semi-structured data. The querying capabilities of SQL language enable you to
    apply the same processing rules over a large set of structured and semi-structured
    data and also easily traverse through foreign key and edge relationships.


    Structured information without relationships might be more efficiently stored
    as CSV or Excel files, especially if you need to store a large amount of data
    on Azure Data Lake or Azure Blob Storage. It doesn’t mean that you are losing
    query capabilities because Azure SQL still enables you to easily load these files
    from external storage and query them as in-database rows. Semi-structured and
    self-contained documents that are not related to other entities might be more
    efficiently stored in specialized document databases such as Azure Cosmos DB.
    Azure Cosmos DB provides many functionalities specialized for querying and indexing
    self-contained documents that you might leverage if you don’t need to cross-relate
    entities or implement some complex reports.'
  trans: '## 在数据库设计中利用多模型能力


    在我们深入探讨 Azure SQL 的多模型能力之前，让我们先看看何时应该在应用程序中使用它们。一些软件工程师喜欢 NoSQL 概念，因为它们使数据库更易于使用，并且（显然）不需要前期进行大量设计，因此你可以立即开始使用它，而无需付出太多努力，也不需要表之间复杂的连接。另一些人则偏爱关系模型，因为它经过实战检验，并保证无论复杂度如何，你都可以对任何领域进行建模。作为一个成熟的软件工程师，你不应该基于某些武断的偏好来做教条式的架构决策。在关系型和非关系型模型之间或其组合的选择，应该基于你应用程序的领域模型。


    如果你使用类似领域驱动开发（DDD）的方法，你可能会在你的领域中识别聚合（Aggregates）。DDD 中的聚合对象是你领域模型中的核心实体，它们代表了数据的主要访问点，并引用其他实体和值对象。例如，`Customer`
    可能是你在销售管理模块中使用的主要实体。这个实体有一些值对象，并引用了其他实体，如 `Order` 或 `Invoice`。如果你知道客户端代码将通过 `Customer`
    对象访问客户订单和发票，那么 `Customer` 就是一个聚合，它绑定属于它的其他实体，并为引用其中任何实体的任何外部组件提供主要的访问点。


    ```

    注意！


    不要将 DDD 中的聚合（Aggregates）与 SQL 术语中的聚合函数（SUM、AVG、MAX）混淆。

    ```


    教条式的 NoSQL 方法是将整个 `Customer` 聚合及其所有相关实体（`Orders`、`Invoices`）序列化为一个包含应用程序层所需一切的大型集合。这对于可以通过单次数据访问操作获取所有必要数据的应用程序来说是完美的选择。教条式的关系方法则是将每个实体分解成一个独立的高度规范化的表，以便应用程序中的不同服务只能访问它们所需的最小信息集。这对于高度并发的应用程序来说是完美的选择，不同的线程同时访问和修改实体或聚合的不同部分。


    教条式决策的缺点在于，在这两种情况下，人们都是假设访问模式，而不是分析业务领域中的使用模式。正确的方法是分析将使用的数据访问模式，并为领域选择最合适的方案。以下是一些可能影响你数据设计决策的数据访问模式示例：


    *   如果你有一个庞大而复杂的表单，在获取 `Customer` 根聚合后需要预加载 `Order` 和 `Invoice` 实体，并且在表单上保存数据后需要更新
    `Customer`、`Invoice` 和 `Order` 实体中的信息，那么将相关实体存储为非规范化集合是合理的。这样，你可以通过单次数据访问读取和持久化所有数据，并避免收集数据的复杂连接以及跨越多个表的事务。

    *   如果你知道应用程序中的不同表单和服务可能会同时更新属于同一 `Customer` 聚合的 `Invoice` 或 `Order` 实体，或者你经常使用延迟加载技术，那么将实体拆分到单独的表中是合理的。这样，你可以实现细粒度的服务，只写入和读取所需的对象。将实体拆分到单独的表中提高了系统的并发性，因为不同的事务可以操作实体的不同部分而不会相互阻塞。否则，它们将被同步，并可能相互阻塞。


    应用程序的访问模式是指导你决定使用规范化或非规范化模型的关键因素。


    ### 领域模型的分类


    对服务行为的分析和数据访问模式的识别将使你能够确定领域模型的最佳存储设计。根据应用程序中的数据访问模式，你可以将数据模型分类为：


    *   `高度规范化的关系模型`，其中实体之间存在依赖关系和关系（如 UML 图中的类）。该模型对于高度并发的应用程序和服务更新或加载实体的不同部分来说是完美的选择。

    *   `图模型`是一种特殊类型的模型，其中节点通过边相互连接，形成逻辑图结构。这种结构对于经常断开或建立实体间边界，并通过关系遍历以查找最佳路径或进行“朋友的朋友”类型分析的服务来说是完美的选择。

    *   `非关系型数据`，其中信息被自包含在孤立的、彼此之间关系非常弱或不存在的数据实体中。这种结构对于将领域对象作为一个单一单元进行读取和保存的服务来说是完美的选择。


    ### 根据数据实体的结构，你的模型可以分类为：


    *   `结构化`，所有数据实体都具有统一或固定的模式。这些类型的实体可以轻松地可视化为 Excel 表中的行和列，或序列化为 CSV 格式。

    *   `半结构化`，数据实体具有一些结构，但并非总是严格或统一的。数据实体具有一些在所有实体中重复的共同属性，以及一些变化的属性。想象一个在不同实体中具有不同键的键值集合，或者一个具有缺失值和子对象的分层组织文档。这些对象通常序列化为
    JSON 格式。

    *   `非结构化`数据，其中数据实体之间的模式差异很大，很难找到共同的结构。典型的例子可以是文本文档、图像或视频——存在一种定义良好的格式使你能够读取信息，但图像中信息的组合使它们彼此差异很大。


    Azure SQL 是关系型结构化数据的最佳选择，也是关系型半结构化数据的良好选择。SQL 语言的查询功能使你能够对大量结构化和半结构化数据应用相同的处理规则，并轻松遍历外键和边关系。


    没有关系的结构化信息可能更高效地存储为 CSV 或 Excel 文件，特别是如果你需要在 Azure Data Lake 或 Azure Blob Storage
    上存储大量数据时。这并不意味着你失去了查询能力，因为 Azure SQL 仍然使你能够轻松地从外部存储加载这些文件，并将它们查询为数据库中的行。与其他实体无关的半结构化和自包含文档可能更高效地存储在专门的文档数据库中，例如
    Azure Cosmos DB。Azure Cosmos DB 提供了许多专门用于查询和索引自包含文档的功能，如果你不需要交叉关联实体或实现某些复杂报告，你可以加以利用。'
- fmt: '## Why would you choose Azure SQL for non-relational models?


    Azure SQL is a multi-model database that enables you to combine different relational
    and non-relational models to find the best fit for your scenario.


    Unlike the traditional relational and NoSQL databases where you need to upfront
    decide what physical model you want to use, Azure SQL enables you to combine these
    relational and non-relational concepts and find the model that is the best fit
    for your needs.


    One of the key advantages of multi-model support in Azure SQL is the fact that
    data models are not mutually exclusive. Azure SQL enables you to seamlessly combine
    multiple models and leverage the best from all of them. You can create a classical
    relational model with some columns containing JSON or Spatial data, declare some
    of the tables as graph nodes and connect them using edges, place JSON columns
    in memory-optimized tables to leverage the speed and non-locking behavior. Multi-model
    capabilities can leverage all advanced language and storage features that Azure
    SQL provides. You can use the same T-SQL language to query both structured and
    semi-structured data, which enables a variety of applications and libraries to
    use any data format that you store in Azure SQL database.


    The main reason why you would select the multi-model capabilities of Azure SQL
    is the fact that they are seamlessly integrated in the core battle-tested features
    of relational databases. The combination of JSON, Graph features with advanced
    querying capabilities, possibility to use all collations to process strings in
    JSON documents, Columnstore, and memory-optimized objects that can provide extreme
    performance, in-database machine learning with Python/R would provide you advanced
    data processing experience that you might not get even in the fully specialized
    NoSQL database.


    Azure SQL enables you to represent your models using the following non-relational
    concepts:


    *   `JSON` that enables you to integrate your databases with a broad range of
    web/mobile applications and log file formats or even to denormalize and simplify
    your relational schema. JSON functionality also simplifies a lot of the work needed
    to be done by a developer to communicate with Azure SQL. You may ask Azure SQL,
    in fact, to return the result as JSON documents instead of a table with columns
    and rows, if doing so can simplify your code.


    *   `Graph` capabilities that enable you to represent your data model as a set
    of nodes and edges. This structure is an ideal choice in the domains where the
    domain entities are organized in network structure and where you can take advantage
    of a specialized query language to query graph data.


    *   `Spatial` support that enables you to store geometrical and geographical information
    in databases, index them using specialized spatial indexes, and use advanced spatial
    queries to retrieve the data.


    *   `XML` support that enables you to store XML documents in the tables, index
    XML information using specialized XML indexes, query XML data using T-SQL or XQuery
    languages, and transform your relational data to or from XML format.


    In the following sections, you will learn about the core multi-model capabilities
    that exist in Azure SQL Database.


    ### JSON support


    JSON (JavaScript Object Notation) is a popular data format initially used data
    exchange format used to transfer data between web clients and browsers, but it
    is also used to store semi-structured information such as settings and log information.
    This is the mainstream format for representing self-contained objects especially
    in the modern NoSQL database such as Azure Cosmos DB, MongoDB, and so on.


    Azure SQL enables you to parse JSON text and extract information from JSON documents,
    store JSON text in the tables like any other type, and produce JSON text based
    on a set of rows.


    The core JSON functionalities are shown in Figure [8-1](#493913_1_En_8_Chapter.xhtml#Fig1).


    ![../images/493913_1_En_8_Chapter/493913_1_En_8_Fig1_HTML.jpg](images/493913_1_En_8_Chapter/493913_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    JSON functionalities in Azure SQL


    Azure SQL enables you to work with JSON text that you are storing in tables or
    sending from your application by applying built-in functions `JSON_VALUE`, `JSON_QUERY`,
    `ISJSON`, and `JSON_MODIFY`. These functions enable you to parse JSON from text
    and extract and modify information in JSON documents.


    If you want to transform your semi-structured data represented in JSON format
    and load JSON documents into tables, you can use `OPENJSON` function . The `OPENJSON`
    function takes an array of objects in JSON format and splits them into a set of
    rows. You can use this Table-Valued Function to transform JSON into tables and
    load data in a relational format.


    Azure SQL also enables you to format the results of the SQL queries into JSON
    format. There is a `FOR JSON` clause that can specify that the results of the
    query should be returned in JSON format instead of a set of rows.


    These functionalities will enable you to implement most of the functionalities
    that you might want to use in your applications that require some handling of
    JSON data. In addition to built-in JSON functions and operators, you can combine
    other features of Azure SQL like indexes, collations, and advanced query capabilities
    on JSON data. Thanks to JSON support, it is very easy to integrate Azure SQL in
    Full-Stack or Back-End solutions, as – from a developer perspective – you will
    just send and receive JSON from Azure SQL. Here’s a list of Back-End API implemented
    in various languages, leveraging JSON and Azure SQL to simplify the development
    effort:


    *   [`https://github.com/Azure-Samples/azure-sql-db-node-rest-api`](https://github.com/Azure-Samples/azure-sql-db-node-rest-api)


    *   [`https://github.com/Azure-Samples/azure-sql-db-python-rest-api`](https://github.com/Azure-Samples/azure-sql-db-python-rest-api)


    *   [`https://github.com/Azure-Samples/azure-sql-db-dotnet-rest-api`](https://github.com/Azure-Samples/azure-sql-db-dotnet-rest-api)


    And here’s a Full-Stack example of the ToDoMVC sample app, implemented using NodeJS,
    Azure Functions, and Azure SQL, using JSON as transport format:


    [`https://github.com/Azure-Samples/azure-sql-db-todo-mvc`](https://github.com/Azure-Samples/azure-sql-db-todo-mvc)'
