  trans: '## 为何要为非关系型模型选择 Azure SQL？


    Azure SQL 是一个多模型数据库，它使您能够结合不同的关系型和非关系型模型，为您的场景找到最合适的方案。


    与传统的关系型和 NoSQL 数据库不同，后者需要您预先决定要使用哪种物理模型，而 Azure SQL 使您能够结合这些关系型和非关系型概念，找到最适合您需求的模型。


    Azure SQL 中多模型支持的一个关键优势是数据模型并非互斥。Azure SQL 使您能够无缝结合多个模型，并充分利用所有模型的优点。您可以创建一个经典的关系模型，其中某些列包含
    JSON 或空间数据，将某些表声明为图节点并通过边连接它们，将 JSON 列置于内存优化表中以利用其速度和无锁行为。多模型功能可以利用 Azure SQL
    提供的所有高级语言和存储特性。您可以使用相同的 T-SQL 语言来查询结构化和半结构化数据，这使得各种应用程序和库能够使用您存储在 Azure SQL 数据库中的任何数据格式。


    您选择 Azure SQL 多模型功能的主要原因是，它们无缝集成在经过实战检验的关系数据库核心功能中。将 JSON、图功能与高级查询能力、使用所有排序规则处理
    JSON 文档中的字符串的可能性、列存储索引、可提供极致性能的内存优化对象、以及结合 Python/R 的数据库内机器学习相结合，将为您提供高级的数据处理体验，这种体验即使是完全专业的
    NoSQL 数据库也可能无法提供。


    Azure SQL 使您能够使用以下非关系型概念来表示您的模型：


    *   `JSON`：使您能够将数据库与广泛的 Web/移动应用程序和日志文件格式集成，甚至可以对关系型模式进行反规范化和简化。JSON 功能也大大简化了开发人员与
    Azure SQL 通信所需完成的大量工作。如果这样做可以简化您的代码，您实际上可以要求 Azure SQL 以 JSON 文档而非包含列和行的表的形式返回结果。


    *   `图` 功能：使您能够将数据模型表示为一组节点和边。在领域实体以网络结构组织、并且您可以利用专门的查询语言来查询图数据的领域中，这种结构是理想的选择。


    *   `空间` 支持：使您能够在数据库中存储几何和地理信息，使用专门的空间索引对它们进行索引，并使用高级空间查询来检索数据。


    *   `XML` 支持：使您能够在表中存储 XML 文档，使用专门的 XML 索引对 XML 信息进行索引，使用 T-SQL 或 XQuery 语言查询
    XML 数据，并将您的关系数据与 XML 格式相互转换。


    在以下部分中，您将了解 Azure SQL 数据库中存在的核心多模型功能。


    ### JSON 支持


    JSON（JavaScript 对象表示法）是一种流行的数据格式，最初用作在 Web 客户端和浏览器之间传输数据的交换格式，但它也用于存储半结构化信息，如设置和日志信息。这是表示自包含对象的主流格式，尤其是在现代
    NoSQL 数据库中，如 Azure Cosmos DB、MongoDB 等。


    Azure SQL 使您能够解析 JSON 文本并从 JSON 文档中提取信息，像存储任何其他类型一样在表中存储 JSON 文本，并根据一组行生成 JSON
    文本。


    核心 JSON 功能如图 8-1 所示。


    ![../images/493913_1_En_8_Chapter/493913_1_En_8_Fig1_HTML.jpg](img/493913_1_En_8_Fig1_HTML.jpg)


    图 8-1


    Azure SQL 中的 JSON 功能


    Azure SQL 使您能够通过应用内置函数 `JSON_VALUE`、`JSON_QUERY`、`ISJSON` 和 `JSON_MODIFY` 来处理存储在表中或从应用程序发送的
    JSON 文本。这些函数使您能够从文本中解析 JSON，并提取和修改 JSON 文档中的信息。


    如果您想转换以 JSON 格式表示的半结构化数据，并将 JSON 文档加载到表中，可以使用 `OPENJSON` 函数。`OPENJSON` 函数接受 JSON
    格式的对象数组，并将它们拆分为一组行。您可以使用此表值函数将 JSON 转换为表，并以关系格式加载数据。


    Azure SQL 还使您能够将 SQL 查询的结果格式化为 JSON 格式。有一个 `FOR JSON` 子句，可以指定查询的结果应以 JSON 格式返回，而不是一组行。


    这些功能将使您能够在需要处理 JSON 数据的应用程序中实现大部分所需的功能。除了内置的 JSON 函数和运算符之外，您还可以将 Azure SQL 的其他功能（如索引、排序规则和高级查询功能）与
    JSON 数据结合使用。得益于 JSON 支持，将 Azure SQL 集成到全栈或后端解决方案中非常容易，因为从开发者的角度来看，您只需从 Azure SQL
    发送和接收 JSON。以下是一些利用 JSON 和 Azure SQL 来简化开发工作的、使用各种语言实现的后端 API 列表：


    *   [`https://github.com/Azure-Samples/azure-sql-db-node-rest-api`](https://github.com/Azure-Samples/azure-sql-db-node-rest-api)


    *   [`https://github.com/Azure-Samples/azure-sql-db-python-rest-api`](https://github.com/Azure-Samples/azure-sql-db-python-rest-api)


    *   [`https://github.com/Azure-Samples/azure-sql-db-dotnet-rest-api`](https://github.com/Azure-Samples/azure-sql-db-dotnet-rest-api)


    这是一个使用 NodeJS、Azure Functions 和 Azure SQL 实现的、以 JSON 作为传输格式的 ToDoMVC 示例应用的全栈示例：


    [`https://github.com/Azure-Samples/azure-sql-db-todo-mvc`](https://github.com/Azure-Samples/azure-sql-db-todo-mvc)'
- fmt: "## Formatting query results as JSON document\n\nModern applications are commonly\
    \ implemented as distributed services that are exchanging data via HTTP endpoints.\
    \ In most of the cases, the data is exchanged in JSON format.\n\nBack-end developers\
    \ spend a lot of their time getting the data from the database and serializing\
    \ the results as JSON text that will be returned to the caller (e.g., front-end\
    \ code). You might find a large amount of back-end code in a REST API that is\
    \ just a wrapper around SQL queries. Some model classes are used just to temporarily\
    \ load a set of rows returned as a result of SQL queries into memory and then\
    \ immediately serialize these memory objects as JSON text that will be returned\
    \ to the caller. This is known as the DTO (Data Transfer Object) pattern where\
    \ model classes just transfer data between the application layers. Many DTO-like\
    \ model classes are not even used by back-end code and represent just a template\
    \ that data access frameworks will use to load data and serialize it as JSON results.\
    \ This might affect performance and especially memory consumption because data\
    \ returned by a query is copied into model memory objects and then copied again\
    \ into JSON text that will be returned as result. Besides resource consumption,\
    \ this approach might increase the latency in your services, not to mention the\
    \ fact that such code is just a very low added-value plumbing code. Every transformation\
    \ is blocking, and the results returned by the query must be fully loaded into\
    \ a collection of memory objects and then some serializer (like JSON.Net in .Net\
    \ languages) serializes the entire collection as JSON text.\n\nAzure SQL enables\
    \ you to extremely simplify this process. `FOR JSON` query clause enables you\
    \ to specify that the query results should be returned as JSON string and not\
    \ as collection of rows. This way, you can directly stream the results of your\
    \ query to the client instead of building the layers and wrapper that just pass\
    \ parameters from the client to the query and transform results as JSON results.\n\
    \nThe following example shows a simple ASP.NET MVC action method that will be\
    \ executed once a user sends HTTP GET request to the URL `http://<web-application-domain>/LogAnalytic/CountBySeverity`.\
    \ The action gets the results of the query as JSON text and directly streams it\
    \ into the HTTP response body:\n\n```\npublic class LogAnalyticController {\n\
    \    [HttpGet]\n    public void CountBySeverity(){\n        var QUERY = @\"SELECT\
    \ severity, total = COUNT(*)\n                      FROM WebSite.Logs\n      \
    \                GROUP BY severity\n                      FOR JSON PATH\";\n \
    \       connection.QueryInto(Response.Body, QUERY);\n    }\n}\n```\n\nThis action\
    \ method uses .NET, the micro-ORM `Dapper` and the `Dapper.Stream` extension that\
    \ enables you to execute a SQL query on a connection to Azure SQL. The query has\
    \ `FOR JSON` clause that instructs Azure SQL to return results in JSON format\
    \ instead of tabular format. `QueryInto` method – from the `Dapper.Stream` extension\
    \ – will stream the JSON result into the body of the HTTP response. This way,\
    \ you need two C# lines of code to transform your query into a JSON web service.\
    \ `FOR JSON` clause enables you to easily finish the journey from any SQL query\
    \ to a fully functional REST API with a couple of lines of code.\n\n## Storing\
    \ JSON documents\n\nIn some cases, you will have data structures that have high\
    \ variety, and these structures could not be effectively represented as normalized\
    \ schema. In this case, you might follow the NoSQL approach and serialize complex\
    \ structures as JSON text.\n\nJSON is, by definition, Unicode text format, so\
    \ it is represented using `NVARCHAR` type in Azure SQL. You don’t need to use\
    \ some specialized types in your applications, special client-side drivers, or\
    \ API to send or retrieve JSON data. Any string type in most of the programming\
    \ languages can be used to read or write content in JSON columns. The following\
    \ example shows a simple table that stores website log messages that has few fixed\
    \ columns (`logDate` and `severity`) that are common to all log messages and `log`\
    \ column that contains all variable information that could be found in logs:\n\
    \n```\ncreate table WebSite.Logs (\n    _id bigint identity,\n    logDate datetime2,\n\
    \    severity tinyint,\n    log nvarchar(max)\n);\n```\n\nThis way, you can store\
    \ semi-structured data or data with volatile structure without creating a custom\
    \ subset of tables for every new variation. In this scenario, log messages are\
    \ write once and read many times, so we don’t need to worry about efficient updates\
    \ of semi-structured values in JSON log columns.\n\nIf you decide to store data\
    \ in a table, you need to understand how to parse the values from a JSON column\
    \ and use them in queries, speed up queries using indexes, and ensure that JSON\
    \ content is valid.\n\n## Querying JSON data\n\nAzure SQL enables you to run standard\
    \ SQL queries that use both classic scalar columns and the values extracted from\
    \ JSON text. Azure SQL provides four simple functions that process JSON text:\n\
    \n*   `JSON_VALUE(json, path_to_value)` function will return a scalar value from\
    \ JSON document on the specified path.\n*   `JSON_QUERY(json, path_to_object)`\
    \ function will return a complex object or array from JSON document on the specified\
    \ path.\n*   `JSON_MODIFY(json, path_to_object, json_object)` will take the JSON\
    \ document provided as the first argument and locate value or object on the path\
    \ specified with the second parameter, and instead of this value, it will inject\
    \ the value provided as third parameter. The first argument will not be modified,\
    \ and the modified JSON text will be returned. If you provide `NULL` value as\
    \ a third parameter, the value on the path will be deleted.\n*   `ISJSON(json_string)`\
    \ returns value 1 if the string provided as argument is properly formatted JSON\
    \ and 0 otherwise.\n\nUsing these simple functions, you can parse any JSON text\
    \ in columns, parameters, or variables and extract the values in any query clause.\
    \ The path in these functions represents the location of a value within the JSON\
    \ document. The syntax used in paths is easy to understand because it is similar\
    \ to most of the modern object-oriented languages that reference the fields within\
    \ the object (e.g., `$.info[3].name.firstName`).\n\nThe following query creates\
    \ a report that uses both standard and JSON columns on the `WebSite.Logs` table\
    \ shown in the previous section:\n\n```\nSELECT\n    severity,\n    ip = JSON_VALUE(log,\
    \ '$.ip'),\n    duration = AVG(CAST(JSON_VALUE(log,'$.duration') as int))\nFROM\n\
    \    WebSite.Logs\nWHERE\n    CAST(JSON_VALUE(log,'$.date') as datetime) > @datetime\n\
    GROUP BY\n    severity, JSON_VALUE(log, '$.ip')\nHAVING\n    AVG(CAST(JSON_VALUE(log,'$.duration')\
    \ as int) ) > 100\nORDER BY\n    AVG(CAST(JSON_VALUE(log,'$.duration') as int)\
    \ )\n```\n\nScalar values from the `severity` column are directly referenced,\
    \ and scalar values from the JSON column are extracted using `JSON_VALUE` function.\
    \ In this query, you can notice the true advantage of multi-model capabilities\
    \ of Azure SQL. You are using one SQL language with few additional functions to\
    \ process semi-structured data mixed with the scalar relational columns. If you\
    \ are familiar with standard SQL language, learning JSON extension will be an\
    \ easy task."
  raw: '### Formatting query results as JSON document


    Modern applications are commonly implemented as distributed services that are
    exchanging data via HTTP endpoints. In most of the cases, the data is exchanged
    in JSON format.


    Back-end developers spend a lot of their time getting the data from the database
    and serializing the results as JSON text that will be returned to the caller (e.g.,
    front-end code). You might find a large amount of back-end code in a REST API
    that is just a wrapper around SQL queries. Some model classes are used just to
    temporarily load a set of rows returned as a result of SQL queries into memory
    and then immediately serialize these memory objects as JSON text that will be
    returned to the caller. This is known as the DTO (Data Transfer Object) pattern
    where model classes just transfer data between the application layers. Many DTO-like
    model classes are not even used by back-end code and represent just a template
    that data access frameworks will use to load data and serialize it as JSON results.
    This might affect performance and especially memory consumption because data returned
    by a query is copied into model memory objects and then copied again into JSON
    text that will be returned as result. Besides resource consumption, this approach
    might increase the latency in your services, not to mention the fact that such
    code is just a very low added-value plumbing code. Every transformation is blocking,
    and the results returned by the query must be fully loaded into a collection of
    memory objects and then some serializer (like JSON.Net in .Net languages) serializes
    the entire collection as JSON text.


    Azure SQL enables you to extremely simplify this process. FOR JSON query clause
    enables you to specify that the query results should be returned as JSON string
    and not as collection of rows. This way, you can directly stream the results of
    your query to the client instead of building the layers and wrapper that just
    pass parameters from client to the query and transform results as JSON results.


    The following example shows a simple ASP.NET MVC action method that will be executed
    once a user sends HTTP GET request to the URL *http://<web -application-domain>/LogAnalytic/CountBySeverity*.
    The action gets the results of the query as JSON text and directly streams it
    into the HTTP response body:


    ```

    public class LogAnalyticController {

    [HttpGet]

    public void CountBySeverity(){

    var QUERY = @"SELECT severity, total = COUNT(*)

    FROM WebSite.Logs

    GROUP BY severity

    FOR JSON PATH";

    connection.QueryInto(Response.Body, QUERY);

    }

    }

    ```


    This action method uses .NET, the micro-ORM Dapper and the `Dapper.Stream` extension
    that enables you to execute a SQL query on a connection to Azure SQL. The query
    has `FOR JSON` clause that instructs Azure SQL to return results in JSON format
    instead of tabular format. `QueryInto` method – from the `Dapper.Stream` extension –
    will stream the JSON result into the body of the HTTP response. This way, you
    need two C# lines of code to transform your query into a JSON web service. `FOR
    JSON` clause enables you to easily finish the journey from any SQL query to a
    fully functional REST API with a couple of lines of code.


    ### Storing JSON documents


    In some cases, you will have data structures that have high variety, and these
    structures could not be effectively represented as normalized schema. In this
    case, you might follow the NoSQL approach and serialize complex structures as
    JSON text.


    JSON is, by definition, Unicode text format, so it is represented using `NVARCHAR`
    type in Azure SQL. You don’t need to use some specialized types in your applications,
    special client-side drivers, or API to send or retrieve JSON data. Any string
    type in most of the programming languages can be used to read or write content
    in JSON columns. The following example shows a simple table that stores website
    log messages that has few fixed columns (`logDate` and `severity`) that are common
    to all log messages and `log` column that contains all variable information that
    could be found in logs:


    ```

    create table WebSite.Logs (

    _id bigint identity,

    logDate datetime2,

    severity tinyint,

    log nvarchar(max)

    );

    ```


    This way, you can store semi-structured data or data with volatile structure without
    creating a custom subset of tables for every new variation. In this scenario,
    log messages are write once and read many times, so we don’t need to worry about
    efficient updates of semi-structured values in JSON log columns.


    If you decide to store data in a table, you need to understand how to parse the
    values from a JSON column and use them in queries, speed up queries using indexes,
    and ensure that JSON content is valid.


    ### Querying JSON data


    Azure SQL enables you to run standard SQL queries that use both classic scalar
    columns and the values extracted from JSON text. Azure SQL provides four simple
    functions that process JSON text:


    *   `JSON_VALUE(json, path_to_value)` function will return a scalar value from
    JSON document on the specified path.


    *   `JSON_QUERY(json, path_to_object)` function will return a complex object or
    array from JSON document on the specified path.


    *   `JSON_MODIFY(json, path_to_object, json_object)` will take the JSON document
    provided as the first argument and locate value or object on the path specified
    with the second parameter, and instead of this value, it will inject the value
    provided as third parameter. The first argument will not be modified, and the
    modified JSON text will be returned. If you provide `NULL` value as a third parameter,
    the value on the path will be deleted.


    *   `ISJSON(json_string)` returns value 1 if the string provided as argument is
    properly formatted JSON and 0 otherwise.


    Using these simple functions, you can parse any JSON text in columns, parameters,
    or variables and extract the values in any query clause. The path in these functions
    represents the location of a value within the JSON document. The syntax used in
    paths is easy to understand because it is similar to most of the modern object-oriented
    languages that reference the fields within the object (e.g., `$.info[3].name.firstName`).


    The following query creates report that uses both standard and JSON columns on
    the `WebSite.Logs` table shown in the previous section:


    ```

    SELECT

    severity,

    ip = JSON_VALUE(log, ''$.ip''),

    duration = AVG(CAST(JSON_VALUE(log,''$.duration'') as int))

    FROM

    WebSite.Logs

    WHERE

    CAST(JSON_VALUE(log,''$.date'') as datetime) > @datetime GROUP BY

    severity, JSON_VALUE(log, ''$.ip'')

    HAVING

    AVG(CAST(JSON_VALUE(log,''$.duration'') as int) ) > 100

    ORDER BY

    AVG(CAST(JSON_VALUE(log,''$.duration'') as int) )

    ```


    Scalar values from the `severity` column are directly referenced, and scalar values
    from the JSON column are extracted using `JSON_VALUE` function. In this query,
    you can notice the true advantage of multi-model capabilities of Azure SQL. You
    are using one SQL language with few additional functions to process semi-structured
    data mixed with the scalar relational columns. If you are familiar with standard
    SQL language, learning JSON extension will be an easy task.'
  trans: "## 将查询结果格式化为 JSON 文档\n\n现代应用程序通常被实现为分布式服务，它们通过 HTTP 端点交换数据。在大多数情况下，数据交换采用\
    \ JSON 格式。\n\n后端开发人员花费大量时间从数据库获取数据，并将结果序列化为 JSON 文本，以返回给调用方（例如，前端代码）。你可能会在 REST\
    \ API 中发现大量的后端代码仅仅是对 SQL 查询的封装。有些模型类仅用于临时将作为 SQL 查询结果返回的一组行加载到内存中，然后立即把这些内存对象序列化为将返回给调用方的\
    \ JSON 文本。这就是所谓的 DTO（数据传输对象）模式，其中模型类仅在应用层之间传输数据。许多类似 DTO 的模型类甚至不被后端代码使用，它们仅代表一个模板，数据访问框架将使用该模板加载数据并将其序列化为\
    \ JSON 结果。这可能会影响性能，特别是内存消耗，因为查询返回的数据首先被复制到模型内存对象中，然后再次复制为将作为结果返回的 JSON 文本。除了资源消耗外，这种方法可能会增加服务中的延迟，更不用说这类代码只是附加值非常低的“粘合剂”代码这一事实了。每次转换都是阻塞式的，查询返回的结果必须完全加载到一个内存对象集合中，然后由某个序列化器（如.NET\
    \ 语言中的 JSON.Net）将整个集合序列化为 JSON 文本。\n\nAzure SQL 使你能够极大地简化此过程。`FOR JSON` 查询子句使你能够指定查询结果应作为\
    \ JSON 字符串返回，而不是作为行集合返回。这样，你可以直接将查询结果流式传输到客户端，而无需构建那些仅仅将参数从客户端传递到查询并将结果转换为 JSON\
    \ 结果的封装层。\n\n以下示例展示了一个简单的 ASP.NET MVC 操作方法，当用户向 URL `http://<web-application-domain>/LogAnalytic/CountBySeverity`\
    \ 发送 HTTP GET 请求时，该方法将被执行。该操作方法将查询结果获取为 JSON 文本，并直接将其流式传输到 HTTP 响应体中：\n\n```\n\
    public class LogAnalyticController {\n    [HttpGet]\n    public void CountBySeverity(){\n\
    \        var QUERY = @\"SELECT severity, total = COUNT(*)\n                  \
    \    FROM WebSite.Logs\n                      GROUP BY severity\n            \
    \          FOR JSON PATH\";\n        connection.QueryInto(Response.Body, QUERY);\n\
    \    }\n}\n```\n\n这个操作方法使用了.NET、微 ORM `Dapper` 和 `Dapper.Stream` 扩展，后者使你能够通过连接在\
    \ Azure SQL 上执行 SQL 查询。该查询具有 `FOR JSON` 子句，指示 Azure SQL 以 JSON 格式而非表格格式返回结果。来自\
    \ `Dapper.Stream` 扩展的 `QueryInto` 方法会将 JSON 结果流式传输到 HTTP 响应的正文中。这样，你只需要两行 C#代码就能将查询转换为一个\
    \ JSON Web 服务。`FOR JSON` 子句让你能够轻松地通过几行代码，从任何 SQL 查询出发，最终实现一个功能齐全的 REST API。\n\n\
    ## 存储 JSON 文档\n\n在某些情况下，你将处理具有高度多样性的数据结构，而这些结构无法有效地表示为规范化模式。在这种情况下，你可以遵循 NoSQL\
    \ 方法，将复杂结构序列化为 JSON 文本。\n\n根据定义，JSON 是一种 Unicode 文本格式，因此在 Azure SQL 中使用 `NVARCHAR`\
    \ 类型表示。在你的应用程序中，不需要使用专门的类型、特殊的客户端驱动程序或 API 来发送或检索 JSON 数据。大多数编程语言中的任何字符串类型都可以用来读写\
    \ JSON 列中的内容。以下示例展示了一个简单的表，用于存储网站日志消息，该表包含少量所有日志消息共有的固定列（`logDate` 和 `severity`），以及一个\
    \ `log` 列，其中包含日志中可能找到的所有可变信息：\n\n```\ncreate table WebSite.Logs (\n    _id bigint\
    \ identity,\n    logDate datetime2,\n    severity tinyint,\n    log nvarchar(max)\n\
    );\n```\n\n通过这种方式，你可以存储半结构化数据或结构易变的数据，而无需为每一个新变体创建一组自定义的表。在此场景中，日志消息是写入一次、读取多次，因此我们无需担心\
    \ JSON 日志列中半结构化值的高效更新问题。\n\n如果你决定将数据存储在表中，你需要了解如何从 JSON 列中解析值并在查询中使用它们，如何使用索引加快查询速度，以及如何确保\
    \ JSON 内容有效。\n\n## 查询 JSON 数据\n\nAzure SQL 使你能够运行标准的 SQL 查询，这些查询可以同时使用经典的标量列和从\
    \ JSON 文本中提取的值。Azure SQL 提供了四个简单的函数来处理 JSON 文本：\n\n*   `JSON_VALUE(json, path_to_value)`\
    \ 函数将根据指定路径从 JSON 文档中返回一个标量值。\n*   `JSON_QUERY(json, path_to_object)` 函数将根据指定路径从\
    \ JSON 文档中返回一个复杂对象或数组。\n*   `JSON_MODIFY(json, path_to_object, json_object)` 将接受作为第一个参数提供的\
    \ JSON 文档，在第二个参数指定的路径上定位值或对象，然后注入作为第三个参数提供的值来替换此值。第一个参数不会被修改，而是返回修改后的 JSON 文本。如果你提供\
    \ `NULL` 值作为第三个参数，则该路径上的值将被删除。\n*   `ISJSON(json_string)` 如果作为参数提供的字符串是格式正确的 JSON，则返回值\
    \ 1，否则返回 0。\n\n使用这些简单的函数，你可以在列、参数或变量中解析任何 JSON 文本，并在任何查询子句中提取值。这些函数中的路径表示 JSON\
    \ 文档中的值位置。路径中使用的语法易于理解，因为它类似于大多数现代面向对象语言中引用对象内字段的方式（例如，`$.info[3].name.firstName`）。\n\
    \n以下查询创建了一个报告，该报告使用了上一节所示的 `WebSite.Logs` 表中的标准列和 JSON 列：\n\n```\nSELECT\n   \
    \ severity,\n    ip = JSON_VALUE(log, '$.ip'),\n    duration = AVG(CAST(JSON_VALUE(log,'$.duration')\
    \ as int))\nFROM\n    WebSite.Logs\nWHERE\n    CAST(JSON_VALUE(log,'$.date') as\
    \ datetime) > @datetime\nGROUP BY\n    severity, JSON_VALUE(log, '$.ip')\nHAVING\n\
    \    AVG(CAST(JSON_VALUE(log,'$.duration') as int) ) > 100\nORDER BY\n    AVG(CAST(JSON_VALUE(log,'$.duration')\
    \ as int) )\n```\n\n来自 `severity` 列的标量值被直接引用，而来自 JSON 列的标量值则使用 `JSON_VALUE` 函数提取。在这个查询中，你可以注意到\
    \ Azure SQL 多模型功能的真正优势。你只需使用一种 SQL 语言和几个附加函数，即可处理与标量关系列混合的半结构化数据。如果你熟悉标准 SQL 语言，学习\
    \ JSON 扩展将是一件容易的事。"
- fmt: '### JSON paths


    In the previous examples, you have seen that all JSON functions use a path that
    references properties within the JSON that is going to be parsed. JSON paths in
    Azure SQL can have the following elements:


    *   `$` represents the current JSON document that is provided as a first argument
    of JSON function.

    *   Field references start with a dot and reference the sub-property within the
    context. As an example, `$.info.name.firstName` will find an `info` property and
    then find `name` property within that object and then `firstName` object within
    `name`.

    *   Array references that can be applied on arrays and reference elements by index.
    As an example, `$.children[2].name` will find a `children` array, take the element
    with index 2, and then find name property within that object. Indexes in the array
    references are zero-based.


    With this syntax of JSON paths, you can reference any property within the JSON
    document using the same style that is used in object-oriented languages.


    ### Collation awareness


    Collations in Azure SQL are the rules that define how the query processor must
    compare and sort values. For example, in French language, the last accent in each
    word determines the sort order, so the following four words would be sorted this
    way:


    1.  cote

    2.  côte

    3.  coté

    4.  côté


    JSON standards don’t define how values should be compared and sorted in documents;
    however, you can leverage Azure SQL collations to apply some custom language rules
    while working with JSON data. If you specify a collation `French_100_CS_AS` on
    a `NVARCHAR` column that contains the JSON documents, Azure SQL will use French
    language rules to compare and sort results based on the values extracted from
    the JSON content from this column. Even if the collation is not specified on the
    column, we can always explicitly apply required collation in the query:


    ```sql

    SELECT JSON_VALUE(log,''$.msg'')

    FROM WebSite.Logs

    ORDER BY JSON_VALUE(log,''$.msg'') COLLATE French_100_CS_AS

    ```


    Collation awareness is one important feature especially for international applications.
    The fact that JSON functions can leverage this feature makes it a powerful addition
    to multi-model capabilities of Azure SQL.


    ### Ensuring data integrity in JSON documents


    Azure SQL will not check if you have placed a valid JSON document in the `NVARCHAR`
    column. If you are sure that you are always landing JSON documents in the table
    or if you have validation in application logic that ensures this, this is not
    an issue. Validation of JSON format requires some time and resources, so Azure
    SQL will not slow down the inserts and updates. If you want to ensure that your
    JSON documents are always valid, you can explicitly add `CHECK CONSTRAINT` that
    will do this validation:


    ```sql

    ALTER TABLE Webite.Logs

    ADD CONSTRAINT [Data should be formatted as JSON]

    CHECK (ISJSON(log) = 1);

    ```


    This way, you have full control over the storage process, and you choose when
    JSON data should be validated. In this example, a simple rule is used to make
    sure that values inserted in the `log` column are valid JSON documents. You can
    create custom rules that extract the values from a JSON document using `JSON_VALUE`
    function and compare the returned value in a separate `CHECK CONSTRAINT`.


    ### Indexing JSON values


    Indexes generally help to boost the performance of your queries. Azure SQL doesn’t
    have specialized index for JSON documents, but you can effectively use the following
    standard indexes to improve performance of JSON queries:


    *   Clustered Columnstore indexes compress JSON documents and enable high-performance
    analytics on JSON values.

    *   B-Tree indexes enable you to quickly find the rows with some value in the
    JSON column.


    A Clustered Columnstore index is a core analytical technology in Azure SQL that
    provide high compression of data and fast analytic capabilities. A Clustered Columnstore
    index might be a good solution if you have a large number of documents in the
    table because it can efficiently compress JSON documents, decreasing IO required
    to load documents and improving performance of analytic reports that you might
    run on your documents. The following code can add Clustered Columnstore index
    on a table containing JSON documents:


    ```sql

    CREATE CLUSTERED COLUMNSTORE INDEX cci ON WebSite.Logs;

    ```


    Clustered Columnstore indexes on top of tables with JSON documents are a good
    choice if you need to do analytics on JSON documents. Columnstore indexes will
    apply so-called batch mode processing where they will leverage vector processing
    and SIMD instructions that can boost performance of your analytic queries over
    JSON data.


    In the scenarios where you need to filter or sort documents using some specific
    property in JSON text, you can also leverage standard SQL language features such
    as computed columns and indexes. Computed columns can expose a value from JSON
    content with the `JSON_VALUE` function, and you can create standard B-tree index
    on this computed expression, as it is shown in the following code:


    ```sql

    alter table WebSite.Logs

    add [$severity] AS JSON_VALUE(log, ''$.severity'');

    go

    create index ix_severity on WebSite.Logs ([$severity]);

    ```


    The computed column `$severity` is just a named expression that exposes value
    from JSON content stored in column `log`. It doesn’t use additional space unless
    you want to explicitly pre-compute the extracted value by adding a `PERSISTED`
    keyword. Whenever you filter or sort rows using the `JSON_VALUE(log, ''$.severity'')`
    expression, Azure SQL will know that there is an index on the matching and use
    it to speed up your query.'
