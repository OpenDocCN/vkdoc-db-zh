    WITH NATIVE_COMPILATION, SCHEMABINDING

    AS BEGIN ATOMIC WITH

    (TRANSACTION ISOLATION LEVEL = SNAPSHOT,

    LANGUAGE = N''us_english'')

    /* Procedure code goes here */

    END

    ```


    Any T-SQL code that is placed in the body of this procedure will be parsed, and
    the equivalent C code will be generated and compiled into a small dynamically
    linked library (.dll) file.


    Two main components of natively compiled procedures are


