- fmt: "# Querying XML data\n\nXML type has the following member methods that you\
    \ can use to extract value from and manipulate XML:\n\n*   `value(path, type)`\
    \ that returns a node or attribute from XML object and automatically converts\
    \ it into a SQL type. You need to specify a standard XPath expression that targets\
    \ a single value in the XML document.\n*   `query(path)` – This method returns\
    \ an object from the XML document on a specified XPath expression.\n*   `nodes(path)`\
    \ is very similar to `OPENXML`/`OPENJSON` functions, and it is used to transform\
    \ an array of XML elements on the specified path to a set of rows that can be\
    \ used in a `FROM` clause.\n*   `exists(path)` is a method that checks if there’s\
    \ an existing element on the specified path.\n*   `modify(path, type)` method\
    \ enables you to insert, delete, or replace values of some nodes in XML document.\n\
    \nXML querying capabilities will be explained using the following example:\n\n\
    ```sql\nDECLARE @i INT = 47;\nDECLARE @x xml;\nSET @x='\n<Family id=\"1\">\n \
    \   <row id=\"81\"><name>Robin</name></row>\n    <row id=\"123\"><name>Lana</name></row>\n\
    \    <row id=\"7\"><name>Merriam</name></row>\n</Family>\n';\nSELECT\n    family_id\
    \ = @x.value('(/Family/@id)[1]', 'int'),\n    family_81_name = @x.value('(//row[@id=81]/name)[1]',\
    \ 'varchar(20)'),\n    family_name = @x.query('//row[@id=sql:variable(\"@i\")]/name')\n\
    SELECT\n    family_member = xrow.value('name[1]', 'varchar(20)'),\n    family_member_id\
    \ = xrow.value('@id[1]', 'varchar(20)'),\n    family_member_xml = xrow.query('.')\n\
    FROM\n    @x.nodes('/Family/row') AS Members(xrow)\nWHERE\n    xrow.value('@id[1]',\
    \ 'int') < 50 and xrow.exist('name[. > 5]') = 1\n```\n\nThe first query uses the\
    \ `value` member function of `@x` variable to extract the values of family identifier\
    \ and name of the family member with id 81 and the name of the member with identifier\
    \ value equal to the variable `@i`.\n\nThe second query takes all `/Family/row`\
    \ nodes from XML document as a rowset under the condition that the `id` attribute\
    \ of each row is less than 50 and greater than 5. Every node that satisfies this\
    \ condition is returned as column named `xrow`. Method `value()` is used to extract\
    \ the value that will be compared with 50 with SQL operator, while `exist()` method\
    \ is used to directly push down predicate to XML variable. Finally, the methods\
    \ `value()` and `query()` are used to get the name, identifier, and XML content\
    \ from each returned row.\n\nAnother interesting feature is the ability to bind\
    \ the values of SQL variables or columns in the XPath expressions. In the preceding\
    \ example, you could see that the third expression in the first `SELECT` clause\
    \ uses SQL variable `@i` from the outer script. This might be a flexible way to\
    \ specify how to find the data.\n\nAnother functionality that might be handy is\
    \ the ability to directly update XML documents without need to parse it, transform\
    \ it into relational format, and then reconstruct XML again using `FOR XML` clause.\
    \ Azure SQL provides `modify()` method where you can specify expression that will\
    \ insert, delete, or replace value in the XML document:\n\n```sql\nSET @x.modify('insert\
    \ <row id=\"555\"><name>Danica</name></row>\ninto (/Family)[1]') ;\nSELECT @x;\n\
    ```\n\nAlthough XML functionalities in Azure SQL are not core scenarios that you\
    \ will frequently use, given that XML is not a mainstream format anymore, you\
    \ can still use them to resolve various problems that require querying and transforming\
    \ XML data.\n\n# XPath and XQuery languages\n\nAzure SQL supports XML standards\
    \ that enable you to implement complex processing and querying over XML documents.\
    \ XML support in Azure SQL is based on the following languages:\n\n*   XPath (XML\
    \ Path Language) is a query language for selecting nodes from an XML document.\n\
    *   XQuery (XML Query) is a query and functional programming language that queries\
    \ and transforms collections of XML data.\n\nXPath is an expression-based syntax\
    \ used in `value()`, `nodes()`, and `query()` methods to specify the element within\
    \ the XML document that should be located:\n\n*   **Hierarchical expressions**\
    \ – Use XPath to specify the path from the root of XML document to desired element\
    \ within the document. As an example, XPath `/Family/row/name` is used to reference\
    \ the elements `<name>` that are placed under the `<row>` element, which is placed\
    \ under the `<Family>` element that is the root of XML document. There can be\
    \ multiple elements that match the same XPath expression, so you should use indexing\
    \ operator `[]` to specify the elements that match expression should be referenced.\n\
    *   **Node and attribute references** – XPath enables you to reference either\
    \ node or their attributes. Any name that doesn't start with `@` will be treated\
    \ as a name of XML node, while the names starting with `@` (e.g., `@id` in the\
    \ preceding example) will be treated as an attribute.\n*   **Recursive expressions**\
    \ – In some cases, you don’t want to or cannot reference the entire path from\
    \ the root, or you need to find elements that are positioned in the different\
    \ locations of the document. Recursive operator `//` enables you to specify a\
    \ “detached path” where XML functions will try to find any path that matches the\
    \ expression right of the recursive operator. As an example, `//row/name` will\
    \ find any `<name>` element within the `<row>` element that is placed anywhere\
    \ in the XML document.\n*   **Predicates** enable you to specify some condition\
    \ that elements must meet to be matched with XPath expression. As an example,\
    \ `//row[@id=17]/name` specifies that the XML methods should find any `<name>`\
    \ element within the `<row>` element that has id attribute with value 17. The\
    \ predicates are the easy way to filter out some nodes that don’t satisfy some\
    \ condition.\n\nXPath can be a very powerful language that you can use to declaratively\
    \ specify criteria for selecting the information from XML documents.\n\nYou can\
    \ also use other XPath features like **namespaces** that enable you to define\
    \ the scopes of names and match only the names within the same namespace; **seven-direction\
    \ axis** that enables you to reference parents, siblings, and descendants; or\
    \ **build-in functions** that can help you transform the results within the expressions.\n\
    \nXPath is complemented with XQuery language that is also supported in Azure SQL.\
    \ XQuery is a standardized language for querying and processing collections of\
    \ elements in XML documents. XQuery defines a SQL-like syntax called **FLWOR**\
    \ (pronounced “flower”) that represents `FOR`, `LET`, `WHERE`, `ORDER BY`, and\
    \ `RETURN` operators that you can use to transform XML nodes. These operators\
    \ enable you to select, transform, and return new objects based on existing data.\
    \ XQuery enables you to use the values from the nodes that are processed using\
    \ the curly braces (`{...}`) template. An example of **FLWOR** operations in XML\
    \ `query()` method selecting nodes from XML variable and transforming content\
    \ into new XML structure is shown in the following listing:\n\n```sql\nSELECT\
    \ xrow.query(\n'let $r := self::node()\nreturn <Member id=\"{$r/@id}\">{$r/name/text()}</Member>')\n\
    FROM @x.nodes('/Family/row') AS Members(xrow);\n```\n\n```xml\n<Member id=\"81\"\
    >Robin</Member>\n<Member id=\"123\">Lana</Member>\n<Member id=\"7\">Merriam</Member>\n\
    ```\n\nThe XML `nodes()` method emits three XML rows from the variable `@x` used\
    \ in the previous example, and then the `query` method processes them using an\
    \ XQuery expression. In the body of the XQuery expression, the current node is\
    \ assigned to the variable `$r`, and the return statement creates a new XML node\
    \ where `id` attribute and content of the `name` node are injected in template.\
    \ As a result, this XQuery expression will return transformed XML shown below\
    \ the query. As you can see, XQuery has a lot of power that can be used to implement\
    \ complex processing of XML elements."
  raw: '### Querying XML data


    XML type has the following member methods that you can use to extract value from
    and manipulate XML:


    *   `value(path, type)` that returns a node or attribute from XML object and automatically
    converts it into a SQL type. You need to specify a standard XPath expression that
    targets a single value in the XML document.


    *   `query(path)` – This method returns an object from the XML document on a specified
    XPath expression.


    *   `nodes(path)` is very similar to OPENXML/OPENJSON functions, and it is used
    to transform an array of XML elements on the specified path to a set of rows that
    can be used in a FROM clause.


    *   `exists(path)` is a method that checks if there’s an existing element on the
    specified path.


    *   `modify(path, type)` method enables you to insert, delete, or replace values
    of some nodes in XML document.


    XML querying capabilities will be explained using the following example:


    ```

    DECLARE @i INT = 47;

    DECLARE @x xml;

    SET @x=''

    Robin

    Lana

    Merriam

    '';

    SELECT

    family_id = @x.value(''(/Family/@id)[1]'', ''int''),

    family_81_name = @x.value(''(//row[@id=81]/name)[1]'', ''varchar(20)''),

    family_name = @x.query(''//row[@id=sql:variable("@i")]/name'')

    SELECT

    family_member = xrow.value(''name[1]'', ''varchar(20)''),

    family_member_id = xrow.value(''@id[1]'', ''varchar(20)''),

    family_member_xml = xrow.query(''.'')

    FROM

    @x.nodes(''/Family/row'') AS Members(xrow)

    WHERE

    xrow.value(''@id[1]'', ''int'')  5]'') = 1

    ```


    The first query uses the value member function of `@x` variable to extract the
    values of family identifier and name of the family member with id 81 and the name
    of the member with identifier value equal to the variable `@i`.


    The second query takes all `/family/row` nodes from XML document as a rowset under
    the condition that the `id` attribute of each row is less than 50 and greater
    than 5\. Every node that satisfies this condition is returned as column named
    `xrow`. Method `value()` is used to extract the value that will be compared with
    50 with SQL operator, while `exist()` method is used to directly push down predicate
    to XML variable. Finally, the methods `value()` and `query()` are used to get
    the name, identifier, and XML content from each returned row.


    Another interesting feature is the ability to bind the values of SQL variables
    or columns in the XPath expressions. In the preceding example, you could see that
    the third expression in the first `SELECT` clause uses SQL variable `@i` from
    the outer script. This might be a flexible way to specify how to find the data.


    Another functionality that might be handy is the ability to directly update XML
    documents without need to parse it, transform it into relational format, and then
    reconstruct XML again using `FOR XML` clause. Azure SQL provides `modify()` method
    where you can specify expression that will insert, delete, or replace value in
    the XML document:


    ```

    SET @x.modify(''insert Danica

    into (/Family)[1]'') ;

    SELECT @x;

    ```


    Although XML functionalities in Azure SQL are not core scenarios that you will
    frequently use, given that XML is not a mainstream format anymore, you can still
    use them to resolve various problems that require querying and transforming XML
    data.


    ### XPath and XQuery languages


    Azure SQL supports XML standards that enable you to implement complex processing
    and querying over XML documents. XML support in Azure SQL is based on the following
    languages:


    *   XPath (XML Path Language) is a query language for selecting nodes from an
    XML document.


    *   XQuery (XML Query) is a query and functional programming language that queries
    and transforms collections of XML data.


    XPath is an expression-based syntax used in `value()`, `nodes()`, and `query()`
    methods to specify the element within the XML document that should be located:


    *   Hierarchical expressions – Use XPath to specify the path from the root of
    XML document to desired element within the document. As an example, XPath `/Family/row/name`
    is used to reference the elements `<name>` that are placed under the `<row>` element,
    which is placed under the `<Family>` element that is the root of XML document.
    There can be multiple elements that match the same XPath expression, so you should
    use indexing operator `[]` to specify the elements that match expression should
    be referenced.


    *   Node and attribute references – XPath enables you to reference either node
    or their attributes. Any name that doesn''t start with `@` will be treated as
    a name of XML node, while the names starting with `@` (e.g., `@id` in the preceding
    example) will be treated as an attribute.


    *   Recursive expressions – In some cases, you don’t want to or cannot reference
    the entire path from the root, or you need to find elements that are positioned
    in the different locations of the document. Recursive operator `//` enables you
    to specify a “detached path” where XML functions will try to find any path that
    matches the expression right of the recursive operator. As an example, `//row/name`
    will find any `<name>` element within the `<row>` element that is placed anywhere
    in the XML document.


    *   Predicates enable you to specify some condition that elements must meet to
    be matched with XPath expression. As an example, `//row[@id=17]/name` specifies
    that the XML methods should find any `<name>` element within the `<row>` element
    that has id attribute with value 17\. The predicates are the easy way to filter
    out some nodes that don’t satisfy some condition.


    XPath can be a very powerful language that you can use to declaratively specify
    criteria for selecting the information from XML documents.


    You can also use other XPath features like namespaces that enable you to define
    the scopes of names and match only the names within the same namespace; seven-direction
    axis that enables you to reference parents, siblings, and descendants; or build-in
    functions that can help you transform the results within the expressions.


    XPath is complemented with XQuery language that is also supported in Azure SQL.
    XQuery is a standardized language for querying and processing collections of elements
    in XML documents. XQuery defines a SQL-like syntax called *FLWOR* (pronounced
    “flower”) that represents `FOR`, `LET`, `WHERE`, `ORDER BY`, and `RETURN` operators
    that you can use to transform XML nodes. These operators enable you to select,
    transform, and return new objects based on existing data. XQuery enables you to
    use the values from the nodes that are processed using the curly braces (`{...}`)
    template. An example of *FLWOR* operations in XML `query()` method selecting nodes
    from XML variable and transforming content into new XML structure is shown in
    the following listing:


    ```

    SELECT xrow.query(

    ''let $r := self::node()

    return {$r/name/text()}'')

    FROM @x.nodes(''/Family/row'') AS Members(xrow);


    Robin

    Lana

    Merriam

    ```


    The XML `nodes()` method emits three XML rows from the variable `@x` used in the
    previous example, and then the `query` method processes them using an XQuery expression.
    In the body of the XQuery expression, the current node is assigned to the variable
    `$r`, and the return statement creates a new XML node where `id` attribute and
    content of the `name` node are injected in template. As a result, this XQuery
    expression will return transformed XML shown below the query. As you can see,
    XQuery has a lot of power that can be used to implement complex processing of
    XML elements.'
  trans: "\n# 查询 XML 数据\n\nXML 类型具有以下成员方法，可用于从 XML 中提取值并进行操作：\n\n*   `value(path,\
    \ type)` 方法从 XML 对象返回一个节点或属性，并自动将其转换为 SQL 类型。你需要指定一个标准的 XPath 表达式，该表达式需指向 XML\
    \ 文档中的单个值。\n*   `query(path)` – 此方法根据指定的 XPath 表达式从 XML 文档返回一个对象。\n*   `nodes(path)`\
    \ 与 `OPENXML`/`OPENJSON` 函数非常相似，用于将指定路径上的 XML 元素数组转换为一组行，这些行可以在 `FROM` 子句中使用。\n\
    *   `exists(path)` 是一个检查指定路径上是否存在元素的方法。\n*   `modify(path, type)` 方法使你能够在 XML\
    \ 文档中插入、删除或替换某些节点的值。\n\n将通过以下示例解释 XML 查询功能：\n\n```sql\nDECLARE @i INT = 47;\n\
    DECLARE @x xml;\nSET @x='\n<Family id=\"1\">\n    <row id=\"81\"><name>Robin</name></row>\n\
    \    <row id=\"123\"><name>Lana</name></row>\n    <row id=\"7\"><name>Merriam</name></row>\n\
    </Family>\n';\nSELECT\n    family_id = @x.value('(/Family/@id)[1]', 'int'),\n\
    \    family_81_name = @x.value('(//row[@id=81]/name)[1]', 'varchar(20)'),\n  \
    \  family_name = @x.query('//row[@id=sql:variable(\"@i\")]/name')\nSELECT\n  \
    \  family_member = xrow.value('name[1]', 'varchar(20)'),\n    family_member_id\
    \ = xrow.value('@id[1]', 'varchar(20)'),\n    family_member_xml = xrow.query('.')\n\
    FROM\n    @x.nodes('/Family/row') AS Members(xrow)\nWHERE\n    xrow.value('@id[1]',\
    \ 'int') < 50 and xrow.exist('name[. > 5]') = 1\n```\n\n第一个查询使用 `@x` 变量的 `value`\
    \ 成员函数提取家庭标识符、ID 为 81 的家庭成员姓名，以及标识符值等于变量 `@i` 的成员姓名。\n\n第二个查询将 XML 文档中的所有 `/Family/row`\
    \ 节点作为行集获取，条件是每一行的 `id` 属性小于 50 且大于 5。满足此条件的每个节点都作为名为 `xrow` 的列返回。方法 `value()`\
    \ 用于提取将与 SQL 运算符 50 进行比较的值，而 `exist()` 方法用于直接将谓词下推至 XML 变量。最后，使用 `value()` 和 `query()`\
    \ 方法从每个返回的行中获取名称、标识符和 XML 内容。\n\n另一个有趣的功能是能够在 XPath 表达式中绑定 SQL 变量或列的值。在前面的示例中，你可以看到第一个\
    \ `SELECT` 子句中的第三个表达式使用了外部脚本中的 SQL 变量 `@i`。这可能是一种指定如何查找数据的灵活方式。\n\n另一个可能很方便的功能是能够直接更新\
    \ XML 文档，而无需解析它、将其转换为关系格式，然后使用 `FOR XML` 子句重新构建 XML。Azure SQL 提供了 `modify()` 方法，你可以在其中指定将在\
    \ XML 文档中插入、删除或替换值的表达式：\n\n```sql\nSET @x.modify('insert <row id=\"555\"><name>Danica</name></row>\n\
    into (/Family)[1]') ;\nSELECT @x;\n```\n\n尽管 Azure SQL 中的 XML 功能并非你会频繁使用的核心场景（因为\
    \ XML 已不再是主流格式），你仍然可以使用它们来解决需要查询和转换 XML 数据的各种问题。\n\n# XPath 和 XQuery 语言\n\nAzure\
    \ SQL 支持 XML 标准，使你能够在 XML 文档上实现复杂的处理和查询。Azure SQL 中的 XML 支持基于以下语言：\n\n*   XPath（XML\
    \ 路径语言）是一种用于从 XML 文档中选择节点的查询语言。\n*   XQuery（XML 查询）是一种查询和函数式编程语言，用于查询和转换 XML 数据集合。\n\
    \nXPath 是一种基于表达式的语法，用于 `value()`、`nodes()` 和 `query()` 方法中，以指定应定位的 XML 文档中的元素：\n\
    \n*   **层次结构表达式** – 使用 XPath 指定从 XML 文档根节点到文档中所需元素的路径。例如，XPath `/Family/row/name`\
    \ 用于引用位于 `<row>` 元素下的 `<name>` 元素，而 `<row>` 元素又位于作为 XML 文档根节点的 `<Family>` 元素下。可能有多个元素匹配相同的\
    \ XPath 表达式，因此你应该使用索引运算符 `[]` 来指定应引用的匹配元素。\n*   **节点和属性引用** – XPath 使你能够引用节点或其属性。任何不以\
    \ `@` 开头的名称将被视为 XML 节点的名称，而以 `@` 开头的名称（例如前面示例中的 `@id`）将被视为属性。\n*   **递归表达式** –\
    \ 在某些情况下，你不想或无法引用从根节点开始的完整路径，或者你需要查找位于文档不同位置的元素。递归运算符 `//` 使你能够指定一个“分离路径”，XML\
    \ 函数将尝试查找与递归运算符右侧表达式匹配的任何路径。例如，`//row/name` 将查找位于 XML 文档中任何位置的 `<row>` 元素内的任何\
    \ `<name>` 元素。\n*   **谓词** 使你能够指定元素必须满足的某些条件才能与 XPath 表达式匹配。例如，`//row[@id=17]/name`\
    \ 指定 XML 方法应查找 `id` 属性值为 17 的 `<row>` 元素内的任何 `<name>` 元素。谓词是过滤掉不满足某些条件的节点的简单方法。\n\
    \nXPath 可以是一种非常强大的语言，你可以用它以声明方式指定从 XML 文档中选择信息的条件。\n\n你还可以使用其他 XPath 功能，例如 **命名空间**（使你能够定义名称的作用域并仅匹配相同命名空间内的名称）；**七方向轴**（使你能够引用父节点、同级节点和后代节点）；或**内置函数**（可以帮助你在表达式中转换结果）。\n\
    \nAzure SQL 中也支持 XQuery 语言，它是对 XPath 的补充。XQuery 是一种用于查询和处理 XML 文档中元素集合的标准化语言。XQuery\
    \ 定义了一种类似 SQL 的语法，称为 **FLWOR**（发音为“flower”），它代表 `FOR`、`LET`、`WHERE`、`ORDER BY`\
    \ 和 `RETURN` 运算符，可用于转换 XML 节点。这些运算符使你能够根据现有数据选择、转换和返回新对象。XQuery 使你能够使用花括号 (`{...}`)\
    \ 模板来插入正在处理的节点的值。下面的列表展示了一个在 XML `query()` 方法中使用 **FLWOR** 操作的示例，该操作从 XML 变量中选择节点并将内容转换为新的\
    \ XML 结构：\n\n```sql\nSELECT xrow.query(\n'let $r := self::node()\nreturn <Member\
    \ id=\"{$r/@id}\">{$r/name/text()}</Member>')\nFROM @x.nodes('/Family/row') AS\
    \ Members(xrow);\n```\n\n```xml\n<Member id=\"81\">Robin</Member>\n<Member id=\"\
    123\">Lana</Member>\n<Member id=\"7\">Merriam</Member>\n```\n\nXML `nodes()` 方法从前面示例中使用的变量\
    \ `@x` 生成三个 XML 行，然后 `query` 方法使用 XQuery 表达式处理它们。在 XQuery 表达式的主体中，当前节点被赋值给变量 `$r`，return\
    \ 语句创建一个新的 XML 节点，其中 `id` 属性和 `name` 节点的内容被注入到模板中。结果，此 XQuery 表达式将返回如查询下方所示的转换后的\
    \ XML。如你所见，XQuery 具有强大的功能，可用于实现 XML 元素的复杂处理。\n"
- fmt: '## XML indexes


    Due to the very specific nature of XML queries, standard B-tree indexes might
    not provide sufficient query performance boosts. Azure SQL provides several specialized
    types of indexes that enable efficient processing of XPath/XQuery expressions.
    The following types of indexes are available in Azure SQL:


    *   The `primary XML index` is a pre-computed structure that contains the shredded
    values and nodes from the XML column. Azure SQL uses the values from primary index
    instead of invoking expensive parsing of XML type with `value()`, `nodes()`, or
    `query()` methods. This is very similar to automatic index on JSON documents that
    Azure Cosmos DB uses.


    *   A `secondary XML index` improves the performance of the queries that search
    or filter XML documents using `exists()` method or returns multiple values from
    XML document using `value()` method.


    *   `Selective XML indexes` index only specified paths in XML column. This is
    very similar to multiple B-tree indexes on the predefined XML expressions.


    Selective XML indexes are the recommended approach for indexing based on the learnings
    from the multiple XML scenarios in SQL Server. The SQL Server team found that
    automatic indexing of all possible fields leads to large size of XML indexes,
    and on the other side, most of the indexed paths are not used. Therefore, selective
    XML indexes became the best choice and trade-off between usability, performance,
    and size.


    In the following example, you can see how to create a selective XML Index on a
    simple table:


    ```sql

    CREATE TABLE XmlDocs (

    id INT IDENTITY PRIMARY KEY,

    doc XML

    );

    GO

    CREATE SELECTIVE XML INDEX sxi_docs

    ON XmlDocs(doc)

    FOR (

    path_price = ''/row/info/price'' AS SQL INT,

    path_name = ''/row/info/name'' AS SQL NVARCHAR(100)

    )

    ```


    In selective indexes, you can choose the paths that should be included in the
    index and specify their types. The queries that use `value()` function on `doc`
    column with XPath queries as defined in the index specifications would be able
    to leverage the `sxi_doc` index, gaining a huge performance boost, even while
    the index is very small.


    ## Key-value pairs


    Azure SQL doesn’t have a specialized structure that holds key-value pairs. The
    reason is simple: key-value maps can be implemented using the simple two-column
    table.


    Azure SQL enables you to customize your two-column table and index the key column
    using various indexes. With memory-optimized tables, which will be discussed in
    detail in the next chapter, you can index the key column using B-tree or Hash
    indexes. In the following example, you can find a memory-optimized, lock-free,
    natively compiled, key-value table with a `HASH` index that enables faster access
    to the keys:


    ```sql

    CREATE TABLE [Cache] (

    [key] BIGINT IDENTITY,

    value NVARCHAR(MAX),

    INDEX IX_Hash_Key HASH ([key]) WITH (BUCKET_COUNT = 100000)

    ) WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_ONLY);

    ```


    This structure enables fast retrieval of the keys using hash indexes, which is
    optimal for elementary get/put operations. Memory-optimized tables have optimistic
    lock-free data access, and `SCHEMA_ONLY` durability ensures faster updates because
    data is not persisted to disk. In addition, if the values are formatted as JSON
    format, we can use native JSON functions to filter and process data right in the
    database, as you learned at the beginning of this chapter.


    One of the scenarios for key-value structures in Azure SQL is centralized caching.
    There is a well-known case study in SQL Server 2016 that showed how the customer
    replaced a distributed cache mechanism that was able to achieve 150K requests/sec
    on 19 distributed SQL Server nodes, with a memory-optimized table in a single
    server that increased performance to 1.2 million requests/sec. The targeted scenario
    was implementation of ASP.NET Session cache. Azure SQL uses the same technology
    as SQL Server, and the same technology can be used for caching in Azure cloud.


    In many real-world projects, caching using a specialized engine is usually the
    preferred choice, but that means that you need to master another technology, and
    you need to figure out how to best integrate it with your solution. Usually this
    effort is a good choice as caching solutions are much cheaper than a full-blown
    Azure SQL database, but if you are already using Azure SQL in the first place,
    knowing that you have this ability right in the database can provide you an additional
    option that you may want to evaluate to simplify the overall architecture.


    ## How to handle unstructured text?


    The most difficult to handle but not so uncommon case is unstructured textual
    data. In some cases, you will have textual data that cannot be nicely organized
    in JSON or XML format, but you would need to implement some searches on that text.
    One common example is HTML code that is placed in the database. Ideally, HTML
    should be the same as XML if it conforms to XHTML specification, but in many cases,
    HTML might have some variation that breaks strict XML structure.


    Azure SQL enables you to use `LIKE` clauses to determine if the text column matches
    some pattern. The following query finds all stock items where `SearchDetails`
    and `Tags` columns contain the text entered in some search text box in user interface:


    ```sql

    SELECT si.StockItemID, si.StockItemName, si.Tags

    FROM Warehouse.StockItems AS si

    WHERE si.SearchDetails LIKE N''%'' + @SearchText + N''%''

    OR si.Tags LIKE N''%'' + @SearchText + N''%''

    ```


    `LIKE` predicate uses the percent sign (`%`) to match zero or more of any character
    and the underscore (`_`) matches any one character. These special characters in
    the pattern expression on the right side of `LIKE` operator enable you to define
    various patterns such as text beginning or ending with some text sequence. `LIKE`
    operator is a very handy tool that is commonly used for text searches on small
    datasets. Azure SQL can optimize and use indexes even when using the `LIKE` operator,
    especially if you are using `LIKE` to search all text that `starts with` some
    prefix. In such cases, an index and the `LIKE` operator can provide very good
    performance. If you need instead to do a more complex search, for example, looking
    for specific words `contained` somewhere in your text, especially if you are working
    with bigger text sets, you might want to consider some text indexing solution
    described in the next section to improve performance even more.


    ### Indexing unstructured text


    If you need to search huge amounts of unstructured textual data, you would need
    to use some kind of specific indexing. Azure has a generic Azure Cognitive Search
    index service that enables you to index various data sources. But again, using
    an external service would add a bit more complexity to your solution. While Azure
    Cognitive Search provides a great set of specialized features, if you don’t need
    all of those, you may be happy to know that Azure SQL uses a similar localized
    text search index called Full-Text Search (FTS) index. An FTS index is a structure
    that indexes unstructured text fields in specified tables. An example of FTS index
    created on three text fields in `StockItems` table is shown in the following listing:


    ```sql

    CREATE FULLTEXT CATALOG [Main] AS DEFAULT;

    GO

    CREATE FULLTEXT INDEX

    ON Warehouse.StockItems (SearchDetails, CustomFields, Tags)

    KEY INDEX PK_Warehouse_StockItems

    WITH CHANGE_TRACKING AUTO;

    GO

    ```


    An `FTS` index contains a set of text fragments (tokens) divided using a set of
    word breakers. The tokens in the FTS index have the keys of the origin rows where
    the text is found. `FTS` enables you to provide some simple description of text
    pattern and return the keys of the rows that match the criterion.'
