  trans: '

    ## 输出子句：插入和删除的虚拟表


    将`INSERT`、`UPDATE`或`DELETE`（或`MERGE`）操作的结果返回给应用程序是一个非常常见的需求。例如，假设您正在创建的 API 解决方案中，通过
    HTTP `PUT` 方法接受对实体的更新。您创建的 API 将使用 `UPDATE` 或 `MERGE` 语句，通过 `PUT` 接收到的新数据更新数据库。遵循既定的良好实践，您希望将完整的实体作为
    `PUT` 请求的结果返回，以便调用方能够获得完全更新后的实体，而无需发出专门的 `GET` 请求。


    这意味着需要执行类似以下的操作：


    ```

    UPDATE

    [Warehouse].[Colors]

    SET

    [ColorName] = ''Unknown''

    WHERE

    [ColorID] = 99;

    SELECT

    [ColorID],

    [ColorName],

    [LastEditedBy],

    [ValidFrom],

    [ValidTo]

    FROM

    [Warehouse].[Colors];

    ```


    上述代码的问题在于，在一个高并发系统中，可能在`UPDATE`和随后的`SELECT`之间，其他连接可能已对数据应用了一些更改，这通常是您希望避免的行为。关于此问题的更深入讨论将在专门介绍事务的章节中进行，但与此同时，您可以看到问题源于我们有两个不同的命令，需要它们一个接一个地执行，中间不能插入其他操作，就像它们只是一个逻辑操作一样。


    解决此问题的一种非常优雅、可扩展且高性能的方法是要求 `UPDATE` 命令也生成输出，这样一切都将作为 *一个* 命令执行，问题将从根源上得到解决。


    `OUTPUT` 语句正是用于此目的：


    ```

    UPDATE

    [Warehouse].[Colors]

    SET

    [ColorName] = ''Unknown''

    OUTPUT

    [Inserted].[ColorID],

    [Inserted].[ColorName],

    [Inserted].[LastEditedBy],

    [Inserted].[ValidFrom],

    [Inserted].[ValidTo],

    WHERE

    [ColorID] = 99;

    ```


    结果将与使用单独的 `UPDATE` 和 `SELECT` 语句的代码等效，但没有描述的潜在问题。


    `Inserted` 是一个虚拟表，仅在其使用的语句持续期间存在。`Inserted` 虚拟表提供对数据在修改 *之后* 状态的访问；还有一个 `Deleted`
    虚拟表，提供对数据在修改发生 *之前* 状态的访问。


    由于 `UPDATE` 语句可以被认为是逻辑上的一对 `DELETE`/`INSERT` 语句，因此 `UPDATE` 允许您使用这两个虚拟表。`INSERT`
    语句将只允许您访问 `Inserted` 虚拟表，当然，`DELETE` 语句只允许访问 `Deleted` 虚拟表。`MERGE` 语句显然也将允许同时访问
    `Inserted` 和 `Deleted` 虚拟表。


    ## 标识和序列


    当您需要创建一个 ID 编号来分配给实体或行（通常是为了轻松地唯一标识它）时，您可以在应用程序中完成，也可以依靠数据库来完成。使用数据库将确保默认情况下不会生成两个相同的
    ID，从而大大简化您的代码。


    在 Azure SQL 中，有两种方法可以实现这一点。一种是使用 `IDENTITY` 功能，它主要出于向后兼容的目的而存在。当您创建表时，可以选择一个整数列作为标识列。这意味着
    Azure SQL 将为您自动生成该列的值，每次插入新行时：


    ```

    CREATE TABLE dbo.SampleID

    (

    Id INT IDENTITY(1,1) NOT NULL,

    OtherColums NVARCHAR(10) NULL

    );

    ```


    `IDENTITY(1,1)` 意味着数字将从 1 开始生成，并以 1 递增。


    虽然它多年来运行良好，但它有两个主要缺点。第一个是，除非您使用特定的 `SET` 选项暂时禁用标识行为，否则在执行 `INSERT` 命令时，您 *不能*
    手动为该列提供值。这并不十分友好。第二个，更重要的是，如果您有多个包含标识列的表（这可能相当常见），它们不会彼此感知，因此不同表中的行可能会具有相同的 ID
    值。这可能不是大问题，但有时您希望能够在整个数据库中，或者至少在一组逻辑相关的表中唯一地标识行。


    ### SEQUENCE 对象


    *序列* 正是您克服旧限制并获得所需全部灵活性所需要的。序列是在数据库级别创建的，可以在您需要的任何地方使用：


    ```

    CREATE SEQUENCE dbo.BookSequence

    AS BIGINT

    START WITH 1

    INCREMENT BY 1;

    CREATE TABLE dbo.SampleID

    (

    Id INT NOT NULL DEFAULT(NEXT VALUE FOR dbo.BookSequence),

    OtherColums NVARCHAR(10) NULL

    );

    ```


    使用这种方法，您可以在编写 `INSERT` 语句时，决定是使用自动生成的值还是提供您自己的值，而无需在执行前设置任何特定选项。


    序列通常还提供更好的性能和对数字生成方式的更多控制。您甚至可以 *保留* 数字（如果需要）。


    因此，如果您开始创建一个新数据库，建议是使用一个或多个 `SEQUENCE` 来生成您的 ID。只需记住，无论是 `IDENTITY` 还是 `SEQUENCE`，都不能保证不会生成重复的数字：您总是可以重置数字生成器并从已生成的数字开始。`SEQUENCE`
    命令甚至允许您在达到某个值后自动从头开始循环，因为有时这种在定义的一组数字中循环的能力可能非常有用。


    可以使用 `DROP SEQUENCE` 命令删除序列：


    ```

    DROP SEQUENCE dbo.BookSequence;

    ```


    ## TOP 和 OFFSET/FETCH


    有时，特别是当您只是探索数据时，您并不真正需要获取表中的所有数据。这在大表上尤其如此，更不用说我们谈论的是云中的数据库了。如果您不是真正使用这些数据，就没有必要移动大量数据。例如，仅前
    100 行可能就足以窥视您要处理的数据。


    您希望将返回的行数限制在特定数量的另一个原因是您希望对数据进行分页。例如，如果您正在实现一个必须公开 `ODATA` 端点的 `REST API`，支持分页将是一个常见需求。


    在 Azure SQL 中，您有两个选项来确保只返回请求的行数：`TOP` 和 `OFFSET/FETCH` 组合。


    `TOP` 是最容易使用但也是最受限的。`OFFSET/FETCH` 稍微复杂一些，但为您提供了更大的灵活性，并使分页实现变得非常容易：


    ```

    SELECT TOP (50)

    *

    FROM

    [Sales].[Orders]

    ORDER BY

    [ExpectedDeliveryDate] DESC;

    ```


    前面的代码将按 `ExpectedDeliveryDate` 降序返回前 50 行。


    下一个代码示例将执行相同的操作，但得益于 offset 选项，它将跳过前 50 行并返回接下来的 50 行。基本上，如果您为正在实现的分页功能将页面大小设置为
    50，则该代码实际上返回的是数据的第二页。如果 `OFFSET` 设置为 0，则产生的结果将与 `TOP` 相同，但如您所见，`OFFSET/FETCH`
    提供了更大的灵活性。从性能角度来看，它们是完全相同的：


    ```

    SELECT

    *

    FROM

    [Sales].[Orders]

    ORDER BY

    [ExpectedDeliveryDate] DESC

    OFFSET

    50 ROWS

    FETCH

    NEXT 50 ROWS ONLY

    ```


    ## 聚合


    Azure SQL 为聚合提供了广泛的支持，因此您可以高效地编写查询，使用最先进的优化技术对数据集进行聚合和分析。您可以在将需要编写的代码复杂性保持在尽可能低水平的同时，获得出色的性能。

