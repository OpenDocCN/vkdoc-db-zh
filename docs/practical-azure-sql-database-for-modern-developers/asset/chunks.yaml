    Temporal tables are adding time dimension to your data so that they can keep information
    about all changed data and the time the change occurred. This is done completely
    automatically and transparently, thanks to a system managed *History Table* .
    A History Table is a shadow table with the column structure identical to the main
    table. Whenever some rows in the main table, shown in Figure [9-7](#493913_1_En_9_Chapter.xhtml#Fig7),
    are changed (deleted or updated), the old versions are written in the history
    table, along with additional information that tracks the lifetime of those rows.


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig7_HTML.jpg](images/493913_1_En_9_Chapter/493913_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Temporal table automatically sends the row that will be updated or deleted into
    a separate history table


    The queries that just insert or select data will work only with the main temporal
    table, where the current version of data is stored, and they would not affect
    the history table. Temporal tables modify behavior or the queries that update
    or delete data and silently send current row values to the history table before
    they are updated in the main table. This is completely transparent, and you can
    keep using the standard T-SQL queries to access data.


    Moving old rows in the history table before they are changed is one of the most
    common scenarios for Triggers. Temporal tables provide native support for this
    behavior by automatically moving rows. The method used in temporal tables should
    be much faster than equivalent Triggers in most of the cases.


    ### Querying temporal data


    Automatic movement of old rows from the temporal to history table is important,
    but not the only benefit that you are getting from temporal tables. Even if you
    have all required row versions in the history table along with their validity
    range, querying historical data is still not easy. If you want to see how tables
    looked at some point in time in history, you would need to take some old row values
    from history but also some rows from the main table because they might be still
    valid at current time.


    Azure SQL enables you to use a special syntax to select data at some point in
    time and handles complexity of temporal queries for you. In addition to standard
    `SELECT` queries that will read the current rows from the main table, Azure SQL
    is enabling you to use temporal operators (shown in Figure [9-8](#493913_1_En_9_Chapter.xhtml#Fig8))
    that can be used to get the row versions at some point in time in the past, in
    some specific period, all versions of some row, and so on.


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig8_HTML.jpg](images/493913_1_En_9_Chapter/493913_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Temporal table enables you to fetch historical data for temporal queries


    Azure SQL Database provides several operators that can be applied on a temporal
    table. The most common are


    *   `FOR SYSTEM_TIME AS OF <datetime>` – The query will read the content of the
    table at the specified datetime in the past.


    *   `FOR SYSTEM_TIME ALL` – The query will read all rows that existed at any point
    in time in the past.


    More are available and you can find more details on those in the referenced resources
    at the end of this chapter. Depending on the temporal operator and the values
    provided to the operator, Azure SQL will decide if data must be read from the
    main table or from both tables and create the right plan that will fetch and merge
    resultsets from both tables.


    As an example, the following query will get the `Employee` with the specified
    primary key value at the specified point of time:


    ```

    SELECT *

    FROM Employee FOR SYSTEM_TIME AS OF @asOf AS History

    WHERE EmployeeID = @EmployeeID

    ```


    Azure SQL will compare the datetime value of `@asOf` variable with the dates when
    the `Employee` row was changed. If the last change was before that date, it will
    fetch data from the main table. Otherwise, it will find a row in history that
    was valid in the specified time.


    Let us imagine that someone accidentally updated an `Employee` row. We need to
    correct the error by taking the values from the version at the point in time when
    the values were correct and overwrite the current values. The following query
    can do this correction:


    ```

    UPDATE

    E

    SET

    Position = History.Position,

    Department = History.Department,

    Address = History.Address,

    AnnualSalary = History.AnnualSalary

    FROM

    Employee AS E

    JOIN

    Employee FOR SYSTEM_TIME AS OF @asOf AS History

    ON E.EmployeeID = History.EmployeeID

    WHERE

    E.EmployeeID = @EmployeeID

    ```


    We are updating a row in the `Employee` table with a specified `Employee` primary
    key value (`@EmployeeID`). We are joining the row with the version of the row
    with the same primary key value at the specified time (`@asOf`) using `FOR SYSTEM_TIME
    AS OF` clause. Then, we are just overwriting the values in the recent version
    with the values from the valid version. Note that the faulty values are not overwritten
    without trace. When the error is corrected, the wrong values are moved into the
    History table, and you can track when they were corrected and what were the errors.
    The History table is the source of truth where you can find information about
    any change that was made on the temporal table.'
  trans: '## 时态表


    我们在第 8 章中已经看到，Azure SQL 不使用原生 JSON 类型。JSON 被存储为 `NVARCHAR` 字符串，需要在查询时进行解析。通过使用本机编译函数，我们可以明确定义要使用的解析规则，并创建一个内置的原生
    JSON 解析器。


    ```sql

    CREATE FUNCTION PeopleData(@json nvarchar(max))

    RETURNS TABLE

    WITH NATIVE_COMPILATION, SCHEMABINDING

    AS RETURN (

    SELECT Title, HireDate, PrimarySalesTerritory,

    CommissionRate, OtherLanguages

    FROM OPENJSON(@json)

    WITH(Title nvarchar(50),

    HireDate datetime2,

    PrimarySalesTerritory nvarchar(50),

    CommissionRate float,

    OtherLanguages nvarchar(max) AS JSON)

    )

    ```


    本机编译函数的调用方式与其他任何函数相同。我们可以使用标准的 `CROSS APPLY` 运算符来提供一个值作为函数的参数，并将结果与主行进行连接：


    ```sql

    select p.FullName, p.EmailAddress, j.Title, j.CommissionRate

    from Application.People p

    cross apply PeopleData(p.CustomFields) j

    ```


    使用本机编译代码访问内存优化表是推荐的方式，因为它提供了最佳的性能和可扩展性。


    数据库中的常规表包含数据行的最新版本。每当某个查询更新值时，旧值就会被覆盖。这通常是预期且期望的行为，但在某些情况下，您可能希望能够访问旧值。一些例子可能是


    *   错误更正 – 有人意外更改或删除了表中的某一行，您需要纠正或撤销此更改。

    *   历史分析 – 您需要分析表中随时间发生的变化。

    *   审计 – 您需要查明谁在何时更改了哪些值。


    时态表为您的数据添加了时间维度，因此它们可以保留所有已更改数据以及更改发生时间的信息。这完全是自动且透明地完成的，这要归功于一个系统管理的 `History
    Table`（历史表）。`History Table` 是一个影子表，其列结构与主表完全相同。每当主表中的某些行（如图 9-7 所示）被更改（删除或更新）时，旧版本就会连同跟踪这些行生命周期的附加信息一起写入历史表。


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig7_HTML.jpg](img/493913_1_En_9_Fig7_HTML.jpg)


    图 9-7


    时态表自动将将要更新或删除的行发送到单独的历史表中


    仅插入或选择数据的查询将只操作主时态表（其中存储的是数据的当前版本），并且不会影响历史表。时态表会修改那些更新或删除数据的查询行为，在主表中的行被更新之前，静默地将当前行值发送到历史表。这个过程完全透明，您可以继续使用标准的
    T-SQL 查询来访问数据。


    在更改之前将旧行移动到历史表中，是触发器最常见的应用场景之一。时态表通过自动移动行，为此行为提供了原生支持。在大多数情况下，时态表中使用的方法应比等效的触发器快得多。


    ### 查询时态数据


    将旧行从时态表自动移动到历史表很重要，但这并不是时态表带来的唯一好处。即使您在历史表中拥有所有必需的行版本及其有效期范围，查询历史数据仍然不容易。如果您想查看表在过去某个时间点的样子，您需要从历史表中获取一些旧行值，同时也需要从主表中获取一些行，因为它们可能在当前时间仍然有效。


    Azure SQL 使您能够使用特殊语法来选择某个时间点的数据，并为您处理时态查询的复杂性。除了标准的 `SELECT` 查询（将从主表读取当前行）之外，Azure
    SQL 还允许您使用时态运算符（如图 9-8 所示），这些运算符可用于获取过去某个时间点、特定时间段内、某行的所有版本等的行版本。


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig8_HTML.jpg](img/493913_1_En_9_Fig8_HTML.jpg)


    图 9-8


    时态表使您能够为时态查询获取历史数据


    Azure SQL Database 提供了几个可应用于时态表的运算符。最常见的是


    *   `FOR SYSTEM_TIME AS OF <datetime>` – 查询将读取表在指定过去日期时间的内容。

    *   `FOR SYSTEM_TIME ALL` – 查询将读取过去任何时间点存在的所有行。


    还有更多可用的运算符，您可以在本章末尾的参考资源中找到更多细节。根据时态运算符和提供给运算符的值，Azure SQL 将决定数据是从主表读取，还是需要从两个表读取，并创建正确的计划来获取和合并来自两个表的结果集。


    例如，以下查询将获取在指定时间点具有指定主键值的 `Employee`：


    ```sql

    SELECT *

    FROM Employee FOR SYSTEM_TIME AS OF @asOf AS History

    WHERE EmployeeID = @EmployeeID

    ```


    Azure SQL 会将 `@asOf` 变量的日期时间值与 `Employee` 行被更改的日期进行比较。如果最后一次更改发生在该日期之前，它将从主表获取数据。否则，它将在历史表中找到在指定时间有效的行。


    假设有人意外更新了某个 `Employee` 行。我们需要通过获取在值正确的那个时间点的版本中的值，并覆盖当前值来纠正这个错误。以下查询可以执行此更正：


    ```sql

    UPDATE

    E

    SET

    Position = History.Position,

    Department = History.Department,

    Address = History.Address,

    AnnualSalary = History.AnnualSalary

    FROM

    Employee AS E

    JOIN

    Employee FOR SYSTEM_TIME AS OF @asOf AS History

    ON E.EmployeeID = History.EmployeeID

    WHERE

    E.EmployeeID = @EmployeeID

    ```


    我们正在更新 `Employee` 表中具有指定 `Employee` 主键值 (`@EmployeeID`) 的一行。我们使用 `FOR SYSTEM_TIME
    AS OF` 子句，将该行与同一主键值在指定时间 (`@asOf`) 的行版本进行连接。然后，我们只是用有效版本中的值覆盖了最近版本中的值。请注意，错误的值在被覆盖时并非没有留下痕迹。当错误被纠正后，错误的值会被移入历史表，您可以追踪它们是何时被纠正的，以及错误是什么。历史表是可信的单一来源，您可以在其中找到关于时态表上所做任何更改的信息。'
- fmt: '### Configuring temporal tables


    Temporal and history tables are independent tables. You can configure and optimize
    them separately by adding different indexes. The optimal configuration that you
    can use to improve temporal table performance is:


    *   The table that contains current data should be implemented as a memory-optimized
    schema and data table, if possible.

    *   History table should be implemented with a `Clustered Columnstore` index.


    If you are using the `Business Critical` service tier, a memory-optimized table
    will provide you the best performance in the workloads that insert, update, and
    delete data, which is the main scenario for tables with the current rows. You
    should not use memory-optimized tables if you think that all rows cannot fit into
    the memory, as having all rows in memory is a requirement for memory-optimized
    tables, as explained in earlier sections.


    `Columnstore` format is the optimal solution for the history table because you
    can have many column cells with the same values. In many cases, you will update
    just a few columns leaving other cells unchanged. Temporal tables will physically
    copy the entire previous row to the history table, meaning that unchanged cells
    will have the same values in different row versions in history. `Columnstore`
    format has the most efficient compression if it can replace a set of cells with
    the same values with a single marker describing the range of rows where this value
    appears. In this scenario, the `Clustered Columnstore` index created on the history
    table could provide extreme compression and improved history analysis performance
    on the temporal table.


    Under the assumption that you have a `DepartmentHistory` table for historical
    data, the following indexes may improve performance of the queries running on
    temporal history:


    ```

    CREATE CLUSTERED COLUMNSTORE INDEX cci_DepartmentHistory

    ON DepartmentHistory;

    CREATE NONCLUSTERED INDEX IX_DepartmentHistory_ID_PERIOD_COLUMNS

    ON DepartmentHistory (SysEndTime, SysStartTime, DeptID);

    ```


    `Clustered Columnstore` indexes will provide high compression and improve analytic
    capabilities when the query scans large amounts of history data. Nonclustered
    indexes on range columns and primary key would be very helpful to boost the performance
    of those queries that are accessing values of some rows at a specified point in
    time in history (e.g., using `FOR SYSTEM_TIME AS OF` clause). Depending on the
    types of the historical queries that you are running, you might want to add the
    first, the second, or both indexes.


    Another important optimization is database history retention. You can define how
    long historical data should be stored in the history table. Temporal tables enable
    you to define time-to-live period for the history records using the `HISTORY_RETENTION_PERIOD`
    setting:


    ```

    ALTER TABLE dbo.WebsiteUserInfo

    SET (SYSTEM_VERSIONING = ON (HISTORY_RETENTION_PERIOD = 9 MONTHS));

    ```


    This setting implies that all records in the history tables that are entered more
    than 9 months ago will be automatically deleted from the history table to avoid
    an infinite growth. You can also globally enable or disable these rules using
    the following database property:


    ```

    ALTER DATABASE current

    SET TEMPORAL_HISTORY_RETENTION ON

    ```


    This database-level option enables you to switch on or off retention policy for
    all tables in the database.


    ## If you want to know more


    `Columnstore` tables and indexes, memory-optimized tables, and temporal tables
    described in this chapter enable you to get more value from your databases. General-purpose
    Hobits, described in the previous chapter, are a good solution for most of the
    scenarios; however, if you can recognize specific characteristics of your workload,
    the tables and indexes described in this chapter will enable you to boost performance
    of your applications by order of magnitude:


    *   Columnstore indexes: Overview – [`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview)

    *   Columnstore indexes - Data loading guidance – [`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance)

    *   Get started with Columnstore for real-time operational analytics – [`https://docs.microsoft.com/sql/relational-databases/indexes/get-started-with-columnstore-for-real-time-operational-analytics`](https://docs.microsoft.com/sql/relational-databases/indexes/get-started-with-columnstore-for-real-time-operational-analytics)

    *   Niko Neugebauer Blog Columnstore Series – [`www.nikoport.com/columnstore/`](http://www.nikoport.com/columnstore/)

    *   In-Memory OLTP and Memory-Optimization – [`https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/in-memory-oltp-in-memory-optimization`](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/in-memory-oltp-in-memory-optimization)

    *   Memory-Optimized tempdb Metadata – [`https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database#memory-optimized-tempdb-metadata`](https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database%2523memory-optimized-tempdb-metadata)

    *   Optimize JSON processing with in-memory OLTP – [`https://docs.microsoft.com/sql/relational-databases/json/optimize-json-processing-with-in-memory-oltp`](https://docs.microsoft.com/sql/relational-databases/json/optimize-json-processing-with-in-memory-oltp)

    *   Temporal Tables – [`https://docs.microsoft.com/sql/relational-databases/tables/temporal-tables`](https://docs.microsoft.com/sql/relational-databases/tables/temporal-tables)

    *   Querying data in a system-versioned temporal table – [`https://docs.microsoft.com/sql/relational-databases/tables/querying-data-in-a-system-versioned-temporal-table`](https://docs.microsoft.com/sql/relational-databases/tables/querying-data-in-a-system-versioned-temporal-table)

    *   Scaling up an IoT workload using an M-series Azure SQL database – [`https://techcommunity.microsoft.com/t5/azure-sql-database/scaling-up-an-iot-workload-using-an-m-series-azure-sql-database/ba-p/1106271#`](https://techcommunity.microsoft.com/t5/azure-sql-database/scaling-up-an-iot-workload-using-an-m-series-azure-sql-database/ba-p/1106271)


