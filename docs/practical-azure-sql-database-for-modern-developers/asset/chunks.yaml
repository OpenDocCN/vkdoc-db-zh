    levels – from a database developer to a CTO. Every time Prem was in a meeting
    with a customer, I would just sit there and observe him deal with them – irrespective
    of whether the customer was angry or happy, frustrated or confused, Prem’s mood
    would always be constant; I never saw him get unsettled. Customers respected him
    a lot. If I had to meet a customer alone, and I knew that Prem had worked with
    them earlier, I would introduce myself saying that “I work with Prem,” and it
    would immediately earn me a camaraderie with the customer that would have taken
    days and months to build. In later years, I earned a lot of kudos from various
    people for my customer empathy, but all of it has been Prem’s coaching.


    Prem is enjoying his retired life, and Mike is having fun at his startup, but
    I miss them every single day at work. My 15 years at Microsoft and this book would
    not have happened if not for Mike and Prem’s influence in my early days. Thank
    you, Mike! Thank you, Prem!


    **Jovan Popovic**


    I would like to thank my daughters and wife for their patience and support during
    this adventure.


