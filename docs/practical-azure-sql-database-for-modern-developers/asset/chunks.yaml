    最棒的是，本书作者大多是我的老朋友，他们曾属于 SQLCAT/AzureCAT 团队，现在仍是微软工程部门数据组的一员，因此本书在技术性、实用性和助力您开启云之旅方面都极具价值。能受邀撰写此序言，我深感荣幸。尽管我最近已从工程部门转至负责全球商业业务的微软客户成功组织，但微软的数据服务始终让我心系。感谢团队为全球客户和数据开发者撰写这部应时之作。我确信它必将引起热烈反响。


    > **—马克·苏萨（Mark Souza）**

    >

    > **企业副总裁 – 微软客户成功部门**


    # 引言


    本书凝聚了我们关于开发者构建弹性、可扩展且安全的数据库应用程序所需的综合经验。`Azure SQL Database`为数据库应用程序提供了坚实的基础，我们相信本书也将为开发者构建未来应用程序奠定坚实基础。


    ## 第 1 章

    阐述本书的写作动机，并为开发者思维定下基调。


    ## 第 2 章

    助您快速上手`Azure SQL`，包括如何配置并构建您的第一个数据库，以及如何使用示例。


    拥有数据库后，您需要连接并开始查询它。**第 3 章**将带您实现这一目标。该章节还将指导您配置正确的连接属性，并为弹性构建连接重试逻辑。


    ## 第 4 章

    带您了解构建基础结构和编写数据库应用程序的基础知识。


    ## 第 5 章

    在第 4 章的基础上，讨论更高级的概念。


    ## 第 6 章

    探讨使用表和索引的实际用例及最佳实践。


    ## 第 7 章

    讨论更高级的概念，如一致性、可扩展性和性能。


    ## 第 8 章

    探讨`Azure SQL`中的多模型功能，这些功能有助于构建现代化应用程序。


    ## 第 9 章

    讨论高级数据存储功能，如`列存储`索引、内存优化表、时态表等。


    编写好应用程序后，您需要监控其性能并进行调试。**第 10 章**将带您完成这些工作。


    开发者的旅程若未涉及 DevOps 的讨论便不算完整。**第 11 章**探讨了涉及`Azure SQL`数据库的应用程序的 DevOps 技术、工具和流程。


    # 致谢


    ## 达维德·毛里（Davide Mauri）

    这是我首次作为主要作者著书，我将走最常见也最显然的途径，向我的妻子奥尔加（Olga）、我出色的孩子里卡多（Riccardo）和安娜（Anna），以及我的整个家庭——毛里齐奥（Maurizio）、奥尔内拉（Ornella）和克劳迪奥（Claudio）——表达一个巨大、无比的“感谢”，因为……嗯，一切。从小事到改变人生的大事，你们始终支持我、鼓励我成为最好的自己，无论是通过言语，还是更重要的——以身作则。虽然这些感谢是常见而明显的，但它们发自内心、真挚无伪。所以，感谢，感谢，再感谢。我爱你们所有人。


    我还要感谢拉拉（Lara）、查克（Chuck）和桑杰（Sanjay）：没有你们，我在微软的经历就不会是——而且现在仍不是——一场梦幻般的经历。因此，我衷心感谢你们在我旅程中给予的一切帮助和支持。非常感谢，非常感谢。我还要向伊齐克（Itzik）、莉拉赫（Lilach）和卢博尔（Lubor）表达一个大大的“谢谢”，从我们搬到美国的第一天起，你们就如此热情地欢迎我们，让我们立刻有了家的感觉，谢谢！


    ## 西尔瓦诺·科里亚尼（Silvano Coriani）

    大约 17 年前，当我撰写我的第一本“独立”著作——关于`ADO.NET`和`SQL Server`时，我曾向自己承诺那也将是最后一本！../images/493913_1_En_BookFrontmatter_Figg_HTML.gif
    但当我的朋友兼同事达维德（Davide）向我提议这次与安娜（Anna）、桑杰（Sanjay）和约万（Jovan）等杰出专业人士共同合作的团队项目时，我无法说“不”。我首先要深深地感谢他们，感谢他们在这次冒险过程中给予的帮助和支持。在我
    25 年多的职业生涯中，我很幸运能被众多优秀伙伴包围，并向他们学习。但与马克（Mark）、桑杰（Sanjay）及团队在`SQLCAT`共度的岁月是一份珍贵的礼物，帮助我作为一个人和专业人士不断成长。我要感谢他们每一个人！如今，故事在`Azure
    SQL`团队中继续，我有幸继续与杰出的个人、同事和上司共事：感谢你们所有人！


    在个人层面上，首先，我要感谢我的家人：我可爱的妻子塞雷娜（Serena）以及我的孩子卡特琳娜（Caterina）和洛伦佐（Lorenzo）。特别是在我撰写本书的漫长封锁期间，他们的耐心、爱与支持是无价之宝。最后但同样重要的是，向我的大家庭——我的父母和岳父母——表达一个大大的感谢，感谢他们的支持与鼓励。


    ## 安娜·霍夫曼（Anna Hoffman）

    作为一名相对较新接触`Azure SQL`和开发者世界的人，我非常感激达维德（Davide）、西尔瓦诺（Silvano）、约万（Jovan）和桑杰（Sanjay）给予我这个绝佳的机会，能与一些世界上最伟大的
    SQL 专家共同研究这两个主题。通过这段经历，我从他们所有人身上学到了很多，取得了巨大进步。我还要感谢微软内外的`SQL`社区，它不同于我曾参与过的任何其他社区。每一天，我都在向大家学习，因此谢谢你们。我感谢我们团队中的每一位产品经理和工程师，但具体而言，我还要特别感谢阿兰·多梅尔（Alain
    Dormehl）、鲍勃·沃德（Bob Ward）和巴克·伍迪（Buck Woody），在我学习`Azure SQL`和`SQL Server`的过程中，他们给予了充足的时间和耐心。我还要感谢我们无畏的`SQL`领袖阿萨德·汗（Asad
    Khan），感谢他两年前给我机会加入这个团队，并持续给予支持。个人而言，我要感谢我的丈夫菲尔（Phil），他是我最大的啦啦队长，并在我长时间沉迷于`Azure
    SQL`时帮我照顾我们的小狗穆斯（Moose，这是我们在疫情期间做过的最好决定）。最后，我要感谢我的父母沙吉（Shaji）和莉·安·托马斯（Leigh Ann
    Thomas），他们每天都激励我变得更好（并且开启了我们家的计算机科学传统），还有我的弟弟扎卡里（Zachary），他正在杜克大学最后一年延续这一传统（我为你感到无比骄傲，迫不及待想看到你的成就！）。


    ## 桑杰·米什拉（Sanjay Mishra）

    我最近完成了在微软的 15 年工作。在我早期的微软岁月中，有两个人不遗余力地帮助我适应并成长，我想肯定他们的贡献和影响——迈克·鲁斯拉夫（Mike Ruthruff）和普雷姆·梅赫拉（Prem
    Mehra）。迈克在我早期花费了无数时间帮助我理解我所接触的新数据库产品，这个产品与我加入微软时熟知的数据库产品如此相似却又如此不同。从安装 Windows（是的，在那些安腾服务器上安装和配置
    Windows 可不容易）到连接调试器并在我们的`SQLCAT`实验室中调试具有复杂客户工作负载的早期版本，迈克是我解决一切问题的求助对象。迈克的友善和慷慨时间帮助我精通了`SQL
    Server`；否则，这本书将只是一个遥远的梦想。

