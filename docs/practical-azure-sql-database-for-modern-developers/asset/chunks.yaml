    ### 保持超级简单


    作为开发者，你必须明白，例如，在尚未正确设计数据库以利用索引之前，却去创建一个极其复杂的缓存机制来提升解决方案的性能，这是没有意义的。让我清楚地告诉你：没有什么方法能比一个好的索引策略带来更大的性能提升。如果你试图做一些不同且更“聪明”的事情，你迟早会在自己的应用程序中（很可能以某种形式的**B
    树**）重新实现数据库中已有的解决方案——只是成本和复杂度要高得多。从专业角度来看，这毫无道理。像这样的过度工程化故事不仅仅是假设，也不只是用来吓唬初级开发者：其中一位作者就亲身经历过。他曾被要求优化一个接近实时处理的复杂数据解决方案，该方案使用了复杂的多层缓存、最先进的微服务架构和最新的硬件，但性能仍然很差且成本高昂。经过深入分析，提出的方案是拆除一大部分现有架构，并用数据库上的几个索引（更准确地说，是**列存储索引**）来替代。创建该解决方案的开发者并不知道这些索引的存在，因为他们的认知还停留在**SQL
    Server 2005**的功能上。经过一些争论、阻力以及关于成长型心态的讨论，代码被重构和重新架构，最终审查通过的解决方案从使用七台虚拟机来承载一个复杂的分布式缓存方案，变成了仅需一个**Azure
    SQL**数据库，成本降至十分之一，性能却大大提升。


    通过使用正确的工具，本质上复杂的解决方案可以被分解为更小的片段，每个片段都可以用正确的工具更简单地进行管理。**Azure SQL**就是这样一个工具，在数据处理方面通常很合适。即使你认为它不足以应对挑战，也请试一试，并准备好改变你的看法。这就是你成为更好的开发者的方式。


    ### 成为通才专家


    开发更多的是做出决策，而不仅仅是编写代码。当然，代码是你向世界展示你为解决某个业务问题或实现某个功能而决定做的事情的方式，但开发过程早在你的脑海中就开始了，即你开始评估手头有哪些选项来实现你被要求开发的功能时。


    作为开发者，实现目标最重要的步骤之一是能够掌控局面，并决定什么是实现目标的最佳架构和实施策略。通过掌握不止一门编程语言和不止一种数据管理解决方案，人们可以挑选，或建议，为当前正在开发的特定解决方案选择最佳方案。有时它可能是像**Apache
    Spark**这样复杂灵活的东西，有时则可能是像**Redis**这样简单易用的东西。很多时候，像**Azure SQL**这样的现代数据库可以在一个地方提供数量惊人的特性，在选项、成本和性能之间提供良好的平衡。


    为了做出最佳选择，人们需要至少了解一些处于开发空间边缘的工具，因为它们将有助于处理该空间之外的所有事情。在许多情况下，“所有事情”意味着“数据”。一个人对数据了解得越多，解决方案就会越好。使用敏捷方法中同样的定义，一个人需要成为一个
    *通才专家* ([`https://aka.ms/swkogs`](https://aka.ms/swkogs))。


    精通一些技能，但也要积极学习其他技能。


    ### 如果想了解更多


    本书旨在为你提供关于**Azure SQL**的非常实用的观点，以及它如何在你作为开发者或架构师的日常工作中提供帮助。当然，要理解所描述的内容为何重要或比某些其他替代方案更好，需要一些理论背景。我们希望你通过理解概念来学习，而不仅仅是死记硬背。这是一种基础的心态，因为你将是那个被要求做出某些开发或设计选择的人。虽然我们无法在你身边提供帮助，但本书可以，但前提是你理解所解释概念的细节。我们在书中放入了我们认为足够让你入门并给你一个关于你能实现什么的概念的内容。这足以让你掌控自己的开发和设计决策。然而，你可能想知道更多并深入某些概念；毕竟，你知道得越多，就越想知道。因此，在每一章中，你都会找到一个同名的小节，你可以在其中找到一些书籍、文章或帖子作为参考，以更深入地了解数据库知识。以下是本章的列表：


    *   《Database in Depth: Relational Theory for Practitioners》 – [`www.amazon.com/Database-Depth-Relational-Theory-Practitioners/dp/0596100124`](http://www.amazon.com/Database-Depth-Relational-Theory-Practitioners/dp/0596100124)

    *   《Practical Issues in Database Management: A Reference for the Thinking Practitioner》
    – [`www.amazon.com/Practical-Issues-Database-Management-Practitioner/dp/0201485559`](http://www.amazon.com/Practical-Issues-Database-Management-Practitioner/dp/0201485559)

    *   《SQL and Relational Theory: How to Write Accurate SQL Code》 – [`www.amazon.com/SQL-Relational-Theory-Write-Accurate/dp/1449316409`](http://www.amazon.com/SQL-Relational-Theory-Write-Accurate/dp/1449316409)

    *   《Data Modeling Essentials, Third Edition》 – [`www.amazon.com/Modeling-Essentials-Third-Graeme-Simsion/dp/0126445516`](http://www.amazon.com/Modeling-Essentials-Third-Graeme-Simsion/dp/0126445516)

    *   《Database Design and Relational Theory: Normal Forms and All That Jazz》 –
    [`www.amazon.com/Database-Design-Relational-Theory-Normal/dp/1484255399`](http://www.amazon.com/Database-Design-Relational-Theory-Normal/dp/1484255399)

    *   《Hot Patching SQL Server Engine in Azure SQL Database》 – [`https://techcommunity.microsoft.com/t5/azure-sql-database/hot-patching-sql-server-engine-in-azure-sql-database/ba-p/849700`](https://techcommunity.microsoft.com/t5/azure-sql-database/hot-patching-sql-server-engine-in-azure-sql-database/ba-p/849700)

    '
- fmt: '# 2. Azure SQL Kickstart


    The first mention of Azure SQL, referred to as “Microsoft SQL Services” at the
    time, was when Microsoft announced “Project Red Dog” (Microsoft Azure) at Microsoft’s
    Professional Developer Conference (PDC) in 2008. This cloud-hosted version of
    SQL Server was one of the first services available on Azure. From the beginning,
    it was meant to provide a Platform as a Service (PaaS) offering of SQL Server,
    where you don’t have to provision hardware or patch software and you can enjoy
    benefits that come with running in the cloud – availability, performance, security,
    and scale – without deploying complex and expensive systems on premises. Since
    then, Azure SQL has continued to grow and evolve with the Azure platform. As you
    read this book, it’s important to remember that things are always changing. While
    some of the “little rocks” or details throughout the book may change slightly
    as the platform evolves, the “big rocks” you will learn in this book will provide
    a solid foundation for you to grow in the space of developing with databases.


    For readers who are new to Azure or new to Azure SQL, this chapter will serve
    as a kickstart to get you ramped up and ready to start building applications with
    Azure SQL. You’ll learn about the flexibility in deployment that exists today
    in Azure SQL, as well as some common scenarios that can help you decide what deployment
    option, service tier, and other options you should choose. You’ll also learn about
    some of the tools and samples that are available for working with and managing
    Azure SQL.


    While (or after) you read this chapter (and the chapters that follow), we recommend
    you leverage the code samples that are provided with the book, so you can get
    some hands-on experience with the topics.


    Today, when you hear the words “Azure SQL,” this refers to a suite of products,
    not only Azure SQL Database. Within Azure SQL, there are different deployment
    options, which basically amount to different products within the Azure SQL brand.
    It’s easy to break the deployment options, as shown in Figure 2-1, into three
    categories, based on abstraction and access level: OS level, server level, and
    database level.


    ![../images/493913_1_En_2_Chapter/493913_1_En_2_Fig1_HTML.jpg](images/493913_1_En_2_Chapter/493913_1_En_2_Fig1_HTML.jpg)


    Figure 2-1: The Azure SQL family of offers


    OS-level access means that Azure handles everything until you get to the OS level.
    The data center, hardware, virtualization, and so on are managed by Microsoft,
    but the OS, SQL Server, and database(s) are managed by you. You essentially get
    an Azure Virtual Machine with SQL Server installed. This is often referred to
    as an `Infrastructure as a Service` (IaaS) type of offering. With IaaS, while
    you are responsible for managing and patching the OS, SQL Server, and database(s),
    you also get access to all the features contained in those levels. For example,
    if you want to run a third-party application on the same machine as SQL Server,
    you can do that with IaaS. Additionally, there are a few features from SQL Server
    2019 (latest release at time of this book) that are not yet available in the other
    deployment options, like PolyBase. If you want 100% parity with SQL Server, an
    Azure SQL virtual machine may be your best option. For more information, see [`https://aka.ms/azuresqlvm`](https://aka.ms/azuresqlvm).


    As you move away from scenarios that require OS-level access, and you begin looking
    for more managed offerings, there are a few Azure SQL options that fall within
    the `Platform as a Service` (PaaS) type of offering, and these options will be
    the focus of this book. With a PaaS service, you get things like automated backups,
    patching of both the database engine and OS, a service-level agreement (SLA) for
    availability, advanced security, monitoring, and scalability out of the box. For
    developers, this means you can get a connection string, stop worrying about maintenance,
    and spend less time troubleshooting.


    For example, let’s imagine you don’t want to have to worry about OS patches and
    SQL Server upgrades. You just want an instance of SQL Server. You might opt for
    `Azure SQL managed instance`, which abstracts the OS away from you, leaving you
    with an evergreen managed instance of SQL Server. Here, you can get almost all
    of the instance-level features; for example, SQL Server Agent, Service Broker,
    Linked Servers, and Common Language Runtime are supported. This deployment option
    is ideal for companies that want to move to a PaaS offering, but still need to
    control and access many of the server-level pieces. Azure SQL managed instance
    also offers native virtual network support, which allows you to integrate the
    service into your on-premises network if desired.


    Now, consider a scenario where your company is in the process of transforming
    into a cloud-native entity or one where you are working in a cloud-born company.
    Perhaps you are not interested in managing SQL Server at an instance level and
    do not need the server-level features. Even more, you may not even know what SQL
    Server is, as you may never had the chance or the need to use it on premises.
    What you are looking for, then, is the next layer of abstraction that Azure SQL
    can offer, which is `Azure SQL Database`. In this offering, you get all the PaaS
    benefits that Azure SQL managed instances give you, but you just get a database
    and the database-level capabilities. For this deployment option, you’ll have a
    logical server for organizational and administrative purposes, but no access to
    instance-level features or views.


    When choosing between Azure SQL managed instance and Azure SQL Database, there
    are a few additional trade-offs you can consider determining what is best for
    an application’s requirements. One way to think about Azure SQL managed instance
    vs. Azure SQL Database is like the way you think about virtual machine vs. a container.
    If you use a virtual machine (VM) to deploy an application, you have more power,
    disks, and security services, but you can only have 2–10 VMs per host. On the
    other hand, if you use containers, you get lighter and faster with greater elasticity
    and hundreds of containers per host. If you apply that train of thought to Azure
    SQL, with Azure SQL managed instance, you get more features and control, but with
    Azure SQL Database, you get faster, smaller, and with potentially lower costs.
    Let’s consider the trade-offs.'
