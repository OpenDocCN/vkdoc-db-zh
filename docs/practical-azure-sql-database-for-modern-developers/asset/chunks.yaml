  trans: '## 内存优化表


    Azure SQL 提供了内存优化表功能，可极大地提升您的 OLTP 工作负载性能与可扩展性。内存优化表的主要用途是加速类似 CRUD 的操作，例如选择少量行或更新、删除现有行。


    有些人认为，将行数据始终保留在内存中是提升性能的关键因素。然而，这种想法过于天真，在许多情况下，这远非真正的原因。


    Azure SQL 本来就是与存储在内存中的行数据协同工作的。它拥有一套出色的数据内存缓存机制（称为 `缓冲池`），能够智能地选取应从磁盘获取的最重要数据，并巧妙地淘汰近期不太需要的行，以便为更可能使用的行腾出空间。如果您的数据库小于可用内存，所有行很可能都常驻于内存中，那么您已经拥有一个“内存数据库”了。那么，问题在于：与内存优化表相比，我们获得的是何种额外的“内存优化”呢？


    让我们首先了解常规表的工作方式，以及在查询处理过程中磁盘和内存是如何使用的。核心的查询处理假设基于以下前提：


    *   如前所述，数据库中存储的所有数据都使用称为“页”的 `8KB` 数据结构记录在磁盘上。一个 `10GB` 的未压缩数据库最少会有大约一百万个数据页。

    *   每当访问一行时，相关的数据页会被加载到内存中。Azure SQL 会尝试将尽可能多的数据页保留在内存中。这个内存区域称为 `缓冲池`。

    *   如果数据库大于可用内存，`缓冲池` 将无法缓存所有数据，因此页必须从磁盘获取，如果被修改，则需写回磁盘。每个页都作为一个原子性的 `8KB` 单位进行读写。有时，数据库可以通过单次
    IO 操作读取更大的磁盘块（即所谓的预读操作）来优化 IO 性能。

    *   查询中最昂贵的操作是在内存和磁盘之间传输 `8KB` 页。

    *   应最小化内存与磁盘之间的数据传输。数据库引擎应尽其所能避免不必要的 IO 交互。


    Azure SQL 必须协调工作负载，以最小化 IO 操作的次数。让我们来看看两个线程/查询更新两个 `8KB` 页上的行的情况。我们需要决定在更改被确认（提交）之前，如何将其与其他查询隔离。我们有两种处理并发的方法：


    *   *悲观*：我们会阻塞其他希望访问已被另一线程修改的行的线程，直到修改线程决定保存或放弃更改。

    *   *乐观*：我们允许其他线程访问被修改行的原始版本。我们需要为将被修改的行创建一个副本，该副本将成为仅对当前线程可用的“私有版本”，而其他线程则访问原始行。


    理想情况下，我们应该持乐观态度，因为悲观方法会阻塞其他线程，这意味着更低的性能、并发性和可扩展性。但我们需要了解两种方法的优缺点。


    ### 一个关于乐观并发的故事


    让我们看看数据库如何通过乐观并发处理更新。图 9-5 展示了位于同一 `8KB` 页上的两行分别被两个线程（或事务）`Tx[1]` 和 `Tx[2]` 修改，以及另一个具有乐观并发的线程
    `Tx[3]` 的示例。对于每次更改，我们都需要创建一个行的新版本，该版本将成为进行修改的线程的私有副本。在事务提交更改并使更新后的版本对所有其他事务可用之前，这些副本将保持私有。在此期间，其他事务应继续使用原始页中可用的行原始版本。


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig5_HTML.png](img/493913_1_En_9_Fig5_HTML.png)


    图 9-5


    为每个进行更改的事务创建已更新行的新版本


    一旦 `Tx[1]` 提交了对行 1 的更改，Azure SQL 能做的最简单的事情就是声明旧数据页无效并使用新页。因为将部分页的内容复制回原始的 `8KB`
    页会非常困难。`Tx[2]` 同样在处理行 1 的私有副本，它将无法提交自己的更改，因为它更新的版本已不再有效。一旦 `Tx[2]` 尝试提交更改，它将被回滚，并且需要用最新的有效数据重试该操作。这可能是预期的结果，因为两个事务都试图在未独占锁定行的情况下更新行。如果发生冲突，重试是唯一的解决方案。除此之外，还有另一个可能意想不到的副作用。`Tx[3]`
    将无法提交自己对行的更改，即使这些更改是在与行 1 不同的行上进行的，因此并未与 `Tx[1]` 更新的行 1 发生冲突。因为二进制内容已更改，并且页面可能被拆分为两个新页面，Azure
    SQL 无法轻易从新的有效页中获取已更改行的二进制内容。因此，该事务也将被回滚。


    此外，创建带有临时行的新页面也会对性能产生影响。Azure 有一个称为“`检查点写入器`”的后台进程，负责将修改过的内存页保存到底层存储。如果我们生成了大量临时页面，它们将被保存到磁盘，然后在回滚后，原始内容必须再次保存。在这种情况下，临时生成的页面会造成更大的损害，我们可能需要阻止这种情况发生。


    ### 我们应该成为悲观主义者吗？


    由于 `8KB` 页是数据传输的主要单位，更新行的事务可能会对整个页加锁，防止其他事务进行更改，因为这些更改很可能被回滚并导致额外的 IO。锁机制是一种悲观方法，有助于防止由于*竞争条件*而可能对单个页面造成的损害。


    正如您在第 7 章所学，通常数据库通过使用悲观并发控制来防止过多 IO 操作的风险。每个事务都会获取锁或闩锁（闩锁只是锁的一个更轻量级的版本），以确保一个潜在共享的行或数据页的某个版本专门用于正在修改它的线程。其他希望修改同一页面上数据的线程会暂时被行锁或页闩锁阻塞，直到另一个线程完成修改。线程无法修改相同的行，它们会被阻塞。这样，我们避免了创建新页面和导致额外
    IO 的需要，但我们降低了并发性并影响了性能。


    现在，让我们想象一下，我们可以忽略磁盘 IO，并且没有需要为临时更改也持久化存储的 `8KB` 页面。我们可以采用高级的乐观并发，仅使用廉价的内存复制操作轻松生成新的行版本。这只有在我们能确保表数据将放置在内存中，无需在
    `缓冲池` 和磁盘存储之间进行数据传输，并且没有 `8KB` 容器导致行之间存在依赖关系时，才可能实现。内存优化表提供了这些保证。


    内存优化表是我们知道数据将位于内存中的表，因此我们可以应用乐观并发，并允许大量的并发更新。这是内存优化技术的主要优势，也是与经典（传统）表的关键区别。'
- fmt: '## Memory-optimized tables


    Now when you understand what the main benefit of memory-optimized technology is,
    we can start using them. You can leverage memory-optimized features by marking
    the table as memory-optimized:


    ```

    CREATE TABLE dbo.Cache

    (

    [key] INT IDENTITY PRIMARY KEY NONCLUSTERED,

    data NVARCHAR(MAX)

    )

    WITH (MEMORY_OPTIMIZED=ON)

    ```


    The only change that you need to do is to add a `WITH` clause with the property
    `MEMORY_OPTIMIZED=ON`. With this property, data rows are always kept in memory,
    data pages are not used anymore, and memory-optimized features such as optimistic
    concurrency are enabled on the table data.


    There are three types of memory-optimized tables:


    *   Memory-optimized non-durable schema-only tables. These tables are very similar
    to temporary tables. The table schema will be preserved after restarts or potential
    system crashes. Azure SQL will re-create the table structure after restart, but
    it will not preserve the content. The main purpose of these tables is caching
    scenarios (like ASP.NET session state), being an intermediate store for complex
    data processing and fast loading of data (so-called staging tables).


    *   Memory-optimized durable tables where both schema and data are preserved even
    after process crash or failover. Azure SQL will ensure that a minimal set of information
    is sent to log and persisted so data will survive system crashes. These tables
    are logically equivalents of classic tables with memory-optimized enhancements
    and used to improve performance of the existing rowstore tables.


    *   Memory-optimized Columnstore tables are a combination of Columnstore structures
    and memory-optimized tables. The main scenario is a combination of analytic and
    transactional workloads (OLTP) on the same table. This combination is known as
    Hybrid Transactional-Analytical Processing (HTAP).


    In the following example, you can see how to create a memory-optimized table that
    serves as a cache:


    ```

    CREATE TABLE dbo.Cache

    (

    [key] INT IDENTITY PRIMARY KEY NONCLUSTERED,

    data NVARCHAR(MAX)

    )

    WITH (MEMORY_OPTIMIZED=ON, DURABILITY=SCHEMA_ONLY)

    ```


    If you are wondering why you may want to use Azure SQL Memory-Optimized tables
    to create a caching solution, since there are other specific solutions like Redis
    or Cosmos DB that are usually better suited for caching, you should keep in mind
    that one of the best advices in software development is keeping things simple.
    If you are already using Azure SQL in your project, the option to create a custom
    transactional caching mechanism right into the database without having to resort
    to another technology can simplify your solution a lot (and also decrease maintenance
    costs, as you don’t have to learn and maintain another technology). In addition
    to that, Memory-Optimized table offers a deep integration with all other features
    of Azure SQL. For example, you can create a secured caching solution by using
    Row-Level Security with Memory-Optimized tables.


    There are two `WITH` options that you can use to define would data be persisted
    even if database crashes:


    *   `DURABILITY=SCHEMA_ONLY` defined non-durable table where only table structure
    will be re-created if Azure SQL Database restarts.


    *   `DURABILITY=SCHEMA_AND_DATA` defines a durable table where both table structure
    and data will survive failover or crash.


    Columnstore format of memory-optimized table must be specified with definition
    of clustered Columnstore index within memory-optimized table, as shown in the
    following example:


    ```

    CREATE TABLE Accounts (

    AccountKey int NOT NULL PRIMARY KEY NONCLUSTERED,

    Description nvarchar (50),

    Type nvarchar(50),

    UnitSold int,

    INDEX cci CLUSTERED COLUMNSTORE

    ) WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA)

    ```


    Columnstore memory-optimized tables combine best from both worlds – extremely
    fast analytic and compression of data that can fit into memory and highly-concurrent
    and extremely fact ingestion and updates of data provided by memory-optimized
    tables. The only risk here is the amount of data that you can process. Classic
    Columnstore indexes analyze all data in memory; however, it lets you keep column
    segments on disk if they cannot fit into the memory. Memory-optimized Columnstore
    requires all data to reside in memory. Since Azure SQL reserves ~60% of available
    memory to memory-optimized data, you need to be sure that your data can fit. Since
    we are talking about large amounts of data in a Columnstore analytic scenario,
    if you are not sure that your data can fit into memory, use disk-based tables.


    For these reasons, Memory-Optimized Clustered Columnstore Indexes cover a niche
    scenario. In fact, using classic rowstore tables with NCCI indexes for HTAP scenarios
    is the general approach on average, and Memory-Optimized Clustered Columnstore
    Indexes are used only on very performance-intensive workloads. For example, if
    you need to be able to handle up to 5 million of rows per second, like described
    in the article "Scaling up an IoT workload using an M-series Azure SQL database"
    referenced in the last section of this chapter, you will needed Memory-Optimized
    Clustered Columnstore Indexes for sure.


    While we are talking about memory-optimized storage, we cannot separate this discussion
    from indexing. In-memory rows are objects scattered in memory space and need some
    structure that will bind them together. These structures are the indexes. Whenever
    you create memory-optimized, you need to have at least one index.


    In the previous examples, you have seen `NONCLUSTERED` B-Tree indexes and `CLUSTERED
    COLUMNSTORE` indexes . There is another kind of index that is specific for memory-optimized
    tables, the `NONCLUSTERED HASH` index , shown in the following example:


    ```

    CREATE TABLE [dbo].[Employees](

    [EmpID] [int] NOT NULL

    CONSTRAINT PK_Employees_EmpID PRIMARY KEY

    NONCLUSTERED HASH (EmpID) WITH (BUCKET_COUNT = 100000),

    [EmpName] [varchar](50) NOT NULL,

    [EmpAddress] [varchar](50) NOT NULL,

    [EmpDEPID] [int] NOT NULL,

    [EmpBirthDay] [datetime] NULL

    ) WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA)

    ```


    `NONCLUSTERED HASH` index is an in-memory hash table that uses column values as
    keys (`EmpID` in this case) and contains a list of pointers to the actual rows
    in the table. Every hash table consists of a fixed number of slots (hash buckets)
    with an array of pointers to the actual rows. Row pointers with the same hash
    values are linked into the list that represents its own hash bucket.


    The bucket count must be specified at index creation time and impact the length
    of the pointer list in every bucket. The ratio of distinct key values and the
    number of hash buckets would represent the expected average bucket link list length.
    Longer lists imply more operations to find the row based on key.


    The bucket count should be between one and two times the number of distinct values
    in the index key. In practice, it is hard to estimate the number of distinct values
    in a column; however, you will get good performance if the `BUCKET_COUNT` value
    is within ten times the actual number of values in the indexed column. Note that
    overestimating is generally better than underestimating. If you find a bad ratio
    after some time, you can always rebuild the index with new bucket count.'
