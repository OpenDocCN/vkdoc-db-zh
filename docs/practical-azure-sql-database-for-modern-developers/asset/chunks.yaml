    \ to connect from your local machine, you’ll need to specify the IP address range\
    \ that you want to be able to connect to the database. Optionally, you can create\
    \ a firewall rule with value “0.0.0.0” for the starting and end IP address to\
    \ allow all Azure-internal IP addresses. This will allow other services (e.g.,\
    \ Azure Functions, Azure virtual machines) to connect to your database. The code\
    \ is the same for both options mentioned; just substitute the IP address range\
    \ desired in the following code.\n\n```\naz sql server firewall-rule create \\\
    \n–-name  \\\n–-resource-group  \\\n–-server  \\\n–-start-ip-address  \\\n–-end-ip-address\
    \ \nListing 2-6\nCreate firewall rules\n```\n\nYou should now be able to connect\
    \ to your Azure SQL Database from an allowed IP address from your tool of choice\
    \ (more on tools soon).\n\nThe process and commands for creating an Azure SQL\
    \ managed instance vary slightly, because with a managed instance, you create\
    \ a “managed” SQL Server (not a logical server) and then you create “managed”\
    \ databases.\n\nBefore deploying, you’ll need to address new parameters for the\
    \ *VNetName* and *SubnetName*. This is because Managed Instance is required to\
    \ be deployed in an Azure virtual network in its own subnet or in a subnet with\
    \ other managed instances only. The easiest way to set this up is by using the\
    \ Azure Resource Manager (ARM) deployment template available here: [`https://aka.ms/sqmicvs`](https://aka.ms/sqmicvs).\
    \ An ARM template is a JSON file that uses declarative syntax to define infrastructure\
    \ and configuration to be deployed. There are many ARM templates available to\
    \ get started building simple or complex solutions in Azure ([`https://aka.ms/armtemplates`](https://aka.ms/armtemplates)).\
    \ Using the ARM template, you can simply select the “Deploy to Azure” button and\
    \ fill in your subscription and resource group information, and it will deploy\
    \ the virtual network and subnet that is required for a managed instance.\n\n\
    You can read more about the different commands here: [`https://docs.microsoft.com/en-us/cli/azure/sql/mi`,](https://docs.microsoft.com/en-us/cli/azure/sql/mi,)\
    \ but a sample script follows.\n\n```\n# create an azure sql managed instance\
    \ with default parameters\naz sql mi create -g  -n  -l  -i -u  -p  --subnet /subscriptions//resourceGroups//providers/Microsoft.Network/virtualNetworks//subnets/\n\
    # create a new managed database within an existing azure sql managed instance\n\
    az sql midb create -g  –-mi  -n \nListing 2-7\nAzure CLI commands to create Azure\
    \ SQL managed instances\n```\n\n## Tools to use and manage Azure SQL Database\n\
