  raw: 'You may want to define more retry strategies in your applications and use
    them depending on the kind of database operation you want to retry. For example,
    for less frequent data retrieval operation, you may want to define a more aggressive
    retry strategy with higher number of retries, while for a different use case,
    you may want to step back and quickly return the error to the end user so that
    he or she can make a different decision based on that.


    Next step is to define what error detection strategy you want to use. TFH provides
    out of the box a class called *SqlDatabaseTransientErrorDetectionStrategy* which
    encapsulates the logic for detecting the most common error codes that Azure SQL
    will emit when facing a transient error. In this example, we instead created a
    custom strategy by creating a class that implements *ITransientErrorDetectionStrategy*
    interface, as we wanted to test our retry logic with some non-transient errors.


    You then create a *RetryPolicy* instance by combining your retry strategy and
    transient error detection class, and that will provide the *ExecuteAction()* or
    *ExecuteAsync()* method to effectively wrap database access code.


    Retry policy class also exposes a *Retrying* event that you can subscribe to and
    be notified when retry logic is intercepting a transient error and retrying an
    operation.


    Another popular library in the .NET space is Polly ([`https://aka.ms/avnp`](https://aka.ms/avnp))
    which also provides features that cover other app reliability aspects by implementing
    resiliency patterns like Circuit Breaker, Timeout, Bulkhead Isolation, and Fallback
    in addition to just Retry.


    Similar implementations also exist in most other programming languages and frameworks.
    In Python, a common one is called Tenacity ([`https://aka.ms/tenacity`](https://aka.ms/tenacity))
    and provides similar capabilities. Tenacity comes as a generic decorator (*@retry*)
    for the methods you will want to retry automatically. You can specify several
    parameters, like number of attempts (stop condition) and delay between attempts
    (referred as wait condition), and of course customize what exception types should
    be considered retriable. This implementation is quite simple to use; let’s see
    it in practice in the next example.


    ```

    import pyodbc

    import random

    from tenacity import *

    import logging

    def is_retriable(value):

    # Define all retriable error codes from https://docs.microsoft.com/en-us/azure/sql-database/troubleshoot-connectivity-issues-microsoft-azure-sql-database

    RETRY_CODES = [1204,1205,1222,49918,49919,49920,4060,4221,40143,40613,40501,  40540,40197,10929,10928,10060,10054,10053,233,64,20,0]

    ret = value in RETRY_CODES

    return ret

    @app.route(''/order'')

    @retry(stop=stop_after_attempt(3), wait=wait_fixed(10), after=after_log(logger,
    logging.DEBUG))

    def getorders():

    cnxn = pyodbc.connect("DRIVER={ODBC Driver 17 " \

    "for SQL Server};" \ "SERVER="+server+";DATABASE="+database+"" \

    ";UID="+username+";PWD="+ password)

    try:

    cursor = cnxn.cursor()

    tsql = "SELECT TOP 5 " \

    " [o].[OrderID], [o].[OrderDate]," \

    " [c].[CustomerName]" \

    " FROM [Sales].[Orders] AS [o]" \

    " INNER JOIN [Sales].[Customers] AS [c]" \

    " ON [o].[CustomerID] = [c].[CustomerID]"

    rows = cursor.execute(tsql).fetchall()

    order_list = []

    for row in rows:

    d = collections.OrderedDict()

    d[''orderID''] = row.OrderID

    d[''orderDate''] = str(row.OrderDate)

    d[''customerName''] = row.CustomerName

    order_list.append(d)

    except Exception as e:

    if isinstance(e,pyodbc.ProgrammingError) or

    isinstance(e,pyodbc.OperationalError):

    if is_retriable(int(e.args[0])):

    raise

    pass

    return json.dumps(order_list)

    Listing 3-7

    Implement retry logic in a Python application

    ```


    In this example, we use Tenacity to decorate a Flask method interacting with our
    database called *getorders()* , and we retry three times with a fixed interval
    of 10 seconds in case of an exception. Instead of specifying in decorator’s attributes
    what exception to retry with, we’re instead wrapping *pyodbc* methods with a *try/except*
    block and checking if the exception has anything to do with database access. In
    that case, we’re checking if underlying database error code is contained in the
    list we’re maintaining for retriable error and, if that’s the case, we’re just
    raising that exception so that the *@retry* decorator can do its job of automatically
    retrying the method until it succeeds or it should stop trying as the max number
    of attempts has been reached.


    Even in Java, there are again multiple options to achieve the same result. One
    of the most commonly used is called Failsafe ([`https://aka.ms/jnfs`](https://aka.ms/jnfs))
    and is very similar to the Transient Fault Handling library we mentioned previously.
    Without the need for demonstrating it in another complete application, the following
    code fragment shows how to quickly use Failsafe’s main classes:


    ```

    // Define a retry policy instance with familiar parameters

    RetryPolicy retryPolicy = new RetryPolicy()

    .handle(ConnectException.class)

    .withDelay(Duration.ofSeconds(1))

    .withMaxRetries(3);

    // Wrap your database interaction code with that retry policy

    Failsafe.with(retryPolicy).run(() -> connect());

    ```'
