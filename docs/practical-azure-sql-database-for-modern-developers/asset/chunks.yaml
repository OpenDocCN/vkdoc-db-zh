    # 1. A Database for the Modern Developer


    The advent of cloud computing has brought a lot of innovation in all fields, and
    relational databases have been taking advantage of that innovation too. They evolved
    up to the point that many of them, Azure SQL included, now incorporate features
    that have traditionally been found in non-relational databases, distributed systems,
    and analytical platforms. Such evolution provides a great number of options in
    terms of flexibility and scalability, and yet still offers all the consistency
    and the guarantees provided by the solid mathematical foundations of relational
    algebra, so that a developer can have the best of both worlds: well-established
    technologies along with new and disruptive ideas in just one place.


    ## Why did we write this book?


    As you will learn throughout this book, there are a lot of features that you probably
    won’t expect to see in Azure SQL databases. As you may have guessed already by
    now, that’s why we felt that a book like the one you are reading is needed. As
    a developer, you need to know what are the tools and the features that you have
    at your hand to your job at best, and this book is here to help. Starting from
    a new, fresh approach to development and data management, the book will go through
    a shift in mindset, which is needed to deal with an always-evolving environment
    like the one offered by the cloud, up to the discussion of which role a modern
    database like Azure SQL can play in today’s modern software architectures, all
    while explaining, using a very practical approach, all the features that Azure
    SQL makes available to you and where and how they can be used in modern solutions.


    In fact, sooner or later you will have to deal with data, and it doesn’t really
    matter if it will be a huge amount or just a little of it. The earlier you learn
    how to do it properly and use it at your advantage, the better. With a good knowledge
    of Azure SQL, you can simplify your architecture and keep code clean and with
    a clear separation of concerns ([`https://aka.ms/seofco`](https://aka.ms/seofco)),
    all while improving performance by orders of magnitude just by using the available
    features, scaling up to almost any possible need you may have now or in the future.
    Yes, this sounds too good to be true, but it is real. And it’s not magic. Those
    features are the result of almost 30 years of research and development, mixed
    with today’s cloud elasticity and scalability.


    A relational database, in fact, being completely based on mathematical concepts,
    is still amazingly good at handling today’s challenges, despite being introduced
    in the market 50 years ago. Just like the sum operation in math, probably the
    most ancient operation we know of, it really doesn’t grow old. If the idea behind
    is solid and mathematically proven, it will always work. What may become old,
    instead, is how it is used and implemented in available hardware and software.
    Here’s where evolution and constant improvement come into play: we know that the
    relational model works and works well. What needs to be pushed far away are the
    limits imposed by the existing hardware and software constraints.


    Azure SQL is a relational database that, especially in its new Hyperscale version,
    has been renewed and refactored completely to provide the elasticity expected
    from a cloud service, even though it shows the usual, well-known, programming
    model and data management features that have been used with so much success since
    the 1970s.


    This dual soul, with roots both in a well-established and mature field on one
    side – keep in mind that Azure SQL is SQL Server in the Azure cloud – and in new
    exciting frontiers of scalability and data management on the other, makes Azure
    SQL a pretty unique, one-of-a-kind database, capable of handling today’s most
    demanding and scalable workloads.


    As a result, it comes loaded with so many features that every developer will find
    something to love; this also implies that there is a lot to learn for those who
    have never used it before. This book is here to help.'
