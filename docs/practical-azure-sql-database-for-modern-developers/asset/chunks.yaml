- fmt: '# 4. Developing with Azure SQL – Foundations


    Now that you know how to create an Azure SQL database, how to connect to it, and
    how to restore a sample database, it’s now time to start to see what Azure SQL
    offers to a modern developer.


    In this chapter, we will see all the major features that can help you to create
    modern applications, using the sample database `WideWorldImporters` as our playground.


    As usual for this book, we’ll keep a very pragmatic approach, assuming that you
    have a basic idea of a table: an entity composed of columns, each one with its
    name and own data type, that contains rows of data. Columns define the shape,
    the `schema`, of data. To be stored in a table, data must adhere to its schema,
    meaning that column data types and constraints must be observed; otherwise, the
    database will reject the data. This approach has been recently defined as `schema-on-write`:
    consistency with the schema is checked when data is written into the database.
    This ensures data is coherent with what the applications using it are expecting.
    Some other databases offer a `schema-on-read` approach, where all data can be
    stored, and schema is checked only when someone tries to read the data. Both approaches
    have, as usual, pros and cons; since data is useful only when coherent and meaningful,
    no matter what is the approach you choose, you still must be sure that served
    data is logically correct and sound. With a `schema-on-write` approach, Azure
    SQL works with you to make sure this happens, as it will check for you that data
    is always consistent with the defined schema. If not, it will return an error.
    This behavior may be seen as a bit rigid, and sometimes it is, so that’s why Azure
    SQL also supports `schema-on-write` to some extent, by allowing natively to store
    and manipulate `JSON` documents. Keep in mind that with a `schema-on-read`, it’s
    up to you to write code right inside your application to validate data before
    using it. In most of the common cases, that’s quite a big incumbency that would
    be better taken care of by a specialized entity, like Azure SQL, alleviating a
    lot of your work as a developer and, again, helping to have a good separation
    of concerns. Data consistency and integrity is mainly a matter for a database
    that can take care of it in a centralized way for all solutions accessing its
    data.


    A deeper discussion on tables will come in Chapter 6, but given that is pretty
    common for a developer to start to work on an existing database, we felt it was
    better to start understanding what we can do with the data we already have.


    And there are lots of things we can do! For this reason, this chapter aims to
    give you a full overview of all the features you should know to make sure you
    are really using all the potential that Azure SQL has.


    As there are so many features for developers packed in Azure SQL, in this chapter
    you’ll find just the tip of the iceberg. Make sure you use the code samples included
    with the book to get more details on features and to see them in action. Use the
    referenced resources to dive deeper into all the features and their options.


    Remember, this book is like a diving board that aims to give you a boost to better
    dive in the data ocean!


    ## Pushing compute to data


    I strongly recommend pushing as much of the computation needs you have to the
    data instead of bringing data to you. Moving data is a heavy, complex, resource-consuming
    task. Moving computing logic is much easier, as it is way more compact and lightweight.
    Also, with the usage of `Views`, `Functions`, or `Stored Procedures` that we will
    discuss in a moment, you don’t even have to move source code or compiled binaries
    around.


    But the main benefit of pushing compute to data is that you can really take advantage
    of all the money you are paying for using a database like Azure SQL. If you would
    have had to implement all the querying, filtering, and optimization logic in your
    code, then why use a database at all? Just use a much cheaper file storage and
    you would have saved a lot of money.


    Well, that could be the impression, but in reality, you would still have to spend
    time to actually implement those features you are renouncing when not using Azure
    SQL. So, it wouldn’t really be that much cheaper.


    It turns out it would actually be much more expensive if you also take into account
    that you would probably need to maintain and evolve those features. And it will
    be just one or a few of you, while for Azure SQL, there are literally hundreds
    of engineers working on it every day, with just one objective: improve its performance
    and capabilities as much as possible. By pushing compute to data, you can get
    the benefit of all those engineers working behind the scenes. This can affect
    you and the performance of your application: let me give you a very practical
    sample of that.


    If you need to find distinct values in a table that holds `50 million` rows of
    data, until not so many years ago, you would have had to wait something like `5
    seconds`. Not bad, right? Still, `5 seconds`, if you are creating an API to serve
    a mobile app, is a lot in today’s world. In the last few years, the engine powering
    Azure SQL has been improved by adding columnstore table and vector (or batch)
    executions by taking advantage of `SIMD` CPU instruction set and some advanced
    optimization techniques like the `Grouped Aggregate Pushdown`. With all these
    improvements, the same query now takes a `single-digit millisecond` – `single
    digit` – from `5000 milliseconds` originally.


    Can you imagine how much effort and costs you would have had to go through if
    instead of pushing the calculation to the database, you would have moved the data
    to the application to reach the same improvement? Instead, you could use all those
    resources for something unique to your use case or business problem, something
    that the database cannot solve for you.


    Push compute to data: it’s really the best approach to have a scalable, modern,
    performant solution.'
  raw: '# 4. Developing with Azure SQL – Foundations


    Now that you know how to create an Azure SQL database, how to connect to it, and
    how to restore a sample database, it’s now time to start to see what Azure SQL
    offers to a modern developer.


    In this chapter, we will see all the major features that can help you to create
    modern applications, using the sample database WideWorldImporters as our playground.


    As usual for this book, we’ll keep a very pragmatic approach, assuming that you
    have a basic idea of a table: an entity composed of columns, each one with its
    name and own data type, that contains rows of data. Columns define the shape,
    the *schema*, of data. To be stored in a table, data must adhere to its schema,
    meaning that column data types and constraints must be observed; otherwise, the
    database will reject the data. This approach has been recently defined as *schema-on-write*:
    consistency with the schema is checked when data is written into the database.
    This ensures data is coherent with what the applications using it are expecting.
    Some other databases offer a *schema-on-read* approach , where all data can be
    stored, and schema is checked only when someone tries to read the data. Both approaches
    have, as usual, pros and cons; since data is useful only when coherent and meaningful,
    no matter what is the approach you choose, you still must be sure that served
    data is logically correct and sound. With a schema-on-write approach, Azure SQL
    works with you to make sure this happens, as it will check for you that data is
    always consistent with the defined schema. If not, it will return an error. This
    behavior may be seen as a bit rigid, and sometimes it is, so that’s why Azure
    SQL also supports schema-on-write to some extent, by allowing natively to store
    and manipulate JSON documents. Keep in mind that with a schema-on-read, it’s up
    to you to write code right inside your application to validate data before using
    it. In most of the common cases, that’s quite a big incumbency that would be better
    taken care of by a specialized entity, like Azure SQL, alleviating a lot of your
    work as a developer and, again, helping to have a good separation of concerns.
    Data consistency and integrity is mainly a matter for a database that can take
    care of it in a centralized way for all solutions accessing its data.


    A deeper discussion on tables will come in Chapter [6](#493913_1_En_6_Chapter.xhtml),
    but given that is pretty common for a developer to start to work on an existing
    database, we felt it was better to start understanding what we can do with the
    data we already have.


    And there are lots of things we can do! For this reason, this chapter aims to
    give you a full overview of all the features you should know to make sure you
    are really using all the potential that Azure SQL has.


    As there are so many features for developers packed in Azure SQL, in this chapter
    you’ll find just the tip of the iceberg. Make sure you use the code samples included
    with the book to get more details on features and to see them in action. Use the
    referenced resources to dive deeper into all the features and their options.


    Remember, this book is like a diving board that aims to give you a boost to better
    dive in the data ocean!


    ## Pushing compute to data


    I strongly recommend pushing as much of the computation needs you have to the
    data instead of bringing data to you. Moving data is a heavy, complex, resource-consuming
    task. Moving computing logic is much easier, as it is way more compact and lightweight.
    Also, with the usage of Views, Functions, or Stored Procedures that we will discuss
    in a moment, you don’t even have to move source code or compiled binaries around.


    But the main benefit of pushing compute to data is that you can really take advantage
    of all the money you are paying for using a database like Azure SQL. If you would
    have had to implement all the querying, filtering, and optimization logic in your
    code, then why use a database at all? Just use a much cheaper file storage and
    you would have saved a lot of money.


    Well, that could be the impression, but in reality, you would still have to spend
    time to actually implement those features you are renouncing when not using Azure
    SQL. So, it wouldn’t really be that much cheaper.


    It turns out it would actually be much more expensive if you also take into account
    that you would probably need to maintain and evolve those features. And it will
    be just one or a few of you, while for Azure SQL, there are literally hundreds
    of engineers working on it every day, with just one objective: improve its performance
    and capabilities as much as possible. By pushing compute to data, you can get
    the benefit of all those engineers working behind the scenes. This can affect
    you and the performance of your application: let me give you a very practical
    sample of that.


    If you need to find distinct values in a table that holds 50 million rows of data,
    until not so many years ago, you would have had to wait something like 5 seconds.
    Not bad, right? Still, 5 seconds, if you are creating an API to serve a mobile
    app, is a lot in today’s world. In the last few years, the engine powering Azure
    SQL has been improved by adding columnstore table and vector (or batch) executions
    by taking advantage of SIMD CPU instruction set and some advanced optimization
    techniques like the *Grouped Aggregate Pushdown*. With all these improvements,
    the same query now takes a single-digit millisecond – single digit – from 5000
    milliseconds originally.


    Can you imagine how much effort and costs you would have had to go through if
    instead of pushing the calculation to the database, you would have moved the data
    to the application to reach the same improvement? Instead, you could use all those
    resources for something unique to your use case or business problem, something
    that the database cannot solve for you.


    Push compute to data: it’s really the best approach to have a scalable, modern,
    performant solution.'
  trans: '# 4. 使用 Azure SQL 进行开发 – 基础篇


    现在，你已经了解了如何创建 Azure SQL 数据库、如何连接到它以及如何还原示例数据库，是时候开始了解 Azure SQL 为现代开发者提供了哪些功能。


    在本章中，我们将探讨所有能帮助你创建现代应用程序的主要特性，并以示例数据库 `WideWorldImporters` 作为我们的实践平台。


    一如既往，本书将采取非常实用的方法。我们假设你对表有一个基本概念：表是一个由列组成的实体，每一列都有其名称和数据类型，其中包含数据行。列定义了数据的形态，即
    `schema`（模式）。为了存储在表中，数据必须遵守其模式，这意味着必须遵循列数据类型和约束；否则，数据库将拒绝该数据。这种方法最近被定义为 `schema-on-write`（写入时模式）：在数据写入数据库时检查其与模式的一致性。这确保了数据与使用它的应用程序所预期的保持一致。一些其他数据库提供了
    `schema-on-read`（读取时模式）方法，即所有数据都可以存储，模式仅在有人尝试读取数据时进行检查。这两种方法各有优缺点；由于数据只有在一致且有意义时才有用，因此无论你选择哪种方法，都必须确保所提供的数据在逻辑上是正确和合理的。通过
    `schema-on-write` 方法，Azure SQL 会与你协作以确保这一点发生，因为它会为你检查数据是否始终与定义的模式一致。如果不一致，它将返回错误。这种行为可能看起来有些死板，有时也确实如此，因此
    Azure SQL 在某种程度上也支持 `schema-on-write`，即原生支持存储和操作 `JSON` 文档。请记住，在 `schema-on-read`
    模式下，你需要在应用程序内部编写代码，在使用数据之前对其进行验证。在大多数常见情况下，这是一项相当繁重的任务，最好由像 Azure SQL 这样的专门实体来处理，这可以大大减轻你作为开发者的工作量，并有助于更好地实现关注点分离。数据一致性和完整性主要是数据库的问题，它可以为访问其数据的所有解决方案以集中方式处理。


    关于表的更深入讨论将在第 6 章中进行，但考虑到开发者通常从处理现有数据库开始工作，我们认为最好先了解我们可以对已有数据做些什么。


    我们能做的事情有很多！因此，本章旨在为你提供所有你需要了解的功能的全面概述，以确保你真正利用了 Azure SQL 的全部潜力。


    由于 Azure SQL 中为开发者集成了如此多的功能，在本章中你将只看到冰山一角。请务必使用本书附带的代码示例来了解功能的更多细节并查看它们的实际操作。利用参考资源深入了解所有功能及其选项。


    请记住，本书就像一个跳板，旨在推动你更好地潜入数据的海洋！


    ## 将计算推送到数据端


    我强烈建议将尽可能多的计算需求推送到数据端，而不是将数据拉取到你这里。移动数据是一项繁重、复杂且消耗资源的任务。移动计算逻辑则容易得多，因为它更加紧凑和轻量级。此外，通过使用我们稍后将讨论的
    `视图`、`函数` 或 `存储过程`，你甚至不需要移动源代码或编译后的二进制文件。


    但将计算推送到数据端的主要好处是，你可以真正利用你为使用像 Azure SQL 这样的数据库所支付的所有费用。如果你必须在自己的代码中实现所有的查询、筛选和优化逻辑，那为什么还要使用数据库呢？直接使用便宜得多的文件存储，你就能省下很多钱。


    嗯，这可能是表面印象，但实际上，如果你不使用 Azure SQL，你仍然需要花费时间来实际实现那些你放弃的功能。所以，它实际上并不会那么便宜。


    事实证明，如果你还考虑到你可能需要维护和演进这些功能，它实际上会更昂贵。而且可能只有你一个人或少数几个人在做这些事，而对于 Azure SQL，有数百名工程师每天都在为此工作，只有一个目标：尽可能地提高其性能和能力。通过将计算推送到数据端，你可以获得所有这些幕后工作的工程师带来的好处。这可以影响你和你应用程序的性能：让我给你一个非常实际的例子。


    如果你需要在一个包含 `5000 万` 行数据的表中找出不同的值，就在不那么久以前，你可能需要等待大约 `5 秒钟`。还不错，对吧？然而，如果你正在创建一个为移动应用程序提供服务的
    API，`5 秒钟` 在当今世界是非常漫长的。在过去的几年里，驱动 Azure SQL 的引擎通过添加列存储表和向量（或批处理）执行得到了改进，这些执行利用了
    `SIMD` CPU 指令集以及一些高级优化技术，如 `分组聚合下推`。通过所有这些改进，同样的查询现在只需要 `个位数毫秒` —— 从原来的 `5000
    毫秒` 降至 `个位数毫秒`。


    你能想象如果你没有将计算推送到数据库端，而是将数据移动到应用程序端以达到同样的改进，你需要付出多少努力和成本吗？相反，你可以将所有这些资源用于你的用例或业务问题所特有的、数据库无法为你解决的事情上。


    将计算推送到数据端：这确实是构建可扩展、现代化、高性能解决方案的最佳方法。'
- fmt: "# 声明式与命令式\n\nAzure SQL 允许你使用一种与你日常习惯不同的方法来创建操作数据的解决方案。如果你使用的是 `C#`、`Java`、`Python`\
    \ 或 `NodeJS`，那么你很可能习惯于遵循*命令式*范式。在命令式范式下，你会告诉系统具体如何去执行一个过程，更准确地说，是一个算法。例如，如果你有一个数字列表，并想统计其中有多少个不同的值，你可能会用循环来实现解决方案，遍历这些值，将当前值与已见过的值列表进行比较，只有当当前值不在该列表中时才将其加入。\n\
    \n相反，如果你使用*声明式*方法，你只需告诉系统你想要什么，而不是如何去做。本质上，你是以已有的数据结构为起点，描述你想要达到的结果。从概念上讲，这与设置导航系统带你从点“A”到点“B”并无太大不同。\n\
    \n因此，使用前面提到的相同例子，在 Azure SQL（以及任何关系型数据库）中，你可能会写出类似这样的语句：\n\n```sql\nSELECT DISTINCT\
    \ Number FROM Values;\n```\n\n我们将在接下来的章节中详细讨论这行代码的细节，但你已经可以凭直觉理解它在做什么。\n\n`Python`\
    \ 和 `C#` 提供了一些声明式支持。`C#` 支持语言集成查询（`LINQ`），而 `Python` 使用列表推导式，因此你可能有一些相关经验，这将极大地帮助你使用\
    \ Azure SQL。另一方面，如果你还没有这方面的经验，通过阅读本书，你将会熟悉声明式范式的力量和美妙之处。\n\n关系型数据库，尤其是 Azure SQL，将声明式方法的理念提升到了一个新的高度。Azure\
    \ SQL 不仅会为你处理实现细节，让你可以专注于“做什么”而不是“如何实现”，而且它在处理时还会考虑大量令人印象深刻的额外因素。例如，表中有多少数据，操作这些数据需要多少内存，现有的索引是否有帮助，甚至数据在表中的分布情况。\n\
    \n想一想，现代导航系统的工作方式完全相同：它不仅允许你指定起点和目的地，还会考虑实时交通、道路封闭和其他条件，以便在给定的有限时间内尝试为你提供*最佳*解决方案，而不仅仅是*一个*解决方案。\n\
    \n在现代开发中，这对于确保你的应用程序始终保持响应至关重要，即使它使用的数据在值和大小上不断变化：适应变化不仅是开发者的关键因素，对于应用程序同样如此。\n\
    \n# 查询与数据操作\n\n正如人们可能猜测的那样，你将用来与 Azure SQL 数据库中的数据交互的语言是 *SQL*（*结构化查询语言*）。SQL\
    \ 是一个被许多关系型和非关系型数据库采纳的标准。学好它不仅对使用 Azure SQL 有用，对利用 Apache Spark 等许多其他知名数据平台也同样有益。每个数据库通常都在一定程度上实现了\
    \ `ANSI/ISO SQL` 标准，并有一些变体以利用平台特有的功能。因此，实现的 SQL 被称为一种*方言*。对于 Azure SQL，其方言与 `SQL\
    \ Server` 使用的相同：简称为 *Transact-SQL* 或 *T-SQL*。\n\n要操作数据，你只需要掌握少数几个命令，通常被称为 *DML*\
    \ – *数据操作语言* – 它们涵盖了所有所需的功能：\n\n*   `SELECT`\n*   `INSERT`\n*   `UPDATE`\n*  \
    \ `DELETE`\n*   `MERGE`\n\n如果你熟悉应用程序开发中常见的 *CRUD – 创建、读取、更新、删除* 功能集，你会发现只有前四个\
    \ SQL 命令真正用于实现 CRUD 操作；添加了第五个 `MERGE` 命令，以便在一个命令中同时完成插入、更新和删除操作，通过将大量细节留给查询引擎来简化代码，使其更易理解，并且在许多情况下也更高效。\n\
    \n## 检索数据\n\n`SELECT` 命令允许你从数据库中获取一组数据。它需要你想要获取的列的列表、表名，以及可选但几乎总是使用的过滤器，用于将返回的行限制在你感兴趣的范围内，例如：\n\
    \n```sql\nSELECT\n    InvoiceID,\n    InvoiceDate,\n    DeliveryInstructions,\n\
    \    ConfirmedDeliveryTime\nFROM\n    Sales.Invoices\nWHERE\n    CustomerID =\
    \ 998\nORDER BY\n    ConfirmedDeliveryTime;\n```\n\n这个查询将查看 `Sales.Invoices` 表，返回\
    \ `CustomerID` 列中值为 `998` 的所有行，并将结果限制为仅包含 `InvoiceID`、`InvoiceDate`、`DeliveryInstructions`\
    \ 和 `ConfirmedDeliveryTime` 列。\n\n即使这样一个简单的 `SELECT` 语句也很有趣。首先，值得注意的是，数据没有固有的或自然的顺序。如果不指定\
    \ `ORDER BY`，数据将以无特定顺序的方式返回。\n\n出于性能原因，数据很可能以 Azure SQL 访问它的顺序返回，而这种顺序可能会随时间变化；如果你依赖数据按特定顺序排列，你必须指定\
    \ `ORDER BY` 子句。其次，除非通过一个名为 `COLLATION` 的选项另行指定，否则数据库对象不区分大小写。这也适用于表中的数据。当然可以更改这一点，但可能会对性能产生影响：更多相关讨论将在后续章节中进行。\n\
    \n现在让我们看一个更复杂的例子。假设我们的客户 `998` 正在浏览她的订单历史，以寻找她在 `2016` 年第一季度收到的一个特定商品。通过在虚构的移动应用上使用一系列过滤器，这可能是我们需要执行的\
    \ `T-SQL` 语句：\n\n```sql\nSELECT\n    il.InvoiceLineID AS LineID,\n    i.InvoiceID,\n\
    \    il.[Description],\n    il.Quantity,\n    il.UnitPrice,\n    il.UnitPrice\
    \ * il.Quantity AS TotalPrice,\n    i.ConfirmedDeliveryTime\nFROM\n    Sales.Invoices\
    \ AS i\nINNER JOIN\n    Sales.InvoiceLines AS il ON i.InvoiceID = il.InvoiceID\n\
    WHERE\n    i.CustomerID = 998\n    AND\n    il.[Description] LIKE N'%red shirt%'\n\
    \    AND\n    CAST(i.ConfirmedDeliveryTime AS DATE) BETWEEN '2016-01-01' AND '2016-03-31';\n\
    ```\n\n在 `WideWorldImporters` 数据库中执行后，结果将如图 4-1 所示。\n\n![图 4-1 示例 SELECT 结果](images/493913_1_En_4_Chapter/493913_1_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1 示例 SELECT 结果\n\n在刚才使用的示例查询中，尽管简单，但有几个值得注意的地方在日常使用中非常常见。\n\n> **注意**\n\
    > 你可以使用星号 `*` 来自动包含表中的所有列，而不是指定你想要作为结果的列。虽然这对于仅查看数据或进行一些数据探索时执行查询可能有用，但在创建将被应用程序使用的内容时，这不是最佳实践。列的顺序随时可能改变，如果有人更改了表定义，列也可能被添加或删除。始终指定你想要返回的列，这样你才能得到确定的结果。如果你不需要所有列，你还能避免浪费网络带宽并提高传输速度。"
  raw: '## Declarative vs. imperative


    Azure SQL allows you to use a different approach to create solutions to manipulate
    data, as opposed to the language you are used to work with every day. If you are
    using C#, Java, Python, or NodeJS, in fact, you are most probably used to work
    following the *imperative* paradigm. With the imperative paradigm, you tell the
    system exactly how you want a process, more precisely, an algorithm, to be applied.
    For example, if you have a list of numbers and you want to count how many distinct
    values there are in that list, you may implement the solution using a loop, iterating
    over the values, where you compare the current value to a list of values you have
    already seen before, and adding the current value to that list only if it is not
    yet there.


    If you use a *declarative* approach instead, you only tell the system what you
    want, not how you want to have it done. Basically, you describe where you want
    to be, using the data structure you already have as a starting point. It’s really
    not much different, conceptually, than setting your navigation system to bring
    you from point “A” to point “B.”


    So, using the same sample mentioned before, with Azure SQL (and any relational
    database), you would write something like


    ```

    SELECT DISTINCT Number FROM Values;

    ```


    We’ll discuss the details of the preceding line of code in the next sections,
    but you can already understand intuitively what it is doing.


    Python and C# provide some declarative support. C# supports Language-Integrated
    Query (LINQ), and Python uses List Comprehensions, so you may have some experience,
    and that will help you a lot in using Azure SQL. On the other hand, if you don’t
    have experience with that yet, by reading this book, you''ll get familiar with
    the power and beauty of the declarative paradigm.


    Relational databases, and Azure SQL in particular, bring the idea of the declarative
    approach to the next level. Azure SQL will not only take care of the implementation
    details for you, so that you can focus on what you want and not how you can get
    it, but it will do so by taking into account an impressive number of additional
    factors. For example, how much data is in a table, how much memory it will need
    to manipulate it, if existing indexes can help, and even how data is distributed
    within a table.


    If you think about it, a modern navigation system works exactly in the same way:
    it not only allows you to specify the start and the destination, but it will also
    take into account real-time traffic, roadblocks, and other conditions so that
    it can try to give you the *best* solution within a given finite amount of time,
    not just *a* solution.


    In modern development, this is vital to make sure your application is always responsive,
    even if the data it uses keeps changing in value and size: adapting to changes
    is a key factor also for applications, not just for developers.


    ## Query and data manipulation


    The language you will use to interact with data in an Azure SQL database is, as
    one could guess, *SQL* (*Structured Query Language*). SQL is a standard that is
    adopted across many relational and non-relational databases. Learning it well
    is useful both to use Azure SQL and to take advantage of many other systems like
    Apache Spark, just to name another very well-known data platform. Every database
    usually implements the ANSI/ISO SQL standard to a certain extent, with some variations
    to exploit specific features available in the platform. The implemented SQL is
    therefore called a *dialect*. For Azure SQL, the dialect is the same used for
    SQL Server: *Transact-SQL* or *T-SQL* for brevity.


    To manipulate data, all you need is a handful of commands, usually referred to
    as *DML* – *Data Manipulation Language*  – that cover all the needed functionalities:


    *   SELECT


    *   INSERT


    *   UPDATE


    *   DELETE


    *   MERGE


    As you can recognize, if you are familiar with the *CRUD – Create, Read, Update,
    Delete* – set of functions common in application development, only the first four
    SQL commands are really needed to implement CRUD operation; a fifth, `MERGE`,
    has been added so that insert, update, and delete can be done all together in
    just one command, simplifying code by leaving a lot of the details to the query
    engine and thus making it more understandable and in many cases also more performant.


    ### Retrieving data


    The `SELECT` command allows you to get a set of data back from the database. It
    requires the list of columns you want to get, the table name, and optionally,
    but almost always used, a filter to limit the returned rows to only those you
    are interested in, for example:


    ```

    SELECT

    InvoiceID,

    InvoiceDate,

    DeliveryInstructions,

    ConfirmedDeliveryTime

    FROM

    Sales.Invoices

    WHERE

    CustomerID = 998

    ORDER BY

    ConfirmedDeliveryTime;

    ```


    This query will look into `Sales.Invoices` table , return all the rows that have
    the value “998” in column `CustomerID`, and limit the results to contain only
    columns `InvoiceID`, `InvoiceDate`, `DeliveryInstructions`, and `ConfirmedDeliveryTime`.


    Even such a simple `SELECT` statement is quite interesting. First, it is worth
    noting that there is no inherent or natural order. If no `ORDER BY` is specified,
    data is returned without any specific order.


    For performance reasons, the data will likely be returned in the order Azure SQL
    accesses it, which is something that may change over time; if you rely on data
    to be in a specific order, you must specify the order by clause. Second, unless
    specified otherwise with an option called `COLLATION` , database objects are not
    case sensitive. This also applies to data within a table. It’s always possible
    to change this, but it may have performance implications: a bit more discussion
    on this will be done in the next Chapters.


    Let’s move to a more complex sample now. Let’s say that our customer 998 is browsing
    her order history to look for a specific item that she received in the first quarter
    of 2016\. By using a set of filters on a fictitious mobile app, this could be
    the T-SQL statement we need to execute:


    ```

    SELECT

    il.InvoiceLineID AS LineID,

    i.InvoiceID,

    il.[Description],

    il.Quantity,

    il.UnitPrice,

    il.UnitPrice * il.Quantity AS TotalPrice,

    i.ConfirmedDeliveryTime

    FROM

    Sales.Invoices AS i

    INNER JOIN

    Sales.InvoiceLines AS il ON i.InvoiceID = il.InvoiceID

    WHERE

    i.CustomerID = 998

    AND

    il.[Description] LIKE N''%red shirt%''

    AND

    CAST(i.ConfirmedDeliveryTime AS DATE) BETWEEN ''2016-01-01'' AND ''2016-03-31'';

    ```


    When executed in the WideWorldImporters database, the result will be the one visible
    in Figure [4-1](#493913_1_En_4_Chapter.xhtml#Fig1).


    ![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig1_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Sample SELECT result


    In the sample query just used, even if simple, there are a few notable things
    that are very common in day-to-day use.


    Caution


    Instead of specifying the columns you want to have as result, you may use the
    star character * to include all the columns in the table automatically. While
    this may be useful while executing queries to just take a look at the data or
    to do some data exploration, it is not a best practice when creating something
    that will be used by an application. Column’s order may change at any time, and
    columns may be added or removed, if someone changes the table definition. Always
    specify the column you want to be returned, so that you will have a deterministic
    result. If you don’t need all the columns, you will also avoid wasting network
    bandwidth and improve transfer speed.'
  trans: "\n# 声明式与命令式\n\nAzure SQL 允许你使用一种与你日常习惯不同的方法来创建操作数据的解决方案。如果你使用的是 `C#`、`Java`、`Python`\
    \ 或 `NodeJS`，那么你很可能习惯于遵循*命令式*范式。在命令式范式下，你会告诉系统具体如何去执行一个过程，更准确地说，是一个算法。例如，如果你有一个数字列表，并想统计其中有多少个不同的值，你可能会用循环来实现解决方案，遍历这些值，将当前值与已见过的值列表进行比较，只有当当前值不在该列表中时才将其加入。\n\
    \n相反，如果你使用*声明式*方法，你只需告诉系统你想要什么，而不是如何去做。本质上，你是以已有的数据结构为起点，描述你想要达到的结果。从概念上讲，这与设置导航系统带你从点“A”到点“B”并无太大不同。\n\
    \n因此，使用前面提到的相同例子，在 Azure SQL（以及任何关系型数据库）中，你可能会写出类似这样的语句：\n\n```sql\nSELECT DISTINCT\
    \ Number FROM Values;\n```\n\n我们将在接下来的章节中详细讨论这行代码的细节，但你已经可以凭直觉理解它在做什么。\n\n`Python`\
    \ 和 `C#` 提供了一些声明式支持。`C#` 支持语言集成查询（`LINQ`），而 `Python` 使用列表推导式，因此你可能有一些相关经验，这将极大地帮助你使用\
    \ Azure SQL。另一方面，如果你还没有这方面的经验，通过阅读本书，你将会熟悉声明式范式的 power and beauty。\n\n关系型数据库，尤其是\
    \ Azure SQL，将声明式方法的理念提升到了一个新的高度。Azure SQL 不仅会为你处理实现细节，让你可以专注于“做什么”而不是“如何实现”，而且它在处理时还会考虑大量令人印象深刻的额外因素。例如，表中有多少数据，操作这些数据需要多少内存，现有的索引是否有帮助，甚至数据在表中的分布情况。\n\
    \n想一想，现代导航系统的工作方式完全相同：它不仅允许你指定起点和目的地，还会考虑实时交通、道路封闭和其他条件，以便在给定的有限时间内尝试为你提供*最佳*解决方案，而不仅仅是*一个*解决方案。\n\
    \n在现代开发中，这对于确保你的应用程序始终保持响应至关重要，即使它使用的数据在值和大小上不断变化：适应变化不仅是开发者的关键因素，对于应用程序同样如此。\n\
    \n# 查询与数据操作\n\n正如人们可能猜测的那样，你将用来与 Azure SQL 数据库中的数据交互的语言是 *SQL*（*结构化查询语言*）。SQL\
    \ 是一个被许多关系型和非关系型数据库采纳的标准。学好它不仅对使用 Azure SQL 有用，对利用 Apache Spark 等许多其他知名数据平台也同样有益。每个数据库通常都在一定程度上实现了\
    \ `ANSI/ISO SQL` 标准，并有一些变体以利用平台特有的功能。因此，实现的 SQL 被称为一种*方言*。对于 Azure SQL，其方言与 `SQL\
    \ Server` 使用的相同：简称为 *Transact-SQL* 或 *T-SQL*。\n\n要操作数据，你只需要掌握少数几个命令，通常被称为 *DML*\
    \ – *数据操作语言* – 它们涵盖了所有所需的功能：\n\n*   `SELECT`\n*   `INSERT`\n*   `UPDATE`\n*  \
    \ `DELETE`\n*   `MERGE`\n\n如果你熟悉应用程序开发中常见的 *CRUD – 创建、读取、更新、删除* 功能集，你会发现只有前四个\
    \ SQL 命令真正用于实现 CRUD 操作；添加了第五个 `MERGE` 命令，以便在一个命令中同时完成插入、更新和删除操作，通过将大量细节留给查询引擎来简化代码，使其更易理解，并且在许多情况下也更高效。\n\
    \n## 检索数据\n\n`SELECT` 命令允许你从数据库中获取一组数据。它需要你想要获取的列的列表、表名，以及可选但几乎总是使用的过滤器，用于将返回的行限制在你感兴趣的范围内，例如：\n\
    \n```sql\nSELECT\n    InvoiceID,\n    InvoiceDate,\n    DeliveryInstructions,\n\
    \    ConfirmedDeliveryTime\nFROM\n    Sales.Invoices\nWHERE\n    CustomerID =\
    \ 998\nORDER BY\n    ConfirmedDeliveryTime;\n```\n\n这个查询将查看 `Sales.Invoices` 表，返回\
    \ `CustomerID` 列中值为 `998` 的所有行，并将结果限制为仅包含 `InvoiceID`、`InvoiceDate`、`DeliveryInstructions`\
    \ 和 `ConfirmedDeliveryTime` 列。\n\n即使这样一个简单的 `SELECT` 语句也很有趣。首先，值得注意的是，数据没有固有的或自然的顺序。如果不指定\
    \ `ORDER BY`，数据将以无特定顺序的方式返回。\n\n出于性能原因，数据很可能以 Azure SQL 访问它的顺序返回，而这种顺序可能会随时间变化；如果你依赖数据按特定顺序排列，你必须指定\
    \ `ORDER BY` 子句。其次，除非通过一个名为 `COLLATION` 的选项另行指定，否则数据库对象不区分大小写。这也适用于表中的数据。当然可以更改这一点，但可能会对性能产生影响：更多相关讨论将在后续章节中进行。\n\
    \n现在让我们看一个更复杂的例子。假设我们的客户 `998` 正在浏览她的订单历史，以寻找她在 `2016` 年第一季度收到的一个特定商品。通过在虚构的移动应用上使用一系列过滤器，这可能是我们需要执行的\
    \ `T-SQL` 语句：\n\n```sql\nSELECT\n    il.InvoiceLineID AS LineID,\n    i.InvoiceID,\n\
    \    il.[Description],\n    il.Quantity,\n    il.UnitPrice,\n    il.UnitPrice\
    \ * il.Quantity AS TotalPrice,\n    i.ConfirmedDeliveryTime\nFROM\n    Sales.Invoices\
    \ AS i\nINNER JOIN\n    Sales.InvoiceLines AS il ON i.InvoiceID = il.InvoiceID\n\
    WHERE\n    i.CustomerID = 998\n    AND\n    il.[Description] LIKE N'%red shirt%'\n\
    \    AND\n    CAST(i.ConfirmedDeliveryTime AS DATE) BETWEEN '2016-01-01' AND '2016-03-31';\n\
    ```\n\n在 `WideWorldImporters` 数据库中执行后，结果将如图 4-1 所示。\n\n![图 4-1 示例 SELECT 结果](img/493913_1_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1 示例 SELECT 结果\n\n在刚才使用的示例查询中，尽管简单，但有几个值得注意的地方在日常使用中非常常见。\n\n> **注意**\n\
    > 你可以使用星号 `*` 来自动包含表中的所有列，而不是指定你想要作为结果的列。虽然这对于仅查看数据或进行一些数据探索时执行查询可能有用，但在创建将被应用程序使用的内容时，这不是最佳实践。列的顺序随时可能改变，如果有人更改了表定义，列也可能被添加或删除。始终指定你想要返回的列，这样你才能得到确定的结果。如果你不需要所有列，你还能避免浪费网络带宽并提高传输速度。\n"
- fmt: "# SQL查询基础概念与语法\n\n## 表名称与Schema\n\n对象，如表，拥有自己的名称，例如`Invoices`表。由于同一个名称可能在不同的上下文中被使用，最佳实践是始终使用其所属的**schema**来限定对象名称。Schema是一种组织属于同一组对象的方式，例如`Sales`。所有与销售相关的对象都会被放置在同一个schema中。除了消除歧义，Schema还有助于简化管理，特别是在安全方面，因为权限可以授予schema，这将影响属于同一schema的所有对象。\n\
    \n## 别名\n\n你可以使用`AS`关键字为表名称创建别名，这样如果某个列出现在多个表中，你就可以使用别名作为列名的前缀，并明确指定从哪个表中获取该列。某些列名会频繁重复（例如`Name`、`ID`、`Description`等），因此需要一种消除歧义的方法。别名允许你做到这一点，同时也无需使用完整的表名作为列前缀。代码更少，效果更佳。\n\
    \n除了表，列也可以被**别名化**。你可能希望在返回结果时更改列名，例如`InvoiceLineID`列被返回为`LineID`。正如你可能注意到的，该列无论如何都已被其所在表的别名所限定。虽然这里并非必需（因为查询使用的表中没有其他同名列），但使用前缀也有助于快速理解列的来源。这是一种让代码更易理解、更人性化的良好实践。\n\
    \n当列本身没有名称时，则**必须**为其创建别名。例如，当结果列是通过表达式创建时，就像`TotalPrice`列那样。在示例中，表达式非常简单，但请记住，它们可以复杂得多，并对列值应用复杂的数据转换。\n\
    \n## 引号标识符\n\n对象几乎可以使用任何你喜欢的名称（当然，有一些命名规则：[`https://aka.ms/rdddi`](https://aka.ms/rdddi)），但如果你使用的名称可能与关键字冲突，只需使用方括号来确保查询引擎能理解你指的是列或表，而不是其他东西，比如系统函数。\n\
    \n## 连接\n\n示例还展示了如何从不同的表中返回值。使用`INNER JOIN`语句，我们表示：对于表`Sales.Invoices`、列`InvoiceID`中存在的每个值，我们希望获取在表`Sales.InvoiceLines`的相同列中具有相同值的所有行。发票数据被保存在两个不同的表中，以避免数据重复并更易于访问每个发票行。但由于`CustomerID`仅在`Sales.Invoices`表中可用，因此需要连接操作来返回所需数据。\n\
    \n选择将所有内容保存在较少的表中以应对数据重复的挑战，还是将数据分解到不同的表中以避免重复，然后在需要时将数据组合起来，这是一个非常重要的理解主题，属于数据库建模的定义范畴，更具体地说，是一个称为**规范化**的过程。有整本书专门讨论这个话题，以及规范化和**反**规范化的优缺点，因此你将在本章末尾找到更多参考资料。请记住，规范化过程旨在组织数据以最小化冗余。数据库中存在重复信息会带来许多不那么明显的影响和很多挑战，因此即使你使用非关系型数据库，也绝对需要理解这一点：所有的规范化概念无论如何都将适用。事实上，规范化也是一个可以在NoSQL手册中找到的概念。\n\
    \n有不同类型的连接允许你精确定义结果中必须返回哪些行。例如，假设你希望获得所有客户及其相关发票的列表，正如你可以猜到的，你有两个独立的表来保存这两组不同的数据：客户和发票。可能会发生这样的情况：你有一个新客户尚未收到任何发票。使用*内连接*，这样的客户将不会包含在我们假设的查询结果中。如果你想要*所有*客户，无论他们是否有发票，你需要使用*左连接*。如果你想要返回所有发票，即使是那些不属于任何客户的发票，你将需要使用*右连接*。术语“左”和“右”指的是表相对于`JOIN`子句的位置（图[4-2](#493913_1_En_4_Chapter.xhtml#Fig2)）。\n\
    \n![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig2_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2 连接类型\n\n**全连接**是这三种类型的总和。你将获得参与连接的两个表中的所有行。\n\n连接可以与其他连接一起使用，以便表示复杂的关系。如果我们希望扩展原始代码示例以同时返回客户数据，我们需要更改它，以便将客户、发票和发票行连接在一起：\n\
    \n```sql\nSELECT\n    c.CustomerName,\n    il.InvoiceLineID AS LineID,\n    i.InvoiceID,\n\
    \    il.[Description],\n    il.Quantity,\n    il.UnitPrice,\n    il.UnitPrice\
    \ * il.Quantity AS TotalPrice,\n    i.ConfirmedDeliveryTime\nFROM\n    Sales.Customers\
    \ AS c\nINNER JOIN\n    Sales.Invoices AS i ON i.CustomerID = c.CustomerID\nINNER\
    \ JOIN\n    Sales.InvoiceLines AS il ON i.InvoiceID = il.InvoiceID\nWHERE\n  \
    \  i.CustomerID = 998\n    AND\n    il.[Description] LIKE N'%red shirt%'\n   \
    \ AND\n    CAST(i.ConfirmedDeliveryTime AS DATE) BETWEEN '2016-01-01' AND '2016-03-31';\n\
    ```\n\n结果如下：\n\n![../images/493913_1_En_4_Chapter/493913_1_En_4_Figa_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Figa_HTML.jpg)\n\
    \n如你所见，`CustomerName`和`CustomerID`对于`Sales.Invoices`中与该客户相关的每一行都重复出现，而`Sales.Invoices`又对于与该发票相关的每个`Sales.InvoiceLine`重复出现。\n\
    \n这使你能够为应用程序的每一行提供所需的全部信息，而无需在数据库中存储重复的数据。虽然一开始这可能看起来很复杂，甚至可能适得其反，因为你本可以将所有数据保存在每行一个JSON文档中，这样甚至不需要在需要时将数据片段组合起来，但这实际上极大地帮助**简化**了事情。\n\
    \n**通过将复杂数据分解成更小的部分，你可以让每个部分与其他数据集一起使用和重用。这与代码重用的概念相同，只是应用于数据。**\n\n如前所述，将数据分解成更小片段而不丢失信息的过程称为**规范化**，它并非关系型数据库所特有。相反，它在许多不同的领域和技术中都有帮助，因为它只不过是一个帮助避免信息重复的过程，而信息重复通常带来的挑战多于其解决的问题。毫不奇怪，它在NoSQL文档甚至对象建模文档中都有提及。学习它将在从开发到数据科学的各种情况下有所帮助：你将在本章末尾找到深入探讨这些概念的若干资源。"
  raw: '#### Two-part names


    Objects, like tables, have their own names like the `Invoices` table. Since the
    same name could be used in a different context, it is a good practice, though
    not required, to always qualify the object name with the *schema* it belongs to.
    A schema is a way to organize objects that belong to the same group, for example,
    `Sales`. All objects related to Sales would be placed in the same schema. Besides
    removing any ambiguity, schemas also help to simplify management especially from
    a security perspective, as permissions can be given to schemas, and they will
    affect all objects belonging to the same schema.


    #### Aliasing


    You have the ability to *alias* the name of the tables using the `AS` keyword,
    so that if a column is present in more than one table, you can just use the *alias*
    to prefix the column name and specifically decide from which table it must be
    taken from. Some column names will repeat quite frequently (think of, for example,
    `Name`, `ID`, `Description`, and so on), so a way to eliminate ambiguity is needed.
    An alias allows you to do that, also removing the need to use the full table name
    as a column prefix. Less code, nicer results.


    Besides tables, columns can also be *aliased*. You may want to change the column
    name when returned to you, as it happens for the column `InvoiceLineID` which
    is returned as `LineID` instead. As you may have noticed, that column has been
    prefixed anyway with the alias of the table where it exists. It was not needed
    as there are no other columns with the same name in the tables used in the query,
    but prefixing also helps to quickly understand where a column is coming from.
    It is just a good practice to make the code more understandable and human-friendly.


    Columns *must be* aliased when they would not have a name at all. For example,
    when a resulting column is created from an expression, as it happens for the column
    `TotalPrice`. In the sample, the expression is really simple, but keep in mind
    that they can be much more complex and apply complex data transformations to column
    values.


    #### Quoted identifiers


    Objects may have almost any name you like (well, there are some naming rules:
    [`https://aka.ms/rdddi`](https://aka.ms/rdddi)), but if you use a name that may
    clash with a keyword, you just have to use the square brackets to make sure the
    query engine can understand that you are referring to a column or a table and
    not to something else, like a system function.


    #### Joins


    The sample also shows how you can return values from different tables. Using the
    `INNER JOIN` statement, we’re saying that for each value that exists in table
    `Sales.Invoices`, column `InvoiceID`, we want to get all the rows with the same
    value in the same column but in table `Sales.InvoiceLines`. Invoice data has been
    saved into two different tables to avoid data duplication and to create easier
    access to each invoice line, but since the `CustomerID` is available only in the
    `Sales.Invoices` table, a join operation is needed to return the desired data.


    Choosing if it is better to keep everything in fewer tables and then deal with
    data duplication challenges or if it is better to decompose data into different
    tables to avoid duplication and then have to put data together when needed is
    quite an important topic to understand and falls under the definition of database
    modeling, and more specifically, is a process called *normalization*. There are
    entire books dedicated to this discussion and what are the pros and the cons of
    normalization and *de*normalization, so you’ll find more references at the end
    of this chapter. Keep in mind that the normalization process is about organizing
    data to minimize redundancy. Having duplicated information in a database brings
    a lot of not-so-obvious effects and a lot of challenges, and therefore is absolutely
    important to understand, even if you’re using non-relational databases: all the
    normalization concepts will apply anyway. It’s not by chance, in fact, that normalization
    is a concept that you can find also in NoSQL manuals.


    There are different kinds of joins that allow you to exactly define what are the
    rows that must be returned in the results. Let’s say, for example, that you want
    to have a list of all customers with all their related invoices and, as you can
    guess, you have two separate tables to hold the two different sets of data: Customers
    and Invoices. It could happen that you have a new customer that hasn’t received
    any invoices yet. With an *inner join*, such a customer would not be included
    in the result of our hypothetical query. If you want *all* customers, no matter
    if they have an invoice or not, you need to use a *left* join. If instead you
    want to return all Invoices, even those that do not belong to any customer, you
    would have to use a *right* join. The terms left and right refer to the position
    of the table with respect to the `JOIN` clause (Figure [4-2](#493913_1_En_4_Chapter.xhtml#Fig2)).


    ![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig2_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Join types


    The *Full Join* is all the three kinds together. You’ll get rows from both the
    tables participating in the join.


    Joins can be used along with other joins, so that you can represent complex relationships.
    If we would like to expand the original code sample to return also customers’
    data, we would have to change it so that Customers, Invoices, and InvoiceLines
    would be joined together:


    ```

    SELECT

    c.CustomerName,

    il.InvoiceLineID AS LineID,

    i.InvoiceID,

    il.[Description],

    il.Quantity,

    il.UnitPrice,

    il.UnitPrice * il.Quantity AS TotalPrice,

    i.ConfirmedDeliveryTime

    FROM

    Sales.Customers AS c

    INNER JOIN

    Sales.Invoices AS i ON i.CustomerID = c.CustomerID

    INNER JOIN

    Sales.InvoiceLines AS il ON i.InvoiceID = il.InvoiceID

    WHERE

    i.CustomerID = 998

    AND

    il.[Description] LIKE N''%red shirt%''

    AND

    CAST(i.ConfirmedDeliveryTime AS DATE) BETWEEN ''2016-01-01'' AND ''2016-03-31'';

    ```


    And the result would be the following:


    ![../images/493913_1_En_4_Chapter/493913_1_En_4_Figa_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Figa_HTML.jpg)


    As you can see, the `CustomerName` and `CustomerID` are repeated for each row
    of `Sales.Invoice` related to that customer, which is in turn repeated for each
    `Sales.InvoiceLine` related to that invoice.


    This allows you to have the full set of information needed by your application
    on each line, but without having to store duplicate data in the database. While
    this may seem complex at the very beginning and maybe also counterproductive as
    you may have instead saved all the data into just one JSON document per line,
    so that you wouldn’t even need to put the pieces together when needed, it actually
    helps a lot to *simplify* things.


    *By deconstructing complex data in smaller pieces, you allow each piece to be
    used and reused together with some other set of data. It’s the same concept of
    code reuse just applied to data.*


    As mentioned before, the process of decomposing data into smaller pieces without
    losing information is called *normalization* and is not specifically tied to relational
    databases. On the contrary, it is helpful in many different areas and technologies,
    as it is nothing more than a process that helps to avoid duplication of information,
    which usually brings more challenges than what it solves. Not surprisingly, it
    is referenced both in NoSQL documentation and even Object Modeling documents.
    Learning it will be helpful in a variety of cases, which goes from development
    to data science: you’ll find several resources to dive deeper into these concepts
    and the end of this chapter.'
  trans: "\n# SQL 查询基础概念与语法\n\n## 表名称与 Schema\n\n对象，如表，拥有自己的名称，例如`Invoices`表。由于同一个名称可能在不同的上下文中被使用，最佳实践是始终使用其所属的**schema**来限定对象名称。Schema\
    \ 是一种组织属于同一组对象的方式，例如`Sales`。所有与销售相关的对象都会被放置在同一个 schema 中。除了消除歧义，Schema 还有助于简化管理，特别是在安全方面，因为权限可以授予\
    \ schema，这将影响属于同一 schema 的所有对象。\n\n## 别名\n\n你可以使用`AS`关键字为表名称创建别名，这样如果某个列出现在多个表中，你就可以使用别名作为列名的前缀，并明确指定从哪个表中获取该列。某些列名会频繁重复（例如`Name`、`ID`、`Description`等），因此需要一种消除歧义的方法。别名允许你做到这一点，同时也无需使用完整的表名作为列前缀。代码更少，效果更佳。\n\
    \n除了表，列也可以被**别名化**。你可能希望在返回结果时更改列名，例如`InvoiceLineID`列被返回为`LineID`。正如你可能注意到的，该列无论如何都已被其所在表的别名所限定。虽然这里并非必需（因为查询使用的表中没有其他同名列），但使用前缀也有助于快速理解列的来源。这是一种让代码更易理解、更人性化的良好实践。\n\
    \n当列本身没有名称时，则**必须**为其创建别名。例如，当结果列是通过表达式创建时，就像`TotalPrice`列那样。在示例中，表达式非常简单，但请记住，它们可以复杂得多，并对列值应用复杂的数据转换。\n\
    \n## 引号标识符\n\n对象几乎可以使用任何你喜欢的名称（当然，有一些命名规则：[`https://aka.ms/rdddi`](https://aka.ms/rdddi)），但如果你使用的名称可能与关键字冲突，只需使用方括号来确保查询引擎能理解你指的是列或表，而不是其他东西，比如系统函数。\n\
    \n## 连接\n\n示例还展示了如何从不同的表中返回值。使用`INNER JOIN`语句，我们表示：对于表`Sales.Invoices`、列`InvoiceID`中存在的每个值，我们希望获取在表`Sales.InvoiceLines`的相同列中具有相同值的所有行。发票数据被保存在两个不同的表中，以避免数据重复并更易于访问每个发票行。但由于`CustomerID`仅在`Sales.Invoices`表中可用，因此需要连接操作来返回所需数据。\n\
    \n选择将所有内容保存在较少的表中以应对数据重复的挑战，还是将数据分解到不同的表中以避免重复，然后在需要时将数据组合起来，这是一个非常重要的理解主题，属于数据库建模的定义范畴，更具体地说，是一个称为**规范化**的过程。有整本书专门讨论这个话题，以及规范化和**反**规范化的优缺点，因此你将在本章末尾找到更多参考资料。请记住，规范化过程旨在组织数据以最小化冗余。数据库中存在重复信息会带来许多不那么明显的影响和很多挑战，因此即使你使用非关系型数据库，也绝对需要理解这一点：所有的规范化概念无论如何都将适用。事实上，规范化也是一个可以在\
    \ NoSQL 手册中找到的概念。\n\n有不同类型的连接允许你精确定义结果中必须返回哪些行。例如，假设你希望获得所有客户及其相关发票的列表，正如你可以猜到的，你有两个独立的表来保存这两组不同的数据：客户和发票。可能会发生这样的情况：你有一个新客户尚未收到任何发票。使用*内连接*，这样的客户将不会包含在我们假设的查询结果中。如果你想要*所有*客户，无论他们是否有发票，你需要使用*左连接*。如果你想要返回所有发票，即使是那些不属于任何客户的发票，你将需要使用*右连接*。术语“左”和“右”指的是表相对于`JOIN`子句的位置（图\
    \ 4-2）。\n\n![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig2_HTML.jpg](img/493913_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2 连接类型\n\n**全连接**是这三种类型的总和。你将获得参与连接的两个表中的所有行。\n\n连接可以与其他连接一起使用，以便表示复杂的关系。如果我们希望扩展原始代码示例以同时返回客户数据，我们需要更改它，以便将客户、发票和发票行连接在一起：\n\
    \n```sql\nSELECT\n    c.CustomerName,\n    il.InvoiceLineID AS LineID,\n    i.InvoiceID,\n\
    \    il.[Description],\n    il.Quantity,\n    il.UnitPrice,\n    il.UnitPrice\
    \ * il.Quantity AS TotalPrice,\n    i.ConfirmedDeliveryTime\nFROM\n    Sales.Customers\
    \ AS c\nINNER JOIN\n    Sales.Invoices AS i ON i.CustomerID = c.CustomerID\nINNER\
    \ JOIN\n    Sales.InvoiceLines AS il ON i.InvoiceID = il.InvoiceID\nWHERE\n  \
    \  i.CustomerID = 998\n    AND\n    il.[Description] LIKE N'%red shirt%'\n   \
    \ AND\n    CAST(i.ConfirmedDeliveryTime AS DATE) BETWEEN '2016-01-01' AND '2016-03-31';\n\
    ```\n\n结果如下：\n\n![../images/493913_1_En_4_Chapter/493913_1_En_4_Figa_HTML.jpg](img/493913_1_En_4_Figa_HTML.jpg)\n\
    \n如你所见，`CustomerName`和`CustomerID`对于`Sales.Invoices`中与该客户相关的每一行都重复出现，而`Sales.Invoices`又对于与该发票相关的每个`Sales.InvoiceLine`重复出现。\n\
    \n这使你能够为应用程序的每一行提供所需的全部信息，而无需在数据库中存储重复的数据。虽然一开始这可能看起来很复杂，甚至可能适得其反，因为你本可以将所有数据保存在每行一个\
    \ JSON 文档中，这样甚至不需要在需要时将数据片段组合起来，但这实际上极大地帮助**简化**了事情。\n\n**通过将复杂数据分解成更小的部分，你可以让每个部分与其他数据集一起使用和重用。这与代码重用的概念相同，只是应用于数据。**\n\
    \n如前所述，将数据分解成更小片段而不丢失信息的过程称为**规范化**，它并非关系型数据库所特有。相反，它在许多不同的领域和技术中都有帮助，因为它只不过是一个帮助避免信息重复的过程，而信息重复通常带来的挑战多于其解决的问题。毫不奇怪，它在\
    \ NoSQL 文档甚至对象建模文档中都有提及。学习它将在从开发到数据科学的各种情况下有所帮助：你将在本章末尾找到深入探讨这些概念的若干资源。\n"
- fmt: '#### Filtering


    Quite often you’ll want to get only a few rows, or even just one, from the database.
    To filter out the rows you don’t need, the `WHERE` clause is what you must use.
    As you have seen in the sample query, the `WHERE` clause can contain one or more
    filter `predicates` that allow you to specify what are the values you are interested
    in for any column available to the query. Any column from tables specified in
    the `FROM` clause or the `JOIN` can be used.


    Values used in the `WHERE` clause can be literals, variables, sets of data coming
    from other queries, or results of a function call. This allows you to exactly
    target the data you want to work on.


    #### Subqueries


    A subquery is a query that is nested within another query. As it happens for the
    Linux shell or Windows PowerShell, where you can pipe the result of one command
    into another one to easily build complex transformations, Azure SQL allows you
    to do something conceptually similar:


    ```

    SELECT

    OrderId,

    OrderDate,

    (SELECT COUNT(*) FROM Sales.[OrderLines] AS ol

    WHERE

    ol.[OrderID] = o.OrderId) AS OrderSize

    FROM

    (SELECT * FROM Sales.[Orders] WHERE SalespersonPersonID = 2) AS o

    WHERE

    o.[CustomerID] IN

    (

    SELECT

    c.CustomerID

    FROM

    Sales.[Customers] AS c

    WHERE

    [CustomerName] = ''Daniel Martensson''

    )

    AND

    OrderDate >= ''2015-01-01''

    ORDER BY

    [o].[OrderID];

    ```


    In the preceding sample, there are three subqueries. The first one is used in
    the `FROM` clause, and it is used to limit the orders to only those generated
    by a specific salesperson. Then there is another subquery in the `WHERE` clause
    that limits the orders only to those done by a specific customer. And, finally,
    the third subquery is in the `SELECT` list, used to enrich the result with the
    count of lines in each order.


    If you already have some experience with the SQL language, you may recognize that
    the sample query could have been written also using some joins, instead of using
    the subqueries in the `FROM` and in the `WHERE` clause. The Azure SQL Query Optimizer
    is smart enough to realize that too, and usually, there are no performance differences
    if a query is written in one way or the other.


    #### Common Table Expressions


    Common Table Expressions, or CTEs for short, are an improved alternative to subqueries.
    As you may have guessed, if you have a very complex SQL statement with many subqueries,
    it becomes very hard to read.


    What happens, also, if the same subquery should be used twice in the same query?
    You’ll end up duplicating code. But, as we strive to be better developers, we
    don’t want to have any code duplication, if possible.


    CTEs are exactly what we need to organize our code so that it can be more easily
    understood and, above all, changed and maintained. A CTE is a temporary query
    definition that will exist only for the duration of the `SELECT`, `INSERT`, `UPDATE`,
    or `MERGE` statement that uses it.


    Here’s the same code showed in the subquery paragraph, rewritten so that it can
    use CTEs instead of subqueries (where it makes sense to do so):


    ```

    WITH cteOrders AS

    (

    SELECT * FROM Sales.[Orders] WHERE SalespersonPersonID = 2

    ),

    cteCustomers AS

    (

    SELECT

    c.CustomerID

    FROM

    Sales.[Customers] AS c

    WHERE

    [CustomerName] = ''Daniel Martensson''

    )

    SELECT

    OrderId,

    OrderDate,

    (SELECT COUNT(*) FROM Sales.[OrderLines] AS ol WHERE ol.[OrderID] = o.OrderId)
    AS OrderSize

    FROM

    cteOrders AS o

    INNER JOIN

    cteCustomers c ON [c].[CustomerID] = [o].[CustomerID]

    AND

    OrderDate >= ''2015-01-01''

    ORDER BY

    [o].[OrderID];

    ```


    As you can see, after the `WITH` statement, two CTEs are defined, one named `cteOrders`
    and the other one `cteCustomers`. Each time in the query where we reference one
    of those names, it would be like if we would have put a subquery there. The difference
    is that code is much easier to understand. I personally like to think of CTEs
    as a nice way to clearly define what are the sets of data I’ll need to work with
    in my main query: I can define these sets on the top, so that it will also be
    easier understanding how they operate on data, and then I can refer to them as
    much as I need and wherever I need without having to type the same code twice.


    **Remember**

    CTE lifetime is scoped to the execution of the query that has defined them. If
    you need to reuse the query encapsulated into the CTE with other queries, you
    may want to create a `VIEW` or a `FUNCTION`. More on this in the next chapters.


    CTEs can also refer to CTEs so you can create very complex queries while keeping
    code very clean and easy to read. Also, CTEs can even refer to themselves so that
    you can create recursive queries. This can become quite handy when you have to
    work with data structured in an hierarchical way, a tree, for example, and you
    want to traverse the entire tree, but you don’t know how deep the tree is, so
    you need to have some “smart” algorithm that will stop only when there is no more
    data to process, not just after a certain amount of iterations.


    A recursive CTE sample is available in accompanying code.


    #### Union


    In case you have two queries and you want to concatenate their results to return
    just one resultset to the user, you can use `UNION` statement:


    ```

    WITH cteContacts AS

    (

    SELECT

    [CustomerID],

    [PrimaryContactPersonID] AS ContactPersonId,

    ''Primary'' AS [ContactType]

    FROM

    Sales.[Customers]

    UNION

    SELECT

    [CustomerID],

    [AlternateContactPersonID],

    ''Alternate'' AS [ContactType]

    FROM

    Sales.[Customers]

    )

    SELECT

    [ContactPersonId],

    [ContactType]

    FROM

    [cteContacts] c

    WHERE

    c.CustomerId = 42

    ```


    The code will return the result of the two queries on `Sales.Customer` as a single
    result. To work without errors, the `UNION` requires that the two resultsets must
    have compatible schema.


    Keep in mind that `UNION` will also remove any duplicate values from the resulting
    resultset, so it could be quite an expensive process. If you already know in advance
    that you can’t have any duplicate values or you don’t care about duplicate values,
    then you can use `UNION ALL` instead, which is more lightweight as it doesn’t
    have to look for duplicates and remove them from the result.


    #### Semicolon


    All Azure SQL statements should be terminated by a semicolon. Though this is not
    mandatory now, it is a best practice as it’s part of the standard ANSI-SQL 92
    and it will be required in future versions. Already today, in fact, some commands
    require it to function correctly. For example, the `WITH` statement of a CTE must
    be the first statement of the line. In other words, this means that the previous
    command *must be* terminated by a semicolon.


    #### Unicode strings


    You may have noticed that the string `N''%red shirt%''` is prefixed with a capital
    N. This prefix tells Azure SQL that string is a Unicode string.'
