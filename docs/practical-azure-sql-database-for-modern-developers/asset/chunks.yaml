    USE AdventureWorks2012;

    GO

    IF EXISTS (SELECT name FROM sys.objects

    WHERE name = N''SaveTranExample'')

    DROP PROCEDURE SaveTranExample;

    GO

    CREATE PROCEDURE SaveTranExample

    @InputCandidateID INT

    AS

    -- Detect whether the procedure was called

    -- from an active transaction and save

    -- that for later use.

    -- In the procedure, @TranCounter = 0

    -- means there was no active transaction

    -- and the procedure started one.

    -- @TranCounter > 0 means an active

    -- transaction was started before the

    -- procedure was called.

    DECLARE @TranCounter INT;

    SET @TranCounter = @@TRANCOUNT;

    IF @TranCounter > 0

    -- Procedure called when there is

    -- an active transaction.

    -- Create a savepoint to be able

    -- to roll back only the work done

    -- in the procedure if there is an

    -- error.

    SAVE TRANSACTION ProcedureSave;

    ELSE

    -- Procedure must start its own

    -- transaction.

    BEGIN TRANSACTION;

    -- Modify database.

    BEGIN TRY

    DELETE HumanResources.JobCandidate

    WHERE JobCandidateID = @InputCandidateID;

    -- Get here if no errors; must commit

    -- any transaction started in the

    -- procedure, but not commit a transaction

    -- started before the transaction was called.

    IF @TranCounter = 0

    -- @TranCounter = 0 means no transaction was

    -- started before the procedure was called.

    -- The procedure must commit the transaction

    -- it started.

    COMMIT TRANSACTION;

    END TRY

    BEGIN CATCH

    -- An error occurred; must determine

    -- which type of rollback will roll

    -- back only the work done in the

    -- procedure.

    IF @TranCounter = 0

    -- Transaction started in procedure.

    -- Roll back complete transaction.

    ROLLBACK TRANSACTION;

    ELSE

    -- Transaction started before procedure

    -- called, do not roll back modifications

    -- made before the procedure was called.

    IF XACT_STATE()  -1

    -- If the transaction is still valid, just

    -- roll back to the savepoint set at the

    -- start of the stored procedure.

    ROLLBACK TRANSACTION ProcedureSave;

    -- If the transaction is uncommittable, a

    -- rollback to the savepoint is not allowed

    -- because the savepoint rollback writes to

    -- the log. Just return to the caller, which

    -- should roll back the outer transaction.

    -- After the appropriate rollback, echo error

    -- information to the caller.

    DECLARE @ErrorMessage NVARCHAR(4000);

    DECLARE @ErrorSeverity INT;

    DECLARE @ErrorState INT;

    SELECT @ErrorMessage = ERROR_MESSAGE();

    SELECT @ErrorSeverity = ERROR_SEVERITY();

    SELECT @ErrorState = ERROR_STATE();

    RAISERROR (@ErrorMessage, -- Message text.

    @ErrorSeverity, -- Severity.

    @ErrorState -- State.

    );

    END CATCH

    GO

    Listing 7-2

    Example of using transactions in a T-SQL script

    ```


    The logic here is checking if an existing transaction already exists before modifying
    the database. If that is the case, then it first creates a savepoint, and if the
    data modification fails, it rolls back only to that savepoint without involving
    any previous activities executed in the outer transaction.


    Not all database drivers provide direct control over transaction names or savepoints:
    for example, *pyodbc* doesn’t provide methods to invoke beginning of a transaction
    (with or without name) or savepoint, but you can always access these functionalities
    by simply executing the equivalent T-SQL statements.


    In other languages like C# and .NET Core, you can instead control all aspects
    of your transactional logic, as demonstrated by the following example.


    ```

    using (SqlConnection connection = new SqlConnection(connectionString))

    {

    connection.Open();

    SqlCommand command = connection.CreateCommand();

    SqlTransaction transaction;

    // Start a local transaction.

    transaction = connection.BeginTransaction("SampleTransaction");

    // Must assign both transaction object and connection

    // to Command object for a pending local transaction

    command.Connection = connection;

    command.Transaction = transaction;

    try

    {

    command.CommandText =

    "Insert into Region (RegionID, RegionDescription) VALUES (100, ''Description'')";

    command.ExecuteNonQuery();

    transaction.Save("FirstRegionInserted");

    command.CommandText =

    "Insert into Region (RegionID, RegionDescription) VALUES (101, ''Description'')";

    command.ExecuteNonQuery();

    // Rollback to a savepoint

    transaction.Rollback("FirstRegionInserted");

    // Only first insert will be considered

    // Attempt to commit the transaction.

    transaction.Commit();

    Console.WriteLine("Only first insert is written to database.");

    }

    catch (Exception ex)

    {

    Console.WriteLine("Commit Exception Type: {0}", ex.GetType());

    Console.WriteLine("  Message: {0}", ex.Message);

    // Attempt to roll back the transaction.

    try

    {

    transaction.Rollback("SampleTransaction");

    }

    catch (Exception ex2)

    {

    // This catch block will handle any errors that may have occurred

    // on the server that would cause the rollback to fail, such as

    // a closed connection.

    Console.WriteLine("Rollback Exception Type: {0}", ex2.GetType());

    Console.WriteLine("  Message: {0}", ex2.Message);

    }

    }

    }

