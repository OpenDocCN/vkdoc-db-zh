- fmt: '### Azure DevOps


    Azure DevOps is a full-featured suite of products that can support a team in all
    DevOps aspects. It includes a git-compatible code repository, a pipeline to build
    and release the generated solution, a set of test tools to automate tests, an
    artifact store to locally and manage packages, and an agile planning and issue
    tracking system to make sure that work can be properly tracked, assigned, and
    monitored.


    If you’re working on a new project and the team is small, Azure DevOps can be
    a great choice as the first five users are free.


    After you have pushed your code into the Azure DevOps source code repository,
    you can instruct the build pipeline to deploy the Azure SQL code into a specified
    Azure SQL database as part of your deployment.


    A pipeline can use different `Tasks` to define the steps that will be executed
    when the code is pushed into the repository. The `Azure SQL Database deployment`
    task is the one that can be used to deploy a provided T-SQL script to a target
    Azure SQL database.


    ![../images/493913_1_En_11_Chapter/493913_1_En_11_Figb_HTML.jpg](images/493913_1_En_11_Chapter/493913_1_En_11_Figb_HTML.jpg)


    ## Database migrations


    Now that you know where you can create your CI/CD pipeline, it’s time to start
    to figure out how a database can be part of that pipeline too. The main challenge
    is that you have to deal with the fact that when you want to deploy the changes
    in an existing database, you may need to preserve the existing data already stored
    in the database. If that database is a production database, usually the “may”
    becomes a “must.” All challenges start from this pivotal aspect of the database
    and are true for any database, relational or not. Extending the schema by adding
    a new column is easy and doesn’t come with any particular complexity usually.
    The challenges arise when you need to change the schema used by existing data.
    And this challenge is always true no matter if you are using a schema-on-read
    or schema-on-write approach. With a schema-on-write, you need to make changes
    to the database so that all existing data will be updated to adapt to the new
    schema. With a schema-on-read, for example, if you are storing data into JSON
    documents, you may be able to reduce drastically the complexity of the operations
    needed to be done on the database, but you’ll be moving that complexity into the
    application logic, which would need to be able to deal with different versions
    of the schema.


    There is no such thing as a Schemaless solution. Martin Fowler cleared out this
    concept once and for all in his *Implicit Schemas* presentation, available to
    everyone for free online: [`www.martinfowler.com/articles/schemaless/`](http://www.martinfowler.com/articles/schemaless/).
    He introduced the concept of Implicit Schemas, which is the correct way to name
    what is known as Schemaless. Schemaless remains as a colloquial term, as it is
    so widespread, but to allow something to be manipulated, a schema must exist.
    And unless there are specific reasons to avoid that, an explicit schema is preferable.


    Practically speaking, the challenge of dealing with database changes into a CI/CD
    pipeline is that usually you have a source database that has the evolved schema
    that your updated application is using, and you have the target database that
    has an existing schema that needs to be updated to become the new one. The problem
    is how can you create the T-SQL scripts that will bring the target database from
    the existing schema to the new one? And, aside from how, who will do that? And
    if the target database is not empty, what will be the performance implication
    of executing that update operation? Also, how can we be sure that data will be
    correctly preserved if something goes wrong? Yes, you always have transactions
    that can be rolled back, and in the worst case, you have a database backup available
    in Azure SQL for you, so at least on that side you are covered. But restoring
    a database may involve minutes or hours, and staying offline for that much time
    may not be an option you have.


    To solve this challenge, it’s better to split it into two parts, and let’s do
    the same also with the CI/CD pipeline. It is very helpful to create two pipelines
    to target two different use cases.


    ### Synthetic environment


    The first pipeline will be used to make sure all changes applied to the database
    will be tested in a `synthetic environment`: an environment where the database
    is created from scratch every time, and the data contained in such database is
    a well-known set of data that represent the data we expect we’ll have to manage,
    plus all the data that may create unexpected and undesired condition that we have
    learned over time we must deal with. For example, you may not expect to have a
    negative number as a result of a Stored Procedure that calculates updated products
    costs, but this happens if the input data, read from several different tables,
    has certain specific values. Along with the regular, correct data you expect to
    have in your database, you should make sure that the dataset that generates such
    a condition is present in this synthetic environment database, so you can correctly
    verify that such a situation is correctly handled over time.


    These values, the correct ones plus the issue-related ones, will grow over time,
    as you should add new data to this set as soon as you receive feedback and issues
    from testers or users. By doing so, you will have a valuable reference dataset
    that will grow over time and that will be extremely helpful to keep your solution
    free of regression bugs and issues.


    The following steps will be part of this pipeline:

    *   Create a new database.

    *   Deploy the schema and objects.

    *   Load the reference dataset.

    *   Run the tests.


    ### Integration environment


    If all the tests in the synthetic environment are executed successfully and without
    errors, you can then start the execution of a more complex pipeline. Now that
    you know your changes produce the desired results, you need to make sure that
    you can safely deploy them against a production database. The main goal here is
    to make sure that the scripts that will be used to update the existing schema
    and data to the new one are correct and run with the desired time.


    This means that a copy of the production database is needed. For security reasons,
    you might not have access to it as it may contain sensitive data. You have two
    options to solve this new challenge. You can ask to have a production copy of
    the database with `obfuscated data`, so that any personal identifiable information
    or high-security data is stripped away, or if you work in a highly secured environment,
    you just need an empty production database that can be filled with mocked data.
    There are several tools that can generate mock, but realistic data. There are
    also libraries for Python, Node, and .NET in case you really need to create something
    very custom:

    *   `Faker` is available both for .NET and Python (and PHP, Perl, and Ruby if
    you really want to use some exotic languages).

    *   `Mimesis` is a Python Library.

    *   `MockNeat` for Java.

    *   `Faker.js` for Node.

    *   `Bogus` is a Faker.js port to .NET.


    Once you have this reference database, you need to decide how you will update
    the existing database so that it will have the new schema, objects, and – if needed
    – data. This is a quite broad topic, so we’ll discuss it in depth in the next
    section. Despite how you will choose to generate and apply the changes to the
    target database, your CI/CD pipeline for this integration environment will look
    like the following:

    *   Restore the reference database.

    *   Generate the T-SQL code needed to migrate the reference database to the target
    schema and update the existing objects while preserving existing data.

    *   Run the generated script.

    *   Run tests to verify results.'
