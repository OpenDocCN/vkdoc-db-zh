    JDBC drivers loaded in the application, and the *jdbc:sqlserver* prefix in the
    connection string is indicating what specific driver to use. *Connection*, *Statement*,
    and *resultset* are again the main classes used to encapsulate underlying connection
    management, command execution, and resultset iteration. These three classes will
    be the foundation for most of your database interactions.


    Python is a language that gained a lot of traction over the years for writing
    data access and management applications. Let’s see how to use it to connect to
    an Azure SQL database instance.


