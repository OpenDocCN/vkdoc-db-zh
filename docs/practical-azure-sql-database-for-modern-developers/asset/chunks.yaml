- fmt: "### MicroORMs\n\n对于那些不需要完整ORM库复杂性的场景，近年来出现了一类简化的工具，通常被称为MicroORMs。其中最成功的可能是StackExchange的Dapper（[`https://aka.ms/ghsaed`](https://aka.ms/ghsaed)）。基本上，Dapper提供了一种基于SQL查询快速高效地物化对象的方法，对于不需要跟踪断开连接的更改或将对象完整持久化到数据库的应用场景来说，这是一个很好的解决方案。Dapper扩展现有的`IDbConnection`接口（在各种ADO.NET数据提供程序中可用），并提供辅助方法来执行T-SQL查询并将结果映射到POCO对象集合，或以高性能的方式执行修改数据库状态的命令。以下示例展示了如何使用Dapper检索结果集。\n\
    \n```\nclass Program\n{\n    static void Main(string[] args)\n    {\n        using\
    \ (SqlConnection cnn = \n            new SqlConnection(\n                \"Server=tcp:.database.windows.net,\"\
    +\n                \"1433;Initial Catalog=WideWorldImporters-Full;\"+\n      \
    \          \"User ID=;Password=;\"))\n        {\n            var orders = cnn.Query(\"\
    SELECT TOP 10 OrderID, OrderDate, CustomerID FROM Sales.Orders;\");\n        \
    \    foreach (var o in orders)\n            {\n                Console.WriteLine(\"\
    OrderId: {0} - OrderDate: {1} - CustomerId: {2}\",o.OrderID,o.OrderDate,o.CustomerID);\n\
    \            }\n        }\n    }\n}\nclass Order\n{\n    public int OrderID {get;set;}\n\
    \    public DateTime OrderDate {get;set;}\n    public int CustomerID {get;set;}\n\
    }\n```\n\n清单 3-10\n在C#应用程序中使用Dapper\n\n此示例展示了像Dapper这样的MicroORM如何在底层的`SqlConnection`、`SqlCommand`和`SqlDataReader`类与更复杂但功能更强大的解决方案（如Hibernate或Entity\
    \ Framework）之间取得良好平衡。\n\n## 使用只读副本\n\nAzure SQL高级层、业务关键层和超大规模层数据库实例的一个好处是，作为其高可用性架构的一部分，会部署多个辅助副本，并通过底层基础设施以最小延迟与主副本保持同步。默认情况下在高级层和业务关键层启用的*Read\
    \ Scale-Out*功能，使您能够针对其中一个辅助副本运行只读工作负载，而不会影响主读写副本的性能，且无需额外成本。\n\n从数据访问的角度来看，这非常易于使用，因为它只需要在连接字符串中添加`ApplicationIntent=ReadOnly;`属性，该连接的所有流量将自动重定向到数据库的只读副本。超大规模性能层也提供了此功能，但您必须显式为数据库创建至少一个辅助副本才能利用它。\n\
    \n您的应用程序可以通过检查命令`SELECT DATABASEPROPERTYEX(DB_NAME(), 'Updateability')`是否确实返回`READ_ONLY`结果来确保它连接到只读副本。值得记住的是，虽然只读副本处于事务一致的状态，但在极少数情况下，与主副本中的数据相比可能会有一些小的延迟。此外，在撰写本文时，某些功能如查询存储、扩展事件和审核在只读副本上尚不支持，尽管可以使用传统的DMV进行监控，如`sys.dm_db_resource_stats`、`sys.dm_exec_query_stats`、`sys.dm_exec_query_plan`和`sys.dm_exec_sql_text`，这些方法可以按预期工作。有关此有趣功能的更多详细信息，请参阅官方文档：[`https://aka.ms/sqrso`](https://aka.ms/sqrso)。\n\
    \n## 延伸阅读\n\n本章为您全面介绍了如何使用传统驱动程序和更先进的数据访问框架，从各种传统和现代编程语言连接到Azure SQL数据库实例。它提供了一些最佳实践，关于如何有效地提高连接可靠性，并使您的应用程序在基于云的环境中设计和实现分布式系统时，能够更好地应对可能发生的瞬态连接问题。要深入了解其中一些主题，我们建议查看以下链接：\n\
    \n*   快速入门：Azure SQL数据库连接和查询 – [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connect-query`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connect-query)\n\
    *   Azure SQL瞬态错误 – [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connectivity-issues`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connectivity-issues)\n\
    *   Dapper.NET – [`https://medium.com/dapper-net`](https://medium.com/dapper-net)\n\
    *   如何使用批处理提高SQL数据库应用程序性能 – [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-use-batching-to-improve-performance`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-use-batching-to-improve-performance)"
  raw: '### MicroORMs


    For those scenarios where you don’t need the complexity of a full ORM library,
    a new class of simplified tools emerged over the last years, and they’re usually
    referred as MicroORMs . One of the most successful is probably Dapper from StackExchange
    ([`https://aka.ms/ghsaed`](https://aka.ms/ghsaed)). Basically, Dapper provides
    a fast and efficient way of materializing objects based on a SQL query, and it’s
    a great solution for application scenarios where you don’t necessarily need to
    track disconnected changes and manage full persistence for your objects into the
    database. Dapper extends existing *IDbConnection* interface (as available in various
    ADO.NET Data Providers) and provides helper methods to execute T-SQL queries and
    map results to collections of POCO objects or execute commands that modify database
    state in a performant manner. The following example shows how to use Dapper to
    retrieve a resultset.


    ```

    class Program

    {

    static void Main(string[] args)

    {

    using (SqlConnection cnn =

    new SqlConnection(

    "Server=tcp:.database.windows.net,"+

    "1433;Initial Catalog=WideWorldImporters-Full;"+

    "User ID=;Password=;"))

    {

    var orders = cnn.Query("SELECT TOP 10 OrderID, OrderDate, CustomerID FROM Sales.Orders;");

    foreach (var o in orders)

    {

    Console.WriteLine("OrderId: {0} - OrderDate: {1} - CustomerId: {2}",o.OrderID,o.OrderDate,o.CustomerID);

    }

    }

    }

    }

    class Order

    {

    public int OrderID {get;set;}

    public DateTime OrderDate {get;set;}

    public int CustomerID {get;set;}

    }

    Listing 3-10

    Using Dapper in a C# application

    ```


    This example shows how MicroORMs like Dapper can be a good compromise between
    using base *SqlConnection*, *SqlCommand*, and *SqlDataReader* classes and a more
    sophisticated, but complex, solution like Hibernate or Entity Framework for your
    data access layers.


    ## Using read-only replicas


    One benefit provided by Azure SQL Premium, Business Critical, and Hyperscale database
    instances is that, as part of their high-availability architecture, several secondary
    replicas are deployed and are maintained in sync with primary replica at minimal
    latency by the underlying infrastructures. *Read Scale-Out* feature, by default
    enabled on Premium and Business Critical tiers, gives you the ability to run read-only
    workload against one of these secondary replicas without impacting performance
    of your primary, read-write, replica at no extra cost.


    From a data access perspective, this is extremely easy to use as it only requires
    you to add the `ApplicationIntent=ReadOnly;` attribute to your connection string,
    and all traffic for that connection will be automatically redirected to a read-only
    replica of the database. Hyperscale performance tier also provides such capability,
    but you have to explicitly create at least one secondary replica for your database
    in order to be able to benefit from it.


    Your application can make sure it’s connected to a read-only replica by checking
    that this command `SELECT DATABASEPROPERTYEX(DB_NAME(), ''Updateability'')` effectively
    returns `READ_ONLY` as result. It''s worth remembering that, while read-only replicas
    are in a transactionally consistent state, in some rare cases there may be some
    small latency compared to data in the primary replica. Also, at the time of writing
    these notes, certain features like Query Store, Extended Events, and Audit are
    not yet supported on read-only replicas, although there are ways of monitoring
    them using traditional DMVs like *sys.dm_db_resource_stats* or *sys.dm_exec_query_stats*,
    *sys.dm_exec_query_plan*, and *sys.dm_exec_sql_text* that work as expected. For
    additional details on this interesting feature, please refer to the official documentation
    at [`https://aka.ms/sqrso`](https://aka.ms/sqrso).


    ## If you want to know more


    This chapter provided you with a comprehensive overview on how to connect to Azure
    SQL database instances from a variety of traditional and modern programming languages
    using conventional drivers and more advanced data access frameworks. It provided
    some best practices on how to effectively increase connection reliability and
    make your application more resilient to transient connectivity issues that may
    happen when you design and implement distributed systems in cloud-based environments.
    To dig deeper into some of these topics, we recommend to take a look at these
    links:


    *   Quickstarts: Azure SQL Database connect and query – [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connect-query`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connect-query)


    *   Azure SQL Transient Errors – [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connectivity-issues`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connectivity-issues)


    *   Dapper.NET – [`https://medium.com/dapper-net`](https://medium.com/dapper-net)


    *   How to use batching to improve SQL Database application performance – [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-use-batching-to-improve-performance`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-use-batching-to-improve-performance)'
