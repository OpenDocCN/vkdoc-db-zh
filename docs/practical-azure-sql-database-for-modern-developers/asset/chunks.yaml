- fmt: '# 10. Monitoring and Debugging


    Azure SQL and its underlying SQL Server query engine are well known in the industry
    for the low administrative barrier generally required for applications to get
    good performance and reliability on most conditions with different data sizes
    and shapes.


    That said, it is important for application developers to understand the foundations
    and internals of how query processing works in Azure SQL and what tools and capabilities
    are available to monitor and troubleshoot performance on both development and
    production phases. Generally speaking, there are two major scenarios where these
    capabilities are important for us to master:


    1.  Understanding how the system is behaving under a given workload: this means
    looking at major performance and availability metrics during your load test or
    production periods to make sure the system is up and running and can cope with
    a given workload.


    2.  Investigate deeply into specific activities that may happen, or have happened,
    if results of the previous point are showing some critical behaviors.


    The former is a continuous, long-term, monitoring scenario that is crucial to
    make sure your solution will “keep the lights on” and usually requires specific
    characteristics, like the ability to store and analyze vast amounts of data points
    and trigger some alerts when key metrics are crossing certain thresholds. On the
    Azure platform, there is a common backbone across all services to collect diagnostic
    information emitted by all components of a given solution, called Azure Monitor.
    All services can be configured to asynchronously emit logs and metrics to Azure
    Monitor, which can then redirect these to both near real-time (through visualizing
    metrics in Azure Portal or pushing data into an Azure Event Hub instance for further
    processing and alerting) and more long-term analytical options (like Azure Blob
    Storage or Log Analytics), depending on your needs.


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figa_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figa_HTML.jpg)


    You can get more details on this specific scenario by looking at official documentation
    at this link: [`https://aka.ms/asdbmto`](https://aka.ms/asdbmto).


    The other major scenario is instead related to immediate diagnostic and troubleshooting
    investigations that you can execute, while a specific issue is happening, thanks
    to the extensive instrumentation capabilities exposed by the Azure SQL engine.
    Every single internal subsystem of the service, from connection and session management
    down to query processing and storage engine, is in fact emitting a rich and detailed
    set of diagnostic information that we, as developer, can take advantage of to
    understand how a single query is executed or how subsystems like memory management
    or resource governance are behaving.


    As developers, we don’t necessarily need to understand every single aspect of
    how the internals of the service are working, but it is quite important to know
    the basic tools and techniques available to make sure we can investigate how our
    queries and workloads are performing and how we can make our applications more
    efficient when working with Azure SQL.


    ## Dynamic Management Views (DMVs)


    Dynamic management views (and functions) are a way to execute T-SQL queries against
    an Azure SQL endpoint and return state information that can be used to monitor
    the health of an Azure SQL server or database instance, diagnose problems, and
    tune performance.


    As mentioned, the SQL Server engine is highly instrumented and captures tons of
    information on how various subsystems are working, from the integration with the
    underlying operating system and hardware up to how queries are executed. All these
    details are maintained in memory structures within the database process space
    (we’ll talk about how things evolved recently with Query Store later in this chapter)
    and are front-ended by a layer of system views and functions that can be queried
    by regular T-SQL commands, from a connection opened by a login that has `SELECT`
    permission on the selected DMV and `VIEW SERVER STATE` (for Azure SQL Managed
    Instance) or `VIEW DATABASE STATE` (for Azure SQL Database) permission. We can
    grant access to a given instance by executing this command:


    ```

    GRANT VIEW DATABASE STATE TO database_user;

    ```


    Azure SQL enables a subset of dynamic management views to diagnose performance
    problems, which might be caused by blocked or long-running queries, resource bottlenecks,
    poor query plans, and so on. In an instance of SQL Server and in Azure SQL Managed
    Instance, dynamic management views return server state information. In Azure SQL
    Database, they return information regarding your current logical database only.


    While hundreds of these views and functions are available, there are really three
    main categories we should focus on:


    *   Database-related dynamic management views (prefixed by `sys.dm_db_*`)


    *   Execution-related dynamic management views (prefixed by `sys.dm_exec_*`)


    *   Transaction-related dynamic management views (prefixed by `sys.dm_tran_*`)


    Let’s start from a few basic use cases that can be common while you’re investigating
    what’s going on with your database instance. First, you may want to understand
    what’s current resource utilization on a given instance where you’re running your
    application against. You can open your client tool of preference (e.g., Azure
    Data Studio or SQL Server Management Studio) pointing to your database and execute
    this query:


    ```

    SELECT * FROM sys.dm_db_resource_stats ORDER BY end_time DESC;

    ```


    The result you’ll get back will be something similar to this:


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figb_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figb_HTML.jpg)


    Basically, this view is returning key metrics around resource consumption for
    your database instance for the last hour, with a granularity of 15 seconds. If
    any of these metrics is getting closer to 100%, you usually have the choice of
    scaling up your database service or compute tier or, more likely, drilling deeper
    into resource utilization to understand if there are ways to make your workload
    more efficient.


    Let’s say, as an example, that you’re maxing out on CPU utilization: a good next
    step would be to look at what are the top CPU-consuming queries to understand
    if there are ways to improve them in any way.


    For demonstration purposes, we will clear up the procedure cache of our test instance
    to not be distracted by potentially 100s of other queries that may have ran in
    the past and will use this script to execute a simple query:


    ```

    --!!! Test purposes only, don’t do it in production!!!--

    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;

    -- Execute a simple query

    SELECT * FROM [Sales].[Orders] WHERE CustomerID=832

    ```


    On the same connection, or on a different one, we can now run the following diagnostic
    query targeting few `sys.dm_exec_*` DMVs:'
