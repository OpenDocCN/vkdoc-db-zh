    T-SQL function to convert the textual value in parsed JSON text to SQL value.


    *   Optional JSON path that will be used to reference the property in the JSON
    object that contains the value that should be returned. If this path is not specified,
    the name of the column will be used to reference the property. As an example,
    if the column name is `severity` and the JSON path is not specified, then `OPENJSON`
    will try to find a value on the `$.severity` path.


    *   Optional `AS JSON` clause. By default, `OPENJSON` will use `JSON_VALUE` function
    to get the value from the object that is currently converted. Therefore, it cannot
    return sub-objects or sub-arrays. If there is a JSON object or array on that path,
    it will not be returned unless you specify the `AS JSON` clause.


    The result of the `OPENJSON` function will be a resultset that can be inserted
    into the table.


    ## Graph structures


    Graphs are complex structures with objects (nodes) that are connected with relationships
    (edges). Scenarios where you would use graphs might be:


    *   Social networks where you have people connected with relationships like friends,
    family, partners, or co-workers


    *   Transportation maps where you have towns and places connected with roads,
    rivers, and flight lines


    *   Bill-Of-Materials solutions where you have parts connected to other parts
    that are themselves connected to other parts and so on


    The graph structures might be represented as tables and foreign keys relationships
    in some scenarios. The key reason why you would choose graph model instead of
    relational model is when you are working on a project where relationships are
    dominant and there are a small number of entities connected to each other in many
    different, direct, and indirect ways. In fact, the key difference in that domain
    is the transitive nature of the relationship. The term transitive is hereby used
    for its mathematical meaning: if `a` is connected to `b` and if `b` is connected
    to `c`, then `a` is connected to `c`. In these cases, you would not be interested
    only in a single-hop relationship (like fetching order lines for an order via
    foreign key relationship), but in all the hops needed to move from one node to
    another. To do that efficiently, you would like to leverage graph-specific semantics
    for query processing. Examples might be abilities to find the transitive closure
    (is `a` connected to `z`?), to find a shortest path between two objects or recursively
    traverse across all relationships starting with a specified object.


    In Azure SQL, nodes and edges are represented using special tables. You may be
    wondering why using relational tables has been the chosen implementation to represent
    graph elements and if that is a good idea at all.


    First, it is very common to have some information tied to nodes and edges, and
    tables are a perfect structure to hold that information. A second benefit of using
    tables is that the Azure SQL query optimizer can be leveraged to improve overall
    query performance. The third benefit of this choice is that, as they are just
    tables, columnstore and indexes can be used to improve performance even further.


    As an example, let’s look at the simple structure that models Airports and the
    Flight lines that represent connection between them. This domain might be modeled
    using the following structure:


    ```

    CREATE TABLE Airport (

    AirportID int PRIMARY KEY,

    Name NVARCHAR(100),

    CityID int FOREIGN KEY REFERENCES Application.Cities(CityID)

    ) AS NODE

    GO

    CREATE TABLE Flightline (

    Name NVARCHAR(10)

    ) AS EDGE;

    ```


    Airport is a node of the graph, but it behaves as a regular table. We can add
    any column, index, or constraint to describe information in this node. This is
    another example of how Azure SQL multi-model capabilities enable you to combine
    advanced battle-tested database features in the new scenarios. Node table has
    a hidden column that represents a unique identifier of the node that would be
    explained later.


    `Flightline` is an edge table that links two `Airport` tables. The columns in
    this table represent additional information that describe the relationship between
    two nodes. Edge table shown in this example is a generic edge, and there is no
    specification that it is designed to connect two `Airports` and not some other
    nodes. In order to explicitly specify that `Flightline` connects `Airport` , we
    need to introduce the following edge constraint:


    ```

    ALTER TABLE Flightline

    ADD CONSTRAINT [Connecting airports]

    CONNECTION (Airport TO Airport)

    ON DELETE CASCADE;

    ```


    This constraint specifies that you cannot use `Flightline` edge to connect nodes
    other than `Airport`. This constraint also defines what would happen with the
    edge if the node is deleted.'
  trans: '

    ### 导入 JSON 文档


    现代服务以 JSON 格式发送数据，在许多情况下，你需要将这些 JSON 值存储在 Azure SQL 表中。Azure SQL 提供了 `OPENJSON`
    表值函数，该函数接受一个包含 JSON 文本的文本参数，对其进行解析，并以表格格式返回 JSON 文档中的值。如果你想通过将对象数组作为参数传递给存储过程来导入它们，可以使用类似以下的代码将传入的
    JSON 消息插入到表中：


    ```sql

    CREATE OR ALTER PROCEDURE InsertDeviceLog (@msg nvarchar(max))

    AS

    INSERT INTO WebApi.Logs(logDate, severity, log)

    SELECT *

    FROM OPENJSON(@msg)

    WITH (

    logDate datetime2 ''$.properties.DeviceTime'',

    severity tinyint ''$.properties.severity'',

    log nvarchar(max) ''$.info'' AS JSON

    );

    GO

    ```


    `OPENJSON` 函数的第一个参数是一个包含要解析的 JSON 数组的文本。该函数期望接收一个 JSON 对象数组，其中每个对象将被转换为结果集中的一行。如果要转换的数组位于文档中的某个位置，你可以提供第二个参数，该参数表示一个
    JSON 路径，`OPENJSON` 函数应在此路径下找到要转换为结果集的对象数组。引用数组中的每个对象都将成为返回结果集中的一个对象。


    `WITH` 子句用于定义输出模式，并将 JSON 数组中对象的属性映射到输出列。此部分将包含每个输出列的一个条目，其中包含以下信息：


    *   输出列的名称。如果未提供可选的 JSON 路径，则此名称也用作应在此列中作为结果值返回的 JSON 属性的键。

    *   输出列的 SQL 类型。`OPENJSON` 将使用 `CONVERT` T-SQL 函数的语义，将解析后的 JSON 文本中的文本值转换为 SQL
    值。

    *   可选的 JSON 路径，用于引用 JSON 对象中包含要返回的值的属性。如果未指定此路径，则将使用列名来引用属性。例如，如果列名为 `severity`
    且未指定 JSON 路径，则 `OPENJSON` 将尝试在 `$.severity` 路径上查找值。

    *   可选的 `AS JSON` 子句。默认情况下，`OPENJSON` 将使用 `JSON_VALUE` 函数从当前正在转换的对象中获取值。因此，它无法返回子对象或子数组。如果该路径上存在
    JSON 对象或数组，则除非你指定 `AS JSON` 子句，否则不会返回。


    `OPENJSON` 函数的结果将是一个可以插入到表中的结果集。


    ## 图结构


    图是复杂的结构，包含通过关系（边）连接的对象（节点）。你可能会使用图的场景包括：


    *   社交网络，其中人员通过朋友、家人、合作伙伴或同事等关系连接

    *   交通地图，其中城镇和地点通过道路、河流和航线连接

    *   物料清单解决方案，其中部件连接到其他部件，而这些部件又连接到其他部件，依此类推


    在某些场景下，图结构可以表示为表和外键关系。你选择图模型而非关系模型的关键原因在于，当你正在处理一个关系占主导地位，并且少量实体以多种不同、直接和间接方式相互连接的项目时。实际上，在该领域中的关键区别是关系的传递性。此处使用的“传递”一词取其数学含义：如果
    `a` 连接到 `b`，并且 `b` 连接到 `c`，那么 `a` 就连接到 `c`。在这些情况下，你不仅对单跳关系（例如通过外键关系为订单获取订单行）感兴趣，而且对从一个节点移动到另一个节点所需的所有跳跃都感兴趣。为了有效地做到这一点，你需要利用图特有的查询处理语义。例子包括查找传递闭包（`a`
    是否连接到 `z`？）、查找两个对象之间的最短路径，或从指定对象开始递归遍历所有关系。


    在 Azure SQL 中，节点和边使用特殊的表来表示。你可能会好奇为什么选择关系表来实现表示图元素，以及这是否是一个好主意。


    首先，将信息绑定到节点和边是很常见的，而表是保存这些信息的完美结构。使用表的第二个好处是，可以利用 Azure SQL 查询优化器来提高整体查询性能。这一选择的第三个好处是，由于它们只是表，因此可以使用列存储索引和索引来进一步提高性能。


    例如，让我们看一下模拟机场以及代表它们之间连接的航线的简单结构。这个领域可以使用以下结构建模：


    ```sql

    CREATE TABLE Airport (

    AirportID int PRIMARY KEY,

    Name NVARCHAR(100),

    CityID int FOREIGN KEY REFERENCES Application.Cities(CityID)

    ) AS NODE

    GO

    CREATE TABLE Flightline (

    Name NVARCHAR(10)

    ) AS EDGE;

    ```


    `Airport` 是图的一个节点，但它的行为类似于常规表。我们可以添加任何列、索引或约束来描述此节点中的信息。这是 Azure SQL 多模型功能如何使你能够在新场景中结合经过实战检验的高级数据库功能的另一个例子。节点表有一个隐藏列，用于表示节点的唯一标识符，稍后将对此进行解释。


    `Flightline` 是一个边表，它连接两个 `Airport` 表。此表中的列表示描述两个节点之间关系的附加信息。此示例中显示的边表是一个通用边，没有指定它旨在连接两个
    `Airport` 而不是其他节点。为了明确指定 `Flightline` 连接 `Airport`，我们需要引入以下边约束：


    ```sql

    ALTER TABLE Flightline

    ADD CONSTRAINT [Connecting airports]

    CONNECTION (Airport TO Airport)

    ON DELETE CASCADE;

    ```


    此约束指定你不能使用 `Flightline` 边来连接 `Airport` 以外的节点。此约束还定义了节点被删除时边会发生什么。

    '
- fmt: '## 加载图数据


    节点表是经典的表，可以像加载或读取任何其他经典表一样操作。每个节点表都有一个名为`$NODE_ID`的隐藏列，您只会在某些特殊场景中使用它。边表具有隐藏的“外键关系”列，这些列在底层用于使用`$NODE_ID`值将边与关联的节点连接起来。在将数据导入边中时，了解这一点非常重要，因为您需要获取相关节点的`$NODE_ID`值来绑定它们。让我们假设`Airport`节点已经加载，并且我们正在使用`OPENROWSET`函数从
    blob 存储导入一组边。为了将数据加载到边表中，我们需要将加载的记录与节点进行联接，找到`$NODE_ID`值，并将它们与导入的航空公司名称一起插入到边表中：


    ```

    INSERT INTO Flightline ($from_id, $to_id, Name)

    SELECT f.$NODE_ID, t.$NODE_ID, a.Name

    FROM OPENROWSET(

    BULK ''data/flightlines.csv'',

    DATA_SOURCE = ''MyAzureBlobStorage'',

    FORMATFILE=''data/flightlines.fmt'',

    FORMATFILE_DATA_SOURCE = ''MyAzureBlobStorage'') as a

    JOIN Airport f ON f.Name = a.FromAirport

    JOIN Airport t ON t.Name = a.ToAirport;

    ```


    Flightlines CSV 文件包含有关源和目的机场以及它们之间航线名称的信息。我们需要通过`Name`列将此数据与机场进行联接，并获取应该导入的`$NODE_ID`值。


    ## 查询图数据


    一旦我们加载了数据，就可以使用 Cypher 表达式（[`www.opencypher.org/`](http://www.opencypher.org/)）——一种最常见的图数据查询方式。以下查询将遍历从源机场节点通过航线边到另一个机场节点的所有路径：


    ```

    SELECT

    src.Name, line.Name, dest.Name

    FROM

    Airport src, Flightline line, Airport dest

    WHERE

    MATCH(src-(line)->dest)

    AND

    src.Name=''Belgrade'';

    ```


    此查询将返回从贝尔格莱德到所有其他城镇的目的地。`MATCH`子句定义了一条从源机场（`src`）到目的机场（`dest`）的路径应通过航线表（`line`）建立。


    Azure SQL 中图处理支持的主要优势在于能够跨节点的边进行查询。例如，`SHORTEST_PATH`谓词使您能够查找两个节点之间的最短路径。您可以利用此功能来查找两个城镇之间的最短路线，如以下代码所示：


    ```

    WITH routes AS (

    SELECT

    src.Name,

    STRING_AGG(dest.name, ''->'')

    WITHIN GROUP (GRAPH PATH) AS path,

    COUNT(dest.name)

    WITHIN GROUP (GRAPH PATH) AS stops,

    LAST_VALUE(line.name)

    WITHIN GROUP (GRAPH PATH) AS lastFlight,

    LAST_VALUE(dest.name)

    WITHIN GROUP (GRAPH PATH) AS destination

    FROM

    Airport src,

    Flightline FOR PATH line,

    Airport FOR PATH dest

    WHERE

    MATCH(SHORTEST_PATH(src(-(line)->dest)+))

    AND

    src.Name=''BEG''

    )

    SELECT TOP (10) path, stops, lastFlight, destination

    FROM routes

    WHERE destination IN (''JFK'', ''SEA'');

    ```


    `MATCH`子句中的`SHORTEST_PATH`子句将查找起点和终点位置之间未直接连接的最短路径。聚合函数`STRING_AGG`将连接路径上的所有机场名称，并使用箭头`->`分隔符显示它们。`COUNT`和`LAST_VALUE`将显示行程上的停靠次数以及最短路线上的结束航班和城镇。一旦最短路径探索完成，我们需要在最终查询中选择目的城镇。


    Azure SQL 中的图处理功能使您能够降低模型和查询的复杂性，这些模型和查询需要分析表之间的不同路径和关系。


    ## 空间数据


    表示空间对象（地点、道路、国家边界）并不完全适合规范化形式的结构化关系模型。尽管您可以将一条道路或边界表示为一组小的直线段，其中每条线段存储在单独的行中，并将端点连接到继续道路的线段，但这不是一种高效的表示方式。


    您针对空间对象运行的查询通常具有诸如“这个地方是否在这个形状内”或“这个地方离道路有多远”这样的条件。这些不是您使用标准 SQL 语言描述的典型查询。


    Azure SQL 具有符合开放地理空间联盟（OGC）标准的专门功能，使您能够实现处理空间数据的应用程序：


    *   可用于表示复杂几何和地理对象及形状的专门类型（`Point`、`Line`、`Polygon`）。所有形状都可以表示为 geometry 或 geography
    模型，稍后将更详细地描述。


    *   专门用于空间查询的功能，例如查找两点之间的距离（`ST_DISTANCE`）、确定一个区域是否包含指定的点（`ST_CONTAINS`）等。


    *   针对空间类型查询优化的专门索引。


    这组功能使您能够创建特定于空间领域的高级查询。


    回想一下上一节中描述的机场和航线模型。使用航线（边）连接机场（节点）的图模型对于查找两个城镇之间的最短路线可能是完美的。但是，想象一下，您需要查找所有穿过内布拉斯加州的航线或两条高速公路交叉的无名十字路口。如果高速公路与所有十字路口或国家之间没有明确的关系，就不可能回答这些问题。


    为了解决这些问题，我们需要用地理数据扩展图模型，如以下脚本所示：


    ```

    CREATE TABLE Airport (

    AirportID int PRIMARY KEY,

    Name NVARCHAR(100),

    Location GEOGRAPHY,

    CityID int FOREIGN KEY REFERENCES Application.City(CityID)

    ) AS NODE

    GO

    CREATE TABLE FlightLine (

    Name NVARCHAR(10),

    Route GEOGRAPHY

    ) AS EDGE;

    ```


    Azure SQL 有两种主要的基类型，可用于表示几何和地理图形：


    *   `GEOMETRY`类型在欧几里得（平面）坐标系中表示数据。


    *   `GEOGRAPHY`类型在圆球坐标系中表示数据。


    Geometry 非常适合表示相对较小的对象，如建筑物或室内；Geography 更适合表示更大的形状，如河流、城市或国家边界，以及通常任何需要在地球表面的近似值上工作以避免误差的事物。


    在这两种类型中，按照开放地理空间联盟的规定，您可以创建更具体的类型：


    *   `Point`用于表示 2D 地点，如城镇


    *   `LineString`和`CircularString`可以表示开放或封闭的线，如道路或边界


    *   `Polygon`和`CurvePolygon`用于表示区域，如国家


    *   `MultiPoint`、`MultiLine`和`MultiPolygon`表示一组逻辑上属于同一整体的不连续地理对象（例如，一个群岛可以用`MultiPolygon`表示）


    在 Azure SQL 中，一旦在表中创建了 Geometry 或 Geography 列，您就可以使用这些类型中的任何一种来构建所需的形状。您甚至可以同时使用多个类型，使用
    Collections 或“Multi”类型。'
  raw: '### Loading graph data


    Node tables are classic tables that can be loaded or read like any other classic
    table. Every node table has a hidden column called `$NODE_ID` that you will use
    only in some special scenarios. An Edge table has hidden “foreign key relationship”
    columns that are under the hood used to connect edges with associated nodes using
    `$NODE_ID` values. This is important to know when you import data in the edges
    because you need to fetch the `$NODE_ID` value of related nodes to bind them.
    Let us assume that the `Airport` nodes are already loaded and that we are importing
    a set of edges from the blob storage using `OPENROWSET` function. In order to
    load data in the edge table, we need to join loaded records with nodes, find the
    `$NODE_ID` values, and insert them into the edge table together with imported
    airline name:


    ```

    INSERT INTO Flightline ($from_id, $to_id, Name)

    SELECT f.$NODE_ID, t.$NODE_ID, a.Name

    FROM OPENROWSET(

    BULK ''data/flightlines.csv'',

    DATA_SOURCE = ''MyAzureBlobStorage'',

    FORMATFILE=''data/flightlines.fmt'',

    FORMATFILE_DATA_SOURCE = ''MyAzureBlobStorage'') as a

    JOIN Airport f ON f.Name = a.FromAirport

    JOIN Airport t ON t.Name = a.ToAirport;

    ```


    The Flightlines CSV file contains information about source and destination airport
    and the name of the flight line between them. We need to join this data with Airports
    by `Name` column and get the `$NODE_ID` values that should be imported.


    ### Querying graph data


    Once we load data, we can use Cypher expressions ([`www.opencypher.org/`](http://www.opencypher.org/)),
    one of the most common ways to query graph data. The following query will traverse
    all paths from source airport node via airline edge to another airport node:


    ```

    SELECT

    src.Name, line.Name, dest.Name

    FROM

    Airport src, Flightline line, Airport dest

    WHERE

    MATCH(src-(line)->dest)

    AND

    src.Name=''Belgrade'';

    ```


    This query will return all destinations from Belgrade to all other towns. `MATCH`
    clause defines that a path from source airport (`src`) to destination airport
    (`dest`) should be established via flight line table (`line`).


    The main advantage of graph processing support in Azure SQL is the ability to
    query across the edges of the nodes. As an example, `SHORTEST_PATH` predicate
    enables you to find the shortest paths between two nodes. You can leverage this
    function to find the shortest route between two towns, as it is shown in the following
    code:


    ```

    WITH routes AS (

    SELECT

    src.Name,

    STRING_AGG(dest.name, ''->'')

    WITHIN GROUP (GRAPH PATH) AS path,

    COUNT(dest.name)

    WITHIN GROUP (GRAPH PATH) AS stops,

    LAST_VALUE(line.name)

    WITHIN GROUP (GRAPH PATH) AS lastFlight,

    LAST_VALUE(dest.name)

    WITHIN GROUP (GRAPH PATH) AS destination

    FROM

    Airport src,

    Flightline FOR PATH line,

    Airport FOR PATH dest

    WHERE

    MATCH(SHORTEST_PATH(src(-(line)->dest)+))

    AND

    src.Name=''BEG''

    )

    SELECT TOP (10) path, stops, lastFlight, destination

    FROM routes

    WHERE destination IN (''JFK'', ''SEA'');

    ```


    The `SHORTEST_PATH` clause within the `MATCH` clause will find the shortest path
    between starting and end location that are not directly connected. Aggregate `STRING_AGG`
    will concatenate all airport names on the path and display them with arrow `->`
    separator. `COUNT` and `LAST_VALUE` will show the number of stops on itinerary
    and ending flight and town on the shortest route. Once the shortest path exploration
    is finished, we need to select destination towns in the final query.


    Graph processing capabilities in Azure SQL enable you to reduce complexity of
    your models and queries that should analyze different paths and relationships
    between tables.


    ## Spatial data


    Representing spatial objects (places, roads, country borders) is something that
    doesn''t ideally fit into a structured relational model in normal form. Although
    you can represent a road or a border as a set of small straight lines where every
    line is stored in a separate row with the ends connected to the lines that continue
    the road, this is not an efficient representation.


    The queries that you would run against spatial objects usually have conditions
    like “is this place within the shape” or “how far is the place from the road.”
    These are not the typical queries that you would describe using standard SQL language.


    Azure SQL has specialized functionalities that conform to the Open Geospatial
    Consortium (OGC) standards that enable you to implement applications that work
    with spatial data:


    *   Specialized types that can be used to represent complex geometrical and geographical
    objects and shapes (`Point`, `Line`, `Polygon`). All shapes can be represented
    as geometry or geography models, which will be described more in detail soon.


    *   Functionalities specialized for spatial querying such as finding the distance
    between two points (`ST_DISTANCE`), determining whether an area contains a specified
    point (`ST_CONTAINS`), and so on.


    *   Specialized indexes that are optimized for spatial types of queries.


    This set of capabilities enables you to create advanced queries that are specific
    for spatial domains.


    Remember the airport and flight line model described in the previous section.
    Graph models that connect airports (nodes) using flight lines (edges) might be
    perfect to find the shortest route between two towns. However, imagine that you
    need to find all airlines that are crossing Nebraska or unnamed crossroads where
    two highways intersect. If there is no explicit relationship between highways
    and all crossroads or countries, it would be impossible to answer these questions.


    In order to solve these problems, we would need to extend graph model with geographical
    data, as shown in the following script:


    ```

    CREATE TABLE Airport (

    AirportID int PRIMARY KEY,

    Name NVARCHAR(100),

    Location GEOGRAPHY,

    CityID int FOREIGN KEY REFERENCES Application.City(CityID)

    ) AS NODE

    GO

    CREATE TABLE FlightLine (

    Name NVARCHAR(10),

    Route GEOGRAPHY

    ) AS EDGE;

    ```


    Azure SQL has two main base types that can be used to represent geometrical and
    geographical figures:


    *   `GEOMETRY` type represents data in a Euclidean (flat) coordinate system.


    *   `GEOGRAPHY` type represents data in a round-earth coordinate system.


    Geometry is perfect for representing relatively small objects like buildings or
    interiors; Geography is better suited to represent much bigger shapes, like river,
    city, or nation boundaries and in general anything that needs to work on close
    approximation of Earth surface to avoid errors.


    Within these two types, as specified by Open Geospatial Consortium , you can create
    more specific types:


    *   `Point` used to represent 2D places like towns


    *   `LineString` and `CircularString` that can represent open or closed lines
    like roads or borders


    *   `Polygon` and `CurvePolygon` used to represent areas like countries


    *   `MultiPoint`, `MultiLine`, and `MultiPolygon` representing a set of disconnected
    geographical objects that logically belong together (an archipelago with a set
    of islands might be represented with `MultiPolygon`)


    In Azure SQL, once you have created a Geometry or Geography column in a table,
    you can use any of these types to build the shape you need. You can even use more
    than one at the same time, using Collections or “Multi” types.'
  trans: '

    ## 加载图数据


    节点表是经典的表，可以像加载或读取任何其他经典表一样操作。每个节点表都有一个名为`$NODE_ID`的隐藏列，您只会在某些特殊场景中使用它。边表具有隐藏的“外键关系”列，这些列在底层用于使用`$NODE_ID`值将边与关联的节点连接起来。在将数据导入边中时，了解这一点非常重要，因为您需要获取相关节点的`$NODE_ID`值来绑定它们。让我们假设`Airport`节点已经加载，并且我们正在使用`OPENROWSET`函数从
    blob 存储导入一组边。为了将数据加载到边表中，我们需要将加载的记录与节点进行联接，找到`$NODE_ID`值，并将它们与导入的航空公司名称一起插入到边表中：


    ```

    INSERT INTO Flightline ($from_id, $to_id, Name)

    SELECT f.$NODE_ID, t.$NODE_ID, a.Name

    FROM OPENROWSET(

    BULK ''data/flightlines.csv'',

    DATA_SOURCE = ''MyAzureBlobStorage'',

    FORMATFILE=''data/flightlines.fmt'',

    FORMATFILE_DATA_SOURCE = ''MyAzureBlobStorage'') as a

    JOIN Airport f ON f.Name = a.FromAirport

    JOIN Airport t ON t.Name = a.ToAirport;

    ```


    Flightlines CSV 文件包含有关源和目的机场以及它们之间航线名称的信息。我们需要通过`Name`列将此数据与机场进行联接，并获取应该导入的`$NODE_ID`值。


    ## 查询图数据


    一旦我们加载了数据，就可以使用 Cypher 表达式（[`www.opencypher.org/`](http://www.opencypher.org/)）——一种最常见的图数据查询方式。以下查询将遍历从源机场节点通过航线边到另一个机场节点的所有路径：


    ```

    SELECT

    src.Name, line.Name, dest.Name

    FROM

    Airport src, Flightline line, Airport dest

    WHERE

    MATCH(src-(line)->dest)

    AND

    src.Name=''Belgrade'';

    ```


    此查询将返回从贝尔格莱德到所有其他城镇的目的地。`MATCH`子句定义了一条从源机场（`src`）到目的机场（`dest`）的路径应通过航线表（`line`）建立。


    Azure SQL 中图处理支持的主要优势在于能够跨节点的边进行查询。例如，`SHORTEST_PATH`谓词使您能够查找两个节点之间的最短路径。您可以利用此功能来查找两个城镇之间的最短路线，如以下代码所示：


    ```

    WITH routes AS (

    SELECT

    src.Name,

    STRING_AGG(dest.name, ''->'')

    WITHIN GROUP (GRAPH PATH) AS path,

    COUNT(dest.name)

    WITHIN GROUP (GRAPH PATH) AS stops,

    LAST_VALUE(line.name)

    WITHIN GROUP (GRAPH PATH) AS lastFlight,

    LAST_VALUE(dest.name)

    WITHIN GROUP (GRAPH PATH) AS destination

    FROM

    Airport src,

    Flightline FOR PATH line,

    Airport FOR PATH dest

    WHERE

    MATCH(SHORTEST_PATH(src(-(line)->dest)+))

    AND

    src.Name=''BEG''

    )

    SELECT TOP (10) path, stops, lastFlight, destination

    FROM routes

    WHERE destination IN (''JFK'', ''SEA'');

    ```


    `MATCH`子句中的`SHORTEST_PATH`子句将查找起点和终点位置之间未直接连接的最短路径。聚合函数`STRING_AGG`将连接路径上的所有机场名称，并使用箭头`->`分隔符显示它们。`COUNT`和`LAST_VALUE`将显示行程上的停靠次数以及最短路线上的结束航班和城镇。一旦最短路径探索完成，我们需要在最终查询中选择目的城镇。


    Azure SQL 中的图处理功能使您能够降低模型和查询的复杂性，这些模型和查询需要分析表之间的不同路径和关系。


    ## 空间数据


    表示空间对象（地点、道路、国家边界）并不完全适合规范化形式的结构化关系模型。尽管您可以将一条道路或边界表示为一组小的直线段，其中每条线段存储在单独的行中，并将端点连接到继续道路的线段，但这不是一种高效的表示方式。


    您针对空间对象运行的查询通常具有诸如“这个地方是否在这个形状内”或“这个地方离道路有多远”这样的条件。这些不是您使用标准 SQL 语言描述的典型查询。


    Azure SQL 具有符合开放地理空间联盟（OGC）标准的专门功能，使您能够实现处理空间数据的应用程序：


    *   可用于表示复杂几何和地理对象及形状的专门类型（`Point`、`Line`、`Polygon`）。所有形状都可以表示为 geometry 或 geography
    模型，稍后将更详细地描述。


    *   专门用于空间查询的功能，例如查找两点之间的距离（`ST_DISTANCE`）、确定一个区域是否包含指定的点（`ST_CONTAINS`）等。


    *   针对空间类型查询优化的专门索引。


    这组功能使您能够创建特定于空间领域的高级查询。


    回想一下上一节中描述的机场和航线模型。使用航线（边）连接机场（节点）的图模型对于查找两个城镇之间的最短路线可能是完美的。但是，想象一下，您需要查找所有穿过内布拉斯加州的航线或两条高速公路交叉的无名十字路口。如果高速公路与所有十字路口或国家之间没有明确的关系，就不可能回答这些问题。


    为了解决这些问题，我们需要用地理数据扩展图模型，如以下脚本所示：


    ```

    CREATE TABLE Airport (

    AirportID int PRIMARY KEY,

    Name NVARCHAR(100),

    Location GEOGRAPHY,

    CityID int FOREIGN KEY REFERENCES Application.City(CityID)

    ) AS NODE

    GO

    CREATE TABLE FlightLine (

    Name NVARCHAR(10),

    Route GEOGRAPHY

    ) AS EDGE;

    ```


    Azure SQL 有两种主要的基类型，可用于表示几何和地理图形：


    *   `GEOMETRY`类型在欧几里得（平面）坐标系中表示数据。


    *   `GEOGRAPHY`类型在圆球坐标系中表示数据。


    Geometry 非常适合表示相对较小的对象，如建筑物或室内；Geography 更适合表示更大的形状，如河流、城市或国家边界，以及通常任何需要在地球表面的近似值上工作以避免误差的事物。


    在这两种类型中，按照开放地理空间联盟的规定，您可以创建更具体的类型：


    *   `Point`用于表示 2D 地点，如城镇


    *   `LineString`和`CircularString`可以表示开放或封闭的线，如道路或边界


    *   `Polygon`和`CurvePolygon`用于表示区域，如国家


    *   `MultiPoint`、`MultiLine`和`MultiPolygon`表示一组逻辑上属于同一整体的不连续地理对象（例如，一个群岛可以用`MultiPolygon`表示）


    在 Azure SQL 中，一旦在表中创建了 Geometry 或 Geography 列，您就可以使用这些类型中的任何一种来构建所需的形状。您甚至可以同时使用多个类型，使用
    Collections 或“Multi”类型。

    '
- fmt: '### Querying spatial data


    Spatial data types in Azure SQL have the built-in methods that enable you to easily
    query spatial data. Under assumption that all information about the flight lines
    and airports are populated, we can create easily find the routes crossing state
    of Nebraska:


    ```sql

    DECLARE @nebraska GEOGRAPHY = (

    SELECT TOP (1) Border FROM Application.StateProvinces

    WHERE StateProvinceName = ''Nebraska''

    );

    SELECT *

    FROM FlightLine

    WHERE Route.STIntersects(@nebraska) = 1;

    ```


    `STIntersects` method determines if two shapes intersect at some place. This method
    returns 1 if a geography instance intersects another geography instance and 0
    otherwise.


    `STDistance` method measures the distance between two objects and enables you
    to find the objects closer to some specific coordinate. The following query returns
    five airports closest to the current location of some object:


    ```sql

    DECLARE @currentLocation GEOGRAPHY = ''POINT(-121.626 47.8315)'';

    SELECT TOP(5) *

    FROM Airports

    ORDER BY Location.STDistance(@currentLocation) ASC;

    ```


    The spatial queries are enabling you to easily perform specific analysis to resolve
    problems where you would need to spend a lot of time dealing with the specific
    mathematical transformations, without having you to write them yourself or to
    use another more specialized solution to perform the calculation, so that you
    don’t have to move the data around, thus making your solution much more efficient.


    ### Spatial indexes


    In theory, `STIntersects` method might be implemented as a self-contained function
    with complex mathematical calculations that are trying to determine relationships
    between the figures. However, due to complexity of calculations, running that
    kind of function on many objects would be both time- and CPU-consuming. For efficient
    processing, Azure SQL uses a special type of Spatial indexes.


    Spatial indexes internally create grid (shown in Figure [8-2](#493913_1_En_8_Chapter.xhtml#Fig2))
    where cells may or may not overlap with the parts of figures that should be indexed.


    ![../images/493913_1_En_8_Chapter/493913_1_En_8_Fig2_HTML.jpg](images/493913_1_En_8_Chapter/493913_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Indexing spatial objects in 4x4 grid


    Azure SQL creates a grid, and for every spatial object that should be indexed,
    it records whether it fully or partially overlaps or doesn''t overlap at all with
    the cells in the grid. This process is known as `tessellation`. With this technique,
    a `STOverlaps` method that needs to determine if two objects overlap will not
    immediately need to apply complex mathematical calculations to determine if there
    is some intersection between the objects. If an index is available, it will first
    use the index to check if there is at least one cell in the grid that belongs
    to both spatial objects or if the cell that belongs to one object also partially
    overlaps with another object. If this is true, then they overlap, and this is
    the faster way to determine if there is some interception. If there are no cells
    that at least partially overlap with both objects, then these objects do not overlap.
    If there are some cells that partially overlap with both objects, these objects
    might or might not overlap. Only in this case will Azure SQL apply complex spatial
    calculation, but not on the entire area of objects, just on smaller cells where
    they might potentially overlap. Although this might be CPU-consuming operation,
    it is performed on a small cell and probably the small part of objects that is
    within this cell. Therefore, this action would be few orders of magnitude faster
    than the naïve approach that would compare all parts of the objects.


    Spatial indexes are created using the special `CREATE SPATIAL INDEX` syntax:


    ```sql

    CREATE SPATIAL INDEX SI_Flightline_Routes

    ON Flightline(Route)

    USING GEOGRAPHY_GRID

    WITH (

    GRIDS = ( MEDIUM, LOW, MEDIUM, HIGH ),

    CELLS_PER_OBJECT = 64 );

    ```


    Besides the spatial column that should be indexed, you can specify the characteristics
    of the grid that will be created to index the spatial values such as area that
    should be covered or density of tessellation grid used for indexing. More granular
    indexes will be bigger and need more time to scan all grid cells and determine
    whether the parts of the routes overlap with every cell. However, the bigger density
    of grids makes the worst-case scenario stage, where objects partially overlap
    much faster because smaller parts of the objects are processed using the complex
    math rules. This right size and parameters of the indexes depend on your data,
    and you might need to experiment and rebuild the index with different parameters
    to find what is the best fit for your data.


    If you are unsure at the beginning, you can avoid the bounding box specification,
    and Azure SQL will try to guess the best bounding box and tessellation for you.
    Of course, the automatically defined values may not be the perfect ones in your
    scenario, so it is good to know that you can manually specify them if needed.'
