  trans: '### 查询空间数据


    Azure SQL 中的空间数据类型具有内置方法，使您能够轻松查询空间数据。假设所有关于航线和机场的信息都已填充，我们可以轻松找出穿过内布拉斯加州的航线：


    ```sql

    DECLARE @nebraska GEOGRAPHY = (

    SELECT TOP (1) Border FROM Application.StateProvinces

    WHERE StateProvinceName = ''Nebraska''

    );

    SELECT *

    FROM FlightLine

    WHERE Route.STIntersects(@nebraska) = 1;

    ```


    `STIntersects` 方法用于确定两个形状是否在某处相交。如果一个地理实例与另一个地理实例相交，则此方法返回 1，否则返回 0。


    `STDistance` 方法测量两个对象之间的距离，使您能够找到更接近某个特定坐标的对象。以下查询返回距离某个对象当前位置最近的五个机场：


    ```sql

    DECLARE @currentLocation GEOGRAPHY = ''POINT(-121.626 47.8315)'';

    SELECT TOP(5) *

    FROM Airports

    ORDER BY Location.STDistance(@currentLocation) ASC;

    ```


    空间查询使您能够轻松执行特定分析，以解决那些需要花费大量时间处理特定数学变换的问题，而无需您自己编写这些变换或使用其他更专业的解决方案来进行计算，这样您就不必移动数据，从而使您的解决方案更加高效。


    ### 空间索引


    理论上，`STIntersects` 方法可以实现为一个包含复杂数学计算的独立函数，这些计算试图确定图形之间的关系。然而，由于计算的复杂性，在大量对象上运行这种函数将非常耗时且消耗
    CPU。为了高效处理，Azure SQL 使用一种特殊类型的索引，即空间索引。


    空间索引在内部创建一个网格（如图 8-2 所示），其中的单元格可能与被索引图形的部分区域重叠，也可能不重叠。


    ![../images/493913_1_En_8_Chapter/493913_1_En_8_Fig2_HTML.jpg](img/493913_1_En_8_Fig2_HTML.jpg)


    图 8-2


    在 4x4 网格中对空间对象进行索引


    Azure SQL 创建一个网格，并为每个需要索引的空间对象记录该对象是完全重叠、部分重叠还是完全不重叠于网格中的单元格。这个过程被称为 `tessellation`（网格化）。使用这种技术，需要确定两个对象是否重叠的
    `STOverlaps` 方法，就不必立即应用复杂的数学计算来判断对象间是否存在交集。如果有索引可用，它会首先使用索引来检查是否存在至少一个单元格同时属于这两个空间对象，或者属于一个对象的单元格是否也与另一个对象部分重叠。如果为真，则它们重叠，这是判断是否存在交集的更快方式。如果没有单元格与两个对象都至少部分重叠，则这些对象不重叠。如果有些单元格与两个对象都部分重叠，则这些对象可能重叠，也可能不重叠。只有在这种情况下，Azure
    SQL 才会应用复杂的空间计算，但不是在整个对象区域上，而只是在它们可能潜在重叠的较小单元格上进行计算。尽管这可能是一个消耗 CPU 的操作，但它是在一个小单元格上执行的，并且可能只涉及对象位于该单元格内的一小部分区域。因此，这种操作会比比较对象所有部分的朴素方法快几个数量级。


    空间索引使用特殊的 `CREATE SPATIAL INDEX` 语法创建：


    ```sql

    CREATE SPATIAL INDEX SI_Flightline_Routes

    ON Flightline(Route)

    USING GEOGRAPHY_GRID

    WITH (

    GRIDS = ( MEDIUM, LOW, MEDIUM, HIGH ),

    CELLS_PER_OBJECT = 64 );

    ```


    除了要索引的空间列之外，您还可以指定为索引空间值而创建的网格的特征，例如应覆盖的区域或用于索引的网格化密度。粒度更细的索引会更大，需要更多时间来扫描所有网格单元格并确定航线的部分是否与每个单元格重叠。然而，更大的网格密度使得对象部分重叠的最坏情况阶段处理速度更快，因为只有对象的较小部分需要使用复杂数学规则进行处理。索引的合适大小和参数取决于您的数据，您可能需要进行试验，并用不同的参数重建索引，以找到最适合您数据的配置。


    如果您一开始不确定，可以避免指定边界框，Azure SQL 会尝试为您猜测最佳的边界框和网格划分。当然，自动定义的值在您的场景中可能不是完美的，但重要的是要知道，如果需要，您可以手动指定它们。'
- fmt: '### Geometry vs. Geography


    As mentioned before, Azure SQL has two classes of spatial data types that are
    used in different scenarios:


    *   `Geometry data types` are used to represent planar mathematical shapes in
    classic 2D coordinate system.

    *   `Geography data types` are used to represent spherical objects and shapes
    projected into 2D plane.


    The difference between geometry and geography types is one of the most important
    things that you need to understand to develop spatial applications.


    Geography types are used to represent the objects placed in a classic 2D coordinate
    system, and you can imagine them as the objects that you could draw on the plain
    piece of paper. Distances and sizes of the objects are measured the same way you
    would measure distance of the objects drawn on a paper or a board. If you take
    a map and want to find the shortest flight trajectory between Belgrade, Serbia,
    Europe, and Seattle, Washington, US, you would probably use the straight horizontal
    line going via France and the US east coast. This is geometrically the shortest
    line between them. However, due to the rounded shape of the earth, the shortest
    trajectory (called `geodesic) is going via Iceland, Greenland, and Canada. Geography
    data model is considering Earth’s actual shape and is able to find the real-world
    shortest distance and path.


    Mapping the Earth surface to a 2D plane is the most difficult spatial problem.
    Famous mathematician Carl Gauss proved in his `Theorema Egregium` (Latin for "Remarkable
    Theorem") that spherical surfaces cannot be mapped to 2D planes without distortion.
    You might notice on some maps that the territories closer to the poles such as
    Greenland, Antarctica, north of Canada, and Russia might look stretched or sometime
    bigger than actual. This happens due to the fact that dense coordinates closer
    to poles must be “stretched” to project them in 2D coordinates. To make things
    even harder, the Earth surface is not spherical nor even ellipsoid. Irregular
    shape of Earth and proximity to poles force people to use different strategies
    of mapping to 2D plane. There are mapping rules that preserve correct distance
    shortest paths, shape, and vice versa, but in every strategy, something will be
    distorted. That’s why every geography object has an associated `Spatial Reference
    Identifier (SRID)` that describes what spatial transformation strategy is used
    to translate the object from the earth globe into the 2D plane. `SRID` describes
    what coordinates are used (latitude/longitude, easting/northing), unit of measure,
    where is coordinate root, and so on. Azure SQL will derive information from `SRID`
    to compare positions of the objects.


    In the following example, you can see how to transform coordinates to the Geography
    line by specifying that the World Geodetic System 1984 (WGS84) with `SRID 4326`
    is used for transformation:


    ```

    DECLARE @g GEOGRAPHY;

    SET @g = GEOGRAPHY::STGeomFromText(''LINESTRING(-122.360 47.656, -122.343 47.656)'',
    4326);

    SELECT @g.STSrid;

    ```


    Some countries need to use multiple `SRID` in their territory, especially if their
    north and south borders are far like in Chile. In these scenarios, you would need
    to align `SRID` before comparing positions of the geography objects. Specifying
    different `SRID` would result in the different positions or shapes. Measuring
    the differences between spatial objects with coordinates determined using different
    `SRID` would lead to wrong results. Therefore, in Azure SQL spatial operations
    cannot be performed between spatial objects with different `SRID`s.


    WGS84 is the most commonly used standard and is the one also used on the GPS system
    in our phone or car. If you are unsure of which `SRID` to use, very good chances
    are that WGS84 will work perfectly for you.


    The good news for you is that all these complex transformations are built in into
    Azure SQL. The only thing you need to do is to leverage functionalities and learn
    the basic principles that will help you to understand how to use Spatial features.


    ## XML data


    `XML data type` is the older brother of `JSON`. This feature was introduced in
    SQL Server Database engine between 2000 and 2005, while XML was the mainstream
    format for data exchange between different applications.


    XML support in Azure SQL is similar to the JSON support described in the previous
    sections. If you need to parse XML data or format results of the queries as XML,
    you can use the following functionalities:


    *   `OPENXML` table value function that can parse an XML document

    *   `FOR XML` clause that can format results of the query as XML document

    *   `XML` type with methods for processing values in XML documents


    If you have understood the `OPENJSON` function and `FOR JSON` clause explained
    in the section about JSON support, then you probably understand the purpose of
    `OPENXML` function and `FOR XML` clause. The difference between these XML functionalities
    and matching JSON functionalities are trivial, so they will not be explained in
    more detail.


    The key difference between JSON and XML support in Azure SQL is native `XML` type.
    Unlike JSON support where JSON text is stored in native `NVARCHAR` type, XML has
    a dedicated SQL type. XML is standardized type in many languages (e.g., `System.Xml.Document`
    in .NET framework), so it makes sense to have parity in SQL type. The key difference
    is that in JSON cases you are using string-like functions to parse JSON, while
    XML content is represented as an object where you can use various methods to extract
    data.'
  raw: '### Geometry vs. Geography


    As mentioned before, Azure SQL has two classes of spatial data types that are
    used in different scenarios:


    *   *Geometry data types* are used to represent planar mathematical shapes in
    classic 2D coordinate system.


    *   *Geography data types* are used to represent spherical objects and shapes
    projected into 2D plane.


    The difference between geometry and geography types is one of the most important
    things that you need to understand to develop spatial applications.


    Geography types are used to represent the objects placed in a classic 2D coordinate
    system, and you can imagine them as the objects that you could draw on the plain
    piece of paper. Distances and sizes of the objects are measured the same way you
    would measure distance of the objects drawn on a paper or a board. If you take
    a map and want to find the shortest flight trajectory between Belgrade, Serbia,
    Europe, and Seattle, Washington, US, you would probably use the straight horizontal
    line going via France and the US east coast. This is geometrically the shortest
    line between them. However, due to the rounded shape of the earth, the shortest
    trajectory (called *geodesic)* is going via Iceland, Greenland, and Canada. Geography
    data model is considering Earth’s actual shape and is able to find the real-world
    shortest distance and path.


    Mapping the Earth surface to a 2D plane is the most difficult spatial problem.
    Famous mathematician Carl Gauss proved in his Theorema Egregium (Latin for "Remarkable
    Theorem") that spherical surfaces cannot be mapped to 2D planes without distortion.
    You might notice on some maps that the territories closer to the poles such as
    Greenland, Antarctica, north of Canada, and Russia might look stretched or sometime
    bigger than actual. This happens due to the fact that dense coordinates closer
    to poles must be “stretched” to project them in 2D coordinates. To make things
    even harder, the Earth surface is not spherical nor even ellipsoid. Irregular
    shape of Earth and proximity to poles force people to use different strategies
    of mapping to 2D plane. There are mapping rules that preserve correct distance
    shortest paths, shape, and vice versa, but in every strategy, something will be
    distorted. That’s why every geography object has an associated *Spatial Reference
    Identifier (SRID)* that describes what spatial transformation strategy is used
    to translate the object from the earth globe into the 2D plane. *SRID* describes
    what coordinates are used (latitude/longitude, easting/northing), unit of measure,
    where is coordinate root, and so on. Azure SQL will derive information from SRID
    to compare positions of the objects.


    In the following example, you can see how to transform coordinates to the Geography
    line by specifying that the World Geodetic System 1984 (WGS84) with SRID 4326
    is used for transformation:


    ```

    DECLARE @g GEOGRAPHY;

    SET @g = GEOGRAPHY::STGeomFromText(''LINESTRING(-122.360 47.656, -122.343 47.656)'',
    4326);

    SELECT @g.STSrid;

    ```


    Some countries need to use multiple SRID in their territory, especially if their
    north and south borders are far like in Chile. In these scenarios, you would need
    to align SRID before comparing positions of the geography objects. Specifying
    different SRID would result in the different positions or shapes. Measuring the
    differences between spatial objects with coordinates determined using different
    SRID would lead to wrong results. Therefore, in Azure SQL spatial operations cannot
    be performed between spatial objects with different SRIDs.


    WGS84 is the most commonly used standard and is the one also used on the GPS system
    in our phone or car. If you are unsure of which SRID to use, very good chances
    are that WGS84 will work perfectly for you.


    The good news for you is that all these complex transformations are built in into
    Azure SQL. The only thing you need to do is to leverage functionalities and learn
    the basic principles that will help you to understand how to use Spatial features.


    ## XML data


    XML data type is the older brother of JSON. This feature was introduced in SQL
    Server Database engine between 2000 and 2005, while XML was the mainstream format
    for data exchange between different applications.


    XML support in Azure SQL is similar to the JSON support described in the previous
    sections. If you need to parse XML data or format results of the queries as XML,
    you can use the following functionalities:


    *   `OPENXML` table value function that can parse an XML document


    *   `FOR XML` clause that can format results of the query as XML document


    *   XML type with methods for processing values in XML documents


    If you have understood the `OPENJSON` function and `FOR JSON` clause explained
    in the section about JSON support, then you probably understand the purpose of
    `OPENXML` function and `FOR XML` clause. The difference between these XML functionalities
    and matching JSON functionalities are trivial, so they will not be explained in
    more detail.


    The key difference between JSON and XML support in Azure SQL is native `XML` type.
    Unlike JSON support where JSON text is stored in native `NVARCHAR` type, XML has
    a dedicated SQL type. XML is standardized type in many languages (e.g., `System.Xml.Document`
    in .NET framework), so it makes sense to have parity in SQL type. The key difference
    is that in JSON cases you are using string-like functions to parse JSON, while
    XML content is represented as an object where you can use various methods to extract
    data.'
  trans: '

    ### 几何 vs. 地理


    如前所述，Azure SQL 针对不同场景提供了两类空间数据类型：


    *   `几何数据类型` 用于表示经典二维坐标系中的平面数学形状。

    *   `地理数据类型` 用于表示投影到二维平面上的球体对象和形状。


    理解几何与地理类型之间的差异，是开发空间应用所需掌握的**最关键**要点之一。


    地理类型用于表示置于经典二维坐标系中的对象，你可以将其想象为可以绘制在一张纸上的物体。对象距离和大小的测量方式，与在纸或板上绘制物体后测量距离的方式相同。如果你拿一张地图，想找出从塞尔维亚贝尔格莱德到美国华盛顿州西雅图之间的最短飞行轨迹，你可能会使用一条经过法国和美国东海岸的直线水平线。从几何上看，这是它们之间最短的线。然而，由于地球的球形形状，最短轨迹（称为
    `geodesic`）实际上是经过冰岛、格陵兰岛和加拿大的路径。地理数据模型考虑了地球的实际形状，并能够找到现实世界中的最短距离和路径。


    将地球表面映射到二维平面是最困难的空间问题。著名数学家卡尔·高斯在其 `绝妙定理`（拉丁语 "Theorema Egregium"）中证明，球面在不产生失真的情况下无法映射到二维平面。你可能在一些地图上注意到，靠近两极的区域，如格陵兰岛、南极洲、加拿大北部和俄罗斯，看起来被拉伸或有时比实际更大。这是因为靠近两极的密集坐标必须被“拉伸”才能投影到二维坐标中。更困难的是，地球表面并非球体，甚至也不是椭球体。地球的不规则形状和靠近两极的地理位置迫使人们采用不同的二维平面映射策略。存在一些映射规则可以保持正确的距离最短路径、形状等，但在每种策略中，某些方面都会失真。这就是为什么每个地理对象都关联一个
    `空间参考标识符 (SRID)`，它描述了用于将对象从地球仪转换到二维平面所采用的空间转换策略。`SRID` 描述了使用的坐标（纬度/经度、东向/北向）、计量单位、坐标原点位置等。Azure
    SQL 将根据 `SRID` 获取信息以比较对象的位置。


    在以下示例中，你可以看到如何通过指定使用 `SRID 4326` 的世界大地测量系统 1984 (WGS84) 来转换坐标，从而构造一条地理线：


    ```

    DECLARE @g GEOGRAPHY;

    SET @g = GEOGRAPHY::STGeomFromText(''LINESTRING(-122.360 47.656, -122.343 47.656)'',
    4326);

    SELECT @g.STSrid;

    ```


    一些国家，特别是像智利那样南北边界相距很远的国家，需要在其领土内使用多个 `SRID`。在这些情况下，比较地理位置对象之前，你需要对齐 `SRID`。指定不同的
    `SRID` 会导致位置或形状不同。测量使用不同 `SRID` 确定的空间对象之间的差异，将会导致错误的结果。因此，在 Azure SQL 中，无法在具有不同
    `SRID` 的空间对象之间执行空间操作。


    WGS84 是最常用的标准，也是我们手机或汽车中 GPS 系统所使用的标准。如果你不确定使用哪个 `SRID`，那么 WGS84 极有可能非常适合你。


    对你来说好消息是，所有这些复杂的转换功能都已内置于 Azure SQL 中。你需要做的只是利用这些功能，并学习帮助你理解如何使用空间特性的基本原理。


    ## XML 数据


    `XML 数据类型` 是 `JSON` 的前辈。此功能在 2000 年至 2005 年之间被引入 SQL Server 数据库引擎，当时 XML 是不同应用程序之间数据交换的主流格式。


    Azure SQL 中的 XML 支持与前面章节描述的 JSON 支持类似。如果你需要解析 XML 数据或将查询结果格式化为 XML，可以使用以下功能：


    *   `OPENXML` 表值函数，可用于解析 XML 文档

    *   `FOR XML` 子句，可用于将查询结果格式化为 XML 文档

    *   `XML` 类型及其用于处理 XML 文档中值的方法


    如果你已经理解了 JSON 支持章节中解释的 `OPENJSON` 函数和 `FOR JSON` 子句，那么你可能也就理解了 `OPENXML` 函数和 `FOR
    XML` 子句的用途。这些 XML 功能与对应的 JSON 功能之间的差异微不足道，因此不再详细解释。


    Azure SQL 中 JSON 和 XML 支持的关键区别在于原生的 `XML` 类型。与 JSON 支持（JSON 文本存储在原生的 `NVARCHAR`
    类型中）不同，XML 有专门的 SQL 类型。XML 在许多语言中都是标准化的类型（例如，.NET 框架中的 `System.Xml.Document`），因此在
    SQL 类型中保持对等是合理的。关键区别在于，在 JSON 情况下，你使用类字符串函数来解析 JSON，而 XML 内容则表示为一个对象，你可以使用各种方法来提取数据。

