  raw: '## If you want to know more


    DevOps is a really broad topic, and in this chapter, we just scratched the surface.
    As mentioned at the beginning, DevOps is also a relatively young discipline that
    is evolving very rapidly, so staying updated with the freshest information is
    really important: there is no doubt on the fact that DevOps is a must for a modern
    developer and thus it is mandatory to have some familiarity with it and its tools.
    Here’s a list of links and resources to help you find more details in it:


    *   Annual State of Database DevOps report – [`www.red-gate.com/solutions/overview`](http://www.red-gate.com/solutions/overview)


    *   Evolutionary Database Design – [`www.martinfowler.com/articles/evodb.html`](http://www.martinfowler.com/articles/evodb.html)


    *   Agile Database Techniques – [`www.amazon.com/Agile-Database-Techniques-Effective-Strategies/dp/0471202835`](http://www.amazon.com/Agile-Database-Techniques-Effective-Strategies/dp/0471202835)


    *   Introduction to DevOps: DevOps and the Database – [`www.red-gate.com/simple-talk/sql/database-devops-sql/introduction-to-devops-devops-and-the-database/`](http://www.red-gate.com/simple-talk/sql/database-devops-sql/introduction-to-devops-devops-and-the-database/)


    *   Azure SQL Database Deployment task – [`https://docs.microsoft.com/azure/devops/pipelines/tasks/deploy/sql-azure-dacpac-deployment`](https://docs.microsoft.com/en-us/azure/devops/pipelines/tasks/deploy/sql-azure-dacpac-deployment)


    *   GitHub Action for deploying updates to Azure SQL database – [`https://github.com/marketplace/actions/azure-sql-deploy`](https://github.com/marketplace/actions/azure-sql-deploy)


    *   Django: Migrations – [`https://docs.djangoproject.com/en/3.0/topics/migrations/`](https://docs.djangoproject.com/en/3.0/topics/migrations/)


    *   Django: Writing Migrations – [`https://docs.djangoproject.com/en/3.0/howto/writing-migrations/`](https://docs.djangoproject.com/en/3.0/howto/writing-migrations/)


    *   Entity Framework Core – [`https://docs.microsoft.com/ef/core/`](https://docs.microsoft.com/en-us/ef/core/)


