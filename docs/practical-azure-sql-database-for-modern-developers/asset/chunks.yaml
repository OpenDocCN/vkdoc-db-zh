  trans: '

    ### 保障表的安全性


    Azure SQL 支持为任何能够访问数据库的用户或登录名关联细粒度的权限。假设你有一个管理销售订单信息的**销售微服务**。该微服务使用登录名 `SalesMicroservice`
    访问 Azure SQL 数据库，该登录名应能读取或插入 `Sales.Orders` 表，但不能更新或删除数据。它应仅能读取关于 `Customers`
    和 `Invoices` 的信息。对于某些自定义操作，它可能仅使用位于 `Sales` 架构中的存储过程。此微服务所需的最小权限集可以通过以下规则定义：


    ```sql

    GRANT SELECT, INSERT ON OBJECT::Sales.Orders TO SalesMicroservice;

    GRANT SELECT ON OBJECT::Sales.Customers TO SalesMicroservice;

    GRANT SELECT ON OBJECT::Sales.Invoices TO SalesMicroservice;

    GRANT EXECUTE ON SCHEMA::Sales TO SalesMicroservice;

    ```


    这些是易于编写和审查的安全规则，你可以定义在数据库中。这种安全模型在诸如**命令查询职责分离 (CQRS)** 的架构中非常重要，这类架构中有各自独立的进程，分别只被允许读取或更新数据。分配所需的最小权限集将确保你不易受到各种安全攻击，例如
    SQL 注入或未经授权的更改。Azure SQL 数据库中的安全规则是你数据的最后一道防线，即使应用程序层存在某些安全漏洞，它也应能防止数据泄露。


    如果你需要检查分配给用户的权限，可以以该用户身份登录或模拟该用户，并使用 `fn_my_permissions` 函数检查权限：


    ```sql

    EXECUTE AS USER = ''SalesMicroservice'';

    SELECT * FROM fn_my_permissions(''Sales.Customers'', ''OBJECT'');

    REVERT;

    ```


    除了手动检查外，任何 Azure SQL 中都内置了**漏洞评估工具**，它会自动检查分配给用户的权限并提出建议。


    ## 使用索引提升性能


    一张表，除非你为其创建了*聚集索引*（你将在几页后了解到；现在只需记住，默认情况下主键也会在后台创建一个聚集索引），否则它是一组物理存储在类似 .NET、Java
    和其他现代编程语言或运行时环境中堆内存区域中的行。这种表在 Azure SQL 术语中被称为*堆表*。


    经典的堆表仅在非常有限的场景（如扫描小表或追加行）中有用。然而，在 Azure SQL 数据库中，最常见的操作可能是通过标识符（主键）查找行、根据某些条件查找或更新一组数据等等。这些常见操作在组织为堆的普通行集合上效率极低。正如你将很快了解到的，即使是对整个表的简单扫描，如果我们使用某种特殊的列存储格式也会更高效。


    Azure SQL 支持你使用*索引*来增强这种基本结构，并在各种场景下加速对行的访问。索引是行地址的结构，使你能够组织表中的行，或构建一种查询可以比使用基本表更高效利用的结构。Azure
    SQL 中有几种索引类型：


    *   **B 树索引**：代表多级指针树状结构。这些索引使你无需扫描整个表即可轻松定位一个或一组行。

    *   **列存储索引**：以列式格式而非默认的行格式组织数据。这些结构（将在下一章描述）是加速扫描大表部分区域的报告和分析查询的绝佳解决方案。

    *   **领域特定索引**：为高效支持某些非标准结构或数据类型而构建的特殊索引类型。Azure SQL 支持**空间索引**、**全文索引**和 **XML
    索引**。这些索引使你能够运行一些非标准的过滤，例如坐标是否在某个区域内、XPath 表达式、基于文本中两个词邻近性的过滤等。


    B 树索引是你在任何 Azure SQL 数据库（更广泛地说，在任何关系型或非关系型数据库）中最常见和使用的结构。B 树索引和表紧密耦合，无法分开讨论。在
    Azure SQL 术语中，它们被称为 Hobits（HOBT – 堆或 B 树），它们是大多数数据库中最常见的结构。


    列存储索引和领域特定索引是高级概念，将在后续章节中解释。

    '
- fmt: '### B-Tree indexes


    A B-Tree index is a hierarchical structure of nodes divided by the values present
    in the table columns. It''s very common in all relational and non-relational databases,
    as it is extremely efficient and computationally simple. This is a Composite design
    pattern described in the famous *Design Patterns* book written by Erich Gamma
    et al. In the B-Tree index, every leaf node has references to table rows, and
    non-leaf nodes have references to other nodes. These multi-level tree-like structures
    enable you to easily locate one or a set of rows. Every B-Tree index has a so-called
    key column(s). The values from this column(s) are used to search the rows for
    the desired values.


    Figure [6-2](#493913_1_En_6_Chapter.xhtml#Fig2) shows an index that divides pointers
    to rows using `Price` column.


    ![../images/493913_1_En_6_Chapter/493913_1_En_6_Fig2_HTML.jpg](images/493913_1_En_6_Chapter/493913_1_En_6_Fig2_HTML.jpg)


    Figure 6-2: Dividing rows into groups using index on Price column


    Under the root node, you have a set of groups representing the ranges of rows
    based on the value of the `Price` column. Each group might contain references
    to the rows with these values or references to other nodes with more granular
    ranges. Imagine that we need to find a set of rows with `Price` equal to 73. Starting
    from the root, we can locate the node that represents a range of references to
    the rows with `Price` values between 50 and 100. This node would lead us to the
    node that contains the references to the rows with `Price` column in the range
    between 70 and 100. This is the leaf node that contains the addresses of the rows,
    and we can search the list of references in this node to find the ones with desired
    value. The number of references in the leaf node is not big, so the rows are found
    quickly.


    Leaf nodes in the index are lists of rows or row addresses, and these lists should
    not be big to make sure performance is always optimal. If the number of references
    goes above a defined limit, Azure SQL will split the node into two nodes (action
    known as page split).


    Leaf nodes might contain the references (addresses) of table rows or the cells
    placed in actual table rows. Therefore, we have the following types of indexes:


    - `Clustered indexes hold actual rows in their leaf nodes`. When you navigate
    to the leaf node using some criterion, you will find the actual row. Clustered
    indexes physically organize table rows. Their structure defines how the rows would
    be physically organized. Since there can be only one structure of table rows,
    you can have only one clustered index per table.


    - `Nonclustered indexes hold the addresses of the rows in their leaf nodes`. When
    you navigate to the leaf node using some criterion, you will need one additional
    read to get the data from the actual row. Nonclustered indexes are the structures
    built on top of table rows as an additional secondary set of references that should
    enable you to locate rows by some criterion.


    General advice is to add a clustered index on the primary key column because filtering
    rows by primary key is the most common pattern for filtering and you want the
    most optimal index to cover this case. If you know that you have some other dominant
    pattern, you can choose some other column for clustered index (e.g., foreign key
    or some date column).


    Nonclustered indexes are additional utility structures that optimize the queries
    that are common but not dominant. You can add several nonclustered indexes, and
    the query optimizer will choose the one that is the best fit for the query.


    Let''s see in detail when to use what.


    ### When to use B-Tree indexes?


    B-Tree indexes are the most common type of the indexes that you will find in Azure
    SQL databases. Their structure can help us in the following scenarios:


    - Index seeks operation that locates a single row or a set of rows with the specified
    values of columns.

    - Range scans operation that locates a set of rows that have values in some range.


    The indexes might be a helpful performance booster in the following queries:


    ```sql

    SELECT c.CustomerName, c.CreditLimit,

    o.CustomerPurchaseOrderNumber, o.DeliveryInstructions

    FROM Sales.Customers AS c

    INNER JOIN Sales.Orders AS o

    ON c.CustomerID = o.CustomerID

    WHERE c.PostalCityID = 42

    ```


    Azure SQL would need to read the `Customers` table to find all customers with
    `PostalCityID` value 42. Then, it would need to read the `Orders` table to find
    orders with values of `CustomerID` column that match the `CustomerID` values fetched
    from the first read. It might be very inefficient to scan the entire table just
    to fetch a few rows. Let us see what will happen if we create the following indexes:


    ```sql

    CREATE INDEX ix_Customer_PostalCityID

    ON Sales.Customers(PostalCityID);

    CREATE INDEX ix_Orders_CustomerID

    ON Sales.Orders(CustomerID);

    ```


    With an index on the `Customers` table that has a `PostalCityID` column , Azure
    SQL would use the created index to quickly locate the `Customers` rows with the
    given `PostalCityID`. Then it will find the orders in the second index based on
    `CustomerID` values. As you can imagine, in large tables, this can be a huge performance
    benefit, not to mention less resource, CPU, RAM, and IO usage, which in turn means
    better scalability for lower costs.'
