- fmt: "## Handling exceptions\n\nOpening of a connection to a data source and the\
    \ execution of commands are operations naturally subject to the occurrence of\
    \ errors, which can range from the lack of network connectivity to the server\
    \ up to the violation of some rules for maintaining data integrity, coded within\
    \ the database (primary key, relationships, etc.) or even concurrency management\
    \ (e.g., locking/blocking) within your application or during maintenance operations\
    \ (complete list of database engine error codes is available here: [`https://aka.ms/eaerde`](https://aka.ms/eaerde)).\
    \ It is therefore necessary to provide, for your application code performing database\
    \ interactions, an adequate interception mechanism and management of error conditions.\n\
    \nMost programming languages and frameworks implement exception handling through\
    \ the try/catch (or except) approach. In the try block, you generally put the\
    \ instructions that are presumed to generate exceptions, such as opening the connection,\
    \ executing a command, or calling a component which in turn can generate an application\
    \ exception. If one of these operations fails, application control passes to the\
    \ first catch/except block which specifies an exception type compatible with the\
    \ one that occurred. Generally, those exception types provide all the information\
    \ concerning the specific operation failed; this information is then made available\
    \ in the catch block so you can code a proper logic on how to manage it.\n\nIn\
    \ T-SQL language (e.g., within a Stored Procedure), in addition to errors potentially\
    \ generated by command interacting with database objects (e.g., a primary key\
    \ constraint violation), you can also generate exceptions that represent a logical\
    \ error in your procedure through the `RAISERROR` or `THROW` functions, so that\
    \ your application can behave accordingly.\n\nYou can pass an error message, severity\
    \ level, and code to the `RAISERROR` function, and depending on the severity,\
    \ client providers will act accordingly:\n\n* Level 10 or below, connection is\
    \ not interrupted, and no exceptions are generated. Messages can still be collected\
    \ from the client driver.\n* From 11 to 19, the connection remains open, but an\
    \ exception is thrown.\n* Beyond 19 are considered fatal errors, an exception\
    \ is thrown, and connection is terminated.\n\nFor Azure SQL, errors generated\
    \ with a severity level equal or less than 10 do not really generate an exception\
    \ but are considered as a simple informational or warning message. Driver libraries\
    \ are capturing this information through specific classes (e.g., `InfoMessage`\
    \ for *.NET Provider for SQL Server*) together with proper exception collection.\n\
    \nAt the very minimum, you’ll also want to use these details about the error condition\
    \ as part of your logging strategy for further analysis from the operations team\
    \ in charge or running your application. Other than that, you’ll have to decide\
    \ what option between just retrying the operation (as described in the retry logic\
    \ section) and returning the information back to the caller is the most correct,\
    \ so that one can take appropriate decisions on the best course of action for\
    \ each specific use case.\n\n## Frameworks, ORM, and MicroORM\n\nSo far, we mentioned\
    \ that client drivers are generally providing base abstractions to connect, query,\
    \ and consume results from Azure SQL database instances. That said, application\
    \ developers in most cases are typically looking at higher-level abstractions\
    \ to help them be more productive and eliminate recurring and potentially error-prone\
    \ data access tasks, like representing and interacting with data entities in their\
    \ application logic.\n\nTo achieve higher productivity, a number of data access\
    \ frameworks have been created of the last 20 years or such that could be grouped\
    \ in two main buckets:\n\n* Helper classes that just wrap those base abstractions\
    \ and simplify common tasks\n* Object-Relational Mappers (ORM), providing rich\
    \ data modeling and mapping capabilities to reduce the impedance mismatch between\
    \ relational structures and object-oriented programming\n\nThe following table\
    \ represents a (non-exhaustive) list of some of the most popular libraries in\
    \ the market by programming language:\n\n| **Language** | **Recommended/popular\
    \ libraries** |\n| --- | --- |\n| .NET | • Datasets• Entity Framework (Core)• Dapper\
    \ |\n| Java | • Spring Data• Hibernate |\n| PHP | • Doctrine• Eloquent |\n| Node.js\
    \ | • RxDB• TypeORM• Sequelize |\n| Python | • SQLAlchemy• Django• pandas |\n\
    | Ruby | • ActiveRecord |\n| Go | • Gorm |\n\nIn the next sections, we’ll dig\
    \ deeper into some of them.\n\n### Data access frameworks\n\nAlthough basic abstractions\
    \ will generally take control of every possible aspect of your database interactions,\
    \ they may require a lot of boilerplate code in your application to transform\
    \ objects and structures representing higher-level entities in your logic into\
    \ rows and columns within your database structure.\n\nOver the years, a number\
    \ of libraries and frameworks have been created to simplify this issue while still\
    \ letting you control how your code interacts with your data. As a practical example,\
    \ in the .NET space, `ADO.NET Provider for SQL Server` provides from the very\
    \ first release, together with `SqlConnection`, `SqlCommand`, and `SqlDataReader`\
    \ classes (representing what is usually referred to as the “connected” portion\
    \ of SqlClient library), a number of other classes are provided to interpret and\
    \ navigate through query results in a more “object-oriented” fashion, but also\
    \ to take care of persisting back to the underlying database whatever change has\
    \ been made to original data. I’m referring to classes as `SqlDataAdapter` and\
    \ `DataSet` (typed or untyped). `DataSet` is an in-memory representation of resultsets\
    \ populated from the scratch in your code or returned from one or more queries\
    \ to the database and provides additional logic around offline change tracking,\
    \ data validation, and relationship management between entities. `SqlDataAdapter`\
    \ acts as a “connector” between `DataSets` and database objects and can both automatically\
    \ generate T-SQL commands that take changes applied to in-memory data and persist\
    \ them in the back-end database or leverage existing commands and Stored Procedures\
    \ to control all aspects of these database operations for performance or concurrency\
    \ reasons. DataSets can also be automatically generated from a database schema\
    \ and become fully typed objects exposing internal resultsets as named collections\
    \ (e.g., Customers, Orders, etc.) instead of rows and columns. To discover more\
    \ about these options, you can find complete coverage at this link: [`https://aka.ms/dnfado`](https://aka.ms/dnfado).\n\
    \nSimilar helper classes are very popular on other programming frameworks as well.\
    \ Examples can be `Spring Data Access` for Java ([`https://aka.ms/sfrda`](https://aka.ms/sfrda))\
    \ or `SQLAlchemy Core` classes for Python.\n\n```python\ndef getorders():\n  \
    \  # create a SQLAlchemy engine using SQL Server dialect\n    engine = create_engine(\"\
    mssql+pyodbc:///?odbc_connect=%s\" % connectionString)\n    # initialize metadata\
    \ repository\n    metadata = MetaData()\n    # define metadata for result sets\n\
    \    orders = Table('Orders', metadata,\n        Column('orderid', Integer, primary_key=True),\n\
    \        Column('customerid', Integer),\n        Column('orderdate', Date),\n\
    \        schema='Sales'\n    )\n    customers = Table('Customers', metadata,\n\
    \        Column('customerid',Integer,primary_key=True),\n        Column('customername',String),\n\
    \        schema='Sales'\n    )\n    # define our query using a SQL-like syntax\n\
    \    s = select([orders.c.orderid,orders.c.orderdate,customers.c.customername]).\\\
    \n        select_from(orders.join(customers, orders.c.customerid==customers.c.customerid)).\\\
    \n        limit(10)\n    try:\n        # open the connection to the database\n\
    \        cnn = engine.connect()\n        # execute SQLAlchemy command\n      \
    \  res = cnn.execute(s)\n        # iterate on results\n        for row in res:\n\
    \            print(row)\n        # close the connection\n        cnn.close()\n\
    \    except Exception as e:\n        print (e)\n        pass\n```\n\n*Listing\
    \ 3-8*  \nUsing SQLAlchemy in a Python application"
  raw: '## Handling exceptions


    Opening of a connection to a data source and the execution of commands are operations
    naturally subject to the occurrence of errors, which can range from the lack of
    network connectivity to the server up to the violation of some rules for maintaining
    data integrity, coded within the database (primary key, relationships, etc.) or
    even concurrency management (e.g., locking/blocking) within your application or
    during maintenance operations (complete list of database engine error codes is
    available here: [`https://aka.ms/eaerde`](https://aka.ms/eaerde)). It is therefore
    necessary to provide, for your application code performing database interactions,
    an adequate interception mechanism and management of error conditions.


    Most programming languages and frameworks implement exception handling through
    the try/catch (or except) approach. In the try block, you generally put the instructions
    that are presumed to generate exceptions, such as opening the connection, executing
    a command, or calling a component which in turn can generate an application exception.
    If one of these operations fails, application control passes to the first catch/except
    block which specifies an exception type compatible with the one that occurred.
    Generally, those exception types provide all the information concerning the specific
    operation failed; this information is then made available in the catch block so
    you can code a proper logic on how to manage it.


    In T-SQL language (e.g., within a Stored Procedure), in addition to errors potentially
    generated by command interacting with database objects (e.g., a primary key constraint
    violation), you can also generate exceptions that represent a logical error in
    your procedure through the *RAISERROR* or *THROW* functions, so that your application
    can behave accordingly.


    You can pass an error message, severity level, and code to the RAISERROR function,
    and depending on the severity, client providers will act accordingly:


    *   Level 10 or below, connection is not interrupted, and no exceptions are generated.
    Messages can still be collected from the client driver.


    *   From 11 to 19, the connection remains open, but an exception is thrown.


    *   Beyond 19 are considered fatal errors, an exception is thrown, and connection
    is terminated.


    For Azure SQL, errors generated with a severity level equal or less than 10 do
    not really generate an exception but are considered as a simple informational
    or warning message. Driver libraries are capturing this information through specific
    classes (e.g., *InfoMessage* for *.NET Provider for SQL Server*) together with
    proper exception collection.


    At the very minimum, you’ll also want to use these details about the error condition
    as part of your logging strategy for further analysis from the operations team
    in charge or running your application. Other than that, you’ll have to decide
    what option between just retrying the operation (as described in the retry logic
    section) and returning the information back to the caller is the most correct,
    so that one can take appropriate decisions on the best course of action for each
    specific use case.


    ## Frameworks, ORM, and MicroORM


    So far, we mentioned that client drivers are generally providing base abstractions
    to connect, query, and consume results from Azure SQL database instances. That
    said, application developers in most cases are typically looking at higher-level
    abstractions to help them be more productive and eliminate recurring and potentially
    error-prone data access tasks, like representing and interacting with data entities
    in their application logic.


    To achieve higher productivity, a number of data access frameworks have been created
    of the last 20 years or such that could be grouped in two main buckets:


    *   Helper classes that just wrap those base abstractions and simplify common
    tasks


    *   Object-Relational Mappers (ORM), providing rich data modeling and mapping
    capabilities to reduce the impedance mismatch between relational structures and
    object-oriented programming


    The following table represents a (non-exhaustive) list of some of the most popular
    libraries in the market by programming language:


    | **Language** | **Recommended/popular libraries** |

    | --- | --- |

    | .NET | • Datasets• Entity Framework (Core)• Dapper |

    | Java | • Spring Data• Hibernate |

    | PHP | • Doctrine• Eloquent |

    | Node.js | • RxDB• TypeORM• Sequelize |

    | Python | • SQLAlchemy• Django• pandas |

    | Ruby | • ActiveRecord |

    | Go | • Gorm |


    In the next sections, we’ll dig deeper into some of them.


    ### Data access frameworks


    Although basic abstractions will generally take control of every possible aspect
    of your database interactions, they may require a lot of boilerplate code in your
    application to transform objects and structures representing higher-level entities
    in your logic into rows and columns within your database structure.


    Over the years, a number of libraries and frameworks have been created to simplify
    this issue while still letting you control how your code interacts with your data.
    As a practical example, in the .NET space, ADO.NET Provider for SQL Server provides
    from the very first release, together with *SqlConnection*, *SqlCommand* , and
    *SqlDataReader* classes (representing what is usually referred to as the “connected”
    portion of SqlClient library), a number of other classes are provided to interpret
    and navigate through query results in a more “object-oriented” fashion, but also
    to take care of persisting back to the underlying database whatever change has
    been made to original data. I’m referring to classes as *SqlDataAdapter* and *DataSet*
    (typed or untyped). *DataSet* is an in-memory representation of resultsets populated
    from the scratch in your code or returned from one or more queries to the database
    and provides additional logic around offline change tracking, data validation,
    and relationship management between entities. *SqlDataAdapter* acts as a “connector”
    between *DataSets* and database objects and can both automatically generate T-SQL
    commands that take changes applied to in-memory data and persist them in the back-end
    database or leverage existing commands and Stored Procedures to control all aspects
    of these database operations for performance or concurrency reasons. DataSets
    can also be automatically generated from a database schema and become fully typed
    objects exposing internal resultsets as named collections (e.g., Customers, Orders,
    etc.) instead of rows and columns. To discover more about these options, you can
    find complete coverage at this link: [`https://aka.ms/dnfado`](https://aka.ms/dnfado).


    Similar helper classes are very popular on other programming frameworks as well.
    Examples can be Spring Data Access for Java ([`https://aka.ms/sfrda`](https://aka.ms/sfrda))
    or SQLAlchemy Core classes for Python.


    ```

    def getorders():

    # create a SQLAlchemy engine using SQL Server dialect

    engine = create_engine("mssql+pyodbc:///?odbc_connect=%s" % connectionString)

    # initialize metadata repository

    metadata = MetaData()

    # define metadata for result sets

    orders = Table(''Orders'', metadata,

    Column(''orderid'', Integer, primary_key=True),

    Column(''customerid'', Integer),

    Column(''orderdate'', Date),

    schema=''Sales''

    )

    customers = Table(''Customers'', metadata,

    Column(''customerid'',Integer,primary_key=True),

    Column(''customername'',String),

    schema=''Sales''

    )

    # define our query using a SQL-like syntax

    s = select([orders.c.orderid,orders.c.orderdate,customers.c.customername]).\

    select_from(orders.join(customers, orders.c.customerid==customers.c.customerid)).\

    limit(10)

    try:

    # open the connection to the database

    cnn = engine.connect()

    # execute SQLAlchemy command

    res = cnn.execute(s)

    # iterate on results

    for row in res:

    print(row)

    # close the connection

    cnn.close()

    except Exception as e:

    print (e)

    pass

    Listing 3-8

    Using SQLAlchemy in a Python application

    ```'
  trans: "\n## 异常处理\n\n打开到数据源的连接和执行命令这些操作，自然可能会发生错误。错误范围可能从服务器网络连接缺失，到违反某些维护数据完整性的规则（这些规则编码在数据库中，如主键、关系等），甚至包括应用程序中或维护操作期间的并发管理问题（例如，锁定/阻塞）（数据库引擎错误代码的完整列表可在此处查阅：[`https://aka.ms/eaerde`](https://aka.ms/eaerde)）。因此，有必要为执行数据库交互的应用程序代码，提供一种适当的拦截机制和错误状况管理方案。\n\
    \n大多数编程语言和框架都通过 try/catch（或 except）方法实现异常处理。在 try 块中，你通常会放置那些预计可能生成异常的指令，例如打开连接、执行命令，或者调用一个本身也可能生成应用程序异常的组件。如果这些操作中的某一个失败，应用程序控制权将传递给第一个\
    \ catch/except 块，该块指定了与已发生异常兼容的异常类型。通常，这些异常类型提供了有关失败的具体操作的所有信息；这些信息随后在 catch 块中可用，以便你能够编写适当的逻辑来处理它。\n\
    \n在 T-SQL 语言中（例如，在存储过程内部），除了可能由与数据库对象交互的命令（例如，违反主键约束）生成的错误之外，你还可以通过使用 `RAISERROR`\
    \ 或 `THROW` 函数生成表示过程中逻辑错误的异常，从而使你的应用程序能够相应地做出行为反应。\n\n你可以向 `RAISERROR` 函数传递错误消息、严重级别和代码，根据严重程度，客户端提供程序将相应地采取行动：\n\
    \n*   级别 10 或更低，连接不会中断，也不会生成异常。消息仍然可以从客户端驱动程序收集。\n*   级别 11 到 19，连接保持打开状态，但会抛出异常。\n\
    *   超过 19 的级别被视为致命错误，会抛出异常，并且连接会被终止。\n\n对于 Azure SQL，严重级别等于或小于 10 生成的错误实际上并不生成异常，而是被视为简单的信息性消息或警告消息。驱动程序库通过特定的类（例如，*.NET\
    \ Provider for SQL Server* 中的 `InfoMessage`）以及适当的异常收集机制来捕获此信息。\n\n至少，你还需要将这些关于错误状况的详细信息作为日志记录策略的一部分，供负责运行你的应用程序的运维团队进行后续分析。除此之外，你必须决定是仅重试操作（如重试逻辑部分所述）还是将信息返回给调用者，哪种选择更为正确，以便能够针对每个特定用例做出关于最佳行动方案的适当决策。\n\
    \n## 框架、ORM 和 MicroORM\n\n到目前为止，我们提到客户端驱动程序通常提供基础的抽象层来连接、查询和使用 Azure SQL 数据库实例的结果。话虽如此，在大多数情况下，应用程序开发人员通常寻求更高级别的抽象，以帮助他们提高工作效率，并消除重复且可能容易出错的数据访问任务，例如在他们的应用程序逻辑中表示数据实体并与之交互。\n\
    \n为了实现更高的生产力，在过去大约 20 年里创建了许多数据访问框架，它们可以分为两大类：\n\n*   辅助类：仅封装这些基础抽象并简化常见任务\n*\
    \   对象关系映射器（ORM）：提供丰富的数据建模和映射能力，以减少关系结构与面向对象编程之间的阻抗不匹配\n\n下表按编程语言列出了一些市场上最流行（非详尽）的库：\n\
    \n| **语言** | **推荐/流行的库** |\n| --- | --- |\n| .NET | • 数据集• Entity Framework (Core)• Dapper\
    \ |\n| Java | • Spring Data• Hibernate |\n| PHP | • Doctrine• Eloquent |\n| Node.js\
    \ | • RxDB• TypeORM• Sequelize |\n| Python | • SQLAlchemy• Django• pandas |\n\
    | Ruby | • ActiveRecord |\n| Go | • Gorm |\n\n在接下来的章节中，我们将更深入地探讨其中一些。\n\n### 数据访问框架\n\
    \n虽然基础抽象通常会控制数据库交互的每个可能方面，但它们可能需要在你的应用程序中编写大量样板代码，以将逻辑中表示更高级别实体的对象和结构转换为数据库结构中的行和列。\n\
    \n多年来，创建了许多库和框架来简化这个问题，同时仍然让你控制代码如何与数据交互。举一个实际例子，在 .NET 领域，`ADO.NET Provider for\
    \ SQL Server` 从第一个版本开始就提供了除了 `SqlConnection`、`SqlCommand` 和 `SqlDataReader` 类（通常被称为\
    \ SqlClient 库的“连接”部分）之外的其他许多类。这些类用于以更“面向对象”的方式解释和导航查询结果，同时也负责将原始数据所做的任何更改持久化回底层数据库。我指的是像\
    \ `SqlDataAdapter` 和 `DataSet`（类型化或非类型化）这样的类。`DataSet` 是从代码中从头填充或从对数据库的一次或多次查询返回的结果集的内存中表示，它提供了围绕离线更改跟踪、数据验证以及实体间关系管理的额外逻辑。`SqlDataAdapter`\
    \ 充当 `DataSet` 和数据库对象之间的“连接器”，既可以自动生成获取对内存数据的更改并将其持久化到后端数据库的 T-SQL 命令，也可以利用现有的命令和存储过程来出于性能或并发原因控制这些数据库操作的所有方面。数据集也可以从数据库架构自动生成，并成为完全类型化的对象，将内部结果集作为命名集合（例如，Customers、Orders\
    \ 等）而不是行和列来公开。要了解更多关于这些选项的信息，你可以在此链接找到完整的介绍：[`https://aka.ms/dnfado`](https://aka.ms/dnfado)。\n\
    \n类似的辅助类在其他编程框架中也非常流行。例如 Java 的 `Spring Data Access` ([`https://aka.ms/sfrda`](https://aka.ms/sfrda))\
    \ 或 Python 的 `SQLAlchemy Core` 类。\n\n```python\ndef getorders():\n    # 使用 SQL\
    \ Server 方言创建 SQLAlchemy 引擎\n    engine = create_engine(\"mssql+pyodbc:///?odbc_connect=%s\"\
    \ % connectionString)\n    # 初始化元数据存储库\n    metadata = MetaData()\n    # 为结果集定义元数据\n\
    \    orders = Table('Orders', metadata,\n        Column('orderid', Integer, primary_key=True),\n\
    \        Column('customerid', Integer),\n        Column('orderdate', Date),\n\
    \        schema='Sales'\n    )\n    customers = Table('Customers', metadata,\n\
    \        Column('customerid',Integer,primary_key=True),\n        Column('customername',String),\n\
    \        schema='Sales'\n    )\n    # 使用类 SQL 语法定义我们的查询\n    s = select([orders.c.orderid,orders.c.orderdate,customers.c.customername]).\\\
    \n        select_from(orders.join(customers, orders.c.customerid==customers.c.customerid)).\\\
    \n        limit(10)\n    try:\n        # 打开到数据库的连接\n        cnn = engine.connect()\n\
    \        # 执行 SQLAlchemy 命令\n        res = cnn.execute(s)\n        # 遍历结果\n  \
    \      for row in res:\n            print(row)\n        # 关闭连接\n        cnn.close()\n\
    \    except Exception as e:\n        print (e)\n        pass\n```\n\n*列表 3-8*\n\
    在 Python 应用程序中使用 SQLAlchemy\n"
- fmt: 'In this simple example, you can see how SQLAlchemy lets us define in-memory
    representation of our application entities and how they map to database tables.
    Using an app-level SQL-like syntax, we can then specify our query containing advanced
    operations like joins, filters, aggregations, projections, and so on, and SQLAlchemy
    classes will translate this into a SQL syntax specific for Azure SQL, but you
    could easily port the same code to connect to other supported database systems
    as well. While SQLAlchemy can do much more (we’ve just scratched the surface here),
    its most advanced features more than just a data access framework belong to the
    realm of Object-Relational Mappers, which is the topic of the next section.


    ## ORMs


    The purpose for an ORM is to mediate between the relational and object-oriented
    worlds and let developers to write applications that interact with data stored
    in relational databases using typed objects that represent the application’s domain
    and reducing the need for data access redundant (or “plumbing”) code that they
    usually need to write. The following table recaps various ORM libraries you can
    use to connect with Azure SQL:


    | **Language** | **Platform** | **ORM(s)** |

    | --- | --- | --- |

    | C# | Windows, Linux, macOS | Entity Framework |

    | Entity Framework Core |

    | Java | Windows, Linux, macOS | Hibernate ORM |

    | PHP | Windows, Linux, macOS | Laravel (Eloquent) |

    | Doctrine |

    | Node.js | Windows, Linux, macOS | Sequelize ORM |

    | Python | Windows, Linux, macOS | Django |

    | Ruby | Windows, Linux, macOS | Ruby on Rails |


    One of the first and most successful libraries in this space is Java’s Hibernate
    ([`https://aka.ms/horm`](https://aka.ms/horm)) appeared in the early 2000s, with
    the goal of providing a better experience than Enterprise Java Beans entities
    to persist data into databases without necessarily using SQL commands. Over the
    years, these libraries became much more powerful and complex (for some people,
    even too complex, so that alternatives like “micro-ORM” libraries have been created)
    to cover other aspects of the data access tier like modeling, security, and scalability.


    Microsoft’s own ORM for .NET world is Entity Framework (EF), and its more recent
    release is EF Core ([`https://aka.ms/ghdnefc`](https://aka.ms/ghdnefc)). EF Core
    works with several back-end database stores like SQL Server, Azure SQL Database,
    SQLite, Azure Cosmos DB, MySQL, PostgreSQL, and other databases through a provider
    plug-in API. It’s the result of 10+ years of development in this space and provides
    features like LINQ queries, offline change tracking, batched updates, and database
    schema management through a feature named “migrations.”


    The core of this library is the `DbContext` class that developers can use to create
    their database interaction context and model how database tables will be mapped
    to entities and collections and how operations against these entities will be
    transparently transformed into SQL code to read, create, or update records within
    a database.


    ```

    using(var dbctx = new WWImportersContext())

    {

    var res = dbctx.Orders

    .Include("Customer")

    .Select (o => new

    {o.OrderID,o.OrderDate,o.Customer.CustomerName})

    .ToList().Take(10);

    foreach(var o in res)

    {

    Console.WriteLine("OrderId: {0} - OrderDate: {1} - CustomerName: {2}",o.OrderID,o.OrderDate,o.CustomerName);

    }

    }

    class Order

    {

    public int OrderID {get;set;}

    public DateTime OrderDate {get;set;}

    public int CustomerID {get;set;}

    public Customer Customer {get;set;}

    }

    class Customer

    {

    public int CustomerID {get;set;}

    public String CustomerName {get;set;}

    }

    class WWImportersContext : DbContext

    {

    // Model building deliberately omitted in this fragment

    public DbSet Orders {get;set;}

    public DbSet Customers {get;set;}

    }

    Listing 3-9

    Using Entity Framework Core in a C# application fragment

    ```


    Let’s focus on the three key aspects of this simple example:


    *   First, the two POCO (plain old CLR objects) classes `Order` and `Customer`
    that represent the business entities managed by our application.


    *   `WWImportersContext` class, inheriting from `DbContext`, which represents
    the context our app is using to connect and query the database. Specifically,
    it does contain the two `DbSet` collections that are mapped to database tables.


    *   The LINQ query that interacts with the database context and expresses what
    entities we want to retrieve.


    As you can notice in the complete example (see GitHub repo for that), it’s interesting
    to see how our `WWImportersContext` class overrides the `OnConfiguring` and `OnModelCreating`
    methods of its base class to do exactly what their names imply: configuring the
    way our context communicates with the database and defining a model where our
    entities map to respective database tables. We also configured the logging infrastructure
    to show how the resulting T-SQL code automatically generated by the context looks
    like. Pretty straightforward, isn’t it?


    Entity Framework Core can do much more, and you can start familiarizing with all
    these capabilities through this free Microsoft Learn online course ([`https://aka.ms/lmpsefc`](https://aka.ms/lmpsefc)).


    “With great power comes great responsibility,” so there are some basic good practices
    that you should always keep in mind to get the most out of ORM tools like EF Core:


    *   First of all, make sure you’re pulling from the database only the data you
    really need and making your resultset as efficient as possible.


    *   If your application only needs to materialize objects based on query results
    and display them on a screen, but will never modify and update them, switch change
    tracking off. This will avoid wasting lots of application resources to track object
    state information you will never use.


    *   If instead your application will create or update many entities within your
    database context, make sure you’re leveraging batching (e.g., calling the `AddRange()`
    method on your `DbSet` collections). EF Core will then behind the scenes create
    a Table-Valued Parameter (TVP) and use it in a MERGE statement to insert multiple
    rows in a single database roundtrip. This is providing many benefits for Azure
    SQL both in terms of reduced latency and minimizing transaction log pressure.
    For very large bulk operations (in the >10,000s rows ballpark), you may want to
    perform them outside of Entity Framework (e.g., using ADO.NET’s `SqlBulkCopy`
    class) or use a nice EF Core extension called EFCore.BulkExtensions ([`https://aka.ms/efcbe`](https://aka.ms/efcbe)).


    *   Where possible, turn on logging and validate T-SQL syntax generated by EF
    Core.


    *   In case of complex database interactions, using raw SQL commands or Stored
    Procedures through EF Core can solve performance and flexibility issues.'
