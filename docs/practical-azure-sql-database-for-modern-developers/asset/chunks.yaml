    [ColorID] = 99;

    ```


    Azure SQL 会自动对你的数据执行备份，并允许你将其恢复到过去 7 到 35 天内的任何时间点（具体取决于你使用的服务）。这没有额外费用。即使你误删除了所有内容，你也能够轻松地将其恢复到意外操作发生之前的状态。


    ### 合并数据


    Merge 是一个允许你同时执行插入、更新和删除的命令，以便将一组数据合并到现有数据中。包含要合并到另一个表中的数据的表是你的源表，而另一个表是目标表。通过将源表合并到目标表中，根据你在
    `MERGE` 命令中指定的内容，可能会发生以下情况：


    *   存在于源表中但不存在于目标表中的所有行将被插入到目标表中。

    *   存在于两个表中的所有行将在源表中被更新。

    *   存在于目标表中但不存在于源表中的所有行将从目标表中被删除。


    我说“可能”，因为你完全控制插入、更新和删除操作是否以及如何发生，甚至是否会发生：


    ```

    MERGE INTO

    [Warehouse].[Colors] AS [target]

    USING

    (VALUES

    (50, ''Deep Sea Blue''),

    (51, ''Deep Sea Light Blue''),

    (52, ''Deep Sea Dark Blue'')

    ) source

    ON

    [target].[ColorID] = [source].[Id]

    WHEN MATCHED THEN

    UPDATE SET [target].[ColorName] = [source].[Name]

    WHEN NOT MATCHED THEN

    INSERT ([ColorID], [ColorName], [LastEditedBy]) VALUES ([source].Id, [source].[Name],
    1)

    WHEN NOT MATCHED BY SOURCE AND [target].[ColorID] BETWEEN 50 AND 100 THEN

    DELETE

    ;

    ```


    在 `MERGE INTO` 之后，是目标表。`USING` 指明了源是什么。在这个例子中，代码使用了一个表值构造函数来动态创建一个表，并用别名 `source`
    标记它。因此，这个表是完全临时的，一旦语句执行完毕就会消失；它还要求你指定其列的名称，因为没有任何地方有元数据可以确定这些名称。数据类型将从提供的值中自动推断。


    `ON` 部分与 `JOIN` 的使用方式非常相似，它定义了 Azure SQL 所需的规则，以理解如何将来自源的行与目标中的行进行匹配。在示例中，我们使用了源的
    `Id` 和目标的 `ColorId`。之后，你必须告诉 `MERGE` 在匹配时以及在不匹配时该怎么做：


    *   `WHEN MATCHED` – 如果源表和目标表的行之间存在匹配，代码将使用源表中 `Color` 列的相关值更新目标表中的 `ColorName`
    列。

    *   `WHEN NOT MATCHED` – 如果目标表中没有 `ColorID` 也存在于源表中的行，则这些行将从源中取出并插入到目标中。

    *   `WHEN NOT MATCHED BY SOURCE` – 如果目标表包含一些 `ColorID` 不存在于源表中的行，这些行将从目标中被删除。该示例添加了一个额外的谓词来更好地定义范围。不仅目标中的
    `ColorID` 必须不存在于源中，而且 `ColorID` 值还必须介于 50 到 100 之间。这意味着，例如，源表中 `ColorID` 值从 0
    到 49 的所有行将不会被删除，因为它们超出了已定义规则的范围。


    ### 其他有用功能


    到目前为止，已经讨论了基本概念。它们足以开始创建出色的解决方案，但还有一些更多功能你希望立即开始使用，因为它们在多种不同场景下有助于简化代码，并提高解决方案的性能和并发性。

    '
- fmt: '## Output clause: inserted and deleted virtual tables


    Returning to the application the result of an `INSERT`, `UPDATE`, or `DELETE`
    (or `MERGE`) operation is a very common requirement. For example, let’s say that
    in the API solution you’re creating, you accept updates to your entities via an
    HTTP `PUT` method. The API you created will apply the new data received via `PUT`
    to the database using an `UPDATE` or `MERGE` statement. To follow an established
    good practice, you want to return the full entity as a result of the `PUT` request,
    so that the caller can have the fully updated entity without the need to issue
    a dedicated `GET` request.


    This would mean to do something like the following:


    ```

    UPDATE

    [Warehouse].[Colors]

    SET

    [ColorName] = ''Unknown''

    WHERE

    [ColorID] = 99;

    SELECT

    [ColorID],

    [ColorName],

    [LastEditedBy],

    [ValidFrom],

    [ValidTo]

    FROM

    [Warehouse].[Colors];

    ```


    The problem with the preceding code is that, on a highly concurrent system, it
    could happen that between the `UPDATE` and the subsequent `SELECT`, another connection
    could apply some changes to the data, which is a behavior that in general you
    want to avoid. A deeper discussion on this will be done in the chapter dedicated
    to transactions, but in the meantime, you can see that the problem comes from
    the fact that we have two different commands that we want to execute one after
    the other, without anything in between, just like if they were just one logical
    operation.


    A very elegant, scalable, and performant way to solve this issue is to ask the
    `UPDATE` command to also generate an output, so everything will be executed as
    *one* command and the problem would be solved right at the root.


    The `OUTPUT` statement does exactly this:


    ```

    UPDATE

    [Warehouse].[Colors]

    SET

    [ColorName] = ''Unknown''

    OUTPUT

    [Inserted].[ColorID],

    [Inserted].[ColorName],

    [Inserted].[LastEditedBy],

    [Inserted].[ValidFrom],

    [Inserted].[ValidTo],

    WHERE

    [ColorID] = 99;

    ```


    The result will be the equivalent of the code with the separate `UPDATE` and `SELECT`
    statement, but without the described potential issue.


    `Inserted` is a virtual table that exists only for the duration of the statement
    that uses it. The `Inserted` virtual table gives access to the data as it is as
    *after* it has been modified; there is also a `Deleted` virtual table that gives
    access to data as it was *before* the modification took place.


    As an `UPDATE` statement can be thought of as a logical pair of `DELETE`/`INSERT`
    statements, the `UPDATE` allows you to use both virtual tables. An `INSERT` statement
    will give you access only to the `Inserted` virtual table and, of course, the
    `DELETE` statement only to the `Deleted` virtual table. The `MERGE` statement,
    obviously, will give access to both `Inserted` and `Deleted` virtual tables too.


    ## Identity and sequences


    When you need to create an Id number to be assigned to an entity or a row, usually
    to easily uniquely identify it, you may do it in your application or you can rely
    on the database to do it. Using the database will make sure that by default no
    two equal Ids can be generated simplifying your code a lot.


    In Azure SQL, there are two ways you can use to achieve this. One is using the
    `IDENTITY` feature, which exists mostly for backward compatibility purposes. When
    you create a table, you can elect one integer column to be an identity column.
    This means that Azure SQL will generate values for that column automatically for
    you, every time a new row is inserted:


    ```

    CREATE TABLE dbo.SampleID

    (

    Id INT IDENTITY(1,1) NOT NULL,

    OtherColums NVARCHAR(10) NULL

    );

    ```


    `IDENTITY(1,1)` means that numbers will be generated starting by one and incremented
    by one.


    While it worked nicely for many years, it has two main disadvantages. The first
    is that you *cannot* manually provide a value for that column when executing an
    `INSERT` command, unless you temporarily disable the identity behavior using a
    specific `SET` option. Not exactly user-friendly. The second, more importantly,
    is that if you have more than one table with an identity column (and this could
    be pretty common), they won’t be aware of the existence of each other and thus
    different tables will have rows with the same Id values. This may not be a big
    deal, but sometimes you want to have rows that could be uniquely identified throughout
    all the database or at least among a group of logically related tables.


    ### The SEQUENCE object


    A *sequence* is exactly what you need to overcome old limitations and to get all
    the flexibility you need. A sequence is created at the database level and can
    be used anywhere you need:


    ```

    CREATE SEQUENCE dbo.BookSequence

    AS BIGINT

    START WITH 1

    INCREMENT BY 1;

    CREATE TABLE dbo.SampleID

    (

    Id INT NOT NULL DEFAULT(NEXT VALUE FOR dbo.BookSequence),

    OtherColums NVARCHAR(10) NULL

    );

    ```


    With this approach, you can decide if you want to use the automatically generated
    value or provide one of your own when writing your `INSERT` statement, without
    having to set any specific option before executing it.


    Sequences also offer in general better performances and more control on how numbers
    are generated. You can even *reserve* numbers if you need to.


    So, if you are starting to create a new database, the recommendation is to use
    one or more `SEQUENCE` to generate your Ids. Just keep in mind that neither `IDENTITY`
    nor `SEQUENCE` will give you any guarantee that no duplicate numbers will be generated:
    you can always reset the number generator and start from an already generated
    number. The `SEQUENCE` command even allows you to automatically restart from the
    beginning once a certain value has been reached, as sometimes this ability to
    cycle among a set of defined numbers could be very useful.


    A sequence can be dropped using the `DROP SEQUENCE` command:


    ```

    DROP SEQUENCE dbo.BookSequence;

    ```


    ## Top and Offset/Fetch


    Sometimes, especially if you are just exploring data, you don’t really need to
    get all the data in a table. This is particularly true on big tables and even
    more as we’re talking about a database in the cloud. There is no point moving
    around huge amounts of data if you’re not really using it. Just the first 100
    rows, for example, could be good enough to peek at the data you have to work with.


    Another reason you want to limit the number of rows returned to a specific amount
    is because you want to paginate the data. For example, supporting pagination would
    be a common requirement if you are implementing a `REST API` that must expose
    an `ODATA` endpoint.


    In Azure SQL, you have two options to make sure that only the requested number
    of rows are returned: `TOP` and the pair `OFFSET/FETCH` .


    `TOP` is the easiest to use but also the most limited one. `OFFSET/FETCH` is a
    bit more complex but gives you more flexibility and makes pagination very easy
    to implement:


    ```

    SELECT TOP (50)

    *

    FROM

    [Sales].[Orders]

    ORDER BY

    [ExpectedDeliveryDate] DESC;

    ```


    The preceding code will return the first 50 ordered by `ExpectedDeliveryDate`
    in descending order.


    The next code sample will do the same, but thanks to the offset option, it will
    skip the first 50 rows and will return the next 50. Basically, if you have a page
    size set to 50 for the pagination feature you’re implementing, the code is effectively
    returning the second page of data. If `OFFSET` would have been set to 0, it would
    have produced the same results as `TOP`, but as you can see, `OFFSET/FETCH` provides
    a bit more flexibility. From a performance point of view, they are exactly the
    same:


    ```

    SELECT

    *

    FROM

    [Sales].[Orders]

    ORDER BY

    [ExpectedDeliveryDate] DESC

    OFFSET

    50 ROWS

    FETCH

    NEXT 50 ROWS ONLY

    ```


    ## Aggregations


    Azure SQL offers extensive support for aggregations so that you can efficiently
    write queries that can aggregate and analyze datasets using the most advanced
    optimization techniques. You can get great performance while keeping the complexity
    of the code you need to write at the lowest level possible.'
