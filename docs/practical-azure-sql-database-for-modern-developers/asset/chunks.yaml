  trans: '

    ## 事务


    ### 理解事务与 ACID 属性


    事务是给定应用逻辑中的工作单元，可能由多个较低层级的任务组成。事务也被称为“工作单元”，这是一种非常知名的模式，用于跟踪更改，并将更改作为一个整体在逻辑上提交或回滚，正如马丁·福勒在其*企业应用架构模式*一书中所描述的那样。


    数据库系统在处理事务时，会维护所谓的`ACID`属性（`原子性`、`一致性`、`隔离性`和`持久性`），以确保数据的完整性和准确性。事务业务逻辑的典型示例可以是银行账户之间的转账或
    ATM 现金取款，在这些场景中，你希望确保一系列操作遵循“全有或全无”的逻辑进行。数据库平台有助于强制执行这些`ACID`属性，而无需从应用角度进行复杂的实现：开发人员无需手动实现逻辑来在至少一个更新失败时恢复更新操作。


    ### 事务在任何应用中的重要性


    现在，你可能对这个示例非常熟悉，并且可能认为自己不会编写银行应用，因此并不真正需要事务。虽然这种想法表面上看起来正确，但请记住，即使在最简单的应用中，比如一个博客引擎，你也可能有使用事务的需求。


    假设你想跟踪有多少人访问了你的博客，既要统计整个博客的访问量，也要统计你写的每篇文章的访问量。由于你希望确保能够根据需要无限扩展，你设置了两个计数器：一个用于整个博客，一个用于每篇文章。每次有人访问页面时，你都需要增加整个网站的计数器和该页面的计数器。如果你没有正确实现和管理事务，会发生什么？


    可能会发生这样的情况：由于某种原因，在网站计数器更新后但在文章计数器更新前，某个环节崩溃了。这意味着你现在已经完全丢失了信息。一致性不复存在。如果你尝试将所有单个计数器相加，结果将与网站计数器不同。那么哪个值是正确的呢？你可能——也许——能够投入大量的专注、时间和精力来重建信息。但在许多情况下，你根本无法做到。现在，对于博客计数器来说，这也许不是什么大问题（但即使这也不完全正确，如果你是按博客访问量获得报酬呢？），但它让你认识到一致性以及因此而来的事务的重要性，即使在你可能未曾想到的地方也是如此。数据一致性应该是每个系统的基石。没有它，数据就只是噪音。


    ### 如何实现 ACID 属性：预写式日志 (WAL)


    幸运的是，在现代数据库系统中，`ACID`属性通常通过预写式日志来实现，这是一种通过首先在事务日志中记录更改来提供原子性和持久性的能力，只有随后才通过一个称为`检查点`的周期性后台进程将更改写入数据库。日志通常同时存储重做和撤销信息，这些信息将用于恢复任何已提交但尚未写入数据库的事务，例如在从断电中恢复或数据库还原期间。


    > **注意**

    > 如果你是 Apache Kafka 用户，你可能会发现 WAL 技术与 Apache Kafka 使用的不可变日志原则有很多相似之处。在两种情况下，一切都作为事件存储在日志中。通过向前或向后读取日志，你可以重做或撤销任何操作，甚至可以停在期望的时间点。这正是像
    Azure SQL 这样的关系数据库管理系统向最终用户保证不会丢失任何数据、并且可以恢复一切及其期望时间点的原因。


    ### Azure SQL 中的事务：用例与机制


    在 Azure SQL 中，你可以想到几种使用事务会有所帮助的用例。例如，你可能希望将多个行的插入、更新或删除操作作为一个单元或批处理过程来执行，而不是逐个处理。同样，你可能需要在满足特定条件时才修改表的状态，即当相同或不同数据库（甚至服务器）中的其他表也被修改时。


    由于这些系统可以并发处理多个此类操作，Azure SQL 引擎通常会通过在这些事务涉及的各种资源（基表、索引键等）上放置锁来保护一致性，锁的粒度可以从单行到整个数据库不等，具体取决于并发（也称为隔离）设置是如何配置的。一旦事务提交或回滚，这些锁就会被释放。


    锁只是 Azure SQL 用来确保数据保持一致性的选项之一，可能是最简单的一种。另一种更复杂的能力是，允许同一行的多个不同版本同时保持活动状态，向请求的事务提供正确的版本，即使其他事务正在更改同一行，也能保证一致性。关于这种被称为`行版本控制`的技术的讨论，远远超出了本书的范围：只需记住，默认情况下，Azure
    SQL 会混合使用这两种技术，以确保你获得最佳的体验和性能。


    > **提示**

    > 尽可能缩短事务的持续时间是一种最佳实践，这将有助于增加数据库对象上的并发性，并减少维护锁或行版本所需的系统资源。


    ### 管理事务：控制与范围


    应用程序可以通过使用 Transact-SQL 命令或客户端驱动程序公开的 API 函数来控制事务，指定事务何时开始和结束（成功或失败）。事务通常在连接级别管理：当在某个连接上启动事务时，直到该事务结束前，在该连接上执行的所有
    Transact-SQL 语句都是该事务的一部分。


    > **注意**

    > 这种行为的一个例外是当您有一个多活动结果集 (`MARS`) 会话时。`MARS`是一项可以通过连接字符串属性启用的功能，它允许应用程序在同一个连接上已经存在一个活动结果集时，在该连接上执行命令。一个典型场景是，当你遍历`SELECT`查询检索到的一系列行，并且希望使用相同的连接执行`UPDATE`命令时。在这种情况下，事务的作用域将在批处理级别（而不是连接级别），当它完成时，如果事务没有显式提交或回滚，Azure
    SQL 将自动将其回滚。


    ### 显式模式与自动提交模式


    当你通过 API 函数（例如，.NET 语言中的`BeginTransaction()`方法）或发出`T-SQL`语句（如`BEGIN TRANSACTION`、`COMMIT
    TRANSACTION`、`COMMIT WORK`、`ROLLBACK TRANSACTION`或`ROLLBACK WORK`）显式定义事务的开始和结束时，Azure
    SQL 中的事务被定义为`显式`事务。


    当你没有显式启动事务，而是对 Azure SQL 执行单个命令时，默认模式称为`自动提交`。在这种模式下，每个`T-SQL`语句在完成时都会被提交或回滚。如果语句成功完成，则被提交；如果遇到任何错误，则被回滚。自动提交模式也是`ADO`、`OLE
    DB`、`ODBC`和`DB-Library`等客户端驱动程序操作的默认模式。

    '
- fmt: '# Transaction Modes


    The third mode we have is called `implicit`. In this mode, Azure SQL starts a
    new transaction after the current transaction is committed or rolled back. There
    is nothing to do to start off a transaction; you only commit or roll back each
    transaction. This last mode is mainly implemented for compliance and backward
    compatibility reasons. In most use cases, your applications will use auto-commit
    when executing simple database commands, and controlling complex transactions
    is not strictly needed. Switch to `explicit` mode is recommended when some more
    complex specific transactional behavior needs to be managed. Transaction mode
    settings are controllable at connection level by issuing an explicit T-SQL statement.
    Different client drivers may have different transaction mode default settings
    and are invoking T-SQL statements for you when a new connection is established,
    so it’s important to check in the documentation what’s the behavior of the one
    you’re using.


    ### Local transactions


    As an application developer, you will mostly interact with transactions executed
    within the context of a single Azure SQL database instance, and these are usually
    referred as *local transactions*, to differentiate from distributed transactions
    that we will discuss later on. In this scenario, local transactions are commonly
    used while wrapped in some more complex business logic inside a `Stored Procedure`,
    which is usually the recommended approach to keep transactions short in duration
    and avoid multiple roundtrips between application and database code. If, for whatever
    reason, you are not relying on `Stored Procedures` but are writing your database
    access command within your application code, you can control transactional behavior
    by invoking specific commands exposed through client drivers’ `APIs`.


    Here is an example of how to use explicit transactions within a T-SQL script like
    a `Stored Procedure`. In our system, there are two main tables: `Orders` and `Inventory`;
    every time a new order is placed for a given product, we need to decrement its
    quantity in stock. Business logic in our system must prevent placing a new order
    for an article that is running out of stock. Out of many ways of implementing
    such a logic, in our sample we’re wrapping both new order’s placement and decrementing
    the inventory for the same article in an explicit transaction:


    ```sql

    -- Create table structures

    CREATE TABLE dbo.Orders (ID int PRIMARY KEY, ProductID int, OrderDate datetime);

    CREATE TABLE dbo.Inventory (ProductID int PRIMARY KEY, QuantityInStock int

    CONSTRAINT CHK_QuantityInStock CHECK (QuantityInStock>-1));

    -- Fill up with some sample values

    INSERT INTO dbo.Orders VALUES (1,1,getdate());

    INSERT INTO dbo.Inventory VALUES (1,100);

    -- Begin an explicit transaction

    BEGIN TRANSACTION mytran

    -- Try executing the unit of work in app logic

    BEGIN TRY

    INSERT INTO Orders VALUES (2,1,getdate());

    UPDATE Inventory SET QuantityInStock=QuantityInStock-1 WHERE ProductID=1

    -- If both commands are successful, commit the transaction

    COMMIT TRANSACTION

    END TRY

    BEGIN CATCH

    -- If there is an error, capture the details

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    , ERROR_SEVERITY() AS ErrorSeverity

    , ERROR_STATE() AS ErrorState

    , ERROR_PROCEDURE() AS ErrorProcedure

    , ERROR_LINE() AS ErrorLine

    , ERROR_MESSAGE() AS ErrorMessage;

    -- Explicitly rollback the transaction

    ROLLBACK TRANSACTION

    END CATCH

    SELECT * FROM dbo.Orders

    SELECT * FROM dbo.Inventory

    ```


    In this script, after creating and filling a couple of tables, you can find the
    `BEGIN TRANSACTION` statement followed by an (optional) name.


    The `BEGIN TRY` block will try to execute all statements until the `END TRY`,
    and if they will all be executed without errors, the transaction will be permanently
    committed by the `COMMIT TRANSACTION` statement.


    ![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig1_HTML.jpg](images/493913_1_En_7_Chapter/493913_1_En_7_Fig1_HTML.jpg)


    Figure 7-1: Successful transaction results


    We now change the quantity in stock for our product and we set it to zero, as
    we want to test what happens when running out of stock, and then we try to run
    the transaction again:


    ```sql

    UPDATE dbo.Inventory SET QuantityInStock=0 WHERE ProductID=1

    ```


    ![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig2_HTML.jpg](images/493913_1_En_7_Chapter/493913_1_En_7_Fig2_HTML.jpg)


    Figure 7-2: Transaction rollback results


    In this case, an error will be thrown while executing the `UPDATE Inventory` statement
    as we are violating the `CHECK` constraint placed on the `QuantityInStock` attribute.
    Control will pass from with the `BEGIN TRY` block to the `BEGIN CATCH` block.
    In that block, we’re retrieving all the details related to the latest error happened
    in that session, but we’re also explicitly calling `ROLLBACK TRANSACTION` to make
    sure that modifications made to other tables as part of the same transaction,
    in the sample `INSERT INTO Orders` command, will not be persisted, and system’s
    state will be consistent.'
