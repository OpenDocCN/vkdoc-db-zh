    \n为事务命名是一种有用的做法，可以提高代码的可读性，并且，可能更重要的是，会反映在各种与事务相关的系统视图中，简化调试过程。`BEGIN TRANSACTION\
    \ [transaction_name]` 开始一个本地事务，但在进一步的诸如 `INSERT`、`UPDATE` 或 `DELETE` 等数据操作操作触发日志更新之前，实际上不会写入事务日志（尽管也可能发生其他活动，比如为保护\
    \ `SELECT` 语句的事务隔离级别而获取锁）。\n\n应用程序或脚本可以在另一个事务已经存在的情况下开始，甚至提交或回滚一个事务。Azure SQL\
    \ 并不真正提供对嵌套事务的直接支持，提交在另一个事务内打开的事务完全没有任何效果。只有外部事务才会真正控制其间在各个事务上执行的各种数据操作活动的结果，提交或回滚所有内容。作为应用程序开发人员，我们不应该使用这种方法，以避免误导性的行为和后果。\n\
    \n那么为什么允许嵌套事务呢？嗯，一个常见的使用场景是当你编写包含事务逻辑的存储过程时，这些过程可以单独调用，也可以从可能自身已经启动了事务的外部过程调用。一个好的做法是始终使用\
    \ `@@TRANCOUNT` 系统变量检查该连接上是否已经存在一个打开的事务，然后决定是启动一个新的事务，还是仅仅参与外部过程启动的事务，并用 `SAVE\
    \ TRANSACTION savepoint_name` 标记事务内部部分的开始。\n\n每次执行一个新的 `BEGIN TRANSACTION`，`@@TRANCOUNT`\
    \ 将增加 1。同样，每次执行 `COMMIT TRANSACTION`，它将减少 1。如果是 `ROLLBACK TRANSACTION`，所有事务都将被回滚，`@@TRANCOUNT`\
    \ 将被重置为零，唯一的例外是 `ROLLBACK TRANSACTION savepoint_name`，它不会以任何方式影响 `@@TRANCOUNT`\
    \ 计数器。\n\n事实上，当需要更复杂的事务逻辑时，开发人员可以在事务流中定义一个位置，以便在事务的一部分被条件性取消或回滚时返回：这通常被称为 *保存点*。如果事务回滚到一个保存点，使用\
    \ `ROLLBACK TRANSACTION savepoint_name`，那么控制流必须继续完成，可选择地根据需要执行更多的 T-SQL 语句，并使用\
    \ `COMMIT TRANSACTION` 语句来成功完成它。否则，它必须通过将事务回滚到其开始位置来完全取消。要取消整个事务，请使用 `ROLLBACK\
    \ TRANSACTION transaction_name` 形式。\n\n一个总结了所有这些概念的 T-SQL 示例如下。\n"
