  trans: "\n\n#### 筛选\n\n通常，你可能只想从数据库中获取少数几行，甚至只是一行。要筛选掉不需要的行，就必须使用 `WHERE` 子句。正如你在示例查询中所见，`WHERE`\
    \ 子句可以包含一个或多个筛选 `谓词`，这些谓词允许你指定对查询可用的任何列，你感兴趣的具体值是什么。`FROM` 子句或 `JOIN` 中指定的任何表的列都可以使用。\n\
    \n在 `WHERE` 子句中使用的值可以是字面量、变量、来自其他查询的数据集，或者函数调用的结果。这使你能够精确定位你想要处理的数据。\n\n#### 子查询\n\
    \n子查询是嵌套在另一个查询中的查询。就像在 Linux Shell 或 Windows PowerShell 中，你可以将一个命令的输出通过管道传递给另一个命令，从而轻松构建复杂的转换一样，Azure\
    \ SQL 也允许你做概念上类似的事情：\n\n```\nSELECT\n    OrderId,\n    OrderDate,\n    (SELECT\
    \ COUNT(*) FROM Sales.[OrderLines] AS ol\n        WHERE\n            ol.[OrderID]\
    \ = o.OrderId) AS OrderSize\nFROM\n    (SELECT * FROM Sales.[Orders] WHERE SalespersonPersonID\
    \ = 2) AS o\nWHERE\n    o.[CustomerID] IN\n    (\n        SELECT\n           \
    \ c.CustomerID\n        FROM\n            Sales.[Customers] AS c\n        WHERE\n\
    \            [CustomerName] = 'Daniel Martensson'\n    )\n    AND\n    OrderDate\
    \ >= '2015-01-01'\nORDER BY\n    [o].[OrderID];\n```\n\n在上面的示例中，有三个子查询。第一个用于 `FROM`\
    \ 子句，用于将订单限制为仅由特定销售人员生成的订单。然后 `WHERE` 子句中还有另一个子查询，将订单限制为仅由特定客户完成的订单。最后，第三个子查询位于\
    \ `SELECT` 列表中，用于通过计算每个订单中的行数来丰富结果。\n\n如果你已经有一些 SQL 语言经验，你可能会意识到，这个示例查询也可以使用一些连接（JOIN）来编写，而不是在\
    \ `FROM` 和 `WHERE` 子句中使用子查询。Azure SQL 查询优化器足够智能，也能意识到这一点，通常，无论查询以哪种方式编写，性能上都没有差异。\n\
    \n#### 公用表表达式\n\n公用表表达式，或简称 CTE，是子查询的一种改进替代方案。正如你可能猜到的，如果你有一个非常复杂的 SQL 语句，包含许多子查询，它会变得非常难以阅读。\n\
    \n另外，如果同一个子查询需要在同一个查询中使用两次，会发生什么？你最终会复制代码。但是，作为追求卓越的开发者，如果可能的话，我们不希望有任何代码重复。\n\
    \nCTE 正是我们组织代码所需要的，以便更容易理解，最重要的是，更容易修改和维护。CTE 是一个临时的查询定义，它的生命周期仅限于使用它的 `SELECT`、`INSERT`、`UPDATE`\
    \ 或 `MERGE` 语句的执行期间。\n\n以下是子查询段落中展示的相同代码，重写后使用 CTE 代替了子查询（在合理的地方）：\n\n```\nWITH\
    \ cteOrders AS\n(\n    SELECT * FROM Sales.[Orders] WHERE SalespersonPersonID\
    \ = 2\n),\ncteCustomers AS\n(\n    SELECT\n        c.CustomerID\n    FROM\n  \
    \      Sales.[Customers] AS c\n    WHERE\n        [CustomerName] = 'Daniel Martensson'\n\
    )\nSELECT\n    OrderId,\n    OrderDate,\n    (SELECT COUNT(*) FROM Sales.[OrderLines]\
    \ AS ol WHERE ol.[OrderID] = o.OrderId) AS OrderSize\nFROM\n    cteOrders AS o\n\
    INNER JOIN\n    cteCustomers c ON [c].[CustomerID] = [o].[CustomerID]\n    AND\n\
    \    OrderDate >= '2015-01-01'\nORDER BY\n    [o].[OrderID];\n```\n\n如你所见，在 `WITH`\
    \ 语句之后，定义了两个 CTE，一个名为 `cteOrders`，另一个名为 `cteCustomers`。在查询中每次引用这些名称时，就如同在那里放置了一个子查询。不同之处在于，代码变得更容易理解。我个人喜欢将\
    \ CTE 视为一种清晰地定义在主查询中需要处理哪些数据集的好方法：我可以在顶部定义这些集合，这样也更容易理解它们如何操作数据，然后我可以在任何需要的地方、根据需要多次引用它们，而无需重复输入相同的代码。\n\
    \n**记住**\nCTE 的生命周期仅限于定义它的查询的执行期间。如果你需要在其他查询中重用封装在 CTE 中的查询，你可能需要创建一个 `VIEW`（视图）或\
    \ `FUNCTION`（函数）。更多内容将在后续章节中介绍。\n\nCTE 也可以引用 CTE，因此你可以在保持代码非常清晰易读的同时创建非常复杂的查询。此外，CTE\
    \ 甚至可以引用自身，从而可以创建递归查询。当你需要处理具有层次结构的数据（例如树形结构）并希望遍历整棵树，但你不知道树有多深，因此需要一个“智能”算法，该算法仅在不再有数据可处理时才停止，而不仅仅是在经过一定次数的迭代后停止时，这会变得非常方便。\n\
    \n一个递归 CTE 的示例可在随附代码中找到。\n\n#### 联合\n\n如果你有两个查询，并且你想将它们的结果连接起来，只向用户返回一个结果集，你可以使用\
    \ `UNION` 语句：\n\n```\nWITH cteContacts AS\n(\n    SELECT\n        [CustomerID],\n\
    \        [PrimaryContactPersonID] AS ContactPersonId,\n        'Primary' AS [ContactType]\n\
    \    FROM\n        Sales.[Customers]\n    UNION\n    SELECT\n        [CustomerID],\n\
    \        [AlternateContactPersonID],\n        'Alternate' AS [ContactType]\n \
    \   FROM\n        Sales.[Customers]\n)\nSELECT\n    [ContactPersonId],\n    [ContactType]\n\
    FROM\n    [cteContacts] c\nWHERE\n    c.CustomerId = 42\n```\n\n该代码会将 `Sales.Customer`\
    \ 上的两个查询结果作为单个结果返回。为了无错误地工作，`UNION` 要求两个结果集必须具有兼容的架构。\n\n请记住，`UNION` 也会从结果集中移除任何重复值，因此这可能是一个相当耗费资源的过程。如果你事先知道不可能有重复值，或者你不在意重复值，那么你可以使用\
    \ `UNION ALL` 来代替，它更轻量级，因为它不需要查找并移除重复项。\n\n#### 分号\n\n所有 Azure SQL 语句都应以分号终止。虽然目前这不是强制性的，但它是一个最佳实践，因为它是\
    \ ANSI-SQL 92 标准的一部分，并且在未来的版本中将是必需的。事实上，即使在今天，某些命令也需要它才能正确执行。例如，CTE 的 `WITH` 语句必须是行的首语句。换句话说，这意味着前一条语句*必须*以分号终止。\n\
    \n#### Unicode 字符串\n\n你可能已经注意到字符串 `N'%red shirt%'` 前面有一个大写的 N。此前缀告诉 Azure SQL\
    \ 该字符串是一个 Unicode 字符串。\n\n"
- fmt: '### Adding data


    `INSERT INTO` 是用于向表中添加数据的命令。它非常易于使用，只需要三样东西：要添加数据的表、要操作的列以及要添加的值。


    例如，以下代码将向表 `Warehouse.Colors` 添加两行：


    ```

    INSERT INTO [Warehouse].[Colors]

    ([ColorID], [ColorName], [LastEditedBy])

    VALUES

    (50, ‘Deep Sea Blue’, 1),

    (99, ''Out of space'', 1);

    ```


    表可能有也可能没有其他列，但我们必须为指定的列提供值。正如你将了解到的，表可能有一些特定的约束以使某些列成为必需的，例如 `User` 表中的电子邮件；如果没有约束，对于表中存在但未在
    `INSERT` 语句中指定的所有列，将使用默认值或 `NULL` 值。


    除了手动指定值（如上一个示例所示）外，`INSERT` 也可以从 `SELECT` 语句中获取值，例如：


    ```

    INSERT INTO

    [Warehouse].[Colors]

    ([ColorID], [ColorName], [LastEditedBy])

    SELECT

    ColorID, ColorName, LastEditedBy

    FROM

    [External].[Colors]

    ```


    在这种情况下，你可能在另一个名为 `External.Colors` 的表中有数据，并且希望将其移动到 `Warehouse.Colors` 中。通过使用
    `INSERT FROM … SELECT`，你只需一条命令即可移动数据。


    ### Modifying data


    要更改表中现有的数据，可以使用 `UPDATE` 命令。与 `INSERT` 命令类似，你必须指定包含要更新数据的表以及要更新的每个列的新值。这是一个例子：


    ```

    UPDATE

    [Warehouse].[Colors]

    SET

    [ColorName] = N''Unknown'',

    [LastEditedBy] = 2

    WHERE

    [ColorID] = 99;

    ```


    `WHERE` 部分是可选的，但几乎总是被指定，因为它允许你限制更改的范围，否则更改将应用于表中的所有行。正如在“Retrieving data”部分中所解释的，`WHERE`
    子句将确保你能够精确地只定位要更新的行。


    字符 `N` 告诉 Azure SQL 用于更新表的文本是 Unicode 文本。你会注意到，即使不指定它，一切也会正常工作。这是因为 Azure SQL
    会执行隐式转换，自动将字符串转换为 Unicode 字符串。虽然在这种情况下没有坏处，但隐式转换会严重影响性能，因此请确保数据类型正确，尤其是在使用 `WHERE`
    谓词或 `JOIN` 子句时。


    ### Removing data


    要从表中删除数据，可以使用 `DELETE` 命令。对于此命令，只需指定表：`DELETE` 将从指定表中删除整行，因此无需像其他 DML 命令那样指定列。


    显然，`WHERE` 子句也受支持，通过它，你可以确保只删除想要删除的行，方法是指定一个仅针对这些行的谓词。


    如果没有 `WHERE` 子句，所有行都将被删除。注意！不会发出警告，表将被清空：


    ```

    DELETE FROM

    [Warehouse].[Colors]

    WHERE

    [ColorID] = 99;

    ```


    Azure SQL 会自动对你的数据执行备份，并允许你将其恢复到过去 7 到 35 天内的任何时间点（具体取决于你使用的服务）。这没有额外费用。即使你误删除了所有内容，你也能够轻松地将其恢复到意外操作发生之前的状态。


    ### Merging data


    Merge 是一个允许你同时执行插入、更新和删除的命令，以便将一组数据合并到现有数据中。包含要合并到另一个表中的数据的表是你的源表，而另一个表是目标表。通过将源表合并到目标表中，根据你在
    `MERGE` 命令中指定的内容，可能会发生以下情况：


    *   存在于源表中但不存在于目标表中的所有行将被插入到目标表中。

    *   存在于两个表中的所有行将在源表中被更新。

    *   存在于目标表中但不存在于源表中的所有行将从目标表中被删除。


    我说“可能”，因为你完全控制插入、更新和删除操作是否以及如何发生，甚至是否会发生：


    ```

    MERGE INTO

    [Warehouse].[Colors] AS [target]

    USING

    (VALUES

    (50, ''Deep Sea Blue''),

    (51, ''Deep Sea Light Blue''),

    (52, ''Deep Sea Dark Blue'')

    ) [source](Id, [Name])

    ON

    [target].[ColorID] = [source].[Id]

    WHEN MATCHED THEN

    UPDATE SET [target].[ColorName] = [source].[Name]

    WHEN NOT MATCHED THEN

    INSERT ([ColorID], [ColorName], [LastEditedBy]) VALUES ([source].Id, [source].[Name],
    1)

    WHEN NOT MATCHED BY SOURCE AND [target].[ColorID] BETWEEN 50 AND 100 THEN

    DELETE

    ;

    ```


    在 `MERGE INTO` 之后，是目标表。`USING` 指明了源是什么。在这个例子中，代码使用了一个表值构造函数来动态创建一个表，并用别名 `source`
    标记它。因此，这个表是完全临时的，一旦语句执行完毕就会消失；它还要求你指定其列的名称，因为没有任何地方有元数据可以确定这些名称。数据类型将从提供的值中自动推断。


    `ON` 部分与 `JOIN` 的使用方式非常相似，它定义了 Azure SQL 所需的规则，以理解如何将来自源的行与目标中的行进行匹配。在示例中，我们使用了源的
    `Id` 和目标的 `ColorId`。之后，你必须告诉 `MERGE` 在匹配时以及在不匹配时该怎么做：


    *   `WHEN MATCHED` – 如果源表和目标表的行之间存在匹配，代码将使用源表中 `Color` 列的相关值更新目标表中的 `ColorName`
    列。

    *   `WHEN NOT MATCHED` – 如果目标表中没有 `ColorID` 也存在于源表中的行，则这些行将从源中取出并插入到目标中。

    *   `WHEN NOT MATCHED BY SOURCE` – 如果目标表包含一些 `ColorID` 不存在于源表中的行，这些行将从目标中被删除。该示例添加了一个额外的谓词来更好地定义范围。不仅目标中的
    `ColorID` 必须不存在于源中，而且 `ColorID` 值还必须介于 50 到 100 之间。这意味着，例如，源表中 `ColorID` 值从 0
    到 49 的所有行将不会被删除，因为它们超出了已定义规则的范围。


    ### Additional useful features


    到目前为止，已经讨论了基本概念。它们足以开始创建出色的解决方案，但还有一些更多功能你希望立即开始使用，因为它们在多种不同场景下有助于简化代码，并提高解决方案的性能和并发性。'
  raw: '### Adding data


    `INSERT INTO` is the command used to add data into a table. It’s very easy to
    use as it needs only three things to work: the table where you want data to be
    added, the columns you’ll be targeting, and the values to be added.


    The following code, for example, will add two rows to the table `Warehouse.Colors`:


    ```

    INSERT INTO [Warehouse].[Colors]

    ([ColorID], [ColorName], [LastEditedBy])

    VALUES

    (50, ‘Deep Sea Blue’, 1),

    (99, ''Out of space'', 1);

    ```


    The table may or may not have other columns, but we must provide values for the
    columns we specify. As you’ll learn later, a table may have some specific constraints
    in order to make some columns mandatory, for example, the email for a `User` table;
    if no constraints are in place, for all the columns existing in the table but
    not specified in the `INSERT` statement, a default or a `NULL` value will be used.


    In addition to specifying the values manually, as I did in the previous sample,
    `INSERT` can also take values from a `SELECT` statement, for example:


    ```

    INSERT INTO

    [Warehouse].[Colors]

    ([ColorID], [ColorName], [LastEditedBy])

    SELECT

    ColorID, ColorName, LastEditedBy

    FROM

    [External].[Colors]

    ```


    In this case, you may have data in another table, named `External.Colors` that
    you want to move into `Warehouse.Colors`. By using `INSERT FROM … SELECT`, you
    can move data with just one command.


    ### Modifying data


    To change existing data in a table, you can use the `UPDATE` command. Similarly
    to the `INSERT` command, you have to specify the table that contains the data
    you want to update and the new values for each column you want to update. Here’s
    an example:


    ```

    UPDATE

    [Warehouse].[Colors]

    SET

    [ColorName] = N''Unknown'',

    [LastEditedBy] = 2

    WHERE

    [ColorID] = 99;

    ```


    The `WHERE` part is optional but almost always specified, as it allows you to
    limit the scope of the changes that would otherwise be applied to all rows in
    the table. As explained in the “Retrieving data” section, the `WHERE` clause will
    make sure that you can exactly target only the rows you want to update.


    The N character tells Azure SQL that the text being used to update the table is
    a Unicode text. You’ll notice that if you don’t specify it, everything will work
    fine. This happens because Azure SQL performs an *implicit conversion*, automatically
    casting the string to be a Unicode string. While in this case there is no harm
    done, implicit conversion can badly impact performances, so make sure data types
    are correct, especially when using `WHERE` predicates or `JOIN` clauses.


    ### Removing data


    To remove data from a table, you can use the `DELETE` command. For this command,
    only the table must be specified: `DELETE` will remove the entire row from the
    specified table, so there is no need to specify the columns as it happens for
    the other DML commands.


    The `WHERE` clause is also, obviously, supported, and with that, you can make
    sure you remove only the rows you want to remove by specifying a predicate that
    targets only those.


    Without a `WHERE` clause, all rows will be deleted. Be aware! No warning will
    be issued, and the table will be wiped out:


    ```

    DELETE FROM

    [Warehouse].[Colors]

    WHERE

    [ColorID] = 99;

    ```


    Azure SQL automatically performs backups of your data, and it allows you to restore
    it to any point in time within the last 7 up to 35 days, depending on the offer
    you are using. There is no additional cost for this. Even if you delete everything
    by mistake, you’ll be able to easily restore it right before the unwanted action
    happened.


    ### Merging data


    Merge is a command that allows you to execute inserts, updates, and deletes at
    the same time, so that one set of data can be *merged* into an existing one. The
    table that contains the data you want to merge into another table is your *source*
    table, while the other one is the *target* table. By merging a *source* table
    into a *target* table, this is what may happen, depending on what you specify
    in the `MERGE` command:


    *   All rows that exist in the source but not in the target will be inserted in
    the target table.


    *   All rows that exist in both tables will be updated in the source table.


    *   All rows that exist in the target table and not in the source will be deleted from
    the target table.


    I said “may” as you are in total control of if and how the insert, update, and
    delete operations will happen and if they will happen at all:


    ```

    MERGE INTO

    [Warehouse].[Colors] AS [target]

    USING

    (VALUES

    (50, ''Deep Sea Blue''),

    (51, ''Deep Sea Light Blue''),

    (52, ''Deep Sea Dark Blue'')

    ) [source](Id, [Name])

    ON

    [target].[ColorID] = [source].[Id]

    WHEN MATCHED THEN

    UPDATE SET [target].[ColorName] = [source].[Name]

    WHEN NOT MATCHED THEN

    INSERT ([ColorID], [ColorName], [LastEditedBy]) VALUES ([source].Id, [source].[Name],
    1)

    WHEN NOT MATCHED BY SOURCE AND [target].[ColorID] BETWEEN 50 AND 100 THEN

    DELETE

    ;

    ```


    After the `MERGE INTO`, there is the target table. `USING` tells what the source
    is. In this case, the code is using a *Table-Valued Constructor* to create a table
    on the fly and aliasing it with the name source. As such, a table is completely
    volatile and will be gone once the statement has completed the execution; it also
    requires you to have the names of its columns specified, as there is no metadata
    available anywhere to figure out how those are named. Data types will be automatically
    inferred from the provided values.


    The `ON` part is very similar to how `JOIN` uses it, and it defines the rules
    needed by Azure SQL to understand how to match rows coming from the source with
    rows in the destination. In the sample case, we are using `Id` from source and
    `ColorId` from the destination. After that, you have to tell `MERGE` what to do
    when there is match and also when there isn’t one:


    *   `WHEN MATCHED` – If there is a match between rows in source and target table,
    the code will update the `ColorName` column in the target table using the related
    value from the `Color` column in the source table.


    *   `WHEN NOT MATCHED` – If the target table doesn’t have any rows with a `ColorID`
    that exists also in the source table, those rows will be taken from the source
    and inserted into the target.


    *   `WHEN NOT MATCHED BY SOURCE` – If the target table contains some rows with
    a `ColorID` that doesn’t exist in the source table, those will be deleted from
    the target. The sample is adding an additional predicate to better define the
    scope. Not only must there be `ColorID` in the target that doesn’t exist in the
    source, but also the `ColorID` values must be between 50 and 100\. This means
    that all rows in the source table that have `ColorID` values from 0 to 49, for
    example, will *not* be deleted as outside the scope of the defined rule.


    ### Additional useful features


    So far, the basic concepts have been discussed. They are more than enough to start
    to create great solutions, but there are a few more features that you want to
    start to use right away, as they can be helpful in several different scenarios
    to simplify code and to improve performances and concurrency of your solution.'
