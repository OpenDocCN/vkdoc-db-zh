    When choosing between Azure SQL managed instance and Azure SQL Database, there
    are a few additional trade-offs you can consider determining what is best for
    an application’s requirements. One way to think about Azure SQL managed instance
    vs. Azure SQL Database is like the way you think about virtual machine vs. a container.
    If you use a virtual machine (VM) to deploy an application, you have more power,
    disks, and security services, but you can only have 2–10 VMs per host. On the
    other hand, if you use containers, you get lighter and faster with greater elasticity
    and hundreds of containers per host. If you apply that train of thought to Azure
    SQL, with Azure SQL managed instance, you get more features and control, but with
    Azure SQL Database, you get faster, smaller, and with potentially lower costs.
