    ;PWD=\"+ password)\n    try:\n        cursor = cnxn.cursor()\n        tsql = \"\
    SELECT TOP 5 \" \\\n            \" [o].[OrderID], [o].[OrderDate],\" \\\n    \
    \        \" [c].[CustomerName]\" \\\n            \" FROM [Sales].[Orders] AS [o]\"\
    \ \\\n            \" INNER JOIN [Sales].[Customers] AS [c]\" \\\n            \"\
