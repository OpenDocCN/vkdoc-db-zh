    Azure SQL 托管实例中，你可以在创建实例时设置服务器排序规则，但之后无法更改。这为该实例中的所有数据库设置了默认排序规则，但之后你可以在数据库和列级别修改排序规则。在
    Azure SQL 数据库中，你无法设置服务器排序规则；它被固定为“`SQL_Latin1_General_CP1_CI_AS`”，这是最常见的排序规则。每个排序规则的名称格式类似：“`SQL`”表示它是
    SQL Server 排序规则（而非 Windows 或二进制排序规则），“`Latin1_General`”指定了排序时使用的字母表和语言，“`CP1`”引用了排序规则使用的代码页，“`CI`”表示应不区分大小写，“`AS`”表示应区分重音，并且还有其他与宽度、UTF-8
    等相关的选项可用 ([`https://aka.ms/srdc`](https://aka.ms/srdc))。


    ### 时区


    `Time zone`（时区）设置，与排序规则设置一样，看似一个很小的决定，却可能对你的应用程序产生重大影响。微软的建议是为所有实例和数据库使用协调世界时（UTC）。在
    Azure SQL 数据库中，你无法更改时区；你只能使用 UTC（不过别担心，任何 Azure SQL 数据库中都有丰富的内置功能来操作时区并处理转换为本地时间）。然而，对于
    Azure SQL 托管实例，在部署时引入时区选择是为了满足许多客户的需求，这些客户的现有应用程序在特定时区的上下文中存储和调用日期时间值。


    ### 高级数据安全


    从 Azure 门户部署（但也可以通过 PowerShell 完成）的最后一个可用选项是`Advanced data security`（高级数据安全，ADS）。在门户中，系统会提示你是否要开始免费试用并启用
    ADS，它提供了与数据发现和分类、漏洞警报和威胁检测相关的功能。对于 Azure SQL 托管实例，可以在部署后配置 ADS。你可以在此处了解有关 ADS
    的更多信息：[`https://aka.ms/sdads`](https://aka.ms/sdads)。


    如你所见，有很多选项可供你选择，以使 Azure SQL 以高效且经济高效的方式满足你的需求。在本书中，将进一步探讨不同选项中可用的功能，让你对当前任何场景选择最佳选项有更深入的了解。


    ## 使用示例数据库


    无论你是刚开始接触 Azure SQL 和 T-SQL，还是经验丰富的专业人士，总会有新的东西可以探索。探索一些新的或细微的功能和场景需要一个数据库，利用微软的一些示例数据库可以带来极大的帮助。此外，Azure
    SQL 和 SQL Server 社区非常庞大（只需在 Twitter 上搜索 #sqlfamily），社区成员不断贡献新内容和示例来探索最新功能或解释复杂主题。通常，你在网上或书中找到的示例都会与微软的某个示例数据库相关联，因为它们是丰富、易于查找和使用的样本。


    在本章的第一部分，你学习了如何创建一个预加载了示例数据库的 Azure SQL 数据库。在本节中，你将了解更多可用的示例数据库，以及如何在 Azure SQL
    数据库和 Azure SQL 托管实例上开始使用它们。


    有两个最常用的示例数据库：`AdventureWorks` 和 `WideWorldImporters`。`AdventureWorks` 示例围绕虚构的零售公司
    AdventureWorks Cycles 构建，而 `WideWorldImporters` 是一个虚构的、具有全球贸易业务的批发公司。`AdventureWorks`
    示例数据库最初是为 SQL Server 2008 发布的，`WideWorldImporters` 是为 SQL Server 2016 发布的。正如你在本章第一部分看到的，使用
    Azure CLI，你可以部署 `AdventureWorks` 数据库的“轻量”版本“`AdventureWorksLT`”。还有额外的数据库示例：用于
    SQL Server 标准版功能的 `WideWorldImporters` 数据库“`WideWorldImportersStd`”和用于 SQL Server
    企业版功能的 `WideWorldImporters` 数据库“`WideWorldImportersFull`”。多年来，这些示例通常会随着最新功能而更新。这些数据库需要手动部署，就像部署任何你可能已有的其他现有数据库一样。让我们看看如何操作。


    将示例数据库导入 Azure SQL 数据库与导入 Azure SQL 托管实例的方法有所不同。对于 Azure SQL 数据库，你可以通过利用 bacpac
    文件（一种扩展名为“.bacpac”的 Windows 文件，包含数据库的数据和架构）来完成。你可以从这里下载 `WideWorldImporters` 文件：[`https://aka.ms/wwi10`](https://aka.ms/wwi10)。


    如果你未在业务关键型（或 DTU 模型中的高级版）服务层中运行，由于通用型层不支持内存优化表，样本中的一些依赖项将要求你使用以“Standard”或“std”结尾的样本。如果你在业务关键型（或高级版）中运行，那么你可以使用所有样本（包括以“Full”结尾的样本）。


    你需要创建一个存储账户（[`https://aka.ms/sdrsac`](https://aka.ms/sdrsac)），然后将 bacpac 文件复制到
    Azure Blob 容器中。复制 bacpac 文件的方法有很多，但使用 Azure Storage Explorer（[`http://aka.ms/storage-explorer`](http://aka.ms/storage-explorer)）和通过
    Azure 门户上传是两种简单的方法。一旦 bacpac 文件被复制到 Azure Blob 容器中，你就可以利用以下代码，通过 Azure CLI 将数据库导入到你的
    Azure SQL 数据库中。


    ```

    az sql db import \

    -g <resource-group-name> \

    -s <server-name> \

    -n <database-name> \

    -u <admin-login> \

    -p <admin-password> \

    --storage-key-type StorageAccessKey \

    --storage-key <storage-account-key> \

    --storage-uri https://<storage-account-name>.blob.core.windows.net/<bacpac-file-name>.bacpac

    ```


    （清单 2-8：将 bacpac 文件导入 Azure SQL 数据库）


    在 PowerShell 中也有类似的功能，在 Azure 门户中也有 GUI 体验。在 .bak 文件可以导出为 bacpac 文件的情况下，这种方法非常适合将数据库迁移到
    Azure SQL 数据库。

    '
- fmt: '# Azure SQL 数据库样本获取与连接查询


    ## 获取样本数据库


    在 Azure SQL Database 中，获取样本数据库的选项包括使用 Azure 门户、Azure CLI 或 Azure PowerShell。在
    Azure SQL 托管实例中，这些选项同样可用（语法略有不同），但您还可以使用 T-SQL 进行原生还原。首先，您需要有权访问备份的 `.bak` 文件。在此情况下，备份文件可以存储在
    Azure Blob 容器中，方式与前面的 Azure SQL Database 示例相同。这次，您还需要生成一个共享访问签名（SAS）密钥（使用 Azure
    CLI 操作的指导：[`https://aka.ms/ascsas`](https://aka.ms/ascsas)），以便您的托管实例可以访问备份文件。部署实例后，您可以使用选择的
    T-SQL 查询工具连接到该实例，以创建指向备份的凭据。如果您复制并粘贴以下任何 T-SQL 命令，可能需要重新键入单引号。


    ```

    CREATE CREDENTIAL [https://]

    WITH IDENTITY = ''SHARED ACCESS SIGNATURE''

    , SECRET ''''

    Listing 2-9

    Create a credential to a backup

    ```


    要检查凭据是否有效，您可以运行以下 T-SQL 来获取备份文件列表。对于 “WideWorldImporters-Standard.bak”，您应该会看到返回的
    mdf、ndf 和 ldf 文件。


    ```

    RESTORE FILELISTONLY FROM URL = ''https://''

    Listing 2-10

    View the files in a backup

    ```


    最后，您可以使用以下代码从 URL 还原数据库。


    ```

    RESTORE DATABASE [Wide World Importers] FROM URL = ''https://''

    Listing 2-11

    Restore the database from a URL

    ```


    此还原过程是异步且可重试的，这意味着即使连接中断或发生超时，Azure SQL 托管实例也会在后台不断尝试还原数据库。虽然此示例与 WideWorldImporters
    相关，但使用 T-SQL 在 Azure SQL 托管实例中还原数据库的过程对于其他备份文件将是相同的。更多信息请参考：[`https://aka.ms/sdmirsdq`](https://aka.ms/sdmirsdq)。


    ## 延伸阅读


    与本地相比，创建 Azure SQL 数据库或托管实例是一项简单的操作，但仍需要做出一些选择，以确保您不会为不需要的东西浪费资金。这或多或少与您在本地应用的概念相同。更大的区别在于向上扩展要容易得多。请记住，在云中，资源可以像盐一样管理：您可以随时添加更多。


    以下是一些链接，深入探讨了本章讨论的几个概念：


    *   在 Azure SQL 中选择正确的部署选项 – [`https://docs.microsoft.com/azure/sql-database/sql-database-paas-vs-sql-server-iaas`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-paas-vs-sql-server-iaas)

    *   什么是 PaaS？ – [`https://azure.microsoft.com/overview/what-is-paas/`](https://azure.microsoft.com/en-us/overview/what-is-paas/)

    *   Azure SQL 服务层级 – [`https://docs.microsoft.com/azure/sql-database/sql-database-service-tiers-general-purpose-business-critical`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-service-tiers-general-purpose-business-critical)

    *   Azure SQL 数据库服务器及其管理 – [`https://docs.microsoft.com/azure/sql-database/sql-database-servers`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-servers)

    *   Azure SQL 功能 – [`https://docs.microsoft.com/azure/sql-database/sql-database-features`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-features)

    *   Azure SQL 基础 – [`https://aka.ms/azuresqlfundamentals`](https://aka.ms/azuresqlfundamentals)


    # 3. 连接和查询 Azure SQL


    一旦创建并配置了数据库实例，您的下一个任务就是将新开发或现有的应用程序连接到它，并开始执行数据操作或检索命令。


    Azure SQL 是一种云原生数据库服务，通过多种进程间通信（IPC）机制（如 TCP/IP 套接字、命名管道或共享内存）与外部应用程序和进程进行通信。`T-SQL`（SQL
    Server 自己的 SQL 方言）中的命令（如 `SELECT`/`INSERT`/`UPDATE`/`DELETE`）以及从服务返回的结果集都被打包到称为
    `TDS`（Tabular Data Stream，[`https://aka.ms/mstds`](https://aka.ms/mstds)）的应用层协议中。


    当然，作为应用程序开发人员，您不必在自己的应用程序中针对这些底层协议进行编码。它们通常由全面的驱动程序和库系列抽象出来，这些驱动程序和库几乎涵盖了市场上可用的每一种现代编程语言和框架，并可在
    Windows、Linux 和 macOS 操作系统上运行。


    本章中的所有示例均使用 Visual Studio Code 编辑器（[`https://code.visualstudio.com/`](https://code.visualstudio.com/)）编辑，并通过命令行工具和相应运行时（如
    .NET Core 3.1、OpenJDK 11 和 Python 3.6.6）的 SDK 在 Windows、macOS 或 Linux 操作系统上构建和执行。


    ## 驱动程序和库


    大多数驱动程序都围绕一些基本结构设计，主要代表以下常见实体：


    *   与服务器/数据库的连接

    *   在该连接上执行的命令

    *   用于在返回的结果集上迭代和访问记录的对象


    一些库还提供更高级的数据操作功能，例如可以存储检索到的行、跟踪离线修改并提供所包含行的当前/先前版本以用于悲观并发多用户场景的断开连接缓存（例如，`ADO.NET
    DataSets/DataTable`）。


    更高级别的框架和库也可用于覆盖特定场景，例如性能（例如，考虑为本身不提供连接池的库（如 `JDBC` 驱动程序）提供连接池）或生产力工具（如对象关系映射器和微
    ORM）以加快开发时间。此表汇总了各种编程语言适用于所有平台（Windows、Linux、macOS）的 Azure SQL 客户端驱动程序：


    | **语言** | **驱动程序库** | **版本** |

    | --- | --- | --- |

    | .NET 语言（C#、F# 等） | Microsoft ADO.NET for SQL Server | V1.1+ |

    | Java | Microsoft JDBC driver for SQL Server | V8.2+ |

    | PHP | PHP SQL driver for SQL Server | V 5.8+ |

    | Node.js | Node.js Tedious driver for SQL Server | V8.0.1+ |

    | Python | Python ODBC bridge (pyodbc) | V4.0.30+ |

    | Go | Microsoft SQL Server Driver for Go |   |

    | Ruby | Ruby driver for SQL Server | V2.1.0+ |

    | 原生语言（如 C/C++） | Microsoft ODBC driver for SQL Server | V17.5.1.1+ |'
  raw: 'Your options for getting sample databases in Azure SQL Database are using
    the Azure portal, using Azure CLI, or using Azure PowerShell. In Azure SQL managed
    instances, these options are available as well (with slightly different syntax),
    but you also can natively restore using T-SQL. First, you’ll need to have access
    to the backup “.bak” file. In this case, the backup file could be stored in an
    Azure Blob container, in the same way as for the Azure SQL Database example earlier.
    This time, you’ll also need to generate a shared access signature (SAS) key (guidance
    for doing this with the Azure CLI: [`https://aka.ms/ascsas`](https://aka.ms/ascsas))
    so your managed instance can access the backup file. After deploying your instance,
    you can use your T-SQL querying tool of choice to connect to the instance to create
    a credential to the backup. If you copy and paste any of the below T-SQL commands,
    you may need to re-type the single quotes.


    ```

    CREATE CREDENTIAL [https://]

    WITH IDENTITY = ''SHARED ACCESS SIGNATURE''

    , SECRET ''''

    Listing 2-9

    Create a credential to a backup

    ```


    To check if the credential works, you can run the following T-SQL to get a list
    of the backup files. For “WideWorldImporters-Standard.bak”, you should see the
    mdf, ndf, and ldf files returned.


    ```

    RESTORE FILELISTONLY FROM URL = ''https://''

    Listing 2-10

    View the files in a backup

    ```


    Finally, you can restore the database from the URL using the following code.


    ```

    RESTORE DATABASE [Wide World Importers] FROM URL = ''https://''

    Listing 2-11

    Restore the database from a URL

    ```


    This restore process is asynchronous and retriable, meaning that Azure SQL managed
    instance will keep trying to restore the database in the background even if the
    connection breaks or some timeout occurs. While this example was tied to WideWorldImporters,
    the process for restoring a database in Azure SQL managed instance with T-SQL
    will be the same for other backup files. For more information, refer here: [`https://aka.ms/sdmirsdq`](https://aka.ms/sdmirsdq).


    ## If you want to know more


    Creating an Azure SQL database or managed instance is a simple operation, compared
    to on premises, but still requires some choices to be made to make sure you don’t
    waste your money on things you don’t need. This is more or less the same concept
    you apply on premises. Big difference is that scaling up is much easier. Keep
    in mind that in the cloud, resources can be managed just like salt: you can always
    add more.


    Some links to go more in details of several concepts discussed in this chapter
    are as follows:


    *   Choose the right deployment option in Azure SQL – [`https://docs.microsoft.com/azure/sql-database/sql-database-paas-vs-sql-server-iaas`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-paas-vs-sql-server-iaas)


    *   What is PaaS? – [`https://azure.microsoft.com/overview/what-is-paas/`](https://azure.microsoft.com/en-us/overview/what-is-paas/)


    *   Azure SQL service tiers – [`https://docs.microsoft.com/azure/sql-database/sql-database-service-tiers-general-purpose-business-critical`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-service-tiers-general-purpose-business-critical)


    *   Azure SQL Database servers and their management – [`https://docs.microsoft.com/azure/sql-database/sql-database-servers`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-servers)


    *   Azure SQL Features – [`https://docs.microsoft.com/azure/sql-database/sql-database-features`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-features)


    *   Azure SQL Fundamentals – [`https://aka.ms/azuresqlfundamentals`](https://aka.ms/azuresqlfundamentals)


    # 3. Connecting and Querying Azure SQL


    Once you have created and configured a database instance, your next task will
    be to connect a newly developed or existing application to it and start executing
    data manipulation or retrieval commands.


    Azure SQL is a cloud-native database service that communicates with external applications
    and processes through multiple Inter-Process Communication (IPC) mechanisms, like
    TCP/IP sockets, named pipes, or shared memory. Both commands in T-SQL (SQL Server’s
    own SQL dialect) like SELECT/INSERT/UPDATE/DELETE and resultsets returned from
    the service are packaged into an application-level protocol called TDS (Tabular
    Data Stream, [`https://aka.ms/mstds`](https://aka.ms/mstds)).


    As an application developer, of course you don’t have to code against these low-level
    protocols in your own application. They usually are abstracted by a comprehensive
    series of drivers and libraries covering pretty much every modern programming
    language and framework available on the market and running on Windows, Linux,
    and macOS operating systems.


    All the examples in this chapter are edited using Visual Studio Code editor ([`https://code.visualstudio.com/`](https://code.visualstudio.com/))
    and built and executed through command-line tools and SDKs for respective runtimes
    like .NET Core 3.1, OpenJDK 11, and Python 3.6.6 and on Windows, macOS, or Linux
    operating systems.


    ## Driver and libraries


    Most drivers are designed around some basic constructs, mainly representing common
    entities like


    *   A connection with server/database


    *   A command to execute over that connection


    *   An object to iterate and access records on a returned resultset


    Some libraries do also offer more advanced data manipulation capabilities, like
    disconnected caches that can store retrieved rows, track offline modifications,
    and provide current/previous versions of contained rows to be used in pessimistic
    concurrency multi-user scenarios (e.g., ADO.NET DataSets/DataTable).


    Higher-level frameworks and libraries are also available to cover specific scenarios
    in areas like performance (e.g., think about connection pooling for libraries
    that don’t provide it natively, like JDBC drivers) or productivity tools like
    Object-Relational Mappers and MicroORMs to speed up development times. This table
    recaps all client drivers for Azure SQL on various programming languages and available
    for all platforms (Windows, Linux, macOS):


    | **Language** | **Driver library** | **Version** |

    | --- | --- | --- |

    | .NET languages (C#, F#, etc.) | Microsoft ADO.NET for SQL Server | V1.1+ |

    | Java | Microsoft JDBC driver for SQL Server | V8.2+ |

    | PHP | PHP SQL driver for SQL Server | V 5.8+ |

    | Node.js | Node.js Tedious driver for SQL Server | V8.0.1+ |

    | Python | Python ODBC bridge (pyodbc) | V4.0.30+ |

    | Go | Microsoft SQL Server Driver for Go |   |

    | Ruby | Ruby driver for SQL Server | V2.1.0+ |

    | Native languages (e.g., C/C++) | Microsoft ODBC driver for SQL Server | V17.5.1.1+
    |'
