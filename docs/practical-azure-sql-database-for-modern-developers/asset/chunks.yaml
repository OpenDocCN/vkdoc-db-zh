  trans: '

    ## XML 索引


    由于 XML 查询的特殊性，标准的 B 树索引可能无法提供足够的查询性能提升。Azure SQL 提供了几种专门的索引类型，以实现 XPath/XQuery
    表达式的高效处理。Azure SQL 中可用的索引类型如下：


    *   `主 XML 索引`是一个预计算结构，包含从 XML 列分解出的值和节点。Azure SQL 使用主索引中的值，而不是通过`value()`、`nodes()`或`query()`方法来调用昂贵的
    XML 类型解析。这非常类似于 Azure Cosmos DB 对 JSON 文档使用的自动索引。


    *   `辅助 XML 索引`可提升使用`exists()`方法搜索或筛选 XML 文档，或使用`value()`方法从 XML 文档返回多个值的查询性能。


    *   `选择性 XML 索引`仅对 XML 列中指定的路径进行索引。这非常类似于在预定义的 XML 表达式上创建多个 B 树索引。


    选择性 XML 索引是基于 SQL Server 中多种 XML 场景经验总结得出的推荐索引方法。SQL Server 团队发现，对所有可能的字段进行自动索引会导致
    XML 索引体积庞大，而另一方面，大多数被索引的路径并未被使用。因此，选择性 XML 索引成为在可用性、性能和大小之间取得平衡的最佳选择。


    在以下示例中，您可以看到如何在一个简单表上创建选择性 XML 索引：


    ```sql

    CREATE TABLE XmlDocs (

    id INT IDENTITY PRIMARY KEY,

    doc XML

    );

    GO

    CREATE SELECTIVE XML INDEX sxi_docs

    ON XmlDocs(doc)

    FOR (

    path_price = ''/row/info/price'' AS SQL INT,

    path_name = ''/row/info/name'' AS SQL NVARCHAR(100)

    )

    ```


    在选择性索引中，您可以选择应包含在索引中的路径并指定其类型。在`doc`列上使用`value()`函数，且 XPath 查询与索引规范中定义的路径相匹配的查询，将能够利用`sxi_doc`索引，从而获得巨大的性能提升，即使索引本身非常小。


    ## 键值对


    Azure SQL 没有专门用于保存键值对的结构。原因很简单：键值映射可以使用简单的两列表来实现。


    Azure SQL 允许您自定义两列表，并使用各种索引对键列进行索引。借助内存优化表（下一章将详细讨论），您可以使用 B 树或哈希索引对键列进行索引。在以下示例中，您可以看到一个内存优化的、无锁的、原生编译的键值表，它使用`HASH`索引来实现对键的更快访问：


    ```sql

    CREATE TABLE [Cache] (

    [key] BIGINT IDENTITY,

    value NVARCHAR(MAX),

    INDEX IX_Hash_Key HASH ([key]) WITH (BUCKET_COUNT = 100000)

    ) WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_ONLY);

    ```


    此结构利用哈希索引实现了键的快速检索，这对于基本的 get/put 操作是最优的。内存优化表采用乐观的无锁数据访问，而`SCHEMA_ONLY`持久性确保了更快的更新速度，因为数据不会持久化到磁盘。此外，如果值的格式是
    JSON 格式，我们可以使用原生 JSON 函数直接在数据库中筛选和处理数据，正如您在本章开头所学。


    Azure SQL 中键值结构的使用场景之一是集中式缓存。SQL Server 2016 中有一个著名的案例研究，展示了客户如何将一个分布式缓存机制（该机制在
    19 个分布式 SQL Server 节点上达到了每秒 15 万个请求的性能）替换为单台服务器上的内存优化表，从而将性能提升至每秒 120 万个请求。目标场景是实现
    ASP.NET Session 缓存。Azure SQL 使用与 SQL Server 相同的技术，相同的技术也可用于 Azure 云中的缓存。


    在许多实际项目中，使用专用引擎进行缓存通常是首选方案，但这意味着你需要掌握另一门技术，并需要弄清楚如何将其最佳地集成到你的解决方案中。通常，由于缓存解决方案比完整的
    Azure SQL 数据库便宜得多，这种努力是一个不错的选择；但如果你本来就在使用 Azure SQL，那么知道你在数据库中就拥有这种能力，可以为你提供一个你可能想要评估的额外选项，以简化整体架构。


    ## 如何处理非结构化文本？


    最难处理但也并非罕见的情况是非结构化文本数据。在某些情况下，你拥有的文本数据无法很好地组织成 JSON 或 XML 格式，但你需要对该文本实现一些搜索。一个常见的例子是存储在数据库中的
    HTML 代码。理想情况下，如果 HTML 符合 XHTML 规范，它应该与 XML 相同，但在许多情况下，HTML 可能存在某些变体，破坏了严格的 XML
    结构。


    Azure SQL 允许你使用`LIKE`子句来确定文本列是否匹配某个模式。以下查询查找所有`SearchDetails`和`Tags`列中包含用户界面中某个搜索文本框输入的文本的库存项目：


    ```sql

    SELECT si.StockItemID, si.StockItemName, si.Tags

    FROM Warehouse.StockItems AS si

    WHERE si.SearchDetails LIKE N''%'' + @SearchText + N''%''

    OR si.Tags LIKE N''%'' + @SearchText + N''%''

    ```


    `LIKE`谓词使用百分号（`%`）匹配零个或多个任意字符，使用下划线（`_`）匹配任意一个字符。`LIKE`运算符右侧模式表达式中的这些特殊字符，使你能够定义各种模式，例如以某些文本序列开头或结尾的文本。`LIKE`运算符是一个非常方便的工具，通常用于小型数据集上的文本搜索。Azure
    SQL 甚至可以在使用`LIKE`运算符时进行优化和使用索引，特别是当你使用`LIKE`搜索所有以某个前缀`开头`的文本时。在这种情况下，索引和`LIKE`运算符可以提供非常好的性能。相反，如果你需要进行更复杂的搜索，例如，查找`包含`在文本某处的特定单词，特别是在处理大型文本集时，你可能需要考虑下一节中描述的一些文本索引解决方案，以进一步提高性能。


    ### 索引非结构化文本


    如果你需要搜索大量的非结构化文本数据，你将需要使用某种特定的索引技术。Azure 提供了一个通用的 Azure 认知搜索索引服务，使你能够索引各种数据源。但是，使用外部服务会给你的解决方案增加一些复杂性。虽然
    Azure 认知搜索提供了一套强大的专业功能，但如果你不需要所有这些功能，你可能会很高兴知道 Azure SQL 使用了一个类似的本地化文本搜索索引，称为全文搜索（FTS）索引。FTS
    索引是一种对指定表中非结构化文本字段进行索引的结构。以下清单展示了在`StockItems`表的三个文本字段上创建的 FTS 索引示例：


    ```sql

    CREATE FULLTEXT CATALOG [Main] AS DEFAULT;

    GO

    CREATE FULLTEXT INDEX

    ON Warehouse.StockItems (SearchDetails, CustomFields, Tags)

    KEY INDEX PK_Warehouse_StockItems

    WITH CHANGE_TRACKING AUTO;

    GO

    ```


    一个`FTS`索引包含一组使用一组分词器划分的文本片段（令牌）。FTS 索引中的令牌带有它们来源行的键。`FTS`允许你提供文本模式的简单描述，并返回符合该条件的行的键。

    '
- fmt: '### Querying unstructured text


    Once you set up your FTS index, you can use the following functionalities to search
    rows using text match:


    *   `CONTAINS` and `FREETEXT` that check whether the values in some columns match
    the predicate defined in the text predicate


    *   Table-value functions `CONTAINSTABLE` and `FREETEXTTABLE` that return identifiers
    of the rows where text matches some criterion


    The following example shows how to find all keys from `Warehouse.StockItems` table
    where the `SearchDetails` column contains text that matches search criterion that
    is defined in `@SearchCriterion` variable:


    ![../images/493913_1_En_8_Chapter/493913_1_En_8_Figa_HTML.jpg](images/493913_1_En_8_Chapter/493913_1_En_8_Figa_HTML.jpg)


    ```sql

    DECLARE @SearchCondition NVARCHAR(200) = ''blue car'';

    SELECT StockItemID = ft.[KEY], ft.[RANK]

    FROM FREETEXTTABLE(Warehouse.StockItems, SearchDetails, @SearchCondition) AS ft

    ```


    The `KEY` column is an identifier of a row in `StockItems` table that is used
    in the FTS index and represents the record that is returned by `FREETEXTTABLE`
    or `CONTAINSTABLE` functions. `RANK` column describes how well the row matched
    the selection criteria. This resultset can be joined with the original table using
    the `KEY` column to get more results. The following example shows how to find
    all stock items with the keys returned by FTS function:


    ![../images/493913_1_En_8_Chapter/493913_1_En_8_Figb_HTML.jpg](images/493913_1_En_8_Chapter/493913_1_En_8_Figb_HTML.jpg)


    ```sql

    DECLARE @SearchCondition NVARCHAR(200) = ''blue AND car'';

    SELECT

    si.StockItemID,

    si.StockItemName,

    ft.[RANK]

    FROM

    Warehouse.StockItems AS si

    INNER JOIN

    CONTAINSTABLE(Warehouse.StockItems, SearchDetails, @SearchCondition) AS ft ON
    si.StockItemID = ft.[KEY]

    ORDER BY

    ft.[RANK];

    ```


    Table-value functions `CONTAINSTABLE` and `FREETEXTTABLE` match text based on
    exact or fuzzy match. One difference between these functions is that `CONTAINSTABLE`
    does more exact matching, while `FREETEXTTABLE` uses fuzzy matching using thesaurus,
    synonyms, and inflectional forms. If the word `"children"` is provided as a search
    criterion, `FREETEXTTABLE` will also match rows containing `"child"`, but `CONTAINSTABLE`
    will not. In `CONTAINSTABLE`, you need to explicitly specify the expression `FORMSOF(INFLECTIONAL,children)`
    to instruct Azure SQL to include inflectional forms of this word.


    Another difference is that `CONTAINSTABLE` enables you to specify operators like
    `AND`, `OR`, or `NEAR` to define how you want to search text. In the previous
    examples, you might see that we have provided set of words `"blue car"` to `FREETEXTTABLE`,
    and this function will return all rows that have any of these words like in most
    web search engines. In the `CONTAINSTABLE` example, we need to explicitly specify
    operators like `AND`, `OR`, or `NEAR` to specify what should be searched, for
    example, `"blue AND car"` or `"blue OR car"`.


    Instead of functions `FREETEXTTABLE` and `CONTAINSTABLE`, you can use equivalent
    predicates `FREETEXT` and `CONTAINS`. These predicates can be used in `WHERE`
    clause of the query, and they are functionally equivalent with explicit `JOIN`
    with `FREETEXTTABLE` and `CONTAINSTABLE`, with the exception that you won’t have
    the `RANK` column available:


    ```sql

    DECLARE @SearchCondition NVARCHAR(200) =

    ''FORMSOF(INFLECTIONAL,children) OR car'';

    SELECT

    si.StockItemID,

    si.StockItemName,

    si.SearchDetails

    FROM

    Warehouse.StockItems AS si

    WHERE

    CONTAINS(SearchDetails, @SearchCondition);

    ```


    If there is some stock item containing the word `''cars''`, it will not be returned
    in the result because `CONTAINS` uses exact match using the word `''car''`. However,
    if we use `FREETEXT` with `''children cars''` search expression, this predicate
    will use inflectional forms of both words.


    Full-text search is a very powerful tool that can help you to implement very complex
    searches with a simple expression.


    ### How to leverage unstructured indexes on semi-structured data?


    Full-text search is not limited only to unstructured text. You can use FTS indexes
    to improve performance of some JSON search queries where you need to filter documents
    that have key-value pairs defined by the client. After all, an FTS index is very
    similar to a *Generalized Inverted Index (GIN)* that is used in many databases
    exactly to index JSON data.


    Let’s imagine that we need to implement functionality that searches a large set
    of JSON documents using arbitrary key-value combinations. Adding a B-Tree index
    on every possible key would be inefficient, and a `CLUSTERED COLUMNSTORE` index
    on JSON data is designed for analytical use cases and thus is not a good solution
    for filtering.


    If we know that value is a single word, we can leverage the fact that JSON is
    stored as text and that key and value are near to each other. In that case, FTS
    that filters all JSON texts that have required key and value near to each other
    might provide correct results. The query that finds all JSON document with pairs


    ```json

    {"Color":"Silver","MakeFlag":true,"SafetyStockLevel":100}

    ```


    is shown in the following listing:


    ```sql

    SELECT si.StockItemID, si.StockItemName, si.Tags

    FROM Warehouse.StockItems AS si

    WHERE CONTAINS(CustomFields, ''NEAR((Color,Silver),1)

    AND NEAR((MakeFlag,true),1)

    AND NEAR((SafetyStockLevel,100),1)'')

    ```


    The `NEAR` operator in the `CONTAINS` predicate is a good choice for JSON scenarios
    where key of json property is near value. This kind of predicate will quickly
    find all text cells that have words `"Color"` and `"Silver"` close together, which
    is actually the case in JSON structure. In addition, `CONTAINS` clause enables
    us to specify complex predicates with `AND`, `OR`, and other relational predicates.
    However, FTS will not guarantee that `"Color"` is key and that `"Silver"` is value
    in the text, because it doesn’t understand the semantic of text parts in JSON
    structure. If you have some JSON document containing text `"color silver"`, it
    will be returned by `CONTAINS` predicate, although this is not key-value pair.


    In order to remove false-positive results, we can apply standard JSON predicates
    that double-check condition and guarantee the correctness of results:


    ```sql

    SELECT ProductID, Name

    FROM ProductCatalog

    WHERE CONTAINS(Data, ''NEAR((Color,Silver),1)

    AND NEAR((MakeFlag,true),1)

    AND NEAR((SafetyStockLevel,100),1)'')

    AND JSON_VALUE(Data,''$.Color'') = ''Silver''

    AND JSON_VALUE(Data,''$.MakeFlag'') = ''true''

    AND JSON_VALUE(Data,''$.SafetyStockLevel'') = ''100''

    ```


    This query leverages the best of FTS and JSON features to return the required
    result:


    *   `CONTAINS` will quickly filter out most of the entries that don’t satisfy
    the condition and might significantly reduce the number of candidate rows that
    might contain the needed data. Without this part, we would end up with full table
    scan and applying the JSON functions on every row.


    *   `JSON_VALUE` will perform an exact check on the smaller candidate set returned
    by FTS. These predicates guarantee that correct results will be returned, and
    we are sure that we don’t need to apply them on every document.


    This example again shows how Azure SQL features nicely fit together and enable
    you to implement various scenarios.'
