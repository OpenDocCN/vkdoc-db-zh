    一旦创建并配置了数据库实例，您的下一个任务就是将新开发或现有的应用程序连接到它，并开始执行数据操作或检索命令。


    Azure SQL 是一种云原生数据库服务，通过多种进程间通信（IPC）机制（如 TCP/IP 套接字、命名管道或共享内存）与外部应用程序和进程进行通信。`T-SQL`（SQL
    Server 自己的 SQL 方言）中的命令（如 `SELECT`/`INSERT`/`UPDATE`/`DELETE`）以及从服务返回的结果集都被打包到称为
    `TDS`（Tabular Data Stream，[`https://aka.ms/mstds`](https://aka.ms/mstds)）的应用层协议中。


    当然，作为应用程序开发人员，您不必在自己的应用程序中针对这些底层协议进行编码。它们通常由全面的驱动程序和库系列抽象出来，这些驱动程序和库几乎涵盖了市场上可用的每一种现代编程语言和框架，并可在
    Windows、Linux 和 macOS 操作系统上运行。


    本章中的所有示例均使用 Visual Studio Code 编辑器（[`https://code.visualstudio.com/`](https://code.visualstudio.com/)）编辑，并通过命令行工具和相应运行时（如
    .NET Core 3.1、OpenJDK 11 和 Python 3.6.6）的 SDK 在 Windows、macOS 或 Linux 操作系统上构建和执行。


    ## 驱动程序和库


    大多数驱动程序都围绕一些基本结构设计，主要代表以下常见实体：


    *   与服务器/数据库的连接

    *   在该连接上执行的命令

    *   用于在返回的结果集上迭代和访问记录的对象


    一些库还提供更高级的数据操作功能，例如可以存储检索到的行、跟踪离线修改并提供所包含行的当前/先前版本以用于悲观并发多用户场景的断开连接缓存（例如，`ADO.NET
    DataSets/DataTable`）。


    更高级别的框架和库也可用于覆盖特定场景，例如性能（例如，考虑为本身不提供连接池的库（如 `JDBC` 驱动程序）提供连接池）或生产力工具（如对象关系映射器和微
    ORM）以加快开发时间。此表汇总了各种编程语言适用于所有平台（Windows、Linux、macOS）的 Azure SQL 客户端驱动程序：


    | **语言** | **驱动程序库** | **版本** |

    | --- | --- | --- |

    | .NET 语言（C#、F# 等） | Microsoft ADO.NET for SQL Server | V1.1+ |

    | Java | Microsoft JDBC driver for SQL Server | V8.2+ |

    | PHP | PHP SQL driver for SQL Server | V 5.8+ |

    | Node.js | Node.js Tedious driver for SQL Server | V8.0.1+ |

    | Python | Python ODBC bridge (pyodbc) | V4.0.30+ |

    | Go | Microsoft SQL Server Driver for Go |   |

    | Ruby | Ruby driver for SQL Server | V2.1.0+ |

    | 原生语言（如 C/C++） | Microsoft ODBC driver for SQL Server | V17.5.1.1+ |'
- fmt: '# What Azure SQL driver works best for me


    For languages like C#, C++, Node.JS, or Python, multiple options are available
    for drivers, depending on platforms and application needs, so it’s important to
    understand what combinations are available and recommended.


    If your application is targeting `full .NET Framework` (on Windows) or the multi-platform
    `.NET Core` (on Windows, macOS, Linux, or Docker) using a language like `C#`,
    you have two main options:


    *   Rely on the classic `ADO.NET Provider for SQL Server` in `System.Data.SqlClient`
    namespace, which is available as part of the full .NET Framework version installed
    at the machine level.

    *   Reference in your project the new `Microsoft.Data.SqlClient` driver, hosted
    in GitHub ([`https://aka.ms/ghmdsc`](https://aka.ms/ghmdsc)) and NuGet ([`https://aka.ms/ngmdsc`](https://aka.ms/ngmdsc)).


    The latter option provides a much more flexible and direct way for Microsoft to
    introduce improvements in client libraries for .NET, so it’s the recommended version
    to use when developing a brand-new app. Installing and referencing this package
    for a project is pretty straightforward using `dotnet` CLI:


    ```dotnet add package Microsoft.Data.SqlClient```


    Programming languages like Perl, PHP, and Python are providing lightweight wrappers
    and interfaces around native ODBC drivers (e.g., `pyodbc`, `DBI`, etc.). To support
    all newest features available in latest Azure SQL releases (e.g., Always Encrypted,
    Data Classification, AAD authentication, etc.), `Microsoft ODBC Driver 17 for
    SQL Server` (or higher) is recommended. This driver is available for most major
    Linux distros and releases, in addition to Windows. Packaged with this driver
    are also traditional SQL Server client utilities like `sqlcmd` and `bcp`. Installation
    procedures for the ODBC driver largely depend on your target operating system
    and distribution, and all details can be found at this URL: [`https://aka.ms/azuresql-odbc-install`](https://aka.ms/azuresql-odbc-install).


    Java developers should use `Microsoft JDBC Driver 8.2 for SQL Server`, which is
    a Type 4 JDBC driver supporting JRE 8, 11, and 12 and works on all main operating
    systems where Java is supported, including Sun Solaris. When using Maven, JDBC
    driver can be added to a project by adding it as dependency in the `POM.xml` file:


    ```com.microsoft.sqlserver

    mssql-jdbc

    8.2.0.jre11

    ```


    As typical in the Java space, JDBC drivers don’t provide native connection pooling
    capabilities so many external libraries are available on the market. While we’re
    not endorsing any particular one, `HikariCP` ([`https://aka.ms/hikaricp`](https://aka.ms/hikaricp))
    is one we often encounter when working with customers connecting to Azure SQL
    instances and has proven to be fast and reliable.


    For other programming languages like `Python`, usually multiple options are available
    although Microsoft places its testing efforts and its confidence in `pyodbc` driver
    ([`https://aka.ms/pyodbc`](https://aka.ms/pyodbc)) that, as discussed previously,
    relies on the ODBC driver for SQL Server and supports most operating systems.
    You can easily install `pyodbc` using the following line in command prompt:


    ```pip install pyodbc```


    Similarly, for Node.JS, the Tedious driver can be added to a project through canonical
    package manager typing


    ```npm install tedious```


    ## Getting started


    Official Microsoft documentation offers a great “Getting started” section for
    developers ([`https://aka.ms/sdcq`](https://aka.ms/sdcq)), which is the best place
    to start familiarizing with application development for Azure SQL family using
    a step-by-step approach.


    While you will have time to evaluate all these samples, we will start from scratch
    here with some of the most popular programming languages and explain key aspects
    of how to connect to Azure SQL and run some basic queries.


    All samples in this chapter are referring to a database named “WideWorldImportersFull”
    that can be deployed as Azure SQL Database stand-alone or managed instance. In
    Chapter [2](#493913_1_En_2_Chapter.xhtml), you’ll find instructions on how to
    deploy this sample database. Please update connection strings accordingly to make
    these samples work.


    ## Listing 3-1. Data access method in a .NET Core application


    ```public async Task> GetOrders()

    {

    List orders = new List();

    using (SqlConnection cnn =  new SqlConnection(

    config.GetConnectionString

    ("DefaultConnection")))

    // Connection string pattern: "Server=tcp:.database.windows.net,1433;Initial Catalog=;User
    ID=;Password=;Connect Timeout=30;"

    {

    SqlCommand cmd = new SqlCommand

    (@"SELECT TOP 5

    [o].[OrderID],

    [o].[OrderDate],

    [c].[CustomerName]

    FROM [Sales].[Orders] AS [o]

    INNER JOIN [Sales].[Customers] AS [c]

    ON [o].[CustomerID] = [c].[CustomerID]", cnn);

    await cnn.OpenAsync();

    SqlDataReader dr = await cmd.ExecuteReaderAsync();

    while (dr.Read())

    {

    orders.Add(new Order()

    {

    OrderID = Convert.ToInt32(dr[0]),

    OrderDate = Convert.ToDateTime(dr[1]),

    CustomerName = Convert.ToString(dr[2])

    });

    }

    }

    return orders;

    }```


    In this basic example, you can find a typical .NET Core data access method that
    can be reused in multiple application types, from a Console app to a WebAPI or
    Azure Function. Once you add a reference to `Microsoft.Data.SqlClient` package
    from NuGet, you can use `SqlConnection` and `SqlCommand` classes to interact with
    Azure SQL using asynchronous methods to open a new connection and execute a command
    that retrieves a resultset and materialize a collection of objects to be used
    in your business logic. While tons of other things are happening behind the scenes
    when you execute a simple operation like this, and many best practices and guidance
    are available to optimize your data access layer, you will find yourself writing
    similar code in most of the database interactions you’ll have in your applications.
    Let’s address the same exact scenario using Java now, one of enterprise developers’
    most favorite programming languages.


    ## Listing 3-2. Data access method in a Java application


    ```public List getOrders() {

    List order = new ArrayList();

    String connectionString = "jdbc:sqlserver://.database.windows.net:1433;" + "database=WideWorldImporters-Full;user=@;"
    + "password=;loginTimeout=30;";

    try {

    try (Connection conn =

    DriverManager.getConnection(connectionString)) {

    String sql =

    "SELECT TOP 5 "

    +"[o].[OrderID],"

    +"[o].[OrderDate],"

    +"[c].[CustomerName]"

    +"FROM [Sales].[Orders] AS [o]"

    +"INNER JOIN [Sales].[Customers] AS [c] "

    +"ON [o].[CustomerID] = [c].[CustomerID]";

    try (Statement stmt =

    conn.createStatement();

    ResultSet rs =

    stmt.executeQuery(sql)) {

    while (rs.next()) {

    order.add(new Order(

    rs.getInt(1),

    rs.getString(2),

    rs.getString(3)));

    }

    }

    conn.close();

    }

    } catch (Exception e) {

    System.out.println();

    e.printStackTrace();

    }

    return order;

    }```'
