    \ `blogs` 的、托管在 `Azure` 中的数据库中存在的架构和所有对象（但不包括数据）到 `blogs-v1.dacpac` 文件中：\n\n```\n\
    sqlpackage.exe\n    /a:Extract\n    /ssn:\"<server-name>.database.windows.net\"\
    \n    /su:\"<username>\"\n    /sp:\"<password>\"\n    /sdn:\"blogs\"\n    /tf:\"\
    blogs-v1.dacpac\"\n```\n\n一旦你有了 `.dacpac` 文件，你可以通过 `Publish` 操作立即用它来更新目标数据库：\n\
    \n```\nsqlpackage.exe\n    /a:Publish\n    /sf:\"blogs-v1.dacpac\"\n    /tsn:\"\
    <server-name>.database.windows.net\"\n    /tu:\"<username>\"\n    /tp:\"<password>\"\
    \n    /tdn:\"blogs-prod\"\n```\n\n或者创建稍后可用于通过同名操作更新数据库的脚本：\n\n```\nsqlpackage.exe\n\
    \    /a:Scripts\n    /sf:\"blogs-v1.dacpac\"\n    /tsn:\"<server-name>.database.windows.net\"\
    \n    /tu:\"<username>\"\n    /tp:\"<password>\"\n    /tdn:\"blogs-prod\"\n  \
    \  /op:\"blogs-db-v1.sql\"\n```\n\n生成脚本的能力很有用，如果你想自定义它以添加一些初始化数据（就像在代码优先场景中发生的那样），或者只是想将脚本保存到你的代码仓库中，以便确切知道在\
    \ `CI/CD` 管道中将执行什么。在这种情况下，你可能希望使用 `GitHub` 或 `DevOps` 中的 `Azure SQL` 操作或任务来执行该脚本。\n\
    \n另一个选择是直接在 `CI/CD` 管道中执行 `SqlPackage`，使用专门的 `Azure SQL` 操作或任务来应用更改，甚至不生成脚本。这种方法可能风险更高，因为你无法完全控制正在发生的事情，因此平均而言不是推荐的方法，但它确实是最灵活的，因为它会自动计算出将目标数据库带到所需状态所需的更改。"
- fmt: '## Comparison tools


    Aside from `SqlPackage`, there are several third-party tools that can help you
    to find the difference between two existing databases so that you can generate
    the script to synchronize a target database with another reference one. The most
    common and well known are


    *   SQL Server Data Tools (Visual Studio workload extension)

    *   Redgate SQL Compare (commercial)

    *   ApexSQL SQL Compare (commercial)


    ## DbUp


    DbUp ([`https://dbup.github.io/`](https://dbup.github.io/)) is an open source
    .NET library that helps in deploying scripts in a database, making sure that the
    same script is not deployed twice. This little tool is incredibly useful if you
    want to have total control on which scripts are deployed to the database, and
    you are keeping a list of scripts that must be executed in order, so that the
    changes that you wrote will be applied in the correct sequence, thus updating
    the database to the latest evolution. This approach is the one that gives you
    the highest level of control and works very well if you prefer to write the migration
    scripts by yourself. In a complex and critical system, this is quite always the
    case.


    Using it is amazingly simple. You just need to add the NuGet package to your project
    (a recommendation is to create a dedicated project just for this) and then use
    the `DeployChanges` object and point it to the folder where you have the script
    you want to deploy, for example, a `sql` folder in your project structure:


    ```csharp

    var connectionString = ""

    var upgrader = DeployChanges.To

    .SqlDatabase(connectionString)

    .JournalToSqlTable("dbo", "$__schema_journal")

    .WithScriptsFromFileSystem("./sql")

    .LogToConsole()

    .Build();

    var result = upgrader.PerformUpgrade();

    ```


    The preceding code, when executed, will do these:


    *   Connect to the target database.

    *   Create, if doesn’t exist already, a table named `$__schema_journal` that will
    track the deployed scripts.

    *   Read all the T-SQL script available in the `sql` folder.

    *   Send the log to console.

    *   Run the scripts, saving which script has been executed in the journal table.


    If you compile and run this application against an empty database, you’ll see
    something like the following:


    ![../images/493913_1_En_11_Chapter/493913_1_En_11_Figc_HTML.jpg](images/493913_1_En_11_Chapter/493913_1_En_11_Figc_HTML.jpg)


    If you try to run the same application again, without adding any new script to
    the `sql` folder, nothing will happen as all scripts have been executed already:


    ![../images/493913_1_En_11_Chapter/493913_1_En_11_Figd_HTML.jpg](images/493913_1_En_11_Chapter/493913_1_En_11_Figd_HTML.jpg)


    As this is a regular .NET application, deploying it into a CI/CD pipeline doesn’t
    require any special Task or Action, aside those already used to have the .NET
    framework available in the pipeline.


    ## Database testing


    How do you properly test a database? That’s another huge topic for which, frankly,
    there isn’t yet a very good answer. Testing a database is a complex challenge
    as test results will completely depend on the data stored in the database. In
    addition to that, there aren’t widely adopted testing frameworks focusing on this
    specific issue.


    There is one community-supported unit testing framework that supports Azure SQL:
    `tSQLt`. With `tSQLt`, you can define tests by just using T-SQL code. It supports
    assertions for expected results, both scalar and tabular, and it also can create
    some mock objects to help you isolate dependencies.


    But as a developer, my favorite method of testing a database is creating a test
    class using a common testing framework (like `NUnit` or `XUnit` for .NET, `pytest`
    for Python or `Mocha` for Node) and using the flexibility of these tools to get
    a nice testing experience.


    It is widely known that a test must be self-contained, independent, and idempotent.
    The aforementioned testing frameworks all allow the execution of custom code before
    and after running the test, so that test data and environment can be prepared
    and then cleaned up.


    I know that a pure Unit Test should not have any external dependency, and to test
    the database, we are actually introducing a dependency on the database itself.
    Still, I find the solution of using existing unit testing framework a good compromise
    that gives the needed flexibility in exchange for a small deviation from the perfect
    approach. Given that there aren’t universally accepted unit test frameworks for
    databases, we have to do the best with what we have.


    Here’s an example of a database unit test using .NET and `NUnit`:


    ```csharp

    [Test]

    public void CheckExpectedTotal()

    {

    using(var conn = new SqlConnection(ConnectionString))

    {

    var result = conn.QuerySingle(

    "ConfirmOrder",

    new { OrderId = 38923 },

    commandType: CommandType.StoredProcedure);

    Assert.AreEqual("ConfirmedTotal", 10000);

    }

    }

    ```


    Ideally for each test you want to create, you’ll generate one or more sets of
    data that will cover the possible scenario in which the query or the Stored Procedure
    you want to test will be used.


    Usually to check that a query returns the expected result, you can use a small
    data sample, maybe even created with completely mocked values, so that you don’t
    have to deal with Personal Identifiable Information and all the security issues
    that go with it. In the most complex scenarios, before running the test, you may
    need to restore a reference dataset or even an entire database, so that you’ll
    have a well-known starting point for running the tests and thus having deterministic
    results.


    Once you have created your tests, so that you have a solid pipeline to deploy
    and test the changes against a small but representative dataset, you can then
    instruct your pipeline to deploy your code on a bigger database, maybe containing
    a representative subset of production data, opportunely obfuscated, to run integration
    and performance tests. At this stage, you’ll focus on query performances. Several
    frameworks allow you to also specify that a test must be executed within a defined
    amount of time in order to consider a successful execution.


    At this point, usually your team will execute integration and performance tests,
    where the database and all the code that needs to interact with it will be tested
    as a whole. If you are creating an API solution, you may be already using tools
    like `Locust.io` or `K6` to perform a stress test and verify that the changes
    you have just completed are behaving as expected also from a performance, scalability,
    and resource consumption point of view.


    ## Putting everything together


    Creating a full, end-to-end, CI/CD pipeline can be a bit complex the first time.
    That’s why in the code accompanying this book, you can find an end-to-end sample
    that shows how to create a simple C# REST API, backed by an Azure SQL Database,
    and deployed on Azure using Azure Web App. The CI/CD pipeline is created using
    GitHub and DbUp, and the testing framework used is `NUnit`.'
