- fmt: "### 连接性方面\n\n如第[2](#493913_1_En_2_Chapter.xhtml)章简要提到的，网络连接是从应用程序与 Azure SQL\
    \ 交互的另一个基本方面。尽管这更关系到基础设施设计和网络安全，而非纯粹的应用程序开发，但你仍需要考虑在此过程中发挥作用的各种选项和组件，以成功连接到你的数据库实例。Azure\
    \ SQL Database 的单一数据库和托管实例部署模型都支持两种主要的应用程序连接选项：\n\n*   `Private VNET`\n*   `Public\
    \ connectivity`\n\n托管实例在创建时会自动与 Azure 虚拟网络关联，而公共连接是可选的。对于单个 Azure SQL Database\
    \ 实际情况正好相反，你应该依赖 Azure Private Link 功能，通过私有端点和完全隔离的网络流量路径，将部署在支持 VNET 的 Azure\
    \ 服务之一上的应用程序连接起来。\n\n在需要公共连接的场景中，仍然可以考虑一些选项来管理应用程序与 Azure SQL 之间的网络流量：\n\n*  \
    \ 服务器级和数据库级防火墙\n*   `VNET Service Endpoint`\n*   `VNET Network Security Group\
    \ (NSG)`\n\n服务器级和数据库级防火墙规则旨在定义哪些 IP 地址范围（来自公共互联网连接或各种 Azure 服务内部）可以与 Azure SQL\
    \ Database 单一实例建立连接。如果存在数据库级防火墙规则（目前只能通过 `T-SQL` 命令创建），系统将首先评估这些规则以确定客户端连接是否来自允许的范围；否则，将检查服务器级规则（对与该虚拟服务器关联的所有数据库实例有效，可通过\
    \ `T-SQL`、`PowerShell/CLI` 或 `Azure Portal` 定义）。如果你决定信任来自 Azure 服务的所有网络连接，那么门户上有一个“允许\
    \ Azure 服务和资源访问此服务器”的复选框选项，可以简化你的设置。\n\n`VNET Service Endpoint` 是一项功能，旨在确保只有来自你部署应用程序的一个或多个\
    \ `VNET/Subnet` 对的网络连接才能被特定的 Azure SQL 服务器接受。\n\n在连接的应用程序端，可以创建 `VNET Network\
    \ Security Group` 并将其与虚拟机的 `NIC` 或整个子网关联，以确保它们只能连接到你的 Azure SQL 实例所在的特定 IP 地址范围和端口。\n\
    \n网络安全并不是影响数据库连接的唯一方面；网络延迟是另一个关键因素。连接策略决定了你的数据库连接如何与在 Azure SQL 中托管数据库的后端节点交互，可以是以下两种选项之一：\n\
    \n*   `Proxy`\n*   `Redirect`\n\n使用 `Proxy`，你可以获得最大的灵活性，可以从任何地方使用 `FQDN` 服务器名和仅端口\
    \ `1433` 连接到你的实例，但这些连接总是会通过一个网关前端层，这会增加网络延迟（通常对需要频繁交互的应用程序不利）。\n\n`Redirect` 策略则直接建立到托管数据库的节点的连接，减少了延迟并提高了应用程序吞吐量，但它要求应用程序主机和数据库之间开放特定的端口范围（`11000–11999`）。\n\
    \n所有来自 *外部* Azure 服务 IP 范围的连接的默认连接策略是 `Proxy`，而来自 *内部* Azure 的连接则是 `Redirect`，但你可以通过\
    \ `PowerShell` 和 `Azure CLI` 更改此默认设置。关于 Azure SQL 连接架构的更多细节可以在以下 URL 中找到：\n\n\
    *   Azure SQL Database 单一实例 – [`https://aka.ms/sdca`](https://aka.ms/sdca)\n*\
    \   Azure SQL Database 托管实例 – [`https://aka.ms/sdmica`](https://aka.ms/sdmica)\n\
    \n### 弹性连接和查询执行\n\n在云架构上构建分布式系统，关于服务到服务交互需要采用特定的方法以提高弹性和可用性。这对于所有类型的云服务和交互（从事务解决方案到批处理）通常都是正确的。\n\
    \n在传统的本地解决方案中，数据库和应用服务器通常位于具有专用交换机和路由器等物理网络设备的附近，以提供稳定快速的连接。当发生硬件或软件故障时，尽管有适当的冗余和高质量设备，这些故障也可能造成相当大的影响，并持续到有人物理修复问题并使系统重新上线。\n\
    \n在云环境中，一切都是虚拟化和完全自动化的，因此你将有更多的移动部件，可能会引入一些瞬时连接问题，应用程序开发人员应该考虑这一点以使他们的应用程序整体更可靠。例如，Azure\
    \ SQL 会自动管理硬件或软件故障，或数据库节点服务应用程序请求的任何时刻的计划维护操作，但是，尽管故障转移到辅助节点的操作可能很快，但在该事件发生后的几秒钟内（平均约\
    \ 8 秒，最多不超过 60 秒），数据访问代码可能会遇到异常，之后才能正常响应请求。\n\n瞬时连接问题的其他例子可能与达到所选服务层和大小的 Azure\
    \ SQL 实例的最大限制有关。由于我们指的是多租户服务，维护整个系统的稳定性至关重要。如果发生此类事件，应用程序将暂时无法连接到 Azure SQL，直到资源利用率降低到给定阈值之内。\n\
    \n```\nif (transientError) {\n    await Task.Delay(retryDelay);\n    retryCount++;\n\
    }\n```"
  raw: '### Connectivity aspects


    As briefly mentioned in Chapter [2](#493913_1_En_2_Chapter.xhtml), network connectivity
    is another fundamental aspect of interacting with Azure SQL from your applications.
    Although more related to infrastructure design and network security than pure
    app development, you’ll need to consider various options and components that play
    a role in this process to successfully connect with your database instances. Both
    single database and managed instance deployment models for Azure SQL Database
    support two main connectivity options for applications:


    *   Private VNET


    *   Public connectivity


    While a managed instance is automatically associated with an Azure Virtual Network
    at creation time, and public connectivity is optional, for individual Azure SQL
    Database instance is actually the opposite, and you should rely on Azure Private
    Link capability to connect your application deployed on one of the Azure services
    that support VNETs via a private endpoint and on a completely isolated network
    traffic path.


    For those scenarios where public connectivity is required, there are still some
    options that can be considered to govern network traffic between your application
    and Azure SQL:


    *   Server- and database-level firewall


    *   VNET Service Endpoint


    *   VNET Network Security Group (NSG)


    Server- and database-level firewall rules are designed to define what ranges of
    IP addresses (coming from public Internet connectivity or from within various
    Azure services) can establish a connection with Azure SQL Database single instances.
    If database-level firewall rules exist (today, these can be created through T-SQL
    commands only), those will be evaluated to understand if a client connection is
    coming from an allowed range; otherwise, server-level rules (valid for all database
    instances associated with that virtual server and defined through T-SQL, PowerShell/CLI,
    or Azure Portal) will be checked. If you decide to trust all network connections
    coming from an Azure service, then there’s a check box option on the portal to
    “Allow Azure services and resources to access this server” to simplify your settings.


    VNET Service Endpoint is a feature designed to guarantee that network connections
    targeting a given Azure SQL server will be accepted only if they come from one
    or more VNET/Subnet pairs where your applications are deployed.


    On the application side of the connection, a VNET Network Security Group can be
    created and associated with a Virtual Machine’s NIC or an entire Subnet to make
    sure they can only connect with a given range of IP addresses and ports where
    your Azure SQL instances reside.


    Network security is not the only aspect that can affect database connectivity;
    network latency is the other critical one. Connection policy determines how your
    database connections will interact with the back-end node hosting your databases
    in Azure SQL and can be one of these two options:


    *   Proxy


    *   Redirect


    With Proxy, you have maximum flexibility to connect to your instance from anywhere
    using FQDN server name and just port 1433, but these connections will always go
    through a Gateway front-end layer that will increase network latency (usually
    not good for chatty applications).


    Redirect policy instead establishes connections directly to the node hosting the
    database, reducing latency, and improving application throughput, but it does
    require specific port ranges (11000–11999) to be open between your application
    host and the database.


    Default connection policy is *Proxy* for all connections coming from *outside*
    Azure service IP ranges and *Redirect* for those *within* Azure, but you can change
    the default through PowerShell and Azure CLI. More details on Azure SQL connectivity
    architecture can be found at the following URLs:


    *   Azure SQL Database single instances – [`https://aka.ms/sdca`](https://aka.ms/sdca)


    *   Azure SQL Database managed instances – [`https://aka.ms/sdmica`](https://aka.ms/sdmica)


    ## Resilient connection and query execution


    Building distributed systems on cloud architectures requires a specific approach
    regarding service-to-service interactions to increase resiliency and availability.
    This is generally true for all kinds of cloud services and interactions, from
    transactional solutions to batch processing.


    In a traditional on-premises solution, database and application servers are usually
    sitting next to each other with physical networking devices like switches and
    routers dedicated to providing stable and fast connectivity. When hardware or
    software failures are happening, despite proper redundancy and high-level device
    quality in place, chances are that these are going to be quite impactful and persisting
    until someone will physically fix the problem and bring the system back online
    again.


    In a cloud environment, everything is virtualized and completely automated, so
    you’ll have many more moving parts potentially introducing some transient connectivity
    blips that application developers should consider to make their application more
    reliable overall. As an example, Azure SQL will automatically manage hardware
    or software failures, or planned maintenance operations, to the database node
    service application requests at any point in time, but, as fast as the failover
    operation to a secondary node can be, data access code may face an exception for
    the very few seconds after that event happened (on average around 8 seconds, at
    most in less than 60 seconds) before being able to respond to requests regularly.


    Other examples of transient connectivity issues could be related to reaching maximum
    limits in Azure SQL instances based on the service tier and size selected. As
    we’re referring to a multitenant service, it is absolutely critical to preserve
    the overall system’s stability. In case of such event, applications temporarily
    won’t be able to connect to Azure SQL until resource utilization decreases to
    within given thresholds.'
  trans: "\n### 连接性方面\n\n如第 2 章简要提到的，网络连接是应用程序与 Azure SQL 交互的另一个基本方面。尽管这更关系到基础设施设计和网络安全，而非纯粹的应用程序开发，但你仍需要考虑在此过程中发挥作用的各种选项和组件，以成功连接到你的数据库实例。Azure\
    \ SQL Database 的单一数据库和托管实例部署模型都支持两种主要的应用程序连接选项：\n\n*   `私有虚拟网络`\n*   `公共连接`\n\n\
    托管实例在创建时会自动与 Azure 虚拟网络关联，而公共连接是可选的。对于单个 Azure SQL Database 实际情况正好相反，你应该依赖 Azure\
    \ Private Link 功能，通过私有端点和完全隔离的网络流量路径，将部署在支持虚拟网络的 Azure 服务之一上的应用程序连接起来。\n\n在需要公共连接的场景中，仍然可以考虑一些选项来管理应用程序与\
    \ Azure SQL 之间的网络流量：\n\n*   服务器级和数据库级防火墙\n*   `虚拟网络服务终结点`\n*   `虚拟网络安全组`\n\n服务器级和数据库级防火墙规则旨在定义哪些\
    \ IP 地址范围（来自公共互联网连接或各种 Azure 服务内部）可以与 Azure SQL Database 单一实例建立连接。如果存在数据库级防火墙规则（目前只能通过\
    \ `T-SQL` 命令创建），系统将首先评估这些规则以确定客户端连接是否来自允许的范围；否则，将检查服务器级规则（对与该虚拟服务器关联的所有数据库实例有效，可通过\
    \ `T-SQL`、`PowerShell/CLI` 或 `Azure 门户` 定义）。如果你决定信任来自 Azure 服务的所有网络连接，那么门户上有一个“允许\
    \ Azure 服务和资源访问此服务器”的复选框选项，可以简化你的设置。\n\n`虚拟网络服务终结点` 是一项功能，旨在确保只有来自你部署应用程序的一个或多个\
    \ `虚拟网络/子网` 对的网络连接才能被特定的 Azure SQL 服务器接受。\n\n在连接的应用程序端，可以创建 `虚拟网络安全组` 并将其与虚拟机的\
    \ `网络接口` 或整个子网关联，以确保它们只能连接到你的 Azure SQL 实例所在的特定 IP 地址范围和端口。\n\n网络安全并不是影响数据库连接的唯一方面；网络延迟是另一个关键因素。连接策略决定了你的数据库连接如何与在\
    \ Azure SQL 中托管数据库的后端节点交互，可以是以下两种选项之一：\n\n*   `代理`\n*   `重定向`\n\n使用 `代理`，你可以获得最大的灵活性，可以从任何地方使用\
    \ `完全限定域名` 服务器名和仅端口 `1433` 连接到你的实例，但这些连接总是会通过一个网关前端层，这会增加网络延迟（通常对需要频繁交互的应用程序不利）。\n\
    \n`重定向` 策略则直接建立到托管数据库的节点的连接，减少了延迟并提高了应用程序吞吐量，但它要求应用程序主机和数据库之间开放特定的端口范围（`11000–11999`）。\n\
    \n所有来自 *外部* Azure 服务 IP 范围的连接的默认连接策略是 `代理`，而来自 *内部* Azure 的连接则是 `重定向`，但你可以通过 `PowerShell`\
    \ 和 `Azure CLI` 更改此默认设置。关于 Azure SQL 连接架构的更多细节可以在以下 URL 中找到：\n\n*   Azure SQL\
    \ Database 单一实例 – [`https://aka.ms/sdca`](https://aka.ms/sdca)\n*   Azure SQL\
    \ Database 托管实例 – [`https://aka.ms/sdmica`](https://aka.ms/sdmica)\n\n### 弹性连接和查询执行\n\
    \n在云架构上构建分布式系统，关于服务到服务交互需要采用特定的方法以提高弹性和可用性。这对于所有类型的云服务和交互（从事务解决方案到批处理）通常都是正确的。\n\
    \n在传统的本地解决方案中，数据库和应用服务器通常位于具有专用交换机和路由器等物理网络设备的附近，以提供稳定快速的连接。当发生硬件或软件故障时，尽管有适当的冗余和高质量设备，这些故障也可能造成相当大的影响，并持续到有人物理修复问题并使系统重新上线。\n\
    \n在云环境中，一切都是虚拟化和完全自动化的，因此你将有更多的移动部件，可能会引入一些瞬时连接问题，应用程序开发人员应该考虑这一点以使他们的应用程序整体更可靠。例如，Azure\
    \ SQL 会自动管理硬件或软件故障，或数据库节点服务应用程序请求的任何时刻的计划维护操作，但是，尽管故障转移到辅助节点的操作可能很快，但在该事件发生后的几秒钟内（平均约\
    \ 8 秒，最多不超过 60 秒），数据访问代码可能会遇到异常，之后才能正常响应请求。\n\n瞬时连接问题的其他例子可能与达到所选服务层和大小的 Azure\
    \ SQL 实例的最大限制有关。由于我们指的是多租户服务，维护整个系统的稳定性至关重要。如果发生此类事件，应用程序将暂时无法连接到 Azure SQL，直到资源利用率降低到给定阈值之内。\n\
    \n```\nif (transientError) {\n    await Task.Delay(retryDelay);\n    retryCount++;\n\
    }\n```\n"
- fmt: '### Retry logic


    To make your applications more reliable, a common approach is to introduce proper
    retry logic capabilities in database access code. Retry logic usually refers to
    a technique that


    1.  Intercepts application errors provoked by a transient condition

    2.  Retries the original operation for a certain amount of times, introducing
    a delay period that can be fixed or incremental, to make sure you won’t flood
    instances with requests that are going to fail anyway usually creating a convoy
    effect


    This logic can be as simple as just retrying opening a connection, after a previous
    tentative has failed returning a certain exception, for a fixed amount of times
    and with some delay between retries.


    A trickier use case for retry logic is when an operation ultimately modifies database
    state, like inserting a new record or updating one or more existing ones. If a
    transient error happened while this command was under execution, the application
    will be responsible for deciding if the previous attempt failed before or after
    the database was effectively modified. In this case, in fact, client applications
    cannot just blindly re-execute previous commands, as there’s no guarantee data
    wasn''t already modified (think about a bank account’s transaction as an example).
    Retry logic needs to ensure that either the previous transaction was completely
    committed or that the entire operation was rolled back; otherwise, the database
    could remain in an inconsistent state. Basically, retry logic for transactional
    database code can be quite complex and will typically only apply for those use
    cases where your data modification code is completely idempotent (i.e., can be
    executed multiple times without necessarily modifying database state).


    If correctly modeled, the database will help you in making sure data is consistent:
    for example, an order with an already existing number will not be allowed to be
    inserted. That said, you will still need to handle the returned error, and thus
    implementing solid retry logic will significantly improve your application reliability
    and stability.


    ### Transient and persistent errors


    A key aspect of implementing a robust retry logic mechanism is to intercept and
    decode what errors the application should interpret as transient and what are
    instead permanent (and retry logic won’t be able to help).


    As mentioned previously, there are several categories of conditions and events
    that could be categorized as transient, from underlying hardware failures and
    automatic reconfigurations to temporary resource exhaustion. Transient issues
    could also happen at different layers in the stack: think about a temporary glitch
    in software defined networking! While these episodes can be rare and very short
    in time, it’s very important to proactively address them by adopting proper coding
    practices. A comprehensive explanation of typical connectivity issues at different
    layers is offered in Azure SQL’s public documentation at this link: [https://aka.ms/tciasb](https://aka.ms/tciasb).


    ### Custom code or reusable libraries


    Let’s see how to implement in practical terms a simple retry logic mechanism for
    database access as described in previous sections. The following code is quite
    straightforward and only provides basic retry functionalities by wrapping database
    interaction method in a for loop and intercepting potential exceptions that can
    be thrown during its execution.


    ```

    bool success = false;

    int retryCount = 3;

    int retryInterval = 8;

    List RetriableCodes =

    new List { 4060, 40197, 40501, 40613,

    49918, 49919, 49920, 11001,208 };

    for (int retries = 1; retries  1)

    {

    Thread.Sleep(1000 * retryInterval);

    // Retry interval increases by 50% every retry

    retryInterval = Convert.ToInt32 (retryInterval * 1.5);

    }

    await MyDatabaseOperation();

    success = true;

    break;

    }

    catch (SqlException se)

    {

    if (RetriableCodes.Contains(se.Number) == true)

    {

    // Retriable error – log and continue

    continue;

    }

    else

    {

    // Non-retriable error – exit the loop

    break;

    }

    }

    catch (Exception e)

    {

    // Generic exception – exit the loop

    break;

    }

    }

    Listing 3-5

    Create custom retry logic in a C# application

    ```


    As you notice, a lot of “plumbing” and complexity is required for a quite simple
    database operation to make it resilient to transient errors. Imagine if this should
    be repeated for every method and interaction that your application has with its
    data layer! Plus, this lacks any option for consistently configure parameters
    like number of retries, fixed or incremental delays, or even what exceptions should
    be considered transient vs. permanent.


    Luckily, over the years, a number of reusable libraries have been created covering
    pretty much every programming language and framework to encapsulate that plumbing
    code into configurable mechanisms that developers can use to make their applications
    more reliable.


    For .NET applications , one of the most known retry logic libraries is Transient
    Fault Handling (TFH) Application Block, originally part of Microsoft Enterprise
    Library framework, that has been recently ported to .NET Core and is freely available
    on NuGet for downloads at this URL: [https://aka.ms/eltfhc](https://aka.ms/eltfhc).


    It is a fully configurable and comprehensive set of classes that let you define
    your own `RetryStrategy` (e.g., `FixedInterval`, `Incremental`, `ExponentialBackoff`)
    and use a standard (out of the box) or a custom transient error detection logic.
    These two components combined define a `RetryPolicy` which is the class you use
    to wrap database access activities. Let’s look at a practical implementation using
    this framework.


    ```

    public async Task> GetOrders()

    {

    // Get retry strategy

    RetryStrategy retryStrategy =

    config.GetRetryStrategies()

    ["MyFixedStrategy"];

    // Create retry policy

    RetryPolicy retry = new

    RetryPolicy(retryStrategy);

    // Wrap database interaction with retry policy

    await retry.ExecuteAsync(async () => {

    List orders = new List();

    using (SqlConnection cnn =  new SqlConnection(

    _config.GetConnectionString

    ("DefaultConnection")))

    {

    SqlCommand cmd = new SqlCommand

    (@"SELECT TOP 5

    [o].[OrderID],

    [o].[OrderDate],

    [c].[CustomerName]

    FROM [Sales].[Orders] AS [o]

    INNER JOIN [Sales].[Customers] AS [c]

    ON [o].[CustomerID] = [c].[CustomerID]",cnn);

    await cnn.OpenAsync();

    SqlDataReader dr = await cmd.ExecuteReaderAsync();

    while (dr.Read())

    {

    orders.Add(new Order()

    {

    OrderID = Convert.ToInt32(dr[0]),

    OrderDate = Convert.ToDateTime(dr[1]),

    CustomerName = Convert.ToString(dr[2])

    });

    }

    }

    return orders;

    });

    }

    Listing 3-6

    Use a retry logic library in a C# application

    ```


    In this fragment (you can find the complete example in the companion GitHub repo),
    we configure retry strategies’ details in a configuration file, essentially defining
    all the parameters like number of retries, retry intervals, and so on.'
