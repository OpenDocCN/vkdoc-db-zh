    What this query returns is a row for the 25 queries that are consuming more CPU
    time, in our case just one, with a number of attributes as you can see from the
    following picture:


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figc_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figc_HTML.jpg)


    In details, we’re getting a binary value indicating all queries with the same
    “shape” (where there may only be a change in a parameter value or such), an indication
    of how many times that query has been executed followed by the query text itself.
    From there, a long list of very important metrics indicating total, min, average,
    and max usage of critical resources like CPU (worker) time, data page reads and
    writes, and much more. By changing the order by column, we can look at what queries
    are executed more often (by `execution_count`) or what queries are reading or
    writing more data pages and so on.


    This example here is just scratching the surface of what we can do with DMVs,
    but there is much more. We can investigate and identify performance bottlenecks
    due to poorly designed table or index structures, monitoring database and object
    sizes or locking and blocking issues between concurrent users and so on. For more
    details on what is possible, we recommend you to take a look at Azure SQL official
    documentation here: [`https://aka.ms/asdbmwd`](https://aka.ms/asdbmwd).


    ## Execution plans


    In our previous example, one of the columns retrieved through those DMVs was an
    XML fragment returning the query execution plan:


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figd_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figd_HTML.jpg)


    By clicking that column within SQL Server Management Studio, a new window gets
    opened showing something like this:


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Fige_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Fige_HTML.jpg)


    This is the graphical representation of the query execution plan used to resolve
    that particular query and shows all detailed steps that Azure SQL engine took
    to be able to produce the result returned to the client. Azure SQL has a pool
    of memory that is used to store both execution plans and data buffers. When any
    Transact-SQL statement is executed, the Database Engine first looks through the
    plan cache to verify that an existing execution plan for the same Transact-SQL
    statement exists. The Transact-SQL statement qualifies as existing if it literally
    matches a previously executed Transact-SQL statement with a cached plan, character
    per character. Azure SQL reuses any existing plan it finds, saving the overhead
    of recompiling the Transact-SQL statement. If no execution plan exists, Azure
    SQL generates a new execution plan for the query, trying to find the one with
    the lowest cost in terms of resource utilization, within a reasonable time interval.


    Understanding how this execution plan is created and executed is critical to make
    sure that the workload generated by our application is optimized for our data
    model and indexing strategy or instead requires some optimizations.


    Note


    Many modern databases use the more technical term DAG – Directed Acyclic Graph –
    instead of the user-friendlier term Execution Plan. If you already have experience
    with Apache Spark, for example, a DAG and an Execution Plan are basically the
    same thing.


    As a rule of thumb, execution plans visualized via Management Studio steps should
    be interpreted *from right to left and from top to bottom* to determine the order
    in which they have been executed. In our preceding example, the first step is
    a Seek operator using a nonclustered index created on the `CustomerID` column
    of the `Orders` table to find one or more rows with a value of 832\. As the index
    that the query engine is using does not likely contain all the columns in the
    select list (where we mistakenly used an asterisk instead of the full column list),
    the next step in the execution plan is to loop on all rows retrieved by the first
    operator and for each of them to execute a Lookup operator that will use the clustered
    index key retrieved by the Seek operator to read all the other columns from clustered
    index (`PK_Sales_Orders`) created on the `Orders` table.


    By overlying the mouse on a given operator, we can get a lot of insights on that
    step, like the execution mode (Row or Batch) or the underlying storage type of
    that object (RowStore vs. ColumnStore) and a detailed description of CPU and IO
    costs associated with that.


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figf_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figf_HTML.jpg)


    For example, we can see that the Key Lookup operator is accounting for the 99%
    of the cost of the entire query, and it is executed 127 times (like the number
    of rows filtered by the first Seek operator).'
