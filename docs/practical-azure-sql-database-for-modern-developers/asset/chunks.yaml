    Regular tables in a database contain the latest versions of data rows. Whenever
    some query updates the values, the old values are overwritten. This is usually
    the expected and desired behavior, but in some cases, you may like to also have
    the ability to access old values. Some examples might be


    *   Error correction – Someone accidentally changed or deleted a row in a table,
