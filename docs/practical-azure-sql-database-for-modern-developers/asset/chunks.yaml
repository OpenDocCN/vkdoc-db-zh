    ## 如果你想了解更多


    你在本章中学到的知识使你能够专业地创建合适的数据库设计，并理解数据库中可能遇到的问题。本章解释的概念代表了数据库设计所需的核心知识。在下一章中，我们将更进一步——你将了解如何使用一些高级概念和表的类型与索引，这些可以提升你的数据库性能。


    要了解更多本章提及的主题，你可以从这些资源开始：


    *   数据库设计与关系理论：范式及其他——[www.amazon.com/Database-Design-Relational-Theory-Normal-ebook/dp/B082X1B6WP](http://www.amazon.com/Database-Design-Relational-Theory-Normal-ebook/dp/B082X1B6WP)

    *   SQL Server 专家级性能索引——[www.amazon.com/Expert-Performance-Indexing-SQL-Server/dp/1484211197](http://www.amazon.com/Expert-Performance-Indexing-SQL-Server/dp/1484211197)

    *   设计模式：可复用面向对象软件的元素——[www.amazon.com/Design-Patterns-Elements-Reusable-Object-Oriented/dp/0201633612](http://www.amazon.com/Design-Patterns-Elements-Reusable-Object-Oriented/dp/0201633612)

    *   领域驱动设计：应对软件核心复杂性——[www.amazon.com/Domain-Driven-Design-Tackling-Complexity-Software-ebook/dp/B00794TAUG](http://www.amazon.com/Domain-Driven-Design-Tackling-Complexity-Software-ebook/dp/B00794TAUG)

    *   数据库：解释数据规范化、数据异常与 DBMS 键——[`towardsdatascience.com/softly-explained-data-normalization-data-anomalies-and-dbms-keys-f8122aefaeb3`](https://towardsdatascience.com/softly-explained-data-normalization-data-anomalies-and-dbms-keys-f8122aefaeb3)

    *   堆与索引——[`docs.microsoft.com/sql/relational-databases/indexes/heaps-tables-without-clustered-indexes`](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/heaps-tables-without-clustered-indexes%253Fview%253Dsql-server-ver15)

    *   Tiger Toolbox —— [`github.com/microsoft/tigertoolbox`](https://github.com/microsoft/tigertoolbox)

    *   First Responder Kit —— [`github.com/BrentOzarULTD/SQL-Server-First-Responder-Kit`](https://github.com/BrentOzarULTD/SQL-Server-First-Responder-Kit)

    *   sp_WhoIsActive —— [`github.com/amachanic/sp_whoisactive`](https://github.com/amachanic/sp_whoisactive)


    # 7. 可扩展性、一致性与性能


    可扩展性，通常定义为系统通过向其添加资源来处理不断增长的工作量的能力。在云平台中，大规模标准化和“规模经济”原则驱动着硬件设计，单纯向单个服务实例添加资源的能力可能受到限制。这就是为什么，除了采用横向扩展架构外，设计并调优你的工作负载以最大化资源利用率，同样是一个至关重要的可扩展性方面。如果你正在设计一个全新的应用程序，或者有机会在迁移前修改一个现有应用，这也能实实在在地降低你的云账单。


    虽然可扩展性无疑是一个关键属性，但一致性是我们应该期望从关系型数据库管理系统解决方案中获得的另一个关键方面。事务性系统确保数据在应用程序和用户交互后保持一致状态，而底层引擎负责管理不同用户的多个并发活动将如何访问数据以维持这种一致性，这是基于可配置的属性，例如这些事务活动之间的隔离级别。


    一致性确实是应用程序开发中的*关键因素*，尽管它常常被忽视：许多开发人员认为一致性是可选的。在一些极端情况下，这也许是对的；但在大多数情况下，并非如此。事实上，近来关系型数据库管理系统重新成为焦点并非偶然。在著名的论文《F1：一个可扩展的分布式
    SQL 数据库》中，谷歌明确指出：“设计应用程序来处理数据中的并发异常非常容易出错、耗时，并且最终不值得为那点性能提升而冒险。” 而如果数据库层面没有处理好一致性，猜猜谁会被要求编写代码来处理它？没错，就是你，开发者。这是因为你的用户会认为一致性是理所当然的。所以，必须有人或有东西来处理它——当然，是在大规模环境下。而数据库级别的、大规模的一致性，正是像谷歌
    Spanner、亚马逊 Aurora 和 Azure SQL Hyperscale 这样的全新一代后关系型数据库诞生的原因。

    '
- fmt: '## Transactions


    ### Understanding Transactions and ACID Properties


    Transactions are units of work within a given application logic that may be composed
    of multiple lower-level tasks. Transactions are also known as "Unit Of Work,"
    a very well-known pattern that keeps track of changes and logically commits or
    rolls them back as a whole, as described by Martin Fowler in his *Patterns of
    Enterprise Application Architecture* book.


    Database systems process transactions while maintaining what are known as `ACID`
    properties (`Atomicity`, `Consistency`, `Isolation`, and `Durability`) to guarantee
    data integrity and accuracy. Canonical examples of business logic for a transaction
    can be a money transfer between bank accounts or an ATM cash withdrawal, where
    you want to make sure a number of operations are happening following the "all
    or nothing" logic. A database platform helps enforce these `ACID` properties without
    requiring complex implementations from an application standpoint: developers won’t
    need to manually implement logic that reverts update actions if at least one update
    fails.


    ### The Importance of Transactions in Any Application


    Now, you may be very familiar with this sample, and you may be thinking that you’re
    not going to write a banking application, so you don’t really need transactions.
    While this line of thought can be apparently correct, keep in mind that even in
    the simplest application, let’s say a blog engine, you may have the need to use
    transactions.


    Let’s say, in fact, that you want to keep track of how many people visit your
    blog, keeping the count both for the whole blog and for each post you have written.
    Since you want to be sure you can scale as much as needed, you have two counters,
    one for the whole blog and one for each article. Each time someone visits a page,
    you need to increment the counter for the whole website and the counter for that
    page. What happens if you don’t implement and manage transactions properly?


    It could happen that, for any reason, something crashes after the website counter
    has been updated but before the post counter is updated too. This means that now
    you have completely lost the information. Consistency is gone. If you try to sum
    up all the single counters, the result will be different than the site counter.
    Which value is correct now? You may be able to rebuild the information – maybe
    – with a lot of dedication, time, and effort. In many cases, you just can’t. Now,
    for a blog counter, that’s not a big deal (and even this is not true, what if
    you get paid by the number of visits to your blog?), but it gives you the importance
    of consistency, and thus transactions, even in places where maybe you haven’t
    thought. Data consistency should be the cornerstone of every system. Without it,
    data is just noise.


    ### How ACID Properties are Achieved: Write-Ahead Logging (WAL)


    Luckily for us, in modern database systems, `ACID` properties are usually achieved
    through write-ahead logging (WAL) which is a capability that provides atomicity
    and durability by recording changes in the transaction log at first and only later
    are written to the database by a recurring background process referred to as `checkpoint`.
    The log is usually storing both redo and undo information that will be used to
    recover whatever transaction was already committed, but not yet written in the
    database, in situations like recovering from a power loss or during a database
    restore.


    > **Note**

    > If you are an Apache Kafka user, you may find a lot of similarities between
    the WAL technique and the Immutable Log principle used by Apache Kafka. Everything
    is an event, stored in the log, in both cases. By reading the log forward or backward,
    you can redo or undo any action and even stop at a desired point in time. This
    is exactly why RDBMS like Azure SQL guarantees the end user that no data will
    be lost and everything can be recovered and the point in time they desire.


    ### Transactions in Azure SQL: Use Cases and Mechanisms


    In Azure SQL, you can think of several use cases where using a transaction can
    help. As an example, you may want to insert, update, or delete multiple rows from
    a table as a single unit or batch process rather than going one by one. Similarly,
    you may need to modify the state of a table when, and only when, other tables
    in the same or in a different database (or even server) have been modified as
    well.


    As these systems can process multiple of these operations concurrently, Azure
    SQL engine will protect consistency, generally, by placing locks on various resources
    involved in these transactions (base tables, index keys, etc.), with a level of
    granularity that can span from a single row to the entire database, depending
    on how concurrency (also known as isolation) settings have been configured. These
    locks will be released once transactions will be committed or rolled back.


    Locks are just one of the options, probably the simplest, that Azure SQL can use
    to make sure data stays consistent. Another, much more sophisticated, is the ability
    to keep different versions of the same row active at the same time, serving the
    correct version to the requesting transaction, guaranteeing consistency even if
    other transactions are changing that very same row. Discussion of this technique,
    known as `row versioning`, is way out of the scope of this book: just keep in
    mind that Azure SQL will use a mix of the two to make sure you have the best possible
    experience and performance by default.


    > **Tip**

    > Keeping your transactions as short in duration as possible is a best practice
    that will help increase concurrency on your database objects and reducing system
    resources needed to maintain locks or row versions.


    ### Managing Transactions: Control and Scope


    Applications can control transactions by specifying when a transaction starts
    and ends, successfully or not, through either Transact-SQL commands or API functions
    exposed by client drivers. Transactions are usually managed at the connection
    level: when a transaction is started on a connection, all Transact-SQL statements
    executed on that connection are part of the transaction until the transaction
    ends.


    > **Note**

    > An exception to this behavior is when you have a multiple active resultset (`MARS`)
    session. `MARS` is a feature that can be turned on through a connection string
    attribute and will let an application to execute a command on a connection while
    there is already an active resultset opened on the same connection. A typical
    scenario is while you are cycling over a series of rows retrieved by a `SELECT`
    query and you want to execute an `UPDATE` command using the same connection. In
    this case, a transaction will be scoped at the batch level (instead of at the
    connection level), and when it completes, Azure SQL will automatically roll it
    back if the transaction is not explicitly committed or rolled back.


    ### Explicit and Auto-Commit Modes


    Transactions in Azure SQL are defined `explicit` when you explicitly define start
    and end through an API function (e.g., `BeginTransaction()` method in .NET languages)
    or by issuing `T-SQL` statements like `BEGIN TRANSACTION`, `COMMIT TRANSACTION`,
    `COMMIT WORK`, `ROLLBACK TRANSACTION`, or `ROLLBACK WORK`.


    When you do not explicitly initiate a transaction, but execute a single command
    against Azure SQL, then the default mode is called `auto-commit`. In this mode,
    every `T-SQL` statement is committed or rolled back when it completes. If a statement
    completes successfully, it is committed; if it encounters any error, it is rolled
    back. Auto-commit mode is also the default mode in which client drivers like `ADO`,
    `OLE DB`, `ODBC`, and `DB-Library` operate.'
  raw: '## Transactions


    Transactions are units of work within a given application logic that it may be
    composed of multiple lower-level tasks. Transactions are known also as “Unit Of
    Work,” a very well-known pattern that keeps track of changes and that logically
    commits or rolls back them as a whole, also described by Martin Fowler in his
    *Patterns of Enterprise Application Architecture* book. Database systems process
    transactions while maintaining what are known as *ACID* properties (*Atomicity*,
    *Consistency*, *Isolation*, and *Durability*) to guarantee data integrity and
    accuracy. Canonical examples of business logic for a transaction can be a money
    transfer between bank accounts or an ATM cash withdrawal, where you want to make
    sure a number of operations are happening following the “all or nothing” logic.
    A database platform helps enforcing these ACID properties without requiring complex
    implementations from an application standpoint: developers won’t need to manually
    implement logic that reverts update actions if at least one update fails.


    Now, you may be very familiar with this sample, and you may be thinking that you’re
    not going to write a banking application, so you don’t really need transactions.
    While this line of thought can be apparently correct, keep in mind that even in
    the simplest application, let’s say a blog engine, you may have the need to use
    transactions. Let’s say, in fact, that you want to keep track of how many people
    visit your blog, keeping the count both for the whole blog and for each post you
    have written. Since you want to be sure you can scale as much as needed, you have
    two counters, one for the whole blog and one for each article. Each time someone
    visits a page, you need to increment the counter for the whole website and the
    counter for that page. What happens if you don’t implement and manage transactions
    properly?


    It could happen that, for any reason, something crashes after the website counter
    has been updated but before the post counter is updated too. This means that now
    you have completely lost the information. Consistency is gone. If you try to sum
    up all the single counters, the result will be different than the site counter.
    Which value is correct now? You may be able to rebuild the information – maybe –
    with a lot of dedication, time, and effort. In many cases, you just can’t. Now,
    for a blog counter, that’s not a big deal (and even this is not true, what if
    you get paid by the number of visits to your blog?), but it gives you the importance
    of consistency, and thus transactions, even in places where maybe you haven’t
    thought. Data consistency should be the cornerstone of every system. Without it,
    data is just noise.


