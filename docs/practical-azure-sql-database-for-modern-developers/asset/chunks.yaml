- fmt: "The best part is the authors are most of my old SQLCAT/AzureCAT friends who\
    \ are still part of the Microsoft Data Group in engineering, so it promises to\
    \ be technical, practical, and very valuable to jumpstart your cloud journey.\
    \ I was honored to be asked to write this foreword. While I recently moved out\
    \ of engineering to run the Microsoft Customer Success organization (part of the\
    \ worldwide commercial business), Microsoft data services remains close to my\
    \ heart. Thank you, team, for writing this timely book for our customers and data\
    \ developers across the world. I know it will be a big hit.\n\n> **—Mark Souza**\n\
    > \n> **Corporate Vice President – Microsoft Customer Success**\n\n# Introduction\n\
    \nThis book encapsulates our combined experience on what developers need to build\
    \ resilient, scalable, and secured database applications. `Azure SQL Database`\
    \ provides a solid foundation for database applications, and we believe this book\
    \ will provide a solid foundation for the developers to build the applications\
    \ for future.\n\n## Chapter 1\nStarts off with the motivation for the book and\
    \ sets the stage for developer mindset.\n\n## Chapter 2\nGets you kick-started\
    \ with `Azure SQL`, how to provision and build your first database, and how to\
    \ use the samples.\n\nOnce you have your database, you would like to connect to\
    \ it and start querying it. **Chapter 3** gets you there. It also takes you through\
    \ on configuring the right connection attributes and building the connection retry\
    \ logic for resiliency.\n\n## Chapter 4\nTakes you through the foundations of\
    \ building the constructs and writing a database application.\n\n## Chapter 5\n\
    Builds on Chapter 4 and discusses more advanced concepts.\n\n## Chapter 6\nDiscusses\
    \ practical use cases and best practices for using tables and indexes.\n\n## Chapter\
    \ 7\nDiscusses more advanced concepts, such as consistency, scalability, and performance.\n\
    \n## Chapter 8\nDiscusses the multi-model capabilities in `Azure SQL` that help\
    \ you build modern applications.\n\n## Chapter 9\nDiscusses advanced data storage\
    \ capabilities, such as `columnstore` indexes, memory-optimized tables, temporal\
    \ tables, and so on.\n\nHaving written your application, you would like to monitor\
    \ its performance and debug it. **Chapter 10** takes you through that.\n\nThe\
    \ journey of a developer isn’t complete without the discussion on DevOps. **Chapter\
    \ 11** discusses DevOps technologies, tools, and processes for database applications\
    \ involving `Azure SQL` database.\n\n# Acknowledgments\n\n## Davide Mauri\nAs\
    \ this is my first book as main author, I’ll go for the most common and obvious\
    \ path of saying a big, huge “thank you” to my wife Olga, my amazing kids Riccardo\
    \ and Anna, and my whole family Maurizio, Ornella e Claudio for…well everything.\
    \ From little things to big, life-changing events, you have always been supportive\
    \ and encouraged me to be my best self, either with words or, even more important,\
    \ showing the way. And while these thanks are common and obvious, they are nonetheless\
    \ heartfelt and true. So thanks, thanks, thanks. I love you all.\n\nI also want\
    \ to say thanks to Lara, Chuck, and Sanjay: without you, my experience in Microsoft\
    \ wouldn’t have been the dream experience I’ve had – and I’m still having – so\
    \ I really want to say thanks to you for everything you have done to help and\
    \ support me in my journey. Thanks, thanks a lot. I also want to say a big “thank\
    \ you” to Itzik, Lilach and Lubor, for being so welcoming from the first day we\
    \ moved into the United States. You made us feeling at home right away, thanks!\n\
    \n## Silvano Coriani\nWhen I wrote my first “solo” book on `ADO.NET` and `SQL\
    \ Server`, around 17 years ago, I promised myself that it was also going to be\
    \ the last ![../images/493913_1_En_BookFrontmatter_Figg_HTML.gif](images/493913_1_En_BookFrontmatter_Figg_HTML.gif)\
    \ but when my friend and colleague Davide proposed me this team effort together\
    \ with a group of great professionals like Anna, Sanjay, and Jovan, I couldn’t\
    \ say “no.” My first big “thank you” is clearly for them, for their help and support\
    \ during this adventure. During my 25+-years-long career, I’ve been blessed to\
    \ be surrounded by a lot of great folks and learn from all of them, but the years\
    \ I’ve spent in `SQLCAT` with Mark, Sanjay, and team have been a great gift and\
    \ helped me to grow as a human being and a professional. I’d like to thank each\
    \ and every one of them! And the story continues now within the `Azure SQL` team,\
    \ where I have the privilege of keep working with wonderful individuals, colleagues,\
    \ and bosses: thank you all!\n\nOn a personal level, first and foremost I’d like\
    \ to thank my family: my lovely wife Serena and my kids Caterina and Lorenzo.\
    \ Their patience, love, and support, especially during those long lockdown days\
    \ when I was writing this book, were invaluable. Last but not least, a big thank\
    \ to my broader family, my parents and parents-in-law, for their support and encouragement.\n\
    \n## Anna Hoffman\nBeing relatively new to `Azure SQL` and the world of developers,\
    \ I am so grateful to Davide, Silvano, Jovan, and Sanjay for the amazing opportunity\
    \ to work on both topics with some of the world’s greatest SQL veterans. Through\
    \ this experience, I have learned and grown from all of them in big ways. I also\
    \ want to thank the `SQL` community, inside and outside of Microsoft, for being\
    \ unlike any other community I’ve been a part of. Every day, I learn from you\
    \ all, so thank you. I am thankful to every PM and engineer on our team, but specifically,\
    \ I’d also like to thank Alain Dormehl, Bob Ward, and Buck Woody for providing\
    \ much time and patience as I learn about `Azure SQL` and `SQL Server`. I also\
    \ want to thank Asad Khan, our fearless `SQL` leader, for taking a chance on me\
    \ two years ago in joining this team and for his continued support. Personally,\
    \ I want to acknowledge my husband, Phil, who is my biggest cheerleader and helps\
    \ me with our puppy (Moose, the best quarantine decision we ever made) when I\
    \ spend long hours obsessing over `Azure SQL`. Finally, I want to thank my parents,\
    \ Shaji and Leigh Ann Thomas, who inspire me every day to be better (and who started\
    \ the Computer Science trend in our family) and my brother, Zachary, who is continuing\
    \ that tradition in his final year at Duke University (I am so proud of you and\
    \ can’t wait to see what you accomplish!).\n\n## Sanjay Mishra\nI recently completed\
    \ 15 years at Microsoft. In my early years in Microsoft, two people went out of\
    \ their way to help me get settled and grow in my role, and I would like to acknowledge\
    \ their contribution and influence – Mike Ruthruff and Prem Mehra. Mike spent\
    \ countless hours with me in my early days helping me understand the new database\
    \ product I was dealing with, which was so similar, yet so different from the\
