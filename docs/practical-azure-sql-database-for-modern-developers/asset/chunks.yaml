    solution for your table.


    You may also have noticed that quite a few questions were around proper data type
    size. Today there is no shortage of space and resources, so spending time just
    to spare a bunch of bytes may seem a waste of time. Well, keep in mind that if
    your solution is successful, your database can easily contain literally billions
    of rows. Wasting space will not only mean wasting storage space but also more
    memory needs and higher CPU consumption. In the cloud, where you pay for what
    you use…well, I guess you figured it out already: more costs for exactly the same
    performance of an otherwise optimized model. Be a better developer!


    ### Determine the right column types


    When you design your table, you need to find a SQL column type for every data
    type from your application that you want to persist. You need to consider the
    following to effectively design your tables:


    *   Define column types that describe your data.


    *   Specify collations to define sorting and comparison rules for textual data.


    *   Use computed columns for pre-calculated expressions.


    In the following sections, you will see some best practices and guidelines that
    you can use while you are defining your tables.


    #### Define your column types


    Most of the value types from application programming languages have a matching
    SQL type counterpart, from which you can quickly determine which SQL types to
    store the values from domain objects. There are also lots of tools that automatically
    generate table columns and their types based on the type of class properties (so-called
    Code First approach). Although you can use tools and deterministic mapping, it
    would be beneficial if you learn how to carefully examine and improve your table
    design. The main reason is the fact that you know more about the domain model
    than your tools, and you should not let an automatic generator create the most
    essential part of your application using a set of generic rules. Some examples
    of default mapping rules that might not be the best fit for your design are


    *   String types are by default mapped to `NVARCHAR(MAX)` type because it can
    contain any Unicode text with arbitrary string length (up to 2GB). The downside
    of this decision is that `NVARCHAR(MAX)` is a list of 4000-character strings,
    and therefore, it is suboptimal in many operations compared with the string types
    with the length less than 4000 characters. If you know that your text will have
    some length limit, try to use a more precise type like `NVARCHAR(100)`, which
    might boost performance of your queries.


    *   Some languages, like C#, do not have fine-grained types for date and datetime.
    You might use `DateTime` type for dates even if you do not use time parts. These
    data values are mapped to `datetime2`. If you know that your `DateTime` values
    contain only dates without time, it would be more optimal to use the exact `date`
    type.


    *   Decimal numbers (`float`, `real` types) are mapped to `decimal` type. Instead
    of plain decimal type, in Azure SQL, you can explicitly specify how many decimal
    places it can have and that is the size. Size of decimal numbers might vary between
    5 and 17 bytes per number depending on the precision. If you know that you are
    using a decimal number to store money where you have just two decimal places,
    and you know the maximal theoretical amount of money that your application will
    use, you can explicitly specify the size.


    These examples are minor checks and adjustments that can make you a hero if you
    spend some time to validate the results of the default rules and improve them
    with your knowledge of the domain model.


    General advice is to try to make your columns as small as possible and find the
    minimal SQL types for a given type. With appropriately sized smaller types, you
    can store the same amount of application data using a smaller amount of storage.
    Beyond storage savings, smaller types can positively impact query performances.
    Azure SQL database has an internal memory cache (known as SQL buffer pool) that
    contains a part of the data from persistent storage, increasing the speed of retrieval
    for that data. With unnecessarily large types, you waste the precious buffer pool
    space with unnecessarily padded data. Also, smaller types require fewer disk and
    network input/output operations which allows you to more quickly load or save
    data. Further, big columns can trick the Azure SQL query optimizer into reserving
    excess memory for the queries on those columns. The memory would not be leveraged,
    but since it is reserved for the queries, other queries may not get enough memory.
    In addition, data with a smaller memory footprint can be allocated to smaller
    and much faster memory cache layers. In some cases, you might find that query
    performance increases just because data does not have useless 0 values padded
    because someone chose a larger than necessary data type.


    Some recommend to use globally unique identifier (GUID) values as the identifiers
    of your domain model objects to avoid dependency on databases that will generate
    object identifiers. The advantage of GUID is that you can assign the identity
    to the Model object in your app without consulting your database. However, the
    big disadvantage is the fact that GUID values are 16-byte long compared to `int`
    (4-byte) or `bigint` (8-byte). While storage consumption is not optimal, it is
    not the main concern here. Finding or joining the rows could be much slower if
    you unnecessarily used GUID values, as data is spread randomly everywhere, impacting
    a lot on cache efficiency, especially once your table grows after you go to production,
    especially if the solution is successful and it is used by a lot of users. Good
    design might prevent a lot of performance issues that might happen once your application
    faces a real scenario with millions of rows per table.'
  trans: '### 创建表


    Azure SQL 让你能够轻松创建表，无需使用图形化工具或生成器。你可以使用简短的 `CREATE TABLE` 语句来创建新表：


    ```

    CREATE TABLE Customer (

    CustomerID tinyint,

    CustomerName varchar(max),

    LocationID bigint

    );

    ```


    虽然定义好列来创建表结构很简单，但这仍然不算是表设计。恰当的表设计是一个过程，你需要识别出最适合你应用程序的表特征。回顾上一个示例中的表定义，我们可能会问自己几个问题来审视这个设计：


    *   是否可能有两个客户的 `CustomerID` 相同？我们是否需要确保不会有人插入两个具有相同标识符的客户？

    *   `tinyint` 类型是客户 ID 的合适选择吗？`tinyint` 列只能包含 256 个不同的值，这对于我们可能拥有的所有客户来说是否足够？

    *   `varchar(max)` 类型允许我们存储最大达 2GB 的字符串；然而，这是不是有点小题大做？如果我们知道客户名称长度不能超过 100 个字符，我们是否可以使用像
    `varchar(100)` 这样更小的类型？

    *   `varchar` 类型允许我们使用英语和其他西方语言的大多数常见字符。但是，我们是否会有一些客户名称包含非常见的拉丁字符（例如，匈牙利语的 ű 或
    ő，或斯拉夫语的 đ、č、ć）、西里尔字符（ђ、ч 或 ћ）或亚洲字符？如果是这样，`nvarchar` 类型可能是更好的选择。

    *   当我们对客户名称进行排序或比较时，是否应该忽略字母大小写？是否还有其他语言规则我们需要应用？

    *   在 `LocationID` 列中，我们可以存储 `2⁶⁴` 个不同的位置，但我们真的有这么多位置吗？我们可以使用更小的类型吗？

    *   `LocationID` 值是某个独立表中位置的标识符吗？如果是这样，我们如何确保 `LocationID` 中的值存在于另一个表中？如何确保如果某个位置仍有客户关联时，该位置不会被删除？


    恰当的表设计应该回答这些问题，并让你的表拥有正确的解决方案。


    你可能也注意到，相当多的问题都围绕着合适的数据类型大小。如今，空间和资源并不短缺，因此仅仅为了节省几个字节而花费时间可能看起来是浪费时间。但是，请记住，如果你的解决方案成功了，你的数据库可以轻易地包含数十亿行数据。浪费空间不仅意味着浪费存储空间，还意味着更多的内存需求和更高的
    CPU 消耗。在云环境中，你需要为所使用的服务付费……好吧，我想你已经明白了：对于原本可以优化的模型，却要为同样的性能支付更高的成本。做一个更优秀的开发者吧！


    ### 确定合适的列类型


    设计表时，你需要为你想要持久化的应用程序中的每个数据类型找到一个对应的 SQL 列类型。为了有效地设计表，你需要考虑以下几点：


    *   定义能描述你数据的列类型。

    *   指定排序规则（collations）来定义文本数据的排序和比较规则。

    *   使用计算列（computed columns）来存放预计算的表达式。


    在接下来的章节中，你将看到一些在定义表时可以使用的最佳实践和指南。


    #### 定义你的列类型


    应用程序编程语言中的大多数值类型都有对应的 SQL 类型，你可以据此快速确定用于存储领域对象值的 SQL 类型。也有许多工具可以根据类属性的类型（即所谓的“代码优先”方法）自动生成表列及其类型。虽然你可以使用工具和确定性的映射，但如果你学会仔细检查和改进你的表设计，将会受益匪浅。主要原因是你比工具更了解领域模型，你不应该让自动化的生成器使用一组通用规则来创建你应用程序最核心的部分。一些默认的映射规则可能并不最适合你的设计，例如：


    *   字符串类型默认映射到 `NVARCHAR(MAX)` 类型，因为它可以包含任意长度（最大 2GB）的任何 Unicode 文本。这个决定的缺点是，`NVARCHAR(MAX)`
    是一个 4000 字符的列表，因此，与长度小于 4000 字符的字符串类型相比，它在许多操作中并非最优。如果你知道你的文本有长度限制，请尝试使用更精确的类型，如
    `NVARCHAR(100)`，这可能会提升查询性能。

    *   像 C#这样的语言，没有针对日期和日期时间的精细类型。你可能对日期也使用 `DateTime` 类型，即使你不使用时间部分。这些数据值会被映射到 `datetime2`。如果你知道你的
    `DateTime` 值只包含日期而不包含时间，使用精确的 `date` 类型会更优。

    *   十进制数字（`float`、`real` 类型）被映射到 `decimal` 类型。在 Azure SQL 中，你可以显式指定十进制数的小数位数，也就是其大小。十进制数字的大小可能在每个数字
    5 到 17 字节之间变化，具体取决于精度。如果你使用十进制数来存储货币，只有两位小数，并且你知道你的应用程序将使用的最大理论金额，你可以显式指定大小。


    这些例子是一些小的检查和调整，如果你花些时间验证默认规则的结果，并利用你对领域模型的了解进行改进，就能让你成为团队中的英雄。


    一般的建议是，尽量使列尽可能小，并为给定类型找到最小的 SQL 类型。通过使用大小合适的较小类型，你可以用更少的存储空间来存储相同数量的应用数据。除了节省存储空间外，较小的类型还能积极影响查询性能。Azure
    SQL 数据库有一个内部内存缓存（称为 SQL 缓冲池），其中包含来自持久存储的部分数据，从而提高了检索这些数据的速度。使用不必要的大类型，你会用不必要的填充数据浪费宝贵的缓冲池空间。此外，较小的类型需要更少的磁盘和网络输入/输出操作，这使你能够更快地加载或保存数据。再者，大列可能会“欺骗”Azure
    SQL 查询优化器，使其为这些列上的查询保留过多的内存。这些内存可能不会被充分利用，但由于它被保留给了查询，其他查询可能无法获得足够的内存。此外，内存占用较小的数据可以被分配到更小、更快的内层内存缓存中。在某些情况下，你可能会发现查询性能提升仅仅是因为数据没有被无用的
    0 值填充——而这是因为有人选择了比实际需要更大的数据类型。


    有些人建议使用全局唯一标识符（GUID）值作为领域模型对象的标识符，以避免依赖数据库来生成对象标识符。GUID 的优势在于，你可以在不咨询数据库的情况下，在应用程序中直接给
    Model 对象分配标识符。然而，巨大的缺点是 GUID 值长达 16 字节，而 `int` 为 4 字节，`bigint` 为 8 字节。虽然存储消耗不是最优的，但这并非主要问题。如果你不必要地使用
    GUID 值，查找或连接行可能会慢得多，因为数据是随机分布的，这会严重影响缓存效率，尤其是在你的表在投入生产后增长起来——特别是如果解决方案成功并拥有大量用户时。良好的设计可以防止许多在应用程序面临每张表数百万行数据的真实场景时可能出现的性能问题。'
- fmt: '## Collations


    Collation is another important text property in Azure SQL. Differing collations
    enable you to define what linguistic rules should be used when Azure SQL compares
    or sorts the text values.


    In standard programming languages, you use plain strings and you need to explicitly
    specify that you want to use case-insensitive comparison or sorting rules when
    you need it. For example, if you need to use some locale linguistic rules to sort
    strings in C#, you need to specify `CultureInfo` for the target language. In most
    programming languages, you need to specify case insensitivity or culture explicitly
    in some method. Azure SQL enables you to define language rules and case sensitivity,
    but it also enables some more advanced comparison and sorting rules like accent
    sensitivity, Kana sensitivity (to distinguish Japanese Hiragana and Katakana characters),
    or Variation selector sensitivity (to apply some fine-grained sorting rules in
    modern digital encodings).


    You can easily set collation on any string column using a statement like the following
    one:


    ```sql

    ALTER TABLE Warehouse.StockItems

    ALTER COLUMN Brand NVARCHAR(50)

    COLLATE Serbian_Cyrillic_100_CI_AI

    ```


    This statement will specify that any string operation on the column will use Serbian
    linguistic rules and ignore casing (`CI`) and accents (`AI`) in strings. Changing
    the property of the column will automatically be applied on all sorting and comparison
    rules that use this column.


    Azure SQL has collations for most of the world languages and enables you to turn
    on/off case, accent, or kana sensitivity rules for all of them. This is the huge
    benefit for you if you need to implement applications for global markets.


    If you do not speak Japanese and you get a bug that some Japanese words in the
    application are incorrectly ordered, the last thing that you would like to do
    is start learning about the difference between Katakana and Hiragana just to fix
    the bug. This is the time when you would leverage the power of linguistic rules
    that Azure SQL provides and rely on the fact that Azure SQL can correctly sort
    results.


    Another important property of text is encoding. Characters can be stored using
    different binary representations, and the rule that translates a character to
    its binary form is called encoding schema. Unicode standard assigned a unique
    numeric identifier (known as `code point`) to most of the relevant characters
    that are currently used (even emojis have their unique code points!). Encoding
    schema defines how to serialize characters or their code points as a series of
    bytes.


    One of the simplest encoding schemas is ASCII that uses 7 bits to encode most
    common characters used in English language with one byte per character (e.g.,
    code `0x5B` is used for “]”). ASCII encoding supports only common characters used
    in English language, but not other characters used in Western or Latin languages
    such as ä, ö, ü, ñ, or ß. Windows-1252 and ISO-8859-1 are the extensions of ASCII
    that use 8 bits to encode a wider character set. These encoding schemas encode
    other common characters in Western languages. However, since these encoding schemas
    cannot represent characters used in the other languages, other nations derived
    their own 8-bit encoding schemas for national character sets. Examples of other
    national character sets are ISCII (India), VSCII (Vietnam), or YUSCII (former
    Yugoslavia). The single-byte national character sets use the code points in range
    up to 256 to represent common characters used in their national alphabets. Azure
    SQL uses `varchar` type to represent a character in some of the single-byte encoding
    schemas (although there are also some multi-byte codepages). To differentiate
    what national character set the encoded value belongs to some codepage, Azure
    SQL uses the column collation. If a binary value in the `varchar` column is `0xC6`
    and column collation is one of the Latin collations (codepage Windows-1250), Azure
    SQL will assume that this is character “Ć”. If collation is one of the Serbian
    collations, Azure SQL will assume that this is character “Ж” (in `Serbian_Cyrillic`
    collations - codepage Windows-1251) or “Æ” (in `Serbian_Latin` collations - codepage
    Windows-1252). Identifying characters based on 8-bit code point and national character
    set is unnecessarily simplistic and error-prone, so Unicode standard uses multi-byte
    encoding space to encode characters from all languages with a different code point
    for every character. There are several encoding schemas for Unicode code points
    like UTF-8 where every character is represented using 1, 2, 3, or 4 bytes and
    UTF-16 where every character is represented using 2 or 4 bytes. Azure SQL uses
    a `varchar` type to represent Unicode characters with UTF-8 encoding, but these
    values must use a collation ending with `UTF8`. To represent UTF-16 encoding scheme
    Azure SQL uses `nvarchar` type, which is not dependent on collations.


    Always use Unicode unless you are sure that characters in `string` columns have
    only limited known values. `nvarchar` type is a good choice in most of the scenarios.
    Although it uses 2 bytes even for common characters that can fit into one byte,
    Azure SQL has some optimization that automatically compresses these values. If
    you are really concerned about performance and want to optimize for common characters,
    you should use `varchar` type with a UTF-8 collation.


    ## Computed columns


    In addition to classic columns, you can use special computed columns that represent
    the named expressions. As an example, imagine that you have quantity of purchased
    products, price for each unit, and the tax rate. You could create a function that
    calculates the profit and provide the values of columns, but in some cases, it
    would be better to create an automatically re-calculated virtual column:


    ```sql

    ALTER TABLE Sales.OrderLines

    ADD Profit AS (Quantity*UnitPrice)*(1-TaxRate)

    ```


    An application that reads this table will get the profit value without need to
    know some function for profit calculation. For external applications, this value
    would look like yet another value in the table. This computed column does not
    occupy additional space, and it is dynamically re-calculated whenever some query
    uses it. This lightweight computed column is an ideal solution if the expressions
    can be quickly calculated. However, if you have some heavy calculation that requires
    string processing, you might want to permanently store calculated values until
    the base column changes. This way, you will use some additional space, but the
    queries will not wait for the calculation to finish for every row that should
    be returned. These types of computed columns are known as persisted computed columns
    and can be created by adding the keyword `PERSISTED` in the preceding example.
    The resulting code will be this:


    ```sql

    ALTER TABLE Sales.OrderLines

    ADD Profit AS (Quantity*UnitPrice)*(1-TaxRate) PERSISTED

    ```


    The values in persisted computed columns are automatically re-calculated whenever
    any of the base values is changed.


    This may seem very similar to what you can get using a User-Defined Function,
    as you learned in the previous chapter: in fact, you could decide to use a `User-Defined
    Function` to create a calculated column if you want too. If you don’t plan to
    use a `User-Defined Function` anywhere else, you may simply define the logic as
    an expression for a calculated column and you’ll just save some code and effort.'
