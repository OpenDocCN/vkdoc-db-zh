    到目前为止，我们只关注了使用单个特定客户 ID 或订单 ID。但是，回到累计总值的例子，如果我们想计算整个表中**所有**订单的累计总值，该怎么办？当然，我们不想把订单
    ID 37 的行和订单 ID 39 的行混在一起。窗口函数也能为我们处理好这一点。我们只需要指定如何*分区*这个计算过程。在这里，分区让我们可以告诉 Azure
    SQL 何时应该从头开始一个新的计算。你可以把它想象成类似这样的指令：“只要你处理的值属于同一个组，就持续累加这些值。” 让我们修改一下累计总值的例子，使用两个订单，而不是仅一个。


    ![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig7_HTML.jpg](img/493913_1_En_4_Fig7_HTML.jpg)


    图 4-8：按订单分区计算


    如你所见，一旦订单 ID 从 37 变为 39，累计总值必须重新从头开始计算，因为我们希望为每个订单计算各自的累计总值。


    实现这一点的代码与原始代码非常相似，只是增加了 `PARTITION BY [OrderID],`。这行代码告诉 Azure SQL，只要 `OrderID`
    列中的值没有改变，就持续累加值。当它改变时，Azure SQL 就必须开始一个新的计算：


    ```sql

    SELECT

    [OrderID],

    [OrderLineID],

    [Description],

    [Quantity],

    SUM(Quantity) OVER (

    PARTITION BY [OrderID]

    ORDER BY [OrderLineID] ROWS BETWEEN

    UNBOUNDED PRECEDING AND

    CURRENT ROW

    ) AS RunningTotal

    FROM

    [Sales].[OrderLines]

    WHERE

    [OrderID] in (37, 39)

    ```


    窗口函数在简化代码和提升性能方面都能提供很大帮助，而我们刚刚所见只是它们强大功能的冰山一角，因此请务必去了解它们，并在合适的时候加以使用。


    ## 批量操作


    如果你需要将*大量*数据加载到 Azure SQL 中（这里说的大量是指数十万、数百万甚至数十亿行），你需要使用一个名为 Bulk Copy API 的特定
    API。因为它只允许将数据插入到目标表，所以有时也被称为 Bulk Insert API 或 Bulk Load API。


    此 API 直接由客户端库调用，它允许你以极高的速度批量加载数据，轻松实现每秒加载数万行甚至更多。当然，我指的是在 Azure 内部的性能，比如从一个 Web
    API 应用程序或虚拟机（VM）加载到后端使用的 Azure SQL 数据库。如果 API 或应用程序位于另一个云中或在本地运行，则加载数据的速度将取决于本地网络速度。


    要执行批量加载，.NET 提供了 `SqlBulkCopy` 类，而 Java 则提供了 `SQLServerBulkCopy` 类。以下是一个使用 .NET
    编写的示例节选：


    ```csharp

    using(var conn = new SqlConnection(Environment.GetEnvironmentVariable("CS_AzureSQL")))

    {

    conn.Open();

    var bc = new SqlBulkCopy(conn)

    bc.DestinationTableName = "dbo.BulkLoadedUsers";

    bc.BatchSize = 10000;

    bc.WriteToServer(userDataTable);

    }

    ```


    只是为了让你对此速度有个概念（你可以自己测试，因为该示例是本书附带代码的一部分），如果从与你加载数据的目标数据库处于同一区域的 Azure VM 中执行，它将加载
    100,000 行用时 0.91 秒，即每秒约 110,000 行，即使使用的是较小的 `BC_Gen5_2` 数据库。我想我们可以称之为*快速*，对吧？


    ## 如果你想了解更多


    在本章中，你学到了很多，为你提供了理解“将计算推向数据”为何重要的基础知识，以及高效执行此操作所需的知识，从理解声明式方法的强大功能，到使用窗口函数操作数据。


    我们还简要讨论了规范化及其重要性，以及这个想法为何不仅对关系数据库有用。以下是一些资源列表，可以帮助你更深入地了解刚刚学到的一切：


