  trans: '

    # 2. Azure SQL 入门指南


    Azure SQL 的首次提及（当时称为“Microsoft SQL Services”）是在 2008 年微软专业开发者大会（PDC）上宣布“红狗项目”（即
    Microsoft Azure）时。这个云端托管的 SQL Server 版本是 Azure 上最早可用的服务之一。从一开始，它就旨在提供 SQL Server
    的**平台即服务（PaaS）**形态，让你无需配置硬件或修补软件，并能享受云端运行带来的优势——可用性、性能、安全性和可扩展性——而无需在本地部署复杂且昂贵的系统。自那时起，Azure
    SQL 便伴随着 Azure 平台持续成长和演进。当你阅读本书时，重要的是要记住事物总是在变化。虽然书中的一些“小石子”或细节可能会随着平台的发展而略有改变，但你将在本书中学到的“大石子”将为你在数据库开发领域的发展提供坚实的基础。


    对于 Azure 或 Azure SQL 的新手读者来说，本章将作为一个入门指南，帮助你快速上手并准备使用 Azure SQL 构建应用程序。你将了解当今
    Azure SQL 中存在的灵活部署方式，以及一些常见场景，这些场景可以帮助你决定应该选择何种部署选项、服务层级和其他选项。你还将了解一些可用于操作和管理
    Azure SQL 的工具和示例。


    在阅读本章（以及后续章节）时，我们建议你充分利用随书提供的代码示例，以便获得一些关于这些主题的实践经验。


    如今，当你听到“Azure SQL”这个词时，它指的是一套产品，而不仅仅是 Azure SQL Database。在 Azure SQL 内部，有不同的部署选项，这基本上相当于
    Azure SQL 品牌下的不同产品。如图 2-1 所示，根据抽象级别和访问级别，很容易将部署选项分为三类：操作系统（OS）级别、服务器级别和数据库级别。


    ![../images/493913_1_En_2_Chapter/493913_1_En_2_Fig1_HTML.jpg](img/493913_1_En_2_Fig1_HTML.jpg)


    图 2-1：Azure SQL 产品家族


    操作系统级别的访问意味着 Azure 负责处理所有事务，直到你获得操作系统级别的控制权。数据中心、硬件、虚拟化等由微软管理，但操作系统、SQL Server
    和数据库则由你管理。你本质上获得了一个预装了 SQL Server 的 Azure 虚拟机。这通常被称为**基础设施即服务（IaaS）**类型的产品。使用
    IaaS，虽然你负责管理和修补操作系统、SQL Server 和数据库，但你也能访问这些级别中包含的所有功能。例如，如果你想在 SQL Server 所在的同一台机器上运行第三方应用程序，你可以通过
    IaaS 来实现。此外，SQL Server 2019（本书撰写时的最新版本）中有一些功能在其他部署选项中尚不可用，例如 PolyBase。如果你希望获得与
    SQL Server 100% 的功能一致性，Azure SQL 虚拟机可能是你的最佳选择。更多信息请参见 [`https://aka.ms/azuresqlvm`](https://aka.ms/azuresqlvm)。


    当你从需要操作系统级别访问的场景移开，开始寻找更多托管服务时，有一些 Azure SQL 选项属于**平台即服务（PaaS）**类型的产品，这些选项将是本书的重点。使用
    PaaS 服务，你可以获得诸如自动备份、数据库引擎和操作系统的修补、可用性的服务级别协议（SLA）、高级安全性、监控和开箱即用的可扩展性等功能。对于开发者来说，这意味着你可以拿到一个连接字符串，不再需要担心维护问题，并花更少的时间在故障排除上。


    例如，假设你不想操心操作系统补丁和 SQL Server 升级。你只想要一个 SQL Server 实例。你可以选择 `Azure SQL 托管实例`，它将操作系统抽象化，让你拥有一个始终最新的、托管的
    SQL Server 实例。在这里，你几乎可以获得所有的实例级功能；例如，支持 SQL Server Agent、Service Broker、链接服务器和公共语言运行时（CLR）。这种部署选项非常适合那些希望迁移到
    PaaS 产品，但仍需控制和访问许多服务器级别组件的公司。Azure SQL 托管实例还提供原生虚拟网络支持，允许你根据需要将该服务集成到本地网络中。


    现在，考虑这样一种场景：你的公司正在转型为云原生实体，或者你在一个云端诞生的公司工作。也许你对管理 SQL Server 实例不感兴趣，也不需要服务器级别的功能。甚至，你可能根本不知道
    SQL Server 是什么，因为你可能从未在本地使用过它或有使用它的需要。那么，你正在寻找的是 Azure SQL 能提供的下一层抽象，即 `Azure
    SQL Database`。在这个产品中，你可以获得 Azure SQL 托管实例所给予的所有 PaaS 优势，但你只获得一个数据库和数据库级别的功能。对于这种部署选项，你会有一个用于组织和管理的逻辑服务器，但无法访问实例级别的功能或视图。


    在 Azure SQL 托管实例和 Azure SQL Database 之间做选择时，你可以考虑一些额外的权衡因素，以确定最适合应用程序需求的方案。思考
    Azure SQL 托管实例与 Azure SQL Database 的一种方式，类似于你思考虚拟机与容器的方式。如果你使用虚拟机（VM）来部署应用程序，你会拥有更多的计算能力、磁盘和安全服务，但每个主机只能运行
    2-10 个虚拟机。另一方面，如果你使用容器，你会得到更轻量、更快、弹性更大且每个主机可运行数百个容器的方案。如果你将这种思路应用到 Azure SQL 上，使用
    Azure SQL 托管实例，你能获得更多功能和控制权；而使用 Azure SQL Database，你能获得更快、更小且可能成本更低的方案。让我们来考虑一下这些权衡因素。

    '
- fmt: '# Azure SQL 选项概览与创建指南


    首先，您可能会考虑成本因素。虽然 Azure SQL Database 和 Azure SQL 托管实例在存储和计算方面的定价相同，但如果您只有少数几个数据库，且其消耗低于
    Azure SQL 托管实例的最低配置，那么 Azure SQL Database 可能更便宜，因为它允许更小的最低配置（成本更低）。Azure SQL Database
    还能保证特定数据库的资源，因为它不像 Azure SQL 托管实例那样与其他数据库共享资源。您可能还会考虑速度和弹性。由于 Azure SQL Database
    部署在安全的公有云中，Microsoft 可以在几分钟甚至更短时间内完成资源调配和扩展。而 Azure SQL 托管实例则部署在完全隔离的环境中（这具有安全优势），但结果是资源调配和扩展可能需要数小时。从功能角度来看，Azure
    SQL 托管实例允许访问实例级功能，如果您当前未使用这些功能，但可能希望以后有选项使用它们，它还允许进行时区和排序规则（将在本章后面介绍）的自定义，这是 Azure
    SQL Database 所不具备的。


    接下来，让我们看一个拥有许多数据库或许多 SQL Server 实例的场景。也许您是一个 *软件即服务* (SaaS) 提供商，您的软件服务于多个客户，这意味着您需要多租户支持。或者您有许多不同的
    SQL Server，想要迁移到 PaaS 产品中。到目前为止，我们探讨的是单个数据库或单个实例的场景，但对于这些场景，您可以考虑“池”选项，它允许多个数据库或服务器共置并共享资源。这可以实现成本优化并减少管理开销。对于多个数据库，您可以考虑
    *弹性池*，而对于多个实例，您可以考虑 *实例池*。


    尽管选择众多，但 Azure SQL 平台具有灵活性，能够满足您的需求。在本书中，我们将从开发人员的角度，更深入地探讨不同 PaaS 部署选项之间存在的功能和细微差别。


    如果您是 Azure SQL 的新手，所有这些选项可能会让您望而生畏，但请不要担心。如果您想轻松入门，并且在 90% 的情况下都能获得所需，可以从 Azure
    SQL Database 开始。但请放心，所有其他选项都是为了确保即使您作为开发人员遇到最奇特、最苛刻的边缘情况也能得到覆盖。


    ## 创建 Azure SQL Database


    要创建单个数据库（或托管实例、弹性池、实例池），您首先需要一些关于 Azure 的基础知识。首先，您需要一个 Azure 帐户和一种支付服务费用的方式。如果您之前没有创建过
    Azure 免费帐户，可以访问 [`https://azure.com/free`](https://azure.com/free) 获取一次性额度。这应该足够您完成本书中大部分（如果不是全部）实践练习。如果您已经使用过免费帐户，并且拥有支持该福利的
    Visual Studio 订阅，您可能每月会有一定金额的 Azure 额度。如果这些都不是选项，您将需要使用或获取一个有权创建和管理资源的 Azure 帐户。


    一旦您准备好使用 Azure，您将创建一个 *资源组*，它基本上是绑定到特定订阅的一组 Azure 资源的逻辑容器。您可以使用任何喜欢的操作系统、Azure
    门户、PowerShell 或 Azure CLI（命令行界面）来执行与部署和管理资源相关的任务。例如，在安装 Azure CLI ([`https://aka.ms/install-azure-cli`](https://aka.ms/install-azure-cli))
    后，您可以连接并使用以下代码创建一个资源组。


    ```

    # 登录到您的 Azure 帐户

    az login

    # 查看您可用的订阅

    az account show

    # 复制您要使用的订阅的 "id" 并将其设置为默认值

    az account set –-subscription <subscription_id>

    # 查看您的帐户可用的区域，记下您要使用的区域的 "name"（例如 "westus"）

    az account list-locations

    # 创建一个资源组（指定区域和名称）

    az group create –l <region> -n <resource_group_name>

    ```

    *清单 2-1 设置 Azure CLI 并创建资源组*


    请注意，您必须提供创建资源组的 *区域*。所有资源都绑定到一个区域（例如，美国西部、印度南部、中国东部）。由于资源组本身本质上是一个元数据实体，您在创建时选择的位置表示元数据存储的位置。理论上，资源组中的每个资源都可以在不同的区域中创建。一旦您有了一个资源组，就可以开始将其他资源（应用程序、网络、数据库等）部署到其中。要查看您的帐户可用的所有区域并找到前面脚本中使用的区域名称，您可以运行以下命令：


    ```

    az account list-locations -o table

    ```

    *清单 2-2.*


    要部署 Azure SQL Database，您首先需要一个 *逻辑服务器*，它与资源组类似，用于将 Azure SQL 数据库分组在一个逻辑容器中。您可以在同一个逻辑服务器中拥有弹性池和单个数据库。使用
    Azure CLI，您可以使用以下代码完成此操作。


    ```

    # 创建一个逻辑服务器

    az sql server create –-admin-password <password> –-admin-user <username> –-name
    <server_name> –-resource-group <resource_group_name> –-location <region>

    ```

    *清单 2-3 创建 Azure SQL Database 服务器*


    配置好逻辑服务器后，您可以使用以下代码将数据库（单个数据库或弹性池中的数据库）部署到该服务器。


    ```

    # 使用默认配置创建一个 Azure SQL Database

    az sql db create –-name <database_name> –-resource-group <resource_group_name>
    –-server <server_name>

    ```

    *清单 2-4 创建 Azure SQL Database*


    我们将在接下来的章节中详细讨论众多选项、工具和示例数据库，但获取示例数据库之一（如果您想利用 AdventureWorksLT）的最简单方法是在部署时指定其中一个。您可以使用以下命令，在之前的
    `az sql db create` 命令中添加一个参数。


    ```

    # 使用默认配置和 AdventureWorksLT 示例数据库创建一个 Azure SQL Database

    az sql db create –-name <database_name> –-resource-group <resource_group_name>
    –-server <server_name> -–sample-name AdventureWorksLT

    ```

    *清单 2-5 使用示例创建数据库*'
  raw: "First, you may consider costs. While Azure SQL Database and Azure SQL managed\
    \ instance are priced the same for storage and compute, if you are going to have\
    \ just a few databases that consume less than the minimum configuration for Azure\
    \ SQL managed instance, then Azure SQL Database may be cheaper, as it allows a\
    \ smaller minimum configuration (lower cost). Azure SQL Database is also able\
    \ to guarantee resources for a specific database because no sharing is occurring\
    \ with other databases as in Azure SQL managed instances. You might also consider\
    \ speed and elasticity. Since Azure SQL Database is deployed in the secure public\
    \ cloud, Microsoft can provide provisioning and scaling in a matter of minutes\
    \ or less. An Azure SQL managed instance is deployed in complete isolation (which\
    \ has security benefits), but the result is that provisioning and scaling can\
    \ take a matter of hours. From a feature perspective, Azure SQL managed instance\
    \ allows access to instance-level features, which, if you are not using today,\
    \ you may want the option to use later, and allows customizations for time zone\
    \ and collations (covered later in this chapter) that you don’t get with Azure\
    \ SQL Database.\n\nMoving forward, let’s look at a scenario where you have many\
    \ databases or many instances of SQL Server. Perhaps you are a *Software as a\
    \ Service* (SaaS) provider where your software serves multiple customers, meaning\
    \ you need multi-tenancy. Or perhaps you have many different SQL Servers that\
    \ you want to move into the PaaS offering. So far, we’ve looked at scenarios for\
    \ single databases or single instances, but for these scenarios, you may consider\
    \ the “pools” options, which allow you to have multiple databases or servers that\
    \ are collocated and share resources. This can allow for cost optimization and\
    \ reduced overhead. For multiple databases, you may consider *Elastic Pools* ,\
    \ and for multiple instances, you may consider *Instance Pools* .\n\nWhile there\
    \ are a lot of choices, the Azure SQL platform has the flexibility to meet the\
    \ requirements that you have. Throughout the book, the capabilities and nuances\
    \ that exist between different PaaS deployment options will be explored at a deeper\
    \ level, and it will be done so from the perspective of developers for developers.\n\
    \nIf you’re completely new to Azure SQL, all these options could scare you, but\
    \ don’t fear. If you want to start easy with something that in 90% of the cases\
    \ will give you exactly what you need, you can start with Azure SQL Database.\
    \ But rest assured that all the other options are there for you to make sure that\
    \ even the most exotic and demanding edge cases you will encounter as a developer\
    \ will be covered.\n\n## Creating Azure SQL Database\n\nIn order to create a single\
    \ database (or managed instance, Elastic Pool, or Instance Pool), you first need\
    \ a few basics with respect to Azure. First, you’ll need an Azure account and\
    \ a way to pay for services. If you haven’t created a free account before with\
    \ Azure, you can go to [`https://azure.com/free`](https://azure.com/free) and\
    \ get a one-time credit. This should be enough for you to complete most, if not\
    \ all, the hands-on exercises in the book. If you have already used your free\
    \ account, you may have an Azure credit with a set monetary value each month if\
    \ you have a Visual Studio subscription that supports that. If neither of those\
    \ are options, you’ll need to use or obtain an Azure account where you have access\
    \ to create and manage resources.\n\nOnce you’re set up to use Azure, you’ll create\
    \ a *Resource Group* , which is basically a logical container for a set of Azure\
    \ resources tied to a certain subscription. You can use any operating system you\
    \ prefer, the Azure portal, PowerShell, or the Azure CLI (command-line interface)\
    \ to perform tasks related to deploying and managing resources. After you’ve installed\
    \ the Azure CLI ([`https://aka.ms/install-azure-cli`](https://aka.ms/install-azure-cli)),\
    \ for example, you can get connected and create a resource group with the following\
    \ code.\n\n```\n# log in to your Azure account\naz login\n# view your available\
    \ subscriptions\naz account show\n# copy the \"id\" of the subscription you want\
    \ to use and set it as default\naz account set –-subscription \n# view regions\
    \ available to your account, note the \"name\" of the region you want to use (for\
    \ example, \"westus\")\naz account list-locations\n# create a resource group (specifying\
    \ region and name)\naz group create –l  -n \nListing 2-1\nSet up Azure CLI and\
    \ create a resource group\n```\n\nNotice that you must provide a *region* where\
    \ the resource group is to be created. All resources are tied to a region (e.g.,\
    \ West US, South India, East China). Since a resource group itself is essentially\
    \ a metadata entity, the location you select during creation represents where\
    \ the metadata is stored. Each resource in a resource group could, in theory,\
    \ be created in a different region. Once you have a resource group, you can start\
    \ deploying other resources (applications, networking, databases, etc.) into it.\
    \ To view all the regions available to your account and find the region name which\
    \ is used in the preceding script, you can run the following command:\n\n```\n\
    az account list-locations -o table\nListing 2-2.\n```\n\nIn order to deploy Azure\
    \ SQL Database, you’ll first need a *logical server*, which, like a resource group,\
    \ is used to group Azure SQL databases in a logical container. You can have elastic\
    \ pools and single databases all in the same logical server. To do this using\
    \ the Azure CLI, you can use the following code.\n\n```\n# create a logical server\n\
    az sql server create –-admin-password  –-admin-user  –-name  –-resource-group\
    \  –-location \nListing 2-3\nCreate an Azure SQL Database server\n```\n\nOnce\
    \ you have a logical server configured, you can deploy databases (single databases\
    \ or databases part of an elastic pool) into that server with the following code.\n\
    \n```\n# create an Azure SQL Database with the default configuration\naz sql db\
    \ create –-name  –-resource-group  –-server \nListing 2-4\nCreate an Azure SQL\
    \ Database\n```\n\nWe’ll discuss the details around the many options, tools, and\
    \ sample databases in the following sections, but the easiest way to get one of\
    \ the sample databases (if you want to leverage AdventureWorksLT) is to specify\
    \ one of those during deployment. Instead of the previous `az sql db create` command,\
    \ you can add one parameter, as follows.\n\n```\n# create an Azure SQL Database\
    \ with the default configuration\n# and the AdventureWorksLT sample database\n\
    az sql db create –-name  –-resource-group  –-server  -–sample-name AdventureWorksLT\n\
    Listing 2-5\nCreate a database with a sample\n```"
