  trans: '

    # 工作中的查询存储


    假设你的应用程序性能在过去一周内有所下降，你想了解这是否可能与数据库中的某些更改有关。


    借助查询存储，你可以基于不同的时间窗口（例如近期时段（过去 4 小时）与上周一切性能表现良好时的情况）来比较查询执行情况：


    ```sql

    --- "近期"工作负载 - 过去 4 小时

    DECLARE @recent_start_time datetimeoffset;

    DECLARE @recent_end_time datetimeoffset;

    SET @recent_start_time = DATEADD(hour, -4, SYSUTCDATETIME());

    SET @recent_end_time = SYSUTCDATETIME();

    --- "历史"工作负载 – 上周

    DECLARE @history_start_time datetimeoffset;

    DECLARE @history_end_time datetimeoffset;

    SET @history_start_time = DATEADD(day, -14, SYSUTCDATETIME());

    SET @history_end_time = DATEADD(day, -7, SYSUTCDATETIME());

    WITH

    hist AS

    (

    SELECT

    p.query_id query_id,

    ROUND(ROUND(CONVERT(FLOAT, SUM(rs.avg_duration * rs.count_executions)) * 0.001,
    2), 2) AS total_duration,

    SUM(rs.count_executions) AS count_executions,

    COUNT(distinct p.plan_id) AS num_plans

    FROM sys.query_store_runtime_stats AS rs

    JOIN sys.query_store_plan AS p ON p.plan_id = rs.plan_id

    WHERE (rs.first_execution_time >= @history_start_time

    AND rs.last_execution_time < @history_end_time)

    OR (rs.first_execution_time < @history_end_time)

    GROUP BY p.query_id

    ),

    recent AS

    (

    SELECT

    p.query_id query_id,

    ROUND(ROUND(CONVERT(FLOAT, SUM(rs.avg_duration * rs.count_executions)) * 0.001,
    2), 2) AS total_duration,

    SUM(rs.count_executions) AS count_executions,

    COUNT(distinct p.plan_id) AS num_plans

    FROM sys.query_store_runtime_stats AS rs

    JOIN sys.query_store_plan AS p ON p.plan_id = rs.plan_id

    WHERE  (rs.first_execution_time >= @recent_start_time

    AND rs.last_execution_time < @recent_end_time)

    OR (rs.first_execution_time < @recent_end_time)

    GROUP BY p.query_id

    )

    SELECT

    results.query_id AS query_id,

    results.query_text AS query_text,

    results.additional_duration_workload AS additional_duration_workload,

    results.total_duration_recent AS total_duration_recent,

    results.total_duration_hist AS total_duration_hist,

    ISNULL(results.count_executions_recent, 0) AS count_executions_recent,

    ISNULL(results.count_executions_hist, 0) AS count_executions_hist

    FROM

    (

    SELECT

    hist.query_id AS query_id,

    qt.query_sql_text AS query_text,

    ROUND(CONVERT(float, recent.total_duration/

    recent.count_executions-hist.total_duration/hist.count_executions)

    *(recent.count_executions), 2) AS additional_duration_workload,

    ROUND(recent.total_duration, 2) AS total_duration_recent,

    ROUND(hist.total_duration, 2) AS total_duration_hist,

    recent.count_executions AS count_executions_recent,

    hist.count_executions AS count_executions_hist

    FROM hist

    JOIN recent

    ON hist.query_id = recent.query_id

    JOIN sys.query_store_query AS q

    ON q.query_id = hist.query_id

    JOIN sys.query_store_query_text AS qt

    ON q.query_text_id = qt.query_text_id

    ) AS results

    WHERE additional_duration_workload > 0

    ORDER BY additional_duration_workload DESC

    OPTION (MERGE JOIN);

    ```


    此查询主要计算哪些查询相比于之前的执行时段引入了额外的持续时间，并返回诸如近期与历史的执行次数和总持续时间等信息。


    ## 比较与强制执行计划


    对于显示出性能回退的查询，你应该检查这些查询近期是否使用了与之前执行更快时不同的查询计划。你可以通过以下存储过程，尝试为该查询强制指定一个特定的执行计划来修复问题：


    ```sql

    EXEC sp_query_store_force_plan @query_id = 48, @plan_id = 49;

    ```


    如果你希望撤销此强制操作，并让 Azure SQL 重新计算执行计划，可以通过调用以下命令来取消强制：


    ```sql

    EXEC sp_query_store_unforce_plan @query_id = 48, @plan_id = 49;

    ```


    需要注意的是，对于这类优化，你无需以任何方式更改你的应用程序代码。


    ## 使用可视化工具


    如果你更喜欢使用可视化工具而非运行 T-SQL 查询来进行这些调查，SQL Server Management Studio 提供了一系列用户界面页面来与查询存储信息进行交互。你可以展开数据库中的
    `查询存储` 节点来查看支持的场景：


    ![查询存储节点](img/493913_1_En_10_Figk_HTML.jpg)


    例如，如果你点击 `性能回退的查询`，默认将显示过去一小时内性能回退最严重的前 25 个查询列表，并且你可以根据 CPU 时间、IO 和内存等多个维度对数据进行切片和切块分析，以找到所需信息。从同一用户界面中，你还可以查看给定查询的可用查询计划，并通过点击
    `强制计划` 按钮来强制使用最优的计划。就是这么简单！


    ![性能回退查询用户界面](img/493913_1_En_10_Figl_HTML.jpg)


    ## 分析等待统计


    调查应用程序整体性能的另一个有趣场景是查看给定数据库的 `查询等待统计信息`。


    在数据库树中点击该选项将弹出一个新窗口，其中最重要的等待状态类别会按总等待时间排序显示在图表中，如下图所示：


    ![查询等待统计信息](img/493913_1_En_10_Figm_HTML.jpg)


    然后，你可以深入分析影响最大的类别，系统将显示导致这些等待状态的前几个查询及其相关的查询计划，这样你就能够为你的特定工作负载强制使用那些优化程度更高的计划：


    ![等待类别详细信息](img/493913_1_En_10_Fign_HTML.jpg)


    其他类似的场景包括 `资源消耗最高的查询` 或 `变化幅度最大的查询`，你可以遵循类似的路径进行分析。


    ## 云平台集成：查询性能见解


    最后但同样重要的是，Azure SQL 还提供了查询性能见解，它是 Azure 门户体验的一部分，基于查询存储数据为单一数据库和池化数据库提供智能查询分析工具。它有助于识别工作负载中资源消耗最高和运行时间最长的查询。这有助于你找到需要优化的查询，以提高整体工作负载性能，并高效利用你所付费的资源。虽然
    SQL Server Management Studio 和 Azure Data Studio 可用于获取所有查询的详细资源消耗情况，但查询性能见解为你提供了一种从
    Azure 门户直接出发的快捷高效方式，来确定这些查询对数据库整体资源使用的影响。


    ![Azure 门户中的查询性能见解](img/493913_1_En_10_Figo_HTML.jpg)


    你仍然可以深入到单个查询级别，获取诸如资源消耗或查询在给定时间窗口内执行次数等详细信息，但你也可以与 `数据库顾问` 提供的性能建议进行交互。`数据库顾问`
    是 Azure SQL 中的一项功能，它会学习你的数据库使用情况并提供定制化的建议，以实现性能最大化。这些建议涵盖查询计划强制、索引创建和删除等方面。通过在以下页面中点击
    `自动化` 按钮，你还可以自动化执行这些建议，让 Azure SQL 始终保持你的数据库处于最佳状态：


    ![数据库顾问建议](img/493913_1_En_10_Figp_HTML.jpg)


    要了解更多关于 Azure SQL 这些有趣功能的详细信息，我们建议你查看官方文档：[`https://aka.ms/daipr`](https://aka.ms/daipr)。

    '
- fmt: '## Raising and catching exceptions in SQL


    Error handling in Transact-SQL is similar to exception handling in traditional
    programming languages. You can wrap a group of Transact-SQL statements in a `TRY`
    block, and if an error occurs, control is passed to the following `CATCH` block
    where other statements will be executed. Each error in Azure SQL is associated
    with a given severity level, and the `TRY...CATCH` construct catches all execution
    errors that have a severity higher than 10 that do not close the database connection.
    If no errors happened in the `TRY` block, control passes to the statement immediately
    after the associated `END CATCH` statement. Within the `CATCH` block, you can
    use several system functions to get details about the error that caused the `CATCH`
    block to be executed: these function names are pretty self-explanatory (`ERROR_NUMBER()`,
    `ERROR_SEVERITY()`, `ERROR_STATE()`, `ERROR_PROCEDURE()`, `ERROR_LINE()`, `ERROR_MESSAGE()`).
    They return `NULL` if they are called outside the scope of the `CATCH` block.


    The following example shows a script that contains error-handling functions:


    ```sql

    BEGIN TRANSACTION;

    BEGIN TRY

    -- Generate a constraint violation error.

    DELETE FROM Production.Product

    WHERE ProductID = 980;

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage;

    IF @@TRANCOUNT > 0

    ROLLBACK TRANSACTION;

    END CATCH;

    IF @@TRANCOUNT > 0

    COMMIT TRANSACTION;

    GO

    ```


    When we trap errors within a `CATCH` block, these are not returned to the calling
    application. If instead we want to capture error details with the `CATCH` block,
    but also report back all or part of these details to the calling application,
    we could call `RAISERROR` or `THROW` to bubble up the exception to the caller
    or simply return a resultset through a `SELECT` statement.


    We can create complex error management logics by nesting multiple `TRY...CATCH`
    constructs. When an error happens within a `CATCH` block, it is treated like any
    other error, so if the block contains a nested `TRY...CATCH` construct, any error
    in the nested `TRY` block will pass control to the nested `CATCH` block. If there
    is no nested `TRY...CATCH` construct, the error is passed back to the caller.


    If our code is calling other Stored Procedures or Triggers, errors raised by those
    external modules can be trapped in their own code (if they contain `TRY` blocks)
    or can be trapped by `TRY...CATCH` constructs in the calling code. User-defined
    functions, though, cannot contain `TRY...CATCH` constructs.


    There are some exceptions that we need to keep in mind when dealing with errors
    in our T-SQL code:


    *   If errors have a severity equal or lower than 10, then these won’t be trapped
    by our `TRY...CATCH` block (as they are not considered errors, but just warnings).

    *   Some errors with severity equal or higher than 20 will cause Azure SQL to
    stop processing other tasks on that session, so `TRY...CATCH` won’t equally trap
    these errors.

    *   Compile errors, such as syntax errors, that prevent a batch from running won’t
    be trapped by our `TRY...CATCH` block, as such errors will happen at compile time
    and not at runtime.

    *   Statement-level recompilation or object name resolution errors (e.g., trying
    to use a view that has been dropped) will not equally be trapped.


    When errors happening in a `TRY` block are invalidating the state of the current
    transaction, then the transaction is classified as an uncommittable transaction.
    An uncommittable transaction can only perform read operations or a `ROLLBACK TRANSACTION`.
    We can call the `XACT_STATE` function to verify if the current transaction has
    been classified as uncommittable. If the function returns –1, that is the case.
    At the end of the batch, Azure SQL rolls back uncommittable transactions and will
    send an error message to application.


    Here’s a more complex example using `TRY…CATCH` with `XACT_STATE`:


    ```sql

    -- Check to see whether this stored procedure exists.

    IF OBJECT_ID (N''usp_GetErrorInfo'', N''P'') IS NOT NULL

    DROP PROCEDURE usp_GetErrorInfo;

    GO

    -- Create procedure to retrieve error information.

    CREATE PROCEDURE usp_GetErrorInfo

    AS

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_LINE () AS ErrorLine

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_MESSAGE() AS ErrorMessage;

    GO

    -- SET XACT_ABORT ON will cause the transaction to be uncommittable

    -- when the constraint violation occurs, as it automatically rollback the transaction

    SET XACT_ABORT ON;

    BEGIN TRY

    BEGIN TRANSACTION;

    -- A FOREIGN KEY constraint exists on this table. This

    -- statement will generate a constraint violation error.

    DELETE FROM Production.Product

    WHERE ProductID = 980;

    -- If the DELETE statement succeeds, commit the transaction.

    COMMIT TRANSACTION;

    END TRY

    BEGIN CATCH

    -- Execute error retrieval routine.

    EXECUTE usp_GetErrorInfo;

    -- Test XACT_STATE:

    -- If 1, the transaction is committable.

    -- If -1, the transaction is uncommittable and should

    --     be rolled back.

    -- XACT_STATE = 0 means that there is no transaction and

    --     a commit or rollback operation would generate an error.

    -- Test whether the transaction is uncommittable.

    IF (XACT_STATE()) = -1

    BEGIN

    PRINT

    N''The transaction is in an uncommittable state.'' +

    ''Rolling back transaction.''

    ROLLBACK TRANSACTION;

    END;

    -- Test whether the transaction is committable.

    IF (XACT_STATE()) = 1

    BEGIN

    PRINT

    N''The transaction is committable.'' +

    ''Committing transaction.''

    COMMIT TRANSACTION;

    END;

    END CATCH;

    GO

    ```


    As you have seen, Azure SQL provides very complete and powerful exception handling
    features which are needed in any modern application, as managing exceptions is
    absolutely important to provide a great user experience.


    ### Keep it simple!


    Keep in mind that besides T-SQL, .NET or Python (or any of your preferred languages)
    code also has great exception support, and the best user experience is usually
    obtained when they work together as a team.


    With this in mind and with the idea of keeping our solution as simple as possible,
    a very common pattern where your programming language of choice and T-SQL work
    very well together is the one that uses `XACT_ABORT ON`.


    With `XACT_ABORT ON`, anything that is in a transaction must be correctly (exactly)
    executed, or Azure SQL will abort the transaction and terminate the current code
    execution.


    If you plan to handle failure logic in the application, this command can really
    help you to have lean and clean code:


    ```sql

    SET XACT_ABORT ON

    BEGIN TRAN

    INSERT INTO Orders VALUES (2,1,getdate());

    UPDATE Inventory SET QuantityInStock=QuantityInStock-1

    WHERE ProductID=1

    COMMIT TRAN

    ```


    Thanks to the `XACT_ABORT` being set to on, in the preceding code, or both the
    `INSERT` and `UPDATE` will run without any errors so that the `COMMIT` will be
    executed, or if there is any error during execution of `INSERT` or `UPDATE`, the
    entire transaction will be automatically rolled back (even if there is no `ROLLBACK
    TRAN` in the code). Execution of the code will also be interrupted, and the raised
    error will be returned to the caller (the application code in our sample).


    As you can see, you have the full spectrum of options when deciding how to deal
    with exceptions and errors. You can decide that it is better to handle it inside
    Azure SQL or you can bubble it up to the application. In both cases, you are in
    control so that you can implement the best option for your solution.'
