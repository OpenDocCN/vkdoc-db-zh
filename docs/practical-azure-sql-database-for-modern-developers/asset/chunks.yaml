    be pushed to the database where data lives. If the creation of a new user, for
    example, requires the creation of a row in the `User` table, that statement should
    be executed within the database itself, not by creating some spaghetti code where
    data manipulation logic and business logic are intertwined together in a very
    inelegant and not-so-maintainable code.


    An even better example is when aggregation of data is needed, maybe to calculate
    some complex end-of-month report for monitoring business KPIs. Due to what is
    known as *data gravity*, it is much, much easier to move this complex computation
    to where data already is, instead of moving data into the business layer. Data
    has a size and thus a weight: moving it can be very challenging a definitely requires
    a lot of effort.


    This is especially true in distributed systems, where each different system may
    want to access and modify the same data. By having data manipulation logic in
    each and every one of those systems, some complex – really complex – distributed
    coordination would be needed. By allowing the database to do its job – orchestrate
    data access – such complexity can be avoided entirely.


    With this line drawn, it is much easier to obtain a clear separation of concerns,
    bringing clarity and simplicity to the solution that, in turn, will be easier
    to create and less expensive to maintain and evolve. It will be more Agile.


    ### Tell me about Polyglot persistence


    Polyglot persistence came to be known to the world in the last years, where microservice
    architectures showed all their power and became mainstream. The idea is that every
    service should use the best database technology (Relational, Key-Value, Graph,
    Document, etc.) for the task it is doing.


    While in theory this seems absolutely correct, there is one big, huge challenge
    that lies within this approach: how data, living in different systems, can be
    integrated and kept consistent so it can be trusted to be free of errors and used
    to make decisions?


    Not only that, if using different databases to store data, all of those different
    technologies need to be known enough so that they can be used appropriately; otherwise,
    security, consistency and performance issues will quickly arise and become a day-to-day
    nightmare.


    But there is something more. What if, at some point, some data needs to be gathered
    and then re-distributed to all systems? Integration is a really, really hard problem.
    In fact, not only will you need a process to just keep data integration going
    on, but at some point, you’ll also need something where the “golden master” of
    your data will be stored – somewhere where Business Analytics systems can get
    data from to allow meaningful forecasts and, nowadays, reliable data to feed machine
    learning algorithms. You’ll need a system to manage your *master data*.


    As you can see complexity increases at every step, and *caching* hasn’t been put
    in the picture yet! Now, if complexity is needed, that’s fine. As long as you’re
    in control of the architectural decisions, and such complexity is needed (as your
    business is complex like managing an online word processor for millions of concurrent
    users), and you are ready to handle it, everything is good. But unfortunately
    it is very easy to be caught in the unexpected landslide of issues that a complex
    architecture brings with it, if not well planned and managed, easily becoming
    more and more complex every day, eating every dollar possible from the IT budget.


    Polyglot persistence and high specialization are great choices, but not always
    and not for every project: sometimes, an integrated solution, which provides all
    the options but just in one place, is much better. Azure SQL can be that integrated
    solution.


    ### Batteries included


    Keep it simple, as simple as possible. But not simpler! That’s why Azure SQL can
    help a lot. Just like Python, that is said to be “batteries included” ([`https://aka.ms/pep0206`](https://aka.ms/pep0206)),
    we like to use the same definition for Azure SQL. It offers almost everything
    a developer needs for any project. From relational support to Graph models, from
    JSON documents to Columnstore indexes, it is possible to take advantage of the
    same pros that you would find adopting the Polyglot Persistence ideas, with way
    less complexity and cons.


    This book will help you to learn all the features you can use to create modern
    solutions, using Azure SQL to offload all data manipulation and management to
    the cloud so that you can just focus on something that no one else can do for
    you: implementing the business logic and the correct architecture that will be
    unique for the solution you’re working on.


    ## Is Azure SQL a developer tool?


    Many developers would argue that managing a database, and more in general data,
    is not part of their job. This was probably true 20 or more years ago, but things
    have changed a lot since then.


    In today’s world, where agility and ability to adapt and change is a key factor
    for success, figures like full-stack developers or back-end developers are more
    and more common every day. While those figures do not need to have the deep knowledge
    around data that is expected by a database administrator or a data engineer or
    a data scientist, their job will ultimately result in manipulating some data too.


    Now, this doesn’t mean that you should stop learning C#, Java, Python, or any
    language you want or need and just go head down learning SQL. What is needed is
    just to understand that Azure SQL is a tool in your toolset just like any other
    tool you may have, from Design Patterns to the `WeakReference` class, just to
    mention two things that are on the complete opposite side of the knowledge spectrum.


    As any other tool, the more you know it, the better you’ll use it.'
  trans: '

    # 业务规则应置于何处？


    业务规则：它们应当放入应用程序，而非数据库。这个答案简单明了。问题在于，业务规则的定义本身并不那么直截了当。


    尽管对此类问题的深入探讨远超本书范围，但我们至少需要划清一条界限，以明确哪些处理应推给数据库，哪些不应。


    业务规则通常作用于数据。除此之外，它们还负责处理、读取、修改和创建数据。可以说，所有 `data manipulation` 都应该被推到数据所在的数据库去执行。例如，如果创建一个新用户需要在
    `User` 表中插入一行记录，那么该语句就应该在数据库内部执行，而不是通过将数据操作逻辑与业务逻辑以非常不优雅、难以维护的方式混杂在一起的混乱代码来实现。


    一个更好的例子是当需要聚合数据时，也许是为了计算某个复杂的月末报告以监控业务关键指标。由于所谓的 `data gravity`，将复杂的计算移动到数据已存在的地方，比将数据移动到业务层要容易得多。数据有大小，因而有重量：移动它可能非常具有挑战性，并且必然需要大量努力。


    这在分布式系统中尤其明显，其中每个不同的系统可能都想访问和修改相同的数据。如果在每个系统中都放置数据操作逻辑，就需要某种复杂的——真正复杂的——分布式协调。通过让数据库履行其职责——协调数据访问——这种复杂性完全可以避免。


    划清这条界限后，就更容易实现清晰的关注点分离，为解决方案带来清晰性和简洁性，从而使其更易于创建，维护和演进的成本也更低。它将更敏捷。


    # 谈谈多语言持久性


    多语言持久性在过去几年中逐渐为人所知，当时微服务架构展现了其全部威力并成为主流。其理念是，每个服务都应为其执行的任务使用最佳的数据库技术（关系型、键值型、图、文档型等）。


    虽然理论上这似乎完全正确，但这种方法内部存在一个巨大的挑战：存储在不同系统中的数据如何才能被集成并保持一致，从而可以信任其没有错误并用于决策？


    不仅如此，如果使用不同的数据库来存储数据，那么所有这些不同的技术都需要足够了解才能恰当使用；否则，安全性、一致性和性能问题将迅速出现，成为日常噩梦。


    但还有更多。如果某些时候需要收集数据然后重新分发到所有系统，该怎么办？集成是一个非常非常困难的问题。事实上，你不仅需要一个流程来维持数据集成的进行，在某些时候，还需要一个地方来存储数据的“黄金主版本”——一个商业分析系统可以从中获取数据以进行有意义的预测的地方，并且在当今，也是为机器学习算法提供可靠数据的地方。你将需要一个系统来管理你的
    `master data`。


    如你所见，每一步复杂性都在增加，而 `caching` 还未纳入考量！现在，如果确实需要复杂性，那也没关系。只要你在架构决策上有控制权，并且这种复杂性是必需的（例如你的业务像管理一个支持百万并发用户的在线文字处理器一样复杂），并且你已准备好处理它，那就没问题。但不幸的是，如果规划和管理不善，很容易陷入复杂架构带来的意外问题洪流中，问题日益复杂，吞噬
    IT 预算的每一分钱。


    多语言持久性和高度专业化是很好的选择，但并非总是适用于每个项目：有时，一个集成的解决方案，在一个地方提供所有选项，会好得多。Azure SQL 可以成为那个集成解决方案。


    # 电池已备


    保持简单，尽可能简单。但不要过于简单！这就是 Azure SQL 可以提供巨大帮助的原因。就像 Python 以其“电池已备” (`https://aka.ms/pep0206`)
    而闻名一样，我们也喜欢用同样的定义来形容 Azure SQL。它几乎提供了开发任何项目所需的一切。从关系型支持到图模型，从 JSON 文档到列存储索引，你可以利用与采用多语言持久性理念相同的优点，而复杂性和缺点却少得多。


    本书将帮助你学习所有可用于创建现代解决方案的功能，利用 Azure SQL 将所有数据操作和管理卸载到云端，这样你就可以专注于只有你能做的事情：实现业务逻辑和针对你所构建的解决方案独一无二的正确架构。


    # Azure SQL 是开发工具吗？


    许多开发者可能会认为，管理数据库乃至更广泛的数据，不属于他们的工作范畴。这在 20 年前或更早可能是对的，但自那时起情况已大不相同。


    在当今世界，敏捷性以及适应和变化的能力是成功的关键因素，全栈开发者或后端开发者的角色日益普遍。虽然这些角色不需要具备数据库管理员、数据工程师或数据科学家所期望的那种深厚的数据知识，但他们的工作最终也会涉及操作一些数据。


    现在，这并不意味着你应该停止学习 C#、Java、Python 或任何你想要或需要的语言，而一头扎进去学习 SQL。需要做的只是理解，Azure SQL 是你工具集中的一个工具，就像你可能拥有的任何其他工具一样，从设计模式到
    `WeakReference` 类，仅举两个处于知识谱系完全相反两端的例子。


    如同任何其他工具一样，你对它了解得越多，就能运用得越好。

    '
- fmt: '### Keep it super simple


    作为开发者，你必须明白，例如，在尚未正确设计数据库以利用索引之前，却去创建一个极其复杂的缓存机制来提升解决方案的性能，这是没有意义的。让我清楚地告诉你：没有什么方法能比一个好的索引策略带来更大的性能提升。如果你试图做一些不同且更“聪明”的事情，你迟早会在自己的应用程序中（很可能以某种形式的**b-tree**）重新实现数据库中已有的解决方案——只是成本和复杂度要高得多。从专业角度来看，这毫无道理。像这样的过度工程化故事不仅仅是假设，也不只是用来吓唬初级开发者：其中一位作者就亲身经历过。他曾被要求优化一个接近实时处理的复杂数据解决方案，该方案使用了复杂的多层缓存、最先进的微服务架构和最新的硬件，但性能仍然很差且成本高昂。经过深入分析，提出的方案是拆除一大部分现有架构，并用数据库上的几个索引（更准确地说，是**Columnstore
    Indexes**）来替代。创建该解决方案的开发者并不知道这些索引的存在，因为他们的认知还停留在**SQL Server 2005**的功能上。经过一些争论、阻力以及关于成长型心态的讨论，代码被重构和重新架构，最终审查通过的解决方案从使用七台虚拟机来承载一个复杂的分布式缓存方案，变成了仅需一个**Azure
    SQL**数据库，成本降至十分之一，性能却大大提升。


    通过使用正确的工具，本质上复杂的解决方案可以被分解为更小的片段，每个片段都可以用正确的工具更简单地进行管理。**Azure SQL**就是这样一个工具，在数据处理方面通常很合适。即使你认为它不足以应对挑战，也请试一试，并准备好改变你的看法。这就是你成为更好的开发者的方式。


    ### Be a generalized specialist


    开发更多的是做出决策，而不仅仅是编写代码。当然，代码是你向世界展示你为解决某个业务问题或实现某个功能而决定做的事情的方式，但开发过程早在你的脑海中就开始了，即你开始评估手头有哪些选项来实现你被要求开发的功能时。


    作为开发者，实现目标最重要的步骤之一是能够掌控局面，并决定什么是实现目标的最佳架构和实施策略。通过掌握不止一门编程语言和不止一种数据管理解决方案，人们可以挑选，或建议，为当前正在开发的特定解决方案选择最佳方案。有时它可能是像**Apache
    Spark**这样复杂灵活的东西，有时则可能是像**Redis**这样简单易用的东西。很多时候，像**Azure SQL**这样的现代数据库可以在一个地方提供数量惊人的特性，在选项、成本和性能之间提供良好的平衡。


    为了做出最佳选择，人们需要至少了解一些处于开发空间边缘的工具，因为它们将有助于处理该空间之外的所有事情。在许多情况下，“所有事情”意味着“数据”。一个人对数据了解得越多，解决方案就会越好。使用敏捷方法中同样的定义，一个人需要成为一个
    *通才专家* ([`https://aka.ms/swkogs`](https://aka.ms/swkogs))。


    精通一些技能，但也要积极学习其他技能。


    ### If you want to know more


    本书旨在为你提供关于**Azure SQL**的非常实用的观点，以及它如何在你作为开发者或架构师的日常工作中提供帮助。当然，要理解所描述的内容为何重要或比某些其他替代方案更好，需要一些理论背景。我们希望你通过理解概念来学习，而不仅仅是死记硬背。这是一种基础的心态，因为你将是那个被要求做出某些开发或设计选择的人。虽然我们无法在你身边提供帮助，但本书可以，但前提是你理解所解释概念的细节。我们在书中放入了我们认为足够让你入门并给你一个关于你能实现什么的概念的内容。这足以让你掌控自己的开发和设计决策。然而，你可能想知道更多并深入某些概念；毕竟，你知道得越多，就越想知道。因此，在每一章中，你都会找到一个同名的小节，你可以在其中找到一些书籍、文章或帖子作为参考，以更深入地了解数据库知识。以下是本章的列表：


    *   《Database in Depth: Relational Theory for Practitioners》 – [`www.amazon.com/Database-Depth-Relational-Theory-Practitioners/dp/0596100124`](http://www.amazon.com/Database-Depth-Relational-Theory-Practitioners/dp/0596100124)

    *   《Practical Issues in Database Management: A Reference for the Thinking Practitioner》
    – [`www.amazon.com/Practical-Issues-Database-Management-Practitioner/dp/0201485559`](http://www.amazon.com/Practical-Issues-Database-Management-Practitioner/dp/0201485559)

    *   《SQL and Relational Theory: How to Write Accurate SQL Code》 – [`www.amazon.com/SQL-Relational-Theory-Write-Accurate/dp/1449316409`](http://www.amazon.com/SQL-Relational-Theory-Write-Accurate/dp/1449316409)

    *   《Data Modeling Essentials, Third Edition》 – [`www.amazon.com/Modeling-Essentials-Third-Graeme-Simsion/dp/0126445516`](http://www.amazon.com/Modeling-Essentials-Third-Graeme-Simsion/dp/0126445516)

    *   《Database Design and Relational Theory: Normal Forms and All That Jazz》 –
    [`www.amazon.com/Database-Design-Relational-Theory-Normal/dp/1484255399`](http://www.amazon.com/Database-Design-Relational-Theory-Normal/dp/1484255399)

    *   《Hot Patching SQL Server Engine in Azure SQL Database》 – [`https://techcommunity.microsoft.com/t5/azure-sql-database/hot-patching-sql-server-engine-in-azure-sql-database/ba-p/849700`](https://techcommunity.microsoft.com/t5/azure-sql-database/hot-patching-sql-server-engine-in-azure-sql-database/ba-p/849700)'
  raw: '### Keep it super simple


    As a developer, you have to know that doesn’t make sense, for example, to create
    an amazingly sophisticated caching mechanism to improve performance of your solution,
    if you haven’t correctly designed your database so that it can take advantage
    of indexes. Let me tell you it loud and clear: there is nothing you can do to
    gain the same performance improvement that a good indexing strategy can give you.
    If you try to do something different and cleverer, sooner or later you’ll be ending
    up by replicating the same solution already available in a database, right inside
    your application (most likely, some form of b-tree) – just with much higher costs
    and complexity. It just doesn’t make sense from a professional standpoint. Stories
    of overengineering like this one aren’t just hypothetical, and told just to scare
    new junior developers: it happened for real to one of the authors. He was asked
    to optimize a complex near real-time data processing solution that was using complex
    multiple caching layers, state-of-the-art microservice architecture, and the greatest
    and latest hardware, but still was performing badly and with unsustainable costs.
    After a deep analysis, the proposal was to dismantle a big chunk of the existing
    architecture and replace it with a couple of indexes on the database – more precisely,
    Columnstore Indexes. The developers who created the solution didn’t know that
    they existed as they were still stuck with ideas of features available in SQL
    Server 2005\. After some debate, some struggles, and discussion around growth
    mindset, the code was refactored and rearchitected, and the reviewed working solution
    went from using seven virtual machines to host a complex distributed caching solution
    to one Azure SQL database at one tenth of the cost and much, much better performances.


    By using the correct tool, solutions that are complex by nature can be shredded
    down to smaller pieces, each one simpler to manage with the correct tools. Azure
    SQL is one of them that usually fits well when it comes to data manipulation.
    Give it a try even if you think it is not up to the challenge and be prepared
    to change your mind. That’s how you become a better developer.


    ### Be a generalized specialist


    Development is much more about making decisions than writing code. Sure, code
    is how you bring to the world what you have decided to do in order to solve some
    business problem or to implement a feature, but the development process started
    long before in your mind, the moment you started to evaluate what options you
    have at your hands to realize what you’re asked to work on.


    As a developer, one of the most important steps toward the goals one has in mind
    is the ability to be in control and to decide what is the best architecture and
    implementation strategy to reach them. By knowing more than one language and more
    than one data management solution, one can pick, or suggest, the best one for
    the specific solution being worked on. Sometimes it can be something as complex
    and flexible as Apache Spark, some other time something simple and easy as Redis.
    Many times, a modern database like Azure SQL can give, in just one place, an amazing
    number of features that provide a good balance of options, costs, and performances.


    To make the best choice, one needs to know at least a few tools that are on the
    border of the development space as they will help to deal with everything outside
    that space. In many cases, “everything” means “data”. The more one knows about
    it, the better the solution will be. To use the same definition used in the Agile
    methodology, one needs to become a *generalizing specialist* ([`https://aka.ms/swkogs`](https://aka.ms/swkogs)).


    Be the master of some skills, but actively seek to learn others.


    ## If you want to know more


    This book aims to give you a very practical view of Azure SQL and how it can be
    helpful in your daily life as developer or architect. Of course, to understand
    why something described is important or better than some other alternative, a
    bit of theoretical background is needed. We want you to learn by understanding
    concepts, not just learning them by memory. This is a foundational mindset as
    you will be the one asked to make some development or design choices. While we
    cannot be there to help you, this book can, but only if you understand the details
    of the explained concepts. We put in this book what we think is enough to get
    you started and to give you an idea of what you can achieve. It’s more than enough
    to be in control of your development and design decisions. However, you may want
    to know more and to go deep into some concepts; after all, the more you know,
    the more you want to know. So, in every chapter, you’ll find a section with this
    very same name, where you can find a list of books, articles, or posts as a reference
    for going deeper into database knowledge. Here’s the list for this chapter:


    *   Database in Depth: Relational Theory for Practitioners – [`www.amazon.com/Database-Depth-Relational-Theory-Practitioners/dp/0596100124`](http://www.amazon.com/Database-Depth-Relational-Theory-Practitioners/dp/0596100124)


    *   Practical Issues in Database Management: A Reference for the Thinking Practitioner –
    [`www.amazon.com/Practical-Issues-Database-Management-Practitioner/dp/0201485559`](http://www.amazon.com/Practical-Issues-Database-Management-Practitioner/dp/0201485559)


    *   SQL and Relational Theory: How to Write Accurate SQL Code – [`www.amazon.com/SQL-Relational-Theory-Write-Accurate/dp/1449316409`](http://www.amazon.com/SQL-Relational-Theory-Write-Accurate/dp/1449316409)


    *   Data Modeling Essentials, Third Edition – [`www.amazon.com/Modeling-Essentials-Third-Graeme-Simsion/dp/0126445516`](http://www.amazon.com/Modeling-Essentials-Third-Graeme-Simsion/dp/0126445516)


    *   Database Design and Relational Theory: Normal Forms and All That Jazz – [`www.amazon.com/Database-Design-Relational-Theory-Normal/dp/1484255399`](http://www.amazon.com/Database-Design-Relational-Theory-Normal/dp/1484255399)


    *   Hot Patching SQL Server Engine in Azure SQL Database – [`https://techcommunity.microsoft.com/t5/azure-sql-database/hot-patching-sql-server-engine-in-azure-sql-database/ba-p/849700`](https://techcommunity.microsoft.com/t5/azure-sql-database/hot-patching-sql-server-engine-in-azure-sql-database/ba-p/849700)'
