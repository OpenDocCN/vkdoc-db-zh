- fmt: "### 分组数据\n\n`GROUP BY`子句可用于`SELECT`语句中，对表中存在的所有组应用聚合函数，例如`COUNT`或`MAX`（但还有更多）。一个组被定义为指定列具有相同值的一组行。例如，以下代码返回仓库中库存的产品及其数量，按`SupplierID`和`ColorID`分组：\n\
    \n```sql\nSELECT\n    [SupplierID],\n    [ColorID],\n    COUNT(*) AS ProductsInStock,\n\
    \    SUM(QuantityPerOuter) AS ProductsQuantity\nFROM\n    [Warehouse].[StockItems]\n\
    GROUP BY\n    [SupplierID], [ColorID]\nORDER BY\n    [SupplierID], [ColorID]\n\
    ```\n\n这是一个示例结果。\n\n![图4-3：按供应商和颜色聚合的数据](images/493913_1_En_4_Chapter/493913_1_En_4_Fig3_HTML.jpg)\n\
    \n当然，你可能希望将结果数据与其他表进行`JOIN`，以不仅返回ID，还返回供应商和颜色的名称。\n\n你可以很容易地做到这一点，通过结合你目前所学的知识，使用一个公用表表达式（Common\
    \ Table Expression）和几个`JOIN`，优雅地解决问题，并向你的应用程序返回一个包含所有所需数据的结果集。\n\n本书附带的代码中提供了展示此类查询的完整注释代码。\n\
    \n### 多重分组\n\nAzure SQL提供的一个非常有趣的功能是能够同时对*不同的组*执行聚合。这可能听起来令人困惑，因此一个例子会有所帮助。使用之前相同的示例，现在让它更贴近实际。你需要返回可用于创建矩阵报表的数据，最终用户可以按供应商和颜色分析仓库中有多少产品。行和列将分别包含供应商和颜色。在行和列的交叉点，可以找到具有该颜色、来自该供应商的库存产品数量。由于是矩阵报表，用户期望在最右侧的列中看到每个供应商的产品总数，在最后一行看到每种颜色的产品总数。\n\
    \n![图4-4：一个典型的矩阵报表](images/493913_1_En_4_Chapter/493913_1_En_4_Fig4_HTML.jpg)\n\
    \n这意味着你必须使用四种不同的设置来对数据进行分组：\n\n*   产品和供应商\n*   仅产品\n*   仅供应商\n*   全部（计算所有产品）\n\
    \n这通常意味着四个不同的查询：在大型数据集上，性能肯定会受到影响，因为你必须读取和聚合数据四次。\n\n我相信作为开发人员，你已经在考虑使用一些缓存来避免这种资源浪费，并将一些计算移到代码中，这样就不必四次读取相同的数据——这很聪明，但这会增加代码的复杂性。如果可能，我们希望避免这一点。幸运的是，不需要这种额外的复杂性，你可以保持代码的简单和精简。你需要做的就是要求Azure\
    \ SQL使用`GROUPING SET`功能为你执行这多个并发聚合：\n\n```sql\nSELECT\n    [SupplierID],\n   \
    \ [ColorID],\n    COUNT(*) AS ProductsInStock,\n    SUM(QuantityPerOuter) AS ProductsQuantity,\n\
    \    GROUPING(ColorID) as IsAllColors,\n    GROUPING(SupplierID) as IsAllSuppliers\n\
    FROM\n    [Warehouse].[StockItems]\nGROUP BY\n    GROUPING SETS\n    (\n     \
    \   ([SupplierID], [ColorID]),\n        ([SupplierID]),\n        ([ColorID]),\n\
    \        ()\n    )\nORDER BY\n    TotalPerColorID, TotalPerSupplierID\n;\n```\n\
    \n前面查询的结果将包含按所有四种定义的*分组集*分组的数据，因此你将获得所有需要的数据，而无需任何额外的复杂性——并且性能要好得多。\n\n![图4-5：分组集实战](images/493913_1_En_4_Chapter/493913_1_En_4_Figb_HTML.jpg)\n\
    \n`SELECT`列表中的函数`GROUPING`用于帮助最终用户理解一行是否代表特定值的总计。例如，`IsAllColors`等于1的行必须用于矩阵的最右侧部分，因为它代表特定供应商的产品总数，无论颜色如何。\n\
    \n### 窗口函数\n\n窗口函数及其所有相关功能可能是你在Azure SQL中用于操作数据的最强大的结构之一。它们能优雅解决的问题数量惊人，而且有整本书专门详细解释它们的用法。本节的目标是让你熟悉它们的使用，以便你可以立即开始利用它们的强大功能。\n\
    \n虽然功能极其强大，但窗口函数相当容易理解。用非常简单的术语来说，它们允许你访问位于当前处理行之前和之后的数据。\n\n最简单的实际例子是由*累计总和*的计算提供的。累计总和被定义为“根据添加的项目不断调整的总和”。\n\
    \n这是一个例子。\n\n![图4-6：计算订单的累计总和](images/493913_1_En_4_Chapter/493913_1_En_4_Fig5_HTML.jpg)\n\
    \n要计算第三行（等于27）的累计总和，从逻辑角度来看，Azure SQL必须获取`Quantity`列所有前几行的值并将它们相加。计算第四行及后续行的`Running\
    \ Total`值时也是如此。\n\n这些需要考虑的额外行代表了Azure SQL正在操作的数据*窗口*。对于累计总和，该窗口从表的第一行开始，到当前行结束。\n\
    \n一旦定义了窗口，你就可以告诉Azure SQL你想在该窗口可用的数据上使用哪个函数。像`SUM`这样的聚合函数很常见。实际上，`SUM`正是你实现累计总和所需要的。生成上图中结果的代码如下：\n\
    \n```sql\nSELECT\n    [OrderLineID],\n    [Description],\n    [Quantity],\n  \
    \  SUM(Quantity) OVER (ORDER BY [OrderLineID] ROWS BETWEEN UNBOUNDED PRECEDING\
    \ AND CURRENT ROW) AS RunningTotal\nFROM\n    [Sales].[OrderLines]\nWHERE\n  \
    \  [OrderID] = 37\n```\n\n另一个常见的聚合函数是`AVG`，它将为你提供计算移动平均值的简便方法。你只需要定义用于计算平均值的窗口大小，例如：\n\
    \n```sql\nAVG(Quantity) OVER (ORDER BY [OrderLineID] ROWS BETWEEN 2 PRECEDING\
    \ AND CURRENT ROW) AS MovingAvg\n```\n\n窗口的大小被称为*帧*。除了聚合函数，你还可以使用*分析函数*，这极大地增强了窗口函数的能力。例如，你可以使用函数`LAG`来访问存在于当前行之前的行中的值。同样，一个实际的例子会让这一点非常容易理解。假设你想计算特定客户的两个连续订单之间经过了多少时间。\n\
    \n![图4-7：计算订单之间的天数差](images/493913_1_En_4_Chapter/493913_1_En_4_Fig6_HTML.jpg)\n\
    \n对于每一行，你需要访问前一行，获取订单日期，并将其与当前行的日期进行比较。得益于窗口函数，这非常容易：\n\n```sql\nSELECT\n    [OrderID],\n\
    \    [OrderDate],\n    DATEDIFF(\n        [DAY],\n        LAG(OrderDate, 1) OVER\
    \ (ORDER BY [OrderDate]),\n        [OrderDate]\n    ) AS ElapsedDays\nFROM\n \
    \   [Sales].[Orders]\nWHERE\n    [CustomerID] = 832\nORDER BY\n    [OrderDate]\n\
    ```\n\n这是一段非常简单而优雅的代码，Azure SQL引擎也能很好地优化它；它还为你节省了原本需要编写的大量代码。"
  raw: '### Grouping data


    The `GROUP BY` clause can be used in a `SELECT` statement to apply an aggregation
    function, for example, `COUNT` or `MAX` (but there are many more) to all the groups
    that exist in a table. A group is defined as a set of rows that have the same
    value for the specified columns. For example, the following code returns which
    and how many products a warehouse has in stock, grouped by `SupplierID` and `ColorID`:


    ```

    SELECT

    [SupplierID],

    [ColorID],

    COUNT(*) AS ProductsInStock,

    SUM(QuantityPerOuter) AS ProductsQuantity

    FROM

    [Warehouse].[StockItems]

    GROUP BY

    [SupplierID], [ColorID]

    ORDER BY

    [SupplierID], [ColorID]

    ```


    Here’s a sample result.


    ![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig3_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Data aggregated by Supplier and Color


    Of course, you may want to `JOIN` the resulting data with other tables to return
    not only the IDs but also the name of the supplier and the color.


    You can easily do that by starting to put together what you have learned so far,
    using a Common Table Expression and couple of `JOIN` to elegantly solve the problem
    and return to your application one resultset with all the data needed for doing
    its job.


    A fully commented code that shows such a query is available in the code accompanying
    the book.


    ### Multiple grouping


    A very interesting feature that Azure SQL provides is the ability to perform aggregations
    on *different groups* at the same time. It may sound confusing, so an example
    will help. Using the same sample done before, let’s now make it more realistic.
    You need to return data that can be used to create a matrix report where the end
    user can analyze how many products there are in the warehouse per supplier and
    per color. The rows and columns will contain suppliers and colors, respectively.
    At the intersection of a row and a column, one can find the number of products,
    with that color and from that supplier, in stock. Since it is a matrix report,
    the user expects to have the total number of products per supplier on the rightmost
    column and the total number of products per color on the last row.


    ![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig4_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    A typical matrix report


    This means that you must group data using four different settings:


    *   Products and Suppliers


    *   Products


    *   Supplier


    *   All (count all products)


    This would usually mean four different queries: on large datasets performances
    will be affected for sure as you must read and aggregate data four times.


    I’m sure as a developer you are already thinking of using some caching to avoid
    this waste of resources, and move some calculations within your code so that you
    don’t have to read the same data four times – clever, but that would increase
    the complexity of your code. If possible, we would like to avoid that. Luckily,
    such additional complexity is not needed, and you can keep your code simple and
    lean. All you need to do is ask Azure SQL to do this multiple concurrent aggregation
    for you, using the `GROUPING SET` feature:


    ```

    SELECT

    [SupplierID],

    [ColorID],

    COUNT(*) AS ProductsInStock,

    SUM(QuantityPerOuter) AS ProductsQuantity,

    GROUPING(ColorID) as IsAllColors,

    GROUPING(SupplierID) as IsAllSuppliers

    FROM

    [Warehouse].[StockItems]

    GROUP BY

    GROUPING SETS

    (

    ([SupplierID], [ColorID]),

    ([SupplierID]),

    ([ColorID]),

    ()

    )

    ORDER BY

    TotalPerColorID, TotalPerSupplierID

    ;

    ```


    The result of the preceding query will contain data grouped by all the four defined
    *grouping sets*, so that you will have all the needed data without any added complexity –
    and with much better performances.


    ![../images/493913_1_En_4_Chapter/493913_1_En_4_Figb_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Figb_HTML.jpg)


    Figure 4-5


    Grouping Sets in action


    The function `GROUPING` present in the SELECT list is used to help the end user
    to understand if a row is representing the total for a specific value. For example,
    a row with `IsAllColors` equal to one is a row that must be used in the rightmost
    part of the matrix, as it represents the total product available for a specific
    supplier, no matter the color.


    ### Windowing Functions


    Windowing Functions and all the related features are probably one of the most
    powerful constructs that you can use in Azure SQL to manipulate data. The amount
    of problems that can be elegantly solved with them is amazing, and there are entire
    books dedicated only to explaining their usage in detail. The goal of this section
    is to make you familiar with their usage so that you can start to take advantage
    of their power right away.


    While extremely powerful, Windowing Functions are quite easy to understand. In
    very simple terms, they allow you to access data that sits before and after the
    row you are currently processing.


    The easiest practical example is provided by the calculation of a *running total*.
    A running total is defined as “a total that is continually adjusted to take account
    of items as they are added.”


    Here’s an example.


    ![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig5_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Fig5_HTML.jpg)


    Figure 4-6


    Calculating the Running Total for an Order


    To calculate the running total for the third line, which equals to 27, Azure SQL,
    from a logical perspective, has to get all the values of all the previous rows
    for the Quantity column and sum them together. Same goes for when it has to calculate
    the Running Total value for the fourth row and so on.


    These additional rows that are needed to be taken into consideration for the calculation
    represent the *window* of data on which Azure SQL is operating. For the Running
    Total, that window starts at the very first line of the table and ends at the
    current row.


    Once the window is defined, you can tell Azure SQL which function you want to
    use on the data available in the window. Aggregate functions like `SUM` are common.
    And in fact, `SUM` is exactly what you need to implement a running total. The
    code needed to generate the result shown in the previous picture is the following:


    ```

    SELECT

    [OrderLineID],

    [Description],

    [Quantity],

    SUM(Quantity) OVER (ORDER BY [OrderLineID] ROWS BETWEEN UNBOUNDED PRECEDING AND
    CURRENT ROW) AS RunningTotal

    FROM

    [Sales].[OrderLines]

    WHERE

    [OrderID] = 37

    ```


    Another common aggregation function is the `AVG` that will give you an easy way
    to calculate moving averages. You just need to define how big is the size of the
    window you want to use for calculating the average, for example:


    ```

    AVG(Quantity) OVER (ORDER BY [OrderLineID] ROWS BETWEEN 2 PRECEDING AND CURRENT
    ROW) AS MovingAvg

    ```


    The size of the window is called a *frame*. Besides aggregates, you can also use
    *analytical functions* that increase the power of windowing functions incredibly.
    For example, you can use the function `LAG` to access a value existing in a row
    that is preceding the current one. Again, a practical sample will make this very
    easy to understand. Let’s say you want to calculate how much time passes between
    two consecutive orders for a specific customer.


    ![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig6_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Fig6_HTML.jpg)


    Figure 4-7


    Calculating elapsed days between orders


    For each row, you would need to access the previous row, take the order date,
    and compare it with the one in the current row. Thanks to windowing functions,
    this is very easy:


    ```

    SELECT

    [OrderID],

    [OrderDate],

    DATEDIFF(

    [DAY],

    LAG(OrderDate, 1) OVER (ORDER BY [OrderDate]),

    [OrderDate]

    ) AS ElapsedDays

    FROM

    [Sales].[Orders]

    WHERE

    [CustomerID] = 832

    ORDER BY

    [OrderDate]

    ```


    This is a very simple and elegant code that can also be nicely optimized by the
    Azure SQL engine; it also saves you from a huge amount of code that you would
    have had to write otherwise.'
