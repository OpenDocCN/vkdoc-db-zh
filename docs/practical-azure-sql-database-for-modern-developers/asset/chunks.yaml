    the focus of this book. With a PaaS service, you get things like automated backups,
    patching of both the database engine and OS, a service-level agreement (SLA) for
    availability, advanced security, monitoring, and scalability out of the box. For
    developers, this means you can get a connection string, stop worrying about maintenance,
    and spend less time troubleshooting.


    For example, let’s imagine you don’t want to have to worry about OS patches and
    SQL Server upgrades. You just want an instance of SQL Server. You might opt for
    *Azure SQL managed instance*, which abstracts the OS away from you, leaving you
