- fmt: '### A quick recap


    In the first section of this chapter, “Creating Azure SQL Database,” some of the
    Azure basics were covered, including Azure subscriptions, resource groups, regions,
    and logical servers for Azure SQL Database. To review, you’ll need an Azure subscription
    to do anything in Azure (even if it’s free), resource groups are logical containers
    or metadata entities for the resources or services you deploy in Azure, the region
    is where your services will be deployed, and the logical server acts as a central
    administrative point for multiple single or pooled databases and other settings/configurations
    associated with that logical server. For `Azure SQL managed instance`, the server
    name you select is not a logical server, but the actual service, which you can
    then deploy databases into (sometimes referred to as “managed databases”). In
    all deployment options, you’ll then have to provide an admin login and password.
    If you’re familiar with `SQL Server`, this is the equivalent to the system admin
    in `SQL Server`. This account will connect using a username and password that
    you provide, and only one of these accounts can exist. If you’re familiar with
    `Azure Active Directory`, you can also choose to configure an individual or security
    group account here or after deployment (optional).


    ### DTU or vCores


    After you’ve set up the admin login, when deploying `Azure SQL Database`, your
    next choice is if you want the database being deployed to be part of a new or
    existing `Elastic Pool`. If you do, you’ll then have to configure the service
    tier, storage, and compute options for the `Elastic Pool`. Note that in `Elastic
    Pools`, you share resources between all the databases in the pool. You can also
    resource govern among databases in the pool if you want to limit certain databases.
    Similarly, if you’re deploying an `Instance Pool`, you’ll need to use a different
    Azure portal flow or set of commands, as you first need to deploy the `Instance
    Pool`, before you can deploy `Managed Instances` inside of it.


    Next, you’ll select what’s referred to as the purchasing model, and there are
    two options: virtual core (`vCore`)-based or database transaction unit (`DTU`)-based.
    The `DTU` model is not available in `Azure SQL managed instances`. The `DTU`-based
    model is an early purchasing model within `Azure SQL Database`. The idea is that
    you get a bundled measure of compute, store, and I/O resources (that is a `DTU`),
    and you pick the `DTU` level that meets your needs. One of the challenges with
    this model is you cannot scale independently between the three, and it’s hard
    to determine what you are getting. The `vCore`-based model was introduced due
    to customer requirements to independently choose compute and storage resources.
    This is the recommended model from Microsoft. In addition, using the `vCore` model
    allows you to leverage `Azure Hybrid Benefit for SQL Server` to gain significant
    cost savings. This benefit allows you to apply existing unused licenses you may
    own already in return for big discounts. In the `vCore` model, you pay for compute
    resources (based on the service tier, number of `vCores`, amount of memory, and
    the hardware generation), the type and amount of data and log storage, and the
    backup storage.


    In this book, we’ll mostly focus on the `vCore` purchasing model since it’s the
    recommended and modern model from Microsoft, but if you’re interested in further
    comparing `vCores` and `DTUs`, you can refer here: [`https://aka.ms/sdpm`](https://aka.ms/sdpm).


    ### Service tiers


    Once you select the purchasing model, you have options underneath that are called
    service tiers. These service tiers represent different tiers of performance and
    availability. The tiers available include `General Purpose`, `Business Critical`,
    and `Hyperscale`. It’s important to carefully consider your options, but a general
    recommendation would be to start with the `General Purpose` tier and adjust as
    needed.


    The `General Purpose` tier offers a budget-oriented, balanced, and scalable set
    of compute and storage options. Within the `General Purpose` service tier for
    an `Azure SQL Database` (single database), there currently exists two options
    for selecting compute: provisioned and serverless. Provisioned compute is meant
    for more regular usage patterns with higher average compute utilization over time
    or multiple databases using elastic pools. This is the tier you may want to start
    with. Serverless compute is meant for intermittent, unpredictable usage with lower
    average compute utilization over time.


    For example, consider an expense-reporting internal business application that
    typically only gets used during business hours, but occasionally sees spikes in
    usage after big internal conferences or at the end of the month. This means that
    every night, between 5PM and 8AM, there is little to no activity happening. However,
    after big conferences and at the end of the month, significant activity occurs.
    You then must make the choice of overprovisioning to meet the spikes in demand
    or underprovisioning to keep costs low for the relatively quiet application. With
    serverless, you can leverage auto-pause and resume capabilities, with a customizable
    time delay. This means that when your database is inactive for a certain amount
    of time, your database will pause. During this time, you only pay for storage,
    and your compute costs go to zero. Once someone tries to access the application
    again, `SQL` will turn back on, and your compute will scale on a per-second basis
    between the minimum and maximum `vCores` that you set. In this example, when demands
    are high, `Azure SQL Database` can autoscale up to what’s required and then use
    an interesting cache reclamation system to scale back down once the demand decreases.
    Remember, serverless is currently only available in `Azure SQL Database` single
    databases, but check the documentation for most up-to-date information at [`https://aka.ms/sdserverless`](https://aka.ms/sdserverless).


    Currently, apart from the `Azure SQL Database` `General Purpose` tier, all other
    tiers and deployment options only have the choice of provisioned compute. Once
    you choose a service tier, you can scale up and down as needed and even switch
    between service tiers. The next service tier that’s available in all deployment
    options is `Business Critical`. This is meant specifically for business applications
    with low-latency response requirements. This tier also offers the highest resiliency
    to failures by leveraging several isolated replicas (one of which you can also
    use as a read-only replica). Some industries that tend to leverage this tier include
    gaming, emergency, and financial. While `Azure SQL Database` generally has a high
    service-level agreement that sets the expectation for uptime and performance (`SLA`),
    `Business Critical` can guarantee the highest `SLA` at 99.995% uptime. For more
    information about the `Azure SQL` `SLA`, refer here: [`https://aka.ms/sdsla`](https://aka.ms/sdsla).


    The `Business Critical` tier is also the only service tier within `Azure SQL`
    that supports in-memory technologies. In-memory technologies will be covered at
    a much deeper level in Chapter [9](#493913_1_En_9_Chapter.xhtml). At a high level,
    in-memory technologies can help improve the performance of various `SQL` workloads
    (analytic and transactional), and the `Business Critical` tier supports in-memory
    `OLTP`, clustered columnstore indexes, nonclustered columnstore indexes, and memory-optimized
    clustered columnstore indexes.'
  raw: '### A quick recap


    In the first section of this chapter, “Creating Azure SQL Database,” some of the
    Azure basics were covered, including Azure subscriptions, resource groups, regions,
    and logical servers for Azure SQL Database. To review, you’ll need an Azure subscription
    to do anything in Azure (even if it’s free), resource groups are logical containers
    or metadata entities for the resources or services you deploy in Azure, the region
    is where your services will be deployed, and the logical server acts as a central
    administrative point for multiple single or pooled databases and other settings/configurations
    associated with that logical server. For Azure SQL managed instance, the server
    name you select is not a logical server, but the actual service, which you can
    then deploy databases into (sometimes referred to as “managed databases”). In
    all deployment options, you’ll then have to provide an admin login and password.
    If you’re familiar with SQL Server, this is the equivalent to the system admin
    in SQL Server. This account will connect using a username and password that you
    provide, and only one of these accounts can exist. If you’re familiar with Azure
    Active Directory, you can also choose to configure an individual or security group
    account here or after deployment (optional).


    ### DTU or vCores


    After you’ve set up the admin login, when deploying Azure SQL Database, your next
    choice is if you want the database being deployed to be part of a new or existing
    Elastic Pool. If you do, you’ll then have to configure the service tier, storage,
    and compute options for the Elastic Pool. Note that in Elastic Pools, you share
    resources between all the databases in the pool. You can also resource govern
    among databases in the pool if you want to limit certain databases. Similarly,
    if you’re deploying an Instance Pool, you’ll need to use a different Azure portal
    flow or set of commands, as you first need to deploy the Instance Pool, before
    you can deploy Managed Instances inside of it.


    Next, you’ll select what’s referred to as the *purchasing model* , and there are
    two options: *virtual core (vCore)-based* or *database transaction unit (DTU)*
    *-based*. The DTU model is not available in Azure SQL managed instances. The DTU-based
    model is an early purchasing model within Azure SQL Database. The idea is that
    you get a bundled measure of compute, store, and I/O resources (that is a DTU),
    and you pick the DTU level that meets your needs. One of the challenges with this
    model is you cannot scale independently between the three, and it’s hard to determine
    what you are getting. The vCore-based model was introduced due to customer requirements
    to independently choose compute and storage resources. This is the recommended
    model from Microsoft. In addition, using the vCore model allows you to leverage
    *Azure Hybrid Benefit for SQL Server* to gain significant cost savings. This benefit
    allows you to apply existing unused licenses you may own already in return for
    big discounts. In the vCore model, you pay for compute resources (based on the
    service tier, number of vCores, amount of memory, and the hardware generation),
    the type and amount of data and log storage, and the backup storage.


    In this book, we’ll mostly focus on the vCore purchasing model since it’s the
    recommended and modern model from Microsoft, but if you’re interested in further
    comparing vCores and DTUs, you can refer here: [`https://aka.ms/sdpm`](https://aka.ms/sdpm).


    ### Service tiers


    Once you select the purchasing model, you have options underneath that are called
    *service tiers* . These service tiers represent different tiers of performance
    and availability. The tiers available include General Purpose, Business Critical,
    and Hyperscale. It’s important to carefully consider your options, but a general
    recommendation would be to start with the General Purpose tier and adjust as needed.


    The *General Purpose* tier offers a budget-oriented, balanced, and scalable set
    of compute and storage options. Within the General Purpose service tier for an
    Azure SQL Database (single database), there currently exists two options for selecting
    compute: *provisioned* and *serverless*. Provisioned compute is meant for more
    regular usage patterns with higher average compute utilization over time or multiple
    databases using elastic pools. This is the tier you may want to start with. Serverless
    compute is meant for intermittent, unpredictable usage with lower average compute
    utilization over time.


    For example, consider an expense-reporting internal business application that
    typically only gets used during business hours, but occasionally sees spikes in
    usage after big internal conferences or at the end of the month. This means that
    every night, between 5PM and 8AM, there is little to no activity happening. However,
    after big conferences and at the end of the month, significant activity occurs.
    You then must make the choice of overprovisioning to meet the spikes in demand
    or underprovisioning to keep costs low for the relatively quiet application. With
    serverless, you can leverage auto-pause and resume capabilities , with a customizable
    time delay. This means that when your database is inactive for a certain amount
    of time, your database will pause. During this time, you only pay for storage,
    and your compute costs go to zero. Once someone tries to access the application
    again, SQL will turn back on, and your compute will scale on a per-second basis
    between the minimum and maximum vCores that you set. In this example, when demands
    are high, Azure SQL Database can autoscale up to what’s required and then use
    an interesting cache reclamation system to scale back down once the demand decreases.
    Remember, serverless is currently only available in Azure SQL Database single
    databases, but check the documentation for most up-to-date information at [`https://aka.ms/sdserverless`](https://aka.ms/sdserverless).


    Currently, apart from the Azure SQL Database General Purpose tier, all other tiers
    and deployment options only have the choice of provisioned compute. Once you choose
    a service tier, you can scale up and down as needed and even switch between service
    tiers. The next service tier that’s available in all deployment options is *Business
    Critical*. This is meant specifically for business applications with low-latency
    response requirements. This tier also offers the highest resiliency to failures
    by leveraging several isolated replicas (one of which you can also use as a read-only
    replica). Some industries that tend to leverage this tier include gaming, emergency,
    and financial. While Azure SQL Database generally has a high service-level agreement
    that sets the expectation for uptime and performance (SLA), Business Critical
    can guarantee the highest SLA at 99.995% uptime. For more information about the
    Azure SQL SLA, refer here: [`https://aka.ms/sdsla`](https://aka.ms/sdsla).


    The Business Critical tier is also the only service tier within Azure SQL that
    supports in-memory technologies. In-memory technologies will be covered at a much
    deeper level in Chapter [9](#493913_1_En_9_Chapter.xhtml). At a high level, in-memory
    technologies can help improve the performance of various SQL workloads (analytic
    and transactional), and the Business Critical tier supports in-memory OLTP, clustered
    columnstore indexes, nonclustered columnstore indexes, and memory-optimized clustered
    columnstore indexes.'
  trans: '### 快速回顾


    在本章第一节“创建 Azure SQL 数据库”中，我们介绍了一些 Azure 基础知识，包括 Azure 订阅、资源组、区域以及 Azure SQL 数据库的逻辑服务器。回顾一下，要在
    Azure 中执行任何操作（即使是免费操作），你都需要一个 Azure 订阅；资源组是你部署在 Azure 中的资源或服务的逻辑容器或元数据实体；区域是你的服务部署的地点；而逻辑服务器则充当多个单数据库或池数据库以及与该逻辑服务器关联的其他设置/配置的集中管理点。对于
    `Azure SQL 托管实例`，你选择的服务器名称并非逻辑服务器，而是实际的服务，之后你可以在其中部署数据库（有时称为“托管数据库”）。在所有部署选项中，你都需要提供管理员登录名和密码。如果你熟悉
    `SQL Server`，这相当于 `SQL Server` 中的系统管理员。此账户将使用你提供的用户名和密码进行连接，并且只能存在一个这样的账户。如果你熟悉
    `Azure Active Directory`，也可以选择在此处或部署后配置单个或安全组账户（可选）。


    ### DTU 或 vCore


    设置好管理员登录后，在部署 `Azure SQL 数据库` 时，你的下一个选择是是否要将部署的数据库作为新的或现有的 `弹性池` 的一部分。如果是，那么你就必须为
    `弹性池` 配置服务层、存储和计算选项。请注意，在 `弹性池` 中，你共享池中所有数据库之间的资源。如果你希望限制某些数据库，也可以在池中的数据库之间进行资源调控。同样地，如果你要部署
    `实例池`，则需要使用不同的 Azure 门户流程或命令集，因为你需要先部署 `实例池`，然后才能在其中部署 `托管实例`。


    接下来，你将选择所谓的购买模型，有两个选项：基于虚拟核心 (`vCore`) 的模型或基于数据库事务单元 (`DTU`) 的模型。`DTU` 模型在 `Azure
    SQL 托管实例` 中不可用。基于 `DTU` 的模型是 `Azure SQL 数据库` 中的早期购买模型。其理念是你获得一个计算、存储和 I/O 资源的捆绑度量单位（即
    `DTU`），然后选择满足你需求的 `DTU` 级别。该模型的一个挑战是你无法在这三者之间独立扩展，并且很难确定你获得的具体资源。基于 `vCore` 的模型是应客户要求独立选择计算和存储资源而推出的。这是
    Microsoft 推荐的模型。此外，使用 `vCore` 模型可以利用 `Azure 混合权益（适用于 SQL Server）` 来节省大量成本。此权益允许你应用可能已拥有的现有未使用许可，以换取大幅折扣。在
    `vCore` 模型中，你需要为计算资源（基于服务层、`vCore` 数量、内存量以及硬件代数）、数据和日志存储的类型与容量以及备份存储付费。


    在本书中，我们将主要关注 `vCore` 购买模型，因为它是 Microsoft 推荐的现代模型，但如果你想进一步比较 `vCores` 和 `DTUs`，可以参考这里：[`https://aka.ms/sdpm`](https://aka.ms/sdpm)。


    ### 服务层


    一旦选择了购买模型，其下方还有称为服务层的选项。这些服务层代表了不同的性能和可用性等级。可用的层级包括 `通用型`、`业务关键型` 和 `超大规模`。仔细考虑你的选项很重要，但一个通用的建议是从
    `通用型` 层开始，并根据需要进行调整。


    `通用型` 层提供了一套经济、平衡且可扩展的计算和存储选项。对于 `Azure SQL 数据库`（单数据库）的 `通用型` 服务层，目前有两种计算选项可供选择：预配型和无服务器型。预配型计算适用于更常规的使用模式，其平均计算利用率随时间推移较高，或多个数据库使用弹性池。这可能是你想要开始使用的层。无服务器型计算适用于间歇性、不可预测的使用模式，其平均计算利用率随时间推移较低。


    例如，考虑一个费用报销内部业务应用程序，它通常只在营业时间内使用，但在大型内部会议后或月底偶尔会出现使用高峰。这意味着每天晚上，从下午 5 点到上午 8 点，几乎没有活动发生。然而，在大型会议后和月底，会出现显著的活动高峰。然后你必须做出选择：是过度配置以满足需求高峰，还是配置不足以保持相对安静的应用程序的成本较低。使用无服务器型，你可以利用自动暂停和恢复功能，并可自定义时间延迟。这意味着当你的数据库在一定时间内处于非活动状态时，它将被暂停。在此期间，你只需支付存储费用，计算费用将降为零。一旦有人再次尝试访问应用程序，`SQL`
    将重新启动，你的计算资源将在你设定的最小和最大 `vCore` 数之间按秒进行扩展。在此示例中，当需求高涨时，`Azure SQL 数据库` 可以自动扩展到所需水平，然后在需求减少时使用一个有趣的缓存回收系统来缩减。请记住，无服务器型目前仅在
    `Azure SQL 数据库` 单数据库中可用，但请查阅文档以获取最新信息：[`https://aka.ms/sdserverless`](https://aka.ms/sdserverless)。


    目前，除了 `Azure SQL 数据库` 的 `通用型` 层之外，所有其他层和部署选项都只有预配型计算这一选择。一旦选择了服务层，你就可以根据需要进行向上或向下扩展，甚至可以在服务层之间切换。下一个在所有部署选项中可用的服务层是
    `业务关键型`。它专为具有低延迟响应要求的业务应用程序而设计。此层还通过利用多个隔离副本（其中一个也可用作只读副本）来提供最高的故障恢复能力。倾向于使用此层的一些行业包括游戏、应急和金融。虽然
    `Azure SQL 数据库` 通常具有较高的服务级别协议 (`SLA`) 来设定正常运行时间和性能预期，但 `业务关键型` 可以保证最高的 `SLA`，达到
    99.995% 的正常运行时间。有关 `Azure SQL` `SLA` 的更多信息，请参考这里：[`https://aka.ms/sdsla`](https://aka.ms/sdsla)。


    `业务关键型` 层也是 `Azure SQL` 中唯一支持内存中技术的服务层。内存中技术将在第 9 章中更深入地介绍。概言之，内存中技术可以帮助提高各种 `SQL`
    工作负载（分析型和事务型）的性能，`业务关键型` 层支持内存中 `OLTP`、聚集列存储索引、非聚集列存储索引以及内存优化聚集列存储索引。'
- fmt: '# Service Tiers and Configurations


    The General Purpose and Business Critical tiers currently support database size
    of maximum 4–8TB (depending on deployment option and service tier). The final
    service tier available within Azure SQL Database is **Hyperscale**, which was
    built to take advantage of cloud elasticity and to allow a database to grow almost
    without limits, freeing the developer from all encumbrances of managing huge databases.
    Microsoft rearchitected Azure SQL to be able to run in a `Hyperscale` fashion
    by refactoring the original SQL Server engine into different, smaller, independent,
    distributed services that work together as one entity, but much more elastic and
    scalable than the original. This service tier is meant for most business workloads
    that may need in future highly scalable storage, up to 100TB at the moment. `Hyperscale`
    also supports deploying multiple read replicas for read-intensive workloads, where
    data is served by all replicas, leveraging a scale-out strategy to increase concurrency
    and performances. Because the file snapshots are stored in Azure Blob storage,
    `Hyperscale` supports “nearly instantaneous” database backups and restores in
    minutes, because it’s no longer a size of data operation. As you can guess, this
    feature is topical in the management of very large databases. `Hyperscale` can
    provide higher overall performance than the General Purpose tier due to higher
    log throughput and faster transaction commit times (regardless of the volume of
    data). If you’re interested in how Microsoft architected this and what the architecture
    changes enabled, you can review additional details here: [`https://aka.ms/sdsth`](https://aka.ms/sdsth).


    To summarize, the recommendation from Microsoft has been to start with General
    Purpose and adjust as needed. With the elasticity of the cloud, you can then scale
    up or down the resources as needed, and if the performance is not good enough,
    you can move to Business Critical or `Hyperscale`. Remember that performance is
    higher in `Hyperscale` but highest in Business Critical, and cost typically follows
    the same pattern. For a detailed, current comparison between the service tiers,
    refer here: [`https://aka.ms/sdbsth`](https://aka.ms/sdbsth).


    ## Hardware generations


    Once you’ve selected a service tier, depending on the deployment option, the vCore
    model provides multiple choices for the **hardware generation**. The hardware
    generation selection allows you to select which physical hardware you want to
    be used for compute and memory. The most common hardware generations used today
    are `Gen4` and `Gen5`. Without getting too much into the specs, `Gen4` hardware
    allows substantially more memory per vCore, but `Gen5` hardware allows you to
    scale compute resources much higher. It’s important to note that hardware generations
    available will constantly change and evolve as the technology improves. `Gen4`,
    for example, has been around for a long time and is no longer available for new
    databases in certain regions. Additionally, `Fsv2-series` (compute-optimized)
    and `M-series` (memory-optimized) hardware options recently became available for
    public usage. Another example is that Azure SQL Database serverless is currently
    only available on `Gen5` hardware. Your requirements for cost and performance
    may make a certain generation of hardware a better choice. You can review the
    most current choices and specs of hardware here: [`https://aka.ms/sdstvhg`](https://aka.ms/sdstvhg).


    If you’re looking for other compute cost-savings opportunities, one option to
    consider is pre-paying for compute resources at a discount with Azure SQL Database
    reserved capacity (`RI`). For more information, see [`https://aka.ms/sdri`](https://aka.ms/sdri).


    If you are building a new application and starting from an empty database or instance,
    Azure SQL’s elasticity allows you to grow and scale your compute and storage as
    needed. If you happen to be migrating an existing workload to Azure SQL Database
    or managed instance, translating that workload to a service tier, compute level,
    and max data size can be complicated. Fortunately, Microsoft has built a few tools
    that can help with this. First, you can leverage the **Data Migration Assistant**
    (`DMA`) tool to identify any blockers and determine which deployment option is
    best. Specifically related to the deployment choices, the `DMA` tool also has
    a feature called **SKU Recommender**, which analyzes your existing workload and
    recommends the service tier, compute level, and max data size. This tool provides
    an estimated cost per month and creates a PowerShell script you can use to bulk
    provision after analysis.


    ## Networking


    After you’ve selected your starting points for compute and storage, the next step
    is to configure the network connectivity. Choices for networking for Azure SQL
    Database (single database and Elastic pool) and Azure SQL managed instance (single
    instance and Instance pool) are different. When you deploy an Azure SQL Database,
    currently the default in the portal is that the "Allow Azure services and resources
    to access this server" blade is set to yes, meaning that other Azure services
    (e.g., Azure Data Factory or an Azure VM) can access the database if you set up
    the connection. Additionally, after deployment, you can alter the Azure SQL Database
    firewall rules to meet the requirements of your application.


    With Azure SQL managed instances, you deploy the service inside an Azure **virtual
    network** (`VNet`) and a subnet that is dedicated to managed instances. `VNets`
    are like networks you’d deploy to your on-premises environments, but specific
    to Azure. A subnet is simply a way to create segments within a `VNet`. By deploying
    Azure SQL Managed Instance into a managed instance-only subnet within a `VNet`
    you own, you’re enabled to have a completely secure and private IP address. This
    ability allows you to connect your on-premises network or other on-premises data
    stores to Azure SQL managed instance (e.g., using linked servers is supported).
    You can optionally enable a public endpoint so you can connect to a managed instance
    from the Internet without VPN, but this access is disabled by default.


    The principle of private endpoints through `VNet` isolation in Azure SQL managed
    instance has made its way to Azure SQL Database in the form of Azure Private Link:
    [`https://aka.ms/aplo`](https://aka.ms/aplo).


    ## Connection methods


    During deployment, in Azure SQL managed instance, you''re also able to choose
    the connection type. In Azure SQL Database, you can also choose the connection
    type, but only after deployment. You can keep the default (combination of `Proxy`
    and `Redirect`) or change to solely `Redirect` or `Proxy`. At the highest level,
    in `Proxy` mode, all connections are proxied through the Azure SQL gateways, but
    in `Redirect` mode, after the connection is established leveraging the gateway,
    the connection goes directly to the database or managed instance. The direct connection
    (`Redirect`) allows for reduced latency and improved throughput, but also requires
    opening additional ports for services external to Azure, which is why it is not
    entirely enabled right away; opening additional ports is something that needs
    to be evaluated with respect to security risks that decision implies, and therefore
    Azure resorts to the most secure option by default.


    As discussed in an earlier section, during deployment of a database (of Azure
    SQL Database or within an Azure SQL managed instance), you have the option to
    set up a **data source** using an existing backup from another Azure SQL Database
    or managed database in Azure SQL managed instance (they must match; you cannot
    use a managed database to create a new Azure SQL Database). In Azure SQL Database
    only, you also have the option to choose an existing sample database (`AdventureWorksLT`).'
