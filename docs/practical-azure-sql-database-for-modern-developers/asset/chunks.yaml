  trans: '

    ### 何时创建索引？


    人们有时会忍不住通过添加各种索引来优化数据库，只要他们认为这些索引可能有帮助。有些人甚至认为在每个列上创建自动索引可能是数据库设计的圣杯。然而，在创建索引之前，你需要意识到索引的代价是什么。


    索引并非总是能提升查询性能的银弹。在只读工作负载中，它们可能是完美的解决方案，因为它们为更好的执行计划提供了更多选择，而最坏的影响只是它们占用的一些额外空间。然而，对于写操作来说，它们是一种负担，因为每个包含更新值的索引都必须随表一起更新。如果你有一个包含五个索引的表，那么每次插入、删除以及许多更新语句都可能不仅需要更新主表，还需要更新所有索引。


    你不应该盲目地在每一列或外键上添加索引，因为这可能会损害数据库性能。以下是一些可用于选择在哪里添加索引的通用准则：


    *   你可以从为主键列创建聚集索引开始，因为表上最常见的操作是通过主键值查找行。

    *   表可能需要在外键上创建非聚集索引，因为你可能期望查询需要读取具有外键值的所有行。

    *   如果你发现应用程序的某个重要查询速度缓慢，你可能需要为该查询使用的列创建索引。


    随着数据库和解决方案复杂性的增加，你可能会发现一个非常常见的查询，它使用 `OrderDate` 列返回过去一天的所有订单。在这种情况下，在该列上创建聚集索引可能很有用，这样，同一天下的所有订单在物理存储上会彼此靠近。请记住，实际上，聚集索引将其行存储在叶级，并且行按创建索引的列排序。这意味着
    Azure SQL 可以从该天下的第一笔订单开始读取，并在找到最后一笔订单时停止，从而将读取优化到最低程度。当然，由于只有一个聚集索引，你需要根据对应用程序工作方式以及用户主要使用方式的了解来仔细评估此策略。


    如你所见，确定正确的索引并非易事。因此，存在各种工具，如 `SQL Server Management Studio` 中的 `Performance Dashboard`、`Database
    Tuning Advisor`，或开源脚本如 `Tiger Toolbox` 或 `First Responder Kit`（本章末尾的链接中引用了两者），它们可以提供可能需要创建的索引列表。在创建索引之前，请务必使用工具来证明你确实需要它。过度索引和很少使用的索引是导致性能问题的两个最常见原因。


    Azure SQL 提供了一系列智能功能，例如 `Automatic tuning`，它会提供关于你可能需要创建的索引的建议。这是识别缺失索引的最佳方式，因为这些建议由机器学习算法提供支持，这些算法在
    Azure SQL 中的大量数据库上进行了训练。更棒的是，你可以让 Azure SQL 的 `Automatic tuning` 功能自动为你创建索引。`Automatic
    tuning` 功能的主要好处是，它会验证创建的索引是否会改善你的查询性能。Azure SQL 具有内置的机器学习模型，用于衡量索引创建前后数据库工作负载的性能，识别受索引影响的查询，并检查查询性能是得到改善还是恶化。如果性能改善不够显著，或者新索引导致性能下降，该更改将被还原。此外，`Automatic
    tuning` 会扫描你的索引使用情况，并向你推荐应该删除的索引。另一个重要好处是，`Automatic tuning` 会合并索引建议以提供最佳索引。例如，如果有两个建议，一个是为列
    `A` 创建索引，另一个是为列 `A` 和 `B` 创建索引，Azure SQL 索引建议将只推荐第二个，因为它也能覆盖只需要列 `A` 的查询。

    '
- fmt: '### Maintaining the indexes


    Indexes are updated whenever the data in the indexed columns is changed. Initially,
    the created index is a perfectly balanced tree that provides optimal performance.
    However, on an actively used database, the underlying data changes over time,
    making the index unbalanced and leaving some nodes half-populated. Index maintenance
    operations regenerate the indexes and return them in better state. There are two
    maintenance operations that you can perform on indexes:


    *   `REBUILD` is an operation that fully re-creates the index, drops the old structure,
    and re-creates a new perfectly balanced index. This operation guarantees that
    your index will be in the perfect shape at the cost of the resources that it uses.


    *   `REORGANIZE` is an operation that reshuffles the data in the parts of indexes
    trying to fill the unused space and balance parts of the indexes. This is a very
    lightweight operation that usually doesn’t affect your application performances
    or consume a lot of resources, but on the other hand, it might not be able to
    fix all problems.


    The SQL statement that re-creates the index is shown in the following example:


    ```sql

    ALTER INDEX FK_Sales_Customers_DeliveryCityID ON Sales.Customers

    REBUILD WITH ( ONLINE = ON);

    ```


    If you want to reorganize the index, you will just replace `REBUILD` keyword with
    `REORGANIZE`. One interesting optional option in this statement is the `ONLINE`
    option. There are two ways to rebuild the indexes:


    *   `OFFLINE` is the default option that is the fastest way to rebuild your index,
    but it will block any query that might touch the data in indexed columns.


    *   `ONLINE` enables your workload to change the data since it will pick up any
    changes that are made in the meantime. This is a more flexible operation, but
    it might consume more resources than `OFFLINE` version and might affect performance
    until it finishes.


    These options are available only in `REBUILD` actions. `REORGANIZE` is always
    `ONLINE`.


    The most important questions in index maintenance are what is the option that
    we should use and on what indexes. Rebuilding or reorganizing all indexes will
    just spend the resources that should be used for queries, and most of the indexes
    might not even need any maintenance. The criterion that is commonly used to determine
    the health state of the indexes is fragmentation. Fragmentation is the percentage
    of space in the index that contains indexed data.


    The following query returns fragmentation of all indexes for a provided database
    and object where indexes should be scanned:


    ```sql

    DECLARE @db_id int = DB_ID(''Wide World Importers'');

    DECLARE @object_id int = OBJECT_ID(''Sales.Customers'');

    SELECT index_id, partition_number, avg_fragmentation_in_percent

    FROM sys.dm_db_index_physical_stats(@db_id, @object_id, NULL, NULL , ''LIMITED'');

    ```


    In the result of the query, you can find `index_id`, `partition_number`, and `fragmentation`,
    so you can find the fragmented indexes using system views such as `sys.indexes`.
    Notice the last parameter in the function – `LIMITED`. Investigating fragmentation
    of indexes is not a lightweight operation especially on large indexes, and you
    can specify whether you would like to get approximate results by scanning a limited
    part of the index, calculate statistics from a sample, or analyze the entire index.


    The action that you need to take on the index depends on the fragmentation. Some
    general rules of thumb are as follows:


    *   If fragmentation of the index is between 5% and 30%, use `REORGANIZE` operation.


    *   If fragmentation is greater than 30% and you can find some period where the
    table will not be used (a.k.a. Maintenance period), use `OFFLINE REBUILD` operation.


    *   If your table is frequently used and you cannot block the application workload,
    use `ONLINE REBUILD` operation.


    You can also use proven open source scripts that can help you to identify candidates
    for maintenance and apply recommended actions. The most commonly used scripts
    for index maintenance are Ola Hallengren scripts and SQL Tiger Toolbox.


    Resumability is another important index maintenance strategy. If you cannot avoid
    potentially expensive `REBUILD` action and you don’t have a maintenance period,
    Azure SQL enables you to temporarily pause a rebuild and resume it later. This
    is an excellent choice in the cases where you find out that index maintenance
    affects performance of your application and need to hold off index rebuild, let
    your application finish some job, and then continue with maintenance without losing
    the work that is already done.


    ### Retiring the indexes


    Creating indexes is easy, but the more important question is “are they used or
    are they causing more harm than benefit?” Over-indexing might cause big performance
    issues. Even if you have an ideal set of indexes, your application patterns and
    database workload will change over time, and some of the indexes may need to be
    removed, as not used anymore. Eventually, you would need to retire and drop some
    indexes.


    Experienced database administrators can easily identify the unnecessary indexes
    by looking at system views and query execution plans, or by examining the number
    of logical reads when setting `STATISTICS IO` option. If deep expertise in this
    area is not one of your career goals, you might again rely on the benefits that
    Azure SQL provides. In addition to index creation recommendations, Azure SQL provides
    drop index recommendations. Azure SQL scans usage of your indexes to identify
    unused indexes. It can also identify duplicate indexes that should be dropped.
    You can either take the scripts and drop the indexes or let Azure SQL clean up
    the indexes for you. Azure SQL will not just drop and forget the index. Automatic
    tuning will use the same algorithm that is used for index creation and monitor
    if the drop index operation decreased performance. Azure SQL will re-create the
    dropped index if it detects performance issues.'
