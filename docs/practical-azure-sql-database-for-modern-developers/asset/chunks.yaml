  trans: '## 在 SQL 中引发和捕获异常


    Transact-SQL 中的错误处理与传统编程语言中的异常处理类似。你可以将一组 Transact-SQL 语句包装在 `TRY` 块中，如果发生错误，控制权会传递给后续的
    `CATCH` 块，其他语句将在那里执行。Azure SQL 中的每个错误都与一个给定的严重性级别相关联，`TRY...CATCH` 构造会捕获所有严重性高于
    10 且不会关闭数据库连接的执行错误。如果 `TRY` 块中没有发生错误，控制权会传递到关联的 `END CATCH` 语句之后的语句。在 `CATCH`
    块中，你可以使用多个系统函数来获取导致 `CATCH` 块执行的错误详情：这些函数名都非常直观（`ERROR_NUMBER()`, `ERROR_SEVERITY()`,
    `ERROR_STATE()`, `ERROR_PROCEDURE()`, `ERROR_LINE()`, `ERROR_MESSAGE()`）。如果在 `CATCH`
    块的作用域之外调用它们，它们将返回 `NULL`。


    以下示例展示了一个包含错误处理函数的脚本：


    ```sql

    BEGIN TRANSACTION;

    BEGIN TRY

    -- 生成一个约束违规错误。

    DELETE FROM Production.Product

    WHERE ProductID = 980;

    END TRY

    BEGIN CATCH

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_LINE() AS ErrorLine

    ,ERROR_MESSAGE() AS ErrorMessage;

    IF @@TRANCOUNT > 0

    ROLLBACK TRANSACTION;

    END CATCH;

    IF @@TRANCOUNT > 0

    COMMIT TRANSACTION;

    GO

    ```


    当我们在 `CATCH` 块中捕获错误时，这些错误不会返回给调用应用程序。如果我们想用 `CATCH` 块捕获错误详情，但也想将全部或部分这些详情报告回调用应用程序，我们可以调用
    `RAISERROR` 或 `THROW` 将异常冒泡给调用者，或者简单地通过 `SELECT` 语句返回一个结果集。


    我们可以通过嵌套多个 `TRY...CATCH` 构造来创建复杂的错误管理逻辑。当 `CATCH` 块中发生错误时，它会像其他任何错误一样被处理，因此如果该块包含一个嵌套的
    `TRY...CATCH` 构造，嵌套 `TRY` 块中的任何错误都会将控制权传递给嵌套的 `CATCH` 块。如果没有嵌套的 `TRY...CATCH`
    构造，错误将被传递回调用者。


    如果我们的代码正在调用其他存储过程或触发器，这些外部模块引发的错误可以在它们自己的代码中捕获（如果它们包含 `TRY` 块），也可以由调用代码中的 `TRY...CATCH`
    构造捕获。但是，用户定义函数不能包含 `TRY...CATCH` 构造。


    在处理 T-SQL 代码中的错误时，我们需要牢记一些例外情况：


    *   如果错误的严重性等于或低于 10，则它们不会被我们的 `TRY...CATCH` 块捕获（因为它们不被视为错误，而只是警告）。

    *   一些严重性等于或高于 20 的错误将导致 Azure SQL 停止处理该会话上的其他任务，因此 `TRY...CATCH` 同样无法捕获这些错误。

    *   编译错误，例如阻止批处理运行的语法错误，将不会被我们的 `TRY...CATCH` 块捕获，因为此类错误发生在编译时而非运行时。

    *   语句级重新编译或对象名称解析错误（例如，尝试使用已删除的视图）同样不会被捕获。


    当 `TRY` 块中发生的错误使当前事务的状态无效时，则该事务被分类为不可提交事务。不可提交事务只能执行读操作或 `ROLLBACK TRANSACTION`。我们可以调用
    `XACT_STATE` 函数来验证当前事务是否已被分类为不可提交。如果函数返回 -1，则是这种情况。在批处理结束时，Azure SQL 会回滚不可提交的事务，并向应用程序发送错误消息。


    这是一个结合使用 `TRY…CATCH` 和 `XACT_STATE` 的更复杂示例：


    ```sql

    -- 检查此存储过程是否存在。

    IF OBJECT_ID (N''usp_GetErrorInfo'', N''P'') IS NOT NULL

    DROP PROCEDURE usp_GetErrorInfo;

    GO

    -- 创建存储过程以检索错误信息。

    CREATE PROCEDURE usp_GetErrorInfo

    AS

    SELECT

    ERROR_NUMBER() AS ErrorNumber

    ,ERROR_SEVERITY() AS ErrorSeverity

    ,ERROR_STATE() AS ErrorState

    ,ERROR_LINE () AS ErrorLine

    ,ERROR_PROCEDURE() AS ErrorProcedure

    ,ERROR_MESSAGE() AS ErrorMessage;

    GO

    -- SET XACT_ABORT ON 将在发生约束违规时导致事务不可提交，

    -- 因为它会自动回滚事务

    SET XACT_ABORT ON;

    BEGIN TRY

    BEGIN TRANSACTION;

    -- 此表上存在 FOREIGN KEY 约束。此

    -- 语句将生成约束违规错误。

    DELETE FROM Production.Product

    WHERE ProductID = 980;

    -- 如果 DELETE 语句成功，则提交事务。

    COMMIT TRANSACTION;

    END TRY

    BEGIN CATCH

    -- 执行错误检索例程。

    EXECUTE usp_GetErrorInfo;

    -- 测试 XACT_STATE:

    -- 如果为 1，事务可提交。

    -- 如果为 -1，事务不可提交，应

    --     被回滚。

    -- XACT_STATE = 0 表示没有事务，

    --     提交或回滚操作将产生错误。

    -- 测试事务是否不可提交。

    IF (XACT_STATE()) = -1

    BEGIN

    PRINT

    N''The transaction is in an uncommittable state.'' +

    ''Rolling back transaction.''

    ROLLBACK TRANSACTION;

    END;

    -- 测试事务是否可提交。

    IF (XACT_STATE()) = 1

    BEGIN

    PRINT

    N''The transaction is committable.'' +

    ''Committing transaction.''

    COMMIT TRANSACTION;

    END;

    END CATCH;

    GO

    ```


    正如你所见，Azure SQL 提供了非常完整且强大的异常处理功能，这是任何现代应用程序所必需的，因为管理异常对于提供卓越的用户体验至关重要。


    ### 保持简单！


    请记住，除了 T-SQL，.NET 或 Python（或任何你偏好的语言）代码也具有出色的异常支持，当它们作为团队协同工作时，通常能获得最佳的用户体验。


    考虑到这一点以及保持解决方案尽可能简单的想法，你选择的编程语言与 T-SQL 配合得非常好的一个非常常见的模式就是使用 `XACT_ABORT ON`。


    使用 `XACT_ABORT ON`，事务中的任何内容都必须正确（精确）执行，否则 Azure SQL 将中止事务并终止当前代码执行。


    如果你计划在应用程序中处理失败逻辑，这个命令可以帮助你拥有精简和干净的代码：


    ```sql

    SET XACT_ABORT ON

    BEGIN TRAN

    INSERT INTO Orders VALUES (2,1,getdate());

    UPDATE Inventory SET QuantityInStock=QuantityInStock-1

    WHERE ProductID=1

    COMMIT TRAN

    ```


    由于 `XACT_ABORT` 被设置为 on，在前面的代码中，要么 `INSERT` 和 `UPDATE` 都无错误运行，从而 `COMMIT` 将被执行；要么如果在执行
    `INSERT` 或 `UPDATE` 期间有任何错误，整个事务将自动回滚（即使代码中没有 `ROLLBACK TRAN`）。代码执行也将被中断，引发的错误将被返回给调用者（在我们的示例中是应用程序代码）。


    如你所见，在决定如何处理异常和错误时，你拥有全方位的选项。你可以决定最好在 Azure SQL 内部处理它，也可以将其冒泡到应用程序。在两种情况下，你都掌控全局，因此可以为你的解决方案实施最佳选项。'
- fmt: "## Integration with application insights\n\n作为创建云端解决方案的应用程序开发者，至关重要的一点是要理解：为了排查和调试应用程序中的问题，在大多数情况下，我们不能像在传统本地环境中那样连接到特定的服务器。这对于那些利用平台即服务组件和服务的应用程序尤其如此，在这些场景中，你甚至没有物理或虚拟服务器的概念可供连接。这就是为什么在代码库中规划适当的**instrumentation**以发出远程深入分析应用程序行为所需的所有诊断信息如此重要。自行构建所有这些基础设施可能是一项具有挑战性的任务；这就是为什么在过去几年中，专注于解决instrumentation挑战的多种原生和第三方解决方案变得相当成功。\n\
    \nApplication Insights是Azure Monitor的一项功能，是一个面向开发者和DevOps专业人员的可扩展应用程序性能管理服务，他们可以用它来监控部署在Azure平台上的实时应用程序。它将帮助检测性能异常，并包含强大的分析工具来帮助你诊断问题并了解用户使用应用程序的情况。它旨在帮助你持续改进性能和可用性。它适用于多种平台上的应用程序，包括在本地、混合环境或任何公共云上托管的`.NET`、`Node.js`、`Java`和`Python`。它与你的DevOps流程集成，并连接到各种开发工具和服务。\n\
    \n你可以在应用程序中安装一个小的instrumentation包（作为SDK提供），或者在支持的情况下（如Azure虚拟机）使用`Application\
    \ Insights Agent`来启用Application Insights。instrumentation监控你的应用程序，并将遥测数据通过一个我们称为Instrumentation\
    \ Key的唯一GUID导向Azure Application Insights资源。你不仅可以instrument一个Web服务应用程序或一个虚拟机，还可以instrument任何后台组件以及网页本身的JavaScript。应用程序及其组件可以在任何地方运行——它不一定必须托管在Azure中。\n\
    \n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figq_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figq_HTML.jpg)\n\
    \nApplication Insights将让你了解有关应用程序组件性能的各种洞察，例如*request rates*、*response times*和*failure\
    \ rates*。它还会捕获依赖项以及与Azure服务（如Azure SQL）的交互，外加一堆其他附加功能。然后，你可以基于收集的数据创建实时仪表板，用于常规的生产级监控，也可以深入钻研发生的具体问题或异常，或者将诊断数据导出到其他服务。\n\
    \n从你的应用程序中，一旦你从门户中获取了Application Insights实例的Instrumentation Key，你只需根据你的编程语言和框架将正确的SDK版本添加到你的项目中，并添加一些配置信息。让我们看一个使用Java\
    \ Spring Boot的例子；我们需要先为SDK添加一个Maven依赖项：\n\n```\ncom.microsoft.azure\napplicationinsights-spring-boot-starter\n\
    2.5.1\n```\n\n下一步是通过传递Instrumentation Key来配置应用程序属性：\n\n```\n# Specify the instrumentation\
    \ key of your Application Insights resource.\nazure.application-insights.instrumentation-key=974d297f-aaaa-aaaa-bbbb-4abcdabcd050\n\
    # Specify the name of your spring boot application. This can be any logical name\
    \ you would like to give to your app.\nspring.application.name=SpringBootInAzureDemo\n\
    ```\n\n然后，我们可以使用合适的类，如`TelemetryClient`来持续跟踪指标，例如Azure SQL调用的响应时间，如下面这个简单示例所示：\n\
    \n```\n@RestController\n@RequestMapping(\"/\")\npublic class Controller {\n  \
    \  @Autowired\n    UserRepo userRepo;\n    @Autowired\n    TelemetryClient telemetryClient;\n\
    \    @GetMapping(\"/greetings\")\n    public String greetings() {\n        //\
    \ send event\n        telemetryClient.trackEvent(\"URI /greeting is triggered\"\
    );\n        return \"Hello World!\";\n    }\n    @GetMapping(\"/users\")\n   \
    \ public List users() {\n        try {\n            List users;\n            //\
    \ measure DB query benchmark\n            long startTime = System.nanoTime();\n\
    \            users = userRepo.findAll();\n            long endTime = System.nanoTime();\n\
    \            MetricTelemetry benchmark = new MetricTelemetry();\n            benchmark.setName(\"\
    DB query\");\n            benchmark.setValue(endTime - startTime);\n         \
    \   telemetryClient.trackMetric(benchmark);\n            return users;\n     \
    \   } catch (Exception e) {\n            // send exception information\n     \
    \       telemetryClient.trackEvent(\"Error\");\n            telemetryClient.trackTrace(\"\
    Exception: \" + e.getMessage());\n            throw new ResponseStatusException(HttpStatus.INTERNAL_SERVER_ERROR,\
    \ e.getMessage());\n        }\n    }\n}\n```\n\n然后，你就可以开始通过各种监控页面和可以创建的自定义仪表板，在你的Application\
    \ Insights实例中看到这些指标。下图显示了Application Map，你可以看到你的应用程序以及它如何与其他服务（如SQL）交互，并显示调用次数和响应时间：\n\
    \n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figr_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figr_HTML.jpg)\n\
    \n### .NET/.NET Core Integration\n\n对于`.NET/.NET Core`，Application Insights SDK和Azure\
    \ SQL客户端库（如`Microsoft.Data.SqlClient`）之间还有更深入的集成。你可以通过初始化`Microsoft.ApplicationInsights.DependencyCollector`\
    \ Nuget包中的这个类，来自动跟踪应用程序与其他服务之间的依赖关系：\n\n```\nDependencyTrackingTelemetryModule\
    \ depModule = new DependencyTrackingTelemetryModule();\ndepModule.Initialize(TelemetryConfiguration.Active);\n\
    ```\n\n然后，你可以通过只需在服务级别启用遥测，来配置你的ASP.NET应用程序以跟踪数据库交互，直至执行的SQL命令：\n\n```\nservices.ConfigureTelemetryModule((module,\
    \ o) => { module. EnableSqlCommandTextInstrumentation = true; });\n```\n\n你还必须在*applicationInsights.config*配置文件中显式选择启用SQL命令收集：\n\
    \n```\n<Add Type=\"Microsoft.ApplicationInsights.DependencyCollector.DependencyTrackingTelemetryModule,\
    \ Microsoft.AI.DependencyCollector\">\n  <Add Name=\"EnableSqlCommandTextInstrumentation\"\
    \ Value=\"true\" />\n</Add>\n```\n\n由于此配置，你将能够调查应用程序代码调用的外部服务的性能，并看到以“SQL:”为前缀的数据库调用和响应时间，如本截图所示：\n\
    \n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figs_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figs_HTML.jpg)\n\
    \n深入研究单个样本，你将能够看到该请求的端到端事务流，并看到Azure SQL数据库调用的贡献，包括T-SQL查询的文本：\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figt_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figt_HTML.jpg)\n\
    \n这是一个非常完整且有用的工具，将在开发和生产阶段协助你进行监控、调试和故障排除。\n\n你可以在官方的Application Insights文档中获取我们在此讨论的所有细节以及更多信息：[`https://aka.ms/amaio`](https://aka.ms/amaio)。"
  raw: '## Integration with application insights


    As application developers creating cloud-based solutions, it is quite critical
    to understand that to troubleshoot and debug our apps’ issues, in most cases we
    cannot just connect to a specific server as we would have done in a traditional
    on-premises context. This is especially true for applications leveraging Platform
    as a Service components and services where you do not even have the notion of
    a physical or virtual server to connect. That is why it is so important to consider
    proper *instrumentation* within our codebase to emit all the diagnostic information
    required to remotely drill down into our application behaviors. Building all this
    infrastructure ourselves can be a challenging task; that’s why several native
    and third-party solutions that solely focus on solving the instrumentation challenge
    became quite successful over the last years.


    Application Insights, a feature of Azure Monitor, is an extensible Application
    Performance Management (APM) service for developers and DevOps professionals who
    can use it to monitor their live applications deployed on the Azure platform.
    It will help detect performance anomalies and includes powerful analytics tools
    to help you diagnose issues and to understand what users do with your app. It
    is designed to help you continuously improve performance and usability. It works
    for apps on a wide variety of platforms including .NET, Node.js, Java, and Python
    hosted on-premises, hybrid, or any public cloud. It integrates with your DevOps
    process and has connection points to a variety of development tools and services.


    You can install a small instrumentation package (available as an SDK) in your
    application or enable Application Insights using the Application Insights Agent
    when supported like in Azure Virtual Machines. The instrumentation monitors your
    app and directs the telemetry data to an Azure Application Insights Resource using
    a unique GUID that we refer to as an Instrumentation Key. You can instrument not
    only a web service application or a VM but also any background components and
    the JavaScript in the web pages themselves. The application and its components
    can run anywhere – it does not necessarily have to be hosted in Azure.


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figq_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figq_HTML.jpg)


    Application Insights will let you understand all sorts of insights related to
    how the components of your application are performing, things like *request rates*,
    *response times*, and *failure rates*. It also captures dependencies and interactions
    with Azure services like Azure SQL, plus a bunch of other bonuses. You can then
    create live dashboards on top of collected data to be used as part of regular
    production-level monitoring, but also drill down into specific issues or exceptions
    happening or export diagnostic data to other services.


    From your application, once you have obtained your Instrumentation Key from the
    portal for your Application Insights instance, you just have to add to your project
    the proper SDK version depending on your programming language and framework and
    add a few configuration information. Let us see an example using Java Spring Boot;
    we need to start by adding a Maven dependency for the SDK:


    ```

    com.microsoft.azure

    applicationinsights-spring-boot-starter

    2.5.1


    ```


    The next step is configuring the application properties passing the Instrumentation
    Key:


    ```

    # Specify the instrumentation key of your Application Insights resource.

    azure.application-insights.instrumentation-key=974d297f-aaaa-aaaa-bbbb-4abcdabcd050

    # Specify the name of your spring boot application. This can be any logical name
    you would like to give to your app.

    spring.application.name=SpringBootInAzureDemo

    ```


    Then we can use proper classes like `TelemetryClient` to keep tracking metrics
    like Azure SQL call response times, as shown in this simple example:


    ```

    @RestController

    @RequestMapping("/")

    public class Controller {

    @Autowired

    UserRepo userRepo;

    @Autowired

    TelemetryClient telemetryClient;

    @GetMapping("/greetings")

    public String greetings() {

    // send event

    telemetryClient.trackEvent("URI /greeting is triggered");

    return "Hello World!";

    }

    @GetMapping("/users")

    public List users() {

    try {

    List users;

    // measure DB query benchmark

    long startTime = System.nanoTime();

    users = userRepo.findAll();

    long endTime = System.nanoTime();

    MetricTelemetry benchmark = new MetricTelemetry();

    benchmark.setName("DB query");

    benchmark.setValue(endTime - startTime);

    telemetryClient.trackMetric(benchmark);

    return users;

    } catch (Exception e) {

    // send exception information

    telemetryClient.trackEvent("Error");

    telemetryClient.trackTrace("Exception: " + e.getMessage());

    throw new ResponseStatusException(HttpStatus.INTERNAL_SERVER_ERROR, e.getMessage());

    }

    }

    }

    ```


    You can then start seeing these metrics exposed in your Application Insight instance
    through various monitoring pages and custom dashboards you can create. The following
    picture is showing the Application Map, where you can see your application and
    how it interacts with other services like SQL reporting number of calls and response
    times:


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figr_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figr_HTML.jpg)


    For .NET/.NET Core, we also have deeper integration between Application Insights
    SDK and Azure SQL client libraries like `Microsoft.Data.SqlClient` . You can automatically
    track dependencies between your application and other services by initializing
    this class that you’ll find in the `Microsoft.ApplicationInsights.DependencyCollector`
    Nuget package:


    ```

    DependencyTrackingTelemetryModule depModule = new DependencyTrackingTelemetryModule();

    depModule.Initialize(TelemetryConfiguration.Active);

    ```


    Then, you can configure your ASP.NET applications to track database interactions
    down to the SQL commands executed by just enabling telemetry at the service level:


    ```

    services.ConfigureTelemetryModule((module, o) => { module. EnableSqlCommandTextInstrumentation
    = true; });

    ```


    You also have to explicitly opt in to SQL command collection in the *applicationInsights.config*
    config file:


    ```

    true


    ```


    As a result of this configuration, you will be able to investigate performance
    of external services called by your application code and see database calls and
    response times prefixed by “SQL:” as in this screenshot:


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figs_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figs_HTML.jpg)


    Drilling down into individual samples, you will be able to see the end-to-end
    transaction flow for that request and see the contribution of the Azure SQL database
    call including the text of the T-SQL query:


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figt_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figt_HTML.jpg)


    This is a very complete and useful tool that will assist you on both development
    and production phases for monitoring, debugging, and troubleshooting purposes.


    You can get all details of what we discussed here and much more on the official
    Application Insights documentation here: [`https://aka.ms/amaio`](https://aka.ms/amaio).'
  trans: "\n## 与 Application Insights 集成\n\n作为构建云端解决方案的应用程序开发者，理解这一点至关重要：为了对应用程序进行故障排查和调试，在大多数情况下，我们无法像在传统本地环境中那样连接到特定的服务器。这对于那些利用平台即服务组件和服务的应用程序来说尤其如此，因为在这种场景下，你甚至没有可供连接的物理或虚拟服务器的概念。这就是为什么在代码库中规划好适当的**检测插桩**以发出远程深入分析应用程序行为所需的所有诊断信息如此重要。自行构建所有这些基础设施可能是一项具有挑战性的任务；这就是为什么在过去的几年里，专注于解决检测插桩挑战的多种原生和第三方解决方案变得相当成功。\n\
    \nApplication Insights 是 Azure Monitor 的一项功能，是一个面向开发者和 DevOps 专业人员的可扩展应用程序性能管理服务，他们可以用它来监控部署在\
    \ Azure 平台上的实时应用程序。它将帮助检测性能异常，并包含强大的分析工具来帮助你诊断问题并了解用户如何使用应用程序。它旨在帮助你持续改进性能和可用性。它适用于多种平台上的应用程序，包括在本地、混合环境或任何公共云上托管的\
    \ `.NET`、`Node.js`、`Java` 和 `Python`。它与你的 DevOps 流程集成，并连接到各种开发工具和服务。\n\n你可以在应用程序中安装一个轻量的检测插桩包（作为\
    \ SDK 提供），或者在支持的情况下（如 Azure 虚拟机）使用 `Application Insights Agent` 来启用 Application\
    \ Insights。该检测插桩会监控你的应用程序，并通过一个我们称为 Instrumentation Key 的唯一 GUID，将遥测数据导向 Azure\
    \ Application Insights 资源。你不仅可以对 Web 服务应用程序或虚拟机进行插桩，还可以对任何后台组件以及网页本身的 JavaScript\
    \ 进行插桩。应用程序及其组件可以在任何地方运行——它不一定必须托管在 Azure 中。\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figq_HTML.jpg](img/493913_1_En_10_Figq_HTML.jpg)\n\
    \nApplication Insights 将让你了解应用程序组件性能的各种洞察，例如*请求速率*、*响应时间*和*失败率*。它还会捕获依赖项以及与 Azure\
    \ 服务（如 Azure SQL）的交互，外加一堆其他附加功能。然后，你可以基于收集的数据创建实时仪表板，用于常规的生产级监控，也可以深入钻研发生的具体问题或异常，或者将诊断数据导出到其他服务。\n\
    \n从你的应用程序中，一旦你从门户中获取了 Application Insights 实例的 Instrumentation Key，你只需根据你的编程语言和框架将正确的\
    \ SDK 版本添加到你的项目中，并添加一些配置信息。让我们看一个使用 Java Spring Boot 的例子；我们需要先为 SDK 添加一个 Maven\
    \ 依赖项：\n\n```\ncom.microsoft.azure\napplicationinsights-spring-boot-starter\n\
    2.5.1\n```\n\n下一步是通过传递 Instrumentation Key 来配置应用程序属性：\n\n```\n# 指定你的 Application\
    \ Insights 资源的检测插桩键。\nazure.application-insights.instrumentation-key=974d297f-aaaa-aaaa-bbbb-4abcdabcd050\n\
    # 指定你的 Spring Boot 应用程序名称。这可以是你希望给你的应用程序取的任何逻辑名称。\nspring.application.name=SpringBootInAzureDemo\n\
    ```\n\n然后，我们可以使用合适的类，如 `TelemetryClient` 来持续跟踪指标，例如 Azure SQL 调用的响应时间，如下面这个简单示例所示：\n\
    \n```\n@RestController\n@RequestMapping(\"/\")\npublic class Controller {\n  \
    \  @Autowired\n    UserRepo userRepo;\n    @Autowired\n    TelemetryClient telemetryClient;\n\
    \    @GetMapping(\"/greetings\")\n    public String greetings() {\n        //\
    \ 发送事件\n        telemetryClient.trackEvent(\"URI /greeting is triggered\");\n\
    \        return \"Hello World!\";\n    }\n    @GetMapping(\"/users\")\n    public\
    \ List users() {\n        try {\n            List users;\n            // 测量数据库查询基准\n\
    \            long startTime = System.nanoTime();\n            users = userRepo.findAll();\n\
    \            long endTime = System.nanoTime();\n            MetricTelemetry benchmark\
    \ = new MetricTelemetry();\n            benchmark.setName(\"DB query\");\n   \
    \         benchmark.setValue(endTime - startTime);\n            telemetryClient.trackMetric(benchmark);\n\
    \            return users;\n        } catch (Exception e) {\n            // 发送异常信息\n\
    \            telemetryClient.trackEvent(\"Error\");\n            telemetryClient.trackTrace(\"\
    Exception: \" + e.getMessage());\n            throw new ResponseStatusException(HttpStatus.INTERNAL_SERVER_ERROR,\
    \ e.getMessage());\n        }\n    }\n}\n```\n\n然后，你就可以开始通过各种监控页面和可以创建的自定义仪表板，在你的\
    \ Application Insights 实例中看到这些指标。下图显示了应用程序地图，你可以看到你的应用程序以及它如何与其他服务（如 SQL）交互，并显示调用次数和响应时间：\n\
    \n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figr_HTML.jpg](img/493913_1_En_10_Figr_HTML.jpg)\n\
    \n### .NET/.NET Core 集成\n\n对于 `.NET/.NET Core`，Application Insights SDK 和 Azure\
    \ SQL 客户端库（如 `Microsoft.Data.SqlClient`）之间还有更深入的集成。你可以通过初始化 `Microsoft.ApplicationInsights.DependencyCollector`\
    \ Nuget 包中的这个类，来自动跟踪应用程序与其他服务之间的依赖关系：\n\n```\nDependencyTrackingTelemetryModule\
    \ depModule = new DependencyTrackingTelemetryModule();\ndepModule.Initialize(TelemetryConfiguration.Active);\n\
    ```\n\n然后，你可以通过只需在服务级别启用遥测，来配置你的 ASP.NET 应用程序以跟踪数据库交互，直至执行的 SQL 命令：\n\n```\nservices.ConfigureTelemetryModule((module,\
    \ o) => { module. EnableSqlCommandTextInstrumentation = true; });\n```\n\n你还必须在\
    \ *applicationInsights.config* 配置文件中显式选择启用 SQL 命令收集：\n\n```\n<Add Type=\"Microsoft.ApplicationInsights.DependencyCollector.DependencyTrackingTelemetryModule,\
    \ Microsoft.AI.DependencyCollector\">\n  <Add Name=\"EnableSqlCommandTextInstrumentation\"\
    \ Value=\"true\" />\n</Add>\n```\n\n由于此配置，你将能够调查应用程序代码调用的外部服务的性能，并看到以“SQL:”为前缀的数据库调用和响应时间，如本截图所示：\n\
    \n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figs_HTML.jpg](img/493913_1_En_10_Figs_HTML.jpg)\n\
    \n深入研究单个样本，你将能够看到该请求的端到端事务流，并看到 Azure SQL 数据库调用的贡献，包括 T-SQL 查询的文本：\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figt_HTML.jpg](img/493913_1_En_10_Figt_HTML.jpg)\n\
    \n这是一个非常完整且有用的工具，将在开发和生产阶段协助你进行监控、调试和故障排除。\n\n你可以在官方的 Application Insights 文档中获取我们在此讨论的所有细节以及更多信息：[`https://aka.ms/amaio`](https://aka.ms/amaio)。\n"
- fmt: '## If you want to know more


    Monitoring an application is a critical step and, just like debugging, many times
    overlooked. Their value became apparent when you have some issues to solve, and
    at that time, the more data you have, the better. Generally, the more your system
    is *transparent*, the better, as you can see through its layers down to where
    the problem is. Azure SQL is by far one of the most transparent databases available.
    DMVs provide an impressive amount of details up to the single execution thread
    if needed. This is a great value, as it is your insurance that if something doesn’t
    go as expected, you or the customer support service (CSS) from Microsoft can have
    all the information needed to find and fix the problem. This is an incredible
    value that Azure SQL provides to developers natively and with a great integration
    with end-to-end instrumentation tools like Application Insights. A dream for a
    developer! And if you want to know more, as usual, here’s a list of interesting
    resources:


    *   Query Store for SQL Server 2019: Identify and Fix Poorly Performing Queries
    – [`www.amazon.com/Query-Store-SQL-Server-2019/dp/1484250036`](http://www.amazon.com/Query-Store-SQL-Server-2019/dp/1484250036)

    *   Expert Performance Indexing in SQL Server 2019: Toward Faster Results and
    Lower Maintenance – [`www.amazon.com/Expert-Performance-Indexing-Server-2019/dp/1484254635`](http://www.amazon.com/Expert-Performance-Indexing-Server-2019/dp/1484254635)

    *   Pro SQL Server 2019 Wait Statistics: A Practical Guide to Analyzing Performance
    in SQL Server – [`www.amazon.com/Pro-Server-2019-Wait-Statistics/dp/1484249151`](http://www.amazon.com/Pro-Server-2019-Wait-Statistics/dp/1484249151)

    *   SQL Server 2017 Query Performance Tuning: Troubleshoot and Optimize Query
    Performance – [`www.amazon.com/Server-2017-Query-Performance-Tuning-ebook/dp/B07H49LN75`](http://www.amazon.com/Server-2017-Query-Performance-Tuning-ebook/dp/B07H49LN75)


    Here are some resources to dig deep into Azure SQL DMVs:


    *   Glenn Berry’s DMVs – [`https://glennsqlperformance.com/resources/`](https://glennsqlperformance.com/resources/)

    *   `sp_WhoIsActive` – [`http://whoisactive.com/`](http://whoisactive.com/)

    *   `sp_Blitz` – [`www.brentozar.com/blitz/`](http://www.brentozar.com/blitz/)

    *   Tiger toolbox – [`https://github.com/Microsoft/tigertoolbox`](https://github.com/Microsoft/tigertoolbox)


    # 11. DevOps with Azure SQL


    DevOps is a discipline that brings together people, processes, and products to
    enable continuous delivery of value to end users. It does so by helping to bridge
    the gap between development, operations, and management. From a developer standpoint,
    probably the most important aspect of the DevOps discipline is the focus on having
    a healthy CI/CD pipeline. *Continuous Integration* (CI) and *Continuous Deployment*
    (CD) are two processes that help to support development agility while assuring
    product quality and stability.


    ## CI/CD: Definitions and concepts


    Continuous Integration means that you continuously push and merge the changes
    you have done to the codebase of the solution you’re working on, so that they
    can be integrated with changes made by other developers in your team, tested,
    and verified. Automation tools to build and test the solution are part of this
    process to make it seamless and as automated as possible. The goal is to have
    a codebase that is healthy and tested and that could be released in production
    almost anytime.


    Continuous Deployment is a process that deals instead with the deployment of new
    code into production, helping to make a very delicate and critical process more
    automated, repeatable, and less error-prone. The goal here is the same as the
    previous one but approached from a different perspective: the deployment process.
    Even if you have perfectly working code in your repository, deploying it in production
    is a non-trivial task. Continuous Deployment helps to make sure an organization
    is able to deploy in production the latest available, tested, working code at
    any time.


    As you may have already figured out, DevOps and CI/CD, along with Agile principles,
    are a cornerstone for modern development. In fact, for a modern developer, adopting
    the DevOps discipline right from the start is without a doubt a best practice
    and, nowadays, a consolidated behavior.


    ## CI/CD and Azure SQL


    Applying the DevOps discipline to a database is for sure more challenging, as
    the database is only partially code: the biggest part of a database is, in fact,
    data. What does it mean to test a database? And how do you deal with data? How
    to continuously deploy and evolve the database without damaging existing data
    integrity and performances? There aren’t any clear and globally accepted answers
    here. The DevOps discipline is relatively young (first formal mention was in 2009!),
    and its application to the data space is even younger, so there is still a lot
    to learn before being able to define a globally accepted set of best practices.
    What is clear, is that it needs to be done. Luckily for us, there are several
    tools that can help in the process. In this chapter, we’ll discuss two of these
    tools: `GitHub Actions` and `Azure DevOps` and how they can be used in the context
    of Azure SQL. They both have a graphical UI but also support code-based (via `YAML`)
    configuration and definition for maximum flexibility. Once we know what the two
    tools can do for us and how they allow the creation of a CI/CD pipeline, we will
    go more in details of specific principles and solutions to deal with the added
    database and data complexity.


    We’ll assume that you are already familiar with the concept of Source Code Control
    Management and `git`. If not, you can start learning this fundamental development
    skill using the free `git` eBook `Pro Git` at [`https://aka.ms/gitbookv2`](https://aka.ms/gitbookv2).


    ### GitHub Actions


    `GitHub` is the most popular and highly-used code repository. It provides a wide
    range of features for free, and one called `GitHub Actions` has been recently
    released, and it has been specifically designed to help in DevOps. More specifically,
    it allows you to implement a CI/CD pipeline right from your repository. `GitHub
    Actions` allow the creation of a custom software development life cycle via the
    usage of a series of small tasks, called `actions`. `actions` can be combined
    and orchestrated via a custom defined workflow to cover all the aspects of building,
    testing, and deploying your solution.


    Aside from native `actions`, provided by `GitHub`, there is a `Marketplace` where
    `actions` built by the `GitHub` community can be published and used by anyone
    to support the most diverse needs. Microsoft released a free Azure SQL–specific
    `action` that allows a developer to deploy updates to a target Azure SQL database
    as part of the automation workflow.


    ![../images/493913_1_En_11_Chapter/493913_1_En_11_Figa_HTML.jpg](images/493913_1_En_11_Chapter/493913_1_En_11_Figa_HTML.jpg)


    *`GitHub Actions Marketplace`*


    The `GitHub` `actions` `marketplace` is available at this link: [`https://aka.ms/ghmas`](https://aka.ms/ghmas).


    Thanks to the Azure SQL deploy `action`, you can create a `workflow` that, after
    someone has pushed its code to the repository, will deploy the script to a target
    Azure SQL database, run any test you may have configured using your preferred
    testing framework, and notify you about the results.'
