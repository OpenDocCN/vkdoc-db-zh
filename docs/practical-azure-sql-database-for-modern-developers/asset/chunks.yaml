    *   `快速查找唯一值` – [`https://sqlperformance.com/2020/03/sql-performance/finding-distinct-values-quickly`](https://sqlperformance.com/2020/03/sql-performance/finding-distinct-values-quickly)

    *   `类规范化` – [`www.agiledata.org/essays/classNormalization.html`](http://www.agiledata.org/essays/classNormalization.html)

    *   `规范化数据模型` – [`https://docs.mongodb.com/manual/core/data-model-design/#normalized-data-models`](https://docs.mongodb.com/manual/core/data-model-design/#normalized-data-models)

    *   `T-SQL 基础知识` – [`www.amazon.com/T-SQL-Fundamentals-3rd-Itzik-Ben-Gan-dp-150930200X/dp/150930200X`](http://www.amazon.com/T-SQL-Fundamentals-3rd-Itzik-Ben-Gan-dp-150930200X/dp/150930200X)

    *   `T-SQL 查询开发人员参考` – [`www.amazon.com/T-SQL-Querying-Developer-Reference-Ben-Gan-dp-0735685045/dp/0735685045/`](http://www.amazon.com/T-SQL-Querying-Developer-Reference-Ben-Gan-dp-0735685045/dp/0735685045/)

    *   `窗口函数开发人员参考` – [`www.amazon.com/T-SQL-Window-Functions-Developer-Reference/dp/0135861446`](http://www.amazon.com/T-SQL-Window-Functions-Developer-Reference/dp/0135861446)

    *   `数据库系统导论` – [`www.amazon.com/Introduction-Database-Systems-8th/dp/0321197844`](http://www.amazon.com/Introduction-Database-Systems-8th/dp/0321197844)

    *   `SQL Server 关系数据库设计与实现专业指南` – [`www.amazon.com/Server-Relational-Database-Design-Implementation-ebook/dp/B01MR14K06`](http://www.amazon.com/Server-Relational-Database-Design-Implementation-ebook/dp/B01MR14K06)

    *   `数据库管理实践问题：面向思考型从业者的参考书` – [`www.amazon.com/Practical-Issues-Database-Management-Practitioner/dp/0201485559`](http://www.amazon.com/Practical-Issues-Database-Management-Practitioner/dp/0201485559)

    *   `数据库设计与关系理论：范式及其他` – [`www.amazon.com/Database-Design-Relational-Theory-Normal-ebook/dp/B082X1B6WP`](http://www.amazon.com/Database-Design-Relational-Theory-Normal-ebook/dp/B082X1B6WP)


    # 5. 使用 Azure SQL 进行开发 – 高级篇


    在讨论了查询和操作数据的基础方面之后，现在是时候关注 Azure SQL 中更高级和以开发为中心的功能了。如果你已经瞥过本章内容，可能会惊讶地发现有一个关于安全性的完整章节。不必惊讶。安全性不是像事后想法那样可以在后期添加的东西，不是那种“有也不错但非核心”的功能。相反，安全*性*与性能和可维护性同等重要，必须从一开始就被纳入考量。因此，Azure
    SQL 为你提供的保障数据安全的选项，对于任何想要创建现代应用程序的人来说都是必须了解的——之所以称为现代，不仅是因为它可扩展和模块化，更是因为它也是安全的。


    ## 可编程性


    作为一名开发人员，你已经知道能够重用和封装现有代码是多么重要。Azure SQL 提供了广泛的选项，你可以使用这些选项来确保你的 SQL 代码干净、清晰、易于维护且可重用。

    '
- fmt: '## Variables


    There are two types of variables in T-SQL: Scalar and Table. A scalar variable
    is just a normal variable as the one you are used to work with in other programming
    languages. Variables must be explicitly declared, have a name that starts with
    the character “@”, and must be typed:


    ```sql

    DECLARE @i INT = 42;

    DECLARE @name NVARCHAR(50) = N''John'';

    SELECT @i AS FamousNumber, @name AS CommonName;

    ```


    T-SQL doesn’t support arrays, lists, or dictionaries, but if you need to store
    more than one value in a variable, you can use a Table Variable:


    ```sql

    DECLARE @t AS TABLE (

    [Id] INT NOT NULL,

    [Name] NVARCHAR(50) NOT NULL

    );

    INSERT INTO @t VALUES (42, N''John'');

    SELECT * FROM @t;

    ```


    One behavior that may surprise at the beginning, and that is quite different from
    variables in other programming languages, is how Azure SQL manages the variable’s
    scope. A variable is scoped to a `batch` or to an object. In the case of an object,
    understanding the scoping is easy, as T-SQL behaves exactly like any other programming
    language. A variable defined within a `Stored Procedure`, `Trigger`, or `Function`
    will be scoped to that object only.


    Variables defined outside an object, instead, are scoped to the `batch`. A `batch`
    is a group of T-SQL statements executed together. In the preceding code sample,
    you must execute all three statements (`DECLARE`, `INSERT`, and `SELECT`) all
    together; otherwise, the code would not work. If you try to execute the `DECLARE`
    statement alone, that will work, but once done, the variable will be gone. If
    you would try to execute the `INSERT` statement, then you’ll get an error telling
    you that the variable `@t` is not defined.


    Table Variables are generally used in very niche places as they may have a quite
    heavy impact on performances, and usually they should not contain too many rows.
    Be aware that this has nothing to do with memory consumption or anything related
    to that: the issue is that Table Variables are something in between two worlds
    – Variables and Tables – and for this reason, the Azure SQL engine cannot optimize
    access to their data as much as it would with regular table instead. If you want
    to learn more details about this, look at the end of this chapter so that you
    can learn more. In general, if you need to have a temporary place where to store
    some of your data, use Temporary Tables instead.


    ## Temporary Tables


    Especially if creating analytical solutions, it could happen (even pretty frequently)
    that you need to temporarily store processed data somewhere, so that you can work
    on it at a later time. Sometimes it is also helpful to split a very complex query
    in several smaller queries, and you’ll need a place to store the result of a query
    so that it can be picked up from another one for further processing.


    Temporary Tables will help you exactly in those cases. You can create a temporary
    table using the regular `CREATE TABLE` command. As long as the table name starts
    with the hash character (`#`), that table will be temporary:


    ```sql

    CREATE TABLE #t

    (

    [Id] INT NOT NULL,

    [Name] NVARCHAR(50) NOT NULL

    );

    ```


    Temporary means that it will exist until manually destroyed with the `DROP` command
    or until it goes out of scope. For a `Stored Procedure` or a `Trigger`, the scope
    is the lifetime of the `Stored Procedure` or `Trigger` that created the temporary
    table. Once the `Stored Procedure` or `Trigger` has finished executing, the temporary
    table will be destroyed.


    A quick way to `create and fill` a temporary table with the result of a query
    is the `SELECT INTO` statement:


    ```sql

    SELECT

    [OrderLineID],

    [Description],

    [Quantity]

    INTO

    #Order37

    FROM

    [Sales].[OrderLines]

    WHERE

    [OrderID] = 37;

    ```


    A Temporary Table named `#Order37` will be created, automatically inferring the
    column names and types, and it will be filled with all the rows from the table
    `[Sales].[OrderLines]` related to the specified order.


    Temporary Tables benefit from special optimizations that Azure SQL can do, as
    it knows such tables are ephemeral by definition. If you need to park your temporary
    data somewhere, make sure you use them in place of regular tables.'
