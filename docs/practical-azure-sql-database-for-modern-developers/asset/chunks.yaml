    \ wait=wait_fixed(10), after=after_log(logger, logging.DEBUG))\ndef getorders():\n\
    \    cnxn = pyodbc.connect(\"DRIVER={ODBC Driver 17 \" \\\n        \"for SQL Server};\"\
