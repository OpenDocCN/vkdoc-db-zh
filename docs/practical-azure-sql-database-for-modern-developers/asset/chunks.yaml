    *This book was written during one of the most difficult times faced by our generation
    – the COVID-19 epidemic that took lives of thousands of people across the world
    and impacted many other lives in several different ways; and the events leading
    to the #Whatmatters2020 movement.*


    *What we need more is kindness and compassion toward different ideas, different
    points of view, and different experiences as in those lies the road to progress.*


    *This book is dedicated to the spirit of kindness and compassion in every living
    being, which we need in abundance to get through these difficult times.*


    ## Foreword by Rohan Kumar


    Today’s business environments are evolving rapidly. Keeping up with the speed
    of change requires companies to undergo a digital transformation that includes
    a plan to update their applications. Some organizations choose to update their
    legacy software and business processes as cloud solutions. Others choose hybrid
    approaches that combine the benefits of on-premise and cloud capabilities. All
    the while, cloud-native solutions proliferate. IDC predicts the creation of over
    500 million new applications in the next five years.¹


    This trend creates enormous opportunity – and some significant challenges – for
    today’s development community. Developers want to bring their solutions to market
    as quickly as possible and differentiate themselves from other software vendors.
    To accommodate customers’ growing needs, developers need a proven back-end database
    solution that eases the coding process.


    We like to describe the Azure SQL Database as an “all-inclusive” database. By
    saying that, we mean that the platform offers the components and capabilities
    needed to streamline and accelerate application development. Application vendors
    need essential features like an excellent database engine, highly responsive performance,
    exceptional scalability, and high security. They also need a solution that embraces
    modern application constructs like Geospatial, Graph, and JSON, expressed in their
    familiar T-SQL language. The platform must support multiple deployment options
    too. Developers need the freedom to design their applications to run in an elastic
    pool, a hyperscale scenario, as managed instances, or in a serverless environment.
    Benefits like these have encouraged thousands of developers to choose the Azure
    SQL Database as their preferred solution.


    We want to extend our heartfelt thanks to so many people in the SQL community
    who shared their feedback over the years and helped us make Azure SQL all it is
    today. Here at Microsoft, our team remains focused on advancing the Azure SQL
    Database to offer even more value for developers. Thank you for giving us an opportunity
    to support your efforts and innovations!


    > **—Rohan Kumar**

    >

    > **Corporate Vice President, Azure Data at Microsoft**


    ## Foreword by Mark Souza


    Today, embracing digital transformation and cloud computing is key to customer
    success. There is a critical need for organizations and technologies to evolve
    to meet new business requirements (and shifting priorities in response to the
    current COVID crisis) and new data ecosystems. Azure SQL Database has been a central
    technology in this evolution, and modern developers need to keep suit. If you’re
    an experienced database software engineer or a modern developer looking to upskill
    your knowledge and technical intensity in this space, this book is for you.


    With over 30 years’ experience in the tech industry focused on customers and digital
    transformation, I’m thrilled to see this work come to fruition. With the benefit
    of hindsight, it’s not surprising that there has been tremendous evolution and
    growth in the database space over the last 25–30 years.


    I joined Microsoft in July 1993 to help build a Microsoft database business. Microsoft
    SQL Server on Windows Server (then called Windows NT 3.1) had just released. At
    that time, we had only 17 Microsoft SQL Server software engineers. Today there
    are more than 2300. In 2000, I moved into the product group to establish one of
    the first highly technical, customer-facing teams within engineering at Microsoft,
    called SQLCAT – SQL Customer Advisory Team. The team was super technical and interacted
    directly with our top customers around the world. Our engineers listened and learned
    from these customers. They then took these learnings and drove customer feedback,
    feature suggestions, and bug reports into important product improvements and created
    best-practice guidance and made it available to all customers, large and small.
    In 2011, the SQLCAT team became AzureCAT and focused on helping our customers
    accelerate their journey to the cloud.


    Microsoft SQL Server evolved significantly over the past 25+ years. We saw the
    creation of new enhancements and capabilities to the SQL platform such as Graph,
    Geospatial, JSON, columnstore compression, memory-optimized tables, temporal tables,
    and more. Its most significant evolution came as Microsoft evolved on-premise
    computing and storage services to the cloud, when SQL Server became the foundation
    for the cloud-based Azure SQL offerings like Azure SQL DB, SQL MI, and much, much
    more. The developer experience for SQL Server has really evolved and today supports
    all of the popular languages: Python, Node.js, Go, Ruby, PHP, Java, Native C/C++,
    and of course .NET languages C#, F#, and so on.


    This book also caters heavily to the new generation of data analytics developers,
    especially if you are focused on your own digital transformation journey.


    ---

    ¹ See [https://www.idc.com](https://www.idc.com)'
