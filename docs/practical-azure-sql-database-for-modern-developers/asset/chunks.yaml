- fmt: 'This will take a few minutes to deploy, but once it’s finished, you’ll have
    an Azure SQL Database with the AdvenureWorksLT sample restored on it.


    Once your database has been deployed and you’ve got some data in it, the next
    step may be to connect to it and verify everything was deployed correctly. In
    order to connect from your local machine, you’ll need to specify the IP address
    range that you want to be able to connect to the database. Optionally, you can
    create a firewall rule with value “0.0.0.0” for the starting and end IP address
    to allow all Azure-internal IP addresses. This will allow other services (e.g.,
    `Azure Functions`, `Azure virtual machines`) to connect to your database. The
    code is the same for both options mentioned; just substitute the IP address range
    desired in the following code.


    ```bash

    az sql server firewall-rule create \

    –-name  \

    –-resource-group  \

    –-server  \

    –-start-ip-address  \

    –-end-ip-address

    ```

    **Listing 2-6** Create firewall rules


    You should now be able to connect to your Azure SQL Database from an allowed IP
    address from your tool of choice (more on tools soon).


    The process and commands for creating an Azure SQL managed instance vary slightly,
    because with a managed instance, you create a “managed” SQL Server (not a logical
    server) and then you create “managed” databases.


    Before deploying, you’ll need to address new parameters for the `VNetName` and
    `SubnetName`. This is because Managed Instance is required to be deployed in an
    Azure virtual network in its own subnet or in a subnet with other managed instances
    only. The easiest way to set this up is by using the Azure Resource Manager (ARM)
    deployment template available here: [`https://aka.ms/sqmicvs`](https://aka.ms/sqmicvs).
    An ARM template is a JSON file that uses declarative syntax to define infrastructure
    and configuration to be deployed. There are many ARM templates available to get
    started building simple or complex solutions in Azure ([`https://aka.ms/armtemplates`](https://aka.ms/armtemplates)).
    Using the ARM template, you can simply select the “Deploy to Azure” button and
    fill in your subscription and resource group information, and it will deploy the
    virtual network and subnet that is required for a managed instance.


    You can read more about the different commands here: [`https://docs.microsoft.com/en-us/cli/azure/sql/mi`](https://docs.microsoft.com/en-us/cli/azure/sql/mi),
    but a sample script follows.


    ```bash

    # create an azure sql managed instance with default parameters

    az sql mi create -g  -n  -l  -i -u  -p  --subnet /subscriptions//resourceGroups//providers/Microsoft.Network/virtualNetworks//subnets/

    # create a new managed database within an existing azure sql managed instance

    az sql midb create -g  –-mi  -n

    ```

    **Listing 2-7** Azure CLI commands to create Azure SQL managed instances


    ## Tools to use and manage Azure SQL Database


    In the previous section, you saw how you can use the Azure CLI to deploy and manage
    Azure SQL. Depending on what you’re trying to accomplish and your preferences,
    there are other tools available for you to leverage. For example, if you’re more
    familiar with PowerShell, you can get about the same functionality as with the
    Azure CLI. Since SQL Server and Azure SQL have been around for 25+ and 10+ years
    respectively, there are also many command-line tools available. And if you’re
    looking for a tool that provides a graphical user interface (GUI), there are several
    for you to choose from. In this section, you’ll get an overview of what’s available
    from GUI to CLI.


    There are about five main tools that provide a GUI, the most popular being `SQL
    Server Management Studio` (SSMS). This tool has been around for 20+ years and
    can be used to access, manage, and develop components of SQL Server and Azure
    SQL. It contains graphical tools and script editors.


    `Azure Data Studio` (ADS) is a newer, source-open tool that also provides a GUI
    and much of the functionality that SSMS has. ADS was built on top on Visual Studio
    Code, so if you’re familiar with that, you’ll feel comfortable in ADS. ADS is
    also cross-platform and supported on Windows, macOS, and Linux. When choosing
    between SSMS and ADS, it’s often a preference or a matter of functionality. For
    example, if you want to leverage Jupyter to create SQL, PowerShell, Python, and
    so on notebooks (a notebook is most simply explained as a mixture of code cells
    that can be run with results saved and formatted text cells), then ADS is the
    only tool that currently supports that. Similarly, there are things that you’ll
    find in SSMS and not ADS. Microsoft is actively investing in both tools, so expect
    them to continue to evolve.


    There are also two extensions directly linked to Visual Studio, `SQL Server Data
    Tools` (SSDT) and `mssql`. SSDT is a tool for designing and deploying many things
    related to SQL, including Azure SQL, and it gives a similar experience to developing
    applications with Visual Studio. Similarly, the mssql extension for Visual Studio
    Code allows you to leverage the lightweight editor to connect to databases and
    instances with a good editing experience.


    The fifth tool that provides a GUI for management and development is the Azure
    portal. From deployment to integration with other applications and services, the
    Azure portal is an easy, user-friendly way to build applications with little coding
    required.


    Moving to the command-line tools, there are quite a few. Most of the command-line
    tools are cross-platform (Windows, macOS, and Linux). Some are for very specific
    tasks; a few common examples follow:


    *   `mssql-cli` is an open source command-line tool specifically for querying,
    with interactivity and helpful features like IntelliSense and syntax highlighting
    ([`https://aka.ms/mssqlcli`](https://aka.ms/mssqlcli)).


    *   The `sqlcmd` utility allows you to use the command prompt for T-SQL statements,
    script files, and system procedures.


    *   The `bulk copy program` utility (bcp) is used specifically for bulk copying
    data.


    *   `mssql-scripter` can be used to help with creating, editing, and storing scripts
    ([`http://aka.ms/mssqlscripter`](http://aka.ms/mssqlscripter)).


    *   `sqlpackage` automates tasks related to extracting, publishing, exporting,
    and importing live databases, database schemas, and user data ([`http://aka.ms/sqlpackage`](http://aka.ms/sqlpackage)).


    Some of the tools are built for more broad usage. For example, the Azure CLI and
    the SQL Server PowerShell snap-in provide commands for accessing, deploying, and
    managing Azure SQL. It’s almost certain that you will not just use one GUI tool
    or one CLI tool, but a combination of both (and even multiple within the categories).
    As you’ll see in other chapters, there are things that will be easier to do with
    varying tools.


    Throughout the book, you’ll be exposed to the different tools more in depth. If
    you ever want the reference materials for any of the tools, here’s a useful link
    that will guide you: [`https://aka.ms/sqltools`](https://aka.ms/sqltools).


    ## Choices, choices, choices


    Once you have an idea of which deployment option of Azure SQL is best for your
    scenario (Azure SQL Database single database or Elastic pool, or Azure SQL Managed
    Instance single instance or Instance pool), there are many other choices that
    you can make to tailor the solution to meet your needs. In an earlier section,
    you saw how to deploy an Azure SQL Database using Azure CLI, but many of the defaults
    were selected. In this section, you’ll learn about all the choices and configurations
    you can make during deployment and some guidance on how to choose. This section
    follows the order and flow presented currently in the Azure portal, but the order
    and specifics may change depending on your deployment tool of choice (Azure portal,
    Azure PowerShell, Azure CLI).'
