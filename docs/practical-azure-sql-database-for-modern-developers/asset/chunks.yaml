    allows you to connect your on-premises network or other on-premises data stores
    to Azure SQL managed instance (e.g., using linked servers is supported). You can
    optionally enable a public endpoint so you can connect to a managed instance from
    the Internet without VPN, but this access is disabled by default.


    The principle of private endpoints through VNet isolation in Azure SQL managed
    instance has made its way to Azure SQL Database in the form of Azure Private Link:
    [`https://aka.ms/aplo`](https://aka.ms/aplo).


    ### Connection methods


    During deployment, in Azure SQL managed instance, you''re also able to choose
    the connection type. In Azure SQL Database, you can also choose the connection
    type, but only after deployment. You can keep the default (combination of Proxy
    and Redirect) or change to solely Redirect or Proxy. At the highest level, in
    Proxy mode, all connections are proxied through the Azure SQL gateways, but in
    Redirect mode, after the connection is established leveraging the gateway, the
    connection goes directly to the database or managed instance. The direct connection
    (Redirect) allows for reduced latency and improved throughput, but also requires
    opening additional ports for services external to Azure, which is why it is not
    entirely enabled right away; opening additional ports is something that needs
    to be evaluated with respect to security risks that decision implies, and therefore
    Azure resorts to the most secure option by default.


    As discussed in an earlier section, during deployment of a database (of Azure
    SQL Database or within an Azure SQL managed instance), you have the option to
    set up a *data source* using an existing backup from another Azure SQL Database
    or managed database in Azure SQL managed instance (they must match; you cannot
    use a managed database to create a new Azure SQL Database). In Azure SQL Database
    only, you also have the option to choose an existing sample database (AdventureWorksLT).'
