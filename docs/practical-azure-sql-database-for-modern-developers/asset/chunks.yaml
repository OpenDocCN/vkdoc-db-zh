    orders with values of `CustomerID` column that match the `CustomerID` values fetched
    from the first read. It might be very inefficient to scan the entire table just
    to fetch a few rows. Let us see what will happen if we create the following indexes:


    ```

    CREATE INDEX ix_Customer_PostalCityID

    ON Sales.Customers(PostalCityID);

    CREATE INDEX ix_Orders_CustomerID

    ON Sales.Orders(CustomerID);

    ```


    With an index on the `Customers` table that has a `PostalCityID` column , Azure
    SQL would use the created index to quickly locate the `Customers` rows with the
    given `PostalCityID`. Then it will find the orders in the second index based on
    `CustomerID` values. As you can imagine, in large tables, this can be a huge performance
    benefit, not to mention less resource, CPU, RAM, and IO usage, which in turn means
    better scalability for lower costs.'
  trans: '### B 树索引


    B 树索引是一种按表中列值划分节点的层级结构。这种索引在关系型和非关系型数据库中都非常普遍，因为它效率极高且计算上简单明了。这实际上是 Erich Gamma
    等人所著的著名 *《设计模式》* 一书中描述的一种**组合设计模式**。在 B 树索引中，每个叶节点都包含指向表行的引用，而非叶节点则包含指向其他节点的引用。这种多层级的树形结构使你能够轻松定位一行或多行。每个
    B 树索引都有一个所谓的键列。正是该列中的值被用来搜索表行以查找所需数据。


    图 6-2 展示了一个使用 `Price` 列来划分行指针的索引。


    ![../images/493913_1_En_6_Chapter/493913_1_En_6_Fig2_HTML.jpg](img/493913_1_En_6_Fig2_HTML.jpg)


    图 6-2：使用 Price 列上的索引将行分组


    在根节点之下，你有一系列代表基于 `Price` 列值划分的行范围的组。每个组可能包含指向具有这些值的行的引用，也可能包含指向具有更细粒度范围的其他节点的引用。假设我们需要查找一组
    `Price` 等于 73 的行。从根节点开始，我们可以定位到表示 `Price` 值在 50 到 100 之间的行引用范围的节点。这个节点会将我们引向包含
    `Price` 列值在 70 到 100 范围内的行引用的节点。这就是叶节点，它包含行的地址，我们可以搜索该节点中的引用列表来找到具有所需值的行。叶节点中的引用数量不多，因此可以快速找到这些行。


    索引中的叶节点是行或行地址的列表，为了确保性能始终最佳，这些列表不应过大。如果引用数量超过预定义的限制，Azure SQL 会将该节点拆分为两个节点（此操作称为页拆分）。


    叶节点可能包含表行的引用（地址），也可能包含实际存储在表行中的单元格。因此，我们有以下几种索引类型：


    - `聚簇索引在其叶节点中保存实际行数据`。当你使用某个条件导航到叶节点时，你将找到实际的行。聚簇索引在物理上组织了表行。其结构定义了行的物理组织方式。由于表行只能有一种物理结构，因此每个表只能有一个聚簇索引。


    - `非聚簇索引在其叶节点中保存行的地址`。当你使用某个条件导航到叶节点时，你需要额外的一次读取操作才能从实际行中获取数据。非聚簇索引是在表行之上构建的附加二级引用结构，旨在使你能够根据某些条件定位行。


    一般建议是在主键列上创建聚簇索引，因为按主键筛选行是最常见的筛选模式，你希望用最优化的索引来覆盖这种情况。如果你知道有其他更主要的模式，也可以为聚簇索引选择其他列（例如，外键或某个日期列）。


    非聚簇索引是额外的辅助结构，用于优化那些常见但非主要的查询。你可以添加多个非聚簇索引，查询优化器会为查询选择最合适的那一个。


    下面我们来详细看看何时该使用哪种索引。


    ### 何时使用 B 树索引？


    B 树索引是你在 Azure SQL 数据库中最常见的索引类型。其结构在以下场景中能为我们提供帮助：


    - **索引查找**操作：定位具有指定列值的单行或一组行。

    - **范围扫描**操作：定位值在某个范围内的行集合。


    在以下查询中，索引可能会成为有用的性能助推器：


    ```sql

    SELECT c.CustomerName, c.CreditLimit,

    o.CustomerPurchaseOrderNumber, o.DeliveryInstructions

    FROM Sales.Customers AS c

    INNER JOIN Sales.Orders AS o

    ON c.CustomerID = o.CustomerID

    WHERE c.PostalCityID = 42

    ```


    Azure SQL 需要读取 `Customers` 表以找到所有 `PostalCityID` 值为 42 的客户。然后，它还需要读取 `Orders`
    表，以查找其 `CustomerID` 列值与从第一次读取中获取的 `CustomerID` 值相匹配的订单。仅仅为了获取几行数据而扫描整个表，效率可能非常低下。让我们看看如果我们创建以下索引会发生什么：


    ```sql

    CREATE INDEX ix_Customer_PostalCityID

    ON Sales.Customers(PostalCityID);

    CREATE INDEX ix_Orders_CustomerID

    ON Sales.Orders(CustomerID);

    ```


    有了在 `Customers` 表 `PostalCityID` 列上创建的索引，Azure SQL 将使用该索引快速定位具有给定 `PostalCityID`
    的 `Customers` 行。然后，它将基于 `CustomerID` 值在第二个索引中查找订单。可以想象，在大型表中，这会带来巨大的性能优势，更不用说能减少资源、CPU、RAM
    和 IO 的使用，而这反过来意味着更好的可扩展性和更低的成本。'
- fmt: '### When to create indexes?


    People are sometimes tempted to optimize a database by adding various indexes
    whenever they believe that they might help. Some people even believe that automatic
    indexes created on every column might be the holy grail of database design. However,
    you need to be aware what the price of indexes is before you create them.


    Indexes are not silver bullets that will always boost performance of your queries.
    They might be a perfect solution in read-only workloads because they give more
    choices for better execution plans, while the worst impact is just some additional
    space that they occupy. However, for write operations, they represent a burden
    because every index that contains the updated value must be updated together with
    the table. If you have a table with five indexes, there is a chance that every
    insert, delete, and many update statements would need to update not just the primary
    table but also all indexes.


    You should not add indexes blindly on every column or foreign key because this
    might hurt your database performance. Some generic guidelines that you can use
    to choose where to add the indexes are:


    *   You can start by creating clustered indexes on primary key columns, because
    the most common operation on a table is finding a row by primary key value.

    *   Tables might need to have nonclustered indexes on foreign keys because you
    might expect that queries would need to read all rows with foreign key value.

    *   If you find some important query for your application that is slow, you might
    need to create an index on the columns that the query uses.


    As the complexity of your database and solution increases, you may find that a
    very common query that returns all the orders done in the last day using the `OrderDate`
    column. In such cases, it may be useful to create the clustered index on that
    column, so all the orders done on the same date will be physically close together.
    Remember, in fact, that the clustered index holds rows in its leaf level and that
    rows are ordered by the columns on which the index is created. This means that
    Azure SQL can start to read from the first order placed in the day and can stop
    once the last is found, optimizing the reads to the minimum possible. Of course,
    as there is only one clustered index, you need to carefully evaluate this strategy
    based on your knowledge of how the application works and how users mostly use
    it.


    As you can see, determining the correct indexes is not an easy task. For this
    reason, there are various tools like `Performance Dashboard` in `SQL Server Management
    Studio`, `Database Tuning Advisor`, or open source scripts like `Tiger Toolbox`
    or `First Responder Kit` (reference to both in the links at the end of the chapter)
    that can provide a list of indexes that you might need to create. Always use tools
    to prove that you need an index before you create it. Over-indexing and rarely
    used indexes are two of the most common causes of performance issues.


    Azure SQL has a set of intelligent features like `Automatic tuning` that provides
    recommendations about the indexes that you might need to create. This is the best
    way to identify missing indexes because the recommendations are powered by machine
    learning algorithms trained on the substantial number of databases in Azure SQL.
    Even better, you can let the Azure SQL `Automatic tuning` capability automatically
    create indexes for you. The main benefit of the `Automatic tuning` capability
    is that it verifies that the created index would improve performance of your queries.
    Azure SQL has built-in machine learning models that measure performance of the
    database workload before and after index creation, identify the queries that are
    affected by the index, and check whether the query performance is improved or
    degraded. If the performance improvement is not big enough or if the new index
    degrades performance, the change will be reverted. In addition, `Automatic tuning`
    scans the usage of your indexes and recommends to you the indexes that should
    be dropped. Another important benefit is that `Automatic tuning` combines index
    recommendations to provide the best indexes. As an example, if there are two recommendations,
    one to create index on column `A` and another to create index on columns `A` and
    `B`, Azure SQL index recommendation will recommend only the second one, because
    it can also cover the queries that need only column `A`.'
