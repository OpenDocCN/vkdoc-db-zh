- fmt: 'Java 代码示例与之前的 .NET Core 示例非常相似。一旦我们通过 Maven 为所需的应用程序类型（如控制台应用、REST 服务等）创建了初始代码骨架，就需要在
    `pof.xml` 文件中引用 JDBC 驱动库以从中央包仓库下载它，然后在代码中使用。`DriverManager` 类代表应用程序中加载的所有 JDBC
    驱动程序的入口点，而连接字符串中的 `jdbc:sqlserver` 前缀指示使用哪个特定驱动。`Connection`、`Statement` 和 `resultset`
    再次是用于封装底层连接管理、命令执行和结果集迭代的主要类。这三个类将成为大多数数据库交互的基础。


    Python 是近年来在编写数据访问和管理应用程序方面获得广泛关注的语言。让我们看看如何使用它来连接到 Azure SQL 数据库实例。


    ### 清单 3-3：创建一个简单的 Python 应用程序


    ```python

    @app.route(''/order'')

    def getorders():

    cnxn = pyodbc.connect("DRIVER={ODBC Driver 17 " \

    "for SQL Server};" \ "SERVER="+server+";DATABASE="+database+"" \

    ";UID="+username+";PWD="+ password)

    cursor = cnxn.cursor()

    tsql = "SELECT TOP 5 " \

    " [o].[OrderID], [o].[OrderDate]," \

    " [c].[CustomerName]" \

    " FROM [Sales].[Orders] AS [o]" \

    " INNER JOIN [Sales].[Customers] AS [c]" \

    " ON [o].[CustomerID] = [c].[CustomerID]"

    rows = cursor.execute(tsql).fetchall()

    order_list = []

    for row in rows:

    d = collections.OrderedDict()

    d[''orderID''] = row.OrderID

    d[''orderDate''] = str(row.OrderDate)

    d[''customerName''] = row.CustomerName

    order_list.append(d)

    return json.dumps(order_list)

    ```


    在这个 Python Flask 函数中（你可以在配套的 GitHub 仓库中找到完整的应用程序），`pyodbc` 模块扮演着核心角色。它提供了对 ODBC
    驱动的包装以及更高级的抽象，如连接（connection）、游标（cursor）和行（row），这使你可以执行命令并遍历结果。然后，行被转换为有序字典列表，并作为
    JSON 片段返回给函数调用者。秉承纯粹的 Python 风格，`pyodbc` 代表了一种从 Python 程序访问 Azure SQL 数据库实例的高效且直接的方法。


    正如我们之前提到的，`tedious` 是可以从 Node.JS 应用程序连接到 Azure SQL 的驱动。让我们看一个简单的函数示例，该函数执行查询并将结果集转换为一个
    JSON 数组，该数组可以作为 REST API 结果返回。


    ### 清单 3-4：从数据库返回 JSON 数组的 Node.JS 函数


    ```javascript

    exports.getorders = function(req, res) {

    const { Connection, Request } = require("tedious");

    const config = {

    server: ".database.windows.net",

    options: {

    database: "WideWorldImporters-Full",

    encrypt: true},

    authentication: {

    type: "default",

    options: {

    userName: "username",

    password: "password",

    }

    }

    };

    const connection = new Connection(config);

    connection.on("connect", err => {

    if (err) {

    console.error(err.message);

    } else {

    getOrders();

    }

    });

    function getOrders() {

    var data = []

    const request = new Request(

    `SELECT TOP 5 [o].[OrderID],

    [o].[OrderDate], [c].[CustomerName]

    FROM [Sales].[Orders] AS [o]

    INNER JOIN [Sales].[Customers] AS [c]

    ON [o].[CustomerID] = [c].[CustomerID]`,

    (err, rowCount) => {

    if (err) {

    console.error(err.message);

    }

    else {

    res.send(data)

    }

    }

    );

    request.on("row", function(row) {

    data.push({

    orderid: row[0].value,

    orderdate: row[1].value,

    customername: row[2].value

    })

    });

    connection.execSql(request);

    }

    };

    ```


    如其他编程语言的先前示例所示，`Connection` 和 `Request` 对象在打开到数据库的新连接、执行命令和检索结果方面扮演着核心角色（你可以在配套的
    GitHub 仓库中找到完整的工作示例）。这两个对象提供了覆盖大多数常见场景的所有属性和功能，从定义参数化查询到事务管理或批量加载。


    本节并未涵盖所有可用的驱动和库，但提供了应用程序如何与 Azure SQL 连接的代表性概述，并且绝对可以应用于此处未提及的其他驱动。接下来，我们将重点介绍对应用程序数据访问层至关重要的高级和特定场景。'
