- fmt: '## 查询优化与执行计划分析


    作为开发者，我们可以开始思考如何通过仅选择真正需要的列来提高查询效率，并可能将这些列作为包含列添加到第一个操作符使用的非聚集索引中。这基本上可以完全消除这个昂贵的操作符，从而降低整体查询处理成本。让我们试试看！通过精确执行我们刚才描述的步骤，新的查询计划确实不再包含
    `Key Lookup` 操作符，而且查看整体子树成本，它显然降到了原来的百分之一：


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figg_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figg_HTML.jpg)


    通过从 DMV 提取的指标，我们可以注意到执行时间不到原始查询的一半，逻辑页读取次数从 369 次减少到 5 次，这表明从存储读取所需的 I/O 操作更少，缓冲池中占用的空间也更少：


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figh_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figh_HTML.jpg)


    逻辑页不过是我们之前章节讨论过的页概念。每次 Azure SQL 需要读取处理查询或将结果返回给最终用户所需的数据时，它都会使用一次 I/O 操作来读取整个
    8KB 的页。物理读取是指对尚未在内存中的页执行的读取操作——因此相当昂贵。逻辑读取是指对已在缓冲池（内存缓存）中的页执行的读取操作。如果一个页不在缓冲池中，它将从磁盘读取并添加到池中。因此，逻辑读取次数总是大于或等于物理读取次数。由于一个页可能被读取多次，逻辑页读取次数是衡量查询总体
    I/O 消耗的良好指标。由于 I/O 是数据库中最昂贵的操作，您通常希望尽可能减少 I/O，在读写性能之间找到适合您的完美平衡。


    使用 DMV 提取影响 Azure SQL 数据库的最昂贵查询的执行计划，是研究应用程序性能的好方法。在 SQL Server Management Studio
    或 Azure Data Studio 等客户端工具中，您也可以在运行查询时通过选择 Management Studio 中的“包含实际执行计划”工具栏按钮（或使用
    `Ctrl+M` 快捷键）或单击 Data Studio 中的“解释”按钮来获取相同的信息。


    我们在此描述的内容代表了您可以采取的基础方法，用以理解 Azure SQL 引擎如何执行您的查询，以及如何优化工作负载以减少无用的资源消耗并提高整体性能。


    Azure SQL 引擎创建和执行查询计划的方式是一个复杂而迷人的主题；如果您想了解更多，请阅读此处的官方文档：[`https://aka.ms/qpag`](https://aka.ms/qpag)。


    ## 查询存储


    我们之前提到过，表示 Azure SQL 数据库状态并作为动态管理视图和函数数据来源的所有内部数据结构都保存在数据库进程内存中，因此当实例重启或发生计划内或计划外故障转移时，所有诊断信息都会丢失。自
    SQL Server 2016 引入查询存储功能后，现在 Azure SQL 默认可以在重启后持久化大部分诊断信息，因为查询存储已在整个云数据库舰队中启用。此功能实际上为您提供了有关查询计划选择和性能的洞察，并通过帮助您快速找到由查询计划更改引起的性能差异来简化性能故障排除。查询存储自动捕获查询、计划和运行时统计信息的历史记录并保留以供您审查。它按时间窗口分离数据，因此您可以查看数据库使用模式并了解服务器上查询计划更改发生的时间。查询存储有效地就像一个飞行数据记录器，不断收集与查询和计划相关的编译和运行时信息。查询相关数据持久保存在内部表中，并通过一组视图呈现给用户。


    它基本上包含三个主要存储桶：

    *   **计划存储**，包含执行计划详细信息

    *   **运行时统计信息存储**，其中保存执行统计信息

    *   **等待统计信息存储**，包含有关等待统计信息的历史数据


    正如我们之前讨论的，一旦创建，Azure SQL 中任何特定查询的执行计划都可能因统计信息更改、架构更改、索引更改等随时间而变化。过程缓存存储最新的执行计划，在内存压力下，计划也可能被逐出缓存。如果新创建的执行计划由于某种原因被证明是次优的，通常很难理解是什么导致了这种更改。通过为给定查询保留多个执行计划版本，查询存储可以帮助弄清楚发生了什么，并且还可以强制执行策略以指示查询处理器使用特定的执行计划。这被称为计划强制，其中应用诸如
    `USE PLAN` 查询提示之类的机制，而无需更改应用程序中的查询语法。


    查询存储收集 DML 语句（如 `SELECT`、`INSERT`、`UPDATE`、`DELETE`、`MERGE` 和 `BULK INSERT`）的计划。


    性能故障排除期间的另一个重要信息来源是与系统等待状态相关的统计信息的可用性，基本上是收集 Azure SQL 响应用户查询所花费特定时间的底层原因。在查询存储之前，等待统计信息通常仅在数据库实例级别可用，并且很难将其与特定查询关联起来。


    让我们看看查询存储如何收集其数据：当查询首次编译时，查询文本和初始计划会发送到查询存储；如果查询被重新编译，则会更新。如果创建了新计划，则会将其作为该查询的新条目添加，并保留之前的计划及其运行时执行统计信息。每次查询执行时，运行时统计信息都会发送到查询存储，并在当前活动时间间隔内在计划级别进行聚合。


    在编译和检查重新编译阶段，Azure SQL 会检测查询存储中是否存在应用于当前运行查询的计划，以及是否存在与缓存中计划不同的强制计划，查询将被重新编译（这与对查询应用
    `USE PLAN` 提示的方式相同）。这对用户应用程序是完全透明的。下图描述了查询处理器和查询存储之间的交互：

    （此处应插入交互图描述）'
  raw: 'As developers, we can start thinking of what is needed to improve the efficiency
    of our query by only selecting the columns that we really need and maybe adding
    these columns as included to the nonclustered index used by the first operator.
    This would basically eliminate completely this expensive operator driving down
    overall query processing costs. Let’s give it a try! By precisely doing the steps
    we just described, the new query plan does not contain indeed the Key Lookup operator
    anymore and, looking at overall subtree cost, it apparently went down to 1/100th
    of the original:


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figg_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figg_HTML.jpg)


    Looking at the metrics we’re extracting through DMVs, we can notice that the execution
    time is less than half of the original query, and logical page read has reduced
    from 369 down to 5, indicating less IO operations required to read from storage
    and also less space utilized in the buffer pools:


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figh_HTML.jpg](images/493913_1_En_10_Chapter/493913_1_En_10_Figh_HTML.jpg)


    A logical page is nothing more than the page concept we discussed in previous
    chapters. Every time Azure SQL needs to read some data that is needed to process
    the query or to return the result to the end user, it will use one I/O operation
    to read an entire page, 8KB. A physical read is a read operation done on a page
    that was not already in memory – and therefore quite expensive. A logical read
    is a read operation done on a page that was already in the buffer pool, the in-memory
    cache. If a page is not already in the buffer pool, it will be read from the disk
    and added to the pool. For that reason, the logical reads are always greater or
    equal to the number of physical reads. As a page may be read more than once, the
    number of logical page reads is a good indicator of how much I/O your query is
    doing overall. As I/O is the most expensive operation in a database, you generally
    want to reduce I/O as much as possible, finding the perfect balance for you between
    read and write performances.


    Using DMVs to extract execution plans of the most expensive queries hitting our
    Azure SQL database is a great way to investigate the performance of our application.
    In client tools like SQL Server Management Studio or Azure Data Studio, you can
    also obtain the same information while running your queries by selecting the “Include
    Actual Execution Plan” toolbar button (or use Ctrl+M shortcut) in Management Studio
    or clicking the “Explain” button in Data Studio.


    What we have described here represents the foundational approach you can take
    to understand how your queries are executed by the Azure SQL engine and how you
    can optimize your workload to reduce useless resource consumption and improve
    overall performance.


    The way the Azure SQL engine is creating and executing query plans is a complex
    and fascinating subject; if you want to learn more, please read the official documentation
    here: [`https://aka.ms/qpag`](https://aka.ms/qpag).


    ## Query store


    We previously mentioned that all internal data structures representing the state
    of our Azure SQL databases and sourcing Dynamic Management Views and Functions
    are kept in database process memory, so when an instance is restarted or there’s
    a planned or unplanned failover, all diagnostic information gets lost. Following
    the introduction of the Query Store feature, back in SQL Server 2016, now Azure
    SQL can persist most of this diagnostic information across restarts by default,
    as Query Store has been enabled on the entire cloud database fleet. This feature,
    in fact, provides you with insight on query plan choice and performance and simplifies
    performance troubleshooting by helping you quickly find performance differences
    caused by query plan changes. Query Store automatically captures a history of
    queries, plans, and runtime statistics and retains these for your review. It separates
    data by time windows so you can see database usage patterns and understand when
    query plan changes happened on the server. Query Store works effectively like
    a flight data recorder, constantly collecting compile and runtime information
    related to queries and plans. Query-related data is persisted in the internal
    tables and presented to users through a set of views.


    It basically contains three main buckets:


    *   **Plan store**, containing execution plan details


    *   **Runtime stats store**, where execution statistics are persisted


    *   **Wait stats store**, with historical data around wait statistics


    As we discussed previously, once created, query execution plans for any specific
    query in Azure SQL can change over time due statistics changes, schema changes,
    index changes, and so on. The procedure cache stores the latest execution plan,
    and plans can also get evicted from cache under memory pressure. If a newly created
    execution plan, for whatever reason, turns out to be suboptimal, it is usually
    quite challenging to understand what caused that change. By keeping multiple versions
    of an execution plan per a given query, Query Store can help figuring out what
    happened, and it is also possible to enforce a policy to direct the Query Processor
    to use a specific execution plan. This is referred to as plan forcing, where a
    mechanism like the `USE PLAN` query hint is applied without requiring any change
    to query syntax in your app.


    Query Store collects plans for DML Statements such as `SELECT`, `INSERT`, `UPDATE`,
    `DELETE`, `MERGE`, and `BULK INSERT`.


    Another great source of information during performance troubleshooting sessions
    is the availability of statistics related to wait states of the system, basically
    a collection of the underlying reasons why Azure SQL is taking a given amount
    of time to respond to user queries. Before the Query Store, wait statistics were
    usually available at the database instance level, and it was not trivial to correlate
    them to a specific query.


    Let’s look at how Query Store collects its data: query text and the initial plan
    are sent to the Query Store when a query gets compiled for the first time, and
    it is updated in case the query gets recompiled. In case a new plan is created,
    this is added as a new entry for the query, and previous ones are kept along with
    their runtime execution stats. Runtime statistics are sent to the Query Store
    for each query execution and are aggregated at plan level within the currently
    active time interval.


    During the compile and check for recompile phases, Azure SQL detects if there
    is a plan in Query Store that should be applied for the currently running query
    and if there''s a forced plan different than the one in cache, query gets recompiled
    (this is effectively the same way as if `USE PLAN` hint was applied to that query).
    This happens completely transparently to the user application. The following diagram
    describes the interactions between query processor and Query Store:'
  trans: '

    ## 查询优化与执行计划分析


    作为开发者，我们可以开始思考如何通过仅选择真正需要的列来提高查询效率，并可能将这些列作为包含列添加到第一个操作符使用的非聚集索引中。这基本上可以完全消除这个昂贵的操作符，从而降低整体查询成本。让我们试试看！通过精确执行我们刚才描述的步骤，新的查询计划确实不再包含
    `Key Lookup` 操作符，而且查看整体子树成本，它显然降到了原来的百分之一：


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figg_HTML.jpg](img/493913_1_En_10_Figg_HTML.jpg)


    通过从 DMV 提取的指标，我们可以注意到执行时间不到原始查询的一半，逻辑页读取次数从 369 次减少到 5 次，这表明从存储读取所需的 I/O 操作更少，缓冲池中占用的空间也更少：


    ![../images/493913_1_En_10_Chapter/493913_1_En_10_Figh_HTML.jpg](img/493913_1_En_10_Figh_HTML.jpg)


    逻辑页不过是我们之前章节讨论过的页概念。每次 Azure SQL 需要读取处理查询或将结果返回给最终用户所需的数据时，它都会使用一次 I/O 操作来读取整个
    8KB 的页。物理读取是指对尚未在内存中的页执行的读取操作——因此相当昂贵。逻辑读取是指对已在缓冲池（内存缓存）中的页执行的读取操作。如果一个页不在缓冲池中，它将从磁盘读取并添加到池中。因此，逻辑读取次数总是大于或等于物理读取次数。由于一个页可能被读取多次，逻辑页读取次数是衡量查询总体
    I/O 消耗的良好指标。由于 I/O 是数据库中最昂贵的操作，您通常希望尽可能减少 I/O，在读写性能之间找到适合您的完美平衡。


    使用 DMV 提取影响 Azure SQL 数据库的最昂贵查询的执行计划，是研究应用程序性能的好方法。在 SQL Server Management Studio
    或 Azure Data Studio 等客户端工具中，您也可以在运行查询时通过选择 Management Studio 中的“包含实际执行计划”工具栏按钮（或使用
    `Ctrl+M` 快捷键）或单击 Data Studio 中的“解释”按钮来获取相同的信息。


    我们在此描述的内容代表了您可以采取的基础方法，用以理解 Azure SQL 引擎如何执行您的查询，以及如何优化工作负载以减少无用的资源消耗并提高整体性能。


    Azure SQL 引擎创建和执行查询计划的方式是一个复杂而迷人的主题；如果您想了解更多，请阅读此处的官方文档：[`https://aka.ms/qpag`](https://aka.ms/qpag)。


