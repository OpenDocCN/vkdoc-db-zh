- fmt: "## Distributed transactions across cloud databases\n\nRelational database\
    \ management systems have traditionally supported transactions across multiple\
    \ databases and even multiple servers, usually referred as distributed transactions.\
    \ These capabilities are enabled through specific components, like distributed\
    \ transaction coordinators and monitors (like Microsoft Distributed Transaction\
    \ Coordinator, or `MS DTC`), and two-phase commit protocols like `XA`. Generally\
    \ speaking, these underlying technologies were designed to run within traditional\
    \ data center environments, with low-latency, tightly coupled local connectivity\
    \ and specific hardware configurations. In highly distributed systems and standardized\
    \ cloud environments though, design patterns have evolved to remove dependencies\
    \ on these traditional approaches, moving instead into more decoupled, asynchronous\
    \ patterns like `Saga` which are usually managed outside of the database tier.\n\
    \nAs per the time of writing, `MS DTC` is supported only in `Azure SQL Managed\
    \ Instance`, and you are able to take full advantage of it. But what if you need\
    \ distributed transaction support in `Azure SQL Database`? You’ll be happy to\
    \ know it is still possible to implement distributed transactions across multiple\
    \ `Azure SQL Database` instances using `Elastic Transactions`, which are available\
    \ for `.NET`-based applications.\n\nWith this approach, `Azure SQL Database` will\
    \ effectively coordinate the distributed transaction on behalf of `MS DTC`, and\
    \ applications can connect to multiple instances and execute a transaction controlled\
    \ through `System.Transaction` classes, with mandatory requirement of `.NET 4.6.1`\
    \ or greater, while unfortunately this is not yet supported by `.NET Core` at\
    \ the time we’re writing this. The following picture visualizes how various components\
    \ are interacting with each other to support this scenario.\n\n![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig3_HTML.jpg](images/493913_1_En_7_Chapter/493913_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3 Distributed transactions on Azure SQL Database\n\nLet’s see how this\
    \ can be implemented in our applications through a simple example:\n\n```csharp\n\
    using (var scope = new TransactionScope())\n{\n    using (var conn1 = new SqlConnection(connStrDb1))\n\
    \    {\n        conn1.Open();\n        SqlCommand cmd1 = conn1.CreateCommand();\n\
    \        cmd1.CommandText = string.Format(\"insert into T1 values(1)\");\n   \
    \     cmd1.ExecuteNonQuery();\n    }\n    using (var conn2 = new SqlConnection(connStrDb2))\n\
    \    {\n        conn2.Open();\n        var cmd2 = conn2.CreateCommand();\n   \
    \     cmd2.CommandText = string.Format(\"insert into T2 values(2)\");\n      \
    \  cmd2.ExecuteNonQuery();\n    }\n    scope.Complete();\n}\n```\n\nAs you can\
    \ see, usage is quite straightforward: `TransactionScope` is doing all the heavy\
    \ lifting by establishing an ambient transaction (an ambient transaction is one\
    \ that lives in the current thread), and all connections opened within that scope\
    \ will participate in that transaction. If these are pointing to multiple databases,\
    \ then the transaction is automatically elevated to a distributed transaction.\
    \ When the scope is complete, transactions will commit.\n\n`Elastic Transactions`\
    \ can also involve databases belonging to multiple logical servers, but to enable\
    \ that, these servers will need first to be entered into a mutual communication\
    \ relationship by invoking the `New-AzSqlServerCommunicationLink` `PowerShell`\
    \ commandlet.\n\nWe can monitor the status of a distributed transaction using\
    \ the same `DMV`s mentioned for local transactions (e.g., `SELECT * FROM sys.dm_tran_active_transactions`),\
    \ but for distributed transactions, the `UOW` (Unit Of Work) column will identify\
    \ the different child transactions that belong to the same distributed transaction.\
    \ All transactions within the same distributed transaction carry the same `UOW`\
    \ value.\n\n## Locking and non-locking options\n\nDatabase engines are generally\
    \ multi-user systems, where operations performed by a given user may or may not\
    \ affect tables and rows used by others concurrently. By specifying an isolation\
    \ level for an individual transactional command, or as a default for a session\
    \ or all sessions in a database, we can define the degree to which one transaction\
    \ must be isolated from resource or data modifications made by other transactions.\
    \ Isolation levels define which concurrency side effects, such as dirty reads\
    \ (read data from a row that has been modified by another running transaction\
    \ not yet committed) or phantom reads (rows added or removed by another transaction\
    \ to the records being read), are allowed. They control things like whether locks\
    \ are taken when data is read, what type of locks are requested, and how long\
    \ the read locks are held. If locks are not used to provide consistency, isolation\
    \ level helps the engine to understand when different versions of the same rows\
    \ can be deleted as no other transactions are using it. When read operations are\
    \ referencing rows modified by another transaction, isolation levels define if\
    \ they get blocked until the exclusive lock on the row is freed; if locks are\
    \ not used, they define which committed version of the row that existed at the\
    \ time the statement or transaction started should be retrieved; if isolation\
    \ is set low enough, you can even read uncommitted data. While this is permitted,\
    \ you should almost never use this ability. Reading uncommitted data means that\
    \ you are reading something that has the chance to be rolled back; this means\
    \ that your application may start to do something based on the data that, for\
    \ example, has been entered by mistake and thus undone.\n\nAn important concept\
    \ to understand is that changing transaction isolation level does not affect how\
    \ the locks are acquired to protect data modifications. Transaction always gets\
    \ an exclusive lock on any data modified and holds that lock until the transaction\
    \ completes, regardless of the isolation level set for that transaction. Locks\
    \ are not only a synchronization mechanism but also carry metadata which is very\
    \ useful to the database engine to know what’s going on anytime it is needed.\
    \ What can be changed is how locks are used. Luckily, we don’t have to go into\
    \ nitty-gritty details, as we can express the desired behavior we want, in terms\
    \ of consistency and concurrency, and `Azure SQL` will use the correct locks for\
    \ us.\n\nFor reads, isolation levels define the level of protection from modifications\
    \ made by other transactions. Lower isolation levels increase the ability of more\
    \ concurrent access to data at the same time but increase potential concurrency\
    \ issues like dirty reads and inconsistency. Higher isolation levels increase\
    \ consistency but increase the chance of blocking other transactions by using\
    \ locks that will also consume system resources (i.e., memory). Application logic\
    \ and requirements will determine which isolation level is more appropriate."
  raw: '### Distributed transactions across cloud databases


    Relational database management systems have traditionally supported transactions
    across multiple databases and even multiple servers, usually referred as distributed
    transactions. These capabilities are enabled through specific components, like
    distributed transaction coordinators and monitors (like Microsoft Distributed
    Transaction Coordinator, or MS DTC), and two-phase commit protocols like XA. Generally
    speaking, these underlying technologies were designed to run within traditional
    data center environments, with low-latency, tightly coupled local connectivity
    and specific hardware configurations. In highly distributed systems and standardized
    cloud environments though, design patterns have evolved to remove dependencies
    on these traditional approaches, moving instead into more decoupled, asynchronous
    patterns like Saga which are usually managed outside of the database tier.


    As per the time of writing, MS DTC is supported only in Azure SQL Managed Instance,
    and you are able to take full advantage of it. But what if you need distributed
    transaction support in Azure SQL Database? You’ll be happy to know it is still
    possible to implement distributed transactions across multiple Azure SQL Database
    instances using Elastic Transactions, which are available for .NET-based applications.


    With this approach, Azure SQL Database will effectively coordinate the distributed
    transaction on behalf of MS DTC, and applications can connect to multiple instances
    and execute a transaction controlled through *System.Transaction* classes, with
    mandatory requirement of .NET 4.6.1 or greater, while unfortunately this is not
    yet supported by .NET Core at the time we’re writing this. The following picture
    visualizes how various components are interacting with each other to support this
    scenario.


    ![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig3_HTML.jpg](images/493913_1_En_7_Chapter/493913_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Distributed transactions on Azure SQL Database


    Let’s see how this can be implemented in our applications through a simple example:


    ```

    using (var scope = new TransactionScope())

    {

    using (var conn1 = new SqlConnection(connStrDb1))

    {

    conn1.Open();

    SqlCommand cmd1 = conn1.CreateCommand();

    cmd1.CommandText = string.Format("insert into T1 values(1)");

    cmd1.ExecuteNonQuery();

    }

    using (var conn2 = new SqlConnection(connStrDb2))

    {

    conn2.Open();

    var cmd2 = conn2.CreateCommand();

    cmd2.CommandText = string.Format("insert into T2 values(2)");

    cmd2.ExecuteNonQuery();

    }

    scope.Complete();

    }

    ```


    As you can see, usage is quite straightforward: `TransactionScope` is doing all
    the heavy lifting by establishing an *ambient transaction* (an ambient transaction
    is one that lives in the current thread), and all connections opened within that
    scope will participate in that transaction. If these are pointing to multiple
    databases, then the transaction is automatically elevated to a distributed transaction.
    When the scope is complete, transactions will commit.


    Elastic Transactions can also involve databases belonging to multiple logical
    servers, but to enable that, these servers will need first to be entered into
    a mutual communication relationship by invoking the `New-AzSqlServerCommunicationLink`
    PowerShell commandlet.


    We can monitor the status of a distributed transaction using the same DMVs mentioned
    for local transactions (e.g., `SELECT * FROM sys.dm_tran_active_transactions`),
    but for distributed transactions, the UOW (Unit Of Work) column will identify
    the different child transactions that belong to the same distributed transaction.
    All transactions within the same distributed transaction carry the same UOW value.


    ## Locking and non-locking options


    Database engines are generally multi-user systems, where operations performed
    by a given user may or may not affect tables and rows used by others concurrently.
    By specifying an isolation level for an individual transactional command, or as
    a default for a session or all sessions in a database, we can define the degree
    to which one transaction must be isolated from resource or data modifications
    made by other transactions. *Isolation levels* define which concurrency side effects,
    such as dirty reads (read data from a row that has been modified by another running
    transaction not yet committed) or phantom reads (rows added or removed by another
    transaction to the records being read), are allowed. They control things like
    whether locks are taken when data is read, what type of locks are requested, and
    how long the read locks are held. If locks are not used to provide consistency,
    isolation level helps the engine to understand when different versions of the
    same rows can be deleted as no other transactions are using it. When read operations
    are referencing rows modified by another transaction, isolation levels define
    if they get blocked until the exclusive lock on the row is freed; if locks are
    not used, they define which committed version of the row that existed at the time
    the statement or transaction started should be retrieved; if isolation is set
    low enough, you can even read *uncommitted* data. While this is permitted, you
    should almost never use this ability. Reading uncommitted data means that you
    are reading something that has the chance to be rolled back; this means that your
    application may start to do something based on the data that, for example, has
    been entered by mistake and thus undone.


    An important concept to understand is that changing transaction isolation level
    does not affect how the locks are acquired to protect data modifications. Transaction
    always gets an exclusive lock on any data modified and holds that lock until the
    transaction completes, regardless of the isolation level set for that transaction.
    Locks are not only a synchronization mechanism but also carry metadata which is
    very useful to the database engine to know what’s going on anytime it is needed.
    What can be changed is how locks are used. Luckily, we don’t have to go into nitty-gritty
    details, as we can express the desired behavior we want, in terms of consistency
    and concurrency, and Azure SQL will use the correct locks for us.


    For reads, isolation levels define the level of protection from modifications
    made by other transactions. Lower isolation levels increase the ability of more
    concurrent access to data at the same time but increase potential concurrency
    issues like dirty reads and inconsistency. Higher isolation levels increase consistency
    but increase the chance of blocking other transactions by using locks that will
    also consume system resources (i.e., memory). Application logic and requirements
    will determine which isolation level is more appropriate.'
  trans: "\n## 跨云数据库的分布式事务\n\n传统上，关系数据库管理系统一直支持跨多个数据库乃至多个服务器的事务，通常称为**分布式事务**。这些功能通过特定组件实现，例如分布式事务协调器和监视器（如\
    \ Microsoft 分布式事务协调器，或 `MS DTC`），以及两阶段提交协议（如 `XA`）。一般来说，这些底层技术是为在传统数据中心环境中运行而设计的，具有低延迟、紧密耦合的本地连接以及特定的硬件配置。然而，在高度分布式和标准化的云环境中，设计模式已经演进，以消除对这些传统方法的依赖，转而采用更解耦、异步的模式，如\
    \ `Saga`，这些模式通常在数据库层之外进行管理。\n\n截至撰写本文时，`MS DTC` 仅在 `Azure SQL 托管实例`中受支持，您可以充分利用其功能。但如果您需要在\
    \ `Azure SQL 数据库`中获得分布式事务支持怎么办？您会很高兴地了解到，通过 `弹性事务`，仍然可以跨多个 `Azure SQL 数据库`实例实现分布式事务，该功能适用于基于\
    \ `.NET`的应用程序。\n\n通过这种方法，`Azure SQL 数据库`将有效地代表 `MS DTC` 协调分布式事务，应用程序可以连接到多个实例，并通过\
    \ `System.Transaction` 类来控制执行事务，其强制性要求是 `.NET 4.6.1` 或更高版本，但遗憾的是，在撰写本文时，`.NET\
    \ Core` 尚不支持此功能。下图展示了各个组件如何交互以支持此场景。\n\n![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig3_HTML.jpg](img/493913_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3 Azure SQL 数据库上的分布式事务\n\n让我们通过一个简单的例子来看看如何在应用程序中实现这一点：\n\n```csharp\nusing\
    \ (var scope = new TransactionScope())\n{\n    using (var conn1 = new SqlConnection(connStrDb1))\n\
    \    {\n        conn1.Open();\n        SqlCommand cmd1 = conn1.CreateCommand();\n\
    \        cmd1.CommandText = string.Format(\"insert into T1 values(1)\");\n   \
    \     cmd1.ExecuteNonQuery();\n    }\n    using (var conn2 = new SqlConnection(connStrDb2))\n\
    \    {\n        conn2.Open();\n        var cmd2 = conn2.CreateCommand();\n   \
    \     cmd2.CommandText = string.Format(\"insert into T2 values(2)\");\n      \
    \  cmd2.ExecuteNonQuery();\n    }\n    scope.Complete();\n}\n```\n\n如您所见，用法非常直接：`TransactionScope`\
    \ 通过建立一个环境事务（环境事务是指存在于当前线程中的事务）来完成所有繁重的工作，所有在该范围内打开的连接都将参与该事务。如果这些连接指向多个数据库，则该事务会自动升级为分布式事务。当范围完成时，事务将提交。\n\
    \n`弹性事务`也可以涉及属于多个逻辑服务器的数据库，但为了启用此功能，需要首先通过调用 `PowerShell` 命令 `New-AzSqlServerCommunicationLink`\
    \ 将这些服务器建立为互信通信关系。\n\n我们可以使用与本地事务相同的 `DMV`（动态管理视图）来监控分布式事务的状态（例如，`SELECT * FROM\
    \ sys.dm_tran_active_transactions`），但对于分布式事务，`UOW`（工作单元）列将标识属于同一分布式事务的不同子事务。同一分布式事务内的所有事务都具有相同的\
    \ `UOW` 值。\n\n## 锁定与非锁定选项\n\n数据库引擎通常是多用户系统，特定用户执行的操作可能会影响也可能不会影响并发使用的其他用户正在使用的表和行。通过为单个事务命令指定隔离级别，或将其设置为会话或数据库中所有会话的默认值，我们可以定义一个事务必须与其他事务对资源或数据的修改隔离的程度。隔离级别定义了哪些并发副作用是被允许的，例如脏读（读取被另一个尚未提交的运行中事务修改的行的数据）或幻读（另一个事务在正在读取的记录中添加或删除了行）。它们控制诸如读取数据时是否加锁、请求何种类型的锁以及读取锁保持多长时间等事项。如果不使用锁来提供一致性，隔离级别则帮助引擎理解何时可以删除同一行的不同版本，因为没有其他事务在使用它。当读取操作引用被另一个事务修改的行时，隔离级别定义了它们是被阻塞直到该行上的排他锁被释放，还是在不使用锁的情况下，定义应检索在语句或事务开始时存在的该行的哪个已提交版本；如果隔离级别设置得足够低，您甚至可以读取未提交的数据。虽然这是被允许的，但您几乎永远不应该使用此功能。读取未提交的数据意味着您正在读取一些可能被回滚的内容；这意味着您的应用程序可能会开始基于这些数据执行操作，而这些数据可能是由于输入错误等原因而被撤销的。\n\
    \n一个需要理解的重要概念是，更改事务隔离级别并不会影响为保护数据修改而获取锁的方式。无论为该事务设置了何种隔离级别，事务总是对任何修改的数据获取排他锁，并在事务完成前一直持有该锁。锁不仅是一种同步机制，而且携带元数据，这对于数据库引擎在需要时了解情况非常有用。可以改变的是锁的使用方式。幸运的是，我们不必深入繁琐的细节，因为我们能够以一致性和并发性为考量，表达我们期望的行为，而\
    \ `Azure SQL` 会为我们使用正确的锁。\n\n对于读取操作，隔离级别定义了免受其他事务修改影响的保护级别。较低的隔离级别提高了更多并发访问数据的能力，但增加了潜在的并发问题，如脏读和数据不一致。较高的隔离级别提高了数据一致性，但通过使用锁（这也会消耗系统资源，即内存）增加了阻塞其他事务的可能性。应用程序逻辑和需求将决定哪个隔离级别更为合适。\n"
- fmt: '# Azure SQL 事务隔离级别与并发控制


    ## 标准隔离级别


    | **隔离级别** | **定义** |

    | --- | --- |

    | Read uncommitted | 最低的隔离级别；允许脏读。一个事务可能看到其他事务尚未提交的更改。 |

    | Read committed | 一个事务可以访问由其他事务创建或修改并提交的数据。如果数据被修改，Azure SQL 会保留写入锁（在选定数据上获取），直到事务结束。读取锁在执行
    `SELECT` 操作后即释放。 |

    | Repeatable read | Azure SQL 会在选定数据上保留读取锁和写入锁，直到事务结束。不管理范围锁，因此可能出现幻读。范围锁用于保护范围内所有待修改的数据，包括由
    `INSERT` 或 `DELETE` 语句进行的修改。 |

    | Serializable | 最高级别，事务彼此完全隔离。Azure SQL 在选定数据上保留读取锁和写入锁，并在事务结束时释放。当 `SELECT`
    操作使用带范围的 `WHERE` 子句时，会获取范围锁，特别是为了避免幻读。 |


    除了这些作为 ISO 标准定义给所有数据库管理系统的隔离级别外，Azure SQL 还支持两个使用行版本控制的附加事务隔离级别。


    ## 行版本控制隔离级别


    | **行版本控制隔离级别** | **定义** |

    | --- | --- |

    | Read Committed Snapshot (RCSI) | 在 Azure SQL Database 中，这是新创建数据库的默认隔离级别，`read
    committed` 隔离使用行版本控制来提供*语句级*读取一致性。读取操作只需要 SCH-S（共享架构锁，仅用于防止在读取表时更改表架构），而不需要页锁或行锁。Azure
    SQL 使用行版本控制，为每个语句提供该语句开始时存在的数据的一致性事务快照。不使用锁来保护数据免受其他事务的更新。使用此隔离级别，写入者和读取者不会相互阻塞。
    |

    | Snapshot | 快照隔离级别使用行版本控制来提供*事务级*读取一致性。读取操作不获取页锁或行锁；仅获取 SCH-S 表锁。当读取由另一事务修改的行时，它们检索该事务开始时存在的行版本。只有在
    `ALLOW_SNAPSHOT_ISOLATION` 数据库选项设置为 ON 时，才能对数据库使用快照隔离，这在 Azure SQL 中是默认设置。 |


    ## 术语澄清：锁


    在深入之前，让我们澄清一下刚才使用的一些术语，特别是关于锁的部分。


    一个共享架构锁 (`SCH-S`) 用于确保在您使用表时没有人可以更改表定义。在高度并发的系统中，可能发生有人试图在您运行 `SELECT` 时 `DROP`
    或 `ALTER` 一个表。Azure SQL 会通过放置一个 `SCH-S` 锁来保护您的 `SELECT`，这样那些想要更改架构的命令就必须等到您的 `SELECT`
    完成。


    一个范围锁用于保护正在运行的事务免受尚不存在的数据的影响，如果允许这些数据被创建，可能会干扰正在运行的事务。


    ## 锁管理机制


    Azure SQL 引擎通过请求数据上的锁来管理多个用户针对数据库执行事务的并发性。锁具有不同的模式，例如共享或独占。锁模式定义了事务对数据的依赖程度。如果锁类型会与已授予给另一事务的同类锁冲突，则无法为事务授予该锁。如果事务请求的锁类型与同一数据上已授予的锁冲突，Azure
    SQL 将暂停请求事务，直到第一个锁释放。当事务修改数据时，它会持有保护该修改的锁直到事务结束。事务持有锁以保护读取操作的时间长短取决于事务隔离级别的设置。事务持有的所有锁都会在事务完成时（无论是提交还是回滚）释放。


    应用程序通常不直接请求锁；相反，锁由 Azure SQL 引擎的一个内部部分管理，称为锁管理器。在处理 Transact-SQL 语句时，Azure SQL
    会确定要访问的资源。查询处理器根据访问类型和事务隔离级别的设置，确定保护每个资源所需的锁类型。然后，查询处理器向锁管理器（Azure SQL 引擎内的一个子系统）请求适当的锁。如果没有其他事务持有冲突的锁，锁管理器就会授予这些锁。


    ## 多粒度锁


    Azure SQL 具有多粒度锁，允许事务锁定不同类型的资源。为了最小化锁的成本（锁结构保存在内存中），Azure SQL 锁资源会自动以适合任务的级别工作。在较小的粒度（如行）上锁定会增加并发性，但如果锁定了许多行，则必须持有更多锁，因此开销较高。在较大的粒度（如表）上锁定在并发性方面代价高昂，因为锁定整个表会限制其他事务访问表的任何部分。然而，它的开销较低，因为维护的锁更少。Azure
    SQL 根据需要锁定的数据量自动选择最佳锁粒度，试图在资源成本和并发影响之间取得平衡。


    Azure SQL 通常必须在多个粒度级别获取锁才能完全保护资源。这组位于多个粒度级别的锁称为锁层次结构。例如，为了完全保护对索引的读取，Azure SQL
    实例可能必须在行上获取共享锁，并在页和表上获取意向共享锁。意向锁用于指示将来可能在该资源上获取锁。此信息有助于锁管理器避免未来的冲突。


    ## 开发者控制与参考


    如您所见，事务和锁管理是相当复杂的主题。关于锁在内部如何工作，以及不同的锁类型和级别如何影响底层数据的并发性的更多见解，可以在 Azure 文档的“事务锁定和行版本控制指南”中找到：`https://aka.ms/sstlarv`。


    作为开发人员，我们可以通过特定的 T-SQL 语句和客户端驱动程序 API（如 `Microsoft.Data.SqlClient` 或 SQL Server
    JDBC Driver）来控制我们的应用程序如何处理不同的隔离级别和并发性。


    在 T-SQL 脚本或存储过程中，您可以使用 `SET TRANSACTION ISOLATION LEVEL isolation_level` 来控制该连接上后续所有语句的锁定和行版本控制行为：


    ```sql

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ;

    GO

    BEGIN TRANSACTION;

    GO

    SELECT * FROM HumanResources.EmployeePayHistory;

    GO

    SELECT * FROM HumanResources.Department;

    GO

    COMMIT TRANSACTION;

    GO

    ```'
  raw: '| **Isolation level** | **Definition** |

    | --- | --- |

    | Read uncommitted | The lowest isolation level; dirty reads are allowed. One
    transaction may see not-yet-committed changes made by other transactions. |

    | Read committed | A transaction can access data created or modified – and then
    committed – by another transaction. If data is modified, Azure SQL keeps write
    locks (acquired on selected data) until the end of the transaction. Read locks
    are released as soon as the SELECT operation is performed. |

    | Repeatable read | Azure SQL keeps read and write locks that are acquired on
    selected data until the end of the transaction. Range locks are not managed, so
    phantom reads can occur. A range lock protects all the data in the range to be
    modified, including modification done by INSERT or DELETE statements. |

    | Serializable | Highest level, where transactions are completely isolated from
    one another. Azure SQL keeps read and write locks on selected data and will be
    released at the end of the transaction. Range locks are acquired when a SELECT
    operation uses a ranged WHERE clause, especially to avoid phantom reads. |


    In addition to these isolation levels, which are defined as ISO standards for
    all database management systems, Azure SQL also supports two additional transaction
    isolation levels that use row versioning.


    | **Row versioning isolation level** | **Definition** |

    | --- | --- |

    | Read Committed Snapshot (RCSI) | In Azure SQL Database*, this is the default
    isolation level for newly created databases*, and read committed isolation uses
    row versioning to provide *statement-level* read consistency. Read operations
    require only SCH-S (shared schema locks, which simply prevent table schema to
    be changed while the table is being read) and no page or row locks. *Azure SQL
    uses row versioning* to *provide each statement* with a transactionally consistent
    snapshot of the data as it existed at the start of the statement. Locks are not
    used to protect the data from updates by other transactions. *With this isolation
    level, writers and readers don’t block each other.* |

    | Snapshot | *The snapshot isolation level uses row versioning to provide transaction-level
    read consistency*. Read operations acquire no page or row locks; only SCH-S table
    locks are acquired. When reading rows modified by another transaction, they retrieve
    the version of the row that existed when the transaction started. You can only
    use Snapshot isolation against a database when the ALLOW_SNAPSHOT_ISOLATION database
    option is set ON, which is the default in Azure SQL. |


    Before moving further, let’s clarify some of the terminology just used, especially
    around locks. A Shared Schema Lock (SCH-S) is used to make sure that no one can
    change the table definition while you are using it. In a highly concurrent system,
    it could happen that someone will try to `DROP` a table or `ALTER` it while you
    are running your `SELECT`. Azure SQL will protect your `SELECT` by placing a SCH-S
    lock so that those commands who would like to change the schema will have to wait
    until your `SELECT` is done.


    A Range Lock is used to protect a running transaction from data that doesn’t exist
    yet, but that, if allowed to be created, could interfere with the running transaction.


    The Azure SQL engine manages concurrency between multiple users executing transactions
    against databases by requesting locks on data. Locks have different modes, such
    as shared or exclusive. Lock modes define the level of dependency the transaction
    has on the data. Locks cannot be granted for a transaction if they would conflict
    with the type of a lock already granted on that data to another transaction. If
    a transaction requests a lock type that conflicts with a lock that has already
    been granted on the same data, Azure SQL will pause the requesting transaction
    until the first lock is released. When a transaction modifies a piece of data,
    it holds the lock protecting the modification until the end of the transaction.
    How long a transaction holds the locks acquired to protect read operations depends
    on the transaction isolation level setting. All locks held by a transaction are
    released when the transaction completes (either commits or rolls back).


    Applications do not typically request locks directly; rather, locks are managed
    internally by a part of the Azure SQL engine, called the lock manager. When processing
    a Transact-SQL statement, Azure SQL determines which resources are to be accessed.
    The query processor determines what types of locks are required to protect each
    resource based on the type of access and the transaction isolation level setting.
    The query processor then requests the appropriate locks from the lock manager,
    a subsystem that exists within the Azure SQL engine. The lock manager grants the
    locks if there are no conflicting locks held by other transactions.


    Azure SQL has multi-granular locking that allows different types of resources
    to be locked by a transaction. To minimize the cost of locking (lock structures
    are held in memory), Azure SQL lock resources automatically work at a level appropriate
    to the task. Locking at a smaller granularity, such as rows, increases concurrency
    but has a higher overhead because more locks must be held if many rows are locked.
    Locking at a larger granularity, such as tables, is expensive in terms of concurrency
    because locking an entire table restricts access to any part of the table by other
    transactions. However, it has a lower overhead because fewer locks are being maintained.
    Azure SQL automatically selects the best lock granularity based on the amount
    of data that it needs to lock, trying to balance between resource costs and concurrency
    impact.


    Azure SQL often must acquire locks at multiple levels of granularity to fully
    protect a resource. This group of locks at multiple levels of granularity is called
    a lock hierarchy. For example, to fully protect a read of an index, an instance
    of the Azure SQL may have to acquire Shared locks on rows and Intent Shared locks
    on the pages and table. Intent Locks are something used to indicate that, in the
    future, lock could be acquired on that resource. This information helps the lock
    manager to avoid future conflicts.


    Note


    As you have seen, transaction and lock management are pretty complex topics. You
    can get more insights on how locking works internally, and how different lock
    types and level can impact concurrency on underlying data can be found on “Transaction
    Locking and Row Versioning Guide” on the Azure docs at this link: [`https://aka.ms/sstlarv`](https://aka.ms/sstlarv).


    As developers, we can control how our applications are dealing with different
    isolation levels and concurrency through specific T-SQL statements and client
    driver APIs like Microsoft.Data.SqlClient or SQL Server JDBC Driver.


    In a T-SQL script or procedure, you can use `SET TRANSACTION ISOLATION LEVEL isolation_level`
    to control locking and row versioning behavior of all the following statements
    issued over that connection:


    ```

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ;

    GO

    BEGIN TRANSACTION;

    GO

    SELECT * FROM HumanResources.EmployeePayHistory;

    GO

    SELECT * FROM HumanResources.Department;

    GO

    COMMIT TRANSACTION;

    GO

    ```'
  trans: '

    # Azure SQL 事务隔离级别与并发控制


    ## 标准隔离级别


    | **隔离级别** | **定义** |

    | --- | --- |

    | 读取未提交 | 最低的隔离级别；允许脏读。一个事务可能看到其他事务尚未提交的更改。 |

    | 读取已提交 | 一个事务可以访问由其他事务创建或修改并提交的数据。如果数据被修改，Azure SQL 会保留写入锁（在选定数据上获取），直到事务结束。读取锁在执行
    `SELECT` 操作后即释放。 |

    | 可重复读 | Azure SQL 会在选定数据上保留读取锁和写入锁，直到事务结束。不管理范围锁，因此可能出现幻读。范围锁用于保护范围内所有待修改的数据，包括由
    `INSERT` 或 `DELETE` 语句进行的修改。 |

    | 可序列化 | 最高级别，事务彼此完全隔离。Azure SQL 在选定数据上保留读取锁和写入锁，并在事务结束时释放。当 `SELECT` 操作使用带范围的
    `WHERE` 子句时，会获取范围锁，特别是为了避免幻读。 |


    除了这些作为 ISO 标准定义给所有数据库管理系统的隔离级别外，Azure SQL 还支持两个使用行版本控制的附加事务隔离级别。


    ## 行版本控制隔离级别


    | **行版本控制隔离级别** | **定义** |

    | --- | --- |

    | 读取已提交快照 (RCSI) | 在 Azure SQL Database 中，这是新创建数据库的默认隔离级别，`读取已提交` 隔离使用行版本控制来提供*语句级*读取一致性。读取操作只需要
    SCH-S（共享架构锁，仅用于防止在读取表时更改表架构），而不需要页锁或行锁。Azure SQL 使用行版本控制，为每个语句提供该语句开始时存在的数据的一致性事务快照。不使用锁来保护数据免受其他事务的更新。使用此隔离级别，写入者和读取者不会相互阻塞。
    |

    | 快照 | 快照隔离级别使用行版本控制来提供*事务级*读取一致性。读取操作不获取页锁或行锁；仅获取 SCH-S 表锁。当读取由另一事务修改的行时，它们检索该事务开始时存在的行版本。只有在
    `ALLOW_SNAPSHOT_ISOLATION` 数据库选项设置为 ON 时，才能对数据库使用快照隔离，这在 Azure SQL 中是默认设置。 |


    ## 术语澄清：锁


    在深入之前，让我们澄清一下刚才使用的一些术语，特别是关于锁的部分。


    一个共享架构锁 (`SCH-S`) 用于确保在您使用表时没有人可以更改表定义。在高度并发的系统中，可能发生有人试图在您运行 `SELECT` 时 `DROP`
    或 `ALTER` 一个表。Azure SQL 会通过放置一个 `SCH-S` 锁来保护您的 `SELECT`，这样那些想要更改架构的命令就必须等到您的 `SELECT`
    完成。


    一个范围锁用于保护正在运行的事务免受尚不存在的数据的影响，如果允许这些数据被创建，可能会干扰正在运行的事务。


    ## 锁管理机制


    Azure SQL 引擎通过请求数据上的锁来管理多个用户针对数据库执行事务的并发性。锁具有不同的模式，例如共享或独占。锁模式定义了事务对数据的依赖程度。如果锁类型会与已授予给另一事务的同类锁冲突，则无法为事务授予该锁。如果事务请求的锁类型与同一数据上已授予的锁冲突，Azure
    SQL 将暂停请求事务，直到第一个锁释放。当事务修改数据时，它会持有保护该修改的锁直到事务结束。事务持有锁以保护读取操作的时间长短取决于事务隔离级别的设置。事务持有的所有锁都会在事务完成时（无论是提交还是回滚）释放。


    应用程序通常不直接请求锁；相反，锁由 Azure SQL 引擎的一个内部部分管理，称为锁管理器。在处理 Transact-SQL 语句时，Azure SQL
    会确定要访问的资源。查询处理器根据访问类型和事务隔离级别的设置，确定保护每个资源所需的锁类型。然后，查询处理器向锁管理器（Azure SQL 引擎内的一个子系统）请求适当的锁。如果没有其他事务持有冲突的锁，锁管理器就会授予这些锁。


    ## 多粒度锁


    Azure SQL 具有多粒度锁，允许事务锁定不同类型的资源。为了最小化锁的成本（锁结构保存在内存中），Azure SQL 锁资源会自动以适合任务的级别工作。在较小的粒度（如行）上锁定会增加并发性，但如果锁定了许多行，则必须持有更多锁，因此开销较高。在较大的粒度（如表）上锁定在并发性方面代价高昂，因为锁定整个表会限制其他事务访问表的任何部分。然而，它的开销较低，因为维护的锁更少。Azure
    SQL 根据需要锁定的数据量自动选择最佳锁粒度，试图在资源成本和并发影响之间取得平衡。


    Azure SQL 通常必须在多个粒度级别获取锁才能完全保护资源。这组位于多个粒度级别的锁称为锁层次结构。例如，为了完全保护对索引的读取，Azure SQL
    实例可能必须在行上获取共享锁，并在页和表上获取意向共享锁。意向锁用于指示将来可能在该资源上获取锁。此信息有助于锁管理器避免未来的冲突。


    ## 开发者控制与参考


    如您所见，事务和锁管理是相当复杂的主题。关于锁在内部如何工作，以及不同的锁类型和级别如何影响底层数据的并发性的更多见解，可以在 Azure 文档的“事务锁定和行版本控制指南”中找到：`https://aka.ms/sstlarv`。


    作为开发人员，我们可以通过特定的 T-SQL 语句和客户端驱动程序 API（如 `Microsoft.Data.SqlClient` 或 SQL Server
    JDBC Driver）来控制我们的应用程序如何处理不同的隔离级别和并发性。


    在 T-SQL 脚本或存储过程中，您可以使用 `SET TRANSACTION ISOLATION LEVEL isolation_level` 来控制该连接上后续所有语句的锁定和行版本控制行为：


    ```sql

    SET TRANSACTION ISOLATION LEVEL REPEATABLE READ;

    GO

    BEGIN TRANSACTION;

    GO

    SELECT * FROM HumanResources.EmployeePayHistory;

    GO

    SELECT * FROM HumanResources.Department;

    GO

    COMMIT TRANSACTION;

    GO

    ```

    '
- fmt: 'Various client driver APIs are providing slightly different behaviors and
    semantics regarding managing isolation levels when executing transactions. The
    first example here is related to Microsoft.Data.SqlClient driver, where you can
    specify isolation level when invoking `BeginTransaction()` method :


    ```

    // Start a local transaction.

    transaction = connection.BeginTransaction(

    IsolationLevel.ReadCommitted, "SampleTransaction");

    ```


    In Microsoft SQL Server JDBC Driver instead, you specify isolation level through
    the `setTransactionIsolation()` method of the `Connection` class:


    ```

    con.setTransactionIsolation(Connection.TRANSACTION_READ_COMMITTED);

    ```


    In addition to drivers’ APIs and connection-level isolation settings, `table hints`
    can also override default behaviors of Azure SQL engine for the duration of data
    manipulation language (DML) statements’ execution and let you control things like
    lock type, granularity, and so on by specifying a locking method. For example,
    using a table hint of type `HOLDLOCK` (or its equivalent, `SERIALIZABLE`) makes
    shared locks more restrictive by holding them until a transaction is completed,
    instead of releasing the shared lock as soon as the required table or data page
    is no longer needed. `ROWLOCK` specifies that row locks are taken when page or
    table locks are ordinarily taken (as opposed to `TABLOCK` or `PAGLOCK`).


    Table hints are specified in the `FROM` clause of the DML statement and affect
    only the table or view referenced in that clause; here’s an example of how you
    can use them:


    ```

    FROM t (ROWLOCK, XLOCK)

    ```


    Note that not all the hints are compatible with different DML command types, and
    to get all details about this interesting topic, you can follow this link in official
    product documentation: [`https://aka.ms/uathaaqh`](https://aka.ms/uathaaqh).


    Note


    Slow or long-running queries can contribute to excessive resource consumption
    and be the consequence of blocked queries. The cause of the blocking can be poor
    application design, bad query plans, the lack of useful indexes, and so on. You
    can use the `sys.dm_tran_locks` dynamic management view to get information about
    the current locking activity in the database.


    As we mentioned, the default isolation level for Azure SQL is Read Committed Snapshot
    Isolation (RCSI) , and this provides the best trade-off between concurrency and
    data integrity, letting readers and writers don’t block each other for most scenarios.
    As a best practice, you should limit the usage of other transaction isolation
    levels or statement-level table hints to very specific use cases where you need
    specific behaviors. In all other cases, default settings will work just fine.
    At the same time, rest assured that if you need to go into great detail and fine-tune
    even just a single statement, that can be done. This amazing flexibility is unique
    in the database cloud market!


    ## Natively compiled procedure


    Natively compiled Stored Procedures are T-SQL Stored Procedures compiled to machine
    code, rather than interpreted by the query execution engine as regular Stored
    Procedures. They work in conjunction with In-Memory OLTP tables in Azure SQL to
    provide very fast response times for frequently executed queries on performance-critical
    parts of an application. Performance benefits of using a natively compiled Stored
    Procedure increases with the number of rows and the amount of logic that is processed
    by the procedure, and works best when performing aggregations; nested loops joins
    on large number of row; multi-statement select, insert, update, and delete operations;
    or complex procedural logic, such as conditional statements and loops.


    When we use traditional interpreted Transact-SQL statements to access In-Memory
    OLTP tables, query processing pipeline looks very similar to disk-based tables,
    with the exception of the fact that rows are not retrieved from classical buffer
    pools but from the in-memory engine:


    ![../images/493913_1_En_7_Chapter/493913_1_En_7_Figa_HTML.jpg](images/493913_1_En_7_Chapter/493913_1_En_7_Figa_HTML.jpg)


    When using natively compiled Stored Procedures, the process is split into two
    parts. First parser, algebrizer and optimizer create optimized query execution
    plans for all the queries in the Stored Procedure, and then Stored Procedure gets
    compiled into a native code and stored in a .dll file:


    ![../images/493913_1_En_7_Chapter/493913_1_En_7_Figb_HTML.jpg](images/493913_1_En_7_Chapter/493913_1_En_7_Figb_HTML.jpg)


    When the Stored Procedure is invoked, the In-Memory OLTP runtime locates the DLL
    entry point for the Stored Procedure, machine code in the DLL is executed, and
    the results are returned to the client:


    ![../images/493913_1_En_7_Chapter/493913_1_En_7_Figc_HTML.jpg](images/493913_1_En_7_Chapter/493913_1_En_7_Figc_HTML.jpg)


    Syntax for creating a natively compiled Stored Procedure is quite straightforward,
    as shown in the following example (that tests how fast 100.000 GET + PUT operations
    can be done on a table acting as a key-value store cache):


    ```

    create or alter procedure cache.[Test]

    with native_compilation, schemabinding

    as

    begin atomic with (transaction isolation level = snapshot, language = N''us_english'')

    declare @i int = 0;

    while (@i < 100000)

    begin

    declare @r int = cast(rand() * 10000 as int)

    declare @v nvarchar(max) = (select top(1) [value] from dbo.[MemoryStore] where
    [key]=@r);

    if (@v is not null) begin

    declare @c int = cast(json_value(@v, ''$.counter'') as int) + 1;

    update dbo.[MemoryStore] set [value] = json_modify(@v, ''$.counter'', @c) where
    [key] = @r

    end else begin

    declare @value nvarchar(max) = ''{"value": "'' + cast(sysdatetime() as nvarchar(max))
    + ''", "counter": 1}''

    insert into dbo.[MemoryStore] values (@r, @value)

    end

    set @i += 1;

    end

    end

    go

    ```


    Once created, this Stored Procedure can be invoked like any other by our application:


    ```

    EXEC cache.[Test];

    ```


    There are few restrictions on operators supported within a natively compiled Stored
    Procedure. For example, the syntax `SELECT * FROM table` is not supported, and
    you need to specify the complete column list. For more information on these details,
    you can look at product documentation at [`https://aka.ms/ncsp`](https://aka.ms/ncsp).


    Note


    As a best practice, you shouldn’t consider using natively compiled Stored Procedures
    for query patterns like point lookups. If you need to process only a single row,
    in fact, using a natively compiled Stored Procedure may not provide a performance
    benefit compared to traditional interpreted Stored Procedures.


    ## Optimizing database roundtrips


    Reducing the number of roundtrips between your application tier and the database
    tier is likely the single most important optimization you can think about when
    designing or troubleshooting an application working with Azure SQL. Wherever your
    application logic permits, batching operations to Azure SQL Database and Azure
    SQL Managed Instance significantly improves the performance and scalability of
    your applications. Batching calls to a remote service is a well-known strategy
    for increasing performance and scalability. There are fixed processing costs to
    any interactions with a remote service, such as serialization, network transfer,
    and deserialization. Packaging many separate transactions into a single batch
    minimizes these costs.


    The multitenant characteristics of Azure SQL mean that the efficiency of the data
    access layer correlates to the overall scalability of the database. In response
    to usage in excess of predefined quotas, Azure SQL can reduce throughput or respond
    with throttling exceptions. Efficiencies, such as batching, enable you to do more
    work before reaching these limits.


    There are several batching techniques we can adopt to make our applications more
    efficient, and these apply to most programming languages and frameworks. Let’s
    start expanding on these techniques by starting from various batching strategies
    you should consider.'
