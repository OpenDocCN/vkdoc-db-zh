  trans: '

    在这个简单的例子中，你可以看到 SQLAlchemy 如何让我们定义应用程序实体的内存表示，以及它们如何映射到数据库表。通过使用应用层的类 SQL 语法，我们可以指定包含高级操作（如连接、过滤、聚合、投影等）的查询，SQLAlchemy
    类会将此转换为 Azure SQL 特定的 SQL 语法，但你也可以轻松地将相同的代码移植到其他受支持的数据库系统。虽然 SQLAlchemy 能做的远不止这些（我们这里只是浅尝辄止），但它最强大的功能已经超越了数据访问框架的范畴，属于**对象关系映射器（Object-Relational
    Mappers）**的领域，这也是下一节的主题。


    ## ORM


    ORM 的目的是在关系型世界和面向对象世界之间进行协调，让开发者能够使用代表应用程序领域的强类型对象来编写与关系型数据库中存储的数据交互的应用程序，从而减少他们通常需要编写的冗余（或“管道”）数据访问代码。下表概述了可用于连接
    Azure SQL 的各种 ORM 库：


    | **语言** | **平台** | **ORM** |

    | --- | --- | --- |

    | C# | Windows, Linux, macOS | Entity Framework |

    |  |  | Entity Framework Core |

    | Java | Windows, Linux, macOS | Hibernate ORM |

    | PHP | Windows, Linux, macOS | Laravel (Eloquent) |

    |  |  | Doctrine |

    | Node.js | Windows, Linux, macOS | Sequelize ORM |

    | Python | Windows, Linux, macOS | Django |

    | Ruby | Windows, Linux, macOS | Ruby on Rails |


    该领域最早且最成功的库之一是 Java 的 Hibernate ([`https://aka.ms/horm`](https://aka.ms/horm))，出现于
    21 世纪初，其目标是提供比 Enterprise Java Beans 实体更好的体验，以便在不必要使用 SQL 命令的情况下将数据持久化到数据库中。多年来，这些库变得越来越强大和复杂（对某些人来说甚至过于复杂，以至于创建了像“微
    ORM”库这样的替代品）以涵盖数据访问层的其他方面，如建模、安全性和可扩展性。


    微软自家用于 .NET 世界的 ORM 是 Entity Framework (EF)，其较新的版本是 EF Core ([`https://aka.ms/ghdnefc`](https://aka.ms/ghdnefc))。EF
    Core 可与多种后端数据库存储一起工作，如 SQL Server、Azure SQL Database、SQLite、Azure Cosmos DB、MySQL、PostgreSQL
    以及其他通过提供程序插件 API 连接的数据库。它是该领域 10 多年开发的成果，并提供了诸如 LINQ 查询、离线变更跟踪、批处理更新以及通过名为“迁移（migrations）”的功能进行数据库架构管理等特性。


    该库的核心是 `DbContext` 类，开发者可以用它来创建其数据库交互上下文，并建模数据库表将如何映射到实体和集合，以及对这些实体的操作将如何透明地转换为
    SQL 代码，以在数据库中读取、创建或更新记录。


    ```

    using(var dbctx = new WWImportersContext())

    {

    var res = dbctx.Orders

    .Include("Customer")

    .Select (o => new

    {o.OrderID,o.OrderDate,o.Customer.CustomerName})

    .ToList().Take(10);

    foreach(var o in res)

    {

    Console.WriteLine("OrderId: {0} - OrderDate: {1} - CustomerName: {2}",o.OrderID,o.OrderDate,o.CustomerName);

    }

    }

    class Order

    {

    public int OrderID {get;set;}

    public DateTime OrderDate {get;set;}

    public int CustomerID {get;set;}

    public Customer Customer {get;set;}

    }

    class Customer

    {

    public int CustomerID {get;set;}

    public String CustomerName {get;set;}

    }

    class WWImportersContext : DbContext

    {

    // 模型构建在此片段中故意省略

    public DbSet Orders {get;set;}

    public DbSet Customers {get;set;}

    }

    列表 3-9

    在 C# 应用程序片段中使用 Entity Framework Core

    ```


    让我们关注这个简单例子的三个关键方面：


    *   首先，两个 **POCO**（Plain Old CLR Objects）类 `Order` 和 `Customer`，它们代表了我们的应用程序管理的业务实体。

    *   `WWImportersContext` 类，继承自 `DbContext`，它代表了我们的应用程序用于连接和查询数据库的上下文。具体来说，它确实包含两个映射到数据库表的
    `DbSet` 集合。

    *   与数据库上下文交互并表达我们想要检索哪些实体的 **LINQ** 查询。


    正如你在完整示例中（请参阅 GitHub 仓库）所注意到的，有趣的是看到我们的 `WWImportersContext` 类如何重写其基类的 `OnConfiguring`
    和 `OnModelCreating` 方法来准确实现其名称所暗示的功能：配置我们的上下文与数据库通信的方式，以及定义一个模型，其中我们的实体映射到相应的数据库表。我们还配置了日志记录基础设施，以展示由上下文自动生成的
    T-SQL 代码的样子。非常直观，不是吗？


    Entity Framework Core 还能做更多的事情，你可以通过这个免费的 Microsoft Learn 在线课程 ([`https://aka.ms/lmpsefc`](https://aka.ms/lmpsefc))
    开始熟悉所有这些功能。


    “**能力越大，责任越大**”，因此有一些基本的良好实践你应该始终牢记，以从像 EF Core 这样的 ORM 工具中获得最大收益：


    *   首先，确保你只从数据库中提取你真正需要的数据，并让你的结果集尽可能高效。

    *   如果你的应用程序只需要根据查询结果具体化对象并将其显示在屏幕上，但永远不会修改和更新它们，请关闭变更跟踪。这将避免浪费大量应用程序资源来跟踪你永远不会使用的对象状态信息。

    *   相反，如果你的应用程序将在其数据库上下文中创建或更新许多实体，请确保你利用批处理（例如，在你的 `DbSet` 集合上调用 `AddRange()`
    方法）。EF Core 将在后台创建一个表值参数（Table-Valued Parameter, TVP），并将其用于 MERGE 语句中，以在一次数据库往返中插入多行。这为
    Azure SQL 提供了许多好处，包括降低延迟和最小化事务日志压力。对于非常大的批量操作（大于 10,000 行），你可能希望在 Entity Framework
    之外执行它们（例如，使用 ADO.NET 的 `SqlBulkCopy` 类）或使用一个名为 EFCore.BulkExtensions ([`https://aka.ms/efcbe`](https://aka.ms/efcbe))
    的很好的 EF Core 扩展。

    *   在可能的情况下，启用日志记录并验证 EF Core 生成的 T-SQL 语法。

    *   在复杂的数据库交互情况下，通过 EF Core 使用原始 SQL 命令或存储过程可以解决性能和灵活性问题。

