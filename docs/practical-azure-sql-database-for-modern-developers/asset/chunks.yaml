  trans: '

    ## 比较工具


    除了 `SqlPackage`，还有几款第三方工具可以帮助你找出两个现有数据库之间的差异，从而生成脚本，将目标数据库与另一个参考数据库同步。最常见和知名的是


    *   SQL Server Data Tools（Visual Studio 工作负载扩展）

    *   Redgate SQL Compare（商业软件）

    *   ApexSQL SQL Compare（商业软件）


    ## DbUp


    DbUp ([`https://dbup.github.io/`](https://dbup.github.io/)) 是一个开源的 .NET 库，它有助于在数据库中部署脚本，确保同一个脚本不会被部署两次。如果你想完全控制部署到数据库的脚本，并且维护一个必须按顺序执行的脚本列表，那么这个小工具就极其有用。这样，你编写的更改将按正确顺序应用，从而将数据库更新到最新的演进状态。这种方法为你提供了最高级别的控制，如果你更喜欢自己编写迁移脚本，它会非常有效。在复杂且关键的系统中，情况通常都是如此。


    使用它非常简单。你只需将 NuGet 包添加到你的项目中（建议为此创建一个专用项目），然后使用 `DeployChanges` 对象，并指向存放待部署脚本的文件夹，例如项目结构中的
    `sql` 文件夹：


    ```csharp

    var connectionString = ""

    var upgrader = DeployChanges.To

    .SqlDatabase(connectionString)

    .JournalToSqlTable("dbo", "$__schema_journal")

    .WithScriptsFromFileSystem("./sql")

    .LogToConsole()

    .Build();

    var result = upgrader.PerformUpgrade();

    ```


    前面的代码在执行时，将会：


    *   连接到目标数据库。

    *   如果尚未存在，则创建一个名为 `$__schema_journal` 的表，用于跟踪已部署的脚本。

    *   读取 `sql` 文件夹中所有可用的 T-SQL 脚本。

    *   将日志发送到控制台。

    *   运行脚本，并将已执行的脚本信息保存到日志表中。


    如果你针对一个空数据库编译并运行此应用程序，你将看到类似下面的输出：


    ![../images/493913_1_En_11_Chapter/493913_1_En_11_Figc_HTML.jpg](img/493913_1_En_11_Figc_HTML.jpg)


    如果你尝试再次运行同一个应用程序，且没有向 `sql` 文件夹添加任何新脚本，那么什么都不会发生，因为所有脚本都已执行完毕：


    ![../images/493913_1_En_11_Chapter/493913_1_En_11_Figd_HTML.jpg](img/493913_1_En_11_Figd_HTML.jpg)


    由于这是一个常规的 .NET 应用程序，将其部署到 CI/CD 流水线中不需要任何特殊的 Task 或 Action，除了那些流水线中已有的、用于确保 .NET
    框架可用的任务。


    ## 数据库测试


    如何正确地测试数据库？这是另一个庞大的话题，坦率地说，目前还没有很好的答案。测试数据库是一个复杂的挑战，因为测试结果将完全取决于存储在数据库中的数据。此外，目前还没有广泛采用的专注于这个特定问题的测试框架。


    有一个社区支持的单元测试框架支持 Azure SQL：`tSQLt`。使用 `tSQLt`，你可以仅用 T-SQL 代码来定义测试。它支持对标量结果和表格式结果进行断言，并且还可以创建一些模拟对象来帮助你隔离依赖关系。


    但作为一名开发人员，我最喜欢的数据库测试方法是使用常见的测试框架（如 .NET 的 `NUnit` 或 `XUnit`、Python 的 `pytest`
    或 Node 的 `Mocha`）创建一个测试类，并利用这些工具的灵活性来获得良好的测试体验。


    众所周知，测试必须是自包含、独立且幂等的。上述测试框架都允许在运行测试前后执行自定义代码，以便准备和清理测试数据及环境。


    我知道纯粹的单元测试不应该有任何外部依赖，而测试数据库实际上引入了对数据库本身的依赖。尽管如此，我认为使用现有的单元测试框架是一个很好的折中方案，它以对完美方法的微小偏离为代价，提供了所需的灵活性。鉴于目前没有普遍接受的数据库单元测试框架，我们只能在现有条件下尽力而为。


    以下是一个使用 .NET 和 `NUnit` 进行数据库单元测试的示例：


    ```csharp

    [Test]

    public void CheckExpectedTotal()

    {

    using(var conn = new SqlConnection(ConnectionString))

    {

    var result = conn.QuerySingle(

    "ConfirmOrder",

    new { OrderId = 38923 },

    commandType: CommandType.StoredProcedure);

    Assert.AreEqual("ConfirmedTotal", 10000);

    }

    }

    ```


    理想情况下，对于你想创建的每个测试，你会生成一个或多个数据集，以覆盖你想要测试的查询或存储过程可能被使用的场景。


    通常，为了检查查询是否返回预期结果，你可以使用一个小的数据样本，甚至可能是完全用模拟值创建的，这样就不必处理个人可识别信息以及随之而来的所有安全问题。在最复杂的情况下，在运行测试之前，你可能需要恢复一个参考数据集甚至整个数据库，以便拥有一个明确的起始点来运行测试，从而获得确定性的结果。


    一旦你创建了测试，从而拥有一个坚实的流水线来部署和测试针对一个小型但具有代表性的数据集的更改，你就可以指示流水线将你的代码部署到一个更大的数据库上（可能包含一个经过适当混淆的、具有代表性的生产数据子集），以运行集成和性能测试。在这个阶段，你将专注于查询性能。一些框架还允许你指定测试必须在规定的时间内执行，才被认为是成功的。


    此时，通常你的团队将执行集成和性能测试，其中数据库和所有需要与之交互的代码将作为一个整体进行测试。如果你正在创建一个 API 解决方案，你可能已经在使用像
    `Locust.io` 或 `K6` 这样的工具来进行压力测试，并验证你刚刚完成的更改在性能、可扩展性和资源消耗方面是否也符合预期。


    ## 整合所有内容


    第一次创建一个完整、端到端的 CI/CD 流水线可能有点复杂。因此，在本书附带的代码中，你可以找到一个端到端的示例，展示了如何创建一个简单的 C# REST
    API，以 Azure SQL 数据库为后端，并使用 Azure Web App 部署在 Azure 上。CI/CD 流水线使用 GitHub 和 DbUp
    创建，使用的测试框架是 `NUnit`。

    '
- fmt: '## If you want to know more


    DevOps is a really broad topic, and in this chapter, we just scratched the surface.
    As mentioned at the beginning, DevOps is also a relatively young discipline that
    is evolving very rapidly, so staying updated with the freshest information is
    really important: there is no doubt on the fact that DevOps is a must for a modern
    developer and thus it is mandatory to have some familiarity with it and its tools.
    Here’s a list of links and resources to help you find more details in it:

    *   Annual State of Database DevOps report – [`www.red-gate.com/solutions/overview`](http://www.red-gate.com/solutions/overview)

    *   Evolutionary Database Design – [`www.martinfowler.com/articles/evodb.html`](http://www.martinfowler.com/articles/evodb.html)

    *   Agile Database Techniques – [`www.amazon.com/Agile-Database-Techniques-Effective-Strategies/dp/0471202835`](http://www.amazon.com/Agile-Database-Techniques-Effective-Strategies/dp/0471202835)

    *   Introduction to DevOps: DevOps and the Database – [`www.red-gate.com/simple-talk/sql/database-devops-sql/introduction-to-devops-devops-and-the-database/`](http://www.red-gate.com/simple-talk/sql/database-devops-sql/introduction-to-devops-devops-and-the-database/)

    *   Azure SQL Database Deployment task – [`https://docs.microsoft.com/azure/devops/pipelines/tasks/deploy/sql-azure-dacpac-deployment`](https://docs.microsoft.com/en-us/azure/devops/pipelines/tasks/deploy/sql-azure-dacpac-deployment)

    *   GitHub Action for deploying updates to Azure SQL database – [`https://github.com/marketplace/actions/azure-sql-deploy`](https://github.com/marketplace/actions/azure-sql-deploy)

    *   Django: Migrations – [`https://docs.djangoproject.com/en/3.0/topics/migrations/`](https://docs.djangoproject.com/en/3.0/topics/migrations/)

    *   Django: Writing Migrations – [`https://docs.djangoproject.com/en/3.0/howto/writing-migrations/`](https://docs.djangoproject.com/en/3.0/howto/writing-migrations/)

    *   Entity Framework Core – [`https://docs.microsoft.com/ef/core/`](https://docs.microsoft.com/en-us/ef/core/)

