    Whenever you read the rows from compressed column segments, Azure SQL will just
    ignore the rows marked as deleted at runtime. This way, the query that is reading
    data from the column segments is getting only existing rows and doesn’t need to
    be aware that the deleted rows are transparently excluded once the row groups
    are decompressed.


    There is only one operation left to be dealt with now: updating data. This is
    the most complex operation, as Azure SQL cannot just inject an updated value into
    an existing, highly compressed column segment without decompressing and compressing
    again everything else also. For this reason, every row update is represented as
    a combination of delete and insert operations. Old values of the row in the compressed
    row group are marked as deleted, and the new value is inserted in the delta store.


    Marking deleted rows and representing updates as a pair of delete and insert operations
    are used only if the affected row is in a compressed area. If the row is in the
    Delta store, it will be updated or deleted as any other row in regular Hobits.'
  trans: '### Azure SQL 中的列存储


    Azure SQL 并未使用前一节描述的经典列存储组织结构。理论上，我们可以创建大型列段，每个列段包含来自单表列的所有值并进行压缩。然而，在任何更新操作时，我们需要解压整个列段以插入、更新或删除单个值，然后再次压缩。为避免这种开销，更好的做法可能是将唯一的列区域划分为多个列段，并仅对包含需要更新单元的段执行所需操作。此外，大多数查询无需扫描所有行，因此大多数被解压的单元不会被使用。如果将列拆分为多个列段，我们或许能够只选取查询所需的段。这个想法与分区技术非常相似，但仅应用于列段内部，并且对用户完全透明。


    Azure SQL 对原始列存储结构进行了一些增强以解决这些问题。两个主要的修改是：


    *   列段不跨越整个表。Azure SQL 会将表行分组，每组最多包含 100 万行。这些 `行组` 以列存储格式组织，每个列段最多包含一百万行的值。

    *   所有新行都插入到一个使用行存储格式组织的缓冲行组中。行存储格式是面向行操作的理想选择，因此将其作为插入新行的区域是合理的。这些行组被称为 `增量存储`。一旦这些行组达到一百万条记录，它们会在后台透明地转换并压缩为列存储格式。


    Azure SQL 中列存储结构的组织如图 9-2 所示。


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig2_HTML.jpg](img/493913_1_En_9_Fig2_HTML.jpg)


    图 9-2：列存储结构包含一个采用列存储格式的压缩区域和一个采用行存储格式的输入区域（增量）


    在 Azure SQL 中，列存储结构中的数据行被划分为行组，每个行组最多包含一百万行。一百万行提供了足够的值以实现良好的压缩效果，同时行数也不会过多，便于将行组作为独立单元进行操作。行组可以放置在两个区域：


    *   **压缩区域**：包含许多以列存储格式组织的行组，这些行组中的列段被高度压缩。理想情况下，所有行组都应压缩在此区域。

    *   **增量存储区域**：包含一个或多个以行存储格式组织的行组。这是一个临时缓冲区域，用于存放等待被压缩并移动到压缩区域的行。


    如果你的数据库中已有列存储索引，可以使用以下系统视图查找行组：


    ```sql

    SELECT * FROM sys.columnstore_rowgroups;

    ```


    压缩行组中的列被组织成列段，该段包含行组中指定列的所有值。此段被高度压缩，所有值存储在一个连续的物理位置。每个列段都包含描述段中最小和最大值的统计信息。这是
    Azure SQL 引擎可用于优化列存储结构上的报表和分析查询性能的重要信息。我们可以使用以下视图轻松查找 Azure SQL 数据库中现有的列段：


    ```sql

    SELECT * FROM sys.columnstore_segments;

    ```


    压缩区域应包含超过 95% 的数据，并且压缩后的数据不应被更改。修改压缩区域中的数据是不可取的，因为 Azure SQL 需要解压段中的所有值以更新其中一个值，然后再次压缩所有内容。


    列存储结构中还有一个称为增量存储的区域。增量存储包含少量以经典行存储格式（或前一章描述的 Hobit）组织的行组。该区域的主要目的是在数据被压缩之前缓冲新输入和更改。将每个新行拆分到每一列并重新分配值到相应的列段是一种低效的数据插入策略。因此，所有新行都插入到行存储增量区域，它们会一直保留在那里，直到行组达到一百万行。一旦增量存储中的行组被填满，它就会
    `关闭` 新的更改，后台进程将开始将此行组转换为列存储格式并移动到压缩区域。目标是将尽可能多的行组从增量存储移动到压缩存储，而增量存储应包含少于 5% 的行。


    理论上，我们可以在增量存储中只有一个行组。然而，单个行组可能会影响并发性，因为一个正在插入数据的事务可能会锁定该行组，其他试图插入数据的请求将需要等待第一个事务释放锁。因此，列存储结构会创建新的行组以方便并发插入。


    ### 在列存储中更新值


    如前所述，更新压缩的列存储数据并非理想操作。列存储格式并非只读，但与经典的行存储相比，更新操作有更大的性能损耗。Azure SQL 进行了一些增强以优化压缩数据的更新。


    其中一个优化是前一节描述的增量存储。增量行组缓冲传入的行，直到有足够的行可以成功压缩它们。但增量存储并不总是被使用：Azure SQL 会决定传入数据是进入增量存储，还是直接压缩而无需缓冲。Azure
    SQL 使用以下规则：


    *   如果插入少量（少于 102,400 行）的行，所有行都将进入某个增量行组。

    *   如果使用单个 `BULK INSERT` 或 `SELECT INTO` 语句插入超过 102,400 行，Azure SQL 会将这些值直接流式传输到新的压缩行组中。


    另一个需要解决的问题是如何高效地从列存储中删除行。解压 1,000,000 行以删除一行，然后压缩 999,999 行，并非可取的技术。Azure SQL
    使用所谓的 `删除索引` 和 `删除位图` 来“虚拟”删除行。当你需要从压缩行组中删除一行时，Azure SQL 只会“标记该行位置”为已删除。当你从压缩列段读取行时，Azure
    SQL 在运行时只会忽略标记为已删除的行。这样，从列段读取数据的查询只获取存在的行，并且无需感知已删除的行在行组解压时被透明地排除。


    现在只剩下一个操作需要处理：更新数据。这是最复杂的操作，因为 Azure SQL 不能仅仅将一个更新值注入到现有的、高度压缩的列段中，而不需要解压并重新压缩所有其他内容。因此，每次行更新都被表示为删除和插入操作的组合。压缩行组中旧行的值被标记为已删除，新值则插入到增量存储中。


    仅当受影响的行位于压缩区域时，才会使用标记已删除行并将更新表示为删除和插入操作对的方式。如果该行位于增量存储中，它将像常规 Hobits 中的任何其他行一样被更新或删除。'
- fmt: "### Querying Columnstore structure\n\nColumnstore structures are the ideal\
    \ option for reporting queries that use a smaller subset of columns and need to\
    \ scan a large percent of the table. An example of the query that might get huge\
    \ performance boost is shown in the following sample:\n\n```sql\nSELECT State,\
    \ AVG(Price)\nFROM Products\nWHERE State IN ('Available', 'In Stock')\nGROUP BY\
    \ State\n```\n\nLet’s imagine that the table in the example has six compressed\
    \ row groups with five columns (five column segments per each row group).\n\n\
    The most important optimization that Columnstore format enables is the column\
    \ segment elimination. Azure SQL can determine what column segments are not necessary\
    \ for query processing even before the query processing starts using the following\
    \ rules:\n\n*   Column segments that belong to the columns that are not used in\
    \ the query are ignored.\n*   Column segments that don’t have the values required\
    \ in the query are ignored.\n\nUsing these rules, Azure SQL might discard most\
    \ of the column segments as it is shown in Figure [9-3](#493913_1_En_9_Chapter.xhtml#Fig3).\n\
    \n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig3_HTML.jpg](images/493913_1_En_9_Chapter/493913_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3\n\nColumnstore will discard column segments that are not needed for\
    \ the query (red) and column segments that don’t contain data required by query\
    \ (orange)\n\nThe columns `Id`, `Date`, and `Tax` are not used in the query, so\
    \ Azure SQL will not even load them into the memory if they are still on disk.\
    \ This way, we are reducing the required IO and memory footprint to 40% because\
    \ three of five column segments are ignored.\n\nEach column segment contains some\
    \ statistics about the values in the segment (e.g., min-max values). Azure SQL\
    \ knows what column segments contain the values `Available` and `In Stock`. Let’s\
    \ imagine that these values appear only in three row groups out of six row groups.\
    \ Azure SQL will discard `State` column segments that don’t contain the values\
    \ used in the query and related `Price` column segment from the same row groups.\
    \ This way, Azure SQL will discard another half of the data without even starting\
    \ the query. These optimizations have a huge effect if most of the data is stored\
    \ in compressed column segments and not in Deltastore.\n\nImagine that the dataset\
    \ used in this example initially had 100GB. Under assumption that columnstore\
    \ structure can have 10x compression and that column segment elimination can discard\
    \ 80% of data before query starts, we are getting 2GB that should be processed\
    \ instead of full table scan. This is a huge reduction of required IO and memory\
    \ for the query that can boost performance up to 50x.\n\nAnother important optimization\
    \ is batch query processing. Azure SQL will leverage underlying hardware SIMD\
    \ instructions and apply a small number of operations on large vectors of data.\
    \ The vectors of data are column segments containing the continuous range of values.\
    \ This hardware acceleration in a batch mode processing significantly improves\
    \ performance of the queries and is completely transparent to the query and thus\
    \ to the application using it. The query will just run faster.\n\n### Clustered\
    \ Columnstore indexes\n\nClustered Columnstore Indexes (`CCI`) are tables organized\
    \ in Columnstore format. We can create a Columnstore index right when creating\
    \ a table:\n\n```sql\nCREATE TABLE Sales.Orders (\n    INDEX cci CLUSTERED COLUMNSTORE\n\
    )\n```\n\nOr even on existing tables:\n\n```sql\nCREATE CLUSTERED COLUMNSTORE\
    \ INDEX cci ON Sales.Orders\n```\n\nWe are using `CCI` to store highly compressed\
    \ data with dominant read and massive (bulk load) insert workload patterns. This\
    \ workload pattern is very common in data warehouses, and this is the reason why\
    \ `CCI` is a very common structure in modern data warehousing scenarios. However,\
    \ `CCI` is applicable in any scenario where you are going to append and analyze\
    \ data, such as IoT scenarios.\n\n`CCI` boosts performance of reporting and analytic\
    \ queries using compression and batch mode execution, which are the primary benefits\
    \ of Columnstore format.\n\nOne `CCI`-specific optimization is very helpful to\
    \ improve bulk load performance: in the previous section, it was described that\
    \ loading 102,400 rows will have special treatment and directly compress all incoming\
    \ data. This direct compression might boost performance of your data load process\
    \ because any data pages that must be saved to disk will be immediately compressed.\
    \ Smaller inserts land in the delta store where they are buffered before they\
    \ are compressed and moved to a compressed Columnstore area. If your workload\
    \ produces many open row groups that don’t meet criterion for closing, you can\
    \ merge them using the following statement:\n\n```sql\nALTER INDEX cci ON Sales.Orders\
    \ REORGANIZE\n```\n\n`CCI` reorganize operation is a lightweight non-blocking\
    \ operation that will merge and compress open delta row groups without major impact\
    \ on your workload.\n\n### Nonclustered Columnstore indexes\n\nNonclustered Columnstore\
    \ Indexes (`NCCI`) are indexes organized in Columnstore format that are created\
    \ on top of Hobits. This makes Azure SQL pretty unique in the market, as it allows\
    \ the co-existence of both Columnstore and Rowstore indexes on the same table.\
    \ Figure [9-4](#493913_1_En_9_Chapter.xhtml#Fig4) shows a classic rowstore table\
    \ with seven columns and additional columnstore structure where we extracted the\
    \ values from three columns and compressed them into columnar format.\n\n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig4_HTML.png](images/493913_1_En_9_Chapter/493913_1_En_9_Fig4_HTML.png)\n\
    \nFigure 9-4\n\nClassic rowstore table with additional Columnstore index (`NCCI`)\
    \ built on top of the tree columns from this table\n\nThe main purpose of `NCCI`\
    \ is to optimize analytical and reporting queries on the subset of columns in\
    \ the existing rowstore tables without changing the original table structure.\n\
    \n`NCCI` can be created in a table using the following definitions:\n\n```sql\n\
    CREATE TABLE dbo.Sales (\n    INDEX ncci NONCLUSTERED COLUMNSTORE (Price, Quantity,\
    \ SalesID)\n)\n```\n\nWith `NCCI` on top of classic tables, you are enabling Azure\
    \ SQL to choose the optimal format for either transactional or analytical queries:\n\
    \n*   If you run some query that selects a single row or small set of rows, Azure\
    \ SQL will use the underlying rowstore table. Database will leverage index seek\
    \ or range scan operations that are the perfect fit for this scenario.\n*   If\
    \ you run some report that scans the entire table and aggregates data, Azure SQL\
    \ will read information from `NCCI` index, leveraging column segment elimination\
    \ and batch mode execution to quickly return process all table.\n\nAny update,\
    \ delete, or insert will immediately end up in the underlying rowstore table,\
    \ and `NCCI` will be updated via Deltastore. This double update might slow down\
    \ your transactional workload, but this should be acceptable if you need to make\
    \ a trade-off between boosting reporting capabilities on a table and speed of\
    \ transactional statements."
  raw: '### Querying Columnstore structure


    Columnstore structures are the ideal option for reporting queries that use a smaller
    subset of columns and need to scan a large percent of the table. An example of
    the query that might get huge performance boost is shown in the following sample:


    ```

    SELECT State, AVG(Price)

    FROM Products

    WHERE State IN (''Available'', ''In Stock'')

    GROUP BY State

    ```


    Let’s imagine that the table in the example has six compressed row groups with
    five columns (five column segments per each row group).


    The most important optimization that Columnstore format enables is the column
    segment elimination. Azure SQL can determine what column segments are not necessary
    for query processing even before the query processing starts using the following
    rules:


    *   Column segments that belong to the columns that are not used in the query
    are ignored.


    *   Column segments that don’t have the values required in the query are ignored.


    Using these rules, Azure SQL might discard most of the column segments as it is
    shown in Figure [9-3](#493913_1_En_9_Chapter.xhtml#Fig3).


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig3_HTML.jpg](images/493913_1_En_9_Chapter/493913_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Columnstore will discard column segments that are not needed for the query (red)
    and column segments that don’t contain data required by query (orange)


    The columns `Id`, `Date`, and `Tax` are not used in the query, so Azure SQL will
    not even load them into the memory if they are still on disk. This way, we are
    reducing the required IO and memory footprint to 40% because three of five column
    segments are ignored.


    Each column segment contains some statistics about the values in the segment (e.g.,
    min-max values). Azure SQL knows what column segments contain the values `Available`
    and `In Stock`. Let’s imagine that these values appear only in three row groups
    out of six row groups. Azure SQL will discard `State` column segments that don’t
    contain the values used in the query and related `Price` column segment from the
    same row groups. This way, Azure SQL will discard another half of the data without
    even starting the query. These optimizations have a huge effect if most of the
    data is stored in compressed column segments and not in Deltastore.


    Imagine that the dataset used in this example initially had 100GB. Under assumption
    that columnstore structure can have 10x compression and that column segment elimination
    can discard 80% of data before query starts, we are getting 2GB that should be
    processed instead of full table scan. This is a huge reduction of required IO
    and memory for the query that can boost performance up to 50x.


    Another important optimization is batch query processing. Azure SQL will leverage
    underlying hardware SIMD instructions and apply a small number of operations on
    large vectors of data. The vectors of data are column segments containing the
    continuous range of values. This hardware acceleration in a batch mode processing
    significantly improves performance of the queries and is completely transparent
    to the query and thus to the application using it. The query will just run faster.


    ### Clustered Columnstore indexes


    Clustered Columnstore Indexes (CCI) are tables organized in Columnstore format.
    We can create a Columnstore index right when creating a table:


    ```

    CREATE TABLE Sales.Orders (


    INDEX cci CLUSTERED COLUMNSTORE

    )

    ```


    Or even on existing tables:


    ```

    CREATE CLUSTERED COLUMNSTORE INDEX cci ON Sales.Orders

    ```


    We are using CCI to store highly compressed data with dominant read and massive
    (bulk load) insert workload patterns. This workload pattern is very common in
    data warehouses, and this is the reason why CCI is a very common structure in
    modern data warehousing scenarios. However, CCI is applicable in any scenario
    where you are going to append and analyze data, such as IoT scenarios.


    CCI boosts performance of reporting and analytic queries using compression and
    batch mode execution, which are the primary benefits of Columnstore format.


    One CCI-specific optimization is very helpful to improve bulk load performance:
    in the previous section, it was described that loading 102,400 rows will have
    special treatment and directly compress all incoming data. This direct compression
    might boost performance of your data load process because any data pages that
    must be saved to disk will be immediately compressed. Smaller inserts land in
    the delta store where they are buffered before they are compressed and moved to
    a compressed Columnstore area. If your workload produces many open row groups
    that don’t meet criterion for closing, you can merge them using the following
    statement:


    ```

    ALTER INDEX cci ON Sales.Orders REORGANIZE

    ```


    CCI reorganize operation is a lightweight non-blocking operation that will merge
    and compress open delta row groups without major impact on your workload.


    ### Nonclustered Columnstore indexes


    Nonclustered Columnstore Indexes (NCCI) are indexes organized in Columnstore format
    that are created on top of Hobits. This makes Azure SQL pretty unique in the market,
    as it allows the co-existence of both Columnstore and Rowstore indexes on the
    same table. Figure [9-4](#493913_1_En_9_Chapter.xhtml#Fig4) shows a classic rowstore
    table with seven columns and additional columnstore structure where we extracted
    the values from three columns and compressed them into columnar format.


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig4_HTML.png](images/493913_1_En_9_Chapter/493913_1_En_9_Fig4_HTML.png)


    Figure 9-4


    Classic rowstore table with additional Columnstore index (NCCI) built on top of
    the tree columns from this table


    The main purpose of NCCI is to optimize analytical and reporting queries on the
    subset of columns in the existing rowstore tables without changing the original
    table structure.


    NCCI can be created in a table using the following definitions:


    ```

    CREATE TABLE dbo.Sales (


    INDEX ncci NONCLUSTERED COLUMNSTORE (Price, Quantity, SalesID)

    )

    ```


    With NCCI on top of classic tables, you are enabling Azure SQL to choose the optimal
    format for either transactional or analytical queries:


    *   If you run some query that selects a single row or small set of rows, Azure
    SQL will use the underlying rowstore table. Database will leverage index seek
    or range scan operations that are the perfect fit for this scenario.


    *   If you run some report that scans the entire table and aggregates data, Azure
    SQL will read information from NCCI index, leveraging column segment elimination
    and batch mode execution to quickly return process all table.


    Any update, delete, or insert will immediately end up in the underlying rowstore
    table, and NCCI will be updated via Deltastore. This double update might slow
    down your transactional workload, but this should be acceptable if you need to
    make a trade-off between boosting reporting capabilities on a table and speed
    of transactional statements.'
  trans: "### 查询列存储结构\n\n列存储结构是处理报告查询的理想选择，这类查询使用较少的列子集，但需要扫描表中的大部分数据。以下示例展示了一个可能获得巨大性能提升的查询：\n\
    \n```sql\nSELECT State, AVG(Price)\nFROM Products\nWHERE State IN ('Available',\
    \ 'In Stock')\nGROUP BY State\n```\n\n假设示例中的表有六个压缩行组，每个行组包含五列（即每个行组有五个列段）。\n\n\
    列存储格式实现的最重要优化是列段消除。Azure SQL 可以在查询处理开始之前，使用以下规则确定哪些列段对查询处理是不必要的：\n\n*   查询中未使用的列所对应的列段将被忽略。\n\
    *   不包含查询所需值的列段将被忽略。\n\n利用这些规则，Azure SQL 可能会丢弃大部分列段，如图 9-3 所示。\n\n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig3_HTML.jpg](img/493913_1_En_9_Fig3_HTML.jpg)\n\
    \n图 9-3\n\n列存储将丢弃查询不需要的列段（红色）以及不包含查询所需数据的列段（橙色）\n\n列 `Id`、`Date` 和 `Tax` 未在查询中使用，因此如果它们仍在磁盘上，Azure\
    \ SQL 甚至不会将其加载到内存中。通过这种方式，我们将所需的 I/O 和内存占用减少到 40%，因为五个列段中有三个被忽略了。\n\n每个列段都包含有关段中值的一些统计信息（例如，最小值-最大值）。Azure\
    \ SQL 知道哪些列段包含值 `Available` 和 `In Stock`。假设这些值仅出现在六个行组中的三个行组中。Azure SQL 将丢弃不包含查询所用值的\
    \ `State` 列段，以及来自相同行组的相关 `Price` 列段。这样，Azure SQL 甚至在开始查询之前就又丢弃了一半的数据。如果大部分数据存储在压缩的列段中而不是增量存储中，这些优化将产生巨大效果。\n\
    \n假设此示例中使用的数据集初始大小为 100GB。假设列存储结构可以实现 10 倍压缩，并且列段消除可以在查询开始前丢弃 80% 的数据，那么我们需要处理的数据量为\
    \ 2GB，而不是全表扫描。对于查询来说，这是所需的 I/O 和内存的大幅减少，可以将性能提升高达 50 倍。\n\n另一个重要的优化是批处理查询。Azure\
    \ SQL 将利用底层硬件的 SIMD 指令，对大量数据向量应用少量操作。这些数据向量是包含连续值范围的列段。这种硬件加速的批处理模式显著提高了查询性能，并且对查询以及使用它的应用程序是完全透明的。查询只会运行得更快。\n\
    \n### 聚集列存储索引\n\n聚集列存储索引 (`CCI`) 是以列存储格式组织的表。我们可以在创建表时直接创建列存储索引：\n\n```sql\nCREATE\
    \ TABLE Sales.Orders (\n    INDEX cci CLUSTERED COLUMNSTORE\n)\n```\n\n甚至可以在现有表上创建：\n\
    \n```sql\nCREATE CLUSTERED COLUMNSTORE INDEX cci ON Sales.Orders\n```\n\n我们使用\
    \ `CCI` 来存储高度压缩的数据，其工作负载模式以读取和大量（批量加载）插入为主。这种工作负载模式在数据仓库中非常常见，因此 `CCI` 是现代数据仓库场景中非常常见的结构。然而，`CCI`\
    \ 适用于任何需要追加和分析数据的场景，例如物联网场景。\n\n`CCI` 利用压缩和批处理模式执行来提升报告和分析查询的性能，这是列存储格式的主要优势。\n\
    \n`CCI` 特有的一个优化对提高批量加载性能非常有帮助：前文提到，加载 102,400 行将得到特殊处理，并直接压缩所有传入数据。这种直接压缩可以提升数据加载过程的性能，因为任何需要保存到磁盘的数据页都会立即被压缩。较小的插入操作会进入增量存储，在那里缓冲，然后被压缩并移动到压缩的列存储区域。如果您的工作负载产生了许多不符合关闭标准的打开行组，可以使用以下语句合并它们：\n\
    \n```sql\nALTER INDEX cci ON Sales.Orders REORGANIZE\n```\n\n`CCI` 重组操作是一种轻量级的非阻塞操作，它将合并和压缩打开的增量行组，而不会对您的工作负载产生重大影响。\n\
    \n### 非聚集列存储索引\n\n非聚集列存储索引 (`NCCI`) 是在 Hobits 之上创建的、以列存储格式组织的索引。这使得 Azure SQL\
    \ 在市场上相当独特，因为它允许在同一张表上同时存在列存储和行存储索引。图 9-4 展示了一个经典的行存储表，包含七列，以及一个额外的列存储结构，其中我们提取了三列的值并将其压缩为列式格式。\n\
    \n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig4_HTML.png](img/493913_1_En_9_Fig4_HTML.png)\n\
    \n图 9-4\n\n带有额外列存储索引 (`NCCI`) 的经典行存储表，该索引建立在此表的三列之上\n\n`NCCI` 的主要目的是优化现有行存储表中列子集上的分析和报告查询，而无需更改原始表结构。\n\
    \n可以使用以下定义在表中创建 `NCCI`：\n\n```sql\nCREATE TABLE dbo.Sales (\n    INDEX ncci NONCLUSTERED\
    \ COLUMNSTORE (Price, Quantity, SalesID)\n)\n```\n\n通过在经典表上创建 `NCCI`，您可以让 Azure\
    \ SQL 为事务型或分析型查询选择最佳格式：\n\n*   如果运行选择单行或少量行的查询，Azure SQL 将使用底层的行存储表。数据库将利用索引查找或范围扫描操作，这非常适合此场景。\n\
    *   如果运行扫描整个表并聚合数据的报告，Azure SQL 将从 `NCCI` 索引中读取信息，利用列段消除和批处理模式执行来快速处理整个表。\n\n\
    任何更新、删除或插入操作都会立即反映在底层的行存储表中，而 `NCCI` 将通过增量存储进行更新。这种双重更新可能会减慢您的事务型工作负载，但如果需要在提升表的报告能力和事务型语句速度之间做出权衡，这应该是可以接受的。"
- fmt: '## Memory-optimized tables


    Azure SQL has memory-optimized tables that might extremely improve performance
    and the scalability of your OLTP workload. The main purpose of memory-optimized
    tables is to improve CRUD-like operations like selecting a few rows or updating
    or deleting existing rows.


    Some people assume that keeping the rows always in memory is the key factor that
    improves performance. However, this is a naïve assumption that in many cases is
    far from the real reason.


    Azure SQL always works with rows that are placed in memory. It has an excellent
    mechanism for caching data in memory (called `Buffer Pool`), picking the most
    important data that should be fetched from disk, and smartly evicting the rows
    that should not be needed in the near future to make space for more likely-to-be-used
    rows. If your database is smaller than memory, all rows will probably be in RAM,
    so you will already have an “in-memory database.” So, the question is what kind
    of additional “memory optimization” do we get with the memory-optimized tables?


    Let’s first see how a regular table works and how disk and memory are used during
    query processing. The core query processing assumptions are based on the following
    premises:


    *   As mentioned before, all data stored in the database is memorized on disk
    using `8KB` data structures called pages. A `10GB` uncompressed database will
    have something like a million data pages at minimum.


    *   Every time a row is accessed, the related data page is loaded in memory. Azure
    SQL will try to keep as many data pages in memory as possible. This memory section
    is called the `Buffer Pool`.


    *   `Buffer Pool` cannot cache all data if the database is bigger than the available
    memory, and thus the pages must be fetched from disk and persisted back to disk
    if they are changed. Every page is read or written as an atomic `8KB` unit. Sometimes,
    databases can read bigger chunks of disk with a single IO operation (so-called
    read-ahead operations) to optimize IO performances.


    *   The most expensive operation in a query is transferring `8KB` pages between
    memory and disk.


    *   Data transfer between memory and disk should be minimized. The database engine
    should do its best to prevent unnecessary IO interactions.


    Azure SQL must orchestrate workload to minimize number of IO operations. Let’s
    look at the two threads/queries updating the rows on two `8KB` pages. We need
    to decide how to isolate this change from the other queries until the change is
    confirmed (committed). We have two approaches to handle concurrency:


    *   *Pessimistic* where we are blocking other threads that would like to access
    rows already modified by another thread, until the modifying thread decides to
    save or reject the changes.


    *   *Optimistic* where we let other threads access the original version of the
    modified rows. We need to make a copy of the rows that will then be a “private
    version” available only to the current thread, while others are accessing the
    original row.


    Ideally, we should be optimists because a pessimistic approach blocks other threads,
    which mean less performances, concurrency, and scalability. But we need to be
    aware of pros and cons of both approaches.


    ### A story about optimistic concurrency


    Let’s see how the database processes updates with optimistic concurrency. An example
    of two rows on the same `8KB` page that are changed by two threads (or transactions)
    `Tx[1]` and `Tx[2]` and another thread `Tx[3]` with optimistic concurrency is
    shown in Figure [9-5](#493913_1_En_9_Chapter.xhtml#Fig5). For every change, we
    need to create a new version of the row that will be a private copy for the thread
    that changed it. Copies will stay private until the transaction commits the changes
    and makes the updated version available to everyone. In the meantime, other transactions
    should keep using the original version of the row available in the original page.


    ![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig5_HTML.png](images/493913_1_En_9_Chapter/493913_1_En_9_Fig5_HTML.png)


    Figure 9-5


    Creating new versions of updated rows for every transaction that makes the changes


    Once `Tx[1]` commits the changes on row 1, the easiest thing that Azure SQL can
    do is to declare the old data page as invalid and use the new page. Because it
    would be hard to copy part of the page back to the original `8KB` page. `Tx[2]`,
    which was also working on a private copy of row 1, would not be able to commit
    its own row because it updated a version that is not valid anymore. Once `Tx[2]`
    tries to commit the change, it will be rolled back and would need to retry the
    operation with latest valid data. This might be expected because both transactions
    tried to update rows without locking it exclusively. If there is a collision,
    retry is the only solution. In addition to this, there is also another, maybe
    unexpected, side effect. `Tx[3]` would not be able to commit its own row changes,
    even if those were done on a row different than row 1, and thus didn’t clash with
    the row 1 updated by `Tx[1]`. Since the binary content is changed and maybe the
    page is split into two new pages, Azure SQL cannot easily get the binary content
    of the changed row from a new valid page. Therefore, this transaction will be
    rolled back too.


    In addition, there is a performance impact of creating new pages with temporary
    rows. Azure SQL has a background process called “`Checkpoint writer`” that saves
    modified memory pages to underlying storage. If we get a lot of temporary pages,
    they would be saved on disk, and then after rollback, original content must be
    saved again. In this case, temporary generated pages would cause more damage and
    we might want to prevent this.


    ### Should we be pessimists?


    Since the `8KB` page is the main unit of data transfer, transactions that update
    the rows might take a lock on the entire page and prevent others making changes
    that would very likely be rolled back and cause additional IO. Locking mechanisms
    are pessimistic approaches that help to prevent damage, due to *race conditions*
    , that concurrent queries might cause on a single page.


    As you learned in Chapter [7](#493913_1_En_7_Chapter.xhtml), usually the database
    prevents the risk of having too many IO operations by using pessimistic concurrency
    control. Every transaction is taking locks or latches (latch is just a more lightweight
    version of lock) to ensure that one version of a potentially shared row or data
    page is exclusively dedicated to the thread that is modifying it. Other threads
    that want to change data on the same page are temporarily blocked by row locks
    or page latches while another thread is modifying it. Threads cannot modify the
    same rows and they are blocked. This way, we avoid a need to create new pages
    and cause additional IO, but we are decreasing concurrency and affecting performance.


    Now, let’s imagine that we can forget about disk IO and that we don’t have `8KB`
    pages that would need to be persisted even for the temporary changes. We could
    use high, optimistic concurrency that uses just inexpensive memory copy operations
    and easily generate new row versions. This is possible only if we can be sure
    that table data will be placed in memory without data transfer between `Buffer
    Pool` and disk storage and that there is no `8KB` container that causes dependency
    between rows. Memory-optimized tables provide these guarantees.


    Memory-optimized tables are the tables where we know that data will be in memory
    so we can apply optimistic concurrency and allow a large number of concurrent
    updates. This is the main advantage of memory-optimized technology and the key
    differentiator compared to classic Hobits.'
