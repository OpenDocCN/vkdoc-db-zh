    \ 27）的累计总和，从逻辑角度来看，Azure SQL 必须获取`Quantity`列所有前几行的值并将它们相加。计算第四行及后续行的`Running Total`值时也是如此。\n\
    \n这些需要考虑的额外行代表了 Azure SQL 正在操作的数据*窗口*。对于累计总和，该窗口从表的第一行开始，到当前行结束。\n\n一旦定义了窗口，你就可以告诉\
    \ Azure SQL 你想在该窗口可用的数据上使用哪个函数。像`SUM`这样的聚合函数很常见。实际上，`SUM`正是你实现累计总和所需要的。生成上图中结果的代码如下：\n\
    \n```sql\nSELECT\n    [OrderLineID],\n    [Description],\n    [Quantity],\n  \
    \  SUM(Quantity) OVER (ORDER BY [OrderLineID] ROWS BETWEEN UNBOUNDED PRECEDING\
    \ AND CURRENT ROW) AS RunningTotal\nFROM\n    [Sales].[OrderLines]\nWHERE\n  \
    \  [OrderID] = 37\n```\n\n另一个常见的聚合函数是`AVG`，它将为你提供计算移动平均值的简便方法。你只需要定义用于计算平均值的窗口大小，例如：\n\
    \n```sql\nAVG(Quantity) OVER (ORDER BY [OrderLineID] ROWS BETWEEN 2 PRECEDING\
    \ AND CURRENT ROW) AS MovingAvg\n```\n\n窗口的大小被称为*帧*。除了聚合函数，你还可以使用*分析函数*，这极大地增强了窗口函数的能力。例如，你可以使用函数`LAG`来访问存在于当前行之前的行中的值。同样，一个实际的例子会让这一点非常容易理解。假设你想计算特定客户的两个连续订单之间经过了多少时间。\n\
    \n![图 4-7：计算订单之间的天数差](img/493913_1_En_4_Fig6_HTML.jpg)\n\n对于每一行，你需要访问前一行，获取订单日期，并将其与当前行的日期进行比较。得益于窗口函数，这非常容易：\n\
    \n```sql\nSELECT\n    [OrderID],\n    [OrderDate],\n    DATEDIFF(\n        [DAY],\n\
    \        LAG(OrderDate, 1) OVER (ORDER BY [OrderDate]),\n        [OrderDate]\n\
    \    ) AS ElapsedDays\nFROM\n    [Sales].[Orders]\nWHERE\n    [CustomerID] = 832\n\
    ORDER BY\n    [OrderDate]\n```\n\n这是一段非常简单而优雅的代码，Azure SQL 引擎也能很好地优化它；它还为你节省了原本需要编写的大量代码。\n"
- fmt: 'So far, we focused on usage of just one specific Customer Id or Order Id.
    But, going back to the running total sample, what if we want to calculate the
    running total for all the orders in the entire table? Of course, we don’t want
    to mix lines of Order Id 37 with Order Id 39. Windowing function can take care
    of this for us too. We just need to specify how to *partition* the calculation
    process. In this context, partitioning allows us to tell Azure SQL when it should
    start a new calculation from scratch. You can think of it as something like “as
    long as you are processing values that belong to the same group, keep accumulating
    values.” Let’s modify the running total sample to use two orders instead of only
    one.


    ![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig7_HTML.jpg](images/493913_1_En_4_Chapter/493913_1_En_4_Fig7_HTML.jpg)


    Figure 4-8: Partitioning calculations per order


    As you can see, the running total must start from scratch again once the Order
    ID changes from 37 to 39, since we want to calculate the Running Total for each
    order.


    The code to do so is very similar to the original one, just with the addition
    of `PARTITION BY [OrderID],` that tells Azure SQL to keep accumulating values
    as long as the value in the `OrderID` column doesn’t change. When it changes,
    then Azure SQL must start a new calculation:


    ```sql

    SELECT

    [OrderID],

    [OrderLineID],

    [Description],

    [Quantity],

    SUM(Quantity) OVER (

    PARTITION BY [OrderID]

    ORDER BY [OrderLineID] ROWS BETWEEN

    UNBOUNDED PRECEDING AND

    CURRENT ROW

    ) AS RunningTotal

    FROM

    [Sales].[OrderLines]

    WHERE

    [OrderID] in (37, 39)

    ```


    Windowing functions can help a lot in both simplifying your code and having great
    performances, and we just have seen a very small part of what they can do, so
    make sure to check them out and to use them whenever appropriate.


    ## Bulk operations


    If you need to load *a lot* of data into Azure SQL, where a lot means hundreds
    of thousands, millions, or even billions of rows, you need to use a specific API
    called Bulk Copy API. As it allows only to insert data into a destination table,
    it is sometimes also referred to as Bulk Insert API or Bulk Load API.


    This API is directly called by client libraries, and it allows you to massively
    load data with extreme speeds, easily loading tens of thousands of rows, and more,
    per second. Of course, I’m talking of performances within Azure, from a Web API
    application or a VM to the Azure SQL database being used in the back end. If the
    API or the application is in another cloud or running on premises, the speed at
    which you can load data will depend on the local network speed.


    To run a bulk load, .NET provides the `SqlBulkCopy` class, while Java has the
    `SQLServerBulkCopy` class. Here’s an excerpt of a sample written using .NET:


    ```csharp

    using(var conn = new SqlConnection(Environment.GetEnvironmentVariable("CS_AzureSQL")))

    {

    conn.Open();

    var bc = new SqlBulkCopy(conn)

    bc.DestinationTableName = "dbo.BulkLoadedUsers";

    bc.BatchSize = 10000;

    bc.WriteToServer(userDataTable);

    }

    ```


    Just to give you an idea of how fast this is, and you can test it yourself as
    the sample is part of code accompanying the book, if executed from an Azure VM
    in the same region of the database you are loading data into, it will load 100,000
    rows in 0.91 seconds or 110,000 rows per second, even using a small `BC_Gen5_2`
    database. Guess we can call it *fast*, right?


