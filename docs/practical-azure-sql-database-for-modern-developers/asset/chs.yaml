  *   `SQL Server 关系数据库设计与实现专业指南` – [`www.amazon.com/Server-Relational-Database-Design-Implementation-ebook/dp/B01MR14K06`](http://www.amazon.com/Server-Relational-Database-Design-Implementation-ebook/dp/B01MR14K06)\n\
  *   `数据库管理实践问题：面向思考型从业者的参考书` – [`www.amazon.com/Practical-Issues-Database-Management-Practitioner/dp/0201485559`](http://www.amazon.com/Practical-Issues-Database-Management-Practitioner/dp/0201485559)\n\
  *   `数据库设计与关系理论：范式及其他` – [`www.amazon.com/Database-Design-Relational-Theory-Normal-ebook/dp/B082X1B6WP`](http://www.amazon.com/Database-Design-Relational-Theory-Normal-ebook/dp/B082X1B6WP)\n\
  \n# 5. 使用 Azure SQL 进行开发 – 高级篇\n\n在讨论了查询和操作数据的基础方面之后，现在是时候关注 Azure SQL 中更高级和以开发为中心的功能了。如果你已经瞥过本章内容，可能会惊讶地发现有一个关于安全性的完整章节。不必惊讶。安全性不是像事后想法那样可以在后期添加的东西，不是那种“有也不错但非核心”的功能。相反，安全*性*与性能和可维护性同等重要，必须从一开始就被纳入考量。因此，Azure\
  \ SQL 为你提供的保障数据安全的选项，对于任何想要创建现代应用程序的人来说都是必须了解的——之所以称为现代，不仅是因为它可扩展和模块化，更是因为它也是安全的。\n\
  \n## 可编程性\n\n作为一名开发人员，你已经知道能够重用和封装现有代码是多么重要。Azure SQL 提供了广泛的选项，你可以使用这些选项来确保你的 SQL\
  \ 代码干净、清晰、易于维护且可重用。\n\n\n\n## 变量\n\nT-SQL 中有两种类型的变量：标量变量和表变量。标量变量就是你在其他编程语言中习惯使用的普通变量。变量必须显式声明，其名称以字符“@”开头，并且必须指定类型：\n\
  \n```sql\nDECLARE @i INT = 42;\nDECLARE @name NVARCHAR(50) = N'John';\nSELECT @i\
  \ AS FamousNumber, @name AS CommonName;\n```\n\nT-SQL 不支持数组、列表或字典，但如果你需要在变量中存储多个值，可以使用表变量：\n\
  \n```sql\nDECLARE @t AS TABLE (\n[Id] INT NOT NULL,\n[Name] NVARCHAR(50) NOT NULL\n\
  );\nINSERT INTO @t VALUES (42, N'John');\nSELECT * FROM @t;\n```\n\n有一个在初学时可能会让人感到惊讶的行为，它与其他编程语言中的变量管理方式截然不同，那就是\
  \ Azure SQL 如何管理变量的**作用域**。变量的作用域是某个 `批处理` 或某个对象。对于对象而言，理解作用域很容易，因为 T-SQL 的行为与其他任何编程语言完全一样。在\
  \ `存储过程`、`触发器` 或 `函数` 内部定义的变量，其作用域将仅限于该对象。\n\n而在对象外部定义的变量，其作用域则是 `批处理`。一个 `批处理`\
  \ 是一起执行的一组 T-SQL 语句。在前面的代码示例中，你必须将所有三个语句（`DECLARE`、`INSERT` 和 `SELECT`）放在一起执行；否则，代码将无法工作。如果你尝试单独执行\
  \ `DECLARE` 语句，它是可以工作的，但一旦执行完毕，变量就消失了。如果你接着尝试执行 `INSERT` 语句，你将会收到一个错误，提示变量 `@t`\
  \ 未定义。\n\n表变量通常只在非常特定的场景下使用，因为它们可能对性能产生相当大的影响，而且通常不应包含太多行。需要注意的是，这与内存消耗或类似问题无关：问题在于表变量介于两个世界——变量和表——之间，因此\
  \ Azure SQL 引擎无法像优化常规表那样优化对其数据的访问。如果你想了解更多细节，请参阅本章末尾的内容。一般来说，如果你需要一个临时位置来存储部分数据，请改用临时表。\n\
  \n## 临时表\n\n尤其是在创建分析解决方案时，你可能（甚至相当频繁地）需要将处理后的数据临时存储在某个地方，以便稍后对其进行处理。有时，将一个非常复杂的查询拆分成几个较小的查询也很有帮助，这时你需要一个地方来存储某个查询的结果，以便另一个查询可以获取它进行进一步处理。\n\
  \n临时表正是为解决这类情况而设计的。你可以使用标准的 `CREATE TABLE` 命令来创建临时表。只要表名以井号字符（`#`）开头，该表就是临时的：\n\n\
  ```sql\nCREATE TABLE #t\n(\n[Id] INT NOT NULL,\n[Name] NVARCHAR(50) NOT NULL\n);\n\
  ```\n\n“临时”意味着它将一直存在，直到被 `DROP` 命令手动销毁，或者直到它超出其作用域。对于 `存储过程` 或 `触发器`，作用域是创建该临时表的\
  \ `存储过程` 或 `触发器` 的生命周期。一旦 `存储过程` 或 `触发器` 执行完毕，临时表就会被销毁。\n\n使用 `SELECT INTO` 语句可以快速“创建并填充”一个包含查询结果的临时表：\n\
  \n```sql\nSELECT\n[OrderLineID],\n[Description],\n[Quantity]\nINTO\n#Order37\nFROM\n\
  [Sales].[OrderLines]\nWHERE\n[OrderID] = 37;\n```\n\n一个名为 `#Order37` 的临时表将被创建，系统会自动推断列名和类型，并用与指定订单相关的\
  \ `[Sales].[OrderLines]` 表中的所有行来填充它。\n\n临时表受益于 Azure SQL 能够进行的特殊优化，因为它知道这些表本质上就是临时的。如果你需要临时存放数据，请确保使用它们而不是常规表。\n\
  \n\n### 视图\n\n视图可能是可用于重用代码和封装数据处理逻辑的最简单选项。视图不过是一个查询定义，被赋予名称，并可以作为表来使用。事实上，视图也被称为\
  \ `虚拟表`，尽管这个名称很少使用。\n\n视图对于代码重用很有用，同时也有助于保障数据访问的安全，并通过抽象对底层表的访问来保持与现有应用程序的向后兼容性。\n\
  \n#### 代码重用与性能\n\n第一点相当显而易见：与其编写包含 `JOIN`、窗口函数以及 Azure SQL 提供的所有优点的复杂查询，不如将查询定义保存为视图，然后通过执行更简单的代码来调用它。例如，让我们创建一个视图来封装计算累计总计的逻辑：\n\
  \n```sql\nCREATE OR ALTER VIEW [Sales].[OrderLinesRuninngTotal]\nAS\nSELECT\n  \
  \  [OrderID],\n    [OrderLineID],\n    [Description],\n    [Quantity],\n    SUM(Quantity)\
  \ OVER (\n        PARTITION BY [OrderID]\n        ORDER BY [OrderLineID] ROWS BETWEEN\n\
  \        UNBOUNDED PRECEDING AND\n        CURRENT ROW\n    ) AS RunningTotal\nFROM\n\
  \    [Sales].[OrderLines];\nGO\n```\n\n现在，你可以使用这个更简单的代码执行相同的查询：\n\n```sql\nSELECT\n\
  \    OrderID,\n    [OrderLineID],\n    [Description],\n    [Quantity],\n    [RunningTotal]\n\
  FROM\n    [Sales].[OrderLinesRuninngTotal];\n```\n\n执行的查询将与不使用视图而直接执行查询代码时 `完全一样`。更准确地说，视图主体会被“展开”并与查询主体合并。例如，实际上，如果你编写类似这样的代码：\n\
  \n```sql\nSELECT\n    OrderID,\n    [OrderLineID],\n    [Description],\n    [Quantity],\n\
  \    [RunningTotal]\nFROM\n    [Sales].[OrderLinesRuninngTotal]\nWHERE\n    [OrderID]\
  \ IN (41, 42, 43);\nGO\n```\n\n`GO` 不是 `T-SQL` 命令或关键字。`GO` 是由工具（如 `SQL Server Management\
  \ Studio` 或 `Azure Data Studio`）识别的关键字，用于通知工具两组 `T-SQL` 语句（通常称为批处理）必须 `单独` 且 `独立`\
  \ 地执行（但并非并行执行！）。某些命令（例如许多 `CREATE` 语句）需要这样做，以便你可以告诉所使用的工具一个视图主体何时结束，以及另一个可能与该视图无关的命令何时开始。\n\
  \nAzure SQL 的行为就像是可以 `推送` `WHERE` 子句到视图中并应用过滤器，以便仅对请求的订单计算累计总计。更准确地说，真正发生的情况是视图被\
  \ `展开` 并与使用它的查询合并。这使得 Azure SQL 可以作为一个整体来优化查询，从而避免，例如，仅仅遵循优先顺序——那将需要为 `所有` 订单计算累计总计，然后删除所有不在查询范围内的行。正如你所想，那样做效率极低。通过遵循此优化过程，视图可以利用外部查询中使用的所有过滤器（在合理的情况下），从而尽可能减少其必须操作的行数，提供更好的性能和更少的资源使用。\n\
  \n#### 安全性\n\n安全性是视图有用的另一个原因：你可以授予某人对视图的访问权限，同时拒绝该用户对视图所用表的访问。这意味着你可以确保用户只能看到查询的结果，而不能看到用于创建该结果的底层表中存储的值。\n\
  \n#### 抽象与兼容性\n\n利用视图的最后一个原因是，它们通过创建一个间接层来帮助抽象对表的访问，从而使你的应用程序和数据库保持松散耦合，为你提供灵活性，让你可以对数据库进行更改而不一定会破坏任何正常工作的应用程序：视图可以用作与现有应用程序向后兼容的接口。你可以自由地重构数据库并使其设计朝着你想要的新方向发展，并且无需担心会引入任何破坏性更改。\n\
  \n可以使用 `DROP VIEW` 命令删除视图：\n\n```sql\nDROP VIEW [Sales].[OrderLinesRuninngTotal];\n\
  ```\n\n\n## 函数\n\nAzure SQL 中的函数分为两类：返回表的函数和返回标量值的函数。除了这个区别，它们与您可能预期的非常相似，因为正如其名所示，它们就是*函数*。它们允许您封装和重用代码及处理逻辑，可以接受参数并返回结果。\n\
  \n由于 Azure SQL 内置了许多系统函数，例如 `STRING_SPLIT`，用户创建的函数通常被称为用户定义函数或简称 UDF。\n\n返回表的函数通常被称为表值函数或简称\
  \ TVF；因此，它们可以在任何可以使用表的地方使用，例如：\n\n```sql\nSELECT\n    [OrderID],\n    [OrderDate],\n\
  \    [TotalQuantity],\n    [TotalValue]\nFROM\n    dbo.GetOrderTotals;\n```\n\n\
  如果一个 TVF 仅由一个 `SELECT` 语句组成，它就变得与视图非常相似，只是它支持参数。像视图一样，这样的函数可以被展开并与使用它的查询合并（这个过程通常被称为*内联*），从而可以利用更好的优化。为了具备这种*内联*能力，这些\
  \ TVF 被称为内联表值函数：\n\n```sql\nCREATE OR ALTER FUNCTION dbo.GetOrderTotals(@FromOrderId\
  \ AS INT, @ToOrderID AS INT)\nRETURNS TABLE\nAS\nRETURN\n    WITH cte AS (\n   \
  \     SELECT\n            [OrderId],\n            SUM([Quantity]) AS TotalQuantity,\n\
  \            SUM([Quantity] * [UnitPrice]) AS TotalValue\n        FROM\n       \
  \     [Sales].[OrderLines]\n        WHERE\n            [OrderId] BETWEEN @FromOrderId\
  \ AND @ToOrderID\n        GROUP BY\n            [OrderId]\n    )\n    SELECT\n \
  \       o.[OrderId],\n        o.[OrderDate],\n        ol.[TotalQuantity],\n    \
  \    ol.[TotalValue]\n    FROM\n        cte ol\n        INNER JOIN\n           \
  \ [Sales].[Orders] o ON [ol].[OrderID] = [o].[OrderID];\nGO\n```\n\n由多个 `SELECT`\
  \ 语句组成的表值函数称为多语句表值函数，虽然它比内联 TVF 提供更大的灵活性，但当被其他查询调用时，它的优化程度较低。因此，仅应在没有其他选项可用时才使用它，因为它可能对性能产生显著影响。\n\
  \n另一方面，是标量函数。它们只返回单个值。其主体中使用的代码可以任意复杂，甚至可以包含多个 `SELECT` 语句，但在执行结束时，必须且只能返回一个标量值。\n\
  \n虽然标量函数可能会给人一种你会尽可能多地使用的感觉，特别是如果你习惯于命令式编程语言，但在你想要创建和使用新的标量函数时，你应该三思。原因很简单，并且与这样一个事实有关：对一组数据应用一个操作通常比为集合中的每个数据点（在关系数据库中是行）执行该操作要高效得多。如果你创建一个标量函数并用它来处理查询返回的值，你就是在强制\
  \ Azure SQL 为返回的每一行执行该函数。每次函数调用都有其自身的开销，再加上 Azure SQL 查询优化器在优化你的代码时空间有限，因为它必须为每一行执行函数。性能会大受影响。事实上，每当数据库被迫逐行处理数据而不是处理数据集时，人们称之为\
  \ RBAR（Row-By-Agonizing-Row，逐行痛苦处理），这并非偶然。所以，要谨慎使用标量 UDF。好的一面是，近年来，微软研究发现了一些巧妙的方法，可以将标量函数内部的代码*重写*为更可优化的代码，但即便如此，如果你能从一开始就写出不需要\
  \ RBAR 的代码，你就能立即帮助优化器，而无需等待微软的研究，从而立即获得更好的性能。\n\n可以使用 `DROP FUNCTION` 命令删除函数：\n\n\
  ```sql\nDROP FUNCTION dbo.GetOrderTotals;\n```\n\n## 存储过程\n\n存储过程正如其名：存储在数据库中的过程，可以通过按名称调用来执行。存储过程可以有参数，可以返回单个标量值，并且可以返回零个、一个或多个结果集。\n\
  \n它们提供了一种极其强大的方式来封装复杂性、重用代码和创建抽象层：它们可用于创建 API 接口——一种契约——可以保护用户免受数据库生命周期中发生的任何更改或演变的影响。除此之外，存储过程还提供了其他有趣的好处。\n\
  \n像许多其他用于轻松保护数据访问的可编程性特性一样，存储过程也可用于此目的。用户可以被授权执行存储过程，但可能被拒绝直接访问底层表或视图。这一点，特别是如果你正在创建面向公众的应用程序（如\
  \ API 或 Web 应用），至关重要，因为你可以确保，无论如何，通过该解决方案访问数据库的用户只能通过你为此目的创建的存储过程来访问数据。即使由于某种原因，用户能够绕过你的中间层或\
  \ Web 应用直接访问数据库，他或她也无法做存储过程允许之外的任何事情。这是一个相当重要的观点，对于保持数据安全有巨大帮助。\n\n存储过程还有另一个重要好处。Azure\
  \ SQL 在首次调用存储过程后，将缓存*执行计划*（在其他数据库系统中也称为 DAG，即有向无环图），这是 Azure SQL 为生成查询结果而将执行的一系列步骤。你将在本书后面了解更多相关内容，但正如你可以想象的，特别是对于复杂查询，生成执行计划可能非常昂贵且消耗资源，因此缓存它将帮助\
  \ Azure SQL 节省 CPU 和时间，为你提供更好的整体性能，并为更高的可伸缩性释放资源，而不会产生额外成本。\n\n作为开发人员，存储过程将是你会乐于使用的东西，因为它们确实有助于创建非常清晰的关注点分离，保持代码整洁和完善，促进数据库和应用程序之间接口的清晰定义，并最终有利于良好的松散耦合架构。\n\
  \n一个存储过程可以包含你实现最复杂的数据处理过程所需的所有代码，它们使用 `EXEC`（或者如果你喜欢详细点，可以用 `EXECUTE`）命令调用：\n\n\
  ```sql\nCREATE OR ALTER PROCEDURE dbo.GetOrderForCustomer\n    @CustomerInfo NVARCHAR(MAX)\n\
  AS\nIF (ISJSON(@CustomerInfo) != 1) BEGIN\n    THROW 50000, '@CustomerInfo is not\
  \ a valid JSON document', 16\nEND\n    SELECT [Value] INTO #T FROM OPENJSON(@CustomerInfo,\
  \ '$.CustomerId') AS ci;\n    SELECT\n        [CustomerID],\n        COUNT(*) AS\
  \ OrderCount,\n        MIN([OrderDate]) AS FirstOrder,\n        MAX([OrderDate])\
  \ AS LastOrder\n    FROM\n        Sales.[Orders]\n    WHERE\n        [CustomerID]\
  \ IN (SELECT [Value] FROM #T)\n    GROUP BY\n        [CustomerID];\nGO\n```\n\n\
  在前面的代码中，存储过程需要一个字符串参数。经过简单的验证后，读取输入的 JSON 文档，并且只是为了模拟一个中间步骤，相关内容被保存到一个临时表中。之后，检索结果并返回给用户。创建的存储过程只需使用\
  \ `EXEC` 命令即可执行：\n\n```sql\nEXEC dbo.GetOrderForCustomer N'{\"CustomerId\": [106,\
  \ 193, 832]}';\n```\n\n存储过程内部的代码将被执行，并且将返回一个结果集，即由 `SELECT ... FROM Sales.[Order]`\
  \ 查询生成的那个。\n\n\n您可能在想，此时应该在何时使用函数，何时使用存储过程。这是个好问题！作为一般性指导，请记住，尽管函数功能强大，尤其是内联表值函数，但它们也有相当多的限制和约束。因此，除非您有某个特定用例非常适合使用函数，否则推荐使用存储过程：它们性能更好，并且没有函数的所有限制。\n\
  \n## 存储过程\n\n可以使用 `DROP PROCEDURE` 命令删除存储过程：\n\n```\nDROP PROCEDURE dbo.GetOrderForCustomer;\n\
  ```\n\n### 触发器\n\n触发器是一种特殊的存储过程，当特定事件发生时执行。触发器有两种类型：*DML*（*数据操作语言*）触发器和 *DDL*（*数据定义语言*）触发器。第一种，DML\
  \ 触发器，在执行 `INSERT`、`UPDATE` 或 `DELETE`（或 `MERGE`）命令时执行。后者，DDL 触发器，则是在调用用于定义数据结构的\
  \ `CREATE`、`ALTER` 或 `DROP` 命令时执行。\n\n在这两种情况下，您都可以访问特殊对象，让您能够与引发触发器执行的事件进行交互。\n\n\
  对于 DML 触发器，您可以访问 `Inserted` 和 `Deleted` 虚拟表，以便访问更改前后的数据。您可以决定如何处理这些数据。例如，您可以将删除的数据存储到另一个表中，以提供易于访问的已更改行日志。您还可以指示触发器直接阻止该更改发生：例如，您可能希望确保某些配置数据不会从应用程序正常运行所需的核心表中被移除。\n\
  \n在 DDL 触发器中，您可以访问一个 `EVENTDATA()` 函数，该函数返回一个包含有关正在执行的语句所有详细信息的 XML。例如，在这种情况下，您可以保存该信息以跟踪表是何时、如何以及由谁修改的，或者对象是何时被删除的。同样，您也可以阻止该修改发生。\n\
  \n触发器是正在执行的事务的一部分，这意味着您可以决定是否允许该事务成功完成。例如，可能发生这种情况的一种场景是：只有一组选定的用户被授权更改应用于特定客户的产品折扣率。在触发器中，您可以检查进行更改的用户是否具有相应授权，甚至可能将该操作记录在另一个表中以进行跟踪。如果用户没有该授权，您可以在触发器内直接回滚事务，这意味着更改根本不会发生：\n\
  \n```\nCREATE OR ALTER TRIGGER [Warehouse].[ProtectAzure]\nON [Warehouse].[Colors]\n\
  FOR UPDATE, DELETE\nAS\nBEGIN\nIF EXISTS(\nSELECT * FROM [Deleted]\nWHERE [ColorName]\
  \ IN ('Azure')\n)\nBEGIN\nTHROW 50000, 'Azure is here to stay.', 16;\nROLLBACK TRAN;\n\
  END\nEND\n```\n\n如果您尝试 `DELETE` 或 `UPDATE` `Warehouse.Colors` 表中的值，导致颜色 “Azure”\
  \ 被移除或更改为其他内容，触发器将回滚该操作，使 “Azure” 颜色保持不变：\n\n```\nDELETE FROM [Warehouse].[Colors]\
  \ WHERE ColorID = 1\n```\n\n这种功能非常强大，但开销也相当大：由于触发器是活动事务的一部分，它们可以回滚事务，但从资源使用的角度来看，最好一开始就防止这种情况发生。预先防止本可以避免使用\
  \ IO、CPU 和内存资源，却在进程最后才发现所有已完成的工作都必须撤销——这是对宝贵资源的浪费。\n\n除了对资源使用的影响外，触发器还可能对性能产生重大影响。它们的性能取决于您编写的代码质量以及触发器内置逻辑的执行速度。如果您在触发器中试图聚合一个包含十亿行的数据表，性能很可能不会太好。而且这种情况*每次*触发器执行时都会发生。\n\
  \n这就是为什么触发器越来越频繁地被原生支持的功能所取代。例如，在接下来的章节中您将了解到，跟踪对表所做的所有更改可以通过一种称为“时态表”的功能更高效、更轻松地完成；或者，保护对特定行和值的访问可以通过“行级安全性”来实现。\n\
  \n因此，一般来说，应尽量减少触发器的使用。您应该在更改数据之前就进行所有检查，这样就不必撤销任何操作。这将有利于性能、并发性、可维护性和可扩展性。\n\n可以使用\
  \ `DROP TRIGGER` 命令删除触发器：\n\n```\nDROP TRIGGER [Warehouse].[ProtectAzure]\nON [Warehouse].[Colors];\n\
  ```\n\n### 非标量参数\n\n正如您在前面章节中了解到的，存储过程和函数，如预期那样，支持参数。在所有现代编程语言中，参数可以是任何内容，从标量到复杂对象。在\
  \ Azure SQL 中，这也是正确的，但有一些区别，因为没有像*对象*这样的概念，因为 SQL 不是面向对象的语言。在接下来的章节中，您将找到可用的选项，以实现其他语言中传递对象所能达到的效果。\n\
  \n\n### 表值参数\n\n顾名思义，参数可以是表。是的，你可以将整个表传递给一个函数或存储过程。到目前为止，当你需要从应用程序向 Azure SQL 传递大量数据时，这是最佳选择。我用了\
  \ *相当* 多这个词，因为根据经验法则，这个选项适用于传递数千行以内的数据。如果你的数据量达到数十万、数百万甚至更多，那么你应该参考前一章讨论的“批量操作”部分，以获得*非常出色*的性能。\n\
  \n另外请记住，表值参数功能需要客户端库的支持，因为它需要知道这个选项才能使用它。常见的语言如 .NET、Python、Node 和 Go 都支持 TVP。\n\
  \n如何使用 TVP 取决于你使用的语言，但基本思路是：你可以将数据加载到一个可以枚举的对象中，确保数据结构与你将用作参数的表*类型*的架构兼容，然后将该对象传递给你调用的存储过程。\n\
  \n首先创建表类型：\n\n```sql\nCREATE TYPE dbo.PostTagsTableType AS TABLE\n(\nTag NVARCHAR(100)\
  \ NOT NULL UNIQUE\n);\n```\n\n然后在你的存储过程中引用它：\n\n```sql\nCREATE PROCEDURE dbo.AddTagsToPost\n\
  @PostId INT,\n@Tags dbo.PostTagsTableType READONLY\nAS\nINSERT INTO dbo.PostTags\
  \ SELECT @PostId, Tag FROM @Tags\n```\n\n如你所见，参数 `@Tags` 实际上是一个表，因此你可以像使用常规表一样使用它，唯一的限制是它是只读的。然后，以\
  \ .NET 为例，你可以像下面的代码那样使用 TVP：\n\n```csharp\nvar p2 = new SqlParameter(\"@Tags\",\
  \ SqlDbType.Structured);\np2.TypeName = \"dbo.PostTagsTableType\";\np2.Value = tags;\n\
  cmd.Parameters.Add(p2);\n```\n\n其中，`tags` 对象是一个 .NET `DataTable`：\n\n```csharp\n\
  var tags = new DataTable(\"PostTagsTableType\");\ntags.Columns.Add(\"Tag\", typeof(string));\n\
  tags.Rows.Add(\"azure-sql\");\ntags.Rows.Add(\"tvp\");\n```\n\n表值参数经过了深度性能优化，并且通过向\
  \ Azure SQL 发送一批行数据，你的应用程序只需要与数据库进行一次往返通信，而不是每传递一行数据就通信一次。由于每次调用应用程序外部资源都会产生少量开销，因此将调用数据库的次数保持在最低水平（也称为减少应用程序的通信频率），可以确保为最终用户提供最佳体验，创建出可扩展且性能优异的应用程序。\n\
  \n## JSON\n\n有时，将对象作为表传递可能是不可行的。例如，当我们有一个表示诸如博文及其标签、分类、作者详细信息等的对象时。我们当然可以找到方法将此类对象转换为某种表值参数，但这很难称得上优雅。那么，为什么不直接将对象序列化为\
  \ JSON 整体传递呢？Azure SQL 完全能够进行复杂的 JSON 操作，正如你将在第 8 章学到的。你可以编写一个能够接受 JSON 作为参数的存储过程；然后你可以用它来读取所需的\
  \ JSON 部分，以便填充相应的表，或者将提取的值甚至整个 JSON 文档传递给其他过程：\n\n```sql\nCREATE PROCEDURE dbo.AddTagsToPost\n\
  @PostId INT,\n@Tags NVARCHAR(MAX)\nAS\nINSERT INTO dbo.PostTags\nSELECT @PostId,\
  \ T.[value] FROM OPENJSON(@Tags, '$.tags') T\nGO\n```\n\n该存储过程可以接受 `@Tags` 中的 JSON：\n\
  \n```sql\nEXEC dbo.AddTagsToPost 1, '{\"tags\": [\"azure-sql\", \"string_split\"\
  , \"csv\"], \"categories\": {}}';\n```\n\n由于 JSON 是作为常规字符串传递的，这项技术适用于任何语言，因为客户端库不需要任何特殊知识即可利用此选项。\n\
  \n#### CSV\n\n如果你只是需要传递一个小型值数组怎么办？或者如果你使用的语言不支持 TVP，而使用 JSON 又感觉有点杀鸡用牛刀？解决这个问题的一个优雅方法是使用经典的、但始终存在的\
  \ *CSV*（*逗号分隔值*）。请注意，逗号并非强制性的，你可以使用自己喜欢的分隔符，如竖线或破折号。Azure SQL 为你提供了表值系统函数 `STRING_SPLIT`\
  \ 来用于此目的：\n\n```sql\nCREATE PROCEDURE dbo.AddTagsToPost\n@PostId INT,\n@Tags NVARCHAR(MAX)\n\
  AS\nINSERT INTO dbo.PostTags\nSELECT @PostId, T.[value] FROM STRING_SPLIT(@Tags,\
  \ '|') AS T\n```\n\n然后你可以像这样使用存储过程：\n\n```sql\nEXEC dbo.AddTagsToPost 1, 'azure-sql|string_split|csv'\n\
  ```\n\n与 JSON 一样，此选项不需要在客户端进行任何特殊处理，因此你可以将此技术用于任何支持常规 ODBC 连接的开发语言。\n\n#### 监控数据变更\n\
  \n找出自上次应用程序或用户访问以来哪些数据发生了更改，对于提高应用程序的效率和可扩展性极为有帮助。例如，与目标应用程序交换仅更改的数据，而不是完整的数据集，所需的资源（CPU、网络和\
  \ IO 方面）将大大减少。除了这个已经非常重要的优点外，由于跟踪变更的负担可以交给 Azure SQL 处理，你的代码将更加精简，并且只专注于你需要处理的特定业务场景。结果，你将有更多时间来处理它，从你的任务清单中移除那些在现代应用程序中无论如何都是必需且期望处理的其他复杂性——例如数据传输的效率。\n\
  \n\n### 变更跟踪\n\n变更跟踪是一项简单而有效的技术，用于了解自特定时间点以来数据发生了哪些变化。这项功能背后的理念是，每次用户访问一个表时，都可以请求获取当时的活动版本号。用户必须安全地存储该版本号，以便下次再次尝试访问该表时，用户还可以请求\
  \ Azure SQL 仅获取从该版本号开始之后发生的*已更改*数据。Azure SQL 将返回从该版本号起的所有已更改数据，以及用户应在自身数据集上执行的操作（插入、更新或删除）以将其更新至当前状态，同时返回用户下次用于获取新一组更改的新版本号。\n\
  \n此功能非常强大，因为它完全消除了客户端的所有复杂性，因为客户端唯一需要做的就是保存版本号并将其呈现给 Azure SQL。\n\n必须在数据库上启用变更跟踪：\n\
  \n```sql\nALTER DATABASE WideWorldImportersStandard\nSET CHANGE_TRACKING = ON\n\
  (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON)\n```\n\n并在要跟踪的表上启用：\n\n```sql\nALTER\
  \ TABLE [Warehouse].[Colors]\nENABLE CHANGE_TRACKING\n```\n\n从那时起，您可以使用系统标量函数 `CHANGE_TRACKING_CURRENT_VERSION()`\
  \ 来获取当前版本号：\n\n```sql\nSELECT CHANGE_TRACKING_CURRENT_VERSION()\n```\n\n版本号在数据库级别计算并自动更新——这就是为什么它不需要任何参数——并且每当受跟踪的表中数据发生变化时，它都会改变。例如，假设我刚刚读取了表\
  \ `Warehouse.Colors`，并在操作完成后请求了当前版本号。除了结果集之外，Azure SQL 还向我返回了值 42，该值代表与*当前*版本相关联的数字，这意味着我刚刚读取的值与该版本号相关联。\n\
  \n现在假设有人（甚至可能包括我自己）对 `Warehouse.Colors` 表进行了一些更改。一段时间后，比如 3 小时后，我需要再次从同一表中获取数据，但这次不是获取完整的数据集，我希望只获取自上次查看以来的更改，这样我就可以避免读取和传输所有未更改的行，而这些行很可能占大多数。\n\
  \n`CHANGETABLE` 是我需要用于此目的的函数：\n\n```sql\nSELECT\nSYS_CHANGE_OPERATION, ColorID\n\
  FROM\nCHANGETABLE(CHANGES [Warehouse].[Colors], 42) C\n```\n\n该查询将返回如下所示的表格：\n\n\
  ![../images/493913_1_En_5_Chapter/493913_1_En_5_Figa_HTML.jpg](img/493913_1_En_5_Figa_HTML.jpg)\n\
  \n其中您可以看到对一行执行的操作以及该行主键列的值。借助主键（唯一标识表中的行），我们可以将该结果与原始表 `Warehouse.Colors` 进行联接，并获取所有我们需要的数据。我们现在可以再次运行\
  \ `CHANGE_TRACKING_CURRENT_VERSION()` 函数以获取当前版本；假设现在它等于 50，我们将该值保存在某个地方，这样下次我们再次查询变更时，将使用该值来获取从那时起发生的新更改——依此类推，用于后续的同步。\n\
  \n简单且极其高效——有助于保持客户端代码非常简洁且易于理解。\n\n要禁用特定表上的变更跟踪，您可以在要禁用变更跟踪的表上使用 `ALTER` 命令：\n\n\
  ```sql\nALTER TABLE [Warehouse].[Colors]\nDISABLE CHANGE_TRACKING\n```\n\n要在整个数据库上禁用它，您需要在整个数据库上使用\
  \ `ALTER` 命令：\n\n```sql\nALTER DATABASE WideWorldImportersStandard\nSET CHANGE_TRACKING\
  \ = OFF\n```\n\n### 变更数据捕获\n\n变更数据捕获是一项更复杂的技术，它使用内部不可变的事务日志来读取数据上所做的所有更改，并将其保存到指定的表中。它非常类似于其他数据库提供的变更数据流概念。它使用异步过程从事务日志中读取，因此非常适合在不影响发生更改的表的性能的情况下使用这些更改。目前，它尚未在所有\
  \ Azure SQL 产品中完全可用，但请密切关注。借助像 Debezium 这样的解决方案，它将轻松实现近实时 ETL 解决方案的创建，并与 Kafka 集成，从而提供完全升级的开发者体验。\n\
  \n## 保护数据资产\n\n除了存储数据并按需提供访问外，数据库还承担着保护数据安全的任务。Azure SQL 提供了丰富的功能来实现这一点，包括通过权限管理、数据屏蔽到加密，因此您可以精确选择希望在何种程度上以及向谁暴露您的数据。\n\
  \n除了将在下一节中介绍的功能外，请记住，默认情况下，得益于名为`透明数据加密`的功能，静态数据会自动加密。顾名思义，它是完全透明的，不需要对您的代码进行任何更改。一旦数据置于\
  \ Azure 上，默认即受到保护。当然，这对你来说可能还不够，所以请继续阅读。\n\n\n### 权限\n\n管理权限及相应的数据访问授权通常是数据库管理员的职责，但正如之前讨论的，安全性在每个应用中都至关重要。因此，开发者至少掌握所用工具和系统安全原理的基础知识总是有益的，这能确保从底层就考虑到安全性，避免未来的麻烦和意外。\n\
  \nAzure SQL 遵循**最小权限原则**，因此，一个新创建的用户在 Azure SQL 中实际上能做的事情非常有限。除了你在创建 Azure SQL Server\
  \ 或 Azure SQL 托管实例资源时定义的`administrative`用户（它拥有所有可能的授权，因为是管理员账户，**不应**用于授予应用数据访问权限）之外，你应该为你的应用创建一个专用的用户。例如，对于一个托管在\
  \ Azure Web API 中的 API 服务，你可以创建 `WebAPI` 用户：\n\n```sql\nCREATE USER WebAPI WITH\
  \ PASSWORD = '94m1-2sx0_1!';\n```\n\n如果你尝试用这个用户登录，你会发现它无法访问任何内容。要允许它对某个表执行 `SELECT`\
  \ 操作，例如，你需要 `GRANT` 它正确的权限：\n\n```sql\nGRANT SELECT ON OBJECT::[Sales].[Orders]\
  \ TO WebAPI;\n```\n\nAzure SQL 中有大量的权限设置，允许你对任何用户的安全访问进行**微调**。为了简化安全管理，你可以使用 `roles`\
  \ 或 `schemas`。角色允许你将用户分组，这样用户就能继承其所属角色的权限。角色可以手动创建，也可以使用预定义的角色。例如，`db_datareader`\
  \ 角色中的任何用户都可以从任何表读取数据，但他们无法修改任何数据：\n\n```sql\nALTER ROLE [db_datareader] ADD MEMBER\
  \ [WebAPI];\n```\n\n如果你只想对特定的一组对象（例如，你正在创建的 Web API 解决方案所使用的所有表）授予某些权限，你可以针对一个对象架构：\n\
  \n```sql\nGRANT SELECT ON SCHEMA::[Sales] TO WebAPI;\n```\n\n这样的代码将允许你对属于 `Sales`\
  \ 架构的任何对象使用 `SELECT`。\n\n正如你可能已经猜到的，存储过程不允许使用 `SELECT`，你需要向用户授予 `EXECUTE` 权限，以确保其可以执行所需的存储过程：\n\
  \n```sql\nGRANT EXECUTE ON OBJECT::[dbo].[AddTagsToPost] TO WebAPI;\n```\n\n每当用户尝试对一个他/她没有正确权限的对象执行操作时，系统将引发错误，并停止该语句的执行。\n\
  \n为了测试某个特定用户是否拥有正确的权限，如果你已经使用管理员账户登录，你可以 `impersonate`（模拟）该用户：\n\n```sql\nEXECUTE\
  \ AS USER = 'WebAPI';\n```\n\n从现在开始，你可以执行所有你想要测试的 T-SQL 代码，其执行效果就如同是用户 `WebAPI`\
  \ 调用的一样。\n\n要切换回你的管理员用户，你只需运行：\n\n```sql\nREVERT;\n```\n\n另外，请记住，如果你希望确保某人不能访问某个资源，你可以明确地\
  \ `DENY`（拒绝）该用户在某对象上执行某项操作的权限：\n\n```sql\nDENY SELECT ON OBJECT::[Sales].[Orders]\
  \ TO SampleUser;\n```\n\n如果存在多个针对同一对象且相互冲突的授权，`DENY`（拒绝）将始终优先。如果用户属于一个或多个角色，这种情况就可能发生。\n\
  \n要从数据库中完全移除一个用户，使其甚至无法连接到数据库，一个简单的方法是删除该用户：\n\n```sql\nDROP USER SampleUser;\n\
  ```\n\n如果你只想暂时阻止用户连接，而不是删除该用户，你可以直接拒绝其连接权限：\n\n```sql\nDENY CONNECT TO SampleUser;\n\
  ```\n\n权限和安全是庞大的主题，但这是一个好的开始。请记住从一开始就牢记安全性，这样你就已经领先一步了。\n\n如果你已经是一个精通安全的人，你可能会认为使用密码登录系统并不十分安全，你是完全正确的。你可以创建一个不将密码存储在\
  \ Azure SQL 中的 Azure SQL 用户，它依赖于 Azure Active Directory。然后，你的应用程序可以在连接到 Azure SQL\
  \ 时使用托管标识进行身份验证。\n\n关于此主题的完整教程在这里：[`https://aka.ms/aswtcmsi`](https://aka.ms/aswtcmsi)。\n\
  \n\n### 行级安全\n\n通过使用权限（`permissions`），您可以拒绝访问某些表，甚至只是某些列。但如果您想拒绝访问某些特定的行呢？在 Azure\
  \ SQL 中，您拥有一个强大的功能，称为 `行级安全`（简称 `RLS`），它允许您精确地做到这一点。\n\n借助 `RLS`，您可以为一个或多个表创建一个\
  \ `策略`（`policy`）。每次对这些表执行读或写操作时，该策略就会生效：它将评估受影响的行对于执行操作的用户是否可访问。\n\n为了进行评估，策略会将一个提供的用户定义内联表值函数应用到活动操作触及的每一行。如果函数返回\
  \ 1，则该行可访问；否则，不可访问。\n\n得益于 Azure SQL 查询优化器，该函数将被 `内联`（`inlined`），因此它实际上不会为范围内的每一行执行（否则性能会非常糟糕），但从逻辑角度来看，这正是正在发生的事情。\n\
  \n以下是一个安全策略定义的示例：\n\n```sql\nCREATE SECURITY POLICY OrderSecurityPolicy\nADD FILTER\
  \ PREDICATE [rls].LoginSecurityPolicy(SalespersonPersonID) ON [Sales].[Orders]\n\
  WITH (STATE = ON);\n```\n\n如您所见，它使用函数 `rls.LoginSecurityPolicy` 来检查对 `Sales.Orders`\
  \ 表中行的授权。该函数将接收它需要评估的每一行中 `SalespersonPersonID` 列的值。该函数的创建方式如下：\n\n```sql\nCREATE\
  \ FUNCTION rls.LoginSecurityPolicy(@PersonID AS INT)\nRETURNS TABLE\nWITH SCHEMABINDING\n\
  AS\nRETURN\nSELECT\n1 As [Authorized]\nFROM\n[Application].[People]\nWHERE\nLoginName\
  \ = SESSION_CONTEXT(N'Login')\nAND\nPersonID = @PersonId;\nGO\n```\n\n该代码使用系统函数\
  \ `SESSION_CONTEXT` 来检索 `Login` 键的值。该函数非常有用，因为它允许客户端在连接数据中将一些信息传递给 Azure SQL，然后在整个连接生命周期内都可以访问这些信息。当您创建一个运行在中间层或作为微服务并且无法模拟调用用户的解决方案时，此功能非常方便。这样，您仍然可以将所需的信息（例如登录名）传递给\
  \ Azure SQL，以便您可以使用它来应用安全策略。例如，如果您正在使用 OAuth2 来验证调用您正在构建的解决方案的用户，这绝对是一个必需的功能；否则，Azure\
  \ SQL 将无法知道到底是谁在尝试访问数据，而您将不得不自己在客户端找到巧妙（且复杂）的方法来解决安全挑战。\n\n一旦 Azure SQL 获得了关于谁在实际尝试访问数据的信息，正如您在代码中所见，它将检查该登录名是否存在于\
  \ `Application.People` 表中。它还将使用活动安全策略注入到 `@PersonId` 变量中的值来检查此人是否是分配来管理他或她正尝试访问的订单的人。如果所有这些检查都为真，则该行将允许呈现给用户。否则，该行将被简单地丢弃，用户甚至不会知道它的存在。事实上，当安全策略处于活动状态时，如果\
  \ Kayla Woodcock 小姐（其 PersonId = 2）尝试通过我们创建的解决方案访问数据，她将只看到她自己的行：\n\n![../images/493913_1_En_5_Chapter/493913_1_En_5_Figb_HTML.jpg](img/493913_1_En_5_Figb_HTML.jpg)\n\
  \n这非常棒，因为它确实大大简化了代码，确保只有用户有权看到的数据才会真正离开数据库。\n\n除了过滤掉行之外，策略还可以被指示在有人尝试访问其没有所需权限的行时引发错误。例如，这可以用于拦截那些会插入未授权值的\
  \ `INSERT` 命令。由于该值尚不存在，因此无法使用过滤谓词，但您可能仍然希望阻止其执行：这正是 `阻止谓词`（`BLOCK PREDICATE`）可以做到的。\n\
  \n像往常一样，可以使用 `DROP` 命令删除安全策略：\n\n```sql\nDROP SECURITY POLICY OrderSecurityPolicy;\n\
  ```\n\n一个深入探讨 `RLS` 并展示如何将其用于创建真实世界应用程序的视频，以及一个包含有效示例代码的 GitHub 仓库，可以在这里找到：[`https://aka.ms/rlsvideo`](https://aka.ms/rlsvideo)。\n\
  \n### 动态数据屏蔽\n\n有时您无法阻止对某些列的访问，因为应用程序需要它们才能正常工作。例如，想象您正在创建一组 API，允许用户在可用数据上执行即席查询，这样就可以拥有一个即席报告或分析解决方案来运行最奇特的分析。一个典型的用例是将\
  \ Power BI 连接到此类 API。根据访问数据的用户，您可能希望屏蔽一些返回的数据，以便未经授权的用户不会收到错误，而是简单地看到一个预设的模式，从而保护敏感信息。为此，您需要为您想要混淆的列添加一个\
  \ `掩码`（`Mask`）：\n\n```sql\nALTER TABLE [Application].[People]\nALTER COLUMN EmailAddress\
  \ ADD MASKED WITH (FUNCTION = 'email()');\n```\n\n在执行上述代码后，任何没有 `UNMASK` 权限的人将只看到\
  \ `EmailAddress` 列的已屏蔽数据。\n\n![../images/493913_1_En_5_Chapter/493913_1_En_5_Figc_HTML.jpg](img/493913_1_En_5_Figc_HTML.jpg)\n\
  \n*图 5-1. 动态数据屏蔽在行动中*\n\n这种混淆直接发生在数据库中，因此敏感数据永远不会被发送到 Azure SQL 之外。\n\n由于数据只是被混淆，一个*已经*拥有某些敏感数据的用户仍然可以使用该信息来查询数据库。假设在您正在创建的报告中，您需要分析一个特定用户，并且该用户向您提供了她自己的电子邮件。像这样的查询将完美工作：\n\
  \n```sql\nSELECT * FROM [Application].[People] WHERE EmailAddress = 'helenm@fabrikam.com'\n\
  ```\n\n这为您提供了相当大的灵活性，因为您可以确保保护数据而不限制其对那些通过其他合法方式已访问该受保护信息的人的使用。\n\n当然，这是一把双刃剑，因为它也意味着通过执行暴力攻击，混淆后的数据可能会被恶意用户猜出。这就是为什么动态数据屏蔽应始终与其他安全功能（如行级安全）一起使用，以使发生数据泄露的可能性最小化。Azure\
  \ 还提供了一个名为高级威胁防护的功能，它也适用于 Azure SQL，它通过使用复杂的机器学习算法监控可疑的数据库访问和异常查询模式来引发潜在威胁的警报，因此您可以始终确保任何恶意访问数据的尝试都会被立即报告。\n\
  \n\n### 始终加密\n\n`始终加密`是一项功能，它能保证您高度敏感的数据（如信用卡号或社会保障号）使用一组密钥进行加密，而这组密钥不与数据库引擎共享。这意味着即使是数据库管理员也无法解密这些数据，因为数据将由应用程序直接加密，并以加密形式发送到数据库。\n\
  \n![../images/493913_1_En_5_Chapter/493913_1_En_5_Figd_HTML.jpg](img/493913_1_En_5_Figd_HTML.jpg)\n\
  \n`图 5-2. CreditLimit 已被始终加密`\n\n用于加密的密钥可以存储在本地计算机或`Azure 密钥保管库`中，只有有权访问这些密钥的应用程序才能访问加密数据。尝试在没有正确密钥的情况下访问`始终加密`数据将导致错误：\n\
  \n```\nMsg 0, Level 11, State 0, Line 0\nFailed to decrypt column 'CreditLimit'.\n\
  ```\n\n为了对值进行加密和解密，客户端应用程序必须使用支持`始终加密`的连接库，例如\n\n*   `Microsoft JDBC Driver 6.0`（或更高版本）\n\
  *   `ODBC Driver 13.1 for SQL Server`\n*   `ODBC Driver 17 for SQL Server`\n*  \
  \ `Microsoft Drivers 5.2 for PHP for SQL Server`\n*   `Microsoft.Data.SqlClient`\n\
  \n这些库会处理好一切，加密和解密对开发人员来说将是完全透明的。\n\n## 如果您想了解更多\n\n现在，您已经全面了解了`Azure SQL`提供的所有受支持的可编程性特性，以及安全概念和选项的坚实基础。这些功能供您使用，以确保您的应用程序不仅可扩展、快速，而且安全。\n\
  \n要了解本章提及主题的更多信息，您可以从这些资源开始：\n\n*   `SQL Server 2017 Developer's Guide` – [`www.amazon.com/SQL-Server-2017-Developers-Guide-dp-1788476190/dp/1788476190`](http://www.amazon.com/SQL-Server-2017-Developers-Guide-dp-1788476190/dp/1788476190)\n\
  *   `SQL Server 中临时表和表变量有什么区别？` – [`https://dba.stackexchange.com/questions/16385/whats-the-difference-between-a-temp-table-and-table-variable-in-sql-server/16386#16386`](https://dba.stackexchange.com/questions/16385/whats-the-difference-between-a-temp-table-and-table-variable-in-sql-server/16386%252316386)\n\
  *   `使用变更跟踪` – [`https://docs.microsoft.com/sql/relational-databases/track-changes/work-with-change-tracking-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/work-with-change-tracking-sql-server%253Fview%253Dsql-server-ver15)\n\
  *   `Debezium：从数据库流式传输变更` – [`https://debezium.io/`](https://debezium.io/)\n*  \
  \ `SQL Server 变更流` – [`https://medium.com/@mauridb/sql-server-change-stream-b204c0892641`](https://medium.com/%2540mauridb/sql-server-change-stream-b204c0892641)\n\
  *   `透明数据加密` – [`https://docs.microsoft.com/azure/sql-database/transparent-data-encryption-azure-sql?tabs=azure-portal`](https://docs.microsoft.com/en-us/azure/sql-database/transparent-data-encryption-azure-sql%253Ftabs%253Dazure-portal)\n\
  *   `始终加密` – [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-database-engine)\n\
  *   `始终加密客户端开发` – [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-client-development?view=azuresqldb-current`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-client-development%253Fview%253Dazuresqldb-current)\n\
  \n## 6. 表和索引的实际应用\n\n当人们想象一个表时，大多数情况下，它看起来像一个 Excel 电子表格。有许多按行和列组织的单元格，通常有一列包含行的标识符。\n\
  \n`Azure SQL` 使您能够使用的远不止一个简单的表。您可以针对某些特定的查询模式、复杂的分析或高度并发的更新来配置和优化表。您还可以配置表以保留变更的完整历史记录、实现部分域数据完整性逻辑，并应用细粒度的安全规则。在本章中，您会发现一些实用建议，可以帮助您利用`Azure\
  \ SQL`提供的功能来创建最适合您需求的表。\n\n\n## 设计优秀的表格：最佳实践\n\n首先，我们需要了解一些表格设计的最佳实践。表格设计与 Eric\
  \ Evans 著作中描述的**领域驱动设计**（Domain-Driven Design， DDD）理论紧密耦合。在 DDD 中，我们定义领域模型实体（对象或类），这些实体被划分到`限界上下文`中。一个`限界上下文`是一个逻辑边界，其中特定的术语、定义和规则以一致的方式适用。领域模型实体之间也存在关联，如图\
  \ 6-1 所示。\n\n![../images/493913_1_En_6_Chapter/493913_1_En_6_Fig1_HTML.jpg](img/493913_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1：应用程序的领域模型\n\n## 将领域模型映射到数据库表\n\n领域模型中实体的定义被称为领域设计或逻辑设计。最终，我们需要决定如何将领域模型对象存储在数据库中。如果你决定将领域模型实体存储在\
  \ Azure SQL 中，有一种直接的方式来定义你的底层表。每个`限界上下文`（图 6-1 中的`Sales`或`Support`）都可以表示为一个模式（schema）。在某些情况下，`限界上下文`甚至可以用独立的数据库来表示。每个领域模型实体应映射到关联模式中的一个或多个表。你可以使用以下一些高级指导原则将领域模型实体映射到数据库表：\n\
  \n- 每个领域模型实体应映射到一个表，该表包含一个唯一标识领域对象的列（即所谓的`主键`）。\n- 领域对象的每个简单属性应表示为表中具有匹配 SQL 类型的一列。\n\
  - 领域对象中的每个集合、数组或列表应表示为一个单独的表。该表应包含一个列（称为`外键`），该列与包含此集合的行的主键相匹配。\n- 如果存在从一个领域对象到另一个领域对象的关联，底层表应包含一个列，该列包含相关对象的主键。在某些复杂情况下，应该有一个单独的映射表，其中包含相关表的主键对。\n\
  \n## 数据规范化的价值与复杂性\n\n看起来很复杂？起初可能确实如此。将复杂的领域对象重新组织为一套冗余度最小的表的过程绝对是一个挑战。我们已经稍微讨论过这个过程了，正如你可能从第\
  \ 4 章回忆起来的，它被称为`规范化`。\n\n`规范化`使我们能够避免意外错误并防止数据不一致。例如，人们会交替使用像“inquiry”和“enquiry”这样的词（有些人可能认为“enquiry”是“inquiry”的拼写错误）。美式英语和英式英语中也有很多拼写略有差异的单词（例如，colour\
  \ 和 color，center 和 centre）。让我们想象一下，你有一个实体作为单行存储（或在 NoSQL 文档数据库中作为文档存储），它有一个值为“inquiry”的`type`属性，以及一个`tags`数组，其中一个标签是“.NET”。有人可能会插入另一个类似的实体，其类型为“enquiry”，标签之一为“dotnet”。一个按类型和标签搜索实体的功能将根据搜索条件返回不同的结果，因为客户端会输入“inquiry”和“enquiry”或“.NET”和“dotnet”，而你可能无法实现能够理解这些同义词的复杂规则。在这些情况下，将类型和标签的值存储在单独的表中，为它们分配标识符，并在实体中使用这些标识符，可能是一个更好的主意。这样，就可以选择一个标准化的术语来使用，也许还有该术语的同义词列表，搜索将始终返回一致的结果。\n\
  \n## 规范化过程的核心优势\n\n如果你以前从未做过，如何才能正确完成呢？幸运的是，创建一个好的模型是`规范化`规则迭代应用的过程，所以我们并不孤单。由于`规范化`的目的在于避免潜在的数据不一致性和冗余，因此值得理解为什么我们无论如何都要不惜一切代价避免这些。\n\
  \n冗余本身不一定就是坏的，但它确实带来了挑战。例如，假设订单头显示订单价值为 100 美元，但如果你将订单明细表中该特定订单的所有项目相加，发现总价值是 120\
  \ 美元。哪个是正确的？你不知道。更糟糕的是，仅凭你已有的数据，你*无法*知道答案，因为数据不一致。数据在那里，但信息丢失了。而这只是一个例子。有几种众所周知的`数据异常`（详情请见`https://aka.ms/sednda`），可以通过正确的`规范化`来避免。\n\
  \n`规范化`过程将帮助你将对象分解成更小的部分，而不会丢失任何信息。这是一个“无损分解”过程：它赋予你在需要时始终能够重建原始信息的能力。同时，它有助于避免冗余以及由此产生的不一致性的危险，从而有利于重用作为其应用结果而创建的更小的信息片段。\n\
  \n## 规范化：起点与延伸阅读\n\n我们只是浅尝辄止，详细描述整个`规范化`过程超出了本书的范围。你可以通过牢记一个好的模型是这样的来打好基础：表中的标量列*仅*依赖于主键，并且使用外键来引用和强制执行与其他表的关系，从而确保信息永不丢失。\n\
  \n`规范化`是一个极其有趣的话题，也是少数可以应用于信息学的正式过程之一：你可以在本章末尾引用的书籍中找到有关数据库设计的更多细节。\n\n## 考虑表格设计的其他方面\n\
  \n到目前为止，我们专注于数据库设计的逻辑方面：`规范化`和将领域类映射到表并不是过程的结束。为了最优地设计一个表，你需要考虑以下方面：\n\n- 为表中列定义类型和其他属性的最佳方式是什么？\n\
  - 如何使用索引优化对表的操作？\n- 你想在表中定义哪些规则和约束以确保数据有效？\n- 如何使你的表安全？\n\n在接下来的章节中，将介绍一些可以帮助你回答这些问题的指导原则。\n\
  \n### 创建表\n\nAzure SQL 让你能够轻松创建表，无需使用图形化工具或生成器。你可以使用简短的 `CREATE TABLE` 语句来创建新表：\n\
  \n```\nCREATE TABLE Customer (\nCustomerID tinyint,\nCustomerName varchar(max),\n\
  LocationID bigint\n);\n```\n\n虽然定义好列来创建表结构很简单，但这仍然不算是表设计。恰当的表设计是一个过程，你需要识别出最适合你应用程序的表特征。回顾上一个示例中的表定义，我们可能会问自己几个问题来审视这个设计：\n\
  \n*   是否可能有两个客户的 `CustomerID` 相同？我们是否需要确保不会有人插入两个具有相同标识符的客户？\n*   `tinyint` 类型是客户\
  \ ID 的合适选择吗？`tinyint` 列只能包含 256 个不同的值，这对于我们可能拥有的所有客户来说是否足够？\n*   `varchar(max)`\
  \ 类型允许我们存储最大达 2GB 的字符串；然而，这是不是有点小题大做？如果我们知道客户名称长度不能超过 100 个字符，我们是否可以使用像 `varchar(100)`\
  \ 这样更小的类型？\n*   `varchar` 类型允许我们使用英语和其他西方语言的大多数常见字符。但是，我们是否会有一些客户名称包含非常见的拉丁字符（例如，匈牙利语的\
  \ ű 或 ő，或斯拉夫语的 đ、č、ć）、西里尔字符（ђ、ч 或 ћ）或亚洲字符？如果是这样，`nvarchar` 类型可能是更好的选择。\n*   当我们对客户名称进行排序或比较时，是否应该忽略字母大小写？是否还有其他语言规则我们需要应用？\n\
  *   在 `LocationID` 列中，我们可以存储 `2⁶⁴` 个不同的位置，但我们真的有这么多位置吗？我们可以使用更小的类型吗？\n*   `LocationID`\
  \ 值是某个独立表中位置的标识符吗？如果是这样，我们如何确保 `LocationID` 中的值存在于另一个表中？如何确保如果某个位置仍有客户关联时，该位置不会被删除？\n\
  \n恰当的表设计应该回答这些问题，并让你的表拥有正确的解决方案。\n\n你可能也注意到，相当多的问题都围绕着合适的数据类型大小。如今，空间和资源并不短缺，因此仅仅为了节省几个字节而花费时间可能看起来是浪费时间。但是，请记住，如果你的解决方案成功了，你的数据库可以轻易地包含数十亿行数据。浪费空间不仅意味着浪费存储空间，还意味着更多的内存需求和更高的\
  \ CPU 消耗。在云环境中，你需要为所使用的服务付费……好吧，我想你已经明白了：对于原本可以优化的模型，却要为同样的性能支付更高的成本。做一个更优秀的开发者吧！\n\
  \n### 确定合适的列类型\n\n设计表时，你需要为你想要持久化的应用程序中的每个数据类型找到一个对应的 SQL 列类型。为了有效地设计表，你需要考虑以下几点：\n\
  \n*   定义能描述你数据的列类型。\n*   指定排序规则（collations）来定义文本数据的排序和比较规则。\n*   使用计算列（computed\
  \ columns）来存放预计算的表达式。\n\n在接下来的章节中，你将看到一些在定义表时可以使用的最佳实践和指南。\n\n#### 定义你的列类型\n\n应用程序编程语言中的大多数值类型都有对应的\
  \ SQL 类型，你可以据此快速确定用于存储领域对象值的 SQL 类型。也有许多工具可以根据类属性的类型（即所谓的“代码优先”方法）自动生成表列及其类型。虽然你可以使用工具和确定性的映射，但如果你学会仔细检查和改进你的表设计，将会受益匪浅。主要原因是你比工具更了解领域模型，你不应该让自动化的生成器使用一组通用规则来创建你应用程序最核心的部分。一些默认的映射规则可能并不最适合你的设计，例如：\n\
  \n*   字符串类型默认映射到 `NVARCHAR(MAX)` 类型，因为它可以包含任意长度（最大 2GB）的任何 Unicode 文本。这个决定的缺点是，`NVARCHAR(MAX)`\
  \ 是一个 4000 字符的列表，因此，与长度小于 4000 字符的字符串类型相比，它在许多操作中并非最优。如果你知道你的文本有长度限制，请尝试使用更精确的类型，如\
  \ `NVARCHAR(100)`，这可能会提升查询性能。\n*   像 C#这样的语言，没有针对日期和日期时间的精细类型。你可能对日期也使用 `DateTime`\
  \ 类型，即使你不使用时间部分。这些数据值会被映射到 `datetime2`。如果你知道你的 `DateTime` 值只包含日期而不包含时间，使用精确的 `date`\
  \ 类型会更优。\n*   十进制数字（`float`、`real` 类型）被映射到 `decimal` 类型。在 Azure SQL 中，你可以显式指定十进制数的小数位数，也就是其大小。十进制数字的大小可能在每个数字\
  \ 5 到 17 字节之间变化，具体取决于精度。如果你使用十进制数来存储货币，只有两位小数，并且你知道你的应用程序将使用的最大理论金额，你可以显式指定大小。\n\
  \n这些例子是一些小的检查和调整，如果你花些时间验证默认规则的结果，并利用你对领域模型的了解进行改进，就能让你成为团队中的英雄。\n\n一般的建议是，尽量使列尽可能小，并为给定类型找到最小的\
  \ SQL 类型。通过使用大小合适的较小类型，你可以用更少的存储空间来存储相同数量的应用数据。除了节省存储空间外，较小的类型还能积极影响查询性能。Azure SQL\
  \ 数据库有一个内部内存缓存（称为 SQL 缓冲池），其中包含来自持久存储的部分数据，从而提高了检索这些数据的速度。使用不必要的大类型，你会用不必要的填充数据浪费宝贵的缓冲池空间。此外，较小的类型需要更少的磁盘和网络输入/输出操作，这使你能够更快地加载或保存数据。再者，大列可能会“欺骗”Azure\
  \ SQL 查询优化器，使其为这些列上的查询保留过多的内存。这些内存可能不会被充分利用，但由于它被保留给了查询，其他查询可能无法获得足够的内存。此外，内存占用较小的数据可以被分配到更小、更快的内层内存缓存中。在某些情况下，你可能会发现查询性能提升仅仅是因为数据没有被无用的\
  \ 0 值填充——而这是因为有人选择了比实际需要更大的数据类型。\n\n有些人建议使用全局唯一标识符（GUID）值作为领域模型对象的标识符，以避免依赖数据库来生成对象标识符。GUID\
  \ 的优势在于，你可以在不咨询数据库的情况下，在应用程序中直接给 Model 对象分配标识符。然而，巨大的缺点是 GUID 值长达 16 字节，而 `int`\
  \ 为 4 字节，`bigint` 为 8 字节。虽然存储消耗不是最优的，但这并非主要问题。如果你不必要地使用 GUID 值，查找或连接行可能会慢得多，因为数据是随机分布的，这会严重影响缓存效率，尤其是在你的表在投入生产后增长起来——特别是如果解决方案成功并拥有大量用户时。良好的设计可以防止许多在应用程序面临每张表数百万行数据的真实场景时可能出现的性能问题。\n\
  \n\n## 排序规则\n\n排序规则是 Azure SQL 中另一个重要的文本属性。不同的排序规则使您能够定义 Azure SQL 在比较或排序文本值时应使用的语言规则。\n\
  \n在标准编程语言中，您使用的是普通字符串，并且需要在需要时显式指定要使用不区分大小写的比较或排序规则。例如，如果您需要在 C# 中使用某种区域性语言规则对字符串进行排序，则需要为目标语言指定\
  \ `CultureInfo`。在大多数编程语言中，您需要在某些方法中显式指定不区分大小写或区域性。Azure SQL 允许您定义语言规则和大小写敏感性，但它还支持一些更高级的比较和排序规则，如音调敏感性、假名敏感性（用于区分日语平假名和片假名字符）或变体选择符敏感性（用于在现代数字编码中应用一些细粒度的排序规则）。\n\
  \n您可以使用如下语句轻松地在任何字符串列上设置排序规则：\n\n```sql\nALTER TABLE Warehouse.StockItems\nALTER\
  \ COLUMN Brand NVARCHAR(50)\nCOLLATE Serbian_Cyrillic_100_CI_AI\n```\n\n此语句将指定对该列的任何字符串操作都将使用塞尔维亚语规则，并忽略字符串中的大小写（`CI`）和音调（`AI`）。更改列的属性将自动应用于使用该列的所有排序和比较规则。\n\
  \nAzure SQL 为世界上大多数语言提供了排序规则，并允许您为所有语言开启或关闭大小写、音调或假名敏感性规则。如果您需要为全球市场实施应用程序，这是一个巨大的优势。\n\
  \n如果您不说日语，并且遇到了一个错误，指出应用程序中的某些日语单词排序不正确，您最不想做的事情就是为了修复这个错误而开始学习片假名和平假名之间的区别。这正是您可以利用\
  \ Azure SQL 提供的语言规则的力量，并依赖 Azure SQL 能够正确排序结果这一事实的时候。\n\n文本的另一个重要属性是编码。字符可以使用不同的二进制表示形式存储，将字符转换为其二进制形式的规则称为编码模式。Unicode\
  \ 标准为当前使用的大多数相关字符分配了唯一的数字标识符（称为 `code point`，码点）。编码模式定义了如何将字符或其码点序列化为一系列字节。\n\n\
  最简单的编码模式之一是 ASCII，它使用 7 位来编码英语中最常用的字符，每个字符一个字节（例如，代码 `0x5B` 代表 \"]\"）。ASCII 编码仅支持英语中使用的常见字符，但不支持西方或拉丁语言中使用的其他字符，如\
  \ ä、ö、ü、ñ 或 ß。Windows-1252 和 ISO-8859-1 是 ASCII 的扩展，它们使用 8 位来编码更广泛的字符集。这些编码模式对西方语言中的其他常用字符进行编码。然而，由于这些编码模式无法表示其他语言中使用的字符，其他国家衍生出了自己的\
  \ 8 位编码模式用于国家字符集。其他国家级字符集的例子有 ISCII（印度）、VSCII（越南）或 YUSCII（前南斯拉夫）。单字节国家字符集使用高达 256\
  \ 的码点范围来表示其国家字母表中使用的常见字符。Azure SQL 使用 `varchar` 类型来表示某些单字节编码模式中的字符（尽管也有一些多字节代码页）。为了区分编码值属于哪个国家字符集，Azure\
  \ SQL 使用列排序规则。如果 `varchar` 列中的二进制值是 `0xC6`，且列排序规则是某个拉丁排序规则（代码页 Windows-1250），Azure\
  \ SQL 会假定这是字符 \"Ć\"。如果排序规则是某个塞尔维亚语排序规则，Azure SQL 会假定这是字符 \"Ж\"（在 `Serbian_Cyrillic`\
  \ 排序规则中 - 代码页 Windows-1251）或 \"Æ\"（在 `Serbian_Latin` 排序规则中 - 代码页 Windows-1252）。基于\
  \ 8 位码点和国家字符集来识别字符是不必要地简化且容易出错的，因此 Unicode 标准使用多字节编码空间来编码所有语言的字符，每个字符都有不同的码点。有几种用于\
  \ Unicode 码点的编码模式，如 UTF-8，其中每个字符使用 1、2、3 或 4 个字节表示；以及 UTF-16，其中每个字符使用 2 或 4 个字节表示。Azure\
  \ SQL 使用 `varchar` 类型来表示采用 UTF-8 编码的 Unicode 字符，但这些值必须使用以 `UTF8` 结尾的排序规则。为了表示 UTF-16\
  \ 编码方案，Azure SQL 使用 `nvarchar` 类型，该类型不依赖于排序规则。\n\n除非您确定 `string` 列中的字符只有有限的已知值，否则始终使用\
  \ Unicode。在大多数情况下，`nvarchar` 类型是一个不错的选择。尽管即使对于可以放入一个字节的常见字符，它也使用 2 个字节，但 Azure SQL\
  \ 有一些优化可以自动压缩这些值。如果您真的关心性能并希望针对常见字符进行优化，则应该使用带有 UTF-8 排序规则的 `varchar` 类型。\n\n##\
  \ 计算列\n\n除了经典列之外，您还可以使用特殊的计算列，它们代表命名的表达式。例如，假设您有购买产品的数量、每个单位的价格和税率。您可以创建一个计算利润的函数并提供列值，但在某些情况下，创建一个自动重新计算的虚拟列会更好：\n\
  \n```sql\nALTER TABLE Sales.OrderLines\nADD Profit AS (Quantity*UnitPrice)*(1-TaxRate)\n\
  ```\n\n读取此表的应用程序将获得利润值，而无需知道用于计算利润的函数。对于外部应用程序来说，此值看起来就像是表中的另一个值。此计算列不占用额外空间，并且在查询使用它时会动态重新计算。如果表达式可以快速计算，这种轻量级计算列是理想的解决方案。但是，如果您有一些需要字符串处理的繁重计算，您可能希望永久存储计算值，直到基础列更改。这样，您将使用一些额外的空间，但查询无需等待每个应返回行的计算完成。这类计算列称为持久化计算列，可以通过在前面的示例中添加关键字\
  \ `PERSISTED` 来创建。生成的代码如下：\n\n```sql\nALTER TABLE Sales.OrderLines\nADD Profit AS\
  \ (Quantity*UnitPrice)*(1-TaxRate) PERSISTED\n```\n\n当任何基础值更改时，持久化计算列中的值会自动重新计算。\n\
  \n这可能看起来与您在上一章学到的用户定义函数非常相似：事实上，如果您愿意，也可以决定使用 `User-Defined Function` 来创建计算列。如果您不打算在其他地方使用\
  \ `User-Defined Function`，您只需将逻辑定义为计算列的表达式，这样就能节省一些代码和精力。\n\n\n## 复杂类型列\n\n标量类型列是关系数据库中标准且最常用的列类型。在大多数情况下，你可以仅包含标量类型列的规范化表来表示你的领域模型。然而，在某些场景下，你可能需要用一些非标量类型来表示你的应用程序对象。Azure\
  \ SQL 支持在表列中存储以下类型：\n\n*   `XML` – Azure SQL 支持在列中存储格式正确的 XML 文档。\n*   空间列包含一些常用元素，用于表示地理和几何概念，如点、线、多边形等。\n\
  *   `CLR` 列 – 这些列包含 `.NET` 对象的序列化二进制表示形式。\n\n这些类型不仅仅是其对应应用程序对象的二进制序列化。Azure SQL\
  \ 支持对这些类型应用一些特定方法。以下代码示例展示了一个最近邻查询，该查询返回距离给定点最近的五个城市：\n\n```\nDECLARE @g geography\
  \ = 'POINT(-95 45.5)';\nSELECT TOP(5) Location.ToString(), CityName\nFROM Application.Cities\n\
  ORDER BY Location.STDistance(@g) ASC;\n```\n\n空间列具有诸如 `STDistance` 之类的方法，该方法计算点与作为参数提供的位置之间的距离，并确保应用正确的计算，例如考虑地球是一个球体，以及有几种将地球表面投影到地图上的方式。这些并不简单的三角函数计算，你可以免费使用！\n\
  \nAzure SQL 中的复杂类型使你能够解决需要超出经典表类型特殊处理的、非常特定的问题。\n\nAzure SQL 支持存储 JSON 文档；然而，没有特殊的\
  \ JSON 类型。Azure SQL 使用标准的 `nvarchar` 类型来存储 JSON 格式的文本。这意味着 `任何` 编程语言都可以支持它，而无需特殊库。\n\
  \n### 声明式约束\n\n应用程序开发的黄金法则之一是业务规则应在应用层实现。纯粹主义者可能会认为，将业务逻辑推送到数据库存储过程、函数和触发器或客户端可能会导致问题和维护噩梦。我们对此已经做了一些讨论，明确描述了将计算推送到数据的必要性，但让我们先把之前讨论的所有原因放在一边，只关注\
  \ `业务规则`。业务规则必须留在应用层：这总是正确的吗？让我们看一些你可能需要实现的业务规则示例：\n\n*   你必须确保一个人的电子邮件地址或用户名是唯一的。在创建新用户之前，你会查询表以检查是否存在具有相同电子邮件的另一个用户吗？\n\
  *   你必须确保如果产品引用了不存在的客户，则无法保存该产品。在保存产品之前，你是否会每次读取客户表，只是为了确保没有人在此期间删除了该客户？\n*   当你从系统中删除客户时，所有附加信息（如文档）也应被删除，但订单和发票除外，对于这些，你需要断开与客户的关系，并在引用列中设置\
  \ `null` 值。如果客户仍有活动账户，则不应删除这些账户。在删除产品之前，你会从应用层查询 `订单` 和 `发票` 表以确保它们不返回任何结果吗？这可能是一个你需要实现并彻底测试的非平凡策略。\n\
  \n虽然你可以在应用程序中实现这些规则，但是否应该这样做是有争议的。描述数据状态和某些操作上行为的业务规则可以很容易地在数据库中声明。事实上，这些业务规则与数据紧密相连，以至于它们实际上更像是一种\
  \ `数据一致性` 规则。当然，它始终属于“业务规则”这个大家族的定义范畴，但一如既往，过度概括可能比有益更有害。事实上，通过在数据库级别应用这些规则，你可以确保数据与业务规则保持一致，并且无需一行应用代码即可应用这些规则，遵循保持事物尽可能简单（但不能过于简单！）的黄金原则，也有助于建立良好且清晰的关注点分离。数据绝对是数据库关注的问题。此外，你的操作不会产生额外的性能影响，因为你不需要在主操作中运行额外的查询来验证额外规则或实现某些附带活动。因此，你还能获得更好的性能。这应该有助于你更好地理解，哪些程度的业务规则应在应用层应用，哪些应在数据库应用。\n\
  \nAzure SQL 支持你通过以下约束来增强你的表，并声明性地定义规则以确保数据有效：\n\n*   `主键` 使你能够指定一个列（或一组列）保存对象的唯一标识符。\n\
  *   `外键` 指定一个对象（表行）在逻辑上属于另一个对象或以某种方式与该对象相关。这被称为 `参照完整性`，它保证通过外键和主键绑定的两行之间的关系不会意外中断。\n\
  *   `检查约束` 是每个对象都应检查的条件。这些约束保证对于保存在表中的数据，某些条件将始终为真。你可以将这些检查实现为最后一道防线，因此即使你的应用程序代码未能检查某些条件，或者你有多个服务可以更新相同的数据，你也可以确信数据库将保证该条件必须始终为真。\n\
  *   `唯一约束` 保证列中的值是唯一的。它们几乎类似于主键（一个很大的区别是它们允许空值），可用于用户名或电子邮件地址等值。\n\nAzure SQL 支持你无需实现即可声明性地指定这些约束。以下声明描述了客户与其发票和订单之间的关系。这些声明还将指定在客户被删除时应对相关数据采取什么操作。当有人试图删除客户时，此关系将删除该客户的所有发票：\n\
  \n```\nALTER TABLE Sales.Invoices\nADD CONSTRAINT FK_Cust_Inv FOREIGN KEY (CustomerID)\n\
  REFERENCES Sales.Customers (CustomerID) ON DELETE CASCADE;\n```\n\n以下声明将阻止删除客户的操作，如果该客户存在某些订单：\n\
  \n```\nALTER TABLE Sales.Orders\nADD CONSTRAINT FK_Cust_Orders FOREIGN KEY (CustomerID)\n\
  REFERENCES Sales.Customers (CustomerID) ON DELETE NO ACTION;\n```\n\n只需几行代码，你就可以轻松实现可能难以在应用层编码（尤其是测试）的业务规则。利用这些内置约束，你可以依赖\
  \ Azure SQL 来维护数据完整性，而无需在应用逻辑中付出任何额外努力。\n\n\n### 保障表的安全性\n\nAzure SQL 支持为任何能够访问数据库的用户或登录名关联细粒度的权限。假设你有一个管理销售订单信息的**销售微服务**。该微服务使用登录名\
  \ `SalesMicroservice` 访问 Azure SQL 数据库，该登录名应能读取或插入 `Sales.Orders` 表，但不能更新或删除数据。它应仅能读取关于\
  \ `Customers` 和 `Invoices` 的信息。对于某些自定义操作，它可能仅使用位于 `Sales` 架构中的存储过程。此微服务所需的最小权限集可以通过以下规则定义：\n\
  \n```sql\nGRANT SELECT, INSERT ON OBJECT::Sales.Orders TO SalesMicroservice;\nGRANT\
  \ SELECT ON OBJECT::Sales.Customers TO SalesMicroservice;\nGRANT SELECT ON OBJECT::Sales.Invoices\
  \ TO SalesMicroservice;\nGRANT EXECUTE ON SCHEMA::Sales TO SalesMicroservice;\n\
  ```\n\n这些是易于编写和审查的安全规则，你可以定义在数据库中。这种安全模型在诸如**命令查询职责分离 (CQRS)** 的架构中非常重要，这类架构中有各自独立的进程，分别只被允许读取或更新数据。分配所需的最小权限集将确保你不易受到各种安全攻击，例如\
  \ SQL 注入或未经授权的更改。Azure SQL 数据库中的安全规则是你数据的最后一道防线，即使应用程序层存在某些安全漏洞，它也应能防止数据泄露。\n\n\
  如果你需要检查分配给用户的权限，可以以该用户身份登录或模拟该用户，并使用 `fn_my_permissions` 函数检查权限：\n\n```sql\nEXECUTE\
  \ AS USER = 'SalesMicroservice';\nSELECT * FROM fn_my_permissions('Sales.Customers',\
  \ 'OBJECT');\nREVERT;\n```\n\n除了手动检查外，任何 Azure SQL 中都内置了**漏洞评估工具**，它会自动检查分配给用户的权限并提出建议。\n\
  \n## 使用索引提升性能\n\n一张表，除非你为其创建了*聚集索引*（你将在几页后了解到；现在只需记住，默认情况下主键也会在后台创建一个聚集索引），否则它是一组物理存储在类似\
  \ .NET、Java 和其他现代编程语言或运行时环境中堆内存区域中的行。这种表在 Azure SQL 术语中被称为*堆表*。\n\n经典的堆表仅在非常有限的场景（如扫描小表或追加行）中有用。然而，在\
  \ Azure SQL 数据库中，最常见的操作可能是通过标识符（主键）查找行、根据某些条件查找或更新一组数据等等。这些常见操作在组织为堆的普通行集合上效率极低。正如你将很快了解到的，即使是对整个表的简单扫描，如果我们使用某种特殊的列存储格式也会更高效。\n\
  \nAzure SQL 支持你使用*索引*来增强这种基本结构，并在各种场景下加速对行的访问。索引是行地址的结构，使你能够组织表中的行，或构建一种查询可以比使用基本表更高效利用的结构。Azure\
  \ SQL 中有几种索引类型：\n\n*   **B 树索引**：代表多级指针树状结构。这些索引使你无需扫描整个表即可轻松定位一个或一组行。\n*   **列存储索引**：以列式格式而非默认的行格式组织数据。这些结构（将在下一章描述）是加速扫描大表部分区域的报告和分析查询的绝佳解决方案。\n\
  *   **领域特定索引**：为高效支持某些非标准结构或数据类型而构建的特殊索引类型。Azure SQL 支持**空间索引**、**全文索引**和 **XML\
  \ 索引**。这些索引使你能够运行一些非标准的过滤，例如坐标是否在某个区域内、XPath 表达式、基于文本中两个词邻近性的过滤等。\n\nB 树索引是你在任何\
  \ Azure SQL 数据库（更广泛地说，在任何关系型或非关系型数据库）中最常见和使用的结构。B 树索引和表紧密耦合，无法分开讨论。在 Azure SQL 术语中，它们被称为\
  \ Hobits（HOBT – 堆或 B 树），它们是大多数数据库中最常见的结构。\n\n列存储索引和领域特定索引是高级概念，将在后续章节中解释。\n\n\n\
  ### B 树索引\n\nB 树索引是一种按表中列值划分节点的层级结构。这种索引在关系型和非关系型数据库中都非常普遍，因为它效率极高且计算上简单明了。这实际上是\
  \ Erich Gamma 等人所著的著名 *《设计模式》* 一书中描述的一种**组合设计模式**。在 B 树索引中，每个叶节点都包含指向表行的引用，而非叶节点则包含指向其他节点的引用。这种多层级的树形结构使你能够轻松定位一行或多行。每个\
  \ B 树索引都有一个所谓的键列。正是该列中的值被用来搜索表行以查找所需数据。\n\n图 6-2 展示了一个使用 `Price` 列来划分行指针的索引。\n\n\
  ![../images/493913_1_En_6_Chapter/493913_1_En_6_Fig2_HTML.jpg](img/493913_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2：使用 Price 列上的索引将行分组\n\n在根节点之下，你有一系列代表基于 `Price` 列值划分的行范围的组。每个组可能包含指向具有这些值的行的引用，也可能包含指向具有更细粒度范围的其他节点的引用。假设我们需要查找一组\
  \ `Price` 等于 73 的行。从根节点开始，我们可以定位到表示 `Price` 值在 50 到 100 之间的行引用范围的节点。这个节点会将我们引向包含\
  \ `Price` 列值在 70 到 100 范围内的行引用的节点。这就是叶节点，它包含行的地址，我们可以搜索该节点中的引用列表来找到具有所需值的行。叶节点中的引用数量不多，因此可以快速找到这些行。\n\
  \n索引中的叶节点是行或行地址的列表，为了确保性能始终最佳，这些列表不应过大。如果引用数量超过预定义的限制，Azure SQL 会将该节点拆分为两个节点（此操作称为页拆分）。\n\
  \n叶节点可能包含表行的引用（地址），也可能包含实际存储在表行中的单元格。因此，我们有以下几种索引类型：\n\n- `聚簇索引在其叶节点中保存实际行数据`。当你使用某个条件导航到叶节点时，你将找到实际的行。聚簇索引在物理上组织了表行。其结构定义了行的物理组织方式。由于表行只能有一种物理结构，因此每个表只能有一个聚簇索引。\n\
  \n- `非聚簇索引在其叶节点中保存行的地址`。当你使用某个条件导航到叶节点时，你需要额外的一次读取操作才能从实际行中获取数据。非聚簇索引是在表行之上构建的附加二级引用结构，旨在使你能够根据某些条件定位行。\n\
  \n一般建议是在主键列上创建聚簇索引，因为按主键筛选行是最常见的筛选模式，你希望用最优化的索引来覆盖这种情况。如果你知道有其他更主要的模式，也可以为聚簇索引选择其他列（例如，外键或某个日期列）。\n\
  \n非聚簇索引是额外的辅助结构，用于优化那些常见但非主要的查询。你可以添加多个非聚簇索引，查询优化器会为查询选择最合适的那一个。\n\n下面我们来详细看看何时该使用哪种索引。\n\
  \n### 何时使用 B 树索引？\n\nB 树索引是你在 Azure SQL 数据库中最常见的索引类型。其结构在以下场景中能为我们提供帮助：\n\n- **索引查找**操作：定位具有指定列值的单行或一组行。\n\
  - **范围扫描**操作：定位值在某个范围内的行集合。\n\n在以下查询中，索引可能会成为有用的性能助推器：\n\n```sql\nSELECT c.CustomerName,\
  \ c.CreditLimit,\no.CustomerPurchaseOrderNumber, o.DeliveryInstructions\nFROM Sales.Customers\
  \ AS c\nINNER JOIN Sales.Orders AS o\nON c.CustomerID = o.CustomerID\nWHERE c.PostalCityID\
  \ = 42\n```\n\nAzure SQL 需要读取 `Customers` 表以找到所有 `PostalCityID` 值为 42 的客户。然后，它还需要读取\
  \ `Orders` 表，以查找其 `CustomerID` 列值与从第一次读取中获取的 `CustomerID` 值相匹配的订单。仅仅为了获取几行数据而扫描整个表，效率可能非常低下。让我们看看如果我们创建以下索引会发生什么：\n\
  \n```sql\nCREATE INDEX ix_Customer_PostalCityID\nON Sales.Customers(PostalCityID);\n\
  CREATE INDEX ix_Orders_CustomerID\nON Sales.Orders(CustomerID);\n```\n\n有了在 `Customers`\
  \ 表 `PostalCityID` 列上创建的索引，Azure SQL 将使用该索引快速定位具有给定 `PostalCityID` 的 `Customers`\
  \ 行。然后，它将基于 `CustomerID` 值在第二个索引中查找订单。可以想象，在大型表中，这会带来巨大的性能优势，更不用说能减少资源、CPU、RAM 和\
  \ IO 的使用，而这反过来意味着更好的可扩展性和更低的成本。\n\n\n### 何时创建索引？\n\n人们有时会忍不住通过添加各种索引来优化数据库，只要他们认为这些索引可能有帮助。有些人甚至认为在每个列上创建自动索引可能是数据库设计的圣杯。然而，在创建索引之前，你需要意识到索引的代价是什么。\n\
  \n索引并非总是能提升查询性能的银弹。在只读工作负载中，它们可能是完美的解决方案，因为它们为更好的执行计划提供了更多选择，而最坏的影响只是它们占用的一些额外空间。然而，对于写操作来说，它们是一种负担，因为每个包含更新值的索引都必须随表一起更新。如果你有一个包含五个索引的表，那么每次插入、删除以及许多更新语句都可能不仅需要更新主表，还需要更新所有索引。\n\
  \n你不应该盲目地在每一列或外键上添加索引，因为这可能会损害数据库性能。以下是一些可用于选择在哪里添加索引的通用准则：\n\n*   你可以从为主键列创建聚集索引开始，因为表上最常见的操作是通过主键值查找行。\n\
  *   表可能需要在外键上创建非聚集索引，因为你可能期望查询需要读取具有外键值的所有行。\n*   如果你发现应用程序的某个重要查询速度缓慢，你可能需要为该查询使用的列创建索引。\n\
  \n随着数据库和解决方案复杂性的增加，你可能会发现一个非常常见的查询，它使用 `OrderDate` 列返回过去一天的所有订单。在这种情况下，在该列上创建聚集索引可能很有用，这样，同一天下的所有订单在物理存储上会彼此靠近。请记住，实际上，聚集索引将其行存储在叶级，并且行按创建索引的列排序。这意味着\
  \ Azure SQL 可以从该天下的第一笔订单开始读取，并在找到最后一笔订单时停止，从而将读取优化到最低程度。当然，由于只有一个聚集索引，你需要根据对应用程序工作方式以及用户主要使用方式的了解来仔细评估此策略。\n\
  \n如你所见，确定正确的索引并非易事。因此，存在各种工具，如 `SQL Server Management Studio` 中的 `Performance Dashboard`、`Database\
  \ Tuning Advisor`，或开源脚本如 `Tiger Toolbox` 或 `First Responder Kit`（本章末尾的链接中引用了两者），它们可以提供可能需要创建的索引列表。在创建索引之前，请务必使用工具来证明你确实需要它。过度索引和很少使用的索引是导致性能问题的两个最常见原因。\n\
  \nAzure SQL 提供了一系列智能功能，例如 `Automatic tuning`，它会提供关于你可能需要创建的索引的建议。这是识别缺失索引的最佳方式，因为这些建议由机器学习算法提供支持，这些算法在\
  \ Azure SQL 中的大量数据库上进行了训练。更棒的是，你可以让 Azure SQL 的 `Automatic tuning` 功能自动为你创建索引。`Automatic\
  \ tuning` 功能的主要好处是，它会验证创建的索引是否会改善你的查询性能。Azure SQL 具有内置的机器学习模型，用于衡量索引创建前后数据库工作负载的性能，识别受索引影响的查询，并检查查询性能是得到改善还是恶化。如果性能改善不够显著，或者新索引导致性能下降，该更改将被还原。此外，`Automatic\
  \ tuning` 会扫描你的索引使用情况，并向你推荐应该删除的索引。另一个重要好处是，`Automatic tuning` 会合并索引建议以提供最佳索引。例如，如果有两个建议，一个是为列\
  \ `A` 创建索引，另一个是为列 `A` 和 `B` 创建索引，Azure SQL 索引建议将只推荐第二个，因为它也能覆盖只需要列 `A` 的查询。\n\n\n\
  \n### 维护索引\n\n每当索引列中的数据发生更改时，索引都会更新。最初创建的索引是一个完全平衡的树，能提供最佳性能。然而，在活跃使用的数据库中，底层数据会随时间变化，导致索引失衡，部分节点处于半填充状态。索引维护操作会重新生成索引并使其恢复到更佳状态。你可以对索引执行两种维护操作：\n\
  \n*   `REBUILD` 是一种完全重新创建索引的操作，它会删除旧结构并重新创建一个新的完全平衡的索引。此操作以资源消耗为代价，确保你的索引处于完美状态。\n\
  \n*   `REORGANIZE` 是一种重新洗牌索引部分数据的操作，旨在尝试填充未使用的空间并平衡索引的各个部分。这是一种非常轻量级的操作，通常不会影响应用程序性能或消耗大量资源，但另一方面，它可能无法修复所有问题。\n\
  \n重新创建索引的 SQL 语句示例如下：\n\n```sql\nALTER INDEX FK_Sales_Customers_DeliveryCityID ON\
  \ Sales.Customers\nREBUILD WITH ( ONLINE = ON);\n```\n\n如果你想重组索引，只需将 `REBUILD` 关键字替换为\
  \ `REORGANIZE`。此语句中一个有趣的可选选项是 `ONLINE` 选项。重建索引有两种方式：\n\n*   `OFFLINE` 是默认选项，是重建索引最快的方式，但它会阻止任何可能触及索引列数据的查询。\n\
  \n*   `ONLINE` 允许你的工作负载更改数据，因为它会获取期间发生的任何更改。这是一种更灵活的操作，但可能比 `OFFLINE` 版本消耗更多资源，并且在完成前可能影响性能。\n\
  \n这些选项仅在 `REBUILD` 操作中可用。`REORGANIZE` 始终是 `ONLINE`。\n\n索引维护中最重要的问题是应该使用哪个选项以及应用于哪些索引。重建或重组所有索引只会消耗本应用于查询的资源，而且大多数索引可能根本不需要任何维护。通常用于确定索引健康状况的标准是碎片化。碎片化是指索引中包含索引数据的空间百分比。\n\
  \n以下查询返回给定数据库和对象（应扫描其索引）的所有索引的碎片化信息：\n\n```sql\nDECLARE @db_id int = DB_ID('Wide\
  \ World Importers');\nDECLARE @object_id int = OBJECT_ID('Sales.Customers');\nSELECT\
  \ index_id, partition_number, avg_fragmentation_in_percent\nFROM sys.dm_db_index_physical_stats(@db_id,\
  \ @object_id, NULL, NULL , 'LIMITED');\n```\n\n在查询结果中，你可以找到 `index_id`、`partition_number`\
  \ 和 `fragmentation`，因此可以使用 `sys.indexes` 等系统视图来查找碎片化的索引。注意函数中的最后一个参数——`LIMITED`。调查索引碎片化并非轻量级操作，特别是在大型索引上，你可以指定是通过扫描索引的有限部分来获取近似结果、从样本计算统计信息，还是分析整个索引。\n\
  \n你需要对索引采取的操作取决于碎片化程度。一些经验法则如下：\n\n*   如果索引的碎片化在 5% 到 30% 之间，请使用 `REORGANIZE` 操作。\n\
  \n*   如果碎片化大于 30%，并且你能找到表格不被使用的一段时间（即维护窗口），请使用 `OFFLINE REBUILD` 操作。\n\n*   如果你的表格频繁使用，并且你无法阻塞应用程序工作负载，请使用\
  \ `ONLINE REBUILD` 操作。\n\n你也可以使用经过验证的开源脚本来帮助识别需要维护的索引并应用推荐的操作。最常用的索引维护脚本是 Ola Hallengren\
  \ 脚本和 SQL Tiger Toolbox。\n\n可恢复性是另一个重要的索引维护策略。如果你无法避免可能昂贵的 `REBUILD` 操作，并且没有维护窗口，Azure\
  \ SQL 允许你暂时暂停重建操作并在之后恢复。这在以下情况下是一个绝佳的选择：你发现索引维护影响了应用程序性能，需要暂停索引重建，让你的应用程序完成一些工作，然后在不丢失已完成工作的情况下继续维护。\n\
  \n### 退役索引\n\n创建索引很容易，但更重要的问题是“它们是否被使用，或者它们造成的弊是否大于利？”过度索引可能导致严重的性能问题。即使你拥有一套理想的索引，你的应用程序模式和数据库工作负载也会随时间变化，一些索引可能因不再使用而需要被移除。最终，你将需要退役并删除一些索引。\n\
  \n经验丰富的数据库管理员可以通过查看系统视图和查询执行计划，或者在设置 `STATISTICS IO` 选项时检查逻辑读取次数，轻松识别不必要的索引。如果在此领域的深度专业知识不是你的职业目标之一，你可以再次依赖\
  \ Azure SQL 提供的优势。除了索引创建建议外，Azure SQL 还提供删除索引建议。Azure SQL 会扫描索引使用情况以识别未使用的索引。它还可以识别应被删除的重复索引。你可以直接使用脚本来删除索引，或者让\
  \ Azure SQL 为你清理索引。Azure SQL 不会仅仅删除并遗忘索引。自动调优将使用与索引创建相同的算法，并监控删除索引操作是否降低了性能。如果检测到性能问题，Azure\
  \ SQL 将重新创建已删除的索引。\n\n\n\n## 如果你想了解更多\n\n你在本章中学到的知识使你能够专业地创建合适的数据库设计，并理解数据库中可能遇到的问题。本章解释的概念代表了数据库设计所需的核心知识。在下一章中，我们将更进一步——你将了解如何使用一些高级概念和表的类型与索引，这些可以提升你的数据库性能。\n\
  \n要了解更多本章提及的主题，你可以从这些资源开始：\n\n*   数据库设计与关系理论：范式及其他——[www.amazon.com/Database-Design-Relational-Theory-Normal-ebook/dp/B082X1B6WP](http://www.amazon.com/Database-Design-Relational-Theory-Normal-ebook/dp/B082X1B6WP)\n\
  *   SQL Server 专家级性能索引——[www.amazon.com/Expert-Performance-Indexing-SQL-Server/dp/1484211197](http://www.amazon.com/Expert-Performance-Indexing-SQL-Server/dp/1484211197)\n\
  *   设计模式：可复用面向对象软件的元素——[www.amazon.com/Design-Patterns-Elements-Reusable-Object-Oriented/dp/0201633612](http://www.amazon.com/Design-Patterns-Elements-Reusable-Object-Oriented/dp/0201633612)\n\
  *   领域驱动设计：应对软件核心复杂性——[www.amazon.com/Domain-Driven-Design-Tackling-Complexity-Software-ebook/dp/B00794TAUG](http://www.amazon.com/Domain-Driven-Design-Tackling-Complexity-Software-ebook/dp/B00794TAUG)\n\
  *   数据库：解释数据规范化、数据异常与 DBMS 键——[`towardsdatascience.com/softly-explained-data-normalization-data-anomalies-and-dbms-keys-f8122aefaeb3`](https://towardsdatascience.com/softly-explained-data-normalization-data-anomalies-and-dbms-keys-f8122aefaeb3)\n\
  *   堆与索引——[`docs.microsoft.com/sql/relational-databases/indexes/heaps-tables-without-clustered-indexes`](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/heaps-tables-without-clustered-indexes%253Fview%253Dsql-server-ver15)\n\
  *   Tiger Toolbox —— [`github.com/microsoft/tigertoolbox`](https://github.com/microsoft/tigertoolbox)\n\
  *   First Responder Kit —— [`github.com/BrentOzarULTD/SQL-Server-First-Responder-Kit`](https://github.com/BrentOzarULTD/SQL-Server-First-Responder-Kit)\n\
  *   sp_WhoIsActive —— [`github.com/amachanic/sp_whoisactive`](https://github.com/amachanic/sp_whoisactive)\n\
  \n# 7. 可扩展性、一致性与性能\n\n可扩展性，通常定义为系统通过向其添加资源来处理不断增长的工作量的能力。在云平台中，大规模标准化和“规模经济”原则驱动着硬件设计，单纯向单个服务实例添加资源的能力可能受到限制。这就是为什么，除了采用横向扩展架构外，设计并调优你的工作负载以最大化资源利用率，同样是一个至关重要的可扩展性方面。如果你正在设计一个全新的应用程序，或者有机会在迁移前修改一个现有应用，这也能实实在在地降低你的云账单。\n\
  \n虽然可扩展性无疑是一个关键属性，但一致性是我们应该期望从关系型数据库管理系统解决方案中获得的另一个关键方面。事务性系统确保数据在应用程序和用户交互后保持一致状态，而底层引擎负责管理不同用户的多个并发活动将如何访问数据以维持这种一致性，这是基于可配置的属性，例如这些事务活动之间的隔离级别。\n\
  \n一致性确实是应用程序开发中的*关键因素*，尽管它常常被忽视：许多开发人员认为一致性是可选的。在一些极端情况下，这也许是对的；但在大多数情况下，并非如此。事实上，近来关系型数据库管理系统重新成为焦点并非偶然。在著名的论文《F1：一个可扩展的分布式\
  \ SQL 数据库》中，谷歌明确指出：“设计应用程序来处理数据中的并发异常非常容易出错、耗时，并且最终不值得为那点性能提升而冒险。” 而如果数据库层面没有处理好一致性，猜猜谁会被要求编写代码来处理它？没错，就是你，开发者。这是因为你的用户会认为一致性是理所当然的。所以，必须有人或有东西来处理它——当然，是在大规模环境下。而数据库级别的、大规模的一致性，正是像谷歌\
  \ Spanner、亚马逊 Aurora 和 Azure SQL Hyperscale 这样的全新一代后关系型数据库诞生的原因。\n\n\n\n## 事务\n\n\
  ### 理解事务与 ACID 属性\n\n事务是给定应用逻辑中的工作单元，可能由多个较低层级的任务组成。事务也被称为“工作单元”，这是一种非常知名的模式，用于跟踪更改，并将更改作为一个整体在逻辑上提交或回滚，正如马丁·福勒在其*企业应用架构模式*一书中所描述的那样。\n\
  \n数据库系统在处理事务时，会维护所谓的`ACID`属性（`原子性`、`一致性`、`隔离性`和`持久性`），以确保数据的完整性和准确性。事务业务逻辑的典型示例可以是银行账户之间的转账或\
  \ ATM 现金取款，在这些场景中，你希望确保一系列操作遵循“全有或全无”的逻辑进行。数据库平台有助于强制执行这些`ACID`属性，而无需从应用角度进行复杂的实现：开发人员无需手动实现逻辑来在至少一个更新失败时恢复更新操作。\n\
  \n### 事务在任何应用中的重要性\n\n现在，你可能对这个示例非常熟悉，并且可能认为自己不会编写银行应用，因此并不真正需要事务。虽然这种想法表面上看起来正确，但请记住，即使在最简单的应用中，比如一个博客引擎，你也可能有使用事务的需求。\n\
  \n假设你想跟踪有多少人访问了你的博客，既要统计整个博客的访问量，也要统计你写的每篇文章的访问量。由于你希望确保能够根据需要无限扩展，你设置了两个计数器：一个用于整个博客，一个用于每篇文章。每次有人访问页面时，你都需要增加整个网站的计数器和该页面的计数器。如果你没有正确实现和管理事务，会发生什么？\n\
  \n可能会发生这样的情况：由于某种原因，在网站计数器更新后但在文章计数器更新前，某个环节崩溃了。这意味着你现在已经完全丢失了信息。一致性不复存在。如果你尝试将所有单个计数器相加，结果将与网站计数器不同。那么哪个值是正确的呢？你可能——也许——能够投入大量的专注、时间和精力来重建信息。但在许多情况下，你根本无法做到。现在，对于博客计数器来说，这也许不是什么大问题（但即使这也不完全正确，如果你是按博客访问量获得报酬呢？），但它让你认识到一致性以及因此而来的事务的重要性，即使在你可能未曾想到的地方也是如此。数据一致性应该是每个系统的基石。没有它，数据就只是噪音。\n\
  \n### 如何实现 ACID 属性：预写式日志 (WAL)\n\n幸运的是，在现代数据库系统中，`ACID`属性通常通过预写式日志来实现，这是一种通过首先在事务日志中记录更改来提供原子性和持久性的能力，只有随后才通过一个称为`检查点`的周期性后台进程将更改写入数据库。日志通常同时存储重做和撤销信息，这些信息将用于恢复任何已提交但尚未写入数据库的事务，例如在从断电中恢复或数据库还原期间。\n\
  \n> **注意**\n> 如果你是 Apache Kafka 用户，你可能会发现 WAL 技术与 Apache Kafka 使用的不可变日志原则有很多相似之处。在两种情况下，一切都作为事件存储在日志中。通过向前或向后读取日志，你可以重做或撤销任何操作，甚至可以停在期望的时间点。这正是像\
  \ Azure SQL 这样的关系数据库管理系统向最终用户保证不会丢失任何数据、并且可以恢复一切及其期望时间点的原因。\n\n### Azure SQL 中的事务：用例与机制\n\
  \n在 Azure SQL 中，你可以想到几种使用事务会有所帮助的用例。例如，你可能希望将多个行的插入、更新或删除操作作为一个单元或批处理过程来执行，而不是逐个处理。同样，你可能需要在满足特定条件时才修改表的状态，即当相同或不同数据库（甚至服务器）中的其他表也被修改时。\n\
  \n由于这些系统可以并发处理多个此类操作，Azure SQL 引擎通常会通过在这些事务涉及的各种资源（基表、索引键等）上放置锁来保护一致性，锁的粒度可以从单行到整个数据库不等，具体取决于并发（也称为隔离）设置是如何配置的。一旦事务提交或回滚，这些锁就会被释放。\n\
  \n锁只是 Azure SQL 用来确保数据保持一致性的选项之一，可能是最简单的一种。另一种更复杂的能力是，允许同一行的多个不同版本同时保持活动状态，向请求的事务提供正确的版本，即使其他事务正在更改同一行，也能保证一致性。关于这种被称为`行版本控制`的技术的讨论，远远超出了本书的范围：只需记住，默认情况下，Azure\
  \ SQL 会混合使用这两种技术，以确保你获得最佳的体验和性能。\n\n> **提示**\n> 尽可能缩短事务的持续时间是一种最佳实践，这将有助于增加数据库对象上的并发性，并减少维护锁或行版本所需的系统资源。\n\
  \n### 管理事务：控制与范围\n\n应用程序可以通过使用 Transact-SQL 命令或客户端驱动程序公开的 API 函数来控制事务，指定事务何时开始和结束（成功或失败）。事务通常在连接级别管理：当在某个连接上启动事务时，直到该事务结束前，在该连接上执行的所有\
  \ Transact-SQL 语句都是该事务的一部分。\n\n> **注意**\n> 这种行为的一个例外是当您有一个多活动结果集 (`MARS`) 会话时。`MARS`是一项可以通过连接字符串属性启用的功能，它允许应用程序在同一个连接上已经存在一个活动结果集时，在该连接上执行命令。一个典型场景是，当你遍历`SELECT`查询检索到的一系列行，并且希望使用相同的连接执行`UPDATE`命令时。在这种情况下，事务的作用域将在批处理级别（而不是连接级别），当它完成时，如果事务没有显式提交或回滚，Azure\
  \ SQL 将自动将其回滚。\n\n### 显式模式与自动提交模式\n\n当你通过 API 函数（例如，.NET 语言中的`BeginTransaction()`方法）或发出`T-SQL`语句（如`BEGIN\
  \ TRANSACTION`、`COMMIT TRANSACTION`、`COMMIT WORK`、`ROLLBACK TRANSACTION`或`ROLLBACK\
  \ WORK`）显式定义事务的开始和结束时，Azure SQL 中的事务被定义为`显式`事务。\n\n当你没有显式启动事务，而是对 Azure SQL 执行单个命令时，默认模式称为`自动提交`。在这种模式下，每个`T-SQL`语句在完成时都会被提交或回滚。如果语句成功完成，则被提交；如果遇到任何错误，则被回滚。自动提交模式也是`ADO`、`OLE\
  \ DB`、`ODBC`和`DB-Library`等客户端驱动程序操作的默认模式。\n\n\n# 事务模式\n\n我们拥有的第三种模式称为 `implicit`（隐式）。在此模式下，Azure\
  \ SQL 会在当前事务提交或回滚后启动一个新事务。启动事务无需执行任何操作；您只需提交或回滚每个事务。这最后一种模式主要是出于合规和向后兼容性的原因而实现的。在大多数用例中，您的应用程序在执行简单的数据库命令时会使用自动提交，且通常不需要严格控制复杂事务。当需要管理某些更复杂的具体事务行为时，建议切换到\
  \ `explicit`（显式）模式。事务模式设置可通过执行显式 T-SQL 语句在连接级别进行控制。不同的客户端驱动程序可能有不同的事务模式默认设置，并且会在建立新连接时为您调用\
  \ T-SQL 语句，因此查阅您所使用驱动程序的文档以了解其具体行为非常重要。\n\n### 本地事务\n\n作为应用程序开发人员，您大部分时间将与在单个 Azure\
  \ SQL 数据库实例上下文中执行的事务进行交互，这些事务通常被称为 *本地事务*，以区别于我们稍后将讨论的分布式事务。在此场景中，本地事务通常被包装在 `存储过程`\
  \ 内的更复杂的业务逻辑中使用，这通常是保持事务持续时间短暂并避免应用程序与数据库代码之间多次网络往返的推荐做法。如果出于任何原因，您不依赖 `存储过程`，而是在应用程序代码中编写数据库访问命令，您可以通过调用客户端驱动程序\
  \ `API` 暴露的特定命令来控制事务行为。\n\n以下是一个如何在 T-SQL 脚本（如 `存储过程`）中使用显式事务的示例。在我们的系统中，有两个主要表：`订单表（Orders）`\
  \ 和 `库存表（Inventory）`；每当为给定产品下一个新订单时，我们需要减少其库存数量。我们系统中的业务逻辑必须防止为即将缺货的商品下新订单。实现此逻辑的方法有很多种，在我们的示例中，我们将新订单的下达和同一商品库存的减少包装在一个显式事务中：\n\
  \n```sql\n-- 创建表结构\nCREATE TABLE dbo.Orders (ID int PRIMARY KEY, ProductID int,\
  \ OrderDate datetime);\nCREATE TABLE dbo.Inventory (ProductID int PRIMARY KEY, QuantityInStock\
  \ int\nCONSTRAINT CHK_QuantityInStock CHECK (QuantityInStock>-1));\n-- 插入一些示例值\n\
  INSERT INTO dbo.Orders VALUES (1,1,getdate());\nINSERT INTO dbo.Inventory VALUES\
  \ (1,100);\n-- 开始一个显式事务\nBEGIN TRANSACTION mytran\n-- 在应用逻辑中尝试执行工作单元\nBEGIN TRY\n\
  INSERT INTO Orders VALUES (2,1,getdate());\nUPDATE Inventory SET QuantityInStock=QuantityInStock-1\
  \ WHERE ProductID=1\n-- 如果两个命令都成功，则提交事务\nCOMMIT TRANSACTION\nEND TRY\nBEGIN CATCH\n\
  -- 如果有错误，则捕获详细信息\nSELECT\nERROR_NUMBER() AS ErrorNumber\n, ERROR_SEVERITY() AS ErrorSeverity\n\
  , ERROR_STATE() AS ErrorState\n, ERROR_PROCEDURE() AS ErrorProcedure\n, ERROR_LINE()\
  \ AS ErrorLine\n, ERROR_MESSAGE() AS ErrorMessage;\n-- 显式回滚事务\nROLLBACK TRANSACTION\n\
  END CATCH\nSELECT * FROM dbo.Orders\nSELECT * FROM dbo.Inventory\n```\n\n在此脚本中，创建并填充了几个表之后，您可以找到\
  \ `BEGIN TRANSACTION` 语句，后面跟有一个（可选的）名称。\n\n`BEGIN TRY` 块将尝试执行直到 `END TRY` 为止的所有语句，如果它们全部执行无误，事务将通过\
  \ `COMMIT TRANSACTION` 语句永久提交。\n\n![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig1_HTML.jpg](img/493913_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1：成功事务结果\n\n现在，我们更改产品的库存数量并将其设置为零，因为我们要测试库存耗尽时会发生什么，然后我们尝试再次运行该事务：\n\n```sql\n\
  UPDATE dbo.Inventory SET QuantityInStock=0 WHERE ProductID=1\n```\n\n![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig2_HTML.jpg](img/493913_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2：事务回滚结果\n\n在这种情况下，执行 `UPDATE Inventory` 语句时将抛出错误，因为我们违反了 `QuantityInStock`\
  \ 属性上的 `CHECK` 约束。控制权将从 `BEGIN TRY` 块传递到 `BEGIN CATCH` 块。在该块中，我们检索有关该会话中发生的最新错误的所有详细信息，但我们还显式调用\
  \ `ROLLBACK TRANSACTION` 以确保作为同一事务一部分对其他表所做的修改（在示例中是 `INSERT INTO Orders` 命令）不会持久化，系统状态将保持一致。\n\
  \n\n让我们看看如何使用 Python 开发一个示例应用程序来实现相同的行为。\n\n```python\nimport os\nimport pyodbc\n\
  from decouple import config\nserver = config('server')\ndatabase = config('database')\n\
  username = config('username')\npassword = config('password')\ndriver= '{ODBC Driver\
  \ 17 for SQL Server}'\n"
- "# Connecting to Azure SQL Database with autocommit=True\ncnxn = pyodbc.connect('DRIVER='+driver+';SERVER='+server+';PORT=1433;DATABASE='+database+';UID='+username+';PWD='+\
  \ password,autocommit=True)\ndef prepare_database():\n    try:\n        # Executing\
  \ database preparation tasks\n        cursor = cnxn.cursor()\n        cursor.execute(\"\
  \"\"IF (EXISTS (SELECT *  FROM INFORMATION_SCHEMA.TABLES\n            WHERE TABLE_SCHEMA\
  \ = 'dbo'\n            AND  TABLE_NAME = 'Orders'))\n        BEGIN\n           \
  \ DROP TABLE [dbo].[Orders];\n        END\n        IF (EXISTS (SELECT *  FROM INFORMATION_SCHEMA.TABLES\n\
  \            WHERE TABLE_SCHEMA = 'dbo'\n            AND  TABLE_NAME = 'Inventory'))\n\
  \        BEGIN\n            DROP TABLE [dbo].[Inventory];\n        END\n       \
  \ CREATE TABLE [dbo].[Orders] (ID int PRIMARY KEY, ProductID int, OrderDate datetime);\n\
  \        CREATE TABLE [dbo].[Inventory] (ProductID int PRIMARY KEY, QuantityInStock\
  \ int\n            CONSTRAINT CHK_QuantityInStock CHECK (QuantityInStock>-1));\n\
  \        -- Fill up with some sample values\n        INSERT INTO dbo.Orders VALUES\
  \ (1,1,getdate());\n        INSERT INTO dbo.Inventory VALUES (1,0);\n        \"\"\
  \")\n    except pyodbc.DatabaseError as err:\n        # Catch if there’s an error\n\
  \        print(\"Couldn't prepare database tables\")\ndef execute_transaction():\n\
  \    try:\n        # Switching to autocommit = False, our app can now control transactional\
  \ behavior\n        cnxn.autocommit = False\n        cursor = cnxn.cursor()\n  \
  \      cursor.execute(\"INSERT INTO Orders VALUES (2,1,getdate());\")\n        cursor.execute(\"\
  UPDATE Inventory SET QuantityInStock=QuantityInStock-1 WHERE ProductID=1\")\n  \
  \  except pyodbc.DatabaseError as err:\n        # If there’s a database error, roll\
  \ back the transaction\n        cnxn.rollback()\n        print(\"Transaction rolled\
  \ back: \" + str(err))\n    else:\n        # If database commands were successful,\
  \ commit the transaction\n        cnxn.commit()\n        print(\"Transaction committed!\"\
  )\n    finally:\n        cnxn.autocommit = True\nprepare_database()\nexecute_transaction()\n\
  Listing 7-1\n在 Python 中使用事务的示例\n```\n\n在这个例子中，你可以看到 `自动提交` 属性在 Python 中使用 `pyodbc`\
  \ 控制事务时扮演着多么重要的角色。我们以 `autocommit=True` 打开连接，这意味着每条命令执行后都会自动提交。在 `prepare_database()`\
  \ 方法中，我们实际上是在数据库中执行一些准备工作，这些工作将作为单个事务执行。然而，在 `execute_transaction()` 方法中，我们显式地切换到\
  \ `autocommit=False`，这样我们就可以通过程序控制何时提交或回滚我们的逻辑工作单元。请记住，我们的应用逻辑是通过一个 `CHECK` 约束来强制执行的，该约束在给定产品缺货时阻止下新订单。\n\
  \n执行此代码示例时，你将收到此错误消息，并且由于事务被回滚，数据库表不会被修改：\n\n```\nTransaction rolled back: ('23000',\
  \ '[23000] [Microsoft][ODBC Driver 17 for SQL Server][SQL Server] The UPDATE statement\
  \ conflicted with the CHECK constraint \"CHK_QuantityInStock\". The conflict occurred\
  \ in database \"WideWorldImporters-Full\", table \"dbo.Inventory\", column 'QuantityInStock'.\
  \ (547) (SQLExecDirectW)')\n```\n\n在这个非常简单的例子中，我们对执行数据库操作出错时引发的异常做出反应，但还有其他场景，我们的应用逻辑需要检查数据库中给定实体的特定状态（通过查询表），然后决定是提交还是整体回滚整个工作单元。\n\
  \n为事务命名是一种有用的做法，可以提高代码的可读性，并且，可能更重要的是，会反映在各种与事务相关的系统视图中，简化调试过程。`BEGIN TRANSACTION\
  \ [transaction_name]` 开始一个本地事务，但在进一步的诸如 `INSERT`、`UPDATE` 或 `DELETE` 等数据操作操作触发日志更新之前，实际上不会写入事务日志（尽管也可能发生其他活动，比如为保护\
  \ `SELECT` 语句的事务隔离级别而获取锁）。\n\n应用程序或脚本可以在另一个事务已经存在的情况下开始，甚至提交或回滚一个事务。Azure SQL 并不真正提供对嵌套事务的直接支持，提交在另一个事务内打开的事务完全没有任何效果。只有外部事务才会真正控制其间在各个事务上执行的各种数据操作活动的结果，提交或回滚所有内容。作为应用程序开发人员，我们不应该使用这种方法，以避免误导性的行为和后果。\n\
  \n那么为什么允许嵌套事务呢？嗯，一个常见的使用场景是当你编写包含事务逻辑的存储过程时，这些过程可以单独调用，也可以从可能自身已经启动了事务的外部过程调用。一个好的做法是始终使用\
  \ `@@TRANCOUNT` 系统变量检查该连接上是否已经存在一个打开的事务，然后决定是启动一个新的事务，还是仅仅参与外部过程启动的事务，并用 `SAVE TRANSACTION\
  \ savepoint_name` 标记事务内部部分的开始。\n\n每次执行一个新的 `BEGIN TRANSACTION`，`@@TRANCOUNT` 将增加\
  \ 1。同样，每次执行 `COMMIT TRANSACTION`，它将减少 1。如果是 `ROLLBACK TRANSACTION`，所有事务都将被回滚，`@@TRANCOUNT`\
  \ 将被重置为零，唯一的例外是 `ROLLBACK TRANSACTION savepoint_name`，它不会以任何方式影响 `@@TRANCOUNT` 计数器。\n\
  \n事实上，当需要更复杂的事务逻辑时，开发人员可以在事务流中定义一个位置，以便在事务的一部分被条件性取消或回滚时返回：这通常被称为 *保存点*。如果事务回滚到一个保存点，使用\
  \ `ROLLBACK TRANSACTION savepoint_name`，那么控制流必须继续完成，可选择地根据需要执行更多的 T-SQL 语句，并使用 `COMMIT\
  \ TRANSACTION` 语句来成功完成它。否则，它必须通过将事务回滚到其开始位置来完全取消。要取消整个事务，请使用 `ROLLBACK TRANSACTION\
  \ transaction_name` 形式。\n\n一个总结了所有这些概念的 T-SQL 示例如下。\n\n\n```\nUSE AdventureWorks2012;\n\
  GO\nIF EXISTS (SELECT name FROM sys.objects\nWHERE name = N'SaveTranExample')\n\
  DROP PROCEDURE SaveTranExample;\nGO\nCREATE PROCEDURE SaveTranExample\n@InputCandidateID\
  \ INT\nAS\n-- 检测该过程是否被调用\n-- 于一个活动事务中，并保存\n-- 该信息供后续使用。\n-- 在过程中，`@TranCounter`\
  \ = 0\n-- 表示没有活动事务\n-- 并且过程自己启动了一个。\n-- `@TranCounter` > 0 表示在\n-- 过程被调用前已存在一个\n\
  -- 活动事务。\nDECLARE @TranCounter INT;\nSET @TranCounter = @@TRANCOUNT;\nIF @TranCounter\
  \ > 0\n-- 过程在有一个\n-- 活动事务时被调用。\n-- 创建一个保存点，以便\n-- 在出现错误时仅回滚\n-- 过程中执行的工作。\nSAVE\
  \ TRANSACTION ProcedureSave;\nELSE\n-- 过程必须启动自己的\n-- 事务。\nBEGIN TRANSACTION;\n--\
  \ 修改数据库。\nBEGIN TRY\nDELETE HumanResources.JobCandidate\nWHERE JobCandidateID =\
  \ @InputCandidateID;\n-- 如果没有错误则执行到这里；必须提交\n-- 过程中启动的任何事务，\n-- 但不提交在过程调用前启动的事务。\n\
  IF @TranCounter = 0\n-- `@TranCounter` = 0 表示在过程调用前\n-- 没有启动事务。\n-- 过程必须提交它自己\n\
  -- 启动的事务。\nCOMMIT TRANSACTION;\nEND TRY\nBEGIN CATCH\n-- 发生错误；必须确定\n-- 哪种回滚方式能够仅回滚\n\
  -- 过程中执行的工作。\nIF @TranCounter = 0\n-- 事务在过程中启动。\n-- 回滚整个事务。\nROLLBACK TRANSACTION;\n\
  ELSE\n-- 事务在过程调用前启动，\n-- 不要回滚在过程调用前\n-- 做的修改。\nIF XACT_STATE() <> -1\n-- 如果事务仍然有效，只需\n\
  -- 回滚到存储过程开始时\n-- 设置的保存点。\nROLLBACK TRANSACTION ProcedureSave;\n-- 如果事务是不可提交的，则\n\
  -- 回滚到保存点是不被允许的，\n-- 因为保存点回滚会写入日志。\n-- 只是返回到调用者，调用者应\n-- 回滚外层事务。\n-- 在适当的回滚之后，向调用者\n\
  -- 输出错误信息。\nDECLARE @ErrorMessage NVARCHAR(4000);\nDECLARE @ErrorSeverity INT;\n\
  DECLARE @ErrorState INT;\nSELECT @ErrorMessage = ERROR_MESSAGE();\nSELECT @ErrorSeverity\
  \ = ERROR_SEVERITY();\nSELECT @ErrorState = ERROR_STATE();\nRAISERROR (@ErrorMessage,\
  \ -- 消息文本。\n@ErrorSeverity, -- 严重性。\n@ErrorState -- 状态。\n);\nEND CATCH\nGO\n```\n\
  \n## 清单 7-2\n### 在 T-SQL 脚本中使用事务的示例\n\n此处的逻辑是在修改数据库之前检查是否已存在一个事务。如果是这样，则首先创建一个保存点，如果数据修改失败，则仅回滚到该保存点，而不涉及在外层事务中执行的任何先前活动。\n\
  \n并非所有数据库驱动程序都提供对事务名称或保存点的直接控制：例如，`pyodbc` 没有提供调用事务开始（无论是否有名称）或保存点的方法，但您始终可以通过简单地执行等效的\
  \ T-SQL 语句来访问这些功能。\n\n在其他语言如 C# 和 .NET Core 中，您可以控制事务逻辑的所有方面，如下例所示。\n\n```csharp\n\
  using (SqlConnection connection = new SqlConnection(connectionString))\n{\n    connection.Open();\n\
  \    SqlCommand command = connection.CreateCommand();\n    SqlTransaction transaction;\n\
  \n    // 启动一个本地事务。\n    transaction = connection.BeginTransaction(\"SampleTransaction\"\
  );\n\n    // 必须将事务对象和连接\n    // 都分配给 Command 对象以用于挂起的本地事务\n    command.Connection\
  \ = connection;\n    command.Transaction = transaction;\n\n    try\n    {\n    \
  \    command.CommandText =\n            \"Insert into Region (RegionID, RegionDescription)\
  \ VALUES (100, 'Description')\";\n        command.ExecuteNonQuery();\n        transaction.Save(\"\
  FirstRegionInserted\");\n\n        command.CommandText =\n            \"Insert into\
  \ Region (RegionID, RegionDescription) VALUES (101, 'Description')\";\n        command.ExecuteNonQuery();\n\
  \n        // 回滚到保存点\n        transaction.Rollback(\"FirstRegionInserted\");\n  \
  \      // 只有第一次插入会被考虑\n\n        // 尝试提交事务。\n        transaction.Commit();\n   \
  \     Console.WriteLine(\"Only first insert is written to database.\");\n    }\n\
  \    catch (Exception ex)\n    {\n        Console.WriteLine(\"Commit Exception Type:\
  \ {0}\", ex.GetType());\n        Console.WriteLine(\"  Message: {0}\", ex.Message);\n\
  \n        // 尝试回滚事务。\n        try\n        {\n            transaction.Rollback(\"\
  SampleTransaction\");\n        }\n        catch (Exception ex2)\n        {\n   \
  \         // 此 catch 块将处理服务器上可能发生的\n            // 任何会导致回滚失败的错误，例如\n           \
  \ // 连接关闭。\n            Console.WriteLine(\"Rollback Exception Type: {0}\", ex2.GetType());\n\
  \            Console.WriteLine(\"  Message: {0}\", ex2.Message);\n        }\n  \
  \  }\n}\n```\n\n## 清单 7-3\n### 在 .NET Core 应用中使用事务的示例\n\nAzure SQL 提供了多个动态管理视图（DMV）来监控在给定数据库实例中运行的事务。它们以\
  \ `sys.dm_tran_*` 前缀开头。以下示例返回有关数据库级别打开的事务的详细信息：\n\n```sql\nSELECT * FROM sys.dm_tran_database_transactions\
  \ WHERE database_id = db_id()\n```\n\n\n## 跨云数据库的分布式事务\n\n传统上，关系数据库管理系统一直支持跨多个数据库乃至多个服务器的事务，通常称为**分布式事务**。这些功能通过特定组件实现，例如分布式事务协调器和监视器（如\
  \ Microsoft 分布式事务协调器，或 `MS DTC`），以及两阶段提交协议（如 `XA`）。一般来说，这些底层技术是为在传统数据中心环境中运行而设计的，具有低延迟、紧密耦合的本地连接以及特定的硬件配置。然而，在高度分布式和标准化的云环境中，设计模式已经演进，以消除对这些传统方法的依赖，转而采用更解耦、异步的模式，如\
  \ `Saga`，这些模式通常在数据库层之外进行管理。\n\n截至撰写本文时，`MS DTC` 仅在 `Azure SQL 托管实例`中受支持，您可以充分利用其功能。但如果您需要在\
  \ `Azure SQL 数据库`中获得分布式事务支持怎么办？您会很高兴地了解到，通过 `弹性事务`，仍然可以跨多个 `Azure SQL 数据库`实例实现分布式事务，该功能适用于基于\
  \ `.NET`的应用程序。\n\n通过这种方法，`Azure SQL 数据库`将有效地代表 `MS DTC` 协调分布式事务，应用程序可以连接到多个实例，并通过\
  \ `System.Transaction` 类来控制执行事务，其强制性要求是 `.NET 4.6.1` 或更高版本，但遗憾的是，在撰写本文时，`.NET Core`\
  \ 尚不支持此功能。下图展示了各个组件如何交互以支持此场景。\n\n![../images/493913_1_En_7_Chapter/493913_1_En_7_Fig3_HTML.jpg](img/493913_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3 Azure SQL 数据库上的分布式事务\n\n让我们通过一个简单的例子来看看如何在应用程序中实现这一点：\n\n```csharp\nusing\
  \ (var scope = new TransactionScope())\n{\n    using (var conn1 = new SqlConnection(connStrDb1))\n\
  \    {\n        conn1.Open();\n        SqlCommand cmd1 = conn1.CreateCommand();\n\
  \        cmd1.CommandText = string.Format(\"insert into T1 values(1)\");\n     \
  \   cmd1.ExecuteNonQuery();\n    }\n    using (var conn2 = new SqlConnection(connStrDb2))\n\
  \    {\n        conn2.Open();\n        var cmd2 = conn2.CreateCommand();\n     \
  \   cmd2.CommandText = string.Format(\"insert into T2 values(2)\");\n        cmd2.ExecuteNonQuery();\n\
  \    }\n    scope.Complete();\n}\n```\n\n如您所见，用法非常直接：`TransactionScope` 通过建立一个环境事务（环境事务是指存在于当前线程中的事务）来完成所有繁重的工作，所有在该范围内打开的连接都将参与该事务。如果这些连接指向多个数据库，则该事务会自动升级为分布式事务。当范围完成时，事务将提交。\n\
  \n`弹性事务`也可以涉及属于多个逻辑服务器的数据库，但为了启用此功能，需要首先通过调用 `PowerShell` 命令 `New-AzSqlServerCommunicationLink`\
  \ 将这些服务器建立为互信通信关系。\n\n我们可以使用与本地事务相同的 `DMV`（动态管理视图）来监控分布式事务的状态（例如，`SELECT * FROM\
  \ sys.dm_tran_active_transactions`），但对于分布式事务，`UOW`（工作单元）列将标识属于同一分布式事务的不同子事务。同一分布式事务内的所有事务都具有相同的\
  \ `UOW` 值。\n\n## 锁定与非锁定选项\n\n数据库引擎通常是多用户系统，特定用户执行的操作可能会影响也可能不会影响并发使用的其他用户正在使用的表和行。通过为单个事务命令指定隔离级别，或将其设置为会话或数据库中所有会话的默认值，我们可以定义一个事务必须与其他事务对资源或数据的修改隔离的程度。隔离级别定义了哪些并发副作用是被允许的，例如脏读（读取被另一个尚未提交的运行中事务修改的行的数据）或幻读（另一个事务在正在读取的记录中添加或删除了行）。它们控制诸如读取数据时是否加锁、请求何种类型的锁以及读取锁保持多长时间等事项。如果不使用锁来提供一致性，隔离级别则帮助引擎理解何时可以删除同一行的不同版本，因为没有其他事务在使用它。当读取操作引用被另一个事务修改的行时，隔离级别定义了它们是被阻塞直到该行上的排他锁被释放，还是在不使用锁的情况下，定义应检索在语句或事务开始时存在的该行的哪个已提交版本；如果隔离级别设置得足够低，您甚至可以读取未提交的数据。虽然这是被允许的，但您几乎永远不应该使用此功能。读取未提交的数据意味着您正在读取一些可能被回滚的内容；这意味着您的应用程序可能会开始基于这些数据执行操作，而这些数据可能是由于输入错误等原因而被撤销的。\n\
  \n一个需要理解的重要概念是，更改事务隔离级别并不会影响为保护数据修改而获取锁的方式。无论为该事务设置了何种隔离级别，事务总是对任何修改的数据获取排他锁，并在事务完成前一直持有该锁。锁不仅是一种同步机制，而且携带元数据，这对于数据库引擎在需要时了解情况非常有用。可以改变的是锁的使用方式。幸运的是，我们不必深入繁琐的细节，因为我们能够以一致性和并发性为考量，表达我们期望的行为，而\
  \ `Azure SQL` 会为我们使用正确的锁。\n\n对于读取操作，隔离级别定义了免受其他事务修改影响的保护级别。较低的隔离级别提高了更多并发访问数据的能力，但增加了潜在的并发问题，如脏读和数据不一致。较高的隔离级别提高了数据一致性，但通过使用锁（这也会消耗系统资源，即内存）增加了阻塞其他事务的可能性。应用程序逻辑和需求将决定哪个隔离级别更为合适。\n\
  \n\n\n# Azure SQL 事务隔离级别与并发控制\n\n## 标准隔离级别\n\n| **隔离级别** | **定义** |\n| --- | ---\
  \ |\n| 读取未提交 | 最低的隔离级别；允许脏读。一个事务可能看到其他事务尚未提交的更改。 |\n| 读取已提交 | 一个事务可以访问由其他事务创建或修改并提交的数据。如果数据被修改，Azure\
  \ SQL 会保留写入锁（在选定数据上获取），直到事务结束。读取锁在执行 `SELECT` 操作后即释放。 |\n| 可重复读 | Azure SQL 会在选定数据上保留读取锁和写入锁，直到事务结束。不管理范围锁，因此可能出现幻读。范围锁用于保护范围内所有待修改的数据，包括由\
  \ `INSERT` 或 `DELETE` 语句进行的修改。 |\n| 可序列化 | 最高级别，事务彼此完全隔离。Azure SQL 在选定数据上保留读取锁和写入锁，并在事务结束时释放。当\
  \ `SELECT` 操作使用带范围的 `WHERE` 子句时，会获取范围锁，特别是为了避免幻读。 |\n\n除了这些作为 ISO 标准定义给所有数据库管理系统的隔离级别外，Azure\
  \ SQL 还支持两个使用行版本控制的附加事务隔离级别。\n\n## 行版本控制隔离级别\n\n| **行版本控制隔离级别** | **定义** |\n| ---\
  \ | --- |\n| 读取已提交快照 (RCSI) | 在 Azure SQL Database 中，这是新创建数据库的默认隔离级别，`读取已提交` 隔离使用行版本控制来提供*语句级*读取一致性。读取操作只需要\
  \ SCH-S（共享架构锁，仅用于防止在读取表时更改表架构），而不需要页锁或行锁。Azure SQL 使用行版本控制，为每个语句提供该语句开始时存在的数据的一致性事务快照。不使用锁来保护数据免受其他事务的更新。使用此隔离级别，写入者和读取者不会相互阻塞。\
  \ |\n| 快照 | 快照隔离级别使用行版本控制来提供*事务级*读取一致性。读取操作不获取页锁或行锁；仅获取 SCH-S 表锁。当读取由另一事务修改的行时，它们检索该事务开始时存在的行版本。只有在\
  \ `ALLOW_SNAPSHOT_ISOLATION` 数据库选项设置为 ON 时，才能对数据库使用快照隔离，这在 Azure SQL 中是默认设置。 |\n\
  \n## 术语澄清：锁\n\n在深入之前，让我们澄清一下刚才使用的一些术语，特别是关于锁的部分。\n\n一个共享架构锁 (`SCH-S`) 用于确保在您使用表时没有人可以更改表定义。在高度并发的系统中，可能发生有人试图在您运行\
  \ `SELECT` 时 `DROP` 或 `ALTER` 一个表。Azure SQL 会通过放置一个 `SCH-S` 锁来保护您的 `SELECT`，这样那些想要更改架构的命令就必须等到您的\
  \ `SELECT` 完成。\n\n一个范围锁用于保护正在运行的事务免受尚不存在的数据的影响，如果允许这些数据被创建，可能会干扰正在运行的事务。\n\n## 锁管理机制\n\
  \nAzure SQL 引擎通过请求数据上的锁来管理多个用户针对数据库执行事务的并发性。锁具有不同的模式，例如共享或独占。锁模式定义了事务对数据的依赖程度。如果锁类型会与已授予给另一事务的同类锁冲突，则无法为事务授予该锁。如果事务请求的锁类型与同一数据上已授予的锁冲突，Azure\
  \ SQL 将暂停请求事务，直到第一个锁释放。当事务修改数据时，它会持有保护该修改的锁直到事务结束。事务持有锁以保护读取操作的时间长短取决于事务隔离级别的设置。事务持有的所有锁都会在事务完成时（无论是提交还是回滚）释放。\n\
  \n应用程序通常不直接请求锁；相反，锁由 Azure SQL 引擎的一个内部部分管理，称为锁管理器。在处理 Transact-SQL 语句时，Azure SQL\
  \ 会确定要访问的资源。查询处理器根据访问类型和事务隔离级别的设置，确定保护每个资源所需的锁类型。然后，查询处理器向锁管理器（Azure SQL 引擎内的一个子系统）请求适当的锁。如果没有其他事务持有冲突的锁，锁管理器就会授予这些锁。\n\
  \n## 多粒度锁\n\nAzure SQL 具有多粒度锁，允许事务锁定不同类型的资源。为了最小化锁的成本（锁结构保存在内存中），Azure SQL 锁资源会自动以适合任务的级别工作。在较小的粒度（如行）上锁定会增加并发性，但如果锁定了许多行，则必须持有更多锁，因此开销较高。在较大的粒度（如表）上锁定在并发性方面代价高昂，因为锁定整个表会限制其他事务访问表的任何部分。然而，它的开销较低，因为维护的锁更少。Azure\
  \ SQL 根据需要锁定的数据量自动选择最佳锁粒度，试图在资源成本和并发影响之间取得平衡。\n\nAzure SQL 通常必须在多个粒度级别获取锁才能完全保护资源。这组位于多个粒度级别的锁称为锁层次结构。例如，为了完全保护对索引的读取，Azure\
  \ SQL 实例可能必须在行上获取共享锁，并在页和表上获取意向共享锁。意向锁用于指示将来可能在该资源上获取锁。此信息有助于锁管理器避免未来的冲突。\n\n##\
  \ 开发者控制与参考\n\n如您所见，事务和锁管理是相当复杂的主题。关于锁在内部如何工作，以及不同的锁类型和级别如何影响底层数据的并发性的更多见解，可以在 Azure\
  \ 文档的“事务锁定和行版本控制指南”中找到：`https://aka.ms/sstlarv`。\n\n作为开发人员，我们可以通过特定的 T-SQL 语句和客户端驱动程序\
  \ API（如 `Microsoft.Data.SqlClient` 或 SQL Server JDBC Driver）来控制我们的应用程序如何处理不同的隔离级别和并发性。\n\
  \n在 T-SQL 脚本或存储过程中，您可以使用 `SET TRANSACTION ISOLATION LEVEL isolation_level` 来控制该连接上后续所有语句的锁定和行版本控制行为：\n\
  \n```sql\nSET TRANSACTION ISOLATION LEVEL REPEATABLE READ;\nGO\nBEGIN TRANSACTION;\n\
  GO\nSELECT * FROM HumanResources.EmployeePayHistory;\nGO\nSELECT * FROM HumanResources.Department;\n\
  GO\nCOMMIT TRANSACTION;\nGO\n```\n\n\n\n不同的客户端驱动程序 API 在处理事务时的隔离级别管理方面，提供了略有不同的行为和语义。第一个例子与\
  \ Microsoft.Data.SqlClient 驱动相关，你可以在调用 `BeginTransaction()` 方法时指定隔离级别：\n\n```\n\
  // Start a local transaction.\ntransaction = connection.BeginTransaction(\nIsolationLevel.ReadCommitted,\
  \ \"SampleTransaction\");\n```\n\n而在 Microsoft SQL Server JDBC 驱动中，你通过 `Connection`\
  \ 类的 `setTransactionIsolation()` 方法来指定隔离级别：\n\n```\ncon.setTransactionIsolation(Connection.TRANSACTION_READ_COMMITTED);\n\
  ```\n\n除了驱动程序 API 和连接级别的隔离设置，`表提示` 也可以在数据操作语言 (DML) 语句执行期间覆盖 Azure SQL 引擎的默认行为，并通过指定锁定方法让你控制诸如锁类型、粒度等事项。例如，使用\
  \ `HOLDLOCK` 类型（或其等效项 `SERIALIZABLE`）的表提示会使共享锁更具限制性，将其保持到事务完成，而不是在所需的表或数据页不再需要时立即释放共享锁。`ROWLOCK`\
  \ 指定在通常获取页锁或表锁时获取行锁（与 `TABLOCK` 或 `PAGLOCK` 相对）。\n\n表提示在 DML 语句的 `FROM` 子句中指定，并且仅影响该子句中引用的表或视图；以下是如何使用它们的示例：\n\
  \n```\nFROM t (ROWLOCK, XLOCK)\n```\n\n请注意，并非所有提示都与所有类型的 DML 命令兼容，要获取有关这个有趣主题的所有详细信息，你可以访问官方产品文档中的此链接：[`https://aka.ms/uathaaqh`](https://aka.ms/uathaaqh)。\n\
  \n注意\n\n运行缓慢或长时间运行的查询可能导致资源过度消耗，并可能是查询被阻塞的结果。阻塞的原因可能是糟糕的应用程序设计、不良的查询计划、缺少有用的索引等等。你可以使用\
  \ `sys.dm_tran_locks` 动态管理视图来获取有关数据库中当前锁活动的信息。\n\n正如我们提到的，Azure SQL 的默认隔离级别是**已提交读快照隔离\
  \ (RCSI)**，这在并发性和数据完整性之间提供了最佳权衡，在大多数场景下让读者和写者不会相互阻塞。作为最佳实践，你应将其他事务隔离级别或语句级表提示的使用限制在非常特定的、需要特定行为的用例中。在所有其他情况下，默认设置即可完美工作。同时，请放心，如果你需要深入细节，甚至微调单个语句，这也是可以做到的。这种令人惊叹的灵活性在数据库云市场中是独一无二的！\n\
  \n## 原生编译存储过程\n\n原生编译存储过程是编译为机器代码的 T-SQL 存储过程，而不是像常规存储过程那样由查询执行引擎解释执行。它们与 Azure\
  \ SQL 中的内存优化表协同工作，为应用程序中性能关键部分频繁执行的查询提供极快的响应时间。使用原生编译存储过程带来的性能优势随着过程处理的行数和逻辑量的增加而提升，并且在执行聚合操作、对大量行的嵌套循环连接、多语句的\
  \ select、insert、update 和 delete 操作，或复杂的程序逻辑（如条件语句和循环）时效果最佳。\n\n当我们使用传统的解释型 Transact-SQL\
  \ 语句访问内存优化表时，查询处理流水线看起来与基于磁盘的表非常相似，除了行不是从传统的缓冲池检索，而是从内存引擎中检索：\n\n![../images/493913_1_En_7_Chapter/493913_1_En_7_Figa_HTML.jpg](img/493913_1_En_7_Figa_HTML.jpg)\n\
  \n当使用原生编译存储过程时，过程被分成两部分。首先，解析器、代数器和优化器为存储过程中的所有查询创建优化的查询执行计划，然后存储过程被编译为原生代码并存储在\
  \ .dll 文件中：\n\n![../images/493913_1_En_7_Chapter/493913_1_En_7_Figb_HTML.jpg](img/493913_1_En_7_Figb_HTML.jpg)\n\
  \n当调用存储过程时，内存优化 OLTP 运行时定位到该存储过程的 DLL 入口点，执行 DLL 中的机器代码，并将结果返回给客户端：\n\n![../images/493913_1_En_7_Chapter/493913_1_En_7_Figc_HTML.jpg](img/493913_1_En_7_Figc_HTML.jpg)\n\
  \n创建原生编译存储过程的语法非常简单，如下例所示（该示例测试了在充当键值存储缓存的表上执行 100,000 次 GET + PUT 操作的速度）：\n\n```\n\
  create or alter procedure cache.[Test]\nwith native_compilation, schemabinding\n\
  as\nbegin atomic with (transaction isolation level = snapshot, language = N'us_english')\n\
  declare @i int = 0;\nwhile (@i < 100000)\nbegin\ndeclare @r int = cast(rand() *\
  \ 10000 as int)\ndeclare @v nvarchar(max) = (select top(1) [value] from dbo.[MemoryStore]\
  \ where [key]=@r);\nif (@v is not null) begin\ndeclare @c int = cast(json_value(@v,\
  \ '$.counter') as int) + 1;\nupdate dbo.[MemoryStore] set [value] = json_modify(@v,\
  \ '$.counter', @c) where [key] = @r\nend else begin\ndeclare @value nvarchar(max)\
  \ = '{\"value\": \"' + cast(sysdatetime() as nvarchar(max)) + '\", \"counter\":\
  \ 1}'\ninsert into dbo.[MemoryStore] values (@r, @value)\nend\nset @i += 1;\nend\n\
  end\ngo\n```\n\n一旦创建，这个存储过程可以像任何其他存储过程一样被我们的应用程序调用：\n\n```\nEXEC cache.[Test];\n\
  ```\n\n原生编译存储过程内部支持的操作符有一些限制。例如，语法 `SELECT * FROM table` 不受支持，你需要指定完整的列列表。有关这些细节的更多信息，你可以查看产品文档：[`https://aka.ms/ncsp`](https://aka.ms/ncsp)。\n\
  \n注意\n\n作为最佳实践，你不应考虑对点查找这类查询模式使用原生编译存储过程。事实上，如果你只需要处理单行数据，使用原生编译存储过程可能不会比传统的解释型存储过程带来性能优势。\n\
  \n## 优化数据库往返次数\n\n减少应用程序层与数据库层之间的往返次数，可能是在设计或排查使用 Azure SQL 的应用程序时可以考虑的**最重要的优化措施**。只要你的应用程序逻辑允许，将操作**批处理**到\
  \ Azure SQL 数据库和 Azure SQL 托管实例可以显著提高应用程序的性能和可伸缩性。将调用批处理到远程服务是提高性能和可伸缩性的众所周知策略。与远程服务的任何交互都有固定的处理成本，例如序列化、网络传输和反序列化。将许多单独的事务打包成一个批次可以最小化这些成本。\n\
  \nAzure SQL 的多租户特性意味着数据访问层的效率与数据库的整体可伸缩性相关。为响应超过预定义配额的使用情况，Azure SQL 可能会降低吞吐量或以限流异常进行响应。像批处理这样的效率提升手段，可以让你在达到这些限制之前做更多的工作。\n\
  \n我们可以采用几种批处理技术来使我们的应用程序更高效，这些技术适用于大多数编程语言和框架。让我们从你应该考虑的各种批处理策略开始，详细阐述这些技术。\n\n\n\
  ### 利用事务\n\n在讨论批处理时，以事务作为开头似乎有些奇怪。但使用客户端事务具有一种微妙的服务器端批处理效果，能提升性能。而且添加事务只需几行代码，因此它们提供了一种快速提升顺序操作性能的方法。\n\
  \n将作为隐式事务执行的单个调用，转变为将多个调用包装在一个事务中，可以有效地延迟对事务日志的写入，直到事务提交，从而降低了 Azure SQL 引擎与事务日志存储之间延迟的影响。\n\
  \n根据具体的表结构和要包装在事务中的操作数量，此技术可为数据修改任务提供高达 10 倍的性能提升。\n\n### 表值参数\n\n表值参数支持在 Transact-SQL\
  \ 语句、存储过程和函数中使用用户定义的表类型作为参数。这种客户端批处理技术允许您在表值参数内发送多行数据。要使用表值参数，首先需要定义一个表类型。以下 Transact-SQL\
  \ 语句创建了一个名为 `MyTableType` 的表类型：\n\n```\nCREATE TYPE MyTableType AS TABLE (\nmytext\
  \ NVARCHAR(MAX),\nnum INT\n);\n```\n\n在应用程序代码中，您可以创建一个与表类型结构完全相同的内存数据结构，并将此数据结构作为参数传递给文本查询或存储过程调用。以下示例展示了此技术在\
  \ .NET Core 应用程序中的实现：\n\n```\nusing (SqlConnection connection = new SqlConnection(connString))\n\
  {\n    connection.Open();\n    DataTable table = new DataTable();\n    // 添加列和行。以下是一个简单示例。\n\
  \    table.Columns.Add(\"mytext\", typeof(string));\n    table.Columns.Add(\"num\"\
  , typeof(int));\n    for (var i = 0; i < 10; i++)\n    {\n        table.Rows.Add(DateTime.Now.ToString(),\n\
  \                       DateTime.Now.Millisecond);\n    }\n    SqlCommand cmd =\
  \ new SqlCommand(\n        \"INSERT INTO MyTable(mytext, num) SELECT mytext, num\
  \ FROM @TestTvp\", connection);\n    cmd.Parameters.Add(\n        new SqlParameter()\n\
  \        {\n            ParameterName = \"@TestTvp\",\n            SqlDbType = SqlDbType.Structured,\n\
  \            TypeName = \"MyTableType\",\n            Value = table,\n        });\n\
  \    cmd.ExecuteNonQuery();\n}\n```\n\n为了进一步改进上面的示例，可以使用存储过程代替基于文本的命令。以下 Transact-SQL\
  \ 命令创建了一个接受 `SimpleTestTableType` 表值参数的存储过程：\n\n```\nCREATE PROCEDURE [dbo].[sp_InsertRows]\n\
  \    @TestTvp as MyTableType READONLY\nAS\nBEGIN\n    INSERT INTO MyTable(mytext,\
  \ num)\n    SELECT mytext, num FROM @TestTvp\nEND\nGO\n```\n\n然后，我们只需修改前面示例中的几行代码来调用该存储过程：\n\
  \n```\nSqlCommand cmd = new SqlCommand(\"sp_InsertRows\", connection);\ncmd.CommandType\
  \ = CommandType.StoredProcedure;\n```\n\n在大多数情况下，表值参数的性能与其他批处理技术相当或更优。表值参数通常更受青睐，因为它们比其他选项更灵活。使用表值参数，您可以在存储过程中使用逻辑来确定哪些行是更新，哪些是插入。表类型也可以修改以包含一个“操作”列，用于指示指定行应进行插入、更新还是删除。\n\
  \n对于更复杂的应用场景，使用表值参数可以在整体性能和简化实现方面带来巨大收益，您可以参考此产品文档链接：[`https://aka.ms/piubbs`](https://aka.ms/piubbs)。\n\
  \n### 批量复制\n\nAzure SQL 为从应用程序向表中大批量加载记录提供了专门的支持。这种支持从 TDS 纵向协议延伸到许多客户端驱动程序（例如 `SqlClient`、`JDBC`\
  \ 或 `ODBC`）中可用的各种 API。\n\n例如，.NET 应用程序可以使用 `SqlBulkCopy` 类来执行批量插入操作。`SqlBulkCopy`\
  \ 在功能上类似于命令行工具 `Bcp.exe` 或 Transact-SQL 语句 `BULK INSERT`。以下代码示例展示了如何将源 `DataTable`（由\
  \ `table` 变量表示）中的行批量复制到目标表 `MyTable`：\n\n```\nusing (SqlConnection connection =\
  \ new SqlConnection(connString))\n{\n    connection.Open();\n    using (SqlBulkCopy\
  \ bulkCopy = new SqlBulkCopy(connection))\n    {\n        bulkCopy.DestinationTableName\
  \ = \"MyTable\";\n        bulkCopy.ColumnMappings.Add(\"mytext\", \"mytext\");\n\
  \        bulkCopy.ColumnMappings.Add(\"num\", \"num\");\n        bulkCopy.WriteToServer(table);\n\
  \    }\n}\n```\n\n您可能现在想知道应该在什么时候使用表值参数，什么时候使用批量复制 API 更合适。使用表值参数与其他使用基于集合的变量的方式相当；然而，对于大型数据集，频繁使用表值参数可能更快。与启动成本高于表值参数的批量操作相比，表值参数在插入多达几千行时表现良好。如果您要批处理的是\
  \ 10000 行或更多数据，那么批量复制无疑将是向 Azure SQL 加载数据最高效的方式。\n\n### 多行参数化 INSERT 语句\n\n对于小批量操作，另一种选择是构建一个插入多行的大型参数化\
  \ `INSERT` 语句。T-SQL 语言通过以下语法直接支持此用例：\n\n```\nINSERT INTO [MyTable] ( mytext, num\
  \ ) VALUES (@p1, @p2), (@p3, @p4), (@p5, @p6), (@p7, @p8), (@p9, @p10)\n```\n\n\
  然后，从您选择的编程语言出发，您可以使用特定驱动程序的 API 来利用这些功能。例如，您可以看一下这段 Python 代码片段：\n\n```\nparams\
  \ = [ ('A', 1), ('B', 2) ]\ncursor.fast_executemany = True\ncursor.executemany(\"\
  insert into t(name, id) values (?, ?)\", params)\n```\n\n基本上，通过将 `fast_executemany`\
  \ 游标属性设置为 `True`，`pyodbc` 驱动程序会将多个参数元组打包成一个批次，从而显著减少应用程序代码与后端数据库之间的往返次数。\n\n更高级别的框架，如\
  \ `EntityFramework` `Core` 或 `SQLAlchemy`，正在利用底层客户端驱动程序的能力，并提供等效的批处理选项。始终建议检查您自己使用的编程语言和框架组合是否支持这些功能。\n\
  \n\n### 建议与最佳实践\n\n理解批处理/缓冲与弹性之间的权衡非常重要。如果数据库操作失败，丢失一批未处理的关键业务数据的风险可能超过批处理的性能优势。因此，在采用批处理时，实现前几章介绍的适当重试逻辑技术就更为重要。\n\
  \n如果选择单一的批处理技术，`表值参数`能提供最佳的性能和灵活性。要获得最快的插入性能，请遵循以下通用准则，但务必在你的场景中进行测试：\n\n*   对于少于\
  \ 100 行，使用单参数化的 `INSERT` 命令。\n*   对于少于 1000 行，使用`表值参数`。\n*   对于大于等于 1000–2000 行，在\
  \ .NET 中使用 `SqlBulkCopy`，或在其他语言中使用等效的批量复制技术（例如 Java 中的 `SQLServerBulkCopy`）。\n\n\
  对于更新和删除操作，请将`表值参数`与`存储过程`逻辑结合使用，该逻辑用于确定对表参数中每一行执行的正确操作。使用对你的应用程序和业务需求来说合理的大批次大小。\n\
  \n测试最大的批次大小，以验证 `Azure SQL` 不会拒绝它。创建用于控制批处理的配置设置，例如批次大小或缓冲时间窗口。这些设置提供了灵活性：你可以在生产环境中更改批处理行为，而无需重新部署云服务。\n\
  \n避免并行执行在单个数据库的单个表上操作的批次。如果确实选择将单个批次分配给多个工作线程，请运行测试以确定理想的线程数量。这个数量取决于几个因素，包括每个服务层级和计算大小的日志生成速率限制、对目标表上的数据和索引页的锁定影响等。最终效果是，更多的线程实际上可能会降低性能而不是提高它，因此测试你自己的工作负载并可能调整线程数量非常重要。\n\
  \n## 如果你想了解更多\n\n管理数据一致性是一项艰巨的任务。在并发和大规模场景下执行此任务则更具挑战性。正如本章引言所述，几乎所有最常用的数据库都提供对事务的支持并非偶然。在应用程序代码中管理一切将非常困难且效率低下。如今，关于可扩展性与一致性的争论几乎已不复存在。这要归功于新型的云原生架构，例如用于构建\
  \ `Azure SQL DB Hyperscale` 的架构，让你可以两者兼得。`Azure SQL Hyperscale` 数据库背后的技术令人惊叹。如果你想了解更多，以下列表将为你提供一个起点：\n\
  \n*   工作单元 – [`https://martinfowler.com/eaaCatalog/unitOfWork.html`](https://martinfowler.com/eaaCatalog/unitOfWork.html)\n\
  *   Spanner：成为一个 SQL 系统 – Google Research – [`https://static.googleusercontent.com/media/research.google.com/en//pubs/archive/46103.pdf`](https://static.googleusercontent.com/media/research.google.com/en//pubs/archive/46103.pdf)\n\
  *   Socrates：云端的全新 SQL Server – [`www.microsoft.com/research/publication/socrates-the-new-sql-server-in-the-cloud/`](http://www.microsoft.com/research/publication/socrates-the-new-sql-server-in-the-cloud/)\n\
  *   SQL 正在击败 NoSQL 吗？ – [`https://dzone.com/articles/is-sql-beating-nosql`](https://dzone.com/articles/is-sql-beating-nosql)\n\
  *   微服务的 6 种数据管理模式 – [`http://progressivecoder.com/6-data-management-patterns-for-microservices/`](http://progressivecoder.com/6-data-management-patterns-for-microservices/)\n\
  *   事务锁定与行版本控制指南 – [`https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide`](https://docs.microsoft.com/en-us/sql/relational-databases/sql-server-transaction-locking-and-row-versioning-guide)\n\
  *   如何使用批处理提升 Azure SQL 数据库和 Azure SQL 托管实例的应用程序性能 – [`https://docs.microsoft.com/azure/azure-sql/performance-improve-use-batching`](https://docs.microsoft.com/azure/azure-sql/performance-improve-use-batching)\n\
  \n# 8. 多模型能力\n\n`Azure SQL` 并非一个传统的关系型数据库平台。每个现代数据库都必须使你能够使用各种数据格式来应对不同场景。尽管传统的规范化关系型格式经过实战检验，并被证明是适用于广泛不同场景的优化技术，但在某些情况下，你可能会发现其他格式可能更适合你正在解决的问题。\n\
  \n一个常见的例子是反规范化。传统上，你将领域对象表示为一组表，采用前几章所述的所谓*范式*形式。这是一种众所周知的数据库设计技术，其中每个复杂的领域结构，如列表或数组，都被放置在一个单独的表中。规范化模型对于高度并发的工作负载是优化的，在这种情况下，许多线程同时更新和读取领域对象的不同部分，而不影响正在更新其他部分的线程。然而，如果你的工作负载中，一个线程一次只访问一个对象，那么高度规范化的数据库可能会迫使你连接大量表来从物理部分重建领域对象。在这种情况下，你可以考虑将对象序列化为一个单一单元，而不是对其进行分解。\n\
  \n`Azure SQL` 使你能够在同一个物理数据模型中同时使用关系型和非关系型结构。\n\n能够处理关系型、结构化或几种类型的半结构化格式，将 `Azure\
  \ SQL` 归类为多模型数据库。如果你访问 [`https://db-engines.com/en/ranking`](https://db-engines.com/en/ranking)\
  \ 这个为数据库流行度评分的网站，你可能会注意到所有排名靠前的关系型数据库也被归类为多模型数据库，因为支持各种数据格式是所有现代数据库系统的必备要求。\n\n\n\
  ## 在数据库设计中利用多模型能力\n\n在我们深入探讨 Azure SQL 的多模型能力之前，让我们先看看何时应该在应用程序中使用它们。一些软件工程师喜欢 NoSQL\
  \ 概念，因为它们使数据库更易于使用，并且（显然）不需要前期进行大量设计，因此你可以立即开始使用它，而无需付出太多努力，也不需要表之间复杂的连接。另一些人则偏爱关系模型，因为它经过实战检验，并保证无论复杂度如何，你都可以对任何领域进行建模。作为一个成熟的软件工程师，你不应该基于某些武断的偏好来做教条式的架构决策。在关系型和非关系型模型之间或其组合的选择，应该基于你应用程序的领域模型。\n\
  \n如果你使用类似领域驱动开发（DDD）的方法，你可能会在你的领域中识别聚合（Aggregates）。DDD 中的聚合对象是你领域模型中的核心实体，它们代表了数据的主要访问点，并引用其他实体和值对象。例如，`Customer`\
  \ 可能是你在销售管理模块中使用的主要实体。这个实体有一些值对象，并引用了其他实体，如 `Order` 或 `Invoice`。如果你知道客户端代码将通过 `Customer`\
  \ 对象访问客户订单和发票，那么 `Customer` 就是一个聚合，它绑定属于它的其他实体，并为引用其中任何实体的任何外部组件提供主要的访问点。\n\n```\n\
  注意！\n\n不要将 DDD 中的聚合（Aggregates）与 SQL 术语中的聚合函数（SUM、AVG、MAX）混淆。\n```\n\n教条式的 NoSQL\
  \ 方法是将整个 `Customer` 聚合及其所有相关实体（`Orders`、`Invoices`）序列化为一个包含应用程序层所需一切的大型集合。这对于可以通过单次数据访问操作获取所有必要数据的应用程序来说是完美的选择。教条式的关系方法则是将每个实体分解成一个独立的高度规范化的表，以便应用程序中的不同服务只能访问它们所需的最小信息集。这对于高度并发的应用程序来说是完美的选择，不同的线程同时访问和修改实体或聚合的不同部分。\n\
  \n教条式决策的缺点在于，在这两种情况下，人们都是假设访问模式，而不是分析业务领域中的使用模式。正确的方法是分析将使用的数据访问模式，并为领域选择最合适的方案。以下是一些可能影响你数据设计决策的数据访问模式示例：\n\
  \n*   如果你有一个庞大而复杂的表单，在获取 `Customer` 根聚合后需要预加载 `Order` 和 `Invoice` 实体，并且在表单上保存数据后需要更新\
  \ `Customer`、`Invoice` 和 `Order` 实体中的信息，那么将相关实体存储为非规范化集合是合理的。这样，你可以通过单次数据访问读取和持久化所有数据，并避免收集数据的复杂连接以及跨越多个表的事务。\n\
  *   如果你知道应用程序中的不同表单和服务可能会同时更新属于同一 `Customer` 聚合的 `Invoice` 或 `Order` 实体，或者你经常使用延迟加载技术，那么将实体拆分到单独的表中是合理的。这样，你可以实现细粒度的服务，只写入和读取所需的对象。将实体拆分到单独的表中提高了系统的并发性，因为不同的事务可以操作实体的不同部分而不会相互阻塞。否则，它们将被同步，并可能相互阻塞。\n\
  \n应用程序的访问模式是指导你决定使用规范化或非规范化模型的关键因素。\n\n### 领域模型的分类\n\n对服务行为的分析和数据访问模式的识别将使你能够确定领域模型的最佳存储设计。根据应用程序中的数据访问模式，你可以将数据模型分类为：\n\
  \n*   `高度规范化的关系模型`，其中实体之间存在依赖关系和关系（如 UML 图中的类）。该模型对于高度并发的应用程序和服务更新或加载实体的不同部分来说是完美的选择。\n\
  *   `图模型`是一种特殊类型的模型，其中节点通过边相互连接，形成逻辑图结构。这种结构对于经常断开或建立实体间边界，并通过关系遍历以查找最佳路径或进行“朋友的朋友”类型分析的服务来说是完美的选择。\n\
  *   `非关系型数据`，其中信息被自包含在孤立的、彼此之间关系非常弱或不存在的数据实体中。这种结构对于将领域对象作为一个单一单元进行读取和保存的服务来说是完美的选择。\n\
  \n### 根据数据实体的结构，你的模型可以分类为：\n\n*   `结构化`，所有数据实体都具有统一或固定的模式。这些类型的实体可以轻松地可视化为 Excel\
  \ 表中的行和列，或序列化为 CSV 格式。\n*   `半结构化`，数据实体具有一些结构，但并非总是严格或统一的。数据实体具有一些在所有实体中重复的共同属性，以及一些变化的属性。想象一个在不同实体中具有不同键的键值集合，或者一个具有缺失值和子对象的分层组织文档。这些对象通常序列化为\
  \ JSON 格式。\n*   `非结构化`数据，其中数据实体之间的模式差异很大，很难找到共同的结构。典型的例子可以是文本文档、图像或视频——存在一种定义良好的格式使你能够读取信息，但图像中信息的组合使它们彼此差异很大。\n\
  \nAzure SQL 是关系型结构化数据的最佳选择，也是关系型半结构化数据的良好选择。SQL 语言的查询功能使你能够对大量结构化和半结构化数据应用相同的处理规则，并轻松遍历外键和边关系。\n\
  \n没有关系的结构化信息可能更高效地存储为 CSV 或 Excel 文件，特别是如果你需要在 Azure Data Lake 或 Azure Blob Storage\
  \ 上存储大量数据时。这并不意味着你失去了查询能力，因为 Azure SQL 仍然使你能够轻松地从外部存储加载这些文件，并将它们查询为数据库中的行。与其他实体无关的半结构化和自包含文档可能更高效地存储在专门的文档数据库中，例如\
  \ Azure Cosmos DB。Azure Cosmos DB 提供了许多专门用于查询和索引自包含文档的功能，如果你不需要交叉关联实体或实现某些复杂报告，你可以加以利用。\n\
  \n## 为何要为非关系型模型选择 Azure SQL？\n\nAzure SQL 是一个多模型数据库，它使您能够结合不同的关系型和非关系型模型，为您的场景找到最合适的方案。\n\
  \n与传统的关系型和 NoSQL 数据库不同，后者需要您预先决定要使用哪种物理模型，而 Azure SQL 使您能够结合这些关系型和非关系型概念，找到最适合您需求的模型。\n\
  \nAzure SQL 中多模型支持的一个关键优势是数据模型并非互斥。Azure SQL 使您能够无缝结合多个模型，并充分利用所有模型的优点。您可以创建一个经典的关系模型，其中某些列包含\
  \ JSON 或空间数据，将某些表声明为图节点并通过边连接它们，将 JSON 列置于内存优化表中以利用其速度和无锁行为。多模型功能可以利用 Azure SQL\
  \ 提供的所有高级语言和存储特性。您可以使用相同的 T-SQL 语言来查询结构化和半结构化数据，这使得各种应用程序和库能够使用您存储在 Azure SQL 数据库中的任何数据格式。\n\
  \n您选择 Azure SQL 多模型功能的主要原因是，它们无缝集成在经过实战检验的关系数据库核心功能中。将 JSON、图功能与高级查询能力、使用所有排序规则处理\
  \ JSON 文档中的字符串的可能性、列存储索引、可提供极致性能的内存优化对象、以及结合 Python/R 的数据库内机器学习相结合，将为您提供高级的数据处理体验，这种体验即使是完全专业的\
  \ NoSQL 数据库也可能无法提供。\n\nAzure SQL 使您能够使用以下非关系型概念来表示您的模型：\n\n*   `JSON`：使您能够将数据库与广泛的\
  \ Web/移动应用程序和日志文件格式集成，甚至可以对关系型模式进行反规范化和简化。JSON 功能也大大简化了开发人员与 Azure SQL 通信所需完成的大量工作。如果这样做可以简化您的代码，您实际上可以要求\
  \ Azure SQL 以 JSON 文档而非包含列和行的表的形式返回结果。\n\n*   `图` 功能：使您能够将数据模型表示为一组节点和边。在领域实体以网络结构组织、并且您可以利用专门的查询语言来查询图数据的领域中，这种结构是理想的选择。\n\
  \n*   `空间` 支持：使您能够在数据库中存储几何和地理信息，使用专门的空间索引对它们进行索引，并使用高级空间查询来检索数据。\n\n*   `XML` 支持：使您能够在表中存储\
  \ XML 文档，使用专门的 XML 索引对 XML 信息进行索引，使用 T-SQL 或 XQuery 语言查询 XML 数据，并将您的关系数据与 XML 格式相互转换。\n\
  \n在以下部分中，您将了解 Azure SQL 数据库中存在的核心多模型功能。\n\n### JSON 支持\n\nJSON（JavaScript 对象表示法）是一种流行的数据格式，最初用作在\
  \ Web 客户端和浏览器之间传输数据的交换格式，但它也用于存储半结构化信息，如设置和日志信息。这是表示自包含对象的主流格式，尤其是在现代 NoSQL 数据库中，如\
  \ Azure Cosmos DB、MongoDB 等。\n\nAzure SQL 使您能够解析 JSON 文本并从 JSON 文档中提取信息，像存储任何其他类型一样在表中存储\
  \ JSON 文本，并根据一组行生成 JSON 文本。\n\n核心 JSON 功能如图 8-1 所示。\n\n![../images/493913_1_En_8_Chapter/493913_1_En_8_Fig1_HTML.jpg](img/493913_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\nAzure SQL 中的 JSON 功能\n\nAzure SQL 使您能够通过应用内置函数 `JSON_VALUE`、`JSON_QUERY`、`ISJSON`\
  \ 和 `JSON_MODIFY` 来处理存储在表中或从应用程序发送的 JSON 文本。这些函数使您能够从文本中解析 JSON，并提取和修改 JSON 文档中的信息。\n\
  \n如果您想转换以 JSON 格式表示的半结构化数据，并将 JSON 文档加载到表中，可以使用 `OPENJSON` 函数。`OPENJSON` 函数接受 JSON\
  \ 格式的对象数组，并将它们拆分为一组行。您可以使用此表值函数将 JSON 转换为表，并以关系格式加载数据。\n\nAzure SQL 还使您能够将 SQL 查询的结果格式化为\
  \ JSON 格式。有一个 `FOR JSON` 子句，可以指定查询的结果应以 JSON 格式返回，而不是一组行。\n\n这些功能将使您能够在需要处理 JSON\
  \ 数据的应用程序中实现大部分所需的功能。除了内置的 JSON 函数和运算符之外，您还可以将 Azure SQL 的其他功能（如索引、排序规则和高级查询功能）与\
  \ JSON 数据结合使用。得益于 JSON 支持，将 Azure SQL 集成到全栈或后端解决方案中非常容易，因为从开发者的角度来看，您只需从 Azure SQL\
  \ 发送和接收 JSON。以下是一些利用 JSON 和 Azure SQL 来简化开发工作的、使用各种语言实现的后端 API 列表：\n\n*   [`https://github.com/Azure-Samples/azure-sql-db-node-rest-api`](https://github.com/Azure-Samples/azure-sql-db-node-rest-api)\n\
  \n*   [`https://github.com/Azure-Samples/azure-sql-db-python-rest-api`](https://github.com/Azure-Samples/azure-sql-db-python-rest-api)\n\
  \n*   [`https://github.com/Azure-Samples/azure-sql-db-dotnet-rest-api`](https://github.com/Azure-Samples/azure-sql-db-dotnet-rest-api)\n\
  \n这是一个使用 NodeJS、Azure Functions 和 Azure SQL 实现的、以 JSON 作为传输格式的 ToDoMVC 示例应用的全栈示例：\n\
  \n[`https://github.com/Azure-Samples/azure-sql-db-todo-mvc`](https://github.com/Azure-Samples/azure-sql-db-todo-mvc)\n\
  \n## 将查询结果格式化为 JSON 文档\n\n现代应用程序通常被实现为分布式服务，它们通过 HTTP 端点交换数据。在大多数情况下，数据交换采用 JSON\
  \ 格式。\n\n后端开发人员花费大量时间从数据库获取数据，并将结果序列化为 JSON 文本，以返回给调用方（例如，前端代码）。你可能会在 REST API 中发现大量的后端代码仅仅是对\
  \ SQL 查询的封装。有些模型类仅用于临时将作为 SQL 查询结果返回的一组行加载到内存中，然后立即把这些内存对象序列化为将返回给调用方的 JSON 文本。这就是所谓的\
  \ DTO（数据传输对象）模式，其中模型类仅在应用层之间传输数据。许多类似 DTO 的模型类甚至不被后端代码使用，它们仅代表一个模板，数据访问框架将使用该模板加载数据并将其序列化为\
  \ JSON 结果。这可能会影响性能，特别是内存消耗，因为查询返回的数据首先被复制到模型内存对象中，然后再次复制为将作为结果返回的 JSON 文本。除了资源消耗外，这种方法可能会增加服务中的延迟，更不用说这类代码只是附加值非常低的“粘合剂”代码这一事实了。每次转换都是阻塞式的，查询返回的结果必须完全加载到一个内存对象集合中，然后由某个序列化器（如.NET\
  \ 语言中的 JSON.Net）将整个集合序列化为 JSON 文本。\n\nAzure SQL 使你能够极大地简化此过程。`FOR JSON` 查询子句使你能够指定查询结果应作为\
  \ JSON 字符串返回，而不是作为行集合返回。这样，你可以直接将查询结果流式传输到客户端，而无需构建那些仅仅将参数从客户端传递到查询并将结果转换为 JSON\
  \ 结果的封装层。\n\n以下示例展示了一个简单的 ASP.NET MVC 操作方法，当用户向 URL `http://<web-application-domain>/LogAnalytic/CountBySeverity`\
  \ 发送 HTTP GET 请求时，该方法将被执行。该操作方法将查询结果获取为 JSON 文本，并直接将其流式传输到 HTTP 响应体中：\n\n```\npublic\
  \ class LogAnalyticController {\n    [HttpGet]\n    public void CountBySeverity(){\n\
  \        var QUERY = @\"SELECT severity, total = COUNT(*)\n                    \
  \  FROM WebSite.Logs\n                      GROUP BY severity\n                \
  \      FOR JSON PATH\";\n        connection.QueryInto(Response.Body, QUERY);\n \
  \   }\n}\n```\n\n这个操作方法使用了.NET、微 ORM `Dapper` 和 `Dapper.Stream` 扩展，后者使你能够通过连接在 Azure\
  \ SQL 上执行 SQL 查询。该查询具有 `FOR JSON` 子句，指示 Azure SQL 以 JSON 格式而非表格格式返回结果。来自 `Dapper.Stream`\
  \ 扩展的 `QueryInto` 方法会将 JSON 结果流式传输到 HTTP 响应的正文中。这样，你只需要两行 C#代码就能将查询转换为一个 JSON Web\
  \ 服务。`FOR JSON` 子句让你能够轻松地通过几行代码，从任何 SQL 查询出发，最终实现一个功能齐全的 REST API。\n\n## 存储 JSON\
  \ 文档\n\n在某些情况下，你将处理具有高度多样性的数据结构，而这些结构无法有效地表示为规范化模式。在这种情况下，你可以遵循 NoSQL 方法，将复杂结构序列化为\
  \ JSON 文本。\n\n根据定义，JSON 是一种 Unicode 文本格式，因此在 Azure SQL 中使用 `NVARCHAR` 类型表示。在你的应用程序中，不需要使用专门的类型、特殊的客户端驱动程序或\
  \ API 来发送或检索 JSON 数据。大多数编程语言中的任何字符串类型都可以用来读写 JSON 列中的内容。以下示例展示了一个简单的表，用于存储网站日志消息，该表包含少量所有日志消息共有的固定列（`logDate`\
  \ 和 `severity`），以及一个 `log` 列，其中包含日志中可能找到的所有可变信息：\n\n```\ncreate table WebSite.Logs\
  \ (\n    _id bigint identity,\n    logDate datetime2,\n    severity tinyint,\n \
  \   log nvarchar(max)\n);\n```\n\n通过这种方式，你可以存储半结构化数据或结构易变的数据，而无需为每一个新变体创建一组自定义的表。在此场景中，日志消息是写入一次、读取多次，因此我们无需担心\
  \ JSON 日志列中半结构化值的高效更新问题。\n\n如果你决定将数据存储在表中，你需要了解如何从 JSON 列中解析值并在查询中使用它们，如何使用索引加快查询速度，以及如何确保\
  \ JSON 内容有效。\n\n## 查询 JSON 数据\n\nAzure SQL 使你能够运行标准的 SQL 查询，这些查询可以同时使用经典的标量列和从 JSON\
  \ 文本中提取的值。Azure SQL 提供了四个简单的函数来处理 JSON 文本：\n\n*   `JSON_VALUE(json, path_to_value)`\
  \ 函数将根据指定路径从 JSON 文档中返回一个标量值。\n*   `JSON_QUERY(json, path_to_object)` 函数将根据指定路径从\
  \ JSON 文档中返回一个复杂对象或数组。\n*   `JSON_MODIFY(json, path_to_object, json_object)` 将接受作为第一个参数提供的\
  \ JSON 文档，在第二个参数指定的路径上定位值或对象，然后注入作为第三个参数提供的值来替换此值。第一个参数不会被修改，而是返回修改后的 JSON 文本。如果你提供\
  \ `NULL` 值作为第三个参数，则该路径上的值将被删除。\n*   `ISJSON(json_string)` 如果作为参数提供的字符串是格式正确的 JSON，则返回值\
  \ 1，否则返回 0。\n\n使用这些简单的函数，你可以在列、参数或变量中解析任何 JSON 文本，并在任何查询子句中提取值。这些函数中的路径表示 JSON 文档中的值位置。路径中使用的语法易于理解，因为它类似于大多数现代面向对象语言中引用对象内字段的方式（例如，`$.info[3].name.firstName`）。\n\
  \n以下查询创建了一个报告，该报告使用了上一节所示的 `WebSite.Logs` 表中的标准列和 JSON 列：\n\n```\nSELECT\n    severity,\n\
  \    ip = JSON_VALUE(log, '$.ip'),\n    duration = AVG(CAST(JSON_VALUE(log,'$.duration')\
  \ as int))\nFROM\n    WebSite.Logs\nWHERE\n    CAST(JSON_VALUE(log,'$.date') as\
  \ datetime) > @datetime\nGROUP BY\n    severity, JSON_VALUE(log, '$.ip')\nHAVING\n\
  \    AVG(CAST(JSON_VALUE(log,'$.duration') as int) ) > 100\nORDER BY\n    AVG(CAST(JSON_VALUE(log,'$.duration')\
  \ as int) )\n```\n\n来自 `severity` 列的标量值被直接引用，而来自 JSON 列的标量值则使用 `JSON_VALUE` 函数提取。在这个查询中，你可以注意到\
  \ Azure SQL 多模型功能的真正优势。你只需使用一种 SQL 语言和几个附加函数，即可处理与标量关系列混合的半结构化数据。如果你熟悉标准 SQL 语言，学习\
  \ JSON 扩展将是一件容易的事。\n\n\n### JSON 路径\n\n在之前的示例中，你已经看到所有 JSON 函数都使用一个路径，该路径引用了将被解析的\
  \ JSON 中的属性。Azure SQL 中的 JSON 路径可以包含以下元素：\n\n*   `$` 代表当前作为 JSON 函数第一个参数提供的 JSON\
  \ 文档。\n*   字段引用以点号（.）开头，引用上下文中的子属性。例如，`$.info.name.firstName` 将找到一个 `info` 属性，然后在该对象中找到\
  \ `name` 属性，再在 `name` 中找到 `firstName` 对象。\n*   数组引用可应用于数组，并通过索引引用元素。例如，`$.children[2].name`\
  \ 将找到一个 `children` 数组，获取索引为 2 的元素，然后在该对象中找到 name 属性。数组引用中的索引是从零开始的。\n\n通过这种 JSON\
  \ 路径语法，你可以使用面向对象语言中相同的样式来引用 JSON 文档中的任何属性。\n\n### 排序规则意识\n\nAzure SQL 中的排序规则是定义查询处理器如何比较和排序值的规则。例如，在法语中，每个单词中的最后一个重音符号决定了排序顺序，因此以下四个单词将按如下方式排序：\n\
  \n1.  cote\n2.  côte\n3.  coté\n4.  côté\n\nJSON 标准并未定义文档中的值应如何被比较和排序；但是，你可以利用 Azure\
  \ SQL 的排序规则，在处理 JSON 数据时应用一些自定义的语言规则。如果你在包含 JSON 文档的 `NVARCHAR` 列上指定了排序规则 `French_100_CS_AS`，Azure\
  \ SQL 将使用法语规则来比较和排序基于从此列的 JSON 内容中提取的值的结果。即使列上未指定排序规则，我们也可以在查询中显式应用所需的排序规则：\n\n\
  ```sql\nSELECT JSON_VALUE(log,'$.msg')\nFROM WebSite.Logs\nORDER BY JSON_VALUE(log,'$.msg')\
  \ COLLATE French_100_CS_AS\n```\n\n排序规则意识是一项重要特性，尤其对于国际应用而言。JSON 函数能够利用这一特性，使其成为\
  \ Azure SQL 多模型能力的一个强大补充。\n\n### 确保 JSON 文档的数据完整性\n\nAzure SQL 不会检查你是否在 `NVARCHAR`\
  \ 列中放置了有效的 JSON 文档。如果你确信你总是将 JSON 文档存入表中，或者你的应用逻辑中有验证来确保这一点，这就不是问题。验证 JSON 格式需要一些时间和资源，因此\
  \ Azure SQL 不会拖慢插入和更新操作的速度。如果你想确保你的 JSON 文档始终有效，可以显式添加一个 `CHECK CONSTRAINT` 来执行此验证：\n\
  \n```sql\nALTER TABLE Webite.Logs\nADD CONSTRAINT [Data should be formatted as JSON]\n\
  CHECK (ISJSON(log) = 1);\n```\n\n这样，你就能完全控制存储过程，并选择何时验证 JSON 数据。在此示例中，使用了一条简单的规则来确保插入\
  \ `log` 列的值是有效的 JSON 文档。你可以创建自定义规则，使用 `JSON_VALUE` 函数从 JSON 文档中提取值，并在单独的 `CHECK\
  \ CONSTRAINT` 中比较返回的值。\n\n### 为 JSON 值建立索引\n\n索引通常有助于提升查询性能。Azure SQL 没有针对 JSON\
  \ 文档的专用索引，但你可以有效地使用以下标准索引来提高 JSON 查询的性能：\n\n*   聚集列存储索引会压缩 JSON 文档，并支持对 JSON 值进行高性能分析。\n\
  *   B-Tree 索引使你能够快速找到 JSON 列中具有某个值的行。\n\n聚集列存储索引是 Azure SQL 中的核心分析技术，提供数据的高压缩率和快速分析能力。如果你的表中有大量文档，聚集列存储索引可能是一个很好的解决方案，因为它可以高效地压缩\
  \ JSON 文档，减少加载文档所需的 IO，并提升你可能对文档运行的分析报告的性能。以下代码可以在包含 JSON 文档的表上添加聚集列存储索引：\n\n```sql\n\
  CREATE CLUSTERED COLUMNSTORE INDEX cci ON WebSite.Logs;\n```\n\n如果需要对 JSON 文档进行分析，在包含\
  \ JSON 文档的表上创建聚集列存储索引是一个不错的选择。列存储索引将应用所谓的批处理模式，利用向量处理和 SIMD 指令，这可以提升对 JSON 数据分析查询的性能。\n\
  \n在需要使用 JSON 文本中的某个特定属性来筛选或排序文档的场景中，你还可以利用标准的 SQL 语言特性，例如计算列和索引。计算列可以通过 `JSON_VALUE`\
  \ 函数公开 JSON 内容中的某个值，然后你可以在此计算表达式上创建标准的 B-tree 索引，如以下代码所示：\n\n```sql\nalter table\
  \ WebSite.Logs\nadd [$severity] AS JSON_VALUE(log, '$.severity');\ngo\ncreate index\
  \ ix_severity on WebSite.Logs ([$severity]);\n```\n\n计算列 `$severity` 只是一个命名表达式，用于公开存储在\
  \ `log` 列中的 JSON 内容的值。除非你想通过添加 `PERSISTED` 关键字来显式预计算提取的值，否则它不会占用额外空间。每当使用 `JSON_VALUE(log,\
  \ '$.severity')` 表达式筛选或排序行时，Azure SQL 都会知道存在匹配的索引，并使用它来加速你的查询。\n\n\n\n### 导入 JSON\
  \ 文档\n\n现代服务以 JSON 格式发送数据，在许多情况下，你需要将这些 JSON 值存储在 Azure SQL 表中。Azure SQL 提供了 `OPENJSON`\
  \ 表值函数，该函数接受一个包含 JSON 文本的文本参数，对其进行解析，并以表格格式返回 JSON 文档中的值。如果你想通过将对象数组作为参数传递给存储过程来导入它们，可以使用类似以下的代码将传入的\
  \ JSON 消息插入到表中：\n\n```sql\nCREATE OR ALTER PROCEDURE InsertDeviceLog (@msg nvarchar(max))\n\
  AS\nINSERT INTO WebApi.Logs(logDate, severity, log)\nSELECT *\nFROM OPENJSON(@msg)\n\
  WITH (\nlogDate datetime2 '$.properties.DeviceTime',\nseverity tinyint '$.properties.severity',\n\
  log nvarchar(max) '$.info' AS JSON\n);\nGO\n```\n\n`OPENJSON` 函数的第一个参数是一个包含要解析的\
  \ JSON 数组的文本。该函数期望接收一个 JSON 对象数组，其中每个对象将被转换为结果集中的一行。如果要转换的数组位于文档中的某个位置，你可以提供第二个参数，该参数表示一个\
  \ JSON 路径，`OPENJSON` 函数应在此路径下找到要转换为结果集的对象数组。引用数组中的每个对象都将成为返回结果集中的一个对象。\n\n`WITH`\
  \ 子句用于定义输出模式，并将 JSON 数组中对象的属性映射到输出列。此部分将包含每个输出列的一个条目，其中包含以下信息：\n\n*   输出列的名称。如果未提供可选的\
  \ JSON 路径，则此名称也用作应在此列中作为结果值返回的 JSON 属性的键。\n*   输出列的 SQL 类型。`OPENJSON` 将使用 `CONVERT`\
  \ T-SQL 函数的语义，将解析后的 JSON 文本中的文本值转换为 SQL 值。\n*   可选的 JSON 路径，用于引用 JSON 对象中包含要返回的值的属性。如果未指定此路径，则将使用列名来引用属性。例如，如果列名为\
  \ `severity` 且未指定 JSON 路径，则 `OPENJSON` 将尝试在 `$.severity` 路径上查找值。\n*   可选的 `AS JSON`\
  \ 子句。默认情况下，`OPENJSON` 将使用 `JSON_VALUE` 函数从当前正在转换的对象中获取值。因此，它无法返回子对象或子数组。如果该路径上存在\
  \ JSON 对象或数组，则除非你指定 `AS JSON` 子句，否则不会返回。\n\n`OPENJSON` 函数的结果将是一个可以插入到表中的结果集。\n\n\
  ## 图结构\n\n图是复杂的结构，包含通过关系（边）连接的对象（节点）。你可能会使用图的场景包括：\n\n*   社交网络，其中人员通过朋友、家人、合作伙伴或同事等关系连接\n\
  *   交通地图，其中城镇和地点通过道路、河流和航线连接\n*   物料清单解决方案，其中部件连接到其他部件，而这些部件又连接到其他部件，依此类推\n\n在某些场景下，图结构可以表示为表和外键关系。你选择图模型而非关系模型的关键原因在于，当你正在处理一个关系占主导地位，并且少量实体以多种不同、直接和间接方式相互连接的项目时。实际上，在该领域中的关键区别是关系的传递性。此处使用的“传递”一词取其数学含义：如果\
  \ `a` 连接到 `b`，并且 `b` 连接到 `c`，那么 `a` 就连接到 `c`。在这些情况下，你不仅对单跳关系（例如通过外键关系为订单获取订单行）感兴趣，而且对从一个节点移动到另一个节点所需的所有跳跃都感兴趣。为了有效地做到这一点，你需要利用图特有的查询处理语义。例子包括查找传递闭包（`a`\
  \ 是否连接到 `z`？）、查找两个对象之间的最短路径，或从指定对象开始递归遍历所有关系。\n\n在 Azure SQL 中，节点和边使用特殊的表来表示。你可能会好奇为什么选择关系表来实现表示图元素，以及这是否是一个好主意。\n\
  \n首先，将信息绑定到节点和边是很常见的，而表是保存这些信息的完美结构。使用表的第二个好处是，可以利用 Azure SQL 查询优化器来提高整体查询性能。这一选择的第三个好处是，由于它们只是表，因此可以使用列存储索引和索引来进一步提高性能。\n\
  \n例如，让我们看一下模拟机场以及代表它们之间连接的航线的简单结构。这个领域可以使用以下结构建模：\n\n```sql\nCREATE TABLE Airport\
  \ (\nAirportID int PRIMARY KEY,\nName NVARCHAR(100),\nCityID int FOREIGN KEY REFERENCES\
  \ Application.Cities(CityID)\n) AS NODE\nGO\nCREATE TABLE Flightline (\nName NVARCHAR(10)\n\
  ) AS EDGE;\n```\n\n`Airport` 是图的一个节点，但它的行为类似于常规表。我们可以添加任何列、索引或约束来描述此节点中的信息。这是 Azure\
  \ SQL 多模型功能如何使你能够在新场景中结合经过实战检验的高级数据库功能的另一个例子。节点表有一个隐藏列，用于表示节点的唯一标识符，稍后将对此进行解释。\n\
  \n`Flightline` 是一个边表，它连接两个 `Airport` 表。此表中的列表示描述两个节点之间关系的附加信息。此示例中显示的边表是一个通用边，没有指定它旨在连接两个\
  \ `Airport` 而不是其他节点。为了明确指定 `Flightline` 连接 `Airport`，我们需要引入以下边约束：\n\n```sql\nALTER\
  \ TABLE Flightline\nADD CONSTRAINT [Connecting airports]\nCONNECTION (Airport TO\
  \ Airport)\nON DELETE CASCADE;\n```\n\n此约束指定你不能使用 `Flightline` 边来连接 `Airport` 以外的节点。此约束还定义了节点被删除时边会发生什么。\n\
  \n\n\n## 加载图数据\n\n节点表是经典的表，可以像加载或读取任何其他经典表一样操作。每个节点表都有一个名为`$NODE_ID`的隐藏列，您只会在某些特殊场景中使用它。边表具有隐藏的“外键关系”列，这些列在底层用于使用`$NODE_ID`值将边与关联的节点连接起来。在将数据导入边中时，了解这一点非常重要，因为您需要获取相关节点的`$NODE_ID`值来绑定它们。让我们假设`Airport`节点已经加载，并且我们正在使用`OPENROWSET`函数从\
  \ blob 存储导入一组边。为了将数据加载到边表中，我们需要将加载的记录与节点进行联接，找到`$NODE_ID`值，并将它们与导入的航空公司名称一起插入到边表中：\n\
  \n```\nINSERT INTO Flightline ($from_id, $to_id, Name)\nSELECT f.$NODE_ID, t.$NODE_ID,\
  \ a.Name\nFROM OPENROWSET(\nBULK 'data/flightlines.csv',\nDATA_SOURCE = 'MyAzureBlobStorage',\n\
  FORMATFILE='data/flightlines.fmt',\nFORMATFILE_DATA_SOURCE = 'MyAzureBlobStorage')\
  \ as a\nJOIN Airport f ON f.Name = a.FromAirport\nJOIN Airport t ON t.Name = a.ToAirport;\n\
  ```\n\nFlightlines CSV 文件包含有关源和目的机场以及它们之间航线名称的信息。我们需要通过`Name`列将此数据与机场进行联接，并获取应该导入的`$NODE_ID`值。\n\
  \n## 查询图数据\n\n一旦我们加载了数据，就可以使用 Cypher 表达式（[`www.opencypher.org/`](http://www.opencypher.org/)）——一种最常见的图数据查询方式。以下查询将遍历从源机场节点通过航线边到另一个机场节点的所有路径：\n\
  \n```\nSELECT\nsrc.Name, line.Name, dest.Name\nFROM\nAirport src, Flightline line,\
  \ Airport dest\nWHERE\nMATCH(src-(line)->dest)\nAND\nsrc.Name='Belgrade';\n```\n\
  \n此查询将返回从贝尔格莱德到所有其他城镇的目的地。`MATCH`子句定义了一条从源机场（`src`）到目的机场（`dest`）的路径应通过航线表（`line`）建立。\n\
  \nAzure SQL 中图处理支持的主要优势在于能够跨节点的边进行查询。例如，`SHORTEST_PATH`谓词使您能够查找两个节点之间的最短路径。您可以利用此功能来查找两个城镇之间的最短路线，如以下代码所示：\n\
  \n```\nWITH routes AS (\nSELECT\nsrc.Name,\nSTRING_AGG(dest.name, '->')\nWITHIN\
  \ GROUP (GRAPH PATH) AS path,\nCOUNT(dest.name)\nWITHIN GROUP (GRAPH PATH) AS stops,\n\
  LAST_VALUE(line.name)\nWITHIN GROUP (GRAPH PATH) AS lastFlight,\nLAST_VALUE(dest.name)\n\
  WITHIN GROUP (GRAPH PATH) AS destination\nFROM\nAirport src,\nFlightline FOR PATH\
  \ line,\nAirport FOR PATH dest\nWHERE\nMATCH(SHORTEST_PATH(src(-(line)->dest)+))\n\
  AND\nsrc.Name='BEG'\n)\nSELECT TOP (10) path, stops, lastFlight, destination\nFROM\
  \ routes\nWHERE destination IN ('JFK', 'SEA');\n```\n\n`MATCH`子句中的`SHORTEST_PATH`子句将查找起点和终点位置之间未直接连接的最短路径。聚合函数`STRING_AGG`将连接路径上的所有机场名称，并使用箭头`->`分隔符显示它们。`COUNT`和`LAST_VALUE`将显示行程上的停靠次数以及最短路线上的结束航班和城镇。一旦最短路径探索完成，我们需要在最终查询中选择目的城镇。\n\
  \nAzure SQL 中的图处理功能使您能够降低模型和查询的复杂性，这些模型和查询需要分析表之间的不同路径和关系。\n\n## 空间数据\n\n表示空间对象（地点、道路、国家边界）并不完全适合规范化形式的结构化关系模型。尽管您可以将一条道路或边界表示为一组小的直线段，其中每条线段存储在单独的行中，并将端点连接到继续道路的线段，但这不是一种高效的表示方式。\n\
  \n您针对空间对象运行的查询通常具有诸如“这个地方是否在这个形状内”或“这个地方离道路有多远”这样的条件。这些不是您使用标准 SQL 语言描述的典型查询。\n\n\
  Azure SQL 具有符合开放地理空间联盟（OGC）标准的专门功能，使您能够实现处理空间数据的应用程序：\n\n*   可用于表示复杂几何和地理对象及形状的专门类型（`Point`、`Line`、`Polygon`）。所有形状都可以表示为\
  \ geometry 或 geography 模型，稍后将更详细地描述。\n\n*   专门用于空间查询的功能，例如查找两点之间的距离（`ST_DISTANCE`）、确定一个区域是否包含指定的点（`ST_CONTAINS`）等。\n\
  \n*   针对空间类型查询优化的专门索引。\n\n这组功能使您能够创建特定于空间领域的高级查询。\n\n回想一下上一节中描述的机场和航线模型。使用航线（边）连接机场（节点）的图模型对于查找两个城镇之间的最短路线可能是完美的。但是，想象一下，您需要查找所有穿过内布拉斯加州的航线或两条高速公路交叉的无名十字路口。如果高速公路与所有十字路口或国家之间没有明确的关系，就不可能回答这些问题。\n\
  \n为了解决这些问题，我们需要用地理数据扩展图模型，如以下脚本所示：\n\n```\nCREATE TABLE Airport (\nAirportID int\
  \ PRIMARY KEY,\nName NVARCHAR(100),\nLocation GEOGRAPHY,\nCityID int FOREIGN KEY\
  \ REFERENCES Application.City(CityID)\n) AS NODE\nGO\nCREATE TABLE FlightLine (\n\
  Name NVARCHAR(10),\nRoute GEOGRAPHY\n) AS EDGE;\n```\n\nAzure SQL 有两种主要的基类型，可用于表示几何和地理图形：\n\
  \n*   `GEOMETRY`类型在欧几里得（平面）坐标系中表示数据。\n\n*   `GEOGRAPHY`类型在圆球坐标系中表示数据。\n\nGeometry\
  \ 非常适合表示相对较小的对象，如建筑物或室内；Geography 更适合表示更大的形状，如河流、城市或国家边界，以及通常任何需要在地球表面的近似值上工作以避免误差的事物。\n\
  \n在这两种类型中，按照开放地理空间联盟的规定，您可以创建更具体的类型：\n\n*   `Point`用于表示 2D 地点，如城镇\n\n*   `LineString`和`CircularString`可以表示开放或封闭的线，如道路或边界\n\
  \n*   `Polygon`和`CurvePolygon`用于表示区域，如国家\n\n*   `MultiPoint`、`MultiLine`和`MultiPolygon`表示一组逻辑上属于同一整体的不连续地理对象（例如，一个群岛可以用`MultiPolygon`表示）\n\
  \n在 Azure SQL 中，一旦在表中创建了 Geometry 或 Geography 列，您就可以使用这些类型中的任何一种来构建所需的形状。您甚至可以同时使用多个类型，使用\
  \ Collections 或“Multi”类型。\n\n\n### 查询空间数据\n\nAzure SQL 中的空间数据类型具有内置方法，使您能够轻松查询空间数据。假设所有关于航线和机场的信息都已填充，我们可以轻松找出穿过内布拉斯加州的航线：\n\
  \n```sql\nDECLARE @nebraska GEOGRAPHY = (\nSELECT TOP (1) Border FROM Application.StateProvinces\n\
  WHERE StateProvinceName = 'Nebraska'\n);\nSELECT *\nFROM FlightLine\nWHERE Route.STIntersects(@nebraska)\
  \ = 1;\n```\n\n`STIntersects` 方法用于确定两个形状是否在某处相交。如果一个地理实例与另一个地理实例相交，则此方法返回 1，否则返回\
  \ 0。\n\n`STDistance` 方法测量两个对象之间的距离，使您能够找到更接近某个特定坐标的对象。以下查询返回距离某个对象当前位置最近的五个机场：\n\
  \n```sql\nDECLARE @currentLocation GEOGRAPHY = 'POINT(-121.626 47.8315)';\nSELECT\
  \ TOP(5) *\nFROM Airports\nORDER BY Location.STDistance(@currentLocation) ASC;\n\
  ```\n\n空间查询使您能够轻松执行特定分析，以解决那些需要花费大量时间处理特定数学变换的问题，而无需您自己编写这些变换或使用其他更专业的解决方案来进行计算，这样您就不必移动数据，从而使您的解决方案更加高效。\n\
  \n### 空间索引\n\n理论上，`STIntersects` 方法可以实现为一个包含复杂数学计算的独立函数，这些计算试图确定图形之间的关系。然而，由于计算的复杂性，在大量对象上运行这种函数将非常耗时且消耗\
  \ CPU。为了高效处理，Azure SQL 使用一种特殊类型的索引，即空间索引。\n\n空间索引在内部创建一个网格（如图 8-2 所示），其中的单元格可能与被索引图形的部分区域重叠，也可能不重叠。\n\
  \n![../images/493913_1_En_8_Chapter/493913_1_En_8_Fig2_HTML.jpg](img/493913_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n\n在 4x4 网格中对空间对象进行索引\n\nAzure SQL 创建一个网格，并为每个需要索引的空间对象记录该对象是完全重叠、部分重叠还是完全不重叠于网格中的单元格。这个过程被称为\
  \ `tessellation`（网格化）。使用这种技术，需要确定两个对象是否重叠的 `STOverlaps` 方法，就不必立即应用复杂的数学计算来判断对象间是否存在交集。如果有索引可用，它会首先使用索引来检查是否存在至少一个单元格同时属于这两个空间对象，或者属于一个对象的单元格是否也与另一个对象部分重叠。如果为真，则它们重叠，这是判断是否存在交集的更快方式。如果没有单元格与两个对象都至少部分重叠，则这些对象不重叠。如果有些单元格与两个对象都部分重叠，则这些对象可能重叠，也可能不重叠。只有在这种情况下，Azure\
  \ SQL 才会应用复杂的空间计算，但不是在整个对象区域上，而只是在它们可能潜在重叠的较小单元格上进行计算。尽管这可能是一个消耗 CPU 的操作，但它是在一个小单元格上执行的，并且可能只涉及对象位于该单元格内的一小部分区域。因此，这种操作会比比较对象所有部分的朴素方法快几个数量级。\n\
  \n空间索引使用特殊的 `CREATE SPATIAL INDEX` 语法创建：\n\n```sql\nCREATE SPATIAL INDEX SI_Flightline_Routes\n\
  ON Flightline(Route)\nUSING GEOGRAPHY_GRID\nWITH (\nGRIDS = ( MEDIUM, LOW, MEDIUM,\
  \ HIGH ),\nCELLS_PER_OBJECT = 64 );\n```\n\n除了要索引的空间列之外，您还可以指定为索引空间值而创建的网格的特征，例如应覆盖的区域或用于索引的网格化密度。粒度更细的索引会更大，需要更多时间来扫描所有网格单元格并确定航线的部分是否与每个单元格重叠。然而，更大的网格密度使得对象部分重叠的最坏情况阶段处理速度更快，因为只有对象的较小部分需要使用复杂数学规则进行处理。索引的合适大小和参数取决于您的数据，您可能需要进行试验，并用不同的参数重建索引，以找到最适合您数据的配置。\n\
  \n如果您一开始不确定，可以避免指定边界框，Azure SQL 会尝试为您猜测最佳的边界框和网格划分。当然，自动定义的值在您的场景中可能不是完美的，但重要的是要知道，如果需要，您可以手动指定它们。\n\
  \n\n### 几何 vs. 地理\n\n如前所述，Azure SQL 针对不同场景提供了两类空间数据类型：\n\n*   `几何数据类型` 用于表示经典二维坐标系中的平面数学形状。\n\
  *   `地理数据类型` 用于表示投影到二维平面上的球体对象和形状。\n\n理解几何与地理类型之间的差异，是开发空间应用所需掌握的**最关键**要点之一。\n\n\
  地理类型用于表示置于经典二维坐标系中的对象，你可以将其想象为可以绘制在一张纸上的物体。对象距离和大小的测量方式，与在纸或板上绘制物体后测量距离的方式相同。如果你拿一张地图，想找出从塞尔维亚贝尔格莱德到美国华盛顿州西雅图之间的最短飞行轨迹，你可能会使用一条经过法国和美国东海岸的直线水平线。从几何上看，这是它们之间最短的线。然而，由于地球的球形形状，最短轨迹（称为\
  \ `geodesic`）实际上是经过冰岛、格陵兰岛和加拿大的路径。地理数据模型考虑了地球的实际形状，并能够找到现实世界中的最短距离和路径。\n\n将地球表面映射到二维平面是最困难的空间问题。著名数学家卡尔·高斯在其\
  \ `绝妙定理`（拉丁语 \"Theorema Egregium\"）中证明，球面在不产生失真的情况下无法映射到二维平面。你可能在一些地图上注意到，靠近两极的区域，如格陵兰岛、南极洲、加拿大北部和俄罗斯，看起来被拉伸或有时比实际更大。这是因为靠近两极的密集坐标必须被“拉伸”才能投影到二维坐标中。更困难的是，地球表面并非球体，甚至也不是椭球体。地球的不规则形状和靠近两极的地理位置迫使人们采用不同的二维平面映射策略。存在一些映射规则可以保持正确的距离最短路径、形状等，但在每种策略中，某些方面都会失真。这就是为什么每个地理对象都关联一个\
  \ `空间参考标识符 (SRID)`，它描述了用于将对象从地球仪转换到二维平面所采用的空间转换策略。`SRID` 描述了使用的坐标（纬度/经度、东向/北向）、计量单位、坐标原点位置等。Azure\
  \ SQL 将根据 `SRID` 获取信息以比较对象的位置。\n\n在以下示例中，你可以看到如何通过指定使用 `SRID 4326` 的世界大地测量系统 1984\
  \ (WGS84) 来转换坐标，从而构造一条地理线：\n\n```\nDECLARE @g GEOGRAPHY;\nSET @g = GEOGRAPHY::STGeomFromText('LINESTRING(-122.360\
  \ 47.656, -122.343 47.656)', 4326);\nSELECT @g.STSrid;\n```\n\n一些国家，特别是像智利那样南北边界相距很远的国家，需要在其领土内使用多个\
  \ `SRID`。在这些情况下，比较地理位置对象之前，你需要对齐 `SRID`。指定不同的 `SRID` 会导致位置或形状不同。测量使用不同 `SRID` 确定的空间对象之间的差异，将会导致错误的结果。因此，在\
  \ Azure SQL 中，无法在具有不同 `SRID` 的空间对象之间执行空间操作。\n\nWGS84 是最常用的标准，也是我们手机或汽车中 GPS 系统所使用的标准。如果你不确定使用哪个\
  \ `SRID`，那么 WGS84 极有可能非常适合你。\n\n对你来说好消息是，所有这些复杂的转换功能都已内置于 Azure SQL 中。你需要做的只是利用这些功能，并学习帮助你理解如何使用空间特性的基本原理。\n\
  \n## XML 数据\n\n`XML 数据类型` 是 `JSON` 的前辈。此功能在 2000 年至 2005 年之间被引入 SQL Server 数据库引擎，当时\
  \ XML 是不同应用程序之间数据交换的主流格式。\n\nAzure SQL 中的 XML 支持与前面章节描述的 JSON 支持类似。如果你需要解析 XML 数据或将查询结果格式化为\
  \ XML，可以使用以下功能：\n\n*   `OPENXML` 表值函数，可用于解析 XML 文档\n*   `FOR XML` 子句，可用于将查询结果格式化为\
  \ XML 文档\n*   `XML` 类型及其用于处理 XML 文档中值的方法\n\n如果你已经理解了 JSON 支持章节中解释的 `OPENJSON` 函数和\
  \ `FOR JSON` 子句，那么你可能也就理解了 `OPENXML` 函数和 `FOR XML` 子句的用途。这些 XML 功能与对应的 JSON 功能之间的差异微不足道，因此不再详细解释。\n\
  \nAzure SQL 中 JSON 和 XML 支持的关键区别在于原生的 `XML` 类型。与 JSON 支持（JSON 文本存储在原生的 `NVARCHAR`\
  \ 类型中）不同，XML 有专门的 SQL 类型。XML 在许多语言中都是标准化的类型（例如，.NET 框架中的 `System.Xml.Document`），因此在\
  \ SQL 类型中保持对等是合理的。关键区别在于，在 JSON 情况下，你使用类字符串函数来解析 JSON，而 XML 内容则表示为一个对象，你可以使用各种方法来提取数据。\n\
  \n\n\n# 查询 XML 数据\n\nXML 类型具有以下成员方法，可用于从 XML 中提取值并进行操作：\n\n*   `value(path, type)`\
  \ 方法从 XML 对象返回一个节点或属性，并自动将其转换为 SQL 类型。你需要指定一个标准的 XPath 表达式，该表达式需指向 XML 文档中的单个值。\n\
  *   `query(path)` – 此方法根据指定的 XPath 表达式从 XML 文档返回一个对象。\n*   `nodes(path)` 与 `OPENXML`/`OPENJSON`\
  \ 函数非常相似，用于将指定路径上的 XML 元素数组转换为一组行，这些行可以在 `FROM` 子句中使用。\n*   `exists(path)` 是一个检查指定路径上是否存在元素的方法。\n\
  *   `modify(path, type)` 方法使你能够在 XML 文档中插入、删除或替换某些节点的值。\n\n将通过以下示例解释 XML 查询功能：\n\
  \n```sql\nDECLARE @i INT = 47;\nDECLARE @x xml;\nSET @x='\n<Family id=\"1\">\n \
  \   <row id=\"81\"><name>Robin</name></row>\n    <row id=\"123\"><name>Lana</name></row>\n\
  \    <row id=\"7\"><name>Merriam</name></row>\n</Family>\n';\nSELECT\n    family_id\
  \ = @x.value('(/Family/@id)[1]', 'int'),\n    family_81_name = @x.value('(//row[@id=81]/name)[1]',\
  \ 'varchar(20)'),\n    family_name = @x.query('//row[@id=sql:variable(\"@i\")]/name')\n\
  SELECT\n    family_member = xrow.value('name[1]', 'varchar(20)'),\n    family_member_id\
  \ = xrow.value('@id[1]', 'varchar(20)'),\n    family_member_xml = xrow.query('.')\n\
  FROM\n    @x.nodes('/Family/row') AS Members(xrow)\nWHERE\n    xrow.value('@id[1]',\
  \ 'int') < 50 and xrow.exist('name[. > 5]') = 1\n```\n\n第一个查询使用 `@x` 变量的 `value`\
  \ 成员函数提取家庭标识符、ID 为 81 的家庭成员姓名，以及标识符值等于变量 `@i` 的成员姓名。\n\n第二个查询将 XML 文档中的所有 `/Family/row`\
  \ 节点作为行集获取，条件是每一行的 `id` 属性小于 50 且大于 5。满足此条件的每个节点都作为名为 `xrow` 的列返回。方法 `value()` 用于提取将与\
  \ SQL 运算符 50 进行比较的值，而 `exist()` 方法用于直接将谓词下推至 XML 变量。最后，使用 `value()` 和 `query()`\
  \ 方法从每个返回的行中获取名称、标识符和 XML 内容。\n\n另一个有趣的功能是能够在 XPath 表达式中绑定 SQL 变量或列的值。在前面的示例中，你可以看到第一个\
  \ `SELECT` 子句中的第三个表达式使用了外部脚本中的 SQL 变量 `@i`。这可能是一种指定如何查找数据的灵活方式。\n\n另一个可能很方便的功能是能够直接更新\
  \ XML 文档，而无需解析它、将其转换为关系格式，然后使用 `FOR XML` 子句重新构建 XML。Azure SQL 提供了 `modify()` 方法，你可以在其中指定将在\
  \ XML 文档中插入、删除或替换值的表达式：\n\n```sql\nSET @x.modify('insert <row id=\"555\"><name>Danica</name></row>\n\
  into (/Family)[1]') ;\nSELECT @x;\n```\n\n尽管 Azure SQL 中的 XML 功能并非你会频繁使用的核心场景（因为\
  \ XML 已不再是主流格式），你仍然可以使用它们来解决需要查询和转换 XML 数据的各种问题。\n\n# XPath 和 XQuery 语言\n\nAzure\
  \ SQL 支持 XML 标准，使你能够在 XML 文档上实现复杂的处理和查询。Azure SQL 中的 XML 支持基于以下语言：\n\n*   XPath（XML\
  \ 路径语言）是一种用于从 XML 文档中选择节点的查询语言。\n*   XQuery（XML 查询）是一种查询和函数式编程语言，用于查询和转换 XML 数据集合。\n\
  \nXPath 是一种基于表达式的语法，用于 `value()`、`nodes()` 和 `query()` 方法中，以指定应定位的 XML 文档中的元素：\n\
  \n*   **层次结构表达式** – 使用 XPath 指定从 XML 文档根节点到文档中所需元素的路径。例如，XPath `/Family/row/name`\
  \ 用于引用位于 `<row>` 元素下的 `<name>` 元素，而 `<row>` 元素又位于作为 XML 文档根节点的 `<Family>` 元素下。可能有多个元素匹配相同的\
  \ XPath 表达式，因此你应该使用索引运算符 `[]` 来指定应引用的匹配元素。\n*   **节点和属性引用** – XPath 使你能够引用节点或其属性。任何不以\
  \ `@` 开头的名称将被视为 XML 节点的名称，而以 `@` 开头的名称（例如前面示例中的 `@id`）将被视为属性。\n*   **递归表达式** – 在某些情况下，你不想或无法引用从根节点开始的完整路径，或者你需要查找位于文档不同位置的元素。递归运算符\
  \ `//` 使你能够指定一个“分离路径”，XML 函数将尝试查找与递归运算符右侧表达式匹配的任何路径。例如，`//row/name` 将查找位于 XML 文档中任何位置的\
  \ `<row>` 元素内的任何 `<name>` 元素。\n*   **谓词** 使你能够指定元素必须满足的某些条件才能与 XPath 表达式匹配。例如，`//row[@id=17]/name`\
  \ 指定 XML 方法应查找 `id` 属性值为 17 的 `<row>` 元素内的任何 `<name>` 元素。谓词是过滤掉不满足某些条件的节点的简单方法。\n\
  \nXPath 可以是一种非常强大的语言，你可以用它以声明方式指定从 XML 文档中选择信息的条件。\n\n你还可以使用其他 XPath 功能，例如 **命名空间**（使你能够定义名称的作用域并仅匹配相同命名空间内的名称）；**七方向轴**（使你能够引用父节点、同级节点和后代节点）；或**内置函数**（可以帮助你在表达式中转换结果）。\n\
  \nAzure SQL 中也支持 XQuery 语言，它是对 XPath 的补充。XQuery 是一种用于查询和处理 XML 文档中元素集合的标准化语言。XQuery\
  \ 定义了一种类似 SQL 的语法，称为 **FLWOR**（发音为“flower”），它代表 `FOR`、`LET`、`WHERE`、`ORDER BY` 和\
  \ `RETURN` 运算符，可用于转换 XML 节点。这些运算符使你能够根据现有数据选择、转换和返回新对象。XQuery 使你能够使用花括号 (`{...}`)\
  \ 模板来插入正在处理的节点的值。下面的列表展示了一个在 XML `query()` 方法中使用 **FLWOR** 操作的示例，该操作从 XML 变量中选择节点并将内容转换为新的\
  \ XML 结构：\n\n```sql\nSELECT xrow.query(\n'let $r := self::node()\nreturn <Member\
  \ id=\"{$r/@id}\">{$r/name/text()}</Member>')\nFROM @x.nodes('/Family/row') AS Members(xrow);\n\
  ```\n\n```xml\n<Member id=\"81\">Robin</Member>\n<Member id=\"123\">Lana</Member>\n\
  <Member id=\"7\">Merriam</Member>\n```\n\nXML `nodes()` 方法从前面示例中使用的变量 `@x` 生成三个\
  \ XML 行，然后 `query` 方法使用 XQuery 表达式处理它们。在 XQuery 表达式的主体中，当前节点被赋值给变量 `$r`，return 语句创建一个新的\
  \ XML 节点，其中 `id` 属性和 `name` 节点的内容被注入到模板中。结果，此 XQuery 表达式将返回如查询下方所示的转换后的 XML。如你所见，XQuery\
  \ 具有强大的功能，可用于实现 XML 元素的复杂处理。\n\n\n\n## XML 索引\n\n由于 XML 查询的特殊性，标准的 B 树索引可能无法提供足够的查询性能提升。Azure\
  \ SQL 提供了几种专门的索引类型，以实现 XPath/XQuery 表达式的高效处理。Azure SQL 中可用的索引类型如下：\n\n*   `主 XML\
  \ 索引`是一个预计算结构，包含从 XML 列分解出的值和节点。Azure SQL 使用主索引中的值，而不是通过`value()`、`nodes()`或`query()`方法来调用昂贵的\
  \ XML 类型解析。这非常类似于 Azure Cosmos DB 对 JSON 文档使用的自动索引。\n\n*   `辅助 XML 索引`可提升使用`exists()`方法搜索或筛选\
  \ XML 文档，或使用`value()`方法从 XML 文档返回多个值的查询性能。\n\n*   `选择性 XML 索引`仅对 XML 列中指定的路径进行索引。这非常类似于在预定义的\
  \ XML 表达式上创建多个 B 树索引。\n\n选择性 XML 索引是基于 SQL Server 中多种 XML 场景经验总结得出的推荐索引方法。SQL Server\
  \ 团队发现，对所有可能的字段进行自动索引会导致 XML 索引体积庞大，而另一方面，大多数被索引的路径并未被使用。因此，选择性 XML 索引成为在可用性、性能和大小之间取得平衡的最佳选择。\n\
  \n在以下示例中，您可以看到如何在一个简单表上创建选择性 XML 索引：\n\n```sql\nCREATE TABLE XmlDocs (\nid INT IDENTITY\
  \ PRIMARY KEY,\ndoc XML\n);\nGO\nCREATE SELECTIVE XML INDEX sxi_docs\nON XmlDocs(doc)\n\
  FOR (\npath_price = '/row/info/price' AS SQL INT,\npath_name = '/row/info/name'\
  \ AS SQL NVARCHAR(100)\n)\n```\n\n在选择性索引中，您可以选择应包含在索引中的路径并指定其类型。在`doc`列上使用`value()`函数，且\
  \ XPath 查询与索引规范中定义的路径相匹配的查询，将能够利用`sxi_doc`索引，从而获得巨大的性能提升，即使索引本身非常小。\n\n## 键值对\n\n\
  Azure SQL 没有专门用于保存键值对的结构。原因很简单：键值映射可以使用简单的两列表来实现。\n\nAzure SQL 允许您自定义两列表，并使用各种索引对键列进行索引。借助内存优化表（下一章将详细讨论），您可以使用\
  \ B 树或哈希索引对键列进行索引。在以下示例中，您可以看到一个内存优化的、无锁的、原生编译的键值表，它使用`HASH`索引来实现对键的更快访问：\n\n```sql\n\
  CREATE TABLE [Cache] (\n[key] BIGINT IDENTITY,\nvalue NVARCHAR(MAX),\nINDEX IX_Hash_Key\
  \ HASH ([key]) WITH (BUCKET_COUNT = 100000)\n) WITH (MEMORY_OPTIMIZED = ON, DURABILITY\
  \ = SCHEMA_ONLY);\n```\n\n此结构利用哈希索引实现了键的快速检索，这对于基本的 get/put 操作是最优的。内存优化表采用乐观的无锁数据访问，而`SCHEMA_ONLY`持久性确保了更快的更新速度，因为数据不会持久化到磁盘。此外，如果值的格式是\
  \ JSON 格式，我们可以使用原生 JSON 函数直接在数据库中筛选和处理数据，正如您在本章开头所学。\n\nAzure SQL 中键值结构的使用场景之一是集中式缓存。SQL\
  \ Server 2016 中有一个著名的案例研究，展示了客户如何将一个分布式缓存机制（该机制在 19 个分布式 SQL Server 节点上达到了每秒 15\
  \ 万个请求的性能）替换为单台服务器上的内存优化表，从而将性能提升至每秒 120 万个请求。目标场景是实现 ASP.NET Session 缓存。Azure SQL\
  \ 使用与 SQL Server 相同的技术，相同的技术也可用于 Azure 云中的缓存。\n\n在许多实际项目中，使用专用引擎进行缓存通常是首选方案，但这意味着你需要掌握另一门技术，并需要弄清楚如何将其最佳地集成到你的解决方案中。通常，由于缓存解决方案比完整的\
  \ Azure SQL 数据库便宜得多，这种努力是一个不错的选择；但如果你本来就在使用 Azure SQL，那么知道你在数据库中就拥有这种能力，可以为你提供一个你可能想要评估的额外选项，以简化整体架构。\n\
  \n## 如何处理非结构化文本？\n\n最难处理但也并非罕见的情况是非结构化文本数据。在某些情况下，你拥有的文本数据无法很好地组织成 JSON 或 XML 格式，但你需要对该文本实现一些搜索。一个常见的例子是存储在数据库中的\
  \ HTML 代码。理想情况下，如果 HTML 符合 XHTML 规范，它应该与 XML 相同，但在许多情况下，HTML 可能存在某些变体，破坏了严格的 XML\
  \ 结构。\n\nAzure SQL 允许你使用`LIKE`子句来确定文本列是否匹配某个模式。以下查询查找所有`SearchDetails`和`Tags`列中包含用户界面中某个搜索文本框输入的文本的库存项目：\n\
  \n```sql\nSELECT si.StockItemID, si.StockItemName, si.Tags\nFROM Warehouse.StockItems\
  \ AS si\nWHERE si.SearchDetails LIKE N'%' + @SearchText + N'%'\nOR si.Tags LIKE\
  \ N'%' + @SearchText + N'%'\n```\n\n`LIKE`谓词使用百分号（`%`）匹配零个或多个任意字符，使用下划线（`_`）匹配任意一个字符。`LIKE`运算符右侧模式表达式中的这些特殊字符，使你能够定义各种模式，例如以某些文本序列开头或结尾的文本。`LIKE`运算符是一个非常方便的工具，通常用于小型数据集上的文本搜索。Azure\
  \ SQL 甚至可以在使用`LIKE`运算符时进行优化和使用索引，特别是当你使用`LIKE`搜索所有以某个前缀`开头`的文本时。在这种情况下，索引和`LIKE`运算符可以提供非常好的性能。相反，如果你需要进行更复杂的搜索，例如，查找`包含`在文本某处的特定单词，特别是在处理大型文本集时，你可能需要考虑下一节中描述的一些文本索引解决方案，以进一步提高性能。\n\
  \n### 索引非结构化文本\n\n如果你需要搜索大量的非结构化文本数据，你将需要使用某种特定的索引技术。Azure 提供了一个通用的 Azure 认知搜索索引服务，使你能够索引各种数据源。但是，使用外部服务会给你的解决方案增加一些复杂性。虽然\
  \ Azure 认知搜索提供了一套强大的专业功能，但如果你不需要所有这些功能，你可能会很高兴知道 Azure SQL 使用了一个类似的本地化文本搜索索引，称为全文搜索（FTS）索引。FTS\
  \ 索引是一种对指定表中非结构化文本字段进行索引的结构。以下清单展示了在`StockItems`表的三个文本字段上创建的 FTS 索引示例：\n\n```sql\n\
  CREATE FULLTEXT CATALOG [Main] AS DEFAULT;\nGO\nCREATE FULLTEXT INDEX\nON Warehouse.StockItems\
  \ (SearchDetails, CustomFields, Tags)\nKEY INDEX PK_Warehouse_StockItems\nWITH CHANGE_TRACKING\
  \ AUTO;\nGO\n```\n\n一个`FTS`索引包含一组使用一组分词器划分的文本片段（令牌）。FTS 索引中的令牌带有它们来源行的键。`FTS`允许你提供文本模式的简单描述，并返回符合该条件的行的键。\n\
  \n\n### 查询非结构化文本\n\n一旦建立了全文搜索（FTS）索引，就可以使用以下功能通过文本匹配来搜索行：\n\n*   `CONTAINS` 和 `FREETEXT`：用于检查某些列中的值是否符合文本谓词中定义的条件。\n\
  *   表值函数 `CONTAINSTABLE` 和 `FREETEXTTABLE`：返回符合文本匹配条件的行的标识符。\n\n以下示例展示了如何从 `Warehouse.StockItems`\
  \ 表中查找所有 `SearchDetails` 列包含的文本符合 `@SearchCriterion` 变量中定义的搜索条件的键：\n\n![../images/493913_1_En_8_Chapter/493913_1_En_8_Figa_HTML.jpg](img/493913_1_En_8_Figa_HTML.jpg)\n\
  \n```sql\nDECLARE @SearchCondition NVARCHAR(200) = 'blue car';\nSELECT StockItemID\
  \ = ft.[KEY], ft.[RANK]\nFROM FREETEXTTABLE(Warehouse.StockItems, SearchDetails,\
  \ @SearchCondition) AS ft\n```\n\n`KEY` 列是 `StockItems` 表中某行的标识符，该行用于 FTS 索引，并代表由\
  \ `FREETEXTTABLE` 或 `CONTAINSTABLE` 函数返回的记录。`RANK` 列描述该行与选择条件的匹配程度。可以使用 `KEY` 列将此结果集与原始表连接（`JOIN`），以获取更多结果。以下示例展示了如何查找\
  \ FTS 函数返回的键对应的所有库存项：\n\n![../images/493913_1_En_8_Chapter/493913_1_En_8_Figb_HTML.jpg](img/493913_1_En_8_Figb_HTML.jpg)\n\
  \n```sql\nDECLARE @SearchCondition NVARCHAR(200) = 'blue AND car';\nSELECT\nsi.StockItemID,\n\
  si.StockItemName,\nft.[RANK]\nFROM\nWarehouse.StockItems AS si\nINNER JOIN\nCONTAINSTABLE(Warehouse.StockItems,\
  \ SearchDetails, @SearchCondition) AS ft ON si.StockItemID = ft.[KEY]\nORDER BY\n\
  ft.[RANK];\n```\n\n表值函数 `CONTAINSTABLE` 和 `FREETEXTTABLE` 基于精确匹配或模糊匹配来匹配文本。这些函数的一个区别是，`CONTAINSTABLE`\
  \ 进行更精确的匹配，而 `FREETEXTTABLE` 则使用同义词库、同义词和词形变化进行模糊匹配。如果以单词 `\"children\"` 作为搜索条件，`FREETEXTTABLE`\
  \ 也会匹配包含 `\"child\"` 的行，但 `CONTAINSTABLE` 则不会。在 `CONTAINSTABLE` 中，需要显式指定表达式 `FORMSOF(INFLECTIONAL,children)`\
  \ 来指示 Azure SQL 包含该单词的词形变化形式。\n\n另一个区别是，`CONTAINSTABLE` 允许指定 `AND`、`OR` 或 `NEAR`\
  \ 等运算符来定义如何搜索文本。在前面的示例中，你可能看到我们向 `FREETEXTTABLE` 提供了单词集合 `\"blue car\"`，该函数将返回包含这些单词中任何一个的所有行，类似于大多数网络搜索引擎的行为。而在\
  \ `CONTAINSTABLE` 示例中，我们需要显式指定诸如 `AND`、`OR` 或 `NEAR` 之类的运算符来指定应搜索的内容，例如 `\"blue\
  \ AND car\"` 或 `\"blue OR car\"`。\n\n除了函数 `FREETEXTTABLE` 和 `CONTAINSTABLE`，你还可以使用等效的谓词\
  \ `FREETEXT` 和 `CONTAINS`。这些谓词可以在查询的 `WHERE` 子句中使用，它们在功能上等同于显式地与 `FREETEXTTABLE`\
  \ 和 `CONTAINSTABLE` 进行 `JOIN` 操作，区别在于你无法使用 `RANK` 列：\n\n```sql\nDECLARE @SearchCondition\
  \ NVARCHAR(200) =\n'FORMSOF(INFLECTIONAL,children) OR car';\nSELECT\nsi.StockItemID,\n\
  si.StockItemName,\nsi.SearchDetails\nFROM\nWarehouse.StockItems AS si\nWHERE\nCONTAINS(SearchDetails,\
  \ @SearchCondition);\n```\n\n如果存在包含单词 `'cars'` 的库存项，它不会出现在结果中，因为 `CONTAINS` 使用单词\
  \ `'car'` 进行精确匹配。但是，如果我们在搜索表达式 `'children cars'` 中使用 `FREETEXT`，该谓词将使用这两个单词的词形变化形式。\n\
  \n全文搜索是一个非常强大的工具，可以通过简单的表达式帮助你实现非常复杂的搜索。\n\n### 如何在半结构化数据上利用非结构化索引？\n\n全文搜索不仅限于非结构化文本。你可以使用\
  \ FTS 索引来提高某些 JSON 搜索查询的性能，尤其是在需要筛选具有客户端定义的键值对的文档时。毕竟，FTS 索引与许多数据库中用于索引 JSON 数据的\
  \ *广义倒排索引（GIN）* 非常相似。\n\n想象一下，我们需要实现一个功能，使用任意的键值组合来搜索大量的 JSON 文档。为每个可能的键添加 B-Tree\
  \ 索引效率低下，而对 JSON 数据使用 `CLUSTERED COLUMNSTORE` 索引是为分析用例设计的，因此不是筛选的理想解决方案。\n\n如果我们知道值是一个单词，并且可以利用\
  \ JSON 存储为文本且键和值彼此靠近这一事实。在这种情况下，筛选所有具有所需键和值彼此靠近的 JSON 文本的 FTS 可能会提供正确的结果。以下查询用于查找包含键值对的\
  \ JSON 文档：\n\n```json\n{\"Color\":\"Silver\",\"MakeFlag\":true,\"SafetyStockLevel\"\
  :100}\n```\n\n```sql\nSELECT si.StockItemID, si.StockItemName, si.Tags\nFROM Warehouse.StockItems\
  \ AS si\nWHERE CONTAINS(CustomFields, 'NEAR((Color,Silver),1)\nAND NEAR((MakeFlag,true),1)\n\
  AND NEAR((SafetyStockLevel,100),1)')\n```\n\n`CONTAINS` 谓词中的 `NEAR` 运算符是 JSON 场景（其中\
  \ JSON 属性的键靠近其值）的一个良好选择。此类谓词将快速查找所有包含彼此靠近的单词 `\"Color\"` 和 `\"Silver\"` 的文本单元，这在\
  \ JSON 结构中正是如此。此外，`CONTAINS` 子句使我们能够使用 `AND`、`OR` 和其他关系谓词来指定复杂的谓词。然而，FTS 不能保证 `\"\
  Color\"` 是键且 `\"Silver\"` 是文本中的值，因为它不理解 JSON 结构中文本部分的语义。如果你有一个包含文本 `\"color silver\"\
  ` 的 JSON 文档，它也会被 `CONTAINS` 谓词返回，尽管这不是键值对。\n\n为了消除误报结果，我们可以应用标准的 JSON 谓词来双重检查条件并保证结果的正确性：\n\
  \n```sql\nSELECT ProductID, Name\nFROM ProductCatalog\nWHERE CONTAINS(Data, 'NEAR((Color,Silver),1)\n\
  AND NEAR((MakeFlag,true),1)\nAND NEAR((SafetyStockLevel,100),1)')\nAND JSON_VALUE(Data,'$.Color')\
  \ = 'Silver'\nAND JSON_VALUE(Data,'$.MakeFlag') = 'true'\nAND JSON_VALUE(Data,'$.SafetyStockLevel')\
  \ = '100'\n```\n\n该查询充分利用了 FTS 和 JSON 功能的优势来返回所需结果：\n\n*   `CONTAINS` 将快速筛选掉大部分不符合条件的条目，可能显著减少可能包含所需数据的候选行数量。如果没有这一部分，我们将不得不进行全表扫描并对每一行应用\
  \ JSON 函数。\n*   `JSON_VALUE` 将对由 FTS 返回的较小候选集执行精确检查。这些谓词保证返回正确的结果，并且我们确信无需将它们应用于每个文档。\n\
  \n此示例再次展示了 Azure SQL 功能如何很好地协同工作，使你能够实现各种场景。\n\n# Azure SQL 中的多模型：为何以及何时使用\n\nAzure\
  \ SQL 是一个现代化的多模型数据库平台，它使您能够使用不同的数据格式并将它们组合起来，从而设计出最符合您领域需求的最佳数据模型。根据您的具体场景，您可以将关系表示为经典的外键关系或图的节点/边。半结构化数据可以存储在\
  \ `JSON`、`空间` 或 `XML` 列中。\n\n你刚刚了解了如何使用所有这些功能。现在是时候讨论**为什么**以及**何时**使用了。\n\nAzure\
  \ SQL 最大的优势之一是其核心数据库功能与多模型能力之间的互操作性。您可以轻松地将 `列存储` 与图或 `JSON` 数据结合，从而获得对图/`JSON`\
  \ 数据的高性能分析能力，利用内置的语言处理规则为任何市场定制应用程序，使用 `T-SQL` 语言提供的所有功能来创建任何查询或强大的报告，并将其与理解 `T-SQL`\
  \ 的各种工具集成。\n\n通过 Azure SQL，您不仅能获得其他 `NoSQL` 数据库提供的核心功能，还能获得大量标准的数据库功能，这些功能可以轻松地与\
  \ `NoSQL` 特性集成。这是您应该选择 Azure SQL 多模型功能的最重要原因。\n\n那么，您应该选择具备多模型能力的 Azure SQL，还是选择在这些领域具有更高级功能的专用\
  \ `NoSQL` 数据库引擎呢？这是一个非常有趣——并且不容易——回答的问题。\n\nAzure SQL 并非一个 `NoSQL` 数据库。如果您有一个经典的\
  \ `NoSQL` 场景，需要高级的图或文档支持，并且您不期望需要处理其他更适合存储在表中的数据，那么您当然应该评估成熟的图或文档数据库，例如 Azure Cosmos\
  \ DB、MongoDB、Neo4j 等。这些数据库引擎完全面向 `NoSQL` 场景，并实现了更丰富、更高级的 `NoSQL` 功能。它们针对一个非常特定的领域，并且在这方面表现得极其出色。\n\
  \n您需要问自己的最重要问题是，您的应用程序需要哪些额外的 `NoSQL` 功能。Azure SQL 和 `NoSQL` 数据库引擎都提供类似级别的基本图和文档处理功能（例如，插入、修改、索引和搜索）。如果您需要的不仅仅是这些基础功能，Azure\
  \ SQL 让您能够利用 `T-SQL` 进行高级查询，使用 `列存储` 技术进行分析，通过 `R`/`Python` 支持利用内置机器学习功能，以及使用排序规则、复制机制和其他在大多数现实世界应用中被证明必要的功能。如果您认为这些功能对您的应用程序可能很重要，那么\
  \ Azure SQL 是您的正确选择。\n\n## 想了解更多\n\n本章讨论了许多概念和技术。一如既往，如果您想了解更多，可以在这里找到更多精神食粮：\n\n\
  *   Azure SQL 数据库和 SQL 托管实例的多模型功能 – [`https://docs.microsoft.com/azure/azure-sql/multi-model-features`](https://docs.microsoft.com/azure/azure-sql/multi-model-features)\n\
  *   `Dapper.Stream` – [`https://github.com/JocaPC/Dapper.Stream/`](https://github.com/JocaPC/Dapper.Stream/)\n\
  *   SQL Server 中的 `JSON` 数据 – [`https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server)\n\
  *   Azure SQL 中的 `JSON` 功能入门 – [`https://docs.microsoft.com/azure/azure-sql/database/json-features`](https://docs.microsoft.com/azure/azure-sql/database/json-features)\n\
  *   使用 SQL Server 和 Azure SQL 进行图处理 – [`https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-overview`](https://docs.microsoft.com/sql/relational-databases/graphs/sql-graph-overview)\n\
  *   空间数据 – [`https://docs.microsoft.com/sql/relational-databases/spatial/spatial-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/spatial/spatial-data-sql-server)\n\
  *   空间索引概述 – [`https://docs.microsoft.com/sql/relational-databases/spatial/spatial-indexes-overview`](https://docs.microsoft.com/sql/relational-databases/spatial/spatial-indexes-overview)\n\
  *   世界大地测量系统 (`WGS84`) – [`https://gisgeography.com/wgs84-world-geodetic-system/`](https://gisgeography.com/wgs84-world-geodetic-system/)\n\
  *   全文搜索 – [`https://docs.microsoft.com/sql/relational-databases/search/full-text-search`](https://docs.microsoft.com/sql/relational-databases/search/full-text-search)\n\
  \n# 9. 不仅仅是表格\n\n在上一章中，我们学习了 `Hobits` (`HoBT`，堆或 B 树)——关系数据库中最常见的对象：经典表和索引。在本章中，您将学习一些特殊类型的表和索引，它们可以帮助您为特定场景构建更好的设计。本章将要解释的对象包括：\n\
  \n*   `列存储` 结构，可以提升您的报告和分析工作负载的性能\n*   内存优化表，可以通过类似 `CRUD` 的操作提升您的 `OLTP` 工作负载性能\n\
  *   时态表，可以保存您所做更改的完整历史记录，并使您能够对数据进行历史和时间旅行分析\n\n# 列存储格式\n\n行存储格式是 Azure SQL 中表的默认存储格式，它已被证明是大多数通用工作负载的理想结构。在行存储格式中，属于单行的单元格值在称为\
  \ `页面` 的固定大小 8KB 结构中物理上彼此靠近放置。^(²) 如果你需要执行选择或更新整行或一组行的查询，这是一个很好的解决方案。如果你运行类似 `SELECT\
  \ * FROM <table> WHERE <condition>` 的查询，其中 `<condition>` 谓词将选择单行或一小部分行，那么行存储格式是一个极佳的选择。一旦数据库引擎定位到放置该行的\
  \ 8KB 页面，大部分数据都将位于该页面上，并通过单次数据页面访问加载。\n\n然而，在分析和报告查询需要扫描许多行时，这并非最佳解决方案，如下列查询所示：\n\
  \n```sql\nSELECT State, AVG(Price)\nFROM Sales.Products\nGROUP BY State\n```\n\n\
  在这类分析和报告查询中，我们需要从所有行中仅访问两列来计算结果。即使存在有助于使相关数据在物理上彼此靠近的聚集索引，加载来自不需要的列的数据也会消耗大量资源：显然，这对查询性能会产生负面影响。\n\
  \n必须强调的是，由于数据库通常是一个高度并发的系统，Azure SQL 将实际上不需要的数据加载到内存中未必是一件坏事，因为这将有助于其他查询直接使用已存在于内存中的数据，从而获得更好的性能。由于内存是相比磁盘空间非常有限的资源，理解系统典型的工作负载模式至关重要，这样任何建议或最佳实践才能结合你的系统具体情况来应用。特别是对于不能仅针对读取或写入进行优化的数据库，找到最佳平衡是开发者和数据库管理员的关键目标。\n\
  \n列存储格式在许多分析系统中用于提高这些场景下的性能。在列存储格式中，单元格在物理上按列分组为 `段`。列段是来自单个列的所有值的一个物理上连续的集合。表在物理上表示为一组列段，而不是一组行。行存储和列存储格式之间的差异如图\
  \ 9-1 所示。\n\n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig1_HTML.jpg](img/493913_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n当查询需要访问单行或少数行的所有值时（左图），行存储格式是最优的；而当查询访问单列或少数列的所有值时（右图），列存储格式是最优的。\n\n\
  在左侧所示的行存储格式中，一个报告查询需要遍历表中的所有行，读取每个页面，并从每行的十列中取出两列来计算结果。这意味着，一个使用十列中两列的查询大约只使用了需要读取的内存页面的\
  \ 20%。如果你有一个表，其中仅使用较小的列进行分析，但行中存在大的 `NVARCHAR` 列，而这些列在特定查询中不会被使用而被丢弃，那么效率会更差，因为必须获取并丢弃的\
  \ `NVARCHAR` 列会占用更多内存页面空间。\n\n这在内存缓存架构中可能是个问题，因为底层硬件需要将页面从较低级别的缓存（或存储）移动到较高级别的内存缓存，而大部分数据移动都是徒劳的。尽管这看起来像是微小的优化，但如果你尝试在数十万行上运行这类查询，可能会看到巨大的性能问题。多年的分析和实践经验表明，行存储技术不适用于高性能的分析和报告。\n\
  \n现在，让我们关注图 9-1 右侧的行的列表示。每列的所有值在物理上分组在一起。这意味着报告查询可以轻松拾取计算结果所需的两列，并且只读取这些值。其他不同列中的值根本不会被使用，甚至可能不在内存中。由于全表扫描查询需要读取所有或大部分行的所有值，内存读取的效率接近\
  \ 100%。同一列中的所有值在物理上彼此靠近放置，查询将读取并使用所有这些值。这显著提升了分析查询的性能。实际上，经常可以看到性能比基于行存储的原始时间提升\
  \ 10 倍甚至 100 倍。\n\n在这种情况下，还有另一种优化可以利用。所有现代处理器都支持 `SIMD`（单指令多数据）操作，可以极其高效地对内存数组中的所有元素应用单一操作。如果存储组织能够提供需要处理的连续单元格数组，那么\
  \ `SIMD` 指令可以对列段中的所有值应用单一操作。这被称为 `批处理模式执行`，它比经典的逐行处理效率高得多。\n\n高压缩率是列存储格式的另一个非常便利的特性。列存储结构可以利用存储在列段中的单元格值相似这一事实。这一特性使得列存储能够对单元格应用各种压缩算法，例如：\n\
  \n-   NULL 值消除——如果单元格中有很大比例的缺失值，列存储将直接避免存储这些行。\n-   重复值消除——如果一列有许多相同的值，列存储可以只记录一个值，并标记该值出现的行范围。这种技术也称为游程编码。\n\
  -   字典标准化——字符串和其他离散值被放置在每个列段的内部键值字典中。键被放置在列段中，而不是实际值。\n\n除了这些策略之外，整个段也可以被压缩，从而进一步节省空间。这是对不常用但必须保留在数据库中的数据进行归档的常用技术。\n\
  \n以上是列存储格式的通用特性和优势。在接下来的章节中，你将了解 Azure SQL 中列存储格式的具体实现。\n\n### Azure SQL 中的列存储\n\
  \nAzure SQL 并未使用前一节描述的经典列存储组织结构。理论上，我们可以创建大型列段，每个列段包含来自单表列的所有值并进行压缩。然而，在任何更新操作时，我们需要解压整个列段以插入、更新或删除单个值，然后再次压缩。为避免这种开销，更好的做法可能是将唯一的列区域划分为多个列段，并仅对包含需要更新单元的段执行所需操作。此外，大多数查询无需扫描所有行，因此大多数被解压的单元不会被使用。如果将列拆分为多个列段，我们或许能够只选取查询所需的段。这个想法与分区技术非常相似，但仅应用于列段内部，并且对用户完全透明。\n\
  \nAzure SQL 对原始列存储结构进行了一些增强以解决这些问题。两个主要的修改是：\n\n*   列段不跨越整个表。Azure SQL 会将表行分组，每组最多包含\
  \ 100 万行。这些 `行组` 以列存储格式组织，每个列段最多包含一百万行的值。\n*   所有新行都插入到一个使用行存储格式组织的缓冲行组中。行存储格式是面向行操作的理想选择，因此将其作为插入新行的区域是合理的。这些行组被称为\
  \ `增量存储`。一旦这些行组达到一百万条记录，它们会在后台透明地转换并压缩为列存储格式。\n\nAzure SQL 中列存储结构的组织如图 9-2 所示。\n\
  \n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig2_HTML.jpg](img/493913_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2：列存储结构包含一个采用列存储格式的压缩区域和一个采用行存储格式的输入区域（增量）\n\n在 Azure SQL 中，列存储结构中的数据行被划分为行组，每个行组最多包含一百万行。一百万行提供了足够的值以实现良好的压缩效果，同时行数也不会过多，便于将行组作为独立单元进行操作。行组可以放置在两个区域：\n\
  \n*   **压缩区域**：包含许多以列存储格式组织的行组，这些行组中的列段被高度压缩。理想情况下，所有行组都应压缩在此区域。\n*   **增量存储区域**：包含一个或多个以行存储格式组织的行组。这是一个临时缓冲区域，用于存放等待被压缩并移动到压缩区域的行。\n\
  \n如果你的数据库中已有列存储索引，可以使用以下系统视图查找行组：\n\n```sql\nSELECT * FROM sys.columnstore_rowgroups;\n\
  ```\n\n压缩行组中的列被组织成列段，该段包含行组中指定列的所有值。此段被高度压缩，所有值存储在一个连续的物理位置。每个列段都包含描述段中最小和最大值的统计信息。这是\
  \ Azure SQL 引擎可用于优化列存储结构上的报表和分析查询性能的重要信息。我们可以使用以下视图轻松查找 Azure SQL 数据库中现有的列段：\n\n\
  ```sql\nSELECT * FROM sys.columnstore_segments;\n```\n\n压缩区域应包含超过 95% 的数据，并且压缩后的数据不应被更改。修改压缩区域中的数据是不可取的，因为\
  \ Azure SQL 需要解压段中的所有值以更新其中一个值，然后再次压缩所有内容。\n\n列存储结构中还有一个称为增量存储的区域。增量存储包含少量以经典行存储格式（或前一章描述的\
  \ Hobit）组织的行组。该区域的主要目的是在数据被压缩之前缓冲新输入和更改。将每个新行拆分到每一列并重新分配值到相应的列段是一种低效的数据插入策略。因此，所有新行都插入到行存储增量区域，它们会一直保留在那里，直到行组达到一百万行。一旦增量存储中的行组被填满，它就会\
  \ `关闭` 新的更改，后台进程将开始将此行组转换为列存储格式并移动到压缩区域。目标是将尽可能多的行组从增量存储移动到压缩存储，而增量存储应包含少于 5% 的行。\n\
  \n理论上，我们可以在增量存储中只有一个行组。然而，单个行组可能会影响并发性，因为一个正在插入数据的事务可能会锁定该行组，其他试图插入数据的请求将需要等待第一个事务释放锁。因此，列存储结构会创建新的行组以方便并发插入。\n\
  \n### 在列存储中更新值\n\n如前所述，更新压缩的列存储数据并非理想操作。列存储格式并非只读，但与经典的行存储相比，更新操作有更大的性能损耗。Azure\
  \ SQL 进行了一些增强以优化压缩数据的更新。\n\n其中一个优化是前一节描述的增量存储。增量行组缓冲传入的行，直到有足够的行可以成功压缩它们。但增量存储并不总是被使用：Azure\
  \ SQL 会决定传入数据是进入增量存储，还是直接压缩而无需缓冲。Azure SQL 使用以下规则：\n\n*   如果插入少量（少于 102,400 行）的行，所有行都将进入某个增量行组。\n\
  *   如果使用单个 `BULK INSERT` 或 `SELECT INTO` 语句插入超过 102,400 行，Azure SQL 会将这些值直接流式传输到新的压缩行组中。\n\
  \n另一个需要解决的问题是如何高效地从列存储中删除行。解压 1,000,000 行以删除一行，然后压缩 999,999 行，并非可取的技术。Azure SQL\
  \ 使用所谓的 `删除索引` 和 `删除位图` 来“虚拟”删除行。当你需要从压缩行组中删除一行时，Azure SQL 只会“标记该行位置”为已删除。当你从压缩列段读取行时，Azure\
  \ SQL 在运行时只会忽略标记为已删除的行。这样，从列段读取数据的查询只获取存在的行，并且无需感知已删除的行在行组解压时被透明地排除。\n\n现在只剩下一个操作需要处理：更新数据。这是最复杂的操作，因为\
  \ Azure SQL 不能仅仅将一个更新值注入到现有的、高度压缩的列段中，而不需要解压并重新压缩所有其他内容。因此，每次行更新都被表示为删除和插入操作的组合。压缩行组中旧行的值被标记为已删除，新值则插入到增量存储中。\n\
  \n仅当受影响的行位于压缩区域时，才会使用标记已删除行并将更新表示为删除和插入操作对的方式。如果该行位于增量存储中，它将像常规 Hobits 中的任何其他行一样被更新或删除。\n\
  \n### 查询列存储结构\n\n列存储结构是处理报告查询的理想选择，这类查询使用较少的列子集，但需要扫描表中的大部分数据。以下示例展示了一个可能获得巨大性能提升的查询：\n\
  \n```sql\nSELECT State, AVG(Price)\nFROM Products\nWHERE State IN ('Available',\
  \ 'In Stock')\nGROUP BY State\n```\n\n假设示例中的表有六个压缩行组，每个行组包含五列（即每个行组有五个列段）。\n\n列存储格式实现的最重要优化是列段消除。Azure\
  \ SQL 可以在查询处理开始之前，使用以下规则确定哪些列段对查询处理是不必要的：\n\n*   查询中未使用的列所对应的列段将被忽略。\n*   不包含查询所需值的列段将被忽略。\n\
  \n利用这些规则，Azure SQL 可能会丢弃大部分列段，如图 9-3 所示。\n\n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig3_HTML.jpg](img/493913_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\n列存储将丢弃查询不需要的列段（红色）以及不包含查询所需数据的列段（橙色）\n\n列 `Id`、`Date` 和 `Tax` 未在查询中使用，因此如果它们仍在磁盘上，Azure\
  \ SQL 甚至不会将其加载到内存中。通过这种方式，我们将所需的 I/O 和内存占用减少到 40%，因为五个列段中有三个被忽略了。\n\n每个列段都包含有关段中值的一些统计信息（例如，最小值-最大值）。Azure\
  \ SQL 知道哪些列段包含值 `Available` 和 `In Stock`。假设这些值仅出现在六个行组中的三个行组中。Azure SQL 将丢弃不包含查询所用值的\
  \ `State` 列段，以及来自相同行组的相关 `Price` 列段。这样，Azure SQL 甚至在开始查询之前就又丢弃了一半的数据。如果大部分数据存储在压缩的列段中而不是增量存储中，这些优化将产生巨大效果。\n\
  \n假设此示例中使用的数据集初始大小为 100GB。假设列存储结构可以实现 10 倍压缩，并且列段消除可以在查询开始前丢弃 80% 的数据，那么我们需要处理的数据量为\
  \ 2GB，而不是全表扫描。对于查询来说，这是所需的 I/O 和内存的大幅减少，可以将性能提升高达 50 倍。\n\n另一个重要的优化是批处理查询。Azure\
  \ SQL 将利用底层硬件的 SIMD 指令，对大量数据向量应用少量操作。这些数据向量是包含连续值范围的列段。这种硬件加速的批处理模式显著提高了查询性能，并且对查询以及使用它的应用程序是完全透明的。查询只会运行得更快。\n\
  \n### 聚集列存储索引\n\n聚集列存储索引 (`CCI`) 是以列存储格式组织的表。我们可以在创建表时直接创建列存储索引：\n\n```sql\nCREATE\
  \ TABLE Sales.Orders (\n    INDEX cci CLUSTERED COLUMNSTORE\n)\n```\n\n甚至可以在现有表上创建：\n\
  \n```sql\nCREATE CLUSTERED COLUMNSTORE INDEX cci ON Sales.Orders\n```\n\n我们使用 `CCI`\
  \ 来存储高度压缩的数据，其工作负载模式以读取和大量（批量加载）插入为主。这种工作负载模式在数据仓库中非常常见，因此 `CCI` 是现代数据仓库场景中非常常见的结构。然而，`CCI`\
  \ 适用于任何需要追加和分析数据的场景，例如物联网场景。\n\n`CCI` 利用压缩和批处理模式执行来提升报告和分析查询的性能，这是列存储格式的主要优势。\n\n\
  `CCI` 特有的一个优化对提高批量加载性能非常有帮助：前文提到，加载 102,400 行将得到特殊处理，并直接压缩所有传入数据。这种直接压缩可以提升数据加载过程的性能，因为任何需要保存到磁盘的数据页都会立即被压缩。较小的插入操作会进入增量存储，在那里缓冲，然后被压缩并移动到压缩的列存储区域。如果您的工作负载产生了许多不符合关闭标准的打开行组，可以使用以下语句合并它们：\n\
  \n```sql\nALTER INDEX cci ON Sales.Orders REORGANIZE\n```\n\n`CCI` 重组操作是一种轻量级的非阻塞操作，它将合并和压缩打开的增量行组，而不会对您的工作负载产生重大影响。\n\
  \n### 非聚集列存储索引\n\n非聚集列存储索引 (`NCCI`) 是在 Hobits 之上创建的、以列存储格式组织的索引。这使得 Azure SQL 在市场上相当独特，因为它允许在同一张表上同时存在列存储和行存储索引。图\
  \ 9-4 展示了一个经典的行存储表，包含七列，以及一个额外的列存储结构，其中我们提取了三列的值并将其压缩为列式格式。\n\n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig4_HTML.png](img/493913_1_En_9_Fig4_HTML.png)\n\
  \n图 9-4\n\n带有额外列存储索引 (`NCCI`) 的经典行存储表，该索引建立在此表的三列之上\n\n`NCCI` 的主要目的是优化现有行存储表中列子集上的分析和报告查询，而无需更改原始表结构。\n\
  \n可以使用以下定义在表中创建 `NCCI`：\n\n```sql\nCREATE TABLE dbo.Sales (\n    INDEX ncci NONCLUSTERED\
  \ COLUMNSTORE (Price, Quantity, SalesID)\n)\n```\n\n通过在经典表上创建 `NCCI`，您可以让 Azure\
  \ SQL 为事务型或分析型查询选择最佳格式：\n\n*   如果运行选择单行或少量行的查询，Azure SQL 将使用底层的行存储表。数据库将利用索引查找或范围扫描操作，这非常适合此场景。\n\
  *   如果运行扫描整个表并聚合数据的报告，Azure SQL 将从 `NCCI` 索引中读取信息，利用列段消除和批处理模式执行来快速处理整个表。\n\n任何更新、删除或插入操作都会立即反映在底层的行存储表中，而\
  \ `NCCI` 将通过增量存储进行更新。这种双重更新可能会减慢您的事务型工作负载，但如果需要在提升表的报告能力和事务型语句速度之间做出权衡，这应该是可以接受的。\n\
  \n## 内存优化表\n\nAzure SQL 提供了内存优化表功能，可极大地提升您的 OLTP 工作负载性能与可扩展性。内存优化表的主要用途是加速类似 CRUD\
  \ 的操作，例如选择少量行或更新、删除现有行。\n\n有些人认为，将行数据始终保留在内存中是提升性能的关键因素。然而，这种想法过于天真，在许多情况下，这远非真正的原因。\n\
  \nAzure SQL 本来就是与存储在内存中的行数据协同工作的。它拥有一套出色的数据内存缓存机制（称为 `缓冲池`），能够智能地选取应从磁盘获取的最重要数据，并巧妙地淘汰近期不太需要的行，以便为更可能使用的行腾出空间。如果您的数据库小于可用内存，所有行很可能都常驻于内存中，那么您已经拥有一个“内存数据库”了。那么，问题在于：与内存优化表相比，我们获得的是何种额外的“内存优化”呢？\n\
  \n让我们首先了解常规表的工作方式，以及在查询处理过程中磁盘和内存是如何使用的。核心的查询处理假设基于以下前提：\n\n*   如前所述，数据库中存储的所有数据都使用称为“页”的\
  \ `8KB` 数据结构记录在磁盘上。一个 `10GB` 的未压缩数据库最少会有大约一百万个数据页。\n*   每当访问一行时，相关的数据页会被加载到内存中。Azure\
  \ SQL 会尝试将尽可能多的数据页保留在内存中。这个内存区域称为 `缓冲池`。\n*   如果数据库大于可用内存，`缓冲池` 将无法缓存所有数据，因此页必须从磁盘获取，如果被修改，则需写回磁盘。每个页都作为一个原子性的\
  \ `8KB` 单位进行读写。有时，数据库可以通过单次 IO 操作读取更大的磁盘块（即所谓的预读操作）来优化 IO 性能。\n*   查询中最昂贵的操作是在内存和磁盘之间传输\
  \ `8KB` 页。\n*   应最小化内存与磁盘之间的数据传输。数据库引擎应尽其所能避免不必要的 IO 交互。\n\nAzure SQL 必须协调工作负载，以最小化\
  \ IO 操作的次数。让我们来看看两个线程/查询更新两个 `8KB` 页上的行的情况。我们需要决定在更改被确认（提交）之前，如何将其与其他查询隔离。我们有两种处理并发的方法：\n\
  \n*   *悲观*：我们会阻塞其他希望访问已被另一线程修改的行的线程，直到修改线程决定保存或放弃更改。\n*   *乐观*：我们允许其他线程访问被修改行的原始版本。我们需要为将被修改的行创建一个副本，该副本将成为仅对当前线程可用的“私有版本”，而其他线程则访问原始行。\n\
  \n理想情况下，我们应该持乐观态度，因为悲观方法会阻塞其他线程，这意味着更低的性能、并发性和可扩展性。但我们需要了解两种方法的优缺点。\n\n### 一个关于乐观并发的故事\n\
  \n让我们看看数据库如何通过乐观并发处理更新。图 9-5 展示了位于同一 `8KB` 页上的两行分别被两个线程（或事务）`Tx[1]` 和 `Tx[2]` 修改，以及另一个具有乐观并发的线程\
  \ `Tx[3]` 的示例。对于每次更改，我们都需要创建一个行的新版本，该版本将成为进行修改的线程的私有副本。在事务提交更改并使更新后的版本对所有其他事务可用之前，这些副本将保持私有。在此期间，其他事务应继续使用原始页中可用的行原始版本。\n\
  \n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig5_HTML.png](img/493913_1_En_9_Fig5_HTML.png)\n\
  \n图 9-5\n\n为每个进行更改的事务创建已更新行的新版本\n\n一旦 `Tx[1]` 提交了对行 1 的更改，Azure SQL 能做的最简单的事情就是声明旧数据页无效并使用新页。因为将部分页的内容复制回原始的\
  \ `8KB` 页会非常困难。`Tx[2]` 同样在处理行 1 的私有副本，它将无法提交自己的更改，因为它更新的版本已不再有效。一旦 `Tx[2]` 尝试提交更改，它将被回滚，并且需要用最新的有效数据重试该操作。这可能是预期的结果，因为两个事务都试图在未独占锁定行的情况下更新行。如果发生冲突，重试是唯一的解决方案。除此之外，还有另一个可能意想不到的副作用。`Tx[3]`\
  \ 将无法提交自己对行的更改，即使这些更改是在与行 1 不同的行上进行的，因此并未与 `Tx[1]` 更新的行 1 发生冲突。因为二进制内容已更改，并且页面可能被拆分为两个新页面，Azure\
  \ SQL 无法轻易从新的有效页中获取已更改行的二进制内容。因此，该事务也将被回滚。\n\n此外，创建带有临时行的新页面也会对性能产生影响。Azure 有一个称为“`检查点写入器`”的后台进程，负责将修改过的内存页保存到底层存储。如果我们生成了大量临时页面，它们将被保存到磁盘，然后在回滚后，原始内容必须再次保存。在这种情况下，临时生成的页面会造成更大的损害，我们可能需要阻止这种情况发生。\n\
  \n### 我们应该成为悲观主义者吗？\n\n由于 `8KB` 页是数据传输的主要单位，更新行的事务可能会对整个页加锁，防止其他事务进行更改，因为这些更改很可能被回滚并导致额外的\
  \ IO。锁机制是一种悲观方法，有助于防止由于*竞争条件*而可能对单个页面造成的损害。\n\n正如您在第 7 章所学，通常数据库通过使用悲观并发控制来防止过多\
  \ IO 操作的风险。每个事务都会获取锁或闩锁（闩锁只是锁的一个更轻量级的版本），以确保一个潜在共享的行或数据页的某个版本专门用于正在修改它的线程。其他希望修改同一页面上数据的线程会暂时被行锁或页闩锁阻塞，直到另一个线程完成修改。线程无法修改相同的行，它们会被阻塞。这样，我们避免了创建新页面和导致额外\
  \ IO 的需要，但我们降低了并发性并影响了性能。\n\n现在，让我们想象一下，我们可以忽略磁盘 IO，并且没有需要为临时更改也持久化存储的 `8KB` 页面。我们可以采用高级的乐观并发，仅使用廉价的内存复制操作轻松生成新的行版本。这只有在我们能确保表数据将放置在内存中，无需在\
  \ `缓冲池` 和磁盘存储之间进行数据传输，并且没有 `8KB` 容器导致行之间存在依赖关系时，才可能实现。内存优化表提供了这些保证。\n\n内存优化表是我们知道数据将位于内存中的表，因此我们可以应用乐观并发，并允许大量的并发更新。这是内存优化技术的主要优势，也是与经典（传统）表的关键区别。\n\
  \n\n## 内存优化表\n\n现在你已经理解了内存优化技术的主要优势，我们可以开始使用它们了。你可以通过将表标记为内存优化来利用其功能：\n\n```\nCREATE\
  \ TABLE dbo.Cache\n(\n[key] INT IDENTITY PRIMARY KEY NONCLUSTERED,\ndata NVARCHAR(MAX)\n\
  )\nWITH (MEMORY_OPTIMIZED=ON)\n```\n\n你唯一需要做的更改是添加一个包含属性 `MEMORY_OPTIMIZED=ON` 的\
  \ `WITH` 子句。启用此属性后，数据行将始终保留在内存中，不再使用数据页，并且会在表数据上启用乐观并发等内存优化功能。\n\n内存优化表有三种类型：\n\n\
  *   内存优化非持久仅限架构的表。这些表与临时表非常相似。表架构在重启或可能的系统崩溃后将被保留。Azure SQL 会在重启后重新创建表结构，但不会保留内容。这些表的主要用途是缓存场景（如\
  \ ASP.NET 会话状态）、作为复杂数据处理的中间存储以及数据的快速加载（即所谓的暂存表）。\n\n*   内存优化持久表，其架构和数据即使在进程崩溃或故障转移后也会被保留。Azure\
  \ SQL 将确保将最小信息集发送到日志并持久化，因此数据能在系统崩溃后得以保留。这些表在逻辑上等同于带有内存优化增强功能的经典表，用于提升现有行存储表的性能。\n\
  \n*   内存优化列存储表是列存储结构与内存优化表的结合。其主要场景是在同一张表上结合分析型和事务型负载。这种组合被称为混合事务分析处理。\n\n在下面的示例中，你可以看到如何创建一个用作缓存的内存优化表：\n\
  \n```\nCREATE TABLE dbo.Cache\n(\n[key] INT IDENTITY PRIMARY KEY NONCLUSTERED,\n\
  data NVARCHAR(MAX)\n)\nWITH (MEMORY_OPTIMIZED=ON, DURABILITY=SCHEMA_ONLY)\n```\n\
  \n你可能会疑惑，既然有其他专门的解决方案（如 Redis 或 Cosmos DB）通常更适合缓存，为何还要使用 Azure SQL 内存优化表来创建缓存解决方案。请记住，软件开发中最好的建议之一就是保持简单。如果你的项目已经在使用\
  \ Azure SQL，能够直接在数据库中创建自定义的事务性缓存机制，而无需借助其他技术，可以大大简化你的解决方案，同时降低维护成本，因为你无需学习和维护另一门技术。除此之外，内存优化表还与\
  \ Azure SQL 的所有其他功能深度集成。例如，你可以结合行级安全和内存优化表来创建安全的缓存解决方案。\n\n你可以使用两个 `WITH` 选项来定义数据是否即使在数据库崩溃时也会被持久化：\n\
  \n*   `DURABILITY=SCHEMA_ONLY` 定义非持久表，如果 Azure SQL 数据库重启，只有表结构会被重新创建。\n\n*   `DURABILITY=SCHEMA_AND_DATA`\
  \ 定义持久表，表结构和数据在故障转移或崩溃后都会保留。\n\n内存优化表的列存储格式必须通过在内存优化表内定义聚集列存储索引来指定，如下例所示：\n\n```\n\
  CREATE TABLE Accounts (\nAccountKey int NOT NULL PRIMARY KEY NONCLUSTERED,\nDescription\
  \ nvarchar (50),\nType nvarchar(50),\nUnitSold int,\nINDEX cci CLUSTERED COLUMNSTORE\n\
  ) WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA)\n```\n\n列存储内存优化表结合了双方的优势——能够将数据放入内存的极快分析和压缩能力，以及内存优化表提供的高并发和极快的数据摄入与更新能力。这里唯一的风险是你可以处理的数据量。经典的列存储索引在内存中分析所有数据；但是，如果列段无法放入内存，它允许你将它们保留在磁盘上。而内存优化列存储则要求所有数据必须驻留在内存中。由于\
  \ Azure SQL 会为内存优化数据保留大约 60% 的可用内存，你需要确保你的数据能够放得下。考虑到在列存储分析场景中我们讨论的是大量数据，如果你不确定数据能否全部放入内存，请使用基于磁盘的表。\n\
  \n因此，内存优化聚集列存储索引覆盖的是一个特定的利基场景。事实上，对于 HTAP 场景，通用方法通常是使用带有 NCCI 索引的经典行存储表，而内存优化聚集列存储索引仅用于对性能要求极高的负载。例如，如果你需要能够每秒处理多达\
  \ 500 万行数据，就像本章最后引用的文章《使用 M 系列 Azure SQL 数据库扩展 IoT 工作负载》中所描述的那样，你将肯定需要用到内存优化聚集列存储索引。\n\
  \n当我们讨论内存优化存储时，无法将索引排除在这个讨论之外。内存中的行是分散在内存空间中的对象，需要一些结构将它们绑定在一起。这些结构就是索引。每当你创建一个内存优化表时，你至少需要拥有一个索引。\n\
  \n在前面的例子中，你看到了 `NONCLUSTERED` B 树索引和 `CLUSTERED COLUMNSTORE` 索引。还有另一种特定于内存优化表的索引类型，即\
  \ `NONCLUSTERED HASH` 索引，如下例所示：\n\n```\nCREATE TABLE [dbo].Employees WITH (BUCKET_COUNT\
  \ = 100000),\n[EmpName] varchar NOT NULL,\n[EmpAddress] varchar NOT NULL,\n[EmpDEPID]\
  \ [int] NOT NULL,\n[EmpBirthDay] [datetime] NULL\n) WITH (MEMORY_OPTIMIZED = ON,\
  \ DURABILITY = SCHEMA_AND_DATA)\n```\n\n`NONCLUSTERED HASH` 索引是一个内存中的哈希表，它使用列值作为键（本例中是\
  \ `EmpID`），并包含一个指向表中实际行的指针列表。每个哈希表由固定数量的槽（哈希桶）组成，每个槽包含一个指向实际行的指针数组。具有相同哈希值的行指针被链接成一个列表，代表它自己的哈希桶。\n\
  \n桶计数必须在创建索引时指定，并影响每个桶中指针列表的长度。不同键值的数量与哈希桶数量的比率代表了预期的平均桶链表长度。链表越长，基于键查找行所需的操作就越多。\n\
  \n桶计数应在索引键中不同值数量的 1 到 2 倍之间。实际上，很难估算列中不同值的数量；但是，如果 `BUCKET_COUNT` 的值在索引列中实际值数量的\
  \ 10 倍以内，你将获得良好的性能。请注意，高估通常比低估要好。如果一段时间后你发现比率不佳，你可以随时用新的桶计数重建索引。\n\n\n\n### 访问内存优化表\n\
  \n内存优化表的另一个优势在于，它们可以像任何其他经典表一样被访问。你可以使用相同的 Transact-SQL 查询来连接内存优化表、列存储表和经典的 Hobbits\
  \ 表。\n\n列存储、内存优化表、JSON 和图形等功能之间的互操作性是 Azure SQL 的核心价值主张之一。任何针对特定场景进行专门设计或优化的功能都将提供相同或相似的访问方法。\n\
  \n内存优化表采用乐观并发控制，每当某个事务更新行时，它都会快速创建该行的新版本。这样，更新数据的事务可以获得其私有的行版本，而不会被读取器阻塞，也不会阻塞其他写入器。\n\
  \n图 9-6 显示了三行：`r1` 有三个版本，`r2` 有两个版本，`r3` 有四个版本。每个版本都是由某个更新该行的事务创建的。注意，行周围没有 8KB\
  \ 边界，因此更新一行不会影响其他行的风险。\n\n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig6_HTML.jpg](img/493913_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n\n每当某个事务更新行时，就会创建新的行版本\n\n这种行版本控制对 Azure SQL 中使用的一些事务隔离级别有影响。基于磁盘的表允许你在确定这是你想要的操作时，读取行的临时未提交值，并绕过锁。这在内存优化表中是不可能的，因为同一行可能存在多个未提交的副本，而\
  \ Azure SQL 不知道你想使用哪个版本。\n\n此外，读取已提交的行也不像使用常规表那样简单。如果你想读取已提交的行，你的事务总是需要检查当前行是否确实是最新版本，或者是否有某个事务已经提交了一个新的公开版本。这可能会带来巨大的性能开销，而你肯定希望避免这种情况。\n\
  \n解决方案是在事务开始时使用行的已提交版本，这看起来像是表数据的快照。在事务开始时与数据快照配合工作的事务隔离级别称为 `SNAPSHOT` 隔离级别。\n\n\
  如果你需要使用 `READ COMMITTED` 或 `READ UNCOMMITTED` 事务隔离级别，你应该显式地在内存优化表上放置快照隔离提示，以仅针对该表覆盖它：\n\
  \n```sql\nSET TRANSACTION ISOLATION LEVEL READ COMMITTED;\nGO\nBEGIN TRANSACTION;\
  \  -- 显式事务。\n-- Employees 是一个内存优化表。\nSELECT * FROM\ndbo.Employees  as o  WITH (SNAPSHOT)\
  \  -- 表提示。\nCOMMIT TRANSACTION;\n```\n\n`WITH(SNAPSHOT)` 提示指示 Azure SQL 将表中的值解释为执行时数据状态的快照。此隔离级别忽略期间可能发生的更改。在其他隔离模式下，此提示将防止出现代码为\
  \ `41368` 的错误。\n\n作为查询提示的替代方法，你可以使用数据库选项，该选项会在需要时自动将内存优化表的隔离级别提升为快照：\n\n```sql\n\
  ALTER DATABASE current\nSET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON;\n```\n\n\
  如果你正确设置了事务隔离级别，那么在查询内存优化表时，可以在 DML 语句中使用，没有太多限制。\n\n### 本机编译代码\n\nAzure SQL 解释用于处理数据的\
  \ T-SQL 代码批处理。这意味着查询批处理（一个或多个 T-SQL 语句）会被解析，然后批处理中的每个查询都被编译成一个执行计划，该计划被分解为运算符（例如，扫描、连接、排序），然后执行这些运算符来获取或更新行。这种查询处理策略在处理内存优化数据时可能是一个巨大的瓶颈。尽管你将数据保存在内存中并使用了最少的锁，但运算符链仍将使用经典机制逐行获取和处理数据。\n\
  \nAzure SQL 允许你使用本机编译模块来提高 T-SQL 代码的性能。你可以将 Azure SQL Database 中的本机编译模块想象为定制的 C\
  \ 程序——是的，没错，就是 C 程序！——它们处理你的数据。Transact-SQL 代码将被预编译为本地 .dll（动态链接库），然后由 Azure SQL\
  \ 引擎执行以操作数据。想象一下，你有一个将内存行作为列表或迭代器访问的 API，并且你想创建一些 C 代码来遍历这些行并应用某些处理（类似于 .NET 技术中的\
  \ LINQ 查询）。这可能是处理数据最快的方式，但编写起来可能很困难。\n\n由于编写 C 模块来操作数据并非易事，为了消除复杂性同时仍让你能够提升性能，Azure\
  \ SQL Database 允许你以声明方式编写访问内存优化表中行的标准 T-SQL 代码。这段 T-SQL 代码将被转换为使用内部 API 访问表行的等效\
  \ C 代码，并编译成本地可执行文件，在 Azure SQL 数据库进程中执行。这样，你仍然使用 T-SQL 代码来表达你想要做什么，而 Azure SQL Database\
  \ 处理了通过 C 语言访问 API 的所有复杂性，从而释放了极致性能。\n\nAzure SQL 允许你编写将被编译成本地可执行文件的 SQL 存储过程、函数和触发器。本机编译代码可能比经典对应物快几个数量级。唯一的限制是它们只能访问内存优化表并使用\
  \ T-SQL 语言的一个子集。\n\n本机编译存储过程是访问和修改内存优化表数据的常用方法。以下示例展示了一个表示本机编译存储过程的模板：\n\n```sql\n\
  CREATE PROCEDURE myProcedure(@p1 int NOT NULL, @p2 nvarchar(5))\nWITH NATIVE_COMPILATION,\
  \ SCHEMABINDING\nAS BEGIN ATOMIC WITH\n(TRANSACTION ISOLATION LEVEL = SNAPSHOT,\n\
  LANGUAGE = N'us_english')\n/* 过程代码放在这里 */\nEND\n```\n\n放置在此过程主体中的任何 T-SQL 代码都将被解析，生成等效的\
  \ C 代码，并编译成一个小的动态链接库 (.dll) 文件。\n\n本机编译过程的两个主要组成部分是：\n\n*   `WITH` 子句：定义过程属性，例如将过程标记为本机编译并指定架构绑定。架构绑定意味着只要存储过程存在，就不能更改它引用的表。这些是唯一必需的选项，但你也可以指定其他选项，例如\
  \ `EXECUTE AS` 等。\n\n*   `ATOMIC` 块：代表一个工作单元，该单元将被处理或取消。在原子块中，你需要指定选项，如隔离级别或语言，因为这些设置将被编译到动态链接库中。\n\
  \nAzure SQL 允许你编写本机编译函数和触发器。以下清单显示了一个本机编译函数的示例。此函数获取格式化为 JSON 文本的字符串，对其进行解析，并将 JSON\
  \ 对象中的属性作为表列返回：\n\n\n## 时态表\n\n我们在第 8 章中已经看到，Azure SQL 不使用原生 JSON 类型。JSON 被存储为 `NVARCHAR`\
  \ 字符串，需要在查询时进行解析。通过使用本机编译函数，我们可以明确定义要使用的解析规则，并创建一个内置的原生 JSON 解析器。\n\n```sql\nCREATE\
  \ FUNCTION PeopleData(@json nvarchar(max))\nRETURNS TABLE\nWITH NATIVE_COMPILATION,\
  \ SCHEMABINDING\nAS RETURN (\nSELECT Title, HireDate, PrimarySalesTerritory,\nCommissionRate,\
  \ OtherLanguages\nFROM OPENJSON(@json)\nWITH(Title nvarchar(50),\nHireDate datetime2,\n\
  PrimarySalesTerritory nvarchar(50),\nCommissionRate float,\nOtherLanguages nvarchar(max)\
  \ AS JSON)\n)\n```\n\n本机编译函数的调用方式与其他任何函数相同。我们可以使用标准的 `CROSS APPLY` 运算符来提供一个值作为函数的参数，并将结果与主行进行连接：\n\
  \n```sql\nselect p.FullName, p.EmailAddress, j.Title, j.CommissionRate\nfrom Application.People\
  \ p\ncross apply PeopleData(p.CustomFields) j\n```\n\n使用本机编译代码访问内存优化表是推荐的方式，因为它提供了最佳的性能和可扩展性。\n\
  \n数据库中的常规表包含数据行的最新版本。每当某个查询更新值时，旧值就会被覆盖。这通常是预期且期望的行为，但在某些情况下，您可能希望能够访问旧值。一些例子可能是\n\
  \n*   错误更正 – 有人意外更改或删除了表中的某一行，您需要纠正或撤销此更改。\n*   历史分析 – 您需要分析表中随时间发生的变化。\n*   审计\
  \ – 您需要查明谁在何时更改了哪些值。\n\n时态表为您的数据添加了时间维度，因此它们可以保留所有已更改数据以及更改发生时间的信息。这完全是自动且透明地完成的，这要归功于一个系统管理的\
  \ `History Table`（历史表）。`History Table` 是一个影子表，其列结构与主表完全相同。每当主表中的某些行（如图 9-7 所示）被更改（删除或更新）时，旧版本就会连同跟踪这些行生命周期的附加信息一起写入历史表。\n\
  \n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig7_HTML.jpg](img/493913_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\n\n时态表自动将将要更新或删除的行发送到单独的历史表中\n\n仅插入或选择数据的查询将只操作主时态表（其中存储的是数据的当前版本），并且不会影响历史表。时态表会修改那些更新或删除数据的查询行为，在主表中的行被更新之前，静默地将当前行值发送到历史表。这个过程完全透明，您可以继续使用标准的\
  \ T-SQL 查询来访问数据。\n\n在更改之前将旧行移动到历史表中，是触发器最常见的应用场景之一。时态表通过自动移动行，为此行为提供了原生支持。在大多数情况下，时态表中使用的方法应比等效的触发器快得多。\n\
  \n### 查询时态数据\n\n将旧行从时态表自动移动到历史表很重要，但这并不是时态表带来的唯一好处。即使您在历史表中拥有所有必需的行版本及其有效期范围，查询历史数据仍然不容易。如果您想查看表在过去某个时间点的样子，您需要从历史表中获取一些旧行值，同时也需要从主表中获取一些行，因为它们可能在当前时间仍然有效。\n\
  \nAzure SQL 使您能够使用特殊语法来选择某个时间点的数据，并为您处理时态查询的复杂性。除了标准的 `SELECT` 查询（将从主表读取当前行）之外，Azure\
  \ SQL 还允许您使用时态运算符（如图 9-8 所示），这些运算符可用于获取过去某个时间点、特定时间段内、某行的所有版本等的行版本。\n\n![../images/493913_1_En_9_Chapter/493913_1_En_9_Fig8_HTML.jpg](img/493913_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\n时态表使您能够为时态查询获取历史数据\n\nAzure SQL Database 提供了几个可应用于时态表的运算符。最常见的是\n\n*\
  \   `FOR SYSTEM_TIME AS OF <datetime>` – 查询将读取表在指定过去日期时间的内容。\n*   `FOR SYSTEM_TIME\
  \ ALL` – 查询将读取过去任何时间点存在的所有行。\n\n还有更多可用的运算符，您可以在本章末尾的参考资源中找到更多细节。根据时态运算符和提供给运算符的值，Azure\
  \ SQL 将决定数据是从主表读取，还是需要从两个表读取，并创建正确的计划来获取和合并来自两个表的结果集。\n\n例如，以下查询将获取在指定时间点具有指定主键值的\
  \ `Employee`：\n\n```sql\nSELECT *\nFROM Employee FOR SYSTEM_TIME AS OF @asOf AS\
  \ History\nWHERE EmployeeID = @EmployeeID\n```\n\nAzure SQL 会将 `@asOf` 变量的日期时间值与\
  \ `Employee` 行被更改的日期进行比较。如果最后一次更改发生在该日期之前，它将从主表获取数据。否则，它将在历史表中找到在指定时间有效的行。\n\n假设有人意外更新了某个\
  \ `Employee` 行。我们需要通过获取在值正确的那个时间点的版本中的值，并覆盖当前值来纠正这个错误。以下查询可以执行此更正：\n\n```sql\nUPDATE\n\
  E\nSET\nPosition = History.Position,\nDepartment = History.Department,\nAddress\
  \ = History.Address,\nAnnualSalary = History.AnnualSalary\nFROM\nEmployee AS E\n\
  JOIN\nEmployee FOR SYSTEM_TIME AS OF @asOf AS History\nON E.EmployeeID = History.EmployeeID\n\
  WHERE\nE.EmployeeID = @EmployeeID\n```\n\n我们正在更新 `Employee` 表中具有指定 `Employee` 主键值\
  \ (`@EmployeeID`) 的一行。我们使用 `FOR SYSTEM_TIME AS OF` 子句，将该行与同一主键值在指定时间 (`@asOf`) 的行版本进行连接。然后，我们只是用有效版本中的值覆盖了最近版本中的值。请注意，错误的值在被覆盖时并非没有留下痕迹。当错误被纠正后，错误的值会被移入历史表，您可以追踪它们是何时被纠正的，以及错误是什么。历史表是可信的单一来源，您可以在其中找到关于时态表上所做任何更改的信息。\n\
  \n\n### 配置时态表\n\n时态表与历史表是相互独立的。你可以通过添加不同的索引来分别配置和优化它们。可用于提升时态表性能的最佳配置方案是：\n\n* \
  \  包含当前数据的表，如有可能，应实现为内存优化的架构和数据表。\n*   历史表应使用 `聚集列存储索引` 实现。\n\n如果你使用的是 `业务关键型` 服务层级，内存优化表将在插入、更新和删除数据的工作负载中为你提供最佳性能，而这正是包含当前行的表的主要应用场景。如果你认为所有行无法全部装入内存，则不应使用内存优化表，因为如前面章节所述，将所有行保留在内存中是内存优化表的要求。\n\
  \n`列存储` 格式是历史表的最优解决方案，因为你可以拥有许多具有相同值的列单元格。在很多情况下，你可能只更新少数几列，而其他单元格保持不变。时态表会将整个前一行物理复制到历史表中，这意味着历史表中不同版本行里的未更改单元格将具有相同的值。如果\
  \ `列存储` 格式能够用一个描述该值出现行范围的单一标记来替换一组具有相同值的单元格，那么它就能实现最高效的压缩。在此场景下，在历史表上创建的 `聚集列存储索引`\
  \ 可以提供极高的压缩率，并提升时态表上的历史分析性能。\n\n假设你有一个用于存储历史数据的 `DepartmentHistory` 表，以下索引可能会提升在时态历史表上运行的查询性能：\n\
  \n```\nCREATE CLUSTERED COLUMNSTORE INDEX cci_DepartmentHistory\nON DepartmentHistory;\n\
  CREATE NONCLUSTERED INDEX IX_DepartmentHistory_ID_PERIOD_COLUMNS\nON DepartmentHistory\
  \ (SysEndTime, SysStartTime, DeptID);\n```\n\n`聚集列存储索引` 将在查询扫描大量历史数据时，提供高压缩率并增强分析能力。在范围列和主键上创建非聚集索引，对于提升那些访问历史中特定时间点某些行值的查询性能（例如，使用\
  \ `FOR SYSTEM_TIME AS OF` 子句）将非常有帮助。根据你运行的历史查询类型，你可能需要添加第一个、第二个或同时添加这两个索引。\n\n另一项重要的优化是数据库历史记录保留策略。你可以定义历史数据应保存在历史表中的时长。时态表允许你使用\
  \ `HISTORY_RETENTION_PERIOD` 设置来定义历史记录的生存期：\n\n```\nALTER TABLE dbo.WebsiteUserInfo\n\
  SET (SYSTEM_VERSIONING = ON (HISTORY_RETENTION_PERIOD = 9 MONTHS));\n```\n\n此设置意味着，历史表中所有超过\
  \ 9 个月的记录将被自动删除，以避免无限增长。你还可以使用以下数据库属性全局启用或禁用这些规则：\n\n```\nALTER DATABASE current\n\
  SET TEMPORAL_HISTORY_RETENTION ON\n```\n\n此数据库级选项使你能够为数据库中的所有表开启或关闭保留策略。\n\n## 如果你想了解更多\n\
  \n本章描述的 `列存储` 表和索引、内存优化表以及时态表，使你能够从数据库中获取更多价值。前一章描述的通用型解决方案适用于大多数场景；然而，如果你能识别出工作负载的具体特性，本章所述的表和索引将使你能够将应用程序的性能提升数个数量级：\n\
  \n*   列存储索引：概述 – [`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview)\n\
  *   列存储索引 - 数据加载指南 – [`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-data-loading-guidance)\n\
  *   开始使用列存储实现实时操作分析 – [`https://docs.microsoft.com/sql/relational-databases/indexes/get-started-with-columnstore-for-real-time-operational-analytics`](https://docs.microsoft.com/sql/relational-databases/indexes/get-started-with-columnstore-for-real-time-operational-analytics)\n\
  *   Niko Neugebauer 博客列存储系列 – [`www.nikoport.com/columnstore/`](http://www.nikoport.com/columnstore/)\n\
  *   内存中 OLTP 与内存优化 – [`https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/in-memory-oltp-in-memory-optimization`](https://docs.microsoft.com/sql/relational-databases/in-memory-oltp/in-memory-oltp-in-memory-optimization)\n\
  *   内存优化的 tempdb 元数据 – [`https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database#memory-optimized-tempdb-metadata`](https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database%2523memory-optimized-tempdb-metadata)\n\
  *   使用内存中 OLTP 优化 JSON 处理 – [`https://docs.microsoft.com/sql/relational-databases/json/optimize-json-processing-with-in-memory-oltp`](https://docs.microsoft.com/sql/relational-databases/json/optimize-json-processing-with-in-memory-oltp)\n\
  *   时态表 – [`https://docs.microsoft.com/sql/relational-databases/tables/temporal-tables`](https://docs.microsoft.com/sql/relational-databases/tables/temporal-tables)\n\
  *   查询系统版本化时态表中的数据 – [`https://docs.microsoft.com/sql/relational-databases/tables/querying-data-in-a-system-versioned-temporal-table`](https://docs.microsoft.com/sql/relational-databases/tables/querying-data-in-a-system-versioned-temporal-table)\n\
  *   使用 M 系列 Azure SQL 数据库扩展 IoT 工作负载 – [`https://techcommunity.microsoft.com/t5/azure-sql-database/scaling-up-an-iot-workload-using-an-m-series-azure-sql-database/ba-p/1106271#`](https://techcommunity.microsoft.com/t5/azure-sql-database/scaling-up-an-iot-workload-using-an-m-series-azure-sql-database/ba-p/1106271)\n\
  \n脚注 1   2\n\n\n# 10. 监控与调试\n\nAzure SQL 及其底层的 SQL Server 查询引擎在业界广为人知，通常需要较低的管理门槛，即可让应用程序在大多数条件下、面对不同规模和形态的数据时，获得良好的性能和可靠性。\n\
  \n尽管如此，应用开发人员理解 Azure SQL 中查询处理的基础知识和内部机制，以及了解在开发和生产阶段可用于监控和排查性能问题的工具与功能，仍然非常重要。一般来说，掌握这些功能在两大主要场景中对我们至关重要：\n\
  \n1.  **理解系统在给定工作负载下的行为**：这意味着在负载测试或生产期间，观察主要的性能和可用性指标，以确保系统正常运行并能处理给定的工作负载。\n2.\
  \  **深入调查可能已发生或正在发生的特定活动**：如果上一项的结果显示出某些关键行为，则需要进行深入调查。\n\n前者是一个持续的、长期的监控场景，对于确保您的解决方案能“保持灯火通明”（稳定运行）至关重要，通常需要特定的特性，比如存储和分析海量数据点的能力，以及在关键指标超过某些阈值时触发警报的能力。在\
  \ Azure 平台上，所有服务都有一个共同的骨干用于收集给定解决方案所有组件发出的诊断信息，称为**Azure Monitor**。所有服务都可以配置为异步地将日志和指标发送到\
  \ Azure Monitor，然后 Azure Monitor 可以根据您的需求，将这些信息重定向到近实时选项（通过在 Azure 门户中可视化指标或将数据推送到\
  \ Azure Event Hub 实例进行进一步处理和警报）和更长期的分析选项（如 Azure Blob Storage 或 Log Analytics）。\n\
  \n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figa_HTML.jpg](img/493913_1_En_10_Figa_HTML.jpg)\n\
  \n您可以通过查看此链接的官方文档获取有关此特定场景的更多详细信息：[`https://aka.ms/asdbmto`](https://aka.ms/asdbmto)。\n\
  \n另一个主要场景则与即时诊断和故障排查调查相关，当特定问题发生时，您可以执行这些调查，这得益于 Azure SQL 引擎提供的广泛检测能力。事实上，从连接和会话管理，到查询处理和存储引擎，服务的每一个内部子系统都在发出丰富而详细的诊断信息集，我们作为开发人员可以利用这些信息来理解单个查询是如何执行的，或者像内存管理或资源治理这样的子系统是如何运行的。\n\
  \n作为开发人员，我们不一定需要理解服务内部运作的每一个细节，但了解可用的基本工具和技术以确保我们能够调查查询和工作负载的性能，以及了解在使用 Azure SQL\
  \ 时如何使我们的应用程序更高效，是相当重要的。\n\n## 动态管理视图 (DMV)\n\n动态管理视图（和函数）是一种针对 Azure SQL 端点执行 T-SQL\
  \ 查询并返回状态信息的方式，这些信息可用于监控 Azure SQL 服务器或数据库实例的健康状况、诊断问题以及调整性能。\n\n如前所述，SQL Server\
  \ 引擎具有高度的可检测性，捕获了关于各种子系统如何工作的海量信息，从与底层操作系统和硬件的集成，到查询如何执行。所有这些细节都维护在数据库进程空间内的内存结构中（我们将在本章后面讨论最近随着查询存储的出现而发生的变化），并通过一层系统视图和函数提供前端访问，可以通过常规\
  \ T-SQL 命令进行查询。执行查询的登录名需要对选定的 DMV 具有`SELECT`权限，并且具有`VIEW SERVER STATE`（对于 Azure\
  \ SQL 托管实例）或`VIEW DATABASE STATE`（对于 Azure SQL 数据库）权限。我们可以通过执行以下命令来授予对给定实例的访问权限：\n\
  \n```\nGRANT VIEW DATABASE STATE TO database_user;\n```\n\nAzure SQL 支持一部分动态管理视图来诊断性能问题，这些问题可能由阻塞或长时间运行的查询、资源瓶颈、不良的查询计划等引起。在\
  \ SQL Server 实例和 Azure SQL 托管实例中，动态管理视图返回服务器状态信息。在 Azure SQL 数据库中，它们仅返回有关您当前逻辑数据库的信息。\n\
  \n虽然有数百个这样的视图和函数可用，但我们应该真正关注三个主要类别：\n\n*   与数据库相关的动态管理视图（前缀为 `sys.dm_db_*`）\n* \
  \  与执行相关的动态管理视图（前缀为 `sys.dm_exec_*`）\n*   与事务相关的动态管理视图（前缀为 `sys.dm_tran_*`）\n\n\
  让我们从一些基本用例开始，这些用例在调查数据库实例情况时可能很常见。首先，您可能想了解正在运行应用程序的给定实例的当前资源利用率。您可以打开您首选的客户端工具（例如，Azure\
  \ Data Studio 或 SQL Server Management Studio），指向您的数据库，并执行此查询：\n\n```\nSELECT * FROM\
  \ sys.dm_db_resource_stats ORDER BY end_time DESC;\n```\n\n您将得到的结果类似于以下内容：\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figb_HTML.jpg](img/493913_1_En_10_Figb_HTML.jpg)\n\
  \n基本上，此视图返回过去一小时内数据库实例资源消耗的关键指标，粒度为 15 秒。如果这些指标中任何一个接近 100%，您通常可以选择扩展数据库服务或计算层，或者更可能的是，更深入地研究资源利用率，以了解是否有办法使您的工作负载更高效。\n\
  \n假设，例如，您的 CPU 利用率达到了上限：一个好的下一步是查看哪些是消耗 CPU 最多的查询，以了解是否有任何方式可以改进它们。\n\n出于演示目的，我们将清除测试实例的过程缓存，以免被过去可能运行过的数百个其他查询干扰，并将使用此脚本执行一个简单的查询：\n\
  \n```\n--!!! 仅用于测试目的，请勿在生产环境中执行!!!--\nALTER DATABASE SCOPED CONFIGURATION CLEAR\
  \ PROCEDURE_CACHE;\n-- 执行一个简单查询\nSELECT * FROM [Sales].[Orders] WHERE CustomerID=832\n\
  ```\n\n在同一连接或不同的连接上，我们现在可以运行以下诊断查询，针对几个 `sys.dm_exec_*` DMV：\n\n\n# 使用动态管理视图监控 Azure\
  \ SQL 查询性能\n\n```sql\n--- 返回此数据库中消耗 CPU 时间最多的前 25 个查询\nSELECT TOP 25\nqs.query_hash,\n\
  qs.execution_count,\nREPLACE(REPLACE(LEFT(st.[text], 512), CHAR(10),''), CHAR(13),'')\
  \ AS query_text,\nqs.total_worker_time,\nqs.min_worker_time,\nqs.total_worker_time/qs.execution_count\
  \ AS avg_worker_time,\nqs.max_worker_time,\nqs.min_elapsed_time,\nqs.total_elapsed_time/qs.execution_count\
  \ AS avg_elapsed_time,\nqs.max_elapsed_time,\nqs.min_logical_reads,\nqs.total_logical_reads/qs.execution_count\
  \ AS avg_logical_reads,\nqs.max_logical_reads,\nqs.min_logical_writes,\nqs.total_logical_writes/qs.execution_count\
  \ AS avg_logical_writes,\nqs.max_logical_writes,\nCASE WHEN CONVERT(nvarchar(max),\
  \ qp.query_plan) LIKE N'%%' THEN 1 ELSE 0 END AS missing_index,\nqs.creation_time,\n\
  qp.query_plan,\nqs.*\nFROM\nsys.dm_exec_query_stats AS qs\nCROSS APPLY\nsys.dm_exec_sql_text(plan_handle)\
  \ AS st\nCROSS APPLY\nsys.dm_exec_query_plan(plan_handle) AS qp\nWHERE\nst.[dbid]=db_id()\
  \ and st.[text] NOT LIKE '%sys%'\nORDER BY\nqs.total_worker_time DESC\nOPTION (RECOMPILE);\n\
  ```\n\n该查询返回消耗 CPU 时间最多的前 25 个查询（在我们的示例中只有一个），包含多个属性，如下图所示：\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figc_HTML.jpg](img/493913_1_En_10_Figc_HTML.jpg)\n\
  \n具体来说，我们获取了一个二进制哈希值，用于标识所有具有相同“形状”的查询（可能仅参数值等有所不同），一个指示该查询执行次数的值，然后是查询文本本身。接下来是一长串非常重要的指标，显示了对关键资源（如\
  \ CPU（工作线程）时间、数据页读写等）的总计、最小、平均和最大使用情况。通过更改排序列，我们可以查看哪些查询执行得更频繁（通过 `execution_count`），或者哪些查询读取或写入了更多的数据页，等等。\n\
  \n这个例子仅仅触及了我们可以使用动态管理视图所做事情的冰山一角，还有更多功能。我们可以调查和识别因表或索引结构设计不佳导致的性能瓶颈，监控数据库和对象大小，或者解决并发用户之间的锁定和阻塞问题等等。有关可能实现的更多详细信息，我们建议您查阅\
  \ Azure SQL 官方文档：[`https://aka.ms/asdbmwd`](https://aka.ms/asdbmwd)。\n\n## 执行计划\n\
  \n在我们之前的例子中，通过这些动态管理视图检索到的列之一是返回查询执行计划的 XML 片段：\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figd_HTML.jpg](img/493913_1_En_10_Figd_HTML.jpg)\n\
  \n在 SQL Server Management Studio 中单击该列，会打开一个新窗口，显示类似以下内容：\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Fige_HTML.jpg](img/493913_1_En_10_Fige_HTML.jpg)\n\
  \n这是用于解析该特定查询的查询执行计划的图形化表示，显示了 Azure SQL 引擎为向客户端返回结果所采取的所有详细步骤。Azure SQL 有一个内存池，用于存储执行计划和数据缓冲区。当执行任何\
  \ Transact-SQL 语句时，数据库引擎首先会在计划缓存中查找，以验证是否存在针对同一 Transact-SQL 语句的现有执行计划。如果 Transact-SQL\
  \ 语句在字符级别上与之前执行的、具有缓存计划的 Transact-SQL 语句完全匹配，则视为存在。Azure SQL 会重用它找到的任何现有计划，从而节省了重新编译\
  \ Transact-SQL 语句的开销。如果不存在执行计划，Azure SQL 会为查询生成一个新的执行计划，尝试在合理的时间间隔内找到资源利用率成本最低的计划。\n\
  \n理解此执行计划是如何创建和执行的，对于确保我们应用程序生成的工作负载针对我们的数据模型和索引策略进行了优化，或者识别出需要进行的优化至关重要。\n\n> **注意**\n\
  > 许多现代数据库使用更专业的术语 DAG（有向无环图）而非用户友好的术语“执行计划”。例如，如果您已有使用 Apache Spark 的经验，那么 DAG 和执行计划基本上是同一回事。\n\
  \n根据经验法则，通过 Management Studio 可视化的执行计划应按*从右到左、从上到下*的顺序解释，以确定它们的执行顺序。在我们前面的例子中，第一步是一个\
  \ Seek 操作符，它使用在 `Orders` 表的 `CustomerID` 列上创建的非聚集索引来查找一个或多个值为 832 的行。由于查询引擎使用的索引可能不包含\
  \ select 列表中的所有列（我们在那里错误地使用了星号而不是完整的列列表），执行计划中的下一步是循环遍历第一个操作符检索到的所有行，并对每一行执行一个 Lookup\
  \ 操作符，该操作符将使用 Seek 操作符检索到的聚集索引键，从 `Orders` 表上的聚集索引（`PK_Sales_Orders`）中读取所有其他列。\n\
  \n通过将鼠标悬停在给定的操作符上，我们可以获得有关该步骤的大量信息，例如执行模式（行模式或批处理模式）或该对象的底层存储类型（行存储 vs. 列存储），以及与之关联的\
  \ CPU 和 I/O 成本的详细描述。\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figf_HTML.jpg](img/493913_1_En_10_Figf_HTML.jpg)\n\
  \n例如，我们可以看到 Key Lookup 操作符占整个查询成本的 99%，并且它被执行了 127 次（与第一个 Seek 操作符过滤的行数相同）。\n\n\n\
  \n## 查询优化与执行计划分析\n\n作为开发者，我们可以开始思考如何通过仅选择真正需要的列来提高查询效率，并可能将这些列作为包含列添加到第一个操作符使用的非聚集索引中。这基本上可以完全消除这个昂贵的操作符，从而降低整体查询成本。让我们试试看！通过精确执行我们刚才描述的步骤，新的查询计划确实不再包含\
  \ `Key Lookup` 操作符，而且查看整体子树成本，它显然降到了原来的百分之一：\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figg_HTML.jpg](img/493913_1_En_10_Figg_HTML.jpg)\n\
  \n通过从 DMV 提取的指标，我们可以注意到执行时间不到原始查询的一半，逻辑页读取次数从 369 次减少到 5 次，这表明从存储读取所需的 I/O 操作更少，缓冲池中占用的空间也更少：\n\
  \n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figh_HTML.jpg](img/493913_1_En_10_Figh_HTML.jpg)\n\
  \n逻辑页不过是我们之前章节讨论过的页概念。每次 Azure SQL 需要读取处理查询或将结果返回给最终用户所需的数据时，它都会使用一次 I/O 操作来读取整个\
  \ 8KB 的页。物理读取是指对尚未在内存中的页执行的读取操作——因此相当昂贵。逻辑读取是指对已在缓冲池（内存缓存）中的页执行的读取操作。如果一个页不在缓冲池中，它将从磁盘读取并添加到池中。因此，逻辑读取次数总是大于或等于物理读取次数。由于一个页可能被读取多次，逻辑页读取次数是衡量查询总体\
  \ I/O 消耗的良好指标。由于 I/O 是数据库中最昂贵的操作，您通常希望尽可能减少 I/O，在读写性能之间找到适合您的完美平衡。\n\n使用 DMV 提取影响\
  \ Azure SQL 数据库的最昂贵查询的执行计划，是研究应用程序性能的好方法。在 SQL Server Management Studio 或 Azure\
  \ Data Studio 等客户端工具中，您也可以在运行查询时通过选择 Management Studio 中的“包含实际执行计划”工具栏按钮（或使用 `Ctrl+M`\
  \ 快捷键）或单击 Data Studio 中的“解释”按钮来获取相同的信息。\n\n我们在此描述的内容代表了您可以采取的基础方法，用以理解 Azure SQL\
  \ 引擎如何执行您的查询，以及如何优化工作负载以减少无用的资源消耗并提高整体性能。\n\nAzure SQL 引擎创建和执行查询计划的方式是一个复杂而迷人的主题；如果您想了解更多，请阅读此处的官方文档：[`https://aka.ms/qpag`](https://aka.ms/qpag)。\n\
  \n## 查询存储\n\n我们之前提到过，表示 Azure SQL 数据库状态并作为动态管理视图和函数数据来源的所有内部数据结构都保存在数据库进程内存中，因此当实例重启或发生计划内或计划外故障转移时，所有诊断信息都会丢失。自\
  \ SQL Server 2016 引入查询存储功能后，现在 Azure SQL 默认可以在重启后持久化大部分诊断信息，因为查询存储已在整个云数据库舰队中启用。此功能实际上为您提供了有关查询计划选择和性能的洞察，并通过帮助您快速找到由查询计划更改引起的性能差异来简化性能故障排除。查询存储自动捕获查询、计划和运行时统计信息的历史记录并保留以供您审查。它按时间窗口分离数据，因此您可以查看数据库使用模式并了解服务器上查询计划更改发生的时间。查询存储有效地就像一个飞行数据记录器，不断收集与查询和计划相关的编译和运行时信息。查询相关数据持久保存在内部表中，并通过一组视图呈现给用户。\n\
  \n它基本上包含三个主要存储桶：\n*   **计划存储**，包含执行计划详细信息\n*   **运行时统计信息存储**，其中保存执行统计信息\n*   **等待统计信息存储**，包含有关等待统计信息的历史数据\n\
  \n正如我们之前讨论的，一旦创建，Azure SQL 中任何特定查询的执行计划都可能因统计信息更改、架构更改、索引更改等随时间而变化。过程缓存存储最新的执行计划，在内存压力下，计划也可能被逐出缓存。如果新创建的执行计划由于某种原因被证明是次优的，通常很难理解是什么导致了这种更改。通过为给定查询保留多个执行计划版本，查询存储可以帮助弄清楚发生了什么，并且还可以强制执行策略以指示查询处理器使用特定的执行计划。这被称为计划强制，其中应用诸如\
  \ `USE PLAN` 查询提示之类的机制，而无需更改应用程序中的查询语法。\n\n查询存储收集 DML 语句（如 `SELECT`、`INSERT`、`UPDATE`、`DELETE`、`MERGE`\
  \ 和 `BULK INSERT`）的计划。\n\n性能故障排除期间的另一个重要信息来源是与系统等待状态相关的统计信息的可用性，基本上是收集 Azure SQL\
  \ 响应用户查询所花费特定时间的底层原因。在查询存储之前，等待统计信息通常仅在数据库实例级别可用，并且很难将其与特定查询关联起来。\n\n让我们看看查询存储如何收集其数据：当查询首次编译时，查询文本和初始计划会发送到查询存储；如果查询被重新编译，则会更新。如果创建了新计划，则会将其作为该查询的新条目添加，并保留之前的计划及其运行时执行统计信息。每次查询执行时，运行时统计信息都会发送到查询存储，并在当前活动时间间隔内在计划级别进行聚合。\n\
  \n在编译和检查重新编译阶段，Azure SQL 会检测查询存储中是否存在应用于当前运行查询的计划，以及是否存在与缓存中计划不同的强制计划，查询将被重新编译（这与对查询应用\
  \ `USE PLAN` 提示的方式相同）。这对用户应用程序是完全透明的。下图描述了查询处理器和查询存储之间的交互：\n（此处应插入交互图描述）\n\n\n#\
  \ Azure SQL 中的查询存储功能\n\n## 概述\n\n如前所述，查询存储在 Azure SQL 中默认启用且无法关闭。其默认配置针对持续数据收集进行了优化，但你仍然可以控制一些配置参数，例如最大存储大小（默认\
  \ 100MB）或用于聚合查询执行统计信息的时间间隔长度（默认 60 分钟）。如果没有特定需求，例如在希望加速处理的短期故障排除会话期间，我们建议在大多数使用场景中保留默认设置。\n\
  \n查询存储的内部信息通过一系列视图呈现，这些视图可用于你的诊断查询，以了解 Azure SQL 在你的特定工作负载下的行为。下图展示了查询存储视图及其逻辑关系，其中编译时信息以蓝色实体显示：\n\
  \n![查询存储视图关系图](img/493913_1_En_10_Figi_HTML.jpg)\n\n## 查询存储视图\n\n视图名称是直观的，但让我们浏览一些主要视图，看看它们如何有助于监控和排查我们的工作负载：\n\
  \n*   `sys.query_store_query_text` 报告针对数据库执行的唯一查询文本，其中批处理中的每个语句都会生成一个单独的查询文本条目。\n\
  *   `sys.query_context_settings` 呈现查询执行时影响执行计划的唯一设置组合。\n*   `sys.query_store_query`\
  \ 显示在查询存储中被单独跟踪和强制的查询条目。\n*   `sys.query_store_plan` 返回带有编译时统计信息的查询估计计划。存储的计划等同于使用\
  \ `SET SHOWPLAN_XML ON` 获取的计划。\n*   `sys.query_store_runtime_stats_interval` 显示为每个执行计划在自动生成的时间窗口（时间间隔）中聚合的运行时统计信息。我们可以使用\
  \ `ALTER DATABASE SET` 语句中的 `INTERVAL_LENGTH_MINUTES` 来控制时间间隔的大小。\n*   `sys.query_store_runtime_stats`\
  \ 报告已执行计划的聚合运行时统计信息。捕获的指标以四种统计函数的形式呈现：平均值、最小值、最大值和标准差。\n\n通过查询这些视图，你可以快速获取有关工作负载执行情况的详细信息；以下是一些示例。\n\
  \n## 查询示例\n\n此查询返回数据库上最后执行的十个查询：\n\n```sql\nSELECT TOP 10 qt.query_sql_text, q.query_id,\n\
  qt.query_text_id, p.plan_id, rs.last_execution_time\nFROM sys.query_store_query_text\
  \ AS qt\nJOIN sys.query_store_query AS q\nON qt.query_text_id = q.query_text_id\n\
  JOIN sys.query_store_plan AS p\nON q.query_id = p.query_id\nJOIN sys.query_store_runtime_stats\
  \ AS rs\nON p.plan_id = rs.plan_id\nORDER BY rs.last_execution_time DESC;\n```\n\
  \n这些是在过去一小时内执行时间最长的查询：\n\n```sql\nSELECT TOP 10 rs.avg_duration, qt.query_sql_text,\
  \ q.query_id,\nqt.query_text_id, p.plan_id, GETUTCDATE() AS CurrentUTCTime,\nrs.last_execution_time\n\
  FROM sys.query_store_query_text AS qt\nJOIN sys.query_store_query AS q\nON qt.query_text_id\
  \ = q.query_text_id\nJOIN sys.query_store_plan AS p\nON q.query_id = p.query_id\n\
  JOIN sys.query_store_runtime_stats AS rs\nON p.plan_id = rs.plan_id\nWHERE rs.last_execution_time\
  \ > DATEADD(hour, -1, GETUTCDATE())\nORDER BY rs.avg_duration DESC;\n```\n\n这些是在过去\
  \ 24 小时内执行了更多 I/O 读取的查询：\n\n```sql\nSELECT TOP 10 rs.avg_physical_io_reads, qt.query_sql_text,\n\
  q.query_id, qt.query_text_id, p.plan_id, rs.runtime_stats_id,\nrsi.start_time, rsi.end_time,\
  \ rs.avg_rowcount, rs.count_executions\nFROM sys.query_store_query_text AS qt\n\
  JOIN sys.query_store_query AS q\nON qt.query_text_id = q.query_text_id\nJOIN sys.query_store_plan\
  \ AS p\nON q.query_id = p.query_id\nJOIN sys.query_store_runtime_stats AS rs\nON\
  \ p.plan_id = rs.plan_id\nJOIN sys.query_store_runtime_stats_interval AS rsi\nON\
  \ rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id\nWHERE rsi.start_time\
  \ >= DATEADD(hour, -24, GETUTCDATE())\nORDER BY rs.avg_physical_io_reads DESC;\n\
  ```\n\n你可能已经开始理解这个特性在监控和故障排除方面开启了哪些可能性，对吧？现在，让我们来看一些更复杂的场景，在这些场景中，使用查询存储特性可以在我们的性能调查中提供帮助。\n\
  \n\n# 工作中的查询存储\n\n假设你的应用程序性能在过去一周内有所下降，你想了解这是否可能与数据库中的某些更改有关。\n\n借助查询存储，你可以基于不同的时间窗口（例如近期时段（过去\
  \ 4 小时）与上周一切性能表现良好时的情况）来比较查询执行情况：\n\n```sql\n--- \"近期\"工作负载 - 过去 4 小时\nDECLARE @recent_start_time\
  \ datetimeoffset;\nDECLARE @recent_end_time datetimeoffset;\nSET @recent_start_time\
  \ = DATEADD(hour, -4, SYSUTCDATETIME());\nSET @recent_end_time = SYSUTCDATETIME();\n\
  --- \"历史\"工作负载 – 上周\nDECLARE @history_start_time datetimeoffset;\nDECLARE @history_end_time\
  \ datetimeoffset;\nSET @history_start_time = DATEADD(day, -14, SYSUTCDATETIME());\n\
  SET @history_end_time = DATEADD(day, -7, SYSUTCDATETIME());\nWITH\nhist AS\n(\n\
  SELECT\np.query_id query_id,\nROUND(ROUND(CONVERT(FLOAT, SUM(rs.avg_duration * rs.count_executions))\
  \ * 0.001, 2), 2) AS total_duration,\nSUM(rs.count_executions) AS count_executions,\n\
  COUNT(distinct p.plan_id) AS num_plans\nFROM sys.query_store_runtime_stats AS rs\n\
  JOIN sys.query_store_plan AS p ON p.plan_id = rs.plan_id\nWHERE (rs.first_execution_time\
  \ >= @history_start_time\nAND rs.last_execution_time < @history_end_time)\nOR (rs.first_execution_time\
  \ < @history_end_time)\nGROUP BY p.query_id\n),\nrecent AS\n(\nSELECT\np.query_id\
  \ query_id,\nROUND(ROUND(CONVERT(FLOAT, SUM(rs.avg_duration * rs.count_executions))\
  \ * 0.001, 2), 2) AS total_duration,\nSUM(rs.count_executions) AS count_executions,\n\
  COUNT(distinct p.plan_id) AS num_plans\nFROM sys.query_store_runtime_stats AS rs\n\
  JOIN sys.query_store_plan AS p ON p.plan_id = rs.plan_id\nWHERE  (rs.first_execution_time\
  \ >= @recent_start_time\nAND rs.last_execution_time < @recent_end_time)\nOR (rs.first_execution_time\
  \ < @recent_end_time)\nGROUP BY p.query_id\n)\nSELECT\nresults.query_id AS query_id,\n\
  results.query_text AS query_text,\nresults.additional_duration_workload AS additional_duration_workload,\n\
  results.total_duration_recent AS total_duration_recent,\nresults.total_duration_hist\
  \ AS total_duration_hist,\nISNULL(results.count_executions_recent, 0) AS count_executions_recent,\n\
  ISNULL(results.count_executions_hist, 0) AS count_executions_hist\nFROM\n(\nSELECT\n\
  hist.query_id AS query_id,\nqt.query_sql_text AS query_text,\nROUND(CONVERT(float,\
  \ recent.total_duration/\nrecent.count_executions-hist.total_duration/hist.count_executions)\n\
  *(recent.count_executions), 2) AS additional_duration_workload,\nROUND(recent.total_duration,\
  \ 2) AS total_duration_recent,\nROUND(hist.total_duration, 2) AS total_duration_hist,\n\
  recent.count_executions AS count_executions_recent,\nhist.count_executions AS count_executions_hist\n\
  FROM hist\nJOIN recent\nON hist.query_id = recent.query_id\nJOIN sys.query_store_query\
  \ AS q\nON q.query_id = hist.query_id\nJOIN sys.query_store_query_text AS qt\nON\
  \ q.query_text_id = qt.query_text_id\n) AS results\nWHERE additional_duration_workload\
  \ > 0\nORDER BY additional_duration_workload DESC\nOPTION (MERGE JOIN);\n```\n\n\
  此查询主要计算哪些查询相比于之前的执行时段引入了额外的持续时间，并返回诸如近期与历史的执行次数和总持续时间等信息。\n\n## 比较与强制执行计划\n\n对于显示出性能回退的查询，你应该检查这些查询近期是否使用了与之前执行更快时不同的查询计划。你可以通过以下存储过程，尝试为该查询强制指定一个特定的执行计划来修复问题：\n\
  \n```sql\nEXEC sp_query_store_force_plan @query_id = 48, @plan_id = 49;\n```\n\n\
  如果你希望撤销此强制操作，并让 Azure SQL 重新计算执行计划，可以通过调用以下命令来取消强制：\n\n```sql\nEXEC sp_query_store_unforce_plan\
  \ @query_id = 48, @plan_id = 49;\n```\n\n需要注意的是，对于这类优化，你无需以任何方式更改你的应用程序代码。\n\n##\
  \ 使用可视化工具\n\n如果你更喜欢使用可视化工具而非运行 T-SQL 查询来进行这些调查，SQL Server Management Studio 提供了一系列用户界面页面来与查询存储信息进行交互。你可以展开数据库中的\
  \ `查询存储` 节点来查看支持的场景：\n\n![查询存储节点](img/493913_1_En_10_Figk_HTML.jpg)\n\n例如，如果你点击\
  \ `性能回退的查询`，默认将显示过去一小时内性能回退最严重的前 25 个查询列表，并且你可以根据 CPU 时间、IO 和内存等多个维度对数据进行切片和切块分析，以找到所需信息。从同一用户界面中，你还可以查看给定查询的可用查询计划，并通过点击\
  \ `强制计划` 按钮来强制使用最优的计划。就是这么简单！\n\n![性能回退查询用户界面](img/493913_1_En_10_Figl_HTML.jpg)\n\
  \n## 分析等待统计\n\n调查应用程序整体性能的另一个有趣场景是查看给定数据库的 `查询等待统计信息`。\n\n在数据库树中点击该选项将弹出一个新窗口，其中最重要的等待状态类别会按总等待时间排序显示在图表中，如下图所示：\n\
  \n![查询等待统计信息](img/493913_1_En_10_Figm_HTML.jpg)\n\n然后，你可以深入分析影响最大的类别，系统将显示导致这些等待状态的前几个查询及其相关的查询计划，这样你就能够为你的特定工作负载强制使用那些优化程度更高的计划：\n\
  \n![等待类别详细信息](img/493913_1_En_10_Fign_HTML.jpg)\n\n其他类似的场景包括 `资源消耗最高的查询` 或 `变化幅度最大的查询`，你可以遵循类似的路径进行分析。\n\
  \n## 云平台集成：查询性能见解\n\n最后但同样重要的是，Azure SQL 还提供了查询性能见解，它是 Azure 门户体验的一部分，基于查询存储数据为单一数据库和池化数据库提供智能查询分析工具。它有助于识别工作负载中资源消耗最高和运行时间最长的查询。这有助于你找到需要优化的查询，以提高整体工作负载性能，并高效利用你所付费的资源。虽然\
  \ SQL Server Management Studio 和 Azure Data Studio 可用于获取所有查询的详细资源消耗情况，但查询性能见解为你提供了一种从\
  \ Azure 门户直接出发的快捷高效方式，来确定这些查询对数据库整体资源使用的影响。\n\n![Azure 门户中的查询性能见解](img/493913_1_En_10_Figo_HTML.jpg)\n\
  \n你仍然可以深入到单个查询级别，获取诸如资源消耗或查询在给定时间窗口内执行次数等详细信息，但你也可以与 `数据库顾问` 提供的性能建议进行交互。`数据库顾问`\
  \ 是 Azure SQL 中的一项功能，它会学习你的数据库使用情况并提供定制化的建议，以实现性能最大化。这些建议涵盖查询计划强制、索引创建和删除等方面。通过在以下页面中点击\
  \ `自动化` 按钮，你还可以自动化执行这些建议，让 Azure SQL 始终保持你的数据库处于最佳状态：\n\n![数据库顾问建议](img/493913_1_En_10_Figp_HTML.jpg)\n\
  \n要了解更多关于 Azure SQL 这些有趣功能的详细信息，我们建议你查看官方文档：[`https://aka.ms/daipr`](https://aka.ms/daipr)。\n\
  \n\n## 在 SQL 中引发和捕获异常\n\nTransact-SQL 中的错误处理与传统编程语言中的异常处理类似。你可以将一组 Transact-SQL\
  \ 语句包装在 `TRY` 块中，如果发生错误，控制权会传递给后续的 `CATCH` 块，其他语句将在那里执行。Azure SQL 中的每个错误都与一个给定的严重性级别相关联，`TRY...CATCH`\
  \ 构造会捕获所有严重性高于 10 且不会关闭数据库连接的执行错误。如果 `TRY` 块中没有发生错误，控制权会传递到关联的 `END CATCH` 语句之后的语句。在\
  \ `CATCH` 块中，你可以使用多个系统函数来获取导致 `CATCH` 块执行的错误详情：这些函数名都非常直观（`ERROR_NUMBER()`, `ERROR_SEVERITY()`,\
  \ `ERROR_STATE()`, `ERROR_PROCEDURE()`, `ERROR_LINE()`, `ERROR_MESSAGE()`）。如果在 `CATCH`\
  \ 块的作用域之外调用它们，它们将返回 `NULL`。\n\n以下示例展示了一个包含错误处理函数的脚本：\n\n```sql\nBEGIN TRANSACTION;\n\
  BEGIN TRY\n-- 生成一个约束违规错误。\nDELETE FROM Production.Product\nWHERE ProductID = 980;\n\
  END TRY\nBEGIN CATCH\nSELECT\nERROR_NUMBER() AS ErrorNumber\n,ERROR_SEVERITY() AS\
  \ ErrorSeverity\n,ERROR_STATE() AS ErrorState\n,ERROR_PROCEDURE() AS ErrorProcedure\n\
  ,ERROR_LINE() AS ErrorLine\n,ERROR_MESSAGE() AS ErrorMessage;\nIF @@TRANCOUNT >\
  \ 0\nROLLBACK TRANSACTION;\nEND CATCH;\nIF @@TRANCOUNT > 0\nCOMMIT TRANSACTION;\n\
  GO\n```\n\n当我们在 `CATCH` 块中捕获错误时，这些错误不会返回给调用应用程序。如果我们想用 `CATCH` 块捕获错误详情，但也想将全部或部分这些详情报告回调用应用程序，我们可以调用\
  \ `RAISERROR` 或 `THROW` 将异常冒泡给调用者，或者简单地通过 `SELECT` 语句返回一个结果集。\n\n我们可以通过嵌套多个 `TRY...CATCH`\
  \ 构造来创建复杂的错误管理逻辑。当 `CATCH` 块中发生错误时，它会像其他任何错误一样被处理，因此如果该块包含一个嵌套的 `TRY...CATCH` 构造，嵌套\
  \ `TRY` 块中的任何错误都会将控制权传递给嵌套的 `CATCH` 块。如果没有嵌套的 `TRY...CATCH` 构造，错误将被传递回调用者。\n\n如果我们的代码正在调用其他存储过程或触发器，这些外部模块引发的错误可以在它们自己的代码中捕获（如果它们包含\
  \ `TRY` 块），也可以由调用代码中的 `TRY...CATCH` 构造捕获。但是，用户定义函数不能包含 `TRY...CATCH` 构造。\n\n在处理\
  \ T-SQL 代码中的错误时，我们需要牢记一些例外情况：\n\n*   如果错误的严重性等于或低于 10，则它们不会被我们的 `TRY...CATCH` 块捕获（因为它们不被视为错误，而只是警告）。\n\
  *   一些严重性等于或高于 20 的错误将导致 Azure SQL 停止处理该会话上的其他任务，因此 `TRY...CATCH` 同样无法捕获这些错误。\n\
  *   编译错误，例如阻止批处理运行的语法错误，将不会被我们的 `TRY...CATCH` 块捕获，因为此类错误发生在编译时而非运行时。\n*   语句级重新编译或对象名称解析错误（例如，尝试使用已删除的视图）同样不会被捕获。\n\
  \n当 `TRY` 块中发生的错误使当前事务的状态无效时，则该事务被分类为不可提交事务。不可提交事务只能执行读操作或 `ROLLBACK TRANSACTION`。我们可以调用\
  \ `XACT_STATE` 函数来验证当前事务是否已被分类为不可提交。如果函数返回 -1，则是这种情况。在批处理结束时，Azure SQL 会回滚不可提交的事务，并向应用程序发送错误消息。\n\
  \n这是一个结合使用 `TRY…CATCH` 和 `XACT_STATE` 的更复杂示例：\n\n```sql\n-- 检查此存储过程是否存在。\nIF OBJECT_ID\
  \ (N'usp_GetErrorInfo', N'P') IS NOT NULL\nDROP PROCEDURE usp_GetErrorInfo;\nGO\n\
  -- 创建存储过程以检索错误信息。\nCREATE PROCEDURE usp_GetErrorInfo\nAS\nSELECT\nERROR_NUMBER()\
  \ AS ErrorNumber\n,ERROR_SEVERITY() AS ErrorSeverity\n,ERROR_STATE() AS ErrorState\n\
  ,ERROR_LINE () AS ErrorLine\n,ERROR_PROCEDURE() AS ErrorProcedure\n,ERROR_MESSAGE()\
  \ AS ErrorMessage;\nGO\n-- SET XACT_ABORT ON 将在发生约束违规时导致事务不可提交，\n-- 因为它会自动回滚事务\n\
  SET XACT_ABORT ON;\nBEGIN TRY\nBEGIN TRANSACTION;\n-- 此表上存在 FOREIGN KEY 约束。此\n--\
  \ 语句将生成约束违规错误。\nDELETE FROM Production.Product\nWHERE ProductID = 980;\n-- 如果 DELETE\
  \ 语句成功，则提交事务。\nCOMMIT TRANSACTION;\nEND TRY\nBEGIN CATCH\n-- 执行错误检索例程。\nEXECUTE\
  \ usp_GetErrorInfo;\n-- 测试 XACT_STATE:\n-- 如果为 1，事务可提交。\n-- 如果为 -1，事务不可提交，应\n--\
  \     被回滚。\n-- XACT_STATE = 0 表示没有事务，\n--     提交或回滚操作将产生错误。\n-- 测试事务是否不可提交。\nIF\
  \ (XACT_STATE()) = -1\nBEGIN\nPRINT\nN'The transaction is in an uncommittable state.'\
  \ +\n'Rolling back transaction.'\nROLLBACK TRANSACTION;\nEND;\n-- 测试事务是否可提交。\nIF\
  \ (XACT_STATE()) = 1\nBEGIN\nPRINT\nN'The transaction is committable.' +\n'Committing\
  \ transaction.'\nCOMMIT TRANSACTION;\nEND;\nEND CATCH;\nGO\n```\n\n正如你所见，Azure SQL\
  \ 提供了非常完整且强大的异常处理功能，这是任何现代应用程序所必需的，因为管理异常对于提供卓越的用户体验至关重要。\n\n### 保持简单！\n\n请记住，除了\
  \ T-SQL，.NET 或 Python（或任何你偏好的语言）代码也具有出色的异常支持，当它们作为团队协同工作时，通常能获得最佳的用户体验。\n\n考虑到这一点以及保持解决方案尽可能简单的想法，你选择的编程语言与\
  \ T-SQL 配合得非常好的一个非常常见的模式就是使用 `XACT_ABORT ON`。\n\n使用 `XACT_ABORT ON`，事务中的任何内容都必须正确（精确）执行，否则\
  \ Azure SQL 将中止事务并终止当前代码执行。\n\n如果你计划在应用程序中处理失败逻辑，这个命令可以帮助你拥有精简和干净的代码：\n\n```sql\n\
  SET XACT_ABORT ON\nBEGIN TRAN\nINSERT INTO Orders VALUES (2,1,getdate());\nUPDATE\
  \ Inventory SET QuantityInStock=QuantityInStock-1\nWHERE ProductID=1\nCOMMIT TRAN\n\
  ```\n\n由于 `XACT_ABORT` 被设置为 on，在前面的代码中，要么 `INSERT` 和 `UPDATE` 都无错误运行，从而 `COMMIT`\
  \ 将被执行；要么如果在执行 `INSERT` 或 `UPDATE` 期间有任何错误，整个事务将自动回滚（即使代码中没有 `ROLLBACK TRAN`）。代码执行也将被中断，引发的错误将被返回给调用者（在我们的示例中是应用程序代码）。\n\
  \n如你所见，在决定如何处理异常和错误时，你拥有全方位的选项。你可以决定最好在 Azure SQL 内部处理它，也可以将其冒泡到应用程序。在两种情况下，你都掌控全局，因此可以为你的解决方案实施最佳选项。\n\
  \n\n## 与 Application Insights 集成\n\n作为构建云端解决方案的应用程序开发者，理解这一点至关重要：为了对应用程序进行故障排查和调试，在大多数情况下，我们无法像在传统本地环境中那样连接到特定的服务器。这对于那些利用平台即服务组件和服务的应用程序来说尤其如此，因为在这种场景下，你甚至没有可供连接的物理或虚拟服务器的概念。这就是为什么在代码库中规划好适当的**检测插桩**以发出远程深入分析应用程序行为所需的所有诊断信息如此重要。自行构建所有这些基础设施可能是一项具有挑战性的任务；这就是为什么在过去的几年里，专注于解决检测插桩挑战的多种原生和第三方解决方案变得相当成功。\n\
  \nApplication Insights 是 Azure Monitor 的一项功能，是一个面向开发者和 DevOps 专业人员的可扩展应用程序性能管理服务，他们可以用它来监控部署在\
  \ Azure 平台上的实时应用程序。它将帮助检测性能异常，并包含强大的分析工具来帮助你诊断问题并了解用户如何使用应用程序。它旨在帮助你持续改进性能和可用性。它适用于多种平台上的应用程序，包括在本地、混合环境或任何公共云上托管的\
  \ `.NET`、`Node.js`、`Java` 和 `Python`。它与你的 DevOps 流程集成，并连接到各种开发工具和服务。\n\n你可以在应用程序中安装一个轻量的检测插桩包（作为\
  \ SDK 提供），或者在支持的情况下（如 Azure 虚拟机）使用 `Application Insights Agent` 来启用 Application\
  \ Insights。该检测插桩会监控你的应用程序，并通过一个我们称为 Instrumentation Key 的唯一 GUID，将遥测数据导向 Azure Application\
  \ Insights 资源。你不仅可以对 Web 服务应用程序或虚拟机进行插桩，还可以对任何后台组件以及网页本身的 JavaScript 进行插桩。应用程序及其组件可以在任何地方运行——它不一定必须托管在\
  \ Azure 中。\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figq_HTML.jpg](img/493913_1_En_10_Figq_HTML.jpg)\n\
  \nApplication Insights 将让你了解应用程序组件性能的各种洞察，例如*请求速率*、*响应时间*和*失败率*。它还会捕获依赖项以及与 Azure\
  \ 服务（如 Azure SQL）的交互，外加一堆其他附加功能。然后，你可以基于收集的数据创建实时仪表板，用于常规的生产级监控，也可以深入钻研发生的具体问题或异常，或者将诊断数据导出到其他服务。\n\
  \n从你的应用程序中，一旦你从门户中获取了 Application Insights 实例的 Instrumentation Key，你只需根据你的编程语言和框架将正确的\
  \ SDK 版本添加到你的项目中，并添加一些配置信息。让我们看一个使用 Java Spring Boot 的例子；我们需要先为 SDK 添加一个 Maven 依赖项：\n\
  \n```\ncom.microsoft.azure\napplicationinsights-spring-boot-starter\n2.5.1\n```\n\
  \n下一步是通过传递 Instrumentation Key 来配置应用程序属性：\n\n```\n"
- '# 指定你的 Application Insights 资源的检测插桩键。

  azure.application-insights.instrumentation-key=974d297f-aaaa-aaaa-bbbb-4abcdabcd050

  '
- "# 指定你的 Spring Boot 应用程序名称。这可以是你希望给你的应用程序取的任何逻辑名称。\nspring.application.name=SpringBootInAzureDemo\n\
  ```\n\n然后，我们可以使用合适的类，如 `TelemetryClient` 来持续跟踪指标，例如 Azure SQL 调用的响应时间，如下面这个简单示例所示：\n\
  \n```\n@RestController\n@RequestMapping(\"/\")\npublic class Controller {\n    @Autowired\n\
  \    UserRepo userRepo;\n    @Autowired\n    TelemetryClient telemetryClient;\n\
  \    @GetMapping(\"/greetings\")\n    public String greetings() {\n        // 发送事件\n\
  \        telemetryClient.trackEvent(\"URI /greeting is triggered\");\n        return\
  \ \"Hello World!\";\n    }\n    @GetMapping(\"/users\")\n    public List users()\
  \ {\n        try {\n            List users;\n            // 测量数据库查询基准\n        \
  \    long startTime = System.nanoTime();\n            users = userRepo.findAll();\n\
  \            long endTime = System.nanoTime();\n            MetricTelemetry benchmark\
  \ = new MetricTelemetry();\n            benchmark.setName(\"DB query\");\n     \
  \       benchmark.setValue(endTime - startTime);\n            telemetryClient.trackMetric(benchmark);\n\
  \            return users;\n        } catch (Exception e) {\n            // 发送异常信息\n\
  \            telemetryClient.trackEvent(\"Error\");\n            telemetryClient.trackTrace(\"\
  Exception: \" + e.getMessage());\n            throw new ResponseStatusException(HttpStatus.INTERNAL_SERVER_ERROR,\
  \ e.getMessage());\n        }\n    }\n}\n```\n\n然后，你就可以开始通过各种监控页面和可以创建的自定义仪表板，在你的\
  \ Application Insights 实例中看到这些指标。下图显示了应用程序地图，你可以看到你的应用程序以及它如何与其他服务（如 SQL）交互，并显示调用次数和响应时间：\n\
  \n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figr_HTML.jpg](img/493913_1_En_10_Figr_HTML.jpg)\n\
  \n### .NET/.NET Core 集成\n\n对于 `.NET/.NET Core`，Application Insights SDK 和 Azure\
  \ SQL 客户端库（如 `Microsoft.Data.SqlClient`）之间还有更深入的集成。你可以通过初始化 `Microsoft.ApplicationInsights.DependencyCollector`\
  \ Nuget 包中的这个类，来自动跟踪应用程序与其他服务之间的依赖关系：\n\n```\nDependencyTrackingTelemetryModule\
  \ depModule = new DependencyTrackingTelemetryModule();\ndepModule.Initialize(TelemetryConfiguration.Active);\n\
  ```\n\n然后，你可以通过只需在服务级别启用遥测，来配置你的 ASP.NET 应用程序以跟踪数据库交互，直至执行的 SQL 命令：\n\n```\nservices.ConfigureTelemetryModule((module,\
  \ o) => { module. EnableSqlCommandTextInstrumentation = true; });\n```\n\n你还必须在\
  \ *applicationInsights.config* 配置文件中显式选择启用 SQL 命令收集：\n\n```\n<Add Type=\"Microsoft.ApplicationInsights.DependencyCollector.DependencyTrackingTelemetryModule,\
  \ Microsoft.AI.DependencyCollector\">\n  <Add Name=\"EnableSqlCommandTextInstrumentation\"\
  \ Value=\"true\" />\n</Add>\n```\n\n由于此配置，你将能够调查应用程序代码调用的外部服务的性能，并看到以“SQL:”为前缀的数据库调用和响应时间，如本截图所示：\n\
  \n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figs_HTML.jpg](img/493913_1_En_10_Figs_HTML.jpg)\n\
  \n深入研究单个样本，你将能够看到该请求的端到端事务流，并看到 Azure SQL 数据库调用的贡献，包括 T-SQL 查询的文本：\n\n![../images/493913_1_En_10_Chapter/493913_1_En_10_Figt_HTML.jpg](img/493913_1_En_10_Figt_HTML.jpg)\n\
  \n这是一个非常完整且有用的工具，将在开发和生产阶段协助你进行监控、调试和故障排除。\n\n你可以在官方的 Application Insights 文档中获取我们在此讨论的所有细节以及更多信息：[`https://aka.ms/amaio`](https://aka.ms/amaio)。\n\
  \n\n\n## 如果您想了解更多\n\n监控应用程序是一个关键步骤，就像调试一样，它很多时候被忽视了。当您遇到需要解决的问题时，其价值才会显现出来，而那时，拥有的数据越多越好。通常，系统越*透明*越好，因为您可以透过其各个层级看到问题所在。Azure\
  \ SQL 是迄今为止最透明的可用数据库之一。动态管理视图 (DMV) 提供了大量细节，如果需要，甚至可以深入到单个执行线程。这具有巨大的价值，因为它就像是您的保障：如果事情不如预期顺利，您或微软的客户支持服务\
  \ (CSS) 可以拥有所有必要信息来发现并解决问题。这是 Azure SQL 原生提供给开发者的巨大价值，并与端到端检测工具（如 Application Insights）实现了卓越集成。这对开发者来说简直是梦想！如果您想了解更多，照例，这里列出了一些有趣的资源：\n\
  \n*   SQL Server 2019 的查询存储：识别和修复性能不佳的查询 – [`www.amazon.com/Query-Store-SQL-Server-2019/dp/1484250036`](http://www.amazon.com/Query-Store-SQL-Server-2019/dp/1484250036)\n\
  *   SQL Server 2019 专家级性能索引：迈向更快的结果和更低的维护成本 – [`www.amazon.com/Expert-Performance-Indexing-Server-2019/dp/1484254635`](http://www.amazon.com/Expert-Performance-Indexing-Server-2019/dp/1484254635)\n\
  *   精通 SQL Server 2019 等待统计：分析 SQL Server 性能的实用指南 – [`www.amazon.com/Pro-Server-2019-Wait-Statistics/dp/1484249151`](http://www.amazon.com/Pro-Server-2019-Wait-Statistics/dp/1484249151)\n\
  *   SQL Server 2017 查询性能调优：故障排除与优化查询性能 – [`www.amazon.com/Server-2017-Query-Performance-Tuning-ebook/dp/B07H49LN75`](http://www.amazon.com/Server-2017-Query-Performance-Tuning-ebook/dp/B07H49LN75)\n\
  \n以下是一些深入研究 Azure SQL DMV 的资源：\n\n*   Glenn Berry 的 DMVs – [`https://glennsqlperformance.com/resources/`](https://glennsqlperformance.com/resources/)\n\
  *   `sp_WhoIsActive` – [`http://whoisactive.com/`](http://whoisactive.com/)\n* \
  \  `sp_Blitz` – [`www.brentozar.com/blitz/`](http://www.brentozar.com/blitz/)\n\
  *   Tiger 工具箱 – [`https://github.com/Microsoft/tigertoolbox`](https://github.com/Microsoft/tigertoolbox)\n\
  \n# 11. 与 Azure SQL 实现 DevOps\n\nDevOps 是一门将人员、流程和产品结合起来的学科，旨在实现向终端用户持续交付价值。它通过帮助弥合开发、运维和管理之间的鸿沟来实现这一目标。从开发者的角度来看，DevOps\
  \ 学科最重要的方面可能在于专注于拥有一个健康的 CI/CD 管道。*持续集成* (CI) 和 *持续部署* (CD) 是两个流程，有助于支持开发敏捷性，同时确保产品质量和稳定性。\n\
  \n## CI/CD：定义与概念\n\n持续集成意味着您持续地将所做的更改推送并合并到正在处理的解决方案的代码库中，以便它们能够与团队中其他开发者的更改集成、测试和验证。构建和测试解决方案的自动化工具是此流程的一部分，目的是使其尽可能无缝和自动化。目标是拥有一个健康且经过测试的代码库，几乎可以随时发布到生产环境。\n\
  \n持续部署则是一个处理将新代码部署到生产环境的流程，它有助于使这一非常微妙且关键的过程更加自动化、可重复且不易出错。此处的目标与前一个相同，但从不同的角度——部署过程——来切入。即使您的代码库中有完美运行的代码，将其部署到生产环境也是一项不简单的任务。持续部署有助于确保组织能够随时将最新可用、经过测试、可运行的代码部署到生产环境。\n\
  \n正如您可能已经想到的，DevOps 和 CI/CD，连同敏捷原则，是现代开发的基石。事实上，对于现代开发者来说，从一开始就采用 DevOps 学科无疑是一种最佳实践，并且在当今已成为一种成熟的行为。\n\
  \n## CI/CD 与 Azure SQL\n\n将 DevOps 学科应用于数据库肯定更具挑战性，因为数据库只部分是代码：数据库的最大部分实际上是数据。测试数据库意味着什么？如何处理数据？如何在持续部署和演进数据库的同时，不损害现有数据的完整性和性能？目前还没有明确且全球公认的的答案。DevOps\
  \ 学科相对较年轻（首次正式提及是在 2009 年！），而它在数据领域的应用则更年轻，因此在能够定义一套全球公认的最佳实践之前，还有很多需要学习的地方。但明确的是，这件事必须做。幸运的是，有一些工具可以在过程中提供帮助。在本章中，我们将讨论其中的两个工具：`GitHub\
  \ Actions` 和 `Azure DevOps`，以及它们如何在 Azure SQL 的上下文中使用。它们都具有图形用户界面，但也支持基于代码（通过 `YAML`）的配置和定义，以实现最大的灵活性。一旦我们了解了这两个工具能为我们做什么，以及它们如何允许创建\
  \ CI/CD 管道，我们将更深入地探讨处理数据库和数据复杂性的具体原则和解决方案。\n\n我们假设您已经熟悉源代码控制管理和 `git` 的概念。如果不熟悉，您可以使用免费的\
  \ `git` 电子书 `Pro Git` 开始学习这项基本的开发技能，链接：[`https://aka.ms/gitbookv2`](https://aka.ms/gitbookv2)。\n\
  \n### GitHub Actions\n\n`GitHub` 是最流行且使用最广泛的代码仓库。它免费提供了广泛的功能，其中一项名为 `GitHub Actions`\
  \ 的功能是最近发布的，专门设计用于帮助实现 DevOps。更具体地说，它允许您直接从代码仓库实现 CI/CD 管道。`GitHub Actions` 允许通过使用一系列称为\
  \ `action` 的小任务来创建自定义的软件开发生命周期。这些 `action` 可以通过自定义定义的工作流进行组合和编排，以覆盖构建、测试和部署解决方案的所有方面。\n\
  \n除了 `GitHub` 提供的原生 `action` 外，还有一个 `Marketplace`，`GitHub` 社区构建的 `action` 可以在这里发布，并被任何人用来支持最多样化的需求。微软发布了一个免费的、专为\
  \ Azure SQL 设计的 `action`，允许开发者作为自动化工作流的一部分，将更新部署到目标 Azure SQL 数据库。\n\n![../images/493913_1_En_11_Chapter/493913_1_En_11_Figa_HTML.jpg](img/493913_1_En_11_Figa_HTML.jpg)\n\
  \n*`GitHub Actions Marketplace`*\n\n`GitHub` `action` `marketplace` 可通过此链接访问：[`https://aka.ms/ghmas`](https://aka.ms/ghmas)。\n\
  \n借助 Azure SQL 部署 `action`，您可以创建一个 `workflow`，在有人将代码推送到仓库后，该工作流会将脚本部署到目标 Azure SQL\
  \ 数据库，运行您可能使用首选测试框架配置的任何测试，并通知您结果。\n\n\n\n### Azure DevOps\n\nAzure DevOps 是一套功能全面的产品套件，能够支持团队在所有\
  \ DevOps 方面的需求。它包含一个与 Git 兼容的代码仓库、一个用于构建和发布生成的解决方案的管道、一组用于自动化测试的测试工具、一个用于本地化管理软件包的制品存储，以及一个用于确保工作能够被正确跟踪、分配和监控的敏捷规划和问题跟踪系统。\n\
  \n如果你正在启动一个新项目且团队规模较小，Azure DevOps 是一个绝佳的选择，因为它的前五个用户是免费的。\n\n在将你的代码推送到 Azure DevOps\
  \ 源代码仓库后，你可以配置构建管道，将 Azure SQL 代码作为部署的一部分部署到指定的 Azure SQL 数据库中。\n\n管道可以使用不同的 `任务`\
  \ 来定义代码推送到仓库时将执行的步骤。`Azure SQL Database deployment` 任务可用于将提供的 T-SQL 脚本部署到目标 Azure\
  \ SQL 数据库。\n\n![../images/493913_1_En_11_Chapter/493913_1_En_11_Figb_HTML.jpg](img/493913_1_En_11_Figb_HTML.jpg)\n\
  \n## 数据库迁移\n\n既然你已经知道在哪里可以创建 CI/CD 管道，那么现在是时候开始弄清楚数据库如何也能成为该管道的一部分了。主要的挑战在于，当你想要在现有数据库中部署变更时，你可能需要保留已存储在数据库中的现有数据。如果该数据库是生产数据库，通常“可能”会变成“必须”。所有的挑战都始于数据库的这一关键方面，并且对于任何数据库（无论是关系型还是非关系型）都是如此。通过添加新列来扩展模式通常很简单，不会带来任何特别的复杂性。当你需要更改现有数据所使用的模式时，挑战就出现了。而且，无论你是采用读时模式还是写时模式，这个挑战始终存在。采用写时模式时，你需要更改数据库，以便所有现有数据都将更新以适应新模式。采用读时模式时，例如，如果你将数据存储在\
  \ JSON 文档中，你可能能够大幅降低需要在数据库上执行的操作的复杂性，但你会将这种复杂性转移到应用程序逻辑中，而该逻辑需要能够处理不同版本的模式。\n\n\
  不存在所谓的无模式解决方案。Martin Fowler 在其 *隐含模式* 演讲中一劳永逸地澄清了这个概念，该演讲可免费在线获取：[`www.martinfowler.com/articles/schemaless/`](http://www.martinfowler.com/articles/schemaless/)。他引入了隐含模式的概念，这是对被称为“无模式”的事物的正确命名方式。“无模式”作为一个通俗术语仍然存在，因为它如此广泛流传，但要让某物能够被操作，模式必须存在。除非有特定原因要避免，否则显式模式是更可取的。\n\
  \n实际上，在 CI/CD 管道中处理数据库变更的挑战在于，通常你有一个源数据库，其中包含你的更新应用程序所使用的已演进模式，以及一个目标数据库，其中包含需要更新的现有模式以成为新模式。问题在于，你如何创建能够将目标数据库从现有模式带到新模式所需的\
  \ T-SQL 脚本？而且，除了如何操作，谁将执行这项工作？如果目标数据库不为空，执行该更新操作的性能影响是什么？此外，如果出现问题，我们如何确保数据能被正确保留？是的，你总是有可以回滚的事务，在最坏的情况下，Azure\
  \ SQL 为你提供了可用的数据库备份，所以至少在这方面你是有保障的。但恢复数据库可能涉及几分钟或几小时，而离线那么长时间可能不是一个可选项。\n\n为了解决这个挑战，最好将其分成两部分，对于\
  \ CI/CD 管道也采取同样的做法。创建两个管道来针对两种不同的用例是非常有帮助的。\n\n### 合成环境\n\n第一个管道将用于确保应用于数据库的所有变更都在一个\
  \ `合成环境` 中得到测试：在这个环境中，数据库每次都是从头开始创建的，并且包含在该数据库中的数据是一组众所周知的数据，代表我们预期将要管理的数据，加上我们随着时间的推移了解到必须处理的、可能产生意外和不良状况的所有数据。例如，你可能不期望计算产品更新成本的存储过程的结果是负数，但如果从几个不同表读取的输入数据具有某些特定值，这种情况就会发生。除了你期望在数据库中拥有的常规、正确的数据外，你还应确保生成这种情况的数据集存在于这个合成环境数据库中，以便你能正确验证这种情况是否随时间推移得到了正确处理。\n\
  \n这些值，包括正确的和问题相关的，将随着时间的推移而增长，因为你应该在收到测试人员或用户的反馈和问题后尽快向此集添加新数据。通过这样做，你将拥有一个随着时间的推移而增长的有价值的参考数据集，这对于保持你的解决方案没有回归错误和问题将非常有帮助。\n\
  \n以下步骤将构成此管道的一部分：\n*   创建一个新数据库。\n*   部署模式和对象。\n*   加载参考数据集。\n*   运行测试。\n\n### 集成环境\n\
  \n如果合成环境中的所有测试都成功执行且没有错误，那么你就可以开始执行更复杂的管道了。既然你知道你的变更能产生期望的结果，你需要确保可以安全地将它们部署到生产数据库。这里的主要目标是确保用于将现有模式和数据更新到新模式的脚本是正确的，并且能在期望的时间内运行。\n\
  \n这意味着需要生产数据库的一个副本。出于安全原因，你可能无法访问它，因为它可能包含敏感数据。你有两个选择来解决这个新挑战。你可以请求一份带有 `混淆数据` 的生产数据库副本，以便移除任何个人可识别信息或高安全数据，或者如果你工作在一个高度安全的环境中，你只需要一个可以用模拟数据填充的空生产数据库。有几种工具可以生成模拟的、但真实的数据。如果你确实需要创建一些高度定制的内容，也有适用于\
  \ Python、Node 和 .NET 的库：\n*   `Faker` 同时适用于 .NET 和 Python（如果你想用一些冷门语言，也支持 PHP、Perl\
  \ 和 Ruby）。\n*   `Mimesis` 是一个 Python 库。\n*   `MockNeat` 适用于 Java。\n*   `Faker.js`\
  \ 适用于 Node。\n*   `Bogus` 是 Faker.js 移植到 .NET 的版本。\n\n一旦你有了这个参考数据库，你需要决定如何更新现有数据库，使其具有新模式、对象以及——如果需要的话——数据。这是一个相当广泛的话题，我们将在下一节深入讨论。无论你选择如何生成和应用变更到目标数据库，你的这个集成环境的\
  \ CI/CD 管道看起来会像下面这样：\n*   恢复参考数据库。\n*   生成将参考数据库迁移到目标模式、更新现有对象并保留现有数据所需的 T-SQL 代码。\n\
  *   运行生成的脚本。\n*   运行测试以验证结果。\n\n\n## 数据库迁移工具\n\n生成用于将数据库从现有架构迁移到另一架构的脚本，可能涉及不同的步骤和技术，具体取决于你所采用的开发理念：**代码优先**还是**数据库优先**？\n\
  \n### 代码优先\n\n代码优先意味着你决定直接通过应用程序代码来驱动数据库的创建、更改和演化。无需手动执行 `T-SQL` 脚本，也无需使用像 `SQL\
  \ Server Management Studio` 或 `Azure Data Studio` 这样的独立工具。\n\n这种方法的一个例子是 `Django`，一个广泛使用的\
  \ Python Web 应用程序框架：数据模型的定义完全在 Python 中进行。以下是直接取自 `Django` 官方文档的代码示例：\n\n```\nclass\
  \ Member(models.Model):\n    \"\"\"A model of a rock band member.\"\"\"\n    name\
  \ = models.CharField(\"Member's name\", max_length=200)\n    instrument = models.CharField(choices=(\n\
  \        ('g', \"Guitar\"),\n        ('b', \"Bass\"),\n        ('d', \"Drums\"),\n\
  \    ),\n    max_length=1\n    )\n    band = models.ForeignKey(\"Band\")\n```\n\n\
  要创建数据库，你有一个 `migrate` 命令，负责执行所有必要的步骤，以使现有数据库与模型定义保持同步。对于 `Django`，该命令是：\n\n```\n\
  python manage.py makemigrations\npython manage.py migrate\n```\n\n它将应用所有迁移。请记住，这种方法假设*没有手动在数据库外部进行更改*。例如，如果有人在没有使用提供工具的情况下手动向迁移目标数据库添加了一列，迁移可能会失败，因为它不检查对象的当前状态；它只是假设数据库在模式方面与上次应用迁移时的状态完全相同。\n\
  \n`Django` 是一个功能齐全的 Web 框架：如果你只需要一个可以在任何 Python 应用程序中使用的对象关系映射器（`ORM`），`SQLAlchemy`\
  \ 也通过 `Alembic` 包支持迁移。\n\n`.NET Core` 也通过 `Entity Framework` 支持代码优先和迁移，这是随 `.NET\
  \ Core` 一起提供的原生工具。\n\n一旦你创建了你的 `.NET` 模型\n\n```\nnamespace AzureSQLForDevelopers\n\
  {\n    public class BloggingContext : DbContext\n    {\n        public DbSet<Blog>\
  \ Blogs { get; set; }\n        public DbSet<Post> Posts { get; set; }\n        [...]\n\
  \    }\n    public class Blog\n    {\n        public int BlogId { get; set; }\n\
  \        public string Url { get; set; }\n        public int Rating { get; set;\
  \ }\n        public List<Post> Posts { get; set; }\n    }\n}\n```\n\n你必须生成并应用迁移步骤，就像为\
  \ `Django` 所做的那样：\n\n```\ndotnet ef migrations add FirstMigration\ndotnet ef database\
  \ update\n```\n\n如果你需要或希望手动干预迁移过程以确保它能满足你的需求怎么办？自动化很棒，但通常需要一些手动干预来处理一些比自动化工具单独处理更复杂的情况。\n\
  \n幸运的是，所有最常见的代码优先解决方案都提供了一种自定义迁移步骤的方法。根据你使用的语言和框架，将有不同的策略来应用你需要的定制，但例如，如果你需要使用一些必须存在于数据库中的数据来初始化数据库，以使你的应用程序正常工作，或者甚至进行更复杂的更改，你都可以实现。\n\
  \n`ORM` 和数据库迁移工具几乎可用于任何平台，作为独立对象或嵌入在框架中；无论你想用什么语言或平台进行编码，如果你喜欢使用代码优先方法开发数据库的想法，你几乎可以肯定你会找到一个能帮助你的工具。\n\
  \n将迁移作为 `CI/CD` 管道的一部分执行非常简单，因为你只需在管道工具中执行用于生成和应用迁移的相同工具。\n\n在这种情况下，你不需要在 `CI/CD`\
  \ 管道中有任何专门的 `Azure SQL` 操作或任务，因为你不需要执行任何 `T-SQL` 脚本。你只需要能够调用迁移工具（这通常是一个命令行应用程序），为此，你只需使用在\
  \ `GitHub Actions` 或 `Azure DevOps` 中运行任意命令的原生支持（只需记住你可能需要在 `CI/CD` 环境中安装所选工具）。\n\
  \n### 数据库优先\n\n数据库优先意味着你希望独立于使用它的应用程序来建模和演化数据库。这个术语通常与 `ORM` 的使用相关联。在 `ORM` 的上下文中，它意味着你将有一些工具根据现有的数据库表和对象创建你将在应用程序中使用的一些类。正如你所看到的，这与代码优先方法完全相反，代码优先是让代码负责创建数据库及相关对象。\n\
  \n如果我们把“数据库优先”的概念从 `ORM` 上下文中拿出来，在一个更通用和广泛的意义上使用它，它只是意味着你希望手动处理数据库，使用它自己的工具和语言来创建和演化它。在\
  \ `Azure SQL` 的情况下，这意味着你希望编写和使用 `T-SQL`，并且你将负责将应用程序和数据库连接在一起，可能使用 `ORM`，可能使用 `Micro-ORM`，或者可能只是完全手动完成。\n\
  \n这个选项给了你尽可能多的自由。一旦你对开发数据库进行了所有更改，你必须创建脚本，以便它们可以应用于目标数据库，使其也演化到所需的架构。同样，你在这里有很大的自由：你可以选择让工具自动为你生成脚本，或者你自己提供脚本。\n\
  \n#### DACPAC\n\n如果你更愿意使用一个工具，该工具获取你已处理的开发数据库，将其与目标数据库进行比较，计算差异，生成将目标数据库迁移到新架构所需的脚本（而不丢失任何数据），并最终为你应用这些脚本，那么你很幸运，因为这样的工具存在、免费，并且与你已用于在\
  \ `Azure SQL` 中还原数据库的工具是同一个：`SqlPackage`。\n\n使用 `SqlPackage`，你可以将现有数据库的架构提取到一个 `.dacpac`\
  \ 文件中，然后将其用于目标数据库，让 `SqlPackage` 生成包含所有将目标数据库的架构与 `.dacpac` 中定义的架构同步所需命令的脚本。以下代码将提取名为\
  \ `blogs` 的、托管在 `Azure` 中的数据库中存在的架构和所有对象（但不包括数据）到 `blogs-v1.dacpac` 文件中：\n\n```\n\
  sqlpackage.exe\n    /a:Extract\n    /ssn:\"<server-name>.database.windows.net\"\n\
  \    /su:\"<username>\"\n    /sp:\"<password>\"\n    /sdn:\"blogs\"\n    /tf:\"\
  blogs-v1.dacpac\"\n```\n\n一旦你有了 `.dacpac` 文件，你可以通过 `Publish` 操作立即用它来更新目标数据库：\n\n\
  ```\nsqlpackage.exe\n    /a:Publish\n    /sf:\"blogs-v1.dacpac\"\n    /tsn:\"<server-name>.database.windows.net\"\
  \n    /tu:\"<username>\"\n    /tp:\"<password>\"\n    /tdn:\"blogs-prod\"\n```\n\
  \n或者创建稍后可用于通过同名操作更新数据库的脚本：\n\n```\nsqlpackage.exe\n    /a:Scripts\n    /sf:\"blogs-v1.dacpac\"\
  \n    /tsn:\"<server-name>.database.windows.net\"\n    /tu:\"<username>\"\n    /tp:\"\
  <password>\"\n    /tdn:\"blogs-prod\"\n    /op:\"blogs-db-v1.sql\"\n```\n\n生成脚本的能力很有用，如果你想自定义它以添加一些初始化数据（就像在代码优先场景中发生的那样），或者只是想将脚本保存到你的代码仓库中，以便确切知道在\
  \ `CI/CD` 管道中将执行什么。在这种情况下，你可能希望使用 `GitHub` 或 `DevOps` 中的 `Azure SQL` 操作或任务来执行该脚本。\n\
  \n另一个选择是直接在 `CI/CD` 管道中执行 `SqlPackage`，使用专门的 `Azure SQL` 操作或任务来应用更改，甚至不生成脚本。这种方法可能风险更高，因为你无法完全控制正在发生的事情，因此平均而言不是推荐的方法，但它确实是最灵活的，因为它会自动计算出将目标数据库带到所需状态所需的更改。\n\
  \n\n## 比较工具\n\n除了 `SqlPackage`，还有几款第三方工具可以帮助你找出两个现有数据库之间的差异，从而生成脚本，将目标数据库与另一个参考数据库同步。最常见和知名的是\n\
  \n*   SQL Server Data Tools（Visual Studio 工作负载扩展）\n*   Redgate SQL Compare（商业软件）\n\
  *   ApexSQL SQL Compare（商业软件）\n\n## DbUp\n\nDbUp ([`https://dbup.github.io/`](https://dbup.github.io/))\
  \ 是一个开源的 .NET 库，它有助于在数据库中部署脚本，确保同一个脚本不会被部署两次。如果你想完全控制部署到数据库的脚本，并且维护一个必须按顺序执行的脚本列表，那么这个小工具就极其有用。这样，你编写的更改将按正确顺序应用，从而将数据库更新到最新的演进状态。这种方法为你提供了最高级别的控制，如果你更喜欢自己编写迁移脚本，它会非常有效。在复杂且关键的系统中，情况通常都是如此。\n\
  \n使用它非常简单。你只需将 NuGet 包添加到你的项目中（建议为此创建一个专用项目），然后使用 `DeployChanges` 对象，并指向存放待部署脚本的文件夹，例如项目结构中的\
  \ `sql` 文件夹：\n\n```csharp\nvar connectionString = \"\"\nvar upgrader = DeployChanges.To\n\
  .SqlDatabase(connectionString)\n.JournalToSqlTable(\"dbo\", \"$__schema_journal\"\
  )\n.WithScriptsFromFileSystem(\"./sql\")\n.LogToConsole()\n.Build();\nvar result\
  \ = upgrader.PerformUpgrade();\n```\n\n前面的代码在执行时，将会：\n\n*   连接到目标数据库。\n*   如果尚未存在，则创建一个名为\
  \ `$__schema_journal` 的表，用于跟踪已部署的脚本。\n*   读取 `sql` 文件夹中所有可用的 T-SQL 脚本。\n*   将日志发送到控制台。\n\
  *   运行脚本，并将已执行的脚本信息保存到日志表中。\n\n如果你针对一个空数据库编译并运行此应用程序，你将看到类似下面的输出：\n\n![../images/493913_1_En_11_Chapter/493913_1_En_11_Figc_HTML.jpg](img/493913_1_En_11_Figc_HTML.jpg)\n\
  \n如果你尝试再次运行同一个应用程序，且没有向 `sql` 文件夹添加任何新脚本，那么什么都不会发生，因为所有脚本都已执行完毕：\n\n![../images/493913_1_En_11_Chapter/493913_1_En_11_Figd_HTML.jpg](img/493913_1_En_11_Figd_HTML.jpg)\n\
  \n由于这是一个常规的 .NET 应用程序，将其部署到 CI/CD 流水线中不需要任何特殊的 Task 或 Action，除了那些流水线中已有的、用于确保 .NET\
  \ 框架可用的任务。\n\n## 数据库测试\n\n如何正确地测试数据库？这是另一个庞大的话题，坦率地说，目前还没有很好的答案。测试数据库是一个复杂的挑战，因为测试结果将完全取决于存储在数据库中的数据。此外，目前还没有广泛采用的专注于这个特定问题的测试框架。\n\
  \n有一个社区支持的单元测试框架支持 Azure SQL：`tSQLt`。使用 `tSQLt`，你可以仅用 T-SQL 代码来定义测试。它支持对标量结果和表格式结果进行断言，并且还可以创建一些模拟对象来帮助你隔离依赖关系。\n\
  \n但作为一名开发人员，我最喜欢的数据库测试方法是使用常见的测试框架（如 .NET 的 `NUnit` 或 `XUnit`、Python 的 `pytest`\
  \ 或 Node 的 `Mocha`）创建一个测试类，并利用这些工具的灵活性来获得良好的测试体验。\n\n众所周知，测试必须是自包含、独立且幂等的。上述测试框架都允许在运行测试前后执行自定义代码，以便准备和清理测试数据及环境。\n\
  \n我知道纯粹的单元测试不应该有任何外部依赖，而测试数据库实际上引入了对数据库本身的依赖。尽管如此，我认为使用现有的单元测试框架是一个很好的折中方案，它以对完美方法的微小偏离为代价，提供了所需的灵活性。鉴于目前没有普遍接受的数据库单元测试框架，我们只能在现有条件下尽力而为。\n\
  \n以下是一个使用 .NET 和 `NUnit` 进行数据库单元测试的示例：\n\n```csharp\n[Test]\npublic void CheckExpectedTotal()\n\
  {\nusing(var conn = new SqlConnection(ConnectionString))\n{\nvar result = conn.QuerySingle(\n\
  \"ConfirmOrder\",\nnew { OrderId = 38923 },\ncommandType: CommandType.StoredProcedure);\n\
  Assert.AreEqual(\"ConfirmedTotal\", 10000);\n}\n}\n```\n\n理想情况下，对于你想创建的每个测试，你会生成一个或多个数据集，以覆盖你想要测试的查询或存储过程可能被使用的场景。\n\
  \n通常，为了检查查询是否返回预期结果，你可以使用一个小的数据样本，甚至可能是完全用模拟值创建的，这样就不必处理个人可识别信息以及随之而来的所有安全问题。在最复杂的情况下，在运行测试之前，你可能需要恢复一个参考数据集甚至整个数据库，以便拥有一个明确的起始点来运行测试，从而获得确定性的结果。\n\
  \n一旦你创建了测试，从而拥有一个坚实的流水线来部署和测试针对一个小型但具有代表性的数据集的更改，你就可以指示流水线将你的代码部署到一个更大的数据库上（可能包含一个经过适当混淆的、具有代表性的生产数据子集），以运行集成和性能测试。在这个阶段，你将专注于查询性能。一些框架还允许你指定测试必须在规定的时间内执行，才被认为是成功的。\n\
  \n此时，通常你的团队将执行集成和性能测试，其中数据库和所有需要与之交互的代码将作为一个整体进行测试。如果你正在创建一个 API 解决方案，你可能已经在使用像\
  \ `Locust.io` 或 `K6` 这样的工具来进行压力测试，并验证你刚刚完成的更改在性能、可扩展性和资源消耗方面是否也符合预期。\n\n## 整合所有内容\n\
  \n第一次创建一个完整、端到端的 CI/CD 流水线可能有点复杂。因此，在本书附带的代码中，你可以找到一个端到端的示例，展示了如何创建一个简单的 C# REST\
  \ API，以 Azure SQL 数据库为后端，并使用 Azure Web App 部署在 Azure 上。CI/CD 流水线使用 GitHub 和 DbUp\
  \ 创建，使用的测试框架是 `NUnit`。\n\n\n## 如果你想了解更多\n\nDevOps 是一个非常广泛的主题，在本章中我们只是浅尝辄止。正如开头提到的，DevOps\
  \ 也是一个相对年轻且发展非常迅速的学科，因此及时掌握最新信息至关重要：毫无疑问，DevOps 是现代开发者的必备技能，因此必须对其及工具有一定的熟悉程度。以下是一些链接和资源，可帮助你了解更多细节：\n\
