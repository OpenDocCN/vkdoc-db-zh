- '# 由 Rohan Kumar 撰写的前言


  当今的商业环境正在迅速演变。跟上变化的速度要求公司进行数字化转型，其中包含更新其应用程序的计划。一些组织选择将其遗留软件和业务流程更新为云解决方案。另一些组织则选择混合方法，结合本地部署和云功能的优势。与此同时，云原生解决方案也在激增。IDC
  预测未来五年内将创建超过 5 亿个新应用程序。¹


  这一趋势为当今的开发者社区带来了巨大的机遇——以及一些重大挑战。开发者希望尽快将其解决方案推向市场，并与其他软件供应商区分开来。为了满足客户日益增长的需求，开发者需要一个经过验证的后端数据库解决方案，以简化编码过程。


  我们喜欢将 Azure SQL Database 描述为一个“全包式”数据库。之所以这么说，是因为该平台提供了简化并加速应用程序开发所需的组件和功能。应用程序供应商需要基本功能，如出色的数据库引擎、高度响应的性能、卓越的可扩展性和高安全性。他们还需要一个支持现代应用程序构造（如地理空间、图形和
  JSON）的解决方案，并以他们熟悉的 T-SQL 语言表达。该平台还必须支持多种部署选项。开发者需要自由地将其应用程序设计为在弹性池、超大规模方案、托管实例或无服务器环境中运行。诸如此类的优点促使数千名开发者选择
  Azure SQL Database 作为他们的首选解决方案。


  我们要向 SQL 社区中多年来分享反馈并帮助我们成就今日 Azure SQL 的许多人表示衷心的感谢。在微软，我们的团队始终专注于推进 Azure SQL Database，为开发者提供更多价值。感谢您给我们一个支持您努力和创新的机会！


  > **— Rohan Kumar**

  >

  > **微软 Azure 数据部门企业副总裁**


  '
- '# 由 Mark Souza 撰写的前言


  如今，拥抱数字化转型和云计算是客户成功的关键。组织和技术需要发展以满足新的业务需求（以及为应对当前 COVID 危机而调整的优先事项）和新的数据生态系统，这一点至关重要。Azure
  SQL Database 一直是这一演变的核心技术，现代开发者需要跟上步伐。如果您是一位经验丰富的数据库软件工程师，或是一位希望在此领域提升知识和技术深度的现代开发者，那么本书正适合您。


  凭借我在科技行业专注于客户和数字化转型超过 30 年的经验，我非常高兴看到这项工作取得成果。事后看来，过去 25-30 年数据库领域的巨大演变和增长并不令人惊讶。


  我于 1993 年 7 月加入微软，帮助建立微软的数据库业务。当时，运行于 Windows Server（当时称为 Windows NT 3.1）上的 Microsoft
  SQL Server 刚刚发布。那时，我们只有 17 名 Microsoft SQL Server 软件工程师。如今，人数已超过 2300 名。2000 年，我转到产品部门，在微软工程部门内建立了首批高度技术性、面向客户的团队之一，名为
  SQLCAT——SQL 客户咨询团队。该团队技术超群，直接与我们全球的顶级客户互动。我们的工程师倾听并学习自这些客户。然后，他们将这些收获转化为客户反馈、功能建议和错误报告，推动了重要的产品改进，并制定了最佳实践指南，供所有客户（无论大小）使用。2011
  年，SQLCAT 团队转变为 AzureCAT，专注于帮助客户加速其上云之旅。


  在过去的 25 多年里，Microsoft SQL Server 经历了显著的演变。我们见证了 SQL 平台新增强功能和能力的诞生，例如图形、地理空间、JSON、列存储压缩、内存优化表、时态表等等。其最重大的演变发生在微软将本地计算和存储服务发展到云端之时，SQL
  Server 成为了基于云的 Azure SQL 产品（如 Azure SQL DB、SQL MI 等等）的基础。SQL Server 的开发者体验已经真正发展起来，如今支持所有流行的语言：Python、Node.js、Go、Ruby、PHP、Java、原生
  C/C++，当然还有 .NET 语言，如 C#、F# 等。


  本书也非常适合新一代的数据分析开发者，特别是如果您正专注于自己的数字化转型之旅。


  ---

  ¹ 参见 [`www.idc.com`](https://www.idc.com)




  最棒的是，本书作者大多是我的老朋友，他们曾属于 SQLCAT/AzureCAT 团队，现在仍是微软工程部门数据组的一员，因此本书在技术性、实用性和助力您开启云之旅方面都极具价值。能受邀撰写此序言，我深感荣幸。尽管我最近已从工程部门转至负责全球商业业务的微软客户成功组织，但微软的数据服务始终让我心系。感谢团队为全球客户和数据开发者撰写这部应时之作。我确信它必将引起热烈反响。


  > **—马克·苏萨（Mark Souza）**

  >

  > **企业副总裁 – 微软客户成功部门**


