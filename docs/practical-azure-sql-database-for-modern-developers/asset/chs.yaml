  '
- '# 2. Azure SQL 入门指南


  Azure SQL 的首次提及（当时称为“Microsoft SQL Services”）是在 2008 年微软专业开发者大会（PDC）上宣布“红狗项目”（即
  Microsoft Azure）时。这个云端托管的 SQL Server 版本是 Azure 上最早可用的服务之一。从一开始，它就旨在提供 SQL Server
  的**平台即服务（PaaS）**形态，让你无需配置硬件或修补软件，并能享受云端运行带来的优势——可用性、性能、安全性和可扩展性——而无需在本地部署复杂且昂贵的系统。自那时起，Azure
  SQL 便伴随着 Azure 平台持续成长和演进。当你阅读本书时，重要的是要记住事物总是在变化。虽然书中的一些“小石子”或细节可能会随着平台的发展而略有改变，但你将在本书中学到的“大石子”将为你在数据库开发领域的发展提供坚实的基础。


  对于 Azure 或 Azure SQL 的新手读者来说，本章将作为一个入门指南，帮助你快速上手并准备使用 Azure SQL 构建应用程序。你将了解当今 Azure
  SQL 中存在的灵活部署方式，以及一些常见场景，这些场景可以帮助你决定应该选择何种部署选项、服务层级和其他选项。你还将了解一些可用于操作和管理 Azure SQL
  的工具和示例。


  在阅读本章（以及后续章节）时，我们建议你充分利用随书提供的代码示例，以便获得一些关于这些主题的实践经验。


  如今，当你听到“Azure SQL”这个词时，它指的是一套产品，而不仅仅是 Azure SQL Database。在 Azure SQL 内部，有不同的部署选项，这基本上相当于
  Azure SQL 品牌下的不同产品。如图 2-1 所示，根据抽象级别和访问级别，很容易将部署选项分为三类：操作系统（OS）级别、服务器级别和数据库级别。


  ![../images/493913_1_En_2_Chapter/493913_1_En_2_Fig1_HTML.jpg](img/493913_1_En_2_Fig1_HTML.jpg)


  图 2-1：Azure SQL 产品家族


  操作系统级别的访问意味着 Azure 负责处理所有事务，直到你获得操作系统级别的控制权。数据中心、硬件、虚拟化等由微软管理，但操作系统、SQL Server 和数据库则由你管理。你本质上获得了一个预装了
  SQL Server 的 Azure 虚拟机。这通常被称为**基础设施即服务（IaaS）**类型的产品。使用 IaaS，虽然你负责管理和修补操作系统、SQL Server
  和数据库，但你也能访问这些级别中包含的所有功能。例如，如果你想在 SQL Server 所在的同一台机器上运行第三方应用程序，你可以通过 IaaS 来实现。此外，SQL
  Server 2019（本书撰写时的最新版本）中有一些功能在其他部署选项中尚不可用，例如 PolyBase。如果你希望获得与 SQL Server 100% 的功能一致性，Azure
  SQL 虚拟机可能是你的最佳选择。更多信息请参见 [`https://aka.ms/azuresqlvm`](https://aka.ms/azuresqlvm)。


  当你从需要操作系统级别访问的场景移开，开始寻找更多托管服务时，有一些 Azure SQL 选项属于**平台即服务（PaaS）**类型的产品，这些选项将是本书的重点。使用
  PaaS 服务，你可以获得诸如自动备份、数据库引擎和操作系统的修补、可用性的服务级别协议（SLA）、高级安全性、监控和开箱即用的可扩展性等功能。对于开发者来说，这意味着你可以拿到一个连接字符串，不再需要担心维护问题，并花更少的时间在故障排除上。


  例如，假设你不想操心操作系统补丁和 SQL Server 升级。你只想要一个 SQL Server 实例。你可以选择 `Azure SQL 托管实例`，它将操作系统抽象化，让你拥有一个始终最新的、托管的
  SQL Server 实例。在这里，你几乎可以获得所有的实例级功能；例如，支持 SQL Server Agent、Service Broker、链接服务器和公共语言运行时（CLR）。这种部署选项非常适合那些希望迁移到
  PaaS 产品，但仍需控制和访问许多服务器级别组件的公司。Azure SQL 托管实例还提供原生虚拟网络支持，允许你根据需要将该服务集成到本地网络中。


  现在，考虑这样一种场景：你的公司正在转型为云原生实体，或者你在一个云端诞生的公司工作。也许你对管理 SQL Server 实例不感兴趣，也不需要服务器级别的功能。甚至，你可能根本不知道
  SQL Server 是什么，因为你可能从未在本地使用过它或有使用它的需要。那么，你正在寻找的是 Azure SQL 能提供的下一层抽象，即 `Azure SQL
  Database`。在这个产品中，你可以获得 Azure SQL 托管实例所给予的所有 PaaS 优势，但你只获得一个数据库和数据库级别的功能。对于这种部署选项，你会有一个用于组织和管理的逻辑服务器，但无法访问实例级别的功能或视图。


  在 Azure SQL 托管实例和 Azure SQL Database 之间做选择时，你可以考虑一些额外的权衡因素，以确定最适合应用程序需求的方案。思考 Azure
  SQL 托管实例与 Azure SQL Database 的一种方式，类似于你思考虚拟机与容器的方式。如果你使用虚拟机（VM）来部署应用程序，你会拥有更多的计算能力、磁盘和安全服务，但每个主机只能运行
  2-10 个虚拟机。另一方面，如果你使用容器，你会得到更轻量、更快、弹性更大且每个主机可运行数百个容器的方案。如果你将这种思路应用到 Azure SQL 上，使用
  Azure SQL 托管实例，你能获得更多功能和控制权；而使用 Azure SQL Database，你能获得更快、更小且可能成本更低的方案。让我们来考虑一下这些权衡因素。




  ## Azure SQL 选项概览与创建指南


  首先，您可能会考虑成本因素。虽然 Azure SQL Database 和 Azure SQL 托管实例在存储和计算方面的定价相同，但如果您只有少数几个数据库，且其消耗低于
  Azure SQL 托管实例的最低配置，那么 Azure SQL Database 可能更便宜，因为它允许更小的最低配置（成本更低）。Azure SQL Database
  还能保证特定数据库的资源，因为它不像 Azure SQL 托管实例那样与其他数据库共享资源。您可能还会考虑速度和弹性。由于 Azure SQL Database
  部署在安全的公有云中，Microsoft 可以在几分钟甚至更短时间内完成资源调配和扩展。而 Azure SQL 托管实例则部署在完全隔离的环境中（这具有安全优势），但结果是资源调配和扩展可能需要数小时。从功能角度来看，Azure
  SQL 托管实例允许访问实例级功能，如果您当前未使用这些功能，但可能希望以后有选项使用它们，它还允许进行时区和排序规则（将在本章后面介绍）的自定义，这是 Azure
  SQL Database 所不具备的。


  接下来，让我们看一个拥有许多数据库或许多 SQL Server 实例的场景。也许您是一个 *软件即服务* (SaaS) 提供商，您的软件服务于多个客户，这意味着您需要多租户支持。或者您有许多不同的
  SQL Server，想要迁移到 PaaS 产品中。到目前为止，我们探讨的是单个数据库或单个实例的场景，但对于这些场景，您可以考虑“池”选项，它允许多个数据库或服务器共置并共享资源。这可以实现成本优化并减少管理开销。对于多个数据库，您可以考虑
  *弹性池*，而对于多个实例，您可以考虑 *实例池*。


  尽管选择众多，但 Azure SQL 平台具有灵活性，能够满足您的需求。在本书中，我们将从开发人员的角度，更深入地探讨不同 PaaS 部署选项之间存在的功能和细微差别。


  如果您是 Azure SQL 的新手，所有这些选项可能会让您望而生畏，但请不要担心。如果您想轻松入门，并且在 90% 的情况下都能获得所需，可以从 Azure
  SQL Database 开始。但请放心，所有其他选项都是为了确保即使您作为开发人员遇到最奇特、最苛刻的边缘情况也能得到覆盖。


  ### 创建 Azure SQL Database


  要创建单个数据库（或托管实例、弹性池、实例池），您首先需要一些关于 Azure 的基础知识。首先，您需要一个 Azure 帐户和一种支付服务费用的方式。如果您之前没有创建过
  Azure 免费帐户，可以访问 [`https://azure.com/free`](https://azure.com/free) 获取一次性额度。这应该足够您完成本书中大部分（如果不是全部）实践练习。如果您已经使用过免费帐户，并且拥有支持该福利的
  Visual Studio 订阅，您可能每月会有一定金额的 Azure 额度。如果这些都不是选项，您将需要使用或获取一个有权创建和管理资源的 Azure 帐户。


  一旦您准备好使用 Azure，您将创建一个 *资源组*，它基本上是绑定到特定订阅的一组 Azure 资源的逻辑容器。您可以使用任何喜欢的操作系统、Azure 门户、PowerShell
  或 Azure CLI（命令行界面）来执行与部署和管理资源相关的任务。例如，在安装 Azure CLI ([`https://aka.ms/install-azure-cli`](https://aka.ms/install-azure-cli))
  后，您可以连接并使用以下代码创建一个资源组。


  ```

  ### 登录到您的 Azure 帐户

  az login

  ### 查看您可用的订阅

  az account show

  ### 复制您要使用的订阅的 "id" 并将其设置为默认值

  az account set –-subscription <subscription_id>

  ### 查看您的帐户可用的区域，记下您要使用的区域的 "name"（例如 "westus"）

  az account list-locations

  ### 创建一个资源组（指定区域和名称）

  az group create –l <region> -n <resource_group_name>

  ```

  *清单 2-1 设置 Azure CLI 并创建资源组*


  请注意，您必须提供创建资源组的 *区域*。所有资源都绑定到一个区域（例如，美国西部、印度南部、中国东部）。由于资源组本身本质上是一个元数据实体，您在创建时选择的位置表示元数据存储的位置。理论上，资源组中的每个资源都可以在不同的区域中创建。一旦您有了一个资源组，就可以开始将其他资源（应用程序、网络、数据库等）部署到其中。要查看您的帐户可用的所有区域并找到前面脚本中使用的区域名称，您可以运行以下命令：


  ```

  az account list-locations -o table

  ```

  *清单 2-2.*


  要部署 Azure SQL Database，您首先需要一个 *逻辑服务器*，它与资源组类似，用于将 Azure SQL 数据库分组在一个逻辑容器中。您可以在同一个逻辑服务器中拥有弹性池和单个数据库。使用
  Azure CLI，您可以使用以下代码完成此操作。


  ```

  ### 创建一个逻辑服务器

  az sql server create –-admin-password <password> –-admin-user <username> –-name
  <server_name> –-resource-group <resource_group_name> –-location <region>

  ```

  *清单 2-3 创建 Azure SQL Database 服务器*


  配置好逻辑服务器后，您可以使用以下代码将数据库（单个数据库或弹性池中的数据库）部署到该服务器。


  ```

  ### 使用默认配置创建一个 Azure SQL Database

  az sql db create –-name <database_name> –-resource-group <resource_group_name> –-server
  <server_name>

  ```

  *清单 2-4 创建 Azure SQL Database*


  我们将在接下来的章节中详细讨论众多选项、工具和示例数据库，但获取示例数据库之一（如果您想利用 AdventureWorksLT）的最简单方法是在部署时指定其中一个。您可以使用以下命令，在之前的
  `az sql db create` 命令中添加一个参数。


  ```

  ### 使用默认配置和 AdventureWorksLT 示例数据库创建一个 Azure SQL Database

  az sql db create –-name <database_name> –-resource-group <resource_group_name> –-server
  <server_name> -–sample-name AdventureWorksLT

  ```

  *清单 2-5 使用示例创建数据库*




  部署过程需要几分钟时间，但一旦完成，你将获得一个已还原 **AdventureWorksLT** 示例数据库的 Azure SQL 数据库。


  一旦你的数据库部署完成并导入了数据，下一步可能是连接到它并验证所有内容是否部署正确。要从本地计算机连接，你需要指定允许连接到该数据库的 IP 地址范围。你也可以选择使用起始和结束
  IP 地址值“0.0.0.0”创建防火墙规则，以允许所有 Azure 内部 IP 地址。这将使其他服务（例如 `Azure Functions`、`Azure
  虚拟机`）能够连接到你的数据库。这两种选项的代码是相同的；只需在以下代码中替换所需的 IP 地址范围即可。


  ```bash

  az sql server firewall-rule create \

  –-name  \

  –-resource-group  \

  –-server  \

  –-start-ip-address  \

  –-end-ip-address

  ```

  **清单 2-6** 创建防火墙规则


  现在，你应该能够从你选择的工具（更多关于工具的内容稍后介绍）通过一个允许的 IP 地址连接到你的 Azure SQL 数据库了。


  创建 Azure SQL 托管实例的过程和命令略有不同，因为对于托管实例，你创建的是一个“托管的” SQL Server（而非逻辑服务器），然后再创建“托管的”数据库。


  在部署之前，你需要处理 `VNetName` 和 `SubnetName` 的新参数。这是因为托管实例必须部署在 Azure 虚拟网络的自有子网中，或仅与其他托管实例共处的子网中。设置此环境最简单的方法是使用此处提供的
  Azure 资源管理器 (ARM) 部署模板：[`https://aka.ms/sqmicvs`](https://aka.ms/sqmicvs)。ARM 模板是一个
  JSON 文件，它使用声明性语法来定义要部署的基础设施和配置。有许多 ARM 模板可用于开始在 Azure 中构建简单或复杂的解决方案 ([`https://aka.ms/armtemplates`](https://aka.ms/armtemplates))。使用
  ARM 模板，你只需单击“部署到 Azure”按钮并填写你的订阅和资源组信息，它就会部署托管实例所需的虚拟网络和子网。


  你可以在此处阅读有关不同命令的更多信息：[`https://docs.microsoft.com/en-us/cli/azure/sql/mi`](https://docs.microsoft.com/en-us/cli/azure/sql/mi)，下面是一个示例脚本。


  ```bash

  ### 使用默认参数创建 Azure SQL 托管实例

  az sql mi create -g  -n  -l  -i -u  -p  --subnet /subscriptions//resourceGroups//providers/Microsoft.Network/virtualNetworks//subnets/

  ### 在现有的 Azure SQL 托管实例内创建新的托管数据库

  az sql midb create -g  –-mi  -n

  ```

  **清单 2-7** 用于创建 Azure SQL 托管实例的 Azure CLI 命令


  ## 用于使用和管理 Azure SQL 数据库的工具


  在上一节中，你了解了如何使用 Azure CLI 来部署和管理 Azure SQL。根据你要完成的任务和你的偏好，还有其他工具可供你利用。例如，如果你更熟悉 PowerShell，你可以获得与
  Azure CLI 大致相同的功能。由于 SQL Server 和 Azure SQL 已经分别存在了 25 年和 10 年以上，因此也有许多可用的命令行工具。如果你正在寻找提供图形用户界面
  (GUI) 的工具，也有几种供你选择。在本节中，你将从 GUI 到 CLI 概览可用的工具。


  大约有五种主要提供 GUI 的工具，其中最流行的是 `SQL Server Management Studio` (SSMS)。这个工具已经存在了 20 多年，可用于访问、管理和开发
  SQL Server 和 Azure SQL 的组件。它包含图形工具和脚本编辑器。


  `Azure Data Studio` (ADS) 是一个较新的开源工具，也提供了 GUI 和 SSMS 的大部分功能。ADS 构建在 Visual Studio
  Code 之上，所以如果你熟悉后者，你会对 ADS 感到得心应手。ADS 也是跨平台的，支持 Windows、macOS 和 Linux。在 SSMS 和 ADS
  之间做选择时，通常取决于偏好或功能需求。例如，如果你想利用 Jupyter 来创建 SQL、PowerShell、Python 等笔记本（笔记本最简单的解释是可运行并保存结果的代码单元格与格式化文本单元格的混合），那么
  ADS 是目前唯一支持该功能的工具。同样，有些功能你只能在 SSMS 中找到而 ADS 没有。微软正在积极投资这两个工具，所以请期待它们持续演进。


  还有两个直接链接到 Visual Studio 的扩展：`SQL Server Data Tools` (SSDT) 和 `mssql`。SSDT 是一个用于设计和部署与
  SQL（包括 Azure SQL）相关的许多内容的工具，它提供了类似于使用 Visual Studio 开发应用程序的体验。类似地，Visual Studio
  Code 的 mssql 扩展允许你利用这个轻量级编辑器连接到数据库和实例，并享有良好的编辑体验。


  第五个提供管理和开发 GUI 的工具是 Azure 门户。从部署到与其他应用程序和服务的集成，Azure 门户是一种简单、用户友好的方式，几乎不需要编码即可构建应用程序。


  转向命令行工具，也有很多。大多数命令行工具都是跨平台的（Windows、macOS 和 Linux）。有些是用于非常具体的任务；以下是几个常见的例子：


  *   `mssql-cli` 是一个开源的命令行工具，专门用于查询，具有交互性和诸如智能感知和语法高亮等有用功能 ([`https://aka.ms/mssqlcli`](https://aka.ms/mssqlcli))。


  *   `sqlcmd` 实用程序允许你在命令提示符下使用 T-SQL 语句、脚本文件和系统存储过程。


  *   `大容量复制程序` 实用程序 (bcp) 专门用于批量复制数据。


  *   `mssql-scripter` 可用于帮助创建、编辑和存储脚本 ([`http://aka.ms/mssqlscripter`](http://aka.ms/mssqlscripter))。


  *   `sqlpackage` 可自动执行与提取、发布、导出和导入实时数据库、数据库架构和用户数据相关的任务 ([`http://aka.ms/sqlpackage`](http://aka.ms/sqlpackage))。


  有些工具是为更广泛的用途而构建的。例如，Azure CLI 和 SQL Server PowerShell 插件提供了用于访问、部署和管理 Azure SQL
  的命令。几乎可以肯定的是，你不会只使用一个 GUI 工具或一个 CLI 工具，而是会使用两者的组合（甚至在同一类别内使用多个）。正如你将在其他章节中看到的，有些任务使用不同的工具会更容易完成。


  在整本书中，你将更深入地接触不同的工具。如果你想要任何工具的参考资料，这里有一个有用的链接可以指导你：[`https://aka.ms/sqltools`](https://aka.ms/sqltools)。


  ## 选择，选择，还是选择


  一旦你明确了哪种 Azure SQL 部署选项最适合你的场景（Azure SQL 数据库单一数据库或弹性池，或 Azure SQL 托管实例子单实例或实例池），你还可以做出许多其他选择来定制解决方案以满足你的需求。在前面的部分中，你看到了如何使用
  Azure SQL 数据库 CLI 进行部署，但许多选项都是默认选择。在本节中，你将了解在部署过程中可以做出的所有选择和配置，以及一些关于如何选择的指导。本节遵循目前
  Azure 门户中呈现的顺序和流程，但顺序和具体细节可能会根据你选择的部署工具（Azure 门户、Azure PowerShell、Azure CLI）而变化。



  ### 快速回顾


  在本章第一节“创建 Azure SQL 数据库”中，我们介绍了一些 Azure 基础知识，包括 Azure 订阅、资源组、区域以及 Azure SQL 数据库的逻辑服务器。回顾一下，要在
  Azure 中执行任何操作（即使是免费操作），你都需要一个 Azure 订阅；资源组是你部署在 Azure 中的资源或服务的逻辑容器或元数据实体；区域是你的服务部署的地点；而逻辑服务器则充当多个单数据库或池数据库以及与该逻辑服务器关联的其他设置/配置的集中管理点。对于
  `Azure SQL 托管实例`，你选择的服务器名称并非逻辑服务器，而是实际的服务，之后你可以在其中部署数据库（有时称为“托管数据库”）。在所有部署选项中，你都需要提供管理员登录名和密码。如果你熟悉
  `SQL Server`，这相当于 `SQL Server` 中的系统管理员。此账户将使用你提供的用户名和密码进行连接，并且只能存在一个这样的账户。如果你熟悉
  `Azure Active Directory`，也可以选择在此处或部署后配置单个或安全组账户（可选）。


  ### DTU 或 vCore


  设置好管理员登录后，在部署 `Azure SQL 数据库` 时，你的下一个选择是是否要将部署的数据库作为新的或现有的 `弹性池` 的一部分。如果是，那么你就必须为
  `弹性池` 配置服务层、存储和计算选项。请注意，在 `弹性池` 中，你共享池中所有数据库之间的资源。如果你希望限制某些数据库，也可以在池中的数据库之间进行资源调控。同样地，如果你要部署
  `实例池`，则需要使用不同的 Azure 门户流程或命令集，因为你需要先部署 `实例池`，然后才能在其中部署 `托管实例`。


  接下来，你将选择所谓的购买模型，有两个选项：基于虚拟核心 (`vCore`) 的模型或基于数据库事务单元 (`DTU`) 的模型。`DTU` 模型在 `Azure
  SQL 托管实例` 中不可用。基于 `DTU` 的模型是 `Azure SQL 数据库` 中的早期购买模型。其理念是你获得一个计算、存储和 I/O 资源的捆绑度量单位（即
  `DTU`），然后选择满足你需求的 `DTU` 级别。该模型的一个挑战是你无法在这三者之间独立扩展，并且很难确定你获得的具体资源。基于 `vCore` 的模型是应客户要求独立选择计算和存储资源而推出的。这是
  Microsoft 推荐的模型。此外，使用 `vCore` 模型可以利用 `Azure 混合权益（适用于 SQL Server）` 来节省大量成本。此权益允许你应用可能已拥有的现有未使用许可，以换取大幅折扣。在
  `vCore` 模型中，你需要为计算资源（基于服务层、`vCore` 数量、内存量以及硬件代数）、数据和日志存储的类型与容量以及备份存储付费。


  在本书中，我们将主要关注 `vCore` 购买模型，因为它是 Microsoft 推荐的现代模型，但如果你想进一步比较 `vCores` 和 `DTUs`，可以参考这里：[`https://aka.ms/sdpm`](https://aka.ms/sdpm)。


  ### 服务层


  一旦选择了购买模型，其下方还有称为服务层的选项。这些服务层代表了不同的性能和可用性等级。可用的层级包括 `通用型`、`业务关键型` 和 `超大规模`。仔细考虑你的选项很重要，但一个通用的建议是从
  `通用型` 层开始，并根据需要进行调整。


  `通用型` 层提供了一套经济、平衡且可扩展的计算和存储选项。对于 `Azure SQL 数据库`（单数据库）的 `通用型` 服务层，目前有两种计算选项可供选择：预配型和无服务器型。预配型计算适用于更常规的使用模式，其平均计算利用率随时间推移较高，或多个数据库使用弹性池。这可能是你想要开始使用的层。无服务器型计算适用于间歇性、不可预测的使用模式，其平均计算利用率随时间推移较低。


  例如，考虑一个费用报销内部业务应用程序，它通常只在营业时间内使用，但在大型内部会议后或月底偶尔会出现使用高峰。这意味着每天晚上，从下午 5 点到上午 8 点，几乎没有活动发生。然而，在大型会议后和月底，会出现显著的活动高峰。然后你必须做出选择：是过度配置以满足需求高峰，还是配置不足以保持相对安静的应用程序的成本较低。使用无服务器型，你可以利用自动暂停和恢复功能，并可自定义时间延迟。这意味着当你的数据库在一定时间内处于非活动状态时，它将被暂停。在此期间，你只需支付存储费用，计算费用将降为零。一旦有人再次尝试访问应用程序，`SQL`
  将重新启动，你的计算资源将在你设定的最小和最大 `vCore` 数之间按秒进行扩展。在此示例中，当需求高涨时，`Azure SQL 数据库` 可以自动扩展到所需水平，然后在需求减少时使用一个有趣的缓存回收系统来缩减。请记住，无服务器型目前仅在
  `Azure SQL 数据库` 单数据库中可用，但请查阅文档以获取最新信息：[`https://aka.ms/sdserverless`](https://aka.ms/sdserverless)。


  目前，除了 `Azure SQL 数据库` 的 `通用型` 层之外，所有其他层和部署选项都只有预配型计算这一选择。一旦选择了服务层，你就可以根据需要进行向上或向下扩展，甚至可以在服务层之间切换。下一个在所有部署选项中可用的服务层是
  `业务关键型`。它专为具有低延迟响应要求的业务应用程序而设计。此层还通过利用多个隔离副本（其中一个也可用作只读副本）来提供最高的故障恢复能力。倾向于使用此层的一些行业包括游戏、应急和金融。虽然
  `Azure SQL 数据库` 通常具有较高的服务级别协议 (`SLA`) 来设定正常运行时间和性能预期，但 `业务关键型` 可以保证最高的 `SLA`，达到
  99.995% 的正常运行时间。有关 `Azure SQL` `SLA` 的更多信息，请参考这里：[`https://aka.ms/sdsla`](https://aka.ms/sdsla)。


  `业务关键型` 层也是 `Azure SQL` 中唯一支持内存中技术的服务层。内存中技术将在第 9 章中更深入地介绍。概言之，内存中技术可以帮助提高各种 `SQL`
  工作负载（分析型和事务型）的性能，`业务关键型` 层支持内存中 `OLTP`、聚集列存储索引、非聚集列存储索引以及内存优化聚集列存储索引。



  '
- '# 服务层级与配置


  通用型和业务关键型层级目前支持的数据库最大尺寸为 4-8TB（具体取决于部署选项和最终服务层级）。Azure SQL Database 提供的最终服务层级是 **超大规模**，它旨在利用云的弹性，让数据库几乎可以无限制地增长，从而让开发者摆脱管理海量数据库的所有负担。微软对
  Azure SQL 进行了架构重构，使其能够以 `Hyperscale` 方式运行。方法是将原始的 SQL Server 引擎重构为不同、更小、独立、分布式的服务，这些服务作为一个实体协同工作，但比原始架构更具弹性和可扩展性。该服务层级适用于大多数未来可能需要高度可扩展存储（目前最高可达
  100TB）的业务工作负载。`Hyperscale` 还支持为读取密集型工作负载部署多个只读副本，所有副本均提供数据服务，利用横向扩展策略来提高并发性和性能。由于文件快照存储在
  Azure Blob 存储中，`Hyperscale` 支持“近乎即时”的数据库备份和数分钟内完成的恢复，因为它不再是一个受数据量大小限制的操作。正如您可能猜到的，这一特性在管理超大型数据库时至关重要。由于更高的日志吞吐量和更快的事务提交时间（无论数据量大小），`Hyperscale`
  能提供比通用型层级更高的整体性能。如果您对微软如何构建此架构以及它带来的架构变革感兴趣，可以在此处查看详细信息：[`https://aka.ms/sdsth`](https://aka.ms/sdsth)。


  总而言之，微软的建议是从通用型层级开始，并根据需要进行调整。利用云的弹性，您可以根据需要向上或向下扩展资源。如果性能不够理想，您可以切换到业务关键型或 `Hyperscale`。请记住，`Hyperscale`
  的性能更高，而业务关键型的性能最高，成本通常也遵循相同的模式。有关各服务层级当前的详细比较，请参考：[`https://aka.ms/sdbsth`](https://aka.ms/sdbsth)。


  ## 硬件代次


  一旦选择了服务层级，根据部署选项，vCore 模型会为 **硬件代次** 提供多种选择。硬件代次的选择允许您选择用于计算和内存的物理硬件。当今最常用的硬件代次是
  `Gen4` 和 `Gen5`。在不过多涉及规格参数的情况下，`Gen4` 硬件允许每个 vCore 配备显著更多的内存，而 `Gen5` 硬件则允许您将计算资源扩展到更高的水平。需要重点注意的是，随着技术的进步，可用的硬件代次将不断变化和发展。例如，`Gen4`
  已推出很长时间，在某些地区已不再支持新数据库。此外，`Fsv2 系列`（计算优化型）和 `M 系列`（内存优化型）硬件选项最近已公开可用。另一个例子是，Azure
  SQL Database 无服务器版目前仅在 `Gen5` 硬件上可用。您的成本和性能需求可能会使某一代硬件成为更好的选择。您可以在此处查看最新的硬件选择和规格：[`https://aka.ms/sdstvhg`](https://aka.ms/sdstvhg)。


  如果您正在寻找其他计算成本节约的机会，一个值得考虑的选项是使用 Azure SQL Database 预留容量 (`RI`) 预付计算资源以获得折扣。更多信息，请参阅：[`https://aka.ms/sdri`](https://aka.ms/sdri)。


  如果您正在构建一个新应用，并从空的数据库或实例开始，Azure SQL 的弹性允许您根据需要增长和扩展计算与存储。如果您正巧要将现有工作负载迁移到 Azure
  SQL Database 或托管实例，将该工作负载转化为服务层级、计算级别和最大数据大小可能会很复杂。幸运的是，微软构建了一些可以提供帮助的工具。首先，您可以利用
  **数据迁移助手** (`DMA`) 工具来识别任何阻碍因素并确定最佳的部署选项。具体到部署选择，`DMA` 工具还具有一项名为 **SKU 推荐器** 的功能，它会分析您现有的工作负载，并推荐服务层级、计算级别和最大数据大小。该工具会提供每月的估算成本，并在分析后创建一个可用于批量预配的
  PowerShell 脚本。


  ## 网络


  选择了计算和存储的起始点后，下一步是配置网络连接。Azure SQL Database（单数据库和弹性池）和 Azure SQL 托管实例（单实例和实例池）的网络连接选项是不同的。部署
  Azure SQL Database 时，门户中的默认设置是“允许 Azure 服务和资源访问此服务器”选项设置为“是”，这意味着如果您建立连接，其他 Azure
  服务（例如 Azure 数据工厂或 Azure 虚拟机）可以访问该数据库。此外，部署后，您可以更改 Azure SQL Database 防火墙规则以满足应用程序的要求。


  对于 Azure SQL 托管实例，您将服务部署在 Azure **虚拟网络** (`VNet`) 和专用于托管实例的子网中。`VNet` 类似于您部署在本地环境中的网络，但特定于
  Azure。子网只是在 `VNet` 内创建网段的一种方式。通过将 Azure SQL 托管实例部署到您拥有的 `VNet` 中的一个仅限托管实例的子网，您可以获得一个完全安全且私有的
  IP 地址。此功能允许您将本地网络或其他本地数据存储连接到 Azure SQL 托管实例（例如，支持使用链接服务器）。您可以选择启用公共终结点，以便无需 VPN
  即可从 Internet 连接到托管实例，但默认情况下此访问是禁用的。


  Azure SQL 托管实例中通过 `VNet` 隔离实现私有终结点的原则，已通过 Azure 专用链接的形式应用到 Azure SQL Database 中：[`https://aka.ms/aplo`](https://aka.ms/aplo)。


  ## 连接方法


  在部署过程中，对于 Azure SQL 托管实例，您还可以选择连接类型。对于 Azure SQL Database，您也可以选择连接类型，但只能在部署之后进行。您可以保留默认设置（`代理`
  和 `重定向` 的组合），或更改为仅使用 `重定向` 或仅使用 `代理`。概括地说，在 `代理` 模式下，所有连接都通过 Azure SQL 网关进行代理；而在
  `重定向` 模式下，利用网关建立连接后，连接将直接指向数据库或托管实例。直接连接 (`重定向`) 可以减少延迟并提高吞吐量，但也需要为 Azure 外部的服务打开额外的端口，这就是为什么它并非立即完全启用的原因；打开额外端口需要根据该决策带来的安全风险进行评估，因此
  Azure 默认采用最安全的选项。


  如前面章节所讨论的，在部署数据库（Azure SQL Database 的数据库或 Azure SQL 托管实例中的数据库）时，您可以选择使用来自另一个 Azure
  SQL Database 或 Azure SQL 托管实例中受管数据库的现有备份来设置 **数据源**（它们必须匹配；不能使用受管数据库来创建新的 Azure
  SQL Database）。仅对于 Azure SQL Database，您还可以选择使用现有的示例数据库 (`AdventureWorksLT`)。




  ## 排序规则


  部署 Azure SQL 时，另一个应仔细考虑的选择是`collation`（排序规则）。Azure SQL 中的排序规则为数据库中的数据定义了排序规则、区分大小写和区分重音等属性。排序规则的设置会影响实例或数据库中许多操作的特性，因此应谨慎设置。在
  Azure SQL 托管实例中，你可以在创建实例时设置服务器排序规则，但之后无法更改。这为该实例中的所有数据库设置了默认排序规则，但之后你可以在数据库和列级别修改排序规则。在
  Azure SQL 数据库中，你无法设置服务器排序规则；它被固定为“`SQL_Latin1_General_CP1_CI_AS`”，这是最常见的排序规则。每个排序规则的名称格式类似：“`SQL`”表示它是
  SQL Server 排序规则（而非 Windows 或二进制排序规则），“`Latin1_General`”指定了排序时使用的字母表和语言，“`CP1`”引用了排序规则使用的代码页，“`CI`”表示应不区分大小写，“`AS`”表示应区分重音，并且还有其他与宽度、UTF-8
  等相关的选项可用 ([`https://aka.ms/srdc`](https://aka.ms/srdc))。


  ### 时区


  `Time zone`（时区）设置，与排序规则设置一样，看似一个很小的决定，却可能对你的应用程序产生重大影响。微软的建议是为所有实例和数据库使用协调世界时（UTC）。在
  Azure SQL 数据库中，你无法更改时区；你只能使用 UTC（不过别担心，任何 Azure SQL 数据库中都有丰富的内置功能来操作时区并处理转换为本地时间）。然而，对于
  Azure SQL 托管实例，在部署时引入时区选择是为了满足许多客户的需求，这些客户的现有应用程序在特定时区的上下文中存储和调用日期时间值。


  ### 高级数据安全


  从 Azure 门户部署（但也可以通过 PowerShell 完成）的最后一个可用选项是`Advanced data security`（高级数据安全，ADS）。在门户中，系统会提示你是否要开始免费试用并启用
  ADS，它提供了与数据发现和分类、漏洞警报和威胁检测相关的功能。对于 Azure SQL 托管实例，可以在部署后配置 ADS。你可以在此处了解有关 ADS 的更多信息：[`https://aka.ms/sdads`](https://aka.ms/sdads)。


  如你所见，有很多选项可供你选择，以使 Azure SQL 以高效且经济高效的方式满足你的需求。在本书中，将进一步探讨不同选项中可用的功能，让你对当前任何场景选择最佳选项有更深入的了解。


  ## 使用示例数据库


  无论你是刚开始接触 Azure SQL 和 T-SQL，还是经验丰富的专业人士，总会有新的东西可以探索。探索一些新的或细微的功能和场景需要一个数据库，利用微软的一些示例数据库可以带来极大的帮助。此外，Azure
  SQL 和 SQL Server 社区非常庞大（只需在 Twitter 上搜索 #sqlfamily），社区成员不断贡献新内容和示例来探索最新功能或解释复杂主题。通常，你在网上或书中找到的示例都会与微软的某个示例数据库相关联，因为它们是丰富、易于查找和使用的样本。


  在本章的第一部分，你学习了如何创建一个预加载了示例数据库的 Azure SQL 数据库。在本节中，你将了解更多可用的示例数据库，以及如何在 Azure SQL
  数据库和 Azure SQL 托管实例上开始使用它们。


  有两个最常用的示例数据库：`AdventureWorks` 和 `WideWorldImporters`。`AdventureWorks` 示例围绕虚构的零售公司
  AdventureWorks Cycles 构建，而 `WideWorldImporters` 是一个虚构的、具有全球贸易业务的批发公司。`AdventureWorks`
  示例数据库最初是为 SQL Server 2008 发布的，`WideWorldImporters` 是为 SQL Server 2016 发布的。正如你在本章第一部分看到的，使用
  Azure CLI，你可以部署 `AdventureWorks` 数据库的“轻量”版本“`AdventureWorksLT`”。还有额外的数据库示例：用于 SQL
  Server 标准版功能的 `WideWorldImporters` 数据库“`WideWorldImportersStd`”和用于 SQL Server 企业版功能的
  `WideWorldImporters` 数据库“`WideWorldImportersFull`”。多年来，这些示例通常会随着最新功能而更新。这些数据库需要手动部署，就像部署任何你可能已有的其他现有数据库一样。让我们看看如何操作。


  将示例数据库导入 Azure SQL 数据库与导入 Azure SQL 托管实例的方法有所不同。对于 Azure SQL 数据库，你可以通过利用 bacpac
  文件（一种扩展名为“.bacpac”的 Windows 文件，包含数据库的数据和架构）来完成。你可以从这里下载 `WideWorldImporters` 文件：[`https://aka.ms/wwi10`](https://aka.ms/wwi10)。


  如果你未在业务关键型（或 DTU 模型中的高级版）服务层中运行，由于通用型层不支持内存优化表，样本中的一些依赖项将要求你使用以“Standard”或“std”结尾的样本。如果你在业务关键型（或高级版）中运行，那么你可以使用所有样本（包括以“Full”结尾的样本）。


  你需要创建一个存储账户（[`https://aka.ms/sdrsac`](https://aka.ms/sdrsac)），然后将 bacpac 文件复制到 Azure
  Blob 容器中。复制 bacpac 文件的方法有很多，但使用 Azure Storage Explorer（[`http://aka.ms/storage-explorer`](http://aka.ms/storage-explorer)）和通过
  Azure 门户上传是两种简单的方法。一旦 bacpac 文件被复制到 Azure Blob 容器中，你就可以利用以下代码，通过 Azure CLI 将数据库导入到你的
  Azure SQL 数据库中。


  ```

  az sql db import \

  -g <resource-group-name> \

  -s <server-name> \

  -n <database-name> \

  -u <admin-login> \

  -p <admin-password> \

  --storage-key-type StorageAccessKey \

  --storage-key <storage-account-key> \

  --storage-uri https://<storage-account-name>.blob.core.windows.net/<bacpac-file-name>.bacpac

  ```


  （清单 2-8：将 bacpac 文件导入 Azure SQL 数据库）


  在 PowerShell 中也有类似的功能，在 Azure 门户中也有 GUI 体验。在 .bak 文件可以导出为 bacpac 文件的情况下，这种方法非常适合将数据库迁移到
  Azure SQL 数据库。



  '
- '# Azure SQL 数据库样本获取与连接查询


  ## 获取样本数据库


  在 Azure SQL Database 中，获取样本数据库的选项包括使用 Azure 门户、Azure CLI 或 Azure PowerShell。在 Azure
  SQL 托管实例中，这些选项同样可用（语法略有不同），但您还可以使用 T-SQL 进行原生还原。首先，您需要有权访问备份的 `.bak` 文件。在此情况下，备份文件可以存储在
  Azure Blob 容器中，方式与前面的 Azure SQL Database 示例相同。这次，您还需要生成一个共享访问签名（SAS）密钥（使用 Azure
  CLI 操作的指导：[`https://aka.ms/ascsas`](https://aka.ms/ascsas)），以便您的托管实例可以访问备份文件。部署实例后，您可以使用选择的
  T-SQL 查询工具连接到该实例，以创建指向备份的凭据。如果您复制并粘贴以下任何 T-SQL 命令，可能需要重新键入单引号。


  ```

  CREATE CREDENTIAL [https://]

  WITH IDENTITY = ''SHARED ACCESS SIGNATURE''

  , SECRET ''''

  Listing 2-9

  Create a credential to a backup

  ```


  要检查凭据是否有效，您可以运行以下 T-SQL 来获取备份文件列表。对于 “WideWorldImporters-Standard.bak”，您应该会看到返回的
  mdf、ndf 和 ldf 文件。


  ```

  RESTORE FILELISTONLY FROM URL = ''https://''

  Listing 2-10

  View the files in a backup

  ```


  最后，您可以使用以下代码从 URL 还原数据库。


  ```

  RESTORE DATABASE [Wide World Importers] FROM URL = ''https://''

  Listing 2-11

  Restore the database from a URL

  ```


  此还原过程是异步且可重试的，这意味着即使连接中断或发生超时，Azure SQL 托管实例也会在后台不断尝试还原数据库。虽然此示例与 WideWorldImporters
  相关，但使用 T-SQL 在 Azure SQL 托管实例中还原数据库的过程对于其他备份文件将是相同的。更多信息请参考：[`https://aka.ms/sdmirsdq`](https://aka.ms/sdmirsdq)。


  ## 延伸阅读


  与本地相比，创建 Azure SQL 数据库或托管实例是一项简单的操作，但仍需要做出一些选择，以确保您不会为不需要的东西浪费资金。这或多或少与您在本地应用的概念相同。更大的区别在于向上扩展要容易得多。请记住，在云中，资源可以像盐一样管理：您可以随时添加更多。


  以下是一些链接，深入探讨了本章讨论的几个概念：


  *   在 Azure SQL 中选择正确的部署选项 – [`https://docs.microsoft.com/azure/sql-database/sql-database-paas-vs-sql-server-iaas`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-paas-vs-sql-server-iaas)

  *   什么是 PaaS？ – [`https://azure.microsoft.com/overview/what-is-paas/`](https://azure.microsoft.com/en-us/overview/what-is-paas/)

  *   Azure SQL 服务层级 – [`https://docs.microsoft.com/azure/sql-database/sql-database-service-tiers-general-purpose-business-critical`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-service-tiers-general-purpose-business-critical)

  *   Azure SQL 数据库服务器及其管理 – [`https://docs.microsoft.com/azure/sql-database/sql-database-servers`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-servers)

  *   Azure SQL 功能 – [`https://docs.microsoft.com/azure/sql-database/sql-database-features`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-features)

  *   Azure SQL 基础 – [`https://aka.ms/azuresqlfundamentals`](https://aka.ms/azuresqlfundamentals)


  '
- '# 3. 连接和查询 Azure SQL


  一旦创建并配置了数据库实例，您的下一个任务就是将新开发或现有的应用程序连接到它，并开始执行数据操作或检索命令。


  Azure SQL 是一种云原生数据库服务，通过多种进程间通信（IPC）机制（如 TCP/IP 套接字、命名管道或共享内存）与外部应用程序和进程进行通信。`T-SQL`（SQL
  Server 自己的 SQL 方言）中的命令（如 `SELECT`/`INSERT`/`UPDATE`/`DELETE`）以及从服务返回的结果集都被打包到称为
  `TDS`（Tabular Data Stream，[`https://aka.ms/mstds`](https://aka.ms/mstds)）的应用层协议中。


  当然，作为应用程序开发人员，您不必在自己的应用程序中针对这些底层协议进行编码。它们通常由全面的驱动程序和库系列抽象出来，这些驱动程序和库几乎涵盖了市场上可用的每一种现代编程语言和框架，并可在
  Windows、Linux 和 macOS 操作系统上运行。


  本章中的所有示例均使用 Visual Studio Code 编辑器（[`https://code.visualstudio.com/`](https://code.visualstudio.com/)）编辑，并通过命令行工具和相应运行时（如
  .NET Core 3.1、OpenJDK 11 和 Python 3.6.6）的 SDK 在 Windows、macOS 或 Linux 操作系统上构建和执行。


  ## 驱动程序和库


  大多数驱动程序都围绕一些基本结构设计，主要代表以下常见实体：


  *   与服务器/数据库的连接

  *   在该连接上执行的命令

  *   用于在返回的结果集上迭代和访问记录的对象


  一些库还提供更高级的数据操作功能，例如可以存储检索到的行、跟踪离线修改并提供所包含行的当前/先前版本以用于悲观并发多用户场景的断开连接缓存（例如，`ADO.NET
  DataSets/DataTable`）。


  更高级别的框架和库也可用于覆盖特定场景，例如性能（例如，考虑为本身不提供连接池的库（如 `JDBC` 驱动程序）提供连接池）或生产力工具（如对象关系映射器和微
  ORM）以加快开发时间。此表汇总了各种编程语言适用于所有平台（Windows、Linux、macOS）的 Azure SQL 客户端驱动程序：


  | **语言** | **驱动程序库** | **版本** |

  | --- | --- | --- |

  | .NET 语言（C#、F# 等） | Microsoft ADO.NET for SQL Server | V1.1+ |

  | Java | Microsoft JDBC driver for SQL Server | V8.2+ |

  | PHP | PHP SQL driver for SQL Server | V 5.8+ |

  | Node.js | Node.js Tedious driver for SQL Server | V8.0.1+ |

  | Python | Python ODBC bridge (pyodbc) | V4.0.30+ |

  | Go | Microsoft SQL Server Driver for Go |   |

  | Ruby | Ruby driver for SQL Server | V2.1.0+ |

  | 原生语言（如 C/C++） | Microsoft ODBC driver for SQL Server | V17.5.1.1+ |



  '
- "# 哪种 Azure SQL 驱动最适合我\n\n对于 C#、C++、Node.JS 或 Python 等语言，根据平台和应用需求，有多种驱动选项可供选择，因此了解有哪些可用组合及其推荐情况非常重要。\n\
  \n如果你的应用程序面向 `full .NET Framework`（在 Windows 上）或跨平台的 `.NET Core`（在 Windows、macOS、Linux\
  \ 或 Docker 上），并使用如 `C#` 这样的语言，你有两个主要选项：\n\n*   依赖 `System.Data.SqlClient` 命名空间中经典的\
  \ `ADO.NET Provider for SQL Server`，它作为机器级别安装的完整 .NET Framework 版本的一部分提供。\n*   在你的项目中引用新的\
  \ `Microsoft.Data.SqlClient` 驱动，它托管在 GitHub ([`https://aka.ms/ghmdsc`](https://aka.ms/ghmdsc))\
  \ 和 NuGet ([`https://aka.ms/ngmdsc`](https://aka.ms/ngmdsc))。\n\n后一种选项为 Microsoft\
  \ 提供了更灵活、更直接的方式，以便为 .NET 的客户端库引入改进，因此在开发一个全新的应用程序时，推荐使用此版本。使用 `dotnet` CLI 为项目安装和引用此包非常简单：\n\
  \n```dotnet add package Microsoft.Data.SqlClient```\n\n像 Perl、PHP 和 Python 这样的编程语言提供了围绕原生\
  \ ODBC 驱动的轻量级包装器和接口（例如 `pyodbc`、`DBI` 等）。为了支持 Azure SQL 最新版本中所有可用的最新功能（例如 Always\
  \ Encrypted、数据分类、Azure Active Directory 身份验证等），推荐使用 `Microsoft ODBC Driver 17 for\
  \ SQL Server`（或更高版本）。该驱动除了支持 Windows 外，还适用于大多数主要的 Linux 发行版和版本。与此驱动一同打包的还有传统的 SQL\
  \ Server 客户端实用程序，如 `sqlcmd` 和 `bcp`。ODBC 驱动的安装过程很大程度上取决于你的目标操作系统和发行版，所有详细信息都可以在此\
  \ URL 找到：[`https://aka.ms/azuresql-odbc-install`](https://aka.ms/azuresql-odbc-install)。\n\
  \nJava 开发人员应使用 `Microsoft JDBC Driver 8.2 for SQL Server`，这是一个 Type 4 JDBC 驱动，支持\
  \ JRE 8、11 和 12，并且可以在所有支持 Java 的主要操作系统上运行，包括 Sun Solaris。使用 Maven 时，可以通过将其作为依赖项添加到\
  \ `POM.xml` 文件中来将 JDBC 驱动添加到项目：\n\n```com.microsoft.sqlserver\nmssql-jdbc\n8.2.0.jre11\n\
  ```\n\n正如 Java 领域的典型情况，JDBC 驱动不提供原生连接池功能，因此市场上有许多外部库可用。虽然我们不特别认可任何一个，但 `HikariCP`\
  \ ([`https://aka.ms/hikaricp`](https://aka.ms/hikaricp)) 是我们在与连接到 Azure SQL 实例的客户合作时经常遇到的一个库，并已被证明快速且可靠。\n\
  \n对于其他编程语言如 `Python`，通常有多种选项可用，尽管 Microsoft 将其测试工作和信心放在 `pyodbc` 驱动 ([`https://aka.ms/pyodbc`](https://aka.ms/pyodbc))\
  \ 上，如前所述，它依赖于 SQL Server 的 ODBC 驱动，并支持大多数操作系统。你可以在命令提示符中使用以下一行命令轻松安装 `pyodbc`：\n\
  \n```pip install pyodbc```\n\n类似地，对于 Node.JS，可以通过在命令行键入规范的包管理器命令来将 Tedious 驱动添加到项目：\n\
  \n```npm install tedious```\n\n## 入门指南\n\nMicrosoft 官方文档为开发者提供了一个很棒的“入门”部分 ([`https://aka.ms/sdcq`](https://aka.ms/sdcq))，这是开始熟悉使用循序渐进方法为\
  \ Azure SQL 产品系列进行应用程序开发的最佳起点。\n\n虽然你将有时间评估所有这些示例，但我们将从这里开始，使用一些最流行的编程语言，从头开始解释如何连接到\
  \ Azure SQL 并运行一些基本查询的关键方面。\n\n本章中的所有示例都引用了一个名为“WideWorldImportersFull”的数据库，该数据库可以作为独立的\
  \ Azure SQL 数据库或托管实例进行部署。在第 2 章中，你会找到关于如何部署此示例数据库的说明。请相应地更新连接字符串以使这些示例工作。\n\n##\
  \ 清单 3-1. .NET Core 应用程序中的数据访问方法\n\n```public async Task> GetOrders()\n{\nList orders\
  \ = new List();\nusing (SqlConnection cnn =  new SqlConnection(\nconfig.GetConnectionString\n\
  (\"DefaultConnection\")))\n// 连接字符串模式: \"Server=tcp:.database.windows.net,1433;Initial\
  \ Catalog=;User ID=;Password=;Connect Timeout=30;\"\n{\nSqlCommand cmd = new SqlCommand\n\
  (@\"SELECT TOP 5\n[o].[OrderID],\n[o].[OrderDate],\n[c].[CustomerName]\nFROM [Sales].[Orders]\
  \ AS [o]\nINNER JOIN [Sales].[Customers] AS [c]\nON [o].[CustomerID] = [c].[CustomerID]\"\
  , cnn);\nawait cnn.OpenAsync();\nSqlDataReader dr = await cmd.ExecuteReaderAsync();\n\
  while (dr.Read())\n{\norders.Add(new Order()\n{\nOrderID = Convert.ToInt32(dr[0]),\n\
  OrderDate = Convert.ToDateTime(dr[1]),\nCustomerName = Convert.ToString(dr[2])\n\
  });\n}\n}\nreturn orders;\n}```\n\n在这个基本示例中，你可以找到一个典型的 .NET Core 数据访问方法，该方法可以在多种应用程序类型中复用，从控制台应用到\
  \ WebAPI 或 Azure 函数。一旦你从 NuGet 添加了对 `Microsoft.Data.SqlClient` 包的引用，你就可以使用 `SqlConnection`\
  \ 和 `SqlCommand` 类，通过异步方法与 Azure SQL 交互，以打开新连接并执行命令，该命令检索结果集并实例化一个对象集合，供你在业务逻辑中使用。虽然当你执行像这样简单的操作时，幕后发生了许多其他事情，并且有许多最佳实践和指导可用于优化你的数据访问层，但你会发现在应用程序的大多数数据库交互中都会编写类似的代码。现在让我们用\
  \ Java 来解决完全相同的场景，它是企业开发人员最喜欢的编程语言之一。\n\n## 清单 3-2. Java 应用程序中的数据访问方法\n\n```public\
  \ List getOrders() {\nList order = new ArrayList();\nString connectionString = \"\
  jdbc:sqlserver://.database.windows.net:1433;\" + \"database=WideWorldImporters-Full;user=@;\"\
  \ + \"password=;loginTimeout=30;\";\ntry {\ntry (Connection conn =\nDriverManager.getConnection(connectionString))\
  \ {\nString sql =\n\"SELECT TOP 5 \"\n+\"[o].[OrderID],\"\n+\"[o].[OrderDate],\"\
  \n+\"[c].[CustomerName]\"\n+\"FROM [Sales].[Orders] AS [o]\"\n+\"INNER JOIN [Sales].[Customers]\
  \ AS [c] \"\n+\"ON [o].[CustomerID] = [c].[CustomerID]\";\ntry (Statement stmt =\n\
  conn.createStatement();\nResultSet rs =\nstmt.executeQuery(sql)) {\nwhile (rs.next())\
  \ {\norder.add(new Order(\nrs.getInt(1),\nrs.getString(2),\nrs.getString(3)));\n\
  }\n}\nconn.close();\n}\n} catch (Exception e) {\nSystem.out.println();\ne.printStackTrace();\n\
  }\nreturn order;\n}```\n\n\n\nJava 代码示例与之前的 .NET Core 示例非常相似。一旦我们通过 Maven 为所需的应用程序类型（如控制台应用、REST\
  \ 服务等）创建了初始代码骨架，就需要在 `pof.xml` 文件中引用 JDBC 驱动库以从中央包仓库下载它，然后在代码中使用。`DriverManager`\
  \ 类代表应用程序中加载的所有 JDBC 驱动程序的入口点，而连接字符串中的 `jdbc:sqlserver` 前缀指示使用哪个特定驱动。`Connection`、`Statement`\
  \ 和 `resultset` 再次是用于封装底层连接管理、命令执行和结果集迭代的主要类。这三个类将成为大多数数据库交互的基础。\n\nPython 是近年来在编写数据访问和管理应用程序方面获得广泛关注的语言。让我们看看如何使用它来连接到\
  \ Azure SQL 数据库实例。\n\n### 清单 3-3：创建一个简单的 Python 应用程序\n\n```python\n@app.route('/order')\n\
  def getorders():\ncnxn = pyodbc.connect(\"DRIVER={ODBC Driver 17 \" \\\n\"for SQL\
  \ Server};\" \\ \"SERVER=\"+server+\";DATABASE=\"+database+\"\" \\\n\";UID=\"+username+\"\
  ;PWD=\"+ password)\ncursor = cnxn.cursor()\ntsql = \"SELECT TOP 5 \" \\\n\" [o].[OrderID],\
  \ [o].[OrderDate],\" \\\n\" [c].[CustomerName]\" \\\n\" FROM [Sales].[Orders] AS\
  \ [o]\" \\\n\" INNER JOIN [Sales].[Customers] AS [c]\" \\\n\" ON [o].[CustomerID]\
  \ = [c].[CustomerID]\"\nrows = cursor.execute(tsql).fetchall()\norder_list = []\n\
  for row in rows:\nd = collections.OrderedDict()\nd['orderID'] = row.OrderID\nd['orderDate']\
  \ = str(row.OrderDate)\nd['customerName'] = row.CustomerName\norder_list.append(d)\n\
  return json.dumps(order_list)\n```\n\n在这个 Python Flask 函数中（你可以在配套的 GitHub 仓库中找到完整的应用程序），`pyodbc`\
  \ 模块扮演着核心角色。它提供了对 ODBC 驱动的包装以及更高级的抽象，如连接（connection）、游标（cursor）和行（row），这使你可以执行命令并遍历结果。然后，行被转换为有序字典列表，并作为\
  \ JSON 片段返回给函数调用者。秉承纯粹的 Python 风格，`pyodbc` 代表了一种从 Python 程序访问 Azure SQL 数据库实例的高效且直接的方法。\n\
  \n正如我们之前提到的，`tedious` 是可以从 Node.JS 应用程序连接到 Azure SQL 的驱动。让我们看一个简单的函数示例，该函数执行查询并将结果集转换为一个\
  \ JSON 数组，该数组可以作为 REST API 结果返回。\n\n### 清单 3-4：从数据库返回 JSON 数组的 Node.JS 函数\n\n```javascript\n\
  exports.getorders = function(req, res) {\nconst { Connection, Request } = require(\"\
  tedious\");\nconst config = {\nserver: \".database.windows.net\",\noptions: {\n\
  database: \"WideWorldImporters-Full\",\nencrypt: true},\nauthentication: {\ntype:\
  \ \"default\",\noptions: {\nuserName: \"username\",\npassword: \"password\",\n}\n\
  }\n};\nconst connection = new Connection(config);\nconnection.on(\"connect\", err\
  \ => {\nif (err) {\nconsole.error(err.message);\n} else {\ngetOrders();\n}\n});\n\
  function getOrders() {\nvar data = []\nconst request = new Request(\n`SELECT TOP\
  \ 5 [o].[OrderID],\n[o].[OrderDate], [c].[CustomerName]\nFROM [Sales].[Orders] AS\
  \ [o]\nINNER JOIN [Sales].[Customers] AS [c]\nON [o].[CustomerID] = [c].[CustomerID]`,\n\
  (err, rowCount) => {\nif (err) {\nconsole.error(err.message);\n}\nelse {\nres.send(data)\n\
  }\n}\n);\nrequest.on(\"row\", function(row) {\ndata.push({\norderid: row[0].value,\n\
  orderdate: row[1].value,\ncustomername: row[2].value\n})\n});\nconnection.execSql(request);\n\
  }\n};\n```\n\n如其他编程语言的先前示例所示，`Connection` 和 `Request` 对象在打开到数据库的新连接、执行命令和检索结果方面扮演着核心角色（你可以在配套的\
  \ GitHub 仓库中找到完整的工作示例）。这两个对象提供了覆盖大多数常见场景的所有属性和功能，从定义参数化查询到事务管理或批量加载。\n\n本节并未涵盖所有可用的驱动和库，但提供了应用程序如何与\
  \ Azure SQL 连接的代表性概述，并且绝对可以应用于此处未提及的其他驱动。接下来，我们将重点介绍对应用程序数据访问层至关重要的高级和特定场景。\n\n\n\
  \n### 连接性方面\n\n如第 2 章简要提到的，网络连接是应用程序与 Azure SQL 交互的另一个基本方面。尽管这更关系到基础设施设计和网络安全，而非纯粹的应用程序开发，但你仍需要考虑在此过程中发挥作用的各种选项和组件，以成功连接到你的数据库实例。Azure\
  \ SQL Database 的单一数据库和托管实例部署模型都支持两种主要的应用程序连接选项：\n\n*   `私有虚拟网络`\n*   `公共连接`\n\n\
  托管实例在创建时会自动与 Azure 虚拟网络关联，而公共连接是可选的。对于单个 Azure SQL Database 实际情况正好相反，你应该依赖 Azure\
  \ Private Link 功能，通过私有端点和完全隔离的网络流量路径，将部署在支持虚拟网络的 Azure 服务之一上的应用程序连接起来。\n\n在需要公共连接的场景中，仍然可以考虑一些选项来管理应用程序与\
  \ Azure SQL 之间的网络流量：\n\n*   服务器级和数据库级防火墙\n*   `虚拟网络服务终结点`\n*   `虚拟网络安全组`\n\n服务器级和数据库级防火墙规则旨在定义哪些\
  \ IP 地址范围（来自公共互联网连接或各种 Azure 服务内部）可以与 Azure SQL Database 单一实例建立连接。如果存在数据库级防火墙规则（目前只能通过\
  \ `T-SQL` 命令创建），系统将首先评估这些规则以确定客户端连接是否来自允许的范围；否则，将检查服务器级规则（对与该虚拟服务器关联的所有数据库实例有效，可通过\
  \ `T-SQL`、`PowerShell/CLI` 或 `Azure 门户` 定义）。如果你决定信任来自 Azure 服务的所有网络连接，那么门户上有一个“允许\
  \ Azure 服务和资源访问此服务器”的复选框选项，可以简化你的设置。\n\n`虚拟网络服务终结点` 是一项功能，旨在确保只有来自你部署应用程序的一个或多个\
  \ `虚拟网络/子网` 对的网络连接才能被特定的 Azure SQL 服务器接受。\n\n在连接的应用程序端，可以创建 `虚拟网络安全组` 并将其与虚拟机的 `网络接口`\
  \ 或整个子网关联，以确保它们只能连接到你的 Azure SQL 实例所在的特定 IP 地址范围和端口。\n\n网络安全并不是影响数据库连接的唯一方面；网络延迟是另一个关键因素。连接策略决定了你的数据库连接如何与在\
  \ Azure SQL 中托管数据库的后端节点交互，可以是以下两种选项之一：\n\n*   `代理`\n*   `重定向`\n\n使用 `代理`，你可以获得最大的灵活性，可以从任何地方使用\
  \ `完全限定域名` 服务器名和仅端口 `1433` 连接到你的实例，但这些连接总是会通过一个网关前端层，这会增加网络延迟（通常对需要频繁交互的应用程序不利）。\n\
  \n`重定向` 策略则直接建立到托管数据库的节点的连接，减少了延迟并提高了应用程序吞吐量，但它要求应用程序主机和数据库之间开放特定的端口范围（`11000–11999`）。\n\
  \n所有来自 *外部* Azure 服务 IP 范围的连接的默认连接策略是 `代理`，而来自 *内部* Azure 的连接则是 `重定向`，但你可以通过 `PowerShell`\
  \ 和 `Azure CLI` 更改此默认设置。关于 Azure SQL 连接架构的更多细节可以在以下 URL 中找到：\n\n*   Azure SQL Database\
  \ 单一实例 – [`https://aka.ms/sdca`](https://aka.ms/sdca)\n*   Azure SQL Database 托管实例\
  \ – [`https://aka.ms/sdmica`](https://aka.ms/sdmica)\n\n### 弹性连接和查询执行\n\n在云架构上构建分布式系统，关于服务到服务交互需要采用特定的方法以提高弹性和可用性。这对于所有类型的云服务和交互（从事务解决方案到批处理）通常都是正确的。\n\
  \n在传统的本地解决方案中，数据库和应用服务器通常位于具有专用交换机和路由器等物理网络设备的附近，以提供稳定快速的连接。当发生硬件或软件故障时，尽管有适当的冗余和高质量设备，这些故障也可能造成相当大的影响，并持续到有人物理修复问题并使系统重新上线。\n\
  \n在云环境中，一切都是虚拟化和完全自动化的，因此你将有更多的移动部件，可能会引入一些瞬时连接问题，应用程序开发人员应该考虑这一点以使他们的应用程序整体更可靠。例如，Azure\
  \ SQL 会自动管理硬件或软件故障，或数据库节点服务应用程序请求的任何时刻的计划维护操作，但是，尽管故障转移到辅助节点的操作可能很快，但在该事件发生后的几秒钟内（平均约\
  \ 8 秒，最多不超过 60 秒），数据访问代码可能会遇到异常，之后才能正常响应请求。\n\n瞬时连接问题的其他例子可能与达到所选服务层和大小的 Azure SQL\
  \ 实例的最大限制有关。由于我们指的是多租户服务，维护整个系统的稳定性至关重要。如果发生此类事件，应用程序将暂时无法连接到 Azure SQL，直到资源利用率降低到给定阈值之内。\n\
  \n```\nif (transientError) {\n    await Task.Delay(retryDelay);\n    retryCount++;\n\
  }\n```\n\n\n\n### 重试逻辑\n\n为了使应用程序更加可靠，一种常见的方法是在数据库访问代码中引入适当的重试逻辑功能。重试逻辑通常指的是一种技术，它能够：\n\
  \n1.  拦截由瞬时条件引发的应用程序错误。\n2.  以固定的或递增的延迟间隔，对原始操作进行一定次数的重试。这样做是为了确保不会用注定会失败的请求淹没实例，从而避免通常产生的“车队效应”。\n\
  \n这种逻辑可以非常简单，比如在之前的尝试因返回特定异常而失败后，仅以固定的次数和一定的重试延迟来重新打开连接。\n\n重试逻辑更棘手的用例出现在一个操作最终会修改数据库状态时，例如插入新记录或更新一个或多个现有记录。如果在此命令执行过程中发生了瞬时错误，应用程序需要负责判断之前的尝试是在数据库被实际修改之前还是之后失败的。事实上，在这种情况下，客户端应用程序不能盲目地重新执行之前的命令，因为无法保证数据尚未被修改（例如，考虑银行账户交易的情况）。重试逻辑需要确保之前的事务要么已完全提交，要么整个操作已被回滚；否则，数据库可能会保持不一致的状态。基本上，用于事务性数据库代码的重试逻辑可能相当复杂，并且通常仅适用于那些你的数据修改代码是完全幂等（即，可以多次执行而不一定修改数据库状态）的用例。\n\
  \n如果建模正确，数据库将帮助你确保数据的一致性：例如，不允许插入一个订单号已存在的订单。话虽如此，你仍然需要处理返回的错误，因此实现稳健的重试逻辑将显著提高应用程序的可靠性和稳定性。\n\
  \n### 瞬时错误与持久错误\n\n实现健壮的重试逻辑机制的一个关键方面是，拦截并识别哪些错误应被应用程序解释为瞬时错误，哪些是永久性错误（重试逻辑对此无能为力）。\n\
  \n如前所述，有几类条件和事件可归类为瞬时错误，从底层硬件故障和自动重新配置到临时资源耗尽。瞬时问题也可能发生在堆栈的不同层：想象一下软件定义网络中的临时故障！虽然这些情况可能罕见且持续时间很短，但通过采用适当的编码实践来主动应对它们非常重要。Azure\
  \ SQL 的公共文档在此链接中提供了对不同层典型连接问题的全面解释：[`aka.ms/tciasb`](https://aka.ms/tciasb)。\n\n\
  ### 自定义代码或可重用库\n\n让我们看看如何按照前面章节的描述，实际实现一个用于数据库访问的简单重试逻辑机制。以下代码非常直接，仅通过将数据库交互方法包装在一个\
  \ `for` 循环中，并拦截其执行期间可能抛出的潜在异常，提供了基本的重试功能。\n\n```\nbool success = false;\nint retryCount\
  \ = 3;\nint retryInterval = 8;\nList RetriableCodes =\nnew List { 4060, 40197, 40501,\
  \ 40613,\n49918, 49919, 49920, 11001,208 };\nfor (int retries = 1; retries  1)\n\
  {\nThread.Sleep(1000 * retryInterval);\n// Retry interval increases by 50% every\
  \ retry\nretryInterval = Convert.ToInt32 (retryInterval * 1.5);\n}\nawait MyDatabaseOperation();\n\
  success = true;\nbreak;\n}\ncatch (SqlException se)\n{\nif (RetriableCodes.Contains(se.Number)\
  \ == true)\n{\n// Retriable error – log and continue\ncontinue;\n}\nelse\n{\n//\
  \ Non-retriable error – exit the loop\nbreak;\n}\n}\ncatch (Exception e)\n{\n//\
  \ Generic exception – exit the loop\nbreak;\n}\n}\nListing 3-5\n在 C# 应用程序中创建自定义重试逻辑\n\
  ```\n\n如你所见，即使是一个相当简单的数据库操作，要使其能够抵御瞬时错误，也需要大量的“粘合”代码和复杂性。想象一下，如果你的应用程序与其数据层之间的每个方法和交互都需要重复这样做！此外，这缺乏任何一致配置参数的选项，例如重试次数、固定或递增的延迟，甚至哪些异常应被视为瞬时错误，哪些是永久错误。\n\
  \n幸运的是，多年来，已经创建了许多可重用的库，几乎涵盖了每种编程语言和框架。这些库将那些“粘合”代码封装成可配置的机制，开发人员可以使用它们来使应用程序更加可靠。\n\
  \n对于 .NET 应用程序，最知名的重试逻辑库之一是“瞬时错误处理（TFH）应用程序块”。它最初是 Microsoft Enterprise Library\
  \ 框架的一部分，最近已移植到 .NET Core，并可以在以下 URL 免费下载：[`aka.ms/eltfhc`](https://aka.ms/eltfhc)。\n\
  \n它是一套完全可配置且全面的类，让你能够定义自己的 `RetryStrategy`（例如，`FixedInterval`、`Incremental`、`ExponentialBackoff`），并使用标准（开箱即用）或自定义的瞬时错误检测逻辑。这两个组件结合起来定义了一个\
  \ `RetryPolicy`，这就是你用来包装数据库访问活动的类。让我们看看使用这个框架的实际实现。\n\n```\npublic async Task> GetOrders()\n\
  {\n// Get retry strategy\nRetryStrategy retryStrategy =\nconfig.GetRetryStrategies()\n\
  [\"MyFixedStrategy\"];\n// Create retry policy\nRetryPolicy retry = new\nRetryPolicy(retryStrategy);\n\
  // Wrap database interaction with retry policy\nawait retry.ExecuteAsync(async ()\
  \ => {\nList orders = new List();\nusing (SqlConnection cnn =  new SqlConnection(\n\
  _config.GetConnectionString\n(\"DefaultConnection\")))\n{\nSqlCommand cmd = new\
  \ SqlCommand\n(@\"SELECT TOP 5\n[o].[OrderID],\n[o].[OrderDate],\n[c].[CustomerName]\n\
  FROM [Sales].[Orders] AS [o]\nINNER JOIN [Sales].[Customers] AS [c]\nON [o].[CustomerID]\
  \ = [c].[CustomerID]\",cnn);\nawait cnn.OpenAsync();\nSqlDataReader dr = await cmd.ExecuteReaderAsync();\n\
  while (dr.Read())\n{\norders.Add(new Order()\n{\nOrderID = Convert.ToInt32(dr[0]),\n\
  OrderDate = Convert.ToDateTime(dr[1]),\nCustomerName = Convert.ToString(dr[2])\n\
  });\n}\n}\nreturn orders;\n});\n}\nListing 3-6\n在 C# 应用程序中使用重试逻辑库\n```\n\n在这个代码片段中（你可以在配套的\
  \ GitHub 仓库中找到完整的示例），我们主要在配置文件中配置重试策略的细节，本质上定义了所有参数，如重试次数、重试间隔等。\n\n\n\n您可能希望在应用程序中定义更多的重试策略，并根据要重试的数据库操作类型来使用它们。例如，对于不频繁的数据检索操作，您可能希望定义一个更激进的重试策略，具有更高的重试次数；而对于不同的用例，您可能希望快速退后一步，将错误返回给最终用户，以便他或她能够根据错误做出不同的决策。\n\
  \n下一步是确定您想要使用的错误检测策略。TFH 提供了一个开箱即用的类 `SqlDatabaseTransientErrorDetectionStrategy`，该类封装了\
  \ Azure SQL 在遇到暂时性错误时最常发出的错误代码的检测逻辑。在这个例子中，我们通过创建一个实现 `ITransientErrorDetectionStrategy`\
  \ 接口的类来创建了一个自定义策略，因为我们希望用一些非暂时性错误来测试我们的重试逻辑。\n\n然后，您通过组合您的重试策略和暂时性错误检测类来创建一个 `RetryPolicy`\
  \ 实例，该实例将提供 `ExecuteAction()` 或 `ExecuteAsync()` 方法来有效地包装数据库访问代码。\n\n重试策略类还公开了一个\
  \ `Retrying` 事件，您可以订阅该事件，以便在重试逻辑拦截到暂时性错误并重试操作时得到通知。\n\n.NET 领域另一个流行的库是 Polly（[`https://aka.ms/avnp`](https://aka.ms/avnp)），它通过实现\
  \ Circuit Breaker、Timeout、Bulkhead Isolation 和 Fallback 等弹性模式，提供了涵盖其他应用程序可靠性方面的功能，而不仅仅是重试。\n\
  \n大多数其他编程语言和框架中也存在类似的实现。在 Python 中，一个常见的库称为 Tenacity（[`https://aka.ms/tenacity`](https://aka.ms/tenacity)），并提供类似的功能。Tenacity\
  \ 作为一个通用的装饰器 `@retry` 应用到您希望自动重试的方法上。您可以指定几个参数，例如尝试次数（停止条件）和尝试之间的延迟（称为等待条件），当然还可以自定义哪些异常类型应被视为可重试的。这个实现非常简单易用；让我们在下一个示例中看看它的实际应用。\n\
  \n```python\nimport pyodbc\nimport random\nfrom tenacity import *\nimport logging\n\
  def is_retriable(value):\n    # 定义所有可重试的错误代码，来源 https://docs.microsoft.com/en-us/azure/sql-database/troubleshoot-connectivity-issues-microsoft-azure-sql-database\n\
  \    RETRY_CODES = [1204,1205,1222,49918,49919,49920,4060,4221,40143,40613,40501,\
  \  40540,40197,10929,10928,10060,10054,10053,233,64,20,0]\n    ret = value in RETRY_CODES\n\
  \    return ret\n@app.route('/order')\n@retry(stop=stop_after_attempt(3), wait=wait_fixed(10),\
  \ after=after_log(logger, logging.DEBUG))\ndef getorders():\n    cnxn = pyodbc.connect(\"\
  DRIVER={ODBC Driver 17 \" \\\n        \"for SQL Server};\" \\ \"SERVER=\"+server+\"\
  ;DATABASE=\"+database+\"\" \\\n        \";UID=\"+username+\";PWD=\"+ password)\n\
  \    try:\n        cursor = cnxn.cursor()\n        tsql = \"SELECT TOP 5 \" \\\n\
  \            \" [o].[OrderID], [o].[OrderDate],\" \\\n            \" [c].[CustomerName]\"\
  \ \\\n            \" FROM [Sales].[Orders] AS [o]\" \\\n            \" INNER JOIN\
  \ [Sales].[Customers] AS [c]\" \\\n            \" ON [o].[CustomerID] = [c].[CustomerID]\"\
  \n        rows = cursor.execute(tsql).fetchall()\n        order_list = []\n    \
  \    for row in rows:\n            d = collections.OrderedDict()\n            d['orderID']\
  \ = row.OrderID\n            d['orderDate'] = str(row.OrderDate)\n            d['customerName']\
  \ = row.CustomerName\n            order_list.append(d)\n    except Exception as\
  \ e:\n        if isinstance(e,pyodbc.ProgrammingError) or isinstance(e,pyodbc.OperationalError):\n\
  \            if is_retriable(int(e.args[0])):\n                raise\n         \
  \   pass\n    return json.dumps(order_list)\n```\n**Listing 3-7** 在 Python 应用程序中实现重试逻辑\n\
  \n在这个示例中，我们使用 Tenacity 来装饰一个与数据库交互的 Flask 方法 `getorders()`，并且在出现异常时，我们以固定间隔 10 秒重试三次。我们没有在装饰器的属性中指定要重试的异常，而是用一个\
  \ `try/except` 块包装了 `pyodbc` 方法，并检查异常是否与数据库访问有关。在这种情况下，我们检查底层数据库错误代码是否包含在我们维护的可重试错误列表中，如果是，我们只是引发该异常，以便\
  \ `@retry` 装饰器可以自动重试该方法，直到它成功或达到最大尝试次数而应该停止尝试。\n\n即使在 Java 中，也有多种选项可以实现相同的结果。最常用的之一称为\
  \ Failsafe（[`https://aka.ms/jnfs`](https://aka.ms/jnfs)），它与我们之前提到的瞬态错误处理库非常相似。无需在另一个完整的应用程序中演示它，以下代码片段展示了如何快速使用\
  \ Failsafe 的主要类：\n\n```java\n// 定义一个具有熟悉参数的重试策略实例\nRetryPolicy retryPolicy = new\
  \ RetryPolicy()\n    .handle(ConnectException.class)\n    .withDelay(Duration.ofSeconds(1))\n\
  \    .withMaxRetries(3);\n\n// 使用该重试策略包装您的数据库交互代码\nFailsafe.with(retryPolicy).run(()\
  \ -> connect());\n```\n\n\n\n### 连接最佳实践\n\n让我们从一个非常基础的要点开始：在数据库应用程序中，延迟至关重要！这意味着，出于性能考虑，确保你的应用程序代码尽可能靠近数据库运行是非常重要的，无论它将部署在哪个\
  \ Azure 服务上。对于执行大量数据库交互或往返通信的应用程序来说尤其如此，在这种情况下，延迟的影响很容易变得比实际处理时间更大。\n\n![../images/493913_1_En_3_Chapter/493913_1_En_3_Fig1_HTML.jpg](img/493913_1_En_3_Fig1_HTML.jpg)\n\
  图 3-1 与数据库的往返通信\n\n至少，你应该确保应用程序部署在数据库实例所在的同一区域。如果你在设计一个高可用的跨区域解决方案，这可能也会带来一些架构上的影响。这意味着你需要相应地规划数据层和应用层的故障转移，以在主站点发生故障时将延迟影响降至最低。\n\
  \n同样重要的是，要理解 Azure SQL 的整体连接架构（在官方文档中有解释：[`https://aka.ms/sdmica`](https://aka.ms/sdmica)），并确保如果你的应用层运行在\
  \ Azure 服务中（例如虚拟机、应用服务或 Azure Kubernetes 服务），它使用了 `Redirect` 连接策略。这意味着你的应用程序将直接与托管数据库实例的节点通信，而不是每次交互都通过网关层。如果你的应用程序每分钟执行的查询远不止几个，那么从性能角度来看，这个选项将产生显著的差异，而所需的权衡仅仅是确保你的客户端代码所在网络配置中开放了\
  \ 11000–11990 范围内的端口。\n\n虽然这听起来可能很基础，但另一个关于连接的建议是，确保你的代码在执行某些有意义的命令之前，尽可能晚地打开与 Azure\
  \ SQL 数据库实例的连接，并在结果被消费后尽快关闭该连接。实际上，大多数驱动库都设计为利用 `连接池` 机制，该机制可以帮助你在打开一个全新的物理连接（例如，一个\
  \ TCP 套接字）的成本（这总是伴随着一定的毫秒级开销）与保持过多连接一直打开的成本（这会增加服务端消耗的资源，如内存、工作线程等）之间取得平衡。\n\n`连接池`\
  \ 在进程级别工作，即使你在应用程序代码中显式调用了关闭或处置方法，它也会在一段时间内保持物理连接处于打开状态。这样，如果稍后执行了使用相同连接字符串参数打开连接的新请求，将会重用现有的物理连接，而不是打开一个全新的连接。\n\
  \n得益于这种方法，在典型的 Web 应用程序或 Web API 场景中，即使有数千名用户访问某个页面，在任何给定时间只保持几十个真实的数据库连接打开的情况并不少见，这显著减少了为\
  \ Azure SQL 数据库实例产生的开销。\n\n一般来说，在大多数多线程应用程序对 Azure SQL 实例执行常规数据库工作负载（查询、事务等）的场景中，出于性能原因，建议利用\
  \ `连接池`。此通用规则的唯一例外是你的应用程序确实需要精确控制如何针对数据库执行特定操作。一个很好的例子是数据定义语言（`DDL`）命令（`CREATE`,\
  \ `ALTER`, `DROP`，这些将在后面讨论，它们作用于数据结构而非数据本身），你的应用程序可能会向数据库发出这类命令，通常一次只在一个连接上执行，并且命令在该连接上被序列化。\n\
  \n如前所述，大多数现有驱动都开箱即用地提供了此功能，甚至默认启用，例如 `.NET Data Provider for SQL Server`，但有一个重要的例外。在\
  \ Java 领域，历史上连接池一直是与 `JDBC` 驱动分开实现的，因此 `SQL Server` 的驱动本身不提供此功能。\n\n值得庆幸的是，有许多外部包为你的\
  \ Java 应用程序提供了此功能，其中最知名的之一无疑是 `HikariCP` ([`https://aka.ms/hikaricp`](https://aka.ms/hikaricp))，如前所述。但需要注意的是，一般来说，Java\
  \ 驱动在检测所谓的“陈旧连接”方面存在一些挑战，即由于临时问题而丢失了与数据库实例底层连接的客户端连接对象，除非尝试执行测试命令（通过显式调用 `java.sql.Connection.isValid()`，该方法会定期\
  \ ping 数据库以确保连接是打开的）。在其他驱动中，这通常通过在较低级别检查 TCP 套接字状态来执行，但 Java 原生 API 在这方面存在问题。类似的问题也可能在命令执行期间发生，此时结果集正在被你的应用程序代码消费。这里的建议是，仔细配置你的\
  \ `JDBC` 驱动和连接池类，设置适当的超时，以避免在错误时间发生临时错误时应用程序可能永远挂起。关于这些配置的所有细节，在这篇文章中有进一步解释：[`https://aka.ms/jdbc-connection-guidance`](https://aka.ms/jdbc-connection-guidance)。\n\
  \n其他高级语言和框架，如 Python 和 `pyodbc`，也可能遭受相同的临时连接问题，因此也推荐采用相同的方法和指导原则。\n\n\n\n## 异常处理\n\
  \n打开到数据源的连接和执行命令这些操作，自然可能会发生错误。错误范围可能从服务器网络连接缺失，到违反某些维护数据完整性的规则（这些规则编码在数据库中，如主键、关系等），甚至包括应用程序中或维护操作期间的并发管理问题（例如，锁定/阻塞）（数据库引擎错误代码的完整列表可在此处查阅：[`https://aka.ms/eaerde`](https://aka.ms/eaerde)）。因此，有必要为执行数据库交互的应用程序代码，提供一种适当的拦截机制和错误状况管理方案。\n\
  \n大多数编程语言和框架都通过 try/catch（或 except）方法实现异常处理。在 try 块中，你通常会放置那些预计可能生成异常的指令，例如打开连接、执行命令，或者调用一个本身也可能生成应用程序异常的组件。如果这些操作中的某一个失败，应用程序控制权将传递给第一个\
  \ catch/except 块，该块指定了与已发生异常兼容的异常类型。通常，这些异常类型提供了有关失败的具体操作的所有信息；这些信息随后在 catch 块中可用，以便你能够编写适当的逻辑来处理它。\n\
  \n在 T-SQL 语言中（例如，在存储过程内部），除了可能由与数据库对象交互的命令（例如，违反主键约束）生成的错误之外，你还可以通过使用 `RAISERROR`\
  \ 或 `THROW` 函数生成表示过程中逻辑错误的异常，从而使你的应用程序能够相应地做出行为反应。\n\n你可以向 `RAISERROR` 函数传递错误消息、严重级别和代码，根据严重程度，客户端提供程序将相应地采取行动：\n\
  \n*   级别 10 或更低，连接不会中断，也不会生成异常。消息仍然可以从客户端驱动程序收集。\n*   级别 11 到 19，连接保持打开状态，但会抛出异常。\n\
  *   超过 19 的级别被视为致命错误，会抛出异常，并且连接会被终止。\n\n对于 Azure SQL，严重级别等于或小于 10 生成的错误实际上并不生成异常，而是被视为简单的信息性消息或警告消息。驱动程序库通过特定的类（例如，*.NET\
  \ Provider for SQL Server* 中的 `InfoMessage`）以及适当的异常收集机制来捕获此信息。\n\n至少，你还需要将这些关于错误状况的详细信息作为日志记录策略的一部分，供负责运行你的应用程序的运维团队进行后续分析。除此之外，你必须决定是仅重试操作（如重试逻辑部分所述）还是将信息返回给调用者，哪种选择更为正确，以便能够针对每个特定用例做出关于最佳行动方案的适当决策。\n\
  \n## 框架、ORM 和 MicroORM\n\n到目前为止，我们提到客户端驱动程序通常提供基础的抽象层来连接、查询和使用 Azure SQL 数据库实例的结果。话虽如此，在大多数情况下，应用程序开发人员通常寻求更高级别的抽象，以帮助他们提高工作效率，并消除重复且可能容易出错的数据访问任务，例如在他们的应用程序逻辑中表示数据实体并与之交互。\n\
  \n为了实现更高的生产力，在过去大约 20 年里创建了许多数据访问框架，它们可以分为两大类：\n\n*   辅助类：仅封装这些基础抽象并简化常见任务\n*  \
  \ 对象关系映射器（ORM）：提供丰富的数据建模和映射能力，以减少关系结构与面向对象编程之间的阻抗不匹配\n\n下表按编程语言列出了一些市场上最流行（非详尽）的库：\n\
  \n| **语言** | **推荐/流行的库** |\n| --- | --- |\n| .NET | • 数据集• Entity Framework (Core)• Dapper\
  \ |\n| Java | • Spring Data• Hibernate |\n| PHP | • Doctrine• Eloquent |\n| Node.js\
  \ | • RxDB• TypeORM• Sequelize |\n| Python | • SQLAlchemy• Django• pandas |\n| Ruby\
  \ | • ActiveRecord |\n| Go | • Gorm |\n\n在接下来的章节中，我们将更深入地探讨其中一些。\n\n### 数据访问框架\n\
  \n虽然基础抽象通常会控制数据库交互的每个可能方面，但它们可能需要在你的应用程序中编写大量样板代码，以将逻辑中表示更高级别实体的对象和结构转换为数据库结构中的行和列。\n\
  \n多年来，创建了许多库和框架来简化这个问题，同时仍然让你控制代码如何与数据交互。举一个实际例子，在 .NET 领域，`ADO.NET Provider for\
  \ SQL Server` 从第一个版本开始就提供了除了 `SqlConnection`、`SqlCommand` 和 `SqlDataReader` 类（通常被称为\
  \ SqlClient 库的“连接”部分）之外的其他许多类。这些类用于以更“面向对象”的方式解释和导航查询结果，同时也负责将原始数据所做的任何更改持久化回底层数据库。我指的是像\
  \ `SqlDataAdapter` 和 `DataSet`（类型化或非类型化）这样的类。`DataSet` 是从代码中从头填充或从对数据库的一次或多次查询返回的结果集的内存中表示，它提供了围绕离线更改跟踪、数据验证以及实体间关系管理的额外逻辑。`SqlDataAdapter`\
  \ 充当 `DataSet` 和数据库对象之间的“连接器”，既可以自动生成获取对内存数据的更改并将其持久化到后端数据库的 T-SQL 命令，也可以利用现有的命令和存储过程来出于性能或并发原因控制这些数据库操作的所有方面。数据集也可以从数据库架构自动生成，并成为完全类型化的对象，将内部结果集作为命名集合（例如，Customers、Orders\
  \ 等）而不是行和列来公开。要了解更多关于这些选项的信息，你可以在此链接找到完整的介绍：[`https://aka.ms/dnfado`](https://aka.ms/dnfado)。\n\
  \n类似的辅助类在其他编程框架中也非常流行。例如 Java 的 `Spring Data Access` ([`https://aka.ms/sfrda`](https://aka.ms/sfrda))\
  \ 或 Python 的 `SQLAlchemy Core` 类。\n\n```python\ndef getorders():\n    # 使用 SQL Server\
  \ 方言创建 SQLAlchemy 引擎\n    engine = create_engine(\"mssql+pyodbc:///?odbc_connect=%s\"\
  \ % connectionString)\n    # 初始化元数据存储库\n    metadata = MetaData()\n    # 为结果集定义元数据\n\
  \    orders = Table('Orders', metadata,\n        Column('orderid', Integer, primary_key=True),\n\
  \        Column('customerid', Integer),\n        Column('orderdate', Date),\n  \
  \      schema='Sales'\n    )\n    customers = Table('Customers', metadata,\n   \
  \     Column('customerid',Integer,primary_key=True),\n        Column('customername',String),\n\
  \        schema='Sales'\n    )\n    # 使用类 SQL 语法定义我们的查询\n    s = select([orders.c.orderid,orders.c.orderdate,customers.c.customername]).\\\
  \n        select_from(orders.join(customers, orders.c.customerid==customers.c.customerid)).\\\
  \n        limit(10)\n    try:\n        # 打开到数据库的连接\n        cnn = engine.connect()\n\
  \        # 执行 SQLAlchemy 命令\n        res = cnn.execute(s)\n        # 遍历结果\n    \
  \    for row in res:\n            print(row)\n        # 关闭连接\n        cnn.close()\n\
  \    except Exception as e:\n        print (e)\n        pass\n```\n\n*列表 3-8*\n\
  在 Python 应用程序中使用 SQLAlchemy\n\n\n\n在这个简单的例子中，你可以看到 SQLAlchemy 如何让我们定义应用程序实体的内存表示，以及它们如何映射到数据库表。通过使用应用层的类\
  \ SQL 语法，我们可以指定包含高级操作（如连接、过滤、聚合、投影等）的查询，SQLAlchemy 类会将此转换为 Azure SQL 特定的 SQL 语法，但你也可以轻松地将相同的代码移植到其他受支持的数据库系统。虽然\
  \ SQLAlchemy 能做的远不止这些（我们这里只是浅尝辄止），但它最强大的功能已经超越了数据访问框架的范畴，属于**对象关系映射器（Object-Relational\
  \ Mappers）**的领域，这也是下一节的主题。\n\n## ORM\n\nORM 的目的是在关系型世界和面向对象世界之间进行协调，让开发者能够使用代表应用程序领域的强类型对象来编写与关系型数据库中存储的数据交互的应用程序，从而减少他们通常需要编写的冗余（或“管道”）数据访问代码。下表概述了可用于连接\
  \ Azure SQL 的各种 ORM 库：\n\n| **语言** | **平台** | **ORM** |\n| --- | --- | --- |\n|\
  \ C# | Windows, Linux, macOS | Entity Framework |\n|  |  | Entity Framework Core\
  \ |\n| Java | Windows, Linux, macOS | Hibernate ORM |\n| PHP | Windows, Linux, macOS\
  \ | Laravel (Eloquent) |\n|  |  | Doctrine |\n| Node.js | Windows, Linux, macOS\
  \ | Sequelize ORM |\n| Python | Windows, Linux, macOS | Django |\n| Ruby | Windows,\
  \ Linux, macOS | Ruby on Rails |\n\n该领域最早且最成功的库之一是 Java 的 Hibernate ([`https://aka.ms/horm`](https://aka.ms/horm))，出现于\
  \ 21 世纪初，其目标是提供比 Enterprise Java Beans 实体更好的体验，以便在不必要使用 SQL 命令的情况下将数据持久化到数据库中。多年来，这些库变得越来越强大和复杂（对某些人来说甚至过于复杂，以至于创建了像“微\
  \ ORM”库这样的替代品）以涵盖数据访问层的其他方面，如建模、安全性和可扩展性。\n\n微软自家用于 .NET 世界的 ORM 是 Entity Framework\
  \ (EF)，其较新的版本是 EF Core ([`https://aka.ms/ghdnefc`](https://aka.ms/ghdnefc))。EF Core\
  \ 可与多种后端数据库存储一起工作，如 SQL Server、Azure SQL Database、SQLite、Azure Cosmos DB、MySQL、PostgreSQL\
  \ 以及其他通过提供程序插件 API 连接的数据库。它是该领域 10 多年开发的成果，并提供了诸如 LINQ 查询、离线变更跟踪、批处理更新以及通过名为“迁移（migrations）”的功能进行数据库架构管理等特性。\n\
  \n该库的核心是 `DbContext` 类，开发者可以用它来创建其数据库交互上下文，并建模数据库表将如何映射到实体和集合，以及对这些实体的操作将如何透明地转换为\
  \ SQL 代码，以在数据库中读取、创建或更新记录。\n\n```\nusing(var dbctx = new WWImportersContext())\n\
  {\nvar res = dbctx.Orders\n.Include(\"Customer\")\n.Select (o => new\n{o.OrderID,o.OrderDate,o.Customer.CustomerName})\n\
  .ToList().Take(10);\nforeach(var o in res)\n{\nConsole.WriteLine(\"OrderId: {0}\
  \ - OrderDate: {1} - CustomerName: {2}\",o.OrderID,o.OrderDate,o.CustomerName);\n\
  }\n}\nclass Order\n{\npublic int OrderID {get;set;}\npublic DateTime OrderDate {get;set;}\n\
  public int CustomerID {get;set;}\npublic Customer Customer {get;set;}\n}\nclass\
  \ Customer\n{\npublic int CustomerID {get;set;}\npublic String CustomerName {get;set;}\n\
  }\nclass WWImportersContext : DbContext\n{\n// 模型构建在此片段中故意省略\npublic DbSet Orders\
  \ {get;set;}\npublic DbSet Customers {get;set;}\n}\n列表 3-9\n在 C# 应用程序片段中使用 Entity\
  \ Framework Core\n```\n\n让我们关注这个简单例子的三个关键方面：\n\n*   首先，两个 **POCO**（Plain Old CLR\
  \ Objects）类 `Order` 和 `Customer`，它们代表了我们的应用程序管理的业务实体。\n*   `WWImportersContext`\
  \ 类，继承自 `DbContext`，它代表了我们的应用程序用于连接和查询数据库的上下文。具体来说，它确实包含两个映射到数据库表的 `DbSet` 集合。\n\
  *   与数据库上下文交互并表达我们想要检索哪些实体的 **LINQ** 查询。\n\n正如你在完整示例中（请参阅 GitHub 仓库）所注意到的，有趣的是看到我们的\
  \ `WWImportersContext` 类如何重写其基类的 `OnConfiguring` 和 `OnModelCreating` 方法来准确实现其名称所暗示的功能：配置我们的上下文与数据库通信的方式，以及定义一个模型，其中我们的实体映射到相应的数据库表。我们还配置了日志记录基础设施，以展示由上下文自动生成的\
  \ T-SQL 代码的样子。非常直观，不是吗？\n\nEntity Framework Core 还能做更多的事情，你可以通过这个免费的 Microsoft Learn\
  \ 在线课程 ([`https://aka.ms/lmpsefc`](https://aka.ms/lmpsefc)) 开始熟悉所有这些功能。\n\n“**能力越大，责任越大**”，因此有一些基本的良好实践你应该始终牢记，以从像\
  \ EF Core 这样的 ORM 工具中获得最大收益：\n\n*   首先，确保你只从数据库中提取你真正需要的数据，并让你的结果集尽可能高效。\n*   如果你的应用程序只需要根据查询结果具体化对象并将其显示在屏幕上，但永远不会修改和更新它们，请关闭变更跟踪。这将避免浪费大量应用程序资源来跟踪你永远不会使用的对象状态信息。\n\
  *   相反，如果你的应用程序将在其数据库上下文中创建或更新许多实体，请确保你利用批处理（例如，在你的 `DbSet` 集合上调用 `AddRange()` 方法）。EF\
  \ Core 将在后台创建一个表值参数（Table-Valued Parameter, TVP），并将其用于 MERGE 语句中，以在一次数据库往返中插入多行。这为\
  \ Azure SQL 提供了许多好处，包括降低延迟和最小化事务日志压力。对于非常大的批量操作（大于 10,000 行），你可能希望在 Entity Framework\
  \ 之外执行它们（例如，使用 ADO.NET 的 `SqlBulkCopy` 类）或使用一个名为 EFCore.BulkExtensions ([`https://aka.ms/efcbe`](https://aka.ms/efcbe))\
  \ 的很好的 EF Core 扩展。\n*   在可能的情况下，启用日志记录并验证 EF Core 生成的 T-SQL 语法。\n*   在复杂的数据库交互情况下，通过\
  \ EF Core 使用原始 SQL 命令或存储过程可以解决性能和灵活性问题。\n\n\n\n### 微 ORM\n\n对于那些不需要完整 ORM 库复杂性的场景，近年来出现了一类简化的工具，通常被称为微\
  \ ORM。其中最成功的可能是 StackExchange 的 Dapper（[`https://aka.ms/ghsaed`](https://aka.ms/ghsaed)）。基本上，Dapper\
  \ 提供了一种基于 SQL 查询快速高效地物化对象的方法，对于不需要跟踪断开连接的更改或将对象完整持久化到数据库的应用场景来说，这是一个很好的解决方案。Dapper\
  \ 扩展现有的`IDbConnection`接口（在各种 ADO.NET 数据提供程序中可用），并提供辅助方法来执行 T-SQL 查询并将结果映射到 POCO\
  \ 对象集合，或以高性能的方式执行修改数据库状态的命令。以下示例展示了如何使用 Dapper 检索结果集。\n\n```\nclass Program\n{\n\
  \    static void Main(string[] args)\n    {\n        using (SqlConnection cnn =\
  \ \n            new SqlConnection(\n                \"Server=tcp:.database.windows.net,\"\
  +\n                \"1433;Initial Catalog=WideWorldImporters-Full;\"+\n        \
  \        \"User ID=;Password=;\"))\n        {\n            var orders = cnn.Query(\"\
  SELECT TOP 10 OrderID, OrderDate, CustomerID FROM Sales.Orders;\");\n          \
  \  foreach (var o in orders)\n            {\n                Console.WriteLine(\"\
  OrderId: {0} - OrderDate: {1} - CustomerId: {2}\",o.OrderID,o.OrderDate,o.CustomerID);\n\
  \            }\n        }\n    }\n}\nclass Order\n{\n    public int OrderID {get;set;}\n\
  \    public DateTime OrderDate {get;set;}\n    public int CustomerID {get;set;}\n\
  }\n```\n\n清单 3-10\n在 C#应用程序中使用 Dapper\n\n此示例展示了像 Dapper 这样的微 ORM 如何在底层的`SqlConnection`、`SqlCommand`和`SqlDataReader`类与更复杂但功能更强大的解决方案（如\
  \ Hibernate 或 Entity Framework）之间取得良好平衡。\n\n## 使用只读副本\n\nAzure SQL 高级层、业务关键层和超大规模层数据库实例的一个好处是，作为其高可用性架构的一部分，会部署多个辅助副本，并通过底层基础设施以最小延迟与主副本保持同步。默认情况下在高级层和业务关键层启用的*Read\
  \ Scale-Out*功能，使您能够针对其中一个辅助副本运行只读工作负载，而不会影响主读写副本的性能，且无需额外成本。\n\n从数据访问的角度来看，这非常易于使用，因为它只需要在连接字符串中添加`ApplicationIntent=ReadOnly;`属性，该连接的所有流量将自动重定向到数据库的只读副本。超大规模性能层也提供了此功能，但您必须显式为数据库创建至少一个辅助副本才能利用它。\n\
  \n您的应用程序可以通过检查命令`SELECT DATABASEPROPERTYEX(DB_NAME(), 'Updateability')`是否确实返回`READ_ONLY`结果来确保它连接到只读副本。值得记住的是，虽然只读副本处于事务一致的状态，但在极少数情况下，与主副本中的数据相比可能会有一些小的延迟。此外，在撰写本文时，某些功能如查询存储、扩展事件和审核在只读副本上尚不支持，尽管可以使用传统的\
  \ DMV 进行监控，如`sys.dm_db_resource_stats`、`sys.dm_exec_query_stats`、`sys.dm_exec_query_plan`和`sys.dm_exec_sql_text`，这些方法可以按预期工作。有关此有趣功能的更多详细信息，请参阅官方文档：[`https://aka.ms/sqrso`](https://aka.ms/sqrso)。\n\
  \n## 延伸阅读\n\n本章为您全面介绍了如何使用传统驱动程序和更先进的数据访问框架，从各种传统和现代编程语言连接到 Azure SQL 数据库实例。它提供了一些最佳实践，关于如何有效地提高连接可靠性，并使您的应用程序在基于云的环境中设计和实现分布式系统时，能够更好地应对可能发生的瞬态连接问题。要深入了解其中一些主题，我们建议查看以下链接：\n\
  \n*   快速入门：Azure SQL 数据库连接和查询 – [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connect-query`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connect-query)\n\
  *   Azure SQL 瞬态错误 – [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connectivity-issues`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-connectivity-issues)\n\
  *   Dapper.NET – [`https://medium.com/dapper-net`](https://medium.com/dapper-net)\n\
  *   如何使用批处理提高 SQL 数据库应用程序性能 – [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-use-batching-to-improve-performance`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-use-batching-to-improve-performance)\n\
  \n\n# 4. 使用 Azure SQL 进行开发 – 基础篇\n\n现在，你已经了解了如何创建 Azure SQL 数据库、如何连接到它以及如何还原示例数据库，是时候开始了解\
  \ Azure SQL 为现代开发者提供了哪些功能。\n\n在本章中，我们将探讨所有能帮助你创建现代应用程序的主要特性，并以示例数据库 `WideWorldImporters`\
  \ 作为我们的实践平台。\n\n一如既往，本书将采取非常实用的方法。我们假设你对表有一个基本概念：表是一个由列组成的实体，每一列都有其名称和数据类型，其中包含数据行。列定义了数据的形态，即\
  \ `schema`（模式）。为了存储在表中，数据必须遵守其模式，这意味着必须遵循列数据类型和约束；否则，数据库将拒绝该数据。这种方法最近被定义为 `schema-on-write`（写入时模式）：在数据写入数据库时检查其与模式的一致性。这确保了数据与使用它的应用程序所预期的保持一致。一些其他数据库提供了\
  \ `schema-on-read`（读取时模式）方法，即所有数据都可以存储，模式仅在有人尝试读取数据时进行检查。这两种方法各有优缺点；由于数据只有在一致且有意义时才有用，因此无论你选择哪种方法，都必须确保所提供的数据在逻辑上是正确和合理的。通过\
  \ `schema-on-write` 方法，Azure SQL 会与你协作以确保这一点发生，因为它会为你检查数据是否始终与定义的模式一致。如果不一致，它将返回错误。这种行为可能看起来有些死板，有时也确实如此，因此\
  \ Azure SQL 在某种程度上也支持 `schema-on-write`，即原生支持存储和操作 `JSON` 文档。请记住，在 `schema-on-read`\
  \ 模式下，你需要在应用程序内部编写代码，在使用数据之前对其进行验证。在大多数常见情况下，这是一项相当繁重的任务，最好由像 Azure SQL 这样的专门实体来处理，这可以大大减轻你作为开发者的工作量，并有助于更好地实现关注点分离。数据一致性和完整性主要是数据库的问题，它可以为访问其数据的所有解决方案以集中方式处理。\n\
  \n关于表的更深入讨论将在第 6 章中进行，但考虑到开发者通常从处理现有数据库开始工作，我们认为最好先了解我们可以对已有数据做些什么。\n\n我们能做的事情有很多！因此，本章旨在为你提供所有你需要了解的功能的全面概述，以确保你真正利用了\
  \ Azure SQL 的全部潜力。\n\n由于 Azure SQL 中为开发者集成了如此多的功能，在本章中你将只看到冰山一角。请务必使用本书附带的代码示例来了解功能的更多细节并查看它们的实际操作。利用参考资源深入了解所有功能及其选项。\n\
  \n请记住，本书就像一个跳板，旨在推动你更好地潜入数据的海洋！\n\n## 将计算推送到数据端\n\n我强烈建议将尽可能多的计算需求推送到数据端，而不是将数据拉取到你这里。移动数据是一项繁重、复杂且消耗资源的任务。移动计算逻辑则容易得多，因为它更加紧凑和轻量级。此外，通过使用我们稍后将讨论的\
  \ `视图`、`函数` 或 `存储过程`，你甚至不需要移动源代码或编译后的二进制文件。\n\n但将计算推送到数据端的主要好处是，你可以真正利用你为使用像 Azure\
  \ SQL 这样的数据库所支付的所有费用。如果你必须在自己的代码中实现所有的查询、筛选和优化逻辑，那为什么还要使用数据库呢？直接使用便宜得多的文件存储，你就能省下很多钱。\n\
  \n嗯，这可能是表面印象，但实际上，如果你不使用 Azure SQL，你仍然需要花费时间来实际实现那些你放弃的功能。所以，它实际上并不会那么便宜。\n\n事实证明，如果你还考虑到你可能需要维护和演进这些功能，它实际上会更昂贵。而且可能只有你一个人或少数几个人在做这些事，而对于\
  \ Azure SQL，有数百名工程师每天都在为此工作，只有一个目标：尽可能地提高其性能和能力。通过将计算推送到数据端，你可以获得所有这些幕后工作的工程师带来的好处。这可以影响你和你应用程序的性能：让我给你一个非常实际的例子。\n\
  \n如果你需要在一个包含 `5000 万` 行数据的表中找出不同的值，就在不那么久以前，你可能需要等待大约 `5 秒钟`。还不错，对吧？然而，如果你正在创建一个为移动应用程序提供服务的\
  \ API，`5 秒钟` 在当今世界是非常漫长的。在过去的几年里，驱动 Azure SQL 的引擎通过添加列存储表和向量（或批处理）执行得到了改进，这些执行利用了\
  \ `SIMD` CPU 指令集以及一些高级优化技术，如 `分组聚合下推`。通过所有这些改进，同样的查询现在只需要 `个位数毫秒` —— 从原来的 `5000\
  \ 毫秒` 降至 `个位数毫秒`。\n\n你能想象如果你没有将计算推送到数据库端，而是将数据移动到应用程序端以达到同样的改进，你需要付出多少努力和成本吗？相反，你可以将所有这些资源用于你的用例或业务问题所特有的、数据库无法为你解决的事情上。\n\
  \n将计算推送到数据端：这确实是构建可扩展、现代化、高性能解决方案的最佳方法。\n\n\n# 声明式与命令式\n\nAzure SQL 允许你使用一种与你日常习惯不同的方法来创建操作数据的解决方案。如果你使用的是\
  \ `C#`、`Java`、`Python` 或 `NodeJS`，那么你很可能习惯于遵循*命令式*范式。在命令式范式下，你会告诉系统具体如何去执行一个过程，更准确地说，是一个算法。例如，如果你有一个数字列表，并想统计其中有多少个不同的值，你可能会用循环来实现解决方案，遍历这些值，将当前值与已见过的值列表进行比较，只有当当前值不在该列表中时才将其加入。\n\
  \n相反，如果你使用*声明式*方法，你只需告诉系统你想要什么，而不是如何去做。本质上，你是以已有的数据结构为起点，描述你想要达到的结果。从概念上讲，这与设置导航系统带你从点“A”到点“B”并无太大不同。\n\
  \n因此，使用前面提到的相同例子，在 Azure SQL（以及任何关系型数据库）中，你可能会写出类似这样的语句：\n\n```sql\nSELECT DISTINCT\
  \ Number FROM Values;\n```\n\n我们将在接下来的章节中详细讨论这行代码的细节，但你已经可以凭直觉理解它在做什么。\n\n`Python`\
  \ 和 `C#` 提供了一些声明式支持。`C#` 支持语言集成查询（`LINQ`），而 `Python` 使用列表推导式，因此你可能有一些相关经验，这将极大地帮助你使用\
  \ Azure SQL。另一方面，如果你还没有这方面的经验，通过阅读本书，你将会熟悉声明式范式的 power and beauty。\n\n关系型数据库，尤其是\
  \ Azure SQL，将声明式方法的理念提升到了一个新的高度。Azure SQL 不仅会为你处理实现细节，让你可以专注于“做什么”而不是“如何实现”，而且它在处理时还会考虑大量令人印象深刻的额外因素。例如，表中有多少数据，操作这些数据需要多少内存，现有的索引是否有帮助，甚至数据在表中的分布情况。\n\
  \n想一想，现代导航系统的工作方式完全相同：它不仅允许你指定起点和目的地，还会考虑实时交通、道路封闭和其他条件，以便在给定的有限时间内尝试为你提供*最佳*解决方案，而不仅仅是*一个*解决方案。\n\
  \n在现代开发中，这对于确保你的应用程序始终保持响应至关重要，即使它使用的数据在值和大小上不断变化：适应变化不仅是开发者的关键因素，对于应用程序同样如此。\n\n\
  # 查询与数据操作\n\n正如人们可能猜测的那样，你将用来与 Azure SQL 数据库中的数据交互的语言是 *SQL*（*结构化查询语言*）。SQL 是一个被许多关系型和非关系型数据库采纳的标准。学好它不仅对使用\
  \ Azure SQL 有用，对利用 Apache Spark 等许多其他知名数据平台也同样有益。每个数据库通常都在一定程度上实现了 `ANSI/ISO SQL`\
  \ 标准，并有一些变体以利用平台特有的功能。因此，实现的 SQL 被称为一种*方言*。对于 Azure SQL，其方言与 `SQL Server` 使用的相同：简称为\
  \ *Transact-SQL* 或 *T-SQL*。\n\n要操作数据，你只需要掌握少数几个命令，通常被称为 *DML* – *数据操作语言* – 它们涵盖了所有所需的功能：\n\
  \n*   `SELECT`\n*   `INSERT`\n*   `UPDATE`\n*   `DELETE`\n*   `MERGE`\n\n如果你熟悉应用程序开发中常见的\
  \ *CRUD – 创建、读取、更新、删除* 功能集，你会发现只有前四个 SQL 命令真正用于实现 CRUD 操作；添加了第五个 `MERGE` 命令，以便在一个命令中同时完成插入、更新和删除操作，通过将大量细节留给查询引擎来简化代码，使其更易理解，并且在许多情况下也更高效。\n\
  \n## 检索数据\n\n`SELECT` 命令允许你从数据库中获取一组数据。它需要你想要获取的列的列表、表名，以及可选但几乎总是使用的过滤器，用于将返回的行限制在你感兴趣的范围内，例如：\n\
  \n```sql\nSELECT\n    InvoiceID,\n    InvoiceDate,\n    DeliveryInstructions,\n\
  \    ConfirmedDeliveryTime\nFROM\n    Sales.Invoices\nWHERE\n    CustomerID = 998\n\
  ORDER BY\n    ConfirmedDeliveryTime;\n```\n\n这个查询将查看 `Sales.Invoices` 表，返回 `CustomerID`\
  \ 列中值为 `998` 的所有行，并将结果限制为仅包含 `InvoiceID`、`InvoiceDate`、`DeliveryInstructions` 和\
  \ `ConfirmedDeliveryTime` 列。\n\n即使这样一个简单的 `SELECT` 语句也很有趣。首先，值得注意的是，数据没有固有的或自然的顺序。如果不指定\
  \ `ORDER BY`，数据将以无特定顺序的方式返回。\n\n出于性能原因，数据很可能以 Azure SQL 访问它的顺序返回，而这种顺序可能会随时间变化；如果你依赖数据按特定顺序排列，你必须指定\
  \ `ORDER BY` 子句。其次，除非通过一个名为 `COLLATION` 的选项另行指定，否则数据库对象不区分大小写。这也适用于表中的数据。当然可以更改这一点，但可能会对性能产生影响：更多相关讨论将在后续章节中进行。\n\
  \n现在让我们看一个更复杂的例子。假设我们的客户 `998` 正在浏览她的订单历史，以寻找她在 `2016` 年第一季度收到的一个特定商品。通过在虚构的移动应用上使用一系列过滤器，这可能是我们需要执行的\
  \ `T-SQL` 语句：\n\n```sql\nSELECT\n    il.InvoiceLineID AS LineID,\n    i.InvoiceID,\n\
  \    il.[Description],\n    il.Quantity,\n    il.UnitPrice,\n    il.UnitPrice *\
  \ il.Quantity AS TotalPrice,\n    i.ConfirmedDeliveryTime\nFROM\n    Sales.Invoices\
  \ AS i\nINNER JOIN\n    Sales.InvoiceLines AS il ON i.InvoiceID = il.InvoiceID\n\
  WHERE\n    i.CustomerID = 998\n    AND\n    il.[Description] LIKE N'%red shirt%'\n\
  \    AND\n    CAST(i.ConfirmedDeliveryTime AS DATE) BETWEEN '2016-01-01' AND '2016-03-31';\n\
  ```\n\n在 `WideWorldImporters` 数据库中执行后，结果将如图 4-1 所示。\n\n![图 4-1 示例 SELECT 结果](img/493913_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1 示例 SELECT 结果\n\n在刚才使用的示例查询中，尽管简单，但有几个值得注意的地方在日常使用中非常常见。\n\n> **注意**\n> 你可以使用星号\
  \ `*` 来自动包含表中的所有列，而不是指定你想要作为结果的列。虽然这对于仅查看数据或进行一些数据探索时执行查询可能有用，但在创建将被应用程序使用的内容时，这不是最佳实践。列的顺序随时可能改变，如果有人更改了表定义，列也可能被添加或删除。始终指定你想要返回的列，这样你才能得到确定的结果。如果你不需要所有列，你还能避免浪费网络带宽并提高传输速度。\n\
  \n\n\n# SQL 查询基础概念与语法\n\n## 表名称与 Schema\n\n对象，如表，拥有自己的名称，例如`Invoices`表。由于同一个名称可能在不同的上下文中被使用，最佳实践是始终使用其所属的**schema**来限定对象名称。Schema\
  \ 是一种组织属于同一组对象的方式，例如`Sales`。所有与销售相关的对象都会被放置在同一个 schema 中。除了消除歧义，Schema 还有助于简化管理，特别是在安全方面，因为权限可以授予\
  \ schema，这将影响属于同一 schema 的所有对象。\n\n## 别名\n\n你可以使用`AS`关键字为表名称创建别名，这样如果某个列出现在多个表中，你就可以使用别名作为列名的前缀，并明确指定从哪个表中获取该列。某些列名会频繁重复（例如`Name`、`ID`、`Description`等），因此需要一种消除歧义的方法。别名允许你做到这一点，同时也无需使用完整的表名作为列前缀。代码更少，效果更佳。\n\
  \n除了表，列也可以被**别名化**。你可能希望在返回结果时更改列名，例如`InvoiceLineID`列被返回为`LineID`。正如你可能注意到的，该列无论如何都已被其所在表的别名所限定。虽然这里并非必需（因为查询使用的表中没有其他同名列），但使用前缀也有助于快速理解列的来源。这是一种让代码更易理解、更人性化的良好实践。\n\
  \n当列本身没有名称时，则**必须**为其创建别名。例如，当结果列是通过表达式创建时，就像`TotalPrice`列那样。在示例中，表达式非常简单，但请记住，它们可以复杂得多，并对列值应用复杂的数据转换。\n\
  \n## 引号标识符\n\n对象几乎可以使用任何你喜欢的名称（当然，有一些命名规则：[`https://aka.ms/rdddi`](https://aka.ms/rdddi)），但如果你使用的名称可能与关键字冲突，只需使用方括号来确保查询引擎能理解你指的是列或表，而不是其他东西，比如系统函数。\n\
  \n## 连接\n\n示例还展示了如何从不同的表中返回值。使用`INNER JOIN`语句，我们表示：对于表`Sales.Invoices`、列`InvoiceID`中存在的每个值，我们希望获取在表`Sales.InvoiceLines`的相同列中具有相同值的所有行。发票数据被保存在两个不同的表中，以避免数据重复并更易于访问每个发票行。但由于`CustomerID`仅在`Sales.Invoices`表中可用，因此需要连接操作来返回所需数据。\n\
  \n选择将所有内容保存在较少的表中以应对数据重复的挑战，还是将数据分解到不同的表中以避免重复，然后在需要时将数据组合起来，这是一个非常重要的理解主题，属于数据库建模的定义范畴，更具体地说，是一个称为**规范化**的过程。有整本书专门讨论这个话题，以及规范化和**反**规范化的优缺点，因此你将在本章末尾找到更多参考资料。请记住，规范化过程旨在组织数据以最小化冗余。数据库中存在重复信息会带来许多不那么明显的影响和很多挑战，因此即使你使用非关系型数据库，也绝对需要理解这一点：所有的规范化概念无论如何都将适用。事实上，规范化也是一个可以在\
  \ NoSQL 手册中找到的概念。\n\n有不同类型的连接允许你精确定义结果中必须返回哪些行。例如，假设你希望获得所有客户及其相关发票的列表，正如你可以猜到的，你有两个独立的表来保存这两组不同的数据：客户和发票。可能会发生这样的情况：你有一个新客户尚未收到任何发票。使用*内连接*，这样的客户将不会包含在我们假设的查询结果中。如果你想要*所有*客户，无论他们是否有发票，你需要使用*左连接*。如果你想要返回所有发票，即使是那些不属于任何客户的发票，你将需要使用*右连接*。术语“左”和“右”指的是表相对于`JOIN`子句的位置（图\
  \ 4-2）。\n\n![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig2_HTML.jpg](img/493913_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2 连接类型\n\n**全连接**是这三种类型的总和。你将获得参与连接的两个表中的所有行。\n\n连接可以与其他连接一起使用，以便表示复杂的关系。如果我们希望扩展原始代码示例以同时返回客户数据，我们需要更改它，以便将客户、发票和发票行连接在一起：\n\
  \n```sql\nSELECT\n    c.CustomerName,\n    il.InvoiceLineID AS LineID,\n    i.InvoiceID,\n\
  \    il.[Description],\n    il.Quantity,\n    il.UnitPrice,\n    il.UnitPrice *\
  \ il.Quantity AS TotalPrice,\n    i.ConfirmedDeliveryTime\nFROM\n    Sales.Customers\
  \ AS c\nINNER JOIN\n    Sales.Invoices AS i ON i.CustomerID = c.CustomerID\nINNER\
  \ JOIN\n    Sales.InvoiceLines AS il ON i.InvoiceID = il.InvoiceID\nWHERE\n    i.CustomerID\
  \ = 998\n    AND\n    il.[Description] LIKE N'%red shirt%'\n    AND\n    CAST(i.ConfirmedDeliveryTime\
  \ AS DATE) BETWEEN '2016-01-01' AND '2016-03-31';\n```\n\n结果如下：\n\n![../images/493913_1_En_4_Chapter/493913_1_En_4_Figa_HTML.jpg](img/493913_1_En_4_Figa_HTML.jpg)\n\
  \n如你所见，`CustomerName`和`CustomerID`对于`Sales.Invoices`中与该客户相关的每一行都重复出现，而`Sales.Invoices`又对于与该发票相关的每个`Sales.InvoiceLine`重复出现。\n\
  \n这使你能够为应用程序的每一行提供所需的全部信息，而无需在数据库中存储重复的数据。虽然一开始这可能看起来很复杂，甚至可能适得其反，因为你本可以将所有数据保存在每行一个\
  \ JSON 文档中，这样甚至不需要在需要时将数据片段组合起来，但这实际上极大地帮助**简化**了事情。\n\n**通过将复杂数据分解成更小的部分，你可以让每个部分与其他数据集一起使用和重用。这与代码重用的概念相同，只是应用于数据。**\n\
  \n如前所述，将数据分解成更小片段而不丢失信息的过程称为**规范化**，它并非关系型数据库所特有。相反，它在许多不同的领域和技术中都有帮助，因为它只不过是一个帮助避免信息重复的过程，而信息重复通常带来的挑战多于其解决的问题。毫不奇怪，它在\
  \ NoSQL 文档甚至对象建模文档中都有提及。学习它将在从开发到数据科学的各种情况下有所帮助：你将在本章末尾找到深入探讨这些概念的若干资源。\n\n\n\n\n\
  #### 筛选\n\n通常，你可能只想从数据库中获取少数几行，甚至只是一行。要筛选掉不需要的行，就必须使用 `WHERE` 子句。正如你在示例查询中所见，`WHERE`\
  \ 子句可以包含一个或多个筛选 `谓词`，这些谓词允许你指定对查询可用的任何列，你感兴趣的具体值是什么。`FROM` 子句或 `JOIN` 中指定的任何表的列都可以使用。\n\
  \n在 `WHERE` 子句中使用的值可以是字面量、变量、来自其他查询的数据集，或者函数调用的结果。这使你能够精确定位你想要处理的数据。\n\n#### 子查询\n\
  \n子查询是嵌套在另一个查询中的查询。就像在 Linux Shell 或 Windows PowerShell 中，你可以将一个命令的输出通过管道传递给另一个命令，从而轻松构建复杂的转换一样，Azure\
  \ SQL 也允许你做概念上类似的事情：\n\n```\nSELECT\n    OrderId,\n    OrderDate,\n    (SELECT COUNT(*)\
  \ FROM Sales.[OrderLines] AS ol\n        WHERE\n            ol.[OrderID] = o.OrderId)\
  \ AS OrderSize\nFROM\n    (SELECT * FROM Sales.[Orders] WHERE SalespersonPersonID\
  \ = 2) AS o\nWHERE\n    o.[CustomerID] IN\n    (\n        SELECT\n            c.CustomerID\n\
  \        FROM\n            Sales.[Customers] AS c\n        WHERE\n            [CustomerName]\
  \ = 'Daniel Martensson'\n    )\n    AND\n    OrderDate >= '2015-01-01'\nORDER BY\n\
  \    [o].[OrderID];\n```\n\n在上面的示例中，有三个子查询。第一个用于 `FROM` 子句，用于将订单限制为仅由特定销售人员生成的订单。然后\
  \ `WHERE` 子句中还有另一个子查询，将订单限制为仅由特定客户完成的订单。最后，第三个子查询位于 `SELECT` 列表中，用于通过计算每个订单中的行数来丰富结果。\n\
  \n如果你已经有一些 SQL 语言经验，你可能会意识到，这个示例查询也可以使用一些连接（JOIN）来编写，而不是在 `FROM` 和 `WHERE` 子句中使用子查询。Azure\
  \ SQL 查询优化器足够智能，也能意识到这一点，通常，无论查询以哪种方式编写，性能上都没有差异。\n\n#### 公用表表达式\n\n公用表表达式，或简称 CTE，是子查询的一种改进替代方案。正如你可能猜到的，如果你有一个非常复杂的\
  \ SQL 语句，包含许多子查询，它会变得非常难以阅读。\n\n另外，如果同一个子查询需要在同一个查询中使用两次，会发生什么？你最终会复制代码。但是，作为追求卓越的开发者，如果可能的话，我们不希望有任何代码重复。\n\
  \nCTE 正是我们组织代码所需要的，以便更容易理解，最重要的是，更容易修改和维护。CTE 是一个临时的查询定义，它的生命周期仅限于使用它的 `SELECT`、`INSERT`、`UPDATE`\
  \ 或 `MERGE` 语句的执行期间。\n\n以下是子查询段落中展示的相同代码，重写后使用 CTE 代替了子查询（在合理的地方）：\n\n```\nWITH\
  \ cteOrders AS\n(\n    SELECT * FROM Sales.[Orders] WHERE SalespersonPersonID =\
  \ 2\n),\ncteCustomers AS\n(\n    SELECT\n        c.CustomerID\n    FROM\n      \
  \  Sales.[Customers] AS c\n    WHERE\n        [CustomerName] = 'Daniel Martensson'\n\
  )\nSELECT\n    OrderId,\n    OrderDate,\n    (SELECT COUNT(*) FROM Sales.[OrderLines]\
  \ AS ol WHERE ol.[OrderID] = o.OrderId) AS OrderSize\nFROM\n    cteOrders AS o\n\
  INNER JOIN\n    cteCustomers c ON [c].[CustomerID] = [o].[CustomerID]\n    AND\n\
  \    OrderDate >= '2015-01-01'\nORDER BY\n    [o].[OrderID];\n```\n\n如你所见，在 `WITH`\
  \ 语句之后，定义了两个 CTE，一个名为 `cteOrders`，另一个名为 `cteCustomers`。在查询中每次引用这些名称时，就如同在那里放置了一个子查询。不同之处在于，代码变得更容易理解。我个人喜欢将\
  \ CTE 视为一种清晰地定义在主查询中需要处理哪些数据集的好方法：我可以在顶部定义这些集合，这样也更容易理解它们如何操作数据，然后我可以在任何需要的地方、根据需要多次引用它们，而无需重复输入相同的代码。\n\
  \n**记住**\nCTE 的生命周期仅限于定义它的查询的执行期间。如果你需要在其他查询中重用封装在 CTE 中的查询，你可能需要创建一个 `VIEW`（视图）或\
  \ `FUNCTION`（函数）。更多内容将在后续章节中介绍。\n\nCTE 也可以引用 CTE，因此你可以在保持代码非常清晰易读的同时创建非常复杂的查询。此外，CTE\
  \ 甚至可以引用自身，从而可以创建递归查询。当你需要处理具有层次结构的数据（例如树形结构）并希望遍历整棵树，但你不知道树有多深，因此需要一个“智能”算法，该算法仅在不再有数据可处理时才停止，而不仅仅是在经过一定次数的迭代后停止时，这会变得非常方便。\n\
  \n一个递归 CTE 的示例可在随附代码中找到。\n\n#### 联合\n\n如果你有两个查询，并且你想将它们的结果连接起来，只向用户返回一个结果集，你可以使用\
  \ `UNION` 语句：\n\n```\nWITH cteContacts AS\n(\n    SELECT\n        [CustomerID],\n\
  \        [PrimaryContactPersonID] AS ContactPersonId,\n        'Primary' AS [ContactType]\n\
  \    FROM\n        Sales.[Customers]\n    UNION\n    SELECT\n        [CustomerID],\n\
  \        [AlternateContactPersonID],\n        'Alternate' AS [ContactType]\n   \
  \ FROM\n        Sales.[Customers]\n)\nSELECT\n    [ContactPersonId],\n    [ContactType]\n\
  FROM\n    [cteContacts] c\nWHERE\n    c.CustomerId = 42\n```\n\n该代码会将 `Sales.Customer`\
  \ 上的两个查询结果作为单个结果返回。为了无错误地工作，`UNION` 要求两个结果集必须具有兼容的架构。\n\n请记住，`UNION` 也会从结果集中移除任何重复值，因此这可能是一个相当耗费资源的过程。如果你事先知道不可能有重复值，或者你不在意重复值，那么你可以使用\
  \ `UNION ALL` 来代替，它更轻量级，因为它不需要查找并移除重复项。\n\n#### 分号\n\n所有 Azure SQL 语句都应以分号终止。虽然目前这不是强制性的，但它是一个最佳实践，因为它是\
  \ ANSI-SQL 92 标准的一部分，并且在未来的版本中将是必需的。事实上，即使在今天，某些命令也需要它才能正确执行。例如，CTE 的 `WITH` 语句必须是行的首语句。换句话说，这意味着前一条语句*必须*以分号终止。\n\
  \n#### Unicode 字符串\n\n你可能已经注意到字符串 `N'%red shirt%'` 前面有一个大写的 N。此前缀告诉 Azure SQL 该字符串是一个\
  \ Unicode 字符串。\n\n\n\n\n\n## 添加数据\n\n`INSERT INTO` 是用于向表中添加数据的命令。它非常易于使用，只需要三样东西：要添加数据的表、要操作的列以及要添加的值。\n\
  \n例如，以下代码将向表 `Warehouse.Colors` 添加两行：\n\n```\nINSERT INTO [Warehouse].[Colors]\n\
  ([ColorID], [ColorName], [LastEditedBy])\nVALUES\n(50, ‘Deep Sea Blue’, 1),\n(99,\
  \ 'Out of space', 1);\n```\n\n表可能有也可能没有其他列，但我们必须为指定的列提供值。正如你将了解到的，表可能有一些特定的约束以使某些列成为必需的，例如\
  \ `User` 表中的电子邮件；如果没有约束，对于表中存在但未在 `INSERT` 语句中指定的所有列，将使用默认值或 `NULL` 值。\n\n除了手动指定值（如上一个示例所示）外，`INSERT`\
  \ 也可以从 `SELECT` 语句中获取值，例如：\n\n```\nINSERT INTO\n[Warehouse].[Colors]\n([ColorID],\
  \ [ColorName], [LastEditedBy])\nSELECT\nColorID, ColorName, LastEditedBy\nFROM\n\
  [External].[Colors]\n```\n\n在这种情况下，你可能在另一个名为 `External.Colors` 的表中有数据，并且希望将其移动到\
  \ `Warehouse.Colors` 中。通过使用 `INSERT FROM … SELECT`，你只需一条命令即可移动数据。\n\n### 修改数据\n\n\
  要更改表中现有的数据，可以使用 `UPDATE` 命令。与 `INSERT` 命令类似，你必须指定包含要更新数据的表以及要更新的每个列的新值。这是一个例子：\n\
  \n```\nUPDATE\n[Warehouse].[Colors]\nSET\n[ColorName] = N'Unknown',\n[LastEditedBy]\
  \ = 2\nWHERE\n[ColorID] = 99;\n```\n\n`WHERE` 部分是可选的，但几乎总是被指定，因为它允许你限制更改的范围，否则更改将应用于表中的所有行。正如在“检索数据”部分中所解释的，`WHERE`\
  \ 子句将确保你能够精确地只定位要更新的行。\n\n字符 `N` 告诉 Azure SQL 用于更新表的文本是 Unicode 文本。你会注意到，即使不指定它，一切也会正常工作。这是因为\
  \ Azure SQL 会执行隐式转换，自动将字符串转换为 Unicode 字符串。虽然在这种情况下没有坏处，但隐式转换会严重影响性能，因此请确保数据类型正确，尤其是在使用\
  \ `WHERE` 谓词或 `JOIN` 子句时。\n\n### 删除数据\n\n要从表中删除数据，可以使用 `DELETE` 命令。对于此命令，只需指定表：`DELETE`\
  \ 将从指定表中删除整行，因此无需像其他 DML 命令那样指定列。\n\n显然，`WHERE` 子句也受支持，通过它，你可以确保只删除想要删除的行，方法是指定一个仅针对这些行的谓词。\n\
  \n如果没有 `WHERE` 子句，所有行都将被删除。注意！不会发出警告，表将被清空：\n\n```\nDELETE FROM\n[Warehouse].[Colors]\n\
  WHERE\n[ColorID] = 99;\n```\n\nAzure SQL 会自动对你的数据执行备份，并允许你将其恢复到过去 7 到 35 天内的任何时间点（具体取决于你使用的服务）。这没有额外费用。即使你误删除了所有内容，你也能够轻松地将其恢复到意外操作发生之前的状态。\n\
  \n## 合并数据\n\nMerge 是一个允许你同时执行插入、更新和删除的命令，以便将一组数据合并到现有数据中。包含要合并到另一个表中的数据的表是你的源表，而另一个表是目标表。通过将源表合并到目标表中，根据你在\
  \ `MERGE` 命令中指定的内容，可能会发生以下情况：\n\n*   存在于源表中但不存在于目标表中的所有行将被插入到目标表中。\n*   存在于两个表中的所有行将在源表中被更新。\n\
  *   存在于目标表中但不存在于源表中的所有行将从目标表中被删除。\n\n我说“可能”，因为你完全控制插入、更新和删除操作是否以及如何发生，甚至是否会发生：\n\
  \n```\nMERGE INTO\n[Warehouse].[Colors] AS [target]\nUSING\n(VALUES\n(50, 'Deep\
  \ Sea Blue'),\n(51, 'Deep Sea Light Blue'),\n(52, 'Deep Sea Dark Blue')\n) source\n\
  ON\n[target].[ColorID] = [source].[Id]\nWHEN MATCHED THEN\nUPDATE SET [target].[ColorName]\
  \ = [source].[Name]\nWHEN NOT MATCHED THEN\nINSERT ([ColorID], [ColorName], [LastEditedBy])\
  \ VALUES ([source].Id, [source].[Name], 1)\nWHEN NOT MATCHED BY SOURCE AND [target].[ColorID]\
  \ BETWEEN 50 AND 100 THEN\nDELETE\n;\n```\n\n在 `MERGE INTO` 之后，是目标表。`USING` 指明了源是什么。在这个例子中，代码使用了一个表值构造函数来动态创建一个表，并用别名\
  \ `source` 标记它。因此，这个表是完全临时的，一旦语句执行完毕就会消失；它还要求你指定其列的名称，因为没有任何地方有元数据可以确定这些名称。数据类型将从提供的值中自动推断。\n\
  \n`ON` 部分与 `JOIN` 的使用方式非常相似，它定义了 Azure SQL 所需的规则，以理解如何将来自源的行与目标中的行进行匹配。在示例中，我们使用了源的\
  \ `Id` 和目标的 `ColorId`。之后，你必须告诉 `MERGE` 在匹配时以及在不匹配时该怎么做：\n\n*   `WHEN MATCHED` –\
  \ 如果源表和目标表的行之间存在匹配，代码将使用源表中 `Color` 列的相关值更新目标表中的 `ColorName` 列。\n*   `WHEN NOT MATCHED`\
  \ – 如果目标表中没有 `ColorID` 也存在于源表中的行，则这些行将从源中取出并插入到目标中。\n*   `WHEN NOT MATCHED BY SOURCE`\
  \ – 如果目标表包含一些 `ColorID` 不存在于源表中的行，这些行将从目标中被删除。该示例添加了一个额外的谓词来更好地定义范围。不仅目标中的 `ColorID`\
  \ 必须不存在于源中，而且 `ColorID` 值还必须介于 50 到 100 之间。这意味着，例如，源表中 `ColorID` 值从 0 到 49 的所有行将不会被删除，因为它们超出了已定义规则的范围。\n\
  \n### 其他有用功能\n\n到目前为止，已经讨论了基本概念。它们足以开始创建出色的解决方案，但还有一些更多功能你希望立即开始使用，因为它们在多种不同场景下有助于简化代码，并提高解决方案的性能和并发性。\n\
  \n\n\n## 输出子句：插入和删除的虚拟表\n\n将`INSERT`、`UPDATE`或`DELETE`（或`MERGE`）操作的结果返回给应用程序是一个非常常见的需求。例如，假设您正在创建的\
  \ API 解决方案中，通过 HTTP `PUT` 方法接受对实体的更新。您创建的 API 将使用 `UPDATE` 或 `MERGE` 语句，通过 `PUT`\
  \ 接收到的新数据更新数据库。遵循既定的良好实践，您希望将完整的实体作为 `PUT` 请求的结果返回，以便调用方能够获得完全更新后的实体，而无需发出专门的 `GET`\
  \ 请求。\n\n这意味着需要执行类似以下的操作：\n\n```\nUPDATE\n[Warehouse].[Colors]\nSET\n[ColorName]\
  \ = 'Unknown'\nWHERE\n[ColorID] = 99;\nSELECT\n[ColorID],\n[ColorName],\n[LastEditedBy],\n\
  [ValidFrom],\n[ValidTo]\nFROM\n[Warehouse].[Colors];\n```\n\n上述代码的问题在于，在一个高并发系统中，可能在`UPDATE`和随后的`SELECT`之间，其他连接可能已对数据应用了一些更改，这通常是您希望避免的行为。关于此问题的更深入讨论将在专门介绍事务的章节中进行，但与此同时，您可以看到问题源于我们有两个不同的命令，需要它们一个接一个地执行，中间不能插入其他操作，就像它们只是一个逻辑操作一样。\n\
  \n解决此问题的一种非常优雅、可扩展且高性能的方法是要求 `UPDATE` 命令也生成输出，这样一切都将作为 *一个* 命令执行，问题将从根源上得到解决。\n\n\
  `OUTPUT` 语句正是用于此目的：\n\n```\nUPDATE\n[Warehouse].[Colors]\nSET\n[ColorName] = 'Unknown'\n\
  OUTPUT\n[Inserted].[ColorID],\n[Inserted].[ColorName],\n[Inserted].[LastEditedBy],\n\
  [Inserted].[ValidFrom],\n[Inserted].[ValidTo],\nWHERE\n[ColorID] = 99;\n```\n\n\
  结果将与使用单独的 `UPDATE` 和 `SELECT` 语句的代码等效，但没有描述的潜在问题。\n\n`Inserted` 是一个虚拟表，仅在其使用的语句持续期间存在。`Inserted`\
  \ 虚拟表提供对数据在修改 *之后* 状态的访问；还有一个 `Deleted` 虚拟表，提供对数据在修改发生 *之前* 状态的访问。\n\n由于 `UPDATE`\
  \ 语句可以被认为是逻辑上的一对 `DELETE`/`INSERT` 语句，因此 `UPDATE` 允许您使用这两个虚拟表。`INSERT` 语句将只允许您访问\
  \ `Inserted` 虚拟表，当然，`DELETE` 语句只允许访问 `Deleted` 虚拟表。`MERGE` 语句显然也将允许同时访问 `Inserted`\
  \ 和 `Deleted` 虚拟表。\n\n## 标识和序列\n\n当您需要创建一个 ID 编号来分配给实体或行（通常是为了轻松地唯一标识它）时，您可以在应用程序中完成，也可以依靠数据库来完成。使用数据库将确保默认情况下不会生成两个相同的\
  \ ID，从而大大简化您的代码。\n\n在 Azure SQL 中，有两种方法可以实现这一点。一种是使用 `IDENTITY` 功能，它主要出于向后兼容的目的而存在。当您创建表时，可以选择一个整数列作为标识列。这意味着\
  \ Azure SQL 将为您自动生成该列的值，每次插入新行时：\n\n```\nCREATE TABLE dbo.SampleID\n(\nId INT IDENTITY(1,1)\
  \ NOT NULL,\nOtherColums NVARCHAR(10) NULL\n);\n```\n\n`IDENTITY(1,1)` 意味着数字将从 1\
  \ 开始生成，并以 1 递增。\n\n虽然它多年来运行良好，但它有两个主要缺点。第一个是，除非您使用特定的 `SET` 选项暂时禁用标识行为，否则在执行 `INSERT`\
  \ 命令时，您 *不能* 手动为该列提供值。这并不十分友好。第二个，更重要的是，如果您有多个包含标识列的表（这可能相当常见），它们不会彼此感知，因此不同表中的行可能会具有相同的\
  \ ID 值。这可能不是大问题，但有时您希望能够在整个数据库中，或者至少在一组逻辑相关的表中唯一地标识行。\n\n### SEQUENCE 对象\n\n*序列*\
  \ 正是您克服旧限制并获得所需全部灵活性所需要的。序列是在数据库级别创建的，可以在您需要的任何地方使用：\n\n```\nCREATE SEQUENCE dbo.BookSequence\n\
  AS BIGINT\nSTART WITH 1\nINCREMENT BY 1;\nCREATE TABLE dbo.SampleID\n(\nId INT NOT\
  \ NULL DEFAULT(NEXT VALUE FOR dbo.BookSequence),\nOtherColums NVARCHAR(10) NULL\n\
  );\n```\n\n使用这种方法，您可以在编写 `INSERT` 语句时，决定是使用自动生成的值还是提供您自己的值，而无需在执行前设置任何特定选项。\n\n\
  序列通常还提供更好的性能和对数字生成方式的更多控制。您甚至可以 *保留* 数字（如果需要）。\n\n因此，如果您开始创建一个新数据库，建议是使用一个或多个 `SEQUENCE`\
  \ 来生成您的 ID。只需记住，无论是 `IDENTITY` 还是 `SEQUENCE`，都不能保证不会生成重复的数字：您总是可以重置数字生成器并从已生成的数字开始。`SEQUENCE`\
  \ 命令甚至允许您在达到某个值后自动从头开始循环，因为有时这种在定义的一组数字中循环的能力可能非常有用。\n\n可以使用 `DROP SEQUENCE` 命令删除序列：\n\
  \n```\nDROP SEQUENCE dbo.BookSequence;\n```\n\n## TOP 和 OFFSET/FETCH\n\n有时，特别是当您只是探索数据时，您并不真正需要获取表中的所有数据。这在大表上尤其如此，更不用说我们谈论的是云中的数据库了。如果您不是真正使用这些数据，就没有必要移动大量数据。例如，仅前\
  \ 100 行可能就足以窥视您要处理的数据。\n\n您希望将返回的行数限制在特定数量的另一个原因是您希望对数据进行分页。例如，如果您正在实现一个必须公开 `ODATA`\
  \ 端点的 `REST API`，支持分页将是一个常见需求。\n\n在 Azure SQL 中，您有两个选项来确保只返回请求的行数：`TOP` 和 `OFFSET/FETCH`\
  \ 组合。\n\n`TOP` 是最容易使用但也是最受限的。`OFFSET/FETCH` 稍微复杂一些，但为您提供了更大的灵活性，并使分页实现变得非常容易：\n\n\
  ```\nSELECT TOP (50)\n*\nFROM\n[Sales].[Orders]\nORDER BY\n[ExpectedDeliveryDate]\
  \ DESC;\n```\n\n前面的代码将按 `ExpectedDeliveryDate` 降序返回前 50 行。\n\n下一个代码示例将执行相同的操作，但得益于\
  \ offset 选项，它将跳过前 50 行并返回接下来的 50 行。基本上，如果您为正在实现的分页功能将页面大小设置为 50，则该代码实际上返回的是数据的第二页。如果\
  \ `OFFSET` 设置为 0，则产生的结果将与 `TOP` 相同，但如您所见，`OFFSET/FETCH` 提供了更大的灵活性。从性能角度来看，它们是完全相同的：\n\
  \n```\nSELECT\n*\nFROM\n[Sales].[Orders]\nORDER BY\n[ExpectedDeliveryDate] DESC\n\
  OFFSET\n50 ROWS\nFETCH\nNEXT 50 ROWS ONLY\n```\n\n## 聚合\n\nAzure SQL 为聚合提供了广泛的支持，因此您可以高效地编写查询，使用最先进的优化技术对数据集进行聚合和分析。您可以在将需要编写的代码复杂性保持在尽可能低水平的同时，获得出色的性能。\n\
  \n\n\n### 分组数据\n\n`GROUP BY`子句可用于`SELECT`语句中，对表中存在的所有组应用聚合函数，例如`COUNT`或`MAX`（但远不止这些）。一个组被定义为指定列具有相同值的一组行。例如，以下代码返回仓库中库存的产品及其数量，按`SupplierID`和`ColorID`分组：\n\
  \n```sql\nSELECT\n    [SupplierID],\n    [ColorID],\n    COUNT(*) AS ProductsInStock,\n\
  \    SUM(QuantityPerOuter) AS ProductsQuantity\nFROM\n    [Warehouse].[StockItems]\n\
  GROUP BY\n    [SupplierID], [ColorID]\nORDER BY\n    [SupplierID], [ColorID]\n```\n\
  \n这是一个示例结果。\n\n![图 4-3：按供应商和颜色聚合的数据](img/493913_1_En_4_Fig3_HTML.jpg)\n\n当然，你可能希望将结果数据与其他表进行`JOIN`，以不仅返回\
  \ ID，还返回供应商和颜色的名称。\n\n你可以轻松做到这一点，通过结合目前所学的知识，使用一个公用表表达式（Common Table Expression）和几个`JOIN`，优雅地解决问题，并向你的应用程序返回一个包含所有所需数据的结果集。\n\
  \n本书附带的代码中提供了展示此类查询的完整注释代码。\n\n### 多重分组\n\nAzure SQL 提供的一个非常有趣的功能是能够同时对*不同的组*执行聚合。这可能听起来令人困惑，因此一个例子会有所帮助。使用之前相同的示例，现在让它更贴近实际。你需要返回可用于创建矩阵报表的数据，最终用户可以按供应商和颜色分析仓库中有多少产品。行和列将分别包含供应商和颜色。在行和列的交叉点，可以找到具有该颜色、来自该供应商的库存产品数量。由于是矩阵报表，用户期望在最右侧的列中看到每个供应商的产品总数，在最后一行看到每种颜色的产品总数。\n\
  \n![图 4-4：一个典型的矩阵报表](img/493913_1_En_4_Fig4_HTML.jpg)\n\n这意味着你必须使用四种不同的设置来对数据进行分组：\n\
  \n*   产品和供应商\n*   仅产品\n*   仅供应商\n*   全部（计算所有产品）\n\n这通常意味着四个不同的查询：在大型数据集上，性能肯定会受到影响，因为你必须读取和聚合数据四次。\n\
  \n我相信作为开发人员，你已经在考虑使用一些缓存来避免这种资源浪费，并将一些计算移到代码中，这样就不必四次读取相同的数据——这很聪明，但这会增加代码的复杂性。如果可能，我们希望避免这一点。幸运的是，不需要这种额外的复杂性，你可以保持代码的简单和精简。你需要做的就是要求\
  \ Azure SQL 使用`GROUPING SET`功能为你执行这多个并发聚合：\n\n```sql\nSELECT\n    [SupplierID],\n\
  \    [ColorID],\n    COUNT(*) AS ProductsInStock,\n    SUM(QuantityPerOuter) AS\
  \ ProductsQuantity,\n    GROUPING(ColorID) as IsAllColors,\n    GROUPING(SupplierID)\
  \ as IsAllSuppliers\nFROM\n    [Warehouse].[StockItems]\nGROUP BY\n    GROUPING\
  \ SETS\n    (\n        ([SupplierID], [ColorID]),\n        ([SupplierID]),\n   \
  \     ([ColorID]),\n        ()\n    )\nORDER BY\n    TotalPerColorID, TotalPerSupplierID\n\
  ;\n```\n\n前面查询的结果将包含按所有四种定义的*分组集*分组的数据，因此你将获得所有需要的数据，而无需任何额外的复杂性——并且性能要好得多。\n\n\
  ![图 4-5：分组集实战](img/493913_1_En_4_Figb_HTML.jpg)\n\n`SELECT`列表中的函数`GROUPING`用于帮助最终用户理解一行是否代表特定值的总计。例如，`IsAllColors`等于\
  \ 1 的行必须用于矩阵的最右侧部分，因为它代表特定供应商的产品总数，无论颜色如何。\n\n### 窗口函数\n\n窗口函数及其所有相关功能可能是你在 Azure\
  \ SQL 中用于操作数据的最强大的结构之一。它们能优雅解决的问题数量惊人，而且有整本书专门详细解释它们的用法。本节的目标是让你熟悉它们的使用，以便你可以立即开始利用它们的强大功能。\n\
  \n虽然功能极其强大，但窗口函数相当容易理解。用非常简单的术语来说，它们允许你访问位于当前处理行之前和之后的数据。\n\n最简单的实际例子是由*累计总和*的计算提供的。累计总和被定义为“根据添加的项目不断调整的总和”。\n\
  \n这是一个例子。\n\n![图 4-6：计算订单的累计总和](img/493913_1_En_4_Fig5_HTML.jpg)\n\n要计算第三行（等于 27）的累计总和，从逻辑角度来看，Azure\
  \ SQL 必须获取`Quantity`列所有前几行的值并将它们相加。计算第四行及后续行的`Running Total`值时也是如此。\n\n这些需要考虑的额外行代表了\
  \ Azure SQL 正在操作的数据*窗口*。对于累计总和，该窗口从表的第一行开始，到当前行结束。\n\n一旦定义了窗口，你就可以告诉 Azure SQL 你想在该窗口可用的数据上使用哪个函数。像`SUM`这样的聚合函数很常见。实际上，`SUM`正是你实现累计总和所需要的。生成上图中结果的代码如下：\n\
  \n```sql\nSELECT\n    [OrderLineID],\n    [Description],\n    [Quantity],\n    SUM(Quantity)\
  \ OVER (ORDER BY [OrderLineID] ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW)\
  \ AS RunningTotal\nFROM\n    [Sales].[OrderLines]\nWHERE\n    [OrderID] = 37\n```\n\
  \n另一个常见的聚合函数是`AVG`，它将为你提供计算移动平均值的简便方法。你只需要定义用于计算平均值的窗口大小，例如：\n\n```sql\nAVG(Quantity)\
  \ OVER (ORDER BY [OrderLineID] ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS MovingAvg\n\
  ```\n\n窗口的大小被称为*帧*。除了聚合函数，你还可以使用*分析函数*，这极大地增强了窗口函数的能力。例如，你可以使用函数`LAG`来访问存在于当前行之前的行中的值。同样，一个实际的例子会让这一点非常容易理解。假设你想计算特定客户的两个连续订单之间经过了多少时间。\n\
  \n![图 4-7：计算订单之间的天数差](img/493913_1_En_4_Fig6_HTML.jpg)\n\n对于每一行，你需要访问前一行，获取订单日期，并将其与当前行的日期进行比较。得益于窗口函数，这非常容易：\n\
  \n```sql\nSELECT\n    [OrderID],\n    [OrderDate],\n    DATEDIFF(\n        [DAY],\n\
  \        LAG(OrderDate, 1) OVER (ORDER BY [OrderDate]),\n        [OrderDate]\n \
  \   ) AS ElapsedDays\nFROM\n    [Sales].[Orders]\nWHERE\n    [CustomerID] = 832\n\
  ORDER BY\n    [OrderDate]\n```\n\n这是一段非常简单而优雅的代码，Azure SQL 引擎也能很好地优化它；它还为你节省了原本需要编写的大量代码。\n\
  \n\n\n到目前为止，我们只关注了使用单个特定客户 ID 或订单 ID。但是，回到累计总值的例子，如果我们想计算整个表中**所有**订单的累计总值，该怎么办？当然，我们不想把订单\
  \ ID 37 的行和订单 ID 39 的行混在一起。窗口函数也能为我们处理好这一点。我们只需要指定如何*分区*这个计算过程。在这里，分区让我们可以告诉 Azure\
  \ SQL 何时应该从头开始一个新的计算。你可以把它想象成类似这样的指令：“只要你处理的值属于同一个组，就持续累加这些值。” 让我们修改一下累计总值的例子，使用两个订单，而不是仅一个。\n\
  \n![../images/493913_1_En_4_Chapter/493913_1_En_4_Fig7_HTML.jpg](img/493913_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-8：按订单分区计算\n\n如你所见，一旦订单 ID 从 37 变为 39，累计总值必须重新从头开始计算，因为我们希望为每个订单计算各自的累计总值。\n\
  \n实现这一点的代码与原始代码非常相似，只是增加了 `PARTITION BY [OrderID],`。这行代码告诉 Azure SQL，只要 `OrderID`\
  \ 列中的值没有改变，就持续累加值。当它改变时，Azure SQL 就必须开始一个新的计算：\n\n```sql\nSELECT\n[OrderID],\n[OrderLineID],\n\
  [Description],\n[Quantity],\nSUM(Quantity) OVER (\nPARTITION BY [OrderID]\nORDER\
  \ BY [OrderLineID] ROWS BETWEEN\nUNBOUNDED PRECEDING AND\nCURRENT ROW\n) AS RunningTotal\n\
  FROM\n[Sales].[OrderLines]\nWHERE\n[OrderID] in (37, 39)\n```\n\n窗口函数在简化代码和提升性能方面都能提供很大帮助，而我们刚刚所见只是它们强大功能的冰山一角，因此请务必去了解它们，并在合适的时候加以使用。\n\
  \n## 批量操作\n\n如果你需要将*大量*数据加载到 Azure SQL 中（这里说的大量是指数十万、数百万甚至数十亿行），你需要使用一个名为 Bulk Copy\
  \ API 的特定 API。因为它只允许将数据插入到目标表，所以有时也被称为 Bulk Insert API 或 Bulk Load API。\n\n此 API\
  \ 直接由客户端库调用，它允许你以极高的速度批量加载数据，轻松实现每秒加载数万行甚至更多。当然，我指的是在 Azure 内部的性能，比如从一个 Web API\
  \ 应用程序或虚拟机（VM）加载到后端使用的 Azure SQL 数据库。如果 API 或应用程序位于另一个云中或在本地运行，则加载数据的速度将取决于本地网络速度。\n\
  \n要执行批量加载，.NET 提供了 `SqlBulkCopy` 类，而 Java 则提供了 `SQLServerBulkCopy` 类。以下是一个使用 .NET\
  \ 编写的示例节选：\n\n```csharp\nusing(var conn = new SqlConnection(Environment.GetEnvironmentVariable(\"\
  CS_AzureSQL\")))\n{\nconn.Open();\nvar bc = new SqlBulkCopy(conn)\nbc.DestinationTableName\
  \ = \"dbo.BulkLoadedUsers\";\nbc.BatchSize = 10000;\nbc.WriteToServer(userDataTable);\n\
  }\n```\n\n只是为了让你对此速度有个概念（你可以自己测试，因为该示例是本书附带代码的一部分），如果从与你加载数据的目标数据库处于同一区域的 Azure\
  \ VM 中执行，它将加载 100,000 行用时 0.91 秒，即每秒约 110,000 行，即使使用的是较小的 `BC_Gen5_2` 数据库。我想我们可以称之为*快速*，对吧？\n\
  \n## 如果你想了解更多\n\n在本章中，你学到了很多，为你提供了理解“将计算推向数据”为何重要的基础知识，以及高效执行此操作所需的知识，从理解声明式方法的强大功能，到使用窗口函数操作数据。\n\
