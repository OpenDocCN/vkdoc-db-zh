- '# 引言


  本书凝聚了我们关于开发者构建弹性、可扩展且安全的数据库应用程序所需的综合经验。`Azure SQL Database`为数据库应用程序提供了坚实的基础，我们相信本书也将为开发者构建未来应用程序奠定坚实基础。


