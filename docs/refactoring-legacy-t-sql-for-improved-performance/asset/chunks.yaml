    即使这个查询在返回一条记录时并不特别消耗资源，但如果用于返回更大的结果集，它可能会变得非常“痛苦”。此外，为什么要让 SQL Server 做更多不必要的工作呢？善用你的能力，而不是滥用它们！让我们来看看如何重写
    `andTheKitchenSink` 函数，以最小化我们所做的工作，只执行找到所需值所必需的那部分工作。


    我们该怎么做？一种方法是，仅在传入了相应的 `@value` 标签时，才运行查找值的代码。我们可以通过使用 `CASE` 语句设置 `@returnValue`，并将获取
    `@returnValue` 的查询运行建立在 `@value` 标签的值上来实现这一点。我们在清单 7-14 的代码中实现了这一点。


    ```sql

    ALTER FUNCTION dbo.andTheKitchenSink (@postID int, @value varchar(8))

    RETURNS varchar(30)

    AS

    BEGIN

    DECLARE @returnValue varchar(30);

    SET @returnValue = CASE @value

    WHEN ''COMMENT'' THEN COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.Comments

    WHERE PostId = @postID),''0'')

    WHEN ''RESPDR'' THEN COALESCE((SELECT CAST(COUNT(DISTINCT OwnerUserID) AS varchar(30))

    FROM dbo.Posts

    WHERE ParentId = @postID

    AND PostTypeId = 2),''0'')

    WHEN ''LINK'' THEN COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.PostLinks

    WHERE PostId = @postID),''0'')

    WHEN ''VOTE'' THEN COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.Votes

    WHERE PostId = @postID),''0'')

    ELSE COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.Posts

    WHERE ParentId = @postID

    AND PostTypeId = 2),''0'')

    END;

    RETURN(@returnValue);

    END;

    GO

    ```

