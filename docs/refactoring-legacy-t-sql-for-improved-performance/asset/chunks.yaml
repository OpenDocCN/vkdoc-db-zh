    1.  Delete the Extended Event file.


    2.  Start the Extended Event session using the code in Listing [7-4](#483961_1_En_7_Chapter.xhtml#PC6).


    3.  Run the query in Listing [7-2](#483961_1_En_7_Chapter.xhtml#PC2), with the
    function line NOT commented out.


    4.  Stop the Extended Event session using the code in Listing [7-5](#483961_1_En_7_Chapter.xhtml#PC7).


    5.  Review the output using the code in Listing [7-6](#483961_1_En_7_Chapter.xhtml#PC8),
    which we see in Table [7-2](#483961_1_En_7_Chapter.xhtml#Tab2).


    Table [7-2](#483961_1_En_7_Chapter.xhtml#Tab2) shows us a very different picture
    than we saw in Table [7-1](#483961_1_En_7_Chapter.xhtml#Tab1), or the original
    STATISTICS IO and TIME output. We can see a difference in the duration and the
    logical reads. The extended event thinks the row count has doubled. What are all
    these RETURN statements? They are the function running: once against each row
    of the output. WHOA! This can add up to a whole lot of extra work. What if this
    was a much more complicated function? Well, we’ll get to that. First, let’s look
    to see what would happen if the function was in the WHERE clause.


    ## Scalar-Valued Functions in a WHERE Clause


    I’m going to add additional limits in the test WHERE clause because otherwise
    we’re going to get too much data back in the Extended Event. Let’s use the following
    steps:


    1.  Delete the Extended Event file.


    2.  Start the Extended Event session using the code in Listing [7-4](#483961_1_En_7_Chapter.xhtml#PC6).


    3.  Run the query in Listing [7-7](#483961_1_En_7_Chapter.xhtml#PC9).


    4.  Stop the Extended Event session using the code in Listing [7-5](#483961_1_En_7_Chapter.xhtml#PC7).


    5.  Review the output using the code in Listing [7-6](#483961_1_En_7_Chapter.xhtml#PC8),
    which we see in Table [7-2](#483961_1_En_7_Chapter.xhtml#Tab2).


    ```

    SELECT p.Id

    , p.Score

    FROM dbo.Posts p

    WHERE p.Score > 315

    AND p.Score < 325

    AND dbo.increment(p.Score) = 321;

    Listing 7-7

    Query with a function in the WHERE clause

    ```


    You’ll likely see functions in the WHERE clause in the wild more often as “I want
    to see what happened yesterday,” so the function will add a day to a column and
    see if it equals today, for example. This query took 9 minutes to run! What is
    going on here? If we look at our Extended Event output, we see **629 rows** like
    the first row of Table [7-3](#483961_1_En_7_Chapter.xhtml#Tab3) and a single row
    at the end with the full query.


    Table 7-3


    Results from Extended Event showing data from query in Listing [7-7](#483961_1_En_7_Chapter.xhtml#PC9)


    | duration | cpu time | physical reads | logical reads | writes | row count |
    Statement | NumRows |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 1 | 0 | 0 | 0 | 0 | 1 | RETURN(@someint + 1) | 629 |

    | 24790 | 15000 | 0 | 6 | 0 | 691 | SELECT p.Id, p.Score FROM dbo.Posts p WHERE
    p.Score > 315 AND p.Score < 325 AND dbo.increment(p.Score) = 321 | 1 |


    The result set of the query in Listing [7-7](#483961_1_En_7_Chapter.xhtml#PC9)
    only shows 62 rows returned. Why is the function running 629 times? We’re asking
    in this query to find when the increment of the score equals the number we specified.
    The only way SQL Server can determine if the increment of the `score` is equivalent
    another value is to first determine the increment of every (yes, every) record
    in the `Posts` table. In this case, we limited the values to the number of posts
    that have a score between 315 and 325, which is why the function ran only 629
    times; there are only 629 posts with a score between 315 and 325\. This is a lot
    of work that we’re now asking the server to do.


    In most cases, instead of using the function against the table column, we should
    use the function against a parameter. We can then have the benefit of having a
    possibly complex calculation set up so we can reuse it, but will not pay the penalty
    of having this run against every record in the table!'
