    \ 0 | 5 | 0 | 教师 |\n| 1518500 | Joell Lapitan | 0 | 0 | 1 | 0 | 0 | NULL |\n|\
    \ 766590 | joelennon | 0 | 0 | 1 | 1 | 0 | 自传作者 |\n| 2457739 | Joel | 1 | 0 |\
    \ 0 | 0 | 0 | 学生 |\n| 512776 | Joel R | 6 | 1 | 1 | 3 | 0 | 编辑 |\n\n针对 **代码清单\
    \ 6-19** 中的过程运行 **代码清单 6-15** 得到的 `STATISTICS IO` 和 `TIME` 输出显示读取次数减少了，尽管数字仍然相当高。但是，代码运行时间大约为一分钟（相比之前需要一小时运行，这是一个巨大的进步）：\n\
