    Some ORMs can run into the same types of issues we see in database code. One of
    these is mismatching datatypes. If the datatype isn’t defined with the correct
    value in the ORM, the code it generates could cause the same implicit conversion
    we discussed earlier in the book.


    This is also true for returning too many columns. Like in your query (and NOT
    like using SELECT ∗), the developer writing the .NET code needs to specify exactly
    which columns need to be returned, so the whole record doesn’t get pulled back
    each time.


    It’s very tempting to dump all of your criteria into a .NET call, but only a single
    query will get generated with a very complex WHERE statement. This will result
    in the Query Optimizer being unable to come up with a good plan, and suboptimal
    runtimes will show up. This can be avoided if developers are very specific when
    they make their calls, and think about what a WHERE clause would look like to
    deliver the data they’re requesting.


    #### Guess What? Use Stored Procedures!


    All ORMs now can call stored procedures. Even after focusing on mitigating the
    issues mentioned earlier, really poor SQL code can still be generated. This is
    where the developer pulls the code out of the application and calls a stored procedure
    instead. It is then up to us to write that stored procedure to be optimized.'
  trans: '

    ### 跨数据库表的查询


    当使用跨链接服务器的查询时，调用数据库通常会使用 `WHERE` 子句对查询进行过滤。然而，有时 `SQL Server` 会直接从链接服务器抓取整张表，将其拉回本地，*然后*再应用
    `WHERE` 子句进行过滤。查询的执行计划会清晰地显示出所有行是从链接服务器表返回的情况。有几项设置需要检查以帮助缓解此问题，但这超出了本书的范围。


    早期版本的 `SQL Server` 在通过“合理的”安全模型读取链接服务器的统计信息方面存在问题。用户必须拥有非常高的权限才能获取这些统计信息。在没有关于返回多少记录的信息时，这使得优化器很难生成良好的查询计划。幸运的是，微软在
    `SQL Server 2012 SP1` 中缓解了此问题，因此在较新的软件版本中，以较低权限级别查找统计信息不那么成问题了。


    开发人员可以使用 `OPENQUERY` 函数来解决过滤问题，并确保过滤操作在远程服务器上正确发生，然后再传回所有行。使用 `OPENQUERY` 时，语句实际上是在链接服务器上运行的。而直接调用链接服务器表时，所有代码都在当前服务器上运行，而不是在链接服务器上运行，这至少在
    `SQL Server 2017` 之前的版本中是这样。


    新版本的行为似乎取决于将返回多少行、过滤列是否是连接两台服务器的数据列之一，以及过滤列是否位于远程服务器上。


    ### 网络 I/O


    因为我们是数据库专业人士，所以我们绝对知道问题的原因总是网络，对吧？说正经的，应用程序通过网络调用 `SQL Server`，而 `SQL Server`
    又通过网络传回数据。还有多少其他应用程序正在网络上来回传输数据？任何机器上与该机器外部“通信”的代码都会使用网络。此外，您可能拥有的任何 `IoT` 设备也会占用一部分网络资源。我们只是又增加了一个可能导致性能问题或故障的点。


    ### 我们如何解决这个问题？


    如果两台服务器都是虚拟机（`VM`），那么停用其中一台虚拟机，并确保彼此交互的数据库位于同一台服务器的同一个实例上，可能是个好主意。这是最佳的长期解决方案，如果可行，我强烈建议采用此方法。


    如果无法将链接的数据库移至同一台服务器，那么我们就得回到重构代码上来。这需要做一些研究，查看执行计划并花费时间先找出问题最严重的代码。执行计划应该能真正显示出在何处使用
    `OPENQUERY` 会有所帮助；只需寻找那些被大量返回但不在查询最终输出中的行。


    在链接服务器上创建存储过程，然后从本地服务器调用它们，是另一种可以用来强制代码在链接服务器上而非本地服务器上运行的策略。虽然对存储过程的调用在本地服务器上运行，但链接服务器上存储过程中的所有代码随后都会在链接服务器上运行。这种策略可以是一种有效的方式，将代码片段分离出来，以针对哪台服务器是运行该代码的最佳位置。


    ### 应用程序中的 SQL 代码调用


    您听说过“`ORM`”这个术语吗？它的全称是对象关系映射（object-relational mapping），`ORM` 是开发人员用来简化 `SQL`
    代码编写的工具。它们很受欢迎，因为开发人员可以更快地编写代码——工具会为您生成数据库代码，您无需编写“`CRUD`”（创建 `Create`、读取 `Read`、更新
    `Update`、删除 `Delete`）`SQL`。它们可以生成参数化查询，这是一件好事。然而，我们经常在这些工具生成的 `SQL` 代码中看到性能问题。如果开发人员意识到这些众所周知的问题，大多数都可以避免。


    #### 问题是什么？


    要修复应用程序代码中的 `SQL` 性能问题，我们需要能够访问应用程序的源代码以及创建应用程序新构建的能力。如果应用程序代码的初始开发没有考虑一些目前众所周知的问题，那么该代码可能会在
    `SQL Server` 上造成相当大的痛苦，并通过占用 `SQL Server` 上过多资源来影响其他应用程序。


    #### ORM 在 .NET 端过滤数据


    开发人员需要编写他们的 `.NET` 代码，以便在 `SQL Server` 端传回数据记录之前，对返回的数据集进行过滤。否则，`SQL Server` 将传回所有记录，然后在
    `.NET` 端进行过滤。未过滤的查询检索以及将检索到的数据发送回应用程序是大量的工作，无论是数据库还是网络都不应该承担这些工作。开发人员还需要注意数据类型，因为使用不正确的类型可能导致隐式转换性能问题。此外，使用像
    `UPPER(column)` 这样的约定进行过滤会使索引无法使用，从而再次导致性能问题。


    #### ORM RBAR（逐行操作）


    当应用程序需要一个父对象及其关联的子对象（想象一篇帖子及其所有关联的回复）时，开发人员需要注意所选 `ORM` 的延迟加载用法。这意味着首先检索父对象，然后逐个检索子对象。有很多策略可以在需要时避免此问题。有时，您可能不希望检索所有子对象，除非需要与之交互，所以延迟加载没问题。但在其他情况下，开发人员可以在代码中强制使用预加载。


    此外，通过 `ORM` 插入数据会导致为添加的每一行执行单独的 `INSERT` 语句。这不仅对 `SQL Server` 来说工作量很大，还会导致您的事务日志变得臃肿。


    #### 似曾相识


    一些 `ORM` 可能会遇到与我们在数据库代码中看到的相同类型的问题。其中之一就是数据类型不匹配。如果在 `ORM` 中数据类型定义的值不正确，它生成的代码可能会导致与我们之前在书中讨论的相同的隐式转换。


    返回过多列的情况也是如此。就像在您的查询中一样（并且*不要*像使用 `SELECT *` 那样），编写 `.NET` 代码的开发人员需要准确指定需要返回哪些列，这样才不会每次都拉回整条记录。


    将所有条件都塞进一个 `.NET` 调用中非常诱人，但这只会生成一个带有非常复杂 `WHERE` 语句的查询。这将导致查询优化器无法制定出好的计划，从而出现次优的运行时性能。如果开发人员在进行调用时非常明确，并考虑传递一个
    `WHERE` 子句会是什么样子来提供他们请求的数据，就可以避免这种情况。


    #### 猜猜怎么着？使用存储过程！


    现在所有的 `ORM` 都可以调用存储过程。即使在专注于缓解上述问题之后，仍然可能生成非常糟糕的 `SQL` 代码。这时，开发人员会将代码从应用程序中提取出来，改为调用存储过程。然后就轮到我们来编写那个优化的存储过程了。

    '
- fmt: '### Dynamic SQL


    ORMs can generate dynamic SQL under certain circumstances. The application can
    also be written to generate dynamic SQL. The biggest issue with this is that SQL
    Server can’t then store an execution plan in the plan cache for the query; even
    changing a single white space in code will cause SQL Server to generate a new
    query plan. A new plan each run is expensive in terms of the work SQL Server has
    to do. Also, the dynamic SQL code generation can lead to some very complex and
    suboptimized queries, depending on the circumstances in which the code was built
    (many variables, many NULLs, and so forth).


    Dynamic SQL is wonderful for queries that have many statements in the `WHERE`
    clause, but should be written very carefully and all of the different possible
    permutations should be generated and tested.


    ## Summary


    SQL calls from outside of the instance your database resides on can bring some
    performance issues. Linked servers can split up your database loads to separate
    servers, which is good. However, these linked servers have some inherent performance
    issues if your SQL isn’t written correctly.


    SQL code in the application, whether written by developers or generated by an
    ORM, is difficult to fix because we need a developer to manipulate the application
    code, or pull the direct SQL call out of the application and instead have the
    application code call a stored procedure that we can have access to. In the first
    case, we can direct the developer on how to write the SQL code. In the second
    case, we can write the code into a stored procedure which we can then tune using
    strategies we learned in earlier chapters of this book!


    Thank you for coming on this journey with me to travel through the world of database
    objects and external influences and T-SQL code. I hope that you learned some new
    strategies for dealing with your legacy monster of an application. The ability
    to move from a reactive strategy to a proactive strategy is important to any of
    our sanity and is something we will all continue to strive for. Best of luck in
    your journey!


