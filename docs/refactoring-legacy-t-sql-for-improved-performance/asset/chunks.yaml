- fmt: '## Summary


    Now that the `WidePosts` table has been broken out into smaller tables and normalized,
    we can use those smaller tables whenever we run into poorly performing code referring
    to the `WidePosts` view, which was formerly a table. There is one major concern
    with this method, though. Inserts, updates, and particularly deletes to the former
    table, which is now a view, can fail if the insert or update changes values in
    more than one of the underlying tables at once.


    The concern about inserts, updates, and deletes makes this a great solution for
    read-only tables, but a less desirable solution for transactional tables. One
    way to mitigate data changes in transactional tables covered by a view is to use
    `INSTEAD OF` triggers on the view. Please be careful with `INSTEAD OF` triggers,
    as they can get exceptionally messy. I’d recommend against these triggers. If
    you have the ability to handle data changes in the application, I would make those
    changes in the application.


    # 4. Database Views


    A view is simply a saved select statement. It does have some limitations that
    can be hacked around, but with views, “just because you can doesn’t mean you should.”
    A view can be called just like a table, and a view can call other views. The limitations
    on views are as follows:


    *   The select statement has to be the first statement in a view definition with
    the exception of CTEs.

    *   You can’t order data in a view definition unless you use a `TOP` statement
    or `FOR XML` (I’ve seen plenty of `SELECT TOP 100%` in my day).

    *   Views cannot have default column values or constraints.

    *   Views cannot call temporary tables.


    There are many common bad habits that developers fall into when using views. Let’s
    take a look at some of them, using the following example. You get one of those
    infamous calls from one of your users. “Hey, we’re trying to run this query. All
    it’s doing is getting the number of linked posts for each post in a month, and
    it’s taking well over 5.5 hours. Can you find out what’s going on?” The user promises
    to send you a query, and you see the code in Listing 4-1 when you open your email.


    ```sql

    SELECT wp4.postID

    , wp4.creationDate

    , wp4.numLinkedPosts

    FROM WidePostsPlusFour wp4

    WHERE wp4.creationDate >=''20120801''

    AND wp4.creationDate < ''20120901'';

    ```


    Listing 4-1

    Find number of linked posts using the linked posts query


    The code in Listing 4-1 taking 5.5 hours to execute might be the most ridiculous
    thing you’ve ever heard. How can this simple query take that long? Hmm… that table
    name doesn’t look familiar. Well, it turns out that it’s not a table, it’s a view.
    Fine, fine, well, what’s the view definition? When we pull the `ALTER VIEW` statement
    from SSMS, we see the code in Listing 4-2.


    ```sql

    ALTER VIEW WidePostsPlusFour AS

    SELECT wp3.*

    , dbo.getNumLinkedPosts(wp3.postID) AS numLinkedPosts

    FROM dbo.WidePostsPlusThree wp3

    WHERE wp3.commentID IS NOT NULL;

    ```


    Listing 4-2

    View definition for `WidePostsPlusFour`


    That seems almost entirely harmless, except possibly for the function `getNumLinkedPosts`.
    And wait, is `WidePostsPlusThree` another view?


    ## Nesting


    Nesting is a big issue when layers of views call layers of other views. This practice
    of nesting generally results in many calls to the same tables and can also result
    in the optimizer not being able to generate a reasonable query plan. A few folks
    in the community have done some research on this; and, at least as of SQL Server
    2014, the optimizer couldn’t do much better than a “good enough” plan on any views
    nested too deeply (past five levels). So what exactly is causing the performance
    problem with the code in Listing 4-1? Well, there was the stored procedure `sp_codeCallsCascade`
    that we discussed in Chapter 2, which can find all SQL objects that a specified
    object calls. We can execute this as shown in Listing 4-3 to find any objects
    that our `WidePostsPlusFour` view calls.


    Table 4-1

    Results of `sp_codeCallsCascade` example in Listing 4-3


    | thisObjName | thisObjType | callingCode | Level |

    | --- | --- | --- | --- |

    | WidePostsPlusFour | VIEW | root | 0 |

    | WidePostsPlusThree | VIEW | WidePostsPlusFour | 1 |

    | WidePostsPlusTwo | VIEW | WidePostsPlusThree | 2 |

    | WidePostsPlusOne | VIEW | WidePostsPlusTwo | 3 |

    | WidePostsCh4 | VIEW | WidePostsPlusOne | 4 |

    | getnumLinkedPosts | SQL_SCALAR_FUNCTION | WidePostsPlusFour | 1 |


    ```sql

    EXECUTE sp_codeCallsCascade @codename = ''WidePostsPlusFour'',@rootSchema=''dbo'';

    ```


    Listing 4-3

    Sample call for `sp_codeCallsCascade`


    As we see in Table 4-1, the `WidePostsPlusFour` view contains five nested levels
    of views! It also contains the scalar function `getNumLinkedPosts`. So, the question
    then becomes, what do the rest of these views look like? Even though the view
    `WidePostsPlusFour` looks like only a small amount of code, what really runs when
    you call it is the entire view cascade! So, for example, this view call would
    really look like the code in Listing 4-4 to SQL Server (and the Query Optimizer,
    which as you can imagine might be a little confused!).'
