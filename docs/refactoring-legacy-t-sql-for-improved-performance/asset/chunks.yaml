    \  ---------------  ----------   ------------------------------\n2019.07.07  \
    \ LBohm                         初始版本\n**************************************************************************/\n\
    CREATE FUNCTION dbo.getLastBadgeUser (@userID int)\nRETURNS nvarchar(40)\nAS\n\
    BEGIN\nDECLARE @badgename nvarchar(40);\nSET @badgename = COALESCE((SELECT TOP\
    \ 1 [Name]\nFROM dbo.Badges\nWHERE userID = @userID\nORDER BY [Date] DESC),”);\n\
    RETURN @badgename;\nEND;\n```\n**代码清单 6-17**\n`dbo.getLastBadgeUser` 的创建语句\n\n\
    我们应该能够使用带有徽章信息的 `OUTER APPLY`，并几乎原封不动地将代码从函数移到 `OUTER APPLY` 中，如 **代码清单 6-18**\
    \ 所示。\n\n```\nOUTER APPLY (SELECT TOP 1 [Name] AS latestBadge\nFROM dbo.Badges\n\
    WHERE userID = u.id\nORDER BY [Date] DESC) AS bInfo\n```\n**代码清单 6-18**\n用于替换\
    \ `getLastBadgeUser` 函数的 `OUTER APPLY` 语句\n\n### 移除 LIKE 语句中开头的 %\n\n这是我们将在 `getUserInfoByName`\
    \ 查询中更改的最后一部分。正如我们之前讨论的，当 `LIKE` 语句中存在开头的 `%` 时，查询优化器无法使用索引。为什么会这样？嗯，如果我们思考一下索引是什么，这就完全说得通了。索引是以特定顺序显示的数据。如果前导列是\
    \ `varchar` 或类似数据类型，则顺序是按字母顺序排列的。如果我们知道短语的开头，就可以使用索引来查找与开头匹配的数据，因为我们确切地知道它在索引中的位置（由于索引的顺序）。然而，如果我们不知道开头，就仍然必须扫描整个索引，而不是能够使用有针对性的查找操作。\n\
    \n当我们把三项更改放在一起——移除子查询、移除函数以及移除 `LIKE` 语句中开头的 `%`——我们得到如 **代码清单 6-19** 所示的代码。\n\
    \n```\nIF NOT EXISTS\n(\nSELECT 1\nFROM sys.procedures\nWHERE name = 'getUserInfoByName'\n\
    )\nBEGIN\nDECLARE @sQL NVARCHAR(1200);\nSET @sQL = N'/**************************************************************************\n\
    2019.07.07         LBohm        初始存储过程桩创建版本\n**************************************************************************/\n\
    CREATE PROCEDURE dbo.getUserInfoByName\nAS\nSET NOCOUNT ON;\nBEGIN\nSELECT 1;\n\
    END;';\nEXECUTE SP_EXECUTESQL\n@sQL;\nEND;\nGO\n/**************************************************************************\n\
    描述：按名称获取用户数据\n--测试调用：\n-- EXECUTE dbo.getUserInfoByName @theName = 'Joel';\n2019.07.07\
    \         LBohm          初始版本\n**************************************************************************/\n\
    ALTER PROCEDURE [dbo].[getUserInfoByName] @theName varchar(20)\nAS\nSELECT u.ID\n\
    , u.displayname\n, u.aboutme\n, SUM(CASE WHEN p.postTypeID = 1 THEN 1 ELSE 0 END)\
    \ AS numPosts\n, SUM(CASE WHEN v.id IS NOT NULL THEN 1 ELSE 0 END) AS numFavVotes\n\
    , SUM(CASE WHEN p.postTypeID = 2 THEN 1 ELSE 0 END) AS numComments\n, MAX(CASE\
    \ WHEN p.postTypeID = 2 THEN p.creationDate ELSE '20000101' END) AS dateLastComment\n\
    , u.upvotes\n, u.downvotes\n, binfo.latestBadge\nFROM dbo.users u\nINNER JOIN\
    \ dbo.posts p ON u.id = p.ownerUserID\nLEFT OUTER JOIN dbo.votes v ON p.ID = v.postID\n\
