- fmt: '## Add More Data in Small, Easily Testable Increments


    The results we see in `Table 6-1` seem pretty straightforward and reasonable.
    Let’s now look at adding some of the aggregates we need to mimic the functionality
    of the original stored procedure. We want to know, for a user, how many accepted
    answers they have. We’ll use a `CASE` statement, and every time an answer is the
    accepted answer, we’ll set the value to `1` and then sum those `1`’s. If the answer
    is not an accepted answer, we’ll set the value to `0`, so the sum will still reflect
    just the number of accepted answers. We also need the highest number of responses
    to a single post in a day, which we can get with a `MAX()` of the number of answers.
    We can use `SUM()` to tell us the number of answers in a single day. The query
    we use is shown in `Listing 6-3`.


    ```sql

    SELECT CAST(p.CreationDate AS DATE) AS createDate

    , COUNT(p.Id) as numPosts

    , SUM(p.AnswerCount) AS numResponses

    , MAX(p.AnswerCount) AS maxNumAnswers

    , pUser.OwnerUserId

    , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) AS isAccepted

    , MAX(pUser.Score) AS upvotes

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND pUser.PostTypeId = 2

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1

    GROUP BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId

    ORDER BY pUser.OwnerUserId;

    ```


    Listing 6-3

    Adding aggregates to our response posts for a single-day query


    We use a `GROUP BY` clause in `Listing 6-3`. The `GROUP BY` clause is going to
    aggregate the data per user. When we run the query, we get the result set shown
    in `Table 6-2`.


    `Table 6-2`


    First ten records from running the query in `Listing 6-3`


    | Create Date | Num Posts | Num Responses | maxNum Answers | Owner UserId | isAccepted
    | upvotes |

    | --- | --- | --- | --- | --- | --- | --- |

    | 2012-08-01 | 361 | 64 | 3 | NULL | 0 | NULL |

    | 2012-08-01 | 66 | 187 | 7 | 0 | 22 | 62 |

    | 2012-08-01 | 1 | 2 | 2 | 16 | 1 | 2 |

    | 2012-08-01 | 1 | 2 | 2 | 95 | 0 | 0 |

    | 2012-08-01 | 1 | 2 | 2 | 343 | 0 | 0 |

    | 2012-08-01 | 3 | 7 | 3 | 476 | 1 | 4 |

    | 2012-08-01 | 1 | 1 | 1 | 492 | 1 | 3 |

    | 2012-08-01 | 2 | 3 | 2 | 536 | 2 | 11 |

    | 2012-08-01 | 1 | 2 | 2 | 549 | 1 | 3 |

    | 2012-08-01 | 1 | 3 | 3 | 631 | 1 | 0 |


    Is the data in `Table 6-2` the data we need for our query? Not exactly, but it
    is going to give us the building blocks we need to find the data we need. This
    query tells us


    1.  The number of distinct user IDs that responded to a post in this day (there
    is a record for each user ID)

    2.  Which user ID had the most answers

    3.  How many of those answers were “accepted”


    It looks like there are some “default” `OwnerUserIds` that can probably be ignored.
    The values `NULL` and `0` seem to be “not real or valid” values, which we can
    check by seeing if there’s a user id of `0` in the `Users` table. If we run the
    query in `Listing 6-4`, we’ll see that there is no user in the `Users` table with
    an ID of `0`.


    ```sql

    SELECT * FROM users

    WHERE Id = 0;

    ```


    Listing 6-4

    Check existence of a user


    We should also discount these in the final query output. How do we get rid of
    these values? We want ALL `ownerUserIDs` except those that match the values of
    `NULL` or `0`. This line will make that check for us and allow us to filter out
    those values. If you haven’t played with `EXCEPT` or `INTERSECT` yet, I highly
    recommend doing so.


    ```sql

    AND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))

    ```


    The next step in our rewrite is to remove these undesirable user IDs and then
    get aggregates over different groupings – some by post, some by day, and some
    by user. How do we do that?


    ## Windowing Functions


    What are those? Something installed on Windows? Well, I guess technically “yes,”
    but in this case, they are functions included in later versions of SQL Server
    (some 2005 or later, others 2012 or later). What they do is take a “window” of
    your query results and allow you to do aggregates on them. Let’s look at an example
    shown in `Listing 6-5`.


    ```sql

    SELECT p.Id

    , CAST(p.CreationDate AS DATE) AS createDate

    , p.AnswerCount

    , pUser.Score

    , COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS numPostsUser

    , COUNT(pUser.OwnerUserId) OVER (PARTITION BY pUser.ParentId) AS numUsersPost

    , pUser.ParentId

    , pUser.OwnerUserId

    , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION
    BY pUser.OwnerUserId) AS numAccepted

    , u.DisplayName

    , ROW_NUMBER() OVER (PARTITION BY pUser.OwnerUserId ORDER BY pUser.ParentId DESC)
    AS theUserRowNum

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))

    AND pUser.PostTypeId = 2

    LEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId = u.Id

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1;

    ```


    Listing 6-5

    Adding windowing functions


    We can look at the result set shown in `Table 6-3`, which is a subset of the columns
    in our query in `Listing 6-5`, to see if we succeeded in getting the data needed.
    How did we get the number of posts each user responded to? We used a count of
    the post ID (it’s the parent ID in the response link), and we partitioned by the
    user ID. We want to `COUNT` the `pUser.ParentId`, and we want the partition on
    this field defined by the `pUser.OwnerUserId`, so we use the following line:


    ```sql

    COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS numPostsUser

    ```


    Our “window” for the aggregate when we partition by the `OwnerUserId` is the set
    of posts a single user responded to, and the windowing function will return a
    separate aggregate for each user ID.


    `Table 6-3`


    Subset of results from the query in `Listing 6-4`


    | Id | Num Posts User | Num Users Post | ParentId | Owner UserId | Num Accepted
    |

    | --- | --- | --- | --- | --- | --- |

    | 11766266 | 1 | 3 | 11766266 | 9465 | 0 |

    | 11758727 | 3 | 1 | 11758727 | 9475 | 3 |

    | 11756598 | 3 | 1 | 11756598 | 9475 | 3 |

    | 11755899 | 3 | 1 | 11755899 | 9475 | 3 |

    | 11766893 | 2 | 4 | 11766893 | 9530 | 2 |

    | 11762529 | 2 | 3 | 11762529 | 9530 | 2 |

    | 11759414 | 1 | 3 | 11759414 | 9686 | 1 |

    | 11764539 | 1 | 17 | 11764539 | 9732 | 0 |

    | 11755196 | 1 | 2 | 11755196 | 9922 | 1 |

    | 11763636 | 1 | 2 | 11763636 | 10397 | 1 |


    We’re going to use the same “window,” which is the set of posts a single user
    responded to in a day, for the number of accepted answers by the user ID. How
    can we do a sanity check, though? Run the query in `Listing 6-2`, adding an `ORDER
    BY p.Id` (the post ID). You can visually count how many different users responded
    to each post. Then run the code in `Listing 6-5` again, also adding an `ORDER
    BY p.Id`. You can check the query without aggregates against the query with aggregates
    visually to see that the aggregates are correct for the entire query: you’re getting
    the number of posts that user answered for every record that has that user on
    it. You’ll see the same for the number of users that answered a post. Performing
    sanity checks like this often can help you from straying down the wrong programming
    path and save you time when troubleshooting!'
