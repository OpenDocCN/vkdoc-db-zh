    | SQL Server Execution Times: | 00:00:02.532 | 00:00:02.539 |

    | **Total** | **00:00:03.673** | **00:00:03.681** |


    So what are we looking at with Table [1-1](#483961_1_En_1_Chapter.xhtml#Tab1)?
    When we’re using `STATISTICS` output to help with query tuning, we’re mostly going
    to focus on logical reads. The first time you run a query, if your data isn’t
    in memory, you will see higher physical reads. When testing queries, I generally
    ignore the first run and focus on the second. This is more accurate to what is
    usually seen in production, where the data being called frequently will already
    be in memory. Also, by always using this method, we can make sure we’re comparing
    apples to apples.'
  trans: '

    ## 相对工作量


    如果这是一个拥有数千行代码的对象，那就遗憾地摇摇头然后离开吧。开个玩笑！然而，光是理解正在发生什么就需要大量努力，更不用说实际修复性能问题所需的工作量了。这正是优秀文档发挥作用的地方，但如果你正在阅读本书，很可能没有那种唾手可得的帮助。


    此外，你需要考虑质量保证（QA）的工作量。最好的情况是永远不要让未经测试的代码进入生产环境。所谓未经测试，我指的是没有通过严格 QA 流程的代码。在笔记本电脑上运行一次似乎是个好主意，但存在各种你可能没有意识到的奇怪场景，而
    QA 专业人员会对此有更好的把握。


    这段代码中存在多少确切的痛点？这将是我们可以进行何种分类处理以让用户满意（或至少让他们停止向你老板抱怨）的最大决定因素。然而，无论这些答案如何，如果代码已被确定为真正的问题，分类处理只是你的第一步。即使你通过索引或其他巧妙的巫术“修复”了它，也不要就此停止！务必充分记录代码并在必要时重写。


    ## 问题领域


    “喂？Sam DBA？每次用户尝试更改他们的显示名称时，应用程序都会卡住几秒钟，这真的让每个人都很沮丧。”


    了解代码问题的最佳方法是去运行一些导致问题的代码。有时，实际 SQL 代码之外的设置也会引发问题。应用程序连接字符串有时会设置 ANSI 设置，这可能导致
    SQL 代码的运行方式与 SQL Server Management Studio（SSMS）中的运行方式截然不同。在本书中，我们假设这些可能性已被排除，并非我们所见问题的原因，但我想让你知道，如果你还没有检查这些可能性，你应该去检查一下。


    这是你刚刚从呼叫者那里获得的非常有用的信息。但请注意，人们喜欢随意使用“总是”和“从不”这样的词。尽量获取细节：“当你说每次时，是 100% 的情况吗？是
    90% 的情况吗？是任何时间都发生还是仅限于某些特定时间？” 记录这些答案，以便与工单/请求/投诉文档一起存档。


    让我们去看看当用户尝试更改其显示名称时发生了什么。在接下来的部分中，我们将尝试更改以下用户的显示名称，以寻找问题所在。我们将使用 Jon Skeet（其 `Id`
    为 22656）和 stic（其 `Id` 为 31996）。查询将针对 `dbo.Users` 表运行。


    ### STATISTICS IO 和 STATISTICS TIME


    `STATISTICS IO` 是衡量查询使用的 IO 资源量的指标，而 `STATISTICS TIME` 则测量查询运行时的 CPU 时间和已用时间，以及查询编译时间。如果你依赖
    SSMS 右下角的数字来衡量查询时间，请停止这样做！它不准确——或者肯定不够准确。


    ### 查询窗口设置


    首先，打开 SSMS。连接到数据库并打开一个新的查询窗口，然后打开 `STATISTICS IO` 和 `STATISTICS TIME`。通过 UI 操作，选择“查询”菜单选项，然后选择“查询选项”，再选择“高级”。图
    1-1 显示了“查询选项”的“高级”窗口。


    ![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig1_HTML.jpg](img/483961_1_En_1_Fig1_HTML.jpg)


    图 1-1


    SSMS 中的“查询选项高级”窗口


    确保勾选`SET STATISTICS TIME`和`SET STATISTICS IO`两个复选框，然后点击确定。


    如果你想完全使用脚本，只需在查询窗口中键入如清单 1-1 所示的代码。


    ```

    SET STATISTICS TIME, IO ON;

    Listing 1-1

    用于打开 STATISTICS TIME 和 IO 的命令

    ```


    然后点击执行（或按 Ctrl+E）。请注意，无论你以哪种方式设置 `STATISTICS TIME` 和 `IO` 为开启状态，它都只对该特定查询窗口或连接（SPID）生效。如果连接被重置（例如，重启
    SSMS）或者你打开了另一个查询窗口，你将需要为新的查询窗口再次打开 `STATISTICS TIME` 和 `IO`。


    ### 代码测试


    接下来，我们想要更新一个用户名。所以，首先，我通过查询 `Users` 表找到了一个用户，并编写了一个快速查询来更改名称。我运行了两次，因为第一次运行通常包括编译时间。顺便说一下，这个用户的原始名字是“stic”。我们稍后会把它改回来。


    ```

    UPDATE Users

    SET DisplayName = ''stic in mud''

    WHERE Id = 31996;

    Listing 1-2

    用于更新用户“stic”显示名称的代码

    ```


