    , MAX(CASE WHEN p.PostTypeId = 2 THEN p.CreationDate ELSE ''20000101'' END) AS
    dateLastComment

    , u.UpVotes

    , u.DownVotes

    , dbo.getlastBadgeUser(u.Id) AS latestBadge

    FROM dbo.Users u

    INNER JOIN dbo.Posts p ON u.Id = p.OwnerUserId

    LEFT OUTER JOIN dbo.Votes v ON p.Id = v.PostId

    AND v.VoteTypeId = 5

    WHERE p.PostTypeId IN (1,2)

    AND u.[DisplayName] LIKE ''%'' + @theName + ''%''

    GROUP BY u.Id

    , u.DisplayName

    , u.AboutMe

    , u.UpVotes

    , u.DownVotes

    , dbo.getlastBadgeUser(u.Id);

    Listing 6-16

    getUserInfoByName query with subqueries removed

    ```


    The first step is to run this code with STATISTICS IO and TIME on to see if we’re
    making progress in reducing our reads. The output from the STATISTICS IO and TIME
    from the query in Listing [6-16](#483961_1_En_6_Chapter.xhtml#PC35), still running
    against `@theName = ''Joel''`, gives us interesting results:


    ```

