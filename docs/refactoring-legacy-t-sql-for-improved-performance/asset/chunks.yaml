    ## Using OUTER APPLY to Join Aggregate Data


    Additionally, if there were more than one row in the output, I would also move
    the code which finds our additional data to joins or OUTER APPLYs. What would
    that look like? We can look at the code in Listing [7-15](#483961_1_En_7_Chapter.xhtml#PC17)
    to see a method using OUTER APPLY. For pieces of data that come from the same
    table, we can combine the metrics in the same OUTER APPLY.


    ```

    SELECT p.Id AS postID

    , p.Score

    , com.numComments

    , resp.numResponses

    , resp.numResponders

    , vote.numVotes

    , p.ViewCount

    FROM dbo.Posts p

    OUTER APPLY (SELECT COUNT(1) AS numComments

    FROM dbo.Comments c

    WHERE c.PostId = p.Id) com

    OUTER APPLY (SELECT COUNT(DISTINCT OwnerUserID) AS numResponders

    , COUNT(Id) AS numResponses

    FROM dbo.Posts resp

    WHERE resp.PostTypeId = 2

    AND p.Id = resp.ParentId) resp

    OUTER APPLY (SELECT COUNT(1) AS numVotes

    FROM dbo.Votes v

    WHERE v.PostId = p.Id) vote

    WHERE p.Id = 649789;

