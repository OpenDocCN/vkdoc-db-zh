    answering each post. In general, front-end developers think in procedural fashion.
    Actually, most people think in a procedural fashion. “I do this, then I do that,
    then I do this, and then I grab the next one and do the same things.” Relational
    databases are meant to work best on batches, but training ourselves to think in
    terms of batching everything is difficult because so few things in life really
    work in that manner.


    We’ll talk much more in depth about concerns with looping as we get into rewriting
    the code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1), but in terms of documentation
    we just want to make sure we note everywhere we see row-by-row processing, like
    we see in the two loops previously mentioned. You’ll often hear the acronym RBAR
    being used to describe code which uses row-by-row processing. The acronym RBAR
    was coined by Jeff Moden, and stands for “row by agonizing row.”


    In terms of what to document for the code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1),
    first we’ll get an idea of how many posts were entered per month, which will indicate
    how many records need to be processed by the first loop. We do that using the
    code in Listing [2-10](#483961_1_En_2_Chapter.xhtml#PC10).


    ```

    SELECT COUNT(1) as NumPosts

    , DATEPART(year,CreationDate)

    , DATEPART(m, CreationDate)

    FROM dbo.Posts

    WHERE PostTypeId = 1

    GROUP BY DATEPART(year,CreationDate),DATEPART(m,CreationDate)

    ORDER BY DATEPART(year,CreationDate),DATEPART(m,CreationDate);

    Listing 2-10

    Code to determine number of posts entered per month

    ```


    For the documentation of Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1), we’ll
    note the following: 1) there is a while loop that runs through all question posts
    in a month (roughly 50k–150k), and 2) there is a second, inner while loop for
    each user responding to a post (there are about two users responding to each post).


    ### CTEs


    There are no combined table expressions used in the code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1).
    When we are documenting code, we look for them because people don’t always understand
    that each time a CTE is referred to, it reruns the CTE evaluation code. This can
    cause a lot more work to be going on in the background than people realize. There
    are only two times I use CTEs – when attempting to limit view result sets and
    when I need to use recursion in my code. The stored procedures `sp_codeCallsCascade`
    and `sp_codeCalledCascade` that are included with this book code are examples
    of using CTEs for recursion. Recursion, however, is beyond the scope of this book.


    ### Join Types


    Standard join types and syntax are used in the code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1).
    By standard joins and syntax, we mean explicitly declared joins as “INNER JOIN”
    or “LEFT OUTER JOIN” or other commonly used join types. There are types of join
    syntax that used to be acceptable that will cause compiler failures in newer versions
    of SQL Server.


    Also, people who don’t understand nonstandard joins well may use them and have
    unintended consequences in the result set, which may not get caught by QA.


    ### LIKE, NOT LIKE, and NOT IN


    The IN and LIKE operators can be misused and cause performance problems. There
    are generally better alternatives to each of them, which is why we want to document
    their use in any code we are refactoring. We don’t see LIKE or NOT LIKE used at
    all in the code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1), which is good
    because the use of either LIKE or NOT LIKE can prohibit queries from using indexes.


    There is no usage of NOT IN in the code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1)
    either. Why are we checking for the use of this operator? There used to be a performance
    advantage of using EXISTS and NOT EXISTS instead of IN and NOT IN, but that has
    diminished over time and with newer versions of SQL Server. However, NOT IN and
    NOT EXISTS handle NULL values in different ways – if the source data for the subquery
    contains a NULL value, the NOT IN will evaluate to FALSE even if the value really
    doesn’t exist. NOT EXISTS will not have the same issue with NULL in the result
    set; so we still advise using NOT EXISTS over NOT IN.


    ### DISTINCT, TOP, and Other Sorting Operations


    Sorting can be expensive in SQL Server. Many operations, such as TOP and DISTINCT,
    require some sorting, which is why we want to call them out when we find them.
    MIN and MAX are also sorting operations, even if an explicit order by clause doesn’t
    exist; the values of the field we’re taking the MIN or MAX of need to be sorted
    so we can determine which is the highest or the lowest.


    For each loop in the code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1),
    we’re looking for the MIN(Id) of the table we’re looping through. In this case,
    we see


    *   MIN(Id) from Posts in a time frame


    *   MIN(OwnerUserId) from Posts based on a ParentId


    Other than these two MIN() columns, there are no operations that would indicate
    sorting underneath the hood.


    ### Calls to Other User-Defined SQL Objects


    Fortunately, there are no other SQL objects (besides the `dbo.Posts` table) called
    by the stored procedure in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1). I
    have a stored procedure I wrote based on dependencies that SQL Server keeps track
    of, that can tell you what other objects are dependent on your object (which in
    most cases translates to objects called by this). I don’t have it tracking tables;
    it will show stored procedures and functions. I have included the stored procedure
    with this book; it is called sp_codeCallsCascade. It uses system catalog views
    to determine the dependencies.


    You can use this against your code to see what code your object calls, and then
    what objects those objects call, and… well, and so on. The call is demonstrated
    in Listing [2-11](#483961_1_En_2_Chapter.xhtml#PC11).


    ```

    EXECUTE sp_codeCallsCascade @codeName=''DailySummaryReportPerMonth'', @rootSchema
    = ''dbo'';

    Listing 2-11

    Sample call for sp_codeCallsCascade

    ```'
