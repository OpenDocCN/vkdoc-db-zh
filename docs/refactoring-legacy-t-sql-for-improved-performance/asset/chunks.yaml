- fmt: '### Native SQL Server Functions in a WHERE Clause


    我们刚刚查找了用户定义的 SQL 对象（包括函数）的调用。但是，我们还需要查看 WHERE 子句中使用的原生 SQL Server 函数。这种用法需要注意，因为如果函数操作的是表字段（即使是
    `ISNULL`），它可能导致使用该函数的查询无法使用索引。这类似于我们讨论过的隐式转换：如果我们要检查两个值是否相等，就必须评估每条记录的值，以确定函数的输出是否与我们比较的值相匹配。


    在代码清单 [2-1](#483961_1_En_2_Chapter.xhtml#PC1) 中，原生 SQL Server 函数出现在两个地方。它们出现在
    `@postID` 的初始赋值以及 `@postID` 变量的后续赋值中。它针对一个月时间范围内大约 150k 个帖子中的每一个运行。代码如清单 [2-12](#483961_1_En_2_Chapter.xhtml#PC12)
    所示。


    ```sql

    SET @postID = COALESCE((SELECT MIN(Id)

    FROM dbo.Posts

    WHERE  DATEADD(m, DATEDIFF(m, 0, CreationDate),0) = @monthYear

    AND PostTypeId = 1)

    ,0);

    ```

    **清单 2-12**

    来自清单 2-1 的 WHERE 子句中的原生 SQL Server 函数


    如果我们运行类似清单 [2-12](#483961_1_En_2_Chapter.xhtml#PC12) 的代码来获取执行计划，同时打开 `STATISTICS
    IO` 和 `TIME`，会发生什么？我们可以很容易地模拟一个测试示例，如清单 [2-13](#483961_1_En_2_Chapter.xhtml#PC13)
    所示。


    ```sql

    DECLARE @monthYear datetime = ''20120801''

    , @postID int;

    SET @postID = COALESCE((SELECT MIN(Id)

    FROM dbo.Posts

    WHERE  DATEADD(m, DATEDIFF(m, 0, CreationDate),0) = @monthYear

    AND PostTypeId = 1)

    ,0);

    SET @postID = COALESCE((SELECT MIN(Id)

    FROM dbo.Posts

    WHERE  DATEADD(m, DATEDIFF(m, 0, CreationDate),0) = @monthYear

    AND PostTypeId = 1

    AND Id > @postID)

    ,0);

    ```

