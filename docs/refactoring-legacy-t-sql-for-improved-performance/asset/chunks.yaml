  trans: '

    ## 触发器与多记录变更


    这个触发器实际上还有另一个问题。你意识到可能是什么了吗？很多时候，人们会假设插入和更新操作每次只涉及单行。但这不一定成立。如果我们一次更新多个用户会怎样？好，首先让我们返回去，用清单
    5-8 中的代码恢复用户 1010297 的 `Reputation` 值。然后，让我们尝试运行清单 5-9 中的代码，来一次性查看多个用户。查询结果如表
    5-8 所示。


    表 5-8


    清单 5-9 中查询的结果


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 25 | 14 |

    | 1639596 | 1 | 3 |

    | 2179513 | 5 | 3 |

    | 2491405 | 1 | 3 |

    | 2549795 | 31 | 3 |


    ```sql

    DECLARE @theTable TABLE (id int);

    INSERT INTO @theTable (id)

    VALUES (1010297)

    , (1639596)

    , (2179513)

    , (2491405)

    , (2549795);

    SELECT tb.id

    , u.Reputation

    , u.DownVotes

    FROM @theTable tb

    INNER JOIN dbo.Users u ON tb.id = u.Id;

    清单 5-9

    查看多个用户的 DownVotes 和 Reputation

    ```


    表 5-8 展示了五个用户的数据。如果我们为每个人的 `DownVotes` 增加 1，那么 Id 为 1010297 的用户的 `Reputation`
    应该减少 1，但其他人不应该减少（他们每人只有四个 `DownVotes`）。让我们使用清单 5-10 中的代码来看一下。


    ```sql

    DECLARE @theTable TABLE (id int);

    INSERT INTO @theTable (id)

    VALUES (1010297)

    , (1639596)

    , (2179513)

    , (2491405)

    , (2549795);

    SELECT tb.id

    , u.Reputation

    , u.DownVotes

    FROM @theTable tb

    INNER JOIN dbo.Users u ON tb.id = u.Id;

    UPDATE u

    SET DownVotes = u.DownVotes + 1

    FROM dbo.Users u

    INNER JOIN @theTable tb ON u.Id = tb.id;

    SELECT tb.id

    , u.Reputation

    , u.DownVotes

    FROM @theTable tb

    INNER JOIN dbo.Users u ON tb.id = u.Id;

    清单 5-10

    更新多个用户的 DownVotes

    ```


    我们在表 5-8 中看到了更新前的结果。更新后的结果如表 5-9 所示。


    表 5-9


    清单 5-10 代码的运行结果


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 24 | 15 |

    | 1639596 | 0 | 4 |

    | 2179513 | 4 | 4 |

    | 2491405 | 0 | 4 |

    | 2549795 | 30 | 4 |


    哦，不！这些人的 `Reputation` 都被减少了。当我们查看清单 5-1 中的 `EXISTS` 语句时，我们检查是否存在一条记录，其 `DownVotes`
    能被 5 整除。然而，在实际的更新语句中，我们并没有检查相同的条件！如果我们使用清单 5-5 中的代码查看 `Triggerlog` 表，我们也会看到这些用户的每一条记录都在触发器中运行了。


    如果我们使用清单 5-11 中的代码，修改清单 5-1 触发器中的更新语句，那么我们应该只更新 `EXISTS` 语句找到的相同记录，我们的结果应该会好很多。


    ```sql

    UPDATE u

    SET u.Reputation = u.Reputation - 1

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0

    AND i.DownVotes > 0

    AND i.DownVotes % 5 = 0;

    清单 5-11

    测试 DownVotes 是否能被 5 整除的新更新语句

    ```


    在我们用清单 5-11 中的代码修改清单 5-1 中的代码并进行测试之前，我们应该使用清单 5-12 中的代码恢复用户的 `Reputation` 分值。


    ```sql

    DECLARE @theTable TABLE (id int, Reputation int, DownVotes int);

    INSERT INTO @theTable (id, Reputation, DownVotes)

    VALUES (1010297, 25, 14)

    , (1639596, 1, 3)

    , (2179513, 5, 3)

    , (2491405, 1, 3)

    , (2549795, 31, 3);

    UPDATE u

    SET Reputation = tb.Reputation

    , DownVotes = tb.DownVotes

    FROM dbo.Users u

    INNER JOIN @theTable tb ON u.Id = tb.id;

    清单 5-12

    恢复多个用户的 Reputation 分值

    ```


    接下来，我们将用清单 5-11 中的 `UPDATE` 语句替换清单 5-1 触发器中的 `UPDATE` 语句，并运行 `ALTER` 语句。然后我们将重新运行清单
    5-10 中的代码，看看当我们更新这五个用户的 `DownVotes` 时会发生什么。更新前的结果应该与最初显示在表 5-8 中的结果相同。我们更新后的结果与之前不同，显示在表
    5-10 中。


    表 5-10


    一次性更新多个用户 DownVotes 后的结果


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 24 | 15 |

    | 1639596 | 1 | 4 |

    | 2179513 | 5 | 4 |

    | 2491405 | 1 | 4 |

    | 2549795 | 31 | 4 |


    呼！一切都正常了。表 5-10 显示只有用户 1010297 的 `Reputation` 减少了，这正是我们想要的结果。但真的完全没问题了吗？让我们看一个我们不改变
    `DownVotes` 数值的场景。首先请运行清单 5-12 中的代码，将我们的用户值重置回起始值。没有改变 `DownVotes` 值的代码如清单 5-13
    所示。

