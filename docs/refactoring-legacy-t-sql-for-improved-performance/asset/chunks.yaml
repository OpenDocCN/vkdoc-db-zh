- fmt: '### Additional Pieces for Documentation


    For each join in each of these views, do the datatypes match on both sides of
    the join? The answer here is yes, so we’re going to avoid implicit conversion
    problems. There are no subqueries in any of these definitions besides the unpivot
    inner join subquery. There are some aggregates though, but nothing else that could
    remotely qualify as a calculation. It’s a view, so we know there are no temporary
    tables or table variables. Likewise, there are no loops or cursors. Please note,
    however, that functions called by views can include temporary tables, table variables,
    loops, and/or cursors! Views do allow CTEs, but there are none of them here.


    All of the join types we see in these views are quite standard, so no surprises
    there. In fact, the only other red flag item we find is the call to the function.


    ### Know Your Data


    Let’s see how much data is “in” these views – or, as I should say, is called by
    these views. Let’s do a simple count of the number of records in each view with
    the queries in Listing [4-5](#483961_1_En_4_Chapter.xhtml#PC5). We can also see
    what kind of time it takes these simple calls to run.


    ```sql

    SELECT COUNT(1) FROM WidePostsCh4

    WHERE postID < 1000000;

    SELECT COUNT(1) FROM WidePostsPlusOne

    WHERE postID < 1000000;

    SELECT COUNT(1) FROM WidePostsPlusTwo

    WHERE postID < 1000000;

    SELECT COUNT(1) FROM WidePostsPlusThree

    WHERE postID < 1000000;

    SELECT COUNT(1) FROM WidePostsPlusFour

    WHERE postID < 1000000;

    ```

    Listing 4-5 Queries to find number of rows called by the nested views


    The results of these queries are shown in Table [4-3](#483961_1_En_4_Chapter.xhtml#Tab3).
    It is interesting to see how the number of records changes. The records decrease
    when there are `GROUP BY` clauses and increase when additional information that
    may cause duplication of records is joined to the dataset.


    Table 4-3 Number of records called by each view as determined by code in Listing
    [4-5](#483961_1_En_4_Chapter.xhtml#PC5)


    | View | Records |

    | --- | --- |

    | WidePosts | 704,857 |

    | WidePostsPlusOne | 5,677,176 |

    | WidePostsPlusTwo | 85,922 |

    | WidePostsPlusThree | 443,670 |

    | WidePostsPlusFour | 70,635 |


    When we run the `STATISTICS IO` and `TIME` output through the Statistics Parser
    web site, we get the data seen in Table [4-4](#483961_1_En_4_Chapter.xhtml#Tab4).
    We see that these queries took… seven-and-a-half hours to run? Yipes! We also
    see a lot of read-ahead reads. What exactly ARE read-ahead reads?


    Table 4-4 Reads data from `STATISTICS IO` and `TIME` output from code in Listing
    [4-5](#483961_1_En_4_Chapter.xhtml#PC5)


    | Totals | Scan Count | Logical Reads | Physical Reads | Read-AheadReads |

    | --- | --- | --- | --- | --- |

    | Comments | 16,302,351 | 154,066,055 | 16,455,998 | 0 |

    | Posts | 1 | 357,188,473 | 229,179 | 288,642,683 |

    | PostTypes | 14 | 28 | 2 | 0 |

    | Users | 2 | 137,315,320 | 345,900 | 6,661,228 |

    | Votes | 27 | 6,579,846 | 262,615 | 6,516,446 |

    | VoteTypes | 13 | 26 | 13 | 0 |

    | Workfile | 1,134 | 2,640,232 | 313,074 | 2,347,454 |

    | Worktable | 80,694,535 | 357,874,423 | 3,206,059 | 9,079,996 |

    |   |   | **CPU** | **Elapsed** |   |

    | SQL Server parse and compile time: | 0:00:10 | 0:00:13 |   |

    | SQL Server Execution Times: | 2:33:26 | 7:28:15 |   |


    When you ask SQL Server to return data, it’s going to first look in the buffer
    cache to see if the data you need is there. If not, SQL Server is going to go
    get it from disk. According to Books Online (Microsoft’s online documentation),
    read-ahead reads indicate the number of pages placed into the cache for the query.
    There is a lot of data being moved from disk into memory! IO caused by functions
    won’t be included in the `STATISTICS IO` output, so there may be more reads that
    are happening when this code is run, attributed to the function.


    ### Functionality Check


    Let’s go back and take another look at the original query, which is shown again
    in Listing [4-6](#483961_1_En_4_Chapter.xhtml#PC6). We want to take a step back
    and try to determine exactly what the query is trying to accomplish.


    ```sql

    SELECT wp4.postID

    , wp4.creationDate

    , wp4.numLinkedPosts

    FROM WidePostsPlusFour wp4

    WHERE wp4.creationDate >=''20120801''

    AND wp4.creationDate < ''20120901'';

    ```

    Listing 4-6 The original query we’re examining


    If we run the code in Listing [4-6](#483961_1_En_4_Chapter.xhtml#PC6) for a different
    time frame against the creation date – say from 20120801 to 20120802 – will it
    finish in a reasonable time? How about if we run the code for only an hour’s worth
    of posts? Probably not – at least, it doesn’t run in a reasonable time on my system.
    If you have the excellent hardware to make this work, then more power to you!
    (And I might be slightly jealous.)


    We’re asking for only three columns of data, but how much data are we really pulling
    with all of these views? What should we expect from a query like this? Let’s pull
    the data directly from the `Posts` table, with the exception of the data for the
    number of linked posts. We’ll do this using the code in Listing [4-7](#483961_1_En_4_Chapter.xhtml#PC7).


    ```sql

    SELECT p.Id

    , p.CreationDate

    FROM dbo.Posts p

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120901'';

    ```

    Listing 4-7 Pulling data directly from the `Posts` table


    The code in Listing [4-4](#483961_1_En_4_Chapter.xhtml#PC4) returns 392,564 rows
    and has 16 ms of CPU time and 864 ms elapsed time. It scans the `Posts` table
    once and has 1074 logical reads. All we have left to do really to satisfy the
    functionality of the original query in Listing [4-8](#483961_1_En_4_Chapter.xhtml#PC8)
    is to add in the number of linked posts. Can we do this easily? Absolutely – it’s
    a function! Let’s add that in and try again with the code in Listing [4-8](#483961_1_En_4_Chapter.xhtml#PC8).


    ```sql

    SELECT p.Id

    , p.CreationDate

    , dbo.getnumLinkedPosts(p.ID) AS numLinkedPosts

    FROM dbo.Posts p

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120901'';

    ```

    Listing 4-8 Adding a function to data pulled from the `Posts` table


    Wait! (And wait, and wait, and wait….) Yes, the code in Listing [4-8](#483961_1_En_4_Chapter.xhtml#PC8)
    took a while. In fact, I stopped it after 15 minutes. Why did it run for so long?
    Well, functions against a table field need to act once on each row. In this return
    set, we had 392,000 records return. That sounds like a lot of work to me! There
    are two ways to address this problem. We can change the function from a scalar
    function to a table-valued function, pass in the post `ID` set as a table-valued
    parameter, and get all the linked post data back in one set or rewrite the functionality
    of the function as part of the query. In general, I will always pick the second
    choice if the function is reasonable to rewrite. If it is 6000 lines or more,
    for example, I may rethink that choice. The function definition for `getNumLinkedPosts`
    is shown in Listing [4-9](#483961_1_En_4_Chapter.xhtml#PC9).


    ```sql

    ALTER FUNCTION dbo.getNumLinkedPosts (@postID int)

    RETURNS int

    AS

    BEGIN

    DECLARE @numPosts int;

    SET @numPosts = COALESCE((SELECT COUNT(1)

    FROM dbo.PostLinks

    WHERE PostId = @postID),0);

    RETURN @numPosts;

    END;

    GO

    ```

    Listing 4-9 Definition for the `getNumLinkedPosts` function


    In the definition in Listing [4-9](#483961_1_En_4_Chapter.xhtml#PC9), we’re getting
    an aggregate of data per post. How can we do that as part of a larger query? Well,
    we can use an `OUTER APPLY` to join to the main query. It has all the filtering
    benefits of a subquery (it only calls the data that’s needed) but doesn’t run
    row by row. We see what an `OUTER APPLY` would look like in Listing [4-10](#483961_1_En_4_Chapter.xhtml#PC10).'
