    \ |\n| 526 | 2008-08-13 0:00:00 |\n| 633 | 2008-08-14 0:00:00 |\n| 593 | 2008-08-15\
    \ 0:00:00 |\n\n我们希望保留那段用于处理传入日期非月份第一天情况的调整代码，因此我们将在新版本中包含这些调整。加上存储过程包装代码和 `Numbers`\
    \ 表代码后，我们新版本的 `DailySummaryReportPerMonth` 存储过程就完成了，如清单 6-14 所示。\n\n```sql\nALTER\
    \ PROCEDURE [dbo].[DailySummaryReportPerMonth] @monthyear DATETIME2\nAS\n/* 以防传入的不是月份的第一天\
    \ */\nSET @monthyear = DATEADD(month, DATEDIFF(month, 0, @monthYear), 0);\nDECLARE\
    \ @enddate datetime2 = DATEADD(month, 1, @monthYear);\nDECLARE @numDays tinyint\
    \ = DATEDIFF(dd, @monthYear, @enddate);\nSELECT  DATEADD(dd,num.n-1,@monthYear)\
    \ AS monthYear\n, DATEPART(dd, DATEADD(dd,num.n-1,@monthYear)) AS [dayOfMonth]\n\
    , DATEPART(dw, DATEADD(dd, num.n-1,@monthYear)) AS [dayOfWeek]\n, COUNT(secInfo.Id)\
    \ AS numPosts\n, SUM(secInfo.AnswerCount) AS numResponses\n, MAX(secInfo.numDistinctUsers)\
    \ AS numUsersResponded\n, MAX(secInfo.maxPostsUser) AS highNumUsersSinglePost\n\
    , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.DisplayName\
    \ ELSE NULL END) AS userMostResponses\n, CAST(MAX(secInfo.maxPostsUser)/COUNT(secInfo.Id)\
    \ * 100 AS DECIMAL(8,7)) AS percentagePosts\n, MAX(secInfo.maxUpvotes) AS numHighestUpvotesOneAnswer\n\
    , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.numAccepted\
    \ ELSE 0 END) AS numAccepted\nFROM dbo.Numbers num\nLEFT OUTER JOIN (\nSELECT\
    \ theInfo.Id\n, theInfo.createDate\n, MAX(theInfo.AnswerCount) OVER (PARTITION\
    \ BY theInfo.ID) AS answerCount\n, MAX(theInfo.Score) OVER (PARTITION BY theInfo.createDate)\
    \ AS maxUpvotes\n, MAX(theInfo.numPostsUser) OVER (PARTITION BY theInfo.createDate)\
    \ AS maxPostsUser\n, theInfo.numPostsUser\n, theInfo.DisplayName\n, MAX(theInfo.numUsersPost)\
    \ OVER (PARTITION BY theInfo.createDate) AS maxNumUsersPost\n, theInfo.numAccepted\n\
    , SUM(CASE WHEN theInfo.theUserRowNum = 1 THEN 1 ELSE 0 END) OVER (PARTITION BY\
    \ theInfo.createDate) AS numDistinctUsers\n, ROW_NUMBER() OVER (PARTITION BY Id\
    \ ORDER BY numPostsUser DESC) AS theIDRow\nFROM (\nSELECT p.Id\n, CAST(p.CreationDate\
    \ AS DATE) AS createDate\n, p.AnswerCount\n, pUser.Score\n, COUNT(pUser.ParentId)\
    \ OVER (PARTITION BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId) AS numPostsUser\n\
    , COUNT(pUser.OwnerUserId) OVER (PARTITION BY CAST(p.CreationDate AS DATE), pUser.ParentId)\
    \ AS numUsersPost\n, pUser.ParentId\n, pUser.OwnerUserId\n, SUM(CASE WHEN pUser.Id\
    \ = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION BY CAST(p.CreationDate\
    \ AS DATE), pUser.OwnerUserId) AS numAccepted\n, u.DisplayName\n, ROW_NUMBER()\
    \ OVER (PARTITION BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId ORDER BY\
    \ pUser.ParentId DESC) AS theUserRowNum\nFROM dbo.Posts p\nLEFT OUTER JOIN dbo.Posts\
    \ pUser ON p.Id = pUser.ParentId\nAND EXISTS (SELECT pUser.OwnerUserId EXCEPT\
    \ (SELECT NULL UNION SELECT 0))\nAND pUser.PostTypeId = 2\nLEFT OUTER JOIN dbo.Users\
    \ u ON pUser.OwnerUserId = u.Id\nWHERE p.CreationDate >= @monthYear\nAND p.CreationDate\
    \ < @endDate\nAND p.PostTypeId = 1\n) theInfo\n) secInfo ON secInfo.createDate\
    \ = DATEADD(dd, num.n-1,@monthYear) -- n 从 1 开始，所以要减去 1 以从“常规”的第一天开始\nAND secInfo.theIDRow\
    \ = 1\nGROUP BY num.n\nORDER BY num.n;\n-- 清单 6-14\n-- 最终版本，DailySummaryReportPerMonth\
    \ 的替换代码\n```\n\n这次重写最终变得很简单。除了移除循环，我们还修复了几个其他问题，但性能提升几乎完全可以归因于移除了循环。另外，如果你注意到了，我们增加了一个\
    \ `@enddate` 参数，这样我们就能正确计算天数，以限制 `Numbers` 表的范围，并为任何给定的月份获取正确的天数。\n\n## 我们还应该注意什么？\n\
    \n让我们看一个略有不同的例子。我们有一个存储过程，可以通过用户名或部分用户名来查找用户信息。假设我们想获取显示名称中包含文本“Joel”的任何用户的信息。让我们针对\
