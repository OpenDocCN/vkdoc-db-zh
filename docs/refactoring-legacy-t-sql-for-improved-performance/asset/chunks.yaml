    Youch! That is an awful lot of reads, which made the initial call really painful.
    We can see this from the first set of reads from the `Table ''Posts''` in Listing
    [2-14](#483961_1_En_2_Chapter.xhtml#PC14); there are 4,477,272 logical reads and
    4,496,256 read-ahead reads. Logical reads are the number of pages that were accessed
    from memory. Read-ahead reads are when SQL Server tries to guess what data will
    be needed and move that data into the buffer cache if it isn’t there already.


    We have to read data for each record to determine if the evaluated CreationDate
    with the DATEADD/DATEDIFF functions applied equals the `@monthYear` variable!
    Each subsequent call to the `Posts` table will be significantly less painful due
    to the Id filter (where we say that the `Id` has to be greater than the `@postID`
    value). In the second `Table ''Posts''` line in Listing [2-14](#483961_1_En_2_Chapter.xhtml#PC14),
    we only see 12 logical reads and no read-ahead reads.


    When we look at the execution plans for the code in Listing [2-14](#483961_1_En_2_Chapter.xhtml#PC14),
    we see the big lines for the first query and then much more reasonable lines for
    the second set. “Big lines” refer to the very thick arrows we see coming from
    the Clustered Index Scan operators on the right-hand side of the plan, that then
    point to the TOP operators. The second query can use the `Id` for a seek predicate
    (where we let SQL Server know we only want `Ids` greater than the `@postID` we
    currently have). This allows SQL Server to use an index seek instead of the index
    scan (look all the way to the right on each; the top plan shows two clustered
    index scans, whereas the bottom plan shows two clustered index seeks).


    ![../images/483961_1_En_2_Chapter/483961_1_En_2_Fig2_HTML.jpg](images/483961_1_En_2_Chapter/483961_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Execution plans for queries populating @postID in Listing [2-14](#483961_1_En_2_Chapter.xhtml#PC14)


    The important message here is to be careful when using scalar functions of any
    kind (whether user defined or those of the native SQL Server variety) in WHERE
    clauses against column values!


    ## Indexes


    Once we document coding anti-patterns, we should look for indexes that would apply
    to the query or queries in question. Do we have the correct indexes? We’ll use
    the execution plan to see if those indexes are being used for the query we are
    examining. If not, why not? There are certain operations that will not allow index
    usage, some of which we have discussed already in this chapter.


    ### Back to Runtime Data


    We’re not going to be able to do much about indexes in our documentation of the
    code from Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1) until we break that
    code down and start looking at the pieces of it. With the loops, it’s pretty prohibitive
    to get either aggregates of `STATISTICS IO` and `TIME` or an execution plan that
    is remotely readable. As we get into the rewrite and can start to pull runtime
    data out, we’ll be able to evaluate index usage better, like we did with Listing
    [2-14](#483961_1_En_2_Chapter.xhtml#PC14).


    ## Summary


    ### Wrapping Up Our Documentation


    When we’re done, we should have a document containing valuable information that
    will help us when we go to rewrite the SQL object. The document that we’ve been
    putting together for the code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1)
    is fairly simple; there are very few issues, although those that exist are pretty
    big. The example of the full documentation of Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1)
    follows this summary.


