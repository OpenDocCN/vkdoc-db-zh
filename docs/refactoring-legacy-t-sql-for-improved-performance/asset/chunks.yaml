- fmt: '## Statistics


    An actual execution plan is simply an estimated execution plan including statistics
    information, so generally they’re not very different. Statistics are metadata
    that SQL Server keeps against columns in tables to indicate the distribution of
    data. In a dictionary, for example, there are lots of words starting with the
    letters “st”. There are less words starting with “zy”. This skew of data is tracked
    through statistics, which helps the Query Optimizer find a better plan.


    I usually use an actual execution plan because it’s also an easy way to see if
    statistics might be out of date and require maintenance. If we get back a single
    row and the Query Optimizer thinks we’re returning 3,000 rows, statistics maintenance
    might be needed.


    Let’s run a query updating a different display name now.


    ```

    UPDATE Users

    SET DisplayName = ''Rita Skeeter''

    WHERE Id = 22656;

    Listing 1-5

    Updating the display name for user ID 22656

    ```


    What can our execution plan tell us? Let’s take a look at the plan generated by
    running the code in Listing 1-5. If you have SentryOne Plan Explorer installed,
    you can right-click the execution plan in SSMS (look for the tab near your Results
    tab) and choose to open the plan in Plan Explorer from the menu that appears.


    Once you look at the execution plan in Plan Explorer, you’ll see something similar
    to what we see in Figure 1-3. Please make sure you have clicked the third row
    of the Results tab Statement output – we want to be looking at the query plan
    for the most expensive (highest estimated cost) part of the query we ran.


    ![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig3_HTML.jpg](images/483961_1_En_1_Chapter/483961_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Initial execution plan for the query in Listing 1-5


    We see that the most effort was spent on a clustered index scan for `WidePosts`,
    since the trigger updates the `WidePosts` table when the `Users` table is updated.


    What is a clustered index scan? Well, a clustered index is the index where all
    of the table’s data is stored, in the order specified by the index. There can
    only be a single clustered index per table. If a table does not have a clustered
    index, it is considered a heap. So a scan of the clustered index is comparable
    to a scan of the entire table.


    Also, there are a lot of rows being read in that operation. Well, if we decided
    to look in the `WidePosts` table, we’d find that there were 4,394 rows of data
    that included the `OwnerUserID` corresponding to user `ID` 22656. That’s all well
    and good, but we are reading over 850,000 rows. (We can see that 850,000 rows
    in Figure 1-3; it’s the number right under the wide arrow leading from the Clustered
    Index Scan.) This is a problem that we will need to address.


    The `STATISTICS IO` and `TIME` output is very similar, as we can see in Table
    1-2.


    Table 1-2


    The “Totals” section read columns of the Statistics Parser site output for the
    code in Listing 1-5


    | Table | Scan Count | Logical Reads | Physical Reads | Read-Ahead Reads |

    | --- | --- | --- | --- | --- |

    | `Total` | `3` | `341,935` | `2` | `0` |

    | `Users` | `0` | `3` | `2` | `0` |

    | `WidePosts` | `3` | `341,932` | `0` | `0` |

    | `Workfile` | `0` | `0` | `0` | `0` |

    | `Worktable` | `0` | `0` | `0` | `0` |


    |   | CPU | Elapsed |

    | --- | --- | --- |

    | `SQL Server parse and compile time:` | `00:00:00.000` | `00:00:00.001` |

    | `SQL Server Execution Times:` | `00:00:02.780` | `00:00:02.789` |

    | `Total` | `00:00:02.780` | `00:00:02.790` |


    ## Perform Triage if Possible


    ### Is There an Index?


    The answer is that there is no index on the `OwnerUserID` in the `WidePosts` table.
    If we could add one, maybe we wouldn’t need to scan the entire table to find the
    records we need to change. The join from `INSERTED` (the trigger inserted table)
    to `WidePosts` was just on the `OwnerUserID`, so that’s the only column we’re
    going to index, as shown in the index create statement in Listing 1-6.


    ```

    IF NOT EXISTS (SELECT 1

    FROM sys.indexes

    WHERE object_id = OBJECT_ID(''dbo.WidePosts'')

    AND name="ix_Posts_ownerUserID")

    BEGIN

    CREATE NONCLUSTERED INDEX IX_WidePosts_OwnerUserID

    ON dbo.WidePosts (OwnerUserID);

    END;

    GO

    Listing 1-6

    CREATE statement for index on WidePosts table

    ```


    Let’s go look to see if there is a change when we run queries to change the user
    names back to what they were. We’ll start with the first user, whose original
    name was “stic”, and use the update statement shown in Listing 1-7.


    ```

    UPDATE Users

    SET DisplayName = ''stic''

    WHERE Id = 31996;

    Listing 1-7

    Reset of user display name for “stic”

    ```


    After we run the `STATISTICS IO` and `TIME` output through statisticsparser.com,
    we see results that look like the results shown in Table 1-3.


    Table 1-3


    Totals for `STATISTICS IO` and `TIME` for an indexed `UPDATE`


    | Table | Scan Count | Logical Reads | Physical Reads | Read-Ahead Reads |

    | --- | --- | --- | --- | --- |

    | `Total` | `2` | `41` | `0` | `0` |

    | `Users` | `0` | `3` | `0` | `0` |

    | `WidePosts` | `2` | `38` | `0` | `0` |


    |   | CPU | Elapsed |

    | --- | --- | --- |

    | `SQL Server parse and compile time:` | `00:00:00.000` | `00:00:00.000` |

    | `SQL Server Execution Times:` | `00:00:00.000` | `00:00:00.000` |

    | `Total` | `00:00:00.000` | `00:00:00.000` |


    That looks much more like what we were expecting to see. There was only one row
    affected though. How would this translate into the second query we ran, which
    involved updating about 4,400 rows? Let’s take a look by running the code in Listing
    1-8. First, though, go ahead and toggle capturing the actual execution plan if
    it isn’t already on, so we can also review that as well.


    ```

    UPDATE Users

    SET DisplayName = ''Jon Skeet''

    WHERE Id = 22656;

    Listing 1-8

    Update user with many WidePosts rows

    ```


    The output for the `STATISTICS IO` and `TIME` is shown in Table 1-4.


    Table 1-4


    `STATISTICS IO` and `TIME` output for user update with many `WidePosts` rows


    | Table | Scan Count | Logical Reads | Physical Reads | Read-Ahead Reads |

    | --- | --- | --- | --- | --- |

    | `Total` | `3` | `35,467` | `0` | `0` |

    | `Users` | `0` | `9` | `0` | `0` |

    | `WidePosts` | `3` | `35,458` | `0` | `0` |

    | `Worktable` | `0` | `0` | `0` | `0` |


    |   | CPU | Elapsed |

    | --- | --- | --- |

    | `SQL Server parse and compile time:` | `00:00:00.000` | `00:00:00.001` |

    | `SQL Server Execution Times:` | `00:00:00.376` | `00:00:00.456` |

    | `Total` | `00:00:00.376` | `00:00:00.457` |


    There are a lot more logical reads in the output in Table 1-4 than we see in Table
    1-3, because we’re finding 4,400 rows instead of 1; that makes a lot of sense.
    When we look at the execution plan, shown here in Figure 1-4, we see how our index
    affected the operators chosen to fulfill this query.


    ![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig4_HTML.jpg](images/483961_1_En_1_Chapter/483961_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Execution plan for user name change query after indexing


    Excellent! For the line with the highest estimated cost, we don’t see a clustered
    index scan anymore. A significant percentage of the work being done in this trigger
    is now the actual update of the `WidePosts` table. There is a `Key Lookup`; we
    could potentially eliminate this by adding included columns to our index. However,
    with the fact that we’re now sub-second for even users with a lot of records,
    we can probably stop here since we have cut out most of the extra work that SQL
    Server was doing.'
