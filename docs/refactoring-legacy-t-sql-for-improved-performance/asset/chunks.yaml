    本书中可能出现商标名称、标识和图像。我们仅以编辑方式并为商标所有者利益使用这些名称、标识和图像，无意侵犯商标权。在本出版物中使用商品名称、商标、服务标识及类似术语，即使未特别标识，也不应被视为表达任何关于其是否受专有权约束的意见。


