  raw: 'We are seeing a LOT of page reads in Table [1-1](#483961_1_En_1_Chapter.xhtml#Tab1),
    especially for the update of a single row. But what is this `WidePosts` table?
    We weren’t updating that table… were we? No, we were updating the `dbo.Users`
    table. Somehow, this `WidePosts` table is related to the `Users` table. In SSMS,
    are there any objects around the `Users` table? A foreign key constraint? A… wait,
    a trigger? Hmm, let’s look at the definition of the trigger, which is shown in
    Listing [1-4](#483961_1_En_1_Chapter.xhtml#PC4).


    ```

    /*****************************************************************

    Object Description: Pushes user changes to the WidePosts table.

    Revision History:

    Date         Name             Label/PTS    Description

    -----------  --------------   ----------   -------------------

    2019.05.12   LBohm                         Initial Release

    *****************************************************************/

    ALTER TRIGGER [dbo].[ut_Users_WidePosts] ON [dbo].[Users]

    FOR UPDATE

    AS

    SET NOCOUNT ON;

    IF EXISTS

    (

    SELECT 1

    FROM INSERTED i

    INNER JOIN dbo.WidePosts wp ON i.id = wp.OwnerUserId

    )

    BEGIN

    IF EXISTS

    (

    SELECT 1

    FROM INSERTED i

    INNER JOIN dbo.WidePosts wp ON i.Id = wp.OwnerUserId

    WHERE i.Age  wp.Age

    OR i.CreationDate  wp.UserCreationDate

    OR i.DisplayName  wp.DisplayName

    OR i.DownVotes  wp.DownVotes

    OR i.EmailHash  wp.EmailHash

    OR i.[Location]  wp.[Location]

    OR i.Reputation  wp.Reputation

    OR i.UpVotes  wp.UpVotes

    OR i.[Views]  wp.[Views]

    OR i.WebsiteUrl  wp.WebsiteUrl

    )

    BEGIN

    UPDATE wp

    SET

    wp.[AboutMe] = LEFT(i.AboutMe, 2000)

    , wp.[Age] = i.Age

    , wp.[UserCreationDate] = i.CreationDate

    , wp.[DisplayName] = i.DisplayName

    , wp.[DownVotes] = i.DownVotes

    , wp.[EmailHash] = i.EmailHash

    , wp.[LastAccessDate] = i.LastAccessDate

    , wp.[Location] = i.[Location]

    , wp.[Reputation] = i.Reputation

    , wp.[UpVotes] = i.UpVotes

    , wp.[Views] = i.[Views]

    , wp.[WebsiteUrl] = i.WebsiteUrl

    , wp.AccountID = i.AccountID

    FROM dbo.WidePosts wp

    INNER JOIN INSERTED i ON wp.OwnerUserId = i.Id

    WHERE i.Age  wp.Age

    OR i.CreationDate  wp.UserCreationDate

    OR i.DisplayName  wp.DisplayName

    OR i.DownVotes  wp.DownVotes

    OR i.EmailHash  wp.EmailHash

    OR i.[Location]  wp.[Location]

    OR i.Reputation  wp.Reputation

    OR i.UpVotes  wp.UpVotes

    OR i.[Views]  wp.[Views]

    OR i.WebsiteUrl  wp.WebsiteUrl;

    END;

    END;

    GO

    Listing 1-4

    ALTER statement for the ut_Users_WidePosts trigger

    ```


    Huh. Every time we are updating the `Users` table, it sends the update to any
    records in this `WidePosts` table where the `OwnerUserID` is equal to the `Users`
    table `id`. It’s doing a LOT of reads to perform this task. Let’s run another
    example, and this time we’ll grab an execution plan.


    ### Execution Plans


    An execution plan shows how SQL Server decided to run your query or statement.
    It shows the operators that the optimizer chose. If you have never looked at one,
    it can be confusing. The execution plan is XML data that can be parsed into a
    diagram of what operators the SQL Server engine uses to fulfill your query request.
    (Well, that’s clear as mud, right?) When a query is run, SQL Server uses the Query
    Optimizer to figure out the best way to return data or perform the request. For
    each table that we’re getting data from or performing an operation against, SQL
    Server will use one or more operators to access that table. For example, if we
    need data from a large portion of the `Posts` table, SQL Server will perform a
    “table scan” – that is, it will read all of the data pages for the table – to
    find the data to return. The plan will also show how many rows SQL Server is expecting
    to push along to the next operator.


    The first things I look for at a quick glance are big fat lines (indicating a
    LOT of data, or number of rows being pushed to the next operator). Also, I review
    which operators show the most work being done. I use Plan Explorer to help sort
    operations by the work being done per operation, which allows us to easily find
    the most expensive culprits. So how do we get this information?


    In SSMS, there is a button you can click above the query window. When you hover
    over it, it will show you text reading “Get Actual Execution Plan”. This icon
    is shown in Figure [1-2](#483961_1_En_1_Chapter.xhtml#Fig2), surrounded by a box.


    ![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig2_HTML.jpg](images/483961_1_En_1_Chapter/483961_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Turning on an actual execution plan in SSMS'
