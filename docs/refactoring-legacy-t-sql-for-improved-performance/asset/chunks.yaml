    TOP 运算符。第二个查询可以将 `Id` 用作寻求谓词（我们让 SQL Server 知道我们只想要大于当前 `@postID` 的 `Ids`）。这使得
    SQL Server 可以使用索引寻道（Index Seek）而不是索引扫描（Index Scan）（请看每个计划的最右侧；上方计划显示了两个聚集索引扫描，而下方计划显示了两个聚集索引寻道）。


