    哎呀！这是一个非常大的读取量，这使得初始调用非常痛苦。我们可以从清单 [2-14](#483961_1_En_2_Chapter.xhtml#PC14) 中
    `Table ''Posts''` 的第一组读取数据中看到这一点；有 4,477,272 次逻辑读取和 4,496,256 次预读取。逻辑读取是从内存中访问的页面数。预读取是
    SQL Server 尝试猜测需要哪些数据，并将这些数据（如果尚未存在）移入缓冲区缓存的操作。


    我们必须读取每条记录的数据，以确定应用了 `DATEADD/DATEDIFF` 函数后的 `CreationDate` 是否等于 `@monthYear`
    变量！由于 `Id` 过滤器（我们规定 `Id` 必须大于当前的 `@postID` 值），后续每次对 `Posts` 表的调用都会明显减轻痛苦。在清单 [2-14](#483961_1_En_2_Chapter.xhtml#PC14)
