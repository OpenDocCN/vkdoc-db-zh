    运行清单 2-13 后的 STATISTICS IO 和 TIME 输出


    哎呀！这是一个非常大的读取量，这使得初始调用非常痛苦。我们可以从清单 2-14 中 `Table ''Posts''` 的第一组读取数据中看到这一点；有 4,477,272
