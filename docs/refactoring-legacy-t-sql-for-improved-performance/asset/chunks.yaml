    \ 2008-08-02 0:00:00 |\n| 132 | 2008-08-03 0:00:00 |\n| 326 | 2008-08-04 0:00:00\
    \ |\n| 515 | 2008-08-05 0:00:00 |\n| 504 | 2008-08-06 0:00:00 |\n| 588 | 2008-08-07\
