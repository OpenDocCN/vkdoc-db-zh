    \n```sql\nALTER PROCEDURE [dbo].[DailySummaryReportPerMonth] @monthyear DATETIME2\n\
    AS\n/* in case the first day of the month not passed in */\nSET @monthyear = DATEADD(month,\
    \ DATEDIFF(month, 0, @monthYear), 0);\nDECLARE @enddate datetime2 = DATEADD(month,\
    \ 1, @monthYear);\nDECLARE @numDays tinyint = DATEDIFF(dd, @monthYear, @enddate);\n\
    SELECT  DATEADD(dd,num.n-1,@monthYear) AS monthYear\n, DATEPART(dd, DATEADD(dd,num.n-1,@monthYear))\
    \ AS [dayOfMonth]\n, DATEPART(dw, DATEADD(dd, num.n-1,@monthYear)) AS [dayOfWeek]\n\
    , COUNT(secInfo.Id) AS numPosts\n, SUM(secInfo.AnswerCount) AS numResponses\n\
    , MAX(secInfo.numDistinctUsers) AS numUsersResponded\n, MAX(secInfo.maxPostsUser)\
    \ AS highNumUsersSinglePost\n, MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser\
    \ THEN secInfo.DisplayName ELSE NULL END) AS userMostResponses\n, CAST(MAX(secInfo.maxPostsUser)/COUNT(secInfo.Id)\
    \ * 100 AS DECIMAL(8,7)) AS percentagePosts\n, MAX(secInfo.maxUpvotes) AS numHighestUpvotesOneAnswer\n\
    , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.numAccepted\
    \ ELSE 0 END) AS numAccepted\nFROM dbo.Numbers num\nLEFT OUTER JOIN (\nSELECT\
    \ theInfo.Id\n, theInfo.createDate\n, MAX(theInfo.AnswerCount) OVER (PARTITION\
    \ BY theInfo.ID) AS answerCount\n, MAX(theInfo.Score) OVER (PARTITION BY theInfo.createDate)\
    \ AS maxUpvotes\n, MAX(theInfo.numPostsUser) OVER (PARTITION BY theInfo.createDate)\
    \ AS maxPostsUser\n, theInfo.numPostsUser\n, theInfo.DisplayName\n, MAX(theInfo.numUsersPost)\
    \ OVER (PARTITION BY theInfo.createDate) AS maxNumUsersPost\n, theInfo.numAccepted\n\
    , SUM(CASE WHEN theInfo.theUserRowNum = 1 THEN 1 ELSE 0 END) OVER (PARTITION BY\
