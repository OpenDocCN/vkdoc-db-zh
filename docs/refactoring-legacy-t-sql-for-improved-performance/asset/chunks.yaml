    these display names, as well as the number of posts per user. With windowing functions,
    we can get our overall aggregates without losing that detail. We’re going to rely
    on the MAX() values whenever we can, because extra or duplicated rows won’t affect
    those aggregates (extra rows will affect counts and sums but not MAX() and MIN()
    values). We can see some results for the query in Listing [6-6](#483961_1_En_6_Chapter.xhtml#PC8)
    in Table [6-4](#483961_1_En_6_Chapter.xhtml#Tab4).


    Table 6-4


    Subset of results from the code in Listing [6-6](#483961_1_En_6_Chapter.xhtml#PC8)


    | Id | Max Upvotes | Max Posts User | Display Name | Num Posts User | Num Accepted
    | Num Distinct Users | The ID Row |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 11750763 | 1,179 | 25 | waldyr.ar | 2 | 0 | 5506 | 1 |

    | 11750765 | 1,179 | 25 | Steve Koch | 1 | 1 | 5506 | 1 |

    | 11750767 | 1179 | 25 | mwengler | 2 | 2 | 5506 | 1 |

    | 11750768 | 1,179 | 25 | Annjawn | 5 | 1 | 5506 | 1 |

    | 11750768 | 1,179 | 25 | Tom | 2 | 1 | 5506 | 2 |

    | 11750768 | 1179 | 25 | DCookie | 1 | 0 | 5506 | 3 |

    | 11750770 | 1,179 | 25 | nickb | 11 | 8 | 5506 | 1 |

    | 11750770 | 1,179 | 25 | Miro Hudak | 6 | 2 | 5506 | 2 |

    | 11750770 | 1179 | 25 | sriansri | 1 | 0 | 5506 | 3 |

    | 11750780 | 1179 | 25 | Dustin | 8 | 2 | 5506 | 1 |


    The overall aggregates are going to show the same value in each row, as we see
    in the `NumDistinctUsers`, `MaxPostsUser`, and `MaxUpvotes` columns in Table [6-4](#483961_1_En_6_Chapter.xhtml#Tab4).
    These columns are the building blocks to find the user whose number of responses
    is equivalent to the most responses. We can use that as a filter in… you guessed
    it, the next level (or level 3, which we will add). And we assigned a ROW_NUMBER()
    partitioned by post ID in level 2, so we can easily grab only a single row for
    each original post (this will make our COUNT() and SUM() data correct by excluding
    “extra” or multiplied rows due to joins). We can see that ROW_NUMBER() in level
    2 in the code in Listing [6-6](#483961_1_En_6_Chapter.xhtml#PC8).


    Listing [6-7](#483961_1_En_6_Chapter.xhtml#PC9) introduces us to the addition
    of a third level to the query. In this level, we will use the filter of `theIDRow`
    equaling 1. If you look at the code in Listing [6-6](#483961_1_En_6_Chapter.xhtml#PC8),
    you’ll notice that we ordered `theIDRow` by `numPostsUser` DESC. Why did we choose
    that ORDER BY clause? Well, we also need to know the highest number of posts answered
    by a user, and this will give us this information. The ORDER BY using the by `numPostsUser`
    DESC means that the row with the highest value in the `numPostsUser` column will
    be given a ROW_NUMBER() equal to 1, which will give us the desired value for that
    field (`numPostsUser`) when we choose `theIDRow` equal to 1\. And, if we group
    this by the creation date, we can then add more days and hopefully get the results
    we want! We’ll try this a little later.'
  trans: '# 避免行或数据重复


    当然，由于我们连接了帖子回复表，每个帖子 `ID` 可能得到多条记录，并且每个帖子可能存在不止一条回复。我们在查询清单 6-5 中使用了 `ROW_NUMBER()`
    函数来帮助处理此问题。`ROW_NUMBER()` 允许你根据选择的分区方式和排序方式，为每一行分配一个唯一的递增整数。这个 `ROW_NUMBER()`
    将帮助我们过滤掉“多余”的行（那些可能导致数据倍增和结果错误的行）。


    我们需要计算不重复用户数，因此我们可以像在清单 6-5 中所做的那样，为这些不重复用户分配行号，然后只需计算 `ROW_NUMBER()` 等于 1 的记录数即可。等等，这是什么意思？如果我们设置一个
    `ROW_NUMBER`，按 `OwnerUserId` 分区，并按任意字段排序，那么每个新用户将只有一行（且仅有一行）的 `ROW_NUMBER()` 等于
    1。因此，如果我们使用 `CASE` 语句，为 `theUserRowNum` 等于 1 的每一行赋值“1”，为所有其他行赋值“0”，然后对这些值求和，我们就能得到用户的不重复计数。这很酷，对吧？清单
    6-6 也演示了这一点。


    ```sql

    SELECT theInfo.Id -- 第二级

    , theInfo.createDate

    , theInfo.AnswerCount

    , MAX(theInfo.Score) OVER () AS maxUpvotes

    , MAX(theInfo.numPostsUser) OVER () AS maxPostsUser

    , theInfo.numPostsUser

    , theInfo.DisplayName

    , MAX(theInfo.numUsersPost) OVER () AS maxNumUsersPost

    , theInfo.numAccepted

    , SUM(CASE WHEN theInfo.theUserRowNum = 1 THEN 1 ELSE 0 END) OVER () AS numDistinctUsers

    , ROW_NUMBER() OVER (PARTITION BY ID ORDER BY numPostsUser DESC) AS theIDRow

    FROM (SELECT p.Id -- 第一级 - 最内层

    , CAST(p.CreationDate AS DATE) AS createDate

    , p.AnswerCount

    , pUser.Score

    , COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS numPostsUser

    , COUNT(pUser.OwnerUserId) OVER (PARTITION BY pUser.ParentId) AS numUsersPost

    , pUser.ParentId

    , pUser.OwnerUserId

    , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION
    BY pUser.OwnerUserId) AS numAccepted

    , u.DisplayName

    , ROW_NUMBER() OVER (PARTITION BY pUser.OwnerUserId ORDER BY pUser.ParentId DESC)
    AS theUserRowNum

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))

    AND pUser.PostTypeId = 2

    LEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId = u.Id

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1) theInfo;

    ```


    ### 清单 6-6

    添加带有额外 `ROW_NUMBER` 的外层查询


    清单 6-6 中的代码为查询增加了第二级。这个外层包装器是我们执行额外聚合的地方，例如引用 `theUserRowNum` 的 `CASE` 语句，它为我们提供了来自内部查询的不重复用户计数。我们还在外层查询中添加了一个
    `ROW_NUMBER`，但我们稍后会再详细讨论这样做的原因。


    这个 `OVER()` 子句到底是什么意思？它是一种在集合上执行聚合的方式。如果未指定 `PARTITION`，则数据会在整个查询结果集上进行聚合。这也可以通过使用
    `GROUP BY` 子句来完成，但我们需要查看一些明细行；我们需要为每个帖子获取响应最多的用户的正确 `DisplayName`，以便确定在当天的任何帖子中谁响应最多。如果我们使用
    `GROUP BY` 子句，将丢失与获取所有这些显示名称以及每个用户的帖子数相关的明细级别。借助窗口函数，我们可以在不丢失该明细的情况下获得总体聚合值。我们将尽可能依赖
    `MAX()` 值，因为额外或重复的行不会影响这些聚合（额外行会影响计数和求和，但不会影响 `MAX()` 和 `MIN()` 值）。我们可以在表 6-4
    中看到清单 6-6 查询的一些结果。


    ### 表 6-4

    清单 6-6 代码的结果子集


    | Id | Max Upvotes | Max Posts User | Display Name | Num Posts User | Num Accepted
    | Num Distinct Users | The ID Row |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 11750763 | 1,179 | 25 | waldyr.ar | 2 | 0 | 5506 | 1 |

    | 11750765 | 1,179 | 25 | Steve Koch | 1 | 1 | 5506 | 1 |

    | 11750767 | 1179 | 25 | mwengler | 2 | 2 | 5506 | 1 |

    | 11750768 | 1,179 | 25 | Annjawn | 5 | 1 | 5506 | 1 |

    | 11750768 | 1,179 | 25 | Tom | 2 | 1 | 5506 | 2 |

    | 11750768 | 1179 | 25 | DCookie | 1 | 0 | 5506 | 3 |

    | 11750770 | 1,179 | 25 | nickb | 11 | 8 | 5506 | 1 |

    | 11750770 | 1,179 | 25 | Miro Hudak | 6 | 2 | 5506 | 2 |

    | 11750770 | 1179 | 25 | sriansri | 1 | 0 | 5506 | 3 |

    | 11750780 | 1179 | 25 | Dustin | 8 | 2 | 5506 | 1 |


    总体聚合值将在每一行中显示相同的值，正如我们在表 6-4 中的 `NumDistinctUsers`、`MaxPostsUser` 和 `MaxUpvotes`
    列所看到的。这些列是找出响应数最多的用户的基础构件。我们可以将其用作过滤器在……你猜对了，下一级（或第 3 级，我们将添加）中。并且我们在第 2 级按帖子
    ID 分区分配了 `ROW_NUMBER()`，因此我们可以轻松地仅为每个原始帖子抓取一行（这将通过排除连接导致的“额外”或倍增行，使我们的 `COUNT()`
    和 `SUM()` 数据保持正确）。我们可以在清单 6-6 的代码中看到第 2 级的 `ROW_NUMBER()`。


    清单 6-7 向我们介绍了向查询添加第三级。在这一级，我们将使用 `theIDRow` 等于 1 的过滤器。如果你查看清单 6-6 中的代码，会注意到我们按
    `numPostsUser` `DESC` 对 `theIDRow` 进行排序。为什么我们选择这个 `ORDER BY` 子句？嗯，我们还需要知道用户回答的帖子数的最大值，而这将为我们提供该信息。使用
    `numPostsUser` `DESC` 的 `ORDER BY` 意味着 `numPostsUser` 列中值最大的行将被赋予 `ROW_NUMBER()`
    等于 1，这将在我们选择 `theIDRow` 等于 1 时，为我们提供该字段（`numPostsUser`）的期望值。并且，如果我们按创建日期进行分组，就可以添加更多日期，并有望得到我们想要的结果！我们稍后会尝试这样做。'
- fmt: '# Listing 6-7

    ## Query with filtering using aggregates and ROW_NUMBER()


    ```sql

    SELECT COUNT(secInfo.Id) AS numPosts  -- level three - outermost

    , secInfo.createDate

    , SUM(secInfo.answerCount) AS numResponses

    , MAX(secInfo.maxUpvotes) AS numHighestUpvotesOneAnswer

    , MAX(secInfo.maxPostsUser) AS maxPostsuser

    , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.DisplayName
    ELSE NULL END) AS userMostPosts

    , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.numAccepted
    ELSE 0 END) AS numAccepted

    , MAX(secInfo.numDistinctUsers) AS numUsersResponded

    FROM (

    SELECT theInfo.Id -- level two

    , theInfo.createDate

    , theInfo.AnswerCount

    , MAX(theInfo.Score) OVER () AS maxUpvotes

    , MAX(theInfo.numPostsUser) OVER () AS maxPostsUser

    , theInfo.numPostsUser

    , theInfo.DisplayName

    , MAX(theInfo.numUsersPost) OVER () AS maxNumUsersPost

    , theInfo.numAccepted

    , SUM(CASE WHEN theInfo.theUserRowNum = 1 THEN 1 ELSE 0 END) OVER () AS numDistinctUsers

    , ROW_NUMBER() OVER (PARTITION BY Id ORDER BY numPostsUser DESC) AS theIDRow

    FROM (

    SELECT p.Id -- level one - innermost

    , CAST(p.CreationDate AS DATE) AS createDate

    , p.AnswerCount

    , pUser.Score

    , COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS numPostsUser

    , COUNT(pUser.OwnerUserId) OVER (PARTITION BY pUser.ParentId) AS numUsersPost

    , pUser.ParentId

    , pUser.OwnerUserId

    , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION
    BY pUser.OwnerUserId) AS numAccepted

    , u.DisplayName

    , ROW_NUMBER() OVER (PARTITION BY pUser.OwnerUserId ORDER BY pUser.ParentId DESC)
    AS theUserRowNum

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))

    AND pUser.PostTypeId = 2

    LEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId = u.Id

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1) theInfo

    ) secInfo

    WHERE secInfo.theIDRow = 1

    GROUP BY secInfo.createDate;

    ```


    When we run the query in Listing [6-7](#483961_1_En_6_Chapter.xhtml#PC9), we get
    the single-row result shown in Table [6-5](#483961_1_En_6_Chapter.xhtml#Tab5).
    It seems to contain most of the information we need for the report. Let’s go ahead
    and take a line-by-line look at what we’re getting from our query, though, because
    sanity checks are valuable.


    ## Table 6-5

    ### Output from query in Listing [6-7](#483961_1_En_6_Chapter.xhtml#PC9)


    | Num Posts | Create Date | Num Responses | Num Highest Upvotes One Answer | Max
    Posts user | User Most Posts | Num Accepted | Num Users Responded |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 5574 | 2012-08-01 | 10,248 | 1,179 | 25 | Jon Skeet | 16 | 5506 |


    ## How Did We Get Here Again?


    Let’s go back over the output statements from the code in Listing [6-7](#483961_1_En_6_Chapter.xhtml#PC9)
    and follow them through to see how we got to the final query.


    `COUNT(secInfo.Id) AS numPosts`


    The `numPosts` code line gets the number of posts for a day (well, in the code
    in Listing [6-7](#483961_1_En_6_Chapter.xhtml#PC9), we’re just running the query
    for a single day). Also, in the outermost or third level, we’re grouping by the
    `createDate`, which is the date with the time stripped out of the `creationDate`
    column. How are we avoiding duplicates of original post `ID`s, though? In the
    second level, we use `ROW_NUMBER()` partitioned by the `ID`. Then, in the third
    or outermost level of the query, we have in our `WHERE` clause:


    `WHERE secInfo.theIDRow = 1`


    This will only pull a single row per post ID, since we partitioned on the ID and
    there can only be one `ROW_NUMBER()` of 1 per ID.


    `, secInfo.createDate`


    The `createDate` is one of our simpler lines. We just cast the post `creationDate`
    to a `DATE` datatype, which strips out the time segment from the datetime. We
    can then group by that value, giving us information for a single day.


    `, SUM(secInfo.answerCount) AS numResponses`


    The `numResponses` is the sum of the `answerCount`, or the sum of the number of
    answers for each post in a day. We can do the sum on the third or outermost level,
    because on the third level we’re only pulling one row per ID for that level and
    that row should always have the same number for the `answerCount` as any other
    row for that ID.


    `, MAX(secInfo.maxUpvotes) AS numHighestUpvotesOneAnswer`


    The `numHighestUpvotesOneAnswer` is a `MAX()` of a `MAX()`. Why is this? We want
    to group the outer query by the `createDate`, and we want all of the rest of the
    fields to be aggregates. In the second level, we’re finding the `maxUpvotes` per
    ID. Then, in the outermost or third level, we need to find the `MAX()` of THOSE
    values, or the highest value overall in the `maxUpvotes` per ID.


    `, MAX(theInfo.numPostsUser) OVER () AS maxPostsUser`


    The `maxPostsUser` is a `MAX()` of a `MAX()` of a `COUNT()`. The `COUNT()` counts
    the number of times the user ID “owns” a post that has a `ParentId` (in our case,
    a response). We need the `COUNT()` to determine the number of posts a user answered
    in a day. We then take the maximum value, but don’t partition by anything; we
    grab it over the entire set. Why are we doing the `MAX()` in the outermost query
    then? Well, it’s a bit of a hack. We could get the same results either using the
    `MAX()` as we have here, or we could NOT use the `MAX()` and just refer to the
    column from the second-level query (`maxPostsUser`), and then we’d also have to
    add that same column (`maxPostsUser`) to the `GROUP BY` clause. I prefer not to
    add extra columns to the `GROUP BY` that don’t really define the reason for the
    grouping. Again, though, that’s just a personal preference and because I think
    it makes the intent of the code clearer.


    `, MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.DisplayName
    ELSE NULL END) AS userMostPosts`


    The `userMostPosts` column returns the `DisplayName` for the user who has the
    most responses to posts. We know the value of the `maxPostsUser`, but we need
    the associated name. We can do this by finding out the user for whom the `numPostsUser`
    equals the `maxPostsUser` and pull that `DisplayName`. We’re hacking the `MAX`
    a bit in this case to help us get the value we want. We do this with a `CASE`
    statement, setting the value of the column to `NULL` when our filter doesn’t match:
    when the `maxPostsUser` does not equal the `numPostsUser`. If the two are equivalent,
    we set the value of the column to the `DisplayName`, which will be considered
    “greater than” `NULL` and will become the `MAX()` value for the `userMostPosts`
    column.


    `, MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.numAccepted
    ELSE 0 END) AS numAccepted`


    The `numAccepted` uses a bit of the same “hack” as we used with the `userMostPosts`.
    We need to find the number of answers marked as accepted for the user with the
    highest number of posts. We again use the `MAX()` with a `CASE` statement.


    `, MAX(secInfo.numDistinctUsers) AS numUsersResponded`


    The `numUsersResponded` also doesn’t have to be an aggregate, but if we remove
    the aggregation, we again have to add the column to the `GROUP BY`. I still prefer
    the readability that comes with leaving this as an aggregate to keep it (and confusion)
    out of the `GROUP BY`.'
