  trans: '### 动态 SQL


    对象关系映射（ORM）在某些情况下可以生成动态 SQL。应用程序也可以被编写来生成动态 SQL。这样做的最大问题是，SQL Server 无法将查询的执行计划存储在计划缓存中；即使在代码中更改一个空格，也会导致
    SQL Server 生成一个新的查询计划。每次运行都生成一个新计划，对于 SQL Server 所需完成的工作来说是昂贵的。此外，动态 SQL 代码的生成可能会导致一些非常复杂且次优的查询，具体取决于构建代码时的环境（变量多、NULL
    值多，等等）。


    对于 `WHERE` 子句中有多个条件的查询，动态 SQL 非常棒，但必须非常小心地编写，并且应该生成和测试所有不同的可能排列组合。


    ## 总结


    从数据库实例外部发起的 SQL 调用可能会带来一些性能问题。链接服务器可以将您的数据库负载分散到不同的服务器上，这很好。然而，如果您的 SQL 编写不正确，这些链接服务器会存在一些固有的性能问题。


    应用程序中的 SQL 代码，无论是由开发人员编写的还是由 ORM 生成的，都很难修复，因为我们需要开发人员来操作应用程序代码，或者将直接的 SQL 调用从应用程序中提取出来，改为让应用程序代码调用一个我们可以访问的存储过程。在第一种情况下，我们可以指导开发人员如何编写
    SQL 代码。在第二种情况下，我们可以将代码写入一个存储过程，然后使用我们在本书前面章节中学到的策略来调整它！


    感谢您与我一起踏上这段穿越数据库对象、外部影响和 T-SQL 代码世界的旅程。我希望您学到了一些处理您那遗留的庞然大物般应用程序的新策略。从被动应对策略转向主动策略的能力对我们任何人的理智都很重要，也是我们所有人都将继续努力追求的。祝您旅途顺利！


