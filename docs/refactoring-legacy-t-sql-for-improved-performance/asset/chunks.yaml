    discover that it really is doing quite a bit of work.


    ### Multiple Table Calls


    When we have a big chunk of code, what’s the first thing we need to do before
    we start trying to rewrite this? That’s absolutely right – we document it! Let’s
    start documenting the table calls, which we will show in Table 4-2. Instead of
    starting from the top down, let’s start with the “insides” – that is, `WidePostsPlusOne`
    – and go “outward” from there.


