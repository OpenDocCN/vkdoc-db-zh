    There is a much nicer way to look at the output in Listing [1-3](#483961_1_En_1_Chapter.xhtml#PC3).
    Go to the web site [`http://statisticsparser.com/`](http://statisticsparser.com/),
    and paste that output into the big window. Click the Parse button, and scroll
    to the bottom of the page. You’ll get a nice summary table that will give you
    what you need to know at a glance. This is the section labeled “Totals” on the
    web page. Table [1-1](#483961_1_En_1_Chapter.xhtml#Tab1) shows the read columns
    from the “Totals” section after running the output shown in Listing [1-3](#483961_1_En_1_Chapter.xhtml#PC3)
    through the Statistics Parser web site.


