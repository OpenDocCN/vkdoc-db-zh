    by seeing if there’s a user id of 0 in the Users table. If we run the query in
    Listing [6-4](#483961_1_En_6_Chapter.xhtml#PC4), we’ll see that there is no user
    in the Users table with an ID of 0.


    ```

    SELECT * FROM users

    WHERE Id = 0;

    Listing 6-4

    Check existence of a user

    ```


    We should also discount these in the final query output. How do we get rid of
    these values? We want ALL ownerUserIDs except those that match the values of NULL
    or 0\. This line will make that check for us and allow us to filter out those
    values. If you haven’t played with EXCEPT or INTERSECT yet, I highly recommend
    doing so.


    ```

    AND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))

    ```


    The next step in our rewrite is to remove these undesirable user IDs and then
    get aggregates over different groupings – some by post, some by day, and some
    by user. How do we do that?


    ## Windowing Functions


    What are those? Something installed on Windows? Well, I guess technically “yes,”
    but in this case, they are functions included in later versions of SQL Server
    (some 2005 or later, others 2012 or later). What they do is take a “window” of
    your query results and allow you to do aggregates on them. Let’s look at an example
    shown in Listing [6-5](#483961_1_En_6_Chapter.xhtml#PC6).


    ```

    SELECT p.Id

    , CAST(p.CreationDate AS DATE) AS createDate

    , p.AnswerCount

    , pUser.Score

    , COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS numPostsUser

    , COUNT(pUser.OwnerUserId) OVER (PARTITION BY pUser.ParentId) AS numUsersPost

    , pUser.ParentId

    , pUser.OwnerUserId

    , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION
    BY pUser.OwnerUserId) AS numAccepted

    , u.DisplayName

    , ROW_NUMBER() OVER (PARTITION BY pUser.OwnerUserId ORDER BY pUser.ParentId DESC)
    AS theUserRowNum

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))

    AND pUser.PostTypeId = 2

    LEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId = u.Id

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1;

    Listing 6-5

    Adding windowing functions

    ```


    We can look at the result set shown in Table [6-3](#483961_1_En_6_Chapter.xhtml#Tab3),
    which is a subset of the columns in our query in Listing [6-5](#483961_1_En_6_Chapter.xhtml#PC6),
    to see if we succeeded in getting the data needed. How did we get the number of
    posts each user responded to? We used a count of the post ID (it’s the parent
    ID in the response link), and we partitioned by the user ID. We want to COUNT
    the `pUser.ParentId`, and we want the partition on this field defined by the `pUser.OwnerUserId`,
    so we use the following line:


    ```

    COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS numPostsUser

    ```


    Our “window” for the aggregate when we partition by the `OwnerUserId` is the set
    of posts a single user responded to, and the windowing function will return a
    separate aggregate for each user ID.


    Table 6-3


    Subset of results from the query in Listing [6-4](#483961_1_En_6_Chapter.xhtml#PC4)


    | Id | Num Posts User | Num Users Post | ParentId | Owner UserId | Num Accepted
    |

    | --- | --- | --- | --- | --- | --- |

    | 11766266 | 1 | 3 | 11766266 | 9465 | 0 |

    | 11758727 | 3 | 1 | 11758727 | 9475 | 3 |

    | 11756598 | 3 | 1 | 11756598 | 9475 | 3 |

    | 11755899 | 3 | 1 | 11755899 | 9475 | 3 |

    | 11766893 | 2 | 4 | 11766893 | 9530 | 2 |

    | 11762529 | 2 | 3 | 11762529 | 9530 | 2 |

    | 11759414 | 1 | 3 | 11759414 | 9686 | 1 |

    | 11764539 | 1 | 17 | 11764539 | 9732 | 0 |

    | 11755196 | 1 | 2 | 11755196 | 9922 | 1 |

    | 11763636 | 1 | 2 | 11763636 | 10397 | 1 |


    We’re going to use the same “window,” which is the set of posts a single user
    responded to in a day, for the number of accepted answers by the user ID. How
    can we do a sanity check, though? Run the query in Listing [6-2](#483961_1_En_6_Chapter.xhtml#PC2),
    adding an `ORDER BY p.Id` (the post ID). You can visually count how many different
    users responded to each post. Then run the code in Listing [6-5](#483961_1_En_6_Chapter.xhtml#PC6)
    again, also adding an `ORDER BY p.Id`. You can check the query without aggregates
    against the query with aggregates visually to see that the aggregates are correct
    for the entire query: you’re getting the number of posts that user answered for
    every record that has that user on it. You’ll see the same for the number of users
    that answered a post. Performing sanity checks like this often can help you from
    straying down the wrong programming path and save you time when troubleshooting!'
  trans: '


    ## 以小的、易于测试的增量添加更多数据


    我们在 `Table 6-1` 中看到的结果似乎相当直接和合理。现在，我们来看一下如何添加一些我们需要的聚合，以模仿原始存储过程的功能。我们想知道，对于一个用户，他们有多少个被接受的答案。我们将使用一个
    `CASE` 语句，每当一个答案是被接受的答案时，我们将值设为 `1`，然后对这些 `1` 求和。如果答案不是被接受的答案，我们将值设为 `0`，因此总和仍然只反映被接受答案的数量。我们还需要知道一天内单个帖子收到的最高回复数，我们可以通过
    `MAX()` 回答数量来获得。我们可以使用 `SUM()` 来告诉我们一天内的回答数量。我们使用的查询如 `Listing 6-3` 所示。


    ```sql

    SELECT CAST(p.CreationDate AS DATE) AS createDate

    , COUNT(p.Id) as numPosts

    , SUM(p.AnswerCount) AS numResponses

    , MAX(p.AnswerCount) AS maxNumAnswers

    , pUser.OwnerUserId

    , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) AS isAccepted

    , MAX(pUser.Score) AS upvotes

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND pUser.PostTypeId = 2

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1

    GROUP BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId

    ORDER BY pUser.OwnerUserId;

    ```


    Listing 6-3

    为单日查询的回复帖子添加聚合


    我们在 `Listing 6-3` 中使用了 `GROUP BY` 子句。`GROUP BY` 子句将按用户聚合数据。当我们运行查询时，会得到 `Table
    6-2` 所示的结果集。


    `Table 6-2`


    运行 `Listing 6-3` 中的查询得到的前十个记录


    | 创建日期 | 帖子数 | 回复数 | maxNum 回答数 | 所有者 用户 ID | 是否被接受 | 赞同票 |

    | --- | --- | --- | --- | --- | --- | --- |

    | 2012-08-01 | 361 | 64 | 3 | NULL | 0 | NULL |

    | 2012-08-01 | 66 | 187 | 7 | 0 | 22 | 62 |

    | 2012-08-01 | 1 | 2 | 2 | 16 | 1 | 2 |

    | 2012-08-01 | 1 | 2 | 2 | 95 | 0 | 0 |

    | 2012-08-01 | 1 | 2 | 2 | 343 | 0 | 0 |

    | 2012-08-01 | 3 | 7 | 3 | 476 | 1 | 4 |

    | 2012-08-01 | 1 | 1 | 1 | 492 | 1 | 3 |

    | 2012-08-01 | 2 | 3 | 2 | 536 | 2 | 11 |

    | 2012-08-01 | 1 | 2 | 2 | 549 | 1 | 3 |

    | 2012-08-01 | 1 | 3 | 3 | 631 | 1 | 0 |


    `Table 6-2` 中的数据是我们查询所需的数据吗？不完全是，但它将为我们提供建筑模块，以找到我们需要的数据。这个查询告诉我们


    1.  在此日期内回复帖子的不同用户 ID 数量（每个用户 ID 有一条记录）

    2.  哪个用户 ID 的回复数最多

    3.  其中有多少回复是“被接受的”


    看起来有一些“默认”的 `OwnerUserId` 可能可以忽略。值 `NULL` 和 `0` 似乎是“非真实或无效”的值，我们可以通过检查 `Users`
    表中是否存在 ID 为 `0` 的用户来验证。如果我们运行 `Listing 6-4` 中的查询，将看到 `Users` 表中没有 ID 为 `0` 的用户。


    ```sql

    SELECT * FROM users

    WHERE Id = 0;

    ```


    Listing 6-4

    检查用户是否存在


    我们也应该在最终查询输出中忽略这些值。如何去掉这些值呢？我们想要所有的 `ownerUserID`，除了那些匹配 `NULL` 或 `0` 值的。下面这行代码将为我们进行检查，并允许我们过滤掉这些值。如果你还没有用过
    `EXCEPT` 或 `INTERSECT`，我强烈建议你试一试。


    ```sql

    AND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))

    ```


    我们重写的下一步是移除这些不需要的用户 ID，然后对不同的分组进行聚合——有些按帖子，有些按天，有些按用户。我们该怎么做呢？


    ## 窗口函数


    那是什么？Windows 上安装的东西？嗯，我想技术上说是“是的”，但在这种情况下，它们是 SQL Server 后续版本（有些是 2005 或更高版本，有些是
    2012 或更高版本）中包含的函数。它们的作用是获取查询结果的一个“窗口”，并允许你在其上进行聚合。让我们看一个 `Listing 6-5` 中所示的例子。


    ```sql

    SELECT p.Id

    , CAST(p.CreationDate AS DATE) AS createDate

    , p.AnswerCount

    , pUser.Score

    , COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS numPostsUser

    , COUNT(pUser.OwnerUserId) OVER (PARTITION BY pUser.ParentId) AS numUsersPost

    , pUser.ParentId

    , pUser.OwnerUserId

    , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION
    BY pUser.OwnerUserId) AS numAccepted

    , u.DisplayName

    , ROW_NUMBER() OVER (PARTITION BY pUser.OwnerUserId ORDER BY pUser.ParentId DESC)
    AS theUserRowNum

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))

    AND pUser.PostTypeId = 2

    LEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId = u.Id

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1;

    ```


    Listing 6-5

    添加窗口函数


    我们可以查看 `Table 6-3` 所示的结果集（它是 `Listing 6-5` 查询中列的一个子集），看看我们是否成功获取了所需的数据。我们是如何获得每个用户回复的帖子数的？我们使用了帖子
    ID（在回复链接中它是父 ID）的计数，并按用户 ID 进行了分区。我们想要 `COUNT` `pUser.ParentId`，并且我们希望按 `pUser.OwnerUserId`
    定义的字段进行分区，因此我们使用以下行：


    ```sql

    COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS numPostsUser

    ```


    当我们按 `OwnerUserId` 分区时，聚合的“窗口”是单个用户回复的帖子集合，窗口函数将为每个用户 ID 返回一个单独的聚合值。


    `Table 6-3`


    来自 `Listing 6-4` 查询结果的子集


    | Id | 用户帖子数 | 帖子用户数 | ParentId | 所有者 用户 ID | 被接受数 |

    | --- | --- | --- | --- | --- | --- |

    | 11766266 | 1 | 3 | 11766266 | 9465 | 0 |

    | 11758727 | 3 | 1 | 11758727 | 9475 | 3 |

    | 11756598 | 3 | 1 | 11756598 | 9475 | 3 |

    | 11755899 | 3 | 1 | 11755899 | 9475 | 3 |

    | 11766893 | 2 | 4 | 11766893 | 9530 | 2 |

    | 11762529 | 2 | 3 | 11762529 | 9530 | 2 |

    | 11759414 | 1 | 3 | 11759414 | 9686 | 1 |

    | 11764539 | 1 | 17 | 11764539 | 9732 | 0 |

    | 11755196 | 1 | 2 | 11755196 | 9922 | 1 |

    | 11763636 | 1 | 2 | 11763636 | 10397 | 1 |


    我们将使用相同的“窗口”，即单个用户在一天内回复的帖子集合，来计算按用户 ID 统计的被接受回答数。不过，我们如何进行健全性检查呢？运行 `Listing
    6-2` 中的查询，添加一个 `ORDER BY p.Id`（帖子 ID）。你可以目视统计有多少不同的用户回复了每个帖子。然后再次运行 `Listing 6-5`
    中的代码，同样添加 `ORDER BY p.Id`。你可以将不含聚合的查询与包含聚合的查询进行目视对比，以验证整个查询的聚合是否正确：对于具有该用户的每条记录，你都能得到该用户回答的帖子数。对于回答一个帖子的用户数，你也会看到相同的情况。经常进行这样的健全性检查可以帮助你避免走上错误的编程道路，并在故障排除时节省时间！


