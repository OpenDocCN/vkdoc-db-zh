- fmt: '## Native SQL Server Functions


    在“I want to see what happened yesterday”这种情况下，我们应该对参数使用函数，而不是对表列使用函数。我们可以看到即使是
    SQL Server 原生函数，如`DATEADD()`、`ISNULL()`和`COALESCE()`，也会导致查询必须对表中的每条记录进行计算。让我们使用清单[7-8](#483961_1_En_7_Chapter.xhtml#PC10)中的代码来看看这可能带来的差异。


    ```sql

    DECLARE @date date;

    SET @date=''20120801'';

    SELECT p.Id

    , p.Score

    FROM dbo.Posts p

    WHERE DATEADD(dd,1,CAST(p.CreationDate AS date)) = @date;

    ```

    清单 7-8

    在 WHERE 子句中使用日期函数的示例查询


    我们期望从这个查询中得到什么样的数据？例如，在指定日期创建了多少帖子？如果我们考虑的是在去掉时间部分后，给日期加一天，然后这个值等于`2012.08.01`，那么我们谈论的是所有在`2012.07.31`到`2012.08.01`之间创建的帖子。首先，让我们使用清单[7-9](#483961_1_En_7_Chapter.xhtml#PC11)中的代码来看看我们期望得到多少帖子。


    ```sql

    SELECT COUNT(1) AS numPosts

    , CAST(p.CreationDate AS date) AS theDay

    FROM dbo.Posts p

    WHERE p.CreationDate > ''20120731''

    AND p.CreationDate < ''20120801''

    GROUP BY CAST(p.CreationDate AS date)

    ORDER BY theDay;

    ```

    清单 7-9

    清单 7-8 查询结果集中预期的帖子数量


    清单[7-9](#483961_1_En_7_Chapter.xhtml#PC11)的查询结果如表[7-4](#483961_1_En_7_Chapter.xhtml#Tab4)所示。这些结果意味着当我们运行清单[7-8](#483961_1_En_7_Chapter.xhtml#PC10)的查询时，我们预期会输出
    16,154 行。


    表 7-4


    运行清单 7-9 查询的结果


    | numPosts | theDay |

    | --- | --- |

    | 16154 | 2012-07-31 |


    如果我们启动事件会话并运行清单[7-8](#483961_1_En_7_Chapter.xhtml#PC10)中的查询，我们首先会看到预期的 16,154
    条记录。我们在扩展事件会话输出中看不到“额外”的行（如表[7-5](#483961_1_En_7_Chapter.xhtml#Tab5)所示），但我们确实看到了大量的逻辑读取。那么，我们该如何重写清单[7-8](#483961_1_En_7_Chapter.xhtml#PC10)中的代码，以从查询中移除
    SQL Server 原生函数呢？


    表 7-5


    运行清单 7-8 查询的扩展事件会话结果


    | duration | cpu time | physical reads | logical reads | writes | row count |
    statement |

    | --- | --- | --- | --- | --- | --- | --- |

    | 6307209 | 6297000 | 0 | 111,345 | 0 | 16154 | SELECT p.Id, p.Score FROM dbo.Posts
    p WHERE DATEADD(dd,1,CAST(p.CreationDate AS date)) = @date |


    首先，我们需要创建开始日期和结束日期，并使用它们来查找`creationdates`的范围，或者这些时间点之间的任何日期。你的结束日期将变成你传入的日期，因为根据代码，你想要所有在传入日期的前一天创建的帖子。通过对参数使用`DATEADD()`函数，我们可以将其从查询本身中移除，如清单[7-10](#483961_1_En_7_Chapter.xhtml#PC12)所示。


    ```sql

    DECLARE @date date

    , @startdate date;

    SET @date=''20120801'';

    SET @startdate = DATEADD(dd,-1,@date);

    SELECT p.Id

    , p.Score

    FROM dbo.Posts p

    WHERE p.CreationDate >= @startdate

    AND p.CreationDate < @date;

    ```

    清单 7-10

    将 DATEADD() 函数移到参数上，从查询中移除


    让我们返回并清理：删除扩展事件文件并重新启动事件会话。然后，运行清单[7-10](#483961_1_En_7_Chapter.xhtml#PC12)中的代码。我们仍然得到了预期的
    16,154 行结果，但表[7-6](#483961_1_En_7_Chapter.xhtml#Tab6)中的扩展事件会话数据显示服务器的工作量有所减少。


    表 7-6


    运行清单 7-10 查询的扩展事件会话结果


    | duration | cpu time | physical reads | logical reads | writes | row count |
    statement |

    | --- | --- | --- | --- | --- | --- | --- |

    | 5593747 | 5578000 | 0 | 29,771 | 0 | 16154 | SELECT p.Id, p.Score FROM dbo.Posts
    p WHERE p.CreationDate >= @startdate AND p.CreationDate < @date |


    在表[7-6](#483961_1_En_7_Chapter.xhtml#Tab6)中，我们看到从清单[7-8](#483961_1_En_7_Chapter.xhtml#PC10)的查询中移除`DATEADD()`函数，使时间减少了将近一秒，逻辑读取从超过
    100,000 次减少到大约 30,000 次。现在我们知道，在 WHERE 子句中使用函数时要非常、非常小心，尤其是任何类型的标量值函数！'
  raw: '## Native SQL Server Functions


    In the case of “I want to see what happened yesterday,” instead of using the function
    against the table column, we should use the function against the parameter. We
    can see even native SQL Server functions like DATEADD(), ISNULL(), and COALESCE()
    causing the query to have to evaluate every record in a table. Let’s use the code
    in Listing [7-8](#483961_1_En_7_Chapter.xhtml#PC10) to see the difference this
    can make.


    ```

    DECLARE @date date;

    SET @date=''20120801'';

    SELECT p.Id

    , p.Score

    FROM dbo.Posts p

    WHERE DATEADD(dd,1,CAST(p.CreationDate AS date)) = @date;

    Listing 7-8

    Sample query with a date function in the WHERE clause

    ```


    What kind of data are we expecting from this query? For example, how many posts
    were created on the date in question? If we’re looking at adding one day to the
    date after stripping out the time and that value being equal to 2012.08.01, then
    we’re talking about all posts that were created between 2012.07.31 and 2012.08.01\.
    First, let’s use the code in Listing [7-9](#483961_1_En_7_Chapter.xhtml#PC11)
    to see how many posts we are expecting.


    ```

    SELECT COUNT(1) AS numPosts

    , CAST(p.CreationDate AS date) AS theDay

    FROM dbo.Posts p

    WHERE p.CreationDate > ''20120731''

    AND p.CreationDate < ''20120801''

    GROUP BY CAST(p.CreationDate AS date)

    ORDER BY theDay;

    Listing 7-9

    Number of posts expected in the result set of the query in Listing 7-8

    ```


    The results from the query in Listing [7-9](#483961_1_En_7_Chapter.xhtml#PC11)
    are shown in Table [7-4](#483961_1_En_7_Chapter.xhtml#Tab4). What these results
    mean is that we’d expect 16,154 rows of output when we run our query from Listing
    [7-8](#483961_1_En_7_Chapter.xhtml#PC10).


    Table 7-4


    Results from running the query in Listing [7-9](#483961_1_En_7_Chapter.xhtml#PC11)


    | numPosts | theDay |

    | --- | --- |

    | 16154 | 2012-07-31 |


    If we turn on our Event Session and run the query from Listing [7-8](#483961_1_En_7_Chapter.xhtml#PC10),
    we first of all see the 16,154 records that we expect to see. We don’t see the
    “extra” lines in the Extended Event session output (shown in Table [7-5](#483961_1_En_7_Chapter.xhtml#Tab5)),
    but we do see a significant amount of logical reads. So how would we rewrite the
    code from Listing [7-8](#483961_1_En_7_Chapter.xhtml#PC10) to remove the native
    SQL Server function from the query?


    Table 7-5


    Extended Event session results from running the query in Listing [7-8](#483961_1_En_7_Chapter.xhtml#PC10)


    | duration | cpu time | physical reads | logical reads | writes | row count |
    statement |

    | --- | --- | --- | --- | --- | --- | --- |

    | 6307209 | 6297000 | 0 | 111,345 | 0 | 16154 | SELECT p.Id, p.Score FROM dbo.Posts
    p WHERE DATEADD(dd,1,CAST(p.CreationDate AS date)) = @date |


    First, we need to create begin and end dates, and use those to find a range of
    `creationdates`, or any dates between those times. Your end date will become the
    date you pass in, because according to the code, you want all posts that were
    created in the day before the date we passed in. By using the DATEADD() function
    against the parameter, we can move it out of the query itself, as shown in Listing
    [7-10](#483961_1_En_7_Chapter.xhtml#PC12).


    ```

    DECLARE @date date

    , @startdate date;

    SET @date=''20120801'';

    SET @startdate = DATEADD(dd,-1,@date);

    SELECT p.Id

    , p.Score

    FROM dbo.Posts p

    WHERE p.CreationDate >= @startdate

    AND p.CreationDate < @date;

    Listing 7-10

    Moving DATEADD() function to the parameter and out of the query

    ```


    Let’s go back and clean up by deleting the Extended Event file and restarting
    our Event Session. Then, run the code in Listing [7-10](#483961_1_En_7_Chapter.xhtml#PC12).
    We still get the 16,154 rows returned that we expected, but the Extended Event
    session data in Table [7-6](#483961_1_En_7_Chapter.xhtml#Tab6) shows a reduction
    in the work the server is doing.


    Table 7-6


    Extended Event session results from running the query in Listing [7-10](#483961_1_En_7_Chapter.xhtml#PC12)


    | duration | cpu time | physical reads | logical reads | writes | row count |
    statement |

    | --- | --- | --- | --- | --- | --- | --- |

    | 5593747 | 5578000 | 0 | 29,771 | 0 | 16154 | SELECT p.Id, p.Score FROM dbo.Posts
    p WHERE p.CreationDate >= @startdate AND p.CreationDate < @date |


    In Table [7-6](#483961_1_En_7_Chapter.xhtml#Tab6), we see that removing the DATEADD()
    function from the query in Listing [7-8](#483961_1_En_7_Chapter.xhtml#PC10) decreases
    the time by almost a second, and the logical reads have been reduced from over
    100,000 to about 30,000\. Now we know be very, very careful using functions, especially
    any sort of scalar-valued function in a WHERE clause!'
