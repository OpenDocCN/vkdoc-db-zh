  trans: '

    完美！表格 5-2 展示的结果正是我们想要的。`反对票`增加到 5，`声望值`降至 0。不过，我们刚刚测试的并不是唯一可能的情况。我们只是碰巧拥有一个可正常工作的生产环境恢复（在本例中是我们的示例数据库），因此我们还保留着用户
    1010297 的初始数据。这将让我们能准确查看该用户的情况！他们有 14 张`反对票`，所以可能是某人增加了一张，但那样应该只会减少 1 点`声望值`，对吧？我们将使用清单
    5-3 中的代码来测试用户 1010297 描述的场景。


    ```sql

    DECLARE @userID int = 1010297;

    SELECT Id, Reputation, DownVotes

    FROM dbo.Users

    WHERE Id = @userID;

    UPDATE dbo.Users

    SET DownVotes = DownVotes + 1

    WHERE Id = @userID;

    SELECT Id, Reputation, DownVotes

    FROM dbo.Users

    WHERE Id = @userID;

    ```


    清单 5-3 为用户 1010297 添加一张反对票


    我们可以在表 5-3 中看到“之前”的结果。该用户有 14 张`反对票`，`声望值`为 25。我们可以理解他们为什么不想失去所有那些`声望值`！我们也可以在表
    5-4 中看到“之后”的结果。


    表 5-4


    添加一张反对票后，用户 1010297 的声望值和反对票分数


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 0 | 15 |


    表 5-3


    更新前，用户 1010297 的声望值和反对票分数


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 25 | 14 |


    ## 触发器递归


    正如我们在表 5-4 中所看到的，该用户已经没有任何`声望值`了！等等，所有那些`声望值`去哪儿了？嗯，让我们再看一下实际的触发器逻辑，如清单 5-4 所示。


    ```sql

    IF EXISTS (SELECT 1 FROM INSERTED i WHERE i.DownVotes > 0

    AND i.DownVotes % 5 = 0

    AND i.Reputation > 0)

    BEGIN

    UPDATE u

    SET u.Reputation = u.Reputation - 1

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0;

    END;

    ```


    清单 5-4 用于 iu_Users_DownVotes 的触发器逻辑


    清单 5-4 中的代码实际在做什么？它正在更新`Users`表。是什么触发了这个触发器？是对`Users`表的一次`UPDATE`操作。嗯……我们正在`EXISTS`语句中查找`INSERTED`表中满足以下条件的任何记录：`反对票`大于
    0、能被 5 整除且`声望值`大于 0。然后，对于任何满足上述条件且存在于`INSERTED`表中的记录，我们将其`声望值`减少 1。


    这里有两个问题。一是我们正在运行一个`UPDATE`操作，这可能会再次触发该触发器本身。第二个问题在于逻辑本身。在前面的例子中，我们在调用触发器之前将表中的`反对票`从
    14 更新为 15。触发器本身不会改变`反对票`的值，因此对于清单 5-3 所示的情况，`反对票`值（15）继续能被 5 整除，因为该值不会改变。


    这意味着每次运行时`声望值`都会继续减少 1。我们还可以通过查询`Triggerlog`表（这是我专门为本书设置的一个表）看到，由清单 5-3 中的代码导致了触发器的多次运行。`Triggerlog`表在这里说明了一个问题，但对于任何经常使用触发器的数据库来说，添加这样的表可能是有用的。查询`Triggerlog`表的代码如清单
    5-5 所示。


    ```sql

    SELECT id, thisdate, thisaction, descript

    FROM Triggerlog;

    ```


    清单 5-5 查询 Triggerlog 表


    如果我们查看清单 5-5 代码的查询结果，我们可以看到针对用户 ID 1010297 的多次触发。这些结果显示在表 5-5 中。如果你在`声望值`超过 32
    点的用户上尝试此更新，触发器代码实际上会在 32 次递归后失败并抛出错误消息。


    表 5-5 查询 Triggerlog 表的结果

    '
