- fmt: '## Triggers and Multi-record Changes


    There actually is another issue with this trigger. Have you realized what it might
    be? A lot of times, people assume that inserts and updates will occur only a single
    row at a time. This doesn’t necessarily have to be the case. What if we are updating
    several users at once? Well, first go back, and let’s restore user 1010297’s `Reputation`
    with the code in Listing [5-8](#483961_1_En_5_Chapter.xhtml#PC8). Then, let’s
    try running code in Listing [5-9](#483961_1_En_5_Chapter.xhtml#PC9) to look at
    multiple users at once. The results of the query are shown in Table [5-8](#483961_1_En_5_Chapter.xhtml#Tab8).


    Table 5-8


    Results of the query in Listing [5-9](#483961_1_En_5_Chapter.xhtml#PC9)


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 25 | 14 |

    | 1639596 | 1 | 3 |

    | 2179513 | 5 | 3 |

    | 2491405 | 1 | 3 |

    | 2549795 | 31 | 3 |


    ```sql

    DECLARE @theTable TABLE (id int);

    INSERT INTO @theTable (id)

    VALUES (1010297)

    , (1639596)

    , (2179513)

    , (2491405)

    , (2549795);

    SELECT tb.id

    , u.Reputation

    , u.DownVotes

    FROM @theTable tb

    INNER JOIN dbo.Users u ON tb.id = u.Id;

    Listing 5-9

    Looking at DownVotes and Reputation for multiple users

    ```


    Table [5-8](#483961_1_En_5_Chapter.xhtml#Tab8) shows us data for five users. If
    we incremented each person’s `DownVotes` by 1, then the user with an Id of 1010297’s
    `Reputation` should decrease by 1, but the others should not (they’d only have
    four `DownVotes` apiece). Let’s take a look using the code in Listing [5-10](#483961_1_En_5_Chapter.xhtml#PC10).


    ```sql

    DECLARE @theTable TABLE (id int);

    INSERT INTO @theTable (id)

    VALUES (1010297)

    , (1639596)

    , (2179513)

    , (2491405)

    , (2549795);

    SELECT tb.id

    , u.Reputation

    , u.DownVotes

    FROM @theTable tb

    INNER JOIN dbo.Users u ON tb.id = u.Id;

    UPDATE u

    SET DownVotes = u.DownVotes + 1

    FROM dbo.Users u

    INNER JOIN @theTable tb ON u.Id = tb.id;

    SELECT tb.id

    , u.Reputation

    , u.DownVotes

    FROM @theTable tb

    INNER JOIN dbo.Users u ON tb.id = u.Id;

    Listing 5-10

    Update DownVotes for multiple users

    ```


    We saw the before results in Table [5-8](#483961_1_En_5_Chapter.xhtml#Tab8). The
    after results are shown in Table [5-9](#483961_1_En_5_Chapter.xhtml#Tab9).


    Table 5-9


    Results of code from Listing [5-10](#483961_1_En_5_Chapter.xhtml#PC10)


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 24 | 15 |

    | 1639596 | 0 | 4 |

    | 2179513 | 4 | 4 |

    | 2491405 | 0 | 4 |

    | 2549795 | 30 | 4 |


    Oh no! Each of these people had their `Reputation` decreased. When we look at
    the `EXISTS` statements in Listing [5-1](#483961_1_En_5_Chapter.xhtml#PC1), we’re
    checking to see if a record exists where the `DownVotes` are divisible by 5. However,
    we do NOT check for the same criteria in the actual update statement! If we look
    in the `Triggerlog` table using the code in Listing [5-5](#483961_1_En_5_Chapter.xhtml#PC5),
    we’ll also see a record for each of these users being run in the trigger.


    If we modify the update statement in the trigger in Listing [5-1](#483961_1_En_5_Chapter.xhtml#PC1)
    using the code in Listing [5-11](#483961_1_En_5_Chapter.xhtml#PC11), we should
    only update the same records the `EXISTS` statement finds, and our results should
    be in much better shape.


    ```sql

    UPDATE u

    SET u.Reputation = u.Reputation - 1

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0

    AND i.DownVotes > 0

    AND i.DownVotes % 5 = 0;

    Listing 5-11

    New update statement testing if DownVotes is divisible by 5

    ```


    Before we modify the code in Listing [5-1](#483961_1_En_5_Chapter.xhtml#PC1) with
    the code in 5-11 and test, though, we should restore the users’ `Reputation` points
    using the code in Listing [5-12](#483961_1_En_5_Chapter.xhtml#PC12).


    ```sql

    DECLARE @theTable TABLE (id int, Reputation int, DownVotes int);

    INSERT INTO @theTable (id, Reputation, DownVotes)

    VALUES (1010297, 25, 14)

    , (1639596, 1, 3)

    , (2179513, 5, 3)

    , (2491405, 1, 3)

    , (2549795, 31, 3);

    UPDATE u

    SET Reputation = tb.Reputation

    , DownVotes = tb.DownVotes

    FROM dbo.Users u

    INNER JOIN @theTable tb ON u.Id = tb.id;

    Listing 5-12

    Restore multiple users’ Reputation points

    ```


    Next, we’ll replace the `UPDATE` statement in the trigger in Listing [5-1](#483961_1_En_5_Chapter.xhtml#PC1)
    with the `UPDATE` statement in Listing [5-11](#483961_1_En_5_Chapter.xhtml#PC11)
    and run the `ALTER` statement. We will then rerun the code in Listing [5-10](#483961_1_En_5_Chapter.xhtml#PC10)
    to see what will happen when we update the `DownVotes` on these same five users.
    The before results should be the same as the initial before results, which were
    shown in Table [5-8](#483961_1_En_5_Chapter.xhtml#Tab8). Our after results are
    different from before, and are shown in Table [5-10](#483961_1_En_5_Chapter.xhtml#Tab10).


    Table 5-10


    After results for updating multiple users’ DownVotes at one time


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 24 | 15 |

    | 1639596 | 1 | 4 |

    | 2179513 | 5 | 4 |

    | 2491405 | 1 | 4 |

    | 2549795 | 31 | 4 |


    Whew! All better. Table [5-10](#483961_1_En_5_Chapter.xhtml#Tab10) shows us that
    only the `Reputation` for user 1010297 decreased, which is what we wanted to happen.
    But is it really ALL better? Let’s look at a scenario where we don’t change the
    number of `DownVotes`. First please run the code in Listing [5-12](#483961_1_En_5_Chapter.xhtml#PC12)
    to reset our users’ values back to starting values. The code for the lack of change
    for `DownVotes` values is shown in Listing [5-13](#483961_1_En_5_Chapter.xhtml#PC13).'
