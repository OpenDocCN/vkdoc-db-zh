    There are a couple of things to note with the results in Table [5-14](#483961_1_En_5_Chapter.xhtml#Tab14).
    The `UPDATE` trigger actually inserted the record BEFORE the `INSERT` trigger
    inserted its record. This is because the `UPDATE` statement ran within the `INSERT`
    trigger, so it (the `INSERT` trigger) hadn''t completed yet when the `UPDATE`
    statement ran. All of the internal triggers caused by a call will finish before
    the external trigger causing the internal triggers to be called. A diagram of
    the flow is shown in Figure [5-1](#483961_1_En_5_Chapter.xhtml#Fig1). In our case
    with the code in Listing [5-20](#483961_1_En_5_Chapter.xhtml#PC20), the `INSERT`
    statement to the `Triggerlog` fired only after all the triggers (in this case
    one) from the `UPDATE` statement completed. Also, we did not actually update ANYTHING,
    yet the `UPDATE` statement ran and fired an `UPDATE` trigger.


    ![../images/483961_1_En_5_Chapter/483961_1_En_5_Fig1_HTML.png](images/483961_1_En_5_Chapter/483961_1_En_5_Fig1_HTML.png)


    **Figure 5-1**

    Flow of triggers from insert on the LinkTypes table


    Imagine a vast, complex database with several triggers on each table. (I know,
    this sounds like a bad 1980s horror movie, but bear with me.) Any time you make
    changes to data in any table, there could be this really unpleasant cascade leading
    to a veritable trigger storm.


    If we continue to spin this story out, we get to some triggers updating tables
    again, which can cause another round of update triggers to fire again… and again…
    and… Okay. I''m sure you can see where I''m going with this. You cannot specify
    which triggers fire in which order, either. For triggers against any table, you
    can specify a first trigger and a last trigger, but beyond that, you cannot determine
    the order in which they run.


    In case that''s not bad enough, if any of the code in any of the triggers fails,
    everything will then roll back. Not only do you have the performance hit of all
    these triggers running in the first place, you may then get stuck with the extra
    performance hit of all of them rolling back. This can make any save take a very,
    very long time.


    ## Summary

    One big lesson we learned in this chapter that doesn''t directly relate to triggers
    is the importance of testing different scenarios. It''s very easy and obvious
    to test that, in simple cases, the functionality you''re coding works. It''s less
    obvious to test all of the edge cases to make sure you aren''t inadvertently introducing
    problems. Please make sure to write up your test cases thoroughly and make sure
    code passes all of these tests!


    In terms of triggers, in almost every case, there is a way to accomplish the functionality
    you want without using a trigger. Their use introduces a potential for performance
    problems that can be difficult to find and troubleshoot. Just say no! Diagnostic
    triggers can be fine to use, but I would also hard-code a time limit on them so
    they won''t fire after a month (or other reasonable time frame, depending on your
    application).


    If you have a data access layer and denormalized tables, you can use your data
    access layer to propagate data changes to every table that needs those changes.
    Otherwise, business logic really should be handled by the application and not
    in the database.


    If you are stuck with triggers, though, please make sure you check them all for
    the following:

    1. They are only doing work when they actually need to.

    2. They can correctly handle multiple records being updated, inserted, or deleted
    in the same statement.

    3. Recursive firing has been handled correctly (be aware of your database-level
    settings and your trigger-level settings).


    ## 6. Stored Procedures

    In Chapter [2](#483961_1_En_2_Chapter.xhtml), we went ahead and documented a stored
    procedure used to call data for a report. The proc was called `dailySummaryReportByMonth`.
    Let''s review the documentation from Chapter [2](#483961_1_En_2_Chapter.xhtml);
    then we can start to rewrite the stored procedure. When we look at the data calls,
    we see six calls to the `dbo.Posts` table. There''s a good chance we can reduce
    the number of calls to that table. The proc also uses both a temporary table and
    a table variable.


    ### Temporary Tables vs. Table Variables

    There is a lot of debate between whether to use table variables or temporary tables.
    There can be issues with excessive recompiles of temporary tables inside of stored
    procedures, leading to concerns. Most concerns were negated by better handling
    of temp tables in later versions of SQL Server, but some still exist. For example,
    you should not change the schema of the temporary table once it''s created, even
    to add an index. Please add indexes in line with the create statement. In this
    vein, temporary tables should not have named constraints. There is a very good
    article by Paul White ([`https://sqlperformance.com/2017/05/sql-performance/sql-server-temporary-object-caching`](https://sqlperformance.com/2017/05/sql-performance/sql-server-temporary-object-caching))
    that discusses issues around schema changes and named constraints at some length.


    Additionally, be aware of adding or removing a large percentage of data from temp
    tables; this should cause a recompile the way adding or removing large percentages
    of data from regular tables will cause statistics updates and then recompiles
    of any procs calling them. Here is a bit more information about recompiles: [`www.mssqltips.com/sqlservertip/5308/understanding-sql-server-recompilations/`](http://www.mssqltips.com/sqlservertip/5308/understanding-sql-server-recompilations/).


    Also, folks were saying for a while that temporary tables were stored in tempdb,
    whereas table variables were not, but that really isn''t true. Both structures
    will be stored in memory until they are too large; then either can be written
    to disk. So what really are the considerations of temporary tables vs. table variables?
    Well, table variables are limited in the types of indexes that can be created
    against them. Additionally, temporary tables have statistics, and table variables
    do not. This can make a major difference in how they perform in terms of what
    kinds of execution plans get created. Because the optimizer cannot determine row
    estimates for table variables, I''ve found that it makes sense to use them only
    for very small tables (generally 100 rows or less, usually much lesser) where
    data isn''t going to change much after insert. That is a personal choice, but
    I''ve found that it works pretty well as a general rule.


    Please note that any time there is a "general rule," it means that there can be
    exceptions to those rules. In any recoding, it''s always the best bet to try as
    many of the different permutations as you can, because there is no guarantee that
    a solution will really work best in each unique situation. If you''ve ever asked
    a DBA a question, please expect them to answer "It depends" because in almost
    all cases, it really does.'
  raw: 'Let’s run a simple insert statement to the `LinkTypes` table, like the one
    shown in Listing [5-20](#483961_1_En_5_Chapter.xhtml#PC20). Then we will check
    the `Triggerlog` table using the code in Listing [5-5](#483961_1_En_5_Chapter.xhtml#PC5).
    When we do that, we see that the there are two records in the `Triggerlog` table,
    as shown in Table [5-14](#483961_1_En_5_Chapter.xhtml#Tab14).


    Table 5-14


    Results in the Triggerlog table after insert to LinkTypes


    | id | thisDate | thisAction | descript |

    | --- | --- | --- | --- |

    | 0 | 2019-06-30 9:27:24 | LT Update do-nothing Trigger Ran |   |

    | 0 | 2019-06-30 9:27:24 | LT Insert Do Nothing Trigger Ran |   |


    ```

    INSERT INTO linkTypes (Type)

    VALUES (''TTest'');

    Listing 5-20

    Simple insert to the LinkTypes table

    ```


    There are a couple of things to note with the results in Table [5-14](#483961_1_En_5_Chapter.xhtml#Tab14).
    The UPDATE trigger actually inserted the record BEFORE the INSERT trigger inserted
    its record. This is because the UPDATE statement ran within the INSERT trigger,
    so it (the INSERT trigger) hadn’t completed yet when the UPDATE statement ran.
    All of the internal triggers caused by a call will finish before the external
    trigger causing the internal triggers to be called. A diagram of the flow is shown
    in Figure [5-1](#483961_1_En_5_Chapter.xhtml#Fig1). In our case with the code
    in Listing [5-20](#483961_1_En_5_Chapter.xhtml#PC20), the INSERT statement to
    the `Triggerlog` fired only after all the triggers (in this case one) from the
    UPDATE statement completed. Also, we did not actually update ANYTHING, yet the
    update statement ran and fired an UPDATE trigger.


    ![../images/483961_1_En_5_Chapter/483961_1_En_5_Fig1_HTML.png](images/483961_1_En_5_Chapter/483961_1_En_5_Fig1_HTML.png)


    Figure 5-1


    Flow of triggers from insert on the LinkTypes table


    Imagine a vast, complex database with several triggers on each table. (I know,
    this sounds like a bad 1980s horror movie, but bear with me.) Any time you make
    changes to data in any table, there could be this really unpleasant cascade leading
    to a veritable trigger storm.


    If we continue to spin this story out, we get to some triggers updating tables
    again, which can cause another round of update triggers to fire again… and again…
    and… Okay. I’m sure you can see where I’m going with this. You cannot specify
    which triggers fire in which order, either. For triggers against any table, you
    can specify a first trigger and a last trigger, but beyond that, you cannot determine
    the order in which they run.


    In case that’s not bad enough, if any of the code in any of the triggers fails,
    everything will then roll back. Not only do you have the performance hit of all
    these triggers running in the first place, you may then get stuck with the extra
    performance hit of all of them rolling back. This can make any save take a very,
    very long time.


    ## Summary


    One big lesson we learned in this chapter that doesn’t directly relate to triggers
    is the importance of testing different scenarios. It’s very easy and obvious to
    test that, in simple cases, the functionality you’re coding works. It’s less obvious
    to test all of the edge cases to make sure you aren’t inadvertently introducing
    problems. Please make sure to write up your test cases thoroughly and make sure
    code passes all of these tests!


    In terms of triggers, in almost every case, there is a way to accomplish the functionality
    you want without using a trigger. Their use introduces a potential for performance
    problems that can be difficult to find and troubleshoot. Just say no! Diagnostic
    triggers can be fine to use, but I would also hard-code a time limit on them so
    they won’t fire after a month (or other reasonable time frame, depending on your
    application).


    If you have a data access layer and denormalized tables, you can use your data
    access layer to propagate data changes to every table that needs those changes.
    Otherwise, business logic really should be handled by the application and not
    in the database.


    If you are stuck with triggers, though, please make sure you check them all for
    the following:


    1.  They are only doing work when they actually need to.


    2.  They can correctly handle multiple records being updated, inserted, or deleted
    in the same statement.


    3.  Recursive firing has been handled correctly (be aware of your database-level
    settings and your trigger-level settings).


    # 6. Stored Procedures


    In Chapter [2](#483961_1_En_2_Chapter.xhtml), we went ahead and documented a stored
    procedure used to call data for a report. The proc was called `dailySummaryReportByMonth`.
    Let’s review the documentation from Chapter [2](#483961_1_En_2_Chapter.xhtml);
    then we can start to rewrite the stored procedure. When we look at the data calls,
    we see six calls to the `dbo.Posts` table. There’s a good chance we can reduce
    the number of calls to that table. The proc also uses both a temporary table and
    a table variable.


    ## Temporary Tables vs. Table Variables


    There is a lot of debate between whether to use table variables or temporary tables.
    There can be issues with excessive recompiles of temporary tables inside of stored
    procedures, leading to concerns. Most concerns were negated by better handling
    of temp tables in later versions of SQL Server, but some still exist. For example,
    you should not change the schema of the temporary table once it’s created, even
    to add an index. Please add indexes in line with the create statement. In this
    vein, temporary tables should not have named constraints. There is a very good
    article by Paul White ([`https://sqlperformance.com/2017/05/sql-performance/sql-server-temporary-object-caching`](https://sqlperformance.com/2017/05/sql-performance/sql-server-temporary-object-caching))
    that discusses issues around schema changes and named constraints at some length.


    Additionally, be aware of adding or removing a large percentage of data from temp
    tables; this should cause a recompile the way adding or removing large percentages
    of data from regular tables will cause statistics updates and then recompiles
    of any procs calling them. Here is a bit more information about recompiles: [`www.mssqltips.com/sqlservertip/5308/understanding-sql-server-recompilations/`](http://www.mssqltips.com/sqlservertip/5308/understanding-sql-server-recompilations/).


    Also, folks were saying for a while that temporary tables were stored in tempdb,
    whereas table variables were not, but that really isn’t true. Both structures
    will be stored in memory until they are too large; then either can be written
    to disk. So what really are the considerations of temporary tables vs. table variables?
    Well, table variables are limited in the types of indexes that can be created
    against them. Additionally, temporary tables have statistics, and table variables
    do not. This can make a major difference in how they perform in terms of what
    kinds of execution plans get created. Because the optimizer cannot determine row
    estimates for table variables, I’ve found that it makes sense to use them only
    for very small tables (generally 100 rows or less, usually much lesser) where
    data isn’t going to change much after insert. That is a personal choice, but I’ve
    found that it works pretty well as a general rule.


    Please note that any time there is a “general rule,” it means that there can be
    exceptions to those rules. In any recoding, it’s always the best bet to try as
    many of the different permutations as you can, because there is no guarantee that
    a solution will really work best in each unique situation. If you’ve ever asked
    a DBA a question, please expect them to answer “It depends” because in almost
    all cases, it really does.'
  trans: '我们向 `LinkTypes` 表运行一个简单的插入语句，如代码清单 5-20 所示。然后，我们将使用代码清单 5-5 中的代码检查 `Triggerlog`
    表。执行此操作后，我们看到 `Triggerlog` 表中有两条记录，如表 5-14 所示。


    **表 5-14**

    插入 LinkTypes 表后，Triggerlog 表中的结果


    | id | thisDate | thisAction | descript |

    | --- | --- | --- | --- |

    | 0 | 2019-06-30 9:27:24 | LT Update do-nothing Trigger Ran |   |

    | 0 | 2019-06-30 9:27:24 | LT Insert Do Nothing Trigger Ran |   |


    ```

    INSERT INTO linkTypes (Type)

    VALUES (''TTest'');

    Listing 5-20

    对 LinkTypes 表的简单插入

    ```


    关于表 5-14 中的结果，有几点需要注意。`UPDATE` 触发器实际上在 `INSERT` 触发器插入其记录之前就插入了记录。这是因为 `UPDATE`
    语句是在 `INSERT` 触发器内部运行的，因此当 `UPDATE` 语句运行时，`INSERT` 触发器尚未完成。由一次调用引起的所有内部触发器，都将在引发这些内部触发器被调用的外部触发器完成之前结束。流程示意图如图
    5-1 所示。在我们使用代码清单 5-20 中代码的情况下，向 `Triggerlog` 的 `INSERT` 语句仅在所有由 `UPDATE` 语句引发的触发器（本例中为一个）完成之后才触发。此外，我们实际上并没有更新任何内容，但
    `UPDATE` 语句仍然运行并触发了 `UPDATE` 触发器。


    ![../images/483961_1_En_5_Chapter/483961_1_En_5_Fig1_HTML.png](img/483961_1_En_5_Fig1_HTML.png)


    **图 5-1**

    在 LinkTypes 表上插入操作引发的触发器流程


    想象一个庞大、复杂的数据库，每个表上都有多个触发器。（我知道，这听起来像是一部糟糕的 1980 年代恐怖片，但请耐心听我说。）任何时候你修改任何表中的数据，都可能引发一连串非常令人不快的操作，导致真正的触发器风暴。


    如果我们继续推演这个故事，会再次遇到某些触发器更新表的情况，这可能引发新一轮的更新触发器……如此反复……等等。我相信你明白我要表达的意思了。你也无法指定哪些触发器按何种顺序触发。对于任何表上的触发器，你可以指定一个第一个触发器和一个最后一个触发器，但除此之外，你无法决定它们的执行顺序。


    如果这还不够糟糕的话，那么如果任何一个触发器中的任何代码执行失败，所有操作都将回滚。你不仅首先承担了运行所有这些触发器的性能开销，随后还可能因为它们全部回滚而承受额外的性能开销。这可能会使任何保存操作花费非常、非常长的时间。


    ## 总结

    我们在本章学到的一个与触发器无直接关系的重要教训是测试不同场景的重要性。测试简单情况下你编写的代码功能正常，这既容易又显而易见。但测试所有边缘情况以确保你不会无意中引入问题，则不那么明显。请务必彻底编写测试用例，并确保代码通过所有这些测试！


    就触发器而言，在几乎所有情况下，都有一种方法可以实现你想要的功能而无需使用触发器。使用触发器会引入潜在的性能问题，这些问题可能难以发现和排查。坚决说不！诊断性触发器可以使用，但我也建议硬编码一个时间限制，使它们在一个月后（或其他合理的时间框架，取决于你的应用程序）不再触发。


    如果你拥有数据访问层和非规范化表，你可以使用数据访问层将数据更改传播到所有需要这些更改的表中。否则，业务逻辑确实应该由应用程序处理，而不是在数据库中处理。


    但是，如果你不得不使用触发器，请确保你检查它们是否符合以下所有条件：

    1.  它们只在真正需要时才执行工作。

    2.  它们能正确处理同一条语句中更新、插入或删除多条记录的情况。

    3.  递归触发已被正确处理（注意你的数据库级别设置和触发器级别设置）。


    ## 6. 存储过程

    在第 2 章中，我们记录了一个用于为报表调用数据的存储过程。该过程名为 `dailySummaryReportByMonth`。让我们回顾一下第 2 章的文档；然后我们可以开始重写这个存储过程。当我们查看数据调用时，发现有六次调用
    `dbo.Posts` 表。我们很有可能可以减少对该表的调用次数。该过程还同时使用了一个临时表和一个表变量。


    ### 临时表 vs. 表变量

    关于使用表变量还是临时表存在很多争论。临时表在存储过程中可能导致过度的重新编译，这引发了一些担忧。在后续版本的 SQL Server 中，对临时表的更好处理消除了一些担忧，但有些问题依然存在。例如，临时表一旦创建，就不应更改其架构，即使是添加索引也不行。请在创建语句中一并添加索引。同样，临时表不应有命名约束。Paul
    White 有一篇非常好的文章 ([`https://sqlperformance.com/2017/05/sql-performance/sql-server-temporary-object-caching`](https://sqlperformance.com/2017/05/sql-performance/sql-server-temporary-object-caching))，详细讨论了与架构更改和命名约束相关的问题。


    另外，请注意向临时表添加或从中删除大量数据；这应该会引起重新编译，就像从常规表中添加或删除大量数据会导致统计信息更新，进而引起调用这些表的存储过程重新编译一样。这里有一些关于重新编译的更多信息：
    [`www.mssqltips.com/sqlservertip/5308/understanding-sql-server-recompilations/`](http://www.mssqltips.com/sqlservertip/5308/understanding-sql-server-recompilations/)。


    此外，一段时间以来，人们常说临时表存储在 tempdb 中，而表变量则不是，但这并不完全正确。两种结构都会存储在内存中，直到它们变得太大；然后都可能被写入磁盘。那么临时表与表变量的真正考虑因素是什么？嗯，表变量在可以创建的索引类型上是有限制的。此外，临时表有统计信息，而表变量没有。这可能会对它们的性能产生重大影响，具体取决于创建了哪种执行计划。因为优化器无法确定表变量的行数估计，我发现只在非常小的表（通常为
    100 行或更少，通常更少）且数据在插入后变化不大的情况下使用它们是合理的。这是个人选择，但我发现作为一个通用规则，它效果相当好。


    请注意，任何“通用规则”都意味着这些规则可能存在例外。在任何重新编码时，尝试尽可能多的不同组合总是最稳妥的做法，因为不能保证某个解决方案在每种独特情况下都是最优的。如果你曾问过
    DBA 一个问题，请预期他们会回答“视情况而定”，因为在几乎所有情况下，事实确实如此。'
- fmt: '### The Temporary Table


    So let''s talk a little about temporary tables. If there are going to be some
    joins against a key column, I''ll generally set the temp table up to have that
    column as a primary key/clustered index combination when I define the table. I
    generally prefer not to add nonclustered indexes. If I can avoid that by writing
    more smaller pieces of code, or even procedures that do less work each, that is
    my preference, but sometimes that is not possible. When I come to code where the
    work can''t be divided easily, I usually try rewrites of several permutations
    to find out which solution will work best in each case.


    ### The Table Variable


    Here, the `@usersDay` table variable will have one record for each user that responds
    to a post in a specific day. There are going to be many, many more records in
    this table than 100. This is an immediate flag that we''ll need to change this
    to a temporary table – if we end up needing it at all. One good thing to know
    is how the rest of your application affects `tempdb`. Is the application a heavy
    user in general of `tempdb`, or is the use there light? If the code in your application
    already pounds on `tempdb`, you may want to be wary of adding more temporary structures
    that will increase the pressure on `tempdb`.


    ## Loops


    As we go through the documentation, we see two loops. The outer loop is handling
    each post during a certain day in a RBAR (row-by-agonizing-row) fashion. The inner
    loop is handling each user that responded to that post in a similar way. This
    is going to be the root of many, many of your problems. SQL Server is designed
    to handle data in batches or groups, not in a linear fashion, as we discussed
    in Chapter [2](#483961_1_En_2_Chapter.xhtml). Also as we discussed in Chapter
    [2](#483961_1_En_2_Chapter.xhtml), people think in a linear fashion. We accomplish
    one task (add a row to a table). We then perform another task (modify a value
    of that record).


    Many front-end developers have a procedural way of thinking enforced because many
    applications work in that way also. Users view small groups of records, but usually
    interact with a single record at a time. Legacy code or code written by folks
    not as familiar with the SQL Server engine usually has a lot of cursors and loops
    in it. The best thing you can do for performance is to make them go far, far (FAR)
    away.


    Because of the loops, it is extremely difficult to get performance data. There
    will be one section of output in `STATISTICS IO` and `STATISTICS TIME` for each
    time each loop runs. There will also be a separate `execution plan` for each query
    in each loop. This makes pinpointing a slow area difficult. With code like this,
    it''s best to completely rewrite the stored procedure.


    ## Functionality Review


    What functions are being performed by this code? We''re incrementing the number
    of posts for a day by 1. We''re seeing if this user is the accepted answerer of
    a specific post. We''re also incrementing the user count that touched the specific
    post by 1. We''re grabbing the score for this specific user for this post and
    updating the temp table `#finalOutput` with some of that information. We''re then
    adding a record into the `@usersDay` table if one doesn''t exist, or updating
    the record if it does. And we''re doing all of this for every single post. YUCK!


    ## Start with the Simplest Data


    When I rewrite code, I try to start with gathering the basic building blocks of
    data. This is the data I will need to get the desired output. I will start with
    the simplest data to query and then add onto the layers and complexity until I
    get the results that are needed. For the `dailySummaryReportByMonth` stored procedure,
    what we actually need in terms of data is the following:


    1.  The number of posts in a day

    2.  The number of users that responded to any post that was entered in that day

    3.  The high number of users responding to a single post that was posted on that
    day

    4.  The user with the highest number of responses to a post on that day

    5.  The number of posts that a user responded to

    6.  The number of those answers marked as accepted answers

    7.  The highest number of upvotes for that day


    So we have an initial select for every post created in the desired time frame,
    which is a question (`PostTypeId = 1`). We are going to limit our output for now
    to a small amount (a single day), which will make initial comparisons easier.
    We can use the code in Listing [6-1](#483961_1_En_6_Chapter.xhtml#PC1) to start
    replicating the stored procedure output.


    ```

    SELECT CAST(p.CreationDate AS DATE) AS createDate

    , p.Id

    FROM dbo.Posts p

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1;

    Listing 6-1

    Response posts for a single day

    ```


    The code in Listing [6-1](#483961_1_En_6_Chapter.xhtml#PC1) gives us 5,574 records,
    and we get our results in a relatively short return time. It''s time to start
    adding more data to our response posts. Now we need to grab all the posts that
    are responses. These posts have the `postTypeID` of 2. We can add the `Answer
    Count`, the owner of the post, and whether this is the accepted answer. We can
    also add the score, which translates into upvotes. These additions are shown in
    the code in Listing [6-2](#483961_1_En_6_Chapter.xhtml#PC2), and a subset of results
    from the query is shown in Table [6-1](#483961_1_En_6_Chapter.xhtml#Tab1).


    Table 6-1

    First ten records from the result set for query in Listing [6-2](#483961_1_En_6_Chapter.xhtml#PC2)


    | createDate | Id | Answer Count | Owner UserId | isAccepted | upvotes |

    | --- | --- | --- | --- | --- | --- |

    | 2012-08-01 | 11750763 | 2 | 1530410 | 0 | 5 |

    | 2012-08-01 | 11750765 | 1 | 868718 | 1 | 2 |

    | 2012-08-01 | 11750767 | 1 | 841828 | 1 | 1 |

    | 2012-08-01 | 11750768 | 3 | 8670 | 0 | 0 |

    | 2012-08-01 | 11750768 | 3 | 814048 | 0 | 1 |

    | 2012-08-01 | 11750768 | 3 | 1137672 | 0 | 1 |

    | 2012-08-01 | 11750770 | 3 | 592212 | 0 | 0 |

    | 2012-08-01 | 11750770 | 3 | 862594 | 1 | 3 |

    | 2012-08-01 | 11750770 | 3 | 1567222 | 0 | 0 |

    | 2012-08-01 | 11750780 | 1 | 1487063 | 1 | 1 |


    ```

    SELECT CAST(p.CreationDate AS DATE) AS createDate

    , p.Id

    , p.AnswerCount

    , pUser.OwnerUserId

    , CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END AS isAccepted

    , pUser.Score AS upvotes

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND pUser.PostTypeId = 2

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1

    ORDER BY p.Id, pUser.OwnerUserId;

    Listing 6-2

    Expanded data for response posts in a single day

    ```'
  raw: '### The Temporary Table


    So let’s talk a little about temporary tables. If there are going to be some joins
    against a key column, I’ll generally set the temp table up to have that column
    as a primary key/clustered index combination when I define the table. I generally
    prefer not to add nonclustered indexes. If I can avoid that by writing more smaller
    pieces of code, or even procedures that do less work each, that is my preference,
    but sometimes that is not possible. When I come to code where the work can’t be
    divided easily, I usually try rewrites of several permutations to find out which
    solution will work best in each case.


    ### The Table Variable


    Here, the `@usersDay` table variable will have one record for each user that responds
    to a post in a specific day. There are going to be many, many more records in
    this table than 100\. This is an immediate flag that we’ll need to change this
    to a temporary table – if we end up needing it at all. One good thing to know
    is how the rest of your application affects `tempdb`. Is the application a heavy
    user in general of `tempdb`, or is the use there light? If the code in your application
    already pounds on `tempdb`, you may want to be wary of adding more temporary structures
    that will increase the pressure on `tempdb`.


    ## Loops


    As we go through the documentation, we see two loops. The outer loop is handling
    each post during a certain day in a RBAR (row-by-agonizing-row) fashion. The inner
    loop is handling each user that responded to that post in a similar way. This
    is going to be the root of many, many of your problems. SQL Server is designed
    to handle data in batches or groups, not in a linear fashion, as we discussed
    in Chapter [2](#483961_1_En_2_Chapter.xhtml). Also as we discussed in Chapter
    [2](#483961_1_En_2_Chapter.xhtml), people think in a linear fashion. We accomplish
    one task (add a row to a table). We then perform another task (modify a value
    of that record).


    Many front-end developers have a procedural way of thinking enforced because many
    applications work in that way also. Users view small groups of records, but usually
    interact with a single record at a time. Legacy code or code written by folks
    not as familiar with the SQL Server engine usually has a lot of cursors and loops
    in it. The best thing you can do for performance is to make them go far, far (FAR)
    away.


    Because of the loops, it is extremely difficult to get performance data. There
    will be one section of output in STATISTICS IO and TIME for each time each loop
    runs. There will also be a separate execution plan for each query in each loop.
    This makes pinpointing a slow area difficult. With code like this, it’s best to
    completely rewrite the stored procedure.


    ## Functionality Review


    What functions are being performed by this code? We’re incrementing the number
    of posts for a day by 1\. We’re seeing if this user is the accepted answerer of
    a specific post. We’re also incrementing the user count that touched the specific
    post by 1\. We’re grabbing the score for this specific user for this post and
    updating the temp table `#finalOutput` with some of that information. We’re then
    adding a record into the `@usersDay` table if one doesn’t exist, or updating the
    record if it does. And we’re doing all of this for every single post. YUCK!


    ## Start with the Simplest Data


    When I rewrite code, I try to start with gathering the basic building blocks of
    data. This is the data I will need to get the desired output. I will start with
    the simplest data to query and then add onto the layers and complexity until I
    get the results that are needed. For the `dailySummaryReportByMonth` stored procedure,
    what we actually need in terms of data is the following:


    1.  The number of posts in a day


    2.  The number of users that responded to any post that was entered in that day


    3.  The high number of users responding to a single post that was posted on that
    day


    4.  The user with the highest number of responses to a post on that day


    5.  The number of posts that a user responded to


    6.  The number of those answers marked as accepted answers


    7.  The highest number of upvotes for that day


    So we have an initial select for every post created in the desired time frame,
    which is a question (`PostTypeId` = 1). We are going to limit our output for now
    to a small amount (a single day), which will make initial comparisons easier.
    We can use the code in Listing [6-1](#483961_1_En_6_Chapter.xhtml#PC1) to start
    replicating the stored procedure output.


    ```

    SELECT CAST(p.CreationDate AS DATE) AS createDate

    , p.Id

    FROM dbo.Posts p

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1;

    Listing 6-1

    Response posts for a single day

    ```


    The code in Listing [6-1](#483961_1_En_6_Chapter.xhtml#PC1) gives us 5,574 records,
    and we get our results in a relatively short return time. It’s time to start adding
    more data to our response posts. Now we need to grab all the posts that are responses.
    These posts have the `postTypeID` of 2\. We can add the answer count, the owner
    of the post, and whether this is the accepted answer. We can also add the score,
    which translates into upvotes. These additions are shown in the code in Listing
    [6-2](#483961_1_En_6_Chapter.xhtml#PC2), and a subset of results from the query
    is shown in Table [6-1](#483961_1_En_6_Chapter.xhtml#Tab1).


    Table 6-1


    First ten records from the result set for query in Listing [6-2](#483961_1_En_6_Chapter.xhtml#PC2)


    | createDate | Id | Answer Count | Owner UserId | isAccepted | upvotes |

    | --- | --- | --- | --- | --- | --- |

    | 2012-08-01 | 11750763 | 2 | 1530410 | 0 | 5 |

    | 2012-08-01 | 11750765 | 1 | 868718 | 1 | 2 |

    | 2012-08-01 | 11750767 | 1 | 841828 | 1 | 1 |

    | 2012-08-01 | 11750768 | 3 | 8670 | 0 | 0 |

    | 2012-08-01 | 11750768 | 3 | 814048 | 0 | 1 |

    | 2012-08-01 | 11750768 | 3 | 1137672 | 0 | 1 |

    | 2012-08-01 | 11750770 | 3 | 592212 | 0 | 0 |

    | 2012-08-01 | 11750770 | 3 | 862594 | 1 | 3 |

    | 2012-08-01 | 11750770 | 3 | 1567222 | 0 | 0 |

    | 2012-08-01 | 11750780 | 1 | 1487063 | 1 | 1 |


    ```

    SELECT CAST(p.CreationDate AS DATE) AS createDate

    , p.Id

    , p.AnswerCount

    , pUser.OwnerUserId

    , CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END AS isAccepted

    , pUser.Score AS upvotes

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND pUser.PostTypeId = 2

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1

    ORDER BY p.Id, pUser.OwnerUserId;

    Listing 6-2

    Expanded data for response posts in a single day

    ```'
  trans: '

    ### 临时表


    那么，我们来简单谈谈临时表。如果需要针对某个键列进行连接（join）操作，我通常会在定义临时表时，将该列设置为主键/聚集索引组合。我通常倾向于不添加非聚集索引。如果能通过编写更多、更小的代码片段，甚至是每次执行较少工作的存储过程来避免这一点，那是我的首选，但有时这并不可行。当遇到难以轻松拆分工作的代码时，我通常会尝试几种不同的重写排列组合，以找出每种情况下的最佳解决方案。


    ### 表变量


    在这里，`@usersDay` 表变量将为每个在特定日期对帖子做出响应的用户存储一条记录。这个表中的记录数将远远超过 100 条。这立即表明我们需要将其更改为临时表——如果我们最终确实需要它的话。一个需要了解的重要情况是，应用程序的其余部分如何影响
    `tempdb`。该应用程序通常是对 `tempdb` 的重度用户，还是使用较轻？如果你的应用程序代码已经大量占用 `tempdb`，你可能需要警惕增加更多临时结构，这会加大
    `tempdb` 的压力。


    ## 循环


    我们在文档中看到两个循环。外层循环以 RBAR（逐行痛苦处理）方式处理某一天的每个帖子。内层循环以类似方式处理响应了该帖子的每个用户。这将成为你许多问题的根源。正如我们在第
    2 章讨论的，SQL Server 旨在以批处理或分组方式处理数据，而不是以线性方式。同样如我们在第 2 章所讨论的，人们以线性方式思考。我们完成一个任务（向表添加一行）。然后执行另一个任务（修改该记录的一个值）。


    许多前端开发人员被迫采用过程化的思维方式，因为许多应用程序也是以这种方式工作的。用户查看小的数据记录组，但通常一次只与单条记录交互。遗留代码或对 SQL Server
    引擎不太熟悉的人编写的代码通常包含大量游标和循环。你能为性能做的最好的事情就是让它们“远远（**FAR**）离开”。


    由于存在循环，获取性能数据变得极其困难。每次循环运行时，`STATISTICS IO` 和 `STATISTICS TIME` 都会输出一个独立的部分。每个循环中的每个查询也会有一个独立的
    `执行计划`。这使得定位慢点变得困难。对于这样的代码，最好的办法是完全重写这个存储过程。


    ## 功能审查


    这段代码执行了哪些功能？我们将某天的帖子数增加 1。我们查看该用户是否是某个特定帖子的被接受答案者。我们还将触达该特定帖子的用户计数增加 1。我们获取该特定用户针对此帖子的分数，并使用其中部分信息更新临时表
    `#finalOutput`。然后，如果 `@usersDay` 表中不存在对应记录，我们就添加一条；如果存在，则更新该记录。而且我们为每一个帖子都在做所有这些事情。**真糟糕！**


    ## 从最简单的数据开始


    当我重写代码时，我尝试从收集数据的基本构建块开始。这是我将需要用来获得所需输出的数据。我将从最简单的查询数据开始，然后逐层增加复杂性，直到获得所需的结果。对于
    `dailySummaryReportByMonth` 存储过程，我们实际需要的数据如下：


    1.  某天的帖子数量

    2.  响应了该天发布的任何帖子的用户数量

    3.  对该天发布的单个帖子响应的最高用户数

    4.  该天对帖子响应次数最多的用户

    5.  一个用户响应的帖子数量

    6.  其中被标记为接受答案的数量

    7.  该天的最高赞成票数


    因此，我们首先为在期望时间范围内创建的每个帖子（问题是 `PostTypeId = 1`）进行初始选择。我们现在将输出限制为少量（单日），这将使初始比较更容易。我们可以使用清单
    6-1 中的代码开始复制存储过程的输出。


    ```

    SELECT CAST(p.CreationDate AS DATE) AS createDate

    , p.Id

    FROM dbo.Posts p

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1;

    清单 6-1

    单日的响应帖子

    ```


    清单 6-1 中的代码给出了 5,574 条记录，并且我们在相对较短的返回时间内得到了结果。是时候开始为我们的响应帖子添加更多数据了。现在我们需要抓取所有的响应帖子。这些帖子的
    `postTypeID` 为 2。我们可以添加 `Answer Count`（回答数）、帖子所有者以及这是否是接受的答案。我们还可以添加分数，这对应着赞成票。这些添加项显示在清单
    6-2 的代码中，查询结果的部分数据展示在表 6-1 中。


    表 6-1

    清单 6-2 查询结果的前十条记录


    | createDate | Id | Answer Count | Owner UserId | isAccepted | upvotes |

    | --- | --- | --- | --- | --- | --- |

    | 2012-08-01 | 11750763 | 2 | 1530410 | 0 | 5 |

    | 2012-08-01 | 11750765 | 1 | 868718 | 1 | 2 |

    | 2012-08-01 | 11750767 | 1 | 841828 | 1 | 1 |

    | 2012-08-01 | 11750768 | 3 | 8670 | 0 | 0 |

    | 2012-08-01 | 11750768 | 3 | 814048 | 0 | 1 |

    | 2012-08-01 | 11750768 | 3 | 1137672 | 0 | 1 |

    | 2012-08-01 | 11750770 | 3 | 592212 | 0 | 0 |

    | 2012-08-01 | 11750770 | 3 | 862594 | 1 | 3 |

    | 2012-08-01 | 11750770 | 3 | 1567222 | 0 | 0 |

    | 2012-08-01 | 11750780 | 1 | 1487063 | 1 | 1 |


    ```

    SELECT CAST(p.CreationDate AS DATE) AS createDate

    , p.Id

    , p.AnswerCount

    , pUser.OwnerUserId

    , CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END AS isAccepted

    , pUser.Score AS upvotes

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND pUser.PostTypeId = 2

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1

    ORDER BY p.Id, pUser.OwnerUserId;

    清单 6-2

    单日响应帖子的扩展数据

    ```

