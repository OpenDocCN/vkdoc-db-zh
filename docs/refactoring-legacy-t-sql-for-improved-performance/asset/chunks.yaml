    ```

    DECLARE @theTable TABLE (id int);

    INSERT INTO @theTable (id)

    VALUES (1010297)

    , (1639596)

    , (22)

    , (123);

    SELECT tb.id

    , u.Reputation

    , u.DownVotes

    , u.UpVotes

    FROM @theTable tb

    INNER JOIN dbo.Users u ON tb.id = u.Id;

    UPDATE u

    SET UpVotes = u.UpVotes + 1

    , DownVotes = u.DownVotes

    FROM dbo.Users u

    INNER JOIN @theTable tb ON u.Id = tb.id;

    SELECT tb.id

    , u.Reputation

    , u.DownVotes

    , u.UpVotes

    FROM @theTable tb

    INNER JOIN dbo.Users u ON tb.id = u.Id;

    Listing 5-13

    Increasing the upvotes of four users

    ```


    The results from the before query in Listing [5-13](#483961_1_En_5_Chapter.xhtml#PC13)
    are shown in Table [5-11](#483961_1_En_5_Chapter.xhtml#Tab11). We see two users
    whose `DownVotes` are divisible by 5 and two users whose `DownVotes` are not equally
    divisible by 5. This shouldn’t matter, though, because we’re not changing the
    `DownVotes` anyway, correct? The after results are shown in Table [5-12](#483961_1_En_5_Chapter.xhtml#Tab12).


    Table 5-12

    The after results for code in Listing [5-13](#483961_1_En_5_Chapter.xhtml#PC13)


    | id | Reputation | DownVotes | UpVotes |

    | --- | --- | --- | --- |

    | 1010297 | 25 | 14 | 162 |

    | 1639596 | 1 | 3 | 12 |

    | 22 | 12815 | 5 | 203 |

    | 123 | 29211 | 40 | 420 |


    Table 5-11

    The before results for code in Listing [5-13](#483961_1_En_5_Chapter.xhtml#PC13)


    | Id | Reputation | DownVotes | UpVotes |

    | --- | --- | --- | --- |

    | 1010297 | 25 | 14 | 161 |

    | 1639596 | 1 | 3 | 11 |

    | 22 | 12816 | 5 | 202 |

    | 123 | 29212 | 40 | 419 |


    Table [5-12](#483961_1_En_5_Chapter.xhtml#Tab12) shows us yet another problem!
    The last two records have had their `Reputation` reduced, but we didn’t change
    the `DownVotes`. Were we checking to see if the `DownVotes` were changed? Well,
    no, we weren’t. We were just checking to see if they were divisible by 5 and greater
    than zero. There’s an `UPDATE` function for triggers that we can use to determine
    that, though, right? First, let’s use the code in Listing [5-14](#483961_1_En_5_Chapter.xhtml#PC14)
    to restore user data.


    ```

    DECLARE @theTable TABLE (id int, upvotes int, Reputation int);

    INSERT INTO @theTable (id, upvotes, Reputation)

    VALUES (1010297, 161, 25)

    , (1639596,11,1)

    , (22,203,12815)

    , (123,420,29211);

    UPDATE u

    SET u.Reputation = t.Reputation

    , u.UpVotes = t.upvotes

    FROM dbo.Users u

    INNER JOIN @theTable t ON u.Id = t.id;

    Listing 5-14

    Restore user data for four users

    ```


    We then want to add the `UPDATE()` function to check if the `DownVotes` were updated.
    That should solve the problem of a user’s `Reputation` being decreased if the
    `DownVotes` were not updated, but just happen to be divisible by 5. We can see
    the syntax for the `UPDATE` function in Listing [5-15](#483961_1_En_5_Chapter.xhtml#PC15).


    ```

    IF EXISTS (SELECT 1 FROM INSERTED i WHERE i.DownVotes > 0

    AND i.DownVotes % 5 = 0

    AND i.Reputation > 0

    AND UPDATE(DownVotes))

    BEGIN

    UPDATE u

    SET u.Reputation = u.Reputation - 1

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0

    AND i.DownVotes > 0

    AND i.DownVotes % 5 = 0

    AND UPDATE(DownVotes);

    Listing 5-15

    UPDATE function check to add to our trigger in Listing 5-1

    ```


    Once we’ve put this code in the trigger from Listing [5-1](#483961_1_En_5_Chapter.xhtml#PC1),
    we can rerun the code from Listing [5-13](#483961_1_En_5_Chapter.xhtml#PC13).
    When we look at the results, we just got exactly the same thing, both for the
    before and the after `SELECT` statements! The after result set is the same as
    we see in Table [5-12](#483961_1_En_5_Chapter.xhtml#Tab12), showing the last two
    users with a reduced `Reputation` again even though we added the `UPDATE()` statement.
    What is going on here?


    Well, in our `UPDATE` statement, we technically updated the value although we
    didn’t CHANGE the value. This is a huge “gotcha” that people miss all the time.
    If it actually matters whether the value changes or not (and I’d guess if you’re
    putting it in a trigger, then it does), we need to test to see the value changes.
    We can accomplish this by checking if the `INSERTED` and `DELETED` values are
    different. But this is also an `INSERT` trigger as well as an `UPDATE` trigger,
    so there may not be a `DELETED` value for every record – that value may be `NULL`.
    How can we do this? We can actually do this quite elegantly, thanks to Itzik Ben-Gan
    who taught me the technique shown in Listing [5-16](#483961_1_En_5_Chapter.xhtml#PC16),
    which avoids a lot of `CASE` statements which are normally found in null handling,
    while still handling `NULL` being different than a stated value.


    ```

    IF EXISTS (SELECT 1 FROM INSERTED i WHERE i.DownVotes > 0

    AND i.DownVotes % 5 = 0

    AND i.Reputation > 0

    AND EXISTS (SELECT i.DownVotes EXCEPT SELECT d.DownVotes FROM DELETED d WHERE
    i.Id = d.Id) )

    BEGIN

    UPDATE u

    SET u.Reputation = u.Reputation - 1

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0

    AND i.DownVotes > 0

    AND i.DownVotes % 5 = 0

    AND EXISTS (SELECT i.DownVotes EXCEPT SELECT d.DownVotes FROM DELETED d WHERE
    i.Id = d.Id) ;

    Listing 5-16

    Testing to see if the INSERTED and DELETED values are different

    ```


    The code in Listing [5-16](#483961_1_En_5_Chapter.xhtml#PC16), when used in the
    trigger in Listing [5-1](#483961_1_En_5_Chapter.xhtml#PC1), will find all records
    that don’t have a match in the `DownVotes` field between the `INSERTED` table
    and the `DELETED` table. It will not evaluate a `NULL`, but it handles the `NULL`
    in such a way that the `NULL` isn’t considered part of the set that matches, so
    we get records for the inserted statements as well as the non-matching updated
    statements. We’re not going to test this here, but if we inserted a user record
    with a multiple of 5 in `DownVotes`, this would reduce the `Reputation` by one
    on the `INSERT`. Let’s set these folks’ Reputation points back with the code in
    Listing [5-14](#483961_1_En_5_Chapter.xhtml#PC14) and then rerun the test from
    Listing [5-13](#483961_1_En_5_Chapter.xhtml#PC13).


    The before results were the same as we saw in Table [5-11](#483961_1_En_5_Chapter.xhtml#Tab11),
    but our after results look much better, with no modification to the `Reputation`,
    as shown in Table [5-13](#483961_1_En_5_Chapter.xhtml#Tab13).


    Table 5-13

    After results from modifying four users with the INSERTED/DELETED difference check


    | Id | Reputation | DownVotes | upvotes |

    | --- | --- | --- | --- |

    | 1010297 | 25 | 14 | 204 |

    | 1639596 | 1 | 3 | 421 |

    | 22 | 12816 | 5 | 163 |

    | 123 | 29212 | 40 | 13 |


    Our final revised trigger is shown here in Listing [5-17](#483961_1_En_5_Chapter.xhtml#PC17),
    with all of the changes we’ve made throughout this chapter.'
