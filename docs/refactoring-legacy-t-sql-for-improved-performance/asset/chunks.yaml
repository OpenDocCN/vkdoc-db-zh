    results we wanted. The `DownVotes` increased to 5, and the `Reputation` decreased
    to 0. However, what we just tested isn’t the only possible scenario. We just happen
    to have a working restore of production (in this case, our sample database), so
    we still have user 1010297’s initial data. This will allow us to see exactly what
    is happening with this user! They have 14 `DownVotes`, so maybe someone added
    one, but that would have removed only 1 `Reputation` point, right? We will use
    the code in Listing [5-3](#483961_1_En_5_Chapter.xhtml#PC3) to test the scenario
    described by user 1010297.


    ```sql

    DECLARE @userID int = 1010297;

    SELECT Id, Reputation, DownVotes

    FROM dbo.Users

    WHERE Id = @userID;

    UPDATE dbo.Users

    SET DownVotes = DownVotes + 1

    WHERE Id = @userID;

    SELECT Id, Reputation, DownVotes

    FROM dbo.Users

    WHERE Id = @userID;

    ```


    Listing 5-3 Adding a DownVote to user 1010297


    We can see the “before” results in Table [5-3](#483961_1_En_5_Chapter.xhtml#Tab3).
    The user had 14 `DownVotes` and a `Reputation` of 25. We can understand why they
    wouldn’t want to lose all of those `Reputation` points! We can also see the “after”
    results in Table [5-4](#483961_1_En_5_Chapter.xhtml#Tab4).


    Table 5-4


    User 1010297’s Reputation and DownVotes score after adding a DownVote


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 0 | 15 |


    Table 5-3


    User 1010297’s Reputation and DownVotes score before an update


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 25 | 14 |


    ## Trigger Recursion


    As we can see in Table [5-4](#483961_1_En_5_Chapter.xhtml#Tab4), the user doesn’t
    have any `Reputation` points left! Wait, where did all those `Reputation` points
    go? Well, let’s look at the actual trigger logic again, shown in Listing [5-4](#483961_1_En_5_Chapter.xhtml#PC4).


    ```sql

    IF EXISTS (SELECT 1 FROM INSERTED i WHERE i.DownVotes > 0

    AND i.DownVotes % 5 = 0

    AND i.Reputation > 0)

    BEGIN

    UPDATE u

    SET u.Reputation = u.Reputation - 1

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0;

    END;

    ```


    Listing 5-4 Trigger logic for iu_Users_DownVotes


    What is the code in Listing [5-4](#483961_1_En_5_Chapter.xhtml#PC4) actually doing?
    It’s updating the `Users` table. What fires this trigger? An `UPDATE` on the `Users`
    table. Hmmm… We are looking in the `EXISTS` statements for any record in `INSERTED`
    where `DownVotes` are greater than 0 and divisible by 5 and the `Reputation` is
    greater than 0. Then, we’re reducing the `Reputation` by 1 for any record that
    meets the preceding criteria and is also found in `INSERTED`.


    There are two problems here. One is that we’re running an `UPDATE` that can fire
    the trigger itself again. The second problem is in the logic itself. In the preceding
    case, we’re updating the table from 14 `DownVotes` to 15 `DownVotes` before we
    call the trigger. The trigger itself doesn’t change the `DownVotes` value, so
    for the circumstance shown in Listing [5-3](#483961_1_En_5_Chapter.xhtml#PC3),
    the `DownVotes` value continues being divisible by 5, since that value will not
    change from 15.


    This means that the `Reputation` will keep reducing by 1 for every run. We can
    also see that there were multiple runs of the trigger caused by the code in Listing
    [5-3](#483961_1_En_5_Chapter.xhtml#PC3) by querying the `Triggerlog` table (which
    is a table I set up specifically for this book). The `Triggerlog` table illustrates
    a point here but can be useful to add to any database that uses triggers regularly.
    The code to query the `Triggerlog` table is shown in Listing [5-5](#483961_1_En_5_Chapter.xhtml#PC5).


    ```sql

    SELECT id, thisdate, thisaction, descript

    FROM Triggerlog;

    ```


    Listing 5-5 Querying the Triggerlog table


    If we look at the results for the code in Listing [5-5](#483961_1_En_5_Chapter.xhtml#PC5),
    we can see the multiple firings for the user ID of 1010297. These results are
    shown in Table [5-5](#483961_1_En_5_Chapter.xhtml#Tab5). The trigger code will
    actually fail after 32 recursions and throw an error message, if you try this
    update on a user with more than 32 `Reputation` points.


    Table 5-5 Results from querying the Triggerlog table'
