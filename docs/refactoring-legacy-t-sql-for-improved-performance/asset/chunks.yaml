    消除额外的工作确实在持续时间和总逻辑读取量上产生了巨大的差异！在这一点上，如果总是只返回单条记录，我会重写清单 [7-12](#483961_1_En_7_Chapter.xhtml#PC14)
    中的查询，将功能从函数中移除并内联到查询中吗？可能不会。此外，如果通过 `andTheKitchenSink` 函数找到的每一片数据都调用的是同一个数据库表，我可能会重写查询。但这里的大部分数据来自不同的表。


    ### 使用 `OUTER APPLY` 来联接聚合数据


    此外，如果输出中有多行数据，我会将查找额外数据的代码移至 `JOIN` 或 `OUTER APPLY` 中。那会是什么样子？我们可以查看清单 [7-15](#483961_1_En_7_Chapter.xhtml#PC17)
    中的代码，了解一种使用 `OUTER APPLY` 的方法。对于来自同一张表的数据片段，我们可以在同一个 `OUTER APPLY` 中合并这些指标。


    ```sql

    SELECT p.Id AS postID

    , p.Score

    , com.numComments

    , resp.numResponses

    , resp.numResponders

    , vote.numVotes

    , p.ViewCount

    FROM dbo.Posts p

    OUTER APPLY (SELECT COUNT(1) AS numComments

    FROM dbo.Comments c

    WHERE c.PostId = p.Id) com

    OUTER APPLY (SELECT COUNT(DISTINCT OwnerUserID) AS numResponders

    , COUNT(Id) AS numResponses

    FROM dbo.Posts resp

    WHERE resp.PostTypeId = 2

    AND p.Id = resp.ParentId) resp

    OUTER APPLY (SELECT COUNT(1) AS numVotes

    FROM dbo.Votes v

    WHERE v.PostId = p.Id) vote

    WHERE p.Id = 649789;

    ```

