    \ read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
    \ reads 0.\nTable 'Badges'. Scan count 1, logical reads 49649, physical reads\
    \ 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
    \ reads 0.\nTable 'Votes'. Scan count 1, logical reads 243698, physical reads\
    \ 0, read-ahead reads 177026, lob logical reads 0, lob physical reads 0, lob read-ahead\
