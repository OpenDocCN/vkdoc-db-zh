    \ identify some common anti-patterns with each. We discussed many anti-patterns\
    \ that apply to code such as stored procedures, functions, views, or even ad hoc\
    \ SQL statements. However, each object type can have it’s own pitfalls.\n\nIn\
    \ this chapter, we’re going to take a closer look at tables. If every piece of\
    \ code touching a certain table is slow, the table definition should be examined.\
    \ What exactly are we looking for in that definition? The information in Chapter\
    \ [2](#483961_1_En_2_Chapter.xhtml) didn’t really cover tables, except to mention\
    \ computed columns. Well, let’s start there!\n\n## Computed Columns\n\nCalculations\
    \ can have some unintended effects if they haven’t been coded carefully. Make\
    \ sure that there aren’t any computed columns in your table that include user-defined\
    \ scalar functions. Such columns can cause queries not to run in parallel even\
    \ if the columns aren’t included in the query output. Sometimes clever (too clever?)\
    \ DBAs add columns to tables that divide by zero to catch out naughty developers\
    \ who use `SELECT *` in their queries. If anyone tries to run a `SELECT *` query\
    \ against a table with a column definition that includes a calculation dividing\
    \ a number by zero, the query will fail with an error message. This is a sneaky\
    \ way to ensure better habits, but it’s really more appropriate to educate the\
    \ folks writing code than to put land mines in the database.\n\n## Denormalized\
    \ Data\n\nIf you aren’t familiar with normalization, you should probably spend\
    \ a little time reading about it. To touch on the surface, normalization is a\
    \ practice based on set of rules about how the data in a relational database should\
    \ and shouldn’t be … well, related. Most people recommend following up to third\
    \ normal form (3NF). There are more levels of normalization beyond 3NF, but 3NF\
    \ is the current standard acceptable level that most people recommend adhering\
    \ to.\n\nFirst normal form (1NF) states that there should only be one value in\
    \ any given cell. One way in which this is violated frequently is the inclusion\
    \ of a comma-separated list of values in a single cell. This also states that\
    \ repeating groups of columns is not okay – for example, having a column for comment1,\
    \ a column for comment2, and so on. Additionally, in terms of the rules for 1NF,\
    \ any data value should only be stored in one place. Lastly, all rows in a table\
    \ should be unique and have a primary key.\n\nA primary key is a unique identifier\
    \ for a record. It does NOT have to be a GUID datatype; instead, the value for\
    \ each record has to be distinct. This can be a single column or a group of columns\
    \ whose collective values will be a unique key. Multicolumn primary keys can be\
    \ concerning, but we will discuss that later in this chapter.\n\nSecond normal\
    \ form (2NF) can be a little more difficult to understand. Every non-key value\
    \ in a record needs to depend fully on the key value. A slightly less formal way\
    \ of saying this is to make sure all the data in your table directly relates to\
    \ the key. For example, you want the ID of the user who made a post to be in the\
    \ `Posts` table, but you don’t need to store information specifically about the\
    \ user in the `Posts` table; you want to store information just about the post.\
    \ Instead, we should have a separate table with the user information (like nickname)\
    \ and a user ID (in our database`, OwnerUserID`) in the `Posts` table which relates\
    \ back to the `id` in the `Users` table. The `OwnerUserID` would be considered\
    \ a foreign key, which points back to the primary key (or Id field) of the `Users`\
    \ table. Correctly set-up foreign key constraints can increase performance of\
    \ a database as well.\n\n3NF is similar in that you need to move any fields in\
    \ a table that don’t depend directly on the key from that table. Say the user’s\
    \ favorite color was a column in the `Posts` table. The favorite color column\
    \ should be moved to the `Users` table instead of leaving it in the `Posts` table.\
    \ The color is not directly related to the post `ID`; it IS directly related to\
    \ the user. Thus, it should be in a table that has a key related to the user.\n\
    \nWe’re going to make up a story about the `dbo.WidePosts` table. Let’s say that\
    \ it was the original table for the StackOverflow database, and it still may be\
    \ used for legacy reporting. As the application grew, tables were added or changed.\
    \ So what happened to this table?\n\nIf you go look at the definition (or the\
    \ list of columns) for the `WidePosts` table, you’ll see… well, for one, it’s\
    \ wide (it has lots of columns). And secondly, what is `commentid1`, and `commentid2,`\
    \ and all these comment columns with numbers in the name? It looks like denormalization\
    \ of comment information, and that’s exactly what it is. One of the problems with\
    \ this is that you can’t have more than five comments per post, which is somewhat\
    \ limiting. Also, it’s hard to break out the different comments. This table definition\
    \ fails the definitions of both first and second normal forms.\n\nWe also have\
    \ information about the user in this `WidePosts` table, which causes the table\
    \ to fail the definition of third normal form. I specifically created this table\
    \ for demonstration purposes; it’s not one of the standard tables in the StackOverflow\
    \ database."
  trans: "\n#### 临时表和/或表变量\n\n*   `#finalOutput`临时表，可能的最大行数较少（约 31 行）\n    *   插入：一次一行\n\
    \    *   更新：一次一行（最后一次更新除外）\n\n*   `@usersDay`表变量，可能的行数稍多（几千行）\n    *   插入：一次一行\n\
    \    *   更新：一次一行\n\n#### 循环/游标\n\n*   `While`循环遍历某个月的所有问题帖子（大约 50k 到 150k）\n*\
    \   `While`循环处理每个用户对帖子的回复（大约两个用户）\n\n#### 公用表表达式 (CTEs)\n\n未使用。\n\n#### 连接类型\n\
    \n使用了标准的连接类型，连接语法正确。\n\n#### LIKE, NOT LIKE 和 NOT IN\n\n未使用。\n\n#### 排序操作\n\n\
    *   在时间范围内获取`Posts`表的`MIN(Id)`\n*   根据`ParentId`获取`Posts`表的`MIN(OwnerUserId)`\n\
    \n#### 对其他用户定义 SQL 对象的调用\n\n对`dbo.Posts`表的`Select`语句。\n\n#### WHERE 子句中的原生 SQL\
    \ 函数\n\n两条设置`@postID`的语句都使用了`DATEADD/DATEDIFF`函数。\n\n#### 索引\n\n目前无法确定。\n\n###\
    \ 第二部分：数据库结构\n\n### 3. 数据库表\n\n在接下来的章节中，我们将研究一些不同的数据库对象，并找出每个对象常见的一些反模式。我们已经讨论了许多适用于代码的反模式，例如存储过程、函数、视图，甚至即兴的\
    \ SQL 语句。然而，每种对象类型都有其独特的陷阱。\n\n在本章中，我们将更仔细地研究表。如果访问某个表的每段代码都很慢，那么就应该检查表的定义。我们具体要在该定义中寻找什么？第\
    \ 2 章的信息并没有真正涵盖表，除了提到计算列。好吧，让我们从那里开始！\n\n#### 计算列\n\n如果编码不够谨慎，计算可能会产生一些意外影响。确保你的表中没有任何计算列包含用户定义的标量函数。即使这些列没有出现在查询输出中，它们也可能导致查询无法并行运行。有时，聪明的（过于聪明的？）数据库管理员会在表中添加除数为零的列，以揪出那些在查询中使用`SELECT\
    \ *`的“捣蛋”开发者。如果有人尝试对包含除数为零计算的列定义的表运行`SELECT *`查询，查询将失败并显示错误消息。这是一种确保良好习惯的“狡猾”方式，但教育编写代码的人比在数据库中埋设“地雷”更合适。\n\
    \n#### 反规范化数据\n\n如果你不熟悉规范化，你可能应该花点时间阅读相关内容。简单来说，规范化是一套关于关系数据库中的数据应该如何以及不应该如何……“关联”的规则实践。大多数人建议遵循到第三范式（3NF）。除了\
    \ 3NF 之外还有更多的规范化级别，但 3NF 是当前大多数人建议遵守的标准可接受级别。\n\n第一范式（1NF）规定，在任何给定的单元格中应该只有一个值。一种经常违反此规则的方式是在单个单元格中包含逗号分隔的值列表。1NF\
    \ 还指出，不允许有重复的列组——例如，拥有`comment1`、`comment2`等列。此外，根据 1NF 的规则，任何数据值应该只存储在一个地方。最后，表中的所有行都应该是唯一的，并且具有主键。\n\
    \n主键是记录的唯一标识符。它不必是 GUID 数据类型；相反，每条记录的值必须是唯一的。这可以是单列，也可以是其集合值构成唯一键的多列组合。多列主键可能会引起关注，但我们将在本章后面讨论这一点。\n\
    \n第二范式（2NF）可能稍微难理解一些。记录中的每个非键值都需要完全依赖于键值。一个稍微不那么正式的说法是，确保表中的所有数据都直接与键相关。例如，你希望发帖用户的\
    \ ID 在`Posts`表中，但你不需要在`Posts`表中存储专门关于用户的信息；你只想存储关于帖子的信息。相反，我们应该有一个单独的表来存储用户信息（如昵称），并在`Posts`表中有一个用户\
    \ ID（在我们的数据库中是`OwnerUserID`），该 ID 指回`Users`表中的`id`。`OwnerUserID`将被视为外键，它指向`Users`表的主键（或\
    \ Id 字段）。正确设置的外键约束也能提高数据库性能。\n\n3NF 类似，你需要将表中任何不直接依赖于键的字段移出该表。假设用户的最喜欢的颜色是`Posts`表中的一个列。最喜欢的颜色列应该移到`Users`表中，而不是留在`Posts`表中。颜色与帖子`ID`没有直接关系；它直接与用户相关。因此，它应该在一个具有与用户相关键的表中。\n\
    \n我们来编一个关于`dbo.WidePosts`表的故事。假设它是 StackOverflow 数据库的原始表，并且可能仍用于遗留报告。随着应用程序的增长，表被添加或更改。那么这个表发生了什么变化？\n\
    \n如果你去查看`WidePosts`表的定义（或列列表），你会看到……嗯，首先，它很宽（有很多列）。其次，`commentid1`、`commentid2`以及所有这些带数字的评论列是什么？看起来是评论信息的反规范化，而这正是它的本质。这样做的一个问题是你不能为每个帖子拥有超过五条评论，这有些限制。此外，很难区分不同的评论。这个表定义未能满足第一和第二范式的定义。\n\
    \n我们在这个`WidePosts`表中还有关于用户的信息，这导致该表未能满足第三范式的定义。我特意创建了这个表用于演示；它不是 StackOverflow\
    \ 数据库中的标准表之一。\n"
- fmt: '## Datatypes and Field Size


    Most of the columns in the `WidePosts` table are an integer datatype and as such
    have relatively low storage needs. However, there are a few date fields and several
    large `nvarchar` fields: five `nvarchar(700)` fields, one `nvarchar(max)` field,
    an `nvarchar(2000)` field, and a couple of smaller `nvarchar` fields. The combination
    of several columns with some large `varchar` or `nvarchar` columns can represent
    a pretty sizable amount of data per row. Remember in the last chapter we touched
    on memory grants in queries? Large memory grant requirements can be affected by
    database table column datatype and width choices and can bloat the amount of resources
    SQL Server thinks it needs to run your queries.


    How many of these column sizes accurately reflect the data contained in the columns?
    Let’s look more closely at the data values in the `WidePosts` table. The query
    in `Listing 3-1` will find the maximum length of the values in each of several
    columns.


    **Table 3-1**


    Results from the query in `Listing 3-1`


    | Field | AbtMe | body | CT1 | CT2 | CT3 | CT4 | CT5 | Title | Tags | WebURL |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Max actual value length | 2000 | 34357 | 600 | 600 | 600 | 600 | 600 | 150 |
    107 | 188 |

    | Column definition length | 2000 | MAX | 700 | 700 | 700 | 700 | 700 | 250 |
    150 | 200 |


    ```sql

    SELECT MAX(LEN(AboutMe)) AS AbtMe

    , MAX(LEN(Body)) AS body

    , MAX(LEN(CommentText1)) AS CT1

    , MAX(LEN(CommentText2)) AS CT2

    , MAX(LEN(CommentText3)) AS CT3

    , MAX(LEN(CommentText4)) AS CT4

    , MAX(LEN(CommentText5)) AS CT5

    , MAX(LEN(Title)) AS Title

    , MAX(LEN(Tags)) AS Tags

    , MAX(LEN(WebsiteURL)) AS WebURL

    FROM dbo.WidePosts;

    ```


    `Listing 3-1`

    Query to find max data value length in several columns of the `WidePosts` table


    The first row in `Table 3-1` shows the maximum length of the data values in the
    column specified. The second row shows the defined maximum length for each column.
    It looks like this table’s columns were appropriately sized for the data that
    was going to be stored in the columns.


    ## Deprecated Datatypes


    Older tables can have datatypes that aren’t really valid anymore. For example,
    as of the writing of this book, the datatypes `text`, `ntext`, and `image` are
    deprecated. Microsoft’s recommendation is to use `varchar(max)`, `nvarchar(max)`,
    and `varbinary(max)` datatypes instead.


    ## How Much Data?


    We should understand how much data any table we’re examining actually contains.
    The number of records, as well as the size of actual data in the table, can make
    a very big difference in how we approach rewriting the table, or if we even need
    to bother. We can use a native SQL Server stored procedure to get this information.
    The call to the `sp_spaceused` stored procedure to review the amount of data in
    the `WidePosts` table is shown in `Listing 3-2`.


    **Table 3-2**


    Results from the `sp_spaceused` stored procedure in `Listing 3-2`


    | name | rows | reserved | data | index_size | unused |

    | --- | --- | --- | --- | --- | --- |

    | dbo.WidePosts | 1090572 | 3336672 KB | 3292984 KB | 42032 KB | 1656 KB |

    | In GB | 1.09 | 3.34 | 3.29 | 0.04 | 0.001 |


    ```sql

    EXEC sp_spaceused N''dbo.WidePosts'';

    GO

    ```


    `Listing 3-2`

    Example call to `sp_spaceused` to find the amount of data in the `WidePosts` table


    `Table 3-2` shows the number of rows, as well as some data sizes, for the `WidePosts`
    table. A million rows isn’t considered “big” in the wild, but that number of records
    might be a challenge for your specific server setup or database. You should have
    an idea of the relative sizes of your tables and the data within them. The understanding
    of the data and index sizes will help you when you’re looking at code, making
    it easier to understand why some queries may be performing poorly.


    ## Data Skew/Cardinality


    Cardinality involves how much unique data is in each row. Knowing the distribution
    of values in a column will help you find suboptimal query code and determine quickly
    which indexes might be helpful. `Listing 3-3` will help us look at the cardinality
    of a few columns from the `WidePosts` table.


    **Table 3-3**


    Results of the query in `Listing 3-3`


    | numParentIDs | numViews | numPostIDs | numAnswerCounts |

    | --- | --- | --- | --- |

    | 279298 | 3756 | 1090572 | 108 |


    ```sql

    SELECT COUNT(DISTINCT ParentId) as numParentIDs

    , COUNT(DISTINCT [Views]) AS numViews

    , COUNT(DISTINCT PostID) AS numPostIDs

    , COUNT(DISTINCT AnswerCount) AS numAnswerCounts

    FROM dbo.WidePosts;

    ```


    `Listing 3-3`

    Query to find cardinality of some columns in the `WidePosts` table


    `Table 3-3` shows us that the cardinality in `AnswerCounts` is pretty low – there
    are not a lot of unique values. There are a lot of unique `PostIDs` though. You
    don’t have to run this exercise for all columns on a table, but I’d keep an eye
    on the ones that are used most frequently in the application to have a good idea
    of the cardinality of that data.


    ## Constraints


    Many tables have constraints, and there are many different types of constraints.
    Hopefully all of your tables have a primary key and a clustered index. If they
    do not, please add them! If you run the command in `Listing 3-4`, you can see
    the constraints against a table, as well as all sorts of other information about
    a table.


    **Table 3-4**


    Last result set from the stored procedure call in `Listing 3-4` (some columns
    omitted)


    | constraint_type | constraint_name | Status_enabled | Status_for_replication
    | Constraint_keys |

    | --- | --- | --- | --- | --- |

    | FOREIGN KEY | Fk_WidePosts_PostID | Enabled | Is_For_Replication | PostID REFERENCES
    StackOverflowForBook.dbo.Posts (Id) |

    | PRIMARY KEY (clustered) | PK_WidePosts_WideId | (n/a) | (n/a) | WideId |


    ```sql

    sp_help wideposts

    ```


    `Listing 3-4`

    Example call to `sp_help` for information on the table `WidePosts`


    As we see in `Table 3-4`, the last result set returned from the `sp_help` command
    lists any table constraints that have been defined. Here we see the primary key
    and foreign key constraints on the `WidePosts` table.'
