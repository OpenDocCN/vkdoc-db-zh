    We just looked for calls to user-defined SQL objects, including functions. However,
    we also need to look at the use of native SQL Server functions in WHERE clauses.
    This use needs to be noted because if the function is working on a table field
    (even ISNULL), it can cause the query in which it used to be unable to use an
    index. This is a lot like what we discussed with implicit conversion: if we’re
    going to check to see if two values are equal, we’re going to have to evaluate
    the value of every record to determine if the output of the function matches the
    value against which we’re comparing.


    Native SQL Server functions in the WHERE clause are found in two places in the
