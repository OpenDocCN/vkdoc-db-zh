    ## 限制数据库必须完成的工作


    您可能会问，为什么触发器中要有 `IF EXISTS` 语句，因为我们只是针对真正需要更新的记录运行更新。即使没有更新任何行，UPDATE 语句仍然可能触发。我们的原则是**最小化数据库的工作量**，因此这类检查非常重要。


    让我们看看 `LinkTypes` 表。它上面有两个几乎不执行任何操作的触发器，这些触发器的名称清楚地说明了它们的功能（或没有功能）。在代码清单 5-18
    所示的触发器中，`INSERT` 触发器包含一个 `UPDATE` 语句，该语句仅在记录满足 `WHERE 1 = 0` 条件时运行。


