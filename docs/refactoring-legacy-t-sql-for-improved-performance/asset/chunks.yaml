    ORDER BY num.n;\n-- Listing 6-14\n-- Final version, replacement code for DailySummaryReportPerMonth\n\
    ```\n\nThis rewrite ended up being simple. We fixed a couple of other problems\
    \ besides just removing the loops, but the performance gain can be almost entirely\
    \ attributed to the loop removal. Also, if you noticed, we added an `@enddate`\
    \ parameter so we could do the correct calculation for the number of days to limit\
    \ the `Numbers` table and get our correct number of days for any given month.\n\
    \n## What Else Should We Watch For?\n\nLet’s take a look at a slightly different\
    \ example. We have a stored procedure that lets us find information about a user\
    \ by their user name, or a part of the user name. Say we want to get information\
    \ about any users with a display name containing the text “Joel”. Let’s run through\
    \ our documentation exercise against the `getUserInfoByName` stored procedure\
    \ and see what we come up with!\n\n## GetUserInfoByName: Documentation\n\n###\
    \ Code as of 2019.07.07\n\n```sql\nIF NOT EXISTS\n(\nSELECT 1\nFROM sys.procedures\n\
    WHERE name = 'getUserInfoByName'\n)\nBEGIN\nDECLARE @SQL NVARCHAR(1200);\nSET\
    \ @SQL = N'/***************************************************************************\n\
