    reads 625, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Posts''. Scan count 2644, logical reads 142015, physical reads 0, read-ahead
    reads 228392, lob logical reads 0, lob physical reads 0, lob read-ahead reads
    0.

    Table ''Users''. Scan count 1, logical reads 44532, physical reads 0, read-ahead
    reads 30113, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Votes''. Scan count 1, logical reads 243698, physical reads 4, read-ahead
    reads 243476, lob logical reads 0, lob physical reads 0, lob read-ahead reads
    0.

    SQL Server Execution Times:

    CPU time = 34746844 ms,  elapsed time = 34809302 ms.

    ```


    Running this as a query, not as a stored procedure, showed a significantly longer
    runtime of over 9 hours, as we see from the output. However, we did reduce our
    reads by quite a bit. The reduced reads are good, but not at the expense of adding
    8 hours to the runtime. Let’s see if we can make other changes that will bring
    the runtime down.'
