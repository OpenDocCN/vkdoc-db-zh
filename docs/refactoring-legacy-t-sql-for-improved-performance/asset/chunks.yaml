    ## Viewing STATISTICS IO Caused by Functions


    That doesn’t make any sense! Now, one thing I want to caution you here on: STATISTICS
    IO does NOT show the I/O of functions. We briefly mentioned that earlier in the
    book, but it’s worth restating. For that, we’d need to use an extended event.
    We could use a Profiler trace, but that is pretty outdated. Also note please that
    extended event duration time is natively measured in microseconds, not milliseconds.


    If you have run the database setup script for this book, the Event Session should
    already exist in your database. If not, Listing [7-3](#483961_1_En_7_Chapter.xhtml#PC5)
    shows how to create the session we’re going to use.


    ```

    CREATE EVENT SESSION [IO Patterns] ON SERVER

    ADD EVENT sqlserver.sp_statement_completed(

    ACTION(sqlserver.sql_text,sqlserver.tsql_stack)),

    ADD EVENT sqlserver.sql_statement_completed(

    ACTION(sqlserver.sql_text,sqlserver.tsql_stack))

    ADD TARGET package0.event_file(SET filename=N''C:\SSdata\IOPatterns.xel'');

    Listing 7-3

    Create script for an Event Session IO Patterns

    ```


    You’ll need to change the file target to a directory that exists on your server
    or computer, wherever you’re running SQL Server. To start the session, use the
    code in Listing [7-4](#483961_1_En_7_Chapter.xhtml#PC6). Go ahead and start the
    session now.


    ```

    ALTER EVENT SESSION [IO Patterns] ON SERVER

    STATE = START;

    GO

    Listing 7-4

    Start the Event Session

    ```


    Let’s go back and rerun both the query in Listing [7-2](#483961_1_En_7_Chapter.xhtml#PC2)
    with the function line commented out and the same query with the function line
    not commented out. First, we’ll run the query with the function commented out.
    So start the session, run the query, and then stop the session using the code
    in Listing [7-5](#483961_1_En_7_Chapter.xhtml#PC7).


    ```

    ALTER EVENT SESSION [IO Patterns] ON SERVER

    STATE = STOP;

    GO

    Listing 7-5

    Stop the Event Session

    ```


    Extended Event data is saved as XML. In order to view it, we can use SQL Server’s
