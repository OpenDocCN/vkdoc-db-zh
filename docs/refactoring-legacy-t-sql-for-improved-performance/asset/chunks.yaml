    1` |

    | | `EXISTS` | | `OwnerUserId = User Id` |

    | | `SELECT` | `COUNT(Id)` | `OwnerUserId = User Id, PostTypeId = 2` |

    | | `SELECT` | `MAX(CreationDate)` | `OwnerUserId = User Id, PostTypeId = 2` |

    | `dbo.Votes` | `SELECT` | `COUNT(Id)` | `Id = PostId` |

    | function | | `dbo.getLastBadgeUser(Id)` | |


    ### Possible Red Flags


    #### Datatype Matching


    The input variable is a `varchar(20)`, and the field is an `nvarchar(40)`.


    #### Subqueries


    There are three subqueries in the select statement of the only data call. All
    of them reference the `Posts` table.


    #### Calculations


    N/A


    #### Temporary Tables and/or Table Variables


    N/A


    #### Loops/Cursors


    N/A


    #### CTEs


    N/A


    #### Join Types


    Standard


    #### IN/NOT IN/LIKE


    `LIKE` in `WHERE` clause with both leading and trailing %. Cannot use an index…


    #### Sorting Operations


    Large grouping operation


    #### Calls to Other User-Defined SQL Objects


    Calls function `dbo.getLastBadgeUser`


    #### Native SQL Functions in WHERE Clauses


    N/A


    ## Run Statistics for This Call


    We need to find out what is taking a long time with this query. Let’s start by
    looking at `STATISTICS IO` and `TIME` information for a call to this stored procedure
    using the code in Listing 6-15.


    ```

    SET STATISTICS IO,TIME ON;

    GO

    EXECUTE getUserInfoByName @theName = ''Joel'';

    Listing 6-15

    Executing the stored procedure with STATISTICS IO and TIME on

    ```


    The `STATISTICS IO` and `TIME` output in the Messages tab shows a pretty significant
    run time, as well as a lot of reads. An hour and 18 minutes is pretty excessive
    for anything to run, let alone a relatively simple query.


    ```

    SQL Server parse and compile time:

    CPU time = 31 ms, elapsed time = 32 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    (666 rows affected)

    Table ''Posts''. Scan count 1334, logical reads 141862, physical reads 6898, read-ahead
    reads 25451, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Workfile''. Scan count 0, logical reads 0, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Worktable''. Scan count 0, logical reads 0, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Votes''. Scan count 666, logical reads 162302868, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Users''. Scan count 1, logical reads 44532, physical reads 0, read-ahead
    reads 24519, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    SQL Server Execution Times:

    CPU time = 4657469 ms,  elapsed time = 4687108 ms.

    ```


    What seems to be the biggest issue? The several calls to the `Posts` table being
    made through both a join and subqueries is a concern. Why would we continue looking
    up the same general data against that table time and again? We can see how many
    scans are being done on the `Posts` table. And whoosh, what about the ridiculous
    number of reads against the `Votes` table?


    ## Functions and STATISTICS IO Output


    Do you notice anything odd here though? In this output, we don’t see any record
    for reads against the `Badges` table, and yet our output contains badge information.
    `STATISTICS IO` output does not include the work for functions! This is something
    to definitely be aware of. You can catch that information in a Profiler trace
    (but who uses them anymore anyway?). You can also catch that information using
    Extended Events, which is a generally low-cost way (in terms of affecting server
    performance) to grab the data we need.


    ## Coming Up with a Plan of Action


    The issue with this stored procedure seems to be the massive amount of data that
    is being read, even though that amount of data isn’t being returned. Let’s see
    if we can reduce the amount of data getting read by getting rid of


    1.  The subqueries

    2.  The function

    3.  The leading ''%'' in our `LIKE` statement


    If a `LIKE` statement only has a trailing ''%'' and not a leading ''%'', it can
    use an index. With the leading ''%'', though, it cannot use an index.


    ### Go Away, Subqueries!


    We identified the `Votes` table as having massive amounts of reads. Let’s try
    moving the subquery calling the `Votes` table to a `LEFT OUTER JOIN` statement
    instead. In order to get rid of the subqueries to the `Posts` table, though, we’re
    going to have to be a little tricky and use aggregates and a `GROUP BY`. We already
    join to the `Posts` table, so we have the information available. We need a `COUNT()`
    of the post IDs where the `PostTypeId` = 2, and we also need the `MAX()` of the
    `creationDate` for post IDs where the `PostTypeId` = 2. This sounds like we’re
    going to need some `CASE` statements, since in our `INNER JOIN` we don’t specify
    the `PostTypeId`. Listing 6-16 shows the modified query with the subqueries removed
    as we just discussed.


    ```

    DECLARE @theName NVARCHAR(40) = ''Joel'';

    SELECT u.Id

    , u.DisplayName

    , u.AboutMe

    , SUM(CASE WHEN p.PostTypeId = 1 THEN 1 ELSE 0 END) AS numPosts

    , SUM(CASE WHEN v.Id IS NOT NULL THEN 1 ELSE 0 END) AS numFavVotes

    , SUM(CASE WHEN p.PostTypeId = 2 THEN 1 ELSE 0 END) AS numComments

    , MAX(CASE WHEN p.PostTypeId = 2 THEN p.CreationDate ELSE ''20000101'' END) AS
    dateLastComment

    , u.UpVotes

    , u.DownVotes

    , dbo.getlastBadgeUser(u.Id) AS latestBadge

    FROM dbo.Users u

    INNER JOIN dbo.Posts p ON u.Id = p.OwnerUserId

    LEFT OUTER JOIN dbo.Votes v ON p.Id = v.PostId

    AND v.VoteTypeId = 5

    WHERE p.PostTypeId IN (1,2)

    AND u.[DisplayName] LIKE ''%'' + @theName + ''%''

    GROUP BY u.Id

    , u.DisplayName

    , u.AboutMe

    , u.UpVotes

    , u.DownVotes

    , dbo.getlastBadgeUser(u.Id);

    Listing 6-16

    getUserInfoByName query with subqueries removed

    ```


    The first step is to run this code with `STATISTICS IO` and `TIME` on to see if
    we’re making progress in reducing our reads. The output from the `STATISTICS IO`
    and `TIME` from the query in Listing 6-16, still running against `@theName = ''Joel''`,
    gives us interesting results:


    ```

    SQL Server parse and compile time:

    CPU time = 15 ms, elapsed time = 18 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

