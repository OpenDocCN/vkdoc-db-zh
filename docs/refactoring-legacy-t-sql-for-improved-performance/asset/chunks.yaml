  trans: '## 数据类型与字段大小


    `WidePosts` 表中的大多数列都是整型数据类型，因此存储需求相对较低。然而，其中也有几个日期字段和一些大型的 `nvarchar` 字段：五个 `nvarchar(700)`
    字段、一个 `nvarchar(max)` 字段、一个 `nvarchar(2000)` 字段以及几个较小的 `nvarchar` 字段。多个列与一些大型的
    `varchar` 或 `nvarchar` 列的组合，可能使得每行的数据量相当可观。还记得上一章我们触及的查询中的内存授予吗？大量的内存授予需求可能会受到数据库表列数据类型和宽度选择的影响，并可能膨胀
    SQL Server 认为运行查询所需的资源量。


    这些列的大小有多少准确反映了列中包含的数据？让我们更仔细地查看 `WidePosts` 表中的数据值。`清单 3-1` 中的查询将找出几个列中值的最大长度。


    **表 3-1**


    `清单 3-1` 中查询的结果


    | 字段 | AbtMe | body | CT1 | CT2 | CT3 | CT4 | CT5 | Title | Tags | WebURL |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | 实际最大值长度 | 2000 | 34357 | 600 | 600 | 600 | 600 | 600 | 150 | 107 | 188 |

    | 列定义长度 | 2000 | MAX | 700 | 700 | 700 | 700 | 700 | 250 | 150 | 200 |


    ```sql

    SELECT MAX(LEN(AboutMe)) AS AbtMe

    , MAX(LEN(Body)) AS body

    , MAX(LEN(CommentText1)) AS CT1

    , MAX(LEN(CommentText2)) AS CT2

    , MAX(LEN(CommentText3)) AS CT3

    , MAX(LEN(CommentText4)) AS CT4

    , MAX(LEN(CommentText5)) AS CT5

    , MAX(LEN(Title)) AS Title

    , MAX(LEN(Tags)) AS Tags

    , MAX(LEN(WebsiteURL)) AS WebURL

    FROM dbo.WidePosts;

    ```


    `清单 3-1`

    查找 `WidePosts` 表中几个列的最大数据值长度的查询


    `表 3-1` 中的第一行显示了指定列中数据值的最大长度。第二行显示了每个列定义的最大长度。看起来这个表的列大小设置是适合将要存储在其中的数据的。


    ## 已弃用的数据类型


    较旧的表可能包含一些已不再有效的数据类型。例如，在撰写本书时，数据类型 `text`、`ntext` 和 `image` 已被弃用。Microsoft 建议改用
    `varchar(max)`、`nvarchar(max)` 和 `varbinary(max)` 数据类型。


    ## 数据量有多少？


    我们应该了解正在检查的表实际包含多少数据。记录的数量以及表中实际数据的大小，对于我们如何重写表，甚至是否需要重写，都可能产生很大影响。我们可以使用 SQL
    Server 的原生存储过程来获取此信息。调用 `sp_spaceused` 存储过程以查看 `WidePosts` 表中的数据量如 `清单 3-2` 所示。


    **表 3-2**


    `清单 3-2` 中 `sp_spaceused` 存储过程的结果


    | 名称 | 行数 | 已分配空间 | 数据 | 索引大小 | 未使用空间 |

    | --- | --- | --- | --- | --- | --- |

    | dbo.WidePosts | 1090572 | 3336672 KB | 3292984 KB | 42032 KB | 1656 KB |

    | 按 GB 计 | 1.09 | 3.34 | 3.29 | 0.04 | 0.001 |


    ```sql

    EXEC sp_spaceused N''dbo.WidePosts'';

    GO

    ```


    `清单 3-2`

    调用 `sp_spaceused` 以查找 `WidePosts` 表中数据量的示例


    `表 3-2` 显示了 `WidePosts` 表的行数以及一些数据大小。在现实世界中，一百万行并不算“大”，但对于您特定的服务器设置或数据库来说，这个记录数量可能是一个挑战。您应该了解表的相对大小及其内部数据。理解数据和索引的大小，在查看代码时将对您有所帮助，更容易理解为什么某些查询可能表现不佳。


    ## 数据偏斜/基数


    基数涉及每行中有多少唯一数据。了解列中值的分布将帮助您找到次优的查询代码，并快速确定哪些索引可能有用。`清单 3-3` 将帮助我们查看 `WidePosts`
    表中几个列的基数。


    **表 3-3**


    `清单 3-3` 中查询的结果


    | numParentIDs | numViews | numPostIDs | numAnswerCounts |

    | --- | --- | --- | --- |

    | 279298 | 3756 | 1090572 | 108 |


    ```sql

    SELECT COUNT(DISTINCT ParentId) as numParentIDs

    , COUNT(DISTINCT [Views]) AS numViews

    , COUNT(DISTINCT PostID) AS numPostIDs

    , COUNT(DISTINCT AnswerCount) AS numAnswerCounts

    FROM dbo.WidePosts;

    ```


    `清单 3-3`

    查找 `WidePosts` 表中某些列基数的查询


    `表 3-3` 向我们显示，`AnswerCounts` 的基数相当低——没有很多唯一值。不过，`PostIDs` 有很多唯一值。您不必对表中的所有列都运行此操作，但我会密切关注应用程序中最常使用的列，以便对该数据的基数有良好的了解。


    ## 约束


    许多表都有约束，而且约束的类型多种多样。希望您所有的表都有主键和聚集索引。如果没有，请添加它们！如果您运行 `清单 3-4` 中的命令，您可以看到针对某个表的约束，以及有关该表的其他各种信息。


    **表 3-4**


    `清单 3-4` 中存储过程调用的最后一个结果集（省略了部分列）


    | 约束类型 | 约束名称 | 已启用状态 | 用于复制状态 | 约束键 |

    | --- | --- | --- | --- | --- |

    | FOREIGN KEY | Fk_WidePosts_PostID | Enabled | Is_For_Replication | PostID REFERENCES
    StackOverflowForBook.dbo.Posts (Id) |

    | PRIMARY KEY (clustered) | PK_WidePosts_WideId | (n/a) | (n/a) | WideId |


    ```sql

    sp_help wideposts

    ```


    `清单 3-4`

    为获取 `WidePosts` 表信息而调用 `sp_help` 的示例


    如我们在 `表 3-4` 中所见，`sp_help` 命令返回的最后一个结果集列出了所有已定义的表约束。这里我们看到了 `WidePosts` 表上的主键和外键约束。'
- fmt: '## Changing Table Definitions


    Table changes can be tricky in how much they affect other database objects or
    the application. There are certain changes that are safer than others, and sometimes
    ways to mitigate the safety concerns in those changes that are considered “unsafe.”
    If you have a data access layer that you can modify, that is the best of all worlds.
    By “having a data access layer”, I mean that every call to the database goes through
    an intermediate layer. That intermediate layer can consist of `.NET` objects,
    stored procedures, and many other types of code.


    The benefit to a comprehensive data access layer is that you can make underlying
    structural changes and update the data access layer. You do not have to worry
    about the many times the data may be accessed by code, since any access goes through
    the data access layer. If you don’t have a comprehensive data access layer, though,
    you do have to worry about making changes to the underlying data structure and
    how that will affect data calls from the application, especially if you don’t
    have a developer assigned to you to work with on these performance issues.


    The safest method of dealing with table changes is to replace the table with a
    view of the same name and change the underlying structure. This may seem kind
    of foolish – what’s the point anyway if we’re just replacing the table with a
    view that more or less has the same definition as the current table? As we find
    more and more data calls referring to the original wide table, we can modify them
    to point to the narrower or normalized tables.


    What kinds of changes? Well, we can normalize the comment data and move it out
    of the table that defines post data. This will allow us to have more than five
    comments per post. We can also separate out the user data so we’re not saving
    the same strings over and over (e.g., the wide “AboutMe” column). This has the
    added benefit of allowing us to remove the problematic trigger we dealt with in
    Chapter 1, as well!


    By referring to smaller tables, we can leave out some of the “extra” tables (the
    ones we’re not pulling any data from) in queries, which will help lower our memory
    grants for those queries. We can also be more effective with indexing as well.


    Let’s build a view to mimic the `WidePosts` table, calling data from smaller tables
    that already exist in the database. In the cases that you’ll be dealing with,
    it is unlikely that small, normalized tables will already exist in your database.
    We only see this here because I specifically created the `WidePosts` table for
    this example. You will most likely have to break up the data in your larger table
    into smaller tables that you create while doing some interesting querying to assist
    in your data move.


    Please note: I recommend creating the view under a different name to start (not
    the same name as the table) and waiting to drop the table so you can test the
    output of the view to see if it matches the table select. Listing 3-5 shows the
    create statement for such a view.


    ```sql

    IF (NOT EXISTS (SELECT 1 FROM sys.views WHERE name = ''WidePostsView''))

    BEGIN

    EXECUTE(''CREATE VIEW WidePostsView as SELECT 1 as t'');

    END;

    GO

    ALTER VIEW WidePostsView AS

    SELECT

    p.Id AS postID

    , p.AcceptedAnswerId

    , p.AnswerCount

    , p.Body

    , p.ClosedDate

    , p.CommentCount

    , p.CommunityOwnedDate

    , p.CreationDate

    , p.FavoriteCount

    , p.LastActivityDate

    , p.LastEditDate

    , p.LastEditorDisplayName

    , p.LastEditorUserId

    , p.OwnerUserId

    , p.ParentId

    , p.PostTypeId

    , p.Score

    , p.Tags

    , p.Title

    , p.ViewCount

    , u.AboutMe

    , u.Age

    , u.CreationDate AS UserCreationDate

    , u.DisplayName

    , u.DownVotes

    , u.EmailHash

    , u.LastAccessDate

    , u.Location

    , u.Reputation

    , u.UpVotes

    , u.Views

    , u.WebsiteUrl

    , u.AccountId

    , c.CommentId1

    , c.CommentCreationDate1

    , c.CommentScore1

    , c.CommentText1

    , c.CommentUserId1

    , c.CommentId2

    , c.CommentCreationDate2

    , c.CommentScore2

    , c.CommentText2

    , c.CommentUserId2

    , c.CommentId3

    , c.CommentCreationDate3

    , c.CommentScore3

    , c.CommentText3

    , c.CommentUserId3

    , c.CommentId4

    , c.CommentCreationDate4

    , c.CommentScore4

    , c.CommentText4

    , c.CommentUserId4

    , c.CommentId5

    , c.CommentCreationDate5

    , c.CommentScore5

    , c.CommentText5

    , c.CommentUserId5

    FROM dbo.Posts p

    INNER JOIN dbo.Users u ON p.OwnerUserId = u.Id

    OUTER APPLY (SELECT coms.PostId

    , MAX(CASE WHEN theRowNum = 1 THEN coms.Id ELSE NULL END) AS CommentId1

    , MAX(CASE WHEN theRowNum = 1 THEN coms.CreationDate ELSE NULL END) AS CommentCreationDate1

    , MAX(CASE WHEN theRowNum = 1 THEN coms.Score ELSE NULL END) AS CommentScore1

    , MAX(CASE WHEN theRowNum = 1 THEN coms.[Text] ELSE NULL END) AS CommentText1

    , MAX(CASE WHEN theRowNum = 1 THEN coms.UserId ELSE NULL END) AS CommentUserID1

    , MAX(CASE WHEN theRowNum = 2 THEN coms.Id ELSE NULL END) AS CommentId2

    , MAX(CASE WHEN theRowNum = 2 THEN coms.CreationDate ELSE NULL END) AS CommentCreationDate2

    , MAX(CASE WHEN theRowNum = 2 THEN coms.Score ELSE NULL END) AS CommentScore2

    , MAX(CASE WHEN theRowNum = 2 THEN coms.[Text] ELSE NULL END) AS CommentText2

    , MAX(CASE WHEN theRowNum = 2 THEN coms.UserId ELSE NULL END) AS CommentUserID2

    , MAX(CASE WHEN theRowNum = 3 THEN coms.Id ELSE NULL END) AS CommentId3

    , MAX(CASE WHEN theRowNum = 3 THEN coms.CreationDate ELSE NULL END) AS CommentCreationDate3

    , MAX(CASE WHEN theRowNum = 3 THEN coms.Score ELSE NULL END) AS CommentScore3

    , MAX(CASE WHEN theRowNum = 3 THEN coms.[Text] ELSE NULL END) AS CommentText3

    , MAX(CASE WHEN theRowNum = 3 THEN coms.UserId ELSE NULL END) AS CommentUserID3

    , MAX(CASE WHEN theRowNum = 4 THEN coms.Id ELSE NULL END) AS CommentId4

    , MAX(CASE WHEN theRowNum = 4 THEN coms.CreationDate ELSE NULL END) AS CommentCreationDate4

    , MAX(CASE WHEN theRowNum = 4 THEN coms.Score ELSE NULL END) AS CommentScore4

    , MAX(CASE WHEN theRowNum = 4 THEN coms.[Text] ELSE NULL END) AS CommentText4

    , MAX(CASE WHEN theRowNum = 4 THEN coms.UserId ELSE NULL END) AS CommentUserID4

    , MAX(CASE WHEN theRowNum = 5 THEN coms.Id ELSE NULL END) AS CommentId5

    , MAX(CASE WHEN theRowNum = 5 THEN coms.CreationDate ELSE NULL END) AS CommentCreationDate5

    , MAX(CASE WHEN theRowNum = 5 THEN coms.Score ELSE NULL END) AS CommentScore5

    , MAX(CASE WHEN theRowNum = 5 THEN coms.[Text] ELSE NULL END) AS CommentText5

    , MAX(CASE WHEN theRowNum = 5 THEN coms.UserId ELSE NULL END) AS CommentUserID5

    FROM (SELECT Id

    , CreationDate

    , Score

    , [Text]

    , UserId

    , PostId

    , ROW_NUMBER() OVER (PARTITION BY PostId ORDER BY CreationDate) AS theRowNum

    FROM dbo.Comments com

    WHERE com.PostId = p.Id) coms

    WHERE coms.theRowNum <= 5

    GROUP BY coms.PostId) c;

    ```


    Listing 3-5 View create statement for the `WidePostsView` view


    We can test the output of the view to see if it matches the table data using the
    code in Listing 3-6 (view data) to compare to the code in Listing 3-7 (table data).'
