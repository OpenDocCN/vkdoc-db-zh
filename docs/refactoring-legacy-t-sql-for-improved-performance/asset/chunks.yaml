- fmt: "## 本书宗旨\n\n本书旨在帮助读者快速识别特定数据库对象中可能存在的性能问题。为此，我们需要做如下假设：\n\n1.  硬件/硬件配置/虚拟机配置已被排除为性能问题根源。\n\
    2.  外部因素已被排除为问题根源（尽管我们都知道问题通常出在网络）。\n3.  引发关注的数据库对象已被识别。\n\n我们将从“问题已定位，接下来该怎么办？”这一点继续深入。我们的主要工作将是借助一些性能度量指标来查看代码，并学习用于识别问题区域的最佳实践。您应熟悉基本的\
    \ `T-SQL` 编码语法、技术以及更高级的查询方法。\n\n我们将按对象类型涵盖大多数常见问题，也会为了趣味性介绍一些较少见的问题。一旦识别出对象内的这些问题区域，您就可以用相对较低的精力和成本来缓解性能问题。某些对象可能需要更深入的探究。在我们进行一些初步处理以缓解对象带来的直接痛苦之后，我们将讨论如何有效地进行深入探究。\n\
    \n我们还将讨论如何快速判断您想应用的修复是否正确。我们将介绍一些可用于度量性能的简单（且免费的工具），这样您就可以记录修改前后的指标，连同您肯定会添加的其他文档，以便下一位接手维护这个系统的可怜人（我是指下一个人）工作起来能更轻松！\n\
    \n## 本书不包含什么\n\n魔法。本书不包含魔法，尽管有时它可能看起来能帮您施展魔法。但严肃地说，有时情况会糟糕到无法修复。这种情况非常罕见，我或我各个团队的成员几乎总能“搞定它”，但请意识到，确实有可能存在无法挽救的情况。更棒的是，您的老板也应该意识到这一点，并在您遇到这种情况时支持您。如果您没那么幸运，可能需要考虑换份工作，但这可能超出了本书的讨论范围。\n\
    \n这不是关于索引、统计信息或数据库维护的深入探讨。我希望您已经设置了这些。如果您没有，请找一本讨论这些内容的书并确保您在做这些工作！如果您不专门负责数据库管理，请与负责的人沟通，确保他们已打好这些基础。我们肯定会提及索引和统计信息，但其他地方有更完整的资料，因此我们的讨论更像是概述而非详尽信息。\n\
    \n这也并非识别有问题的硬件、外部因素或数据库对象的方法。我们在前文已经提到了假设条件。如果您跳过了那些，请至少回去阅读那些要点，以便我们在开始初步处理时保持认知一致。\n\
    \n## 工具\n\n我们将使用 `Stack Overflow` 的数据转储。`Brent Ozar` 在他的网站 [`www.brentozar.com/archive/2015/10/how-to-download-the-stack-overflow-database-via-bittorrent/`](https://www.brentozar.com/archive/2015/10/how-to-download-the-stack-overflow-database-via-bittorrent/)\
    \ 上提供了它，这些数据是他从优秀的 `Stack Overflow` 团队那里获得的。\n\n我还会在本书文件中附带一个备份，以便大家起点一致。如果您想跟随示例操作，请确保在恢复数据库备份后运行数据库设置脚本（包含在本书文件中），以添加我们将在本书中使用的额外对象。\n\
    \n`SQL Server Management Studio (SSMS)` 将是首选的代码运行应用程序。它是微软提供的免费下载：[`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms)\n\
    \n`SentryOne Plan Explorer` 也是一个免费下载工具。我们将使用它来查看执行计划以及与计划相关的性能指标：[`www.sentryone.com/plan-explorer`](https://www.sentryone.com/plan-explorer)\n\
    \n最后一个工具是一个网站。您可以粘贴冗长的 `statistics IO/time` 输出，它会将其解析成方便易读的表格。它物有所值……嗯……比特币？如果您曾花费时间试图解读游标或循环的输出，您就会完全理解。但请注意，它对可以输入的数据量有限制，超过限制后将无法输出结果：[`http://statisticsparser.com/`](http://statisticsparser.com/)\n\
    \n## 无关紧要（多数情况下）的细节\n\n我在 `Dell Latitude E7470` 笔记本电脑上使用 `SSMS 18` 运行示例。我使用 `Oracle\
    \ VirtualBox` 设置了一个虚拟机。该虚拟机拥有单个 `vCPU` 和 `8 GB RAM`。我在 `Server 2016 Core` 上运行\
    \ `SQL Server 2016 SP2`。\n\n## 开始吧！\n\n现在我们已经把这些说清楚了，让我们打开第一个棘手对象的代码，去做些急救工作吧！\n\
    \n## 致谢\n\n我要感谢所有信任我、鼓励我并推动我不断成长和学习的人。特别感谢 `Mindy Curnutt`、`Eric Blinn` 和 `Tim\
    \ Tarbet`，他们向我展示了一个人在自己选择的岗位上可以有多么出色，并相信我也能变得同样优秀。\n\n我不能漏掉为我工作的人。我带领着一支出色的、积极投入的团队，他们持续学习，并通过为非常困难的问题找到解决方案而不断激励着我。\n\
    \n还要感谢我的家人（包括我的 `#sqlfamily`），他们始终给予我支持、关爱，并在需要时毫不吝啬地给予拥抱和精神支持！\n\n### 关于作者与技术评审\n\
    \n### 关于作者\n\n### 关于技术评审\n\n## 第一部分 万物皆慢\n\n### 1. T-SQL 初步诊断\n\n`DBA` 最害怕接到的电话是这样的：“应用程序里所有东西都慢！快修好它！”在许多情况下，数据库是遗留代码性能不佳的罪魁祸首之一。当您被找来处理其中一些问题时，您该怎么做？首先，您需要识别出有问题的代码。我们将假设您（或其他人）已经识别出了问题区域。一旦确认，我们需要通过回答以下问题来评估情况：\n\
    \n1.  确定情况的严重性：\n    1.  用户是否无法使用系统？\n    2.  所有用户是否都无法使用？\n    3.  这是否正在导致业务损失金钱？\n\
    \n2.  确定相对工作量：\n    1.  涉及多少行代码？\n    2.  应用程序有多少区域调用了这些代码？\n    3.  需要修改多少代码？\n\
    \n3.  识别代码中的问题区域：\n    1.  哪些区域正在引发痛苦？\n\n4.  如果可能，进行初步处理。\n\n### 情况严重性\n\n这只能通过从用户或用户经理那里收集信息来确定。我知道，我知道，这意味着您必须真正与人交谈。然而，这是判断您是否应该立即放下所有其他工作立即处理此事，还是可以等到您手头任务完成后再处理的绝佳指标。如果您还没有，您可能需要考虑制定一份书面的\
    \ `SLA`（服务级别协议），说明您或您的团队对特定事件做出反应的预期（或要求）速度。严重性应该是该文件的关键部分。"
  raw: "## What This Book Is\n\nThis book is meant to help you, the reader, step in\
    \ and identify potential issues in a specific database object relatively quickly.\
    \ There are a few assumptions that go with this:\n\n1.  Hardware/hardware configuration/VM\
    \ configuration has been ruled out as the performance problem.\n\n2.  External\
    \ sources have been ruled out as the problem (although we all know it’s really\
    \ the network…).\n\n3.  The database objects that are causing concern have been\
    \ identified.\n\nWe are going to continue on from the point of “Okay, this has\
    \ been identified as an issue. Now what do I do with it?” Most of what we’ll be\
    \ doing is actually looking at the code with the help of a few performance measures\
    \ and learning about best practices to help identify problem areas. You should\
    \ be familiar with basic T-SQL coding syntax and techniques and how to do a bit\
    \ more advanced querying.\n\nWe will cover most of the issues commonly seen by\
    \ object type, as well as a couple of less common problems just for fun. Once\
    \ these problem areas within the object are identified, you can then mitigate\
    \ the performance issues with relatively low effort and cost. Some objects may\
    \ require a much deeper dive. Once we’ve done some triage to help alleviate the\
    \ immediate pain an object is causing, we will cover what is involved in effectively\
    \ performing the deeper dive.\n\nWe also will talk about how to quickly tell if\
    \ you’re on the right track in terms of the fixes you want to apply. We’ll go\
    \ over some simple (and free) tools that can be used to measure performance, so\
    \ you can document the before/after metrics to go along with the rest of the documentation\
    \ you’re going to be sure to add so the next poor sod (I mean the next person)\
    \ who has to maintain this system will have an easier time of it!\n\n## What This\
    \ Book Is Not\n\nMagic. This book is not magic, although at times it might seem\
    \ like it helps you perform some. Seriously though, there are times when things\
    \ are so bad that you cannot fix them. This is pretty rare, and either myself\
    \ or one of the members of my various teams has almost always managed to “just\
    \ fix it,” but just be aware that it is possible that something is unsalvageable.\
    \ Even better, your boss should also be aware of this and have your back should\
    \ you run into that situation. If you are not that fortunate, you may want to\
    \ consider finding another job, but that is probably outside the scope of this\
    \ book. \n\nThis is not a deep dive into indexes, statistics, or database maintenance.\
    \ I’d hope that you have all of those things set up. If you do not, please go\
    \ find a book that discusses those items and make sure you are doing them! If\
    \ you are not in charge of the database administration specifically, talk to whoever\
    \ is and make sure THEY have those bases covered. We will definitely mention indexes\
    \ and statistics, but there is much more complete information on them in other\
    \ places, so discussion will be more of a flyby than exhaustive information. \n\
    \nThis is also not a way to identify problematic hardware, external forces, or\
    \ database objects. We mentioned in the preceding text what the assumptions are.\
    \ If you skipped those, please go back and at least read those points so we’re\
    \ all on the same page when we start our triage.\n\n## The Tools\n\nWe will be\
    \ using a data dump from Stack Overflow. Brent Ozar kindly provided it on his\
    \ web site at [`www.brentozar.com/archive/2015/10/how-to-download-the-stack-overflow-database-via-bittorrent/`](https://www.brentozar.com/archive/2015/10/how-to-download-the-stack-overflow-database-via-bittorrent/)\
    \ which he in turn got from the awesome Stack Overflow folks.\n\nI will also include\
    \ a backup with the files for the book so everyone can start on the same foot.\
    \ If you want to follow along with the examples, please make sure to run the database\
    \ setup script (included in the files for the book) after restoring the database\
    \ backup to add the additional objects we’ll be using throughout the book.\n\n\
    SQL Server Management Studio (SSMS) will be the code-running application of choice.\
    \ It is a free download from Microsoft: [`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms)\n\
    \nSentryOne Plan Explorer is also a free download. We will be using it to look\
    \ at execution plans and performance metrics related to the plan:\n\n[`www.sentryone.com/plan-explorer`](https://www.sentryone.com/plan-explorer)\n\
    \nThe last tool is a web site. You can paste in your exhaustively long statistics\
    \ IO/time output, and it will parse it into nice handy tables. It is worth its\
    \ weight in… um… bitcoin? If you’ve ever spent time trying to wade through output\
    \ from a cursor or loop, you’ll completely understand. Please be forewarned though\
    \ that there is a limit to how much you can dump in and have it still actually\
    \ regurgitate output:\n\n[`http://statisticsparser.com/`](http://statisticsparser.com/)\n\
    \n## The Inconsequential (Mostly) Details\n\nI ran examples using SSMS 18 on a\
    \ Dell Latitude E7470 laptop. I set up a VM using Oracle VirtualBox. The VM had\
    \ a single vCPU and 8 GB RAM. I was using SQL Server 2016 SP2 running on Server\
    \ 2016 Core.\n\n## Let’s Go!\n\nNow that we’ve gotten that out of the way, let’s\
    \ pull up the code for our first painful object and go do some first aid!\n\n\
    Acknowledgments\n\nI would like to thank all of the people who believed in me,\
    \ encouraged, and pushed me to continue to grow and learn. Special thanks go to\
    \ Mindy Curnutt, Eric Blinn, and Tim Tarbet, who showed me how amazing someone\
    \ can be at the job they choose to do, and believed that I could be that good\
    \ too.\n\nI cannot leave out the people who work for me. I lead a wonderful team\
    \ of involved people who are active in their continued learning, and continue\
    \ to inspire me every day by finding solutions to really difficult problems.\n\
    \nAlso thank you to my family (including my #sqlfamily) who have always been supportive,\
    \ loving, and unstinting of hugs and moral support when needed!\n\n### About the\
    \ Author and About the Technical Reviewer\n\n### About the Author\n\n### About\
    \ the Technical Reviewer\n\n# Part IEverything Is Slow\n\n# 1. T-SQL Triage\n\n\
    The most dreaded call a DBA can get is this: “Everything in the application is\
    \ slow! FIX IT!” In many cases, the database is one of the culprits of the poor\
    \ performance of the legacy code. When you are approached to deal with some of\
    \ these issues, what do you do? Well, first you identify painful code. We’re going\
    \ to assume that you (or someone else) have already identified the concerning\
    \ areas. Once that happens, we need to assess the situation by answering these\
    \ questions:\n\n1.  Determine how critical the situation is:\n    1.  Are users\
    \ down?\n\n    2.  Are all users down?\n\n    3.  Is this causing the business\
    \ to lose money?\n\n2.  Determine the relative effort involved:\n    1.  How many\
    \ lines of code are involved?\n\n    2.  How many areas of the application call\
    \ this code?\n\n    3.  How much of the code needs to be changed?\n\n3.  Identify\
    \ problem areas in the code:\n    1.  What areas are causing pain?\n\n4.  Perform\
    \ triage if possible.\n\n## Severity of the Situation\n\nThis is something you\
    \ can only determine by gathering information either from users or user managers.\
    \ I know, I know, it means you have to actually talk to people. However, it is\
    \ a great indicator of whether you should immediately drop everything else and\
    \ work on this immediately, or if it can wait until the task you’re working on\
    \ is completed. If you don’t already, you may want to consider having a written\
    \ SLA (Service-Level Agreement) that states how quickly you or your team is expected\
    \ (or required) to react to certain events. Severity should be a key piece of\
    \ that document."
  trans: "## 本书宗旨\n\n本书旨在帮助读者快速识别特定数据库对象中可能存在的性能问题。为此，我们需要做如下假设：\n\n1.  硬件/硬件配置/虚拟机配置已被排除为性能问题根源。\n\
    2.  外部因素已被排除为问题根源（尽管我们都知道问题通常出在网络）。\n3.  引发关注的数据库对象已被识别。\n\n我们将从“问题已定位，接下来该怎么办？”这一点继续深入。我们的主要工作将是借助一些性能度量指标来查看代码，并学习用于识别问题区域的最佳实践。您应熟悉基本的\
    \ `T-SQL` 编码语法、技术以及更高级的查询方法。\n\n我们将按对象类型涵盖大多数常见问题，也会为了趣味性介绍一些较少见的问题。一旦识别出对象内的这些问题区域，您就可以用相对较低的精力和成本来缓解性能问题。某些对象可能需要更深入的探究。在我们进行一些初步处理以缓解对象带来的直接痛苦之后，我们将讨论如何有效地进行深入探究。\n\
    \n我们还将讨论如何快速判断您想应用的修复是否正确。我们将介绍一些可用于度量性能的简单（且免费的工具），这样您就可以记录修改前后的指标，连同您肯定会添加的其他文档，以便下一位接手维护这个系统的可怜人（我是指下一个人）工作起来能更轻松！\n\
    \n## 本书不包含什么\n\n魔法。本书不包含魔法，尽管有时它可能看起来能帮您施展魔法。但严肃地说，有时情况会糟糕到无法修复。这种情况非常罕见，我或我各个团队的成员几乎总能“搞定它”，但请意识到，确实有可能存在无法挽救的情况。更棒的是，您的老板也应该意识到这一点，并在您遇到这种情况时支持您。如果您没那么幸运，可能需要考虑换份工作，但这可能超出了本书的讨论范围。\n\
    \n这不是关于索引、统计信息或数据库维护的深入探讨。我希望您已经设置了这些。如果您没有，请找一本讨论这些内容的书并确保您在做这些工作！如果您不专门负责数据库管理，请与负责的人沟通，确保他们已打好这些基础。我们肯定会提及索引和统计信息，但其他地方有更完整的资料，因此我们的讨论更像是概述而非详尽信息。\n\
    \n这也并非识别有问题的硬件、外部因素或数据库对象的方法。我们在前文已经提到了假设条件。如果您跳过了那些，请至少回去阅读那些要点，以便我们在开始初步处理时保持认知一致。\n\
    \n## 工具\n\n我们将使用 `Stack Overflow` 的数据转储。`Brent Ozar` 在他的网站 [`www.brentozar.com/archive/2015/10/how-to-download-the-stack-overflow-database-via-bittorrent/`](https://www.brentozar.com/archive/2015/10/how-to-download-the-stack-overflow-database-via-bittorrent/)\
    \ 上提供了它，这些数据是他从优秀的 `Stack Overflow` 团队那里获得的。\n\n我还会在本书文件中附带一个备份，以便大家起点一致。如果您想跟随示例操作，请确保在恢复数据库备份后运行数据库设置脚本（包含在本书文件中），以添加我们将在本书中使用的额外对象。\n\
    \n`SQL Server Management Studio (SSMS)` 将是首选的代码运行应用程序。它是微软提供的免费下载：[`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms)\n\
    \n`SentryOne Plan Explorer` 也是一个免费下载工具。我们将使用它来查看执行计划以及与计划相关的性能指标：[`www.sentryone.com/plan-explorer`](https://www.sentryone.com/plan-explorer)\n\
    \n最后一个工具是一个网站。您可以粘贴冗长的 `statistics IO/time` 输出，它会将其解析成方便易读的表格。它物有所值……嗯……比特币？如果您曾花费时间试图解读游标或循环的输出，您就会完全理解。但请注意，它对可以输入的数据量有限制，超过限制后将无法输出结果：[`http://statisticsparser.com/`](http://statisticsparser.com/)\n\
    \n## 无关紧要（多数情况下）的细节\n\n我在 `Dell Latitude E7470` 笔记本电脑上使用 `SSMS 18` 运行示例。我使用 `Oracle\
    \ VirtualBox` 设置了一个虚拟机。该虚拟机拥有单个 `vCPU` 和 `8 GB RAM`。我在 `Server 2016 Core` 上运行\
    \ `SQL Server 2016 SP2`。\n\n## 开始吧！\n\n现在我们已经把这些说清楚了，让我们打开第一个棘手对象的代码，去做些急救工作吧！\n\
    \n## 致谢\n\n我要感谢所有信任我、鼓励我并推动我不断成长和学习的人。特别感谢 `Mindy Curnutt`、`Eric Blinn` 和 `Tim\
    \ Tarbet`，他们向我展示了一个人在自己选择的岗位上可以有多么出色，并相信我也能变得同样优秀。\n\n我不能漏掉为我工作的人。我带领着一支出色的、积极投入的团队，他们持续学习，并通过为非常困难的问题找到解决方案而不断激励着我。\n\
    \n还要感谢我的家人（包括我的 `#sqlfamily`），他们始终给予我支持、关爱，并在需要时毫不吝啬地给予拥抱和精神支持！\n\n### 关于作者与技术评审\n\
    \n### 关于作者\n\n### 关于技术评审\n\n## 第一部分 万物皆慢\n\n### 1. T-SQL 初步诊断\n\n`DBA` 最害怕接到的电话是这样的：“应用程序里所有东西都慢！快修好它！”在许多情况下，数据库是遗留代码性能不佳的罪魁祸首之一。当您被找来处理其中一些问题时，您该怎么做？首先，您需要识别出有问题的代码。我们将假设您（或其他人）已经识别出了问题区域。一旦确认，我们需要通过回答以下问题来评估情况：\n\
    \n1.  确定情况的严重性：\n    1.  用户是否无法使用系统？\n    2.  所有用户是否都无法使用？\n    3.  这是否正在导致业务损失金钱？\n\
    \n2.  确定相对工作量：\n    1.  涉及多少行代码？\n    2.  应用程序有多少区域调用了这些代码？\n    3.  需要修改多少代码？\n\
    \n3.  识别代码中的问题区域：\n    1.  哪些区域正在引发痛苦？\n\n4.  如果可能，进行初步处理。\n\n### 情况严重性\n\n这只能通过从用户或用户经理那里收集信息来确定。我知道，我知道，这意味着您必须真正与人交谈。然而，这是判断您是否应该立即放下所有其他工作立即处理此事，还是可以等到您手头任务完成后再处理的绝佳指标。如果您还没有，您可能需要考虑制定一份书面的\
    \ `SLA`（服务级别协议），说明您或您的团队对特定事件做出反应的预期（或要求）速度。严重性应该是该文件的关键部分。"
- fmt: '## 相对工作量


    如果这是一个数千行代码的对象，那就遗憾地摇摇头然后离开吧。开个玩笑！然而，仅仅是理解正在发生什么就需要大量努力，更不用说实际修复性能问题所需的工作量了。这正是优秀文档发挥作用的地方，但如果你正在阅读本书，不太可能拥有那种唾手可得的帮助。


    此外，你需要考虑 QA（质量保证）的工作量。最好的情况是永远不要让未经测试的代码进入生产环境。所谓未经测试，我指的是没有通过严格 QA 流程的代码。在笔记本电脑上运行一次似乎是个好主意，但存在各种你可能没有意识到的奇怪场景，而
    QA 专业人员会对此有更好的把握。


    这段代码中存在多少确切的痛点？这将是我们可以进行何种分类处理以让用户满意（或至少让他们停止向你老板抱怨）的最大决定因素。然而，无论这些答案如何，如果代码已被确定为真正的问题，分类处理只是你的第一步。即使你通过索引或其他巧妙的巫术“修复”了它，也不要就此停止！务必充分记录代码并在必要时重写。


    ## 问题领域


    “喂？Sam DBA？每次用户尝试更改他们的显示名称时，应用程序都会卡住几秒钟，这真的让每个人都很沮丧。”


    了解代码问题的最佳方法是去运行一些导致问题的代码。有时，实际 SQL 代码之外的设置也会引发问题。应用程序连接字符串有时会设置 ANSI 设置，这可能导致
    SQL 代码的运行方式与 SQL Server Management Studio（SSMS）中的运行方式截然不同。在本书中，我们假设这些可能性已被排除，并非我们所见问题的原因，但我想让你知道，如果你还没有检查这些可能性，你应该去检查一下。


    这是你刚刚从呼叫者那里获得的非常有用的信息。但请注意，人们喜欢随意使用“总是”和“从不”这样的词。尽量获取细节：“当你说每次时，是 100% 的情况吗？是
    90% 的情况吗？是任何时间都发生还是仅限于某些特定时间？” 记录这些答案，以便与工单/请求/投诉文档一起存档。


    让我们去看看当用户尝试更改其显示名称时发生了什么。在接下来的部分中，我们将尝试更改以下用户的显示名称，以寻找问题所在。我们将使用 Jon Skeet（其 `Id`
    为 22656）和 stic（其 `Id` 为 31996）。查询将针对 `dbo.Users` 表运行。


    ### STATISTICS IO 和 STATISTICS TIME


    `STATISTICS IO` 是衡量查询使用的 IO 资源量的指标，而 `STATISTICS TIME` 则测量查询运行时的 CPU 时间和已用时间，以及查询编译时间。如果你依赖
    SSMS 右下角的数字来衡量查询时间，请停止这样做！它不准确——或者肯定不够准确。


    ### 查询窗口设置


    首先，打开 SSMS。连接到数据库并打开一个新的查询窗口，然后打开 `STATISTICS IO` 和 `STATISTICS TIME`。通过 UI 操作，选择“查询”菜单选项，然后选择“查询选项”，再选择“高级”。图
    [1-1](#483961_1_En_1_Chapter.xhtml#Fig1) 显示了“查询选项”的“高级”窗口。


    ![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig1_HTML.jpg](images/483961_1_En_1_Chapter/483961_1_En_1_Fig1_HTML.jpg)


    图 1-1


    SSMS 中的“查询选项高级”窗口


    确保勾选`SET STATISTICS TIME`和`SET STATISTICS IO`两个复选框，然后点击确定。


    如果你想完全使用脚本，只需在查询窗口中键入如清单 [1-1](#483961_1_En_1_Chapter.xhtml#PC1) 所示的代码。


    ```

    SET STATISTICS TIME, IO ON;

    Listing 1-1

    用于打开 STATISTICS TIME 和 IO 的命令

    ```


    然后点击执行（或按 Ctrl+E）。请注意，无论你以哪种方式设置 `STATISTICS TIME` 和 `IO` 为开启状态，它都只对该特定查询窗口或连接（SPID）生效。如果连接被重置（例如，重启
    SSMS）或者你打开了另一个查询窗口，你将需要为新的查询窗口再次打开 `STATISTICS TIME` 和 `IO`。


    ### 代码测试


