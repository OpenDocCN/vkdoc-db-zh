  trans: '# 代码清单 4-10

    使用 OUTER APPLY 替换 getNumLinkedPosts 函数


    ```sql

    SELECT p.Id

    , p.CreationDate

    , nlp.numLinkedPosts

    FROM dbo.Posts p

    OUTER APPLY (SELECT COUNT(1) AS numLinkedPosts

    FROM dbo.PostLinks pl

    WHERE pl.PostId = p.Id) nlp

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120901'';

    ```


    代码清单 4-10 中的代码返回了 392,564 行，使用了 8094 毫秒的 CPU 时间和 8514 毫秒的已用时间。它扫描了 `Posts` 表一次，产生了
    1074 次逻辑读取；扫描了 `PostLinks` 表一次，产生了 5824 次逻辑读取。此外，我们还看到了一个工作表，它为每一行执行了一次扫描，并产生了
    530 万次逻辑读取。这是什么情况？既然我们终于让这段代码运行得足够快以获取执行计划了，那就让我们来看一下吧！该计划如图 4-1 所示。


    ![../images/483961_1_En_4_Chapter/483961_1_En_4_Fig1_HTML.jpg](img/483961_1_En_4_Fig1_HTML.jpg)


    ## 图 4-1

    链接帖子数量查询的执行计划


    观察图 4-1 中展示的执行计划，我们可以看到对 `PostLinks` 表的一次聚集索引扫描，然后是一个索引溢出盘（index spool），绝大部分工作都在这里进行。索引溢出盘会在谓词上创建一个临时索引，以便更高效地连接数据。无论如何，这大致就是索引溢出盘应该做的事情。但这里的性能看起来有点糟糕。嗯，我们正在基于
    `PostId` 进行计数。如果我们为 `PostId` 添加一个非聚集索引，会有帮助吗？让我们试试看，使用代码清单 4-11 中的代码。


    # 代码清单 4-11

    在 PostLinks 表的 PostID 列上创建索引


    ```sql

    CREATE NONCLUSTERED INDEX ix_PostLinks_PostID ON dbo.PostLinks (PostId);

    ```


    一旦我们创建了代码清单 4-11 中的索引，就可以再次运行代码清单 4-10 中的查询，并再次捕获执行计划。瞧！即使是捕获执行计划，代码清单 4-10 中的查询也只用了
    3 秒。更精确地说，执行显示已用时间为 3315 毫秒，仅使用了 2765 毫秒的 CPU 时间。工作表的扫描次数实际上转移到了 `PostLinks` 表上，但在
    `STATISTICS IO` 输出中，“扫描”一词实际上可以指查找（seek）或扫描（scan）。在添加了代码清单 4-11 中的索引后，代码清单 4-10
    中查询的执行计划如图 4-2 所示。


    ![../images/483961_1_En_4_Chapter/483961_1_En_4_Fig2_HTML.jpg](img/483961_1_En_4_Fig2_HTML.jpg)


    ## 图 4-2

    添加索引后的执行计划


    观察图 4-2，我们看到了完全符合预期的结果：索引查找承担了大部分工作。我们干得不错！我们刚刚让一段原本要运行数小时的代码，现在只需…… 3 秒就能跑完。老实说，我们并没有做太多工作。实际上，我们所做的工作比调用视图所做的要少得多！


    ## 我们解决了哪些问题？


    为什么它比原始视图调用快这么多？嗯，我们展示了后台实际运行了多少代码。调用一个视图，发现它包含了你需要的大部分字段，然后再创建第二个视图来添加一两个额外字段，这很容易。问题在于人们不断这样做，在视图之上叠加更多视图，以至于在实际运行的代码中，表被多次调用。由于视图定义看起来可能具有欺骗性的简单，对于不经意的观察者来说，并不明显视图调用背后实际发生了所有这些工作。


    透视（Pivoting）和逆透视（Unpivoting）操作都涉及某种聚合。我编写这些视图的方式（至少截至 SQL Server 2014）与 SQL Server
    引擎在底层处理它们的方式相同，即使你使用“官方”的 pivot 或 unpivot 语法也是如此。大型 `GROUP BY` 语句迫使 SQL Server
    必须执行指定的分组，这几乎总是意味着需要一个工作表。然后，它还必须对数据进行排序（毕竟，除非数据已排序以便分组，否则无法进行分组）。排序在 SQL Server
    中是一项相当昂贵的操作。如果已经存在一个按所需顺序排序的索引，则有可能避免排序操作，但如果你为了支持任何列上的任何排序顺序而创建索引，那么就可能遇到索引过多的问题，这会导致写入操作耗时极长。


    此外，在整个过程中，我们改变获取记录的数量幅度相当大，如表 4-3 所示。在 `WidePostsPlusOne` 中，我们基于 `PostID` 连接了
    `Votes` 表。在很多情况下，一个帖子肯定不止一个投票，因为我们看到记录数量几乎是 `WidePostsCh4` 记录数的三倍。然后，在 `WidePostsPlusTwo`
    中，我们丢失了大量行。我猜测这是由于某个内连接过滤掉了记录。不过，数据量的最大爆炸将来自逆透视操作。当我们在 `WidePostsCh4` 中执行透视时，我们为每个帖子填充了最多五条评论。然后，当我们执行逆透视时，我们“假定”每个帖子有五条评论，即使可能并非每个帖子都有完整的五条评论。我们仍然最终为每个帖子创建了五条记录。接着，我们在
    `WidePostsPlusFour` 中过滤掉了所有这些多余的行，但我们仍然完成了创建它们的工作。因此，我们的重写不仅速度大大提高，而且其中的数据也可能更准确！


    ## 筛选


    在不降低视图实用性的情况下进行筛选可能是一个挑战。你不能将参数传递给视图。因此，如果你的结果集需要限制，你的选项要么是在视图中硬编码筛选器，要么是确保每个调用对象都包含一个良好的
    `WHERE` 子句。`CTE`（公用表表达式）可以在视图定义中使用，这在某些筛选场景下可能很有用。


    ## 通过视图更新数据


    对于单表视图来说，这很简单。对于多表视图来说，这就不容易了（或者在大多数情况下是不可能的）。插入（Insert）和删除（Delete）操作只对包含单表字段的视图有效。更新（Update）操作可以针对包含多个表的视图运行，但更新必须针对单个表中的列。之所以存在这些限制，是因为
    SQL Server 的查询引擎并不总是能够明确地将视图中的一段数据追溯回原始表（你能想象尝试对 `WidePostsPlusFour` 执行更新操作吗？）。如果
    SQL Server 无法追溯数据，它就无法通过视图更新数据。


    ## 其他限制


    你不能基于临时表或表变量创建视图。如果想一下，这是合理的——视图定义是数据库中的永久对象，而临时表，即使是全局临时表，根据定义也不是永久的：它是……嗯，临时的。


    你不能为列指定默认值或约束。你可以使用 `COALESCE`，这在一定程度上（算是）解决了默认值问题，但对于约束则没有变通办法。'
- fmt: '## Why Use a View?


    所有这些限制和性能问题听起来真的很不幸。既然存在所有这些可能的陷阱和注意事项，为什么还有人会使用视图呢？嗯，正如我们在前一章讨论的那样，我们可以通过创建视图来开始拆分宽表，允许旧的调用引用该视图，然后开始分解表，这样我们将来修改或编写的任何代码都可以指向更小、更规范化的表。


    此外，视图是非常出色的安全工具。我们可以确保视图的权限只授予适当的组。例如，人力资源部可能需要查看社会安全号码，但其他人不能也不应该能够查看。如果公司有多个部门，我们可以确保每个部门使用他们自己的视图，这样他们就无法访问其他部门的数据。


    ## Summary


    希望您对围绕视图的常见陷阱有了更多了解，尤其是嵌套问题。我们还了解到它们可以用于安全目的，或者帮助我们将宽表分解成更小、更规范化的表。现在是时候看看其他类型的数据库对象，找到可以修复的代码，以使我们的应用程序性能更好！


    # Part III CRUD Objects


    # 5. Triggers


    触发器是在数据更改时（或在某些情况下，模式更改时）运行的对象。它们可以针对表或视图运行，并且可以由插入、更新或删除操作触发。在视图上使用它们有一些注意事项（除了我个人的观点：请不要这样做）。


    每个触发器都有两个表，可用于查询已更改的数据。有一个 `INSERTED` 表和一个 `DELETED` 表。如果在 INSERT 上触发触发器，`INSERTED`
    表中将有记录，但 `DELETED` 表中没有。如果在 DELETE 上触发触发器，`DELETED` 表中将有记录，但 `INSERTED` 表中没有。如果在
    UPDATE 语句上触发触发器，`INSERTED` 和 `DELETED` 表中都会有一个包含相同主键值的记录，因此您可以将这些记录连接在一起以查找已更改的数据。


    ## View-Based Triggers


    一个注意事项是基于视图的触发器必须是 INSTEAD OF 触发器，这意味着触发器中的操作将代替对对象（此处为视图）执行的原始操作发生。例如，INSTEAD
    OF 触发器将运行一些其他代码，而不是允许删除操作发生，初始删除将不会发生，除非它在该 INSTEAD OF 触发器中被编码。


    INSTEAD OF 触发器是我们如果在更改表结构并使用覆盖它们的视图来处理遗留代码时会使用的。您仍然可以使用 INSTEAD OF 触发器来操作底层数据，从而对“视图”进行插入、更新和删除，从而使遗留应用程序代码能够针对新模式工作。


    ## When Should We Use Triggers?


    触发器似乎是执行业务逻辑的一种简单方法，但这种简单的答案可能很快失控。我没有找到很多触发器的良好用例；我发现的一个是使用临时的诊断触发器。我们可以使用诊断触发器来追踪难以追踪的、对数据进行更改的罪魁祸首。我相信还有其他一些用例，但在几乎所有情况下，触发器中的逻辑都可以通过数据访问层或应用程序以比使用触发器问题更少的方式处理。


    ## Common Issues with Triggers


    触发器代码可能非常难以调试。因此，数据完整性问题更容易在此处悄然出现。这在大多数类型的对象中都可能发生，但我发现完整性问题在触发器中更常见。让我们回到平常的工作日，那天我们过得很愉快。然后，我们收到用户
    1010297 的案例工单，说他们所有的 `Reputation` 积分都消失了，他们对此非常愤怒。可能发生了什么？


    首先，我们需要寻找可能导致 `Reputation` 积分更改的代码。当我们深入挖掘时，我们发现 `Users` 表上有一个触发器。当我们查看该触发器时，其功能似乎是：如果用户获得
    5 的倍数个 `DownVotes`，并且他们的 `Reputation` 大于 0，他们的 `Reputation` 将减少 1。我们的触发器代码如代码清单
    5-1 所示。


    ```sql

    IF NOT EXISTS (SELECT 1 FROM  sys.triggers

    WHERE name = ''iu_Users_DownVotes''

    )

    BEGIN

    DECLARE @SQL nvarchar(1200);

    SET @SQL = N''/**************************************************************************

    2019.06.30   LBohm                  INITIAL TRIGGER STUB CREATE RELEASE

    **************************************************************************/

    CREATE TRIGGER dbo.iu_Users_DownVotes ON dbo.Users

    FOR INSERT,UPDATE

    AS

    BEGIN

    SET NOCOUNT ON;

    IF NOT EXISTS (SELECT 1 FROM INSERTED)

    RETURN;

    END;'';

    EXECUTE SP_EXECUTESQL @SQL;

    END;

    GO

    /**************************************************************************

    Object Description: Reduces User Reputation after 5 DownVotes.

    Revision History:

    Date             Name             Label/PTS    Description

    -----------      ---------------  ----------   ------------------------------

    2019.06.30       LBohm                         Initial Release

    **************************************************************************/

    ALTER TRIGGER [dbo].[iu_Users_DownVotes] ON [dbo].[Users]

    FOR INSERT,UPDATE

    AS

    BEGIN

    SET NOCOUNT ON;

    -- if the DownVote count divided by 5 has no remainder, subtract 1 from the Reputation

    IF EXISTS (SELECT 1 FROM INSERTED i WHERE i.DownVotes > 0

    AND i.DownVotes % 5 = 0

    AND i.Reputation > 0)

    BEGIN

    UPDATE u

    SET u.Reputation = u.Reputation - 1

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0;

    END;

    INSERT INTO dbo.Triggerlog (id, thisDate, thisAction, descript)

    SELECT u.Id, getdate(), ''Update'', ''Update Reputation User table''

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0;

    END;

    GO

    ```


    代码清单 5-1 `iu_Users_DownVotes` 触发器定义


    让我们用用户 763725 进行测试，该用户的 `Reputation` 值为 1，有 4 个 `DownVotes`。额外的 DownVote 应使该用户达到
    5 个 `DownVotes`，并将其 `Reputation` 降低到 0。我们将使用代码清单 5-2 中的代码来测试当用户添加一个 DownVote 时会发生什么。


    ```sql

    DECLARE @userID int = 763725;

    SELECT Id, Reputation, DownVotes

    FROM dbo.Users

    WHERE Id = @userID;

    UPDATE dbo.Users

    SET DownVotes = DownVotes + 1

    WHERE Id = @userID;

    SELECT Id, Reputation, DownVotes

    FROM dbo.Users

    WHERE Id = @userID;

    ```


    代码清单 5-2 向用户 763725 添加一个 DownVote


    第一组结果（表 5-1）显示了用户的“之前”状态。我们看到用户的 `Reputation` 为 1，他们有 4 个 `DownVotes`。然后我们可以看到在添加
    DownVote 之后运行的相同 SELECT 语句的结果（表 5-2）。


    表 5-1 更新前用户 763725 的 `Reputation` 和 `DownVotes` 分数


    | Id      | Reputation | DownVotes |

    | ------- | ---------- | --------- |

    | 763725  | 1          | 4         |


    表 5-2 添加一个 DownVote 后用户 763725 的 `Reputation` 和 `DownVotes` 分数


    | Id      | Reputation | DownVotes |

    | ------- | ---------- | --------- |

    | 763725  | 0          | 5         |'
  raw: '## Why Use a View?


    All of these limitations and performance problems sound really unfortunate. Why
    would anyone use a view if there are all these possible traps and caveats? Well,
    as we discussed in the previous chapter, we can start splitting up wide tables
    by creating a view to allow older calls to refer to the view instead and then
    start breaking up the tables so any code we modify or write in the future can
    point to the smaller and more normalized tables.


    Additionally, views are really fantastic security tools. We can make sure that
    permissions to views are only given to the appropriate groups. For example, while
    HR might need to view social security numbers, no one else can or should be able
    to do so. If you have multiple divisions of a company, we can make sure each division
    uses their own view so they don’t have access to the other divisions’ data.


    ## Summary


    Hopefully you understand a bit more about the pitfalls that commonly surround
    views, especially the nesting problem. We also have learned that they can be useful
    for security purposes, or to help us break up wide tables into smaller, more normalized
    tables. Now it’s time to look at some other types of database objects to find
    code we can fix to make our application perform better!


    # Part IIICRUD Objects


    # 5. Triggers


    Triggers are objects that run when data changes (or in some cases, schema changes).
    They can run against tables or views and can be, well, triggered by inserts, updates,
    or deletes. There are some caveats on using them against a view (besides my personal
    opinion, which is: please don’t).


    Each trigger has two tables that you can use to query data that has changed. There
    is an `INSERTED` table and a `DELETED` table. If you are firing a trigger on an
    INSERT, there will be records in the `INSERTED` table but none in the `DELETED`
    table. If you are firing a trigger on a DELETE, there will be records in the `DELETED`
    table but none in the `INSERTED` table. If you fire the trigger on an UPDATE statement,
    there will be a record in both the `INSERTED` and `DELETED` tables that will contain
    the same primary key value, so you can join these records together to find data
    that has changed.


    ## View-Based Triggers


    One caveat is that view-based triggers must be INSTEAD OF triggers, meaning that
    the action in the trigger will happen instead of the original action performed
    against the object (here, a view). For example, instead of allowing a delete to
    happen, the INSTEAD OF trigger will run some other code, and the initial delete
    will not happen unless it is coded in that INSTEAD OF trigger.


    INSTEAD OF triggers are what we would use if we changed a table’s structure and
    used a view overlaying them to handle the legacy code. You could still insert,
    update, and delete to the “view” by using the INSTEAD OF triggers to manipulate
    the data underneath, allowing legacy application code to work against the new
    schema.


    ## When Should We Use Triggers?


    Triggers seem like a simple way of performing business logic, but this easy answer
    can spiral out of control very quickly. I haven’t found many good use cases for
    triggers; the one that I have found is to use a temporary diagnostic trigger.
    We can use diagnostic triggers to track down a culprit who is making changes in
    data that are difficult to track. I’m sure there are a few others out there, but
    in almost all cases, the logic in triggers can be handled by a data access layer
    or the application in a way that will be less problematic than using the trigger.


    ## Common Issues with Triggers


    Trigger code can be very difficult to debug. It’s easier for data integrity problems
    to creep in here because of this. This can happen in most types of objects, but
    I’ve seen integrity issues more commonly with triggers. Let’s go back to our normal
    day, where we’re having a lovely day at work. Then, we get a case ticket from
    user 1010297, saying that all their Reputation points disappeared, and they are
    pretty angry about this. What could have happened?


    First of all, we’ll need to look for the code that could have caused the change
    in the Reputation points. When we dig, we find that there is a trigger on the
    Users table. When we take a look at the trigger, it appears that the functionality
    entails a user who gains a multiple of 5 `DownVotes.` If their `Reputation` is
    greater than 0, they will get their `Reputation` reduced by 1\. We have our trigger
    code shown in Listing [5-1](#483961_1_En_5_Chapter.xhtml#PC1).


    ```

    IF NOT EXISTS (SELECT 1 FROM  sys.triggers

    WHERE name = ''iu_Users_DownVotes''

    )

    BEGIN

    DECLARE @SQL nvarchar(1200);

    SET @SQL = N''/**************************************************************************

    2019.06.30   LBohm                  INITIAL TRIGGER STUB CREATE RELEASE

    **************************************************************************/

    CREATE TRIGGER dbo.iu_Users_DownVotes ON dbo.Users

    FOR INSERT,UPDATE

    AS

    BEGIN

    SET NOCOUNT ON;

    IF NOT EXISTS (SELECT 1 FROM INSERTED)

    RETURN;

    END;'';

    EXECUTE SP_EXECUTESQL @SQL;

    END;

    GO

    /**************************************************************************

    Object Description: Reduces User Reputation after 5 DownVotes.

    Revision History:

    Date         Name             Label/PTS    Description

    -----------  ---------------  ----------   ------------------------------

    2019.06.30   LBohm                         Initial Release

    **************************************************************************/

    ALTER TRIGGER [dbo].[iu_Users_DownVotes] ON [dbo].[Users]

    FOR INSERT,UPDATE

    AS

    BEGIN

    SET NOCOUNT ON;

    -- if the DownVote count divided by 5 has no remainder, subtract 1 from the Reputation

    IF EXISTS (SELECT 1 FROM INSERTED i WHERE i.DownVotes > 0

    AND i.DownVotes % 5 = 0

    AND i.Reputation > 0)

    BEGIN

    UPDATE u

    SET u.Reputation = u.Reputation - 1

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0;

    END;

    INSERT INTO dbo.Triggerlog (id, thisDate, thisAction, descript)

    SELECT u.Id, getdate(), ''Update'', ''Update Reputation User table''

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0;

    END;

    GO

    Listing 5-1

    The iu_Users_DownVotes trigger definition

    ```


    Let’s test with user 763725, who has a `Reputation` value of 1 and 4 `DownVotes`.
    An additional DownVote should put this user at 5 `DownVotes` and lower their Reputation
    to 0\. We’ll use the code in Listing [5-2](#483961_1_En_5_Chapter.xhtml#PC2) to
    test what happens when we add a DownVote to the user.


    ```

    DECLARE @userID int = 763725;

    SELECT Id, Reputation, DownVotes

    FROM dbo.Users

    WHERE Id = @userID;

    UPDATE dbo.Users

    SET DownVotes = DownVotes + 1

    WHERE Id = @userID;

    SELECT Id, Reputation, DownVotes

    FROM dbo.Users

    WHERE Id = @userID;

    Listing 5-2

    Adding a DownVote to user 763725

    ```


    The first set of results, shown in Table [5-1](#483961_1_En_5_Chapter.xhtml#Tab1),
    show the “before” state of the user. We see that the user’s `Reputation` is 1
    and they have 4 `DownVotes`. We can then see the results of the same select statement,
    run after the addition of a DownVote, in Table [5-2](#483961_1_En_5_Chapter.xhtml#Tab2).


    Table 5-2


    User 763725’s Reputation and DownVotes score after adding a DownVote


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 763725 | 0 | 5 |


    Table 5-1


    User 763725’s Reputation and DownVotes score before an update


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 763725 | 1 | 4 |'
