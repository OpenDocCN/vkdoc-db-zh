  trans: '

    ## 计算


    计算过程中可能存在许多容易出错的地方。除零错误、括号导致错误结果，甚至并行度抑制都可能在计算中发现。在 `WHERE` 子句中对列进行计算，就像我们在前面代码清单
    2-7 示例中关于隐式转换所看到的那样，可能导致全表扫描；如果 `SQL Server` 需要确定某个字段中的值是否等同于根据另一个字段计算出的值，它就必须对每条记录执行计算以判断是否相等。


    此存储过程中的大多数计算都非常简单，例如将一或一个整数加到某个列或变量上。简单的计算通常不容易出问题。结尾处有一个除法计算，但有一个检查以避免除零错误。如
    `CASE` 语句所示（在代码清单 2-8 中再次展示），代码在执行计算前会显式检查除数是否不等于零。


    ```sql

    CASE

    WHEN fo.numPosts = 0

    THEN 0

    ELSE CAST(

    (

    SELECT MAX(ud.numPostsAnswered)

    FROM @usersDay ud

    WHERE ud.dayOfMonth = fo.dayOfMonth

    ) / fo.numPosts AS DECIMAL(8, 7))

    END

    ```


    代码清单 2-8：来自代码清单 2-1 的帖子百分比计算


    我们还需要检查此代码调用的所有数据库对象以进行计算，特别是所有表和视图。这看起来有点过分；但有一个很好的理由。任何引用包含使用用户定义标量函数的计算列的表或视图，即使查询中未引用该列，也会导致串行计划。这是一种并行度抑制器。“但你不希望你的查询并行运行，那表明性能不佳！”


    这并不完全正确。如果一个查询并行运行，这表明与该查询相关的成本高于并行度成本阈值（`SQL Server` 设置）。他们如何衡量这个成本？嗯，曾经有一个微软开发人员使用的计算机，一堆度量标准都绑定到这个任意的标准上。我和我的团队通常称这些单位为“Mysofts”，这通常向我们表明你可以将它们与其他……“东西”进行比较……但如何比较并不总是很清楚。但我跑题了。


    如果你有一个重量级的查询，它完全并行运行是完全可以的。毕竟，你拥有多个 `CPU`，就是为了分散密集型操作的负载。如果一个查询将消耗一定数量的 Mysofts，你希望它并行运行，因为经过的时间会短得多，你的用户也更不容易抱怨。你不希望因为多年前开发人员的某个任意错误而阻止这种情况发生。所以，去检查你的表和视图，确保没有任何计算列使用了标量函数。在代码清单
    2-1 中我们的代码情况下，没有这样的列。


    ## 临时表和/或表变量


    我们肯定需要记录我们正在记录的任何代码中出现的临时表和表变量：它们的宽度，我们在过程中对数据或定义进行的更改次数，以及我们认为每个表中会有多少行。更改临时表的定义，即使我们是在添加索引，也可能导致包含该临时表的存储过程重新编译。向临时表或表变量添加大量数据也可能导致包含的存储过程重新编译。


    临时表和表变量之间到底有什么区别？主要区别在于临时表具有统计信息以及更广泛的索引支持，而表变量没有统计信息，并且只能以几种特定方式创建索引。我们在第 1 章简要讨论过统计信息；这里我们特指与索引相关的数据点，这些点指示了每个索引值之间的数据分布情况。这就是为什么许多人会推荐对少量数据使用表变量（在我看来，我采用
    100 行或更少）。其他人对“少量”有不同的定义；你可能需要确定什么最适合你。推荐 100 行或更少的另一个原因是，优化器会假设表变量只有一行（同样，由于缺乏统计信息）。


    在代码清单 2-1 的存储过程中，我们既有表变量也有临时表。首先创建临时表 `#finalOutput`，其中最多有 31 行（一个月中的每一天一行）。它主要由
    `smallint` 列组成，尽管它有一个 `nvarchar(40)` 列、一个 `datetime` 列、一个 `decimal` 列和几个 `tinyint`
    列。这个表相当窄——它只包含几列。


    表变量 `@usersDay` 也很窄，但会有更多得多的行——每个在每一天回答问题的用户一行。`@usersDay` 中可能有数千行！


    这两个对象 `@usersDay` 和 `#finalOutput` 的定义在创建后都不会更改。根据代码，数据将在两者中多次更改。这些更改将一次一行地发生（除了临时表的最后一次更新外，所有的添加和更新都在循环中）。


    我们将把代码清单 2-9 中的信息添加到我们为代码清单 2-1 中的代码创建的文档中。


    ```

    #finalOutput 临时表，窄            最大可能行数 -  31

    插入：一次一行

    更新：一次一行（最后一次更新除外）

    @usersDay 表变量，窄          可能行数 - 数千

    插入：一次一行

    更新：一次一行

    ```


    代码清单 2-9：代码清单 2-1 中代码的表变量和临时表文档

