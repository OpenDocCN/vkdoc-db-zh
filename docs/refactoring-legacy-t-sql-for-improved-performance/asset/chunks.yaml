- fmt: '# What data are we still missing that the original report had?


    The columns we haven’t accounted for yet are `DayofWeek`, `DayofMonth`, and the
    percentage of posts. Unfortunately, the percentage of posts metric is ridiculous;
    it’s always going to be so small as to be almost negligible. Consider the August
    10th results from Table [6-9](#483961_1_En_6_Chapter.xhtml#Tab9). The metric value
    would equal `26/9360`, which will be an extremely tiny number. However, we’ll
    put this column in our set of results, because the original functionality includes
    that metric.


    Also, let’s make sure we’re outputting the columns in the same order with the
    same names, in order to avoid potential report changes on the application or reporting
    side. We never did have the number of accepted answers by that highest user on
    that day in the original output, but it was in the spec, so we’ll leave it as
    the last column in case someone wants to add it to the report. If the column causes
    issues there, we can always comment it out if need be in the final output. When
    we add all the code for these additional values, we get the query in Listing [6-11](#483961_1_En_6_Chapter.xhtml#PC28).


    ```sql

    SELECT secInfo.createDate AS monthYear

    , DATEPART(dd, secInfo.CreateDate) AS [dayOfMonth]

    , DATEPART(dw, secInfo.createDate) AS [dayOfWeek]

    , COUNT(secInfo.Id) AS numPosts

    , SUM(secInfo.AnswerCount) AS numResponses

    , MAX(secInfo.numDistinctUsers) AS numUsersResponded

    , MAX(secInfo.maxPostsUser) AS highNumUsersSinglePost

    , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.DisplayName
    ELSE NULL END) AS userMostResponses

    , CAST(MAX(secInfo.maxPostsUser)/COUNT(secInfo.Id) * 100 AS DECIMAL(8,7)) AS percentagePosts

    , MAX(secInfo.maxUpvotes) AS numHighestUpvotesOneAnswer

    , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.numAccepted
    ELSE 0 END) AS numAccepted

    FROM (

    SELECT theInfo.Id

    , theInfo.createDate

    , theInfo.AnswerCount

    , MAX(theInfo.Score) OVER (PARTITION BY theInfo.createDate) AS maxUpvotes

    , MAX(theInfo.numPostsUser) OVER (PARTITION BY theInfo.createDate) AS maxPostsUser

    , theInfo.numPostsUser

    , theInfo.DisplayName

    , MAX(theInfo.numUsersPost) OVER (PARTITION BY theInfo.createDate) AS maxNumUsersPost

    , theInfo.numAccepted

    , SUM(CASE WHEN theInfo.theUserRowNum = 1 THEN 1 ELSE 0 END) OVER (PARTITION BY
    theInfo.createDate) AS numDistinctUsers

    , ROW_NUMBER() OVER (PARTITION BY Id ORDER BY numPostsUser DESC) AS theIDRow

    FROM (

    SELECT p.Id

    , CAST(p.CreationDate AS DATE) AS createDate

    , p.AnswerCount

    , pUser.Score

    , COUNT(pUser.ParentId) OVER (PARTITION BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId)
    AS numPostsUser

    , COUNT(pUser.OwnerUserId) OVER (PARTITION BY CAST(p.CreationDate AS DATE), pUser.ParentId)
    AS numUsersPost

    , pUser.ParentId

    , pUser.OwnerUserId

    , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION
    BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId) AS numAccepted

    , u.DisplayName

    , ROW_NUMBER() OVER (PARTITION BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId
    ORDER BY pUser.ParentId DESC) AS theUserRowNum

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))

    AND pUser.PostTypeId = 2

    LEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId = u.Id

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120901''

    AND p.PostTypeId = 1

    ) theInfo

    ) secInfo

    WHERE secInfo.theIDRow = 1

    GROUP BY secInfo.createDate

    ORDER BY secInfo.createDate;

    ```

    Listing 6-11: Final code to replace original `dailySummaryReportByMonth` stored
    procedure code.


    ## No Missing Rows – Tally Tables!


    We need to put it back into the framework of a stored procedure. And what if there
    are no posts in a day? We’d be missing lines, and we might get a divide-by-zero
    error. It would be unlikely that this would happen, but we could use a numbers
    or tally table to make sure that we get a row for every day whether there are
    posts or not. A numbers table is simply a table with a single incrementing integer
    column with a primary key/clustered index that allows you to “iterate” in a set-based
    way. Our numbers table in this database is `dbo.Numbers` and contains 5 million
    rows.


    We want to make our query from Listing [6-11](#483961_1_En_6_Chapter.xhtml#PC28)
    a `LEFT OUTER JOIN` to our `Numbers` table, so we definitely get one row returned
    for every date even if there is no data in that row. We need to then make sure
    we group on our `Numbers` record instead of the code in Listing [6-11](#483961_1_En_6_Chapter.xhtml#PC28),
    because if you leave references to the `LEFT OUTER JOIN` in the `WHERE` clause
    and your `GROUP BY`, it will get treated as an `INNER JOIN`, and you’ll still
    lose the rows we’re trying to avoid by using the `Numbers` table. Let’s run the
    code in Listing [6-12](#483961_1_En_6_Chapter.xhtml#PC29).


    ```sql

    SELECT COUNT(1) as numPosts

    , CAST(CreationDate AS DATE) AS theDate

    FROM dbo.Posts

    WHERE CreationDate >= ''20080715''

    AND CreationDate < ''20080816''

    GROUP BY CAST(CreationDate AS DATE)

    ORDER BY CAST(CreationDate AS DATE);

    ```

    Listing 6-12: Code over dates without posts.


    The output of this query is shown in Table [6-10](#483961_1_En_6_Chapter.xhtml#Tab10).
    We’re missing the dates from 7/15/2008 until 7/31/2008 (the minimum `creationdate`
    in the table). However, we can use the `Numbers` table to show these dates even
    though there are no posts.


    **Table 6-10**: Results from the code in Listing [6-12](#483961_1_En_6_Chapter.xhtml#PC29)


    | numPosts | theDate |

    | --- | --- |

    | 6 | 2008-07-31 |

    | 140 | 2008-08-01 |

    | 94 | 2008-08-02 |

    | 132 | 2008-08-03 |

    | 326 | 2008-08-04 |

    | 515 | 2008-08-05 |

    | 504 | 2008-08-06 |

    | 588 | 2008-08-07 |

    | 448 | 2008-08-08 |

    | 231 | 2008-08-09 |

    | 188 | 2008-08-10 |

    | 454 | 2008-08-11 |

    | 553 | 2008-08-12 |

    | 526 | 2008-08-13 |

    | 633 | 2008-08-14 |

    | 593 | 2008-08-15 |


    ```sql

    DECLARE @numDays tinyint = DATEDIFF(dd, ''20080715'', ''20080816'');

    SELECT COALESCE(numPosts,0) AS numPosts

    , DATEADD(dd, n-1, ''20080715'') AS theDate

    , num.n

    FROM dbo.numbers num

    LEFT OUTER JOIN (SELECT COUNT(1) as numPosts

    , CAST(creationdate AS date) AS theDate

    FROM dbo.Posts

    WHERE CreationDate >= ''20080715''

    AND CreationDate < ''20080816''

    GROUP BY CAST(CreationDate AS DATE)

    ) postInfo ON DATEADD(dd, n-1, ''20080715'') = postInfo.theDate

    WHERE num.n <= @numdays

    ORDER BY num.n;

    ```

    Listing 6-13: Showing dates without posts using the `Numbers` table.


    The code in Listing [6-13](#483961_1_En_6_Chapter.xhtml#PC30) shows us how, by
    using the `Numbers` table, we cause a record to be generated for each date whether
    or not there are posts on those dates. We might get the `numPosts` equal to `0`,
    but this is the correct count of posts for that day! We can see the results in
    Table [6-11](#483961_1_En_6_Chapter.xhtml#Tab11).


    **Table 6-11**: The results of the code from Listing [6-13](#483961_1_En_6_Chapter.xhtml#PC30).'
