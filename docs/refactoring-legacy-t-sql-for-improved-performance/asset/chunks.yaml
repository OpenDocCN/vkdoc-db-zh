    \ | 0 | 5 | 11 | 0 | Analytical |\n| 1401298 | joel garringer | 0 | 0 | 1 | 0\
    \ | 0 | Teacher |\n| 5416 | Joel Martinez | 352 | 297 | 758 | 1146 | 75 | [asp.​net](http://asp.net)\
    \ |\n| 371344 | Joel Spadin | 1 | 0 | 7 | 4 | 0 | Supporter |\n| 2456626 | Joel\
    \ | 4 | 0 | 0 | 5 | 0 | Teacher |\n| 1518500 | Joell Lapitan | 0 | 0 | 1 | 0 |\
    \ 0 | NULL |\n| 766590 | joelennon | 0 | 0 | 1 | 1 | 0 | Autobiographer |\n| 2457739\
    \ | Joel | 1 | 0 | 0 | 0 | 0 | Student |\n| 512776 | Joel R | 6 | 1 | 1 | 3 |\
    \ 0 | Editor |\n\nThe `STATISTICS IO` and `TIME` output from running the code\
    \ in [Listing 6-15](#483961_1_En_6_Chapter.xhtml#PC33) against the proc in [Listing\
    \ 6-19](#483961_1_En_6_Chapter.xhtml#PC39) shows fewer reads, although there are\
    \ still fairly high numbers. However, the code is running in about a minute (which\
    \ is a pretty big gain over the hour it was taking to run):\n\n```\nSQL Server\
    \ parse and compile time:\nCPU time = 0 ms, elapsed time = 0 ms.\nSQL Server parse\
    \ and compile time:\nCPU time = 0 ms, elapsed time = 0 ms.\n(876 rows affected)\n\
    Table 'Worktable'. Scan count 42764, logical reads 24644589, physical reads 0,\
    \ read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
