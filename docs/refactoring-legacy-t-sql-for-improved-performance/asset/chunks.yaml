  trans: '

    # 检测值是否发生变化


    ```

    DECLARE @theTable TABLE (id int);

    INSERT INTO @theTable (id)

    VALUES (1010297)

    , (1639596)

    , (22)

    , (123);

    SELECT tb.id

    , u.Reputation

    , u.DownVotes

    , u.UpVotes

    FROM @theTable tb

    INNER JOIN dbo.Users u ON tb.id = u.Id;

    UPDATE u

    SET UpVotes = u.UpVotes + 1

    , DownVotes = u.DownVotes

    FROM dbo.Users u

    INNER JOIN @theTable tb ON u.Id = tb.id;

    SELECT tb.id

    , u.Reputation

    , u.DownVotes

    , u.UpVotes

    FROM @theTable tb

    INNER JOIN dbo.Users u ON tb.id = u.Id;

    代码清单 5-13

    增加四个用户的升票数

    ```


    代码清单 5-13 中查询语句执行前的结果如表 5-11 所示。我们看到有两个用户的 `DownVotes` 能被 5 整除，而另外两个则不能。不过，这应该无关紧要，因为我们反正没有修改
    `DownVotes`，对吧？修改后的结果如表 5-12 所示。


    表 5-12

    代码清单 5-13 中代码执行后的结果


    | id | Reputation | DownVotes | UpVotes |

    | --- | --- | --- | --- |

    | 1010297 | 25 | 14 | 162 |

    | 1639596 | 1 | 3 | 12 |

    | 22 | 12815 | 5 | 203 |

    | 123 | 29211 | 40 | 420 |


    表 5-11

    代码清单 5-13 中代码执行前的结果


    | Id | Reputation | DownVotes | UpVotes |

    | --- | --- | --- | --- |

    | 1010297 | 25 | 14 | 161 |

    | 1639596 | 1 | 3 | 11 |

    | 22 | 12816 | 5 | 202 |

    | 123 | 29212 | 40 | 419 |


    表 5-12 向我们揭示了另一个问题！最后两条记录的 `Reputation` 被减少了，但我们并没有更改 `DownVotes`。我们是在检查 `DownVotes`
    是否被修改了吗？嗯，不，我们没有。我们只是检查它们是否能被 5 整除且大于零。不过，对于触发器，有一个 `UPDATE()` 函数可以用来确定这一点，对吧？首先，让我们用代码清单
    5-14 中的代码来恢复用户数据。


    ```

    DECLARE @theTable TABLE (id int, upvotes int, Reputation int);

    INSERT INTO @theTable (id, upvotes, Reputation)

    VALUES (1010297, 161, 25)

    , (1639596,11,1)

    , (22,203,12815)

    , (123,420,29211);

    UPDATE u

    SET u.Reputation = t.Reputation

    , u.UpVotes = t.upvotes

    FROM dbo.Users u

    INNER JOIN @theTable t ON u.Id = t.id;

    代码清单 5-14

    为四个用户恢复数据

    ```


    然后我们想添加 `UPDATE()` 函数来检查 `DownVotes` 是否被更新了。如果 `DownVotes` 没有被更新，只是碰巧能被 5 整除，这应该能解决用户
    `Reputation` 被减少的问题。我们可以在代码清单 5-15 中看到 `UPDATE` 函数的语法。


    ```

    IF EXISTS (SELECT 1 FROM INSERTED i WHERE i.DownVotes > 0

    AND i.DownVotes % 5 = 0

    AND i.Reputation > 0

    AND UPDATE(DownVotes))

    BEGIN

    UPDATE u

    SET u.Reputation = u.Reputation - 1

    FROM dbo.Users u

    INNER JOIN INSERTED i ON u.Id = i.Id

    WHERE i.Reputation > 0

    AND i.DownVotes > 0

    AND i.DownVotes % 5 = 0

    AND UPDATE(DownVotes);

    代码清单 5-15

    需添加到代码清单 5-1 触发器中的 UPDATE 函数检查

    ```


    一旦我们将这段代码放入代码清单 5-1 的触发器中，我们就可以重新运行代码清单 5-13 的代码。查看结果时，我们发现无论是修改前的还是修改后的 `SELECT`
    语句，结果都完全一样！修改后的结果集与我们表 5-12 中看到的一样，显示最后两个用户的 `Reputation` 再次被减少了，尽管我们添加了 `UPDATE()`
    语句。这是怎么回事？


    嗯，在我们的 `UPDATE` 语句中，从技术上讲，我们更新了该值，尽管我们并没有 *改变* 它的值。这是一个人们经常忽视的重大“陷阱”。如果值是否真的改变很重要（我猜如果你把它放在触发器里，那它就是重要），我们需要检查值是否真的改变了。我们可以通过检查
    `INSERTED` 和 `DELETED` 表中的值是否不同来实现。但这也是一个 `INSERT` 和 `UPDATE` 触发器，所以可能并非每条记录都有一个
    `DELETED` 值——那个值可能是 `NULL`。我们该怎么做？实际上我们可以做得很优雅，这要感谢 Itzik Ben-Gan 教给了我代码清单 5-16
    中展示的技术，它避免了通常用于空值处理的许多 `CASE` 语句，同时仍然能处理 `NULL` 与指定值不同的情况。


    ```

    IF EXISTS (SELECT 1 FROM INSERTED i WHERE i.DownVotes > 0

