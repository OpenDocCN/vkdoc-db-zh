    ON; line and before the comment about the `DownVotes` count. We should test this,
    but first let’s restore the poor user’s Reputation using the code in Listing [5-8](#483961_1_En_5_Chapter.xhtml#PC8).


    ```

    DECLARE @userID int = 1010297;

    UPDATE u

    SET Reputation = 25

    , DownVotes = 14

    FROM dbo.Users u

    WHERE Id = @userID;

    Listing 5-8

    Restoring user 1010297’s Reputation

    ```


    Once we’ve added the code in Listing [5-7](#483961_1_En_5_Chapter.xhtml#PC7) to
    our trigger and run the alter statement, we can run the test statements in Listing
    [5-3](#483961_1_En_5_Chapter.xhtml#PC3) again. The “before” results, shown in
    Table [5-6](#483961_1_En_5_Chapter.xhtml#Tab6), are the same results as in Table
    [5-3](#483961_1_En_5_Chapter.xhtml#Tab3).


    Table 5-6


    User 1010297’s Reputation and DownVotes score after restore and before an update


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 25 | 14 |


    The “after update” results, shown in Table [5-7](#483961_1_En_5_Chapter.xhtml#Tab7),
    are much more what we had in mind. The `DownVotes` value is increased by 1, and
    the `Reputation` is only decreased by 1\. This in itself shows that the TRIGGER_NESTLEVEL()
    was successful in removing recursion, but we should also look at our `Triggerlog`
    table. A check, using the code in Listing [5-5](#483961_1_En_5_Chapter.xhtml#PC5),
    will show you only a single record for the trigger at the time you ran the code
    in Listing [5-3](#483961_1_En_5_Chapter.xhtml#PC3) for the second time.


    Table 5-7


    User 1010297’s Reputation and DownVotes score after restore and after update to
    DownVotes


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 24 | 15 |'
