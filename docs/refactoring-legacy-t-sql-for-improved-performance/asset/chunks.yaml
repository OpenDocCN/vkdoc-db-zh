    # SQL 存储过程文档：每日月度汇总报告


    ## 存储过程代码


    ```sql

    IF NOT EXISTS

    (

    SELECT 1

    FROM sys.procedures

    WHERE name = ''DailySummaryReportPerMonth''

    )

    BEGIN

    DECLARE @SQL NVARCHAR(1200);

    SET @sQL = N''/*************************************************************************    2019.05.26    LBohm            INITIAL
    STORED PROC STUB CREATE RELEASE

    **************************************************************************/

    CREATE PROCEDURE dbo.DailySummaryReportPerMonth

    AS

    SET NOCOUNT ON;

    BEGIN

    SELECT 1;

    END;'';

    EXECUTE SP_EXECUTESQL @SQL;

    END;

    GO

    /**************************************************************************

    Description: Data for daily report for a month

    --Test call:

    -- EXECUTE dbo.DailySummaryReportPerMonth @monthYear = ''20180801'';

    2019.05.26     LBohm          INITIAL RELEASE

    **************************************************************************/

    ALTER PROCEDURE [dbo].[DailySummaryReportPerMonth] @monthYear DATETIME

    AS

    /* in case the first day of the month not passed in */

    SET @monthYear = DATEADD(month, DATEDIFF(month, 0, @monthYear), 0);

    DECLARE @postID           INT

    , @dayOfMonth       TINYINT

    , @numAnswers       INT

    , @numUsers         INT

    , @acceptedAnswerID INT

    , @userID           INT

    , @displayName      NVARCHAR(40)

    , @isAccepted       BIT

    , @userCtThisPost   SMALLINT

    , @numUpvotes       SMALLINT;

    CREATE TABLE #finalOutput

    ( monthYear                  DATETIME

    , dayOfMonth                 TINYINT

    , dayOfWeek                  TINYINT

    , numPosts                   SMALLINT

    , numResponses               SMALLINT

    , numUsersResponded          SMALLINT

    , highNumUsersSinglePost     SMALLINT

    , userMostResponses          NVARCHAR(40) -- DisplayName

    , percentagePosts            DECIMAL(8, 7)

    , numHighestUpvotesOneAnswer SMALLINT

    );

    DECLARE @usersDay TABLE

    ( dayOfMonth          TINYINT

    , userID              INT

    , displayName         NVARCHAR(40)

    , numPostsAnswered    SMALLINT

    , numAcceptedAnsPosts SMALLINT

    );

    /* get first post in the time period that isn''t a comment or answer */

    SET @postID = COALESCE(

    (

    SELECT MIN(Id)

    FROM dbo.Posts

    WHERE DATEADD(month, DATEDIFF(month, 0, CreationDate), 0) = @monthYear

    AND postTypeId = 1

    ), 0);

    /* get all posts in the time period that aren''t comments or answers */

    WHILE @postID > 0

    BEGIN

    SELECT @numAnswers = p.AnswerCount

    , @acceptedAnswerid = p.AcceptedAnswerId

    , @dayofmonth = DATEPART(dd, p.CreationDate)

    FROM dbo.Posts p

    WHERE p.Id = @postID;

    IF EXISTS

    (

    SELECT 1

    FROM #finalOutput

    WHERE dayOfMonth = @dayOfMonth

    )

    BEGIN

    -- update

    UPDATE fo

    SET fo.numPosts = fo.numPosts + 1

    , fo.numResponses = fo.numResponses + @numAnswers

    FROM #finalOutput fo

    WHERE fo.dayOfMonth = @dayOfMonth;

    END;

    ELSE

    BEGIN

    -- insert

    INSERT INTO #finalOutput

    ( monthYear

    , dayOfMonth

    , dayOfWeek

    , numPosts

    , numResponses

    , numUsersResponded

    , highNumUsersSinglePost

    , userMostResponses

    , numHighestUpvotesOneAnswer

    )

    VALUES

    ( @monthYear

    , @dayOfMonth

    , DATEPART(dw, DATEADD(dd, @dayOfMonth - 1, @monthYear))

    , 1

    , @numAnswers

    , 0

    , 0

    , "

    , 0

    );

    END;

    /*  now the user stuff */

    SET @userCtThisPost = 0;

    SET @userID = COALESCE(

    (

    SELECT MIN(p.OwnerUserId)

    FROM dbo.Posts p

    WHERE p.ParentId = @postID

    AND p.PostTypeId = 2

    ), 0);

    WHILE @userID > 0

    BEGIN

    SET @isAccepted = COALESCE(

    (

    SELECT 1

    FROM dbo.Posts p

    WHERE p.OwnerUserId = @userID

    AND p.ParentId = @postID

    AND p.Id = @acceptedAnswerID

    ), 0);

    SET @userCtThisPost = @userCtThisPost + 1;

    SET @numUpvotes = COALESCE(

    (

    SELECT MAX(p.Score)

    FROM dbo.Posts p

    WHERE p.OwnerUserId = @userID

    AND p.ParentId = @postID

    ), 0);

    UPDATE fo

    SET fo.numUsersResponded = fo.numUsersResponded + 1

    , fo.numHighestUpvotesOneAnswer = CASE

    WHEN @numUpvotes > fo.numHighestUpvotesOneAnswer

    THEN @numUpvotes

    ELSE fo.numHighestUpvotesOneAnswer

    END

    FROM #finalOutput fo

    WHERE fo.dayOfMonth = @dayOfMonth;

    /* add records to user table for later calculations */

    IF EXISTS

    (

    SELECT 1

    FROM @usersDay

    WHERE dayOfMonth = @dayOfMonth

    AND userID = @userID

    )

    BEGIN

    UPDATE ud

    SET ud.numPostsAnswered = ud.numPostsAnswered + 1

    , ud.numAcceptedAnsPosts = ud.numAcceptedAnsPosts + @isAccepted

    FROM @usersDay ud

    WHERE dayOfMonth = @dayOfMonth

    AND userID = @userID;

    END;

    ELSE

    BEGIN

    INSERT INTO @usersDay

    ( dayOfMonth

    , userID

    , displayName

    , numPostsAnswered

    , numAcceptedAnsPosts

    )

    SELECT @dayOfMonth

    , @userID

    , u.displayName

    , 1

    , @isAccepted

    FROM dbo.Users u

    WHERE u.Id = @userID;

    END;

    SET @userID = COALESCE(

    (

    SELECT MIN(p.OwnerUserId)

    FROM dbo.Posts p

    WHERE p.ParentId = @postID

    AND p.PostTypeId = 2

    AND p.OwnerUserId > @userID

    ), 0);

    END;

    UPDATE fo

    SET

    fo.highNumUsersSinglePost = CASE

    WHEN @userCtThisPost > fo.highNumUsersSinglePost

    THEN @userCtThisPost

    ELSE fo.highNumUsersSinglePost

    END

    FROM #finalOutput fo

    WHERE fo.dayOfMonth = @dayOfMonth;

    /* get next post ID */

    SET @postID = COALESCE(

    (

    SELECT MIN(Id)

    FROM dbo.Posts

    WHERE DATEADD(month, DATEDIFF(month, 0, CreationDate), 0) = @monthYear

    AND PostTypeId = 1

    AND Id > @postID

    ), 0);

    END;

    /* final day user calculations */

    UPDATE fo

    SET

    fo.userMostResponses =

    (

    SELECT ud.displayName

    FROM @usersDay ud

    WHERE ud.dayOfMonth = fo.dayOfMonth

    AND ud.numPostsAnswered =

    (

    SELECT MAX(udm.numPostsAnswered)

    FROM @usersDay udm

    WHERE ud.dayOfMonth = fo.dayOfMonth

    )

    )

    , fo.percentagePosts = CASE

    WHEN fo.numPosts = 0

    THEN 0

    ELSE CAST(

    (

    SELECT MAX(ud.numPostsAnswered)

    FROM @usersDay ud

    WHERE ud.dayOfMonth = fo.dayOfMonth

    ) / fo.numPosts AS DECIMAL(8, 7))

    END

    FROM #finalOutput fo;

    SELECT *

    FROM #finalOutput;

    ```


    ## 功能需求


    对于给定月份中的每一天，我需要了解：


    *   发布了多少问题？

    *   针对这些问题发布了多少答案（不考虑日期）？

    *   有多少独立用户回答了这些帖子？

    *   在该月份中，回答单个问题的独立用户最高数量是多少？

    *   哪位用户回答了该月份中最多的问题？

    *   该用户回答了多少个问题？

    *   这占该月份发布的问题总数的百分比是多少？

    *   这些回答中有多少被标记为接受的答案？


    ## 数据调用


    | 表 | 操作 | 返回的列 | 过滤条件 |

    | --- | --- | --- | --- |

    | `dbo.posts` | `Select` | `MIN(Id)` | `CreationDate`, `PostTypeId` |

    |   | `Select` | `AnswerCount`, `AcceptedAnswerId`, `CreationDate` | `Id` |

    |   | `Select` | `MIN(OwnerUserId)` | `ParentId`, `PostTypeId` |

    |   | `Select` | `1` | `OwnerUserId`, `ParentId`, `Id` |

    |   | `Select` | `MAX(Score)` | `OwnerUserId`, `ParentId` |

    |   | `Select` | `MIN(Id)` | `CreationDate`, `PostTypeId`, `Id` |

    |   | `Select` | `MIN(OwnerUserId)` | `ParentId`, `PostTypeId`, `OwnerUserId`
    |

    | `#finalOutput` | `Exists` |   | `dayOfMonth` |

    |   | `Insert or update` | Row OR `numPosts`, `numResponses` | 单条记录 (`dayOfMonth`)
    |

    |   | `Update` | `numUsersResponded`, `numHighestUpvotesOneAnswer` | 单条记录 (`dayOfMonth`)
    |

    |   | `Update` | `highNumUsersSinglePost` | 单条记录 (`dayOfMonth`) |

    |   | `Update` | `userMostResponses`, `percentagePosts` | 单条记录 (`dayOfMonth`)
    |

    |   | `Select` | `*` |   |

    | `@usersDay` | `Exists` |   | 单条记录 (`userID/dayOfMonth`) |

    |   | `Insert or update` | Row OR `numPostsAnswered`, `numAcceptedAnsPosts` |
    单条记录 (`userID/dayOfMonth`) |

    |   | `Select` | `displayName` | `dayOfMonth`, `numPostsAnswered` |

    |   | `Select` | `Max(numPostsAnswered)` | `dayOfMonth` |

    |   | `Select` | `Max(numPostsAnswered)` | `dayOfMonth` |

    | `dbo.Users` | `Select` | `DisplayName` | 单条记录 (`Id`) |


    ## 编码（反）模式


    ### 数据类型匹配


    所有临时表、表变量和参数的数据类型都与数据库表中相应字段的数据类型相匹配。


    ### 子查询


    唯一的子查询出现在调用`@usersDay`以查找某些聚合值时（最后一次更新`#finalOutput`）。


    ### 计算


    大多数计算非常简单（向列或变量加一或一个整数）。最后有一个除法计算，但有检查以避免除零错误。

    '
- fmt: "#### 临时表和/或表变量\n\n*   `#finalOutput`临时表，可能的最大行数较少（约31行）\n    *   插入：一次一行\n\
    \    *   更新：一次一行（最后一次更新除外）\n\n*   `@usersDay`表变量，可能的行数稍多（几千行）\n    *   插入：一次一行\n\
    \    *   更新：一次一行\n\n#### 循环/游标\n\n*   `While`循环遍历某个月的所有问题帖子（大约50k到150k）\n*   `While`循环处理每个用户对帖子的回复（大约两个用户）\n\
    \n#### 公用表表达式 (CTEs)\n\n未使用。\n\n#### 连接类型\n\n使用了标准的连接类型，连接语法正确。\n\n#### LIKE,\
    \ NOT LIKE 和 NOT IN\n\n未使用。\n\n#### 排序操作\n\n*   在时间范围内获取`Posts`表的`MIN(Id)`\n*\
    \   根据`ParentId`获取`Posts`表的`MIN(OwnerUserId)`\n\n#### 对其他用户定义SQL对象的调用\n\n对`dbo.Posts`表的`Select`语句。\n\
    \n#### WHERE子句中的原生SQL函数\n\n两条设置`@postID`的语句都使用了`DATEADD/DATEDIFF`函数。\n\n#### 索引\n\
    \n目前无法确定。\n\n### 第二部分：数据库结构\n\n### 3. 数据库表\n\n在接下来的章节中，我们将研究一些不同的数据库对象，并找出每个对象常见的一些反模式。我们已经讨论了许多适用于代码的反模式，例如存储过程、函数、视图，甚至即兴的SQL语句。然而，每种对象类型都有其独特的陷阱。\n\
    \n在本章中，我们将更仔细地研究表。如果访问某个表的每段代码都很慢，那么就应该检查表的定义。我们具体要在该定义中寻找什么？第2章的信息并没有真正涵盖表，除了提到计算列。好吧，让我们从那里开始！\n\
    \n#### 计算列\n\n如果编码不够谨慎，计算可能会产生一些意外影响。确保你的表中没有任何计算列包含用户定义的标量函数。即使这些列没有出现在查询输出中，它们也可能导致查询无法并行运行。有时，聪明的（过于聪明的？）数据库管理员会在表中添加除数为零的列，以揪出那些在查询中使用`SELECT\
    \ *`的“捣蛋”开发者。如果有人尝试对包含除数为零计算的列定义的表运行`SELECT *`查询，查询将失败并显示错误消息。这是一种确保良好习惯的“狡猾”方式，但教育编写代码的人比在数据库中埋设“地雷”更合适。\n\
    \n#### 反规范化数据\n\n如果你不熟悉规范化，你可能应该花点时间阅读相关内容。简单来说，规范化是一套关于关系数据库中的数据应该如何以及不应该如何……“关联”的规则实践。大多数人建议遵循到第三范式（3NF）。除了3NF之外还有更多的规范化级别，但3NF是当前大多数人建议遵守的标准可接受级别。\n\
    \n第一范式（1NF）规定，在任何给定的单元格中应该只有一个值。一种经常违反此规则的方式是在单个单元格中包含逗号分隔的值列表。1NF还指出，不允许有重复的列组——例如，拥有`comment1`、`comment2`等列。此外，根据1NF的规则，任何数据值应该只存储在一个地方。最后，表中的所有行都应该是唯一的，并且具有主键。\n\
    \n主键是记录的唯一标识符。它不必是GUID数据类型；相反，每条记录的值必须是唯一的。这可以是单列，也可以是其集合值构成唯一键的多列组合。多列主键可能会引起关注，但我们将在本章后面讨论这一点。\n\
    \n第二范式（2NF）可能稍微难理解一些。记录中的每个非键值都需要完全依赖于键值。一个稍微不那么正式的说法是，确保表中的所有数据都直接与键相关。例如，你希望发帖用户的ID在`Posts`表中，但你不需要在`Posts`表中存储专门关于用户的信息；你只想存储关于帖子的信息。相反，我们应该有一个单独的表来存储用户信息（如昵称），并在`Posts`表中有一个用户ID（在我们的数据库中是`OwnerUserID`），该ID指回`Users`表中的`id`。`OwnerUserID`将被视为外键，它指向`Users`表的主键（或Id字段）。正确设置的外键约束也能提高数据库性能。\n\
    \n3NF类似，你需要将表中任何不直接依赖于键的字段移出该表。假设用户的最喜欢的颜色是`Posts`表中的一个列。最喜欢的颜色列应该移到`Users`表中，而不是留在`Posts`表中。颜色与帖子`ID`没有直接关系；它直接与用户相关。因此，它应该在一个具有与用户相关键的表中。\n\
    \n我们来编一个关于`dbo.WidePosts`表的故事。假设它是StackOverflow数据库的原始表，并且可能仍用于遗留报告。随着应用程序的增长，表被添加或更改。那么这个表发生了什么变化？\n\
    \n如果你去查看`WidePosts`表的定义（或列列表），你会看到……嗯，首先，它很宽（有很多列）。其次，`commentid1`、`commentid2`以及所有这些带数字的评论列是什么？看起来是评论信息的反规范化，而这正是它的本质。这样做的一个问题是你不能为每个帖子拥有超过五条评论，这有些限制。此外，很难区分不同的评论。这个表定义未能满足第一和第二范式的定义。\n\
    \n我们在这个`WidePosts`表中还有关于用户的信息，这导致该表未能满足第三范式的定义。我特意创建了这个表用于演示；它不是StackOverflow数据库中的标准表之一。"
