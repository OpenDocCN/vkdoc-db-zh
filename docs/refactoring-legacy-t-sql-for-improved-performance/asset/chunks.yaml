    \ 232, read-ahead reads 43744, lob logical reads 0, lob physical reads 0, lob\
    \ read-ahead reads 0.\nTable 'Users'. Scan count 1, logical reads 3696, physical\
    \ reads 125, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob\
    \ read-ahead reads 0.\nSQL Server Execution Times:\nCPU time = 59125 ms,  elapsed\
    \ time = 61267 ms.\nSQL Server Execution Times:\nCPU time = 59125 ms,  elapsed\
    \ time = 61267 ms.\n```\n\nWhile working through this rewrite, I tried a `CROSS\
    \ APPLY` for both the `Posts` table and the `Votes` table, but the performance\
