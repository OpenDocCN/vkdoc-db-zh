    ### 循环与/或游标


    清单 2-1 中存储过程的循环使用之处，正是其“闪光”所在；我指的是那种带着邪恶红光的“闪光”。该过程遍历一个月时间跨度内的每一个帖子，然后在此循环内部，又遍历每个回复该帖子的用户。通常，前端开发人员以过程化方式思考。事实上，大多数人都是以过程化方式思考的。“我做这个，然后做那个，再做这个，然后我取下一个，重复同样的事情。”关系型数据库本意是为批处理优化，但训练我们自己以批处理一切的方式思考是困难的，因为生活中真正以这种方式运作的事情少之又少。


    随着我们深入探讨重写清单 2-1 中的代码，我们将更深入地讨论与循环相关的顾虑，但就文档记录而言，我们只想确保在看到任何逐行处理的地方都加以记录，比如前面提到的两个循环。你经常会听到
    `RBAR` 这个缩写，用来描述使用逐行处理的代码。`RBAR` 这个缩写由杰夫·莫登（Jeff Moden）创造，代表“逐行痛苦处理”。


    关于清单 2-1 代码的文档记录，首先我们会了解每月录入的帖子数量，这将指示第一个循环需要处理的记录数。我们使用清单 2-10 中的代码来实现这一点。


    ```sql

    SELECT COUNT(1) as NumPosts

    , DATEPART(year,CreationDate)

    , DATEPART(m, CreationDate)

    FROM dbo.Posts

    WHERE PostTypeId = 1

    GROUP BY DATEPART(year,CreationDate),DATEPART(m,CreationDate)

    ORDER BY DATEPART(year,CreationDate),DATEPART(m,CreationDate);

    ```

    清单 2-10

    用于确定每月录入帖子数量的代码


    对于清单 2-1 的文档记录，我们会记录以下内容：1) 有一个 `while` 循环遍历一个月内所有的问题帖子（大约 5 万到 15 万条），以及 2) 有第二个内部
    `while` 循环，用于遍历每个回复帖子的用户（每个帖子大约有两个用户回复）。


    ### 公用表表达式


    清单 2-1 的代码中没有使用公用表表达式。我们在记录代码时会寻找它们，因为人们并不总是理解，每次引用一个 `CTE` 时，它都会重新运行 `CTE` 的评估代码。这可能导致后台执行的工作量远超人们的预期。我只在两种情况下使用
    `CTE`：一是尝试限制视图结果集时，二是我的代码中需要使用递归时。本书代码中包含的存储过程 `sp_codeCallsCascade` 和 `sp_codeCalledCascade`
    就是使用 `CTE` 进行递归的例子。然而，递归超出了本书的讨论范围。


    ### 连接类型


    清单 2-1 的代码中使用了标准的连接类型和语法。所谓标准的连接和语法，是指明确声明为 `INNER JOIN` 或 `LEFT OUTER JOIN` 或其他常用连接类型的连接。有些过去可接受的连接语法类型，在较新版本的
    SQL Server 中会导致编译失败。


    此外，对非标准连接理解不深的人可能会使用它们，导致结果集出现意外的后果，而这些后果可能不会被 `QA` 捕获。


    ### LIKE, NOT LIKE, and NOT IN


    `IN` 和 `LIKE` 操作符可能被误用并导致性能问题。通常它们各自都有更好的替代方案，这就是为什么我们要在任何重构的代码中记录它们的用法。在清单 2-1
    的代码中，我们完全没有看到 `LIKE` 或 `NOT LIKE` 的使用，这是好事，因为使用 `LIKE` 或 `NOT LIKE` 会阻止查询使用索引。


    在清单 2-1 的代码中也没有使用 `NOT IN`。我们为什么要检查这个操作符的使用？过去，使用 `EXISTS` 和 `NOT EXISTS` 代替 `IN`
    和 `NOT IN` 有性能优势，但随着时间的推移和 SQL Server 新版本的发布，这种优势已经减弱。然而，`NOT IN` 和 `NOT EXISTS`
    处理 `NULL` 值的方式不同——如果子查询的源数据包含 `NULL` 值，即使该值实际不存在，`NOT IN` 也会评估为 `FALSE`。`NOT EXISTS`
    在结果集中处理 `NULL` 时不会有同样的问题；因此我们仍然建议使用 `NOT EXISTS` 而非 `NOT IN`。


    ### DISTINCT, TOP, and Other Sorting Operations


    排序在 SQL Server 中可能代价高昂。许多操作，如 `TOP` 和 `DISTINCT`，都需要进行一些排序，这就是为什么我们在发现它们时希望将其标识出来。`MIN`
    和 `MAX` 也是排序操作，即使不存在显式的 `ORDER BY` 子句；我们需要对我们要求 `MIN` 或 `MAX` 的字段值进行排序，才能确定哪个是最高或最低值。


    对于清单 2-1 代码中的每个循环，我们都在寻找所遍历表的 `MIN(Id)`。在这个案例中，我们看到：


    *   在时间跨度内从 `Posts` 表获取 `MIN(Id)`

    *   基于 `ParentId` 从 `Posts` 表获取 `MIN(OwnerUserId)`


    除了这两个 `MIN()` 列之外，没有其他操作表明在底层进行了排序。


    ### Calls to Other User-Defined SQL Objects


    幸运的是，清单 2-1 中的存储过程没有调用其他 `SQL` 对象（除了 `dbo.Posts` 表）。我有一个自己写的存储过程，它基于 SQL Server
    跟踪的依赖关系，可以告诉你哪些其他对象依赖于你的对象（在大多数情况下，这等同于被此对象调用的对象）。我没有让它跟踪表；它会显示存储过程和函数。我已将这个存储过程包含在本书中；它叫做
    `sp_codeCallsCascade`。它使用系统目录视图来确定依赖关系。


    你可以对你的代码使用这个存储过程，以查看你的对象调用了什么代码，然后那些对象又调用了什么对象，……嗯，以此类推。调用方式如清单 2-11 所示。


    ```sql

    EXECUTE sp_codeCallsCascade @codeName=''DailySummaryReportPerMonth'', @rootSchema
    = ''dbo'';

    ```

    清单 2-11

    `sp_codeCallsCascade` 的示例调用

