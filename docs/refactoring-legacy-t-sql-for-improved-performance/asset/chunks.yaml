  trans: '# 第四部分：糟粕与败笔


    ## 总结


    函数确实是代码复用的一种方式（就像厨房水槽函数一样）。尽管代码复用在前端编程中非常出色，但在 SQL Server 中几乎总是个坏主意。请只为你需要完成的工作编写代码，并且只编写这部分工作。此外，请将你的业务逻辑从
    SQL Server 执行的工作中剥离出来——但那是另一本书、另一个人在另一个时间讨论的另一个话题了！


    ## 8. 代理作业


    SQL Server 代理允许你设置一个计划，在你选择的时间运行代码。这可能非常有用，但也可能导致一团乱麻。你听说过多少次应用程序或数据库周期性变慢，但当你上线查看时问题却消失了？你需要确定变慢是否存在真正的规律，然后你才能查看是否有作业与这些痛苦时段重合。


    首先，让我们看看 SQL Server 代理应该为你完成什么。第一部分比开发更具管理性，但它如此重要，以至于每个从事数据库工作的人都应该意识到这些需求！然后，我们可以看看这些作业是如何悄悄潜入你的性能问题……甚至噩梦中的！


    ### 代理作业应该做什么


    有些管理职责应该设置为代理作业，并在夜间或每周运行。这些对于数据库的维护和完整性，以及你的灾难恢复计划都很重要。贵公司确实有这样的计划，对吧？而且你们确实会演练该计划和任何相关的故障转移，对吧？抱歉，刚才走神了。回到
    `SQL Server 代理`！


    #### 好作业！


    “好”作业应该针对每个数据库运行，包括你的系统数据库。请注意，这些建议基于 0-500 GB 范围的数据库。更大的数据库可能需要不同的策略。


    1.  完整备份：应至少每 24 小时运行一次。根据业务及其需求，可能需要更频繁地运行。较大的数据库可能较少运行完整备份。

    2.  事务日志备份：应至少每小时运行一次。同样，这取决于业务需求和服务器负载，但这是一个很好的起始建议。

    3.  差异备份：可以根据需要运行，具体取决于业务需求和服务器负载。我认为这些是“可选”的，但其他两种备份类型是强制的。如果你的数据库非常大，并且每晚运行完整备份不可行，那么这些备份可能变为强制性的。

    4.  损坏检查（或 `DBCC CHECKDB()`）：应至少每周运行一次，但理想情况下每 24 小时运行一次。

    5.  索引和统计信息维护：也应至少每周运行一次，但同样，理想情况是每 24 小时运行一次。

    6.  清理作业：修剪掉不需要的多余审计数据甚至操作数据。


    与数据库相关的任何事情一样，你必须了解你的环境、软件和使用模式。在某些特定环境中，一些“好”作业可能并不需要，但可能大部分或全部都应该使用。这就引出了下一个，也可能是最关键的一点。


    #### 我应该在何时运行作业？


    你如何知道备份应该在何时运行？索引维护呢？还有每个经理都需要、否则世界就要终结的那份庞大的日常报告呢？


    此外，某些作业在其他作业之前运行是有道理的。例如，最好在每晚的完整备份之前运行一次损坏检查和索引维护。如果你需要恢复到该备份，你会更有信心它可能没有损坏，并且索引维护是最新的，因此可以立即使用。在紧急情况下，这可以为你节省使环境重新上线的宝贵时间。然而，100%
    确保备份有效的唯一方法是测试你的备份。理想情况下，你也将备份恢复到测试环境中进行验证，而这也可以通过作业实现自动化。


    ##### 了解你的环境……定期地


    为了最佳地安排代理作业，了解围绕你环境的一些指标是必要的。一天中哪些时段 CPU 使用率最低？哪些时段访问系统的用户最少？`tempdb` 何时最不繁忙？磁盘写入量最低的时段呢？如果你有第三方监控解决方案，找到这些信息可能很简单。如果没有，你仍然可以使用自制解决方案来找到这些数据。网上有大量的博客文章和演示讨论如何为服务器建立基线，无论是通过
    `PowerShell`、`扩展事件`、两者的某种组合，还是许多其他解决方案。


    为什么标题提到“定期地”呢？嗯，随着数据增长和可能的使用模式变化，你服务器的基线和低谷时段也会随之变化。以前良性的作业可能因为数据库使用模式的转变而突然引起严重的性能问题。此外，可能有些作业只是偶尔出现。例如，月末、季末和年末报告运行得不够频繁，可能无法显现问题模式，但仍然可能困扰用户。


    ##### 了解你的作业及其背后的需求……定期地


    你的作业安排在何时运行？它们运行多长时间？多久运行一次？作业实际满足什么业务需求？例如，你有一个客户需要每天获取最新的订单摘要。有一个作业调用一个存储过程来抓取并汇总这些数据，每
    2 分钟运行一次。


    问题的一部分在于，这个存储过程的运行时间开始超过 2 分钟，所以实际上它一直在运行。而且，它从时间开始之初就按天提取和聚合数据，直到时间结束（至少根据数据库标准）。此外，这个客户的业务只在
    `上午 9:00` 到 `下午 5:00` 营业，并且周三和周日休息。


    你可以进行的一些简单更改是：将作业间隔增加到每 5 分钟运行一次；将运行时间限制为每天从 `上午 9:00` 开始到 `下午 5:00` 结束；并设置它们在周三和周日不运行。


    再次强调，随着时间（和数据量）的变化，曾经运行快速的作业可能突然无法快速运行。例如，你的损坏检查作业可能突然需要运行数小时。如果发生这种情况，那么采用不同的计划可能更好：


    1.  运行索引维护。

    2.  运行完整备份。

    3.  将完整备份发送到你的测试服务器（或一个只读的报告辅助服务器）。

    4.  还原数据库。

    5.  在你的测试或辅助环境中运行损坏检查。


    ### 代理作业的常见问题


    我们简要谈到了一个作业运行时间超过作业被调用之间的时间间隔，这可能导致作业几乎持续运行。我们在代理作业中还看到哪些其他问题？'
- fmt: '### Overlap


    随着服务器变得越来越繁忙，通过计划作业运行的报告越来越多，突然间你还要为可扩展的应用程序行为导入和导出数据，作业将开始重叠。将作业设置为相同的计划非常容易，因为这是设置作业时少需要执行的一步（创建一个新计划）。然而，让所有作业同时运行将对你的服务器性能造成严重影响。


    我编写了一个存储过程，它会访问 `MSDB`（作业信息存储的位置），提取每天运行的作业（区别于每周或仅运行一次的作业），并创建一个基于文本的甘特图，显示作业运行的时间和时长（使用作业历史记录中运行时间的平均值）。每列代表一个十分钟的时间段，如果一个作业在该时间段内开始和结束，你会看到一个
    `|` 标记。如果它持续超过该时间段，你会看到类似 `| - - - |` 的标记横跨相应的时间段列。


    如果你已运行设置脚本，`SQL Server Agent` 正在运行，并且你的实例已运行超过一天，你应该会有一个包含我为此示例创建的四个模拟作业的作业历史记录。我们可以通过首先在调试模式下运行存储过程来确认。请使用清单
    [8-1](#483961_1_En_8_Chapter.xhtml#PC1) 中的代码。


    ```

    EXECUTE sp_jobOverlap @debug=1;

    Listing 8-1

    在调试模式下调用 Job Overlap 存储过程

    ```


    让我们查看第一个结果集，如表 [8-1](#483961_1_En_8_Chapter.xhtml#Tab1) 所示。我们想查看 `duration` 列中是否有任何值，这表明我们服务器上设置的作业至少运行过一次。由于所有
    `duration` 列中都有数据，因此我们所有的作业至少运行过一次。为了便于阅读，时间已被截断。


    表 8-1


    Job Overlap 存储过程调试输出，第一个结果集


    | jobid | jobName | SchedtimeDelay | startTime | endTime | duration |

    | --- | --- | --- | --- | --- | --- |

    | 1 | HourlyOne | 01:00:00 | 06:00:00 | 22:00:00 | 00:19:20 |

    | 2 | syspolicy_purge_history | 23:59:00 | 02:00:00 | 23:59:59 | 00:00:02 |

    | 3 | ShortOne | 00:02:00 | 08:00:00 | 20:00:00 | 00:00:59 |

    | 4 | NightlyMaintenance | 23:59:00 | 22:00:00 | 23:59:59 | 01:12:39 |

    | 5 | TooLong | 00:30:00 | 04:00:00 | 22:00:00 | 00:27:39 |


    随着我们在输出中继续向下滚动，最后一个结果集显示了作业在一天中运行的实际分布情况。这些作业中有许多开始时间比 `SQL Server` 的默认一天开始时间稍晚，如表
    [8-1](#483961_1_En_8_Chapter.xhtml#Tab1) 中的 `startTime` 列所示。因此，你可能需要向右滚动一点，才能看到作业开始以
    `|` 和 `–` 字符显示运行。图 [8-1](#483961_1_En_8_Chapter.xhtml#Fig1) 显示了从上午 7:40 到 10:00
    的时间段。


    ![../images/483961_1_En_8_Chapter/483961_1_En_8_Fig1_HTML.jpg](images/483961_1_En_8_Chapter/483961_1_En_8_Fig1_HTML.jpg)


    图 8-1


    Job Overlap 存储过程输出


    最终结果集的布局（如图 [8-1](#483961_1_En_8_Chapter.xhtml#Fig1) 所示）使得识别有多个作业同时运行的十分钟时间段变得容易。有时你会遇到所有系统作业同时运行的“完美风暴”。重要的是找到任何重叠区域，并尝试分配作业（尤其是运行时间较长的作业），使它们永远不会与其他作业同时运行。一种方法是更改计划，使每个作业不是都在整点开始，而是让一个作业在整点开始，另一个作业在整点后
    10 分钟开始，第三个作业在整点后 30 分钟开始，依此类推。另一种方法是与你的老板以及上级链沟通，了解那些每 2 分钟运行一次的作业是否真的需要每 2 分钟运行一次。每小时运行一次是否足够？或者如果数据用于每日两次的报告，你是否可以在每日报告运行前
    30 分钟运行该作业？


    你应该通过重新运行 Job Overlap 存储过程来定期重新检查作业分布。随着时间的推移，随着数据库中数据的增长，作业的运行时间会开始变长。这可能导致在之前没有问题的区域出现重叠。保持警觉是能够主动出击并在问题发生前解决它的关键，而不是等到老板站在你办公桌前！


    ## Summary


    `SQL Server Agent` 是一个用于在预定时间调度代码运行的强大工具。然而，理解你的环境和作业非常重要。计划不周的作业时间安排，或者超出实际业务需求的作业，可能会导致整个环境变慢，有时还难以追踪。


    # 9. External Influences


    存在一些调用 `SQL Server` 上代码或对象的地方，这些地方并不在 `SQL Server` 上。有时，公司使用多个 `SQL Server`，但随着时间的推移，需要不同服务器上的数据库相互“对话”。此外，可能并不总是有
    `DBA`，因此应用程序开发者将 `SQL` 代码写入应用程序中，而不是仅仅调用 `SQL` 对象。


    ## Linked Servers


    我们为什么使用链接服务器？有时，数据库可以放在不同的服务器上，因为它们通常具有不同的工作负载。硬件可能是专门为每组数据库的工作负载购买或设置的。也许数据库最初是由不同的部门开发的，每个部门都有权访问特定的
    `SQL Server`。


    无论情况如何，不可避免地会有人认为将来自两个服务器/数据库的数据合并到一个查询或许多查询中是个好主意。存在一些与性能无关的限制，可能需要代码更改。链接服务器不允许调用用户定义的表值函数或标量函数。根据你的代码中使用函数的频率，这可能需要大量的返工工作。


    ### Security


    通常，链接服务器是为了快速解决问题而设置的，安全性没有得到太多考虑。我们认为每台服务器本身是安全的，因此它们彼此共享没有问题。然而，事实并非如此。应在链接服务器属性页中设置本地服务器登录名，并且不应允许未明确定义的登录名进行连接。正确的设置可能很复杂，同时还要允许用户执行适当的任务。'
  raw: '### Overlap


    As your server gets busier, and more and more reports are run through jobs on
    a schedule, and suddenly you’re importing and exporting data for extensible application
    behavior, jobs are going to start overlapping. It’s very easy to throw jobs onto
    the same schedules, since that’s one less step (creating a new schedule) that
    you need to take to get the job set up. However, having all of the jobs running
    at the same time is going to be a terrible performance hit on your server.


    I have written a stored procedure that goes to MSDB (which is where job information
    is kept), pulls back the jobs that run on a daily basis (as opposed to weekly
    or one time only), and creates a text-based Gantt chart that shows when jobs run
    and for how long (using an average of the runtimes found in the job history).
    Each column represents a ten-minute time period, and if a job starts and ends
    within that time period, you’ll see a | mark. If it continues beyond that period,
    you’ll see something like | - - - | across the corresponding time frame columns.


    If you have run the setup script, have the SQL Server Agent running, and have
    left your instance running more than a day, you should have a job history with
    four fake jobs I created for this example. We can tell by running the stored procedure
    under debug mode first. Please use the code in Listing [8-1](#483961_1_En_8_Chapter.xhtml#PC1).


    ```

    EXECUTE sp_jobOverlap @debug=1;

    Listing 8-1

    Calling the Job Overlap stored procedure in debug mode

    ```


    Let’s look at the first recordset, like the one shown in Table [8-1](#483961_1_En_8_Chapter.xhtml#Tab1).
    We want to see if there are any values in the duration column, indicating that
    the jobs set up on our server have run at least once. Since there is data in all
    of the duration columns, all of our jobs have run at least once. Times have been
    truncated for ease of reading.


    Table 8-1


    Job Overlap stored procedure debug output, first result set


    | jobid | jobName | SchedtimeDelay | startTime | endTime | duration |

    | --- | --- | --- | --- | --- | --- |

    | 1 | HourlyOne | 01:00:00 | 06:00:00 | 22:00:00 | 00:19:20 |

    | 2 | syspolicy_purge_history | 23:59:00 | 02:00:00 | 23:59:59 | 00:00:02 |

    | 3 | ShortOne | 00:02:00 | 08:00:00 | 20:00:00 | 00:00:59 |

    | 4 | NightlyMaintenance | 23:59:00 | 22:00:00 | 23:59:59 | 01:12:39 |

    | 5 | TooLong | 00:30:00 | 04:00:00 | 22:00:00 | 00:27:39 |


    As we continue to scroll down in the output, the last recordset shows the actual
    distribution of when the jobs run during the day. A lot of these jobs start a
    bit later in the day than SQL Server’s default start-of-day time, as shown by
    the startTime column in Table [8-1](#483961_1_En_8_Chapter.xhtml#Tab1). So you’ll
    probably need to scroll right a bit before you see the job runs start to show
    up with | and – characters. Figure [8-1](#483961_1_En_8_Chapter.xhtml#Fig1) shows
    the time frame between 7:40 a.m. and 10:00 a.m.


    ![../images/483961_1_En_8_Chapter/483961_1_En_8_Fig1_HTML.jpg](images/483961_1_En_8_Chapter/483961_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Job Overlap stored procedure output


    The layout of the final result set, shown in Figure [8-1](#483961_1_En_8_Chapter.xhtml#Fig1),
    makes it easy to identify ten-minute periods that have more than one job running.
    Sometimes you have a “perfect storm” of every job on the system running at the
    same time. It is important to find any overlap areas and try to distribute the
    jobs (especially longer-running jobs) so that they never run at the same time
    as other jobs. One way to do this would be to change schedules so that instead
    of every job starting on the hour, start one job on the hour, one job 10 minutes
    after the hour, a third job 30 minutes after the hour, and so on. Another method
    is to go back to your boss and up the chain to understand how important it is
    for those jobs that run every 2 minutes to really run every 2 minutes. Would every
    hour actually be enough? Or if the data is used for twice-a-day reports, could
    you just run the job 30 minutes before the daily reports are run?


    You should recheck the job distribution periodically by rerunning the Job Overlap
    stored procedure. Jobs will start running longer over time, as data in the database
    builds up. This can cause overlap in areas where we didn’t previously have issues.
    Awareness is the key to being able to be proactive, and to fix the problem before
    your boss is standing at your desk!


    ## Summary


    SQL Server Agent is a great tool for scheduling code to run at predetermined times.
    However, it is very important to understand both your environment and your jobs.
    Poorly planned timing of jobs, or jobs that exceed the actual business needs,
    can cause slowness in your entire environment and can sometimes be difficult to
    track down.


    # 9. External Influences


    There will be places that call code or objects on the SQL Server that are not
    also on the SQL Server. Sometimes, companies use more than one SQL Server, but
    over time the need arises for the databases on different servers to “talk” to
    each other. Also, there may not always be a DBA, so the application developers
    write SQL code into the application instead of just calling an SQL object.


    ## Linked Servers


    Why do we use linked Servers? Sometimes, databases can be put on different servers
    because they generally have different workloads. The hardware could have been
    purchased or set up specifically for the workload of each set of databases. Maybe
    databases were initially developed by different departments, each of which had
    access to a specific SQL Server.


    Whatever the case, inevitably someone will think it’s a great idea to combine
    data from both servers/databases into a query, or perhaps many queries. There
    are some limitations which can require coding changes, unrelated to performance.
    Linked servers will not allow calls to user-defined table-valued or scalar functions.
    Depending on how heavily functions are used in your code, this could require significant
    rework effort.


    ### Security


    Generally, linked servers are set up to solve a problem quickly, and security
    isn’t given a lot of thought. We think each server is secure in and of itself,
    so them sharing with each other is fine. However, this isn’t the case. Local server
    logins should be set up in the linked server property page, and logins that are
    not specifically defined should not be allowed to connect. The setup can be complicated
    to do correctly while still allowing users to be able to perform the appropriate
    tasks.'
  trans: '### 作业重叠


    随着服务器日益繁忙，通过计划作业运行的报告越来越多，突然间你还要为可扩展的应用程序进行数据导入和导出，作业便开始出现重叠。将作业设置为相同的计划非常容易，因为这是设置作业时最少需要执行的一步（创建一个新计划）。然而，让所有作业同时运行将对你的服务器性能造成严重影响。


    我编写了一个存储过程，它会访问 `MSDB`（存储作业信息的位置），提取每天运行的作业（区别于每周或仅运行一次的作业），并创建一个基于文本的甘特图，显示作业运行的时间和时长（使用作业历史记录中运行时间的平均值）。每列代表一个十分钟的时间段，如果一个作业在该时间段内开始和结束，你会看到一个
    `|` 标记。如果它持续超过该时间段，你会看到类似 `| - - - |` 的标记横跨相应的时间段列。


    如果你已运行设置脚本，`SQL Server Agent` 正在运行，并且你的实例已运行超过一天，你应该会有一个包含我为此示例创建的四个模拟作业的作业历史记录。我们可以通过首先在调试模式下运行存储过程来确认。请使用清单
    8-1 中的代码。


    ```

    EXECUTE sp_jobOverlap @debug=1;

    Listing 8-1

    在调试模式下调用 Job Overlap 存储过程

    ```


    让我们查看第一个结果集，如表 8-1 所示。我们想查看 `duration` 列中是否有任何值，这表明我们服务器上设置的作业至少运行过一次。由于所有 `duration`
    列中都有数据，因此我们所有的作业至少运行过一次。为了便于阅读，时间已被截断。


    表 8-1


    Job Overlap 存储过程调试输出，第一个结果集


    | 作业 ID | 作业名称 | 计划延迟时间 | 开始时间 | 结束时间 | 持续时间 |

    | --- | --- | --- | --- | --- | --- |

    | 1 | HourlyOne | 01:00:00 | 06:00:00 | 22:00:00 | 00:19:20 |

    | 2 | syspolicy_purge_history | 23:59:00 | 02:00:00 | 23:59:59 | 00:00:02 |

    | 3 | ShortOne | 00:02:00 | 08:00:00 | 20:00:00 | 00:00:59 |

    | 4 | NightlyMaintenance | 23:59:00 | 22:00:00 | 23:59:59 | 01:12:39 |

    | 5 | TooLong | 00:30:00 | 04:00:00 | 22:00:00 | 00:27:39 |


    随着我们在输出中继续向下滚动，最后一个结果集显示了作业在一天中运行的实际分布情况。这些作业中有许多开始时间比 `SQL Server` 的默认一天开始时间稍晚，如表
    8-1 中的 `startTime` 列所示。因此，你可能需要向右滚动一点，才能看到作业开始以 `|` 和 `–` 字符显示运行。图 8-1 显示了从上午
    7:40 到 10:00 的时间段。


    ![../images/483961_1_En_8_Chapter/483961_1_En_8_Fig1_HTML.jpg](img/483961_1_En_8_Fig1_HTML.jpg)


    图 8-1


    Job Overlap 存储过程输出


    最终结果集的布局（如图 8-1 所示）使得识别有多个作业同时运行的十分钟时间段变得容易。有时你会遇到所有系统作业同时运行的“完美风暴”。重要的是找到任何重叠区域，并尝试分配作业（尤其是运行时间较长的作业），使它们永远不会与其他作业同时运行。一种方法是更改计划，使每个作业不是都在整点开始，而是让一个作业在整点开始，另一个作业在整点后
    10 分钟开始，第三个作业在整点后 30 分钟开始，依此类推。另一种方法是与你的老板以及上级链沟通，了解那些每 2 分钟运行一次的作业是否真的需要每 2 分钟运行一次。每小时运行一次是否足够？或者如果数据用于每日两次的报告，你是否可以在每日报告运行前
    30 分钟运行该作业？


    你应该通过重新运行 Job Overlap 存储过程来定期重新检查作业分布。随着时间的推移，随着数据库中数据的增长，作业的运行时间会开始变长。这可能导致在之前没有问题的区域出现重叠。保持警觉是能够主动出击并在问题发生前解决它的关键，而不是等到老板站在你办公桌前！


    ## 总结


    `SQL Server Agent` 是一个用于在预定时间调度代码运行的强大工具。然而，理解你的环境和作业非常重要。计划不周的作业时间安排，或者超出实际业务需求的作业，可能会导致整个环境变慢，有时还难以追踪。


    # 9. 外部影响


    存在一些调用 `SQL Server` 上代码或对象的地方，这些地方并不在 `SQL Server` 上。有时，公司使用多个 `SQL Server`，但随着时间的推移，需要不同服务器上的数据库相互“对话”。此外，可能并不总是有
    `DBA`，因此应用程序开发者将 `SQL` 代码写入应用程序中，而不是仅仅调用 `SQL` 对象。


    ## 链接服务器


    我们为什么使用链接服务器？有时，数据库可以放在不同的服务器上，因为它们通常具有不同的工作负载。硬件可能是专门为每组数据库的工作负载购买或设置的。也许数据库最初是由不同的部门开发的，每个部门都有权访问特定的
    `SQL Server`。


    无论情况如何，不可避免地会有人认为将来自两个服务器/数据库的数据合并到一个查询或许多查询中是个好主意。存在一些与性能无关的限制，可能需要代码更改。链接服务器不允许调用用户定义的表值函数或标量函数。根据你的代码中使用函数的频率，这可能需要大量的返工工作。


    ### 安全性


    通常，链接服务器是为了快速解决问题而设置的，安全性没有得到太多考虑。我们认为每台服务器本身是安全的，因此它们彼此共享没有问题。然而，事实并非如此。应在链接服务器属性页中设置本地服务器登录名，并且不应允许未明确定义的登录名进行连接。正确的设置可能很复杂，同时还要允许用户执行适当的任务。'
- fmt: '### Queries Joining Tables from Different Databases


    When using a query across linked servers, the calling database will generally
    have filtering by using a `WHERE` clause on the query. However, sometimes `SQL
    Server` will just grab the entire table from the linked server, pull it back,
    and THEN apply the filtering in the `WHERE` clause. An execution plan of the query
    will clearly show when all of the rows are being returned from the linked server
    table. There are a few settings that should be examined to help minimize this
    issue, but those are beyond the scope of the book.


    Earlier versions of `SQL Server` had issues with being able to read statistics
    across a linked server using a “reasonable” security model. Users had to have
    very high permissions in order to be able to get those statistics. This makes
    it very difficult for the optimizer to generate a good query plan when there’s
    no information on how many records are being returned. Fortunately, Microsoft
    mitigated this with `SQL Server 2012 SP1`, so finding statistics with a lower
    permission level is less of a problem in more modern software versions.


    Developers can use the `OPENQUERY` function to solve the filtering issue and make
    sure that filtering happens correctly on the remote server, before it sends back
    all of the rows. When using `OPENQUERY`, the statement actually runs on the linked
    server. When just calling the linked server tables directly, all of the code runs
    on the current server, not on the linked server, at least in `SQL Server` versions
    earlier than `SQL Server 2017`.


    The behavior in newer versions seems to be based on how many rows will be returned,
    whether or not the filtering column is one of the columns joining the data between
    the two servers, and whether the filtering column is located on the remote server.


    ### Network IO


    Because as database professionals, we absolutely know that the cause of problems
    is always the network, right? Seriously though, the application is using the network
    to call `SQL Server`, which is using the network to pass data back. How many other
    applications are pushing data back and forth on the network? Any code on any machine
    that “speaks” to anything outside of that machine uses the network. Also, any
    `IoT` devices you might have also claim their piece of the network. We’re just
    adding another possible point of performance issues or failure.


    ### How Can We Fix This?


    If both servers are `VM`s, it might be a good idea to decommission one of the
    `VM`s and make sure the databases that interact with each other are on the same
    instance of the same server. This is the best long-term solution, and if it is
    possible, I’d highly recommend going this route.


    If moving the linked database(s) to the same server isn’t an option, then we get
    back to refactoring the code. There will be a bit of research involved, looking
    at execution plans and time to find the most painful code first. The plans should
    really show where using `OPENQUERY` will be helpful; simply look for many, many
    rows being returned that aren’t in the final output of the query.


    Creating stored procedures on the linked server, and calling them from the local
    server, is another strategy that can be used to force code to run on the linked
    server instead of the local server. While the call to the stored procedure runs
    on the local server, all of the code in the stored procedure on the linked server
    runs then on the linked server. This strategy can be an effective way to break
    out pieces of the code to target which server is the optimal place for that code
    to be run.


    ### SQL Code Calls in the Application


    Have you ever heard the term “`ORM`”? It stands for object-relational mapping,
    and `ORM`s are tools that developers use to simplify specifically `SQL` code writing.
    They are popular because developers can write code faster – the tool generates
    the database code for you, and you don’t have to write the “`CRUD`” (`Create`,
    `Read`, `Update`, `Delete`) `SQL`. They can generate parameterized queries, which
    is a good thing. However, we frequently see performance issues in the `SQL` code
    that these tools generate. If developers are aware of these well-publicized issues,
    most of them can be avoided.


    #### So What’s the Problem?


    In order to fix `SQL` performance problems with code in the application, we need
    to have access to both the source code for the application and also the ability
    to create a new build of the application. If the initial development of the application
    code didn’t take some of the currently well-known issues into consideration, the
    code could be causing quite a bit of pain on the `SQL Server` and affect other
    applications by taking up too many resources on the `SQL Server`.


    #### ORM Filtering Data on the .NET Side


    Developers need to write their `.NET` code so that filtering of returned datasets
    is performed on the `SQL Server` end, before it passes back data records. Otherwise,
    `SQL Server` will pass back all records, and they will get filtered on the `.NET`
    side. The unfiltered query retrieve and sending the retrieved data back to the
    application are a lot of work that neither the database nor the network should
    have to do. Devs also need to be aware of datatypes, because using incorrect types
    can lead to implicit conversion performance issues. Additionally, using conventions
    like `UPPER(column)` to do filtering can make index use impossible, again leading
    to performance issues.


    #### ORM RBAR


    When the application needs a parent object with associated child objects (think
    of a post and all of the associated responses), developers need to be aware of
    the chosen `ORM`’s use of lazy loading. What this means is that the parent object
    is retrieved first and then the child objects are retrieved one at a time. There
    are plenty of strategies to avoid this issue when needed. There may be times when
    you won’t want to retrieve all the child objects unless they require interaction,
    so the lazy loading is just fine. In other cases, though, developers can force
    eager loading in the code.


    Also, inserting data via an `ORM` will cause a separate `INSERT` statement for
    each row that is added. Not only is this a lot of work for `SQL Server` but it
    can cause a lot of bloat in your transaction log.


    #### Déjà Vu


    Some `ORM`s can run into the same types of issues we see in database code. One
    of these is mismatching datatypes. If the datatype isn’t defined with the correct
    value in the `ORM`, the code it generates could cause the same implicit conversion
    we discussed earlier in the book.


    This is also true for returning too many columns. Like in your query (and NOT
    like using `SELECT *`), the developer writing the `.NET` code needs to specify
    exactly which columns need to be returned, so the whole record doesn’t get pulled
    back each time.


    It’s very tempting to dump all of your criteria into a `.NET` call, but only a
    single query will get generated with a very complex `WHERE` statement. This will
    result in the Query Optimizer being unable to come up with a good plan, and suboptimal
    runtimes will show up. This can be avoided if developers are very specific when
    they make their calls, and think about what a `WHERE` clause would look like to
    deliver the data they’re requesting.


    #### Guess What? Use Stored Procedures!


    All `ORM`s now can call stored procedures. Even after focusing on mitigating the
    issues mentioned earlier, really poor `SQL` code can still be generated. This
    is where the developer pulls the code out of the application and calls a stored
    procedure instead. It is then up to us to write that stored procedure to be optimized.'
