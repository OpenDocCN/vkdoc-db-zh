    从表 5-5 中我们可以看到，该触发器执行了非常多次。当我们在代码清单 5-2 中更新用户 763725 时，它触发了一次；但当我们在代码清单 5-3 中更新用户
    1010297 时，它却触发了 25 次。如果我们仍不确定，可以修改 `iu_Users_DownVotes` 触发器中向 `Triggerlog` 表插入记录的语句，使其包含来自
    `INSERTED` 表的声誉点数。这样你就能看到每次运行时 `Reputation` 都减少 1 点。


    有什么方法可以阻止递归触发器行为吗？在数据库层面，有一个设置允许触发器递归触发，默认是关闭的。在某些情况下，人们可能希望启用递归触发器而开启此设置。在本例中，为了这些示例，我已将此数据库的该设置设为“开启”（准确地说，设为
    1）。你可以使用代码清单 5-6 中的代码检查你的数据库是否启用了允许递归触发器的设置。


    ```

    SELECT database_id, name, is_recursive_triggers_on

    FROM sys.databases;

    代码清单 5-6

    检查是否允许递归触发器的代码

    ```


    如果该设置已开启，并且我们需要保持其开启状态，我们仍然可以通过在触发器级别使用 `TRIGGER_NESTLEVEL()` 来防止递归。我们希望阻止此特定触发器调用自身。我们需要添加到触发器中的语法如代码清单
    5-7 所示。有些情况下，我们可能希望阻止触发器被任何其他触发器调用；那样的话，你需要使用稍微不同的语法。


    ```

    IF ((SELECT TRIGGER_NESTLEVEL(OBJECT_ID(''iu_Users_DownVotes''),''AFTER'',''DML''))
    > 1)

    BEGIN

    RETURN;

    END;

    代码清单 5-7

    添加 TRIGGER_NESTLEVEL() 以防止递归

    ```


    我们应该将 `TRIGGER_NESTLEVEL()` 的代码添加在 `SET NOCOUNT ON;` 行之后，以及关于 `DownVotes` 计数的注释之前。我们需要测试这一点，但首先，让我们使用代码清单
    5-8 中的代码恢复这位可怜用户的声誉。


    ```

    DECLARE @userID int = 1010297;

    UPDATE u

    SET Reputation = 25

    , DownVotes = 14

    FROM dbo.Users u

    WHERE Id = @userID;

    代码清单 5-8

    恢复用户 1010297 的声誉

    ```


    一旦我们将代码清单 5-7 中的代码添加到我们的触发器中并运行 `ALTER` 语句，我们就可以再次运行代码清单 5-3 中的测试语句。“更新前”的结果，如表
    5-6 所示，与表 5-3 中的结果相同。


    表 5-6


    用户 1010297 恢复后、更新前的声誉和 DownVotes 分数


    | 标识符 | 声誉 | DownVotes |

    | --- | --- | --- |

    | 1010297 | 25 | 14 |


    “更新后”的结果，如表 5-7 所示，则更符合我们的预期。`DownVotes` 值增加了 1，而 `Reputation` 仅减少了 1。这本身就表明 `TRIGGER_NESTLEVEL()`
    成功地消除了递归，但我们也应该查看一下我们的 `Triggerlog` 表。使用代码清单 5-5 中的代码进行检查，你会发现在你第二次运行代码清单 5-3
    中的代码时，该触发器只有一条记录。


    表 5-7


    用户 1010297 恢复后、更新 DownVotes 后的声誉和 DownVotes 分数


    | 标识符 | 声誉 | DownVotes |

    | --- | --- | --- |

    | 1010297 | 24 | 15 |

