    ## Indexes


    一旦我们记录了编码反模式，我们就应该寻找适用于相关查询的索引。我们是否有正确的索引？我们将使用执行计划来查看这些索引是否正在被我们正在检查的查询使用。如果没有，为什么？某些操作将不允许使用索引，其中一些我们已经在本章中讨论过。


    ### Back to Runtime Data


    在将来自清单 [2-1](#483961_1_En_2_Chapter.xhtml#PC1) 的代码分解并开始查看其各个部分之前，我们无法在文档中对索引做太多处理。由于存在循环，要获得
