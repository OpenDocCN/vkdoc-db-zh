  trans: '# 1. 索引


    ### 变更的风险级别


    如果满足以下条件，索引变更属于低风险变更：


    *   索引是窄索引（它包含的列很少，并且列的数据类型很小）。

    *   表上的索引数量没有过多。


    在此情况下，我们看到一个风险极低的代码变更（向一个仅有聚集索引和一个非聚集索引的表添加单列索引），如代码清单 1-6 所示，而其带来的收益却非常大。


    ## 万能答案…？


    太好了！我们总是只要添加一个索引，一切就神奇地解决了，对吧？嗯，不对。有些情况下我们并不想添加索引，之前在讨论索引变更是否为低风险时我们简要提到过。也许你认为需要的索引超过十列。（提示：这是个坏主意。）也许该表已经有
    30 个索引了。（提示：这是个更糟的主意。）


    如果查询真的需要表中大量数据，聚集索引扫描并不是一个糟糕的选择。添加一个非常宽的索引会减慢写入速度，可能显著减慢。那么向一个已有 30 个索引的表再添加一个索引呢？相反，是否可以通过添加（或包含）单个列来使用某个现有索引？也许你需要切换索引列的顺序，因为它起始于一个
    `基数` 非常低的列？所有数据库相关问题的答案永远是“视情况而定”。仔细评估你的具体情况，并利用你能收集到的所有信息来做决定。不要害怕尝试一些东西看看是否可行。不过请先在测试环境中操作！


    对于那些不认识“`基数`”这个术语的人，它表示一个列可以包含的不同值的数量。例如，一个位（bit）列可以有三种不同的可能值。（好吧，你们这些反对 `NULL`
    的人，嘘。这只是一个例子…）如果你允许它为 `NULL`（是的，是的，我第一次就听到了），这些值将是 0、1 或 `NULL`。假设我们有一个 1,000,000
    行的表。每种值都会有很多行。另一方面，如果该列是 `datetime` 列，并且填充的是记录添加的日期/时间，那么每个值可能都不同。该位列将被称为具有“低”`基数`（该列包含许多等价值），而
    `datetime` 列将被称为具有“高”`基数`（该列包含许多不同的值）。


    ## 索引之外的初步评估


    还有哪些其他场景？我见过一些对象（通常是触发器和存储过程）更新了另一个表，但即使链接列上存在索引，它也无法使用。因为 `WHERE` 子句中有多个不等价的语句，可能无法使用索引，这可能导致阻塞。


    ### 如果可能，查询应在键值上连接


    为了最有效地利用外键等约束，最好让查询能在这些键值上进行连接。在这种情况下，我们还需要确保外键列也被索引，以帮助 SQL Server 快速找到所需数据。有时，这可以通过添加一个临时表来存储我们需要检查的数据，进行检查，然后使用该临时表中的键值连接回原表以执行更新或删除操作来辅助实现。


    ### SARGability（可搜索参数性）


    如果 `JOIN` 和 `WHERE` 子句语句允许使用索引，则该语句被称为“`可搜索参数化`”——即 `SARGable`（Search ARGument
    的缩写）。我们将在本书后面更深入地讨论这一点，但现在只需知道，有时可以通过简单的重写使一个查询变得 `可搜索参数化`。


    ## 总结


    初步评估也可以在任何对象类型上进行；对于这些示例，我们专注于触发器，但相同的逻辑适用于不同的对象——函数、存储过程、视图或任何其他 SQL Server 对象。索引通常是低风险的变更，并且可以非常有效地作为代码的临时修补措施。检查查询的连接是否在键值上，也可以通过利用外键约束来帮助提高性能。对查询进行小的重写，如果能让它们使用以前无法使用的索引，也可能非常有效。


    一旦完成了初步评估，就该深入研究该对象，记录任何可能的问题区域，并为彻底重写进行评估。


    # 2. 文档


    在着手重写之前，性能不佳的代码应该被彻底记录下来。很容易一开始就抓取并重写代码，结果却陷入嵌套的 `if` 语句、`while` 循环或对其他 SQL 对象的调用中。如果我们理解了所需的功能，我们就能判断当前代码应该被重构，还是应该直接从头开始。


    ## 整合现有文档


    我们可以从代码开始。如果我们没有任何额外的文档，就需要从代码本身弄清楚功能。我们也绝对应该记录代码的初始状态，以供参考。希望你正在使用某种版本控制软件，但我们也希望这些信息能快速方便地访问。在本章中，我们将研究一个运行数天的报告存储过程，它用于计算一个月内某些数据的每日总和。我运行这个存储过程处理
    2012 年 8 月的数据花了 45 分钟；如果你选择跟随本书并运行示例，请注意这一点。让我们看看这个存储过程的修改代码包含什么；我们可以在代码清单 2-1
    中看到它。'
- fmt: '# Listing 2-1: DailySummaryReportPerMonth stored procedure code


    ```sql

    /**************************************************************************

    Description: Data for daily report for a month

    --Test call:

    -- EXECUTE dbo.DailySummaryReportPerMonth @monthYear = ''20180801'';

    2019.05.26      LBohm          INITIAL RELEASE

    **************************************************************************/

    ALTER PROCEDURE [dbo].[DailySummaryReportPerMonth] @monthYear DATETIME

    AS

    BEGIN

    /* in case the first day of the month not passed in */

    SET @monthYear = DATEADD(month, DATEDIFF(month, 0, @monthYear), 0);

    DECLARE @postID           INT

    , @dayOfMonth       TINYINT

    , @numAnswers       INT

    , @numUsers         INT

    , @acceptedAnswerID INT

    , @userID           INT

    , @displayName      NVARCHAR(40)

    , @isAccepted       BIT

    , @userCtThisPost   SMALLINT

    , @numUpvotes       SMALLINT;

    CREATE TABLE #finalOutput

    ( monthyear                  DATETIME

    , dayOfMonth                 TINYINT

    , dayOfWeek                  TINYINT

    , numPosts                   SMALLINT

    , numResponses               SMALLINT

    , numUsersResponded          SMALLINT

    , highNumUsersSinglePost     SMALLINT

    , userMostResponses          NVARCHAR(40) -- DisplayName

    , percentagePosts            DECIMAL(8, 7)

    , numHighestUpvotesOneAnswer SMALLINT

    );

    DECLARE @usersDay TABLE

    ( dayOfMonth          TINYINT

    , userID              INT

    , displayName         NVARCHAR(40)

    , numPostsAnswered    SMALLINT

    , numAcceptedAnsPosts SMALLINT

    );

    /* get first post in the time period that isn''t a comment or answer */

    SET @postID = COALESCE(

    (

    SELECT MIN(Id)

    FROM dbo.Posts

    WHERE DATEADD(month, DATEDIFF(month, 0, creationDate), 0) = @monthYear

    AND PostTypeId = 1

    ), 0);

    /* get all posts in the time period that aren''t comments or answers */

    WHILE @postID > 0

    BEGIN

    SELECT @numAnswers = p.AnswerCount

    , @acceptedAnswerid = p.AcceptedAnswerId

    , @dayOfMonth = DATEPART(dd, p.CreationDate)

    FROM dbo.Posts p

    WHERE p.Id = @postID;

    IF EXISTS

    (

    SELECT 1

    FROM #finalOutput

    WHERE dayOfMonth = @dayOfMonth

    )

    BEGIN

    -- update

    UPDATE fo

    SET fo.numPosts = fo.numPosts + 1

    , fo.numResponses = fo.numResponses + @numAnswers

    FROM #finalOutput fo

    WHERE fo.dayOfMonth = @dayOfMonth;

    END;

    ELSE

    BEGIN

    -- insert

    INSERT INTO #finalOutput

    ( monthYear

    , dayOfMonth

    , dayOfWeek

    , numPosts

    , numResponses

    , numUsersResponded

    , highNumUsersSinglePost

    , userMostResponses

    , numHighestUpvotesOneAnswer

    )

    VALUES

    ( @monthYear

    , @dayOfMonth

    , DATEPART(dw, DATEADD(dd, @dayOfMonth - 1, @monthYear))

    , 1

    , @numAnswers

    , 0

    , 0

    , "

    , 0

    );

    END;

    /*  now the user stuff */

    SET @userCtThisPost = 0;

    SET @userID = COALESCE(

    (

    SELECT MIN(p.ownerUserId)

    FROM dbo.Posts p

    WHERE p.ParentId = @postID

    AND p.PostTypeId = 2

    ), 0);

    WHILE @userID > 0

    BEGIN

    SET @isAccepted = COALESCE(

    (

    SELECT 1

    FROM dbo.Posts p

    WHERE p.OwnerUserId = @userID

    AND p.ParentId = @postID

    AND p.Id = @acceptedAnswerID

    ), 0);

    SET @userCtThisPost = @userCtThisPost + 1;

    SET @numUpvotes = COALESCE(

    (

    SELECT MAX(p.Score)

    FROM dbo.Posts p

    WHERE p.OwnerUserId = @userID

    AND p.ParentId = @postID

    ), 0);

    UPDATE fo

    SET fo.numUsersResponded = fo.numUsersResponded + 1

    , fo.numHighestUpvotesOneAnswer = CASE

    WHEN @numUpvotes > fo.numHighestUpvotesOneAnswer

    THEN @numUpvotes

    ELSE fo.numHighestUpvotesOneAnswer

    END

    FROM #finalOutput fo

    WHERE fo.dayOfMonth = @dayOfMonth;

    /* add records to user table for later calculations */

    IF EXISTS

    (

    SELECT 1

    FROM @usersDay

    WHERE dayOfMonth = @dayOfMonth

    AND userID = @userID

    )

    BEGIN

    UPDATE ud

    SET ud.numPostsAnswered = ud.numPostsAnswered + 1

    , ud.numAcceptedAnsPosts = ud.numAcceptedAnsPosts + @isAccepted

    FROM @usersDay ud

    WHERE dayOfMonth = @dayOfMonth

    AND userID = @userID;

    END;

    ELSE

    BEGIN

    INSERT INTO @usersDay

    ( dayOfMonth

    , userID

    , displayName

    , numPostsAnswered

    , numAcceptedAnsPosts

    )

    SELECT @dayOfMonth

    , @userID

    , u.DisplayName

    , 1

    , @isAccepted

    FROM dbo.Users u

    WHERE u.Id = @userID;

    END;

    SET @userID = COALESCE(

    (

    SELECT MIN(p.OwnerUserId)

    FROM dbo.Posts p

    WHERE p.ParentId = @postID

    AND PostTypeId = 2

    AND p.OwnerUserId > @userID

    ), 0);

    END;

    UPDATE fo

    SET fo.highNumUsersSinglePost = CASE

    WHEN @userCtThisPost > fo.highNumUsersSinglePost

    THEN @userCtThisPost

    ELSE fo.highNumUsersSinglePost

    END

    FROM #finalOutput fo

    WHERE fo.dayOfMonth = @dayOfMonth;

    /* get next post ID */

    SET @postID = COALESCE(

    (

    SELECT MIN(Id)

    FROM dbo.Posts

    WHERE DATEADD(month, DATEDIFF(month, 0, creationDate), 0) = @monthYear

    AND PostTypeId = 1

    AND Id > @postID

    ), 0);

    END;

    /* final day user calculations */

    UPDATE fo

    SET fo.userMostResponses =

    (

    SELECT ud.displayName

    FROM @usersDay ud

    WHERE ud.dayOfMonth = fo.dayOfMonth

    AND ud.numPostsAnswered =

    (

    SELECT MAX(udm.numPostsAnswered)

    FROM @usersDay udm

    WHERE ud.dayOfMonth = fo.dayOfMonth

    )

    )

    , fo.percentagePosts = CASE

    WHEN fo.numPosts = 0

    THEN 0

    ELSE CAST(

    (

    SELECT MAX(ud.numPostsAnswered)

    FROM @usersDay ud

    WHERE ud.dayOfMonth = fo.dayOfMonth

    ) / fo.numPosts AS DECIMAL(8, 7))

    END

    FROM #finalOutput fo;

    SELECT *

    FROM #finalOutput;

    END;

    ```


    # Functionality Documentation


    We’re fortunate enough to have information on what this report is supposed to
    do! We have a user story that lists the requirements. Remember this database is
    a backup of the StackOverflow database, which contains programming questions from
    users, answers to those questions, and comments both on the initial posts and
    answers to those posts.


    The functional requirements are given in this user story:


    For each day in a given month, I need to know


    1.  How many questions were posted?


    2.  How many answers to those questions were posted, regardless of date?


    3.  How many unique users answered those posts?


    4.  What is the highest amount of distinct users that responded to a single question
    in that month?


    5.  Which user responded to the most questions posted in that month?


    6.  How many questions did that user respond to?


    7.  What percentage of the overall questions posted in that month was that?


    8.  How many of those responses were marked as accepted answers?


    Having access to the functional requirements (in this case, our user story) is
    an excellent start. As we work through rewriting this code once we have the documentation
    complete, we can break it down into much smaller pieces and not only focus on
    the performance of each piece but verify that it is satisfying the functionality
    requirements.


    # Statistics Information and Execution Plans


    In most cases, both the `STATISTICS TIME and IO` output, as well as an execution
    plan, should also be captured and included in the documentation. In this case,
    however, it is virtually impossible to capture without writing a novel instead
    of code documentation. The original code contains two nested while loops, which
    makes for ungainly `STATISTICS` output as well as a massive execution plan. Both
    the `STATISTICS` output and the execution plan will need to show a section for
    each piece of each loop, making the output excessive.


    # Coding (Anti) Patterns


    Here is a checklist of coding patterns that should be examined closely, because
    they could lead to red flags:


    *   Multiple calls to a single table


    *   Datatypes: Mismatches between parameters and database fields, field width


    *   Subqueries: Number and location (clause of the query)


    *   Calculations


    *   Temporary tables and table variables


    *   Loops and/or cursors


    *   CTEs (common table expressions)


    *   Join types used


    *   Use of `LIKE`, `NOT LIKE`, or `NOT IN`


    *   `DISTINCT`, `TOP`, or other sorting operations


    *   Calls to other SQL objects (stored procedures, views, functions)


    *   Other anomalies'
