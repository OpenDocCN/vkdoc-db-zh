    to `WidePosts` was just on the `OwnerUserID`, so that’s the only column we’re
    going to index, as shown in the index create statement in Listing [1-6](#483961_1_En_1_Chapter.xhtml#PC6).


    ```

    IF NOT EXISTS (SELECT 1

    FROM sys.indexes

    WHERE object_id = OBJECT_ID(''dbo.WidePosts'')

    AND name="ix_Posts_ownerUserID")

    BEGIN

    CREATE NONCLUSTERED INDEX IX_WidePosts_OwnerUserID

    ON dbo.WidePosts (OwnerUserID);

    END;

    GO

    Listing 1-6

    CREATE statement for index on WidePosts table

    ```


    Let’s go look to see if there is a change when we run queries to change the user
    names back to what they were. We’ll start with the first user, whose original
    name was “stic”, and use the update statement shown in Listing [1-7](#483961_1_En_1_Chapter.xhtml#PC7).


    ```

    UPDATE Users

    SET DisplayName = ''stic''

    WHERE Id = 31996;

    Listing 1-7

    Reset of user display name for “stic”

    ```


    After we run the STATISTICS IO and TIME output through statisticsparser.com, we
    see results that look like the results shown in Table [1-3](#483961_1_En_1_Chapter.xhtml#Tab3).


    Table 1-3


    Totals for STATISTICS IO and TIME for an indexed UPDATE


    | Table | Scan Count | Logical Reads | Physical Reads | Read-Ahead Reads |

    | --- | --- | --- | --- | --- |

    | **Total** | **2** | **41** | **0** | **0** |

    | Users | 0 | 3 | 0 | 0 |

    | WidePosts | 2 | 38 | 0 | 0 |


    |   | CPU | Elapsed |

    | --- | --- | --- |

    | SQL Server parse and compile time: | 00:00:00.000 | 00:00:00.000 |

    | SQL Server Execution Times: | 00:00:00.000 | 00:00:00.000 |

    | **Total** | **00:00:00.000** | **00:00:00.000** |


    That looks much more like what we were expecting to see. There was only one row
    affected though. How would this translate into the second query we ran, which
    involved updating about 4,400 rows? Let’s take a look by running the code in Listing
    [1-8](#483961_1_En_1_Chapter.xhtml#PC8). First, though, go ahead and toggle capturing
    the actual execution plan if it isn’t already on, so we can also review that as
    well.


    ```

    UPDATE Users

    SET DisplayName = ''Jon Skeet''

    WHERE Id = 22656;

    Listing 1-8

    Update user with many WidePosts rows

    ```


    The output for the STATISTICS IO and TIME is shown in Table [1-4](#483961_1_En_1_Chapter.xhtml#Tab4).


    Table 1-4


    STATISTICS IO and TIME output for user update with many WidePosts rows


    | Table | Scan Count | Logical Reads | Physical Reads | Read-Ahead Reads |

    | --- | --- | --- | --- | --- |

    | **Total** | **3** | **35,467** | **0** | **0** |

    | Users | 0 | 9 | 0 | 0 |

    | WidePosts | 3 | 35,458 | 0 | 0 |

    | Worktable | 0 | 0 | 0 | 0 |


    |   | CPU | Elapsed |

    | --- | --- | --- |

    | SQL Server parse and compile time: | 00:00:00.000 | 00:00:00.001 |

    | SQL Server Execution Times: | 00:00:00.376 | 00:00:00.456 |

    | **Total** | **00:00:00.376** | **00:00:00.457** |


    There are a lot more logical reads in the output in Table [1-4](#483961_1_En_1_Chapter.xhtml#Tab4)
    than we see in Table [1-3](#483961_1_En_1_Chapter.xhtml#Tab3), because we’re finding
    4,400 rows instead of 1; that makes a lot of sense. When we look at the execution
    plan, shown here in Figure [1-4](#483961_1_En_1_Chapter.xhtml#Fig4), we see how
    our index affected the operators chosen to fulfill this query.


    ![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig4_HTML.jpg](images/483961_1_En_1_Chapter/483961_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Execution plan for user name change query after indexing


    Excellent! For the line with the highest estimated cost, we don’t see a clustered
    index scan anymore. A significant percentage of the work being done in this trigger
    is now the actual update of the `WidePosts` table. There is a key lookup; we could
    potentially eliminate this by adding included columns to our index. However, with
    the fact that we’re now sub-second for even users with a lot of records, we can
    probably stop here since we have cut out most of the extra work that SQL Server
    was doing.'
  trans: '## 统计信息


    实际执行计划本质上就是包含了统计信息的估算执行计划，因此它们通常差别不大。统计信息是 SQL Server 针对表中的列维护的元数据，用于指示数据分布情况。例如，在一本字典中，有大量单词以字母“st”开头。而以“zy”开头的单词则较少。这种数据的偏斜情况通过统计信息进行跟踪，这有助于查询优化器找到更优的执行计划。


    我通常使用实际执行计划，因为它也是查看统计信息是否已过期并需要维护的一种简便方法。如果我们查询返回单行数据，而查询优化器却认为我们返回了 3,000 行，那么统计信息可能就需要维护了。


    现在，让我们运行一个查询来更新另一个显示名称。


    ```

    UPDATE Users

    SET DisplayName = ''Rita Skeeter''

    WHERE Id = 22656;

    Listing 1-5

    更新用户 ID 为 22656 的显示名称

    ```


    我们的执行计划能告诉我们什么？让我们看一下运行清单 1-5 中的代码所生成的执行计划。如果你安装了 SentryOne Plan Explorer，你可以在
    SSMS 中右键单击执行计划（在“结果”选项卡附近查找该选项卡），然后从出现的菜单中选择在 Plan Explorer 中打开该计划。


    一旦你在 Plan Explorer 中查看执行计划，你会看到与图 1-3 中所示类似的内容。请确保你已点击“结果”选项卡中“语句”输出的第三行——我们希望查看的是所执行查询中开销最大（估计成本最高）部分的查询计划。


    ![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig3_HTML.jpg](img/483961_1_En_1_Fig3_HTML.jpg)


    图 1-3


    清单 1-5 中查询的初始执行计划


    我们看到，大部分开销花费在对 `WidePosts` 进行的聚集索引扫描上，因为当 `Users` 表更新时，触发器会更新 `WidePosts` 表。


    什么是聚集索引扫描？聚集索引是指表中所有数据都存储于其中的索引，其数据顺序由索引指定。每个表只能有一个聚集索引。如果一个表没有聚集索引，则它被视为堆。因此，扫描聚集索引相当于扫描整张表。


    此外，该操作中读取了大量行。如果我们查看 `WidePosts` 表，会发现有 4,394 行数据包含与用户 `ID` 22656 对应的 `OwnerUserID`。这本身没问题，但我们却读取了超过
    850,000 行。（我们可以在图 1-3 中看到 850,000 行；它是位于从聚集索引扫描出发的宽箭头正下方的数字。）这是一个我们需要解决的问题。


    `STATISTICS IO` 和 `TIME` 的输出非常相似，如表 1-2 所示。


    表 1-2


    代码清单 1-5 对应的 Statistics Parser 网站输出的“总计”部分读取列


    | 表 | 扫描计数 | 逻辑读取 | 物理读取 | 预读 |

    | --- | --- | --- | --- | --- |

    | `总计` | `3` | `341,935` | `2` | `0` |

    | `Users` | `0` | `3` | `2` | `0` |

    | `WidePosts` | `3` | `341,932` | `0` | `0` |

    | `Workfile` | `0` | `0` | `0` | `0` |

    | `Worktable` | `0` | `0` | `0` | `0` |


    | | CPU | 已用时间 |

    | --- | --- | --- |

    | `SQL Server 解析和编译时间：` | `00:00:00.000` | `00:00:00.001` |

    | `SQL Server 执行时间：` | `00:00:02.780` | `00:00:02.789` |

    | `总计` | `00:00:02.780` | `00:00:02.790` |


    ## 尽可能进行故障排查


    ### 是否存在索引？


    答案是，在 `WidePosts` 表的 `OwnerUserID` 列上没有索引。如果我们能添加一个索引，也许就不需要扫描整张表来查找需要更改的记录了。从
    `INSERTED`（触发器插入的表）到 `WidePosts` 的连接仅基于 `OwnerUserID`，因此我们只会索引这一列，如清单 1-6 中的索引创建语句所示。


    ```

    IF NOT EXISTS (SELECT 1

    FROM sys.indexes

    WHERE object_id = OBJECT_ID(''dbo.WidePosts'')

    AND name="ix_Posts_ownerUserID")

    BEGIN

    CREATE NONCLUSTERED INDEX IX_WidePosts_OwnerUserID

    ON dbo.WidePosts (OwnerUserID);

    END;

    GO

    Listing 1-6

    在 WidePosts 表上创建索引的 CREATE 语句

    ```


    让我们看看在运行将用户名改回去的查询时，情况是否发生了变化。我们将从第一个用户开始，其原始名称是“stic”，并使用清单 1-7 中所示的 update 语句。


    ```

    UPDATE Users

    SET DisplayName = ''stic''

    WHERE Id = 31996;

    Listing 1-7

    重置用户 “stic” 的显示名称

    ```


    在通过 statisticsparser.com 处理 `STATISTICS IO` 和 `TIME` 的输出后，我们看到的结果类似于表 1-3 所示的结果。


    表 1-3


    带索引的 `UPDATE` 操作的 `STATISTICS IO` 和 `TIME` 总计


    | 表 | 扫描计数 | 逻辑读取 | 物理读取 | 预读 |

    | --- | --- | --- | --- | --- |

    | `总计` | `2` | `41` | `0` | `0` |

    | `Users` | `0` | `3` | `0` | `0` |

    | `WidePosts` | `2` | `38` | `0` | `0` |


    | | CPU | 已用时间 |

    | --- | --- | --- |

    | `SQL Server 解析和编译时间：` | `00:00:00.000` | `00:00:00.000` |

    | `SQL Server 执行时间：` | `00:00:00.000` | `00:00:00.000` |

    | `总计` | `00:00:00.000` | `00:00:00.000` |


    这看起来更像是我们预期看到的结果。不过，只有一行受到影响。那么，这如何适用于我们运行的第二个查询，即涉及更新约 4,400 行的查询呢？让我们通过运行清单
    1-8 中的代码来看看。首先，如果尚未开启，请开启捕获实际执行计划的开关，这样我们也可以一起查看它。


    ```

    UPDATE Users

    SET DisplayName = ''Jon Skeet''

    WHERE Id = 22656;

    Listing 1-8

    更新拥有大量 WidePosts 行的用户

    ```


    `STATISTICS IO` 和 `TIME` 的输出如表 1-4 所示。


    表 1-4


    更新拥有大量 `WidePosts` 行的用户时的 `STATISTICS IO` 和 `TIME` 输出


    | 表 | 扫描计数 | 逻辑读取 | 物理读取 | 预读 |

    | --- | --- | --- | --- | --- |

    | `总计` | `3` | `35,467` | `0` | `0` |

    | `Users` | `0` | `9` | `0` | `0` |

    | `WidePosts` | `3` | `35,458` | `0` | `0` |

    | `Worktable` | `0` | `0` | `0` | `0` |


    | | CPU | 已用时间 |

    | --- | --- | --- |

    | `SQL Server 解析和编译时间：` | `00:00:00.000` | `00:00:00.001` |

    | `SQL Server 执行时间：` | `00:00:00.376` | `00:00:00.456` |

    | `总计` | `00:00:00.376` | `00:00:00.457` |


    表 1-4 中的输出比我们在表 1-3 中看到的逻辑读取多得多，因为我们找到的是 4,400 行而不是 1 行；这非常合理。当我们查看如图 1-4 所示的执行计划时，我们看到了索引如何影响了为完成此查询而选择的操作符。


    ![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig4_HTML.jpg](img/483961_1_En_1_Fig4_HTML.jpg)


    图 1-4


    索引后的用户名更改查询的执行计划


    非常好！对于估计成本最高的那条线，我们不再看到聚集索引扫描了。此触发器中正在完成的工作，现在很大一部分是实际更新 `WidePosts` 表。存在一个 `Key
    Lookup`（键查找）；我们可以通过向索引添加包含列来消除它。然而，考虑到我们现在即使对于拥有大量记录的用户也能在亚秒级内完成操作，我们或许可以到此为止，因为我们已经消除了
    SQL Server 正在做的大部分额外工作。'
- fmt: '# 1. Indexing


    ### Risk Level of the Change


    Index changes are low-risk changes if the following things are true:


    *   The index is narrow (it contains few columns, and the column datatypes are
    small).


    *   There aren’t an excessive number of indexes on the table.


    In this case, we see a very low-risk code change (single-column index to a table
    with only a clustered index and one other nonclustered index) for a very big benefit
    when adding the index in Listing [1-6](#483961_1_En_1_Chapter.xhtml#PC6).


    ## The Answer to Everything…?


    Great! We always just add an index, and everything works magically, right? Well,
    no. There are situations where you don’t want to add an index, which we briefly
    mentioned before when we were talking about whether index changes were low risk.
    Maybe the index you think you need is more than ten columns. (Hint: This is a
    bad idea.) Maybe the table already has 30 indexes on it. (Hint: This is an even
    worse idea.)


    If the query really requires a lot of the data in the table, a clustered index
    scan isn’t a bad answer. Adding a really wide index is going to slow your write
    times down, possibly significantly. How about adding an index to the table with
    30 indexes already on it? Instead, is there an existing index you can use by adding
    (or including) a single column? Maybe you need to switch the order of the columns
    the index is looking at, because it’s starting with a column that has really low
    `cardinality`? The answer to everything database-related is always “It depends.”
    Evaluate your specific situation carefully and use as much information as you
    can gather to make your decisions. Don’t be afraid to try something to see if
    it’s going to work. Please do that in a test environment first though!


    For those of you who don’t recognize the term “`cardinality`,” it indicates the
    number of different values a column can contain. For example, a bit column can
    have three different possible values. (Okay, you anti-`NULL` people out there,
    you hush. This is just an example…) The values would be 0, 1, or `NULL`, if you
    allow it to be `NULL` able (yes, yes, I heard you the first time). Let’s say we
    have a 1,000,000-row table. There would be a lot of rows with each value. On the
    other hand, if the column is a `datetime` column and it gets populated with the
    date/time a record was added, each value would presumably be different. The bit
    column would be said to have “low” `cardinality` (the column contains many equivalent
    values), whereas the `datetime` column would be said to have “high” `cardinality`
    (the column contains many different values).


    ## Triage Outside of Indexing


    What are some other scenarios? I have seen objects (often triggers and stored
    procedures) that updated a separate table, but it was NOT able to use an index
    on the linking column even though it existed. Because there were multiple inequivalent
    statements in the `WHERE` clause, an index might not be used, which could cause
    blocking.


    ### If Possible, Queries Should Join on Key Values


    In order to make the most effective use of constraints like foreign keys, it’s
    best if queries can join on these key values. In this case, we would also want
    to make sure the foreign key columns were indexed as well to help SQL Server be
    able to quickly find the data it needs. Sometimes this can be helped by adding
    a temporary table to pull data that we need to check against, doing our checks,
    and then using the key value from that temporary table to join back to the table
    to perform updates or deletes.


    ### SARGability


    A statement is said to be “`SARGable`” – which stands for Search ARGument – if
    the `JOIN` and `WHERE` clause statements allow indexes to be used. We will go
    much more in-depth on this later in the book, but for now just be aware that sometimes
    there may be simple rewrites to make a query `SARGable` where it hasn’t been before.


    ## Summary


    Triage can also be done on any object type; for these examples, we were focusing
    on a trigger, but the same logic applies to the different objects – functions,
    stored procedures, views, or any other SQL Server object. Indexes are usually
    low-risk changes and can be very effective at Band-Aiding code. Reviewing queries
    to see if the joins are on key values can also help performance by taking advantage
    of foreign key constraints. Small rewrites of queries can also be effective if
    they allow queries to use indexes that they couldn’t formerly use.


    Once you have performed triage, it’s time to dig deeper into the object, document
    any possible problem areas, and evaluate for a thorough rewrite.


    # 2. Documentation


    Poorly performing code should be thoroughly documented before we undertake a rewrite.
    It is easy to start grabbing and rewriting code only to get bogged down in nested
    `if` statements, `while` loops, or calls to other SQL objects. If we have an understanding
    of the desired functionality, as well, we can make the determination whether the
    current code should be refactored or if we should just start from scratch.


    ## Incorporating Existing Documentation


    We can start with the code. If we don’t have any additional documentation, we’re
    going to need to figure out the functionality from the code itself. We should
    absolutely record our starting point for the code as well, for reference. Hopefully
    you’re using some sort of versioning software, but we also want the information
    quick at hand for easy access. For this chapter, we’re going to look at a report
    stored procedure that is running for days, that does a daily tally of some data
    across a month. It took me 45 minutes to run this stored procedure for the month
    of August 2012; be aware of that if you choose to follow along with the book and
    run the examples. Let’s take a look at what the code to alter this stored procedure
    contains; we can see it here in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1).'
