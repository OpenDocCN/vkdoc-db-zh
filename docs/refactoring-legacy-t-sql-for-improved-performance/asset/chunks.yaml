  raw: '### Remove the Function!


    The next step is to look at the code in the function and see if we can replace
    the entire function in the query. The code for creating the function is shown
    in Listing [6-17](#483961_1_En_6_Chapter.xhtml#PC37).


    ```

    /**************************************************************************  Object
    Description: Get latest badge for a userid

    Revision History:

    Date         Name             Label/PTS    Description

    -----------  ---------------  ----------   ------------------------------

    2019.07.07   LBohm                         Initial Release

    **************************************************************************/

    CREATE FUNCTION dbo.getLastBadgeUser (@userID int)

    RETURNS nvarchar(40)

    AS

    BEGIN

    DECLARE @badgename nvarchar(40);

    SET @badgename = COALESCE((SELECT TOP 1 [Name]

    FROM dbo.Badges

    WHERE userID = @userID

    ORDER BY [Date] DESC),”);

    RETURN @badgename;

    END;

    Listing 6-17

    Create statement for dbo.getLastBadgeUser

    ```


    We should be able to use an OUTER APPLY with the badge info and move the code
    from the function almost intact into the OUTER APPLY, as shown in Listing [6-18](#483961_1_En_6_Chapter.xhtml#PC38).


    ```

    OUTER APPLY (SELECT TOP 1 [Name] AS latestBadge

    FROM dbo.Badges

    WHERE userID = u.id

    ORDER BY [Date] DESC) AS bInfo

    Listing 6-18

    The OUTER APPLY to replace the getLastBadgeUser function

    ```


    ### Remove the Leading % in Our LIKE Statement


    This is the last piece we are going to change in our getUserInfoByName query.
    As we discussed before, the Query Optimizer can’t use an index when there’s a
    leading % in our LIKE statement. Why is this? Well, it makes complete sense if
    we think about what an index is. It is the data displayed in a certain order.
    If the leading column is a varchar or similar datatype, the order is alphabetical.
    If we know the start of the phrase, we can use the index to go find the data which
    matches the beginning, because we know exactly where in the index it is due to
    the index’s order. If we do not know the beginning, though, we will still have
    to scan the entire index as opposed to being able to use a targeted seek operation.


    When we put our three changes together – removing the subqueries, removing the
    functions, and removing our leading % in our LIKE statement – we get the code
    shown in Listing [6-19](#483961_1_En_6_Chapter.xhtml#PC39).


    ```

    IF NOT EXISTS

    (

    SELECT 1

    FROM sys.procedures

    WHERE name = ''getUserInfoByName''

    )

    BEGIN

    DECLARE @sQL NVARCHAR(1200);

    SET @sQL = N''/**************************************************************************

    2019.07.07         LBohm        INITIAL STORED PROC STUB CREATE RELEASE

    **************************************************************************/

    CREATE PROCEDURE dbo.getUserInfoByName

    AS

    SET NOCOUNT ON;

    BEGIN

    SELECT 1;

    END;'';

    EXECUTE SP_EXECUTESQL

    @sQL;

    END;

    GO

    /**************************************************************************

    Description: Data for users by name

    --Test call:

    -- EXECUTE dbo.getUserInfoByName @theName = ''Joel'';

    2019.07.07         LBohm          INITIAL RELEASE

    **************************************************************************/

    ALTER PROCEDURE [dbo].[getUserInfoByName] @theName varchar(20)

    AS

    SELECT u.ID

    , u.displayname

    , u.aboutme

    , SUM(CASE WHEN p.postTypeID = 1 THEN 1 ELSE 0 END) AS numPosts

    , SUM(CASE WHEN v.id IS NOT NULL THEN 1 ELSE 0 END) AS numFavVotes

    , SUM(CASE WHEN p.postTypeID = 2 THEN 1 ELSE 0 END) AS numComments

    , MAX(CASE WHEN p.postTypeID = 2 THEN p.creationDate ELSE ''20000101'' END) AS
    dateLastComment

    , u.upvotes

    , u.downvotes

    , binfo.latestBadge

