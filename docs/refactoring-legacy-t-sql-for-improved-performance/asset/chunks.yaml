    We can see from Table [5-5](#483961_1_En_5_Chapter.xhtml#Tab5) that the trigger
    fired many, many times. It fired once when we updated user 763725 in Listing [5-2](#483961_1_En_5_Chapter.xhtml#PC2),
    but 25 times when we updated user 1010297 in Listing [5-3](#483961_1_En_5_Chapter.xhtml#PC3).
    If we were still uncertain, we could change the INSERT to the `Triggerlog` table
    that is in the `iu_Users_DownVotes` trigger to include the Reputation points from
    the `INSERTED` table. You could then see the `Reputation` decreasing 1 point for
    each run.


    Is there a way to stop the recursive trigger behavior? At the database level,
    there is a setting that allows triggers to fire recursively, which is turned off
    by default. There may be some situations in which people may want recursive triggers
    and turn the setting on. In this case, I have turned this setting to “on” (or
    1, to be precise) for this database for these examples. You can check to see if
    the allow recursive triggers setting is on for your databases using the code in
    Listing [5-6](#483961_1_En_5_Chapter.xhtml#PC6).


    ```

    SELECT database_id, name, is_recursive_triggers_on

    FROM sys.databases;

    Listing 5-6

    Code to check if recursive triggers are allowed

    ```


    If the setting is turned on, and we need to leave it turned on, we can still prevent
    recursion at the trigger level by using `TRIGGER_NESTLEVEL()`. We want to prevent
    calls to this trigger from this specific trigger. The syntax we want to add to
    the trigger is shown in Listing [5-7](#483961_1_En_5_Chapter.xhtml#PC7). There
    may be cases where we want to stop the trigger from being fired by any other trigger;
    in that case, you would use slightly different syntax.


    ```

    IF ((SELECT TRIGGER_NESTLEVEL(OBJECT_ID(''iu_Users_DownVotes''),''AFTER'',''DML''))
    > 1)

    BEGIN

    RETURN;

    END;

    Listing 5-7

    Adding TRIGGER_NESTLEVEL() to prevent recursion

    ```


    We would want to add the code for the `TRIGGER_NESTLEVEL()` after the `SET NOCOUNT
    ON;` line and before the comment about the `DownVotes` count. We should test this,
    but first let’s restore the poor user’s Reputation using the code in Listing [5-8](#483961_1_En_5_Chapter.xhtml#PC8).


    ```

    DECLARE @userID int = 1010297;

    UPDATE u

    SET Reputation = 25

    , DownVotes = 14

    FROM dbo.Users u

    WHERE Id = @userID;

    Listing 5-8

    Restoring user 1010297’s Reputation

    ```


    Once we’ve added the code in Listing [5-7](#483961_1_En_5_Chapter.xhtml#PC7) to
    our trigger and run the alter statement, we can run the test statements in Listing
    [5-3](#483961_1_En_5_Chapter.xhtml#PC3) again. The “before” results, shown in
    Table [5-6](#483961_1_En_5_Chapter.xhtml#Tab6), are the same results as in Table
    [5-3](#483961_1_En_5_Chapter.xhtml#Tab3).


    Table 5-6


    User 1010297’s Reputation and DownVotes score after restore and before an update


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 25 | 14 |


    The “after update” results, shown in Table [5-7](#483961_1_En_5_Chapter.xhtml#Tab7),
    are much more what we had in mind. The `DownVotes` value is increased by 1, and
    the `Reputation` is only decreased by 1\. This in itself shows that the `TRIGGER_NESTLEVEL()`
    was successful in removing recursion, but we should also look at our `Triggerlog`
    table. A check, using the code in Listing [5-5](#483961_1_En_5_Chapter.xhtml#PC5),
    will show you only a single record for the trigger at the time you ran the code
    in Listing [5-3](#483961_1_En_5_Chapter.xhtml#PC3) for the second time.


    Table 5-7


    User 1010297’s Reputation and DownVotes score after restore and after update to
    DownVotes


    | Id | Reputation | DownVotes |

    | --- | --- | --- |

    | 1010297 | 24 | 15 |'
