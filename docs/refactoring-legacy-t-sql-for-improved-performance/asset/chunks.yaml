  trans: '

    #### 隐式转换


    微软关于数据类型转换的文档相当详尽，而且非常容易找到。就在他们的 `CAST` 和 `CONVERT` 联机丛书页面上：[`docs.microsoft.com/en-us/sql/t-sql/functions/cast-and-convert-transact-sql?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/t-sql/functions/cast-and-convert-transact-sql%253Fview%253Dsql-server-2017)。


    那里有一张很大的图表，会告诉你哪些数据类型可以转换成其他哪些数据类型。图表上有些漂亮的点，指示了**隐式转换**发生的位置。图表很好，但有时非常难以理解。这到底意味着什么？


    假设我们有一个整数字段（`int01`），并且需要将 `int01` 中的值与一个 varchar 字段（`varchar01`）进行比较。字段 `varchar01`
    中包含一些整型值，但当然它们是以 varchars 形式存储的。清单 2-5 用一个代码示例说明了这一点。


    ```

    DECLARE @sometable TABLE (int01 INT);

    DECLARE @othertable TABLE (varchar01 varchar(8));

    INSERT INTO @sometable (int01)

    VALUES (1)

    , (10)

    , (23)

    , (47)

    , (56);

    INSERT INTO @othertable(varchar01)

    VALUES (''23'')

    , (''a89'')

    , (''56o'')

    , (''e1'')

    , (''47'');

    SELECT ot.varchar01

    FROM @othertable ot

    WHERE EXISTS (SELECT 1

    FROM @sometable st

    WHERE st.int01 = ot.varchar01);

    Listing 2-5

    隐式转换示例 第 1 部分

    ```


    运行清单 2-5 中的代码后，我们的 `STATISTICS` 输出显示我们得到了一个转换错误。此错误如清单 2-6 所示。


    ```

    Msg 245, Level 16, State 1, Line 21

    Conversion failed when converting the varchar value ''a89'' to data type int.

    Listing 2-6

    来自隐式转换示例 第 1 部分 的转换错误

    ```


    如果我们改为运行清单 2-7 中的转换示例，我们可以在执行计划中看到转换的证据。（如果你没有打开执行计划，请别忘了切换显示它！）


    ```

    DECLARE @sometable TABLE (int01 INT);

    DECLARE @othertable TABLE (varchar01 varchar(8));

    INSERT INTO @sometable (int01)

    VALUES (1)

    , (10)

    , (23)

    , (47)

    , (56);

    INSERT INTO @othertable(varchar01)

    VALUES (''23'')

    , (''89'')

    , (''56'')

    , (''1'')

    , (''47'');

    SELECT ot.varchar01

    FROM @othertable ot

    WHERE EXISTS (SELECT 1

    FROM @sometable st

    WHERE st.int01 = ot.varchar01);

    Listing 2-7

    隐式转换示例 第 2 部分

    ```


    一旦我们查看了清单 2-7 代码的执行计划（如图 2-1 所示），我们可以看到几个有趣的事情。


    ![../images/483961_1_En_2_Chapter/483961_1_En_2_Fig1_HTML.jpg](img/483961_1_En_2_Fig1_HTML.jpg)


    Figure 2-1

    隐式转换的证据


    在图 2-1 中，我们在 `SELECT` 运算符上看到一个带有感叹号的黄色三角形。如果我们将鼠标悬停在该运算符上，会出现一个弹出窗口，底部有一条警告。`varchar01`
    列的值被转换为整数，以便与 `int01` 列的值进行比较。让我们重读上一句话并稍加强调：SQL Server 将**隐式转换 `VARCHAR01` 字段中的所有值**——整个表中的每一条记录。


    为什么会发生这种情况？答案当然是，我们（这里的“我们”包括 SQL Server）无法知道记录是否与其他记录等价，除非我们能够比较这些值。我们必须进行表扫描或索引扫描，以便首先将
    `varchar01` 字段中的**所有值**转换为整数，这样才能确定它们是否与 `int01` 字段中的值等价。这将导致扫描操作而非查找操作，从而带来扫描操作相应的性能开销。


    #### 字段宽度


    然后是数据类型宽度。我的意思是，为什么不把所有内容都设成 `nvarchar(max)` 来避免所有可能的截断错误这类事情呢？SQL Server 只会为字段中实际的字符数分配存储空间，所以这样应该没问题，对吧？嗯，将字段设置为不正确的数据类型或荒谬宽度的做法，有几个主要问题值得担忧。


    一个严重的问题是，人们会滥用设置宽数据类型的做法。你应该将每个字段设置为只包含所需的数据。慎重地使用正确的数据类型和字段宽度，可以避免字段被用作“万能”字段的可能性，人们可以（并且将会）在其中存放各种随机数据。当然，他们随后又会想要在这些随机数据上进行搜索……


    另一个问题是，SQL Server 使用一种称为“内存授权”的机制来确定运行查询所需的资源量。虽然 SQL Server 不会在 `nvarchar` 和
    `varchar` 字段中存储“空”字符，但内存授权会假设一行的宽度是该行可能的最大宽度，而不是该行数据的实际宽度。具有宽 `varchar`、`text`
    和 `image` 数据类型的字段将导致 SQL Server 对内存和 `tempdb` 空间（以及可能你的查询所需的其他资源）的估计变得非常臃肿。然后，你必须等到你的
    SQL Server 能够找到满足这些授权所需的资源后，才能运行你的查询。我希望你和我第一次了解到这种情况时一样，觉得这很可怕……


    所有这一切的结果是，数据类型**绝对重要**。当我们在后面讨论表和其他对象时，我们还会更多地涉及数据类型。但在清单 2-1 的代码示例中，编写这段代码的人非常仔细地检查了参数和临时对象的数据类型与数据库表的数据类型是否匹配，因此对于这个存储过程，没有数据类型方面的顾虑。


    ### 子查询及其位置


    SQL Server 现在（在大多数情况下）足够智能，可以将 `SELECT` 语句中的子查询转换为联接（join）。过去，它曾为返回记录集中的每一行运行一次每个子查询。真糟糕！然而，在我见过的很多情况下，会出现一个接一个的子查询，它们从几乎完全相同的表、相同的数据中调用几乎完全相同的信息。（看到了吗？这就是为什么我们想在调用表时捕获过滤数据。）例如，当我们查看前面表格中的
    `@usersDay` 调用时，我们看到有两个聚合都基于相同的过滤条件（`dayofmonth`）。它们都是子查询，如果被查询优化器转换为联接，每个子查询都会被作为一个单独的联接来调用。对同一个表的多次调用，无论是联接中的调用还是子查询中的调用，都是初始重写项目的绝佳目标，因为组合这些调用通常相对简单，并且可以显著减少读取次数。


    对于 `SELECT` 语句中的子查询，我们希望考虑将对同一表的调用组合起来，并将它们移动到某种联接中，通常是 `OUTER APPLY`。当它们在 `WHERE`
    子句中时，我们希望研究如何将这些数据提取出来，并以某种方式将其用作联接，以减少对这些给定表的命中和读取次数。复杂的 `WHERE` 子句在优化器试图生成一个好的查询计划时，会让它“头疼”；尽可能简化这个逻辑将有助于它生成最佳计划。


    在清单 2-1 的代码中，唯一的子查询是那些调用 `@usersDay` 并进行一些聚合的子查询。我们将在存储过程的文档中记录这一点。然后，当到了重写代码的时候，我们肯定会考虑合并这些子查询以减少命中次数。是的，即使对于临时表和表变量，我们也想这么做！

    '
- fmt: '## Calculations


    There can be a lot of gotchas with calculations. Divide-by-zero errors, parentheses
    causing incorrect results, and even inhibition of parallelism can be found with
    calculations. Calculations on columns in the `WHERE` clause can cause table scans
    just like we saw in implicit conversion earlier in the example in Listing [2-7](#483961_1_En_2_Chapter.xhtml#PC7);
    if `SQL Server` needs to determine whether a value in a field is equivalent to
    a value calculated from another field, it has to perform the calculation on every
    record to determine if there is equivalence.


    Most of the calculations in this stored procedure are very simple, for example,
    adding one or an integer to a column or variable. Simple calculations aren’t generally
    prone to issues. There is one division calculation at the end, but there is a
    check to avoid a divide-by-zero error. The code explicitly checks to make sure
    the divisor is not equal to zero before it performs the calculation, as you can
    see in the `CASE` statement, shown again in Listing [2-8](#483961_1_En_2_Chapter.xhtml#PC8).


    ```sql

    CASE

    WHEN fo.numPosts = 0

    THEN 0

    ELSE CAST(

    (

    SELECT MAX(ud.numPostsAnswered)

    FROM @usersDay ud

    WHERE ud.dayOfMonth = fo.dayOfMonth

    ) / fo.numPosts AS DECIMAL(8, 7))

    END

    ```


    Listing 2-8: Percentage posts calculation from Listing 2-1


    We are going to want to check all of the database objects this code calls for
    calculations as well, especially all tables and views. This seems a bit over the
    top; but there is a good reason. Any reference to a table or view with a computed
    column which uses a user-defined scalar function will result in a serial plan,
    even if the column is not referenced in the query. This is a parallelism inhibitor.
    “But you don’t want your queries running parallel, that indicates bad performance!”


    This is not exactly true. If a query runs in parallel, it indicates that the cost
    associated with the query is higher than the cost threshold of parallelism (`SQL
    Server` setting). How do they measure this cost? Well, once upon a time there
    was a computer that a developer used at Microsoft, and a bunch of measurements
    are tied to this arbitrary standard. We on my team commonly refer to those units
    as “Mysofts,” which generally indicates to us that you can compare them to other
    … “things”… but it’s not always clear how. But I digress.


    If you have a query that is beefy, it’s completely okay for it to run parallel.
    That’s why you have multiple `CPUs` after all, to spread the load for intensive
    operations. If the query will cost a certain number of Mysofts, you WANT it to
    run parallel because the elapsed time will be much shorter and your user will
    be much less grumpy. You do not want some arbitrary mistake by a developer years
    ago to keep this from being able to happen. So go check your tables and views
    to make sure there aren’t any calculated columns that use a scalar function. In
    the case of our code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1), there
    are none.


    ## Temporary Tables and/or Table Variables


    We definitely want to document the existence of temporary tables and table variables
    that appear in whatever code we are documenting: how wide they are, how many changes
    we make to the data or the definition throughout the procedure, and how many rows
    we think will be in each. Changing the definition of a temporary table, even if
    we’re adding an index, can cause a recompile of the stored procedure that contains
    that temporary table. Adding a large amount of data to a temporary table or table
    variable can also cause a recompile of the containing stored procedure.


    What’s the difference between temporary tables and table variables anyway? The
    main difference is that temporary tables have statistics as well as greater indexing
    support, whereas table variables do not have statistics and can only be indexed
    in a couple specific ways. We talked briefly about statistics in Chapter [1](#483961_1_En_1_Chapter.xhtml);
    here we’re specifically referring to data points related to indexes which indicate
    the distribution of data between each index value. That’s why many folks will
    recommend table variables for a small amount of data (in my opinion, I go with
    100 rows or less). Other folks have a different definition of small amount; you
    may need to determine what works best for you. Another reason for the 100 rows
    or less recommendation is that the optimizer will assume that a table variable
    only has one row (again, due to the lack of statistics).


    In our stored procedure in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1), we
    have both a table variable and a temporary table. The temporary table `#finalOutput`
    is created first and will at most have 31 rows in it (one row for each day of
    a month). It’s made up mostly of `smallint` columns, although it’s got an `nvarchar(40)`
    column, a `datetime` column, a `decimal` column, and a couple of `tinyint` columns.
    This table is quite narrow – it contains only a few columns.


    The table variable, `@usersDay`, is also narrow, but will have many, many more
    rows – one per user who answers a question on each day. There could be several
    thousands of rows in `@usersDay`!


    The definitions of both of these objects – `@usersDay` and `#finalOutput` – are
    not changed once created. According to the code, the data will be changing in
    both many, many times. These changes will occur one row at a time (the adds and
    updates are all in loops except for the last update for the temporary table).


    We’ll add the information in Listing [2-9](#483961_1_En_2_Chapter.xhtml#PC9) to
    the documentation we are creating for the code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1).


    ```

    #finalOutput temporary table, narrow            max possible rows -  31

    Inserts: one row at a time

    Updates: one row at a time (except last update)

    @usersDay table variable, narrow          possible rows - several thousand

    Inserts: one row at a time

    Updates: one row at a time

    ```


    Listing 2-9: Table variable and temporary table documentation for code in Listing
    2-1'
