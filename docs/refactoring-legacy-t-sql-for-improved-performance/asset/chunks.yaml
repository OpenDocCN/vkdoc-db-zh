  trans: '### 对每个数据库表的调用次数


    在文档的反模式部分，我喜欢以一个表格开始，列出被调用的每个数据库表的名称。随着代码的审阅，我们可以在每个表下添加一条额外的记录，这样就能一目了然地看到单个表被代码触达的频率。我还会包含每次调用所使用的筛选信息。我们也会记录对临时表和表变量的调用。表
    2-1 展示了对代码清单 2-1 所示存储过程的表调用情况文档。


    **表 2-1** 代码清单 2-1 的每个表的调用次数文档


    | 表 | 操作 | 返回的列 | 筛选条件 |

    | --- | --- | --- | --- |

    | `dbo.Posts` | 选择 | `MIN(Id)` | `CreationDate`, `PostTypeId` |

    | | 选择 | `AnswerCount`, `AcceptedAnswerId`, `CreationDate` | `Id` |

    | | 选择 | `MIN(OwnerUserId)` | `ParentId`, `PostTypeId` |

    | | 选择 | 1 | `OwnerUserId`, `ParentId`, `Id` |

    | | 选择 | `MAX(Score)` | `OwnerUserId`, `ParentId` |

    | | 选择 | `MIN(Id)` | `CreationDate`, `PostTypeId`, `Id` |

    | | 选择 | `MIN(OwnerUserId)` | `ParentId`, `PostTypeId`, `OwnerUserId` |

    | `#finalOutput` | 存在性检查 | | `dayOfMonth` |

    | | 插入或更新 | 行 OR `numPosts`, `numResponses` | 单条记录 (`dayOfMonth`) |

    | | 更新 | `numUsersResponded`, `numHighestUpvotesOneAnswer` | 单条记录 (`dayOfMonth`)
    |

    | | 更新 | `highNumUsersSinglePost` | 单条记录 (`dayOfMonth`) |

    | | 更新 | `userMostResponses`, `percentagePosts` | 单条记录 (`dayOfMonth`) |

    | | 选择 | `*` | |

    | `@usersDay` | 存在性检查 | | 单条记录 (`userID`/`dayOfMonth`) |

    | | 插入或更新 | 行 OR `numPostsAnswered`, `numAcceptedAnsPosts` | 单条记录 (`userID`/`dayOfMonth`)
    |

    | | 选择 | `displayName` | `dayOfMonth`, `numPostsAnswered` |

    | | 选择 | `Max(numPostsAnswered)` | `dayOfMonth` |

    | | 选择 | `Max(numPostsAnswered)` | `dayOfMonth` |

    | `dbo.Users` | 选择 | `DisplayName` | 单条记录 (`Id`) |


    一个立即引人注意的问题是，对临时表 `#finalOutput` 有数次更新操作，并且全部基于相同的筛选条件。此外，我们对数据库表 `dbo.Posts`
    的选择查询也相当频繁。


    ### 数据类型不匹配


    在代码清单 2-1 的存储过程中，数据库字段的数据类型都与用于筛选条件的参数数据类型或临时表/表变量的字段数据类型相匹配。但这究竟为什么重要呢？让我们看几个场景。


    #### 数据截断


    假设我们有一个表，其中包含一个名为 `Field100` 的 `varchar(100)` 字段，而我们将这个数据提取到一个临时表的字段中（`Field40`），该字段被设置为
    `varchar(40)` 数据类型。只要在我们要插入到临时表 `Field40` 字段的行中，`Field100` 的数据少于 40 个字符，那就没问题。然而，如果在待插入的任何记录中，`Field100`
    包含超过 40 个字符的数据，我们将在插入时遇到字符串截断错误。我们来看一下代码清单 2-2，这是一个数据截断示例的第一部分。


    ```sql

    DECLARE @sometable TABLE (somecol varchar(40));

    DECLARE @othertable TABLE (othercol Varchar(100));

    INSERT INTO @othertable(othercol)

    VALUES (''blah'')

    , (''foo'')

    , (''short'')

    , (''uhhuh'');

    INSERT INTO @sometable (somecol)

    SELECT othercol

    FROM @othertable;

    SELECT *

    FROM @sometable;

    ```


    **代码清单 2-2** 数据截断示例第一部分


    当我们运行代码清单 2-2 中的代码时，会得到如表 2-2 所示的记录集。


    **表 2-2** 数据截断示例第一部分的结果


    | somecol |

    | --- |

    | blah |

    | foo |

    | short |

    | uhhuh |


    然而，如果我们运行代码清单 2-3 的代码（数据截断示例的第二部分），我们甚至看不到一个记录集。


    ```sql

    DECLARE @sometable TABLE (somecol varchar(40));

    DECLARE @othertable TABLE (othercol Varchar(100));

    INSERT INTO @othertable(othercol)

    VALUES (''blah'')

    , (''foo'')

    , (''short'')

    , (''uhhuh'')

    , (''nuhuh Im going to be over 40 characters ha'');

    INSERT INTO @sometable (somecol)

    SELECT othercol

    FROM @othertable;

    SELECT *

    FROM @sometable;

    ```


    **代码清单 2-3** 数据截断示例第二部分


    相反，在“消息”选项卡下，我们会看到以下内容：


    ```

    (5 行受影响)

    消息 8152，级别 16，状态 14，第 12 行

    字符串或二进制数据将被截断。

    语句已终止。

    (0 行受影响)

    ```


    **代码清单 2-4** 数据截断示例第二部分的结果


    当你有几千行代码，然后需要找出发生截断的表和列时，没有什么比看到代码清单 2-4 所示的错误信息更令人沮丧的了。微软的出色团队在 SQL Server 2019
    中为此错误信息添加了表名和列名，那一刻简直是天籁之音，阳光穿透云层。然而，在你将所有实例升级之前，你仍然不得不经历那痛苦的过程，用令人煎熬的方式找出导致截断的代码。'
- fmt: '#### Implicit Conversion


    Microsoft has pretty thorough documentation on datatype conversions, and it’s
    really easy to find. It is on their `CAST` and `CONVERT` Books Online page: [https://docs.microsoft.com/en-us/sql/t-sql/functions/cast-and-convert-transact-sql?view=sql-server-2017](https://docs.microsoft.com/en-us/sql/t-sql/functions/cast-and-convert-transact-sql%253Fview%253Dsql-server-2017).


    There is a big chart that will tell you which datatypes you can convert into what
    other datatypes. There are pretty dots that indicate where implicit conversion
    takes place. The chart is nice, but sometimes very difficult to understand. What
    does this actually mean?


    Let’s say we have an integer field (`int01`) and we need to compare the value
    in `int01` to a varchar field (`varchar01`). The field `varchar01` has some integer-type
    values in it, but of course they are stored as varchars. Listing [2-5](#483961_1_En_2_Chapter.xhtml#PC5)
    illustrates this with a code example.


    ```

    DECLARE @sometable TABLE (int01 INT);

    DECLARE @othertable TABLE (varchar01 varchar(8));

    INSERT INTO @sometable (int01)

    VALUES (1)

    , (10)

    , (23)

    , (47)

    , (56);

    INSERT INTO @othertable(varchar01)

    VALUES (''23'')

    , (''a89'')

    , (''56o'')

    , (''e1'')

    , (''47'');

    SELECT ot.varchar01

    FROM @othertable ot

    WHERE EXISTS (SELECT 1

    FROM @sometable st

    WHERE st.int01 = ot.varchar01);

    Listing 2-5

    Implicit conversion example part 1

    ```


    Our `STATISTICS` output from running the code in Listing [2-5](#483961_1_En_2_Chapter.xhtml#PC5)
    shows that we get a conversion error. This error is shown in Listing [2-6](#483961_1_En_2_Chapter.xhtml#PC6).


    ```

    Msg 245, Level 16, State 1, Line 21

    Conversion failed when converting the varchar value ''a89'' to data type int.

    Listing 2-6

    Conversion error from implicit conversion example part 1

    ```


    If we instead run the conversion example in Listing [2-7](#483961_1_En_2_Chapter.xhtml#PC7),
    we can see evidence of the conversion in the execution plan. (Don’t forget to
    toggle the Execution Plan if you don’t have it turned on!)


    ```

    DECLARE @sometable TABLE (int01 INT);

    DECLARE @othertable TABLE (varchar01 varchar(8));

    INSERT INTO @sometable (int01)

    VALUES (1)

    , (10)

    , (23)

    , (47)

    , (56);

    INSERT INTO @othertable(varchar01)

    VALUES (''23'')

    , (''89'')

    , (''56'')

    , (''1'')

    , (''47'');

    SELECT ot.varchar01

    FROM @othertable ot

    WHERE EXISTS (SELECT 1

    FROM @sometable st

    WHERE st.int01 = ot.varchar01);

    Listing 2-7

    Implicit conversion example part 2

    ```


    Once we look at the execution plan for the code in Listing [2-7](#483961_1_En_2_Chapter.xhtml#PC7),
    which we show in Figure [2-1](#483961_1_En_2_Chapter.xhtml#Fig1), we can see a
    couple of interesting things.


    ![../images/483961_1_En_2_Chapter/483961_1_En_2_Fig1_HTML.jpg](images/483961_1_En_2_Chapter/483961_1_En_2_Fig1_HTML.jpg)


    Figure 2-1

    Evidence of implicit conversion


    In Figure [2-1](#483961_1_En_2_Chapter.xhtml#Fig1), we see a yellow triangle with
    an exclamation point on the `SELECT` operator. If we hover over that operator,
    there is a pop-up window that has a warning at the bottom. The `varchar01` column
    values were converted to integers to compare against the `int01` column values.
    Let’s reread that last sentence and add a little emphasis: SQL Server will implicitly
    convert ALL OF THE VALUES IN THE `VARCHAR01` FIELD – every record in the whole
    table.


    Why would this happen? The answer is, of course, that we (and “we” includes SQL
    Server) don’t know if records are equivalent to other records unless we can compare
    the values. We have to do a table or index scan so we can first convert ALL THE
    VALUES in the `varchar01` field to integers so we can determine whether they are
    equivalent to values in the `int01` field. This will cause a scan instead of a
    seek, with the corresponding performance overhead of a scan operation.


    #### Field Width


    Then there is datatype width. I mean, why not just make everything `nvarchar(max)`
    to avoid all of the possible truncation errors and those sorts of things? SQL
    Server only uses storage space for the number of characters in the field, so it
    won’t matter, right? Well, there are a couple of major concerns with the practice
    of just setting fields to incorrect datatypes or ridiculous widths.


    A serious concern is that people will abuse the practice of setting wide datatypes.
    You should set every field up to contain only the data that is required. Being
    thoughtful about using correct datatypes and field widths will avoid the possibility
    of fields being used as catch-all fields, that people can (and will) use for all
    sorts of random data. Of course, they will then want to search on that random
    data….


    Another concern is that SQL Server uses something called a memory grant to determine
    how many resources are needed to run your query. Although SQL Server doesn’t store
    “empty” characters in `nvarchar` and `varchar` fields, a memory grant will assume
    that the width of a row is as wide as that row could possibly be, as opposed to
    how wide the data in the row actually is. Fields with wide `varchar`s, `text`,
    and `image` datatypes will cause SQL Server’s estimate of the memory and `tempdb`
    space (and possibly other requirements your query needs) to be very bloated. Then,
    you have to wait until your SQL Server can find the resources needed to fulfill
    such grants before it can run your query. I hope you find this situation as frightening
    to contemplate as I did when I first learned about it….


    The upshot to all of this is that datatypes absolutely matter. We’ll touch a bit
    more on datatypes when we get into tables and other objects as well. But in the
    case of the code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1), whoever wrote
    this code was very good about checking parameter and temporary object datatypes
    against the database table datatypes, and there are no datatype concerns for this
    stored procedure.


    ### Subqueries and Where They’re Located


    SQL Server is now smart enough (for the most part) to translate subqueries in
    a `SELECT` statement to a join. In the past, it used to run each subquery once
    for each row in the return recordset. Yuck! In a lot of cases that I’ve seen,
    though, there will be subquery after subquery that calls almost exactly the same
    information, from the same table, filtering on the same data. (See? That’s why
    we wanted to capture the filtering data with the table calls.) For example, when
    we look at the `@usersDay` calls in the preceding table, we see there are two
    aggregates both based on the same filtering (`dayofmonth`). They are both subqueries
    and will get called as a separate join each if translated by the Query Optimizer
    to joins. Multiple calls to the same table, whether it’s calls in joins or subqueries,
    are a great target for initial rewrite items, since combining these is usually
    relatively simple and can significantly reduce reads.


    For subqueries in the `SELECT` statement, we want to look at combining calls to
    the same table and moving them to some sort of join, usually an `OUTER APPLY`.
    When they are in the `WHERE` clause, we want to look at how we can pull that data
    out and use it as a join in some way to reduce the hits and reads on those given
    tables. Complex `WHERE` clauses can give the optimizer headaches when it is trying
    to come up with a good query plan; simplifying this logic as much as possible
    will help it come up with the best plan it can.


    The only subqueries in our code in Listing [2-1](#483961_1_En_2_Chapter.xhtml#PC1)
    are the subqueries calling `@usersDay` and doing some aggregates. We will note
    this in our documentation for the stored procedure. Then, when it comes time to
    rewrite the code, we’ll definitely look at combining these subqueries to reduce
    hits. Yes, we want to do this even for temporary tables and table variables!'
