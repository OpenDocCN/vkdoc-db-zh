    in Listing [7-19](#483961_1_En_7_Chapter.xhtml#PC21) to look at some metrics around
    running code calling the multi-statement TVF in Listing [7-18](#483961_1_En_7_Chapter.xhtml#PC20).


    ```sql

    SELECT DisplayName

    , Reputation

    FROM dbo.responderInfoMultiValue(649789); --the number is a post ID

    ```

