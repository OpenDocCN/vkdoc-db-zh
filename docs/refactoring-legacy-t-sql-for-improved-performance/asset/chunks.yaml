  raw: '## Relative Effort


    If this is a several-thousand-line-of-code object, just shake your head sadly
    and walk away. Just kidding! However, the effort to just understand what is going
    on will be significant, let alone the effort to actually fix the performance issues.
    This is where great documentation comes into play, but it’s unlikely that if you’re
    reading this book, you have that kind of help at your disposal.


    Additionally, you need to think about QA (quality assurance) effort. The best
    scenario is to never EVER let untested code go into production. By untested, I
    mean code that hasn’t passed a rigorous QA process. Running something once on
    your laptop seems like a great idea, but there are all sorts of weird scenarios
    that you may not be aware of, that a QA professional will have a much better grasp
    on.


    How many precise pain points are in this code? This will be the biggest determination
    of what kind of triage we can perform to put smiles on the users’ faces (or at
    least make them stop complaining to your boss). Regardless of any of these answers
    though, if code has been identified as a real problem, triage is only your first
    step. Even if you “fix” it with an index or other smooth wizardry, DO NOT STOP
    there! Fully document the code and rewrite if necessary.


    ## Problem Areas


    “Hello? Sam DBA? Every time a user tries to change their display name, the application
    hangs for seconds, and it’s really frustrating everyone.”


    The best way to see what’s going on with code is to go run some of the code that
    is causing problems. Sometimes, settings outside of the actual SQL code can cause
    issues as well. Application connection strings can sometimes set ANSI settings,
    and this can make SQL code run very differently from SQL Server Management Studio
    (SSMS), for example. We’re going to assume that this has already been ruled out
    and isn’t the cause of what we’re seeing in this book, but I wanted you to be
    aware that if you haven’t checked into those possibilities, you probably should.


    This is really useful information that you just received from the caller. Be aware,
    however, that people like to throw around terms like “always” and “never” pretty
    lightly. Try to get details: “When you say every time, is it 100% of the time?
    Is it 90% of the time? Is it any time of day or limited to certain times?” Document
    the answers to go along with the ticket/request/complaint documentation.


    Let’s go look at what’s happening when a user tries to change their display name.
    We’re going to try to change the following users’ display names in the sections
    to follow as we look for where the issues are. We’ll use Jon Skeet who has an
    `Id` of 22656 and stic who has an `Id` of 31996\. The query will be run against
    the `dbo.Users` table.


    ### STATISTICS IO and Time


    `STATISTICS IO` is a measure of the amount of IO resources a query uses, and `STATISTICS
    TIME` measures CPU and elapsed time a query runs, as well as query compile time.
    If you are counting on that number at the bottom right of SSMS to measure query
    time, STOP IT! It is not accurate – or certainly not accurate ENOUGH.


    ### Query Window Setup


    First, open up SSMS. Connect to the database and open a new query window and then
    turn `STATISTICS IO` and `STATISTICS TIME` on. To do this through the UI, choose
    the menu option for Query, then Query Options, and then Advanced. Figure [1-1](#483961_1_En_1_Chapter.xhtml#Fig1)
    shows the Advanced window for the Query Options.


    ![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig1_HTML.jpg](images/483961_1_En_1_Chapter/483961_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Query Options Advanced window in SSMS


    Make sure you check BOTH the `SET STATISTICS TIME` and the `SET STATISTICS IO`
    boxes and then click OK.


    If you want to go all scripting, you simply type in the query window the code
    shown in Listing [1-1](#483961_1_En_1_Chapter.xhtml#PC1).


    ```

    SET STATISTICS TIME, IO ON;

    Listing 1-1

    Command to set STATISTICS TIME and IO on

    ```


    and click Execute (or hit Ctrl-E). Please note that either way you set `STATISTICS
    TIME` and `IO` on, it will only be set for that specific query window or connection
    (SPID). If the connection gets reset (e.g., restarting SSMS) or if you open another
    query window, you will need to turn `STATISTICS TIME` and `IO` on again for the
    new query window.


    ### Code Tests


    Next, we want to update a user’s name. So, first, I went and found a user by querying
    the `Users` table and came up with a quick query to change a name. I ran it twice,
    because the first run usually includes compile time. This user’s original name
    was “stic”, by the way. We’ll change it back later.


    ```

    UPDATE Users

    SET DisplayName = ''stic in mud''

    WHERE Id = 31996;

    Listing 1-2

    Code to update the display name of user “stic”

    ```


    Listing [1-3](#483961_1_En_1_Chapter.xhtml#PC3) shows what the `STATISTICS IO`
