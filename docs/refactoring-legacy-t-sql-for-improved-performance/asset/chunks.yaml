    ## 总结


    重写代码时真正有帮助的经验法则如下：


    1.  彻底记录代码，以帮助定位需要重写的目标问题区域。

    2.  尽可能消除循环和游标。

    3.  尽量减少对任何表的调用次数。

    4.  在添加更多临时结构之前，了解你的应用程序如何使用 `tempdb`。

    5.  尝试几种重写代码的方法，看看哪种在每种情况下效果最好。


    到目前为止做得不错！我们已经在这段代码上取得了一些性能进展。让我们看看在这段数据库代码中，还有什么其他狡猾的“小妖精”在等着我们。


    # 7. 函数


    函数有几种类型。有表值函数，你可以传入一个或一组值，并得到一个表值作为返回。还有标量值函数，你传入一个或一组值，并得到一个单一的返回值。


    聚合函数是作用于一组值并返回单个值的函数。SQL Server 有几个内置的聚合函数：`COUNT()`、`MIN()`、`MAX()`、`SUM()`等。除了
    `COUNT()` 之外，所有这些函数都会忽略 `NULL` 值。你也可以创建自己的用户定义聚合函数，但需要使用 `CLR` 程序集，这超出了本书的范围。


    根据函数在代码中使用的位置，它们可能是性能问题的一大来源。几乎所有性能问题都将来自标量值函数；而表值函数按定义是作用于集合的，并且通常比标量值函数以更温和的方式使用。


    ## 标量函数


    让我们看一个简单的例子。假设我们有一个将数字加一的函数。（别笑——我在实际场景中见过这个。是的，真的。）该函数的 `ALTER` 语句如清单 7-1 所示。


    ```sql

    ALTER FUNCTION dbo.increment (@someint int)

    RETURNS int

    AS

    BEGIN

    RETURN(@someint + 1);

    END;

    GO

    ```

    清单 7-1：标量值函数 `dbo.increment` 的 ALTER 语句


    我们将运行一个查询来演示使用该函数。我们要运行的第一个查询如清单 7-2 所示。目前，我们将在此查询中将函数调用注释掉，以获取不使用函数时的基准数据。另外，在运行查询前请开启
    `STATISTICS IO` 和 `TIME`。


    ```sql

    SELECT p.Id

    , p.Score

    --    , dbo.increment(p.Score) AS oneAdded

    FROM dbo.Posts p

    WHERE p.Score = 320;

    ```

    清单 7-2：列出分数为 320 的帖子的简单查询


    清单 7-2 中查询的 `STATISTICS IO`/`TIME` 输出如下：


    ```

    (62 rows affected)

    Table ''Posts''. Scan count 1, logical reads 3, physical reads 0, read-ahead reads
    0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms, elapsed time = 0 ms.

    ```


    这个查询没有太多操作，这是可以预料的。它是一个非常简单的查询，并且 `WHERE` 子句是基于一个有索引的列。当我们通过取消注释添加函数行时，我们的 `STATISTICS
    IO`/`TIME` 输出完全没有变化：


    ```

    (62 rows affected)

    Table ''Posts''. Scan count 1, logical reads 3, physical reads 0, read-ahead reads
    0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms, elapsed time = 0 ms.

    ```


    ## 查看函数引起的 `STATISTICS IO`


    这根本说不通！现在，我想在这里提醒你注意一点：`STATISTICS IO` 不会显示函数的 I/O。我们在本书前面简要提到过这一点，但值得重申。为此，我们需要使用一个
    `扩展事件`。我们可以使用 `探查器` 跟踪，但这已经相当过时了。另请注意，`扩展事件` 的持续时间默认以微秒为单位测量，而不是毫秒。


    如果你运行了本书的数据库设置脚本，`事件会话` 应该已经存在于你的数据库中。如果没有，清单 7-3 展示了如何创建我们将要使用的会话。


    ```sql

