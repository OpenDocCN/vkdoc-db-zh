    的记录。执行这个任务需要进行大量的读取。让我们再运行一个例子，这次我们将获取一个执行计划。


    ### 执行计划


    执行计划显示了 SQL Server 决定如何运行你的查询或语句。它展示了优化器选择的操作符。如果你从未看过它，可能会感到困惑。执行计划是 XML 数据，可以被解析成一个图表，显示
