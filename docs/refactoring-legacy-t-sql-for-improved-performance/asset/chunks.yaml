    ALTER PROCEDURE [dbo].[DailySummaryReportPerMonth] @monthYear DATETIME

    AS

    BEGIN

    /* 以防传入的不是月份的第一天 */

    SET @monthYear = DATEADD(month, DATEDIFF(month, 0, @monthYear), 0);

    DECLARE @postID           INT

    , @dayOfMonth       TINYINT

    , @numAnswers       INT

    , @numUsers         INT

    , @acceptedAnswerID INT

    , @userID           INT

    , @displayName      NVARCHAR(40)

    , @isAccepted       BIT

    , @userCtThisPost   SMALLINT

    , @numUpvotes       SMALLINT;

    CREATE TABLE #finalOutput

    ( monthyear                  DATETIME

    , dayOfMonth                 TINYINT

    , dayOfWeek                  TINYINT

    , numPosts                   SMALLINT

    , numResponses               SMALLINT

    , numUsersResponded          SMALLINT

    , highNumUsersSinglePost     SMALLINT

    , userMostResponses          NVARCHAR(40) -- 显示名称

    , percentagePosts            DECIMAL(8, 7)

    , numHighestUpvotesOneAnswer SMALLINT

    );

    DECLARE @usersDay TABLE

    ( dayOfMonth          TINYINT

    , userID              INT

    , displayName         NVARCHAR(40)

    , numPostsAnswered    SMALLINT

    , numAcceptedAnsPosts SMALLINT

    );

    /* 获取时间段内第一个不是评论或回答的帖子 */

    SET @postID = COALESCE(

    (

    SELECT MIN(Id)

    FROM dbo.Posts

    WHERE DATEADD(month, DATEDIFF(month, 0, creationDate), 0) = @monthYear

    AND PostTypeId = 1

    ), 0);

    /* 获取时间段内所有不是评论或回答的帖子 */

    WHILE @postID > 0

    BEGIN

    SELECT @numAnswers = p.AnswerCount

    , @acceptedAnswerid = p.AcceptedAnswerId

    , @dayOfMonth = DATEPART(dd, p.CreationDate)

    FROM dbo.Posts p

    WHERE p.Id = @postID;

    IF EXISTS

    (

    SELECT 1

    FROM #finalOutput

    WHERE dayOfMonth = @dayOfMonth

    )

    BEGIN

    -- 更新

    UPDATE fo

    SET fo.numPosts = fo.numPosts + 1

    , fo.numResponses = fo.numResponses + @numAnswers

    FROM #finalOutput fo

    WHERE fo.dayOfMonth = @dayOfMonth;

    END;

    ELSE

    BEGIN

    -- 插入

    INSERT INTO #finalOutput

    ( monthYear

    , dayOfMonth

    , dayOfWeek

    , numPosts

    , numResponses

    , numUsersResponded

    , highNumUsersSinglePost

    , userMostResponses

    , numHighestUpvotesOneAnswer

    )

    VALUES

    ( @monthYear

    , @dayOfMonth

    , DATEPART(dw, DATEADD(dd, @dayOfMonth - 1, @monthYear))

    , 1

    , @numAnswers

    , 0

    , 0

    , "

    , 0

    );

    END;

    /* 现在处理用户相关数据 */

    SET @userCtThisPost = 0;

    SET @userID = COALESCE(

    (

    SELECT MIN(p.ownerUserId)

    FROM dbo.Posts p

    WHERE p.ParentId = @postID

    AND p.PostTypeId = 2

    ), 0);

    WHILE @userID > 0

    BEGIN

    SET @isAccepted = COALESCE(

    (

    SELECT 1

    FROM dbo.Posts p

    WHERE p.OwnerUserId = @userID

    AND p.ParentId = @postID

    AND p.Id = @acceptedAnswerID

    ), 0);

    SET @userCtThisPost = @userCtThisPost + 1;

    SET @numUpvotes = COALESCE(

    (

    SELECT MAX(p.Score)

    FROM dbo.Posts p

    WHERE p.OwnerUserId = @userID

    AND p.ParentId = @postID

    ), 0);

    UPDATE fo

    SET fo.numUsersResponded = fo.numUsersResponded + 1

    , fo.numHighestUpvotesOneAnswer = CASE

    WHEN @numUpvotes > fo.numHighestUpvotesOneAnswer

    THEN @numUpvotes

    ELSE fo.numHighestUpvotesOneAnswer

    END

    FROM #finalOutput fo

    WHERE fo.dayOfMonth = @dayOfMonth;

    /* 为后续计算向用户表添加记录 */

    IF EXISTS

    (

    SELECT 1

    FROM @usersDay

    WHERE dayOfMonth = @dayOfMonth

    AND userID = @userID

    )

    BEGIN

    UPDATE ud

    SET ud.numPostsAnswered = ud.numPostsAnswered + 1

    , ud.numAcceptedAnsPosts = ud.numAcceptedAnsPosts + @isAccepted

    FROM @usersDay ud

    WHERE dayOfMonth = @dayOfMonth

    AND userID = @userID;

    END;

    ELSE

    BEGIN

    INSERT INTO @usersDay

    ( dayOfMonth

    , userID

    , displayName

    , numPostsAnswered

    , numAcceptedAnsPosts

    )

    SELECT @dayOfMonth

    , @userID

    , u.DisplayName

    , 1

    , @isAccepted

    FROM dbo.Users u

    WHERE u.Id = @userID;

    END;

    SET @userID = COALESCE(

    (

    SELECT MIN(p.OwnerUserId)

    FROM dbo.Posts p

    WHERE p.ParentId = @postID

    AND PostTypeId = 2

    AND p.OwnerUserId > @userID

    ), 0);

    END;

    UPDATE fo

    SET fo.highNumUsersSinglePost = CASE

    WHEN @userCtThisPost > fo.highNumUsersSinglePost

    THEN @userCtThisPost

    ELSE fo.highNumUsersSinglePost

    END

    FROM #finalOutput fo

    WHERE fo.dayOfMonth = @dayOfMonth;

    /* 获取下一个帖子 ID */

    SET @postID = COALESCE(

    (

    SELECT MIN(Id)

    FROM dbo.Posts

    WHERE DATEADD(month, DATEDIFF(month, 0, creationDate), 0) = @monthYear

    AND PostTypeId = 1

    AND Id > @postID

    ), 0);

    END;

    /* 最终的每日用户计算 */

    UPDATE fo

    SET fo.userMostResponses =

    (

    SELECT ud.displayName

    FROM @usersDay ud

    WHERE ud.dayOfMonth = fo.dayOfMonth

    AND ud.numPostsAnswered =

    (

    SELECT MAX(udm.numPostsAnswered)

    FROM @usersDay udm

    WHERE ud.dayOfMonth = fo.dayOfMonth

    )

    )

    , fo.percentagePosts = CASE

    WHEN fo.numPosts = 0

    THEN 0

    ELSE CAST(

    (

    SELECT MAX(ud.numPostsAnswered)

    FROM @usersDay ud

    WHERE ud.dayOfMonth = fo.dayOfMonth

    ) / fo.numPosts AS DECIMAL(8, 7))

    END

    FROM #finalOutput fo;

    SELECT *

    FROM #finalOutput;

    END;

    ```


    # 功能文档


    我们很幸运，能够了解这个报告应该做什么！我们有一份列出了需求的用户故事。请记住，这个数据库是 StackOverflow 数据库的备份，其中包含用户提出的编程问题、对这些问题的回答，以及针对初始帖子和回答的评论。


    功能需求在此用户故事中给出：


    对于给定月份的每一天，我需要知道


    1.  发布了多少个问题？

    2.  针对这些问题发布了多少个答案，不论日期？

    3.  有多少个不同的用户回答了这些帖子？

    4.  该月内，响应单个问题的不同用户的最高数量是多少？

    5.  哪位用户响应了该月发布的最多问题？

    6.  该用户响应了多少个问题？

    7.  这占该月发布的问题总数的百分比是多少？

    8.  其中有多少响应被标记为接受的答案？


    能够接触到功能需求（在本例中是我们的用户故事）是一个极好的起点。当我们完成文档编写并开始重写此代码时，我们可以将其分解为更小的部分，不仅关注每个部分的性能，还要验证它是否满足功能需求。


    # 统计信息与执行计划


    在大多数情况下，`STATISTICS TIME and IO` 输出以及执行计划都应捕获并包含在文档中。然而，在这种情况下，如果不写成一本小说而不是代码文档，几乎不可能捕获这些信息。原始代码包含两个嵌套的
    `while` 循环，这会导致笨拙的 `STATISTICS` 输出以及庞大的执行计划。`STATISTICS` 输出和执行计划都需要为循环的每个部分显示一个节，从而使输出过于庞大。


    # 编码（反）模式


    以下是一个应仔细检查的编码模式清单，因为它们可能引发危险信号：


    *   对单个表的多次调用

    *   数据类型：参数与数据库字段之间的不匹配、字段宽度

    *   子查询：数量和位置（查询的子句）

    *   计算

    *   临时表和表变量

    *   循环和/或游标

    *   CTE（公用表表达式）

    *   使用的连接类型

    *   `LIKE`、`NOT LIKE` 或 `NOT IN` 的使用

    *   `DISTINCT`、`TOP` 或其他排序操作

    *   对其他 SQL 对象（存储过程、视图、函数）的调用

    *   其他异常情况

    '
- fmt: '### Number of Calls to Each Database Table


    I like to start the anti-pattern section of the documentation with a table that
    has the name of each database table being called. As we go through the code, we
    can add an additional record under each table so we can see at a glance how often
    a single table has been touched by the code. I also include information on filtering
    used for each call. We will note calls to temporary tables and table variables
    as well. Table 2-1 shows the documentation of table calls for the stored procedure
    shown in Listing 2-1.


    **Table 2-1** Documentation of number of calls per table for Listing 2-1


    | Table | Operation | Columns Returned | Filtering |

    | --- | --- | --- | --- |

    | `dbo.Posts` | Select | `MIN(Id)` | `CreationDate`, `PostTypeId` |

    | | Select | `AnswerCount`, `AcceptedAnswerId`, `CreationDate` | `Id` |

    | | Select | `MIN(OwnerUserId)` | `ParentId`, `PostTypeId` |

    | | Select | 1 | `OwnerUserId`, `ParentId`, `Id` |

    | | Select | `MAX(Score)` | `OwnerUserId`, `ParentId` |

    | | Select | `MIN(Id)` | `CreationDate`, `PostTypeId`, `Id` |

    | | Select | `MIN(OwnerUserId)` | `ParentId`, `PostTypeId`, `OwnerUserId` |

    | `#finalOutput` | Exists | | `dayOfMonth` |

    | | Insert or update | Row OR `numPosts`, `numResponses` | Single record (`dayOfMonth`)
    |

    | | Update | `numUsersResponded`, `numHighestUpvotesOneAnswer` | Single record
    (`dayOfMonth`) |

    | | Update | `highNumUsersSinglePost` | Single record (`dayOfMonth`) |

    | | Update | `userMostResponses`, `percentagePosts` | Single record (`dayOfMonth`)
    |

    | | Select | `*` | |

    | `@usersDay` | Exists | | Single record (`userID`/`dayOfMonth`) |

    | | Insert or update | Row OR `numPostsAnswered`, `numAcceptedAnsPosts` | Single
    record (`userID`/`dayOfMonth`) |

    | | Select | `displayName` | `dayOfMonth`, `numPostsAnswered` |

    | | Select | `Max(numPostsAnswered)` | `dayOfMonth` |

    | | Select | `Max(numPostsAnswered)` | `dayOfMonth` |

    | `dbo.Users` | Select | `DisplayName` | Single record (`Id`) |


    One thing that stands out immediately is that there are several updates to the
    `#finalOutput` temporary table, all based on the same filtering criteria. Also,
    we’re selecting from the database table `dbo.Posts` quite often.


    ### Datatype Mismatches


    In the stored procedure in Listing 2-1, the database field datatypes all match
    the parameter datatypes or temporary table/table variable field datatypes that
    are used for filtering criteria. But why does this even matter? Let’s look at
    a few scenarios.


    #### Data Truncation


    What if we have a `varchar(100)` field called `Field100` in a table and we’re
    pulling this data into a field in a temporary table (`Field40`) that is set as
    a `varchar(40)` datatype? As long as there is less than 40 characters of data
    in `Field100` in the rows that we’re inserting into `Field40` in the temporary
    table, we should be fine. However, if there are more than 40 characters of data
    in `Field100` in any of the records to be inserted, we will get a string truncation
    error upon insert. Let’s consider Listing 2-2 which is part 1 of an example of
    data truncation.


    ```sql

    DECLARE @sometable TABLE (somecol varchar(40));

    DECLARE @othertable TABLE (othercol Varchar(100));

    INSERT INTO @othertable(othercol)

    VALUES (''blah'')

    , (''foo'')

    , (''short'')

    , (''uhhuh'');

    INSERT INTO @sometable (somecol)

    SELECT othercol

    FROM @othertable;

    SELECT *

    FROM @sometable;

    ```


    **Listing 2-2** Data truncation example part 1


    When we run the code in Listing 2-2, we get the recordset shown in Table 2-2.


    **Table 2-2** Results from the data truncation example part 1


    | somecol |

    | --- |

    | blah |

    | foo |

    | short |

    | uhhuh |


    However, if we run the code for Listing 2-3, which is the second part of the data
    truncation example, we don’t even see a recordset.


    ```sql

    DECLARE @sometable TABLE (somecol varchar(40));

    DECLARE @othertable TABLE (othercol Varchar(100));

    INSERT INTO @othertable(othercol)

    VALUES (''blah'')

    , (''foo'')

    , (''short'')

    , (''uhhuh'')

    , (''nuhuh Im going to be over 40 characters ha'');

    INSERT INTO @sometable (somecol)

    SELECT othercol

    FROM @othertable;

    SELECT *

    FROM @sometable;

    ```


    **Listing 2-3** Data truncation example part 2


    Instead, under the Messages tab, we see the following:


    ```

    (5 rows affected)

    Msg 8152, Level 16, State 14, Line 12

    String or binary data would be truncated.

    The statement has been terminated.

    (0 rows affected)

    ```


    **Listing 2-4** Results from the data truncation example part 2


    There is nothing quite as frustrating as seeing the error message shown in Listing
    2-4 when you have several thousand lines of code, and then need to find the table
    and column where the truncation is occurring. The stellar folks at Microsoft have
    added the table and column for this error message in SQL Server 2019, and the
    angels did sing and the sun did shine through the clouds. However, until you get
    all of your instances upgraded, you’re still going to have to go through the pain
    of finding code causing truncation the agonizing way.'
