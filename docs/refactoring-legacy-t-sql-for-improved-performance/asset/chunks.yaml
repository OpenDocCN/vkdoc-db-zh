    Is there ever a place for a scalar-valued function? Perhaps. I generally do not
    use them, but I can see where they could be useful. Say every night I run a procedure
    that gives a bonus to people who respond depending on what day of the week it
    is, or whether it’s a holiday. The calculation to determine whether it’s a holiday,
    weekend, or workday may be somewhat complicated. I could see writing a function
    to pass in a date and have it determine which type of day it is and therefore
    what the multiplier for the bonus would be. I can call the function at the beginning
    of my procedure, save the return value in a variable, and use it to calculate
    the correct bonus for each person responding to a question that day.


    ## Table Valued Functions (TVFs)


    There are two different types of table-valued functions: in-line TVFs and multi-statement
    TVFs. The syntax is a bit different, and you can only have a single select statement
    in an in-line TVF. You may have more complex logic in a multi-statement TVF, but
    you will also get a corresponding performance hit. Even an in-line TVF and a multi-statement
    TVF doing the “same work” will result in the in-line TVF performing much better.
    Let’s take a look at the multi-statement TVF in Listing [7-18](#483961_1_En_7_Chapter.xhtml#PC20).


    ```sql

    ALTER FUNCTION dbo.responderInfoMultiValue (@postID int)

    RETURNS @userInfo TABLE

    (DisplayName nvarchar(40)

    , Reputation int

    , WebsiteURL nvarchar(200)

    )

    AS

    BEGIN

    DECLARE @userList TABLE (ownerUserID int);

    INSERT INTO @userList (ownerUserID)

    SELECT p.OwnerUserId

    FROM dbo.Posts p

    WHERE p.ParentId = @postID

    AND p.PostTypeId = 2;

    INSERT INTO @userInfo (DisplayName, Reputation, WebsiteURL)

    SELECT u.DisplayName

    , u.Reputation

    , u.WebsiteUrl

    FROM dbo.Users u

    INNER JOIN @userlist ul ON ul.OwnerUserId = u.Id;

    RETURN

    END;

    GO

    ```

    Listing 7-18

    Alter statement from `responderInfoMultiValue`


