    CREATE FUNCTION dbo.getLastBadgeUser (@userID int)\nRETURNS nvarchar(40)\nAS\n\
    BEGIN\nDECLARE @badgename nvarchar(40);\nSET @badgename = COALESCE((SELECT TOP\
    \ 1 [Name]\nFROM dbo.Badges\nWHERE userID = @userID\nORDER BY [Date] DESC),”);\n\
    RETURN @badgename;\nEND;\n```\n**Listing 6-17**\nCreate statement for `dbo.getLastBadgeUser`\n\
    \nWe should be able to use an `OUTER APPLY` with the badge info and move the code\
    \ from the function almost intact into the `OUTER APPLY`, as shown in [Listing\
    \ 6-18](#483961_1_En_6_Chapter.xhtml#PC38).\n\n```\nOUTER APPLY (SELECT TOP 1\
    \ [Name] AS latestBadge\nFROM dbo.Badges\nWHERE userID = u.id\nORDER BY [Date]\
    \ DESC) AS bInfo\n```\n**Listing 6-18**\nThe `OUTER APPLY` to replace the `getLastBadgeUser`\
    \ function\n\n### Remove the Leading % in Our LIKE Statement\n\nThis is the last\
    \ piece we are going to change in our `getUserInfoByName` query. As we discussed\
    \ before, the Query Optimizer can’t use an index when there’s a leading `%` in\
    \ our `LIKE` statement. Why is this? Well, it makes complete sense if we think\
    \ about what an index is. It is the data displayed in a certain order. If the\
    \ leading column is a `varchar` or similar datatype, the order is alphabetical.\
    \ If we know the start of the phrase, we can use the index to go find the data\
    \ which matches the beginning, because we know exactly where in the index it is\
    \ due to the index’s order. If we do not know the beginning, though, we will still\
    \ have to scan the entire index as opposed to being able to use a targeted seek\
    \ operation.\n\nWhen we put our three changes together – removing the subqueries,\
    \ removing the functions, and removing our leading `%` in our `LIKE` statement\
    \ – we get the code shown in [Listing 6-19](#483961_1_En_6_Chapter.xhtml#PC39).\n\
    \n```\nIF NOT EXISTS\n(\nSELECT 1\nFROM sys.procedures\nWHERE name = 'getUserInfoByName'\n\
    )\nBEGIN\nDECLARE @sQL NVARCHAR(1200);\nSET @sQL = N'/**************************************************************************\n\
    2019.07.07         LBohm        INITIAL STORED PROC STUB CREATE RELEASE\n**************************************************************************/\n\
    CREATE PROCEDURE dbo.getUserInfoByName\nAS\nSET NOCOUNT ON;\nBEGIN\nSELECT 1;\n\
    END;';\nEXECUTE SP_EXECUTESQL\n@sQL;\nEND;\nGO\n/**************************************************************************\n\
    Description: Data for users by name\n--Test call:\n-- EXECUTE dbo.getUserInfoByName\
    \ @theName = 'Joel';\n2019.07.07         LBohm          INITIAL RELEASE\n**************************************************************************/\n\
    ALTER PROCEDURE [dbo].[getUserInfoByName] @theName varchar(20)\nAS\nSELECT u.ID\n\
    , u.displayname\n, u.aboutme\n, SUM(CASE WHEN p.postTypeID = 1 THEN 1 ELSE 0 END)\
    \ AS numPosts\n, SUM(CASE WHEN v.id IS NOT NULL THEN 1 ELSE 0 END) AS numFavVotes\n\
    , SUM(CASE WHEN p.postTypeID = 2 THEN 1 ELSE 0 END) AS numComments\n, MAX(CASE\
    \ WHEN p.postTypeID = 2 THEN p.creationDate ELSE '20000101' END) AS dateLastComment\n\
    , u.upvotes\n, u.downvotes\n, binfo.latestBadge\nFROM dbo.users u\nINNER JOIN\
    \ dbo.posts p ON u.id = p.ownerUserID\nLEFT OUTER JOIN dbo.votes v ON p.ID = v.postID\n\
    AND v.VoteTypeId = 5\nOUTER APPLY (SELECT TOP 1 [Name] AS latestBadge\nFROM dbo.Badges\n\
    WHERE userID = u.id\nORDER BY [Date] DESC) AS bInfo\nWHERE p.postTypeID IN (1,2)\n\
    AND u.[DisplayName] LIKE @theName + '%'\nGROUP BY u.id\n, u.displayname\n, u.aboutme\n\
    , u.upvotes\n, u.downvotes\n, binfo.latestBadge;\n```\n**Listing 6-19**\nRewrite\
    \ of the `getUserInfoByName` stored procedure\n\nWe need to test both the output\
    \ and the `STATISTICS IO` and `TIME` for this query. After updating the stored\
    \ procedure definition by running the code in [Listing 6-19](#483961_1_En_6_Chapter.xhtml#PC39),\
    \ we can re-rerun the sample call to this procedure which is found in [Listing\
    \ 6-15](#483961_1_En_6_Chapter.xhtml#PC33). We can then review the results, a\
    \ subset of which is shown in [Table 6-12](#483961_1_En_6_Chapter.xhtml#Tab12).\n\
    \n**Table 6-12**\nSubset of results from running [Listing 6-15](#483961_1_En_6_Chapter.xhtml#PC33)\
    \ against the proc in [Listing 6-19](#483961_1_En_6_Chapter.xhtml#PC39)\n\n| ID\
    \ | Display name | numPosts | Num FavVotes | Num Comments | Up votes | Down votes\
