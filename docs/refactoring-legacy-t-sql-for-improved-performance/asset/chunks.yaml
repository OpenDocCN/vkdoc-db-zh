    表 7-2 向我们展示的景象与表 7-1 或原始的`STATISTICS IO`和`TIME`输出大不相同。我们可以看到`duration`和`logical
    reads`存在差异。扩展事件认为`row count`翻了一倍。这些`RETURN`语句都是什么？它们是函数运行的结果：针对输出结果的每一行运行一次。哇！这累积起来会产生大量的额外工作。如果这是一个复杂得多的函数呢？嗯，我们稍后会讨论到。首先，让我们看看如果函数出现在`WHERE`子句中会发生什么。


    ## WHERE 子句中的标量值函数


    我将在测试的`WHERE`子句中添加额外的限制条件，否则扩展事件中会返回过多的数据。让我们使用以下步骤：


    1.  删除扩展事件文件。

    2.  使用清单 7-4 中的代码启动扩展事件会话。

    3.  运行清单 7-7 中的查询。

    4.  使用清单 7-5 中的代码停止扩展事件会话。

    5.  使用清单 7-6 中的代码查看输出，结果如表 7-2 所示。


    ```sql

    SELECT p.Id

    , p.Score

    FROM dbo.Posts p

    WHERE p.Score > 315

    AND p.Score < 325

    AND dbo.increment(p.Score) = 321;

    ```

    *清单 7-7* 在`WHERE`子句中使用函数的查询


    你可能会更常在实际场景中看到函数出现在`WHERE`子句中，例如“我想看看昨天发生了什么”，于是函数会将某列的值加一天，然后判断是否等于今天。这个查询运行了
    9 分钟！这里发生了什么？如果我们查看扩展事件输出，会看到像表 7-3 第一行那样的`629 rows`，以及最后一行包含完整查询的单行。


    **表 7-3** 显示清单 7-7 中查询数据的扩展事件结果


    | duration | cpu time | physical reads | logical reads | writes | row count |
    Statement | NumRows |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 1 | 0 | 0 | 0 | 0 | 1 | `RETURN(@someint + 1)` | 629 |

    | 24790 | 15000 | 0 | 6 | 0 | 691 | `SELECT p.Id, p.Score FROM dbo.Posts p WHERE
    p.Score > 315 AND p.Score < 325 AND dbo.increment(p.Score) = 321` | 1 |


    清单 7-7 中的查询结果集只显示返回了 62 行。为什么函数运行了 629 次？我们在这个查询中要求找出`score`的增量等于我们指定数值的情况。SQL
    Server 要确定`score`的增量是否等于另一个值，唯一的方法是首先计算`Posts`表中每条（是的，每一条）记录的增量。在本例中，我们将值限制为`score`在
    315 到 325 之间的帖子数量，这就是为什么函数只运行了 629 次；只有 629 个帖子的`score`在 315 到 325 之间。我们现在要求服务器做大量的工作。


    在大多数情况下，我们应该对参数使用函数，而不是对表列使用函数。这样，我们可以享受可能复杂的计算设置带来的好处，以便复用，但无需承担针对表中每条记录运行此函数的代价！

