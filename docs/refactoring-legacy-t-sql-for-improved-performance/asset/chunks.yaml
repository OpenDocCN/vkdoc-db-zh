- fmt: '## Summary


    Rules of thumb that will really help when rewriting code are the following:


    1. Document code thoroughly to help target problem areas to rewrite.

    2. Get rid of loops and cursors if possible.

    3. Minimize the number of calls to any table.

    4. Be aware of how your application uses `tempdb` before you add more temporary
    structures.

    5. Try a few ways of rewriting code to see which works best in each situation.


    Good job so far! We’ve made some performance headway on this code. Let’s see what
    other sneaky gremlins are lying in wait for us in this database code.


    # 7. Functions


    Functions can come in a couple of flavors. There are table-valued functions, in
    which you can pass in one or a group of values and get a table of values in return.
    There are also scalar-valued functions, in which you pass in one or a group of
    values and get a single return value.


    Aggregate functions are functions that operate on a group of values to return
    a single value. There are several built-in functions of SQL Server that perform
    aggregation: `COUNT()`, `MIN()`, `MAX()`, `SUM()`, and others. All of these, with
    the exception of `COUNT()`, ignore `NULL` values. You may also create your own
    user-defined aggregate function, but you need to use `CLR` assemblies, and that
    is beyond the scope of this book.


    Depending on where functions are used in your code, they can be a large source
    of performance problems. Almost all performance problems will come from scalar-valued
    functions; table-valued functions work on a set by definition and are usually
    used in a more benign way than scalar-valued functions.


    ## Scalar Functions


    Let’s look at a simple example. Say we have a function to increment a number by
    one. (Don’t laugh – I have seen this in the wild. Yes, really.) The function’s
    `ALTER` statement is shown in Listing 7-1.


    ```sql

    ALTER FUNCTION dbo.increment (@someint int)

    RETURNS int

    AS

    BEGIN

    RETURN(@someint + 1);

    END;

    GO

    ```

    Listing 7-1: Alter statement for the scalar-valued function `dbo.increment`


    We’re going to run a query to demonstrate using the function. The first query
    we’ll run is shown in Listing 7-2. For now, we’re going to leave the function
    call commented out in this query to get baseline data without the use of the function.
    Also, please turn `STATISTICS IO` and `TIME` on before running the query.


    ```sql

    SELECT p.Id

    , p.Score

    --    , dbo.increment(p.Score) AS oneAdded

    FROM dbo.Posts p

    WHERE p.Score = 320;

    ```

    Listing 7-2: Simple query to list posts with a score of 320


    Our `STATISTICS IO`/`TIME` output from the query in Listing 7-2 is as follows:


    ```

    (62 rows affected)

    Table ''Posts''. Scan count 1, logical reads 3, physical reads 0, read-ahead reads
    0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    ```


    Not a whole lot is going on in this query, which is to be expected. It’s a very
    simple query, and the `WHERE` clause is based on a column that is indexed. When
    we add the function line in by uncommenting it, our `STATISTICS IO`/`TIME` output
    doesn’t change at all:


    ```

    (62 rows affected)

    Table ''Posts''. Scan count 1, logical reads 3, physical reads 0, read-ahead reads
    0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    ```


    ## Viewing `STATISTICS IO` Caused by Functions


    That doesn’t make any sense! Now, one thing I want to caution you here on: `STATISTICS
    IO` does NOT show the I/O of functions. We briefly mentioned that earlier in the
    book, but it’s worth restating. For that, we’d need to use an `Extended Event`.
    We could use a `Profiler` trace, but that is pretty outdated. Also note please
    that `Extended Event` duration time is natively measured in microseconds, not
    milliseconds.


    If you have run the database setup script for this book, the `Event Session` should
    already exist in your database. If not, Listing 7-3 shows how to create the session
    we’re going to use.


    ```sql

    CREATE EVENT SESSION [IO Patterns] ON SERVER

    ADD EVENT sqlserver.sp_statement_completed(

    ACTION(sqlserver.sql_text,sqlserver.tsql_stack)),

    ADD EVENT sqlserver.sql_statement_completed(

    ACTION(sqlserver.sql_text,sqlserver.tsql_stack))

    ADD TARGET package0.event_file(SET filename=N''C:\SSdata\IOPatterns.xel'');

    ```

    Listing 7-3: Create script for an `Event Session` `IO Patterns`


    You’ll need to change the file target to a directory that exists on your server
    or computer, wherever you’re running SQL Server. To start the session, use the
    code in Listing 7-4. Go ahead and start the session now.


    ```sql

    ALTER EVENT SESSION [IO Patterns] ON SERVER

    STATE = START;

    GO

    ```

    Listing 7-4: Start the `Event Session`


    Let’s go back and rerun both the query in Listing 7-2 with the function line commented
    out and the same query with the function line not commented out. First, we’ll
    run the query with the function commented out. So start the session, run the query,
    and then stop the session using the code in Listing 7-5.


    ```sql

    ALTER EVENT SESSION [IO Patterns] ON SERVER

    STATE = STOP;

    GO

    ```

    Listing 7-5: Stop the `Event Session`


    `Extended Event` data is saved as XML. In order to view it, we can use SQL Server’s
    XML parsing ability along with an internal function which will allow us to read
    the `Extended Event` file. We can use the code in Listing 7-6 to look at the results
    of the session we started with Listing 7-4. Please be sure to change the file
    path to match the correct file path in your environment.


    ```sql

    SELECT

    event_data_XML.value (''(/event/data  [@name="duration"      ]/value)[1]'', ''BIGINT''        )
    AS duration,

    event_data_XML.value (''(/event/data  [@name="cpu time"      ]/value)[1]'', ''BIGINT''        )
    AS cpu time,

    event_data_XML.value (''(/event/data  [@name="physical reads"]/value)[1]'', ''BIGINT''        )
    AS physical reads,

    event_data_XML.value (''(/event/data  [@name="logical reads" ]/value)[1]'', ''BIGINT''        )
    AS logical reads,

    event_data_XML.value (''(/event/data  [@name="writes"        ]/value)[1]'', ''BIGINT''        )
    AS writes,

    event_data_XML.value (''(/event/data  [@name="row count"     ]/value)[1]'', ''BIGINT''        )
    AS row count,

    event_data_XML.value (''(/event/data  [@name="statement"     ]/value)[1]'', ''NVARCHAR(4000)'')
    AS [statement]

    FROM (SELECT CAST(event_data AS XML) AS event_data_XML

    FROM sys.fn_xe_file_target_read_file(''c:\SSdata\IOPatterns*.xel'', null, null,
    null) AS F

    ) AS E;

    ```

    Listing 7-6: Code to review the `Extended Event` session data


    When we look at the `Event Session` file that was generated when we ran the query
    in Listing 7-2 with the function commented out, we get the result set shown in
    Table 7-1.


    Table 7-1: Results from `Extended Event` after running query in Listing 7-2 without
    function


    | duration | cpu time | physical reads | logical reads | writes | row count |
    statement |

    | --- | --- | --- | --- | --- | --- | --- |

    | 190 | 0 | 0 | 3 | 0 | 62 | SELECT p.Id, p.Score --, dbo.increment(p.Score) AS
    oneAdded FROM dbo.Posts p WHERE p.Score = 320 |'
