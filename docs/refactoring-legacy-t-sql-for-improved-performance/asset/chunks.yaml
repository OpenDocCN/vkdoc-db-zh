  trans: '### 文档编制的附加要点


    对于这些视图中的每一个连接，连接两侧的数据类型是否匹配？这里的答案是肯定的，因此我们将避免隐式转换问题。除了 `unpivot` 内部连接子查询外，这些定义中没有任何子查询。不过，这里确实存在一些聚合，但除此之外，没有任何其他可以勉强归类为计算的东西。由于它是一个视图，因此我们知道其中没有临时表或表变量。同样，也没有循环或游标。但请注意，视图调用的函数可以包含临时表、表变量、循环和/或游标！视图确实允许使用
    CTE，但这里一个也没有。


    我们在这些视图中看到的所有连接类型都相当标准，因此不足为奇。事实上，我们发现的唯一另一个需要注意的项目是函数的调用。


    ### 了解你的数据


    让我们看看这些视图“中”有多少数据——或者，更准确地说，是被这些视图调用了多少数据。让我们使用清单 4-5 中的查询，简单地统计每个视图的记录数。我们还可以看看这些简单调用运行需要多长时间。


    ```sql

    SELECT COUNT(1) FROM WidePostsCh4

    WHERE postID < 1000000;

    SELECT COUNT(1) FROM WidePostsPlusOne

    WHERE postID < 1000000;

    SELECT COUNT(1) FROM WidePostsPlusTwo

    WHERE postID < 1000000;

    SELECT COUNT(1) FROM WidePostsPlusThree

    WHERE postID < 1000000;

    SELECT COUNT(1) FROM WidePostsPlusFour

    WHERE postID < 1000000;

    ```

    **清单 4-5 用于查找嵌套视图所调用行数的查询**


    这些查询的结果如表 4-3 所示。观察记录数如何变化很有趣。当存在 `GROUP BY` 子句时，记录数会减少；而当额外的、可能导致记录重复的信息被连接到数据集时，记录数会增加。


    **表 4-3 由清单 4-5 中的代码确定的每个视图调用的记录数**


    | 视图 | 记录数 |

    | --- | --- |

    | WidePosts | 704,857 |

    | WidePostsPlusOne | 5,677,176 |

    | WidePostsPlusTwo | 85,922 |

    | WidePostsPlusThree | 443,670 |

    | WidePostsPlusFour | 70,635 |


    当我们通过 Statistics Parser 网站处理 `STATISTICS IO` 和 `TIME` 的输出时，我们得到的数据如表 4-4 所示。我们看到这些查询运行花了……七个半小时？天哪！我们还看到了大量的预读读取。预读读取到底是什么？


    **表 4-4 来自清单 4-5 中代码的 `STATISTICS IO` 和 `TIME` 输出中的读取数据**


    | 总计 | 扫描计数 | 逻辑读取 | 物理读取 | 预读读取 |

    | --- | --- | --- | --- | --- |

    | Comments | 16,302,351 | 154,066,055 | 16,455,998 | 0 |

    | Posts | 1 | 357,188,473 | 229,179 | 288,642,683 |

    | PostTypes | 14 | 28 | 2 | 0 |

    | Users | 2 | 137,315,320 | 345,900 | 6,661,228 |

    | Votes | 27 | 6,579,846 | 262,615 | 6,516,446 |

    | VoteTypes | 13 | 26 | 13 | 0 |

    | Workfile | 1,134 | 2,640,232 | 313,074 | 2,347,454 |

    | Worktable | 80,694,535 | 357,874,423 | 3,206,059 | 9,079,996 |

    |   |   | **CPU** | **已用时间** |   |

    | SQL Server 解析和编译时间： | 0:00:10 | 0:00:13 |   |

    | SQL Server 执行时间： | 2:33:26 | 7:28:15 |   |


    当你要求 SQL Server 返回数据时，它会首先查看缓冲区缓存，看看你需要的数据是否在那里。如果不在，SQL Server 就会从磁盘获取。根据联机丛书（微软的在线文档），预读读取表示为查询放入缓存的页数。有大量数据正从磁盘移入内存！由函数引起的
    IO 不会包含在 `STATISTICS IO` 输出中，因此运行此代码时，可能还有更多的读取发生，这些读取归因于该函数。


    ### 功能性检查


    让我们回过头来，再次看一下原始查询，它再次显示在清单 4-6 中。我们想退一步，尝试确定该查询到底试图完成什么。


    ```sql

    SELECT wp4.postID

    , wp4.creationDate

    , wp4.numLinkedPosts

    FROM WidePostsPlusFour wp4

    WHERE wp4.creationDate >=''20120801''

    AND wp4.creationDate < ''20120901'';

    ```

    **清单 4-6 我们正在检查的原始查询**


    如果我们对创建日期使用不同的时间范围运行清单 4-6 中的代码——比如从 20120801 到 20120802——它会在合理的时间内完成吗？如果我们只运行一小时内的帖子数据呢？可能不会——至少，在我的系统上，它无法在合理的时间内运行。如果你有出色的硬件可以让它运行得更快，那真得恭喜你！（我可能会有点羡慕。）


    我们只要求三列数据，但通过所有这些视图，我们实际上拉取了多少数据？对于这样的查询，我们应该期待什么？让我们直接从 `Posts` 表中提取数据，除了链接帖子数量的数据。我们将使用清单
    4-7 中的代码来完成此操作。


    ```sql

    SELECT p.Id

    , p.CreationDate

    FROM dbo.Posts p

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120901'';

    ```

    **清单 4-7 直接从 `Posts` 表中提取数据**


    清单 4-4 中的代码返回了 392,564 行，CPU 时间为 16 毫秒，运行时间为 864 毫秒。它扫描 `Posts` 表一次，并有 1074 次逻辑读取。为了满足清单
    4-8 中原始查询的功能，我们真正剩下要做的就是添加链接帖子的数量。我们能轻松做到吗？当然可以——它是一个函数！让我们把它加进去，然后用清单 4-8 中的代码再试一次。


    ```sql

    SELECT p.Id

    , p.CreationDate

    , dbo.getnumLinkedPosts(p.ID) AS numLinkedPosts

    FROM dbo.Posts p

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120901'';

    ```

    **清单 4-8 向从 `Posts` 表提取的数据添加一个函数**


    等等！（然后等啊，等啊，等啊……）是的，清单 4-8 中的代码运行了一段时间。事实上，我在 15 分钟后停止了它。为什么它运行了这么长时间？嗯，针对表字段的函数需要在每一行上执行一次。在这个返回集中，我们返回了
    392,000 条记录。这对我来说听起来工作量巨大！有两种方法可以解决这个问题。我们可以将函数从标量函数改为表值函数，将帖子 `ID` 集合作为表值参数传入，并在一个集合中获取所有链接帖子数据；或者将函数的功能重写为查询的一部分。通常，如果函数可以合理地重写，我会始终选择第二种方案。例如，如果它有
    6000 行或更多，我可能会重新考虑这个选择。`getNumLinkedPosts` 的函数定义如清单 4-9 所示。


    ```sql

    ALTER FUNCTION dbo.getNumLinkedPosts (@postID int)

    RETURNS int

    AS

    BEGIN

    DECLARE @numPosts int;

    SET @numPosts = COALESCE((SELECT COUNT(1)

    FROM dbo.PostLinks

    WHERE PostId = @postID),0);

    RETURN @numPosts;

    END;

    GO

    ```

    **清单 4-9 `getNumLinkedPosts` 函数的定义**


    在清单 4-9 的定义中，我们正在获取每个帖子的数据聚合。我们如何将其作为更大型查询的一部分来完成呢？嗯，我们可以使用 `OUTER APPLY` 来连接到主查询。它具有子查询的所有过滤优势（它只调用所需的数据），但不会逐行运行。我们在清单
    4-10 中看到了 `OUTER APPLY` 的样子。'
- fmt: '# Listing 4-10

    Replacing the getNumLinkedPosts function with an OUTER APPLY


    ```sql

    SELECT p.Id

    , p.CreationDate

    , nlp.numLinkedPosts

    FROM dbo.Posts p

    OUTER APPLY (SELECT COUNT(1) AS numLinkedPosts

    FROM dbo.PostLinks pl

    WHERE pl.PostId = p.Id) nlp

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120901'';

    ```


    The code in Listing [4-10](#483961_1_En_4_Chapter.xhtml#PC10) returns 392,564
    rows and has 8094 ms of CPU time and 8514 ms elapsed time. It scans the `Posts`
    table once and has 1074 logical reads and scans the `PostLinks` table once with
    5824 reads. Additionally, we see a Worktable, which has one scan for each row
    and 5.3 million logical reads. What is that? Let’s take a look at the execution
    plan, now that we actually have this code running fast enough to obtain one! The
    plan is shown in Figure [4-1](#483961_1_En_4_Chapter.xhtml#Fig1).


    ![../images/483961_1_En_4_Chapter/483961_1_En_4_Fig1_HTML.jpg](images/483961_1_En_4_Chapter/483961_1_En_4_Fig1_HTML.jpg)


    ## Figure 4-1

    Execution plan for the number of linked posts query


    As we look at the plan shown in Figure [4-1](#483961_1_En_4_Chapter.xhtml#Fig1),
    we can see a clustered index scan on the `PostLinks` table and then an index spool
    which is where the vast majority of the work is happening. The index spool creates
    a temporary index on the predicates to join the data more efficiently. That’s
    what an index spool is supposed to be doing, anyway. Here it appears to be a bit
    of a mess in terms of performance. Hmm, we are doing a count based on a `PostId`.
    If we added a nonclustered index on `PostId`, would that help? Let’s try, using
    the code in Listing [4-11](#483961_1_En_4_Chapter.xhtml#PC11).


    # Listing 4-11

    Creating an index on the PostID column in the PostLinks table


    ```sql

    CREATE NONCLUSTERED INDEX ix_PostLinks_PostID ON dbo.PostLinks (PostId);

    ```


    Once we create the index in Listing [4-11](#483961_1_En_4_Chapter.xhtml#PC11),
    we can run the query in Listing [4-10](#483961_1_En_4_Chapter.xhtml#PC10) again
    and grab the plan again as well. And, bingo! Even grabbing the plan, the query
    in Listing [4-10](#483961_1_En_4_Chapter.xhtml#PC10) took 3 seconds. To be precise,
    the execution showed an elapsed time of 3315 ms and only used 2765 ms of CPU time.
    The number of scans from the Worktable actually transfers to the `PostLinks` table,
    but in the `STATISTICS IO` output the term “scan” can actually refer to either
    a seek or a scan. The execution plan for the query in Listing [4-10](#483961_1_En_4_Chapter.xhtml#PC10)
    after adding the index in Listing [4-11](#483961_1_En_4_Chapter.xhtml#PC11) is
    shown in Figure [4-2](#483961_1_En_4_Chapter.xhtml#Fig2).


    ![../images/483961_1_En_4_Chapter/483961_1_En_4_Fig2_HTML.jpg](images/483961_1_En_4_Chapter/483961_1_En_4_Fig2_HTML.jpg)


    ## Figure 4-2

    Execution plan after index add


    As we look at Figure [4-2](#483961_1_En_4_Chapter.xhtml#Fig2), we see exactly
    what we expect: the index seek is doing the bulk of the work. We have done well!
    We just took code that ran for hours on end, and now it runs in… 3 seconds. And
    to be honest, we didn’t do that much work. In fact, we did a whole lot less work
    than what the call to the views did!


    ## What Problems Did We Fix?


    Why did this run so much faster than the original call to the view? Well, we showed
    how much code was really running in the background. It’s easy to call a view,
    realize it has most of the fields that you need, and create a second view adding
    the one or two extra fields needed. The problem is that people keep doing that,
    adding more views on top of views, so the tables really are being called multiple
    times throughout the actual code being run. Since the view definitions can look
    deceptively simple, it’s not obvious to the casual observer that all of the work
    underneath the view call is what is really happening.


    Pivoting and unpivoting involve aggregates of some sort for each operation. The
    way I coded these views was (as of SQL Server 2014 at least) the same way the
    SQL Server engine handles them under the hood, even if you use the “official”
    pivot or unpivot syntax. Large `GROUP BY`s make SQL Server have to do the grouping
    specified, which almost always means a worktable. Then, it has to sort the data
    (there’s no way to group data unless it’s sorted to allow us to group, after all).
    Sorting is a fairly expensive operation in SQL Server. If there is already an
    index sorted in the desired order, it is possible to avoid a sorting operation,
    but if you create indexes to support any sort order on any column, then you run
    into the possible problem of having too many indexes which results in write times
    taking forever.


    Additionally, somewhere along the line, we changed the amount of records we were
    getting by a fair margin, as shown in Table [4-3](#483961_1_En_4_Chapter.xhtml#Tab3).
    In `WidePostsPlusOne`, we join to the `Votes` table on the `PostID`. There must
    be more than one vote per post in a lot of cases, because we see the amount of
    records almost triple from the count of the `WidePostsCh4` records. Then, in `WidePostsPlusTwo`,
    we lose a massive amount of rows. I’d guess this is due to one of the inner joins
    filtering out records. The biggest explosion of data is going to come from the
    unpivot, though. When we performed the pivot in `WidePostsCh4`, we filled in up
    to five comments per post. Then, when we did the unpivot, we “assumed” five comments
    per post, even though there might not have been a full five comments per post.
    We still ended up creating five records per post. We then filter out all these
    extra rows in `WidePostsPlusFour`, but we still do the work to create them. So
    not only is our rewrite a whole lot faster but the data in it is potentially more
    accurate as well!


    ## Filtering


    Filtering can be a challenge without reducing the usefulness of the view. You
    cannot pass parameters into a view. Your options then become hard-coding filters
    into the view if you want to limit the result set, or making sure every calling
    object contains a good `WHERE` clause. `CTE`s can be used in a view definition,
    which can be useful for filtering in certain situations.


    ## Updating Data Through a View


    This is easy in a single-table view. This is not easy (or, in most cases, not
    possible) in a multi-table view. Inserts and deletes will only work against a
    view containing fields from a single table. Updates can run against a view containing
    more than one table, but the updates must be against columns in a single table.
    These limitations exist because SQL Server’s query engine can’t always definitively
    trace a piece of data in a view back to the original table (can you imagine trying
    to run an update against `WidePostsPlusFour`?). If SQL Server can’t trace the
    data back, it can’t update data through the view.


    ## Additional Limitations


    You cannot create a view against a temporary table or a table variable. This makes
    sense if you think about it – the view definition is a permanent object in a database,
    whereas a temporary table, even a global one, is not, by definition: it’s… well,
    temporary.


    You cannot specify default values for columns, or constraints. You could use `COALESCE`,
    which would solve the default value issue (sort of), but there’s no work-around
    for the constraints.'
