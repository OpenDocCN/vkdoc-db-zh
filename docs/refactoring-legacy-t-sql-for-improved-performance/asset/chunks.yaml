- fmt: '# Avoiding Row or Data Duplicates


    Of course, we’re getting potentially multiple records per post `ID` since we joined
    to the post responses, and there can be more than one response per post. We use
    `ROW_NUMBER()` in the query in Listing [6-5](#483961_1_En_6_Chapter.xhtml#PC6)
    to help deal with this issue. The `ROW_NUMBER()` allows you to assign a unique
    incrementing integer to a row based on the partitioning of your choice and also
    ordered by the values of your choice. This `ROW_NUMBER()` will help us filter
    out the “extra” rows (those rows which can lead to multiplying data and incorrect
    results).


    We need the number of distinct users, so we can give those distinct users a row
    number as we did in Listing [6-5](#483961_1_En_6_Chapter.xhtml#PC6), and then
    just count the number of records where the `ROW_NUMBER()` equals 1. Wait, what?
    If we set up a `ROW_NUMBER`, partition by `OwnerUserId`, and order by just about
    anything, each new user will have one row (and only one row) with a `ROW_NUMBER()`
    equal to 1. So if we use a `CASE` statement and give each row that has `theUserRowNum`
    equal to 1 a value of “1” and all other rows a value of “0” and sum those values,
    we’ll get a distinct count of users. Pretty cool, eh? This is also demonstrated
    in Listing [6-6](#483961_1_En_6_Chapter.xhtml#PC8).


    ```sql

    SELECT theInfo.Id -- level two

    , theInfo.createDate

    , theInfo.AnswerCount

    , MAX(theInfo.Score) OVER () AS maxUpvotes

    , MAX(theInfo.numPostsUser) OVER () AS maxPostsUser

    , theInfo.numPostsUser

    , theInfo.DisplayName

    , MAX(theInfo.numUsersPost) OVER () AS maxNumUsersPost

    , theInfo.numAccepted

    , SUM(CASE WHEN theInfo.theUserRowNum = 1 THEN 1 ELSE 0 END) OVER () AS numDistinctUsers

    , ROW_NUMBER() OVER (PARTITION BY ID ORDER BY numPostsUser DESC) AS theIDRow

    FROM (SELECT p.Id -- level one - innermost

    , CAST(p.CreationDate AS DATE) AS createDate

    , p.AnswerCount

    , pUser.Score

    , COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS numPostsUser

    , COUNT(pUser.OwnerUserId) OVER (PARTITION BY pUser.ParentId) AS numUsersPost

    , pUser.ParentId

    , pUser.OwnerUserId

    , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION
    BY pUser.OwnerUserId) AS numAccepted

    , u.DisplayName

    , ROW_NUMBER() OVER (PARTITION BY pUser.OwnerUserId ORDER BY pUser.ParentId DESC)
    AS theUserRowNum

    FROM dbo.Posts p

    LEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId

    AND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))

    AND pUser.PostTypeId = 2

    LEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId = u.Id

    WHERE p.CreationDate >= ''20120801''

    AND p.CreationDate < ''20120802''

    AND p.PostTypeId = 1) theInfo;

    ```


    ### Listing 6-6

    Adding an outer query with some additional `ROW_NUMBER`s


    The code in Listing [6-6](#483961_1_En_6_Chapter.xhtml#PC8) added a second level
    to the query. This outer wrapper is where we can perform additional aggregates,
    such as the `CASE` statement referring to the `theUserRowNum` which gives us the
    count of distinct users from our inner query. We also added a `ROW_NUMBER` in
    the outer query, but we’ll talk a little bit more about why we did so a little
    later.


    What exactly does this `OVER()` clause mean? It’s a way to do the aggregate over
    a set. If there is no `PARTITION` specified, the data is aggregated over the entire
    query result set. This can be accomplished instead by using a `GROUP BY` clause,
    but we also need to see some detail rows; we’re going to have to pull the correct
    user `DisplayName` for the user that had the most responses to each post so we
    can determine who had the most for any post during the day. If we use a `GROUP
    BY` clause, we’ll lose the level of detail that corresponds with pulling all of
    these display names, as well as the number of posts per user. With windowing functions,
    we can get our overall aggregates without losing that detail. We’re going to rely
    on the `MAX()` values whenever we can, because extra or duplicated rows won’t
    affect those aggregates (extra rows will affect counts and sums but not `MAX()`
    and `MIN()` values). We can see some results for the query in Listing [6-6](#483961_1_En_6_Chapter.xhtml#PC8)
    in Table [6-4](#483961_1_En_6_Chapter.xhtml#Tab4).


    ### Table 6-4

    Subset of results from the code in Listing [6-6](#483961_1_En_6_Chapter.xhtml#PC8)


    | Id | Max Upvotes | Max Posts User | Display Name | Num Posts User | Num Accepted
    | Num Distinct Users | The ID Row |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 11750763 | 1,179 | 25 | waldyr.ar | 2 | 0 | 5506 | 1 |

    | 11750765 | 1,179 | 25 | Steve Koch | 1 | 1 | 5506 | 1 |

    | 11750767 | 1179 | 25 | mwengler | 2 | 2 | 5506 | 1 |

    | 11750768 | 1,179 | 25 | Annjawn | 5 | 1 | 5506 | 1 |

    | 11750768 | 1,179 | 25 | Tom | 2 | 1 | 5506 | 2 |

    | 11750768 | 1179 | 25 | DCookie | 1 | 0 | 5506 | 3 |

    | 11750770 | 1,179 | 25 | nickb | 11 | 8 | 5506 | 1 |

    | 11750770 | 1,179 | 25 | Miro Hudak | 6 | 2 | 5506 | 2 |

    | 11750770 | 1179 | 25 | sriansri | 1 | 0 | 5506 | 3 |

    | 11750780 | 1179 | 25 | Dustin | 8 | 2 | 5506 | 1 |


    The overall aggregates are going to show the same value in each row, as we see
    in the `NumDistinctUsers`, `MaxPostsUser`, and `MaxUpvotes` columns in Table [6-4](#483961_1_En_6_Chapter.xhtml#Tab4).
    These columns are the building blocks to find the user whose number of responses
    is equivalent to the most responses. We can use that as a filter in… you guessed
    it, the next level (or level 3, which we will add). And we assigned a `ROW_NUMBER()`
    partitioned by post ID in level 2, so we can easily grab only a single row for
    each original post (this will make our `COUNT()` and `SUM()` data correct by excluding
    “extra” or multiplied rows due to joins). We can see that `ROW_NUMBER()` in level
    2 in the code in Listing [6-6](#483961_1_En_6_Chapter.xhtml#PC8).


    Listing [6-7](#483961_1_En_6_Chapter.xhtml#PC9) introduces us to the addition
    of a third level to the query. In this level, we will use the filter of `theIDRow`
    equaling 1. If you look at the code in Listing [6-6](#483961_1_En_6_Chapter.xhtml#PC8),
    you’ll notice that we ordered `theIDRow` by `numPostsUser` `DESC`. Why did we
    choose that `ORDER BY` clause? Well, we also need to know the highest number of
    posts answered by a user, and this will give us this information. The `ORDER BY`
    using the by `numPostsUser` `DESC` means that the row with the highest value in
    the `numPostsUser` column will be given a `ROW_NUMBER()` equal to 1, which will
    give us the desired value for that field (`numPostsUser`) when we choose `theIDRow`
    equal to 1. And, if we group this by the creation date, we can then add more days
    and hopefully get the results we want! We’ll try this a little later.'
