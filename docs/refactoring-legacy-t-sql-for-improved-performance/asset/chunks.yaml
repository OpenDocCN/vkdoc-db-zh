    WHERE p.ParentId = @postID

    AND p.PostTypeId = 2;

    INSERT INTO @userInfo (DisplayName, Reputation, WebsiteURL)

    SELECT u.DisplayName

    , u.Reputation

    , u.WebsiteUrl

    FROM dbo.Users u

    INNER JOIN @userlist ul ON ul.OwnerUserId = u.Id;

    RETURN

    END;

    GO

    Listing 7-18

    Alter statement from responderInfoMultiValue

    ```


    Let’s go back and reset our Extended Event session. Then, we can run the code
    in Listing [7-19](#483961_1_En_7_Chapter.xhtml#PC21) to look at some metrics around
    running code calling the multi-statement TVF in Listing [7-18](#483961_1_En_7_Chapter.xhtml#PC20).


    ```

    SELECT DisplayName

    , Reputation

    FROM dbo.responderInfoMultiValue(649789); --the number is a post ID

    Listing 7-19

    Query calling the responderInfoMultiValue function

    ```


    When we run the code in Listing [7-19](#483961_1_En_7_Chapter.xhtml#PC21), our
    query returns 31 records. If we take a look at our Extended Event session data
    using the code in Listing [7-6](#483961_1_En_7_Chapter.xhtml#PC8), we get the
    results shown in Table [7-14](#483961_1_En_7_Chapter.xhtml#Tab14).


    Table 7-14


    Extended Event session output from running the query in Listing [7-19](#483961_1_En_7_Chapter.xhtml#PC21)


    | duration | cpu time | physical reads | logical reads | writes | row count |
    statement |

    | --- | --- | --- | --- | --- | --- | --- |

    | 522 | 0 | 0 | 164 | 0 | 32 | INSERT INTO @userList (OwnerUserId) SELECT p.OwnerUserId
    FROM dbo.Posts p WHERE p.ParentId = @postID AND p.PostTypeId = 2 |

    | 712 | 0 | 0 | 131 | 0 | 31 | INSERT INTO @userInfo (DisplayName, Reputation,
    WebsiteURL) SELECT u.DisplayName, u.Reputation, u.WebsiteUrl FROM dbo.Users u
    INNER JOIN @userlist ul ON ul.OwnerUserId = u.Id |

    | 1796 | 0 | 0 | 310 | 0 | 94 | SELECT DisplayName, Reputation FROM dbo.responderInfoMultiValue(649789)
    |


    Alternatively, the code can be written as an in-line TVF. The syntax is a little
    different, as shown by the statement `RETURNS TABLE` instead of defining the entire
    table structure to be returned. Additionally, note that there is only a single
    SELECT statement in the code in Listing [7-20](#483961_1_En_7_Chapter.xhtml#PC22).


    ```

    ALTER FUNCTION dbo.responderInfoInline (@postID int)

    RETURNS TABLE

    AS

    RETURN SELECT u.DisplayName

    , u.Reputation

    , u.WebsiteUrl

    FROM dbo.Users u

    WHERE EXISTS (SELECT 1

    FROM dbo.Posts p

    WHERE p.ParentId = @postID

    AND u.Id = p.OwnerUserId

    AND p.PostTypeId = 2);

    GO

    Listing 7-20

    Alter statement for the responderInfoInline function

    ```


    If we run the code in Listing [7-19](#483961_1_En_7_Chapter.xhtml#PC21) but call
    the in-line version of the function instead, and using the same post ID we did
    before, we get the same 31 rows, but our Extended Event output looks a bit different,
    as shown in Table [7-15](#483961_1_En_7_Chapter.xhtml#Tab15).


    Table 7-15


    Extended Event session output from running the query in Listing [7-19](#483961_1_En_7_Chapter.xhtml#PC21),
    but against the in-line function


    | duration | cpu time | physical reads | logical reads | writes | row count |
    statement |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1621 | 0 | 0 | 227 | 0 | 31 | SELECT DisplayName, Reputation FROM dbo.responderInfoInline(649789)
    |


    That’s it – just that one line, with no other work. SQL Server actually in-lines
    (or translates the function into part of the original query) the code in the function.
    We see a shorter time and less physical reads using the in-line version of the
    function over using the multi-statement TVF.


    If you’re going to do the work anyway to take a multi-statement TVF to an in-line
    TVF, there’s most likely no reason you can’t just in-line the code in the stored
    procedure (or whatever object you’re looking at) and remove the function altogether.'
