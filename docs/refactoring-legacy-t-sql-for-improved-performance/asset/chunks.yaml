    Even though this query isn’t particularly painful when returning one record, it
    could become very painful if used to return a larger set. Besides, why make SQL
    Server do more work than it needs to? Use those powers for good, not evil! Let’s
    look at rewriting the `andTheKitchenSink` function to minimize the work we’re
    doing, and only perform the work we need to do to find the value we want. How
    do we do this? One way is to only run the code to find the value if the corresponding
    `@value` tag is passed in. We can do this by setting the `@returnValue` using
    a CASE statement and basing the query run to get the `@returnValue` on the value
    of the `@value` tag. We’ve done this in the code in Listing [7-14](#483961_1_En_7_Chapter.xhtml#PC16).


    ```

    ALTER FUNCTION dbo.andTheKitchenSink (@postID int, @value varchar(8))

    RETURNS varchar(30)

    AS

    BEGIN

    DECLARE @returnValue varchar(30);

    SET @returnValue = CASE @value

    WHEN ''COMMENT'' THEN COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.Comments

    WHERE PostId = @postID),''0'')

    WHEN ''RESPDR'' THEN COALESCE((SELECT CAST(COUNT(DISTINCT OwnerUserID) AS varchar(30))

    FROM dbo.Posts

    WHERE ParentId = @postID

    AND PostTypeId = 2),''0'')

    WHEN ''LINK'' THEN COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.PostLinks

    WHERE PostId = @postID),''0'')

    WHEN ''VOTE'' THEN COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.Votes

    WHERE PostId = @postID),''0'')

    ELSE COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.Posts

    WHERE ParentId = @postID

    AND PostTypeId = 2),''0'')

    END;

    RETURN(@returnValue);

    END;

    GO

