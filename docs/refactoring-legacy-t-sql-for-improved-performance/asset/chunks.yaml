- fmt: '## The Dreaded “Massive Business Logic” Function


    We have looked at a very simple function and a native SQL Server function. I want
    to point you toward a couple of other things to be aware of. First of all, there’s
    the “massive business logic” function – a several-thousand-line function that
    does a whole bunch of things. When you come across these, break them up and try
    to use them in-line in stored procedures when you can. The `sp_codeCalledCascade`
    can help here so you can at least identify any SQL objects calling these behemoths.


    One flavor of these are the “kitchen sink” functions. I’m going to pass in an
    ID-type value (post ID perhaps) and what I want to get back (a tag of some sort),
    and the function will then return that value. Let’s look at the example function
    in Listing 7-11.


    ```sql

    ALTER FUNCTION dbo.andTheKitchenSink (@postID int, @value varchar(8))

    RETURNS varchar(30)

    AS

    BEGIN

    DECLARE @returnValue varchar(30)

    , @numComments varchar(30)

    , @numResponses varchar(30)

    , @numResponders varchar(30)

    , @numLinks varchar(30)

    , @numVotes varchar(30)

    ;

    SET @numComments = COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.Comments

    WHERE PostId = @postID),''0'');

    SET @numResponses = COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.Posts

    WHERE ParentId = @postID

    AND PostTypeId = 2),''0'');

    SET @numResponders = COALESCE((SELECT CAST(COUNT(DISTINCT OwnerUserID) AS varchar(30))

    FROM dbo.Posts

    WHERE ParentId = @postID

    AND PostTypeId = 2),''0'');

    SET @numLinks = COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.PostLinks

    WHERE PostId = @postID),''0'');

    SET @numVotes = COALESCE((SELECT CAST(COUNT(1) AS varchar(30))

    FROM dbo.Votes

    WHERE PostId = @postID),''0'');

    SET @returnValue = CASE @value

    WHEN ''COMMENT'' THEN @numComments

    WHEN ''RESPDR'' THEN @numResponders

    WHEN ''LINK'' THEN @numLinks

    WHEN ''VOTE'' THEN @numVotes

    ELSE @numResponses

    END;

    RETURN(@returnValue);

    END;

    GO

    ```

    Listing 7-11: Alter statement for the `andTheKitchenSink` function


    What’s the first concerning thing you notice about this? Oh – you, there in the
    back – you have your hand raised. That’s right! Even though we’re only returning
    a single value, we’re actually doing the work to get all of the values every time
    this is called! No one would really do that, right? Wrong. I have actually come
    across this type of function (but worse, with about 30 values) more than once
    in the wild. These can be called several times in a single `SELECT` statement.
    It will go out, hit the tables called, and get every value in the function every
    time it shows up in the `SELECT` statement, for every row. That is really frightening,
    and downright damaging to the SQL Server’s performance. It is not noticeable when
    there’s only a little data in the database, but it sure becomes obvious as data
    grows over time. Let’s reset our Extended Event session and run the code in Listing
    7-12.


    ```sql

    SELECT p.id AS postID

    , p.Score

    , dbo.andTheKitchenSink(649789,''COMMENT'') AS numComments

    , dbo.andTheKitchenSink(649789,''RESPONS'') AS numResponses

    , dbo.andTheKitchenSink(649789,''RESPDR'') AS numResponders

    , dbo.andTheKitchenSink(649789,''VOTE'') AS numVotes

    , p.ViewCount

    FROM dbo.Posts p

    WHERE p.Id = 649789;

    ```

    Listing 7-12: Sample query using the `andTheKitchenSink` function


    We get a single row returned as the results from the query, which is expected.
    When we look at the Extended Event session output shown in Table 7-7, we get an
    idea of all of the work going on in the background to return that single row.
    I truncated the statement to make the table much more readable.


    **Table 7-7:** Extended Event session output from running the query in Listing
    7-12, with the statement truncated


    | duration | cpu time | physical reads | logical reads | writes | row count |
    statement |

    | --- | --- | --- | --- | --- | --- | --- |

    | 367 | 0 | 0 | 262 | 0 | 1 | SET `@numResponses` = ... |

    | 99 | 0 | 0 | 6 | 0 | 1 | SET `@numComments` = ... |

    | 1 | 0 | 0 | 0 | 0 | 1 | RETURN(`@returnValue`) |

    | 126 | 0 | 0 | 6 | 0 | 1 | SET `@numVotes` = ... |

    | 2 | 0 | 0 | 0 | 0 | 1 | SET `@returnValue` = ... |

    | 561 | 0 | 0 | 262 | 0 | 1 | SET `@numResponders` = … |

    | 59 | 0 | 0 | 6 | 0 | 1 | SET `@numComments` = ... |

    | 61 | 0 | 0 | 6 | 0 | 1 | SET `@numLinks` = … |

    | 449 | 0 | 0 | 262 | 0 | 1 | SET `@numResponses` = ... |

    | 532 | 0 | 0 | 262 | 0 | 1 | SET `@numResponders` = ... |

    | 1 | 0 | 0 | 0 | 0 | 1 | SET `@returnValue` = ... |

    | 1 | 0 | 0 | 0 | 0 | 1 | RETURN(`@returnValue`) |

    | 130 | 15000 | 0 | 6 | 0 | 1 | SET `@numComments` = ... |

    | 132 | 0 | 0 | 6 | 0 | 1 | SET `@numVotes` = ... |

    | 351 | 0 | 0 | 262 | 0 | 1 | SET `@numResponses` = ... |

    | 88 | 0 | 0 | 6 | 0 | 1 | SET `@numLinks` = ... |

    | 1 | 0 | 0 | 0 | 0 | 1 | SET `@returnValue` = ... |

    | 1 | 0 | 0 | 0 | 0 | 1 | RETURN(`@returnValue`) |

    | 124 | 0 | 0 | 6 | 0 | 1 | SET `@numVotes` = ... |

    | 559 | 0 | 0 | 262 | 0 | 1 | SET `@numResponders` = ... |

    | 57 | 0 | 0 | 6 | 0 | 1 | SET `@numLinks` = ... |

    | 70 | 0 | 0 | 6 | 0 | 1 | SET `@numComments` = ... |

    | 127 | 0 | 0 | 6 | 0 | 1 | SET `@numLinks` = ... |

    | 310 | 0 | 0 | 262 | 0 | 1 | SET `@numResponses` = ... |

    | 415 | 0 | 0 | 262 | 0 | 1 | SET `@numResponders` = ... |

    | 1 | 0 | 0 | 0 | 0 | 1 | RETURN(`@returnValue`) |

    | 165 | 0 | 0 | 6 | 0 | 1 | SET `@numVotes` = ... |

    | 4 | 0 | 0 | 0 | 0 | 1 | SET `@returnValue` = ... |

    | 6211 | 15000 | 0 | 2174 | 0 | 29 | `SELECT p.Id AS postID, p.Score, dbo.andTheKitchenSink(p.id,‘COMMENT’)
    AS numComments, dbo.andTheKitchenSink(p.id,‘RESPONS’) AS numResponses, dbo.andTheKitchenSink(p.id,‘RESPDR’)
    AS numResponders, dbo.andTheKitchenSink(p.id,‘VOTE’) AS numVotes, p.ViewCount
    FROM dbo.Posts p WHERE p.Id = 649789` |


    We can see by the data in Table 7-7 that all of the pieces of data in the `andTheKitchenSink`
    function were found for each of the calls in the query (there were four), and
    this would show for each record in the final output as well if we were returning
    more than one row.


    Imagine trying to wade through this Extended Event output if we were returning
    several rows! If we want to look at some totals metrics instead of each individual
    record, we can use the query shown in Listing 7-13.


    ```sql

    SELECT SUM(duration)/1000 AS totDurationms

    , SUM(cpu time)/1000 AS totCPUms

    , SUM(logical reads) AS totLogReads

    FROM(

    SELECT

    event_data_XML.value (''(/event/data  [@name="duration"      ]/value)[1]'', ''BIGINT''        )
    AS duration,

    event_data_XML.value (''(/event/data  [@name="cpu time"      ]/value)[1]'', ''BIGINT''        )
    AS cpu time,

    event_data_XML.value (''(/event/data  [@name="physical reads"]/value)[1]'', ''BIGINT''        )
    AS physical reads,

    event_data_XML.value (''(/event/data  [@name="logical reads" ]/value)[1]'', ''BIGINT''        )
    AS logical reads,

    event_data_XML.value (''(/event/data  [@name="writes"        ]/value)[1]'', ''BIGINT''        )
    AS writes,

    event_data_XML.value (''(/event/data  [@name="row count"     ]/value)[1]'', ''BIGINT''        )
    AS row count,

    event_data_XML.value (''(/event/data  [@name="statement"     ]/value)[1]'', ''NVARCHAR(4000)'')
    AS [statement]

    FROM (SELECT CAST(event_data AS XML) AS event_data_XML

    FROM sys.fn_xe_file_target_read_file(''c:\SSdata\IOPatterns*.xel'', null, null,
    null) AS F

    ) AS E) q;

    ```

    Listing 7-13: Viewing totals metrics for Extended Event session data


    If we run this query against the file whose results we were looking at in Table
    7-7, we would get a much better idea of the actual work the server is doing, as
    shown in Table 7-8.


    **Table 7-8:** Totals metrics for Extended Event session data in Table 7-7'
