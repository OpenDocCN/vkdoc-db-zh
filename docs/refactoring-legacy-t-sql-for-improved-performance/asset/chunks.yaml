- fmt: '# Part IV: The Bad and the Ugly


    ## Summary


    Functions are really a way to reuse code (like the kitchen sink function). As
    great as code reuse is in front-end programming, it is almost always a bad idea
    in SQL Server. Write your code for the work you need, and just the work you need.
    Also, pull your business logic out of the work SQL Server is doing – but that
    is another discussion for another time, and someone else’s book!


    ## 8. Agent Jobs


    SQL Server Agent allows you to set up a schedule to run code at the times you
    choose. This can be extremely helpful, but can also lead to a very tangled mess.
    How many times have you heard about periodic slowness in the application or database,
    but it’s always gone by the time you get online to look for it? You need to determine
    if there is a real pattern to the slowness, then you can see if there are jobs
    that coincide with the painful times.


    First, let’s look at what the SQL Server Agent should be accomplishing for you.
    This first section is a bit more administrative than development, but it is so
    important that everyone who works with databases should be aware of these needs!
    Then, we can take a look at how these jobs may be sneaking into your performance
    problems… or nightmares!


    ### What Agent Jobs Should Be Doing


    There are some administrative duties that should be set up as Agent jobs and run
    either nightly or weekly. These are important to the maintenance and integrity
    of your database and also to your Disaster Recovery (DR) plan. You DO have one
    of those at your company, don’t you? And you do practice that plan and any associated
    rollovers, right? Sorry, got distracted for a second. Back to `SQL Server Agent`!


    #### Good Job(s)!


    The “good” jobs should run against every database, including your system databases.
    Please note that these recommendations are based on databases in the 0–500 GB
    range. Larger databases may require different strategies.


    1.  Full backups: These should be run, at minimum, once every 24 hours. They may
    need to be run more often, depending on the business and its needs. Larger databases
    may run full backups less often.

    2.  Transaction log backups: These should be run, at minimum, once an hour. Again,
    this depends on the business needs and the loads on the server, but this is a
    good recommendation to start with.

    3.  Differential backups: These can be run if needed, based on the business needs
    and the loads on the servers. I consider these “optional,” but the other two backup
    types mandatory. These may become mandatory if your database is very large and
    nightly full backups aren’t a viable solution.

    4.  Corruption checks (or `DBCC CHECKDB()`): This should be run weekly at minimum,
    but ideally once every 24 hours.

    5.  Index and statistics maintenance: This should be run also weekly at a minimum,
    but again it’s ideal to run once every 24 hours.

    6.  Purge jobs: Trim out excess audit or even operational data if not needed.


    As with anything related to databases, you must know your environment and software
    and the usage patterns. Some of the “good” jobs may not be needed in a specific
    environment, but probably most or all of them should be used. This brings us to
    the next, and probably the most key, point.


    #### When Should I Run Jobs?


    How do you know when backups should be run? How about index maintenance? How about
    that massive daily report that every manager needs or else the world will come
    to an end?


    Also, it would make sense to run certain jobs before other jobs. For example,
    it’s best to run a corruption check and index maintenance before your nightly
    full backup. If you ever need to restore to that backup, you have some confidence
    that it is probably corruption-free and has up-to-date index maintenance, so it
    is ready to go. This could save you valuable time in getting your environment
    back online in case of an emergency. The only way to be 100% sure your backup
    is viable, however, is to test your backups. Ideally, you’re also restoring your
    backups to test them, and this could also be automated with a job.


    ##### Understand Your Environment… on a Regular Basis


    It is necessary to understand some metrics surrounding your environment to best
    schedule the Agent jobs. What times during the day show the least CPU usage? What
    times are the least number of users accessing the system? When is `tempdb` the
    least busy? How about when there are the lowest disk writes? If you have a third-party
    monitoring solution, this information can be simple to find. If not, though, you
    can still find the information by using a home-grown solution to find this data.
    There are plenty of blog posts and presentations out in the wild that discuss
    baselining your servers, whether it’s through `PowerShell`, `Extended Events`,
    some mix of the two, or many other solutions as well.


    Why does the heading mention “on a regular basis,” though? Well, as data grows
    and possible usage patterns change, the baselines and slow times of your servers
    will change as well. Jobs that formerly were benign can suddenly cause serious
    performance problems with a shift of database usage patterns. Additionally, there
    can be jobs that only come into play once in a while. For example, month-end,
    quarterly, and year-end reports are run infrequently enough that a pattern of
    issues may not become evident, but can still plague users.


    ##### Understand Your Jobs and the Needs Behind Them… on a Regular Basis


    When are your jobs scheduled for? How long do they run? How often do they run?
    What business need is the job actually answering? For example, you have a customer
    that needs to have up-to-the-moment summaries of their orders for each day. There
    is a job that calls a stored procedure that can grab and summarize this data,
    and it runs every 2 minutes.


    Part of the problem is that this proc is starting to take longer than 2 minutes
    to run, so essentially it is running all of the time. Also, it’s pulling and aggregating
    data by day since the beginning of time, and to the end of time (at least according
    to database standards). Also, this customer’s business is only open from the hours
    of `9:00 a.m.` until `5:00 p.m.` and is closed Wednesdays and Sundays.


    A few simple changes you can make are to bump the job out to run every 5 minutes,
    limit the runtimes to start at `9:00 a.m.` and end at `5:00 p.m.` daily, and also
    set them not to run on Wednesdays and Sundays.


    Again, as time (and data amounts) changes, the jobs that used to be quick may
    suddenly not run as quickly. For example, your corruption check job may suddenly
    be running for hours. If this occurs, then maybe a different plan may be best:


    1.  Run index maintenance.

    2.  Run your full backup.

    3.  Send the full backup to your test server (or a read-only reporting secondary).

    4.  Restore the database.

    5.  Run your corruption check on your test or secondary environment.


    ### Common Issues with Agent Jobs


    We spoke briefly about a job running longer than the time in between when the
    job gets called, which can lead to the job running almost constantly. What are
    some other issues we see with Agent jobs?'
