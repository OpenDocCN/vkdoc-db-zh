  \ --- | --- | --- |\n| 1 | 0 | 0 | 0 | 0 | 1 | `RETURN(@someint + 1)` | 629 |\n\
  | 24790 | 15000 | 0 | 6 | 0 | 691 | `SELECT p.Id, p.Score FROM dbo.Posts p WHERE\
  \ p.Score > 315 AND p.Score < 325 AND dbo.increment(p.Score) = 321` | 1 |\n\n清单\
  \ 7-7 中的查询结果集只显示返回了 62 行。为什么函数运行了 629 次？我们在这个查询中要求找出`score`的增量等于我们指定数值的情况。SQL Server\
  \ 要确定`score`的增量是否等于另一个值，唯一的方法是首先计算`Posts`表中每条（是的，每一条）记录的增量。在本例中，我们将值限制为`score`在\
  \ 315 到 325 之间的帖子数量，这就是为什么函数只运行了 629 次；只有 629 个帖子的`score`在 315 到 325 之间。我们现在要求服务器做大量的工作。\n\
  \n在大多数情况下，我们应该对参数使用函数，而不是对表列使用函数。这样，我们可以享受可能复杂的计算设置带来的好处，以便复用，但无需承担针对表中每条记录运行此函数的代价！\n\
  \n\n\n### SQL Server 原生函数\n\n在“I want to see what happened yesterday”（我想看看昨天发生了什么）这种情况下，我们应该对参数使用函数，而不是对表列使用函数。我们可以看到，即使是\
  \ SQL Server 原生函数，如`DATEADD()`、`ISNULL()`和`COALESCE()`，也会导致查询必须对表中的每条记录进行计算。让我们使用清单\
  \ 7-8 中的代码来看看这可能带来的差异。\n\n```sql\nDECLARE @date date;\nSET @date='20120801';\nSELECT\
  \ p.Id\n, p.Score\nFROM dbo.Posts p\nWHERE DATEADD(dd,1,CAST(p.CreationDate AS date))\
  \ = @date;\n```\n清单 7-8\n在 WHERE 子句中使用日期函数的示例查询\n\n我们期望从这个查询中得到什么样的数据？例如，在指定日期创建了多少帖子？如果我们考虑的是在去掉时间部分后，给日期加一天，然后这个值等于`2012.08.01`，那么我们谈论的是所有在`2012.07.31`到`2012.08.01`之间创建的帖子。首先，让我们使用清单\
  \ 7-9 中的代码来看看我们期望得到多少帖子。\n\n```sql\nSELECT COUNT(1) AS numPosts\n, CAST(p.CreationDate\
  \ AS date) AS theDay\nFROM dbo.Posts p\nWHERE p.CreationDate > '20120731'\nAND p.CreationDate\
  \ < '20120801'\nGROUP BY CAST(p.CreationDate AS date)\nORDER BY theDay;\n```\n清单\
  \ 7-9\n清单 7-8 查询结果集中预期的帖子数量\n\n清单 7-9 的查询结果如表 7-4 所示。这些结果意味着当我们运行清单 7-8 的查询时，我们预期会输出\
  \ 16,154 行。\n\n表 7-4\n\n运行清单 7-9 查询的结果\n\n| numPosts | theDay |\n| --- | --- |\n\
  | 16154 | 2012-07-31 |\n\n如果我们启动事件会话并运行清单 7-8 中的查询，我们首先会看到预期的 16,154 条记录。我们在扩展事件会话输出中看不到“额外”的行（如表\
  \ 7-5 所示），但我们确实看到了大量的逻辑读取。那么，我们该如何重写清单 7-8 中的代码，以从查询中移除 SQL Server 原生函数呢？\n\n表 7-5\n\
  \n运行清单 7-8 查询的扩展事件会话结果\n\n| duration | cpu time | physical reads | logical reads\
  \ | writes | row count | statement |\n| --- | --- | --- | --- | --- | --- | ---\
  \ |\n| 6307209 | 6297000 | 0 | 111,345 | 0 | 16154 | SELECT p.Id, p.Score FROM dbo.Posts\
  \ p WHERE DATEADD(dd,1,CAST(p.CreationDate AS date)) = @date |\n\n首先，我们需要创建开始日期和结束日期，并使用它们来查找`creationdates`的范围，或者这些时间点之间的任何日期。你的结束日期将变成你传入的日期，因为根据代码，你想要所有在传入日期的前一天创建的帖子。通过对参数使用`DATEADD()`函数，我们可以将其从查询本身中移除，如清单\
  \ 7-10 所示。\n\n```sql\nDECLARE @date date\n, @startdate date;\nSET @date='20120801';\n\
  SET @startdate = DATEADD(dd,-1,@date);\nSELECT p.Id\n, p.Score\nFROM dbo.Posts p\n\
  WHERE p.CreationDate >= @startdate\nAND p.CreationDate < @date;\n```\n清单 7-10\n\
  将 DATEADD() 函数移到参数上，从查询中移除\n\n让我们返回并清理：删除扩展事件文件并重新启动事件会话。然后，运行清单 7-10 中的代码。我们仍然得到了预期的\
  \ 16,154 行结果，但表 7-6 中的扩展事件会话数据显示服务器的工作量有所减少。\n\n表 7-6\n\n运行清单 7-10 查询的扩展事件会话结果\n\
