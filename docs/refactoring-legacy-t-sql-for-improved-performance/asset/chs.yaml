  \ 0，物理读取 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。\n表 'Votes'。扫描计数 666，逻辑读取 162302868，物理读取\
  \ 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。\n表 'Users'。扫描计数 1，逻辑读取 44532，物理读取 0，预读\
  \ 24519，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。\nSQL Server 执行时间：\nCPU 时间 = 4657469 毫秒，已用时间\
  \ = 4687108 毫秒。\n```\n\n最大的问题似乎是什么？通过连接和子查询对 `Posts` 表进行了多次调用，这令人担忧。为什么我们要反复查找该表中相同的一般性数据？我们可以看到对\
  \ `Posts` 表执行了多少次扫描。还有，对 `Votes` 表的读取次数多得离谱，这又怎么说？\n\n### 函数和 STATISTICS IO 输出\n\
  \n不过，你注意到这里有什么奇怪的地方吗？在此输出中，我们没有看到任何针对 `Badges` 表的读取记录，然而我们的输出却包含了徽章信息。`STATISTICS\
  \ IO` 输出不包括函数的工作！这一点一定要注意。你可以在分析器跟踪中捕获该信息（但现在还有谁用这个呢？）。你也可以使用扩展事件来捕获该信息，这通常是一种低开销（在影响服务器性能方面）的获取所需数据的方式。\n\
  \n### 制定行动计划\n\n此存储过程的问题似乎在于读取了大量数据，尽管这些数据并未被返回。让我们看看能否通过以下方式减少读取的数据量：\n\n1.  消除子查询\n\
  2.  消除函数\n3.  消除 `LIKE` 语句中的前导 '%'\n\n如果 `LIKE` 语句只有尾随的 '%' 而没有前导的 '%'，则可以使用索引。但是，如果有前导的\
  \ '%'，则无法使用索引。\n\n#### 消除子查询吧！\n\n我们确定 `Votes` 表有海量的读取操作。让我们尝试将调用 `Votes` 表的子查询改为\
  \ `LEFT OUTER JOIN` 语句。为了消除对 `Posts` 表的子查询，我们需要稍微巧妙地使用聚合和 `GROUP BY`。我们已经连接了 `Posts`\
  \ 表，所以信息是可用的。我们需要 `PostTypeId = 2` 的帖子 ID 的 `COUNT()`，以及 `PostTypeId = 2` 的帖子 ID\
  \ 的 `creationDate` 的 `MAX()`。这听起来像是我们需要一些 `CASE` 语句，因为在 `INNER JOIN` 中我们没有指定 `PostTypeId`。清单\
  \ 6-16 显示了如我们刚才讨论的那样移除了子查询的修改后的查询。\n\n```\nDECLARE @theName NVARCHAR(40) = 'Joel';\n\
  SELECT u.Id\n, u.DisplayName\n, u.AboutMe\n, SUM(CASE WHEN p.PostTypeId = 1 THEN\
  \ 1 ELSE 0 END) AS numPosts\n, SUM(CASE WHEN v.Id IS NOT NULL THEN 1 ELSE 0 END)\
  \ AS numFavVotes\n, SUM(CASE WHEN p.PostTypeId = 2 THEN 1 ELSE 0 END) AS numComments\n\
  , MAX(CASE WHEN p.PostTypeId = 2 THEN p.CreationDate ELSE '20000101' END) AS dateLastComment\n\
  , u.UpVotes\n, u.DownVotes\n, dbo.getlastBadgeUser(u.Id) AS latestBadge\nFROM dbo.Users\
  \ u\nINNER JOIN dbo.Posts p ON u.Id = p.OwnerUserId\nLEFT OUTER JOIN dbo.Votes v\
  \ ON p.Id = v.PostId\nAND v.VoteTypeId = 5\nWHERE p.PostTypeId IN (1,2)\nAND u.[DisplayName]\
  \ LIKE '%' + @theName + '%'\nGROUP BY u.Id\n, u.DisplayName\n, u.AboutMe\n, u.UpVotes\n\
  , u.DownVotes\n, dbo.getlastBadgeUser(u.Id);\n清单 6-16\n移除子查询后的 getUserInfoByName\
  \ 查询\n```\n\n第一步是在开启 `STATISTICS IO` 和 `TIME` 的情况下运行此代码，看看我们在减少读取方面是否取得了进展。清单 6-16\
  \ 中查询的 `STATISTICS IO` 和 `TIME` 输出（仍然针对 `@theName = 'Joel'` 运行）给出了有趣的结果：\n\n```\n\
  SQL Server 解析和编译时间：\nCPU 时间 = 15 毫秒，已用时间 = 18 毫秒。\nSQL Server 执行时间：\nCPU 时间 = 0\
  \ 毫秒，已用时间 = 0 毫秒。\n(920 行受影响)\n表 'Worktable'。扫描计数 0，逻辑读取 0，物理读取 0，预读 0，lob 逻辑读取\
  \ 0，lob 物理读取 0，lob 预读 0。\n表 'Workfile'。扫描计数 2，逻辑读取 640，物理读取 15，预读 625，lob 逻辑读取 0，lob\
  \ 物理读取 0，lob 预读 0。\n表 'Posts'。扫描计数 2644，逻辑读取 142015，物理读取 0，预读 228392，lob 逻辑读取 0，lob\
  \ 物理读取 0，lob 预读 0。\n表 'Users'。扫描计数 1，逻辑读取 44532，物理读取 0，预读 30113，lob 逻辑读取 0，lob 物理读取\
  \ 0，lob 预读 0。\n表 'Votes'。扫描计数 1，逻辑读取 243698，物理读取 4，预读 243476，lob 逻辑读取 0，lob 物理读取\
  \ 0，lob 预读 0。\nSQL Server 执行时间：\nCPU 时间 = 34746844 毫秒，已用时间 = 34809302 毫秒。\n```\n\
  \n将此作为查询而非存储过程运行，显示了超过 9 小时的显著更长的运行时间，正如我们从输出中看到的。然而，我们确实大大减少了读取次数。减少读取是好事，但代价是增加了\
  \ 8 小时的运行时间则不行。让我们看看是否可以进行其他更改来降低运行时间。\n\n#### 移除函数！\n\n下一步是查看函数中的代码，看我们是否能在查询中替换整个函数。创建该函数的代码如\
  \ **代码清单 6-17** 所示。\n\n```\n/**************************************************************************\n\
  \  对象描述：获取用户 ID 对应的最新徽章\n修订历史：\n日期         名称             标签/PTS    描述\n-----------\
  \  ---------------  ----------   ------------------------------\n2019.07.07   LBohm\
  \                         初始版本\n**************************************************************************/\n\
  CREATE FUNCTION dbo.getLastBadgeUser (@userID int)\nRETURNS nvarchar(40)\nAS\nBEGIN\n\
  DECLARE @badgename nvarchar(40);\nSET @badgename = COALESCE((SELECT TOP 1 [Name]\n\
  FROM dbo.Badges\nWHERE userID = @userID\nORDER BY [Date] DESC),”);\nRETURN @badgename;\n\
  END;\n```\n**代码清单 6-17**\n`dbo.getLastBadgeUser` 的创建语句\n\n我们应该能够使用带有徽章信息的 `OUTER\
  \ APPLY`，并几乎原封不动地将代码从函数移到 `OUTER APPLY` 中，如 **代码清单 6-18** 所示。\n\n```\nOUTER APPLY\
  \ (SELECT TOP 1 [Name] AS latestBadge\nFROM dbo.Badges\nWHERE userID = u.id\nORDER\
  \ BY [Date] DESC) AS bInfo\n```\n**代码清单 6-18**\n用于替换 `getLastBadgeUser` 函数的 `OUTER\
  \ APPLY` 语句\n\n#### 移除 LIKE 语句中开头的 %\n\n这是我们将在 `getUserInfoByName` 查询中更改的最后一部分。正如我们之前讨论的，当\
  \ `LIKE` 语句中存在开头的 `%` 时，查询优化器无法使用索引。为什么会这样？嗯，如果我们思考一下索引是什么，这就完全说得通了。索引是以特定顺序显示的数据。如果前导列是\
  \ `varchar` 或类似数据类型，则顺序是按字母顺序排列的。如果我们知道短语的开头，就可以使用索引来查找与开头匹配的数据，因为我们确切地知道它在索引中的位置（由于索引的顺序）。然而，如果我们不知道开头，就仍然必须扫描整个索引，而不是能够使用有针对性的查找操作。\n\
  \n当我们把三项更改放在一起——移除子查询、移除函数以及移除 `LIKE` 语句中开头的 `%`——我们得到如 **代码清单 6-19** 所示的代码。\n\n\
  ```\nIF NOT EXISTS\n(\nSELECT 1\nFROM sys.procedures\nWHERE name = 'getUserInfoByName'\n\
  )\nBEGIN\nDECLARE @sQL NVARCHAR(1200);\nSET @sQL = N'/**************************************************************************\n\
