  \n如果我们针对存储表 7-7 结果的文件运行这个查询，我们就能更清楚地了解服务器实际在做的工作，如表 7-8 所示。\n\n**表 7-8：** 表 7-7\
  \ 中扩展事件会话数据的汇总指标\n\n\n| `totDurationms` | `totCPUms` | `totLogReads` |\n| --- |\
  \ --- | --- |\n| 11 | 30 | 4,346 |\n\n即使这个查询在返回一条记录时并不特别消耗资源，但如果用于返回更大的结果集，它可能会变得非常“痛苦”。此外，为什么要让\
  \ SQL Server 做更多不必要的工作呢？善用你的能力，而不是滥用它们！让我们来看看如何重写 `andTheKitchenSink` 函数，以最小化我们所做的工作，只执行找到所需值所必需的那部分工作。\n\
  \n我们该怎么做？一种方法是，仅在传入了相应的 `@value` 标签时，才运行查找值的代码。我们可以通过使用 `CASE` 语句设置 `@returnValue`，并将获取\
  \ `@returnValue` 的查询运行建立在 `@value` 标签的值上来实现这一点。我们在清单 7-14 的代码中实现了这一点。\n\n```sql\n\
  ALTER FUNCTION dbo.andTheKitchenSink (@postID int, @value varchar(8))\nRETURNS varchar(30)\n\
  AS\nBEGIN\nDECLARE @returnValue varchar(30);\nSET @returnValue = CASE @value\nWHEN\
  \ 'COMMENT' THEN COALESCE((SELECT CAST(COUNT(1) AS varchar(30))\nFROM dbo.Comments\n\
  WHERE PostId = @postID),'0')\nWHEN 'RESPDR' THEN COALESCE((SELECT CAST(COUNT(DISTINCT\
  \ OwnerUserID) AS varchar(30))\nFROM dbo.Posts\nWHERE ParentId = @postID\nAND PostTypeId\
  \ = 2),'0')\nWHEN 'LINK' THEN COALESCE((SELECT CAST(COUNT(1) AS varchar(30))\nFROM\
  \ dbo.PostLinks\nWHERE PostId = @postID),'0')\nWHEN 'VOTE' THEN COALESCE((SELECT\
  \ CAST(COUNT(1) AS varchar(30))\nFROM dbo.Votes\nWHERE PostId = @postID),'0')\n\
  ELSE COALESCE((SELECT CAST(COUNT(1) AS varchar(30))\nFROM dbo.Posts\nWHERE ParentId\
  \ = @postID\nAND PostTypeId = 2),'0')\nEND;\nRETURN(@returnValue);\nEND;\nGO\n```\n\
