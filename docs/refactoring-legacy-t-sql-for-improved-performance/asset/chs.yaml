  1074 次逻辑读取；扫描了 `PostLinks` 表一次，产生了 5824 次逻辑读取。此外，我们还看到了一个工作表，它为每一行执行了一次扫描，并产生了 530
  万次逻辑读取。这是什么情况？既然我们终于让这段代码运行得足够快以获取执行计划了，那就让我们来看一下吧！该计划如图 4-1 所示。


