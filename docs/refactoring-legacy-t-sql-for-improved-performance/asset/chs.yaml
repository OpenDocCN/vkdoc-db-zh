  链接帖子数量查询的执行计划


  观察图 4-1 中展示的执行计划，我们可以看到对 `PostLinks` 表的一次聚集索引扫描，然后是一个索引溢出盘（index spool），绝大部分工作都在这里进行。索引溢出盘会在谓词上创建一个临时索引，以便更高效地连接数据。无论如何，这大致就是索引溢出盘应该做的事情。但这里的性能看起来有点糟糕。嗯，我们正在基于
  `PostId` 进行计数。如果我们为 `PostId` 添加一个非聚集索引，会有帮助吗？让我们试试看，使用代码清单 4-11 中的代码。


  #### 代码清单 4-11

  在 PostLinks 表的 PostID 列上创建索引


