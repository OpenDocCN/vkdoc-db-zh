  )\nSELECT @dayOfMonth\n, @userID\n, u.displayName\n, 1\n, @isAccepted\nFROM dbo.Users\
  \ u\nWHERE u.Id = @userID;\nEND;\nSET @userID = COALESCE(\n(\nSELECT MIN(p.OwnerUserId)\n\
