  \n#### 使用 `OUTER APPLY` 来联接聚合数据\n\n此外，如果输出中有多行数据，我会将查找额外数据的代码移至 `JOIN` 或 `OUTER\
  \ APPLY` 中。那会是什么样子？我们可以查看清单 7-15 中的代码，了解一种使用 `OUTER APPLY` 的方法。对于来自同一张表的数据片段，我们可以在同一个\
  \ `OUTER APPLY` 中合并这些指标。\n\n```sql\nSELECT p.Id AS postID\n, p.Score\n, com.numComments\n\
  , resp.numResponses\n, resp.numResponders\n, vote.numVotes\n, p.ViewCount\nFROM\
  \ dbo.Posts p\nOUTER APPLY (SELECT COUNT(1) AS numComments\nFROM dbo.Comments c\n\
  WHERE c.PostId = p.Id) com\nOUTER APPLY (SELECT COUNT(DISTINCT OwnerUserID) AS numResponders\n\
  , COUNT(Id) AS numResponses\nFROM dbo.Posts resp\nWHERE resp.PostTypeId = 2\nAND\
  \ p.Id = resp.ParentId) resp\nOUTER APPLY (SELECT COUNT(1) AS numVotes\nFROM dbo.Votes\
  \ v\nWHERE v.PostId = p.Id) vote\nWHERE p.Id = 649789;\n```\n**清单 7-15** 使用 `OUTER\
  \ APPLY` 查找额外的聚合数据\n\n如果我们重置 Extended Event 会话，就可以运行清单 7-15 中的查询，看看这是否会对我们的查询运行指标产生影响。来自\
