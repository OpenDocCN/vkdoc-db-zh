  \ 7-5 中的代码停止会话。\n\n```sql\nALTER EVENT SESSION [IO Patterns] ON SERVER\nSTATE =\
  \ STOP;\nGO\n```\n清单 7-5：停止 `事件会话`\n\n`扩展事件` 数据保存为 XML。为了查看它，我们可以使用 SQL Server 的\
  \ XML 解析能力以及一个内部函数，该函数允许我们读取 `扩展事件` 文件。我们可以使用清单 7-6 中的代码来查看我们用清单 7-4 启动的会话的结果。请务必将文件路径更改为与你环境中正确的文件路径匹配。\n\
