  END\nFROM #finalOutput fo\nWHERE fo.dayOfMonth = @dayOfMonth;\n/* get next post\
  \ ID */\nSET @postID = COALESCE(\n(\nSELECT MIN(Id)\nFROM dbo.Posts\nWHERE DATEADD(month,\
  \ DATEDIFF(month, 0, CreationDate), 0) = @monthYear\nAND PostTypeId = 1\nAND Id\
  \ > @postID\n), 0);\nEND;\n/* final day user calculations */\nUPDATE fo\nSET\nfo.userMostResponses\
  \ =\n(\nSELECT ud.displayName\nFROM @usersDay ud\nWHERE ud.dayOfMonth = fo.dayOfMonth\n\
  AND ud.numPostsAnswered =\n(\nSELECT MAX(udm.numPostsAnswered)\nFROM @usersDay udm\n\
