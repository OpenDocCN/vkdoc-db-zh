  \ | 0 | 5506 | 3 |\n| 11750780 | 1179 | 25 | Dustin | 8 | 2 | 5506 | 1 |\n\n总体聚合值将在每一行中显示相同的值，正如我们在表\
  \ 6-4 中的 `NumDistinctUsers`、`MaxPostsUser` 和 `MaxUpvotes` 列所看到的。这些列是找出响应数最多的用户的基础构件。我们可以将其用作过滤器在……你猜对了，下一级（或第\
  \ 3 级，我们将添加）中。并且我们在第 2 级按帖子 ID 分区分配了 `ROW_NUMBER()`，因此我们可以轻松地仅为每个原始帖子抓取一行（这将通过排除连接导致的“额外”或倍增行，使我们的\
  \ `COUNT()` 和 `SUM()` 数据保持正确）。我们可以在清单 6-6 的代码中看到第 2 级的 `ROW_NUMBER()`。\n\n清单 6-7\
  \ 向我们介绍了向查询添加第三级。在这一级，我们将使用 `theIDRow` 等于 1 的过滤器。如果你查看清单 6-6 中的代码，会注意到我们按 `numPostsUser`\
  \ `DESC` 对 `theIDRow` 进行排序。为什么我们选择这个 `ORDER BY` 子句？嗯，我们还需要知道用户回答的帖子数的最大值，而这将为我们提供该信息。使用\
  \ `numPostsUser` `DESC` 的 `ORDER BY` 意味着 `numPostsUser` 列中值最大的行将被赋予 `ROW_NUMBER()`\
  \ 等于 1，这将在我们选择 `theIDRow` 等于 1 时，为我们提供该字段（`numPostsUser`）的期望值。并且，如果我们按创建日期进行分组，就可以添加更多日期，并有望得到我们想要的结果！我们稍后会尝试这样做。\n\
  \n#### 清单 6-7\n### 使用聚合和 ROW_NUMBER() 进行带筛选的查询\n\n```sql\nSELECT COUNT(secInfo.Id)\
  \ AS numPosts  -- 第三级 - 最外层\n, secInfo.createDate\n, SUM(secInfo.answerCount) AS\
  \ numResponses\n, MAX(secInfo.maxUpvotes) AS numHighestUpvotesOneAnswer\n, MAX(secInfo.maxPostsUser)\
  \ AS maxPostsuser\n, MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN\
  \ secInfo.DisplayName ELSE NULL END) AS userMostPosts\n, MAX(CASE WHEN secInfo.maxPostsUser\
  \ = secInfo.numPostsUser THEN secInfo.numAccepted ELSE 0 END) AS numAccepted\n,\
  \ MAX(secInfo.numDistinctUsers) AS numUsersResponded\nFROM (\nSELECT theInfo.Id\
  \ -- 第二级\n, theInfo.createDate\n, theInfo.AnswerCount\n, MAX(theInfo.Score) OVER\
  \ () AS maxUpvotes\n, MAX(theInfo.numPostsUser) OVER () AS maxPostsUser\n, theInfo.numPostsUser\n\
  , theInfo.DisplayName\n, MAX(theInfo.numUsersPost) OVER () AS maxNumUsersPost\n\
  , theInfo.numAccepted\n, SUM(CASE WHEN theInfo.theUserRowNum = 1 THEN 1 ELSE 0 END)\
  \ OVER () AS numDistinctUsers\n, ROW_NUMBER() OVER (PARTITION BY Id ORDER BY numPostsUser\
  \ DESC) AS theIDRow\nFROM (\nSELECT p.Id -- 第一级 - 最内层\n, CAST(p.CreationDate AS\
  \ DATE) AS createDate\n, p.AnswerCount\n, pUser.Score\n, COUNT(pUser.ParentId) OVER\
  \ (PARTITION BY pUser.OwnerUserId) AS numPostsUser\n, COUNT(pUser.OwnerUserId) OVER\
  \ (PARTITION BY pUser.ParentId) AS numUsersPost\n, pUser.ParentId\n, pUser.OwnerUserId\n\
  , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION\
  \ BY pUser.OwnerUserId) AS numAccepted\n, u.DisplayName\n, ROW_NUMBER() OVER (PARTITION\
  \ BY pUser.OwnerUserId ORDER BY pUser.ParentId DESC) AS theUserRowNum\nFROM dbo.Posts\
  \ p\nLEFT OUTER JOIN dbo.Posts pUser ON p.Id = pUser.ParentId\nAND EXISTS (SELECT\
  \ pUser.OwnerUserId EXCEPT (SELECT NULL UNION SELECT 0))\nAND pUser.PostTypeId =\
  \ 2\nLEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId = u.Id\nWHERE p.CreationDate\
  \ >= '20120801'\nAND p.CreationDate < '20120802'\nAND p.PostTypeId = 1) theInfo\n\
  ) secInfo\nWHERE secInfo.theIDRow = 1\nGROUP BY secInfo.createDate;\n```\n\n当我们运行清单\
  \ 6-7 中的查询时，会得到表 6-5 所示的单行结果。它似乎包含了报告所需的大部分信息。不过，我们还是逐行分析一下从查询中得到了什么，因为健全性检查很有价值。\n\
  \n#### 表 6-5\n##### 清单 6-7 中查询的输出\n\n| 发帖数 | 创建日期 | 回复数 | 单答案最高赞同数 | 最大发帖用户 | 发帖最多的用户\
  \ | 已接受答案数 | 回复用户数 |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n| 5574\
  \ | 2012-08-01 | 10,248 | 1,179 | 25 | Jon Skeet | 16 | 5506 |\n\n### 我们是如何得到这个结果的？\n\
  \n让我们回顾一下清单 6-7 中代码的输出语句，并追踪它们，看看我们是如何得到最终查询的。\n\n`COUNT(secInfo.Id) AS numPosts`\n\
  \n`numPosts` 这行代码获取一天的发帖数（嗯，在清单 6-7 的代码中，我们只是为单日运行查询）。另外，在最外层或第三级，我们按 `createDate`\
  \ 分组，这是从 `creationDate` 列中提取出日期部分（去掉了时间）。那么，我们是如何避免原始帖子 `ID` 重复的呢？在第二级，我们按 `ID`\
  \ 进行分区使用 `ROW_NUMBER()`。然后，在第三级或最外层查询中，我们的 `WHERE` 子句是：\n\n`WHERE secInfo.theIDRow\
  \ = 1`\n\n由于我们按 ID 进行了分区，每个 ID 只能有一个 `ROW_NUMBER()` 为 1，因此这将仅提取每个帖子 ID 的单行数据。\n\n\
  `, secInfo.createDate`\n\n`createDate` 是我们较简单的行之一。我们只是将帖子的 `creationDate` 强制转换为\
  \ `DATE` 数据类型，这会从日期时间中去除时间部分。然后我们就可以按该值分组，从而获得单日的信息。\n\n`, SUM(secInfo.answerCount)\
  \ AS numResponses`\n\n`numResponses` 是 `answerCount` 的总和，即一天内每个帖子的回答数量之和。我们可以在第三级或最外层进行求和，因为在第三级我们只为该级别的每个\
  \ ID 提取一行，并且该行对于该 ID 的 `answerCount` 数值应该始终与其他行相同。\n\n`, MAX(secInfo.maxUpvotes)\
  \ AS numHighestUpvotesOneAnswer`\n\n`numHighestUpvotesOneAnswer` 是 `MAX()` 的 `MAX()`。为什么是这样？我们希望外层查询按\
  \ `createDate` 分组，并且希望所有其他字段都是聚合值。在第二级，我们为每个 ID 找到 `maxUpvotes`。然后，在最外层或第三级，我们需要找到这些值的\
  \ `MAX()`，即每个 ID 的 `maxUpvotes` 中的总体最高值。\n\n`, MAX(theInfo.numPostsUser) OVER ()\
  \ AS maxPostsUser`\n\n`maxPostsUser` 是 `COUNT()` 的 `MAX()` 的 `MAX()`。`COUNT()` 计算用户\
  \ ID “拥有”具有 `ParentId` 的帖子（在我们的例子中，是回复）的次数。我们需要 `COUNT()` 来确定用户在一天内回复的帖子数量。然后我们取最大值，但不按任何内容分区；我们在整个集合上获取它。那么为什么我们还要在最外层查询中做\
  \ `MAX()` 呢？嗯，这有点取巧。我们既可以像这里一样使用 `MAX()` 得到相同的结果，也可以不使用 `MAX()`，而是直接引用第二级查询中的列 (`maxPostsUser`)，但那样我们也必须将同一列\
  \ (`maxPostsUser`) 添加到 `GROUP BY` 子句中。我更倾向于不向 `GROUP BY` 添加并非真正定义分组原因的额外列。不过，这只是个人偏好，因为我认为这样能使代码的意图更清晰。\n\
  \n`, MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.DisplayName\
  \ ELSE NULL END) AS userMostPosts`\n\n`userMostPosts` 列返回拥有最多帖子回复的用户的 `DisplayName`。我们知道\
  \ `maxPostsUser` 的值，但需要关联的名称。我们可以通过找出 `numPostsUser` 等于 `maxPostsUser` 的用户，并提取其\
  \ `DisplayName` 来实现。在这种情况下，我们稍微“黑客”了一下 `MAX` 以帮助我们获取想要的值。我们使用 `CASE` 语句来实现这一点，当我们的筛选条件不匹配时（即\
  \ `maxPostsUser` 不等于 `numPostsUser` 时），将列的值设置为 `NULL`。如果两者相等，我们将列的值设置为 `DisplayName`，这将被视为“大于”\
  \ `NULL`，并成为 `userMostPosts` 列的 `MAX()` 值。\n\n`, MAX(CASE WHEN secInfo.maxPostsUser\
  \ = secInfo.numPostsUser THEN secInfo.numAccepted ELSE 0 END) AS numAccepted`\n\n\
  `numAccepted` 使用了一点与 `userMostPosts` 类似的“技巧”。我们需要找出拥有最多帖子的用户被标记为已接受的答案数量。我们再次使用带有\
  \ `CASE` 语句的 `MAX()`。\n\n`, MAX(secInfo.numDistinctUsers) AS numUsersResponded`\n\
  \n`numUsersResponded` 也不一定非要是聚合值，但如果移除聚合，我们又必须将该列添加到 `GROUP BY` 中。我仍然更倾向于将其保留为聚合以保持可读性，并避免将其（及混淆）带入\
  \ `GROUP BY` 中。\n\n\n### 但是性能如何呢？\n\n以下是运行`清单 6-7`中查询时得到的`STATISTICS IO`和`TIME`输出（这里的“我们”是指我）：\n\
