  ### 概要


  现在，`WidePosts` 表已经被拆分为更小的表并进行了规范化处理，这样，每当遇到引用原为表的 `WidePosts` 视图的性能不佳的代码时，我们就可以使用那些更小的表。不过，这种方法存在一个主要问题。如果插入或更新操作同时更改了多个基础表中的值，那么对原表（现在是一个视图）的插入、更新，尤其是删除操作可能会失败。


  对插入、更新和删除操作的担忧使得这个方案成为只读表的绝佳解决方案，但对于事务性表来说则不那么理想。减轻由视图覆盖的事务性表数据更改的一种方法是在视图上使用 `INSTEAD
  OF` 触发器。请谨慎使用 `INSTEAD OF` 触发器，因为它们可能会变得异常混乱。我建议避免使用这些触发器。如果你有能力在应用程序中处理数据更改，我会选择在应用程序中进行这些更改。


  ## 4. 数据库视图


  视图本质上就是一个保存起来的 `SELECT` 语句。它确实有一些局限性，虽然可以通过一些技巧来规避，但对于视图来说，“能做并不代表应该做”。视图可以像表一样被调用，一个视图也可以调用其他视图。视图的局限性如下：


  *   除了 CTE（公用表表达式）外，`SELECT` 语句必须是视图定义中的第一条语句。

  *   除非使用 `TOP` 语句或 `FOR XML`（我过去见过很多 `SELECT TOP 100%` 的用法），否则无法在视图定义中对数据进行排序。

  *   视图不能有默认列值或约束。

  *   视图不能调用临时表。


  开发人员在使用视图时常常会陷入许多常见的坏习惯。让我们通过下面的例子来看一下其中一些。你可能会接到用户打来的臭名昭著的电话。“嘿，我们正试图运行这个查询。它只是想获取某个月份每个帖子的关联帖子数量，但已经跑了超过
  5.5 小时了。你能查查是怎么回事吗？” 用户答应发给你一个查询，当你打开邮件时，看到的是代码清单 4-1 中的内容。


  ```sql

  SELECT wp4.postID

  , wp4.creationDate

  , wp4.numLinkedPosts

  FROM WidePostsPlusFour wp4

  WHERE wp4.creationDate >=''20120801''

  AND wp4.creationDate < ''20120901'';

  ```


  代码清单 4-1

  使用关联帖子查询来查找关联帖子的数量


  代码清单 4-1 中的代码需要执行 5.5 小时，这可能是你听过的最荒谬的事情。如此简单的查询怎么可能需要那么长时间？嗯……那个表名看起来不熟悉。好吧，原来它不是表，而是一个视图。行吧，那么，视图的定义是什么？当我们从
  SSMS（SQL Server Management Studio）中提取 `ALTER VIEW` 语句时，看到的是代码清单 4-2 中的代码。


  ```sql

  ALTER VIEW WidePostsPlusFour AS

  SELECT wp3.*

  , dbo.getNumLinkedPosts(wp3.postID) AS numLinkedPosts

  FROM dbo.WidePostsPlusThree wp3

  WHERE wp3.commentID IS NOT NULL;

  ```


  代码清单 4-2

  `WidePostsPlusFour` 的视图定义


  这看起来几乎完全无害，除了可能存在的 `getNumLinkedPosts` 函数。等等，`WidePostsPlusThree` 是另一个视图吗？


  ### 嵌套


  当多层视图调用其他多层视图时，嵌套就成了一个大问题。这种嵌套的做法通常会导致对相同表的多次调用，也可能导致优化器无法生成合理的查询计划。社区里的一些人对此做了一些研究；至少截至
  SQL Server 2014，对于任何嵌套太深（超过五层）的视图，优化器最多只能生成一个“足够好”的计划。那么，代码清单 4-1 中的代码到底是什么原因导致了性能问题呢？嗯，我们在第
  2 章讨论过的存储过程 `sp_codeCallsCascade` 可以查找指定对象调用的所有 SQL 对象。我们可以像代码清单 4-3 中所示的那样执行它，来查找我们的
  `WidePostsPlusFour` 视图调用了哪些对象。


  表 4-1

  代码清单 4-3 中 `sp_codeCallsCascade` 示例的结果


  | thisObjName | thisObjType | callingCode | Level |

  | --- | --- | --- | --- |

  | WidePostsPlusFour | VIEW | root | 0 |

  | WidePostsPlusThree | VIEW | WidePostsPlusFour | 1 |

  | WidePostsPlusTwo | VIEW | WidePostsPlusThree | 2 |

  | WidePostsPlusOne | VIEW | WidePostsPlusTwo | 3 |

  | WidePostsCh4 | VIEW | WidePostsPlusOne | 4 |

  | getnumLinkedPosts | SQL_SCALAR_FUNCTION | WidePostsPlusFour | 1 |


  ```sql

  EXECUTE sp_codeCallsCascade @codename = ''WidePostsPlusFour'',@rootSchema=''dbo'';

  ```


  代码清单 4-3

  `sp_codeCallsCascade` 的示例调用


  正如我们在表 4-1 中看到的，`WidePostsPlusFour` 视图包含了五层嵌套的视图！它还包含了标量函数 `getNumLinkedPosts`。那么，问题就来了，剩下的这些视图是什么样子的？尽管视图
  `WidePostsPlusFour` 看起来代码量很小，但当你调用它时，真正运行的是整个视图级联！因此，例如，这个视图调用对于 SQL Server（以及查询优化器，你可以想象它可能会有点困惑！）来说，实际上看起来就像代码清单
  4-4 中的代码。



