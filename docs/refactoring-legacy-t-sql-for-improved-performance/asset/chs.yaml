  \ | --- | --- |\n| SQL Server parse and compile time: | 00:00:01.141 | 00:00:01.142\
  \ |\n| SQL Server Execution Times: | 00:00:02.532 | 00:00:02.539 |\n| 总计 | 00:00:03.673\
  \ | 00:00:03.681 |\n\n那么我们从表 1-1 中看到了什么？当我们使用 `STATISTICS` 输出来帮助查询调优时，我们主要关注逻辑读取。第一次运行查询时，如果你的数据不在内存中，你会看到较高的物理读取。在测试查询时，我通常忽略第一次运行，专注于第二次。这更接近生产环境中通常看到的情况，因为频繁调用的数据已经在内存中。此外，始终使用这种方法，我们可以确保我们是在进行公平的比较。\n\
  \n\n\n### 触发器导致的性能问题\n\n我们发现在表 1-1 中有大量的页面读取，尤其是更新单行时。但这个 `WidePosts` 表是什么？我们并没有更新那个表…对吧？没有，我们正在更新的是\
  \ `dbo.Users` 表。不知何故，这个 `WidePosts` 表与 `Users` 表有关联。在 SSMS 中，`Users` 表周围有任何对象吗？外键约束？一个…等等，触发器？嗯，让我们看看这个触发器的定义，如代码清单\
  \ 1-4 所示。\n\n```sql\n/*****************************************************************\n\
  对象描述：将用户更改推送到 WidePosts 表。\n修订历史：\n日期         名称             标签/PTS    描述\n-----------\
  \  --------------   ----------   -------------------\n2019.05.12   LBohm       \
  \                  初始版本\n*****************************************************************/\n\
  ALTER TRIGGER [dbo].[ut_Users_WidePosts] ON [dbo].[Users]\nFOR UPDATE\nAS\nSET NOCOUNT\
  \ ON;\nIF EXISTS\n(\nSELECT 1\nFROM INSERTED i\nINNER JOIN dbo.WidePosts wp ON i.id\
  \ = wp.OwnerUserId\n)\nBEGIN\nIF EXISTS\n(\nSELECT 1\nFROM INSERTED i\nINNER JOIN\
  \ dbo.WidePosts wp ON i.Id = wp.OwnerUserId\nWHERE i.Age  wp.Age\nOR i.CreationDate\
  \  wp.UserCreationDate\nOR i.DisplayName  wp.DisplayName\nOR i.DownVotes  wp.DownVotes\n\
  OR i.EmailHash  wp.EmailHash\nOR i.[Location]  wp.[Location]\nOR i.Reputation  wp.Reputation\n\
  OR i.UpVotes  wp.UpVotes\nOR i.[Views]  wp.[Views]\nOR i.WebsiteUrl  wp.WebsiteUrl\n\
  )\nBEGIN\nUPDATE wp\nSET\nwp.[AboutMe] = LEFT(i.AboutMe, 2000)\n, wp.[Age] = i.Age\n\
  , wp.[UserCreationDate] = i.CreationDate\n, wp.[DisplayName] = i.DisplayName\n,\
  \ wp.[DownVotes] = i.DownVotes\n, wp.[EmailHash] = i.EmailHash\n, wp.[LastAccessDate]\
  \ = i.LastAccessDate\n, wp.[Location] = i.[Location]\n, wp.[Reputation] = i.Reputation\n\
  , wp.[UpVotes] = i.UpVotes\n, wp.[Views] = i.[Views]\n, wp.[WebsiteUrl] = i.WebsiteUrl\n\
  , wp.AccountID = i.AccountID\nFROM dbo.WidePosts wp\nINNER JOIN INSERTED i ON wp.OwnerUserId\
  \ = i.Id\nWHERE i.Age  wp.Age\nOR i.CreationDate  wp.UserCreationDate\nOR i.DisplayName\
  \  wp.DisplayName\nOR i.DownVotes  wp.DownVotes\nOR i.EmailHash  wp.EmailHash\n\
  OR i.[Location]  wp.[Location]\nOR i.Reputation  wp.Reputation\nOR i.UpVotes  wp.UpVotes\n\
  OR i.[Views]  wp.[Views]\nOR i.WebsiteUrl  wp.WebsiteUrl;\nEND;\nEND;\nGO\n```\n\
  \n*代码清单 1-4* `ut_Users_WidePosts` 触发器的 `ALTER` 语句\n\n哈。每次我们更新 `Users` 表时，它都会将更新发送到\
  \ `WidePosts` 表中所有 `OwnerUserID` 等于 `Users` 表 `id` 的记录。执行这个任务需要进行大量的读取。让我们再运行一个例子，这次我们将获取一个执行计划。\n\
  \n#### 执行计划\n\n执行计划显示了 SQL Server 决定如何运行你的查询或语句。它展示了优化器选择的操作符。如果你从未看过它，可能会感到困惑。执行计划是\
  \ XML 数据，可以被解析成一个图表，显示 SQL Server 引擎使用哪些操作符来满足你的查询请求。（好吧，这说得像泥巴一样清楚，对吧？）当查询运行时，SQL\
  \ Server 使用查询优化器来找出返回数据或执行请求的最佳方式。对于我们要从中获取数据或执行操作的每个表，SQL Server 将使用一个或多个操作符来访问该表。例如，如果我们需要从\
  \ `Posts` 表的大部分数据中获取数据，SQL Server 将执行“表扫描”——即，它将读取表的所有数据页——以找到要返回的数据。该计划还将显示 SQL\
  \ Server 期望向下一个操作符推送多少行数据。\n\n我首先快速扫视的是又粗又大的线（表示有大量数据，或推送至下一操作符的行数很多）。同时，我检查哪些操作符显示了最多的工作量。我使用\
  \ Plan Explorer 来帮助按每个操作完成的工作量对操作进行排序，这使我们能够轻松找到最昂贵的罪魁祸首。那么，我们如何获取这些信息呢？\n\n在 SSMS\
  \ 中，查询窗口上方有一个你可以点击的按钮。当你将鼠标悬停在它上面时，它会显示文本“获取实际执行计划”。此图标如图 1-2 所示，周围有一个方框。\n\n![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig2_HTML.jpg](img/483961_1_En_1_Fig2_HTML.jpg)\n\
  \n*图 1-2* 在 SSMS 中开启实际执行计划\n\n\n### 统计信息\n\n实际执行计划本质上就是包含了统计信息的估算执行计划，因此它们通常差别不大。统计信息是\
  \ SQL Server 针对表中的列维护的元数据，用于指示数据分布情况。例如，在一本字典中，有大量单词以字母“st”开头。而以“zy”开头的单词则较少。这种数据的偏斜情况通过统计信息进行跟踪，这有助于查询优化器找到更优的执行计划。\n\
  \n我通常使用实际执行计划，因为它也是查看统计信息是否已过期并需要维护的一种简便方法。如果我们查询返回单行数据，而查询优化器却认为我们返回了 3,000 行，那么统计信息可能就需要维护了。\n\
  \n现在，让我们运行一个查询来更新另一个显示名称。\n\n```\nUPDATE Users\nSET DisplayName = 'Rita Skeeter'\n\
  WHERE Id = 22656;\nListing 1-5\n更新用户 ID 为 22656 的显示名称\n```\n\n我们的执行计划能告诉我们什么？让我们看一下运行清单\
  \ 1-5 中的代码所生成的执行计划。如果你安装了 SentryOne Plan Explorer，你可以在 SSMS 中右键单击执行计划（在“结果”选项卡附近查找该选项卡），然后从出现的菜单中选择在\
  \ Plan Explorer 中打开该计划。\n\n一旦你在 Plan Explorer 中查看执行计划，你会看到与图 1-3 中所示类似的内容。请确保你已点击“结果”选项卡中“语句”输出的第三行——我们希望查看的是所执行查询中开销最大（估计成本最高）部分的查询计划。\n\
  \n![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig3_HTML.jpg](img/483961_1_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3\n\n清单 1-5 中查询的初始执行计划\n\n我们看到，大部分开销花费在对 `WidePosts` 进行的聚集索引扫描上，因为当 `Users`\
  \ 表更新时，触发器会更新 `WidePosts` 表。\n\n什么是聚集索引扫描？聚集索引是指表中所有数据都存储于其中的索引，其数据顺序由索引指定。每个表只能有一个聚集索引。如果一个表没有聚集索引，则它被视为堆。因此，扫描聚集索引相当于扫描整张表。\n\
  \n此外，该操作中读取了大量行。如果我们查看 `WidePosts` 表，会发现有 4,394 行数据包含与用户 `ID` 22656 对应的 `OwnerUserID`。这本身没问题，但我们却读取了超过\
  \ 850,000 行。（我们可以在图 1-3 中看到 850,000 行；它是位于从聚集索引扫描出发的宽箭头正下方的数字。）这是一个我们需要解决的问题。\n\n\
  `STATISTICS IO` 和 `TIME` 的输出非常相似，如表 1-2 所示。\n\n表 1-2\n\n代码清单 1-5 对应的 Statistics\
