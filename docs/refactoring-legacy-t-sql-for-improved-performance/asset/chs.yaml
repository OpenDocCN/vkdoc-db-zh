  \ MAX(secInfo.numDistinctUsers) AS numUsersResponded\nFROM (\nSELECT theInfo.Id\
  \ -- level two\n, theInfo.createDate\n, theInfo.AnswerCount\n, MAX(theInfo.Score)\
  \ OVER () AS maxUpvotes\n, MAX(theInfo.numPostsUser) OVER () AS maxPostsUser\n,\
  \ theInfo.numPostsUser\n, theInfo.DisplayName\n, MAX(theInfo.numUsersPost) OVER\
  \ () AS maxNumUsersPost\n, theInfo.numAccepted\n, SUM(CASE WHEN theInfo.theUserRowNum\
  \ = 1 THEN 1 ELSE 0 END) OVER () AS numDistinctUsers\n, ROW_NUMBER() OVER (PARTITION\
  \ BY Id ORDER BY numPostsUser DESC) AS theIDRow\nFROM (\nSELECT p.Id -- level one\
  \ - innermost\n, CAST(p.CreationDate AS DATE) AS createDate\n, p.AnswerCount\n,\
  \ pUser.Score\n, COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS\
  \ numPostsUser\n, COUNT(pUser.OwnerUserId) OVER (PARTITION BY pUser.ParentId) AS\
  \ numUsersPost\n, pUser.ParentId\n, pUser.OwnerUserId\n, SUM(CASE WHEN pUser.Id\
  \ = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION BY pUser.OwnerUserId)\
  \ AS numAccepted\n, u.DisplayName\n, ROW_NUMBER() OVER (PARTITION BY pUser.OwnerUserId\
  \ ORDER BY pUser.ParentId DESC) AS theUserRowNum\nFROM dbo.Posts p\nLEFT OUTER JOIN\
  \ dbo.Posts pUser ON p.Id = pUser.ParentId\nAND EXISTS (SELECT pUser.OwnerUserId\
  \ EXCEPT (SELECT NULL UNION SELECT 0))\nAND pUser.PostTypeId = 2\nLEFT OUTER JOIN\
  \ dbo.Users u ON pUser.OwnerUserId = u.Id\nWHERE p.CreationDate >= '20120801'\n\
  AND p.CreationDate < '20120901'\nAND p.PostTypeId = 1) theInfo\n) secInfo\nWHERE\
  \ secInfo.theIDRow = 1\nGROUP BY secInfo.createDate\nORDER BY secInfo.createDate;\n\
