- "# 第三部分 CRUD 对象\n\n## 5. 触发器\n\n触发器是在数据更改时（或在某些情况下，模式更改时）运行的对象。它们可以针对表或视图运行，并且可以由插入、更新或删除操作触发。在视图上使用它们有一些注意事项（除了我个人的观点：请不要这样做）。\n\
  \n每个触发器都有两个表，可用于查询已更改的数据。有一个 `INSERTED` 表和一个 `DELETED` 表。如果在 INSERT 上触发触发器，`INSERTED`\
  \ 表中将有记录，但 `DELETED` 表中没有。如果在 DELETE 上触发触发器，`DELETED` 表中将有记录，但 `INSERTED` 表中没有。如果在\
  \ UPDATE 语句上触发触发器，`INSERTED` 和 `DELETED` 表中都会有一个包含相同主键值的记录，因此您可以将这些记录连接在一起以查找已更改的数据。\n\
  \n### 基于视图的触发器\n\n一个注意事项是基于视图的触发器必须是 INSTEAD OF 触发器，这意味着触发器中的操作将代替对对象（此处为视图）执行的原始操作发生。例如，INSTEAD\
  \ OF 触发器将运行一些其他代码，而不是允许删除操作发生，初始删除将不会发生，除非它在该 INSTEAD OF 触发器中被编码。\n\nINSTEAD OF\
  \ 触发器是我们如果在更改表结构并使用覆盖它们的视图来处理遗留代码时会使用的。您仍然可以使用 INSTEAD OF 触发器来操作底层数据，从而对“视图”进行插入、更新和删除，从而使遗留应用程序代码能够针对新模式工作。\n\
  \n### 我们应该在什么时候使用触发器？\n\n触发器似乎是执行业务逻辑的一种简单方法，但这种简单的答案可能很快失控。我没有找到很多触发器的良好用例；我发现的一个是使用临时的诊断触发器。我们可以使用诊断触发器来追踪难以追踪的、对数据进行更改的罪魁祸首。我相信还有其他一些用例，但在几乎所有情况下，触发器中的逻辑都可以通过数据访问层或应用程序以比使用触发器问题更少的方式处理。\n\
  \n### 触发器的常见问题\n\n触发器代码可能非常难以调试。因此，数据完整性问题更容易在此处悄然出现。这在大多数类型的对象中都可能发生，但我发现完整性问题在触发器中更常见。让我们回到平常的工作日，那天我们过得很愉快。然后，我们收到用户\
  \ 1010297 的案例工单，说他们所有的 `Reputation` 积分都消失了，他们对此非常愤怒。可能发生了什么？\n\n首先，我们需要寻找可能导致 `Reputation`\
  \ 积分更改的代码。当我们深入挖掘时，我们发现 `Users` 表上有一个触发器。当我们查看该触发器时，其功能似乎是：如果用户获得 5 的倍数个 `DownVotes`，并且他们的\
  \ `Reputation` 大于 0，他们的 `Reputation` 将减少 1。我们的触发器代码如代码清单 5-1 所示。\n\n```sql\nIF NOT\
  \ EXISTS (SELECT 1 FROM  sys.triggers\nWHERE name = 'iu_Users_DownVotes'\n)\nBEGIN\n\
  DECLARE @SQL nvarchar(1200);\nSET @SQL = N'/**************************************************************************\n\
  2019.06.30   LBohm                  INITIAL TRIGGER STUB CREATE RELEASE\n**************************************************************************/\n\
  CREATE TRIGGER dbo.iu_Users_DownVotes ON dbo.Users\nFOR INSERT,UPDATE\nAS\nBEGIN\n\
  SET NOCOUNT ON;\nIF NOT EXISTS (SELECT 1 FROM INSERTED)\nRETURN;\nEND;';\nEXECUTE\
  \ SP_EXECUTESQL @SQL;\nEND;\nGO\n/**************************************************************************\n\
  Object Description: Reduces User Reputation after 5 DownVotes.\nRevision History:\n\
  Date             Name             Label/PTS    Description\n-----------      ---------------\
  \  ----------   ------------------------------\n2019.06.30       LBohm         \
  \                Initial Release\n**************************************************************************/\n\
  ALTER TRIGGER [dbo].[iu_Users_DownVotes] ON [dbo].[Users]\nFOR INSERT,UPDATE\nAS\n\
  BEGIN\nSET NOCOUNT ON;\n-- if the DownVote count divided by 5 has no remainder,\
  \ subtract 1 from the Reputation\nIF EXISTS (SELECT 1 FROM INSERTED i WHERE i.DownVotes\
  \ > 0\nAND i.DownVotes % 5 = 0\nAND i.Reputation > 0)\nBEGIN\nUPDATE u\nSET u.Reputation\
