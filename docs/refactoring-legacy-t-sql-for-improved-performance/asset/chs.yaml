  \ |\n\n我们希望保留那段用于处理传入日期非月份第一天情况的调整代码，因此我们将在新版本中包含这些调整。加上存储过程包装代码和 `Numbers` 表代码后，我们新版本的\
  \ `DailySummaryReportPerMonth` 存储过程就完成了，如清单 6-14 所示。\n\n```sql\nALTER PROCEDURE\
  \ [dbo].[DailySummaryReportPerMonth] @monthyear DATETIME2\nAS\n/* 以防传入的不是月份的第一天\
  \ */\nSET @monthyear = DATEADD(month, DATEDIFF(month, 0, @monthYear), 0);\nDECLARE\
  \ @enddate datetime2 = DATEADD(month, 1, @monthYear);\nDECLARE @numDays tinyint\
  \ = DATEDIFF(dd, @monthYear, @enddate);\nSELECT  DATEADD(dd,num.n-1,@monthYear)\
  \ AS monthYear\n, DATEPART(dd, DATEADD(dd,num.n-1,@monthYear)) AS [dayOfMonth]\n\
  , DATEPART(dw, DATEADD(dd, num.n-1,@monthYear)) AS [dayOfWeek]\n, COUNT(secInfo.Id)\
  \ AS numPosts\n, SUM(secInfo.AnswerCount) AS numResponses\n, MAX(secInfo.numDistinctUsers)\
  \ AS numUsersResponded\n, MAX(secInfo.maxPostsUser) AS highNumUsersSinglePost\n\
  , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.DisplayName\
  \ ELSE NULL END) AS userMostResponses\n, CAST(MAX(secInfo.maxPostsUser)/COUNT(secInfo.Id)\
  \ * 100 AS DECIMAL(8,7)) AS percentagePosts\n, MAX(secInfo.maxUpvotes) AS numHighestUpvotesOneAnswer\n\
  , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.numAccepted\
  \ ELSE 0 END) AS numAccepted\nFROM dbo.Numbers num\nLEFT OUTER JOIN (\nSELECT theInfo.Id\n\
  , theInfo.createDate\n, MAX(theInfo.AnswerCount) OVER (PARTITION BY theInfo.ID)\
  \ AS answerCount\n, MAX(theInfo.Score) OVER (PARTITION BY theInfo.createDate) AS\
  \ maxUpvotes\n, MAX(theInfo.numPostsUser) OVER (PARTITION BY theInfo.createDate)\
  \ AS maxPostsUser\n, theInfo.numPostsUser\n, theInfo.DisplayName\n, MAX(theInfo.numUsersPost)\
  \ OVER (PARTITION BY theInfo.createDate) AS maxNumUsersPost\n, theInfo.numAccepted\n\
  , SUM(CASE WHEN theInfo.theUserRowNum = 1 THEN 1 ELSE 0 END) OVER (PARTITION BY\
  \ theInfo.createDate) AS numDistinctUsers\n, ROW_NUMBER() OVER (PARTITION BY Id\
  \ ORDER BY numPostsUser DESC) AS theIDRow\nFROM (\nSELECT p.Id\n, CAST(p.CreationDate\
  \ AS DATE) AS createDate\n, p.AnswerCount\n, pUser.Score\n, COUNT(pUser.ParentId)\
  \ OVER (PARTITION BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId) AS numPostsUser\n\
  , COUNT(pUser.OwnerUserId) OVER (PARTITION BY CAST(p.CreationDate AS DATE), pUser.ParentId)\
  \ AS numUsersPost\n, pUser.ParentId\n, pUser.OwnerUserId\n, SUM(CASE WHEN pUser.Id\
  \ = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION BY CAST(p.CreationDate\
  \ AS DATE), pUser.OwnerUserId) AS numAccepted\n, u.DisplayName\n, ROW_NUMBER() OVER\
  \ (PARTITION BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId ORDER BY pUser.ParentId\
  \ DESC) AS theUserRowNum\nFROM dbo.Posts p\nLEFT OUTER JOIN dbo.Posts pUser ON p.Id\
  \ = pUser.ParentId\nAND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION\
  \ SELECT 0))\nAND pUser.PostTypeId = 2\nLEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId\
  \ = u.Id\nWHERE p.CreationDate >= @monthYear\nAND p.CreationDate < @endDate\nAND\
  \ p.PostTypeId = 1\n) theInfo\n) secInfo ON secInfo.createDate = DATEADD(dd, num.n-1,@monthYear)\
  \ -- n 从 1 开始，所以要减去 1 以从“常规”的第一天开始\nAND secInfo.theIDRow = 1\nGROUP BY num.n\nORDER\
  \ BY num.n;\n-- 清单 6-14\n-- 最终版本，DailySummaryReportPerMonth 的替换代码\n```\n\n这次重写最终变得很简单。除了移除循环，我们还修复了几个其他问题，但性能提升几乎完全可以归因于移除了循环。另外，如果你注意到了，我们增加了一个\
  \ `@enddate` 参数，这样我们就能正确计算天数，以限制 `Numbers` 表的范围，并为任何给定的月份获取正确的天数。\n\n### 我们还应该注意什么？\n\
  \n让我们看一个略有不同的例子。我们有一个存储过程，可以通过用户名或部分用户名来查找用户信息。假设我们想获取显示名称中包含文本“Joel”的任何用户的信息。让我们针对\
  \ `getUserInfoByName` 存储过程运行我们的文档化练习，看看我们能得到什么！\n\n## GetUserInfoByName: 文档\n\n\
  ### 截至 2019.07.07 的代码\n\n```sql\nIF NOT EXISTS\n(\nSELECT 1\nFROM sys.procedures\n\
  WHERE name = 'getUserInfoByName'\n)\nBEGIN\nDECLARE @SQL NVARCHAR(1200);\nSET @SQL\
  \ = N'/***************************************************************************\n\
  2019.07.07         LBohm        INITIAL STORED PROC STUB CREATE RELEASE\n**************************************************************************/\n\
  CREATE PROCEDURE dbo.getUserInfoByName\nAS\nSET NOCOUNT ON;\nBEGIN\nSELECT 1;\n\
  END;';\nEXECUTE SP_EXECUTESQL\n@sQL;\nEND;\nGO\n/**************************************************************************\n\
  Description: Data for users by name\n--Test call:\n-- EXECUTE dbo.getUserInfoByName\
  \ @theName = 'Joel';\n2019.07.07         LBohm          INITIAL RELEASE\n**************************************************************************/\n\
  ALTER PROCEDURE [dbo].[getUserInfoByName] @theName varchar(20)\nAS\nSELECT u.Id\n\
  , u.DisplayName\n, u.AboutMe\n, count(p.Id) AS numPosts\n, (SELECT COUNT(v.Id) FROM\
  \ Votes v\nWHERE EXISTS (SELECT 1 FROM Posts vp\nWHERE vp.Id = v.PostId\nAND vp.OwnerUserId\
  \ = u.Id)\nAND v.VoteTypeId = 5) AS numfavVotes\n, (SELECT COUNT(pc.Id)\nFROM dbo.Posts\
  \ pc\nWHERE pc.OwnerUserId = u.Id\nAND pc.PostTypeId = 2) AS numComments\n, (SELECT\
  \ MAX(CreationDate)\nFROM dbo.Posts plastcom\nWHERE plastcom.OwnerUserId = u.Id\n\
  AND plastcom.PostTypeId = 2) AS dateLastComment\n, u.UpVotes\n, u.DownVotes\n, dbo.getlastBadgeUser(u.Id)\
  \ AS latestBadge\nFROM dbo.Users u\nINNER JOIN dbo.Posts p on u.Id = p.OwnerUserId\n\
  WHERE u.[DisplayName] LIKE '%' + @theName + '%'\nand p.PostTypeId = 1\nGROUP BY\
  \ u.ID, u.DisplayName, u.AboutMe, u.UpVotes, u.DownVotes;\n```\n\n### 功能要求\n\n*\
  \   从 `Users` 表返回：\n    `Id`, `DisplayName`, `AboutMe`, `UpVotes`, `DownVotes`\n\
  *   返回用户 `PostTypeId` 为 1 的帖子数量。\n*   返回用户 `PostTypeId` 为 2 的帖子数量（即评论）。\n*   返回最后一条评论帖子的日期。\n\
  *   返回用户收到的最新徽章名称。\n*   根据输入内容在 `DisplayName` 中的位置进行筛选。\n\n\n### 数据调用\n\n| 表 | 操作\
  \ | 返回的列 | 筛选条件 |\n| --- | --- | --- | --- |\n| `dbo.Users` | `SELECT` | `Id`, `DisplayName`,\
  \ `AboutMe`, `UpVotes`, `DownVotes` | `DisplayName LIKE %input%` |\n| | | `GROUP\
  \ BY Id, DisplayName, AboutMe, Upvotes, DownVotes` | |\n| `dbo.Posts` | `SELECT`\
  \ | `COUNT(Id)` | `OwnerUserId = User Id, PostTypeId = 1` |\n| | `EXISTS` | | `OwnerUserId\
  \ = User Id` |\n| | `SELECT` | `COUNT(Id)` | `OwnerUserId = User Id, PostTypeId\
  \ = 2` |\n| | `SELECT` | `MAX(CreationDate)` | `OwnerUserId = User Id, PostTypeId\
  \ = 2` |\n| `dbo.Votes` | `SELECT` | `COUNT(Id)` | `Id = PostId` |\n| 函数 | | `dbo.getLastBadgeUser(Id)`\
  \ | |\n\n### 可能的危险信号\n\n#### 数据类型匹配\n\n输入变量是 `varchar(20)`，而字段是 `nvarchar(40)`。\n\
  \n#### 子查询\n\n在唯一数据调用的 `SELECT` 语句中存在三个子查询。它们都引用了 `Posts` 表。\n\n#### 计算\n\n不适用\n\
  \n#### 临时表和/或表变量\n\n不适用\n\n#### 循环/游标\n\n不适用\n\n#### 公共表表达式\n\n不适用\n\n#### 连接类型\n\
  \n标准\n\n#### IN/NOT IN/LIKE\n\n`WHERE` 子句中的 `LIKE` 同时使用了前导和尾随的 `%`。无法使用索引…\n\n####\
  \ 排序操作\n\n大型分组操作\n\n#### 对其他用户定义 SQL 对象的调用\n\n调用了函数 `dbo.getLastBadgeUser`\n\n####\
  \ WHERE 子句中的原生 SQL 函数\n\n不适用\n\n### 此次调用的运行统计信息\n\n我们需要找出此查询耗时过长的原因。让我们首先查看使用清单\
  \ 6-15 中代码调用此存储过程时的 `STATISTICS IO` 和 `TIME` 信息。\n\n```\nSET STATISTICS IO,TIME\
  \ ON;\nGO\nEXECUTE getUserInfoByName @theName = 'Joel';\n清单 6-15\n在开启 STATISTICS\
  \ IO 和 TIME 的情况下执行存储过程\n```\n\n`STATISTICS IO` 和 `TIME` 在消息选项卡中的输出显示了相当显著的运行时间，以及大量的读取操作。任何操作运行\
