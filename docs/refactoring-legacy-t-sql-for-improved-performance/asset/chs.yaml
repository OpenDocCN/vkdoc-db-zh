  \ `DayofWeek`、`DayofMonth` 以及帖子百分比。遗憾的是，帖子百分比这一指标意义不大；它的值总是小到几乎可以忽略不计。以表 6-9 中 8\
  \ 月 10 日的结果为例。该指标值将等于 `26/9360`，这会是一个极小的数字。然而，我们仍会将这一列纳入结果集，因为原始功能包含了该指标。\n\n另外，为确保输出列的顺序和名称与原始报告一致，避免应用端或报表端可能出现的变更，我们需要检查这一点。原始输出中从未包含该最高活跃用户当天被采纳的答案数量，但它在规范中有定义，因此我们将其保留在最后一列，以防有人想将其加入报表。如果该列在报表中引发问题，我们可以在最终输出中随时将其注释掉。当我们为所有这些新增值添加完整代码后，就得到了清单\
  \ 6-11 中的查询。\n\n```sql\nSELECT secInfo.createDate AS monthYear\n, DATEPART(dd, secInfo.CreateDate)\
  \ AS [dayOfMonth]\n, DATEPART(dw, secInfo.createDate) AS [dayOfWeek]\n, COUNT(secInfo.Id)\
  \ AS numPosts\n, SUM(secInfo.AnswerCount) AS numResponses\n, MAX(secInfo.numDistinctUsers)\
  \ AS numUsersResponded\n, MAX(secInfo.maxPostsUser) AS highNumUsersSinglePost\n\
  , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.DisplayName\
  \ ELSE NULL END) AS userMostResponses\n, CAST(MAX(secInfo.maxPostsUser)/COUNT(secInfo.Id)\
  \ * 100 AS DECIMAL(8,7)) AS percentagePosts\n, MAX(secInfo.maxUpvotes) AS numHighestUpvotesOneAnswer\n\
  , MAX(CASE WHEN secInfo.maxPostsUser = secInfo.numPostsUser THEN secInfo.numAccepted\
  \ ELSE 0 END) AS numAccepted\nFROM (\nSELECT theInfo.Id\n, theInfo.createDate\n\
  , theInfo.AnswerCount\n, MAX(theInfo.Score) OVER (PARTITION BY theInfo.createDate)\
  \ AS maxUpvotes\n, MAX(theInfo.numPostsUser) OVER (PARTITION BY theInfo.createDate)\
  \ AS maxPostsUser\n, theInfo.numPostsUser\n, theInfo.DisplayName\n, MAX(theInfo.numUsersPost)\
  \ OVER (PARTITION BY theInfo.createDate) AS maxNumUsersPost\n, theInfo.numAccepted\n\
  , SUM(CASE WHEN theInfo.theUserRowNum = 1 THEN 1 ELSE 0 END) OVER (PARTITION BY\
  \ theInfo.createDate) AS numDistinctUsers\n, ROW_NUMBER() OVER (PARTITION BY Id\
  \ ORDER BY numPostsUser DESC) AS theIDRow\nFROM (\nSELECT p.Id\n, CAST(p.CreationDate\
  \ AS DATE) AS createDate\n, p.AnswerCount\n, pUser.Score\n, COUNT(pUser.ParentId)\
  \ OVER (PARTITION BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId) AS numPostsUser\n\
  , COUNT(pUser.OwnerUserId) OVER (PARTITION BY CAST(p.CreationDate AS DATE), pUser.ParentId)\
  \ AS numUsersPost\n, pUser.ParentId\n, pUser.OwnerUserId\n, SUM(CASE WHEN pUser.Id\
  \ = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION BY CAST(p.CreationDate\
  \ AS DATE), pUser.OwnerUserId) AS numAccepted\n, u.DisplayName\n, ROW_NUMBER() OVER\
  \ (PARTITION BY CAST(p.CreationDate AS DATE), pUser.OwnerUserId ORDER BY pUser.ParentId\
  \ DESC) AS theUserRowNum\nFROM dbo.Posts p\nLEFT OUTER JOIN dbo.Posts pUser ON p.Id\
  \ = pUser.ParentId\nAND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION\
  \ SELECT 0))\nAND pUser.PostTypeId = 2\nLEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId\
  \ = u.Id\nWHERE p.CreationDate >= '20120801'\nAND p.CreationDate < '20120901'\n\
  AND p.PostTypeId = 1\n) theInfo\n) secInfo\nWHERE secInfo.theIDRow = 1\nGROUP BY\
  \ secInfo.createDate\nORDER BY secInfo.createDate;\n```\n清单 6-11：用于替换原始 `dailySummaryReportByMonth`\
  \ 存储过程代码的最终代码。\n\n### 没有缺失行——计数表！\n\n我们需要将其放回存储过程的框架中。如果某天没有帖子怎么办？那样我们就会缺失行，并且可能会遇到除以零的错误。虽然这种情况不太可能发生，但我们可以使用数字表或计数表来确保每一天都有一行返回，无论是否有帖子。数字表就是一个简单的表，包含一个自增的整数列和一个主键/聚集索引，允许你以基于集合的方式进行“迭代”。本数据库中的计数表是\
  \ `dbo.Numbers`，包含 500 万行。\n\n我们希望将清单 6-11 中的查询与 `Numbers` 表进行 `LEFT OUTER JOIN`，这样即使某行没有数据，我们也能确保每个日期都返回一行。然后我们需要确保按\
  \ `Numbers` 表中的记录进行分组，而不是清单 6-11 中的代码，因为如果在 `WHERE` 子句和 `GROUP BY` 中保留对 `LEFT OUTER\
  \ JOIN` 的引用，它会被视为 `INNER JOIN`，我们仍然会丢失试图通过使用 `Numbers` 表来避免的那些行。让我们运行清单 6-12 中的代码。\n\
  \n```sql\nSELECT COUNT(1) as numPosts\n, CAST(CreationDate AS DATE) AS theDate\n\
  FROM dbo.Posts\nWHERE CreationDate >= '20080715'\nAND CreationDate < '20080816'\n\
  GROUP BY CAST(CreationDate AS DATE)\nORDER BY CAST(CreationDate AS DATE);\n```\n\
  清单 6-12：针对没有帖子的日期范围的代码。\n\n此查询的输出如表 6-10 所示。我们缺失了从 2008 年 7 月 15 日到 2008 年 7 月 31\
  \ 日（表中 `creationdate` 的最小值）之间的日期。然而，我们可以使用 `Numbers` 表来显示这些日期，即使它们没有帖子。\n\n**表 6-10**：来自清单\
  \ 6-12 代码的结果\n\n| numPosts | theDate |\n| --- | --- |\n| 6 | 2008-07-31 |\n| 140\
  \ | 2008-08-01 |\n| 94 | 2008-08-02 |\n| 132 | 2008-08-03 |\n| 326 | 2008-08-04\
  \ |\n| 515 | 2008-08-05 |\n| 504 | 2008-08-06 |\n| 588 | 2008-08-07 |\n| 448 | 2008-08-08\
  \ |\n| 231 | 2008-08-09 |\n| 188 | 2008-08-10 |\n| 454 | 2008-08-11 |\n| 553 | 2008-08-12\
  \ |\n| 526 | 2008-08-13 |\n| 633 | 2008-08-14 |\n| 593 | 2008-08-15 |\n\n```sql\n\
  DECLARE @numDays tinyint = DATEDIFF(dd, '20080715', '20080816');\nSELECT COALESCE(numPosts,0)\
  \ AS numPosts\n, DATEADD(dd, n-1, '20080715') AS theDate\n, num.n\nFROM dbo.numbers\
  \ num\nLEFT OUTER JOIN (SELECT COUNT(1) as numPosts\n, CAST(creationdate AS date)\
  \ AS theDate\nFROM dbo.Posts\nWHERE CreationDate >= '20080715'\nAND CreationDate\
  \ < '20080816'\nGROUP BY CAST(CreationDate AS DATE)\n) postInfo ON DATEADD(dd, n-1,\
