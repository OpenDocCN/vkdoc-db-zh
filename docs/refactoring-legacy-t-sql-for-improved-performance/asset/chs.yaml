- "# 第一部分 万物皆慢\n\n## 1. T-SQL 初步诊断\n\n`DBA` 最害怕接到的电话是这样的：“应用程序里所有东西都慢！快修好它！”在许多情况下，数据库是遗留代码性能不佳的罪魁祸首之一。当您被找来处理其中一些问题时，您该怎么做？首先，您需要识别出有问题的代码。我们将假设您（或其他人）已经识别出了问题区域。一旦确认，我们需要通过回答以下问题来评估情况：\n\
  \n1.  确定情况的严重性：\n    1.  用户是否无法使用系统？\n    2.  所有用户是否都无法使用？\n    3.  这是否正在导致业务损失金钱？\n\
  \n2.  确定相对工作量：\n    1.  涉及多少行代码？\n    2.  应用程序有多少区域调用了这些代码？\n    3.  需要修改多少代码？\n\
  \n3.  识别代码中的问题区域：\n    1.  哪些区域正在引发痛苦？\n\n4.  如果可能，进行初步处理。\n\n### 情况严重性\n\n这只能通过从用户或用户经理那里收集信息来确定。我知道，我知道，这意味着您必须真正与人交谈。然而，这是判断您是否应该立即放下所有其他工作立即处理此事，还是可以等到您手头任务完成后再处理的绝佳指标。如果您还没有，您可能需要考虑制定一份书面的\
  \ `SLA`（服务级别协议），说明您或您的团队对特定事件做出反应的预期（或要求）速度。严重性应该是该文件的关键部分。\n\n\n### 相对工作量\n\n如果这是一个拥有数千行代码的对象，那就遗憾地摇摇头然后离开吧。开个玩笑！然而，光是理解正在发生什么就需要大量努力，更不用说实际修复性能问题所需的工作量了。这正是优秀文档发挥作用的地方，但如果你正在阅读本书，很可能没有那种唾手可得的帮助。\n\
  \n此外，你需要考虑质量保证（QA）的工作量。最好的情况是永远不要让未经测试的代码进入生产环境。所谓未经测试，我指的是没有通过严格 QA 流程的代码。在笔记本电脑上运行一次似乎是个好主意，但存在各种你可能没有意识到的奇怪场景，而\
  \ QA 专业人员会对此有更好的把握。\n\n这段代码中存在多少确切的痛点？这将是我们可以进行何种分类处理以让用户满意（或至少让他们停止向你老板抱怨）的最大决定因素。然而，无论这些答案如何，如果代码已被确定为真正的问题，分类处理只是你的第一步。即使你通过索引或其他巧妙的巫术“修复”了它，也不要就此停止！务必充分记录代码并在必要时重写。\n\
  \n### 问题领域\n\n“喂？Sam DBA？每次用户尝试更改他们的显示名称时，应用程序都会卡住几秒钟，这真的让每个人都很沮丧。”\n\n了解代码问题的最佳方法是去运行一些导致问题的代码。有时，实际\
  \ SQL 代码之外的设置也会引发问题。应用程序连接字符串有时会设置 ANSI 设置，这可能导致 SQL 代码的运行方式与 SQL Server Management\
  \ Studio（SSMS）中的运行方式截然不同。在本书中，我们假设这些可能性已被排除，并非我们所见问题的原因，但我想让你知道，如果你还没有检查这些可能性，你应该去检查一下。\n\
  \n这是你刚刚从呼叫者那里获得的非常有用的信息。但请注意，人们喜欢随意使用“总是”和“从不”这样的词。尽量获取细节：“当你说每次时，是 100% 的情况吗？是\
  \ 90% 的情况吗？是任何时间都发生还是仅限于某些特定时间？” 记录这些答案，以便与工单/请求/投诉文档一起存档。\n\n让我们去看看当用户尝试更改其显示名称时发生了什么。在接下来的部分中，我们将尝试更改以下用户的显示名称，以寻找问题所在。我们将使用\
  \ Jon Skeet（其 `Id` 为 22656）和 stic（其 `Id` 为 31996）。查询将针对 `dbo.Users` 表运行。\n\n####\
  \ STATISTICS IO 和 STATISTICS TIME\n\n`STATISTICS IO` 是衡量查询使用的 IO 资源量的指标，而 `STATISTICS\
  \ TIME` 则测量查询运行时的 CPU 时间和已用时间，以及查询编译时间。如果你依赖 SSMS 右下角的数字来衡量查询时间，请停止这样做！它不准确——或者肯定不够准确。\n\
  \n#### 查询窗口设置\n\n首先，打开 SSMS。连接到数据库并打开一个新的查询窗口，然后打开 `STATISTICS IO` 和 `STATISTICS\
  \ TIME`。通过 UI 操作，选择“查询”菜单选项，然后选择“查询选项”，再选择“高级”。图 1-1 显示了“查询选项”的“高级”窗口。\n\n![../images/483961_1_En_1_Chapter/483961_1_En_1_Fig1_HTML.jpg](img/483961_1_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n\nSSMS 中的“查询选项高级”窗口\n\n确保勾选`SET STATISTICS TIME`和`SET STATISTICS IO`两个复选框，然后点击确定。\n\
  \n如果你想完全使用脚本，只需在查询窗口中键入如清单 1-1 所示的代码。\n\n```\nSET STATISTICS TIME, IO ON;\nListing\
  \ 1-1\n用于打开 STATISTICS TIME 和 IO 的命令\n```\n\n然后点击执行（或按 Ctrl+E）。请注意，无论你以哪种方式设置 `STATISTICS\
  \ TIME` 和 `IO` 为开启状态，它都只对该特定查询窗口或连接（SPID）生效。如果连接被重置（例如，重启 SSMS）或者你打开了另一个查询窗口，你将需要为新的查询窗口再次打开\
