  \ `WidePosts` 表。存在一个 `Key Lookup`（键查找）；我们可以通过向索引添加包含列来消除它。然而，考虑到我们现在即使对于拥有大量记录的用户也能在亚秒级内完成操作，我们或许可以到此为止，因为我们已经消除了\
  \ SQL Server 正在做的大部分额外工作。\n\n## 1. 索引\n\n### 变更的风险级别\n\n如果满足以下条件，索引变更属于低风险变更：\n\n\
  *   索引是窄索引（它包含的列很少，并且列的数据类型很小）。\n*   表上的索引数量没有过多。\n\n在此情况下，我们看到一个风险极低的代码变更（向一个仅有聚集索引和一个非聚集索引的表添加单列索引），如代码清单\
  \ 1-6 所示，而其带来的收益却非常大。\n\n### 万能答案…？\n\n太好了！我们总是只要添加一个索引，一切就神奇地解决了，对吧？嗯，不对。有些情况下我们并不想添加索引，之前在讨论索引变更是否为低风险时我们简要提到过。也许你认为需要的索引超过十列。（提示：这是个坏主意。）也许该表已经有\
  \ 30 个索引了。（提示：这是个更糟的主意。）\n\n如果查询真的需要表中大量数据，聚集索引扫描并不是一个糟糕的选择。添加一个非常宽的索引会减慢写入速度，可能显著减慢。那么向一个已有\
  \ 30 个索引的表再添加一个索引呢？相反，是否可以通过添加（或包含）单个列来使用某个现有索引？也许你需要切换索引列的顺序，因为它起始于一个 `基数` 非常低的列？所有数据库相关问题的答案永远是“视情况而定”。仔细评估你的具体情况，并利用你能收集到的所有信息来做决定。不要害怕尝试一些东西看看是否可行。不过请先在测试环境中操作！\n\
  \n对于那些不认识“`基数`”这个术语的人，它表示一个列可以包含的不同值的数量。例如，一个位（bit）列可以有三种不同的可能值。（好吧，你们这些反对 `NULL`\
  \ 的人，嘘。这只是一个例子…）如果你允许它为 `NULL`（是的，是的，我第一次就听到了），这些值将是 0、1 或 `NULL`。假设我们有一个 1,000,000\
  \ 行的表。每种值都会有很多行。另一方面，如果该列是 `datetime` 列，并且填充的是记录添加的日期/时间，那么每个值可能都不同。该位列将被称为具有“低”`基数`（该列包含许多等价值），而\
  \ `datetime` 列将被称为具有“高”`基数`（该列包含许多不同的值）。\n\n### 索引之外的初步评估\n\n还有哪些其他场景？我见过一些对象（通常是触发器和存储过程）更新了另一个表，但即使链接列上存在索引，它也无法使用。因为\
  \ `WHERE` 子句中有多个不等价的语句，可能无法使用索引，这可能导致阻塞。\n\n#### 如果可能，查询应在键值上连接\n\n为了最有效地利用外键等约束，最好让查询能在这些键值上进行连接。在这种情况下，我们还需要确保外键列也被索引，以帮助\
  \ SQL Server 快速找到所需数据。有时，这可以通过添加一个临时表来存储我们需要检查的数据，进行检查，然后使用该临时表中的键值连接回原表以执行更新或删除操作来辅助实现。\n\
  \n#### SARGability（可搜索参数性）\n\n如果 `JOIN` 和 `WHERE` 子句语句允许使用索引，则该语句被称为“`可搜索参数化`”——即\
  \ `SARGable`（Search ARGument 的缩写）。我们将在本书后面更深入地讨论这一点，但现在只需知道，有时可以通过简单的重写使一个查询变得 `可搜索参数化`。\n\
  \n### 总结\n\n初步评估也可以在任何对象类型上进行；对于这些示例，我们专注于触发器，但相同的逻辑适用于不同的对象——函数、存储过程、视图或任何其他 SQL\
  \ Server 对象。索引通常是低风险的变更，并且可以非常有效地作为代码的临时修补措施。检查查询的连接是否在键值上，也可以通过利用外键约束来帮助提高性能。对查询进行小的重写，如果能让它们使用以前无法使用的索引，也可能非常有效。\n\
  \n一旦完成了初步评估，就该深入研究该对象，记录任何可能的问题区域，并为彻底重写进行评估。\n\n"
- "# 2. 文档\n\n在着手重写之前，性能不佳的代码应该被彻底记录下来。很容易一开始就抓取并重写代码，结果却陷入嵌套的 `if` 语句、`while` 循环或对其他\
  \ SQL 对象的调用中。如果我们理解了所需的功能，我们就能判断当前代码应该被重构，还是应该直接从头开始。\n\n## 整合现有文档\n\n我们可以从代码开始。如果我们没有任何额外的文档，就需要从代码本身弄清楚功能。我们也绝对应该记录代码的初始状态，以供参考。希望你正在使用某种版本控制软件，但我们也希望这些信息能快速方便地访问。在本章中，我们将研究一个运行数天的报告存储过程，它用于计算一个月内某些数据的每日总和。我运行这个存储过程处理\
  \ 2012 年 8 月的数据花了 45 分钟；如果你选择跟随本书并运行示例，请注意这一点。让我们看看这个存储过程的修改代码包含什么；我们可以在代码清单 2-1\
  \ 中看到它。\n\n\n### 清单 2-1：DailySummaryReportPerMonth 存储过程代码\n\n```sql\n/**************************************************************************\n\
  描述：  某月每日报告的数据\n--测试调用：\n-- EXECUTE dbo.DailySummaryReportPerMonth @monthYear =\
  \ '20180801';\n2019.05.26      LBohm          初始版本\n**************************************************************************/\n\
  ALTER PROCEDURE [dbo].[DailySummaryReportPerMonth] @monthYear DATETIME\nAS\nBEGIN\n\
  /* 以防传入的不是月份的第一天 */\nSET @monthYear = DATEADD(month, DATEDIFF(month, 0, @monthYear),\
  \ 0);\nDECLARE @postID           INT\n, @dayOfMonth       TINYINT\n, @numAnswers\
  \       INT\n, @numUsers         INT\n, @acceptedAnswerID INT\n, @userID       \
  \    INT\n, @displayName      NVARCHAR(40)\n, @isAccepted       BIT\n, @userCtThisPost\
  \   SMALLINT\n, @numUpvotes       SMALLINT;\nCREATE TABLE #finalOutput\n( monthyear\
  \                  DATETIME\n, dayOfMonth                 TINYINT\n, dayOfWeek \
  \                 TINYINT\n, numPosts                   SMALLINT\n, numResponses\
  \               SMALLINT\n, numUsersResponded          SMALLINT\n, highNumUsersSinglePost\
  \     SMALLINT\n, userMostResponses          NVARCHAR(40) -- 显示名称\n, percentagePosts\
  \            DECIMAL(8, 7)\n, numHighestUpvotesOneAnswer SMALLINT\n);\nDECLARE @usersDay\
  \ TABLE\n( dayOfMonth          TINYINT\n, userID              INT\n, displayName\
  \         NVARCHAR(40)\n, numPostsAnswered    SMALLINT\n, numAcceptedAnsPosts SMALLINT\n\
  );\n/* 获取时间段内第一个不是评论或回答的帖子 */\nSET @postID = COALESCE(\n(\nSELECT MIN(Id)\nFROM\
  \ dbo.Posts\nWHERE DATEADD(month, DATEDIFF(month, 0, creationDate), 0) = @monthYear\n\
  AND PostTypeId = 1\n), 0);\n/* 获取时间段内所有不是评论或回答的帖子 */\nWHILE @postID > 0\nBEGIN\n\
  SELECT @numAnswers = p.AnswerCount\n, @acceptedAnswerid = p.AcceptedAnswerId\n,\
  \ @dayOfMonth = DATEPART(dd, p.CreationDate)\nFROM dbo.Posts p\nWHERE p.Id = @postID;\n\
  IF EXISTS\n(\nSELECT 1\nFROM #finalOutput\nWHERE dayOfMonth = @dayOfMonth\n)\nBEGIN\n\
  -- 更新\nUPDATE fo\nSET fo.numPosts = fo.numPosts + 1\n, fo.numResponses = fo.numResponses\
  \ + @numAnswers\nFROM #finalOutput fo\nWHERE fo.dayOfMonth = @dayOfMonth;\nEND;\n\
  ELSE\nBEGIN\n-- 插入\nINSERT INTO #finalOutput\n( monthYear\n, dayOfMonth\n, dayOfWeek\n\
  , numPosts\n, numResponses\n, numUsersResponded\n, highNumUsersSinglePost\n, userMostResponses\n\
  , numHighestUpvotesOneAnswer\n)\nVALUES\n( @monthYear\n, @dayOfMonth\n, DATEPART(dw,\
  \ DATEADD(dd, @dayOfMonth - 1, @monthYear))\n, 1\n, @numAnswers\n, 0\n, 0\n, \"\n\
  , 0\n);\nEND;\n/* 现在处理用户相关数据 */\nSET @userCtThisPost = 0;\nSET @userID = COALESCE(\n\
  (\nSELECT MIN(p.ownerUserId)\nFROM dbo.Posts p\nWHERE p.ParentId = @postID\nAND\
  \ p.PostTypeId = 2\n), 0);\nWHILE @userID > 0\nBEGIN\nSET @isAccepted = COALESCE(\n\
  (\nSELECT 1\nFROM dbo.Posts p\nWHERE p.OwnerUserId = @userID\nAND p.ParentId = @postID\n\
  AND p.Id = @acceptedAnswerID\n), 0);\nSET @userCtThisPost = @userCtThisPost + 1;\n\
  SET @numUpvotes = COALESCE(\n(\nSELECT MAX(p.Score)\nFROM dbo.Posts p\nWHERE p.OwnerUserId\
  \ = @userID\nAND p.ParentId = @postID\n), 0);\nUPDATE fo\nSET fo.numUsersResponded\
  \ = fo.numUsersResponded + 1\n, fo.numHighestUpvotesOneAnswer = CASE\nWHEN @numUpvotes\
  \ > fo.numHighestUpvotesOneAnswer\nTHEN @numUpvotes\nELSE fo.numHighestUpvotesOneAnswer\n\
  END\nFROM #finalOutput fo\nWHERE fo.dayOfMonth = @dayOfMonth;\n/* 为后续计算向用户表添加记录\
  \ */\nIF EXISTS\n(\nSELECT 1\nFROM @usersDay\nWHERE dayOfMonth = @dayOfMonth\nAND\
  \ userID = @userID\n)\nBEGIN\nUPDATE ud\nSET ud.numPostsAnswered = ud.numPostsAnswered\
  \ + 1\n, ud.numAcceptedAnsPosts = ud.numAcceptedAnsPosts + @isAccepted\nFROM @usersDay\
  \ ud\nWHERE dayOfMonth = @dayOfMonth\nAND userID = @userID;\nEND;\nELSE\nBEGIN\n\
  INSERT INTO @usersDay\n( dayOfMonth\n, userID\n, displayName\n, numPostsAnswered\n\
  , numAcceptedAnsPosts\n)\nSELECT @dayOfMonth\n, @userID\n, u.DisplayName\n, 1\n\
  , @isAccepted\nFROM dbo.Users u\nWHERE u.Id = @userID;\nEND;\nSET @userID = COALESCE(\n\
  (\nSELECT MIN(p.OwnerUserId)\nFROM dbo.Posts p\nWHERE p.ParentId = @postID\nAND\
  \ PostTypeId = 2\nAND p.OwnerUserId > @userID\n), 0);\nEND;\nUPDATE fo\nSET fo.highNumUsersSinglePost\
  \ = CASE\nWHEN @userCtThisPost > fo.highNumUsersSinglePost\nTHEN @userCtThisPost\n\
  ELSE fo.highNumUsersSinglePost\nEND\nFROM #finalOutput fo\nWHERE fo.dayOfMonth =\
  \ @dayOfMonth;\n/* 获取下一个帖子 ID */\nSET @postID = COALESCE(\n(\nSELECT MIN(Id)\nFROM\
  \ dbo.Posts\nWHERE DATEADD(month, DATEDIFF(month, 0, creationDate), 0) = @monthYear\n\
  AND PostTypeId = 1\nAND Id > @postID\n), 0);\nEND;\n/* 最终的每日用户计算 */\nUPDATE fo\n\
  SET fo.userMostResponses =\n(\nSELECT ud.displayName\nFROM @usersDay ud\nWHERE ud.dayOfMonth\
  \ = fo.dayOfMonth\nAND ud.numPostsAnswered =\n(\nSELECT MAX(udm.numPostsAnswered)\n\
  FROM @usersDay udm\nWHERE ud.dayOfMonth = fo.dayOfMonth\n)\n)\n, fo.percentagePosts\
  \ = CASE\nWHEN fo.numPosts = 0\nTHEN 0\nELSE CAST(\n(\nSELECT MAX(ud.numPostsAnswered)\n\
  FROM @usersDay ud\nWHERE ud.dayOfMonth = fo.dayOfMonth\n) / fo.numPosts AS DECIMAL(8,\
  \ 7))\nEND\nFROM #finalOutput fo;\nSELECT *\nFROM #finalOutput;\nEND;\n```\n\n###\
  \ 功能文档\n\n我们很幸运，能够了解这个报告应该做什么！我们有一份列出了需求的用户故事。请记住，这个数据库是 StackOverflow 数据库的备份，其中包含用户提出的编程问题、对这些问题的回答，以及针对初始帖子和回答的评论。\n\
  \n功能需求在此用户故事中给出：\n\n对于给定月份的每一天，我需要知道\n\n1.  发布了多少个问题？\n2.  针对这些问题发布了多少个答案，不论日期？\n\
  3.  有多少个不同的用户回答了这些帖子？\n4.  该月内，响应单个问题的不同用户的最高数量是多少？\n5.  哪位用户响应了该月发布的最多问题？\n6. \
  \ 该用户响应了多少个问题？\n7.  这占该月发布的问题总数的百分比是多少？\n8.  其中有多少响应被标记为接受的答案？\n\n能够接触到功能需求（在本例中是我们的用户故事）是一个极好的起点。当我们完成文档编写并开始重写此代码时，我们可以将其分解为更小的部分，不仅关注每个部分的性能，还要验证它是否满足功能需求。\n\
  \n### 统计信息与执行计划\n\n在大多数情况下，`STATISTICS TIME and IO` 输出以及执行计划都应捕获并包含在文档中。然而，在这种情况下，如果不写成一本小说而不是代码文档，几乎不可能捕获这些信息。原始代码包含两个嵌套的\
  \ `while` 循环，这会导致笨拙的 `STATISTICS` 输出以及庞大的执行计划。`STATISTICS` 输出和执行计划都需要为循环的每个部分显示一个节，从而使输出过于庞大。\n\
  \n#### 编码（反）模式\n\n以下是一个应仔细检查的编码模式清单，因为它们可能引发危险信号：\n\n*   对单个表的多次调用\n*   数据类型：参数与数据库字段之间的不匹配、字段宽度\n\
  *   子查询：数量和位置（查询的子句）\n*   计算\n*   临时表和表变量\n*   循环和/或游标\n*   CTE（公用表表达式）\n*   使用的连接类型\n\
  *   `LIKE`、`NOT LIKE` 或 `NOT IN` 的使用\n*   `DISTINCT`、`TOP` 或其他排序操作\n*   对其他 SQL\
  \ 对象（存储过程、视图、函数）的调用\n*   其他异常情况\n\n\n#### 对每个数据库表的调用次数\n\n在文档的反模式部分，我喜欢以一个表格开始，列出被调用的每个数据库表的名称。随着代码的审阅，我们可以在每个表下添加一条额外的记录，这样就能一目了然地看到单个表被代码触达的频率。我还会包含每次调用所使用的筛选信息。我们也会记录对临时表和表变量的调用。表\
  \ 2-1 展示了对代码清单 2-1 所示存储过程的表调用情况文档。\n\n**表 2-1** 代码清单 2-1 的每个表的调用次数文档\n\n| 表 | 操作\
  \ | 返回的列 | 筛选条件 |\n| --- | --- | --- | --- |\n| `dbo.Posts` | 选择 | `MIN(Id)` | `CreationDate`,\
  \ `PostTypeId` |\n| | 选择 | `AnswerCount`, `AcceptedAnswerId`, `CreationDate` | `Id`\
  \ |\n| | 选择 | `MIN(OwnerUserId)` | `ParentId`, `PostTypeId` |\n| | 选择 | 1 | `OwnerUserId`,\
  \ `ParentId`, `Id` |\n| | 选择 | `MAX(Score)` | `OwnerUserId`, `ParentId` |\n| | 选择\
  \ | `MIN(Id)` | `CreationDate`, `PostTypeId`, `Id` |\n| | 选择 | `MIN(OwnerUserId)`\
  \ | `ParentId`, `PostTypeId`, `OwnerUserId` |\n| `#finalOutput` | 存在性检查 | | `dayOfMonth`\
  \ |\n| | 插入或更新 | 行 OR `numPosts`, `numResponses` | 单条记录 (`dayOfMonth`) |\n| | 更新\
  \ | `numUsersResponded`, `numHighestUpvotesOneAnswer` | 单条记录 (`dayOfMonth`) |\n\
  | | 更新 | `highNumUsersSinglePost` | 单条记录 (`dayOfMonth`) |\n| | 更新 | `userMostResponses`,\
  \ `percentagePosts` | 单条记录 (`dayOfMonth`) |\n| | 选择 | `*` | |\n| `@usersDay` | 存在性检查\
  \ | | 单条记录 (`userID`/`dayOfMonth`) |\n| | 插入或更新 | 行 OR `numPostsAnswered`, `numAcceptedAnsPosts`\
  \ | 单条记录 (`userID`/`dayOfMonth`) |\n| | 选择 | `displayName` | `dayOfMonth`, `numPostsAnswered`\
  \ |\n| | 选择 | `Max(numPostsAnswered)` | `dayOfMonth` |\n| | 选择 | `Max(numPostsAnswered)`\
  \ | `dayOfMonth` |\n| `dbo.Users` | 选择 | `DisplayName` | 单条记录 (`Id`) |\n\n一个立即引人注意的问题是，对临时表\
  \ `#finalOutput` 有数次更新操作，并且全部基于相同的筛选条件。此外，我们对数据库表 `dbo.Posts` 的选择查询也相当频繁。\n\n####\
  \ 数据类型不匹配\n\n在代码清单 2-1 的存储过程中，数据库字段的数据类型都与用于筛选条件的参数数据类型或临时表/表变量的字段数据类型相匹配。但这究竟为什么重要呢？让我们看几个场景。\n\
  \n##### 数据截断\n\n假设我们有一个表，其中包含一个名为 `Field100` 的 `varchar(100)` 字段，而我们将这个数据提取到一个临时表的字段中（`Field40`），该字段被设置为\
  \ `varchar(40)` 数据类型。只要在我们要插入到临时表 `Field40` 字段的行中，`Field100` 的数据少于 40 个字符，那就没问题。然而，如果在待插入的任何记录中，`Field100`\
  \ 包含超过 40 个字符的数据，我们将在插入时遇到字符串截断错误。我们来看一下代码清单 2-2，这是一个数据截断示例的第一部分。\n\n```sql\nDECLARE\
  \ @sometable TABLE (somecol varchar(40));\nDECLARE @othertable TABLE (othercol Varchar(100));\n\
  INSERT INTO @othertable(othercol)\nVALUES ('blah')\n, ('foo')\n, ('short')\n, ('uhhuh');\n\
  INSERT INTO @sometable (somecol)\nSELECT othercol\nFROM @othertable;\nSELECT *\n\
  FROM @sometable;\n```\n\n**代码清单 2-2** 数据截断示例第一部分\n\n当我们运行代码清单 2-2 中的代码时，会得到如表 2-2\
  \ 所示的记录集。\n\n**表 2-2** 数据截断示例第一部分的结果\n\n| somecol |\n| --- |\n| blah |\n| foo |\n\
  | short |\n| uhhuh |\n\n然而，如果我们运行代码清单 2-3 的代码（数据截断示例的第二部分），我们甚至看不到一个记录集。\n\n```sql\n\
  DECLARE @sometable TABLE (somecol varchar(40));\nDECLARE @othertable TABLE (othercol\
  \ Varchar(100));\nINSERT INTO @othertable(othercol)\nVALUES ('blah')\n, ('foo')\n\
  , ('short')\n, ('uhhuh')\n, ('nuhuh Im going to be over 40 characters ha');\nINSERT\
  \ INTO @sometable (somecol)\nSELECT othercol\nFROM @othertable;\nSELECT *\nFROM\
  \ @sometable;\n```\n\n**代码清单 2-3** 数据截断示例第二部分\n\n相反，在“消息”选项卡下，我们会看到以下内容：\n\n```\n\
  (5 行受影响)\n消息 8152，级别 16，状态 14，第 12 行\n字符串或二进制数据将被截断。\n语句已终止。\n(0 行受影响)\n```\n\n\
  **代码清单 2-4** 数据截断示例第二部分的结果\n\n当你有几千行代码，然后需要找出发生截断的表和列时，没有什么比看到代码清单 2-4 所示的错误信息更令人沮丧的了。微软的出色团队在\
  \ SQL Server 2019 中为此错误信息添加了表名和列名，那一刻简直是天籁之音，阳光穿透云层。然而，在你将所有实例升级之前，你仍然不得不经历那痛苦的过程，用令人煎熬的方式找出导致截断的代码。\n\
  \n\n##### 隐式转换\n\n微软关于数据类型转换的文档相当详尽，而且非常容易找到。就在他们的 `CAST` 和 `CONVERT` 联机丛书页面上：[`docs.microsoft.com/en-us/sql/t-sql/functions/cast-and-convert-transact-sql?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/t-sql/functions/cast-and-convert-transact-sql%253Fview%253Dsql-server-2017)。\n\
  \n那里有一张很大的图表，会告诉你哪些数据类型可以转换成其他哪些数据类型。图表上有些漂亮的点，指示了**隐式转换**发生的位置。图表很好，但有时非常难以理解。这到底意味着什么？\n\
  \n假设我们有一个整数字段（`int01`），并且需要将 `int01` 中的值与一个 varchar 字段（`varchar01`）进行比较。字段 `varchar01`\
  \ 中包含一些整型值，但当然它们是以 varchars 形式存储的。清单 2-5 用一个代码示例说明了这一点。\n\n```\nDECLARE @sometable\
  \ TABLE (int01 INT);\nDECLARE @othertable TABLE (varchar01 varchar(8));\nINSERT\
  \ INTO @sometable (int01)\nVALUES (1)\n, (10)\n, (23)\n, (47)\n, (56);\nINSERT INTO\
  \ @othertable(varchar01)\nVALUES ('23')\n, ('a89')\n, ('56o')\n, ('e1')\n, ('47');\n\
  SELECT ot.varchar01\nFROM @othertable ot\nWHERE EXISTS (SELECT 1\nFROM @sometable\
  \ st\nWHERE st.int01 = ot.varchar01);\nListing 2-5\n隐式转换示例 第 1 部分\n```\n\n运行清单 2-5\
  \ 中的代码后，我们的 `STATISTICS` 输出显示我们得到了一个转换错误。此错误如清单 2-6 所示。\n\n```\nMsg 245, Level 16,\
  \ State 1, Line 21\nConversion failed when converting the varchar value 'a89' to\
  \ data type int.\nListing 2-6\n来自隐式转换示例 第 1 部分 的转换错误\n```\n\n如果我们改为运行清单 2-7 中的转换示例，我们可以在执行计划中看到转换的证据。（如果你没有打开执行计划，请别忘了切换显示它！）\n\
  \n```\nDECLARE @sometable TABLE (int01 INT);\nDECLARE @othertable TABLE (varchar01\
  \ varchar(8));\nINSERT INTO @sometable (int01)\nVALUES (1)\n, (10)\n, (23)\n, (47)\n\
  , (56);\nINSERT INTO @othertable(varchar01)\nVALUES ('23')\n, ('89')\n, ('56')\n\
  , ('1')\n, ('47');\nSELECT ot.varchar01\nFROM @othertable ot\nWHERE EXISTS (SELECT\
  \ 1\nFROM @sometable st\nWHERE st.int01 = ot.varchar01);\nListing 2-7\n隐式转换示例 第\
  \ 2 部分\n```\n\n一旦我们查看了清单 2-7 代码的执行计划（如图 2-1 所示），我们可以看到几个有趣的事情。\n\n![../images/483961_1_En_2_Chapter/483961_1_En_2_Fig1_HTML.jpg](img/483961_1_En_2_Fig1_HTML.jpg)\n\
  \nFigure 2-1\n隐式转换的证据\n\n在图 2-1 中，我们在 `SELECT` 运算符上看到一个带有感叹号的黄色三角形。如果我们将鼠标悬停在该运算符上，会出现一个弹出窗口，底部有一条警告。`varchar01`\
  \ 列的值被转换为整数，以便与 `int01` 列的值进行比较。让我们重读上一句话并稍加强调：SQL Server 将**隐式转换 `VARCHAR01` 字段中的所有值**——整个表中的每一条记录。\n\
  \n为什么会发生这种情况？答案当然是，我们（这里的“我们”包括 SQL Server）无法知道记录是否与其他记录等价，除非我们能够比较这些值。我们必须进行表扫描或索引扫描，以便首先将\
  \ `varchar01` 字段中的**所有值**转换为整数，这样才能确定它们是否与 `int01` 字段中的值等价。这将导致扫描操作而非查找操作，从而带来扫描操作相应的性能开销。\n\
  \n##### 字段宽度\n\n然后是数据类型宽度。我的意思是，为什么不把所有内容都设成 `nvarchar(max)` 来避免所有可能的截断错误这类事情呢？SQL\
  \ Server 只会为字段中实际的字符数分配存储空间，所以这样应该没问题，对吧？嗯，将字段设置为不正确的数据类型或荒谬宽度的做法，有几个主要问题值得担忧。\n\
  \n一个严重的问题是，人们会滥用设置宽数据类型的做法。你应该将每个字段设置为只包含所需的数据。慎重地使用正确的数据类型和字段宽度，可以避免字段被用作“万能”字段的可能性，人们可以（并且将会）在其中存放各种随机数据。当然，他们随后又会想要在这些随机数据上进行搜索……\n\
  \n另一个问题是，SQL Server 使用一种称为“内存授权”的机制来确定运行查询所需的资源量。虽然 SQL Server 不会在 `nvarchar` 和\
  \ `varchar` 字段中存储“空”字符，但内存授权会假设一行的宽度是该行可能的最大宽度，而不是该行数据的实际宽度。具有宽 `varchar`、`text`\
  \ 和 `image` 数据类型的字段将导致 SQL Server 对内存和 `tempdb` 空间（以及可能你的查询所需的其他资源）的估计变得非常臃肿。然后，你必须等到你的\
  \ SQL Server 能够找到满足这些授权所需的资源后，才能运行你的查询。我希望你和我第一次了解到这种情况时一样，觉得这很可怕……\n\n所有这一切的结果是，数据类型**绝对重要**。当我们在后面讨论表和其他对象时，我们还会更多地涉及数据类型。但在清单\
  \ 2-1 的代码示例中，编写这段代码的人非常仔细地检查了参数和临时对象的数据类型与数据库表的数据类型是否匹配，因此对于这个存储过程，没有数据类型方面的顾虑。\n\
  \n#### 子查询及其位置\n\nSQL Server 现在（在大多数情况下）足够智能，可以将 `SELECT` 语句中的子查询转换为联接（join）。过去，它曾为返回记录集中的每一行运行一次每个子查询。真糟糕！然而，在我见过的很多情况下，会出现一个接一个的子查询，它们从几乎完全相同的表、相同的数据中调用几乎完全相同的信息。（看到了吗？这就是为什么我们想在调用表时捕获过滤数据。）例如，当我们查看前面表格中的\
  \ `@usersDay` 调用时，我们看到有两个聚合都基于相同的过滤条件（`dayofmonth`）。它们都是子查询，如果被查询优化器转换为联接，每个子查询都会被作为一个单独的联接来调用。对同一个表的多次调用，无论是联接中的调用还是子查询中的调用，都是初始重写项目的绝佳目标，因为组合这些调用通常相对简单，并且可以显著减少读取次数。\n\
  \n对于 `SELECT` 语句中的子查询，我们希望考虑将对同一表的调用组合起来，并将它们移动到某种联接中，通常是 `OUTER APPLY`。当它们在 `WHERE`\
  \ 子句中时，我们希望研究如何将这些数据提取出来，并以某种方式将其用作联接，以减少对这些给定表的命中和读取次数。复杂的 `WHERE` 子句在优化器试图生成一个好的查询计划时，会让它“头疼”；尽可能简化这个逻辑将有助于它生成最佳计划。\n\
  \n在清单 2-1 的代码中，唯一的子查询是那些调用 `@usersDay` 并进行一些聚合的子查询。我们将在存储过程的文档中记录这一点。然后，当到了重写代码的时候，我们肯定会考虑合并这些子查询以减少命中次数。是的，即使对于临时表和表变量，我们也想这么做！\n\
  \n\n\n#### 计算\n\n计算过程中可能存在许多容易出错的地方。除零错误、括号导致错误结果，甚至并行度抑制都可能在计算中发现。在 `WHERE` 子句中对列进行计算，就像我们在前面代码清单\
  \ 2-7 示例中关于隐式转换所看到的那样，可能导致全表扫描；如果 `SQL Server` 需要确定某个字段中的值是否等同于根据另一个字段计算出的值，它就必须对每条记录执行计算以判断是否相等。\n\
  \n此存储过程中的大多数计算都非常简单，例如将一或一个整数加到某个列或变量上。简单的计算通常不容易出问题。结尾处有一个除法计算，但有一个检查以避免除零错误。如\
  \ `CASE` 语句所示（在代码清单 2-8 中再次展示），代码在执行计算前会显式检查除数是否不等于零。\n\n```sql\nCASE\nWHEN fo.numPosts\
  \ = 0\nTHEN 0\nELSE CAST(\n(\nSELECT MAX(ud.numPostsAnswered)\nFROM @usersDay ud\n\
  WHERE ud.dayOfMonth = fo.dayOfMonth\n) / fo.numPosts AS DECIMAL(8, 7))\nEND\n```\n\
  \n代码清单 2-8：来自代码清单 2-1 的帖子百分比计算\n\n我们还需要检查此代码调用的所有数据库对象以进行计算，特别是所有表和视图。这看起来有点过分；但有一个很好的理由。任何引用包含使用用户定义标量函数的计算列的表或视图，即使查询中未引用该列，也会导致串行计划。这是一种并行度抑制器。“但你不希望你的查询并行运行，那表明性能不佳！”\n\
  \n这并不完全正确。如果一个查询并行运行，这表明与该查询相关的成本高于并行度成本阈值（`SQL Server` 设置）。他们如何衡量这个成本？嗯，曾经有一个微软开发人员使用的计算机，一堆度量标准都绑定到这个任意的标准上。我和我的团队通常称这些单位为“Mysofts”，这通常向我们表明你可以将它们与其他……“东西”进行比较……但如何比较并不总是很清楚。但我跑题了。\n\
  \n如果你有一个重量级的查询，它完全并行运行是完全可以的。毕竟，你拥有多个 `CPU`，就是为了分散密集型操作的负载。如果一个查询将消耗一定数量的 Mysofts，你希望它并行运行，因为经过的时间会短得多，你的用户也更不容易抱怨。你不希望因为多年前开发人员的某个任意错误而阻止这种情况发生。所以，去检查你的表和视图，确保没有任何计算列使用了标量函数。在代码清单\
  \ 2-1 中我们的代码情况下，没有这样的列。\n\n#### 临时表和/或表变量\n\n我们肯定需要记录我们正在记录的任何代码中出现的临时表和表变量：它们的宽度，我们在过程中对数据或定义进行的更改次数，以及我们认为每个表中会有多少行。更改临时表的定义，即使我们是在添加索引，也可能导致包含该临时表的存储过程重新编译。向临时表或表变量添加大量数据也可能导致包含的存储过程重新编译。\n\
  \n临时表和表变量之间到底有什么区别？主要区别在于临时表具有统计信息以及更广泛的索引支持，而表变量没有统计信息，并且只能以几种特定方式创建索引。我们在第 1 章简要讨论过统计信息；这里我们特指与索引相关的数据点，这些点指示了每个索引值之间的数据分布情况。这就是为什么许多人会推荐对少量数据使用表变量（在我看来，我采用\
  \ 100 行或更少）。其他人对“少量”有不同的定义；你可能需要确定什么最适合你。推荐 100 行或更少的另一个原因是，优化器会假设表变量只有一行（同样，由于缺乏统计信息）。\n\
  \n在代码清单 2-1 的存储过程中，我们既有表变量也有临时表。首先创建临时表 `#finalOutput`，其中最多有 31 行（一个月中的每一天一行）。它主要由\
  \ `smallint` 列组成，尽管它有一个 `nvarchar(40)` 列、一个 `datetime` 列、一个 `decimal` 列和几个 `tinyint`\
  \ 列。这个表相当窄——它只包含几列。\n\n表变量 `@usersDay` 也很窄，但会有更多得多的行——每个在每一天回答问题的用户一行。`@usersDay`\
  \ 中可能有数千行！\n\n这两个对象 `@usersDay` 和 `#finalOutput` 的定义在创建后都不会更改。根据代码，数据将在两者中多次更改。这些更改将一次一行地发生（除了临时表的最后一次更新外，所有的添加和更新都在循环中）。\n\
  \n我们将把代码清单 2-9 中的信息添加到我们为代码清单 2-1 中的代码创建的文档中。\n\n```\n#finalOutput 临时表，窄       \
  \     最大可能行数 -  31\n插入：一次一行\n更新：一次一行（最后一次更新除外）\n@usersDay 表变量，窄          可能行数 -\
  \ 数千\n插入：一次一行\n更新：一次一行\n```\n\n代码清单 2-9：代码清单 2-1 中代码的表变量和临时表文档\n\n\n\n#### 循环与/或游标\n\
  \n清单 2-1 中存储过程的循环使用之处，正是其“闪光”所在；我指的是那种带着邪恶红光的“闪光”。该过程遍历一个月时间跨度内的每一个帖子，然后在此循环内部，又遍历每个回复该帖子的用户。通常，前端开发人员以过程化方式思考。事实上，大多数人都是以过程化方式思考的。“我做这个，然后做那个，再做这个，然后我取下一个，重复同样的事情。”关系型数据库本意是为批处理优化，但训练我们自己以批处理一切的方式思考是困难的，因为生活中真正以这种方式运作的事情少之又少。\n\
  \n随着我们深入探讨重写清单 2-1 中的代码，我们将更深入地讨论与循环相关的顾虑，但就文档记录而言，我们只想确保在看到任何逐行处理的地方都加以记录，比如前面提到的两个循环。你经常会听到\
  \ `RBAR` 这个缩写，用来描述使用逐行处理的代码。`RBAR` 这个缩写由杰夫·莫登（Jeff Moden）创造，代表“逐行痛苦处理”。\n\n关于清单\
  \ 2-1 代码的文档记录，首先我们会了解每月录入的帖子数量，这将指示第一个循环需要处理的记录数。我们使用清单 2-10 中的代码来实现这一点。\n\n```sql\n\
  SELECT COUNT(1) as NumPosts\n, DATEPART(year,CreationDate)\n, DATEPART(m, CreationDate)\n\
  FROM dbo.Posts\nWHERE PostTypeId = 1\nGROUP BY DATEPART(year,CreationDate),DATEPART(m,CreationDate)\n\
  ORDER BY DATEPART(year,CreationDate),DATEPART(m,CreationDate);\n```\n清单 2-10\n用于确定每月录入帖子数量的代码\n\
  \n对于清单 2-1 的文档记录，我们会记录以下内容：1) 有一个 `while` 循环遍历一个月内所有的问题帖子（大约 5 万到 15 万条），以及 2) 有第二个内部\
  \ `while` 循环，用于遍历每个回复帖子的用户（每个帖子大约有两个用户回复）。\n\n#### 公用表表达式\n\n清单 2-1 的代码中没有使用公用表表达式。我们在记录代码时会寻找它们，因为人们并不总是理解，每次引用一个\
  \ `CTE` 时，它都会重新运行 `CTE` 的评估代码。这可能导致后台执行的工作量远超人们的预期。我只在两种情况下使用 `CTE`：一是尝试限制视图结果集时，二是我的代码中需要使用递归时。本书代码中包含的存储过程\
  \ `sp_codeCallsCascade` 和 `sp_codeCalledCascade` 就是使用 `CTE` 进行递归的例子。然而，递归超出了本书的讨论范围。\n\
  \n#### 连接类型\n\n清单 2-1 的代码中使用了标准的连接类型和语法。所谓标准的连接和语法，是指明确声明为 `INNER JOIN` 或 `LEFT\
  \ OUTER JOIN` 或其他常用连接类型的连接。有些过去可接受的连接语法类型，在较新版本的 SQL Server 中会导致编译失败。\n\n此外，对非标准连接理解不深的人可能会使用它们，导致结果集出现意外的后果，而这些后果可能不会被\
  \ `QA` 捕获。\n\n#### LIKE, NOT LIKE, and NOT IN\n\n`IN` 和 `LIKE` 操作符可能被误用并导致性能问题。通常它们各自都有更好的替代方案，这就是为什么我们要在任何重构的代码中记录它们的用法。在清单\
  \ 2-1 的代码中，我们完全没有看到 `LIKE` 或 `NOT LIKE` 的使用，这是好事，因为使用 `LIKE` 或 `NOT LIKE` 会阻止查询使用索引。\n\
  \n在清单 2-1 的代码中也没有使用 `NOT IN`。我们为什么要检查这个操作符的使用？过去，使用 `EXISTS` 和 `NOT EXISTS` 代替 `IN`\
  \ 和 `NOT IN` 有性能优势，但随着时间的推移和 SQL Server 新版本的发布，这种优势已经减弱。然而，`NOT IN` 和 `NOT EXISTS`\
  \ 处理 `NULL` 值的方式不同——如果子查询的源数据包含 `NULL` 值，即使该值实际不存在，`NOT IN` 也会评估为 `FALSE`。`NOT EXISTS`\
  \ 在结果集中处理 `NULL` 时不会有同样的问题；因此我们仍然建议使用 `NOT EXISTS` 而非 `NOT IN`。\n\n#### DISTINCT,\
  \ TOP, and Other Sorting Operations\n\n排序在 SQL Server 中可能代价高昂。许多操作，如 `TOP` 和 `DISTINCT`，都需要进行一些排序，这就是为什么我们在发现它们时希望将其标识出来。`MIN`\
  \ 和 `MAX` 也是排序操作，即使不存在显式的 `ORDER BY` 子句；我们需要对我们要求 `MIN` 或 `MAX` 的字段值进行排序，才能确定哪个是最高或最低值。\n\
  \n对于清单 2-1 代码中的每个循环，我们都在寻找所遍历表的 `MIN(Id)`。在这个案例中，我们看到：\n\n*   在时间跨度内从 `Posts` 表获取\
  \ `MIN(Id)`\n*   基于 `ParentId` 从 `Posts` 表获取 `MIN(OwnerUserId)`\n\n除了这两个 `MIN()`\
  \ 列之外，没有其他操作表明在底层进行了排序。\n\n#### Calls to Other User-Defined SQL Objects\n\n幸运的是，清单\
  \ 2-1 中的存储过程没有调用其他 `SQL` 对象（除了 `dbo.Posts` 表）。我有一个自己写的存储过程，它基于 SQL Server 跟踪的依赖关系，可以告诉你哪些其他对象依赖于你的对象（在大多数情况下，这等同于被此对象调用的对象）。我没有让它跟踪表；它会显示存储过程和函数。我已将这个存储过程包含在本书中；它叫做\
  \ `sp_codeCallsCascade`。它使用系统目录视图来确定依赖关系。\n\n你可以对你的代码使用这个存储过程，以查看你的对象调用了什么代码，然后那些对象又调用了什么对象，……嗯，以此类推。调用方式如清单\
  \ 2-11 所示。\n\n```sql\nEXECUTE sp_codeCallsCascade @codeName='DailySummaryReportPerMonth',\
  \ @rootSchema = 'dbo';\n```\n清单 2-11\n`sp_codeCallsCascade` 的示例调用\n\n\n\n#### WHERE\
  \ 子句中的原生 SQL Server 函数\n\n我们刚刚探讨了用户定义的 SQL 对象（包括函数）的调用。然而，我们还需要审视 WHERE 子句中使用的原生\
  \ SQL Server 函数。这种用法需要格外留意，因为如果函数操作的是表字段（即使是像 `ISNULL` 这样的简单函数），它可能会导致使用该函数的查询无法有效利用索引。这类似于我们讨论过的隐式转换问题：如果要检查两个值是否相等，就必须评估每条记录的值，以确定函数的输出是否与我们要比较的值匹配。\n\
  \n在代码清单 2-1 中，原生 SQL Server 函数出现在两个地方。它们出现在 `@postID` 的初始赋值以及 `@postID` 变量的后续赋值中。该查询针对大约一个月时间范围内的\
  \ 150k 个帖子逐一执行。相关代码如清单 2-12 所示。\n\n```sql\nSET @postID = COALESCE((SELECT MIN(Id)\n\
  FROM dbo.Posts\nWHERE  DATEADD(m, DATEDIFF(m, 0, CreationDate),0) = @monthYear\n\
  AND PostTypeId = 1)\n,0);\n```\n**清单 2-12**\n来自清单 2-1 的 WHERE 子句中的原生 SQL Server\
  \ 函数\n\n如果我们运行类似清单 2-12 的代码来获取执行计划，同时打开 `STATISTICS IO` 和 `TIME`，会发生什么？我们可以很容易地模拟一个测试示例，如清单\
  \ 2-13 所示。\n\n```sql\nDECLARE @monthYear datetime = '20120801'\n, @postID int;\n\
  SET @postID = COALESCE((SELECT MIN(Id)\nFROM dbo.Posts\nWHERE  DATEADD(m, DATEDIFF(m,\
  \ 0, CreationDate),0) = @monthYear\nAND PostTypeId = 1)\n,0);\nSET @postID = COALESCE((SELECT\
  \ MIN(Id)\nFROM dbo.Posts\nWHERE  DATEADD(m, DATEDIFF(m, 0, CreationDate),0) = @monthYear\n\
  AND PostTypeId = 1\nAND Id > @postID)\n,0);\n```\n**清单 2-13**\nWHERE 子句中原生 SQL Server\
  \ 函数的模拟测试示例\n\n我们可以通过查看清单 2-14 的输出来了解 `STATISTICS IO` 和 `TIME` 的情况。\n\n```\nSQL\
  \ Server Execution Times:\nCPU time = 0 ms,  elapsed time = 0 ms.\nSQL Server parse\
  \ and compile time:\nCPU time = 15 ms, elapsed time = 16 ms.\nSQL Server Execution\
  \ Times:\nCPU time = 0 ms,  elapsed time = 0 ms.\nTable 'Posts'. Scan count 2, logical\
  \ reads 4477272, physical reads 8, read-ahead reads 4496246, lob logical reads 0,\
  \ lob physical reads 0, lob read-ahead reads 0.\n(1 row affected)\nSQL Server Execution\
  \ Times:\nCPU time = 43500 ms,  elapsed time = 83520 ms.\nTable 'Posts'. Scan count\
  \ 2, logical reads 12, physical reads 2, read-ahead reads 0, lob logical reads 0,\
  \ lob physical reads 0, lob read-ahead reads 0.\n(1 row affected)\nSQL Server Execution\
  \ Times:\nCPU time = 0 ms,  elapsed time = 3 ms.\nSQL Server parse and compile time:\n\
  CPU time = 0 ms, elapsed time = 0 ms.\nSQL Server Execution Times:\nCPU time = 0\
  \ ms,  elapsed time = 0 ms.\n```\n**清单 2-14**\n运行清单 2-13 后的 STATISTICS IO 和 TIME\
  \ 输出\n\n哎呀！这是一个非常大的读取量，这使得初始调用非常痛苦。我们可以从清单 2-14 中 `Table 'Posts'` 的第一组读取数据中看到这一点；有\
  \ 4,477,272 次逻辑读取和 4,496,256 次预读取。逻辑读取是从内存中访问的页面数。预读取是 SQL Server 尝试猜测需要哪些数据，并将这些数据（如果尚未存在）移入缓冲区缓存的操作。\n\
  \n我们必须读取每条记录的数据，以确定应用了 `DATEADD/DATEDIFF` 函数后的 `CreationDate` 是否等于 `@monthYear`\
  \ 变量！由于 `Id` 过滤器（我们规定 `Id` 必须大于当前的 `@postID` 值），后续每次对 `Posts` 表的调用都会明显减轻痛苦。在清单 2-14\
  \ 的第二行 `Table 'Posts'` 中，我们只看到 12 次逻辑读取，没有预读取。\n\n当我们查看清单 2-14 代码的执行计划时，我们看到第一个查询有粗大的箭头线，而第二组查询的箭头线则合理得多。“粗大线条”指的是我们在计划右侧的聚集索引扫描运算符上看到的非常粗的箭头，这些箭头指向\
  \ TOP 运算符。第二个查询可以将 `Id` 用作寻求谓词（我们让 SQL Server 知道我们只想要大于当前 `@postID` 的 `Ids`）。这使得\
  \ SQL Server 可以使用索引寻道（Index Seek）而不是索引扫描（Index Scan）（请看每个计划的最右侧；上方计划显示了两个聚集索引扫描，而下方计划显示了两个聚集索引寻道）。\n\
  \n![../images/483961_1_En_2_Chapter/483961_1_En_2_Fig2_HTML.jpg](img/483961_1_En_2_Fig2_HTML.jpg)\n\
  \n**图 2-2**\n清单 2-14 中填充 @postID 的查询的执行计划\n\n这里的重要信息是，在 WHERE 子句中针对列值使用任何类型的标量函数（无论是用户定义的还是\
  \ SQL Server 原生的）时都要小心！\n\n## 索引\n\n一旦我们记录了编码反模式，我们就应该寻找适用于相关查询的索引。我们是否有正确的索引？我们将使用执行计划来查看这些索引是否正在被我们正在检查的查询使用。如果没有，为什么？某些操作将不允许使用索引，其中一些我们已经在本章中讨论过。\n\
  \n#### 回到运行时数据\n\n在将来自清单 2-1 的代码分解并开始查看其各个部分之前，我们无法在文档中对索引做太多处理。由于存在循环，要获得 `STATISTICS\
  \ IO` 和 `TIME` 的聚合数据，或者获得一个稍微可读的执行计划，都是非常困难的。当我们进入重写阶段并开始提取运行时数据时，我们将能够像在清单 2-14\
  \ 中那样更好地评估索引的使用情况。\n\n### 总结\n\n#### 整理我们的文档\n\n当我们完成时，我们应该得到一份包含有价值信息的文档，这将有助于我们重写\
  \ SQL 对象。我们为清单 2-1 的代码整理的文档相当简单；问题很少，尽管存在的问题都相当大。清单 2-1 完整文档的示例如下。\n\n## DailySummaryReportPerMonth:\
  \ 文档\n\n### 截至 2019.06.02 的代码\n\n\n\n### SQL 存储过程文档：每日月度汇总报告\n\n#### 存储过程代码\n\n\
  ```sql\nIF NOT EXISTS\n(\nSELECT 1\nFROM sys.procedures\nWHERE name = 'DailySummaryReportPerMonth'\n\
  )\nBEGIN\nDECLARE @SQL NVARCHAR(1200);\nSET @sQL = N'/*************************************************************************\
  \    2019.05.26    LBohm            INITIAL STORED PROC STUB CREATE RELEASE\n**************************************************************************/\n\
  CREATE PROCEDURE dbo.DailySummaryReportPerMonth\nAS\nSET NOCOUNT ON;\nBEGIN\nSELECT\
  \ 1;\nEND;';\nEXECUTE SP_EXECUTESQL @SQL;\nEND;\nGO\n/**************************************************************************\n\
  Description: Data for daily report for a month\n--Test call:\n-- EXECUTE dbo.DailySummaryReportPerMonth\
  \ @monthYear = '20180801';\n2019.05.26     LBohm          INITIAL RELEASE\n**************************************************************************/\n\
  ALTER PROCEDURE [dbo].[DailySummaryReportPerMonth] @monthYear DATETIME\nAS\n/* in\
  \ case the first day of the month not passed in */\nSET @monthYear = DATEADD(month,\
  \ DATEDIFF(month, 0, @monthYear), 0);\nDECLARE @postID           INT\n, @dayOfMonth\
