  \ --- | --- |\n| 1010297 | 25 | 14 |\n| 1639596 | 1 | 3 |\n| 2179513 | 5 | 3 |\n\
  | 2491405 | 1 | 3 |\n| 2549795 | 31 | 3 |\n\n```sql\nDECLARE @theTable TABLE (id\
  \ int);\nINSERT INTO @theTable (id)\nVALUES (1010297)\n, (1639596)\n, (2179513)\n\
  , (2491405)\n, (2549795);\nSELECT tb.id\n, u.Reputation\n, u.DownVotes\nFROM @theTable\
  \ tb\nINNER JOIN dbo.Users u ON tb.id = u.Id;\n清单 5-9\n查看多个用户的 DownVotes 和 Reputation\n\
  ```\n\n表 5-8 展示了五个用户的数据。如果我们为每个人的 `DownVotes` 增加 1，那么 Id 为 1010297 的用户的 `Reputation`\
  \ 应该减少 1，但其他人不应该减少（他们每人只有四个 `DownVotes`）。让我们使用清单 5-10 中的代码来看一下。\n\n```sql\nDECLARE\
  \ @theTable TABLE (id int);\nINSERT INTO @theTable (id)\nVALUES (1010297)\n, (1639596)\n\
  , (2179513)\n, (2491405)\n, (2549795);\nSELECT tb.id\n, u.Reputation\n, u.DownVotes\n\
  FROM @theTable tb\nINNER JOIN dbo.Users u ON tb.id = u.Id;\nUPDATE u\nSET DownVotes\
  \ = u.DownVotes + 1\nFROM dbo.Users u\nINNER JOIN @theTable tb ON u.Id = tb.id;\n\
  SELECT tb.id\n, u.Reputation\n, u.DownVotes\nFROM @theTable tb\nINNER JOIN dbo.Users\
  \ u ON tb.id = u.Id;\n清单 5-10\n更新多个用户的 DownVotes\n```\n\n我们在表 5-8 中看到了更新前的结果。更新后的结果如表\
  \ 5-9 所示。\n\n表 5-9\n\n清单 5-10 代码的运行结果\n\n| Id | Reputation | DownVotes |\n| ---\
  \ | --- | --- |\n| 1010297 | 24 | 15 |\n| 1639596 | 0 | 4 |\n| 2179513 | 4 | 4 |\n\
  | 2491405 | 0 | 4 |\n| 2549795 | 30 | 4 |\n\n哦，不！这些人的 `Reputation` 都被减少了。当我们查看清单\
  \ 5-1 中的 `EXISTS` 语句时，我们检查是否存在一条记录，其 `DownVotes` 能被 5 整除。然而，在实际的更新语句中，我们并没有检查相同的条件！如果我们使用清单\
  \ 5-5 中的代码查看 `Triggerlog` 表，我们也会看到这些用户的每一条记录都在触发器中运行了。\n\n如果我们使用清单 5-11 中的代码，修改清单\
  \ 5-1 触发器中的更新语句，那么我们应该只更新 `EXISTS` 语句找到的相同记录，我们的结果应该会好很多。\n\n```sql\nUPDATE u\n\
  SET u.Reputation = u.Reputation - 1\nFROM dbo.Users u\nINNER JOIN INSERTED i ON\
  \ u.Id = i.Id\nWHERE i.Reputation > 0\nAND i.DownVotes > 0\nAND i.DownVotes % 5\
  \ = 0;\n清单 5-11\n测试 DownVotes 是否能被 5 整除的新更新语句\n```\n\n在我们用清单 5-11 中的代码修改清单 5-1 中的代码并进行测试之前，我们应该使用清单\
  \ 5-12 中的代码恢复用户的 `Reputation` 分值。\n\n```sql\nDECLARE @theTable TABLE (id int, Reputation\
  \ int, DownVotes int);\nINSERT INTO @theTable (id, Reputation, DownVotes)\nVALUES\
  \ (1010297, 25, 14)\n, (1639596, 1, 3)\n, (2179513, 5, 3)\n, (2491405, 1, 3)\n,\
  \ (2549795, 31, 3);\nUPDATE u\nSET Reputation = tb.Reputation\n, DownVotes = tb.DownVotes\n\
  FROM dbo.Users u\nINNER JOIN @theTable tb ON u.Id = tb.id;\n清单 5-12\n恢复多个用户的 Reputation\
  \ 分值\n```\n\n接下来，我们将用清单 5-11 中的 `UPDATE` 语句替换清单 5-1 触发器中的 `UPDATE` 语句，并运行 `ALTER`\
  \ 语句。然后我们将重新运行清单 5-10 中的代码，看看当我们更新这五个用户的 `DownVotes` 时会发生什么。更新前的结果应该与最初显示在表 5-8\
  \ 中的结果相同。我们更新后的结果与之前不同，显示在表 5-10 中。\n\n表 5-10\n\n一次性更新多个用户 DownVotes 后的结果\n\n| Id\
  \ | Reputation | DownVotes |\n| --- | --- | --- |\n| 1010297 | 24 | 15 |\n| 1639596\
  \ | 1 | 4 |\n| 2179513 | 5 | 4 |\n| 2491405 | 1 | 4 |\n| 2549795 | 31 | 4 |\n\n\
  呼！一切都正常了。表 5-10 显示只有用户 1010297 的 `Reputation` 减少了，这正是我们想要的结果。但真的完全没问题了吗？让我们看一个我们不改变\
  \ `DownVotes` 数值的场景。首先请运行清单 5-12 中的代码，将我们的用户值重置回起始值。没有改变 `DownVotes` 值的代码如清单 5-13\
  \ 所示。\n\n\n\n### 检测值是否发生变化\n\n```\nDECLARE @theTable TABLE (id int);\nINSERT INTO\
  \ @theTable (id)\nVALUES (1010297)\n, (1639596)\n, (22)\n, (123);\nSELECT tb.id\n\
  , u.Reputation\n, u.DownVotes\n, u.UpVotes\nFROM @theTable tb\nINNER JOIN dbo.Users\
  \ u ON tb.id = u.Id;\nUPDATE u\nSET UpVotes = u.UpVotes + 1\n, DownVotes = u.DownVotes\n\
  FROM dbo.Users u\nINNER JOIN @theTable tb ON u.Id = tb.id;\nSELECT tb.id\n, u.Reputation\n\
  , u.DownVotes\n, u.UpVotes\nFROM @theTable tb\nINNER JOIN dbo.Users u ON tb.id =\
  \ u.Id;\n代码清单 5-13\n增加四个用户的升票数\n```\n\n代码清单 5-13 中查询语句执行前的结果如表 5-11 所示。我们看到有两个用户的\
  \ `DownVotes` 能被 5 整除，而另外两个则不能。不过，这应该无关紧要，因为我们反正没有修改 `DownVotes`，对吧？修改后的结果如表 5-12\
  \ 所示。\n\n表 5-12\n代码清单 5-13 中代码执行后的结果\n\n| id | Reputation | DownVotes | UpVotes\
  \ |\n| --- | --- | --- | --- |\n| 1010297 | 25 | 14 | 162 |\n| 1639596 | 1 | 3 |\
  \ 12 |\n| 22 | 12815 | 5 | 203 |\n| 123 | 29211 | 40 | 420 |\n\n表 5-11\n代码清单 5-13\
  \ 中代码执行前的结果\n\n| Id | Reputation | DownVotes | UpVotes |\n| --- | --- | --- | ---\
  \ |\n| 1010297 | 25 | 14 | 161 |\n| 1639596 | 1 | 3 | 11 |\n| 22 | 12816 | 5 | 202\
  \ |\n| 123 | 29212 | 40 | 419 |\n\n表 5-12 向我们揭示了另一个问题！最后两条记录的 `Reputation` 被减少了，但我们并没有更改\
  \ `DownVotes`。我们是在检查 `DownVotes` 是否被修改了吗？嗯，不，我们没有。我们只是检查它们是否能被 5 整除且大于零。不过，对于触发器，有一个\
  \ `UPDATE()` 函数可以用来确定这一点，对吧？首先，让我们用代码清单 5-14 中的代码来恢复用户数据。\n\n```\nDECLARE @theTable\
  \ TABLE (id int, upvotes int, Reputation int);\nINSERT INTO @theTable (id, upvotes,\
  \ Reputation)\nVALUES (1010297, 161, 25)\n, (1639596,11,1)\n, (22,203,12815)\n,\
  \ (123,420,29211);\nUPDATE u\nSET u.Reputation = t.Reputation\n, u.UpVotes = t.upvotes\n\
  FROM dbo.Users u\nINNER JOIN @theTable t ON u.Id = t.id;\n代码清单 5-14\n为四个用户恢复数据\n\
  ```\n\n然后我们想添加 `UPDATE()` 函数来检查 `DownVotes` 是否被更新了。如果 `DownVotes` 没有被更新，只是碰巧能被 5\
  \ 整除，这应该能解决用户 `Reputation` 被减少的问题。我们可以在代码清单 5-15 中看到 `UPDATE` 函数的语法。\n\n```\nIF\
  \ EXISTS (SELECT 1 FROM INSERTED i WHERE i.DownVotes > 0\nAND i.DownVotes % 5 =\
  \ 0\nAND i.Reputation > 0\nAND UPDATE(DownVotes))\nBEGIN\nUPDATE u\nSET u.Reputation\
  \ = u.Reputation - 1\nFROM dbo.Users u\nINNER JOIN INSERTED i ON u.Id = i.Id\nWHERE\
  \ i.Reputation > 0\nAND i.DownVotes > 0\nAND i.DownVotes % 5 = 0\nAND UPDATE(DownVotes);\n\
  代码清单 5-15\n需添加到代码清单 5-1 触发器中的 UPDATE 函数检查\n```\n\n一旦我们将这段代码放入代码清单 5-1 的触发器中，我们就可以重新运行代码清单\
  \ 5-13 的代码。查看结果时，我们发现无论是修改前的还是修改后的 `SELECT` 语句，结果都完全一样！修改后的结果集与我们表 5-12 中看到的一样，显示最后两个用户的\
  \ `Reputation` 再次被减少了，尽管我们添加了 `UPDATE()` 语句。这是怎么回事？\n\n嗯，在我们的 `UPDATE` 语句中，从技术上讲，我们更新了该值，尽管我们并没有\
  \ *改变* 它的值。这是一个人们经常忽视的重大“陷阱”。如果值是否真的改变很重要（我猜如果你把它放在触发器里，那它就是重要），我们需要检查值是否真的改变了。我们可以通过检查\
  \ `INSERTED` 和 `DELETED` 表中的值是否不同来实现。但这也是一个 `INSERT` 和 `UPDATE` 触发器，所以可能并非每条记录都有一个\
  \ `DELETED` 值——那个值可能是 `NULL`。我们该怎么做？实际上我们可以做得很优雅，这要感谢 Itzik Ben-Gan 教给了我代码清单 5-16\
  \ 中展示的技术，它避免了通常用于空值处理的许多 `CASE` 语句，同时仍然能处理 `NULL` 与指定值不同的情况。\n\n```\nIF EXISTS (SELECT\
  \ 1 FROM INSERTED i WHERE i.DownVotes > 0\nAND i.DownVotes % 5 = 0\nAND i.Reputation\
  \ > 0\nAND EXISTS (SELECT i.DownVotes EXCEPT SELECT d.DownVotes FROM DELETED d WHERE\
  \ i.Id = d.Id) )\nBEGIN\nUPDATE u\nSET u.Reputation = u.Reputation - 1\nFROM dbo.Users\
  \ u\nINNER JOIN INSERTED i ON u.Id = i.Id\nWHERE i.Reputation > 0\nAND i.DownVotes\
  \ > 0\nAND i.DownVotes % 5 = 0\nAND EXISTS (SELECT i.DownVotes EXCEPT SELECT d.DownVotes\
  \ FROM DELETED d WHERE i.Id = d.Id) ;\n代码清单 5-16\n测试 INSERTED 和 DELETED 表中的值是否不同\n\
  ```\n\n代码清单 5-16 中的代码，当用于代码清单 5-1 的触发器中时，将找到所有在 `INSERTED` 表和 `DELETED` 表的 `DownVotes`\
  \ 字段不匹配的记录。它不会去评估 `NULL`，但它以一种方式处理 `NULL`，使得 `NULL` 不被视为匹配集合的一部分，因此我们既能得到 `INSERT`\
  \ 语句的记录，也能得到不匹配的 `UPDATE` 语句的记录。我们这里不进行测试，但如果我们插入一条用户记录，其 `DownVotes` 是 5 的倍数，这将在\
  \ `INSERT` 操作时将 `Reputation` 减少 1。让我们用代码清单 5-14 中的代码将这些人的声誉点数恢复，然后重新运行代码清单 5-13\
  \ 的测试。\n\n修改前的结果与我们表 5-11 中看到的一样，但我们修改后的结果看起来好多了，`Reputation` 没有被修改，如表 5-13 所示。\n\
  \n表 5-13\n使用 INSERTED/DELETED 差异检查修改四个用户后的结果\n\n| Id | Reputation | DownVotes |\
  \ upvotes |\n| --- | --- | --- | --- |\n| 1010297 | 25 | 14 | 204 |\n| 1639596 |\
  \ 1 | 3 | 421 |\n| 22 | 12816 | 5 | 163 |\n| 123 | 29212 | 40 | 13 |\n\n我们最终修订后的触发器在代码清单\
  \ 5-17 中展示，包含了本章我们所做的所有修改。\n\n\n\n```\nIF NOT EXISTS\n(SELECT 1 FROM sys.triggers\n\
  WHERE name = 'iu_Users_DownVotes'\n)\nBEGIN\nDECLARE @SQL nvarchar(1200);\nSET @SQL\
  \ = N'/**************************************************************************\n\
  2019.06.30   LBohm                 初始触发器存根创建发布\n**************************************************************************/\n\
  CREATE TRIGGER dbo.iu_Users_DownVotes ON dbo.Users\nFOR INSERT,UPDATE\nAS\nBEGIN\n\
  SET NOCOUNT ON;\nIF NOT EXISTS (SELECT 1 FROM INSERTED)\nRETURN;\nEND;';\nEXECUTE\
  \ SP_EXECUTESQL @SQL;\nEND;\nGO\n/**************************************************************************\n\
  对象描述：在收到 5 次反对票后降低用户声望值。\n修订历史：\n日期         姓名             标签/PTS    描述\n-----------\
  \  ---------------  ----------  -------------------------------\n2019.06.30   LBohm\
  \                          初始发布\n**************************************************************************/\n\
  ALTER TRIGGER [dbo].[iu_Users_DownVotes] ON [dbo].[Users]\nFOR INSERT,UPDATE\nAS\n\
  BEGIN\nSET NOCOUNT ON;\nIF ((SELECT TRIGGER_NESTLEVEL(OBJECT_ID('iu_Users_DownVotes'),'AFTER','DML'))\
  \ > 1)\nBEGIN\nRETURN;\nEND;\n-- 如果反对票计数除以 5 余数为零，则从声望值中减去 1\nIF EXISTS (SELECT\
  \ 1 FROM INSERTED i WHERE i.DownVotes > 0\nAND i.DownVotes % 5 = 0\nAND i.Reputation\
  \ > 0\nAND EXISTS (SELECT i.DownVotes EXCEPT SELECT d.DownVotes FROM DELETED d WHERE\
  \ i.Id = d.Id) )\nBEGIN\nUPDATE u\nSET u.Reputation = u.Reputation - 1\nFROM dbo.Users\
  \ u\nINNER JOIN INSERTED i ON u.Id = i.Id\nWHERE i.Reputation > 0\nAND i.DownVotes\
  \ > 0\nAND i.DownVotes % 5 = 0\nAND EXISTS (SELECT i.DownVotes EXCEPT\nSELECT d.DownVotes\n\
  FROM DELETED d\nWHERE i.Id = d.Id) ;\nINSERT INTO dbo.Triggerlog (id, thisDate,\
  \ thisAction, descript)\nSELECT i.Id\n, getdate()\n, '用户反对票触发器已运行'\n, 'DownVotes:\
  \ ' + CAST(DownVotes as nvarchar(12)) + '; Reputation: ' + CAST(Reputation as nvarchar(12))\n\
  FROM INSERTED i\nWHERE i.Reputation > 0;\nEND;\nEND;\nGO\n```\n#### 代码清单 5-17 最终修订版\
  \ iu_Users_DownVotes 触发器\n\n### 限制数据库必须完成的工作\n\n您可能会问，为什么触发器中要有 `IF EXISTS` 语句，因为我们只是针对真正需要更新的记录运行更新。即使没有更新任何行，UPDATE\
  \ 语句仍然可能触发。我们的原则是**最小化数据库的工作量**，因此这类检查非常重要。\n\n让我们看看 `LinkTypes` 表。它上面有两个几乎不执行任何操作的触发器，这些触发器的名称清楚地说明了它们的功能（或没有功能）。在代码清单\
  \ 5-18 所示的触发器中，`INSERT` 触发器包含一个 `UPDATE` 语句，该语句仅在记录满足 `WHERE 1 = 0` 条件时运行。\n\n```\n\
  IF NOT EXISTS\n(SELECT 1 FROM sys.triggers\nWHERE name = 'i_LinkTypes_doNothing'\n\
  )\nBEGIN\nDECLARE @SQL nvarchar(1200);\nSET @SQL = N'/**************************************************************************\n\
  2019.06.30   LBohm                  初始触发器存根创建发布\n**************************************************************************/\n\
  CREATE TRIGGER dbo.i_LinkTypes_doNothing ON dbo.LinkTypes\nFOR INSERT\nAS\nBEGIN\n\
  SET NOCOUNT ON;\nIF NOT EXISTS (SELECT 1 FROM INSERTED)\nRETURN;\nEND;';\nEXECUTE\
  \ SP_EXECUTESQL @SQL;\nEND;\nGO\n/**************************************************************************\n\
  对象描述：不执行任何操作。\n修订历史：\n日期         姓名             标签/PTS    描述\n-----------  ---------------\
  \  ----------  -------------------------------\n2019.06.30   LBohm             \
  \            初始发布\n**************************************************************************/\n\
  ALTER TRIGGER [dbo].[i_LinkTypes_doNothing] ON [dbo].[LinkTypes]\nFOR INSERT\nAS\n\
  BEGIN\nSET NOCOUNT ON;\nUPDATE lt\nSET lt.[type] = lt.[Type]\nFROM dbo.linkTypes\
  \ lt\nINNER JOIN INSERTED i ON lt.Id = i.Id\nWHERE 1 = 0;\nINSERT INTO dbo.Triggerlog\
  \ (id, thisDate, thisAction, descript)\nVALUES (0\n, getdate()\n, 'LT 插入无操作触发器已运行'\n\
  , \"\n)\nEND;\nGO\n```\n#### 代码清单 5-18 i_LinkTypes_doNothing 的创建语句\n\n代码清单 5-18\
  \ 中的触发器真正要做的，仅仅是在运行时向 `Triggerlog` 表插入一条记录。现在，为了证明 `UPDATE` 语句确实会运行（即使实际上没有更新任何数据），我们还有一个同样什么都不做的\
  \ `UPDATE` 触发器——嗯，除了也向 `Triggerlog` 表插入一条记录。我们可以在代码清单 5-19 中看到这个触发器的代码。\n\n```\n\
  IF NOT EXISTS (SELECT 1 FROM sys.triggers\nWHERE name = 'u_LinkTypes_doNothing'\n\
  )\nBEGIN\nDECLARE @SQL nvarchar(1200);\nSET @SQL = N'/*************************************************************\n\
  2019.06.30   LBohm                  初始触发器存根创建发布\n**************************************************************************/\n\
  CREATE TRIGGER dbo.u_LinkTypes_doNothing ON dbo.LinkTypes\nFOR UPDATE\nAS\nBEGIN\n\
  SET NOCOUNT ON;\nIF NOT EXISTS (SELECT 1 FROM INSERTED)\nRETURN;\nEND;';\nEXECUTE\
  \ SP_EXECUTESQL @SQL;\nEND;\nGO\n/**************************************************************************\n\
  对象描述：不执行任何操作。\n修订历史：\n日期         姓名             标签/PTS    描述\n-----------  ---------------\
  \  ----------  -------------------------------\n2019.06.30   LBohm             \
  \            初始发布\n**************************************************************************/\n\
  ALTER TRIGGER [dbo].[u_LinkTypes_doNothing] ON [dbo].[LinkTypes]\nFOR UPDATE\nAS\n\
  BEGIN\nSET NOCOUNT ON;\nINSERT INTO dbo.Triggerlog (id, thisDate, thisAction, descript)\n\
  VALUES (0\n, getdate()\n, 'LT 更新无操作触发器已运行'\n, \"\n)\nEND;\nGO\n```\n#### 代码清单 5-19\
  \ u_LinkTypes_doNothing 触发器的创建语句\n\n\n我们向 `LinkTypes` 表运行一个简单的插入语句，如代码清单 5-20 所示。然后，我们将使用代码清单\
  \ 5-5 中的代码检查 `Triggerlog` 表。执行此操作后，我们看到 `Triggerlog` 表中有两条记录，如表 5-14 所示。\n\n**表\
  \ 5-14**\n插入 LinkTypes 表后，Triggerlog 表中的结果\n\n| id | thisDate | thisAction | descript\
  \ |\n| --- | --- | --- | --- |\n| 0 | 2019-06-30 9:27:24 | LT Update do-nothing\
  \ Trigger Ran |   |\n| 0 | 2019-06-30 9:27:24 | LT Insert Do Nothing Trigger Ran\
  \ |   |\n\n```\nINSERT INTO linkTypes (Type)\nVALUES ('TTest');\nListing 5-20\n\
  对 LinkTypes 表的简单插入\n```\n\n关于表 5-14 中的结果，有几点需要注意。`UPDATE` 触发器实际上在 `INSERT` 触发器插入其记录之前就插入了记录。这是因为\
  \ `UPDATE` 语句是在 `INSERT` 触发器内部运行的，因此当 `UPDATE` 语句运行时，`INSERT` 触发器尚未完成。由一次调用引起的所有内部触发器，都将在引发这些内部触发器被调用的外部触发器完成之前结束。流程示意图如图\
  \ 5-1 所示。在我们使用代码清单 5-20 中代码的情况下，向 `Triggerlog` 的 `INSERT` 语句仅在所有由 `UPDATE` 语句引发的触发器（本例中为一个）完成之后才触发。此外，我们实际上并没有更新任何内容，但\
  \ `UPDATE` 语句仍然运行并触发了 `UPDATE` 触发器。\n\n![../images/483961_1_En_5_Chapter/483961_1_En_5_Fig1_HTML.png](img/483961_1_En_5_Fig1_HTML.png)\n\
  \n**图 5-1**\n在 LinkTypes 表上插入操作引发的触发器流程\n\n想象一个庞大、复杂的数据库，每个表上都有多个触发器。（我知道，这听起来像是一部糟糕的\
  \ 1980 年代恐怖片，但请耐心听我说。）任何时候你修改任何表中的数据，都可能引发一连串非常令人不快的操作，导致真正的触发器风暴。\n\n如果我们继续推演这个故事，会再次遇到某些触发器更新表的情况，这可能引发新一轮的更新触发器……如此反复……等等。我相信你明白我要表达的意思了。你也无法指定哪些触发器按何种顺序触发。对于任何表上的触发器，你可以指定一个第一个触发器和一个最后一个触发器，但除此之外，你无法决定它们的执行顺序。\n\
  \n如果这还不够糟糕的话，那么如果任何一个触发器中的任何代码执行失败，所有操作都将回滚。你不仅首先承担了运行所有这些触发器的性能开销，随后还可能因为它们全部回滚而承受额外的性能开销。这可能会使任何保存操作花费非常、非常长的时间。\n\
  \n### 总结\n我们在本章学到的一个与触发器无直接关系的重要教训是测试不同场景的重要性。测试简单情况下你编写的代码功能正常，这既容易又显而易见。但测试所有边缘情况以确保你不会无意中引入问题，则不那么明显。请务必彻底编写测试用例，并确保代码通过所有这些测试！\n\
  \n就触发器而言，在几乎所有情况下，都有一种方法可以实现你想要的功能而无需使用触发器。使用触发器会引入潜在的性能问题，这些问题可能难以发现和排查。坚决说不！诊断性触发器可以使用，但我也建议硬编码一个时间限制，使它们在一个月后（或其他合理的时间框架，取决于你的应用程序）不再触发。\n\
  \n如果你拥有数据访问层和非规范化表，你可以使用数据访问层将数据更改传播到所有需要这些更改的表中。否则，业务逻辑确实应该由应用程序处理，而不是在数据库中处理。\n\
  \n但是，如果你不得不使用触发器，请确保你检查它们是否符合以下所有条件：\n1.  它们只在真正需要时才执行工作。\n2.  它们能正确处理同一条语句中更新、插入或删除多条记录的情况。\n\
  3.  递归触发已被正确处理（注意你的数据库级别设置和触发器级别设置）。\n\n## 6. 存储过程\n在第 2 章中，我们记录了一个用于为报表调用数据的存储过程。该过程名为\
  \ `dailySummaryReportByMonth`。让我们回顾一下第 2 章的文档；然后我们可以开始重写这个存储过程。当我们查看数据调用时，发现有六次调用\
  \ `dbo.Posts` 表。我们很有可能可以减少对该表的调用次数。该过程还同时使用了一个临时表和一个表变量。\n\n### 临时表 vs. 表变量\n关于使用表变量还是临时表存在很多争论。临时表在存储过程中可能导致过度的重新编译，这引发了一些担忧。在后续版本的\
  \ SQL Server 中，对临时表的更好处理消除了一些担忧，但有些问题依然存在。例如，临时表一旦创建，就不应更改其架构，即使是添加索引也不行。请在创建语句中一并添加索引。同样，临时表不应有命名约束。Paul\
  \ White 有一篇非常好的文章 ([`https://sqlperformance.com/2017/05/sql-performance/sql-server-temporary-object-caching`](https://sqlperformance.com/2017/05/sql-performance/sql-server-temporary-object-caching))，详细讨论了与架构更改和命名约束相关的问题。\n\
  \n另外，请注意向临时表添加或从中删除大量数据；这应该会引起重新编译，就像从常规表中添加或删除大量数据会导致统计信息更新，进而引起调用这些表的存储过程重新编译一样。这里有一些关于重新编译的更多信息：\
  \ [`www.mssqltips.com/sqlservertip/5308/understanding-sql-server-recompilations/`](http://www.mssqltips.com/sqlservertip/5308/understanding-sql-server-recompilations/)。\n\
  \n此外，一段时间以来，人们常说临时表存储在 tempdb 中，而表变量则不是，但这并不完全正确。两种结构都会存储在内存中，直到它们变得太大；然后都可能被写入磁盘。那么临时表与表变量的真正考虑因素是什么？嗯，表变量在可以创建的索引类型上是有限制的。此外，临时表有统计信息，而表变量没有。这可能会对它们的性能产生重大影响，具体取决于创建了哪种执行计划。因为优化器无法确定表变量的行数估计，我发现只在非常小的表（通常为\
  \ 100 行或更少，通常更少）且数据在插入后变化不大的情况下使用它们是合理的。这是个人选择，但我发现作为一个通用规则，它效果相当好。\n\n请注意，任何“通用规则”都意味着这些规则可能存在例外。在任何重新编码时，尝试尽可能多的不同组合总是最稳妥的做法，因为不能保证某个解决方案在每种独特情况下都是最优的。如果你曾问过\
  \ DBA 一个问题，请预期他们会回答“视情况而定”，因为在几乎所有情况下，事实确实如此。\n\n\n#### 临时表\n\n那么，我们来简单谈谈临时表。如果需要针对某个键列进行连接（join）操作，我通常会在定义临时表时，将该列设置为主键/聚集索引组合。我通常倾向于不添加非聚集索引。如果能通过编写更多、更小的代码片段，甚至是每次执行较少工作的存储过程来避免这一点，那是我的首选，但有时这并不可行。当遇到难以轻松拆分工作的代码时，我通常会尝试几种不同的重写排列组合，以找出每种情况下的最佳解决方案。\n\
  \n#### 表变量\n\n在这里，`@usersDay` 表变量将为每个在特定日期对帖子做出响应的用户存储一条记录。这个表中的记录数将远远超过 100 条。这立即表明我们需要将其更改为临时表——如果我们最终确实需要它的话。一个需要了解的重要情况是，应用程序的其余部分如何影响\
  \ `tempdb`。该应用程序通常是对 `tempdb` 的重度用户，还是使用较轻？如果你的应用程序代码已经大量占用 `tempdb`，你可能需要警惕增加更多临时结构，这会加大\
  \ `tempdb` 的压力。\n\n### 循环\n\n我们在文档中看到两个循环。外层循环以 RBAR（逐行痛苦处理）方式处理某一天的每个帖子。内层循环以类似方式处理响应了该帖子的每个用户。这将成为你许多问题的根源。正如我们在第\
  \ 2 章讨论的，SQL Server 旨在以批处理或分组方式处理数据，而不是以线性方式。同样如我们在第 2 章所讨论的，人们以线性方式思考。我们完成一个任务（向表添加一行）。然后执行另一个任务（修改该记录的一个值）。\n\
  \n许多前端开发人员被迫采用过程化的思维方式，因为许多应用程序也是以这种方式工作的。用户查看小的数据记录组，但通常一次只与单条记录交互。遗留代码或对 SQL Server\
  \ 引擎不太熟悉的人编写的代码通常包含大量游标和循环。你能为性能做的最好的事情就是让它们“远远（**FAR**）离开”。\n\n由于存在循环，获取性能数据变得极其困难。每次循环运行时，`STATISTICS\
  \ IO` 和 `STATISTICS TIME` 都会输出一个独立的部分。每个循环中的每个查询也会有一个独立的 `执行计划`。这使得定位慢点变得困难。对于这样的代码，最好的办法是完全重写这个存储过程。\n\
  \n### 功能审查\n\n这段代码执行了哪些功能？我们将某天的帖子数增加 1。我们查看该用户是否是某个特定帖子的被接受答案者。我们还将触达该特定帖子的用户计数增加\
  \ 1。我们获取该特定用户针对此帖子的分数，并使用其中部分信息更新临时表 `#finalOutput`。然后，如果 `@usersDay` 表中不存在对应记录，我们就添加一条；如果存在，则更新该记录。而且我们为每一个帖子都在做所有这些事情。**真糟糕！**\n\
  \n### 从最简单的数据开始\n\n当我重写代码时，我尝试从收集数据的基本构建块开始。这是我将需要用来获得所需输出的数据。我将从最简单的查询数据开始，然后逐层增加复杂性，直到获得所需的结果。对于\
  \ `dailySummaryReportByMonth` 存储过程，我们实际需要的数据如下：\n\n1.  某天的帖子数量\n2.  响应了该天发布的任何帖子的用户数量\n\
  3.  对该天发布的单个帖子响应的最高用户数\n4.  该天对帖子响应次数最多的用户\n5.  一个用户响应的帖子数量\n6.  其中被标记为接受答案的数量\n\
  7.  该天的最高赞成票数\n\n因此，我们首先为在期望时间范围内创建的每个帖子（问题是 `PostTypeId = 1`）进行初始选择。我们现在将输出限制为少量（单日），这将使初始比较更容易。我们可以使用清单\
  \ 6-1 中的代码开始复制存储过程的输出。\n\n```\nSELECT CAST(p.CreationDate AS DATE) AS createDate\n\
  , p.Id\nFROM dbo.Posts p\nWHERE p.CreationDate >= '20120801'\nAND p.CreationDate\
  \ < '20120802'\nAND p.PostTypeId = 1;\n清单 6-1\n单日的响应帖子\n```\n\n清单 6-1 中的代码给出了 5,574\
  \ 条记录，并且我们在相对较短的返回时间内得到了结果。是时候开始为我们的响应帖子添加更多数据了。现在我们需要抓取所有的响应帖子。这些帖子的 `postTypeID`\
  \ 为 2。我们可以添加 `Answer Count`（回答数）、帖子所有者以及这是否是接受的答案。我们还可以添加分数，这对应着赞成票。这些添加项显示在清单 6-2\
  \ 的代码中，查询结果的部分数据展示在表 6-1 中。\n\n表 6-1\n清单 6-2 查询结果的前十条记录\n\n| createDate | Id | Answer\
  \ Count | Owner UserId | isAccepted | upvotes |\n| --- | --- | --- | --- | --- |\
  \ --- |\n| 2012-08-01 | 11750763 | 2 | 1530410 | 0 | 5 |\n| 2012-08-01 | 11750765\
  \ | 1 | 868718 | 1 | 2 |\n| 2012-08-01 | 11750767 | 1 | 841828 | 1 | 1 |\n| 2012-08-01\
  \ | 11750768 | 3 | 8670 | 0 | 0 |\n| 2012-08-01 | 11750768 | 3 | 814048 | 0 | 1\
  \ |\n| 2012-08-01 | 11750768 | 3 | 1137672 | 0 | 1 |\n| 2012-08-01 | 11750770 |\
  \ 3 | 592212 | 0 | 0 |\n| 2012-08-01 | 11750770 | 3 | 862594 | 1 | 3 |\n| 2012-08-01\
  \ | 11750770 | 3 | 1567222 | 0 | 0 |\n| 2012-08-01 | 11750780 | 1 | 1487063 | 1\
  \ | 1 |\n\n```\nSELECT CAST(p.CreationDate AS DATE) AS createDate\n, p.Id\n, p.AnswerCount\n\
  , pUser.OwnerUserId\n, CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END\
  \ AS isAccepted\n, pUser.Score AS upvotes\nFROM dbo.Posts p\nLEFT OUTER JOIN dbo.Posts\
  \ pUser ON p.Id = pUser.ParentId\nAND pUser.PostTypeId = 2\nWHERE p.CreationDate\
  \ >= '20120801'\nAND p.CreationDate < '20120802'\nAND p.PostTypeId = 1\nORDER BY\
  \ p.Id, pUser.OwnerUserId;\n清单 6-2\n单日响应帖子的扩展数据\n```\n\n\n\n\n### 以小的、易于测试的增量添加更多数据\n\
  \n我们在 `Table 6-1` 中看到的结果似乎相当直接和合理。现在，我们来看一下如何添加一些我们需要的聚合，以模仿原始存储过程的功能。我们想知道，对于一个用户，他们有多少个被接受的答案。我们将使用一个\
  \ `CASE` 语句，每当一个答案是被接受的答案时，我们将值设为 `1`，然后对这些 `1` 求和。如果答案不是被接受的答案，我们将值设为 `0`，因此总和仍然只反映被接受答案的数量。我们还需要知道一天内单个帖子收到的最高回复数，我们可以通过\
  \ `MAX()` 回答数量来获得。我们可以使用 `SUM()` 来告诉我们一天内的回答数量。我们使用的查询如 `Listing 6-3` 所示。\n\n```sql\n\
  SELECT CAST(p.CreationDate AS DATE) AS createDate\n, COUNT(p.Id) as numPosts\n,\
  \ SUM(p.AnswerCount) AS numResponses\n, MAX(p.AnswerCount) AS maxNumAnswers\n, pUser.OwnerUserId\n\
  , SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId THEN 1 ELSE 0 END) AS isAccepted\n\
  , MAX(pUser.Score) AS upvotes\nFROM dbo.Posts p\nLEFT OUTER JOIN dbo.Posts pUser\
  \ ON p.Id = pUser.ParentId\nAND pUser.PostTypeId = 2\nWHERE p.CreationDate >= '20120801'\n\
  AND p.CreationDate < '20120802'\nAND p.PostTypeId = 1\nGROUP BY CAST(p.CreationDate\
  \ AS DATE), pUser.OwnerUserId\nORDER BY pUser.OwnerUserId;\n```\n\nListing 6-3\n\
  为单日查询的回复帖子添加聚合\n\n我们在 `Listing 6-3` 中使用了 `GROUP BY` 子句。`GROUP BY` 子句将按用户聚合数据。当我们运行查询时，会得到\
  \ `Table 6-2` 所示的结果集。\n\n`Table 6-2`\n\n运行 `Listing 6-3` 中的查询得到的前十个记录\n\n| 创建日期\
  \ | 帖子数 | 回复数 | maxNum 回答数 | 所有者 用户 ID | 是否被接受 | 赞同票 |\n| --- | --- | --- | ---\
  \ | --- | --- | --- |\n| 2012-08-01 | 361 | 64 | 3 | NULL | 0 | NULL |\n| 2012-08-01\
  \ | 66 | 187 | 7 | 0 | 22 | 62 |\n| 2012-08-01 | 1 | 2 | 2 | 16 | 1 | 2 |\n| 2012-08-01\
  \ | 1 | 2 | 2 | 95 | 0 | 0 |\n| 2012-08-01 | 1 | 2 | 2 | 343 | 0 | 0 |\n| 2012-08-01\
  \ | 3 | 7 | 3 | 476 | 1 | 4 |\n| 2012-08-01 | 1 | 1 | 1 | 492 | 1 | 3 |\n| 2012-08-01\
  \ | 2 | 3 | 2 | 536 | 2 | 11 |\n| 2012-08-01 | 1 | 2 | 2 | 549 | 1 | 3 |\n| 2012-08-01\
  \ | 1 | 3 | 3 | 631 | 1 | 0 |\n\n`Table 6-2` 中的数据是我们查询所需的数据吗？不完全是，但它将为我们提供建筑模块，以找到我们需要的数据。这个查询告诉我们\n\
  \n1.  在此日期内回复帖子的不同用户 ID 数量（每个用户 ID 有一条记录）\n2.  哪个用户 ID 的回复数最多\n3.  其中有多少回复是“被接受的”\n\
  \n看起来有一些“默认”的 `OwnerUserId` 可能可以忽略。值 `NULL` 和 `0` 似乎是“非真实或无效”的值，我们可以通过检查 `Users`\
  \ 表中是否存在 ID 为 `0` 的用户来验证。如果我们运行 `Listing 6-4` 中的查询，将看到 `Users` 表中没有 ID 为 `0` 的用户。\n\
  \n```sql\nSELECT * FROM users\nWHERE Id = 0;\n```\n\nListing 6-4\n检查用户是否存在\n\n我们也应该在最终查询输出中忽略这些值。如何去掉这些值呢？我们想要所有的\
  \ `ownerUserID`，除了那些匹配 `NULL` 或 `0` 值的。下面这行代码将为我们进行检查，并允许我们过滤掉这些值。如果你还没有用过 `EXCEPT`\
  \ 或 `INTERSECT`，我强烈建议你试一试。\n\n```sql\nAND EXISTS (SELECT pUser.OwnerUserId EXCEPT\
  \ (SELECT NULL UNION SELECT 0))\n```\n\n我们重写的下一步是移除这些不需要的用户 ID，然后对不同的分组进行聚合——有些按帖子，有些按天，有些按用户。我们该怎么做呢？\n\
  \n### 窗口函数\n\n那是什么？Windows 上安装的东西？嗯，我想技术上说是“是的”，但在这种情况下，它们是 SQL Server 后续版本（有些是\
  \ 2005 或更高版本，有些是 2012 或更高版本）中包含的函数。它们的作用是获取查询结果的一个“窗口”，并允许你在其上进行聚合。让我们看一个 `Listing\
  \ 6-5` 中所示的例子。\n\n```sql\nSELECT p.Id\n, CAST(p.CreationDate AS DATE) AS createDate\n\
  , p.AnswerCount\n, pUser.Score\n, COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId)\
  \ AS numPostsUser\n, COUNT(pUser.OwnerUserId) OVER (PARTITION BY pUser.ParentId)\
  \ AS numUsersPost\n, pUser.ParentId\n, pUser.OwnerUserId\n, SUM(CASE WHEN pUser.Id\
  \ = p.AcceptedAnswerId THEN 1 ELSE 0 END) OVER (PARTITION BY pUser.OwnerUserId)\
  \ AS numAccepted\n, u.DisplayName\n, ROW_NUMBER() OVER (PARTITION BY pUser.OwnerUserId\
  \ ORDER BY pUser.ParentId DESC) AS theUserRowNum\nFROM dbo.Posts p\nLEFT OUTER JOIN\
  \ dbo.Posts pUser ON p.Id = pUser.ParentId\nAND EXISTS (SELECT pUser.OwnerUserId\
  \ EXCEPT (SELECT NULL UNION SELECT 0))\nAND pUser.PostTypeId = 2\nLEFT OUTER JOIN\
  \ dbo.Users u ON pUser.OwnerUserId = u.Id\nWHERE p.CreationDate >= '20120801'\n\
  AND p.CreationDate < '20120802'\nAND p.PostTypeId = 1;\n```\n\nListing 6-5\n添加窗口函数\n\
  \n我们可以查看 `Table 6-3` 所示的结果集（它是 `Listing 6-5` 查询中列的一个子集），看看我们是否成功获取了所需的数据。我们是如何获得每个用户回复的帖子数的？我们使用了帖子\
  \ ID（在回复链接中它是父 ID）的计数，并按用户 ID 进行了分区。我们想要 `COUNT` `pUser.ParentId`，并且我们希望按 `pUser.OwnerUserId`\
  \ 定义的字段进行分区，因此我们使用以下行：\n\n```sql\nCOUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId)\
  \ AS numPostsUser\n```\n\n当我们按 `OwnerUserId` 分区时，聚合的“窗口”是单个用户回复的帖子集合，窗口函数将为每个用户\
  \ ID 返回一个单独的聚合值。\n\n`Table 6-3`\n\n来自 `Listing 6-4` 查询结果的子集\n\n| Id | 用户帖子数 | 帖子用户数\
  \ | ParentId | 所有者 用户 ID | 被接受数 |\n| --- | --- | --- | --- | --- | --- |\n| 11766266\
  \ | 1 | 3 | 11766266 | 9465 | 0 |\n| 11758727 | 3 | 1 | 11758727 | 9475 | 3 |\n\
  | 11756598 | 3 | 1 | 11756598 | 9475 | 3 |\n| 11755899 | 3 | 1 | 11755899 | 9475\
  \ | 3 |\n| 11766893 | 2 | 4 | 11766893 | 9530 | 2 |\n| 11762529 | 2 | 3 | 11762529\
  \ | 9530 | 2 |\n| 11759414 | 1 | 3 | 11759414 | 9686 | 1 |\n| 11764539 | 1 | 17\
  \ | 11764539 | 9732 | 0 |\n| 11755196 | 1 | 2 | 11755196 | 9922 | 1 |\n| 11763636\
  \ | 1 | 2 | 11763636 | 10397 | 1 |\n\n我们将使用相同的“窗口”，即单个用户在一天内回复的帖子集合，来计算按用户 ID 统计的被接受回答数。不过，我们如何进行健全性检查呢？运行\
  \ `Listing 6-2` 中的查询，添加一个 `ORDER BY p.Id`（帖子 ID）。你可以目视统计有多少不同的用户回复了每个帖子。然后再次运行 `Listing\
  \ 6-5` 中的代码，同样添加 `ORDER BY p.Id`。你可以将不含聚合的查询与包含聚合的查询进行目视对比，以验证整个查询的聚合是否正确：对于具有该用户的每条记录，你都能得到该用户回答的帖子数。对于回答一个帖子的用户数，你也会看到相同的情况。经常进行这样的健全性检查可以帮助你避免走上错误的编程道路，并在故障排除时节省时间！\n\
  \n\n\n### 避免行或数据重复\n\n当然，由于我们连接了帖子回复表，每个帖子 `ID` 可能得到多条记录，并且每个帖子可能存在不止一条回复。我们在查询清单\
  \ 6-5 中使用了 `ROW_NUMBER()` 函数来帮助处理此问题。`ROW_NUMBER()` 允许你根据选择的分区方式和排序方式，为每一行分配一个唯一的递增整数。这个\
  \ `ROW_NUMBER()` 将帮助我们过滤掉“多余”的行（那些可能导致数据倍增和结果错误的行）。\n\n我们需要计算不重复用户数，因此我们可以像在清单 6-5\
  \ 中所做的那样，为这些不重复用户分配行号，然后只需计算 `ROW_NUMBER()` 等于 1 的记录数即可。等等，这是什么意思？如果我们设置一个 `ROW_NUMBER`，按\
  \ `OwnerUserId` 分区，并按任意字段排序，那么每个新用户将只有一行（且仅有一行）的 `ROW_NUMBER()` 等于 1。因此，如果我们使用 `CASE`\
  \ 语句，为 `theUserRowNum` 等于 1 的每一行赋值“1”，为所有其他行赋值“0”，然后对这些值求和，我们就能得到用户的不重复计数。这很酷，对吧？清单\
  \ 6-6 也演示了这一点。\n\n```sql\nSELECT theInfo.Id -- 第二级\n, theInfo.createDate\n, theInfo.AnswerCount\n\
  , MAX(theInfo.Score) OVER () AS maxUpvotes\n, MAX(theInfo.numPostsUser) OVER ()\
  \ AS maxPostsUser\n, theInfo.numPostsUser\n, theInfo.DisplayName\n, MAX(theInfo.numUsersPost)\
  \ OVER () AS maxNumUsersPost\n, theInfo.numAccepted\n, SUM(CASE WHEN theInfo.theUserRowNum\
  \ = 1 THEN 1 ELSE 0 END) OVER () AS numDistinctUsers\n, ROW_NUMBER() OVER (PARTITION\
  \ BY ID ORDER BY numPostsUser DESC) AS theIDRow\nFROM (SELECT p.Id -- 第一级 - 最内层\n\
  , CAST(p.CreationDate AS DATE) AS createDate\n, p.AnswerCount\n, pUser.Score\n,\
  \ COUNT(pUser.ParentId) OVER (PARTITION BY pUser.OwnerUserId) AS numPostsUser\n\
  , COUNT(pUser.OwnerUserId) OVER (PARTITION BY pUser.ParentId) AS numUsersPost\n\
  , pUser.ParentId\n, pUser.OwnerUserId\n, SUM(CASE WHEN pUser.Id = p.AcceptedAnswerId\
  \ THEN 1 ELSE 0 END) OVER (PARTITION BY pUser.OwnerUserId) AS numAccepted\n, u.DisplayName\n\
  , ROW_NUMBER() OVER (PARTITION BY pUser.OwnerUserId ORDER BY pUser.ParentId DESC)\
  \ AS theUserRowNum\nFROM dbo.Posts p\nLEFT OUTER JOIN dbo.Posts pUser ON p.Id =\
  \ pUser.ParentId\nAND EXISTS (SELECT pUser.OwnerUserId EXCEPT (SELECT NULL UNION\
  \ SELECT 0))\nAND pUser.PostTypeId = 2\nLEFT OUTER JOIN dbo.Users u ON pUser.OwnerUserId\
  \ = u.Id\nWHERE p.CreationDate >= '20120801'\nAND p.CreationDate < '20120802'\n\
  AND p.PostTypeId = 1) theInfo;\n```\n\n#### 清单 6-6\n添加带有额外 `ROW_NUMBER` 的外层查询\n\n\
  清单 6-6 中的代码为查询增加了第二级。这个外层包装器是我们执行额外聚合的地方，例如引用 `theUserRowNum` 的 `CASE` 语句，它为我们提供了来自内部查询的不重复用户计数。我们还在外层查询中添加了一个\
  \ `ROW_NUMBER`，但我们稍后会再详细讨论这样做的原因。\n\n这个 `OVER()` 子句到底是什么意思？它是一种在集合上执行聚合的方式。如果未指定\
  \ `PARTITION`，则数据会在整个查询结果集上进行聚合。这也可以通过使用 `GROUP BY` 子句来完成，但我们需要查看一些明细行；我们需要为每个帖子获取响应最多的用户的正确\
  \ `DisplayName`，以便确定在当天的任何帖子中谁响应最多。如果我们使用 `GROUP BY` 子句，将丢失与获取所有这些显示名称以及每个用户的帖子数相关的明细级别。借助窗口函数，我们可以在不丢失该明细的情况下获得总体聚合值。我们将尽可能依赖\
  \ `MAX()` 值，因为额外或重复的行不会影响这些聚合（额外行会影响计数和求和，但不会影响 `MAX()` 和 `MIN()` 值）。我们可以在表 6-4\
  \ 中看到清单 6-6 查询的一些结果。\n\n#### 表 6-4\n清单 6-6 代码的结果子集\n\n| Id | Max Upvotes | Max Posts\
  \ User | Display Name | Num Posts User | Num Accepted | Num Distinct Users | The\
  \ ID Row |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n| 11750763 | 1,179\
  \ | 25 | waldyr.ar | 2 | 0 | 5506 | 1 |\n| 11750765 | 1,179 | 25 | Steve Koch |\
  \ 1 | 1 | 5506 | 1 |\n| 11750767 | 1179 | 25 | mwengler | 2 | 2 | 5506 | 1 |\n|\
  \ 11750768 | 1,179 | 25 | Annjawn | 5 | 1 | 5506 | 1 |\n| 11750768 | 1,179 | 25\
  \ | Tom | 2 | 1 | 5506 | 2 |\n| 11750768 | 1179 | 25 | DCookie | 1 | 0 | 5506 |\
  \ 3 |\n| 11750770 | 1,179 | 25 | nickb | 11 | 8 | 5506 | 1 |\n| 11750770 | 1,179\
