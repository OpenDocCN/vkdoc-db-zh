  \ 100,000 次减少到大约 30,000 次。现在我们知道，在 WHERE 子句中使用函数时要非常、非常小心，尤其是任何类型的标量值函数！\n\n\n###\
  \ 令人头疼的“庞大业务逻辑”函数\n\n我们已经了解了一个非常简单的函数和一个原生的 SQL Server 函数。我想再向你指出几点需要注意的事项。首先，就是“庞大业务逻辑”函数——一个长达数千行、执行大量操作的函数。当你遇到这类函数时，应将其拆解，并尽可能在存储过程中以行内方式使用。`sp_codeCalledCascade`\
  \ 在这里可以帮上忙，至少能帮你识别出哪些 SQL 对象在调用这些庞然大物。\n\n这类函数中有一个变种是“大杂烩”函数。我将传入一个 ID 类型的值（可能是帖子\
  \ ID）和我想要获取的结果（某种标签），然后函数将返回该值。让我们看一下代码清单 7-11 中的示例函数。\n\n```sql\nALTER FUNCTION\
  \ dbo.andTheKitchenSink (@postID int, @value varchar(8))\nRETURNS varchar(30)\n\
  AS\nBEGIN\nDECLARE @returnValue varchar(30)\n, @numComments varchar(30)\n, @numResponses\
  \ varchar(30)\n, @numResponders varchar(30)\n, @numLinks varchar(30)\n, @numVotes\
  \ varchar(30)\n;\nSET @numComments = COALESCE((SELECT CAST(COUNT(1) AS varchar(30))\n\
  FROM dbo.Comments\nWHERE PostId = @postID),'0');\nSET @numResponses = COALESCE((SELECT\
  \ CAST(COUNT(1) AS varchar(30))\nFROM dbo.Posts\nWHERE ParentId = @postID\nAND PostTypeId\
  \ = 2),'0');\nSET @numResponders = COALESCE((SELECT CAST(COUNT(DISTINCT OwnerUserID)\
  \ AS varchar(30))\nFROM dbo.Posts\nWHERE ParentId = @postID\nAND PostTypeId = 2),'0');\n\
  SET @numLinks = COALESCE((SELECT CAST(COUNT(1) AS varchar(30))\nFROM dbo.PostLinks\n\
  WHERE PostId = @postID),'0');\nSET @numVotes = COALESCE((SELECT CAST(COUNT(1) AS\
  \ varchar(30))\nFROM dbo.Votes\nWHERE PostId = @postID),'0');\nSET @returnValue\
  \ = CASE @value\nWHEN 'COMMENT' THEN @numComments\nWHEN 'RESPDR' THEN @numResponders\n\
  WHEN 'LINK' THEN @numLinks\nWHEN 'VOTE' THEN @numVotes\nELSE @numResponses\nEND;\n\
  RETURN(@returnValue);\nEND;\nGO\n```\n代码清单 7-11：`andTheKitchenSink` 函数的 `ALTER`\
  \ 语句\n\n你首先注意到的令人担忧的事情是什么？哦——对，那边那位——你举手了。没错！尽管我们只返回一个值，但实际上每次调用这个函数时，它都在完成获取所有值的工作！没人会真这么做，对吧？错。我确实不止一次在实际环境中遇到过这种类型的函数（更糟的是，它有大约\
  \ 30 个值）。这类函数可能在一个 `SELECT` 语句中被多次调用。每当它在 `SELECT` 语句中出现一次，它就会去访问相关的表，并为每一行获取函数中的每一个值。这真的非常可怕，对\
  \ SQL Server 的性能简直是毁灭性的打击。当数据库中数据量很少时，这并不明显，但随着数据随时间增长，问题就会变得非常显著。让我们重置一下扩展事件会话，并运行代码清单\
  \ 7-12 中的代码。\n\n```sql\nSELECT p.id AS postID\n, p.Score\n, dbo.andTheKitchenSink(649789,'COMMENT')\
  \ AS numComments\n, dbo.andTheKitchenSink(649789,'RESPONS') AS numResponses\n, dbo.andTheKitchenSink(649789,'RESPDR')\
  \ AS numResponders\n, dbo.andTheKitchenSink(649789,'VOTE') AS numVotes\n, p.ViewCount\n\
  FROM dbo.Posts p\nWHERE p.Id = 649789;\n```\n代码清单 7-12：使用 `andTheKitchenSink` 函数的示例查询\n\
  \n查询返回一行结果，这符合预期。当我们查看表 7-7 中显示的扩展事件会话输出时，就能了解到为了返回这一行数据，后台发生的所有工作。我对语句进行了截断，以使表格更易读。\n\
