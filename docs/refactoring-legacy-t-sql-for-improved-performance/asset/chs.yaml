  CREATE NONCLUSTERED INDEX ix_PostLinks_PostID ON dbo.PostLinks (PostId);

  ```


  一旦我们创建了代码清单 4-11 中的索引，就可以再次运行代码清单 4-10 中的查询，并再次捕获执行计划。瞧！即使是捕获执行计划，代码清单 4-10 中的查询也只用了
  3 秒。更精确地说，执行显示已用时间为 3315 毫秒，仅使用了 2765 毫秒的 CPU 时间。工作表的扫描次数实际上转移到了 `PostLinks` 表上，但在
  `STATISTICS IO` 输出中，“扫描”一词实际上可以指查找（seek）或扫描（scan）。在添加了代码清单 4-11 中的索引后，代码清单 4-10
  中查询的执行计划如图 4-2 所示。


  ![../images/483961_1_En_4_Chapter/483961_1_En_4_Fig2_HTML.jpg](img/483961_1_En_4_Fig2_HTML.jpg)


  ##### 图 4-2

  添加索引后的执行计划


  观察图 4-2，我们看到了完全符合预期的结果：索引查找承担了大部分工作。我们干得不错！我们刚刚让一段原本要运行数小时的代码，现在只需…… 3 秒就能跑完。老实说，我们并没有做太多工作。实际上，我们所做的工作比调用视图所做的要少得多！


  ### 我们解决了哪些问题？


  为什么它比原始视图调用快这么多？嗯，我们展示了后台实际运行了多少代码。调用一个视图，发现它包含了你需要的大部分字段，然后再创建第二个视图来添加一两个额外字段，这很容易。问题在于人们不断这样做，在视图之上叠加更多视图，以至于在实际运行的代码中，表被多次调用。由于视图定义看起来可能具有欺骗性的简单，对于不经意的观察者来说，并不明显视图调用背后实际发生了所有这些工作。


  透视（Pivoting）和逆透视（Unpivoting）操作都涉及某种聚合。我编写这些视图的方式（至少截至 SQL Server 2014）与 SQL Server
  引擎在底层处理它们的方式相同，即使你使用“官方”的 pivot 或 unpivot 语法也是如此。大型 `GROUP BY` 语句迫使 SQL Server 必须执行指定的分组，这几乎总是意味着需要一个工作表。然后，它还必须对数据进行排序（毕竟，除非数据已排序以便分组，否则无法进行分组）。排序在
  SQL Server 中是一项相当昂贵的操作。如果已经存在一个按所需顺序排序的索引，则有可能避免排序操作，但如果你为了支持任何列上的任何排序顺序而创建索引，那么就可能遇到索引过多的问题，这会导致写入操作耗时极长。


  此外，在整个过程中，我们改变获取记录的数量幅度相当大，如表 4-3 所示。在 `WidePostsPlusOne` 中，我们基于 `PostID` 连接了 `Votes`
  表。在很多情况下，一个帖子肯定不止一个投票，因为我们看到记录数量几乎是 `WidePostsCh4` 记录数的三倍。然后，在 `WidePostsPlusTwo`
  中，我们丢失了大量行。我猜测这是由于某个内连接过滤掉了记录。不过，数据量的最大爆炸将来自逆透视操作。当我们在 `WidePostsCh4` 中执行透视时，我们为每个帖子填充了最多五条评论。然后，当我们执行逆透视时，我们“假定”每个帖子有五条评论，即使可能并非每个帖子都有完整的五条评论。我们仍然最终为每个帖子创建了五条记录。接着，我们在
  `WidePostsPlusFour` 中过滤掉了所有这些多余的行，但我们仍然完成了创建它们的工作。因此，我们的重写不仅速度大大提高，而且其中的数据也可能更准确！


  ### 筛选


  在不降低视图实用性的情况下进行筛选可能是一个挑战。你不能将参数传递给视图。因此，如果你的结果集需要限制，你的选项要么是在视图中硬编码筛选器，要么是确保每个调用对象都包含一个良好的
  `WHERE` 子句。`CTE`（公用表表达式）可以在视图定义中使用，这在某些筛选场景下可能很有用。


  ### 通过视图更新数据


  对于单表视图来说，这很简单。对于多表视图来说，这就不容易了（或者在大多数情况下是不可能的）。插入（Insert）和删除（Delete）操作只对包含单表字段的视图有效。更新（Update）操作可以针对包含多个表的视图运行，但更新必须针对单个表中的列。之所以存在这些限制，是因为
  SQL Server 的查询引擎并不总是能够明确地将视图中的一段数据追溯回原始表（你能想象尝试对 `WidePostsPlusFour` 执行更新操作吗？）。如果
  SQL Server 无法追溯数据，它就无法通过视图更新数据。


  ### 其他限制


  你不能基于临时表或表变量创建视图。如果想一下，这是合理的——视图定义是数据库中的永久对象，而临时表，即使是全局临时表，根据定义也不是永久的：它是……嗯，临时的。


  你不能为列指定默认值或约束。你可以使用 `COALESCE`，这在一定程度上（算是）解决了默认值问题，但对于约束则没有变通办法。



  ### 为什么要使用视图？


  所有这些限制和性能问题听起来真的很不幸。既然存在所有这些可能的陷阱和注意事项，为什么还有人会使用视图呢？嗯，正如我们在前一章讨论的那样，我们可以通过创建视图来开始拆分宽表，允许旧的调用引用该视图，然后开始分解表，这样我们将来修改或编写的任何代码都可以指向更小、更规范化的表。


  此外，视图是非常出色的安全工具。我们可以确保视图的权限只授予适当的组。例如，人力资源部可能需要查看社会安全号码，但其他人不能也不应该能够查看。如果公司有多个部门，我们可以确保每个部门使用他们自己的视图，这样他们就无法访问其他部门的数据。


  ### 总结


  希望您对围绕视图的常见陷阱有了更多了解，尤其是嵌套问题。我们还了解到它们可以用于安全目的，或者帮助我们将宽表分解成更小、更规范化的表。现在是时候看看其他类型的数据库对象，找到可以修复的代码，以使我们的应用程序性能更好！


