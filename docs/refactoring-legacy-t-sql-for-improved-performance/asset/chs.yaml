  \ respInfo.numResponders, vote.numVotes, p.ViewCount FROM dbo.Posts p OUTER APPLY\
  \ (SELECT COUNT(1) AS numComments FROM dbo.Comments c WHERE c.PostId = p.Id) com\
  \ OUTER APPLY (SELECT COUNT(DISTINCT resp.OwnerUserID) AS numResponders, COUNT(resp.Id)\
  \ AS numResponses FROM dbo.Posts resp WHERE resp.PostTypeId = 2 AND p.Id = resp.ParentId)\
  \ respInfo OUTER APPLY (SELECT COUNT(1) AS numVotes FROM dbo.Votes v WHERE v.PostId\
  \ = p.Id) vote WHERE p.Id = 649789` |\n\n请记住，这里的 `duration` 单位是微秒，与我们的总计查询不同，后者的\
  \ `duration` 单位是毫秒。清单 7-15 中的查询运行了大约半毫秒，且只使用了十分之一的读取量。对于一个返回许多 `post ID` 的查询，差异会有多大？请记住，我们现在使用的是清单\
  \ 7-14 中“新”重写的 `kitchen sink` 函数。清单 7-16 中的代码将更新我们的查询以返回多行，而不是单行。\n\n\n\n#### 随着返回行数增加的指标\n\
  \n```sql\nSELECT p.Id AS postID\n, p.Score\n, dbo.andTheKitchenSink(649789,'COMMENT')\
  \ AS numComments\n, dbo.andTheKitchenSink(649789,'RESPONS') AS numResponses\n, dbo.andTheKitchenSink(649789,'RESPDR')\
  \ AS numResponders\n, dbo.andTheKitchenSink(649789,'VOTE') AS numVotes\n, p.ViewCount\n\
  FROM dbo.Posts p\nWHERE p.Score = 320;\n```\n代码清单 7-16\n调用 `andTheKitchenSink` 函数的查询，返回多行数据\n\
  \n从本书前面的内容我们已经知道，这将输出 62 行数据。如果我们查看扩展事件会话的总计数据（如表 7-12 所示），可以看到代码的运行时间仍然少于一秒。\n\n\
  表 7-12\n\n代码清单 7-16 对应代码的扩展事件会话总计指标\n\n| totDurationms | totCPUms | totLogReads\
  \ |\n| --- | --- | --- |\n| 160 | 157 | 7,073 |\n\n接下来，让我们重置扩展事件会话。我们应该尝试使用 `OUTER\
  \ APPLY` 代码而不是 `andTheKitchenSink` 函数的查询版本，如代码清单 7-17 所示。然后，我们可以看看在输出更多行的情况下，我们的指标是否会有所不同。\n\
  \n```sql\nSELECT p.Id AS postID\n, p.Score\n, com.numComments\n, respInfo.numResponses\n\
  , respInfo.numResponders\n, vote.numVotes\n, p.ViewCount\nFROM dbo.Posts p\nOUTER\
  \ APPLY (SELECT COUNT(1) AS numComments\nFROM dbo.Comments c\nWHERE c.PostId = p.Id)\
  \ com\nOUTER APPLY (SELECT COUNT(DISTINCT resp.OwnerUserID) AS numResponders\n,\
  \ COUNT(resp.Id) AS numResponses\nFROM dbo.Posts resp\nWHERE resp.PostTypeId = 2\n\
  AND p.Id = resp.ParentId) respInfo\nOUTER APPLY (SELECT COUNT(1) AS numVotes\nFROM\
  \ dbo.Votes v\nWHERE v.PostId = p.Id) vote\nWHERE p.score = 320;\n```\n代码清单 7-17\n\
  使用 `OUTER APPLY` 针对多行查找额外的聚合数据\n\n当我们在扩展事件会话文件上运行代码清单 7-13 中的代码时，我们得到了如表 7-13 所示的总计指标。与调用标量值函数相比，将信息收集代码直接内联在查询中，我们在指标上显示出显著的改进。随着返回记录数量的增加，这种改进变得更加显著。\n\
  \n表 7-13\n\n代码清单 7-17 对应代码的扩展事件会话总计指标\n\n| totDurationms | totCPUms | totLogReads\
  \ |\n| --- | --- | --- |\n| 7 | 16 | 1,529 |\n\n标量值函数是否有其用武之地呢？也许有。我一般不使用它们，但我能理解它们在哪些情况下可能有用。假设我每晚运行一个存储过程，根据是星期几或是否是节假日，给回复者发放奖金。确定是否是节假日、周末或工作日的计算可能有些复杂。我可以编写一个函数，传入一个日期，让它判断是哪种类型的日期，从而确定奖金的系数。我可以在存储过程的开头调用这个函数，将返回值保存在一个变量中，并用它来计算当天回答问题的每个人的正确奖金。\n\
  \n### 表值函数 (TVF)\n\n表值函数有两种不同的类型：内联 TVF 和多语句 TVF。它们的语法略有不同，内联 TVF 中只能有一个 `SELECT`\
  \ 语句。在多语句 TVF 中，你可以有更复杂的逻辑，但你也会因此遇到相应的性能损失。即使一个内联 TVF 和一个多语句 TVF 做着“相同的工作”，内联 TVF\
  \ 的性能也会好得多。让我们看一下代码清单 7-18 中的多语句 TVF。\n\n```sql\nALTER FUNCTION dbo.responderInfoMultiValue\
  \ (@postID int)\nRETURNS @userInfo TABLE\n(DisplayName nvarchar(40)\n, Reputation\
  \ int\n, WebsiteURL nvarchar(200)\n)\nAS\nBEGIN\nDECLARE @userList TABLE (ownerUserID\
  \ int);\nINSERT INTO @userList (ownerUserID)\nSELECT p.OwnerUserId\nFROM dbo.Posts\
  \ p\nWHERE p.ParentId = @postID\nAND p.PostTypeId = 2;\nINSERT INTO @userInfo (DisplayName,\
  \ Reputation, WebsiteURL)\nSELECT u.DisplayName\n, u.Reputation\n, u.WebsiteUrl\n\
  FROM dbo.Users u\nINNER JOIN @userlist ul ON ul.OwnerUserId = u.Id;\nRETURN\nEND;\n\
  GO\n```\n代码清单 7-18\n`responderInfoMultiValue` 的 `ALTER` 语句\n\n让我们回去重置扩展事件会话。然后，我们可以运行代码清单\
  \ 7-19 中的代码，查看运行调用代码清单 7-18 中多语句 TVF 的代码的一些指标。\n\n```sql\nSELECT DisplayName\n,\
  \ Reputation\nFROM dbo.responderInfoMultiValue(649789); --这里的数字是一个帖子 ID\n```\n代码清单\
  \ 7-19\n调用 `responderInfoMultiValue` 函数的查询\n\n当我们运行代码清单 7-19 中的代码时，查询返回 31 条记录。如果我们使用代码清单\
  \ 7-6 中的代码查看扩展事件会话数据，会得到如表 7-14 所示的结果。\n\n表 7-14\n\n运行代码清单 7-19 中查询得到的扩展事件会话输出\n\
  \n| duration | cpu time | physical reads | logical reads | writes | row count |\
  \ statement |\n| --- | --- | --- | --- | --- | --- | --- |\n| 522 | 0 | 0 | 164\
  \ | 0 | 32 | `INSERT INTO @userList (OwnerUserId) SELECT p.OwnerUserId FROM dbo.Posts\
  \ p WHERE p.ParentId = @postID AND p.PostTypeId = 2` |\n| 712 | 0 | 0 | 131 | 0\
  \ | 31 | `INSERT INTO @userInfo (DisplayName, Reputation, WebsiteURL) SELECT u.DisplayName,\
  \ u.Reputation, u.WebsiteUrl FROM dbo.Users u INNER JOIN @userlist ul ON ul.OwnerUserId\
  \ = u.Id` |\n| 1796 | 0 | 0 | 310 | 0 | 94 | `SELECT DisplayName, Reputation FROM\
  \ dbo.responderInfoMultiValue(649789)` |\n\n或者，这个函数也可以写成内联 TVF。语法稍有不同，如 `RETURNS\
  \ TABLE` 语句所示，而不是定义要返回的整个表结构。此外，请注意代码清单 7-20 中的代码只有一个 `SELECT` 语句。\n\n```sql\nALTER\
  \ FUNCTION dbo.responderInfoInline (@postID int)\nRETURNS TABLE\nAS\nRETURN SELECT\
  \ u.DisplayName\n, u.Reputation\n, u.WebsiteUrl\nFROM dbo.Users u\nWHERE EXISTS\
  \ (SELECT 1\nFROM dbo.Posts p\nWHERE p.ParentId = @postID\nAND u.Id = p.OwnerUserId\n\
  AND p.PostTypeId = 2);\nGO\n```\n代码清单 7-20\n`responderInfoInline` 函数的 `ALTER` 语句\n\
  \n如果我们运行代码清单 7-19 中的代码，但改为调用内联版本的函数，并且使用与之前相同的帖子 ID，我们同样得到 31 行，但扩展事件的输出看起来有些不同，如表\
  \ 7-15 所示。\n\n表 7-15\n\n运行代码清单 7-19 中的查询（针对内联函数）得到的扩展事件会话输出\n\n| duration | cpu\
  \ time | physical reads | logical reads | writes | row count | statement |\n| ---\
  \ | --- | --- | --- | --- | --- | --- |\n| 1621 | 0 | 0 | 227 | 0 | 31 | `SELECT\
  \ DisplayName, Reputation FROM dbo.responderInfoInline(649789)` |\n\n就是这样——只有那一行，没有其他工作。SQL\
  \ Server 实际上将函数代码内联（或将函数转换为原始查询的一部分）了。我们看到，与使用多语句 TVF 相比，使用内联版本的函数时间更短，物理读取更少。\n\
  \n如果你打算将多语句 TVF 改成内联 TVF，那么很可能没有理由不直接在存储过程（或你正在查看的任何对象）中内联代码，并完全移除该函数。\n\n\n# 第四部分：糟粕与败笔\n\
  \n### 总结\n\n函数确实是代码复用的一种方式（就像厨房水槽函数一样）。尽管代码复用在前端编程中非常出色，但在 SQL Server 中几乎总是个坏主意。请只为你需要完成的工作编写代码，并且只编写这部分工作。此外，请将你的业务逻辑从\
  \ SQL Server 执行的工作中剥离出来——但那是另一本书、另一个人在另一个时间讨论的另一个话题了！\n\n## 8. 代理作业\n\nSQL Server\
  \ 代理允许你设置一个计划，在你选择的时间运行代码。这可能非常有用，但也可能导致一团乱麻。你听说过多少次应用程序或数据库周期性变慢，但当你上线查看时问题却消失了？你需要确定变慢是否存在真正的规律，然后你才能查看是否有作业与这些痛苦时段重合。\n\
  \n首先，让我们看看 SQL Server 代理应该为你完成什么。第一部分比开发更具管理性，但它如此重要，以至于每个从事数据库工作的人都应该意识到这些需求！然后，我们可以看看这些作业是如何悄悄潜入你的性能问题……甚至噩梦中的！\n\
  \n### 代理作业应该做什么\n\n有些管理职责应该设置为代理作业，并在夜间或每周运行。这些对于数据库的维护和完整性，以及你的灾难恢复计划都很重要。贵公司确实有这样的计划，对吧？而且你们确实会演练该计划和任何相关的故障转移，对吧？抱歉，刚才走神了。回到\
  \ `SQL Server 代理`！\n\n#### 好作业！\n\n“好”作业应该针对每个数据库运行，包括你的系统数据库。请注意，这些建议基于 0-500 GB\
  \ 范围的数据库。更大的数据库可能需要不同的策略。\n\n1.  完整备份：应至少每 24 小时运行一次。根据业务及其需求，可能需要更频繁地运行。较大的数据库可能较少运行完整备份。\n\
  2.  事务日志备份：应至少每小时运行一次。同样，这取决于业务需求和服务器负载，但这是一个很好的起始建议。\n3.  差异备份：可以根据需要运行，具体取决于业务需求和服务器负载。我认为这些是“可选”的，但其他两种备份类型是强制的。如果你的数据库非常大，并且每晚运行完整备份不可行，那么这些备份可能变为强制性的。\n\
  4.  损坏检查（或 `DBCC CHECKDB()`）：应至少每周运行一次，但理想情况下每 24 小时运行一次。\n5.  索引和统计信息维护：也应至少每周运行一次，但同样，理想情况是每\
  \ 24 小时运行一次。\n6.  清理作业：修剪掉不需要的多余审计数据甚至操作数据。\n\n与数据库相关的任何事情一样，你必须了解你的环境、软件和使用模式。在某些特定环境中，一些“好”作业可能并不需要，但可能大部分或全部都应该使用。这就引出了下一个，也可能是最关键的一点。\n\
  \n#### 我应该在何时运行作业？\n\n你如何知道备份应该在何时运行？索引维护呢？还有每个经理都需要、否则世界就要终结的那份庞大的日常报告呢？\n\n此外，某些作业在其他作业之前运行是有道理的。例如，最好在每晚的完整备份之前运行一次损坏检查和索引维护。如果你需要恢复到该备份，你会更有信心它可能没有损坏，并且索引维护是最新的，因此可以立即使用。在紧急情况下，这可以为你节省使环境重新上线的宝贵时间。然而，100%\
  \ 确保备份有效的唯一方法是测试你的备份。理想情况下，你也将备份恢复到测试环境中进行验证，而这也可以通过作业实现自动化。\n\n##### 了解你的环境……定期地\n\
  \n为了最佳地安排代理作业，了解围绕你环境的一些指标是必要的。一天中哪些时段 CPU 使用率最低？哪些时段访问系统的用户最少？`tempdb` 何时最不繁忙？磁盘写入量最低的时段呢？如果你有第三方监控解决方案，找到这些信息可能很简单。如果没有，你仍然可以使用自制解决方案来找到这些数据。网上有大量的博客文章和演示讨论如何为服务器建立基线，无论是通过\
  \ `PowerShell`、`扩展事件`、两者的某种组合，还是许多其他解决方案。\n\n为什么标题提到“定期地”呢？嗯，随着数据增长和可能的使用模式变化，你服务器的基线和低谷时段也会随之变化。以前良性的作业可能因为数据库使用模式的转变而突然引起严重的性能问题。此外，可能有些作业只是偶尔出现。例如，月末、季末和年末报告运行得不够频繁，可能无法显现问题模式，但仍然可能困扰用户。\n\
  \n##### 了解你的作业及其背后的需求……定期地\n\n你的作业安排在何时运行？它们运行多长时间？多久运行一次？作业实际满足什么业务需求？例如，你有一个客户需要每天获取最新的订单摘要。有一个作业调用一个存储过程来抓取并汇总这些数据，每\
  \ 2 分钟运行一次。\n\n问题的一部分在于，这个存储过程的运行时间开始超过 2 分钟，所以实际上它一直在运行。而且，它从时间开始之初就按天提取和聚合数据，直到时间结束（至少根据数据库标准）。此外，这个客户的业务只在\
  \ `上午 9:00` 到 `下午 5:00` 营业，并且周三和周日休息。\n\n你可以进行的一些简单更改是：将作业间隔增加到每 5 分钟运行一次；将运行时间限制为每天从\
  \ `上午 9:00` 开始到 `下午 5:00` 结束；并设置它们在周三和周日不运行。\n\n再次强调，随着时间（和数据量）的变化，曾经运行快速的作业可能突然无法快速运行。例如，你的损坏检查作业可能突然需要运行数小时。如果发生这种情况，那么采用不同的计划可能更好：\n\
  \n1.  运行索引维护。\n2.  运行完整备份。\n3.  将完整备份发送到你的测试服务器（或一个只读的报告辅助服务器）。\n4.  还原数据库。\n5.\
  \  在你的测试或辅助环境中运行损坏检查。\n\n### 代理作业的常见问题\n\n我们简要谈到了一个作业运行时间超过作业被调用之间的时间间隔，这可能导致作业几乎持续运行。我们在代理作业中还看到哪些其他问题？\n\
  \n### 作业重叠\n\n随着服务器日益繁忙，通过计划作业运行的报告越来越多，突然间你还要为可扩展的应用程序进行数据导入和导出，作业便开始出现重叠。将作业设置为相同的计划非常容易，因为这是设置作业时最少需要执行的一步（创建一个新计划）。然而，让所有作业同时运行将对你的服务器性能造成严重影响。\n\
  \n我编写了一个存储过程，它会访问 `MSDB`（存储作业信息的位置），提取每天运行的作业（区别于每周或仅运行一次的作业），并创建一个基于文本的甘特图，显示作业运行的时间和时长（使用作业历史记录中运行时间的平均值）。每列代表一个十分钟的时间段，如果一个作业在该时间段内开始和结束，你会看到一个\
  \ `|` 标记。如果它持续超过该时间段，你会看到类似 `| - - - |` 的标记横跨相应的时间段列。\n\n如果你已运行设置脚本，`SQL Server\
  \ Agent` 正在运行，并且你的实例已运行超过一天，你应该会有一个包含我为此示例创建的四个模拟作业的作业历史记录。我们可以通过首先在调试模式下运行存储过程来确认。请使用清单\
  \ 8-1 中的代码。\n\n```\nEXECUTE sp_jobOverlap @debug=1;\nListing 8-1\n在调试模式下调用 Job Overlap\
  \ 存储过程\n```\n\n让我们查看第一个结果集，如表 8-1 所示。我们想查看 `duration` 列中是否有任何值，这表明我们服务器上设置的作业至少运行过一次。由于所有\
  \ `duration` 列中都有数据，因此我们所有的作业至少运行过一次。为了便于阅读，时间已被截断。\n\n表 8-1\n\nJob Overlap 存储过程调试输出，第一个结果集\n\
  \n| 作业 ID | 作业名称 | 计划延迟时间 | 开始时间 | 结束时间 | 持续时间 |\n| --- | --- | --- | --- | ---\
  \ | --- |\n| 1 | HourlyOne | 01:00:00 | 06:00:00 | 22:00:00 | 00:19:20 |\n| 2 |\
  \ syspolicy_purge_history | 23:59:00 | 02:00:00 | 23:59:59 | 00:00:02 |\n| 3 | ShortOne\
  \ | 00:02:00 | 08:00:00 | 20:00:00 | 00:00:59 |\n| 4 | NightlyMaintenance | 23:59:00\
  \ | 22:00:00 | 23:59:59 | 01:12:39 |\n| 5 | TooLong | 00:30:00 | 04:00:00 | 22:00:00\
  \ | 00:27:39 |\n\n随着我们在输出中继续向下滚动，最后一个结果集显示了作业在一天中运行的实际分布情况。这些作业中有许多开始时间比 `SQL Server`\
  \ 的默认一天开始时间稍晚，如表 8-1 中的 `startTime` 列所示。因此，你可能需要向右滚动一点，才能看到作业开始以 `|` 和 `–` 字符显示运行。图\
  \ 8-1 显示了从上午 7:40 到 10:00 的时间段。\n\n![../images/483961_1_En_8_Chapter/483961_1_En_8_Fig1_HTML.jpg](img/483961_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\nJob Overlap 存储过程输出\n\n最终结果集的布局（如图 8-1 所示）使得识别有多个作业同时运行的十分钟时间段变得容易。有时你会遇到所有系统作业同时运行的“完美风暴”。重要的是找到任何重叠区域，并尝试分配作业（尤其是运行时间较长的作业），使它们永远不会与其他作业同时运行。一种方法是更改计划，使每个作业不是都在整点开始，而是让一个作业在整点开始，另一个作业在整点后\
  \ 10 分钟开始，第三个作业在整点后 30 分钟开始，依此类推。另一种方法是与你的老板以及上级链沟通，了解那些每 2 分钟运行一次的作业是否真的需要每 2 分钟运行一次。每小时运行一次是否足够？或者如果数据用于每日两次的报告，你是否可以在每日报告运行前\
  \ 30 分钟运行该作业？\n\n你应该通过重新运行 Job Overlap 存储过程来定期重新检查作业分布。随着时间的推移，随着数据库中数据的增长，作业的运行时间会开始变长。这可能导致在之前没有问题的区域出现重叠。保持警觉是能够主动出击并在问题发生前解决它的关键，而不是等到老板站在你办公桌前！\n\
  \n### 总结\n\n`SQL Server Agent` 是一个用于在预定时间调度代码运行的强大工具。然而，理解你的环境和作业非常重要。计划不周的作业时间安排，或者超出实际业务需求的作业，可能会导致整个环境变慢，有时还难以追踪。\n\
  \n## 9. 外部影响\n\n存在一些调用 `SQL Server` 上代码或对象的地方，这些地方并不在 `SQL Server` 上。有时，公司使用多个 `SQL\
  \ Server`，但随着时间的推移，需要不同服务器上的数据库相互“对话”。此外，可能并不总是有 `DBA`，因此应用程序开发者将 `SQL` 代码写入应用程序中，而不是仅仅调用\
  \ `SQL` 对象。\n\n### 链接服务器\n\n我们为什么使用链接服务器？有时，数据库可以放在不同的服务器上，因为它们通常具有不同的工作负载。硬件可能是专门为每组数据库的工作负载购买或设置的。也许数据库最初是由不同的部门开发的，每个部门都有权访问特定的\
  \ `SQL Server`。\n\n无论情况如何，不可避免地会有人认为将来自两个服务器/数据库的数据合并到一个查询或许多查询中是个好主意。存在一些与性能无关的限制，可能需要代码更改。链接服务器不允许调用用户定义的表值函数或标量函数。根据你的代码中使用函数的频率，这可能需要大量的返工工作。\n\
  \n#### 安全性\n\n通常，链接服务器是为了快速解决问题而设置的，安全性没有得到太多考虑。我们认为每台服务器本身是安全的，因此它们彼此共享没有问题。然而，事实并非如此。应在链接服务器属性页中设置本地服务器登录名，并且不应允许未明确定义的登录名进行连接。正确的设置可能很复杂，同时还要允许用户执行适当的任务。\n\
  \n\n#### 跨数据库表的查询\n\n当使用跨链接服务器的查询时，调用数据库通常会使用 `WHERE` 子句对查询进行过滤。然而，有时 `SQL Server`\
  \ 会直接从链接服务器抓取整张表，将其拉回本地，*然后*再应用 `WHERE` 子句进行过滤。查询的执行计划会清晰地显示出所有行是从链接服务器表返回的情况。有几项设置需要检查以帮助缓解此问题，但这超出了本书的范围。\n\
  \n早期版本的 `SQL Server` 在通过“合理的”安全模型读取链接服务器的统计信息方面存在问题。用户必须拥有非常高的权限才能获取这些统计信息。在没有关于返回多少记录的信息时，这使得优化器很难生成良好的查询计划。幸运的是，微软在\
  \ `SQL Server 2012 SP1` 中缓解了此问题，因此在较新的软件版本中，以较低权限级别查找统计信息不那么成问题了。\n\n开发人员可以使用 `OPENQUERY`\
  \ 函数来解决过滤问题，并确保过滤操作在远程服务器上正确发生，然后再传回所有行。使用 `OPENQUERY` 时，语句实际上是在链接服务器上运行的。而直接调用链接服务器表时，所有代码都在当前服务器上运行，而不是在链接服务器上运行，这至少在\
  \ `SQL Server 2017` 之前的版本中是这样。\n\n新版本的行为似乎取决于将返回多少行、过滤列是否是连接两台服务器的数据列之一，以及过滤列是否位于远程服务器上。\n\
  \n#### 网络 I/O\n\n因为我们是数据库专业人士，所以我们绝对知道问题的原因总是网络，对吧？说正经的，应用程序通过网络调用 `SQL Server`，而\
  \ `SQL Server` 又通过网络传回数据。还有多少其他应用程序正在网络上来回传输数据？任何机器上与该机器外部“通信”的代码都会使用网络。此外，您可能拥有的任何\
  \ `IoT` 设备也会占用一部分网络资源。我们只是又增加了一个可能导致性能问题或故障的点。\n\n#### 我们如何解决这个问题？\n\n如果两台服务器都是虚拟机（`VM`），那么停用其中一台虚拟机，并确保彼此交互的数据库位于同一台服务器的同一个实例上，可能是个好主意。这是最佳的长期解决方案，如果可行，我强烈建议采用此方法。\n\
  \n如果无法将链接的数据库移至同一台服务器，那么我们就得回到重构代码上来。这需要做一些研究，查看执行计划并花费时间先找出问题最严重的代码。执行计划应该能真正显示出在何处使用\
  \ `OPENQUERY` 会有所帮助；只需寻找那些被大量返回但不在查询最终输出中的行。\n\n在链接服务器上创建存储过程，然后从本地服务器调用它们，是另一种可以用来强制代码在链接服务器上而非本地服务器上运行的策略。虽然对存储过程的调用在本地服务器上运行，但链接服务器上存储过程中的所有代码随后都会在链接服务器上运行。这种策略可以是一种有效的方式，将代码片段分离出来，以针对哪台服务器是运行该代码的最佳位置。\n\
  \n### 应用程序中的 SQL 代码调用\n\n您听说过“`ORM`”这个术语吗？它的全称是对象关系映射（object-relational mapping），`ORM`\
  \ 是开发人员用来简化 `SQL` 代码编写的工具。它们很受欢迎，因为开发人员可以更快地编写代码——工具会为您生成数据库代码，您无需编写“`CRUD`”（创建\
  \ `Create`、读取 `Read`、更新 `Update`、删除 `Delete`）`SQL`。它们可以生成参数化查询，这是一件好事。然而，我们经常在这些工具生成的\
  \ `SQL` 代码中看到性能问题。如果开发人员意识到这些众所周知的问题，大多数都可以避免。\n\n#### 问题是什么？\n\n要修复应用程序代码中的 `SQL`\
  \ 性能问题，我们需要能够访问应用程序的源代码以及创建应用程序新构建的能力。如果应用程序代码的初始开发没有考虑一些目前众所周知的问题，那么该代码可能会在 `SQL\
  \ Server` 上造成相当大的痛苦，并通过占用 `SQL Server` 上过多资源来影响其他应用程序。\n\n#### ORM 在 .NET 端过滤数据\n\
  \n开发人员需要编写他们的 `.NET` 代码，以便在 `SQL Server` 端传回数据记录之前，对返回的数据集进行过滤。否则，`SQL Server` 将传回所有记录，然后在\
  \ `.NET` 端进行过滤。未过滤的查询检索以及将检索到的数据发送回应用程序是大量的工作，无论是数据库还是网络都不应该承担这些工作。开发人员还需要注意数据类型，因为使用不正确的类型可能导致隐式转换性能问题。此外，使用像\
  \ `UPPER(column)` 这样的约定进行过滤会使索引无法使用，从而再次导致性能问题。\n\n#### ORM RBAR（逐行操作）\n\n当应用程序需要一个父对象及其关联的子对象（想象一篇帖子及其所有关联的回复）时，开发人员需要注意所选\
  \ `ORM` 的延迟加载用法。这意味着首先检索父对象，然后逐个检索子对象。有很多策略可以在需要时避免此问题。有时，您可能不希望检索所有子对象，除非需要与之交互，所以延迟加载没问题。但在其他情况下，开发人员可以在代码中强制使用预加载。\n\
  \n此外，通过 `ORM` 插入数据会导致为添加的每一行执行单独的 `INSERT` 语句。这不仅对 `SQL Server` 来说工作量很大，还会导致您的事务日志变得臃肿。\n\
  \n#### 似曾相识\n\n一些 `ORM` 可能会遇到与我们在数据库代码中看到的相同类型的问题。其中之一就是数据类型不匹配。如果在 `ORM` 中数据类型定义的值不正确，它生成的代码可能会导致与我们之前在书中讨论的相同的隐式转换。\n\
  \n返回过多列的情况也是如此。就像在您的查询中一样（并且*不要*像使用 `SELECT *` 那样），编写 `.NET` 代码的开发人员需要准确指定需要返回哪些列，这样才不会每次都拉回整条记录。\n\
  \n将所有条件都塞进一个 `.NET` 调用中非常诱人，但这只会生成一个带有非常复杂 `WHERE` 语句的查询。这将导致查询优化器无法制定出好的计划，从而出现次优的运行时性能。如果开发人员在进行调用时非常明确，并考虑传递一个\
  \ `WHERE` 子句会是什么样子来提供他们请求的数据，就可以避免这种情况。\n\n#### 猜猜怎么着？使用存储过程！\n\n现在所有的 `ORM` 都可以调用存储过程。即使在专注于缓解上述问题之后，仍然可能生成非常糟糕的\
  \ `SQL` 代码。这时，开发人员会将代码从应用程序中提取出来，改为调用存储过程。然后就轮到我们来编写那个优化的存储过程了。\n\n\n### 动态 SQL\n\
  \n对象关系映射（ORM）在某些情况下可以生成动态 SQL。应用程序也可以被编写来生成动态 SQL。这样做的最大问题是，SQL Server 无法将查询的执行计划存储在计划缓存中；即使在代码中更改一个空格，也会导致\
  \ SQL Server 生成一个新的查询计划。每次运行都生成一个新计划，对于 SQL Server 所需完成的工作来说是昂贵的。此外，动态 SQL 代码的生成可能会导致一些非常复杂且次优的查询，具体取决于构建代码时的环境（变量多、NULL\
  \ 值多，等等）。\n\n对于 `WHERE` 子句中有多个条件的查询，动态 SQL 非常棒，但必须非常小心地编写，并且应该生成和测试所有不同的可能排列组合。\n\
  \n### 总结\n\n从数据库实例外部发起的 SQL 调用可能会带来一些性能问题。链接服务器可以将您的数据库负载分散到不同的服务器上，这很好。然而，如果您的\
  \ SQL 编写不正确，这些链接服务器会存在一些固有的性能问题。\n\n应用程序中的 SQL 代码，无论是由开发人员编写的还是由 ORM 生成的，都很难修复，因为我们需要开发人员来操作应用程序代码，或者将直接的\
  \ SQL 调用从应用程序中提取出来，改为让应用程序代码调用一个我们可以访问的存储过程。在第一种情况下，我们可以指导开发人员如何编写 SQL 代码。在第二种情况下，我们可以将代码写入一个存储过程，然后使用我们在本书前面章节中学到的策略来调整它！\n\
  \n感谢您与我一起踏上这段穿越数据库对象、外部影响和 T-SQL 代码世界的旅程。我希望您学到了一些处理您那遗留的庞然大物般应用程序的新策略。从被动应对策略转向主动策略的能力对我们任何人的理智都很重要，也是我们所有人都将继续努力追求的。祝您旅途顺利！\n\
