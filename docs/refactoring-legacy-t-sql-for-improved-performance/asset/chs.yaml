- '# 第二部分：数据库结构


  ## 3. 数据库表


  在接下来的章节中，我们将研究一些不同的数据库对象，并找出每个对象常见的一些反模式。我们已经讨论了许多适用于代码的反模式，例如存储过程、函数、视图，甚至即兴的 SQL
  语句。然而，每种对象类型都有其独特的陷阱。


  在本章中，我们将更仔细地研究表。如果访问某个表的每段代码都很慢，那么就应该检查表的定义。我们具体要在该定义中寻找什么？第 2 章的信息并没有真正涵盖表，除了提到计算列。好吧，让我们从那里开始！


  ### 计算列


  如果编码不够谨慎，计算可能会产生一些意外影响。确保你的表中没有任何计算列包含用户定义的标量函数。即使这些列没有出现在查询输出中，它们也可能导致查询无法并行运行。有时，聪明的（过于聪明的？）数据库管理员会在表中添加除数为零的列，以揪出那些在查询中使用`SELECT
  *`的“捣蛋”开发者。如果有人尝试对包含除数为零计算的列定义的表运行`SELECT *`查询，查询将失败并显示错误消息。这是一种确保良好习惯的“狡猾”方式，但教育编写代码的人比在数据库中埋设“地雷”更合适。


  ### 反规范化数据


  如果你不熟悉规范化，你可能应该花点时间阅读相关内容。简单来说，规范化是一套关于关系数据库中的数据应该如何以及不应该如何……“关联”的规则实践。大多数人建议遵循到第三范式（3NF）。除了
  3NF 之外还有更多的规范化级别，但 3NF 是当前大多数人建议遵守的标准可接受级别。


  第一范式（1NF）规定，在任何给定的单元格中应该只有一个值。一种经常违反此规则的方式是在单个单元格中包含逗号分隔的值列表。1NF 还指出，不允许有重复的列组——例如，拥有`comment1`、`comment2`等列。此外，根据
  1NF 的规则，任何数据值应该只存储在一个地方。最后，表中的所有行都应该是唯一的，并且具有主键。


  主键是记录的唯一标识符。它不必是 GUID 数据类型；相反，每条记录的值必须是唯一的。这可以是单列，也可以是其集合值构成唯一键的多列组合。多列主键可能会引起关注，但我们将在本章后面讨论这一点。


  第二范式（2NF）可能稍微难理解一些。记录中的每个非键值都需要完全依赖于键值。一个稍微不那么正式的说法是，确保表中的所有数据都直接与键相关。例如，你希望发帖用户的
  ID 在`Posts`表中，但你不需要在`Posts`表中存储专门关于用户的信息；你只想存储关于帖子的信息。相反，我们应该有一个单独的表来存储用户信息（如昵称），并在`Posts`表中有一个用户
  ID（在我们的数据库中是`OwnerUserID`），该 ID 指回`Users`表中的`id`。`OwnerUserID`将被视为外键，它指向`Users`表的主键（或
  Id 字段）。正确设置的外键约束也能提高数据库性能。


  3NF 类似，你需要将表中任何不直接依赖于键的字段移出该表。假设用户的最喜欢的颜色是`Posts`表中的一个列。最喜欢的颜色列应该移到`Users`表中，而不是留在`Posts`表中。颜色与帖子`ID`没有直接关系；它直接与用户相关。因此，它应该在一个具有与用户相关键的表中。


  我们来编一个关于`dbo.WidePosts`表的故事。假设它是 StackOverflow 数据库的原始表，并且可能仍用于遗留报告。随着应用程序的增长，表被添加或更改。那么这个表发生了什么变化？


  如果你去查看`WidePosts`表的定义（或列列表），你会看到……嗯，首先，它很宽（有很多列）。其次，`commentid1`、`commentid2`以及所有这些带数字的评论列是什么？看起来是评论信息的反规范化，而这正是它的本质。这样做的一个问题是你不能为每个帖子拥有超过五条评论，这有些限制。此外，很难区分不同的评论。这个表定义未能满足第一和第二范式的定义。


  我们在这个`WidePosts`表中还有关于用户的信息，这导致该表未能满足第三范式的定义。我特意创建了这个表用于演示；它不是 StackOverflow 数据库中的标准表之一。



  ### 数据类型与字段大小


  `WidePosts` 表中的大多数列都是整型数据类型，因此存储需求相对较低。然而，其中也有几个日期字段和一些大型的 `nvarchar` 字段：五个 `nvarchar(700)`
  字段、一个 `nvarchar(max)` 字段、一个 `nvarchar(2000)` 字段以及几个较小的 `nvarchar` 字段。多个列与一些大型的 `varchar`
  或 `nvarchar` 列的组合，可能使得每行的数据量相当可观。还记得上一章我们触及的查询中的内存授予吗？大量的内存授予需求可能会受到数据库表列数据类型和宽度选择的影响，并可能膨胀
  SQL Server 认为运行查询所需的资源量。


  这些列的大小有多少准确反映了列中包含的数据？让我们更仔细地查看 `WidePosts` 表中的数据值。`清单 3-1` 中的查询将找出几个列中值的最大长度。


