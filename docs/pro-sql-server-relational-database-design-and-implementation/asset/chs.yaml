  \ `SQL Server`。如果你将 `SQL Server` 安装在运行工具集的同一台计算机上，使用默认设置安装通常就足够了。你可以从 [`msdn.microsoft.com/en-us/library/hh213248.aspx`](https://msdn.microsoft.com/en-us/library/hh213248.aspx)\
