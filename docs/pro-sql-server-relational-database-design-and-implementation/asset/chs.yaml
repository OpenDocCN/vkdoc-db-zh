  ### 选择排序规则


  字符串值的排序规则设置了字符串相互比较以及排序的方式。世界各地的许多不同文化使用了许多不同的字符集。虽然如果你需要存储几乎任何字符集的字符，可以选择 Unicode
  数据类型，但仍然存在数据如何排序（是否区分大小写）和比较（是否区分重音）的问题。SQL Server 和 Windows 提供了大量可供选择的排序规则类型。排序规则在多个层级指定，从服务器开始。服务器排序规则决定了系统元数据的存储方式。然后是数据库的排序规则，最后，每个列可以有不同的排序规则。


  对于普通数据库来说，更改默认排序规则的需求不太常见，默认排序规则通常选择为系统所有用户最典型的排序规则。这通常是一种不区分大小写的排序规则，它允许在进行比较和排序时，`''A''
  = ''a''`。我只在需要区分大小写的列上使用过几次替代排序规则（有一次是为了让客户端能够强制使用更多四字符代码，这是不区分大小写的排序规则所不允许的！）。


  要查看服务器和数据库的当前排序规则类型，可以执行以下命令：


  ```sql

  SELECT SERVERPROPERTY(''collation'');

  SELECT DATABASEPROPERTYEX(''DatabaseName'',''collation'');

  ```


  在大多数安装于英语国家/地区的系统上，默认排序规则类型是 `SQL_Latin1_General_CP1_CI_AS`，其中 `Latin1_General`
  代表标准拉丁字母表，`CP1` 指代码页 1252（SQL Server 默认的 Latin 1 ANSI 字符集），最后部分分别代表不区分大小写和区分重音。你可以在
  SQL Server 文档中找到所有排序规则类型的完整说明。然而，默认设置很少是期望使用的排序规则，设置为该较旧的排序规则是为了向后兼容。理想情况下，你将使用
  Windows 排序规则，我将在示例代码中使用 `Latin1_General_100_CI_AS`，这是我安装服务器时使用的排序规则。`100` 表示这是一个支持较新
  Unicode 字符的较新排序规则。


  除了常规排序规则外，还有二进制排序规则，你可以使用它们基于数据的原始格式进行排序和比较。有两种类型的二进制排序规则：较旧的后缀为 `_bin`，较新的为 `_bin2`。`Bin2`
  排序规则执行所谓的纯代码点排序，意味着它们仅根据二进制值比较数据（`bin` 排序规则将第一个字节作为 `WCHAR` 比较，这是一种 `OLEDB` 数据类型）。请注意，二进制排序顺序与区分大小写是有区别的，因此花些时间理解你最终使用的排序规则对你有好处。


  要列出给定 SQL Server 实例中安装的所有排序顺序，可以执行以下语句：


  ```sql

  SELECT *

  FROM ::fn_helpcollations();

  ```


  在我进行测试的计算机上，此查询返回了超过 3800 行，但通常你不需要更改数据库管理员最初选择的默认设置。在创建列时，要为 `char`、`varchar`、`text`、`nchar`、`nvarchar`
  或 `ntext` 列设置排序序列，你可以使用列定义的 `COLLATE` 子句来指定，如下所示：


  ```sql

  CREATE SCHEMA alt;

  CREATE TABLE alt.OtherCollate

  (

  OtherCollateId int IDENTITY

  CONSTRAINT PKAlt_OtherCollate PRIMARY KEY ,

  Name nvarchar(30) NOT NULL,

  FrenchName nvarchar(30) COLLATE French_CI_AS_WS NULL,

  SpanishName nvarchar(30) COLLATE Modern_Spanish_CI_AS_WS NULL

  );

  ```




  ## 排序规则、模式与实现列


  现在，当你按 `FrenchName` 对输出排序时，它是大小写不敏感的，但会根据法语的顺序来排列行。对于西班牙语及 `SpanishName` 列也是如此。在本章中，我们几乎在所有情况下都会坚持使用默认设置，并且我建议如果你有存储多语言数据的需求，可以查阅在线文档。唯一可能偏离数据库默认排序规则的“常规”情况是，当你需要为一个列指定不同的大小写敏感性时，此时你可能会使用二进制排序规则或大小写敏感的排序规则。


  有一个快速提示，你可以使用 `COLLATE` 关键字在 `WHERE` 子句中指定排序规则：


  ```sql

  SELECT Name

  FROM alt.OtherCollate

  WHERE Name COLLATE Latin1_General_CS_AI

  LIKE ''[A-Z]%'' collate Latin1_General_CS_AI;  --区分大小写且

  --不区分重音

  ```


  在选择与默认值不同的排序规则时必须格外小心，因为在服务器级别更改它极其困难，在数据库级别更改它也绝非易事。你可以使用 `ALTER` 命令更改列的排序规则，但前提是该列不能有约束或索引引用它，并且你可能需要重新编译所有引用该表的对象。


  如果你发现自己身处一个拥有多种排序规则的服务器上，一个方便的排序规则设置是使用 `database_default`，它使用你当前执行查询所在的数据库的默认排序规则。


  在设置服务器、数据库、表等时，明智地选择排序规则非常重要。更改数据库的排序规则可以通过一个简单的 `ALTER` 语句完成。然而，这不会更改数据库中的任何对象。你必须单独更改每个列的排序规则，虽然你可以使用简单的
  `ALTER TABLE…ALTER COLUMN` 语句来更改排序规则，但你必须首先删除所有引用该列的索引、约束和模式绑定对象。这是一个相当痛苦的任务。


  ### 设置模式


  模式（Schema）是一个命名空间：一个包含数据库对象的容器，所有这些对象都在一个数据库的范围内。我们将使用模式将表以及最终的视图、存储过程、函数等分组到功能组中。为模式命名与为表或列命名有点不同。模式名称应该听起来合适，所以有时用复数形式有意义，有时用单数形式。这取决于它们的使用方式。我发现我大多数时候使用复数名称，因为这样听起来更好，而且有时如果模式和表都用单数命名，你会遇到一个表与模式同名的情况。


  在图 6-25 的模型中，我们将用于表示消息的表放在一个名为 `Messages` 的模式中，而将代表 `Attendees` 及其相互关系的表放在一个名为 `Attendees`
  的模式中。


  ![A978-1-4842-1973-7_6_Fig25_HTML.jpg](img/A978-1-4842-1973-7_6_Fig25_HTML.jpg)


  图 6-25. 分配了模式的消息模型


  另请注意，我通常会在流程的后期设置模式，从模式开始可能看起来更正确。我发现，通常更容易发现实现的不同区域，而且模式并不一定容易从头开始定义，不同的区域会不断出现，直到我得到最终的解决方案。有时，这样做是必要的，因为你有多个同名的表，尽管这可能是设计不佳的标志。在这个虚构的解决方案中，我最后才做这一步，只是为了说明它可以放在最后进行。


  模式如此好用的原因在于，你可以在模式级别处理权限，而不是逐个对象地处理。当你在列表（例如在 Management Studio 中）中查看对象时，模式还为你提供了对象的逻辑分组。


  在本书的这一点上，我不会进一步探讨使用模式的安全方面，但要理解模式不仅仅是为了美观。在本书的所有示例中，我总会指出表所在的模式。在我设计的任何系统中，模式都将是其中的一部分，仅仅因为这样做是最佳实践。简要回到现实世界，我在本书的前几版中说过，在生产系统中开始使用模式将是一个缓慢的过程，在
  11 多年后的今天，这对某些用户来说仍然可能感到突兀。第 9 章 将更详细地讨论使用模式实现安全。


  ### 添加实现列


  最后，我将再为数据库添加一样东西：仅用于支持代码实现的列（而不是直接支持用户需求）。一个非常常见的用途是拥有指示行创建时间、更新时间以及可能由谁更新的列。在我们的模型中，我将坚持提到的时间点这个简单案例，并演示如何在数据库中实现这一点。许多实现者喜欢将这些值留给客户端处理，但我非常倾向于使用数据库代码，因为这样我就有了一个时钟来管理时间，而不是多个时钟。（我曾经管理过一个使用两个时钟来设置行时间的系统，偶尔会出现一行数据最后更新的时间比其创建时间还要早几年的情况！）


  因此，在图 6-26 中，我为每个表添加了两个 `NOT NULL` 列，用于记录 `RowCreateTime` 和 `RowLastUpdateTime`，但我们指定为非用户可管理的
  `AttendeeType` 表除外，因此我选择不为该表包含这些修改时间列。当然，你可能希望这样做以告知你的开发团队该行首次可用的时间。为了简单起见，我还省略了表示由谁更改该行的列。


  ![A978-1-4842-1973-7_6_Fig26_HTML.jpg](img/A978-1-4842-1973-7_6_Fig26_HTML.jpg)


  图 6-26. 向表中添加 RowCreateTime 和 RowLastUpdateTime 后的消息模型


  最后需要注意的是，通常最好只将这些实现列严格用于元数据目的。例如，考虑 `Messages.Message` 表。如果你需要知道消息是何时创建的，你应该使用 `MessageTime`
  列，因为该值可能代表用户点击创建按钮的时间，是从不同的时钟源捕获的，即使实际存储数据花了五分钟。另外，如果你需要将数据加载到一个新表中，该行可能是在 2016
  年创建的，但数据可能是 2000 年的，因此不将这些列用作用户数据意味着你可以真实地反映行的创建时间。


  这就是为什么我为这些实现列使用如此笨拙的名称。许多表会包含创建时间，但该数据可能是可修改的。我不希望用户更改行的创建时间，因此该名称表明创建时间严格针对该行，并且我不允许任何人修改此列。


  有时，我将在并发控制中使用这些列来指示行何时被更改，但当我能够控制设计时，如果客户端可以（并且会）利用它，我将使用 `rowversion` 类型。并发控制是一个非常重要的主题，我将在第
  11 章用一整章的篇幅来讨论。



