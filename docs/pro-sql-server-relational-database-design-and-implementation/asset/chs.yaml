- '# 3. 数据建模的语言


  > 我喜欢画图胜过说话。画图更快，且留给谎言的空间更少。——勒·柯布西耶，瑞士-法国建筑师、设计师、画家、城市规划师


  数据模型是设计过程中最重要的工具之一，但必须正确地构建。它通常始于一幅数据需求草图，用于与客户沟通，并反复完善直至准确。然而，一个常见的误解是数据模型仅仅是数据库的图片。这有一定道理，但模型的真正内涵远不止于此。一个优秀的数据模型包含关于数据库几乎所有方面的非图形化表示，并作为数据库生命周期的主要文档。模型的各个方面对开发人员、用户和维护系统的数据库管理员（`DBAs`）都具有实用价值。


  在本章中，我将介绍数据建模的基本概念，即生成一个数据库的表示，展示数据库设计中涉及的对象及其相互关系。它实际上是对外部和内部部分的描述，而图形化表示只是模型的一个方面（模型的图形部分可能是普通受众最感兴趣的部分，因为它提供了一个非常快速且易于使用的用户界面和对象及其关系的概览）。


  在下一节中，我将提供一些关于数据建模的基本信息，并介绍我偏好的（并将在本书许多示例中使用的）数据建模语言：`IDEF1X`。然后，我将介绍如何使用 `IDEF1X`
  方法对数据库的以下部分（在前两章中介绍过）进行建模和文档化：


  *   实体/表

  *   属性/列

  *   关系

  *   描述性信息


  在创建数据库的过程中，我们将从建模实体和属性开始，这些起初定义相当松散，直到我们开始形式化表和列，正如第 1 章所讨论的，它们有非常正式的定义，我们将在第 5
  章中继续完善。在本章和下一章的建模练习中，我将主要指代实体，除非我试图演示某些特定于在 `SQL Server` 中创建的内容。相同的数据建模语言将用于整个数据库建模过程，只是在本书后期描述实体或表时，术语会有所变化。


  在介绍 `IDEF1X` 之后，我将简要介绍其他几种替代的建模方法学风格，包括信息工程（也称为“鸦爪”）和陈氏实体关系模型（`ERD`）方法。我还将简要提及 `SQL
  Server` 和 Office 提供的一些用于查看数据库模型的工具，不过一般来说，即使你只是部分地以设计数据库为生，这些工具也远远不能满足你的需求。


  **注意**


  本章主要涵盖建模的机制和语言。在下一章中，我们将应用这些概念来构建一个数据模型。


  ## 数据建模简介


  数据建模是数据库设计基础的一项技能。为了开始设计数据库，能够有效地沟通设计并使其易于可视化非常有用。第 1 章中介绍的许多概念都有图形化表示，可以在很小的空间内轻松获取大量数据库结构和元数据的概览。


  **注意**


  模型或图表有很多类型：过程模型、数据流图、数据模型、序列图等。然而，对于我们的数据库设计目的，我将只关注数据模型。


  有几种流行的建模语言可用，每种在文档化数据库设计这项工作上通常都同样出色。主要的区别在于用来传达信息的某些符号。在选择我的数据建模方法时，我寻找了一种易于阅读、能够显示和存储实施非常复杂系统所需一切的工具。我使用的建模语言是信息建模集成定义（`IDEF1X`）。（我工作超过
  15 年的组织在此期间也使用它，这并无坏处。）


  `IDEF1X` 基于 1993 年 9 月 21 日发布的联邦信息处理标准（`FIPS`）出版物 184。公平地说，另一个主要的主流方法学——信息工程——也不错，但我喜欢
  `IDEF1X` 的工作方式，而且它是基于一个公开可用的标准。`IDEF1X` 最初由美国空军于 1985 年开发，以满足以下要求：


  1.  支持数据模型的开发。

  2.  成为一种既易于学习又健壮的语言。

  3.  可教。

  4.  经过良好测试和验证。

  5.  适用于自动化。


  **注意**


  在撰写本文时，`IDEF1X` 的完整规范可在 [`www.idef.com/idef1x-data-modeling-method/`](http://www.idef.com/idef1x-data-modeling-method/)
  获取。此规范的准确网址可能会发生变化，并且在本书前一版之后已经发生了变化。


  虽然数据建模方法的选择可能是个人偏好，但工具的选择通常受到经济性、公司标准或功能的影响。`IDEF1X` 在许多流行的设计工具中都有实现，例如以下这些（这些只是声称支持
