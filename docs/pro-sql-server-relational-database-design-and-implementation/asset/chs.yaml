  ## 实体


  在 IDEF1X 标准中，实体被建模为矩形框，这与大多数数据建模方法论一致。可以建模两种类型的实体：标识符独立实体和标识符依赖实体，通常分别被称为“独立”和“依赖”实体。


  依赖实体与独立实体之间的区别在于实体主键的构建方式。独立实体之所以如此命名，是因为它不依赖于任何其他实体的主键；换句话说，其主键不包含来自其他实体的外键列。第
  1 章介绍了“外键”一词，而 IDEF1X 规范引入了另一个术语：迁移。如果属性被迁移到非主键属性，它们就独立于任何其他实体。所有未作为来自其他实体的外键迁移的属性都是自有属性，因为它们起源于当前实体。其他方法论和工具可能使用“识别”和“非识别”来代替“自有”和“独立”。另一个常用于相同目的的术语是“强”实体（对应识别）和“弱”实体（对应非识别）。


  例如，考虑一张具有一行或多行明细项的发票。发票实体的主键可能是 `invoiceNumber`。如果一张发票有两行明细项，一个合理的主键选择将是 `invoiceNumber`
  和一个序列属性，例如 `lineNumber`。由于主键包含 `invoiceNumber`，它将依赖于 `invoice` 实体。如果你有一个同样与 `invoice`
  关联的 `invoiceStatus` 实体，它将是独立的，因为发票的存在并不真正取决于状态的存在（即使 `invoiceStatus` 到 `invoice`
  的关系值是必需的（换句话说，外键列将是 `NOT NULL`））。


  独立实体使用直角方框绘制，如下所示：


  ![A978-1-4842-1973-7_3_Figa_HTML.jpg](img/A978-1-4842-1973-7_3_Figa_HTML.jpg)


  依赖实体使用圆角方框绘制，如下所示：


  ![A978-1-4842-1973-7_3_Figb_HTML.jpg](img/A978-1-4842-1973-7_3_Figb_HTML.jpg)


  **注意**


  依赖和独立实体的概念会引出一点“先有鸡还是先有蛋”的悖论（更不用说，它也是一条岔路口，即著名的“午饭前别写”原则）。依赖实体依赖于某种特定类型的关系。然而，实体创建的介绍不能等到关系确定之后，因为没有实体，关系就不可能存在。如果你是第一次接触数据模型，本章可能需要重读才能完全理解，因为独立和依赖对象的概念与关系是相互关联的。


  当我们开始识别和建模实体时，需要处理命名这一主题。设计或实现任何系统的最重要方面之一就是如何为对象、变量等命名。关于名称的冗长讨论似乎总是浪费时间，但如果你曾回头处理几个月前自己写的代码，就会明白我的意思。例如，`@x`
  在你第一次编写某些代码时，似乎是一个完美且易于输入的变量名，它肯定比输入 `@holdEmployeeNameForCleaningInvalidCharacters`
  节省了很多击键次数，但后者在一段时间后更容易理解。


  命名数据库对象没什么不同；实际上，清晰地命名数据库对象比命名其他编程对象更重要，因为你那些通常非常非技术的最终用户几乎肯定会习惯这些名称：赋予实体的名称将被用作文档，并被转换为程序员和用户都将访问的表名。概念和逻辑模型将被视为数据库中数据的主要示意图，并且应该是一个活的文档，在你更改任何已实施的结构之前应先修改它。


  关于如何命名对象的讨论常常变得激烈，因为关于如何命名对象有几种不同的思想流派。一个核心问题是使用复数还是单数的实体/表名。两者都有其优点，但必须选择一种风格并遵循它。我选择遵循
  IDEF1X 标准的对象命名规则，即使用单数名称。根据此标准，名称本身并不命名容器，而是指代被建模对象的一个实例。其他标准使用表的名称作为容器/行集合，从另一个合理的角度来看也有道理。名称的使用方式确实很重要。复数名称往往需要不断改为单数。假设你有一个表示甜甜圈的表。要讨论它，你需要说一些听起来很别扭的话，比如“我有一个
  donuts 表。有 N 个 donuts 行。一个 donuts 行与一个或多个 donuts_eaters 行相关。”单数名称很容易附加到描述上。“我有一个
  donut 表。我有 N 个 donut 行。一个 donut 行与一个或多个 donut_eater 行相关。”通过应用将名称添加到范围的模式，我们可以轻松地构建大量文档。


  每种方法都有其好处和强烈的支持者，复数或单数命名可能值得与你的架构师同行进行一些长时间的讨论，但老实说，这肯定不是值得为之被烧死在火刑柱上的事情。如果你发现自己所依赖的组织使用复数名称，那并不意味着那是一个糟糕的工作场所。最重要的是保持一致性，不要让你的风格在过程中变得杂乱无章。任何命名标准都比没有标准好，所以如果你继承的数据库使用复数名称，请遵循“入乡随俗”原则，也使用复数名称，以免让其他人感到困惑。


  在本书中，我将遵循以下基本的实体命名指南：


  *   实体名称绝不应为复数。主要原因是名称应指代被建模对象的实例，而不是集合。

  *   给出的名称应直接对应于实体建模的本质。例如，如果你正在为一个人建模，将实体命名为 `Person`。如果你正在为一辆汽车建模，就称它为 `Automobile`。命名并不总是这么直接，但保持名称简单明了是明智的。


  实体名称经常需要由多个单词组成。在概念和逻辑建模阶段，当名称中需要多个单词时，包含空格、下划线和其他字符是可以接受的，但不是必需的。例如，一个存储个人地址的实体可以命名为
  `Person Address`、`Person_Address`，或者使用我最近习惯且在本书中最常使用的风格：`PersonAddress`。这种类型的命名被称为帕斯卡命名法或混合命名法。（当你不将第一个单词的首字母大写，但将第二个单词的首字母大写时，这种风格被称为驼峰命名法。）就像复数/单数的争论一样，实际上没有“正确”的方式；这些只是我将遵循以保持一切统一的指南。



  ## 缩写的使用


  无论你做出何种风格选择，在实体的逻辑命名中都应极少使用缩写，除非它是每个阅读你模型的人都知道的通用缩写。每个单词都应完整拼写出来，因为缩写会降低名称作为文档的价值，并容易引起混淆。在实现模型中，由于某些强加给你的命名标准或非常常见的行业标准术语，缩写可能是必要的。但要谨慎假设行业标准术语是普遍知晓的。


  如果你决定在名称中使用任何缩写，请确保你已建立一个标准，以保证每次都使用相同的缩写。避免使用缩写的主要原因之一，就是你不必担心不同的人在不同实体上对同一个属性使用
  `Description`、`Descry`、`Desc`、`Descrip` 和 `Descriptn` 等多种写法。


  ## 匈牙利表示法的使用


  通常，数据库设计新手（尤其是那些来自解释型或过程式编程背景的人）会觉得有必要使用某种形式的匈牙利表示法，在名称中包含前缀或后缀以指示对象的类型——例如，`tblEmployee`
  或 `tbl_Customer`。对于实体（和表）来说，这样的前缀通常被认为是不良实践，因为关系数据库中的名称几乎总是在显而易见的上下文中使用。在编写过程式代码（如
  Visual Basic 或 C#）时，使用匈牙利表示法通常是个好主意，因为对象并非总是具有在使用时立即能看出来的非常严格的上下文含义，尤其是当你用一个接口实现多种不同类型的对象时。在
  SQL Server Integration Services (SSIS) 包中，我通常会给每个操作符命名一个三或四个字母的前缀，以便在日志中识别它们。然而，对于数据库对象而言，很少会需要质疑一个名称是指列还是表。此外，如果对象类型不明显，查询系统目录来确定它也很容易。我现在不会深入讨论实现细节，但你可以使用
  `sys.objects` 目录视图查看任何对象的类型。例如，以下查询将列出目录中所有不同的对象类型（你的结果可能不同；此查询是针对我们将在本书部分示例中使用的
  `WideWorldImporters` 数据库执行的）：


  ```sql

  SELECT  DISTINCT type_desc

  FROM    sys.objects

  ORDER   BY type_desc;

  ```


  结果如下：


  ```sql

  type_desc


  CHECK_CONSTRAINT

  DEFAULT_CONSTRAINT

  FOREIGN_KEY_CONSTRAINT

  INTERNAL_TABLE

  PRIMARY_KEY_CONSTRAINT

  SECURITY_POLICY

  SEQUENCE_OBJECT

  SERVICE_QUEUE

  SQL_INLINE_TABLE_VALUED_FUNCTION

  SQL_SCALAR_FUNCTION

  SQL_STORED_PROCEDURE

  SYSTEM_TABLE

  TYPE_TABLE

  UNIQUE_CONSTRAINT

  USER_TABLE

  VIEW

  ```


  我们将在本书中贯穿使用 `sys.objects` 和其他目录视图来查看我们创建的对象的属性。


  ## 属性


  实体中的所有属性必须在实体内有唯一命名。它们在实体矩形内由一个名称列表表示：


  ![A978-1-4842-1973-7_3_Figc_HTML.jpg](img/A978-1-4842-1973-7_3_Figc_HTML.jpg)


  > 注意

  >

  > 上图显示的是一个技术上无效的实体，因为没有定义主键（这对于表和 IDEF1X 都是必需的）。我将在下一节介绍键的表示法。


  此时，你只需输入从需求中发现的所有属性（下一章将演示此过程）。正如我将在第 5 章中演示的那样，在规范化过程中，属性会发生很大变化，但这个过程是迭代的，目标将是捕捉到发现的所有细节。例如，一个
  `Employee` 实体的属性可能最初如下所示：


  ![A978-1-4842-1973-7_3_Figd_HTML.jpg](img/A978-1-4842-1973-7_3_Figd_HTML.jpg)


  然而，在规范化过程中，像这样的表通常会被分解为许多属性（例如，`address` 可能被分解为 `number`、`street name`、`city`、`state`、`zip
  code` 等），并可能根据你实际系统的需求分解为不同的实体。


  > 注意

  >

  > 属性命名是我往往会稍微偏离 IDEF1X 的地方。标准要求名称在模型内是唯一的，而不仅仅在表内唯一。这往往会导致名称中包含表名（或者更糟的是，某个表名前缀）后跟属性名，从而产生笨拙、冗长、看起来过时的名称。


  与实体名称一样，无需在名称中包含匈牙利表示法前缀或后缀来让你知道这是一个列。然而，以一种非常直接的方式构建名称，让读者明白列的含义是有价值的。如果对属性有任何疑问，可以从系统目录中检索其相关实现细节。


  我使用的格式大致基于 ISO 11179 中的概念，尽管关于这个标准确实没有太多值得参考的免费可用资料。总的来说，其理念是名称包含标准的部分，组合起来形成一个看起来标准的名称。我将在我的名称中使用以下部分：


  *   角色名（RoleName）：可选地解释属性所扮演的具体角色。

  *   属性（Attribute）：被命名属性的主要目的。可选地可以省略，表示它直接引用实体。

  *   类词（Classword）：一个必需的术语，以非实现特定的术语标识列的主要用途。示例：`Name`、`Code`、`Amount`

  *   标度（Scale）：可选地告知用户数据的标度是什么，如分钟、秒、美元、欧元等。


  以下是一些使用部分或全部标准部分的属性名称示例：


  *   `Name`：仅使用一个类词来表示命名行值的文本字符串，但它是 varchar(30) 还是 nvarchar(128) 并不重要。（没有角色名时，名称应直接应用于实体的实例。例如：`Company.Name`
  是公司本身的名称。）

  *   `UserName`：一个属性和一个类词，其中属性说明了 `Name` 类词的更具体用途，以指示是什么类型的名称。（示例：`Company.UserName`
  将是公司使用的用户名。更多上下文将从数据库的名称和目的中获取。）

  *   `AdminstratorUserName`：添加到 `UserName` 属性上的角色名，标识被命名的用户所扮演的具体角色。

  *   `PledgeAmount`：这里属性 `Pledge` 与金额类（即一笔钱的数额，无论使用何种数据类型）耦合。

  *   `PledgeAmountEuros`：表示对于 `PledgeAmount`，这是一笔认捐金额，但使用了在数据库上下文中不典型的标度。

  *   `FirstPledgeAmountEuros`：扮演在欧元中记录的第一笔 `PledgeAmount` 的角色，与之前的可以是任何顺序的认捐不同。

  *   `StockTickerCode`：将 `Code` 类词（一个短文本字符串）与属性部分 `StockTicker` 耦合。因此这是一个代表股票代码的短文本字符串。注意名称的每个部分不必是单个单词。

  *   `EndDate`：`Date` 类词表明这将不包含时间部分，属性是该行的结束日期。

  *   `SaveTime`：与前一个属性类似，但现在它是一个时间，将被视为一个时间点。


  除非我明确尝试展示替代命名，否则本书中使用的所有名称几乎都将采用这种格式。数据库设计最重要的部分之一将是保持命名一致，以帮助用户理解你构建的内容。


  接下来，我们将讨论数据模型上属性的以下方面：


  *   主键

  *   替代键

  *   外键

  *   域

  *   属性命名




  ### 主键


  如前一节所述，一个 IDEF1X 实体必须有一个主键。这对我们很方便，因为实体的定义要求每个实例必须是唯一的（参见第 1 章）。主键可以是单个属性，也可以是多个属性的组合。主键中的每个属性都必须有一个值（逻辑上，主键中不允许出现任何
  `NULL` 值）。


  主键通过将属性置于穿过实体矩形的水平线上方来表示，如下所示。请注意，无需额外符号来指示该值是主键。


  ![A978-1-4842-1973-7_3_Fige_HTML.jpg](img/A978-1-4842-1973-7_3_Fige_HTML.jpg)


  例如，考虑前一节中的 `Employee` 实体。`EmployeeNumber` 属性是唯一的，并且逻辑上每个员工都会有一个，所以这将是一个可接受的主键：


  ![A978-1-4842-1973-7_3_Figf_HTML.jpg](img/A978-1-4842-1973-7_3_Figf_HTML.jpg)


  主键的选择是一个有趣的问题。在早期的逻辑建模阶段，我通常不喜欢花时间选择最终的主键属性。我倾向于创建一个简单的代理主键来迁移到其他实体，以帮助我发现何时存在任何所有权关系。在当前的例子中，`EmployeeNumber`
  明显指向一个员工，但并非所有实体都会如此清晰——更不用说更高级的业务规则可能规定 `EmployeeNumber` 并不总是唯一的。（例如，公司可能在表中也有具有相同
  `EmployeeNumber` 值的承包商，因此需要将 `EmployeeType` 作为键的一部分。这也许不是好的做法，但无论我在本书中如何尝试描述完美的数据库，商业世界充满了你必须纳入模型的奇怪、过时的做法。）在逻辑模型中反复回去更改用于主键的属性可能很烦人，尤其是在你有一个非常大的模型时。


  同样，你很有可能拥有多个列集，它们可以唯一标识你许多实体的给定实例。例如，考虑一个对公司生产的产品进行建模的实体。公司可能通过类型、样式、尺寸和系列来识别产品：


  ![A978-1-4842-1973-7_3_Figg_HTML.jpg](img/A978-1-4842-1973-7_3_Figg_HTML.jpg)


  名称也可能是一个好的键，而且很可能还有一个产品代码。哪个属性是最佳的键——或者哪个甚至是真正的键——可能要到过程的后期才会变得完全明了。实现一个好的键有很多方法，最好的方法可能无法立即识别出来。


  此时，我并不选择主键，而是向实体添加一个值用于标识目的，然后将所有候选键建模为备用键（我将在下一节讨论）。这样，逻辑模型清晰地显示了哪些实体在所有权角色中服务于其他实体，因为迁移的键包含了所建模实体的名称。我会这样建模这个实体：


  ![A978-1-4842-1973-7_3_Figh_HTML.jpg](img/A978-1-4842-1973-7_3_Figh_HTML.jpg)


  **注意**


  在逻辑建模中使用代理键当然不是必须的；这是我个人偏好的一种方法，我发现它是一种有用的文档方法，可以保持模型整洁，并且与我后续的实现方法相对应。不仅在逻辑建模阶段使用自然键作为主键是合理的，而且许多架构师认为它更可取。两种方法都是完全可以接受的（而且同样可能在数据建模者的桌子上引发一场哲学辩论——你已被警告，所以请在甜点之后开始辩论）。


  ## 备用键


  如第 1 章所定义，备用键是一个或多个属性的分组，其唯一性需要在实体的所有实例中得到保证。备用键在实体图形中没有像主键那样的特定位置，它们通常也不会为任何关系而迁移（根据
  SQL 标准，你可以用基于备用键的外键来引用它，但这个特性很少使用，并且当使用时，它常常甚至会让最好的 DBA 感到困惑）。它们在模型中的标识方式非常简单：


  ![A978-1-4842-1973-7_3_Figi_HTML.jpg](img/A978-1-4842-1973-7_3_Figi_HTML.jpg)


  在此示例中，有两个备用键组：组 `AK1`，它有一个成员属性；组 `AK2`，它有两个属性。重叠的备用键也没有问题，可以表示为 `(AK1,AK2)`。回想一下产品示例，这两个键可以建模如下：


  ![A978-1-4842-1973-7_3_Figj_HTML.jpg](img/A978-1-4842-1973-7_3_Figj_HTML.jpg)


  ERwin 数据建模工具在此符号基础上添加的一个扩展如下所示：


  ![A978-1-4842-1973-7_3_Figk_HTML.jpg](img/A978-1-4842-1973-7_3_Figk_HTML.jpg)


  位置编号符号被附加到每个键（`AK1` 和 `AK2`）的名称上，以表示属性在键中的位置。在逻辑模型中，即使工具确实显示它们，技术上也不应考虑键中属性的顺序（唯一就是唯一，与键列的顺序无关）。哪个属性在键中排在前面真的不重要；重要的是你确保跨多个属性的值是唯一的。当键在数据库中实现时，列的顺序几乎肯定会因为性能原因而变得重要，但无论键的列顺序如何，唯一性都会得到满足。


  **注意**


  主键和唯一约束在 SQL Server 中是用索引实现的，但关于为性能原因使用索引的讨论留给第 10 章。在概念设计、逻辑设计阶段，请尽你所能或多或少地忽略性能调优需求。将大多数性能调优问题推迟到你编写代码并有足够数据真正看清需要哪些索引的时候。




  ##### 外键


  外键属性，如前所述，也称为迁移属性。它们是一个实体中的主键，用作引用另一个实体中实例的依据。它们同样是关系的结果（我们将在本章后面查看它们的图形表示）。它们的标识方式与备用键非常相似，即在字母后添加“FK”：


  ![A978-1-4842-1973-7_3_Figl_HTML.jpg](img/A978-1-4842-1973-7_3_Figl_HTML.jpg)


  作为带有外键的表示例，考虑一个模拟音乐专辑的实体：


  ![A978-1-4842-1973-7_3_Figm_HTML.jpg](img/A978-1-4842-1973-7_3_Figm_HTML.jpg)


  `ArtistId` 和 `PublisherId` 是从 `Artist` 和 `Publisher` 实体迁移而来的外键。我们将在本章后面的“关系”部分重新审视这个例子。


  关于外键的一个棘手之处在于，图表不会显示该键是从哪个实体迁移而来的。这可能会使事情变得有点混乱，具体取决于你如何选择主键。这种关于外键迁移自哪个表的不明确性是大多数建模方法的局限性，因为显示键来源实体的名称（尽管有些工具提供此选项）会因以下几个原因造成不必要的混淆：


  *   对于键从其原始拥有实体（键值最初并非迁移外键引用的实体）迁移的距离没有限制（也不应该有）。

  *   同一属性可能从两个同名的独立实体迁移而来，尤其是在逻辑设计的早期阶段，这并非完全不合理。这当然不是最佳实践，但确实可能发生，并导致有趣的情况。


  正如你所看到的，我将在逻辑模型中采用的主键方案的原因之一，是添加一个名为 `<entityName>Id` 的键作为实体的标识符，这样实体的名称就很容易识别，并让我们轻松知道属性的原始来源。此外，我们甚至可以在没有额外文档的情况下看到属性在实体间的迁移。例如，在
  `Album` 实体的例子中，仅凭名称我们就能直觉地知道 `ArtistId` 属性是一个外键，并且很可能就是从 `Artist` 实体迁移而来的。


  ### 域


  在第 1 章中，术语“域”指的是属性的一组有效值。在 IDEF1X 中，你可以将域形式化，并定义称为域的命名、可重用规范，例如：


  *   `String`：一个字符串

  *   `SocialSecurityNumber`：一个格式为 ###-##-#### 的字符值

  *   `PositiveInteger`：一个隐含域为 `0` 到 `max(integer value)` 的整数值

  *   `TextualFlag`：一个域为 (`''FALSE'',''TRUE''`) 的五字符值


  规范中的域不仅允许我们定义可以存储在属性中的有效值，还提供了数据类型定义中的一种继承形式。然后可以定义域的子类，这些子类继承基础域的设置。为经常使用的任何属性构建域，以及为不常用属性构建基础模板域，是一个好的实践。例如，你可能有一个字符类型域，其中指定了基本长度，比如
  60。然后，你可以指定常用域，如 name 和 description，在许多实体中使用。对于这些，你应该为值选择一个合理的长度，此外，你还可以包含一个要求，即列中的数据不能仅仅是空格字符，以防止用户有一个、两个或三个空格各自看起来像不同的值——除非在罕见的情况下这确实是需要的。


  无论你是否使用自动化建模工具，都要尝试定义用于特定类型事物的通用域。例如，人的名字可能是一个域。这很酷，因为对于诸如“嗯，一个人的名字应该设多长？”或“我们的零件编号格式是什么？”之类的问题，你只需回答一次。做出决定后，你只需沿用之前的做法即可。


  如果你认为可能会为了一个数据类型的长度而争论听起来不合理，那可能是因为你还没有在没有名牌的情况下工作过。程序员总是争论不休，但如果你在第一次争论后就建立了一个标准，那么你只需要进行一次争论。还要注意，几乎所有你想存储数据的东西以前都已经被处理过了，所以可以参考网上的标准文档。例如，一个可拨打电话号码列应该有多长？根据
  ITU-T E.164 ([`http://searchnetworking.techtarget.com/definition/E164`](http://searchnetworking.techtarget.com/definition/E164))，答案是
  15 个字符。因此，仅仅因为“以防某天它变长了 6.66 倍”就将其设为 100 个字符是愚蠢的，更不用说对数据完整性有害了。


  注意：在设计期间定义通用域可以对抗另一个主要的糟糕实践，即 `string(200)` 综合症（或类似的字符串长度），即数据库中的每一列都在完全相同长度的列中存储文本数据。在早期就考虑数据的最小和最大长度，比在项目经理后来为了结果而大喊大叫、程序员们迫不及待地要使用你的数据库并开始编码时再做要容易得多。这也是产生具有数据完整性的数据库的第一步。


  在建模过程的早期，你通常会想要收集一些信息，例如属性的通用类型：字符型、数值型、逻辑型，甚至是二进制数据。确定最小和最大长度可能可行也可能不可行，但能在不阻碍过程的情况下收集到的信息越多越好。另一件可以开始的好事是，记录被分类为域类型的属性的合法值。这通常使用一些伪代码或以文本方式完成，可以在你的建模工具中，甚至可以在电子表格中完成。




  ## 域作为实现无关的数据类型描述


  保持这些域（domain）作为实现无关的数据类型描述是极其重要的。例如，你可以指定一个域为 `GloballyUniqueIdentifier`，这是一个无论在哪里生成都保证唯一的值。在
  SQL Server 中，可以使用唯一标识符（GUID 值）来实现此域。在另一个数据库系统（可能由 Microsoft 以外的公司创建）中，如果没有完全相同的机制，则可能以不同的方式实现；关键在于，这个值在统计上保证每次生成都是唯一的。概念/逻辑建模阶段应该在不考虑
  SQL Server 能做什么的情况下完成，即便没有其他原因，也是为了防止你在理解实际问题之前就开始对未来的解决方案强加限制。另一种域可能是一组合法值，比如如果业务用户定义了三种客户类型，你可以指定可以使用的合法字符串值。


  ## 物理建模与域的重用价值


  当你开始物理关系结构的物理建模时，你将使用相同的域来分配实现属性。这就是使用域的真正价值。通过创建可重用的模板属性（这些属性在你开始创建列时也会用到），你将花费更少的精力和时间来构建简单的实体，这构成了你工作的很大一部分。这样做还为你提供了一种强制执行公司范围标准的方法，方法是在所有公司模型中重用相同的域（当然，这预设了你在一段时间内对数据建模过程保持严谨！）。


  稍后，将选择确切的数据类型、约束等实现细节，这只是可继承的众多基本属性中的几个（如果 Microsoft 将来为某种情况添加了更合适的数据类型，你至少可以从模型的角度简单地更改所有使用该域类型的列到新类型）。由于域的数量很可能少于已实现的属性数量，因此可以实现快速且一致的模型组装的双重好处。然而，在手工构建表时应用继承机制可能不太合理或有用。即使没有工具，实现一个扁平的域结构也足够繁琐。


  ## 域层次结构示例


  以一组字符串域为例：


  ![A978-1-4842-1973-7_3_Fign_HTML.jpg](img/A978-1-4842-1973-7_3_Fign_HTML.jpg)


  这里，`String` 是基础域，你可以从中继承出 `Name` 和 `Description`。`FileName`、`FirstName` 和 `LastName`
  继承自 `Name`。在逻辑建模期间，这看起来可能是徒劳无功的，因为这些域中的大多数只共享少数基本细节，例如不允许 `NULL` 或空白数据。然而，`FileName`
  可能是可选的，而 `LastName` 可能是强制的。为尽可能多的不同属性类型设置域是重要的，以防发现某些规则或数据类型适用于任何已存在的域。当需要更改所有字符串类型的数据类型时（例如，如果你最终决定从
  ANSI 字符集全面更改为 UNICODE，或者决定在所有个人笔记类型的属性上实现加密，但不在姓名类属性上实现），事情就会变得顺利。


  ## 逻辑建模中的域展示


  在逻辑建模期间，域可以选择性地显示在实体中属性名称的右侧（这也是你最终将看到 SQL Server 数据类型的地方）：


  ![A978-1-4842-1973-7_3_Figo_HTML.jpg](img/A978-1-4842-1973-7_3_Figo_HTML.jpg)


  因此，如果我有一个实体用于保存描述人员类型的域值，我可能会这样建模：


  ![A978-1-4842-1973-7_3_Figp_HTML.jpg](img/A978-1-4842-1973-7_3_Figp_HTML.jpg)


  为了对此示例建模，我定义了四个域：


  1.  `SurrogateKey`：代理键值。（构建域不应暗示代理键的实现，因此稍后可以用任何方式实现。）

  2.  `Description`：保存“某物”的描述（最大 60 个字符）。

  3.  `PersonFirstName`：一个人的名字（最大 30 个字符）。

  4.  `PersonLastName`：一个人的姓氏（最大 50 个字符）。


  姓名长度的选择很有趣。我在 Bing 上搜索了 “person first name varchar”，发现了许多不同的可能性：10、35、无限制、25、20
  和 15——全都在搜索的第一页！正如你应该使用一致的命名标准一样，每次表示类似数据时，你也应该使用标准长度，这样到了实现阶段，存储类似数据的两个列具有不同定义的可能性就降到了最低。


  ## 实现阶段与域的映射


  在实现阶段，所有的域都将映射到 SQL Server 中的某种数据类型形式。然而，在流程的这个节点上，未来的实现还不是重点。逻辑模型中域的重点是定义可以以通用方式应用的常见存储模式，包括所有将管辖其使用的业务规则。


  如果你遵循我之前讨论的由 RoleName + Attribute + Classword + Scale 组成的命名标准，你可能会发现你的域经常与该层次结构有很多相似之处。`Name`
  是一个 classword，而 `Name` 也在我们的域列表中。`FirstName` 是一个属性和 classword，最终也成了一个域。然而，域通常会包含像大小这样的东西。`Name30Characters`、`Name60Characters`
  等可能不是好的 classword，但在某些情况下，如果你只想要一个 30 个字符的名称类，而不想为每个属性创建一个域，它们可以是完全可以接受的域。域是为了让你自己方便，使事情更容易，所以做更有意义的事。




  ### 关系


  到目前为止，我们所看到的视觉结构在大多数数据建模方法论中基本相同。实体几乎总是用矩形表示，属性通常就是矩形内的文字。而**关系**则开始出现巨大分歧，因为不同的建模语言在图形化表示关系方面略有不同。为了澄清关系的概念，我需要回到“父”和“子”这两个术语。请看以下
  IDEF1X 规范术语表中的定义（这些定义直接来自政府规范，清晰度惊人！）：


  *   **实体，子**：在特定连接关系中的实体，其实例可以与另一个实体（父实体）的零个或一个实例相关联。

  *   **实体，父**：在特定连接关系中的实体，其实例可以与另一个实体（子实体）的多个实例相关联。

  *   **关系**：两个实体之间或同一实体的实例之间的关联。


  在 IDEF1X 中，每条关系都用连接两个实体的线表示，线的一端有一个实心圆，指示主键属性迁移为外键的位置。在下图中，父的主键将迁移到子。


  ![A978-1-4842-1973-7_3_Figq_HTML.jpg](img/A978-1-4842-1973-7_3_Figq_HTML.jpg)


  关系有几种不同的类型，指示父表与子表的关联方式。我们将在本节中看几个不同关系概念的例子：


  *   **标识关系**，其中一个表的主键迁移到另一个表的主键。子将是一个依赖实体。

  *   **非标识关系**，其中一个表的主键迁移到另一个表的非主键属性。只要不存在标识关系，子将是一个独立实体。

  *   **可选非标识关系**，即该非标识关系不要求父值。

  *   **递归关系**，即一个表与自身相关。

  *   **子类型或分类关系**，这是一种一对一的关系，用于让一个实体扩展另一个。

  *   **多对多关系**，其中一个实体的一个实例可以与另一个实体的多个实例相关，反之亦然。


  我们还将涵盖关系的**基数**（多少个父与多少个子相关）、**角色名**（在关系中更改键的名称）和**动词短语**（关系的名称）。关系是数据库设计图中的一个关键主题，而且并非完全简单。大量信息是用几个点和线来关联的。通常，查看图形显示所表示的元数据会有所帮助，以确保其清晰（特别是如果查看的是外部建模语言时）。


  > **注意**

  >

  > 本节讨论的所有关系（除了多对多）都属于一对多类型，这包括一对零、一对一、一对多，或者可能是一对 n。从技术上讲，更准确地说是一对（从 M 到 N），因为这能够根据具体情况非常精确（或非常宽松）地指定“多”的范围。然而，更标准的术语是“一对多”，我不会试图让一个已经令人困惑的术语变得更复杂。


  ### 标识关系


  关系是标识性的概念用于表示容器关系，即子实例的本质（定义为用以刻画或识别某物的内在或不可或缺的属性）是由父的存在定义的。另一种理解方式是，通常标识关系中的子是父不可分割的一部分。没有父的存在，子就毫无意义。


  关系绘制如下：


  ![A978-1-4842-1973-7_3_Figr_HTML.jpg](img/A978-1-4842-1973-7_3_Figr_HTML.jpg)


  为了在模型中实现这种关系，主键属性会迁移到子的主键中。因此，需要父实例的键才能识别子实例记录，这就是使用“标识关系”名称的原因。在下面的例子中，你可以看到`ParentId`属性是`Child`实体中的一个外键，来自`Parent`实体。


  ![A978-1-4842-1973-7_3_Figs_HTML.jpg](img/A978-1-4842-1973-7_3_Figs_HTML.jpg)


  关系中的子实体被绘制成一个圆角矩形，正如本章前面提到的，这意味着它是一个依赖实体。一个常见的例子是发票和发票上向客户收取的行项目：


  ![A978-1-4842-1973-7_3_Figt_HTML.jpg](img/A978-1-4842-1973-7_3_Figt_HTML.jpg)


  也可以说这些行项目是父的一部分，就像在一个对象中你可能有一个属性是一个数组，但由于在 SQL 中所有值都存储为标量，我们最终得到了更多的表而不是不同的数据类型。





  ### 非标识关系


  非标识关系表明，父实体代表了子实体中更具信息性的属性。在实现非标识关系时，主键属性会迁移为子实体的非主键属性。它在实体之间以虚线表示。还要注意，代表子实体的矩形现在具有方形角，因为它是独立存在的，而不依赖于
  `Parent`：


  ![A978-1-4842-1973-7_3_Figu_HTML.jpg](img/A978-1-4842-1973-7_3_Figu_HTML.jpg)


  ## 非标识关系中的属性迁移


  现在你可以看到属性 `ParentID` 已迁移为非键属性：


  ![A978-1-4842-1973-7_3_Figv_HTML.jpg](img/A978-1-4842-1973-7_3_Figv_HTML.jpg)


  ## 核心概念差异


  再次以发票为例，考虑一下已售出产品的供应商，这些信息已在行项目中记录。产品供应商并不定义行项目的存在，因为无论是否指明产品的确切来源供应商，该行项目仍然有意义。


  标识关系和非标识关系之间的区别有时可能很微妙，但对于理解表及其键之间的关系至关重要。如果父实体定义了子实体存在的需求（如前一节所述），那么使用标识关系。另一方面，如果该关系定义了子实体的某个属性之一，则使用非标识关系。


  ## 说明性示例


  以下是一些例子：


  *   **标识关系**：你有一个存储联系人的实体，另一个存储联系人电话号码的实体。`Contact` 实体拥有的信息定义了电话号码，如果没有该联系人，`ContactPhoneNumber`
  实例就没有存在的必要。


  ![A978-1-4842-1973-7_3_Figw_HTML.jpg](img/A978-1-4842-1973-7_3_Figw_HTML.jpg)


  *   **非标识关系**：考虑为标识关系定义的那些实体，以及一个名为 `ContactPhoneNumberType` 的额外实体。该实体以非标识方式与 `ContactPhoneNumber`
  实体相关，并定义了一组 `ContactPhoneNumber` 可能具有的电话号码类型（`Voice`、`Fax` 等）。电话号码的类型并不标识该号码；它只是对其进行分类。即使类型未知，记录电话号码本身仍然有价值，因为该号码可能仍具有信息意义。然而，如果没有联系人的存在，将联系人与电话号码关联起来的一行数据将毫无用处。


  ![A978-1-4842-1973-7_3_Figx_HTML.jpg](img/A978-1-4842-1973-7_3_Figx_HTML.jpg)


  ## 域实体


  `ContactPhoneNumberType` 实体通常被称为**域实体**或**域表**，因为它以一种非特定的方式实现属性的域。与其为属性设置固定的域，不如设计一个允许通过编程更改域而无需重新编码约束或客户端代码的实体。作为额外的好处，你可以添加列来定义、描述和扩展域值，以实现业务规则。它还允许客户端用户以极少的编程构建供用户选择值的列表。


  ## 强制关系与可选关系


  虽然每个非标识关系都定义了子表某个属性的域，但有时在创建行时，并不需要选择值。例如，考虑一个为社区建模房屋的数据库。每栋房屋都有颜色、样式等属性。然而，并非每栋房屋都有报警公司、抵押权人等。在这种情况下，报警公司和银行之间的关系将是**可选的**，而颜色和样式的关系可以是**强制的**。在实现的表中，区别在于子表的外键列是否允许
  `NULL` 值。如果要求必须有值，则视为强制关系。如果迁移键的值可以是 `NULL`，则视为可选关系。


  可选关系由一条虚线末端、与黑点相对的一端带有一个**空心菱形**来表示，如下所示：


  ![A978-1-4842-1973-7_3_Figy_HTML.jpg](img/A978-1-4842-1973-7_3_Figy_HTML.jpg)


  在强制关系中，关系图如前所述绘制，没有菱形。请注意，可选关系意味着关系的基数可以是零或更大，但强制关系的基数必须为一或更大（如第 1 章中所定义，基数指的是可以与另一个值相关联的值的数量，该概念也将在下一节中进一步讨论）。


  **注意**


  你可能想知道为什么没有可选的标识关系。这是因为在主键中不能有任何可选属性，这在关系理论和 SQL Server 中都是如此。


  ## 实际实现场景


  对于一对多的可选关系，请考虑以下情况：


  ![A978-1-4842-1973-7_3_Figz_HTML.jpg](img/A978-1-4842-1973-7_3_Figz_HTML.jpg)


  `invoiceLineItem` 实体是将项目添加到发票上以收取付款的地方。用户有时可能会对行项目应用标准折扣金额。因此，从 `invoiceLineItem`
  到 `discountType` 实体的关系是可选的，因为该行项目可能没有应用任何折扣。


  对于大多数此类可选关系，还有另一种可能的解决方案，可以将其建模为必需关系，并在实现时向 `discountType` 表添加一行，指示“无”或“未知”。这种强制关系的一个例子可以是电影租赁系统数据库中的流派与电影：


  ![A978-1-4842-1973-7_3_Figaa_HTML.jpg](img/A978-1-4842-1973-7_3_Figaa_HTML.jpg)


  该关系是 `流派 <分类> 电影`，其中 `流派` 实体代表一对多关系中的“一”，`电影` 代表“多”。每部被租出的电影必须有一个流派，以便可以在库存中组织并放置在相应的租赁货架上。如果电影是新片，但流派尚不明确，可以使用流派对象中值为“新片”或“未知”的一行。是否使用可选关系，或者创建一个表示缺少值的行，是经常讨论的问题。通常，在非报告型数据库中，编造一个表示“没有真实关联值”的值是不被赞成的，因为它可能引起混淆。编写查询的用户如果最终看到销售给“缺失客户”的记录，可能会不确定这是一个古怪的新餐厅名称还是一个编造的行。在报告场景中，你通常只关注分组，因此问题较小，你会设计一些方法让该行排序到列表的顶部或底部。




  ### 角色名称


  角色名称是指当某个属性被用作外键时，你可以为其指定的一个替代名称。角色名称的目的是阐明已迁移键的用途，因为要么父实体是通用的而需要一个更具体的名称，要么同一个实体与另一个实体存在多重关系。由于属性名称必须是唯一的，通常需要为子外键引用分配不同的名称。请看以下表：


  ![A978-1-4842-1973-7_3_Figab_HTML.jpg](img/A978-1-4842-1973-7_3_Figab_HTML.jpg)


  在此图中，`Parent` 和 `Child` 实体之间存在两种关系，迁移的属性已被角色命名为 `FirstParentPrimaryKey` 和 `SecondParentPrimaryKey`。在图中，你可以在角色名称后，用句点（.）分隔，标出迁移属性的原始名称，如下所示（但这通常会在模型中占用过多空间）：


  ![A978-1-4842-1973-7_3_Figac_HTML.jpg](img/A978-1-4842-1973-7_3_Figac_HTML.jpg)


  举个例子，假设你有一个 `User` 实体，并且想要存储创建 `DatabaseObject` 实体实例的用户名称或 ID，以及该 `DatabaseObject`
  实例所为其创建的用户。最终结果可能如下：


  ![A978-1-4842-1973-7_3_Figad_HTML.jpg](img/A978-1-4842-1973-7_3_Figad_HTML.jpg)


  请注意，从 `User` 实体到 `DatabaseObject` 实体存在两种关系。由于图中线条的绘制方式，仅凭图示无法清楚分辨哪个外键对应哪个关系。一旦你为关系命名（使用动词短语，本章稍后将介绍），确定键的关系就会变得更容易，但通常，判断哪条线对应哪个子属性，只能靠试错。


  ### 关系基数


  关系的基数是指对于该关系的每个父实例，可以插入多少个子实例。许多人会在需求与设计阶段忽略这个话题，因为它可能难以实现。然而，我们的初步目标是在数据模型中表达需求，而将数据约束实现的讨论留待后续（我们将在第
  6 章实现第一个数据库时开始讨论实现，并在第 7 章（数据保护章）以及本书后半部分进行更多讨论）。


  图 3-1 至 3-6 展示了关系可能具有的六种基数。基数指示符适用于强制性或可选性关系。


  ![A978-1-4842-1973-7_3_Fig6_HTML.jpg](img/A978-1-4842-1973-7_3_Fig6_HTML.jpg)

  图 3-6. 描述基数的专业化注释


  ![A978-1-4842-1973-7_3_Fig5_HTML.jpg](img/A978-1-4842-1973-7_3_Fig5_HTML.jpg)

  图 3-5. 一对精确 N（此例中为 5，表示每个父实例必须有五个子实例）


  ![A978-1-4842-1973-7_3_Fig4_HTML.jpg](img/A978-1-4842-1973-7_3_Fig4_HTML.jpg)

  图 3-4. 一对某个固定范围（此例中，为 4 到 8 之间，包含 4 和 8）


  ![A978-1-4842-1973-7_3_Fig3_HTML.jpg](img/A978-1-4842-1973-7_3_Fig3_HTML.jpg)

  图 3-3. 一对零或一（不超过一个），由 Z 表示


